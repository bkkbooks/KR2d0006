  text: 通志卷六十九宋右迪功郎鄭樵漁仲撰藝文略第七藝術類第九藝術奕射壺碁騎塞畫録經畫圖蒱投博象樗彈碁戲打馬雜格雙陸打毬彩選葉子格古今藝術二十卷見隋志藝術略序五卷孫暢之撰今古藝術十五卷見唐志伎術録一卷孫暢之撰述伎藝一卷見隋志右藝術五部四十二卷射經一卷唐王琚撰又一卷田逸撰又四卷射記一卷唐張守忠撰射法一卷黃損撰又一卷劉懷德撰射口訣一卷張商撰射書十五卷偽唐徐鍇歐陽陌撰射鑒九圖一卷九章射術三卷張商撰神射訣一卷集古今射法一卷射訣要略一卷李廣撰五善正鵠格一卷五善射序一卷程正柔撰射評一卷李廣撰射訓一卷射議一卷王越石撰九鑑射經一卷射法指訣一卷嚴悟撰弓箭啓蒙論一卷任權撰廣弓經一卷弓訣一卷射格一卷金吾射法一卷劉氏射法一卷神射式一卷王德甫撰射訣一卷王堅道撰又一卷韋韞撰又一卷馬思永撰又一卷魏氏撰右射三十一部五十卷馬槊譜一卷見隋志騎馬都格一卷梁朝書籍騎馬變圖一卷見隋志馬射譜一卷見隋志右騎四部四卷名手畫録一卷畫品録一卷集唐世善畫人姓名古今畫品一卷後魏謝赫撰凡起曹魏訖後魏中興年二十八人續畫品一卷唐姚最撰採謝赫所遺以及梁朝凡十七人又一卷蕭繹撰畫後品一卷唐李嗣真撰以姚謝二家多失故始普通至上元三年凡三十人續畫後品一卷歷代名畫記十卷張彥逺撰畫評一卷顧况撰唐畫斷三卷宋景元撰畫品録一卷唐裴孝源撰又畫品一卷僧彥保撰畫拾遺一卷唐竇蒙撰吳恬畫山水録一卷梁朝畫目三卷宋朝胡嶠撰不絶筆畫圖一卷王睿撰益州名畫録三卷宋朝黃休復撰荆浩筆法一卷唐荆浩子谷洪撰唐采畫録一卷畫總載一卷張又新撰廣畫録一卷僧仁顯撰名畫獵精録二卷張彥逺撰合畫筆訣一卷五代名畫評一卷劉道醇撰聖朝名畫評一卷劉道成撰丁巳畫録一卷劉道醇撰圖畫見聞志六卷貞觀公私畫録一卷裴孝源撰歷代畫評八卷唐竇蒙撰翰林畫録一卷歷代畫斷一卷四時設色一卷陸探微撰畫史一卷朱芳撰古今名畫記三卷右畫録三十四部六十四卷漢賢王圖漢王元昌畫玉華宮圖鬬雞圖文成公主降蕃圖閻立德畫秦府十八學士圖一卷閻立本畫凌煙功臣二十四人圖風俗圖范長夀畫醉道士圖本草訓誡圖王定畫遊春戲藝圖檀智敏畫唐朝九聖圖殷􅛴韓無忝畫唐髙祖及諸王圖太宗自定輦上圖開元十八學士圖盤車圖董蕚畫後周北齊梁陳隋武德貞觀永徽朝臣圖曹元廓畫髙祖太宗諸子圖望賢宮圖楊升畫伎女圖張萱畫乳母將嬰兒圖按羯鼓圖張萱畫鞦韆圖武惠妃舞圖談皎畫佳麗寒食圖佳麗伎樂圖龍朔功臣圖韓幹畫姚宋及安祿山圖相馬圖明皇試馬圖寧王調馬打毬圖明皇馬射圖上黨十九瑞圖鹵簿圖王象畫洪崖子橘木圖田琦畫內庫瑞錦對雉鬬羊翔鳳遊麟圖竇師綸畫天竺西僧渡水放牧圖韋鶠畫撲蝶按箏楊真人降真五星等四圖周昉畫右畫圖三十七唐人所藏今容有傳模之迹行於世者故存其名號或可尋訪庶可見當時典章人物之象焉投壺經一卷郝沖虞談撰又一卷唐上官儀撰投壺圖一卷張承斌撰傾壺集三卷劉仁敏撰投壺道一卷郝沖撰投壺變一卷晉虞潭撰右投壺六部八卷碁勢四卷見隋志又七卷湘東太守徐泓撰又十卷王子沖撰又十卷沈敞撰齊髙碁圖二卷碁後九品序一卷袁遵撰圍碁九品序録五卷范汪等撰圍碁勢二十九卷晉趙王倫舍人馬朗等撰建元永明碁品二卷宋褚思莊撰九品序録一卷范汪撰天監碁品一卷梁栁惲撰梁武碁評一卷梁武碁法一卷竹苑仙碁圖一卷碁圖一卷韋珽撰碁訣一卷圍碁品一卷梁武撰碁要訣一卷奕碁經一卷金谷園九局圖一卷唐開元中王積薪馮汪二人於太原尉陳九言金谷第奕碁為金谷園圖金谷園九局譜一卷偽唐徐鉉撰鳯池圖一卷王積薪撰碁本一卷王延昭碁論一卷劉仲甫忘憂集一卷角局圖一卷應機子碁勢重元圖一卷諸家精選新勢一卷太宗皇帝碁圖一卷國手綱格一卷圍碁故事一卷右奕碁三十一部九十二卷博塞經一卷邵綱撰皇博經一卷魏文帝撰太一博法一卷梁東宮撰雙博法一卷見隋志大小博法二卷大博經行碁戲法二卷小博經一卷鮑宏撰雜博戲五卷二儀十博經一卷二儀博經一卷隋煬帝撰大博經二卷呂才撰博經一卷董叔經撰右博塞一十二部一十九卷象經一卷周武帝撰又一卷王褒注又一卷何妥注又三卷王裕注象經發題義一卷見隋志右象經五部七卷樗蒱經三卷盧還京撰又一卷樗蒱經采名一卷樗蒱象戲格三卷象戲格一卷尹洙撰廣象戲格一卷朝補之撰五木經一卷樗蒱格一卷右樗蒱八部一十二卷彈碁譜一卷徐廣撰彈碁經一卷張柬之撰又一卷右彈碁三部三卷謝景初打馬格一卷宋迪打馬格一卷右打馬二部二卷雙陸格一卷大雙陸格一卷右雙陸二部二卷打毬儀注一卷張直佐撰打毬要略一卷查同章撰右打毬二部二卷骰子選格三卷唐李郃撰漢官儀彩選三卷新修彩選一卷宋朝劉蒙叟撰文班彩選格三卷楊億撰宋朝文武彩選三卷尹洙撰又二卷張訪撰春秋彩選一卷新定彩選一卷趙明逺撰刪繁彩選一卷元豐官制彩選一卷慶歷彩選圖一卷尋仙彩選七卷選仙格一卷洪濛子撰選佛圖一卷右彩選一十四部二十九卷遍金葉子格一卷新定遍金葉子格一卷擊蒙小葉子格一卷偽唐李煜妃周氏撰小葉子例一卷右葉子格四部四卷旋碁格一卷謀戲格一卷捉卧甕人格一卷趙昌言撰釣鼇圖一卷採珠局格一卷金龍戲格一卷玉燭詩一卷款飲集一卷樗蒱滿席歡一卷曹氏撰改令式一卷盡歡格一卷角力記一卷右雜戲格十二部十二卷凡