body:
  text: 通志卷八十五下宋右迪功郎鄭樵漁仲撰宗室傳第八下後周邵惠公皓皓子什肥廣什肥子胄弟什肥弟導衆導子廣子洽廣翼翼弟羅導弟護遷叱協馮杞簡公連子元寶亮元寶繼子亮弟椿莒莊公洛生子菩薩賔菩薩繼子至貢虞國公仲子興洛興子廣川公測弟深伯深子孝東平公神舉父顯和弟神舉子同神舉慶慶子靜亂協靜亂子協弟皛文帝十王宋獻公震繼子實衛刺王直齊焬王憲子貴趙僭王招譙孝王儉陳惑王純越野王盛代奰王達冀康公通滕聞王逌孝閔一王紀厲王康明帝三王畢刺王賢鄷王貞孝武六王漢王贊餘五王同贊為隋文所誅宣帝二王萊王衍與郢王術同為隋文所誅隋蔡景王整子智積滕穆王瓚子綸道宣王嵩衛昭王爽子集河間王𢎞子慶義城公處綱弟處樂離石太守子崇文帝四王房陵王勇子儼秦孝王俊子浩湛庶人秀庶人諒焬帝三子元德太子昭子侑是為恭帝王次燕王倓次越侗齊王暕趙王杲後周邵惠公皓文帝之長兄也德皇帝娶樂浪王氏是為德皇后生皓次杞簡公連次莒莊公洛生次文帝皓性至孝居德皇后喪哀毁過禮魏正光末沃野鎮人破六韓拔陵作亂所署偽王衛可瓌最強德皇帝紏合鄉曲與可瓌戰于武當臨陳墜馬皓奔救殺數十人賊衆披靡德皇帝乃上馬引去俄而賊追騎大至皓遂歿焉其後德皇帝竟斬可瓌及鮮于修禮起德皇帝與諸子俱陷其軍中為其將佐葛榮殺修禮爾朱榮平葛榮舉家方遷晉陽周有天下保定初追贈皓大冢宰封邵國公諡曰惠皓三子什肥導護什肥事母以孝聞文帝入關不能離母遂留晉陽文帝定秦隴什肥為齊神武所害保定初追贈大將軍小冢宰襲爵邵國公諡曰景子胄嗣胄少孤頗有幹略景公之見害以年幼下蠶室保定初詔以晉公護子會紹景公封天和中與齊通好胄歸襲爵邵國公及隋文帝輔政胄為榮州刺史舉兵應尉遲迥為清河公楊素所殺國除會字乾仁胄至自齊改封談國公後與護同誅建德二年追復封爵常武公導字菩薩少雄豪有仁惠初與諸父在葛榮軍中榮敗遷晉陽與文帝隨賀拔嶽入關導從而西常從征伐文帝討侯莫陳悅以導為都督悅走故塞導追斬之牽屯山以功封饒陽縣伯及魏文帝東征留導為華州刺史既而趙青雀于伏德慕容思慶等作亂導擊之禽伏德斬思慶屯渭橋會文帝軍及事平進爵章武郡公加侍中開府及髙仲密以北豫州降文帝東征復以導為大都督行華州刺史甚得扞守之方及大軍不利東魏追至稠桑知關中有備乃還侯景來附詔徴隴右大都督獨孤信東下令導代信為秦州刺史大都督十五州諸軍事及齊氏稱帝文帝發關中兵討之魏文帝遣齊王廓鎮隴右徴導拜大將軍大都督二十三州諸軍事屯咸陽大軍還乃旋舊鎮導性寬明善於撫馭凡所引接人皆盡誠臨事謹慎常若弗及文帝每出征留導居守深為吏民所附朝廷亦以此重之魏恭帝時薨於上邽贈尚書令諡曰孝朝議以導撫和西戎威恩顯著欲令世鎮隴右以彰厥德及薨葬於上邽城西無疆原華戎會葬者萬餘人悲號振野相率負土成墳髙五十餘丈周回八十餘步為官司所止然後泣辭而去其遺愛見思如此天和五年重贈太師柱國公導五子廣亮翼椿衆亮椿出後於杞廣字乾歸少方嚴好文學武成初位大將軍梁州總管進封蔡國公纍遷秦州刺史總管十三州諸軍事性明察善於撫綏民庶畏悅之時晉公護諸子及廣弟杞公亮等奢侈踰制廣獨率禮又折節待士朝野稱焉廣以晉公護擅權勸令挹損護不能用後除陕州總管以病免及孝公追封豳國公詔廣襲爵初廣母李氏以廣患憂而成疾遂歿廣居喪加篤乃以毁薨世稱母為廣病廣為母死慈孝之道極於一門武帝素服親臨其喪贈本官加太保隴右十四州諸軍事秦州刺史諡曰文葬於隴右子洽嗣隋文帝輔政被害國除翼字乾宜封西陽郡公早薨諡曰昭無子以杞公亮子溫嗣後坐亮反誅國除衆字乾道少不慧封天水郡公為隋文所誅導弟護字薩保幼方正有志度特為德皇帝所愛文帝之入關以年少不從普泰初始自晉陽至平涼時年十七文帝諸子並幼家務之事悉以委護內外不嚴而肅文帝嘆曰此兒志度類我及臨夏州留護事賀拔嶽嶽被害文帝至平涼以護為都督從破侯莫陳悅後以迎魏帝功封水池縣伯從文帝禽竇泰復𢎞農破沙苑戰河橋並有功芒山之役為敵人所圍賴都督侯伏龍恩救乃免坐免官尋復本官大統十三年進封中山公十五年遷大將軍與于謹征江陵護率輕騎為前鋒晝夜兼攻梁臨邉城鎮並拔之進兵至江陵城下城中不意兵至惶窘失圖大軍繼至圍而尅之師還護又討平襄陽蠻帥向天保等萬餘落初行六官拜小司空文帝西巡至牽屯山遇疾馳驛召護護至涇州而疾已綿篤謂護曰吾形容若此必是不濟諸子幼小寇賊未定天下之事屬之於汝宜勉力以成吾志護涕泣奉行至雲陽而文帝崩護祕之至長安乃發喪時嗣子沖弱強寇在近人情不安護綱紀內外撫循文武於是衆心乃定先是文帝嘗云我得胡力當時莫曉其指時人以護當之尋拜柱國文帝山陵畢護以天命有歸遣人諷魏帝行禪代之事孝閔踐阼拜大司馬封晉國公邑萬户趙貴獨孤信等將謀襲護護因其入朝遂執之黨與皆伏誅拜大冢宰時司會李植軍司馬孫恆等在文帝朝久居權要見護執政恐不見容乃密要宫伯乙弗鳳張光洛賀拔提元進等為腹心説帝曰護誅趙貴以來威權日盛謀臣宿將爭往附之大小政事皆決於護以臣觀之將不守臣節宜圖之帝然其言數將武士於後園為執縛之勢護微知之出植為梁州恆為同州欲遏其謀後帝思植等每欲召之護諫曰天下至親不過兄弟若兄弟自搆嫌隙他人何易可親但恐除臣後姦回得逞其欲非唯不利陛下亦危社稷泣涕久之乃止護尤猜鳳等鳳等益懼與帝密謀滋甚遂克日將除護光洛告護護乃召柱國賀蘭祥小司馬尉遲綱等以鳳謀告之祥等並勸廢帝時綱總領禁兵護乃遣綱入宫召鳳等議事以次執送護第因罷散宿衛兵遣祥逼帝幽於舊邸於是召公卿畢集護第護曰先王勤勞王業三十餘年寇賊未平奄棄萬國寡人地則猶子親受顧命以略陽公既居正嫡與公等立而奉之革魏興周為四海王自即位以來荒淫無度昵近羣小迹忌骨肉大臣重將咸欲誅夷若此謀遂行社稷必致傾覆寡人若死將何靣目以見先王今日寧負略陽公豈可負社稷寧都公年德兼茂仁孝慈聖今欲廢昏立明公等以為何如羣公咸曰此公之家事敢不唯命是聽於是斬鳳等於門外並誅植恆等尋亦弒帝徴寧都公於岐州而立之是為明帝二年拜太師賜輅車冕服封子至為崇業郡公初改雍州刺史為牧以護為之并賜金石之樂武成元年護上表歸政帝許之軍國大事尚委於護帝性聰睿有識量護深憚之有李安者本以鼎爼得寵於護稍被升擢位至膳部下大夫至是護乃密令安置毒於食以進帝遂崩護立武帝百官總已以聽於護自文帝為丞相立左右十二軍總屬相府文帝崩後皆受護處分凡所徴發非護書不行護第屯兵禁衛盛於宫闕事無巨細皆先斷後聞保定元年以護為都督中外諸軍事合五府總於天官或有希護旨者云周公德重魯立文王之廟以護功比周公宜用此禮於是詔於同州晉國第立德皇帝别廟使護祭焉三年詔自今詔誥及百官文書並不得稱公名以彰殊禮護抗表固讓初文帝創業即與突厥和親謀為掎角共圖髙氏是年遣柱國楊忠與突厥東伐破齊長城至并州而還期後年更舉南北相應齊主大懼先是護母閻氏與弟四姑及諸戚屬並沒在齊皆被幽縶護每遣間使尋求莫知音息至是並許還朝且請和好四年齊人先遣護姑入關留其母以為後圖仍令人為閻氏作書與護曰吾念十八九入汝家今已八十矣凡生汝輩三男三女今目下不見一人興言及此悲纒肌骨賴皇齊恩恤差安衰暮又得與汝楊氏姑及汝叔母紇于汝嫂劉及汝新婦等同居頗以自適但為微有耳疾大語方聞行動飲食幸無多損汝與吾别時年尚幼小以前家事或不委曲記也我昔在武川鎮生汝兄弟三人鮮于修禮起日吾家先在博陵郡住相將欲向左人城至唐河北遇定州官軍汝祖及第二叔與戰皆沒叔母賀拔及兒元寶叔母紇于及兒菩薩并吾與汝六人俱為官兵執送元寶掌軍時寶掌營唐城內經三日寶掌遣送吾與汝及所掠男女向京至定州城南夜宿同鄉人姬庫根家蠕蠕奴望見鮮于修禮營火逐光走至本營告吾等所在明旦汝叔將兵邀遮吾及汝等因得還營汝時年十二可不略記此事由緣也後吾共汝居晉陽時元寶菩薩及汝姑兒賀蘭盛洛并汝四子從成博士學成性嚴惡汝等謀欲害之吾共汝叔母聞知各笞其兒唯盛洛無母獨不被捶後爾朱天柱亡歲賀拔阿斗泥在關西遣人迎家纍汝叔亦遣奴迎汝及盛洛等汝時著緋綾袍銀裝帶盛洛著紫織成纈並乘騾同去盛洛小於汝三人並喚吾作摩敦此事當一一記之今寄汝小時所著錦袍表一領至宜檢看知吾含悲抱戚多歷年祀禽獸草木母子相依吾有何罪與汝分隔世間所有求皆可得母子異國何處可求汝今貴極王公富過山海有一老母八十之年飄然千里死亡旦夕不得一朝同處寒不得汝衣飢不得汝食汝雖窮榮極盛於吾何益生前汝既不得申其供飬事往何論今日以後吾之殘命唯繫於汝戴天覆地中有神明勿云冥昧而可欺負楊氏姑今皇齊賜許先發關河阻逺隔絶多年書依常體慮汝致惑是以每存欵質兼亦載吾姓名當識此理勿以為怪護性至孝得書悲不自勝左右莫能仰視報書云區宇分崩遭遇災禍違離膝下三十五年受形稟氣皆知母子誰知薩保如此不孝宿殃積戾唯應自受豈悟網羅上嬰慈母但立身立行不負一物明神有識宜先哀憐而子為公侯母為俘𨽻熱不見母熱寒不見母寒衣不知有無食不知飢飽泯如天地之外無由暫聞晝夜悲號繼之以血分懷寃酷終此一生死若有知冀奉見於泉下耳不謂齊朝解網惠以德音摩敦四姑並許哀放初聞此旨魂爽飛越號天叩地不能自勝四姑即蒙禮送平安入境以今月十八日於河東拜見遙奉顔色崩慟肝腸但離絶多年存亡阻隔相見之始口未忍言唯敘齊朝寬𢎞每存大德云與摩敦雖處宫禁常承優禮今者來鄴恩遇彌隆重降矜哀聽許摩敦垂敕曲盡悲酷備述家事伏讀未周五情屠割書中所道無一事敢忘摩敦年尊又加憂苦常謂寢食貶損或多遺漏伏奉論述次第分明一則以悲一則以喜鄉里被敗之日薩保年已十歲鄰曲舊事猶自記憶况家門禍難親戚流離奉辭時節先後慈訓刻肌刻骨常纒心腑天長喪亂四海橫流太祖乘時齊朝撫運兩河三輔各運神機源其事迹非相背負太祖升遐未定薩保屬當猶子之長親受顧命雖身居重任職當憂責至於歲時稱慶子孫在庭顧視悲摧心情斷絶胡顔履戴負愧神明齊朝霈然之恩既已霑洽愛敬之至施及傍人草木有心禽魚感澤况在人倫而不銘戴有國有家信義為本伏度來期已應有日一得奉見慈顔永畢生願生死骨肉豈過今恩負山戴嶽未足勝荷二國分隔理無書信主上以彼朝不絶母子之恩亦賜許奉答不期今日得通家問伏紙嗚咽言不宣心蒙寄薩保别時所留錦袍表年嵗雖久宛然猶識抱此悲泣至於拜見事歸忍死知復何心齊朝不即發遣更令重與護書要護重報護復書往返至於再三而母竟不至朝議以其失信令有司移齊移未送而母至舉朝慶悅大赦天下護與母暌隔多年一朝團聚凡所資奉窮極華盛每四時伏臘武帝率諸親戚行家人之禮稱觴上夀榮貴之極振古未聞也是年突厥復率衆赴期護以齊氏初送國親未欲即事征討復慮失信蕃夷更生邉患不得已遂請東征九月詔徴二十四軍及左右廂散𨽻秦隴巴蜀之兵諸蕃國之衆二十萬人十月帝於廟庭授護斧鉞出軍護至潼關乃遣柱國尉遲迥統精兵十萬為前鋒大將軍權景宣率山南兵出豫州少師楊檦出軹關護連營漸進屯軍𢎞農迥圍洛陽柱國齊國公憲鄭國公達奚武等營邙山護性無戎略此行又非本心故師出雖久無功而還護與諸將稽首請罪帝不之責天和二年護母薨尋詔起令視事五年詔賜護軒懸之樂六佾之舞護性甚寬和然暗於大體自恃建立之功久當權軸凡所委任皆非其人兼諸子貪殘僚屬縱溢恃護威勢莫不蠧政害民上下相蒙曽無疑慮帝以其暴慢密與衛王直圖之七年三月十八日護自同州還帝御文安殿見護訖引入含仁殿朝皇太后先是帝以禁中見護常行家人禮護謁太后太后必賜之坐帝每立侍至是護將入帝謂曰太后春秋至尊頗好酒喜怒有時乖爽比諫未蒙垂納兄今願更啓請因出懷中酒誥授護曰以此諫太后護入如帝所誡跪讀未訖帝以玉珽自後擊之踣地又令宦者何泉以御刀斫之泉懼斫不能傷時衛王直先匿於户內乃出斬之初帝欲圖護王軌宇文神舉宇文孝伯頗預其謀是日軌等並在外更無知者殺護訖乃召宫伯長孫覽等即令收護子柱國談國公會大將軍莒國公至崇業公靜正平公乾嘉及乾基乾光乾符乾祖乾威等并柱國侯伏龍恩龍恩弟大將軍萬夀大將軍劉勇中外府司録尹公正袁傑膳部下大夫李安等於殿中殺之齊王憲曰安出自早𨽻所典庖厨而已未足加戮帝曰汝不知耳世宗之崩安所為也十九日乃詔暴護等罪大赦改天和七年為建德元年護世子訓為蒲州刺史其夜遣柱國越公盛乘傳鎮蒲州徴訓赴京師至同州賜死護長史叱羅協司録馮遷及所親任者皆除名護子昌城公澡使突厥遣開府宇文德齎詔書就殺之三年詔復護及諸子先封諡護曰蕩並改葬之叱羅協代郡人本名與武帝諱同後改焉少寒微嘗為州小吏以恭謹見知竇泰為御史中尉以協為書侍御史泰向潼關協為監軍泰死協見獲文帝授大丞相東閣祭酒纍遷相府屬從事中郎協歷仕二京詳練故事又深自剋厲文帝頗委任之然猶以家屬在東疑其戀本及河橋戰敗協隨軍還文帝知協不二封冠軍縣男進爵為侯後為大將軍尉遲迥長史率兵伐蜀行潼州事魏恭帝三年文帝徴協入朝論蜀中事乃賜姓宇文氏晉公護既殺孫恆李植等欲委腹心於司會栁慶司憲令狐整等二人並辭俱薦協護遂徴協入朝引與同宿深寄託之協誓以軀命自效護大悅以為得協之晚稍遷護府長史進爵為公常在護側明帝知其材識庸淺每按抑之數謂曰汝何知也猶以護所親任每含容之及明帝崩便授協司會中大夫中外府長史協形貌瘦小舉措褊急既以得志每自矜髙及其所言多乖事𠂻當時莫不笑之護以其忠已每提奬之協既受護重委冀得婚連帝室乃求復舊姓叱羅氏許之又進位柱國護以協年老許其致仕而協貪榮未肯告退及護誅除名建德三年以協宿齒授儀同三司賜爵南陽郡公卒子金剛嗣馮遷字羽伐𢎞農人少修謹有幹能為護府司録性質直小心畏慎兼明練時事善於斷決每校閲文簿孜孜不倦以此甚為護委任後授陜州刺史遷本寒微不為時輩所重一旦刺舉本州以謙恭接待鄉邑人無怨者復入為司𨽻纍遷小司空自天和後以年老委任稍衰及護誅猶除名卒於家子恕位儀同三司杞簡公連幼而謹厚臨敵果毅隨德皇帝遇定州官軍於唐河北俱戰沒保定初追贈太傅柱國大將軍大司徒封杞國公諡曰簡子元寶為齊神武所害保定初追贈大將軍小司徒襲封杞國公諡曰烈以章武公導子亮嗣亮字乾德位梁州總管及豳國公廣薨以亮為秦州總管廣所部悉以配焉在州甚無政績尋進柱國從東伐進上柱國仍從平鄴遷大司徒大象初以行軍總管與元帥鄖國公韋孝寬等伐陳還至豫州密謀襲孝寬營將圖反逆孝寬有備亮不得入遂遁走孝寬追斬之子胲明坐亮誅詔以亮弟椿為烈公後椿字乾夀位上柱國大司徒大定中為隋文帝所害并其五子莒莊公洛生少任俠好施愛士北州賢俊皆與之遊而才能皆出其下及葛營殺鮮于修禮以洛生為漁陽王仍領德皇帝餘衆時人皆呼為洛生王洛生善撫將士是以克獲常冠諸軍爾朱榮定山東時洛生在虜中榮雅聞其名心憚焉尋為榮所害保定初追贈大將軍封莒國公諡曰莊子菩薩為齊神武所害保定初追贈大將軍小宗伯襲爵諡曰穆以晉公護子至嗣至字乾附後坐父護誅詔以衛王直子賔為穆公後賔字乾瑞尋坐直誅以齊王憲子廣都公貢襲貢字乾貞宣帝初被誅國除虞國公仲德皇帝從父兄也卒于代保定初追贈太傅柱國大將軍大司徒封虞國公子興嗣興生屬兵亂與仲相失年幼莫知其戚屬逺近與文帝兄弟初不相識沙苑之敗預在行間被虜隨例散配諸軍興性𢎞厚有志度雖流離世故而風範可觀保定二年詔訪仲子孫興始附屬籍武帝以興帝戚近屬尊禮之甚厚位開府儀同三司宗師襲爵虞國公薨贈柱國大將軍諡曰靖子洛嗣位儀同三司隋初為介國公為隋室賔云廣川公測字澄鏡文帝之族子也髙祖中山曽祖豆頽祖麒麟父永仕魏位並顯達測性沉密少篤學每旬月不窺戶牖起家奉朝請歷司徒右長史尚魏宣武女陽平公主拜駙馬都尉及魏孝武疑齊神武有異圖詔測詣文帝令密為之備文帝見之甚歡還封廣川縣伯尋從魏孝武西遷進爵為公文帝為丞相以測為右長史軍國政事多委任之又令測詳定宗室昭穆逺近附於屬籍大統中除驃騎大將軍侍中開府儀同三司行汾州事測政存簡惠頗得民和地接東魏數相抄竊或有獲其為寇者多縛送之測皆命解縛置之賔館然後引與相見如客禮焉仍設酒肴宴勞放還其國并給糧餼衛送出境自是東魏人大慙乃不為寇汾晉之間各安其業兩界之民遂通慶弔即不復為仇讐矣時論稱之方於羊叔子或告測與外境交通懷二心者文帝怒曰測為我安邉吾知其無二志何為間我骨肉生此貝錦乃命斬之仍許測以便宜從事八年轉行綏州事先是每歲河冰合郡將則徙民入城堡以避突厥寇掠測至令安堵如故乃於要路數百處積柴仍逺斥候知其動靜是年十二月突厥從連谷入寇去界數十里測命積柴之處一時縱火突厥謂大軍至懼而逃走自相蹂踐委棄雜畜輜重不可勝數測徐率所部收入自是突厥不敢復至因請置戍兵以備之十年徴拜太子少保卒文帝親臨慟焉諡曰靖測性仁恕好施與衣食之外家無積蓄在洛陽日嘗被竊盜其妻陽平公主衣服皆在失中州縣禽盜并物測恐此盜竊公主衣服當死云此贓非是賊遂遇赦得免其人既感恩請為測左右及測從孝武西遷事極狼狽盜人從測竟無異志子該嗣位徐州刺史測弟深字奴干性鯁正有器局年數嵗戲纍石為營伍折草作旌旗布置行列皆有軍陳之勢父永遇見之大喜曰汝自然知此於後必為名將永安初起家祕書郎領宿衛軍及齊神武舉兵入洛陽魏孝武西遷既事起倉卒人多逃散深撫循所部並得入關以功賜爵長樂縣伯文帝以深有謀略欲引置左右圖議政事大統元年乃啓為丞相府王簿纍轉尚書直事郎中及齊神武屯蒲坂分遣其將竇泰趣潼關髙敖曹圍洛州文帝將襲泰諸將咸難之文帝乃隱其事陽若未有謀者而獨問策於深深曰竇泰歡之驍將也頑凶而勇戰亟勝而輕敵歡每仗之以為禦侮今者大軍若就蒲坂則髙歡拒守竇氏必援之內外受敵取敗之道也不如選輕鋭之卒潛出小關竇性急必來決戰髙歡持重未即救之則竇可禽也既虜竇歡勢自沮回師禦之可以制勝文帝喜曰是吾心也軍遂行果獲泰而齊神武亦退深又説文帝進取𢎞農復剋之文帝大悅謂深曰君即吾家之陳平也是冬齊神武又率大衆度河涉洛至沙苑諸將皆有懼色唯深獨賀文帝詰曰賊來充斥何賀之有對曰髙歡之撫河北甚得衆心雖乏智謀人皆用命以此自守未易可圖今懸兵渡河非衆所欲唯歡耻失竇氏愎諫而來所謂忿兵一戰可禽也此事昭然不賀何為請假深一節發王羆之兵邀其走路使無遺類矣文帝然之尋而大破齊軍果如所策俄進爵為侯六官建拜小吏部下大夫遷中大夫武成元年遷豳州刺史改封安化縣公保定初除京兆尹入為司會中大夫深少喪父事兄甚謹性多竒譎好讀兵書既居近侍每得進籌策及在選曹頗獲時譽性仁愛情隆宗黨從弟神舉神慶幼孤深撫訓之義均同氣世尤以此稱焉卒于位諡曰成康子孝伯字胡玉其生與武帝同日文帝甚愛之飬於第內及長又與武帝同學武成九年拜宗師上士時年十六性沈正謇諤好直言武帝即位欲引置左右時政在家臣不得專制乃託言少與同業受經思相啓發由是護弗之猜得入為右侍上士恆侍讀及遭父憂詔令服中襲爵武帝嘗謂曰公於我猶漢髙與盧綰也賜以十三鐶金帶自是恆侍左右出入卧內朝務皆得預焉孝伯亦竭心盡力無所回避至於時政得失外間細事皆以奏聞帝信委之當時莫比及帝將誅晉公護密與衛王直圖之他無知者唯孝伯及王軌宇文神舉頗得參預護誅授開府儀同三司歷司會中大夫左宫正皇太子既無令德孝伯言於帝曰皇太子德聲未聞請妙選正人為其師友調護聖質不然悔無所及帝斂容曰卿世載鯁直竭誠所事觀卿所言有家風矣孝伯拜謝曰非言之難受之難也深願陛下思之帝曰正人豈復過君於是以尉遲運為右宫正孝伯仍為左宫正宗師中大夫纍遷右宫伯嘗因侍坐帝問吾兒比進善不對曰皇太子比懼天威殊無罪失及王軌因內宴捋帝鬚言太子之不善帝罷酒責孝伯曰公常謂我云太子無過今聞軌言公為誑矣孝伯拜曰臣聞父子之際人所難言臣知陛下不能割情忍愛遂爾結舌帝知其意默然久之乃曰朕已委公公其勉之及大軍東討拜內史下大夫令掌留臺事軍還帝曰居守之重無忝戰功於是加授大將軍進爵廣陵郡公并賜女妓金帛等復為宗師每車駕巡幸常執其手令居守後事帝北討至雲陽宫寢疾驛召孝伯赴行在所執其手曰吾自量必無濟理以後事付君是夜授司衛上大夫總宿衛兵馬令馳驛入京鎮守宣帝即位授小冢宰帝忌齊王憲意欲除之謂孝伯曰公能圖之當以其官位相授孝伯叩頭曰齊王戚近勳髙棟梁所寄臣若順旨則臣為不忠陛下為不孝之子也帝因迹之乃與于智鄭譯等圖其事令智告憲謀逆遣孝伯召入誅之帝之為太子西征也在軍有過行鄭譯時亦預焉軍還孝伯及王軌盡以白武帝武帝怒撻帝數十乃除譯名至是帝追憾被杖乃問譯我腳上杖痕誰所為也譯曰事由宇文孝伯王軌譯又説軌捋帝鬚事帝乃誅軌尉遲運懼私謂孝伯曰吾徒必不免禍奈何孝伯曰今堂上有老母地下有武帝為臣為子知欲何之且委質事人本徇名義諫而不入將焉逃死足下若為身計宜自逺之於是各行其志運尋出為秦州總管帝荒淫日甚誅戮無度孝伯頻諫不從由是益迹後稽胡反令孝伯為行軍總管從越王盛討平之及軍還帝將殺之乃託以齊王事誚之曰公知齊王謀反何以不言對曰臣知齊王忠於社稷為羣小媒蘖加之以罪臣以言必不用所以不言且先帝屬微臣輔陛下今諫而不從實負顧託以此為罪是所甘心帝慙俯首不語令賜死於家時年三十六及隋文帝踐極以孝伯王軌忠而獲罪並令收葬復其官爵嘗謂髙熲曰宇文孝伯實有周良臣此人若在我輩無措手處子歆嗣東平公神舉文帝之族子也髙祖普陵曽祖求男仕魏位並顯達祖金殿魏兗州刺史安喜縣侯父顯和少而襲爵性矜嚴頗涉經史膂力絶人彎弓數百斤能左右馳射孝武之在蕃顯和早蒙眷遇時屬多難嘗問計於顯和顯和具陳宜杜門晦迹相時而動帝深納焉及即位拜閣內都督封城陽縣公以恩舊遇之甚厚顯和所居隘陋乃撒殿省賜為寢室其見重如此及齊神武專政帝每不自安問顯和曰天下洶洶將如之何對曰莫若擇善而從因誦詩云彼美人兮西方之人兮帝曰是吾心也遂定入關策以其母老令預為計對曰今日之事忠孝不並然臣不密則失身安敢預為私計帝愴然改容曰卿我之王陵也遷朱衣直閣閣內大都督改封長廣縣公從孝武入關周文見而善之進位車騎大將軍儀同三司散騎常侍卒建德三年追贈驃騎大將軍開府儀同三司神舉早孤有夙成之量及長神情倜儻志略英贍眉目迹朗儀貌魁梧明帝初起家中侍上士帝留意翰林而神舉雅好篇什每遊幸神舉恆從襲爵長廣縣公天和元年纍遷右宫伯中大夫進爵清河郡公建德三年自京兆尹出為熊州刺史齊人憚其威名及帝東伐從平并州即授刺史州既齊氏别都多有姦猾神舉示以威恩逺近恱服改封武德郡公進柱國大將軍又改封東平郡公宣政元年轉司武上大夫及豳州人盧昌期等據范陽反詔神舉討禽之時齊黃門侍郎盧思道亦在反中賊平將解衣伏法神舉乃釋而禮之即令草露布屬稽胡反寇西河復詔神舉與越王盛討之時突厥赴救神舉以竒兵擊之突厥敗走稽胡欵服即授并州總管神舉見待於武帝處心腹之任王軌宇文孝伯等屢言皇太子之短神舉亦預焉及宣帝即位神舉懼及禍懷不自安初神舉定范陽之後威聲甚振帝亦忌其名望兼以宿憾遂使人齎鴆賜之薨於馬邑時年四十八神舉美風儀善辭令博涉經史性愛篇章尤工騎射臨戎對寇勇而有謀蒞職當官每著聲績兼好施愛士以雄豪自居故得任兼文武聲彰外內百僚無不仰其風則先輩宿齒至于今稱之子同嗣位至儀同大將軍神舉弟慶字神慶沈深有器局少以聰敏見知初受業東觀頗涉經史既而謂人曰書足記姓名而已安能久事筆硯為腐儒事業乎時文州賊亂慶應募從征以功授都督衛王直鎮山南引為左右慶善射有膽氣好格猛獸直甚壯之稍遷車騎大將軍儀同三司及誅宇文護慶有謀焉進授驃騎大將軍加開府從武帝攻河隂先登攀堞與賊短兵相接中石乃墮絶而復蘇帝勞之曰卿勇可以賈人也復從武帝拔晉州齊兵大至慶與齊王憲輕騎覘之卒與賊窘憲挺身而遁慶退據汾橋衆賊爭進慶射之所中人馬必斃賊乃稍却及拔髙璧剋并州下信都禽髙湝功並居最進位大將軍封汝南郡公尋以行軍總管擊延安反胡平之歷延寧二州總管隋文帝為丞相以行軍總管征江表次白帝以勞進上大將軍帝與慶有舊甚見親待令督丞相軍事悉以心腹尋加柱國開皇初拜左武衛將軍進上柱國數年除涼州總管嵗餘徴還不任以職文帝每加優禮卒於家子靜亂尚隋文帝女廣平公主位儀同安德縣公熊州刺史先慶卒靜亂子協位右翊衛將軍宇文化及之亂遇害協弟皛字婆羅門大業中飬于宫內後為千牛左右煬帝甚親昵之每有遊宴必侍從至於出入卧內伺察六宫往來不限門禁時人號為宇文三郎與宫人淫亂至於妃嬪公主亦有醜聲蕭后言於帝皛聞懼不敢見協因奏皛壯不可久在宫掖帝不之罪召入待之如初化及弒逆之際為亂兵所害文帝十王文帝十三男姚夫人生明帝後宫生宋獻公震文元皇后生孝閔皇帝文宣后叱奴氏生武帝衛刺王直達步于妃生齊煬王憲王姬生趙僭王招後宫生譙孝王儉陳惑王純越野王盛代奰王達冀康王通滕聞王逌宋獻公震字彌俄突幼而敏達大統十六年封武邑公尚魏文帝女其年薨保定元年追贈大司馬封宋國公無子以明帝第三子實嗣建德三年進爵為王大象中為大前疑尋為隋文帝所害國除衛刺王直字豆羅突魏恭帝三年封秦郡公武成初進封衛國公歷雍州牧大司空襄州總管直武帝母弟也性浮詭以晉公護執政遂二於帝而昵護及南討軍敗愠於免黜又請帝除護帝宿有誅護意遂與直謀之及護誅帝以齊王憲為大冢宰直既乖本望又請為大司馬欲擅威權帝知其意謂曰汝兄弟長幼有序何反居下列也以為大司徒建德三年進爵為王初帝以直第為東宫更使直自擇所居直歷觀府署無稱意者至廢陟屺佛寺遂欲居之齊王憲謂曰兄兒女成長此寺褊小詎是所宜直曰一身尚不自容何論兒女憲怪而疑之直常從帝校獵而亂行帝怒對衆撻之自是憤怨滋甚及帝幸雲陽宫直在京師反攻肅章門司武尉遲運閉門不得入退走追至荆州獲之免為庶人囚諸宫中尋復有異志及其子十人並誅之國除齊煬王憲字毗賀突文帝第五子也性通敏有度量雖在童齓而神彩嶷然初封涪城縣公少與武帝俱授詩傳咸綜機要得其指歸文帝嘗賜諸子良馬惟其所擇憲獨取駮者帝問之對曰此馬色類既殊或是駿逸若從軍征伐牧圉易分帝喜曰此兒識智不凡當成重器後從獵上隴經官馬牧帝每見駿馬駮者輒曰此我兒馬也令左右取以賜之魏恭帝元年進封安成郡公孝閔帝踐阼拜驃騎大將軍武成初除益州總管梁益等二十四州諸軍事益州刺史進封齊國公邑萬尸初平蜀之後文帝以其形勝之地不欲使宿將居之諸子之中欲有推擇遍問武帝以下誰欲此行並未及對而憲先請文帝曰刺史當撫衆理民非爾所及以年授者當歸爾兄憲曰才用有殊不關大小試而無效甘受靣欺文帝大悅以憲年尚幼未之遣也明帝追遵先旨故有此授憲時年十六善於綏撫留心政術辭訟輻湊聽受不疲蜀人悅之共立碑頌德保定中徴拜雍州牧及晉公護東伐以尉遲迥為前鋒圍洛陽齊兵數萬奄出軍後諸軍恇駭並各退散唯憲與王雄達奚武拒之而雄為齊人所敗三軍震懼憲自督勵衆心乃安時晉公護執政雅相親委賞罰之際皆得預焉天和三年以憲為大司馬行小冢宰雍州牧如故四年齊將獨孤永業來寇詔憲與柱國李穆出宜陽築崇德等五城絶其糧道齊將斛律明月築壘洛南五年憲涉洛邀擊之明月遁走是歲齊斛律明月又率大衆於汾北築城西至龍門晉公護問計於憲憲曰如憲所見兄宜暫出同州以為威勢憲請以精兵居前隨機攻取非惟邉境清寧亦當有所尅獲護然之六年遣憲率衆二萬出自龍門齊將新蔡王康德潛軍宵遁憲乃渡河攻其伏龍等四城二日盡拔又進攻張壁克之獲其軍實夷其城壘斛律明月時在華容弗能救乃北攻姚襄城陷之時汾州見圍日久憲遣柱國宇文盛運粟饋之憲自入兩乳谷襲尅齊伯杜城使柱國談公會築石殿城以為汾州之援齊平原王段孝先蘭陵王長恭引兵大至大將軍韓歡為齊人所乘遂退憲身自督戰齊衆稍却會日暮乃各收軍及晉公護誅武帝召憲入憲免冠拜謝帝謂之曰冢宰無君陵上吾所以誅之以安社稷汝親則同氣休戚共之事不相涉何煩致謝乃詔憲往護第收兵符及諸簿籍等尋以為大冢宰時帝既誅宰臣親覽朝政方欲齊之以刑爰及親親亦為刻薄憲以為護所任自天和之後威勢漸隆護欲有所陳多令憲聞奏其間或有可否憲慮生嫌隙每曲而暢之帝亦悉其此心故得無患然猶以威名過重終不能平雖遷授冢宰實奪其權也開府裴文舉憲之侍讀帝嘗御內殿引見之謂曰晉公不臣之迹朝野所知昔魏末不綱太祖匡輔元氏有周受命晉公復執威權積習生常便謂法應須爾豈有三十歲天子而可為人所制乎且近代以來又有一弊暫經𨽻屬便即禮若君臣此乃亂世之權宜非經國之治術詩云夙夜非懈以事一人者本據天子爾雖陪侍齊公不得即同臣主且大祖十兒寧可悉為天子卿宜規以正道勸以義方輯睦我君臣協我骨肉無令兄弟自致嫌疑文舉拜謝而出歸以白憲憲指心撫几曰吾之宿心公寧不悉但當盡心竭節知復何言建德三年進爵為王憲友劉休徴獻王針一首憲美之休徴後又以針上之帝方剪削諸弟甚悅其文憲嘗以兵書繁廣難求指要乃自刋定為要略五篇至是表陳之帝覽而稱善其秋帝幸雲陽宫寢疾衛王直於京師舉兵帝召憲謂曰衛王為逆汝知之乎憲對曰臣初不知今始奉詔直若違天犯順此則自取滅亡帝曰汝便為前軍吾亦續發直尋敗走帝至京師憲與趙王招俱入拜謝帝曰管蔡為戮周公作輔人心不同有如其靣但愧兄弟親尋干戈於我為不能耳初直內深忌憲憲隱而容之且以帝之母弟每加友愛晉公護之誅也直固請及憲帝曰齊公心迹吾自悉之不得更有所疑也及文宣皇后崩直又啓憲飲酒食肉與平昔不異帝曰吾與齊王異生俱非正嫡特為吾意今祖括是同汝當愧之何論得失汝親太后之子但須自朂直乃止四年帝將東討獨與內史王誼謀之餘人莫得知也後以諸弟才略無出憲右遂告之憲即贊成其事及大軍將出憲表上私財以助軍費曰昔邉防未靜卜式願上私財江湖不澄衛兹請獻私粟臣雖不敏敢志景行詔不納而以憲表示公卿曰人臣當如此朕貴其心耳寧資此物乎乃詔憲為前軍趣黎陽帝親圍河隂未尅憲攻拔武濟進圍洛口拔其東西二城以帝疾班師是嵗初置上柱國官以憲為之五年大舉東討憲率精騎五萬復為前鋒守雀鼠谷帝親圍晉州憲進剋洪洞永安二城更圖進取齊主聞晉州見圍乃將兵十萬自來援之時柱國陳主純頓軍千里徑大將軍永昌公椿屯雞棲原大將軍宇文盛守汾水關並受憲節度憲密謂椿曰兵者詭道去留不定見機而作不得遵常汝今為營不須張幕可伐柏為菴示有處所令兵夜去之後賊尤致疑也時齊主分軍萬人向千里徑又令其衆出汾水關自率大兵與椿對宇文盛馳告急憲自救之齊人遽退盛與柱國侯莫陳芮逐之多有斬獲俄而椿告齊衆稍逼憲又救之會椿被敕追還率兵夜反齊人果謂柏菴為帳幕不疑軍退翌日始悟時帝已去晉州留憲為後拒齊主自率衆來追至於髙梁橋憲以精騎二千阻水為陳齊領軍假暢直進至橋憲隔水招暢與語語畢問曰若何姓名暢曰領軍假暢也公復為誰憲曰我虞候大都督耳暢曰觀公言語不是凡人今日相見何用隱其名位憲乃曰我天子大弟齊王也遍指陳王純已下並以告之暢鞭馬而去憲即命旋軍而齊人遽追之戈甲甚鋭憲與開府宇文欣各統精鋭百騎為殿以拒之斬其驍將賀蘭豹子山褥瓌等百餘人齊衆乃退憲度汾而會帝於玉璧帝又令憲率兵六萬還援晉州齊主攻圍晉州尋而帝東轅次于髙顯憲率所部先向晉州明日諸軍總集稍逼城下齊人亦大出兵陳於城南帝詔憲馳往觀之憲反命曰易與耳請破之而後食帝悅曰汝之所言吾無憂矣既而諸軍俱進應時大潰其夜齊主遁走齊人復據髙壁及洛女帝命憲攻洛女破之齊王遂走鄴留其從兄安德王延宗據并州延宗因僭偽號帝圍其城憲攻其西靣剋之禽延宗以功封第二子安成公質為河間王拜第三子賨為大將軍仍詔憲先驅趣鄴進尅鄴城憲善兵權多籌略長於撫御摧鋒陷陳為士卒先齊人聞風憚其勇略齊任城王湝廣寧王孝珩等據信都有衆數萬帝復詔憲討之仍令齊主手書招湝湝不納憲軍過趙州湝令間諜二人覘候騎執以白憲憲乃集齊舊將遍將示之曰吾所爭者大不在汝等即放還令充使乃與湝書憲至信都湝陳於城南憲登張耳冡以望之俄而湝所署領軍尉相願偽出略陳遂以衆降湝殺其妻子相願湝心腹也衆甚駭遂破之禽湝及孝珩等先是稽胡劉沒鐸自稱皇帝又詔憲督趙王招等平之憲自以威名日重潛思屏退及帝欲親征北蕃乃辭以疾帝變色曰汝若憚行誰為吾任使者憲懼曰臣陪奉鑾輿誠為本願但身嬰疾疢不堪領兵帝許之尋而武帝崩宣帝嗣位以憲屬尊望重深相忌憚時武帝未葬諸王在內居服司衛長孫覽總兵輔政恐諸王有異志奏令開府于智察其動靜及山陵還諸王歸第帝又命智就宅候憲因是告憲有異謀帝乃遣小冢宰宇文孝伯謂憲曰三公之位宜屬親賢今欲以叔為太師何如憲對曰臣材輕位重滿盈是懼三師之任非所敢當孝伯反命尋而復來曰詔王晚共諸王俱入既至殿門憲獨被引進帝先伏壯士於别室至即執之憲辭色不撓固自陳説帝使于智對憲憲目光如炬與智相質或謂憲曰以王今日事勢何用多言憲曰我位重屬尊一旦至此死生有命寧復圖存但以老母在堂恐留慈恨耳因擲笏於地乃縊之時年三十五帝以于智為柱國封齊國公又殺上大將軍安邑公王興上開府獨孤熊開府豆盧紹等皆以昵於憲也帝既誅憲無以為辭故託興等與憲結謀遂加戮焉時人知其寃酷咸云伴憲死也憲所生達步于氏蠕蠕人也建德三年上册為齊國太妃憲有至性事母以孝聞太妃舊患風熱屢經發動憲衣不解帶扶侍左右憲或東西從役每心驚母必有疾乃馳使參問果如所慮憲六子貴質賨貢乾禧乾洽貴字乾福少聰敏尤便騎射始讀孝經便謂人曰讀此一經足為立身之本十嵗封安定郡公文帝始封此郡未嘗假人至是封焉年十一從憲獵於鹽州一圍中手射野馬及鹿一十有五建德二年拜齊國世子後出為豳州總管貴雖出自深宫而留心庶政性聰敏過目輒記嘗道逢二人謂其左右曰此人是縣黨何因輒行左右不識貴便述其姓名莫不嗟伏白虎烽經為商人所燒烽帥受貨不言其罪他日此帥隨例來參貴乃問云啇人燒烽何因私放烽帥愕然遂即首伏其明察如此卒時年十七武帝甚痛惜之質字乾祐以憲勳封河間郡王賨字乾禮中壩公貢出後莒莊公乾禧安成公乾洽龍涸公並與憲俱被誅趙僭王招字豆盧突幼聰頴博涉羣書好屬文學庾信體詞多輕豔魏恭帝三年封正平郡公武成初進封趙國公歷益州總管大司空大司馬進爵為王除雍州牧建德五年從武帝定東夏以功進位上柱國又與齊王憲討平稽胡斬賊帥劉沒鐸宣政中拜太師大象元年詔以洛州襄國郡邑萬户為趙王國招出就國二年宣帝不豫徴招及陳越代滕五王赴闕比招等至而帝已崩隋文帝輔政加招等殊禮入朝不趨劔履上殿隋文將遷周鼎招密欲圖之以匡社稷乃要隋文帝至第飲於寢室招子員貫及妃弟魯封所親人史胄皆先在室左右佩刀而立又藏兵刃於帷席之間後院亦伏壯士隋文帝從者多在閣外唯楊𢎞元胄胄弟威及陶徹坐於戶側招屢以佩刀割瓜啖隋文隋文未之疑元胄覺變扣刀而入招乃以大觴親飲胄酒又命胄向厨取漿胄不為之動滕王逌後至隋文降階迎胄因得耳語曰形勢大異公宜速出隋文共逌等就坐須臾辭出後事覺陷以謀反其年誅招及其子德廣公員永康王貫越公乾銑弟乾鏗等國除招所著文集十卷行於世譙孝王儉字侯幼突武成初封譙國公建德三年進爵為王從平鄴拜大冢宰薨子乾惲嗣為隋文帝所害國除陳惑王純字堙智突武成初封陳國公保定中使突厥迎皇后歷秦陜二州總管建德三年進爵為王從平齊進位上柱國歷并州總管雍州牧太傅大象元年詔以濟南郡邑萬户為陳國純出就國二年朝京師并其子為隋文帝所害國除越野王盛字立久突武成初封越國公建德三年進爵為王從平齊進位上柱國歷相州總管大冢宰大象元年遷大前疑太保其年詔以豐州武當安昌二郡邑萬户為越國盛出就國二年朝京師并其子為隋文所害國除代奰王達字度斤突性果決善騎射武成初封代國公建德初進位柱國出為荆州刺史在州有政績武帝手敕褒美之所部澧州刺史蔡澤以贓敗達以其世著勳庸欲曲法貸之恐虧公憲密表奏之事竟得釋其處事周慎如此達雅好節儉食無兼膳侍姬不過數四衣皆弊故又未嘗營資産國無儲積左右嘗以為言達從容應之曰君子憂道不憂貧何煩於此三年進爵為王武帝東伐以為右軍總管齊淑妃馮氏尤美齊後主所幸齊平帝以達不邇聲色特以馮氏賜之宣帝即位進上柱國大象元年拜大右弼其年詔以潞州上黨郡邑萬戶為代國達出就國二年朝京師及子俱為隋文帝所害國除冀康公通字屈率突武成初封冀國公薨子絢嗣建德三年進爵為王大定中亦為隋文帝所害國除滕聞王逌字爾固突少好經史解屬文武成初封滕國公建德三年進爵為王宣政元年進位上柱國大象元年詔以荆州新野郡邑萬尸為滕國逌出就國二年朝京師為隋文帝所害并其二子國除逌所著文章頗行於世孝閔一王孝閔帝一男陸夫人生紀厲王康字乾安保定初封紀國公建德三年進爵為王出為利州總管驕侈無軌度隂有異謀司録裴融諫康殺之五年詔賜康死子湜嗣大定中為隋文帝所害國除明帝三王明帝三男徐妃生畢刺王賢後宫生酆王貞宋王實實出後宋獻公震畢刺王賢字乾陽保定四年封畢公建德三年進爵為王歷荆州總管大司空大象初進上柱國雍州牧太師明年宣帝崩賢性強濟有威略慮隋文帝傾覆宗祏言泄并其子被害國除酆王貞字乾雅初封酆國公建德三年進爵為王大象中為大冢宰大定中并其子為隋文帝所害國除武帝六王武帝七男李皇后生宣帝漢王贊庫汗姬生秦王贄曹王允馮姬生道王充薛世婦生蔡王兌鄭姬生荆王元漢王贊字乾依初封漢國公建德三年進爵為王大象末隋文帝輔政欲順物情乃進贊位上柱國拜右大丞相大冢宰外示尊崇實無所綜理轉太師及諸方略定尋與秦王贄曹王允道王充蔡王兌荆王元並害之并其子孫無遺宣帝二王宣帝三男朱皇后生靜帝王姬生萊王衍皇甫姬生郢王術衍及術並大象二年為隋文帝所害國除隋蔡景王整文帝之次弟也文帝四弟唯整及滕穆王瓚與帝同生次道宣王嵩次衛昭王爽並異母整周明帝時以武元帝軍功賜爵陳留郡公位開府車騎大將軍從武帝平齊力戰而死文帝初居武元之憂率諸弟負土為墳人植一柏四根鬱茂西北一根整所栽者獨瘁後因大風雨並根失之整果不得善終文帝為相國贈柱國大司徒八州刺史及受禪追封蔡王諡曰景子智積襲又封其弟智明為髙陽郡公智才開化縣公尋拜智積開府儀同三司授同州刺史儀衛資送甚盛整娶同郡尉遲綱女生智積開皇中有司奏智積將葬尉遲太妃帝因曰是家昔幾殺我我有同生二弟並恃婦家勢見陵我向之笑云爾既嗔我不可與爾角嗔並云阿兄只倚頭額時有醫師邉隱逐勢言我後百日當病癲二弟私喜以告父母父母泣謂我曰爾二弟大劇不能愛兄我言不愛其親而愛他人者謂之悖德一日有天下當改其姓為悖父母許之父母亡後二弟及婦復讒我於晉公我每自外還及門輒不喜如入牢獄常託以患氣鎖閣靜坐唯食至乃暫開當時實不可耐反美世人無兄弟者蓋貧家兄弟多相愛由有無相假藉達官兄弟多相憎由爭形勢故也智積在同州未嘗嬉戲遊獵聽政之暇端坐讀書門無私謁有侍讀公孫尚義山東儒士府佐楊君英蕭德言並有文學時延於座所設唯餅果酒財三酌家有女妓唯年節嘉慶奏於太妃之前其簡靜如此文帝既與景王不睦其太妃尉遲氏又與獨孤后不相諧以是智積常懷危懼每自貶損帝亦以是哀憐之或勸智積治産業者智積曰昔平原露朽財帛苦其多也吾幸無可露何更營乎有五男止教讀論語孝經而已亦不令交通賔客或問其故答曰恐兒子有才能以致禍也開皇二十年徴還京無他職任闔門自守非朝覲不出煬帝即位滕王綸衛王集並以讒構得罪髙陽公智明亦以交通奪爵智積愈懼大業三年授𢎞農太守委政寮佐清靜自居及楊元感作亂自東都引軍而西智積謂官屬曰元感聞大軍將至欲西圖關中若成其計則根本固矣當以計縻之使不得進不出一旬自可禽耳及元感以軍至城下智積登陴詈辱之元感怒甚留攻之城門為賊所燒智積乃更益火賊不得入數日宇文述等援軍至合擊破之尋拜宗正卿十二年從駕江都寢疾帝時迹薄骨肉智積每不自安及遇患不呼醫臨終謂所親曰吾今始知得保首領沒於地矣時人哀之有子道元滕穆王瓚字恆生一名慧仕周世以武元帝軍功封竟陵郡公尚武帝妹順陽公主授儀同保定四年纍遷納言瓚貴公子又尚主美姿儀好書愛士甚有令名於當世時人號曰楊三郎武帝甚親愛之平齊之役諸王咸從留瓚居守帝謂之曰六府事殷一以相委朕將遂事東方無西顧之憂矣宣帝即位遷吏部中大夫加上儀同宣帝崩文帝入禁中將總朝政令子勇召之欲有計議瓚素與文帝不協聞命不從曰作隋國公恐不能保何乃更為族滅事邪文帝作相拜大宗伯典修禮律進位上柱國封邵國公瓚見帝執政羣議不一恐為家禍隂有圖文帝之計文帝每優容之及受禪立為滕王拜雍州牧帝數與同坐呼為阿三後坐事去牧以王就第瓚妃宇文氏先與獨孤皇后不平及此鬱鬱不得志隂有呪詛帝命瓚出之瓚不忍離絶固請帝不得已從之宇文氏竟除屬籍瓚由是忤旨恩禮更薄開皇十一年從幸栗園坐樹下方飲酒鼻忽流血暴薨時年四十四諡曰穆人皆言其遇鴆也子綸嗣綸字斌籕性𢎞厚美姿容頗知鍾律文帝受禪封邵國公明年拜邵州刺史晉王廣納妃於梁詔綸致禮甚為梁人所敬綸以穆王故當文帝世每不自安煬帝即位尤被猜忌綸憂懼呼術者王姿問之姿曰王相祿不凡滕即騰也此字足為善應有沙門惠恩崛多等頗解占候綸每與交通常令此三人為厭勝法有人告綸怨望呪詛帝令黃門侍郎王𢎞窮驗之𢎞希旨奏綸厭蠱惡逆坐當死帝令公卿議之司徒楊素等曰綸懷惡之由積自家世惟皇運之始四海同心在於孔懷彌須協力其先乃離阻大謀棄同即異父悖於前子逆於後為惡有將其罪莫大請依前科帝以皇族不忍除名徙邉大業七年帝征遼東綸欲上表請從軍自效為郡司所遏未幾徙珠崖及天下大亂為賊林仕𢎞所逼擕妻子竄儋耳後歸唐封懷化縣公尋病卒綸弟坦字文籕初封竟陵公坐綸徙長沙坦弟猛字武籕徙衡山猛弟溫字明籕初徙零陵溫好學解屬文既而作零陵賦以自寄其詞哀思帝見而怒之轉徙南海溫弟詵字𢎞籕前亦徙零陵帝以其修謹徴還襲封滕王以奉穆王祀大業末於江都為宇文化及所害道宣王嵩在周以武元帝軍功賜爵興城公早卒文帝受禪追封諡焉以滕穆王瓚子靜襲卒諡曰悼無子以蔡王智積子世澄襲衛昭王爽字師仁小字明達在周以武元帝軍功於襁褓中封同安郡公六嵗而武元崩為獻皇后所飬由是寵愛特異諸弟年十七為內史上大夫文帝執政授蒲州刺史柱國及受禪立為衛王所生李氏為太妃爽位雍州牧右領軍大將軍權領并州總管上柱國涼州總管爽美風儀有器局政甚有聲大軍北伐河間王𢎞豆盧績竇榮定髙熲虞世則等分道而進以爽為元帥俱受爽節度爽親率李充等四將出朔州遇沙鉢略可汗於白道接戰大破之沙鉢略中重創而遁帝大悅賜爽真食梁安縣千户六年復為元帥步騎十五萬出合川突厥遁逃徴為納言帝甚重之未幾爽疾帝遣薛榮宗視之云衆鬼為厲爽令左右驅逐之居數日有鬼物來擊榮宗榮宗走下階而斃其夜爽薨年二十五贈太尉冀州刺史子集嗣集字文會初封遂安王尋襲封衛王煬帝時諸侯恩禮漸薄猜防日甚集憂懼乃呼術者俞普明章醮以祈福助有人告集咒咀憲司希旨鍛成其獄奏集惡逆坐當死詔下其議楊素等議請論如律時滕王綸坐與相連帝不忍加誅除名逺徙邉郡天下亂不知所終河間王𢎞字辟惡文帝從祖弟也祖愛敬早卒父元孫少孤隨母郭氏飬於舅族及武元帝與周文建義關中元孫時在鄴懼為齊人所誅因假外家姓為郭氏元孫死齊為周滅𢎞始入關與文帝相見帝哀之為買田宅𢎞性明悟有文武幹略數從征伐纍遷開府儀同三司文帝為丞相恆置左右委以腹心帝詣周趙王宅將及於難𢎞時立於户外以衛文帝尋加上開府賜爵永康縣公及受禪拜大將軍進爵郡公尋贈其父柱國尚書令河間郡公其年立𢎞為河間王拜右衛大將軍尋進柱國以行軍元帥出靈州道征突厥大破之拜寧州總管上柱國政尚清靜甚有恩惠遷蒲州刺史得以便宜從事時河東多盜賊𢎞奏為盜者百餘人投之邉裔州境帖然號為良吏每晉王廣入朝𢎞輒領揚州總管及王歸藩𢎞復還蒲州在州十餘年風教大洽煬帝嗣位拜太子太保嵗餘薨大業六年追封郇王子慶嗣慶傾曲善候時變帝猜忌骨肉滕王綸等皆被廢放唯慶獲全纍遷滎陽太守頗有政績及李密據洛口倉滎陽諸縣多應密慶勒兵拒守嵗餘城中糧盡兵勢日蹙密遺慶書曰王之先世家住山東本姓郭氏乃非楊族婁敬之於漢髙殊非血允吕布之於董卓良異天親芝焚蕙嘆事不同此江都荒湎流宕忘歸骨肉崩離人神怨憤舉烽火於驪山諸侯莫至浮膠船於漢水還日未期王獨守孤城援絶千里糧糇支計僅有月餘弊卒之多財盈數百有何恃賴欲相抗拒求枯魚於市肆即事非虗因歸雁以運糧竟知何日止恐禍生匕首釁發蕭牆空以七尺之軀懸當千金之購可為酸鼻者也幸能三思自求多福于時江都敗問亦至慶得書遂降於密改姓為郭氏密破歸東都又為楊氏越王侗不之責也及侗稱制拜宗正卿世充既僭偽號降爵郇國公復為郭氏世充以兄女妻之署榮州刺史及世充將敗慶欲將妻同歸長安其妻曰國家以妾奉箕帚於公者欲以申厚意結公心耳今父叔窮逼家國阽危而公不顧婚姻孤負付託自為全身之計非妾所望也妾若至長安公家一婢耳何用妾為願送還東都君之惠也慶不許其妻遂沐浴靚粧仰藥而死慶遂歸唐為宜州刺史郇國公復姓楊氏其嫡母元太妃年老兩目失明世充斬之義城公處綱文帝族父也生長北邉少習騎射在周以軍功拜上儀同文帝受禪贈其父鍾葵柱國尚書令義城縣公以處綱襲焉纍遷右領軍將軍處綱雖無材藝而性質直在官強濟亦為當時所稱拜蒲州刺史吏民悅之卒於秦州總管諡曰恭弟處樂官至洛州刺史漢王諒反朝廷以為二心廢錮不齒離石太守子崇武元帝族弟也父盆生贈荆州刺史子崇少好學涉獵書記有風儀愛賢好士開皇初拜儀同以車騎將軍恆典宿衛後為司門侍郎煬帝嗣位纍遷候衛將軍坐事免未幾復檢校將軍事從帝幸汾陽宫子崇知突厥必為寇屢請早還京師不納尋有雁門之圍及賊退帝怒之曰子崇怯懦妄有陳請驚動我衆心不可居爪牙寄出為離石郡太守有能名自是突厥屢寇邉塞及賊劉六兒復擁衆劫掠郡境子崇表請兵鎮遏帝復大怒令子崇行長城子崇行百餘里四靣路絶不得進而歸嵗餘朔方梁師都馬邑劉武周等各作亂郡中諸胡復反子崇患之言欲朝集遂與腹心數百人自孟門關將還京師遇道路隔絶退歸離石左右聞太原兵起不復入城各叛去子崇悉收叛者父兄斬之後數日義兵至城中應之城陷為讐家所殺文帝四王文帝五男皆文獻皇后所生長曰房陵王勇次煬帝次秦孝王俊次庶人秀次庶人諒房陵王勇小名睍地伐文帝長子也周世以武元帝軍功封博平縣侯及文帝輔政立為世子拜大將軍左司衛封長寧郡公出為雒州總管東京少冢宰總統舊齊之地後徴還京師進上柱國大司馬領內史御正諸禁衛皆屬焉文帝受禪立為皇太子軍國政事及尚書死罪以下皆令勇參決帝以山東人多流冗遣使案驗又欲徙人北實邉塞勇上書諫以為戀土懷舊人之本情波迸流移蓋不獲已有齊之末主暗時昏周平東夏繼以威虐人不堪命致有逃亡非厭家鄉樂為羈旅若假以數歲沐浴皇風逃竄之徒自然歸本雖北夷犯邉令所在嚴固何待遷配以致勞擾上覽而嘉之時晉王廣亦表言不可帝遂止是後時政不便多所損益帝每納之帝從容謂羣臣曰前代皇王溺於嬖幸廢立之所由生朕無姬侍五子同母可謂真兄弟也豈若前代多諸內寵庶孽忿爭為亡國之道邪勇頗好學解屬詞賦性寬仁和厚率意任情無矯飾之行劉臻明克讓姚察陸爽並以文學為勇賔友勇嘗盛飾蜀鎧帝見而不悅恐致奢侈之漸因誡之曰我聞天道無親惟德是與歷觀前代帝王未有奢華而得長久汝當儲后若不上稱天心下合人意何以承宗廟之重居兆民之上吾昔日衣服各留一物時復玩之以自警戒又擬分賜汝兄弟恐汝以今日皇太子之心忘昔日之事故令髙熲賜汝我舊所帶刀子一枚并葅醬一合汝昔作上士時所常食如此若存憶前事應知我心其後經冬至百官朝勇勇張樂受賀帝知之問朝臣曰近聞至節內外百官相率朝東宫是何禮也太常少卿辛亶對曰於東宫是賀不得言朝帝曰改節稱賀正可三數十人逐情各去何因有司一時徴集太子法服設樂待之東宫如此殊乖禮制於是下詔停斷自此恩寵始衰漸生疑阻時帝令選東宫強武入上臺宿衛髙熲奏若盡取強者恐東宫宿衛太劣帝作色曰我有時行動宿衛須得雄毅太子育德東宫何須強武始我商量恆於交番之日分向東宫上下團伍不别豈非好事邪我熟見前代公不須仍踵舊風蓋疑熲男尚勇女遽出此言以防之勇多內寵昭訓雲氏尤嬖幸禮匹於嫡而妃元氏無寵嘗遇心疾二日而薨獻皇后意有他故甚責望勇又自妃薨雲昭訓專擅內政后彌不平頗遣人伺勇罪過晉王廣知之彌自矯飾姬妾但備員數唯共蕭妃居處由是皇后薄勇愈稱晉王德行後晉王來朝車馬侍從皆為儉素交接朝臣禮極卑屈聲名籍甚冠於諸王臨還揚州入辭皇后因進言曰方違顔色臣子之戀實結于心哽噎流涕伏不能興皇后亦曰我又年老今者之别有切常離相對歔欷王曰臣性識愚下常守平生昆弟之意不知何罪失愛東宫恆蓄盛怒欲加屠陷每恐讒譖生於投杼鴆毒遇於杯勺皇后忿然曰睍地伐漸不可耐我為娶元家女望隆基業竟不聞相禮答專寵阿雲使有如許豚犬前新婦本自無病忽爾暴亡當由遣人投藥以致夭逝事已如此我亦不能窮治何因復於汝處發如此意我在尚爾我死後當魚肉汝等每思東宫竟無正嫡至尊千秋萬嵗後遣汝兄弟向阿雲兒前再拜問訊此是幾許大痛苦邪晉王又拜嗚咽不能止后亦悲不自勝晉王於是知皇后意移始構奪宗之計因引張衡定策遣宇文述深交楊約令喻旨於越公素具言皇后此語素瞿然曰但不知皇后果爾否必如所言吾亦何為者數日素入侍宴微稱晉王孝悌恭儉有類至尊用此揣皇后意后果泣曰公言是也我兒大孝順每聞至尊及我遣內使到必迎於境首又其新婦亦大可憐我使婢去常與同寢共食豈如睍地伐共阿雲對坐終日酣宴昵近小人疑阻骨肉我所以益憐阿嬤者常恐睍地伐殺之素既知意因盛言太子不才皇后遂遺素金始有廢立之意勇頗知其謀憂懼計無所出聞新豐人王輔賢能占候召而問之輔賢曰白虹貫東宫門太白襲月皇太子廢黜之象勇愈懼乃以銅鐵五兵造諸厭勝又於後園作庶人村屋宇卑陋寢處其中布衣草褥冀以當之帝知其不安在仁夀宫使楊素觀勇素至東宫偃息未入勇束帶待之故久不進以激怒勇勇銜之形於言色素還言勇怨望恐有他變願深防察帝聞素言甚疑之皇后又遣人伺覘東宫纎介事皆聞奏因加媒蘖構成其罪帝惑於邪議遂迹忌之乃於元武門達至德門量置候人以伺動靜皆隨事奏聞又東宫宫衛之侍官已上名籍悉令屬諸衛府有健兒者咸屏去之晉王又令段達私於東宫幸臣姬威遺以財貨令取太子消息密告楊素於是內外喧謗過失日聞段達脅姬威曰東宫罪過主上皆已知之已奉密詔定當廢立君能告之則大富貴威遂許諾開皇二十年九月壬子車駕至自仁夀宫翌日御大興殿帝謂侍臣曰我新還京師應開懷歡樂不知何意翻悒然愁苦吏部尚書牛𢎞奏曰由臣等不稱職故令至尊憂勞帝既數聞讒譖疑朝臣具委故有斯問冀聞太子之愆而𢎞對大乖本指帝因作色謂東宫官屬曰仁夀宫去此不逺而令我每還京師嚴備如入敵國我為患利不脫衣卧昨夜欲得近厠故在後房恐有警急還移就前殿豈非爾輩欲壞我家國邪於是執左庶子唐令則等數人付所司訊鞫令楊素陳東宫事狀以告近臣素顯言之曰臣前奉敕向京令皇太子檢校劉居士餘黨太子忿然作色肉戰淚下云居士黨已盡遣我何處窮討爾作右僕射受委自求何關我事又云昔舉大事萬一不成我遂先被誅戮今作天子竟乃令我不如羣弟一事已上不得自由因長嘆回旋云我大覺身妨又云諸王皆得奴獨不與我乃向西北奮首喃喃細語帝曰此兒不堪承嗣久矣皇后常勸我廢之我以布素時生復是長子望其漸改隱忍至今勇昔從南兖州來語衛王曰阿娘不與我一好婦女亦是可恨因指皇后侍兒曰皆我物此言幾許異事其婦初亡我深疑使馬嗣明藥殺我嘗責之便懟曰會當殺元孝矩此欲害我而遷怒耳初長寧誕育朕與皇后共抱飬之自懷彼此連遣來索且雲定興女在外私合而生想此由來何必是其體允昔晉太子取屠家女其兒即好屠割今儻非類便亂宗祏又劉金驎常諂呼定興作家翁定興愚人受之不疑我前解金驎者為此故也勇昔在宫引曹妙達共定興女同宴妙達在外云我今得勸妃酒我直以其諸子偏庶畏人不服故逆縱之以收天下望耳我雖德慙堯舜終不以萬姓付不肖子我常畏其加害如防大敵今欲廢之以安天下左衛大將軍元旻諫曰廢立大事天子無二言詔旨若行後悔無及讒言罔極惟陛下察之旻辭直爭強聲色俱厲帝不答是時姬威又表告太子非法帝謂威曰太子事迹宜皆盡言威對曰皇太子由來共臣語唯意在驕奢欲得樊川以至散關總規為苑云昔漢武將起上林苑東方朔諫賜朔黃金百斤幾許可笑我實無金輒賜此等若有諌者正當斬之不過殺百許人自然永息前蘇孝慈解正衛率皇太子奮髯揚肘曰大丈夫當有一日終不忘之決當快意又宫內所須尚書多執法不與便怒曰僕射已下五人會展三人腳使知慢我之禍又於苑內築一小城四時作役不輒營起亭殿朝造夕改每云至尊嗔我多側庶髙緯陳叔寶豈是孽子乎嘗令巫姥卜吉凶語臣云至尊忌在十八年此期促矣帝泫然曰誰非父母生乃至於此我有舊使婦女令看東宫奏云勿令廣平王至皇太子處東宫憎婦亦廣平王教之元贊亦知其陰惡勸我於左藏東加置兩隊初平陳後宫人好者悉配春坊如聞不知厭足於外更有求訪朕近覽齊書見髙歡縱其兒子不勝忿憤安可效尤於是勇及諸子皆被禁錮部分收其黨與楊素舞文鍛鍊以成其獄勇由是遂敗居數日有司承素意奏元旻身備宿衛常曲事於勇情在附託在仁夀宫裴𢎞將勇書於朝堂與旻題封云勿令人見帝曰朕在仁夀宫有纎小事東宫必知速於郵傳訝之甚久豈非此徒邪遣武士執旻及𢎞付法先是勇嘗於仁夀宫起居還道中見枯槐樹根幹蟠錯大且五六圍顧謂左右曰此何所用之或對曰古槐利以取火于時衛士皆佩火燧勇令匠者造數千枚藏庫中欲以分給左右又藥藏局貯艾數斛至是有司搜得火燧及艾大以為怪以問姬威威言太子此意别有所在比令長寧王已下詣仁夀宫還每常急行一宿便至恆飼馬千匹云徑往守捉城門自然餓死素以威言詰勇勇不服曰竊聞公家有馬數萬匹勇忝備位太子有馬千匹乃是反乎素又發泄東宫服玩似加雕飾者悉陳之於庭以示文武羣官為太子罪帝曰前薄王世積家得婦女領巾狀似幡矟朕以為服祅遍示百官欲以為戒今我兒乃自為之使將諸物示勇以詰之皇后與帝迭遣使責問勇勇不服太史令袁充進曰臣觀天文太子當廢久矣上曰元象久見矣羣臣無敢言者於是使人召勇勇見使者驚曰得無殺我邪帝戎服陳兵御武德殿集百官立於東靣諸親立於西靣引勇及諸子列於殿庭命薛道衡宣詔廢勇及其男女為王公主者並為庶人命道衡謂勇曰爾之罪惡人神所棄欲求不廢其可得乎勇再拜而言曰臣合尸之都市為將來監誡幸蒙哀憐得全性命言畢泣下沾襟既而舞蹈而去左右莫不憫默又下詔誅元旻唐令則等七人及所坐者數十人各誅戮有差乃移勇於內史省給五品料食立晉王廣為皇太子仍以勇付之復囚於東宫賜楊素物三千段元胄楊約並千段楊難敵五百段皆鞫勇之功賞也時文林郎楊孝政上書諫曰皇太子為小人所誤宜加訓誨不應廢黜上怒撻其胸尋而貝州長史裴肅表稱庶人罪黜已久當克已自新請封一小國帝知勇之黜也不允天下之情乃徴肅入朝具陳廢立之意時勇自以廢非其罪頻請見上靣申寃屈而太子遏之不得奏聞勇於是升樹大呌聲聞於上冀得引見楊素因秦言勇情志昏亂為鬼物所慿不可復收上以為然卒不得見素誣陷經營以成其罪皆如此帝寢疾於仁夀宫召皇太子入侍醫藥而皇太子姦亂宫闈事聞於帝帝抵牀曰枉廢我兒因遣追勇呼兵部尚書栁述黃門侍郎元巖為敕未及發而帝暴崩太子祕不發喪遽收栁述元巖繫大理獄偽為髙祖敕賜庶人死追封房陵王不為立後勇有十男雲昭訓生長寧王儼平原王裕安城王筠髙良娣生安平王嶷襄城王恪王良媛生髙陽王該建安王韶成姬生潁川王煚後宫生孝實孝範初儼之誕也帝聞之曰此乃皇太孫何乃生不得地雲定興奏曰天生龍種所以因雲而出時人以為敏對六嵗封長寧郡王勇敗亦坐廢儼上表求宿衛辭情哀切帝覽之惻然楊素進曰伏願聖心同於螫手不宜留意煬帝踐阼儼嘗從行遇鴆卒諸弟分徙嶺外皆敕所在殺之秦王俊字阿祗開皇元年立為秦王二年拜上柱國河南道行臺尚書令洛州刺史時年十二加右衛大將軍領關東兵三年遷秦州總管隴右諸州盡𨽻焉俊仁恕慈愛崇敬佛道嘗請為沙門不許六年遷山南道行臺尚書令伐陳之役為山南道行軍元帥督三十總管水陸十餘萬屯漢口為上流節度尋授揚州總管四十四州諸軍事鎮廣陵轉并州總管二十四州諸軍事俊初頗有令聞文帝聞而大悅後漸奢侈違犯制度出錢求息帝遣按其事相與連坐者百餘人於是盛修宫室窮極侈麗俊有巧思每親運斤斧為工巧之器飾以珠玉為妃作七寶羃籬重不可載以馬負之而行徴役無已置渾天儀測景表又為水殿香塗粉壁玉砌金階梁柱楣棟之間周以明鏡間以寶珠極瑩飾之美每與賔客伎女絃歌於其上俊頗好內妃崔氏性妬甚不平之遂於瓜中進毒俊由是遇疾徴還京師帝以俊奢縱免官以王就第左武衛劉升諌曰秦王非有他過但費官物營廨舍而已臣謂可容帝曰法不可違升固諫帝忿然作色升乃止楊素復進諫以秦王過不應至此帝曰我是五兒之父非是兆人之父邪若如公意何不别制天子兒律以周公為人尚誅管蔡我誠不及周公逺矣安可廢法卒不許俊疾篤含銀銀色變以為遇蠱未能起遣使奉表陳謝帝責以失德大都督皇甫統上表請復王官不許嵗餘以疾篤復拜上柱國二十年六月薨於邸帝哭之數聲而止曰晉王前送一鹿我令作脯擬賜秦王今亡可置靈坐之前心已許之不可虧信帝及后往視見大蜘蛛及大蛷螋從枕中出求之不見窮之知妃所為也俊所為侈麗物悉命焚之敕送終之具務從儉約以為後世法王府僚佐請立碑帝曰欲求名一卷史書足矣何用碑為若子孫不能保家徒與人作鎮石耳妃崔氏以毒王故下詔廢絶賜死於其家子浩崔氏所生以其母譴死遂不得立以秦國官為喪主俊長女永豐公主年十三遭父憂哀慕盡禮免喪遂絶酒肉每忌日輒流涕不食有開府王延者性忠厚領俊親信兵十餘年俊甚禮之及俊疾延恆在閣下衣不解帶俊薨勺飲不入口者數日羸頓骨立帝聞而憫之賜以御藥授驃騎將軍典宿衛俊葬日延號慟而絶帝嗟異之令通事舍人弔祭詔葬延於俊墓側煬帝即位立浩為秦王以奉孝王嗣封浩弟湛濟北侯後以浩為河陽都尉楊元感作逆之際左翊衛大將軍宇文述勒兵討之至河陽修啓於浩浩詣述營共相往復有司劾浩以諸侯交通內臣竟坐廢免宇文化及弒逆立浩為帝及敗於黎陽北走魏縣自僭為帝因而害之湛驍果有膽烈大業初為滎陽太守坐浩免後亦為化及所害庶人秀開皇元年立為越王未幾徙封於蜀拜柱國益州總管二十四州諸軍事二年進上柱國西南道行臺尚書令本官如故嵗餘而罷十二年入為內史令右領軍大將軍尋出鎮於蜀秀有膽氣容貌瓌偉美鬚髯多武藝甚為朝臣所憚帝每謂獻皇后曰秀必以惡終我在當無慮至兄弟必反兵部侍郎元衡使於蜀秀深結於衡以左右為請衡既還京師為秀請益左右帝不許大將軍劉噲之討西􅀢帝令上開府楊武通將兵繼進秀使嬖人萬知光為武通行軍司馬帝以秀任非其人譴責之因謂羣臣曰壞我法者必在子孫譬如猛虎物不能害反為毛間蟲所損食耳於是遂分秀所統秀漸奢侈違犯制度車馬被服擬於天子及太子勇廢秀甚不平皇太子恐秀終為後變隂令楊素求其罪狀而譖之仁夀二年徴還京師帝見不與語明日使使切責之秀謝罪皇太子及諸王流涕庭謝帝曰頃者秦王糜費財物我以父道訓之今秀蠧害生靈當以君道繩之乃下執法開府慶整諫曰庶人勇既廢秦王已薨陛下見子無多何至如是蜀王性甚耿介今被責恐不自全帝大怒欲斷其舌因謂羣臣曰當斬秀於市以謝百姓乃令楊素蘇威牛𢎞栁述趙綽推之太子隂作偶人書帝及漢王姓名縛手釘心令人埋之華山下令楊素發之又云秀妄述圖讖并作檄文曰逆臣賊子專㺯威柄陛下唯守虛器一無所知中陳甲兵之盛云當指期問罪置秀集中以聞帝曰天下寧有是邪乃廢為庶人幽之內侍省不得與妻子相見令給獠婢二人驅使與秀連坐者百餘人秀既幽逼憤悶不知所為乃上表陳已愆請與其愛子瓜子相見并請賜一穴令骸骨有所帝乃下詔數其罪過凡有十事使臣下知之後竟聽與其子同處煬帝即位禁錮如初宇文化及之弒逆也欲立秀為帝羣議不許於是害之并其諸子庶人諒字德章一名傑小名益錢開皇元年立為漢王十二年為雍州牧加上柱國右衛大將軍轉左衛大將軍十七年出為并州總管帝幸溫湯而送之自山以東至于滄海南拒黃河五十二州盡𨽻焉特許以便宜不拘律令十八年起遼東之役以諒為行軍元帥至遼水師遇疾疫不利而還十九年突厥犯塞以諒為行軍元帥竟不臨戎文帝甚寵愛之諒自以居天下精兵處以太子勇讒廢居常怏怏隂有異圖遂諷帝云突厥方強太原即為重鎮宜修武備帝從之於是大發工役繕修器械貯納於并州招集亡命左右私人殆將數萬有王頍者梁將王僧辨之子少倜儻好竒略為諒咨議參軍蕭摩訶者陳氏舊將二人俱不得志每鬱鬱思亂皆為諒親善及蜀王以罪廢諒愈不自安會文帝崩煬帝使車騎屈突通以髙祖璽書徴之先是髙祖與諒密約若璽書徴汝敕字傍别加一點又與玉麟符合則就徴及發書無驗諒知有變不赴遂發兵反總管司馬皇甫誕諫諒諒收繫之王頍説諒曰王所部將吏家屬盡在關西若用此等即宜長驅深入直據京都所謂疾雷不及掩耳若但欲割據舊齊之地宜任東人諒不能專之乃兼用二策聲言楊素反將誅之總管府兵曹河東裴文安説諒曰井陘以西是王掌握內山東士馬亦為我有宜悉發之分遣羸兵屯守要路仍令隨方略地率其精鋭直入蒲津文安請為前鋒王以大軍繼後風行電擊頓於灞上咸陽以東可指麾而定京師震擾兵不暇集上下相疑羣情離駭我即陳兵號令誰敢不從旬月之間事可定矣諒大恱於是遣所署大將軍余公理將兵出太谷以趣河陽大將軍綦良出滏口以趣黎陽大將軍鄭建出井陘以略燕趙柱國喬鍾馗出鴈門署文安為柱國與紇單貴王𣆀大將軍茹茹天保侯莫陳惠直指京師諒簡精鋭數百騎載羃籬詐稱宫人還長安徑入蒲州城中豪傑亦有應之者文安等未至蒲津百餘里諒忽改圖令紇單貴斷河橋守蒲州而召文安文安至曰兵機詭速本欲出其不意王既不行文安又返使彼計成大事去矣諒不對於是從亂者十九州乃以王𣆀為蒲州刺史裴文安為晉州粹為綘州梁菩薩為潞州韋道正為韓州張伯英為澤州遣偽署大將軍常倫進兵絳州倫遇晉州司法仲孝俊之子謂曰吾曉天文遁甲今年起兵得晉地者王孝俊聞之曰皇太子常為晉王故曰晉地非謂反徒也時潞州有官羊生羔二首相背以為諒之咎徴煬帝遣楊素率騎五千襲王𣆀紇單貴於蒲州素夜至河際收商賈船得數百艘置草其中踐之無聲遂銜枚而濟遲明擊之單貴敗走𣆀以城降素於是率步騎四萬趣太原諒使趙子開守髙壁素擊走之諒大懼自拒素於蒿澤屬天大雨諒欲旋師王頍諫曰楊素懸軍士馬疲弊王以鋭卒親戎擊之其勢必舉今見敵而還示人以怯阻戰士之心益西軍之氣願必勿還諒不從退守清原素進擊之諒與官軍戰死者萬八千人諒退保并州素進擊之諒窮蹙請降頍自殺百寮奏諒當死帝曰朕終鮮兄弟情不忍言欲屈法恕諒一死於是除名絶其屬籍竟以幽死所部吏民坐死徙者二十餘萬家先是并州謡言一張紙兩張紙客量小兒作天子時偽署官告身皆一紙别授則二紙諒聞謡言曰我幼時字阿客量與諒同音吾於皇家最小以為應之子皓因而禁錮宇文化及弒逆之際遇害煬帝三子煬帝三男蕭皇后生元德太子昭齊王暕蕭貴嬪生趙王果元德太子昭煬帝長子也初文帝以開皇三年四月庚午夢神自天而降云將生降帝家寤召納言蘇威以告之及聞蕭妃在并州有娠迎置大興宫客省明年正月戊辰而生昭飬於宫中號大曹主三嵗時於元武門弄石師子文帝與獻皇后至其所文帝適患腰痛舉手馮后昭因避去如此者再三文帝嘆曰天生長者誰復教乎由是大竒之文帝嘗謂曰當為爾娶婦昭應聲而泣文帝問其故對曰漢王未昏時恆在至尊所一朝娶婦便即出外懼將違離是以啼耳上嘆其有至性特鍾愛焉年十二立為河南王仁夀初徙為晉王拜內史令兼左衛大將軍轉雍州牧煬帝即位便幸洛陽宫留昭守京師大業元年帝遣使者立為皇太子昭有武力能引強性謙沖言色恂恂未嘗忿怒其有深可嫌責者但云大不是所膳不許多品帷席極於儉素臣吏有老父母必親問其安否嵗時皆有惠賜其仁惠如此明年朝於洛陽後數月當還京師願得少留帝不許拜請無數體素肥壯因致勞疾帝令巫者視之云房陵王為祟未幾而薨時年二十三先是太史奏言楚分有喪於是改封越公楊素於楚及昭薨日而素亦薨蓋隋楚同分也詔內史侍郎虞世基為哀册文帝深追悼之昭妃慈州刺史博陵崔𢎞升女後秦王妃以蠱毒獲譴昭奏曰惡逆者乃新婦之姐請離之乃娶滑國公京兆韋夀女為妃昭有子三人韋妃生恭皇帝大劉良娣生燕王倓小劉良娣生越王侗倓字仁安性敏慧美儀容大業二年立為燕王煬帝於諸孫中特所鍾愛常置左右性好讀書尤重儒素造次所及有若成人良娣早終每忌日未嘗不流涕嗚咽帝由是益竒之宇文化及弒逆之際倓覺變欲入奏恐露其事因與梁公蕭巨千牛宇文皛等穿芳林門側水竇入至元武門詭奏曰臣卒中惡命懸俄頃請得靣辭死無所恨冀得見帝為司宫者所遏竟不得聞俄而難作遇害時年十六侗字仁謹美儀容性寬厚大業三年立為越王帝每巡幸侗常留守東都楊元感反與户部尚書樊子蓋拒之事平朝於髙陽拜髙陽太守俄以本官留守東都十三年帝幸江都復令侗與金紫光祿大夫段達太尉卿元文都攝户部尚書韋津右武衛將軍皇甫無逸等總留臺事宇文化及之弒逆元文都等議共立侗為帝大赦改元曰皇泰諡煬帝曰明廟號世祖尊元德太子為孝成皇帝廟號世宗尊其母劉良娣為皇太后以段達為納言右翊衛大將軍攝禮部尚書王世充為納言左翊衛大將軍攝吏部尚書元文都為內史令左驍衛大將軍盧楚亦內史令皇甫無逸為兵部尚書右武衛大將軍郭文懿為內史侍郎趙長文為黃門侍郎各居樞要委以機務為金書鐡劵藏之宫掖于時洛陽稱段達等為七貴未幾宇文化及立秦王浩為天子來次彭城所經城邑多從逆黨侗懼遣使者蓋琮馬公政招懷李密密遂請降侗大悅禮其使甚厚即拜密為太尉魏國公令拒化及仍下書告播中外密見使者大悅北靣拜伏臣禮甚恭遂東拒化及七貴頗不協隂有相圖之計未幾元文都盧楚郭文懿趙長文等俱為世充所殺皇甫無逸遁歸長安世充詣侗陳謝辭情哀苦侗以為至誠命之上殿世充被髮為盟誓無二志自是侗無所關預及世充破李密衆望益歸之遂自為鄭王總百揆加九錫備法物侗不能禁段達雲定興等十人入見侗曰天命不常鄭王功德甚盛願陛下遵唐虞之際侗怒曰天下者髙祖之天下東都者世祖之東都若隋德未衰此言不可得而發必天命有改亦何論於禪讓公等或先朝舊臣或勤王立節忽發斯言朕亦何望神色凛然侍衛者莫不流汗既而退朝對良娣而泣世充便使謂曰今海內未定宜得長君待四方乂安當復子明辟必若前盟義不違負侗不得已遜位於世充遂被幽於含涼殿世充僭偽號封潞國公月餘有宇文儒童裴仁基等謀誅世充復立侗事泄並見害世充兄世惲因勸世充害侗以絶人望世充遣其姪行本齎鴆詣侗曰願皇帝飲此酒侗知不免請與母相見不許遂布席焚香禮佛咒曰從今已去願不生帝王尊貴之家於是仰藥而不能時絶更以帛縊之世充偽諡曰恭帝齊王暕字世朏小字阿孩美容儀迹眉目少為文帝所愛開皇中立為豫章王及長頗涉經史尤工騎射初為內史令仁夀中拜揚州總管江淮以南諸軍事煬帝即位進封齊王大業二年帝初入東都盛陳鹵簿暕為軍導轉豫州牧俄而元德太子薨朝野注望咸以暕當為嗣帝又敕吏部尚書牛𢎞妙選官屬公卿由是多進子弟明年轉雍州牧尋徙河南尹開府儀同三司元德太子左右二萬餘人悉𨽻於暕寵遇益隆自樂平公主及諸戚屬競來致禮百官稱謁填咽道路暕頗驕恣昵近小人所行多不法遣喬令則劉虔安裴該皇甫諶庫狄仲錡陳智偉等采求聲色狗馬令則等因此放縱訪人家有女者輒矯暕命呼之載入暕宅因緣藏隱恣行淫穢而後遣之仲錡智偉二人詣隴西撾炙諸胡責其名馬得數匹以進於暕暕令還主仲錡等詐言王賜將歸家暕不之知也又樂平公主嘗奏言栁氏女美者帝未有答久之主復以栁氏進暕暕納之後帝問主栁氏女所在主曰在齊王所帝不悅暕於東都營第大門無故崩聽事栿中折識者以為不祥後從帝幸榆林暕督後軍步騎五萬恆與帝相去數十里而舍會帝於汾陽宫大獵詔暕以千騎入圍暕大獲麋鹿以獻而帝未有所得怒從官從官皆言為暕左右所遏獸不得前帝於是發怒求暕罪失時制縣令無故不得出境有伊闕令皇甫詡幸於暕暕違禁將之汾陽宫又京兆人達奚通有妾王氏善歌貴遊宴聚多或要致於是展轉亦出入王家御史韋德裕希旨劾暕帝令甲士千餘大索暕第因窮治其事暕妃韋氏尚書沖之女也早卒暕遂與妃姊元氏婦通産一女外人皆不知隂引喬令則於第內酣宴令則稱慶脫暕帽以為歡樂召相工令遍視後庭相工指妃姊曰此産子者當為皇后貴不可言時國無儲副暕自謂次當得立又以元德太子有三子內常不安隂挾左道為厭勝之事至是事皆發帝大怒斬令則等數人妃姊賜死暕府僚佐皆斥之邉逺時趙王果猶在孩孺帝謂侍臣曰朕惟有暕一子不然者當肆諸市朝以明國憲暕恩寵自是日衰雖為京尹不復關預時政帝恆令虎賁郎將一人監其府事暕有微失輒令奏之帝亦慮暕生變所給左右皆以老弱備員而已暕每懷危懼心不自安又帝在江都宫元會暕具法服將入朝無故有血從裳中而下又坐齋中見羣鼠數十至前而死視皆無頭暕甚惡之俄而化及作亂兵將犯蹕帝聞之顧謂蕭后曰得非阿孩邪其見迹忌如此化及復令人捕暕暕時尚卧未起賊進暕驚曰是何人莫有報者暕猶謂帝令捕之曰詔使且緩兒不負國家賊曵至街斬之及其二子亦遇害暕竟不知殺者為誰時年三十四有遺腹子愍與蕭后同入突厥處羅可汗號為隋王中國人沒入北蕃者悉配之以為部落以定襄城處之及突厥滅乃獲之貞觀中位至尚衣奉御永徽初卒趙王果小字季子年七嵗以大業九年封趙王尋授光祿大夫歷河南尹行江都太守果聰明美容儀帝有所製詞賦果多能誦之性至孝嘗見帝風動不進膳果亦終日不食又蕭后嘗炙果先請試炷后不許之果泣請曰后所服藥皆蒙嘗之今炙願聽嘗炷悲咽不已后為停炙由是尤鍾愛後遇化及反果在帝側號慟不已裴虔通使斬之帝前而血湔御服時年十二通志卷八十五下
