body:
  text: 通志卷一百宋右迪功郎鄭樵漁仲撰列傳第十三前漢霍光禹金日磾賞欽敞趙充國辛慶忌傅介子常惠鄭吉甘延夀陳湯段會宗胡建朱雲梅福云敞雋不疑疏廣受于定國于公薛廣德平當晏彭宣王吉駿貢禹兩龔鮑宣霍光字子孟驃騎將軍去病弟也父中孺河東平陽人以縣吏給事平陽侯家與侍者衛少兒私通而生去病中孺吏畢歸家娶婦生光因絶不相聞久之少兒女弟子夫得幸於武帝立為皇后去病以皇后姊子貴幸既壯大乃自知父為霍中孺未及求問會為驃騎將軍擊胸奴道出河東河東太守郊迎負弩矢先驅至平陽傳舍去病遣吏迎霍中孺中孺趨入拜謁將軍迎拜因跪曰去病不早自知為大人遺體也中孺扶服叩頭曰老臣得托命將軍此天力也去病大為中孺買田宅奴婢而去還復過焉乃將光西至長安時年十餘歲任光為郎稍遷諸曹侍中去病死後光為奉車都尉光祿大夫出則奉車入侍左右出入禁闥二十餘年小心謹慎未嘗有過甚見親信征和二年衛太子為江充所敗而燕王旦廣陵王胥皆多過失是時上年老寵姬鉤弋趙偼妤有男上心欲以為嗣命大臣輔之察羣臣唯光任大重可屬社稷上乃使黃門畫者畫周公負成王朝諸侯以賜光後元二年春上遊五柞宫病篤光涕泣問曰如有不諱誰當嗣者上曰君未諭前畫意邪立少子君行周公之事光頓首讓曰臣不如金日磾日磾亦曰臣外國人不如光上以光為大司馬大將軍日磾為車騎將軍及太僕上官桀為左將軍搜粟都尉桑𢎞羊為御史大夫皆拜臥內牀下受遺詔輔少主明日武帝崩太子襲尊號是為孝昭皇帝帝年八歲政事一決於光先是後元年侍中僕射莽何羅與弟重合侯通謀為逆時光與金日磾上官桀等共誅之功未録武帝病封璽書帝崩發書以從事遺詔封金日磾為秺侯上官桀為安陽侯光為博陸侯皆以前捕反者功封時衛尉王莽天水人字推叔子男忽侍中揚語曰帝病忽常在左右安得遺詔封三子事羣兒自相貴耳光聞之切責王莽莽鴆殺忽光為人沈靜詳審長財七尺三寸白晳疏眉目美須􅐖每出入下殿門止進有常處郎僕射竊識視之不失尺寸其資性端正如此初輔幼主政自己出天下想聞其風采殿中嘗有怪一夜羣臣相驚光召尚符璽郎郎不肯授光光欲奪之郎按劒曰臣頭可得璽不可得也光甚義之明日詔增此郎秩二等衆庶莫不多光光與左將軍桀結婚相親光長女為桀子安妻有女年與帝相配桀因帝姊鄂邑蓋主內安女後宫為倢妤數月立為皇后父安為驃騎將軍封桑樂侯光時休沐出桀輒入代光決事桀父子既尊盛而德長公主公主內行不修幸河間丁外人桀安欲為外人求封幸依國家故事以列侯尚公主者光不許又為外人求光祿大夫欲令得召見又不許長主大以是怨光而桀安數為外人求官爵弗能得亦慙自先帝時桀已為九卿位在光右及父子並為將軍有椒房中宫之重皇后親安女光乃其外祖而顧專制朝事繇是與光爭權燕王旦自以昭帝兄常懷怨望及御史大夫桑𢎞羊建造酒𣙜鹽鐡為國興利伐其功欲為子弟得官亦怨恨光於是蓋主上官桀安及𢎞羊皆與燕王旦通謀詐令人為燕王上書言光出都肄郎羽林道上稱􅔨太官先置又引蘇武前使胸奴二十年不降還乃為典屬國而大將軍長史敞亡功為搜粟都尉又擅調益莫府校尉光專權自恣疑有非常臣旦願歸符璽入宿衛察姦臣變候司光出沐日奏之桀欲從中下其事桑𢎞羊當與諸大臣共執退光書奏帝不肯下眀旦光聞之止畫室中不入上問大將軍安在桀對曰以燕王告其罪故不敢入有詔召大將軍光入免冠頓首謝上曰將軍冠朕知是書詐也將軍亡罪光曰陛下何以知之上曰將軍之廣眀都郎屬耳調校尉以來未能十日燕王何以得知之且將軍為非不須校尉是時帝年十四尚書左右皆驚而上書者果亡捕之甚急桀等懼白上小事不足遂上不聽後桀黨與有譖光者上輒怒曰大將軍忠臣先帝所屬以輔朕身敢有譖光者坐之自是桀等不敢復言乃謀令長公主置酒請光伏兵格殺之因廢帝迎立燕王為天子事發覺光盡誅桀安𢎞羊外人宗族燕王蓋主皆自殺光威震海內昭帝既冠遂委任光訖十三年百姓充實四夷賓服元光元年昭帝崩無嗣武帝六男獨有廣陵王胥在羣臣議所立咸持廣陵王王本以行失道先帝所不用光內不自安郎有上書言周太王廢太伯立王季文王舍伯夷考立武王唯在所宜雖廢長立少可也廣陵王不可以承宗廟言合光意光以其書視丞相敞等擢郎為九江太守即日受皇太后詔遣行大鴻臚事少府樂成宗正德光祿大夫吉中郎將利漢迎昌邑王賀賀者武帝孫昌邑哀王子也既至即位行淫亂光憂悶獨以問所親故吏大司農田延年延年曰將軍為國柱石審此人不可何不建白太后更選賢而立之光曰今欲如是於古嘗有此不延年曰伊尹相殷廢太甲以安宗廟世稱其忠將軍若能行此亦漢之伊尹也光乃引延年給事中陰與車騎將軍張安世圗計遂召丞相御史將軍列侯中二千石大夫博士會議未央宫光曰昌邑王行昏亂恐危社稷如何羣臣皆驚愕失色莫敢發言但唯唯而已田延年前離席按劒曰先帝屬將軍以幼孤寄將軍以天下以將軍忠賢能安劉氏也今羣下鼎沸社稷將傾且漢之傳諡常為孝者以常有天下令宗廟血食也如令漢家絶祀將軍雖死何面目見先帝於地下乎今日之議不得旋踵羣臣後應者臣請斬之光謝曰九卿責光是也天下胸胸不安光當受其難於是議者皆叩頭曰萬姓之命在於將軍唯大將軍令光即與羣臣俱見白太后具陳昌邑王不可以承宗廟狀皇太后乃車駕幸未央承眀殿詔諸禁門毋納昌邑羣臣王入朝太后還乘輦欲歸溫室中黃門宦者各持門扇王入門閉昌邑羣臣不得入王曰何為大將軍跪曰有皇太后詔毋內昌邑羣臣王曰徐之何乃驚人如是光使盡驅出昌邑羣臣置金馬門外車騎將軍安世將羽林騎收縳二百餘人皆送廷尉詔獄令故昭帝侍中中臣侍守王光勑左右謹宿衛卒有物故自裁令我負天下有殺主名王尚未自知當廢謂左右我故羣臣從官安得罪而大將軍盡繫之乎頃之有太后詔召王王聞召意恐乃曰我安得罪而召我哉太后被珠襦盛服坐武帳中侍御數百人皆持兵期門武士陛戟陳列殿下羣臣以次上殿召昌邑王伏前聼詔光與羣臣連名奏王尚書令讀奏曰丞相臣敞大司馬大將軍臣光車騎將軍臣安世度遼將軍臣眀友前將軍臣增後將軍臣充國御史大夫臣誼宜春侯臣談當塗侯臣聖隨桃侯臣昌樂杜侯臣屠耆堂太僕臣延年太常臣昌大司農臣延年宗正臣德少府臣樂成廷尉臣光執金吾臣延夀大鴻臚臣賢左馮翊臣廣明右扶風臣德長信少府臣嘉典屬國臣武京輔都尉臣廣漢司隸校尉臣辟兵諸吏文學光祿大夫臣遷臣畸臣吉臣賜臣管臣勝臣梁臣長幸臣夏侯勝太中大夫臣德臣卬昧死言皇太后陛下臣敞等頓首死罪天子所以永保宗廟總一海內者以慈孝禮誼賞罰為本孝昭皇帝早棄天下亡嗣臣敞等議禮曰為人後者為之子也昌邑王宜嗣後遣宗正大鴻臚光祿大夫奉節使徴昌邑王典喪服斬縗亡悲哀之心廢禮誼居道上不素食使從官略女子載衣車內所居傳舍始至謁見立為皇太子常私買雞豚以食受皇帝信璽行璽大行前就次發璽不封從官更持節引內昌邑從官騶宰官奴二百餘人常與居禁闥內敖戲自之符璽取節十六朝暮臨令從官更持節從為書曰皇帝問侍中君卿使中御府令高昌奉黃金千斤賜君卿取十妻大行在前殿發樂府樂器引內昌邑樂人擊鼓歌吹作俳倡會下還上前殿擊鐘磬召內泰一宗廟樂人輦道牟首鼓吹歌舞悉奏衆樂發長安厨三太牢具祠閣室中祀已與從官飲啖駕法駕皮軒鸞旗驅馳北宫桂宫弄彘鬭虎召皇太后御小馬車使官奴騎乘遊戲掖庭中與孝昭皇帝宫人蒙等淫亂詔掖庭令敢泄言要斬太后曰止為人臣子當悖亂如是邪王離席伏尚書令復讀曰取諸侯王列侯二千石綬及墨綬黃綬以并佩昌邑郎官者免奴變易節上黃旄以赤發御府金錢刀劒玉器采繒賞賜所與遊戲者與從官官奴夜飲湛沔於酒詔太官上乘輿食如故食監奏未釋服未可御故食復詔太官輒具無關食監太官不敢具即使從官出買雞豚詔殿門內以為常獨夜設九賔溫室延見姊夫昌邑關內侯祖宗廟祠未舉為璽書使使者持節以三太牢祠昌邑哀王園廟稱嗣子皇帝受璽以來二十七日使者傍午持節詔諸官署徴發凡一千一百二十七事文學光祿大夫夏侯勝等及侍中傅嘉數進諌以過失使人簿責勝縛嘉繫獄荒淫迷惑失帝王禮誼亂漢制度臣敞等數進諌不變更日以益甚恐危社稷天下不安臣敞等謹與博士臣霸臣雋舍臣德臣虞舍臣射臣倉議皆曰髙皇帝建功業為漢太祖孝文皇帝慈仁節儉為太宗今陛下嗣孝昭皇帝後行淫辟不軌詩云藉曰未知亦既抱子五辟之屬莫大不孝周襄王不能事母春秋曰天王出居于鄭繇不孝出之絶之於天下也宗廟重於君陛下未見命於高廟不可以承天序奉祖宗廟子萬姓當廢臣請有司御史大夫臣誼宗正臣德太常臣昌與太祝以一太牢具告祠高廟臣敞等昧死以聞皇太后詔曰可光令王起拜受詔王曰聞天子有爭臣七人雖亡道不失天下光曰皇太后詔廢安得天子乃即持其手解脫其璽組奉上太后扶王下殿出金馬門羣臣隨送王西靣拜曰愚戇不任漢事起就乘輿副車大將軍光送至昌邑邸光謝曰王行自絶於天臣等駑怯不能殺身報德臣寧負王不敢負社稷願王自愛臣長不復見左右光涕泣而去羣臣奏言古者廢放之人屏於逺方不及以政請徙王賀漢中房陵縣太后詔歸賀昌邑賜湯沐邑二千戶昌邑羣臣坐無輔導之誼陷王於惡光悉誅殺二百餘人出死號呼市中曰當斷不斷反受其亂光坐庭中會丞相以下議定所立廣陵王已前不用及燕刺王反誅其子不在議中近親唯有衛太子孫號皇曽孫在民間咸稱述焉光遂復與丞相敞等上奏曰禮曰人道親親故尊祖尊祖故敬宗太宗亡嗣擇支子孫賢者為嗣孝武皇帝曽孫病已武帝時有詔掖庭飬視至今年十八師受詩論語孝經躬行節儉慈仁愛人可以嗣孝昭皇帝後奉承祖宗廟子萬姓臣昧死以聞皇太后詔曰可遣宗正劉德至曽孫家尚冠里洗沐賜御衣太僕以軨獵車迎曽孫就齋宗正府入未央宫見皇太后封為陽武侯已而光奉上皇帝璽綬謁于高廟是為孝宣帝明年下詔曰夫褒有德賞元功古今通誼也大司馬大將軍光宿衛忠正宣德眀恩守節秉誼以安宗廟其以河北東武陽益封光萬七千户與故所食邑凡二萬户賞賜前後黃金七千斤錢六千萬雜繒三萬匹奴婢百七十人馬二千匹甲第一區自昭帝時光子禹及兄孫雲皆中郎將雲弟山奉車都尉侍中領胡越兵光兩女壻為東西宫衛尉昆弟諸壻外孫皆奉朝請為諸曺大夫騎都尉給事中黨親連體根據於朝廷光自後元秉持萬機及上即位乃歸政上謙讓不受諸事皆先關白光然後奏御天子光每朝見上虛己斂容禮下之己甚光秉政前後二十年地節二年春病篤車駕自臨問光病上為之涕泣光上書謝恩曰願分國邑三千户以封兄孫奉車校尉山為列侯奉兄驃騎將軍去病祀事下丞相御史即日拜光子禹為右將軍光薨上及皇太后親臨光喪大中大夫任宣與侍御史五人持節護喪事中二千石治莫府冢上賜金錢繒絮繡被百領衣五十篋璧珠璣玉衣梓宫棺也便房黃腸題湊各一具樅木外藏槨十五具以柏木黃心纍棺外故曰黃腸木頭皆內向故曰題湊便房小曲室也東園溫明東園造比器形如方漆桶開一靣以鑑置其中懸尸上大斂并蓋之皆如乘輿制度載光尸柩以輼輬車車有窗閉之則輼開之則輬黃屋左纛發材官輕車北軍五校士軍陳至茂陵以送其葬諡曰宣成侯發三河卒穿復土起冢祠堂置園邑三百家長丞奉守如舊法既葬封山為樂平侯以奉車都尉領尚書事天子思光功德下詔曰故大司馬大將軍博陸侯宿衛孝武皇帝三十餘年輔孝昭皇帝十有餘年遭大難躬秉誼率三公九卿定萬世䇿以安社稷天下蒸庶咸以康寧功德茂盛朕甚嘉之復其後世疇其爵邑世世無有所與功如蕭相國眀年夏封太子外祖父許廣漢為平恩侯復下詔曰宣成侯光宿衛忠正勤勞國家善善及後世其封光兄孫中郎將雲為冠陽侯禹既嗣為博陸侯太夫人顯改光時所自造塋制而侈大之起三出闕築神道北臨昭靈南出承恩皆館名盛飾祠室輦閣通屬永巷而幽良人婢妾守之廣治第室作乘輿輦加晝繡絪馮黃金塗韋絮薦輪侍婢以五綵絲挽顯遊戲第中初光愛幸監奴馮子都常與計事及顯寡居與子都亂而禹山亦並繕治第宅走馬馳逐平樂館雲當朝請數稱病私出多從賔客張圍獵黃山苑中使蒼頭奴上朝謁莫敢譴者而顯及諸女晝夜出入長信宫殿中無期度宣帝自在民間知霍氏尊盛日久內不能善光薨上始躬親朝政御史大夫魏相給事中顯謂禹雲山女曹不務奉大將軍餘業今大夫給事中他人一間女能復自救邪後兩家奴爭道霍氏奴入御史府欲躢大夫門御史為叩頭謝乃去人以謂霍氏顯等始知憂會魏大夫為丞相數燕見言事平恩侯與侍中金安上等徑出入省中時霍山自若領尚書上令吏民得奏封事不關尚書羣臣進見獨往來於是霍氏甚惡之宣帝始立微時許妃為皇后顯愛小女成君欲貴之私使乳醫淳于衍行毒藥殺許后因勸光內成君代立為后語在后妃傳始許后暴崩吏捕諸醫劾衍侍疾亡狀不道下獄吏簿問急顯恐事敗即具以實語光光大驚欲自發舉不忍猶與會奏上因署衍勿論光薨後語稍泄於是上始聞之而未察乃徙光女壻度遼將軍未央衛尉平陵侯范明友為光祿勳次壻諸吏中郎將羽林監任勝出為安定太守數月復出光姊壻給事光祿大夫張朔為蜀郡太守羣孫壻中郎將王漢為武威太守頃之復使光長女壻長樂衛尉鄧廣漢為少府更以禹為大司馬冠小冠亡印綬罷其右將軍屯兵官屬特使禹官名與光俱大司馬者又收范明友度遼將軍印綬但為光祿勳及光中女壻趙平為散騎都尉光祿大夫將屯兵又收平騎都尉印綬諸領胡越騎羽林及兩宫衛將屯兵悉易以所親信許史子弟代之禹為大司馬稱病禹故長史任宣候問禹曰我何病縣官謂天子也非我家將軍不得至是今將軍墳墓未乾盡外我家反任許史奪我印綬令人不省死宣見禹恨望深乃謂曰大將軍時何可復行持國權柄生殺在手中廷尉李种王平左馮翊賈勝胡及車丞相女壻少府徐仁皆坐逆將軍意下獄死使樂成小家子得幸將軍至九卿封侯百官以下但事馮子都王子方等視丞相無如也各自有時今許史自天子骨肉貴正宜耳今大司馬欲用是怨恨愚以為不可禹默然數日起視事顯及禹山雲自見日侵削數相對涕泣自怨山曰今丞相用事縣官信之盡變易大將軍時法令以公田賦與貧民發揚大將軍過失又諸儒生多窶人子逺客飢寒喜妄説狂言不避忌諱大將軍常讎之今陛下好與諸儒生語人人自使書對事多言我家者嘗有上書言大將軍時主弱臣強專制擅權今其子孫用事昆弟益驕恣恐危宗廟災異數見盡為是也其言絶痛山屏不奏其書後上書者益黠盡奏封事輒下中書令出取之不關尚書益不信人顯曰丞相數言我家獨亡罪乎山曰丞相亷正安得罪我家昆弟諸壻多不謹又聞民間歡言霍氏毒殺許皇后寧有是邪顯恐急即具以實告山雲禹山雲禹驚曰如是何不早告禹等縣官離散斥逐諸壻用是故也此大事誅罰不小奈何於是始有邪謀矣初趙平客石夏善為天官語平曰熒惑守御星御星太僕奉車都尉也不黜則死平內憂山等雲舅李竟所善張赦見雲家卒卒謂竟曰今丞相與平恩侯用事可令太夫人言太后先誅此兩人移徙陛下在太后耳長安男子張章告之事下廷尉執金吾捕張赦石夏等後有詔止勿捕山等愈恐相謂曰此縣官重太后故不竟也然惡端已見又有弒許后事陛下雖寬仁恐左右不聽久之猶發發即族矣不如先也遂令諸女各歸報其夫皆曰安所相避會李竟坐與諸侯交通辭語及霍氏有詔雲山不宜宿衛免就第光諸女遇太后無禮馮子都數犯法上并以為讓山禹等甚恐顯夢第中井水溢流庭下竈居樹上又夢大將軍謂顯曰知捕兒不亟下捕之第中鼠暴多與人相觸以尾畫地梟數鳴殿前樹上第門自壞古者宫室高大則通呼為殿非止天子宫中也雲尚冠里宅中門亦壞巷端人共見有人居雲屋上徹瓦投地就視亡有大怪之禹夢車騎聲正歡來捕禹舉家憂愁山曰丞相擅減宗廟羔莬􅀢可以此罪也謀欲令太后為博平君置酒博平君宣帝外祖母也召丞相平恩侯以下使范眀友鄧廣漢承太后制引斬之因廢天子而立禹約定未發雲拜為玄莬太守太中大夫任宣為代郡太守山又坐寫祕書顯為上書獻城西第入馬千匹以贖山罪書報聞會事發覺雲山眀友自殺顯禹廣漢等捕得禹要斬顯及諸女昆弟皆棄市唯獨霍后廢處昭臺宫與霍氏相連坐誅滅數千家上乃下詔曰乃者東織室令史張赦使魏郡豪李竟報冠陽侯雲謀為大逆朕以大將軍故抑而不揚冀其自新今大司馬博陸侯禹與母宣成侯夫人顯及從昆弟子冠陽侯雲樂平侯山諸姊妹壻謀為大逆欲詿誤百姓賴宗廟神靈先發得咸伏其辜朕甚悼之諸為霍氏所詿誤事在丙申前未發覺在吏者皆赦除之男子張章先發覺以語期門董忠忠告左曹楊惲惲告侍中金安上惲召見對狀後章上書以聞侍中史高與金安上建發其事言無入霍氏禁闥不不得遂其謀皆讎有功封章為博成侯忠高昌侯惲平通侯安上都成侯高樂陵侯初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之右衆必害之霍氏秉權日久害之者多矣天下害之而又行以逆道不亡何待乃上疏言霍氏太盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患主人默然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次坐而不録言曲突者人謂主人曰鄉使聽客之言不費牛酒終無火患今論功而請賓曲突徙薪無恩澤燋頭爛額為上客邪主人乃寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄉使福説得行則國無裂土出爵之費臣無逆亂誅滅之敗往事既已而福獨不蒙其功唯陛下察之貴徙薪曲突之䇿使居焦髮灼爛之右上乃賜福帛十匹後以為郎宣帝始立謁見高廟大將軍光驂乘上內嚴憚之若有芒刺在背後車騎將軍張安世代光驂乘天子從容肆體甚安近焉及光身死而宗族竟誅故俗傳之曰威震主者不畜霍氏之禍萌於驂乘至成帝時為光置守冡百家吏卒奉祠焉元始二年封光從父昆弟曽孫陽為博陸侯千户金日磾字翁叔本胸奴休屠王太子也武帝元始中驃騎將軍霍去病將兵擊胸奴右地多斬首虜獲休屠王祭天金人其夏驃騎復西過居延攻祁連山大克獲於是單于怨昆邪休屠音除居西方多為漢所破召其王欲誅之昆邪休屠恐謀降漢休屠王後悔昆邪王殺之并將其衆降漢封昆邪王為列侯日磾以父不降見殺與母閼氏弟倫俱沒入官輸黃門飬馬時年十四矣久之武帝遊宴見馬後宫滿側日磾等數十人牽馬過殿下莫不竊視至日磾獨不敢日磾長八尺二寸容貌甚嚴馬又肥好上異而問之具以本狀對上竒焉即日賜湯沐衣冠拜為馬監遷侍中駙馬都尉光祿大夫日磾既親近未嘗有過失上甚信愛之賞賜纍千金出則驂乘入侍左右貴戚多竊怨曰陛下妄得一胡兒反貴重之上聞愈厚焉日磾母教誨兩子甚有法度上聞而嘉之病死詔圖畫於甘泉宫署曰休屠王閼氏日磾每見畫常拜鄉之涕泣然後乃去日磾子二人上皆愛之為帝弄兒常在旁側弄兒或自後擁上項日磾在前見而目之弄兒走且啼曰翁怒上謂日磾何怒吾兒為其後弄兒壯大不謹自殿下與宫人戲日磾適見之惡其淫亂遂殺弄兒弄兒即日磾長子也上聞之大怒日磾頓首謝具言所以殺弄兒狀上甚哀為之泣已而心敬日磾初莽何羅本姓馬明德后惡其先有反易曰莽與江充相善及充敗衛太子何羅弟通用誅太子時力戰得封後上知太子寃乃夷滅充宗族黨與何羅兄弟懼及遂謀為逆日磾視其志意非常心疑之隂獨察其動靜與俱上下何羅亦覺日磾意以故久不得發是時上幸林光宫甘泉一名林光日磾小疾臥廬何羅與通及小弟安成矯制夜出共殺使者發兵明旦上未起何羅從外入日磾奏厠心動立入坐內户下須臾何羅褎白刃從東箱上見日磾色變走趨臥內欲入行觸寶瑟僵日磾得抱何羅因傳曰莽何羅反上驚起左右拔刃欲格之上恐并中日磾止勿格日磾捽胡胡頸也捽捽兀反投何羅殿下得禽縳之窮治皆伏辜繇是著忠孝節日磾自在左右目不忤視者數十年賜出宫女不敢近上欲內其女後宫不肯其篤愼如此上尤奇異之及上病屬霍光以輔少主光讓日磾日磾曰臣外國人且使胸奴輕漢於是遂為光副光以女妻日磾嗣子賞初武帝遺詔以討莽何羅功封日磾秺丁故反侯日磾以帝少不受封輔政歲餘病困大將軍光白封日磾臥授印綬一日薨賜葬具冡地送以輕車介士軍陳至茂陵諡曰敬侯日磾兩子賞建俱侍中與昭帝略同年共卧起賞為奉車建為駙馬都尉及賞嗣侯佩兩綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬邪霍光對曰賞自嗣父為侯耳上笑曰侯不在我與將軍乎光曰先帝之約有功乃得封侯時年俱八九歲宣帝立賞為太僕霍氏有事萌芽上書去妻上亦自哀之獨得不坐元帝時為光祿勳亡子國除元始中繼絶世封建孫當為秺侯奉日磾後初日磾所將俱降弟倫字少卿為黃門郎早卒日磾兩子貴及孫則衰矣而倫後嗣遂盛子安上始貴顯封侯安上字子侯少為侍中惇篤有智宣帝愛之頗與發舉楚王延夀反謀賜爵關內侯食邑三百户後霍氏反安上傳禁門闥無內霍氏親屬封為都成侯至建章衛尉薨賜冡塋杜陵諡曰敬侯四子常敞岑明皆為諸曹中郎將常光祿大夫元帝為太子時敞為中庶子幸有寵帝即位為騎都尉光祿大夫中郎將侍中元帝崩故事近臣皆隨陵為園郎敞以世名忠孝太后詔留侍成帝為奉車水衡都尉至衛尉敞為人正直敢犯顔色左右憚之唯上亦難焉病甚上使使者問所欲以弟岑為託上召岑拜為使主客敞子涉本為左曺上拜涉為侍中使待幸緑車載送衛尉舍須臾卒敞三子涉參饒涉明經節儉諸儒稱之成帝時為侍中騎都尉領三輔胡越騎哀帝既位為奉車都尉至長信少府而參使胸奴為胸奴中郎將越騎校尉關內都尉安定東海太守饒為越騎校尉涉兩子湯融皆侍中諸曺將大夫而涉之從父弟欽舉眀經為太子門大夫哀帝即位為太中大夫給事中欽從父弟遷為尚書令兄弟用事帝祖母傅太后崩欽使護作職辦擢為泰山𢎞農太守著威名平帝即位徴為大司馬司直京兆尹帝年幼選置師友大司徒孔光以眀經高行為孔氏師京兆尹金欽以家世忠孝為金氏友徙光祿大夫侍中秩中二千石封都成侯時王莽新誅平帝外家衛氏召眀禮少府宗伯鳯入説為人後之誼白令公卿將軍侍中朝臣並聼欲以內厲平帝而外塞百姓之議欽與族昆弟秺侯當俱封初當曽祖父日磾傳子節侯賞而欽祖父安上傳子夷侯常皆亡嗣國除故莽封欽當奉其後當母南即莽母功顯君同産弟也當上南大行為太夫人大行官名欽因緣謂當詔書陳日磾功亡有賞語當名為以孫繼祖也自當為父祖父立廟賞故國君使大夫主其祭時甄邯在旁庭叱欽因劾奏曰欽幸得以通經術超擢侍帷幄重蒙厚恩封襲爵號知聖朝以世有為人後之誼前遭故定陶太后背本逆天孝哀不獲厥福乃者吕寬衛寶復造姦謀至於反逆咸伏厥辜太皇太后懲艾悼懼逆天之咎非聖誣法大亂之殃誠欲奉承天心遵明聖制專一為後之誼以安天下之命數臨正殿延見羣臣講習禮經孫繼祖者謂亡正統持重者也賞見嗣日磾後成為君持大宗重則禮所謂尊祖故敬宗大宗不可以絶者也欽自知與當俱拜同誼即數揚言殿省中教當云云當即如其言則欽亦欲為父明立廟而不入夷侯常廟矣進退異言頗惑衆心亂國大綱開禍亂原誣祖不孝罪莫大焉尤非大臣所宜大不敬秺侯當上母南為太夫人亦失禮不敬莽白太后下四輔公卿大夫博士議郎皆曰欽宜以時即罪謁者召欽詣詔獄欽自殺邯以綱紀國體無所阿私忠孝尤著益封千户更封長信少府涉子右曺湯為都成侯湯受封日不敢還家以明為人後之誼益封之後莽復用欽弟遵封侯歷九卿位日磾本夷狄亡國羈虜漢庭而以篤敬寤主忠信自著勒功上將傳國後嗣世名忠孝七世內侍何其盛也本以休屠作金人為祭天祖故因賜姓金氏云趙充國字翁孫隴西上邽人也後徙金城令居令音零始為騎士以六郡良家子金城隴西天水安定北地上郡善騎射補羽林為人沈勇有大略少好將帥之節而學兵法通知四夷事武帝時以假司馬從二師將軍擊胸奴大為虜所圍漢軍乏食數日死傷者多充國乃與壯士百餘人潰圍陷陳二師引軍隨之遂得解身被二十餘創二師奏狀詔徴充國詣行在所武帝親見視其創嗟嘆之拜為中郎遷車騎將軍長史昭帝時武都氐人反充國以大將軍護軍都尉將兵擊定之遷中郎將將屯上谷還為水衡都尉擊胸奴獲西祁王擢為後將軍兼水衡如故與大將軍霍光定䇿尊立宣帝封營平侯本始中為蒲類將軍征胸奴斬虜數百級還為後將軍少府胸奴大發十餘萬騎南旁塞至符奚盧山欲入為寇亡者題餘渠堂降漢言之遣充國將四萬騎屯緣邉九郡單于聞之引去是時光祿大夫義渠安國使行諸羌先零音憐豪言願得度湟水北逐民所不田處畜牧安國以聞充國劾安國奉使不敬是後羌人旁緣前言抵冒度湟水郡縣不能禁元康三年先零遂與諸羌種豪二百餘人解仇交質盟詛上聞之以問充國對曰羌人所以易制者以其種自有豪數相功擊藝不一也往三十餘嵗西羌反時亦先解仇合約攻令居與漢相距五六年乃定至政和五年先零豪封煎等通使胸奴胸奴使人至小月氏傳告諸羌曰漢二師將軍衆十餘萬人降胸奴羌人為漢事苦張掖酒泉本我地地肥美可共擊居之以此觀胸奴欲與羌合非一世也間者胸奴困於西方聞烏桓來保塞恐兵復從東方起數使使尉黎危須諸國設以子女貂裘欲沮解之其計不合疑胸奴更遣使至羌中道從沙隂地出鹽澤過長坑入窮水塞南抵屬國與先零相直臣恐羌變未止此且復結聨他種宜未及然為之備後月餘羌侯狼何果遣使者至胸奴藉兵欲擊鄯善敦煌以絶漢道充國以為狼何小月氏種在陽關西南藝不能獨造此計疑胸奴使已至羌中先零􅀢开口賢反乃解仇作約到秋馬肥變必起矣宜遣使者行邉兵豫為備敕視諸羌毋令解仇以發覺其謀於是兩府復白遣義渠安國行視諸羌分别善惡安國至召先零諸豪三十餘人以尤桀黠者皆斬之縱兵擊其種人斬首千餘級於是諸降羌及歸義羌侯楊玉等恐怒亡所信鄉遂劫略小種背畔犯塞攻城邑殺長吏安國以騎都尉將騎三千屯備羌至浩亹為虜所擊失亡車重兵器甚衆安國引還至令居以聞是嵗神爵元年春也時充國年七十餘上老之使御史大夫丙吉問誰可將者充國對曰無踰於老臣者矣上遣問曰將軍度羌虜何如當用幾人充國曰百聞不如一見兵難隃度臣願馳至金城圖上方略然羌戎小夷逆天背畔滅亡不久願陛下以屬老臣勿以為憂上笑曰諾充國至金城須兵滿萬騎欲渡河恐為虜所遮即夜遣三校銜枚先渡渡輒營陳會明畢遂以次盡渡虜數十百騎來出入軍傍充國曰吾士馬新倦不可馳逐此皆驍騎難制又恐其為誘兵也擊虜以殄滅為期小利不足貪令軍勿擊遣騎候四望狹中亡虜夜引兵上至落都召諸校司馬謂曰吾知羌虜不能為兵矣使虜發數十人守杜四望狹中兵豈得入哉充國常以逺斥候為務行必為戰備止必堅營壁尤能持重愛士卒先計而後戰遂西至西部都尉府日饗軍士士皆欲為用虜數挑戰充國堅守捕得生口言羌豪數相責曰語汝亡反今天子遣趙將軍來年八九十矣善為兵今請欲一鬭而死可得邪充國子右曹中郎將卬將期門佽飛羽林孤兒胡越騎為支兵至令居虜並出絶轉道卬以聞有詔將八校尉與驍騎都尉金城太守合疏捕山間虜通轉道津度初􅀢开豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反雕庫種人頗在先零中都尉即留雕庫為質充國以為亡罪乃遣歸告種豪大兵誅有罪者明白自題毋取并滅天子告諸羌人犯法者能相捕斬除罪斬大豪有罪者一人賜錢四十萬中豪十五萬下豪二萬大男三千女子及老小千錢又以其所捕妻子財物盡與之充國計欲以威信招降􅀢开及劫略者解散虜謀徼極乃擊之時上已發三輔太常徒弛刑三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士羌騎與武威張掖酒泉太守各屯其郡者合六萬人矣酒泉太守辛武賢奏言郡兵皆屯備南山北邉空虛藝不可久或曰至秋冬乃進兵此虜在竟外之册今虜朝夕為寇土地寒苦漢馬不能冬屯兵在武威張掖酒泉萬騎以上皆多羸瘦可益馬食以七月上旬齎三十日糧分兵並出張掖酒泉合擊罕开在鮮水上者虜以畜産為命今皆離散兵即分出雖不能盡誅亶奪其畜産虜其妻子復引兵還冬復擊之大兵仍出虜必震壞天子下其書充國令與校尉以下吏士知羌事者博議充國及長史董通年以為武賢欲輕引萬騎分為兩道出張掖回逺千里以一馬自他負三十日食為米二斛四斗麥八斛又有衣裝兵器難以追逐勤勞而至虜必商軍進退稍引去逐水屮入山林隨而深入虜即據前險守後厄以絶糧道必有傷危之憂為夷狄笑千載不可復而武賢以為可奪其畜産虜其妻子此殆空言非至計也又武威縣張掖日勒皆當北塞有通谷水草臣恐胸奴與羌有謀且欲大入幸能要杜張掖酒泉以絶西域其郡兵尤不可發先零首為畔逆他種劫略故臣愚册欲捐􅀢开暗昧之過隱而勿章先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者撫循和輯此全師保勝安邉之册天子下其書公卿議者咸以為先零兵盛而負罕开之助不先破􅀢开則先零未可圖也上乃拜侍中樂成侯許延夀為強弩將軍即拜酒泉太守武賢為破羌將軍賜璽書嘉納其册以書勑讓充國曰皇帝問後將軍甚苦暴露將軍計欲至正月乃擊􅀢开羌羌人當獲麥已逺其妻子精兵萬人欲為酒泉燉煌寇邉兵少民守保不得田作今張掖以東粟石百餘芻稿束數十轉輸並起百姓煩擾將軍將萬餘之衆不早及秋共水草之利爭其畜食欲至冬虜皆當畜食多臧匿山中依險阻將軍士寒手足皸瘃皸坼裂也音軍瘃寒創也音竹足反寧有利哉將軍不念中國之費欲以嵗數而勝微將軍誰不樂此者今詔破羌將軍武賢將兵六千一百人燉煌太守快將二千人長水校尉富昌酒泉侯奉世將婼月氏兵四千人婼兒遮反亡慮萬二千人齎三十日食以七月二十二日擊罕羌入鮮水北句亷上去酒泉八百里去將軍可千二百里將軍其引兵便道西並進雖不相及使虜聞東方北方兵並來分散其心意離其黨與雖不能殄滅當有瓦解者已詔中郎將卬將胡越佽飛射士步兵二校尉益將軍兵令五星出東方中國大利蠻夷大敗太白出高用兵深入敢戰者吉不敢戰者凶將軍急裝因天時誅不義萬下必全勿復有疑充國既得讓以為將任兵在外便宜有守以安國家乃上書謝罪因陳兵利害曰臣竊見騎都尉安國前幸賜書擇羌人可使使􅀢諭告以大軍當至漢不誅罕以解其謀恩澤甚厚非臣下所能及臣獨私美陛下盛德至計亡已故遣开豪雕庫宣天子至德罕开之屬皆聞知明詔今先零羌楊玉此羌之首帥名王將騎四千及煎鞏騎五千阻石山木候便為寇罕羌未有所犯今置先零先擊罕釋有罪誅亡辜起一難就兩害誠非陛下本計也臣聞兵法攻不足者守有餘又曰善戰者致人不致於人而今罕羌欲為燉煌酒泉寇宜飭兵馬練戰士以須其至坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道臣愚以為不便先零羌虜欲為背畔故與罕开解仇結約然其私心不能忘恐漢兵至而罕开背之也臣愚以為其計常欲先赴罕开之急以堅其約先擊罕羌先零必助之今虜馬肥糧食方饒擊之恐不能傷害適使先零得施德於罕羌堅其約合其黨虜交堅黨合精兵二萬人迫脅諸小種附著者稍衆莫須之屬不輕得離也如是虜兵䆮多誅之用力數倍臣恐國家憂纍繇十年數不二三嵗而已臣得蒙天子厚恩父子俱為顯列臣位至上卿爵為列侯犬馬之齒七十六為明詔填溝壑死骨不朽亡所顧念獨思惟兵利害至熟悉也於臣之計先誅先零已則罕开之屬不煩兵而服矣先零已誅而罕开不服涉正月擊之得利之理又其時也以今進兵誠不見其利唯陛下裁察六月戊申奏七月甲寅璽書報從充國計焉充國引兵至先零在所虜久屯聚解弛望見大軍棄車重欲度湟水道􅀈狹充國徐行驅之或曰逐利行遲充國曰此窮寇不可迫也緩之則走不顧急之則還致死諸校皆曰善虜赴水溺死者數百降及斬首五百餘人鹵馬牛羊十萬餘頭車四千餘兩兵至罕地令軍毋燔聚落芻牧田中罕羌聞之喜曰漢果不擊我矣豪靡忘使人來言願得復還故地充國以聞未報靡忘來自歸充國賜飲食遣還諭種人護軍以下皆爭之曰此反虜不可擅遣充國曰諸君但欲便文自營非為公家忠計也語未卒璽書報令靡忘以贖論後罕竟不煩兵而下其秋充國病上賜書曰制詔後將軍聞苦腳脛寒泄將軍年老加疾一朝之變不可諱朕甚憂之今詔破羌將軍詣屯所為將軍副急因天時大利吏士鋭氣以十二月擊先零羌即疾劇留屯毋行獨遣破羌強弩將軍時羌降者萬餘人矣充國度其必壞欲罷騎兵屯田以待其敝作奏未上會得進兵璽書中郎將卬懼使客諫充國曰誠令兵出破軍殺將以傾國家將軍守之可也即利與病又何足爭一旦不合上意遣繡衣來責將軍將軍之身不能自保何國家之安充國嘆曰是何言之不忠也本用吾言羌虜得至是邪往者舉可先行羌者吾舉辛武賢丞相御史復白遣義渠安國竟沮敗羌金城湟中穀斛八錢吾謂耿中丞糴三百萬斛穀羌人不敢動矣耿中丞請糴百萬斛乃得四十萬斛耳義渠再使且費其半失此二册羌人故敢為逆失之毫釐差以千里是既然矣今兵久未決四夷卒有動搖相因而起雖有知者不能善其後羌獨足憂邪吾固以死守之眀主可為忠言遂上屯田奏曰臣聞兵者所以眀德除害也故舉得於外則福生於內不可不慎臣所將吏士馬牛食月用糧榖十九萬九千六百三十斛鹽千六百九十三斛茭藁二十五萬二百八十六石難久不解繇役不息又恐他夷卒有不虞之變相因並起為眀主憂誠非素定廟勝之册且羌虜易以計破難用兵碎故也臣以為擊之不便計度臨羌東至浩亹羌虜故田及公田民有所未墾可二千頃以上其間郵亭多壞敗者臣前部士入山伐材木大小六萬餘枚皆在水次願罷騎兵留弛刑應募及淮陽汝南步兵與吏士私從者合凡萬二百八十一人用穀月二萬七千三百六十三斛鹽三百八斛分屯要害處冰解漕下繕鄉亭浚溝渠治湟狹以西道橋七十所令可至鮮水左右田事出賦人二十畝至四月草生發郡騎及屬國胡騎伉健各千倅馬什二就草為田者遊兵以充入金城郡益積畜省大費今大司農所轉穀至者足支萬人一歲食謹上田處及器用簿唯陛下裁許上報曰皇帝問後將軍言欲罷騎兵萬人留田即如將軍之計虜當何時伏誅兵當何時得決熟計其便復奏充國上狀曰臣聞帝王之兵以全取勝是以貴謀而賤戰戰而百勝非善之善者也故先為不可勝以待敵之可勝蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草愁於寄託逺遁骨肉心離人有畔志而明主班師罷兵萬人留田順天時因地利以待可勝之虜雖未即伏辜兵決可期月而望羌虜瓦解前後降者萬七百餘人及受言去者凡七十輩此坐支解羌虜之具也臣謹條不出兵留田便宜十二事步兵九校吏士萬人留屯以為武備因田致榖威德並行一也又因排折羌虜令不得歸肥饒之地貧破其衆以成羌虜相畔之漸二也居民得並田作不失農業三也軍馬一月之食度支田士一歲罷騎兵以省大費四也至春省甲士卒循河湟漕穀至臨羌以視羌虜揚威武傳世折衝之具五也以間暇時下所伐材繕治郵亭充入金城六也兵出乘危徼幸不出令反畔之虜竄於風寒之地離霜露疾疫瘃墯之患坐得必勝之道七也亡經阻逺追死傷之害八也內不損武威之重外不令虜得乘間之藝九也又亡驚動河南大开小开使生它變之憂十也治湟狹中道橋令可至鮮水以制西域信威千里從枕席上過師十一也大費既省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利臣充國材下犬馬齒衰不識長䇿唯明詔博詳公卿議臣採擇上復賜報曰皇帝問後將軍言十二便聞之虜雖未伏誅兵決可期月而望期月而望者謂今冬邪謂何時也將軍獨不計虜聞兵頗罷且丁壯相聚攻擾田者及道上屯兵復殺略人民將何以止之又大开小开前言曰我告漢軍先零所在兵不往擊久留得亡效五年時不分别人而并擊我其意常恐今兵不出得亡變生與先零為一將軍孰計復奏充國奏曰臣聞兵以計為本故多算勝少算先零羌精兵今餘不過七八千人失地逺客分散飢凍罕开莫須又頗暴略其羸弱畜産畔還者不絶皆聞天子明令相捕斬之賞臣愚以為虜破壞可日月冀逺在來春故曰兵決可期月而望竊見北邉自燉煌至遼東萬一千五百餘里乘塞列隊有吏卒數千人虜數大衆攻之而不能害今留步士萬人屯田地藝平易多高山逺望之便部曲相保為塹壘木樵校聮不絶便兵弩飭鬭具烽火幸通藝及并力以逸待勞兵之利者也臣愚以為屯田內有亡費之利外有守禦之備騎兵雖罷虜見萬人留田為必禽之具其土崩歸德宜不久矣從今盡三月虜馬羸瘦必不敢捐其妻子於它種中逺涉河山而來為寇又見屯田之士精兵萬人終不敢復將其纍重還歸故地是臣之愚計所以度虜且必瓦解其處不戰自破之册也至於虜小寇盜時殺人民其原未可卒禁臣聞戰不必勝不茍接刃攻不必取不茍勞衆誠令出兵雖不能滅先零亶能令虜絶不為小寇則出兵可也即今同是而釋坐勝之道從乘危之藝往終不見利空內自罷敝貶重而自損非所以視蠻夷也又大兵一出還不可復留湟中亦未可空如是繇役復發也且胸奴不可不備烏桓不可不憂今久轉運煩費傾我不虞之用以淡一隅臣愚以為不便校尉臨衆幸得承威德奉厚幣拊循衆羌諭以明詔宜皆鄉風雖其前辭嘗曰得亡效五年宜亡他心不足以故出兵臣竊自惟念奉詔出塞引軍逺擊窮天子之精兵散車甲於山野雖無尺寸之功偷得避慊之便而亡後咎餘責此人臣不忠之利非明主社稷之福也臣幸得奮精兵討不義久留天誅罪當萬死陛下寬仁未忍加誅令臣數得孰計愚臣伏計孰甚不敢避斧鉞之誅昧死陳愚唯陛下省察充國奏每上輒下公卿議臣初是充國者什三中什五最後什八有詔詰前言不便者皆頓首服丞相魏相曰臣愚不習兵事利害後將軍數畫軍册其言常是臣任其計可必用也上於是報充國曰皇帝問後將軍上書言羌虜可勝之道今聼將軍將軍計善其上留屯田及當罷者人馬數將軍強食慎兵事自愛上以破羌強弩將軍數言當擊又用充國屯田處離散恐虜犯之於是兩從其計詔兩將軍與中郎將卬出擊強弩出降四千餘人破羌斬首二千級中郎將卬斬首降者亦二千餘級而充國所降復得五千餘人詔罷兵獨充國留屯田明年五月充國奏言羌可五萬人軍凡斬首七千六百級降者三萬一千二百人溺河湟飢餓死者五六千人定計遺脫與煎鞏黃羝俱亡者不過四千人羌靡忘等自詭必得請罷屯兵奏可充國振旅而還所善浩星賜迎説充國曰衆人皆以破羌強弩出擊多斬首獲降虜以破壞然有識者以為虜藝困窮兵雖不出必自服矣將軍即見宜歸功於二將軍出擊非愚臣所及如此將軍計未失也充國曰吾年高矣爵位已極豈嫌伐一時事以欺明主哉兵藝國之大事當為後法老臣不以餘命一為陛下明言兵之利害卒死誰當復言之者卒以其意對上然其計罷遣辛武賢歸酒泉太守官充國復為後將軍衛尉其秋羌若零離留且種兒庫共斬先零大豪猶非楊玉首及諸豪弟澤陽雕良兒靡忘皆帥煎鞏黃羝之屬四千餘人降漢封若零弟澤二人為帥衆王離留且種二人為侯兒庫為君陽雕為言兵侯良兒為君靡忘為獻牛君初置金城屬國以處降羌詔舉可護羌校尉者時充國病四府舉辛武賢小弟湯充國遽起奏湯使酒不可典蠻夷不如湯兄臨衆時湯已拜受節有詔更用臨衆後臨衆病免五府復舉湯湯數醉酗羌人羌人反畔卒如充國之言初破羌將軍武賢在軍中時嘗與中郎將卬宴語卬道車騎將軍張安世始嘗不快上上欲誅之卬家將軍以為安世本持橐簪筆近臣負橐簪筆從備顧問或有所記橐囊也事孝武帝數十年見謂忠謹宜全度之安世用是得免及充國還言兵事武賢罷歸故官深恨上書告卬泄省中語卬坐禁止而入至充國莫府司馬中亂屯兵下吏自殺充國乞骸骨賜安車駟馬黃金六十斤罷就第朝廷每有四夷大議常與參兵謀問籌䇿焉年八十六甘露二年薨諡曰壯侯傳子至孫欽欽尚敬武公主主亡子主教欽良人習詐有身名它人子欽薨子岑嗣侯習為大夫人岑父母求錢財無己忿恨相告岑坐非子免國除元始中修功臣後復封充國曽孫伋為營平侯初充國以功德與霍光等列畫未央宫成帝時西羌常有警上思將帥之臣追美充國乃召黃門郎揚雄即充國圖畫而頌之曰明靈惟宣戎有先零先零猖狂侵漢西疆漢命虎臣惟後將軍整我六師是討是震既臨其域諭以威德有守矜功謂之弗克請奮其旅于罕之羌天子命我從之鮮陽營平守節婁奏封章料敵制勝威謀靡亢遂克西域還師於京鬼方賓服罔有不庭昔周之宣有方有虎詩人歌功乃列于雅在漢中興充國作武﨣﨣桓桓亦紹厥後充國為後將軍徙杜陵辛武賢自羌軍還後七年復為破羌將軍征烏孫至燉煌後不出徴未到病卒子慶忌至大官辛慶忌字子真少以父任為右校丞隨長羅侯常惠屯田烏孫赤谷城與翖侯戰陷陳郤敵惠奏其功拜為侍郎遷校尉將吏士屯焉耆國還為謁者尚未知名元帝初補金城長史舉茂材遷郎中車騎將軍朝廷多重之者轉為校尉遷張掖太守徙酒泉所在耆名成帝初徴為光祿大夫遷左曺中郎將至執金吾始武賢與趙充國有隙後充國家殺辛氏至慶忌為執金吾坐子殺趙氏左遷酒泉太守歲餘大將軍王鳳薦慶忌前在兩郡著功迹徴入歷位朝廷莫不信鄉質行正直仁勇得衆心通於兵事明略威重任國柱石父破羌將軍武賢顯名前世有威西夷臣鳯不宜久處慶忌之右乃復徴為光祿大夫執金吾數年坐小法左遷雲中太守復徴為光祿勳時數有災異丞相司直何武上封事曰虞有宫之奇晉獻不寐衛青在位淮南寢謀故賢人立朝折衝厭難勝於亡形司馬法曰天下雖安忘戰必危夫將不豫設則亡以應卒士不素厲則難使死敵是以先帝建列將之官近戚主內異姓距外故姦軌不得萌動而破滅誠萬世之長册也光祿勳慶忌行義修正柔毅敦厚謀慮深逺前在邊郡數破敵獲虜外夷莫不聞乃者大異並見未有其應加以兵革久寢春秋大災未至而豫禦之慶忌宜在爪牙官以備不虞其後拜為右將軍諸吏散騎給事中歲餘徙為左將軍慶忌居處恭儉食飲被服尤節約然性好輿馬號為鮮明唯是為奢為國虎臣遭世承平胸奴西域親附敬其威信年老卒官長子通為護羌校尉中子遵函谷關都尉少子茂水衡都尉出為郡守皆有將帥之風宗族支屬至二千石者十餘人元始中安漢公王莽秉政見慶忌本大將軍王鳯所成三子皆能欲親厚之是時莽方立威柄用甄豐甄邯以自助豐邯新貴威震朝廷水衡都尉茂自見其名臣子孫兄弟並列不甚詘事兩甄時平帝幼外家衛氏不得在京師而護羌校尉通長子次兄素與帝從舅衛子伯相善兩人俱遊俠賔客甚盛及吕寬事起莽誅衛氏兩甄搆言諸辛陰與衛子伯為腹心有背恩不説安漢公之謀於是司直陳崇舉奏其宗親隴西辛興等侵陵百姓威行州郡莽遂按通父子遵茂兄弟及南郡太守辛伯等皆誅殺之辛氏繇是廢慶忌本狄道人為將軍徙昌陵昌陵罷留長安班固曰秦漢以來山東出相山西出將秦將軍白起郿人王翦頻陽人漢興郁郅王圍甘延夀義渠公孫賀傅介子成紀李廣李蔡杜陵蘇建蘇武上邽上官桀趙充國襄武亷褒狄道辛武賢慶忌皆以勇武顯聞蘇辛父子著節此其可稱列者也其餘不可勝數何則山西天水隴西安定北地處藝迫近羌胡民俗修習戰備高上勇力鞍馬騎射故秦詩曰王于興師修我甲兵與子皆行其風聲氣俗自古而然今之歌謡慷慨風流猶存耳傅介子北地人也以從軍為官先是龜茲樓蘭皆嘗殺漢使者語在西域傳至元鳯中介子以駿馬監求使大宛因詔令責樓蘭龜兹國介子至樓蘭責其王教胸奴遮殺漢使大兵方至王茍不教胸奴胸奴使過至諸國何為不言王謝服言胸奴使屬過當至烏孫道過龜兹復責其王王亦服罪介子從大宛還到龜兹龜兹言胸奴使自烏孫還在此介子因率其吏士共誅斬胸奴使者還奏事詔拜介子為中郎遷平樂監介子謂大將軍霍光曰樓蘭龜兹數反覆而不誅無所懲艾介子過龜兹時其王近就人易得也願往刺之以威示諸國光曰龜茲道逺且驗之於樓蘭於是白遣之介子與士卒俱齎金幣揚言以賜外國為名至樓蘭王意不親介子介子陽引去至其西界使譯謂曰漢使者持黃金錦繡行賜諸國王不來受我去之西國矣即出金幣以示譯譯還報王王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王王起隨介子入帳中屏語壯士二人從後刺之刃交胸立死其貴人左右皆散走介子告諭以王負罪天子遣我來誅王當更立前太子質在漢者漢兵方至毋敢動動滅國矣遂持王首還詣闕公卿將軍議者咸嘉其功詔封介子為義陽侯食邑七百户士刺王者皆補侍郎介子薨子敞有罪不得嗣國除元始中繼功臣絶世封介子曽孫長為義陽侯王莽敗乃絶常惠太原人也少時家貧自奮應募隨栘中監蘇武使胸奴并見拘留十餘年昭帝時乃還漢嘉其勤勞拜為光祿大夫是時烏孫公主上書言胸奴發騎田車師車師與胸奴為一共侵烏孫唯天子救之漢飬士馬議欲擊胸奴會昭帝崩宣帝即位本始二年遣惠使烏孫公主及昆彌皆遣使因惠言胸奴連發大兵擊烏孫取車延惡師地收其人民去使使脅求公主欲隔絶漢昆彌願發國半精兵自給人馬五萬騎盡力擊胸奴唯天子出兵以救公主昆彌於是漢大發十五萬騎五將軍分道出語在胸奴傳以惠為校尉持節護烏孫兵昆彌自將翖侯以下五萬餘騎從西方入至右谷蠡庭谷蠡音鹿黎獲單于父行及嫂居次名王騎將以下三萬九千人得馬牛驢騾橐駝五萬餘匹羊六十餘萬頭烏孫皆自取鹵獲惠從吏卒十餘人隨昆彌還未至烏孫烏孫人盜惠印綬節惠還自以當誅時漢五將皆無功天子以惠奉使克獲遂封惠為長羅侯復遣惠持金幣還賜烏孫貴人有功者惠因奏請龜茲國嘗殺校尉賴丹未伏誅請便道擊之宣帝不許大將軍霍光風惠以便宜從事惠與吏士五百人俱至烏孫還過發西國兵二萬人令副使發龜兹東國一萬人烏孫兵七千人從三面攻龜兹兵未合先遣人責其王以前殺漢使狀王謝曰乃我先王時為貴人姑翼所誤耳我無罪惠曰即如此縳姑翼來吾置王王執姑翼詣惠惠斬之而還後代蘇武為典屬國明習外國事勤勞數有功甘露中後將軍趙充國薨天子遂以惠為右將軍典屬國如故元帝三年薨諡曰壯武侯傳國至曽孫建武中乃絶鄭吉會稽人也以卒伍從軍數出西域由是為郎吉為人疆執習外國事自張騫通西域李廣利征伐之後初置校尉屯田渠黎至宣帝時吉以侍郎田渠黎積榖因發諸國兵攻破車師遷衛司馬使獲鄯善以西南道神爵中胸奴乖亂日逐王先賢撣欲降漢使人與吉相聞吉發渠黎龜兹諸國五萬人迎日逐王口萬二千人小王將十二人隨吉至河曲頗有亡者吉追斬之遂將詣京師漢封日逐王為歸德侯吉既破車師降日逐威震西域遂并護車師以西北道故號護都護都之置自吉始焉上嘉其功封吉為安逺侯食邑千户吉於是中西域而立莫府治烏壘城鎮撫諸國誅伐懷集之漢之號令班西域矣始自張騫而成於鄭吉語在西域傳吉薨諡曰繆侯子光嗣薨無子國除元始中録功臣不以罪絶者封吉曽孫永為安逺侯甘延夀字君況北地郁郅人也少以良家子善騎射為羽林投石拔距絶於等倫嘗超踰羽林亭樓由是遷為郎試辨為期門以材力愛幸稍遷至遼東太守免官車騎將軍許嘉薦延夀為郎中諌大夫使西域都護騎都尉與副校尉陳湯共誅斬郅支單于封義成侯薨諡曰壯侯傳國至曽孫王莽敗乃絶陳湯字子公山陽瑕邱人也少好書博逹善屬文家貧丐貸無節不為州里所稱西至長安求官得太官獻食丞數嵗富平侯張勃與湯交高其能初元二年元帝詔列侯舉茂材勃舉湯湯待遷父死不奔喪司隸奏湯無修行勃選舉故不以實坐削户二百會薨因賜諡曰繆侯湯下獄論後復以薦為郎數求使外國久之遷西域副校尉與甘延夀俱出先是宣帝時胸奴乖亂五單于爭立呼韓邪單于與郅支單于俱遣子入侍漢兩受之後呼韓邪身入稱臣朝見郅支以為呼韓邪破弱降漢不能自還即西收右地會漢發兵送呼韓邪單于郅支由是遂西破呼偈堅昆丁令兼三國而都之怨漢擁護呼韓邪而不助己困辱漢使者江乃始等初元四年遣使奉獻因求侍子願為內附漢議遣衛司馬谷吉送之御史大夫貢禹博士匡衡以為春秋之義許夷狄者不一而足今郅支單于鄉化未淳所在絶逺宜令使者送其子至塞而還吉上書言中國與夷狄有羈縻不絶之義今既飬全其子十年德澤甚厚空絶而不送近從塞還示棄捐不畜使無鄉從之心棄前恩立後怨不便議者見前江乃始無應敵之數知勇俱困以致耻辱即豫為臣憂臣幸得建強漢之節承明聖之詔宣諭厚恩不宜敢桀若懷禽獸心加無道於臣則單于長嬰大罪必遁逃逺舍不敢近邊沒一使以安百姓國之計臣之願也願送至庭上以示朝者禹復爭以為吉往必為國取侮生事不可許右將軍馮奉世以為可遣上許焉既至郅支單于怒竟殺吉等郅支自知負漢又聞呼韓邪益強遂西奔康居康居以女妻郅支郅支亦以女豫康居王康居甚尊敬郅支欲倚其威以脅諸國郅支數借兵擊烏孫深入至赤谷城殺略人民驅畜産烏孫不敢追西邊空虛不居者且千里郅支單于自以大國威名尊重又乘勝驕不為康居王禮怒殺康居王女及貴人人民數百或支解投都賴水中發民作城日作五百人二歲乃已又遣使責闔蘇大宛諸國歲遺不敢不豫漢遣使三輩至康居求谷吉等死郅支困辱使者不肯奉詔而因都護上書言居困厄願歸計強漢遣子入侍其驕嫚如此建昭二年湯與延壽出西域湯為人沈勇有大慮多䇿謀喜竒功每過城邑山川常登望既領外國與延壽謀曰夷狄畏服大種其天性也西域本屬胸奴今郅支單于威名逺聞侵陵烏孫大宛常為康居畫計欲降服之如得此二國北擊伊列西取安息南排月氏山離烏弋數年之間城郭諸國危矣且其人剽悍好戰伐數取勝久畜之必為西域患郅支單于雖在絶逺蠻夷無金城強弩之守如發屯田吏士驅從烏孫衆兵直指其城下彼亡則無所之守則不足自保千載之功可一朝而成也延夀亦以為然欲奏請之湯曰國家與公卿議大䇿非凡所見事必不從延夀猶與不聼會其久病湯獨矯制發城郭諸國兵車師戊巳校尉屯田吏士延壽聞之驚起止焉湯按劔叱延夀曰大衆已集豎子欲沮衆邪延夀遂從之乃部勒行陳益置揚威白虎合騎之校漢兵胡兵合四萬餘人延壽湯上疏自劾奏矯制陳言兵狀即日引軍分行别為六校其三校從南道踰蔥嶺徑大宛其三校都護自將發溫宿國北道入赤谷過烏孫涉康居界至闐池西而康居副王抱闐將數千騎寇赤谷城東殺略大昆彌千餘人驅畜産甚多從後與漢軍相及頗寇盜後重湯縱胡兵擊之殺四百六十人得其所略民四百七十人還付大昆彌其馬牛羊以給軍食又捕得抱闐貴人伊奴毒入康居東界令軍不得為寇間呼其貴人屠墨見之諭以威信與飲盟遣去徑引行未至單于城可六十里止營復捕得康居貴人貝色子男開牟以為導貝色子即屠墨母之弟母之弟即謂舅者皆怨單于由是具知郅支情明日引行未至城三十里止營單于遣使問漢兵何以來應曰單于上書言居困厄願歸計強漢身入朝見天子哀閔單于棄大國屈意康居故使都護將軍來迎單于妻子恐左右驚動故未敢至城下使數往來相答報延夀湯因讓之我為單于逺來而至今無名王貴人見將軍受事者何單于忽大計失主客之禮也兵來道逺人畜罷極食度且盡恐無以自還願單于與大臣審計䇿明日前至郅支城都賴水上離城三里止營傅陳望見單于城上立五采幡織數百人被甲乘城又出百餘騎往來馳城下步兵百餘人夾門魚鱗陳講習用兵城上人更招漢軍曰鬭來百餘騎馳赴營營皆張弩持滿指之騎引却頗遣吏士射城門騎步兵騎步兵皆入延壽湯令軍聞鼓音皆薄城下四面圍城各有所守穿塹塞門户鹵楯為前戟弩為後卬射城中樓上人樓上人下走土城外有重木城從木城中射頗殺傷外人外人發薪燒木城夜數百騎欲出外迎射殺之初單于聞漢兵至欲去疑康居怨己為漢內應又聞烏孫諸國兵皆發自以無所之郅支已出復還曰不如堅守漢兵逺來不能久攻單于乃被甲在樓上諸閼氏夫人數十皆以弓射外人外人反射中單于鼻諸夫人頗死單于下騎傳戰大內夜過半木城穿中人郤入土城乘城呼時康居兵萬餘騎分為十餘處四面環城亦相與應和夜數奔營不利輒郤平眀四面火起吏士喜大呼乘之鉦鼓聲動地康居兵引郤漢兵四面推鹵楯並入土城中單于男女百餘人走入大內漢兵縱火吏士爭入單于被創死軍候假丞杜勳斬單于首得漢使節二及谷吉等所齎帛書諸鹵獲以畀得者凡斬閼氏太子名王以下千五百一十八級生虜百四十五人降虜千餘人賦豫城郭諸國所發十五王於是延壽湯上疏曰臣聞天下之大義當混為一昔有唐虞今有強漢胸奴呼韓邪單于已稱北藩唯郅支單于未伏其辜大夏之西以為強漢不能臣也郅支單于慘毒行於民大惡通於天臣延夀臣湯將義兵行天誅賴陛下神靈隂陽並應天氣精眀陷陳克敵斬郅支首及名王以下宜縣頭稿街蠻夷邸間以示萬里明犯強漢者雖逺必誅事下有司丞相匡衡御史大夫繁延夀以為郅支及名王首更歷諸國蠻夷莫不聞知月令春掩骼埋胔之時宜勿縣車騎將軍許嘉右將軍王商以為春秋夾谷之會優施笑君孔子誅之方盛夏手足異門而出宜縣十日乃埋之有詔將軍議是初中書令石顯嘗欲以姊妻延夀延夀不取及丞相御史亦惡其矯制皆不與湯湯素貪所鹵獲財物入塞多不法司𨽻校尉移書道上繫吏士按驗之湯上疏言臣與吏士共誅郅支單于幸得禽滅萬里振旅宜有使者迎勞道路今司𨽻反逆收繫按驗是為郅支報讎也上立出吏士令縣道具酒食以過軍既至論功石顯匡衡以為延壽湯擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乘危徼幸生事於蠻夷為國招難漸不可開元帝內嘉延夀湯功而重違衡顯之議議久不決故宗正劉向上疏曰郅支單于囚殺使者吏士以百數事暴揚外國傷威毁重羣臣皆閔焉陛下赫然欲誅之意未嘗有忘西域都護延夀副校尉湯承聖指倚神靈總百蠻之君攬城郭之兵出百死入絶域遂蹈康居屠三重城搴歙侯之旗斬郅支之首縣旌萬里之外揚威昆山之西掃谷吉之耻立昭明之功萬夷懾伏莫不懼震呼韓邪單于見郅支已誅且喜且懼鄉風馳義稽首來賓願守北藩纍世稱臣立千載之功建萬世之安羣臣之勳莫大焉昔周大夫方叔吉甫為宣王誅獫狁而百蠻從其詩曰嘽嘽焞焞如霆如雷顯允方叔征伐獫狁蠻荆來威易曰有嘉折首獲匪其醜言美諸首惡之人而諸不順者皆來從也今延夀湯所誅震雖易之折首詩之雷霆不能及也論大功者不録小過舉大美者不疵細瑕司馬法曰軍賞不踰月欲民速得為善之利也蓋急武功重用人也吉甫之歸周厚賜之其詩曰吉甫宴喜既多受祉來歸自鎬我行永久千里之鎬猶以為逺况萬里之外其勤至矣延夀湯既未獲受祉之報反屈捐命之功久挫於刀筆之前非所以勸有功厲戎士也昔齊桓前有尊周之功後有滅項之罪君子以功覆過而為之諱行事貮師將軍李廣利捐五萬之師靡億萬之費經四年之勞而厪獲駿馬三十匹雖斬宛王母鼓之首猶不足以復費其私罪惡甚多孝武以為萬里征伐不録其過遂封拜兩侯三卿二千石百有餘人今康居國強於大宛郅支之號重於宛王殺使者罪甚於留馬而延夀湯不煩漢士不費斗糧比於二師功德百之且常惠隨欲擊之烏孫鄭吉迎自來之日逐猶皆裂土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓二師近事之功則髙於安逺長羅而大功未著小惡數布臣切痛之宜以時解縣通籍除過勿治尊寵爵位以勸有功於是天子下詔曰胸奴郅支單于背畔禮義留殺漢使者吏士甚逆道理朕豈忘之哉所以優遊而不征者重動師衆勞將帥故隱忍而未有云也今延夀湯暏便宜乘時利結城郭諸國擅興師矯制而征之賴天地宗廟之靈誅討郅支單于斬獲其首及閼氏貴人名王以下千數雖踰義干法內不煩一夫之役不開府庫之藏因敵之糧以贍軍用立功萬里之外威震百蠻名顯四海為國除殘兵革之原息邊竟得以安然猶不免死亡之患罪當在於奉憲朕甚閔之其赦延夀湯罪勿治詔公卿議封焉議者以為宜如軍法捕斬單于令匡衡石顯以為郅支本亡逃失國竊號絶域非真單于元帝取安逺侯鄭吉故事封千户衡顯復爭乃封延夀為義成侯賜湯爵關內侯食邑各三百户加賜黃金百斤告上帝宗廟大赦天下拜延夀為長水校尉湯為射聲校尉延夀遷城門校尉護軍都尉薨於官成帝初即位丞相衡復奏湯以吏二千石奉使顓命蠻夷中不正身以先下而盜所收康居財物戒官屬曰絶域事不覆校雖在赦前不宜處位湯坐免後湯上疏言康居侍子非王子也按驗實王子也湯下獄當死太中大夫谷永上疏訟湯曰臣聞楚有子玉得臣文公為之仄席而坐趙有亷頗馬服強秦不敢窺兵井陘近漢有郅都魏尚胸奴不敢南鄉沙幕由是言之戰克之將國之爪牙不可不重也蓋君子聞鼓鼙之聲則思將率之臣竊見關內侯陳湯前使副西域都護忿郅支之無道閔王誅之不加䇿慮愊億義勇奮發卒興師奔逝橫厲烏孫踰集都賴屠三重城斬郅支首報十年之逋誅雪邉吏之宿耻威震百蠻武暢西海漢元以來征伐方外之將未嘗有也今湯坐言事非是幽囚久繫歷時不決執憲之吏欲致之大辟昔白起為秦將南拔郢都北坑趙括以纎介之過賜死杜郵秦民憐之莫不隕涕今湯親秉鉞席卷喋血萬里之外薦功祖廟告類上帝介胄之士靡不慕義以言事為罪無赫赫之惡周書曰記人之功忘人之過宜為君者也夫犬馬有勞於人尚加帷蓋之報况國之功臣者哉竊恐陛下忽於鼙鼓之聲不察周書之意而忘帷幄之施庸臣遇湯卒從吏議使百姓介然有秦民之恨非所以厲死難之臣也書奏天子出湯奪爵為士伍後數嵗西域都護假會宗為烏孫所圍驛騎上書願發城郭燉煌兵以自救丞相王商大將軍王鳯及百僚議數日不決鳯言湯多籌䇿習外國事可問上召湯見宣室湯擊郅支時中寒病兩臂不詘申湯入見有詔毋拜示以會宗奏湯辭謝曰將相九卿皆賢材通眀小臣罷癃不足以䇿大事上曰國家有急君其毋讓對曰臣以為此必無可憂也上曰何以言之湯曰夫胡兵五而當漢兵一何者兵刃朴鈍弓弩不利今聞頗得漢巧然猶三而當一又兵法曰客倍而主人半然後敵今圍會宗者人衆不足以勝會宗唯陛下勿憂且兵輕行五十里重行三十里今會宗欲發城郭燉煌歷時乃至所謂報讎之兵非救急之用也上曰奈何其解可必乎度何時解湯知烏孫瓦合不能久攻故事不過數日因奏曰已解矣詘指計其日曰不出五日當有吉語聞居四日軍書到言已解大將軍王鳯奏以為從事中郎莫府事一決於湯湯明法令善因事為藝納説多從常受人金錢作章奏卒以此敗初湯與將作大匠解萬牛相善自元帝時渭陵不復徙民起邑成帝起初陵數年後樂霸陵曲亭南更營之萬年與湯議以為武帝時工楊光以所作數可意自致將作大匠及大司農中丞耿夀昌造杜陵賜爵關內侯將作大匠乘馬延年以勞苦秩中二千石今作初陵而營起邑居成大功萬年亦當蒙重賞子公妻家在長安兒子生長長安不樂東方宜求徙可得賜田宅俱善湯心利之即上封事言初陵京師之地最為肥美可立一縣天下民不徙諸陵三十餘歲矣關東富人益衆多規良田役使貧民可徙諸陵以強京師衰弱諸侯又使中家以下得均貧富湯願與妻子家屬徙初陵為天下先於是天子從其計果起昌陵邑後徙內郡國民萬年自詭三年可成後卒不就羣臣多言其不便者下有司議皆曰昌陵因卑為髙積土為山度便房猶在平地上客土之中不保幽冥之靈淺外不固卒徒工庸以巨萬數至㸐脂火夜作取土東山且與穀同賈作治數年天下遍被其勞國家罷敝府藏空虛下至衆庶熬熬苦之故陵因天性據真土處藝髙敞旁近祖考前又已有十年功緒宜還復故陵勿徙民上乃下詔罷昌陵語在成紀丞相御史請廢昌陵邑中室奏未下人以問湯第宅不徹得毋復發徙湯曰縣官且順聼羣臣言猶且復發徙之也時成都侯啇新為大司馬衛將軍輔政素不善湯商聞此語白湯惑衆下獄治案驗諸所犯湯前為騎都尉王莽上書言父早死獨不封母眀君共飬皇太后尤勞苦宜封竟為新都侯後皇太后同母弟茍參為水衡都尉死子伋為侍中參妻欲為伋求封湯受其金五十斤許為求比上奏𢎞農太守張匡坐臧百萬以上狡猾不道有詔即訊恐下獄使人報湯湯為訟罪得踰冬月許謝錢二百萬皆此類也事在赦前後東萊郡黑龍冬出人以問湯曰是所謂元門開微行數出出入不時故龍以非時出也又言當復發徙傳相語者十餘人丞相御史奏湯惑衆不道妄稱詐歸異於上非所宜言大不敬廷尉增壽議以為不道無正法以所犯劇易為罪臣下承用失其中故移獄廷尉無比者先以聞所以正刑罰重人命也明主哀憫百姓下制書罷昌陵勿徙吏民己申布湯妄以意相謂且復發徙雖頗驚動所流行者少百姓不為變不可謂惑衆湯稱詐虛設不然之事非所宜言大不敬也制曰廷尉增壽當是湯前有討郅支單于功其免湯為庶人徙邊又曰故將作大匠萬年佞邪不忠妄為巧詐多賦斂煩繇役興卒暴之作卒徒蒙辜死者連屬毒流衆庶海內怨望雖蒙赦令不宜居亰師於是湯與萬年俱徙燉煌久之敦煌太守奏湯前親誅郅支單于威行外國不宜近邊塞詔徙安定議郎耿育上書言便宜因寃訟湯曰延壽湯為聖漢揚鈎深致逺之威雪國家纍年之耻討絶域不羈之君係萬里難制之虜豈有比哉先帝嘉之仍下眀詔宣著其功改年垂厯傳之無窮應是南郡獻白虎邊垂無警備會先帝寢疾然猶垂意不忘數使尚書責問丞相趣立其功獨丞相匡衡排而不豫封延夀湯數百户此功臣戰士所以失望也孝成皇帝承建業之基乘征伐之威兵革不動國家無事而大臣傾邪讒佞在朝曽不深惟本末之難以防未然之戒欲專主威排妒有功使湯塊然被寃拘囚不能自明卒以無罪老棄敦煌正當西域通道令威名折衝之臣旋踵及身復為郅支遺虜所笑誠可悲也至今奉使外蠻者未嘗不陳郅支之誅以揚漢國之盛夫援人之功以懼敵棄人之身以快讒豈不痛哉且安不忘危盛必慮衰今國家素無文帝纍年節儉富饒之畜又無武帝薦延梟俊禽敵之臣獨有一陳湯耳假使異世不及陛下尚望國家追録其功封表其墓以勸後進也湯幸得身當聖世功曽未久反聼邪臣鞭逐斥逺使亡逃分竄死無處所逺覽之士莫不計度以為湯功纍世不可及而湯過人情所有湯尚如此雖復破絶筋骨暴露形骸猶復制於唇舌為疾妒之臣所係虜耳此臣所以為國家尤戚戚也書奏天子還湯卒於長安死後數年王莽為安漢公秉政既內德湯舊恩又欲讇皇太后以討郅支功尊元帝廟稱髙宗以湯延夀前功大賞薄及假丞杜勳不賞乃益封延夀孫遷千六百户追諡湯曰破胡壯侯封湯子馮為破胡侯勳為討狄侯假會宗字子松天水上邽人也竟寧中以杜陵令五府舉為西域都護騎都尉光祿大夫西域敬其威信三歲更盡還拜為沛郡太守以單于當朝徙為鴈門太守數年坐法免西域諸國上書願得會宗陽朔中復為都護會宗為人好大節矜功名與谷永相友善谷永閔其老復逺出豫書戒曰足下以柔逺之令德復典都護之重職甚休甚休若子之材可優遊都城而取卿相何必勒功昆山之仄總領百蠻懷柔殊俗子之所長愚無以喻雖然明友以言贈行敢不略意方今漢德隆盛逺人賓服傅鄭甘陳之功沒齒不可復見願吾子因循舊貫毋求竒功終更亟還亦足以復鴈門之踦萬里之外以身為本願詳思愚言會宗既出諸國遣子弟郊迎小昆彌安日前為會宗所立德之欲往謁諸翖侯止不聼遂至龜茲謁城郭甚親附康居太子保蘇匿率衆萬餘人欲降會宗奏狀漢遣衛司馬逄迎會宗發戊巳校尉兵隨司馬受降司馬畏其衆欲令降者皆自縳保蘇匿怨望舉衆亡去會宗更盡還以擅發戊巳校尉之兵乏興有詔贖論拜為金城太守以病免歲餘小昆彌為國民所殺諸翖侯大亂徴會宗為左曺中郎將光祿大夫使安輯烏孫立小昆彌兄末振將定其國而還明年末振將殺大昆彌會病死漢恨誅不加元延中復遣會宗發戊巳校尉諸國兵即誅末振將太子番丘會宗恐大兵入烏孫驚番丘亡逃不可得留所發兵墊婁地選精兵三十弩徑至昆彌所在召番邱責以末振將骨肉相殺殺漢公主子孫未伏誅而死使者受詔誅番邱即手劔擊番邱官屬以下驚恐馳歸小昆彌烏犁靡者末振將兄子也勒兵數千騎圍會宗會宗為言來誅之意今圍守殺我如取漢牛一毛耳宛王郅支頭縣藁街烏孫所知也昆彌以下服曰末振將負漢誅其子可也獨不可告我令飲食之邪會宗曰豫告昆彌逃匿之為大罪即飲食以付我傷骨肉恩故不先告昆彌以下號泣罷去會宗還奏事公卿議會宗權得便宜以輕兵入烏孫即誅番邱宣眀國威宜加重賞天子賜會宗爵關內侯黃金百斤是時小昆彌季父卑爰疐擁衆欲害昆彌漢復遣會宗使安輯與都護孫建并力明年會宗病死烏孫中年七十五矣城郭諸國為發喪立祠焉班固曰自元狩之際張騫始通西域至于地節鄭吉建都護之號訖王莽世凡十八人皆以勇略選然其有功迹者具此亷褒以恩信稱郭舜以亷平著孫建用威重顯其餘無稱焉陳湯儻􅛅不自收斂卒用困窮議者閔之胡建字子孟河東人也孝武天漢中守軍正丞貧無車馬常步與走卒起居所以尉薦走卒甚得其心時監軍御史為姦穿北軍壘垣以為賈區為買物之區也區廬舍也建欲誅之乃約其走卒曰我欲與公有所誅吾言取之則取斬之則斬於是當選士馬日監御史與護軍諸校列坐堂皇上建從走卒趍至堂皇下拜謁因上堂皇走卒皆上建指監御史曰取彼走卒前曵下堂皇建曰斬之遂斬御史護軍諸校皆驚愕不知所以建亦已有成奏在其懷中遂上奏曰臣聞軍法立武以威衆誅惡以禁邪今御史公穿軍垣以求賈利私買賣以與士市不立剛毅之心勇猛之節亡以帥先士大夫尤失理不公用文吏議不至重法黃帝李法曰兵書之法李法官之號壁壘已定穿窬不繇路是謂姦人姦人者殺臣謹按軍法曰正亡屬將軍將軍有罪以聞二千石以下行法焉丞於用法疑執事不諉上臣謹以斬昧死以聞制曰司馬法曰國容不入軍軍容不入國何文吏也三王或誓於軍中欲民先成其慮也或誓於軍門之外欲民先意以待事也或將交刃而誓致民志也建又何疑焉建由是顯名後為渭城令治甚有聲值昭帝幼皇后父上官將軍安與帝姊蓋主私夫丁外人相善外人驕恣怨故京兆尹樊福使客射殺之客藏公主廬吏不敢捕建將吏卒圍捕蓋主聞之與外人上官將軍多從奴客往奔射追吏吏散走主使僕射劾渭城遊徼傷主家奴建報亡它坐蓋主怒使人上書告建侵辱長公主射甲舍門知吏賊傷奴辟報故不窮審大將軍霍光寢其奏後光病上官氏代聼事下吏捕建建自殺吏民稱寃至今渭城立其祠朱雲字遊魯人也徙平陵少時通輕俠借客拜仇長八尺餘容貌甚壯以勇力聞年四十乃變節從博士白子友受易又事前將軍蕭望之受論語皆能傳其業好倜儻大節當世以是髙之元帝時琅邪貢禹為御史大夫而華隂守丞嘉上封事言治道在於得賢御史之官宰相之副九卿之右不可不選平陵朱雲兼資文武忠正有智略可使以六百石秩試守御史大夫以盡其能上乃下其事問公卿太子少傅匡衡對曰大臣者國家之股肱萬姓所瞻仰眀主所慎擇也傳曰下輕其上爵賤人圖柄臣則國家搖動而民不靜矣今嘉從守丞而圖大臣之位欲以匹夫徒步之人而超九卿之右非所以重國家尊社稷也自堯之用舜文王於太公猶試焉然後爵之又况朱雲者乎雲素好勇數犯法亡命受易頗有師道其行義未有以異今御史大夫禹潔白亷正經術通明有伯夷史魚之風海內莫不聞知而嘉猥稱雲欲令為御史大夫妄相稱舉疑有姦心漸不可長宜下有司案驗以眀好惡嘉竟坐之是時少府五鹿充宗貴幸為梁邱易自宣帝時善梁邱氏説元帝好之欲考其同異令充宗與諸易家論充宗乘貴辨口諸儒莫能與抗皆稱疾不敢會有薦雲者召入攝齊升堂抗首而請音動左右既論難連拄五鹿君故諸儒為之語曰五鹿嶽嶽朱雲折其角繇是為博士遷杜陵令坐故縱亡命會赦舉方正為槐里令時中書令石顯用事與充宗為黨百僚畏之唯御史中丞陳咸年少抗節不附顯等而與雲相結雲數上疏言丞相韋元成容身保位亡能往來而咸素毁石顯久之有司考雲疑風吏殺人羣臣朝見上問丞相以雲治行丞相元成言雲暴虛無狀時陳咸在前聞之以語雲雲上書自訟咸為定奏草求下御史中丞事下丞相丞相部吏考立其殺人狀雲亡入其安復與咸計議丞相具發其事奏咸宿衛執法之臣幸得進見漏泄所聞以私語雲為定奏草欲令自下治後知雲亡命罪人而與交通雲以故不得上於是下咸獄減死為城旦咸雲遂廢錮終元帝之世至丞相安昌侯張禹以帝師位特進甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下亡以益民皆尸位素餐孔子所謂鄙夫不可與事君苟患失之亡所不至者也臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干遊於地下足矣未知聖朝何如耳御史遂將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已及治殿檻上曰勿易因而輯之以旌直臣雲自是之後不復仕常居鄠田時出乘牛車從諸生所過皆敬事焉薛宣為丞相雲往見之宣備賓主禮因留雲宿從容謂雲曰在田野亡事且留我東閣可以觀四方奇士雲曰小生乃欲相吏邪宣不敢復言其教授擇諸生然後為弟子九江嚴望及望兄子元字仲能傳雲學皆為博士望至泰山太守雲年七十餘終於家病不呼醫飲藥遺言以身服殮棺周於身土周於椁為丈五墳葬平陵東郭外梅福字子真九江壽春人也少學長安明尚書穀梁春秋為郡文學補南昌尉後去官歸壽春數因縣道上言變事求假軺傳詣行在所條對急政輒報罷是時成帝委任大將軍王鳯鳯專藝擅朝而京兆尹王章素忠直譏刺鳯為鳯所誅王氏浸盛災異數見羣下莫敢正言福復上書曰臣聞箕子佯狂於殷而為周陳洪範叔孫通遁秦歸漢制作儀品夫叔孫先非不忠也箕子非疏其家而畔親也不可為言也昔高祖納善若不及從諌若轉圜聼言不求其能舉功不考其素陳平起於亡命而為謀主韓信拔於行陳而建上將故天下之士雲合歸漢爭進奇異知者竭其䇿愚者盡其慮勇士極其節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚若拾遺此高祖所以亡敵於天下也孝文皇帝起於代谷非有周召之師伊吕之佐也循高祖之法加以恭儉當此之時天下幾平由是言之循高祖之法則治不循則亂何者秦為亡道削仲尼之迹滅周公之軌壞井田除五等禮廢樂崩王道不通故欲行王道者莫能致其功也孝武皇帝好忠諌説至言出爵不待亷茂慶賜不須顯功是以天下布衣各厲志竭精以赴闕庭自衒鬻者不可勝數漢家得賢於此為盛使孝武皇帝聼用其計升平可致於是積尸暴骨快心胡越故淮南王安緣間而起所以計慮不成而謀議泄者以衆賢聚於本朝故其大臣藝陵不敢和從也方今布衣乃窺國家之隙見間而起者蜀郡是也及山陽亡徒蘇令之羣蹈藉名都大郡求黨與索隨和而亡逃匿之意此皆輕量大臣亡所畏忌國家之權輕故匹夫欲與上爭衡也士者國之重器得士則重失士則輕詩云濟濟多士文王以寧廟堂之議非草茅所當言也臣誠恐身塗野草尸並卒伍故數上書求見輒報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩關自鬻繆公行伯繇余歸德今欲致天下之士民有上書求見者輒使詣尚書問其所言言可采取者秩以升斗之祿賜以一束之帛若此則天下之士發憤悶吐忠言嘉謨日聞於上天下條貫國家表裏爛然可賭矣夫以四海之廣士民之數能言之類至衆多也然其雋桀指世陳政言成文章質之先聖而不謬施之當世合時務若此者亦無幾人故爵祿束帛者天下之底石高祖所以厲世磨鈍也孔子曰工欲善其事必先利其器至秦則不然張誹謗之罔以為漢驅除倒持泰阿授楚其柄故誠能勿失其柄天下雖有不順莫觸其鋒此孝武皇帝所以辟地建功為漢世宗也今不循伯者之道乃欲以三代選舉之法取當世之士猶察伯樂之圖求騏驥於市而不可得亦已明矣故髙祖棄陳平之過而獲其謀晉文召天王齊桓用其讎亡益於時不顧逆順此所謂伯道者也一色成體謂之醇白黑雜合謂之駮欲以承平之法治暴秦之緒猶以鄉飲酒之禮理軍市也今陛下既不納天下之言又加戮焉夫鳶鵲遭害則仁鳥增逝愚者受戮則知士深退間者愚民上疏多觸不急之法或下廷尉而死者衆自陽朔以來天下以言為諱朝廷尤甚羣臣皆承順上指莫有執正何以明其然也取民所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠直敢面引廷爭孝元皇帝擢之以厲具臣而矯曲朝及至陛下戮及妻子且惡惡止其身王章非有反畔之辜而殃及家折直士之節結諌臣之舌羣臣皆知其非然不敢爭天下以言為戒最國家之大患也願陛下循高祖之軌杜亡秦之路數御十月之歌留意亡逸之戒除不急之法下亡諱之詔博覽兼聼謀及疏賤令深者不隱逺者不塞所謂闢四門明四目也且不急之法誹謗之微者也往者不可及來者猶可追方今君命犯而主威奪外戚之權日以益隆陛下不見其形願察其景建始以來日食地震以率言之三倍春秋水災亡與比數隂盛陽微金鐡為飛此何景也漢興以來社稷三危吕霍上官皆母后之家也親親之道全之為右與之賢師良傅教以忠孝之道今乃尊寵其位授以魁柄使之驕逆至於夷滅此失親親之大者也自霍光之賢不能為子孫慮故權臣易世則危書曰毋若火始庸庸藝陵於君權隆於主然後防之亦亡及己上遂不納成帝久亡繼嗣福以為宜建三統封孔子之世以為殷後復上書曰臣聞不在其位不謀其政政者職也位卑言高者罪也越職觸罪危言世患雖伏質橫分臣之願也守職不言沒齒身全死之日尸未腐而名滅雖有景公之位伏歷千駟臣不貪也故應一登文石之陛涉赤墀之塗當户牖之法坐盡平生之愚慮亡益於時有遺於世此臣寢所以不安食所以忘味也願陛下深省臣言臣聞存人所以自立也壅人所以自塞也善惡之報各如其事昔者秦滅二周夷六國隱士不顯佚民不舉絶三統滅天道是以身危子殺厥孫不嗣所謂壅人以自塞者也故武王克殷未下車存五帝之後封殷於宋紹夏於把明著三統示不獨有也是以姬姓半天下遷廟之主流出於户所謂存人以自立者也今成湯不祀殷人亡後陛下繼嗣久微殆為此也春秋經曰宋殺其大夫榖梁傳曰其不稱名姓以其在祖位尊之也此言孔子故殷後也雖不正統封其子孫以為殷後禮亦宜之何者諸侯奪宗聖庶奪適傳曰賢者子孫宜有土而况聖人又殷之後哉昔成王以諸侯禮葬周公而皇天動威雷風著災今仲尼之廟不出闕里孔氏子孫不免編户以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天亡極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉福孤逺又譏切王氏故終不見納初武帝時始封周後姬嘉為周子南君元帝時尊周子南君為周承休侯位次諸侯王使諸大夫博士求殷後分散為十餘姓郡國往往得其大家推求子孫絶不能紀時匡衡議以為王者存三王後所以尊其先王而通三統也其犯誅絶之罪者絶而更封他親為始封君上承其王者之始祖春秋之義諸侯不能守其社稷者絶今宋國已不守其統而失國矣則宜更立殷後為始封君而上承湯統非當繼宋之絶侯也宜明得殷後而已今之故宋推求其嫡久逺不可得雖得其嫡嫡之先已絶不當得立禮記孔子曰丘殷人也先師所共傳宜以孔子世為湯後上以其語不經遂見寢至成帝時梅福復言宜封孔子後以奉湯祀綏和二年立二王後推迹古文以左氏穀梁世本禮記相明遂下詔封孔子世為殷紹嘉公語在成紀是時福居家常以讀書養性為事至元始中王莽顓政福一朝棄妻子去九江至今傳以為仙其後人有見福於會稽者變名姓為吳門市卒云云敞字幼孺平陵人也師事同縣吳章章治尚書經為博士平帝以中山王即帝位年幼王莽秉政自號安漢公以平帝為成帝後不得顧私親帝母及外家衛氏皆留中山不得至京師莽長子宇非莽隔絶魏氏恐帝長大後見怨宇與吳章謀夜以血塗莽第門若鬼神之戒冀以懼莽章欲因對其咎事發覺莽殺宇誅滅衛氏謀所聨及死者百餘人章坐要斬磔尸東市門初章為當世名儒教授尤盛弟子千餘人莽以為惡人黨皆當禁錮不得仕宦門人盡更名他師敞時為大司徒掾自劾吳章弟子抱章尸歸棺斂葬之京師稱焉車騎將軍王舜高其志節比之欒布表奏以為掾薦為中郎諌大夫莽纂位王舜為太師復薦敞可輔職以病免唐林言敞可典郡擢為魯郡大尹更始時安車徴敞為御史大夫復病免去卒于家雋不疑雋徂兖反字曼倩勃海人也治春秋為郡文學進退必以禮名聞州郡武帝末郡國盜賊羣起暴勝之為直指使者衣繡衣持斧逐捕盜賊督課郡國東至海以軍興誅不從命者威震州郡勝之素聞不疑賢至渤海遣吏請與相見不疑冠進賢冠帶櫑具劍古者長劍首以玉作井鹿盧形上刻木作山形似蓮花初生時未敷也今大劍木首其狀似此佩環玦褒衣博帶盛服至門上謁門下欲使解劍不疑曰劍者君子武偹所以衛身不可解請退吏白勝之勝之開閣延請望見不疑容貌尊嚴衣冠甚偉勝之屣履起迎登堂坐定不疑據地曰竊伏海瀕聞暴公子威名舊矣今乃承顔接辭凡為吏太剛則折太柔則廢威行施之以恩然後樹功揚名永終天祿勝之知不疑非庸人敬納其戒深接以禮意問當世所施行門下諸從事皆州郡選吏伏側聼不疑莫不驚駭至昏夜罷去勝之遂表薦不疑徴詣公車拜為青州刺史久之武帝崩昭帝即位而齊孝王孫劉澤交結郡國豪傑謀反欲先殺青州刺史不疑發覺收捕皆伏其辜擢為京兆尹賜錢百萬京兆吏民敬其威信每行縣録囚徒録力具反還其母輒問不疑有所平反反音番從輕也活幾何人即不疑多有所平反母喜笑為飲食語言異於他時或無所出母怒為不食故不疑為吏嚴而不殘始元五年有一男子乘黃犢車建黃旐衣黃襜褕著黃帽詣兆闕自謂衛太子公車以聞詔使公卿將軍二千石雜識視長安中吏民聚觀者數萬人右將軍勒兵闕下以備非常丞相御史二千石至者並莫敢發言京兆尹不疑後到叱吏收縛或曰是非未可知且安之不疑曰諸君何患於衛太子昔太子蒯聵違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍光聞而嘉之曰公卿大臣當用經術士明於大誼由是名聲重於朝廷在位者皆自以為不及也大將軍光欲以女妻之不疑固辭不肯當久之以病免終於家京師紀之後趙廣漢為京兆尹言我禁姦止邪行於吏民至於朝廷事不及不疑逺甚廷尉驗治何人竟得姦詐本夏陽人姓成名方遂居湖以卜筮為事有故太子舍人嘗從方遂卜謂曰子狀貌甚似太子方遂心利其言幾得以富貴即詐自稱詣闕廷尉逮召鄉里識知者張宗祿等方遂坐誣罔不道要斬東市一姓張名延年踈廣字仲翁東海蘭陵人也少好學明春秋家居教授學者自逺方至徴為博士太中大夫地節三年立皇太子選丙吉為太傅廣為少傅數月吉遷御史大夫廣徙為太傅廣兄子受字公子亦以賢良舉為太子家令受好禮恭謹敏而有辭宣帝幸太子宫受迎謁應對及置酒宴奉觴上夀辭理間雅上甚歡説頃之拜受為少傅太子外祖父特進平恩侯許伯以為太子少白使其弟中郎將舜監護太子家上以問廣廣對曰太子國儲副君師友必求天下英俊不宜獨親外家許氏且太子自有太傅少傅官屬已偹今復使舜護太子家視陋非所以廣太子德於天下也上善其言以語丞相魏相相免冠謝曰此非臣等所能及廣由是見器重數受賞賜太子每朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮在位五歲皇太子年十二通論語孝經廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕宦至二千石宦成名立如此不去懼有後悔豈如父子相隨出關歸老故鄉以壽命終不亦善乎受叩頭曰從大人議即日父子俱移病滿三月賜告廣遂稱篤上疏乞骸骨上以其年篤老皆許之加賜黃金二十斤皇太子贈以五十斤公卿大夫故人邑子設祖道供張東都門外長安東郭門送者車數百兩辭決而去及道路觀者皆曰賢哉二大夫或歎息為之下泣廣既歸鄉里日令家共具設酒食請族人故舊賔客與相娛樂數問其家金餘尚有幾所趣賣以共具歲餘廣子孫竊謂其昆弟老人廣所信愛者曰子孫幾及君時頗立産業基址今日飲食費且盡宜從丈人所勸説君買田宅老人即以間暇時為廣言此計廣曰吾豈老悖不念子孫哉顧自有舊田廬令子孫勤力其中足以共衣食與凡人齊今復增益之以為嬴餘但教子孫怠惰耳賢而多財則損其志愚而多財則益其過且夫富者衆之所怨也吾既無以教化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與鄉黨宗族共饗其賜以盡吾餘日不亦可乎於是族人説服皆以壽終于定國字曼倩東海郯人也其父于公為縣獄史郡決曹決獄平羅文法者于公所決皆不恨郡中為之立生祠號曰于公祠東海有孝婦少寡亡子養姑甚謹姑欲嫁之終不肯姑謂鄰人曰孝婦事我勤苦哀其亡子守寡我老久絫丁壯奈何其後姑自經死姑女告吏婦殺我母吏捕孝婦孝婦辭不殺姑吏驗治孝婦自誣服具獄上府于公以為此婦養姑十餘年以孝聞必不殺也太守不聼于公爭之弗能得乃抱其具獄哭於府上因辭疾去太守竟論殺孝婦郡中枯旱三年後太守至卜筮其故于公曰孝婦不當死前太守強斷之咎儻在是乎於是太守殺牛自祭孝婦冢因表其墓天立大雨歲熟郡中以此大敬重于公定國少學法於父父死後定國亦為獄史郡決曺補廷尉史以選與御史中丞從事治反者獄以材高舉侍御史遷御史中丞會昭帝崩昌邑王徴即位行淫亂定國上書諌後王廢宣帝立大將軍霍光領尚書事條奏羣臣諌昌邑王者皆超遷定國由是為光祿大夫平尚書事甚見任用數年遷水衡都尉超為廷尉定國乃迎師學春秋身執經北面備弟子禮為人謙恭尤重經術士雖卑賤徒步往過定國皆與均禮恩敬甚備學士咸稱焉其決疑平法務在哀矜罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃定國食酒至數石不亂冬月治請讞飲酒益精眀為廷尉十八歲遷御史大夫甘露中代黃霸為丞相封西平侯元帝立以定國任職舊臣敬重之時陳萬年為御史大夫與定國並位八年論議無所拂後貢禹代為御史大夫數處駮議定國明習政事率常丞相議可然上始即位關東連年被災害民流人關言事者歸咎於大臣上於是數以朝日引見丞相御史入受詔條責以職事定國上書謝罪永光元年春霜夏寒日青亡光上復以詔條責丞相御史定國惶恐上書自劾歸侯印乞骸骨不許遂稱篤固辭上乃賜安車駟馬黃金六十斤罷就第數歲年七十薨諡曰安侯子永嗣少時耆酒多過失年且三十乃折節修行以父任為侍中中郎將長水校尉定國死居喪如禮孝行聞由是以列侯為散騎光祿勳至御史大夫尚館陶公主施施者宣帝長女成帝姑也賢有行永以選尚焉上方欲相之會永薨子恬嗣不肖薄於行始定國父于公其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬高蓋車我治獄多陰德未嘗有所寃子孫必有興者至定國為丞相永為御史大夫封侯傳世云薛廣德字長卿沛郡相人也以魯詩教授楚國龔勝舍師事焉蕭望之為御史大夫除廣德為屬數與論議器之薦廣德經行宜充本朝為博士論石渠遷諌大夫代貢禹為長信少府御史大夫廣德為人溫雅有醖藉及為三公直言諌爭始拜旬日間上幸甘泉郊泰畤禮畢因留射獵廣德上書諌曰竊見關東困極民人流離陛下日撞亡秦之鐘聼鄭衛之樂臣誠悼之今士卒暴露從官勞倦願陛下亟反宫思與百姓同憂樂天下幸甚上即日還其秋上酎祭宗廟出便門欲御樓船廣德當乘輿車免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聼臣臣自刎以血汚車輪陛下不得入廟矣上不説先驅光祿大夫張猛進曰臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聼上曰曉人不當如是邪乃從橋後月餘以歲惡民流與丞相定國大司馬車騎將軍史高俱乞骸骨皆賜安車駟馬黃金六十斤罷廣德為御史大夫凡十月免東歸沛太守迎之界上沛以為榮縣其安車傳子孫平當字子思祖父以訾百萬自下邑徙平陵當少為大行治禮丞功次補大鴻臚文學察廉為順陽長栒邑令以眀經為博士公卿薦當論議通明給事中每有災異當輒傅經術言得失文雅雖不能及蕭望之匡衡然指意略同自元帝時韋元成為丞相奏罷太上皇寢廟園當上書言臣聞孔子曰如有王者必世而後仁三十年之間道德和洽制禮興樂災害不生禍亂不作今聖漢受命而王繼體承業二百餘年孜孜不怠政令清矣然風俗未和隂陽未調災害數見意者大本有不立與何德化休徴不應之久也禍福不虛必有因而至者焉宜深迹其道而務修其本昔者帝堯南面而治先克明俊德以親九族而化及萬國孝經曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也夫孝子善述人之志周公既成文武之業而制作禮樂修嚴父配天之事知文王不欲以子臨父故推而序之上極於后稷而以配天此聖人之德亡以加於孝也髙皇帝聖德受命有天下尊太上皇猶周文武之追王太王王季也此漢之始祖後嗣所宜尊奉以廣盛德孝之至也書云正稽古建功立事可以永年傳於亡窮上納其言下詔復太上皇寢廟園頃之使行流民幽州舉奏刺史二千石勞徠有意者言勃海鹽池可且勿禁以救民急所過見稱舉奉使者十一人為最遷丞相司直坐法左遷朔方刺史復徴入為太中大夫給事中絫遷長信少府大鴻臚光祿勳先是太后姊子衛尉淳于長白言昌陵不可成下有司議當以為作治連年可遂就上既罷昌陵以長首建忠䇿復下公卿議封長當又以為長雖有善言不應封爵之科坐前議不正左遷巨鹿太守後上遂封長當以經明貢禹使行河為騎都尉領河堤哀帝即位徴當為光祿大夫諸吏散騎復為光祿勳御史大夫至丞相以冬月賜爵關內侯眀年春上使使者召欲封當當病篤不應召室家或謂當不可強起受侯印為子孫邪當曰吾居大位已負素餐之責矣起受侯印還卧而死死有餘罪今不起者所以為子孫也遂上書乞骸骨上報曰朕選於衆以君為相視事日寡輔政未久隂陽不調冬無大雪旱氣為災朕之不德何必君罪君何疑而上書乞骸骨歸關內侯爵邑使尚書令談賜君飬牛一上尊酒十石君其勉致醫藥以自持後月餘卒子晏以明經歷位大司徒封防鄉侯漢興唯韋平父子至宰相彭宣字子佩淮陽陽夏人也治易事張禹舉為博士遷東平太傅禹以帝師見尊信薦宣經明有威重可任政事繇是入為右扶風遷廷尉以王國人出為太原太守數年復入為大司農光祿勳右將軍哀帝即位徙為左將軍歲餘上欲令丁傅處爪牙官乃䇿宣曰有司數奏言諸侯國人不得宿衛將軍不宜典兵馬處大位朕唯將軍任漢將之重而子又前取淮陽王女婚姻不絶非國之制使光祿大夫曼賜將軍黃金五十斤安車駟馬其上左將軍印綬以關內侯歸家宣罷數歲諌大夫鮑宣數薦宣會元壽元年正月朔日蝕鮑宣復言上乃召宣為光祿大夫遷御史大夫轉為大司空封長平侯會哀帝崩新都侯王莽為大司馬秉政專權宣上書言三公鼎足承君一足不任則覆亂美實臣資性淺薄年齒老眊數伏疾病昏亂遺忘願上大司空長平侯印綬乞骸骨歸鄉里俟置溝壑莽白太后䇿免宣令上大司空印綬便就國莽恨宣求退故不賜黃金安車駟馬宣居國數歲薨諡曰頃侯傳子至孫王莽敗乃絶王吉字子陽琅邪臯虞人也少好學眀經以郡吏舉孝廉為郎補若盧右丞遷雲陽令舉賢良為昌邑中尉而王好遊獵驅馳國中動作亡節吉上書諌曰臣聞古者師日行三十里吉行五十里詩云匪風發兮匪車揭兮顧瞻周道中心􅜢兮説曰是非古之風也發發者是非古之車也揭揭者蓋傷之也今者大王幸方與曽不半日而馳二百里百姓頗廢耕桑治道牽馬臣愚以為民不可數變也昔召公述職當民事時舍於棠下而聼斷焉是時人皆得其所後世思其仁恩至呼不伐甘棠甘棠之詩是也大王不好書術而樂逸遊馮式撙銜馳騁不止口倦乎叱吒手苦於箠轡身勞呼車輿朝則冒霧露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所匽薄數以耎脆之玉體犯勤勞之煩毒非所以全壽命之宗也又非所以進仁義之隆也夫廣夏之下細旃之上眀師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道欣欣焉發憤忘食日新厥德其樂豈徒銜橛之間哉休則俯仰詘信以利形進退步趨以實下吸新吐故以練藏專意積精以適神於以養生豈不長哉大王誠留意如此則心有堯舜之志體有喬松之壽美聲廣譽登而上聞則福祿其臻而社稷安矣皇帝仁聖至今思慕未怠於宫館囿池弋獵之樂未有所幸大王宜夙夜念此以承聖意諸侯骨肉莫親大王大王於屬則子也於位則臣也一身而二任之責加焉恩愛行義􅏽介有未具者於以上聞非饗國之福也臣言愚戇願大王察之王賀雖不遵道然猶知敬禮吉乃下令曰寡人造行不能無惰中尉甚忠數輔吾過使謁者千秋賜中尉牛肉五百斤酒五石脯五束其後復放從自若吉輒諌爭甚得輔弼之義雖不治民國中莫不敬重焉久之昭帝崩亡嗣大將軍霍光秉政遣大鴻臚宗正迎昌邑王吉即奏書戒王曰臣聞高宗諒暗三年不言今大王以喪事徴宜日夜哭泣悲哀而已慎毋有所發且何獨喪事凡南面之君何言哉天不言四時行焉百物生焉願大王察之大將軍仁愛勇智忠信之德天下莫不聞事孝武皇帝二十餘年未嘗有過先帝棄羣臣屬以天下寄幼孤焉大將軍抱持幼君襁褓之中布政施教海內晏然雖周公伊尹亡以加也今帝崩亡嗣大將軍惟思可以奉宗廟者攀援而立大王其仁厚豈有量哉臣願大王事之敬之政事一聼之大王垂拱而已願留意常以為念王既到即位二十餘日以行淫亂廢昌邑羣臣坐在國時不舉奏王罪過令漢朝不聞知又不能輔道陷王大惡皆下獄誅唯吉與郎中令龔遂以忠直數諌正得減死髠為城旦起家復為益州刺史病去官復徴為博士諌大夫是時宣帝頗修武帝故事宫室車服盛於昭帝時外戚許史王氏貴寵而上躬親政事任用能吏吉上疏言得失曰陛下躬聖質總萬方帝王圖籍日陳于前惟思世務將興太平詔書每下民欣然若更生臣伏而思之可謂至恩未可為本務也欲治之主不世出公卿幸得遭遇其時言聼諌從然未有建萬世之長䇿舉眀主於三代之隆者也其務在於期會簿書斷獄聼訟而已此非太平之基也臣聞聖王宣德流化必自近始朝廷不備難以言治左右不正難以化逺民者弱而不可勝愚而不可欺也聖主獨行於深宫得則天下稱誦之失則天下咸言之行發於近必見於逺故謹選左右審擇所使左右所以正身也所使所以宣德也詩云濟濟多士文王以寧此其本也春秋所以大一統者六合同風九州共貫也今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所繇以意穿鑿各取一切權譎自任故一變之後不可復修也是以百里不同風千里不同俗户異政人殊服詐偽萌生刑罰亡極質朴日銷恩愛寖薄孔子曰安上治民莫善於禮非空言也王者未制禮之時引先王禮宜於今者而用之臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制驅一世之民躋之仁壽之域則俗何以不若成康壽何以不若高宗竊見當世趨務不合於道者謹條奏唯陛下財擇焉吉意以為夫婦人倫大綱夭壽之萌也世俗嫁娶太早未知為人父母之道而有子是以教化不明而民多夭聘妻送女亡節則貧人不及故不舉子又漢家列侯尚公主諸侯則國人承翁主使男事女夫詘於婦逆隂陽之位故多女亂古者衣服車馬貴賤有章以褒有德而别尊卑今上下僣差人人自制是以貪財趨利不畏死亡周之所以能致治刑措而不用者以其禁邪於冥冥絶惡於未萌也又言舜湯不用三公九卿之世而舉臯陶伊尹不仁者逺今使俗吏得任子弟率多驕驁不通古今至於積功治人亡益於民此伐檀所為作也宜眀選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方眀視天下以儉古者工不造雕琢商不通侈靡非工商之獨賢政教使之然也民見儉則歸本本立則末成其指如此上以其言迂濶不甚寵異也吉遂謝病歸琅邪始吉少時學問居長安東家有大棗樹垂吉庭中吉婦取棗以啖吉吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽去婦東家棗完去婦復還其厲志如此吉與貢禹為友世稱王陽在位貢禹彈冠言其取捨同也元帝初即位遣使者徴貢禹與吉吉年老道病卒上悼之復遣使者弔祠云初吉兼通五經能為騶氏春秋以詩論語教授好梁邱賀説易令子駿受焉駿以孝亷為郎左曹陳咸薦駿賢父子經眀行修宜顯以厲俗光祿勳匡衡亦舉駿有專對材遷諫大夫使責淮陽憲王遷趙內史吉坐昌邑王被刑後戒子孫毋為王國吏故駿道病免官歸起家復為幽州刺史遷司𨽻校尉奏免丞相匡衡遷少府八歲成帝欲大用之出駿為京兆尹試以政事先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王而薛宣從左馮翊代駿為少府會御史大夫缺谷永奏言聖王不以名譽加於實效考績用人之法薛宣政事已試上然其議宣為少府月餘遂超御史大夫至丞相駿乃代宣為御史大夫並居位六歲病卒翟方進代駿為御史大夫數月薛宣免遂代為丞相衆人為駿恨不得封侯駿為少府時妻死因不復娶或問之駿曰德非曽參子非華元亦何敢娶駿子崇以父任為郎歷刺史郡守治有能名建平三年以河南太守徴入為御史大夫數月是時成帝舅安成恭侯夫人放寡居共養長信宫坐祝詛下獄崇奏封事為放言放外家解氏與崇為婚哀帝以崇為不忠誠䇿免崇左遷為大司農後徙衛尉左將軍平帝即位王莽秉政大司空彭宣乞骸骨罷崇代為大司空封扶平侯歲餘崇復謝病乞骸骨皆避王莽莽遣就國歲餘為傳婢所毒薨國除自吉至崇世名清亷然材器名稱稍不能及父而祿位彌隆皆好車馬衣服其自奉養極為鮮明而亡金銀錦繡之物及遷徙去處所載不過囊衣不畜積餘材去位家居亦布衣疏食天下服其廉而怪其奢故俗傳王陽能作黃金貢禹字少翁琅邪人也以明經潔行著聞徴為博士涼州刺史病去官復舉賢良為河南令歲餘以職事為府官所責免冠謝禹曰冠一免安可復冠也遂去官元帝初即位徴禹為諌大夫數虛已問以政事是時年歲不登郡國多困禹奏言古者宫室有制宫女不過九人秣馬不過八匹牆塗而不雕本摩而不刻車輿器物皆不文畫苑囿不過數十里與民共之任賢使能什一而稅亡它賦斂繇戍之役使民歲不過三日千里之內自給千里之外各置貢職而已故天下家給人足頌聲並作至高祖孝文孝景皇帝循古節儉宫女不過十餘廄馬百餘匹孝文皇帝衣綈履革器亡雕文金銀之飾後世爭為奢侈轉轉益甚臣下亦相放效衣服履褲刀劔亂於主上主上時臨朝入廟衆人不能别異甚非其宜然非自知奢僭也猶魯昭公曰吾何僣矣今大夫僭諸侯諸侯僭天子天子過天道其日久矣承衰救亂矯復古化在於陛下臣愚以為盡如太古難宜少放古以自節焉論語曰君子樂節禮樂方今宫室已定亡可奈何矣其餘盡可減損故時齊三服官輸物不過十笥方今齊三服官作工各數千人一歲費數巨萬蜀廣漢主金銀器嵗各用五百萬三工官官費五千萬東西織室亦然廄馬食粟將萬匹臣禹嘗從之東宫見賜杯案盡文畫金銀飾非當所以賜食臣下也東宫之費亦不可勝計天下之民所為大飢餓死者是也今民大飢而死死又不葬為犬豬所食人至相食而廄馬食粟苦其大肥氣盛怒至乃日步作之王者受命於天為民父母固當若此乎天不見邪武帝時又多取好女至數千人以填後宫及棄天下昭帝幼弱霍光專事不知禮正妄多藏金錢財物鳥獸魚鱉牛馬虎豹生禽凡百九十物盡瘞藏之又皆以後宫女置於園陵大失禮逆天心又未必稱武帝意也昭帝晏駕光復行之至孝宣皇帝時陛下惡有所言羣臣亦隨故事甚可痛也故使天下承化取女皆大過度諸侯妻妾或至數百人豪富吏民畜歌者至數十人是以內多怨女外多曠夫及衆庶葬埋多虛地上以實地下其過自上生皆在大臣循故事之罪也唯陛下深察古道從其儉者大減損乘輿服御器物三分去二産子多少有命審察後宫擇其賢者留二十人餘悉歸之及諸陵園女亡子者宜悉遣獨杜陵宫人數百誠可哀憐也廄馬可亡過數十匹獨舍長安城南苑地以為田獵之囿自城西南至山西至鄠皆復其田以與貧民方今天下飢饉可亡大自損減以救之稱天意乎天生聖人蓋為萬民非獨使自娛樂而已也故詩曰天難諶斯不易惟王上帝臨汝毋二爾心當仁不讓獨可以聖心參諸天地揆之往古不可與臣下議也若其阿意順指隨君上下臣禹不勝拳拳不敢不盡愚心天子納善其忠乃下詔令太僕減食榖馬水衡減食肉獸省宜春下苑以與貧民又罷角抵諸戲及齊三服官遷禹為光祿大夫頃之禹復上書曰臣禹年老貧窮家資不滿萬錢妻子粳豆不贍裋褐不完有田百三十畝陛下過意徵臣臣賣田百畝以供車馬至拜為諌大夫秩八百石奉錢月九千二百稟食太官又蒙賞賜四時雜繒綿絮衣服酒肉諸果物德厚甚深疾病侍醫臨治賴陛下神靈不死而活又拜為光祿大夫秩二千石奉錢月萬二千祿賜愈多家日以益富身日以益尊誠非草茅愚臣所當蒙也伏自念終亡以報厚德日夜慙愧而已臣禹犬馬之齒八十一血氣衰竭耳目不聰明非復能有補益所謂素餐尸祿汙朝之臣也自痛去家三千里凡有一子年十二非有在家為具棺椁者也誠恐一旦蹎仆氣竭不復自還汙席薦於宫室骸骨棄捐孤魂不歸不勝私願願乞骸骨及身生歸鄉里死亡所恨天子報曰朕以生有伯夷之廉史魚之直守經據古不阿當世孳孳於民俗之所寡故親近生幾參國政今未得久聞生之奇論也而云欲退意豈有所恨與將在位者與生殊乎往者嘗令金敞語生欲及生時祿生之子既已諭矣今復云子少夫以王命辦護生家雖百子何以加傳曰亡懷土何必思故鄉生其強飯慎疾以自輔後月餘以禹為長信少府會御史大夫陳萬年卒禹代為御史大夫列於三公自禹在位數言得失書數十上禹以為古民無賦算口錢起武帝征伐四夷重賦於民民産子三歲則出口錢故民重困至於生子輒殺甚可悲痛宜令兒七歲去齒乃出口錢年二十乃算又言古者不以金銀為幣專意於農故一夫不耕必有受其飢者今漢家鑄錢及諸鐡官皆置吏卒徒攻山取銅鐡一歲功十萬人已上中農食七人是七十萬人當受其飢也鑿池數百丈銷隂氣之精地臧空虛不能含氣出雲斬伐林木亡有時禁水早之災未必不繇此也自五銖錢起以來七十餘年民坐盜鑄錢被刑者衆富人積錢滿室猶亡厭足民心動搖商賈求利東西南北各用智巧好衣美食歲有十二之利而不出租稅農夫父子暴露中野不避寒暑捽屮把土手足胼胝已奉穀租又出稿稅鄉部私求不可勝供故民棄本逐末耕者不能半貧民雖賜之田猶賤賣以賈窮則起為盜賊何者末利而惑惑於錢也是以姦邪不可禁其原皆起於錢也疾其末者絶其本宜罷採珠玉金銀鑄錢之官亡復以為幣市井勿得販賣除其租銖之律租稅祿賜皆以布帛及穀使百姓一歸於農復古道便又言諸離宫及長樂宫衛可減其太半以寬繇役又諸宫奴婢十萬餘人戲遊亡事稅良民以給之歲費五六巨萬宜免為庶人廩食令代關東戍卒乘北邊亭塞候望又欲令近臣自諸曺侍中以上家亡得私販賣與民爭利犯者輒免官削爵不得仕宦禹又言孝文皇帝時貴寵廉潔賤貪汙賈人贅壻及吏坐臧者皆禁錮不得為吏賞善罰惡不阿親戚罪白者伏其誅疑者以與民亡贖罪之法故令行禁止海內大化天下斷獄四百與刑錯無異武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂從耆欲用度不足乃行一切之變使犯法者贖罪入穀者補吏是以天下奢侈官亂民貧盜賊並起亡命者衆郡國恐伏其罪則擇便巧史書習於計簿能欺上府者以為右職姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位故亡義而有財者顯於世欺謾而善書者尊於朝悖逆而勇猛者貴於官故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髠鉗者猶復攘臂為政於世行雖犬彘家富藝足目指氣使是為賢耳故謂居官而置富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之壞敗乃至於是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有臧者輒行其誅亡但免官則爭盡力為善貴孝弟賤賈人進真賢舉實廉而天下治矣孔子匹夫之人耳以樂道正身不解之故四海之內天下之君微孔子之言亡所折中況乎以漢地之廣陛下之德處南面之尊秉萬乘之權因天地之助其於變世易俗調和陰陽陶冶萬物化正天下易於決流抑隊自成康以來幾且千歲欲為治者甚衆然而太平不復興者何也以其舍法度而任私意奢侈行而仁義廢也陛下誠深念高祖之苦醇法太宗之治正己以先下選賢以自輔開進忠正致誅姦臣逺放讇佞赦出園陵之女罷倡樂絶鄭聲去甲乙之帳退偽薄之物修節儉之化驅天下之民皆歸於農如此不解則三王可侔五帝可及唯陛下留意省察天下幸甚天子下其議令民産子七歲乃出口錢自此始又罷上林宫館希幸御者及省建章甘泉宫衛卒減諸侯王廟衛卒省其半餘雖未盡從然嘉其質直之意禹又奏欲罷郡國廟定漢宗廟迭毁之禮均未施行為御史大夫數月卒天子賜錢百萬以其子為郎官至東郡都尉禹卒後上追思其議竟下詔罷郡國廟定迭毁之禮然通儒或非之語在韋元成傳兩龔皆楚人也勝字君裳舍字君倩二人相友並著名節故世謂之楚兩龔少皆好學明經勝為郡吏舍不仕久之楚王入朝聞舍高名聘舍為常侍不得已隨王歸國固辭願卒學復至長安而勝為郡吏三舉孝亷以王國人不得宿衛出補吏再為尉一為丞勝輒至官乃去州舉茂材為重泉令病去官大司空何武執金吾閻崇薦勝哀帝自為定陶王固已聞其名徴為諌大夫引見勝薦龔舍及亢父寧夀濟隂侯嘉有詔皆徵勝曰竊見國家徵醫巫常為駕徴賢者宜駕上曰大夫乘私車來邪勝曰唯唯有詔為駕龔舍侯嘉至皆為諌大夫寧壽稱疾不至勝居諌官數上書求見言百姓貧盜賊多吏不良風俗薄災異數見不可不憂制度泰奢刑罰泰深賦斂泰重宜以儉約先下其言祖述王吉貢禹之意為大夫二歲餘遷丞相司直徙光祿大夫守右扶風數月上知勝非撥煩吏乃復還勝光祿大夫諸吏給事中勝言董賢亂制度繇是逆上指後歲餘丞相王嘉上書薦故廷尉梁相等尚書劾奏嘉言事恣意迷國罔上不道下將軍中朝者議左將軍公孫祿司𨽻鮑宣光祿大夫孔光等十四人皆以為嘉應迷國不道法勝獨書議曰嘉資性邪僻所舉多貪殘吏位列三公隂陽不和諸事並廢咎皆繇嘉迷國不疑今舉相等過微薄日暮議者罷眀日復會左將軍祿問勝君議毋所據今奏當上宜何從勝曰將軍以勝議不可者通劾之博士夏侯常見勝應祿不和起至勝前謂曰宜如奏所言勝以手推常曰去後數日復會議可復孝惠孝景廟不議者皆曰宜復勝曰當如禮常復謂曰禮有變勝疾言曰去是時之變常恚謂勝曰我視君何若君欲小與衆異外以采名君乃申徒狄屬耳先是常又為勝道高陵有子殺母者勝白之尚書問誰受對曰受夏侯常尚書使勝問常常連恨勝即應曰聞之白衣戒君勿言也奏事不詳妄作觸罪勝窮無以對尚書即自劾奏與常爭言汙辱朝廷事下御史中丞召詰問劾奏勝吏二千石常位大夫皆幸得給事中與議論不崇禮義而居公門下相非恨疾言辨訟媠嫚亡狀皆不敬制曰貶秩各一等勝謝罪乞骸骨上乃復加賞賜以子博為侍郎出勝為勃海太守勝謝病不任之官積六月免歸上復徵為光祿大夫勝常稱疾卧數使子上書乞骸骨會哀帝崩初琅邪邴漢亦以清行徵用至京兆尹後為太中大夫王莽秉政勝與漢俱乞骸骨自昭帝時涿郡韓福以德行徵至京師賜䇿書束帛遣歸詔曰朕閔勞以官職之事其務孝悌以教鄉里行道舍傳舍縣次具酒肉食從者及馬長吏以時存問常以嵗八月賜羊一頭酒二斛不幸死者賜復衾一祠以中牢於是王莽依韓福故事白遣勝漢令上其子若孫若同産同産子一人於是勝漢遂歸老於鄉里所上男皆除為郎漢兄子曼容亦養志自修為官不肯過六百石輒自免去其名過出於漢初龔舍以龔勝薦徵為諌大夫病免復徴為博士又病去頃之哀帝遣使者即楚拜舍為大山太守舍家居在武原使者至縣請舍欲令至廷拜授印綬舍曰王者以天下為家何必縣官遂於家受詔便道之官既至數月上書乞骸骨上徵舍至京兆東湖界固稱病篤天子使使者收印綬拜舍為光祿大夫數賜告舍終不肯起乃遣歸舍亦通五經以魯詩教授舍勝既歸鄉里郡二千石長吏初到官皆至其家如師弟子之禮舍年六十八王莽居攝中卒莽既篡國遣五威將帥行天下風俗將帥親奉羊酒存問勝明年莽遣使者即拜勝為講學祭酒勝稱疾不應徵後二年莽復遣使者奉璽書太子師友祭酒印綬安車駟馬迎勝即拜秩上卿先賜六月祿直以辦裝使者與郡太守縣長吏三老官屬行義諸生千人以上入勝里致詔使者欲令勝起迎久立門外勝稱病篤為牀室中户西南牖下東首加朝服拖紳使者入户西行南面立致詔付璽書遷延再拜奉印綬內安車駟馬進謂勝曰聖朝未嘗忘君制作未定待君為政思聞所欲施行以安海內勝對曰素愚加以年老被病命在朝夕隨使君上道必死道路無益萬分使者要説至以印綬就加勝身勝輒推不受使者即上言方盛夏暑熱勝病少氣可須秋涼乃發有詔許使者五日一與太守俱問起居為勝兩子及門人高暉等言朝廷虛心待君以茅土之封雖疾病宜移動至傳舍示有行意必為子孫遺大業暉等白使者語勝自知不見聼即謂暉等吾受漢家厚恩今年老矣旦暮入地誼豈以一身事二姓下見故主哉勝因勑以棺斂喪事衣周於身棺周於衣勿隨俗動吾冢種柏作祠堂語畢遂不復開口飲食積十四日死死時七十九矣使者太守臨斂賜復衾祭祠如法門人衰絰治喪者百數有老父來弔哭甚哀既而曰嗟乎薰以香自燒膏以眀自銷龔生竟夭天年非吾徒也趨而遂出莫知其誰勝居彭城廉里後世刻石表其里門鮑宣字子都渤海高城人也好學眀經為縣鄉嗇夫守束州丞後為都尉太守功曹舉孝亷為郎病去官復為州從事大司馬衛將軍王商辟宣薦為議郎後以病去哀帝初大司空何武除宣為西曺掾甚敬重焉薦宣為諌大夫遷豫州牧嵗餘丞相司直郭欽奏宣舉錯煩苛代二千石署吏聼訟所察過詔條行部乘傳去法駕駕一馬舍宿鄉亭為衆所非宣坐免歸家數月復徵為諌大夫宣每居位常上書諌爭其言少文多實是時帝祖母傅太后欲與成帝母俱稱尊號封爵親屬丞相孔光大司空師丹何武大司馬傅喜始執正議失傅太后指皆免官丁傅子弟並進董賢貴幸宣以諌大夫從其後上書諌曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷妨賢人路濁亂天下奢泰無度窮困百姓是以日蝕且十彗星四起危亡之徵陛下所親見也今奈何反覆劇於前乎朝臣亡有大儒骨鯁白首耆艾魁壘之士論議通古今喟然動衆心憂國如飢渴者臣未見也敦外親小童及幸臣董賢等在公門省户下陛下欲與此共承天地安海內甚難今世俗謂不智者為能謂智者為不能昔堯放四罪而天下服今除一吏而衆皆惑古刑人尚服今賞人反惑請寄為姦羣小日進國家空虛用度不足民流亡去城郭盜賊並起吏為殘賊歲增於前凡民有七亡隂陽不和水旱為災一亡也縣官重責更賦租稅二亡也貪吏並公受取不已三亡也豪強大姓蠶食亡厭四亡也苛吏繇役失農桑時五亡也部落鼓鳴男女遮迣六亡也盜賊劫略取民財物七亡也七亡尚可又有七死酷吏驅殺一死也治獄深刻二死也寃陷亡辜三死也盜賊橫發四死也怨讐相殘五死也歲惡飢餓六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪羣臣幸得居尊位食重祿豈有肯加惻隱於細民助陛下流教化者邪志但在營私家稱賔客為姦利而已以茍容曲從為賢以拱默尸祿為智謂如臣宣等為愚陛下擢臣巖穴誠冀有益毫毛豈徒欲使臣美食大官重高門之地哉天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧飬元元視之當如一合尸鳩之詩今貧民菜食不厭衣又穿空父子夫婦不能相保誠可為酸鼻陛下不救將安所歸命乎奈何獨私飬外親與幸臣董賢多賞賜以大萬數使奴從賔客漿酒霍肉蒼頭廬兒皆用致富非天意也及汝昌侯傅商亡功而封夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人而望天説民服豈不難哉方陽侯孫寵宜陵侯息夫躬辨足以移衆強可用獨立姦人之雄惑世尤劇者也宜以時罷退及外親幼童未通經術者皆宜令休就師傅急徵故大司馬傅喜使領外親故大司空何武師丹故丞相孔光故左將軍彭宣經皆更博士位皆歷三公智謀威信可與建教化圖安危龔勝為司直郡國皆慎選舉三輔委輸官不敢為姦可大委任也陛下前以小不忍退武等海內失望陛下尚能容亡功德者甚衆尚不能忍武等邪治天下者當用天下之心為心不得自專快意而已也上之皇天見譴下之黎庶怨恨次有諌爭之臣陛下茍欲自薄而厚惡臣天下猶不聽也臣雖愚戇獨不知多受祿賜美食太官廣田宅厚妻子不與惡人結仇怨以安身邪誠迫大義官以諌爭為職不敢不竭愚惟陛下少留神明覽五經之文原聖人之至意深思天地之戒臣宣呐鈍於辭不勝惓惓盡死節而已上以宣名儒優容之是時郡國地震民訛言行籌明年正月朔日蝕上乃徵孔光免孫寵息夫躬罷侍中諸曺黃門郎數十人宣復上書言陛下父事天母事地子養黎民即位以來父虧明母震動子訛言相驚恐今日蝕於三始誠可畏懼小民正月朔日尚恐毁敗器物何况於日虧乎陛下深內自責避正殿舉正直求過失罷退外親及傍仄素餐之人徵拜孔光為光祿大夫發覺孫寵息夫躬過惡免官遣就國衆庶歙然莫不説喜天人同心人心説則天意解矣乃二月丙戍白虹虷日連隂不雨此天有憂結未解民有怨望未塞者也侍中駙馬都尉董賢本無葭莩之親但以令色諛言自進賞賜亡度竭盡府藏并合三第尚以為小復壞暴室賢父子坐使天子使者將作治第行夜吏卒皆得賞賜上冢有會輒太官為供海內貢獻當飬一君今反盡之賢家豈天意與民意邪天不可久負厚之如此反所以害之也誠欲哀賢宜為謝過天地解讐海內免遣就國收乘輿器物還之縣官如此可以父子終其性命不者海內之所仇未有得久安者也孫寵息夫躬不宜居國可皆免以示天下復徵何武師丹彭宣傅喜曠然使民易視以應天心建立大政以興太平之端高門去省户數十步求見出入二年未省欲使海瀕仄陋自通逺矣願賜數刻之間極竭毣毣之思出入三泉死亡所恨上感大異納宣言徵何武彭宣旬月皆復為三公拜宣為司𨽻時哀帝改司𨽻校尉但為司𨽻官比司直丞相孔光四時行園陵官屬以令行馳道中宣出逢之使吏鉤止丞相掾史沒入其車馬摧辱宰相事下御史中丞侍御史至司𨽻官欲捕從事閉門不肯納宣坐距使者無人臣禮大不敬不道下廷尉獄博士弟子濟南王咸舉幡太學下曰欲救鮑司𨽻者會此下諸生會者千餘人朝日遮丞相孔光自言丞相車不得行又守闕上書上遂抵宣罪減死一等髠鉗宣既被刑乃徙之上黨以為其地宜田牧又少豪俊易長雄遂家于長子平帝即位王莽秉政隂有篡國之心乃風州郡以罪法案誅諸豪傑及漢忠直臣不附己者宣及何武等皆死時名捕隴西辛興興與宣女壻許紺俱過宣一飯去宣不知情坐繫獄自殺自成帝至王莽時清名之士琅邪又有紀逡王思齊則薛方子容太原則有郇越臣仲郇相稚賔沛郡則唐林子高唐尊伯高皆以明經飭行顯名於世紀逡兩唐皆仕王莽封侯貴重歷公卿位唐林數上疏諌正有忠直節唐尊衣弊履穿以瓦器飲食又以歷遺公卿被虛偽名郇越相同族昆弟也並舉州郡孝廉茂材數病去官越散其先人資千餘萬以分施九族州里志節尤高相王莽時徵為太子四友病死莽太子遣使裞以衣衾其子攀棺不聼曰死父遺言師友之送勿有所受今於皇太子得託友官故不受也京師稱之薛方嘗為郡掾祭酒嘗徵不至及莽以安車迎方方因使者辭謝曰堯舜在上下有巢由今眀主方隆唐虞之德小臣欲守箕山之節也使者以聞莽説其言不強致方居家以經教授喜屬文著詩賦數十篇始隃麋郭欽哀帝時為丞相司直奏免豫州牧鮑宣京兆尹薛修等又奏董賢左遷盧奴令平帝時遷南郡太守而杜陵蔣詡元卿為兖州刺史亦以廉直為名王莽居攝欽詡皆以病免官歸鄉里卧不出户卒於家齊栗融客卿北海禽慶子貢蘇章遊卿山陽曹竟子期皆儒生去官不仕於莽莽死漢更始徵竟以為丞相封侯欲視致賢人銷冦賊竟不受侯爵會赤眉入長安欲降竟竟手劒格死世祖即位徵薛方道病卒兩龔鮑宣子孫皆見褎表至大官通志卷一百
