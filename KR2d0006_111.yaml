body:
  text: 通志卷九十八下宋右迪功郎鄭樵漁仲撰列傳第十一下司馬相如字長卿蜀郡成都人也少時好讀書學擊劒其親名之曰犬子相如既學慕藺相如之為人更名相如以資為郎事孝景帝為武騎常侍非其好也會景帝不好辭賦是時梁孝王來朝從遊説之士齊人鄒陽淮隂枚乘吳嚴忌夫子之徒相如見而説之因病免客遊梁得與諸侯遊士居數嵗乃著子虛之賦會孝王薨相如歸而家貧無以自業素與臨卭令王吉相善吉曰長卿久宦遊不遂而困來過我於是相如往舍都亭臨卭令繆為恭敬日往朝相如相如初尚見之後稱病使從者謝吉吉愈益謹肅臨卭多富人而卓王孫家僮八百人程鄭亦數百人二人乃相謂曰令有貴客為具召之并召令令既至卓氏客以百數至日中請司馬長卿長卿謝病不能臨臨卭令不敢嘗食身自往迎相如相如為不得已而強往一座盡傾酒酣臨卭令前奏琴曰竊聞長卿好之願以自娛相如辭謝為鼓一再行是時卓王孫有女文君新寡好音故相如繆與令相重而以琴心挑之相如時從車騎雍容間雅甚都及飲卓氏弄琴文君竊從戶窺心説而好之恐不得當也既罷相如乃令侍人重賜文君侍者通殷勤文君夜亡奔相如相如與馳歸成都家徒四壁立卓王孫大怒曰女不材我不忍殺一錢不分也或謂王孫王孫終不聽文君久之不樂謂長卿曰第俱如臨卭從昆弟假貸猶足以為生何至自苦如此相如與俱之臨卭盡賣車騎置酒舍乃令文君當爐相如身自著犢鼻褌與庸保雜作滌器於市中卓王孫耻之為杜門不出昆弟諸公更謂王孫曰有一男兩女所不足者非財也今文君既失身於司馬長卿長卿故倦遊雖貧其人材足依也且又令客奈何相辱如此王孫不得已分與文君僮百人錢百萬及其嫁時衣被財物文君乃與相如歸成都買田宅為富人居久之蜀人楊得意為狗監主天子田獵犬侍上上讀子虛賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚乃召問相如相如曰有是然此乃諸侯之事未足觀請為天子遊獵之賦上令尚書給筆札相如以子虛虛言也為楚稱烏有先生者烏有此事也為齊難亡是公者亡是人也欲明天子之義故空藉此三人為辭以推天子諸侯之苑囿其卒章歸之於節儉因以風諫奏之天子大説其辭曰楚使子虛使於齊齊王悉發車騎與使者出田田罷子虛過姹烏有先生亡是公存焉坐定烏有先生問曰今日田樂乎子虛曰樂獲多乎曰少然則何樂對曰僕樂王之欲夸僕以車騎之衆而僕對以雲夢之事也曰可得聞乎子虛曰可王駕車千乘選徒萬騎田于海濵列卒滿澤罘罔彌山掩兔轔鹿射麋格麟騖於鹽浦割鮮染輪射中獲多矜而自功顧謂僕曰楚亦有平原廣澤遊獵之地饒樂若此者乎楚王之獵孰與寡人僕下車對曰臣楚國之鄙人也幸得宿衛十有餘年時從出遊遊於後園覽於有無然猶未能遍睹也又烏足以言外澤乎齊王曰雖然略以子之所聞見言之僕對曰唯唯臣聞楚有七澤嘗見其一未睹其餘也臣之所見蓋特其小小者耳名曰雲夢雲夢者方九百里其中有山焉其山則盤紆茀鬱隆崇律崒岑崟參差日月蔽虧交錯糾紛上干青雲罷池陂陀下屬江河其土則丹青赭堊雌黃白附錫碧金銀衆色炫耀照爛龍鱗其石則赤玉玫瑰琳珉昆吾瑊玏元厲礝石武夫其東則有蕙圃衡蘭芷若穹窮昌蒲江離蘪蕪諸柘巴且其南則有平原廣澤登降阤靡案衍壇曼緣以大江限以巫山其髙燥則生葴析苞荔薜莎青薠其埤溼則生藏莨蒹葭東蘠雕胡蓮藕觚盧奄閭軒于衆物居之不可勝圖其西則有涌泉清池激水推移外發夫容菱華內隱巨石白沙其中則有神龜蛟鼉毒冒鱉黿其北則有隂林巨樹楩柟豫章桂椒木蘭檗離朱揚樝梨梬栗橘柚芳芬其上則有宛雛孔鸞騰逺射干其下則有白虎元豹蟃蜒貙犴於是乎乃使剸諸之倫手格此獸楚王乃駕馴駮之駟乘雕玉之輿靡魚須之橈旃曵明月之珠旗建干將之雄戟左烏號之雕弓右夏服之徑箭陽子驂乘􅏽阿為御案節未舒即陵狡獸蹴蛩蛩轔距虛軼野馬􅗗騊駼乘遺風射遊騏倏胂倩浰雷動焱至星流電擊弓不虛發中必決眥洞胸達掖絶乎心繫獲若雨獸掩草蔽地於是楚王乃弭節徘徊翺翔容與覽乎隂林觀壯士之暴怒與猛獸之恐懼徼受詘殫覩衆物之變態於是鄭女曼姬被阿錫揚紵縞雜纎羅埀霧縠襞積褰皺紆徐委曲鬱橈溪谷衯衯裶裶揚衪戍削蜚襳埀髾扶輿猗靡翕呷萃蔡下摩蘭蕙上拂羽蓋錯翡翠之葳㽔繆繞玉綏眇眇忽忽若神之髣佛於是乃羣相與獠於蕙圃媻姍勃窣上於金隄掩翡翠射鵔鸃微矰出孅繳施弋白鵠連鴐鵝雙鶬下元鶴加怠而後遊於清池浮文鷁揚旌枻張翠帷建羽蓋罔毒冒釣紫貝摐金鼓吹鳴籟榜人歌聲流喝水蟲駭波鴻沸涌泉起奔揚會礧石相擊琅琅礚礚若雷霆之聲聞乎數百里外將息獠者擊靈鼓起熢熢車案行騎就隊纚乎淫淫般乎裔裔於是楚王乃登陽雲之臺泊乎無為淡乎自持勺藥之和具而後御之不若大王終日馳騁曾不下輿脟割輪焠自以為娛臣竊觀之齊殆不如於是王無以應僕也烏有先生曰是何言之過也足下不逺千里來况齊國王悉境內之士備車騎之衆與使者出田乃欲戮力致獲以娛左右也何名為夸哉問楚地之有無者願聞大國之風烈先生之餘論也今足下不稱楚王之德厚而盛推雲夢以為驕奢言淫樂而顯侈靡竊為足下不取也必若所言固非楚國之美也有而言之是章君之惡也無而言之是害足下之信也章君惡傷私義二者無一而可先生行之必且輕於齊而纍於楚矣且齊東渚巨海南有琅邪觀乎成山射乎之罘浮勃澥遊孟諸邪與肅慎為鄰右以湯谷為界秋田于青邱仿偟乎海外吞若雲夢者八九其於胸中曾不蒂芥若乃俶儻瑰瑋異方殊類珍怪鳥獸萬端鱗崒充牣其中者不可勝紀禹不能名卨不能計然在諸侯之位不敢言遊戲之樂苑囿之大先生又見客是以王辭不復何為無以應哉亡是公聽然而笑曰楚則失矣而齊亦未為得也夫使諸侯納貢者非為財帛所以述職也封疆畫界者非為守禦所以禁淫也今齊列為東藩而外私肅慎捐國隃限越海而田其於義固未可也且二君之論不務明君臣之義正諸侯之禮徒事爭於遊戲之樂苑囿之大欲以奢侈相勝荒淫相越此不可以揚名發譽而適足以君自損也且夫齊楚之事又烏足道乎君未覩夫巨麗也獨不聞天子之上林乎左蒼梧右西極丹水更其南紫淵徑其北終始霸産出入涇渭酆鎬潦潏紆餘委蛇經營其內蕩蕩乎八川分流相背異態東西南北馳騖往來出乎椒邱之闕行乎州淤之浦徑乎桂林之中過乎泱莾之壄汨乎混流順阿而下赴隘狹之口觸穹石激堆崎沸乎暴怒洶涌彭湃滭弗宓汨逼側泌瀄橫流逆折轉騰潎洌滂濞沆溉穹隆雲橈宛灘膠盩踰波趨浥涖涖下瀨批巖衝擁奔揚滯沛臨坻注壑瀺灂霣隊沈沈隱隱砰磅訇礚潏潏淈淈湁潗鼎沸馳波跳沫汨潝漂疾悠逺長懷寂憀無聲肆乎永歸然後灝溔潢漾安翔徐佪翯乎滈滈東注大湖衍溢陂池於是蛟龍赤螭䱴𩶶漸離鰅鰫鰬魠禺禺魼鰨揵鰭掉尾振鱗奮翼潛處乎深巖魚鱉歡聲萬物衆夥明月珠子的皪江靡蜀石黃碝水玉磊砢磷磷爛爛采色澔汗叢積乎其中䲨鷫鵠鴇鴐鵝屬玉交精旋目煩鶩庸渠針疵鵁盧羣浮乎其上泛淫汜濫隨風淡淡與波搖蕩奄薄水渚唼喋菁藻咀嚼菱藕於是乎崇山矗矗巃嵸崔巍深林巨木嶄巖參差九嵕嶻嶭南山峩峩巖阤甗錡槯崣崛﨑振溪通谷蹇産溝瀆􅢋呀豁閜阜陵别塢崴磈嵔廆邱墟堀礨隱轔鬱礧登降施靡陂池貏豸允溶淫鬻散渙夷陸亭臯千里靡不被築掩以緑蕙被以江離糅以蘼蕪雜以留夷布結縷攢戾莎揭車衡蘭稿本射干茈薑蘘荷葴持若蓀鮮支黃礫蔣芧青薠布濩閎澤延曼太原離靡廣衍應風披靡吐芳揚烈郁郁菲菲衆香發越肹蠁布寫暗薆咇茀於是乎周覽汜觀縝紛軋芴芒芒恍忽視之無端察之無涯日出東沼入呼西陂其南則隆冬生長涌水躍波其獸則庸旄貘犛沈牛麈麋赤首圜題窮竒象犀其北則盛夏含凍裂地涉氷揭河其獸則麒麟角端騊駼橐駝蛩蛩驒騱駃騠驢騾於是乎離宫别館彌山跨谷髙廓四注重坐曲閣華榱璧璫輦道纚屬步櫩周流長途中宿夷嵕築堂絫臺增成巖突洞房俯杳眇而無見仰草橑而捫天奔星更於閨闥宛虹拖於楯軒青龍蚴蟉於東箱象輿婉僤於西清靈圉燕於間館偓佺之倫暴於南榮醴泉涌於清室通川過於中庭磐石裖崖嶔巖倚傾嵯峨㠍嶫刻削崢嶸玫瑰碧琳珊瑚叢生珉玉旁唐玢豳文磷赤瑕駁犖雜臿其間鼂采琬琰和氏出焉於是乎盧橘夏熟黃甘橙楱枇杷橪柿亭奈厚朴梬棗楊梅櫻桃蒲萄隱夫薁棣答遝離支羅乎後宫列乎北園貤邱陵下平原揚翠葉扤紫莖發紅華埀朱榮煌煌扈扈照耀巨野沙棠櫟櫧華風枰櫨留落胥邪仁頻并閭欃檀木蘭豫章女貞長千仞大連抱夸條直暢實葉葰楙攢立叢倚連卷欐佹崔錯癹骫坑衡閜砢埀條扶踈落英幡纚紛溶萷蔘猗柅從風藰蒞卉歙蓋象金石之聲管籥之音柴池茈􅫧旋還乎後宫雜襲纍輯被山緣谷循阪下隰視之無端究之亡窮於是乎元猿素雌蜼玃飛蠝蛭蜩玃蝚獑胡豰蛫棲息乎其間長嘯哀鳴翩幡互經夭蟜枝格偃蹇秒顛隃絶梁騰殊榛捷埀條掉希間牢落陸離爛漫逺遷若此者數百千處娛遊往來宫宿館舍庖厨不徙後宫不移百官備具於是乎背秋涉冬天子校獵乘鏤象六玉虯拖霓旌靡雲旗前皮軒後道遊孫叔奉轡衛公參乘扈從橫行出乎四校之中鼓嚴簿縱獵者江河為阹泰山為櫓車騎靁起殷天動地先後陸離離散别追淫淫裔裔緣陵流澤雲布雨施生貔豹搏豺狼手熊羆足壄羊蒙鶡蘇褲白虎被斑文跨壄馬陵三嵕之危下磧歷之坻徑峻赴險越壑厲水推蜚亷弄解豸格蝦蛤鋋猛氏羂騕裊射封豕箭不茍害解脰陷腦弓不虛發應聲而倒於是乘輿弭節徘徊翺翔往來睨部曲之進退覽將帥之變態然後侵淫促節倏敻逺去流離輕禽蹴履狡獸􅗗白鹿捷狡兔軼赤電遺光耀追怪物出宇宙彎蕃弱滿白羽射遊梟櫟蜚遽擇肉而後發先中而命處弦矢分蓻殪仆然後揚節而上浮陵驚風歷駭焱乘虛亡與神俱藺元鶴亂昆雞遒孔鸞促鵔鸃拂翳鳥捎鳯凰捷鵷雛掩焦明道盡塗殫回車而還消搖乎襄羊降集乎北紘率乎直指掩乎反鄉蹶石關歷封巒過䧴鵲望露寒下棠梨息宜春西馳宣曲濯鷁牛首登龍臺掩細柳觀士大夫之勤略鈞獵者之所獲徒車之所閵轢騎之所蹂若人之所蹈藉與其窮極倦􅚏驚憚讋伏不被創刃而死者它它藉藉填坑滿谷掩平彌澤於是乎遊戲懈怠置酒乎皓天之臺張樂乎膠葛之宇撞千石之鐘立萬石之虡建翠華之旗樹靈鼉之鼓奏陶唐氏之舞聽葛天氏之歌千人倡萬人和山陵為之震動川谷為之蕩波巴俞宋蔡淮南干遮文成顛歌族居遞奏金鼓迭起鏗鏘闛鞈洞心駭耳荆吳鄭衛之聲韶濩武象之樂隂淫案衍之音鄢郢繽紛激楚結風俳優侏儒狄鞮之倡所以娛耳目而樂心意者麗靡爛漫於前靡曼美色於後若夫青琴虙妃之徒絶殊離俗妖冶間都靚莊刻飾便嬛繛約柔橈嬛嬛嫵媚􅏽弱曵獨繭之褕袣眇閻易以恤削便姍嫳屑與世殊服芬芳漚鬱酷烈淑郁皓齒粲爛宜笑的皪長眉連娟微睇綿藐色授魂與心愈於側於是酒中樂酣天子芒然而思似若有亡曰嗟乎此泰奢侈朕以覽聽餘間無事棄日順天道以殺伐時休息於此恐後世靡麗遂往而不返非所以為繼嗣創業埀統也於是乎乃解酒罷獵而命有司曰地可以墾辟悉為農郊以贍氓𨽻隤牆填塹使山澤之民得至焉實陂池而勿禁虛宫館而勿仞發倉廪以救貧窮補不足恤鰥寡存孤獨出德號省刑罰改制度易服色革正朔與天下為始於是歷吉日以齊戒襲朝服乘法駕建華旗鳴玉鸞遊乎六藝之囿騖乎仁義之塗覽觀春秋之林射貍首兼騶虞弋元鶴舞干戚載雲罕掩羣雅悲伐檀樂樂胥修容乎禮園翺翔乎書圃述易道放怪獸登明堂坐清廟恣羣臣奏得失四海之內無不受獲於斯之時天下大説鄉風而聽隨流而化卉然興道而遷義刑錯而不用德隆於三皇功羡於五帝若此故獵乃可喜也若夫終日馳騁勞神苦形罷車馬之用杭士卒之精費府庫之財而無德厚之恩務在獨樂不顧衆庶忘國家之政貪雉兔之獲則仁者不繇也從此觀之齊楚之事豈不哀哉地方不過千里而囿居九百是草木不得墾辟而民無所食也夫以諸侯之細而樂萬乘之所侈僕恐百姓被其尤也於是二子愀然改容超若自失逡巡避席曰鄙人固陋不知忌諱乃今日見教謹受命矣賦奏天子以為郎亡是公言上林廣大山谷水泉萬物及子虛言雲夢所有甚衆侈靡多過其實且非義理所止故刪取其要歸正道而論之相如為郎數嵗會唐蒙使略通夜郎僰中發巴蜀卒吏千人郡又多為發轉漕萬餘人用軍興法誅其渠率巴蜀民大驚恐上聞之乃遣相如責唐蒙等因諭告巴蜀民以非上意檄曰告巴蜀太守蠻夷自擅不討之日久矣時侵犯邊境勞士大夫陛下即位存撫天下集安中國然後興師出兵北征胸奴單于怖駭交臂受事屈膝請和康居西域重譯納貢稽首來享移師東指閩越相誅右弔番禺太子入朝南夷之君西僰之長常效貢職不敢惰怠延頸舉踵喁喁然皆鄉風慕義欲為臣妾道里遼逺山川阻深不能自致夫不順者已誅而為善未賞故遣中郎將往賞之發巴蜀之士各五百人以奉幣衛使者不然靡有兵革之事戰鬭之患今聞其乃發軍興制驚懼子弟憂患長老郡又擅為轉粟運輸皆非陛下之意也當行者或亡逃自賊殺亦非人臣之節也夫邊郡之士聞烽舉燧燔皆攝弓而馳荷兵而走流汗相屬惟恐居後觸白刃冒流矢議不反顧計不旋踵人懷怒心如報私讎彼豈樂死惡生非編列之民而與巴蜀異主哉計深慮逺急國家之難而樂盡人臣之道也故有剖符之封析圭而爵位為通侯居列東第終則遺顯號於世傳土地於子孫事行甚忠敬居位甚安佚名聲施於無窮功烈著而不滅是以賢人君子肝腦塗中原膏液潤野􅋄而不辭也今奉幣使至南夷即自賊殺或亡逃抵誅身死無名諡為至愚耻及父母為天下笑人之度量相越豈不逺哉然此非獨行者之罪也父兄之教不先子弟之率不謹寡廉鮮耻而俗不長厚也其被刑戮不亦宜乎陛下患使者所司之若彼悼不肖愚民之如此故遣信使曉諭百姓以發卒之事因數之以不忠死亡之罪讓三老孝弟以不教誨之過方今田時重煩百姓已親見近縣恐逺所溪谷山澤之民不遍聞檄到亟下縣道咸諭陛下意毋忽相如還報唐蒙已略通夜郎因通西南夷道發巴蜀廣漢卒作者數萬人治道二嵗道不成士卒多物故費以億萬計蜀民及漢用事者多言其不便是時卭莋之君長聞南夷與漢通得賞賜多多欲願為內臣妾請吏比南夷上問相如相如曰卭莋冉駹者近蜀道易通異時嘗通為郡縣矣至漢興而罷今誠復通為置縣愈於南夷上以為然乃拜相如為中郎將建節往使副使者王然于壺充國呂越人馳四乘之傳因巴蜀吏幣物以賂西南夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨卭諸公皆因門下獻牛酒以交歡卓王孫喟然而歎自以得使女尚司馬長卿晚乃厚分與其女財與男等相如使略定西南夷卭莋冉駹斯榆之君皆請為臣妾除邊關邊關益斥西至沫若水南至牂柯為徼通靈山道橋孫水以通卭莋還報天子大説相如使時蜀長老多言通西南夷之不為用大臣亦以為然相如欲諌業已建之不敢乃著書籍蜀父老為辭而已詰難之以風天子且因宣其使詣令百姓皆知天子意其辭曰漢興七十有八載德茂存乎六世威武紛云湛恩汪濊羣生霑濡洋溢乎方外於是乃命使西征隨流而攘風之所被罔不披靡因朝冉從駹定莋存卭略斯榆舉苞蒲結軌還轅東鄉將報至於蜀都耆老大夫搢紳先生之徒二十有七人儼然造焉辭畢進曰蓋聞天子之於夷狄也其義羈縻勿絶而已今罷二郡之士通夜郎之塗三年於兹而功不竟士卒勞倦萬民不贍今又接之以西夷百姓力屈恐不能卒業此亦使者之纍也竊為左右患之且夫卭莋西僰之與中國並也歷年兹多不可記已仁者不以德來強者不以力并意者殆不可乎今割齊民以附夷狄弊所恃以事無用鄙人固陋不識所謂使者曰烏謂此乎必若所云則是蜀不變服而巴不化俗也僕尚惡聞若説然斯事體大固非觀者之所覯也余之行急其詳不可得聞已請為大夫粗陳其略蓋世必有非常之人然後有非常之事有非常之事然後有非常之功非常者固常人之所異也故曰非常之元黎民懼焉及臻厥成天下晏如也昔者洪水沸出汜濫衍溢民人升降移徙﨑嶇而不安夏后氏戚之乃堙洪源決江疏河灑沈淡災東歸之於海而天下永寧當斯之勤豈惟民哉心煩於慮而身親其勞躬傶骿胝無胈膚不生毛故休烈顯乎無窮聲稱浹乎于兹且夫賢君之踐位也豈特委瑣握􅐅拘文牽俗循誦習傳當世取説云爾哉必將崇論谹議創業埀統為萬世規故馳騖乎兼容并包而勤思乎參天二地且詩不云乎普天之下莫非王土率土之濵莫非王臣是以六合之內八方之外浸淫衍溢懷生之物有不浸潤於澤者賢君耻之今封疆之內冠帶之倫咸獲嘉祉靡有闕遺矣而夷狄殊俗之國遼絶異黨之域舟車不通人迹罕至政教未加流風猶微內之則犯義侵禮於邊境外之則邪行橫作放殺其上君臣易位尊卑失序父兄不辜幼孤為奴虜係絫號泣內鄉而怨曰蓋聞中國有至仁焉德洋恩普物靡不得其所今獨曷為遺已舉踵思慕若枯旱之望雨盩夫為之埀涕况乎上聖又烏能已故北出師以討強胡南馳使以誚徑越四靣風德二方之君鱗集仰流願得受號者以億計故乃關沫若徼牂柯鏤靈山梁孫原創道德之塗埀仁義之統將博恩廣施逺撫長駕使疏逖不閉曶爽暗昧得耀乎光明以偃甲兵於此而息討伐於彼遐邇一體中外禔福不亦康乎夫拯民於沈溺奉至尊之休德反衰世之陵夷繼周氏之絶業乃天子之急務也百姓雖勞又惡可以已哉且夫王者固未有不始於憂勤而終於逸樂者也然則受命之符合在於此方將增泰山之封加梁父之事鳴和鸞揚樂頌上咸五下登三觀者未覩指聽者未聞音猶焦朋已翔乎寥廓而羅者猶視乎藪澤悲夫於是諸大夫茫然喪其所懷來失厥所以進喟然並稱曰允哉漢德此鄙人之所願聞也百姓雖勞請以身先之敞罔靡徙遷延而辭避其後人有上書言相如使時受金失官居嵗餘復召為郎相如口吃而善著書常有消渴疾與卓氏婚饒於財故其仕宦未嘗肯與公卿國家之事常稱疾間居不慕官爵嘗從上至長楊獵時天子方好自擊熊豕馳逐壄獸相如因上疏諫其辭曰臣聞物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育臣之愚竊以為人誠有之獸亦宜然今陛下好陵阻險射猛獸卒然遇逸材之獸駭不存之地犯屬車之清塵輿不及還轅人不暇施巧雖有烏獲逢蒙之技不得用枯木朽株盡為難矣是胡越起於轂下而羌夷接軫也豈不殆哉雖萬全而無患然本非天子之所宜近也且夫清道而後行中路而馳猶時有銜橛之變况乎涉豐草騁邱虛前則有利獸之樂而內無存變之憂其為害也不亦難矣夫輕萬乘之重不以為安樂出萬有一危之塗以為娛臣竊為陛下不取蓋明者逺見於未萌而智者避危於無形禍固多藏於隱微而發於人之所忽者也故鄙諺曰家絫十金坐不埀堂此言雖小可以諭大臣願陛下留意幸察上善之還過宜春宫相如奏賦以哀二世行失其辭曰登陂陀之長阪兮坌入曾宫之嵯峨臨曲江之隑州兮望南山之參差巖巖深山之谾谾兮通谷􅣲乎􅢋谺汨淢靸以永逝兮注平臯之廣衍觀衆樹之蓊薆兮覽竹林之榛榛東馳土山兮北揭石瀨弭節容與兮歷弔二世持身不謹兮亡國失勢信讒不寤兮宗廟滅絶烏乎操行之不得墓蕪穢而不修兮魂無歸而不食相如拜為孝文園令上既美子虛之事相如見上好神仙因曰上林之事未足美也尚有靡者臣嘗為大人賦未就請具而奏之相如以為列仙之儒居山澤間形容甚癯此非帝王之仙意也乃遂奏大人賦其辭曰世有大人兮在乎中州宅彌萬里兮曾不足以少留悲世俗之逼隘兮朅輕舉而逺遊乘絳幡之紫霓兮載雲氣而上浮建格澤之修竿兮總光耀之采旄埀旬始以為幓兮曵彗星而為髾掉指橋以偃寋兮又猗抳以招搖攬攙搶以為旌兮靡屈虹而為綢紅杳眇以元湣兮焱風涌而雲浮駕應龍象輿之蠖略委麗兮驂赤螭青蛇之蚴蟉宛蜒低卬夭蹻裾以驕驁兮詘折隆窮躩以連卷沛艾﨣螑仡以佁擬兮放散畔岸驤以孱顔跮踱輵螛以骫麗兮蜩蟉偃寋怵㲋以梁倚紏蓼􅀈奡踏以朡路兮薎蒙踊躍騰而狂趭蒞颯卉歙焱至電過兮煥然霧除霍然雲消邪絶少陽而登太隂兮與真人乎相求互折窈窕以右轉兮橫厲飛泉以正東悉徴靈圉而選之兮部署衆神於搖光使五帝先導兮反大一而從陵陽左元冥而右黔雷兮前長離而後矞皇厮征伯僑而役羡門兮詔岐伯使尚方祝融警而蹕御兮清氣氛而後行屯余車而萬乘兮綷雲蓋而樹華旗使勾芒其將行兮吾欲往乎南娭歷唐堯於崇山兮過虞舜於九疑紛湛湛其差錯兮雜遝膠輵以方馳騷擾衝蓯其紛拿兮滂濞泱軋麗以林離攢羅列聚叢以蘢茸兮衍曼流爛痑以陸離徑入雷室之砰磷鬱律兮洞出鬼谷之崛礨崴魁遍覽八紘而觀四海兮朅度九江越五河經營炎火而浮弱水兮杭絶浮渚涉流沙奄息蔥極汜濫水娭兮使靈媧鼓琴而舞馮夷時若曖曖將混濁兮召屛翳誅風伯刑雨師西望崑崙之軋沕荒忽兮直徑馳乎三危排閶闔而入帝宮兮載玉女而與之歸登閬風而遙集兮亢鳥騰而一止低徊隂山翔以紆曲兮吾乃今日覩西王母皓然白首戴勝而穴處兮亦幸有三足烏為之使必長生若此而不死兮雖濟萬世不足以喜回車朅來兮絶道不周會食幽都呼吸沆瀣兮餐朝霞咀噍芝英兮嘰瓊華僸祲尋而髙縱兮紛鴻溶而上厲貫列缺之倒景兮涉豐隆之滂濞騁遊道而修降兮騖遺霧而逺逝迫區中之隘陜兮舒節出乎北垠遺屯騎於元闕兮軼先驅於寒門下崢嶸而無地兮上嵺廓而無天視眩泯而亡見兮聽敞恍而亡聞乘虛亡而上遐兮超無友而獨存相如既奏大人賦天子大説飄飄有陵雲氣遊天地之間意相如既病免家居茂陵天子曰司馬相如病甚可往悉取其書書若後之矣使所忠往而相如已死家無遺書問其妻對曰長卿未嘗有書也時時著書人又取去長卿未死時為一卷書曰有使來求書奏之其遺札書言封禪事所忠奏焉天子異之其辭曰伊上古之初肇自皓穹生民歷選列辟以迄于秦率邇者踵武聽逖者風聲紛輪威㽔堙滅而不稱者不可勝數也繼昭夏崇號諡略可道者七十有二君罔若淑而不昌疇逆失而能存軒轅之前遐哉邈乎其詳不可得聞已五三六經載籍之傳維見可觀也書曰元首明哉股肱良哉因斯以談君莫盛於堯臣莫賢於后稷后稷創業於唐公劉發迹於西戎文王改制爰周郅隆大行越成而后陵遲衰微千載亡聲豈不善始善終哉然無異端慎所由於前謹遺教於後耳故軌迹夷易易遵也湛恩龎洪易豐也憲度著明易則也埀統順理易繼也是以業隆於繦褓而崇冠乎二后揆厥所元終都攸卒未有殊尤絶迹可考於今者也然猶躡梁甫登太山建顯號施尊名大漢之德逢涌原泉沕潏曼羡旁魄四塞雲布霧散上暢九垓下泝八埏懷生之類沾濡浸潤協氣橫流武節焱逝邇狹遊原迥濶泳末首惡鬱沒暗昧昭晰昆蟲闓懌回首面內然後囿騶虞之珍羣徼麋鹿之怪獸導一莖六穗於庖犧雙觡共抵之獸獲周餘放龜于岐招翠黃乘龍於沼鬼神接靈圉賔於間館竒物譎詭俶儻窮變欽哉符瑞臻兹猶以為薄不敢道封禪蓋周躍魚隕杭休之以燎微夫斯之為符也以登介邱不亦恧乎進攘之道何其爽與於是大司馬進曰陛下仁育羣生義征不譓諸夏樂貢百蠻執贄德侔往初功無與二休烈液洽符瑞衆變期應紹至不特創見意者泰山梁父設壇場望幸蓋號以况榮上帝埀恩儲祉將以慶成陛下嗛讓而弗發也挈三神之歡缺王道之儀羣臣恧焉或謂且天為質暗示珍符固不可辭若然辭之是泰山靡記而梁甫罔幾也亦各並時而榮咸濟厥世而屈説者尚何稱於後而云七十二君哉夫修德以錫福奉符以行事不為進越也故聖王弗替而修禮以祗謁欵天神勒功中嶽以章至尊舒盛德發號榮受厚福以浸黎民皇皇哉斯事天下之壯觀王者之卒業不可貶也願陛下全之而后因雜縉紳先生之略術使獲曜日月之末光絶焱以展采錯事猶兼正列其義祓飾厥文作春秋一藝將襲舊六為七攄之無窮俾萬世得激清流揚微波蜚英聲騰茂實前聖之所以永保鴻名而常為稱首者用此宜命掌故悉奏其儀而覽焉於是天子沛然改容曰俞乎朕其試哉乃遷思回慮總公卿之議詢封禪之事詩大澤之博廣符瑞之富遂作頌曰自我天覆雲之油油甘露時雨厥壤可遊滋液滲漉何生不育嘉穀六穗我穡曷蓄匪唯雨之又潤澤之匪唯偏我汜布濩之萬物熙熙懷而慕之名山顯位望君之來君兮君兮侯不邁哉􅶤􅶤之獸樂我君圃白質黑章其儀可喜旻旻穆穆君子之態蓋聞其聲今視其來厥塗靡從天瑞之徴兹爾於舜虞氏以興濯濯之麟遊彼靈畤孟冬十月君徂郊把馳我君輿帝用享祉三代之前蓋未嘗有宛宛黃龍興德而升采色元耀煥炳輝煌正陽顯見覺寤黎蒸於傳載之云受命所乘厥之有章不必諄諄依類託寓諭以封巒披藝觀之天人之際已交上下相發允答聖王之事兢兢翼翼故曰於興必慮衰安必畏危是以湯武至尊嚴不失肅祗舜在假典顧省厥遺此之謂也相如既卒五嵗上始祭后土八年而遂禮中嶽封于太山至梁甫禪肅然相如他所著若遺平陵侯書與五公子相難􅋄木書篇不采采其尤著公卿者云公孫𢎞字季齊災川薛人也少時為薛獄吏有罪免家貧牧豕海上年四十餘乃學春秋雜説武帝初即位招賢良文學之士是時𢎞年六十以賢良徵為博士使胸奴還報不合意上怒以為不能𢎞乃移病免歸元光五年復徵賢良文學災川國復推上𢎞𢎞謝曰前已嘗西應命以不能罷歸願更推選國人固推𢎞𢎞至太常上䇿詔諸儒制曰蓋聞上古至治畫衣冠異章服而民不犯隂陽和五穀登六畜蕃甘露降風雨時嘉禾興朱草生山不童澤不涸麟鳯在郊藪龜龍遊於沼河洛出圖書父不喪子兄不哭弟北發渠搜南撫交址舟車所至人迹所及跂行喙息咸得其宜朕甚嘉之今何道而臻乎此子大夫修先聖之術明君臣之義講論洽聞有聲乎當世敢問子大夫天人之道何所本始吉凶之效安所期焉禹湯水旱厥咎何由仁義禮智四者之宜當安設施屬統埀業物鬼變化天命之符廢興何如天文地理人事之紀子大夫習焉其悉意正議詳具其對著之于篇朕將親覽焉靡有所隱𢎞對曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也夫厚賞重刑未足以勸善而禁非必信而已矣是故因能任官則分職治去無用之言則事情得不作無用之器則賦斂省不奪民時不妨民力則百姓富有德者進無德者退則朝廷尊有功者上無功者下則羣臣逡罰當罪則姦邪止賞當賢則臣下勸凡此八者治民之本也故民者業之即不爭理得則不怨有禮則不暴愛之則親上此有天下之急者也故法不逺義則民服而不離和不逺禮則民親而不暴故法之所罰義之所去也和之所賞禮之所取也禮義者民之所服也而賞罰順之則民不犯禁矣故畫衣冠異章服而民不犯者此道素行也臣聞之氣同則從聲比則應今人主和德於上百姓和合於下故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故隂陽和風雨時甘露降五穀登六畜蕃嘉禾興朱草生山不童澤不涸此和之至也故形和則無疾無疾則不夭故父不喪子兄不哭弟德配天地明並日月則麟鳯至龜龍在郊河出圖洛出書逺方之君莫不説義奉幣而來朝此和之極也臣聞之仁者愛也義者宜也禮者所履也智者術之原也致利除害兼愛無私謂之仁明是非立可否謂之義進退有度尊卑有分謂之禮擅殺生之柄通壅塞之塗權輕重之數論得失之道使逺近情偽必見於上謂之術凡此四者治之本道之用也皆當設施不可廢也得其要則天下安樂法設而不用不得其術則主蔽於上臣亂於下此事之情屬統埀業之本也臣聞堯遭鴻水使禹治之未聞禹之有水也若湯之旱則桀之餘烈也桀紂行惡受天之罰禹湯積德以王天下因此觀之天德無私親順之和起逆之害生此天文地理人事之紀臣𢎞愚戇不足以奉大對時對者百餘人太常奏𢎞第居下䇿奏天子擢𢎞對為第一召見容貌甚麗拜為博士待詔金馬門𢎞復上疏曰陛下有先聖之位而無先聖之名有先聖之民而無先聖之吏是以勢同而治異先世之吏正故其民篤今世之吏邪故其民薄政弊而不行令倦而不聽夫使邪吏行弊政用倦令治薄民民不可得而化此治之所以異也臣聞周公旦治天下期年而變三年而化五年而定唯陛下之所志書奏天子以册書答曰問𢎞稱周公之治𢎞之材能自視孰與周公賢𢎞對曰愚臣淺薄安敢比材於周公雖然愚心曉然見治道之可以然也夫虎豹馬牛禽獸之不可制者也及其教馴服習之至可牽持駕服唯人之從臣聞揉曲木者不纍日銷金石者不纍月夫人之於利害好惡豈比禽獸木石之類哉期年而變臣𢎞尚且遲之上異其言時方通西南夷巴蜀苦之詔使𢎞視焉還奏事盛毁西南夷無所用上不聼每朝會議開陳其端使人主自擇不肯靣折廷爭於是上察其行慎厚辨論有餘習文法吏事緣飾以儒術上説之一嵗中至左內史𢎞奏事有不可者不肯庭辨嘗與主爵都尉汲黯請間汲黯先發之𢎞推其後天子常説所言皆聽以此日益親貴嘗與公卿約議至上前皆背其約以順上旨汲黯庭詰𢎞曰齊人多詐而無情實始為與臣等建此議今皆背之不忠上問𢎞𢎞謝曰夫知臣者以臣為忠不知臣者以臣為不忠上然𢎞言左右幸臣每毁𢎞上益厚遇之𢎞為人談笑多聞常稱以為人主病不廣大人臣病不節儉養後母孝謹後母卒服喪三年為內史數年為御史大夫時又東置蒼海北築朔方之郡𢎞數諫以為罷敝中國以奉無用之地願罷之於是天子乃使朱買臣等難𢎞置朔方之便發十䇿𢎞不得一乃謝曰山東鄙人不知其便若是願罷西南夷蒼海而專奉朔方上乃許之汲黯曰𢎞位在三公奉祿甚多然為布被此詐也上問𢎞𢎞謝曰有之夫九卿與臣善者無過黯然今日庭詰𢎞誠中𢎞之病夫以三公為布被誠飾詐欲以釣名且臣聞管仲相齊有三歸侈擬於君桓公以霸亦上僭於君晏嬰相景公食不重肉妾不衣絲齊國亦治亦下比於民今臣𢎞位為御史大夫而為布被自九卿已下至於小吏無差誠如黯言且無黯陛下安聞此言天子以為有讓愈益賢之元朔五年代薛澤為丞相先是漢常以列侯為丞相唯𢎞無爵上於是下詔以髙成之平津鄉六百五十戶封𢎞為平津侯其後以為故事至丞相封侯自𢎞始也時上方興功業屢舉賢良𢎞自見為舉首起徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議𢎞身食一肉脫粟飯故人賔客仰衣食奉祿皆以給之家無所餘然其性意急外寬內深諸嘗與𢎞有隙無逺近雖陽與善後竟報其過殺主父偃徙董仲舒膠西皆𢎞之力也後淮南衡山謀反治黨與方急𢎞病甚自以為無功而封侯居宰相位宜佐明主鎮撫國家使人由臣子之道今諸侯有畔逆之計此皆大臣奉職不稱也恐病死無以塞責乃上書曰臣聞天下通道五所以行之三君臣父子夫婦長幼朋友之交五者天下之通道也仁智勇三者所以行之故曰好問近乎知力行近乎仁知耻近乎勇知此三者知所以自治知所以自治然後知所以治人未有不能自治而能治人者也陛下躬孝弟監三王建周道兼文武招徠四方之士任賢序位量能授官將以厲百姓勸賢材也今臣愚駑無汗馬之勞陛下過意擢臣𢎞卒伍之中封為列侯致位三公臣𢎞行能不足以稱加有負薪之疾恐先狗馬填溝壑終無以報德塞責願歸侯印乞骸骨避賢者路上報不許因賜告牛酒雜帛居數月有瘳視事凡為丞相御史六嵗年八十終丞相位其後李蔡嚴青翟趙周石慶公孫賀劉屈氂繼踵為丞相自蔡至慶丞相府客館邱虛而已至賀屈氂時壞以為馬廄車庫奴婢室矣惟慶以惇謹復終相位其餘盡伏誅云𢎞子度嗣侯為山陽太守十餘嵗坐法失侯元始中修功臣後賜𢎞後子孫之次見為適者爵關內侯食邑三百戶卜式河南人也以田畜為事有少弟弟壯式脫身出獨取畜羊百餘田宅財物盡與弟式入山牧十餘年羊致千餘頭買田宅而弟盡破其産式輒復分與弟者數矣時漢方用事胸奴式上書願輸家財半助邊上使使問式欲為官乎式曰自小牧羊不習仕宦不願也使者曰家豈有寃欲言事乎式曰邑人貧者貸之不善者教之所居人皆從式式何故見寃使者曰茍子何欲式曰天子誅胸奴愚以為賢者宜死節有財者宜輸之如此而胸奴可滅也使者以聞上以語丞相𢎞𢎞曰此非人情不軌之臣不可以為化而亂法願陛下勿許上不報數嵗乃罷式式歸復田牧嵗餘會渾邪等降縣官費衆倉府空貧民大徙皆卬給縣官無以盡贍式復持錢二十萬與河南太守以給徙民河南上富人助貧民者上識式姓名曰是固前欲輸其家財半助邊乃賜式繇四百人式又盡復與官是時富豪皆爭匿財唯式尤欲助費上於是以式終長者乃召拜式為中郎賜爵左庶長田十頃布告天下尊顯以風百姓初式不願為郎上曰吾有羊在上林中欲令子牧之式既為郎布衣草蹻而牧羊嵗餘羊肥息上過其羊所善之式曰非獨牧羊也治民亦猶是矣以時起居惡者輒去無令敗羣上竒其言欲試使治民拜緱氏令緱氏便之遷成臯令將漕最上以式朴忠拜為齊王太傅轉為相會呂嘉反式上書曰臣聞主愧臣死羣臣宜盡死節其駑下者宜出財以佐軍如是則強國不犯之道也臣願與子男及臨災習弩博昌習船者請行死之以盡臣節上賢之下詔優奬式賜爵關內侯黃金四百斤田一十頃布告天下使明知之元鼎中徴式代石慶為御史大夫式既在位言郡國不便鹽鐵而船有算可罷上由是不説式明年當封禪式又不習文章貶秩為太子太傅以兒寬代之式以夀終兒寬千乘人也治尚書事歐陽生以郡國選詣博士受業孔安國貧無資用常為弟子都養時行賃作帶經而鉏休息輒讀誦其精如此以射䇿為掌故功次補廷尉文學卒史寬為人溫良有亷知自將善屬文然懦於武口弗能發明也時張湯為廷尉廷尉府盡用文史法律之吏而寬以儒生在其間見謂不習事不署曹除為從史從史者但只隨官僚不主文書之北地視畜數年畜謂廷尉之畜在北地者若今諸司公廨牛羊還至府上畜簿會廷尉時有疑奏已再見郤矣掾史莫知所為寬為言其意掾史因使寬為奏奏成讀之皆服以白廷尉湯湯大驚召寬與語乃竒其材以為掾上寬所作奏即時得可異日湯見上問曰前奏非俗吏所及誰為之者湯言兒寬上曰吾故聞之久矣湯由是鄉學以寬為奏讞掾以古法義決疑獄甚重之及湯為御史大夫以寬為掾舉侍御史見上語經學上曰吾始以尚書為朴學弗好及聞寬説可觀乃從寬問尚書一篇上説之擢為中大夫遷左內史寬既治民勸農桑緩刑罰理獄訟卑體下士務在於得人心擇用仁厚士推情與下不求名聲吏民大信愛之寬表奏開六輔渠定水令以廣溉田收租稅時裁闊狹與民相假貸以故租多不入後有軍發左內史以負租課殿當免民聞當免皆恐失之大家牛車小家擔負輸租繦屬不絶課更以最上由此愈竒寬及議欲放古巡狩封禪之事諸儒對者五十餘人未能有所定先是司馬相如病死有遺書頌功德言符瑞足以封泰山上竒其書以問寬寬對曰陛下躬發聖德統輯羣元宗祀天地薦禮百神精神所嚮徴兆必報天地並應符瑞昭明其封泰山禪梁父帝王之盛節也然享薦之儀不著于經以為封禪告成合袪於天地神祗祗戒精專以接神明總百官之職各稱事宜而為之節文唯聖王所由制定其當非羣臣之所能列今將舉大事優遊數年使羣臣得人自盡終莫能成唯天子建中和之極兼總條貫金聲而玉振之以順成天慶埀萬世之基上然之乃自制儀采儒術以文焉既成將用事拜寬為御史大夫從東封泰山還登明堂寬上夀曰臣聞三代改制屬象相因間者聖統廢絶陛下發憤合指天地祖立明堂辟雍宗祀泰一六律五聲幽贊聖意神樂四合各有方象以承嘉祀為萬世則天下幸甚將建太元本瑞登告岱宗發祉闓門以候景至癸亥宗祀日宣重光上元甲子肅雍永亨光輝充塞天文燦然見象日昭報降符應臣寬奉觴再拜上千萬嵗夀制曰敬舉君之觴後太史令司馬遷等言歷紀壞廢漢興未改正朔宜可正上乃詔寬與遷等共定漢太初歷初梁相褚大通五經為博士時寬為弟子及御史大夫缺徴褚大大自以為得御史大夫至洛陽聞兒寬為之乃大笑及至與寬議封禪於上前大不能及退而服曰上誠知人寬為御史大夫以稱意任職故久無有所匡諫於上官屬易之居位九年以官卒張湯杜陵人也其父為長安丞出湯為兒守舍還鼠盜肉父怒笞湯湯掘熏得鼠及餘肉劾鼠掠治傳爰書訊鞫論報并取鼠與肉具獄磔堂下父見之視其文辭如老獄吏大驚遂使書獄父死後湯為長安吏周陽侯為諸卿時嘗繫長安湯傾身事之及出為侯大與湯交遍見貴人湯給事內史為寧成掾以湯為無害言大府調茂陵尉治方中武安侯為丞相徴湯為史薦補侍御史治陳皇后巫蠱獄深竟黨與上以為能遷太中大夫與趙禹共定諸律令務在深文拘守職之吏已而禹至少府湯為廷尉兩人交歡兄事禹禹志在奉公孤立湯為人多詐舞智以御人始為小吏乾沒乾音干乾沒者豫居物以待之得利為乾失利為沒與長安富賈田甲魚翁叔之屬交私及列九卿收接天下名士大夫已心內雖不合然陽浮道與之是時上方鄉文學湯決大獄欲傅古義乃請博士弟子治尚書春秋補廷尉史平亭疑法奏讞疑事必奏先為上分别其原上所是受而著讞法廷尉挈令揚主之明奏事即譴湯摧謝鄉上意所便必引監掾史賢者曰固為臣議如此上責臣臣弗用愚抵此罪常釋間即奏事上善之曰臣非知為此奏乃監掾史某所為其欲薦吏揚人之善解人之過如此所治即上意所欲罪豫監史深刻者即上意所欲釋豫監史輕平者所治即豪必舞文巧詆即下戶羸弱時口言雖文致治上裁察於是往往釋湯所言湯至於大吏內行修交通賔客飲食於故人子弟為吏及貧昆弟調護之尤厚其造請諸公不避寒暑是以湯雖文深意忌不專平然得此聲譽而深刻吏多為爪牙用者依於文學之士丞相𢎞數稱其美及治淮南衡山江都反獄皆窮根本嚴助伍被上欲釋之湯爭曰伍被本造反謀而助親幸出入禁闥腹心之臣乃交私諸侯如此弗誅後不可治上可論之其治獄所巧排大臣自以為功多此類由是益尊任遷御史大夫會渾邪等降漢大興兵伐胸奴山東水旱貧民流徙皆卬給縣官縣官空虛湯承上旨請造白金及五銖錢籠天下鹽鐵排富啇大賈出告緍令鉏豪強兼并之家舞文巧詆以輔法湯每朝奏事語國家用日旰天子忘食丞相取充位天下事皆決於湯百姓不安其生騷動縣官所興未獲其利姦吏並侵漁於是痛繩以罪自公卿已下至於庶人咸指湯湯嘗病上自至舍視其隆貴如此胸奴求和親羣臣議前博士狄山曰和親便上問其便山曰兵凶器未易數動髙帝欲伐胸奴大困平城乃遂結和親孝惠髙后時天下安樂及文帝欲事胸奴北邊蕭然苦兵孝景時吳楚七國反景帝往來東宫間天下寒心數月吳楚破竟景帝不言兵天下富實今自陛下興兵擊胸奴中國以空虛邊大困貧由此觀之不如和親上問湯湯曰此愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠湯之治淮南江都以深文痛詆諸侯别疏骨肉使藩臣不安臣固知湯之詐忠於是上作色曰吾使生居一郡能無使虜入盜乎山曰不能曰居一縣曰不能復曰居一鄣間山自度辨窮且下吏曰能乃遣山乘鄣至月餘胸奴斬山頭而去是後羣臣震讋湯客田甲雖賈人有賢操始湯為小吏時與錢通及為大吏而甲所以責湯行義有烈士之風湯為御史大夫七嵗敗河東人李文故嘗與湯有隙已而為御史中丞薦數從中文事薦數猶簡閲也數音色主反有可以傷湯者不能為地湯有所愛史魯謁居知湯弗平乃使人上飛變告文姦事事下湯湯治論殺文而湯心知謁居為之上問變事從迹安起湯陽驚曰此殆文故人怨之謁居病卧閭里主人湯自往視病為謁居摩足趙國以冶鑄為業王數訟鐵官事湯常排趙王趙王求湯隂事謁居嘗案趙王趙王怨之并上書告湯大臣也史謁居有病湯至為摩足疑與為大姦事下廷尉謁居病死事連其弟弟繫導官湯亦治他囚導官見謁居弟欲隂為之而陽不省謁居弟不知而怨湯使人上書告湯與謁居謀共變告李文事下減宣宣嘗與湯有隙及得此事窮竟其事未奏也會人有盜發孝文園瘞錢丞相青翟朝與湯約俱謝至前湯念獨丞相以四時行園當謝湯無與也不謝丞相謝上使御史案其事湯欲致其文丞相見知丞相患之三長史皆害湯欲陷之始長史朱買臣素怨湯語在其傳王朝齊人以術至右內史邊通學短長剛暴人也官至濟南相故皆居湯右已而失官守長史詘體於湯湯數行丞相事知此三長史素貴常陵折之故三長史合謀曰始湯約與君謝已而賣君今欲劾君以宗廟事此欲代君耳吾知湯隂事使吏部案湯左田信等曰湯且欲為請奏信輒先知之居物致富與湯分之及他姦事事辭頗聞上問湯曰吾所為賈人輒知益居其物是類有以吾謀告之者湯不謝又陽驚曰固宜有減宣亦奏謁居事上以湯懷詐面欺使使八輩簿責湯湯具自道無此不服於是上使趙禹責湯禹至讓湯曰君何不知分也君所治夷滅者幾何人矣今人言君皆有狀天子重致君獄欲令君自為計何多以對為湯乃為書謝曰湯無尺寸之功起刀筆吏陛下幸置位三公無以塞責然謀陷湯者三長史也遂自殺湯死家産直不過五百金皆所得奉賜無他贏昆弟諸子欲厚葬湯湯母曰湯為天子大臣被惡言而死何厚葬為載以牛車有棺無椁上聞之曰非此母不生此子乃盡按誅三長史丞相青翟自殺出田信上惜湯復稍進其子安世安世字子孺少以父任為郎用善書給事尚書精力於職休沐未嘗出上行幸河東嘗亡書三篋詔問莫能知惟安世識之具作其事後購求得書以相比校無所遺失上竒其材擢為尚書令遷光祿大夫昭帝即位大將軍霍光秉政以安世篤行光親重之會左將軍上官桀父子及御史大夫桑𢎞羊皆與燕王蓋主謀反誅光以朝無舊臣白用安世為右將軍光祿勳以自副焉久之天子下詔曰右將軍光祿勳安世輔政宿衛肅敬不怠十有三年咸以康寧夫親親任賢唐虞之道也其封安世為富平侯明年昭帝崩未葬大將軍光白太后徙安世為車騎將軍與共徵立昌邑王王行淫亂光復與安世謀廢王尊立宣帝帝初即位褒賞大臣下詔益封安世萬六百戶功次大將軍光安世子千秋延夀彭祖皆中郎將侍中大將軍光薨後數月御史大夫魏相上封事言安世事孝武皇帝三十餘年忠信謹厚勤勞政事夙夜不怠與大將軍定䇿天下受其福國家重臣也宜尊其位以為大將軍毋令領光祿勳事使專精神憂念天下思惟得失安世子延夀重厚可以為光祿勳領宿衛臣上亦欲用之安世聞指懼不敢當請間求見免冠頓首曰老臣耳妄聞言之為先事不言情不達誠自量不足以繼大將軍唯天子財哀以全老臣之命上笑曰君言泰謙君而不可尚誰可者安世深辭弗能得後數日竟拜為大司馬車騎將軍領尚書事數月罷車騎將軍屯兵更為衛將軍兩宫衛尉城門北軍兵屬焉時霍光子禹為右將軍上亦以禹為大司馬罷其右將軍屯兵以虛尊加之而實奪其衆後嵗餘禹謀反夷宗族安世素小心畏忌已內憂矣其女孫敬為霍氏外屬婦當相坐安世瘦懼形於顔色上怪而憐之以問左右乃赦敬以慰其意安世䆮恐職典樞機以謹慎周密自著外內無間每定大政已決輒移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也嘗有所薦其人來謝安世大恨以為舉賢達能豈有私謝邪絶弗復為通有郎功髙不調自言安世曰君之功髙明主所知人臣執事何長短而自言乎絶不許已而郎果遷莫府長史遷辭去之官安世問以過失長史曰將軍為明主股肱而士無所進論者以為譏安世曰明主在上賢不肖較然臣下自修而已何知士而薦之其欲匿名迹逺權勢如此為光祿勳郎有醉小便殿上主事白行法安世曰何以知其不反水漿邪如何以小過成罪郎淫官婢婢兄自言安世曰奴以恚怒誣汙衣冠自署適奴其隱人過失皆此類也安世自見父子尊顯懷不自安為子延壽求出補吏上以為北地太守嵗餘上閔安世年老復徴延夀為左曹太僕初安世兄賀幸於衛太子太子敗賔客皆誅安世為賀上書得下蠶室後為掖庭令而宣帝以皇曾孫收養掖庭賀內傷太子無辜而曾孫孤幼所以視養拊循恩甚密焉及曾孫壯大賀教書令受詩為取許妃以家財聘之曾孫數有徴怪語在宣紀賀聞知為安世道之稱其材美安世輒絶止以為少主在上不宜稱述曾孫及宣帝立而賀已死上謂安世曰掖庭令平生稱我將軍止之是也上追思賀恩欲封其家為恩德侯置守冡二百家賀有一子蚤死無子子安世小男彭祖彭祖又小與上同席研書指欲封之先賜爵關內侯故安世深辭賀封又求損守冢戶數減至三十戶上曰吾自為掖庭令非為將軍也安世乃止不敢復言遂下詔為賀置守冢三十家上自處置其里居冢西鬭雞翁舍南上少時所嘗遊處也明年復下詔封賀弟子侍中關內侯彭祖為陽都侯賜賀諡曰陽都哀侯時賀有孤孫霸年七嵗拜為散騎中郎將賜爵關內侯食邑三百戶安世以父子封侯在位太盛乃辭祿詔都內别藏張氏無名錢以百萬數安世尊為公侯食邑萬戶然身衣弋綈夫人自紡績家童七百人皆有手技作事內治産業纍積纎微是以能殖其貨富於大將軍光天子甚尊憚大將軍然內親安世心密於光焉元康四年春安世病上疏歸侯乞骸骨不許復強起視事至秋薨天子贈印綬送以輕車介士諡曰敬侯賜塋杜東將作穿復土起冢祠堂子延夀嗣延夀已歷位九卿既嗣侯國在陳留別邑在魏郡租入嵗千餘萬延夀自以身無功德何以能久堪先人大國數上書讓減戶邑又因弟陽都侯彭祖口陳至誠天子以為有讓乃徙封平原并一國戶口如故而租稅減半薨諡曰愛侯子勃嗣為散騎諌大夫元帝初即位詔列侯舉茂材勃舉太官獻丞陳湯湯有罪勃坐削戶二百會薨故賜諡曰繆侯後湯立功西域世以勃為知人子臨嗣臨亦謙儉每登閣殿常歎曰桑霍為我戒豈不厚哉且死分施宗族故舊薄葬不起墳臨尚敬武公主公主元帝妹也薨子放嗣鴻嘉中上欲遵武帝故事與近臣遊宴放以公主子開敏得幸放取皇后弟平恩侯許嘉女上為放供張賜甲第充以乘輿服飾號為天子取婦皇后嫁女大官私官私官皇后之官也並供其第兩宫使者冠蓋不絶賞賜以千萬數放為侍中中郎將監平樂屯兵置莫府儀比將軍與上卧起寵愛殊絶常從為微行出遊北至甘泉南至長楊五莋鬭雞走馬長安中積數年是時上諸舅皆害其寵白太后太后以上春秋富動作不節甚以過放時數有災異議者歸咎放等於是丞相宣御史大夫方進奏放驕蹇縱恣奢淫不制前侍御史修等四人奉使至放家逐名捕賊時放見在奴從者閉門設兵弩射吏距使者不肯內知男子李遊君欲獻女使樂府音監景武強求不得使奴康等之其家賊傷三人又以縣官事怨樂府遊徼莽而使大奴駿等四十餘人羣黨盛兵弩白晝入樂府攻射官寺縛束長吏子弟斫破器物宫中皆奔走伏匿莽自髠鉗衣赭衣及守令史調等皆徒跣叩頭謝放放乃止奴從者支屬並乘權勢為暴虐至求吏妻不得殺其夫或恚一人妄殺其親屬輒亡入放第不得幸得勿治放行輕薄連犯大惡有感動隂陽之咎為臣不忠首罪名雖顯前蒙恩驕逸悖理與背畔無異臣子之惡莫大於是不宜宿衛在位臣請免放歸國以銷衆邪之萌厭海內之心上不得已左遷放為北地都尉數月復徴入侍中太后以放為言出放為天水屬國都尉永始元延間比年日蝕故久不還放璽書勞問不絶居嵗餘徴放歸第視母公主疾數月主有瘳出放為河東都尉上雖愛放然上迫太后下用大臣故常涕泣而遣之後復徴放為侍中光祿大夫秩中二千石嵗餘丞相方進復奏放上不得已免放賜錢五百萬遣就國數月成帝崩放思慕哭泣而死初安世長子千秋與霍光子禹俱為中郎將將兵隨度遼將軍范明友擊烏桓還謁大將軍光問千秋戰鬬方略山川形勢千秋口對兵事畫地成圖無所忘失光復問禹禹不能記曰皆有文書光由是賢千秋以禹為不材歎曰霍氏世衰張氏興矣及禹誅滅而安世子孫相繼自宣元已來為侍中中常侍諸曹散騎列校尉者一十餘人功臣之世惟有金氏張氏親近貴寵比於貴戚放子純嗣侯恭儉自修明習漢家制度故事有敬侯之遺風王莽時不失爵建武中歷位至大司空更封富平之别鄉為武始侯張湯本居杜陵安世武昭宣世輒隨所事帝徙處其陵凡三徙復還杜陵杜周南陽杜衍人也義縱為南陽太守以周為爪牙薦之張湯為廷尉史使案邊失亡所論殺甚多奏事中意任用與減宣更為中丞者十餘嵗周少言重遲而內深次骨宣為左內史周為廷尉其治大抵放張湯而善候司上所欲擠者因而陷之上所欲釋久繫待問而微見其寃狀客有謂周曰君為天下決平不循三尺法專以人主意指為獄獄者固如是乎周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎至周為廷尉詔獄亦益多矣二千石繫者新故相因不減百餘人郡吏大府舉之廷尉一嵗至千餘章章大者連逮證案數百小者數十人逺者數千里近者數百里會獄吏因責如章告劾不服以掠笞定之於是聞有逮證皆亡匿獄久者至更數赦十餘嵗而相告言大氐盡詆以不道以上廷尉及中都官詔獄逮至六七萬人吏所增加十有餘萬周中廢後為執金吾逐捕桑𢎞羊衛皇后昆弟子刻深上以為盡力無私遷為御史大夫始周為廷尉史有一馬及久任事列三公而兩子夾河為郡守家訾纍巨萬矣治皆酷暴惟少子延年寬厚云延年字幼公亦明法律昭帝初立大將軍霍光秉政以延年三公子吏材有餘補軍司空始元四年益州蠻夷反延年以校尉將南陽士擊益州還為諌大夫左將軍上官桀父子與蓋主燕王謀為逆亂假稻田使者燕倉知其謀以告大司農楊敞敞惶懼移病以語延年延年以聞桀等伏辜延年封為建平侯延年本大將軍霍光吏首發大姦有忠節由是擢為太僕右曹給事中光持刑罰嚴延年輔之以寬治燕王獄時御史大夫桑𢎞羊子遷亡過父故吏侯史吳後遷捕得伏法會赦侯史吳自出繫獄廷尉王平與少府徐仁雜治反事皆以為桑遷坐父謀反而侯史吳藏之非匿反者乃匿為隨者也即以赦令除吳罪後侍御史治實以桑遷通經術知父謀反而不諫爭與反者身無異侯史吳故三百石吏首匿遷不與庶人匿隨從者等吳不得赦奏請覆治劾廷尉少府縱反者少府徐仁即丞相車千秋女壻也故千秋數為侯史吳言恐光不聽千秋即召中二千石博士會公車門議問吳法議者知大將軍指皆藝吳為不道明日千秋封上衆議光於是以千秋擅召二千石以下外內異言遂下廷尉平少府仁獄朝廷皆恐丞相坐之延年乃奏記光爭以為吏縱罪人有常法今更抵吳為不道恐於法深又丞相素無所守持而為好言於下盡其素行也至擅召中二千石甚無狀延年愚以為丞相久故及先帝用事非有大故不可棄也間者民頗言獄深吏為峻詆今丞相所議又獄事也如是以及丞相恐不合衆心羣下歡譁庶人私議流言四布延年竊重將軍失此名於天下也光以廷尉少府弄法輕重皆論棄市而不以及丞相終與相竟延年論議持平合和朝廷皆此類也延年見國家承武帝奢侈師旅之後數為大將軍光言年嵗比不登流民未盡還宜修孝文時政示以儉約寬和順天心説民意年嵗宜應光納其言舉賢良議罷酒榷鹽鐵皆自延年發之吏民上書言便宜有異輒下延年平處復奏言可官試者至為縣令或丞相御史除用滿嵗以狀聞或抵其罪法常與兩府及廷尉分章昭帝末寢疾徴天下名醫延年典領方藥帝崩昌邑王即位廢大將軍光車騎將軍張安世與大臣議所立時宣帝養於掖庭號皇曾孫與延年中子他相愛善延年知曾孫德美勸光安世立焉宣帝即位褒賞大臣延年以定䇿安宗廟益戶二千三百與始封所食邑凡四千三百戶詔有司論定䇿功大司馬大將軍光功德過太尉絳侯周勃車騎將軍安世丞相楊敞功比丞相陳平前將軍韓增御史大夫蔡誼功比潁隂侯灌嬰太僕杜延年功比朱虛侯劉章後將軍趙充國大司農田延年少府史樂成功比典客劉揭皆封侯益土延年為人安和備於諸事久典朝政上任信之出即奉駕入給事中居九卿位十餘年賞賜賂遺訾數千萬光薨後子禹與宗族謀反誅上以延年霍氏舊人欲退之而丞相魏相奏延年素貴用事官職多姦遣吏考案但得苑馬多死官奴婢乏衣食延年坐免官削戶二千後數月復召拜為北地太守延年以故九卿外為邊吏治郡不進上以璽書讓延年延年乃選用良吏捕擊豪強郡中清靜居嵗餘上使謁者賜延年璽書黃金二十斤徙為西河太守治甚有名五鳯中徴入為御史大夫延年居父官府不敢當舊位坐卧皆易其處是時四夷和海內平延年視事三嵗以老病乞骸骨天子優之使光祿大夫持節賜延年黃金百斤牛酒加致醫藥延年遂稱病篤賜安車駟馬罷就第後數月薨諡曰敬侯子緩嗣緩少為郎本始中以校尉從蒲類將軍擊胸奴還為諌大夫遷上谷都尉鴈門太守父延年薨徴視喪事拜為太常治諸陵縣每冬月封具獄日常去酒省食官屬稱其有恩元帝初即位穀貴民流永光中西羌反緩輒上書入錢穀以助用前後數百萬緩六弟五人至大官少弟熊歷五郡二千石三州牧刺史有能名惟中弟欽官不至而最知名欽字子夏少好經書家富而目偏盲故不好為吏茂陵杜鄴與欽同姓字俱以材能稱京師故衣冠謂欽為盲杜子夏以相别欽惡以疾見詆乃為小冠髙廣財二寸由是京師更謂欽為小冠杜子夏而鄴為大冠杜子夏云時帝舅大將軍王鳯以外戚輔政求賢知自助鳯父頃侯禁與欽兄緩相善故鳯深知欽能奏請欽為大將軍武庫令職間無事欽所好也欽為人深博有謀自上為太子時以好色聞及即位皇太后詔采良家女欽因是説大將軍鳯曰禮一娶九女所以極陽數廣嗣重祖也必鄉舉求窈窕不問華色所以助德理內也娣姪雖缺不復補所以養夀塞爭也故后妃有貞淑之行則允嗣有賢聖之君制度有威儀之節則人君有夀考之福廢而不由則女德不厭女德不厭則夀命不究於髙年書云或四三年言失欲之生害也男子五十好色未衰婦人四十容貌改前以改前之容侍於未衰之年而不以禮為制則其原不可救而後徠異態後徠異態則正后自疑而支庶有間適之心是以晉獻被納讒之謗申生蒙無罪之辜今聖上富於春秋未有適嗣方鄉術入學未親后妃之議將軍輔政宜因始初之隆建九女之制詳擇有行義之家求淑女之質母必有聲色技能為萬世大法夫少戒之在色小卞之作可為寒心唯將軍常以為憂鳯白之太后太后以為故事無有欽復重以為言鳯不能自立法度循故事而已會皇太后女弟司馬君力與欽子私通事上聞欽慙懼乞骸骨去後有日蝕地震之變詔舉賢良方正能直言士合陽侯梁放舉欽欽上對曰臣聞日蝕地震陽微隂盛也臣者君之隂也子者父之隂也妻者夫之隂也夷狄者中國之隂也春秋日蝕三十六地震五或夷狄侵中國或政權在臣下或婦乘夫或臣子背君父事雖不同其類一也臣竊觀人事以考變異則本朝大臣無不自安之人外戚親屬無乖剌之心關東諸侯無強大之國三埀蠻夷無逆理之節殆為後宫何以言之日以戊申蝕時加未戊未土也土者中宫之部也其夜地震未央宮殿中此必適妾將有爭寵相害而為患者唯陛下深戒之變感以類相應人事失於下變象見於上能應之以德則異咎消亡不能應之以善則禍敗至髙宗遭雊雉之戒飭已正事享百年之夀殷道復興要在所以應之應之非誠不立非信不行宋景公小國之諸侯耳有不忍移禍之誠出人君之言三熒惑為之退舍以陛下聖明內推至誠深思天變何應而不感何搖而不動孔子曰仁逺乎哉唯陛下正后妾抑女寵防奢泰去佚遊躬節儉親萬事數御安車由輦道親二宮之饔膳致昏晨之定省如此即堯舜不足與比隆咎異何足消滅如不留聽於庶事不論材而授位殫天下之財以奉淫侈匱萬姓之力以從耳目近諂諛之人而逺公方信讒賊之臣以誅忠良賢俊失在嵓穴大臣怨於不以雖無變異社稷之憂也天下至大萬事至衆祖業至重誠不可以佚豫為不可以奢泰持也唯陛下忍無益之欲以全衆庶之命臣欽愚戇言不足采其夏上盡召直言之士詣白虎殿對䇿䇿曰天地之道何貴王者之法何如六經之義何上人之行何先取人之術何以當世之治何務各以經對欽對曰臣聞天道貴信地道貴貞不信不貞萬物不生生天地之所貴也王者承天地之所生理而成之昆蟲草木靡不得其所王者法天地非仁無以廣施非義無以正身克己就義恕以及人六經之所上也不孝則盡君不忠涖官不敬戰陳無勇朋友不信孔子曰孝無終始而患不及者未之有也孝人行之所先也觀本行於鄉黨考功能於官職達觀其所舉富觀其所豫窮觀其所不為乏觀其所不取近觀其所為主逺觀其所主孔子曰視其所以觀其所由察其所安人焉廋哉取人之術也殷因於夏尚質周因於殷尚文今漢家承周秦之敝宜抑文尚質廢奢長儉表實去偽孔子曰惡紫之奪朱當世治之所務也臣竊有所憂言之則拂心逆指不言則漸日長為禍不細然小臣不敢廢道而求從違忠而耦意臣聞玩色無厭必生好憎之心好憎之心生則愛寵偏於一人愛寵偏於一人則繼嗣之路不廣而嫉妬之心興矣如此則匹婦之説不可勝也唯陛下純德普施無欲是從如此則衆庶咸説繼嗣日廣而海內長安萬事之是非何足備言欽以前事病賜帛罷後為議郎復以病免徴詣大將軍莫府國家政謀鳯常與欽慮之數稱達名士王駿韋安世王延世等救解馮野王王尊胡常之罪過及繼功臣絶世填撫四夷當世善政多出於欽者見鳯專政泰重戒之曰昔周公身有至聖之德屬有叔父之親而成王有獨見之明無信讒之聽然管蔡流言而周公懼穰侯昭王之舅也權重於秦威震鄰國有旦莫偃伏之愛心不介然有間然范雎起徒步由異國無雅信開一朝之説而穰侯就封及近者武安侯之見退三事之迹相去各數百嵗若合符節甚不可不察願將軍由周公之謙懼損穰侯之威放武安之欲毋使范雎之徒得間其説頃之復日蝕京兆尹王章上封事求見果言鳯專權蔽主之過宜廢勿用以應天變於是天子感寤召見章與議欲退鳯鳯甚憂懼欽令鳯上疏謝罪乞骸骨文指甚哀太后涕泣為不食上少而親倚鳯亦不忍廢復起鳯就位鳯心慙稱病篤欲遂退欽復説之曰昔周公雖老猶在京師明不離成周示不忘王室也仲山甫異姓之臣無親於宣就封于齊猶歎息永懷宿夜徘徊不忍逺去况將軍之於主上主上之與將軍哉夫欲天下治安息變異之意莫有將軍主上昭然知之故攀援不遣書稱公毋困我唯將軍不為四國流言自疑於成王以固至忠於是鳯復起視事上令尚書劾奏京兆尹章章死詔獄章既死衆庶寃之以譏朝廷欽欲救其過復説鳯曰京兆尹章所坐事密吏民見章素好言事以為不坐官職疑其以日蝕見對有所言也如是則塞爭引之原損寬明之德欽愚以為宜因章事舉直言極諫並見郎從官展盡其意加於往前以明示四方使天下咸知主上聖明不以言罪下也若此則流言消釋疑惑著明鳯白行其䇿欽之補過將美皆此類也優遊不仕以夀終欽子及昆弟支屬至二千石者且十人欽兄緩前免太常以列侯奉朝請成帝時薨子業嗣業有材能以列侯選復為太常數言得失不事權貴與丞相翟方進衛尉定陵侯淳于長不平後業坐法免官復為函谷關都尉會定陵侯淳于長有罪當就國長舅紅陽侯立與業書曰誠哀老姊埀白隨無狀子出關願勿復用前事相侵定陵侯既出關伏罪後發下洛陽獄丞相吏搜得紅陽侯書奏業聽請不敬坐免就國其春丞相方進薨業上書言方進本與長深結厚更相稱薦長陷大惡獨得不坐茍欲鄣塞前過不為陛下廣持平例又無恐懼之心反因時信其邪辟報睚眥怨故事大逆朋友坐免官無歸故郡者今坐長者歸故郡已深一等紅陽侯立坐子受長貨賂故就國耳非大逆也而方進復奏立黨友後將軍朱博巨鹿太守孫宏故少府陳咸皆免官歸咸故郡刑罰無平在方進之筆端衆庶莫不疑惑皆言孫宏不與紅陽侯相愛宏前為中丞時方進為御史大夫舉掾隆可侍御史宏奏隆前奉使欺謾不宜執法近侍方進以此怨宏又方進為京兆尹時陳咸為少府在九卿髙第陛下所知也方進素與司直師丹相善臨御史大夫缺使丹奏咸為姦利請案驗卒不能有所得而方進果自得御史大夫為丞相即時詆欺奏免咸復因紅陽侯事歸咸故郡衆人皆言國家假方進權太甚案師丹行能無異及光祿勳許商被病殘人皆但以附從方進嘗獲尊官丹前親薦邑子丞相史能使巫下神為國求福幾獲大利幸賴陛下至明遣使者毛莫如先考驗卒得其姦皆坐死假令丹知而白之此誣罔罪也不知而白之是背經術惑左道也二者皆在大辟重於朱博孫宏陳咸所坐方進終不舉白專作威福阿黨所厚排擠英俊託公報私橫厲無所畏忌欲以熏轑天下天下莫不望風而靡自尚書近臣皆結舌杜口骨肉親屬莫不股栗威權泰盛而不忠信非所以安國家也今聞方進卒病死不以尉示天下反復賞賜厚葬唯陛下深思往事以戒來今會成帝崩哀帝即位業復上書言王氏世權日久朝無骨鯁之臣宗室諸侯微弱與繫囚無異自佐史以上至於大吏皆權臣之黨曲陽侯根前為三公輔政知趙昭儀殺皇子不輒白奏反與趙氏比周恣意妄行譖訴故許后被加以非罪誅破諸許族敗元帝外家內嫉妬同産兄姊紅陽侯立及淳于氏皆老被放棄新喋血京師威權可畏髙陽侯薛宣有不養母之名安昌侯張禹姦人之雄惑亂朝廷使先帝負謗於海內尤不可不慎陛下初即位謙讓未遑孤獨特立莫可據仗權臣易世意若探湯宜蚤以義割恩安百姓心竊見朱博忠信勇猛材略不世出誠國家雄俊之寶臣也宜徴博置左右以填天下此人在朝則陛下可髙枕而卧矣昔諸呂欲危劉氏賴有髙祖遺臣周勃陳平尚存不者幾為姦臣笑業又言宜為恭王立廟京師以章孝道時髙昌侯董宏亦言宜尊帝母定陶王丁后為帝太后大司空師丹等劾宏誤朝不道坐免為庶人業復上書訟宏前後所言皆合指施行朱博果見拔用業由是徴復為太常嵗餘左遷上黨都尉會司隸奏業選舉不實業坐免官復就國哀帝崩王莽秉政諸前議立廟尊號者皆免徙合浦業以前罷黜故見闊略憂恐發病死業成帝初尚帝妹潁邑公主主無子薨業家上書求還京師與主合葬不許而賜諡曰荒侯傳子至孫絶初杜周武帝時徙茂陵至延年徙杜陵云通志卷九十八下
