body:
  text: 通志卷一百五十上宋右迪功郎鄭樵漁仲撰列傳第六十三上後魏楊播子侃椿播弟椿津椿子昱弟津子逸王肅兄子誦衍翊劉芳子懌子隲懌弟廞懋廞芳從子常爽孫景郭祚子景尚張彛子始均仲瑀邢巒子遜祐巒弟晏祐巒叔祖祐子産從子虯李崇子世哲崇神軌從弟平奬子構平子奬奬弟諧崔光光子勵友光弟敬友敬弟子鴻崔亮從弟光韶從光韶弟光伯祖道固裴叔業兄子植瑜植弟揚粲揚弟瑜弟粲弟衍夏侯道遷子夬李元護席法友王世弼江悅之淳于誕張讜李苗劉藻傅永傅豎眼伯父靈慶敬靈根敬父靈越子紹仲張烈弟僧皓李叔彪子述象述子路恃慶房亮曹世表潘永基朱元旭蘇亮弟湛魏子建魏釗子彥魏季景楊播字延慶𢎞農華隂人也髙祖結仕慕容氏位中山相曾祖珍道武時歸國位上谷太守祖真河內清河二郡太守父懿延興末為廣平太守有稱績孝文南巡吏民頌之徴為選部給事中有公平譽除安南將軍洛州刺史未之任卒贈本官加𢎞農公諡曰簡播本字元休孝文賜改焉母王氏文明太后之外姑播少修飭奉飬盡禮擢為中散纍遷衛尉少卿與陽平王頥等出漠北擊蠕蠕大致克獲遷武衛將軍復征蠕蠕至居然山而還及車駕南討假前將軍從至鍾離師回詔播為圓陳禦之相拒再宿軍人食盡賊圍更急播乃領精騎三百厯其船大呼曰我今欲度能戰者出遂擁而濟賊莫敢動賜爵華隂子後從駕討破崔慧景蕭衍於鄧城進號平東將軍時車駕耀威城沔水上己設宴帝與中軍彭城王協賭射左衛元遙在協朋內而播居帝曹遙射侯正中籌限已滿帝曰左衛籌足右衛不得不解對曰仰恃聖恩庶幾心爭於是箭中正帝笑曰雖飬由之妙何復過是遂舉巵以賜播曰古人酒以飬病朕今賞卿之能可謂古今殊也除太府卿進爵為伯後為華州刺史至州借人田為御史王基所劾除官爵卒于家子侃等停柩不葬披訴積年至熙平中乃贈鎮西將軍雍州刺史并復其爵諡曰壯侃字士業頗愛琴書尤好計畫時播一門貴滿朝廷子姪早通而侃獨不交遊公卿罕有識者親朋勸其出仕侃曰茍有良田何憂晚嵗但恨無才具耳年三十一襲爵華隂伯揚州刺史長孫承業請為録事參軍梁豫州刺史裴邃規相掩襲密購夀春人李瓜花袁建等令為內應邃已纂勒兵士慮夀春疑覺遂謬移云魏始於馬頭置戍如聞復欲修白捺舊城若爾便稍相侵逼此亦須營歐陽設交境之備今版卒已集唯聽信還佐寮咸欲以實答之云無修白捺意而侃曰白捺小城本非形勝邃集兵遣移虛搆是言得無有别圖也承業乃云録事可造移報移曰彼之纂兵想别有意何為妄搆白捺他人有心豫忖度之勿謂秦無人也邃得移謂已覺便散兵瓜花等以期契不會便相告發伏辜者十數家邃後竟襲夀春入羅城而退遂列營於黎漿梁城日夕鈔掠承業乃奏侃為統軍後雍州刺史蕭寶夤據州反承業討之除侃為承業行臺左丞軍次恆農侃白承業曰今賊守潼關全據形勝須北取蒲坂飛棹西岸置兵死地人有鬭心華州之圍可不戰而解潼關之賊必望風潰散諸處既平長安自克愚計可録請為眀公前驅承業從之令其子子産等領騎與侃於恆農北度便據石錐壁乃班告曰今且停軍於此以待步卒兼觀人情向背若送降名者各自還村候臺軍舉三烽火各亦應之以眀降欵其無應烽即是不降之村理須殄戮人遂傳相告報實未降者亦詐舉烽一宿之間火光遍數百里內圍城之寇不測所以各自散歸長安平侃頗有力焉建義初除岐州刺史屬元皓內逼詔行北中郎將孝莊徙河北執侃手曰朕停卿蕃寄移任此者正為今日但卿尊卑百口若隨朕行所纍處大卿可還洛寄之後圖侃曰寧可以臣微族頓廢君臣之義固求陪從除度支尚書兼給事黃門侍郎敷西縣公及車駕南還皓令梁將陳慶之守北中城自據南岸有夏州義士為皓守河中渚乃密信通款求破橋立效爾朱榮赴之及橋破應接不果皆為皓屠榮將為遷計欲更圖後事侃曰若今即還人情失望未若召發人材唯多縛筏間以舟楫沿河廣布令數百里中皆為度勢皓知防何處一旦得度必立大功榮大笑從之於是爾朱兆等於馬渚諸楊南度皓便南走車駕入都侃解尚書正黃門以濟河之功進爵濟北郡公復除其長子師仲為祕書郎時所用錢人多私鑄稍就薄小乃至風飄水浮米斗幾直一千侃奏聽人與官並鑄五銖使人樂為而俗弊得改莊帝從之後除侍中加衛將軍右光祿大夫莊帝將圖爾朱榮侃與內弟李晞城陽王徽侍中李彧等咸預其謀爾朱兆入洛侃時休沐遂竄歸華隂普泰初天光在關西遣侃子婦父韋義遠招慰之立盟許恕其罪侃兄昱恐為家禍令侃出應假其食言不過一人身沒冀全百口侃赴之為天光所害太昌初贈車騎將軍儀同三司幽州刺史子純陀襲播弟椿字延夀本字伯考孝文賜改焉性寬謹為內給事與兄播並侍禁闈後為中部法曹折訟公正孝文嘉之及文眀太后崩孝文五日不食椿諌曰聖人之禮毁不滅性縱陛下自賢於萬代其若宗廟何帝感其言乃一進粥轉授宫輿曹少卿加給事中出為豫州刺史再遷梁州刺史初武興王楊集始降於齊自漢中而北規復舊土椿貽書集始開以利害集始執書對使者曰楊使君此書除我心腹疾遂來降尋以母老解還後兼太僕卿秦州羌吕茍兒涇州屠各陳瞻等反詔椿為别將𨽻安西將軍元麗討之賊守峽自固或謀伏兵斷其出入待糧盡攻之或云斬山木縱火焚之椿曰並非計也賊深竄正避死耳今宜勒三軍勿更侵掠賊必謂見嶮不前心輕我軍然後掩其不備可一舉而平乃緩師賊果出掠仍以軍中驢馬餌之銜枚夜襲斬瞻傳首轉正太僕卿初獻文世有蠕蠕萬餘戶降附居於髙平薄骨律二鎮太和末叛走唯有一千餘家太中大夫王通髙平鎮將郎育等求徙置淮北防其後叛詔椿徙焉椿上書以為裔不謀夏夷不亂華是以先朝居之荒服之間正欲恱近來逺今新附者衆若舊者見徙新者必不安愚謂不可時八坐不從遂於濟州緣河居之及冀州元愈之難果悉浮河赴賊所在鈔掠如椿所䇿後除朔州刺史在州為廷尉奏椿前為太僕卿招引百姓盜種牧田三百四十頃依律處刑五嵗尚書邢巒據正始别格奏罪應除名注籍盜門同籍合門不仕宣武以新律既班不宜雜用舊制詔依斷以贖論後除定州刺史自道武平中山多置軍府以相威攝凡有八軍軍各配兵五千食祿主帥軍各四十六人自中原稍定八軍之兵漸割南戍一軍兵財千餘然主帥如故費祿不少椿表罷四軍減其主帥百八十四人椿在州因修黑山道餘功伐木私造佛寺役兵為御史所劾除名後纍遷為雍州刺史進號車騎大將軍儀同三司尋以本官加侍中兼尚書右僕射為行臺節度關西諸將遇暴疾頻啓乞解詔許之以蕭寶夤代為刺史行臺椿還鄉里遇子昱將還京師使陳寶夤賞罰云為不依常憲恐有異心昱還面啓眀帝及靈太后並不納及寶夤邀害御史中尉酈道元猶上表自理稱為椿父子所謗建義元年為司徒永安初進位太保加侍中給後部鼓吹元皓入洛椿子昱為皓所擒又椿弟順順子仲宣兄子侃弟子遁並從駕河內為皓嫌疑以椿家世顯重恐失人望未及加罪時人助其憂或勸椿擕家避禍椿曰吾內外百口何處逃竄正當坐任運耳莊帝還宫椿上書頻請歸老詔聽服侍中服賜朝服一襲八尺牀帳几杖不朝乘安車駕駟馬給扶傳詔二人仰所在郡縣四時以禮存問安否椿奉辭於華林園帝下御座執手流涕曰公先帝舊臣實為元老但髙尚其志決意不留既難相違深用悽切椿亦歔欷欲拜帝親執不聽賜以絹布給羽林衛送羣公百僚餞於城西張方橋行路觀者莫不稱歎椿臨行誡子孫曰我家入魏之始即為上客自爾至今二千石方伯不絶祿恤甚多於姻親知故吉凶之際必厚加贈襚來往賔僚必以酒肉飲食故六姻朋友無憾焉國家初丈夫好服綵色吾雖不記上谷翁時事然記清河翁時服飾恆見翁著布衣韋帶常自約勑諸父曰汝等後世若富貴於今日者慎勿積金一斤綵帛百匹已上用為富也不聽興生求利又不聽與勢家作婚姻至吾兄弟不能遵奉今汝等服乘漸華好吾是以知恭儉之德漸不如上也又吾兄弟若在家必同盤而食若有近行不至必待其還亦有過中不食忍飢相待吾兄弟八人今存者有三是故不忍别食也又願畢吾兄弟不異居異財汝等眼見非為虛假如聞汝等兄弟時有别齋獨食者此又不如吾一等世也吾今日不為貧賤然居住舍宅不作壯麗華飾者正慮汝等後世不賢不能保守之將為勢家所奪北都時朝法嚴急太和初吾兄弟三人並居內職兄在髙祖左右吾與津在文眀太后左右于時口勑責諸內官十日仰密得一事不列便大嗔嫌諸人多有依勑密列者亦有太后髙祖中間傳言構間者吾兄弟自相誡曰今忝二聖近臣居子母間難宜深慎之又列人事亦何容易縱被嗔責勿輕言十餘年中不嘗言一人罪過時大被嫌責答曰臣等非不聞人語正恐不審仰誤聖聽以是不敢言於後終以不言蒙責及二聖間言語終不敢輒爾傳通太和二十一年吾從濟州來朝在清徽堂豫宴髙祖謂諸貴曰北京之日太后嚴眀吾每得杖左右因此有是非言和朕母子者唯楊播兄弟遂舉爵賜兄及我酒汝等脫若萬一蒙眀主知遇宜深愼言語不可輕論人惡也吾自惟文武才藝門望姻援不勝他人一旦位登侍中尚書四厯九卿十為刺史光祿大夫儀同開府司徒太保津今復為司空者正由忠謹愼口不常論人之過無貴無賤待之以禮以是故至此耳聞汝等學時俗人乃有坐待客者有驅馳勢門者有輕論人惡者及見貴勝則敬重之見貧賤則慢易之此人行之大失立身之大病也汝家仕皇魏以來髙祖以下乃有七郡太守三十二州刺史內外顯職時流少比汝等若能存禮節不為奢淫憍慢假不勝人足免尤誚足成名家吾今年始七十五自惟氣力尚堪朝覲天子所以孜孜求退者正欲使汝等知天下滿足之義為一門法耳非是茍求千載之名汝等能記吾言吾百年後終無恨矣椿還華隂踰年為爾朱天光所害時人莫不怨痛之太昌初贈太師丞相都督冀州刺史子昱字元略起家廣平王懷左常侍懷好武事數遊獵昱每規諌正始中以京兆廣平二王國臣多縱恣詔御史中尉崔亮窮案之伏法都市者三十餘人不死者悉除名唯昱與博陵崔楷以忠諌免後除太學博士員外散騎侍郎初尚書令王肅除揚州刺史出頓洛陽東亭酣後廣陽王嘉北海王詳等與播論議競理播不為屈北海王顧昱曰尊伯性剛不伏理大不如尊使君也昱對曰昱父道隆則從其隆道汙則從其汙伯父剛則不吐柔亦不茹一坐嘆其能言肅曰非此郎何得申二父之美延昌三年以本官帶詹事丞時眀帝在懷抱中至於出入左右乳母而已不令宫寮聞知昱諌曰陛下不以臣等凡賤備位宫臣太子動止宜令翼從自比以來輕爾出入進無二傅導引之美退闕羣寮陪侍之式非所謂示人軌儀著君臣之義陛下若召太子必降手勑令羣臣咸知為後世法於是詔自今若非手勑勿令貌輒出宫臣在直者從至萬嵗門轉太尉掾兼中書舍人靈太后常謂昱曰親姻在外不稱人心卿有所聞慎勿諱隱昱奏揚州刺史李崇五車載貨恆州刺史楊鈞造銀食器十具並餉領軍元義靈太后令召義夫妻泣而責之乂深恨昱昱弟六叔舒妻武昌王和之妹和即義之從祖父舒早喪有一男六女及終喪元氏請别居昱父椿集親姻泣謂曰我弟不幸早終今男未婚女未嫁何便求别居不聽遂懷憾神龜二年瀛州人劉宣眀謀反事覺逃竄義使和及元氏誣告昱藏宣眀云昱父椿叔津並送甲杖三百具謀圖不逞義又搆成其事乃遣夜圍昱宅收之並無所獲太后問狀昱具對元氏搆釁之端言至哀切太后乃解昱縛和及元氏並處死刑而義相左右和直免官元氏卒亦不坐及義之廢太后也乃出昱為濟隂內史中山王熙起兵於鄴義遣黃門盧同詣鄴刑熙并窮黨與同希義旨就郡鎖昱赴鄴囚訊百日乃還任孝昌初除中書侍郎後賊圍豳州詔昱兼侍中持節催西北道大都督北海王皓仍隨軍監察豳州圍解雍州蜀賊張映龍薑神達知州內虛謀欲攻掩刺史元修義懼而請援一日一夜書移九通都督李叔仁遲疑不赴昱曰若長安不守大軍自然瓦解此軍雖往有何益也遂與叔仁等俱進於陳斬神達諸賊迸散詔以昱受旨催督而皓軍稽緩遂免昱官尋除涇州刺史未幾昱父椿為雍州徴昱為吏部郎中及蕭寶夤等敗於關中以昱兼七兵尚書持節假撫軍都督防守雍州昱遇賊失利而返後除鎮東將軍假車騎將軍東南道都督又加散騎常侍於後泰山太守羊侃據郡南叛侃兄深時為徐州行臺府州咸欲禁深昱曰昔叔向不以鮒也見廢奈何以侃罪深宜聽朝旨不許羣議還朝未幾元皓侵逼大梁除昱南道大都督鎮榮陽皓禽濟隂王暉業乘虗徑進城陷昱與弟息五人在門樓上皓至執昱下責曰卿今死甘心不答曰分不望生向所以不下樓正慮亂兵耳但恨八十老父無人供飬乞小弟一命便是死不朽也皓將陳慶之胡光等伏皓帳前曰陛下度江三千里無遺鏃費昨日殺傷五百餘人求乞楊昱以快意皓曰我在江東聞梁主言初下都袁昻為吳郡不降稱其忠節奈何殺昱於是斬昱下統帥三十七人皆令蜀兵刳腹取心食之孝莊還復前官爾朱榮之死昱為東道行臺拒爾朱仲逺會爾朱兆入洛昱還京師後歸鄉里亦為天光所害太昌初贈司空公定州刺史子孝雍員外郎奔免匿蠻中潛結渠帥謀報爾朱氏微服入洛為爾朱世隆所殺椿弟頴字惠哲本州别駕頴弟順字延和寬裕謹厚豫立莊帝功封三門縣伯位冀州刺史罷州還遇害太昌初贈太尉公録尚書事相州刺史子辨字僧達位東雍州刺史辨弟仲宣有風度才學位正平太守爵恆農伯在郡有能名還京兄弟與父同遇害太昌初辨贈儀同三司恆州刺史仲宣贈尚書右僕射青州刺史仲宣子元就幼有俊材收捕時年九嵗牽挽兵人曰欲害諸尊乞先就死兵人以刀斫斷其臂猶請死不止遂先殺之永熙初贈汝隂太守順弟津字羅漢本字延祚孝文賜改焉少端謹以器度見稱年十一除侍御中散時孝文幼沖文眀太后臨朝津曽入侍左右忽咳逆失聲遂吐血數升藏之衣袖太后聞聲閲而不見問其故具以實告遂以敬慎見知賜縑百匹遷符璽郎中津以身在禁密不外交遊至宗族姻表罕相參候司徒馮誕與津少結交友而津見其貴寵每恆退避及相招命多辭疾不往誕以為恨而津逾逺焉人或謂之曰司徒君之少舊何自外也津曰為勢家所厚復何容易但全吾今日亦足矣轉振威將軍領監曹奏事令孝文南征以津為都督征南府長史後遷長水校尉仍直閣景眀中宣武遊北芒津時陪從太尉咸陽王禧謀反帝馳入華林時直閣中有同禧謀皆在從限及禧平帝顧謂朝臣曰直閣半為逆黨非至忠者安能不豫此謀因拜津左右中郎將遷驍騎將軍仍直閣出除岐州刺史津巨細躬親孜孜不倦有武功人齎絹三匹去城十里為賊所劫時有使者馳馹而至被劫人因以告之使者到州以狀白津津乃下教云有人著某色衣乘某色馬在城東十里被殺不知姓名若有人家可速收視有一老母行哭而出云是己子於是遣騎追收并絹俱獲自是闔境畏服至於守令寮佐有濁貨者未曾公言其罪常以私書切責之於是官屬感厲莫有犯法者以母憂去職延昌末起為華州刺史與兄播前後牧本州當世榮之先是受調絹度尺特長在事因緣共相進退百姓苦之津乃令依公尺度其輸物尤好者賜以杯酒而出其所輸少劣者為受之但無酒以示其耻於是競相勸勵官調更勝孝昌中北鎮擾亂侵逼舊京乃加津安北將軍北道大都督尋轉左衛加撫軍將軍津始受命出據靈邱而賊帥鮮于修禮起於博陵定州危急遂回師南赴始至城下營壘未立而州軍新敗津以賊既乘勝士衆勞疲柵壘未安不可擬敵欲移軍入城更圖後舉刺史元固稱賊既逼城不可示弱乃閉門不納津揮刀欲斬門者軍乃得入賊果夜至見柵空而去其後賊攻州城東靣已入羅城刺史閉小城東門城中騷擾津開門出戰賊退人心少安尋除定州刺史又兼吏部尚書北道行臺初津兄椿得罪此州由巨鹿人趙略投書所致及津至略舉家逃走津乃下教慰喻令其還業於是闔州愧服逺近稱之時賊帥鮮于修禮杜洛周殘掠州境孤城獨立在兩寇之間津修理戰具更營雉堞又於城中去城十步掘地至泉廣作地道潛兵隱出置爐鑄鐡持以灌賊賊遂相告曰不畏利槊堅城唯畏楊公鐡星津與賊帥元洪業書喻之并授鐡劵許之爵位令圖賊帥毛普賢洪業等感寤復書云欲殺普賢又云賊欲圍城正為取北人城中所有北人必須盡殺津以城內北人雖是惡黨然掌握中物未忍便殺但收內子城防禁而已將吏無不感其仁恕朝廷初送鐡劵二十枚委津分結津隨賊中首領間行送之修禮普賢頗亦由此而死既而杜洛周圍州城津盡力捍守詔加衛將軍將士有功者任津科賞兵人給復八年葛榮以司徒説津津大怒斬其使以絶之自受攻圍經厯三稔朝廷不能拯赴乃遣長子遁突圍出詣蠕蠕主阿那瓌令其討賊遁日夜泣訴阿那瓌遣其從祖吐豆發率精騎南出前鋒已達廣昌賊防塞隘口蠕蠕遂還津長史李裔引賊入津苦戰不敵遂見拘執洛周脫津衣服置地牢下數日將烹之諸賊還相諌止遂得免害津曾與裔相見對諸賊帥以大義責之辭淚俱發裔大慙典守者以告洛周弗之責及葛榮併洛周復為榮所拘榮破始得還洛永安二年兼吏部尚書元皓內逼莊帝將親出討以津為中軍大都督兼領軍將軍未行皓入及皓敗津乃入宿殿中掃灑宫掖遣第二子逸封閉府庫各令防守及帝入也津迎於北芒流涕謝罪帝深嘉慰之尋以津為司空加侍中爾朱榮死使津以本官為兼尚書令北道大行臺都督并州刺史委以討胡經略津馳至鄴將從滏口而入遇爾朱兆等已克洛相州刺史李神等議欲與津舉城通款津不從以子逸既為光州刺史兄子昱時為東道行臺鳩率部曲在於梁沛津規欲東轉更為方略乃率輕騎望於濟州度河而爾朱仲逺已陷東郡所圖不果遂還京師普泰元年亦遇害於洛太昌初贈大將軍太傅都督雍州刺史諡曰孝穆將葬本鄉詔大鴻臚持節監護喪事長子遁字山才其家貴顯諸子弱冠咸縻王爵而遁性靜退年近三十方為鎮西府主簿纍遷尚書左丞金紫光祿大夫亦被害於洛太昌初贈車騎大將軍儀同三司幽州刺史諡曰恭定遁弟逸字遵道有當世才起家員外散騎侍郎以功賜爵華隂男建義初莊帝猶在河陽逸獨往謁帝特除給事黃門侍郎領中書舍人及朝士濫禍帝益憂怖詔逸晝夜陪侍常寢御牀前帝曾夜中謂逸曰昨來舉目唯見異人賴卿差以自慰再遷南秦州刺史加散騎常侍時年二十九時方伯之少未有先之者仍以路阻不行改光州刺史時災儉連嵗逸欲以倉粟振給而所司懼罪不敢逸曰國以人為本人以食為命假令以此獲戾吾所甘心遂出粟然後申表右僕射元羅以下謂公儲難闕並執不許尚書令臨淮王彧以為宜貸二萬詔聽貸五萬逸既出粟之後其老小殘疾不能自存活者又於州門造粥飼之將死而得濟者以萬數帝聞而善之逸為政愛人尤憎豪猾廣設耳目善惡畢聞其兵出使下邑皆自持糧人或為設食者雖在暗室終不敢進咸言楊使君有千里眼那可欺之在州政績尤美及其家禍爾朱仲遠遣使於州害之吏民如喪親戚城邑村落營齋一日之中所在不絶太昌初贈都督豫郢二州刺史諡曰貞逸弟謐字遵和厯員外散騎常侍以功賜爵恆農伯鎮軍將軍金紫光祿大夫衛將軍在晉陽為爾朱兆所害太昌初贈驃騎將軍兖州刺史謐弟愔齊世通顯列在齊史津弟暐字延季𢎞厚頗有文學位武衛將軍加散騎常侍安南將軍莊帝初遇害河隂贈儀同三司雍州刺史播家世純厚並敦義讓昆弟相事有如父子播性剛毅椿津恭謙兄弟旦則聚於廳堂終日相對未嘗入內有一美味不集不食廳堂間往往幃幔隔障為寢息之所時就休偃還共談笑椿年老曾他處醉歸津扶侍還室仍假寢閣前承候安否椿津年過六十並登台鼎而津常旦暮參問子姪羅列階下椿不命坐津不敢坐椿每近出或日斜不至津不先飯椿還然後共食食則津親授匙箸味皆先嘗椿命食然後食津為司空於時府主皆自引寮佐人有就津求官者津曰此事須家兄裁之何為見問初津為肆州椿在京宅每有四時嘉味輒因使次附之若或未寄不先入口椿每得所寄輒對之下泣兄弟並皆有孫唯椿有曾孫年十五六矣椿常欲令早娶望見元孫自昱而下率多學尚時人莫不欽焉一家之內男女百口緦服同爨庭無間言魏世以來唯有盧陽烏兄弟及播昆季當時莫逮焉爾朱世隆等將害椿家誣其為逆奏請收之節閔不許世隆復苦執不得已乃下詔世隆遂遣步騎夜圍其宅天光亦同日收椿於華隂東西兩處無少長皆遇禍籍沒其家節閔惋悵久之王肅字恭懿琅邪臨沂人晉丞相導之後父奐齊雍州刺史齊史有傳肅少而聰辨涉獵經史頗有大志仕齊厯祕書丞父奐及兄弟為齊武帝所殺肅自建鄴來奔是嵗太和十七年也孝文時幸鄴聞肅至虛襟待之引見問故肅辭義眀敏切辨而有禮帝甚哀惻之遂語及為國之道肅陳説治亂音韻雅暢深會帝旨帝促席移景不覺坐之疲也肅因言蕭氏危亡之兆可乘之以機帝於是圖南之規轉鋭器重禮遇日有加焉親貴舊臣莫之間也或屏左右相對談説至夜分不罷肅亦盡心推誠無所隱避自謂君臣之際猶元德之遇孔眀也尋除輔國大將軍長史賜爵開陽伯肅固辭伯爵許之詔肅討齊義陽聽招募勇壯以為爪牙其募士有功加常募一等其從肅行者六品以下聽先擬用然後表聞若投化人聽五品以下先即優授假肅平南將軍肅至義陽頻破齊軍降者萬餘進持節都督豫州刺史揚州大中正肅善撫接甚有聲稱尋徴入朝帝手詔曰不見君子中心如醉一日三嵗我勞如何已飾館華林拂席相待卿欲以何日發汝墳也又曰肅丁荼暴世心等伍胥窮踰再期蔬緼不改有司依禮喻之為裁練禫之制二十年七月帝以久旱不雨輟膳百寮詣闕帝在崇虗樓遣舍人問肅對曰伏承陛下輟膳已經三旦羣臣不敢自寧臣聞堯水湯旱自然之數須聖人以濟世不由聖以致災是以國儲九年之粟以禦九年之變昨四郊之外已蒙滂澍唯京城之內微為少澤蒸庶未闕一飱陛下輟膳三日臣庶惶惶無復情地帝遣使答曰雖不食數朝猶自無感朕誠心未至之所致也朕志確然死而後已是夜澍雨大降以破齊將裴叔業功進號鎮南將軍加都督四州諸軍事封汝南縣子肅頻表固讓不許詔加鼓吹一部初齊之收肅父奐也奐司馬黃瑤起攻奐殺之二十二年平漢陽瑤起為輔國將軍特詔以付肅紓泄哀情孝文崩遺詔以肅為尚書令與咸陽王禧等同為宰輔徴會駕魯陽肅至遂與禧參同謀謨自魯陽至京洛行途喪紀委肅參量憂勤經綜有過舊戚禧兄弟共敬昵之上下稱為和輯唯任城王澄以其起自羇逺一旦在己之上每謂人曰朝廷以王肅加我上尚可從叔廣陵宗室尊宿厯任內外云何一朝令肅在上肅聞其言常降避之尋為澄所奏劾以肅謀叛事尋得申釋詔肅尚陳留長公主本劉昶子婦彭城公主也賜錢二十萬帛三千匹肅奏考以顯能陟由績著升眀退暗於是乎在自百寮曠察四稔于兹請依舊例考檢能否從之裴叔業以夀春內附拜肅車騎將軍持節都督江西諸軍事與彭城王協率步騎十萬以赴之齊豫州刺史蕭懿屯小峴交州刺史李叔獻屯合肥將圍夀春肅進師討擊大破之禽叔獻走蕭懿還京師宣武臨東堂引見勞之以淮南纍捷賞帛四千匹進位開府儀同三司封昌國縣侯揚州刺史尋為散騎常侍都督淮南諸軍事肅頻在邉悉心撫接逺近歸懷附者若市咸得其心清身好施簡絶聲色終始廉約家無餘財然性微輕恌頗以功名自許護疪稱伐少所推下孝文每以此為言景眀二年薨於夀春年三十八宣武為舉哀詔中書撫慰給東園祕器朝服一襲錢三十萬帛一千匹布五百匹蠟三百斤并問其卜遷逺近専遣侍御史一人監護喪事又詔曰杜預之沒窆於首陽司空李沖覆舟是託顧瞻斯所亦二代之九原也故揚州刺史肅忠義結於二世英惠符於李杜平生本意願終京陵既有宿心宜遂先志其令葬於沖預兩墳之間使之神遊相得也贈侍中司空公有司奏以肅貞心大度宜諡匡公詔諡宣簡眀帝初詔為肅建碑銘自晉代喪亂禮樂崩亡孝文雖釐革制度變更風俗其間朴略未能淳也肅眀練舊事虛心受委朝儀國典咸自肅出子紹襲紹字三歸位中書侍郎卒贈徐州刺史子遷襲齊受禪爵隨例降紹弟理孝靜初得還朝位著作佐郎紹肅前妻謝生也肅臨薨謝始攜女及紹至夀春宣武納其女為夫人眀帝又納紹女為嬪肅弟康字文政涉獵書史微有兄風宣武初携兄子誦翊衍等入魏拜中書侍郎卒於幽州刺史贈征虜將軍徐州刺史誦字國章肅長兄融之子學涉有文才神氣清俊風流甚美厯位散騎常侍光祿大夫右將軍幽州刺史長兼祕書監給事黃門侍郎眀帝崩靈太后之立幼主也於時大赦誦宣讀詔書言制抑揚風神竦秀百寮傾屬莫不歎美孝莊初於河隂遇害贈尚書左僕射司空公諡曰文宣子孝康尚書郎中孝康弟俊康性清雅頗有文才齊文襄王中外府祭酒誦弟衍字文舒名行器藝亞於誦位光祿大夫廷尉卿揚州刺史大中正度支七兵二尚書太常卿出為散騎常侍西兖州刺史為爾朱仲逺所禽以其名望不害令騎牛從軍久乃見釋還洛孝靜初位侍中卒勑給東園祕器贈尚書令司徒公諡曰文獻衍篤於交舊有故人竺虩於西兖州為仲逺所害其妻子飢寒衍置於家纍年贍恤世人稱其敦厚翊字士遊肅次兄深子也風神秀立好學有文才位中書侍郎頗鋭於榮利結婚於元義為濟州刺史清靜有政績入為散騎常侍金紫光祿大夫領國子祭酒卒贈司空公徐州刺史子深武定中儀同開府記室參軍劉芳字伯友彭城叢亭里人漢楚元王交之後也六世祖訥晉司𨽻校尉祖該宋青徐二州刺史父雍宋兖州長史芳出後伯父宋東平太守遜之雍同劉義宣之事身死彭城芳隨伯母房逃竄青州會赦免舅元慶為宋青州刺史沈文秀建威府司馬為文秀所殺芳母子入梁鄒城慕容白曜南討青齊梁鄒降芳北徙為平齊人時年十六南部尚書李敷妻司徒崔浩之弟女芳祖母浩之姑也芳至京師詣敷門崔恥芳流播拒不見之芳雖處窮窘之中而業尚貞固聰敏過人篤志墳典晝則傭書以自資給夜則讀誦終夕不寐至有易衣併日之弊而淡然自守不汲汲於榮利不戚戚於貧賤乃著窮通論以自慰焉芳常為諸僧傭寫經論筆迹稱善卷直一縑嵗中能入百餘匹如此數年賴以頗振由是與德學大僧多有還往時有南方沙門慧度以事被責未幾暴亡芳因緣聞知文眀太后召入禁中鞭之一百時中官李豐主其始末知芳篤學有志行言之於太后后微愧於心會齊武帝使劉纘至芳之始族兄也擢芳兼主客郎與纘相接尋拜中書博士後與崔光宋辨邢産等俱為中書侍郎俄而詔芳與産入授皇太子經遷太子庶子兼員外散騎常侍從駕洛陽自在路及旋京師常侍坐講讀芳才思深敏特精經義博聞強記兼覽倉雅尤長音訓辨析無疑於是禮遇日隆賞賚豐渥俄兼通直常侍從駕南巡撰述行事尋而除正王肅之來奔也孝文雅相器重朝野屬目芳未及相見帝常宴羣臣於華林肅語次云古者唯婦人有笄男子則無笄芳曰推經禮正文古者男子婦人俱有笄肅曰喪服稱男子免而婦人髽男子冠而婦人笄如此則男子不應有笄芳曰此専謂凶事也禮初遭喪男子免時則婦人髽男子冠時則婦人笄言俱時變男子婦人免髽冠笄之不同也又冠尊故奪其笄稱且互言也非謂男子無笄又禮內則稱子事父母雞初鳴櫛纚笄總以兹而言男子有笄眀矣帝稱善者久之肅亦以芳言為然曰此非劉石經邪昔漢世造三字石經於太學學者文字不正多往質焉芳音義眀辨疑者皆往詢訪故時人號為劉石經酒闌芳與肅俱出肅執芳手曰吾少來留意三禮在南諸儒亟共討論皆謂此義如吾向言今聞往釋頓祛平生之惑芳理義精贍類皆如是孝文遷洛路由朝歌見殷比干墓愴然悼懷為文以弔之芳因注解表上之詔曰覽卿注殊為富博但文非屈宋理慚張賈既有雅致便可付之集書帝以芳經學精洽超遷國子祭酒以母憂去官帝征宛鄧起為輔國將軍太尉長史從太尉咸陽王禧攻南陽齊將裴叔業入寇徐州疆埸之人頗懷去就帝憂之以芳為散騎常侍國子祭酒徐州大中正行徐州事後兼侍中從征馬圈孝文崩於行宫及宣武即位芳手加衮冕孝文自襲斂暨于啓祖山陵練祭始末喪事皆芳撰定咸陽王禧等奉申遺旨令芳入授宣武經及南徐州刺史沈陵外叛徐州大水遣芳撫慰振恤之尋正侍中祭酒中正並如故芳表曰夫為國家者罔不崇儒重道學斆為先唐虞已往典籍無據隆周以降任居虎門蔡氏勸學篇云周之師氏居虎門左今之祭酒則周之師氏洛陽記國子學宫與天子宫對太學在開陽門外案學記云古之王者建國親民教學為先鄭氏注內則云設師保以教使國子學焉外則有太學庠序之官由是而言國學在內太學在外眀矣臣謂今既徙縣嵩瀍皇居伊洛宫闕府事僉復故趾至於國學豈宜舛錯校量舊事應在宫門之左至如太學基所見存仍舊營構又去太和二十年發勑立四門博士於四門置學臣案自周以上學唯以二或尚東或尚西或貴在國或貴在郊爰暨周室學蓋有六師氏居內太學在國四小在郊禮記云周人養庶老於虞庠虞庠在國之四郊又云天子設四學當入學而太子齒注云四學周四郊之虞庠也大戴保傅篇云帝入東學尚親而貴仁帝入南學尚齒而貴信帝入西學尚賢而貴德帝入北學尚貴而尊爵帝入太學承師以問道周之五學於此彌彰案鄭注學記周則六學所以然者注云內則設師保以教使國子學焉外則有太學庠序之官此其證也漢魏以降無復四郊謹尋先旨宜在四門案王肅注云天子四郊有學去都五十里考之鄭氏不云逺近今太學故坊基址寬曠四郊别置相去遼濶檢督難周計太學坊并作四門猶為太曠以臣愚量同處無嫌且今時制置多循中代未審四門應從古不求集儒禮官議其定所從之遷中書令祭酒如故出除青州刺史為政儒緩不能禁止姦盜然清廉寡欲無撓公私還朝議定律令芳斟酌古今為大議之主其中損益多芳意也宣武以朝儀多闕其一切諸議悉委芳修正於是朝廷吉凶大事皆就咨訪焉轉太常卿芳以所置五郊及日月之位去城里數於禮有違又靈星周公之祀不應𨽻太常乃上疏曰臣聞國之大事莫先郊祀郊祀之本實在審位臣學謝全經業乖通古豈可輕薦瞽言妄陳管説竊見所置壇祠逺近之宜考之典制或未允𠂻既曰職司請陳膚淺孟春令云其數八又云迎春於東郊盧植云東郊八里郊也賈逵云東郊木帝太昊八里許慎云東郊八里郊也鄭元孟春令注云王居眀堂禮曰王出十五里迎嵗蓋殷禮也周禮近郊五十里鄭元别注云東郊去都城八里髙誘云迎春氣於東方八里郊也王肅云東郊八里因木數也此皆同謂春郊八里之眀據也孟夏令云其數七又云迎夏於南郊盧植云南郊七里郊賈逵云南郊火帝七里許慎云南郊七里郊也鄭元云南郊去都城七里髙誘云南郊七里之郊也王肅云南郊七里因火數也此又南郊七里之審據也中央令云其數五盧植云中郊五里之郊也賈逵云中兆黃帝之位并南郊之季故云兆五帝於四郊也鄭元云中郊西南未地去都城五里此又中郊五里之審據也孟秋令云其數九又云以迎秋於西郊盧植云西郊九里郊賈逵云西郊金帝少昊九里許慎云西郊九里郊也鄭元云西郊去都城九里髙誘云西郊九里之郊也王肅云西郊九里因金數也此又西郊九里之審據也孟冬令云其數六又云迎冬於北郊盧植云北郊六里郊也賈逵云北郊水帝顓頊六里郊許慎云北郊六里郊也鄭元云北郊去都城六里髙誘云北郊六里之郊也王肅云北郊六里因水數也此又北郊六里之審據也宋氏含文嘉注云周禮王畿內千里二十分其一以為近郊近郊五十里倍之為逺郊迎五氣蓋於近郊漢不設王畿則以其方數為郊處故東郊八里南郊七里西郊九里北郊六里中郊在西南未地五里祭祀志云建武二年正月初制郊兆於雒陽城南七里依採元始中故事北郊在雒陽城北四里此漢世南北郊之眀據也今地祗凖此至如三十里郊進乖鄭元所引殷周二代之據退違漢魏所行故事凡邑外曰郊今計四郊各以郭門為限里數依上禮朝拜日月皆於東西門外今日月之位去城東西路各三十竊又未審禮又云祭日於壇祭月於坎今計造如上禮儀志云立髙禖祠于城南不云里數故今仍舊靈星本非禮事兆自漢初専為祈田恆𨽻郡縣郊祀志云髙祖五年制詔御史其令天下立靈星祠牲用太牢縣邑令長侍祠晉祠令云郡縣國祠社稷先農縣又祠靈星此靈星在天下諸縣之眀據也周公廟所以别在雒陽者蓋緣姬旦創成洛邑故傳世洛陽崇祠不絶以彰厥庸夷齊廟者亦世為洛陽界內神祠今並移太常恐乖其本天下此類甚衆皆當部郡縣修理公私施之禱請竊惟太常所司郊廟神祗自有常限無宜臨時斟酌以意若遂爾妄營則不免淫祀二祠在太常在洛陽於國一也然貴在審本臣以庸蔽謬忝今職考括墳籍博採羣議既無異端謂粗可依據今元冬務隙野罄人間遷易郊壇二三為便詔曰所上乃有眀據但先朝置立已久且可從舊先是孝文於代都詔中書監髙閭太常少卿陸琇并公孫崇等十餘人修理金石及八音之器後崇為太樂令乃上請尚書僕射髙肇更共營理宣武詔芳共主之芳表以禮樂事大不容輒決自非博延公卿廣集儒彥討論得失研窮是非則無以垂之萬葉為不朽之式被報聽許數旬之間頻煩三議于時朝士頗以崇專綜既久不應乖謬各默然無發論者芳乃探引經誥搜括舊文共相難質皆有眀據以為盈縮有差不合典式崇雖示相酬答而不會本意卒無以自通尚書依事述奏仍詔委芳别更考制於是學者彌歸宗焉芳以社稷無樹又上疏曰依合朔儀注日有變以朱絲為繩以繞繫社稷樹三匝而今無樹又周禮大司徒職云設其社稷之壝而樹之田主各以其社之所宜木鄭元注云所宜木謂若松柏栗也此其一證也又小司徒封人職云掌設王之社壝為畿封而樹之鄭元注云不言稷者王主於社稷社之細也此其二證也又論語曰哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗是乃土地之所宜也此其三證也又白虎通社稷所以有樹何也尊而識之也使人望見即敬之又所以表功也案此正解所以有樹之義了不論有之與無也此其四證也此云社稷所以有樹何然則稷亦有樹眀矣又五經通義云天子太社王社諸侯國社侯社制度奈何曰社皆有垣無屋樹其中以木有木者主土生萬物萬物莫善於木故樹木也此其五證也此最其丁寧備解有樹之意也又五經要義云社必樹之以木周禮司徒職曰班社而樹之各以土地所宜尚書逸篇曰太社惟松東社惟柏南社惟梓西社惟栗北社惟槐此其六證也此又太社及四方皆有樹别之眀據也又見諸家禮圖社稷圖皆畫為樹惟誡社誡稷無樹此其七證也雖辨有樹之據猶未正所植之木案論語稱夏后氏以松殷人以柏周人以栗便是世代不同而尚書逸篇則云太社惟松如此便以一代之中而立社各異也愚以為宜植以松何以言之逸書云太社惟松今者植松不慮失禮惟稷無成證稷乃社之細蓋亦不離松也宣武從之芳沈雅方正槩尚甚髙經博多通孝文尤器敬之動相顧訪太子恂之在東宫孝文欲為納芳女芳辭以年貌非宜帝歎其謙慎帝更勑芳舉其宗女芳乃稱其族子長文之女孝文乃為恂聘之與鄭懿女對為左右孺子焉崔光於芳有中表之敬每事詢仰芳撰鄭元所注周官儀禮音干寶所注周官音王肅所注尚書音何休所注公羊音范寧所注榖梁音韋昭所注國語音范曄後漢書音各一卷辨類三卷徐州人地録三十卷急就篇續注音義證三卷毛詩箋音義證十卷禮記義證十卷周官儀禮義證各五卷崔光表以中書監讓芳宣武不許卒贈鎮東將軍徐州刺史諡文貞侯長子懌字祖欣雅有父風頗好文翰厯徐州别駕兖州左軍府長史司空咨議參軍屢為行臺出使所厯皆有當官之稱轉通直散騎常侍徐州大中正行郢州事尋遷安南將軍大司農卿卒贈徐州刺史諡曰簡無子弟廞以第三子㻐為後廞字景興好學強立善事當世髙肇之盛及清河王懌為宰輔廞皆與其子姪交遊靈太后臨朝又與太后兄子往還相好太后令廞以詩賦授弟元吉稍遷光祿大夫孝武帝初除散騎常侍驃騎大將軍國子祭酒孝武於顯陽殿講孝經廞為執經雖酬答論難未能精盡而風采音制足有可觀尋兼都官尚書又兼殿中尚書及孝武入關齊神武至洛責廞誅之子隲字子升少有風氣頗涉文史位徐州開府從事中郎父廞之死隲率勒鄉部赴兖州與刺史樊子鵠抗禦王師每戰流涕突陳城陷禽送晉陽齊神武矜而赦之文襄為儀同開府以隲為屬本州大中正轉中書舍人屬梁通和隲前後受敕對其使一十六人為司徒左長史卒贈南青州刺史廞弟􅖢位金紫光祿大夫􅖢子逖有文藻頗工詩詠列在文苑傳中芳從子懋字仲華祖泰之父承伯仕宋並有名位懋聰敏好學博綜經史善草𨽻書識竒字宣武初入朝位尚書外兵郎中芳甚重之凡所撰朝廷軌儀皆與參量尚書博議懋與殿中郎袁翻常為議主達於從政臺中疑事咸所訪決尚書李平與結莫逆交遷步兵校尉領郎中兼東宫中舍人轉員外常侍鎮逺將軍領考功郎中立考課之科眀黜陟之法甚有條貫孝眀初大軍攻硤右懋為李平行臺郎中城拔懋頗有功太傅清河王懌愛其風雅常目而送之曰劉生堂堂搢紳領袖若天假之年必為魏朝宰輔詔懋與諸才學之士撰成儀令懌為宰相積年禮懋尤重令諸子師之遷太尉司馬熙平二年冬暴病卒家甚清貧亡之日徒四壁而已太傅懌及當時才俊莫不痛惜之贈持節前將軍南秦州刺史諡曰宣簡懋詩誄賦頌及文筆見稱於時又撰諸器物造作之始十五卷名曰物祖常爽字士眀河內溫人魏太常卿林六世孫也祖珍苻堅南安太守因世亂遂居涼州父坦乞伏世鎮逺將軍大夏鎮將顯美侯爽少而聰敏嚴正有志槩雖家人僮𨽻未嘗見其寬誕之容篤志好學博聞強識眀習緯候五經百家多有研綜州郡禮命皆不就太武西征涼土爽與兄士國歸欵軍門太武嘉之賜士國爵五品顯美男爽為六品拜宣威將軍是時戎車屢駕征伐為事貴遊子弟未遑學術爽置館溫水之右教授門徒七百餘人京師學業翕然復興爽立訓甚有勸罰之科弟子之事若嚴君焉尚書左僕射元贊平原太守司馬真安著作郎程靈蚪皆是爽教所就崔浩髙允並稱爽之嚴教奬勵有方允曰文翁柔勝先生剛克立教雖殊成人一也其為通識歎服如此因教授之暇述六經略注以廣制作甚有條貫其序曰傳稱立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義然則仁義者人之性也經典者身之文也皆以陶鑄神情啓悟耳目未有不由學而能成其器不由習而能成其業是故季路勇士也服道以成忠烈之槩寧越庸夫也講藝以全髙尚之節蓋其所由者習也所因者本也本立而道生身文而德備焉昔者先王之訓天下也莫不導以詩書教以禮樂移其風俗和其人民故恭儉莊敬而不煩者教深於禮也廣博易良而不奢者教深於樂也溫柔敦厚而不愚者教深於詩也疏通知逺而不誣者教深於書也潔靜精微而不賊者教深於易也屬辭比事而不亂者教深於春秋也夫樂以和神詩以正言禮以眀體書以廣聽春秋以斷事五者蓋五常之道相須而備易為之源故曰易不可見則乾坤幾乎息矣由是言之六經者先王之遺烈聖人之盛事也安可不遊心寓目習性文身哉聊因暇日屬意藝林略撰所聞討論其本名曰六經略注以訓門徒焉其略注行於世爽不事王侯獨守間靜講肄經典二十餘年時號為儒林先生年六十三卒於家子文通厯官至鎮西司馬南天水太守西翼校尉文通子景字永昌少聰敏初讀論語毛詩一受便覽及長有才思雅好文章廷尉公孫良舉為協律博士孝文親得其名既而用之為門下録事太常博士正始初詔尚書門下於金墉中書外省考論律令勑景參議宣武季舅護軍髙顯卒其兄右僕射肇託景及尚書邢巒并州刺史髙聰通直郎徐紇各作碑銘並以呈御帝悉付侍中崔光簡之光以景所造為最乃奏曰常景名位處諸人之下而文出諸人之上遂以景文刋石肇尚平陽公主未幾薨肇欲使公主家令居廬制服已付學官議正施行尚書又以訪景景以婦人無専國之理家令不得有純臣之義議不應服朝廷從之景淹滯門下積嵗不至顯官以蜀司馬相如王子淵嚴君平揚子雲等四賢有髙才而無重位乃託意以讚之景在樞密十有餘年為侍中崔光盧昶遊肇元暉所知賞纍遷積射將軍給事中延昌初東宫建兼太子屯騎校尉仍録事其年受敇撰門下詔書凡四十卷尚書元萇出為安西將軍雍州刺史請景為司馬以景階次不及除給事參軍襄威將軍帶長安令甚有惠政人吏稱之先是太常劉芳與景等撰朝令未及班行别典儀注多所草創未成芳卒景纂成其事及宣武崩召景赴京還修儀注拜謁者僕射加寧逺將軍又以本官兼中書舍人後授步兵校尉仍舍人又敇撰太和之後朝儀已施行者凡五十餘卷時靈太后詔依漢世隂鄧二后故事親奉廟祀與帝交獻景乃據正以定儀注朝廷是之正光初除龍驤將軍中散大夫舍人如故眀帝行講學之禮於國子寺司徒崔光執經敇景與董紹張徹馮元興王延業鄭伯猷等俱為録義事畢又行釋奠之禮並詔百官作釋奠詩時以景作為美是年九月蠕蠕主阿那瓌歸闕朝廷疑其位次髙陽王雍訪景景曰昔咸寧中南單于來朝晉世處之王公特進之下今日為班宜在藩王儀同三司之間雍從之朝廷典章疑而不決則時訪景而行初平齊之後光祿大夫髙聰徙於北京中書監髙允為之聘妻給其資宅聰後為允立碑每云吾此文報德足矣豫州刺史常綽以未盡其美景尚允才器先為遺德頌司徒崔光聞而觀之尋味良久乃云髙光祿平日每矜其文自許報允之德今見常生此頌髙氏不得獨擅其美也侍中崔光安豐王延眀受詔議定服章敇景參修其事尋進號冠軍將軍阿那瓌之還國也境上遷延仍陳窘乏遣尚書左丞元孚奉詔振恤阿那瓌執孚過柔元奔于漠北遣尚書令李崇御史中尉兼右僕射元纂追討不及乃令景出塞經甕山臨瀚海宣敕勒衆而返景經涉山水悵然懷古乃擬劉琨扶風歌十二首進號征虜將軍孝昌初給事黃門侍郎尋除左將軍太府少卿仍舍人固辭少卿不拜改授散騎常侍將軍如故徐州刺史元法僧叛入梁梁武遣其豫章王蕭綜入據彭城時安豐王延眀為大都督大行臺率臨淮王彧等衆軍討之既而蕭綜降附徐州清復遣景兼尚書持節馳與行臺都督觀機部分景經洛汭乃作銘焉是時尚書令蕭寶夤都督崔延伯都督北海王皓都督車騎將軍元恆芝等並各出討詔景詣軍宣旨勞問還以本將軍徐州刺史杜洛周反於燕州仍以景兼尚書為行臺與幽州都督平北將軍元談以禦之景表求勒幽州諸縣悉平古城山路有通賊之處權發兵夫隨宜置戌以為防遏又以頃來差兵不盡強壯今之三長皆是豪門多丁為之今求權發為兵眀帝皆從之進號平北將軍别敇談西至軍都關北從盧龍塞據此二險以杜賊出入之路又詔景山中嶮路之處悉令捍塞景遣府録事參軍裴智成發范陽二長之兵以守白㠈都督元談據居庸下口俄而安州石離冗城斛鹽三戍兵反結洛周有衆二萬餘落自松岍赴賊談勒别將崔仲哲等截軍都關以待之仲哲戰沒洛周又自外應之腹背受敵談遂大敗諸軍夜散詔以景所部别將李琚為都督代談征下口降景為後將軍解州任仍詔景為幽安元等州行臺賊既南出鈔略薊城景命統軍梁仲禮率兵士邀擊破之獲賊將禦夷鎮軍主孫念恆都督李琚為賊所攻於薊城之北軍敗而死景率屬城人禦之賊不敢逼洛周還據上谷授景平北將軍光祿大夫行臺如故洛周遣其都督王曹紇真馬叱斤等率衆薊南以掠人榖乃遇連雨賊衆疲勞景與都督于榮刺史王延年置兵粟國要其走路大敗之斬曹紇真洛周率衆南趨范陽景與延年及榮破之又遣别將重破之於州西彪眼泉禽斬之及溺死者甚衆後洛周南圍范陽城人翻降執刺史延年及景送於洛周洛周尋為葛榮所吞景又入榮榮破景得還朝永安中詔復本官兼黃門侍郎又攝著作固辭不就二年除中軍將正黃門先是參議正光壬子厯至是賜爵髙陽子元皓內逼莊帝北巡景與侍中大司馬安豐王延眀在宫中召諸親賔乃安慰京師皓入洛景仍居本位莊帝還宫解黃門普泰初除車騎將軍右光祿大夫祕書監以預詔命之勤封濮陽縣子後以例追永熙二年監議事景自少及老恆居事任清儉自守不營産業至於衣食取濟而已耽好經史愛玩文詞若遇新異之書殷勤求訪或復質買不問價之貴賤必以得為期友人刁整每謂曰卿清德自居不事家業雖儉約可尚將何以自濟也吾恐摯太常方餧於柏谷耳遂與衛將軍羊深矜其所乏乃與刁雙司馬彥雍李諧畢祖彥畢義顯等各出錢千文而為買馬焉天平初遷鄴是時詔下三日戶四十萬狼狽就道收百官馬尚書丞郎已下非陪從者盡乘驢齊神武以景清貧特給牛車四乘妻孥方得達鄴後除儀同三司仍本將軍武定六年以老疾去官詔特給右光祿事力終其身八年薨景善與人交始終若一其遊處者皆服其深逺之度未曾見其矜吝之心好飲酒淡於榮利自得懷抱不事權門性和厚恭慎每讀書見韋弦之事深薄之危乃圖古昔可以鑒戒指事為象讚而述之文多不録景所著述數百篇見行於世刪正晉司空張華博物志及撰儒林列女傳各數十篇云長子昶少學識有文才早卒昶弟彪之永安中司空行參軍郭祚字季祐太原晉陽人魏車騎將軍淮弟亮之後也祖逸本州别駕前後以二女妻司徒崔浩一女妻浩弟上黨太守恬太武時浩親寵用事拜逸徐州刺史假榆次侯贈光祿大夫父洪之坐浩事誅祚亡竄得免少而孤貧姿貌不偉人莫之識也有女巫相祚後當冨貴祚涉厯經史習崔浩之書尺牘文章見稱於世弱冠為州主簿刺史孫小委之書記又太原太守王希彥逸妻之姪也共相賙恤乃振孝文初舉秀才對䇿上第拜中書博士轉中書侍郎遷尚書左丞長兼給事黃門侍郎祚清勤在公夙夜匪懈帝甚賞之從南征及還正黃門車駕幸長安行經渭橋過郭淮廟問祚曰是卿祖宗所承邪祚曰是臣七世伯祖帝曰先賢後哲頓在一門祚對曰昔臣先人以通儒英博惟事魏文微臣虛薄遭逄聖眀自惟幸甚因勑以太牢祭淮廟令祚自撰祭文以贊遷洛之規賜爵東光子孝文曾幸華林園因觀故景陽山祚曰山以仁靜水以智流願陛下修之帝曰魏眀以奢失之於前朕何為襲之於後祚曰髙山仰止帝曰得非景行之謂遷散騎常侍仍領黃門是時孝文鋭意典禮兼銓鏡九流又遷都草創征討不息內外規略號為多事黃門宋辨參謀幃幄隨其才用各有委寄祚承稟注疏特成勤劇嘗以立馮昭儀百官夕飲清徽後園孝文舉觴賜祚及崔光曰郭祚勤勞庶事獨不欺我崔光溫良博物朝之儒秀不勸此兩人當勸誰也其見知若此初孝文以李彪為散騎常侍祚因入見帝謂祚曰朕昨誤授一人官祚對曰豈容聖詔一行而有差異帝沉吟曰此自應有讓因讓朕欲别授一官須臾彪有啓云伯石辭卿子産所惡臣欲之已久不敢辭讓帝嘆謂祚曰卿之忠諌李彪正辭使朕遲回不能復決遂不換李彪官也乘輿南討祚以兼侍中從拜尚書進爵為伯孝文崩咸陽王禧等奏祚兼吏部尚書尋除長兼吏部尚書并州大中正宣武詔以姦吏逃刑縣配逺戍若永避不出兄弟代之祚奏曰若以姦吏逃竄徙其兄弟罪人妻子復應徙之此則一人之罪禍傾二室愚謂罪人既逃止徙妻子走者之身縣名永配於責不免姦途自塞詔從之尋正吏部祚持身清潔重惜官位至於銓授假令得人必徘徊久之然後下筆下筆即云此人便以貴矣由是事頗稽滯當時每招怨讟然所拔用者皆量才稱職時又以此歸之出為使持節鎮北將軍瀛州刺史太極殿成祚朝於京師轉鎮東將軍青州刺史祚逄嵗不稔闔境飢弊矜傷愛下多所振恤雖斷決淹留號為煩緩然士庶懷其德澤入為侍中金紫光祿大夫并州大中正遷尚書右僕射時議定新令詔祚與侍中黃門參議刋正故事令僕中丞騶唱而入宮門至於馬道及祚為僕射以為非盡敬之宜言於宣武帝帝納之下詔御在太極騶唱至止車門御在朝堂至司馬門騶唱不入宫自此始也詔祚本官領太子少師祚曾從幸東宫眀帝幼弱祚持一黃㼐出奉之時應詔左右趙桃弓與御史中尉王顯迭相脣齒深為帝所信祚私事之時人謗祚者號為桃弓僕射黃㼐少師祚奏曰謹案前後考格雖班天下如臣愚短猶有未悟今須定職人遷轉由狀超越階級者即須量折景眀初考格五年者得一階半正始中故尚書中山王英奏考格被旨但可正滿三周為限不得計殘年之勤又去年中以前二制不同奏請裁決旨云黜陟之體自依舊來恆斷今未審舊來之旨為從景眀之斷為從正始為限景眀考法東西省文武間官悉為三等考同任事而前尚書盧昶奏上等之人三年轉半階今之考格復分為九等前後不同參差無凖詔曰考在上中者得泛以前有六年之上遷一階三年以上遷半階殘年悉除考在上下者得泛以前六年以上遷半階不滿者除其得泛以後考在上下者三年遷一階散官從盧昶所奏祚又奏言考察令公清獨著德績超倫而無負殿者為上上一殿為上中二殿為上下纍計八殿品降至九未審今諸曹府寺凡考在事公清然才非獨著績行稱務而德非超倫幹能粗可而守平堪任或人用小劣處官濟事并全無負殿之徒為依何等景眀三年以來至今十有一載凖限而判三應外退今既通考未審為十年之中通其殿最積以為第隨前後年斷各自餘其善惡而為升降且負注之章數成殿為差此條以寡愆為最多戾為殿未審取何行是寡愆何坐為多戾結纍品次復有幾等諸文案失𠂻應杖十者為一負罪依律次過隨負記十年之中三經肆眚赦前之罪不問輕重皆蒙宥免或為御史所彈案驗未周遇赦復任者未審記殿得除以不詔曰獨著超倫及才備寡咎皆謂文武兼上上之極言耳自此以降猶有八等隨才為次令文已具其積負纍殿及守平得濟皆含在其中何容别疑也所云通考者據總多年之言至於黜陟之體自依舊來年斷何足復請其罰贖已記之殿固非免限遇赦免罪凖其殿者除之尋加散騎常侍時詔營眀堂國學祚奏曰今雲羅西舉開納岷蜀戎旗東指鎮靖淮荆漢沔之間復須防捍徴兵發衆所在殷廣邊郊多壘烽驛未息不可於師旅之際興版築之功且獻嵗云既東作將始臣愚量謂宜待豐靖之年因子來之力可不時而就從之宣武末年每引祚入東宫密受賞賚多至百餘萬雜以錦繡又特賜以劍杖恩寵甚深遷左僕射先是梁將康絢遏淮將灌揚徐祚表曰蕭衍狂狡擅斷川瀆役苦人勞危亡已兆宜勑揚州選一猛將遣當州之兵令赴浮山表裏夾攻朝議從之除使持節散騎常侍都督揚州刺史征西將軍太和以前朝法尤峻貴臣蹉跌便致誅夷李沖之用事也欽祚識幹薦為左丞又兼黃門郎意便滿足每以孤門往經崔氏之禍常慮危亡苦自陳挹辭色懇然發於誠至沖謂之曰人生有運非可避也但當眀白當官何所顧畏自是積十數年位秩隆重而進趣之心更復不息又以東宫師傅之資列辭尚書志在封侯之賞儀同之位尚書令任城王澄為之奏聞及為征西雍州雖喜外撫尚以府號不優心望加大執政者頗怪之於時領軍于忠恃寵驕恣崔光之徒曲躬承接祚心惡之乃遣子太尉從事中郎景尚説髙陽王雍令出忠為州忠聞而大怒矯詔殺祚祚達於政事凡所經履咸為稱職每有斷決多為故事名器既重時望亦深一朝非罪見害逺近莫不惋惜靈太后臨朝遣使弔慰追復伯爵正光中贈使持節車騎將軍儀同三司雍州刺史諡文貞公初孝文之置中正從容謂祚曰并州中正卿家故應推王瓊也祚退謂寮友曰瓊真偽今自未辨我家何為減之然主上直信李沖吹噓之説耳祚死後三嵗而于忠死見祚為祟祚子景尚字思和涉獵經傳曉星厯占候言事頗驗初為彭城王中軍府參軍遷員外郎司徒主簿太尉從事中郎公強當世善事權寵世號曰郭尖位中書侍郎未拜而卒景尚弟慶禮位通直郎慶禮子元貞武定末定州驃騎府長史張彛字慶賔清河東武城人也曾祖幸慕容超東牟太守歸魏賜爵平陸侯位青州刺史祖凖之襲又為東青州刺史父靈真早卒彛性公強有風氣厯覽經史襲祖侯爵與盧陽烏李安人等結為親友往來朝會常相追隨陽烏為主客令安人與彛並散令彛少而豪放出入殿庭步眄髙上無所顧忌文眀太后雅尚恭謹因會次見其如此遂召集百官督責之令其修悔而猶無悛改善於督察每有所巡檢彛恆充其選清慎嚴猛所至人皆畏伏儔類亦以此髙之遷主客令例降為伯轉太中大夫仍行主客曹事尋為黃門後從駕南征母憂解任彛居喪過禮送葬自平城達家千里步從不乘車馬顔貌瘦瘠當世稱之孝文幸冀州遣使弔慰詔以驍騎將軍起之還復本位以參定遷都之勳進爵為侯轉太常少卿遷散騎常侍兼侍中持節巡察陜東河南十二州甚有聲稱使還以從征之勤遷尚書坐舉元昭為兼郎中黜為守尚書宣武初除正尚書兼侍中尋正侍中宣武親政罷六輔彛與兼尚書邢巒聞處分非常懼將出京奔走為御史中尉甄琛所彈云非虎非兕率彼曠野詔切責之尋除安西將軍秦州刺史彛務尚典式考訪故事及臨隴右彌𢎞制習於是出入直衛方伯羽儀赫然可觀羌夏畏服憚其威整一方肅靜號為良牧其年冬太極初就彛與郭祚等俱以勤舊被徴及還州進號撫軍將軍彛表解州任詔不許彛敷政隴右多所制立宣布新風革其舊政人庶愛仰之為國造佛寺名曰興皇諸有罪咎者隨其輕重謫為土木之功無復鞭杖之罰時陳留公主寡居彛意願尚主主亦許之僕射髙肇亦望尚主主意不可肇怒譖彛於帝以擅立威法勞役百姓詔遣直後萬二興馳驛檢察二興肇所親愛必欲致彛深罪彛清身奉法求其愆過遂無所得見代還洛猶停廢數年因得偏風手腳不便然志意不移善自將攝稍能朝拜久之除光祿大夫加金章紫綬彛愛好知己輕忽下流非其意者視之蔑如也雖疹疾家庭而志氣彌髙表上厯帝圖起庖犧終於晉末凡十六代一百二十八帝厯三千二百七十年雜事五百八十九合成五卷宣武善之眀帝初侍中崔光表彛及李韶朝列之中唯此二人出身官次本在臣右器能幹世又並為多而近來參差便成替後計其階途雖應遷陟然恐班秩猶未賜等昔衛之公叔引下同舉晉之士丐推長伯遊古人所髙當時見許敢緣斯義乞降臣位一階授彼泛級詔加征西將軍冀州大中正雖年向六十加之風疹而自強人事孜孜無怠公私法集衣冠從事延請道俗修營齋講好善欽賢愛奬人物南北新舊莫不多之大起第宅微號華侈頗侮其疏宗舊戚不甚存紀時有怨憾焉榮宦之間未能止足屢表在秦州豫有開援漢中之勳希加賞報積年不已朝廷患之第二息仲瑀上封事求銓削選格排抑武人不使預其清品由是衆口喧喧謗讟盈路立榜大巷尅期會集屠害其家彛父子安然殊無畏避之意神龜二年二月羽林虎賁將幾千人相率至尚書省詬罵求其長子尚書郎始均不獲以瓦石擊打公門上下懾懼莫敢討抑遂持火虜掠道中薪蒿以杖石為兵器直造其第曵彛堂下捶撻極意唱呼焚其屋宇始均仲瑀當時踰北垣而走始均回救其父拜伏羣小以請父命羽林等就加毆擊生投之於煙火中及得尸骸不復可識唯以髻巾中小叉為驗仲瑀走免彛僅有餘命沙門寺與其北鄰輿致於寺臨終口占左右上啓曰臣奉國六世尸祿素飱負恩竭誠曾無寸效臣子始均身陷塗炭仲瑀經宿方蘇臣傷至重殘氣假延望影顧時推漏就盡若所上之書少為益國臣便是生與理全死與義合見先帝於地下無餘恨矣遂卒逺近聞之莫不駭惋官為收掩羽林凶強者八人斬之其餘不能窮誅即為大赦以安衆心有識者知國紀之將墜矣喪還所焚宅與始均東西分斂於小屋仲瑀遂以創重避居滎陽至五月得漸瘳始奔父喪詔賜以布帛靈太后以其纍朝大臣特垂矜惻數月猶追言泣下謂諸侍臣曰吾為張彛飲食不御乃至首髮微有虧落悲痛之若此初彛曾祖幸所招引河東人為州裁千餘家後相依合旋罷入冀州積三十年析别有數萬户故孝文比校天下人户最為大州彛為黃門每侍坐以為言孝文謂之曰終當以卿為刺史酬先世誠效彛追孝文往旨纍乞本州朝議未許彛亡後靈太后云彛屢乞冀州吾欲用之有人違我此意若從其請或不至是悔之無及乃贈使持節衛將軍冀州刺史諡文侯始均字子衡端潔好學才幹有美於父改陳夀魏書為編年之體廣益異聞為三十卷又著冠帶録及諸詩賦數十篇並亡失初大乘賊起於冀瀛之間遣都督元遙討平之多所殺戮積尸數萬始均以郎中為行臺忿軍士以首級為功令檢集人首數千一時焚爇至於灰燼用息僥幸見者莫不傷心及始均之死也始末在煙炭之間有焦爛之痛論者或亦推咎焉贈樂陵太守諡曰孝子皓之襲祖爵武定中開府主簿齊受禪爵例降皓之弟晏之列在齊史邢巒字洪賔河間鄚人魏太常貞之後也族五世祖嘏石勒頻徴不至嘏無子巒髙祖蓋自傍宗入後蓋孫頴字宗敬以才學知名太武時與范陽盧元等同徴拜中書侍郎假通直常侍平城子使宋還以病歸鄉久之帝曰往憶邢頴長者有學義宜侍講東宫今安在司徒崔浩曰頴卧病在家帝遣太醫馳馹就療卒贈定州刺史諡曰康子修年即巒父也位州主簿巒少好學負帙尋師守貧厲節遂博覽書傳有文才幹略美鬚髯姿貌甚偉纍遷兼員外散騎常侍使齊還再遷中書侍郎甚有顧遇常參座席孝文因行藥至司空府南見巒宅遣使謂巒曰朝行藥至此見卿宅乃住東望德館情有依然巒對曰陛下移構中京方建無窮之業臣意在與魏升降寧容不務永年之宅帝謂司空穆亮僕射李沖曰巒之此言其意不小有司奏䇿秀孝詔曰秀孝殊問經權異䇿邢巒才清可令䇿秀後兼黃門郎從征漢北巒在新野後至帝曰伯玉天迷其心鬼惑其慮守危邦固逆主至此以來雖未禽滅城隍已崩想在不逺所以緩攻者正待中書為露布耳尋除正黃門兼御史中尉瀛州大中正遷散騎常侍兼尚書宣武時巒奏曰先皇深觀古今去諸奢侈服御尚書不貴雕鏤所珍在素不務竒綵至乃以紙絹為帳扆銅鐡為轡勒訓朝廷以節儉示百姓以憂矜逮景眀之初承升平之業四疆清晏逺近來同於是蕃貢繼路啇估交入諸所獻貿倍多於常雖加以節約猶嵗損萬計珍貨常有餘國用常不足若不裁其分限便恐無以支嵗自今非為要須者請皆不受帝從之尋正尚書梁秦二州行事夏侯道遷以漢中內附詔加巒使持節都督征梁漢諸軍事鎮西將軍進退徴攝得以便宜從事巒至漢中白馬巴西猶未歸順巒進師討之賊皆款附乘勝追奔至關城之下詔拜巒使持節安西將軍梁秦二州刺史於是開地定境東西七百南北千里獲郡十四二部護軍及諸縣戍遂逼涪城巒因表曰揚州成都相去萬里陸途既絶唯資水路水軍西上非周年不達外無軍援一可圖也益州頃經劉季連反叛鄧元起攻圍倉庫空竭無復固守之意二可圖也蕭深藻是裙屐少年未洽政務今之所任並非宿將重名皆是左右少年而已三可圖也蜀之所恃惟阻劔閣今既克南安已奪其險據彼界內三分已一從南安向涪方軌任意前軍纍破後衆喪魄四可圖也深藻是蕭衍兄子骨肉至親若其逃亡當無死理脫軍走涪城深藻何肯城中坐而受困五可圖也臣聞乘機而動武之善經未有捨干戚而康時不征伐而統一臣以不才屬當戎寄上憑國威頻有薄捷瞻望涪益旦夕可屠正以兵少糧匱未宜前出後圖便難輒率愚管必將殄克如其無功分受憲坐若朝廷未欲經略臣便為無事乞歸侍飬微展烏鳥巒又表曰昔鄧艾鍾會率十八萬衆傾中國資給裁得平蜀所以然者鬭實力也况臣才絶古人何宜請二萬之衆而希平蜀所以敢者正以據得要險士庶慕義此往則易彼來則難任力而行理有可克今王足前進已逼涪城脫得涪城則益州便是成禽之物臣誠知征戎危事未易可為自軍度劔閣以來鬚髮中白所以勉強者既到此城而自退不守恐孤先皇之恩遇負陛下之爵祿是以孜孜頻有陳請宣武不從又王足於涪城輒還遂不定蜀巒既克巴西遣軍主李仲遷守之仲遷得梁將張法飬女有美色甚惑之散費兵儲専心酒色公事咨承無能見者巒忿之切齒仲遷懼謀叛城人斬其首以降梁將譙希逺巴西遂沒武興氐楊集起等反巒遣統軍傅監眼討平之巒之初至漢中從容風雅接豪右以禮撫衆庶以惠嵗餘之後頗因其去就誅滅百姓籍為奴婢者二百餘口兼商販聚斂清論鄙之徴授度支尚書時梁武遣兵侵軼徐兖緣城鎮戍相繼陷沒朝廷憂之乃以巒為都督東討諸軍事安東將軍尚書如故宣武勞遣巒於東堂曰知將軍旋京未久膝下難違然東南之寄非將軍莫可巒曰願陛下勿以東南為慮帝曰漢祖有言金吾擊郾吾無憂矣今將軍董戎朕何慮哉巒至乃分遣將帥致討兖州悉平進圍宿豫平之俘斬數萬獲米四十萬斛帝賜巒璽書勞之及梁城敗賊走中山王英乘勝攻鍾離又詔巒率衆會討巒以為鍾離天險朝貴所具若有內應則所不知如其無也必無克狀且俗語云耕則問田奴織則問織婢臣既謂難何容重遣巒既纍表求還帝許之英果敗退時人伏其識略初侍中盧昶與巒不平昶與元暉俱為宣武所寵御史中尉崔亮昶之黨也昶暉令亮糾巒事成許言於宣武以亮為侍中亮奏巒在漢中掠良人為婢巒懼乃以漢中所得巴西太守龎景女化生等二十餘口與暉化生等數人竒色也暉大悅乃背昶為巒言云巒新有大功已經赦宥不宜方為此獄帝納之髙肇以巒有尅敵效而為昶等所排助巒申釋故得不坐豫州城人白早生殺刺史司馬悅以城南入梁遣其將齊茍仁率衆入據懸瓠詔巒持節率羽林精騎討之封平舒縣伯賞宿豫之功也宣武臨東堂勞遣巒曰早生走也守也何時平巒曰今王師若臨士人必翻然歸順圍之窮城奔走路絶不度此年必傳首京師願陛下不足為慮帝笑曰卿言何其壯哉知卿親老頻勞於外然忠孝不俱不得辭也於是巒率騎八百倍道兼行五日次於鮑口擊賊大將胡孝智乘勝至懸瓠因即度汝既而大兵繼至遂長圍圍之詔巒使持節假鎮南將軍都督南討諸軍事中山王英南討三關亦次懸瓠以後軍未至前寇稍多憚不敢進乃與巒分兵將犄角攻之梁將齊茍仁等二十一人開門出降即斬早生同惡數十人豫州平巒振旅還京師宣武臨東堂勞之曰卿役不踰時克清妖醜鴻勳碩美可謂無愧古人巒曰此自陛下聖略威靈英等及諸將士之力臣何功之有帝笑曰卿匪直一月三捷所足稱竒乃存士伯讓功而弗處巒自宿豫大捷及平懸瓠志行修正不復以財賄為懷戎資軍實絲毫無犯遷殿中尚書加撫軍將軍暴卒巒才兼文武朝野瞻望上下悼惜之詔贈車騎大將軍瀛州刺史初帝欲贈冀州黃門甄琛以巒前曾劾己乃云瀛州巒之本郡人情所欲乃從之及琛為詔乃云優贈車騎將軍瀛州刺史議者笑琛淺薄諡曰文定子遜字子言貌雖陋短頗有風氣襲爵後遷國子博士本州大中正因謁靈太后自陳功臣之子久抱沉屈臣父屢為大將而臣身無軍功階級臣父惟為忠臣不為慈父靈太后慨然以遜為長兼吏部郎中後位大司農卿與少卿元慶哲至相糾訟遜鋭於財利議者鄙之卒贈光祿勳幽州刺史子祖徴開府祭酒父喪未終謀反伏法祖徴弟祖效貌寢有風尚仕齊卒於尚書郎祖效弟祖俊開府行參軍開皇中位尚書都官郎中巒弟偉尚書郎中偉子昕有才藻列在文苑傳偉弟晏字幼平美風儀博涉經史善談釋老雅好文詠位滄州刺史為政清靜吏民安之卒贈尚書左僕射瀛州刺史諡曰文貞晏篤於義讓初為南兖州例得一子解褐乃啓其孤弟子子慎為朝請子慎年甫十二而其子已弱冠矣後為滄州復啓其孤兄子昕為府主簿而其子並未從宦世人以此多之子亢字子髙頗有文學位兼通直散騎常侍使於梁時年二十八後為中外府屬坐事死於晉陽巒叔祖祐字宗祐少有學尚知名於時假員外散騎常侍使於宋以將命之勤除建威將軍平原太守賜爵平城男政清刑肅百姓安之卒于官子産字神寶好學善屬文少時作孫蓬賦為時所稱舉秀才除著作佐郎假常侍鄚縣子使於齊産仍世將命時人美之厯中書侍郎太子中庶子卒朝廷嗟惜焉贈平州刺史樂城子諡曰定祐從子虯字神彪著作郎敏之子也少為三禮鄭氏學眀經有文思舉秀才上第為中書議郎尚書殿中郎孝文因公事與語問朝覲宴饗禮虯以經對大合上旨帝崩尚書令王肅多用新儀虯往往折以五經正禮為尚書左丞多所糾正臺閣肅然時鴈門人有害母者八坐奏轘之而瀦其室宥其二子虯駁奏云君親無將將而必誅誅逆者戮及期親害親者令不及子既逆甚梟獍禽獸之不若而使禋祀不絶遺育承傳非所以勸忠孝之道存三綱之義若聖教含容不加孥戮使父子罪不相及惡止於其身者則宜投之四裔勑所在不聽配匹盤庚言無令易種新邑漢法五月食梟羹皆欲絶其類也奏入宣武從之後為光祿少卿母在鄉遇患請假歸遇秋水暴長河梁破絶虯得一小船而度船漏滿不沒時人異之母喪哀毁過禮為時所稱卒贈幽州刺史諡曰威虯善與人交清河崔亮頓邱李平並與親善所作碑頌雜筆三十餘篇長子臧博學有才著述甚多列在文苑傳臧弟邵列在齊史李崇字繼長小名繼伯頓邱人也文成元皇后第二兄誕之子年十四召拜主文中散襲爵陳留公鎮西大將軍孝文初以本官為荆州刺史鎮上洛勑發秦陜二州兵送崇至治崇辭曰邊人失和本怨刺史奉詔代之自然易帖但須一宣詔旨而已不勞發兵自防使民懷懼帝從之乃輕將數十騎馳到上洛宣詔慰喻民即恬然邊戍掠得齊人者悉令還之南人感德仍送荆州口二百許人兩境交和無復烽燧之警在州四年甚有政績召還京師賞賜隆厚除兖州刺史兖土舊多劫盜崇乃村置一樓樓懸一鼓賊發之處雙槌亂擊四面諸村聞鼓皆守要路俄頃之間聲聞百里其中險要悉有伏人盜發便即擒送諸州置樓懸鼓自崇始也後例降為侯改授安東將軍車駕南征詔崇副驃騎大將軍咸陽王禧都督左翼諸軍事徐州降人郭陸聚黨作逆人多應之崇遣髙平卜冀州詐稱犯罪逃亡歸陸陸納之以為謀主數月冀州斬陸送之賊徒潰散入為河南尹後車駕南討漢陽崇行梁州刺史氐楊靈珍遣弟婆羅與子雙領步騎萬餘襲破武興與齊相結詔崇為使持節都督隴右諸軍事率衆討之崇槎山分進出其不意表裏以襲羣氐皆棄靈珍散歸靈珍衆減大半崇進據赤土靈珍又遣從弟建率五千人屯龍門躬率精勇一萬據鷲硤龍門之北數十里中伐樹塞路鷲硤之口積大木聚礌石臨崖下之以拒官軍崇乃命統軍慕容拒率衆五千從他路襲龍門破之崇自攻靈珍靈珍連戰敗走俘其妻子崇多設疑兵襲克武興齊梁州刺史隂廣宗遣參軍鄭猷王思考率衆援靈珍崇大破之并斬婆羅首殺千餘人俘獲猷等靈珍走奔漢中孝文在南陽覽表大恱曰使朕無西顧之憂者李崇功也拜梁州刺史手詔曰便可善思經略去其可除安其可育公私所患悉令芟夷及靈珍踰據白水崇擊破之靈珍逺遁宣武初徴為右衛將軍兼七兵尚書轉左衛將軍相州大中正魯陽蠻桞北喜魯北燕等聚衆反叛諸蠻悉應之圍逼湖陽遊擊將軍李暉光鎮北城盡力捍禦賊勢甚盛詔以崇為使持節都督征蠻諸軍事以討之蠻衆數萬屯據形要以拒官軍崇纍戰破之斬北燕等徙萬餘户於幽并諸州宣武追賞平氐之功封魏昌縣伯東荆州蠻樊安聚衆於龍山僣稱大號梁武遣兵應之諸將擊不利乃以崇為鎮南將軍都督征蠻諸軍事率步騎討之崇分遣諸將攻擊賊壘連戰克捷生擒樊安進討西荆諸蠻悉降尋兼侍中東道大使黜陟能否著賞罰之稱出除散騎常侍征南將軍揚州刺史詔曰應敵制變算非一塗救左擊右疾雷均勢今朐山蟻寇久結未殄賊衍狡詐或生詭劫宜遣鋭兵備其不意崇可都督淮南諸軍事坐敦威重遙運聲算延昌中加侍中車騎將軍都督江西諸軍事先是夀春縣人茍泰有子三嵗遇賊亡失數年不知所在後見在同縣趙奉伯家泰以狀告各言已子並有鄰證郡縣不能斷崇令二父與兒各在别處禁經數旬然後告之曰君兒遇患向已暴死可出奔哀也茍泰聞而號咷悲不自勝奉伯咨嗟而已殊無痛意崇察知之乃以兒還泰詰奉伯詐狀奉伯欵引云先亡一子故妄認之又定州流人解慶賔兄弟坐事俱徙揚州弟思安背役亡歸慶賔懼後役追責規絶名貫乃認城外死尸詐稱其弟為人所殺迎送殯葬頗類思安見者莫辨又有女巫楊氏自云見鬼説思安被害之苦飢渴之意慶賔又誣疑同軍兵蘇顯甫李蓋等所殺經州訟之二人不勝楚毒各自欵引獄將決竟崇疑而停之密遣二人非州內所識者偽從外來詣慶賔告曰僕住北州比有一人見過寄宿夜中共語疑其有異便即詰問乃云是流兵背役姓解字思安時欲送官苦見求免稱有兄慶賔今住揚州相國城內嫂姓徐君脫矜慜為往告報見申委曲家兄聞此必重相報今但見質若往不獲送官何晚是故相造指申此意君欲見雇幾何當放賢弟若其不信可見隨看之慶賔悵然失色求其少停此人具以報崇攝慶賔問之伏引更問蓋等乃云自誣數日之間思安亦為人縛送崇召女巫視之鞭笞一百崇斷獄精審皆此類也時有泉水湧於八公山頂夀春城中有魚數從地湧出野鴨羣飛入城與鵲爭巢五月大霖雨十有三日大水入城屋宇皆沒崇與兵泊於城上水增未已乘船附於女牆城不沒者三版而已州府勸崇棄城保北山崇曰吾受國重恩忝守藩嶽淮南萬里繫於吾身一旦動腳百姓瓦解揚州之地恐非國物昔王尊慷慨義感黃河吾豈愛一軀取愧千載但憐兹士庶無辜同死可桴筏隨髙人規自脫吾必守死此城時州人裴絢等受梁假豫州刺史因乘大水謀欲為亂崇皆擊滅之又以洪水為災請罪解任詔曰夏雨泛濫斯非人力何得以此辭解今水涸路通公私復業便可繕甲積糧修復城雉勞恤士庶務盡綏懷之略也崇又表解州不聽是時非崇則淮南失守矣崇深沉有將略寬厚善御衆在州凡十年常飬壯士數千人寇賊侵邉所向摧破號曰卧虎賊甚憚之梁武惡其久在淮南屢設反間無所不至宣武雅相委重梁無以措謀乃授崇車騎大將軍開府儀同三司萬戶郡公諸子皆為縣侯欲以構崇崇表言其狀宣武屢賜璽書慰勉之賞賜珍異嵗至五三親待無與為比梁武每歎息服宣武之能任崇也孝眀踐阼褒賜衣馬及梁遣其遊擊將軍趙祖悅襲據西硤石更築外城徙緣淮之人於城內又遣二將昌義之王神念率水軍泝淮而上規取夀春田進龍寇邊城路長平寇五門胡興茂寇開霍揚州諸戍皆被寇逼崇分遣諸將與之相持密裝船艦二百餘艘教之水戰以待臺軍梁霍州司馬田休等寇建安崇遣統軍李神擊走之又命邊城戍主邵申賢要其走路破之於濡水俘斬三千餘人靈太后璽書勞勉許昌縣令兼紵麻戍主陳平玉南引梁軍以戍歸之崇自秋請援表至十餘詔遣鎮南將軍崔亮救硤石鎮東將軍蕭寶夤於梁堰上流決淮東注朝廷以諸將不相赴乃以尚書李平兼右僕射持節節度之崇遣李神乘鬭艦百餘艘緣淮與李平崔亮合攻硤石李神水軍克其東北外城祖悅力屈乃降朝廷嘉之進號驃騎將軍儀同三司刺史都督如故梁淮堰未破水勢日增崇乃於硤石戍間編舟為橋北更立船樓十各髙三丈十步置一籬至兩岸蕃版裝束四箱解合賊至舉用不戰解下又於樓船之北連覆大船東西竟水防賊火筏又於八公山之東南更起一城以備大水州人號曰魏昌城崇纍表解州前後十餘上孝眀乃以元志代之尋除中書監驃騎大將軍儀同如故出為使持節侍中都督四州諸軍事定州刺史徴拜尚書左僕射遷尚書令加侍中崇在官和厚眀於決斷然性好財賄販肆聚斂孝眀靈太后常幸左藏王公嬪主從者百餘人皆令任力負布絹即以賜之多者過二百匹少者百餘唯長樂公主兩手持二十匹而出不異衆而已世稱其廉儉崇與章武王融以所負多顛仆於地崇乃傷腰融至損腳時人為之語曰陳留章武傷腰折股貪人敗類穢我眀主蠕蠕主阿那瓌犯塞詔崇以本官都督北討諸軍事以討之崇辭於顯揚殿戎服武飾志氣奮揚時年六十九幹力如少孝眀目而壯之朝臣莫不稱善遂出塞三千餘里不及賊而還崇請改六鎮為州兵編户太后不許後北鎮人破落汗拔陵反所在響應征北將軍臨淮王彧大敗於五原安北將軍李叔仁尋敗於白道賊衆日甚詔引丞相令僕尚書侍中黃門於顯陽殿曰賊勢寖淫寇連恆朔金陵在彼夙夜憂惶諸人宜陳良䇿吏部尚書元修義以為須得重貴鎮壓恆朔總彼師旅備衛金陵詔曰去嵗阿那瓌叛逆遣李崇北征崇遂長驅塞北反斾榆關此一時之盛朕以李崇國戚望重器識英斷意欲還遣崇行都督三軍揚旌恆朔諸人謂可爾不僕射蕭寶夤等曰陛下此遣實合羣望於是詔崇以本官加使持節開府北討大都督撫軍將軍崔暹鎮軍將軍廣陽王深皆受崇節度又詔崇子光祿大夫神軌假平北將軍隨崇北討至五原崔暹大敗于白道之北賊遂并力攻崇崇與廣陽王深力戰纍破賊衆相持至冬乃引還平城深表崇長史祖瑩詐增功級盜沒軍資崇坐免官爵徴還以後事付深後徐州刺史元法僧以彭城南叛時除安樂王覽為徐州刺史以討之為法僧所敗單馬奔歸乃詔復崇官爵為徐州大都督節度諸軍事會崇疾篤乃以安豐王延眀代之改除開府相州刺史侍中將軍儀同並如故孝昌元年薨於位贈侍中驃騎大將軍司徒公雍州刺史諡曰武康後重贈太尉公餘如故長子世哲性輕率供奉豪侈少經征役頗有將用為三關别將討羣蠻大破之還拜鴻臚少卿性傾巧善事人亦以貨賂自達髙肇劉騰之處勢也皆與親善故世號為李錐為相州刺史斥逐百姓遷徙佛寺逼買其地部內患之崇北征之後徴兼太常卿御史髙道穆毁廢其宅表其罪過後除涇州刺史賜爵衛國子卒贈吏部尚書冀州刺史世哲弟神軌小名青肫受父爵陳留侯纍世征伐頗有將領之氣孝昌中靈太后淫縱分遣腹心媪姬出外隂求悅人神軌為使者所薦寵遇勢傾朝野時云見幸帷幄與鄭儼為雙頻遷征東將軍武衛將軍給事黃門侍郎常領中書舍人時相州刺史安樂王鑒據州反詔神軌與都督源子雍等討平之後於河隂遇害建義初贈侍中司空公相州刺史諡曰烈崇從弟平字曇定彭城王嶷之長子少有大度及長涉獵羣書好禮易頗有文才太和初拜通直散騎侍郎孝文禮之甚重頻居大憂居喪以孝聞後以例降襲爵彭城公纍遷太子庶子平請自效一郡帝曰卿復欲以吏事自試也拜長樂太守政務清靜吏民懷之徴行河南尹豪右權戚憚之宣武即位除黃門郎遷司徒左長史行尹如故尋正尹長史如故車駕將幸鄴平上表諫曰嵩都創構洛邑俶營雖年跨十稔根基未就代民至洛始欲向盡資産罄於遷移牛畜弊於輦運陵太行之險越長津之難辛勤備經得達京闕富者猶損太半貧者可以意知兼厯嵗從戎不遑啓處自景眀以來差得休息事農者未積二年之儲築室者裁有數間之屋莫不肆力伊瀍人急其務實宜安靜新人勸其稼穡令國有九載之糧家有水旱之備且一夫從行舉家失業今復秋稼盈田禾菽遍野鑾駕所幸蹂踐必多不從詔以本官行相州事帝至鄴親幸平第見其諸子尋正刺史平勸課農桑修飾太學簡試通儒以充博士選五郡聰敏者以教之圖孔子及七十二弟子於講堂親為立贊前來臺使頗好侵漁平乃畫履虎尾踐薄冰於客館注頌其下以示誡焉徴拜度支尚書領御史中尉冀州刺史京兆王愈反於信都以平為持節都督北討諸軍事行冀州事以討之宣武臨式乾殿勞遣喻以兄弟之義因曰何圖今日言及斯事因歔欷流涕平對曰愈天迷其心構此梟悖陛下不以臣不武委以總督之任今大宥既敷有征無戰如其稽顙軍門則送之大理若不悛待戮則鳴鼓釁鉦非陛下之事平進次涇縣諸軍大集夜有蠻兵數千斫平前壘矢及平帳平堅卧不動俄而乃定遂至冀州城南十六里大破逆衆逐北至城門遂圍城愈與百餘騎突門走平遣統軍叔孫頭追之去信都八十里禽愈冀州平以本官領相州大中正平先為尚書令髙肇侍御史王顯所恨後顯代平為中尉平加散騎常侍顯劾平在冀州隱截官口肇又扶成其狀奏除平名延昌初詔復官爵除定冀二州刺史前來良賤之訟多有積年不決平奏不問真偽一以景眀年前為限於是諍訟止息武川鎮民飢鎮將任款請貸未許擅開倉振恤有司繩以費散之條免其官爵平奏款意在濟人心無不善帝原之遷中書令尚書如故孝眀初轉吏部尚書平髙眀強濟所在有聲但以性急為纍尚書任城王澄奏理平定冀之勳靈太后乃封武邑郡公賜縑二千五百匹先是梁遣其將趙祖恱逼夀春鎮將崔亮攻之未克又與李崇乖二詔平以本官使持節鎮東大將軍兼尚書右僕射為行臺節度諸軍東西州將一以稟之如有乖異以軍法從事詔平長子奬以通直郎從於是率步騎二千赴夀春嚴勒崇亮令水陸兼備尅期齊舉崇亮憚之無敢乖互頻日交戰破賊軍安南將軍崔延伯立橋於下蔡以拒賊之援賊將王神念昌義之等不得進救祖悅守死窮城平乃部分攻之斬祖悅送首於洛陽以功遷尚書右僕射加散騎常侍平還京師靈太后見於宣光殿賜以金裝刀仗一口時南徐州表云梁堰淮水日為患詔公卿議之平以為不假兵力終自毁壞及淮堰破靈太后大悅引羣臣入宴敕平前鳴簫管孝眀手賜縑布百假卒遺令薄葬詔給東園祕器朝服一具衣一襲帛七百匹靈太后為舉哀於東堂贈侍中驃騎大將軍儀同三司冀州刺史諡文烈公平自在度支至於端副夙夜在公孜孜匪懈凡處機密十有餘年有獻替之稱所制文筆别有集録長子奬字遵穆容貌魁偉有當世才度位中書侍郎吏部郎中以本官兼尚書出為相州刺史初元義擅朝奬為其親待頻居顯職靈太后反政削除官爵孝莊初為散騎常侍河南尹奬前後所厯皆以眀濟著稱元皓入洛皓以奬兼尚書右僕射慰勞徐州羽林及城人不承皓旨害奬傳首洛陽孝武帝初奬故吏宋遊道上書理奬詔贈冀州刺史子構襲構字祖基少以方正見稱襲爵武邑郡公齊天保初降爵為縣侯位終大府卿贈吏部尚書構早有名譽厯官清顯常以雅道自居甚為名流所重子丕有父風位尚書祠部郎中丕弟克通直散騎常侍奬弟諧字虔和幼有風采趙郡李搔常過元義門下見之歸謂其父元忠曰領軍門下見一神人元忠曰必李諧也問之果然襲父先爵彭城侯文辨為時所稱厯位中書侍郎天平末魏欲與梁和好朝議將以崔㥄為使主㥄曰文采學識㥄不推李諧口頰􅀈􅀈諧乃大勝於是以諧兼常侍盧元眀兼吏部郎李業興兼通直常侍聘焉梁武使朱異覘客異言諧元眀之美諧等見及出梁武目送之謂左右曰朕今日遇勍敵卿輩常言北間都無人物此等何處來謂異曰過卿所談是時鄴下言風流者以諧及隴西李神俊范陽盧元眀北海王元景𢎞農楊遵彥清河崔贍為首初通梁國妙簡行人神俊位已髙故諧等五人繼踵而遵彥遇疾道還竟不行既南北通好務以俊乂相矜銜命接客必盡一時之選無才地者不得與焉梁使每入鄴下為之傾動貴盛子弟盛飾聚觀禮贈優渥館門成市宴日齊文襄使左右覘之賔司一言制勝文襄為之拊掌魏使至梁亦如梁使至魏梁武親與談説甚相愛重諧使還後遷祕書監卒於大司農諧為人短小六指因癭而舉頥因跛而後步因謇而徐言人言李諧善用三短文集十餘卷諧長子嶽字祖仁官中散大夫性純至居期慘未曾聽婢過前追思二親言則流涕嶽弟庶列在齊史諧弟雍字修穆幼而俊爽有逸才位髙陽王雍友凡所交遊皆倍年俊秀卒贈洛州刺史諡曰文通志卷一百五十上
