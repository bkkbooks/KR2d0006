body:
  text: 通志卷十七宋右迪功郎鄭樵漁仲撰後周紀第十七文帝孝閔帝明帝武帝宣帝靜帝周太祖文皇帝姓宇文氏諱泰字黑獺代郡武川人也其先出自炎帝炎帝為黃帝所滅子孫遁居朔野其後有葛烏􅊵者雄武多算略鮮卑奉以為主遂總十二部落世為大人及其裔孫曰普回因狩得玉璽三紐文曰皇帝璽普回以為天授已獨異之其俗謂天子曰宇文故國號宇文并以為氏普回子莫那自隂山南徙始居遼西是曰獻侯為魏舅甥之國自莫那九世至侯歸豆為慕容晃所滅其子陵仕燕拜駙馬都尉封元莬公及慕容寶敗歸魏拜都牧主賜爵安定侯天興初魏遷豪傑於代都陵隨例徙居武川即為其郡縣人焉陵生系系生韜韜生皇考肱並以武略稱肱任俠有氣幹正光末沃野鎮人破六韓拔陵作亂其偽署王衛可瓌最盛肱乃糾合鄉里斬瓌其衆乃散後陷鮮于修禮為定州軍所破戰沒於陳武成初追諡曰德皇帝帝德皇帝之少子也母曰王氏初孕五月夜夢抱子升天才不至而止寤以告德皇帝德皇帝喜曰雖不至天貴亦極矣帝生而有黑氣如蓋下覆其身及長身長八尺方顙廣額美鬚髯髮長委地垂手過膝背有黑子宛轉若龍盤之形面色紫光人望而敬畏之少有大度不事家人生業輕財好施以交結賢士大夫為務隨德皇帝在鮮于修禮軍及葛榮殺修禮帝時年十八榮任以將帥帝察其無成謀與諸兄去之計未行會榮滅因隨爾朱榮遷晉陽榮忌帝兄弟雄傑遂託以他罪誅帝第三兄洛生帝以家寃自理辭旨慷慨榮感而免之益加敬待始以統軍從榮征討後以别將從賀拔嶽討北海王皓於洛陽孝莊反正以功封寧都子後從嶽入關平万俟醜奴行原州事時關隴寇亂帝撫以恩信百姓皆喜曰早遇宇文使君吾等豈從逆亂帝嘗從數騎於野忽聞簫鼓之音以問從者皆莫之聞意獨異之普泰二年爾朱天光東拒齊神武留弟顯壽鎮長安召泰州刺史侯莫陳恱東下嶽知天光必敗欲留恱共圗顯壽計無所出帝謂嶽曰今天光尚近恱未必二心若以此事告之恐其驚懼然恱雖為主將不能制物若先説其衆必人有留心進失爾朱之期退恐人情變動若乘此説恱事無不遂嶽大喜即令帝入恱軍説之恱遂與嶽襲長安帝輕騎為前鋒追至華隂擒顯壽及嶽為關西大行臺以帝為左丞領嶽府司馬事無巨細皆委決焉齊神武既除爾朱氏遂專朝政帝請往觀之至并州神武以帝非常人曰此小兒眼目異將留之帝詭陳忠欵具託左右苦求復命倍道而行行一日而神武乃悔發上驛千里追帝至關不及而反帝還謂嶽曰髙歡豈人臣邪逆謀未發者憚公兄弟耳侯莫陳恱本實庸材亦不為歡忌但為之備圗之不難今費也頭控弦之騎不下一萬夏州刺史解拔彌俄突勝兵三千餘人及靈州刺史曹泥並恃僻逺常懷異望河西流人紇豆陵伊利等戶口富實未奉朝風今若移軍近隴扼其要害示之以威懷之以德即可收其士馬以資吾軍西輯氐羌北撫沙塞還軍長安匡扶魏室此桓文之舉也嶽大恱復遣帝詣闕請事密陳其狀魏帝納之加帝武衛將軍還令報嶽嶽遂引軍西次平涼嶽以夏州鄰接寇賊欲求良刺史以鎮之衆皆舉帝嶽曰宇文左丞吾左右手何可廢也沉吟纍日乃從衆議表帝為夏州刺史帝至州伊利望風欵附而曹泥猶通使於齊神武魏永熙三年正月賀拔嶽欲討曹泥遣都督趙貴至夏州與帝謀帝曰曹泥孤城阻逺未足為憂侯莫陳恱貪而無信是宜先圗也嶽不聽遂與悅俱討泥二月至河曲果為悅所害衆散還平涼唯大都督趙貴率部曲收嶽尸還營三軍未知所屬諸將以都督寇洛年最長推總兵事洛素無雄略威令不行乃請避位於是趙貴言於衆稱帝英姿雄略若告喪必來赴難因而奉之大事濟矣諸將皆稱善乃令赫連逹馳至夏州告帝士吏咸泣請留以觀其變帝曰難得而易失者時也不俟終日者機也今不早赴將恐衆心自離都督彌姐元進規應恱密圗帝事發斬之帝乃率帳下輕騎馳赴平涼時齊神武遣長史侯景招引嶽衆帝至安定遇之於傳舍吐哺上馬謂曰賀拔公雖死宇文泰尚存卿何為者景失色曰我猶箭耳隨人所射者也景於此還帝至平涼哭嶽甚慟將士悲且喜曰宇文公至無所憂矣齊神武又使景與常侍張華原義寧太守王基勞帝帝不受命與基有舊將留之并欲留景並不屈乃遣之時斛斯椿在帝所曰景人傑也何故放之帝亦悔驛追之不及基亦逃歸言帝雄傑請及其未定滅之神武曰卿不見賀拔侯莫陳乎吾當以計拱手取之及沙苑之敗神武乃始追悔于時魏帝將圗神武聞嶽被害遣武衛將軍元毗宣旨勞嶽軍追還洛陽毗到平涼會諸將已推帝侯莫陳悅亦被敕追還悅既附神武不肯應召帝曰悅枉害忠良復不應詔命此國之大賊乃令諸軍戒嚴將討悅及毗還帝表於魏帝辭以髙歡至河東侯莫陳悅在永洛首尾受敵乞少停緩帝志在討悅而未測朝旨且衆未集假為此辭因與元毗及諸將刑牲盟誓同奬王室初賀拔嶽營河曲軍吏獨行忽見一翁謂曰賀拔雖據此衆終無所成當有一宇文家從東北來後必大盛言訖不見至是方驗魏帝因詔帝為大都督即統賀拔嶽軍帝乃與恱書責以殺賀拔嶽罪又喻令歸朝恱乃詐為詔書與秦州刺史万俟普撥令為已援普撥疑之封以呈帝帝表奏之魏帝因問帝安秦隴計帝請召悅授以內官及處以瓜涼一藩不然則終致猜虞三月帝進軍至原州衆軍悉集諭以討悅意士卒莫不懷憤四月引兵上隴留兄子遵為都督鎮原州帝軍令嚴肅秋毫無犯百姓大悅軍出木狹關大雪平地二尺帝知恱怯而多猜乃倍道兼行出其不意恱果疑其左右有異志左右不自安衆遂離二聞大軍且至退保略陽留一萬餘人據守永洛帝至圍之城降帝即輕騎數百趣略陽以臨恱軍其部將皆勸恱退保上邽時南秦州刺史李弼亦在悅軍間遣使請為內應其夜悅出軍軍自驚潰將卒或來降帝縱兵奮擊大破之恱與其子弟及麾下數十騎遁走帝乃命原州都督遵追恱至牽屯山斬之傳首洛陽帝至上邽恱府庫財物山積皆以賞士卒毫釐無所取左右竊以一銀甕歸帝知而罪之即剖賜將士衆大恱齊神武聞關隴剋捷遣使於帝深相倚結帝拒而不納封神武書以聞時神武已有異志故魏帝深仗於帝仍令帝稍引軍而東帝乃令大都督梁禦率步騎五千將鎮河渭合口為圗河東計魏帝進帝侍中驃騎大將軍開府儀同三司關西大都督略陽縣公承制封拜使持節如故時魏帝方圗齊神武又遣徴兵帝乃令前秦州刺史駱超為大都督率輕騎一千赴洛魏帝進授帝兼尚書左僕射關西大行臺餘官如故帝乃傳檄方鎮暴神武罪惡興兵東討既而謂諸軍曰髙歡雖智不足而詐有餘今聲言欲西其意在入洛吾欲令寇洛率馬步萬餘自涇州東引王羆率甲士一萬先據華州歡若西來王羆足得抗拒如其入洛寇洛即襲汾晉吾便速駕直赴京邑使其進有內顧之憂退有被躡之勢一舉大定此為上策衆咸稱善七月帝帥衆發自髙平前軍至于𢎞農而齊神武稍逼京師魏帝親總六軍屯河橋令左衛元斌之領軍斛斯椿鎮虎牢帝謂左右曰髙歡數日行八九百里曉兵者所忌正須乘便擊之而主上以萬乘之重不能度河決戰方緣津據守且長河萬里扞禦為難一處得度大事去矣即以大都督趙貴為别道行臺自蒲坂濟趣并州遣大都督李賢將精騎一千赴洛陽會斌之與斛斯椿爭權鎮防不守魏帝遂輕騎入關帝備儀衛奉迎謁見於東驛免冠流涕謝罪乃奉魏帝都長安拔草萊立朝廷軍國之政咸取決於帝仍加授大將軍雍州刺史兼尚書令進封略陽郡公别置二尚書隨機處分解尚書僕射餘如故初魏帝在洛陽許以馮翊長公主配帝未及結納而魏帝西遷至是詔帝尚之拜駙馬都尉八月齊神武襲陷潼關侵華隂帝率諸軍屯霸上以待之神武留其將薛瑾守關而退帝乃進軍斬瑾虜其卒七千還長安進位丞相十一月遣儀同李虎與李弼趙貴等討曹泥於靈州虎引河灌之明年泥降遷其豪帥于咸陽十二月魏孝武帝崩帝與羣公定册尊立魏南陽王寶炬為嗣是為文帝大統元年正月己酉魏帝進帝都督中外諸軍録尚書事大行臺改封安定郡王帝固讓王及録尚書魏帝許之乃改封安定郡公東魏將司馬子如冦潼關帝軍霸上子如乃還軍自蒲津寇華州刺史王羆擊走之三月帝命有司為二十四條新制奏行之二年五月秦州刺史建忠王万俟普撥率所部入東魏帝輕騎追之至河北千餘里不及而還三年正月東魏寇龍門屯軍蒲坂造三道浮橋度河又遣其將竇泰趣潼關髙昂圍洛州帝出軍廣陽召諸將謂曰賊犄吾三靣又造橋示欲必度是欲綴吾軍使竇泰得西入耳且歡起兵以來泰每先驅下多鋭卒屢勝而驕今襲之必尅尅泰則歡不戰自走矣諸將咸曰賊在近捨而擊逺若蹉跌悔何及也帝曰歡前再襲潼關吾軍不過霸上今者大來謂吾但自守耳又狃於得志有輕我之心乘此擊之何往不尅賊雖造橋未能徑度比五日中吾取泰必矣庚戌帝還長安聲言欲向隴右辛亥謁魏帝而潛軍至小關竇泰卒聞軍至陳未成帝擊之盡俘其衆斬泰傳首長安高昂聞之焚輜重而走齊神武亦撤橋而退帝乃還六月帝請罷行臺魏帝復申前命受帝録尚書事固讓乃止八月丁丑帝率李弼獨孤信梁禦趙貴于謹若干惠怡峯劉亮王德侯莫陳崇李逺逹奚武等十二將東伐至潼關遣于謹先徇地至盤豆拔之獲東魏將髙叔禮送於長安戊子至𢎞農攻之城潰禽東魏陜州刺史李徽伯虜其戰士八千守將髙千走渡河命賀拔勝追禽之並送長安於是宜陽邵郡皆歸附先是河南豪傑應東魏者皆降齊神武懼率衆走蒲坂將自后土濟遣其將高昂以三萬人出河南是歲關中飢帝館榖於𢎞農五十餘日時軍士不滿萬人聞神武將度乃還神武遂度河逼華州刺史王羆嚴守乃涉洛軍於許原西帝至渭南徴諸州兵未會諸將以衆寡不敵請且待歡更西以觀之帝曰歡若至咸陽人情轉騷擾今及其新至可擊之即造浮橋於渭令軍士齎三日糧輕騎度渭輜重自渭南夾渭而西十月壬辰至沙苑距齊軍六十餘里神武引軍來會癸巳候騎告齊軍至帝召諸將謀李弼曰彼衆我寡不可平地置陳此東十里有渭曲可先據以待之遂進至渭背水東西為陳李弼為右拒趙貴為左拒命將士皆偃戈於葭蘆中聞鼓聲而起日晡齊師至望見軍少競萃於左軍亂不成列兵將交帝鳴鼓士皆奮起于謹等六軍與之合戰李弼等率鐵騎橫擊之絶其軍為二遂大破之斬六千餘級臨陳降者二萬餘人神武夜遁追至河上復大尅前後虜其卒七萬留其甲兵二萬餘悉縱歸收其輜重兵甲獻俘長安李穆曰髙歡膽破矣逐之可獲帝不聼乃還軍渭南時所徵諸州兵始至乃於戰所凖當時兵人種樹一株栽桞七千根以旌武功魏帝進帝柱國大將軍增邑并前五千戶李弼等十二將亦進爵增邑以左僕射馮翊王元李海為行臺與開府獨孤信帥步騎二萬向洛陽賀拔勝李弼度河圍蒲坂蒲坂鎮將髙子信開門納勝軍東魏將薛崇禮棄城走勝等追獲之帝進軍蒲坂略定汾綘初帝自𢎞農入關後東魏將髙昂圍𢎞農聞其軍敗退守洛陽獨孤信至新安昂復走度河遂入洛陽自梁陳已西將吏降者相屬於是東魏將堯雄趙育是云寶出㯋川欲復降地帝遣儀同宇文貴梁遷等逆擊大破之趙育來降東魏復遣任祥率河南兵與堯雄合儀同怡峯與貴遷等復擊破之又遣都督韋孝寬取豫州是云寶殺其東揚州刺史那椿以州來降四年三月帝率諸將入朝禮畢還華州七月東魏將侯景等圍獨孤信於洛陽齊神武繼之帝奉魏帝至穀城臨陳斬東魏將莫多婁貸文悉虜其衆送𢎞農遂進軍瀍東景等夜解圍去及旦帝率輕騎追至河上景等北據河橋南屬芒山為陳與諸軍戰帝馬中流矢驚逸軍中擾亂都督李穆下馬授帝軍復振於是大捷斬其將髙昻李猛宋顯等虜其甲士一萬五千人赴河死者萬數是日置陳既大首尾懸逺從旦至未戰數十合氛霧四塞莫能相知獨孤信李逺居右趙貴怡峯居左戰並不利又未知魏帝及帝所在皆棄其卒先歸開府李虎念賢等為後軍遇信等退即與俱還由是班師洛陽亦失守大軍至𢎞農守將皆已棄城西走所虜降卒在𢎞農者因相與閉門拒守進攻拔之誅其魁首數百人大軍之東伐也關中留守兵少而前後所虜東魏士卒皆散在百姓間乃謀亂及李虎等至長安計無所出乃與太尉王明僕射周惠逹輔魏太子出次渭北關中大震恐百姓相剽劫於是沙苑所俘軍人趙青雀雍州人于伏德等遂反青雀據長安子城伏德保咸陽與太守慕容思度各收降卒以拒還師長安城人皆相率拒青雀每日接戰魏帝留止閿鄉令帝討之長安父老見帝且悲且喜曰不意今日復得見公士女咸相賀華州刺史宇文導襲咸陽斬思度禽伏德南度渭與帝會攻破青雀太傅梁景睿先以疾留長安遂與青雀通謀至是亦伏誅關中乃定魏帝還長安帝復屯華州十二月是云寶襲洛陽東魏將王元軌棄城走都督趙剛襲廣州拔之自襄廣以西城鎮復西屬五年冬大閲於華隂六年春東魏將侯景出三鴉將侵荆州帝遣開府李弼獨孤信各率騎出武關景乃還夏蠕蠕度河至夏州帝召諸軍屯沙苑以備之七年十一月帝奏行十二條制恐百官不勉於職事又下令申明之八年十月齊神武侵汾絳圍玉璧帝出軍蒲坂神武退度汾追之遂遁去十二月魏帝狩於華隂大饗將士帝帥諸將朝於行在所九年二月東魏北豫州刺史髙慎舉州來附帝帥師迎之三月齊神武據芒山為陳不進者數日帝留輜重於瀍曲軍士銜枚夜登芒山未明擊之神武單騎為賀拔勝所逐僅免帝率右軍若干惠大破神武軍悉虜其步卒趙貴等五將軍居右戰不利神武復合戰帝又不利夜引還入關屯渭上神武進至陜開府逹奚武等禦之乃退帝以芒山諸將失律上表自貶魏帝不許於是廣募關隴豪右以增軍旅十月大閲於櫟陽還屯華州十年五月帝朝京師七月魏帝以帝前後所上二十四條及十二條新制定為中興永式命尚書蘇綽更損益之總為五卷班於天下於是搜簡賢才為牧守令習新制而遣焉數年間百姓便之十月大閲於白水十一年十月大閲於白水遂西狩岐陽十二年春涼州刺史宇文仲和據州反瓜州人張保害刺史成慶以應之帝遣開府獨孤信討之東魏將侯景侵襄州帝遣開府若干惠禦之至穰景遁去五月獨孤信平涼州禽仲和遷其百姓六千餘家於長安瓜州都督令狐延起義誅張保瓜州平七月帝大會諸軍於咸陽十三年正月東魏河南大行臺侯景舉河南六州來附景被圍於潁川六月帝遣開府李弼援之東魏將韓軌等遁去景遂徙鎮豫州於是遣開府王思政據潁川弼引軍還七月侯景密圗附梁帝知其謀悉追還前後所配景將士景懼遂叛冬帝奉魏帝西狩咸陽十四年春魏帝詔封帝長子覺為寧都郡公初帝以平元皓納孝莊帝功封寧都縣子至是改以為郡以封覺用彰勤王之始也五月魏帝進帝位太師帝奉魏太子巡撫西境登隴刻石紀事遂至原州歷北長城大狩東趣五原至蒲州聞魏帝不豫而還及至魏帝疾已愈乃還華州是歲東魏將髙嶽圍王思政於潁川十五年春帝遣大將軍趙貴帥師援王思政髙嶽堰洧水以灌城潁川以北皆為陂澤救兵不得至六月潁川陷初侯景圍建鄴梁司州刺史栁仲禮赴臺城梁竟陵郡守孫皓以郡內附帝使大都督苻貴鎮之及建鄴陷仲禮還司州來寇皓以郡叛帝大怒十一月遣開府楊忠攻尅隨州進圍仲禮長史馬岵於安陸十六年正月仲禮來援安陸楊忠逆擊於漴頭大破之禽仲禮馬岫以城降三月魏帝封帝第二子震為武邑公七月帝東伐拜章武公導為大將軍總督留守諸軍屯涇北鎮關中九月丁巳軍出長安連雨自秋及冬諸軍馬驢多死遂於𢎞農北造橋濟河自蒲坂還於是河南自洛陽河北自平陽以東遂入齊十七年三月魏文帝崩皇太子嗣位帝以冢宰總百揆十月帝遣大將軍王雄出子午伐上津魏興大將軍逹奚武出散關伐南鄭廢帝元年春王雄平上津魏興以其地置東梁州四月逹奚武圍南鄭月餘梁州刺史宜豐侯蕭修以州降武八月東梁州百姓圍州城帝復遣王雄討之二年正月魏帝詔帝為左丞相大行臺都督中外諸軍事二月東梁州平遷其豪帥於雍州三月帝遣大將軍魏安公尉遲迥帥師伐梁武陵王蕭紀於蜀四月帝勒鋭騎三萬西踰隴度金城河至姑臧吐谷渾震懼遣使獻其方物七月帝至自姑臧八月尉遲迥剋成都劍南平十一月尚書元烈謀亂伏誅三年正月始作九命之典以敘內外官爵以第一品為九命第九品為一命改流外品為九秩亦以九為上又改置州郡縣凡改州四十六置州三改郡一百六改縣三百三十魏帝有怨言於是帝與公卿議廢帝立齊王廓是為恭帝恭帝元年四月帝大饗羣臣魏太史桞虬執簡書告於朝曰廢帝文皇帝之嗣子年七歲文皇帝託於安定公曰是子也才由於公不才亦由於公公宜勉之公既受兹重寄居元輔之任又納女為皇后遂不能訓誨有成致令廢黜負文皇帝付屬之意此咎非安定公而誰帝乃令太常盧辨作誥諭公卿曰嗚呼我羣后暨衆士維文皇帝以襁褓之嗣託於豫訓之誨之庶厥有成而豫罔能弗變厥心庸暨乎廢墜我文皇帝之意嗚呼兹咎豫其焉避豫實知之矧爾衆人之心哉惟豫之顔豈惟今厚將恐來世以豫為口實乙亥魏帝詔封帝子雍為輔城公憲為安城公七月西狩至原州梁元帝遣使請據舊圖以定疆界又連結於齊言辭悖慢帝曰古人有言天之所棄誰能興之其蕭繹之謂乎十月壬戌遣柱國于謹中山公護與大將軍楊忠韋孝寬等步騎五萬討之十一月癸未師濟漢中山公護與楊忠率鋭騎先屯其城下丙申于謹至江陵列營圍守辛亥尅其城戕梁元帝虜其百官士庶以歸沒為奴婢者十餘萬免者二百餘家立蕭察為梁主居江陵為魏附庸魏氏之初統國三十六大姓九十九後多絶滅至是以諸將功高者為三十六國後次者為九十九姓後所統軍人亦改從其姓二年梁廣州刺史王琳寇邉十月帝遣大將軍豆盧寧帥師討之三年正月丁丑初行周禮建六官魏帝進帝位太師大冢宰帝以漢魏官繁思革前弊大統中乃令蘇綽盧辨依周制改創其事尋亦置六卿官然為撰次未成衆務猶歸臺閣至是始畢乃命行之四月帝北巡七月度北河魏帝封帝子直為秦郡公招為正平公九月帝不豫還至雲陽命中山公護受遺輔嗣子十月乙亥帝崩於雲陽宮還長安發喪時年五十十二月甲申葬於成陵諡文公及孝閔帝受禪追尊為文王廟曰太祖武成元年追尊為文皇帝帝知人善任使從諫如順流崇尚儒術明逹政事恩信被物能駕馭英豪一見之者咸思用命沙苑所獲囚俘釋而用之及河橋之役以充戰士皆得其死力諸將出征授以方略無不制勝性好朴素不尚虛飾恆以反風俗復古始為心云孝閔皇帝諱覺字陀羅尼文帝第三子也母曰元皇后大統八年生於同州七歲封略陽郡公時善相者史元華見帝退謂所親曰此公子有至貴相但恨不壽耳魏恭帝三年三月命為安定公世子四月拜大將軍十月乙亥文帝崩丙子世子嗣位為太師大冢宰十二月丁亥魏帝詔以岐陽地封帝為周公庚子詔禪位於帝遣民部中大夫濟北公元迪致皇帝璽綬帝固辭公卿百辟勸進太史陳祥瑞乃從之是日魏帝遜位於大司馬府元年春正月天王即位柴燎告天朝百官於露門追尊皇考文公為文王皇妣為文后大赦封魏帝為宋公是日槐里獻赤雀百官奏議曰帝王之興罔弗更正朔明受之於天革人視聼也逮於尼父稽諸隂陽云行夏之時後王所不易今魏歷告終周室受命以木承水實當行録正用夏時式遵聖道惟文王誕元氣之祥有黑水之讖服色宜尚焉制曰可以大司徒趙郡王李弼為太師以大宗伯南陽公趙貴為太傅大冢宰以大司馬河內公獨孤信為太保以大宗伯中山公護為大司馬以大將軍寧都公育髙陽公逹奚武武陽公豆盧寧小司寇陽平公李逺小司馬博陵公賀蘭祥小宗伯魏安公尉遲迥等並為柱國壬寅祀圓丘詔曰豫本自神農其於二丘宜作厥主始祖獻侯啓土遼海配南北郊文考德苻五運受天明命祀於明堂以配上帝癸卯祀方丘甲辰遂祭太社初除市門稅乙巳享太廟丁未會於乾安殿班賞各有差戊申詔有司分命使者巡察風俗求人得失禮餼髙年恤於鰥寡辛亥祀南郊壬子立王后元氏辛酉享太廟癸亥親耕籍田二月癸酉朔朝日於東郊戊寅祭太社丁亥柱國楚國公趙貴謀反伏誅太保獨孤信有罪免甲午以大司空梁國公侯莫陳崇為太保大司馬晉國公護為大冢宰柱國博陵公賀蘭祥為大司馬髙陽公逹奚武為大司寇大將軍化政公宇文貴為柱國三月己酉衛國公獨孤信賜死癸亥省六府士員三分之一夏四月壬申降死罪以下囚壬午謁成陵丁亥享太廟五月己酉帝將觀漁於昆明池博士薑頃諫乃止秋七月士寅帝聼訟於右寢多所哀宥辛亥享太廟八月戊辰祭太社辛未降死罪以下囚甲午詔二十四軍舉賢良九月庚申改太守為郡守帝性剛果忌晉公護之專司會李植軍司馬孫恆以先朝佐命入侍左右亦疾護權重乃與宮伯乙鳯賀拔提等潛請帝誅護帝許之又引宫伯張先洛先洛以白護護乃出植為梁州刺史恆為潼州刺史鳳等更奏帝將召羣臣入因此誅護先洛又白之時小司馬尉綱總統宿衛兵護乃召綱入殿中詐呼鳯等論事以次執送護第並誅之綱仍罷禁兵帝無左右獨在內殿令宮人執兵自守護遣大司馬賀蘭祥逼帝遜位貶為略陽公遂幽於舊邸月餘日以弒崩時年十六植恆等亦遇害及武帝誅護後乃詔曰故略陽公至德純粹天姿秀傑屬魏祚告終寶命將改謳歌允集歷數攸歸上協蒼靈之慶下昭后祇之錫而禍生肘腋釁起蕭牆白虎噬驂蒼鷹集殿幽辱神器弒酷乘輿寃結生靈毒流宇縣今河海澄清氛沴消蕩追尊之禮宜崇徽號遣太師蜀國公迥於南郊上諡曰孝閔皇帝陵曰靜陵孝閔帝元年無年號世宗明皇帝諱育小名統萬突文皇帝之長子也母曰姚夫人永熙三年文帝臨夏州生於統萬城因以名焉大統十四年封寧都郡公魏恭帝三年纍遷大將軍鎮隴右孝閔踐阼進位柱國轉岐州刺史有美政及孝閔廢晉公護遣迎帝於岐州九月癸亥至京師止於舊邸羣臣上表勸進備法駕奉迎帝固讓羣臣固請乃許之元年秋九月天王即位大赦乙丑朝羣臣於延壽殿冬十月癸酉太師趙國公李弼薨己卯以大將軍昌平公尉綱為柱國乙酉祀圎丘丙戌祀方丘甲午祭太社陽平公李逺賜死辛未梁敬帝遜位於陳十一月庚子享太廟丁未祀圎丘十二月庚午謁成陵庚辰以大將軍輔城公雍為柱國戊子赦長安見囚甲午詔元氏子女自坐趙貴等事以來所有沒入為官口者悉免之二年春正月乙未以大冢宰晉公護為太師辛亥親耕籍田癸丑立王后獨孤氏丁巳於雍州置十二郡三月甲午北豫州刺史司馬消難舉州來附改雍州刺史為牧京兆郡守為尹庚申詔三十六國九十九姓自魏南徙皆稱河南人今周室既都關中宜改稱京兆人夏四月己巳以太師晉公護為雍州牧辛未降死罪囚一等五歲刑以下皆原之甲戌天王后獨孤氏崩甲申葬敬后五月乙未以大司空梁國公侯莫陳崇為大宗伯六月癸亥嚈噠國遣使朝貢己巳板授髙年刺史守令恤鰥寡孤獨各有差分長安為萬年縣並居京城壬申遣使分行州郡理囚徒察風俗掩骸埋胔秋七月順陽獻三足烏八月甲子羣臣上表稱慶於是大赦文武普進級九月辛卯以大將軍楊忠王雄並為柱國甲辰封少師元羅為韓國公以紹魏後丁未行幸同州故宅賦詩冬十月辛酉突厥遣使朝貢癸亥太廟成乙亥以功臣琅邪貞獻公賀拔勝等十三人配享文帝廟庭壬午大赦武成元年春正月己酉太師晉公護上表歸政帝始親萬機軍旅猶總於護初改都督諸州軍事為總管三月癸巳陳六軍帝親擐甲胄迎太白於西方吐谷渾寇邉庚戌遣大司馬博陵公賀蘭祥率衆討之夏五月戊子詔有司造周歷己亥聽訟於正武殿辛亥以大宗伯梁國公侯莫陳崇為大司徒大司寇髙陽公逹奚武為大宗伯武陽公豆盧寧為大司寇柱國輔城公雍為大司空乙卯詔曰比屢有糾發官司赦前事者有司自今勿推究唯庫廄倉廪與海內所共漢帝有云朕為天下守財耳若有侵盜公家財畜錢粟者魏朝之事年月既逺一不須問自周有天下以來雖經赦宥事迹可知者有司宜即推窮得實之日免其罪徵備如法賀蘭祥攻拔洮陽洪和二城吐谷渾遁走閏月髙昌遣使朝貢六月戊子大雨霖詔公卿大夫士爰及牧守黎庶等令各上封事讜言極諫無有所諱其遭水者有司可時巡檢條列以聞庚子詔曰潁川從我是曰元勳無忘父城實起王業皇考文王屬天地草昧造化權輿拯彼流亡匡兹頺運賴英賢盡力文武同心翼贊大功克隆帝業而被堅執鋭櫛風沐雨永言疇昔良用憮然若功成名遂建國割符豫唯休也其有致死王事妻子無歸者朕甚傷之凡從先王向夏州發夏州從來見在及薨亡者並量賜錢帛稱朕意焉是月陳武帝殂秋八月己亥改天王稱皇帝追尊文王為文皇帝大赦改元癸丑增御正四人位上大夫冬十月齊文宣帝殂二年春正月癸丑朔大會羣臣於紫極殿始用百戲三月辛酉重陽閣成會羣臣公侯列將卿大夫及突厥使於芳林園賜錢帛各有差夏四月帝因食糖䭔遇毒庚子大漸詔曰人生天地之間稟五常之氣天地有窮已五常有推移人安得長在是以有生有死者物理之必然處必然之理修短之間何足多恨朕雖不德性好典墳披覽聖賢餘論未嘗不以此自曉今乃命也夫復何言諸公及在朝卿大夫士軍中大小督將軍人等並立勳效積有年載輔翼太祖成我周家令朕纘承大業處萬乘之上此上不負太祖下不負朕躬朕得啓手啓足從先帝於地下實無恨於心矣所可恨者朕享大位可謂四年矣不能使政化修理黎庶豐足九州未一二方猶梗顧此恨恨目用不瞑唯冀仁兄冢宰洎朕先正先父公卿大臣等協和為心勉力相勸勿忘太祖遺志提挈後人朕雖沒九泉形骸不朽今大位虛曠社稷無主朕兒幼少未堪當國魯國公雍朕之介弟寬仁大度海內共聞能𢎞我周家必此子也夫人貴有始終公等事太祖輔朕躬可謂有始矣若克念政道顧其艱難輔雍以主天下者可謂有終矣哀死事生人臣大節公等可思念此言令萬代稱歎朕稟生儉素非能力行菲薄每寢大布之被服大帛之衣凡是器用皆無雕刻身終之日豈容違棄此好喪事所須務從儉約斂以時服勿使有金玉之飾若以禮不可闕皆令用瓦小斂訖七日哭文武百官各權辟麻苴以素服從事葬日選擇不毛之地因勢為墳勿封勿樹且厚葬傷生聖人所誡既服膺聖人之教安敢違之凡百官司勿異朕意四方州鎮使到各令三日哭哭訖權辟凶服還以素服從事待大例除非有呼召各按部自守不得輒奔赴闕庭禮有通塞隨時之義葬訖內外悉除服從吉三年之內勿禁婚娶一令如平常也時事殷猥病困心亂止能及此如事有不盡凖此以類為斷死而可忍古人有之朕今忍死盡此懷抱其詔即帝口授也辛丑帝崩於延壽殿時年二十七諡曰明皇帝廟號世宗五月辛未葬於昭陵帝寬明仁厚敦睦九族有君人之量幼而好學博覽羣書善屬文詞彩溫麗及即位集公卿已下有文學者八十餘人於麟趾殿刋校經史又捃採衆書自羲農已來訖于魏末敘為世譜凡百卷所著文章十卷明帝初即位二年不稱年號後改武成盡二年即位四年髙祖武皇帝諱雍字禰羅突文帝第四子也母曰叱奴太后魏大統九年生於同州有神光照室帝幼而孝敬聰敏有器質文帝異之曰成吾志者此兒也年十二封輔城郡公孝閔帝踐阼拜大將軍出鎮同州明帝即位遷柱國授蒲州刺史入為大司空行御正進封魯國公領宗師甚見親愛參議朝廷大事性沉深有逺識非因問終無所言帝每歎曰夫人不言言必有中武成二年四月帝崩遺詔傳位於帝帝固讓百官勸進乃從之壬寅即皇帝位大赦冬十二月改作露門是歲齊孝昭帝廢其主殷而自立保定元年春正月戊申改元文武百官各增四級以大冢宰晉公護為都督中外諸軍事令五府總於天官庚戌祀圓丘壬子祀方丘甲寅祀感生帝於南郊乙卯祭太社己巳享太廟班文帝所述六官於廟廷甲戌板授髙年官各有差乙亥親耕籍田丙子大射於正武殿賜百官各有差二月己卯遣大使巡察天下風俗甲午朝日於東郊丙午省輦輿去百戲三月丙寅改八丁兵為十二丁兵率歲一月役夏四月丙子朔日有蝕之庚寅以少傅吳公尉綱為大司空丁酉白蘭遣使獻犀甲鐵鎧五月丙午封孝閔皇帝子康為紀國公皇子贇為魯國公晉公護獲玉斗以獻六月乙酉遣御正殷不害使於陳秋七月戊申以旱故詔所在降死罪以下囚更鑄錢文曰布泉以一當五與五銖並行九月甲辰南寧州使獻滇馬及蜀鎧冬十月甲戌朔日有蝕之十一月乙巳陳人來聘丁巳狩於岐陽是月齊孝昭帝殂十二月車駕至自岐陽是歲突厥吐谷渾髙昌宕昌龜兹等國並遣使朝貢二年春正月壬寅初於蒲州開河渠同州開龍首渠以廣溉灌丁未以陳主弟頊為柱國送還江南閏月己亥大司馬涼公賀蘭祥薨二月癸丑以久不雨宥罪人京城三十里內禁酒梁主蕭察薨夏四月甲辰以旱故禁屠宰癸亥詔曰諸柱國等勳德隆重宜有優崇各凖别制邑戶聼寄食他縣五月庚午以南山衆瑞並集免今年役及租賦之半壬辰以柱國隋公楊忠為大司空六月己亥以柱國蜀公尉遲迥為大司馬分山南荆州安州襄州江陵為四總管秋九月戊辰朔日有蝕之陳人來聘冬十月辛亥帝御大武殿大射戊午講武於少陵原十一月丁卯以大將軍衛公直趙公招並為柱國三年春正月辛未改光遷國為遷州乙酉太保梁公侯莫陳崇賜死二月庚子初頒新律辛酉詔自今舉大事行大政非軍機急速皆依月令以順天心三月乙丑朔日有蝕之丙子宕昌國獻生猛虎二詔放之南山夏四月乙未以柱國鄭公逹奚武為太保大將軍韓果為柱國己亥帝御正武殿録囚徒癸卯大雩癸丑有牛足生於背戊午幸太學以太傅燕公于謹為三老而問道焉初禁天下報讎犯者以殺人論壬戌詔百官及庶人上封事極言得失五月甲午朔以旱故避正寢不受朝甲戌雨秋七月戊辰行幸原州庚午陳人來聘丁丑幸津門問百年賜以金帛又賜髙年板職名有差降死罪囚一等八月丁未改作露寢九月甲子自原州登隴山丙戌幸同州戊子詔柱國楊忠率騎一萬與突厥伐齊己丑初令世襲州郡縣者悉改為五等爵州封伯郡封子縣封男冬十月庚戌陳人來聘十二月辛卯車駕至自同州遣太保逹奚武率騎三萬出平陽以應楊忠是月有人生子男而隂在背後如尾兩足指如虎爪有犬生子腰以後分為二身兩尾六足四年春正月庚申楊忠破齊長城至晉陽而還二月庚寅朔日有蝕之三月庚辰初令百官執笏夏四月癸卯以柱國鄧公竇熾為大宗伯五月壬戌封明帝長子賢為畢公癸酉以大將軍安武公李穆為柱國丁亥改禮部為司宗大司禮為禮部大司樂為樂部六月庚寅改御伯為納言秋七月焉耆國遣使獻名馬八月丁亥朔日有蝕之詔柱國楊忠帥師與突厥東伐至北河而還戊子以柱國齊公憲為雍州牧以許公宇文貴為大司徒九月丁巳以柱國衛公直為大司空陳人來聘是月以皇世母閻氏自齊至大赦閏月己亥以大將軍韋孝寬長孫儉並為柱國冬十月癸亥以大將軍陸通宇文盛蔡公廣並為柱國甲子詔大冢宰晉公護伐齊齋於太廟庭授以斧鉞於是護總大軍出潼關大將軍權景宣帥山南諸軍出豫州少師楊􅋆出軹關丁卯帝幸沙苑勞師癸酉還宮十一月甲午柱國尉遲迥圍洛陽柱國齊公憲營芒山晉公護次陜州十二月丙辰齊豫州刺史王士良以州降壬戌齊師度河晨至洛陽諸軍驚散尉遲迥帥麾下數十騎扞敵得却至夜引還柱國王雄力戰死之遂班師楊檦於軹關戰沒權景宣亦棄豫州而還是嵗突厥栗特等國並遣使朝貢五年春正月甲申朔以柱國王雄死王事故廢朝乙巳以雄世子謙為柱國二月辛丑詔陳公純等逆皇后于突厥丙寅以柱國李穆為大司空綏德公陸通為大司寇壬申行幸岐州戊子柱國豆盧寧薨夏四月齊武成帝禪位於其太子緯自稱太上皇帝五月己亥左右武伯各置中大夫一人六月庚申彗星出三台入文昌犯上將經紫宮入苑漸長丈餘百餘日乃滅辛未詔江陵人年六十已上為官奴婢者已令放免其公私奴婢年七十以外者所在官司宜贖為庶人秋七月辛巳朔日有蝕之庚寅行幸秦州降死罪已下刑辛丑遣大使巡察天下八月丙子車駕至自秦州冬十月辛亥改函谷關城為通洛防十一月丁未陳人來聘是歲吐谷渾遣使朝貢天和元年春正月己卯朔日有蝕之辛巳考露寢命群臣賦古詩京邑耆老亦會焉頒賜各有差癸未大赦改元百官普加四級己亥親耕籍田丁未於宕昌國置宕州遣小載師杜果使於陳二月戊辰詔三公已下各舉所知庚午日鬬光遂微日中見烏三月丙午祀南郊夏四月辛亥雩是月陳文帝殂五月庚辰帝御正武殿集羣臣親講禮記吐谷渾龍涸王莫昌率尸內附以其地為扶州甲午詔自今甲子乙卯日依古禮停樂六月庚午以大將軍辛威為柱國秋七月戊寅築武功郿斜谷武都留谷津坑諸城以置軍人壬午詔諸胄子入學但束修於師不勞釋奠釋奠者學成之祭自今即為恆式八月己未詔諸有三年之喪或負土成墳或寢苫骨立一志一行可稱揚者本部官司隨事上言當加弔勉以勵薄俗九月乙亥信州蠻反詔開府陸騰討平之冬十月甲子初造山雲儛以備六代樂十一月丙戌行幸武功等城十二月庚申還宫二年春正月癸酉朔日有蝕之己亥親耕籍田三月癸酉改武遊園為道會苑丁亥初立郊丘壇壝制度夏四月乙巳省併東南諸州以大將軍陳公純為柱國六月辛亥尊所生叱奴氏為皇太后閏月庚午地震戊寅陳湘州刺史華皎帥衆來附壬辰以大將軍譙公儉為柱國秋七月辛丑梁州上言鳯凰集楓樹羣鳥列侍以萬數甲辰立露門學置生員七十二人壬子以太傅燕公于謹為雍州牧九月衛公直等與陳將淳于量吳明徹戰于沌口王師敗績元定以步騎數千先度遂沒江南冬十一月戊戌朔日有蝕之癸丑太保許國公宇文貴薨是歲突厥吐谷渾安息等國並遣使朝貢三年春正月辛丑祀南郊三月癸卯皇后阿史那氏至自突厥甲辰大赦丁未大會百僚及賔客於露寢戊午太傅燕公于謹薨夏四月辛巳以太保逹奚武為太尉大司馬尉遲迥為太保柱國齊公憲為大司馬五月庚戌享太廟六月甲戌有星孛於東井秋七月壬寅柱國隋公楊忠薨八月乙丑韓公元羅薨齊人來聘請和親詔軍司馬陸逞報聘癸酉帝御大德殿集百僚及沙門道士等親講禮記冬十月癸亥享太廟丁亥上親帥六軍講武於城南京邑觀者輿馬彌漫數十里諸蕃使咸在焉十一月壬辰朔日有蝕之壬子遣開府崔彥穆使於齊甲寅陳安成王頊廢其主伯宗而自立辛未齊武成帝殂四年春正月辛卯朔以齊武成殂故廢朝遣司會李綸等會葬於齊二月戊辰帝御大德殿集百僚道士沙門等討論釋老夏四月己巳齊人來聘五月己丑帝製象經成集百僚講説封魏廣平公子元謙為韓國公以紹魏後丁巳柱國吳公尉綱薨六月築原州及涇州東城秋七月突厥遣使獻馬柱國昌寧公長孫儉薨五年春三月甲辰初令宿衛官住關外者將家纍入京不樂者解宿衛夏四月甲寅以柱國宇文盛為大宗伯省帥都督官丙寅遣大使巡察天下六月丙子以皇女生故降宥罪人并免逋租懸調冬十月辛巳朔日有蝕之丁酉太傅鄭公逹奚武薨十一月丁卯柱國豳公廣薨十二月癸巳大將軍鄭恪帥師平越嶲置西寧州是月齊將斛律光侵邉於汾北築城自華谷至龍門六年春正月己酉朔以露門未成故廢朝丁卯以大將軍王傑談公會鴈門公田𢎞魏公李暉等並為柱國三月己酉齊公憲自龍門度河斛律光退保華谷憲攻拔其新築五城夏四月戊寅朔日有蝕之辛卯信州蠻反遣大將軍趙誾帥師討平之庚子以大將軍司馬消難侯莫陳瓊大安公閻慶神武公竇毅南陽公叱羅協平髙公侯伏侯龍恩並為柱國五月癸亥遣納言鄭諍使於陳丙寅以大將軍李虎中山公訓把公亮上庸公陸騰安義公宇文邱北平公寇紹許公宇文善犍為公高琳鄭公逹奚震隴東公楊纂常山公于翼並為柱國六月乙未以大將軍太原公王秉為柱國是月齊將段孝先攻陷汾州秋七月乙丑以大將軍越公盛為柱國八月癸酉省掖庭四夷樂後宫羅綺工五百餘人冬十月壬午冀公通薨乙未遣右武伯谷會琨使於齊壬寅上親帥六軍講武於城南十一月壬子以大將軍梁公侯莫陳芮大將軍李意並為柱國丙辰齊人來聘丁巳行幸散關十二月己丑還宮是冬牛疫者十六七建德元年春正月戊午帝幸元都觀親御法座講説公卿道俗論難事畢還宮降死罪及流罪一等其五歲刑已下並宥之二月癸酉遣大將軍昌城公深使於突厥司宗李際使於齊乙酉柱國安義公宇文邱薨三月癸卯朔日有蝕之齊人來聘丙辰誅大冡宰晉公護及其子柱國談公會并柱國侯伏侯龍恩及其弟大將軍萬壽大將軍劉勇等大赦改元罷中外府癸亥以太傅尉遲迥為太師柱國竇熾為太傅大司空李穆為太保齊公憲為大冡宰衛公直為大司徒趙公招為大司空柱國辛威為大司寇綏德公陸通為大司馬詔曰人勞不止則星動於天作事不時則石言於國頃興造無度徴發不已加以頻歲師旅農畝廢業去秋災蝗年穀不登自今正調以外無妄徵發夏四月甲戌以代公達滕公逌並為柱國己卯詔公卿已下各舉所知遣工部代公逹使於齊丙戌詔百官軍人上封事極言得失丁亥詔斷四方非常貢獻庚寅追尊略陽公為孝閔皇帝癸巳立魯公贇為皇太子大赦百官各加封級五月壬戌以大旱集百官於庭詔之曰亢陽不雨豈朕德薄刑賞乖中歟將公卿大臣或非其人歟宜盡直言無有所隱公卿各引咎自責其夜澍雨六月庚子改置宿衛官員秋七月辛丑陳人來聘九月庚子朔日有蝕之庚申扶風掘地得玉杯以獻冬十月庚午詔江陵所獲俘虜充官口者悉免為百姓辛未遣小匠師楊協使於陳大司馬綏德公陸通薨十一月丙午上親御六軍講武于城南庚戌行幸羌橋集京城東諸軍都督以上頒賜各有差乙卯還宮壬戌以大司空趙公招為大司馬十二月壬申行幸斜谷集京城以西諸軍都督以上頒賜有差丙戌還宮己丑帝御正武殿親録囚徒至夜而罷庚寅幸道會苑以上善殿壯麗遂焚之二年春正月辛丑祀南郊乙巳以柱國田𢎞為大司空大將軍若干鳯為柱國庚戌復置帥都督官乙卯享太廟閏月己巳陳人來聘二月甲寅詔皇太子贇巡撫西土壬戌遣司會侯莫陳凱使於齊省雍州內八部併入京兆馮翊扶風咸陽等郡三月己卯皇太子於岐州獲白鹿二以獻詔答曰在德不在瑞癸巳省六府諸司中大夫以下官府置四司以下大夫為官之長上士二之夏四月己亥享太廟丙辰增改東宮官員五月丁丑以柱國侯莫陳瓊為大宗伯榮陽公司馬消難為大司寇上庸公陸騰為大司空六月庚子省六府員外諸官皆為丞壬子皇孫衍生文武官普加一級大階大選諸軍將帥丙辰帝御露寢集諸軍將朂以戎事庚申詔諸軍旗旌皆畫以猛虎鷙鳥之象秋七月己巳享太廟自春末不雨至於是月壬申集百僚於大德殿帝責躬罪已問以時政得失戊子雨八月丙午改三夫人為三妃關中大蝗九月乙丑陳人來聘戊寅詔曰頃者婚嫁競為奢靡有司宜加宣勑使遵禮制冬十月癸卯齊人來聘甲辰奏六代樂成帝御崇信殿集百官觀之十一月辛巳帝親帥六軍講武於城東癸未集諸軍都督以上五十人於道會苑大射帝親臨射堂大備軍容十二月癸巳集羣官及沙門道士等帝升高座辨釋三教先後以儒教為先道教次之佛教為後以大將軍赫連逹為柱國詔軍民之間年多耆壽可頒授老職使榮沾邑里戊午聼訟於正武殿自旦及夜繼之以燭三年春正月壬戌朝羣臣於露門册柱國齊公憲衛公直趙公招譙公儉陳公純越公盛代公逹滕公逌並進爵為王己巳享太廟庚午突厥遣使獻馬癸酉詔自今男年十五女年十三以上爰及鰥寡所在以時嫁娶務從節儉乙亥親耕籍田丙子初服短衣享二十四軍督將以下試以軍旅之法縱酒盡歡詔以往歲年榖不登令公私道俗凡有貯積粟麥者皆凖口聼留已外盡糶二月壬辰朔日有蝕之丁酉紀公康畢公賢酆公貞宋公實漢公贊秦公贄曹公允並進爵為王丙午令六府各舉賢良清正之士癸丑柱國許公宇文善有罪免丙辰大赦三月癸酉皇太后叱奴氏崩帝居倚廬朝夕共一溢米羣臣表請纍旬乃止詔皇太子贇總庶政夏四月乙卯齊人來弔賵會葬丁巳有星孛於東井五月庚申葬文宣后於永固陵帝袒跣至陵所辛酉詔曰齊斬之情經籍彜訓近代沿革遂亡斯禮伏奉遺令既葬便除攀慕几筵情實未忍三年之喪逹於天子古今無易之道王者之所常行但時有未諧不得全制軍國務重庶有聼朝衰麻之節苫廬之禮率遵前典以申罔極百僚以下宜遵遺令公卿上表固請俯就權制過葬即吉帝不許引古誼答之羣臣乃止於是遂申三年之制五服之內亦令依禮初置太子諫議員四人文學十人皇子皇弟友員各二人學士六人戊辰詔故晉公護及諸子並追復先封改葬加諡丙子初斷佛道二教經像悉毁罷沙門道士並令還俗并禁諸淫祀非祀典所載者盡除之六月丁未集諸軍將教以戰陳之法壬子更鑄五行大布錢以一當十與布泉錢並行戊午詔立通道觀凡金科玉篆祕賾元文並令𢎞闡秋七月庚申行幸雲陽宮乙酉衛王直在京反欲突入肅章門司武尉遲運等拒守直敗遁走戊子車駕至自雲陽宮八月辛卯禽直於荆州免為庶人冬十月丙申詔御正楊尚希使於陳庚子詔蒲州人遭飢乏絶者令向郿城以西及荆州管內就食甲寅行幸蒲州乙卯曲赦蒲州見囚大辟以下丙辰行幸同州十一月戊午于闐遣使獻名馬己巳大閲於同州城東甲戌車駕至自同州十二月戊子大會衛官及軍人以上賜錢帛各有差丙申改諸軍軍人並名侍官癸卯集諸軍講武於臨臯澤涼州比年地震壞城郭地裂涌泉出四月春正月戊辰初置營軍器監壬申布寬大之詔多所蠲免二月丙戌朔日有蝕之辛卯改置宿衛官員己酉柱國廣德公李意有罪免三月丙辰遣小司寇元衛使於齊郡縣各省主簿一人甲戌以柱國趙王招為雍州牧夏四月甲午柱國燕公于實有罪免丁酉初令上書者並為表於皇太子以下稱啓秋七月己未禁五行大布錢不得出入關布泉錢聼入而不聼出甲戌陳人來聘丙子召大將軍以上於大德殿帝親諭以伐齊之旨言往以政出權宰無所措懷自親覽萬機便圗東討惡衣菲食繕甲練兵數年以來戰備稍足而偽主昏虐恣行無道伐暴除亂斯實其時羣臣咸稱善丁丑下詔暴齊氏過惡以柱國陳王純為前一軍總管榮陽公司馬消難為前二軍總管鄭公逹奚震為前三軍總管越王盛為後一軍總管周昌公侯莫陳瓊為後二軍總管趙王招為後三軍總管齊王憲帥衆二萬趣黎陽隋公楊堅廣寧公侯莫陳迥帥舟師三萬自渭入河柱國梁公侯莫陳芮帥衆一萬守太行道申國公李穆帥衆三萬守河陽道常山公于翼帥衆二萬出陳汝壬午上親帥六軍衆六萬直指河隂八月癸卯入齊境禁伐樹殘苗稼犯者以軍法從事丁未上親帥諸軍攻拔河隂大城攻子城末尅上有疾九月辛酉夜班師水軍焚舟而退齊王憲于翼李穆等所在尅捷降拔三十餘城皆棄而不守唯以王藥城要害令儀同三司韓正守之正尋以城降齊戊寅至自東伐冬十月戊子初置上柱國上大將軍官改開府儀同三司為開府儀同大將軍又置上開府上儀同官閠月以柱國齊王憲蜀公尉遲迥為上柱國詔諸畿郡各舉賢良十一月己亥改置司內官員十二月辛亥朔日有蝕之丙子陳人來聘是嵗岐寧二州人飢開倉振恤五年春正月辛卯行幸河東涑川集關河東諸軍校獵甲午還同州丁酉詔分遣大使周省四方察訟聽謡問民恤隱廢布泉錢戊申初令鑄錢者至絞從者逺配二月辛酉遣皇太子贇巡撫西土仍討吐谷渾三月壬寅車駕至自同州文宣皇太后服再期戊申祥夏六月戊申朔日有蝕之辛亥享太廟丙辰利州總管紀王康有罪賜死秋七月乙未京師旱八月戊申皇太子入吐谷渾至伏俟城而還乙丑陳人來聘九月丁丑大醮於正武殿以祈東伐冬十月帝復諭羣臣伐齊以去歲屬有疹疾遂不得尅平逋寇于時出軍河外直為撫背未扼其喉然晉州本髙歡所起統攝要重今往攻之彼必來援嚴軍以待擊之必尅然後乘破竹之勢鼓行而東足以窮其窟穴諸將多不願行帝曰機者事之微不可失矣沮軍事者以軍法裁之己酉帝總戎東伐以越王盛為右一軍總管把公亮為右二軍總管隋公楊堅為右三軍總管譙王儉為左一軍總管大將軍竇泰為左二軍總管廣化公邱崇為左三軍總管齊王憲陳王純為前軍癸亥帝至晉州遣齊王憲帥精騎二萬守雀鼠谷陳王純步騎二萬守千里徑鄭公達奚震步騎一萬守統軍川大將軍韓明步兵五千守齊子嶺烏氏公尹升步兵五千守鼓鍾鎮涼城公辛韶步騎五千守蒲津關柱國趙王招步騎一萬自華谷攻汾州諸城柱國宇文盛步兵一萬守汾水關遣內史王誼監六軍攻晉州城帝屯於汾曲齊王憲攻洪洞永安二城並拔之是夜虹見於晉州城上首向南尾入紫宮帝每日自汾曲赴城下親督戰庚午齊行臺左丞侯子欽出降壬申齊晉州刺史崔嵩夜密使送欵上開府王軌應之未明登城遂尅晉州甲戌以上開府梁士彥為晉州刺史以鎮之十一月己卯齊主自并州帥衆來援帝以其兵新集且避之乃詔諸軍班師齊主遂圍晉州齊王憲屯諸軍於洓水為晉州聲援河東地震癸巳至自東伐獻俘于太廟丙申放齊諸城鎮降民還丁酉帝發京師壬寅度河與諸軍合十二月戊申次晉州庚戌帝帥諸軍八萬置陳東西二十餘里乘常御馬從數人巡陳所至輒呼主帥姓名以慰勉之將士感見知之恩各思自厲將戰有司請換馬帝曰朕獨乘良馬何所之齊主亦於塹北列陳申後齊人填塹南引帝大喜勒諸軍擊之齊人便退齊主與其麾下數十騎走還并州齊衆大潰軍資甲仗數百里間委棄山積辛亥帝幸晉州仍率諸軍追齊主諸將固請還師帝曰縱敵患生卿等若疑朕將獨往諸將不敢言甲寅齊主遣其丞相髙阿那肱守髙壁帝麾軍直進那肱望風退散丙辰師次介休齊將韓建業舉城降以為上柱國封郇國公丁巳大軍次并州齊主留其從兄安德王延宗守并州自將輕騎走鄴是日詔齊王公以下示以逆順之道於是齊將帥降者相繼戊午髙延宗僣即偽位改年曰德昌己卯軍次并州帝帥諸軍合戰齊人退帝逐北入城東門諸軍繞城置陳至夜延宗帥其衆排車而前城中軍却人相蹂踐大為延宗所敗齊人欲閉門以閫下積尸扉不得闔帝從數騎﨑嶇危險僅得出門至明帥諸軍更戰大破之禽延宗并州平壬戌詔大赦天下其髙緯及王公以下若釋然歸順咸許自新諸亡入偽朝亦從寬宥官資次序依例無失齊制偽令即宜削除鄒魯搢紳幽并騎士一介可稱並宜銓録丙寅出齊宮中金銀寶器珠玉麗服及宮女二千人班賜將士以柱國趙王招陳王純越王盛杞公亮梁公侯莫陳芮庸公王謙北平公寇紹鄭公逹奚震並為上柱國封齊王憲子安城郡公質為河間王諸有功者封授各有差癸酉帝帥六軍趣鄴六年春正月乙亥齊主傳位於其太子恆改年曰承光自號太上皇壬辰帝至鄴癸巳帥諸軍圍之齊人拒守諸軍奮擊大破之遂平齊齊主先送其母及妻子於青州及城陷帥數十騎走青州遣大將軍尉遲勤追之是戰也於陳獲其齊昌王莫多婁敬顯帝數之曰汝有死罪三前從并州走鄴棄母㩦妻妾是不孝外為偽主戮力內實通啓於朕是不忠送欵之後猶持兩端是不信如此用懷不死何待遂斬之是日西方有聲如雷甲子帝入鄴城詔去年大赦班宣未及之處皆從赦例己亥詔曰晉州大陳至鄴身殞戰場者其子即授父本官尉遲勤禽齊主及其太子恆於青州庚子詔曰偽齊之末姦佞擅權濫罰淫刑動挂羅網偽右丞相咸陽王故斛律明月偽侍中特進開府故崔季舒等七人或功高獲罪或直言見誅朕兵以義動翦除凶暴表閭封墓事切下車宜追贈諡并加窆厝其見在子孫各隨蔭敘録家口田宅沒官者並還之辛丑詔偽齊東山南園及三臺並毁撤瓦木諸物凡入用者盡賜百姓山園之田各還本主二月丙午論定諸軍勳置酒於齊太極殿會軍士以上班賜有差丁未齊主至帝降自阼階見以賔主禮齊任城王湝在冀州擁兵未下遣上柱國齊王憲與柱國隋公楊堅討平之齊范陽王高紹義叛入突厥齊諸行臺州鎮悉降關東平合州五十五郡一百六十二縣三百八十五户三十萬二千五百二十八口二千萬六千八百八十六乃於河陽及幽青南兖豫徐北朔定州置總管府相并二總管各置宫及六府官癸丑詔自偽武平三年以來河南諸州人偽齊破掠為奴婢者不問公私並放免之其住在淮南者亦即聼還願住淮北者可隨便安置癃疾孤老不能自存者所在矜恤乙卯車駕發自鄴三月壬午詔山東諸州各舉士夏四月乙巳至自東伐列齊主於前其王公等並從車輿旌旗及器物以次陳於其後大駕布六軍備凱樂獻俘於太廟京邑觀者皆稱萬歲戊申封齊主為溫國公庚戌大會羣臣及諸蕃客於露寢乙卯廢蒲陜涇寧四州總管己巳享太廟詔分遣使人巡方撫慰觀風省俗五月丁丑以柱國譙王儉為大冡宰庚辰以上柱國把公亮為大司徒鄭公逹奚震為大宗伯梁公侯莫陳芮為大司馬柱國應公獨孤永業為大司寇鄖公韋孝寬為大司空辛巳大醮於正武殿以報功己丑祀方丘詔曰往者冡臣專任制度有違正殿别寢事窮壯麗非直雕牆峻宇深戒前王而締構𢎞敞有踰清廟不軌不物何以示後兼東夏初平人未見德率先海內宜自朕始其露寢會義崇信含仁雲和思齊諸殿等農隟之時悉可毁撤雕斫之物並賜貧民繕造之物務從卑朴戊戌詔曰京師宮殿已從撤毁并鄴二所華侈過度誠復作之非我豈容因而弗革諸堂殿壯麗並宜除蕩甍宇雜物分賜窮人三農之隟别漸營構止蔽風雨務在卑狹庚子陳人來聘是月青城門無故自崩六月辛亥御正武殿録囚徒甲子東巡丁卯詔曰自今不得娶母同姓以為妻妾秋七月丙戌行幸洛州己丑詔山東諸州舉有才望者赴行在所共論政事得失八月壬寅議權衡度量頒於天下其不依新式者悉追停之詔曰以刑止刑以輕代重罪不及嗣皆有定科雜役之徒獨異常憲一從罪配百代不免罰既無窮刑何以措凡諸雜戶悉放為百姓配雜之科因之永削甲子鄭州獻九尾狐皮肉銷盡骨體猶具帝曰瑞應之來必昭有德若使五品時序四海和平家識孝慈乃能致此今無其時恐非實録乃令焚之九月壬申以柱國鄧公竇熾申公李穆為上柱國戊寅初令庶人以上非朝祭之服唯得衣綢綿綢絲布圎綾紗絹綃葛布等九種壬辰詔東土諸州儒生明一經以上並舉送州郡以禮發遣冬十月戊申行幸鄴宮戊午改葬德皇帝於冀州帝服緦哭於太極殿百官素服哭是月誅溫公高緯十一月壬申封皇子充為道王兌為蔡王癸酉陳將吳明徹侵呂梁徐州總管梁士彥與戰不利退守徐州遣上大將軍郯公王軌討之是月稽胡反遣齊王憲討平之詔自永熙三年七月以來十月以前東土人被鈔在化內為奴婢者及平江陵日良人沒為奴婢者並免同人伍詔曰正位於中有聖通典質文相革損益不同五帝則四星之象三王制六宮之數劉曹已降等列彌繁選擇遍於生靈命秩方於庶職椒房丹地有衆如雲本由嗜欲之情非關風化之義朕運當澆季思復古始𢎞贊後庭事從簡約可置妃二人世婦三人御妻三人自兹以外宜悉減省己亥晦日有蝕之初行刑書要制持杖羣強盜一匹以上不持杖羣強盜五匹以上監臨主掌自盜二十匹以上小盜及詐請官物三十匹以上正長隱五戶及十丁以上隱地三頃以上皆至死刑書所不載者自依律科十二月北營州刺史髙寶寧據州反庚申行幸并州宮移并州軍人四萬戶於關中戊辰廢并州宮及六府是歲吐谷渾百濟並遣使朝貢宣政元年春正月癸酉吐谷渾偽趙王他婁屯來降壬午行幸鄴宮辛卯幸懷州癸巳幸洛州詔於懷州置宮二月甲辰柱國大冡宰譙王儉薨丁巳車駕至自東巡乙丑以上柱國越王盛為大冡宰陳王純為雍州牧三月戊辰於蒲州置宮廢同州及長春二宮壬申突厥遣使朝貢甲戌初服常冠以皂紗為之加簮而不施纓𨗳其制若今之折角巾也上大將軍王軌破陳師於吕梁禽其將吳明徹等俘斬三萬餘人丁亥詔柱國豆盧寧征江南武陵南平等郡所有士庶為人奴婢者悉依江陵放免壬辰改元夏四月壬子初令遭父母喪者聼終制庚申突厥入寇幽州五月己丑帝總戎北伐遣柱國原公姬願東平公宇文神舉等五道俱入發關中公私馬驢悉從軍癸巳帝不豫止於雲陽宫丙申詔停諸軍六月丁酉帝疾甚還宫其夜崩于乘輿時年三十六遺詔王公以下爰及庶寮輔導太子及喪事資用須使儉而合禮隨吉即葬葬訖公除四方士庶各三日哭妃嬪無子者悉放還家羣臣上尊諡曰武皇帝廟稱髙祖己未葬於孝陵帝沈毅有智謀初以晉公護專權常自晦迹人莫測其深淺及誅護之後始親萬機尅已厲精聼覽不怠用法嚴整多所罪殺號令懇惻唯屬意於政群下畏服莫不肅然性既明察少於恩惠凡布懷立行皆欲踰越古人身衣布袍寢布被無金寶之飾諸宫殿華綺者皆徹毁之改為土階數尺不施櫨栱其雕文刻􅍢錦繡纂組一皆禁斷後宫嬪御不過十餘人勞謙接下自強不息以海內未康鋭情教習至於校兵閲武步行山谷履涉勤苦皆人所不堪平齊之役見軍士有跣行者帝親脫靴以賜之每宴會將士必自執杯勸酒或手付賜物至於征伐之處躬在行陳性又果決能斷大事故能得士卒死力以弱制強破齊之後遂欲窮兵極武平突厥定江南一二年間必使天下一統此其志也武帝保定五年天和六年建德六年宣政元年即位十八年宣皇帝諱贇字乾伯武帝長子也母曰李太后武成元年生於同州保定元年五月丙午封魯國公建德元年四月癸巳武帝親告廟冠於阼階立為皇太子二年詔皇太子巡撫西土文宣后崩武帝諒暗詔太子總朝政五旬而罷武帝每巡幸四方太子常留監國五年二月又詔太子巡西土因討吐谷渾宣政元年六月丁酉武帝崩戊戌太子即皇帝位尊皇后曰皇太后甲子誅上柱國齊王憲閠月乙亥詔山東流人新復業及突厥侵掠家口破亡不能存濟者給復一年立妃楊氏為皇后辛巳以上柱國趙王招為太師陳王純為太傅柱國代王逹滕王逌盧公尉遲運薛公長孫覽並為上柱國是月幽州盧昌期據范陽反詔柱國東平公宇文神舉討平之秋七月乙巳享太廟丙午祀圎丘戊申祀方澤庚戌以小宗伯岐公斛斯徵為大宗伯壬戌以南兖州總管隋公楊堅為上柱國大司馬癸亥尊所生李氏為帝太后八月丙寅夕月於西郊長安萬年二縣人居京城者給復三年壬申幸同州遣大使巡察諸州制九條宣下州郡其母族絶服外者聼婚以上柱國薛公長孫覽為大司徒柱國楊公王誼為大司空丙戌以柱國永昌公椿為大司寇九月丁酉以柱國宇文盛張掖公王傑枹罕公辛威鄖國公韋孝寬並為上柱國庚戌封皇弟元為荆王詔諸應拜者皆以三拜成禮冬十月癸酉至自同州戊子百濟遣使朝貢十一月己亥講武於道會苑帝親擐甲胄是月突厥犯邉圍酒泉殺掠吏士十二月甲子以柱國畢王賢為大司空己丑以上柱國河陽總管滕王逌為行軍元帥伐陳免京師見徒並令從軍大象元年春正月己丑受朝於露門帝服通天冠絳紗袍羣臣皆服漢魏衣冠大赦改元為大成初置四輔官以大冢宰越王盛為大前疑蜀公尉遲迥為大右弼申公李穆為大左輔大司馬隋公楊堅為大後丞癸卯封皇子衍為魯王甲辰東巡丙午以柱國常山公于翼為大司徒辛亥以柱國許公宇文善為大宗伯戊午行幸洛陽立魯王衍為皇太子二月癸亥詔曰河洛之地書稱朝市自魏氏失馭城闕為墟我太祖受命酆鎬有懷光宅髙祖往巡東夏布政此宮朕以眇身祗承寶運雖庶幾聿修之志敢忘燕翼之心一昨駐蹕金墉備嘗遊覽百王制度基址尚存今若因修為功易立宜命邦事修復舊都奢儉取文質之間功役依子來之義北瞻河內咫尺非遙前詔經營今宜停罷於是發山東諸州兵增一月功為四十五日役起洛陽宫常役四萬人以迄晏駕并移相州六府於洛陽稱東京六府殺柱國徐州總管郯公王軌停南討諸軍以趙王招女為千金公主嫁於突厥乙亥行幸鄴丙子初令總管刺史行兵者加持節餘悉罷之辛巳詔傳位於皇太子衍大赦改元大成為大象帝於是自稱天元皇帝所居稱天臺冕二十有四旒車服旗鼓皆以二十四為節內史御正皆置上大夫皇帝衍稱正陽宫置納言御正諸衛等官皆凖天臺尊皇太后為天元皇太后癸未日出將入時其中並有烏色太如雞卵經四日乃滅戊子以大前疑越王盛為太傅大右弼蜀公尉遲迥為大前疑代王逹為大右弼辛卯詔徙鄴城石經於洛陽又詔洛陽凡是元遷戶並聼還洛州此外欲住者聼之河陽幽相豫毫青徐七總管受東京六府處分三月庚申車駕至自東巡大陳軍伍親擐甲胄入自青門皇帝衍備法駕從百官迎於青門外是時驟雨儀衛失容辛酉封趙王招第二子貰為永康縣王夏四月壬戌朔有司奏言日蝕不視事過時不蝕乃臨軒立妃朱氏為天元帝后癸亥以柱國畢王賢為上柱國己巳享太廟壬午大醮於正武殿五月辛亥以洺州襄國郡為趙國齊州濟南郡為陳國豐州武當安富二郡為越國潞州上黨郡為代國荆州新野郡為滕國邑各一萬戶令趙王招陳王純越王盛代王逹滕王逌並之國是月遣使簡視京城及諸州士庶女充選後宫突厥寇并州六月咸陽有池水變為血徵山東諸州人修長城秋七月庚寅以大司空畢王賢為雍州牧大後丞隋公楊堅為大前疑柱國榮陽公司馬消難為大後丞丙申納大後丞司馬消難女為正陽宫皇后己酉尊帝太后李氏為天皇太后壬子改天元帝后朱氏為天皇后立妃元氏為天右皇后妃陳氏為天左皇后八月庚申幸同州壬申還宫甲戌以天左皇后父大將軍陳山提天右皇后父開府元晟並為上柱國初武帝作刑書要制用法嚴重及帝即位恐物情未附除之至是為刑經聖制其法深刻大醮於正武殿告天而行焉壬午以上柱國雍州牧畢王賢為太師上柱國郇公韓建業為大左輔是月所在蟻羣鬪各四五尺死者十八九九月己卯以酆王貞為大冢宰上柱國鄖公韋孝寬為行軍元帥率行軍總管把公亮郕公梁士彥伐陳遣御正杜果使於陳冬十月壬戌幸道會苑大醮以髙祖武皇帝配醮初復佛象及天尊象帝與二象俱南坐大陳雜戲令京城士庶縱觀是月相州人段德舉謀反伏誅十一月乙未夜行幸同州壬寅還宫乙巳初鑄永通萬國錢以一當千與五行大布並行是月韋孝寬拔壽陽杞國公亮拔黃城梁士彥拔廣陵陳人退走於是江北盡平十二月戊午以災異屢見帝御路寢見百官下詔罪已將避正寢減膳徹懸於是舍仗衛往天興宫百官上表勸復寢膳許之甲子還宫御正武殿集百官及宫人內外命婦大列妓樂又縱胡人乞寒用水澆沃以為戲樂乙丑行幸洛陽帝親御驛馬日行三百里四皇后及文武侍衛數百人並乘驛以從令四后方駕齊驅或有先後便加譴責人馬頓仆相屬於道己卯還宫二年春正月丁亥帝受朝于道會苑癸巳享太廟乙巳造二扆畫日月象以置左右戊申雨雪雪上又雨細黃土移時乃息乙卯詔江右諸州新附人給復二十年初稅入市者人一錢二月丁巳帝幸露門學行釋奠禮戊午突厥遣使獻方物且逆千金公主乙丑改制詔為天制勑為天勑尊天元皇太后為天元上皇太后天皇太后李氏曰天元聖皇太后癸未立天元皇后楊氏為天元太皇后天皇后朱氏為天大皇后天右皇后元氏為天右太皇后天左皇后陳氏為天左太皇后正陽宫皇后直稱皇后是月洛陽有秃鶖鳥集新太極殿前榮州有黑龍見與赤龍鬭於汴水側黑龍死三月丁亥賜百官及百姓大酺詔進封孔子為鄒國公邑數凖舊并立後承襲别於京師置廟以時祭享戊子行軍總管把公亮舉兵反行軍元帥韋孝寬獲而殺之辛卯行幸同州增候正前驅式道為三百六十重自應門至赤岸澤數十里間幡旗相蔽鼓樂俱作又令虎賁持鈒馬上稱警蹕以至同州乙未改同州宫為天成宫庚子車駕至自同州詔天臺侍衛皆著五色及紅紫緑衣以雜色緣名曰品色衣有大事與公服間服之壬寅詔內外命婦皆執笏其拜宗廟及天臺皆俯伏甲辰初置天中大皇后立天左大皇后陳氏為天中大皇后立妃尉遲氏為天左大皇后夏四月己巳享太廟己卯以旱故降見囚死罪以下壬午幸中山祈雨至咸陽宫雨降甲申還宫令京城士女於衢巷作音樂以迎候五月甲午帝備法駕幸天興宫乙未帝不豫還宫詔揚州總管隋公楊堅入侍疾丁未追趙越陳代滕五王入朝己酉大漸御正下大夫劉昉與內史上大夫鄭譯矯制以隋公楊堅受遺輔政是日帝崩於天德殿時年二十二諡宣皇帝七月丙申葬定陵帝之在東宫也武帝慮其不堪承嗣遇之甚嚴朝見進止與諸臣無異雖隆寒盛暑亦不得休息性嗜酒武帝遂禁醪醴不許至東宮帝每有過輒加捶撲嘗謂之曰古來太子被廢者幾人餘兒豈不堪立邪於是遣東宫官屬録帝言語動作每月奏聞帝懼威嚴矯情修飾以是惡不外聞嗣位之初方逞其欲大行在殯曽無戚容即通亂先帝宫人才踰年便恣聲樂采擇天下子女以充後宫好自矜夸飾非拒諌禪位之後彌復驕奢耽酗於後宫或旬日不出公卿近臣請事者皆附閹官奏之所居宫殿帷帳皆飾以金玉珠寶光華炫耀極麗窮奢及營洛陽宫雖未成畢其規摹壯麗踰於漢魏逺矣唯自尊崇無所顧憚國典朝儀率情變改後宫位號莫能詳録每對臣下自稱為天以五色土塗所御天德殿各隨方色又於後宫與皇后等列坐用宗廟禮器樽彛圭瓉之屬以次食焉又令羣臣朝天臺者致齋三日清身一日車旗章服倍於前王之數既自比上帝不欲令人同已常自帶綬及冠通天冠加金附蟬顧見侍臣武辨上有金蟬及王公有綬者並令去之又不聼人有髙者大者之稱諸姓髙者改為薑九族稱髙祖者為長祖曽為次長祖官稱名位凡謂上及大者改為長有天者亦改之又令天下車皆渾成為輪禁天下婦人皆不得施粉黛唯宫人得乘有輻車加粉黛焉西陽公溫把公亮之子即帝從祖兄其妻尉遲氏有容色因入朝帝遂飲以酒逼而媱之亮聞之懼謀反才誅溫即追尉遲氏入宫初為妃尋立為皇后每左右侍臣論議唯欲興造革易未嘗言及政事其後遊戲無常出入不節羽儀仗衛晨出夜還或幸天興宫或遊道會苑陪侍之官皆不堪命散樂雜戲魚龍爛漫之伎常在目前好令京城少年為婦人服飾入殿歌舞與後宫觀之以為喜樂擯斥近臣多所猜怨又吝於財略無賜與恐羣臣規諫不得行已之志常遣左右密伺察之動止所為莫不抄録小有乖違輒加其罪自公卿以下皆被楚撻其間誅戮黜免者不可勝言每捶人皆以百二十為度名曰天杖宫人內職亦如之后妃嬪御雖被寵嬖亦多被杖背於是內外恐懼民不自安皆求茍免莫有固志重足纍息以逮於終矣宣帝大象二年即大成元年改大象靜皇帝諱衍後改名闡宣帝之長子也母曰朱皇后建德二年六月生于東宫大象元年正月癸卯封魯王戊午立為皇太子二月辛巳宣帝於鄴宫傳位授帝居正陽宫二年五月乙未宣帝寢疾詔帝入宿露門學己酉宣帝崩帝入居天臺廢正陽宫大赦停洛陽宫作庚戌上天元上皇太后尊號為太皇太后天元聖皇太后李氏為大帝太后天元大皇后為皇太后天大皇后朱氏為帝太后其天中大皇后陳氏天右大皇后元氏天左大皇后尉遲氏並出俗為尼以柱國漢王贊為上柱國右大丞相上柱國揚州總管隋公楊堅為假黃鉞左大丞相柱國秦王贄為上柱國帝居諒暗百官總已以聽於左大丞相壬子以上柱國鄖公韋孝寬為相州總管罷入市稅錢六月戊午以柱國許公宇文善神武公竇毅修武公候莫陳瓊大安公閻慶並為上柱國趙王招陳王純越王盛代王逹滕王逌來朝庚申復佛道二教辛酉以柱國把公贊燕公于實郜公賀拔伏恩並為上柱國甲子相州總管尉遲迥舉兵不受代詔發關中兵即以韋孝寬為行軍元帥討之柱國畢王賢以謀執政被誅以上柱國秦王贄為大冡宰把公椿為大司徒己巳詔南定北光衡巴四州人為宇文亮抑為奴婢者並免之甲戌有赤氣起西方漸東行遍天庚辰罷諸魚池及山澤公禁者與百姓共之以柱國蔣公梁睿為益州總管秋七月甲申突厥送齊范陽王高紹義庚寅申州刺史李惠起兵庚子詔趙陳越代滕五王入朝不趨劔履上殿榮州刺史邵公宇文胄舉兵遣大將軍楊素討之青州總管尉遲綱舉兵丁未隋公楊堅都督內外諸軍事己酉鄖州總管司馬消難舉兵以柱國楊公王誼為行軍元帥討之壬子趙王招越王盛以謀執政被誅癸丑封皇弟衎為萊王術為郢王是月豫州襄州諸蠻各帥種落反八月庚申益州總管王謙舉兵不受代即以梁睿為行軍元帥討之庚午韋孝寬破尉遲迥於鄴迥自殺相州平移相州於安陽其鄴城及邑毁廢之丙子以漢王贊為太師以上柱國并州總管申公李穆為太傅以宋王實為大前疑以秦王贄為大右弼以燕公于實為大左輔己卯以尉遲迥平大赦庚辰司馬消難擁衆以魯山甑山二鎮奔陳遣大將軍元景山追擊之鄖州平沙州氐帥開府楊永安聚衆反應王謙遣大將軍逹奚儒討之楊素破宇文胄於榮陽斬之以上柱國神武公竇毅為大司馬以齊公于智為大司空廢相青荆金晉梁州六總管九月丙戌廢河陽總管為鎮𨽻洛州以小宗伯竟陵公楊慧為大宗伯壬辰廢皇后司馬氏為庶人戊戌以柱國楊公王誼為上柱國庚戌以柱國常山公于翼化政公宇文欣並為上柱國壬子丞相去左右號隋公楊堅為大丞相冬十月甲寅日有蝕之壬戌陳王純以怨執政被誅大丞相隋公楊堅加大冡宰五府總於天官戊寅梁睿破王謙斬之傳首京師益州平十一月甲辰逹奚儒破楊永安沙州平丁未上柱國鄖公韋孝寬薨十二月壬子以柱國蔣公梁睿為上柱國丁巳以柱國𨝍公楊雄普安公賀蘭謨郕公梁士彥上大將軍新寧公叱列長義武鄉公崔𢎞度大將軍中山公宇文恩濮陽公宇文述渭原公和干子任城公王景漁陽公楊鋭上開府廣宗公李崇隴西公李詢並為上柱國庚申以柱國楚公豆盧績為上柱國癸亥詔曰太祖受命龍德猶潛三分天下志扶魏室多所改作冀允上元文武羣官賜姓者衆本殊國邑實乖胙土不歆非類異骨肉而共蒸嘗不愛其親嗟行路而敘昭穆且神徵革姓本為歷數有歸天命在人推讓終而弗獲故君臨區宇纍世於兹可不仍遵謙挹之旨久行權宜之制諸改姓者悉宜復舊甲子大丞相隋公楊堅進爵為王以郡為隋國己巳以柱國沛公鄭譯為上柱國辛未代王達滕王逌並以謀執政被誅壬申以大將軍長寧公楊勇為上柱國大司馬以小冡宰始平公元孝矩為大司寇大定元年春正月壬午改元丙戌詔戎秩上開府以上職事下大夫以上外官刺史以上各舉賢良二月甲子帝遜位于隋居于别宫隋氏奉帝為介國公邑萬戶車服禮樂一如周制上書不稱表答表不稱詔有其文事竟不行隋開皇元年五月壬申帝崩時年九歲隋志也諡曰靜皇帝葬恭陵靜帝大定元年右後周五主二十五年禪于隋通志卷十七
