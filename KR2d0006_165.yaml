body:
  text: 通志卷一百四十二宋右迪功郎鄭樵漁仲撰列傳第五十五梁徐勉何敬容范岫傅昭弟映傅岐江革弟觀德革子藻許懋殷鈞父睿藝宗人陳伯之陳慶之子陳蘭欽賀瑒子革琛弟子司馬褧朱異顧協徐摛鮑泉鮑行卿正行卿弟子王神念楊華僧辨神念子徐嗣徽羊侃子鵾羊鴉仁胡僧祐杜崱父懷寶嶷岸崱兄崱弟幼安徐文盛隂子春王琳張彪徐勉字修仁東海郯人也祖長宗宋武帝霸府參軍父融南昌相勉幼孤貧早勵清節年六歲屬霖雨家人祈霽勉率爾為文見稱耆宿及長好學宗人孝嗣見之歎曰此所謂人中之騏驥必能致千里又嘗謂諸子曰此人師也爾等則而行之年十八召為國子生便下帷專學精力無怠同時儕輩肅而敬之祭酒王儉每見常目送之曰此子非常器也每稱有宰輔之量射䇿甲科起家王國侍郎補太學博士時每有議定勉理證明允莫能貶奪司官咸取則焉遷臨海王西中郎田曹行參軍俄徙署都曹時琅邪王融一時才雋特相慕悅嘗請交焉勉謂所親曰王郎名高望促難可輕􅗓衣裾融後果陷於法以此見推識鑒纍遷領軍長史初與長沙宣武王遊武帝深器賞之及武帝兵至建鄴勉於新林謁見帝甚加恩禮使管書記及帝即位拜中書侍郎進領中書通事舍人直內省遷臨川王後軍咨議尚書左丞自掌樞憲多所糾舉時論以為稱職天監三年除給事黃門侍郎尚書吏部郎參掌大選遷侍中時王師方侵魏候驛填委勉參掌軍書劬勞夙夜動經數旬乃一還家羣犬驚吠勉歎曰吾憂國忘家乃至於此若吾亡後亦是傳中一事六年除給事中五兵尚書遷吏部尚書勉居選曹彛倫有序既間尺牘兼善辭令雖文案填積坐客充滿應對如流手不停筆又該綜百氏皆為避諱嘗與門人夜集客有虞皓求詹事五官勉正色答云今夕止可談風月不宜及公事故時人服其無私天監初官名互有省置勉撰立選簿奏之有詔施用其制開九品為十八班自是貪冒茍進者以財貨取通守道淪退者以貧弱見沒矣遷左衛將軍領太子中庶子侍東宫昭明太子尚幼敕知宫事太子禮之甚重每事詢謀嘗於殿內講孝經臨川王宏尚書令沈約備二傅勉與國子祭酒張充為執經王瑩張稷栁憕王􅌔為侍講時選極親賢妙盡人譽勉陳讓數四又與沈約書求換侍講詔弗許然後就焉舊揚徐首迎主簿盡選國華中正取勉子嵩為南徐選首帝敕之曰卿寒士而子與王志子同迎偃王以來未之有也勉恥以其先為戲答旨不恭由是左遷散騎常侍領遊擊將軍後為太子詹事又遷尚書左僕射詹事如故時民間喪事多不遵禮朝終夕殯相尚以速勉上疏言之宜依古三日大斂詔可其奏又除尚書僕射中衛將軍勉以舊恩繼升重位盡心奉上知無不為爰自小選迄于此職常參掌衡石甚得士心禁省中事未嘗漏泄每有表奏輒焚藁草博通經史多識前載齊世王儉居職以後莫有逮者朝儀國典昏冠吉凶勉皆豫圗議初勉受詔知撰五禮普通六年功畢表上之曰夫禮以安上化民𢎞風訓俗經國家利後嗣者也唐虞三代咸必由之在乎有周憲章尤備因殷革夏損益可知雖復經禮三百曲禮三千經文三百威儀三千其大歸有五即宗伯所掌五禮吉為上凶次之賔次之軍次之嘉為下也故祠祭不以禮則不齊不莊喪紀不以禮則背死忘生者衆賔客不以禮則朝覲失其儀軍旅不以禮則致亂於師律冠昏不以禮則男女失其時為國修身於斯攸急洎周室大壞王道既衰官守斯文日失其序暴秦滅學掃地無餘漢氏鬱興日不暇給猶命叔孫於外野方知帝王之為貴末葉紛綸遞有興毁及東京曹褒南宫制述集其散略百有餘篇雖寫以尺簡而終闕平奏其後兵革相尋異端互起章句既淪爼豆斯輟方領矩步之容事滅於旌鼓蘭臺石室之典用盡於帷蓋至于晉氏爰定新禮荀顗制之於前摯虞刪之於末既而中原喪亂罕有所遺江左草創因循而已釐革之風是則未暇伏惟陛下睿明啓運光天改物撥亂惟武經俗以文作樂在乎功成制禮𢎞於業定伏尋所定五禮起齊永明二年太子步兵校尉伏曼容表求制一代禮樂于時參議置新舊學士十人止修五禮咨稟衛將軍丹陽尹王儉學士分任郡中制作歷年猶未克就及文憲薨遺文散逸又以事付國子祭酒何允經涉九載猶復未畢建武四年允還東山齊明帝敕委尚書令徐孝嗣舊事本末隨在南第永元中孝嗣於此遇禍又多零落當時鳩集所餘權付尚書左丞蔡仲熊驍騎將軍何佟之共掌其事時禮局住在國子學中門外東昏之時頻有軍火其所散失又踰大半天監元年佟之啓審省置之宜敕使外詳時尚書參詳以天地初革庶務權輿宜俟隆平徐議刪撰欲且省禮局併還尚書儀曹詔旨云禮壞樂闕故國異家殊實宜以時修定以為永準於是尚書僕射沈約等參議請五禮各置舊學士一人人各自舉學士二人相助抄撰其中有疑者依前漢石渠後漢白虎隨源以聞請旨斷決乃以舊學士右軍記室參軍明山賔掌吉禮中軍騎兵參軍嚴植之掌凶禮中軍田曹行參軍賀㻛掌賔禮征虜記室參軍陸璉掌軍禮右軍參軍事司馬褧掌嘉禮尚書右丞何佟之總參其事佟之亡後以鎮北咨議參軍伏暅代之又以暅代嚴植之掌凶禮暅尋遷官以五經博士繆昭掌凶禮復以禮儀深廣記載殘缺宜須博論共盡其致更使鎮軍將軍丹陽尹沈約太常卿張允及臣三人同參厥務臣又奉敕總知其事末又使中書侍郎周捨庾於陵復豫參知若有疑義所掌學士當職先立議通咨五禮舊學士及參知各言同異條牒啓聞決之制旨疑事既多歲時又積制旨裁斷其數不少莫不網羅經誥玉振金聲凡諸奏決皆載篇首具列聖旨為不刋之則寧孝宣之能擬豈孝章之足云五禮之職事有繁簡及其列畢不得同時嘉禮儀注以天監六年五月七日上尚書合十有二帙一百一十六卷五百三十六條賔禮儀注以天監六年五月二十日上尚書合十有七帙一百三十三卷五百四十五條軍禮儀注以天監九年十月二十九日上尚書合十有八帙一百八十九卷二百四十條吉禮儀注以天監十一年十一月十日上尚書合二十有六帙二百二十四卷一千五條凶禮儀注以天監十一年十一月十七日上尚書合四十有七帙五百一十四卷五千六百九十三條大凡一百二十帙一千一百七十六卷八千一十九條又列副祕閣及五經典書各一通繕寫校定以普通五年二月始獲完畢竊以撰正履禮歷代罕就皇明在運厥功克成周代三千舉其盈數今之八千隨事附益質文相變故其數兼倍猶如八卦之爻因而重之錯綜成六十四也臣以庸識謬司其任淹留歷稔允當斯責兼勒成之初未遑表上實由才輕務廣思力不周永言慙惕無忘寤寐自今春輿駕將親六師搜尋軍禮閲其條章靡不該備可以縣之日月頒之天下者矣詔有司案以遵行尋加中書令勉以腳疾求解內任詔不許乃令停下省三日一朝有事遣主書論決勉患腳轉劇久闕朝覲固求陳解詔許疾差還省勉雖居顯位不營産業家無積蓄奉祿分贍親族之窮乏者門人故舊或從容致言勉乃答曰人遺子孫以財我遺之清白子孫才也則自致輜軿如其不才終為他有嘗為書誡其子嵩曰吾家世清廉故常居貧素至於産業之事所未嘗言非直不經營而已薄躬遭逄遂致今日尊官厚祿可謂備之每念叨竊若斯豈由才致仰藉先門風範及以福慶故臻此耳古人所謂以清白遺子孫不亦厚乎又曰遺子黃金滿籯不如一經詳求此言非徒謂也吾雖不敏實有本志庶得遵奉斯義不敢墜失所以顯貴以來將三十載門人故舊悉薦便宜或使創開田園或勸興立邸店又欲舳艫運致亦令貨殖聚斂若此衆事皆拒而不納非謂拔葵去織且欲省息紛紜中年聊於東田開營小園者非存播蓻以要利入正欲穿池種樹少寄情賞又以郊際間曠終可為宅儻獲懸車致仕實欲歌哭於斯慧日十住等既應營婚又須住止吾清明門宅無相容處所以爾者亦復有以前割西邊施宣武寺既失西廂不復方幅意亦謂此為逆旅舍爾何事須華常恨世人謂是我宅古往今來豪富繼踵高門甲第連闥洞房宛其死矣定是誰室但不能不為培塿之山聚石移果雜以花卉以娛休沐用託性靈隨便架立不存廣大唯功德處小以為好所以內中逼促無復房宇近修東邊兒孫二宅乃藉十住南還之資其中所須猶為不少既牽挽不至又不可中塗而輟郊間之園遂不辦保貨與韋黯乃獲百金成就兩宅已消其半尋園價所得何以至此由吾經始歷年粗已成立桃李茂密桐竹成隂塍陌交通渠畎相屬華樓逈榭頗有登眺之美孤峯藂薄不無糾紛之興瀆中並饒菰蒲湖裏殊富芰蓮雖云人外城闕密邇韋生欲之亦雅有情趣追述此事非有吝心蓋是事意所至爾憶謝靈運山家詩云中為天地物今成鄙夫有吾此園有之二十載矣今為天地物物之與我相校幾何哉此吾所餘今以分汝營小田舍親纍既多理亦須此且釋氏之教以財物謂之外命聖典亦稱何以聚人曰財况世常情安得忘此聞汝所買湖熟田地甚為舄鹵彌復可安所以如此非物競故也雖事異寢邱聊可髣佛孔子曰居家理故治可移於官既已營之宜使成立進退兩亡更貽恥笑若有所收獲汝可自分贍內外小大宜令得所非吾所知又復應霑之諸女耳汝既居長故有此及凡為人長殊復不易當使中外諧緝人無間言先物後已然後可貴老生云後其身而身先若能爾者便招巨利汝當自朂見賢思齊不宜忽略以棄日也棄日乃是棄身身名美惡豈不大哉可不慎歟今之所敕略言此意政謂為家以來不事資産暨立墅舍似乖舊業陳其始末無愧懷抱兼吾年時朽暮心力稍殫牽課奉公略不克舉其中餘暇才可自休或復冬日之陽夏日之隂良辰美景文案間隙負杖躡屩逍遙陋館臨池觀魚披林聼鳥濁酒一杯彈琴一曲求數刻之暫樂庶居常以待終不宜復勞家間細務汝交關既定此書又行凡所資須付給如别自兹以後吾不復言及田事汝亦勿復與吾言之假使堯水湯旱豈如之何若其滿庾盈箱爾之幸遇如斯之事過並無俟令吾知也記云夫孝者善繼人之志善述人之事今且望汝全吾此志則無所恨矣勉第二子悱卒痛悼甚至不欲久廢王務乃為答客以自喻焉普通末武帝自算擇後宫吳聲西曲女妓各一部並華少賚勉勉因此頗好聲酒祿奉之外月别給十萬信遇之深故無與匹中大通三年以疾自陳移授特進右光祿大夫侍中中衛將軍置佐史扶如故增親信四十人兩宫參問冠蓋結轍服膳醫藥皆資天府有敕每欲臨幸勉以拜伏有虧頻啓停出詔許之遂停輿駕大同元年卒時年七十武帝流涕即日車駕臨殯詔贈特進右光祿大夫開府儀同三司皇太子亦舉哀朝堂有司奏諡居敬行簡曰簡帝益執心決斷曰肅故諡簡肅公勉雖骨鯁不及范雲亦不阿意茍合後知政事者莫及梁世之言相者稱范徐云勉善屬文勤著述雖當機務下筆不休嘗以起居注煩雜乃撰為流别起居六百卷左丞彈事五卷在選曹撰選品五卷齊時撰太廟祝文二卷以孔釋二教殊塗同歸撰會林五十卷凡所著前後二集四十五卷又為人章表集十卷皆行於世大同三年故佐史尚書左丞劉覽等詣闕陳勉行狀請刋石紀德即降詔立碑於墓焉悱字敬業幼聰敏能屬文位太子舍人掌書記纍遷洗馬中舍人猶管書記出入宫坊者歷稔以足疾出為湘東王友俄遷晉安內史何敬容字國禮廬江灊人也祖佟之宋侍中父昌宇齊侍中領驍騎將軍並有名前代敬容以名家子弱冠選尚齊武帝女長城公主拜駙馬都尉天監中為建安內史清公有美績吏民稱之普通中纍遷守吏部尚書銓序明審號為稱職出為吳郡太守為政勤恤民隱辨訟如神視事四年政為天下第一吏民詣闕請樹碑詔許之大通二年復為吏部尚書領侍中太子中庶子敬容身長八尺白晳美鬚眉性矜莊衣冠尤事鮮麗武帝雖衣浣衣而左右衣必須潔嘗有侍臣衣帶卷摺帝怒曰卿衣帶如繩欲何所縛敬容希旨故益鮮明常以膠清刷鬚衣裳不整伏牀尉之或暑月背為之焦每公庭就列容止出人為尚書右僕射參掌選事遷左僕射丹陽尹並參掌大選如故時僕射徐勉參掌機密以疾陳解因舉敬容自代故有此授敬容接對賔朋言辭若訥酬答二宫則音韻調暢大同中朱雀門災武帝謂羣臣曰此門制度卑狹我始欲改構之遂遭天災並相顧未有答敬容獨曰此所謂先天而天不違時以為名對五年改為尚書令參選事如故敬容久處臺閣詳悉晉魏以來舊事且聰明識逹勤於簿領詰朝理事日旰不休職隆任重專豫機密而拙於草𨽻淺於學術通苞苴餉餽無賄則略不交語自晉宋以來宰相皆以文義自逸敬容獨勤庶務貪吝為時所嗤鄙其署名敬字則大作茍小為文容字大為父小為口陸倕戲之曰公家茍既竒大父亦不小敬容遂不能答又多漏禁中語故嘲誚日至嘗有客姓吉敬容問卿與邴吉逺近答曰如明公之與蕭何時蕭琛子巡頗有輕薄才因製卦名離合等詩嘲之亦不屑也帝嘗夢具朝服入太廟拜伏悲感旦於延務殿説所夢敬容對曰臣聞孝悌之至通於神明陛下性與天通故感應斯至上極然之便有拜陵之議十一年坐妾弟費慧明為導倉丞夜盜官米為禁司所執送領軍府時河東王譽為領軍敬容以書解慧明譽前經屬事不行因此譽即封書以奏帝大怒付南司推劾中丞張綰奏敬容挾私罔上合棄市詔特免職到溉謂朱異曰天時便覺開霽其見嫉如此初天監中有沙門釋寶志常謂敬容曰君後必貴然終是何敗耳及敬容為宰相謂何姓為其禍故抑沒宗族無仕進者至是為河東所敗中大同元年三月武帝幸同泰寺講金字三慧經敬容啓豫聼敕許之又有敕朔望問訊尋起為金紫光祿大夫未拜又加侍中敬容舊時賔客門生喧譁如昔冀其復用會稽謝郁致書戒之曰草萊之人聞諸道路君侯已得瞻望朝夕出入禁門醉尉將不敢呵灰然不無其漸甚休甚休敢賀於前又將弔也昔流言裁至公旦東奔燕書始來子孟不入夫聖賢被虛過以自斥未有嬰時釁而求親者也且暴鰓之魚不念杯杓之水雲霄之翼豈顧籠樊之糧何者所託已盛也昔君侯納言加首鳴玉在腰回豐貂以步文昌聳髙蟬而趨武帳可謂盛矣不以此時薦才拔士少報聖朝之恩今卒如爰絲之説受責見過方復欲更窺朝廷觖望萬分竊不為左右取也昔竇嬰楊惲亦得罪明時不能謝絶賔客猶交黨援卒無後福終益前禍僕之所弔實在於斯人人所以頗猶有踵君侯之門者未必皆感惠懷仁有灌夫任安之義乃戒翟公之大署冀君侯之復用也夫在思過之日而挾復用之意未可為智者説矣夫君侯宜杜門念失無有所通築茅茨於鍾阜聊優遊以卒歲見可憐之意著待終之情復仲尼能改之言惟士貞更也之譬少戢言於衆口微自救於竹帛所謂失之東隅收之桑榆如此令明主聞知尚有冀也僕東臯鄙人入穴幸無䘖窶恥天下之士不為執事道之故披肝膽示情素君侯豈能鑒焉太清元年遷太子詹事侍中如故二年侯景襲建鄴敬容自府移家臺內初景於渦陽退敗未得審實傳者乃云其將暴顯反景身與衆並沒朝廷為憂敬容朝東宫簡文謂曰淮北始更有信侯景定得身免不如所傳敬容曰得景死深是朝廷福簡文失色問其故敬容曰景翻覆叛臣終當亂國是年簡文頻於元圃講老莊二書學士吳孜時寄詹事府每日入聼敬容謂孜曰昔晉氏喪亂頗由祖尚元虛胡賊遂覆中夏今東宫復襲此殆非人事其將為戎乎俄而侯景難作其言有徵也二年卒於圍內何氏自晉司空充宋司馬尚之奉佛法並建立塔寺至敬容又捨宅東為伽藍趨權者因助財造構敬容並不拒故寺堂宇頗為宏麗時輕薄者因呼為衆建寺及敬容免職出宅止有常用器物及囊衣而已竟無餘財貨時亦以此稱之敬容時為從兄允所親愛允在若邪山嘗疾篤有書云田疇館宇悉奉衆僧書經並歸從弟敬容其見知如此敬容唯有一子年始八嵗在吳臨還與允别允問名敬容曰仍欲就兄求名允即命紙筆名曰玨曰書云兩玉為玨吾與弟二家共此一子所謂玨也位祕書丞早卒陳吏部尚書姚察曰魏正始及晉之中朝時俗尚於沖虛貴為放誕尚書丞郎以上簿領文案不復經懷皆成於令史逮於江左此道彌扇唯卞壺以臺閣之務頗欲綜理阮孚謂之曰卿常無間暇不乃勞乎宋世王景𢎞身居端右未嘗省牒風流相尚其流遂逺望白題空是稱貴賞恪勤匪懈終滯鄙俗是使朝務廢於上職事隳於下小人道長抑此之由嗚呼傷風敗俗曾莫之悟永嘉不競戎馬生郊宜其然矣何國禮之識治見譏薄俗惜哉范岫字懋賔濟陽考城人也髙祖宣晉徵士父羲宋尚書殿中郎本州别駕竟陵王誕反羲在城中事平遇誅岫幼而好學早孤事母以孝聞外祖顔延之早相題目以為中外之寶蔡興宗臨荆州引為主簿及蔡將卒以岫貧乏遺旨賜錢二十萬固辭拒之仕齊為太子家令文惠太子之在東宫沈約之徒以文才見引岫亦豫焉岫文雖不逮約而名行為時輩所與博涉多通尤悉魏晉以來吉凶故事約嘗稱曰范公故事該博胡廣無以加焉南郡范雲謂人曰諸君進止威儀當問范長頭以岫多識前代舊事也遷國子博士岫長七尺八寸姿容竒偉永明中魏使至詔妙選朝士有辭辨者接使於界首故以岫兼淮隂長史迎焉入為尚書左丞丁母憂居喪過禮朝廷頻起並不拜朝廷亮其哀款得終喪制出為安城內史創立鈞折行倉公私引益徵黃門侍郎兼御史中丞吏將送一無所納永元末為輔國將軍冠軍晉安王長史行南徐州事武帝平建鄴承制徵為尚書吏部郎參大選天監五年為散騎常侍光祿大夫侍中太子給扶纍遷祠部尚書金紫光祿大夫卒官岫恭敬嚴恪進止以禮自親喪後蔬食布衣以終身每所居官恆以廉潔著稱為長城令時有梓材巾箱至數十年經貴遂不改易在晉陵唯作牙管筆一雙猶以為費所著文集禮論雜儀字訓行於世二子褒偉傅昭字茂逺北地靈州人晉司𨽻校尉咸七世孫也祖和之父淡善三禮知名宋世淡事宋竟陵王誕誕反坐誅昭六嵗而孤哀毁如成人為外祖所養十嵗於朱雀航賣歷日雍州刺史袁顗見而竒之顗嘗來昭所昭讀書自若神色不改顗歎曰此兒神情不凡必成佳器司徒建安王體仁聞而恱之固欲致昭昭以宋氏多故遂不往或有稱昭於廷尉虞願願遣車迎昭時願宗人通之在坐並當時名流通之貽昭詩曰英妙擅山東才子傾洛陽清塵誰能嗣及爾遘遺芳太原王延秀薦昭於丹陽尹袁粲深為所禮辟為郡主簿使諸子從昭受學明帝崩粲造哀册文乃引昭定其所製昭有其半焉粲每經昭戶輒歎曰經其戶寂若無人披其帷其人斯在豈非名賢尋為總明學士奉朝請齊永明中纍遷尚書儀曹郎先是御史中丞劉休薦昭於齊武帝永明初以昭為南郡王侍讀王嗣帝位故時臣𨽻爭求權寵唯昭及南陽宗夬保身而已守正無所參入竟不罹禍明帝踐阼引昭為中書舍人時居此職者皆權傾天下昭獨亷靜無所干豫器服率陋身安粗糲常插燭於版牀明帝聞之賜漆合燭盤等敕曰卿有古人之風故賜卿古人之物纍遷尚書左丞本州大中正武帝素重昭梁臺建以為給事黃門侍郎領著作兼御史中丞天監三年兼五兵尚書參選事四年即真歷位左戶尚書安成內史郡自宋來兵亂相接府舍稱凶昏旦間人鬼相觸在任者鮮以吉終及昭為郡郡人夜夢見兵甲甚盛而出又聞有人云傅公善人不可侵犯乃相與騰虗而逝夢者驚起俄而疾風暴雨數間屋俱倒即夢者所見軍馬踐蹈之所也自是郡舍遂安咸以昭貞正所致郡溪無魚或有暑月薦昭魚者昭既不納又不欲拒之遂餒于門側郡多虎為害常設檻穽昭曰人不害虎虎亦不害人乃命去檻穽虎竟不為害歷祕書監太常卿遷臨海太守郡有蜜巗前後太守皆自封固專收其利昭以周文之囿與百姓共之大小可喻乃教勿封縣令嘗餉粟置絹于薄下昭笑而還之普通二年入為通直散騎常侍金紫光祿大夫領本州大中正五年遷散騎常侍昭所涖官常以清靜為政不尚嚴肅居朝廷無所請謁不畜私門生不交私利終日端居以書記為樂雖老不衰博極古今尤善人物魏晉以來官宦簿閥姻通內外舉而論之無所遺失世稱為學府性尤篤慎子婦常得家餉牛肉以進昭昭召其子曰食之則犯法告之則不可取而埋之其居身行已不負暗室類皆如此京師後進宗其學重其道人人自以為不逮大通二年卒年七十五諡曰貞長子諝位尚書郎湘東王外兵參軍諝子準有文才陳宣帝時位度支尚書昭弟映字徽逺三嵗而孤兄弟友睦修身勵行非禮不動始昭之守臨海也陸倕餞之賔主俱歡日暮不反映以昭年髙不可連夜極樂乃自往候接同乘而歸兄弟並已斑白時人美而服焉及昭卒映喪之如父年踰七十哀戚過禮服制雖除每言輒感慟映泛涉記傳有文才而不以篇什自命禇淵聞而恱之乃屈與子賁等遊處年未弱冠淵欲令仕映以昭未解褐固辭須昭宦乃仕永元元年為武康令武帝師次建康吳興太守袁昂自謂門世忠貞固守誠節乃訪於映曰卿謂時事云何映答曰元嘉之末開闢未有故太尉殺身以明節司徒當寄託之重理無茍全所以不顧夷險以殉名義今嗣主昏虐狎近羣小親賢誅戮君子道消外難屢作曾無悛改今荆雍協舉乘據上流背昏向明勢無不濟百姓思治天下之意可知既明且哲忠孝之途無爽願明府更當雅慮無祗悔也天監中為烏程令所受俸祿悉歸於兄纍遷中散大夫光祿卿大同五年卒年八十三子𢎞傅岐字景平北地靈州人也祖琰齊南郡內史父翽天監中為建康令俱列良吏傳岐起家為南康王左常侍後兼尚書金部郎母憂去職居喪盡禮服闋後疾廢久之復除始興令縣人有因鬭相歐而死死家訴郡郡録其仇人考掠備至終不引咎郡乃移獄於縣岐即令脫械以和問之便即首服法當償死會冬節至岐乃放其還家獄曹掾固爭曰古者有此今不可行岐曰其若負信縣令當坐竟如期而反太守深相歎異遽以狀聞岐後去縣人無老少皆出境拜送號哭聞數十里至都除廷尉正入兼中書通事舍人纍遷安西中記室兼舍人如故岐美容止博涉能占對大同中與魏和親其使歲中再至常遣岐接對焉太清元年纍遷太僕司農卿舍人如故岐在禁省中十餘年機事密勿亞於朱異此年冬貞陽侯蕭淵明伐彭城兵敗囚於魏三年淵明遣使還述魏欲通和敕有司及近臣定議左衛朱異曰邊境且得靜冦息民於事為便議者並然之岐獨曰髙澄既新得志何事須和必是設間故令貞陽遣使令侯景自疑當以貞陽易景景意不安必圗禍亂若許通好政是墮其計中且彭城去歲喪師渦陽復新敗退今使就和益示國家之弱和不可許異等固執帝遂從之及遣使景果有此疑遂舉兵入冦請誅朱異三年遷中領軍舍人如故二月侯景於闕前通表乞割江右四州安置部下當解圍還鎮敕許之乃於城西立盟求遣召宣城王出送岐固執宣城王嫡嗣之重不宜許之乃遣石城公大款送之及與景盟訖城中文武喜躍冀得解圍岐獨言於衆曰賊舉兵為逆豈有求和之理及景背盟莫不歎服尋有詔以岐勤勞封南豐縣侯固辭不受宫城失守岐帶疾出圍卒於宅江革字休映濟陽考城人也祖齊之宋都水使者尚書金部郎父柔之齊尚書倉部郎有孝行以母憂毁卒革幼而聰敏早有才思六嵗便解屬文柔之深加賞器曰此兒必興吾門九嵗丁父艱與第四弟觀同生少孤家貧傍無師友兄弟自相訓朂讀書精力不倦十六喪母以孝聞服闋與觀俱詣太學補國子生舉高第齊中書郎王融吏部郎謝朓雅相欽重常宿衛還候革時大寒雪見革弊絮單席而耽學不倦嗟歎久之乃脫所著襦并手割半氈與革充卧具而去司徒竟陵王聞其名引為西邸學士弱冠舉南徐州秀才時豫章胡諧之行州事王融與諧之書令薦革諧之方貢琅邪王泛便以革代之解褐奉朝請僕射江祏深相引接祏為太子詹事啓革為丞祏時權傾朝右以革才堪經國令參掌機務詔誥文檄皆具以委革防杜形迹外人不知祏誅賔客皆罹其罪革獨以智免除尚書駕部郎中興元年武帝入石頭時吳興太守袁昂據郡拒義不從乃使革製書與昂於坐立成辭義典雅帝深賞歎之因令與徐勉同掌書記建安王為雍州刺史表求革管記以為征北記室參軍帶中廬令革與弟觀少長共居不忍離别苦求同行乃以觀為征北行參軍兼記室時吳興沈約樂安任昉與革書云此假雍府妙選英才文房之職總卿昆季可謂馭二龍於長途騁騏驥於千里途次江夏觀遇疾而卒革在雍為府主所禮款若布衣後為建康正頻遷秣陵建康令為政明肅豪強憚之歷中書舍人尚書左丞晉安王長史尋陽太守行江州府事徙廬陵王長史太守行事如故以清嚴為屬城所憚時少王行事多傾意於籖帥革以正直自居不與典籖趙道智坐道智因還都啓事靣陳革墮事好酒以琅邪王曇聰代為行事南州士庶為之語曰故人不道智新人佞散騎莫知度不度新人不如故遷御史中丞彈奏權豪一無所避後為鎮北豫章王長史廣陵太守時魏徐州刺史元法僧降附革被勒隨府王鎮彭城城既失守革素不便馬乃泛舟而還途經下邳為魏人所執魏徐州刺史安豐王元延明聞革才名厚加接待革稱腳疾不拜延明將害之見革辭色嚴正更加敬重時祖暅同被拘繫延明使暅作欹器漏刻銘革唾罵暅曰卿荷國厚恩已無報答今乃為虜立銘孤負朝廷延明聞之乃令革作丈八寺碑并祭彭祖文革辭以囚執既久無復心思延明逼之愈苦將加箠撲革厲色而言曰江革行年六十不能殺身報主今日得死為幸誓不為人執筆延明知不可乃止日給革脫粟三升僅餘性命值魏主詔中山王元略反北乃放革及祖暅還朝上大宴舉酒勸革曰卿那不畏延明害對曰臣行年六十死不為夭豈畏延明帝曰今日始見蘇武之節於是以為太尉臨川王長史時帝惑於佛教朝賢多啓求受戒革精信因果而帝未知謂革不奉佛法乃賜革覺意詩五百字末云唯當勤精進自強行勝修豈可作底突如彼必死囚以此告革及諸貴遊又手敕曰果報不可不信豈得底突如對元延明邪革因乞受菩薩戒時武陵王紀在東州頗驕縱上召革靣敕曰武陵王年少臧盾性弱不能規正欲以卿代為行事不得有辭乃除折衝將軍東中郎武陵王長史會稽郡丞行府州事革門生故吏家多在東聞革應至並齎持緣道迎候革曰我通不受餉不容獨當故人筐篚至鎮唯資公奉食不兼味郡境殷廣辭訟日數百革分判辨析曾無疑滯民安吏畏百城震恐琅邪王騫為山隂令贓賄狼籍望風自解府王憚之每至侍宴言論必以詩書王因此耽學好文典籖沈熾文以王所製詩呈武帝帝謂僕射徐勉曰江革果能稱職乃除都官尚書將還民皆戀之贈遺一無所受送故依舊資遣革並不納唯乘臺所給一舸舸艚偏欹不得安卧或謂革曰船既不平濟江甚險當移徙重物以正輕艚革既無物乃於西陵岸取石十餘片以實之其清貧如此尋監吳郡時境內荒儉劫盜公行革至郡唯有公給仗身二十人百姓皆懼不能靜寇革乃省遊軍尉百姓逾恐革乃廣施恩惠盜賊靜息武陵王出鎮江州乃曰我得江革文華清麗豈能一日忘之當與其同飽乃表革同行又除明威將軍南中郎長史尋陽太守徵入為度支尚書好奬進閭閻為後生延譽由是衣冠士子翕然歸之時尚書令何敬容掌選序用多非其人革性強直每至朝宴常有褒貶以此為權貴所疾乃謝病還家除光祿大夫優遊間放以文酒自娛卒諡曰強子有集二十卷革歷官八府長史四王行事三為二千石傍無姬侍家徒壁立世以此高之子行敏早卒次子德藻好學美風儀身長七尺四寸性至孝事親盡禮與異産昆弟居恩惠甚篤涉獵經籍善屬文為尚書比部郎以父憂去職服闋後容貌毁瘠如居喪時及陳武帝受禪為祕書監兼尚書左丞尋以本官兼中書舍人天嘉中兼散騎常侍與中書郎劉師知使齊著北征道里記三卷還除太子中庶子遷御史中丞坐公事免官後自求宰縣補新渝令政尚恩惠頗有異績卒於官文帝贈散騎常侍文筆十五卷子椿亦善屬文位尚書右丞德藻弟從簡少有文情年十七作采荷調以刺何敬容為當時所賞侯景亂為任約所害子兼叩頭流血乞代父命以身蔽刃遂俱見殺天下痛之許懋字昭哲高陽新城人魏鎮北將軍允九世孫也五世祖詢晉徵士祖圭宋給事著作郎桂陽太守父勇慧齊太子家令冗從僕射懋少孤性至孝居父憂執喪過禮篤志好學為州黨所稱年十四入太學受毛詩旦領師説晚而覆講座下聼者常數十百人因撰風雅比興義十五卷盛行於世尤明故事稱為儀注之學起家後軍豫章王行參軍轉法曹舉秀才遷驃騎大將軍儀同中記室文惠太子聞而召之侍講於崇明殿後兼國子博士與司馬褧同志友善僕射江祏甚雅重之號為經史笥天監初吏部尚書范雲舉懋參詳五禮除征西鄱陽王咨議參軍兼著作郎待詔文德省時有請封會稽禪國山者武帝雅好禮因集諸儒學士草封禪儀將行焉懋建議獨以為不可帝見其議嘉納之由是遂停天監七年請造大裘以祀昊天上帝又議雩祭燔柴非禮詔並從之十年轉太子家令凡諸禮儀多所刋正以足疾出為始平太守政有能名加散騎常侍轉天門太守中大通三年皇太子召與諸儒録長春義記四年拜中庶子是嵗卒撰述行記四卷有集十五卷子亨列在陳史殷鈞字季和陳郡長平人晉荆州刺史仲堪五世孫也曾祖元素宋南康相坐元凶事誅元素娶尚書僕射琅邪王僧朗女生子寧早卒寧遺腹子睿亦當從戮僧朗啓孝武救之得免睿有口辨司徒禇淵甚重之謂曰諸殷自荆州以來無出卿睿斂容答曰殷族衰悴誠不如昔若此旨為虛故不足降此旨為實彌不可聞仕齊司徒從事中郎睿妻王奐女奐為雍州刺史啓睿為府長史奐誅睿亦見害鈞時年九嵗以孝聞及長恬靜簡交遊好學有思理善𨽻書為當時楷法南郡范雲樂安任昉並稱賞之武帝與睿少故舊故以女永興公主妻鈞拜駙馬都尉歷祕書丞鈞在職啓校定祕閣四部書更為目録又受詔料檢西省法書古迹别為品目遷太子家令掌東宫書記自宋齊以來公主多驕淫無行永興主加以險虐鈞形貌短小為主所憎每被召入先滿壁為殷睿字鈞輒流涕以出主命婢束而反之鈞不勝怒而言於帝帝以犀如意擊主碎於背然猶恨鈞自侍中出為王府咨議後為明威將軍臨川內史鈞體羸多疾閉閣卧理而百姓化其德劫盜皆奔出他境常擒劫帥不加考掠但和言誚責劫帥稽顙乞改過鈞便命遣之後遂為善人郡舊多山瘧更暑必動自鈞在郡境內無復瘧疾母憂去職居喪過禮昭明太子憂之手書誡諭服闋為散騎常侍領步兵校尉侍東宫改領中庶子後為國子祭酒卒諡曰貞二子構渥鈞宗人藝藝字灌蔬倜儻不拘細行然不妄交遊門無雜客勵精勤學博洽羣書幼而廬江何憲見之深相歎賞天監中稍遷後直東宫學士省卒陳伯之濟隂睢陵人也年十三四好著獺皮冠帶刺刀候鄰里稻熟輒偷刈之嘗為田主所見呵之曰楚子莫動伯之曰君稻幸多取一擔何苦田主將執之因拔刀而進曰楚子定何如田主皆反走徐擔稻而歸及年長在鍾離數為劫盜嘗援靣覘人船船人斫之獲其左耳後隨鄉人車騎將軍王廣之廣之愛其勇每夜卧下榻征伐常將自隨頻以戰功纍遷驃騎司馬封魚復縣伯武帝起兵東昏假伯之節督前驅諸軍事豫州刺史轉江州據尋陽以拒武帝郢城平武帝使説伯之即以為江州刺史子虎牙為徐州刺史伯之雖受命猶懷兩端帝及其猶豫逼之伯之退保南湖然後歸附與衆軍俱下建康城未平每降人出伯之輒喚與耳語帝疑其復懷翻覆會東昏將鄭伯倫降帝使過伯之謂曰城中甚忿卿欲遣信誘卿須卿降先斷卿手足卿若不降復欲遣刺客殺卿伯之大懼自是無異志矣城平封豐城縣公遣之鎮伯之不識書及還江州得文牒辭訟唯作大諾而已有事典籖傳口語與奪決於主者伯之與豫章人鄧繕永興人戴承忠並有舊繕經藏伯之息免禍伯之尤德之及在州用繕為别駕承忠為記室參軍河南褚緭都下之薄行者武帝即位頻造尚書范雲雲不好緭堅拒之緭益怒私語所知曰建武以後草澤底下悉成貴人吾何罪而見棄今天下草創喪亂未可知陳伯之擁強兵在江州非代來臣有自疑之意且復熒惑守南斗詎非為我出今者一行事若無成入魏何減作河南郡公於是投伯之書作王思穆因事伯之大見親狎及伯之鄉人朱龍符為長流參軍並乘伯之愚暗恣行姦險伯之子虎牙時為直閣將軍武帝手疏龍符罪親付虎牙虎牙封示伯之帝又遣代江州别駕鄧繕伯之並不受命曰龍符健兒鄧繕在事有績臺所遣别駕請以為中從事繕於是日夜説伯之云臺家府庫空竭無復器仗三倉無米此萬世一時機不可失緭承忠等每贊成之伯之謂繕今假啓卿若復不得便與卿共下使反帝武敕部內一郡處繕伯之於是集府州佐史謂曰奉齊建安王教率江北義勇十萬已次六合見使以江州見力運糧速下我荷明帝厚恩誓以死報使緭詐為蕭寶夤書以示僚佐於聼事前為壇殺牲以盟伯之先歃長史以下次第歃緭説伯之今舉大事宜引人望程元沖不與人同心臨川內史王觀僧虔之孫人身不惡可召為長史以代元沖伯之從之仍以緭為尋陽太守承忠輔義將軍龍符豫州刺史豫章太守鄭伯倫起郡兵拒守程元沖既失職於家合率數百人使伯之典籖吕通孝戴元則為內應伯之每旦常作伎日晡輒卧左右仗身皆休息元沖因其解弛從北門入徑至聼事前伯之聞呌自率出蕩元沖力不能敵走逃廬山伯之遣使還都報虎牙兄弟虎牙等走盱台盱台人徐文安莊興紹張顯明邀擊之不能禦反見殺武帝遣王茂討之伯之敗走間道亡命出江北與子虎牙及褚緭俱入魏魏以伯之為使持節散騎常侍都督淮南諸軍事平南將軍光祿大夫曲江縣侯天監四年詔太尉臨川王宏北侵宏記室邱遲私與伯之書曰陳將軍足下無恙幸甚幸甚將軍勇冠三軍才為世出棄燕雀之毛羽慕鴻鵠以髙翔昔因機變化遭遇時主立功立事開國稱孤朱輪華轂擁旄萬里何其壯邪如何一旦為奔亡之虜聞鳴鏑而股戰對穹廬以屈膝又何劣邪尋君去就之際非有他故直以不能內審諸已外受流言沈迷猖蹶以至於此聖朝赦罪責功棄瑕録用推赤心於天下安反側於萬物此將軍之所知非假僕一二談也昔朱鮪涉血於友于張繡倳刃於愛子漢主不以為疑魏君待之若舊況將軍無昔人之罪而勳重當代夫迷塗知反往哲是與不逺而復先典攸髙主上屈法申恩吞舟是漏將軍松柏不翦親戚安居髙堂未傾愛妾尚在悠悠爾心亦何可言當今功臣名將鴈行有序佩紫懷黃讚帷幄之謀乘軺建節奉疆埸之征並刑馬作誓傳之子孫將軍獨靦顔借命驅馳氈裘之長寧不哀哉以慕容超之強身送東市姚泓之盛面縳西都故知霜露所均不育異類姬漢舊邦無取雜種北虜僭號中原多歷年所惡積禍盈理至焦爛況偽孽昏狡自相夷戮部落攜離酋豪懷二方當繫頸蠻邸縣首藁街而將軍魚遊於沸鼎之中燕巢於飛幕之上不亦惑乎暮春三月江南草長雜花生樹羣燕亂飛見故國之旗鼓感平生於疇日撫弦登陴豈不愴恨所以廉公之思趙將吳子之泣西河人之情也將軍獨無情哉想早勵良規自求多福當今皇帝盛明天下安樂白環西獻楛矢東來夜郎滇池解辮請職朝鮮昌海蹶角受化唯北狄野心掘強沙塞之間欲延嵗月之命耳中軍臨川殿下明德茂親總兹戎重弔民洛汭伐罪秦中若遂不改方思僕言聊布往懷君其詳之伯之得書乃於夀陽擁衆八千歸降虎牙為魏人所殺伯之既至以為平朔將軍西豫州刺史永新縣侯未之任復為驍騎將軍又為太中大夫久之卒於家其子猶有在魏者褚緭在魏魏人欲用之魏元會緭戲為詩曰帽上著籠冠袴上著朱衣不知是今是不知非昔非魏人怒出為始平太守日日行獵墮馬而死陳慶之字子雲義興國山人也幼隨從武帝帝性好碁每夜逹旦不輟等輩皆倦寐唯慶之不寢聞呼即至甚見親賞從平建鄴稍為主書散財聚士常思效用除奉朝請普通中魏徐州刺史元法僧於彭城求入內附以慶之為威武將軍與胡龍牙成景俊率諸軍應接還除宣猛將軍文德主帥仍率軍送豫章王綜入鎮徐州魏遣安豐王元延明臨淮王元彧率衆十萬來拒延明先遣其别將邱大千觀兵近境慶之擊破之後豫章王棄軍奔魏慶之乃斬關夜退軍士獲全普通七年安西將軍元樹出鎮夀春除慶之假節總知軍事魏豫州刺史李憲遣其子長鈞别築兩城相拒慶之攻拔之憲力屈遂降慶之入據其城轉東宫直閣大通元年𨽻領軍曹仲宗伐渦陽魏遣恆山王元昭等率馬步十五萬來援前軍至駝澗去渦陽四十里韋放曰賊鋒必是輕鋭戰捷不足為功如不利沮我軍勢不如勿擊慶之曰魏人逺來皆已疲倦須挫其氣必無不敗之理於是慶之與麾下五百騎奔擊破其前軍魏人震懼還與諸將連營西進據渦陽城與魏相持自春至冬各數十百戰師老氣衰魏之援兵復欲築壘於軍後仲宗等恐腹背受敵謀退慶之杖節軍門曰須虜圍合然後與戰若欲班師慶之别有密敕仲宗壯其計乃從之魏人犄角作十三城慶之䘖枚夜出陷其四壘渦陽城主王緯乞降餘九城兵甲猶盛乃陳其俘馘鼓譟攻之遂奔潰斬獲略盡渦水咽流降城中男女三萬餘口詔以渦陽之地置西徐州衆軍乘勝前頓城父武帝嘉之賜慶之手詔曰本非將種又非豪家觖望風雲以至於此可深思竒略善克令終開朱門而待賔揚聲名於竹帛豈非大丈夫哉大通初魏北海王元皓以本朝大亂自拔來降求立為魏主帝納之以慶之為假節飈勇將軍送元皓還北皓於渙水即魏帝號授慶之使持節鎮北將軍大都督發自銍縣進攻滎陽遂至睢陽魏將邱大千有衆七萬分築九壘以相拒慶之自旦至申陷其二壘大千乃降魏濟隂王元徽業率羽林庶子二萬人來救梁宋進屯考城慶之攻陷其城生擒徽業仍趣大梁皓進慶之徐州刺史武都郡王仍率衆而西魏左僕射楊昱等率御仗羽林宗子庶子衆七萬據滎陽距元皓兵精城固魏將元天穆大軍復將至先遣其驃騎將軍爾朱兆騎將魯安等援楊昱又遣右僕射爾朱世隆西荆州刺史王羆統萬騎據虎牢前後旗鼓相望時滎陽未拔士衆皆恐慶之乃解鞍秣馬宣喻衆曰吾至此以來屠城略地實為不少君等殺人父兄掠人子女又為無算天穆之衆並是仇讐我等才有七千賊衆七十餘萬今日之事義不圗存吾以虜騎不可爭力平原及未盡至前須平其城壘一鼓悉使登城使壯士東陽宋景休義興魚大愍踰堞而入遂克之俄而魏軍外合慶之率精騎三千背城逆戰大破之魯安於陳乞降天穆兆單騎獲免收滎陽儲實牛馬榖帛不可勝計進赴虎牢世隆棄城而走魏孝莊出奔并州其臨淮王元彧安豐王元延明率百僚封府庫備法駕迎皓入洛陽宫御前殿改元大赦元皓以慶之為侍中車騎大將軍元天穆又攻大梁分遣王老生費穆據虎牢刁宣刁雙入梁宋慶之隨方掩擊並降天穆奔潰與數十騎北度河慶之麾下悉著白袍所向披靡先是洛中童謡曰名師大將莫自牢千兵萬馬避白袍自發銍縣至洛陽十四旬平三十二城四十七戰所向無前初魏孝莊帝單騎度河宫衛嬪侍無改於常元皓既得志荒於酒色乃日夜宴樂不復視事與安豐臨淮共計背梁絶賔饋之禮以時事未安且資慶之之力因外同內異慶之心知之亦密為其計乃説皓曰今逺來至此未伏尚多宜啓天子更請精兵并勒諸州有南人沒此者悉須部送皓欲從之元延明説皓曰陳慶之兵不出數千已自難制今更增兵寧肯為用魏之宗社於斯而滅皓由是疑慶之乃密啓武帝停軍洛下南人不出一萬魏人十倍軍副馬佛念言於慶之曰勳高不賞震主身危二事既有將軍豈得無慮自古以來廢昏立明扶危定難鮮有終者今將軍威震中原聲動河塞屠皓據洛則千載一時也慶之不從皓前以慶之為徐州刺史因求之鎮皓心憚之遂不遣魏將爾朱榮爾朱世隆元天穆爾朱兆長史高歡鮮卑茹茹勒衆號百萬挾魏帝來攻元皓皓據洛陽六十五日凡所得城一時歸魏慶之度河守北中郎城三日中十一戰傷殺甚衆榮將退還時有劉靈助者善天文乃謂榮曰不出十日河南大定榮乃縳木為筏濟自硤石與皓戰於河橋皓大敗走至臨潁被禽洛陽復入魏慶之馬步數千結陳東返榮親自來追值嵩髙山水洪溢軍人死散慶之乃落鬚髮為沙門間行至豫州州人程道雍等潛送出汝隂至京都仍以功除右衛將軍封永興縣侯出為北兖州刺史都督緣淮諸軍事會有妖賊沙門僧強自稱為帝土豪蔡伯寵舉兵應之攻陷北徐州詔慶之討焉慶之斬伯寵僧強傳其首中大通二年除南北司二州刺史加都督慶之至鎮遂圍縣瓠破魏潁州刺史婁起揚州刺史夏元寶於溱水又破行臺孫騰豫州刺史堯雄梁州刺史司馬恭於楚城罷義陽鎮兵停水陸轉運江湘諸州並得休息開田六千頃二年之後倉廪充實又表省南司州復安陸郡置上明郡大同二年魏遣將侯景攻下楚州執刺史桓和景仍進軍淮上慶之破之時大寒雪景棄輜重走是嵗豫州飢慶之開倉振給多所全濟州人李升等八百人表求樹碑頌德詔許焉五年卒諡曰武慶之性祗慎每奉詔敕必洗沐拜受儉素不衣紈綺不好絲竹射不穿札馬非所便而善撫軍士能得其死力長子昭嗣梁世寒門逹者惟慶之與俞藥藥初為武帝左右帝謂曰俞氏無先賢世人云俞錢非君子所宜改姓喻藥曰當令姓自於臣歷位雲騎將軍安州刺史慶之第五子昕字君章七嵗能騎射十二隨父入洛還都詣鴻臚卿朱異異訪北間事昕聚土畫城指麾分别異甚竒之慶之在縣瓠魏驍將堯雄于寶樂特為敢勇求單騎校戰昕躍馬直趣寶樂雄即潰散後為臨川太守太清二年侯景圍歷陽敕召昕還昕啓云采石急須重鎮王質水軍輕弱恐虜必濟乃版昕為雲騎將軍代質未及下渚景已渡江為景所禽令收集部曲將用之昕誓而不許景使其儀同范桃棒嚴禁之昕因説桃棒令率所領歸降襲殺王偉宋子仙桃棒許之遂立盟射城中遣昕夜縋而入武帝大喜敕即受降簡文遲疑纍日不決外事泄昕弗之知猶依期而下景邀得之逼昕令更射書城中云桃棒且輕將數十人先入景欲衷甲隨之昕不從遂見害昕弟暄列在陳史蘭欽字休明中昌魏人也幼而果決趫捷過人宋末隨父子雲在洛陽恆於市騎橐駝後子雲還南天監中以軍功至冀州刺史欽兼慶德主帥征南中五郡諸洞反者所至皆平欽有謀略勇決善戰步行日二百里勇武過人善撫馭得人死力以軍功封懷安縣男纍遷都督梁南秦二州刺史進爵為侯征梁漢事平進號智武將軍改授都督衡州刺史未及述職會西魏攻圍南鄭梁州刺史杜懷寶來請救欽乃大破魏軍追入斜谷斬獲略盡魏相安定公遣致馬二千匹請結鄰好欽百日之中再破魏軍威振鄰國詔加散騎常侍仍令述職經廣州因破俚帥陳文徹兄弟並禽之至衡州進號平南將軍改封曲江縣公在州有惠政吏民詣闕請立碑頌德詔許焉後為廣州刺史前刺史新渝侯映之薨南安侯恬權行州事冀得即真及聞欽至嶺厚貨厨人塗刀以毒削瓜進之欽及愛妾俱死帝聞之怒檻車收恬削爵土欽子夏禮侯景至歷陽率其部曲邀景兵敗死之賀瑒字德璉會稽山隂人也祖道力善三禮仕宋為尚書三公郎建康令父損亦傳家瑒少傳家業齊時沛國劉瓛為會稽府丞見瑒深器異之嘗與俱造吳郡張融指瑒謂融曰此生將來為儒者宗矣薦之為國子生舉明經後為太學博士天監初為太常丞有司舉修賔禮召見説禮義武帝異之詔朝朔望豫華林講四年開五館以瑒兼三經博士别詔為皇太子定禮撰五經義時武帝方創定禮樂瑒所建議多見施行七年拜步兵校尉領五經博士卒於館所著禮易老莊講疏朝廷博士議數百篇賔禮儀注一百四十五卷瑒於禮尤精館中生徒常百數弟子明經對䇿至數十人二子革季弟子琛並傳瑒業革字文明少以家貧躬耕供養年二十始輟耒就父業精力不怠有六尺方牀思義未逹則橫卧其上不盡其義終不肯食通三禮及長遍修孝經論語毛詩左傳為兼太學博士長七尺八寸雍容都雅吐納藴藉敕於永福省為邵陵湘東武陵三王講禮後為國子博士於學講授生徒常數百人出為西中郎湘東王咨議參軍帶江陵令王於州置學以革領儒林祭酒講三禮荆楚衣冠聼者甚衆前後再監南平郡為民吏所懷尋兼平西長史南郡太守革至孝常恨食祿代耕不及為養在荆州歷為郡縣所得俸秩不及妻孥專擬還鄉造寺以申感思子徽美少能傳家業最為革愛先革卒革哭之因得疾而卒季亦能明三禮位中書黃門郎兼著作郎早卒琛幼孤瑒授以經業一聞便通義理瑒異之曰此兒當以明經致貴瑒卒後琛家貧常往還諸暨販粟以自給躬自執舟楫間則習業尤精三禮年二十餘瑒之門徒往從問道初瑒於鄉里聚徒教授四方受業者數百餘人瑒天監中亡至是復集琛乃築室郊郭之際茅茨數椽年將三十便事講授既世習禮學究其精微又祖述先儒吐言辨潔聼者終日不疲湘東王幼年臨郡彭城到溉為行事聞琛美名命駕相造會琛正講學侣滿筵既聞上佐忽來莫不傾動琛説經無輟曾不降意溉下車欣然就席便申問難往復從容義理該贍溉歎曰通儒實學復見賀生今且還城尋當相屈琛了不酬答神用頽然溉言之王請補郡功曹史琛辭以母老終於固執俄遭母憂廬於墓所服闋猶未還舍生徒從之琛哀毁積年骨立而已未堪講授諸生營救稍稍習業普通中太尉臨川王宏臨州召補祭酒從事琛年已四十餘始應辟命武帝聞其有學術召見文德殿與語恱之謂僕射徐勉曰琛殊有門業仍補王國侍郎稍遷兼中書通事舍人令參禮儀事纍遷通直正員郎兼尚書右丞滿嵗為真詔琛撰新諡法便即施用時皇太子議大功之末可以冠子嫁女琛駁議曰令旨以大功之末可得冠子嫁女不自冠自嫁推以記文竊猶致惑按嫁冠之禮本是父之所成無父之人乃可自冠故記稱大功小功並以冠子嫁女為文非關唯得為子已身不得也小功之末既得自娶而亦云冠子娶婦其義益明故先列二服每明冠子嫁女結於後句方顯自娶之義既明小功自娶即知大功自冠矣蓋是約言而見旨若謂緣父服大功子服小功小功服輕故得為子冠嫁大功服重故不得自嫁自冠者則小功之末非明父子服殊不應復云冠子嫁女也若謂小功之文言已可娶大功之文不言已冠故知身有大功不得自行嘉禮但得為子冠嫁竊謂有服不行嘉禮本為吉凶不得相干子雖小功之末可得行冠嫁猶應須父得為其冠嫁若父於大功之末可以冠子嫁女是於吉凶禮無礙吉凶禮無礙豈不得自冠自嫁若自冠自嫁於事有礙則冠子嫁女寧獨可通今許其冠子而塞其自冠是琛之所惑也又令旨推下殤小功不可娶婦則降服大功亦不得為子冠嫁伏尋此旨若為降服大功不可冠子嫁女則降服小功亦不可自冠自嫁是為凡厥降服大功小功皆不得冠娶矣記文應云降服則不可寧得唯稱下殤今不言降服的舉下殤實有其義夫出嫁出後或有再降出後之身於本姊妹降為大功若是大夫服父士又以尊降則成小功其於冠嫁義無所異所以然者出嫁則有受我出後則有傳重並欲使薄於此而厚於彼此服雖降彼服則隆昔實期親雖復再降猶依小功之禮可冠可娶若夫期降大功大功降為小功止是一等降殺有倫服末冠嫁故無有異唯下殤之服特明不娶之義者蓋緣以幼弱之故夭喪情深既無受厚他姓又異傳重彼宗嫌其年幼頓成殺降故特明不娶以示本重之恩是以凡厥降服冠嫁不殊唯在下殤乃明不娶其義若此則不得言大功之降服皆不冠嫁也且記云下殤小功言下殤則不通於中上語小功又不兼於大功若實大功小功降服皆不冠嫁上中二殤亦不冠嫁者記不得直云下殤小功則不可恐非文意此又琛之所疑也遂從琛議加員外散騎常侍舊尚書南坐無貂尚書珥貂自琛始也遷御史中丞參禮儀如先琛性貪嗇多受賕賂家産既豐買主第為宅為有司所奏坐免官俄復為尚書左丞兼通直散騎常侍並參禮儀事琛前後居職凡郊廟諸儀多所創定每進見帝與語常移晷刻故省中為之語曰上殿不下有賀雅琛容止都雅故呼之遷散騎常侍參禮儀如故是時武帝年髙任職者緣飾姦諂深害時政琛啓陳事條封奏其大略一曰今北邉稽服政是生聚教訓之時而天下戶口減落誠當今之急務國家之於關外賦稅蓋微乃至年常租調動致逋積而人失安居寧非牧守之過其二事曰今天下宰守所以皆尚貪殘罕有廉白者良由風俗侈靡使之然也欲使人守廉隅吏尚清白安可得邪今誠宜嚴為禁制導之以節儉貶黜雕飾紏奏浮華使衆皆知變其耳目改其好惡則易於反掌其三事曰斗筲之人詭競求進運挈瓶之智徼分外之求以深刻為能以繩逐為務長弊增姦實由於此今誠願責其公平之效黜其讒愚之心則下安上謐無徼幸之患矣其四事曰自征伐北境帑藏空虛今天下無事而猶日不暇給良有以也夫國弊則省其事而息其費事省則養人費息則財聚若言小費不足害財則終年不息矣以小役不足妨人則終年不止矣書奏武帝大怒召主書於前口授敕責琛曰朕有天下四十餘年公車讜言日聞聼覽所陳之事與卿不異每苦倥偬更增惛惑卿珥貂紆組博問洽聞不宜同於闒茸止取名字宣之行路言我能上事明言得失恨朝廷不能用或誦離騷蕩蕩無其人遂不御乎千里或誦老子知我者希如是獻替莫不能言正旦獻樽皆其人也卿可分别言事堯為聖主四凶在朝況乎朕也能無惡人卿云今北邊稽服正是生聚教訓之時而人失安居牧守之過未為不是但大澤之中有龍有蛇縱不盡善不容皆惡卿可分頭顯出其人某州刺史橫暴某郡太守貪殘某官長恣虐尚書蘭臺主書舍人某人姦猾某人取與明言其事得以黜陟向令舜但聼公車上書四凶終自不知堯亦永為暗主宜速條聞當更擢用卿云宜導之以節儉又云至道者必以淳素為先此言大善夫子言其身正不令而行其身不正雖令不從朕絶房室三十餘年不與女人同室而寢亦三十餘年至於居處不過一牀之地雕飾之物不入於宫此亦人所共知受生不飲酒受生不好音聲所以朝中曲宴未嘗奏樂三更出理事隨事多少事或少則午前得竟事多至日昃方得就食既常一食若晝若夜無有定時疾苦之日或亦再食昔腰腹過於十圍今之瘦削裁二尺餘舊帶猶存非為妄説為誰為之救物故也書云股肱惟人良臣惟聖向使朕有股肱可得中主今乃不免居九品之下不令而行徒虛言耳卿又云百司莫不奏事詭競求進今不許外人呈事於義可否以噎廢餐此之謂也若斷呈事誰尸其任專委之人云何可得是故古人云專聼生姦獨任成亂何者是宜計卿不應欺朝廷㺯頰舌佇聞重奏當復省覽付之尚書班下海內庶亂羊永除害馬良息琛奉敕但謝過而已不敢復有指斥久之遷太府卿太清二年遷中軍宣城王長史侯景陷臺城放兵殺害琛被創未死賊求得之輿至闕下求見僕射王克領軍朱異勸開城納賊克等讓之涕泣而去賊復輿送莊嚴寺療之明年臺城不守琛逃歸鄉里其年冬賊寇會稽復執琛送出都以為金紫光祿大夫卒琛所撰三禮講疏五經滯義及諸儀注凡百餘篇子翊位巴山太守司馬褧字元表河內溫人也曾祖純之晉大司農高密敬王祖讓之員外常侍父燮善三禮仕齊官至國子博士褧少傳家業強力精專手不釋卷沛國劉獻深相賞好少與樂安任昉善昉亦推重之初為國子生起家奉朝請稍遷步兵校尉天監初詔定五禮有舉褧修嘉禮除尚書祠部郎褧所建議禮樂事多見施用兼中書通事舍人褧尤精於事數國家吉凶禮自名儒明山賔賀瑒等疑不能斷者咸取決焉遷御史中丞十六年出為宣毅南康王長史行府國并石頭戍軍事褧雖居外官有敕豫文德武德二殿長名問訊不限日明年遷晉安王長史卒王命記室庾肩吾集其文十卷所撰嘉禮儀注一百一十二卷朱異字彥和吳郡錢塘人也祖昭之以學解稱於鄉叔父謙之字處光以義烈知名年數嵗所生母亡昭之假葬於田側為族人朱幼方燎火所焚同産姊密語之謙之雖小便哀感如持喪長不婚娶齊永明中手刃殺幼方詣獄自繫縣令申靈朂表上之齊武帝嘉其義慮相報復乃遣謙之隨曹虎西行將發幼方子懌於津陽門殺謙之謙之兄巽之即異父也又刺殺懌有司以聞武帝曰此皆是義事不可聞悉赦之吳興沈顗聞而歎曰弟死於孝兄徇於義孝友之節萃此一門巽之字處休有志節著辨相論幼時顧歡見而異之以女妻焉仕齊官至吳平令異年數嵗外祖顧歡撫之謂異祖昭之曰此兒非常器當成卿門戶年十餘嵗好群聚蒱博頗為鄉黨所患既長乃折節從師梁初開五館異服膺於博士明山賔居貧以傭書自業寫畢便讀遍覽五經尤明禮易涉獵文史兼通雜藝博奕書算皆其所長年二十出都詣尚書令沈約約靣試之因戲異曰卿年少何乃不廉異逡巡未逹其旨約乃曰天下唯有文義碁書卿一時將去可謂不廉也其年上書言建康宜置獄司比廷尉敕付尚書議從之舊制年二十五方得釋褐時異年適二十一特敕為揚州議曹從事史尋有詔求異能之士五經博士明山賔表薦異武帝召見使説孝經周易義甚恱之謂左右曰朱異實異後見明山賔曰卿所舉殊得人仍召直西省俄兼太學博士其年帝自講孝經使異執讀遷尚書儀曹郎入兼中書通事舍人後除中書郎時秋日始拜有飛蟬正集異冠武上時人咸謂蟬珥之兆遷太子右衛率普通五年大舉北伐魏徐州刺史元法僧遣使舉地內屬詔有司議其虛實異曰自王師北討克復相繼徐州地轉削弱咸願歸罪法僧懼禍其降必非偽也帝乃遣異報法僧并敕衆軍應接受異節度及至法僧遵承朝旨如異䇿焉中大通元年遷散騎常侍異容貌魁梧能舉止雖出自諸生甚間軍國故實自周捨卒後異代掌機密其軍旅謀謨方鎮改换朝儀國典詔誥敕書並典掌之四方表疏當局簿領咨詳請斷填委於前異屬辭落紙覽事下議縱橫敏贍不暫停筆頃刻之間諸事便了大同四年遷右衛將軍異啓於儀賢堂奉述武帝老子義敕許之及就講朝士及道俗聼者千餘人為一時之盛城西又開士林館以延學士異與左丞賀琛遞日述武帝禮記中庸義皇太子又召異於元圃講易大同八年改加侍中異博解多藝圍碁上品而貪財冒賄欺罔視聼以伺候人主之意不肯進賢黜惡四方餉饋曾無推拒故逺近莫不忿疾起宅東陂窮其美麗晚日來下酣飲其中每迫曛黃慮臺門將闔乃引其鹵簿自宅至城使促城門停留管籥既而聲勢所驅熏灼內外産與羊侃相埒好飲食極滋味聲色之娛子鵝炮鰌不輟於口雖朝謁從車中必齎飴餌而輕傲朝賢不避貴戚人或誨之異曰我寒士也遭逄以至今日諸貴皆恃枯骨見輕我下之則為蔑尤甚我是以先之自徐勉周捨卒後外朝則何敬容內省則異敬容質慤無文以綱維為己任異文華敏洽曲營世譽二人行異而俱見幸異在內省十餘年未嘗被譴司農卿傅岐謂異曰今聖上委政於君安得每事從旨頃者外聞殊有異論異曰政言我不能諫諍耳當今天子聖明吾豈可以其所聞干忤天聼太清二年為中領軍舍人如故初武帝夢中原盡平舉朝盡慶甚恱旦以語異曰吾平生少夢夢必有實異對曰此宇內方一之兆及侯景歸降敕召羣臣廷議僕射謝舉等以為不可許帝欲納之未決嘗夙興至武德閣口獨言我國家猶若金甌無一傷缺承平若此今便受地詎是事宜脫致紛紜悔無所及異探帝微旨應聲答曰聖朝御宇上應蒼元北土遺黎誰不仰慕為無機會未逹其心今侯景分魏國大半逺歸聖朝若不容受恐絶後來之望帝深納異言又感前夢遂納之及貞陽侯敗沒帝憂曰今日勿作晉家事乎尋而貞陽自魏遣使還述魏相高澄欲申和睦敕有司定議異又議以和為允帝從之其年六月遣建康令謝挺通直徐陵使北通好時侯景鎮夀春纍啓絶和又致書與異并送金二百兩又致書於制局監周石珍令具申聞異納其金而不停北使八月侯景遂舉兵反募兵得三千人合州刺史鄱陽王範司州刺史羊鴉仁並纍表啓聞異以景孤立寄命事必不應爾乃謂使者曰鄱陽王遂不許國家有一客並抑不奏故朝廷不為之備及賊至板橋使前夀州司馬徐思玉先至求見於上上召問之思玉紿稱反賊請間陳事上將屏左右舍人髙善寶曰思玉從賊中來情偽難測安可使其獨在殿上時異侍坐乃曰徐思玊豈是刺客邪何言之僻善寶曰思玉已將臨賀入北詎可輕信言未卒思玊果出賊啓異大慙賊遂以討異及陸驗為名及景至城下又射啓言朱異等蔑㺯朝權輕作威福臣為讒臣所陷欲加屠戮陛下誅異等臣斂轡北歸帝問簡文曰有是乎對曰然帝召有司將誅之簡文曰賊特以異為名耳今日殺異無救於急適足貽笑將來若妖氛既息誅之未晚帝乃止異之方幸在朝莫不側目雖皇太子亦不能平至是城內咸尤異簡文為四言愍亂詩曰愍彼阪田嗟斯氛霧謀之不藏褰我王度又製圍城賦末章云彼髙冠及厚履並鼎食而乘肥升紫霄之丹地排玉殿之金扉陳謀謨之啓沃宣政刑之福威四郊以之多壘萬邦以之未綏問豺狼其何者訪虺蜴之為誰並以指異又帝登南樓望賊顧謂異曰四郊多壘誰之罪歟異流汗不能對慙憤發病卒時年六十七詔贈尚書右僕射舊尚書官不以為贈及異卒武帝悼惜之方議贈事有善異者乃啓曰異忝歷雖多然平生所懷願得執法帝因其宿志特有此贈異居權要三十餘年曲能阿諛以承上旨故特被寵任歷官自員外常侍至侍中四官皆拜珥貂自右衛率至領軍四職並驅鹵簿近代未之有也異及諸子自潮溝列宅至青溪其中甚有臺池玩好每暇日與賔客遊焉四方饋遺財貨充積性吝嗇未嘗有散施厨下珍羞恆腐爛每月常棄數十車雖諸子别房亦不分贍所撰禮易講疏及儀注文集百餘篇子肅位國子博士次閠司徒掾並遇亂卒顧協字正禮吳郡吳人晉司空和六世孫也幼孤隨養於外氏外從祖右光祿大夫張永嘗携內外孫姪遊虎邱山協年數嵗永撫之曰兒欲何戲對曰兒止欲枕石漱流永歎息曰顧氏興於此子及長好學以精力稱外氏諸張多賢逹有識鑒內弟率尤推重焉初為揚州議曹從事史舉秀才尚書令沈約覽其䇿而歎曰江左以來未有此作為兼廷尉正太尉臨川王聞其名召掌書記仍侍西豐侯正德讀正德為巴西梓潼郡協除所部新安令未至縣遭母憂刺史始興王厚資遣之送喪還於峽江遇風同旅盡皆漂溺唯協一舫觸石得泊焉咸謂精誠所致張率嘗薦之於武帝帝問協年率言三十有五帝曰北方髙涼四十強仕南方卑濕三十已衰如協便為已老但其事親孝與友信亦不可遺於草澤卿便稱敕唤出於是以協為兼太學博士普通中有詔舉士湘東王表薦之即召拜通直散騎常侍兼中書通事舍人大通三年霆擊大航華表然盡建康縣馳啓協以為非吉祥未即呈聞後帝知之曰霆之所擊一本罰惡龍二彰朕之有過協掩惡揚善非曰忠公由是見免後守鴻臚卿員外散騎常侍卿舍人並如故自為近臣便繁機密每有述製敕前示協時輩榮之卒於官無衾以斂為士子所歎武帝悼惜之為舉哀贈散騎常侍諡曰溫子協少清介有志操初為廷尉正冬服單薄寺卿蔡法度欲解襦以與之憚其清嚴不敢發口謂人曰我願解身上襦與顧郎恐顧郎難衣食者竟不敢以遺之及為舍人同官者皆潤屋協在省一十六載器服飲食不改於常有門生始來事協知其廉潔不敢厚餉止送錢二千協發怒杖二十因此事者絶於饋遺自丁艱憂遂終身布衣蔬食少時將聘從舅息女未成婚而協母亡免喪後不復娶年六十餘此女猶未他適協義而迎之晚雖判合卒無允嗣協博極羣書於文字及禽獸草木尤稱精詳撰異姓苑五卷瑣語十卷文集十卷並行於世徐摛字士秀一字士繢東海郯人也祖憑道宋海陵太守父超之天監初位員外散騎常侍摛幼而好學及長遍覽經史屬文好為新變不拘舊體起家為太學博士會晉安王綱出戍石頭武帝謂周捨曰為我求一人文學俱長兼有德行者欲令與晉安王遊處捨曰臣外弟徐摛形質陋小若不勝衣而堪此選帝曰必有仲宣之才亦不簡其容貌乃以摛為侍讀普通四年王出鎮襄陽遷咨議參軍大通初王總戎北伐以摛兼寧蠻府長史參贊戎政教命軍書多自摛出王入為皇太子轉家令兼管記尋帶領直摛文體既别春坊盡學之宫體之號自斯而起帝聞之怒召摛將加誚責及見應對明敏辭義可觀帝意乃釋因問五經大義次問歷代史及百家雜記末又論釋教摛商較縱橫應答如響帝甚加歎異更被親狎寵遇日隆領軍朱異不恱謂所親曰徐叟出入兩宫漸來逼我須早為之所遂承間白帝曰摛年老又愛泉石意在一郡以自頥養帝謂摛欲之乃召摛曰新安大好山水任昉等並經為之卿為我卧治此郡中大通三年遂出為新安太守為政清靜教人禮義勸課農桑期月風俗便改秩滿還為中庶子是時臨城公納夫人王氏即簡文妃之姪女也晉宋已來初婚三日婦見舅姑衆賔皆列觀引春秋義云丁丑夫人薑氏至戊寅公使大夫宗婦覿用幣戊寅即丁丑之明日故禮官據此皆云宜依舊觀簡文以問摛摛議曰儀禮云質明贊見婦於舅姑雜記又云婦見舅姑兄弟姊妹皆立於堂下政言婦是外宗未審嫺令所以停坐三朝觀其四德舅延外客姑率內賔堂下之儀以備盛禮近代於舅姑本有戚屬不相瞻者夫人乃妃姪女有異他姻覿見之儀謂應可略簡文從其議除太子左衛率太清三年侯景攻陷臺城時簡文居永福省賊衆奔入舉兵上殿侍衛奔散莫有存者摛獨侍立不動徐謂景曰侯公當以禮見何得如此凶威遂折景乃拜由是常憚摛簡文嗣位進授左衛將軍固辭不拜簡文被幽閉摛不獲朝謁因感氣疾而卒贈侍中太子詹事諡貞子年七十八長子陵最知名列在陳史鮑泉字潤嶽東海人也父幾字景元家貧以母老詣吏部尚書王亮干祿亮一見嗟賞舉為舂陵令後為明山賔所薦為太常丞以外兄傅昭為太常依制緦服不得相臨改為尚書郎終於湘東王咨議參軍泉美鬚髯善舉止身長八尺性甚警悟博涉史傳兼有文筆少事元帝為國常侍早見擢任謂曰我文之外無出卿者後為通直侍郎常乘髙幰車從數十左右繖蓋服玩甚精逄國子祭酒王承承疑非舊貴遣訪之泉從者答曰鮑通直承怪焉復欲尋之遣副車問鮑通直復是何許人而得如此都下少年遂為口實見尚豪華人相戲曰鮑通直是何許人而得如此以為笑謔及元帝承制纍遷至信州刺史方等之敗元帝大怒命泉與王僧辨討之僧辨曰計將安出泉曰事等沃雪何所多慮僧辨曰君言文士常談耳江東少有武幹非精兵一萬不可以往竟陵甲卒不久當至猶可重申欲與卿入言之泉許諾及僧辨如向言泉默然不繼元帝大怒於是械僧辨時人比為酈寄泉既專征長沙久而不克元帝乃數泉二十罪為書責之云靣如冠玉還疑木偶鬚似蝟毛徒勞繞喙乃從獄中起王僧辨代泉為都督使舍人羅重歡領齋仗三百人與僧辨往及至長沙遣通泉曰羅舍人被令送王竟陵來泉愕然顧左右曰得王竟陵助我經略賊不足平矣乃拂席坐而待之僧辨入背泉而坐曰鮑郎卿有罪令旨使我鎖卿卿勿以故意見期命重歡出令示泉鎖之牀下泉顔色自若了無懼容曰稽緩王師甘罪是分但恐後人更思鮑泉之憒憒耳僧辨色甚不平泉乃啓陳淹遲之罪元帝尋復其任令與僧辨等逼邵陵於郢州郢州平元帝以世子方諸為刺史泉為長史行府州事方諸見泉和弱每有咨陳未嘗用使泉伏牀騎背為馬書其衣作其姓名由是府州盡相欺侯景密遣將宋子仙任約襲之方諸與泉不恤軍政唯蒱酒自樂云賊何由得至既而傳告者衆始命闔門城陷賊執方諸及泉送之景所後景攻王僧辨於巴陵不克敗還乃殺泉於江夏沈其尸於黃鵠磯初泉夢著朱行水及死舉身帶血而沈於江如其夢泉於儀禮尤明撰新儀三十卷於是時又有鮑行卿以博學大才稱位後軍臨川王録事兼中書舍人遷步兵校尉上玉璧銘武帝發詔褒賞好韻語及拜步兵而謝帝曰作舍人不免貧得五校實大較例皆如此有文集二十卷撰皇室儀十三卷乘輿龍飛記二卷弟客卿位南康太守客卿三子檢正至並才藝知名俱為湘東王佐正好交遊無日不適人人為之語曰無處不逄烏噪無處不逄鮑五正不為湘東王所知獻書告退王恨之及建鄴城陷正為尚書外兵郎病不能起侯景雜於死尸焚之王聞之曰忠非紀信利非象齒焚如棄如於是乎得君子於此知湘東王之不仁檢為湘東鎮西府中記室使蜀不屈於武陵王見害王神念太原祁人也少好儒術尤明內典仕魏位潁川太守與子僧辨據郡歸梁封南成縣侯歷安成武陽宣城內史皆著政績後為青冀二州刺史神念性剛正所更州郡必禁止淫祠時青州東北有石鹿山臨海有神廟祅巫欺惑百姓逺近祈禱縻費極多及神念至便令毁撤風俗遂改後徴為右衛軍卒於官諡曰壯及元帝初追贈侍中中書令改諡忠公神念少善騎射及老不衰嘗於武帝前手執二刀楯左右交度馳馬往來冠絶羣伍時復有楊華者能作驚軍騎亦一時妙捷帝深賞之華本名白花武都仇池人父大眼為魏名將華少有勇力容貌瓌偉魏胡太后逼幸之華懼禍及大眼死擁部曲載父尸改名華來降胡太后追思不已為作楊白花歌辭使宫人晝夜連臂踏蹄歌之聲甚悽斷華後位太子左衛率卒於侯景中神念長子遵業位太僕卿次子僧辨字君才學涉該博尤明左氏春秋言辭辨捷器宇肅然雖射不穿札而有陵雲之氣元帝後為江州刺史僧辨隨府為中兵參軍時有安成望族劉敬躬者田間得白蛆化為金龜將銷之龜生光照室敬躬以為神而禱之所請多驗無賴者多依之平生有德有怨者必報遂謀作亂逺近響應元帝命中直兵參軍曹子郢討之使僧辨襲安成子郢既破其軍敬躬走安成僧辨禽之又討平安州反蠻由是以勇略稱元帝除荆州僧辨為貞毅府咨議參軍代栁仲禮為竟陵太守號雄信將軍屬侯景反元帝命僧辨督舟師一萬兼糧饋赴援裁至京師臺城陷沒天子蒙塵僧辨與仲禮兄弟及趙伯超等先屈膝於景然後入朝景悉收其軍實厚加綏撫而遣僧辨歸於竟陵於是倍道兼行西就元帝元帝承制以僧辨為領軍將軍及荆湘疑二軍師失律元帝命僧辨及鮑泉討之時僧辨以竟陵間部下皆徑卒猶未盡來與泉謀待衆集然後東上及入見元帝帝迎問曰卿已辦乎何日當發僧辨具對所以元帝性忌以為遷延不去大怒案劔厲聲曰卿憚行拒命欲同賊今唯有死耳僧辨對曰今日就戮甘心但恨不見老母元帝斫之中其髀流血至地僧辨悶絶久之方蘇即送付廷尉收其子姪並繫之會嶽陽王軍襲江陵人情搔擾元帝遣就獄出僧辨以為城內都督俄而嶽陽奔退鮑泉力不能克長沙帝乃命僧辨代之僧辨仍部分將帥并力攻圍遂平湘土還復領軍將軍侯景浮江西寇軍次夏首僧辨為大都督率淳于量杜龕王琳裴之橫四州刺史俱赴西陽因據巴陵帝又命羅州刺史徐嗣徽武州刺史杜崱會之景既陷郢城進寇荆州宋子仙前驅一萬造巴陵景悉遣凶徒水步繼進於是緣江屯戍望風請服僧辨悉上江渚並沈公私船於水及賊前鋒至僧辨分命衆軍乘城固守偃旗卧鼓示若無人翌日賊衆濟江輕騎至城下謂城中曰語王領軍何不早降僧辨使人答曰大軍但向荆州此城自當非礙僧辨百口在人掌握豈得降賊既而景師船艦並集登岸治道耀軍城東隴上除開八道向城遣五千兔頭肉薄苦攻城內同時鼓譟矢石雨下賊乃引退元帝又命平北將軍胡僧祐率兵援僧辨是日賊復攻城不克又為火艦燒柵風不便自焚而退有流星墮其營中賊大駭相顧失色賊既頻戰挫衄而賊帥任約又為陸法和所禽景乃燒營夜遁旋軍夏首元帝䇿勳行賞以僧辨為征東將軍開府儀同三司江州刺史封長寧縣公帝乃命僧辨率巴陵諸軍沿流討景攻拔魯山仍攻郢即入羅城又有大星如車輪墜賊營去地十丈變成火一時碎散有龍自城出五色光曜入城前鸚鵡洲水中景聞之倍道歸建鄴賊帥宋子仙等困蹙求輸郢城身還就景僧辨偽許之子仙謂為信然浮舟將發僧辨命杜龕鼓譟掩至大破之禽子仙丁和等送江陵元帝命生釘和舌臠殺之郢州既平僧辨進師尋陽軍人多夢周何二廟神云吾已助天子討賊自稱征討大將軍並乘朱航俄而反曰已殺景同夢者數十百焉元帝乃加僧辨侍中尚書令征東大將軍給鼓吹一部僧辨乃表皇帝凶問告於江陵仍率大將百餘人連名勸元帝即位雖未見從並蒙優答僧辨於是發自江州直指建鄴緣江州郡鎮戍皆降先是陳武帝率衆五萬出自南江前軍五千行至湓口武帝性倜儻多謀䇿名蓋僧辨僧辨畏之既至湓口與僧辨會於白茅洲為盟登壇歃血共讀盟文皆淚下霑襟辭色慷慨及發鵲頭中江而風浪師人咸懼僧辨再拜告天曰僧辨忠臣奉辭伐罪社稷中興當使風息若鼎命中淪請從此逝言訖風止自此遂泛安流有羣魚躍水飛空引導賊望官軍上有五色雲雙龍挾艦行甚迅疾及王師次南洲賊帥侯子鑒等率步騎萬餘人出戰僧辨大破之賊衆赴水僧辨即督諸軍沿流而下進軍於石頭之斗城作連營以逼賊景自出大戰於石頭城北陳武帝謂僧辨曰醜虜遊魂貫盈已稔逋誅送死欲為一決我衆賊寡宜分其勢即遣強弩二千張攻城西靣兩城仍使結陳以當賊僧辨在後麾軍而進復大破之盧暉略聞景戰敗乃以石頭城降僧辨引軍入據之景北走朱方僧辨命衆將入據臺城其夜軍人失火燒太極殿及東西堂僧辨雖有滅賊之功而馭下無法軍人鹵掠京邑被執縳者男女裸露袒衣不免盡驅迫居民以求贖金自石頭至東城緣淮號呌之聲震響京邑百姓失望翻思侯景焉僧辨命侯瑱裴之橫東追景僧辨收賊黨王偉等二十餘人送於江陵偽行臺趙伯超自吳松江降於侯瑱瑱送至僧辨僧辨謂曰卿荷國厚恩乃復同逆今日之事將欲何如因命送江陵伯超既出僧辨顧坐客曰朝廷昔唯知趙伯超耳豈識王僧辨乎社稷既傾為我所復人之興廢亦復何如賔客皆前稱歎功德僧辨戄然乃謬答曰此乃聖上威德羣帥之用命老夫雖濫居戎首何力之有焉於是逆寇悉平京邑克定元帝即位以僧辨功進授鎮軍衛將軍司徒加班劔二十人改封永寧郡公侍中尚書令如故先是天監中沙門釋寶志為讖云太嵗龍將無理蕭經霜草應死餘人散十八子時言蕭氏當滅李氏代興及湘州賊陸納等攻破衡州刺史丁道貴而李洪雅又自零陵稱助討納既而朝廷未逹其心詔徵僧辨就宜豐侯修南征為都督東上諸軍事以陳武帝為都督西下諸軍事先是陳武帝讓都督於僧辨僧辨不受故元帝分為東西都督而俱南討焉尋而洪雅降納納以為應符於是共議拜洪雅為大將軍尊事為主洪雅乘平肩大輿繖蓋鼓吹羽儀悉備翼從入長沙城時納等據車輪夾岸為城士卒皆百戰之餘戈甲精嚴徒黨勇鋭蒙衝鬭艦亘水陵山時天日清明初無雲霧軍發之際忽然風雨時人謂為泣軍百姓竊言知其敗也三月庚寅有兩龍自城西江中騰躍升天五色分明遙映江水百姓咸仰靣目之父老或聚而悲竊相謂曰地龍已去國其亡乎初納造大艦一名曰三王艦者邵陵王河東王桂陽嗣王三人並為元帝所害故立其像於艦祭以太牢加其節蓋羽儀鼓吹每戰輒祭之以求福又造二艦一曰青龍艦二曰白虎艦皆衣以牛皮並高十五丈選其中尤勇健者乘之僧辨憚之稍作連城以逼焉賊不敢交鋒並懷懈怠僧辨因其無備親執旗鼓以誡進止羣賊大敗歸保長沙僧辨命築壘圍之而自出臨視賊知不設備其黨吳藏李賢明等蒙楯直進僧辨尚據胡牀不為之動指麾勇敢遂斬賢明賊乃退歸初陸納作逆以王琳為辭云若放王琳自當降服時衆軍未之許會武陵王紀擁衆上流內外駭懼帝乃遣琳和解之湘州乃平因被詔會衆軍西討俄而武陵敗績僧辨班師是時齊文宣帝遣郭元建帥衆大治舟艦於合肥將謀襲建鄴又遣其大將東方老等繼之時陳武帝鎮建康馳報江陵元帝即詔僧辨急下赴援僧辨次姑孰即留鎮焉先命豫州刺史侯瑱築壘於東關以拒北軍徵吳郡太守張彪吳興太守裴之橫擊之大敗北軍僧辨率衆軍振旅歸於建鄴承聖三年二月詔以僧辨為太尉車騎大將軍頃之丁母憂母太夫人魏氏王神念據合肥日娶為繼室生僧辨僧辨下獄夫人流淚徒行將入謝罪元帝不與相見時貞惠太子有寵母詣閣自陳無訓涕泗嗚咽衆並憐之及僧辨免夫人深相責勵辭色俱嚴雖克復舊都功蓋宇內夫人常自謙損不以富貴驕物朝野稱之謂為明哲婦人及亡元帝甚見愍悼且以僧辨勳業隆重喪禮有加焉命侍中謁者監護喪事諡曰貞敬夫人靈柩將歸建康又遣謁者至舟渚弔祭其年十月西魏相宇文黑獺遣兵及嶽陽王察衆合五萬將襲江陵元帝召僧辨於建鄴為大都督荆州刺史俄而荆州已滅宫車晏駕及敬帝初即梁王位僧辨豫援立功承制進驃騎大將軍中書監都督中外諸軍事録尚書與陳武帝參謀討伐時齊文宣帝又納貞陽侯蕭淵明為梁嗣因與僧辨書並淵明亦頻與僧辨書論還國繼統之事僧辨不納及淵明與齊上黨王高渙至於東關散騎常侍裴之橫所率之衆敗績僧辨遂謀納淵明仍書定君臣之禮因遣第七子顯顯所生劉并弟子珍往充質遣左户尚書周𢎞正至歷陽迎淵明又遣吏部尚書王通送啓因求以敬帝為皇太子淵明報書許之僧辨遣使送質於鄴淵明求度衛士三千僧辨慮其為變授散卒千人而已并遣龍舟法駕往迎淵明濟江之日僧辨擁楫中流不敢就岸後乃同會於江寧浦淵明既踐位授僧辨大司馬領太子太傅揚州牧如故陳武帝時為司空南徐州刺史惡其翻覆與諸將議因自京口舉兵十萬水陸俱至襲建康僧辨常處於石頭城是日視事軍人已踰城北而入南門又馳白有兵來僧辨與其第三子頠遽走出閣衆軍總至僧辨計無所出乃據南門樓拜請求哀陳武帝因縱火焚之方共頠下樓就執陳武帝謂曰我有何辜公欲與齊師賜討又曰何意全無防備僧辨曰委公北門何謂無備是夜及子頠俱被絞殺初僧辨平建鄴遣陳武帝守京口推以赤心結廉藺之分且為第三子頠許娶陳武帝章后所生女未婚而僧辨母亡雖然情好甚密其長子顗屢諫不聼至是江淮人報云齊兵大舉至夀春僧辨謂齊軍必出江表因遣記室參軍江旰以事報陳武帝仍使整舟艦器械陳武帝宿有圗僧辨志及聞命留旰城中䘖枚而進知謀者唯侯安都周文育而已外人但謂江旰徵兵扞北安都舟艦將次石頭陳武帝控馬未進安都大懼乃追陳武帝罵曰今日作賊事勢已成生死須決在後欲何所望若敗俱死後期得免斫頭邪陳武帝曰安都嗔我乃敢進遂克之時夀春竟無齊軍又非陳武帝之譎始天授也顗承聖初位侍中魏克江陵隨王琳入齊為竟陵郡守齊遣王琳鎮夀春將圗江左及陳平淮南殺琳顗聞之乃出郡城南登髙冢上號哭一慟而絶顗弟頒少有志節恆隨元帝及荆州覆滅入於魏僧辨既亡弟僧智得就任約約敗走僧智肥不能行又遇害僧智弟僧愔位譙州刺史征蕭勃及聞兄死引軍還時吳州刺史羊亮𨽻在僧愔下與僧愔不平密召侯瑱見禽僧愔以名義責瑱瑱乃委罪於將羊鯤斬之僧愔復得奔齊與徐嗣徽等挾齊軍攻陳軍敗竄逸荒野莫知所之仰天嘆曰讐恥不雪未欲身膏草野若精誠有感當得道路誓不受辱人手拔刀將自刎聞空中催令急去僧愔異之勉力馳進行一里許顧向處已有陳人踰越江山僅得歸齊徐嗣徽髙平人父雲伯自青部南歸位終新蔡太守侯景之亂嗣徽歸荆州元帝以為羅州刺史及弟嗣産嗣宗並有武用嗣徽從征巴邱以功為太子右衛率監南荆州徐州之亡任秦州刺史嗣産先在建鄴嗣宗自荆州滅亡中逃得至都從弟嗣先即僧辨之甥復為比邱慧暹藏得脫俱還及僧辨見害兄弟抽刀裂眥志在立功俱逃就兄嗣徽密結南豫州刺史任約與僧辨故舊圗陳武帝帝遣江旰説之嗣徽執旰送鄴乞師焉齊文宣帝授為儀同命將應赴及石頭敗退復請兵於齊與任約王曄席臯同心渡江及戰敗嗣徽墮馬嗣宗援兄見害嗣産為陳武軍所禽辭色不撓而死任約王曄得北歸羊侃字祖欣泰山巨平人晉太僕卿琇之七世孫也祖規之宋任城令魏太武南伐至鄒山規之與魯郡太守崔邪利等降太武官至營州刺史父祉歷位牧守纍遷平南將軍天性酷虐列在魏酷吏傳侃少而瑰偉身長七尺八寸雅愛文史博涉書記尤好左氏春秋及孫吳兵法弱冠隨父在梁州立功初為尚書郎以力聞魏帝嘗謂曰郎官謂卿為虎豈羊質虎皮乎試作虎狀侃因伏以手抉殿沒指魏帝壯之賜以珠劔正光中秦州羌莫折念生據州反乃遣其弟天生攻陷岐州寇雍州侃為偏將𨽻蕭寶夤往討之射殺天生其衆即潰以功為征東大將軍東道行臺領太山太守進爵巨平侯初其父祉有南歸之志常謂諸子曰人生安可久淪異域汝等可歸奉東朝侃至是將舉衆濟河以成先志其從兄兖州刺史敦密知之據州拒侃侃乃率精兵三萬襲之不克仍築十餘城以守之梁朝賞授一與元法僧同魏帝聞之使授侃驃騎大將軍司徒太山郡公長為兖州刺史侃斬其使魏人大駭令僕射于暉率衆十萬及高歡爾朱陽都等相繼而至圍侃十餘重殺傷甚衆柵中矢盡南軍不進乃夜潰圍而出一日一夜乃出魏境至渣口衆尚萬餘人馬二千匹將入南士卒竟夜悲歌侃乃謝曰卿等懷土理不能見隨幸適去留於此各拜辭去侃以大通三年至建鄴授徐州刺史并其兄默及三弟忱給元皆拜刺史侃封高昌縣侯纍遷太子左衛率侍中車駕幸樂遊苑侃豫宴時少府奏新造兩刃矟成長二丈四尺圍一尺三寸帝因賜侃河南國紫騮馬令試之侃執矟上馬左右擊刺特盡其妙觀者登樹帝曰此樹必為侍中折矣俄而果折故號此矟為折樹矟北人降者唯侃是衣冠餘緒帝寵之踰於他者謂曰朕少時捉矟形勢似卿今失其舊體殊覺不竒上乃製武宴詩三十韻示侃侃即席上應詔帝覽曰吾聞仁者有勇今見勇者有仁可謂鄒魯遺風英賢不絶是日詔入直殿省啓尚方仗不堪用上大怒坐者非一及侯景作逆果弊於仗粗後遷都官尚書時尚書令何敬容用事與之並省未嘗遊造左衛蘭欽同侍宫宴辭色少交侃於坐折之曰小子汝以銅鼓買朱異作父韋粲作兄何敢無宜適朱時在席後華林法會欽拜謝於省中王銓謂欽曰卿能屈膝廉公彌見盡美然羊公意猶未釋容能更置一拜欽從之宦者張僧允嘗候侃侃曰我牀非閹人所坐竟不前之時論美其貞正太清元年為侍中會大舉北侵以侃為冠軍將軍監作寒山堰事堰立侃勸元帥貞陽侯淵明乘水攻彭城不見納既而魏援大至侃頻言乘其逺來可擊明日又勸出戰並不從侃乃率所領頓堰上及衆軍敗侃結陳徐還二年復為都官尚書侯景反攻陷歷陽帝問侃討景之䇿侃求以二千人急據采石令邵陵王襲取夀春使景進不得前退失巢窟烏合之衆自然瓦解議者謂景未敢逼都遂寢其䇿令王質往侃曰今兹敗矣仍令侃率千餘騎拒之頓望國門景至新林追侃入副宣城王都督城內諸軍事時景既卒至百姓競入公私混亂無復次序侃乃區分防擬皆以宗室間之軍人爭入武庫自取器甲所司不能禁侃命斬數人方得止是時梁興四十七年境內無事公卿在位及閭里士大夫莫見兵甲賊至卒逼公私駭震時夙將已盡後進少年並出在外城中唯有侃及柳津韋黯津年老且疾黯懦而無謀軍旅指撝一決於侃侃膽力俱壯簡文深仗之及賊逼城衆皆恟懼侃偽稱得外射書云邵陵西昌侯已至近路衆乃少安賊攻東掖門縱火甚盛侃以水沃滅火射殺數人賊乃退加侍中軍師將軍有詔送金五千兩銀萬兩絹萬匹賜戰士侃辭不受部曲千餘人並私加賞賚賊又為尖項木驢攻城矢石所不能制侃作雉尾炬施鐡鏃以油灌之擲驢上焚之俄盡賊又東西兩靣起土山以臨城城中震駭侃命為地道潛引其土山不能立賊又作登城樓高十餘丈欲臨射城中侃曰車高塹虗彼來必倒可卧而觀之及車動果倒衆皆服焉賊既頻攻不捷乃築長圍朱異張綰議出擊之帝以問侃侃曰不可賊多日攻城既不能下故立長圍欲引城中降者耳今擊之出人若少不足破賊若多則一旦失利自相騰踐門隘橋小必大致挫衄此乃示弱非耀王威也不從遂使千餘人出戰未及交鋒望風退走以爭橋赴水死者大半初侃長子鷟為景所獲執來城下謂曰我傾宗報主猶恨不足豈復計此一子幸早殺之數日復持來侃謂鷟曰久以汝為死今尚在邪吾以身許國誓死行陳終不以爾而生進退因引弓射之賊感其忠義亦弗之害景遣儀同傅士哲呼侃與語曰侯王逺來問訊天子何為閉拒不時進納尚書國家大臣宜啓朝廷侃曰侯將軍奔亡之後歸命國家重鎮方城懸相任寄何所患苦忽致稱兵虜馬飲淮矢集帝室豈有人臣而至於此吾不能妄受浮説開門揖盜士哲無以應乃曰在北之日久挹風猷願去戎服得一相見侃為免胄士哲瞻望久之而去其為北人所欽慕如此後大雨城內土山崩賊乘之垂入苦戰不能禁侃乃令多擲火為火城以斷其路徐於城內築城賊不能進十二月遇疾卒於城內贈侍中護軍將軍子球嗣侃少而雄勇旅力絶人用弓至二十餘石馬上用六石常於兖州堯廟踏壁直上至五尋橫行得七迹泗橋有數石人長八尺大十圍侃執以相擊悉皆破碎侃性豪侈善音律自造採蓮棹歌兩曲甚有新致姬妾列侍窮極奢靡有彈筝人陸大喜著鹿角爪長七寸舞人張淨琬腰圍一尺六寸時人咸推能掌上舞又有孫荆玉能反腰貼地銜得席上玉簪敕賚歌人王娥兒東宫亦賚歌者屈偶之並妙盡竒曲一時無對初赴衡州於兩艖䒀起三間通梁水齋飾以珠玊加之錦繢盛設帷屏陳列女樂乘潮解纜臨波置酒緣塘傍水觀者填咽大同中魏使陽斐與侃在北嘗同學有詔令侃延斐同宴賔客三百餘人食器皆金玊雜寶奏三部女樂至夕侍婢百餘人俱執金花燭侃不飲酒而好賔遊終日獻酬同其醉醒嘗南還至漣口置酒有客張孺才者醉於船中失火延燒七十餘艘所燔金帛不可勝數侃聊不挂意命酒不輟孺才慙懼逃匿侃慰諭使還待之如舊侃第三子鵾字子鵬隨侃臺內城陷竄於陽平侯景以其妹為小妻故呼還待之甚厚及景敗鵾密圗之乃隨其東走景於松江戰敗唯餘三舸下海欲向蒙山會景晝寢鵾語海師此中何處有蒙山汝但聼我處分遂直向京口至胡豆洲景覺大驚問岸上云郭元建猶在廣陵景大喜將依之鵾拔刀叱海師使向京口鵾與王元禮謝答仁弟葳㽔並景之昵也三人謂景曰我等為王百戰百勝自謂無敵卒至於此豈非天乎今就王乞頭以取富貴景欲透水鵾抽刀斫之景走入船中以小刀抉船鵾以矟入刺殺之景僕射索超世在别船葳㽔以景命召之斬於京口元帝以鵾為通直散騎常侍都督青冀二州刺史封昌國縣侯賜錢伍伯萬米伍千石布絹各千匹又領東陽太守征陸納加散騎常侍除西晉州刺史破郭元建於東關遷東晉州刺史承聖三年西魏圍江陵鵾赴援不及從王僧愔征蕭勃於嶺表聞僧辨敗乃還為侯瑱所破遇害年二十八羊鴉仁字孝穆太山巨平人也少驍勇仕郡為主簿普通中率兄弟自魏歸梁封廣晉侯征伐青齊間纍有功績位至都督北司州刺史及侯景降詔鴉仁督和州刺史桓和之仁州刺史湛海珍等趣懸瓠應接景至仍為都督司豫二州刺史鎮懸瓠會侯景敗於渦陽魏軍漸逼鴉仁恐糧運不繼遂還北司州上表陳謝帝大怒鴉仁懼頓軍入淮上及侯景反鴉仁率所部入援太清二年景既背盟鴉仁乃與趙伯超及南康王會理共攻賊於東府城反為賊所敗臺城陷景以為五兵尚書鴉仁常思奮發謂所親曰吾以凡流受寵朝廷竟無報效以答重恩今若以此終沒有餘責因泣下見者傷焉三年出奔江西將赴江陵至東莞為故徐州刺史荀伯道子晷所害臨死以報效不終因而泣下後鴉仁兄子海珍知之掘晷父伯道并祖及所生母合五喪各分其半骨共棺焚之半骨雜他骨作五袋盛之銘袋上曰荀晷祖父母某之骨鴉仁子亮侯景亂後移至吳州刺史隨王琳以名將子見禮甚隆為人多酒無賴醉後為閹豎所殺胡僧祐字願果南陽冠軍人也少勇決有武幹仕魏至銀青光祿大夫以大通二年避爾朱氏之難歸梁頻上封事武帝器之拜文德主帥歸使戍項城魏克項城因入魏中大通元年陳慶之送魏北海王元皓入洛陽僧祐又歸梁除天水天門二郡太守有善政性好讀書不解綴文然每在公宴必強賦詩文辭鄙野多被嘲謔僧祐恬然自若謂已實工矜伐彌甚晚事元帝為鎮西録事參軍屬侯景之亂西沮羣蠻悉反元帝遣僧祐往討之使盡誅其渠帥僧祐諫忤旨下獄大寶二年侯景寇荆峽遂圍王僧辨於巴陵元帝乃引僧祐於獄拜假節武猛將軍封新市縣侯令赴援僧祐將發泣下謂其子玘曰汝可開兩門一擬朱一擬白吉則由朱門凶則由白門吾不捷不歸也元帝聞而壯之前至赤沙亭景遣其將任約率鋭卒五千據白塉遙以待之會陸法和至僧祐乃與并軍擊大破之禽約送江陵侯景聞之遂遁元帝以僧祐為侍中領軍將軍召還荆州厚自封植以所加鼓吹恆置齋宇對之自娛人曰此是羽儀公名望隆重不宜若此答曰我性愛之恆須見耳或出遊亦以自隨人士笑之承聖二年為車騎將軍開府儀同三司及西魏兵至以僧祐為都督城東諸軍事魏軍四靣起攻百道齊發僧祐親當矢石晝夜督戰所向摧破賊莫敢前俄中流矢卒年六十三元帝聞之馳往臨哭於是內外惶駭城遂陷杜崱京兆杜陵人也其先自北歸南居於雍州之襄陽子孫因家焉父懷寶少有志節天監中纍有軍功後又立功南鄭位梁秦二州刺史大同初魏軍復圍南鄭懷寶命第三子嶷帥二百人迎魏前鋒戰於光道寺流矢中其目失馬敵人交矟將至嶷斬其一騎而上馳以歸嶷旅力絶人便馬善射一日中戰七八合所佩霜明朱弓四石餘力斑絲纒矟長二丈五同心敢死士百七十人每出殺傷數百人敵人憚之號為杜虎懷寶卒於州諡曰桓侯嶷位西荆州刺史時讖言獨梁之下有瞎天子元帝以嶷其人也會嶷改葬父祖帝敕圗墓者惡為之逾年而嶷卒崱嶷弟也幼有志氣居鄉里以膽勇稱後為新興太守太清三年隨嶽陽王來襲荆州元帝與崱兄岸有舊密以書邀之崱乃與兄岸弟幼安兄子龕等夜歸元帝帝以為武州刺史封枝江縣侯仍隨領軍王僧辨東討侯景至巴陵景遁加侍中進爵為公仍隨僧辨追景至石頭與賊相持於橫嶺及戰景親率精鋭左右衝突崱從嶺後橫截之景乃敗崱入據臺城景平加散騎常侍江州刺史是月齊將郭元建攻秦州刺史嚴超逹於秦郡王僧辨令崱赴援時陳武帝亦自歐陽來會元建衆却崱因縱兵大破之元建遁時元帝執王琳於江陵其長史陸納等於長沙反元帝召崱與王僧辨討之及納等戰於車輪大破之納等走保長沙崱等圍之後納等降崱又與僧辨西討武陵王於硤口至即破平之於是旋鎮遇病而卒諡曰武崱兄弟九人兄嵩岑嵸岌嶷巚岸及弟幼安並知名岸字公衡太清中與崱隨嶽陽王察攻荆州同歸元帝帝以為北梁州刺史封江陵縣侯岸請以五百騎襲襄陽去城三十里城中覺之察夜知其師掩襄陽以岸等襄陽豪帥於是夜遁歸襄陽岸等知察至遂奔其兄南陽太守巚於廣平察遣將尹正薛暉等攻拔之獲巚岸等并其母妻子女並斬於襄陽北門察母龔保林數岸於衆岸曰老婢教汝兒殺叔乃枉害忠良察命拔其舌臠而烹之盡誅諸杜宗族親者幼弱下蠶室又發其墳墓燒其骸骨灰而揚之并以為漆䯛及建鄴平崱兄弟發安寧陵焚之以報漆䯛之酷元帝亦不責也幼安性至孝寬厚雄勇過人與兄崱同歸元帝帝以為荆州刺史封華陽縣侯與王僧辨討河東王譽於長沙平之又令助徐文盛東討侯景至貝磯大破景將任約斬其儀同叱羅子通湘州刺史趙威方等仍進軍大舉漢口别攻拔武昌景度蘆洲上流以壓文盛幼安與衆軍大敗之會景密遣騎襲陷郢州執刺史方諸人情大駭文盛由漢口遁歸衆軍大敗幼安降景景以其多反覆殺之徐文盛字道茂彭城人也家本魏將父慶之天監初自北歸南未至道卒文盛仍統其衆稍立功績大同末為寧州刺史州在僻逺群蠻劫竊相尋前後刺史竟莫能制文盛推心撫慰夷人感之風俗遂改太清二年聞國難乃召募得數萬人來赴元帝以為秦州刺史加都督授以東討之略東下至武昌遇侯景將任約遂與相持元帝又命護軍將軍尹悅平東將軍杜幼安巴州刺史王珣等會之並受文盛節度大敗約於貝磯約退保西陽文盛進據蘆洲又與相持景聞之率大衆西援約至西陽諸將咸曰景水軍輕進又甚飢疲擊之必大捷文盛不許文盛妻石氏先在建鄴至是景載以還之文盛深德景遂密通信使都無戰心衆咸憤怨杜幼安宋簉等乃率所領獨進大破景獲其舟艦以歸會景密遣騎間道陷郢州軍中懼遂大潰文盛奔還荆州元帝仍以為城北靣大都督又聚斂贓汙甚多元帝下令數其十罪除其官爵文盛多懷怨望元帝聞之乃以下獄時任約被禽與文盛同禁文盛謂約曰何不早降令我至此約曰門外不見卿馬迹使我何處得降文盛無以答遂死獄中隂子春字幼文武威姑臧人也晉義熙末曾祖襲隨宋武帝南遷至南平因家焉父智伯與武帝鄰居少相友善嘗入武帝卧內見有異光成五色因握帝手曰公後必大貴非人臣也天下方亂安蒼生者其在君乎帝曰幸勿多言於是情好轉密帝每有求如外府焉及帝踐阼拜梁秦二州刺史子春仕歷位朐山戍主東管太守時青州石鹿山臨海先有神廟刺史王神念以百姓祈禱糜費毁神影壞屋舍當坐棟上有一大蛇長丈餘役夫打撲不禽得入海水爾夜子春夢見人通名詣子春云有人見苦破壞宅舍既無所託欽君厚德欲憩此境子春心密記之經二日而知之甚驚以為前所夢神因辦牲醑請召安置一處數日復夢一朱衣人相聞辭謝云得君厚恩當以一州相報子春心喜供事彌勤經月餘魏欲襲朐山間諜前知子春設伏摧破之詔授南青州刺史鎮朐山又遷都督梁秦二州刺史子春雖無他才行臨人以廉潔稱閨門混雜而身服垢汙腳數年一洗言每洗則失財敗事云在梁州以洗足致梁州敗太清二年徵為左衛將軍遷侍中屬侯景亂元帝令子春隨王僧辨攻邵陵王於郢州平之又與左衛將軍徐文盛東討侯景至貝磯與景遇子春力戰常冠諸軍值郢州陷沒軍遂敗退大寶二年卒於江陵子鏗列在陳史王琳字子珩會稽山隂人也本兵家元帝居蕃琳姊妹並入後庭見幸琳由此未弱冠得在左右少好武遂為將帥太清二年帝遣琳獻米萬石未至都城陷乃中江沈米輕舸還京稍遷嶽陽內史以軍功封建寧縣侯侯景遣將宋子仙據郢州琳攻克之禽子仙又隨王僧辨破景後拜湘州刺史琳果徑絶人又能傾身下士所得賞物不以入家麾下萬人多是江淮群盜平景之勳與杜龕俱為第一由是恃寵縱暴於建鄴王僧辨禁之不可懼將為亂啓請誅之琳亦疑禍及令長史陸納率部曲前赴湘州身輕上江陵陳謝將行謂納等曰吾若不反子將安之咸曰請死相泣而别及至帝以下吏而使廷尉卿黃羅漢太舟卿張載宣喻琳軍陸納等及軍人並哭對使者莫肯受命乃縶黃羅漢殺張載載性刻為帝所信荆州人疾之如讐故納等因人之欲抽其腸繫馬腳使繞而走腸盡氣絶又臠割備五刑而斬之元帝遣王僧辨討納納等敗走長沙是時湘州未平武陵王紀兵下又甚盛江陵公私恐懼人有異圗納啓申琳無罪請復本位求為奴婢元帝乃鎖琳送之時納出兵方戰會琳至僧辨升諸樓車以示之納等投戈俱拜舉兵皆哭曰乞王郎入城即出及放琳入納乃降湘州平仍復琳本位使拒武陵王紀紀平授衡州刺史元帝性多忌以琳所部甚盛又得衆心故出之嶺外又授都督廣州刺史其友人主書李膺帝所任遇琳告之曰琳蒙拔擢常思畢命以報國恩今天下未平遷琳嶺外如有萬一不虞安得琳力忖官正疑琳耳琳分望有限可得與官爭為帝乎何不以琳為雍州刺史使鎮武寧琳自放兵作田為國禦捍若警急動靜相知孰若逺棄嶺南相去萬里一日有變將欲如何琳非願長坐荆南正以國計如此耳膺然其言而不敢啓故遂率其衆鎮嶺南元帝為魏圍逼乃徵琳赴援除湘州刺史琳師次長沙知魏平江陵立梁王察乃為元帝舉哀三軍縞素遣别將侯平率舟師攻梁琳屯兵長沙傳檄諸方為進趣之計時長沙蕃王蕭韶及上流諸將推琳主盟侯平雖不能渡江頻破梁軍又以琳兵威不接翻更不授指麾琳遣將討之不克又師老兵不能進乃遣使奉表詣齊并獻馴象又使獻款於魏求其妻子亦稱臣於梁陳武帝既殺王僧辨推立敬帝以侍中司空徵琳琳不從命乃大營樓艦將圗義舉琳將軍張平他乘一艦每將戰勝艦則有聲如野豬故琳戰艦以千數皆以野豬為名陳武帝遣將侯安都周文育等討琳仍受梁禪安都嘆曰我其敗乎師無名矣逆戰於沌口琳乘平肩輿執鉞而麾之禽安都文育其餘無所脫漏惟以周鐡虎一人背恩斬之鎖安都文育置琳所坐艦中令一閹豎監守之琳乃移湘州府就郢城帶甲十萬練兵於泉浦琳徇軍而言曰可以為勤王之師矣溫太真何人哉南江渠帥熊曇朗周迪懷二琳遣李孝欽樊猛與余孝頃同討之三將軍敗並為迪所囚安都文育等盡逃還建鄴初魏克江陵之時永嘉王莊年甫七嵗逃匿人家後琳迎還湘中衛送東下及敬帝立出質於齊請納莊為梁主齊文宣遣兵援送仍遣兼中書令李騊駼册拜琳為梁丞相都督中外諸軍事録尚書事又遣中書舍人辛慤遊詮之等齎璽書江表宣勞自琳以下皆有頒賜琳乃遣兄子叔寶率所部十州刺史子弟赴鄴奉莊纂梁祚於郢州莊授琳侍中使持節大將軍中書監改封安成郡公其餘並依齊朝前命及陳文帝立琳乃輔莊次於濡須口齊遣揚州道行臺慕容儼率衆臨江為其聲援陳遣安州刺史吳明徹江中夜上將襲盆城琳遣巴陵太守任忠大敗之明徹竟以身免琳兵東下陳遣太尉侯瑱司空侯安都等拒之瑱等以琳軍方盛引軍入蕪湖避之時西南風至琳謂得天道將直取揚州侯瑱等徐出蕪湖躡其後比及兵交西風翻為瑱用琳兵放火燧以擲瑱􅊑者皆反燒其􅊑琳􅊑艦潰亂兵士透水死者十二三其餘皆棄􅊑上岸為陳軍所殺殆盡初琳命其長史袁泌御史中丞劉仲威同典兵侍衛莊及軍敗泌遂降陳仲威以莊投歷陽又送夀陽琳尋與莊同入齊齊孝昭帝遣琳出合肥鳩集義故更圗進取琳乃繕艦分遣招募淮南傖楚皆願戮力陳合州刺史裴景暉琳兄珉之壻也請以私屬導引齊師孝昭委琳與行臺左丞盧潛率兵應赴沈吟不決景暉懼事泄挺身歸齊齊孝昭賜琳璽書令鎮夀陽其部下將帥悉聼以從乃除琳驃騎大將軍開府儀同三司揚州刺史封會稽郡公仍增兵秩兼給鐃吹琳水陸戒嚴將觀釁而動屬陳氏結好於齊使琳更聼後圗琳在夀陽與行臺尚書盧潛不協更相是非被召還鄴齊武成弛而不問除滄州刺史後以琳為特進侍中所居屋脊無故剝破出赤蛆數升汁落地化為血蠕動有龍出於門外之池雲霧起晝晦會陳將吳明徹伐齊齊帝敕領軍將軍尉破胡等出援秦州令琳共為經略琳謂所親曰今太嵗在東南嵗星居斗牛分太白已高皆利為客我將有喪又謂破胡曰吳兵甚鋭宜長䇿制之慎勿輕鬭破胡不從與戰軍大敗琳單馬突圍僅而獲免還至彭城齊令便赴夀陽并許召募又進封琳巴陵郡王陳將吳明徹進兵圍之堰肥水灌城而齊將皮景和等屯於淮西竟不赴救明徹晝夜攻擊城內水氣轉侵人皆患腫死病相枕從七月至十月城陷被執百姓泣而從之吳明徹恐其為變殺之城東北二十里時年四十八哭者聲如雷有一叟以酒脯來至號酹盡哀收其血懷之而去傳首建康懸之於市琳故吏梁驃騎府倉曹參軍朱瑒致書陳尚書僕射徐陵求琳首辭甚感慨陵嘉其志節又明徹亦數夢琳求首并為啓陳主而許之仍與開府主簿劉韶慧等持其首還於淮南權瘞八公山側義故會葬者數千人瑒等乃間道北歸别議迎接尋有揚州人茅智勝等五人密送喪柩逹於鄴贈十五州諸軍事揚州刺史侍中特進開府録尚書事諡曰忠武王葬給輼輬車琳體貌間雅垂髮委地喜怒不形於色雖無學業而強記內敏軍府佐吏千數皆識其姓名刑罰不濫輕財愛士得將卒之心少為將帥屬經喪亂雅有忠義之節雖本圗不遂齊人亦以此重之待遇甚厚及敗為陳軍所執吳明徹欲全之而其下將領多琳故吏爭來致請并相資給明徹由此忌之故及於難當時田夫野老知與不知莫不為之歔欷流泣觀其誠信感物雖李將軍之恂恂善誘殆無以加焉琳十七子長子敬在齊襲王爵武平末通直常侍第九子衍隋開皇中開府儀同三司大業初卒於渝州刺史張彪不知何許人自云家本襄陽城云左衛將軍衡州刺史蘭欽外弟也少亡命在若邱山為盜頗有部曲臨城公大連出牧東揚州彪率所領客焉始為防閣後為中兵參軍禮遇甚厚及侯景將宋子仙攻下東揚州復為子仙所知後去子仙還入若邪舉義征子仙不捷乃走向剡趙伯超兄子稜為侯景山隂令去職從彪後懷異心偽就彪計請酒為盟引刀子披心出血自歃彪信之亦取刀刺血報之刀始至心稜便以手案之望入彪心刀斜傷不得深稜重取刀刺彪靣被傷頓絶稜謂已死因出外告彪諸將言已殺訖欲與求富貴彪左右韓武入視彪已蘇細聲謂曰我尚活可與手於是武遂誅稜彪不死復奉表元帝帝甚嘉之及侯景平王僧辨遇之甚厚引為爪牙與杜龕相似世謂之張杜貞陽侯踐位為東揚州刺史并給鼓吹室富於財晝夜聲樂不息剡令王懷之不從彪自征之留長史謝岐居守會僧辨見害彪不自展拔時陳文帝已據震澤將及會稽彪乃遣沈泰吳寶真還州助岐保城彪後至泰等反與岐迎陳文帝入城彪因其未定踰城而入陳文帝遂走山隂彪復城守沈泰説陳文帝曰彪部曲家口並在香巗寺可往收取遂往盡獲之彪將申進密與泰相和因又叛彪彪復敗走不敢還城據城之西山樓子及暗得與弟崑崙妻楊氏去猶左右數人追隨彪疑之皆發遣唯常所養一犬名黃蒼在彪前後未曾捨離乃還入若邪山中沈泰説陳文帝遣章昭逹領千兵重購之并圗其妻彪眠未覺黃蒼驚吠劫來便囓一人中喉即死彪拔刀逐之映火識之曰何忍舉惡卿須我但可取頭誓不生見陳蒨劫曰官不肯去請就平地彪知不免謂妻楊呼為鄉里曰我不忍令鄉里落他處今當先殺鄉里然後就死楊引頸受刀曾不辭憚彪不下刀便相隨下嶺到平處謂劫曰卿須我頭我身不去也呼妻與訣曰生死從此而别若見沈泰申進等為語曰功名未立猶望鬼道相逄劫不能生得遂殺彪并弟致二首於昭逹黃蒼號呌彪尸側宛轉血中若有哀狀昭逹進車迎彪妻便拜稱陳文帝教迎為家主楊便改啼為笑欣然意悅請昭逹殯彪尸墳冢既畢黃蒼又俯伏冢間呌號不肯離楊還經彪宅謂昭逹曰婦人本在容貌辛苦日久請暫過宅粧飾昭逹許之楊入屋便以刀割髮毁靣哀哭慟絶誓不更行陳文帝聞之歎息不已遂許為尼後陳武帝軍人求取之楊投井決命時寒比出之垂死積火溫燎乃蘇復起投於火彪始起於若邪興於若邪終於若邪及妻犬皆為時所重異楊氏天水人散騎常侍皎之女也有容貌先為河東裴仁林妻因亂為彪所納彪友人吳中陸山才嗟泰等翻背刋吳昌門為詩一絶曰田橫感義士韓王報主臣若為留意氣持寄禹川人通志卷一百四十二
