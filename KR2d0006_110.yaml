body:
  text: 通志卷九十八上宋右迪功郎鄭樵漁仲撰列傳第十一上前漢竇嬰田蚡灌夫韓安國李廣孫陵蘇建子武衛青霍去病李息等董仲舒司馬相如公孫𢎞卜式兒寬張湯子安世夀安世子延杜周子延年延年子緩緩弟欽竇嬰字王孫孝文皇后從兄子也父世觀津人也喜賔客孝文時為吳相病免孝景即位為詹事帝弟梁孝王母竇太后愛之孝王朝因燕昆弟飲是時上未立太子酒酣上從容言曰千秋萬嵗後傳王太后歡嬰引巵酒進上曰天下者髙祖天下父子相傳漢之約也上何以得擅傳梁王太后由此憎嬰嬰亦薄其官因病免太后除嬰門籍不得朝請孝景三年吳楚反上察宗室諸竇無如嬰賢召入見固讓謝稱病不足任太后亦慙於是上曰天下方有急王孫寧可以讓邪乃拜嬰為大將軍賜金千斤嬰言袁盎欒布諸名將賢士在家者進之所賜金陳廊廡下軍吏過輒令財取為用金無入家者嬰守滎陽監齊趙兵七國破封為魏其侯遊士賔客爭歸之每朝議大事條侯魏其列侯莫敢與抗禮四年立栗太子以嬰為傅七年栗太子廢嬰爭弗能得乃謝病屏居藍田南山下數月諸竇賔客辨士説莫能來梁人髙遂乃説嬰曰能富貴將軍者上也能親將軍者太后也今將軍傅太子太子廢爭不能拔又不能死自引謝病擁趙女屏間處而不朝祗加懟自明揚主上之過有如兩宫奭將軍則妻子無類矣嬰然之乃起朝請如故桃侯免相竇太后數言魏其景帝曰太后豈以臣有愛相魏其者魏其沾沾自喜耳沾沾輕薄也音瞻多易難以為相持重遂不用用建陵侯衛綰為丞相田蚡孝景王皇后同母弟也生長陵竇嬰已為大將軍方盛蚡為諸曹郎未貴往來侍酒嬰所跪起如子姓及孝景晚節蚡益貴幸為太中大夫辨有口學盤盂諸書盤盂黃帝史孔甲所作也凡二十六篇王皇后賢之孝景崩武帝初即位蚡以舅封為武安侯弟勝為周陽侯蚡新用事卑下賔客進名士家居者貴之欲以傾諸將相上所填撫多蚡賔客計策會丞相綰病免上議置丞相太尉藉福説蚡曰魏其侯貴久矣天下士素歸之今將軍初興未如即上以將軍為相必讓魏其魏其為相將軍必為太尉太尉相尊等耳又有讓賢名蚡乃微言太后風上於是乃以嬰為丞相蚡為太尉藉福賀嬰因弔曰君侯資性喜善疾惡方今善人譽君侯故至丞相然惡人衆亦且毁君侯君侯能兼容則幸久不能今以毁去矣嬰不能聽嬰蚡俱好儒術推轂趙綰為御史大夫王臧為郎中令迎魯申公欲設明堂令列侯就國除關以禮為服制以興太平舉謫諸竇宗室無節行者除其屬籍時諸外家為列侯多尚主皆不欲就國以故毁日至竇太后太后好黃老言而嬰蚡趙綰等務隆推儒術貶道家言是以竇太后滋不説二年御史大夫趙綰請毋奏事東宫竇太后大怒曰此欲復為新垣平邪乃罷逐趙綰王臧而免丞相嬰太尉蚡以柏至侯許昌為丞相武疆侯莊青翟為御史大夫嬰蚡以侯家居蚡雖不任職以王太后故親幸數言事多效士吏趨藝利者皆去嬰而歸蚡蚡日益橫六年竇太后崩丞相昌御史大夫青翟坐喪事不辦免上以蚡為丞相大司農韓安國為御史大夫天下士郡諸侯愈益附蚡蚡為人貌侵上聲短小也生貴甚又以為諸侯王多長上初即位富於春秋蚡以肺附為相非痛折節以禮屈之天下不肅當是時丞相入奏事語移日所言皆聽薦人或起家至二千石權移主上上乃曰君除吏盡未吾亦欲除吏嘗請考工地益宅上怒曰遂取武庫是後乃退召客飲坐其兄蓋侯王信北鄉自坐東鄉以為漢相尊不可以兄故私撓由此滋驕治宅甲諸第田園極膏腴市買郡縣器物相屬於道前堂羅鐘鼓立曲旃後房婦女以百數諸奏珍物狗馬玩好不可勝數而嬰失竇太后益疏不用無藝諸公稍自引而怠驁唯灌夫獨否故嬰墨墨不得意而厚遇夫也灌夫字仲孺潁隂人也父張孟嘗為潁陰侯灌嬰舍人得幸因進之至二千石故蒙灌氏姓為灌孟吳楚反時潁陰侯灌嬰為將軍屬太尉請孟為校尉夫以千人與父俱孟年老潁陰侯強請之鬱鬱不得意故戰常陷堅遂死吳軍中漢法父子俱有死事得與喪歸夫不肯隨喪歸奮曰願取吳王若將軍頭以報父讐於是夫被甲持戟募軍中壯士所善願從數十人及出壁門莫敢前獨兩人及從奴十餘騎馳入吳軍至戲下所殺傷數十人不得前復馳還走入漢壁亡其奴獨與一騎歸夫身中大創十餘適有萬金良藥故得無死創少瘳又復請將軍曰吾益知吳壁中曲折請復往將軍壯而義之恐亡夫乃言太尉太尉召固止之吳軍破夫以此名聞天下潁隂侯言夫夫為中郎將數嵗坐法去家居長安中諸公莫不稱繇是復為代相武帝即位以為淮陽天下郊徑兵處故徙夫為淮陽太守入為太僕二年夫與長樂衛尉竇甫飲輕重不得夫醉搏甫甫竇太后昆弟上恐太后誅夫徙夫為燕相數嵗坐法家居長安夫為人剛直使酒不好面諛貴戚諸有藝在己之右欲必陵之在己之左愈貧賤尤益禮敬與鈞稠人廣衆薦寵下輩士亦以此多之夫不好文學喜任俠已然諾諸所與交通無非豪桀大猾家纍數千萬食客日數十百人陂池田園宗族賔客為權利橫潁川潁川兒歌之曰潁水清灌氏寧潁水濁灌氏族夫家居卿相侍中賔客益衰及竇嬰失藝亦欲倚夫引繩排根生平慕之後棄者蘇林曰二人相倚引繩直排根賔客去之者不與之交通也孟康曰根者根格引繩以彈排擯根格之也師古曰孟説近之根音下恩反格音下各反言嬰與夫共相提挈有人生平慕嬰夫後見其失職而頗慢弛如此者共排退之不復與交譬如相對挽繩而根格之也今楚俗猶謂牽引前卻為根格也史記作批根批音普結反義猶排也夫亦得嬰通列侯宗室為名髙兩人相為引重其遊如父子然相得歡甚無厭恨相知之晚夫嘗有服過丞相蚡蚡從容曰吾欲與仲孺過魏其侯會仲孺有服夫曰將軍乃肯幸臨况魏其侯夫安敢以服為解請語魏其具將軍旦日蚤臨蚡許諾夫以語嬰嬰與其夫人益市牛酒夜灑掃張具至旦平明令門下候司至日中蚡不來嬰謂夫曰丞相豈忘之哉夫不懌曰夫以服請不宜乃駕自往迎蚡蚡特前戲許夫殊無意往夫至門蚡尚卧也於是夫見曰將軍昨日幸許過魏其魏其夫妻治具自旦至今未敢嘗食蚡悟謝曰吾醉忘與仲孺言乃駕往往又徐行夫愈益怒及飲酒酣夫起舞屬蚡蚡不起夫徙坐語侵之嬰乃扶夫去謝蚡蚡卒飲至夜極歡而去後蚡使籍福請嬰城南田嬰大望曰老僕雖棄將軍雖貴寧可以勢相奪乎不許夫聞怒罵福福惡兩人有隙乃謾好謝蚡謾猶詭也詐為好言讀與慢同曰魏其老且死易忍且待之已而蚡聞嬰夫實怒不豫亦怒曰魏其子嘗殺人蚡活之蚡事魏其無所不可何愛數頃田且灌夫何與也吾不敢復求田由此大怒元光四年春蚡言灌夫家在潁川橫甚民苦之請案之上曰此丞相事何請夫亦持蚡隂事為姦利受淮南王金與語言賔客居間遂已俱解夏蚡取燕王女為夫人太后詔召列侯宗室皆往賀嬰過夫欲與俱夫謝曰夫數以酒失過丞相丞相今者又與夫有隙嬰曰事已解強與俱飲酒酣蚡起為夀坐皆避席伏已嬰為夀獨故人避席餘半膝席夫行酒至蚡蚡膝席曰不能滿觴夫怒因嘻笑曰將軍貴人也畢之時蚡不肯行酒次至臨汝侯灌賢賢方與程不識耳語又不避席夫無所發怒乃罵賢曰生平毁程不識不直一錢今長者為夀乃效女兒曹呫囁耳語呫音唱涉反囁音人涉反蚡謂夫曰程李俱東西宫衛尉李廣為東宫不識為西宫今衆辱程將軍仲孺獨不為李將軍地乎夫曰今日斬頭陷胸何知程李坐乃起更衣稍稍去嬰去戲夫夫出蚡遂怒曰此吾驕灌夫罪乃令騎留夫夫欲出不得籍福起為謝按夫項令謝夫愈怒不肯順蚡乃戲騎縳夫置傳舍召長史曰今日召宗室有詔劾灌夫罵坐不敬繫居室遂其前事遣吏分曹逐捕諸灌氏支屬皆得棄市罪嬰愧為資使賔客請莫能解蚡吏皆為耳目諸灌氏皆亡匿夫繫遂不得告言蚡陰事嬰鋭身為救夫嬰夫人諌曰灌將軍得罪丞相與太后家忤寧可救邪嬰曰侯自我得之自我捐之無所恨且終不令仲孺獨死嬰獨生乃匿其家竊出上書立召入具言灌夫醉飽事不足誅上然之賜嬰食曰東朝廷辨之嬰東朝盛推夫善言其醉飽得過乃丞相以他事誣罪之蚡盛毁夫所為橫恣罪逆不道嬰度無可奈何因言蚡短蚡曰天下幸而安樂無事蚡得為肺附所好音樂狗馬田宅所愛倡優巧匠之屬不如魏其灌夫日夜招聚天下豪桀壯士與議論腹誹而心謗仰視天俯畫地辟倪兩宫間辟音普計反倪音吾計反幸天下有變而欲有大功臣乃不如魏其等所為上問朝臣兩人孰是御史大夫韓安國曰魏其言灌夫父死事身荷戟馳入不測之吳軍被數十創名冠三軍此天下壯士非有大惡爭杯酒不足引他過以誅也魏其言是丞相亦言灌夫通姦猾侵細民家纍巨萬橫恣潁川凌轢宗室侵犯骨肉此所謂枝大於本脛大於股不折必披丞相言亦是唯明主裁之主爵都尉汲黯是魏其內史鄭當時是魏其復不敢堅餘皆莫敢對上怒內史曰公平生數言魏其武安長短今日廷論局趣效轅下駒吾并斬若屬矣即罷起入上食太后太后亦已使人候伺具以語太后太后怒不食曰我在也而人皆藉吾弟令我百嵗後皆魚肉之乎且帝寧能為石人邪此特帝在即録録設百嵗後此屬寧有可信者乎上謝曰俱外家故廷辨之不然此一獄吏所決耳是時郎中令石建為上分别言兩人事蚡已罷朝出止車門召御史大夫安國載怒曰與長孺共一秃翁何為首鼠兩端秃翁言嬰無官位版授也首鼠一前一卻也安國良久謂蚡曰君何不自喜夫魏其毁君君當免冠解印綬歸曰臣以肺附幸得待罪固非其任魏其言皆是如此上必多君有讓不廢君魏其必內愧杜門齰舌自殺今人毁君君亦毁之譬如賈豎女子爭言何其無大體也蚡謝罪曰爭時急不知出此於是上使御史簿責嬰所言灌夫頗不讐欺謾劾繫都司空孝景時嬰嘗受遺詔曰事有不便以便宜論上及繫灌夫罪至族事日急諸公莫敢復明言於上嬰乃使昆弟子上書言之幸得復召見書奏案尚書大行無遺詔詔書獨藏嬰家嬰家丞封乃劾嬰矯先帝詔罪當棄市五月十日悉論灌夫支屬嬰良久乃聞有劾即陽病痱不食欲死或聞上無意殺嬰復食治病議定不死矣乃有飛語為惡言聞上故以十二月晦論棄市渭城春蚡疾一身盡痛若有擊者呼服謝罪上使視鬼者瞻之曰魏其侯與灌夫共守笞欲殺之竟死子恬嗣元朔中有罪免後淮南王安謀反覺始安入朝時蚡為太尉迎安霸上謂安曰上未有太子大王最賢髙祖孫即宫車晏駕非大王立尚誰立哉淮南王大喜厚遺金錢財物上自嬰夫事時不直蚡特為太后故及聞淮南王金事上曰使武安侯在者族矣韓安國字長孺梁成安人也後徙睢陽嘗受韓子雜説騶田生所事梁孝王為中大夫吳楚反時孝王使安國及張羽為將捍吳兵於東界張羽力戰安國持重以故吳不能破梁吳楚破安國張羽名由此顯梁王以至親故得自置相二千石出入遊戲僭於天子天子聞之心弗善也太后知帝不善乃怒梁使者弗見案責王所為韓安國為梁使見大長公主而泣曰何梁王為人子之孝為人臣之忠而太后曽弗省也夫前日吳楚齊趙七國反自關以東皆合從而西鄉惟梁最親為限難梁王念太后帝在中而諸侯擾亂一語泣數行而下跪送臣等六人將兵擊卻吳楚吳楚以故兵不敢西而卒破亡梁王之力也今太后以小節苛禮責望梁王梁王父兄皆帝王所見者大故出稱蹕入言警車旗皆帝所賜也即欲以嫮鄙小縣驅馳國中欲夸諸侯令天下盡知太后帝愛之也今梁使來輒案責之梁王恐日夜涕泣思慕不知所為何梁王之忠孝而太后弗恤也大長公主具以告太后太后喜曰為帝言之言之帝心乃解而免冠謝太后曰兄弟不能相教乃為太后遺憂悉見梁使厚賜之其後梁王益親歡太后長公主更賜安國可直千餘金名由此顯結於漢其後安國坐法抵罪蒙獄吏田甲辱安國安國曰死灰獨不復然乎甲曰然即溺之居無幾梁內史缺漢使使者拜安國為梁內史起徒中為二千石田甲亡走安國曰甲不就官我滅而宗甲因肉袒謝安國笑曰公等足與治乎卒善遇之梁內史之缺也孝王新得齊人公孫詭説之欲請為內史竇太后聞之乃詔王以安國為內史公孫詭羊勝説孝王求為帝太子及益地事恐漢大臣不聽乃陰使人刺漢用事謀臣及殺故吳相袁盎景帝遂聞詭勝等計畫乃遣使捕勝詭必得漢使十輩至梁相以下舉國大索月餘不得安國聞詭勝匿孝王所乃見王而泣曰主辱臣死大王無良臣故事紛紛至此今詭勝不得請辭賜死王曰何至此安國泣數行下曰大王自度於皇帝孰與太上皇之與髙皇帝及皇帝之與臨江王親王曰不如也安國曰夫太上皇臨江親父子間然髙帝曰提三尺劍取天下者朕也故太上皇終不得制事居於櫟陽臨江王適長太子一言之過廢王臨江用宫垣事卒自殺中尉府何者治天下終不用私亂公語曰雖有親父安知其不為虎雖有親兄安知其不為狼今大王列在諸侯訹邪臣浮説犯上禁撓明法天子以太后故不忍致法於大王太后日夜涕泣幸大王自改而大王終不覺寤有如太后宫車即晏駕大王尚誰攀乎語未卒王泣數行而下謝安國曰吾今出之即日詭勝自殺漢使還報梁事皆得釋安國力也景帝太后益重安國孝王卒共王即位安國失官居家武帝即位武安侯田蚡為太尉親貴用事安國以五百金物遺蚡蚡言安國太后上素聞安國賢即召以為北地都尉遷為大司農閩越東越相攻遣安國大行王恢將兵未至越越殺其王降漢兵亦罷其年田蚡為丞相安國遷為御史大夫胸奴來請和親天子下議大行王恢燕人數為邉吏習知胡事議曰漢與胸奴和親率不過數嵗即復背約不如勿許興兵擊之安國曰千里而戰即兵不獲利今胸奴負戎馬足懷鳥獸心遷徙烏集難得而制得其地不足以為廣有其衆不足以為強自上古弗屬漢數千里爭利則人馬罷虜以全制其弊藝必危殆臣故以為不如和親羣臣議者多附安國於是上許和親明年鴈門馬邑豪聶翁一因大行王恢言胸奴初和親親信邊可誘以利致之伏兵襲擊必破之道也上乃召問公卿曰朕飾子女以配單于幣帛文錦賂之甚厚單于待命加嫚侵盜無已邊竟數驚朕甚閔之今欲舉兵攻之何如大行恢對曰陛下雖未言臣固願效之臣聞全代之時北有強胡之敵內連中國之兵然尚得養老長幼種樹以時倉廩富實胸奴不輕侵也今以陛下之威海內為一天下同任又遣子弟乘邉守塞轉粟挽輸以為之備然胸奴侵盜不已者無他以不恐之故耳臣竊以為擊之便御史大夫安國曰不然臣聞髙皇帝嘗圍於平城胸奴至者投鞍髙如城者數所平城之飢七日不食天下歌之及解圍反位而無忿怒之心夫聖人以天下為度者也不以己私怒傷天下之功故乃遣劉敬奉金千斤以結和親至今為五世利孝文皇帝又嘗一擁天下之兵聚之廣武常溪然終無尺寸之功而天下黔首莫不憂者孝文寤於兵之不可宿故復合和親之約此二聖之迹足以為效矣臣竊以為勿擊便恢曰不然臣聞五帝不相襲禮三王不相復樂非故相反也各因世宜也且髙帝身被堅執鋭蒙霧露沭霜雪行幾十年所以不報平城之怨者非力不能所以休天下之心也今邊境數驚士卒傷死中國槥車相望此仁人之所隱也臣故曰擊之便安國曰不然臣聞利不十者不易業功不百者不變常是以古之人君謀事必就祖發政占古語重作事也且自三代之盛夷狄不與正朔服色非威不能制強弗能服也以為逺方絶地不牧之民不足煩中國也且胸奴輕疾悍亟之兵也至如焱風去如收電畜牧為業弧弓射獵逐獸隨草居處無常難得而制今使邊郡久廢耕織以支胡之常事其勢不相權也臣故曰勿擊便恢曰不然臣聞鳯鳥乘於風聖人因於時昔秦繆公都雍地方三百里知時宜之變攻取西戎辟地千里并國十四隴西北地是也及後蒙恬為秦侵胡辟數千里以河為竟纍石為城樹榆為塞胸奴不敢飲馬於河置烽􅥂然後敢牧馬夫胸奴獨可以威服不可以仁畜也今以中國之盛萬倍之資遣百分之一以攻胸奴譬猶以強弩射且潰之癰也必不留行矣若是則北發月氏可得而臣也臣故曰擊之便安國曰不然臣聞用兵者以飽待飢正治以待其亂定舍以待其勞故接兵覆衆伐國墮城常坐而役敵國此聖人之兵也且臣聞之衝風之衰不能起毛羽強弩之末不能入魯縞夫盛之有衰猶朝之必莫也今將卷甲輕舉深入長驅難以為功從行則迫脅橫行則中絶疾則糧乏徐則後利不至千里人馬乏食兵法曰遺人獲也意者有他繆巧可以禽之則臣不知也不然則未見深入之利也臣故曰勿擊便恢曰不然夫草木遭霜者不可以風過清水明鏡不可以形逃通方之士不可以文亂今臣言擊之者固非發而深入也將順因單于之欲誘而致之邊吾選梟騎壯士陰伏而處以為之備審遮險阻以為其戒吾勢已定或營其左或營其右或當其前或絶其後單于可禽百全必取上曰善乃從恢議陰使聶翁一為間亡入胸奴謂單于曰吾能斬馬邑令丞以城降財物可盡得單于愛信以為然而許之翁一乃詐斬死罪囚縣其頭馬邑城下視單于使者為信曰馬邑長吏已死可急來於是單于穿塞將十萬騎入武州塞當是時漢伏兵車騎材官三十餘萬匿馬邑旁谷中衛尉李廣為驍騎將軍太僕公孫賀為輕車將軍大行王恢為將屯將軍太中大夫李息為材官將軍御史大夫安國為護軍將軍諸將皆屬約單于入馬邑縱兵王恢李息别從代主擊輜重於是單于入漢塞未至馬邑百餘里間有告之者輒還去塞下傳言單于已去漢兵追至塞度弗能及王恢等皆罷兵上怒恢不出擊單于輜重也恢曰始約為入馬邑城兵與單于接而臣擊其輜重可得利今單于不至而還臣以三萬人衆不敵祗取辱固知還而斬然完陛下士三萬人於是下恢廷尉廷尉當恢逗橈當斬恢行千金丞相蚡蚡不敢言上而言於太后曰王恢首為馬邑事今不成而誅恢是為胸奴報讐也上朝太后太后以蚡言告上上曰首為馬邑事者恢故發天下兵數十萬從其言為此且縱單于不可得恢所部擊猶頗可得以尉士大夫心今不誅恢無以謝天下於是恢聞乃自殺安國為人多大略知足以當世取舍而出於忠厚貪耆財利然所推舉皆亷士賢於己者於梁舉壺遂臧固至他皆天下名士士亦以此稱慕之唯天子以為國器安國為御史大夫五年丞相蚡薨安國行丞相事奉引墮車蹇上欲用安國為丞相使使視蹇甚乃更以平棘侯薛澤為丞相安國病免數月愈復為中尉嵗餘徙為衛尉而將軍衛青等擊胸奴破龍城明年胸奴大入邉語在青傳安國為材官將軍屯漁陽捕生口虜言胸奴逺去即上言方佃作時請且罷屯罷屯月餘胸奴大入上谷漁陽安國壁乃有七百餘人出與戰安國傷入壁胸奴虜掠千餘人及畜産去上怒使使責讓安國徙益東屯右北平是時虜言當入東方安國始為御史大夫及護軍後稍下遷而新幸壯將軍衛青等有功益貴安國既疏逺默默也將屯又為胸奴所欺失亡多甚自愧幸得罷歸乃益東徙屯意忽忽不樂數月病歐血死安國以元朔二年中卒壺遂者與太史遷等定漢律歷官至詹事其人深中隱厚篤行君子上方倚以為漢相會其病卒李廣隴西成紀人也其先曰李信秦時為將逐得燕太子丹者也廣家世世受射孝文十四年胸奴大入蕭關而廣以良家子從軍擊胡用善射殺首虜多為郎騎常侍數從射獵格殺猛獸文帝曰惜廣不逢時令當髙帝世萬户侯豈足道哉景帝即位為騎郎將吳楚反時為驍騎都尉從太尉亞夫戰昌邑下顯名以梁王授廣將軍印故還賞不行為上谷太守日與胸奴合戰典屬國公孫昆邪為上泣曰李廣材氣天下無雙自負其能數與虜確恐亡之上乃徙廣為上郡太守後胸奴大入上郡天子使中貴人從廣勒習兵擊胸奴中貴人者將數十騎從見胸奴三人與戰射傷中貴人殺其騎且盡中貴人走廣廣曰是必射雕者也廣乃從百騎往馳三人三人亡馬步行行數十里廣令其騎張左右翼而廣身自射彼三人者殺其二人生得一人果胸奴射雕者也已縳之上馬望胸奴有數千騎見廣以為誘騎皆驚上山陳廣之百騎皆大恐欲馳還走廣曰我去大軍數十里今如此走胸奴追射我立盡今我留胸奴必以我為大軍之誘不我擊廣令曰前未到胸奴二里所止令曰皆下馬解鞍騎曰虜多如是解鞍即急奈何廣曰彼虜以我為走今解鞍以示不去用堅其意有白馬將出護其兵廣上馬與十餘騎奔射殺白馬將而復還至其百騎中解鞍令士皆縱馬卧時會暮胡兵終怪之不敢擊夜半胡兵以為漢有伏軍於旁欲夜取之即引兵去平旦廣乃歸其大軍後徙為隴西北地鴈門雲中太守武帝即位左右言廣名將也繇是入為未央衛尉而程不識時亦為長樂衛尉程不識故與廣俱以邊太守將屯及出擊胡而廣行無部曲行陳就善水草頓舍止人人自便不擊刁斗自衛莫府省文書然亦逺斥候未嘗遇害程不識正部曲行伍營陳擊刁斗吏治軍簿至明軍不得休息然亦未嘗遇害不識曰李將軍極簡易然虜卒犯之無以禁而其士亦佚樂為之死我軍雖煩擾虜亦不得犯我是時漢邊郡李廣程不識為名將然胸奴畏廣士卒多樂從而苦程不識不識孝景時以數直諌為太中大夫為人廉謹於文法後漢誘單于以馬邑城使大軍伏馬邑旁而廣為驍騎將軍屬護軍將軍單于覺之去漢軍皆無功後四嵗廣以衛尉為將軍出鴈門擊胸奴胸奴兵多破廣軍生得廣單于素聞廣賢令曰得李廣必生致之胡騎得廣廣時傷置兩馬間絡而盛之卧行十餘里廣佯死睨其旁有一胡兒騎善馬廣暫騰而上胡兒馬因推墮兒取其弓鞭馬南馳數十里復得其餘軍因引而入塞胸奴捕者騎數百追之廣行取胡兒弓射殺追騎以故得脫於是至漢漢下廣吏吏當廣所失亡多為虜所生得當斬贖為庶人頃之家居數嵗與故潁陰侯屏居藍田南山中射獵嘗夜從一騎出從人田間飲還至霸陵亭霸陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也止廣宿亭下居無何胸奴入遼西殺太守敗韓將軍韓將軍後徙居右北平死於是上乃召拜廣為右北平太守廣即請霸陵尉與俱至軍而斬之上書自陳謝罪詔報不問廣在郡胸奴號曰漢飛將軍避之數嵗不入界廣出獵見草中石以為虎而射之中石沒鏃視之石也他日射之終不能入矣廣所居郡聞有虎常自射之及居右北平射虎虎騰傷廣廣亦射殺之石建卒上召廣代為郎中令元朔六年廣復為後將軍從大將軍出定襄擊胸奴諸將多中首虜率為侯者而廣軍無功後三嵗廣以郎中令將四千騎出右北平博望侯張騫將萬騎與廣俱異道行數百里胸奴左賢王將四萬騎圍廣廣軍士皆恐廣乃使其子敢往馳之敢從數十騎直貫胡騎出其左右而還報廣曰胡虜易與耳軍士乃安為圜陳外鄉胡急擊矢下如雨漢兵死者過半漢矢且盡廣乃令士持滿無發而廣身自以大黃射其裨將殺數人胡虜益解會暮吏士皆無人色而廣意氣自若益治軍軍中服其勇也明日復力戰而博望侯軍亦至胸奴乃解去漢軍罷弗能追是時廣軍幾沒罷歸漢法博望侯後期當死贖為庶人廣軍自當亡賞初廣與從弟李蔡俱為郎事文帝景帝時蔡積功至二千石武帝元朔中為輕車將軍從大將軍擊右賢王有功中率封為樂安侯元狩二年代公孫𢎞為丞相蔡為人在下中名聲出廣下逺甚然廣不得爵邑官不過九卿廣之軍吏及士卒或取封侯廣與望氣王朔語曰自漢征胸奴廣未嘗不在其中而諸妄校尉以下材能不及中人然以擊胡軍功取侯者數十人廣不為後人然終無尺寸功以得封邑者何也豈吾相不當侯邪朔曰將軍自念豈嘗有所恨乎廣曰吾嘗為隴西守羌嘗反吾誘降者八百餘人詐而同日殺之至今恨獨此耳朔曰禍莫大於殺已降此乃將軍所以不得侯者也廣歷七郡太守前後四十餘年得賞賜輒分其戲下飲食與士卒共之家無餘財終不言生産事為人長猿臂其善射亦天性雖子孫他人學者莫能及廣呐口少言與人居則畫地為軍陳射闊狹以飲専以射為戲將兵乏絶處見水士卒不盡飲不近水不盡餐不嘗食寬緩不苛士以此愛樂為用其射見敵非在數十步之內度不中不發發即應絃而倒用此其將數困辱及射猛獸亦數為所傷云元狩四年大將軍驃騎將軍大擊胸奴廣數自請行上以為老不許良久乃許之以為前將軍大將軍青出塞捕虜知單于所居乃自以精兵走之而令廣并於右將軍軍出東道東道少回逺大軍行水草少其勢不屯行廣辭曰臣部為前將軍今大將軍乃徙臣出東道且臣結髮而與胸奴戰乃今一得當單于臣願居前先死單于大將軍隂受上指以為李廣數竒數音所角反奇音居宜反言命隻不耦合也毋令當單于恐不得所欲是時公孫敖新失侯為中將軍大將軍亦欲使敖與俱當單于故徙廣廣知之固辭大將軍弗聽令長史封書與廣之莫府曰急詣部如書廣不謝大將軍而起行意象愠怒而就部引兵與右將軍食其合軍出東道惑失道後大將軍大將軍與單于接戰單于遁走弗能得而還南絶幕乃遇兩將軍廣已見大將軍還入軍大將軍使長史持糒醪遺廣因問廣食其失道狀曰青欲上書報天子失軍曲折廣未對大將軍長史急責廣之莫府上簿廣曰諸校尉無罪乃我自失道吾今自上簿至莫府謂其麾下曰廣結髮與胸奴大小七十餘戰今幸從大將軍出接單于兵而大將軍徙廣部曲回逺又迷失道豈非天哉且廣年六十嵗終不能復對刀筆之吏矣遂引刀自剄百姓聞之知與不知老壯皆為垂涕而右將軍獨下吏當死贖為庶人廣三子曰當户椒敢皆為郎上與韓嫣戲嫣少不遜當户擊嫣嫣走於是上以為能當户蚤死乃拜椒為代郡太守皆先廣死廣死軍中時敢從驃騎將軍廣死明年李蔡以丞相坐詔賜冢地陽陵當得二十畝蔡盜取三頃頗賣得四十餘萬又盜取神道外壖地一畝葬其中當下獄自殺敢以校尉從驃騎將軍擊胡左賢王力戰奪左賢王旗鼓斬首多賜爵關內侯食邑二百户代廣為郎中令頃之怨大將軍青之恨其父乃擊傷大將軍大將軍匿諱之居無何敢從上雍至甘泉宫獵驃騎將軍去病怨敢傷青射殺敢去病時方貴幸上為諱云鹿觸殺之居嵗餘去病死敢有女為太子中人愛幸敢男禹有寵於太子然好利亦有勇嘗與侍中貴人飲侵陵之莫敢應後訴之上上召禹使刺虎縣下圈中未至地有詔引出之禹從落中以劍斫絶纍欲刺虎上壯之遂救止焉而當戶有遺腹子陵將兵擊胡兵敗降胸奴後人告禹謀欲亡從陵下吏死陵字少卿少為侍中建章監善騎射愛人謙讓下士甚得名譽武帝以為有廣之風使將八百騎深入胸奴二千餘里過居延視地形不見虜還拜為騎都尉將勇敢五千人教射酒泉張掖以備胡數年漢遣二師將軍伐大宛使陵將五校兵隨後行至塞會二師還上賜陵書陵留吏士與輕騎五百出敦煌至鹽水迎二師還復留屯張掖天漢二年二師將三萬騎出酒泉擊右賢王於天山召陵欲使為二師將輜重陵召見武臺叩頭自請曰臣所將屯邊者皆荆楚勇士竒材劍客也力扼虎射命中願得自當一隊到蘭于山南以分單于兵無令専鄉二師軍上曰將惡相屬邪吾發軍多毋騎豫女陵對無所事騎臣願以少擊衆步兵五千人涉單于庭上壯而許之因詔強弩都尉路博德將兵半道迎陵軍博德故伏波將軍亦羞為陵後距奏言方秋胸奴馬肥未可與戰臣願留陵至春俱將酒泉張掖騎各五千人並擊東西浚稽可必禽也書奏上怒疑陵悔不欲出而教博德上書乃詔博德吾欲豫李陵騎云欲以少擊衆今虜入西河其引兵走西河遮鉤營之道詔陵以九月發出遮虜鄣至東浚稽山南龍勒水上徘徊觀虜即亡所見從浞野侯趙破奴故道抵受降城休士因騎置以聞所與博德言者云何具以書對陵於是將其步卒五千人出居延北行三十日至浚稽山止營舉圖所過山川地形使麾下騎陳步樂以聞步樂召見道陵將率得士死力上甚説拜步樂為郎陵至浚稽山與單于相值騎可三萬圍陵軍軍居兩山間以大車為營陵引士出營外為陳前行持戟盾後行持弓弩令曰聞鼓聲而縱聞金聲而止虜見漢軍少直前就營陵搏戰攻之千弩俱發應弦而倒虜還走上山漢軍追擊殺數千人單于大驚召左右地兵八萬餘騎攻陵陵且戰且引南行數日抵山谷中連戰士卒中矢傷三創者載輦兩創者將車一創者持兵戰陵曰吾士氣少衰而鼓不起者何也軍中豈有女子乎始軍出時關東羣盜妻子徙邉者隨軍為卒妻婦大匿車中陵搜得皆劍斬之明日復戰斬首三千餘級引兵東南循故龍城道西行四五日抵大澤葭葦中虜從上風縱火陵亦令軍中縱火以自救南行至山下單于在南山上使其子將騎擊陵陵軍步鬭樹木間復殺數千人因發連弩射單于單于下走是日捕得虜言單于曰此漢精兵擊之不能下日夜引吾南近塞得毋有伏兵乎諸當户君長皆言單于自將數萬騎擊漢數千人不能滅後無以復使邊臣令漢益輕胸奴復力戰山谷間尚四五十里得平地不能破乃還是時陵軍益急胸奴騎多戰一日數十合復傷殺虜二千餘人虜不利欲去會陵軍候管敢為校尉所辱亡降胸奴具言陵軍無後救射矢且盡獨將軍麾下及成安侯校各八百人為前行以黃與白為幟當使精騎射之即破矣成安侯者潁川人父韓千秋故濟南相奮擊南越戰死武帝封子延年為侯以校尉隨陵單于得敢大喜使騎並攻漢軍疾呼曰李陵韓延年趣降遂遮道急攻陵陵居谷中虜在山上四面射矢如雨下漢軍南行未至鞮汗山一日五十萬矢皆盡即棄車去士尚三千餘人徒斬車輻而持之軍吏持尺刃抵山入狹谷單于遮其後乘隅下壘石士卒多死不得行昏後陵便衣獨步出營止左右毋隨我丈夫一取單于耳良久陵還太息曰兵敗死矣軍吏或曰將軍威震胸奴天命不遂後求道徑還歸如浞野侯為虜所得後亡還天子客遇之况於將軍乎陵曰公止吾不死非壯士也於是盡斬旌旗及珍寶埋地中陵歎曰復得數十矢足以脫矣今無兵復戰天明坐受縛矣各鳥獸𣪚去猶有得脫歸報天子者令軍士人持二升糒一半氷半讀曰判判大片也期至遮虜鄣者相持夜半時擊鼓起士鼓不鳴陵與韓延年俱上馬壯士從者十餘人虜騎數千追之延年戰死陵曰無面目報陛下遂降軍人分散脫至塞者四百餘人陵敗處去塞百餘里邊塞以聞上欲陵戰死召陵母及婦使相者視之無死喪色後聞陵降責問陳步樂步樂自殺羣臣皆罪陵上以問太史令司馬遷遷盛言陵事親孝與士信常奮不顧身以殉國家之急其素所畜積也有國士之風今舉事一不當全軀保妻子之臣隨而媒蘖其短誠可痛也且陵提步卒不滿五千深輮戎馬之地抑數萬之師虜救死扶傷不暇悉舉引弓之民共攻圍之轉鬭千里矢盡道窮士張空拳冒白刃北首爭死敵得人之死力雖古名將不過也身雖陷敗然其所摧敗亦足暴於天下彼之不死宜欲得當以報漢也初上遣二師大軍出財令陵為助兵及陵與單于相值而二師功少上以遷誣罔欲沮二師為陵遊説下遷腐刑久之上悔陵無救曰陵當發出塞乃詔強弩都尉令迎軍坐預詔之得令老將生姦詐乃遣使勞賜陵餘軍得脫者陵在胸奴嵗餘上遣因杅將軍公孫敖將兵深入胸奴迎陵敖軍無功還曰捕得生口言李陵教單于為兵以備漢軍故臣無所得上聞於是族陵家母弟妻子皆伏誅隴西士大夫以李氏為愧其後漢遣使使胸奴陵謂使者曰吾為漢將步卒五千人橫行胸奴以亡救而敗何負於漢而誅吾家使者曰漢聞李少卿教胸奴為兵陵曰乃李緒非我也緒本漢塞外都尉居奚侯城胸奴攻之緒降而單于客遇緒常坐陵上陵痛其家以緒而誅使人刺殺緒大閼氏欲殺陵單于匿之北方大閼氏死乃還單于壯陵以女妻之立為右校王衛律為丁靈王丁靈胡之别種也立為王而王其人也皆貴用事衛律者父本長水胡人律生長漢善協律都尉李延年延年薦言律使胸奴使還會延年家收律懼并誅亡還降胸奴胸奴愛之常在單于左右陵居外有大事乃入議昭帝立大將軍霍光左將軍上官桀輔政素與陵善遣陵故人隴西任立政等三人俱至胸奴招陵立政等至單于置酒賜漢使者李陵衛律皆侍坐立政見陵未得私語即目視陵而數數自循其刀環握其足隂諭之言可還歸漢也後陵律持牛酒勞漢使博飲兩人皆胡服椎結立政大言曰漢已大赦中國安樂主上富於春秋霍子孟上官少叔用事以此言微動之陵默不應孰視而自循其髮答曰吾已胡服矣有頃律起更衣立政曰咄少卿良苦霍子孟上官少叔謝女陵曰霍與上官無恙乎立政曰請少卿來歸故鄉無憂富貴陵字立政曰少公歸易耳恐再辱奈何語未卒衛律還頗聞餘語曰李少卿賢者不獨居一國范蠡遍遊天下由余去戎入秦今何語之親也因罷去立政隨謂陵曰亦有意乎陵曰丈夫不能再辱陵在胸奴二十餘年元平元年病死蘇建杜陵人也以校尉從大將軍青擊胸奴封平陵侯以將軍築朔方後以衛尉為遊擊將軍從大將軍出朔方後一嵗以右將軍再從大將軍出定襄亡翕侯失軍當斬贖為庶人其後為代郡太守卒官有三子嘉為奉車都尉賢為騎都尉中子武最知名武字子卿以父任兄弟並為郎稍遷至栘中廄監栘音移時漢連伐胡數通使相窺觀胸奴留漢使郭吉路充國等前後十餘輩胸奴使來漢亦留之以相當天漢元年且鞮侯單于初立恐漢襲之乃曰漢天子我丈人行也盡歸漢使路充國等武帝嘉其義乃遣武以中郎將持節送胸奴使留在漢者因厚賂單于答其善意武與副中郎將張勝及假吏常惠等募士斥候百餘人俱既至胸奴置幣遺單于單于益驕非漢所望也方欲發使送武等會緱王與長水虞常等謀反胸奴中緱音工侯反緱王者昆邪王姊子也與昆邪王俱降漢後隨浞野侯沒胡中及衛律所將降者隂相與謀劫單于母閼氏歸漢會武等至胸奴虞常在漢時素與副張勝相知私候勝曰聞漢甚怨衛律常能為漢伏弩射殺之吾母與弟在漢幸蒙其賞賜張勝許之以貨物與常後月餘單于出獵獨閼氏子弟在虞常等七十餘人欲發其一人夜亡告之單于子弟發兵與戰緱王等皆死虞常生得單于使衛律治其事張勝聞之恐前語發以狀語武武曰事如此必及我見犯乃死重負國欲自殺勝惠共止之虞常果引張勝單于怒召諸貴人議欲殺漢使者左伊秩訾曰即謀單于何以復加宜皆降之單于使衛律召武受辭武謂惠等屈節辱命雖生何面目以歸漢引佩劍自刺衛律驚自抱持武馳召醫鑿地為坎置煴火覆武其上蹈其背以出血武氣絶半日復息惠等哭輿歸營單于壯其節朝夕遣人候問武而收繫張勝武益愈單于使使曉武會論虞常欲因此時降武劍斬虞常已律曰漢使張勝謀殺單于近臣當死單于募降者赦罪舉劒欲擊之勝請降律謂武曰副有罪當相坐武曰本無謀又非親屬何謂相坐復舉劍擬之武不動律曰蘇君律前負漢歸胸奴幸蒙大恩賜號稱王擁衆數萬馬畜彌山富貴如此蘇君今日降明日復然空以身膏草野誰復知之武不應律曰君因我降與君為兄弟今不聽吾計後雖欲復見我尚可得乎武罵律曰女為人臣子不顧恩義畔主背親為降虜於蠻夷何以女為見且單于信女使決人死生不平心持正反欲鬪兩主觀禍敗南越殺漢使者屠為九郡宛王殺漢使者頭懸北闕朝鮮殺漢使者即時誅滅獨胸奴未耳若知我不降明欲令兩國相攻胸奴之禍從我始矣律知武終不可脅白單于單于愈益欲降之乃幽武置大窖中絶不飲食天雨雪武卧齧雪與旃毛并咽之數日不死胸奴以為神乃徙武北海上無人處使牧羝羝乳乃得歸别其官屬常惠等各置他所既至海上廩食不至掘野鼠去草實而食之杖漢節牧羊卧起操持節旄盡落積五六年單于弟於靬王弋射海上靬音居元反武能網紡繳檠弓弩於靬王愛之給其衣食三嵗餘王病賜武馬畜服匿穹廬王死後人衆徙去其冬丁令盜武牛羊武復窮厄初武與李陵俱為侍中武使胸奴明年陵降不敢求武久之單于使陵至海上為武置酒設樂因謂武曰單于聞陵與子卿素厚故使來説足下虛心欲相待終不得歸漢空自苦亡人之地信義安所見乎前長君為奉車長君武兄嘉從至雍棫陽宫扶輦下除觸柱折轅劾大不敬伏劍自刎賜錢二百萬以葬孺卿從祠河東后土孺卿武弟賢宦騎與黃門駙馬爭船推墮駙馬河中溺死宦騎亡詔使孺卿逐捕不得惶恐飲藥而死來時太夫人已不幸陵送葬至陽陵子卿婦年少聞已更嫁矣獨有女弟二人兩女一男今復十餘年存亡不可知人生如朝露何久自苦如此陵始降時忽忽如狂自痛負漢加以老母繫保宫子卿不欲降何以過陵且陛下春秋髙法令亡常大臣亡罪夷滅者數十家安危不可知子卿尚復誰為乎願聽陵計勿復有云武曰武父子亡功德皆為陛下所成就位列將爵通侯兄弟親近常願肝腦塗地今得殺身自效雖蒙斧鉞湯鑊誠甘樂之臣事君猶子事父也子為父死無所恨願勿復再言陵與武飲數日復曰子卿一聽陵言武曰自分已死久矣王必欲降武請畢今日之歡效死於前陵見其至誠喟然嘆曰嗟乎義士陵與衛律之罪上通於天因泣下霑襟與武決去陵惡自賜武使其妻賜武牛羊數十頭後陵復至北海上語武區脫捕得雲中生口區脫土室胡兒所作以候漢者也區音一侯反脫音土活反言太守已下吏民皆白服曰上崩武聞之南鄉號哭歐血旦夕臨數月昭帝即位數年胸奴與漢和親漢求武等胸奴詭言武死後漢使復至常惠請其守者與俱得夜見漢使具自陳道教使者謂單于言天子射上林中得鴈足有繫帛書言武等在某澤中使者大喜如惠言以讓單于單于視左右而驚謝漢使曰武等實在於是陵置酒賀武曰今足下還歸揚名於胸奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿陵雖駑怯令漢且貰陵罪全其老母使得奮大辱之積志庶幾乎曹柯之盟此陵宿昔之所不忘也收族陵家為世大戮陵尚復何顧乎已矣令子卿知吾心耳異域之人一别長絶陵起舞歌曰徑萬里兮渡沙漠為君將兮奮胸奴路窮絶兮矢刃摧士衆滅兮名已隤老母已死兮雖欲報恩將安歸陵泣下數行因與武決單于召會武官屬前以降及物故凡隨武還者九人武以始元六年春至亰師詔武奉一太牢謁孝武帝廟園陵拜為典屬國秩中二千石賜錢二百萬公田二頃宅一區常惠徐聖趙終根皆拜為中郎賜帛各二百匹其餘六人老歸家賜錢人十萬復終身常惠後至右將軍封列侯自有傳武留胸奴凡十九嵗始以強壯出及還須髮盡白武來歸明年上官桀子安與桑𢎞羊及燕王蓋主謀反武子男元與安有謀坐死初桀安與大將軍霍光爭權數疏光過失豫燕王令上書告之又言蘇武使胸奴二十年不降還乃為典屬國大將軍長史無功勞為搜粟都尉光専權自恣及燕王等謀反窮治黨與武素與桀𢎞羊有舊數為燕王所訟子又在謀中廷尉奏請逮捕武霍光寢其奏免武官數年昭帝崩武以故二千石與計謀立宣帝賜爵關內侯食邑三百户久之衛將軍張安世薦武明習故事奉使不辱命先帝以為遺言宣帝即時召武待詔宦者署數進見復為右曹典屬國以武著節老臣令朝朔望號稱祭酒甚優寵之武所得賞賜盡以施豫昆弟故人家不餘財皇后父平恩侯帝舅平昌侯樂昌侯車騎將軍韓增丞相魏相御史大夫丙吉皆敬重武武年老子前坐事死上閔之問左右武在胸奴久豈有子乎武因平恩侯自白前發胸奴時胡婦適産一子通國有聲問來願因使者致金帛贖之上許焉後通國隨使者至上以為郎又以武弟子為右曺武年八十餘神爵二年病卒甘露三年單于始入朝上思股肱之美乃圖畫其人於麒麟閣法其形貌署其官爵姓名惟霍光不名曰大司馬大將軍博陸侯姓霍氏次曰衛將軍富平侯張安世次曰車騎將軍龍雒侯韓增次曰後將軍營平侯趙充國次曰丞相髙平侯魏相次曰丞相博陽侯丙吉次曰御史大夫建平侯杜延年次曰宗正陽城侯劉德次曰少府梁邱賀次曰太子太傅蕭望之次曰典屬國蘇武皆有功德知名當世是以表而揚之明著中興輔佐列於方叔召虎仲山甫焉凡十一人皆有傳自丞相黃霸廷尉于定國大司農朱邑京兆尹張敞右扶風尹翁歸及儒者夏侯勝等皆以善終著名宣帝之世然不得列於名臣之圖以此知其選矣衛青字仲卿其父鄭季河東平陽人也以縣史給事侯家平陽侯曹夀尚武帝姊陽信長公主季與主家僮衛媪通生青青有同母兄衛長君及姊子夫子夫自平陽公主家得幸武帝故青冒姓為衛氏衛媪長女君孺次女少兒次女則子夫子夫男弟步廣皆冒衛氏青為侯家人少時歸其父父使牧羊民母之子皆奴畜之不以為兄弟數青嘗從人至甘泉居室有一鉗徒相青曰貴人也官至封侯青笑曰人奴之生得無笞罵即足矣安得封侯事乎青壯為侯家騎從平陽主建元二年春青姊子夫得入宫幸上皇后大長公主女也無子妬大長公主聞衛子夫幸有身妬之乃使人捕青青時給事建章未知名大長公主執囚青欲殺之其友騎郎公孫敖與壯士往篡之故得不死上聞乃召青為建章監侍中及同母昆弟貴賞賜數日間纍千金君孺為太僕公孫賀妻少兒故與陳掌通上召貴掌公孫敖由此益顯子夫為夫人青為太中大夫元光六年拜為車騎將軍擊胸奴出上谷公孫賀為輕車將軍出雲中太中大夫公孫敖為騎將軍出代郡衛尉李廣為驍騎將軍出鴈門軍各萬騎青至龍城斬首虜數百騎將軍敖亡七千騎衛尉廣為虜所得既而得脫歸皆當斬贖為庶人賀亦無功唯青賜爵為關內侯是後胸奴仍仍頻也侵犯邊元朔元年春衛夫人有男立為皇后其秋青復將三萬騎出鴈門李息出代郡青斬首虜數千明年青復出雲中西至髙闕遂至于隴西捕首虜數千畜百餘萬走白羊樓煩王遂取河南地為朔方郡以三千八百户封青為長平侯青校尉蘇建為平陵侯張次公為岸頭侯使建築朔方城上曰胸奴造謀籍兵數為邊害故興師遣將以征厥罪今車騎將軍青度西河至髙闕獲首二千三百級車輜畜産畢收為鹵已封為列侯遂西定河南地案榆溪舊塞絶梓領梁北河討蒲泥破符離斬輕鋭之卒捕伏聽者伏於隱處聽軍虛實三千一十七級執訊獲醜驅馬牛羊百有餘萬全甲兵而還其益封青三千八百户其後胸奴比嵗入代郡鴈門定襄上郡朔方所殺略甚衆元朔五年春令青將三萬騎出髙闕衛尉蘇建為遊擊將軍左內史李沮為強弩將軍太僕公孫賀為騎將軍代相李蔡為輕車將軍皆領屬車騎將軍俱出朔方大行李息岸頭侯張次公為將軍俱出右北平胸奴右賢王當青等以為漢兵不能至此飲醉漢兵夜至圍右賢王右賢王驚夜逃獨與其愛妾一人騎數百馳潰圍北去漢輕騎校尉郭成等追數百里弗得得右賢裨王十餘人衆男女萬五千餘人畜數十百萬於是引兵而還至塞天子使使者持大將軍印即軍中拜青為大將軍諸將皆以兵屬立號而歸上曰大將軍青躬率戎士師大捷獲胸奴王十有餘人益封青八千七百户而封青子伉為宜春侯子不疑為陰安侯子登為發千侯青固謝曰臣幸得待罪行間賴陛下神靈軍大捷皆諸校力戰之功也陛下幸已益封臣青臣青子在襁褓中未有勤勞上幸裂地封為三侯非臣待罪行間所以勸士力戰之意也伉等三人何敢受封上曰我非忘諸校功也今固且圖之乃詔御史曰護軍都尉公孫敖三從大將軍擊胸奴常護軍傅校獲王封敖為合騎侯都尉韓説從大將軍出填渾至胸奴右賢王庭為戲下搏戰獲王封説為龍額侯騎將軍賀從大將軍獲王封賀為南窖侯輕車將軍李蔡再從大將軍獲王封蔡為樂安侯校尉李朔趙不虞公孫戎奴各三從大將軍獲王封朔為陟軹侯不虞為隨成侯戎奴為從平侯將軍李沮李息及校尉竇如意中郎將綰皆有功賜爵關內侯沮息如意食邑各三百户其秋胸奴入代殺都尉明年春大將軍青出定襄合騎侯敖為中將軍太僕賀為左將軍翕侯趙信為前將軍衛尉蘇建為右將軍郎中令李廣為後將軍左內史李沮為強弩將軍咸屬大將軍斬首數千級而還月餘悉復出定襄斬首虜萬餘人蘇建趙信并軍三千餘騎獨逢單于兵與戰一日餘漢兵且盡信故胡人降為翕侯見急胸奴誘之遂將其餘騎可八百奔降單于蘇建盡亡其軍獨以身得亡去自歸青青問其罪正閎長史安議郎周霸等建當云何霸曰自大將軍出未嘗斬裨將今建棄軍可斬以明將軍之威閎安曰不然兵法小敵之堅大敵之禽也今建以數千當單于數萬力戰一日餘士皆不敢有二心自歸而斬之是示後無反意也不當斬青曰青幸得以肺附待罪行間不患無威而霸説我以明威甚失臣意且使臣職雖當斬將以臣之尊寵而不敢自擅專誅於境外其歸天子天子自裁之於以風為人臣不敢專權不亦可乎軍吏皆曰善遂囚建行在所是嵗也霍去病始侯霍去病大將軍青姊少兒子也其父霍仲孺先與少兒通生去病及衛皇后尊少兒更為詹事陳掌妻去病以皇后姊子年十八為侍中善騎射再從大將軍大將軍受詔豫壯士為票姚校尉與輕勇騎八百直棄大將軍數百里赴利斬捕首虜過當於是上曰票姚校尉去病斬首捕虜二千二十八級得相國當户斬單于大父行籍若侯産捕季父羅姑比再冠軍以二千五百户封去病為冠軍侯上谷太守郝賢四從大將軍捕首虜千三百級封賢為終利侯騎士孟已有功賜爵關內侯邑三百户是嵗失兩將軍亡翕侯功不多故青不益封蘇建至上弗誅贖為庶人青賜千金是時王夫人方幸於上寧乘説青曰將軍所以功未甚多身食萬户三子皆為侯者以皇后故也今王夫人幸而宗族未富貴願將軍奉所賜千金為王夫人親夀青以五百金為王夫人親夀上聞問青青以實對上乃拜寧乘為東海都尉校尉張騫從大將軍以嘗使大夏留胸奴中久道軍知善水草處軍得以無飢渴因前使絶國功封騫為博望侯去病侯三嵗元狩三年春為驃騎將軍將萬騎出隴西有功上曰驃騎將軍率戎士踰烏盩討遫濮涉狐奴厯五王國輜重人衆攝讋者弗取幾獲單于子轉戰六日過焉支山千有餘里合短兵鏖臯蘭下殺折蘭王斬盧侯王鋭悍者誅全甲獲醜執渾邪王子及相國都尉捷首虜八千九百六十級收休屠祭天金人師率減什七益封去病二千二百户其夏去病與合騎侯敖俱出北地異道博望侯張騫郎中令李廣俱出右北平異道廣將四千騎先至騫將萬騎後胸奴左賢王將數萬騎圍廣廣與戰二日死者過半所殺亦過當騫至胸奴引兵去騫坐行留當斬贖為庶人而去病出北地遂深入合騎侯失道不相得去病至祁連山捕首虜甚多上曰驃騎將軍涉鈞耆濟居延遂臻小月氏攻祁連山揚武乎鱳得得單于單桓酋塗王及相國都尉以衆降下者二千五百人可謂能舍服知成而止矣捷首虜三萬二百獲五王王母單于閼氏王子五十九人相國將軍當户都尉六十三人師大率減什三益封去病五千四百户賜校尉從至小月氏者爵左庶長鷹擊司馬破奴再從驃騎將軍斬遫濮王捕稽且王右千騎將王王母各一人王子以下四十一人捕虜三千三百三十人前行捕虜千四百人封破奴為從驃侯校尉髙不識從驃騎將軍捕呼于耆王王子以下十一人捕虜千七百六十八人封不識為宜冠侯校尉僕多有功封為輝渠侯合騎侯敖坐行留不與驃騎將軍會當斬贖為庶人諸宿將所將士馬兵亦不如去病去病所將常選然亦敢深入常與壯騎先其大軍軍亦有天幸未嘗困絶也然而諸宿將常留落不耦由此去病日以親貴比大將軍其後單于怒渾邪王居西方數為漢所破亡數萬人以驃騎之兵也欲召誅渾邪王渾邪王與休屠王等謀欲降漢使人先要道邊是時大行李息將城河上得渾邪王使即馳傳以聞上恐其以詐降而襲邊乃令去病將兵迎之去病既渡河與渾邪衆相望渾邪裨王將見漢軍而多欲不降者頗遁去去病乃馳入得與渾邪王相見斬其欲亡者八千人遂獨遣渾邪王乘傳先詣行在所盡將其衆渡河降者數萬人號稱十萬既至長安天子所以賞賜數十巨萬封渾邪王萬户為漯隂侯封其裨王呼毒尼為下摩侯鷹疵為輝渠侯禽黎為河綦侯大當户調雖為常樂侯於是上嘉去病之功曰驃騎將軍去病率師征胸奴西域王渾邪王及厥衆萌咸奔於率以軍糧接食并將控弦萬有餘人誅獟悍捷首虜八千餘級降異國之王三十二戰士不離傷十萬之衆畢懷集服仍興之勞爰及河塞庶幾無患以千七百户益封驃騎將軍減隴西北地上郡戍卒之半以寬天下繇役乃分處降者於邊五郡故塞外而皆在河南因其故俗為屬國其明年胸奴入右北平定襄殺略漢千餘人其明年上與諸將議曰翕侯趙信為單于畫計常以為漢兵不能度幕輕留今大發卒其勢必得所欲是嵗元狩四年也春上令大將軍青驃騎將軍去病各五萬騎步兵轉者踵軍數十萬而敢力戰深入之士皆屬去病去病始為出定襄當單于捕虜虜言單于東乃更令去病出代郡令青出定襄郎中令李廣為前將軍太僕公孫賀為左將軍主爵趙食其為右將軍平陽侯襄為後將軍皆屬大將軍趙信為單于謀曰漢兵即度幕人馬罷胸奴可坐收虜耳乃悉逺北其輜重皆以精兵待幕北而適直青軍出塞千餘里見單于兵陳而待於是青令武剛車自環為營而縱五千騎往當胸奴胸奴亦從萬騎會日且入而大風起沙礫擊面兩軍不相見漢益縱左右翼繞單于單于視漢兵多而士馬尚強戰而胸奴不利薄暮單于遂乘六裸壯騎可數百直冒漢圍西北馳去昏漢胸奴相紛拿殺傷大當漢軍左校捕虜言單于未昏而去漢軍因發輕騎夜追之青因隨其後胸奴兵亦散走會明行二百餘里不得單于頗捕斬首虜萬餘級遂至填顔山趙信城得胸奴積粟食軍軍留一日而還悉燒其城餘粟以歸青之與單于會也而前將軍廣右將軍食其軍别從東道或失道大將軍引還過幕南乃相逢青欲使使歸報令長史簿責廣廣自殺食其贖為庶人青軍入塞凡斬首虜萬九千級是時胸奴衆失單于十餘日右谷蠡王自立為單于單于後得其衆右王乃去單于之號去病騎兵車重與大將軍軍等而亡裨將悉以李敢等為大校當裨將出代右北平二千餘里直左方兵所斬捕功已多於青既皆還上曰驃騎將軍去病率師躬將所獲葷允之士約輕齎絶大幕涉獲單于章渠以誅北車耆轉擊左大將雙獲旗鼓歷度難侯濟弓盧獲屯頭王韓王等三人將軍相國當户都尉八十三人封狼居胥山禪於姑衍登臨翰海執訊獲醜七萬有四百四十三級師率減什二取食於敵卓行殊逺而糧不絶以五千八百户益封驃騎將軍右北平太守路博德屬驃騎將軍會興城不失期從至檮余山斬首捕虜二千八百級封博德為邳離侯北地都尉衛山從驃騎將軍獲王封山為義陽侯故歸義侯因淳王復陸支樓剸王伊即靬皆從驃騎將軍有功封復陸支為杜侯伊即靬為衆利侯從驃侯破奴昌武侯安稽從驃騎有功益封各三百户漁陽太守解校尉敢皆獲旗鼓賜爵關內侯解食邑三百户敢二百户校尉自為爵左庶長軍吏卒為官賞賜甚多而青不得益封吏卒無封者唯西河太守常惠雲中太守遂成受賞遂成秩諸侯相賜食邑二百户黃金百斤惠爵關內侯兩軍之出塞塞閲官及私馬凡十四萬匹而後入塞者不滿三萬匹乃益置大司馬位大將軍驃騎將軍皆為大司馬定令令驃騎將軍秩祿與大將軍等自是之後大將軍日衰而驃騎日益貴幸大將軍故人門下多去事驃騎輒得官爵唯獨任安不肯去驃騎將軍為人少言不泄有氣敢往上嘗欲教之孫吳兵法對曰顧方略何如耳不至學古兵法上為治第令視之對曰胸奴不滅無以家為也由此上益重愛之然少而侍中貴不省士其從軍天子為遣太官齎數十乘既還重車餘棄粱肉而士有飢者其在塞外卒乏糧或不能自振而去病尚穿域踏鞠也事多類此大將軍為人仁善退讓以和柔自媚於上然於天下未有稱也驃騎將軍自四年軍後三嵗元狩六年薨天子悼之發屬國元甲軍陳自長安至茂陵為冢象祁連山諡之并武與廣地曰景桓侯子嬗嗣嬗字子侯上愛之幸其壯而將之為奉車都尉從封泰山而薨無子國除自去病死後青長子宜春侯伉坐法失侯後五嵗伉弟二人隂安侯不疑發干侯登皆坐酎金失侯後二嵗冠軍侯國絶後四年元封五年青薨諡曰烈侯子伉嗣六年坐法免自青圍單于後十四嵗而卒竟不復擊胸奴者以漢馬少又方南誅兩越東伐朝鮮擊羌西南夷以故久不伐胡初青既尊貴而平陽侯曹夀有惡疾就國長公主問列侯誰賢者左右皆言大將軍主笑曰此出吾家常騎從我奈何左右曰於今尊貴無比於是長公主乃風白皇后言之上乃詔青尚平陽主與主合葬起冢象廬山云最大將軍青凡七出擊胸奴斬捕首虜五萬餘級一與單于戰收河南地置朔方郡再封凡萬六千三百户封三子為侯侯千三百户并之二萬二百户其裨將及校尉侯者九人為特將者十五人李廣張騫公孫賀李蔡曹襄韓説蘇建皆自有傳李息郁郅人也事景帝至武帝立八嵗為材官將軍軍馬邑後六嵗為將軍出代後三嵗為將軍從大將軍出朔方皆無功凡三為將軍其後常為大行公孫敖義渠人以郎事景帝至武帝立十二嵗為騎將軍出代亡卒七千人當斬贖為庶人後五嵗以校尉從大將軍封合騎侯後一嵗以中將軍從大將軍再出定襄無功後二嵗以將軍出北地後驃騎失期當斬贖為庶人後二嵗以校尉從大將軍無功後十四嵗以因杅將軍築受降城七嵗復以因杅將軍再出擊胸奴至余吾亡士多下吏當斬詐死亡居民間五六嵗後覺復繫坐妻為巫蠱族凡四為將軍李沮雲中人事景帝武帝立十七嵗以左內史為強弩將軍後一嵗復為強弩將軍張次公河東人以校尉從大將軍封岸頭侯其後太后崩為將軍軍北軍後一嵗復從大將軍凡再為將軍後坐法失侯趙信以胸奴相國降為侯武帝立十八年為前將軍與胸奴戰敗降胸奴趙食其祋祤人武帝立十八年以主爵都尉從大將軍斬首六百六十級元狩三年賜爵關內侯黃金百斤明年為右將軍從大將軍出定襄迷失道當斬贖為庶人郭昌雲中人以校尉從大將軍元封四年以太中大夫為拔胡將軍屯朔方還擊昆明無功奪印荀彘太原廣武人以御見侍中用校尉數從大將軍元封三年為左將軍擊朝鮮無功坐捕樓船將軍誅最驃騎將軍去病凡六出擊胸奴其四出以將軍斬首虜十一餘萬級渾邪王以衆降數萬開河西酒泉之地西方益少胡寇四益封凡萬七千七百户其校吏有功侯者六人為將軍者二人路博德西河平州人以右北平太守從驃騎將軍封邳離侯驃騎死後博德以衛尉為伏波將軍伐破南越益封其後坐法失侯為強弩都尉屯居延卒趙破奴太原人嘗亡入胸奴已而歸漢為驃騎將軍司馬出北地封從驃侯坐酬金失侯後一嵗為胸河將軍攻胡至胸河水無功後一嵗擊虜樓蘭王後為浞野侯後六嵗以浚稽將軍將二萬騎擊胸奴左王左王與戰兵八萬騎圍破奴破奴為虜所得遂沒其軍居胸奴中十嵗復與其太子安國亡入漢後坐巫蠱族自衛氏興大將軍青首封其後支屬五人為侯凡二十四嵗而五侯皆奪國征和中戾太子敗衛氏遂滅而霍光病弟光貴盛自有傳董仲舒廣川人也少治春秋孝景時為博士下帷講誦弟子傳以久次授業或莫見其面蓋三年不窺園其精如此進退容止非禮不行學士皆師尊之武帝即位舉賢良文學之士前後百數而仲舒以賢良對策焉制曰朕獲承至尊休德傳之無窮而施之罔極任大而守重是以夙夜不皇康寧永惟萬事之統猶懼有闕故廣延四方之豪雋郡國諸侯公選賢良修潔博習之士欲聞大道之要至論之極今子大夫褎然為舉首朕甚嘉之子大夫其精心致思朕垂聽而問焉蓋聞五帝三王之道改制作樂而天下洽和百王同之當虞氏之樂莫甚於韶於周莫甚於勺聖王已沒鍾鼓管絃之聲未衰而大道微缺陵夷至乎桀紂之行王道大壞矣夫五百年之間守文之君當塗之士欲則先王之法以戴翼其世者甚衆然猶不能反日以仆滅至後王而後止豈其所操持或悖繆而失其統與固天降命不可復反必推之於大衰而後息與烏呼凡所為屑屑夙興夜寐務法上古者又將無補與三代受命其符安在災異之變何緣而起性命之情或夭或夀或仁或鄙習聞其號未燭厥理伊欲風流而令行刑輕而姦改百姓和樂政事宣昭何修何飭而膏露降百榖登德潤四海澤臻草木三光全寒暑平受天之祐享鬼神之靈德澤洋溢施乎方外延及羣生子大夫明先聖之業習俗化之變終始之序講聞髙誼之日久矣其明以諭朕科别其條勿猥勿并取之於術慎其所出乃其不正不直不忠不極枉于執事書之不泄興于朕躬毋悼後害子大夫其盡心靡有所隱朕將親覽焉仲舒對曰陛下發德音下明詔求天命與情性皆非愚臣之所能及也臣謹案春秋之中視前世已行之事以觀天人相與之際甚可畏也國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君而欲止其亂也自非大亡道之世者天盡欲扶持而安全之事在強勉而已矣強勉學問則聞見博而知益明強勉行道則德日起而大有功此皆可使還至而立有效者也詩曰夙夜匪解書云茂哉茂哉皆強勉之謂也道者所由適於治之路也仁義禮樂皆其具也故聖王已沒而子孫長久安寧數百嵗此皆教化禮樂之功也王者未作樂之時乃用先王之樂宜於世者而以深入教化於民教化之情不得雅頌之樂不成故王者功成作樂樂其德也樂者所以變民風化民俗也其變民也易其化人也著故聲發於和而本於情接於肌膚藏於骨髓故王者道雖衰缺而管絃之聲未衰也夫虞氏之不為政久矣然而樂頌遺風猶有存者是以孔子在齊而聞韶也夫人君莫不欲安存而惡危亡然而政亂國危者甚衆所任者非其人而所繇者非其道是以政日以仆滅也夫周道衰於幽厲非道亡也幽厲不繇也至於宣王思昔先王之德興滯補弊明文武之功業周道粲然復興詩人美之而作上天祐之為生賢佐後世稱頌至今不絶此夙夜不解行善之所致也孔子曰人能𢎞道非道𢎞人也故治亂廢興在於已非天降命不可得反其所操持悖謬失其統也臣聞天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸之若歸父母故天瑞應誠而至書曰白魚入于王舟有火復于王屋流為烏此蓋受命之符也周公曰復哉復哉孔子曰德不孤必有鄰皆積善纍德之效也及至後世淫佚衰微不能統理羣生諸侯背畔殘賊良民以爭壤土廢德教而任刑罰刑罰不中則生邪氣邪氣積於下怨惡畜於上上下不和則隂陽繆盩而妖孽生矣此災異所緣而起也臣聞命者天之令也性者生之質也情者人之欲也或夀或夭或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也孔子曰君子之德風也小人之德草也草上之風必偃故堯舜行德則民仁夀桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所為猶金之在鎔唯冶者之所鑄綏之斯徠動之斯和此之謂也臣謹案春秋之文求王道之端得之於正正次王王次春春者天之所為也正者王之所為也其意曰上承天之所為而下以正其所為正王道之端云爾然則王者欲有所為宜求其端於天天道之大者在隂陽陽為德隂為刑刑主殺而德主生是故陽常居大夏而以生育養長為事隂常居大冬而積於空虛不用之處以此見天之任德不任刑也天使陽出布施於上而主嵗功使隂入伏於下而時出佐陽陽不得隂之助亦不能獨成嵗終陽以成嵗為名此天意也王者承天意以從事故任德教而不任刑刑者不可任以治世猶隂之不可任以成嵗也為政而任刑不順於天故先王莫之肯為也今廢先王德教之官而獨任執法之吏治民毋乃任刑之意與孔子曰不教而誅謂之虐虐政用於下而欲德教之被四海故難成也臣謹按春秋謂一元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也春秋深探其本而反自貴者始故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫不一於正而亡有邪氣姦其間者是以隂陽調而風雨時羣生和而萬民殖五榖熟而草木茂天地之間被潤澤而大豐美四海之內聞盛德而皆徠臣諸福之物可致之祥莫不畢至而王道終矣孔子曰鳯鳥不至河不出圖吾已矣夫自悲可致此物而身卑賤不得致也今陛下貴為天子富有四海居得致之位操可致之勢又有能致之資行髙而恩厚知明而意美愛民而好士可謂誼主矣然而天地未應而美祥莫至者何也凡以教化不立而萬民不正也夫萬民之從利也如水之走下不以教化隄防之不能止也是故教化立而姦邪皆止者其隄防完也教化廢而姦邪並出刑罰不能勝者其隄防壞也古之王者明於此是故南面而治天下莫不以教化為大務立大學以教於國設庠序以化於邑漸民以仁摩民以誼節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也掃除其迹而悉去之復修教化而崇起之教化已明習俗已成子孫循之行五六百嵗尚未敗也至周之末世大為亡道以失天下秦繼其後獨不能改又益甚之重禁文學不得挾書棄捐禮誼而惡聞之其心欲盡滅先聖之道而顓為自恣茍簡之治故立為天子十四嵗而國破亡矣自古以來未嘗有以亂濟亂大敗天下之民如秦者也其遺毒餘烈至今未滅使習俗薄惡人民囂頑抵冒殊扞熟爛如此之甚者也孔子曰腐朽之木不可雕也糞土之牆不可圬也今漢繼秦之後如朽木糞牆矣雖欲善治之亡可奈何法出而姦生令下而詐起如以湯止沸抱薪救火愈甚亡益也竊譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也故漢得天下以來常欲善治而至今不可善治者失之於當更化而不更化也古人有言曰臨淵羡魚不如退而結網今臨政而願治七十餘嵗矣不如退而更化更化則可善治善治則災害日去福祿日來詩云宜民宜人受祿于天為政而宜於民者固當受祿于天夫仁義禮知信五常之道王者所當修飭也王者修飭故受天之祐而享鬼神之靈德施於方外延及羣生也天子覽其對而異焉乃復册之曰制曰蓋聞虞舜之時遊於巖廊之上垂拱無為而天下太平周文王至於日昃不暇食而宇內亦治夫帝王之道豈不同條共貫與何逸勞之殊也蓋儉者不造元黃旌旗之飾及至周室設兩觀乘大路朱干玉戚八佾舞於庭而頌聲興夫帝王之道豈異指哉或曰良玉不瑑又云非文亡以輔德二端異焉殷人執五刑以督姦傷飢膚以懲惡成康不式四十餘年天下不犯囹圄空虛秦國用之死者甚衆刑者相望耗矣哀哉烏呼朕夙寤晨興惟前帝王之憲永思所以奉至尊章洪業皆在力本任賢今朕親耕籍田以為農先勸孝弟崇有德使者冠蓋相望問勤勞恤孤獨盡思極神功烈休德未始云獲也今陰陽錯繆氛氣充塞羣生寡遂黎民未濟亷恥貿亂賢不肖渾殽未得其真故詳延特起之士意庶幾乎今子大夫侍詔百有餘人或道世務而未濟稽諸上古而不同考之于今而難行毋乃牽於文繫而不得騁與將所繇異術所聞殊方與各悉對著于篇毋諱有司明其指略切磋究之以稱朕意仲舒對曰臣聞堯受命以天下為己憂而未以位為樂也故誅逐亂臣務求賢聖是以得舜禹稷卨咎繇衆聖輔德賢能佐職教化大行天下和洽萬民皆安仁樂誼各得其宜動作應禮從容中道故孔子曰如有王者必世而後仁此之謂也堯在位七十載乃遜于位以禪虞舜堯崩天下不歸堯子丹朱而歸舜舜知不可辟乃即天子之位以禹為相因堯之輔佐繼其統業是以垂拱無為而天下治孔子曰韶盡美矣又盡善也此之謂也至於殷紂逆天暴物殺戮賢知殘賊百姓伯夷太公皆當世賢者隱處而不為臣守職之人皆奔走逃亡入于河海天下耗亂萬民不安故天下去殷而從周文王順天理物師用賢聖是以閎夭大顛散宜生等亦聚於朝廷愛施兆民天下歸之故太公起海濵而即三公也當此之時紂尚在上尊卑昏亂百姓散亡故文王悼痛而欲安之是以日昃而不暇食也孔子作春秋先正王而繫萬事見素王之文焉由此觀之帝王之條貫同然而勞逸異者所遇之時異也孔子曰武盡美矣未盡善也此之謂也臣聞制度文采元黃之飾所以明尊卑異貴賤而勸有德也故春秋受命所先制者改正朔易服色所以應天也然則宫室旌旗之制有法而然者也故孔子曰奢則不遜儉則固儉非聖人之中制也臣聞良玉不瑑資質潤美不待刻瑑此亡異於逹巷黨人不學而自知也然則常玉不瑑不成文章君子不學不成其德臣聞聖王之治天下也少則習之學長則材諸位爵祿以養其德刑罰以威其惡故民曉於禮誼而恥犯其上武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虛四十餘年此亦教化之漸而仁義之流非獨傷肌膚之效也至秦則不然師申商之法行韓非之説憎帝王之道以貪狼為俗非有文德以教訓於天下也誅名而不察實為善者不必免而犯惡者未必刑也是以百官皆飾虛辭而不顧實外有事君之禮內有背上之心造偽飾詐趣利無恥又好用憯酷之吏賦斂亡度竭民財力百姓散亡不得從耕織之業羣盜並起是以刑者甚衆死者相望而姦不息俗化使然也故孔子曰導之以政齊之以刑民免而無恥此之謂也今陛下并有天下海內莫不率服廣覽兼聽極羣下之知盡天下之美至德昭然施於方外夜郎康居殊方萬里説德歸誼此太平之效也然而功不加於百姓者殆王心未加焉曽子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在於他在乎加之意而已願陛下因用所聞設誠於內而致行之則三王何異哉陛下親耕籍田以為農先夙寤晨興憂勞萬民思惟往古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也夫不素養士而欲求賢譬猶不瑑玉而求文采也故養士之大者莫大乎太學太學者賢士之所關也教化之本原也今以一郡一國之衆對亡應書者是王道往往而絶也臣願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣今之郡守縣令民之師帥所使承流而宣化也故師帥不賢則主德不宣恩澤不流今吏既亡教訓於下或不承用主上之德暴虐百姓與姦為市貧窮孤弱寃苦失職甚不稱陛下之意是以隂陽錯繆氛氣充塞羣生寡遂黎民未濟皆長吏不明使至於此也夫長吏多出於郎中中郎吏二千石子弟選郎吏又以富訾未必賢也且古所謂功者以任官稱職為差非所謂積日纍久也故小材雖纍日不離於小官賢材雖未久不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然纍日以取貴積久以致官是以廉耻貿亂賢不肖渾殽未得其真臣愚以為使諸列侯郡守二千石各擇其吏民之賢者嵗貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也遍得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上量材而授官録德而定位則廉耻殊路而賢不肖異處矣陛下加惠寬臣之罪令勿牽制於文使得切磋究之臣敢不盡愚於是天子復册之制曰蓋聞善言天者必有徴於人善言古者必有驗於今故朕垂問乎天人之應上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虛心以改今子大夫明於隂陽所以造化習於先聖之道業然而文采未極豈惑當世之務哉條貫靡竟統紀未終意朕之不眀與聽若眩與夫三王之教所祖不同而皆有失或謂久而不易者道也意豈異哉今子大夫既已著大道之極陳治亂之端矣其悉之究之孰之復之詩不云乎嗟爾君子毋常安息神之聽之介爾景福朕將親覽焉子大夫其茂明之仲舒復對曰臣聞論語曰有始有卒者其唯聖人乎今陛下幸嘉惠留聽於承學之臣復下明册以切其意而究盡聖德非愚臣之所能具也前所上對條貫靡竟統紀不終辭不别白指不分明此臣淺陋之罪也册曰善言天者必有徴於人善言古者必有驗於今臣聞天者羣物之祖也故遍覆包函而無所殊建日月風雨以和之經隂陽寒暑以成之故聖人法天而立道亦溥愛而無私布德施仁以厚之設誼立禮以導之春者天之所以生也仁者君之所以愛也夏者天之所以長也德者君之所以養也霜者天之所以殺也刑者君之所以罰也由此言之天人之徴古今之道也孔子作春秋上揆之天道下質諸人情參之於古考之於今故春秋之所譏災害之所加也春秋之所惡怪異之所施也書邦家之過兼災異之變以此見人之所為其美惡之極乃與天地流通而往來相應此亦言天之一端也古者修教訓之官務以德善化民民已大化之後天下常亡一人之獄矣今世廢而不修亡以化民民以故棄行誼而死財利是以犯法而罪多一嵗之獄以萬千數以此見古之不可不用也故春秋變古則譏之天令之謂命命非聖人不行質朴之謂性性非教化不成人欲之謂情情非度制不節是故王者上謹於承天意以順命也下務明教化民以成性也正法度之宜别上下之序以防欲也修此三者而大本舉矣人受命於天固超然異於羣生入有父子兄弟之親出有君臣上下之誼會聚相遇則有耆老長幼之施粲然有文以相接歡然有恩以相愛此人之所以貴也生五榖以食之桑麻以衣之六畜以養之服牛乘馬圈豹檻虎是其得天之靈貴於物也故孔子曰天地之性人為貴明於天性知自貴於物知自貴於物然後知仁誼知仁誼然後重禮節重禮節然後安處善安處善然後樂循理樂循理然後謂之君子故孔子曰不知命亡以為君子此之謂也册曰上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虛心以改臣聞聚少成多積小致巨故聖人莫不以䁆致明以微致顯是以堯發於諸侯舜興乎深山非一日而顯也蓋有漸以致之矣言出於己不可塞也行發於身不可掩也言行治之大者君子之所以動天地也故盡小者大慎微者著詩云惟此文王小心翼翼故堯兢兢日行其道而舜業業日致其孝善積而名顯德章而身尊此其寖明寖昌之道也積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也非明乎情性察乎流俗者孰能知之此唐虞之所以得令名而桀紂之可為悼懼者也夫善惡之相從如景鄉之應形聲也故桀紂暴謾讒賊並進賢智隱伏惡日顯國日亂晏然自以如日在天終陵夷而大壞夫暴逆不仁者非一日而亡也亦以漸至故桀紂雖亡道然猶享國十餘年此其寖微寖滅之道也册曰三王之教所祖不同而皆有失或謂久而不易者道也意豈異哉臣聞夫樂而不亂復而不厭者謂之道道者萬世亡弊弊者道之失也先王之道必有偏而不起之處故政有眊而不行舉其偏者以補其弊而已矣三王之道所祖不同非其相反將以救溢扶衰所遭之變然也故孔子曰亡為而治者其舜乎改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之救當用此也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也此言百王之用以此三者矣夏因於殷而獨不言所損益者其道如一而所上同也道之大原出於天天不變道亦不變是以禹繼舜舜繼堯三聖相授而守一道亡救弊之政也故不言其所損益也由是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致用夏之忠者陛下有明德嘉道愍世俗之靡薄悼王道之不昭故舉賢良方正之士論誼考問將欲興仁誼之休德明帝王之法制建太平之道也臣愚不肖述所聞誦所學道師之言厪能勿失耳若乃論政事之得失察天下之息耗此大臣輔佐之職三公九卿之任非臣仲舒所能及也然而臣竊有怪者夫古之天下亦今之天下今之天下亦古之天下共是天下古亦大治上下和睦習俗美盛不令而行不禁而止吏亡姦邪民亡盜賊囹圄空虛德潤草木澤被四海鳯凰來集麒麟來遊以古凖今一何不相逮之逺也安所繆盩而陵夷若是意者有所失於古之道與有所詭於天之理與試迹之於古返之於天黨可得見乎夫天亦有所分豫豫之齒者去其角傅其翼者兩其足是所受大者不得取小也古之所豫祿者不食於力不動於末是亦受大者不得取小與天同意者也夫已受大又取小天不能足而况人乎此民之所以囂囂苦不足也身寵而載髙位家溫而食厚祿因乘富貴之資力以與民爭利於下民安能如之哉是故衆其奴婢多其牛羊廣其田宅博其産業畜其積委務此而忘己以迫蹴民民日削月朘寖以大窮富者奢侈羡溢貧者窮急愁苦窮急愁苦而上不救則民不樂生民不樂生尚不避死安能避罪此刑罰之所以蕃而姦邪不可勝者也故受祿之家食祿而已不與民爭業然後利可均布而民可家足此上天之理而亦太古之道天子之所宜法以為制大夫之所當循以為行也故公儀子相魯之其家見織帛怒而出其妻食於舍而茹葵愠而拔其葵曰吾已食祿又奪園夫紅女利乎古之賢人君子在列位者皆如是是故下髙其行而從其教民化其廉而不貪鄙及至周室之衰其卿大夫緩於誼而急於利亡推讓之風而有爭田之訟故詩人疾而刺之曰節彼南山維石巖巖赫赫師尹民具爾瞻爾好誼則民鄉仁而俗善爾好利則民好邪而俗敗由是觀之天子大夫者下民之所視效逺方之所四面而內望也近者視而放之逺者望而效之豈可以居賢人之位而為庶人行哉夫皇皇求財利常恐乏匱者庶人之意也皇皇求仁義常恐不能化民者大夫之意也易曰負且乘致寇至乘車者君子之位也負擔者小人之事也此言居君子之位而為庶人之行者其患禍必至也若居君子之位當君子之行則舍公儀休之相魯亡可為者矣春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上亡以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之説滅息然後統紀可一而法度可明民知所從矣對既畢天子以仲舒為江都相事易王易王帝兄素驕好勇仲舒以禮誼匡正王敬重焉久之王問仲舒曰粵王句踐與大夫泄庸種蠡謀伐吳遂滅之孔子稱殷有三仁寡人以為粵有三仁桓公決疑於管仲寡人決疑於君仲舒對曰臣愚不足以奉大對聞昔者魯君問桞下惠吾欲伐齊何如桞下惠曰不可歸而有憂色曰吾聞伐國不問仁人此言何為至我哉徒見問耳且猶羞之况設詐以伐吳乎由此言之粵本無一仁夫仁人者正其誼不謀其利明其道不計其功是以仲尼之門五尺之童羞稱五伯為其先詐力而後仁誼也苟為詐而已故不足稱於大君子之門也五伯比於他諸侯為賢其比三王猶碔砆之與美玉也王曰善仲舒治國以春秋災異之變推隂陽所以錯行故求雨閉諸陽縱諸隂其止雨反是行之一國未嘗不得所欲中廢為中大夫先是遼東髙廟長陵髙園殿災仲舒居家推説其意草藳未上主父偃候仲舒私見嫉之竊其書而奏焉上召視諸儒仲舒弟子吕步舒不知其師書以為大愚於是下仲舒吏當死詔赦之仲舒遂不敢復言災異仲舒為人廉直是時方外攘四夷公孫𢎞治春秋不如仲舒而𢎞希世用事位至公卿仲舒以𢎞為從諛𢎞嫉之膠西王亦上兄也尤縱恣數害吏二千石𢎞乃言於上曰獨董仲舒可使相膠西王膠西王聞仲舒大儒善待之仲舒恐久獲罪病免凡相兩國輒事驕王正身以率下數上疏諌諍教令國中所居而治及去位歸居終不問家産業以修學著書為事仲舒在家朝廷如有大議使使者及廷尉張湯就其家而問之其對皆有明法自武帝初立魏其武安侯為相而儒隆矣及仲舒對册推明孔氏抑黜百家立學校之官州郡舉茂才孝廉皆自仲舒發之年老以夀終於家家徙茂陵子及孫皆以學至大官仲舒所著皆明經術之意及上疏條教凡百二十三篇而説春秋事得失聞舉玉杯蕃露清明竹林之屬復數十篇十餘萬言皆傳於後世掇其切當世施朝廷者著于篇通志卷九十八上
