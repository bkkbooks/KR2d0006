body:
  text: 通志卷五十宋右迪功郎鄭樵漁仲撰樂略第二十二律先王通於倫理以候氣之管為樂聲之均吹建子之律以子為黃鍾丑為大吕寅為太蔟卯為夾鍾辰為姑洗已為中吕午為㽔賔未為林鍾申為夷則酉為南吕戌為無射亥為應鍾陽管有六為律者謂黃鍾太蔟姑洗㽔賔夷則無射此六者為陽月之管謂之為律隂管有六為吕者謂大吕應鍾南吕林鍾中吕夾鍾此六者為隂月之管謂之為吕變隂陽之聲故為十二調調各文之以五聲播之以八音乃成為樂故有十二懸之樂焉五聲八音名義五聲者一曰宫二曰商三曰角四曰徵五曰羽八音者八卦之音卦各有風謂之八風其一曰乾之音石其風不周二曰坎之音革其風廣莫三曰艮之音匏其風融四曰震之音竹其風明庶五曰巽之音木其風清明六曰離之音絲其風景七曰坤之音土其風涼八曰兌之音金其風閶闔月令云正月其音角四月其音徴中央土其音宫七月其音商十月其音羽樂記曰宫為君商為臣角為民徴為事羽為物五者不亂則無怗滯之音矣五聲十二律還相為宫伏犧氏作易紀陽氣之初以為律法建日冬至之聲以黃鍾為宫太簇為商姑洗為角林鍾為徴南呂為羽應鍾為變宫蕤賔為變徴此聲之元五聲之正也按應鍾為變宫㽔賔為變徴自商已前但有五音此二者自周已來加文武二聲調之為七其五聲為正二聲為變變者和也故各統一日其餘以次運行當日者各自為宫而商徴以類從焉揚子雲曰聲生於日律生於辰取法於五行十二辰之義也聲生於日者謂日有五故聲亦冇五日謂甲巳為角乙庚為商丙辛為徴丁壬為羽戊癸為宫是五行合為五日五音之聲生於日也律生於辰者十二律出於十二辰子為黃鍾之類是也餘已見上文五聲六律還相為宫其用之之法先以本管為均使八音相生或上或下皆取五聲令足然後為十二律還相為宫若黃鍾之均以黃鍾為宫黃鍾下生林鍾為徵林鍾上生太蔟為商太蔟下生南呂為羽南呂上生姑洗為角此黃鍾之調皆三分之次故用正律之聲也大呂之均以大呂為宫大呂下生夷則為徴夷則上生夾鍾為商夾鍾下生無射為羽無射上生中呂為角此大呂之調皆三分之次故用正律之聲太蔟之均以太蔟為宫太蔟下生南呂為徴南呂上生姑洗為商姑洗下生應鍾為羽應鍾上生㽔賔為角此太蔟之調皆三分之次故用正律之聲夾鍾之均以夾鍾為宫夾鍾下生無射為徵無射上生中呂為商中呂上生黃鍾為羽黃鍾正律之聲長非中呂為商三分去一之次此用其子聲為羽也黃鍾下生林鍾為角林鍾子聲短非中呂為商之次故還用林鍾正管之聲為角夾鍾之調有四正聲一子聲姑洗之均以姑洗為宫姑洗下生應鍾為徵應鍾上生㽔賔為商㽔賔上生大呂為羽大呂正聲長非㽔賔為商三分之次故用其子聲為羽是三分去一之次大呂下生夷則為角夷則子聲短非㽔賔為商三分去一之次故還用正聲為角此為姑洗之調亦正聲四子聲一也中呂之均以中呂為宫中呂上生黃鍾為徴黃鍾正聲長非中呂三分去一之次故用其子聲為徴是亦三分去一之次黃鍾下生林鍾為商林鍾子聲短非中呂為宫之次故還用正聲為商林鍾上生太蔟為羽太蔟正聲長非林鍾為商三分去一之次故用其子聲為羽亦是三分去一之次太蔟下生南呂為角此中呂之調正聲三子聲一㽔賔之均以㽔賔為宫㽔賔上生大呂為徴大呂正聲長非㽔賔三分去一之次故用子聲為徴大呂下生夷則為角夷則上生夾鍾為羽夾鍾正聲長非夷則三分去一為羽之次故用子聲為羽亦是三分去一之次夾鍾下生無射為角無射子聲短非夷則為商之次還用正聲為角此㽔賔之調亦一子聲四正聲也林鍾之均以林鍾為宫林鍾上生太蔟為徴太蔟正聲長非林鍾為宫三分去一為徴之次故用子聲為徵亦是三分去一之次太蔟下生南呂為商南呂上生姑洗為羽姑洗正聲長非南吕三分去一為羽之次故用子聲為羽亦是三分去一之次姑洗下生應鍾為角應鍾子聲短非南吕為商之次故還用正聲為角此林鍾之調亦子聲二正聲三也夷則之均以夷則為宫夷則上生夾鍾為徵夾鍾正聲長非夷則三分去一為徵之次故用子聲為徵亦是三分去一之次夾鍾下生無射為商無射子聲短非夷則為宫之次故還用正聲為商無射上生中呂為羽中吕正聲長非無射為商三分去一之次故用子聲為羽亦是三分去一之次中呂上生黃鍾為角黃鍾正聲長非無射三分去一為商之次故用子聲為角此夷則之調正聲二子聲三也南吕之均以南呂為宫南呂上生姑洗為徵姑洗正聲長非南呂三分去一為徵之次故用子聲為徵亦是三分去一之次姑洗下生應鍾為商應鍾子聲短非南吕三分去一之次故用正聲為商應鍾上生㽔賔為羽㽔賔正聲長非應鍾為商三分去一之次故用子聲為羽㽔賔上生大呂為角大吕正聲長非應鍾為商之次故用子聲為角亦是三分去一之次此南呂之調正聲二子聲三也無射之均以無射為宫無射上生中吕為徵中吕正聲長非無射三分去一為徵之次故用子聲為徵亦是三分去一之次中吕上生黃鍾為商黃鍾正聲長非無射為宫之次故用子聲為商亦是其宫之次黃鍾下生林鍾為羽林鍾正聲長非黃鍾為商三分去一之次故用子聲為羽林鍾上生太蔟為角太蔟正聲長非黃鍾為商三分去一之次故用子聲為角此無射之調正聲一子聲四也應鍾之均以應鍾為宫應鍾上生㽔賔為徵㽔賔正聲長非應鍾三分去一為徴之次故用子聲為徴㽔賔上生大呂為商大吕正聲長非應鍾為宫之次故用子聲為商大吕下生夷則為羽夷則正聲長非㽔賔為徵之次故用子聲為羽夷則上生夾鍾為角夾鍾正聲長非大吕為商之次故用子聲為角此應鍾之調亦正聲一子聲四也此謂迭為宫商角徵羽也若黃鍾之律自為其宫為夾鍾之羽為中吕之徵為夷則之角為無射之商此黃鍾之五聲也大吕之律自為其宫為姑洗之羽為㽔賔之徵為南呂之角為應鍾之商此謂大吕之五聲也太蔟之律自為其宫為中吕之羽為林鍾之徵為無射之角為黃鍾之商此謂太蔟之五聲也夾鍾之律自為其宫為蕤賔之羽為夷則之徵為應鍾之角為大吕之商此夾鍾之五聲也姑洗之律自為其宫為杜鍾之羽為南呂之徴為黃鍾之角為太蔟之商此姑洗之五聲也中吕之律自為其宫為夷則之羽為無射之徵為大吕之角為夾鍾之商此謂中吕之五聲也㽔賔之律自為其宫為南呂之羽為應鍾之徵為太蔟之角為姑洗之商此㽔賔之五聲也林鍾之律自為其宫為無射之羽為黃鍾之徵為夾鍾之角為中吕之商此謂林鍾之五聲也夷則之律自為其宫為應鍾之羽為大呂之徵為姑洗之角為㽔賔之商此謂夷則之五聲也南吕之律自為其宫為黃鍾之羽為太蔟之徴為中吕之角為林鍾之商此謂南呂之五聲也無射之律自為其宫為大吕之羽為夾鍾之徵為㽔賔之角為夷則之商此謂無射之五聲也應鍾之律自為其宫為太蔟之羽為姑洗之徵為林鍾之角為南吕之商此謂應鍾之五聲也所謂五聲六律十二管還相為宫者也五聲十二律相生法古之神瞽考律均聲必先立黃鍾之均黃鍾之管以九寸為法故用九自乘為管絃之數九九八十一數管數多者則下生其數少者則上生相生增減之數皆不出於三又生取之數不出於八宫從黃鍾而起下生得八為林鍾上生太蔟亦復依八而取為商其增減之法以三為度以上生者皆三分益一下生者皆三分去一宫生徵三分宫數八十一分各二十七下生者去一去二十七餘有五十四以為徵故徵數五十四也徵生商三分徵數五十四則分各十八上生者益一加十八於五十四得七十二以為商故商數七十二也商生羽三分商數七十二則分各二十四下生者去一去二十四得四十八以為羽故羽數四十八羽生角三分羽數四十八則分各十六上生者益一加十六於四十八得六十四以為角故角數六十四此五聲大小之次也是黃鍾為均用五聲之法以下十二辰辰各有五聲其為宫商之法亦如之故辰各有五聲合為六十聲是十二律之正聲也聲本制唯以宫商角徵羽各得上下三分之次為聲其十二律相生之法皆以黃鍾為始黃鍾之管九寸下生者三分去一上生者三分益一五下六上仍得一終黃鍾下生林鍾林鍾之管六寸林鍾上生太蔟太蔟之管八寸太蔟下生南吕南吕之管五寸三分寸之一南吕上生姑洗姑洗管長七寸九分寸之一姑洗下生應鍾應鍾之管長四寸二十七分寸之二十應鍾上生㽔賔㽔賔之管長六寸八十一分寸之二十六㽔賔上生大吕大吕之管長四寸二百四十三分寸之五十二倍之為八寸分寸之一百四大吕下生夷則夷則之管長五寸七百二十九分寸之四百五十一夷則上生夾鍾夾鍾之管長三寸二千一百八十七分寸之一千六百三十一倍之為七寸分寸之一千七十五夾鍾下生無射無射之管長四寸六千五百六十一分寸之六千五百二十四無射上生中吕中吕之管長六寸萬九千六百八十三分寸之萬二千九百七十四此謂十二律長短相生一終於中吕之法又制十二鍾凖為十二律之正聲也鳬氏為鍾以律計身倍半半者凖正聲之半以為十二子律制為十二子聲比正聲為半則以正聲於子聲為倍以正聲比子聲則子聲為半但先儒釋用倍聲自有二義一義云半以十二正律為十二子聲之鍾二義云從於中吕之管寸數以三分益一上生黃鍾以所得管之寸數然半之以為子聲之鍾其為半正聲之法者以黃鍾之管正聲九寸為均子聲則四寸半黃鍾下生林鍾之子聲三分去一故林鍾子聲之律三寸林鍾上生太蔟之子聲三分益一太蔟子聲之律四寸太蔟下生南吕之子聲三分去一南吕子聲之管長三寸三分寸之二南吕上生姑洗之子聲三分益一姑洗子聲之律長三寸九分寸之五姑洗下生應鍾之子聲三分去一應鍾子聲之律長二寸二十七分寸之十應鍾上生㽔賔之子聲三分益一㽔賔子聲之律二寸八十一分寸之十三㽔賔上生大吕之子聲三分益一大吕子聲之律四寸二百四十三分寸之五十二大吕下生夷則之子聲三分去一夷則子聲之律長二寸七百二十九分寸之五百九十夷則上生夾鍾之子聲三分益一夾鍾子聲之律三寸二千一百八十七分寸之一千六百三十一夾鍾下生無射之子聲三分去一無射子聲之律二寸六千五百六十一分寸之三千二百六十二無射上生中吕之子聲三分益一中吕子聲之律三寸一萬九千六百八十三分寸之六千四百八十七還終於中吕此半正聲法其半相生之法者以正中吕之管長六寸一萬九千六百八十三分寸之萬二千九百七十四中吕上生黃鍾三分益一得八寸五萬九千四十九分寸之五萬一千八百九十六半之得四寸五萬九千四十九分寸之二萬五千九百四十八以為黃鍾黃鍾下生林鍾三分去一還以下生所得林鍾之管寸數半之以為林鍾子聲之管以次而為上下相生終於中吕皆以相生所得之律寸數半之各以為子聲之律故有正聲十二子聲十二分大小有十二以為二十四鍾通於二神迭為五聲合有六十聲即為六十律其正管長者為均之時則自用正聲為五音正管短者為均之時則通用子聲為五音亦皆三分益一減一之次還以宫商角徵羽之聲得調也歷代製造漢文帝令丞相北平侯張蒼始定律歷武帝以李延年為協律都尉蓋掌音律也元帝時郎中京房知五音六十律之數上使韋元成等試問房於樂府房對受學於故小黃令焦延夀六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終於南事而六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也又造凖如瑟而十三絃隱間九尺中央一絃下有畫分寸以為六十律清濁之節史官傳之至後漢建武之後不能定其絃緩急矣王莽召天下通知鍾律者百餘人令劉歆領之造銅律其所制與京房不殊魏武帝時杜夔精識音韻為雅樂郎中令鑄銅工柴玉巧有意思形器之中多所造作亦為時人見知夔令玉鑄鍾其聲均清濁多不如法數毁改作玉甚厭之謂夔清濁任意更相訴白於魏武魏武取所鑄鍾雜錯更試然後知夔為精而玉之謬也明帝青龍中鑄大鍾髙堂隆諫曰夫禮樂者為治之大本也故簫韶九成鳯凰來儀雷鼓六變天神以降是以升平刑措和之至也新春發響商辛以隕大鍾既鑄周景以死存亡之機由此而作君舉必書古之道也作而不法何以示後帝稱善久之晉張華荀朂校魏杜夔所造鍾律其聲樂多不諧合乃出御府古今銅竹律二十五具銅尺銅斛七具校減新尺短夔尺四分因造十有二笛笛具五音以應京房之術笛體之音皆各用㽔賔林鍾之角短則又倍之二笛八律而後成去四分之一而以本宫管上行度之則宫穴也因宫穴以本宫徵管上行度之則徵穴也各以其律展轉相因隨穴踈密所冝置之或半之或四之以調律吕正雅樂正會殿庭作之自謂宫商克諧然論者謂朂為暗解初朂常於路逄趙賈人牛鐸及掌樂事律吕未諧曰得趙人牛鐸則諧矣遂下郡國悉送牛鐸果得諧者時阮咸善達八音論者謂之神解咸常心譏朂新律聲髙以謂髙近哀思不合中和每公會作樂朂自以為逺不及咸常意咸謂之不調以為異已乃出咸為始平相後有田夫耕於野得周玉尺朂以校已所理鍾石絲竹皆短校一米朂由是伏咸之妙復召咸歸梁武帝天監元年下詔博采古樂無所得帝既素善音律詳悉舊事遂自制立四器名之為通通受聲廣九寸宣聲長九尺臨嶽髙一寸二分每通施三絃一曰元英通應鍾絃用百四十二絲長四尺七寸四分差強黃鍾絃用二百七十絲長九尺大吕絃用二百五十二絲長八尺四寸三分差弱二曰青陽通太蔟絃用二百四十絲長八尺夾鍾絃用二百二十四絲長七尺五寸弱姑洗絃用二百三十二絲長七尺一寸一分強三曰朱明通中吕絃用百九十九絲長六尺六寸六分弱㽔賔絃用百八十九絲長六尺三寸二分強林鍾絃用百八十絲長六尺四寸四曰白藏通夷則絃用百六十八絲長五尺六寸二分弱南吕絃用百六十絲長五尺三寸二分大強無射絃用百二十九絲長四尺九寸一分強因以通聲轉推月氣悉無差違而還相得中又制為十二笛黃鍾笛長三尺八寸大吕笛長三尺六寸太蔟笛長三尺四寸夾鍾笛長三尺二寸姑洗笛長三尺一寸中吕笛長二尺九寸㽔賔笛長二尺八寸林鍾笛長二尺七寸夷則笛長二尺六寸南吕笛長二尺五寸無射笛長二尺四寸應鍾笛長二尺三寸用笛以寫通聲校古夾鍾玉律并周代古鍾並皆不差於是被以八音施以七聲莫不和韻陳山陽太守毛爽傳習京房候氣術陳亡祖孝孫學之於爽周歲之日日異其律冬至之日以黃鍾為宫林鍾為徵太蔟為商南吕為羽姑洗為角應鍾為變宫蕤賔為變徵隨月異宫匝嵗而復焉後魏孝明帝神龜元年有陳仲儒者自江南歸魏頗間樂事請依前漢京房立凖以調八音有司問仲儒言前被符問京房凖定六十律之後雖有器存曉之者鮮至後漢嘉平末張光等猶不能定絃之急緩聲之清濁仲儒授自何師出何典籍而云能曉答曰仲儒在江左之日頗愛琴又常覽司馬彪所撰續漢書見京房凖術成數昭然而張光等不能定凖者本以代律取其分數調校樂器則宫商昜辨若尺寸小長則六十宫商相與微濁若分數如短則六十徵羽類皆小清至於清濁相宣諧會歌管皆得應合雖積黍驗氣取聲之本清濁諧會亦須有方若間凖意則辨五聲清濁之韻若善琴術則知五調調音之體參此二途以均樂器則自然應和不相奪倫舊志唯云凖形如瑟十三絃隱間九尺以應黃鍾九寸調中一絃令與黃鍾相得按房凖九尺之內若十七萬七千一百四十七分一尺之內為萬九千六百八十三分又復十之是為於凖一寸之內亦為萬九千六百八十三分然則於凖一分之內乘為二千分又為小分以辨強弱中間至促雖離朱之明猶不能窮而分之仲儒私曾考驗但前却中柱使入常凖尺分之內相生之韻已自應合自上代以來消息調凖之方並史文所略出仲儒愚思且燧人不師資而習火延夀不束修以變律謂之天授豈必經師傳而後得其要妙哉時尚書蕭寶夤亦以仲儒學不師授不可施用遂已之北齊霸府田曹參軍信都芳世號知音能以管候氣仰觀雲色常與人對語忽指天曰孟春之氣至矣人往驗管而飛灰已應每月所候言皆無爽又為輪扇二十四埋地中以測二十四氣每一氣感則一扇自動他扇並住與管灰相應無少異隋開皇二年文帝詔定音樂沛公鄭譯云考尋樂府鍾石律吕皆有宫商角徵羽變宫變徵之名七聲之內三聲乖應每常求訪終莫能通後得龜兹人蘇祗婆所奏琵琶其一均之中間有七調調有七種以其七調勘校七聲冥若合符因習而彈之得七聲之正於七調之中又有五旦旦作七調以華言譯之旦即均也其聲亦應黃鍾太蔟林鍾南吕姑洗五均以外七律更無調聲遂因其所捻琵琶絃柱相飲為均推演其聲更立七均合成十二以應十二律律有七音音立一調故成七調十二律合八十四調旋轉相交盡皆和合仍以其聲考校太樂所奏林鍾之宫應用林鍾為宫乃用黃鍾為宫應用南吕為商乃用太蔟為商應用應鍾為角乃取姑洗為角故林鍾一宫七聲三聲並戾其十一宫七十七音例皆乖越莫有通者又以編懸有八因作八音之樂七聲之外更立一聲謂之應聲譯因作書二十餘篇明其指趣焉至是譯以其書宣示朝廷并立議正之時有萬寶常者妙達鍾律遍工八音帝召寶常問以鄭譯所定之樂可施用與否寶常曰此亡國之音豈陛下所冝聞上不悅寶常極陳樂聲哀怨淫放請更之乃用水尺為律以調樂器其損益頗多然不為時人所取又太子洗馬蘇夔駮譯曰韓詩外傳所載樂聲感人及月令所載五音所中並皆有五不言變宫變徵又左氏所云七音六律以奉五聲凖此而言每宫應立五調不聞更加變宫變徵二調為七調七調之作所出未詳譯答曰周有七音之律漢書律歷志天地人及四時謂之七始黃鍾為天始林鍾為地始太蔟為人始是為三始姑洗為春㽔賔為夏南吕為秋應鍾為冬是為四時四時三始是以為七今若不以二變為調曲則是冬夏聲闕四時不偹是故每宫立七調於是衆從譯議譯又與夔俱云按今樂府黃鍾乃以林鍾為調首失君臣之義清樂黃鍾宫以小吕為變徵乖越相生之道今請雅樂黃鍾宫以黃鍾為調首清樂去小吕還用㽔賔為變徵衆皆從之夔又與譯議欲纍黍立分正定律吕時以音律久不通夔譯等一朝能為之以為樂聲可定而何妥舊以學問推為儒首帝素不悅學不知樂妥又耻已宿儒不逮譯等欲沮壞其事乃立議非十二律還相為宫曰經文雖道還相為宫恐是直言其理亦不通隨月用調是以古來不取若依鄭元及司馬彪須用六十律方得和韻今惟取黃鍾之正宫兼得七始之妙義非止金石諧韻亦乃簨簴不繁可以享百神而合萬舞矣而又非其七調之義曰近代書記所載縵樂鼓琴吹笛之人多云三調三調之聲其來久矣請存三調而已時牛𢎞總知樂事不能精究音律寶常又修洛陽舊典言幼學音律師於祖孝徴知其上代修調古樂周之璧翣商之崇牙懸八用七盡依周禮周禮偹矣所謂正聲又近前漢之樂不可廢也是時競為異議各立朋黨是非之理紛然淆亂或欲各令修造待成擇其善者而從之妥恐樂成善惡易見乃請張樂試之遂先説曰黃鍾者以象人君之德及奏黃鍾之調帝曰洋洋和雅甚與我心會妥因陳用黃鍾一宫不假餘律帝大悅班賜妥等修樂者自是譯等議寢帝又遣毛爽及蔡子元于普明等以候節氣依古於三重密屋之內以木為桉十有二具每取律吕之管隨十二辰置于桉上而以土埋之上平於地中實葭莩之灰以輕緹素覆律口每地氣至與律冥符則灰飛衝素散出于外而氣應有早晚灰飛有多少或初入月其氣即應或至中下旬間氣始應者或灰飛出三五夜而盡或終一月才飛少許者帝異之問牛𢎞𢎞對曰灰飛半出為和氣全出為猛氣吹灰不能出為衰氣和氣應者其政平猛氣應者其臣縱衰氣應者其君暴帝駮之曰臣縱君暴其政不平非月别而有異也今十二月律於一嵗內應不同安得暴君縱臣若斯之甚也𢎞不能對初萬寶常聼太常所奏樂泫然而泣人問其故對曰樂淫厲而哀天下其亂乎開皇初復有盧賁蕭吉並撰著樂書又有安馬駒曹妙達王長通郭令樂等皆能造曲天機既不逮寶常復多鄭聲不歸於雅煬帝之將幸江都也有樂人王令言者號知音律聞其子彈琵琶作翻安公子調令言歔欷流涕曰此曲宫聲往而不返宫者君也帝其不還乎竟如其言語具寶常傳中唐髙祖受禪後軍國多務未遑改創樂府尚用隋氏舊文至武德九年正月始命太常少卿祖孝孫考正雅樂至貞觀二年六月樂成奏之太宗謂侍臣曰禮樂之作蓋聖人緣情設教以為樽節治之興替豈此之由御史大夫杜淹對曰前代興亡實由此樂陳之將亡也為玉樹後庭花齊之將亡也為伴侣行路難開之莫不悲泣所謂亡國之音也以是觀之蓋樂之由也太宗曰不然夫音聲能感人自然之道故歡者聞之即大恱憂者聞之即大悲悲恱之情在於人心非由樂也將亡之政其人必苦然苦心所發故聞之則悲耳何有樂聲憂怨能使人悅者悲乎今玉樹後庭花伴侣之曲其聲具存朕當為公奏之知公必不悲矣初孝孫以梁陳舊樂用吳楚之音周齊舊樂涉胡戎之伎於是斟酌南北考以古音而作大唐雅樂以十二律各順其月還相為宫按禮記云大樂與天地同和治世之音安以樂其政和故製十二和之樂合三十二曲八十有四調祭圜丘以黃鍾為宫郊朝方澤以林鍾為宫宗廟以太蔟為宫五郊朝賀饗宴則隨月用律為宫初隋但用黃鍾一宫惟扣七鍾餘五鍾虛設而不扣及孝孫建旋宫之法扣鍾皆遍無復虛設矣周禮旋宫之義亡絶已久莫能知之一朝復古自孝孫始也貞觀初張文收善音律常覽蕭吉樂譜以為未甚詳悉乃取歷代沿革截竹為十二律吹之偹盡還宫之義太宗召文收於太常令與少卿祖孝孫參定雅樂太樂有古鍾十二近代惟用其七餘有五鍾俗號啞鍾莫能通者文收吹律調之聲皆響徹時人咸服其妙尋授協律郎及孝孫卒文收復採三禮更加釐革以定十二和之樂然後樂教大偹焉權量杜佑曰漢書云推歷生律制器規圓矩方權重衡平凖繩嘉量探賾索隱鈎深致逺莫不用焉度者分寸尺丈引也本起黃鍾之長以子榖秬黍中者一黍之廣度之九十分黃鍾之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣量者籥合升斗斛也本起於黃鍾之籥用度數審其容以子榖秬黍中者千有二百實其籥以井水凖其槩十籥為合十合為升十升為斗十斗為斛而五量嘉矣權者銖兩斤鈞石也本起於黃鍾之重一籥容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石權與物鈞而生衡衡運生規規圓生矩矩方生繩繩直生凖凖正則平衡而鈞權矣是謂五則也魏初杜夔造斛即周禮所謂嘉量也深尺方尺實一輻音輔臀一寸實一豆耳三寸實一升重一鈞聲中黃鍾晉氏播遷亡其彛量隋制前代三升當今一升三兩當今一兩一尺二寸當今一尺唐貞觀中張文收鑄銅斛稱尺升合咸得其數詔以其副藏於樂府至武延秀為太常卿以為竒玩以律與古玉尺玉升斗合獻焉開元十七年將考宗廟樂有司請出之敕唯以銅律付太常而亡其九管今正聲有銅律三百五十六唐志作三百六十銅斛二銅稱二銅甌十四唐志有稱尺一斛左右耳與臀皆正方積十而登以至於斛銘云大唐貞觀十年嵗次元枵月旅應鍾依新令纍黍尺定律校籥成兹嘉量與古玉斗相符同律度量衡協律郎張文收奉敕修定稱盤銘云大唐貞觀稱同律度量衡匣上有朱漆題稱尺二字尺亡其迹猶存以今常用度量校之尺當六之五衡皆三之一一斛一稱是文收總章年所作斛正圓而小與稱相符也八音金一鍾響棧鈸鎛銅錞于銅鼓鐃鐲鐸方鍾世本云黃帝工人垂所造山海經云炎帝之孫鼓延始為鍾禮記云垂之和鍾鄭康成云垂堯時鍾工並未知孰是周禮冬官考工記鳬氏為鍾其制詳矣爾雅曰大鍾曰鏞中者曰剽音漂小者曰棧春秋左氏傳曰景王將鑄無射無射鍾名律中無射伶州鳩曰王其以心疾死乎言鍾聲之能感人也如是棧鍾東晉初得之則爾雅所謂鍾小者棧也小而編次之亦曰編鍾鏄如鍾而大按前代有大鍾若周之無射非一皆謂之鍾也錞于古禮器也錞音時句反圓如錐頭大上小下周禮以金錞和鼓宋史云今人間猶時有其器則宋非廟廷所用廣漢什邡人假祖以錞于獻始興王鑑其器髙三尺六寸六分圍二尺四寸圓如筒音動銅色黑如漆甚薄上有銅馬以繩懸馬令去地尺餘灌之以水又以器盛水於下以芒當心跪注錞于以手震芒則聲如雷清響良久乃絶後周平蜀得之斛斯徵觀之曰錞于也依干寶周禮注驗之如其言也鐃如編鍾而無舌有柄搖之以止鼓漢鼓吹曲有鐃歌鐲鉦也形如小鍾軍行鳴之以為鼓節周禮以金鐲節鼓近代有如大銅疊垂而擊之以節鼓呼曰鉦鐸大鈴也周禮以金鐸通鼓三禮圖云以銅為之木舌為木鐸金舌為金鐸方響梁有銅磬蓋今方響之類也方響以鐵為之修九寸廣二寸圓上方下架如磬而不設業依於架上以代鍾磬人間所用者才三四寸銅鈸亦謂之銅盤出西戎及南蠻其圓數寸隱起如浮漚貫之以韋相擊以和樂也南蠻國大者圓數尺或謂齊穆王素所造銅鼓鑄銅為之虛其一面覆而擊其上南夷扶南天竺類皆如此嶺南豪家則有之大者廣丈餘西戎有吹銅角長可二尺形如牛角石二磬毊磬世本云叔所造不知何代人又曰無句作磬古史考曰堯時人也禮記曰叔之離磬周禮冬官考工記磬氏為磬磬師掌教擊磬教縵樂燕樂之鍾磬毊虛嬌反爾雅云毊形似黎管以玉為之書云泗濵浮磬泗濵石可為磬唐代用華原石故白樂天作華原磬以譏之土三塤缶塤世本云暴辛公所造亦不知何代人周畿內有暴國豈其時人乎爾雅曰燒土為之大如鵝子鋭上平底形似稱錘六孔小者如雞子大曰􅷺音呌缶説文曰瓦器也所以盛酒漿秦人鼓之以節歌也爾雅曰盎謂之缶注云盆也坎其擊缶史記趙主與秦王會于澠池秦王為趙王擊缶是也李斯上秦王逐客論云擊甕扣缶真秦之聲也革四鼓鼓齊鼓臘擔鼓雞羯鼓員答鼓婁鼓都曇鼓節毛正鼓鼓撫拍雅鼓世本云夷作鼓以桴擊之曰鼓以手搖之曰鼗周禮地官鼓人掌教六鼓四金之音聲以節聲樂以和軍旅以正田役教以鼓而辨其聲用教擊鼓者大小之數又别其聲所用之事以雷鼓鼓神祀以靈鼓鼓社祭以路鼓鼓鬼享以鼖鼓鼓軍事以鼛鼓鼓役事以晉鼓鼓金奏雷鼓八面鼓也神祀祀天神也靈鼓六面鼓也社祭祭地祇也路鼓四面鼓也鬼享享宗廟也大鼓謂之鼖鼖鼓長八尺鼛鼓長一丈二尺晉鼓長六尺六寸金奏謂樂作擊編鐘禮記云夏后之鼓足殷楹鼓周懸鼓足謂四足也楹謂以柱貫中上出也懸者設之簨虡應鼓在大鼓側以和大鼓小鼓有柄曰鞀大鞀謂之鞞月令仲夏修鞀鞞是也然則鞀鞞即鞉類也帝王紀曰帝嚳命垂作鞞又有鼉鼓焉近代有腰鼓大者瓦小者木皆廣首而纎腹齊鼓狀如漆筒大鼓設齊於鼓靣如麝齊故曰齊鼓擔鼓如小甕先冒以革而漆之羯鼓正如漆筒兩頭俱擊以出羯中故號羯鼓亦謂之兩杖鼓都曇鼓似腰鼓而小以槌擊之毛貟鼓似都曇而稍大答臘鼓制廣羯鼓而短以指揩之其聲甚震俗謂之揩鼓雞婁鼓正貟而首尾可擊之處平可數寸正鼓和鼓者一以正一以和皆腰鼓也節鼓狀如博局中閛圓孔適容其鼓擊之以節樂也節不知誰所造傅元節賦云黃鐄唱歌九韶興舞口非節不詠手非節不拊此則所從來亦逺矣鐄音橫撫拍以韋為之實之以粳撫之以節樂也雅周禮春官笙師而掌教雅以教裓樂教教視瞭也鄭衆曰雅狀如漆筒而弇口大二周長三尺六寸以羊韋挽之有兩紐疏畫之賈公彥云長疏而書之賔醉而出奏裓夏以此器築地為之行節明不失禮裓古來反絲五琴豎瑟篌築箜箏琵琶阮咸箜篌琴世本云神農所造琴操曰伏羲作琴所以修身理性反其天真廣雅曰琴長三尺六寸六分象三百六十六日五絃象五行大絃為君寬和而溫小絃為臣清亷不亂文王武王加二絃以合君臣之恩也揚雄琴清英曰舜彈五絃之琴而天下化堯加二絃以合君臣之恩桓談雜論曰五絃第一絃為宫其次商角徴羽文王武王各加一絃以為少宫少商説者不同又琴之始作或云伏羲或云神農諸家所説莫能詳矣爾雅曰大琴謂之離二十七絃今無其器齊桓公曰號鍾楚莊曰繞梁相如曰緑綺伯喈曰燋尾而傅元琴賦則曰非伯喈也瑟世本云庖羲作五十絃黃帝使素女鼓瑟哀不自勝乃破為二十五絃具二均聲爾雅曰大瑟謂之離禮圖舊云雅瑟長八尺一寸廣一尺八寸二十三絃其常用者十九絃頌瑟長七尺二寸廣尺八寸二十五絃盡用之易通卦驗曰人君冬至日使八能之士鼓黃鍾之瑟瑟用槐木長八尺一寸夏至日瑟用桑木長五尺七寸槐取氣上也桑取氣下也築不知誰所造也史籍惟云髙漸離善擊築漢髙祖過沛所擊釋名曰築似箏細項按今制身長四尺三寸項長三寸圍四寸五分頭七寸五分上闊七寸五分下闊六寸五分箏秦聲也傅元箏賦序曰世以為蒙恬所造今觀其器上崇似天下平似地中空凖六合絃柱擬十二月設之則四象在鼓之則五音發斯乃仁智之器豈蒙恬亡國之臣能關思哉今清樂箏並十有二絃他樂皆十有三絃軋箏以斤竹潤其端而軋之彈箏則用骨爪長寸餘以代指琵琶傅元琵琶賦曰漢遣烏孫公主嫁昆彌念其行道思慕故使工人裁箏築為馬上之樂今觀其器中虛外實天地象也盤圓柄直隂陽敘也柱十有二配律吕也四絃法四時也以方俗語之曰琵琶取其易傳於外國也風俗通曰以手琵琶因以為名釋名曰推手前曰批引手却曰把杜摯曰秦苦長城之役百姓絃鼗而鼓之並未詳孰實其器不列四廂今清樂奏琵琶俗謂之秦漢子圓體修頸而小疑是絃鼗之遺制傅元曰體圓柄直柱有十二其他皆兌上鋭下曲項形制稍大本出胡中俗傳是漢制兼似兩制者謂之秦漢蓋謂通用秦漢之法梁史稱侯景之害簡文也使大樂令彭俊齎曲項琵琶就帝飲則南朝似無曲項者五絃琵琶稍小蓋北國所出舊彈琵琶皆用木撥彈之唐貞觀中始有手彈之法今所謂搊琵琶者是也風俗通所謂以手琵琶之乃知非用撥之義豈上代固有搊之者手彈法近代已廢自裴洛兒始為之阮咸亦秦琵琶也而項長過於今制列十有三柱武后時蜀人蒯朗於古墓中得之晉竹林七賢圖阮咸所彈與此類同因謂之阮咸咸世實以善琵琶知音律稱蒯朗初得銅者時莫有識之太常少卿元行沖曰此阮咸所造乃令匠人改以木為之聲甚清雅箜篌漢武帝使樂人侯調所作以祠太一或云侯暉所作其聲坎坎應節謂之坎侯聲訛為箜篌者因樂工人姓耳古施郊廟雅樂近代専用於楚聲宋孝武大明中吳興沈懷逺被徙廣州造繞梁其器與箜篌相似懷逺亡其器亦絶或謂師延靡靡樂非也舊説一依琴制今按其形似瑟而小絃用撥彈之如琵琶也豎箜篌邊樂也漢靈帝好之體曲而長二十三絃豎抱於懷中用兩手齊奏俗謂之擘箜篌鳯首箜篌頸有軫木六柷敔舂牘拍板柷敔不知誰所造樂記曰聖人作為椌楬謂柷敔也椌苦江反楬苦八反柷如漆筒方二尺四寸深一尺八寸中有椎柄連底旁開孔內手於中擊之以舉樂敔狀如伏虎背上有二十七鉏鋙碎竹以擊其首而逆戞之以止樂舂牘周制笙師掌以教裓樂虛中如筒無底鄭衆曰舂牘以竹大五六寸長七尺短者一二尺其端有兩空髹畫以手築地賔醉而出以節之髹許牛反舉舂杵亦謂之頓相相助也以節樂也或謂梁孝王築睢陽城擊鼓為下杵之節睢陽操用舂牘後代因之拍板長濶如手重十餘枚以韋連之擊以代抃抃擊其節也情發於中手抃足蹈抃者因其聲以節舞龜兹伎人彈指為歌舞之節亦抃之意也匏七笙竽笙世本云隨作笙未知其何代人也禮記曰女媧之笙簧説文云笙正月之音物生故謂之笙十三簧象鳯之身列管匏內施簧管端宫管在中央三十六簧曰竽宫管在左旁十九簧至十三簧曰笙其他皆相似也大笙謂之簧小笙謂之和詩傳曰吹笙則鼓簧矣蓋笙中之簧也周禮大司樂笙師掌教吹笙竽鄭衆云竽三十六簧笙十三簧吹音吹爾雅曰笙十九簧者曰巢十三簧者曰和漢章帝時零陵文學奚景於舜祠得笙白玉管後代易之以竹耳竽亦匏也今之笙竽以木代匏而漆殊愈於匏荆梁之南尚仍古制南蠻笙則是匏其聲甚劣竹八簫笳管角箎七星籥笛篳篥簫世本曰舜所造其形參差象鳯翼十管長二尺爾雅曰編二十三管長一尺四寸者曰䇾音言十六管長尺三寸者曰筊音交凡簫一名籟前代有洞簫今無其器蔡雍曰簫編竹有底大者二十三管小者十六管長則濁短則清以密蠟實其底而增減之則和然則雍時無洞簫矣管爾雅曰長尺圍寸併漆之有底大者曰簥音嬌中者曰􅀢乃結反小者曰􅩭音妙古者以玉為管舜時西王母獻白琯是也月令均琴瑟管簫蔡雍章句曰管者形長尺圍寸有孔無底其器今亡説文曰管如箎六孔十二月之音詩云嘒嘒管聲周禮孤竹之管於圓丘奏之孫竹之管於方丘奏之隂竹之管於宗廟奏之鄭氏云孤竹竹特生者孫竹竹枝根之未生者隂竹生於山北也箎世本云暴辛公所造舊志云一曰管非也雖不知暴辛公何代人而非舜前人明矣舜時西王母獻琯則是已有此器辛公安得造箎乎爾雅曰大箎謂之沂箎以竹為之長尺四寸圍三寸一孔上出寸三分名曰翹橫吹之小者尺二寸廣雅云八孔今有羌吹非雅器也蔡雍月令章句云箎竹也六孔有距橫吹之詩云仲氏吹箎七星不知誰所作其長盈尋籥不知誰所造按禮記葦籥伊耆氏之樂也伊耆已有籥矣周禮有籥師掌教國子秋冬吹籥歷代文舞之樂所執羽籥是也蓋詩所謂左手執籥右手秉翟爾雅云籥如笛三孔而短小廣雅云七孔大者曰産中者仲小者箹中音丁仲反箹音握笛馬融長笛賦此器起近代出於羌中京房偹其五音又稱邱仲工其事不言所造風俗通曰邱仲造笛長尺四寸七孔武帝時人後更有羌笛二説不同未詳孰實今橫笛去觜其加觜者謂之義觜笛按橫笛小箎也出漢靈帝好胡笛宋書云有胡箎出於胡吹即謂此君梁胡吹歌云快馬不須鞭拗折楊栁枝下馬吹橫笛愁殺路旁兒此歌元出於北國知橫笛是此名也篳篥本名悲篥出於胡中其聲悲或云儒者相傳邉人吹角以驚馬後乃以笳為首竹為管笳杜摯有笳賦云李伯陽入西戎所造晉先蠶注車駕住吹小菰發吹大菰菰即笳也又有胡笳漢舊箏笛録有其曲不記所出本末也角書記所不載或出羌域以驚中國馬馬融又云出吳越八音之外又有三一桃皮東夷有卷桃皮二貝大蠡也容可數升並吹之以節樂亦出南蠻三葉銜葉而嘯其聲清震橘柚尤善或云卷蘆葉為之形如笳首也通志卷五十
