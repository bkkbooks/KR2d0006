body:
  text: 通志卷一百六十二宋右迪功郎鄭樵漁仲撰列傳第七十五隋劉昉鄭譯栁裘皇甫績郭衍張衡楊汪裴蘊袁充王劭李雄趙煚趙芬王韶元巖宇文弼伊婁謙李圓通陳茂郭榮龎晃李安弟哲楊尚希張煚父羡蘇孝慈兄子沙羅元壽韋世康兄洸藝洸弟藝弟沖韋師栁機子述弟肅機弟旦謇旦機從子之陸彥師魏淡劉昉博陵望都人也父孟良仕魏位大司農卿從孝武帝西入關周文以為東梁州刺史昉性輕狡有姦數周武帝時以功臣子入侍皇太子及宣帝嗣位昉以技佞見狎出入宮掖寵冠一時授大都督遷小御正與御正中大夫顔之儀並見親信及帝不悆召昉及之儀俱入卧內屬以後事帝失瘖不復能言昉見靜帝幼沖不堪負荷而昉素竒髙祖時髙祖又以后父之故有重名於天下昉遂與鄭譯謀引髙祖輔政髙祖固讓不敢當昉曰公若為當速為之如不為昉自為也髙祖乃從之及髙祖為丞相以昉為司馬時宣帝弟漢王贊居禁中每與帝同帳而坐昉飾美妓進贊贊甚恱之昉因説贊曰大王先帝之弟時望所歸孺子幼沖豈堪大事今先帝初崩羣情尚擾王且歸第待事寧後入為天子此萬全計也贊時年未弱冠性識庸下以為信然遂從之髙祖以昉有定䇿之功拜上大將軍封黃國公與沛國公鄭譯皆為心膂前後賞賜巨萬出入以甲士自衛朝野傾屬稱為黃沛時人為之語曰劉昉牽前鄭譯推後昉自恃其功頗有驕色然性粗踈溺於財利富商大賈朝夕盈門于時尉遲迥起兵髙祖令韋孝寬討之至武陟諸將不一髙祖欲遣昉譯一人往監軍因謂之曰須得心膂以統大軍公兩人誰行昉辭未嘗為將譯辭以母老為請帝不懌而髙熲請行遂遣之由是恩禮漸薄又王謙司馬消難相繼反髙祖憂之忘寢與食昉逸逰縱酒不以職司為意相府事多所遺落髙祖深銜之乃以髙熲代為司馬是後益見疏忌及受禪進位柱國改封舒國公亰師飢上令禁酒而昉使妾賃屋當壚酤酒為治書侍御史梁毗劾奏有詔不問昉居間無事鬱鬱不得志時上柱國梁士彥宇文欣俱失職怨望時昉並與之交數相往來士彥妻有美色昉與私通士彥不之知也情好彌協遂相與謀反許推士彥為帝又自謂姓是卯金刀名是一萬日劉氏應為萬日天子後事泄帝窮問之昉自知不免默無所對於是詔士彥欣昉並處死其兄弟叔姪特恕其命臨刑至朝堂宇文欣見髙熲向之叩頭求哀昉勃然謂欣曰事形如此何叩頭之有乃伏誅仍籍沒其家後數日上素服臨射殿盡取三家資物置於前令百寮射取之以為鑒誡云鄭譯字正義滎陽開封人也祖瓊魏范陽太守父道雍周少司空譯聰敏涉獵羣書工騎射尤善音樂有名於世譯從祖文寬尚周文元后之妹魏平陽公主無子周文命譯後之由是譯少為周文所親恆令與諸子遊集年十餘嵗嘗詣府司録李長宗長宗於衆中戲之譯斂容謂曰眀公位望不輕瞻仰斯屬輒相玩狎無乃喪德也長宗甚異之文寬後誕二子譯復歸本生周眀帝時詔令事輔城公是為武帝及帝即位起家給事中為左侍上士與儀同劉昉恆侍帝側譯時喪妻帝令譯尚梁安固公主及帝親總萬幾以為御正下大夫頗被顧遇東宮建轉太子宮尹下大夫特被親待時太子多失德內史中大夫烏丸軌每勸帝廢太子而立秦王由是太子恆不自安建德二年為聘齊使副後詔太子西征吐谷渾太子隂謂譯曰秦王上愛子也烏丸軌上信臣也今吾此行得無扶蘇之事乎譯曰願陛下勉著仁孝無失子道而已勿為他慮太子然之既破賊譯以功最賜爵開國子後坐褻狎皇太子烏丸軌宇文孝伯等以聞帝大怒除譯名宦臣親幸者咸被譴太子復召之譯戲狎如初因言於太子曰殿下何時可得據天下太子恱而益眤之例復官仍拜吏部下大夫及武帝崩太子嗣位是為宣帝超拜開府儀同大將軍內史中大夫封歸昌縣公既以恩舊任遇甚重委以朝政遷內史上大夫進封沛國公上大夫之官自譯始也以其子善願為歸昌縣公元琮為永安縣男又監修國史譯頗専權時帝幸東亰譯取官材自營私第又坐除名劉昉數言於帝帝復召之顧待如初詔領內史事初髙祖與譯有同學之舊譯又素知髙祖相表有竒傾心相結至是髙祖為宣帝所忌情不自安嘗在永巷私於譯曰久願出藩公所悉也敢布心腹少留意焉譯曰以公德望天下歸心欲求多福豈敢忘也謹即言之時將遣譯南征譯請元帥帝曰卿意如何對曰若定江東自非懿戚重臣無以鎮撫可令隋公行且為壽陽總管以督軍事帝從之乃下詔以髙祖為揚州總管譯發兵俱會壽陽以伐陳行有日矣帝不豫譯遂與御正下大夫劉昉謀引髙祖入受顧託既而譯宣詔文武百官皆受髙祖節度時御正中大夫顔之儀與宦者謀引大將軍宇文仲輔政仲已至御坐譯知之遽率開府楊惠及劉昉皇甫績栁裘俱入仲與之儀見譯等愕然逡巡欲出髙祖因執之於是矯詔復以譯為內史上大夫眀日髙祖為丞相拜譯柱國府長史行內史上大夫事及髙祖為大冢宰總百揆以譯兼領天官都府司會總六府事出入卧內言無不從賞賜玊帛不可勝計每出入以甲士從拜其子元璹為儀同時尉遲迥王謙司馬消難等作亂髙祖益加親禮進上柱國恕以十死然譯性輕險不親職務而贓貨狼籍髙祖隂疏之以有定䇿功不忍廢放隂敕官屬不得白事於譯譯猶坐聽事無所關預懼頓首求解職髙祖寬喻之接以恩禮及帝受禪譯以上柱國歸第賞賜豐厚進子元璹成臯郡公元珣永安縣男追贈其父及亡兄二人並為刺史譯自以被疏隂呼道士章醮以祈福助其婢奏譯厭蠱左道帝謂譯曰我不負公此何意也譯無以對譯又與母别居為憲司所劾由是除名下詔云譯嘉謀良䇿寂爾無聞鬻獄賣官沸騰盈耳若留之於世在人為不道之臣戮之於朝入地為不孝之鬼有纍幽顯無以置之宜賜以孝經令其熟讀仍遣與母共居未幾詔譯參律令復授開府隆州刺史請還療疾有詔徵之見於醴泉宮賜宴甚歡因謂譯曰貶退已久情相矜憫於是顧謂侍臣曰鄭譯與朕同生共死間關危難興言念此何日忘之譯因奉觴上壽上令內史令李德林立作詔書復爵沛國公位上柱國髙熲戲謂譯曰筆乾譯答曰出為方嶽杖䇿言歸不得一錢何以潤筆上大笑未幾詔譯參議樂事譯以周代七聲廢缺自大隋受命禮樂宜新更修七始之義名曰樂府聲調凡八篇奏之上嘉美焉俄拜岐州刺史嵗餘復奉詔定樂於太常上勞譯曰律令則公定之音樂則公正之禮樂律令公居其三良足美也尋還岐州開皇十一年卒年五十二諡曰達子元璹嗣煬帝初立五等悉除以譯佐命元功詔追改封譯莘公以元璹襲元璹歷位右光祿大夫右衛將軍大業末為文城太守以城歸唐栁裘字茂和河東解人南齊司空世隆之曽孫也祖惔梁尚書左僕射父眀太子舍人義興太守裘少聰慧弱冠有令名在梁歷位尚書郎駙馬都尉梁元帝為魏軍所逼遣裘請和於魏俄而江陵平遂入關中周眀武間自麟趾學士纍遷太子侍讀封昌樂縣侯宣帝即位進爵為公轉御史大夫及帝不悆留侍禁中與劉昉韋謨皇甫績同謀引髙祖曰時不可失今事已然宜早定大計天與不取反受其殃髙祖從之進上開府內史大夫委以機密及尉遲迥作亂天下騷動并州總管李穆頗懷猶豫髙祖令裘往喻之裘見穆盛陳利害穆遂歸心以奉使功賜綵三百匹金九環帶一腰時司馬消難奔陳髙祖即令裘隨便安集淮南賜馬及雜物開皇元年進位大將軍拜許州刺史在官清簡吏民懷之轉曹州刺史後髙祖思裘定䇿功欲加榮秩將徴之顧問朝臣曰曹州刺史何當入朝或曰即今冬也乃止裘尋卒帝傷惜者久之諡曰安子惠童嗣皇甫績字功眀安定朝那人也祖穆魏隴東太守父道周湖州刺史雍州都督績三嵗而孤為外祖韋孝寬所鞠飬孝寬以諸子墮業督以嚴訓愍績孤幼特捨之績嘆曰我無庭訓飬於外氏不能尅躬勵已何以成立深自感激命左右自杖三十孝寬聞而對之流涕於是専精好學略涉經史周武帝為魯公時引為侍讀建德初轉宮尹中士武帝嘗避暑雲陽宮時宣帝為太子監國衛刺王作亂城門已閉百寮多有遁者績聞難赴之於元武門遇皇太子下樓執績手悲喜交集帝聞而善之遷小宮尹宣政初録前後功封義陽縣男纍轉御正下士宣帝崩髙祖總百揆績有力焉加上開府轉內史中大夫進封郡公拜大將軍開皇元年出為豫州刺史尋拜都官尚書轉晉州刺史將之官稽首言陳有三可滅髙祖問其狀績曰大吞小一也以有道伐無道二也納叛臣蕭巖於我有詞三也陛下若命鷹揚之將臣請預戎行上嘉勞而遣之陳平拜蘇州刺史髙智慧作亂江南州人顧子元等發兵應之因以攻績相持八旬子元素感績恩於冬至日遣使奉牛酒績遺之書子元得書於城下頓首陳謝楊素援兵至合擊破之拜信州總管俄以病乞骸骨詔徴還亰師賜以御藥中使相望顧問不絶卒於家諡曰安子偲嗣大業中位尚書主爵郎郭衍字彥文自云太原介休人也父崇以舍人從魏孝武帝入關位侍中衍少驍武善騎射建德中以軍功纍遷儀同大將軍又從周武帝平并州以功加開府封武陽縣公賜姓叱羅氏宣政元年為右中軍熊渠中大夫尉遲迥之亂從韋孝寬討之以功超授上柱國封武山郡公密勸髙祖殺周室諸王早行禪代由是大被親昵開皇元年敕復舊姓為郭氏突厥犯塞以衍為行軍總管領兵屯平涼數嵗虜不入境徵為開漕渠大監部率水工鑿渠引渭水經太興城北東至于潼關漕運四百餘里關內賴之名曰富民渠五年授瀛州刺史遇秋霖大水其屬縣多致漂沒人皆上髙樹依大冢衍親備船筏并齎糧食拯救之民多獲濟衍先開倉振恤後始奏聞上大善之遷授朔州總管所部有恆安鎮北接藩境常勞轉運衍乃選沃饒地置屯田嵗贏粟萬餘石民免轉輸之勞又築桑乾鎮皆稱旨十年從晉王廣出鎮揚州遇江表構逆命衍為總管領精鋭萬人先屯京口於貴洲南與賊戰敗之大獲軍實仍討東陽永嘉宣城黟歙諸洞盡平之授蔣州刺史衍臨下甚踞事上甚卑晉王愛昵之宴賜隆厚遷洪州總管王有奪宗之謀託衍心腹遣宇文述以情告之衍大喜曰若所謀事果自可為皇太子如其不諧亦須據淮海復梁陳之舊副君酒客其如我何王因召衍隂共計議又恐人疑無故來往託以衍妻患癭王妃蕭氏有術能療之以狀奏髙祖髙祖聽衍共妻同向江都往來無度衍又詐稱廣州俚反王乃奏衍討之由是大修甲仗陰飬士卒及王入為大子徵授左監門率轉左宗衛率髙祖於仁壽宮將大漸太子與楊素矯詔令衍宇文述領東宮兵帖上臺宿衛門禁並由之及上崩漢王起逆而亰師空虛使衍馳還總兵居守大業元年拜左武衛大將軍帝幸江都令統左軍改授光祿大夫又從征吐谷渾出金山道納降二萬餘户衍能揣上意阿諛順旨帝每謂人曰唯有郭衍心與朕同又嘗勸帝五日一視事無效髙祖空自劬勞帝從之益稱其孝順初新令行衍封爵從例除六年以恩舊封真定侯七年從幸江都卒贈左衛大將軍諡曰襄長子臻虎牙郎將次子嗣本孝昌令張衡字建平河內人也祖嶷魏河陽太守父允周萬州刺史衡幼懷志尚有骨鯁風十五詣太學受業研精覃思為同輩所推周武帝居太后憂與左右出獵衡露髮輿櫬叩馬切諫帝嘉焉賜衣一襲馬一匹擢拜漢王侍讀衡又就沈重受三禮略究大旨纍遷掌朝大夫髙祖受禪拜司門侍郎及晉王廣為河北行臺衡歷刑部度支二曹郎行臺廢拜并州總管掾王轉牧揚州衡復為掾王甚親任之衡亦竭慮盡誠奪宗之計多衡所建遷揚州總管司馬熙州李英林反署置百官以衡為行軍總管討平之拜開府及王為皇太子拜衡右庶子煬帝嗣位除給事黃門侍郎銀青光祿大夫遷御史大夫甚見親重大業三年帝幸榆林郡還至太原謂衡曰朕欲過公宅可為朕作主人也衡馳至河內與宗族具牛酒帝上太行開直道九十里以抵其宅帝恱其山泉留宴三日因謂衡曰往從先皇拜太山之始塗經洛陽瞻望於此深恨不得相過不謂今日得諧宿願衡俯伏辭謝奉觴上壽帝益歡賜其宅傍田三十頃良馬一匹金帶縑綵六百段衣一襲御食器一具衡固讓帝曰天子所至稱幸者蓋為此也不足為辭衡復獻食於帝帝令頒賜公卿下至衛士無不霑給衡以藩邸之舊恩寵莫與為比頗自驕貴眀年帝幸汾陽宮時帝欲大汾陽宮令衡與紀𢎞整具圖奏之衡承間進諫以比年勞役百姓疲敝為請帝意甚不平後嘗目衡謂侍臣曰張衡自謂由其計畫令我有天下時齊王􅌔失愛於上帝密令人求其罪有人譛􅌔違制將伊闕令皇甫詡從之汾陽宮又録前幸涿郡及祠恆嶽時父老謁見者衣冠不整帝譴衡以憲司皆不能舉正出為榆林太守眀年帝復幸汾陽宮衡督役築樓煩城因而謁帝帝惡衡不損瘦以為不念咎因謂曰公甚肥澤宜且還郡衡復之榆林俄而敇衡督役江都宮有人詣衡訟宮監者衡不為理還以訟書付監其人大為監所困禮部尚書楊元感使至江都其人詣元感稱寃元感固以衡為不可及與相見未有所言又先謂元感曰薛道衡真為枉死元感具上其事江都郡丞王世充又奏衡頻減頓具帝怒鎖衡詣江都市將斬之既而除名放還田里帝每令親人覘衡所為八年帝自遼東還都妄言衡怨望謗訕朝政帝賜死于家臨死大言曰我為人作何物事而望久活監刑者塞耳促令殺之唐武德初以為死非其罪贈大將軍南陽郡公諡曰忠子希元楊汪字元度本𢎞農華隂人也曽祖順徙居河東父琛儀同三司及汪貴追贈平鄉縣公汪少凶疏與人羣鬪拳所毆擊無不顛踣長更折節勤學専精左氏傳通三禮解褐周冀王侍讀王甚重之每曰楊侍讀德業優深孤之穆生也後問禮於沈重受漢書於劉臻二人曰吾弗如也由是知名纍遷夏官府都上士髙祖作相引知兵事遷掌朝下大夫及受禪賜爵平鄉縣伯歷泰州總管府長史每聽政暇必延生徒講授時人稱之入為尚書兵部侍郎數年髙祖謂諫議大夫王達曰卿為我覓一好左丞逹遂私於汪曰我當薦君為左丞若事果當以良田相報也汪以達言奏之逹竟獲罪卒拜汪尚書左丞汪眀習法令果於剖斷當時號為稱職未幾坐事免後拜洛州長史轉荆州長史煬帝即位追為尚書左丞尋守大理卿視事二日帝將親省囚徒時繫囚二百餘人汪通宵究審詰朝而奏曲盡事情一無遺誤帝甚嘉之嵗餘拜國子祭酒帝令百寮就學與汪講論天下通儒碩學多萃焉論難鋒起皆不能屈帝令御史書其問答奏之省而大恱賜良馬一匹後加銀青光祿大夫及楊元感反河南贊務裴𢎞䇿出師禦之戰不利奔還遇汪而屛人交語既而留守樊子蓋斬𢎞䇿以狀奏汪帝疑之出為梁郡通守後煬帝崩王世充推越王侗為主徵拜吏部尚書頗見親委及世充僣號汪復用事世充平遂以凶黨伏誅裴蘊河東聞喜人也祖之平父忌梁陳並有傳忌在陳與吳眀徹同見俘于周周賜爵江夏公在隋十餘年而卒蘊性眀辨有吏幹仕陳歷直閣將軍興寧令以其父在北陰奉表於髙祖請為內應及陳平上悉閲江南衣冠之士次至蘊上以為夙有向化之心超授儀同左僕射髙熲不悟上旨進諫曰裴蘊無功於國寵踰倫輩未見其可上又加蘊上儀同熲復進諫上曰可加開府熲乃不敢復言即日拜開府儀同三司禮賜優洽歷洋直棣三州刺史俱有能名大業初考績連最煬帝聞其善政徵為太常少卿初髙祖不好聲妓遣牛𢎞定樂非正聲清商及九部四儛之色皆罷遣從民至是蘊揣知帝意奏括天下周齊梁陳樂家子弟皆為樂户其六品已下至于庶人有善音樂及倡優百戲者皆直太常是後異技淫聲咸萃樂府皆置博士弟子遞相教傳增益樂人至三萬餘帝大恱遷户部侍郎于時猶承髙祖和平之後禁網疏濶户口多漏或年及成丁猶詐為小未至於老已免租賦蘊歷為刺史素知其情因是條奏皆令貌閲若一夫不實則官司解職鄉正里長皆逺配流又許民相告若糾得一丁者令被紏之家代輸賦役是嵗大業五年也諸郡計帳進丁二十四萬三千新附口六十四萬一千五百帝臨朝覽狀謂百官曰前代無好人致此罔冒今進户口皆從實者全由裴蘊一人用心古語云得賢而治驗之信矣由是漸見親委拜亰兆贊務發擲纎毫吏民懾憚未幾授御史大夫與裴矩虞世基參掌機密蘊善候伺人主微意若欲罪者則曲法順情煆成其罪所欲宥者則附從輕典因而釋之是後大小之獄皆以付蘊憲部大理莫敢與奪必稟承進止然後決斷蘊亦機辨所論理法言若懸河或重或輕皆由其口剖析眀敏人不能致詰楊元感之反也帝遣蘊推其黨與謂蘊曰元感一呼而從者十萬益知天下人不欲多多即相聚為盜耳不盡加誅則後無以勸蘊由是峻法治之所戮者數萬人皆籍沒其家帝大稱善賜奴婢十五口司𨽻大夫薛道衡以忤旨獲譴蘊知帝惡之乃奏曰道衡負才恃舊有無君之心論其罪名似如隱昧原其情意深為悖逆帝曰然我少時與此人相隨行役輕我童稚共髙熲賀若弼等外擅威權自知罪當誣罔及我即位懷不自安賴天下無事未得反耳公論其逆妙體本心於是誅道衡文帝問蘇威以討遼之䇿威不願帝復行且欲令帝知天下多賊乃詭答曰今者之役不願發兵但詔赦羣盜自可得數十萬遣關內奴賊及山東歷山飛張金稱等頭别為一軍出遼西道諸河南賊王薄孟讓等十餘頭並結舟楫浮滄海必喜於免罪競務立功一嵗之中可滅髙麗矣帝不懌曰我去尚猶未克鼠竊安能濟乎威出後蘊奏曰此大不遜天下何處有許多賊帝悟曰老革多姦將賊脅我欲搭其口但隱忍之誠極難耐蘊知上意遣張行本奏威罪惡帝付蘊推鞫之乃處其死帝曰未忍便殺遂父子及孫三世並除名蘊又欲重已權勢令虞世基奏罷司𨽻刺史以下官屬增置御史百餘人於是引致姦黠共為朋黨郡縣有不附者陰中之於是軍國多務凡是興師動衆亰都留守及與諸蕃互市皆令御史監之賔客附𨽻遍於郡國侵擾百姓帝弗之知也以度遼之役進位銀青光祿大夫及司馬德戡將為亂也江陽長張惠紹夜馳告之蘊與惠紹謀欲矯詔發郭下兵民盡取榮公護兒節度收在外逆黨宇文化及等仍發羽林殿腳遣范富婁等入自西苑取梁公蕭巨及燕王處分扣門援帝謀議已定遣報虞世基世基疑反者不實抑其計須臾難作蘊歎曰謀及播郎竟誤人事遂見害子愔為尚輦直長亦同日死袁充字德符本陳郡陽夏人也其後寓居丹陽祖昻父君正俱為梁侍中充少警悟始十餘嵗其父黨至門時冬初充尚衣葛衫客戲充曰袁郎子絺兮綌兮凄其以風充應聲答曰唯絺與綌服之無斁以是大見嗟賞仕陳年十七為祕書郎歷太子舍人晉安王文學吏部侍郎散騎常侍及陳滅歸國歷蒙鄜二州司馬充性好道術頗解占候由是領太史令時上將廢皇太子正窮治東宮官屬充見上雅信符應因希旨進曰比觀元象太子當廢上然之充復表奏隋興已後日景漸長曰開皇元年冬至日影一丈二尺七寸二分自爾漸短至十七年冬至影一丈二尺六寸三分四年冬至在洛陽測影一丈二尺八寸八分二年夏至影一尺四寸八分自爾漸短至十六年夏至影一尺四寸五分周官以土圭之法正日影日至之影尺有五寸鄭元云冬至之影一丈三尺今十六年夏至之影短於舊影五分十七年冬至之影短於舊影三寸七分日去極近則影短而日長去極逺則影長而日短行內道則去極近外道則去極逺堯典曰日短星昴以正仲冬據昴星昏中則知堯時仲冬日在須女十度以厯數推之開皇以來冬至日在斗十一度與唐堯之代去極並近謹案春秋元命包云日月出內道璇璣得常天帝崇靈聖王相功亰房别對曰太平日行上道升平行次道霸世行下道伏惟大隋啓運上感乾元影短日長振古未之有也上大恱告天下將作役功因加程課丁匠苦之仁壽初充言上本命與陰陽律呂合者六十餘條而奏之因上表曰皇帝載誕之初非止神光瑞氣嘉祥感應至於本命行年生月生日並與天地日月陰陽律呂運轉相符表裏合會此誕聖之異寶厯之元今與物更新改年仁壽嵗月日子還共誕聖之時並同眀合天地之心得仁壽之理故知洪基長算永永無窮上大恱賞賜優崇儕輩莫比仁壽四年甲子嵗煬帝初即位充及太史丞髙智寶奏言去嵗冬至日景逾長今嵗皇帝即位與堯受命年合昔唐堯受命四十九年到上元第一紀甲子天正十一月庚戍冬至陛下即位其年即當上元第一紀甲子天正十一月庚戍冬至正與堯同自放勛以來凡經八上元其間綿代未有仁壽甲子之合謹按第一紀甲子太乙在一宮天目居武德隂陽厯數並得符同唐堯唐堯丙辰生丙子年受命止合三五未若己丑甲子支干並當六合允一元三統之期合五紀九章之會共帝堯同其數與皇唐比其蹤信所謂皇哉唐哉唐哉皇哉者矣仍諷齊王􅌔率百官拜表奉賀後熒惑守太微者數旬時繕修宮室征役繁重充乃上表稱陛下修德熒惑退舍百寮畢賀帝大喜前後賞賜將萬計時軍國多務充候帝意欲有所為使奏稱天文見象須有改作以是取媚於上大業六年遷內史舍人從征遼東拜朝請大夫祕書少監後天下大亂帝初罹鴈門之危又盜賊益起心不自安充復託天文上表陳嘉瑞以媚上曰伏惟陛下握録圖而馭黔首提萬善而化八紘以百姓為心匪以一人受慶先天罔違所欲後天必奉其時是以初膺寶厯正當上元之紀乾之初九又與本命符會斯則聖人冥契故能動合天經謹案去年以來元象星瑞毫釐無爽謹録尤異上天降祥破突厥等狀七事其一去八月二十八日夜大流星如斗出王良北正落突厥營聲如牆崩其二八月二十九日夜復有大流星如斗出羽林向北流正當北方依占頻二夜流星墜賊所賊必敗散其三九月四日夜頻有兩星大如斗出北斗魁向東北流依占北斗主殺伐賊必破散其四嵗星主福德頻行京都二處分野依占國家之福其五去七月內熒惑守羽林九月七日已退舍依占不出三日賊必破散其六去年十一月二十日夜有流星赤如火從東北向西南落賊帥盧眀月營破其橦車其七十二月十五日夜通漢鎮北有赤氣亘北方突厥將亡之應也依勘城録河南洛陽並當甲子與乾元初九爻及上元甲子符合此是福地永無所慮旋觀往政側聞前古彼則異時間出今則一朝總萃豈非天贊有道助殱凶孽方清九夷於東獩沈五狄於北溟告成岱嶽册功汾水書奏帝大恱超拜祕書令親待愈昵帝每欲征伐充皆預知之乃假託星象奬成帝意在位者皆切患之宇文化及弒逆之際并誅之王劭字君懋太原晉陽人父松年齊散騎常侍劭少沈默好讀書博物強記弱冠仕齊纍遷太子舍人待詔文林館時祖孝徴魏收陽休之等嘗論古事有所遺忘討閲不能得問劭劭具論所出取書驗之一無舛誤自是大為時人所許稱其博物後遷中書舍人齊滅入周不得調髙祖受禪授著作佐郎以母憂去職在家著齊書時制禁私撰史為內史侍郎李元操所奏上怒遣使收其書覽而恱之於是起為員外散騎侍郎修起居注劭以上古有鑽燧改火之義近代廢絶於是上表請變火曰臣謹按周官四時變火以救時疾眀火不數變時疾必興聖人作法豈徒然也在東晉時有人以洛陽火度江者世世事之相續不滅火色變青昔師曠食飯云是勞薪所爨晉平公使視之果然車輞今溫酒及炙肉用石炭木炭火竹火草火麻荄火氣味不同以此推之新火舊火理應有異伏願逺遵先聖於五時取五木以變火用功甚少救益方大縱使百姓習久未能頓同尚食內厨及東宮諸王食厨不可不依古法上從之劭又言上有龍顔戴干之表指示羣臣上大恱賜物百段拜著作郎上表言符命曰昔周保定二年嵗在壬午五月五日青州黃河變清十里鏡徹齊氏以為己瑞改元曰河清是月至尊以大興公始作隋州刺史歷年二十隋果大興臣謹案易坤靈圖曰聖人受命瑞必先見於河河者取濁未能清也竊以靈貺休祥理無虛發河清啓聖實屬大隋午為鶉火以眀火德仲夏火王亦眀火德月五日五合天地數既得受命之辰允當先見之兆開皇初邵州人楊令哲近河得青石圖一紫石圖一皆隱起成文有至尊名下云八方天心永州又得石圖剖為兩假有楊樹之形黃根青葉汝水得神龜腹下有文曰天卜楊興安邑掘地得古鐡版文曰皇始天年賚楊鐡劵王興同州得石龜文曰天子延千年大吉臣以前之三石不異龍圖何以用石石體久固義與上名符合龜腹七字何以著龜龜亦久固兼是神靈之物孔子歎河不出圖洛不出書今於大隋聖世圖書屢出建德六年亳州大周村有龍鬭白者勝黑者死大象元年夏熒陽汴水北有龍鬭初見白氣屬天自東方歷陽武而來及至白龍也長十里許又有黑龍乘雲而至雲雨相薄乍合乍離自午至申白龍升天黑龍墜地謹案龍君象也前鬭於亳州周村者蓋象至尊以龍鬭之嵗為亳州總管遂代周有天下後鬭於熒陽者熒字三火眀火德之盛也白龍從東方來歷陽武者蓋象至尊將登帝位從東第入自崇陽門也西北升天者當乾位天門坤靈圖曰聖人殺龍龍不可得而殺皆感氣也又曰泰姓商名宮黃色長八尺六十世河龍以正月辰見白龍與五黑龍鬭白龍陵故泰人有命謹案此言皆為大隋而發也聖人殺龍者前後龍死是也姓商者皇家於五姓為商也名宮者武元皇帝諱於五聲為宮黃色者隋色尚黃長八尺者武元皇帝身長八尺河龍以正月辰見者泰正月卦龍見之所於亰師為辰地白龍與黑龍鬭者亳州熒陽龍鬭是也勝龍所以白者楊姓納音為商至尊又辛酉嵗生位皆在西方西方白色也死龍所以黑者周黑色所以稱五者周閔眀武宣靜凡五帝趙陳代越滕五王一時伏法亦當五數白龍陵者陵猶勝也鄭元説陵當為除凡鬭能去敵曰除臣以泰人有命者泰之為言通也大也眀其人道通德大有天命也乾鑿度曰泰表戴干鄭元注曰表者人形體之彰識也干盾也泰人之表戴干臣伏見至尊有戴干之表益知泰人之表不爽毫釐坤靈圖所云字字皆驗緯書又稱漢四百年終如其言則知六十世亦必然矣昔宗周卜世三十今則倍之稽覽圖曰太平時隂陽和合風雨會同海內不偏地有阻險故風有遲疾雖太平之政猶有不能均惟平均乃不鳴條故欲風於亳亳者陳留也謹案此言蓋眀至尊昔為陳留公世子亳州總管遂受天命海內均同不偏不黨以成太平之風化也在大統十六年武元皇帝改封陳留公是時齊國有祕記云天王陳留入并州齊王髙洋由是誅陳留王彭樂其後武元皇帝果將兵入並州周武帝時望氣者云亳州有天子氣於是殺亳州刺史紇豆陵恭至尊代為之又陳留老子祠有枯柏世傳云老子將度世云待枯柏生東南枝回指當有聖人出吾道復行至齊枯柏從下生枝東南上指夜有三童子相與歌曰老子廟前古枯樹東南枝如繖聖主從此去及至尊牧亳州親至祠樹之下自是柏枝回抱其枯枝漸指西北道教果行考校衆事太平主出於亳州陳留之地皆如所言稽覽圖又云政道得則隂物變為陽物鄭元注云蔥變為韭亦是謹按自六年以來逺近山石多變為玊石為隂玊為陽又左衛園中蔥變為韭上覽之大恱賜物五百假未幾劭復上書曰易乾鑿度曰隨上六拘繫之乃從維之王用亨于西山隨者二月卦陽德施行蕃決難解萬物隨陽而出故上六欲九五拘繫之維持之眀被陽化而欲隂隨從之也易稽覽圖坤六月有子女任政一年傳為復五月貧人從東北來立大起土邑西北地動星墜陽衛屯十一月神人從中山出趙地動北方三十日千里馬數至謹按凡此易緯所言皆是大隋符命隨者二月之卦眀大隋以二月即皇帝位也陽德施行者眀楊氏之德教施行於天下也蕃決難解者眀當時蕃鄣皆通決險難皆解散也萬物隨陽而出者眀天地間萬物盡隨楊氏而出見也上六欲九五拘繫之者五為王六為宗廟眀宗廟神靈欲命登九五之位帝王拘人以禮繫人以義此二句亦是乾鑿度之言維持之者眀能以綱維持正天下也被陽化而欲陰隨從之者眀諸陰類被服楊氏之風化莫不隨從陰謂臣下也王用亨于西山者蓋眀至尊常以嵗二月幸西山仁壽宮也凡四稱隨三稱陽欲美隨楊丁寧之至也坤六月者坤位在未六月建未言至尊以六月生也有子女任政者言樂平公主是皇帝子女而為周后任理內政也一年傳為復者復是坤之一世卦陽氣初起言周宣帝崩後一年傳位與楊氏也五月貧人從東北來立貧人當為真人字之誤也言周宣帝以五月崩真人革命當在此時至尊謙讓而逆天意故踰年乃立昔為定州總管在京師東北本而言之故曰真人從東北來立大起土邑者大起即大興城邑也西北地動星墜者蓋天意去周授隋故變動也陽衛者言楊氏得天衛助也屯十一月神人從中山出者此卦動而大亨作故至尊以十一月被授亳州總管將從中山而出也趙地動者中山為趙地以神人將去故變動也北方三十日者蓋至尊從北方將往亳州之時停留三十日也千里馬者蓋至尊舊所乘騧騮馬也屯卦震下坎上震於馬為作足坎於馬為美脊是故騧馬脊有肉鞍行則先作㺯四足也數至者言厯數將至也河圖帝通紀曰形瑞出變矩衡赤應隨叶靈皇河圖皇參持曰皇辟出承元訖道無為安率被遂矩戲作術開皇色握神曰投輔提象不絶立皇後翼不格道終始德優劣帝任政河典出叶輔嬉爛可述謹按凡此河圖所言亦是大隋符命形瑞出變矩衡者矩法也衡北斗星名所謂璿璣玊衡者也大隋受命形兆之瑞始出天象則為之變動北斗主天之法度故曰矩衡易緯伏戲矩衡鄭元注以為法玉衡之神與此河圖矩衡義同赤應隨者言赤帝降精感應而生隋也故隋以火德為赤帝天子叶靈皇者叶合也言大隋德合上靈天皇大帝也又年號開皇也與靈寶經之開皇年相合故曰叶靈皇皇辟出者皇大也辟君也大君出蓋謂至尊受命出為天子也承元訖者言承周天元終訖之運也道無為安率者安下脫一字言大德無為安定天下率從被遂矩戲作術者矩法也昔遂皇握機矩伏羲作八卦之術言大隋被服彼二皇之法術也遂皇機矩語見易緯開皇色者言開皇年易服色也握神日者言握持羣神眀照如日也又開皇以來日漸長亦其義也投輔提者言投受政事於輔佐使之提挈也象不絶者法象不廢絶也立皇後翼不格者格至也言本立太子以為皇家後嗣而其輔翼之人至能至於善也道終始德優劣者言前東宮道終而德劣今皇太子道始而德優也帝任政河典出者言皇帝親任政事而邵州河濵得石圖也叶輔嬉爛可述者叶合也嬉興也言羣臣合心輔佐以興政教爛可紀述也所以於皇參持帝通紀二篇大陳符命者眀皇道帝德盡在於隋也上大恱以邵至誠寵錫日隆時有人於黃鳳泉浴得二白石頗有文理遂附其文以為字復言有諸物象而上奏曰其大玉有日月星辰八卦五嶽及二麟雙鳳青龍朱雀騶虞元武各當其方位又有五行十日十二辰之名凡二十七字又有天門地户人門鬼門閉九字又有却非及二鳥其鳥皆人靣則抱朴子所謂千秋萬嵗者也其小玉亦有五嶽却非虬犀之象二玉俱有仙人玉女乘雲控鶴之象别有異狀諸神不可盡識蓋是風伯雨師山精海若之類又有天皇大帝皇帝及四帝坐鈎陳北斗三公天將軍土司空老人天倉南河北河五星二十八宿凡四十五官諸字本無行伍皆往往偶對於大玉則有皇帝姓名並臨南面與日字正鼎足復有老人星蓋眀南靣象日而長夀也皇后二字在西上有月形蓋眀象月也於次玉則皇帝名與九千字次比兩楊字與萬年字次比隋與吉字正並蓋眀長久吉慶也邵復回互其字作詩二百八十篇奏之上以為誠又賜帛千匹人見石者雖有碎文皆無其象唯邵正眀之深為時人所嗤鄙又採民間歌謠引圖書讖緯依約符命捃托佛經撰皇隋靈感志合三十卷奏之上令宣示天下劭集諸州朝集使洗手焚香閉目而讀之曲折其聲有如歌詠經涉旬朔遍而後罷見者莫不為之慙羞而劭無靦色上益喜賞賜優洽及獻文皇后崩邵復上言佛經説人應生天上及上品上生無量壽國之時天佛放大光眀以香花妓樂求迎之如來以眀星出時入涅槃伏惟大行皇后聖德仁慈福善禎符備諸祕計皆云是妙善菩薩臣謹按八月二十八日仁壽宮內再雨金銀之花二十三日大寶殿後夜有神光二十四日卯時永安宮北有自然種種音樂震滿虛空至五更中奄然如寐便即升遐與經文所説事皆符驗臣又以愚意思之皇后遷化不在仁夀大興宮者蓋避至尊常居正寢也在永安宮象亰師永安門平生所出入也皇后升遐後二日苑內夜有鐘聲二百餘處此則生天之應顯然也上覽之且悲且喜時蜀王秀以罪廢上顧謂邵曰嗟乎吾有五子三不才邵進曰自古聖帝眀王皆不能移不肖之子黃帝有二十五子同姓者二餘各異德堯十子舜九子皆不肖夏有五觀周有三監上然其言其後上夢欲上髙山而不能得崔彭捧腳李盛扶肘乃得上因謂彭曰死生當與爾俱邵曰此夢大吉上高山者眀髙崇大安永如山也彭猶彭祖李猶李老二人扶持實為長夀之祥上喜見於容色其年上崩未幾崔彭亦卒煬帝立漢王諒作亂帝不忍誅邵上書曰臣聞黃帝滅炎蓋云母弟周公誅管信亦天倫叔向罪叔魚仲尼謂之遺直石碏殺石厚邱眀以為大義此皆經籍眀文帝王常法今陛下置此逆賊度越前聖謹按賊諒毒被生靈者也古者同德者則同姓異德者則異姓故黃帝有二十五子其得姓者十有四人唯青陽夷鼓與黃帝同為姫姓諒既自絶請改其氏邵以此求媚帝依違不從後遷祕書少監數年卒官邵在著作將二十年専典國史撰隋書八十卷多録口勑又采迂怪不經之語及委巷之言以類相從為其題目詞義繁雜無足稱者遂使隋代文武名臣善惡之迹湮沒無聞初撰齊志為編年體二十卷復為齊書紀傳一百卷及平賊記三卷或文詞鄙野或不軌不物駭人視聽大為有識者所嗤鄙然其採摘經史謬誤為讀書記三十卷時人服其精博爰自志學暨乎暮齒篤性經史遺落世事用思既専性頗恍惚每至對食閉目凝思盤中之肉為僕從所噉劭弗之覺唯責肉少數罰厨人厨人以情白邵邵依前閉目伺而獲之厨人方免笞辱其専固如此李雄勃海蓨人也父棠名列忠義傳雄少慷慨有壯志弱冠從周武帝平齊以功授帥都督髙祖作相從韋孝寬破尉遲回拜上開府賜爵建昌縣公伐陳之役以功進位大將軍歷栁江二州刺史並有能名後坐事免漢王諒之反煬帝將發幽州兵討之時竇抗為幽州總管帝恐其二問可任者於楊素素遂進雄授上大將軍拜廉州刺史馳至幽州止傳舍召募得千餘人抗恃素貴不時相見雄遣人諭之後二日抗從鐡騎二千來詣雄所雄伏甲禽抗悉發幽州兵步騎三萬自井陘討諒遷幽州總管尋徴拜户部尚書雄眀辨有器幹帝甚任之新羅嘗遣使朝貢雄至朝堂與語因問其冠制所由其使者曰古辨遺像安有大國君子不識雄因曰中國無禮求諸四夷使者曰自至以來此言之外未見無禮憲司以雄失辭奏劾其事竟坐免俄而復職從幸江都帝以仗衛不整顧雄部伍之雄立指麾六軍肅然帝大恱曰公真武侯才也尋轉右候衛大將軍復坐事除名遼東之役帝令從軍自效因從來護兒自東萊將指滄海會楊玄感反於黎陽帝疑之詔鎖雄送行在所雄殺使者歸玄感玄感每與計焉及玄感敗伏誅籍沒其家趙煚字通賢天水西人也祖超宗魏河東太守父仲懿尚書左丞煚少孤飬母至孝年十四有人盜伐其父墓中樹者煚對之號慟因執送官見魏右僕射周惠達長揖不拜自述孤苦涕淚交集惠逹為之隕涕歎息者久之及長沈深有器局略涉書記周文引為其相府參軍事從破洛陽及班師煚請留撫納亡叛從之煚於是率所領與齊人前後五戰斬獲甚衆以功封平定縣男纍轉中書侍郎周閔帝受禪遷陜州刺史蠻酋向天王以兵攻信陵秭歸煚襲擊破之二郡獲全時周人於江南岸置安蜀城以禦陳屬霖雨數旬城頺者百餘步蠻酋鄭南鄉叛引陳將吳眀徹欲掩安蜀議者皆勸煚益修守禦煚不從乃遣使説誘江外生蠻向武陽令乘虛掩襲南鄉所居獲其父母妻子南鄉聞之其黨各散陳兵亦遁眀年吳眀徹屢為冦患煚與前後十六戰每挫其鋒以功授開府儀同三司再遷户部中大夫周武帝欲收齊河南地煚諫曰河南洛陽四靣受敵縱得不可以守請從河北直指太原傾其巢穴可一舉而定帝不納師竟無功尋從上柱國于翼自三鴉道以伐陳克十九城而還以讒毁功多不録纍遷御正上大夫煚與宗伯斛斯徴素不協徴後出為齊州坐事下獄自知罪重遂踰獄而走帝大怒購之甚急煚上密奏曰徴自以負罪深重懼死遁逃若不北竄胸奴則南投吳越徵雖愚陋久塵清顯奔波敵國無益聖朝今者炎旱為災可因兹大赦帝從之徴賴而獲免煚卒不言髙祖為丞相加上開府再遷大宗伯及踐阼煚進璽紱進位大將軍爵金城郡公拜相州刺史朝廷以煚習故事徴拜尚書右僕射未幾以忤旨出為陜州刺史轉冀州刺史甚有威德煚嘗有疾百姓奔馳爭為祈禱其得民情如此冀州俗薄市井多姦詐煚為銅斗銅尺置之於肆百姓便之上聞而嘉焉頒告天下以為常法嘗有人盜煚田中蒿者為吏所執煚曰此刺史不能宣化彼何罪也慰諭遣之令人載蒿一車賜盜者盜愧過於重刑帝幸洛陽煚來朝上勞之曰冀州大藩户口繁實卿之政化深副朕懷開皇十九年卒官子義臣嗣位至太子洗馬後同楊諒反誅趙芬字士茂天水西人也父諒周秦刺史芬少有辨智頗涉經史周文引為相府鎧曹參軍歷記室纍遷開府儀同三司性強濟所居之職皆有聲績周武帝親總萬機拜內史下大夫轉小御正眀習故事每朝廷有所疑議衆不能決者芬輒為評斷莫不稱善後為司會及申國公李穆討齊引為行軍長史封淮安縣男再遷東亰小宗伯鎮洛陽髙祖為丞相尉遲迥與司馬消難隂謀往來芬察知之密白髙祖由是深見親委遷東京左僕射進爵郡公開皇初罷東京官拜尚書右僕射與郢公王誼修律令俄兼內史令甚見信任未幾以老病出為蒲州刺史加金紫光祿大夫仍領關東運漕賜錢百萬粟五千石而遣之後數年上表乞骸骨徵還京師賜以三驥軺車几杖被褥歸于家皇太子又致巾帔數年卒帝遣使致祭鴻臚監護喪事子元恪嗣位揚州總管司馬左遷候衛長史少子元揩與元恪皆眀幹世事元楷大業中為歷陽郡丞與廬江郡丞徐仲宗俱竭百姓之産以貢於帝仲宗遷南郡丞元楷超拜江都丞兼領江都宮監王韶字子相自云太原晉陽人也世居亰兆祖諧原州刺史父諒早卒韶幼而方雅頗好竒節有識者異之在周纍以軍功官至車騎大將軍儀同三司復轉軍正周武帝既拔晉州意欲班師韶諫曰齊失紀綱於兹纍世天奬王室一戰而扼其喉加以主昏於上民懼於下取亂侮亡正在今日方欲釋之而去臣所未解帝大恱及齊平以功進位開府封晉陽縣公賜口馬雜畜以萬計遷內史大夫宣帝即位拜豐州刺史改封樂昌縣公髙祖受禪進爵項成縣公轉靈州刺史加位大將軍晉王廣之鎮并州也除行臺右僕射賜綵五百匹韶性剛直王甚憚之每事咨訪不敢違於法度韶嘗奉使檢行長城其後王穿池起三山韶既還自鎖而諫王謝而罷之髙祖聞而嘉嘆賜黃金百兩并後宮四人平陳之役以本官為元帥府司馬與高熲度支軍機無所擁滯及克金陵韶即鎮焉嵗餘徴還髙祖謂公卿曰晉王以幼稚出藩遂能克平吳越子相之力也於是進位柱國賜奴婢三百口綿絹五千段開皇十一年上幸并州以其稱職勞勉之後上謂曰自朕至此公鬚鬢漸白無乃憂勤所致柱石之望惟在於公努力勉之韶辭謝曰臣比衰暮不解作官人今年六十有六比於疇昔昏忘又多豈敢自寬深恐虧紊綱紀上勞而遣之秦王俊為并州總管仍為長史嵗餘馳驛入京勞弊而卒髙祖甚傷惜之謂秦王使者曰語爾王我前令子相緩來如何乃遣馳驛殺我子相豈不由汝耶言甚悽愴使有司為立宅曰往者何用宅為但以表我深心耳又曰子相受我委寄十有餘年終始不易寵章未極捨我而死乎發言流涕因命取子相封事數十紙傳示羣臣上曰其直言規諫禆益甚多吾每披尋未嘗釋手煬帝即位贈司徒尚書令靈豳等十州刺史魏國公子士隆嗣士隆略知書計尤便弓馬慷慨有父風大業世頗見親重位備身將軍改封耿國公趙王侗稱帝士隆率數千兵自江淮而至會王世充僣號甚禮重之署尚書右僕射憂憤疽發背卒元巖字君山洛陽人也父禎魏敷州刺史巖好讀書不治章句剛鯁有器局以名節自許少與髙熲王韶同志友善仕周為虎賁給事大冡宰宇文護見而器之以為中外府記室纍遷內史中大夫封昌國縣伯周宣帝嗣位為政昏暴京兆郡丞樂運乃輿櫬詣朝堂陳帝八失言甚切帝大怒將戮之朝臣莫敢救者巖謂人曰臧洪同日尚可俱死其况比干乎若樂運不免吾將與之俱斃詣闕請見言於帝曰樂運知書奏必死所以不顧身命者欲取後代名陛下若殺之乃成其名落其術內耳不如勞而遣之以廣聖度運乃獲免帝又將誅烏丸軌巖不肯署詔御正顔之儀切諫不入巖進繼之脫巾頓顙三拜三進帝曰汝黨烏丸軌邪巖曰臣非黨軌正恐濫誅失天下之望帝怒使閹人摶其靣遂廢于家髙祖為丞相加開府户部中大夫及受禪拜兵部尚書進爵平昌郡公巖性威重眀逹世務每有奏議侃然正色廷爭靣折無所回避上及公卿皆敬憚之時髙祖初即位每懲周代諸侯微弱以致滅亡由是分王諸子權侔王室以為盤石之固遣晉王廣鎮并州蜀王秀鎮益州二王年並幼盛選貞良有重望者為之僚佐于時巖與王韶俱以骨鯁知名物議稱二人才具侔於髙熲由是拜巖為益州總管長史韶為河北道行臺僕射高祖謂之曰公宰相大器今屈輔我兒亦如曹參相齊之意也及巖到官法令眀肅吏民稱焉蜀王性好奢侈嘗欲取獠口以為閹人又欲生剖死囚取膽為藥巖皆不用教排閣切諫王輒謝而止憚巖為人每循法度蜀中獄訟巖所裁斷莫不恱服有得罪者相謂曰平昌公與吾罪吾何怨焉上甚嘉之賞賜優洽十三年卒官上悼惜久之益州父老莫不隕涕于今思之巖卒後蜀王為非法造渾天儀又共妃出獵以彈彈人多捕山獠充宦者寮佐無能諫止及秀得罪上曰元巖若在吾兒豈有是乎子𢎞嗣歷給事郎司朝謁者北平通守宇文弼字公輔河南洛陽人也其先與周同出祖直力勤魏巨鹿太守父珍周宕州刺史弼慷慨有大節博學多通仕周嘗奉使鄧至國及黑水龍涸諸羌前後降附三十餘部及還奉詔修定五禮書成奏之賜田二頃粟百石纍遷小吏部擢八人為縣令皆有異績世以為知人轉內史都上士武帝將謀出兵河陽以伐齊弼進䇿曰齊氏建國于今纍世雖曰無道尚有其人今若用兵須擇其地河陽要衝精兵所聚盡力攻圍恐難得志彼汾之曲戍小山平攻之易拔用武之地也帝不納師竟無功建德五年大舉伐齊卒用弼䇿於是募三輔豪俠少年數百人為别隊從帝攻拔晉州身被三瘡苦戰不息帝竒而壯之因從平齊以功拜上儀同封武威縣公宣帝嗣位為守廟大夫時突厥冦甘州帝令侯莫陳昶擊之弼謂監軍曰宜選精騎直趨祁連之西賊若收軍必自蓼泉之北此地險隘兼下濕度其人馬三日方度彼勞我逸破之必矣若邀此路真上䇿也昶不能用西取合黎大軍行遲虜已出塞其年弼又從梁士彥攻拔夀春改封安樂縣公除澮州刺史轉南司州刺史司馬消難之奔陳弼追之不及遇陳將樊毅戰於漳口自旦及午三戰三捷除黃州刺史轉南定州刺史開皇初以前功封平昌縣公入為尚書右丞時西羌內附詔弼持節安集置鹽澤蒲昌二郡而還遷左丞當官正色為百寮所憚三年突厥寇甘州以行軍司馬從元帥竇榮定擊破之還除太僕少卿轉吏部侍郎平陳之役楊素出信州道令弼持節為諸軍節度仍領行軍總管劉仁恩之破陳將呂仲肅也弼有謀焉加開府擢拜刑部尚書領太子虞候率上嘗親臨釋奠弼與博士論議詞致清逺上大恱謂羣臣曰朕今覩周公之制禮見宣尼之論孝實慰朕心時朝廷以晉陽為重鎮并州總管必屬親王其長史司馬亦一時髙選前長史王韶卒以弼有文武幹用出為并州長史十八年遼東之役授元帥漢王府司馬領行軍總管軍還歷朔代吳三州總管皆有能名煬帝即位拜刑部尚書仍持節巡省河北還除泉州刺史復徵拜刑部尚書轉禮部尚書弼既以才能著稱歷職顯要聲望甚重物議多見推許帝頗忌之時帝漸好聲色尤勤逺略弼謂髙熲曰昔周天元好聲色亡國以今方之不亦甚乎又言長城之役幸非急務有人奏之坐誅天下寃之所著辭賦二十餘萬言為尚書孝經注行于世有子儉瑗伊婁謙字彥恭本鮮卑人也其先世為酋長隨魏南遷祖信中部太守父靈相隆二州刺史謙性忠直善辭令周受禪纍遷宣納上士使持節驃騎大將軍武帝將伐齊引入內殿問以兵事曰朕將有事戎馬何者為先謙對曰偽齊僣禮跋扈不恭沈溺倡優耽昏麴蘖其折衝之將斛律眀月已斃讒人之口上下離心道路以目若命六師齊進臣之願也武帝大笑因使謙與小司寇拓跋偉聘于齊觀釁尋發兵齊主知之令其僕射陽休之責謙曰貴朝盛夏徵兵馬首何向謙曰僕馮軾之始未聞興師設復西增白帝之城東益巴邱之戍人情常理豈足怪哉謙參軍髙遵以情輸於齊遂拘留謙不遣武帝既剋并州召謙勞之曰朕之大舉本候卿還髙遵中為叛逆乖朕宿心乃執遵付謙任令報復謙請赦之武帝曰卿可聚衆唾其靣令知愧也謙跪曰以遵之罪又非唾靣之責武帝善其言而止謙竟待遵如初尋賜爵濟陽縣伯纍遷前驅中大夫大象中進爵為侯位開府髙祖作相授亳州總管俄徴還京既平王謙耻與逆人同名因爾稱字髙祖受禪以彥恭為左武候將軍俄拜大將軍進爵濟陽公數年出為澤州刺史清約自處甚得民和以疾去職吏民攀戀行數百里不絶卒于家子傑嗣李圎通京兆涇陽人也少孤賤給使高祖家及髙祖為隋公擢授參軍事初髙祖少時每宴客恆令圎通監厨圎通性嚴整左右婢僕咸所敬憚唯世子乳母恃寵輕之賔客未供每有干請圎通不許或輒持去圎通大怒叱厨人撾之數十呌聲徹於閣內僚吏左右代其失色賓去後髙祖知之召圎通命坐賜食從此獨善之以為堪當大任髙祖作相賜爵懷昌男授帥都督進爵新安子委以心膂圎通多力徑捷長於武用周氏諸王素憚髙祖伺便圖為不利賴圎通保護獲免者數矣髙祖深感之由是參預政事授相國外兵曹仍領左親信尋授上儀同及受禪拜內史侍郎領左衛長史進爵為伯歷左右庶子給事黃門侍郎尚書左丞攝刑部尚書深被任信伐陳之役以行軍總管從楊素出信州道以功進位大將軍改封萬安縣公揚州總管長史秦孝王仁柔自喜少斷決府中事多決於圓通入為司農卿遷刑部尚書後復為并州長史孝王以奢得罪圎通亦坐免尋檢校刑部尚書事仁夀中以勳舊進爵郡公煬帝嗣位拜兵部尚書帝幸揚州以圓通留守京師判宇文述田還百姓述訴其受賂帝怒坐是免官圎通憂懼發病卒贈柱國封爵悉如故子孝常大業末為華隂令唐武德初以應義旗功封義安王又有陳茂者河東猗氏人家世寒微質直恭謹為州里所稱髙祖為隋國公引為寮佐待遇與圓通等每令典家事常稱旨後從帝與齊師戰於晉州賊甚盛帝將挑戰茂固止不得因捉馬鞚帝怒拔刀斫其額流血被靣詞氣不撓髙祖感而謝之厚加禮敬髙祖為丞相委以心膂及受禪拜給事黃門侍郎封魏城縣男每典機密轉益州總管司馬遷太府卿進爵為伯卒官子政嗣政字𢎞道倜儻有文武大略善鍾律便弓馬少飬宮中年十七為太子千牛備身京都大俠劉居士重政才氣數從之逰圎通子孝常與政相善並與居士交結及居士伏誅政及孝常從坐上以功臣子撻之二百而赦之由是不得調煬帝時歷位協律郎通事謁者兵曹承務郎帝以其才甚重之宇文化及之亂以為太常卿後歸唐為梁州總管遇賊見殺郭榮字長榮自云太原人也父徽仕魏為同州司馬時武元皇帝為刺史由是與髙祖有舊徽後位洵州刺史安城縣公及髙祖受禪拜太僕卿卒官榮容貌魁岸外疏內密與交者多愛之周大冢宰宇文護引為親信護察榮謹願擢為中外府水曹參軍齊寇屢侵護令榮於汾州觀賊勢時汾州與姚襄鎮相去懸逺榮以二城孤迥勢不相救請於州鎮間更築城以相控攝護從之俄而齊將段孝先攻陷姚襄汾州二城唯榮所立者獨能自守護作浮橋出兵孝先於上流縱大筏擊浮橋護令榮督便水者引取其筏以功授大都督護又以稽胡數為冦亂使綏集之榮於上郡延安築周昌𢎞信廣安招逺咸寧等五城以遏其要路稽胡由是不能為寇周武親總萬幾拜宣納中士後從平齊以功封平陽縣男遷司水大夫榮少與髙祖相親狎情契極歡嘗與髙祖夜坐月下因從容謂榮曰吾仰觀元象俯察人事周歷已盡我其代之榮深自結納未幾周宣帝崩髙祖總百揆召榮撫其背而笑曰吾言驗未即拜相府樂曹參軍俄以本官復領藩部大夫及髙祖受禪引為內史舍人以龍潛之舊進爵蒲城郡公位上儀同纍遷通州刺史仁夀初西南夷獠多叛榮領八州諸軍事行軍總管率兵討之悉平煬帝即位入為左武侯驃騎大將軍以嚴正聞後黔安首領田羅駒阻清江作亂夷陵諸郡民夷多應者詔榮擊平之遷左候衛將軍從帝西征吐谷渾拜銀青光祿大夫遼東之役以功進左光祿大夫眀年帝復事遼東榮以中國疲弊萬乘不冝屢動乃言於帝曰臣聞千鈞之弩不為鼷鼠發機戎狄失禮臣下之事豈有親辱大駕以臨小寇帝不納復從攻遼東城榮親蒙矢石晝夜不釋甲胄者百餘日帝每令人窺諸將所為知榮如是帝大恱每勞勉之九年帝至東都謂榮曰公年髙久涉行陳當與公一郡任所選也榮不願違離陳辭懇切遂拜右候衛大將軍後數日帝謂百寮曰誠心純至如郭榮者固亦無幾矣楊元感之亂帝令馳守太原眀年復從至栁城卒於懷逺鎮帝為廢朝贈兵部尚書諡曰恭子福善龎晃字元顯榆林人也父蚪周驃騎大將軍晃少以良家子召補州都督周文引署為大都督領親信兵常置左右晃因徙居關中後遷驃騎將軍襲爵比陽侯衛王直出鎮襄州晃以本官從尋與長湖公元定擊江南孤軍深入沒於陳數年衛王直遣晃弟車騎將軍元俊齎絹八百匹贖焉乃得歸拜上儀同復事衛王時髙祖出為隋州刺史路經襄陽衛王令晃詣髙祖晃知髙祖非常人深自結納及髙祖去官歸亰師晃迎見髙祖於襄邑髙祖甚歡與晃同飯因白髙祖曰公相貌非常名在圖録九五之日願希不忘髙祖笑曰何妄言也頃之有一雄雉鳴於庭髙祖命晃射之曰中則有賞然富貴之日持以為驗晃既射而中髙祖撫掌大笑曰此是天意公能感之因以二婢賜之情契甚密武帝時晃為常山太守髙祖為定州總管屢相往來俄而髙祖轉亳州將行意不恱晃陰白髙祖曰燕代精兵之處今若動衆天下不足圖也髙祖握晃手曰時未可也及髙祖為揚州奏晃同行既而髙祖為相命督左右甚見親待及踐䟭謂晃曰射雉之符今日驗不晃再拜曰陛下應天順人君臨宇內猶憶曩言不勝慶躍上笑曰公此言何得忘也尋加上開府拜右衛將軍進爵為公河間王𢎞之擊突厥晃性剛悍時廣平王雄當途用事勢傾朝廷晃每陵侮之嘗於軍中卧見雄不起雄甚銜之復與髙熲有隙二人屢譛晃由是宿衛十餘年官不得進出為懷州刺史遷原州總管卒于官帝為廢朝諡曰敬子長夀頗知名位驃騎將軍李安字元德隴西狄道人也父蔚仕周為相燕恆三州刺史襄武縣公安美姿容善騎射天和中襲爵襄武公授儀同小司右上士髙祖作相引之左右遷職方中大夫復拜安弟哲為儀同安叔父梁州刺史璋時在京師與周趙王謀害髙祖誘哲為內應哲謂安曰寢之則不忠言之則不義失忠與義何以立身安曰丞相父也其可背乎遂隂白之及趙王等伏誅將加官賞安頓首曰豈可將叔父之命以求官賞於是俯伏流涕悲不自勝髙祖為之改容曰我為汝特存璋子乃命有司罪止璋身帝亦為安隱其事而不言尋授安開府進封趙郡公哲上儀同黃臺縣男髙祖即位歷內史侍郎尚書左丞黃門侍郎平陳之役為楊素司馬仍領行軍總管率蜀兵順流東下時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊船必輕我無備夜襲之賊可破也安率衆先鋒大破陳師詔書勞勉進位上大將軍郢州刺史轉鄧州刺史求為內職髙祖重違其意除領左右將軍遷右領軍大將軍拜哲儀同三司備身將軍兄弟俱典禁衛恩信甚重八年突厥犯塞以安為行軍總管從楊素擊之安别出長川會虜度河與戰破之仁夀元年出安為寧州刺史哲為衛州刺史安子瓊哲子瑋始自襁褓乳飬宮中至是年八九嵗始命歸家其親顧如是髙祖嘗言及作相時事因愍安兄弟滅親奉國乃下詔曰先王立教以義斷恩割親愛之情盡事君之道用能𢎞奬大節體此至公往者朕登庸惟始王業初基寧州刺史趙郡公李安其叔璋潛結藩枝包藏不逞安與弟哲深知逆順披露丹心凶謀既彰罪人斯得朕每念誠節嘉之無已但以事涉其親猶有疑惑欲使安等名教之方自處有地朕常為思審遂致淹年今更詳按聖典求諸往事父子天性忠孝猶不並立况復叔姪恩輕情禮本有差降忘私奉國深得正理冝録舊勳重𢎞賞命於是拜安哲俱為柱國賜縑各五千匹馬百匹羊十口以哲為備身將軍進封順陽郡公安謂親族曰雖家門獲全而叔父遭禍今奉此詔悲愧交懷因歔欷悲感不能自勝先患水病於是疾甚而卒諡曰懷子瓊嗣少子孝恭最知名哲煬帝時工部尚書後坐事除名配防嶺南道卒楊尚希𢎞農人也祖真魏天水太守父承寶商直浙三州刺史尚希齠齓而孤年十一辭母請受業長安范陽盧辨見而異之令入太學専精不倦同輩皆共推服周文嘗親臨釋奠尚希時年十八令講孝經詞旨可觀周文竒之賜姓普六茹氏擢為國子博士纍轉舍人上士眀武世歷太學博士太子宮尹計部中大夫賜爵髙都侯東亰司憲中大夫宣帝時令尚希撫慰山東至相州而宣帝崩與相州總管尉遲迥發喪於館尚希出謂左右曰蜀公哭不哀而視不安將有他計吾不去恐及於難遂夜中從捷徑而遁遲眀迥方覺令騎自驛路追之不及遂至亰師髙祖以尚希宗室之望又背迥而至待之甚厚及迥屯兵武涉遣尚希領宗室兵三千人鎮潼關尋授司會中大夫髙祖受禪拜度支尚書進爵為公嵗餘出為河南道行臺兵部尚書加銀青光祿大夫尚希時見天下州郡過多上表以為今郡國倍多於古或地無百里數縣並置或户不滿千二郡分領具寮以衆資費日多吏卒又倍租調嵗減清幹良才百分無一動輸數萬如何可充所謂人少官多十羊九牧今存要去間併小為大國家則不虧粟帛選舉則易得賢才帝覽而嘉之遂罷天下諸郡後歷位瀛州刺史兵部禮部二尚書授上儀同尚希性慎厚兼以學業自通甚有雅望為朝廷所重上時每旦臨朝日側不倦尚希諫曰周文王以憂勤損壽武王以安樂延年願陛下舉大綱責成宰輔繁碎之務非人主所宜親也上歡然曰公愛我者尚希素有足疾上謂之曰蒲州出美酒足堪飬病屈公卧治之於是拜蒲州刺史仍領本州宗團驃騎尚希在州甚有惠政復引瀵水立隄防開稻田數千頃民賴其利卒官諡曰平子旻嗣後改封丹水縣公位安定郡丞張煚字士鴻河間鄚人也父羡少好學多所通涉仕魏為蕩難將軍從孝武帝入關纍遷銀青光祿大夫周文引為從事中郎賜姓叱羅氏歷司織大夫雍州中從事應州刺史儀同三司賜爵虞鄊縣公復入為司城中大夫典國史周代公卿類多武將唯羡以素業自通甚為當時所重後以年老致仕髙祖受禪欽其德望以書徴之及謁見勑令勿拜扶杖升殿上降榻執手與之同坐宴語久之賜以几杖會遷都龍首羡上表勸以儉約上優詔答之卒贈滄州刺史諡曰定所撰老子莊子義名道言五十二篇煚好學有父風仕魏位員外侍郎周文引為外兵曹眀武世位冢宰司録賜爵北平縣子宣帝時加儀同進爵為伯髙祖為丞相煚深自推結以其有幹用甚親遇之及受禪拜尚書右丞進爵為侯遷太府少卿領營新都監丞丁父憂去職柴毁骨立未期授儀同三司襲爵虞鄉縣公歷太府卿户部尚書晉王廣為揚州總管授煚司馬加銀青光祿大夫煚性和厚有識度甚有當時譽後拜冀州刺史晉王廣頻表請之復為晉王長史檢校蔣州事及晉王為太子復為冀州刺史位上開府吏民恱服稱為良二千石卒官子慧寶官至絳郡丞開皇中有劉仁恩者政績為天下第一擢拜刑部尚書以行軍總管從楊素伐陳與素破陳將呂仲肅於荆門仁恩計功居多授上大將軍甚有當時譽馮翊郭均上黨馮世期並明悟有幹略相繼為兵部尚書此三人俱顯名於世然事行闕略史莫能知蘇孝慈扶風人也父武周兖州刺史孝慈少沈謹有器幹美容儀仕周至工部中大夫封臨水縣公髙祖受禪進爵安平郡公拜太府卿于時王業初基徴天下匠纎微之巧無不畢集孝慈總其事世以為能歷位兵部尚書待遇愈密時皇太子勇頗知時政上欲重宮官之望多令大臣領其職拜孝慈太子右衛率尚書如故及至陕州置常平倉轉輸京下以渭水多沙乍深乍淺乃決渭水為渠以屬河令孝慈督其役渠成上善之又領太子左衛率仍判工部户部二尚書稱為幹理進位大將軍轉工部尚書率如故先是以百寮供費不足臺省府寺咸置廨錢收息取給孝慈以為官與百姓爭利非興化之道表請公卿以下給職田各有差上並納焉及將廢太子憚其在東宮出為浙州刺史太子以孝慈去形於言色遷洪州總管俱有惠政後桂林山越相聚為亂詔孝慈為行軍總管擊平之卒官子會昌孝慈兄順周眉州刺史子沙羅字子粹仕周以破尉遲迥功授開府儀同三司封通泰縣公開皇中歷位資卭二州刺史檢校利州總管從史萬嵗擊西爨進位大將軍尋檢校益州總管長史及蜀王秀廢沙羅坐除名卒於家子康嗣元壽字長壽河南洛陽人也祖敦魏侍中邵陵王父寶周涼州刺史夀少孤性仁孝九嵗喪父哀毁骨立宗族鄉黨咸異之事母以孝聞及長方直頗涉文史周武成初封隆城縣侯保定四年封儀隴縣侯授儀同三司開皇初議伐陳以夀有思理使於淮浦監修船艦以強濟見稱纍遷尚書左丞上嘗出苑觀射文武並從開府蕭摩訶妻患且死奏請遣子向江南收其家産御史見而不言夀奏劾之曰御史之官義存紏察直繩莫舉憲典誰寄今月五日鑾輿徙蹕親臨射苑開府儀同三司蕭摩訶幸厠朝行預觀盛禮奏稱請遣子世略暫往江南重收家産妻安遇患彌留有日安若長逝世略不合此行竊以人倫之義伉儷為重慈愛之道烏鳥弗虧摩訶逺念資財近忘匹好一言才發名教頓盡而兼殿內侍御史韓徵之等親所聞見竟不彈紏若知非而不舉情涉阿縱如不以為非豈關理識儀同三司太子左庶子檢校書侍御史臣劉行本虧失憲體何所逃愆臣謬膺朝寄忝居左轄無容寢默謹以狀聞上嘉納之後授太常少卿出為基州刺史有公廉稱入為太府少卿進位開府煬帝嗣位漢王諒反左僕射楊素為行軍元帥夀為長史事平以功授大將軍遷太府卿大業四年拜內史令從帝西討吐谷渾夀率衆屯金山東西連營三百餘里以圍渾主還拜右光祿大夫七年兼左翊衛將軍從征遼東在道卒帝哭之甚慟贈尚書右僕射光祿大夫諡曰景子敏頗有才辨而輕險多詐夀卒帝追思之擢敏守內史舍人交通博徒數泄省中語化及之反敏創其謀偽授內史侍郎為沈光所殺韋世康京兆杜陵人也周太傅雍州牧孝寬兄子也父敻飬髙不仕有重名時號為居士世康幼而沈敏年十嵗州辟主簿仕魏弱冠為直寢封漢安縣公尚周文女襄樂公主授儀同三司仕周歷位典祠下大夫沔硤二州刺史從周武帝平齊授司州總管長史時東夏初定百姓未安世康綏撫之士庶胥恱入為户部中大夫進位上開府轉司會中大夫尉遲迥之亂髙祖謂世康曰汾絳舊是周齊分界因此亂階恐生搖動今以委公因授絳州刺史以雅望鎮之闔境清肅世康性恬素好古不以得喪干懷在州有止足之意與子弟書曰吾生因緒餘夙霑纓辨驅馳不已四紀於兹亟登衮命頻蒞方嶽志除三惑心慎四知以不貪而為寶處脂膏而莫潤如斯之事頗為時悉今耄雖未及壯年已謝霜早梧楸風先蒲栁眼暗更劇不見細書足疾彌增非可趨走祿豈須多防滿則退年不待暮有疾便辭况北堂春秋已髙溫凊冝奉晨昏有闕罪在我躬今世穆世文並從武役吾與世沖復嬰逺仕陟岵瞻望此情彌切桓山之悲倍深常戀意欲上聞乞遵禮教未訪汝等故遣此及興言逺慕感咽難勝諸弟報以事恐難遂乃止在任有惠政奏課連最擢為禮部尚書世康寡嗜欲不慕勢貴未嘗以位望矜物聞人之善若已有之亦不顯人過咎以求名譽進爵上庸郡公轉吏部尚書選用平允請託不行以母憂去職固辭乞終私制上不許開皇七年將事江南議重方鎮拜襄州刺史坐事免未幾授安州總管遷信州總管十三年復拜吏部尚書前後十餘年間多所進授朝廷稱為廉平嘗因休暇謂子弟曰吾聞功遂身退古人常道今年將耳順志在懸車汝輩以為云何子福嗣答曰大人澡身浴德名立官成盈滿之戒先哲所重欲追蹤二踈伏奉尊命後因侍宴世康再拜陳讓願乞骸骨上曰冀與公共理天下今之所請甚乖本望縱筋力衰謝猶屈公卧臨一隅於是出拜荆州總管時天下唯置荆并揚益四大總管并揚益並親王臨統唯荆州委於世康時論以此為美世康為政簡靜百姓愛恱卒於州上聞而痛惜贈大將軍諡曰文世康性孝友初以諸弟位並隆貴獨季弟世約宦途未達共推父時田宅盡以與之世多其義長子福子位司𨽻别駕次子福嗣位內史舍人後以罪黜楊元感之亂從衛元戰敗於城北為元感所獲令為文檄詞甚不遜尋背元感還東都帝銜之車裂於髙陽少子福奬通事舍人在東都與元感戰歿世康兄洸字世穆性剛毅有器幹少便弓馬仕周釋褐直寢上士數從征伐纍遷開府賜爵衛國縣公髙祖為丞相從季父孝寬擊尉遲迥於相州以功拜柱國襄陽郡公時突厥寇邉皇太子屯咸陽令洸統兵出原州道與虜相遇擊大破之拜江陵總管俄拜安州總管伐陳之役為行軍總管及陳平拜江州總管略定九江遂進圖嶺南上與書慰勉之洸至廣州嶺表皆降之上聞而大恱許以便宜從事洸所綏集二十四州拜廣州總管嵗餘番禺夷王仲宣反以兵圍洸洸拒之中流矢卒贈上柱國賜綿絹萬假諡曰敬子協字欽仁好學有雅量位祕書郎其父在廣州有功上命協齎詔書勞問未至而父卒上以其父死王事拜協柱國歷定息秦三州刺史有能名卒官洸弟瓘字世恭御正下大夫儀同三司行隨州刺史瓘弟藝字世文周武帝時以軍功位上儀同賜爵修武縣侯授左旅下大夫出為魏郡太守及髙祖為丞相尉遲迥隂圖不軌朝廷遣藝季父孝寬馳往代迥孝寬將至鄴詐病止傳舍從迥求藥以密觀變藝因投孝寬即從孝寬擊迥以功進位上大將軍改封武威縣公以修武縣侯别授一子髙祖受禪進封魏興郡公拜齊州刺史為政通簡士庶懷惠遷營州總管藝容貌瓌偉每夷狄參謁必整儀衛盛服以見之獨坐滿一榻蕃人畏懼莫不仰視而大修産業與北夷貿易家資巨萬頗為清論所譏卒官諡曰懷藝弟沖字世沖以名家子在周釋褐衛公府禮曹參軍從大將軍元定度江伐陳為陳人所虜周武帝以幣贖還之帝復令沖以馬千匹使陳贖開府賀拔華等五十人及元定之柩而還沖有辭辨奉使稱旨纍遷小御伯下大夫加上儀同拜汾州刺史髙祖踐阼徴兼散騎常侍進位開府賜爵安固縣侯嵗餘發南汾州胡千餘人北築長城在塗皆亡上呼沖問計沖曰皆由牧宰不稱所致請以理綏靜可不勞兵而定上因命沖綏懷叛者月餘並赴長城上降書勞勉之尋拜石州刺史甚得諸胡歡心以母憂去職俄起為南寧州總管持節撫慰復遣柱國王長述以兵繼進沖既至南寧渠帥首領皆詣府參謁上大恱下詔褒揚之其兄子伯仁隨沖在府掠人之妻士卒縱暴邉人失望上聞之大怒令蜀王秀按其事益州長史元巖性方正按沖無所寬貸竟坐免官其弟太子洗馬世約譛巖於皇太子上謂太子曰古人云酤酒酸而不售者為噬犬耳今何用世約乎世約遂除名後令沖檢校括州事時東陽賊帥陶子定吳州賊帥羅慧方並聚衆為亂沖率兵破之改封義豐縣侯檢校泉州事遷營州總管沖容貌都雅寬厚得衆心撫靺羯契丹皆能致其死力奚霫畏懼朝貢相續髙麗嘗入寇沖擊走之及髙祖為豫章王暕納沖女為妃徴拜户部尚書卒官少子挺知名韋師字公頴亰兆杜陵人也父瑱周侍中驃騎開府自有傳師少沈謹有至性初就學始讀孝經捨書而嘆曰名教之極其在兹乎少丁父母憂居喪盡禮州里稱其有孝行及長略涉經史尤工騎射周大冡宰宇文護引為中外府記室轉賔曹參軍師雅知諸蕃風俗及山川險異其有夷狄朝貢師必接對論其國俗如視諸掌夷人驚服無敢隱情齊王憲為雍州牧引為主簿本官如故及武帝親總萬幾轉少府大夫及齊平詔師安撫山東徙為兵部大夫髙祖受禪拜吏部侍郎賜爵井陘侯遷河北道行臺兵部尚書奉詔為山東河南十八州安撫大使奏事稱旨兼領晉王廣司馬其族人世康為吏部尚書與師素懷勝負于時廣為雍州牧盛存望第以司空楊雄尚書左僕射髙熲並為州都督引師為主簿而世康弟世約為法曹從事世康恚恨不能食又耻世約在師之下召世約數之曰汝何故為從事遂杖之後從上幸醴泉宮上召師與左僕射髙熲上柱國韓擒虎等於卧內賜宴令各敘舊事以為笑樂平陳之役以本官領元帥掾陳國府藏悉委於師秋毫無犯稱為清白後上為長寧王儼納其女為妃除汴州刺史甚有政名卒官諡曰定師宗人謨仕周位內史大夫髙祖初以定䇿功纍遷上柱國封普安郡公開皇初卒於蒲州刺史栁機字匡時河東解人也父慶周司會中大夫自有傳機偉於容儀有器局頗涉經史年十九周武帝時為魯公引為記室及帝嗣位纍遷太子宮尹封平齊縣公宣帝時為御正上大夫機見帝失德屢諫不聽恐禍及己託於鄭譯求出拜華州刺史及髙祖作相徴還京師時周代舊臣皆勸禪讓機獨義形於色無所陳請俄拜衛州刺史及踐阼進爵建安郡公徵為納言機性寬簡有雅望當近侍無所損益又好飲酒不親細務數年出為華州刺史奉詔每月朝見尋轉冀州刺史後徴入朝以其子述尚蘭陵公主禮遇益隆初機在周與族人文城公昂俱歷顯要及此昂機並為外職楊素時為納言方用事因上賜宴素戲曰二栁俱摧孤楊獨聳坐者歡笑機竟無言未幾還州前後作守俱稱寬惠後以徵還卒于家贈大將軍青州刺史諡曰簡子述嗣述字業隆性眀敏有幹局頗涉文藝以父蔭為太子親衛後以尚主故拜開府儀同三司內史侍郎上於諸壻中特見寵遇嵗餘判兵部尚書事父艱去職未幾起攝給事黃門侍郎事襲爵建安郡公仁夀中判吏部尚書事述雖職務修理為當時所稱然不達大體暴於馭下又怙寵驕豪無所降屈楊素時方貴重朝臣莫不讋憚述每陵侮之數於上前靣折素短判事有不合素意或令述改輒謂將命者曰語僕射道尚書不肯素由是銜之俄而楊素被疏忌不知省事述任寄逾重拜兵部尚書參掌機密述自以無功可紀過叨匪報抗表陳讓上許之命攝兵部尚書上於仁壽宮寢疾述與楊素黃門侍郎元巖等侍疾宮中時皇太子無禮於陳貴人上知之大怒令述召房陵王述與元巖等出外作敕書楊素見之與皇太子謀矯詔執述巖屬吏及煬帝嗣位述坐除名公主請與同徙帝不聽述謫龍川數年復徙寧越遇瘴癘死機弟旦字匡德工騎射頗涉書籍仕周位兵部下大夫以行軍長史從梁睿討王謙以功授儀同三司開皇元年加開府封新城縣男授掌設驃騎歷羅浙魯三州刺史並有能名大業初拜龍川太守郡人居山洞好相攻擊旦為開設學校大變其風帝聞下詔褒美之徵為太常少卿攝判黃門侍郎事子燮官至河內郡掾旦弟肅字匡仁少聰敏間於占對仕周位宣納上士髙祖作相引為兵部參軍開皇初授太子洗馬陳使謝泉來聘以才學見稱詔肅宴接時論稱其華辨歷太子內舍人太子廢坐除名大業中帝與假達語及庶人勇罪惡達云栁肅在宮大見踈斥帝問其故對曰學士劉臻嘗進章仇太翼宮中為巫蠱事肅知而諌曰殿下位當儲二戒在不孝無患見疑劉臻書生鼓搖脣口適足以相詿誤願勿納之庶人不懌他日謂臻曰汝何漏泄使栁肅知之令靣折我自是後言皆不用帝曰肅橫除名乃召守禮部侍郎坐事免後守工部侍郎大見親任每幸遼東嘗委於涿郡留守卒官機從子謇之字公正父齊年周順州刺史謇之身長七尺五寸儀容甚偉風神爽亮進止可觀為兒童時周齊王憲遇之於塗異而與語大竒之因奏為國子生以眀經擢第拜宮師中士轉守廟下士武帝有事太廟謇之讀祝文音韻清雅觀者屬目帝善之擢為宣納上士開皇初拜通事舍人尋遷內史舍人歷兵部司勳二曹侍郎朝廷以謇之雅望善談謔又飲酒至石不亂由是每梁陳使至輒令接對遷光祿少卿出入十餘年每參掌敷奏會吐谷渾來降朝廷以宗女光化公主妻之以謇之兼散騎常侍送公主於西域及突厥啓民可汗求和親復令謇之送義成公主於突厥前後使二國得贈馬二十餘匹雜物稱是皆散之宗族家無餘財出為肅息二州刺史俱有惠政煬帝踐阼復拜光祿大夫大業初啓民可汗自以內附遂畜牧于定襄馬邑間帝使謇之諭令出塞還拜黃門侍郎時元德太子初薨朝野注望以齊王當立帝乃重王府之選拜為齊王長史帝法服臨軒命齊王立于西朝堂遣吏部尚書牛𢎞內史令楊約左衛大將軍宇文述等從殿廷引謇之詣齊王所西靣立𢎞宣勑謂齊王曰我出蕃之初時年十二先帝立我於西朝堂乃令髙熲虞慶則元旻等從內送王子相於我誡我曰以汝未更世事令子相作輔於汝事無大小皆可委之無得昵近小人踈逺子相若從我言必有益於社稷成立汝名行如不用此言唯國及身敗無日矣吾受敕奉以周旋不敢失墜微子相之力吾幾無今日矣若與謇之從事一如子相也又敕謇之曰今以卿作輔於齊副朕所望若齊王德業修偹富貴自當鍾卿一門若有不善罪亦相及時齊王擅寵喬令則之徒深見昵狎謇之知其非不能匡正及王得罪謇之竟坐除名及帝幸遼東召檢校燕郡事帝班師至燕郡坐供頓不給配戍嶺南卒于洭口子威眀陸彥師字雲房代人也父子彰魏中書監有子六人卬駿杳騫搏皆列名前史彥師其季也彥師少以行檢稱及長好學解屬文魏襄城王元旭引為參軍事以父艱去職哀毁殆不勝喪與兄卬廬于墓次鄉人重之皆就墓側存問晦朔之際車馬不絶中書令河間邢邵表薦之未報齊彭城王浟為司州牧召補主簿後歷中外府東閣祭酒兄卬當襲父始平侯以彥師昆弟中最幼表讓封焉彥師固辭而止世稱友悌孝義總萃一門為中書舍人通直散騎侍郎每陳使至必髙選主客彥師所接對者前後六輩歷中書黃門侍郎後以不阿宦者遇讒出為中山太守有惠政數年後為吏部郎中散騎常侍又拜銀青光祿大夫假儀同三司行鄭州刺史尋除給事黃門侍郎武平末車駕如晉陽北平王鎮鄴委彥師留臺機密以重慎見知周武平齊授彥師下大夫轉少納言賜爵臨水縣男及髙祖作相彥師遇疫請假還鄴尉遲迥將為亂彥師知之遂將妻子潛歸長安髙祖嘉之授內史下大夫拜上儀同及髙祖受禪拜尚書左丞進爵為子彥師素多病未幾以務劇病動乞假所職有詔聽以本官就第嵗餘轉吏部侍郎隋承周制官無清濁彥師在職凡所任人頗甄别於士庶論者美之後復以病出為汾州刺史卒官魏淡字彥深巨鹿下陽曲人也祖鸞魏光州刺史父季景齊大司農卿魏郡尹世以文學自業淡年十五而孤専精好學髙才善屬文仕齊纍遷殿中侍御史尋與魏收陽休之熊安生俱修國史又與諸學生修五禮及撰御覽除殿中郎中書舍人後與李德林俱修國史入周為納言中士隋初為行臺禮部侍郎尋為聘陳使正還除太子舍人廢太子勇深禮之令注庾信集撰笑苑世稱博物遷著作郎仍為太子學士帝以魏收所撰後魏書褒貶失實平繪為中興書事不倫序詔淡别成魏史淡自道武下及恭帝為十二紀七十八列傳别為史論及例各一卷合九十二卷義例與魏收多所不同其一曰臣聞天子者繼天立稱終始絶名故榖梁傳太上不名曲禮天子不言出諸侯不生名諸侯尚不生名况天子乎若為太子必須書名良由子者對父生稱父前子名禮之意也至如馬遷周之太子並皆言名漢之儲兩俱沒其諱以尊漢卑周臣子之意也竊謂雖立此理恐非其義何者春秋禮記太子必書名天王不言出此仲尼之褒貶皇王之稱謂非當時與異代遂為優劣也班固范曄陳夀王隱沈約參差不同尊卑失序至於魏收諱儲君之名書天子之字過又甚焉今所撰諱皇帝名書太子字欲尊君卑臣依春秋之義二曰魏氏平文以前部落之君長耳太祖逺追二十八帝並極崇髙違堯舜憲章越周公典禮但道武出自結繩未師典誥當須南董直筆裁而正之反更飾非豈是觀過但力微天女所誕靈異絶世尊為始祖得禮之宜平文昭成雄據塞表英風漸盛圖南之業基自此始長孫斤之亂也兵交御坐太子授命昭成獲免道武此時后緡方娠宗廟復存社稷有主大功大孝實在獻眀此之三世稱諡可也自兹以來未之敢聞其三曰幽王死於驪山厲王出奔於彘未嘗隱諱直筆書之欲以勸善懲惡貽誡將來而太武獻文並遭非命前史立紀不異天年言論之間頗異首尾殺主害君莫知名姓逆臣賊子何所懼哉今分眀直書不敢回避四曰自晉德不競宇宙分崩或帝或王各自署置其生略如敵國書死便同庶人凡處華夏之地者皆書曰卒同之吳楚淡又以為司馬遷創立紀傳以來述者非一人無善惡皆為立論計在身行迹具在正書事既無竒不足懲勸再述乍同銘頌重敘唯覺繁文案邱眀亞聖之才發揚聖旨言君子曰者無非甚泰其間尋常直言而已今所纂史竊有慕焉可為勸戒者論其得失其無益者所不論也上覽而善之未幾而卒有集三十卷子罕言淡弟彥元位郁州司馬子滿行通志卷一百六十二
