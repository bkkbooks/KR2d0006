body:
  text: 通志卷三十四宋右迪功郎鄭樵漁仲撰六書略第四假借第六序曰六書之難明者為假借之難明也六書無傳惟藉説文然許氏惟得象形諧聲二書以成書牽於會意復為假借所擾故所得者亦不能守焉學者之患在於識有義之義而不識無義之義假借者無義之義也假借者本非已有因他所授故於已為無義然就假借而言之有有義之假借有無義之假借不可不别也曰同音借義曰協音借義曰因義借音曰因借而借此為有義之假借曰借同音不借義曰借協音不借義曰語辭之借曰五音之借曰三詩之借曰十日之借曰十二辰之借曰方言之借此為無義之假借先儒所以顛沛淪於經籍之中如泛一葦於溟渤靡所底止皆為假借之所􅀈也嗚呼六書明則六經如指諸掌假借明則六書如指諸掌同音借義初裁衣之始而為凡物之始基築土之本而為凡物之本始女子之初而為凡物之初本木之基而為凡物之基小水之微也凡微者皆言小永水之長也凡長者皆言永牛為牝牡而牝牡通於畜獸佳為雌雄而雌雄通於鳥雀狀本犬之形而為凡物之狀物本牛之事而為凡事之物馬言駕凡驅乘皆曰駕牛言牧凡豢養皆曰牧木曰落而為墮落之落雨曰零而為飄零之零英本英華之英而為飾物之英苦本苦良之苦而為滋味之苦蔓本藤蔓之蔓而為蔓衍之蔓爻乃交疏之爻而為爻象之爻希乃疏巾之希而為希少之希柞本柞木之柞而為芟柞之柞鑿本金鑿之鑿而為疏鑿之鑿旋反斾也而為回旋之旋戲兵交也而為嬉戲之戲平氣之平也而為均平之平封爵土之封也而為封殖之封戚斧也而為親戚之戚塵土也而為塵積之塵賢多財也而為賢良之賢妃嘉偶也而為后妃之妃純絲也而為純全之純茸草也而為尨茸之茸珣夷玉也而玉器亦謂之珣蘆葦也而薺根亦謂之蘆饒食之餘也而為饒衍之饒約絲之束也而為儉約之約凡此之類並同音借義者也右三十五借同音不借義汝水也而為爾汝之汝爾花盛也詩彼爾維何維常之華而為汝爾之爾示旗也而為神示之示業大版也而為事業之業牢牛圈也而為牢固之牢畜田畜也而為畜聚之畜它蛇屬也而為它人之它蚤虱類也而為蚤夜之蚤為母猴也而為作為之為率鳥畢也而為率循之率來麥也而為來往之來易蟲屬也而為變易之易能熊類也而為賢能之能黽蛙也而為黽勉之黽翁毛也而為翁老之翁題額也而為題命之題薄本林薄之薄而為涼薄之薄茀本茀茂之茀而為茀祿之茀登豆也而為升登之登干盾也而為干犯之干革皮也而為更革之革鞠革囊也而為鞠養之鞠難禽也而為難易之難雍禽也而為雍和之雍溱水也而為室家溱溱之溱棣栘也而為威儀棣棣之棣丁當也而為椓之丁丁之丁薨卒也而為度之薨薨之薨胥蟹醢也而為相胥之胥方並舟也而為方所之方節竹目也而為節操之節管竹筒也而為主管之管韋相違也而為皮革之韋􅀢相易也而為􅀈矇之􅀢禮􅀢􅀢而來休憩也而為休美之休財貨也而為財成之財易財成天地之道齎財之齎而為齎咨之齎易齎咨涕洟時辰之時而為時是之時晉先明也而為晉國之晉夢寐也而為雲夢之夢風蟲之風而為吹噓之風字養之字而為文字之字勿州里之旗也而為勿不之勿出花英也而為出入之出久距也而為久逺之久凡此之類並同音不借義者也右四十五協音借義旁之為旁去聲中之為中去聲上之為上時掌切下之為下胡嫁切分之為分去聲少之為少去聲歸之為歸音饋遺之為遺惟季切與也御之為御音迓為御音禦行之為行下孟切為行户浪切子路行行數色主切之為數尸故切為數色角切趨之為趨七六切為趨側九切春秋傳賔將趨鄭康成讀咽之為咽音燕為咽以結切梗咽蕃音藩樊也之為蕃音煩草之蕃蕪蕪之為蕪亡甫切蕪茂徹通也之為徹直列切斂之為斂去聲蔓藤也之為蔓草干切蔓菁吹之為吹去聲呼之為呼去聲為呼呼賀切春秋傳呼役夫噍才笑切嚼也之為噍音焦禮志微噍殺之音為噍子流切禮燕雀啁噍之頃否之為否音鄙臧否為否部鄙切否泰喧之為喧上聲詩赫兮喧兮趣之為趣平聲為趣七口切周官有趣馬幾之為幾音冀春秋傳庸可幾乎為幾渠希切近也樂之為樂五教切為樂音洛華今作花之為華音譁榮也為華去聲聚也酇作管切聚也之為酇音贊南陽縣名為酇在河切沛縣名空之為空音孔窟也為空苦貢切詩不宜空我師從之為從才用切為從七容切從容間暇也比毗至切之為比音皮和也為比上聲方也為比蒲必切次也為比音芘朋也放之為放上聲敖音遨之為敖音傲背脊也之為背音佩違也衡橫木之為衡音橫筍之為筍私閠切筍輿也塞之為塞去聲塞垣竒之為竒居宜切奇偶嘉之為嘉力嫁切春秋傳公賦嘉樂枝之為枝音岐栽之為栽音在築也回古文雷字之為回亦作回繞也暴步卜切灼也之為暴虐也粢稷屬之為粢才細切禮粢醍在堂鹽之為鹽去聲定之為定丁佞切詩定之方中仰之為仰去聲伏之為伏去聲禮羽者嫗伏毛者孕育并之為并去聲裨補支切之為裨婢支切副也辟必益切君也之為辟蒲益切法也厭之為厭去聲覺之為覺古孝切夢覺也騶之為騶仕救切麗之為麗力之切詩魚麗于罶靡之為靡平聲間之為間去聲援之為援平聲引也折之列切之為折士列切女之為女尼句切妻之為妻去聲姓之為姓音生春秋傳蔡公孫歸姓孫之為孫音遜純之為純之尹切緣也總之為總子公切詩素絲五總織之為織隻吏切徽也詩織文鳥章纍之為纍力偽切土之為土音杜詩徹彼桑王壞之為壞音怪錢之為錢上聲詩庤乃錢鑄針音針之為針其兼切親之為親去聲婚姻相謂也賓之為賓去聲客以禮會曰賔衣之為衣去聲冠之為冠去聲枕之為枕去聲飲之為飲去聲食之為食時吏切膏之為膏古到切詩羔裘如膏熏之為熏去聲隂之為陰去聲輕之為輕去聲春秋傳戎輕而不整兩之為兩去聲詩葛屨五兩三之為三去聲論語三思而後行左上聲之為左音佐右上聲之為右音佑先之為先去聲後之為後去聲逺之為逺去聲近之為近去聲復之為復扶又切重之為重去聲離之為離去聲沈之為沈去聲量之為量去聲度之為度徒洛切長之為長去聲廣之為廣去聲染之為染去聲縫之為縫去聲别彼列切之為别皮列切斷都管切之為斷徒管盡即忍切之為盡慈忍切解之為解胡買切通也相之為相息亮切走之為走去聲書矧咸奔走奔之為奔逋悶切散之為散去聲和之為和去聲凝之為凝去聲冰之為冰彼憑切強之為強其亮切箸之為箸陟略切為箸真略切施之為施式豉切為施以豉切冥之為冥去聲煎之為煎去聲炙之為炙之夜切收之為收式救切當之為當去聲悔之為悔去聲應平聲之為應應對之應帥之為帥所類切監之為監去聲使之為使去聲守之為守去聲任之為任平聲勝之為勝平聲爭之為爭去聲迎之為迎去聲選之為選去聲聼之為聽平聲論之為論平聲知之為知音智思之為思去聲便之為便平聲好之為好去聲令之為令平聲教之為教平聲語之為語去聲怨之為怨平聲衆之為衆平聲雨之為雨去聲種之為種去聲緣之為緣去聲張之為張去聲藏之為藏去聲處之為處去聲乘之為乘去聲卷之為卷上聲祝之為祝之又切傳之為傳去聲聞之為聞去聲稱之為稱平聲譽之為譽平聲勞之為勞去聲興之為興去聲與之為與去聲繫之為繫古詣切遲之為遲去聲屬之為屬章玉切含之為含去聲遣之為遣去聲禮有遣奠引以忍切之為引余忍切臨之為臨去聲假之為假古訝切春秋傳不以禮假人借之為借入聲貸之為貸入聲敗之為敗音拜見之為見胡甸切告之為告古祿切禮出必告養之為養去聲共之為共音恭去之為去上聲喪之為喪去聲忘之為忘去聲恐之為恐邱用切射之為射食亦切取之為取七句切禮聞取於人大之為大音太焉之為焉於乾切會之為會音檜披之為披上聲降之為降户江切覆之為覆甫六切朝之為朝直遙切刺之為刺入聲奉之為奉音棒父扶雨切之為父音甫子之為子將吏切禮子庶民也凡此之類並協音而借義者也右二百八借協音不借義荷之為荷胡可切負也茹茹藘茅搜也之為茹去聲度也鮮之為鮮上聲燕之為燕平聲薄之為薄必各切迫也災側其切田也之為災音災苴七余切麻也之為苴子餘切包苴竟之為竟音境旁之為旁補彭切詩駟介旁旁屯之為屯徒門切聚也莫音暮之為莫模各切為莫音陌春秋傳德正應和曰莫個之為個音介副也禮明堂有左右個為個音幹禮梓之為侯上兩個與其身三番附袁切獸足也之為番音翻次也為番音波番番勇也台音怡我也之為台音胎星名為台音臺春秋傳季孫宿救台范寧讀句之為句古侯切為句古候切詩敦弓既句調之為調徒杳切品調為調陟留切詩惄如調飢召之為召音邵咽之為咽音淵詩伐鼓咽咽登之為登音得春秋傳登來正音征射侯之正也之為正去聲邪琅邪地名之為邪邪正之邪追之為追丁回切追琢也徼古堯切之為徼古弔切邊徼訏之為訏音詡詩川澤訏訏説之為説音悅識之為識音志信之為信音伸樊之為樊音盤樊纓革之為革紀力切急也殺之為殺去聲降殺占之為占去聲甫之為甫音圃圃田省昔井切之為省所景切雅今作鴉之為雅上聲瞿九遇切驚也之為瞿平聲戟類鳥之為鳥音島修脯也之為修音卣中尊肺之為肺音沛詩其葉肺肺脫之為脫音退詩舒而脫脫兮創音瘡傷也之為創去聲削之為削音肖刀室簫音簫之為簫音朔象簫以舞簿蠶曲之為簿簿書平之為平辨年切盛音成之為盛索之為索生革切稽之為稽音啓稽首鄉之為鄉音嚮昭之為昭音韶遊之為遊音流旗遊旋之為旋音選鍾縣盟之為盟音孟盟津貫之為貫古患切習也栗之為栗堅也齊之為齊音咨齊衰冒之為冒莫北切貪也俾之為俾普計切俾倪北音佩違也之為北入聲方也屏之為屏上聲兄之為兄音况詩倉兄填兮辨之為辨蒲官切詩小辨縣平聲之為縣驕之為驕許喬切詩載獫歇驕薦之為薦音荐詩天方薦瘥麇也之為麇邱隕切衆也扃之為扃上聲春秋我心扃扃間之為間音間耿上逈切光也之為耿古幸切耿耿憂也拒之為拒音矩招拒白帝振之為振平聲詩振振公子揖之為揖子入切詩螽斯羽揖揖兮蟄之為蟄尺十切詩宜爾子孫蟄蟄兮紀之為紀音起詩有紀有堂縱之為縱平聲絮之為絮勑慮切禮毋絮羮繆之為繆音穆諡也絀音屈之為絀音詘軒之為軒音憲禮野豕為軒斤之為斤紀覲切斤斤明也險之為險音儉春秋傳險而易行隊之為隊音墜舍之為舍音捨王于况切之為王宿之為宿思宥切星也要之為要去聲風之為風音諷夏胡賈切中夏也之為夏胡嫁切冬夏也豫之為豫音與委之為委於偽切委積女之為女音汝卷之為卷音衮禮三公一命卷為卷音拳禮執女手之卷然為卷起權切冠武也鞠毬也之為鞠音麴為鞠音芎鞠藭鬻亦作粥之為鬻音育賣也為鬻居六切詩鬻子之閔斯殿音奠擊聲之為殿丁見切為殿音店詩民之方殿屎將之為將去聲為將七羊切詩將仲子兮敦之為敦都隊切玉敦為敦都回切詩敦彼獨宿為敦徒夲切渾敦肉之為肉而救切禮寬裕肉好之音為肉而注切禮豐肉而短膴凶武切大臠也之為膴亡古切詩則無膴仕為膴音模詩民雖靡膴從之為從則庸切從衡為從匕容切從容為從音縱為從音總禮爾無從從爾衰衰之為衰楚危切等衰為衰衰微耆之為耆音嗜為耆音底辟必益切君也之為辟音避為辟音弭止也為辟音裨禮素帶終辟為辟音僻禮負劔辟咡厭於鹽切之為厭於葉切厭浥行露為厭音壓禮死而不弔曰厭為厭於驗切服也貉之為貉音陌狄也為貉音禡率捕鳥具之為率將帥之帥亦作率為率音律約也凡此之類並協音不借義者也右百三十三因義借音琢本琢玉之琢而為大圭不琢之琢音篆輅本車輅之輅而為狂狡輅鄭人之輅音迓以有惡入聲也故可惡烏路切以其內也故可內音納佚夷質切縱也而為佚宕之佚音迭伯長也而為伯王之伯音霸幬帳也而為覆幬之幬音燾春秋傳如天之無不幬幕帷也而為幕覆之幕音覔蓼本葒蓼之蓼而為蓼彼蕭斯之蓼力竹切錞本金錞之錞音淳而為􅤌矛沃錞之錞徒對切術邑中道也以其所行故為鄉術之術音遂嬴秦姓也以其所居故為嬴水之嬴音為嘯呼之嘯而為指嘯之嘯音叱跛躃之跛彼我切而為跛倚之跛彼義切禮立無跛副普逼切剖也而為副二之副承奉也而為賻承之承音贈禮賵賻承含甄吉然切本甄陶之甄而為聲甄之甄音震禮薄聲甄封本封土之封而為封棺之封音窆禮縣棺而封齊本齊一之齊而為齊莊之齊俱皆切巡本巡行之巡而為相巡之巡音緣禮始終相巡推本推與之推而為推挽之推土回切摶本摶攝之摶而為搏束之搏除轉切禮百羽為搏獻本獻享之獻而為獻尊之獻素何切衰本雨衣之衰素何切而為衰絰之衰音崔橇本音毳以其義通於橋故又音橋凡此之類並因義借音右二十五因借而借難鳥也因音借為艱難之難因艱難之難借為險難之難去聲為母猴也因音借為作為之為因作為之為借為相為之為去聲射本射御之射因義借為發射之射食亦切因發射之音借為無射之射音亦律名斁本厭斁之斁羊亦切因義借為斁敗之斁答路切書彜倫攸斁因斁敗之音借為斁墍之斁音徒書惟其斁塈茨亨音享本饗也因義借為亨飪之亨普庚切因亨飪之音借為亨嘉之亨來本麥也因音借為往來之來因往來之義借為勞來之來音賚矜本矛柄也因音借為矜憐之矜因矜憐之義借為矜寡之矜音鰥適往也因音借為適責之適音謫詩勿豫禍適因適責之音借為適匹之適音敵禮大夫訃於同國敵者參七南切間厠也因義借為參差之參楚金切因參差之音借為參伐之參所金切邪本琅邪之邪因音借為語辭之邪因語辭之義借為虛邪之邪音徐詩其虛其邪食本啖食之食因義借為飲食之食音伺因飲食之音借為食其之食音異費本費用之費因音借為費邑之費因費邑之義借為費氏之費扶未切崔本南山崔崔之崔子推切因義借為崔嵬之崔慈回切因崔嵬之音借為崔氏之崔音崔不本鄂不􅙽􅙽之不音趺因音借為可不之不音否因可不之義借為不可之不音弗填本填塞之填因義借為填壓之填音鎮因填壓之音借為填久之填音塵詩倉兄填兮罷本罷置之罷因義借為罷困之罷音疲因罷困之音借為罷辜之罷鋪逼切禮以罷辜祭四方質本質幣之質音贄因義借為交質之質音至因交質之音借為形質之質畜本田畜之畜敕六切借為畜養之畜因畜養之義借為六畜之畜許又切治平聲水也因音借為治理之治因治理之義借為平治之治去聲乞氣也因音借為與人之乞音氣因與人之義借為求人之乞入聲能奴來切獸也因義借為能鱉之能三足鱉因能鱉之音借為能事之能音耐又為三能之能音台凡此之類並因借而借右四十三語辭之借序曰書者象也凡有形有象者則可以為象故有其書無形無象者則不可為象故無其書語辭是也語辭之用雖多而主義不立並從假借之菌也者陰也於烏也云雲也焉鳶也邪琅邪之地每原田之兒每本音梅借為上聲惟思也唯應也本上聲乃唯諾之唯借平聲而面毛也須髭也夫音扶本丈夫也害本災害也本去聲借音曷詩害浣害否斯析也然燎也蓋草覆也其箕也豈鎧也以薏苡實也矣箭鏃也員物數也音云詩聊樂我員已几也既小食也盍覆也且子余切薦几也為母猴也居蹲也諸辨也詩日居月諸與授也為語辭平聲爾華繁也詩彼爾維何維常之華耳人耳也哉言之間也乎氣也兮氣也于氣也只氣也乃氣也思慮也旃斾也詩舍旃舍旃承奉也音懲楚人語辭凡語辭惟哉乎兮于只乃有義他並假借以語辭之類虛言難象故因音而借焉右四十五音之借宮本宮室之宮商本商度之商角本頭角之角徴本徴召之徴羽本羽毛之羽右五三詩之借風本風蟲之風雅本烏鴉之鴉頌本顔容之容三詩五音皆聲也聲不可象並因音而借焉右三十日之借甲本戈甲乙本魚腸丙本魚尾丁本蠆尾戊本武也已本几也庚鬲也辛被罪也壬懷妊也癸草木實也右十十二辰之借子人之子也丑手之械也寅臏也卯牖也辰未詳本義巳蛇屬也午未詳本義未木之滋也申持簡也酉卣也戌與戊戚同意亥豕屬也十日十二辰惟己亥有義他並假借以日辰之類皆虛意難象故因音而借焉右十二方言之借鮦之為鮦音胄鮦陽縣名歜之為歜上音觸下徂感切昌歜即昌蒲也覃之為覃上如字下音剡詩以我覃耜羮之為羮上更字下音郎楚地名咎之為咎上如字下音臯臯陶字亦如此榖之為榖奴走切楚人謂乳榖枹之為枹上必茅切下音稃鼓枹也敦之為敦音燾禮每敦一几為敦音凋敦弓此皆非由音義而借蓋因方言之異故不易其字右九雙音並義不為假借陶也陶冶之陶陶也臯陶之陶雕也都聊切隼類雕也陟交切鶻雕鴝鵒駣也徒刀切馬四嵗曰駣駣也他雕切馬三嵗曰駣鷂也以照切鷂也音遙雉也杷也補訝切枋也杷也白加切收麥器榮也永兵切桐也榮也音營屋榮枸也音茍枳把枸也音矩枳枸椹也知林切禮射甲革椹質椹也徐甚切桑實校也古孝切木囚也校也户教切木闌也幅也布帛之劑幅也音逼行縢也幓也所銜切旗幅幓也七消切頭括髮袒也音但袒裼也袒也張彥切后六服有袒衣被也部委切寢衣也被也普義切春秋傳翠被豹舄襟也居吟切領也襟也其鴆切結也褎也音袖袂也褎也由救切盛服也凡此之類並雙音並義不為假借者也右三十凡假借類計五百九十八六書總計象形類計六百八指事類計百七會意類計七百四十轉注類計三百七十二諧聲類計二萬一千八百十假借類計五百九十八凡六書總計二萬四千二百三十五通志卷三十四
