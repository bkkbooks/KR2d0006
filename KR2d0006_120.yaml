body:
  text: 通志卷一百六宋右迪功郎鄭樵漁仲撰列傳第十九後漢耿弇弟國弟夔國子秉恭秉國弟子銚期王霸祭遵從弟彤任光子隗李忠萬修邳彤劉植耿純朱祐景丹王梁杜茂馬成劉隆傅俊堅鐔馬武竇融弟子固孫曾孫憲元章馬援子廖嚴子防孫兄子族稜耿弇字伯昭扶風茂陵人也其先武帝時以吏二千石自巨鹿徙焉父况字俠遊以眀經為郎與王莽從弟伋共學老子於安邱先生先生姓安邱名望之字仲都京兆長陵人成帝欲見之辭不肯隱於醫巫後為朔調連率弇少好學習父業常見郡尉試騎士建旗鼓隸馳射由是好將帥之事及王莽敗更始立諸將略地者前後多擅威權輒改易守令况自以莽之所置懷不自安時弇年二十一乃辭况奉奏詣更始因齎貢獻以求自固之宜至宋子會王郎詐稱成帝子輿起兵邯鄲弇從吏孫倉衛包於道共謀曰劉子輿成帝正統捨此不歸逺行安之弇按劒曰子輿敝賊卒為降虜耳我至長安與國家陳漁陽上谷兵馬之用還出太原代郡反覆數十日歸發突騎以轔烏合之衆如摧枯折腐耳觀公等不識去就族滅不久也倉包不從遂亡降王郎弇道聞光武在盧奴乃馳北上謁光武留署門下吏弇因説護軍朱祐求歸發兵以定邯鄲光武笑曰小兒曺乃有大意哉因數召見加恩慰弇因從光武北至薊聞邯鄲兵方到光武將欲南歸召官屬計議弇曰今兵從南來不可南行漁洋太守彭寵公之邑人上谷太守即弇父也發此兩郡控弦萬騎邯鄲不足慮也光武官屬腹心皆不肯曰死尚南首奈何北行入囊中光武指弇曰是我北道主人也會薊中亂光武遂南馳官屬各分散弇走昌平就况因説况使冦恂東約彭寵各發突騎二千匹步兵千人弇與景丹冦恂及漁陽兵合軍而南所過擊斬王郎大將九卿校尉以下四百餘級得印綬百二十五節二斬首三萬級定涿郡中山巨鹿清河河間凡二十二縣遂及光武於廣阿是時光武方攻王郎傳言二郡兵為邯鄲來衆皆恐既而悉詣營上謁光武見弇等説曰當與漁陽上谷士大夫共此大功乃皆以為偏將軍使還領其兵加况大將軍興義侯得自置偏裨弇等遂從拔邯鄲時更始徴代郡太守趙永而况勸永不應召令詣于光武光武遣永復郡永北還而代令張曄據城反畔乃招迎胸奴烏桓以為援助光武以弇弟舒為復胡將軍使擊曄破之永乃得復郡時五校賊二十餘萬北冦上谷况與舒連擊破之賊皆敗走更始見光武威聲日盛君臣疑慮乃遣使立光武為蕭王令罷兵與諸將有功者還長安遣苗曾為幽州牧韋順為上谷太守蔡充為漁陽太守並北之郡時光武居邯鄲宫晝臥溫眀殿弇入造牀下請間因説曰今更始失政君臣淫亂諸將擅命於畿內貴戚縱橫於都內天子之命不出城門所在牧守輒自遷易百姓不知所從士人莫敢自安虜掠財物劫掠婦女懷金玉者至不生歸元元叩心更思莽朝又銅馬赤眉之屬數十輩輩數十百萬聖公不能辦也其敗不久公首事南陽破百萬之軍今定河北據天府之地以義征伐發號響應天下可傳檄而定天下至重不可令他姓得之聞使者從西方來欲罷兵不可從也今吏士死亡者多弇願歸幽州益發其精兵以集大計光武大説乃拜弇為大將軍與吳漢北發幽州十郡兵弇到上谷收韋順蔡充斬之漢亦誅苗曾於是悉發幽州兵引而南從光武擊破銅馬髙湖赤眉青犢又追尤來大槍五幡於元氏弇常將精騎為軍鋒輒破走之光武乘勝戰慎水上虜危急殊死戰時軍士疲敝遂大敗奔還壁范陽數日乃振賊亦退去從追至容城小廣陽安次連戰破之光武還薊復遣弇與吳漢景丹蓋延朱祐邳彤耿純劉植岑彭祭遵堅鐔王霸陳俊馬武十三將軍追賊至潞東及平谷再戰斬首萬三千餘級遂窮追於右北平無終土垠之間至浚靡而還賊散入遼西遼東或為烏桓貊人所鈔擊略盡光武即位拜弇為建威大將軍與驃騎大將軍景丹強努將軍陳俊攻厭新賊於敖倉皆破降之建武二年更封好畤侯食好畤美陽二縣三年延岑自武關攻南陽下數城穰人杜𢎞率其衆以從岑弇與岑等戰於穰大破之斬首三千餘級生獲其將士五千餘人得印綬三百杜𢎞降岑與數騎遁走東陽弇從幸舂陵因見自請北收上谷兵未發者定彭寵於漁陽取張豐於涿郡還收富平獲索東攻張步以平齊地帝壯其意乃許之四年詔弇進攻漁陽弇以父據上谷本與彭寵同功又兄弟無在京師者自疑不敢獨進上書求詣洛陽詔報曰將軍出身舉宗為國所向陷陳功效尤著何嫌何疑而欲求徴且與王常共屯涿郡勉思方略况聞弇求徴亦不自安遺舒弟國入侍帝善之進封况為隃麋侯乃命弇與建義大將軍朱祐漢忠將軍王常等擊望都故安西山賊十餘營皆破之時征虜將軍祭遵屯良鄉驍騎將軍劉喜屯陽鄉以拒彭寵寵遣弟純將胸奴二千餘騎寵自引兵數萬分為兩道以擊遵喜胡騎經軍都舒襲破其衆斬胸奴兩王寵乃退走况復與舒攻寵取軍都五年寵死天子嘉况功使光祿大夫持節迎况賜甲第奉朝請封牟平侯遣弇與吳漢擊富平獲索賊於西原大破之降者四萬餘人因詔弇進討張步弇悉收集降卒結部曲置將吏率騎都尉劉歆泰山太守陳俊引兵而東從朝陽橋濟河以渡張步聞之乃使其大將軍費邑軍歷下又分兵屯祝阿别於泰山鍾城列營數十以待弇弇渡河先擊祝阿自旦攻城未中而拔之故開圍一角令其衆得奔歸鍾城鍾城人聞祝阿已潰大恐遂空壁亡去費邑分遣弟敢守巨里弇進兵先脅巨里使多伐木揚言以填塞坑塹數日有降者言邑聞弇欲攻巨里謀來救之弇乃嚴令軍中趣修攻具宣勑諸部後三日當悉力攻巨里城隂緩生口令得亡歸歸者以告邑邑至日果自將精兵三萬餘人來救之弇喜謂諸將曰吾所以修攻具者欲誘致邑耳今來適其所求也即分三千人守巨里自引精兵上岡阪乘髙合戰大破之臨陳斬邑既而收首級以示巨里城中城中凶懼費敢悉衆亡歸張步弇復收其積聚縱兵擊諸未下者平四十餘營遂定濟南時張步都劇使其弟藍將精兵二萬守西安諸郡太守合萬餘人守去淄相去四十里弇進軍晝中居二城之間弇視西安城小而堅且藍兵又精臨淄名雖大而實易攻乃勑諸校會後五日攻西安藍聞之晨夜警守至期夜半弇勑諸將皆蓐食會明至臨淄城護軍荀梁等爭之以為宜速攻西安弇曰不然西安聞吾欲攻之日夜為備臨淄出不意而至必驚擾吾攻之一日必拔拔臨淄即西安孤藍與步隔絶必復亡去所謂擊一而得二者也若先攻西安不卒下頓兵堅城死傷必多縱能拔之藍引軍還奔臨淄并兵合勢觀人虛實吾深入敵地後無轉輸旬月之間不戰而困諸君之言未見其宜遂攻臨淄半日拔之入據其城張藍聞懼遂將其衆亡歸劇弇乃令軍中毋得妄掠劇下須張步至乃取之以激怒步步聞大笑曰以尤來大彤十餘萬衆吾皆即其營而破之今大耿兵少於彼又皆疲勞足可摧乎乃與三弟藍𢎞夀及故大彤渠帥重異等兵號二十萬至臨淄大城東將攻弇弇先出淄水上與重異遇突騎欲縱弇恐挫其鋒令步不敢進故示弱以盛其氣乃引歸小城陳兵於內步氣盛直攻弇營與劉歆等合戰弇升王宫壞臺望之視歆等鋒交乃自引精兵以橫突步陳於東城下大破之飛矢中弇股弇以佩刀截之左右無知之者至暮罷眀旦復勒兵出是時帝在魯聞弇為步所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上來弇曰乘輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父邪乃出兵大戰自旦及昏復大破之殺傷無數城外溝塹皆滿弇知步困將退豫置左右翼為伏以待之人定時步果引去伏兵起縱擊追至巨昧水上八九十里僵尸相屬收得輜重二千餘兩步還劇兄弟各分兵散去後數日車駕至臨淄自勞軍羣臣大會帝謂弇曰昔韓信破歷下以開基今將軍攻祝阿以發迹此皆齊之西界功足相方而韓信襲擊已降將軍獨拔勍敵其功乃難於信也又田橫烹酈生及田橫降髙帝詔衛尉不聼為仇張步前亦殺伏隆若步來歸命吾當詔大司徒釋其怨又事尤相類也將軍前在南陽建此大策常以為落落難合有志者事竟成也弇因復追步步奔平夀乃肉袒負斧鑕於軍門弇傳步詣行在所而勒兵入據其城樹十二郡旗鼓令步兵各以郡人詣旗下衆尚十餘萬輜重七千餘兩皆罷遣歸鄉里弇復引兵至城陽降五校餘黨齊地悉平振旅還京師六年西拒隗囂屯兵於漆八年從上隴眀年與中郎將來歙分部徇安定北地諸營堡皆下之弇凡所平郡四十六屠城三百未嘗挫折十二年况疾病乘輿數至臨幸復以國弟廣舉並為中郎將弇兄弟六人皆垂青紫省侍醫藥當代以為榮及况卒諡烈侯少子霸襲况爵十三年增弇户邑上大將軍印綬罷以列侯奉朝請每有四方異議輒召入問籌策年五十六永平元年卒諡愍侯子忠嗣忠以騎都尉擊胸奴於天山有功忠卒子馮嗣馮卒子良嗣一名無禁延光中尚安帝妹濮陽長公主位至侍中良卒子協嗣隃麋侯霸卒子文金嗣文金卒子喜嗣喜卒子顯嗣為羽林左監顯卒子援嗣尚桓帝妹長社公主為河陽太守後曹操誅耿氏惟援孫𢎞存焉牟平侯舒卒子襲嗣尚顯宗女隆慮公主襲卒子寶嗣寶女弟為清河孝王妃及安帝立尊孝王母為孝德皇后以妃為甘園大貴人帝以寶元舅之重使監羽林左車騎位至大將軍而附事內寵與中常侍樊豐帝乳母王聖等請廢皇太子為濟隂王及排陷太尉楊震議者怨之寶弟子承襲公主爵為隆慮侯位至侍中安帝崩閻太后以寶等阿附嬖幸共為不道策免寶及承皆貶爵為亭侯遣就國寶於道自殺國除大貴人數為耿氏請陽嘉三年順帝遂詔封寶子箕牟平侯為侍中以恆為陽亭侯承為羽林中郎將其後貴人薨大將軍梁冀從承求貴人珍玩不能得冀怒風有司奪其封承惶恐遂亡匿於穰數年冀推迹得之乃并族其家十餘人弇弟國字叔慮建武四年初入侍光武拜為黃門侍郎應對左右帝以為能遷射聲校尉七年射聲官罷拜駙馬都尉父况卒國於次當嗣上疏以先侯愛少子霸固自陳讓有詔許焉後歷頓邱陽翟上蔡令所在吏人稱之徴為五官中郎將是時烏桓鮮卑屢冦外境國有籌策數言邊事帝器之及胸奴薁鞬日逐王比自立為呼韓邪單于欵塞稱藩願扞禦北虜事下公卿議者皆以為天下初定中國空虛夷狄情偽難知不可許國獨曰臣以為宜如孝宣故事受之令東扞鮮卑北拒胸奴率厲四夷完復邊郡使塞下無晏開之警萬世有安寧之策也帝從其議遂立比為南單于由是烏桓鮮卑保塞自守北虜逺遁中國少事二十七年代馮勤為大司馬又上言宜置度遼將軍左右校尉屯兵原以防逃亡永平元年卒官顯宗追思國言後遂置度遼將軍左右校尉如其議焉國二子秉夔秉字伯初有偉體腰帶八圍博通書記能説司馬兵法尤好將帥之略以父任為郎數上言兵事常以中國虛費邊陲不寧其患敷在胸奴以戰去戰盛王之道顯宗既有志北伐隂然其言永平中召詣省闥問前後所上便宜方略拜謁者僕射遂見親幸每公鄉會議常引秉上殿訪以邊事多簡帝心十五年拜駙馬都尉十六年以騎都尉秦彭為副與奉車都尉竇固等俱伐胸奴虜皆奔走不戰而還十七年夏詔秉與固合兵萬四千騎復出白山擊車師車師有後王前王前王即後王之子其廷相去五百餘里固以後王道逺山谷深士卒寒苦欲攻前王秉議先赴後王以為并力根本則前王自服固計未決秉奮身而起曰請行前乃上馬引兵北入衆軍不得已遂進並縱兵抄掠斬首數千級收馬牛十餘萬頭後王安得震怖從數百騎出迎秉而固司馬蘇安欲全功歸固即馳謂安得曰漢貴將獨有奉車都尉天子姊壻爵為通侯當先降之安得乃還更令其諸將迎秉秉大怒被甲上馬麾其精騎徑造固壁言曰車師降訖今不至請往梟其首固大驚曰且止將敗事秉厲聲曰受降如受敵遂馳赴之安得惶恐出門脫帽抱馬足降秉將以詣固其前王亦來歸命遂定車師而還眀年秋肅宗即位拜秉征西將軍遣案行涼州邊境勞賜保塞羌胡進屯酒泉置戊巳校尉建初元年拜度遼將軍視事七年胸奴懷其恩信徴為執金吾甚見親重帝每巡郡國及幸宫觀秉常領禁兵宿衛左右除三子為郎章和二年復拜征西將軍副車騎將軍竇憲擊北胸奴大破之事並見憲傳封秉美陽侯邑三千户秉性勇壯而簡易於事軍行常自被甲在前休止不結營部然遠斥堠明要誓有警軍陳立成士卒皆樂為死永元二年代桓虞為光祿勳眀年夏卒時年五十餘賜以朱棺玉衣將作大匠穿冢假鼓吹五營騎士三百餘人送葬諡曰桓侯胸奴聞秉卒舉國號哭或至梨面流血梨即𠢐字古通用𠢐割也力利反長子沖嗣及竇憲敗以秉竇氏黨國除沖官至漢陽太守曾孫紀少有美名辟公府曹操甚敬異之稍遷少府紀以操將篡漢建安二十三年與太醫令吉平丞相司直韋况晃曄謀起兵誅操不克夷三族于時衣冠盛門坐紀罹禍滅者衆矣夔字定公少有氣決永元初為車騎將軍竇憲假司馬北擊胸奴轉車騎都尉二年憲復出河西以夔為大將軍左校尉將精騎八百出居延塞直奔北單于廷於金微山斬閼氏名王已下五千餘級單于與數騎脫亡盡獲其胸奴珍寶財畜去塞五千餘里而還自漢出師所未嘗至也乃封夔栗邑侯會北單于弟左鹿蠡王於除鞬自立為單于衆八部二萬餘人來居蒲類海上遣使款塞以夔為中郎將持節衛護之及竇憲敗夔亦免官奪爵土後復為長水校尉拜五原太守遷遼東太守元興元年貊人冦郡界夔追斬其渠帥永初三年南單于檀反畔使夔率鮮卑及諸郡兵屯鴈門與車騎將軍何熙共擊之熙推夔為先鋒而遣其司馬耿溥劉祉將二千人與夔俱進到屬國故城單于遣薁鞬日逐王三千餘人遮漢兵夔自擊其左右鮮卑攻其右虜遂敗走追斬千餘級殺其名王六人獲穹廬車重千餘兩馬畜生口甚衆鮮卑馬多羸病遂畔出塞夔不能獨進以不窮追左轉雲中太守後遷行度遼將軍事夔勇而有氣數侵陵胸奴中郎將鄭戬元初元年坐徴下獄以減死論笞二百建光中復拜度遼將軍時鮮卑攻殺雲中太守成嚴圍烏桓校尉徐常於馬城夔與幽州刺史龎參救之追虜出塞而還後坐法免卒於家國弟廣廣子恭字伯宗少孤慷慨多大略有將帥才永平十七年冬騎都尉劉張出擊車師請恭為司馬與奉車都尉竇固及從弟駙馬都尉秉破降之始置西域都護戊巳校尉乃以恭為戊巳校尉屯後王部金蒲城謁者關寵為戊己校尉屯前王栁中城屯各置數百人恭至部移檄烏孫示漢威德大昆彌已下皆歡喜遣使獻名馬及奉宣帝時所賜公主博具願遣子入侍恭乃發使齎金帛迎其侍子眀年三月北單于遣左鹿蠡王二萬騎擊車師恭遣司馬將兵三百人救之道逢胸奴騎多皆為所沒胸奴遂破殺後王安得而攻金蒲城恭乘城搏戰以毒藥傅矢傳語胸奴曰漢家箭神其中瘡者必有異因發強努射之虜中矢者視瘡皆沸遂大驚會天暴風雨隨雨擊之殺傷甚衆胸奴震怖相謂曰漢兵神真可畏也遂解去恭以疏勒城傍有澗水可固五月乃引兵據之七月胸奴復來攻恭恭募先登數千人直馳之胡騎散走胸奴遂於城下擁絶澗水恭於城中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之恭仰天嘆曰聞昔二師將軍拔佩刀刺山飛泉涌出今漢德神眀豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出衆皆稱萬嵗乃令士卒揚水以示虜虜出不意以為神眀遂引兵去時焉耆龜兹攻殁都護陳睦北虜亦圍關寵於栁中會顯宗崩救兵不至車師復叛與胸奴共攻恭恭厲士衆擊走之後王夫人先世漢人常私以虜情告恭又給以糧餉數月食盡窮困乃煮鎧努食其筋革恭與士推誠同死生故皆無二心而稍稍死亡餘數十人單于知恭困必欲降之復遣使招恭曰若降者當封為白屋王妻以女子恭乃誘其使上城手擊殺之炙諸城上虜官屬望見號哭而去單于大怒更益兵圍恭不能下初關寵上書求救時肅宗新即位詔公卿會議司空第五倫謂不宜救司徒鮑昱曰今使人於危急之地急而棄之外則縱蠻夷之暴內則傷死難之臣誠令權時後無邊事可也胸奴如復犯塞為冦陛下將何以使將又二部兵人裁各數十胸奴圍之歷旬不下是其寡弱盡力之效也可令敦煌酒泉太守各將精騎二千多其幡幟倍道兼行以赴其急胸奴疲極之兵必不敢當四十日間足還入塞帝然之乃遣征西將軍耿秉屯酒泉行太守事遣秦彭與謁者王蒙皇甫援發張掖酒泉敦煌三郡及鄯善兵合七千餘人建初元年正月會栁中擊車師攻交河城斬首三千八百級獲生口三千餘人駝驢馬牛羊三萬七千頭北虜驚走車師復降會關寵已殁蒙等聞之便欲引兵還先是恭遣軍吏范羌至敦煌迎兵士寒服羌因隨王蒙軍俱出塞羌固請迎恭諸將不敢前乃分兵二千人與羌從山北迎恭時遇大雪丈餘軍僅能至城中夜聞兵馬聲以為虜來大恐羌乃遙呼曰我范羌也漢遣軍迎校尉耳城中皆稱萬嵗開門共相持涕泣眀日遂相隨俱歸虜兵追之且戰且行吏士素飢困發疏勒時尚有二十六人隨路死殁三月至玉門惟餘十三人衣屨穿決形容枯稿中郎將鄭衆為恭已下洗沐昜衣冠上疏曰耿恭以單兵固守孤城當胸奴之衝對數萬之衆連月踰年心力困盡鑿山為井煮努為糧出於萬死無一生之望前後殺傷醜虜數千百計卒全忠勇不為大漢恥恭之節義古今未有宜蒙顯爵以厲將帥及恭至洛陽鮑昱奏恭節過蘇武宜蒙爵賞於是拜為騎都尉以恭司馬石修為雒陽市丞張封為雍營司馬軍吏范羌為共丞餘九人皆補羽林恭母先卒及還追行喪制有詔使五官中郎將齎牛酒釋服眀年遷長水校尉其秋金城隴西羌反恭上疏言方略詔召入問狀乃遣恭將五校士三千人副車騎將軍馬防討西羌恭屯枹罕數與羌接戰眀年秋燒當羌降防還京師恭留擊諸未服者首虜千餘人獲牛羊四萬餘頭勒姐燒何羌等十三種數萬人皆詣恭降初恭出隴西上言故安豐侯竇融昔在西州甚得羌胡腹心今大鴻臚固即其子孫前擊白山功冠三軍宜奉大使鎮撫涼部令車騎將軍防屯軍漢陽以為威重由是大忤於防及防還監營謁者李談承旨奏恭不憂軍事被詔怨望坐徴下獄免官歸本郡卒於家子溥為京兆虎牙都尉元初二年擊畔羌於丁奚城軍敗遂殁詔拜溥子宏曄並為郎曄字季遇順帝初為烏桓校尉時鮮卑冦緣邊殺代郡太守曄調烏桓及諸郡卒出塞討擊大破之鮮卑震怖數萬人詣遼東降自後頻出輒克獲威振北方遷度遼將軍耿氏自中興已後迄建安之末大將軍二人將軍九人卿十三人尚公主三人列侯十九人中郎將護羌校尉及刺史二千石數十百人遂與漢興衰云銚音姚期字次况潁川郟人也長八尺二寸容貌絶異矜嚴有威父猛為桂陽太守卒期服喪三年鄉里稱之光武略地潁川聞期志義召署賊曺掾從徇薊時王郎檄書至薊薊中起兵應郎光武趨駕出百姓聚觀喧呼滿道遮路不得行期騎馬奮戟瞋目大呼左右曰蹕與蹕同止行清道衆皆披靡及至城門門已閉攻之得出行至信都以期為裨將與傅寬呂晏俱屬鄧禹徇傍縣又發房子兵禹以期為能獨拜偏將軍授兵二千人寬晏各數百人還言其狀光武甚善之使期别徇真定宋子攻拔樂陽稿肥纍從擊王郎將兒宏劉奉於巨鹿下期先登陷陳手殺五十餘人被創中額攝幘復戰遂大破之王郎滅拜期虎牙大將軍乃因間説光武曰河北之地界接邊塞人習兵戰號為精勇今更始失政大統危殆海內無所歸往眀公據山河之固擁精鋭之衆以順萬民思漢之心則天下誰敢不從光武笑曰卿欲遂前蹕邪時銅馬賊數十萬衆入清陽博平期與諸將迎擊之連戰不利期乃更背水而戰所殺傷甚多會光武救至遂大破之追至館陶皆降之從擊青犢赤眉於射犬賊襲期輜重期還擊之手殺傷數十人身被三創而戰方力遂破走之光武即位封安成侯食邑五千户時檀鄉五樓賊入繁陽內黃又魏郡大姓數反覆而更始將卓京謀欲相率反鄴城帝以期為魏郡太守行大將軍事期發郡兵擊卓京破之斬首六百餘級京亡入山追斬其將校數十人獲京妻子進擊繁陽內黃復斬數百級郡界清平督盜賊李熊鄴中之豪而熊弟陸謀欲反城迎檀鄉賊或以告期期不應告者三四期乃召問熊熊叩頭首服願與老母俱就死期曰為吏儻不若為賊樂者可歸與母往就陸也使吏送出城熊行求得陸將詣鄴城西門陸不勝愧感自殺以謝期期嗟歎以禮葬之而還熊故職郡中服其威信建武五年行幸魏郡以期為太中大夫從還洛陽又拜衛尉期重於信義為將有所降下未嘗虜掠及在朝廷憂國愛主其有不得於心必犯顔諫諍帝嘗輕與期門近出前漢書武帝將出必與北地良家子期於殿門故曰期門期頓首車前曰臣聞古今之誡變生不意誠不願陛下數得微出帝為之回輿而還十年卒帝親臨襚斂贈以衛尉安成侯印綬諡曰忠侯子丹嗣復封丹弟統為建平侯後徙封丹葛陵侯丹卒子舒嗣舒卒子羽嗣羽卒子蔡嗣王霸字元伯潁川潁陽人也世好文法父為郡決曺掾霸亦少為獄吏常慨慷不樂吏職其父竒之遣西學長安及漢兵起光武過潁陽霸率賓客上謁曰將軍興義兵竊不自知量貪慕威德願充行伍光武曰夢想賢士共成功業豈有二哉遂從擊破王尋王邑於昆陽還休鄉里及光武為司隸校尉道過潁陽霸請其父願從父曰吾老矣不任軍旅汝往勉之霸從至洛陽及光武為大司馬以霸為功曺令史從度河北賓客從霸者數十人稍稍引去光武謂霸曰潁川從我者皆逝而子獨留努力疾風知徑草及王郎起光武在薊郎移檄購光武光武令霸市中募人將以擊郎市人皆大笑舉手邪揄之霸慚懅而還光武即南馳至下曲陽傳聞王郎兵在後從者皆恐及至滹沱河侯吏還白河水流澌無船不可濟官屬大懼光武令霸往視之霸恐驚衆欲且前阻水還即詭曰氷堅可渡官屬皆喜光武笑曰候吏果妄語也遂前比至河河氷亦合乃令霸護渡未畢數騎而氷解光武謂霸曰安吾衆得濟免者卿之力也霸謝曰此眀公至德神靈之祐雖武王白魚之應無以加此光武謂官屬曰王霸權以濟事殆天瑞也以為軍正爵關內侯既至信都發兵攻拔邯鄲霸追斬王郎得其璽綬封王鄉侯從平河北常與臧宫傅俊共營霸獨善撫士卒死者脫衣以斂之傷者躬親以養之光武即位以霸曉兵愛士可獨任拜偏將軍并將臧宮傅俊兵而以宫俊為騎都尉建武二年更封富波侯四年秋帝幸譙使霸與捕虜將軍馬武東討周建於垂惠蘇茂將五校兵四千餘人救建而先遣精騎遮擊馬武軍糧武往救之建從城中出兵夾擊武武恃霸之援戰不甚力為茂建所敗武軍奔過霸營大呼求救霸曰賊兵盛出必兩敗努力而已乃閉營堅壁軍吏皆爭之霸曰茂兵精鋭其衆又多吾吏士心恐而捕虜與吾相持兩軍不一此敗道也今閉營固守示不相援賊必乘勝輕進捕虜無救其戰自倍如此茂衆疲勞吾乘其弊乃可克也茂建果悉出攻武合戰良久霸軍中壯士路潤等數十人斷髮請戰霸知士心鋭乃開營後出精騎襲其背茂建前後受敵驚亂敗走霸武各歸營賊復聚衆挑戰霸堅臥不出方饗士作倡樂茂雨射營中中霸前酒樽安坐不動軍吏皆曰茂前日已破今易擊也霸曰不然蘇茂客兵逺來糧食不足故數挑戰以擊一切之勝今閉營休兵所謂不戰而屈人之兵善之善者也茂建既不得戰乃引還營其夜建兄子誦反閉城門拒之茂建遁去誦以城降五年春帝使太中大夫持節拜霸為討虜將軍六年屯田新安八年屯田函谷關擊榮陽中牟盜賊皆平之九年霸與吳漢及橫野大將軍王常建義大將軍朱祐破姦將軍侯進等五萬餘人擊盧芳將賈覽閔堪於髙桞胸奴遣騎助芳漢軍遇雨戰不利吳漢還洛陽令朱祐屯常山王常屯涿郡侯進屯漁洋璽書拜霸上谷太守領屯兵如故捕擊胡虜無拘郡界明年霸復與吳漢等四將軍六萬人出髙桞擊賈覽詔霸與漁陽太守陳欣將兵為諸軍鋒胸奴左南將軍將數千騎救覽霸等連戰於平城下破之追出塞斬首數百級霸及諸將還入鴈門與驃騎大將軍杜茂會攻盧芳將尹由於崞繁畤不克十三年增户邑更封向侯是時盧芳與胸奴烏桓連兵冦盜尤數緣邊愁苦詔霸將弛刑徒六千餘人與杜茂治飛狐道堆石布土築起亭障自代至平城三百餘里凡與胸奴烏桓大小數十百戰頗識邊事數上言宜與胸奴結和親又陳委輸可從溫水漕以省轉輸之勞事皆施行後南單于烏桓降服北邊無事霸在上谷二十餘嵗三十年定封淮陵侯永平二年以病免後數月卒子符嗣徙封車犬侯符卒子度嗣度尚顯宗女浚儀長公主為黃門郎度卒子歆嗣祭遵字弟孫潁川潁陽人也少好經書家富給而遵恭儉惡衣服喪母負土起墳常為部吏所侵結客殺之初縣中以其柔也既而皆憚焉及光武破王尋等還過潁陽遵以縣吏數進見光武愛其儀容署為門下史從征河北為軍市令舍中兒犯法遵格殺之光武怒命收遵時主簿陳副諌曰明公常欲衆軍整齊今遵奉法不避是教令所行也光武乃貰之以為刺姦將軍謂諸將曰當避祭遵吾舍中兒犯法尚殺之必不私諸卿也尋拜為偏將軍從平河北以功封列侯建武二年春拜征虜將軍定封潁陽侯與驃騎大將軍景丹建義大將軍朱祐漢忠將軍王常騎都尉王梁臧宫等入箕關南擊𢎞農厭新柏華蠻中賊弩中遵口洞出流血衆見遵傷稍引退遵呼叱止之士卒戰皆自倍遂大破之時新城蠻中山賊張滿屯結險隘為人害詔遵攻之遵絶其糧道滿數挑戰遵堅壁不出而厭新柏華餘賊復與滿合遂攻得霍陽聚遵乃分兵擊破降之眀年春張滿飢困城拔生獲之初滿祭祀天地自云當王既執嘆曰讖文誤我乃斬之夷其妻子遵引兵南擊鄧奉弟終於杜衍破之時涿郡太守張豐執使者舉兵反自稱無上大將軍與彭寵連兵四年遵與朱祐及建威大將軍耿弇驍騎將軍劉喜俱擊之遵兵先至急攻豐豐功曹孟肱公𢎞切執豐降初豐好方術有道士言豐當為天子以五綵囊裹石繫豐肘云石中有玉璽豐信之遂反既執當斬猶曰肘石有玉璽遵為椎破之豐乃知被詐仰天歎曰當死無所恨諸將皆引還遵受詔留屯良鄉拒彭寵因遣護軍傅元襲擊寵將李豪於潞大破之斬首千餘級相拒嵗餘數挫其鋒黨與多降者及寵死遵進定其地六年春詔遵與建威大將軍耿弇虎牙大將軍蓋延漢忠將軍王常捕虜將軍馬武驍騎將軍劉歆武威將軍劉尚等從天水伐公孫述師次長安時車駕亦至而隗囂不欲漢兵上隴辭説解故帝召諸將議皆曰可且延囂日月之期益封其將帥以消散之遵曰囂挾姦久矣今若按甲引時則使其詐謀益深而蜀警增倍固不如遂進帝從之乃遣遵為前行隗囂使其將王元拒隴坻遵進擊破之追至新關及諸將到與囂戰並敗引退下隴乃詔遵軍汧耿弇軍漆征西大將軍馮異軍栒邑大司馬吳漢等還屯長安自是後遵數挫隗囂事已見馮異傳八年秋復從車駕上隴及囂破帝東歸過汧幸遵營勞饗士卒作黃門武樂良夜乃罷時遵有疾詔賜重茵覆以御蓋復令進屯隴下及公孫述遣兵救隗囂吳漢耿弇等悉奔還遵獨留不卻九年春卒於軍遵為人廉約小心克己奉公賞賜輒盡與士卒家無私財身衣韋袴布被夫人裳不加緣帝以是重焉及卒愍悼之尤甚遵喪至河南縣詔遣百官先會喪所車駕素服臨哭哀慟還幸城門過其車騎涕泣不能已喪禮成復親祠以太牢如宣帝臨霍光故事詔大長秋謁者河南尹護喪事大司農給費博士范升上疏追稱遵曰臣聞先王崇政尊美屏惡昔髙祖大聖深見逺慮班爵割地與下分功著録勳臣頌其德美生則寵以殊禮奏事不名入門不趨死則疇其爵邑世無絶嗣丹書鐡劵傳於無窮斯誠大漢厚下安人長久之德所以纍世十餘歷載數百廢而復興絶而復續者也陛下以至德受命先眀漢道褒序輔佐封賞功臣同符祖宗征虜將軍潁陽侯遵不幸早薨陛下仁恩為之感傷逺迎河南惻怛之慟形於聖躬喪事用度仰給縣官重賜妻子不可勝數送死有以加生厚亡有以過存矯俗厲化卓如日月古者臣疾君視臣卒君弔德之厚者也陵遲已來久矣及至陛下復興斯禮羣下感動莫不自勵臣竊見遵修行積善竭忠於國北平漁陽西拒隴蜀先登坻上深取略陽衆兵既退獨守衝難制御士心不越法度所在吏人不知有軍清名聞於海內廉白著於當世所得賞賜輒盡與吏士身無良衣家無私財同産兄午以遵無子娶妾送之遵乃使人逆而不受自以身任於國不敢圖生慮繼嗣之計臨死遺誡牛車載喪薄葬洛陽問以家事終無所言遵為將軍取士皆用儒術對酒設樂必雅歌投壺又建為孔子立後奏置五經大夫雖在軍旅不忘俎豆可為好禮悅樂守死善道者也禮生有爵死有諡爵以殊尊卑諡以明善惡臣愚以為宜因遵薨論敘衆功詳案諡法以禮成之顯章國家篤古之制為後嗣法帝乃下升章以示公卿至葬車駕復臨贈以將軍侯印綬朱輪容車介士軍陳送葬諡曰成侯既葬車駕復臨其墳存見夫人室家其後會朝帝每嘆曰安得憂國奉公之臣如祭征虜者乎遵之見思如此無子國除兄午官至酒泉太守從弟彤字次孫早孤以至孝見稱遇天下亂野無煙火而獨在冢側每賊過見其尚幼而有志節皆竒而哀之光武初以遵故拜彤為黃門侍郎常在左右及遵卒無子帝追傷之以彤為偃師長令近遵墳墓四時奉祠之彤有權略視事五嵗縣無盜賊課為第一遷襄賁音肥令時天下郡國尚未悉平襄賁盜賊白日公行彤至誅破姦猾殄其支黨數年襄賁政清璽書增秩一等賜縑百匹當是時胸奴鮮卑及赤山烏桓連和強盛數入塞殺掠吏人朝廷以為憂益增緣邊兵郡有數千人又遣諸將分屯障塞帝以彤為能建武十七年拜遼東太守至則厲兵馬廣斥堠彤有力能貫三百斤弓虜每犯塞常為士卒鋒數破走之二十一年鮮卑萬餘騎冦遼東彤率數千人迎擊之自被甲陷陳虜大奔投水死者過半遂窮追出塞虜急皆棄兵祼身散走斬首三千餘級獲馬數千匹自是鮮卑震怖畏彤不敢復窺塞彤以三虜連和卒為邊害二十五年乃使招呼鮮卑示以財利其大都護偏何遣使奉獻願得歸化彤慰納賞賜稍復親附其異種滿離髙句驪之屬遂駱驛欵塞上貂裘好馬帝輒倍其賞賜其後偏何邑落諸豪並歸義願自效彤曰審欲立功當歸擊胸奴斬送頭首乃可信耳偏何等仰天指心曰必自效即擊胸奴左伊秩訾部斬首二千餘級持頭詣郡其後嵗嵗相攻輒送首級受賞賜自是胸奴衰弱邊無冦警鮮卑烏桓並入朝貢彤為人質厚重毅體貌絶衆撫夷狄以恩信皆畏而愛之故得其死力初赤山烏桓數犯上谷為邊害詔書投購賞功責州郡不能禁彤乃率厲偏何遣往討之永平元年偏何擊破赤山斬其魁帥持首詣彤塞外震讋彤之威聲震於北方西自武威東盡元莵及樂浪胡夷皆來內附野無風塵乃悉罷緣邊屯兵十二年徴為太僕彤在遼東幾三十年衣無兼副顯宗既嘉其功又美彤清約拜日賜錢百萬馬三匹衣被刀劒下至居室什物大小無不悉備帝每見彤常歎息以為可屬以重任後從東巡狩過魯坐孔子講堂顧指子路室謂左右曰此太僕之室太僕吾之禦侮也十六年使彤將萬餘騎與南單于左賢王信伐北胸奴期至涿邪山信初有嫌於彤行至髙闕塞九百餘里得小山乃妄言以為涿邪山彤到不見虜而還坐逗遛畏懦下獄免彤性沉毅內重自恨見詐無功出獄數日嘔血死臨終謂其子曰吾蒙國厚恩奉使不稱微績不立身死慚恨義不可以無功受賞死後若悉簿上所得賜物身自詣兵屯效死前行以副吾心既卒其子逢上疏具陳遺言帝雅重彤方更任用聞之大驚召問逢疾狀嗟歎者良久焉烏桓鮮卑追思彤無已每朝賀京師常過冢拜謁仰天號泣乃去遼東吏人為立祠四時奉祭焉彤既葬子參遂詣奉車都尉竇固從軍擊車師有功稍遷遼東太守永元中鮮卑入郡界參坐沮敗下獄死彤子孫多為邊吏者皆有名稱任光字伯卿南陽宛人也少忠厚為鄉里所愛初為鄉嗇夫郡縣吏漢兵至宛軍人見光冠服鮮明令解衣將殺而奪之會光祿勳劉賜適至視光容貌長者乃救全之光因率黨與從賜為安集掾拜偏將軍與世祖破王尋王邑更始至洛陽以光為信都太守及王郎起郡國皆降之光獨不肯遂與都尉李忠令萬修功曹阮況五官掾郭唐等同心固守廷掾持王郎檄詣府白光光斬之於市以徇百姓發精兵四千人城守更始二年春世祖自薊還狼狽不知所向傳聞信都獨為漢拒邯鄲即馳赴之光等孤城獨守恐不能全聞世祖至大喜吏民皆稱萬嵗即時開門與李忠萬修率官屬迎謁世祖入傳舍謂光曰伯卿今勢力虛弱欲俱入城頭子路力子都兵中何如邪光曰不可世祖曰卿兵少如何光曰可募發奔命出攻傍縣若不降者恣聼掠之民貪財物則兵可招而致也世祖從之拜光為左大將軍封武成侯留南陽宗廣領信都太守事使光將兵從光乃多作檄文曰大司馬劉公將城頭子路力子都兵百萬衆從東方來擊諸反虜遣騎馳至巨鹿界中吏民得檄轉相告語光武遂與光等投暮入堂陽界使騎各持炬火彌滿澤中光焰燭天地舉城莫不震驚惶怖其夜即降旬日之間兵衆大盛因攻破城邑遂屠邯鄲乃遣光歸郡城頭子路者東平人姓爰名曾字子路與肥城劉詡起兵盧城頭故號其兵為城頭子路曾自稱都從事詡稱校三老寇掠河濟間衆至二十餘萬更始立曾遣使降拜曾東萊郡太守詡濟南太守皆行大將軍事是嵗曾為其將所殺衆推詡為主更始封詡助國侯令罷兵歸本郡力子都者東海人也起兵鄉里鈔擊徐兖界衆有六七萬更始立遣使降拜子都徐州牧為其部曲所殺餘黨復相聚與諸賊會於檀鄉因號為檀鄉檀鄉渠帥董次仲始起茌平遂渡河入魏郡清河與五校合衆十餘萬建武元年世祖入洛陽遣大司馬吳漢等擊檀鄉明年春大破降之是嵗更封光阿陵侯食邑萬户五年徴詣京師奉朝請其冬卒子隗嗣後阮況為南陽太守郭唐至河南尹皆有能名隗字仲和少好黃老清靜寡欲所得奉秩常以賑恤宗族收養孤寡顯宗聞之擢奉朝請遷羽林左監虎賁中郎將長水校尉肅宗即位雅相敬愛數稱其行以為將作大匠將作大匠自建武以來常謁者兼之至隗乃置真焉建初五年遷太僕八年代竇固為光祿勳所歷皆有稱章和元年拜司空隗義行內修不求名譽而以沉正見重於世和帝即位大將軍竇憲秉權専作威福內外朝臣莫不震懾時憲擊胸奴國用勞費隗奏議徴憲還前後十上獨與司徒袁安同心畢力持重處正鯁言直議無所回隱語在袁安傳永元四年薨子屯嗣帝追思隗忠擢屯為步兵校尉徙封西陽侯屯卒子勝嗣勝卒子世嗣徙封北鄉侯李忠字仲都東萊黃人也父為髙密都尉忠元始中以父任為郎署中數十人忠獨以好禮修整稱王莽時為新博屬長郡中咸敬信之更始立使使者行郡國即拜忠都尉官忠遂與任光同奉世祖以為右大將軍封武固侯時世祖自解所佩綬以帶忠因從攻下屬縣至苦陘世祖會諸將問所得財物惟忠獨無所掠世祖曰我欲特賜李忠諸將得無望乎即以所乘大驪馬及繡被衣物賜之進圍巨鹿未下王郎遣將攻信都信都大姓馬寵等開城內之收太守宗廣及忠母妻而令親屬招呼忠時寵弟從忠為校尉忠即時責數以背恩反城因格殺之諸將皆驚曰家屬在人手中殺其弟何猛也忠曰若縱賊不誅則二心也世祖聞而美之謂忠曰今吾兵已成矣將軍可歸救老母妻子宜自募吏民能得家屬者賜錢千萬來從我取忠曰蒙眀公大恩思得效命誠不敢內顧宗親世祖乃使任光將兵救信都光兵於道散降王郎無功而還會更始遣將攻破信都忠家屬得全世祖因使忠還行太守事收郡中大姓附邯鄲者誅殺數百人及任光歸郡忠乃還復都尉建武二年更封中水侯食邑三千戶其年徴拜五官中郎將從平龐萌董憲等六年遷丹陽太守是時海內新定南方海濱江淮多擁兵據土忠到郡招懷降附其不服者悉誅之旬月皆平忠以丹陽越俗不好學嫁娶禮儀衰於中國乃為起學校習禮容春秋鄉飲選用眀經郡中向慕之墾田增多三嵗間流民占著者五萬餘口十四年三公奏課為天下第一遷豫章太守病去官徴詣京師十九年卒子威嗣威卒子純嗣永平九年坐母殺純叔父國除永初七年鄧太后復封純琴亭侯純卒子廣嗣萬修字君遊扶風茂陵人也更始時為信都令與太守任光都尉李忠共城守迎世祖拜為偏將軍封造義侯及破邯鄲拜右將軍從平河北建武二年更封槐里侯與揚化將軍堅鐔俱擊南陽未克而病卒于軍子普嗣徙封泫氏侯普卒子親嗣徙封扶栁侯親卒無子國除永初七年鄧太后紹封修曾孫豐為曲平亭侯豐卒子熾嗣永建元年熾卒無子國除延熹二年桓帝紹封修元孫恭為門德亭侯邳彤字偉君信都人也父吉為遼西太守彤初為王莽和成卒正世祖徇河北至下曲陽彤舉城降復以為太守留止數日世祖北至薊會王郎兵起使其將徇地所到縣莫不奉迎唯和成信都堅守不下彤聞世祖從薊還失軍欲至信都乃先使五官掾張萬督郵尹綏選精騎二千餘匹緣路迎世祖軍彤尋與世祖會信都世祖雖得二郡之助而兵衆未合議者多言可因信都兵自送西還長安彤廷對曰議者之言皆非也吏民謳吟思漢久矣故更始舉尊號而天下響應三輔清宫除道以迎之一夫荷戟大呼則千里之將無不捐城逃遁虜伏請降自古以來亦未有感物動民其如此者也又卜者王郎假名因勢驅集烏合之衆遂震燕趙之地况眀公奮二郡之兵揚嚮應之威以攻則何城不克以戰則何軍不服今釋此而歸豈徒空失河北必更驚動三輔墮損威重非計之得者也若眀公無復征戰之意則信都之兵猶難會也何者眀公既西則邯鄲城民不肯捐父母背城主而千里送公其離散亡逃可必也世祖善其言而止即日拜彤為後大將軍和成太守如故使將兵居前北至堂陽堂陽已反屬王郎彤使張萬尹綏先曉譬吏民世祖夜至即開門出迎引兵擊破白奢賊於中山自此常從戰攻信都復反為王郎郎所置信都王捕繫彤父弟及妻子使為手書呼彤曰降者封爵不降族滅彤涕泣報曰事君者不得顧家彤親屬所以至今得安於信都者劉公之恩也公方爭國事彤不得復念私也會更始所遣將攻拔信都王郎兵敗走彤家屬得免及拔邯鄲封武義侯建武元年更封靈夀侯行大司空事帝入洛陽拜彤太常月餘日轉少府是年免復為左曹侍中常從征伐六年就國彤卒子湯嗣九年徙封樂陵侯十九年湯卒子某嗣無子國除元初元年鄧太后紹封彤孫音為平亭侯音卒子柴嗣初張萬尹綏與彤俱迎世祖皆拜偏將軍亦從征伐張萬封重平侯綏封平臺侯劉植字伯先巨鹿昌城人也王郎起植與弟喜從兄歆率宗黨賓客聚兵數千人據昌城聞世祖從薊還乃開門迎世祖以植為驍騎將軍喜歆偏將軍皆為列侯時真定王劉揚起兵以附王郎衆十餘萬世祖遣植説揚揚乃降世祖因留真定納郭后后即揚之甥也故以此結之乃與揚及諸將置酒郭氏漆里舍揚擊築為歡因得進兵拔邯鄲從平河北建武二年更封植為昌城侯討密縣賊戰殁子向嗣帝使喜代將植營復為驍騎將軍封觀津侯喜卒復以歆為驍騎將軍封浮陽侯喜歆從征伐皆傳國于後向徙封東武陽侯卒子述嗣永平十五年坐與楚王英謀反國除耿純字伯山巨鹿宋子人也父艾為王莽濟平尹純學於長安因除為納言士王莽敗更始立使舞隂王李軼降諸郡國純父艾降還為濟南太守時李軼兄弟用事専制方面賓客遊説者甚衆純連求謁不得通久之乃得見因説軼曰大王以龍虎之姿遭風雲之時奮迅拔起期月之間兄弟稱王而德信不聞於士民功勞未施於百姓寵祿暴興此智者之所忌也兢兢自危猶懼不終而况沛然自足可以成功者乎軼竒之且以其巨鹿大姓乃承制拜為騎都尉授以節令安集趙魏會世祖渡河至邯鄲純即詣見世祖深接之純退見官屬將兵法度不與他將同遂求自結納獻馬及縑帛數百匹世祖北至中山留純邯鄲會王郎反世祖自薊東南馳純與從昆弟欣宿植共率宗族賓客二千餘人老病者皆載木自隨木者棺也奉迎於育拜純為前將軍封耿鄉侯欣宿植皆偏將軍使與純居前降宋子從攻下曲陽及中山是時郡國多降邯鄲者純恐宗家懷異心乃使欣宿歸燒其廬舍世祖問純故對曰竊見眀公單車臨河北非有府藏之畜重賞甘餌可以聚人者也徒以恩德懷之是故士衆樂附今邯鄲自立北州疑惑純雖舉族歸命老弱在行猶恐宗人賓客半有不同心者故燔燒屋室絶其反顧之望世祖歎息及至鄗光武止傳舍鄗大姓蘇公反城開門內王郎將李惲純先覺知將兵逆與惲戰大破斬之從平邯鄲又破銅馬時赤眉青犢上江大彤鐵脛五幡十餘萬衆並在射犬世祖引兵將擊之純軍在前去衆營數里賊忽夜攻純雨射營中士多死傷純勒部曲堅守不動選敢死士二千人俱持強努各傅三矢使御枚間行繞出賊後齊聲呼譟強努並發賊衆驚走追擊遂大破之馳騎白世祖世祖眀旦與諸將俱至營勞純曰昨夜困乎純曰賴明公威德幸而獲全世祖曰大兵不可夜動故不相救耳軍營進退無常卿宗族不可悉居軍中乃以純族人耿伋為蒲吾長悉令將親屬居焉世祖即位封純髙陽侯擊劉永於濟隂下定陶初純從攻王郎墮馬折肩時疾發乃還詣懷宫帝問卿兄弟誰可使者純舉從弟植於是使植將純營純猶以前將軍從時真定王劉揚復造作讖記云赤九之後癭揚為主揚病癭欲以惑衆與綿曼賊交通建武二年春遣騎都尉陳副遊擊將軍鄧隆徴揚揚閉城門不內副等乃復遣純持節行赦令於幽冀所過並使慰勞王侯密勑純曰劉揚若見因而收之純從百餘騎與副隆會元氏俱至真定止傳舍揚稱病不謁以純真定宗室之出遣使與純書欲相見純報曰奉使見王侯牧守不得先詣如欲面會宜出傳舍時揚弟林邑侯讓及從兄細各擁兵萬餘人揚自恃衆強而純意安靜即從官屬詣之兄弟並將輕兵在門外揚入見純純接以禮敬因延請其兄弟皆入乃閉閣悉誅之因勒兵而出真定震怖無敢動者帝憐揚釀謀未發並封其子復故國純還京師因自請曰臣本吏家子孫幸遭大漢復興聖帝受命備位列將爵為通侯天下略定臣無所用志願試治一郡盡力自效帝笑曰卿既治武復欲修文邪乃拜純為東郡太守時東郡未平純視事數月盜賊清寧四年詔純將兵擊更始東平太守范荆荆降進擊泰山濟南及平原賊皆平之居東郡四嵗時發干長有罪純按奏圍守之奏未下長自殺純坐免以列侯奉朝請從擊董憲道過東郡百姓老小數千隨車駕涕泣云願復得耿君帝謂公卿曰純年少被甲胄為軍吏耳治郡乃能見思若是乎六年定封為東光侯純辭就國帝曰文帝謂周勃丞相吾所重君為我率諸侯就國今亦然也純受詔而去至鄴賜榖萬斛到國弔死問病民愛敬之八年東郡濟隂盜賊羣起遣大司空李通橫野大將軍王常擊之帝以純威信著於衛地遣使拜太中大夫使與大兵會東郡東郡聞純入界盜賊九千餘人皆詣純降大兵不戰而還璽書復以為東郡太守吏民悅服十三年卒於官諡曰成侯子阜嗣植後為輔威將軍封武邑侯宿至代郡太守封遂鄊侯欣為赤眉將軍封著武侯從鄧禹西征戰死雲陽凡宗族封列侯者四人關內侯者三人為二千石者九人阜徙封為莒鄊侯永平十四年坐同族耿歙與楚人顏忠辭語相連國除建初二年肅宗追思純功紹封阜子盱為髙亭侯盱卒無嗣帝復封盱弟騰騰卒子忠嗣忠卒孫緒嗣朱祐字仲先南陽宛人也少孤歸外家復陽劉氏往來舂陵世祖與伯升皆親愛之伯升拜大司徒以祐為護軍及世祖為大司馬討河北復以祐為護軍常見親幸舍止於中祐侍宴從容曰長安政亂公有日角之相此天命也世祖曰召刺姦收護軍祐乃不敢復言從征河北常力戰陷陳以為偏將軍封安陽侯世祖即位拜建義大將軍建武二年更封堵陽侯冬與諸將擊鄧奉於淯陽祐軍敗為奉所獲眀年奉破乃肉袒因祐降帝復祐位而厚加慰賜遣擊新野隨皆平之延岑自敗於穰遂與秦豐將張成合祐率征虜將軍祭遵與戰於東陽大破之臨陳斬成延岑敗走歸豐祐收得印綬九十七進擊黃郵降之賜祐黃金三十斤四年率破姦將軍侯進輔威將軍耿植代征南大將軍岑彭圍秦豐於黎邱破其將張康於蔡陽斬之帝自至黎邱使御史中丞李由持璽書招豐豐出惡言不肯降車駕引還勑祐方略祐盡力攻之眀年夏城中窮困豐乃將其母妻子九人肉袒降祐檻車傳豐送洛陽斬之大司馬吳漢劾奏祐廢詔受降違將帥之任帝不加罪祐還與騎都尉臧宫會擊延岑餘黨隂酇築陽三縣賊悉平之祐為人質直尚儒學將兵率衆多受降以克定城邑為本不存首級之功又禁制士卒不得虜掠百姓軍人樂放縱多以此怨之九年屯南行唐拒胸奴十三年增邑定封鬲侯食邑七千三百戶十五年朝京師上大將軍印綬因留奉朝請祐奏古者人臣受封不加王爵可改諸王為公帝即施行又奏宜令三公並去大名以法經典後遂從其議祐初學長安帝往候之祐不時相勞苦而先升講舍後車駕幸其第帝因笑曰主人得無舍我講乎以有舊恩數蒙賞賚二十四年卒子商嗣商卒子演嗣永元十四年坐從兄伯為外孫隂皇后巫蠱事免為庶人永初七年鄧太后紹封演子沖為鬲侯景丹字孫卿馮翊櫟陽人也少學長安王莽時舉四科丹以言語為固德侯相有幹事稱遷朔調連率副二更始立遣使者徇上谷丹與連率耿況降復為上谷長史王郎起丹與况共謀拒之况使丹與子弇及寇恂等將兵南歸世祖世祖引見丹等笑曰邯鄲將帥數言我發漁陽上谷兵吾聊應言然何意二郡良為吾來方與士大夫共此功名耳拜丹為偏將軍號奉義侯從擊王郎將貌宏於南􅒋郎兵迎戰漢軍退却丹等縱突騎擊大破之追奔十餘里死者縱橫丹還世祖謂曰吾聞突騎天下精兵今乃見其戰樂可言邪遂從征河北世祖即位以讖文用平狄將軍孫咸行大司馬衆咸不恱詔舉可為大司馬者羣臣所推惟吳漢與丹帝曰景將軍北州大將軍是其人也然吳將軍有建大䇿之勳又誅苖幽州謝尚書其功大舊制驃騎將軍與大司馬相兼也乃以吳漢為大司馬而拜丹為驃騎大將軍建武二年定封櫟陽侯帝謂丹曰今關東故王國雖數縣不過櫟陽萬戶邑夫富貴不歸故鄉如衣繡夜行故以封卿耳丹頓首謝秋與吳漢建威大將軍耿弇建義大將軍朱祐執金吾賈復偏將軍馮異強弩將軍陳俊左曹王常騎都尉臧宫等從擊破五校於羛陽降其衆五萬人會陜賊蘇况攻破𢎞農生獲郡守丹時病帝以其舊將欲令強起領郡事乃夜召入謂曰賊迫近京師但得將軍威重卧以鎮之足矣丹不敢辭乃力疾將營到郡十餘日薨子尚嗣徙封余吾侯尚卒子苞嗣苞卒子臨嗣無子國絶永初七年鄧太后紹封苞弟遽為監亭侯王梁字君嚴漁陽安陽人也為郡吏太守彭寵以梁守狐奴令與蓋延吳漢俱將兵南及世祖於廣阿拜偏將軍既拔邯鄲賜爵關內侯從平河北拜野王令與河內太守寇恂南拒洛陽北守天井關朱鮪等不敢出兵世祖以為梁功及即位議選大司空而赤伏符曰王梁主衛作元武帝以野王衛之所徙元武水神之名司空水土之官也於是拜梁為大司空封武強侯建武二年與大司馬吳漢等俱擊檀鄊有詔軍事一屬大司馬而梁輒發野王兵帝以其不奉詔勑令止所在縣而梁復以便宜進軍帝以梁前後違命大怒遣尚書宗廣持節即軍中斬之廣不忍乃檻車送京師既至赦之月餘以為中郎將行執金吾事北守箕關擊赤眉别校降之三年春轉擊五校追至信都趙國破之悉平諸屯聚冬遣使者持節拜梁前將軍四年春擊肥城文陽拔之進與驃騎大將軍杜茂擊佼強蘇茂於楚沛間拔大梁齧桑而捕虜將軍馬武偏將軍王霸亦分道並進歲餘悉平之五年從救桃城破龎萌等梁戰尤力拜山陽太守鎮撫新附將兵如故數月徴入代歐陽歙為河南尹梁穿渠引穀水注洛陽城下東寫鞏川及渠成而水不流有司劾奏之梁慚懼上書乞骸骨詔書切責然猶以為濟南太守十三年增邑定封阜成侯十四年卒官子禹嗣禹卒子堅石嗣堅石追坐父禹及弟平與楚王英謀反棄市國除杜茂字諸公南陽冠軍人也初歸光武於河北為中堅將軍常從征伐世祖即位拜大將軍封樂鄊侯北擊五校於真定進降廣平建武二年更封苦陘侯與中郎將王梁擊五校賊於魏郡清河東郡悉平諸營保降其持節大將三十餘人三郡清靜道路流通明年遣使拜茂為驃騎大將軍擊沛郡拔芒時西防復反迎佼強五年春茂率捕虜將軍馬武進攻西防數月拔之強奔董憲東方既平七年詔茂引兵北屯田晉陽廣武以備胡寇九年與鴈門太守郭涼擊盧芳將尹由於繁畤芳將賈覽率胡騎萬餘救之茂戰軍敗引入樓煩城時盧芳據髙栁與胸奴連兵數寇邉民帝患之十二年遣謁者段忠將衆郡弛刑配茂鎮守北邉因發邉卒築亭候修烽火又發委輸金帛繒絮供給軍士并賜邊民冠蓋相望茂亦遣屯田驢車轉運先是鴈門人賈丹霍匡解勝等為尹由所略由以為將率與共守平城丹等聞芳敗遂共殺由詣郭涼涼上狀皆封為列侯詔送委輸金帛賜茂涼軍吏及平城降民自是盧芳城邑稍稍來降涼誅其豪右郇氏之屬鎮撫羸弱旬月間鴈門且平芳遂亡入胸奴帝擢涼子為中郎宿衛左右涼字公文右北平人也身長八尺氣力壯猛雖武將然通經書多智略尤曉邉事有名北方初幽州牧朱浮辟為兵曹掾擊彭寵有功封廣武侯十三年增茂邑更封修侯十五年坐斷兵馬廪縑使軍吏殺人免官削戶邑定封參蘧鄉侯十九年卒子元嗣永平十四年坐與東平王等謀反減死一等國除永初七年鄧太后紹封茂孫奉為安樂亭侯馬成字君遷南陽棘陽人也少為縣吏世祖徇頴川以成為安集掾調守郟令及世祖討河北成即棄官步負追及於滿陽以成為期門從征伐世祖即位再遷護軍都尉建武四年拜揚武將軍督誅虜將軍劉隆振威將軍宋登射聲校尉王賞發會稽丹陽九江六安四郡兵擊李憲時帝幸夀春設壇場祖禮遣之進圍憲於舒令諸軍各深溝髙壘憲數挑戰成堅壁不出守之嵗餘至六年春城中食盡乃攻之遂屠舒斬李憲追擊其黨與盡平江淮地七年夏封平舒侯八年從征破隗囂以成為天水太守將軍如故冬徴還京師九年代來歙守中郎將率武威將軍劉尚等破河池遂平武都明年大司空李通罷以成行司空事居府如真數月復拜揚武將軍十四年詔屯常山中山以備北邉并領建義大將軍朱祐營又代驃騎大將軍杜茂繕治障塞自西河至渭橋河上至安邑太原至井陘中山至鄴皆築堡壁起烽燧十里一堠在事五六年帝以成勤勞徴還京師邉人多上書求請者復遣成還屯及南單于保塞北方無事拜為中山太守上將軍印綬領屯兵如故二十四年南擊武溪蠻賊無功上太守印綬二十七年定封全椒侯就國三十二年卒子衛嗣衛卒子香嗣徙封棘陵侯香卒子豐嗣豐卒子元嗣元卒子邑嗣邑卒子醜嗣桓帝時以罪失國延熹二年帝復封成元孫昌為益陽亭侯劉隆字元伯南陽安衆侯宗室也王莽居攝中隆父禮與安衆侯崇起兵誅莽事泄隆以年未七嵗故得免及壯學於長安更始拜為騎都尉謁歸迎妻子置洛陽聞世祖在河內追及於射犬以為騎都尉與馮異共拒朱鮪李軼等軼遂殺隆妻子建武二年封亢父侯四年拜誅虜將軍討李憲憲平遣隆屯田武當十一年守南郡太守嵗餘上將軍印綬十三年增邑更封竟陵侯是時天下墾田多不以實又戶口年紀互有增減十五年詔下州郡檢核其事而刺史太守多不均平猶優饒豪右侵刻羸弱百姓嗟怨遮道號呼時諸郡遣使奏事帝見陳留吏牘上有書視之云潁川𢎞農可問河南南陽不可問帝詰吏由趣吏不肻服抵言於長夀街上得之帝怒時顯宗為東海公年十二在幄後言曰吏受郡勑當欲以墾田相方耳帝曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為凖帝令虎賁將詰問吏吏乃實首服如顯宗對於是遣謁者考實具知姦狀明年隆坐徴下獄其儔輩十餘人皆死帝以隆功臣特免為庶人明年復封為扶樂鄊侯以中郎將副伏波將軍馬援擊交趾蠻夷徴側等隆别於禁溪口破之獲其帥徴二斬首千餘級降者二萬餘人還更封大國為長平侯及大司馬吳漢薨隆為驃騎將軍行大司馬事隆奉法自守視事八嵗上將軍印綬罷賜養牛上樽酒十斛以列侯奉朝請三十年定封慎侯中元二年卒諡曰靖侯子安嗣傅俊字子衛潁川襄城人也世祖徇襄城俊以縣亭長迎軍拜為校尉襄城收其母弟宗族皆滅之從破王尋等以為偏將軍别擊京密破之遣歸潁川收葬家屬及世祖討河北俊與賔客十餘人北追及於邯鄲上謁世祖使將潁川兵常從征伐世祖即位以俊為侍中建武二年封昆陽侯三年拜俊積弩將軍與征南大將軍岑彭擊破秦豐因將兵徇江東揚州悉定七年卒諡曰威侯子昌嗣徙封蕪湖侯建初中遭母憂因上書以國貧不願之封乞錢五十萬為關內侯肅宗怒貶為關內侯竟不賜錢永初七年鄧太后復封昌子鐵為髙置亭侯堅鐔字子伋潁川襄城人也為郡縣吏世祖討河北或薦鐔者因得召見以其吏能署主簿又拜偏將軍從平河北别擊破大槍於盧奴世祖即位拜鐔揚化將軍封濦強侯與諸將攻洛陽而朱鮪别將守東城者為反間私謁鐔晨開上東門鐔與建義大將軍朱祐乘朝而入與鮪大戰武庫下殺傷甚衆至旦食及罷鮪由是遂降又别擊內黃平之建武二年與右將軍萬修徇南陽諸縣而堵鄊人董欣反宛城獲南陽太守劉驎鐔乃引軍赴宛選敢死士夜自登城斬關而入欣遂棄城走還堵鄊鄧奉復反新野攻破吳漢時萬修病卒鐔獨孤絶南拒鄧奉北當董欣一年間道路隔塞糧饋不至􅀈食蔬菜與士卒共勞苦每急輒先當矢石身被三創以此能全其衆及帝征南陽擊破欣奉以鐔為左曹常從征伐六年定封合肥侯二十六年卒子鴻嗣鴻卒子浮嗣浮卒子雅嗣馬武字子張南陽湖陽人也少時避讎客居江夏王莽末竟陵西陽三老兵起於郡界武往從之後入緑林中遂與漢軍合更始立以武為侍郎與世祖破王尋等拜為振威將軍與尚書令謝躬俱攻王郎及世祖拔邯鄲請躬與武置酒髙會因欲以圗躬不克既罷獨與武登叢臺從容謂武曰吾得漁陽上谷突騎欲令將軍將之何如武曰駑怯無方略世祖曰將軍久將習兵豈與我掾史同哉武由是歸心及謝躬誅死武馳至射犬降世祖見之甚悅引置左右每勞饗諸將武輒起斟酌於前世祖以為歡復使將其部曲至鄴武叩頭辭以不願世祖愈美其意因從擊羣賊世祖擊尢來五幡等敗於慎水武獨殿還陷陳故賊不得迫及進至安定次小廣陽武常為軍鋒力戰無前諸將皆引而隨之故遂破賊窮追至平谷浚靡而還世祖即位以武為侍中騎都尉封山都侯建武四年與虎牙將軍蓋延等討劉永武别擊濟隂下成武楚邱拜捕虜將軍明年龎萌反攻桃城武先與戰破之會車駕至萌遂敗走六年夏與建威大將軍耿弇西擊隗囂漢軍不利引下隴囂追急武選精騎還為後拒身被甲持戟奔擊殺數十人囂兵乃退諸軍得還長安十三年增邑更封鄃侯將兵北屯下曲陽備胸奴坐殺軍吏受詔將妻子就國武徑詣洛陽上將軍印綬削戶五百定封為揚虛侯因留奉朝請帝後與功臣諸侯宴語從容言曰諸卿不遭際會自度爵祿何所至乎髙密侯鄧禹先對曰臣少嘗學問可郡文學博士帝曰何言之謙乎卿鄧氏子志行修整何不為掾功曺餘各以次對至武曰臣以武勇可守尉督盜賊帝笑曰且勿為盜賊自致亭長斯可矣武為人嗜酒濶逹敢言時醉在御前靣折同列言其短長無所避忌帝故縱之以為笑樂帝雖制御功臣而每能回容宥其小失逺方貢珍甘必先遍賜列侯而太官無餘有功輒增邑賞不任以吏職故皆保其福祿終無誅譴者二十五年武以中郎將將兵擊武溪蠻還上印綬顯宗初西羌寇隴右覆軍殺將朝廷患之復拜武捕虜將軍以中郎將王豐副與監軍使者竇固右護都尉陳欣將烏桓黎陽營三輔募士涼州諸郡羌胡兵及弛刑合四萬人擊之到金城浩舋與羌戰浩音閣舋音門斬首六百級又戰於洛都谷為羌所敗死者千餘人羌乃率衆引出塞武復追擊到東西邯大破之斬首四千六百級獲生口千六百人餘皆降散武振旅還京師增邑七百戶并前千八百戶永平四年卒子檀嗣坐兄伯濟與楚王英黨顏忠謀反國除永初七年鄧太后紹封武孫震為漻亭侯震卒子側嗣范曄論略曰中興二十八將前世以為上應二十八宿未之詳也然咸能感會風雲奮其智勇稱為佐命亦各智能之士也議者多非光武不以功臣任職至使英姿茂績委而勿用原夫深圗逺算固將有以焉若乃王道既衰降及霸德猶能授受惟庸勳賢皆序如管隰之迭升桓世先趙之同列文朝可謂兼通矣降自秦漢世資戰力至於翼扶丕運皆武人屈起亦有鬻繒屠狗輕滑之徒或崇以連城之賞或任以阿衡之地故勢疑則隙生力侔則亂起蕭樊且猶縲紲信越終見葅戮不其然乎自兹以降迄於孝武宰輔五世莫非公侯遂使縉紳道塞賢能蔽壅朝有世及之私下多抱關之怨其懷道無聞委身草莽者亦何可勝言故光武監前事之違存矯枉之志雖寇鄧之髙勳耿賈之鴻烈分土不過大縣數四所加特進朝請而已觀其治平臨政課職責咎將所謂導之以政齊之以刑者乎若格之功臣其傷已甚何者直繩則虧喪恩舊撓情則違廢禁典選德則功不必厚舉勞則人或未賢參任則羣心離塞並列則其弊未逺不得不較其勝否即以事相權故髙秩厚禮允答元功峻文深憲責成吏職建武之世侯者百餘若夫數公者則與參國議分均休咎其餘並優以寬科完其封祿莫不終以功名延慶於後昔留侯以為高祖悉用蕭曹故人而郭伋亦譏南陽多顯鄭興又戒功臣専任夫崇恩偏授易啓私溺之失至公均被必廣招賢之路意者不其然乎永平中顯宗追感前世功臣乃圗畫二十八將於南宫雲臺其外又有王常李通竇融卓茂合三十二人故依其本第係之篇末以志功臣之次云爾太傅髙密侯鄧禹中山太守全椒侯馬成大司馬廣平侯吳漢河南尹阜成侯王梁左將軍膠東侯賈復琅邪太守祝阿侯陳俊建威大將軍好畤侯耿弇驃騎大將軍參蘧侯杜茂執金吾雍奴侯寇恂積弩將軍昆陽侯傅俊征南大將軍舞陽侯岑彭左曹合肥侯堅鐔征西大將軍陽夏侯馮異上谷太守淮陽侯王霸建義大將軍鬲侯朱祐信都太守阿陵侯任光征虜將軍潁陽侯祭遵豫章太守中水侯李忠驃騎大將軍擽陽侯景丹右將軍槐里侯萬修虎牙大將軍安平侯蓋延太常靈夀侯邳彤衛尉安成侯銚期驃騎將軍昌成侯劉植東郡太守東光侯耿純橫野大將軍山桑侯王常城門校尉朗陵侯臧宫大司空固始侯李通捕虜將軍揚虛侯馬武大司空安豐侯竇融驃騎將軍慎侯劉隆太傅宣德侯卓茂竇融字周公扶風平陵人也七世祖廣國孝文皇后之弟封章武侯融髙祖父宣帝時以吏二千石自常山徙焉融早孤王莽居攝中為強弩將軍司馬東擊翟義還攻槐里以軍功封建武男女弟為大司空王邑小妻家長安中出入貴戚連結閭里豪傑以任俠為名然事母兄養弱弟內修行義王莽末青徐賊起太師王匡請融為助軍與共東征及漢兵起融復從王邑敗於昆陽下歸長驅入關王邑薦融拜為波水將軍賜黃金千斤引兵至新豐莽敗以軍降更始大司馬趙萌萌以為校尉甚重之薦融為巨鹿太守融見更始新立東方尚擾不欲出關而髙祖父嘗為張掖太守從祖父為護羌校尉從弟亦為武威太守纍世在河西知其土俗獨謂兄弟曰天下安危未可知河西殷富帶河為固張掖屬國精兵萬騎一旦緩急杜絶河津足以自守此遺種處也兄弟皆然之融於是日往守萌辭讓巨鹿圗出河西萌為言於更始乃得為張掖屬國都尉融大喜即將家屬而西既到撫結豪傑懷輯羌虜甚得其歡心西河翕然歸之是時酒泉太守梁統金城太守庫鈞張掖都尉史苞酒泉都尉竺曾敦煌都尉辛彤並州郡英俊融皆與為厚善及更始敗融與梁統等計議曰今天下擾亂未知所歸河西斗絶在羌胡中不同心戮力則不能自守權均力齊復無以相率當推一人為大將軍共全五郡觀時變動議既定而各謙讓咸以融世任河西為吏人所敬向乃推融行河西五郡大將軍事是時武威太守馬期張掖太守任仲並孤立無黨乃共移書告示之二人即解印綬去於是以梁統為武威太守史苞為張掖太守竺曾為酒泉太守辛彤為敦煌太守庫鈞為金城太守融居屬國領都尉職如故置從事監察五郡河西民俗質朴而融等政亦寬和上下相親晏然富殖修兵馬習戰射眀烽燧之警羌胡犯塞融自將與諸郡相救皆如符要每輒自破之其後胸奴懲艾希復侵寇而保塞羌胡皆震服親附安定北地上郡流人歸之不絶融等遙聞光武即位而心欲東向以河西隔逺未能自通時隗囂先稱建武年號融等從受正朔囂皆假其將軍印綬囂外順人望內懷異心使辨士張元遊説河西曰更始事業已成尋復亡滅此一姓不再興之效今即有所主便相係屬一旦拘制自令失柄後有危殆雖悔無及今豪傑競逐雌雄未決當各據其土宇與隴蜀合從髙可為六國下不失尉他融等於是召豪傑及諸太守計議其中智者皆曰漢承堯運歷數延長今皇帝姓號見於圗書自前世博物道術之士谷子雲夏賀良等建眀漢有再受命之符故劉子駿改易名字冀應其占及莽末道士西門君惠言劉秀當為天子遂謀立子駿事覺被殺出謂百姓觀者曰劉秀真汝主也皆近事暴著智者所共見也除言天命且以人事論之今稱帝者數人而洛陽土地最廣甲兵最強號令最眀觀符命而察人事他姓殆未能當也諸郡太守各有賔客或同或異融小心精詳遂決䇿東向五年夏遣長史劉鈞奉書獻馬先是帝聞河西完富地接隴蜀帝欲招之以逼囂術亦發使遺融書遇鈞於道即與俱還帝見鈞歡甚禮饗畢乃遣令還賜融璽書曰制詔行河西五郡大將軍事屬國都尉勞鎮守邉五郡兵馬精強倉庫有蓄民庶殷富外則折挫羌胡內則百姓蒙福威德流聞虛心相望道路隔塞邑邑何已長史所奉書獻馬悉至深知厚意今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重以此言之欲相厚豈有量哉諸事具長史所見將軍所知王者迭興千載一會欲遂立桓文輔微國當勉卒功業欲三分鼎足連衡合從亦宜以時定天下未并吾與爾絶域非相吞之國今之議者必有任囂效尉他制七郡之計王者有分土無分民自適己事而已今以黃金二百斤賜將軍便宜輒言因授融為涼州牧璽書既至河西咸驚以為天子明見萬里之外網羅張元之情融即復遣鈞上書曰臣融竊伏自惟幸得託先后末屬蒙恩為外戚纍世二千石至臣之身復備列位假歷將帥守持一隅以委質則易為辭以納忠則易為力書不足以深逹至誠故遣劉鈞口陳肝膽自以底裏上露長無纎介而璽書盛稱蜀漢二主三分鼎足之權任囂尉他之謀竊自痛傷臣融雖無識猶知利害之際逆順之分豈可背真舊之主事姦偽之人廢忠貞之節為傾覆之事棄已成之基求無冀之利此三者雖問狂夫猶知去就而臣獨何以用心謹遣同産弟友詣闕口陳區區友至髙平會囂反畔道絶馳歸遣司馬席封間行通書帝復遣席封賜融友書所以慰藉之甚備融既深知帝意乃與隗囂書責讓之曰伏惟將軍國富政修士兵懷附親遇厄會之際國家不利之時守節不回承事本朝後遣伯春委身於國無疑之誠於斯有效融等所以欣服髙義願從役於將軍者良為此也而忿悁之間改節易圗君臣分爭上下接兵委成功造難就去從義為橫謀百年纍之一朝毁之豈不惜乎殆執事者貪功建謀以至於此融竊痛之當今西州地勢局迫人兵離散易以輔人難以自建計若失路不反聞道猶迷不南合子陽則北入文伯耳夫負虛交而易強禦恃逺救而輕近敵未見其利也融聞智者不危衆以舉事仁者不違義以要功今以小敵大於衆何如棄子徼功於義何如且初事本朝稽首北面忠臣節也及遣伯春垂涕相送慈父恩也俄而背之謂吏士何忍而棄之謂留子何自起兵以來轉相攻擊城郭皆為邱墟生人轉於溝壑今其存者非鋒刃之餘則流亡之孤迄今傷痍之恥未愈哭泣之聲尚聞幸賴天運少還而大將軍復重於難是使積痾不得遂瘳孤幼將復流離其為悲痛尤足愍傷言之可為酸鼻庸人且猶不忍况仁者乎融聞為忠甚易得冝實難憂人太過以德取怨知且以言獲罪也區區所獻唯將軍省焉囂不納融乃與五郡太守共砥厲兵馬上疏請師期帝甚嘉美之乃賜融以外屬圗及太史公五宗外戚世家魏其侯列傳詔報曰每追念及外屬孝景皇帝出自竇氏定王景帝之子朕之所祖昔魏其一言繼統以正長君少君尊奉師傅修成淑德施及子孫此皇太后神靈上天祐漢也從天水來者寫將軍所讓隗囂書痛入骨髓畔臣見之當股栗慚愧忠臣則酸鼻流涕義士則曠若發矇非忠孝慤誠孰能如此豈其德薄者所能克堪囂自知失河西之助族禍將及欲設離間之説亂惑真心轉相解搆以成其姦又京師百僚不曉國家及將軍本意多能採取虛偽誇誕妄談令忠孝失望傳言乖實毁譽之來皆不徒然不可不思今關東盜賊已定大兵今當悉西將軍其抗厲威武以應期會融被詔即與諸郡守將兵入金城初更始時先零羌封何諸種殺金城太守居其郡隗囂使使賂遺封何與共結盟欲發其衆融等因軍出進擊封何大破之斬首千餘級得牛馬羊萬頭榖數萬斛因並河揚威武伺候車駕時大兵未進融乃引還帝以融信效著明益嘉之詔扶風修理融父墳塋祠以太牢數馳輕使致遺四方珍羞梁統乃使人刺殺張元遂與囂絶皆解所假將軍印綬七年夏酒泉太守竺曾以弟報怨殺人而去郡融承制拜曾為武鋒將軍更以辛彤代之秋隗囂發兵寇安定帝將自西征之先戒融期會遇雨道斷且囂兵已退乃止融至姑臧被詔罷歸融恐大兵遂久不出乃上書曰囂聞車駕當西臣融東下士衆騷動計且不戰囂將髙峻之屬皆欲逢迎大軍後聞兵罷峻等復疑囂揚言東方有變西州豪傑遂復附從囂又引公孫述將令守突門臣融孤弱介在其間雖承威靈宜速救助國家當其前臣融促其後緩急迭用首尾相資囂勢排迮不得進退此必破也若兵不早進久生持疑則外長寇讐內示困弱復令讒邪得有因緣臣竊憂之惟陛下哀憐帝深美之八年夏車駕西征隗囂融率五郡太守及羌虜小月氐等步騎數萬輜重五千餘兩與大軍會髙平第一融先遣從事問會見儀適是時軍旅代興諸將與三公交錯道中或背使者交私語帝聞融先問禮儀甚善之以宣告百僚乃置酒髙會引見融等待以殊禮拜弟友為奉車都尉從弟士大中大夫遂共進軍囂衆大潰城邑皆降帝髙融功下詔以安豐陽泉蓼安安風四縣封融為安豐侯弟友為顯親侯遂以次封諸將帥武鋒將軍竺曾為助義侯武威太守梁統為成義侯張掖太守史苞為褒義侯金城太守庫鈞為輔義侯酒泉太守辛彤為扶義侯封爵既畢乘輿東歸悉遣融等西還所鎮融以兄弟並受爵位久専方面懼不自安數上書求代詔報曰吾與將軍如左右手數執謙退何不曉人意勉循士民無擅離部曲及隴蜀平詔融與五郡太守奏事京師官屬賔客相隨駕乘千餘兩牛馬羊被野融到洛陽城門上涼州牧張掖屬國都尉安豐侯印綬詔遣使者還侯印綬引見就諸侯位賞賜恩寵傾動京師數月拜冀州牧十餘日又遷大司空融自以非舊臣一旦入朝位在功臣之右每召會進見容貌辭氣卑恭已甚帝以此愈親厚之融小心久不自安數辭讓爵位因侍中金遷口達至誠又上疏曰臣融年五十三有子年十五質性頑鈍臣融朝夕教導以經藝不得令觀天文見讖記誠欲令恭肅畏事恂恂循道不願其有才能何况乃當傳以連城廣土享故諸侯王國哉因復請間求見帝不許後朝罷逡巡席後帝知欲有讓遂使左右傳出他日會見迎詔融曰日者知公欲讓職還土故命公暑熱且自便今相見宜論他事勿得復言融不敢陳請二十年大司徒戴涉坐舉人盜金下獄帝以三公參職不得已亦策免融明年加位特進二十三年代陰興行衛尉事特進如故又兼領將作大匠弟友為城門校尉兄弟並典禁兵融復乞骸骨輒賜錢帛太官致珍奇及友卒帝愍融年衰遣中常侍中謁者即其臥內強進酒食融長子穆尚內黃公主代友為城門校尉穆子勳尚東海恭王強女泚陽公主友子固亦尚光武女涅陽公主顯宗即位以融從兄子林為獲羌校尉竇氏一公兩侯三公主四二千石相與並時自祖及孫官府邸第相望京邑奴婢以千數於親戚功臣中莫與為北永平二年林以受羌贓罪下獄死帝由是數下詔切責融戒以竇嬰田蚡禍敗之事融惶恐乞骸骨詔令歸第養病嵗餘聽上衛尉印綬賜養牛上樽酒融在宿衛十餘年年老子孫縱誕多不法穆等遂交通輕薄屬託郡縣干亂政事以封在安豐欲令姻戚悉據故六安國遂矯稱陰太后詔令六安侯劉盱去婦因以女妻之五年盱婦家上書言狀帝大怒乃盡免穆等官諸竇為郎吏者皆將家屬歸故郡獨留融在京師穆等西至函谷關有詔悉復追還會融卒時年七十八諡曰戴侯賻送甚厚帝以穆不能修尚而擁富資居大第常令謁者一人監獲其家居數年謁者奏穆父子自失勢數出怨望語帝令將家屬歸本郡唯勳以泚陽主壻留京師穆坐賂遺小吏郡捕繫與子宣俱死平陵獄勳亦死洛陽獄久之詔還融夫人與小孫一人居洛陽家舍十四年封勳弟嘉為安豐侯食邑二千戶奉融後和帝初為少府及勳子大將軍憲被誅免就國嘉卒子萬全嗣萬全卒子會宗嗣萬全弟子武别有傳固字孟孫少以尚公主為黃門侍郎好覽書傳喜兵法貴顯用事中元元年襲父友封顯親侯顯宗即位遷中郎將監羽林士後坐從兄穆有罪廢于家十餘年時天下乂安帝欲遵武帝故事擊胸奴通西域以固明習邊事十五年冬拜為奉車都尉以騎都尉耿忠為副謁者僕射耿秉為駙馬都尉秦彭為副皆置從事司馬並出屯涼州明年固與忠率酒泉敦煌張掖甲卒及盧水羌胡萬二千騎出酒泉塞耿秉秦彭率武威隴西天水募士及羌胡萬騎出居延塞又太僕祭彤度遼將軍吳棠將河東北地西河羌胡及南單于兵萬一千騎出高闕塞騎都尉來苖獲烏桓校尉文穆將太原鴈門代郡上谷漁陽右北平定襄郡兵及烏桓鮮卑萬一千騎出平城塞固忠至天山擊呼衍王斬首千餘級呼衍王走追至蒲類海留吏士屯伊吾盧城耿秉秦彭絶漠六百餘里至三木樓山來苖文穆至胸奴河水上虜皆奔走無所獲祭彤吳棠坐不至涿邪山免為庶人時諸將唯固有功加位特進明年復出玉門擊西域詔耿秉及騎都尉劉張皆去符傳以屬固固遂破白山降車師事已具耿秉傳固在邊數年羌胡服其恩信肅宗即位以公主修勑慈愛纍世崇重加號長公主增邑三千戶徴固代魏應為大鴻臚帝以其曉習邊事每被訪及建初二年追録前功增邑一千三百戶七年代馬防為光祿勳明年復代馬防為衛尉固久歷大位甚見尊貴賞賜租祿資纍巨億而性謙儉愛人好施士以此稱之章和二年卒諡曰文侯子彪至射聲校尉先固卒無子國除融曾孫憲字伯度父勳被誅憲少孤建初二年女弟立為皇后拜憲為郎稍遷侍中虎賁中郎將弟篤為黃門侍郎兄弟親幸並侍宮省寵貴日盛自王主及陰馬諸家莫不畏憚憲恃宮掖聲勢遂以賤直請奪沁水公主園田公主明帝女也主逼畏不敢計後肅宗駕出過園指以問憲憲陰喝一介反不得對後發覺帝大怒召憲切責曰深思前過奪主田園時何用愈趙高指鹿為馬愈猶差也久念使人驚怖昔永平中常令陰黨陰博鄧疊三人更相紏察故諸豪戚莫敢犯法者而詔書切切猶以舅氏田宅為言今貴主尚見枉奪何况小人哉國家棄憲如孤雛腐鼠耳憲大震懼皇后為毁服深謝良久乃得解使以田還主遂不繩其罪然亦不授以重任和帝即位太后臨朝憲以侍中內幹機密出宣誥命肅宗遺詔以篤為虎賁中郎將篤弟景瓌並中常侍於是兄弟皆在親要之地憲以前太尉鄧彪有義讓先帝所敬而仁厚委隨故尊崇之以為太傅令百官總己以聽其所施為輒外令彪奏內白太后事無不從又屯騎校尉桓郁纍世帝師而性和退自守故上書薦之令授經禁中以內外協附莫生疑異憲性果急睚眥之怨莫不報復初永平時謁者韓紆嘗考劾父勳獄憲遂令客斬紆子以首祭勳冡齊殤王子都鄉侯暢來弔國憂暢素行邪僻與步兵校尉鄧疊親屬數往來京師因疉母元自通長樂宫得幸太后被詔召詣上東門憲懼見幸分宫省之權遣刺客殺暢於屯衛之中而歸罪於暢弟利侯剛乃使侍御史與靑州刺史雜考剛等後事發覺太后怒閉憲於內宫憲懼誅自求擊胸奴以贖死會南單于請兵北伐乃拜憲車騎將軍金印紫綬官屬依司空以執金吾耿秉為副發北軍五校黎陽雍營緣邊十二郡騎士及羌胡兵士出塞明年憲與秉各將四千騎及南胸奴左谷蠡王師子萬騎出朔方雞鹿塞南單于屯屠河將萬餘騎出滿夷谷度遼將軍鄧鴻及緣邉義從羌胡八千騎與左賢王安國萬騎出稒陽塞皆會涿邪山憲分遣副校尉閻盤司馬耿夔耿談將左谷蠡王師子右呼衍王須訾等精騎萬餘與北單于戰於稽落山大破之虜衆崩潰單于遁走追擊諸部遂臨私渠北鞮海斬名王以下萬三千級獲生口馬牛羊橐駝百餘萬頭於是溫犢須日逐溫吾夫渠王栁鞮等八十一部率衆降者前後二十餘萬人憲秉遂登燕然山去塞三千餘里刻石勒功紀漢威德令班固作銘曰惟永元元年秋七月有漢元舅曰車騎將軍竇憲寅亮聖明登翼王室納于大麓惟清緝熙乃與執金吾耿秉述職巡御理兵於朔方鷹揚之校螭虎之士爰該六師暨南單于東烏桓西戎氐羌侯王君長之羣驍騎三萬元戎輕武長轂四分雲輜蔽路萬有三千餘乘勒以八陳蒞以威神元甲耀日朱旗絳天遂陵髙闕下雞鹿經磧鹵絶大漠斬溫禺以釁鼓血尸逐以染鍔然後四校橫徂星流彗掃蕭條萬里野無遺冦於是域滅區單反斾而旋考傳驗圖窮覽其山川遂踰涿邪跨安侯乘燕然躡冒頓之區落焚老上之龍庭上以攄髙丈之宿憤光祖宗之神靈下以安固後嗣恢拓境宇振大漢之天聲兹所謂一勞而久逸暫費而永寧者也乃遂封山刋石昭銘上德其辭曰鑠王師兮征荒裔勦凶虐兮截海外敻其邈兮亘地界封神邱兮建隆嵑熙帝載兮振萬世憲乃班師而還遣軍司馬吳泛梁諷奉金帛遺北單于宣明國威而兵隨其後時虜中乖亂泛諷所到輒招降之前後萬餘人遂及單于於西海上宣國威信致以詔賜單于稽首拜受諷因説宜修呼韓邪故事保國安人之福單于喜悅即將其衆與諷俱還到私渠海聞漢軍已入塞乃遣弟右溫禺鞮王奉貢入侍隨諷詣闕憲以單于不自身到奏還其侍弟南單于於漠北遺憲古鼎容五斗其傍銘曰仲山甫鼎其萬年子子孫孫永保用憲乃上之詔使中郎將持節即五原拜憲大將軍封武陽侯食邑二萬戶憲固辭封爵策許焉舊大將軍位在三公下置官屬依太尉憲威權震朝廷公卿希旨奏憲位次太傳下三公上長史司馬秩中二千石從事中郎二人六百石自下各有增振旅還京師於是大開府庫勞賜士吏其所將諸郡二千石子弟從征者悉除太子舍人是時篤為衛尉景瓌皆侍中奉車都尉四家競修第宅窮極工匠明年詔曰大將軍憲前歲出征克滅北狄朝加封賞固讓不愛舅氏舊典並蒙爵土其封憲冠軍侯邑二萬戶篤郾侯景汝陽侯瓌夏陽侯各六千戶憲獨不受封遂將兵出鎮涼州以侍中鄧疊行征西軍事為副北單于以漢還侍弟復奉車諧儲王等款居延塞欲入朝見願請大使憲上遣大將軍中護軍班固行中郎將與司馬梁諷迎之會北單于為南單于所破被創遁走固至私渠海而還憲以北虜微弱欲遂滅之明年復遣右校尉耿夔司馬任尚趙博等將兵擊北虜於金微山大破之克獲甚衆北單于遁逃不知所在憲既平胸奴威名大盛以耿夔任尚為爪牙鄧疊郭璜為腹心班固傅毅之徒皆置幕府以典文章刺史郡守多出其門尚書僕射郅壽樂恢並以忤意相繼自殺由是朝臣震懾望風承旨而篤進位特進得舉吏見禮依三公景為執金吾瓌光祿勳權貴顯赫傾動京師雖俱驕縱而景為尤甚奴客緹騎依倚形勢侵陵小人強奪財貨篡取罪人妻掠婦女啇賈閉塞如避寇讐有司畏懦莫敢舉奏太后聞之使謁者策免景官以特進就朝位瓌少好經書節約自修出為魏郡遷潁川太守竇氏父子兄弟並居列位充滿朝廷叔父霸為城門校尉霸弟褒將作大匠褒弟嘉少府其為侍中將大夫郎吏十餘人憲既負重勞陵肆滋甚四年封鄧疊為穰侯疊與其弟步兵校尉磊及母元又憲女壻射聲校尉郭舉舉父長樂少府璜皆相交結元舉並出入禁中舉得幸太后遂共圖為殺害帝隂知其謀乃與近幸中常侍鄭衆定議誅之以憲在外慮其懼禍為亂忍而未發會憲及鄧疊班師還京師詔使大鴻臚持節郊迎賜軍吏各有差憲等既至帝乃幸北宫詔執金吾五校尉勒兵屯衛南北宫閉城門收捕疊磊璜舉皆下獄誅家屬徙合浦遣謁者僕射收憲大將軍印綬更封為冠軍侯憲及篤景瓌皆遣就國帝以太后故不欲明誅憲為選嚴能相督察之憲篤景到國皆迫令自殺宗族賔客以憲為官者皆免歸本郡瓌以素自修不被逼迫明年坐廪假貧人徙封羅侯不得臣吏人初竇后之譖梁氏憲等豫有謀焉永元十年梁棠兄弟徙九真還路由長沙逼瓌令自殺後和熹鄧后臨朝永初二年詔諸竇前歸本郡者與安豐侯萬全俱還京師萬全少子章字伯尚少好學有文章與馬融崔瑗同好更向推薦永初中三輔遭羌寇章避難東國家於外黃居貧蓬戶蔬食躬勤孝養然誦讀不輟太僕鄧康聞其名請欲與交章不肯往康以此益重焉是時學者稱東觀為老氏藏室道家蓬萊山康遂薦章入東觀為校書即順帝初章女年十二能屬文以才貌選入掖庭有寵與梁皇后並為貴人擢章為羽林郎將遷屯騎校尉章謙虗下士收進時輩甚得名譽是時梁竇並貴各有賓客多交搆其間章推心待之故得免其患貴人早卒帝追思之無已詔史官樹碑頌德章自為之辭貴人殁後帝禮待之無衰永和五年遷少府漢安二年轉大鴻臚建康元年梁后稱制章自免卒于家中子唐有俊才官至虎賁中郎將馬援字文淵扶風茂陵人也其先趙奢為趙將號曰馬服君子孫因為氏武帝時以吏二千石自邯鄲徙焉曽祖父通以功封重合侯坐兄何羅反被誅故援再世不顯援三兄况余員並有才能王莽時皆二千石援年十二而孤少有大志諸兄竒之常受齊詩不能守章句乃辭况欲就邉郡田牧况曰汝大才當晚成良工不示人以朴且從所好會况卒援行服期年不離墓所事寡嫂不冠不入廬後為郡督郵送囚至司命府囚有重罪援哀而縱之遂亡命北地遇赦因留牧畜賓客多歸附者遂役屬數百家轉遊隴漢間常謂賓客曰丈夫為志窮當益堅老當益壯因處田牧至有馬牛羊數千頭榖數萬斛既而嘆曰凡殖貨財貴其能施賑也否則守錢虜耳乃盡散以頒昆弟故舊身衣羊裘皮袴王莽末四方兵起莽從弟衛將軍林廣招雄俊乃辟援及同縣原涉為掾薦之於莽莽以涉為鎮戎大尹援為新成大尹及莽敗援兄員時為增山連率與援俱去郡復避地涼州光武即位員先詣洛陽帝遣員復郡卒於官援因留西州隗囂甚敬重之以為綏德將軍與決籌策時公孫述稱帝於蜀囂使援往觀之援素與述同里閈相善以為既至當握手歡如平生而述乃盛陳陛衛以延援入交拜禮畢使出就館更為援制都布單衣交讓冠會百官於宗廟中立舊交之位述鸞旗旄騎警蹕就車罄折而入禮饗官屬甚盛欲授援以封侯大將軍位賓客皆樂留援曉之曰天下雌雄未定公孫不吐哺走迎國士與圖成敗反修飾邊幅如偶人形此子何足久稽天下士乎遂辭歸謂囂曰子陽井底蛙耳而妄自尊大不如專意東方建武四年冬囂使援奉書洛陽援至引見於宣德殿光武迎笑謂援曰卿遨遊二帝間今見卿使人大慙援頓首辭謝因曰當今之世非獨君擇臣也臣亦擇君耳臣與公孫述同縣少相善臣前至蜀述陛戟而後進臣臣今逺來陛下何知臣非刺客姦人而簡易若是帝復笑曰卿非刺客顧説客耳援曰天下反覆盜名字者不可勝數今見陛下恢廓大度同符高祖乃知帝王自有真也帝甚壯之援從南幸黎邱轉至東海及還以為待詔使太中大夫來歙持節送援西歸隴右隗囂與援同卧起問以東方流言及京師得失援説囂曰前到朝廷上引見數十每接宴語自夕至旦才明勇略非人敵也且開心見誠無所隱伏闊達多大節略與髙祖同經學博覽政事文辨前世無比囂曰卿謂何如髙帝援曰不如也髙帝無可無不可今上好吏事動如節度又不喜飲酒囂意不懌曰如卿言反復勝耶然雅信援故遂使長子恂入質援因將家屬隨恂歸洛陽居數月無他職任援以三輔地曠土沃而所將賓客猥多乃上書求屯田上林苑中帝許之會隗囂用王元計意更狐疑援數以書記責譬於囂囂怨援背己得書增怒遂發兵拒漢援乃上疏曰臣援自念歸身聖朝奉事陛下本無公輔一言之薦左右為容之助臣不自陳陛下何因聞之夫居前不能令人輊居後不能令人軒與人怨不能為人患臣所恥也故敢觸冒罪忌􅀈死陳誠臣與隗囂本實交友初囂遣臣東謂臣曰本欲為漢願足下往觀之於汝意可即專心矣而臣還反報以赤心實欲導之於善非敢譎以非義而囂自挾姦心盜憎主人怨毒之情遂歸臣臣欲不言則無以上聞願聼詣詣行在所極陳滅囂之術得空胸腹申愚策退就隴畝死無所恨帝乃召援計事援具言謀畫因使援將突騎五千往來遊説囂將髙峻任禹之屬下及羌豪為陳禍福以離囂支黨援又為書與囂將楊廣使曉勸於囂曰春卿無恙前别冀南寂無音驛援間還長安因留上林援竊見四海已安兆民同情而季孟閉拒背畔為天下表的常懼海內切齒思相屠裂故遺書戀戀以致惻隱之計乃聞季孟歸罪於援而納王遊翁諂邪之説自為函谷以西舉足可定以今而觀竟何如邪援間至河內過存伯春見其奴吉從西方還説伯春小弟仲舒望見吉欲問伯春無他否竟不能言曉夕號泣婉轉塵中又説其家悲愁之狀不可言也夫怨讐可刺不可毁援聞之不自知泣下也援素知季孟孝愛曾閔不過夫孝於其親豈不慈於其子可有子抱三木而跳梁妄作自同分羮之事乎季孟平生自言所以擁兵衆者欲以保全父母之國而完墳墓也又言茍厚士大夫而已而今所欲全者將破亡之所欲完者將毁傷之所欲厚者將反薄之季孟常折愧子陽而不受其爵今更共陸陸欲往附之將難為顔乎若復責以重質當安從得子主給是哉往時子陽獨欲以王相待而春鄉拒之今者歸老更欲低頭與小兒曹共槽櫪而食並肩側身於怨家之朝乎男兒溺死何傷而拘於遊哉今國家待春卿意深宜使牛孺卿與諸耆老大人共説季若計畫不從從真可引領去矣前披輿地圖見天下郡國百有六所奈何欲以區區二邦以當諸夏百有四乎春卿事季孟外有君臣之義內有朋友之道言君臣邪故當諫爭語朋友邪應有切磋豈有知其無成而但萎腇咋舌義手從族乎及今成計殊尚善也過是欲少味矣且來君叔天下信士朝廷重之其意依依常獨為西州言援啇朝廷猶欲立信於此必不負約援不得久留願急賜報廣竟不答八年帝自西征囂至漆諸將多以王師之重不宜逺入險阻計冗豫未決會召援夜至帝大喜引入具以羣議質之援因説隗囂將帥有土崩之勢進有必破之狀又於帝前聚米為山谷指畫形勢開示衆軍所從道徑往來分析曲折昭然可曉帝曰虜在吾目中矣明旦遂進軍至第一囂衆大潰九年拜援太中大夫副來歙監諸將平涼州自王莽末西羌寇邉遂入居塞內金城屬縣皆為虜有來歙奏言隴西侵殘非馬援莫能定十一年夏璽書拜援隴西太守援乃發步騎三千人擊破先零羌於臨洮斬首數百級獲馬牛羊萬餘頭守塞諸羌八千餘人詣援降諸種有數萬屯聚寇鈔拒浩舋隘援與揚武將軍馬成擊之羌因將其妻子輜重移阻於允吾谷允音鉛吾音牙援乃潛行間道掩赴其營羌大驚擾復逺徙唐翼谷中援復追討之羌引精兵聚北山上援陳兵向山而分遣數百騎繞襲其後乘夜放火擊鼓呌譟虜遂大潰凡斬首千餘級以兵少少不得窮追收其榖糧畜産而還援中矢貫脛帝以璽書勞之賜牛羊數千頭援盡班諸賓客是時朝臣以金城破羌之西塗逺多寇議欲棄之援上言破羌以西城多完牢易可依固其田土肥壤灌溉流通如令羌在湟中則為害不休不可棄也帝然之於是詔武威太守令悉還金城客民歸者三千餘口使各反舊邑援奏為置長吏繕城郭起塢候開𨗳水田勸以耕牧郡中樂業又遣羌豪楊封譬説塞外羌皆來和親又武氏都人背公孫述者降者援皆上復其侯王君長賜印綬帝悉從之乃罷馬成軍十三年武都參狼羌與塞外諸種為寇殺長吏援將四千餘人擊之至氐道縣羌在山上援軍據便地奪其水草不與戰羌遂窮困豪帥數十萬戶亡出塞諸種萬餘人悉降於是隴右清靜援務開寬信恩以待下任吏以職但總大體而已賓客故人日滿其門諸曹時白外事援輒曰此丞掾之任何足相煩頗哀老子使得遨遊若大姓侵小民黠羌欲旅拒此乃太守事耳傍縣嘗有報仇者吏民驚言羌反百姓奔入城郭狄道長詣門請閉城發兵援時與賓客飲大笑曰燒虜何敢復犯我曉狄道長歸守寺舍良怖急者可狀下伏後稍定郡中服之視事六年徵入為虎賁中郎將初援在隴西上書言宜如舊鑄五銖錢事下三府三府奏以為未可許事遂寢及援還從公府求得前奏難十餘條乃隨牒解釋更具表言帝從之天下賴其便援自還京師數被進見為人明爽須髮眉目如畫間於進對尤善述前世行事每言及三輔長者下至閭里少年皆可觀聼自皇太子諸王侍聞者莫不屬耳忘倦又善兵策帝嘗言伏波論兵與我意合每有所謀未嘗不用初卷人維汜訞言稱神有弟子數百人坐伏誅其後弟子李廣等宣言汜神化不死誑惑百姓十七年遂聚黨攻沒皖城殺皖侯劉閔自稱南嶽太師遣謁者張宗將兵數千人討之復為廣所敗於是使援發諸郡兵合萬餘人擊破廣等斬之又交趾女子徵側反女弟徵二反攻沒其郡九真日南合浦蠻夷皆應之寇略嶺外六十餘城側自立為王於是璽書拜援伏波將軍以扶樂侯劉隆為副督樓船將軍段志等南擊交趾軍至合浦而志病卒詔援並將其兵遂緣海而進隨山刋道千餘里十八年軍至浪泊上與賊戰破之斬首數千級降者萬餘人援追徵側等至禁溪數敗之賊遂散走明年正月斬徵側徵二傳首洛陽封援為新息侯食邑三千戶援乃擊牛釃酒勞饗軍士從容謂官屬曰吾從弟少遊常哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車御款段馬為郡掾吏守墳墓鄉里稱善人斯可矣致求盈餘但自苦耳當吾在浪泊西里間虜未滅之時下潦上霧毒氣熏蒸仰視飛鳶跕跕墮水中臥念少遊平生時語何可得也今賴士大夫之力被蒙大恩猥先諸君紆佩金紫且喜且慙吏士皆伏稱萬歲援遂將樓船大小二千餘艘戰士二萬餘人擊九真賊徵側餘黨都羊等自無功至居風斬獲五千餘人嶠南悉平援奏言西于縣戶有三萬二千逺界去庭千餘里請分為封溪望海二縣許之援所過輒為郡縣治城郭穿渠灌溉以利其民條奏越律與漢律駮者十餘事與越人申明舊制以約束之自後駱越奉行馬將軍故事二十年秋振旅還京師軍吏經瘴疫死者十四五賜援兵車一乘朝見位次九卿援好騎善别名馬於交趾得駱越銅鼓乃鑄為馬式還上之因表曰夫行天莫如龍行地莫如馬馬者甲兵之本國之大用安寧則以别尊卑之序有變則以濟遠近之難昔有騏驥一日千里伯樂見之昭然不惑近有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援常師事子阿受相馬骨法考之於行事輒有驗效臣愚以為傳聞不如親見視景不如察形今欲形之於生馬則骨法難備又不可傳之於後孝武皇帝時善相馬者東門京鑄作銅馬法獻之有詔立於魯班門外則更名魯班門曰金馬門臣謹依儀氏羈中帛氏口齒謝氏晨鬐丁氏身中備此數家骨相以為法馬髙三尺五寸圍四尺四寸謹以上之有詔置於宣德殿下以為名馬式焉初援軍還將至故人多迎勞之平陵人孟冀名有計謀於坐賀援援謂之曰吾望子有善言反同衆人邪昔伏波將軍路博德開置七郡裁封數百户今我微勞猥享大縣功薄賞厚何以能長久乎先生奚用相濟冀曰愚不及援曰方今丐奴烏桓尚擾北邉欲請擊之男兒要當死於邉野以馬革裹尸還葬耳何能臥牀上在兒女子手中邪冀曰諒為烈士當如此矣還月餘會丐奴烏桓寇扶風援以三輔侵擾園陵危逼因請行許之自九月至京師十二月復出屯襄國詔百官祖道援謂黃門郎梁松竇固曰凡人為貴當使可賤如卿等欲不可復賤居髙堅自持勉思鄙言松後果以貴滿致災固亦幾不免明年秋援將三千騎出髙栁行鴈門代郡上谷障塞烏桓侯者見漢軍至虜遂散去援無所得而還援嘗有疾梁松來候之獨拜牀下援不答松去後諸子問曰梁伯孫帝壻貴重朝廷公卿已下莫不憚之大人奈何不為禮援曰我乃松父友也雖貴何得失其序乎松由是恨之二十四年武威將軍劉尚擊武陵五溪蠻夷深入軍沒援復請行時年六十二帝愍其老未許之援自請曰臣尚能披甲上馬帝令試之援據鞍顧盻以示可用帝笑曰矍鑠哉是翁也遂遣援率中郎將馬武耿舒劉匡孫永等將十二郡募士及弛刑四萬餘人征五溪援夜與送者訣謂友人謁者杜愔曰吾受厚恩年迫餘日索常恐不得死國事今獲所願甘心瞑目但畏長者家兒或在左右或與從事殊難得調介介獨惡是耳明年春軍至臨鄉遇賊攻縣援迎擊破之斬獲二千餘人皆散走入竹林中時軍次下雋字兖反有兩道可入從壺頭則路近而水嶮從充則塗夷而運逺帝初以為疑及軍至耿舒欲從充道援以為棄日費糧不如進壺頭扼其喉咽充賊自破以事上之帝從援策三月進軍壺頭賊乘髙守隘水疾船不得上會暑甚士卒多疫死援亦中病遂困乃穿岸為室以避炎氣賊每升險鼓譟援輒曵足以觀之左右哀其壯意莫不為之流涕耿舒與兄好畤侯弇書曰前舒上書當先擊充糧雖難運而兵馬得用軍人數萬爭欲先奮今壺頭竟不得進大衆怫鬱行死誠可痛惜前到臨鄉賊無故自致若夜擊之即可殄滅伏波類西域賈胡到一處輒止以是失利今果疾疫皆如舒言弇得書奏之帝乃使虎賁中郎將梁松乘驛責問援因代監軍會援病卒松素懷不平遂因事陷之帝大怒追收新息侯印綬初援兄子嚴敦並喜譏議而通輕俠客援前在交趾還書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好議論人長短妄是非正法此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施襟結䄜申父母之誡欲使汝曹不忘之耳龍伯髙敦厚周愼口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹效也效伯髙不得猶為謹敕之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也訖今季良尚未可知郡將下車輒切齒州郡以為言吾常為寒心是以不願子孫效也季良名保京兆人時為越騎司馬保仇人上書訟保為行浮薄亂羣惑衆伏波將軍萬里還書以誡兄子而梁松竇固以之交結將扇其輕偽敗亂諸夏書奏帝召責松固以訟書及援誡書示之松固叩頭流血而得不罪詔免保官伯髙名述亦京兆人為山都長由此擢拜零陵太守初援在交趾常餌薏苡實用能輕身省欲以勝瘴氣南方薏苡實大援欲以為種軍還載之一車時人以為南土珍怪權貴皆望之援時方有寵故莫敢以聞及卒後有人上書譖之者以為前所載還皆明珠文犀馬武與於陵侯侯昱等皆以章言其狀帝益怒援妻子惶懼不敢以喪還舊塋裁買城西數畝地藁葬而已賓客故人莫敢弔會嚴與援妻子草索相連詣闕請罪帝乃出松書以示之方知所坐上書訴寃前後六上辭甚哀切然後得葬又前雲陽令同郡朱勃指闕上書言援有大功於國身死絶地而橫被誣罔之讒家屬杜門葬不歸墓怨隙並興宗親怖栗死者不能自列生者莫為之訟臣竊傷之願下公卿平援功罪宜絶宜續以厭海內之望書奏報歸田里勃字叔陽年十二能誦詩書常候援兄况勃衣方領能矩步言辭嫺雅援裁知書見之自失况知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝稟學勿畏也勃未二十右扶風請試守渭城宰乃援為將軍封侯而勃位不過縣令援後雖貴常待以舊恩而卑侮之勃愈身自親及援被誣惟勃能終焉肅宗即位追賜勃子榖二千斛初援兄子壻王磐子石王莽從兄平阿侯仁之子也莽敗磐擁富資居故國為人尚氣節而愛士好施有名江淮間後遊京師與衛尉隂興大司空朱浮齊王章共相友善援謂姊子曹訓曰王氏廢姓也子石當屏居自守而反遊京師長者用氣自行多所陵折其敗必也後歲餘磐果與司𨽻校尉蘇鄴丁鴻事相連坐死洛陽獄而磐子肅復出入北宫及王侯邸第援謂司馬吕种曰建武之元名為天下重開自今以往海內日當安耳但憂國家諸子並壯而舊防未立若多通賓客則大獄起矣卿曹戒愼之及郭后薨有上書者以為肅等受誅之家客因事生亂慮致貫髙任章之變帝怒乃下郡縣收捕諸王賓客更相牽引死者以千數吕种亦豫其禍臨命歎曰馬將軍誠神人也永平初援女立為皇后顯宗圖畫建武功臣於雲臺以椒房故獨不及援東平王蒼觀圖言於帝曰何故不畫伏波將軍像帝笑而不言至十七年援夫人卒乃更修封樹起祠堂建初三年肅宗使五官中即持節追策諡援曰忠成侯四子廖防光客卿客卿幼而岐嶷年六嵗能應接諸公專對賓客嘗有死罪亡命來過客卿逃匿不令人知外若訥而內沈敏援甚竒之以為將相器故以客卿字焉援卒後客卿亦夭沒廖字敬平以父任為即明德皇后既立拜廖為羽林左監虎賁中即將顯宗崩受遺詔典掌門禁遂代趙熹為衛尉肅宗甚尊重之時皇太后躬履節儉事從簡約廖慮美業難終上疏長樂宫以勸成德政曰臣案前世詔令以百姓不足起於世尚奢靡故元帝罷服官成帝御浣衣哀帝去樂府然而侈費不息至於衰亂者百姓從行不從言也夫改政移風必有其本傳曰吳王好劍客天下多創瘢楚王好細腰宫中多餓死長安語曰城中好髙髻四方髙一尺城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有切事實前下制度未幾後稍不行雖或吏不奉法良田慢起京師今陛下躬服厚繒斥去華飾素簡所安發自聖性此誠上合天心下順民望浩大之福莫尚於此陛下既已得之自然猶宜加以勉朂法太宗之隆德戒成哀之不終易曰不恆其德或承之羞誠令斯事一竟則四海誦德聲薰天地神明可通金石可勒而况於行仁心乎况於行令乎願置章坐側以當瞽人夜誦之音太后深納之朝廷大議輒以詢訪廖性質誠畏愼不愛權勢聲名盡心納忠不屑毁譽有司連據舊典奏封廖等纍讓不得已建初四年遂受封為順陽侯以特進就第每有賞賜輒辭讓不敢當京師以是稱之子豫為步兵校尉太后崩後馬氏失勢廖性寬緩不能教敕子孫豫遂投書怨誹又防光奢侈好樹黨與八年有司奏免豫遣廖防光就封豫隨廖歸國考擊物故後詔還廖京師永元四年卒和帝以廖先帝之舅厚加賻贈使者弔祭王主會喪諡曰哀侯子遵嗣徙封程鄉侯遵卒無子國除元初三年鄧太后紹封廖孫度為潁陽侯防字江平永平十二年與弟光俱為黃門侍郎肅宗即位拜防中即將稍遷城門校尉建初二年金城隴西保塞羌皆反拜防行車騎將軍以長水校尉耿恭副將北軍五校兵及諸郡積射士三萬人擊之軍到冀而羌豪布橋等圍南部都尉於臨洮防欲救之臨洮道險車騎不得方駕防乃别使兩司馬將數百騎分為前後軍去臨洮十餘里為大營多樹幡幟揚言大兵旦當進羌候見之馳還言漢兵盛不可當明旦遂鼓譟而前羌虜驚走因追擊破之斬首虜四千餘人遂解臨洮圍防開以恩信燒當種皆降唯布橋等二萬餘人在臨洮西南望曲谷十二月羌又敗耿恭司馬及隴西長史於和羅谷死者數百人明年春防遣司馬夏駿將五千人從大道向其前潛遣司馬馬彭將五千人從間道衝其心腹又令將兵長史李調等將四千人繞其西三道俱擊復破之斬獲千餘人得牛羊十餘萬頭羌退走夏駿追之反為所敗防乃引兵與戰於索西又破之布穚迫急將種人萬餘降詔徴防還拜車騎將軍城門校尉如故防貴寵最盛與九卿絶席光自越騎校尉遷執金吾四年封防頴陽侯光為許陽侯兄弟二人各六千户防以顯宗寢疾入參醫藥又平定西羌增邑一千三百五十户屢上表讓位俱以特進就第皇太后崩明年拜防光祿勳光為衛尉防數言政事多見采用是冬始施行十二月迎氣樂防所上也子巨為常從小侯六年正月以巨當冠特拜為黃門侍即肅宗親御章臺下殿陳鼎爼自臨冠之明年防復以病乞骸骨詔賜故中山王田廬以特進就第防兄弟貴盛奴婢各千人已上資産巨億皆買京師膏腴美田又大起第觀連閣臨道彌亘街路多聚聲樂曲度比諸郊廟賓客奔湊四方畢至京兆杜篤之徒數百人常為食客門下刺史守令多出其家嵗時賑給鄉閭故人莫不周給防又多牧馬畜賦斂羌胡帝不喜之數加譴敕所以禁遏甚備由是權勢稍損賓客亦衰八年因兄子豫怨謗事有司奏防兄弟奢侈踰僭濁亂聖化悉免就國臨上路詔曰舅氏一門俱就國封四時陵廟無助祭先后者朕甚傷之其令許侯思愆田廬有司勿復請以慰朕渭陽之情光為人小心周密喪母過哀帝以是特親愛之乃復位特進子康黃門侍即永元二年光為太僕康為侍中及竇憲誅光坐與厚善復免就封後憲奴誣光與憲謀逆自殺家屬歸本郡復殺康而防及廖子遵皆坐徙封丹陽防為翟鄉侯租嵗限三百萬不得臣吏民防後以江南下濕上書乞歸本郡和帝聽之十三年卒子巨嗣後為長水校尉永初七年鄧太后詔諸馬子孫還京師隨四時見會如故事復紹封光子朗為合鄉侯援兄子嚴字威卿父余王莽時為揚州牧嚴少孤而好擊劍習騎射後乃白援從平原楊太伯講學專心墳典能通春秋左氏因覽百家羣言遂交結英賢京師大人咸器異之仕郡督郵援常與計議委以家事弟敦字孺卿亦知名援卒後嚴乃與敦俱歸安陵居巨下三輔稱其行義號曰巨下二卿眀德皇后既立嚴乃閉門自守猶復慮致譏嫌更徙北地斷絶賓客永平十五年皇后勑使移居洛陽顯宗召見嚴進退間雅意甚異之有詔留仁壽闥與校書郎杜撫班固等雜定建武注記常與宗室近親臨邑侯劉復等論議政事甚見寵幸後拜將軍長史將北軍五校士羽林禁兵三千人屯西河美稷衛護南單于聼置司馬從事牧守謁敬同之將軍勑嚴過武庫祭蚩尤帝親御阿閣觀其士衆時人榮之肅宗即位徵拜侍御史中丞除子鱄為郎令勸學省中其冬有日食之異嚴上封事曰臣聞日者衆陽之長食者隂侵之徵書曰無曠庶官天工人其代之言王者代天官人也故考績黜陟以明褒貶無功不黜明隂盛陵陽臣伏見方今刺史太守專典州郡不務奉事盡心為國而司察偏阿取與自已同則舉為尤異異則中為刑法不即垂頭塞耳採取財賂今益州刺史朱酺揚州刺史倪説涼州刺史尹業等每行考事輒有物故又選舉不實曽無貶坐是使臣下得作威福也故事州部所舉上奏司直察能否以懲虛實今宜加防檢式遵前制舊丞相御史親治職事唯丙吉以年老優遊不案吏罪於是宰府習為常俗更共罔養以崇虛名或未曉其職便復遷徙誠非建官賦祿之意宜敕正百司各責以事州郡所舉必得其人若不如言裁以法令傳曰上德以寬服民其次莫如猛故火烈則人望而畏之水懦則人狎而玩之為政者寬以濟猛猛以濟寬如此綏御有體災眚消矣書奏帝納其言而免酺等官建初元年遷五官中郎將除三子為郎嚴數薦達賢能申理寃結多見納用復以五官中郎將行長樂衛尉事二年拜陳留太守嚴當之職乃言於帝曰昔顯親侯竇固誤先帝出兵西域置伊吾盧屯煩費無益又竇勳受誅其家不宜親近京師是時勳女為皇后竇氏方寵時有側聽嚴言者以告竇憲兄弟由是失權貴心嚴下車明賞罰發姦慝郡界清靜時京師訛言賊從東方來百姓奔走轉相驚動諸郡惶急各以狀聞嚴察其虛妄獨不為偹詔書敕問使驛係道嚴固執無賊後卒如言典郡四年坐與宗正劉軼少府丁鴻等更相屬託徵拜太中大夫十餘日遷將作大匠七年復坐事免後既為竇氏所忌遂不復在位及帝崩竇太后臨朝嚴乃退居自守訓教子孫永元十年卒於家時年八十二弟敦官至虎賁中郎將嚴七子唯續融知名續字季則七歲能通論語十三明尚書十六治詩博觀羣籍善九章算術順帝時為護羌校尉遷度遼將軍所在有威恩稱融自有傳援族孫稜字伯威少孤依從兄毅共居業恩猶同産毅卒無子稜心喪三年建初中仕郡功曹舉孝亷及馬氏廢肅宗以稜行義徵拜謁者章和元年遷廣陵太守時榖貴民飢奏罷監官以利百姓賑貧羸薄稅賦興復陂湖溉田二萬餘頃吏民刻石頌之永元二年轉漢陽太守有威嚴稱大將軍竇憲西屯武威稜多奉軍費侵賦百姓憲誅坐抵罪後數年江湖多劇賊以稜為丹陽太守稜發兵掩擊皆禽滅之轉會稽太守治亦有聲轉河內太守永初中坐事抵罪卒于家通志卷一百六
