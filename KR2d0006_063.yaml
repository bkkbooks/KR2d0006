body:
  text: 通志卷五十八宋右廸功郎鄭樵漁仲撰選舉略第一厯代制考績厯代制周官大司徒之職以鄉三物教萬民而賔興之物猶事也興猶舉也民之三事教既成鄉大夫舉其賢者能者以飲酒之禮而賔客之既則獻其書于王也一曰六徳二曰六行三曰六藝詩書禮樂謂之四術四術既修九年大成凡士之有善鄉老論士之秀者升諸司徒曰選士司徒論選士之秀者而升諸學曰俊士既升而不征者曰造士大樂正論造士之秀者升諸司馬曰進士司馬論進士之賢者及鄉老羣吏獻賢能之書于王王再拜受之登于天府藏于祖廟内史書其貳而行焉在其職也則鄉大夫鄉老舉賢能而賔其禮司徒教三物而興諸學司馬辨官材以定其論太宰詔廢置而持其柄内史贊與奪而貳於中司士掌其版而知其數論定然後官之任官然後爵之位定然後禄之蓋擇材取士如此之詳也秦自孝公納商鞅䇿富國彊兵為務仕進之途唯闢田與勝敵而已以至始皇遂平天下漢髙祖初未遑立制至十一年乃下詔曰賢士大夫既與我定有天下而不與吾共安利之可乎其有稱明法者御史中執法郡守必身勸駕遣詣丞相府署其行義及年有其人而不言者免官又制諸侯王得自除内史以下漢獨為置丞相也恵帝四年詔舉民孝悌力田者復其身髙后元年初置孝悌官二千石者一人文帝因晁錯言務農貴粟詔許民納粟得拜爵及贖罪至于景帝後元二年詔曰有市籍貲多不得官亷士寡欲易足今貲算十以上乃得官貲少則不得官朕甚憐之減至四算得官有市籍謂賈人有財不得為吏貲萬錢算百二十也算十萬時疾吏之貪以為衣食足知榮辱故限貲十萬乃得為吏亷士無貲減至四算乃得官也武帝建元初詔天下舉賢良方正直言極諫之士其治申商韓非蘇秦張儀之言亂國政皆罷之元光元年舉賢良董仲舒對曰今之郡守縣令民之師帥所使承流而宣化也故師帥不賢則主徳不宣恩澤不流夫長吏多出於郎中中郎吏二千石子弟選郎吏又以富貲未必賢也且古所謂功者以任官稱職為差非謂積日累久也故小材雖累日不離於小官賢材雖未乆不害為輔佐是以有司竭力盡智務治其業而以赴功今則不然累日以取貴積乆以致官是以亷恥貿亂賢不肖混殽也請令諸侯列卿郡守二千石擇其吏民之賢者嵗貢各二人以給宿衛且以觀大臣之能所貢賢者有賞不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也無以日月為功實試用賢能為上量材而授官録徳而定位則亷恥殊路賢不肖異處矣帝於是令郡國舉孝亷各一人又制郡國口二十萬以上嵗察一人四十萬以上二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二嵗一人不滿十萬三嵗一人限以四科一曰徳行髙妙志節清白二曰學通行修經中博士三曰明習法令足以決疑能按章覆問文中御史四曰剛毅多畧遭事不惑明足決斷材任三輔縣令至五年又詔吏民有明當世之務習先聖之術者縣次給食令與計偕至元朔元年又詔曰十室之邑必有忠信三人並行厥有我師今或至闔郡而不薦一人是化不下究而積行之君子壅於上聞也且進賢受上賞蔽賢䝉顯戮古之道也其與中二千石禮官博士議不舉者罪是時天下慎法莫敢謬舉而貢士蓋鮮故有斯詔有司奏請議曰古者諸侯貢士壹適謂之好徳再適謂之賢賢三適謂之有功廼加九錫不貢士一則黜爵再則黜地三則黜爵削地畢矣其不舉孝不奉詔當以不敬論不察亷為不勝任也當免奏可凡郡國之官非傅相其他既自辟置又調屬僚及部民之賢者舉為秀才亷吏而貢於王庭多拜為郎居三署無常員或至千人屬光禄勲故卿校牧守居閒待詔或郡國貢送公車徵起悉在焉光禄勲復於三署中詮第郎吏嵗舉秀才亷吏出為他官以補缺員元封五年又詔州縣察吏民有茂材異等可為將相及出使絶國初公孫𢎞以儒術為丞相天下之學士靡然嚮風時太常孔臧等曰請太常博士官置弟子五十人復其身太常擇民年十八以上儀狀端正者補博士弟子郡國縣道邑有好文學敬長上肅政教順鄉里出入不悖所聞者二千石謹察可者常與計偕詣太常得受業如弟子一嵗皆輙試能通一藝以上補文學掌故缺其髙第可以為郎中者太常籍奏即有秀才異等輙以名聞其不事學若下材及不能通一藝輙罷之而請諸不稱者罰時外事四夷内闕用度仍募人入羊穀奴婢得授官増秩復役除罪大至封侯卿大夫小者郎吏繇是吏雜而多端官職復耗廢矣孝昭始元初遣故廷尉王平等五人持節行郡國舉賢良至孝宣帝時諫議大夫王吉上言曰今使吏得任子弟率多驕驁不通古今至於積功治民無益於人此伐檀所為作也宜明選求賢除任子弟之令黄龍初制凡官秩六百石者不得舉為亷吏孝元帝永光元年春二月詔丞相御史舉質朴敦厚遜順有行者光禄嵗以此科第郎從官後又詔列侯舉茂才諫大夫張勃舉太官獻丞陳湯湯有罪勃坐削戸二百㑹薨故賜諡曰繆侯其為勸勵也如是故官得其才位必久安為吏者長子孫居官者以為姓號三代以降斯之為盛也建昭中因西羌反及日蝕京房奏百官各試其功災異可息遂詔房作考課吏法成帝建始四年初置常侍曹尚書一人主公卿又有二千石曹尚書一人掌郡國二千石蓋選曹之所由起也漢諸帝凡日蝕地震山崩川竭天地大變皆詔天下郡國舉賢良方正直言極諌之士率以為常又其有要任使皆標其目而令舉之王莽時太常學官子弟嵗課甲科四十人為郎中乙科二十人為太子舍人丙科四十人為文學掌故後漢光武十二年詔三公舉茂才各一人亷吏各一人左右將軍嵗察亷吏各二人光禄嵗舉茂才四行各一人察亷吏三人中二千石嵗察亷吏各一人廷尉大司農二人將兵將軍嵗察亷吏各二人監御史司𨽻州牧嵗舉茂才各一人改前漢常侍曹尚書為吏部尚書其時選舉於郡國屬功曹於公府屬東西曹於天臺屬吏曹尚書亦曰選部而尚書令總之其所進用加以嵗月先後之次凡郡國守相視事未滿嵗不得察舉孝亷亷吏以其未乆不周知也所徵舉率皆特拜不復簡試士或矯飾則謗議漸生章帝建初元年詔曰夫鄉舉里選必累功勞今刺史守相不明真偽茂才孝亷嵗以百數既非能著而當授之政事甚無謂也每尋前代舉人貢士或起畎畝不繫閥閲敷奏以言則文章可採明試以功則治有異迹文質斌斌朕甚嘉之始復用前漢丞相故事以四科辟士武帝因董仲舒之言立制故事在丞相府今復用之第一科補西曹南閤祭酒二科補議曹三科補四辭公奏四科補賦決凡所舉士先試之以職乃得充選其行尤異不宜試職者疏於他狀舉非人兼不舉者罪舊制大郡口五六十萬舉孝亷二人小郡二十萬并有蠻夷者亦舉二人和帝以為不均下公卿議司徒丁鴻司空劉方上言凡口率之科宜有階品蠻夷雜錯不得為數自今郡國率二十萬口嵗舉孝亷一人四十萬二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二嵗一人不滿十萬三嵗一人帝從之又制縁邊郡口十萬以上嵗舉孝亷一人不滿十萬二嵗舉一人五萬以下三嵗一人推校當時戸口而一嵗所貢不過二百餘人安帝永初二年詔王官屬墨綬下至郎謁者經任博士居鄉里有亷清孝順之稱才任治民者國相嵗移名與計階上尚書公府通調令得外補順帝又増甲乙科員十人除郡國耆儒皆補郎舍人焉陽嘉元年尚書令左雄議改察舉之制限年四十以上儒者試經學文吏試章奏如有顔回子竒之類不拘年齒雄又言郡國孝亷古之貢士出則宰民宣協風教若其面牆則無所施用孔子曰四十不惑禮稱彊仕請自今孝亷年不滿四十不得察舉皆先詣公府諸生試家法文吏課牋奏副之端門練其虚實以觀異能以美風俗有不承科令者正其罪法若有茂才異行自不拘年齒乃班下郡國明年有廣陵孝亷徐淑年未及舉臺郎疑而詰之對曰詔書有如顔回子竒不拘年齒是故本郡以臣充選郎不能屈雄詰之昔顔回聞一知十孝亷聞一知幾淑無以對乃遣還郡於是濟隂太守胡廣等十餘人皆坐繆舉免黜唯汝南陳蕃潁川李膺下邳陳球等三十餘人得拜郎中自是牧守畏慄莫敢輕舉雄在尚書迄于永嘉十餘年間察選清平故多得其人雄又奏徵海内名儒為博士使公卿子弟為諸生有志操者加其俸禄及汝南謝亷河南趙建年始十二各能通經雄並奏拜童子郎自是負書來學雲集于京師侍中張衡上疏曰自初舉孝亷到今二百年必先孝行行有餘力乃草文法耳今詔書一以能誦章句結奏案為限雖有至孝不當其科所謂損本而求末者也自改試以來累有妖星震裂之災是天意不安於此法也後黄瓊為尚書令以雄前所上孝亷之選專用儒學文吏於取士之義猶有所違乃奏増孝悌及能從政者為四科范煜曰漢初詔舉賢良方正州郡察孝㢘秀才斯古諸侯貢士之方也中興以後復増敦朴有道仁賢能直言獨行髙節質直清白敦厚之屬榮路既廣自是竊名偽服寖以流競權門貴仕請謁繁興自左雄任事限年試才雖頗有不密固亦因識時宜而黄瓊胡廣張衡崔瑗之徒泥滯舊方互相詭駮循名者屈其短算實者挺其効雄在尚書天下不敢謬舉十餘年間稱為得人斯亦效實之徵乎舊典選舉委任三府三府有選參議椽屬咨其行狀度其器能受試任用責以成功名無可察者然後付之尚書舉刺請下廷尉覆案虚實得以行其誅罰桓帝建和初詔諸學生年十六以上比郡國明經試次第上名髙第十五人上第十六人為中郎中第十七人為太子舍人下第十七人為王家郎至永夀二年甲午詔復課試諸生補郎及舍人其後復制學生滿二嵗試通二經者補文學掌故不能通二經者須後試復隨輩試試通二經者亦得為文學掌故其已為文學掌故者滿二嵗試能通三經者擢其髙第為太子舍人其不得第者後試復隨輩試第復髙者亦得為太子舍人已為太子舍人滿二嵗試能通四經者擢其髙第為郎中其不得第者後試復隨輩試第復髙者亦得為郎中已為郎中滿二嵗試能通五經者擢其髙第補吏隨才而用其不得第者後試復隨輩試第復髙亦得補吏其後綱紀隳紊凡所選用莫非親故時議以州郡相阿人情比周乃制婚姻之家及兩州之人不得相臨遂復有三互法三互謂婚姻之家及兩州不得交互為官吏時史弼遷山陽太守其妻鉅野薛氏女以三互自上轉拜平原相是也禁網益密選用彌艱幽冀二州久闕而公府限以三互經時不補議郎蔡邕上言曰伏見幽冀舊壤鎧馬所出比年兵飢漸至空耗闕職經時吏民延屬而三府選舉逾月不定以避三互十一州有禁當取二州而已又二州之士或復限以嵗月狐疑淹遲以失事㑹愚以為三互之禁禁之薄者但申以威靈明其憲令在任之人豈不戒懼而坐設三互自生留閡邪昔韓安國起自徒中朱買臣出於幽賤並以才宜還守本邦豈復顧循三互繼以末制者乎臣願蠲除近禁其諸州刺史器用可授者無拘日月三互以差厥中靈帝不省是時諸博士試甲乙科爭第髙下更相告訟頗行賄賂改蘭臺漆書之經以合其私文者帝乃詔諸儒讐定五經而䥴石以刋其文使蔡邕等書為古文篆𨽻三體立於太學門謂之石經由是爭者乃息凡學士不得有金痍痼疾督郵書其版舉主保之其督郵版狀曰生事愛敬喪没如禮如治易尚書孝經論語兼綜載籍窮微闡奥師事某官見授門徒五十人以上隠居樂道不求聞逹身無金痍痼疾三十六屬不與妖惡交通王侯賞賜行應四科經任博士下署某官某甲保舉魏文帝為魏王時三方鼎立士流播遷四民錯雜詳覈無所延康元年吏部尚書陳羣以天朝選用不盡人才乃立九品官人之法州郡皆置中正以定其選擇州郡之賢有識鍳者為之區别人物第其髙下又制郡口十萬以上嵗察一人其有秀異不拘戸口其武官之選則俾䕶軍主之黄初三年始除漢限年之制令郡國貢舉勿拘老㓜儒通經術吏逹文法則皆試用焉自明帝太和之後俗用浮靡遞相標目而夏侯諸葛何鄧之儔有四聰八逹之稱帝深忌嫉之於是惡士大夫之有名聲者或禁錮廢黜以懲之吏部尚書盧毓奏曰古者敷奏以言明試以功今考績之法廢而以毁稱相進退故真偽混雜也帝遂詔散騎常侍劉邵作都官考課之法以考覈百官焉齊王嘉平初曹爽既誅司馬懿秉政乃詳求治本中䕶軍夏侯元言曰夫官才用人國之柄也故銓衡專於臺閣上之分也孝行考乎閭巷優劣任之鄉人下之叙也奚必使中正干銓衡之機於下而執機柄者有所委仗於上上下交侵以生紛錯哉且衆職之屬各有官長但使官長各以其屬能否獻之臺閣如其不稱責負在外則内外相參得失有所庶可靜風俗而審官才矣懿因辭不能改請俟於他賢按九品之制初因後漢建安中天下兵興衣冠士族多離本土欲徵源流慮難委悉魏氏革命州郡縣俱置大小中正各取本處人任諸府公卿及臺省郎吏有徳充才盛者為之區别所管人物定為九等其有言行修著則升進之或以五升四以六升五儻或道義虧缺則降下之或自五退六自六退七矣是以吏部不能審定覈天下人才士庶故委中正銓第等級憑之授受以免乖失及法弊也唯能知其閥閲非復辨其賢愚所以劉毅云下品無髙門上品無寒士南朝至于梁陳北朝至于周隋選舉之法雖互相損益而九品及中正至隋開皇中方罷之晉依魏氏九品之制内官吏部尚書司徒左長史外官州有大中正郡國有小中正皆掌選舉若吏部選用必下中正問其人居及父祖官名武帝㤗始初又議考課散騎常侍傅元皇甫陶以為政教頽弊風俗不淳各言其故元之議以散官衆而學校未設遊手多而親農者少工噐不盡其宜臣以為宜亟定其制陶之議欲令賜拜散官皆課使親耕今文武之官既衆而賜拜不在職者又多加服役為兵不得耕稼當農者之半南面食禄者參倍於前使冗散之官為農而收其租税家得其實而天下之榖可以無乏矣虞書曰三載考績三考黜陟幽明是為九年之後乃有遷叙也故居官久則念立慎終之化不久則競為一切之政六年之限日月淺近不周黜陟武帝甚善其議而終不能用于時雖風教頽失而無典制然時有清議尚能勸俗陳夀居喪使女奴丸藥積年沉廢郄詵篤孝以假葬違常降品一等其為懲勸也如是其後中正任久愛憎由已而九品之法漸弊遂計官資以定品格天下唯以居位者為貴尚書僕射劉毅以九品者始因魏初喪亂是軍中權時之制非經久之典也因用土斷復古鄉舉里選之法上疏陳八損之義謂職名中正實為姦府事名九品而有八損臣以為宜罷中正除九品棄魏氏之弊法立一代之美制司空衛瓘又表請除九品復古鄉議里選又劉頌為吏部尚書復建九班之制令百官在職少遷時賈郭專朝仕者務速進故皆不行及東晉元帝制揚州嵗舉二人諸州各一人以天下喪亂務存慰勉逺方孝秀不復䇿試到即除授既經略粗定乃詔試經有才不中舉者免其太守其後孝秀莫敢應命有送至京師皆以疾辭太興三年尚書孔坦議請普延五嵗許其講習乃詔孝亷申至七年而秀才如故宋初制丹陽呉會稽呉興四郡嵗舉二人餘郡各一人凡州秀才郡孝亷至皆䇿試天子或親臨之及公卿所舉皆屬于吏部叙才銓用凡舉得失各有賞罰失者其人加之禁錮年月多少隨羣議制文帝元嘉中限年三十而仕郡縣以六周而代刺史或十有餘年及孝武即位仕者不拘老㓜守宰以三周為滿左衛將軍謝荘以其時捜才路狹又上表曰九服之曠九流之雜提鈞懸衡委之選部一人之鍳易限而天下之材難源以易限之鍳照難源之才使國㒺遺授野無滯器其可得乎請普令大臣各舉所知以付尚書銓用不從帝又不欲重權在下乃分吏部置兩尚書以散其權裴子野曰官人之難先王言之尚矣居家視其孝友鄉黨察其誠信出入觀其志義憂難取其智謀煩之以事以求其理臨之以利以察其亷周禮始於學校論之州里告諸六事而後貢于王庭其在漢家尚猶然也州郡積其功能然後為五府所辟五府舉其掾屬而升之於朝三公參其得失除署尚書奏之天子一人之身所閲者衆一賢之進其課也詳故能官得其才鮮有敗事魏晉易是而所失𢎞多夫厚貌深𠂻險如谿壑擇言觀行猶懼弗同况今萬品千羣俄折乎一面庶僚百位專斷於一司於是囂風遂行不可止也孝武雖分選曹為兩不能反之於周漢朝三暮四其病愈甚齊尚書都令史駱宰議䇿秀才格五問並得為上四三為中二為下詔從之因習宋代限年之制然而鄉舉里選不覈才徳其所取進以官婚胄籍為先遂令甲族以二十登仕後門以三十試吏故有増年矯貌以圖進者其時士人皆厚結姻援奔馳造請浸以成俗焉至和帝時梁武帝為丞相上表曰前代選官皆立選簿應在貫魚自有銓次胄籍升降行能臧否或素定懐抱或得之餘論故得簡通賔客無俟埽門頃代陵夷九流乖失其有勇退忌進懐質抱真者選部或以未經朝謁難於進用或有晦善藏聲自埋衡蓽者又以名不表著絶其階緒必須書刺投狀然後彈冠則是驅廹亷隅奨成澆競遂依舊例立簿梁初無中正制年三十有五方得入仕天監中又制凡九流常選年未三十不通一經者不得為官若有才同甘顔勿限年次至七年州置州重郡置郡崇鄉置鄉豪各一人專典捜薦無復膏粱寒素之隔普通七年詔凡州嵗舉二人大郡一人至敬帝太平二年復令諸州各置中正仍舊訪選舉皆須中正押上然後量授不然則否陳代依梁制凡年未三十不得入仕唯經學生䇿試得第諸州迎主簿西曹左奏及嘗為挽郎得未壯而任諸郡唯正王為丹陽尹經迎得出身者亦然庶姓尹則否有髙才異行殊勲别降恩㫖叙用者不在常例凡選無定時隨缺則補官有清濁以為升降從濁得清則勝於遷若有遷授吏部先為白牒列十數人名尚書與參掌者共署奏勅或可或否其可者則下於選曹量貴賤别内外隨才補用以黄紙録名八座通署奏可乃出以付於典名典名書其名帖鶴頭版修容整儀送所授之家其别發詔除者即宣付詔局詔局草奏聞勅可黄紙寫出門下門下答詔請付外施行又書可付選司行名得官者不必皆待名到但聞詔出明日即入謝後詣尚書上省拜受若拜王公則臨軒凡拜官皆在午後初武帝承侯景喪亂之後綱維頽壊制度未立百官無復考校殿最之法但更年互遷驟班進秩法無可稱者後徐陵孔奐繼為吏部尚書差有其序焉後魏州郡皆有中正掌選舉每以季月與吏部銓擇可否其秀才對䇿第居中上表叙之文成帝和平三年詔曰今選舉之官多不以次令班白處後晚進居先豈所謂彞倫攸叙者也諸曹選補宜各書勞舊才能初崔浩為冀州大中正薦冀定相幽并五州士數十人各起家為郡守景穆帝謂浩曰先召之人亦州郡選也在職已久勤勞未答令先補前召外任郡縣以新召者代為郎吏又守宰人使更事者浩固爭而遣之髙允聞之謂東宫博士管恬曰崔公其不免乎茍逞其非而校勝於上何以能濟又李孝伯趙郡人父曽治鄭氏禮左氏春秋郡三辟功曹不就門人勸之曽曰功曹之職雖曰鄉選髙第猶是郡吏耳北面事人亦何容易仕郡主簿到官月餘日乃歎曰梁叔敬有云州郡之職徒勞人耳道之不行身之憂也遂還家又郭祚為吏部尚書特潔清重惜官位至於銓授假令得人必徘徊乆之然後下筆即云此人便已貴矣由是事頗為稽滯當時每招怨讟然所㧞用者量才稱職時又以此歸之其後中正所銓但在門第吏部彞倫仍不以才舉至孝文帝勵精求治内官通班以上皆自考覈以為黜陟宣武帝詔庶族子弟年十五不聽入仕任城王澄從幸鄴官除吏部尚書及幸代輦駕自北廵留澄銓簡舊臣初魏自公侯以下迄于選臣動有萬數冗散無事澄品為三品等量其優劣盡其能否之用咸無怨者又韋伯昕兄子瑒為吏部郎性貪婪鬻賣吏官皆有定價自太和以前精選中正徳髙鄉國者充其邊州小郡人物單鮮者則併附他州其在選陋者則闕而不置當時稱為簡當頗謂得人及宣武孝明之時州無大小必置中正既不可悉得其人故或有蕃落庸鄙操銓覈之權而選叙頽紊至正始元年冬乃罷諸郡中正時有以雜類冒登清流遂令在位者皆五人相保無人任據者則奪官還役初孝明嗣位㓜冲靈太后臨朝征西將軍冀州大中正張彞之子仲瑀上封事請銓别選格排抑武夫不使在清品於是武夫怨怒聲諠道路乃牓於衢㑹期屠害彞父子靈太后於是乃命武官得依資入選既而官員少而應調者多選曹無以處之及崔亮為吏部尚書乃奏為格制官不問賢愚以停解日月為斷雖復官須此人停日後者終不得取庸才下品年月久者則先擢用時沉滯者皆稱其能時亮外甥司空諮議劉景安書規亮曰商周以鄉塾貢士兩漢由州郡薦才魏晉因循又置中正諦觀在昔莫不審舉雖未盡美足應十收六七朝廷貢才止求其文不取其理察孝亷唯論章句不及理道立中正不考人才行業空辨姓氏髙下至於取士之途未溥沙汰之理未精而舅屬當銓衡宜須改張易調如之何反為停年之格以限之天下士誰復修厲名行哉後甄琛元修義城陽王徽相繼為吏部尚書利其便已踵而行之自是賢愚同貫涇渭無别魏之失才從亮始也及辛雄為尚書右丞轉吏部郎中上疏曰自神龜以來專以停年為選士無善惡嵗久先叙職無劇易名到授官執案之吏以差次日月為功能銓衡之人以簡得老舊為平直且庸劣之人莫不貪鄙委斗筲以共理之重託碩䑕以百里之命可乎蓋助陛下理天下者唯在守令今最須簡置以康國道但郡縣選舉由來所輕貴遊儁才莫肯居此宜改其弊以定官方請上等郡縣為第一清中等為第二清下等為第三清不得拘以停年三載黜陟有稱者補在京名官如前代故事不厯郡縣不得為内職則人思自勉書奏㑹明帝崩及孝荘帝初詔求徳行文藝政事彊直者縣令郡守刺史皆叙其志業具以表聞得三人以上縣令太守刺史賞一階舉非其人者黜一階凡官郡守縣令六年為滿滿之後六年乃叙之北齊選舉多沿後魏之制凡州縣皆置中正其課試之法中書䇿秀才集書䇿考貢士考功郎中䇿亷良天子常服乘輿出坐於朝堂中楹秀孝各以班草對字有脱誤者呼起立席後書有濫劣者飲墨水一升文理孟浪者奪席脱其容刀初東魏元象中文襄王髙澄秉政攝吏部尚書乃革後魏崔亮年勞之制務求才實自遷鄴以後掌大選知名者不過數四文襄年少髙爽其弊也疎袁聿修沈密謹厚所傷者細楊遵彦風流辯給所取失於浮華唯辛雄學術精明簡習新舊參舉管庫必擢門閥不遺衡鑑之美者一人而已至孝昭帝皇建二年詔内外執事官從五品以上三府主簿録事參軍諸王文學侍御史廷尉三官尚書郎中中書舍人每在三年之内各舉一人或夙在朝倫沈屈未用或先官後進今見停散或白屋之人巾褐未釋其髙才良器允文允武理識深長幹具通濟操履凝峻學業宏瞻諸如此輩隨取一長無待兼資方充舉限所薦之文指論事實隨能量用必陳所堪不得髙談謬加褒飾所舉之人止在一職三周之内有犯死罪以下刑罪以上舉主凖舉人犯各罰其金自鞭以下舉主勿論凡所舉人主事立功禆益時政舉主之賞亦當非次被舉之人别當擢授其違限不舉依式罰金又擁旄作鎮任總百城分符共治職司千里凡其部統理宜悉委刺史於所綰之内下郡太守縣令丞尉府佐録事參軍以降州官州官都主簿以下但霑在吏職並聽表薦太守則曹掾以下及綰内之人亦聽表舉其大州中州下州畿内上郡中郡並三年之内各舉一人其不入品州并自餘郡守不在舉限昔三代以前天下列國有三卿五大夫二十七士大國三卿二卿命於天子一卿命於其君小國三卿一卿命於天子二卿命於其君公侯伯之大夫再命子男之大夫一命其士以下不命皆國君專之漢初王侯國百官皆如漢朝唯丞相命於天子其御史大夫以下皆自置及景帝懲呉楚之亂殺其制度罷御史大夫以下官至武帝時又詔凡王侯吏職秩二千石者不得擅補其州郡佐吏自别駕長史以下皆刺史太守自辟厯代因之而不革洎北齊武平中後主失政多有佞倖乃賜其賣官分占州郡下及鄉官多降中旨故有勅用州主簿郡功曹者自是之後州郡辟士之權浸移於朝廷以故外吏不得精覈皆由此起也後周以吏部中大夫一人掌選舉小吏部下大夫一人以貳之初霸府時蘇綽為六條詔書其四曰擢賢良綽深思本始懲魏齊之失罷門資之制其所察舉頗加精慎焉及武帝平齊廣收遺逸乃詔山東諸州舉明經幹理者上縣六人中縣五人下縣四人至宣帝大成元年詔州舉髙才博學者為秀才郡舉經明行修者為孝亷上州上郡嵗一人其刺史僚佐州吏則自署府官則命於朝廷至隋文帝開皇七年制諸州嵗貢三人工商不得入仕開皇十八年又詔京官五品以上及總管刺史並以志行修謹清平幹濟二科舉人牛𢎞為吏部尚書髙構為侍郎冣為稱職當時之制尚書舉其大者侍郎銓其小者則六品以下官吏咸吏部所掌自是海内一命以上之官州郡無復辟署矣自後魏末北齊以來州郡僚佐多為吏部所授至隋一切歸在省司牛𢎞嘗問劉炫曰按周禮士多而府史少今吏百倍於前判官減即不濟其故何也炫對曰古人委任責成嵗終考其最殿案不重校文不繁悉府史之掌要目而已今之文簿常慮覆理鍛錬若不密萬里追證百年舊案故諺云老吏抱案死今古不同若此之相逺也事繁政弊蓋職此之由𢎞又問魏齊之時令史從容而已今則不遑寧捨其事何由炫對曰往者州唯置綱紀郡置守丞縣唯令而已其寮屬則長官自辟受詔赴任每州不過數十今則不然大小之官悉是吏部纖介之迹皆屬考功所以繁也省官不如清心官事不省而欲從容其可得乎𢎞甚善其言而不能用之自後周以降選無清濁初盧愷攝吏部尚書與侍郎薛道衡陸彦師甄别物類頗為清簡而譖愬紛紜愷及道衡皆除名焉煬帝始建進士科又制百官不得計考増級其功徳行能有昭然者乃擢之大業三年始置吏部侍郎一人分掌尚書職事時武夫參選多授文職大業八年詔曰頃自班朝治人乃由勲叙㧞之行陣起自勇夫蠧政害民實由於此自今以後諸授勲官者並不得因授文官職事唐人貢士之法多循隋制上郡嵗三人中郡二人下郡一人有才能者無常數其常貢之科有秀才有明經有進士有明法有書有算自京師郡縣皆有學焉每嵗仲冬郡縣館監課試其成者長吏㑹屬僚設賔主陳俎豆備管絃牲用少牢行鄉飲酒禮歌鹿鳴之詩徵耆艾叙少長而觀焉既餞而與計偕其不在館學而舉者謂之鄉貢舊令諸郡雖一二三人之限而實無常數到尚書省始由戸部集閲而關于考功課試可者為第武徳舊制以考功郎中監試貢舉貞觀以後則考功員外郎專掌之律曰諸貢舉非其人及應貢舉而不貢舉者一人徒一年二人加一等罪止徒三年初秀才科等最髙試方略䇿五條有上上上中上下中上凡四等貞觀中有舉而不第者坐其州長由是廢絶開元二十四年以後復有此舉其時以進士漸難而秀才本科無帖經及雜文之限反易於進士主司以其科廢乆不欲收奨應者多落之三十年來無及第者至天寳初禮部侍郎韋陟始奏請有堪此舉者令官長特薦其常年舉送者並停自是士族所趣嚮唯明經進士二科而已其初止試䇿貞觀八年詔加進士試讀經史一部至調露二年考功員外郎劉思立始奏二科並加帖經後又加老子孝經使兼通之髙宗永隆二年詔明經帖十得六進士試文兩篇通文律者然後試䇿武太后載初元年二月䇿問貢人于洛城殿數日方了殿前試人自此始長夀三年制始令舉人獻嵗元㑹列於方物之前以備充庭長夀二年太后自製臣軌兩篇令貢舉習業仍停老子長安二年教人習武藝每嵗如明經進士之法行鄉飲酒禮送于兵部開元十九年詔武貢人與明經進士同行鄉飲酒禮其課試之制畫帛為五規置之於垜去之百有五歩列坐引射名曰長垜弓用一石力箭重六錢又穿土為埓其長與垜均綴皮為兩鹿厯置其上馳馬射之名曰馬射鹿子長五寸髙三寸弓用七斗以上力又斷木為人戴方版於頂凡四偶人互列埒上馳馬入埒運槍左右觸必版落而人不踣名曰馬槍槍一丈八尺徑一寸五分重八斤其木人上版方三寸五分皆以儇好不失者為上兼有歩射穿札翹關負重身材言語之選通得五上者為第其餘復有平射之科不拘色役髙第者授以官其次以類升又制為土木馬於里閭間教人習騎天寳六載正月制文武之道既惟並用宗敬之儀不可獨闕其鄉貢武舉人上省先令拜謁太公廟每拜大將及行師克㨗亦宜告廟神龍二年二月制貢舉人停臣軌依舊習老子開元八年七月國子司業李元瓘上言三禮三𫝊及毛詩尚書周易等並聖賢微㫖生民教業必事資經逺則斯道不墜今明經所習務在出身咸以禮記文少人皆競讀周禮經邦之軌則儀禮荘敬之楷模公羊榖梁厯代崇習今兩監及州縣以獨學無友四經殆絶事資訓誘不可因循其學生請停各量配作業并貢人參試之曰習周禮儀禮公羊榖梁并請帖十通五許其入䇿以此開勸即望四海均習九經該備詔從之二十一年明皇新注老子成詔天下每嵗貢士減尚書論語二䇿而加老子焉二十四年制移貢舉於禮部以侍郎掌之因考功員外郎李昂詆訶進士李權文章大為權所陵折朝議以郎官地輕故移之於禮部遂為永例二十五年二月制明經帖十取通五以上免舊試一帖仍按問大義十條取六以上免試經䇿十條令答時務䇿三道取粗有文理者與及第其進士停小經凖明經帖大經十帖取通四以上然後凖例試雜文及䇿考通與及第其明經中有明五經以上試無不通者進士中兼有精通一史能試䇿十條得六以上者奏聽進止其應試進士等唱第訖具所試雜文及䇿送中書門下詳覆禮部侍郎姚奕奏明皇方𢎞道化至二十九年始於京師置崇元館諸州置道學生徒有差京都各百人諸州無常員習老荘文列謂之四子䕃第與國子監同謂之道舉舉送課試與明經同凡舉司課試之法帖經者以所習經掩其兩端中間開唯一行裁紙為帖凡帖三字隨時増損可否不一或得四得五得六者為通後舉人積多故其法益難務欲落之至有帖孤章絶句疑似參互者以惑之甚者或上抵其注下餘一二字使尋之難知謂之倒㧞既甚難矣而舉人則有驅縣孤絶索幽隠為詩賦而誦習之不過十數篇則難者悉詳矣其於平文大義或多牆靣焉天寳元年明經停老子加習爾雅十一載禮部侍郎楊浚始開為三行不得帖斷絶疑似之言也而明經所試一大經及孝經論語爾雅帖各有差帖既通而口問之一經問十義得六者為通問通而後試䇿凡三條三試皆通者為第進士所試一大經及爾雅舊制帖一小經并注至開元二十五年改帖大經其爾雅亦并令帖注帖既通而後試文試賦各一篇文通而後試䇿凡五條三試皆通者為第經䇿全通為甲第通四以上為乙第通三帖以下及䇿全通而帖經文不通四或帖經通四以上而䇿不通四皆為不第明法試律令各十帖試䇿共十條律七條令三條全通為甲通八以上為乙自七以下為不第書者試説文字林凡十帖説文六帖字林四帖口試無常限皆通者為第算者試九章海島孫子五曹張邱建夏侯陽周髀五經綴術緝古帖各有差九章三帖五經等七部各一帖綴術六帖緝古四帖兼試問大義皆通者為第凡衆科有能兼學則加超奨不在常限按令文科第秀才與明經同為四等進士與明法同為二等然秀才之科久廢而明經雖有甲乙丙丁四科進士有甲乙二科自武徳以來明經唯有丁第進士唯乙科而已於先試之期命舉人謁于先師有司卜日宿張於國學宰輔以下皆㑹而觀焉博集羣議講論而退之禮部閲試之日皆嚴設兵衛薦棘圍之捜索衣服譏訶出入以防假濫者焉其進士大抵千人得第者百一二明經倍之得第者十一二其制詔舉人不有常科皆標其目而捜揚之試之日或在殿庭天子親臨觀之試已糊其名於中考之文䇿髙者特授以美官其次與出身開元以後四海晏清士無賢不肖恥不以文章逹其應詔而舉者多則二千人少猶不減千人所收百纔有一武后頗渉文史好雕蟲之藝永隆中始以文章選士及永淳之後太后君臨天下二十餘年當時公卿百辟無不以文章逹因循遐久浸以成風寳應二年六月禮部侍郎楊綰奏諸州每嵗貢人依鄉舉里選察秀才孝亷勅旨州縣每嵗察孝亷取在鄉閭有孝悌亷恥之行薦焉委有司以禮待之試其所通之學五經之内精通一經兼能對䇿逹於治體者並量行業授官其明經進士道舉並停旋復其故矣貞元二年詔習開元禮者舉同一經例明經習律以代爾雅至六年詔禮部侍郎親故移試考功謂之别頭十六年中書舍人髙郢奏罷議者是之元和十三年權知禮部侍郎庾承宣奏復考功别頭之試初開元中禮部考試畢送中書門下詳覆其後中廢是嵗侍郎錢徽所舉送覆試多不中選由是貶官而舉人雜文復送中書門下長慶三年侍郎王起言故事禮部已放牓而中書門下始詳覆今請先詳覆而後放牓議者以起雖避嫌疑然失貢職矣諫議大夫殷侑言三史為書勸善懲惡亞於六經比來史學都廢至有身處班列而朝廷舊章莫能知者於是立史科及三𫝊之科先是進士試詩賦及時務䇿五道明經䇿三道建中二年中書舍人趙贊權知貢舉乃以箴論表贊代詩賦而皆試䇿三道太和八年禮部復罷進士議論而試詩賦文宗從内出題以試進士謂侍臣曰吾患文格浮薄昨自出題所試差勝乃詔禮部嵗取登第者三十人茍無其人不必充其數是時文宗好學嗜古鄭覃以經術位宰相深嫉進士浮薄屢請罷之文宗曰淳厚浮薄色色有之進士科取人二百年矣不可遽廢武宗即位宰相李徳裕尤惡進士嘗論公卿子弟艱於科舉武宗曰向聞楊虞卿兄弟朋比貴勢妨仕進之路昨黜楊知至鄭朴等抑其太甚耳有司不識朕意不放子弟即過矣但取實藝可也徳裕曰鄭肅封敖子孫皆有才不敢應舉臣無名第不當非進士然臣祖天寳末以仕進無他岐勉彊隨計一舉登第自後家不置文選蓋惡其不根藝實然朝廷顯官須公卿子弟為之何者少習其業目熟朝廷事䑓閣之儀不教而自成寒士縱有出人之才固不能嫻習也則子弟未易可輕及唐之季世進士之科尤為浮薄時皆知其非而不能更革也凡旨授官悉由于尚書文官屬吏部武官屬兵部謂之銓選唯員外郎御史及供奉之官則否供奉官若起居補闕拾遺之類雖是六品以下官而皆勅授不屬選司開元四年始冇此制凡吏部兵部文武選事各分為三銓尚書典其一侍郎分其二文選舊制尚書掌六品七品選侍郎掌八品九品選景雲初宋璟為吏部尚書始通其品員而分典之遂以為常凡選始於孟冬終於季春先時五月頒格於郡縣示人科限而集之初皆授状於本郡或故任所述罷免之由而尚書省限十日至省乃考覈資緒郡縣鄉里名籍父祖官名内外族姻年齒形状優劣課最譴負刑犯必具焉以同流者五五為聨以京官五人為保一人為識皆列名結欵不得有刑家之子工賈殊類及假名承偽隠冒升降之徒應選者冇知人之詐冒而紏得三人以上者優以授之其試之日除場援棘譏察防檢如禮部舉人之法其擇人有四事一曰身取其體貌豐偉二曰言取其詞論辨正三曰書取其楷法遒美四曰判取其文理優長四事可取則先乎徳行徳均以才才均以勞其六品以降計資量勞而擬其官五品以上不試列名上中書門下聽制勅處分凡選始集而試觀其書判已試而銓察其身言已銓而注詢其便利乃擬其官已注而唱示之不厭者得反通其辭他日更其官而告之如初又不厭者亦如之三唱而不服聽冬集服者以類相從攅之為甲先簡僕射乃上門下省給事中讀之黄門侍郎省之侍中審之不審者皆得駮下既審然後上聞下主者受旨而奉行焉各給以符而印其上謂之告身其文曰尚書吏部告身之印自出身之人至于公卿皆給之武官則受於兵部兵部武選亦然課試之法如舉人之制取其軀幹雄偉應對詳明有驍勇材藝及可為統帥者若文吏求為武選取身長六尺以上籍年四十以下彊勇可以統人者武夫求為文選取書判精工有治民之材而無殿犯者凡官已受成皆殿庭謝恩其黔中嶺南閩中郡縣之官不由吏部以京官五品以上一人充使就補御史一人監之四嵗一往謂之南選凡居官以年為考六品以下四考為滿武徳初因隋舊制以十一月起選至春則停至貞觀二年劉林甫為吏部侍郎以選限既促多不究悉遂奏四時聽選隨到注擬當時以為便十九年十一月馬周為吏部尚書以吏部四時提衡畧無休暇遂請取所由文解十月一日起到三月三十日畢自髙宗麟徳以後承平既久民康俗阜求進者衆選人漸多總章二年裴行儉為司列少常伯始設長名姓厯牓引銓注之法又定州縣官資髙下升降以為故事其後莫能革焉至于明皇開元中行儉子光庭為侍中以選人既無常限或有出身二十餘年而不獲禄者復作循資格定為限域凡官罷滿以若干選而集各有差等卑官多選髙官少選賢愚一貫必合乎格者乃得銓授自下升上限年躡級不得踰越久淹不收者皆便之謂之聖書雖小有常規而掄材之方失矣此起於後魏崔亮停年之制也其有異才髙行聽擢不改然有其制而無其事有司但守文奉式循其資例而已初吏部選才將親其人覆其吏事始取州縣按牘疑議試其斷割而觀其能否此所以為判也按顯慶初黄門侍郎劉祥道上疏曰今行署等勞滿唯曹司試判不簡善惡雷同注官此則試判之所起也後日月浸久選人猥多案牘淺近不足為難乃採經籍古義假設甲乙令其判斷既而來者益衆而通經正籍又不足以為問乃以僻書曲學隠伏之義問之唯懼人之能知也工者登于科第謂之入等其甚拙者謂之藍縷各有升降選人有格限未至而能試文三篇謂之宏詞試判三條謂之㧞萃亦曰超絶詞美者得不拘限而授職焉初州縣混同無等級之差凡所拜授或自大而遷小或始近而後逺無有定制其後選人既多叙用不給遂累増郡縣等級之差郡自輔至下凡八等縣自赤至下凡八等其折衝府亦有差等按格令内外官萬八千八十五員而合入官者自諸館學生以降凡十二萬餘員𢎞文崇文館學生五十員國子太學四門律書算凡二千二百一十員州縣學生六萬七百一十員兩京崇元館學生二百員諸州學不計太史厯生三十六員天文生百三十員太醫童科呪諸生二百一十一員太卜卜筮生三十員千牛備身八十員備身二百五十六員進馬十六員齋郎八百六十二員諸三衛監門直長三萬九千四百六十二員諸屯主副千九百八十四員諸折衝府録事府吏千七百八十二員校尉三千五百六十四員執杖執乘每府六十四員親事帳内一萬員集賢院御書手一百員翰林藥童數百員諸臺省寺監軍衛坊府之胥吏及上州市令録事省司補授者約六千餘員其外文武貢士及應制挽郎輦脚軍功使勞徵辟奏薦神童陪位諸以親䕃并藝術百司雜直或恩賜出身受職不為常員者不可悉數大率約八九人爭官一員初武徳中天下兵革方息萬姓安業士不求禄官不充員吏曹乃移牒州府課人應集至則授官無所退遣四五年間求者漸多方稍有沙汰貞觀京師榖貴始分人於洛州選集參選者七千人而得官者六千人是時太宗謂吏部尚書杜如晦曰今吏部取人獨取其言辭刀筆而不詳其才行或授職數年然後罪彰雖刑戮繼及而人已弊矣如之何對曰昔兩漢取人必本於鄉閭選之然後入官是以稱為多士今每嵗選集動踰數千人厚貌飾辭何可知也選曹但校其階品而已若掄材辨行未見其術上由是將依漢法令本州辟召㑹功臣議行封建事乃寢他日上又曰夫古今致治在於得賢今公不能知朕不徧識日月其逝而人逺矣吾將使人自舉如之何魏徵曰知人則哲自知者明知人誠難矣而自知豈易乎且自媒自衒士女之醜行是長澆競也故復寢是時吏部之法行始二十餘年雖已為弊矣而未甚滂流故公卿輔弼或有未之覺者貞觀十七年吏部侍郎髙季輔知選凡所銓綜時稱允愜十八年獨知選事太宗賜金背鑑一靣以表其清鍳焉太宗初知其微而未及更因循至于永徽中官紀已紊迨麟徳之後不勝其弊焉及武太后臨朝務悦人心不問賢愚選集者多收之職員不足乃令吏部大置試官以處之故當時有車載斗量之謡又以鄧元挺許子儒為侍郎無所藻鍳委成令史依資平配其後諸門人仕者猥衆不可禁止有偽立符告者有接承他名者有逺人無親而買保者有試判之日求人代作者如此假濫不可悉數武太后又以吏部選人多不實剗革其弊神功元年勅自今以後本色出身解天文者進官不得過太史令音樂者不得過太樂鼓吹令醫術者不得過尚藥奉御隂陽卜筮者不得過太卜令解造食者不得過司膳令有從勲官品子流外國官參佐視品等出身者自今以後不得任京清要等官若累限應至三品不須進階每一階酬勲兩轉而乃繁設等級遞立選防多方以抑之及神龍以來復置員外官二千餘人兼超授閹官為員外官者又千餘人時中宫用事恩澤横出除官有不由宰司特勅斜封便拜於是内外盈溢居無廨宇時人謂之三無坐處言宰相御史及員外官也時以鄭愔為吏部侍郎大納貨賄留人過多無闕注擬逆用三年闕員於是綱統大紊焉及先天以後宋璟為尚書李义盧從愿為侍郎方革前弊量闕留人雖資髙考深而非才實者並罷選當時選者十不收一由是吏曹之職復理矣自有唐以來居吏部者唯馬載裴行儉崔元暐韋嗣立四人最為稱職開元十三年明皇又以吏部選試不公乃置十銓試人禮部尚書蘇頲刑部尚書韋抗工部尚書盧從愿右常侍徐堅御史中丞宇文融朝集使蒲州刺史崔琳魏州刺史崔沔荆州長史韋虚心鄭州刺史賈曾懐州刺史王邱各掌其一時左庶子呉兢上表諌仍停此十銓分選依舊以三銓為定也明年仍行故至天寳八載六月勅旨授官宜立攅符下諸郡府十一載楊國忠為吏部尚書以肺腑為相懼招物議取悦人心乃以選人非超絶當留及藍縷當放之外其餘常選從年深者率留故憃愚廢滯者咸荷焉其明年三銓注官皆自專之於尚書都堂與左相相偶唱注二旬而畢不復再經門下考審舊制中書門下便除授貞元四年正月制春秋舉薦至五年六月勅在外者委諸道觀察使及州府長吏其在京城者委中書門下尚書省御史臺常參清官并諸使三品以上官左右庶子少詹事少卿監司業少尹諭徳國子博士長安萬年縣令著作佐郎郎中中允中舍人祕書太常丞贊善洗馬等每年一度薦聞至八年正月勅比來所舉人數頗多自今以後中書門下兩省及御史臺五品以上尚書省四品以上諸司三品以上應合舉人各令每人薦不得過兩人餘官不得過一人至九年十一月勅每年冬薦官吏部凖式檢勘成者宜令尚書左右丞本司侍郎引於都堂訪以治術兼商量時務狀考其理識通者及考第事跡定為三等兼舉主名録奏試日仍令御史一人監試考績周制三載考績三考黜陟其訓曰三嵗而小考其功也小考者正職而行事也九嵗而大考有功也大考者黜無職而賞有功也漢元帝建昭中西羌反日蝕又久青無光召京房問對曰古帝王以功舉賢則萬化成瑞應著末代以毁譽取人故功業廢而致災異宜令百官各試其功災異可息詔房作其事房奏考功課吏法晉灼曰令丞尉治一縣崇教化無犯法者輙遷有盗賊滿三日不覺者尉事也令覺之自除二尉負其辠率相凖如此法也帝令公卿與房㑹議皆以房言煩碎令上下相司不可許上意嚮之時部刺史奏事京師帝召見令房曉以課事諸刺史復以為不可唯御史大夫鄭𢎞光禄大夫周堪言善是時中書令石顯專權顯友人五鹿充宗為尚書令與房同經議論相非時充宗嫉房出為魏郡太守唯許房至郡自行考課法魏明帝時以士人毁譽是非混雜難辨遂令散騎常侍劉邵作都官考課之法七十二條考覈百官其略欲使州郡考士必由四科皆有効然後察舉或辟公府為親民長吏轉以功次補郡守者或就秩而加賜爵焉至于公卿及内職大臣率考之事下三府由是大議考課之制後亦不行晉武帝泰始初務崇治本詔河南尹杜預為黜陟之課其略曰臣聞上古之政因循自然虚已委誠而信順之道應神感心通而天下之理得及至末代不得紀逺而求於密微疑諸心而信耳目疑耳目而信簡書簡書愈繁而官方愈偽法令滋彰巧飾彌多昔漢之刺史亦嵗終奏事不制算課而清濁粗舉魏氏考課即京房之遺意其文可謂至密然由於累細故厯代不能通也豈若申堯舜之舊典去密就簡而易從也今科舉優劣莫若委任逹官各考所統在官一年以後每嵗優者一人為上第劣者一人為下第因計偕以名聞如此六載主者總集採按其六嵗處優舉者超用之六嵗處劣舉者奏免之其優多劣少者叙用之劣多優少者左遷之今考課之品所對不均誠有難易若以難取優以易而否主者固當凖量輕重微加降殺不足復曲以法書也後魏孝文帝太和中詔曰三載考績自古通經三考黜陟以彰能否今若三考然後黜陟可黜者不足為遲可進者大成賖緩朕今三載一考考即黜陟欲令愚滯無妨於賢者才能不擁於下位冬令當曹考其優劣為三等六品以下尚書重問五品以上朕將親與公卿論其善惡上上者遷之下下者黜之中中者守其本任時否臧必舉賞罰大行其薄賞者猶錫車馬器服以申奨勸後帝臨朝堂顧謂録尚書兼廷尉卿廣陵王羽曰凡考績上下二等可為三品中等但為一品所以然者上下是黜陟之科故旌絲髪之美惡中等守本事而已帝又謂尚書等曰卿等在任年垂二周未嘗進一賢退一不肖此二事罪之大者謂羽曰汝居樞端之任在職以來功勤之績不聞於朝阿黨之音頻于朕聽今黜汝録尚書廷尉但居特進太保自尚書令僕射以下凡黜退二十餘人皆略舉遺闕諸如此黜官者令一年之後仕官如初宣武帝時徐州刺史蕭寳夤論曰方今守令厥任非輕及考課悉以六嵗為程既而限滿代還復輕六年而叙是則嵗周十二始得一階於東西兩省文武閒職公府散佐無事冗官或數旬方應一直或弦朔止於暫朝及其考日更得四年為限是則一紀之内便登三級彼以實勞劇任而遷貴之路至難此以散官虚名而升陟之方甚易何内外之相逺令厚薄之如是孝明帝延昌二年又將大考百寮散騎常侍領三公郎中崔鴻以考令於體例不通乃建議曰古者為官求才朝升夕進豈拘一階半級閡以同寮等位者哉二漢以降太和以前茍必官須此人人稱其職或超騰轉陟數嵗而至公卿或長兼試守稱允而遷進者披卷則人人而是舉目則朝貴皆然故能時收多士之稱國號豐賢之美竊見景明以來考格三年成一考轉一階貴賤内外萬有餘人自非犯罪不問賢愚莫不上中才與不肖比肩同轉雖有善政如龔黄儒學如王鄭才史如班馬文章如張蔡得一分一寸必為常流所攀選曹亦抑為一槩不曽甄别琴瑟不調改而更張雖明旨已行猶宜消息時不從唐考課之法有徳義清慎公平恪勤各一善自近侍至于鎮防並據職事目為之最凡二十七焉一最以上有四善為上上一最以上有三善或無最而有四善為上中一最以上有二善或無最而有三善為上下一最以上有一善或無最而有二善為中上一最以上或無最而有一善為中中職事粗理善最弗聞為中下愛憎任情處斷乖理為下上背公向私職務廢闕為下中居官謟詐及貪濁有狀為下下若於善最之外别有可嘉尚及罪雖成殿而情狀可矜或雖不成殿而情狀可責者省校之日皆聽考官臨事量定諸州縣官人撫育有萬戸口増益者各凖見戸為十分論每加一分刺史縣令各進考一等増戸口謂課丁率一丁同一戸法増不課口者每五口同一丁例其有破除者得相折其州戸口不滿五千縣戸不滿五百者各凖五千五百戸法為分若撫養乖方戸口減損者各凖増戸法亦每減一分降一等其勸課農田能使豐殖者亦凖見地為十分論每加二分各進考一等此為永業口分之外别能墾起公私荒田者其有不加勸課以致減損者謂永業口分之内有荒廢者每損一分降考一等若數處有功並應進考者並聽累加神龍中御史中丞盧懐慎上疏曰語云三年有成書謂三載考績子産賢者也其為政尚累年而化成况其常材乎竊見比來州縣官佐下車布政有多者一二年少者三五月遽即遷除不論課考或厯時未改便傾耳而聽企踵而覩爭求冒進不顧亷恥亦何暇宣風布化求瘼恤民哉戸口流散百姓凋弊職為此也何則人知吏之不久則不從其吏吏知遷之不遥又不盡其能偷安茍且脂韋而已又古之為吏者長子孫倉氏庾氏即其後也臣請都督刺史上佐兩畿縣令等在任未經四考不許遷除察其課効尤異或錫以車裘或就加禄秩或降使臨問并璽書慰勉若公卿有闕則擢以勸能政績無聞抵犯貪暴者放歸田里以明賞罰致治救弊莫過於此開元二十五年十二月命諸道採訪使考課官人善績三年一奏永為常式至二十七年二月赦文三載考績黜陟幽明允叶大猷以勸天下比來諸道所通善狀但優仕進之輩與為選調之資責實循名或乖古義自今以後諸道使更不須通善狀每至三年朕自擇使臣觀察風俗有清白政治著聞者當别擢用之通志卷五十八
