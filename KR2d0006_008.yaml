body:
  text: 通志卷五上宋右迪功郎鄭樵漁仲撰前漢紀第五上髙祖惠帝髙后吕氏臣謹按劉者東周畿內之地名杜預云緱氏西北舊有劉亭是也緱氏熙寧中省為鎮入偃師𨽻河南劉氏者成王封王季之季子食采于劉是為劉康公劉氏受氏實由此始自康公之後有劉定公劉獻公劉宣公劉文公世為周卿士故劉氏為著族漢儒之言劉氏乃用晉史蔡墨之言謂陶唐氏之後有劉纍者學擾龍事孔甲在夏為御龍氏在商為豕韋氏在周為唐杜氏其適晉者為范氏范武子奔秦復歸于晉秦人歸其孥留於秦者為劉氏戰國之際秦師伐魏劉氏從征為魏所獲魏遷大梁徙都於豐故劉氏亦居豐然劉氏本於康公地著世系兩皆眀信不知劉纍者因何氏劉曾無本末且劉也范也以邑命氏者豕韋也唐也杜也以國命氏者御龍也豢龍也以技命氏者此古者命氏之義也若如此論則御龍以來數更氏矣舍劉而用御龍舍御龍而用豕韋舍豕韋而用唐杜舍唐杜而用范且范氏既又為士氏隨氏今武子處秦之裔既不以范以士以隨又不以杜以唐以豕韋以御龍而獨以劉何也髙帝起于微賤不知族世且親莫如母不知其姓但諡昭靈后而已近莫如大父不知其名但以居豐呼為豐公如此則漢家祖禰可謂荒唐矣髙祖即位之後採諸儒之言泛祀其先所置祠祀官則有秦晉梁荆之巫世祠天地綴之以祀其義為范氏仕晉故用晉巫以祠仕晉者武子之後留秦故用秦巫以祠留秦者隨魏遷梁故用梁巫以祠遷梁者後居于豐故用荆巫以祠居豐者豐荆地也然天子之祀必世代歷歷逺近有差昭穆有别或壇或墠有毁有遷猶恐其濫今漢家之祀其先也如此良由不知所祖求之多方庶幾或中漢儒又從而推之以陶唐為火德漢承堯運斷蛇著符旗幟尚赤協於火德自然之運得天統者何哉髙祖劉氏名邦字季泗水郡沛縣豐邑中陽里人父曰太公母曰劉媪幽人謂老婦為媪烏老切媪嘗息大澤之陂夢與神遇是時雷電晦冥太公往視則見蛟龍於其上已而有娠遂産髙祖髙祖為人隆凖而龍顔美鬚髯左股有七十二黑子寬仁愛人意豁如也常有大度不事家人生産作業及壯試吏為泗上亭長庭中吏無所不狎侮好酒及色常從王媪武負貰酒老母為負貰音世賒也時飲醉卧武負王媼見其上常有龍怪之髙祖每酤留飲酒讐數倍讐當讀為售師古於此無音宣紀所從買家輒大讐顔日讐當為售及見怪嵗竟此兩家常折劵棄責如字或讀為債徴財也廣韻亦作音責負財也髙祖常繇咸陽縱觀秦皇帝喟然太息曰嗟乎大丈夫當如此矣單父人吕公單音善父音斧善沛令避仇從之客因家焉沛中豪桀吏聞令有重客皆往賀蕭何為主吏主進與賮同才忍反令諸大夫曰進不滿千錢坐之堂下髙祖為亭長素易諸吏乃紿為謁曰賀錢萬紿徒在切欺也謁者書刺自言爵里姓名并列賀錢數實不持一錢謁入吕公大驚起迎之門吕公者好相人見髙祖狀貌因重敬之引入坐上坐蕭何曰劉季固多大言少成事髙祖因狎侮諸客遂坐上坐無所詘酒闌吕公因目固留髙祖竟酒後吕公曰臣少好相人相人多矣無如季相願自愛臣有息女願為箕帚妾酒罷吕媼怒吕公曰公始常竒此女與貴人沛令善公求之不與何自妄許與劉季吕公曰此非兒女子所知卒與髙祖吕公女即吕后也生孝惠帝魯元公主髙祖為亭長時常告歸之田吏休假曰告吕后與兩子居田中耨有一老父過請飲吕后因餔之餔食之也必胡切老父相后曰夫人天下貴人也令相兩子見孝惠曰夫人所以貴者乃此男也相魯元亦皆貴老父已去髙祖適從旁舍來吕后具言客有過相我子母皆大貴髙祖問曰未逺乃追及問老父老父曰鄉者夫人兒子皆以君君相貴不可言髙祖乃謝曰誠如父言不敢忘德及髙祖貴遂不知老父處髙祖為亭長以竹皮為冠令求盜之薛治時時冠之及貴常冠所謂劉氏冠也髙祖以亭長為縣送徒驪山徒多道亡自度比至皆亡之到豐西澤中亭止飲夜乃解縱所送徒曰公等皆去吾亦從此逝矣徒中壯士願從者十餘人髙祖被酒夜徑澤中令一人行前行前者還報曰前有大蛇當道願還髙祖醉曰壯士行何畏乃前拔劔斬蛇蛇分為兩道開行數里醉因卧後人來至蛇所有一老嫗夜哭人問嫗何哭嫗曰人殺吾子人曰嫗子何為見殺嫗曰吾子白帝子也化為蛇當道今者赤帝子斬之故哭人乃以嫗為不誠欲苦之嫗因忽不見後人至髙祖覺告髙祖髙祖乃心獨喜自負諸從者日益畏之秦始皇帝嘗曰東南有天子氣於是東遊以厭當之厭一涉切髙祖即自疑亡匿隱於芒碭山澤間碭音唐又音蕩芒碭二縣之界有山澤之固吕后與人俱求常得之髙祖怪問之吕后曰季所居上常有雲氣故從往常得季髙祖又喜沛中子弟或聞之多欲附者矣秦二世元年秋七月陳涉起蘄音機至陳自立為楚王號張楚遣武臣張耳陳餘略趙地八月武臣自立為趙王郡縣多殺長吏以應涉九月沛令欲以沛應之掾主吏蕭何曹參曰君為秦吏今欲背之率沛子弟恐不聽願君召諸亡在外者可得數百人因以劫衆衆不敢不聽乃令樊噲召髙祖髙祖之衆已數百人矣於是樊噲從髙祖來沛令後悔恐其有變乃閉城城守欲誅蕭曹蕭曹恐踰城保髙祖髙祖乃書帛射城上與沛父老曰天下同苦秦久矣今父老雖為沛令守諸侯並起今屠沛沛今共誅令擇可立立之以應諸侯即室家完不然父子俱屠無為也父老乃帥子弟共殺令開城門迎髙祖欲以為沛令髙祖曰天下方擾諸侯並起今置將不善一敗塗地吾非敢自愛恐能薄不能完父兄子弟此大事願更擇可者蕭曹等皆文吏自愛恐事不就後秦種族其家盡讓髙祖諸父老皆曰平生所聞劉季竒怪當貴且卜筮之莫如劉季最吉髙祖數讓衆莫肯為髙祖乃立為沛公祠黃帝祭蚩尤於沛庭而釁鼓旗幟皆赤由所殺蛇白帝子所殺者赤帝子故也於是少年豪吏如蕭曹樊噲等皆為收沛子弟得三千人是月項梁與兄子羽起吳田儋與從弟榮橫起齊自立為齊王韓廣自立為燕王魏咎自立為魏王陳涉之將周章西入關至戲秦將章邯距破之秦二年十月沛公攻胡陵方與還守豐邯音酣方與音房預秦泗川監平將兵圍豐二日出與戰敗之令雍齒守豐十一月沛公引兵之薛秦泗川守壯兵敗於薛走至戚沛公左司馬得殺之師古曰得者司馬之名史記沛公左司馬得泗川守壯殺之則得非名也沛公還軍亢父至方與趙王武臣為其將李良所殺十二月楚王陳涉為其御莊賈所殺魏人周市略地豐沛使人謂雍齒曰豐故梁徙也今魏地已定者數十城齒今下魏魏以齒為侯守豐不下且屠豐雍齒雅不欲屬沛公及魏招之即反為魏守豐沛公攻豐不能取還之沛怨雍齒與豐子弟畔之正月張耳等立趙後趙歇為趙王東陽寧君秦嘉立楚將景駒為楚王在留沛公往從之道得張良遂與俱見景駒請兵以攻豐時章邯從陳别將司馬􅊂將兵北定楚地屠相至碭東陽寧君沛公引兵西與戰蕭西不利還收兵聚留二月攻碭三日拔之收碭兵得六千人與故合九千人三月攻下邑拔之還擊豐不下四月項梁擊殺景駒秦嘉止薛沛公往見之項梁益沛公卒五千人五大夫將十人五大夫秦第九爵沛公還引兵攻豐拔之雍齒奔魏五月項羽拔襄城還項梁盡召别將居薛六月沛公如薛與項梁共立楚懷王孫心為楚懷王章邯破殺魏王咎齊王田儋於臨濟七月大霖雨沛公攻亢父章邯圍田榮於東阿沛公與項梁共救田榮大破章邯東阿田榮歸沛公項羽追北至城陽攻屠其城軍濮陽東復與章邯戰又破之秦軍復振守濮陽環水音官決水以自環守為固沛公項羽去攻定陶八月田榮立田儋子市為齊王定陶未下沛公與項羽西略地至雍邱與秦軍戰大敗之斬三川守李由還攻外黃外黃未下項梁再破秦軍有驕色宋義諌不聼秦益章邯兵九月章邯夜銜枚擊項梁定陶大破之殺項梁時連雨自七月至九月沛公項羽方攻陳留聞梁死士卒恐乃與將軍吕臣引兵而東徙懷王自盱台都彭城吕臣軍彭城東項羽軍彭城西沛公軍碭魏王咎之弟豹復收魏衆自立為魏王後九月即閏九月也秦之歷法嵗終置閏蓋取歸餘於終之義也漢至孝文猶用之懷王并吕臣項羽軍自將之以沛公為碭郡長封武安侯將碭郡兵以羽為魯公封長安侯吕臣為司徒其父吕青為令尹章邯已破項梁則以楚地兵不足憂乃渡河北擊趙王歇大破之歇保巨鹿城秦將王離圍之趙數請救懷王乃以宋義為上將項羽為次將范增為末將北救趙初懷王約諸將曰先入定關中者王之至是秦兵強常乘勝逐北諸將莫利先入關獨羽怨秦殺項梁奮勢願與沛公西入關懷王諸老將皆曰項羽為人悍慓猾賊嘗攻襄城襄城無噍類噍祚笑反無復有活而噍食也青州俗呼無孑遺為無噍類所過無不殘滅且楚數進取前陳王項梁皆敗不如更遣長者扶義而西告諭秦父兄秦父兄苦其主久矣今誠得長者往毋侵暴宜可下項羽不可遣獨沛公素寬大長者卒不許羽而遣沛公西收陳王項梁散卒乃道碭至陽城與扛里攻秦軍壁破其二軍秦三年十月齊將田都畔田榮將兵助項羽救趙沛公攻破東郡尉於成武十一月項羽殺宋義并其兵渡河自立為上將軍諸將黥布之徒皆屬焉十二月沛公引兵至栗遇剛武侯奪其軍四千餘人并之與魏將皇欣武滿軍合攻秦軍破之故齊王建孫田安下濟北從項羽救趙大破秦軍巨鹿下虜王離走章邯二月沛公從碭北攻昌邑遇彭越越助攻昌邑未拔沛公西過髙陽酈音歷食音異其音箕為里監門曰諸將過此者多吾視沛公大度乃求見沛公沛公方踞牀使兩女子洗酈生不拜長揖曰足下必欲誅無道秦不宜踞見長者於是沛公起攝衣謝之延上坐食其説沛公襲陳留沛公以為廣野君以其弟商為將將陳留兵三月攻開封未拔西與秦將楊熊會戰白馬又戰曲遇東曲邱羽切遇音顒大破之楊熊走之滎陽二世使使斬之以徇四月南攻潁川屠之因張良遂略韓地時趙别將司馬卬方欲渡河入關沛公乃北攻平隂絶河津南戰洛陽東軍不利從轘轅至陽城收軍中馬騎六月與南陽守齮音蟻戰犨昌尤反東破之略南陽郡齮走保城守宛沛公引兵過宛西張良諫曰沛公雖欲急入關秦兵尚衆距險今不下宛宛從後擊強秦在前此危道也於是沛公夜引兵從他道還偃旗幟遲眀圍宛城三匝齮欲自剄其舍人陳恢曰死未晚也乃踰城見沛公曰臣聞足下約先入咸陽者王之今足下留守宛宛大郡之都也連城數十人民衆積粟多吏人自以為降必死故皆堅守乘城今足下盡日止攻士死傷者必多引兵去宛宛必隨足下後足下前則失咸陽之約後又有強宛之患為足下計莫若約降封其守因使止守引其甲卒與之西諸城未下者聞聲爭開門而待足下足下通行無所纍沛公曰善七月南陽守齮降封為殷侯封陳恢千戶引兵而西無不下者至丹水髙武侯鰓襄侯王陵降還攻胡陽遇畨君别將梅鋗畨音婆鋗呼涓切與偕攻析酈持益反二縣皆降所過無得鹵掠秦民喜遣魏人寧昌使秦是月章邯舉軍降項羽羽以為雍王瑕邱申陽下河南八月沛公攻武關入秦秦相趙髙恐乃殺二世使人來欲約分王關中沛公不許九月趙髙立二世兄子子嬰為秦王子嬰誅滅趙髙遣將將兵距嶢關音堯沛公欲擊之張良曰秦兵尚強未可輕也願先遣人益張旗幟於山上為疑兵使􅐱食其陸賈往説秦將啖以利秦將果欲連和沛公欲許之良曰此獨其將欲叛恐其士卒不從不如因其怠懈而擊之沛公引兵繞嶢關踰蕢山蕢音蒯擊秦軍大破之藍田南遂至藍田又戰其北秦兵大敗漢元年五星聚于東井從嵗星也沛公至霸上秦王子嬰素車白馬繫頸以組奉皇帝璽符節降于軹道旁諸將或言誅之沛公曰始懷王遣我固以能寬容且人已服降殺之不祥乃以秦王屬吏遂西入咸陽欲止宫休舍樊噲張良諌乃封秦重寶財物府庫還軍霸上蕭何盡收秦丞相府圖籍文書十一月召諸縣豪傑曰父老苦秦苛法久矣誹謗者族偶語者棄市吾與諸侯約先入關中者王之吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦法吏民皆按堵如故凡吾所以來為父兄除害非有所侵暴毋恐且吾所以還軍霸上待諸侯至而定要束耳乃使人與秦吏行縣鄉邑告諭之秦民大喜爭持牛羊酒食獻享軍士沛公讓不受曰倉粟多不欲費民民又益喜惟恐沛公不為秦王或説沛公曰秦富十倍天下地形強今聞章邯降項羽羽號曰雍王王關中即來沛公恐不得有此可急使守函谷關毋內諸侯軍稍徴關中兵以自益距之沛公然其計從之十二月項羽果帥諸侯兵欲西入關關門閉聞沛公已定關中大怒使黥布等攻破函谷關遂至戲下沛公左司馬曹毋傷聞羽怒欲攻沛公使人言羽曰沛公欲王關中令子嬰相珍寶盡有之欲以求封亞父范增説羽曰沛公居山東時貪財好色今聞其入關珍物無所取婦女無所幸此其志不小吾使人望其氣皆為龍成五色此天子氣也急擊之勿失於是饗士旦日合戰是時羽兵四十萬號百萬沛公兵十萬號二十萬力不敵會羽季父左尹項伯素善張良夜馳見張良具告其實欲與俱去毋特俱死良曰臣為韓王送沛公今事有急亡去不義不可不告乃入具告沛公沛公驚曰為之奈何良曰誰為沛公為此計者曰鯫生説我曰距關無內諸侯秦地可盡王也故聼之君安與項伯有故良曰秦時與臣遊項伯殺人臣活之沛公曰孰與少長良曰長於臣沛公曰君為我呼入吾得見兄事之良出要項伯俱入見沛公奉巵酒為夀約為婚姻曰吾入關秋毫無所敢取籍吏民封府庫而待將軍所以守關者備他盜也日夜望將軍到豈敢反邪願伯眀言不敢背德項伯許諾即夜復去戒沛公曰旦日不可不早自來謝項伯還具以沛公言告羽因曰沛公不先破關中兵公詎能入乎且人有大功擊之不祥不如因而善之羽許諾沛公旦日從百餘騎見羽鴻門謝曰臣與將軍戮力攻秦將軍戰河北臣戰河南不自意先入關能破秦今者有小人言令將軍與臣有隙羽曰此沛公左司馬曹毋傷言之不然籍何以生此羽因留沛公飲項伯東嚮坐范增南嚮坐增數目羽擊沛公羽不應增出召項莊謂曰君王為人不忍若入前為夀夀畢請以劒舞因擊沛公於坐不者若屬皆且為所虜莊即入為夀夀畢曰軍中無以為樂請以劒舞項伯亦拔劒起舞常以身翼蔽沛公樊噲聞事急直入怒甚羽壯之賜以酒噲因譙讓羽語在噲傳有頃沛公起如厠因招樊噲出沛公曰未辭奈何噲曰人方為刀爼我為魚肉何辭為乃令張良留謝以白璧一雙獻羽玉斗一雙獻范增鴻門去霸上四十里沛公置車騎脫身獨騎與樊噲夏侯嬰靳強紀信等四人持劒盾步走從驪山下道芷陽間行沛公謂良曰從此道至吾軍不過二十里度我至軍中乃入沛公已去間至軍中張良入謝曰沛公不勝杯杓不能辭謹使臣良獻璧羽曰沛公安在良曰聞將軍有意督過之脫身去已至軍羽受璧置坐上又獻玉斗范增增怒撞其斗起曰吾屬今為沛公虜矣沛公歸立誅曹毋傷數日項羽引兵西屠咸陽殺秦降王子嬰燒秦宫室所過無不殘滅秦民大失望羽使人還報懷王懷王曰如約羽怨懷王不肯令與沛公俱西入關而北救趙後天下約乃曰懷王者吾家所立耳非有功伐何以得專主約本定天下諸將與籍也春正月陽尊懷王為義帝實不用其命二月羽自立為西楚霸王王梁楚地九郡都彭城背約更立沛公為漢王王巴蜀漢中四十一縣都南鄭三分關中立秦三將章邯為雍王都廢邱司馬欣為塞王都櫟陽董翳為翟王都髙奴楚將瑕邱申陽為河南王都洛陽趙將司馬卬為殷王都朝歌當陽君英布為九江王都六懷王柱國共敖為臨江王都江陵番君吳芮為衡山王都邾故齊王建孫田安為濟北王徙魏王豹為西魏王都平陽徙燕王韓廣為遼東王燕將臧荼為燕王都薊徙齊王田市為膠東王齊將田都為齊王都臨災徙趙王歇為代王趙相張耳為常山王夏四月諸侯罷戲下各就國漢王怨羽背約欲攻之蕭何諌曰雖王漢中之惡不猶愈於死乎且語稱天漢其稱美甚夫能屈於一人之下則能申於萬人之上湯武是也願大王王漢撫民招賢收用巴蜀還定三秦天下可圖也漢王乃之國羽使卒三萬人從漢王楚與諸侯人之募從者數萬人從杜南入蝕中張良辭歸韓漢王送至褒中因説漢王燒絶棧道以備諸侯盜兵亦示項羽無東意漢王既至南鄭諸將及士卒皆歌謳思東歸多道亡還者韓信為治粟都尉亦亡去蕭何追還之三日乃至因薦於王曰必欲爭天下非信無可與計事者乃戒漢王設壇場齊七日設九賔之禮拜信為大將軍問以計䇿信對曰項羽王諸將之有功者而背約王君王於南鄭是遷也人無有不恨者吏卒皆山東之人日夜企而望歸及其鋒而用之可以有大功天下已定民皆自寧不可復用不如決策東向爭權天下因陳羽可圖三秦易并之計漢王大説自以為得信晚也五月與信俱東留蕭何守漢中收巴蜀租給軍糧食漢王用信計從故道還襲雍雍王邯迎擊漢陳倉雍兵敗還走戰好畤又大敗走廢邱遂定雍地東如咸陽引兵圍雍王廢邱而遣諸將略定隴西北地上郡田榮聞羽徙齊王市於膠東而立田都為齊王大怒以齊兵迎擊田都都走降楚六月田榮殺田市自立為齊王時彭越在巨野有衆萬餘無所屬榮與越將軍印令反梁地越擊殺濟北王安榮遂并三齊之地燕王韓廣亦不肯徙遼東八月臧荼殺廣并其地塞王欣翟王翳皆降漢初項梁立韓後公子成為韓王張良為韓司徒羽以良從漢王韓王成又無功故不遣就國與俱至彭城殺之及聞漢王并關中而齊梁畔之羽大怒乃以故吳令鄭昌為韓王距漢令蕭公角擊彭越越敗之時張良徇韓地遺羽書曰漢欲得關中如約即止不敢復東羽以故無西意而北擊齊九月漢王遣將軍薛歐王吸出武關因王陵兵從南陽迎太公呂后於沛羽聞之發兵距之陽夏不得前二年冬十月項羽使九江王布殺義帝於郴陳餘既怨常山王張耳又怨項羽之不王已也從田榮藉助兵以擊常山張耳敗走降漢漢王厚遇之陳餘迎代王歇還趙歇立餘為代王張良自韓間行歸漢漢王以為成信侯漢王如陜鎮撫關外父老河南王申陽降置河南郡使韓太尉韓信擊韓韓王鄭昌降十一月更立韓太尉信為韓王漢王還歸櫟陽使諸將略拔隴西地以萬人若一郡降者封萬戶繕治河上塞故秦苑囿園池令民得田之春正月羽擊田榮城陽榮敗走平原平原民殺之齊皆降楚羽焚其城郭齊人復畔楚降漢諸將拔北地虜雍王弟章平赦罪人二月癸未令民除秦社稷立漢社稷施恩德賜民爵蜀漢民給軍事勞苦復勿租稅二嵗關中卒從軍者復家一嵗舉民年五十以上者修行能帥衆為善置以為三老鄉一人擇鄉三老一人為縣三老與縣令丞尉以事相教復勿繇戍以十月賜酒肉三月漢王自臨晉渡河魏王豹降將兵從下河內虜殷王卬置河內郡至修武陳平亡楚來降漢王與語説之使之參乘以為護軍中尉監護諸將漢王南渡平隂津至洛陽新城三老董公遮説漢王曰臣聞順德者昌逆德者亡兵出無名事故不成明其為賊敵乃可服項羽為無道放殺其主天下之賊也夫仁不以勇義不以力三軍之衆為之素服以告之諸侯為此東伐四海之內莫不仰德此三王之舉也漢王曰善非夫子無所聞於是漢王為義帝發喪袒而大哭哀臨三日發使告諸侯曰天下共立義帝北面事之今項羽放殺義帝於江南大逆無道寡人親為發喪兵皆縞素悉發關中兵收三河士南浮江漢以下願從諸侯王擊楚之殺義帝者夏四月田榮弟橫立榮子廣為齊王止城陽項羽雖聞漢東既擊齊欲遂破之而後擊漢漢王以故得劫五諸侯兵凡五十六萬人東襲楚到外黃彭越將三萬人歸漢漢王拜越為魏相國令定梁地漢王遂入彭城悉收羽美人貨賂置酒髙會羽聞之令其將擊齊自以精兵三萬人從魯出胡陵至蕭晨擊漢軍大戰彭城靈璧東睢水上大破漢軍多殺士卒睢水為之不流圍漢王三匝大風從西北起折木發屋揚砂石晝晦楚軍大亂而漢王得與數十騎遁去過沛使人求室家室家亦已亡不相得漢王道逄孝惠魯元載行楚騎追漢王漢王急推墮二子滕公下收載遂得脫審食其從太公呂后間行反遇楚軍羽常置軍中以為質諸侯見漢敗復與楚而背漢塞王欣翟王翳皆亡歸楚殷王卬死是時呂后兄周呂侯澤為漢將兵居下邑漢王往從之稍收士卒軍碭漢王西過梁地至虞謂羣臣曰誰能為我説九江王畔楚項王必留擊之得留數月吾取天下必矣謁者隨何請使何至九江説布背楚歸漢會楚使亦至布猶豫未決何劫布殺楚使而起兵項羽使龍且擊布而身攻下邑五月漢王屯滎陽蕭何發關中老弱未傅者悉詣軍諸敗兵皆會韓信亦至漢兵復大振與楚戰滎陽南京索間索音求索之索破之楚以故不能過滎陽而西漢軍滎陽築甬道屬河以取敖倉粟魏王豹謁歸視親疾至則絶河津反為楚六月漢王還櫟陽壬午立太子大赦罪人令太子守櫟陽諸侯子在關中者皆集櫟陽為衛引水灌廢邱廢邱降章邯自殺雍州定八十餘縣置河上渭南中地隴西上郡令祠官祀天地四方上帝山川以時祠之興關中卒乘邊塞關中大飢米斛萬錢人相食荀氏曰米十五千令民就食蜀漢秋八月漢王如滎陽謂􅐱食其曰緩頰往説魏王豹能下之以魏地萬户封生食其往豹不聼漢王以韓信為左丞相與曹參灌嬰俱擊魏食其還漢王問魏大將誰也對曰柏直王曰是口尚乳臭不能當韓信騎將誰也曰馮敬曰是秦將馮無擇子也雖賢不能當灌嬰步卒將誰也曰項它徒河切曰是不能當曹參吾無患矣九月信等虜豹傳詣滎陽定魏地置河東太原上黨郡韓信使人請兵三萬願以北舉燕趙東擊齊南絶楚糧道漢王與之三年冬十月韓信等破代擒夏説進伐趙獲趙王歇斬陳餘置常山代郡甲戍晦日有食之十一月癸卯晦日有食之隨何既説黥布布起兵攻楚楚使項聲龍且伐之布敗走十二月與隨何間行歸漢漢王分之兵與俱收兵至成臯項羽數侵奪漢甬道漢軍乏食􅐱食其謀撓楚權請立六國後可以樹黨漢王曰善趣刻印將遣食其立之以問張良良發八難漢王輟飯吐哺曰豎儒幾敗乃公事令趣銷印又問陳平乃從其計陳平謀以黃金數萬斤間疏楚君臣乃與平四萬斤縱其所使由是楚之君臣自相疑間夏四月項羽圍漢滎陽漢王請和割滎陽以西者為漢范增勸羽急攻滎陽漢王患之乃用陳平計因項王使者以離間范增項王果疑之范增大怒乞骸骨歸卒伍事具陳平傳中五月將軍紀信曰事急矣臣請誑楚則王可以間出於是陳平夜出女子滎陽東門二千餘人楚因四靣擊之紀信乃乘王車黃屋左纛曰城中食盡漢王降楚楚皆呼萬嵗之城東觀以故漢王得以數十騎從西門出走成臯項王燒殺紀信漢王之出也使御史大夫周苛樅公魏豹守滎陽周苛樅公謀曰反國之王難與守城因殺魏豹漢王自成臯西入關收兵欲復東轅生説曰楚漢相距滎陽數嵗漢常困願君王出武關項王必引兵南走音奏嚮也後同王深壁令滎陽成臯間且得休息使韓信等得輯河北趙地連燕齊君王乃復走滎陽如此則楚所備者多力分漢得休息復與之戰破之必矣漢王從其計軍出宛葉間葉式涉切與黥布行收兵羽聞漢兵在宛果引兵南漢王堅壁不與戰是時彭越渡睢與項聲薛公戰下邳破殺薛公羽使終公守成臯而自東擊彭越聞漢復軍成臯乃引兵西拔滎陽城生得周苛謂曰為我將以公為上將軍封三萬戶苛瞋目罵曰若不趨降漢今為虜矣若非漢王敵也羽烹周苛并殺樅公而虜韓王信遂圍成臯漢王跳獨與滕公共車出成臯玉門北渡河宿小修武自稱使者晨馳入張耳韓信壁而奪之軍乃使張耳北收兵趙地秋七月有星孛大角漢王得韓信軍復大振八月臨河南鄉軍小修武欲復戰郎中鄭忠説止漢王髙壘深塹勿戰漢王聼其計使盧綰劉賈將卒二萬人騎數百渡白馬津入楚地佐彭越燒楚積聚復擊破楚師於燕郭西下睢陽外黃十七城九月羽謂大司馬曺咎長史欣曰謹守成臯即漢王欲挑戰慎勿與戰但勿令得東而已我十五日必定梁地復從將軍羽乃引兵東擊彭越漢王使酈食其説齊王田廣罷守兵與漢和四年冬十月韓信用蒯通計襲破齊齊王烹酈生東走髙密項羽聞韓信破齊且欲擊楚使龍且救齊漢果數挑成臯戰楚軍不出使人辱之數日大司馬咎怒渡兵汜水汜舊音凡今音祀半濟漢擊之大破楚軍盡得楚國貨賂大司馬咎長史欣皆自剄汜水上漢王引兵渡河復取成臯軍廣武就敖倉食羽下梁地十餘城聞曺咎破乃引兵還漢軍方圍鍾離昧於滎陽東聞羽至盡走險阻羽亦軍廣武與漢相守丁壯苦軍旅老弱罷轉餉漢王羽相與臨廣武之間而語羽欲與漢王獨身挑戰漢王數羽曰始吾與公俱受命懷王曰先入關中者王之公負約王我於蜀漢罪一矯懷王之命殺卿子冠軍而自尊罪二公當以救趙還報而擅劫諸侯兵入關罪三懷王約入秦無暴掠公乃燒秦宫室掘始皇冢收私其財物罪四又強殺秦降王子嬰罪五詐坑秦子弟新安二十萬王其將罪六皆王諸將善地而徙逐故主令臣下爭叛逆罪七出逐義帝自都彭城奪韓王地并王梁楚多自與罪八使人陰賊義帝江南罪九夫為人臣而殺其主殺其已降為政不平主約不信天下所不容大逆無道罪十也吾以義兵從諸侯誅殘賊使刑餘之人擊公何苦乃與公挑戰羽大怒伏弩射中漢王漢王傷胸乃捫足曰虜中吾指漢王病創卧張良強請漢王起行勞軍以安士卒漢王出行軍疾甚因馳入成臯齊田橫求救於楚十一月楚使龍且救齊韓信與灌嬰距之擊破楚軍斬龍且虜齊王廣齊相田橫自立為齊王奔彭越漢立張耳為趙王漢王疾愈西入關至櫟陽存問父老置酒梟故塞王欣頭櫟陽市留四日復如軍軍廣武關中兵益出而彭越田橫居梁地往來苦楚兵絶其糧食韓信已破齊使人來言曰齊邊楚權輕不為假王恐不能安齊漢王怒賴張良陳平之謀乃遣張良操印立信為齊王秋七月立黥布為淮南王八月初為算賦北貉燕人來致梟騎助漢漢王下令軍士不幸死者吏為衣衾棺斂轉送其家四方歸心焉項羽自知少助食盡韓信又進兵擊楚羽患之漢乃遣陸賈説羽歸太公羽不從漢復遣侯公往説羽乃與漢約中分天下割鴻溝以西為漢以東為楚九月歸太公吕后軍皆稱萬嵗乃封侯公為平國君曰此天下辨士所居傾國故號平國君羽解而東歸漢王欲西歸張良陳平諌曰漢有天下大半而諸侯皆附之楚兵罷食盡此天亡之時不因其幾而遂取之所謂養虎自遺患也漢王從之五年冬十月漢王追羽至陽夏南夏古雅切止軍與齊王信魏相國越期會擊楚至固陵不會楚擊漢軍大破之漢王復入壁深塹而守謂張良曰諸侯不徔奈何良對曰楚兵且破未有分地其不至固宜君王能與共天下可立致也齊王信之立非君王意信亦不自堅彭越本定梁地始君王以魏豹故拜越為相國今豹死越亦望王而君王不早定今能取睢陽以北至榖城皆以王彭越從陳以東傅海與齊王信信家在楚其意欲復得故邑能出捐此地以許兩人使各自為戰則楚易敗也於是漢王發使使韓信彭越至皆引兵來十一月劉賈入楚地圍壽春漢亦遣人誘楚大司馬周殷殷畔楚以舒屠六舉九江兵迎黥布並行屠城父隨劉賈皆會遂與羽決勝垓下齊王將三十萬自當之孔將軍居左費將軍居右漢王在後絳侯柴將軍在王後項羽之卒可十萬齊王先合不利却孔費二將軍縱擊齊王復乘之羽兵大敗十二月圍羽垓下羽夜聞漢軍四面皆楚歌大驚曰漢盡得楚乎是何楚人之多也羽與數百騎夜潰圍南走平明漢軍乃覺令灌嬰追之斬羽東城楚地悉定獨魯不下漢王欲屠之為其守節禮義之國乃持羽頭示其父兄魯乃降以懷王始封羽於魯故以魯公禮葬羽於榖城漢王為發喪哭臨而去項氏支屬不誅封項伯等四人為列侯賜姓劉氏諸民略在楚者皆歸之漢王還至定陶馳入齊王信壁奪其軍初項羽所立臨江王共敖前死子尉嗣立為王不降遣劉賈盧綰擊虜尉春正月追尊兄伯號曰武哀侯下令曰楚地已定義帝亡後欲存恤楚衆以定其主齊王信習楚風俗更立為楚王王淮北都下邳魏相國建成侯彭越勤勞魏民卑下士卒常以少擊衆數破楚軍其以魏故地王之號曰梁王都定陶又曰兵不得休八年萬民與苦甚今天下事畢其赦天下殊死以下於是諸侯上疏曰楚王韓信韓王信淮南王英布梁王彭越故衡山王吳芮趙王張敖燕王臧荼昧死再拜言大王陛下秦為無道天下誅之大王先得秦定關中於功最多存亡定危救敗繼絶以安萬民功盛德厚又加惠於諸侯王有功者使得立社稷地分已定而位號比擬無上下之分大王功德之著於後世不宣昧死再拜上皇帝尊號漢王三讓不獲而後受於是諸侯王及太尉長安侯臣綰等三百人與博士稷嗣君叔孫通謹擇良日以二月甲午上尊號漢王即皇帝位于汜水之陽以十月為正從火德色尚赤尊王后曰皇后太子曰皇太子追尊先媪曰昭靈夫人詔曰故衡山王吳芮與子二人兄子一人從百粵之兵以佐諸侯誅暴秦有大功諸侯立以為王項羽奪其地謂之番君其以長沙豫章象郡桂林南海立芮為長沙王都臨湘又粵王亡諸世奉粵祀秦奪其地使社稷不得血食諸侯伐秦亡諸身帥閩中兵以佐滅秦項羽廢而弗立今以為閩粵王王閩中地勿使失職帝乃西都洛陽夏五月兵皆罷歸家詔曰諸侯子在關中者復之十二嵗其歸者復之六嵗食之一嵗民前或相聚保山澤不書名數令各歸其縣復故爵田里吏以文法教訓辨告勿笞辱民以飢餓自賣為人奴婢者皆免為庶人軍吏卒會赦其亡罪而亡爵及不滿大夫者皆賜爵為大夫故大夫以上賜爵各一級其七大夫以上皆令食邑非七大夫以下皆復其身及戶勿事又曰七大夫公乘以上皆髙爵也諸侯子及從軍歸者甚多髙爵吾數詔吏先與田宅及所當求於吏者亟與爵或人君上所尊禮久立吏前曾不為決甚亡謂也異日秦民爵公大夫已上令丞與亢禮今吾於爵非輕也吏獨安取此且法以有功勞行田宅今小吏未嘗從軍者多滿而有功者顧不得背公立私守尉長吏教訓甚不善其令諸吏善遇髙爵稱吾意且亷問有不如吾詔者以重論之帝置酒雒陽南宫上曰通侯諸將母敢隱朕皆言其情吾所以有天下者何項氏所以失天下者何髙起王陵對曰陛下嫚而侮人項羽仁而敬人然陛下使人攻城略地所降下者因以與之與天下同利也項羽妬賢嫉能有功者害之賢者疑之戰勝而不與人功得地而不與人利此其所以失天下也上曰公知其一未知其二夫運籌帷幄之中決勝千里之外吾不如子房填國家撫百姓給餉饋不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之此吾之所以取天下者也項氏有一范增而不能用此所以為我禽也群臣説服初田橫歸彭越項羽已滅橫懼誅與賔客亡入海上恐其久為亂遣使者赦橫曰橫來大者王小者侯不來且發兵加誅橫懼乘傳詣洛陽未至三十里自殺上壯其節為流涕發卒二千人以王禮葬焉戍卒婁敬求見説上曰陛下取天下與周異而都雒陽不便不如入關據秦之固上以問群臣群臣多山東人皆不欲惟張良勸從敬説上即日車駕西都長安治櫟陽宫拜婁敬為郎中號奉春君賜姓劉氏六月壬辰大赦天下秋七月燕王臧荼反攻下代地上自征之九月虜荼即立太尉盧綰為燕王使丞相噲平代地利幾反上自擊破之利幾者項羽將羽敗利幾為陳令降上侯之潁川上至雒陽舉通侯籍召之利幾恐故反後九月徙諸侯子關中治長樂宫丞相張蒼從擊臧荼有功封北平侯蒼眀習天下圖書善用算術故命以列侯居相府主郡國上計也六年冬十月令天下縣邑城十一月人有上變事告楚王信謀反上問左右皆曰擊之用陳平計乃偽遊雲夢十二月會諸侯于陳楚王信迎謁因執之是日大赦天下田肯賀上曰甚善陛下得韓信又治秦中秦形勝之國也帶河阻山縣隔千里持戟百萬秦得百二焉地勢便利其以下兵於諸侯譬猶居髙屋之上建瓴水也夫齊東有琅邪即墨之饒南有泰山之固西有濁河之限北有勃海之利地方二千里持戟百萬縣隔千里之外齊得十二焉此東西秦也非親子弟莫可使王齊者上曰善賜黃金五百斤上還至雒陽赦韓信封為淮隂侯分其地為二國詔將軍劉賈數有功以為荆王王淮東弟交為楚王王淮西長庶子肥為齊王王七十餘城民能齊言者皆屬齊上兄弟四人長兄伯次兄仲弟交伯早卒封其子信為頡羮侯仲喜為代王乃論功與列侯剖符行封徙韓王信於太原都晉陽封蕭何為酇侯父母兄弟封侯食邑者十餘人以蕭何舉宗從征伐故也曺參封平陽侯張良留侯陳平戶牖侯後徙曲逆侯周勃絳侯樊噲舞陽侯酈商武城侯食其子疥以父故封髙梁侯夏侯嬰汝陰侯灌嬰潁陽侯周昌汾隂侯大功臣封三十餘人其餘爭功未得行封上居南宫從復道上見諸將往往耦語以問張良而知其相與謀反乃用張良計先封雍齒為什邡侯羣臣乃安於是趣丞相急定功行封封王陵為定國侯陵始為縣豪上兄事之以其徔上晚故後行封凡百四十三人是時人民散亡户口可得而數裁什二三是以大侯不過萬家小者五六百戶封爵之誓曰使黃河為帶泰山若礪國以永存爰及苗裔又申以丹書之誓重以白馬之盟乃作十八侯之位次上歸櫟陽五日一朝太公太公家令説太公曰天無二日土無二王皇帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行後上朝太公擁篲迎門郤行上大驚下扶太公太公曰帝人主奈何以我亂天下法上心善家令言賜黃金五百斤夏五月丙午詔尊太公曰太上皇九月胸奴圍韓王信於馬邑信降胸奴七年冬十月上自將擊韓王信於銅鞮斬其將信亡走胸奴與其將曼邱臣王黃共立故趙後利為王收信散兵與胸奴共距漢上從晉陽連戰乘勝逐北至樓煩會天寒士卒墮指者十二三遂至平城胸奴圍上於白登七日用陳平祕計得出應劭曰陳平使畫工圖美女間遣人遺閼氏云漢有美女如此今皇帝困厄欲獻之閼氏畏其奪已寵因謂單于曰漢天子亦有神靈得其土地非能有也於是丐奴開其一角得突出鄭氏曰以計鄙陋故祕不傳師古曰應氏之説出桓談新論蓋談以意測之事當然耳非記傳所説也使樊噲留定代地十二月胸奴攻代代王喜棄國自歸雒陽赦為郃陽侯辛卯立子如意為代王春令郎中有罪耐以上請之耐亦作耐音而罪不至髠完其耐鬢耐頰旁毛民産子復勿事二嵗二月至長安蕭何治未央宫立東闕北闕前殿武庫太倉上見其壯麗怒曰天下胸胸勞苦數嵗成敗未可知是何治宫室過度也何曰天下方未定故可因以就宫室且夫天子以四海為家非令壯麗亡以重威且亡令後世有以加也上説自櫟陽徙都長安置宗正官以序九族夏四月行如雒陽八年冬上東擊韓王信餘寇於東垣十一月令士卒從軍死者為槥音衛小棺歸其縣縣給衣衾棺葬具長吏視葬祠以少牢十二月行自東垣至春三月行如雒陽令吏卒從軍至平城及守城邑者皆復終身勿事爵非公乘以上毋得冠劉氏冠賈人毋得衣錦繡綺縠絺紵罽操兵乘騎馬秋八月吏有罪未發覺者赦之九月行自雒陽至九年冬十月未央宫成大朝諸侯羣臣置酒未央前殿上奉玉巵起為太上皇壽曰始大人常以臣亡賴不能治産業不如仲力今某之業所就孰與仲多殿上羣臣皆稱萬嵗大笑為樂十一月從婁敬之言徙郡國大族十餘萬人以實關中楚昭氏屈氏景氏懷氏齊田氏皆與利田宅十二月行如雒陽趙相貫髙謀逆發覺初上自平城還過趙不禮趙王趙相貫髙等耻之及還自東垣又過趙貫髙等伏兵柏人亭為逆上欲宿心動問縣何名曰柏人上曰柏人者迫于人也去弗宿至是始覺逮捕貫髙等并捕趙王敖下獄詔敢有隨王罪三族郎中田叔孟舒等十人自髠鉗為王家奴從王就獄王實不與謀春正月廢趙王敖以尚魯元公主故封為宣平侯徙代王如意為趙王赦殊死已下二月至自雒陽賢田叔孟舒等十人召見與語漢廷臣亡能出其右者盡拜為郡守諸侯相夏六月乙未晦日有蝕之十年冬十月淮南王黥布梁王彭越燕王盧綰荆王劉賈楚王劉交齊王劉肥長沙王吳芮來朝長樂宫夏五月太上皇崩于櫟陽宫秋七月癸卯葬太上皇于萬年赦櫟陽囚死罪以下八月令諸侯王皆立太上皇廟于國都更命酈邑曰新豐九月代相國陳豨反豨少時常慕魏公子無忌之養賢及為相守邊接下賔客從車千餘乘初豨適代時辭淮陰侯韓信信既廢怨望乃與豨謀曰趙代精兵處也公反於外上必自出吾從中起天下可圗也至是豨與王黃等劫掠代地上曰代地吏民非有罪也能去豨黃來歸者舍之上自東擊豨至邯鄲上喜曰豨不南據邯鄲而阻漳水吾知其亡能為也趙相周昌奏常山二十五城亡其二十城請誅守尉上曰守尉反乎對曰不上曰是力不足亡罪上令周昌選趙壯士可令將者白見四人上嫚罵曰豎子能為將乎四人慙皆伏地各封千户侯以為將左右諌曰從入蜀漢伐楚賞未遍行今封此何功上曰非汝所知陳豨反趙代地皆豨有吾以羽檄徴天下兵未有至者今計唯獨邯鄲中兵耳吾何愛四千戶不以慰趙子弟皆曰善又求樂毅之後得其孫敖封之樂鄉號華成君問豨將皆故賈人上曰吾知與之矣乃多以金購豨將豨將多降十一年冬十月上在邯鄲豨將侯敞將萬餘人遊行王黃將千餘騎軍曲逆張春將卒萬餘人渡河攻聊城漢將軍郭蒙與齊將擊大破之太尉周勃道太原入定代地至馬邑馬邑不下攻殘之豨將趙利守東垣上自攻之不下月餘卒罵上上怒城降令出罵者斬之不罵者原之諸縣堅守不降反寇者復租賦三嵗春正月淮隂侯韓信謀反長安與陳豨為內應吕后以蕭何謀執信斬之夷三族將軍柴武斬韓王信於參合上還洛陽詔曰代地居常山之北與夷狄邉趙乃從山南有之遠數有胡寇難以為國頗取山南太原之地益屬代代之雲中以西為雲中郡則代受邉寇益少矣王相國通侯吏二千石擇可立為代王者羣臣皆曰子恆賢知溫良請立以為代王都晉陽大赦天下二月詔曰欲省賦甚今獻未有程吏或多賦以為獻而諸侯王尤多民疾之令諸侯王通侯常以十月朝獻及郡各以其口數率人嵗六十三錢以給獻費又詔曰古之王伯皆待賢人而成名今天下賢者患在人主不交士士奚由進賢士大夫有肯從我遊者吾能尊顯之布告天下使眀知朕意御史大夫昌下相國相國酇侯下諸侯王御史中執法下郡守其有意稱眀德者必身勸為之駕遣詣相國府署行義年有而弗言覺免年老癃病勿遣三月梁王彭越謀反廢遷蜀道逄吕后泣訴無罪吕后與俱還誅之夷三族立子恢為梁王子友為淮陽王罷東郡頗益梁罷潁川郡頗益淮陽夏四月行自雒陽至令豐人徙關中者皆復終身五月詔曰粵人之俗好相攻擊前時秦徙中縣之民於南方三郡桂林象郡南海使與百粵雜處會天下誅秦南海尉他徙何切姓趙居南方長治之甚有文理中縣人以故不耗減粵人相攻擊之俗益止俱賴其力今立他為南粵王使陸賈即授璽綬他稽首稱臣六月令士卒從入蜀漢關中者皆復終身秋七月淮南王布反上問諸將滕公言故楚令尹薛公有籌䇿上召見薛公言布形勢上善之封薛公千户羣臣請立子長為淮南王上乃發上郡北地隴西車騎巴蜀材官及中尉卒三萬人為皇太子衛軍霸上布果如薛公言東擊殺荆王賈劫其兵渡淮擊楚楚王交走入薛上赦天下死罪以下皆令從軍徴諸侯兵上自將以擊布與布遇于蘄西會􅀢會音儈􅀢杖瑞切蘄縣鄉名十二年冬十月上與布戰大破布軍布走江南令别將追擊之上還過沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣上擊築自歌曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方令兒皆和習之上乃起舞慷慷傷懷泣數行下謂沛父兄曰遊子悲故鄉吾雖都關中萬嵗之後吾魂魄猶樂思沛且朕自沛公以誅暴逆遂有天下其以沛為朕湯沐邑復其民世世無有所與沛父老諸母故人日樂飲極歡道舊故為笑樂十餘日上欲去沛父兄固請留上曰吾人衆多父兄不能給乃去沛中空縣皆之邑西獻上復留止張飲三日沛父兄皆頓首曰沛幸得復豐未得惟陛下哀憐之上曰豐吾所生長極不忘耳特為其以雍齒故反我為魏沛父兄固請乃并復豐比沛上至長安立新豐縣初上以太上皇思土欲歸豐故作是縣徙豐民以實之遷豐之榆枌城寺市里不易其舊縱雞犬亦知歸止凡豐人徙關中者皆復終身漢别將擊布軍洮水南北皆大破之追斬布畨陽周勃定代斬陳豨於當城詔立郃陽侯仲之子沛侯濞為吳王十一月行自淮南還過魯以太牢祠孔子十二月詔曰秦始皇帝楚隱王陳勝魏安釐王釐音僖昭王之子齊愍王宣王之子趙悼襄王孝成王之子皆絶亡後其豫秦始皇帝守冡二十家楚魏齊各十家趙及魏公子無忌各五家令視其冡復亡與他事陳豨降將言豨反時燕王盧綰使人之豨所與隂謀上使辟陽侯審食其迎綰綰稱􅍚食其歸具言綰反有端春二月使樊噲周勃將兵擊綰詔曰燕王綰與吾有故愛之如子聞與陳豨有謀吾以為亡有故使人迎綰綰稱􅍚不來謀反眀矣燕吏民非有罪也賜其吏六百石以上爵各一級與綰居去來歸者赦之加爵亦一級羣臣請立子建為燕王詔曰南武侯織亦粵之世也立以為南海王三月詔曰吾立為天子帝有天下十二年于今矣與天下之豪士賢大夫共定天下同安輯之其有功者上致之王次為列侯下乃食邑而重臣之親或為列侯皆令自置吏得賦斂女子公主為列侯食邑者皆佩之印賜大第室吏二千石徙之長安受小第室入蜀漢定三秦者皆世世復吾於天下賢士功臣可謂亡負矣其有不義背天子擅起兵者與天下共誅之布告天下使眀知朕意上擊布時為流矢所中行道疾疾甚吕后迎良醫醫入見上問醫曰疾可治否醫曰可治上嫚罵之曰吾以布衣提三尺劒取天下此非天命乎命乃在天雖扁鵲何益遂不使治疾賜黃金五十斤罷之已而吕后問曰陛下百嵗後蕭相國即死令誰代之上曰曺參可問其次曰王陵可然少戇竹巷切陳平可以助之陳平智有餘然難獨任周勃重厚少文然安劉氏者必勃也可令為太尉又問其次上曰過此後亦非乃所知也盧綰與數千人居塞下候伺幸上疾愈自入謝夏四月甲辰帝崩于長樂宫年六十二瓚曰帝年四十二即位即位十二年年五十三盧綰聞之遂亡入胸奴吕后與審食其謀曰諸將故與帝為編戶民北面為臣心常怏怏今乃事少主非盡族是天下不安以故不發喪人或聞以語將軍酈商商往見食其曰聞帝已崩四日不發喪欲誅諸將誠如此天下危矣陳平灌嬰將十萬守滎陽樊噲周勃將二十萬定燕代比聞帝崩諸將皆誅必連兵還鄉以攻關中大臣內畔諸將外反亡可蹻足待也食其入言之乃以丁未發喪大赦天下五月丙寅葬長陵凡二十三日而葬長陵在長安四十里已下皇太子羣臣皆反至太上皇廟羣臣皆曰帝起細微撥亂世反之正平定天下為漢太祖功最髙上尊號曰髙皇帝太子襲號為皇帝是為惠帝令郡國各立髙祖廟以嵗時祠之及孝惠五年思髙祖之悲樂沛以沛宫為髙祖原廟髙祖所教歌兒百二十人皆令為吹樂復有闕輒補之漢史曰髙祖不修文學而性眀達好謀能聽自監門戍卒見之如舊初順民心作三章之約天下既定命蕭何次律令韓信申軍法張蒼定章程叔孫通制禮儀陸賈造新語又與功臣剖符作誓丹書鐡契金匱石室藏之宗廟雖日不暇給規模宏逺矣髙帝即位十二年孝惠皇帝名盈之字曰滿髙祖八子孝惠其次也實嫡故漢王二年年五嵗立為太子髙祖十二年四月崩崩二十有三日太子乃即皇帝位實五月丙寅也尊髙后曰皇太后賜吏民爵各有差其給喪事將軍以下至佐史長吏賜金錢各有差六百石以上有罪當盜械者皆頌繫之頌繫者處曺吏舍不入狴牢頌音容上造以上及內外公孫耳音仍孫有罪當刑及當為城旦舂者皆耐為鬼薪白粲上造第二爵城旦者旦起行治城舂者婦人舂米皆四歲刑鬼薪者取薪給宗廟白粲者擇米使正白皆三歲刑民年七十以上十歲以下有罪當刑皆完之吏六百石以上及故二千石家惟給軍賦他無有所與令郡諸侯王立髙廟減田租復十五稅一元年冬十二月趙隱王如意薨民有罪得買爵三十級以免罪賜民爵户一級春正月城長安應劭曰一級直錢二千凡為六萬若今贖罪入縑三十匹矣師古曰令出買爵之錢以贖罪二年冬十月齊悼惠王來朝尊魯元公主為太后春正月癸酉有兩龍見蘭陵家人井中三日不見隴西地震夏旱郃陽侯仲薨秋七月辛未相國何薨三年春發長安六百里內男女十四萬六千人城長安三十日罷以宗室女為公主嫁胸奴單于夏五月立閩越君搖為東海王六月發諸侯王徒隸二萬人城長安秋七月都廄災南越王趙他稱臣奉貢四年冬十月壬寅立皇后張氏張敖之女帝姊魯元公主所生春正月舉民孝弟力田者復其身三月甲子皇帝冠赦天下省法令妨吏民者除挾書律長樂宫鴻臺災宜陽雨血秋七月乙亥未央宫淩室災丙子織室災五年冬十月靁桃李華棗實春正月復發長安六百里內男女十四萬五千人城長安三十日罷夏大旱秋八月己丑相國參薨九月長安城成賜民爵戶一級六年冬十月辛丑齊王肥薨令民得賣爵女子年十五以上至三十不嫁五算夏六月舞陽侯噲薨起長安西市修敖倉國語越王勾踐令國中女子年十七不嫁者父母有罪欲人民繁息也漢律人出一算算百二十錢唯賈人與奴婢倍算今使五算罪謫之也七年冬十月發車騎材官詣滎陽太尉灌嬰將春正月辛丑朔日有蝕之夏五月丁邜日有蝕之既秋八月戊寅帝崩于未央宫九月辛丑葬安陵諡孝惠皇帝漢家自孝惠後加諡之上皆以孝字孝惠皇帝即位七年臣謹按漢吕唐武之后立紀議者紛紜不已殊不知紀者編年之書也若吕后之紀不立則八年正朔所系何朝武后之紀不立則二十年行事所著何君不察實義徒事虛言史家之大患也髙皇后吕氏名雉字娥姁計于切髙祖微時娶之生孝惠帝魯元公主及髙祖為漢王得定陶戚姬愛幸生趙隱王如意孝惠仁弱髙祖以為不類我雖已為太子常欲廢之而立如意曰如意類我賴大臣爭之及留侯䇿太子得毋廢吕后為人剛毅佐髙祖定天下所誅大臣多后力父兄及髙祖而侯者三人父臨泗侯長兄澤周吕侯次兄釋之建成侯澤死事封其二子台為酈侯産為交侯惠帝立尊為太后太后最怨戚夫人及其子乃徵趙王而鴆之又殘戚夫人以為人彘孝惠見之而大哭因病歲餘不能起使人謂太后曰此非人所為臣不堪為太后子終不能治天下以此日飲為淫樂不聽政皇后張氏無子吕后取後宫美人子殺其母立為太子孝惠崩立太子為帝年幼太后臨朝稱制初惠帝之崩太后哭而不泣留侯子張辟疆為侍中年十五謂丞相陳平曰太后獨有帝今哭而不悲君知其解乎丞相曰何解辟疆曰帝亡壯子太后畏君等君今請拜吕台吕祿吕産為將將兵居南北軍及諸吕皆入宫居中用事如此則太后必安君等幸脫禍矣平從其計太后哭乃哀於是立兄子吕台産祿台子通四人為王封諸吕六人為列侯吕氏之權由此起元年春正月詔曰前日孝惠皇帝言欲除三族罪妖言令議未決而崩令除之二月賜民爵戶一級初置孝弟力田二千石一人夏五月丙申趙王宫叢臺災立孝惠後宫子疆為淮陽王不疑為恆山王𢎞為襄成侯朝為軹侯武為壺關侯秋桃李華二年春詔曰髙皇帝匡飭天下諸有功者皆受分地為列侯萬民大安莫不受休德朕思念至於久逺而功名不著亡以尊大誼施後世今欲差次列侯功以定朝位藏於髙廟世世勿絶嗣子各襲其功位其與列侯議定奏之丞相臣平言謹與絳侯臣勃曲周侯臣商潁陰侯臣嬰安國侯臣陵等議列侯幸得賜餐錢奉邑陛下加惠以功次定朝位臣請藏髙廟奏可春正月乙邜地震羌道武都道山崩夏六月丙戌晦日有蝕之秋七月恆山王不疑薨以其弟襄成侯為恆山王更名義行八銖錢三年夏江水漢水溢流民四千餘家秋星晝見四年夏少帝既長自知非皇后子出怨言皇太后幽之永巷詔羣臣議更立五月丙辰立恆山王義為皇帝更名𢎞五年春南越王尉他自稱南武帝秋八月淮南王疆薨九月發河東上黨騎屯北地六年春星晝見夏四月赦天下秩長陵令二千石六月城長陵胸奴寇狄道攻河陽行五分錢七年冬十二月胸奴寇狄道略二千餘人春正月丁丑趙王友幽死于邸己丑晦日有食之既以梁王吕産為相國趙王祿為上將軍立營陵侯劉澤為琅邪王夏五月辛未詔曰昭靈夫人太上皇妃也武哀侯宣夫人髙皇帝兄姊也號諡不稱其議尊號丞相平等請尊昭靈夫人曰昭靈后武哀侯曰武哀王宣夫人曰昭皇后六月趙王恢自殺秋九月燕王建薨南越侵盜長沙遣隆慮侯竈將兵擊之八年春封中謁者張釋卿為列侯諸中官宦者令丞皆賜爵關內侯食邑春三月太后祓還軹道見物如蒼狗據音戟后掖忽弗復見卜云趙王如意為祟太后遂病夏江水漢水溢流萬餘家秋七月太后病甚誡産祿曰髙帝已定天下與大臣約曰非劉氏王者天下共擊之今吕氏王大臣弗平我即崩帝年少大臣恐為變必據兵衛宫慎毋送喪毋為人所制辛巳皇太后崩于未央宫遺詔以吕産為相國諸吕用事自知背髙祖約恐為大臣諸侯王所誅因謀作亂時齊悼惠王子朱虛侯章及其弟東牟侯興居皆在京師朱虛侯婦吕祿女也陰知其謀潛令人告其兄齊王令發兵西章與太尉勃丞相平為內應以誅諸吕齊王遂發兵又詐琅琊王澤發其國兵并將而西産祿等遣大將軍灌嬰將兵擊之嬰至滎陽使人諭齊王與連和待吕氏變而共誅之是時趙王祿梁王産各將兵居南北軍太尉勃不得入軍中主兵乃與丞相平謀以曲周侯酈商老病其子寄與吕祿善使人劫商令寄紿説祿曰髙帝與吕后共定天下劉氏所立九王吕氏所立三王皆大臣之議事已布告諸侯王諸侯王以為宜今太后崩帝少足下既佩趙王印不急之國守藩乃為上將將兵留此為大臣諸侯所疑何不速歸將軍印以兵屬太尉請梁王亦歸相國印與大臣盟而之國齊兵必罷大臣得安足下髙枕而王千里此萬世之利也祿然之使人報産及諸吕老人或以為不便計猶豫未有所決祿信寄與俱出遊獵過其姑吕嬃嬃大怒曰若為將而棄軍吕氏今無處矣乃悉出珠玉寶器散堂下曰毋為他人守也八月庚申旦平陽侯窋行御史大夫事窋曺參子也見相國産計事郎中令賈壽使從齊來因數産曰王不早之國今雖欲行尚可得邪具以灌嬰與齊楚合從狀告産乃趣産入宫窋聞其語馳告丞相平太尉勃勃欲入北軍不能得襄平侯紀通尚符節乃令持節矯內勃北軍勃復令寄與典客劉揭説祿曰帝使太尉守北軍欲足下之國急歸將印辭去不然禍且起祿遂解印屬典客而以兵授太尉勃勃入軍門行令軍中曰為吕氏右袒為劉氏左袒軍皆左袒勃雖將北軍然尚有南軍丞相平召朱虛侯章佐勃勃令章監軍門令平陽侯告衛尉毋內相國産殿門産不知祿已去北軍乃入未央宫欲為亂殿門弗內徘徊往來平陽侯馳告太尉勃勃尚恐不勝諸吕未敢誦言誅之乃謂朱虛侯章曰急入宫衛帝章從勃請卒千人入未央宫掖門見産廷中日餔時遂擊産産走天風大起以故從官亂莫敢鬬逐産殺之郎中府吏舍厠中章已殺産帝命謁者持節勞章章欲奪節謁者不肯章乃從與載因節信馳斬長樂衛尉吕更始還入北軍復報太尉勃勃起拜賀章曰所患獨産今已誅天下定矣遂遣人分部悉捕吕氏男女無少長皆斬之辛酉捕斬吕祿而笞殺吕嬃使人誅燕王吕通而廢魯王張偃遣朱虛侯以誅諸吕事告齊王令罷兵灌嬰兵亦罷滎陽而歸諸大臣相與陰謀曰少帝及梁淮陽常山王皆非真孝惠子吕后以計詐名他人子殺其母養後宫令孝惠子之今皆不可立齊悼惠王之適子為齊王髙帝之長孫也然吕氏以外家惡幾危家廟今齊王母家駟駟鈞惡人也即立齊王則復為吕氏淮南王少而母家又惡惟代王方今髙帝見子最長仁孝寬厚太后家薄氏謹良且立長故順以仁孝聞於天下便乃相與共陰使人召代王代王使人辭謝再反然后乘六乘傳後九月晦日己酉至長安舍代邸大臣皆往謁奉天子璽上代王共尊立為天子代王數讓羣臣固請然後聼東牟侯興居曰誅吕氏吾無功請得除宫乃與太僕汝隂侯滕公入宫前謂少帝曰足下非劉氏不當立乃顧麾左右執戟者掊音撲兵罷去有數人不肯去兵宦者令張澤諭告亦去兵滕公乃召乘輿車載少帝出少帝曰欲我將安之乎滕公曰出就舍舍少府乃奉天子法駕迎代王於邸報曰宫謹除代王即夕入未央宫有謁者十人持戟衛端門曰天子在也足下何為者而入代王乃謂太尉太尉往諭謁者十人皆掊兵而去代王遂入而聼政夜有司分部誅滅梁淮陽常山王及少帝於邸吕后合葬長陵關中記曰髙祖陵在西吕后陵在東漢帝后同塋則為合葬不必同陵也諸陵皆然高后稱制八年通志卷五上
