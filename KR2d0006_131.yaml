body:
  text: 通志卷一百十三下宋右迪功郎鄭樵漁仲撰列傳第二十六下劉虞字伯安東海郯人也祖父嘉光祿勳虞初舉孝亷稍遷幽州刺史民夷感其德化自鮮卑烏桓夫餘濊貊之輩皆隨時朝貢無敢擾邊者百姓歌悅之公事去官中平初黃巾作亂攻破冀州諸郡拜虞甘陵相綏撫荒餘以疏儉率下遷宗正後車騎將軍張溫討邊章等發幽州烏桓三千突騎而牢稟逋懸皆畔還本國前中山相張純私謂前太山太守張舉曰今烏桓既畔皆願為亂涼州賊起朝廷不能禁又洛陽民妻生子兩頭此漢祚衰盡天下有兩主之徵也子若與吾共率烏桓之衆以起兵庶幾可定大業舉因然之四年純等遂與烏桓大人共連盟攻薊下燔燒城郭虜掠百姓殺護烏桓校尉箕稠右北平太守劉政遼東太守楊終等衆至十餘萬屯肥如舉稱天子純稱彌天將軍安定王移書州郡云舉當代漢告天子避位勑公卿奉迎純又别使烏桓峭王等步騎五萬入青冀二州攻破清河平原殺害吏民朝廷以虞威信素著恩積北方明年復拜幽州牧虞到薊罷省屯兵務廣恩信遣使告峭王等以朝恩寬𢎞開許善路又設賞購舉純舉純走出塞餘皆降散純為其客王政所殺送首詣虞靈帝遣使就拜太尉封容邱侯及董卓秉政遣使者授虞大司馬進封襄賁侯初平元年復徵代袁隗為太傅時道路隔塞王命竟不得逹舊幽部應接荒外資費甚廣常割青冀賦調二億有餘以給足之時處處斷絶委輸不至而虞務存寬政勸督農植開上谷朝市之利通漁陽鹽鐵之饒民悅年登榖石三十青徐士庶避黃巾之難歸虞者百餘萬口皆收視溫恤為安立生業流民皆忘其遷徙虞雖為上公天性節約敝衣繩履食無兼肉遠近豪俊夙僭奢者莫不解操而歸心焉初詔令公孫瓚討烏桓受虞節度瓚但務會徒衆以自強大而縱任部曲頗侵擾百姓而虞為政仁愛念利民物由是與瓚漸不相平二年冀州刺史韓馥渤海太守袁紹及山東諸將議以朝廷幼沖逼於董卓逺隔關塞不知存否以虞宗室長者欲立為主乃遣故樂浪太守張岐等齎議上虞尊號虞見岐等厲色叱之曰今天下崩亂主上蒙塵吾被重恩未能清雪國耻諸君各據州郡宜共戮力盡心王室而反造逆謀以相垢汚邪固拒之馥等又請虞領尚書事承制封拜復不聽遂收斬使人於是選掾右北平田疇從事鮮于銀蒙險間行奉使長安獻帝既思東歸見疇等大悅時虞子和為侍中因此遣和潛從武關出告虞將兵來迎道由南陽後將軍袁術聞其狀遂質和使報虞遣兵俱西虞乃使數千騎就和奉迎天子而術竟不遣之初公孫瓚知術詐固止虞遣兵虞不從瓚乃隂勸術執和使奪其兵自是與瓚讐怨益深和尋得逃術還北復為袁紹所留瓚既纍為紹所敗而猶攻之不已虞患其黷武且慮得志不可復制固不許行而稍節其廪假瓚怒屢違節度又復侵犯百姓虞所賚賞典當胡夷瓚數抄奪之積不能禁乃遣驛使奉章陳其暴掠之罪瓚亦上虞廪糧不周二奏交馳互相非毁朝廷依違而已瓚乃築京高薊城以備虞虞數請瓚輒稱病不應虞乃密謀討之以告東曹掾右北平魏攸攸曰今天下引領以公為歸謀臣爪牙不可無也瓚文武才力足恃雖有小惡固宜容忍虞乃止頃之攸卒而積忿不已四年冬遂自率諸屯兵衆合十萬人以攻瓚將行從事代郡程緒免胄而前曰公孫瓚雖有過惡而罪名未正明公不先告曉使得改行而兵起蕭牆非國之利加勝敗難保不如駐兵以武臨之瓚必悔禍謝罪所謂不戰而服人者也虞以緒臨事沮議遂斬之以徇戒軍士曰無傷餘人殺一伯圭而已時州從事公孫紀者瓚以同姓厚待遇之紀知虞謀而夜告瓚瓚時部曲放散在外倉卒自懼不免乃掘東城欲走虞兵不習戰又愛人廬舍勑不聽焚燒急攻圍不下瓚乃簡募精鋭數百人因風縱火直衝突之虞遂大敗與官屬北奔居庸縣瓚追攻之三日城陷遂執虞并妻子還薊猶使領州文書會天子遣使者假訓增虞封邑督六州事拜瓚前將軍封易侯假節督幽并司冀瓚乃誣虞前與袁紹等欲稱尊號脅訓斬虞於薊市先坐而咒曰若虞應為天子者天當風雨以相救時旱藝炎盛遂斬焉傳首京師故吏尾敦於路劫虞首歸葬之瓉乃上訓為幽州刺史虞以恩厚得衆懷被北州百姓流舊莫不痛惜焉初虞以儉素為操冠敝不改乃就補其穿及遇害瓚兵搜其內而妻妾服羅紈盛綺飾時人以此疑之和後從袁紹報瓚云公孫瓚字伯圭遼西令支人也家世二千石瓚以母賤遂為郡小吏為人美姿貌大音聲言事辨慧太守竒其才以女妻之後從涿郡盧植學於緱氏山中略見書傳舉上計吏太守劉君坐事檻車徵官法不聽吏下親近瓚乃改容服詐稱侍卒身執徒養御車到洛陽太守當徙日南瓚具豚酒於北芒上祭辭先人酹觴祝曰昔為人子今為人臣當詣日南日南多瘴氣恐或不還便當長辭墳塋慷慨悲泣再拜而去觀者莫不嘆息既行於道得赦瓚還郡舉孝亷除遼東屬國長史嘗從數十騎出行塞下卒逢鮮卑數百騎瓚乃退入空亭約其從者曰今不奔之則死盡矣乃自持兩刃矛馳出衝賊殺傷數十人瓚左右亦亡其半遂得免中平中以瓉督烏桓突騎將軍張溫討涼州賊會烏桓反叛與賊張純等攻擊薊中瓚率所領追討純等有功遷騎都尉張純復與畔胡邱力居等寇漁陽河間渤海入平原多所殺略瓉追擊戰於屬國石門虜遂大敗棄妻子踰塞走悉得所略男女瓚深入無繼反為邱力居等所圍於遼西管子城二百餘日糧盡食馬馬盡煮弩楯力戰不敵乃與士卒辭訣各分散還時多雨雪墜坑死者十五六虜亦飢困逺走栁城詔拜瓉降虜校尉封都亭侯復兼領屬國長史職統戎馬連接邊寇每聞有警瓉輒厲色憤怒如赴讐敵望塵奔逐或繼之以夜戰虜識瓚聲憚其勇莫敢抗犯瓚常與善射之士數十人皆乘白馬以為左右翼自號白馬義從烏桓更相告語避白馬長史乃畫作瓚形馳騎射之中者咸稱萬嵗虜自此之後遂竄塞外瓉志掃滅烏桓而劉虞欲以恩信招降由是與虞相忤初平二年青徐黃巾三十萬衆入渤海界欲與黑山合瓚率步騎二萬人逆擊於東光南大破之斬首三萬餘級賊棄其車重數萬兩奔走渡河瓚因其半濟薄之賊復大破死者數萬流血丹水收得生口七萬餘人車甲財物不可勝算威名大震拜奮武將軍封薊侯瓚既諫劉虞遣兵就袁術而懼術知怨之乃使從弟越將千餘騎詣術自結術遣越隨其將孫堅擊袁紹將周昕越為流矢所中死瓚因此怒紹遂出軍屯槃河將以報紹乃上疏陳紹十罪遂舉兵攻紹於是冀州諸城悉畔從瓚紹懼乃以所佩勃海太守印綬授瓚從弟範遣之郡欲以相結而範遂背紹領勃海兵以助瓚瓚乃自署其將帥為青冀兖三州刺史又悉置郡縣守令與紹大戰於界橋瓚軍敗還薊紹遣將崔巨業將兵數萬攻圍故安不下退軍南還瓚將步騎三萬人追擊於巨馬水大破其衆死者七八千人乘勝而南攻下郡縣遂至平原乃遣其青州刺史田揩據有齊地紹復遣兵數萬與揩連戰二年糧食並盡士卒疲困互掠百姓野無青草紹乃遣子談為青州刺史揩與戰敗退還是歲瓚破禽劉虞盡有幽州之地猛志益盛前此有童謡曰燕南垂趙北際中央不合大如礪唯有此中可避世瓚自以為易地當之遂徙鎮焉乃盛修營壘樓觀數十臨易河通遼海劉虞從事漁陽鮮于輔等合率州兵欲共報瓚輔以燕國閻柔素有恩信推為烏桓司馬柔招誘胡漢數萬人與瓚所置漁陽太守鄒丹戰于潞北斬丹等四千餘級烏桓峭王感虞恩德率種人及鮮卑七千餘騎共輔南迎虞子和與袁紹將麴義合兵十萬共攻瓚興平二年破瓚於鮑邱斬首二萬餘級瓚遂保易京開置屯田稍得自支相持歲餘麴義軍糧盡士卒飢困餘衆數千人退走瓚徼破之盡得其車重是時旱蝗榖貴民相食瓚恃其才力不恤百姓記過忘善睚眥必報州里善士名在其右者必以法害之常言衣冠皆自以職分富貴不謝人惠故所寵愛類多商販庸兒所在侵暴百姓怨之於是代郡廣陽上谷右北平各殺瓉所置長吏復與輔和合兵瓚慮有非常乃居於高京以鐵為門斥去左右男人七歲以上不得入易門專侍姬妾其文簿書記皆汲而上之令婦人習為大言聲使聞數百步以宣傳教令疏遠賔客無所親信故謀臣猛將稍有乖散自此之後希復攻戰或問其故瓚曰我昔驅畔胡於塞表掃黃巾於孟津當此之時謂天下指麾可定至於今日兵革方始觀此非我所決不如休兵力耕以救凶年兵法百樓不攻今吾諸營樓櫓千重積榖三百萬斛食此足以待天下之變建安三年袁紹復大攻瓚瓚遣子續請救於黑山諸帥而欲自將屯騎直出傍西山以斷紹後長史關靖諫曰今將軍將士莫不懷瓦解之心所以猶能相守者顧戀其老小而恃將軍為主故耳堅守曠日或可使紹自退若舍之而出後無鎮重易京之危可立待也瓚乃止紹漸相攻逼瓚衆日蹙乃却築三重營以自固四年春黑山賊帥張燕與續率兵十萬三道來救瓚未及至瓚乃密使行人齎書告續曰昔周末喪亂僵尸蔽地以意而推猶為否也不圖今日親當其鋒袁氏之攻狀若鬼神梯衝舞吾樓上鼓角鳴於地中日窮月急不遑啓處鳥厄歸人滀水陵高汝當碎首於張燕馳驟以告急父子天性不言而動且厲五千鐵騎於北隰之中起火為應吾當自內出奮揚威武決命於斯不然吾亡之後天下雖廣不容汝足矣紹候得其書如期舉火瓚以為救至遂使出戰紹設伏兵瓚遂大敗復還保中小城自計必無全乃悉縊其姊妹妻子然後引火自焚紹兵趣登臺斬之關靖見瓚敗歎恨曰前若不止將軍自行未必不濟吾聞君子陷人於危必同其難豈可以獨生乎乃策馬赴紹軍而死續為屠各所殺田揩與袁紹戰死鮮于輔將其衆歸曹操操以輔為度遼將軍封都亭侯閻柔將部曲從曹操擊烏桓拜護烏桓校尉封關內侯張燕既為紹所敗人衆稍散曹操將定冀州乃率衆詣鄴降拜北平將軍封安國亭侯陶謙字恭祖丹陽人也少為諸生仕州郡四遷為車騎將軍張溫司馬西討邊章會徐州黃巾起以謙為徐州刺史擊黃巾大破走之境內晏然時董卓雖誅而李傕郭泛作亂關中是時四方斷絶謙每遣使間行奉貢西京詔遷為徐州牧加安東將軍封溧陽侯是時徐方百姓殷盛榖實甚豐流民多歸之而謙信用非所刑政不理别駕從事趙昱知名士也而以忠直見疏出為廣陵太守曹宏等讒慝小人謙甚親任之良善多被其害由斯漸亂下邳閻宣自稱天子謙始與合從後遂殺之而并其衆初曹操父嵩避難琅邪時謙别將守隂平士卒利嵩財寶遂襲殺之初平四年曹操擊謙破彭城傅陽謙退保郯操攻之不能尅乃還過拔取慮睢陵夏邱皆屠之凡殺男女數十萬人雞犬無餘泗水為不流自是五縣城保無復行迹初三輔遭李傕亂百姓流移依謙者皆殱興平元年曹操復擊謙略定琅邪東海諸縣謙懼不免欲走歸丹陽會張邈迎吕布據兖州操還擊布是歲謙病死初同郡人笮融聚衆數百往依於謙謙使督廣陵下邳彭城運糧遂斷三郡委輸大起浮屠寺上纍金盤下為重樓又堂閣周回可容三千許人作黃金塗像衣以錦綵每浴佛輒多設飲飯布席於路其有就席及觀者且萬餘人及曹操擊謙徐方不安融乃將男女萬口馬二千匹走廣陵廣陵太守趙昱待以賔禮融利廣陵資貨遂乘酒酣殺昱放兵大掠因以過江南奔豫章殺郡守朱皓入據其城後為揚州刺史劉繇所破走入山中為人所殺昱字元逹琅邪人清已疾惡潛志好學雖親友希得見之為人耳不邪聽目不妄視太僕种拂舉為方正袁紹字本初汝南汝陽人司徒湯之孫也父成五官中郎將紹壯健好交結大將軍梁冀以下莫不善之紹少為郎除濮陽長遭母憂去官三年禮竟追感幼孤又行父服服闋徙居洛陽紹有姿貌威容愛士飬名既纍世台司賔客所歸加傾心折節莫不爭赴其庭士無貴賤與之抗禮輜軿柴轂填接街陌內官皆惡之中常侍趙忠言於省內曰袁本初坐作聲價好飬死士不知此兒終欲何作叔父太傅隗聞而呼紹以忠言責之紹終不改後辟大將軍何進掾為侍御史虎賁中郎將中平五年初置西園八校尉以紹為佐軍校尉靈帝崩紹勸何進徴董卓脅太后誅宦官轉紹司𨽻校尉語已見何進傳及卓將兵至騎都尉太山鮑信説紹曰董卓擁制強兵將有異志今不早圗必為所制及其新至疲勞襲之可禽也紹畏卓不敢發頃之卓議欲廢立謂紹曰天下之主宜得賢明每念靈帝令人憤毒董侯似可今當立之紹曰今上富於春秋未有不善宣於天下若公違禮任情廢適立庶恐衆議未安卓按劍叱紹曰豎子敢然天下之事豈不在我我欲為之誰敢不從紹詭對曰此國之大事請出與太傅議之卓復言劉氏種不足復遺紹勃然曰天下健者豈惟董公引佩刀橫揖而去懸節於上東門而奔冀州卓購募求紹時侍中周珌校尉伍瓊為卓所親信瓊等隂為紹説卓曰夫廢立大事非常人所及袁紹不逹大體恐懼出奔非有他志今急購之藝必為變袁氏樹恩四世門生故吏遍於天下若收豪傑以聚徒衆英雄因之而起山東非公有也不如赦之拜一郡守紹喜於免罪必無患矣卓以為然乃遣授紹勃海太守封邟鄉侯紹猶稱兼司𨽻初平元年紹遂以勃海起兵與從弟後將軍術冀州刺史韓馥豫州刺史孔胄兖州刺史劉岱陳留太守張邈廣陵太守張超河內太守王匡山陽太守袁遺東郡太守橋瑁濟北相鮑信等同時俱起衆各數萬以討卓為名紹與王匡屯河內胄屯潁川馥屯鄴餘軍咸屯酸棗約盟遙推紹為盟主紹自號車騎將軍領司𨽻校尉董卓聞紹起山東乃誅其叔父隗及宗族在京師者皆滅之卓乃遣大鴻臚韓融少府隂循執金吾胡母班將作大匠吳循越騎校尉王瓌譬解紹等諸軍紹使王匡殺班壞吳循等袁術亦執殺隂循惟韓融以名德免是時豪傑既多附紹又感其家禍人思為報州郡蜂起莫不以袁氏為名馥見人情歸紹忌其得衆恐將圗已常遣從事守紹門不聽起兵橋瑁乃詐作三公移書傳驛州郡説董卓罪惡天子危逼企望義兵以釋國難馥於是方聽紹舉兵乃謀於衆曰助袁氏乎助董氏乎治中劉惠勃然曰興兵為國安問袁董馥意猶深疑於紹每貶節軍糧欲使離散明年馥將麴義反畔馥與戰失利紹既恨馥乃與義相結紹客逢紀謂紹曰舉大事非據一州無以自立今冀部強實而韓馥庸才可密要公孫瓚將兵南下馥聞必駭懼并遣辨士為陳禍福馥迫於倉卒可因據其位紹然之益親紀即以書與瓚瓚遂引兵而至外託討卓而隂謀襲馥紹乃使外甥陳留髙幹及潁川荀諶等説馥曰公孫瓚乘勝來南而諸郡應之袁車騎引兵東向其意未可量也竊為將軍危之馥懼曰然則為之奈何諶曰君自料寬仁容衆為天下所附孰與袁氏馥曰不如也臨危吐決智勇邁於人又孰與袁氏馥曰不如也世布恩德天下家受其惠又孰與袁氏馥曰不如也諶曰渤海雖郡其實州也今將軍資三不如之藝久處其上袁氏一時之傑必不為將軍下也且公孫提燕代之卒其鋒不可當夫冀州天下之重資若兩軍并力交兵城下危亡可立而待也夫袁氏將軍之舊且為同盟當今之計莫若舉冀州以讓袁氏袁氏必德將軍公孫瓚不能復與之爭矣是將軍有讓賢之名而身安於太山也馥性素恇怯因然其計馥長史耿武别駕閔純騎都尉沮授聞而諌曰沮音葅冀州雖鄙帶甲百萬榖支十年紹孤客窮軍仰我鼻息譬如嬰兒在股掌之上絶其哺乳立可餓殺奈何欲以州與之馥曰吾袁氏故吏且才不如本初度德而讓古人所貴諸君獨何病焉先是馥從事趙浮程渙將強弩萬人屯孟津聞之率兵馳還請以拒紹馥又不聽乃避位出居中常侍趙忠故舍遣子送印綬以讓紹紹遂領冀州牧承制以馥為奮威將軍而無所將御引沮授為别駕因謂授曰今賊臣作亂朝廷遷移吾歷世受寵思欲興復漢室然小白非夷吾不能成霸句踐非范蠡無以存國今欲與卿勠力共安社稷將何以匡濟之乎授曰將軍弱冠登朝播名海內值廢立之際忠義奮發單騎出奔董卓懷懼濟河而北渤海稽服擁一郡之卒撮冀州之衆威陵河朔名重天下若舉軍東向則黃巾可掃還討黑山則張燕可滅回師北首則公孫必禽震脅戎狄則胸奴立定橫大河之北合四州之地收英雄之士擁百萬之衆迎大駕於長安復宗廟於洛邑號令天下誅討未服以此爭鋒誰能禦之比及數年其功不難紹喜曰此吾心也即表授為奮武將軍使監護諸將魏郡審配巨鹿田豐並以正直不得志於韓馥紹乃以豐為别駕配為治中甚見器任馥自懷猜懼辭紹索去往依張邈後紹遣使詣邈有所計議因共耳語馥時在坐謂為圗已無何如厠自殺其冬公孫瓚大破黃巾還屯槃河威震河北冀州諸城無不望風嚮應紹乃自擊之瓚兵三萬列為方陳分突騎萬匹翼軍左右其鋒甚鋭紹先令麴義領精兵八百強弩千張以為前登瓚輕其兵少縱騎騰之義兵伏楯下一時同發瓚軍大敗斬其所置冀州刺史嚴綱獲甲首千餘級麴義追至橋界瓚斂兵還戰義復破之遂到瓚營拔其牙門餘衆皆走紹在後十數里聞瓚已破發鞍息馬唯衛帳下強弩數十張大戟士百許人瓚散兵二千餘騎卒至圍紹數重射矢雨下田豐扶紹使却入空垣紹脫兜鍪抵地曰大丈夫當前鬭死而返逃垣墻間邪促使諸弩競發多傷瓚騎衆不知是紹稍引却會麴義來迎騎乃散退三年瓚又遣兵至龍湊挑戰紹復擊破之瓚遂還幽州不敢復出四年初天子遣太僕趙岐和解關東使各罷兵瓚因此以書譬紹願奉朝廷詔命共同和好紹於是引軍南還三月上巳大會賔徒於薄落津聞魏郡兵反與黑山賊于毒等數萬人共覆鄴城殺郡守坐中客家在鄴者皆憂怖失色或起而啼泣紹容貌自若不改常度賊有陶升者故內黃小吏自號平漢將軍獨反諸賊將部衆踰西城入閉府門具車重載紹家及諸衣冠在州內者身自扞衛送到斥邱紹還因屯斥邱以陶升為建義中郎將六月紹乃出軍入朝歌鹿腸山蒼巖谷口討于毒圍攻五日破之斬毒并長安所署冀州牧壺夀及其衆萬餘級紹遂尋山北行追擊諸賊左髭丈八等皆斬之又擊劉石青牛角黃龍左校郭大賢李大目于氐根等復斬數萬級皆屠其屯壁遂與黑山賊張燕及四營屠各鴈門烏桓戰於恆山燕精兵數萬騎數千匹連戰十餘日燕兵死傷雖多紹軍亦疲遂各退麴義自恃有功驕縱不軌紹召殺之而并其衆興平二年拜紹右將軍其冬車駕為李傕等所追於曹陽沮授説紹曰將軍纍葉台輔世濟忠義今朝廷播越宗廟殘毁觀諸州郡雖外託義兵內實相圖無有憂存社稷之意且今州城粗定兵強士附西迎大駕即宫鄴都挾天子而令諸侯搐士馬以討不庭誰能禦之紹將從其計潁川郭圖淳于瓊曰漢室陵遲為日久矣今欲興之不亦難乎且英雄並起各據州郡連徒聚衆動有萬計所謂秦失其鹿先得者王今迎天子動輟表聞從之則權輕違之則拒命非計之善也授曰今迎朝廷於義為得於時為宜若不早定必有先之者焉夫權不失幾功不厭速願即圖之紹以帝立非出己意故不從授議紹有三子談字顯思熙字顯雍尚字顯甫談長而惠尚少而美紹後妻劉有寵而偏愛尚數稱於紹紹亦竒其姿容欲使傳嗣乃以談繼兄後出為青州刺史沮授諫曰世稱萬人逐一人獲之貪者悉止分定故也且年均以賢德均則卜古之制也願上惟先代成則之誡下思逐分定之議若其不改禍始此矣紹曰吾欲令諸子各據一州以觀其能於是以中子熙為幽州刺史外甥高幹為并州刺史建安元年曹操迎天子都許乃下詔書於紹責以地廣兵多而專自樹黨不聞勤王之師而擅相討伐紹上書列陳功伐以自明於是以紹為太尉封鄴侯時曹操自為大將軍紹耻為之下偽表辭不受曹操大懼乃讓位於紹二年使將作大匠孔融持節拜紹大將軍錫弓矢節鉞虎賁百人兼督冀青幽并四州然後受之紹每得詔書患有不便於己乃欲移天子自近使説操以許下埤濕洛陽殘破宜徙都鄄城以就全實操拒之田豐説紹曰徙都之計既不克從宜早圖許奉迎天子動託詔令響號海內此算之上者不然終為人所禽雖悔無益也紹不從四年春擊公孫瓚遂定幽土事在瓚傳紹既并四州之地衆數十萬而驕心轉盛貢御稀簡主簿耿苞密白紹曰赤德衰盡袁為黃允宜順天意以從人心紹以苞白事示軍府僚屬議者以苞妖妄宜誅紹知衆情未同不得已乃殺苞以弭其迹於是選精兵十萬騎萬匹出攻許以審配逢紀統軍事田豐荀諶及南陽許攸為謀主顔良文醜為將帥沮授進説曰近討公孫師出歷年百姓疲敝倉庫無積賦役方殷此國之深憂也宜先遣使獻捷天子務農逸人若不得通乃表曹操隔我王路然後進屯黎陽漸營河南益作舟船繕修器械分遣精騎抄其邊鄙令彼不得安我取其逸如此可坐定也郭圖審配曰兵法十圍五攻敵則能勝今以明公之神武連河朔之強衆以伐曹操其勢譬若覆手今不時取後難圖也授曰蓋救亂誅暴謂之義兵恃衆慿強謂之驕兵義者無敵驕者先滅曹操奉迎天子建宫許都今舉兵南向於義則違且廟勝之策不在強弱曹操法令既行士卒精練非公孫瓚坐受圍者也今棄萬安之術而興無名之師竊為公懼之圖等曰武王伐紂不為不義况兵加曹操而云無名且今師徒精勇將士思奮而不及時早定大業所謂天與弗取反受其咎此越之所以霸吳之所以滅也監軍之計在於將牢而非見時知幾之變也紹納圗言圖等因是譖沮授曰授監統內外威震三軍若其浸盛何以制之夫臣不與主同者昌主與臣同者亡此黃石之所忌也且御衆於外不宜知內紹乃分授所統為三都督使授及郭圖淳于瓊各典一軍未及行五年左將軍劉備殺徐州刺史車胄據沛以背曹操操懼乃自將征備田豐説紹曰與公爭天下者曹操也操今東擊劉備兵連未可卒解今舉軍而襲其後可一往而定兵以幾動斯其時也紹辭以子疾未得行豐舉杖擊地曰嗟乎事去矣夫遭難遇之幾而以嬰兒病失其會惜哉紹聞而怒之從此遂疏焉曹操畏紹過河乃急擊備遂破之備奔紹紹於是進軍攻許田豐以既失前幾不宜便行諫紹曰曹操既破劉備則許下非復空虛且操善用兵變化無方衆雖少未可輕也今不如久持之將軍據山河之固擁四州之衆外結英雄內修農戰然後簡其精鋭分其竒兵乘虛迭出以擾河南救右則擊其左救左則擊其右使敵疲於奔命人不得安業我未勞而彼已困不及三年可坐尅也今釋廟勝之策而決成敗於一戰若不如志悔無及也紹不從豐強諫忤紹紹以為沮衆遂械繫之乃先宣檄曰蓋聞明主圗危以制變忠臣慮難以立權曩者強秦弱主趙高執柄專制朝命威福由已終有望夷之禍汙辱至今及臻吕后祿産專政擅斷萬機決事禁省下陵上替海內寒心於是絳侯朱虛興感奮怒誅夷逆暴尊立太宗故能道化興隆光明融顯此則大臣立權之明表也司空曹操祖父騰故中常侍與左悺徐璜並作妖孽叨餮放橫傷化虐人父嵩乞丐擕養因贓買位輿金輦寶輸貨權門竊盜鼎司傾覆重器操姦閹遺醜本無令德慓狡鋒俠好亂樂禍幕府董統鷹揚掃夷凶逆續遇董卓侵官暴國於是提劒揮鼓發命東夏廣羅英雄棄瑕録用故遂與操參咨策略謂其鷹犬之才爪牙可任至乃愚佻短慮輕進易退傷夷折衄數喪師徒幕府輒復分兵命鋭修完補輯表行東郡太守兖州刺史被以虎文授以偏師奬就威柄冀獲秦師一克之報而遂乘資跋扈肆行酷烈割剝元元殘賢害善故九江太守邊讓英才俊逸以直言正色論不阿諂身被梟懸之戮妻孥受灰滅之咎自是士林憤痛人怨天怒一夫奮臂舉州同聲故躬破於徐方地奪於吕布倣徨東裔蹈據無所幕府惟強幹弱枝之義且不登畔人之黨故復援旍擐甲席卷赴征金鼓響震布衆破沮拯其死亡之患復其方伯之任是則幕府無德於兖土而有大造於操也會後鑾駕東反羣虜亂政冀州方有北鄙之警匪遑離局故使從事中即徐勳就發遣操使繕修郊廟翼衛幼主而便放志專行威劫省禁卑侮王僚敗法亂紀坐召三臺專制朝政爵賞由心刑戮在口所愛光五宗所怨滅三族羣談者受顯誅腹議者蒙隱戮道路以目百辟鉗口尚書記期會公卿充員品而已故太尉楊彪歷典二司元綱極位操因睚眥被以非罪篣楚并兼五毒俱至觸情放慝不顧憲章又議郎趙彥忠諫直言議有可納故聖朝含聽改容加錫操欲迷奪時明杜絶言路擅收立殺不俟報聞又梁孝王先帝母弟墳陵尊顯松柏桑梓猶宜恭肅操率將吏士親臨發掘破棺裸尸掠取金寶至令聖朝流涕士民傷懷又署發邱中即將摸金校尉所過毁突無骸不露身處三公之官而行桀虜之態汙國虐民毒施人鬼加其細政苛慘科防互設矰繳充蹊坑穽塞路舉手挂網羅動足蹈機塪是以兖豫有無聊之人帝都有吁嗟之怨歷觀古今書籍所載貪殘虐烈無道之臣於操為甚幕府方詰外姦未及整訓加意含覆冀可彌縫而操豺狼野心潛包禍謀乃欲撓折棟梁孤弱漢室除忠害善專為梟雄往歲伐鼓北征公孫瓚強禦桀逆拒圍一年操因其未破隂交書命欲託助王師以見掩襲故引兵造河方舟北濟會行人發露瓚亦梟夷故使鋒芒挫縮厥圗不果屯據敖倉阻河為固乃欲運螳蜋之斧禦隆車之隧幕府奉漢威靈折衝宇宙長戟百萬胡騎千羣奮中黃育獲之士騁良弓徑弩之藝并州越太行青州涉濟漯大軍泛黃河以角其前荆州下宛葉而掎其後雷震虎步並集虜廷若舉炎火以焚飛蓬覆滄海而注熛炭有何不消滅者哉當今漢道陵遲綱弛紀絶操以精兵七百圍守宫闕外稱陪衛內以拘質懼篡逆之禍因斯而作乃忠臣肝膽塗地之秋烈士立功之會也可不朂哉乃先遣顔良攻曹操别將劉延於白馬紹自引兵至黎陽沮授臨行會其宗族散資財以與之曰藝存則威無不加藝亡則不保一身哀哉其弟宗曰曹操士馬不敵君何懼焉授曰以曹兖州之明略又挾天子以為資我雖尅伯圭衆實疲敝而主驕將忲軍之破敗在此舉矣揚雄有言六國蚩蚩為嬴弱姬今之謂乎曹操遂救劉延擊顔良斬之紹乃度河壁延津南沮授臨船嘆曰上盈其志下務其功悠悠黃河吾其濟乎遂以疾辭退紹不許而意恨之復省其所部并屬郭圗紹使劉備文醜挑戰曹操又擊破之斬文醜再戰而禽二將紹軍中大震操還屯官度紹進保陽武沮授又説紹曰北兵雖衆而果徑不及南軍南軍榖虛少而資儲不如北南幸於急戰北利在緩師宜徐持久曠以日月紹不從連營稍前漸逼官度遂合戰操軍不利復還堅壁紹為高櫓起土山射營中營中皆蒙楯而行操乃發石車擊紹樓皆破軍中呼曰霹靂車紹為地道欲襲操操輒於內為長塹以拒之又遣竒兵襲紹運車大破之盡焚其榖食相持百餘日河南人疲困多畔應紹紹遣淳于瓊等將兵萬餘人北迎糧運沮授説紹可遣蔣竒别與支軍於表以絶曹操之鈔紹不從許攸進曰曹操兵少而悉師拒我許下必虛若分遣輕軍星行襲許許拔則操為成禽如其未潰亦令首尾奔命破之必矣紹又不能用會攸家犯法審配收繫之攸不得志遂奔曹操而説使襲取淳于瓊等瓊等時宿在烏巢去紹軍四十里操自將步騎五千人夜往攻破瓊等悉斬之初紹聞操自擊瓊謂長子談曰就使操破瓊吾拔其營彼固無所歸矣乃使高覽張郃攻操營不下二將聞瓊等敗遂奔于操於是紹軍驚擾大潰紹與談等幅巾乘馬與八百騎渡河至黎陽北岸入其將軍蔣義渠營至帳下把其手曰孤以首領相付矣義渠避帳而處之使宣令焉衆聞紹在稍復集餘衆偽降曹操盡坑之前後所殺八萬人沮授為操軍所執乃大呼曰授不降也為所執耳操見授謂曰分野殊異遂用地絶不圗今日乃得相見也授對曰冀州失䇿自取奔北授知力俱困宜其見禽操曰本初無謀不用君計今喪亂過紀國家未定方當與君圗之授曰叔父母弟懸命袁氏若蒙公靈速死為福操歎曰孤早相得天下不足慮也遂赦而厚遇焉授後謀歸袁氏被誅紹外寬雅有局度憂喜不形於色而性矜愎自髙短於從善故及於敗及軍還或謂田豐曰君必見重豐曰公貌寬而內忌不亮吾忠而吾數以至言忤之若勝而喜必能赦我戰敗而怨內忌將發若軍有利當蒙全耳今既敗矣吾不望生紹還曰吾不用田豐言果為所笑遂殺之官度之敗審配二子為曹操所禽孟岱與配有隙因蔣竒言於紹曰配在位專政族大兵強且二子在南必懷反畔郭圗辛評亦以為然紹遂以岱為監軍代配守鄴護軍逢紀與配不睦紹以問紀對曰配天性烈直每所言行慕古人之節不以二子在南為不義也公勿疑之紹曰君不惡之邪紀曰先所爭者私情今所陳者國事紹曰善乃不廢配配由是更協冀州城邑多畔紹復擊定之紹自軍敗後發病七年夏薨未及定嗣逢紀審配宿以驕侈為談所惡辛評郭圗皆比於談而與配紀有隙衆以談長當立配紀恐談立為己不利遂矯紹遺命奉尚為嗣談自稱車騎將軍將兵出黎陽尚少與其兵而使逢紀隨之談求益兵審配等又議不與談怒殺逢紀曹操渡河攻談談告急於尚尚留審配守鄴自將兵助談與操相拒於黎陽自九月至明年二月大戰城下談尚敗退操將圍之乃夜遁還鄴操進軍尚逆擊破之操軍還許談謂尚曰我鎧甲不精故前為曹操所敗今操軍退人懷歸志及其未濟出兵掩之可令大潰此策不可失也尚疑而不許既不益兵又不易甲談大怒郭圗辛評因此謂談曰使先公出將軍為兄後者審配之所搆也談然之遂引兵攻尚戰於外門談敗乃引兵還南皮别駕王修率吏人自青州往救談談還欲更攻尚問修曰計將安出修曰兄弟者左右手也譬人將鬭而斷其左右手曰我必勝若如是者可乎夫棄兄弟而不親天下其誰親之屬有讒人交鬬其間以求一朝之利願塞耳勿聽也若斬佞臣數人復相親睦以御四方可橫行於天下談不從尚復自將攻談談戰大敗嬰城固守尚圍之急談奔平原而遣潁川辛毗請救於曹操劉表以書諌談曰天降災害禍難殷流初交殊族卒成同盟使王室震蕩彜倫攸斁是以智逹之士莫不痛心入骨傷時人不能相忍也然孤與太公志同願等雖楚魏絶邈山河逈逺戮力乃心共奬王室使非族不干吾盟異類不絶吾好此孤與太公無二之所致也功績未卒太公殂殞賢允承統以繼洪業宣奕世之德履丕顯之祚摧嚴敵於鄴都揚休烈於朔土顧定疆宇虎視河外凡我同盟莫不景附何悟青蠅飛於竿旌無忌遊於二壘使股肱分成二體胸膂絶為異身初聞此問尚謂不然定聞信來乃知閼伯實沈之忿已成棄親即讐之計已決旃斾交於中原暴尸纍於城下聞之哽咽若存若亡昔三王五伯下及戰國君臣相弒父子相殺兄弟相殘親戚相滅蓋時有之然或欲以成王業或欲以定霸功皆所謂逆取順守而徼富強於一世也未有棄親即異兀其根本而能全於長世者也昔襄公報九世之讐士丐卒荀偃之事是故春秋美其義君子稱其信夫伯遊之恨於齊未若太公之忿於曹也宣子之承臣業未若仁君之繼統也且君子違難不適讐國交絶不出惡聲况忘先人之讐棄親戚之好而為萬世之戒遺同盟之耻哉蠻夷戎狄將有誚讓之言况我族類而不痛心耶夫欲立竹帛於當時全宗祀於一世豈宜同生分謗爭校得失乎若冀州有不弟之慠無慙順之節仁君當降志辱身以濟事為務事定之後使天下平其曲直不亦為髙義邪今仁君見憎於夫人未若鄭莊之於薑氏昆弟之嫌未若重華之於象慠然莊公卒崇大隧之樂象慠終受有鼻之封願捐棄百痾追攝舊義復為母子昆弟如初今整勒士馬瞻望鵠立又與尚書諫之並不從曹操遂還救談十月至黎陽尚聞操度河乃釋平原還鄴尚將吕曠髙翔畔歸曹氏談復隂刻將軍印以假曠翔操知談詐乃以子整聘談女以安之而引軍還九年三月尚使審配守鄴復攻談於平原配獻書於談勸其緩心抑怒革圗易慮以全友于之情談復不納曹操因此進攻鄴審配將馮札為內應開突門內操兵三百餘人配覺之從城上以大石擊門門閉入者皆死操乃鑿塹圍城周回四十里初令淺示若可越審配望見笑而不出爭利操一夜浚之廣深二丈決漳水以灌之自五月至八月城中餓死者過半尚聞鄴急將軍萬餘人還救城操逆擊破之尚走依曲漳為營操復圍之未合尚懼遣隂夔陳琳求降不聽尚還走藍口操復進兵急圍之尚將馬延等臨陳降衆大潰尚奔中山盡收其輜重得尚印綬節鉞及衣物以示城中城中崩沮審配令士卒曰堅守死戰操軍疲矣幽州方至何憂無主操出行圍審配伏弩射之幾中以其兄子榮為東門校尉榮夜開門內操兵配拒戰城中生獲配操謂配曰吾近行圍弩何多也配曰猶恨其少操曰卿忠於袁氏亦自不得不爾意欲活之配意氣壯烈終無撓辭見者莫不歎息遂斬之全尚母妻子還其財寶髙幹以并州降復為刺史曹操之圍鄴也談復背之因掠取甘陵安平勃海河間攻尚於中山尚敗走故安從熙而談悉收其衆還屯龍湊十二月曹操討談軍其門談夜遁奔南皮臨清河而屯明年正月急攻之談欲出戰軍未合而破談被髮驅馳追者意非恆人趨奔之談墮馬顧曰咄兒過我我能富貴汝言未絶口頭已斷地於是斬郭圗等戮其妻子熙尚為其將焦觸張南所攻奔遼西烏桓觸自號幽州刺史驅率諸郡太守令長背袁向曹陳兵數萬殺白馬而盟令曰違者斬衆莫敢仰視各以次歃至别駕代郡韓珩曰吾受袁公父子厚恩今其破亡智不能救勇不能死於義闕矣若乃北靣曹氏所不能也一坐為珩失色觸曰夫舉大事當立大義事之濟否不待一人可卒珩志以厲事君曹操聞珩節甚髙之屢辟不至卒於家高幹復叛執上黨太守舉兵守壺口關十一年曹操自征幹幹乃留其將守城自詣胸奴求救不得獨與數騎亡欲南奔荆州上洛都尉捕斬之十二年曹操征遼西擊烏桓尚熙與烏桓逆操軍戰敗走乃與親兵數千人奔公孫康於遼東尚有勇力與熙謀曰今到遼東康必見我我獨為兄手擊之且據其郡猶可以自廣也康亦心規取尚以為功乃先置精勇於廄中然後請尚熙熙疑不欲進尚強之遂與俱入未及坐康叱伏兵禽之坐於凍地尚謂康曰未死之間寒不可忍可相與席康曰卿頭顱方行萬里何席之為遂斬首送於曹操劉表字景升山陽髙平人魯恭王之後也身長八尺餘姿貌溫偉與同郡張儉等俱被訕議號為八顧詔書捕案黨人表亡走得免黨禁解辟大將軍何進掾初平元年長沙太守孫堅殺荆州刺史王睿詔書以表為荆州刺史時江南宗賊大盛又袁術阻兵屯魯陽表不能得至乃單馬入宜城請南郡人蒯越襄陽人蔡瑁與共謀畫表謂越曰宗賊雖盛而衆不附袁術因之禍必至矣吾欲徵兵恐不能集其策焉出對曰理平者先仁義理亂者先權謀兵不在多貴乎得人袁術驕而無謀宗賊率多貪暴越有所素養者使人示之以利必持衆來使君誅其無道施其財用威德既行襁負而至矣兵集衆附南據江陵北守襄陽荆州八郡可傳檄而定公路雖至無能為也表曰善乃使越誘宗賊帥至者十五人皆斬之而襲取其衆唯江夏賊張虎陳坐擁兵據襄陽城表使越與龎季往譬之乃降江南悉平諸守令聞表威名多解印綬去表遂理兵襄陽以觀時變袁術與其從兄紹有隙而紹與表相結故術共孫堅合從襲表表敗堅遂圍襄陽會表將黃祖救至堅為流箭所中死餘衆退走及李傕等入長安冬表遣使奉貢傕以表為鎮南將軍荆州牧封成武侯假表節以為已援建安元年驃騎將軍張濟自關中走南陽因攻穰城中飛矢而死荆州官屬皆賀表曰濟以窮來主人無禮至於交鋒此非牧意牧受弔不受賀也使人納其衆衆聞之喜遂皆服從三年長沙太守張羡率零陵桂陽三郡畔表表遣兵攻圍破羡平之於是開土遂廣南接五嶺北據漢川地方數千里帶甲十萬餘初荆州人情好擾加四方駭震寇賊相扇處處麋沸表招誘有方威懷兼治其姦猾宿賊更為效用萬里肅清大小咸悅而服之關西兖豫學士歸者蓋有千數表安慰賑贍皆得資全遂起立學校博求儒術綦母闓宋忠等撰立五經章句謂之後定愛民養士從容自保及曹操與袁紹相持於官度紹遣人求助表許之不至亦不援曹操且欲觀天下之變從事中郎南陽韓嵩别駕劉先説表曰今豪傑並爭兩雄相持天下之重在於將軍若欲有為起乘其弊可也如其不然固將擇所宜從豈可擁甲十萬坐觀成敗求援而不能助見賢而不肯歸此兩怨必集於將軍恐不得復中立矣曹操善用兵且賢俊多歸之其藝必舉袁紹然後移兵以向江漢恐將軍不能禦也今之勝計莫若舉荆州以附曹操操必重德將軍長享福祚垂之後嗣此萬全之策也蒯越亦勸之表狐疑不斷乃遣嵩詣操觀望虛實謂嵩曰今天下未知所定而曹操擁天子都許君為我觀其釁嵩對曰嵩觀曹公之明必得志於天下將軍若欲歸之使嵩可也如其猶豫嵩至京師天子假嵩一職不獲辭命則成天子之臣將軍之故吏耳在君為君不復為將軍死也惟加重思表以為憚使強之嵩至許果拜嵩侍中零陵太守及還盛稱朝廷曹操之德勸遣子入侍表大怒以為懷二陳兵詬嵩將斬之嵩不為動容徐陳臨行之言表妻蔡氏知嵩賢諫止之表猶怒乃考殺從行者知無他意但囚嵩而已六年劉備自袁紹奔荆州表厚相待結而不能用也十三年曹操自將征表未至八月表疽發背卒在荆州幾二十年家無餘積二子琦琮表初以琦貌類於已甚愛之後為琮娶其後妻蔡氏之姪蔡氏遂愛琮而惡琦毁譽之言日聞於表表寵耽後妻每信受焉又妻弟蔡瑁及外甥張允並得幸於表又睦於琮而琦不自寧嘗與琅邪人諸葛亮謀自安之術亮初不對後乃共升髙樓因令去梯謂亮曰今日上不至天下不至地言出子口而入吾耳可以言未亮曰君不見申生在內而危重耳居外而安乎琦意感悟隂規出計會表將江夏太守黃祖為孫權所殺琦遂求代其任及表病甚琦歸省疾琦素慈孝允等恐其見表而父子相感更有託後之意乃謂琦曰將軍命君撫臨江夏其任至重今釋衆擅來必見譴怒傷親之歡重增其疾非孝敬之道也遂遏于户外使不得見琦流涕而去衆聞而傷焉遂以琮為嗣琮以侯印授琦琦怒投之地將因奔喪作難會曹操軍至新野琦走江南蒯越韓嵩及東曹掾傅巽等説琮歸降琮曰今與諸君據全楚之地守先君之業以觀天下何為不可巽曰逆順有大體強弱有定勢以人臣而拒人主逆道也以新造之楚而禦中國必危也以劉備而敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也將軍自料何與劉備琮曰不若也巽曰誠以劉備不足禦曹公則雖全楚不能以自存也誠以劉備足禦曹公則備不為將軍下也願將軍勿疑及操軍到襄陽琮舉州降備奔夏口操以琮為青州刺史封列侯蒯越等侯者十五人乃釋韓嵩之囚以其名重甚加禮待使條品州人優劣皆擢而用之以嵩為大鴻臚以交友禮待之蒯越光祿勳劉光尚書令初表之結袁紹也侍中從事鄧羲諫不聽羲以疾退終表世不仕操以為侍中其餘多至大官操後敗於赤壁劉備表琦為荆州刺史明年卒劉焉字君郎江夏竟陵人魯恭王後也肅宗元和中徒封竟陵支庶家焉焉少仕州郡以宗室拜郎中去官居陽城山精學教授舉賢良方正稍遷南陽太守宗正太常時靈帝政化衰缺四方兵寇焉以為刺史威輕既不能禁且用非其人輒爭暴亂乃建議改置牧伯鎮安方夏清選重臣以居其任焉乃隂求為交址以避時難議未即行會益州刺史郗儉在政煩擾謡言逺聞而并州刺史張懿涼州刺史耿鄙並為寇賊所害故焉議得用出焉為監軍使者領益州牧太僕黃琬為豫州牧宗正劉虞為幽州牧皆以本秩居職州任之重自此而始是時益州賊馬相亦自號黃巾合聚疲役之民數千人先殺綿竹令進攻雒縣殺郗儉又擊蜀郡犍為旬月之間破壞三郡相自稱天子衆至十餘萬人遣兵破巴郡殺郡守趙部州從事賈龍先領兵數百人在犍為遂紏合吏民攻相破之龍乃遣吏卒迎焉焉到以龍為校尉徙居綿竹撫納離叛務行寬厚而隂圖異計沛人張魯母有姿色兼挾鬼道往來焉家焉遂任魯為督義司馬遂與别部司馬張修將兵掩殺漢中太守蘇固斷絶斜谷殺使者魯既得漢中遂復殺張修而并其衆焉欲立威刑以自尊大乃託以它事殺州中豪強十餘人士民皆怨初平二年犍為太守任岐及賈龍並反攻焉焉擊破皆殺之自此意氣漸盛遂造作乘輿車重千餘乘焉四子範為左中郎將誕治書御史璋奉車都尉並從獻帝在長安惟别部司馬瑁隨焉在益州朝廷使璋曉譬焉焉留璋不復遣興平元年征西將軍馬騰與範謀誅李傕焉遣叟兵五千助之戰敗範及誕並見殺焉既痛二子又遇天火燒其城府車重延及民家館邑無餘於是徙居成都遂發背疽卒州大吏趙韙等貪璋溫仁立為刺史詔書因以璋為監軍使者領益州牧以韙為征東中郎將先是荆州牧劉表在州僭擬乘輿器服韙以此遂屯兵胊䏰備表初南陽三輔民數萬户流入益州焉悉收以為衆名曰東州兵璋性柔寬無威略東州人侵暴為民患不能禁制舊士頗有離怨趙韙之在巴中甚得衆心璋委之以權韙因人情不輯乃隂結州中大姓建安五年還共擊璋蜀郡廣漢犍為皆反應東州人畏見誅滅乃同心并力為璋死戰遂破反者進攻韙於江州斬之張魯以璋暗懦不復承順璋怒殺魯母及弟而遣其將龎羲等攻魯數為所破魯部曲多在巴土故以羲為巴郡太守魯因襲取之遂雄於巴漢十三年曹操自將征荆州璋乃遣使致敬操加璋振威將軍兄瑁平寇將軍璋因遣别駕從事張松詣操而操不相接禮松懷恨而還勸璋絶曹氏而結好劉備璋從之十六年璋聞曹操當遣兵向漢中討張魯內懷恐懼松復説璋迎劉備以拒操璋即遣法正將兵迎備璋主簿巴西黃權諌曰劉備有梟名今以部曲遇之則不滿其心以賔客待之則一國不容二主此非自安之道從事廣漢王纍自倒懸於州門以諫璋一無所納備自江陵馳至涪城璋率步騎數萬與備會張松勸備於會襲璋備不忍明年出屯葭萌松兄廣漢太守肅懼禍及已乃以松謀白璋收松斬之勑諸關戍勿復通備備大怒還兵擊璋所在戰尅十九年進圍成都數十日城中有精兵三萬人榖支一年吏民咸欲拒戰璋言父子在州二十餘歲無恩德以加百姓而攻戰三載肌膏草野者以璋故也何心能安遂開城出降羣下莫不流涕備遷璋於公安歸其財寶後以病卒袁術字公路汝南汝陽人司空逢之子也少以俠氣聞數與諸公子飛鷹走狗後頗折節舉孝亷纍遷至河南尹虎賁中郎將時董卓欲廢立以術為後將軍術畏卓之禍出奔南陽會長沙太守孫堅殺南陽太守張咨引兵從術劉表上術為南陽太守術又表堅領豫州刺史使率荆豫之卒擊破董卓於陽人術從兄紹因堅討卓未反逺遣其將會稽周昕奪堅豫州術怒擊昕走之紹議欲立劉虞為帝術好放縱憚立長君託以公義不肯同積此釁隙乃各外交黨援以相圗謀術結公孫瓉而紹連劉表豪傑多附於紹術怒曰群豎不吾從而從吾家奴乎又與公孫瓚書云紹非袁氏子紹聞大怒初平三年術遣孫堅擊劉表於襄陽堅戰死公孫瓚使劉備與術合謀共逼紹紹與曹操會擊皆破之四年術引軍入陳留屯封邱黑山餘賊及胸奴於扶羅等佐術與曹操戰於匡亭大敗術退保雍邱又將其餘衆奔九江殺揚州刺史陳溫而自領之又兼稱徐州伯李傕入長安欲結術為援乃授術左將軍假節封陽翟侯初術在南陽戶口尚數十百萬而不修法度以鈔掠為資奢恣無厭百姓患之又少見讖書言代漢者當塗高自云名字應之又以袁氏出陳為舜後以黃代赤德運之次遂有僭逆之謀又聞孫堅得傳國璽遂拘堅妻奪之興平二年冬天子播越敗於曹陽術大會羣下因謂曰今海內鼎沸劉氏微弱吾家四世公輔百姓所歸欲應天順人於諸公何如衆莫敢對主簿閻象進曰昔周自后稷至於文王積德纍功三分天下猶服事殷明公雖奕世克昌孰若有周之盛漢室衰微未若殷紂之敝也術默然使召張範範稱疾遣弟承往應之術問曰昔周室陵遲則有桓文之霸秦失其政漢接而用之今孤以土地之廣人民之衆欲徼福於齊桓擬迹於高祖可乎承對曰在德不在衆茍能用德以同天下之欲雖云匹夫霸王可也若陵僭無度干時而動衆之所棄誰能興之術不説自孫堅死子策復領其部曲術遣擊揚州刺史劉繇破之策因據江東策聞術將僭號與書諫止之術不納策遂與術絶建安二年術因河內張炯符命遂果僭號自稱仲家以九江太守為淮南尹置公卿百官郊祀天地乃遣使以竊號告吕布并為子聘布女布執術使送許術大怒遣兵攻布大敗而還術又率兵擊陳國誘殺其王寵及相駱俊曹操乃自征之術聞大駭即走度淮留其將張勳橋㽔於蘄陽以拒之操擊破斬㽔而勳退走術兵弱大將死衆情離叛加之旱荒士民凍餒江淮間相食殆盡時舒仲應為術沛相術以米十萬斛與為軍糧仲應悉散以給飢民術怒陳兵將斬之仲應曰知當必死故為之耳寧可以一人之命救百姓於塗炭術下馬牽之曰仲應足下獨欲享重名而不與吾共之邪術雖矜名尚竒而天性驕肆尊已陵物及竊偽號淫侈滋甚媵御數百無不兼羅紈厭梁肉自下飢困莫之簡恤於是資實空盡不能自立四年夏乃燒宫室奔其部曲陳簡雷薄於灊山復為簡等所拒遂大困窮士卒散走憂悶不知所為遂歸帝號於紹曰祿去漢室久矣天下提挈政在家門豪雄角逐分割疆宇此與周末七國無異唯強者兼之耳袁氏受命當王符瑞炳然今君擁有四州人户百萬以強則莫與爭大以位則無所比高曹操雖欲扶衰奬微安能續絶運起已滅乎謹歸大命君其興之紹陰然其計術因此欲北至青州從袁談曹操使劉備徼之不得過復走還夀春六月至江亭坐簀牀而歎曰袁術乃至是乎因憤慨結病歐血死妻子依故吏廬江太守劉勳孫策破勳復見收視術女入孫權宫中子曜仕吳為郎中吕布字奉先五原九原人也以弓馬驍武給并州刺史丁原為騎都尉原屯河內以布為主簿甚見親待靈帝崩原受何進召將兵詣洛陽為執金吾會進敗董卓誘布殺原而并其兵卓以布為騎都尉甚愛信之誓為父子布便弓馬膂力過人號為飛將稍遷至中郎將封都亭侯卓自知凶恣每懷猜畏行止常以布自衛嘗小失卓意卓拔手戟擲之布拳捷得免而改容顧謝卓意亦改布由是隂怨於卓卓又使布守中閣而私與傅婢情通益不自安因往見司徒王允自陳卓幾見殺之狀時允與尚書僕射士孫瑞密謀誅卓因以告布使為內應布曰如父子何允曰君自姓吕本非骨肉今憂死不暇何謂父子擲戟之時豈有父子情也布遂許之乃於門刺殺卓事在卓傳允以布為奮威將軍假節儀同三司封溫侯允既不赦涼州人由是卓將李傕等遂相結還攻長安布與傕等戰敗乃將數百騎以卓頭繫馬鞍走出武關奔南陽袁術待之甚厚布自恃殺卓有德袁氏遂恣兵鈔掠術患之布不安復去從張楊於河內時李傕等購募求布急楊下諸將皆欲圖之布懼謂楊曰與卿州里今見殺其功未必多不如生賣布可大得傕等爵寵楊以為然有頃布得走投袁紹紹與布擊張燕於常山燕精兵萬餘騎數千匹布常御良馬號曰赤菟能馳城飛塹時人為之語曰人中有吕布馬中有赤菟布與其健將成亷魏越等數十騎馳突燕陳一日或至三四皆斬首而出連戰十餘日遂破燕軍布既恃其功更請兵於紹紹不許而將士多暴橫紹患之布不自安因求還洛陽紹聽之承制使領司𨽻校尉遣壯士送布而隂使殺之布疑其圖已乃使人鼓筝於帳中潛自遁出夜中兵起而布已亡紹聞懼為患募遣追之皆莫敢逼遂歸張楊道經陳留太守張邈遣使迎之相待甚厚臨别把臂言誓邈字孟卓東平夀張人也少以俠聞振窮救急傾家無愛士多歸之曹操袁紹皆與邈友辟公府以高第拜騎都尉遷陳留太守董卓之亂曹操與邈首舉義兵汴水之戰邈遣衛兹將兵隨操袁紹既為盟主有驕矜色邈正議責之紹既怨邈且聞與布有誓言乃令曹操殺邈操不聽邈雖德操然心不自安操之東擊陶謙勑家曰我若不還往依孟卓後還見邈垂泣相對其為操所親如此興平元年操復征謙令其將陳宫屯東郡宫因説邈曰今天下分崩雄桀並起君擁十萬之衆當四戰之地撫劒顧盻亦足以為人豪而反制於人不以鄙乎今州軍東征其處空虛吕布壯士善戰無前迎之共據兖州觀天下形藝俟時事變通此亦從橫一時也邈從之遂與弟超及宫等迎布為兖州牧據濮陽郡縣皆應之唯鄄城東阿范為曹操守操自引軍還與布戰於濮陽操軍不利相持百餘日是時旱蝗少榖百姓相食布移屯山陽二年間操復盡收諸城擊破布於巨野布東奔劉備邈從布留超將家屬屯雍邱操攻圍數月屠之斬超滅其家族邈詣袁術求救未至夀春為其兵所害時劉備領徐州居下邳與袁術相拒於淮上術欲引布擊備乃與布書曰術舉兵詣闕未能屠裂董卓將軍誅卓為術報耻功一也昔金元休南至封邱為曹操所敗將軍伐之令術復明目於遐邇功二也術生年以來不聞天下有劉備備乃舉兵與術對戰憑將軍威靈得以破備功三也將軍有三大功在術術雖不敏奉以死生將軍連年攻戰軍糧苦少今送米二十萬斛非唯止此當駱驛復致凡所短長亦唯命布得書大悅即勒兵襲下邳獲備妻子備敗走海西飢困請降於布布又恚術運糧不復至乃具車馬迎備以為豫州刺史遣屯小沛布自號徐州牧術懼布為己害為子求婚布復許之術遣將紀靈等步騎三萬以攻備備求救於布諸將謂布曰將軍常欲殺劉備今可假手於術布曰不然術若破備則北連太山吾為在術圍中不得不救也便率步騎千餘馳往赴之靈等聞布至皆斂兵而止布屯沛城外遣人招備并請靈等與共饗飲布謂靈曰元德布弟也為諸軍所困故來救之布性不喜合鬭但喜解鬭耳乃令軍候植戟於營門布彎弓顧曰諸軍觀布射戟小支中者當解兵不中可留決鬭布即一發正中戟支靈等皆驚言將軍天威也明日復歡會然後各罷術遣韓允以僭號事告布因求迎婦布遣女隨之沛相陳圭恐術報布成姻則徐揚合從為難未已於是往説布曰曹公奉迎天子輔贊國政將軍宜與協同策謀共存大計今與袁術結姻必受不義之名將有纍卵之危矣布亦素怨術而女已在塗乃追還絶婚執允送許曹操殺之陳圭欲使子登詣曹操布固不許會使至拜布為左將軍布大喜即聽登行并令奉章謝恩登見曹操因陳布勇而無謀輕於去就宜早圖之操曰布狼子野心誠難久養非卿莫究其情偽即增圭中二千石拜登廣陵太守臨别操執登手曰東方之事便以相付令隂合部衆以為內應始布因登求徐州牧不得登還布怒拔戟斫機曰卿父勸吾協同曹操絶婚公路今吾所求無獲而卿父子並顯重但為卿所賣耳卿為吾言其説云何登不為動徐喻之曰登見曹公言待將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言也譬如養鷹飢即為用飽則揚去其言如此布意乃解袁術怒布殺韓允遣其大將張勳橋蕤等與韓暹楊奉連藝步騎數萬七道攻布布時有兵三千馬四百匹懼其不敵謂陳圭曰今致術軍卿之由也為之奈何圭曰暹奉與術卒合之師耳謀無素定不能相維子登䇿之比於連雞勢不俱棲立可離也布用圭策與暹奉書曰二將軍親扶大駕而布手殺董卓俱立功名當垂竹帛今袁術造逆謀宜共誅討奈何與賊還來伐布可因今者同力破術為國除害建功天下此時不可失也又許破術兵悉以軍資與之暹奉大喜遂共擊勳等於下邳大破之生禽橋㽔餘衆潰走其所殺傷墮水死者殆盡時太山臧霸等攻破莒城許布財幣以相結而未及送布乃自往求之其督將高順諫止曰將軍威名宣播遠近所畏何求不得而自行求賂萬一不尅豈不損邪布不從既至莒霸等不測往意固守拒之無獲而還順為人清白有威嚴不飲酒不受饋遺所將七百餘兵號為千人鎧甲精練每所攻擊無不破者名為陷陳營順每諫布曰凡破家亡國非無忠臣明智者也但患不見用耳將軍舉動不肯詳思忽有得失動輟言誤誤豈可數也布知其忠然不能用初布將河內郝萌於下邳反攻布府順討斬之布後頗忌諸將亦復疏順以魏續有外內之親悉奪順所將兵以與續及當攻戰故令順將續所領兵順亦終無恨意建安三年布復從袁術遣順攻劉備於沛破之曹操遣夏侯惇救備為順所敗操乃自將擊布至下邳城下遺布書為陳禍福布欲降而陳宫等自以負罪於操深沮其計而謂布曰曹操逺來藝不能久將軍若以步騎出屯於外宫將餘衆閉守於內操若向將軍宫引兵而攻其背若但攻城則將軍救於外不過旬月軍食畢盡擊之可破也布然之布妻曰昔曹氏待陳宫如赤子猶舍而歸我今將軍厚宫不過於曹氏而欲委全城捐妻子孤軍遠出乎若一旦有變妾豈得為將軍妻哉布乃止而潛遣許泛王楷告急於袁術術曰布不與我女理自當敗何為復來相聞邪泛楷曰明上今不救布為自敗耳布破明上亦破也術時僭號故呼為明上術乃嚴兵為布作聲援布恐術為女不至故不遣兵救也以綿纒女身縳著馬上夜自送女出與術與曹操守兵相觸格射不得過而還布乃自將千餘騎出戰敗走歸保城不敢復出術亦竟不能救曹操塹圍之壅沂泗以灌其城三月上下離心其將侯成使客牧其名馬而客䇿之以叛成追客得馬諸將合禮以賀成成分酒肉先入詣布跪言曰蒙將軍威靈得所亡馬諸將齊賀未敢嘗也故先以奉貢布怒曰布禁酒而卿等醖釀為欲因酒共謀布邪成忿懼乃與宋慮魏續等共執陳宫髙順率其衆降布與麾下登白門樓兵圍之急令左右取其首詣操左右不忍乃下降布見操曰今日以往天下定矣操曰何以言之布曰明公之所患不過於布今已服矣令布將騎明公將步天下不足定也顧謂劉備曰元德卿為坐上客我為降虜繩縛我急獨不可一言邪操笑曰縛虎不得不急乃命緩布縛意欲活之劉備曰不可明公不見吕布事丁建陽董太師乎操頷之布目備曰大耳兒最叵信者於是縊殺布與宫順等皆梟首送許然後葬之陳宫者字公臺東郡人也剛直壯烈少與海內知名之士皆相連結及天下亂始隨曹操後自疑乃背操從吕布為布畫策每不從其計下邳敗被擒曹操謂宫曰公臺卿平常自為智計有餘今日竟何如宫顧指布曰但坐此人不從宫言以至於此若其見從亦未必為禽也操笑曰今日之事當云何宫曰為臣不忠為子不孝死自分也操曰卿如是奈卿老母何宫曰宫聞將以孝治天下者不害人之親老母之存否在明公不在宫也操曰若卿妻子何宫曰宫聞將施仁政於天下者不絶人之祀妻子之存否亦在明公不在宫也操未復言宫曰請出就戮以明軍法遂趨出不可止操泣而送之宫不還顧死後操待其家皆厚於初陳登者字元龍忠亮髙爽沈深有大略少有扶世濟民之志博覽載籍雅有文藝舊典文章莫不貫綜年二十五舉孝廉除東陽長養耆育幼視民如傷是時世荒民飢州牧陶謙表登為典農校尉登巡土田之宜盡鑿溉之利粳稻豐積後與父圭俱事吕布圭知布不足以共事乃遣登為布奉使到許曹操用為廣陵太守使於郡招集以圖吕布登在廣陵明審賞罰威信宣布海賊薛州之羣萬有餘戶束手歸命未及期年功化以就百姓畏而愛之登曰此可用矣曹操至下邳登率郡兵為軍先驅時登諸弟在下邳城中布乃質執登三弟欲求和同登執意不撓進圍日急布刺姦張𢎞懼於後纍夜將登三弟出就登布既伏誅登以功拜伏波將軍甚得江淮間歡心於是有吞滅江南之志孫策遣軍攻登於匡琦城軍初到旌甲覆水羣下咸以今賊衆十倍於郡兵恐不能抗可引軍避之與其空城水人陸居不能久處必尋引去登厲聲曰吾受國命來鎮此土昔馬文淵之在斯位能南平百越北滅羣狄吾既不能遏除凶慝何逃寇之謂邪吾其出命以報國仗義以整亂天道與順克之必矣乃閉門示弱不與戰將士銜聲寂若無人登乘城望形藝知其可擊乃申令將士宿整兵器昧爽開南門引軍指敵營步騎鈔其後敵衆周章方結陳不得還船登手執軍鼓縱兵乘之敵衆遂大破皆棄船迸走登乘勝追奔斬虜以萬數策忿喪軍尋復大興兵向登登以兵不敵使功曹陳矯求救於曹操登密去城十里治軍營處所令多取柴薪兩束一聚相去十步從橫成行令夜俱起火火然其聚城上稱慶若大軍到敵衆望火驚潰登勒兵追奔斬首萬級遷登為東城太守廣陵吏民佩其恩德共拔郡隨登老弱襁負而追之登曉語令還曰太守在卿郡頻致吳寇幸而克濟諸卿何患無令君乎登既去孫權遂跨有江外登年三十九而卒曹操每臨大江而歎曰恨不用陳元龍計而令封豕養其爪牙乎初許泛與劉備並在荆州牧劉表坐表與備共論天下人泛曰陳元龍湖海之士豪氣不除備謂表曰許君論是非表曰欲言非此君為善士不宜虛言欲言是元龍名重天下備問泛君言豪寧有事邪泛曰昔遭亂過下邳見元龍元龍無客主之意久不相與語自上大牀卧使客卧下牀備曰君有國士之名今天下大亂帝主失所望君憂國忘家有救世之意而君求田問舍言無可采是元龍所諱也何緣當與君語如小人欲卧百尺樓上卧君於地何但上下牀之間邪表大笑備因言曰若元龍文武膽志當求於古耳造次難得比也魏文帝世追美登功拜登息肅為郎中通志卷一百十三下
