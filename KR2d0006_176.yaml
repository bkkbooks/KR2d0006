body:
  text: 通志卷一百五十二宋右迪功郎鄭樵漁仲撰列傳北齊万俟普子洛可朱渾元劉豐破六韓常金祚劉貴蔡俊韓賢尉長命王懷任祥子胄莫多婁貸文子敬顯庫狄廽洛庫狄盛張保洛賀拔仁康麴珍韓段琛相顯德建業尉􅋆相􅋆子相貴封輔范舍樂牒舍樂侯莫陳相薛孤延斛律羌舉子孝卿張瓊子欣宋顯王則慕容紹宗叱列平步大汗薩薛修義慕容儼庫狄伏連髙乾弟慎弟慎弟昻昻季式東方老劉李希光盧劉叔宗孟和曺潘樂竇泰尉景子粲婁昭子定逺睿昭兄子庫狄干韓軌子晉眀假榮子韶言韶弟孝斛律金子光光邢祖信弟羡彭樂暴顯皮景和綦連猛元景安獨孤永業鮮于世榮傅伏叱干茍生安田敬宣寧雷顯和紇奚永髙寶万俟普字普撥太平人其先胸奴之别也少雄果有武力正光中破六韓拔陵構逆逼授太尉後歸魏纍遷第二鎮人酋長孝武帝初封清水郡公隨入關拜司空神武平夏州普自覆靺城率部歸神武神武躬自迎接封河西郡公位太尉薨贈太師大司馬録尚書事子洛字受洛干隨孝武入關除尚書左㒒射天平中隨父東歸封建昌郡公再遷領軍將軍初神武以其父普尊老特崇禮之嘗親扶上馬洛免冠稽首願出萬死力以報深恩及河隂之戰諸將北度橋洛以一軍不動謂西人曰万俟受洛干在此能來可來也西人畏而去之神武名其所營地為廽洛洛慷慨有氣節勇鋭冠世卒贈太師大司馬太尉録尚書諡曰武可朱渾元字道元自云遼東人也曾祖護野肱為懷朔鎮將遂家焉元寬仁有武略少與神武相知爾朱榮以為别將𨽻爾朱天光平万俟醜奴等以功封東縣伯魏孝武帝立纍遷渭州刺史元既早為神武知遇兼其母兄在東恆表疏與神武往來周文有疑心元乃率所部三千户發渭州西北度烏蘭津厯河源二州境乃得東出靈州刺史曺埿待元甚厚埿女壻劉豐生與元深相結遂資遣元元從靈州東北入雲州界周文每遣兵邀元元戰必摧之神武聞其來遣平陽太守髙崇持金環一枚賜元并運資糧候接元至引見執手後拜并州刺史以貪汚被劾特見原纍以軍功拜司空天保初封扶風郡王位太傅太師薨贈假黃鉞太宰太師録尚書元用兵務持重未嘗敗皇建初配享文襄廟庭子長舉襲爵元弟天元亦有將略便弓馬封昌陽縣伯天保初位殿中七兵二尚書卒贈都督滄州刺史諡曰恭武天元弟天和以兄元勳重尚東平長公主賜爵宜安鄉男文宣受禪加駙馬都尉位開府儀同三司封成臯郡公濟南即位加特進改封博陵郡公與楊愔同被殺追贈司空劉豐字豐生普樂人也有雄姿壯氣果毅絶人破六韓拔陵之亂以守城功除普樂太守山鹿縣公靈州鎮城大都督賀拔嶽與靈州刺史曺埿不睦豐助埿守嶽將自討埿為侯莫陳悅所殺周文遣行臺趙善大都督万俟受洛干復來攻圍引河灌之埿與豐堅守不下豐乃東奔神武神武以豐為南汾州刺史河隂之役豐功居先神武執其手嗟賞之及王思政據長社豐與髙嶽等攻之先是訛言大魚道上行百姓苦之豐建水攻䇿遏洧水灌城水長魚鱉皆遊焉城將陷豐與行臺慕容紹宗見忽有大風從東北來正晝昏暗飛沙走礫船纜忽絶漂至城下豐拍浮向土山為浪激不時至西人鉤之並為敵所害豐壯勇善戰死日朝野駭惋贈大司馬司徒公尚書令諡忠武子曄嗣第三子龍有巧思位亦通顯隋開皇中厯將作大匠卒於領軍大將軍八子俱非嫡妻所生每一子所生喪諸子皆為制服三年武平中曄所生喪諸弟並請解官朝廷義而不許破六韓常單于之裔也初呼厨貌入朝漢為魏武所留遣其叔父右賢王去卑監本國户魏氏方興率部南轉去卑遣弟右谷蠡王潘六奚率軍北禦軍敗奚及五子俱歿於魏其子孫遂以潘六奚為氏後人訛誤以為破六韓世領部落父孔雀少驍勇背其宗人拔陵率部降爾朱榮詔封永安縣侯第一領人酋長常孔雀少子沈敏有膽略善騎射爾朱榮死常歸河西天平中與冀州鎮刺史万俟受洛干等東歸神武上為武衛將軍受禪封廣川縣公拜太子太保卒於滄州刺史贈尚書令司徒公太傅第一領人酋長假王諡曰忠武金祚字神敬安定人也性驍雄尚氣俠魏末以軍功至太中大夫隨元天穆討平邢杲歷涇岐二州刺史後大行臺賀拔嶽表授東雍州刺史令討仇池氐楊紹先於百頃未還嶽為侯莫陳恱所殺祚克仇池還莫知所歸俄而神武遣行臺侯景慰喻祚遂解甲而還封安定縣公後隨魏孝武西入周文以祚為兗州刺史歷太㒒衛尉二卿尋除東北道大都督晉州刺史入據東雍州神武遣尉景攻降之芒山之戰以大都督從破西軍除華州刺史文宣受禪加開府儀同三司别封臨濟縣子卒贈司空公劉貴秀容陽曲人也剛格有氣斷歷爾朱榮府騎兵參軍榮性猛急貴尤嚴峻任使多愜榮心普泰初行汾州事棄戍歸神武纍遷御史中尉肆州大中正加開府西道行臺㒒射貴所歷莫不肆其威酷非理殺害視下如草芥性峭直攻訐無所廽避雖非佐命元功然與神武布衣舊特見親重卒贈太保太尉公録尚書事諡忠武齋受禪詔祭告其墓皇建中配享神武廟庭次子洪徽嗣樂安縣男卒贈都督燕州刺史蔡俊廣寧石門人也父普北方擾亂走奔五原守戰有功拜寧朔將軍卒贈燕州刺史俊豪爽有膽略神武微時深相親附俊初為杜洛周所虜時神武亦在洛周軍中神武謀誅洛周俊預其計事泄奔葛榮仍背榮歸爾朱榮從入洛及從破葛榮平元皓封為洛縣男隨神武舉義及平鄴破韓陵並有戰功進爵為侯出為齊州刺史為政嚴暴又多受納然亦眀解有部分吏民畏服之性好賔客頗稱施惠天平中卒於揚州刺史贈尚書令司空公諡曰威武齊受禪詔祭告其墓皇建初配享神武廟庭韓賢字普賢廣寧石門人也壯健有武用初隨葛榮作逆榮破後爾朱榮擢充左右榮死爾朱度律以賢為帳內都督封汾陽縣伯後為廣州刺史及神武起義度律以賢素為神武所知恐有變遣使徴之不願去乃密遣羣蠻多舉烽若有寇至使者遂為啓得停賢仍潛使人通誠於神武後拜建州刺史天平初為洛州刺史州人韓木蘭等起兵賢破之親自案檢收甲仗有一賊窘迫藏尸間見賢將至忽起斫賢斷其脛而卒始漢眀帝時西域以白馬負佛經送洛因立白馬寺其經函傳於此寺形制厚朴世以古物歷代寶之賢知故斫破之未幾而死論者謂因此致禍贈尚書令司空公子裔嗣尉長命太安狄那人也父顯魏代郡太守長命性和厚有器識參預神武起兵破爾朱氏於韓陵拜安南將軍樊子鵠據兗州反除東南道大都督與諸軍討平之徙幽州刺史督安平二州雖多聚斂然以恩撫人少得安集卒贈司空諡曰武壯子興字敬興便弓馬有武藝位冠軍將軍王懷字懷周不知何許人也少好弓馬頗有氣尚隨神武於冀州起兵討破爾朱兆於廣阿又從破四胡於韓陵以功封盧鄉縣侯天平中為都督廣州刺史後從神武襲尅西夏州還為大都督鎮下館除車騎大將軍儀同三司卒贈司徒公尚書㒒射懷以武藝勳誠為神武所知志力未申論者惜其不遂皇建初配享神武廟庭任祥字延敬廣寧人也少和厚有氣度初從葛榮榮署為王榮敗擁所部先降拜廣寧太守賜爵西河縣公隨神武起兵封魏郡公後兼尚書左㒒射進位開府儀同三司祥位望既重能以寬和接物人士稱之及斛斯椿釁發祥棄官北赱歸神武天平中拜侍中遷徐州刺史在州大有受納然政不殘不為人所疾苦潁川長史賀若徽執刺史田迅據城降西魏祥戰失利還北與行臺侯景司徒髙昻共攻拔潁川元象元年卒於鄴贈太尉公録尚書事子胄性輕俠頗敏慧少在神武左右天平中擢為東郡太守家本豐財又多聚斂動極豪華賔客往來將迎至厚興和末神武攻玉璧還留清河公嶽為行臺鎮守晉州以胄𨽻之胄飲酒遊縱不勤防守神武責之懼遂潛遣使送款於周為人所紏推勘未得實神武特免之胄內不自安乃與儀同爾朱文暢參軍房子逺鄭仲禮等隂圖弒逆伏誅莫多婁貸文太安狄那人也驍果有膽氣從神武起兵破爾朱兆於廣阿封石城縣子從破四胡於韓陵進爵為侯從平爾朱兆於赤谼嶺兆自縊貸文獲其尸天平中進爵為公晉州刺史元象初除車騎大將軍儀同三司南道大都督與行臺侯景攻獨孤信於金墉城周文出函谷景與髙昻議待其至貸文請率所部擊其前鋒景等固不許貸文性勇而專不受命以輕騎一千軍前斥候死於周軍贈尚書左㒒射司徒公子敬顯嗣強直勤幹少以武力見知恆從斛律光征討數有戰功光每令敬顯前驅置營中夜巡察或逹旦不眠臨敵置陳亦命部分將士深見重位至開府儀同三司武平七年從後主平陽敗歸在并州營唐雍等推立安德王稱尊號安德敗武將皆投周軍唯敬顯赱遁鄴授司徒周武帝平鄴執之斬於閶闔門外責其不留晉陽也庫狄廽洛代人也少有武力儀貌魁偉初事爾朱榮榮死𨽻爾朱兆神武舉兵於信都廽洛擁衆來歸從破四胡於韓陵以軍功封順陽縣子纍遷夏州刺史昭帝即位封順陽郡王大寧初為朔州刺史轉太子太師卒贈太尉定州刺史庫狄盛字安盛懷朔人也性柔和少有武用初為神武親信都督從征伐纍遷幽州刺史封長廣縣公齊受禪改封華陽縣公後拜特進卒贈太尉公張保洛自云本出南陽西鄂家世好賓客尚氣俠頗為北土所知保洛少便弓馬初從葛榮榮敗仍為爾朱榮統軍後𨽻神武神武起兵保洛為帳內都督從破爾朱兆於廣阿及破四胡於韓陵元象初為西夏州刺史以前後功封武安縣伯又從戰芒山進爵為侯文襄嗣事歷梁州刺史進爵為公齊受禪加開府仍為刺史聚斂為百姓所患濟南初兼侍中尋出為滄州刺史封敷城郡王以聚斂免官奪王爵卒贈前官追復本封從神武出山東又有賀拔仁麴珍段琛尉􅋆􅋆子相貴相顯康德韓建業封輔相范舍樂牒舍樂並以軍功至大官史失其事仁字天惠善撫人以帳內都督從神武破爾朱氏於韓陵力戰有功天保初封安定郡王歷數州刺史太保太師右丞相録尚書事武平元年薨贈假黃鉞相國太尉録尚書事二州諸軍事朔州刺史諡曰武珍字舍洛西平酒泉人壯勇善騎射以帳內從神武天統中封安康郡王武平初為豫州道行臺尚書令豫州刺史卒贈太尉琛字懷寶代人少有武用從起兵天保中開府儀同三司兗州刾史􅋆代人太寧初位司徒封海昌王卒子相貴嗣相貴武平末開府儀同三司晉州道行臺尚書僕射晉州刾史及行臺左丞侯子欽等密啓周武帝請師求為內應周武自率衆至城下子欽等夜開城門引軍入鎖相貴送長安卒弟相顯強幹有膽略武平末開府儀同三司領軍大將軍自平陽至并州及到鄴每立計將殺髙阿那肱廢後主立廣寧王事竟不果及廣寧被出相顯拔佩刀斫柱而歎曰大事去矣知復何言德代人歷數州刾史并省尚書左僕射開府儀同三司封新蔡王建業輔相俱不知所從來建業位領軍大將軍并州刾史輔相為朔州總管范舍樂代人有武藝筋力絶人位東雍州刾史開府儀同三司封平舒侯牒舍樂武威人開府儀同三司營州刾史封漢中郡公戰歿贈關中侯侯莫陳相代人也祖社伏頽魏第一領人酋長父斛古提朔州刾史白水公相七嵗喪父號慕過人及長性雄傑後從神武起兵破四胡於韓陵力戰有功封陽平縣伯後改封白水郡公天保初纍遷司空公進爵白水王又遷大將軍拜太尉公兼瀛州刾史歷太保朔州刾史又授太傅别封義寧郡公薨於州贈假黃鉞右丞相太宰太尉都督朔州刾史次子晉貴嚴重有文武幹略襲爵白水王武衛將軍開府儀同三司梁州刾史歸周授上大將軍封信安縣公子仲宣太常丞子𢎞頴𢎞信雍州司士參軍子行方行儉行恭薛孤延代人也少驍果有武力𨽻神武為都督從起義平鄴破四胡纍遷車騎將軍顯州刾史從神武西伐至蒲津及竇泰失利班師而還孤延為後殿且戰且行一日斫折十五刀又從破周文於邙山封永固公神武嘗閲馬於北牧道逄暴雨大雷電震地前有浮圖一所神武令孤延視之孤延乃馳馬案矟直前未至三十步震燒浮圖孤延唱殺繞浮圖赱火遂滅孤延還眉鬚及馬􅐢尾皆焦神武歎其勇決曰薛孤延乃能與霹靂鬭後封平秦公與諸將討潁川孤延專監造土山以酒醉為敵所襲據潁川平諸將還亰師宴華林園文襄啓魏帝坐孤延階下以辱之齊受禪别賜爵都昌縣公孫延好酒率多昏醉而以勇決善戰每大軍征討常為前鋒故與彭劉韓潘同列位太子太保太傅斛律羌舉太安人也世為部落酋長羌舉少驍果有膽初從爾朱兆入洛有戰功深為兆愛遇兆破始歸誠神武神武以其忠於所事亦加嗟賞天平中除大都督從神武戰於沙苑諸將議進趣之計羌舉曰黑獺雖聚凶黨強弱可知若欲固守無糧援可恃今揣其情欲一死決有同猘狗或能噬人且渭曲土濘無所用力若不與戰而徑趣咸陽咸陽空虛可不戰而尅拔其根本彼無所歸則黑獺之首可懸於軍門矣神武欲縱火焚之侯景曰當禽以示百姓燒殺誰復信之諸將議有異同遂戰於渭曲大軍敗績後封密縣侯為東夏州刾史有疫疾刾胸以竹筒吮之垂愈因怒創裂而卒贈儀同三司子孝卿嗣孝卿少聰敏機悟有風檢武平末位侍中開府儀同三司封義寧王知內省事典外兵騎兵機密時政由羣豎自趙彥深死後朝貴典機密者惟孝卿一人差居雅道不至貪穢後主至齊州以孝卿為尚書令又以中書侍郎薛道衡為侍中封北海王二人勸後主作承光詔禪位任城王令孝卿齎詔䇿及傳國璽往瀛州孝卿便詣鄴仍從周武帝入關授儀同大將軍宣納上士隋開皇中位太府卿户部尚書張瓊字德連代人也少壯健有武用初隨葛榮為亂榮敗歸爾朱榮榮以為都督後歷位濟州刾史及爾朱氏敗歸神武拜滄州刾史加驃騎大將軍開府儀同三司天平中神武襲尅夏州以瓊為慰勞大使留鎮之尋為周文所陷卒贈司徒都督恆州刾史瓊子欣尚魏平陽公主除駙馬都尉驃騎大將軍開府儀同三司建州刾史南鄭伯瓊常憂其太盛每謂親識曰凡人官爵莫若處中欣位秩太髙深為憂慮而欣豪險遂與公主情好不篤尋為孝武帝所害時人稱瓊先見宋顯字仲華敦煌效榖人也性果毅有武用初事爾朱榮稍遷為記室參軍榮死世隆等以為晉州刾史後歸神武為行臺左丞拜西兗州刾史在州多所受納然勇決有氣幹檢御左右咸得其心力及河陰之戰深入沒於行陳贈司空公王則字元軌自云太原人也少驍果有武藝初隨叔父魏廣平內史老生征討每有戰功老生為朝廷所知則頗有力初以軍功賜白水子元皓入洛則與老生俱降皓皓疑老生遂殺之則奔廣州刺史鄭先護與同拒皓皓敗為東徐州防城都督爾朱榮之死也東徐州刾史斛斯椿是其枝黨內懷憂懼時梁立汝南王悅為魏主資其士馬送之境上椿遂降悅則與蘭陵太守李義擊其偏師破之魏因以則行北徐州事𨽻爾朱仲逺仲逺敗乃歸神武天平初頻以軍功都督荆州刾史則有威武邉人畏服之渭曲之役則為西師圍逼棄城奔梁梁尋放還神武恕而不責元象初除洛州刾史以前後勳封太原縣伯則性貪在州不法舊亰諸像毁以鑄錢于時號河陽錢皆出其家以武用除徐州刺史以取受狼籍令送晉陽文襄恕其罪卒贈司空諡烈懿則弟敬寶位東廣州刺史與蕭軌攻建鄴不尅死焉慕容紹宗字紹宗燕主晃第四子太原王恪之後也曾祖騰歸魏遂居代祖郁岐州刺史父逺恆州刺史紹宗容貌恢毅少言語深沉有膽氣爾朱榮即其從舅子也值北邊擾亂紹宗擕家屬以歸榮榮深待之及榮入洛私告紹宗曰洛中人士繁盛驕侈成俗若不加除剪恐難制服吾欲因百官出迎仍悉誅之若何紹宗曰太后臨朝淫虐無道天下共棄公既身控神兵心執忠義忽欲殱夷多士實非長䇿深願三思榮不從纍遷驃騎將軍後以軍功封索盧侯榮死事爾朱兆步藩逼晉陽兆擊之纍為藩所破兆欲於晉州召神武共圖步藩紹宗諌曰今天下擾攘人懷覬覦正是智士用策之秋髙晉州才雄氣猛英略蓋世譬諸蛟龍安可借以雲雨兆怒曰我與晉州推誠相待何忽輒相猜阻橫生此言便禁止紹宗數日方釋遂割鮮卑皆𨽻神武神武與兆共破步藩滅之神武舉義信都兆以紹宗為長史及韓陵之敗乃撫膺自咎謂紹宗曰比用卿言今豈至此兆之敗也士卒多奔散兆懼將欲潛遁紹宗建旗鳴角招集戎徒軍容既振兆徐而止後神武從鄴討兆於晉陽兆自縊死紹宗行到馬突城見神武追至遂擕爾朱榮妻子及兆餘衆自歸神武神武仍加恩禮所有官爵並皆如故軍謀兵略時參預焉及遷都鄴庶事未周乃令紹宗與髙隆之共知庫府圖籍諸事纍遷青州刺史時丞相記室孫搴屬紹宗以其兄為州主簿紹宗不用搴譖之神武曰紹宗嘗登廣固城長歎謂所親云大丈夫有復先業理否由是徴還元象初以軍功進爵為公纍遷御史中尉屬梁人劉烏黑入寇徐方授徐州刾史執烏黑殺之還除尚書僕射侯景反命紹宗為東南道行臺加開府改封燕國公遂與大都督清河王嶽破梁貞陽侯淵眀於寒山禽之廽軍討侯景於渦陽于時景軍甚盛初聞韓軌往討之曰噉豬腸小兒聞髙嶽往曰此兵精人凡爾前後諸將往者莫不為其所敗及聞紹宗至扣鞍曰誰教鮮卑小兒解遣紹宗來若然髙王未死邪及與景戰諸將頻敗無敢先者紹宗麾兵徑進諸將從之因大捷景遂走遁初神武將崩命文襄云侯景若反以慕容紹宗當之至是果敗景西魏遣其大將王思政據潁川又以紹宗為南道行臺與太尉髙嶽儀同劉豐率軍圍擊之堰洧水灌城時紹宗數有凶夢意每惡之乃私謂左右曰吾自年二十已還嘗有蒜髮昨來忽然自盡蒜者算也吾年算其盡乎未幾與劉豐臨堰見北有塵氣乃入艦同坐暴風從東北來逺近晦𡨕舟纜斷飄纜徑向敵城紹宗自度不免遂投水而卒時年四十九三軍將士莫不悲惋朝廷嗟傷焉贈太尉諡曰景惠長子士肅以謀反伏法朝廷以紹宗功罪止士肅身皇建初配享文襄廟庭士肅弟三藏列在隋史叱列平字殺鬼代郡西部人世為酋帥平有容貌美鬚髯善射馭襲第一領人酋長臨江伯魏末自軍功至武衛將軍隨爾朱榮破葛榮平元皓封癭陶縣伯榮死爾朱氏陵替平懼禍後歸神武從破四胡於韓陵以軍功天保初纍遷兗州刾史開府儀同三司卒贈都督瀛州刾史諡曰莊惠子孝沖嗣孝沖弟長義武平末侍中開府儀同三司封新寧王隋開皇中位上柱國卒於涇州刺史長義無他材技在官以清幹稱步大汗薩代郡西部人祖榮代郡太守父居龍驤將軍領人别將薩初從爾朱榮入洛及平葛榮纍功為都督榮死又從兆入洛及韓陵之敗以所部降神武稍遷車騎大將軍封行唐縣公晉州刾史齊受禪改封義陽縣公薛修義字公讓河東汾隂人也曾祖紹魏七兵尚書祖夀仁秦州刾史汾隂公父寶集定陽太守修義少而姦俠輕財重氣魏正光末天下兵起特詔募能得三千人者用為别將修義得七千餘人假安北將軍西道别將以軍功拜龍門鎮將後宗人鳳賢等作亂圍鎮城修義以天下紛擾遂為逆自號黃鉞大將軍詔都督宗正珍孫討之軍未至修義慙悔遣表乞一大將招慰乃降鳳賢等猶據險不降修義與書降之乃授鳳賢龍驤將軍陽夏子改封汾隂縣侯爾朱榮以修義反覆録送晉陽與髙昻等並見拘防榮赴洛並以自隨置於駝牛署榮死魏孝莊以修義為𢎞農河北河東正平四郡大都督時神武為晉州刺史見之相待甚厚及韓陵之捷以修義行并州事孝武帝入關神武以修義為關右行臺自龍門濟河招下西魏北華州刾史薛崇禮初神武欲大城晉州中外府司馬房育曰若使賊到此處雖城何益乃止及沙苑之敗徙秦南汾東雍三州人於并州又欲棄晉州遣家屬向英雄城修義諫曰若晉州敗定州亦不可保神武怒曰爾輩皆負我前不聽我城并州城使我無所趣修義曰若失守則請誅斛律金曰還仰漢小兒守收家口為質勿與兵馬神武從之以修義行晉州事及西魏儀同長孫子彥圍逼城下修義開門伏甲待之子彥不測虛實於是遁去神武嘉之就拜晉州刺史後除齊州刾史以黷貨除名追其守晉州功復其官爵俄以軍功進正平郡公加開府天保中卒於太子太保贈司空子文殊嗣修義從弟嘉族性亦豪爽從神武平四胡於韓陵歷華揚二州刾史卒官子震字文雄位廉州刾史亦著軍功又歷南汾譙二州刾史慕容儼字恃德清都人廆之後也容貌出群衣冠甚偉不好讀書頗學兵法工騎射爾朱氏敗歸神武以勳纍遷五城太守見東雍州刾史潘樂長揖而已丞尉已下數為樂所譴乃謂儼曰府君少為群下屈莭儼攘袂曰吾狀貌如此行望人拜豈可拜人神武聞二人在邉不和徴樂還朝以儼代為刾史遷東荆州刾史行次長社忽為其部下人所執將投山賊張儉為守人王崇祖私放獲免神武仍授以軍司共擊平儉始得逹州沙苑之敗西魏荆州刾史郭鸞率衆攻儼儼拒守二百餘日晝夜力戰大破鸞軍時諸州多有翻陷惟儼獲全及侯景反與諸將討之儼獲景麾下偽太守刾史將軍行臺等並其部下二千人天保初以軍功除開府儀同三司六年梁司空陸法和儀同宋茞等以郢州內附時清和王嶽帥師江上乃集諸軍議曰城在江外人情尚梗必須才略兼濟志勇過人方可受此寄耳衆咸共推儼嶽以為然遂遣鎮郢城城卑下兼土踈頽壞儼更修繕城雉多作大樓又造船纜水陸備具梁將蕭修率衆五萬與侯瑱任約合軍奄至城下於上流鸚鵡洲造荻葓竟數里以塞船路衆懼儼悅以安之城中先有神祠一所俗號城隍神儼於是領士卒躬往祈請須臾衝風驚濤漂荻葓約復以鐡鎖連緝防禦彌切儼還共祈請風浪夜驚葓復斷絶如此再三城人大喜以為神助儼出城奮擊大破之夏五月瑱約等又并力攻圍城中食少糧運阻絶無以為計唯煮槐楮桑葉并紵根水葒葛艾等及靴皮帶筋角等物而食之有死者即取肉分噉唯留骸骨儼猶申令將士信賞必罰分甘同苦自正月至於六月人無異志後蕭方智立遣使請和文宣以城在江表據守非便有詔還之儼至鄴帝命引升殿儼望帝悲不自勝帝執其手捋儼鬚脫帽看髮歎息久之謂儼曰觀卿容貌朕不望相識自古忠烈豈能過此也除趙州刺史賜帛一千匹錢十萬天統四年别封寄氏縣公并賜金銀酒鍾各一枚胡馬一匹五年進爵為義安王武平元年為光州刾史儼少任俠交通輕薄遨遨亰洛間及征討每立功效經略雖非所長而有將帥之節所歷諸州雖不能清白守道亦不貪殘害物卒贈司徒子子會位郢州刾史周武帝平鄴使其子送敕喻之子會枷其子赴獄尋赦書至云行臺武王已降子會乃與僚屬北向慟哭然後奉命爾朱氏將帥歸神武者又有代人庫狄伏連字仲山夲名伏憐訛音連事爾朱榮至直閣將軍後從神武賜爵蛇邱男天保初儀同三司尋加開府性質朴勤公事直衛宫闕曉夕不離帝所頗以此見知然鄙吝愚佷為鄭州刾史好聚斂又嚴酷屋室患蠅杖門者曰何故聼入其妻病以百錢買藥每自恨之不識士流開府參軍多是衣冠仕族皆加捶撻逼遣築牆武平中封宜都郡王除領軍大將軍尋與琅邪王矯殺和士開伏誅被支解伏連家口百餘盛夏人料倉米二升不給鹽菜常有飢色冬至日親表稱賀其妻為設豆餅問豆餅得處云於馬豆中分減伏連大怒典馬掌食人並加杖責積年賜物藏在别庫遣一婢專掌管鑰每入庫撿閲必語妻子云此官物不得輒用至死時惟著弊褌而積絹至二萬匹簿録並歸天府髙乾字乾雍渤海蓨人也父翼字次同豪俠有風神為鄉里所畏服魏武昌初葛榮為亂於燕朝廷以翼山東豪右即家拜渤海太守賊徒愈盛翼部率合境徙居河濟之間魏朝因置東冀州以翼為刾史封樂城侯俄除定州刾史以賊亂不行及爾朱兆弒莊帝翼謂諸子曰主憂臣辱主辱臣死今社稷阽危人神憤怨破家報國在此時也爾朱兄弟性甚猜忌忌則多害汝等宜早圖之先人有奪人之心時不可失事未集而卒中興初贈使持莭侍中太保録尚書六州諸軍事冀州刺史賜諡曰文宣乾性眀悟俊偉有智略美音容進止都雅少時輕俠數犯公法長而修改輕財重義多所交結魏領軍元義權重當世以意氣相得接乾甚厚起家拜貟外散騎侍郎稍遷貟外散騎常侍魏孝莊之居藩也乾潛相託附及爾朱榮入洛乾東奔於冀乾兄弟夲有縱橫志見榮殺害人士謂天下遂亂乃率河北流人於河濟間受葛榮官爵莊帝遣右㒒射元羅巡撫三齊乾兄弟相率出降朝廷以乾為給事黃門侍郎兼武衛將軍爾朱榮以乾前罪不應復居近要莊帝聽乾解官歸鄉里於是招納驍果以射獵自娛及榮死乃馳赴洛陽莊帝見之大喜以乾兼侍中加撫軍將軍金紫光祿大夫鎮河北又以弟昻為通直散騎常侍平北將軍令俱歸招集鄉閭為表裏形援帝親送於河橋上舉酒指水曰卿兄弟冀部豪傑能令士卒致死京城儻有變可為朕河上一揚塵乾垂涕受詔昻援劔起儛誓以死繼之及爾朱氏既弒害遣其監軍孫白雞率百餘騎至冀州託言括馬其實欲因乾兄弟送馬收之乾既宿有報復之心而白雞忽至知欲見圖將先發以告前河內太守封隆之隆之父先為爾朱榮所害聞之喜曰國耻家怨痛入骨髓乘機而發今正其時謹聞命矣二月乾與昻潛勒壯士夜襲州城執刾史元嶷射白雞殺之於葛榮殿為莊帝舉哀三軍縞素乾升壇誓衆詞氣激揚涕泗交集將士莫不感憤欲奉父次同為主次同曰和鄉里我不及封皮乃推隆之為大都督行州事隆之欲逃昻勃然作色拔刀將斫隆之隆之懼乃受命北受幽州刾史劉靈助節度俄而靈助被爾朱氏禽屬神武出山東揚聲以討乾為辭衆情惶懼乾謂之曰髙晉州雄材蓋世不居人下且爾朱弒主肆虐正是英雄效節之時今者之來必有深計勿憂吾將諸君見之乃間行與封隆之子子繪俱迎於滏陽因説神武曰爾朱氏酷逆痛結人神凡厥生靈莫不思奮眀公威德素著天下傾心若兵以忠立則屈強之徒不足為眀公敵矣鄙州雖小戶口不減十萬穀秸之稅足濟軍資願眀公熟詳其計神武大笑曰吾事諧矣遂與乾同帳而寢呼乾為叔父乾旦日受命而去時神武雖內有逺圖而外迹未見爾朱羽生為殷州刾史神武密遣李元忠於封龍山舉兵逼其城令乾率衆偽往救之乾遂輕騎入見羽生偽為之計羽生出勞軍彭樂側從馬上禽斬之遂平殷州又共定策推立中興主拜侍中司空公是時軍國草創乾父喪不得終制及孝武立天下初定乾乃表請解職行三年之禮詔聽解侍中司空如故封長樂郡公乾雖求退不謂便見從許既去內侍朝政罕關居常怏怏孝武將二於神武欲乘此撫之於華林園宴罷獨留乾謂曰司空奕世忠良今日復建殊功相與雖則君臣實義同兄弟宜共立盟約勒逼之乾曰臣以身許國何敢有二乾雖有此對然非其本心事出倉卒又不謂孝武便有異志遂不固辭亦不啓神武帝以乾為誠已時禁園飬部曲稍至千人驟令元士弼王思政詣賀拔嶽計又以嶽兄勝為荆州刾史乾謂所親曰難將作矣禍必及吾乃密啓神武神武召乾問之乾因勸神武受禪神武以袖掩其口曰勿復言今啓叔復為侍郎門下之事一以仰委及頻請而帝不答乾懼啓神武求為徐州乃以乾為開府儀同三司徐州刾史將行帝聞其與神武言怒使謂神武曰髙乾與朕私盟今復反覆神武聞其與帝盟亦惡之乃封其前後密啓以聞帝對神武使詰乾乾曰臣以身奉國義盡忠貞陛下既有異圖更言臣反覆以匹夫加諸罪尚或難免况人主推惡何以逃命所謂欲加之罪其無辭乎功大身危自昔然也若死而有知差無負莊帝詔遂賜死門下省年三十七嵗臨死時武衛將軍元整監刑謂曰頗有書及家人乎乾曰吾諸弟分張各在異處今日之事想無全者兒子既小未有所識亦恐巢傾卵破夫復何言後神武討斛斯椿等謂髙昻曰若昂用司空策豈有今日之舉天平初贈太師録尚書事冀州刾史諡曰文昭以長子繼叔襲祖次同爵樂城縣侯令第二子吕兒襲乾爵乾弟慎字仲密頗涉文史與兄弟志尚不同偏為父所愛歷位滄州刾史東南道行臺尚書光州刾史加驃騎大將軍儀同三司時天下初定聽慎以本鄉部曲數千人自隨為政嚴酷又縱左右吏苦之乾死時慎棄州將歸神武武帝敕青州斷其歸路慎間行至晉陽神武以為大行臺左丞轉尚書當官無所廽避纍遷御史中尉選用御史多其親戚鄉閭不稱朝望文宣奏令改選焉慎前妻吏部郎中崔暹妹為慎棄暹時為文襄委任乃為暹髙嫁其妹禮夕親臨之慎後妻趙郡李徽伯女也豔且慧兼善書記工騎乘慎之為滄州甚重沙門顯公夜嘗語久不寢李氏患之構之於慎遂被拉殺文襄聞其美挑之不從衣盡破裂李以告慎慎由此積憾且謂暹構已遂罕所紏劾多行縱捨神武嫌責之彌不自安出為北豫州刾史遂據虎牢降西魏慎先入關周文率衆東出敗於芒山慎妻子盡見禽神武以其家勳啓慎一房配沒而已慎妻預在行中文襄盛服見之乃從焉西魏以慎為侍中司徒遷太尉慎弟昻字敖曺其母張氏始生一男二嵗令婢為湯將浴之婢置而去飬猿繫解以兒投鼎中爓而死張使積薪於村外縳婢及猿焚殺之揚其灰於漳水然後哭之昻性似其母幼時便有壯氣及長俶儻膽力過人龍犀豹頸姿體雄異其父為求嚴師令加捶撻昻不遵師訓專事馳騁每言男兒當橫行天下自取富貴誰能端坐讀書作老博士也其父曰此兒不滅吾族當大吾門以其昻藏敖曺故以名字之少與兄弟數為劫掠鄉閭畏之無敢違忤兄乾求博陵崔聖念女為婚崔氏不許昂與兄往劫之置女村外謂兄曰何不行禮於是野合而歸乾及昻等並劫掠父次同常繫獄中惟遇赦乃出次同語人曰吾四子皆五眼我死後豈有一人與我一鍬土耶及次同死昻大起冢對之曰老公子生平畏不得一鍬土今被壓竟知為人不昻以建義初兄弟共舉兵既而奉魏莊帝旨散衆仍除通直散騎侍郎封武城縣伯與兄乾俱為爾朱榮所黜免歸鄉里隂養壯士又行抄掠榮聞惡之密令刾史元仲密誘執昻即送洛陽及入洛將昻自隨禁於駝牛署既而榮死莊帝即引見勞勉之時爾朱世隆還逼宫闕帝親臨大夏門指麾處分昻既免縲紲被甲橫戈與其從子長命推鋒徑進所向披靡帝及觀者莫不壯之即除直閣將軍賜帛千匹昻以寇難尚繁乃請還夲鄉招集部曲仍除通直散騎常侍加平北將軍及聞莊帝見害京師不守遂與父兄據信都起兵爾朱世隆從叔殷州刾史羽生率五千人掩至龍尾坂昻將十餘騎不擐甲而馳之乾城守繩下五百人追救未及而昻已交兵羽生敗走昻馬矟絶世左右無不一當百時人比之項籍神武至信都開門奉迎昻時在外略地聞之以乾為婦人遺以布裙神武使世子澄以子孫禮見之昻乃與俱來後廢帝立除冀州刾史以終其身仍為大都督率衆從神武破爾朱兆於廣阿又討四胡於韓陵昻自領鄉人部曲王桃湯東方老等三千人神武將割鮮卑兵千餘人共相參合對曰敖曺所將部曲練習已久不煩更配神武從之及戰神武軍少却兆等方乘之昻與蔡俊以千騎自栗園出橫擊兆軍大敗是日微昻等神武幾殆太昌初始之冀州尋加侍中開府進爵為侯及兄乾被殺乃將十餘騎奔晉陽神武向洛陽令昻為前驅武帝入關中昂率五百騎倍道兼行至崤陕不及而還尋行豫州刾史天平初除侍中司空公昻以兄乾薨此位固辭不拜遷司徒公好著小帽世因稱為司徒帽神武以昻為西南道大都督徑趣啇洛昻度河祭河伯曰河伯水中之神髙敖曺地上之虎行經君所故相沃酹時山道峻阻巴寇守險昻轉鬭而進莫有當鋒遂克上洛獲西魏洛州刾史泉企并將數千人欲入藍田關會竇泰失利神武召昻昻不忍棄衆力戰全軍而還時昻為流矢所中創甚顧左右曰吾死無恨恨不見季式作刾史耳神武聞之馳驛啓季式為濟州刾史昻還復為軍司大都督統七十六都督與行臺侯景練兵於虎牢御史中尉劉貴時亦率衆在焉昻與北豫州刾史鄭儼祖握槊貴召儼祖昻不遣枷其使使者曰枷時易脫時難昻使以刀就枷刎之曰何難之有貴不敢校眀日貴與昻坐外白河役夫多溺死貴曰頭錢價漢隨之死昻怒拔刀斫貴貴走還營昻使鳴鼓會兵攻之侯景與冀州刾史万俟受洛解之乃止時鮮卑共輕中原朝士惟憚昻神武每申令三軍嘗為鮮卑言昻若在列時則為華言昻嘗詣相府欲直入門者不聽昻怒引弓射之神武知而不責性好為詩言甚鄙陋神武每容之元象元年進封京兆郡公與侯景等同攻獨孤勝於金墉與周文戰敗於芒山死之是役也昻使奴京兆候西軍京兆於昻傅婢強取佩刀以行昻執殺之京兆曰三度救公大急何容以小事賜殺其夜夢京兆以血塗已寤而怒使斫其兩脛時劉桃棒在勃海亦夢京兆言訴得理將公付賊桃棒知昻必死遽奔焉昻心輕敵建旗蓋以陵陳西人盡鋭攻之一軍皆沒昻輕騎東奔河陽城太守髙永洛先與昻隙閉門不受昻仰呼求繩又不得拔刀穿闔未徹而追兵至伏於橋下追者見其從奴持金帶問昻所在奴示之昻奮頭曰來與爾開國公追者斬之以去先是昻夢為此奴所殺以告盧武將殺之武諫乃止果及難時年四十八桃棒會喪於路神武聞之如喪肝膽杖永洛二百西魏賞斬昻首者布絹萬段歲歲稍與之周亡猶未充贈太師大司馬太尉公録尚書事冀州刺史諡曰忠武西魏尋歸敖曺首猶可識先是有鵲巢於庭中地上家人怪之及其首函至置正當巢處葬後其妻張氏嘗見敖曺夜來旦去有若平生傍人莫見唯犬隨而吠之歲餘乃絶其故吏東方老為南兖州刾史追慕其恩為立祠廟靈像既成頭上坼裂更為之其裂如初見者咸稱神異子突騎嗣早卒文襄復親簡昻諸子以第三子道額嗣皇建初追封昻永昌王以道額襲武平末開府儀同三司入周為儀同大將軍隋開皇中卒於黃州刾史昻弟季式字子通亦有膽氣太昌初纍遷尚書尚食典御尋加驃騎大將軍天平初為濟州刾史季式兄弟貴盛並有勳於時自領部曲千餘人馬八百匹衣甲器仗皆備故能追督境內盜賊多致克捷時濮陽人杜靈椿等又陽平路叔文徒黨各為亂季式並討平之有客嘗謂季式曰濮陽陽平乃是畿內何忽遣私軍逺戰季式曰我與國家同安危豈有見賊不討之理若以此獲罪吾亦何恨芒山之敗所親部曲請季式奔梁季式曰吾兄弟受國厚恩與髙王共定天下一旦傾危而亡之不義是役也兄昻沒焉興和中行晉州事解州仍鎮永安季式兄慎以虎牢叛遣信報季式季式奔告神武神武待之如初武定中除侍中尋加冀州大中正都督以前後功加儀同三司天保初封乘氏縣子尋遷太常卿仍為都督隨司徒潘樂征江淮間為私使樂人於邊境交易還亰坐被禁止尋赦之四年夏發疽卒贈侍中開府儀同三司冀州刾史諡曰恭穆季式豪率好酒又恃舉家勳功不拘檢節與光州刾史李元忠生平遊欵在濟州夜飲憶元忠開城門令左右乘驛馬持一壺酒往光州勸之朝廷知而容之兄慎叛後少時解職黃門郎司馬消難左僕射子如之子又是神武壻勢盛當時因退食暇尋季式酣歌留宿旦日重門並關消難固請去季式曰君以地勢脅我邪消難拜謝請出終不見許酒至不肯飲季式索車輪括消難頸又更索一車輪自括頸引滿相勸消難不得已笑而從之方俱脫車輪更留一宿及消難出方具言之文襄輔政白魏帝賜消難美酒數石珍羞十輿并令朝士與季式親狎者就季式宅宴集其被優遇如此自昻起兵為羽翼者有呼延族劉貴珍劉長秋東方老劉士榮成五彪韓願生劉桃棒隨其建義者有李希光劉叔宗劉孟和等名顯可知者列之後云東方老安德鬲人與昻為部曲文宣受禪封陽平縣伯位南兗州刾史後與蕭軌等度江沒李希光勃海蓨人初隨髙乾起兵後位儀同三司揚州刾史文宣責陳武帝廢蕭淵眀命儀同蕭軌率希光東方老裴英起王敬寶步騎數萬以天保七年三月度江襲克石頭城五將名位相侔英起以侍中為軍司蕭軌與希光並為都督軍中抗禮動必乖張頓軍丹陽城下遇霖雨五十餘日故致敗將卒俱死軍士得還者十二三劉叔宗名纂樂陵平昌人歸昻位車騎將軍左光祿大夫劉孟和名協遊陽饒安人聚衆附昻兄弟位終大丞相司馬坐事死其餘並不知所終云神武初起兵范陽盧曺亦以勇力稱為爾朱氏守據薊神武厚禮召之以昻相擬曰宜來與從叔為二曺曺愠曰將田舍兒比國士遂率其徒自薊入海島得長人骨以髑髏為馬皂脛長丈六尺以為二矟送其一於神武諸將莫能用唯彭樂強舉之未幾曺遇疾恫聲聞於外巫言海神為祟遂卒其徒五百人皆服斬縗葬畢潛散曺身長九尺鬢靣甚雄臂毛逆如豬鬛力能拔樹性宏毅方重常從容雅服北州敬仰之嘗卧疾猶申足以舉二人蠕蠕寇范陽曺登城射之矢出三百步投弓於外羣虜莫能彎乃去之時有沙門曇讃號為神力惟曺與之角焉曇讃聞呌聲則勝潘樂字相貴廣寧石門人也本廣宗大族魏世分鎮北邉因家焉父永有技藝襲爵廣宗男樂初生有一雀止其母之左肩占者咸言富貴之兆因名之曰相貴後以為字及長寬厚有膽略北鎮亂魏大都督臨淮王彧北討至雲中問士人膽略者或以樂對彧乃召為軍主每摧堅陷陳轉統軍樂以天下多事遂歸葛榮授京兆王時年十九葛榮敗隨爾朱榮榮以樂為别將隨討元皓有功封敷城縣男神武出牧晉州引樂為鎮城都將及信都起義從破四胡進爵廣宗縣伯纍以軍功拜征東將軍東雍州刾史神武嘗欲議廢州樂以東雍地帶山河境連胡蜀形勝之會不可棄也遂如故後從破周師於河隂議欲追之令追者在西不願者東惟樂與劉豐居西神武善之以衆不同而止改封金門郡公文宣嗣事鎮河陽破西將楊􅋆等時帝以懷州刾史平鑒等所築城深入敵境欲棄之樂以軹關要害必須防守乃更修理增兵置將而還還鎮河陽纍遷拜司空齊受禪樂奉進璽綬天保初進封河東郡王遷司徒周文親舉大衆東至崤峽遣其行臺侯莫陳崇自齊子嶺趣軹關儀同楊􅋆從鼓鍾道出建州陷孤公戌詔樂總大衆禦之車駕餞於汾東樂晝夜兼行至長子遣儀同韓永興從建州西趣崇崇遂遁時將經略江外詔樂為南道大都督率諸軍南討侯景樂發石鱉南渡百餘里淮南聞大軍至所在棄城走至梁涇州涇州舊在石梁侯景改為淮州樂獲其地仍立涇州又克安州除驃騎大將軍開府儀同三司瀛州刾史仍經略淮漢遇疾薨於懸瓠天保六年也贈黃鉞太師大司馬尚書令神武再破周文也樂皆先鋒摧陳邙山之役樂因勢追之至其營所仍大抄掠樂獲周文金帶一袋貪貨稽留不即東返於時周文於陳可禽失而不獲者實樂貪貨之由也神武忿之以大捷之後恕而不問樂卒子子晃嗣時諸將子弟率多驕縱子晃沉密謹慤以清靖自居尚公主拜駙馬都尉武平末為幽州道行臺右僕射幽州刾史周師將入鄴子晃率突騎數萬赴援至博陵知鄴城不守詣冀州降周齊王軍授上開府隋大業初卒竇泰字世寧太安捍殊人也本出清河觀津曾祖羅魏統萬鎮將因居北邉父樂魏末破六韓拔陵為亂與鎮將楊鈞固守遇害泰貴贈司徒初泰母夢風雷暴起若有雨狀出庭觀之便是電光奪目駛雨霑灑寤而驚汗遂有娠焉期而不産大以憂懼有女巫謂之曰渡河湔裙産子必易便向水所忽見一人曰當生貴子可徙而南泰母從之頃之生泰及長善騎射有勇略泰父兄戰沒於鎮泰身負骸骨歸爾朱榮榮嘉之從討邢杲有功拜龍驤將軍神武之為晉州請泰為鎮城都督參謀軍事從起義信都封廣阿伯從破四胡及神武入洛以預謀定策除車騎大將軍儀同三司進爵為公爾朱兆敗保秀容分兵守嶮神武每揚聲云欲討之師出復止如此者數四神武揣兆歲首必應會飲使泰率精騎先驅一日一夜五百里兆軍人因宴休惰忽見泰軍莫不奪氣神武因而尅之遷侍中京畿大都督尋領御史中尉泰以勳戚居臺雖無紏舉而百寮畏懼天平三年神武西討令泰自潼關入四年泰至𢎞農小關為周文所襲衆盡沒泰自殺焉初泰將發鄴鄴有惠化尼謡云竇行臺去不回未行之前夜半忽有朱衣冠幘數十人入臺云收竇中尉宿直兵吏莫不驚惶出入數至俄頃乃去旦視關鍵不異方審非人蓋其敗死之兆也贈大司馬太尉録尚書事定州刾史諡曰武貞泰妻武眀婁后妹也泰雖以親待而功名自建齊受禪祭告其墓皇建初配享髙祖神武廟庭子孝敬嗣位儀同三司尉景字士真善無人也秦漢置尉候之官其先世有居此職因以為氏焉景性溫厚頗有俠氣魏孝昌中北鎮反景與神武隨衆南下入杜洛周軍中神武與景等謀殺周不克仍共歸爾朱榮隨榮征討為安武將軍以軍功封博陵縣伯榮死爾朱兆等逆亂景密白神武圗之遂從神武起義信都平鄴韓陵之戰惟景所統失利神武入洛留景鎮鄴授驃騎大將軍進爵為公景妻常山郡君神武之姊也以勳戚每有軍事與庫狄干常被委重而不能忘懷財利神武每嫌責之轉冀州刾史又大納賄發夫獵死者三百人庫狄干與景在神武坐請作御史中尉神武曰何意下求卑官干曰欲捉尉景神武大笑令優者石董桶戲之董桶剝景衣曰公剝百姓董桶何為不剝公神武誡景曰可以無貪也景曰與爾計生活孰多我止人上取爾割天子調神武笑而不答改封長樂郡公歷位太保太傅坐匿亡人見禁止使崔暹謂文襄曰語阿惠兒富貴欲殺我邪神武聞之泣詣闕曰臣無尉景無以至今日三請帝乃許之於是黜為驃騎將軍軍開府儀同三司神武告景景恚卧不起呌曰殺我時趣邪常山君謂神武曰老人去死近何忍煎逼至此又曰我為爾汲水胝生因出其掌神武撫景為之屈膝先是景有果下馬文襄求之景不與曰土相扶為牆人相扶為王一馬亦不得畜而索也神武對景及常山君責文襄而杖之常山君泣救之景曰小兒慣去放使作心腹何須乾啼濕哭不聽打邪元象初周文遣金祚率都督皇甫知達入據東雍景督諸軍討禽之尋授青州刾史操行頗改百姓安之徴授大司馬遇疾薨於州贈太師尚書令齊受禪以景元勳詔祭告其墓皇建初配享髙祖廟庭追封長樂王子粲少歷顯職性粗武天保初封庫狄干等為王粲以父不預王爵大恚恨十餘日閉門不朝文宣怪遣使就宅問之粲隔門謂使人曰天子不封粲父為王粲不如死使者云須開門受敕粲遂彎弓隔門射使者使者以狀聞文宣使段韶諭旨粲見韶惟撫膺大哭不答一言文宣親詣其宅慰之方復朝請尋追封景長樂王粲襲爵位司徒太傅薨子世辨嗣周師將入鄴令世辨率千餘騎覘候出滏口登髙遙見羣鳥飛起謂是西軍旗幟即馳還比至紫陌橋不敢回顧隋開皇中卒於浙州刾史婁昭字菩薩代郡平城人也武眀皇后之母弟祖提雄傑有識度家僮千數牛馬以谷量性好周給士多歸附之魏太武時以功封真定侯父內干有武功未仕而卒昭貴魏朝贈司徒齊受禪追封太原王昭方雅正直有大度深謀腰帶八尺弓馬冠世神武親重之昭亦早識人雄曲盡禮敬數隨神武獵每致請不宜乘危歷險神武將出信都與昭密謀昭贊成大䇿即以昭為中軍大都督從擊破爾朱兆於廣阿封安喜縣伯改濟北公又從拔鄴破四胡纍拜驃騎大將軍開府又徙濮陽公授領軍將軍魏孝武將二於神武昭揣知旨意以疾辭還晉陽後從神武入洛魏孝靜之立也昭預大策兗州刾史樊子鵠據州反以昭為東道大都督率諸將討平之子鵠既死諸將勸昭盡捕誅其黨昭曰此州無狀橫被殘賊企望王師以解塗炭其賊是怨其人何罪遂皆捨焉後轉大司馬仍領軍遷司徒持重守法時人稱之出為定州刾史昭好酒晚得偏風雖愈猶不任劇務在州事委僚屬昭舉大綱而已薨於州贈假黃鉞太師太尉諡曰武齊受禪詔祭告其墓封太原王皇建初配享髙祖廟庭長子仲逹嗣改封濮陽王次子定遠少歷顯職外戚中偏為武成愛狎别封臨淮郡王武成大漸與趙郡王等同受顧命位司空趙郡王之奏黜和士開定遠與其謀遂納士開賄賂成趙郡之禍其貪鄙如此尋除瀛州刾史初定逺弟季略穆提婆求其伎妾定遠不許因髙思好作亂提婆令臨淮國郎中告定遠隂與思好通後主令開府假暢率三千騎掩之令侍御史趙秀通至州以贓貨事劾定逺定逺疑有變遂縊而死昭兄子睿字佛仁父拔魏南部尚書睿幼孤被叔父昭所飬為神武帳內都督封掖縣子纍遷兗州刾史在任貪縱深為文襄所責後改封九門縣公齊受禪除領軍將軍别封安定侯睿無他器幹以外戚貴幸縱情財色為瀛州刾史聚斂無厭皇建初封東安王大寧元年進位司空平髙歸彥於冀州還拜司徒河清三年濫殺人為尚書左丞宋仲羡彈奏經赦乃免尋為太尉以軍功進大司馬武成至河陽仍遣總偏師赴懸瓠睿在豫境留停百餘日專行非法詔免官以王還第尋除太尉薨贈大司馬子子産嗣位開府儀同三司庫狄干善無人也曾祖越豆養魏道武時以功割善無之西臘汗山地方百里以處之後率部落北遷因家朔方干鯁直少言有武藝魏正光初除掃逆黨授將軍宿衛於內以家世寒鄉不宜毒暑得使冬入亰師夏歸鄉里孝昌元年北邉撓亂奔雲中為刾史費穆送于爾朱榮建義初隨榮入洛授伏波將軍神武臨晉州請干為都督仍從起義信都平鄴破四胡於韓陵除車騎大將軍封廣平縣公尋進郡公河隂之役諸將大捷惟干兵退神武以其舊功竟不黜責尋轉太保太傅及髙仲密以虎牢叛神武討之以干為大都督總前驅干上道不過家見侯景不遑食景使騎追餽之時周文自將至洛陽軍容甚盛諸將狐疑未欲南度干首建大策決計濟河神武大兵繼至遂大破之遷為定州刾史干宿將不間吏事事多煩擁獄訟委積然清約自居不為吏民之患遷太師天平初以干元勳佐命封章武郡王纍轉太宰干尚神武妹樂陵長公主以親地見待自預勤王常總大衆威望之重為諸將所伏而最為嚴猛曾詣京師魏譙王元孝友於公門集會言戲過常諸公無能靣折者干正色責之孝友大慙時人稱善天保中薨贈假黃鉞太宰給輼輬車諡曰景烈干不知書署名為干字逆上畫之時人謂之穿鎚又有武將王周者署名先為吉而後成其外二人至孫始並知書干皇建初配享髙祖廟庭子伏敬位儀同三司伏敬子士文仕周入隋性酷烈列在酷吏傳中韓軌字伯年太安狄那人也少有志操性沉深喜怒不形於色神武鎮晉州引為鎮城都督及起義信都軌贊成大策從破爾朱兆於廣阿又從戰韓陵封平昌縣侯仍督中軍破爾朱兆於赤谼嶺除車騎大將軍出為晉州刾史慰喻山胡莫不綏附再遷秦州刾史軌性寬和罕行楚撻甚得邉民之心西魏前後遣將東伐又周文自屯鹽倉軌身先士卒每戰必尅神武巡秦州欲以軌還仍賜城民户别絹布兩匹州民田昭等七千户皆辭不受惟乞留軌神武嘉歎乃留焉頻以軍功進封安德郡公遷瀛州刾史在州聚斂為御史紏劾削除官爵未幾復其安德郡公歷位中書令司徒齊受禪封安德郡王授司徒軌妹為神武所納生上黨王渙復以勳庸歷登台鉉嘗以謙恭自處不以富貴驕人當世稱之後拜大司馬從文宣征蠕蠕在軍暴薨贈假黃鉞太宰太師朔州刾史諡曰肅武皇建初配享文襄廟庭子晉眀嗣天統中改封東萊王晉眀有俠氣諸勳貴子孫中最留心學問好酒誕縱招引賔客一席之費動至萬錢猶恨儉率朝廷欲處之貴要地必以疾辭告人云廢人飲美酒對名勝安能作刀茟吏披反故紙邪武平末除尚書左僕射百餘日便謝病辭官假榮字子茂姑臧武威人也祖信仕沮渠氏後入魏以豪族徙北邉仍家於五原郡父連安北府司馬榮少好歷術專意星象正光初語人曰天垂象見吉凶吾今觀乾象察人事不及十年當有亂矣或問曰起於何處何處可避乎榮曰致亂之源此地為始恐天下因此橫流無所避也未幾遇亂與鄉舊擁妻子南趣平城屬杜洛周為亂榮與神武謀誅之不捷共奔爾朱榮後神武建義山東榮贊大策為行臺右丞西北道慰喻大使巡方曉喻所在下之神武南討鄴留榮鎮信都仍授鎮北將軍定州刾史時攻鄴未尅所須軍資榮輸轉無闕神武入洛論功封姑臧縣侯轉瀛州刾史榮妻婁皇后長姊也榮恐神武招私親之議固推諸將竟不之州尋歷相濟秦三州刾史所在百姓愛之神武將圖關右與榮密謀榮盛稱未可及渭曲失利神武悔之曰吾不用假榮之言以至於此授儀同三司尋除山東大行臺領本州流民大都督甚得物情元象初卒贈大尉諡曰昭景皇建初配享髙祖廟庭二年重贈大司馬尚書令武威王長子韶嗣韶字孝先少工騎射有將領才略以武眀皇后甥神武益器之嘗置左右以為心腹建義初領親信都督從神武拒爾朱兆戰於廣阿神武謂韶曰彼衆我寡其若之何韶曰所謂衆者得衆人之死所謂強者得天下之心爾朱榮裂冠毁冕拔本塞原邙山之會縉紳何罪兼殺主立君不脫旬朔天下思亂十室而九王躬昭德義誅君側之惡何往而不尅乎神武曰吾雖以順討逆恐無天命韶曰韶聞小能敵大小道大淫皇天無親惟德是輔今爾朱外賊天下內失善人智者不為謀勇者不為鬬不肖失職賢者取之復何疑也遂與兆戰兆軍潰及韓陵之戰韶督所部先鋒陷陳從神武追爾朱平之拜武衛將軍封下洛縣男後廽賜父爵姑臧縣侯又從神武禦周文於邙山神武身在行間為西魏將賀拔勝所窘韶從傍馳馬引矢反射一箭斃其前驅追騎憚莫敢前者遂免西軍退賜鞍馬并金進爵為公遷鎮東將軍武定四年從征玉壁時神武不豫攻城未下召集諸將共論進止之宜謂大司馬斛律金司徒韓軌左衛將軍劉豐等曰吾每與段孝先論兵殊有英略若使比來用其謀亦可無今日之勞矣吾患勢危篤恐或有不虞欲委孝先以鄴下之事何如金等咸曰知臣莫若君實無出孝先者仍令韶從文宣鎮鄴召文襄赴軍顧命文襄曰段孝先忠厚智勇親戚之中惟有此子軍旅大事宜共籌之五年春神武崩於晉陽祕不發喪俄而侯景為亂文襄還鄴留韶守晉陽委以軍事文襄還賜女樂十數人并金帛遷驃騎大將軍開府儀同三司封長樂公文宣受禪除尚書右僕射遷兾州刾史别封霸城侯加特進啓求以侯與繼母弟孝言論者美之遷尚書僕射天保四年梁將東方白額潛至宿豫擾動淮泗詔韶討之既至會梁將嚴超逹等軍逼涇州陳武將攻廣陵尹令思謀襲盱眙三軍咸懼韶謂諸將曰自梁氏喪亂國無定主人懷去就陳霸先外託同德內有離心吾揣之熟矣乃留儀同三司敬顯俊等圍宿豫自倍道赴涇州塗出盱眙令思不虞大軍卒至望旗而奔進破超逹軍廽赴廣陵擊陳武軍大破之盡獲其舟艦器械陳武遁去乃旋師攻宿豫遣辨士喻白額於是白額開門請盟韶為受盟韶度白額終不為用因執而斬之并其諸弟並傳首京師封平原郡王歷司空司徒大將軍尚書令太子太師以繼母憂去職尋起為大司馬仍尚書令遷録尚書事并州刾史及髙歸彥作亂韶與東安王婁睿平之遷太傅賜歸彥果園十畝仍蒞并州為政不存小察甚得人和周文遣將率羌夷與突厥合衆逼晉陽武成自鄴倍道赴援突厥從北結陳而前東拒汾河西被嵐州時大雪之後周人以步卒為前鋒從西山而下去城五里諸將或欲逆擊之韶曰步人氣力自有限今積雪既厚逆戰非便不如陳以待之彼勞我逸破之必矣既戰大破之武成嘉其功别封武德公進位太師周冡宰宇文護母閻氏先配中山宫護聞閻尚存乃因邉境移書請還其母并通鄰好時突厥犯邉韶軍於塞下武成遣黃門徐世乘傳齎周書問韶韶以周人反覆本無信義護外託為相其實主也既為其母請和不遣一介使申其情理仍據移書即送其母恐示之以弱以臣管見且外許之待通和訖而後放之為便不聽遂遣使以禮將送護既得母乃遣將尉遲廽等襲洛陽詔遣蘭陵王長恭大將軍斛律光擊之軍次於邙山之下逗遛未進武成詔韶曰今欲遣王赴洛陽之圍但突厥在北復須鎮禦王謂如何韶曰北虜侵邉事等疥癬今西羌窺逼便是膏肓之病請奉詔南行帝仍令韶赴洛督精騎一千發晉陽五日便濟河至大和谷便值周軍與諸將結陳以待之韶為左軍蘭陵王為中軍斛律光為右軍周軍仍以步人在前山上逆戰韶以彼步我騎且引且却待其力弊乃遣下馬擊之短兵始交周人大潰洛城之圍亦即奔遁盡棄營幕自印山而至榖水三十里中軍資器械彌漫川澤車駕幸洛陽親勞將士於河隂置酒髙會䇿勳命賞除韶太宰封靈武縣公天統二年除左丞相四年别封永昌郡公食滄州幹武平二年出晉州道築威敵平寇二城而還二月周師來寇遣韶與右丞相斛律光太尉蘭陵王長恭往行達西境有柏谷城者敵之絶險諸將莫肯攻圍韶曰汾北河東勢為國家之有若不去柏谷事同痼疾計彼兵會在南道今斷其要路救不能來城勢雖髙其中甚狹火弩射之一旦可盡遂攻之城潰仍城華谷置戍而還封廣平郡公是月周又遣將攻邉斛律光先率軍禦之韶亦請行五月到服秦城西人於姚襄城南更起城鎮韶抽壯士從北襲之使人潛度河告姚襄城中內外相應進戰大破之諸將咸欲攻其新城韶曰此城一靣阻河三面地險不可攻不如更作一城壅其要道破服秦併力圗之從之六月徙圍定陽七月屠其外城時韶病在軍中謂蘭陵王曰此城三靣重澗並無走路唯慮東靣一處耳賊若突圍必從此出長恭乃設伏其夜果如䇿伏兵擊之大潰獲其儀同若干寶開府楊軌韶竟以病薨上舉哀東堂大鴻臚監護喪事賜溫眀祕器輼輬車軍校之士陳送至平思墓所發卒起冡贈假黃銊相國太尉録尚書事朔州刺史諡忠武韶出總軍旅入參帷幄功既居髙重以婚媾之故望傾朝野而長於計略善於御衆得將士之心臨敵之日人人爭奮又雅性溫慎有宰相風教訓子弟閨門肅雍事後母以孝聞齊世勳貴之家罕有及者然僻於好色雖居要重微服間行魏黃門郎元瑀妻皇甫氏緣瑀謀反沒官韶美之上啓固請文襄賜之别宅處之禮同正嫡尤嗇於財親戚故舊略無施與其子深尚公主并省丞郎在家佐事十餘日事畢辭還人唯賜一杯酒元妃所生三子懿深亮皆宦逹懿字德猷尚潁川長公主拜駙馬都尉襲爵平原王位行臺右僕射兼殿中尚書卒子寶鼎尚中山公主隋開皇中開府儀同三司大業初卒於饒州刺史深字德深美容貌寬謹有父風天保中受父封姑臧縣公尚東安公主位侍中韶病篤詔封深濟北王以慰其意入周拜大將軍郡公坐事死亮字德堪隋大業初位汴州刺史卒於汝南郡守韶弟孝言少警發有風儀齊受禪其兄韶以别封霸城縣侯授之歷位中書黃門侍郎典機密食漁陽郡幹又歷祕書監度支尚書皇建初又遷清都尹孝言本以勳戚餘緒致位通顯至此便驕奢放逸無所忌憚曽夜過其客宋孝生家呼坊人防援不時赴遂拷殺之又與諸淫婦密遊其夫覺又拷掠而殞時苑內須果木課民間及僧寺備輸孝言悉分向其私宅種植又殿內及園中須石差車從漳河運載復分車回取事發出為海州刺史纍遷吏部尚書祖珽執政將廢趙彥深引孝言為助加侍中孝言既無深鑒又待物不平抽擢之徒非賄則舊有將作丞崔成忽於衆中抗言曰尚書天下尚書豈獨假家尚書也孝言無辭以答唯厲色遣下而已尋除中書監加特進又託韓長鸞共構祖珽之短及珽出後孝言除尚書右僕射仍掌選舉恣情用捨請謁大行勑浚京城北隍孝言監作儀同三司崔士順將作大匠元士將太府少卿酈孝裕尚書左戶郎中薛叔昭司州中從事崔龍子清都尹丞李道隆鄴縣令尉長卿臨漳令崔象咸安令高子徹等並在孝言部下典作日别置酒髙會諸人膝行跪伏稱觴上夀咸自陳屈滯更請轉官孝言意色揚揚以為己任皆隨事報答許有加授富商大賈多被銓擢所進用人士咸是粗險放縱之流尋遷左僕射特進侍中如故孝言富貴豪侈尤好女色後娶婁定逺妾董氏大耽愛之為此內外不和更相糾列又於晉陽監作坐事除名徙光州隆化主敗後有勑追還孝言雖黷貨無厭恣情酒色然舉止風流招致名士美景良辰未嘗虛棄賦詩奏妓畢盡歡洽雖草萊之士粗關文藝多引入賔館與同興賞其貧躓者亦時有乞遺世論復以此多之齊亡入周授上開府斛律金字阿六敦朔州勑勒部人也髙祖倍俟利以壯勇有名塞表魏道武時率戶內附外大羽真賜爵孟都公祖幡地斤殿中尚書父那瓌光祿大夫贈司空金性敦直善騎射行兵用胸奴法望塵識馬步多少嗅地知軍度逺近初為軍主與懷朔鎮將楊鈞送蠕蠕主阿那瓌瓌見金獵射歎其工正光末破六韓拔陵搆逆金擁衆屬焉陵署金王號金度陵終敗滅乃統所部叛陵詣雲州魏除為第二領人酋長秋朝亰師春還部落號曰雁臣仍稍引南出黃瓜堆為杜落周所破與兄平二人脫身歸爾朱榮榮表金為别將頻有戰功加鎮將軍孝莊立賜爵阜城男位金紫光祿大夫及爾朱兆等逆亂神武密懷匡復之計金與婁昭庫狄干等贊成大謀神武南攻鄴留金守信都委以後事復會神武平鄴太昌初以金為汾州刺史進爵為侯從神武破紇豆陵於河西沙苑之役神武以地厄少却軍為西師所乘遂亂張華原以簿帳歷營點兵莫有應者神武將集兵更戰金曰衆散將離其勢不可復用宜急向河東神武據鞍未動金以鞭拂馬神武乃還於是大崩喪甲士八萬侯景斂西魏力人持大棒守河橋衣厚甲射之不入賀拔仁候其轉面射之一發斃之是役也無金先請還幾至危殆及髙仲密西叛周文攻洛陽從神武破之還除大司馬改封石城郡公後從攻玉壁軍還神武使金總督大衆歸晉陽金性質直不識文字本名敦苦其難署改名為金從其便易猶以為難司馬子如教為金字作屋况之其字乃就神武重其古質每誡文襄曰爾所使多漢人有讒此人者勿信之文襄嗣事為肆州刺史侯景叛金帥軍助討文宣受禪封咸陽郡王天保二年除太師四年解州以太師還晉陽車駕數幸其第六宫及諸王盡從置酒作樂極夜方罷帝欣甚詔金第二子豐樂為武衛大將軍賜帛五千匹因謂金曰公元勳佐命父子忠誠朕當結以婚姻永為藩衛乃詔金孫武都尚義寧公主成禮之日帝從皇太后幸金宅皇后太子諸王皆從其見待如此後蠕蠕為突厥所破種落分散慮其犯塞驚擾邉民乃詔金率騎二萬屯白道以備之多所俘獲并表陳虜可擊之狀文宣於是率衆與金共討之大獲而還進位右丞相食齊州幹遷左丞相帝晚年敗德嘗持矟走馬以擬金胸者三金立不動於是賜物千段孝昭踐阼納其孫女為太子妃金曾乘步援車至階武成登極禮遇彌重又納其孫女為太子妃金曽遣人獻食中書舍人李若誤奏云金自來武成出昭陽殿勑侍中髙文遙將羊車引之若知事誤更不敢出殿廊下文遙還覆奏帝罵若云空頭漢合殺亦不加罪金長子光大將軍次子羡及孫武都並開府儀同三司出鎮方嶽其餘子孫皆封侯貴逹一門一皇后二太子妃三公主尊寵之盛當時莫與為比金嘗謂光曰我雖不讀書聞古來外戚梁冀等無不傾滅女若有寵諸貴妬人女若無寵天子嫌人我家直以立勳抱忠致富貴豈可藉女也辭不獲免嘗以為憂天統三年薨年八十武成舉哀西堂後主又舉哀於晉陽贈假黃鉞相國太尉公贈錢百萬諡曰武子光嗣光字眀月馬面彪身神爽雄桀少言笑工騎射初為侯景部下彭樂謂髙敖曹曰斛律家小兒不可三度將行後奪人名以庫直事文襄從出野見雙雁飛來文襄使光馳射之以二矢俱落焉後從金西征周文長史莫孝暉時在行間光馳馬射中之因禽於陳時年十七神武嘉之擢為都督封永樂縣子又嘗從文襄於洹橋校獵見一大鳥雲表飛揚光引弓射之正中其頸此鳥形如車輪旋轉而下至地乃大雕也丞相屬邢子髙見而歎曰此射雕之手也時號落雕都督齊受禪别封西安縣子皇建元年進爵巨鹿郡公時樂陵王百年為皇太子求妃孝昭以光世載醇謹著勳王室納其長女為太子妃光頻歲破周師又破突厥復築城戍歷位太子太保尚書令司空司徒河清三年周遣大司馬尉遲迥柱國齊公憲庸公王雄等衆稱十萬攻洛陽光率騎五萬馳往赴擊戰於邙山迥等大敗光親射雄殺之迥憲僅而獲免盡收其甲兵輜重仍為京觀武成幸洛陽䇿勳班賞遷太尉初文宣時周人常懼齊兵西度嘗以冬月守河椎冰及帝即位朝政漸紊齊人椎冰懼周兵之逼光憂曰國家嘗有吞關隴之志今日至此而唯玩聲色先是武成納光第二女為太子妃天統元年拜為皇后光轉大將軍三年六月以父喪去官尋詔起光及弟羡並復位秋拜光太保襲爵咸陽王遷太傅十二月周又遣將圍洛陽壅絶糧道武平元年正月詔光率步騎三萬討之鋒刃才交周將宇文勝衆大潰追至宜陽軍還擊周齊公憲等衆大破之虜其開府都督五人詔加右丞相并州刺史其年冬光又率步騎五萬於玉壁築華谷龍門二城又與憲等相持憲不敢動二年率衆築平隴等鎮戍十三所周柱國枹罕公普屯威柱國韋孝寬等來逼平隴光與戰於汾水大破之周遣其柱國紇干廣略圍宜陽光率步騎五萬赴之戰於城下取周建安等四戍捕千餘人而還軍未至鄴勑令便放軍散光以為軍人多勳功未得慰勞若即便散恩澤不施乃密通表請使宣旨軍仍且進朝廷發使遲留軍還將至紫陌光駐營待使帝聞光軍營已逼甚惡之急令舍人追光先入見然後宣勞散兵拜光左丞相别封清河郡公光嘗在朝堂垂簾而坐祖珽不知乘馬過其前光怒而謂人曰此人乃敢爾後珽在內省言聲髙慢光過聞之又怒珽知光忿而賂其從奴榼頭榼頭曰自公用事相王每夜抱膝歎曰盲人用權國必破矣珽省事禇士達夢人倚户授其詩曰九升八合粟角斗定非真堰却津中水將留何處人以告珽珽占之曰角斗斛字津却水何留人合成律字非真者解斛律於我不實士達又言所夢狀乃其父形也珽由是懼又穆提婆求娶光庶女不許帝賜提婆晉陽之田光言於朝曰此田神武以來常種禾飼馬數千匹以擬寇難今賜提婆無乃闕軍務也帝又以鄴清風園賜提婆租賃之於是官無菜賖買於人負錢三百萬其人訴焉光曰此菜園賜提婆是一家足若不賜提婆是百官足由是祖穆積怨周將韋孝寬忌光英略乃作謡言令間諜漏其文於鄴曰百升飛上天眀月照長安又曰髙山不摧自崩槲樹不扶自豎珽續之曰盲老公背下大斧饒舌老母不得語令小兒歌之於路提婆聞以告其母令萱以饒舌為斥己盲老公謂祖珽也遂協謀以謡言啓帝曰斛律纍世大將眀月聲震關西豐樂威行突厥女為皇后男尚公主謡言可畏帝以問韓長鸞長鸞以為不可事寢光又嘗謂人曰今軍人皆無褌袴後宫內參一賜數萬匹府藏稍空此是何理受賜者聞之皆曰天子自賜我關相王何事珽又通啓求見帝使以庫車載入珽因請間唯何洪珍在側帝曰前得公啓即欲施行長鸞以為無此理不可珽未對洪珍進曰若本無意則可既有此意不決行之萬一事泄如何帝然洪珍言而尚猶豫未決珽令武都妾兄顔元告光謀不軌又令曹魏祖奏言上將星盛不誅恐有災禍先是天狗西流占曰秦地案秦即咸陽王也自太廟及光宅並見血先是三日鼠嘗晝見光寢室嘗投食與之一朝三鼠俱死又牀下有二物如黑豬從地出走其冗膩滑大蛇屢見屋脊有聲如彈丸落又大門橫木自焚搗衣石自移既而丞相府佐封士讓密啓云光前西討還勑令便放兵散光令軍逼帝京將為不軌不果而止家藏弩甲奴僮千數每使人豐樂武都處隂謀往來若不早圗恐事不可測帝謂何洪珍曰人心亦大聖我前疑其欲反果然帝性怯愞恐即有變發令洪珍馳召祖珽謀之珽曰正爾召之恐疑不肯入宜遣使賜其一駿馬詔云眀日將往東山遊觀王可乘此馬同行光必來奉謝因而執之帝如其言光將上馬頭眩及至引入涼風堂劉桃枝自後撲之不仆光曰桃枝常作如此事我不負國家桃枝與力士三人以弓弦罥其頸拉而殺之年五十八血流於地剗之迹終不滅於是下詔稱其謀反族誅之使二千石郎邢祖信掌簿籍其家珽於都省問所得物祖信曰得弓十五張宴射箭一百具刀七口賜矟二張珽又厲聲曰更得何物祖信曰得棗子枝二十束擬奴僕與人鬪者不問曲直即以杖之一百珽大慚乃大聲曰朝廷已加重刑郎中何可分雪及出人尤其抗直祖信慨然曰好宰相尚死我何惜餘生祖信少年時父遜為李庶所卿因詣庶謂庶曰暫來見卿還辭卿去庶父諧杖庶而謝焉光居家嚴肅見子弟若君臣雖極貴盛性節儉簡聲色不營財利杜絶饋餉門無賔客罕與朝士交言不肯預政事每會議嘗獨後言言輒合理將有表疏令人執筆口占之務從省實行兵用胸奴卜法吉凶無不中軍營未定終不入幕或竟日不坐身不脫介胄常為士卒先有罪者唯大杖撾背未嘗妄殺衆皆爭為之死宜陽之役謂周人曰歸我七年人不然取爾十倍周人即歸之在西境築定誇諸城馬上以鞭指畫所取地皆如其言拓地五百里而未嘗伐功版築之役鞭撻人士頗稱其嚴光自結髮從戎未嘗失律深為鄰敵所懾罪既不彰一旦屠滅朝野痛惜之周武帝聞光死大喜赦其境內後入鄴追贈上柱國崇國公指詔書曰此人若在朕豈能至鄴長子武都位特進開府儀同三司梁兖二州刺史所在唯事聚斂光死遣使於州斬之小子鍾年甫數嵗獲免周朝襲封崇國公隋開皇中卒於車騎將軍光弟羡字豐樂少機警尤善騎射纍遷車騎大將軍幽州刺史河清三年突厥衆十餘萬來寇州境羡總諸將禦之突厥望見軍容甚整遂不敢戰即遣使求欵附天統元年五月突厥可汗遣使朝貢自是嵗時不絶羡有力焉詔加大行臺僕射羡以北虜屢犯邉塞須備不虞自庫堆戍東拒於海隨山屈曲二千餘里其間二百餘里中凡有險要或塹山築城或斷谷起障并置立戍邏五十餘所又導髙梁水北合易京東會於潞因以灌田邉儲嵗積轉漕用省公私獲利在州養馬二千匹部曲三千以備邉突厥謂之南可汗四年遷行臺尚書令加驃騎大將軍别封髙城縣侯羡歷事數帝以謹直稱雖極榮寵不自矜尚至是合門貴盛深以為憂武平元年乃上書乞解所職詔不許其年秋進爵荆山郡王羡慮禍使人騎快騾遞至鄴無日不得音問後二日鄴使不至家人乞養憂之又夢著枷鎖勸羡奔突厥羡不從占其夢曰枷者加官鎖者瑣瑣吉利及光誅勑使中領軍賀拔伏恩等十餘人馳驛捕之遣領軍大將軍鮮于桃枝洛州行臺僕射獨孤永業便發定州騎卒續進伏恩等至門者白羡曰使人衷甲馬汗宜閉城門羡曰勑使豈可疑拒出迎之遂見執死於長史聼事謂其妻曰啓太后臣兄弟死自當知臨刑歎曰富貴如此女為皇后公主滿家嘗使三百兵何得不敗并害五子年十五已下者宥之羡未誅前忽令其在州諸子五六人鎖頸乘驢出城合家泣送之至閣日晚而歸吏人莫不驚異行燕郡守馬嗣明道術之士也為羡所欽竊問之答云須有禳厭數日而有此變羡及光並工騎射少時獵父金命子孫會射而觀之泣曰明月豐樂用力不及我諸孫又不及明月豐樂吾世衰矣每日令其出田還即效所獲禽獸光所獲或少必麗龜逹腋羡雖獲多非要害之所光嘗蒙賞羡或被捶撻人問其故金云明月必背上著箭豐樂隨處即下手其數雖多去兄逺矣聞者咸伏其言金兄平少便弓馬神武起以都督從皇建初封定陽郡公後為青州刺史卒贈太尉彭樂字興安定人也驍勇善騎射初隨杜洛周賊知其不立降爾朱榮從破葛榮於滏口又為都督從神武與行臺僕射于暉討破羊侃于瑕邱後叛周投逆賊韓樓封北平王及爾朱榮遣大都督侯深擊樓樂又叛樓降深神武出山東樂又隨從韓陵之役先登陷陳賊衆大崩封樂城縣公後以軍功進爵汨陽郡公除肆州刺史天平四年從神武西討與周文相拒神武欲緩持之樂氣奮請決戰曰我衆賊少百人取一差不可失也神武從之樂因醉入深被刺腸出內之不盡截去復戰身被數創軍勢遂挫不利而還神武每追諭以戒之髙仲密之叛也周文援之神武迎擊於芒山候騎言賊去洛州四十里蓐食乾飯神武曰自應渴死何待我殺乃勒陳以待之西軍至皆喉燥樂以數千精騎為右甄衝西軍隨所向奔退遂馳入周文營人告樂叛神武曰樂棄韓樓事爾朱榮背爾朱歸我又叛入西事之成敗豈在一樂但念小人反覆爾俄而西北塵起樂使告捷虜西魏臨洮王柬蜀郡王榮宗江夏王升巨鹿王闡譙郡王亮詹事趙善督將寮佐四十八人皆係頸反接手臨以刃歷兩陳而唱名焉諸將乘勝斬首三萬餘西軍退神武使樂追之周文大窘而走曰癡男子今日無我明日豈有汝邪何不急還前營收金寶樂從其言獲周文金帶一束以歸言周文漏刃破膽矣神武詰之樂以周文言對且曰不為此語放之神武雖喜其勝且怒令伏諸地親稱其頭連頓之并數沙苑之失舉刃將下者三噤齘良久乃止樂更請五千騎取周文神武曰爾何放而復言捉邪取絹三千匹壓樂因賜之纍遷司徒天保初封陳留王遷太尉二年謀反為前行襄州事劉章等告伏誅暴顯字思祖魏郡斥邱人也祖喟仕魏為朔州刺史因家焉父誕恆州刺史樂安公顯幼時見一沙門指之曰此郎子好相表大必為良將貴極人臣語終失之顯善騎射曾從魏孝莊獵一日中手獲禽獸七十三後從神武起義信都纍遷北徐州刺史封屯留縣公天保中以贓貨解州大理禁止處判未訖為合肥被圍遣顯與步大汗薩等攻梁北徐州禽其刺史王強天統中纍遷位特進封定陽王卒皮景和琅琊下邳人也父慶賔魏淮南王開府中兵參軍正光中因使遇亂遂家廣寧之石門縣景和少通敏善騎射初以親信事神武後征步落稽疑賊有伏令景和將五六騎深入一谷遇賊百餘人便戰景和射數十人莫不應弦而倒神武嘗令景和射一野豕一箭獲之深見賞異除庫直正都督天保初授通州刺史封永寧縣子景和趫捷有武用從襲庫莫奚度黃龍征契丹定稽胡討蠕蠕每有戰功纍遷殿中尚書侍中景和於武職之中兼長吏事又性識均平故頻有美授周通好之後冠蓋往來嘗令景和對接每與使人同射百發百中甚見推重武平中詔獄多令中黃門等監治嘗令景和按覆據理執正由是過無枉濫後除特進封廣漢郡公遷領軍將軍琅琊王之殺和士開兵指西闕內外莫知所為景和請後主出千秋門自號令事平除尚書右僕射陳將吳明徹寇淮南令景和拒之除領軍大將軍封文成郡王又有平陽人鄭子饒詐依佛道設齋會用米麵不多供贍甚廣密從地藏漸出餅飯愚人以為神力見信於魏衛之間將為逆亂謀泄乃潛度河聚衆自號長樂王已破乘氏縣景和遣騎擊破之禽子饒送鄴烹之及吳明徹圍夀陽敕景和與賀拔伏恩赴救時拒明徹者多致傾覆唯景和全軍而還除尚書令武平六年卒贈太尉録尚書長子信機悟有風神位開府儀同三司武衛將軍勳貴子弟中稱其識鑒齊亡降周軍授上開府軍正中大夫隋開皇中卒於洮州刺史少子宿達開皇中通事舍人母憂起復將赴京辭靈慟哭而絶久而復蘇不能下食三日而死綦連猛字虎兒代人也其先姬姓六國末避亂出塞保祁連山因以為姓北人語訛故曰綦連父元成燕郡太守猛少有志氣便弓馬初為爾朱榮親信榮被害從爾朱兆入洛猛父母兄弟皆在山東爾朱京纒欲投神武召之與俱舉矟謂曰不從我者死乃從之去城五十餘里猛以素蒙兆恩即背京纒復歸兆兆敗猛與斛律羌舉乞伏貴和逃亡及見獲各杖一百以猛配尉景貴和配婁昭羌舉以故酋長子故無所配既而三人並為神武親信後都督爾朱文暢謀逆猛曰昔事其父兄今寧自死不忍告而殺之神武聞之曰事人當如此舍其罪而益親之以軍功封廣興縣侯梁使來聘云求角武藝文襄遣猛就館接之雙帶兩鞬左右馳射校挽強弓梁人引弓兩張皆三石猛遂併取四張疊挽之過度梁人嗟服天保初除東秦州刺史河清三年加開府突厥侵逼晉陽敕猛覘賊賊中一騎超出來鬭猛即斬之天統五年除并省尚書令領軍大將軍封山陽王猛自和士開死後漸預朝政疑議與奪咸亦咨稟趙彥深以猛武將之中頗疾姦佞言議時有可采故引知機事祖珽奏言猛與彥深前推琅琊王事有意故於是出猛為定州刺史彥深為西兖州刺史即日首途先是謠曰七月刈禾太早九月噉糕未好本欲尋山射虎激箭旁中趙老至是其言乃驗猛行至牛蘭有人告和士開被害時猛亦知情遂被追還削王爵以開府赴州在任寬惠清慎吏民稱之淮隂王阿那肱與猛有舊每欲攜引之韓長鸞等沮難復授膠州刺史後除大將軍齊亡入周卒初猛與尉興慶謝猥餒並善射小心給事神武左右神武使善相者視之曰猛大貴尉謝無官及芒山之役興慶救神武之窘為軍所殺神武歎曰富貴定在天也猛竟如相者言卒以榮寵自畢興慶事見齊本紀興慶每入陳常自署名於背神武使求其尸祭之於死處立浮圖世謂髙王浮圖云於是超贈儀同涇州刺史諡曰閔壯元景安河南洛陽人魏昭成皇帝之五世孫也髙祖虔陳留王景安沈敏有幹局少工騎射善於事人父永景安啓回代郡公授之隨魏孝武帝西入關天平末周齊交戰景安臨陳東歸芒山之戰以功賜爵西華縣男代郡公如故景安妙間馳騁有容則每梁使至恆與斛律光皮景和等對客騎射見者稱善天保初别封興勢伯帶定襄縣令賜姓髙氏纍遷兼七兵尚書時初築長城鎮戌未立昭景安與諸將緣塞以備守督領既多且所部軍人富於財物遂賄貨公行文宣聞之遣使推檢唯景安纎毫無犯帝深嘉歎乃以所斂贓絹五百匹賜之以彰清節孝昭嘗與功臣西園宴射侯去堂百四十餘步中的者賜以良馬及金玉錦綵等有一人射中獸頭去鼻寸餘唯景安最後有矢未發帝令景安解之景安引滿正中獸鼻帝嗟異稱善特賞馬二匹玉帛雜物又加常等天統四年除豫州刺史加開府儀同三司武平三年授行臺尚書令刺史如故封歷陽郡王景安久在邊州人物安之又管內蠻多華少景安被以恩威咸得寧輯武平末徴拜領軍大將軍入周以大將軍義寧郡公討稽胡戰沒初永兄祚襲爵陳留王祚卒子景皓嗣天保時誅諸元親近者如景安之徒疏宗議請姓髙氏景皓云豈得棄本宗逐他姓大丈夫寧可玉碎不能瓦全景安以白文宣乃收景皓誅之家屬徙彭城由是景安獨姓髙氏自外聼從本姓永弟种子豫字景豫美容儀有器幹景安告景皓慢言引豫云相應和豫占云爾時以衣袖掩景皓口云莫妄言問景皓與豫同獲免卒於東徐州刺史獨孤永業字世基本姓劉中山人也母改適獨孤氏永業幼隨母為獨孤家飬遂從其姓天保初除中書舍人永業解書計善歌舞甚為文宣所知後為洛州刺史河陽行臺左丞甚有威信遷行臺尚書永業久在河陽善於招撫周人憚之性鯁直不交權勢斛律光求二婢弗得毁之於朝廷河清末徴為太僕卿以乞伏貴和代之於是西境蹙弱河洛人情騷動武平三年遣永業取斛律豐洛因以為北道行臺僕射幽州刺史河洛人庶多思永業又除河陽道行臺洛州刺史周武帝親攻金墉永業出兵禦之問是何逹官作何行動周人曰至尊自來主人何不出看客永業曰客行匆匆故不出看乃通夜辦馬槽二千周人聞之以為大軍至乃去進位開府臨川王有甲士三萬聞晉州敗請出兵北討奏寢不報永業慨憤又聞并州亦陷乃遣子須達告降於周授上柱國應公宣政末為襄州總管大象二年為行軍總管崔彥睦所殺鮮于世榮漁陽人也父寶業懷朔鎮將武平初贈儀同三司祠部尚書世榮少沈敏有器幹興和二年為神武親信都督稍遷平西將軍賜爵石門縣子天統二年纍加開府儀同三司除鄭州刺史武平中以領軍從平髙思政封義陽郡王領軍大將軍太子太傅及周武帝入代送瑪瑙酒鍾與之得便撞破周兵入鄴諸將皆降世榮在三臺之前獨鳴鼓不輟及被執不屈乃見殺世榮雖武人無文藝以朝危政亂每嘗竊歎見徴稅無厭賞賜過度發言歎息子貞武平末假儀同三司傅伏太安人也父興蔚州刺史伏少從戎以戰功稍至開府永橋領人大都督周武帝前攻河隂伏自永橋夜渡入守中灘城南城陷被圍二旬不下救兵至周師還後除東雍州刺史周克晉州執行臺尉相貴招伏伏不從周尅并州遣韋孝寬將兵以伏子世寬來招伏授上大將軍武鄉郡公即給告身先以金瑪瑙二酒鍾為信伏不受謂孝寬曰事君有死無二此兒為臣不能竭忠為子不能盡孝人所讎疾願即斬之以號令天下周武至自鄴還至晉州遣髙阿那肱等百餘人臨汾召伏伏出車隔水相見問至尊今在何處阿那肱曰已為周師所獲别路入關伏仰天大哭卒衆入城於聼事前北面哀號良久然後降周武見之曰何不早降伏流涕而對曰臣三世衣食齊家被任如此革命不能自死羞見天地周武親執其手曰為臣當若此朕平齊國唯見公一人乃自食一羊肋以骨賜伏曰骨親肉疏所以相付遂引之與同食令典宿衛授上儀同勑之曰若即與公髙官恐歸投者心動努力好行無慮不富貴又問前救河隂得何官職伏曰蒙一轉授特進永昌郡公周武謂後主曰朕前三年教習兵馬決意取河隂正為傅伏不可動是以收軍而退公當時賞授何其薄也賜伏金酒巵後以為岷州刺史尋卒齊軍晉州敗後兵將罕有全節其殺身成仁者有儀同叱干茍生鎮南兖州周武破鄴赦書至茍生自縊死又有開府侍中宦者田敬宣本字鵬蠻人也年十四五好讀書既為閽寺曉夕趣走伺間隟便周章詢請每至文林館氣喘汗流問書之外不暇他語及覩古人節義之事未嘗不感慨沉吟顔之推重其勤學甚加開奬漸被知遇遂致通顯後主之奔青州遣其西出參伺動靜為周軍所獲問齊主何在紿云已去計當出境疑其不信歐捶服之每折一肢辭色愈厲斷其四體而卒又有雷顯和者晉州敗後為建州行臺左僕射周武帝使其子招焉顯和禁其子而不受聞鄴城敗乃降後主失并州使開府紇奚永安告急於突厥他鉢略可汗及聞齊滅他鉢略處永安於吐谷渾使下永安抗言曰本國既敗永安豈惜殘命欲閉氣自絶恐天下不知大齊有死節臣唯乞一刀以顯示逺近他鉢略嘉之贈馬七十匹歸之又有代人髙寶寧武平末為營州刺史鎮黃龍夷夏重其威信周武帝滅齊遣使招慰不受敕書范陽王紹義在突厥中寶寧上表勸進范陽王署寶寧為丞相及盧昌期據范陽起兵寶寧引紹義集夷夏兵數萬救之至潞河知周將宇文神舉屠范陽遂還據黃龍通志卷一百五十二
