body:
  text: 通志卷六十三宋右迪功郎鄭樵漁仲撰藝文略第一經類第一易語書爾詩論雅春秋經解國語孝經易古易説右經例章句論類譜傳正注數集注考圖義疏音讖緯擬易連山十卷夏后氏易至唐始出今亡歸藏十卷商易晉薛貞注三皇太古書三卷柴霖傳連山亡矣歸藏唐有司馬膺注十三卷今亦亡隋有薛貞注十三卷今所存者初經齊母本蓍三篇而已言占筮事其辭質其義古後學以其不文則疑而棄之往往連山所以亡者復過於此矣獨不知後之人能為此文乎子曰周監於二代郁郁乎文哉以周易較商易則周商之文質可知也以商易較夏易則啇夏之文質又可知也三易皆始乎八而成乎六十四有八卦即有六十四卦六十四卦非至周而備也但法之所立數之所起皆不相為用連山用三十六策歸藏用四十五策周易用四十九策誠以人事代謝星紀推移一代二代漸繁漸文又何必近耳目而信諸逺耳目而疑諸三皇太古書亦謂之三墳一曰山墳二曰氣墳三曰形墳天皇伏犧氏本山墳而作易曰連山人皇神農氏本氣墳而作易曰歸藏地皇黃帝氏本形墳而作易曰坤乾雖不畫卦而其名皆曰卦爻大象連山之大象有八曰君臣民物隂陽兵象而統以山歸藏之大象有八曰歸藏生動長育止殺而統以氣坤乾之大象有八曰天地日月山川雲氣而統以形皆八而八之為六十四其書漢魏不傳至元豐中始出于唐州比陽之民家世疑偽書然其文古其辭質而野其錯綜有經緯恐非後人之能為也如緯書猶見取於前世况此乎且歸藏至晉始出連山至唐始出然則三墳始出於近代亦不為異事也右古易三部十六卷石經周易十卷今字石經易篆三卷一字石經周易一卷按石經之學始於蔡雍始也秦火之後經籍初出諸家所藏傳寫或異箋傳之儒皆馮所見更不論文字之訛謬雍校書東觀奏求正定六經文字靈帝許之乃自為書而刻石于太學門外後儒晚學咸所取正奈當漢之末祚所傳未廣而兵火無存後之人所得者亦希矣今之所謂石經者但刻諸石耳多非蔡氏之經右石經三部十四卷周易十卷漢魏郡太守京房章句周易十卷漢曲臺長孟喜章句隋八卷唐十卷周易四卷漢費直章句費氏之學出於民間不列學官至唐其書始出周易十卷漢南郡太守馬融章句周易五卷漢荆州牧劉表章句周易十卷漢司空荀爽章句右章句六部四十九卷周易傳二卷卜子夏易傳三卷漢京房傳吳陸績注周易傳一卷後魏關朗撰唐趙㽔注周易傳三卷唐陸希聲去彖象而自為辭亦自注周易外傳二十二卷髙定撰周易言象外傳十卷宋朝王洙撰右傳注附六部四十一卷周易十卷後漢大司農鄭元注隋九卷唐十卷周易十卷漢宋忠周易十卷魏將軍王肅周易十卷魏大司農董遇周易七卷魏尚書郎王弼周易十卷吳太常姚信周易九卷吳侍御史虞翻周易十三卷吳陸績周易十卷魏散騎常侍荀輝周易十卷晉散騎常侍于寶周易十卷蜀才周易十卷晉儒林從事黃頴注梁十卷隋四卷唐復十卷周易十卷後魏司徒崔浩周易七卷姚規周易十三卷崔覲周易十卷梁處士可胤周易十卷盧氏周易十四卷傅氏周易十卷王文元周易十卷王凱沖周易十卷任希古符祥注十卷宋朝龍昌期周易六卷劉牧周易十卷張葆光補注三卷皇甫佖繫辭二卷晉桓元注繫辭二卷晉西中郎將謝万繫辭二卷晉太常韓康伯繫辭二卷梁大中大夫宋褰繫辭二卷荀柔之繫辭二卷荀諺右注三十一部二百五十四卷集解周易十卷馬鄭二王四家集注周易十卷荀爽九家集二王注十卷楊氏集解周易十卷張璠集注周易十七卷唐李鼎祚集注周易一百卷唐元載集注繫辭二卷隋志周易會釋記二十卷偽吳僧陸希覺右集注八部一百七十九卷周易義疏二十卷宋明帝集羣臣講周易講疏二十卷張該等羣臣講周易講疏三十五卷梁武帝周易講疏十六卷梁五經博士褚仲都周易義疏十四卷梁都官尚書蕭子政周易講疏三十卷陳咨議參軍張譏周易義疏十六卷陳尚書左僕射周𢎞正周易文句義疏二十卷梁蕃周易講疏十三卷國子祭酒何妥周易文句義疏二十四卷陸德明周易新傳疏十卷隂𢎞道周易王道小疏十卷周易廣疏三十六卷勾徽乾坤義疏一卷劉瓛周易大義二十一卷梁武帝周易證義疏二十卷宋朝范諤昌周易正義十四卷唐孔穎逹會通正義三十二卷縱康乂周易新注本義十四卷唐薛仁貴正義補闕七卷四庫書目周易甘棠正義三十卷五代任貞一繫辭義疏二卷劉瓛周易口義二十卷宋朝胡瑗繫辭義疏一卷梁武帝繫辭義疏二卷梁蕭子政右義疏二十五部四百二十八卷周易論十卷齊中書郎周顒周易論四卷范氏略論一卷張璠周易論三卷唐僧一行周易論一卷應吉甫周易論三十三卷宋朝王昭素周易論十卷陳臯周易窮微論一卷王弼周易盡神論一卷晉司空鍾會通易象論三卷晉尚書郎欒肇大衍論三卷唐明皇通易象論一卷宣聘通易論一卷晉荆州刺史宋岱周易卦序論一卷晉司徒右長史楊乂統略論三卷晉少府卿鄒湛二阮難答論二卷阮長成阮仲容卦德統論一卷劉牧制器尚象論一卷陳希亮易卦正名論一卷劉不疑廣論一卷又大義疑問二十卷周易大義一卷又周易發義一卷周易開題義十卷梁蕃周易大義二卷陸德明周易幾義一卷梁南平王蕭偉周易異議論十卷劉遵周易外義三卷周易義六卷魏徵撰唐志無易義五卷盧行超易説精義三卷四庫書目周易括囊大義十卷四庫書目易義八卷皇甫佖易義十卷聱隅先生黃晞易義一卷黃通易義二卷李賁易義一卷周孟陽周易義略九卷張簡周易問二十卷周易問難二卷王氏撰周易難王輔嗣義一卷晉顧夷等義決一卷唐藝文志爻義一卷于寶大衍義一卷李覺繫