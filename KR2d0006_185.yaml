body:
  text: 通志卷一百六十一宋右迪功郎鄭樵漁仲撰列傳第七十四隋于仲文從弟宣道宣敏宇文欣弟愷豆盧績子育楊文恩弟紀楊雄子綝弟達史祥王世積李徹侯莫陳頴李子雄爾朱敞慕容三藏竇榮定梁士彥元諧虞慶則元胄達奚長儒賀婁子幹史萬歲劉方馮昱陳王檦通永貴楊武房兆杜彥周搖獨孤楷乞伏慧張威和洪隂夀子世師骨儀楊義臣皇甫誕陶世模敬釗裴矩裴仁基斛斯政于仲文字次武其先居代後為河南洛陽人祖謹周太師燕國公父實大左輔謹自有傳仲文少聰敏髫齓好學耽閲不倦父實異之曰此兒必興吾宗九歲於雲陽宫見周文周文問曰聞兒好讀書書中有何事仲文曰資父事君忠孝而已周文甚嗟歎之後就博士李詳受周易三禮略通大義及長倜儻有大志氣調英拔見稱名公子起家趙王屬纍遷安固太守有任杜兩家各失牛後得一牛兩家俱認一州久不能決益州長史韓伯俊曰于安固少年聰察可令決之仲文曰此易解耳乃令二家各驅牛羣至乃放所認者牛遂向任氏羣中又使人微傷其牛任氏嗟惋杜氏自若仲文遂訶詰杜氏服罪而去始州刺史屈突尚宇文護之黨也先坐事下獄無敢繩者仲文至郡窮之遂竟其獄蜀中語曰明斷無雙有于公不避強禦有次武徴為御正下大夫封延夀郡公以勳授儀同三司宣帝時為東郡太守髙祖為丞相尉遲迥作亂使誘仲文仲文拒之迥遣儀同宇文威攻之仲文迎擊大破威以功授開府迥又遣其將宇文胄度石濟宇文威鄒紹自白馬二道俱進復攻仲文郡人赫連僧伽敬子哲率衆應迥仲文自度不能支棄妻子潰圍而遁歸長安迥於是屠其三子一女髙祖見之引入臥內為之下泣賜綵五百假黃金二百兩進位大將軍領河南道行軍總管給鼓吹仍遣馳傳詣洛陽發兵以討檀讓讓迥之強將也時韋孝寬拒迥於永橋仲文詣之有所計議總管宇文欣頗有自疑之心因謂仲文曰公從京師來觀執政意如何也尉遲迥誠不足平正恐事寧之後更有藏弓之慮仲文懼欣生變因謂之曰丞相寬仁大度明識有餘茍能竭誠必無疑二仲文在京三日頻見三善以此為觀非尋常人也欣曰三善何如仲文曰有陳萬敵者新從賊中來丞相即令其弟難敵召募鄉曲從軍討賊此其大度一也上士宋謙奉使勾檢謙因此别求他罪丞相責之曰入網者自可推治何須别訪以虧大體此其不求人私二也言及仲文妻子未嘗不潸泫此其有仁心三也欣自此遂安仲文軍至汴州東頻破迥將進次梁郡迥守將劉孝寬棄城走初仲文在蓼隄諸將皆曰軍自遠來疲弊不可決戰仲文令趣食列陳既而破賊諸將問其故笑曰吾所部將士皆山東人果於速進不宜持久乘勢擊之所以制勝諸將皆曰非所及也進擊曹州獲迥所署刺史李仲康及上儀同房徑檀讓以餘衆屯成武謂仲文未能卒至方椎牛饗士仲文選騎襲之遂拔成武迥將席毗羅衆十萬屯沛縣將攻徐州其妻子在金鄉仲文遣人詐作毗羅使謂金鄉城主徐善淨曰檀讓明日午時到金鄉將宣蜀公令賞將士金鄉人謂為信然皆喜仲文簡精馬偽建迥旗幟善淨以為檀讓至出城迎謁仲文執之遂取金鄉諸將勸屠之仲文曰當寬其妻子其兵可自歸如即屠之彼皆絶矣衆皆稱善於是毗羅恃衆來薄官軍仲文背賊結陳設伏兵發俱曵柴鼓譟毗羅軍潰皆投洙水死水為不流獲檀讓檻送京師河南悉平毗羅匿滎陽人家執斬之傳首闕下勒石紀功樹於泗上入朝京師髙祖引入臥內宴享極歡賜雜綵千假妓女十人拜柱國屬髙祖受禪不行未幾其叔父太尉翼坐事下獄仲文亦為吏所簿於獄中上書曰曩者尉遲迥逆亂所在景從臣任處關河地居衝要嘗膽枕戈誓以必死迥時購臣位大將軍邑萬戶臣不顧妻子不愛身命冒白刃潰重圍三男二女相繼淪沒披露肝膽馳赴闕庭蒙陛下授臣以髙官委臣以兵革于時河南凶寇狼顧鴟張臣以羸兵八千掃除氛祲摧劉寬於梁郡破檀讓於蓼隄平曹州復東郡安成武定永昌解亳州圍破徐州賊席毗羅十萬之衆一戰土崩河南蟻聚之徒應時戡定當羣凶問鼎之際生靈乏主之辰臣第二叔翼先在幽州總御燕趙南鄰羣寇北掃旄頭內安外撫得免罪戾臣第五叔智建旟黑水與王謙為鄰式遏蠻陬鎮綏蜀道臣兄顗作牧淮南坐制勍敵乘機勦定傳首京師王謙竊據二州叛換三蜀臣第三叔義受脤廟庭恭行天罰自外父叔兄弟皆當文武重寄或銜命危難或侍衛鈎陳合門誠欵冀有可明伏願埀泣辜之恩降雲雨之施則寒灰再然枯骨連肉上覽表并翼釋之明年拜行軍元帥統十二州總管以擊胡出服遠鎮遇虜破之於是從金河出白道遣總管辛明瑾元滂賀蘭志吕楚假諧等二萬人出盛樂道趣郍頡山至護軍川北與虜遇可汗見仲文軍容整肅不戰而退仲文踰山追之及還上以尚書省文簿繁雜吏多姦詐令仲文勘録省中事所發擲甚多上嘉其明斷厚加勞賞上母憂轉運不給仲文請決渭水開漕渠上然之使仲文總其事及伐陳之役拜行軍總管髙智慧等作亂江南仲文復以行軍總管討之時三軍乏食米粟踊貴仲文坐私糶軍糧除名明年復官爵率兵屯馬邑以備胡晉王廣以仲文有將領才每常屬意至是奏之乃令督晉王軍府事後突厥犯塞晉王為元帥使仲文將前軍大破賊而還煬帝即位遷左翊衛大將軍參掌文武選事從帝討吐谷渾進位光祿大夫甚見親重遼東之役仲文率軍指樂浪道次于烏骨城仲文簡羸馬驢數千置於軍後既而率衆東過髙麗髙麗乃出兵襲其輜重仲文回擊大破之至鴨淥水髙麗將乙支文德詐降來入其營仲文先奉密旨若遇髙元及文德者必禽之至是文德來仲文將執之時尚書左丞劉士龍為慰撫使固止之仲文遂捨文德尋悔遣人紿文德曰更有言議可復來文德不從遂濟江仲文選騎度水追之每戰破賊文德遺仲文詩曰神策究天文妙算窮地理戰勝功既髙知足願云止仲文答書諭之文德燒柵而遁時宇文述以糧盡欲還仲文議以精鋭追文德可以有功述固止之仲文怒曰將軍杖十萬之衆不能破小賊何顔以見帝且仲文此行也固無功矣述因厲聲曰何以知無功仲文大怒曰昔周亞夫之為將也見天子軍容不變此決在一人所以功成名遂今者人各其心何以赴敵初帝以仲文有計畫令諸軍稟其節度故有此言由是述等不得已而從之遂東行至薩水述以兵餒退歸師遂敗績諸將皆委罪仲文帝大怒釋諸將獨繫仲文仲文憂恚發病困篤方出之卒於家年六十八撰漢書刋繁三十卷略覽三十卷有子九人欽明最知名仲文從弟宣道字元明父義位上柱國宣道性謹密不交非類仕周以父功賜爵安成縣男位小承御上士髙祖為丞相引為外兵曹及踐阼遷內史舍人進爵為子父憂水漿不入口者纍日歲餘起令視事免喪拜車騎將軍兼右衛長史舍人如故後遷太子左衛副率進位上儀同卒子志寧早知名出繼叔父宣敏宣敏字仲達少沈密有才思年十一詣周趙王招王命之賦詩其詩甚有幽貞之志王大竒之坐客莫不嗟賞起家右侍上士遷為千牛備身髙祖踐阼拜奉車都尉奉使撫慰巴蜀及還上疏曰臣聞開盤石之宗漢室於是惟永建維城之固周祚所以靈長昔秦皇置牧守而罷諸侯魏后昵諂邪而疏骨肉遂使宗社移於他族神器傳於異姓此事之明甚於觀火然山川設險非親勿居且蜀土沃饒人物殷阜西通襄樊南屬荆巫周德之衰兹土遂成戎首炎政失御此地便為禍先是以明者防於無形安者制其未亂方可慶隆萬世年逾千百伏惟陛下日角龍顔膺樂推之運參天二地居揖讓之期億兆宅心百神受職理須樹建藩屏封植子孫繼周漢之宏圖改秦魏之舊軌抑近習之權勢崇公族之本枝但三蜀二齊古稱天險分王戚屬今正其時若使利建合宜封樹得所則巨猾息其非望姦臣杜其邪謀盛業洪基同天地之長久英聲茂實齊日月之照臨臣雖學謝多聞然情深體國輒申管見戰灼惟深帝省表嘉之謂髙熲曰于氏世有人焉竟納其言遣蜀王秀作鎮於蜀宣敏常以盛滿之誡昔賢所重每懷靜退著述志賦以見志焉未幾卒官時年二十九宇文欣字仲樂其先昌黎大棘人徙居夏州父貴為周名將位太保許國公自有傳欣幼敏慧為兒童時與羣輩戲輒為部伍進止行列無不用命者年十二能左右馳射驍捷若飛恆謂所親曰自古名將唯以韓白衛霍為美談吾察其行事未足多尚使與僕並時不令豎子獨擅髙名也年十八從周齊王憲討突厥以功拜儀同三司賜爵興固縣公韋孝寬以欣驍勇請與鎮玉壁以戰功加開府進爵化政郡公從武帝攻拔晉州齊後主親總戎兵勢甚盛帝憚之欲旋師欣諫曰以陛下之聖武乘齊主之荒縱何往而不克若使齊人更得令主君臣協力雖湯武之勢未易平也帝從之乃戰遂大克及帝攻陷并州先勝後敗為敵所窘左右皆殱帝挺身而遁諸將各勸帝還欣勃然進曰陛下克晉州破髙緯乘勝逐北以至於此昨日將士輕敵微有不利何足為懷丈夫當死中求生敗中取勝今者破竹之勢已成奈何棄之而去帝納其言明日復戰遂拔晉陽及齊平進位大將軍尋與烏丸軌破陳將吳明徹於吕梁進位柱國除豫州總管髙祖龍潛時與欣情好甚協及為丞相恩眷彌隆尉遲迥作亂以欣為行軍總管從韋孝寬擊之時兵屯河陽諸軍莫敢先進帝令髙熲馳驛監軍與熲密謀進取者惟欣而已迥遣子惇盛兵武陟欣先鋒擊走之進臨相州迥遣精甲三千伏野馬岡欲邀官軍欣以五百騎襲之斬獲略盡進至草橋迥又拒守欣以竒兵破之直趨鄴下迥背城結陳與官軍大戰官軍不利時鄴城士女觀戰者數萬人欣與髙熲李詢等謀曰事急矣吾當以權道破之於是先犯所觀者觀者大囂而走轉相騰藉聲如雷霆欣乃傳呼曰賊敗矣衆軍復振齊力急擊之迥軍大敗及平鄴城以功加上柱國髙祖顧謂欣曰尉遲迥傾山東之衆連百萬之師公舉無遺策戰無全陳誠天下之英傑也進封英國公自是以後每參帷幄出入臥內禪代之際欣有力焉後拜右領軍大將軍寵顧愈重欣妙解兵法馭戎齊整當時六軍有一善事雖非欣所建在下輒相謂曰此必英公法也其見推服如此後改封杞國公上嘗欲令欣擊突厥髙熲曰欣有異志不可委以大兵乃止欣既佐命功臣頻經將領威名冠於當時上由是微忌之以譴去官欣與梁士彥昵狎數相往來皆有怨望隂圖不軌欣謂士彥曰帝王豈有常乎相扶即起公於蒲州起事我必從征兩陳相當然後連結天下可圖也謀泄伏誅家口籍沒欣弟愷字安樂在周以功臣子年三歲賜爵雙泉伯七歲進封安平公愷少有器局諸兄並以弓馬自達愷獨好學博覽書記解屬文多伎藝為名公子纍遷御正中大夫儀同三司髙祖為丞相加上開府進師中大夫及踐阼誅宇文氏愷亦將見殺以與周本别又兄欣有功故見赦後拜營宗廟副監太子左庶子廟成别封甑山縣公及遷都上以愷有巧思詔領營新都副監髙熲雖總大綱凡所規畫皆出於愷及決渭水達河以通軍漕詔愷總督其事後拜萊州刺史甚有能名坐兄欣誅除名於家久不得調會朝廷以魯班故道久絶不行令愷修之既而上建仁夀宫右僕射楊素言愷有巧思於是檢校將作大匠歲餘拜仁夀宫監授儀同三司尋為將作少監文獻皇后崩愷與楊素營山陵上善之復爵安平郡公煬帝即位遷都洛陽以愷為營東都副監尋遷將作大匠愷揣帝心在宏侈於是東都制度窮極壯麗帝大恱進位開府拜工部尚書及長城之役詔愷規度之時帝北巡欲誇戎狄令愷為大帳其下坐數千人帝大恱賜物千假又造觀風行殿上容衛者數百人離合為之下施輪軸推移倐忽有若神功戎狄見之莫不驚駭帝彌恱前後賞賜不可勝紀是時將復古制明堂議者皆不能決愷博考羣籍為明堂圖樣奏之又以張衡渾象用三分為一度裴秀輿地以一寸為千里臣之此圖以一分為一尺推而演之又引于時議者或以綺井為重屋或以圓楣為隆棟將為臆説事不經見今録其疑難為之通釋皆出證據以相發明為議曰臣愷謹案淮南子曰昔者神農之御天下也甘雨以時五榖蕃植春生夏長秋收冬藏月省時考終歲獻貢以時嘗榖祀于明堂明堂之制有蓋而無四方風雨不能襲燥濕不能傷遷延而入之臣愷以為上古朴略創立典刑尚書帝命驗曰帝者承天立五府以尊天重象赤曰文祖黃曰神斗白曰顯紀黑曰元矩蒼曰靈府注云唐虞之天府夏之世室殷之重屋周之明堂皆同矣尸子曰有虞氏曰總章周官考工記曰夏后氏世室堂修二七博四修一注云修南北之深也夏度以步令堂修十四步其博益以四分修之一則堂博十七步半也臣愷案三王之世夏最為古從質向文理應漸就寬大何因夏室乃大殷堂相形為論理恐不爾記云堂修二七博四修一若夏度以步則應修七步注云今堂修十四步乃是增益記文殷周二堂獨無加字便是義類例不同山東禮本輒加二七之字何得殷無加尋之文周闕增筵之義研窮其趣或是不然讐校古書並無二字此乃桑間俗儒信情加減黃圖議云夏后氏益其堂之大百四十四尺周人明堂以為兩杼間馬宫之言止論堂之一靣據此為凖則三代堂基並方得為上圓之制諸書所説並為下方鄭注周官獨為此義非直與古違異亦乃乖背禮文尋文求理深恐未愜尸子曰殷人陽館考工記曰殷人重屋堂修七尋堂崇三尺四阿重屋注云其修七尋五丈六尺放夏周則其博九尋七丈二尺又曰周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵禮記明堂位曰天子之廟復廟重簷鄭注云復廟重屋也注玉藻云天子廟及路寢皆如明堂制禮圖云於內室之上起通天之觀觀八十一尺得宫之數其聲濁君之象也大戴禮曰明堂者古有之凡九室室有四戶八牖以茅蓋上圓下方外水曰璧雍赤綴戶白綴牖堂髙三尺東西九仭南北七筵其宫方三百步凡人疾六畜疫五榖災生於天道不順天道不順生於明堂不飾故有天災則飾明堂周書曰明堂方百一十二尺髙四尺階博六尺二寸室居內方百尺室內方六十尺髙八尺博四尺作洛曰明堂太廟路寢咸有四阿重亢重廊孔氏注云重亢纍棟重廊纍屋禮圖曰秦明堂九室十二階各有所居吕氏春秋曰有十二堂與月令同並不論尺丈臣愷案十二階雖不與禮合一月一階非無理思黃圖曰堂方百四十四尺坤之策也方象地屋圓楣徑二百一十六尺乾之策也圓象天室九宫法九州太室方六丈法隂之變數十二堂法十二月三十六戶法極隂之變數七十二牖法五行所得日數八達象八風法八卦通天臺徑九尺法乾以九覆六髙八十一尺法黃鍾九九之數二十八柱象二十八宿堂髙三尺土階三等法三統堂四向五色法四時五行殿門去殿七十二步法五行所行門堂長四丈取太室三之二垣髙無蔽目之照牖六尺其外倍之殿垣方在水內法地隂也水四周於外象四海圓法陽也水闊二十四丈應二十四氣水內徑三丈應覲禮經武帝元封二年立明堂汶上無室其外略依此制泰山通義今亡不可得而辨也元始四年八月起明堂璧雍長安城南門制度如儀一殿垣四靣門八觀水外周隄壤髙四方和會築作三旬五年正月六日辛未始郊太祖髙皇帝以配天二十二日丁亥宗祀孝文皇帝於明堂以配上帝及先賢百辟卿士有功於時者秩而祭之親扶三老五更袒而割牲跪而進之因班時令宣恩澤諸侯宗室四夷君長胸奴西國侍子悉奉貢助祭禮圖曰建武三十年作明堂堂上圓下方圓法天方法地十二堂法日辰九室法九州八窗象八風八九七十二法一時之王室有二戶二九十八戶法土王十八日內堂正牆髙三尺土階三等胡伯始注漢官儀云古清廟蓋以茅今蓋以瓦瓦下藉茅以存古制東京賦曰乃營三宫布政頒常復廟重屋八達九房造舟清池惟水泱泱薛綜注云復重廟覆謂屋平覆重棟也續漢書祭祀志曰明帝永平二年祀五帝於明堂五帝坐各處其方黃帝在未皆如南郊之位光武位在青帝之南少退西靣各一犢奏樂如南郊臣愷案詩云我將祀文王於明堂也我將我享維羊維牛據此則備大牢之祭今云一犢恐與古殊自晉以前未有鴟尾其門牆璧水一依本圖晉起居注裴頠議曰尊祖配天其義明著廟宇之制理據未分直可為一殿以崇嚴祀其餘雜碎一皆除之臣愷案天埀象聖人則之辟雍之屋既有圖狀晉室方構不合天文既闕重樓又無璧水空堂乖五室之義直殿違九階之文非古欺天一何過甚後魏於北臺城南造圓牆在璧水外門在水內逈立不與牆相連其堂上九室三三相重不依古制室間通巷違舛處多其室皆用墼纍極成褊陋後魏樂志曰孝昌二年立明堂議者或言九室或言五室詔斷五室後元又執政復改為九室遭亂不成宋起居注曰孝武大明五年立明堂其牆宇規範擬則大廟唯十二間以應期數依漢汶上圖儀設五帝位太祖文皇帝對饗鼎俎簠簋一依廟禮梁武帝即位之後移宋時太極殿以為明堂無室十二間禮疑議云祭用純柴俎瓦樽文於郊質於廟止一獻用清酒平陳之後臣得目觀遂量步數記其尺丈猶見焚燒殘柱毁破之餘入地一丈儼然如舊柱下以樟木為跗長丈餘闊四尺許兩兩相並凡安數重宫城處所乃在郭內雖湫隘卑陋未合規摹但祖宗之靈得崇嚴祀周齊二代闕而不修大饗之典於焉靡託自古明堂圖唯有二本一是宗周劉熙阮諶劉昌宗等作三圖略同一是後漢建武三十年作禮圖有本不詳撰人臣逺尋經傳傍求子史研究衆説總撰今圖其樣以木為之下為方堂堂有五室上為圓觀觀有四門帝可其奏會遼東之役事不果行以度遼之功進位金紫光祿大夫其年卒官帝甚惜之諡曰康撰東都圖記二十卷明堂圖議二卷釋疑一卷見行於世長子儒童遊騎尉少子溫起部承務郎豆盧績字定東昌黎徒何人父寧周柱國太保自有傳績之初生也周文親幸寧家稱慶時遇新破齊師周文因字之曰定東績聰悟有器局少受業國子學略涉文藝初以勳臣子封義安縣侯閔帝踐阼授稍伯下大夫開府儀同三司改封丹陽郡公明帝時為左武伯中大夫績自以經業未通請解職遊露門學帝嘉之敇以本官就學未幾齊王憲納績妹為妃恩禮踰厚會武帝即位渭源燒當羌因飢作亂以績有才略拜渭州刺史甚有惠政華夷恱服德澤流行大致祥瑞鳥鼠山俗呼為髙武隴其下渭水所出其山絶壁千尋由來乏水諸羌苦之績馬足所踐飛泉湧出有白烏翔止廳前乳子而後去又白狼見於襄武民為之謡曰我有丹陽山出玉漿濟我民夷神烏來翔百姓因號其泉為玉漿泉後丁父艱毁瘁過禮襲爵楚國公大象二年纍遷利州總管尋拜柱國髙祖為丞相益州總管王謙作亂績嬰城固守謙將達奚惎等十萬衆攻之起土山鑿城為七十餘穴堰江水以灌之績戰士不過二千晝夜相拒經四旬勢漸迫績出竒兵擊之斬數千級降千人梁睿軍且至賊解去髙祖遣使勞之詔加上柱國賜一子爵中山縣公開皇初突厥犯塞拜夏州總管上以其家世貴盛勳效克彰甚重之復為漢王諒納績女為妃寵遇彌隆七年追守利州功詔食始州臨津縣邑千戶十年以疾徴還京師詔諸王並至績第中使顧問道路不絶卒諡曰襄子賢嗣位顯州刺史大理少卿虎賁中郎將次子育字道生少英果有氣節漢王諒出鎮并州育以妃兄為王府主簿以征突厥功授儀同三司及煬帝即位諒納咨議王頍謀作亂育苦諫不從因謂其弟懿曰吾匹馬歸朝自得免禍此乃身計非為國也今且偽從以思後計育兄賢言於帝曰臣弟育素懷志節必不從亂但逼凶威不能克遂臣請從軍與育為表裏諒不足圖也帝許之賢密遣家人齎敕書至育所與之計諒將往介州令育與總管屬朱濤留守育與濤議拒之濤拂衣不從育追斬之時諒司馬皇甫誕以諌被囚育出之與協計及開府磐石侯宿勤武等閉城拒諒部分未定有人告諒諒攻之城陷見害時年二十八諒平贈大將軍封正義縣公諡曰愍子願師嗣拜儀同三司大業初行新令五等並除未幾帝復下詔改封育雍邱侯復以願師襲楊文恩字溫仁𢎞農華隂人也父寬周梁州刺史有傳文恩在周年十一拜車騎大將軍儀同三司散騎常侍尋以父功封新豐縣子天和初行武都太守十姓獠反文恩討平之復行翼州事黨項羌叛文恩又討平之進擊資中武康隆山等生獠及東山獠並破之從陳王攻齊河隂城又從武帝攻拔晉州授上儀同三司改封承寧縣公壽陽劉叔仁作亂從清河公宇文神舉討之戰於磚井在陳禽叔仁又别從王誼破賊於鯉魚柵後纍以軍功遷果毅左旅下大夫髙祖為丞相從韋孝寬拒尉遲迥於武陟與行軍總管宇文述擊走其將李俊遂解懷州圍破尉遲惇平鄴城皆有功進授上大將軍改封洛川縣公尋拜隆州刺史開皇元年進爵正平郡公後為魏州刺史甚有惠政及去職吏民思之為立碑頌德轉冀州刺史煬帝嗣位徴為戶部尚書轉納言改授光祿大夫從幸江都宫以足疾不堪趨奏復授戶部尚書位右光祿大夫卒官諡曰定初文恩當襲父爵自以非嫡遂讓弟紀當世多之紀字溫範少剛正有器局在周襲爵華山郡公纍遷安州總管長史將兵迎陳降將王瑗於齊安與陳將周法尚遇擊走之以功進開府入為虞部下大夫髙祖為丞相改封汾隂縣公從梁睿討王謙以功進授上大將軍歷資州刺史宗正少卿坐事除名後尋復其爵位拜熊州刺史改封上明郡公除宗正卿兼給事黃門侍郎判禮部尚書事遷荆州總管卒諡曰恭楊雄初名惠𢎞農華隂人也父紹周大將軍自有傳雄美姿容有器度雍容間雅進止可觀周武帝時為太子司旅下大夫帝幸雲陽宫衛王直作亂襲肅章門雄逆拒破之封武陽郡公遷右衛上大夫大象中進爵邘國公髙祖為丞相雍州牧畢王賢構難雄時為别駕知其謀以告髙祖賢伏誅以功授柱國雍州牧仍領相府虞侯周宣帝葬備諸王有變令雄率六千騎送至陵所進位上柱國髙祖受禪除左衛將軍兼宗正卿遷右衛大將軍參預朝政封廣平王以邘公别封一子雄請封弟士貴朝廷許之或奏髙熲朋黨者帝言之於朝雄深明其虛帝亦以為然雄時貴寵冠絶一時與髙熲虞慶則蘇威稱為四貴雄寬容下士朝野顧屬帝隂忌之不欲其典兵馬乃改授司空外示優崇而內實奪其權也雄乃閉門不通賔客尋改封清漳王仁壽初帝以清漳不允聲望命職方進地圖指安德郡示羣臣曰此號足為名德相稱乃改封安德王大業初授太子太傅元德太子薨檢校鄭州刺史遷懷州刺史京兆尹帝親征吐谷渾詔雄總管澆河道諸軍及還改封觀王遼東之役檢校左翊衛大將軍出遼東道次瀘河鎮遘疾薨帝為之廢朝詔鴻臚監護喪事有司請諡曰懿帝曰王道髙雅俗德冠生靈乃諡曰德贈司徒襄國等十郡太守子恭仁位吏部侍郎恭仁弟綝性和厚有文學歷義州刺史淮南郡太守及父薨起為司𨽻校尉遼東之役楊元感反其弟元縱自帝所逃赴其兄路逢綝綝辟人偶語久之司𨽻刺史劉休文奏之時恭仁將兵於外帝寢其事綝憂發病而卒雄弟達字士達有學行仕周位儀同內史下大夫封遂寧縣男髙祖受禪拜給事黃門侍郎進爵為子遷兼吏部侍郎加開府轉內史侍郎鄯鄭趙三州刺史俱有能名平陳後髙祖差品天下牧宰達為第一擢拜工部尚書加上開府達為人𢎞厚有局度楊素每曰有君子貌兼君子心者唯楊達耳獻皇后及髙祖山陵制度達並參預焉焬帝嗣位轉納言領營東都副監遼東之役領右武衛將軍進位左光祿大夫卒於師贈吏部尚書始安侯諡曰恭史祥字世休建康袁氏人也父寧仕周歷位荆州刺史自有傳祥有文武才幹仕周太子車右中士襲爵武遂縣公髙祖踐阼拜儀同領交州事進爵陽城郡公在州頗有惠政轉驃騎將軍伐陳之役從宜陽公王世積出九江道破陳師進拔江州髙祖大恱下詔慰勉之進位上開府尋拜蘄州刺史遷蘄州總管徴拜左領軍將軍復以行軍總管從晉王廣破突厥於靈武遷右衛將軍仁壽中率兵屯𢎞化以備胡煬帝時在東宫遺祥書論舊行兵時事申以恩旨祥為書陳謝太子甚親遇之及即帝位漢王諒作亂遣其將綦母良自滏口徇黎陽塞白馬津余公理自太行下河內帝以祥為行軍總管軍於河隂久不得濟祥謂軍吏曰余公理輕而無謀又新得志謂其衆可恃恃衆必驕且河北人先不習兵所謂擁市人而戰不足圖也乃令軍中修攻具公理使諜知之果屯兵於河陽內城以備祥祥於是艤船南岸公理聚甲當之祥乃簡精鋭於下流潛度公理拒之未成列祥縱擊大破之東趣黎陽討綦母良良棄軍走其衆大潰進位上大將軍賜縑綵七千假女妓十人良馬二十匹轉太僕卿帝嘗賜祥詩曰伯煚朝寄重夏侯親遇深貴耳惟聞古賤目詎知今早􅋆徑草質久有背淮心掃逆黎山外振旅河之隂功已書王府留情太僕針祥上表辭謝帝手詔曰昔歲勞公問罪河朔賊爾日塞兩關之路據倉阻河公竭誠奮勇一舉而尅故聊示所懷亦何謝也尋遷鴻臚卿從征吐谷渾祥出玉門道擊虜破之進位右光祿大夫拜右驍騎大將軍及征遼東出踏頓道不利由是除名俄拜燕郡太守被賊髙開道所圍城陷開道甚禮之會開道與羅藝通和送祥於涿郡卒於塗子義隆永平令祥弟雲字世髙亦以父勳賜爵武平縣公歷位司職下大夫儀同大將軍萊州刺史雲弟威字世儀亦以父勳賜爵武當縣公王世積闡熙新冏人也父雅周夏州刺史自有傳世積容貌魁岸腰帶十圍風神爽拔有人傑之表在周以功拜上儀同封長子縣公髙祖受禪進封宜陽郡公髙熲美其才能甚善之嘗謂熲曰吾輩俱周之臣子社稷淪沒若何熲深拒之未幾授蘄州總管平陳之役以舟師自蘄水趣九江以功進位柱國荆州總管後桂州人李光仕作亂世積以行軍總管討平之進位上柱國甚見隆重世積見髙祖性忌刻功臣多獲罪由是縱酒不與執政言及時事上以為有酒疾舍之宫內令醫者療之世積詭稱疾愈始得就第及征遼東世積與漢王並為行軍元帥至桞城遇疾而還拜涼州總管令騎士七百人送之官未幾其親信安定皇甫孝諧有罪吏捕之亡抵世積不納由是有憾孝諧竟配防桂州事總管令狐熙熙又不禮焉甚困窮因徼幸上變稱世積嘗令道人相其貴不道人云當為國主謂其妻曰夫人當為皇后又將之涼州其所親謂世積曰河西天下精兵處可圖大事世積曰涼州土曠人稀非用武國由是被徴案其事有司奏左衛大將軍元旻右衛大將軍元胄左僕射髙熲並與世積交通受其名馬之贈世積竟坐誅旻胄等免官拜孝諧為上大將軍李徹字廣達朔方巖緑人也父和周柱國大將軍入隋遷上柱國徹性剛毅有器幹周武帝時從皇太子西征吐谷渾以功賜爵周昌縣男從武帝平齊録前後功再進爵遷左武衛將軍及晉王廣鎮并州妙選府官詔徹總晉王府軍事進爵齊安郡公時蜀王秀亦鎮益州上謂侍臣曰安得文同王子相武如李廣達者乎其見重如此明年突厥沙鉢略可汗犯塞髙祖令衛王爽為元帥擊之以徹為長史遇虜於白道行軍總管李充請襲之諸將多以為疑唯徹奬成其事請同行遂掩擊大破之沙鉢略棄所服金甲而遁以功加上大將軍沙鉢略因此稱藩改封安道郡公開皇十年進位柱國及晉王為揚州總管以徹為司馬改封德廣郡公尋徙封城陽郡公其後突厥犯塞徹復領行軍總管破之及左僕射髙熲得罪以徹素與熲善被疏忌後出怨言上聞召入臥內賜宴言及平生因遇鴆卒大業中其妻元氏為孽子安遠誣以呪詛伏誅侯莫陳頴字遵道代武川人也父崇周大司徒號為名將自有傳頴少有器量風神警發為時輩所推魏大統末以父軍功賜爵廣平侯纍遷開府儀同三司周武帝時從滕王逌擊龍泉文城叛胡頴與柱國豆盧績分路而進頴懸軍五百餘里破其三柵先是稽胡叛亂輒略邉人為奴婢至是詔胡有厭匿良人者誅籍沒其妻子有人言為胡村所隱匿者績將誅之頴曰將在外君命有所不行諸胡固非悉反但相迫脅為亂今慰撫自可不戰而定如即誅之轉相驚恐為難不細未若召其渠帥以隱匿者付之令自歸首則羣胡可安績從之諸胡爭降附北土以安遷司武加振威中大夫髙祖受禪加上開府進爵升平郡公平陳之役以行軍總管從秦王俊出魯山道與行軍總管假文振渡江安集歸附再遷瀛州刺史甚有惠政後坐與秦王俊交通免官百姓送者莫不流涕因相與立碑頌頴清德後拜邢州刺史仁壽中吏部尚書牛𢎞持節巡撫山東以頴為第一上優詔褒揚朝廷以嶺南刺史縣令多貪鄙蠻夷怨叛妙簡清吏於是徴頴入朝上與言及平生以為歡笑即日進位大將軍拜桂州總管十七州諸軍事及至官大崇恩信民夷恱服煬帝即位頴弟梁國公芮坐事徙邉朝廷恐頴不自安徴還京師後拜恆山太守其年嶺南閩越多不附帝以頴前在桂州有惠政為南方所信伏拜南海太守卒官諡曰定子虔會最知名李子雄趙郡人父裔齊神武大丞相咨議參軍遷候衛大將軍陜州刺史及周文攻尅州城見害子雄少慷慨有大志隨父在官城陷因隨周軍入長安家世並以學業自通子雄獨習騎射兄子旦讓之曰棄文尚武非士大夫素業子雄曰自古誠臣貴仕文武不備而能濟功業者鮮矣既文且武兄何病焉子旦無以應仕周纍遷小賔部後從達奚武與齊人戰於芒山諸軍大破子雄所領獨全纍遷涼州總管長史從滕王逌破吐谷渾於青海以功加上儀同宣帝即位從行軍總管韋孝寬略定淮南拜濠州刺史髙祖總百揆徴為司會中大夫以淮南功位上開府及受禪拜鴻臚卿進爵髙都郡公及晉王廣出鎮并州以子雄為河北行臺兵部尚書上謂曰吾兒既少卿兼文武之才今者推誠相委吾無北顧憂矣子雄頓首流涕誓以效命子雄當官正直侃然有不可犯之色王甚敬憚吏民稱焉歲餘卒官子公挺嗣爾朱敞字乾羅北秀容人魏天柱大將軍榮從弟子也父彥伯魏節閔世封博陵郡王司徒公為齊神武所誅敞小隨母養於宫中時年十二敞自竇走至大街見童兒羣戲敞解所著綺羅金翠服易衣而遁追騎至不識敞便執綺衣兒比究問知非會日已暮由是免遂入一村見長孫氏媪踞胡牀坐敞再拜求哀長孫氏愍之藏於復壁之中購之愈急追且至長孫氏資而遣之遂詐為道士變姓名隱嵩髙山略涉經史數年間人頗異之嘗獨坐巖石下泫然歎曰吾豈終此乎伍子胥獨何人也乃奔於長安周文見而禮之拜行臺郎中靈壽縣伯保定中遷開府儀同三司進爵為公後為膠州刺史迎長孫氏至其第置于家厚資給之髙祖受禪改封邉城郡公黔安蠻叛命敞討平之師旋拜金州總管政號嚴明吏民懼之後以年老乞骸骨賜二馬輅車歸河內卒于家子朂嗣慕容三藏燕主晃第四子太原王恪之後也髙祖騰歸魏遂居代父紹宗為齊名將贈太尉自有傳三藏幼聰敏多武略頗有父風武平初襲爵燕郡公以軍功歷位武衛大將軍周師入鄴後主東遁委三藏留守鄴宫齊王公已下皆降三藏猶拒戰及齊平武帝引見恩禮甚厚授儀同大將軍開皇元年授吳州刺史九年副襄陽公韋洸討平嶺南至廣州洸中流矢卒詔三藏檢校廣州道行軍事以功授大將軍後遷廓州刺史人歌詠之髙祖數有勞問又畜産繁滋獲醍醐奉獻賚物百假十三年州界連雲山響稱萬歲者三詔頒郡國仍遣使醮山所其日景雲浮於上雉兔馴壇側使還以聞上大恱改封河內縣男歷疊州總管和州刺史淮南郡太守所在有惠政改授金紫光祿大夫大業七年卒竇榮定扶風平陵人也父善周驃騎大將軍開府儀同三司永富縣公季父熾開皇初位太傅周史有傳榮定沈深有器局容貌魁偉美鬚髯便弓馬初為魏文帝千牛備身周文見而竒之即授平東將軍賜爵宜君縣子後從周文與齊人戰於北芒周軍不利榮定與汝南公宇文神慶帥精騎擊却齊師以軍功拜上儀同尋復以軍功進位開府襲爵永富縣公除忠州刺史從平齊加上開府拜前將軍佽飛中大夫其妻則髙祖長姊安成長公主也髙祖少與之情契甚厚榮定亦知帝有人君之表尤相推結及髙祖作相領左右宫伯使鎮守天臺總統露門內兩廂仗衛常宿禁中遇尉遲迥初平朝廷頗以山東為意於是拜榮定為洛州總管以鎮之前後賜縑四千匹西涼女樂一部及受禪來朝賜馬三百匹部曲八十戶遣之坐事除名公主曰天子姊乃作田舍兒妻髙祖不得已尋拜右武候大將軍上數幸其第恩錫甚厚每令尚食局日供羊一口珍味稱是以佐命功拜上柱國歷位寧州刺史右武候大將軍秦州總管賜吳樂一部突厥沙鉢略寇邉以榮定為行軍元帥率總管出涼州與虜戰於髙越原兩軍相持地無水士卒渴甚至刺馬血而飲死者十二三榮定仰天太息俄而澍雨軍乃復振於是進擊數挫其鋒突厥憚之請盟而去賜縑萬匹進爵安豐郡公復封子憲為安康郡公賜縑五千匹歲餘拜右武衛大將軍帝欲以為三公榮定上書固辭以西都衛霍東都梁鄧為戒帝乃止前後賞賜不可勝計開皇六年卒帝為之廢朝令左衛大將軍元旻監護喪事賻贈三千匹上謂侍臣曰吾每欲置榮定於三事其人固讓不可今欲賜之重違其志於是贈冀州刺史陳國公諡曰懿子抗嗣抗美容儀性通率長於巧思父卒後恩遇彌厚所賜錢帛金寶亦以巨萬位定州刺史檢校幽州總管煬帝即位漢王諒反以為抗與通謀由是除名以其弟慶襲陳國公慶亦有姿容性和厚頗工草𨽻初封永富郡公位河東太守衛尉卿大業末為南郡太守為盜賊所害慶弟璡亦工草𨽻頗解鍾律歷位潁川郡扶風太守梁士彥字相如安定烏氏人也少任俠不仕州郡性剛果喜正人是非好讀兵書頗涉經史周武帝將平東夏聞其勇決自扶風郡守除為九曲鎮將進位上開府封建威縣公齊人甚憚之後以熊州刺史從武帝拔晉州進位柱國大將軍除晉州刺史及帝還齊後主親總六軍圍之士彥守孤城外無聲援衆皆震懼士彥慷慨自若賊盡鋭攻之樓堞皆盡城雉所存尋仞而已或短兵相接或交馬出入士彥謂將士曰死在今日吾為爾先於是勇烈齊奮呼聲動地無不一當百齊師少却乃命妻妾及軍民子女晝夜修城三日而就帝率六軍亦至齊師圍解士彥見帝捋帝鬚而泣曰臣幾不見陛下帝亦為之流涕時帝以將士疲倦意欲班師士彥叩馬諫曰今齊人既遁衆心皆動因其懼也而攻之其勢必舉帝從之大軍遂進帝執其手曰朕之有晉州為平齊之基若不固守則事不諧矣朕無前慮惟恐後變善為我守之及齊平封郕國公進位上柱國雍州主簿宣帝即位除東南道行臺徐州總管與烏丸軌禽陳將吳明徹裴忌於吕梁遂略定淮南地髙祖作相轉亳州總管尉遲迥之反以為行軍總管從韋孝寬擊之至河南與迥軍相對令家僮梁默等為前鋒士彥繼之所當皆破及迥平除相州刺史深見忌徴還京師間居無事恃功懷怨與宇文欣劉昉等謀反將率僮僕候上享廟之際以發機復欲於蒲州起事略取河北捉黎陽關塞河陽路劫調布為牟甲募盜賊為戰士其甥裴通知而奏之帝未發其事授晉州刺史欲觀其志士彥欣然謂昉等曰天也又請儀同薛摩兒為長史帝從之後與公卿朝謁帝令執士彥欣昉等於行間詰之狀猶不伏捕薛摩兒至對之摩兒具論始末云第二子剛埀泣苦諫第三子叔諧曰作猛虎須成班士彥失色顧曰汝殺我於是伏誅時年七十二有子五人操字孟德位上開府義鄉縣公早卒剛字永固位大將軍通政縣公涇州刺史以諫父獲免徙瓜州叔諧坐士彥誅梁默者士彥之蒼頭也驍武絶人士彥每從征伐常與默陷陳仕周位開府開皇末以行軍總管從楊素征突厥進位大將軍又從平楊諒授柱國大業五年從煬帝征吐谷渾力戰死之贈光祿大夫元諧河南洛陽人也家世貴盛諧性豪俠有氣調少與髙祖同受業於國子甚相友愛後以軍功纍遷大將軍及髙祖為丞相引致左右諧白髙祖曰公無黨援譬如水間一堵牆大危矣公其勉之髙祖受禪顧諧笑曰水間之牆竟何如也進位上大將軍封樂安郡公奉詔參修律令時吐谷渾將定城王鍾利旁率騎度河連結黨項詔諧為行軍元帥帥總管賀婁子幹等步騎數萬出鄯州趣青海邀其歸路上敕曰公受朝寄總兵西下本欲自寧疆境保全黎庶非是貪無用之地害荒服之民王者之師意在仁義賊若至界首公冝曉之以此時吐谷渾引鐵騎二萬相遇於豐利山與諧大戰擊走之追奔三十里俘斬萬計於是敕書諭以禍福又破其太子可博汗其名王十七人公侯十三人各率所部來降下詔褒之進上柱國别封一子縣公諧拜寧州刺史頗有惠政然性剛愎好排詆不能取媚於左右嘗言於上曰臣一心事主不曲取人意上曰宜終此言後以公事免時上柱國王誼有功於國與諧俱無位任每相往來有胡僧告諧誼謀反帝按其事無狀慰諭釋之未幾誼誅諧漸被疏忌然以龍潛之舊每預朝請恩禮無虧及平陳百寮大宴諧進曰陛下威德遠被臣前請突厥可汗為候正陳叔寶為令史今可用臣言帝曰朕平陳國本以除逆非欲誇誕公之所奏殊非朕心突厥不知山川何能警候叔寶昏醉寧堪驅使諧默然而退後數歲人或告諧與從父弟上開府滂臨澤侯田鸞上儀同祁緒等謀反上令案其事有司奏諧謀令祁緒勒黨項兵即斷巴蜀時廣平王雄左僕射髙熲二人用事諧欲譖去之云左執法星動已四年矣狀一奏髙熲必死又言太白犯月光芒相照主殺大臣楊雄必當之諧嘗與滂同謁帝諧私謂滂曰我是主人殿上者賊也因令滂望氣滂曰彼雲似蹲狗走鹿不如我輩有福德雲帝大怒諧滂鸞緒並伏誅籍沒其家虞慶則京兆櫟陽人也本姓魚其先仕赫連氏遂家靈武世為北邉豪傑父祥周靈武太守慶則幼雄毅性俶儻身長八尺有膽智善鮮卑語身被重鎧帶兩鞬左右馳射本州豪俠皆敬憚之初以射獵為事中更折節讀書常慕傅介子班仲升之為人仕周為中外府外兵參軍事襲爵沁源縣公越王盛討平稽胡將班師內史下大夫髙熲與盛謀須文武幹略者鎮遏之表請慶則於是拜石州總管甚有威惠稽胡慕義歸者八千餘戶開皇元年歷位內史監吏部尚書京兆尹封彭城郡公營新都總監二年突厥入寇慶則為元帥討之部分失所士卒多寒凍墮指者千餘人偏將達奚長儒率騎兵二千人别道邀賊為虜所圍慶則按營不救由是長儒孤軍獨戰死者十八九上弗之責也尋遷尚書右僕射後突厥主攝圖將內附請一重臣充使詔慶則往攝圖恃強慶則責以往事攝圖不服其介長孫晟又説諭之攝圖及弟葉護皆拜受詔因稱臣朝貢請永為藩附初慶則出使帝敕曰我欲存立突厥彼送公馬但取五三匹攝圖見慶則贈馬千匹又以女妻之帝以慶則勳髙皆無所問授上柱國公食任城縣千户以彭城公廽授第二子義平陳後帝幸晉王第置酒羣臣髙熲等奉觴上壽帝曰髙熲平江南虞慶則降突厥可謂茂功矣楊素曰皆由至尊威德所被慶則曰楊素前出兵虎牢硤石若非至尊威德亦無尅理遂互相長短御史欲彈之帝曰今日計功為樂並不須劾帝觀羣臣宴射慶則進曰臣蒙賚酒令盡樂御史在側恐醉被彈帝賜御史酒遣之出慶則奉觴上壽極歡帝謂諸公曰飲此酒願我與公等子孫常如今日世守富貴九年轉為右衛大將軍尋改為右武候大將軍十七年嶺南人李世賢據州反議欲討之諸將二三請行皆不許帝顧謂慶則曰位居宰相爵為上公國家有賊遂無行意何也慶則拜謝恐懼帝乃遣焉為桂州道行軍總管以婦弟趙什柱為隨府長史什柱先與慶則愛妻通恐事彰乃宣言慶則不欲此行帝聞之先是朝臣出征帝皆宴别禮賜遣之慶則南討辭帝帝色不恱慶則由是怏怏不得志暨平世賢還臨桂鎮觀眺山川形勢曰此誠嶮固加以足糧若守得其人攻不可拔遂使什柱馳詣京奏事觀帝顔色什柱至京因告慶則謀反帝案驗之於是伏誅拜什柱為大將軍慶則子孝仁幼豪俠任氣拜儀同領晉王親信坐父事除名煬帝嗣位以藩邸之舊授候衛長史兼領金谷監監禁苑有巧思頗稱旨大業九年伐遼遷都水丞充使監運頗有功然性奢華以駱駝負函盛水養魚而自給後或告其為不軌遂見誅元胄河南洛陽人魏昭成帝之六代孫也祖順魏濮陽王父雄武陵王胄少英果多武藝美鬚眉有不可犯之色周齊王憲見而壯之引致左右數從征伐官至大將軍髙祖初被徴入將受顧託先呼胄次命陶澄並委以腹心恆宿臥內及髙祖作相胄每典軍在禁中又引弟威俱入侍衛周趙王招謀害髙祖髙祖不之知乃將酒肴詣其宅趙王引帝入寢室左右不得從唯楊𢎞與胄兄弟坐於戶側趙王令其二子進瓜因將刺髙祖及酒酣趙王欲生變以佩刀子刺瓜連啖髙祖將為不利胄進曰相府有事不可久留趙王呵之曰我與丞相言汝何為者叱之使却胄瞋目憤氣扣刀入衛趙王問其姓名胄以實對趙王曰汝非昔事齊王者乎誠壯士也因賜之酒曰吾豈有不善之意邪卿何猜警如是趙王偽吐將入後閣胄恐其為變扶令上座如此者再三趙王稱喉乾命胄就厨取飲胄不動會滕王逌後至髙祖降階迎之胄耳語勸髙祖速去帝猶不悟曰彼無兵馬復何能為胄曰兵馬悉他家物一先下手大事便去胄不辭死死何益邪復入座胄聞屋後有被甲聲遽請曰相府事殷公何得如此因扶髙祖下牀趣而去趙王將追髙祖胄以身蔽戶王不得出髙祖及門胄自後而至趙王恨不時發彈指出血及誅趙王賞賜不可勝計髙祖受禪封武陵郡公拜左衛將軍尋遷右衛大將軍髙祖從容曰保護朕躬成此基業元胄功也歷豫亳浙三州刺史時突厥屢為邉患朝廷以胄素有威名拜靈州總管北夷甚憚焉徴為右衛大將軍親顧益隆嘗正月十五日髙祖與近臣登髙時胄下直馳詔召之及見謂曰公與外人登髙未若就朕也賜宴極歡晉王廣每致禮焉房陵王之廢也胄預其謀髙祖正窮東宫事左衛大將軍元旻苦諫楊素乃譖之髙祖大怒執旻於仗胄時當下直不去因奏曰臣向不下直者為防元旻耳復以此言激怒髙祖髙祖遂誅旻蜀王秀之得罪胄坐交通除名煬帝即位不得調時慈州刺史上官政坐事徙嶺南將軍邱和亦以罪廢胄與和有舊因數從之遊酒酣謂和曰上官政誠壯士也今徙嶺表得無大事乎因自拊腹曰若是公者不徒然矣和明日奏之胄竟坐死於是徴政為驍騎將軍和代州刺史達奚長儒字富仁代人也祖俟魏定州刺史父慶驃騎大將軍儀同三司長儒少懷節操膽烈過人年十五襲爵樂安公周文引為親信以長儒質直恭朴授子都督纍遷撫軍將軍平蜀之役常為先鋒攻城野戰所當必破天和中除渭南郡守位驃騎大將軍開府儀同三司從武帝平齊遷上開府進爵成安郡公别封一子縣公宣政元年除左將軍勇猛中大夫後與烏丸軌圍陳將吳明徹於吕梁陳遣劉景率徑勇為聲援軌令長儒拒之長儒乃取車輪數百繫以大石沈之清水連轂相次以待之景船艦礙輪不得進長儒乃縱騎兵水陸俱進大破之獲明徹以功進大將軍尋授行軍總管北巡沙塞卒與虜遇大破之髙祖作相王謙舉兵於蜀沙氐楊永安扇動利興武文沙龍等六州以應謙詔長儒擊破之謙二子自京師逃歸其父長儒並捕斬之髙祖受禪進位上大將軍進封蘄春郡公開皇三年突厥沙鉢略可汗开弟葉護及藩那可汗寇掠西南詔以長儒為行軍總管擊之遇於周槃衆寡不敵軍中大懼長儒慷慨神色愈烈為虜所衝突散而復聚且戰且行轉鬬三日五兵咸盡士卒以拳歐之手皆見骨殺傷萬計虜氣稍奪於是解去長儒身被五瘡通中者二戰士死傷十八九突厥本欲大掠秦隴既逢長儒兵皆力戰虜意大沮明日於戰處焚尸慟哭而去髙祖下詔褒美授上柱國餘勳回授一子其戰亡將士皆贈官三轉子孫襲之歷寧酈二州刺史母憂去職長儒性至孝水漿不入口五日毁悴過禮殆將滅性天子嘉歎起為夏州總管胸奴憚之不敢窺塞以病免又除襄州總管轉蘭州帝遣涼州總管獨孤羅原州總管元褒靈州總管賀若誼等發卒備胡皆受長儒節度長儒率衆出祁連山北西至蒲類海無虜而還復轉荆州總管三十六州諸軍事帝謂之曰江陵要害國之南門今以委公朕無慮也歲餘卒官諡曰威子皓大業中位太僕少卿賀婁子幹字萬壽本代人也隨魏氏南遷世居關右祖道成魏侍中太子太傅父景賢右衛大將軍子幹少以驍武知名仕周纍遷少司水以勤勞封思安縣子大象中除秦州刺史進爵為伯及尉遲迥為亂子幹從韋孝寬討之遇賊圍懷州子幹與宇文述等擊破之髙祖大恱手書慰勉其後每戰先登及破鄴城與崔𢎞度逐迥至樓上進位上開府封武川縣公以忠安縣伯别封子皎開皇元年進爵巨鹿郡公其年吐谷渾寇涼州子幹以行軍總管從上柱國元諧擊之功最優詔褒美即令子幹鎮涼州其年突厥寇蘭州子幹拒之至可洛峐山與賊相遇賊衆甚盛子幹阻川為營賊軍不得水數日人馬甚弊縱擊大破之於是册授上大將軍徴授營新都副監尋拜工部尚書其年突厥復犯塞以行軍總管從竇榮定擊之子幹别路破賊髙祖嘉之遣優詔勞勉之子幹請入朝詔令馳驛奉見吐谷渾復寇邉命子幹討之入掠其國二旬而還髙祖以隴西頻被寇掠甚患之又彼俗不設村塢敕子幹勒人為堡營田積榖以備不虞子幹上書曰比見屯田之所獲少費多但隴右之人以畜牧為事若更屯聚彌不獲安但使鎮戍連接烽候相望人雖散居必無所慮帝從之帝以子幹習邉事授榆關總管遷雲州刺史甚為虜所憚後數年突厥雍虞閭遣使請降并獻羊馬詔以子幹為行軍總管出西北道應接之還拜雲州總管以突厥所獻馬百匹羊千口以賜之乃下書曰自公守北門風塵不警突厥所獻還以賜公母憂去職朝廷以榆關重鎮尋起視事卒官髙祖傷惜久之贈懷魏等四州刺史諡曰懷子善住嗣子幹兄詮亦有才器位銀青光祿大夫鄭純深等三州刺史北地太守東安郡公史萬歲京兆杜陵人也父靜周滄州刺史萬歲少英武善騎射趫捷若飛好讀兵書兼精占候年十五逢周齊戰於芒山萬歲從父在軍旗鼓正相望萬歲令左右趣裝急去俄而周兵大敗其父由是竒之及平齊之役其父戰沒萬歲以忠臣子拜開府儀同三司襲太平縣公尉遲迥之亂萬歲從梁士彥擊之軍次馮翊見羣鴈飛來萬歲謂士彥曰請射行中第三者既射之應弦而落三軍莫不恱服及與迥軍遇每戰先登鄴城之陳官軍稍却萬歲乃馳馬奮擊殺數十人衆亦齊力官軍復振迥平以功拜上大將軍開皇初大將軍爾朱績以謀反伏誅萬歲頗涉疑二坐除名配敦煌為戍卒其戍主甚驍武每單騎深入突厥中輒大尅獲突厥莫敢當其人頗自矜負數罵辱萬歲萬歲患之自言亦有武用戍主試令騎射笑曰小人定可萬歲因請弓馬復掠突厥中大得六畜而歸戍主始善之每與同行輒入突厥數百里名懾北夷竇榮定之擊突厥也萬歲詣轅門請自效榮定素聞其名見而大恱因使人謂突厥曰士卒何罪過令殺之但當各遣一壯士決勝負爾突厥許諾乃遣二騎挑戰榮定遣萬歲出應之萬歲馳斬其首而還突厥大驚引軍而去由是拜上儀同領車騎將軍平陳之役以功加上開府及髙智慧等作亂於江南萬歲以行軍總管從楊素擊之萬歲率衆二千自東陽别道而進踰嶺越海攻陷溪洞不可勝數前後七百餘戰轉鬬千餘里寂無聲問者十旬遠近皆以萬歲為沒萬歲以水陸阻絶信使不通乃置書竹筒中浮之於水汲者得之以言於素素大恱上其事髙祖嗟歎賜其家錢十萬還拜左領軍將軍先是南寧夷爨玩降拜昆州刺史既而復叛遂以萬歲為行軍總管擊之入蜻蛉川經弄凍次小勃弄大勃弄至于南中賊前後屯據要害萬歲皆擊破之行數百里見諸葛亮紀功碑銘其背曰萬歲之後勝我者過此萬歲令其左右倒其碑而進度西弭河入渠濫川行千餘里破其三十餘部諸夷大懼遣使請降獻明珠徑寸於是勒碑頌美隋德萬歲遣使馳奏請將爨玩入朝詔許之爨玩隂有二心不欲詣闕因賂萬歲以金寶萬歲於是捨爨玩而還蜀王時在益州知其受賂將索之萬歲聞之悉以所得金寶沈之於江索無所獲以功進柱國晉王廣甚欽敬之待以交友之禮上知為晉王所善令萬歲督晉王府軍事明年爨玩復反蜀王奏萬歲受賂縱賊致生邉患上令窮治之事皆驗罪當死上數之曰受金放賊重勞士馬卿豈社稷之臣也萬歲曰臣留爨玩者恐其州有變留以鎮撫臣還至瀘水詔書方到由是不將入朝實不受賂上以萬歲心有欺隱大怒顧有司曰必斬是萬歲懼而服罪頓首請命左僕射髙熲左衛大將軍元旻等進諫曰史萬歲雄略過人每行兵用師之處未嘗不身先士卒尤善撫御雖古名將未能過也上意稍解於是除名為民歲餘復官爵拜河州刺史復領行軍總管以備胡開皇末突厥達頭可汗犯塞上令晉王廣與楊素出靈武道漢王諒與萬歲出馬邑道萬歲率柱國張定和大將軍李藥王楊義臣等出塞至大斤山與虜遇達頭遣使問曰隋將為誰候騎報曰史萬歲也突厥復問曰得非敦煌戍卒乎候騎曰是也達頭懼而引去萬歲馳追百餘里乃及擊大破之逐北入磧數百里虜遁逃而還楊素害其功因譖萬歲云突厥本不寇於塞上畜牧耳遂寢其功萬歲數抗表陳狀上未之晤會上從仁夀宫初還京師廢皇太子窮東宫黨與上問萬歲所在萬歲實在朝堂楊素見上方怒因譖之曰謁東宫矣以激怒上上謂為信然令召萬歲時所將士卒在朝堂稱寃者數百人萬歲謂之曰我今日為汝極言於上既見上言將士有功為朝廷所抑詞氣憤厲忤上上大怒令左右㩧殺之既而悔之已不及矣因下詔數其罪狀萬歲死之日天下士庶聞者識與不識莫不寃惜之萬歲為將不治營伍令士卒各隨所安無警夜之備虜亦不敢犯臨陳對敵應變無方號為良將子懷義嗣劉方京兆長安人也性剛決有膽氣仕周承御上士以戰功拜上儀同髙祖為丞相方從韋孝寬破尉遲迥於相州以功加開府賜爵河隂縣侯髙祖受禪進爵為公開皇三年從衛王爽破突厥於白道進位大將軍後歷甘瓜二州刺史仁夀中交州俚人李佛子作亂據越王故城左僕射楊素言方有將略於是詔方為交州道行軍總管統二十七營而進法令嚴肅然仁而愛士長史度支侍郎敬德亮從軍至尹州疾甚不得進留之州館分别之際方哀其危篤流涕嗚咽感動行路論者多之稱為良將至都隆嶺遇賊方遣營主宋纂何貴嚴願等破之進兵臨佛子先令人諭以禍福佛子乃降送於京師其有桀黠恐為亂者皆斬之尋授歡州道行軍總管以尚書右丞李綱為司馬經略林邑方遣欽州刺史寧長真歡州刺史李暈上開府秦雄以步騎出越常方親率大將軍張遜司馬李綱舟師趣比景大業元年正月軍至海口林邑王梵志遣兵守險方擊走之師次闍黎江據南岸立柵方盛陳旗幟擊金鼓賊懼而潰既度江行三十里賊乘巨象四面而至方以弩射象象中瘡却蹂其陳賊奔柵因攻破之俘賊萬計於是濟區粟進至大緣江前後逢賊每戰必擒經馬援銅柱南行八日至其國都林邑王梵志棄城奔海獲其廟主金人汚其宫刻石紀功而還士卒腳腫死者十四五方在道遇患卒帝甚傷惜之下詔褒美贈上柱國盧國公子通仁嗣開皇中有馮昱王􅋆楊武通陳永貴房兆俱為邉將名顯當時昱􅋆並不知何許人昱多權略有武藝髙祖初為丞相以行軍總管與王誼李威等討平叛蠻拜柱國開皇初又以行軍總管屯乙弗泊備胡每戰常大尅捷􅋆驍勇善射每以行軍總管屯兵江北以禦陳為陳人所憚伐陳之役及髙智慧反攻討皆有殊績位柱國白水郡公武通𢎞農華隂人性果烈善騎射數以行軍總管討西南夷以功封白水郡公拜左武衛將時黨項羌屢為邉患朝廷以其有威名使鎮邉歷岷蘭二州總管復與周法尚討嘉州叛獠法尚軍初不利武通為賊斷歸路於是束馬懸車出賊不意頻戰破之賊知其孤軍無援傾部落而至武通轉鬬數百里為賊所拒四靣路絶武通輕騎挑戰墜馬為賊所執殺而噉之永貴隴右胡人夲姓白以勇烈為髙祖所親愛數以行軍總管領邉每戰必單騎陷陳位柱國蘭利二州總管封北陳郡公兆代人夲姓屋引氏剛毅有武略頻為行軍總管攻胡以功位至柱國徐州總管並史失其事杜彥雲中人也父遷葛榮之亂徙家於豳彥性勇決善騎射仕周以軍功纍遷隴州刺史賜爵永安縣伯髙祖為丞相從韋孝寬擊尉遲迥以功進位上開府改封襄武縣侯拜魏郡太守開皇初授丹州刺史進爵為公徴為左武衛將軍平陳之役以行軍總管與韓禽虎相繼而進及陳平賜物五千假粟六千石進位柱國賜子寶安爵昌陽縣公髙智慧等之作亂復以行軍總管從楊素討平之斬其渠帥賊李陀擁衆據彭山彥擊破之斬陀傳其首又擊徐州宜豐二洞悉平賜奴婢百餘口拜洪州總管有能名及雲州總管賀婁子幹卒上悼惜者久之因謂侍臣曰榆林國之重鎮安得子幹之輩乎後數日上曰莫過杜彥於是徴拜雲州總管北夷畏憚胡馬不敢至塞後朝廷追録前功賜子寶虔爵承縣公十八年遼東之役以行軍總管從漢王至營州上以彥曉習軍旅令總統五十營事及還拜朔州總管突厥寇雲州上令楊素擊走之猶恐為邉患復拜彥雲州總管以疾徴還卒子寶虔大業末至文城郡丞周搖字世安河南洛陽人也其先與魏同源初姓普乃及居洛陽改為周氏曾祖拔拔祖右六肱俱為北平王父恕延歷行臺僕射南荆州總管搖少剛毅有武藝性謹厚動遵法度仕魏位開府儀同三司周閔帝受禪賜姓車非氏封金水郡公歷鳯楚二州刺史吏民安之從平齊以戰功超授柱國進封夔國公未幾拜晉州總管時髙祖為定州總管文獻皇后自京師赴州路經搖所主禮甚薄既而白后曰公廨甚富於財限法不敢輒費又王臣無得效私其質直如此髙祖以其奉法每嘉之及為丞相徙封濟北郡公拜豫州總管髙祖受禪復姓周氏開皇初突厥寇邉燕薊多被其患前總管李崇為虜所殺上思所以鎮之曰無以加周搖拜為幽州總管六州五十鎮諸軍事搖修鄣塞謹斥候邉人安之徙夀襄二州總管俱有能名進上柱國以老乞骸骨上勞之曰公歷仕三代保兹遐夀良足善也賜坐褥歸第終於家諡曰恭獨孤楷字修則不知何許人也夲姓李氏父屯從齊神武與周文戰于沙苑神武敗績屯因為柱國獨孤信所禽配為仕伍給使信家漸得親近因賜姓獨孤氏楷少謹厚便弄馬槊為宇文護執刀數從征伐賜爵廣阿縣公拜右侍下大夫從韋孝寬平淮南以功賜子景雲爵西河縣公髙祖為丞相進開府領親信兵及受禪拜右監門將軍進封汝陽郡公仁夀初出為原州總管時蜀王秀鎮益州上徴之猶豫未發朝廷恐秀生變拜楷益州總管馳傳代之秀果有異志楷諷諭久之乃就路楷察秀有悔色因勒兵為備秀至興樂去益州四十餘里將反襲楷密使覘之知不可犯而止楷在益州甚有惠政蜀中父老于今稱之煬帝即位轉并州總管遇疾喪明上表乞骸骨帝曰公先朝舊臣臥以鎮之無勞躬親簿領也以其長子淩雲監省郡事其見重如此轉長平太守卒諡曰恭子淩雲平雲彥雲皆知名楷弟盛右屯衛將軍於江都死節列在忠義傳乞伏慧字令和馬邑鮮卑人也祖周魏銀青光祿大夫父纂金紫光祿大夫並為第一領人酋長慧少慷慨有大節便弓馬好鷹犬齊文襄時為行臺左丞纍遷太僕卿自永寧縣公封宜人郡王其兄貴和又以軍功為王一門二王稱為貴顯周武平齊授使持節開府儀同大將軍拜佽飛右旅下大夫轉熊渠中大夫從韋孝寬擊尉遲惇於武陟以功授大將軍及破尉遲迥進位柱國賜爵西河郡公請以官爵讓兄朝廷不許論者義之髙祖受禪拜曹州刺史曹土舊俗人多姦隱戶口簿帳恆不以實慧下車按察得戶口數萬遷涼州總管先是突厥屢為寇抄慧嚴警烽燧遠為斥候虜竟不入境後為荆州總管又領潭桂二州總管三十一州諸軍事其俗輕剽慧躬行朴素以矯之風化大洽曾見人以簺捕魚者出絹買而放之其仁心如此百姓美之號其處曰西河公簺煬帝即位為天水太守大業五年征吐谷渾郡濵西境人苦勞役又遇帝西巡坐御道不整獻食疏薄帝大怒命左右斬之見其無髮乃釋之除名卒于家張威不知何許人也父琛魏𢎞農太守威少倜儻有大志善騎射膂力過人仕周以軍功位柱國京兆尹封長夀縣公王謙作亂髙祖以威為行軍總管從梁睿擊之軍次通谷謙守將李三王拒守睿以威為先鋒三王閉壘不戰威令人激怒之三王果出陳威令壯士奮擊三王軍潰大兵繼進至開遠謙將趙儼衆十萬連營三十里威鑿山通道攻其背儼敗走追至成都及謙平進位上柱國廬州總管髙祖受禪拜幽洛二州總管改封晉平郡公尋拜河北道行臺僕射後督晉王軍府事遷青州總管在青州頗事産業遣家奴於人間鬻蘆蔔根其奴緣此侵擾百姓上深加譴責坐廢於家後從上祠泰山至洛陽上責讓之因問威所執笏安在威頓首曰臣負罪無顔復執謹藏於家上曰可持來威明日奉笏以見上曰公雖不遵法度功效實多今還公笏於是復拜洛州刺史後改封皖城郡公轉相州刺史卒子植大業中位至虎賁郎將和洪汝南人也勇烈過人仕周以軍功位車騎大將軍儀同三司時龍州蠻任公欣李國立等聚衆為亂刺史獨孤善不能禦朝議以洪有武略代善為刺史月餘斬公欣國立等皆平之後從武帝平齊位上儀同賜爵北平侯拜左勳曹下大夫柱國王軌之禽吳明徹也洪有功焉加位開府遷折衝中大夫尉遲迥作亂洪以行軍總管從韋孝寬擊之以功封廣武郡公時東夏初平物情尚梗髙祖以洪有威名令領冀州事甚得人和後拜泗州刺史屬突厥寇邉詔洪為北道行軍總管擊走之追虜至磧而還後遷徐州總管卒隂夀字羅雲武威人也父皓周夏州刺史夀少果烈有威幹性謹厚重然諾從周武帝平齊位開府髙祖為丞相引為掾尉遲迥作亂髙祖以韋孝寬為元帥擊之令夀監軍時孝寬有疾不能親總戎事每臥帳中遣婦人傳教命三軍紀綱皆決於夀以功進位上柱國尋拜幽州總管封趙國公先是有髙寶寧者齊氏之疏屬有籌算在齊久鎮黃龍及齊滅周武拜為營州刺史性桀黠甚得華夷心及髙祖作相遂連結契丹靺羯舉兵反帝以中原多故未遑進討諭之不下開皇初又引突厥攻圍北平至是令夀討之寶寧棄城奔于磧北黃龍諸縣悉平夀班師留開府成道昂鎮之夀患寶寧攻道昂乃重購之未行間寶寧果為其下所殺北邉遂安後卒官贈司空子世師嗣世師少有節槩性忠厚多武藝弱冠以功臣子纍加超擢拜儀同煬帝嗣位拜張掖太守深為戎狄所憚後拜樓煩太守遷左翊衛將軍與代王留守京師及唐師至世師自以世荷隋恩又藩邸之舊遂勒兵拒守月餘不下及城平與京兆郡丞骨儀等見誅骨儀天竺胡人性剛鯁有不可奪之志開皇初為侍御史處法平當不為勢利所回煬帝嗣位遷尚書左司郎于時朝政漸亂貨賄公行凡當樞要之職無問貴賤並家纍金寶天下士夫莫不變節而儀勵志守常介然獨立帝嘉其清苦超拜京兆郡丞公方彌著時刑部尚書衛元兼領京兆拜內史頗行詭道輒為儀所執正元雖不便之不能傷及唐兵至元恐禍及辭以老病儀與世師同心叶契父子並誅其後絶世師有子𢎞智等各以年幼獲全楊義臣代人也夲姓尉遲氏父崇仕周為儀同大將軍以兵鎮恆山時髙祖為定州總管崇知帝相貌非常每自結納帝甚親待之及為丞相尉遲迥作亂崇以宗族故自囚遣使請罪髙祖下書慰諭之即令馳驛入朝恆置左右開皇初封秦興公歲餘從行軍總管達奚長儒擊突厥於周槃力戰而死贈大將軍豫州刺史以義臣襲崇官爵時義臣尚幼養於宫中未弱冠奉詔宿衛如千牛者數年賞賜甚厚上嘗言及恩舊顧義臣嗟歎久之因下詔賜義臣姓楊氏編之屬籍為皇從孫未幾拜陕州刺史義臣性謹厚能騎射有將領才後突厥達頭可汗犯塞以行軍總管出白道大破之明年突厥又寇邉義臣擊之追至大斤山與虜遇時太平公史萬歲亦至與義臣合擊大破之萬歲為楊素所陷義臣功竟不録煬帝嗣位漢王諒反時代州總管李景被諒將喬鍾葵所圍義臣時為朔州總管奉詔救之鍾葵見義臣兵少悉衆拒之時鍾葵亞將王拔驍勇善用矟射者不能中每以數騎陷陳義臣患之募能當拔者有車騎將軍楊思恩請當之義臣見思恩氣貌雄勇顧之曰壯士也賜以巵酒思恩望見拔立於陳後投觴於地策馬赴之再往不尅所從騎士退思恩為拔所殺拔遂乘之義臣軍北者十餘里於是購得思恩尸義臣哭之甚慟三軍莫不下泣所從騎士皆腰斬義臣自以兵少悉取軍中牛驢得數千頭復令數百人人持一鼓潛驅之澗谷間出其不意義臣晡後復與鍾葵戰兵初合命驅牛驢者疾進一時鳴鼓埃塵張天鍾葵軍不知所以以為伏兵發因大潰縱擊破之以功進位上大將軍纍遷太僕卿從征吐谷渾令義臣屯琵琶峽連營八十里南接元夀北連假文振合圍吐谷渾主於覆袁川復從征遼東以軍將指肅慎道至鴨淥水與乙支文德戰每為先鋒一日七捷後與諸軍俱敗竟坐免俄而復位明年以為軍副與大將軍宇文述趣平壤至鴨淥水會楊元感作亂班師檢校趙郡太守祅賊向海公作亂寇扶風安定間義臣奉詔擊平之尋從帝復征遼東進位左光祿大夫時勃海髙士達清河張金稱並相聚為盜攻陷郡縣帝遣將軍假達討之不能尅詔義臣率遼東還兵擊之大破士達斬金稱又收降賊入豆子䴚討賊格謙禽之以狀聞奏帝惡其威名遽追入朝賊由是復盛義臣以功進位光祿大夫尋拜禮部尚書卒于官皇甫誕字元慮安定三水人也父璠周隨州刺史自有傳誕少剛毅有器局開皇中纍遷治書侍御史朝臣無不肅憚焉後為尚書左丞時漢王諒為并州總管朝廷盛選寮佐拜誕并州總管司馬總府政事一以咨之諒甚敬焉及煬帝即位諒用咨議王頍謀發兵作亂誕數諫止諒不納誕因流涕以死固請諒怒囚之及楊素將至諒屯清涼以拒之諒主簿豆盧育出誕於獄協謀閉城拒諒諒襲擊破之並抗節遇害帝以誕亡身殉國嘉悼者久之詔贈柱國封𢎞義公諡曰明子無逸嗣尋為淯陽太守甚有聲稱大業初令行舊爵例除以無逸誠義之後賜爵平輿侯入為刑部侍郎守右武衛將軍初漢王諒之反州縣莫不響應有嵐州司馬陶世模繁畤令敬釗並抗節不從世模京兆人性明敏有器幹仁夀初為嵐州司馬諒反刺史喬鍾葵將赴之世模以義拒之臨之以兵辭氣不撓鍾葵義而釋之軍吏請斬之於是被囚及諒平拜開府授大興令從衛元擊楊元感以功進位銀青光祿大夫釗字積善河東蒲坂人父元約周布憲中大夫釗仁夀中為繁畤令甚有能名漢王諒反師陷其城賊帥墨弼執送偽將喬鍾葵署為代州總管司馬釗正色拒之誓之以死會鍾葵敗釗遂免卒於朝邑令裴矩字𢎞大河東聞喜人也父訥之齊太子舍人矩襁褓而孤及長好學頗愛文藻有智數世父讓之謂曰觀汝神識足成才士欲求官達當資幹世之務矩由是始留情世事仕齊為髙平王文學齊亡不得調髙祖為定州總管補記室甚親敬之以母憂去職及帝作相遣使馳召之參相府記室事及受禪遷給事郎奏舍人事伐陳之役領元帥記室既破丹陽晉王廣令矩與髙熲收陳圖籍明年奉詔巡撫嶺南未行而髙智慧汪文進等作亂吳越道閉上難遣矩行矩請速進上許之行至南康得兵數千人時俚師王仲宣逼廣州遣其部將周師舉圍東衡州矩與大將軍鹿願赴之賊立九柵屯大庾嶺共為聲援矩進擊破之賊懼釋東衡州據原長嶺又擊敗之遂斬師舉進軍自南海拔廣州仲宣懼而潰散矩所綏集者二十餘州又承制署渠帥為刺史縣令及還上大悅命升殿勞苦之謂髙熲楊素曰韋洸將二萬兵不能早度嶺每患其兵少裴矩以三千弊卒徑至南海有臣若此朕亦何憂以功拜開府賜爵聞喜縣公賚物二千假除戶部侍郎遷內史侍郎時突厥強盛都藍可汗妻大義公主即宇文氏女由是數為邉患後因公主與從胡私通長孫晟先發其事矩請出使説都藍顯戮宇文氏上從之竟如其言公主見殺後都藍與突利可汗構難屢犯亭鄣詔太平公史萬歲為行軍總管出定襄道以矩為行軍長史破達頭可汗於塞外萬歲被誅功竟不録上以啓民可汗初附令矩撫慰之還為尚書左丞其年文獻皇后崩太常舊無儀注矩與牛𢎞李百藥等據齊禮參定轉吏部侍郎名為稱職煬帝即位營建東都矩職修府省九旬功就時西域諸蕃多至張掖與中國交市帝令矩掌其事矩知帝方勤遠略諸胡至者矩誘令言其國俗山川險易撰西域圖記三卷入朝奏之其序曰臣聞禹定九州導河不踰積石秦兼六國設防止於臨洮故知西胡雜種僻居遐裔禮教之所不及書典之所罕傳自漢氏興基開拓河右始稱名號者有四十六國其後分立乃五十五王仍置校尉都護以存招撫然叛服不恆屢經征戰後漢之世頻廢此官雖大宛以來略知戶數而諸國山川未有名目至如姓氏風土服章物産全無纂録世所弗聞復以春秋遞謝年代久遠兼并誅討互有興亡或地是故邦改從今號或人非舊類同襲昔名兼復部人交錯封疆移改戎狄音殊事難窮驗于闐之地蔥嶺以東考于前史三十餘國其後更相屠滅僅有十存自餘淪沒掃地俱盡空有邱墟不可記識皇上應天育物無隔華夷率土黔黎莫不慕化風化所及日入以來職貢皆通無遠不至臣既因撫納監知關市尋討書籍訪采胡人或有所疑即詳衆口依其夲國服飾儀刑王及庶人各顯容止即丹青模寫為西域圖記共成三卷合四十五國仍别造地圖窮其要害從西傾以去北海之南縱橫所亘將二萬里諒由富商大賈周遊經涉故諸國之事罔不遍知復有幽荒遠地卒訪難曉不可憑虛是以致闕而二漢相踵西域為傳户人數十即稱國王徒有名號有乖其實今者所編皆餘千戶利盡西海多産珍異見山居之屬非有國名及部落小者多亦不載發自敦煌至于西海凡為三道各有襟帶北道從伊吾經蒲類海鐵勒部突厥可汗庭度北流河水至拂菻國達于西海其中道從髙昌焉耆龜兹疏勒度蔥嶺又經鏺汗蘇勒沙那國康國曹國何國大小安國穆國至波斯達于西海其南道從鄯善于闐朱俱波渴槃陀度蔥嶺又經護密吐火羅挹怛忛延漕國至北婆羅門達于西海其三道諸國亦各自有路南北交通其東安國南婆羅門國等並隨其所往諸處得達故知伊吾髙昌鄯善並西域之門戶也總湊敦煌是其咽喉之地以國家威德將士驍雄泛濛汜而揚旌越崑崙而躍馬易如反掌何往不至但突厥吐谷渾分領羌胡之國為其擁遏故朝貢不通今並商人密送誠款引領翹首願為臣妾聖情含養澤及普天服而撫之務在安輯故皇華遣使弗勤兵車諸蕃既從突厥可滅混一戎夏其在兹乎不有所記無以表威化之遠也帝大恱賜物五百假每日引矩至御坐親問西方之事矩盛言胡中多諸寶物吐谷渾易可并吞帝由是甘心將通西域西夷經略咸以委之復遷黃門侍郎復令往張掖引致西蕃至者十餘國大業二年帝有事於恆嶽咸來助祭帝將巡河右復令矩往敦煌矩遣使説髙昌王麴伯雅及伊吾吐屯設等啖以厚利導之使入朝及帝西巡次燕支山髙昌王伊吾設等及西蕃胡二十七國謁於道左皆令佩金玉被錦罽焚香奏樂歌舞喧譟復令張掖武威士女盛飾縱觀填咽周亘數十里以示中國之盛帝見而大悅竟破吐谷渾拓地數千里並遣兵戍之每歲委輸巨億萬計諸蕃懼懾朝貢相續帝謂矩有綏懷略進位銀青光祿大夫其年冬帝幸東都矩以蠻夷朝貢者多諷帝令都下大戲徴四方奇技異藝陳於端門街衣錦綺珥金紫者以十萬數又勒百官及百姓士女列坐棚閣而縱觀焉皆被服鮮麗終月而罷又令交市店肆皆設帷帳盛酒食遣掌蕃率蠻夷與人貿易所至處悉令邀延就坐醉飽而散蠻夷嗟歎謂中國為神仙帝稱矩至誠謂宇文述牛𢎞曰裴矩凡所陳奏皆朕之成算朕未發矩輒以聞自非奉國孰能若是帝遣將軍薛世雄城伊吾令矩共往經略矩諷諭西域諸國曰天子為蕃人交易縣遠所以城耳咸以為然不復來競及還賜錢四十萬矩又白狀令反間射匱潛攻處羅後處羅為射匱所迫竟隨使者入朝帝大悅賜矩貂裘及西域珍器從帝巡塞北幸啓民帳時髙麗遣使先通于突厥啓民不敢隱引之見帝矩因奏曰髙麗夲孤竹國周代以之封箕子漢世分為三郡晉氏亦統遼東今乃不臣列為外域故先帝欲征之久矣但以楊諒不肖師出無功當陛下時安得不事使此冠帶之境仍為蠻貊之鄉乎今其使朝於突厥親見啓民合國從化必懼皇靈之遠暢慮後服之先亡脅令入朝當可致也帝曰如何矩曰請靣詔其使者放還夲國遣語其王令速朝覲不然者當率突厥即日誅之帝納焉髙元不用命始建征遼東之策王師臨遼以夲官領虎賁郎將明年復從至遼東兵部侍郎斛斯政亡入髙麗帝令矩兼掌兵事以前後從度遼功進位右光祿大夫時皇綱不振人皆變節左翊衛大將軍宇文述內史侍郎虞世基等用事文武多以貨賄唯矩守常無贓穢之響以是為世所稱後以楊元感初平帝令矩安集隴右因之會寧存問曷薩那部落遣闕達度設寇吐谷渾頻有虜獲部落致富還而奏狀帝大賞之後從至懷遠鎮詔護北蕃軍事矩以始畢可汗部衆漸盛獻策分其勢將以宗女嫁其弟叱吉設拜為南面可汗叱吉不敢受始畢聞而漸怨矩又曰突厥夲淳易可離間由其內多有羣胡盡皆桀黠教導之耳臣聞史蜀胡悉尤多姦計幸於始畢請誘殺之帝曰善矩因遣人告胡悉曰天子大出珍物今在馬邑欲共蕃內多作交關若前來者即得好物胡悉信之不告始畢率其部落盡驅六畜爭進冀先互市矩伏兵馬邑誘而斬之詔報始畢曰史蜀胡悉忽領部落走來至此云背可汗請我容納今已斬之故令往報始畢亦知其狀由是不朝十一年帝北巡狩始畢率騎數十萬圍帝於鴈門詔矩與虞世基宿朝堂以待顧問及圍解從至東京屬射匱可汗遣其猶子率西蕃諸胡朝貢詔矩宴接之尋從幸江都宫時四方盜賊蜂起郡縣上奏者不可勝計矩言之帝怒遣矩詣京師接諸蕃客以疾不行及唐兵入關帝遣虞世基就宅問矩方略矩曰太原有變京畿不靜遙為處分恐失事機唯願鑾輿早還俄而驍衛大將軍屈突通敗問至矩以聞帝失色矩素勤謹未嘗忤物又見天下方亂恐為身禍其待遇人多過其所望故雖厮役皆得其歡心時從駕驍果數有逃散帝憂之以問矩矩曰今車駕留此已經二年驍果之徒盡無家口人無匹合則不能安臣請聼兵士於此納室帝大喜曰公定多智此奇計也因令矩檢校為將士等娶妻矩召江都境內寡婦及未嫁婦女皆集宫監又召諸將帥及兵等恣其所取因聼自首先有姦通婦女及尼女官等並即配之由是驍果等悅咸相謂曰裴公之惠也宇文化及反矩晨起朝至坊門遇逆黨數人控矩馬詣孟景所賊皆曰不關裴黃門既而化及從百餘騎至矩迎拜化及慰諭之令矩參定儀注推秦王子浩為帝以矩為侍內隨化及至河北化及僭帝號以矩為尚書右僕射加光祿大夫封蔡國公為河北道宣撫大使及宇文氏敗為竇建德所獲以矩隋代舊臣遇之甚厚復以為吏部尚書轉尚書右僕射建德起自羣盜未有節文矩為之制定朝儀旬月之間憲章頗擬於王者建德大悅及建德敗時矩與其將曹旦等於洛州留守旦長史李公淹及唐使人魏徴等説旦及齊善行令矩歸順旦等從之乃令矩與徵公淹領旦及八璽舉山東之地歸降授左庶子轉詹事戶部尚書卒裴仁基字德夲河東人也祖伯鳳周汾州刺史父定上儀同仁基少驍武便弓馬平陳之役以親衛從征先登陷陳拜儀同賜物千假以夲官領漢王諒府親信諒反仁基苦諫見囚諒敗超拜護軍後改授虎賁郎將從將軍李景討叛蠻向思多於黔安以功進銀青光祿大夫擊破吐谷渾加授金紫光祿大夫斬獲冦掠靺鞨拜左光祿大夫從征髙麗進位光祿大夫李密據洛口帝令仁基為河南道討捕大使據虎牢拒密仁基見強冦在前士卒勞弊所得軍資即用分賞監軍御史蕭懷靜止之衆咸怒懷靜懷靜又隂持仁基長短欲有奏劾仁基懼殺懷靜以其衆歸密密以為河東郡公其子行儼驍勇善戰密復以為綘郡公甚相委昵王世充以河東食盡悉衆詣偃師求決戰密與諸將計仁基曰世充盡鋭而至洛下必虛可分兵守其要路令不得東簡精兵三萬傍河西出以逼東都世充却還我且案甲世充重出我又逼之如此則我有餘力彼勞奔命兵法所謂彼出我歸彼歸我出數戰以疲之多方以誤之者也密曰公知其一不知其二東都兵馬有三不可當器械精一也決計而來二也食盡求鬬三也我按兵畜力以觀其弊彼求鬬不得欲走無路不過十日世充之首可懸於麾下單雄信等諸將輕世充皆請戰仁基苦爭不得密難違諸將言戰遂大敗仁基為世充所虜世充以仁基父子並驍勇深禮之以兄女妻行儼及僭尊號署仁基為禮部尚書行儼為右衛大將軍行儼每戰所當皆披靡號萬人敵世充憚其威名頗加猜防仁基知之甚不自安遂與世充所署尚書左丞宇文儒童尚食直長陳謙祕書丞崔德夲等謀令陳謙於上食之際持匕首劫世充行儼以兵應之事定然後輔越王侗事臨發將軍張童告之俱為世充所殺斛斯政廣牧富昌人也祖椿魏太傅父恢散騎常侍新蔡郡公政明悟有器幹開皇中以軍功授儀同甚為楊素所禮大業中位尚書兵曹郎漸見委遇元感兄弟俱與之交遼東之役兵部尚書假文振卒侍郎明雅復以罪廢帝彌屬意於政尋遷兵部侍郎稱為幹理元感之反政與通謀及元縱等亡歸亦政之計及帝窮元縱黨與政亡奔髙麗明年帝復東征髙麗請和遂送政鎖至京師以告廟左翊衛大將軍宇文述請變常法行刑帝許之以政出金光門縛之於柱公卿百寮並親擊射臠其肉多有噉者然後烹焚揚其骨灰通志卷一百六十一
