body:
  text: 通志卷七十八下宋右迪功郎鄭樵漁仲撰宗室傳第一下前漢文三王梁孝王武代孝王參梁懷王揖共王買平王襄景十三王河間獻王德臨江哀王閼臨江閔王榮魯共王餘江都易王非膠西于王端趙敬肅王彭祖中山靖王勝長沙定王發廣川惠王越膠東康王寄清河哀王乘常山憲王舜泗水忠王商武五子戾太子據齊懷王閎燕刺王旦廣陵厲王胥昌邑哀王髆賀宣元六王淮陽憲王欽楚孝王嚻東平思王宇中山哀王竟定陶恭王康中山孝王興文三王孝文皇帝四男竇皇后生孝景帝梁孝王武諸姬生代孝王參梁懷王揖梁孝王武以孝文二年與太原王參梁王揖同日立武為代王四年徙為淮陽王十二年徙梁自初王通歷已十一年矣孝王十四年入朝十七年十八年比年入朝留其明年乃之國二十一年入朝二十二年文帝崩二十四年入朝二十五年復入朝是時上未置太子與孝王宴飲從容言曰千秋萬歲後傳於王王辭謝雖知非至言然心內喜太后亦然其春吳楚齊趙七國反先擊梁棘壁殺數萬人梁王城守睢陽而使韓安國張羽等為將軍以距吳楚吳楚以梁為限不敢過而西與太尉亞夫等相距三月吳楚破而梁所殺虜略與漢中分明年漢立太子梁最親有功又為大國居天下膏腴地北界泰山西至髙陽四十餘城多大縣孝王太后少子愛之賞賜不可勝道於是孝王築東苑方三百餘里廣睢陽城七十里大治宫室為復道自宫連屬於平臺三十餘里得賜天子旌旗從千乘萬騎出稱警入言蹕擬於天子招延四方豪桀自山以東遊士莫不至齊人羊勝公孫詭鄒陽之屬公孫詭多竒邪計初見日王賜千金官至中尉號曰公孫將軍多作兵器弩弓數千萬而府庫金錢且百巨萬珠玉寶器多於京師二十九年十月孝王入朝景帝使使持乘輿駟迎梁王於闕下既朝上疏因留以太后故入則侍帝同輦出則同車逰獵上林中梁之侍中郎謁者著引籍出入天子殿門與漢宦官亡異十一月上廢栗太子太后心欲以梁王為嗣大臣及袁盎等有所關説於帝太后議格孝王不敢復言太后以嗣事事祕世莫知乃辭歸國其夏上立膠東王為太子梁王怨袁盎及議臣乃與羊勝公孫詭之屬謀陰使人刺殺盎及他議臣十餘人賊未得也於是天子意梁逐賊果梁使之遣使冠蓋相望於道覆案梁事捕公孫詭羊勝皆匿王後宫使者責二千石急梁相軒邱豹及內史安國皆泣諫王王乃令勝詭皆自殺出之上由此怨望於梁王王恐乃使韓安國因長公主謝罪太后然後得釋上怒稍解因上書請朝既至關茅蘭説王使乘布車從兩騎入匿於長公主園漢使迎王王已入關車騎盡居外外不知王處太后泣曰帝殺吾子帝憂恐於是梁王伏斧質之闕下謝罪然後太后帝皆大喜相與泣復如故悉召王從官入關然帝益疏王不與同車輦矣三十五年冬復入朝上疏欲留上不許歸國意忽忽不樂北獵梁山有獻牛足出背上孝王惡之六月中病熱六日薨孝王慈孝每聞太后病口不能食常欲留長安侍太后太后亦愛之及聞孝王死竇太后泣極哀不食曰帝果殺吾子帝哀懼不知所為與長公主計之乃分梁為五國盡立孝王男五人為王女五人皆令食湯沐邑奏之太后太后乃説為帝一餐孝王未死時財以巨萬計不可勝數及死藏府餘黃金尚四十餘萬斤他財物稱是代孝王參初立為太原王四年代王武徙為淮陽王而參徙為代王復并得太原都晉陽如故五年一朝凡三朝十七年薨子共王登嗣二十九年薨子義嗣元鼎中漢廣關以常山為阻徙代王於清河是為剛王并前在代凡立四十年薨子頃王湯嗣二十四年薨子年嗣地節中冀州刺史林奏年為太子時與女弟則私通及年立為王後則懷年子其壻使勿舉則曰自來殺之壻怒曰為王生子自令王家養之則送兒頃太后所相聞知禁止則令不得入宫年使從季父往來送迎則連年不絶有司奏年淫亂年坐廢為庶人徙房陵與湯沐邑百户立三年國除元始二年新都侯王莽興滅繼絶白太皇太后立年弟子如意為廣宗王奉代孝王後莽篡位國絶梁懷王揖文帝少子也好詩書帝愛之異於他子五年一朝凡再入朝因墮馬死立十年薨無子國除明年梁孝王武徙王梁梁孝王子五人為王太子買為梁共王次子明為濟川王彭離為濟東王定為山陽王不識為濟陰王皆以孝景中六年同日立梁共王買立十七年薨子平王襄嗣濟川王明以垣邑侯立七年坐射殺其中尉有司請誅武帝弗忍廢為庶人遷房陵國除濟東王彭離立二十九年彭離驕悍昏暮私與其奴亡命少年數十人行剽殺人取財物以為好所殺發覺者百餘人國皆知之莫敢夜行所殺者子上書告言有司請誅武帝弗忍廢為庶人徙上庸國除為大河郡山陽哀王定立九年薨亡子國除濟陰哀王不識立一年薨亡子國除孝王支子四王皆絶於身梁平王襄母曰陳太后共王母曰李太后李太后親平王之大也而平王之后曰任后任后甚有寵於襄初孝王有尊直千金戒後世善寶之毋得以與人任后聞而欲得之李太后曰先王有命毋得以尊與人他物雖百巨萬猶自恣任后絶欲得之王襄直使人開府取尊賜任后又王及母陳太后事李太后多不順有漢使者來李太后欲自言王使謁者中郎胡等遮止閉門李太后與爭門措指太后啼呼不得見漢使者李太后亦私與食官長及郎尹霸等姦亂王與任后以此使人風止李太后李太后亦已後病薨病時任后未嘗請疾薨又不侍喪元朔中睢陽人犴反人辱其父而與睢陽太守客俱出同車犴反殺其仇車上亡去睢陽太守怒以讓梁二千石二千石以下求反急執反親戚反知國陰事乃上變告梁王與大母爭尊狀時相以下具知之欲以傷梁長史書聞天子下吏驗問有之公卿治奏以為不孝請誅王及太后天子曰首惡失道任后也朕置相吏不逮無以輔王故陷不誼不忍致法削梁王五縣奪王太后湯沐成陽邑梟任后首于市中郎胡等皆伏誅梁餘尚有八城襄立四十年薨子頃王無傷嗣十一年薨子敬王定國嗣四十年薨子夷王遂嗣六年薨子荒王嘉嗣十五年薨子立嗣鴻嘉中太傳輔奏立一日至十一犯法臣下愁苦莫敢親近不可諫止願令王非耕祠法駕毋得出宫書出馬置外苑收兵仗藏私府毋得以金錢財物假賜人事下丞相御史請許奏可後數復毆傷郎夜私出宫傅相連奏坐削或千户或百户如是者數焉荒王女弟園子為立舅任寶妻寶兄子昭為立后數過寶飲食報寶曰我好翁主欲得之寶曰翁主姑也法重立曰何能為遂與園子姦積數歲永始中相禹奏立對外家怨望有惡言有司案驗因發淫亂事奏立禽獸行請誅太中大夫谷永上疏曰臣聞禮天子外屏不欲見外也是故帝王之意不窺人閨門之私聼聞中冓之言春秋為親者諱詩云戚戚兄弟莫逺具爾今梁王年少頗有狂病始以惡言案驗既亡事實而發閨門之私非夲章所指王辭又不服猥強劾立傳致難明之事獨以偏辭成罪斷獄亡益於治道汙衊宗室以內亂之惡披布宣揚於天下非所以為公族隱諱增朝廷之榮華昭聖德之風化也臣愚以為王少而父同産長年齒不倫梁國之富足以厚聘美女招致妖麗父同産亦有耻辱之心案事者乃驗問惡言何故猥自發舒以三者揆之殆非人情疑有所逼切過誤失言文吏躡尋不得轉移萌芽之時加恩勿治上也既已案驗舉憲宜及王辭不服詔廷尉選上德通理之吏更審考清問著不然之效定失誤之法而反命於下吏以廣公族疏附之德為宗室刷汙亂之耻甚得治親之誼天子由是寢而不治居數歲元延中立復以公事怨相掾及睢陽丞使奴殺之殺奴以滅口凡殺三人傷五人手驅郎吏二十餘人上書不拜奏謀篡死罪囚有司請誅上不忍削立五縣哀帝建平中立復殺人天子遣廷尉賞大鴻臚由持節即訊至移書傅相中尉曰王背䇿戒悖暴妄行連犯大辟毒流吏民比比蒙恩不伏重誅不思改過復賊殺人幸得蒙恩丞相長史大鴻臚丞即問王陽病抵讕置辭驕嫚不首主令與背畔亡異丞相御史請收王璽綬送陳留獄明詔加恩復遣廷尉大鴻臚雜問今王當受詔置辭恐復不首實對書曰至于再三有不用我降爾命傅相中尉皆以輔正為職虎兕出於匣龜玉毁於櫝中是誰之過也書到明以誼曉王敢復懷詐罪過益深傅相以下不能輔導有正法於是立惶恐免冠對曰立少失父母孤弱處深宫中獨與宦者婢妾居漸漬小國之俗加以質性下愚傅相亦不純以仁誼相輔翼大臣皆尚苛刻刺求微密讒臣在其間左右弄口積使上下不和更相眄伺宫殿之裏毛氂過失亡不暴陳當伏重誅以視海內數蒙聖恩得見貰赦今立自知賊殺中郎曹將冬月迫促貪生畏死即詐僵仆陽病徼幸得踰於須臾謹以實對伏須重誅時冬月盡其春大赦不治元始中立坐與平帝外家中山衛氏交通新都侯王莽奏廢立為庶人徙漢中立自殺二十七年國除後二歲莽白太皇太后立孝王元孫之曾孫沛郡卒史音為梁王奉孝王後莽篡國絶景十三王孝景皇帝十四男王皇后生孝武帝栗姬生臨江閔王榮河間獻王德臨江哀王閼程姬生魯共王餘江都易王非膠西于王端賈夫人生趙敬肅王彭祖中山靖王勝唐姬生長沙定王發王夫人生廣川惠王越膠東康王寄清河哀王乘常山憲王舜河間獻王德以孝景前二年立修學好古實事求是從民得善書必為好寫與之留其真加金帛賜以招之繇是四方道術之人不逺千里或有先祖舊書多奉以奏獻王者故得書多與漢朝等是時淮南王安亦好書所招致率多浮辨獻王所得書皆古文先秦舊書周官尚書禮禮記孟子老子之屬皆經傳説記七十子之徒所論其學舉六藝立毛氏詩左氏春秋博士修禮樂被服儒術造次必於儒者山東諸儒多從而逰武帝時來朝獻雅樂對三雍宫辟雍明堂靈臺及詔䇿所問三十餘事其對推道術而言得事之中文約指明立二十六年薨中尉常麗以聞曰王身端行治溫仁恭儉篤敬愛下明知深察惠於鰥寡太行令奏諡法曰聰明睿知曰獻宜諡曰獻王子共王不害嗣四年薨子剛王堪嗣十二年薨子頃王授嗣十七年薨子孝王慶嗣四十三年薨子元嗣元取故廣陵厲王厲王太子及中山懷王故姬亷等以為姬甘露中冀州刺史敞奏元事下廷尉逮召亷等元迫脅凡七人令自殺有司奏請誅元有詔削二縣萬一千戶後元怒少史留貴貴踰垣出欲告元元使人殺其母有司奏廢勿王處漢中房陵居數年坐與妻若共乘朱輪車怒若又笞擊令自髠漢中太守請治元病死立十七年國除絶五歲成帝建始元年復立元弟上郡庫令良是為河間惠王良修獻王之行母太后薨服喪如禮哀帝下詔褒揚益封萬户二十七年薨子尚嗣王莽時絶臨江哀王閼以孝景前二年立三年薨無子國除為郡臨江閔王榮以孝景前四年為皇太子四歲廢為臨江王三歲坐侵廟壖地為宫上徴榮榮行祖於江陵北門既上車軸折車廢江陵父老流涕竊言曰吾王不反矣榮至詣中尉府對簿中尉郅都簿責訊王王恐自殺葬藍田燕數萬銜土置冢上百姓憐之榮最長亡子國除地入於漢為南郡魯恭王餘以孝景前二年立為淮陽王吳楚反破後以孝景前三年徙王魯好治宫室苑囿狗馬季年好音不喜辭為人口吃難言二十八年薨子安王光嗣初好音樂輿馬晚節遴唯恐不足於財四十年薨子孝王慶忌嗣三十七年薨子頃王徑嗣二十八年薨子文王睃嗣十八年薨亡子國除哀帝建平三年復立頃王子睃弟郚音魚縣名也屬東海郡鄉侯閔為王王莽時絶恭王初好治宫室壞孔子舊宅以廣其居聞鐘磬琴瑟之聲遂不敢復壞於其壁中得古文經傳江都易王非以孝景前二年立為汝南王吳楚反時非年十五有材氣上書自請擊吳景帝賜非將軍印擊吳吳已破徙王江都治故吳國以軍功賜天子旗元光中胸奴大入漢邉非上書願擊胸奴上不許非好氣力治宫館招四方豪傑驕奢甚二十七年薨子建嗣建為太子時邯鄲人梁蚡持女欲獻之易王建聞其美私呼之因留不出蚡宣言曰子乃與其公爭妻建使人殺蚡蚡家上書下廷尉考會赦不治易王薨未葬建居服舍召易王所愛美人淖姬等凡十人與姦建女弟徴臣為蓋侯子婦以易王喪來歸建復與姦建異母弟定國為淮陽侯易王最少子也其母幸立之具知建事行錢使男子荼荼食邪反恬上書告建淫亂不當為後事下廷尉廷尉治恬受人錢財為上書論棄市建罪不治後數使使至長安迎徴臣魯恭王太后聞之遺徴臣書曰國中口語籍籍慎無復至江都後建使謁者吉請問恭太后太后泣謂吉歸以吾言謂而王王前事漫漫今當自慎獨不聞燕齊事乎言吾為而王泣也吉歸致恭太后語建大怒擊吉斥之建遊章臺宫令四女子乘小船建以足蹈覆其船四人皆溺二人死後遊雷波天大風建使郎二人乘小船入波中船覆兩郎溺攀船乍見乍沒建臨觀大笑令皆死宫人姬八子有過者輒令裸立擊鼓或置樹上久者三十日乃得衣或髠鉗以鉛杵舂不中程輒掠或縱狼令齧殺之建觀而大笑或閉不食令餓死凡殺不辜三十五人建欲令人與禽獸交而生子強令宫人裸而四據與羝羊及狗交專為淫虐自知罪多國中多欲告言者建恐誅心內不安與其后成光共使越婢下神祝詛上與郎中令等語怨望建亦頗聞淮南衡山陰謀恐一日發為所并遂作兵器號王后父胡應為將軍中大夫疾有材力善騎射號曰靈武君作治黃屋蓋刻皇帝璽鑄將軍都尉金銀印作漢使節二十綬千餘具置軍官品貟及拜爵封侯之賞具天下之輿地及軍陳圖遣人通越繇王閩侯遺以錦帛竒珍繇王閩侯亦遺建荃葛珠璣犀甲翠羽猿熊竒獸數通使往來約有急相助及淮南事發治黨與頗連及建建使人多推金錢絶其獄後復謂近臣曰我為王詔獄歲至生又無歡怡日壯士不坐死欲為人所不能為耳建時佩其父所賜將軍印載天子旗出積數歲事發覺漢遣丞相長史與江都相雜案索得兵器璽綬節反具有司請捕誅建制曰與列侯吏二千石博士議議皆曰建失臣子道積久輒蒙不忍遂謀反逆所行無道雖桀紂惡不至於此天誅所不赦當以謀反法誅有詔宗正廷尉即問建建自殺后成光等皆棄市建立六年國除地入於漢為廣陵郡絶百二十一年平帝時新都侯王莽秉政興滅繼絶立建弟盱眙侯子宫為廣陵王奉易王後莽篡國絶膠西于王端孝景前三年立為人賊盩又陰痿一近婦人病數月有所愛幸少年以為郎郎與後宫亂端禽滅之及殺其子母數犯法漢公卿數請誅端天子弗忍而端所為滋甚有司比再請削其國去大半端心慍遂為無訾省府庫壞漏盡腐財物以巨萬計終不得收徙令吏毋得收租賦端皆去衛封其宫門從一門出入數變名姓為布衣之他國相二千石至者奉漢法以治端輒求其罪告之亡罪者詐藥殺之所以設詐究變強足以距諫知足以飾非相二千石從王治則漢繩以法故膠西小國而所殺傷二千石甚衆立四十七年薨亡子國除地入於漢為膠西郡趙敬肅王彭祖以孝景前二年立為廣川王趙王遂反破後徙王趙彭祖為人巧佞卑諂足恭而心刻深好法律持詭辨以中人多內寵姬及子孫相二千石欲奉漢法以治則害於王家是以每相二千石至彭祖衣帛布單衣自行迎除舍多設疑事以詐動之得二千石失言中忌諱輒書之二千石欲治者則以此迫劫不聼乃上書告之及汙以姦利事彭祖立六十餘年相二千石無能滿二歲輒以罪去大者死小者刑以故二千石莫敢治而趙王擅權使使即縣為賈人𣙜會入多於國租稅以是趙王家多金錢然所賜姬諸子亦盡之矣彭祖不好治宫室禨祥好為吏上書願督國中盜賊常夜從走卒行徼邯鄲中諸使過客以彭祖險陂莫敢留邯鄲久之太子丹與其女及同産姊姦江充告丹淫亂又使人椎埋攻剽為姦甚衆武帝遣使者發吏卒捕丹下魏郡詔獄治罪至死彭祖上書寃訟丹願從國中勇敢擊胸奴贖丹罪上不許久之竟赦出後彭祖入朝因帝姊平陽隆慮公主求復立丹為太子上不許彭祖取江都易王寵姬王建所姦淖姬者甚愛幸之生一男號淖子彭祖以征和元年薨諡敬肅王彭祖薨時淖姬兄為漢宦者上召問淖子何如對曰為人多欲上曰多欲不宜君國子民問武始侯昌曰無咎無譽上曰如是可矣遣使者立昌是為頃王十九年薨子懷王尊嗣五年薨亡子絶二歲宣帝立尊弟髙是為哀王數月薨子共王充嗣五十六年薨子隱嗣王莽時絶初武帝復以親親故立敬肅王小子偃為平干王是為頃王十一年薨子繆王元嗣二十五年薨大鴻臚禹奏元前以刃賊殺奴婢子男殺謁者為刺史所舉奏罪名明白病先令令能為樂奴婢從死迫脅自殺者凡十六人暴虐不道故春秋之義誅君之子不宜立元雖未伏誅不宜立嗣奏可國除中山靖王勝以孝景前三年立武帝初即位大臣懲吳楚七國行事議者多寃鼂錯䇿皆以諸侯連城數十太強欲稍侵削數奏暴其過惡諸侯王自以骨肉至親先帝所以廣封連城犬牙相錯者為盤石宗也今或無罪為臣下所侵辱有司吹毛求疵笞服其臣使證其君多自以侵寃建元三年代王登長沙王發中山王勝濟川王眀來朝天子置酒勝聞樂聲而泣問其故勝對曰臣聞悲者不可為絫欷思者不可為歎息故高漸離擊築易水之上荆軻為之低而不食雍門子一微吟孟嘗君為之於邑今臣心結日久每聞幼眇之聲不知涕泣之橫集也夫衆喣漂山聚蚊成雷朋黨執虎十夫撓椎是以文王拘於牖里孔子厄於陳蔡此乃蒸庶之成風增積之生害也臣身逺與寡莫為之先衆口鑠金積毁銷骨叢輕折軸羽翮飛肉紛驚逢羅澘然出涕臣聞白日曬光幽隱皆照明月曜夜蚊虻宵見然雲蒸列布杳冥晝昏塵埃抪音鋪布散也覆昧不見泰山何則物有蔽之也今臣雍閼不得聞讒言之徒蜂生道遼路逺曾莫為臣聞臣竊自悲也臣聞社鼷不灌屋鼠不熏何則所託者然也臣雖薄也得蒙肺附位雖卑也得為東藩屬又稱兄今羣臣非有葭莩之親鴻毛之重羣居黨議朋友相為使夫宗室擯郤骨肉氷釋斯伯竒所以流離比干所以橫分也詩云我心憂傷惄焉如搗假寐永歎惟憂用老心之憂矣疢如疾首臣之謂也具以吏所侵聞於是上乃厚諸侯之禮省有司所奏諸侯事加親親之恩焉其後更用主父偃謀令諸侯以私恩自裂地分其子弟而漢為定制封號輒别屬漢郡漢有厚恩而諸侯地稍自分析弱小云勝樂酒好內有子百二十餘人常與趙王彭祖相非曰兄為王專代吏治事王者當日聼音樂御聲色趙王亦曰中山王但奢淫不佐天子拊循百姓何以稱為藩臣四十三年薨子哀王昌嗣一年薨子康王昆侈嗣二十一年薨子頃王輔嗣四年薨子憲王福嗣十七年薨子懷王循嗣十五年薨無子絶四十五歲成帝鴻嘉二年復立憲王弟利鄉侯子雲客是為廣德夷王三年薨無子絶十四歲哀帝復立雲客弟廣漢為廣平王薨無後平帝元始二年復立廣川惠王曾孫倫為廣德王奉靖王後王莽時絶長沙定王發母唐姬故程姬侍者景帝召程姬程姬有所避不願進而飾侍者唐兒使夜進上醉不知以為程姬而幸之遂有身已乃覺非程姬也及生子因名曰發以孝景前二年立以其母微無寵故王卑溼貧國二十八年薨子戴王庸嗣二十七年薨子頃王鮒鮈嗣十七年薨子刺王建德嗣宣帝時坐獵縱火燔民九十六家殺二人又以縣官事怨內史教人誣告以棄市罪削八縣罷中尉官三十四年薨子煬王旦嗣二年薨無子絶歲餘元帝初元三年復立旦弟宗是為孝王五年薨子魯人嗣王莽時絶廣川惠王越以孝景中二年立十三年薨子繆王齊嗣四十四年薨初齊有幸臣乘距已而有罪欲誅距距亡齊因禽其宗族距怨王乃上書告齊與同産姦是後齊數告言漢公卿及幸臣所忠等又告中尉蔡彭祖捕子明罵曰吾盡汝種矣案驗不如王言劾齊誣罔大不敬請繫治齊恐上書願與廣川勇士奮擊胸奴上許之未發病薨有司請除國奏可後數月下詔曰廣川惠王於朕為兄朕不忍絶其宗廟其以惠王孫去為廣川王去即繆王齊太子也師受易論語孝經皆通好文辭方技博奕倡優其殿門有成慶畫短衣大袴長劍去好之作七尺五寸劍被服皆效焉有幸姬王昭平王地餘許以為后去嘗疾姬陽成昭信侍視甚謹更愛之去與地餘戲得褎中刀笞問狀服欲與昭平共殺昭信笞問昭平不服以鐡針針之強服乃會諸姬去以劍自擊地餘令昭信擊昭平皆死昭信曰兩姬婢且泄口復絞殺從婢三人後昭信病夢見昭平等以狀告去去曰虜乃復見畏我獨可燔燒耳掘出尸皆燒為灰後去立昭信為后幸姬陶望卿為修靡夫人主繒帛崔修成為明貞夫人主永巷昭信復譖望卿曰與我無禮衣服常鮮於我盡取善繒丐諸宫人去曰若數惡望卿不能減我愛設聞其淫我亨之矣後昭信謂去曰前畫工畫望卿舍望卿袒裼傅粉其傍又數出入南户窺郎吏疑有姦去曰善司之以故益不愛望卿後與昭信等飲諸姬皆侍去為望卿作歌曰背尊章嫖以忽謀屈竒起自絶行周流自生患諒非望今誰怨使美人相和歌之去曰是中當有自知者昭信知去已怒即誣言望卿歷指郎吏卧處具知其主名又言郎中令錦被疑有姦去即與昭信從諸姬至望卿所裸其身更擊之令諸姬各持燒鐡共灼望卿望卿走自投井死昭信出之椽杙其陰中割其鼻脣斷其舌謂去曰前殺昭平反來畏我今欲靡爛望卿使不能神與去共支解置大鑊中取桃灰毒藥并煮之召諸姬皆臨觀連日夜靡盡復共殺其女弟都後去數召姬榮愛與飲昭信復譖之曰榮姬視瞻意態不善疑有私時愛為去刺方領繡去取燒之愛恐自投井出之未死笞問愛自誣與醫姦去縛繫柱燒刀灼潰兩目生割兩股銷鉛灌其口中愛死支解以棘埋之諸幸於去者昭信輒譖殺之凡十四人皆埋太后所居長夀宫中宫人畏之莫敢復忤昭信欲擅愛曰王使明貞夫人主諸姬淫亂難禁請閉諸姬舍門無令出敖使其大婢為僕射主永巷盡封閉諸舍上籥於后非大置酒召不得見去憐之為作歌曰愁莫愁居無聊心重結意不舒內茀鬱憂哀積上不見天生何益日崔隤時不再願棄軀死無悔令昭信聲鼓為節以教諸姬歌之歌罷輒歸永巷封門獨昭信兄子初為乘華夫人得朝夕見昭信與去從十餘奴博飲逰敖初去年十四五事師受易師數諫正去去益大逐之內史請以為掾師數令內史禁切王家去使奴殺師父子不發覺後去數置酒令倡俳裸戲坐中以為樂相強劾繫倡闌入殿門奏狀事下考案倡辭夲為王教修靡夫人望卿弟都歌舞使者召望卿都去對皆淫亂自殺會赦不治望卿前亨煮即取他死人與都死并付其母母曰都是望卿非也數號哭求死昭信令奴殺之奴得辭服夲始三年相內史奏狀具言赦前所犯天子遣大鴻臚丞相長史御史丞廷尉正雜治巨鹿詔獄奏請逮捕去及后昭信制曰王后昭信諸姬奴婢證者皆下獄辭服有司復請誅王制曰與列侯中二千石二千石博士議議者皆以為去悖虐聼后昭信讒言燔燒亨煮生割剝人距師之説殺其父子凡殺無辜十六人至一家母子三人逆節絶理其十五人在赦前大惡仍重當伏顯戮以示衆制曰朕不忍致王於法議其罰有司請廢勿王與妻子徙上庸奏可與湯沐邑百户去道自殺昭信棄市立二十二年國除後四歲宣帝地節四年復立去兄文是為戴王文素正直數諫王去故上立焉二年薨子海陽嗣十五年坐畫屋為男女裸交接置酒請諸父姊妹飲令仰視畫又海陽女弟為人妻而使與幸臣姦又與從弟調等謀殺一家三人已殺甘露四年坐廢徙房陵國除後十五年平帝元始二年復立戴王弟襄隄侯子愈為廣德王奉惠王後二年薨子赤嗣王莽時絶膠東康王寄以孝景中二年立二十八年薨淮南王謀反時寄微聞其事私作兵車鏃矢戰守備備淮南之起及吏治淮南事辭出之寄於上最親意自傷發病而死不敢置後於是上聞寄有長子賢母無寵少子慶母愛幸寄常欲立之為非次因有過遂無所言上憐之立賢為膠東王奉康王祀而封慶為六安王王故衡山地膠東王賢立十五年薨諡為哀王子戴王通平嗣二十四年薨子頃王音嗣五十四年薨子共王授嗣十四年薨子殷嗣王莽時絶六安共王慶立三十八年薨子夷王祿嗣十一年薨子繆王定嗣二十三年薨子頃王光嗣二十七年薨子育嗣王莽時絶清河哀王乘以孝景中三年立十二年薨亡子國除常山憲王舜以孝景中五年立舜帝少子驕淫數犯禁上常寬之三十三年薨子勃嗣為王初憲王有不愛姬生長男梲梲他活反梲以母無寵故亦不得幸於王王后修生太子勃王內多所幸姬生子平子商王后稀得幸及憲王疾甚諸幸姬侍病王后以妬媢不常在輒歸舍醫進藥太子勃不自嘗藥又不宿留侍疾及王薨王后太子乃至憲王雅不以梲為子數不分與財物郎或説太子王后令分梲財皆不聼太子代立又不收恤梲梲怨王后及太子漢使者視憲王喪梲自言憲王病時王后太子不侍及薨六日出舍太子勃私姦飲酒博戲擊築與女子載馳環城過市入獄視囚天子遣大行騫驗問逮諸證者王又匿之吏求捕勃使人致擊笞掠擅出漢所疑囚有司請誅勃及憲王后修上曰修素無行使梲陷之罪勃無良師傳朕不忍致誅有司請廢勿王徙王勃以家屬處房陵上許之勃王數月廢國除月餘天子為最親詔有司曰常山憲王早夭后妾不和適孽誣爭陷於不義以滅國朕甚愍焉其封憲王子平三萬户為真定王子商三萬户為泗水王頃王平立二十五年薨子烈王偃嗣十八年薨子孝王由嗣二十二年薨子安王雍嗣二十六年薨子共王普嗣十五年薨子陽嗣王莽時絶泗水思王商立十年薨子哀王安世嗣一年薨無子於是武帝憐泗水王絶復立安世弟賀是為戴王立二十二年薨有遺腹子暖許逺反相內史不以聞太后上書昭帝閔之抵相內史罪立暖為勤王立三十九年薨子戾王駿立三十一年薨子靖嗣王莽時絶太史公曰髙祖時諸侯皆賦得自除內史以下漢獨為置丞相黃金印諸侯自除御史廷尉博士擬於天子自吳楚反後五宗主世孝景帝十三子為王而五人同母者為宗故曰五宗漢為置二千石去丞相曰相銀印諸侯獨得食租稅奪之權其後諸侯貧者或乘牛車矣武五子孝武皇帝六男衛皇后生戾太子據趙媫妤生孝昭帝王夫人生齊懷王閎李姬生燕刺來葛反王旦廣陵厲王胥李夫人生昌邑哀王髆音博戾太子據元狩元年立為皇太子年七歲矣初上年二十九乃得太子甚喜為立禖使東方朔枚臯作禖祝少壯詔受公羊春秋又從瑕邱江公受穀梁及冠就宫上為立博望苑使通賓客從其所好故多以異端進者元鼎四年納史良娣産子男進號曰史皇孫武帝末衛后寵衰江充用事充與太子及衛氏有隙恐上晏駕後為太子所誅會巫蠱事起充因此為姦是時上春秋髙意多所惡以為左右皆為巫蠱道祝詛窮治其事丞相公孫賀父子陽石諸邑公主及皇后弟子長平侯衛伉皆坐誅語在公孫賀江充傳充典治巫蠱既知上意白言宫中有蠱氣入宫至省中壞御座掘地上使按道侯韓説御史章贛黃門蘇文等助充充遂至太子宫掘蠱得桐木人時上疾辟暑甘泉宫獨皇后太子在太子召問少傅石德德懼為師傅并誅因謂太子曰前丞相父子兩公主及衛氏皆坐此今巫與使者掘地得徴驗不知巫置之邪將實有也無以自明可矯以節收捕充等繫獄窮治其姦詐且上疾在甘泉皇后及家吏請問皆不報上存亡未可知而姦臣如此太子將不念秦扶蘇事邪太子急然德言征和二年七月壬午乃使客為使者收捕充等按道侯韓説疑使者有詐不肯受詔客格殺説御史章贛被創突亡自歸甘泉太子使舍人無且持節夜入未央宫殿長秋門因長御倚華具白皇后發中廄車載射士出武庫兵發長樂宫衛告令百官曰江充反乃斬充以徇炙胡巫上林中遂部賓客為將率與丞相劉屈氂等戰長安中擾亂言太子反以故衆不附太子兵敗亡不得上怒甚羣下憂懼不知所出壺關三老茂上書曰臣聞父者猶天母者猶地子猶萬物也故天平地安陰陽和調物乃茂成父慈母愛室家之中子乃孝順陰陽不和則萬物夭傷父子不和則室家喪亡故父不父則子不子君不君則臣不臣雖有粟吾得而食諸昔者虞舜孝之至也而不中於瞽叟孝己被謗伯竒放流骨肉至親父子相疑何者積毁之所生也由是觀之子無不孝而父有不察今皇太子為漢適嗣承萬世之業體祖宗之重親則皇帝之宗子也江充布衣之人閻閭之𨽻臣耳陛下顯而用之銜至尊之命以迫蹴皇太子造飾姦詐羣邪錯繆是以親戚之路鬲塞而不得通太子進則不得上見退則困於亂臣獨寃結而亡告不忍忿忿之心起而殺充恐懼逋逃子盜父兵以救難自免耳臣竊以為無邪心詩曰營營青蠅止於藩愷悌君子無信讒言讒言罔極交亂四國往者江充讒殺趙太子天下莫不聞其罪固宜陛下不省察深過太子發盛怒舉大兵而求之三公自將智者不敢言辨士不敢説臣竊痛之臣聞子胥盡忠而亡其號比干盡仁而遺其身忠臣竭誠不顧鈇鉞之誅以陳其愚志在匡君安社稷也詩云取彼譖人投畀豺虎唯陛下寬心慰意少察所親毋患太子之非亟罷甲兵毋令太子久亡臣不勝惓惓出一旦之命待罪建章闕下書奏天子感寤太子之亡也東至湖湖縣名藏匿泉鳩里主人家貧常賣屨以給太子太子有故人在湖聞其富贍使人呼之而發覺吏圍捕太子太子自度不得脫既入室距户自經山陽男子張富昌為卒足踏開户新安令史李夀趨抱解太子主人公遂格鬭死皇孫二人皆并遇害上既傷太子乃下詔曰蓋行疑賞所以申信也其封李壽為邘侯張富昌為題侯久之巫蠱事多不信上知太子惶恐無他意而車千秋復訟太子寃上遂擢千秋為丞相而族滅江充家焚蘇文於橫橋上橫音光及泉鳩里加兵刃於太子者初為北地太守後族上憐太子無辜乃作思子宫為歸來望思之臺於湖天下聞而悲之初太子有三男一女女者平輿侯嗣子尚焉及太子敗皆同時遇害衛后史良娣葬長安城南史皇孫皇孫妃王夫人及皇女孫葬廣明皇孫二人隨太子者與太子并葬湖太子有遺孫一人史皇孫子王夫人男年十八即尊位是為孝宣帝帝初即位下詔曰故皇太子在湖未有號諡歲時祠其議諡置園邑有司奏請禮為人後者為之子也故降其父母不得祭尊祖之義也陛下為孝昭帝後承祖宗之祀制禮不踰間謹行視孝昭帝所為故皇太子起位在湖位冡位也史良娣冡在博望苑北親史皇孫位在廣明郭北諡法曰諡者行之迹也愚以為親諡宜曰悼皇母曰悼后比諸侯王園置奉邑三百家故皇太子諡曰戾置奉邑二百家史良娣曰戾夫人置守冡三十家園置長丞周衛奉守如法以湖閿鄉邪里聚為戾園長安白亭東為戾后園廣明成鄉為悼園皆改葬焉後八歲有司復言禮父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟因園為寢以時薦享焉益奉園民滿千六百家以為奉明縣尊戾夫人曰戾后置園奉邑及益戾園各滿三百家齊懷王閎與燕王旦廣陵王胥同日立皆賜䇿各以國土風俗申戒焉曰惟元狩六年四月乙巳皇帝使御史大夫湯廟立子閎為齊王曰嗚呼小子閎受兹青社封於東土世為漢藩輔嗚呼念哉共朕之詔惟命不於常人之好德克明顯光義之不圖俾君子怠悉爾心允執其中天祿永終厥有愆不臧乃凶於而國而害於爾躬嗚呼保國乂民可不敬與王其戒之閎母王夫人有寵閎尤愛幸立八年薨無子國除燕刺王旦賜䇿曰嗚呼小子旦受兹玄社建爾國家封於北土世為漢藩輔嗚呼薰鬻氏虐老獸心以姦巧邉氓朕命將率徂征厥罪萬夫長千夫長三十有二帥降旗奔師薰鬻徙域北州以妥悉爾心毋作怨毋作棐德毋乃廢備非教士毋得從徴王其戒之旦壯大就國為人辨略博學經書雜説好星歷數術倡優射獵之事招致遊士及衛太子敗齊懷王又薨旦自以次第當立上書求入宿衛上怒下其使獄後坐臧匿亡命削良鄉安次文成三縣武帝由是惡旦後遂立少子為太子帝崩太子立是為孝昭帝賜諸侯王璽書旦得書不肯哭曰璽書封小京師疑有變遣幸臣夀西長孫縱之王孺等之長安以問禮儀為名王孺見執金吾廣意問帝崩所病立者誰子年幾歲廣意言待詔五莋宫宫中歡言帝崩諸將軍共立太子為帝年八九歲葬時不出臨歸以報王王曰上棄羣臣無語言蓋主又不得見甚可怪也復遣中大夫至京師上書言竊見孝武皇帝躬聖道孝宗廟慈愛骨肉和集兆民德配天地明並日月威武洋溢逺方執寶而朝增郡數十斥地且倍封泰山禪梁父巡狩天下逺方珍物陳於太廟德甚休盛請立廟郡國奏報聞時大將軍霍光秉政褒賜燕王錢二十萬益封萬三千户旦怒曰我當為帝何賜也遂與宗室中山哀王子劉長齊孝王孫劉澤等結謀詐言以武帝時受詔得職吏事修武備備非常長於是為旦命令羣臣曰寡人賴先帝休德獲奉北藩親受明詔職吏事領庫兵飭武備任大職重夙夜兢兢子大夫將何以規佐寡人且燕國雖小成周之建國也上自召公下及昭襄於今千載豈可謂無賢哉寡人束帶聼朝三十餘年曾無聞焉其者寡人之不及與意亦子大夫之思有所不至乎其咎安在方今寡人欲橋邪防非章聞揚和撫慰百姓移風易俗厥路何由子大夫其各悉心以對寡人將察焉羣臣皆免冠謝郎中令成軫謂旦曰大王失職獨可起而索不可坐而得也大王一起國中雖女子皆奮臂隨大王旦曰前髙后時偽立子𢎞為皇帝諸侯交手事之八年吕太后崩大臣誅諸吕立文帝天下乃知非孝惠子也我親武帝長子反不得立上書請立廟又不聼立者疑非劉氏即與劉澤謀為姦書言少帝非武帝子大臣所共立天下宜共伐之使人傳行郡國以搖動百姓澤謀歸發兵臨災與燕王共起旦遂招來郡國姦人賦斂銅鐡作甲兵數閲其車騎材官卒建旌旗鼓車旄頭先驅郎中侍從者著貂羽黃金附蟬皆號侍中旦從相中尉以下勒車騎發民會圍大獵文安縣以講士馬須期日郎中韓義等數諫旦旦殺義等凡十五人會瓶侯劉成知澤等謀告之青州刺史俊不疑不疑即收捕澤以聞天子遣大鴻臚丞治連引燕王有詔勿治而劉澤等皆伏誅益封瓶侯久之旦姊鄂邑蓋長公主左將軍上官桀父子與霍光爭權有隙皆知旦怨光即私與燕交通旦遣孫縱之等前後十餘輩多齎金寶走馬賂遺蓋主上官桀及御史大夫桑𢎞羊等皆與交通數記疏光過失與旦令上書告之桀欲從中下其事旦聞之喜上疏曰昔秦據南面之位制一世之命威服四夷輕弱骨肉顯重異族廢道任刑無恩宗室其後尉他入南夷陳涉呼楚澤近狎作亂內外俱發趙氏無炊火焉髙皇帝覽蹤迹觀得失見秦建夲非是故改其路規土連城布王子孫是以枝葉扶疏異姓不得間也今陛下承明繼成委任公卿羣臣連與成朋非毁宗室膚受之訴日騁於廷惡吏廢法立威主恩不及下究臣聞武帝使中郎將蘇武使胸奴見留二十年不降還亶為典屬國今大將軍長史敞無勞為搜粟都尉又將軍都郎羽林道上移蹕太官先置臣旦願歸符璽入宿衛察姦臣之變是時昭帝年十四覺其有詐遂親信霍光而疏上官桀等桀等因謀共殺光廢帝迎立燕王為天子旦置驛書往來相報許立桀為王外連郡國以千數旦以語相平平曰大王前與劉澤結謀事未成而發覺者以劉澤素夸好侵陵也平聞左將軍素輕易車騎將軍少而驕臣恐其如劉澤時不能成又恐既成反大王也旦曰前一男子詣闕自謂故太子長安中民趣鄉之正歡不可止大將軍恐出兵陳之以自備耳我帝長子天下所信何憂見反後謂羣臣蓋主報言獨患大將軍與右將軍王莽今右將軍物故丞相病幸事必成徴不久令羣臣皆裝是時天雨虹下屬宫中飲井水井水泉竭厠中豕羣出壞太官竈鳥鵲鬭死鼠舞殿端門中殿上户自閉不可開天火燒城門大風壞宫城樓折拔樹木流星下墮后姬以下皆恐王驚病使人祠葭水台水王客吕廣等知星為王言當有兵圍城期在九月十月漢當有大臣戮死者王愈憂恐謂廣等曰謀事不成妖祥數見兵氣且至奈何會蓋主舍人父燕倉知其謀告之由是發覺丞相賜璽書部中二千石逐捕孫縱之及左將軍桀等皆伏誅旦聞之召相平曰事敗遂發兵乎平曰左將軍已死百姓皆知之不可發也王憂悶置酒萬載宫會賔客羣臣妃妾坐飲王自歌曰歸空城兮犬不吠雞不鳴橫術何廣廣兮固知國中之無人華容夫人起舞曰髮紛紛兮置渠骨籍籍兮亡居母求死子兮妻求死夫裴回兩渠間兮君子獨安居坐者皆泣有赦令到王讀之曰嗟乎獨赦吏民不赦我因迎后姬諸夫人之明光殿王曰老虜曹為事當族欲自殺左右曰黨得削國幸不死后姬夫人共啼泣止王會天子使使者賜燕王璽書曰昔髙皇帝王天下建立子弟以藩屏社稷先日諸吕陰謀大逆劉氏不絶若髮賴絳侯等誅討賊亂尊立孝文以安宗社非以中外有人表裏相應故耶樊酈曹灌攜劍推鋒從髙皇帝墾災除害耘鉏海內當此之時頭如蓬葆勤苦至矣然其賞不過封侯今宗室子孫曾無暴衣露冠之勞裂地而王之分財而賜之父死子繼兄終弟及今王骨肉至親敵吾一體乃與他姓異族謀害社稷親其所疏疏其所親有逆悖之心無忠愛之義如使古人有知當何面目復奉齊酎見髙祖之廟乎旦得書以符璽屬醫工長謝相二千石奉事不謹死矣即以綬自絞后夫人隨旦自殺者二十餘人天子加恩赦王太子建為庶人賜旦諡曰刺王旦立三十八年而誅國除後六年宣帝即位封旦兩子慶為新昌侯賢為安定侯立故太子建是為廣陽頃王二十九年薨子穆王舜嗣二十一年薨子思王璜嗣二十年薨子嘉嗣王莽時廢漢藩王為家人嘉獨以獻符命封扶美侯賜姓王氏廣陵厲王胥賜䇿曰嗚呼小子胥受茲赤社建爾國家封於南土世為漢藩輔古人有言曰大江之南五湖之間其人輕心揚州保強三代要服不及以正嗚呼悉爾心祗祇兢兢乃惠乃順毋桐好逸母邇宵人惟法帷則書云臣不作福不作威靡有後羞王其戒之胥壯大好倡樂逸遊力扛鼎空手搏熊彘猛獸動作無法度故終不得為漢嗣昭帝初立益封胥萬三千户元鳳中入朝復益萬户賜錢二千萬黃金二千斤安車駟馬寶劍及宣帝即位封胥四子聖曾寶昌皆為列侯又立胥小子𢎞為髙密王所以褒賞甚厚始昭帝時胥見上年少無子有覬欲心而楚地多巫鬼胥迎女巫李女須使下神祝詛女須泣曰孝武帝下我左右皆伏言吾必令胥為天子胥多賜女須錢使禱巫山會昭帝崩胥曰女胥良巫也殺牛塞禱及昌邑王徴復使巫祝詛之後王廢胥寖信女須等數賜豫錢物宣帝即位胥曰太子孫何以反得立復令女須祝詛如前又胥女為楚王延壽后弟婦數相餽遺通私書後延壽坐謀反誅辭連及胥有詔勿治賜胥黃金前後五千斤他器物甚衆胥又聞漢立太子謂姬南等曰我終不得立矣乃止不詛後胥子南利侯寶坐殺人奪爵還歸廣陵與胥姬左修姦事發覺繫獄棄市相勝之奏奪王射陂草田以賦貧民奏可胥復使巫祝詛如前胥宫園中棗樹生十餘莖莖上赤葉白如素池水變赤魚死有鼠晝立舞王后廷中胥謂姬南等曰棗水魚鼠之怪甚可惡也居數月祝詛事發覺有司案驗胥惶恐藥殺巫及宫人二十餘人以絶口公卿請誅胥天子遣廷尉大鴻臚即訊胥謝曰罪死有餘誠皆有之事久逺請歸思念具對胥既見使者還置酒顯陽殿召太子霸及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君等鼓瑟歌舞王自歌曰欲久生兮無終長不樂兮安窮奉天期兮不得須臾千里馬兮駐待路黃泉下幽深人生要死何為苦心何用為樂心所喜出入無悰為樂亟蒿里召兮郭門閲死不得取代庸身自逝左右更涕泣奏酒至雞鳴時罷胥謂太子霸曰上遇我厚今負之甚我死骸骨當暴幸而得葬薄之無厚也即以綬自絞死及八子郭昭君等二人皆自殺天子加恩赦王諸子皆為庶人賜諡曰厲王立六十四年而誅國除後七年元帝復立胥太子霸是為孝王十三年薨子共王意嗣三年薨子哀王護嗣十六年薨無子絶後六年成帝復立孝王子守是為靖王立二十年薨子宏嗣王莽時絶初髙密哀王𢎞夲始元年以廣陵王胥少子立九年薨子頃王章嗣三十三年薨子懷王寬嗣十一年薨子慎嗣王莽時絶昌邑哀王髆天漢四年立十一年薨子賀嗣立十三年昭帝崩無嗣大將軍霍光徴王賀典喪令乘七乘傳詣長安邸夜漏未盡一刻以火發書其日中賀發晡時至定陶行百三十五里侍從者馬死相望於道郎中令龔遂諫王令還郎謁者五十餘人賀到濟陽求長鳴雞道買積竹杖過𢎞農使大奴善以衣車載女子至湖使者以讓相安樂安樂告遂遂入問賀賀曰無有遂曰即無有何愛一善以毁仁義請收屬吏以湔灑大王即捽善屬衛士長行法賀到霸上大鴻臚郊迎騶奉乘輿車王使僕壽成御郎中令遂驂乘且至廣明東都門遂曰禮奔喪望見國都哭此長安東郭門也賀曰我嗌痛不能哭至城門遂復言賀曰城門與郭門等耳且至未央宫東闕遂曰昌邑帳在是闕外馳道北未至帳所有南北行道馬足未至數步大王宜下車鄉闕西面伏哭盡哀止王曰諾到哭如儀王受皇帝璽綬襲尊號即位二十七日行淫亂大將軍光與羣臣議白孝昭皇后廢賀歸故國賜湯沐邑二千户故王家財物皆與賀及哀王女四人各賜湯沐邑千戶語在霍光傳國除為山陽郡初賀在國時數有怪嘗見白犬髙三尺無頭其頸以下似人而冠方山冠以問郎中令龔遂遂曰此天戒言在仄者盡冠狗也去之則存不去則亡矣後復見熊左右皆莫見又大鳥飛集宫中王知惡之復以問遂遂曰熊鳥山野之禽獸今來入宫王獨見之宫室將空之象也於是王卬天歎曰不祥何為數來遂叩頭曰臣不敢隱忠數言危亡之戒大王不説夫國之存亡豈在臣言哉願王內自揆度大王誦詩三百五篇人事浹王道備王之所行中詩一篇何等也大王位為諸侯王行汙於庶人以存難以亡易宜深察之後又血汙王坐席王問遂遂呌然號曰宫空不久妖祥數至血者陰憂之象也宜畏慎自省賀終不改節居無何徴既即位後王夢青蠅之矢積西階東可五六石以屋版瓦覆發視之青蠅矢也以問遂遂曰陛下之詩不云乎營營青蠅止於藩愷悌君子毋信讒言陛下左側讒人衆多如是青蠅惡矣宜進先帝大臣子孫親近以為左右如不忍昌邑故人信用讒諛必有凶咎願詭禍為福皆放逐之臣當先逐矣賀不用其言卒至於廢大將軍光更尊立武帝曾孫是為孝宣帝帝即位心內忌賀元康二年遣使者賜山陽太守張敞璽書曰制詔山陽太守其謹備盜賊察往來過客母下所賜書敞於是條奏賀居處著其廢亡之效曰臣敞地節三年五月視事故昌邑王居故宫奴婢在中者百八十三人閉大門開小門亷吏一人為領錢物市買朝內食物他不得出入督盜一人别主徼循察往來者以王家錢取卒迾宫清中備盜賊臣敞數遣丞吏行察四年九月中臣敞入視居處狀故王年二十六七為人青黑色小目鼻末鋭卑少須眉身體長大疾痿行步不便衣短衣大袴冠惠文冠佩玉環簪筆持牘趨謁臣敞與坐語中庭閲妻子奴婢臣敞欲動觀其意即以惡鳥感之曰昌邑多梟故王應曰然前賀西至長安殊無梟復來東至濟陽乃復聞梟聲臣敞閲至子女持轡故王跪曰持轡母嚴長孫女也臣敞故知執金吾嚴延年字長孫女羅紨前為故王妻察故王衣服言語跪起清狂不慧妻十六人子二十二人其十一人男十一人女昧死奏名籍及奴婢財物簿臣敞前書言昌邑王歌舞者張修等十人無子又非姬但良人無官名王薨當罷歸太傅豹等擅留以為哀王園中人所不當得為請罷歸故王聞之曰中人守園疾者當勿治相殺傷者當勿法欲令亟死太守奈何而欲罷之其天資喜由亂亡終不見仁義如此後丞相御史以臣敞書聞奏可皆已遣上由此知賀不足忌其明年春乃下詔曰蓋聞象有罪舜封之骨肉之親析而不殊其封故昌邑王賀為海昏侯食邑四千户侍中衛尉金安上上書言賀天之所棄陛下至仁復封為列侯賀嚚頑廢放之人不宜得奉宗廟朝聘之禮奏可賀就國豫章數年揚州刺史柯奏賀與故太守卒史孫萬世交通萬世問賀前見廢時何不堅守母出宫斬大將軍而聼人奪璽綬乎賀曰然失之萬世又以賀且王豫章不久為列侯賀曰且然非所宜言有司案驗請逮捕制曰削户三千後薨豫章太守廖奏言舜封象於有鼻死不為置後以為暴亂之人不宜為太祖海昏侯賀死上當為後者子充國充國死復上弟奉親奉親復死是天絶之也陛下聖仁於賀甚厚雖舜於象無以加也宜以禮絶賀以奉天意願下有司議議皆以為不宜為立嗣國除元帝即位復封賀子代宗為海昏侯傳子至孫今見為侯宣元六王孝宣皇帝五男許皇后生孝元皇帝張偼妤生淮陽憲王欽衛偼妤生楚元王囂公孫偼妤生東平思王宇戎偼妤生中山哀王竟淮陽憲王欽元康三年立母張偼妤有寵於宣帝霍皇后廢後上欲立張偼妤為后久之懲艾霍氏欲害皇太子乃更選後宫無子而謹慎者乃立長陵王偼妤為后令母養太子后無寵希御見唯張偼妤最幸而憲王壯大好經書法律聰達有材帝甚愛之太子寬仁喜儒術上數嗟歎憲王曰真我子也常有意欲立張偼妤與憲王然用太子起於微細上少依倚許氏及即位而許后以弒死太子早失母故不忍也久之上以故丞相韋賢子元成陽狂辭侯於兄經明行髙稱於朝廷乃召拜元成為淮陽中尉欲感喻憲王輔以推讓之臣由是太子遂安宣帝崩元帝即位乃遣憲王之國時張偼妤已死憲王有外祖母舅張博兄弟三人歲至淮陽見親輒受王賜後王上書請徙外家張氏於國博上書願留守墳墓獨不徙王恨之後博至淮陽王賜之少博言負責數百萬願王為償王不許博辭去令弟光恐云王遇大人益解博欲上書為大人乞骸骨去王乃遣人持黃金五十斤送博博喜還書謝為諂語盛稱譽王勸令入朝輔助主上使弟光數説王宜聼博計令於京師説用事貴人為王求朝王不納其言後光屢勸王王意動博知之復遺王書言齊有駟先生者善為司馬兵法大將之材又北海之濵有賢人焉纍世不可逮然難致也若得此二人而薦之漢功亦不細矣且云駟先生蓄積道術書無不有願知大王所好請得輒上此湯禹所以成大功也王得書喜説報博書為博償責二百萬是時博女壻京房以明易陰陽得幸於上數召見言事自謂為石顯五鹿充宗所排謀不得用數為博道之博具記房諸所説災異及召見密語持豫淮陽王乃詐言已見中書令石君求朝許以金五百斤復為王為便宜奏陳安危指災異令王朝見先口陳其意而後奏之將以去石顯五鹿充宗等為房地王冀事成功立取寵天子乃大説復報博書以金五百斤與博會房出為郡守離左右顯具得此事告房漏泄省中語博兄弟詿誤諸侯王狡猾不道皆下獄有司奏請誅捕欽上不忍致法遣諫大夫王駿賜欽璽書責以張博數遺王書非毁政治褒舉諸侯稱引周湯以讇惑王所言悖逆無道王不舉奏而多與金錢報以好言辜至不赦朕不忍聞推原厥夲不祥自博惟王之心匪同於凶已詔有司勿治王事欽於是對使者免冠稽首謝罪請得悉心自新奉承詔䇿京房及博兄弟三人皆棄市妻子徙邊至成帝即位以淮陽王屬為叔父敬寵之王上書自陳舅張博時事頗為石顯等所侵因為博家屬徙者求還上加恩許還徙者三十六年薨子文王元嗣二十六年薨子縯嗣王莽時絶楚孝王囂甘露二年立為定陶王三年徙楚成帝河平中入朝時被惡疾天子憫之詔王朝正月與子男一人俱其以廣戚縣户四千三百户封其子勳為廣戚侯明年囂薨子懷王文嗣一年薨無子絶明年成帝復立文弟平陸侯衍是為思王二十一年薨子紆嗣王莽時絶初成帝時又立紆弟景為定陶王廣戚侯勳薨諡煬侯子顯嗣平帝崩無子王莽立顯子嬰為孺子奉平帝後莽篡位以嬰為定安公漢既誅莽更始時嬰在長安平陵方望等頗知天文以為更始必敗嬰夲統當立者也共起兵將嬰至臨涇立為天子更始使丞相李松擊破殺嬰云東平思王宇甘露二年立元帝即位就國壯大通姦犯法上以至親貰不罪傅相連坐久之事太后內不相得太后上書求守杜陵園宣帝陵也宫人無子乃守園陵上於是遣太中大夫張子蟜奉璽書敕諭之又特以璽書賜王太后宇慙懼因使者頓首謝死罪願灑心自改詔書又敕傅相自今以來非五經之正術敢以遊獵非禮道王者輒以名聞宇立二十年元帝崩宇謂中謁者信等曰漢大臣議天子少弱未能治天下以為我知文法建欲使我輔佐天子我見尚書晨夜極苦使我為之不能也今暑熱縣官年少持服恐無處所我危得之比至下宇凡三哭飲酒食肉妻妾不離側又姬胊臑故親幸後疏逺數歎息呼天宇聞斥朐臑為家人子掃除永卷數笞擊之胊臑私疏宇過失數令家告之宇覺知絞殺朐臑有司奏請逮捕有詔削樊亢父二縣後三歲天子閔之詔有司復前所削縣如故後年來朝上疏求諸子及太史公書上以問大將軍王鳳鳳言諸子書或反經術非聖人或明鬼神信物怪太史公書有戰國從橫權譎之謀漢興之初謀臣竒䇿天官災異地形厄塞皆不宜在諸侯王不可豫天子如鳳言遂不豫立三十三年薨子煬王雲嗣哀帝時無鹽危山土自起覆草如馳道狀又瓠山石轉立雲及后謁自之石所祭治石象瓠山立石束倍草并祠之建平三年息夫躬孫寵等共因幸臣董賢告之是時哀帝被疾多所惡事下有司逮王后謁下獄治言雲使巫傅恭婢合歡等祠祭詛祝上為雲求為天子雲又與知災異者髙尚等指星宿言上疾必不愈雲當得天下石立宣帝起之表也有司請誅王有詔廢徙房陵雲自殺謁棄市立十七年國除元始元年王莽欲反哀帝政白太皇太后立雲太子開明為東平王又立思王孫成都為中山王開明立三年薨無子復立開明兄嚴鄉侯信子匡為東平王奉開明後王莽居攝東郡太守翟義與嚴鄉侯信謀舉兵誅莽立信為天子兵敗皆為莽所滅中山哀王竟初元二年立為清河王三年徙中山以幼少未之國建昭四年薨邸葬杜陵亡子絶太后歸居外家戎氏孝元皇帝三男王皇后生孝成帝傅昭儀生定陶恭王康馮昭儀生中山孝王興定陶恭王康永光三年立為濟陽王六年徙為山陽王八年徙定陶王少而愛長多材藝習知音聲上竒器之母昭儀又幸幾代皇后太子語在元后及史丹傳成帝即位緣先帝意厚遇異於他王十九年薨子欣嗣十五年成帝無子徴入為皇太子上以太子奉太宗後不得顧私親乃立楚思王子景為定陶王奉恭王後成帝崩太子立是為孝哀帝哀帝二年追尊恭王為恭皇置寢廟京師序昭穆儀如孝元帝徙定陶王景為信都王云中山孝王興建昭三年立為信都王十四年徙中山成帝之議立太子也御史大夫孔光以為尚書有殷及王兄終弟及中山王元帝之子宜為後成帝以中山王不材又兄弟不得相入廟外家王氏與趙昭儀皆欲用哀帝為太子故遂立焉上乃封孝王舅馮參為宜鄉侯而益封孝王萬户以尉其意三十年薨子衎嗣七年哀帝崩無子徴中山王衎入即位是為平帝太皇太后以帝為成帝後故立東平思王孫桃鄉頃侯子成都為中山王奉孝王後王莽時絶通志卷七十八下
