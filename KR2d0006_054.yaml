body:
  text: 通志卷四十九宋右廸功郎鄭樵漁仲撰樂略第一樂府總序古之逹禮三一曰燕二曰享三曰祀所謂吉凶軍賔嘉皆主此三者以成禮古之逹樂三一曰風二曰雅三曰頌所謂金石絲竹匏土革木皆主此三者以成樂禮樂相須以為用禮非樂不行樂非禮不舉自后䕫以來樂以詩為本詩以聲為用八音六律為之羽翼耳仲尼編詩為燕享祀之時用以歌而非用以説義也古之詩今之辭曲也若不能歌之但能誦其文而説其義可乎不幸腐儒之説起齊魯韓毛四家各為序訓而以説相高漢朝又立之學官以義理相授遂使聲歌之音湮沒無聞然當漢之初去三代未逺雖經主學者不識詩而太樂氏以聲歌肄業徃徃仲尼三百篇瞽史之徒例能歌也柰義理之説既勝則聲歌之學日微東漢之末禮樂蕭條雖東觀石渠議論紛紜無補於事曹孟徳平劉表得漢雅樂郎杜䕫䕫老矣久不肄習所得於三百篇者惟鹿鳴騶虞伐檀文王四篇而已餘聲不𫝊太和末又失其三左延年所得惟鹿鳴一篇每正旦大㑹太尉奉璧羣臣行禮東廂雅樂常作者是也古者歌鹿鳴必歌四牡皇皇者華三詩同節故曰工歌鹿鳴之三而用南陔白華華黍三笙以贊之然後首尾相承節奏有屬今得一詩而如此用可乎應知古詩之聲為可貴也至晉室鹿鳴一篇又無𫝊矣自鹿鳴一篇絶後世不復聞詩矣然詩者人心之樂也不以世之汙隆而存亡豈三代之時人有是心心有是樂三代之後人無是心心無是樂乎繼三代之作者樂府也樂府之作宛同風雅但其聲散佚無所紀繫所以不得嗣續風雅而為流通也按三百篇在成周之時亦無所紀繫有季札之賢而不别國風所在有仲尼之聖而不知雅頌之分仲尼為此患故自衛返也問於太師氏然後取而正焉列十五國風以眀風土之音不同分大小二雅以眀朝廷之音有間陳周魯商三頌之音所以侑祭也定南陔白華華黍崇丘由庚由儀六笙之音所以叶歌也得詩而得聲者三百篇則繫於風雅頌得詩而不得聲者則置之謂之逸詩如河水祈招之類無所繫也今樂府之行於世者章句雖存聲樂無用崔豹之徒以義説名吳兢之徒以事解目蓋聲失則義起其與齊魯韓毛之言詩無以異也樂府之道或幾乎息矣臣今取而繫之千載之下庶無絶紐一曰短簫鐃歌二十二曲二曰鞞舞歌五曲三曰拂舞歌五曲四曰鼓角横吹十五曲五曰籩角十曲六曰相和歌三十曲七曰吟歎四曲八曰四絃一曲九曰平調七曲十曰瑟調三十八曲十一曰楚調十曲十二曰大曲十五曲十三曰白紵歌五曲十四曰清商八十四曲凡二百五十一曲繫之正聲即風雅之聲也一曰郊祀十九章二曰東都五詩三曰梁十二雅四曰唐十二和凡四十八曲繫之正聲即頌聲也一曰漢三侯之詩一章二曰漢房中之樂十七章三曰隋房内二曲四曰梁十曲五曰陳四曲六曰北齊二曲七曰唐五十五曲凡九十一曲繫之别聲而非正樂之用也正聲之餘則有琴琴五十七曲别聲之餘則有舞舞二十三曲古者絲竹與歌相和故有譜無辭所以六詩在三百篇中但存名耳漢儒不知謂為六亡詩也琴之九操十二引以音相授並不著辭琴之有辭自梁始舞與歌相應歌主聲舞主形自六代之舞至于漢魏並不著辭也舞之有辭自晉始今之所繫以詩繫於聲以聲繫於樂舉三逹樂行三逹禮庶不失乎古之道也古調二十四曲征戍十五曲遊俠二十一曲行樂十八曲佳麗四十七曲别離十八曲怨思二十五曲歌舞二十一曲絲竹十一曲觴酌七曲宫苑十九曲都邑三十四曲道路六曲時景二十五曲人生四曲人物十曲神仙二十二曲梵竺四曲蕃音四曲山水二十四曲草木二十一曲車馬六曲魚龍六曲鳥獸二十一曲雜體六曲總四百十九曲不得其聲則以義類相屬分為二十五門曰遺聲遺聲者逸詩之流也庶幾來者復得其聲則不失其所繫矣然三代既沒漢魏嗣興禮樂之來陵夷有漸始則風雅不分次則雅頌無别次則頌亡次則禮亡按上之回聖人出君子之作也雅也艾如張雉子班野人之作也風也合而為鼓吹曲燕歌行其音本幽薊則列國之風也煌煌京洛行其音本京華則都人之雅也合而為相和歌風者鄉人之用雅者朝廷之用合而用之是為風雅不分然享大禮也燕私禮也享則上兼用下樂燕則下得用上樂是則風雅之音雖異而享燕之用則通及明帝定四品一曰大予樂郊廟上陵用之二曰雅頌樂辟雍享射用之三曰黄門鼓吹樂天子宴羣臣用之四曰短簫鐃歌樂軍中用之古者雅用於人頌用於神武帝之立樂府采詩雖不辨風雅至于郊祀房中之章未嘗用於人事以明神人不可以同事也今辟雍享射雅頌無分應用頌者而改用大予應用雅者而改用黄門不知黄門大予於古為何樂乎風雅通歌猶可以通也雅頌通歌不可以通也曹魏凖鹿鳴作於赫篇以祀武帝凖騶虞作巍巍篇以祀文帝凖文王作洋洋篇以祀明帝且清廟祀文王執競祀武王莫非頌聲今魏家三廟純用風雅此頌之所以亡也頌亡則樂亡矣是時樂雖亡禮猶存宗廟之禮不用之天明有尊親也鬼神之禮不用之人知有幽明也梁武帝作十二雅郊廟明堂三朝之禮展轉用之天地之事宗廟之事君臣之事同其事矣樂之失也自漢武始其亡也自魏始禮之失也自漢明始其亡也自梁始禮樂淪亡之所由不可不知也正聲序論古之詩曰歌行後之詩曰古近二體歌行主聲二體主文詩為聲也不為文也浩歌長嘯古人之深趣今人既不尚嘯而又失其歌詩之㫖所以無樂事也凡律其辭則謂之詩聲其詩則謂之歌作詩未有不歌者也詩者樂章也或形之歌詠或散之律吕各随所主而命主於人之聲者則有行有曲散歌謂之行入樂謂之曲主於絲竹之音者則有引有操有吟有弄各有調以主之攝其音謂之調總其調亦謂之曲凡歌行雖主人聲其中調者皆可以被之絲竹凡引操吟弄雖主絲竹其有辭者皆可以形之歌詠蓋主於人者有聲必有辭主於絲竹者取音而已不必有辭其有辭者通可歌也近世論歌行者求名以義彊生分别正猶漢儒不識風雅頌之聲而以義論詩也且古有長歌行短歌行者謂其聲歌之長短耳崔豹吳兢大儒也皆謂人夀命之短長當其時已有此説今之人何獨不然嗚呼詩在於聲不在於義猶今都邑有新聲巷陌競歌之豈為其辭義之美哉直為其聲新耳禮失則求諸野正為此也孔子曰吾自衛反魯然後樂正雅頌各得其所亦謂雅頌之聲有别然後可以正樂又曰關雎樂而不淫哀而不傷亦謂關雎之聲和平聞之者能令人感發而不失其度若誦其文習其理能有哀樂之事乎二體之作失其詩矣縱者謂之古拘者謂之律一言一句窮極物情工則工矣將如樂何樂府在漢初雖有其官然采詩入樂自漢武始武帝定郊祀廼立樂府采詩夜誦則有趙代秦楚之謳莫不以聲為主是時去三代未逺猶有雅頌之遺風及後人泥於名義是以失其𫝊故吳兢譏其不覩本章便斷題取義贈利渉則述公無渡河慶載誕乃引烏生八九子賦雉子班者但美繡頸錦臆歌天馬者惟叙驕馳亂蹋其間有如劉猛李餘輩賦出門行不言離别將進酒乃敘烈女事用古題不用古義知此意者蓋鮮矣然使得其聲則義之同異又不足道也自永嘉之亂禮樂日微日替暨隋平陳得其一二則樂府之清商也文帝聽而善之曰此華夏正聲也乃置清商府博采舊章以為樂之所本在此自隋之後復無正聲至唐能合于管絃者明君楊叛兒驍壺春歌秋歌白雪堂堂春江花月夜八曲而已不幾於亡乎臣謹考摭古今編繫節奏庶正聲不墜於地矣漢短簫鐃歌二十二曲亦曰鼓吹曲按漢普謂之短蕭鐃歌南北朝謂之鼔吹曲觀李白作鼔吹入朝曲亦曰鐃歌列騎次颯沓引公卿則知唐時猶有遺音但大樂氏失職耳朱鷺鷺惟白色漢有朱鷺之祥因而為詩梁元帝放生碑云元龜夜夢終見取於宋王朱鷺晨飛尚張羅於漢后謂此也魏曰楚之平言魏平陵也吳曰炎精缺言漢衰而孫堅扶王室也晉曰靈之祥言宣帝佐魏而石瑞之祥也梁曰木紀謝言齊謝梁升也北齊曰水徳謝言魏謝齊興也後周曰元精季言魏道陵遲太祖肇開王業也思悲翁魏曰戰滎陽言曹公也吳曰漢之季言孫堅閔漢也晉曰宣受命言宣帝禦諸葛也梁曰賢首山言武帝破魏軍於司州肇王迹也北齊曰出山東言神武戰廣阿破爾朱兆也後周曰征隴西言太祖誅侯莫陳悦埽清隴右也艾如張溫子昇辭云誰在閑門外羅家諸少年張機蓬艾側結網槿籬邊若能飛自勉豈為繒所纒黄雀儻為戒朱絲猶可延此艾如張之事也觀李賀詩有艾葉緑花誰翦刻中藏禍機不可測似翦艾葉為蔽張之具也魏曰獲吕布言曹公圍臨淮禽吕布也吳曰攄武師言孫權征伐也晉曰征遼東言宣帝討滅公孫氏也梁曰桐栢山言武帝牧司州興王業也北齊曰戰韓陵言神武平四方定京洛也後周曰迎魏帝言武帝西幸太祖奉迎宅關中也上之回漢武帝元封初因至雍遂通回中道後數遊幸焉其歌稱帝遊石關望諸國月支臣匈奴服蓋誇時事也魏曰克官渡言曹公破袁紹於官渡也吳曰烏林言周瑜破魏武於烏林也普曰宣輔政言宣帝之業也梁曰道亡言東昬失道義師起樊鄧也北齊曰殄關隴言神武遣侯莫陳悦誅賀㧞岳定關隴也後周曰平竇泰言太祖討平竇泰也擁離魏曰舊邦言曹公勝袁紹於官渡還譙收死亡士卒也吳曰秋風言悦以使民民忘其死也普曰時運多難言宣帝討吳方冇征而無戰也梁曰抗威言被加湖元勲也北齊曰滅山蠕言神武屠蠡升高車而蠕蠕向化也後周曰復𢎞農言太祖收復陜城關東震懼也古辭云擁離趾中可築室何用葺之蕙用蘭擁離趾中戰城南古辭言戰城南死郭北野死不𦵏烏可食此言野死不得葬為烏鳥所食願為忠臣義士朝出戰而暮不得歸後來作者皆體此意魏曰定武功言曹公初破鄴也吳曰克皖城言孫權勝魏武於此城也普曰景龍飛言景帝也梁曰漢東流言克魯山城也北齊曰立武定言神武立魏主遷都於鄴而定天下也後周曰克沙苑言太祖俘齊軍十萬於沙苑神武脱身遁也巫山高古辭巫山高高以大淮水深難以逝大略言江淮深無梁以渡臨水逺望思歸而已後之作者皆渉陽臺雲雨之説非舊意也魏曰屠柳城言曹公破三郡烏丸於柳城也吳曰關背徳言關羽背吳為孫權所擒也普曰平王衡言景帝調萬國也梁曰鶴樓峻言平郢城也北齊曰戰芒山言神武克周帥也後周曰戰河陰言太祖破神武於河上斬其三將也上陵漢章帝元和三年帝自作詩四篇一曰思齊姚皇二曰六麒麟三曰竭肅雝四曰陟屺與鹿鳴承元氣二曲為宗廟食舉又以重來上陵二曲合八曲為上陵食舉據此所言則上陵自是八曲之一名或作於章帝之前亦不可知蓋因上陵而為之也魏曰平南荆言曹公平荆州也吳曰通荆州言吳與蜀通好也普曰文皇統百揆言文帝也梁曰昬主恣淫匿言東昬政亂武帝起義伐罪弔民也北齊曰禽蕭明言梁遣明來寇為清河王岳所禽也後周曰平漢東言太祖命將平随郡安陸也將進酒魏曰平關中言曹公征馬超定關中也吳曰章洪徳言孫權之徳也普曰因時運言時運之變聖䇿潛施也梁曰石首篇言平京城廢東昬也北齊曰破侯景言清河王岳破侯景復河南也後周曰取巴蜀言太祖遣軍平定蜀地也有所思亦曰嗟佳人漢太樂食舉十三曲第七曰有所思漢人亦以此樂侑食魏曰應帝期言文帝以聖徳受命應期運也吳曰順歴數言孫權建大號也普曰惟庸蜀言文帝平蜀封建復五等之爵也梁曰期運集言武帝受禪也北齊曰嗣丕基言文宣帝也後周曰拔江陵言太祖命將禽蕭繹平南土也芳樹魏曰邕熙言君臣邕穆庶績咸熙也吳曰承天命言踐位也晉曰天序言用人盡其才也梁曰於穆言君臣和樂也北齊曰克淮南言文宣遣清河王岳禽梁司徒陸法和克夀春盡取江北之地也後周曰受魏禪言閔帝受魏禪作周也上邪魏曰太和言明帝繼統得太和平而改元也吳曰元化言以道化天下也普曰大普承運期言應籙受圖也梁曰惟大梁言梁徳廣運也北齊曰平瀚海言文宣命將滅蠕蠕國也後周曰宣重光言明帝入承大統也君馬黄普曰金靈運言晉乗金運也北齊曰定汝潁言文襄遣清河王岳禽周將王思政於長葛汝潁悉平也後周曰哲皇出言高祖之聖徳也按古辭云君馬黄臣馬蒼二馬同逐臣馬良終言美人歸以南以北駕車馳馬令我心傷但取第一句以命題其主意不在馬也李賀之作其得古道乎如張正見蔡知君之流只言馬而已按謝爕云或聽鐃歌曲惟吟君馬黄古人知音别曲見於賦詠者如此後世只於言語上計較此道無聞雉子班普曰於穆我皇言武帝也北齊曰聖道洽言文宣之徳無思不服也後周曰平東夏言高祖禽齊主於青州一舉定山東也按吳兢所引古辭云雉子高飛止黄鵠高飛已千里雄來飛從雌視以為始作之辭然樂府之題亦如古詩題所謂關雎葛覃之類只取篇中一二字以命詩初無義也後人即物即亊而賦故於題有義據此古詞無雉子班之語徃徃雉子班之作復在此古辭之前吳兢未之見也如吳均可憐雉子班又後人所作也聖人出晉曰仲春振旅言大晉蒐田以時也北齊曰受魏禪言文宣受禪應天順人後周曰禽明徹言高祖遣將克陳將吳明徹而俘之也臨高臺古辭云臨高臺臺下清水清且寒江有香草雜以蘭黄鵠高飛離或翻開弓射鵠令我生萬年晉曰夏苗田言大普蒐田為苗除害也北齊曰服江南言梁主蕭繹來附化也逺如期亦曰逺期漢太樂食舉十三曲一曰鹿鳴二曰重來三曰初造四曰俠安五曰來歸六曰逺期七曰有所思八曰明星九曰清凉十曰渉大海十一曰大置十二曰承元氣十三曰海淡淡魏時以逺期承元氣海淡淡三曲多不通利故省之及普荀勗傅元之流並為歌辭普曰仲秋獮田言蒐狩以時雖有文徳不廢武事也北齊曰刑罰中言孝昭舉直措枉獄訟無怨也石留普曰順天道言仲冬大閲用武修文也北齊曰逺夷至言至海外西夷諸國遣使朝貢也務成普曰唐堯言聖皇陟位化被四表也北齊曰嘉瑞臻言聖主應期河清龍見符瑞總至也元雲北齊曰成禮樂言功成化洽制禮作樂也黄爵行晉曰伯益言赤鳥衘書有周以興今聖皇受命神雀來也釣竿篇伯常子避仇河濵為漁父其妻思之而為釣竿歌每至河側輙歌之後司馬相如作釣竿詩遂𫝊以為樂曲漢鞞舞歌五曲關中一作東有賢女魏曰明明魏皇帝普曰洪業篇章和二年中漢章帝所造魏曰太和有聖帝普曰天命篇樂久長魏曰魏歴長普曰景皇篇四方皇魏曰天生烝民普曰大晉篇殿前生桂樹魏曰為君既不易晉曰明君篇右鞞舞之歌五曲未詳所始漢代燕享則用之傅毅張衡所賦皆其事也章和二年中則章帝所作舊辭並亡曹植鞞舞詩序云故西園鼓吹李堅者能鞞舞遭世亂越關西随將軍段煨先帝聞其舊妓下書召堅堅年踰七十中間廢而不為又古曲甚多謬誤異代之文未必相襲故依前曲作新歌五篇晉泰始中又製其辭焉按鞞舞本漢巴渝舞高祖自蜀漢伐楚其人勇而善鬬好為歌舞帝觀之曰武王伐紂之歌使工習之號曰巴渝舞其舞曲四篇一曰矛渝二曰安弩渝三曰安臺四曰行辭其辭既古莫能曉句讀魏使王粲制其辭粲問巴渝帥而得歌之本意故改為矛渝新福弩渝新福安臺新福行辭新福四歌以述魏徳其舞故常六佾桓元將僭位尚書殿中郎袁明子啓増滿八佾梁復號巴渝隋文帝以非正典罷之拂舞歌五曲魏武帝分碣石為四曲共八曲白鳩篇亦曰白鳬舞以其歌且舞也亦入清商曲濟濟篇獨禄篇李白作獨鹿碣石篇普樂奏魏武帝分為四篇一曰觀滄海二曰冬十月三曰上不同四曰龜雖夀淮南王篇舊説淮南王安求仙禮方士遂與八公相攜而去莫知所在其家臣小山之徒思戀不已乃作是歌言安仙去也此則恢誕家為此説耳不然亦是後人附㑹也按晉楊泓舞序云自到江南見白符舞符即鳬也白鳬舞即白鳩舞也白鳬之辭出於吳其本歌云平平白鳬思我君恵集我金堂謂晉為金徳吳人患孫皓虐政而思從普也然碣石章又出於魏武則知拂舞五篇並晉人採集三國之前所作惟白鳬不用吳舊歌而更作之命以白鳩焉鼔角横吹十五曲黄鵠一作鶴吟隴頭吟亦曰隴頭水望行人折楊柳關山月洛陽道長安道豪俠行亦曰俠客行梅花落胡笳曲紫騮馬驄馬復有驄馬驅非横吹曲雨雪劉生不知何代人觀齊梁以來所為劉生之辭皆稱其任俠周遊三秦間或云抱劎專征為符節郎古劒行洛陽公子行右鼓角横吹曲按周禮以鼖鼓鼓軍事舊云用角其説謂蚩尤氏帥魑魅與黄帝戰于涿鹿之野帝命吹角為龍吟以禦之其後魏武帝北征烏桓越渉沙漠軍士聞之悲思於是減為中鳴尤更悲矣按此有十五曲後之角工所𫝊者只得梅花耳今太常所試樂工第三等五十曲抽試十五曲及鳴角人習到大梅花小梅花可汗曲是梅花又有大小之别也然角之制始於邊中國所用鼓角蓋習邊角而為也黄帝之説多是謬悠况鼓角與邊角聲類既同故其曲亦相參用而梅花之辭本於胡笳今人謂角鳴為邊聲初由邊徼所𫝊也關山月洛陽道長安道豪俠行梅花落紫騮馬驄馬八曲後代所加也邊角十曲黄鵠吟隴角頭吟亦曰隴頭水出關入關出塞入塞折楊柳黄覃子赤子楊望行人右邊角者本以應胡笳之聲後漸用之故横吹有雙角即邊樂也漢博望侯張騫入西域𫝊其法惟得摩訶兠勒二曲是為邊曲之本摩訶兠勒皆邊語也協律校尉李延年因邊曲更新聲二十八解其法乗輿以為武樂後漢以給邊將魏晉以來二十八解不復具存但用十曲而已鼓角之本出於邊角相和歌三十曲江南曲梁簡文辭云陽春路時使佳人度枝中水上青併歸長楊樹拂地桃花飛清風吹人光照衣景將夕擲黄金留上客古辭古之詩即今之曲也由梁武之後皆能音律故創激越之辭發靡麗之音世所好尚至今曲與詩分為二矣簡文辭美則美矣其如失古意何度關山亦曰度關曲古辭曹魏樂奏長歌行古辭按長短歌行皆言其歌聲發越自有短長魏武燕歌行曰短歌微吟不能長傅元艶歌行曰咄來長歌續短歌是也崔豹古今注言長歌乃續命之長吳兢亦如是説謬哉薤露歌亦曰薤露行亦曰天地喪歌亦曰挽柩歌田横門人作辭云薤上朝露何易晞薤露明朝更復落人死一去何時歸蒿里誰家地聚歛魂魄無賢愚鬼伯一何相催促今乃不得少踟蹰按左傳齊將與吳戰于艾陵公孫夏使其徒歌虞殯注云送𦵏歌也是古有喪歌矣使挽柩者歌之故為喪歌亦謂挽柩歌此二章之作乃田横門人歌以𦵏横也但悲其亡耳亦無怨言足見古人之用心任所遇而已未嘗尤人焉本一詩也而有二章至漢武時李延年分為二曲薤露送王公貴人蒿里送士大夫庶人當其時聲亦自有别所以為二曲後人通謂之挽歌者以其聲無異也故不復存其名薤露亦謂之泰山吟行者言人死則精爽歸于泰山蒿里𫝊亦曰蒿里行亦曰泰山吟行喪歌亦曰挽柩歌鷄鳴亦曰鷄鳴高樹顚蓋本古辭所謂鷄鳴高樹顛狗吠深巷中也對酒行古辭曹魏樂奏烏生八九子古辭烏生八九子端坐秦氏桂樹間言烏母生子本在南山巖石間而來為秦氏所彈白鹿在苑中人得以為脯黄鵠摩天鯉魚在深淵人可得而煑之皆由有所欲也此言為隱者戒耳今劉孝威之詩但言烏而已平陵東古辭云平陵東松栢桐不知何人刦義公取第一句以命篇此則漢翟義門人所作也義為東郡太守起兵誅王莽不克而死門人作是歌以哀之陌上桑亦曰艶歌羅敷行亦曰日出東南隅行亦曰日出行亦曰採桑曲曹魏改曰望雲曲按古辭陌上桑有二此則為羅敷也羅敷者邯鄲秦氏女也嫁千乗王仁仁後為趙王家令羅敷採桑於陌上趙王登臺見而悦之置酒欲奪焉羅敷善彈筝作陌上桑以自明不從其辭稱羅敷採桑陌上為使君所邀羅敷甚誇其夫為侍中郎以拒之或言與舊説不同然侍中郎漢官也恐仁初為趙王家令後為漢侍中郎也呼趙王為使君者郎君之稱本於漢恐言使君者猶今言使長也其辭有日出東南隅照我秦氏樓之句故亦曰日出東南隅行亦曰日出行别有秋胡行其事與此不同以其亦名陌上桑致後人差互其説如王筠陌上桑云秋胡始停馬羅敷未滿箱蓋合為一事也短歌行亦曰鰕䱉晉樂奏燕歌行晉樂奏燕北地也是歌始於魏文帝其辭云秋風蕭瑟天氣凉草木揺落露為霜羣燕辭歸鴈南翔念君客游思斷腸慊慊思歸戀故鄉何為淹留寄他方賤妾煢煢守空房憂來思君不敢忘不覺淚下沾衣裳援琴鳴絃發清商短歌㣲吟不能長明月皎皎照我牀星漢西流夜未央牽牛織女遥相望爾獨何辜限河梁秋胡行亦曰陌上桑亦曰採桑亦曰在昔魯有秋胡子納妻五日而官於陳五年乃歸未至家於路傍見婦人採桑色美説之下車曰力田不如逄豐年力耕不如見公卿吾有金願以與汝婦人曰婦人當採桑力作以養舅姑不願人之金秋胡歸奉金以遺母母使呼婦婦至乃向採桑者婦惡其行因東投河而死後人哀之而作秋胡行故亦曰陌上桑亦曰採桑後人多與羅敷行無别苦寒行亦曰吁嗟晉樂奏古辭云北上太行山艱哉何巍巍羊腸坂詰屈車輪為之摧樹木何蕭瑟北風聲正悲熊羆對我蹲虎豹夾道啼溪谷少人民雪落何霏霏延頸長嘆息逺行多所懐我心何怫鬱思欲一東歸水深橋梁絶中路正徘徊迷惑失故路薄暮無宿栖行行日已逺人馬同時饑擔囊行取薪斧氷持作糜悲彼東山詩悠悠使我哀董逃行古辭云吾欲上謁從高山山頭危險道路難言五嶽之上皆以黄金為宫闕多靈獸仙草以人君多欲夀考求長生不死之藥故令天神擁䕶疑此辭作於漢武之時蓋武帝有求仙之興董逃者古仙人也後漢游童競歌之有董卓之亂卒以逃亡此則謡䜟之言因其所尚之歌故有是事實非起於後漢也梁簡文詠行幸甘泉云董逃拜金紫賢妻侍禁中又云不羡神仙侣排煙逺駕鴻所言仙事也然陸機謝靈運之作皆言節物易徂可及時行樂晉傅休奕九秋十二篇有擬董逃行但言夫婦離别各随其意塘上行亦曰塘上辛苦行晉樂奏或云甄后所作或云魏文帝作按古歌曰蒲生我池中緑葉何離離然觀陸機二篇之作皆言婦人見棄於君之情也舊云甄后被讒見棄而作必是也善哉行亦曰日苦短古辭云來日大難口燥脣乾言人命不可保當樂見親犮求長生術與王喬八公游也東門行晉樂奏古辭云出東門不願歸言士有貧不安其居㧞劒將去妻子牽衣留之願共餔糜斯足不求富貴也西門行古辭煌煌京洛行晉樂奏豔歌何嘗行亦曰飛鶴行古辭云飛來雙白鶴乃從西北來言雌病雄不能負之而去五里一返顧六里一徘徊雖遇新相知終傷生别離歩出夏東門行亦曰隴西行古辭野田黄雀行晉樂奏滿歌行大曲古辭櫂歌行晉樂奏魏明帝將用舟師平吳故作是歌以明王化所及後之作者多言方舟鼔櫂之興耳鴈門太守行按古辭是後漢孝和時洛陽令王渙也渙嘗為安定太守有安邊恤民之功百姓歌之然此則鴈門太守若非其事偶相合則是作詩者誤以安定為鴈門白頭吟西京雜記司馬相如將聘茂陵人女為妾文君作白頭吟以自絶相如乃止後人作白頭吟皆是以直道被讒見疎於君故古辭云淒淒重淒淒嫁娶不須啼願得一心人頭白不相離氣出唱亦曰惟乾精列古辭東光右漢舊歌也曰相和歌者並漢世街陌謳謡之辭絲竹更相和令執節者歌之按詩南陔之三笙以和鹿鳴之三雅由庚之三笙以和魚麗之三雅者相和歌之道也本一部魏明帝分為二部更遞夜宿始十七曲魏晉之世朱生善琵琶宋識善擊節列和善吹笛等復為十三曲自短歌行以下晉荀朂採撰舊詩施用以代漢魏故其數廣焉相和歌吟嘆四曲大雅吟王昭君楚妃嘆王子喬右張永元嘉技録四曲也古有八曲曰小雅吟蜀琴頭楚王吟東武吟四曲闕相和歌四絃一曲蜀國四絃右張永元嘉技録有四絃一曲蜀國四絃是也居相和之末三調之首古有四曲其張女四絃李延年四絃嚴卯四絃三曲闕蜀國四絃節家舊有六解宋歌有五解今亦闕相和歌平調七曲長歌行短歌行亦曰鰕䱉猛虎行君子行燕歌行從軍行鞠歌行右宋王僧䖍大明三年宴樂技録平調有七曲也相和歌清調六曲三婦豔詩一曲附苦寒行豫章行董逃行相逄狹路間行亦曰長安有狹斜行亦曰相逄行塘上行秋胡行三婦豔詩亦曰大婦織綺羅中婦織流黄右王僧䖍技録清調六曲也其三婦豔詩技録不載張氏云非管絃音聲所寄似是命笛理絃之餘相和歌瑟調三十八曲善哉行亦曰日苦短歩出夏門行亦曰隴西行折楊柳西門行東門行東西門行却東西門行順東西門行飲馬長城窟行亦曰飲馬行上留田行新城安樂宫行婦病行孤子生行亦曰孤兒行亦曰放歌行大牆上蒿行野田黄雀行釣竿行臨高臺行長安城西行武舍之中行鴈門太守行豔歌何嘗行亦曰飛鵠行豔歌福鍾行豔歌雙鴻行煌煌京洛行帝王所居行門有車馬客行牆上難為趨行日重光行月重輪行蜀道難櫂歌行有所思行蒲坂行採梨橘行白楊行胡無人行青龍行公無渡河行亦曰箜篌行右王僧䖍技録相和歌楚調十曲白頭吟行泰山吟行梁甫吟行東武吟亦曰東武琵琶吟行怨詩行亦曰怨歌行亦曰明月照高樓長門怨亦曰阿嬌怨班媫妤亦曰媫妤怨娥眉怨玉階怨雜怨右王僧䖍技録五曲自長門怨以下五曲續附大曲十五曲東門東門行西山折楊柳行羅敷豔歌羅敷行西門西門行黙黙折楊柳行園桃煌煌京洛行白鵠豔歌何嘗行碣石歩出夏門行何嘗豔歌何嘗行置酒野田黄爵行為樂滿歌行夏門歩出夏門行王者布大化櫂歌行洛陽令鴈門太守行白頭吟白紵歌一曲古辭梁武改為子夜吳聲四時歌四曲共五曲白紵歌白紵歌有白紵舞白鳬歌有白鳬舞並吳人之歌舞也吳地出紵又江鄉水國自多鳬鶩故興其所見以寓意焉始則田野之作後乃大樂氏用焉其音入清商調故清商七曲有子夜者即白紵也在吳歌為白紵在雅歌為子夜梁武令沈約更制其辭焉古為云白紵白質如輕雲色似銀制以為袍餘作巾袍以光軀巾拂塵右白紵與子夜一曲也在吳為白紵在晉為子夜故梁武本白紵而為子夜四時歌後之為此歌者曰白紵則一曲曰子夜則四曲今取白紵於白紵取四時歌於子夜其實一也清商曲七曲附五十曲并夷樂四十一曲除内七曲同實計八十四曲子夜亦曰子夜吳聲四時歌亦曰子夜吳歌晉有女子名子夜作是歌其聲甚哀晉孝武太元中琅邪王軻家有鬼歌之子夜之音同於白紵皆清商調也故梁武本白紵而為子夜吳聲四時歌明此子夜亦有晉聲者其實不離清商前溪晉車騎將軍沈玩所作舞曲也烏夜啼宋臨川王義慶所作宋元嘉中徙彭城王義康於豫章郡義慶時為江州相見而哭文帝聞而恠之召還宅義慶大懼妓妾聞烏夜啼叩齋閤云明日應有赦及旦改南兖州刺史因作此歌故其辭云籠窻窻不開烏夜啼夜夜望郎來蓋詠其妾也石城樂宋臧質所作也石城在景陵質為景陵太守於城上見羣少年歌詠之樂因為此辭其辭曰生長石城下開門對城樓城中美少年出入相依投莫愁樂出於石城之作石城有女子名莫愁善歌謡故石城之外復有莫愁古又有莫愁洛陽女非此古辭云莫愁在何處莫愁石城西艇子打両漿催送莫愁來來音釐襄陽樂宋隋王誕始為襄陽郡元嘉末仍為雍州夜聞諸女歌謡因為之辭焉宋劉道彦為雍州有恵化百姓歌之謂之襄陽樂非此也古辭云朝發襄陽城暮至大堤宿大堤諸女兒花豔驚郎目王昭君亦曰王嬙亦曰王明君名嬙字昭君避晉文諱改曰明君漢元帝時匈奴盛請㛰於漢帝以後宫良家子昭君配焉元帝之時後宫掖庭員數多帝不及徧識令毛延夀畫圖延夀取金於後宫而昭君不與故陋其姿及昭君既出宫帝為愕然殺延夀其時公主嫁烏孫為馬上彈琵琶作樂以慰其道路之思其事多見載籍其辭云吾家嫁我兮天一方逺託異國兮烏孫王穹廬為室兮㫋為牆㫋帳也按漢書烏孫使使獻馬願得尚公主乃遣江都王建女為公主以妻烏孫焉此則是也若以為延夀畫圖之説則委巷之談流入風騷人口中故供其賦詠至今不絶右按清商曲亦謂之清樂出於清商三調所謂平調清調瑟調是也三調者乃周房中樂之遺聲漢魏相繼至晉不絶永嘉之亂中朝舊曲散落江右而清商舊樂猶𫝊江左所謂梁宋新聲是也元魏孝文纂漢收其所獲南音謂之清商樂即此等是也隋平陳因置清商府𫝊採舊曲若巴渝白紵等曲皆在焉自此漸廣雖經喪亂至唐武后時猶存六十三曲其𫝊者有焉白雪楚曲也或云周曲唐顯慶三年十月太常寺奏按張華博物志云白雪是黄帝使素女鼓五十絃瑟曲名以其調高人和遂寡自宋玉以來迄今千祀未有能歌白雪者臣今准勑依琴中舊曲定其宫商然後敎習並合於歌輙以御製雪詩為白雪歌辭又樂府奏正曲之後皆有送聲君唱臣和事彰前史輙取侍中許敬宗等奏和雪詩十六首以為送聲各十六節上善之乃付太常編於樂府公莫舞即巾舞也蓋取高祖鴻門㑹飲項伯以袖隔之使不得害高帝且語莊云公莫古人相呼為公莫害漢王也亦謂之公莫曲後之舞者用巾蓋像項伯衣袖之遺式也本即舞後人因為辭焉巴渝本舞名即鞞舞也漢高自蜀漢將定三秦閬中范因率賨人以從為前鋒號板楯蠻勇而善鬬及定三秦封因為閬中侯復賨人七姓其俗喜舞高帝使樂人習之閬中有渝水因以為名故曰巴渝舞舞曲四篇其辭既古莫能曉其句讀魏使王粲改創其調晉及江左皆制其辭明君明之君漢鞞舞曲梁武改其曲辭以歌君徳鐸舞漢曲白鳩吳拂舞曲白紵吳舞子夜晉曲吳聲四時歌梁曲前溪晉曲阿子歌亦曰歡聞歌晉穆帝升平初童子輩或歌於道歌畢輙呼阿子汝聞否又呼歡聞否以為送聲後人演其聲為二曲宋齊間用莎乙子之語稍訛異也團扇郎晉中書令王珉好執白團扇其侍人謝芳歌之或云珉與嫂婢謝芳有情嫂鞭撻過苦婢善歌而作此曲其辭云團扇復團扇持許自遮面憔悴無復理羞與郎相見懊憹憹亦作惱石崇侍人緑珠所作絲布澁難縫一曲而已東晉隆安初民間訛謡之曲云春草可攬結女兒可攬擷齊高帝謂之中朝歌長史變晉司徒左長史王廞臨敗所作丁督䕶亦曰丁都䕶亦曰督䕶歌宋武帝女夫徐逵之為彭城内史為魯軌所殺武帝使内直督䕶丁旿收殯之逵之妻呼旿至閣下自問殯送之事每問輙歎息曰丁督䕶其聲甚哀後人因其聲廣其曲焉其辭二首一曰督䕶上征去儂亦惡聞許願作石尤風四面斷行旅黄河流無極洛陽數千里轗軻戎旅間何由見歡子讀曲宋人為彭城王義康作其歌曰死罪劉領軍誤殺劉四弟古今樂録曰元嘉十七年袁后崩百官不敢聲歌或因酒燕只竊聲讀曲細吟而已烏夜啼宋臨川王義慶作估客樂齊武帝所作也武帝為布衣時常游樊鄧踐阼已後追憶徃事而作是歌使太樂今劉瑶教習百日無成或啟釋寳月善音律帝使寳月奏之便就勑歌者重為感憶之聲梁改為商旅行其辭二首一曰昔經樊鄧後假楫梅根渚感昔追徃事意滿情不叙二曰有信數寄書無信長相憶莫作缾落井一去無消息石城樂宋臧質作莫愁出於石城襄陽亦曰襄陽樂宋隋王誕作烏夜飛亦曰棲烏夜飛宋荆州刺史沈攸之所作也攸之舉兵發荆州未敗之前思歸京師所以歌之曰白日落西山還去來楊叛兒亦曰西曲楊叛兒本童謡也齊隆昌時女巫之子曰楊旻随母入内及長為太后所寵愛童謡云楊婆兒共戲來語訛轉婆為叛也雅歌未詳所起驍壺投壺樂也隋煬帝所造以投壺有躍矢為驍壺今謂之驍壺是常林歡常林即長林也今之荆門長林縣是也樂人誤以長為常此則梁宋間曲也宋代以荆雍為南方重鎭皆王子為之牧江左辭詠莫不稱之以為樂土故宋隋王誕作襄陽樂齊武追憶樊鄧作估客樂是也梁簡文辭云分手桃林岸遂别峴山頭若欲寄音信漢水向東流三洲商人之歌也商客數由巴陵三江口徃還因共作此歌採桑度三洲曲所出也與羅敷秋胡行所謂採桑者異矣玉樹後庭花玉樹後庭花與堂堂黄鸝留金釵兩臂垂凡四曲皆陳後主所作常與宫女學士及朝臣相唱和為詩太樂令何胥採其尤輕豔者以為此曲堂堂陳後主所作者唐高宗朝常歌之泛龍舟隋煬帝幸江都宫所作又令太樂令白明逹造新聲剏萬嵗樂藏鈎樂七夕相逄樂舞席同心髻玉女行觴神仙留客擲磚續命鬭鷄子鬬百草還舊宫長樂花十二時等曲掩抑摧藏哀音斷絶春江花月夜隋煬帝所作也凡二首一曰暮江平不動春花滿正開流波將月去潮水帯星來二曰夜露含花氣春潭漾月暉漢水逄游女湘川値兩妃右三十三曲明之君雅歌各二首四時歌四首凡三十八曲又有四曲上林鳳雛平折命嘯其聲與辭皆訛失又有三曲曰平調清調瑟調有聲無辭又蔡邕云清商曲其詩不足採有出郭西門陸地行車俠鐘朱堂寢奉法五曲徃徃在漢時所謂清商者但尚其音爾晉宋間始尚辭觀吳兢所纂七曲皆晉宋間曲也故知梁宋新聲有自來矣因隋文帝篤好清樂以為華夏正聲故特盛於隋焉大業中煬帝乃定清樂西凉龜兹天竺康國疏勒安國高麗禮畢以為九部西凉五曲揚澤新聲豐神白馬闐永世樂萬世解于佛舞龜兹萬嵗樂藏鈎樂七夕相逄樂席玉女行觴泛神仙留客鷄擲磚續命草投壺樂舞同心髻龍舟鬬子鬬百解善善伽還舊宫小長樂花聖十二時曲勒摩尼婆兒舞天舞明樂疏鹽天竺二曲沙石彊歌天曲樂舞康國四曲戢殿農和正歌㧞末奚波地舞曲前地舞曲舞恵地曲疏勒三曲兀利死遜歌解逺服舞監曲安國三曲附薩單時歌居和祗解末奚舞高麗二曲芝栖歌芝栖舞禮畢二曲單交路行散花舞禮畢者九部樂終則陳之唐高祖即位仍隋制亦設九部樂曰燕樂伎曰清商伎曰西凉伎曰天竺伎曰高麗伎曰龜兹伎曰安國伎曰疏勒伎曰康國伎其實皆主於清商焉琴操五十七曲九引十二操三十六雜曲思歸引亦曰離拘操舊説衛賢女之所作也邵王聞其賢而聘之未至而王死太子留之不聽拘於深宫思歸不得援琴而歌曲終乃縊初但有聲至晉石崇始作辭但述其思歸河陽所居而已劉孝威胡地憑良馬亦只言思歸之狀走馬引樗里牧恭所造也為父報仇殺人而藏山谷中有天馬夜降鳴于其室聞而驚以為吏追已犇逃入川澤中援琴而彈之作天馬之聲命之曰走馬引又張敞為京兆尹無威儀時罷朝㑹走馬章臺街時人鄙笑之有毆君馬者路傍兒之語故張率詩曰吾畏路傍兒霹靂引亦曰吟白虎亦曰舞元鶴楚商梁所作商梁出游九臯之澤遇風雷霹靂懼而歸作此引又晉平公召師曠援琴而鼓清徴一奏有元鶴二八來集再奏而列三奏延頸而鳴舒翼而舞所謂舞元鶴者蓋本於此徃徃其音不殊故合為一不然則本舞元鶴之聲而為霹靂引烈女引亦曰操楚樊姬作也伯妃引魯伯妃作琴引秦時屠高門作楚引亦曰龍邱引楚龍邱子高引貞女引魯女所作箜篌引亦曰公無渡河亦曰箜篌謡朝鮮津卒霍里子高妻麗玉所作子高晨起刺船見一白首狂夫被髮攜壺亂流而渡其妻随呼止之不及遂援箜篌而鼓之歌曰公無渡河公終渡河公堕而死當柰公何聲音悽愴曲終亦投河而死子高還以其聲語麗玉玉傷之乃引箜篌寫其聲聞者莫不堕淚麗玊以其聲𫝊鄰女麗容名曰箜篌引舊史稱漢武帝滅南粤祠太一后土令樂人侯暉依琴造坎侯坎者聲也侯者工人姓也後語訛坎為空然以臣所見今大樂有箜篌器何得如此説右九引將歸操世言孔子作孔子之趙聞殺竇鳴犢賢者也孔子知必不用已故將歸其辭曰翺翔于衛復我舊居從吾所好其樂只且猗蘭操亦曰幽蘭操世言孔子作孔子傷不逄時以蘭薺麥自喻且云我雖不用於我何傷言霜雪之時薺麥乃茂蘭者取其芬香也今此操只言猗蘭蓋省辭也龜山操世言孔子作季桓子受齊女樂孔子欲諫不得退而望魯之龜山而作此曲言位尊非其人嗟予莫之依也或言季氏若龜山之蔽魯越裳操世言周公作越裳國獻白雉周公作是歌拘幽操世言文王拘於羑里而作岐山操世言周公為太王作述古豳公之績患時黷武也或云周人為文王所作履霜操世言尹吉甫子伯竒無罪為後母所譖見逐自傷而作也追帝舜之事明怨其身之不為父母憐也言人之不得於父母者當益親也雉朝飛操世言齊宣王時處士犢牧子作也年七十無妻採薪於野見雉雌雄雙飛乃仰天而歎曰聖王在上恩及草木鳥獸而我不獲因援琴而歌其聲中絶魏武帝有宫人盧女者陰叔之妹七嵗入漢宫學鼓琴琴特鳴異為新聲能𫝊此曲至魏明帝崩出降為尹更生妻故得此聲不絶按揚雄琴清英曰雉朝飛操者衛女傅母之所作也衛女嫁於齊太子中道聞太子死問傅母曰且往當喪喪畢不肯歸終之以死傅母悔之取女所自操琴於冢上鼓之忽二雉俱出墓中𫝊母撫雉曰女果為雉耶言未畢俱飛而起不見所往𫝊母悲痛援琴作操曰雉朝飛據雄所記大槩與思歸操之言相類恐是訛易别鶴操商陵牧子娶妻五年無子父兄為之改娶其妻聞之中夜起倚戶悲歌牧子感之為作此曲或云其時亦有䨥鶴悲鳴故因以命操殘形操世言曾子夢一狸不見其首以為不祥而作此曲水僊操世言伯牙所作伯牙學鼓琴於成連先生三年而成至於精神寂寞情之專一尚未能也成連云吾師子春在海中能移人情乃與伯牙延望無人至蓬萊山留伯牙曰吾將迎吾師刺船而去旬時不返但聞海上水汨沒漰澌之聲山林窅㝠羣鳥悲號愴然歎曰先生將移我情乃援琴而歌之曲終成連刺船而還伯牙遂妙絶天下懐陵操世言伯牙所作右十二操韓愈取十操以為文王周公孔子曾子伯竒犢牧子所作則聖賢之事也故取之水僊懐陵二操皆伯牙所作則工技之為也故削之嗚呼尋聲徇迹不識其所由者如此九流之學皆有義所述者無非聖賢之事然而君子不取焉者為多誣言飾事以實其意所貴乎儒者為能通今古審是非胷中了然異端邪説無得而惑也退之平日所以自待為如何所以作十操以貽訓後世者為如何臣有以知其為邪説異端所襲愚師瞽史所移也琴操所言者何嘗有是事琴之始也有聲無辭但善音之人欲寫其幽懐隠思而無所憑依故取古之人悲憂不遇之事而以命操或有其人而無其事或有其事又非其人或得古人之影響又從而滋蔓之君子之所取者但取其聲而已取其聲之義而非取其事之義君子之於世多不遇小人之於世多得志故君子之於琴瑟取其聲而寫所寓焉豈尚於事辭哉若以事辭為尚則自有六經聖人所説之言而何取於工伎所志之事哉琴工之為是説者亦不敢鑿空以厚誣於人但借古人姓名而引其所寓耳何獨琴哉百家九流皆有如此惟儒家開大道紀實事為天下後世所取正也蓋百家九流之書皆載理無所繫着則取古之聖賢之名而以已意納之於其事之域也且以卜筮家論之最與此相近也如以文王拘羑里而得明夷文王拘羑里或有之何嘗有明夷乎又何嘗有箕子遇害之事乎孔子問伯牛而得益孔子問伯牛實有之何嘗有益乎又何嘗有過其祖之語乎琴操之所紀者皆此類也又如稗官之流其理只在唇舌間而其事亦有記載虞舜之父杞梁之妻於經𫝊所言者數十言耳彼則演成萬千言東方朔三山之求諸葛亮九曲之勢於史籍無其事彼則肆為出入操之所紀者又此類也顧彼亦豈欲為此誣罔之事乎正為彼之意向如此不得不如此不説無以暢其胷中也又如兎園之學其來已久其所言者無非周孔之事而不得為正學不為學者所取信者以意卑淺而言陋俗也今觀琴曲之言正兎園之流也但其遺聲流雅不與他樂並肩故君子所尚焉或曰退之之意不為其事而作也為時事而作也曰如此所言則白樂天之諷諭是矣若懲古事以為言則隋堤柳可以戒亡國若指今事以為言則井底引銀瓶可以止淫奔何必取異端邪説街談巷語以寓其意乎同是誕言同是飾説伯牙何誅焉臣今論此非好攻古人也正欲慿此開學者見識之門使是非不雜揉其間故所得則精所見則明無古無今無愚無智無是無非無彼無已無異無同槩之以正道爍爍乎如太陽正照妖氛邪氣不可干也河間雜弄二十一章蔡氏五弄雙鳳雜鸞歸風送逺幽蘭白雪太常丞吕才以唐高宗雪詩為白雪歌被之以琴長清短清長側短側清調大遊小遊明君胡笳白魚歎廣陵散嵇康死後此曲遂絶往往後人本舊名而别出新聲也楚妃歎風入松烏夜啼楚明光石上流泉臨汝侯子安之流漸涸雙燕離陽春弄悦人弄連珠弄中揮清暢志清蟹行清看客清便僻清婉轉清右三十六雜曲遺聲序論遺聲者逸詩之流也今以義類相從分二十五正門二十附門總四百十八曲無非雅言幽思當採其目以俟可考今採其詩以入系聲樂府古調二十四曲古辭十九曲無名氏擬行行重行行陸機古意李白闕淫思古意顔峻古樂府權徳輿征戍十五曲將帥城塞校獵戎行曲逺征人南征曲老將行將軍行霍將軍行司馬將軍歌長城築城古築城曲塞上曲塞下曲古塞曲邊思校獵曲遊俠二十一遊俠篇俠客行博陵王宫俠曲臨江王節士歌少年子少年行剌少年邯鄲少年行長安少年行羽林郎輕薄篇劒客結客結客少年場曹植詩云結客少年場報怨洛北芒故取一句沭浴子結襪子結援子壯士吟公子行燉煌子扶風豪士歌行樂十八曲遊子移遊子吟嘉遊亦曰喜春遊王孫遊棗下何纂纂攜手曲樂未央永明樂今樂歌吾生作宴樂今日樂相樂苦樂相倚曲唐元稹作言人情不常恩寵反覆專引班姬趙飛燕事為言合歡詩晉楊方所作婦人也其詩言我情與君猶形影不相離願食共並根穗飲共連理盃衣同雙絲絹寢共無縫裯坐必接膝行必攜手如鳥同心如魚比目利斷金石密逾膠漆焉定情篇漢繁欽所作言婦人不能自相悦媚乃解衣服玩好致之用叙綢繆之志若臂環致拳拳指環致勤勤耳珠致區區香囊致扣扣跳脱致契濶佩玉結恩情自以為至矣而期於山隅山陽山西山北終而不答乃自傷悔還臺樂河曲遊行幸甘泉宫宫中行樂佳麗四十七曲女功才慧貞節美女篇亦曰齊瑟行亦曰齊吟美人織女辭錦石擣流黄丹陽孟珠歌錢塘蘇小小歌孫綽情人碧玉歌中山王孺子妾歌孺子者幼小之稱漢書曰詔賜中山王噲及孺子妾并未央才人歌詩四篇吳王夫差女紫玉歌董嬌饒烏孫公主漢武帝以江都王女細君為公主嫁烏孫昆彌至其國别治宫室嵗時一再㑹公主悲怨而作是詩情人桃葉歌亦曰千金意桃葉者王獻之妾名縁於篤愛所以作歌或云是童謡桃葉復桃葉桃葉連桃根相憐兩樂事獨使我殷勤又曰桃葉復桃葉渡江不用楫但道無所苦我自楫迎汝李夫人漢武帝喪李夫人令寫眞甘泉殿又令方士合靈藥曰反魂香以降夫人之魂髣髴其狀背燈隔帳不得語楚妃吟楚妃歎楚明妃曲杜秋娘金陵女年十五為李錡妾錡叛滅籍之入宫有寵於景陵穆宗立命為皇子傅母皇子封章王鄭注事被罪放還故鄉其辭云勸君莫惜金縷衣勸君須惜少年時花開堪折直須折莫待無花空折枝女秋蘭木蘭辭木蘭女子也其父被調從征木蘭代父徃防邊獲功而歸與人同伴十三年而人不知其為女子故其詩之卒章冇雄兎脚撲朔雌兎眼迷離兩兎傍地走馬能知我是雄雌之句昭君歎劉勲妻焦仲卿妻杞梁妻歌杞殖妻之妺朝日所作也殖戰死妻泣曰上則無父中則無夫下則無子人生之苦至矣乃放聲長號杞城為之頽遂投水死其妹悲之為作是歌梁乃殖字湘夫人亦曰湘君亦曰湘妃堯二女長曰娥皇次曰女英為舜二妃舜南廵二妃追随不及沒於湘渚今有其祠未央才人歌邯鄲才人嫁為厮卒婦愛妾換馬胡姬年十五黄門倡舞媚娘舞亦作武唐則天朝常歌此曲五媚娘妾薄命亦曰惟日月妾安所居皚如山上雪燕美人映水曲蠶絲歌貞女孀婦吟麗人行上陽白髮人唐天寳五載已後楊貴妃專寵後宫人無復進幸矣六宫冇美色者輒置别所上陽是其一也貞元中尚存焉繚綾時世粧王家少婦委舊命秦女卷衣靜女辭别離十九曲迎客生别離離歌長别離河梁别春别曲自君之出矣送歸曲思歸篇送逺曲母别子寄衣曲迎客曲送客曲逺别離久别離古離别怨别離怨一作雜怨井底引銀瓶怨思二十五曲傷歌行怨辭青樓怨春女怨秋閨怨閨怨寒夜怨征婦怨綵書怨鳳樓怨緑墀怨四愁七哀長相思憂且吟獨處愁思公子思君去時行洛陽夫七思詩湘妃怨娼樓怨西宫秋怨西宫春怨遺所思獨不見歌舞二十一曲技能浩歌行緩歌行前緩聲歌會吟行同聲歌勞歌悲歌行上聲歌此因上聲促柱得名或用一調或用無調名如古歌辭所謂哀思之音不合中和梁武因之改辭無復雅句大垂手舞而垂手也小垂手獨搖手亦然其辭云垂手忽迢迢飛燕掌中嬌羅衫恣風引輕薄任情搖詎似長沙地促舞不回腰小垂手其辭云舞女出西秦躡節舞陽春且復小垂手廣袖拂紅塵折腰膺兩笛頓足轉雙巾娥眉與慢臉見此空愁人鈞天曲豔歌行古辭有翩翩堂前燕冬藏夏來見言兄弟流宕他之或言魏武始作童謡入朝曲清歌發獨舞調嘯辭急聲也至今猶存正古樂三臺辭舞辭也今猶存齊謳行吳趨曲齊謳者齊人之歌吳趨者吳人之舞故陸機所引牛山陸厥所言稷下皆齊也閭門乃吳門闔閭所行亦名破楚門千載而下欲為齊謳者必本齊音欲為吳趨者必本吳調絲竹十一曲挾琴歌相如琴薄暮動絃歌鼓瑟有所思趙瑟秦箏龍笛曲短簫鳳笙華原磬唐天寳中始廢泗濵磬用華原石代之詢諸磬人則曰故老云泗濵磬石調之不能和得華原石考之乃和由是不改五絃彈觴酌七曲羽觴飛上苑前有一樽酒城南偶燕當置酒當壚獨酌謡山人勸酒宫苑十九曲樓臺門闕魏宫辭玉華宫長信宫連昌宫楚宫行雍臺凌雲臺新成長樂宫登樓曲青樓曲建興苑芳林篇上林閶闔篇駕言出北闕坐玉堂内殿賦新詩西園遊上才春宫曲都邑三十四曲名都篇亦曰齊瑟行京兆歌左馮翊歌京兆京師也馮翊在左扶風在右謂之三輔京兆今永興馮翊今同州扶風今鳳翔扶風歌荆州樂燉煌樂凉州之地也青陽樂今青州潯陽樂今江州夀陽樂南平穆王為荆河州作也凉州樂今屬西夏按今之樂有伊州凉州甘州渭州之類皆西地也又按隋煬帝所定九部夷樂西凉龜兹天竺康居之類皆西夷也觀詩之雅頌亦自西周始凡是清歌妙舞未有不從西出者八音之音以金為主五方之樂惟西是承雖曰人為亦莫非禀五行之精氣而然邯鄲歌今趙州長平行秦白起所坑趙降兵處故絳行晉雖遷新田以舊地為故絳西長安行臨碣石平州之地臨北海禹所導河從此入海故曰碣石送反潮白銅鞮歌亦曰襄陽蹋銅鞮南郡歌今南陽也荆州歌今荆南府陳歌吳歌鄴都引蔡歌行越城曲越謡孟門行燕支行汾陰行新昌里洛陽陌大堤曲出自薊北門行江南行江南思長干行道路六曲陰山道太行路行路難變行路難沙路曲沙隄行時景二十五曲陽春歌楚曲青陽歌春日行秋風辭帝幸河東祠后土顧視帝京欣然中流與羣臣宴上賦秋風北風行苦熱行秋歌朝歌晨風歌朝來曲夜夜曲夜坐吟遥夜吟春旦有所思元雲朝雲雷歌驚雷歌雪歌胥臺露白日歌明月篇明月子日出行日與月人生四曲百年歌陸機作十年為一章共十章言句泛濫無可采人生老年行老詩人物九曲大禹成連湘東王祖龍行百里奚項王亦曰蓋世楚王曲安定侯曲李延年歌神仙二十二曲隠逸漁父歩虛辭神仙篇外仙篇升仙歌升天行仙人篇遊仙篇仙人覽六著篇海漫漫桃源行上雲樂亦曰洛濵曲武林深行一曰武溪深行招隠本楚辭漢淮南王安小山所作言山中不可久留或言即安所作也後人改為五言若晉左思杖䇿招隠數篇是也晉王康琚又作反招隠舊説淮南書有小山亦有大山亦猶詩有小雅有大雅反招隠四皓蕭史曲方諸曲王喬歌元丹邱歌紫谿翁歌序云紫谿翁過甪里先生舉酒相屬醉而歌漁父歸去來引𣑽竺四曲舍利弗法夀樂阿那瓌摩多樓子蕃音四曲于闐採花高句麗紀遼東隋煬帝為遼東之役而作是詩出蕃曲山水二十四曲登臨泛渡桐栢山山在唐州桐栢縣淮水發源之處華陰山在華州西嶽巴東三峽歌淫豫歌亦曰灧豫歌其辭云淫豫大如服瞿唐不可觸金沙浮轉多桂浦忌經過此舟人商客刺水行舟之歌亦非簡文所作也蜀江有瞿唐之患桂江有桂浦之難故過瞿唐者則凖灧豫渉桂浦者則凖金沙又有灧豫如馬瞿唐莫下灧豫如象瞿唐莫上之語是單言瞿唐也河上之水歌曲池之水歌東海小臨海歌江上曲江臯曲方塘含白水歌日暮望涇水曲江登山曲巫山中流曲濟黄河渡易水曲桂楫泛河中登名山行昆明春水滿此唐貞元中作也自唐後不都長安昆明池遂為民田矣半路溪泛水曲幽澗泉草木二十一曲採種花菓赤白桃李花亦曰桃李唐高祖時歌秋蘭篇芙蓉花採蓮曲採菱曲採菊茱萸篇蒲生歌城上麻夾樹夾樹有緑竹緑竹樹中草冉冉孤生竹取古詩第一句作題按何偃作此詩所言者婚姻之事楊花曲桃花曲隋堤柳種葛江籬生幽渚浮萍篇桑條太史迦葉志忠上桑條歌十二篇言韋后當受命車馬六曲車遙遙篇高軒過白馬篇亦曰齊瑟行驅車天馬歌八駿圖龍魚六曲蟲豸尺蠖應龍篇飛龍篇飛龍引枯魚捕蝗鳥獸二十一曲白虎行烏栖曲東飛伯勞歌擬東飛伯勞雙燕燕燕于飛澤雉滄海雀空城雀雀乳空井中鬬鷄晨鷄高樹鳴鴛鴦鳴鴈行鴻鴈生北塞行黄鸝飛上苑飛來雙白鶴雙翼隻翼鳳凰曲秦吉了雜體六曲雜曲五雜組曲寓言雜體藁砧亦曰藁砧今何在兩頭纎纎祀饗正聲序論仲尼所以為樂者在詩而已漢儒不知聲歌之所在而以義理求詩别撰樂詩以合樂殊不知樂以詩為本詩以雅頌為正仲尼識雅頌之㫖然後取三百篇以正樂樂為聲也不為義也漢儒謂雅樂之聲世在太樂樂工能紀其鏗鏘鼓舞而不能言其義以臣所見正不然有聲斯有義與其逹義不逹聲無寧逹聲不逹義若為樂工者不識鏗鏘鼓舞但能言其義可乎譚河安能止渴畫餅豈可充饑無用之言聖人所不取或曰郊祀大事也神事也燕饗常事也人事也舊樂章莫不先郊祀而後燕饗今所采樂府反以郊祀為後何也曰積風而雅積雅而頌猶積小而大積卑而高也所積之序如此史家編次失古意矣安得不為之釐正乎漢武帝郊祀之歌十九章練時日一帝臨二青陽三朱明四西顥五元㝠六惟泰元七建始初丞相匡衡奏罷鸞輅龍鱗更定惟泰元天地八匡衡奏罷黻繡周張更定天地日出入九天馬十元狩三年渥洼水生馬作太初四年伐大宛得宛馬作天門十一景星十二元鼎五年得鼎汾陰作齊房十三元狩二年芝生甘泉齊房作皇后十四華煜煜十五五神十六朝隴首十七元狩元年行幸雍獲白麟作象載瑜太始三年行幸東海獲赤鴈作赤蛟十九班固東都五詩明堂辟雍靈臺寳鼎白雉臣謹按古詩風雅皆無序惟頌有序者以風雅者所采之詩也不得其始兼所用之時随其事宜亦無定着或於一篇之中但取一二句以見意而已不必序也頌者係乎所作而獨用之廟樂不可用於郊天柴望不可用於講武所以蔡邕獨斷惟載頌序以為祀典而風雅本無序也自齊魯韓毛四家之説起各為風雅之序度其初意只欲放頌詩之序而為之其實不知風雅無用於序有序適足以惑頌聲也今觀漢武十九章郊祀歌即詩可見者則無序非憑詩可見者必言所作之始可謂得古頌詩之意矣風雅之詩皆不得其始其間有得於甘棠之美召伯常棣之思周公豈無一二以用之不繫於其始不必序也樂府之詩亦皆不得其始其間有得於採桑之女子渡河之狂夫豈無一二亦以用之不繫於其始不必序焉觀頌詩與郊祀之詩皆言所作之始風雅詩與樂府所採之詩不言其始之作則可以知漢人之迹近於三代故詩章相襲自然相應如此後之人則逺矣按郊祀十九章皆因一時之盛事為可歌也而作是詩各有其名然後随其所用故其詩可采魏晉則不然但即事而歌如夕牲之時則有夕牲歌降神之時則有降神歌既無偉績之可陳又無題命之可紀故其詩不可得而採如随廟立舞酌獻登歌各逐時代而匪流通亦不可得而援也惟梁武帝本周九夏之名以作十二雅庶可備編采之後梁武帝雅歌十二曲俊雅取禮記司徒論選士之秀者而升之學曰俊士也衆官出入奏俊雅二郊太廟明堂三朝同用皇雅取詩皇矣上帝臨下有赫也皇帝出入奏皇雅二郊太廟同用允雅取詩君子萬年永錫祚允也皇太子出入奏之三朝用焉寅雅取尚書周官貳公𢎞化寅亮天地也王公出入奏寅雅三朝用焉介雅取詩君子萬年介爾景福也上夀酒奏介雅三朝用焉需雅取易雲上於天需君子以飲食宴樂也食舉奏需雅三朝用焉雍雅取禮記大享客出以雍徹也徹饌奏雍雅三朝用焉滌雅取禮記帝牛必在滌三月也牲出入奏滌雅北郊明堂太廟同用牷雅取春秋左傳牲牷肥腯也薦毛血奏牷雅北郊明堂太廟同用諴雅取尚書至諴感神也南北郊明堂太廟並同用諴雅降神及迎送奏之獻雅取禮記祭統尸飲五君洗玊爵獻卿今之飲福酒亦古獻爵之義也皇帝飲酒奏獻雅北郊明堂太廟同用禋雅取周禮大宗伯以禋祀祀昊天上帝也北郊明堂太廟之禮埋燎俱奏禋雅有宗廟之樂有天地之樂有君臣之樂尊親異制不可以不分幽明異位不可以無别按漢叔孫通始定廟樂有降神納爼登歌薦祼等曲武帝始定郊祀之樂有十九章之歌明帝始定黄門鼓吹之樂天子所以宴羣臣也嗚呼風雅頌三者不同聲天地宗廟君臣三者不同禮自漢之失合雅而風合頌而雅其樂已失而其禮猶存至梁武十二曲成則郊廟明堂三朝之禮展轉用之天地宗廟君臣之事同其事矣此禮之所以亡也雖曰本周九夏而為十二雅然九夏自是樂奏亦如九淵九莖可以播之絲竹有譜無辭而非雅頌之流也唐雅樂十二和曲豫和以降天神冬至祀圜丘上辛祈榖孟夏雩季秋享明堂朝日夕月廵守告于圜丘燔柴告至封祀泰山類于上帝皆以圜鍾為宫三奏黄鍾為角太簇為徵姑洗為羽各一奏文舞六成五郊迎氣黄帝以黄鍾為宫赤帝以函鍾為徴白帝以太簇為商黒帝以南吕為羽青帝以姑洗為角皆文舞六成順和以降地祗夏至祭方丘孟冬祭神州地祇春秋社廵狩告社宜于社禪社首山皆以函鍾為宫太簇為角姑洗為徴南宫為羽各三奏文舞八成望于山川以㽔賔為宫三奏永和以降人鬼時享禘祫有事而告謁于廟皆以黄鍾為宫三奏大吕為角太簇為徴應鍾為羽各二奏文舞九成祀先農皇太子釋奠皆以姑洗為宫文舞三成送神各以其曲一成蜡兼天地人以黄鍾奏豫和㽔賔姑洗太蔟奏順和無射夷則奏永和六均皆一成以降神而送神以豫和肅和登高以奠玉帛于天神以大吕為宫于地祗以應鍾為宫于宗廟以圜鍾為宫祀先農釋奠以南吕為宫望于山川以函鍾為宫雍和凡祭祀以入爼天神之爼以黄鍾為宫地祗之爼以太簇為宫人鬼之爼以無射為宫又以徹豆凡祭祀爼入之後接神之曲亦如之夀和凡以酌獻飲福以黄鍾為宫太和以為行節亦以黄鍾為宫凡祭祀天子入門而即位與其升降至于還次行則作止則止其在朝廷天子將自内出撞黄鍾之鐘右五鐘應乃奏之其禮畢興而入撞蕤賔之鐘左五鐘應乃奏之皆以黄鍾為宫舒和以出入二舞及皇太子王公羣后國老若皇后之妾御皇太子之宫臣出入門則奏之皆以太簇為商昭和皇帝皇太子以舉酒休和皇帝以飯以肅拜三老皇太子亦以飯皆以其用之律均正和皇后受冊以行承和皇太子在其宫有㑹以行若駕出則撞黄鍾奏承和出太極門而奏采齊至于嘉徳門而止其還也亦然祖孝孫本梁十二雅以作十二和故可采也周太祖迎魏帝入關平荆州大獲梁氏之樂乃更為九夏之奏皇帝出入奏皇夏賔出入奏昭夏蕃國客出入奏納夏有功臣出入奏章夏皇后進羞奏齊夏宗室㑹聚奏族夏上酒宴樂奏陔夏諸侯相見奏驁夏雖曰本於成周賔揆之樂抑亦取於梁氏十二雅有其議而未能行後復變更大抵自兩朝以來祀饗之章随時改易任理不任音任情不任樂明樂之人不能主樂主樂之司未必明樂所行非所作所作非所行惟梁武帝自曉音律又詔百司各陳所聞帝自糾擿前違裁成十二雅付之大樂自此始定雖制作非古而音聲有倫凖十二律以法天之成數故世世因之而不能易也祀饗别聲序論正聲者常祀饗之樂也别聲者非常祀饗之樂也出於一時之事為可歌也故備於正聲之後漢三侯之章大風歌亦曰風起之詩右高祖既定天下過沛與故人父老飲極懽哀之情而作是詩令沛中童兒百二十人習而歌之至孝恵時以沛宫為原廟令歌兒習吹以相和得以四時歌舞於廟常以百二十人為之文景之間禮官亦肄業漢房中祠樂十七章房中樂本周樂秦改曰夀人漢恵改曰安世樂右房中樂者婦人禱祠於房中也故宫中用之漢房中祠樂乃高祖唐山夫人所作也高祖好楚聲故房中樂楚聲也孝恵二年使樂府令夏侯寛備其簫管更名曰安世樂隋房内曲二首地厚天高右高祖龍潛時頗好音樂常倚琵琶作歌二首名曰地厚天高託言夫婦之義因即取之為皇后房内曲命婦人并登歌上夀並用之梁武帝述佛法十曲善哉大樂大歡天道仙道神王龍王滅過惡除愛水斷苦轉陳後主四曲黄鸝留玉樹後庭花金釵兩臂垂或言隋煬帝作堂堂北齊後主二曲無愁伴侣唐七朝五十五曲舞曲夷樂並不在此傾盃曲長孫無忌作樂社樂曲魏徴作英雄樂曲虞世南作黄驄疊曲太宗破竇建徳也乗馬名黄驄驃及征高麗死於道頗哀之命樂工製黄驄疊曲右四曲太宗因内宴詔無忌等作之皆宫調也景雲河清歌亦名燕歌高宗即位景雲見河水清張文收采古義為此歌焉慶善樂破陣樂承天樂一戎大定樂將伐高麗宴洛陽城門觀屯營敎舞按親征用武之勢八紘同軌樂象高麗平天下大定夷美賔曲遼東平李勣作是曲以獻右七曲高宗朝所作也立部伎八曲太常選坐部伎無性識者退入立部伎又選立部伎無性識者退入雅樂部則雅聲可知一安舞二太平樂安舞太平並周隋遺音三破陣樂四慶善樂五大定樂六上元樂七聖夀樂八光聖樂坐部伎六曲一燕樂二長夀樂三天授樂武后天授年作四鳥歌萬嵗樂武后時有鳥能人言萬嵗五龍池樂明皇為平王時賜第隆慶坊坊之南地忽變為池中宗泛以厭其祥明皇即位乃作龍池樂六小破陣樂夜半樂明皇自潞州還京師舉兵夜半誅韋后故作夜半樂還京樂還京樂文成曲明皇作霓裳羽衣曲河西節度使楊敬忠獻一説羅公逺與明皇遊月宫見仙女數百皆素練霓衣舞問其曲曰霓裳羽衣帝默記其音調而還故作是曲元眞道曲道士司馬承禛奉詔作大羅天曲茅山道士李㑹元作紫清上聖道曲工部侍郎賀知章作景雲九眞紫極小長夀承天樂順天樂六曲並太清宫成太常卿韋縚作君臣相遇樂曲商調韋縚作荔枝香明皇幸驪山楊貴妃生日命小部張樂長生殿因奏新曲未有名㑹南方進荔枝故名荔枝香棃園法曲法曲本隋樂其音清而近雅煬帝厭其聲淡明皇愛之選坐伎三百教於棃園宫女數百亦為棃園弟子凉州伊州甘州天寳樂曲皆以邊地名之又詔道調法曲與胡部新聲合作千秋節明皇生日右三十四曲並明皇朝所作也寳應長寧樂代宗由廣平王復二京棃園供奉官劉日進作以獻十八曲宫調廣平太一樂大歴元年作右二曲代宗朝所作也定難曲河東節度馬燧獻中和樂徳宗生日自作繼天誕聖樂徳宗生日昭義節度王䖍休所獻以宫為調孫武順聖樂山南節度于頔所獻右四曲徳宗朝所作也雲韶法曲霓裳羽衣舞曲右二曲文宗詔太常卿馮定采開元雅樂作也臣下功高者賜之樂又改法曲為仙韶曲萬斯年曲右一曲武宗朝李徳裕命樂工作萬斯年以獻播皇猷曲右一曲宣宗每宴羣臣備百戲帝自製新曲故有播皇猷之作文武舞序論古有六舞後世所用者韶武二舞而已後世之舞亦随代皆有制作每室各有形容然究其所常用及其制作之宜不離是文武二舞也臣疑三代之前雖有六舞之名徃徃其事所用者亦無非是文武二舞故孔子謂韶盡美矣又盡善也武盡美矣未盡善也不及其他誠以舞者聲音之形容也形容之所感發惟二端而已自古制治不同而治具亦不離文武之事也然雲門大咸大韶大夏大濩大武凡六舞之名南陔白華華黍崇丘由庚由儀凡六笙之名當時皆無辭故簡籍不𫝊惟師工以譜奏相授耳古之樂惟歌詩則有辭笙舞皆無辭故大武之舞秦始皇改曰五行之舞大韶之舞漢高帝改曰文始之舞魏文帝復文始曰大韶舞五行舞曰大武舞並有譜無辭雖東平王蒼有武徳舞之歌未必用之大抵漢魏之世舞詩無聞至晉武帝泰始九年荀朂曾典樂更文舞曰正徳武舞曰大豫使郭夏宋識為其舞節而張華為之樂章自此以來舞始有辭舞而有辭失古道矣文武舞二十曲晉文舞曰正徳舞武舞曰大豫舞宋文舞曰前舞武舞曰後舞梁武舞曰大壯舞文舞曰大觀舞隋文舞武舞唐文舞曰治康舞武舞曰凱安舞唐三大舞七徳舞本名秦王破陣樂太宗為秦王破劉武周軍中相與作秦王破陣樂及即位宴㑹必奏之乃制舞圖左圓右方先偏後伍交錯屈伸以象魚麗鵝鸛後令魏徴褚亮虞世南李伯藥更制歌辭名曰七徳舞元日冬至朝㑹慶賀與九功舞同奏後又改為神功破陣樂九功舞本名功成慶善樂太宗生於慶善宫貞觀六年幸之宴從臣賞賜閭里同漢沛宛帝歡甚賦詩起居郎吕才被之管弦名曰功成慶善樂號九功舞進蹈安徐以象文徳麟徳三年詔郊廟享宴奏文舞用功成慶善樂武舞用神功破陣樂上元舞高宗所作也大祠享皆用之右三大舞唐之盛樂也然後世所行者亦惟二舞而已神功破陣樂有武事之象功成慶善樂有文事之象五代因之晉用九功舞改曰觀象舞用七徳舞改曰講功舞周用觀象改為崇徳舞用講功改為象成舞按唐人降神用文舞送神用武舞其餘即奏十二和之樂每室酌獻一曲則别立舞名至今不替焉然每室之舞蓋本於梁自梁以來紛然出於私意莫得而紀通志卷四十九
