body:
  text: 通志卷一百五十八宋右廸功郎鄭樵漁仲撰列傳第七十一後周達奚武子震若干惠怡峯劉亮王徳赫連達韓果蔡祐常善辛威庫狄昌梁椿梁臺田𢎞予仁恭王傑王勇宇文蚪耿豪髙琳李和伊婁穆達奚實劉雄侯植李延孫父長壽韋祐陳欣韓雄魏元泉仚子元禮仲遵李遷哲楊乾運扶猛陽雄席固任果崔彦穆楊纂段永令狐整弟休唐永子瑾桞敏王士良郭賢楊寛達奚武字成興代人也祖眷父長並為鎮将武少倜儻好馳射賀拔岳征闗右引為别將及岳為侯莫陳悦所害武與趙貴收屍歸平凉同翊戴文帝從平悦封須昌縣伯大統初自大丞相府中兵參軍出為東秦州刺史齊神武與竇㤗髙敖曹三道来侵文帝欲并兵擊㤗諸將多異議唯武及蘇綽與文帝意同遂禽之文帝進圖𢎞農遣武從兩騎覘候武與其候騎遇即交戰斬六級獲三人而反齊神武趣沙苑文帝復遣武覘之武從三騎皆衣敵人衣至暮下馬潛聽其軍號歴營若警夜者有不如法者往往撻之具知敵情以告文帝遂從破之進爵髙陽郡公四年文帝援洛陽武為前鋒與李弼破莫多婁貸文又進至河橋力戰斬其司徒髙敖曹再遷雍州刺史復從戰邙山時大軍不利齊神武乘勝進軍至陜武禦之乃退七年詔武經畧漢川梁州刺史宜豐侯蕭脩固守南鄭武圍之脩請服㑹梁武陵王遣其將楊乾運等救脩脩更不下武擊走乾運脩乃降自劒門以北悉平明年振旅還京師朝議欲以武為柱國武曰我作柱國不應在元子孝前固辭不受以大將軍出鎮玉壁孝閔帝踐阼授柱國大司冦齊豫州刺史司馬消難舉州來附詔武與楊忠迎消難以歸武成初轉大宗伯進封鄭國公齊將斛律敦侵汾綘武禦之敦退武築栢壁城留開府權嚴薛羽生守之保定三年遷太保其年大軍東伐隋公楊忠引突厥自北道武以三萬騎自東道期㑹晉陽武至平陽後期不進而忠已還武尚未知齊將斛律明月遺武書曰鴻鶴已翔於寥廓羅者猶視於沮澤也武覽書乃班師出為同州刺史明年從晉公䕶東伐時尉遲迥圍洛陽為敵所敗武與齊王憲於芒山禦之至夜收軍憲欲待明更戰武曰洛陽軍敗人情駭動不因夜速還明日欲歸不得憲從之遂全軍而返天和三年轉太傅武微時奢侈好華飾及居重位不持威儀行常單馬左右從一兩人而已門外不施㦸常晝掩一扉或謂曰公位冠羣后何輕率若是武曰吾昔在布衣豈望富貴今日富貴不可頓忘疇昔且天下未平國恩未報安可過事威容乎言者慙而退武之在同州時旱武帝敕武祀華岳岳廟舊在山下常所祈禱武謂僚屬曰吾備位三公不能燮理陰陽不可同於衆人在常祀所必須登峯展誠尋其聖奥岳既髙峻人迹罕通武年逾六十唯將數人攀藤而上於是稽首祈請晚不得還即於岳上藉草而宿夢一白衣來執武手曰快辛苦甚相嘉尚遂驚覺益用祗肅至旦雲霧四起俄而澍雨逺近霑洽武帝聞之璽書勞武曰公年尊徳重弼諧朕躬比以隂陽愆序時雨不降命公求祈止言廟所不謂公不憚危險遂乃逺陟髙峯但神道聰眀無幽不燭感公至誠甘澤斯應聞之嘉賞無忘於懷今賜公雜綵百疋公其善思嘉猷匡朕不逮念坐而論道之義勿復更煩筋力也武性貪恡其為大司冦也在庫有萬釘金帶當時寶之武因入庫乃取以歸主者白晉公䕶䕶以武勲重不彰其過因而賜之時論深鄙焉薨贈太傅十五州諸軍事同州刺史諡曰桓子震嗣震字猛畧少驍勇走及奔馬文帝嘗於渭北校獵時有兎過文帝前震與諸將競射之馬倒而墜震足不傾躓因歩走射之一發中兎顧馬纔起遂廻身騰上文帝喜曰非此父不生此子遂賜武雜練一百段後封魏昌縣公明帝初拜司右中大夫加驃騎大將軍開府儀同三司武成初進爵廣平郡公除華州刺史震雖出自膏腴少習武藝然頗有政術天和三年拜柱國建徳初襲爵鄭國公從平鄴賜妾二人女樂一部拜大宗伯震父嘗爲此職時論榮之宣政中出為原州總管隋開皇初薨於家震弟惎大象末為益州刺史與王謙據蜀起兵被誅若干惠字恵保代郡武川人也其先與魏氏俱起以國爲姓父樹利周從魏廣陽王深征葛榮戰沒贈冀州刺史惠以弱冠從爾朱榮平河北拜中堅将軍復以别將從賀拔岳西征定隴右恵毎力戰有功封北平縣男及岳為侯莫陳悦所害恵與冦洛趙貴等同謀翊戴文帝仍從平悦拜直閤將軍魏孝武西遷除右衛將軍從禽竇泰復𢎞農破沙苑惠先登陷陣加侍中開府儀同三司進爵長樂郡公大統四年從魏文帝東廵洛陽與齊神武戰於河橋力戰破之七年遷領軍及髙仲密舉北豫州來附文帝迎之軍至洛陽齊神武屯於芒山惠為右軍與中軍大破之齊神武乃萃攻左軍軍將趙貴等戰不利㑹日暮齊神武進兵攻恵恵擊之皆披靡至夜中齊神武騎復來追惠恵徐下馬顧命厨人營食食訖謂左右曰長安死此中死異乎乃建旗鳴角收諸敗軍而還齊神武追騎憚恵疑有伏兵不敢逼至𢎞農見文帝陳賊形勢恨其垂成之功覆於一簣於是欷歔不自勝文帝壯之遷司空惠性剛質有勇力容貌魁岸善於撫御將士無不懷㤙及侯景内附朝議欲收集河南令恵以本官鎮魯陽遇疾薨於軍中恵於諸將年最少早喪父事母以孝聞文帝嘗造射堂新成與諸將宴射恵竊歎曰親老矣何時辦此乎文帝聞之即日徙堂於恵宅其見重如此及薨為之流涕久之恵喪至又臨撫焉加贈秦州刺史諡曰武烈子鳯嗣鳯字達摩有識度襲父爵長樂郡公尚文帝女位開府儀同三司大馭中大夫後錄惠佐命功封鳯徐國公拜柱國怡峯字景阜遼西人也本姓黙台因避難改焉髙祖寛燕遼西郡守魏道武時歸朝拜羽真賜爵長虵公曽祖文冀州刺史峯少從征役以驍勇聞從賀拔岳万俟醜奴為征虜將軍賜爵蒲隂縣男及岳為侯莫陳悦所害峯與趙貴等同謀奉迎文帝進爵為伯及齊神武與孝武帝構隙文帝令峯與都督趙貴赴洛陽至潼闗屬孝武西遷峯即從文帝拔廻洛復潼關後以討曹泥功進爵華陽縣公又從破竇泰於小關復𢎞農破沙苑進爵樂陵郡公仍與元季海獨孤信復洛陽東魏行臺任祥率歩騎萬餘攻潁川峯復以輕騎五百邀擊大破之自是威名轉盛加授開府儀同三司及文帝與東魏戰河橋時峯為右軍不利與李逺先還文帝遂班師詔原其罪拜夏州刺史大統十五年東魏圍潁川峯與趙貴赴援至南陽遇疾卒峯沈毅有膽畧得士卒心當時號為驍將文帝嗟悼者久之贈華州刺史諡曰襄威子昂嗣位開府儀同三司朝廷追錄峯功封昂長沙郡公昂弟光少以峯勲賜爵安平縣侯加開府儀同三司光弟春少知名位吏部下大夫儀同三司劉亮中山人也本名道徳父特真位領人酋長魏大統中以亮著勲追贈恒州刺史亮少倜儻有從横計畧姿貌魁傑見者憚之普泰初以都督從賀拔岳西征常先鋒陷陣以功拜大都督封廣興縣子及岳為侯莫陳悦所害亮與諸將謀迎文帝仍從平悦悦黨豳州刺史孫定兒仍據州不下涇秦靈等州悉與相應衆至數萬推定兒為主以拒文帝文帝令亮襲之定兒以義兵猶逺未為之備亮乃輕將二十騎先豎一纛於近城髙嶺即馳入城中定兒方置酒髙㑹卒見亮至衆皆駭愕莫知所為亮乃麾兵斬定兒懸首州門以號令賊黨仍遥指城外纛令二騎曰出追大軍賊黨忷懼一時降服於是諸州皆歸款及文帝置十二軍簡諸將領之亮領一軍每征討與怡峯俱為騎將以復潼關功封饒陽縣伯尋加侍中魏孝武西遷以迎駕功除使持節左光禄大夫左大都督南秦州刺史從禽竇泰復𢎞農及沙苑之役亮並力戰有功遷開府儀同三司大都督進爵長廣郡公以母憂去職居喪毁瘠文帝嗟其至性毎憂惜之起復本官亮以勇敢見知為當時名將兼屢陳兵策多合機宜文帝謂之曰卿文武兼資即孤之孔明也乃賜名亮并賜姓侯莫陳氏十年出為東雍州刺史為政清靜百姓安之卒於州喪還亰師文帝親臨之泣而謂人曰股肱喪矣腹心何寄令鴻臚卿監䕶喪事追贈太尉諡曰襄後配饗文帝廟庭子昶嗣昶尚文帝女西河長公主大象中位柱國秦靈二州總管以亮功封彭國公隋開皇中坐事死昶弟靜天水郡守靜弟恭開府儀同三司饒陽縣伯恭弟幹上儀同三司襃中侯王徳字天㤙代武川人也少善騎射雖不經師訓以孝悌稱初從爾朱榮討元顥賜爵同官縣子又從賀拔岳討平万俟醜奴别封深澤縣男及侯莫陳悦害岳徳與寇洛等議翊戴文帝於是除平涼郡守徳雖不知書至斷決處分良吏無以過涇州所部五郡徳常為最及孝武西遷進封下博縣伯行東雍州事在州未幾百姓懷之賜姓烏丸氏大統元年進爵為公加車騎大將軍遷儀同三司北雍州刺史後常從文帝征伐累有戰功加開府侍中進爵河間郡公先是河渭間種羗屢叛以徳有威名拜河州刺史羣羌率服後卒於涇州刺史諡曰獻徳性厚重㢘慎言行無擇母幾年百嵗後徳終子慶嗣小名公奴性謹厚位開府儀同三司初徳喪父貧無以葬乃賣公奴并一女以營葬事因遭兵亂不復相知及徳在平涼始得之遂名曰慶赫連達字朔周盛樂人勃勃之後也曽祖庫多汗因避難改姓杜氏達剛鯁有膽力少從賀拔岳征討有功拜都督賜爵長廣郷男及岳爲侯莫陳悦所害軍中大擾趙貴建議迎文帝諸將未決達曰宇文夏州昔為左丞眀畧過人一時之傑今日之事非此公不濟趙將軍議是也達請輕騎告文帝仍迎之諸將或欲南追賀拔勝或云東告朝廷達又曰此皆逺水不救近火何足道哉謀遂定令達馳往文帝見達哀慟問故達以實對文帝遂以數百騎南赴平涼令達率騎據彈筝峽時百姓惶懼奔散者軍爭欲掠之達止之乃撫以恩信人皆悦文帝聞而嘉之加平東將軍文帝謂諸將曰當清水君遇禍之時君等性命在於賊手雖欲來告其路無從杜朔周冒萬死之難逺來見及遂得共盡忠節同雪讐恥雖藉衆力實賴杜子之功勞而不酬何以勸善乃賜馬二百疋魏孝武入闗襃叙勲義以達首迎元帥匡復秦隴進爵魏昌縣伯從儀同李偉破曹泥後從復𢎞農戰沙苑皆有功詔復姓赫連氏以達勲望兼隆乃除雲州刺史即本州也進爵為公從大將軍達奚武攻漢中梁冝豐侯蕭脩拒守積時乃送款武問諸將進止之宜開府賀蘭願徳等以其食盡欲急攻取之達曰不戰而獲城策之上也無容利其子女貪其財帛仁者不爲如其困獸猶鬪則成敗未可知武曰公言是也乃受脩降師還進驃騎大將軍開府儀同三司加侍中進爵藍田縣公保定初為大將軍夏州總管達雖非文吏然性質直遵奉法度輕於鞭撻而重慎死罪又性㢘儉邊境胡人或饋以羊者達欲招納異類報以繒帛主司請用官物達曰羊入我厨物出官庫是欺上也命取私帛與之識者嘉其仁恕尋進樂川郡公位柱國薨子遷嗣位大將軍蒲州刺史韓果字阿六拔代武川人也少驍雄善騎射賀拔岳西征引為帳内擊万俟醜奴及其黨轉戰數十合並破之膂力絶倫被甲荷戈升陟峯嶺猶渉平路雖數十百日不以為勞以功授宣威將軍從文帝討平侯莫陳悦遷都督大統初累進爵為石城郡公果性彊記有權畧善伺敵虛實揣知情狀所行之處有潛匿溪谷欲為間偵者果登髙望之所疑處往必有獲文帝由是以果為虞候都督毎從征行常領候騎晝夜廵察畧不眠寢從襲竇泰於潼關文帝依其規畫軍以勝返賞真珠金帶一條帛二百疋授征虜將軍又從復𢎞農破沙苑戰河橋並有功歴朔安二州刺史從戰芒山軍還除河東郡守又從大將軍破稽胡於北山胡地險阻人跡罕至果進兵窮討散其種落稽胡憚果勁勇趫㨗號為著翅人文帝聞之笑曰著翅之名寧減飛將錄前後功累遷開府儀同三司進爵襃中公魏恭帝元年授大將軍保定三年拜少師進位柱國天和初授華州刺史為政寛恵吏民稱之薨子明嗣為黎州刺史大象中至上大將軍與尉遲㢠同謀反被誅蔡祐字承先其先陳留圉人也曽祖紹為夏州鎮將徙居髙平因家焉父襲名著西州魏正光中万俟醜奴亂闗中襲乃背賊歸洛陽拜齊安郡守及孝武西遷祐拔難西歸賜爵平舒縣伯除岐雍二州刺史祐聰敏有行檢襲之背賊東歸祐年十四事母以孝聞及長有膂力便騎射文帝在原州召為帳下親信及遷夏州以祐為都督及賀拔岳為侯莫陳悦所害諸將遣使迎文帝文帝將赴之夏州首望彌姐元進等陰有異計文帝微知之與祐謀執元進祐曰狼子野心㑹當反噬今若執縛不如殺之文帝曰汝大決也於是召元進等入計事祐即出外衣甲持刀直入瞋目叱諸人曰與人朝謀夕異豈是人也乃叱元進斬之其黨並伏誅一坐戰慄於是與諸將盟同心誅悦文帝以此知重之乃謂祐曰吾今以爾為子爾其父事我乎後從迎魏孝武於潼闗以前後功封萇郷縣伯大統初從禽竇泰復𢎞農破沙苑皆有功授平東將軍太中大夫又從戰於河橋祐乃下馬歩闘手殺數人左右勸乘馬以備急卒祐怒曰丞相養我如子今日豈以性命為念遂率左右十餘人齊聲大呼殺傷甚多敵以其無繼圍之十餘重乃彎弓持滿四靣拒之東魏之兵不敢逼乃募厚甲長刀者直進取祐去祐可三十歩左右勸射之祐曰吾曹性命在一矢耳豈虚發哉敵漸進可十歩祐乃射之正中其靣應弦而倒便以矟刺殺之因戰數合唯失一人敵稍却祐乃徐引退是戰也我軍不利文帝已還祐至𢎞農夜中與文帝相㑹文帝字之曰承先爾來吾無憂矣文帝心驚不得寢枕祐股上乃安以功進爵為公授京兆郡守九年東魏豫州刺史髙仲密舉州來附文帝率軍援之與齊神武遇戰於邙山祐時著明光鐵鎧所向無前敵人咸曰此是鐵猛虎也皆避之歴青原二州刺史尋除大都督遭父憂請終喪紀弗許累遷開府儀同三司加侍中十三年賜姓大利稽氏進爵懷寧郡公魏恭帝三年拜大將軍六官建授兵部中大夫文帝不豫祐與晉公䕶賀蘭祥等侍疾及崩祐悲慕遂得氣疾孝閔踐阼拜少保祐與尉遲綱俱掌禁兵遞直殿省時帝信任司㑹李植等謀害晉公䕶祐每泣諫帝不聽尋而帝廢明帝即位拜小司馬少保如故帝之為公子也與祐特相友昵至是禮遇彌隆御膳每有異味輙以賜祐羣臣朝宴每被别留或至昏夜列炬鳴笳送祐還宅祐以過蒙禮遇常辭疾避之至於婚姻尤不願結於勢要尋以本官權鎮原州頃之授宜州刺史未之部卒於原州祐少有大志與郷人李穆布衣齊名常相謂曰大丈夫當建立功名以取富貴安能久處貧賤邪言訖各大笑穆即申公也後皆如其言及從征伐常潰圍陷陣為士卒先軍還之日諸將爭功祐終無所言文帝毎嘆之嘗謂諸將曰承先口不言勲孤當代其論叙其見知如此性節儉所得禄秩皆𣪚宗族身死之日家無餘財贈柱國大將軍原州都督諡曰莊子正嗣祐弟澤頗好學有幹能後為卭州刺史以不從司馬消難被害常善髙陽人也家本豪族魏孝昌中從爾朱榮入洛封房城縣男後文帝平侯莫陳悦除天水郡守累遷驃騎大將軍開府儀同三司西安州刺史轉蔚州刺史頻莅二藩有政績進爵永陽郡公孝閔帝踐阼拜大將軍寧州總管保定二年入為小司徒卒贈柱國大將軍都督延州刺史子昂和嗣辛威隴西人也少慷慨有志畧初從賀拔岳征伐有功假䕶國將軍都督及文帝統岳衆見威竒之引為帳内封白土縣伯後進爵為公累遷開府儀同三司賜姓普屯氏出為鄜州刺史威時望既重朝廷以桑梓榮之遷河州刺史本州大中正頻領二鎮頗得人和孝閔帝踐阼拜大將軍進爵枹䍐郡公宣政元年進位上柱國大象二年進封宿國公復為少傅薨威性持重有威嚴歴官數十年未嘗有過故得以身名終兼其家有義五世同居時以此稱之子永達嗣位儀同大將軍庫狄昌字恃徳神武人也少便弓馬有膂力及長進止閑雅膽氣壯烈毎以將帥自許從爾朱天光定闗中天光敗又從賀拔岳征討及岳被害昌與諸將議翊戴文帝從平侯莫陳悦賜爵陰盤縣子後從迎孝武復潼闗改封長子縣子大統初累遷開府儀同三司進爵方城郡公六官建授稍伯中大夫孝閔帝踐阼拜大將軍卒梁椿字千年代人也初從爾朱榮入洛又從賀拔岳討平万俟醜奴仍從文帝平侯莫陳悦大統中累以戰功封東平郡公開府儀同三司孝閔帝踐阼除華州刺史改封清陵郡公保定元年拜大將軍卒於位贈都督揚州刺史諡曰烈椿性果毅善於撫納所獲賞物分賜麾下故毎踐敵場咸得其死力雅好儉素不營貲産時論以此稱焉子明以椿功賜爵豐陽縣公後襲椿爵舊封廻授弟朗梁臺字洛都萇池人也少果敢有志操後爾朱天光入闗隴賜爵隴城郷男及天光敗於韓陵賀拔岳又引為心膂岳為侯莫陳悦所害臺與諸將翊戴文帝從平悦累功授潁州刺史賜姓賀蘭氏累遷驃騎大將軍開府儀同侍中孝閔帝踐阼進爵中部縣公保定四年拜大將軍時大軍圍洛陽久不拔齊騎奄至齊公憲禦之有數人為敵所執已去臺單馬突入射殺兩人敵皆披靡被執者遂還齊公憲毎歎曰梁臺果毅膽决不可及也五年拜鄜州刺史臺性踈通恕以待物至於莅人尤以恵愛為心不過識千餘字口占書唘詞意可觀年過六十猶能被甲跨馬足不躡鐙馳射弋獵矢不虚發後以疾卒田𢎞字廣畧髙平人也少慷慨志立功名膂力過人而有謀畧初陷万俟醜奴爾朱天光入闗𢎞自原州歸順及文帝初統衆𢎞求謁見論世事深被引納即處以爪牙之任又以迎孝武功封鶉陰縣子文帝嘗以所著鐡甲賜之云天下若定還將此甲示孤也大統三年轉帥都督毎從征伐𢎞功居多累䝉殊賞賜姓紇干氏尋授原州刺史以𢎞勲望兼至故以衣錦榮之文帝在同州文武並集乃謂之曰人人如𢎞盡心天下豈不早定即授車騎大將軍儀同三司魏廢帝元年加驃騎大將軍開府儀同三司平蜀後梁信州刺史蕭韶等未從朝化詔𢎞討平之又討西平反𦍑及鳯州叛氐等並破之𢎞毎臨陣推鋒直前身被一百餘箭破骨者九馬被十矟朝廷壯之孝閔帝踐阼進爵鴈門郡公保定元年出為岷州刺史吐谷渾冦西邊宕昌𦍑潛相應接詔𢎞討之獲二十五王平七十六柵天和中從隋公楊忠伐齊破齊將段孝先等拔其宜陽等九城進位柱國大將軍建徳二年拜大司空三年出為襄州總管薨於州子仁㳟嗣仁恭字長貴性寛仁有局度歴位幽州總管隋文帝受禪進位上柱國拜太子太師甚見親重嘗幸其第宴飲極歡禮賜甚厚奉詔營太廟進爵觀國公拜武衞大將軍轉左武衞大將軍卒官贈司空諡曰敬子世師嗣世師字徳懋有孝行列在孝友傳仁㳟時有玉城郡公王景鮮虞縣公謝慶恩並位上柱國大義公辛遵及其弟韶並位上柱國隋文帝以其俱佐命功臣特加崇貴親禮與仁恭等事並亡失云王傑金城直城人也本名文達父巢魏榆中鎮將傑少有壯志毎以功名自許善騎射有膂力魏孝武初起家子都督後從西遷文帝竒其才擢授羽林監文帝謂諸將曰王文達萬人敵也但恐勇決太過耳從復潼闗破沙苑爭河橋戰邙山皆以勇敢聞親待日隆賞賜加於倫等於是賜姓宇文氏進爵為公累遷侍中驃騎大將軍開府儀同三司魏恭帝元年從于謹圍江陵時柵内有人善用長矟戰士將登者多為所斃謹令傑射之應弦而倒登者乃得入餘衆繼進遂拔之謹喜曰濟我大事者在公此箭也孝閔帝踐阼進爵張掖郡公出為河州刺史朝廷以傑勲望俱重故授以本州保定三年進位大將軍與隋公楊忠自漢北伐齊至并州而還又從齊公憲東禦齊將斛律明月進位柱國天和六年除涇州總管傑少從軍事雖不習吏事所歴州府咸以忠恕為心以是頗為百姓所慕宣帝即位拜上柱國大象元年薨贈七州諸軍事河州刺史追封鄂國公諡曰威子孝遷位開府儀同大將軍王勇代武川人也本名胡仁少雄健有器幹便弓馬膂力過人魏永安中万俟醜奴等冦亂闗隴勇占募數從侯莫陳悅賀拔岳征討以功居多拜别將及文帝為丞相引為帳内直盪都督封包信縣子從禽竇泰復𢎞農戰沙苑氣蓋衆軍文帝歎其勇敢賞賜特隆進爵為公從討趙青雀論功居㝡除衞大將軍邙山之戰勇率敢死之士三百人並執短兵大呼直進出入衝擊殺傷甚多是役也大軍不利唯胡仁及王文達耿令貴三人力戰皆有殊功軍還皆拜上州刺史以雍州岐州北雍州擬授胡仁等然州有優劣令探籌取之胡仁遂得雍州文達得岐州令貴得北雍州仍賜胡仁名勇令貴名豪文達名傑以彰其功進侍中驃騎大將軍開府儀同三司魏恭帝元年從柱國趙貴征蠕蠕破之進爵新陽郡公賜姓庫汗氏又論討蠕蠕功别封永固縣伯時有别封者例聽廻授次子勇獨請封兄子興時人義之尋進位大將軍六官建拜稍伯中大夫勇性雄猛為當時驍將然矜功伐善好揚人之惡時論以此鄙之柱國侯莫陳崇勲髙望重與諸將同謁晉公護聞勇數論人之短乃於衆中折辱之勇遂慚恚因疽發背而卒子昌嗣官至大將軍宇文蚪字樂仁代武川人也驍悍有膽畧少從征討累有戰功封南安侯孝武西遷以獨孤信為行臺信引蚪為帳内都督隨信奔梁大統三年歸闕進爵為公禽竇泰復𢎞農及沙苑河橋之戰皆有功又從獨孤信討梁企定破之累遷南秦州刺史驃騎大將軍開府儀同三司蚪毎經行陣必身先士卒故上下同心戰無不克後除金州刺史大將軍卒耿豪鉅鹿人也本名令貴其先家於武川豪少麤獷有武藝好以氣凌人賀拔岳西征引為帳内岳被害乃歸文帝以武勇見知豪亦自謂所事得主從討侯莫陳悦及迎孝武録前後功封平原子遷征虜將軍沙苑之戰豪殺傷甚多血染甲裳盡赤文帝見之歎曰觀令貴之甲裳足以為騐不須更論級數也於是進爵為公從文帝戰於邙山豪謂所部曰大丈夫見賊須右手拔刀左手把矟直刺直斫慎莫皺眉畏死遂大呼獨入敵人鋒刅亂下當時咸謂豪已殁俄而奮刀而還戰數合當豪前者死傷相繼又謂左右曰吾非樂殺人但壯士除賊不得不爾若不能殺賊又不為人所傷何異逐坐人也文帝嘉之拜北雍州刺史大統十三年論前後戰功授車騎大將軍十五年賜姓和稽氏進位侍中驃騎大將軍開府儀同三司豪性兇悍言多不遜文帝惜其驍勇毎優容之豪亦自謂意氣冠羣終無所屈李穆蔡祐初與豪同時開府後並居豪之右豪意不平謂文帝曰外間物議謂豪勝李穆蔡祐文帝曰何以言之豪曰人言李穆蔡祐是丞相髆髀耿豪王勇是丞相咽項以咽項在上故爲勝也豪之麤猛皆此類也十六年卒文帝痛惜之子雄嗣位至大將軍髙琳字季珉其先髙句麗人也六代祖欽為質於慕容廆五世祖宗率衆歸魏拜第一領民酋長賜姓羽真氏琳母嘗祓禊泗濵遇見一石光彩朗潤遂持以歸是夜夢見一人衣冠有若仙者謂其母曰夫人向所將來之石是浮磬之精若能寶持必生令子母驚寤便舉身流汗俄而有娠及生子因名琳字以珉焉魏正光初起家衞府都督魏孝武西遷琳從入闗封鉅野縣子大統三年從文帝破齊神武於沙苑轉安西將軍河橋之役琳先驅奮擊勇冠諸軍文帝謂曰公即我之韓白也復從戰邙山除正平郡守齊將東方老來寇琳率衆禦之老恃其勇健直前趣與琳短兵接戰琳擊之老中數創乃退謂其左右曰吾經陣多矣未見如此健兒密使人勸琳東歸琳斬其使者以聞除鄜州刺史進驃騎大將軍開府儀同三司侍中孝閔帝踐阼進爵犍為郡公武成二年文州氐酋反詔琳討平之師還帝宴羣臣仍命賦詩言志琳詩末章云寄言竇車騎為謝霍將軍何以報天子沙漠靜妖氛帝大悅曰獯獫陸梁未時款塞卿言有驗國之福也天和三年為江陵副總管時陳將吳明徹来冦總管田𢎞與梁主蕭巋出保紀南城唯琳與梁僕射王操固守江陵三城以抗之晝夜拒戰凡經十旬明徹退走巋表言其狀帝乃優詔追琳入朝親加勞問六年進位柱國薨贈本官加五州諸軍事冀州刺史諡曰襄子儒襲爵位儀同大將軍李和本名慶和朔方巖緑人也父僧養以累世雄豪為夏州酋長和少敢勇有識度狀貌魁偉為州里所推賀拔岳作鎮闗中引為帳内都督後從文帝累遷侍中驃騎大將軍開府儀同三司夏州刺史賜姓宇文氏文帝嘗謂諸將曰宇文慶和累經任委毎稱吾意又賜名恵焉改封永豐縣公保定二年除司憲中大夫尋改封徳廣郡公出為洛州刺史和前在夏州頗留遺恵及有此授商洛父老莫不想望徳音和至州以仁恕訓物獄訟為之簡靜進柱國大將軍隋開皇元年遷上柱國和立身剛簡老而愈勵諸子趨事若奉嚴君以惠是周文帝賜名今帝朝已革和則父之所命義不可違至是遂以和為名二年薨贈本官加司徒公諡曰肅子徹列在隋史伊婁穆字奴干代人也父靈善騎射為文帝所知嘗謂之曰昔伊尹阿衡於殷致主堯舜卿既姓伊庶卿不替前緒於是賜名尹焉歴衞將軍隆州刺史盧奴縣公穆弱冠為文帝帳内親信以機辯見知歴中書舎人通直𣪚騎常侍嘗入白事文帝望見悅之字之曰奴干作儀同靣見我矣於是拜儀同三司賜封安陽縣伯孝閔帝踐阼進位驃騎大將軍建徳中卒達奚實字什伏代河南洛陽人也父顯相武衞將軍實少脩立有幹局從魏孝武西遷封臨汾縣伯從文帝禽竇泰復𢎞農破沙苑皆力戰有功累遷相府從事中郎實性嚴重深見器遇六官建行蕃部中大夫加驃騎大將軍開府儀同三司進爵平陽縣公保定初卒於刺史諡曰恭子豐嗣劉雄字猛雀臨洮子城人也少機辯慷慨有大志初為文帝親信後拜中大夫兼中書舎人賜姓宇文氏孝閔帝踐阼加大都督天和中累遷驃騎大將軍開府儀同三司封周昌侯歴位納言内史中大夫候正武帝嘗從容謂曰古人云富貴不歸故郷如衣錦夜遊乃以雄為河州刺史雄先已為本縣令復有此授郷里榮之及皇太子西征吐谷渾雄自涼州從滕王逌先入功居多加上開府儀同三司從平并州拜上大將軍進爵趙郡公平鄴城進柱國宣政元年突厥冦幽州雄戰殁贈亳州總管子昇嗣以雄死王事授儀同大將軍侯植字仁幹其先上谷人也髙祖恕為北地太守子孫因家於北地之三水植少倜儻有大節容貌竒偉武藝絶倫仕魏為義州刺史甚有政績後從孝武西遷賜姓侯伏氏從文帝破沙苑戰河橋進大都督涼州刺史文仲和據州作逆植從開府獨孤信討禽之封肥城縣公賜姓賀屯氏後從于謹平江陵進驃騎大將軍開府儀同三司别封一子汧源縣伯孝閔帝踐阼進爵郡公時帝幼冲晉公䕶執政植從兄龍恩為䕶所親及䕶誅趙貴諸宿將等多不自安植謂從兄龍恩曰主上春秋既富安危繫於數公若多誅戮自立威權何止社稷有累卵之危恐吾宗亦緣此敗兄安得知而不言龍恩竟不能用植又承間言於䕶曰公以骨肉之親當社稷之寄願推誠王室擬迹伊周則率土幸甚護曰我誓以身報國卿豈謂吾有他志邪又聞其先與龍恩言乃陰忌之植懼不免禍遂以憂卒贈大將軍平州刺史諡曰節子定嗣及䕶伏誅龍恩及其弟萬夀並預其禍武帝以植忠於朝廷特免其子孫李延孫伊川人也父長夀性雄豪少與蠻酋結託侵掠闗南魏孝昌中朝議恐其為亂乃以長夀為防蠻都督給其鼓節長夀盡其智力防遏羣蠻伊川左右冦盗為之稍息永安之後長夀徒侣日盛魏帝藉其力用因而撫之累遷北華州刺史賜爵清河郡公及孝武西遷長夀率勵義士拒東魏後為黃州刺史東魏遣行臺侯景攻之城陷遇害追贈太尉延孫亦雄武有將率才畧少從長壽征討以勇敢聞賀拔勝為荆州刺史表延孫為都督肅清鵶路頗有力焉及長壽被害延孫乃還收集其父之衆自孝武西遷後朝士流亡廣陵王欣錄尚書長孫承業潁川王斌之安昌王子均及建寧江夏隴東諸玉并百官等攜持妻子來投延孫者即率衆衞送并贈以珍玩咸達關中齊神武深患之遣行臺慕容紹宗等數道攻擊延孫大破之乃授延孫亰南行臺節度河南諸軍事廣州刺史尋進車騎大將軍儀同三司大都督賜爵華山郡公延孫既䝉委重毎以克清伊洛為己任頻以寡擊衆威振敵境大統四年為其長史楊伯蘭所害贈司空子人傑有祖父風官至開府儀同三司改封潁川郡公韋祐字法保京兆山北人也以字行為州郡著姓父義上洛郡守魏大統中以法保著勲追贈秦州刺史法保少好游俠而質直少言所與交遊皆輕猾亡命父沒事母以孝聞慕李長夀之為人遂娶其女因寓居闗南正光末王公避難者或依之多得全濟以此為貴游所徳及孝武西遷法保赴行在所封固安縣男及長夀被害其子延孫收長壽餘衆守禦東境朝廷恐延孫兵少乃除法保東洛州刺史配兵數百以援延孫法保至潼闗𢎞農郡守韋孝寛謂曰恐子此役難以吉還法保曰古人稱不入虎穴不得虎子安危之事未可預量遂倍道兼行與延孫兵接乃并勢置柵於伏流未幾文帝追法保與延孫還朝賞勞甚厚除河南尹及延孫被害法保乃率所部據延孫舊柵嘗與東魏戰流矢中頸從口中出久之乃蘇大統九年鎮九曲城及侯景以豫州内附法保率兵赴景景欲留之法保疑其貳乃固辭還所鎮十五年加驃騎大將軍開府儀同三司尋進爵為公㑹東魏遣軍送糧饋宜陽法保潛邀之中流矢卒於陣諡曰莊子初嗣位開府儀同大將軍閻韓防主陳欣字永怡宜陽人也少驍勇有氣俠姿貌魁岸同類咸敬憚之孝武西遷後欣乃於辟惡山招集勇敢少年寇掠東魏仍宻遣使歸附授立義大都督賜爵霸城縣男累遷宜陽郡守恭帝二年進位驃騎大將軍開府儀同三司加侍中宜陽邑大中正賜姓尉遲氏文帝以欣著績累載贈其祖昆及父興孫俱為儀同三司位刺史東魏洛州刺史獨孤永業號有智謀往来境上欣與韓雄等恒令間諜覘其動靜齊兵毎至輙破之故永業深憚欣等不敢為冦孝閔帝踐阼進爵許昌縣公後除熊州刺史卒於州欣與韓雄里閈姻婭少相親昵俱總兵境上三十餘載毎禦扞二人相赴常若影響故數對勍敵而常保功名雖並有武力至於挽彊射中欣不如雄𣪚財施恵得士衆心則雄不如欣身死之日將吏荷其恩徳莫不感慟子萬敵嗣朝廷以欣雅得士心還令萬敵領其部曲魏元字僧智其先任城人也後徙於新安元少慷慨有膽畧孝武西遷東魏北徙人情各懐去就元毎率郷兵抗拒東魏芒山之役大軍不利宜陽洛州皆為東魏守而元母及弟並在冝陽元以為忠孝不兩立乃率義從還闗南鎮撫文帝手書勞之除洛陽令封廣宗縣子保定元年累遷驃騎大將軍開府儀同三司鎮閻韓遷熊州刺史政存簡恵百姓悦之轉和州刺史伏流防主進爵為公及齊將斛律明月率衆向宜陽兵威甚盛元率衆禦之毎戰輙克後以疾卒於位泉仚字思道上洛豐陽人也世雄商洛自晉東度常貢屬江東曽祖景言魏大延五年率郷里歸化仍引王師平商洛拜建節將軍假宜陽郡守世襲本縣令封丹水侯父安志復為建節將軍宜陽郡守領本縣令降爵為伯仚九嵗喪父哀毁類於成人服闋襲爵年十二郷人皇平陳合等三百餘人詣州請仚為縣令州為申上時吏部尚書郭阼以仚年少請别選遣終此一限令仚代之宣武詔依皇平等所請巴俗事道尤重老子之術仚雖童㓜而好學恬靜百姓安之尋以母憂去職縣中父老復表請起復本任後除上洛郡守及蕭寶夤反遣兵趣青泥圖取上洛上洛豪族泉杜二姓密應之仚與刺史董紹掩襲二姓二姓散走寶夤亦退遷浙州刺史别封涇陽縣伯永安中大破梁將王元真於順陽除東雍州刺史進爵為侯部人楊羊皮太保椿之從弟恃椿侵擾百姓守宰多被其陵侮皆畏而不敢言仚收之將加極法楊氏慙懼闔宗請恩自此豪右無敢犯者性又清約纎毫不擾於人在州五年毎扵鄊里運米自給梁魏興郡與洛州接壤表請内屬詔仚為行臺尚書以撫納之大行臺賀拔岳以仚昔莅東雍為吏民所懷乃表仚復為刺史詔許之蜀人張國儁聚黨剽刧州郡不能制仚收戮之闔境清肅及齊神武專政孝武有西顧之心欲委仚以山南之事乃除洛州刺史未幾帝西遷齊神武率衆至潼闗仚遣其子元禮禦之神武不敢進上洛人都督泉岳及其弟猛畧與順陽人杜窋等謀翻洛州以應東魏仚知之殺岳及猛畧傳首詣闕大統元年加開府儀同三司兼尚書右僕射進爵上洛郡公仚志尚㢘慎毎除一官憂見顔色寢食輙減至是頻讓魏帝手詔不許三年髙敖曹圍逼州城杜窋為其鄊導仚拒守旬餘矢盡援絶城乃陷焉謂敖曹曰泉仚力屈志不服也及竇泰被禽敖曺退走遂執仚而東以窋為刺史仚臨發宻戒二子元禮仲遵曰吾生平志願不過令長遭逢聖㑹位亞台司今爵禄既隆年齒又暮前途夷險抑亦可知汝等堪立功効不得以我在東遂虧臣節也乃揮涕而訣聞者莫不憤歎尋卒於鄴元禮少有志氣好弓馬頗閑草𨽻有士君子之風賜爵臨洮縣伯散騎常侍及洛州陷與仚俱被執而東元禮於途逃歸時杜窋雖為刺史然巴人素輕杜而重泉及元禮至與仲遵相見感父臨别之言潛與豪右結訖遂率郷人襲州城斬窋傳首長安朝廷嘉之代襲洛州刺史從文帝戰於沙苑中流矢卒子貞嗣仲遵一名恭少謹實渉獵經史年十三為郡主簿十四為縣令及長有武藝髙敖曹攻洛州與仚力戰拒守矢盡以棒杖扞之為流矢中目不堪復戰及城陷士卒歎曰若二郎不傷豈至於此仚之東也仲遵以被傷不行後與元禮斬窋以功封豐陽縣伯東豫州刺史及元禮戰沒復以仲遵為洛州刺史頗得時譽大統十三年行荆州刺史事梁司州刺史桞仲禮毎為邊冦文帝令仲遵率郷兵從開府楊忠討之梁隨郡守桓和拒守不降忠謂諸將曰先取仲禮則桓和不攻而自服也仲遵對曰若棄和深入仲禮未即就禽則首尾受敵此危道也忠從之仲遵以計由己出乃先登城遂禽和從擊仲禮又獲之進驃騎大將軍開府儀同三司本州大中正復行荆州刺史十三州諸軍事尋遭母憂請從䘮制不許大將軍王雄南征上津魏興仲遵從雄討平之遂於上津置南洛州以仲遵為刺史仲遵留情撫接百姓安之初蠻帥杜青和自稱巴州刺史以州入附朝廷因其所據而授之仍𨽻東梁州都督青和以仲遵善於撫御請𨽻仲遵朝議以山川非便弗之許也青和遂結安康酋帥黄衆寳等舉兵共圍東梁州復遣王雄討平之改巴州為洵州𨽻於仲遵先是東梁州刺史劉孟良在職貪婪人多背叛仲遵以㢘簡處之羣蠻帥服仲遵雖出自巴夷而有方雅之掺歴官之處皆以清白見稱朝廷又以其父臨危抗節乃令襲爵上洛郡公舊封聽廻授一子尋出為都督金州刺史卒官贈大將軍三州刺史諡曰莊子暅嗣位至開府儀同大將軍李遷哲字孝彦安康人也世為山南豪族仕於江左父元直仕梁歴東梁衡二州刺史𣪚騎常侍沌陽侯遷哲少脩立有識度慷慨善謀畫起家文徳主帥其父為衡州留遷哲本郷監統部曲事時年二十撫馭羣下甚得其情後襲爵沌陽侯位都督東梁州刺史侯㬌簒逆遷哲外禦邊宼自守而已大統十七年文帝遣達奚武王雄等畧地山南遷哲軍敗遂䧏於武然猶意氣自若武乃執送亰師文帝謂曰何不早歸國家乃勞師旅今為俘虜不亦媿乎答曰世荷國㤙不能死節實以此為愧耳文帝深嘉之拜車騎大將軍封沌陽縣伯㳟帝初直州人樂熾洋州人黄國等連結為亂文帝以遷哲信著山南乃令與開府賀若敦同經畧熾等尋並平蕩仍與敦南出徇地遷哲先至巴州入其封郭梁巴州刺史牟安人開門請降安人子宗徹等猶據巴城不下遷哲攻克之軍次鹿城城主遣使請降遷哲謂其衆曰納降如受敵吾觀其使瞻視猶髙得無詐也遂不許之梁人果於道左設伏以邀遷哲遷哲進擊破之遂屠其城自此巴濮之人䧏欵相繼軍還文帝賜以所服紫袍玉帶及所乘馬加授侍中驃騎大將軍開府儀同三司除直州刺史即本州也仍給軍儀鼓節令與田𢎞同討信州魏㳟帝三年正月軍次并州梁并州刺史杜滿望風送欵進圍疊州克之獲刺史冉助國等遷哲每率驍勇為軍鋒所有攻戰無不身先士卒凡下十八州拓地二千餘里時信州為蠻酋向五子王等所圍𢎞遣遷哲赴援比至信州已陷五子王等聞遷哲至狼狽遁走遷哲入據白帝賀若敦等復至遂共追五子王等破之及田𢎞旋軍文帝令遷哲留鎮白帝信州先無倉儲軍糧匱乏遷哲乃收葛根造粉兼米以給之遷哲亦自取供食時有異膳即分賜兵士有疾患者又親加醫藥以此軍中感之人思効命黔陽蠻田烏度田烏唐等毎抄掠江中為百姓患遷哲隨機出討殺獲甚多由是諸蠻畏威各送糧餼又遣子弟入質者千有餘家遷哲乃於白帝城外築城以處之并置四鎮以靜峽路自此宼抄頗息軍糧贍給焉明帝初授都督信州刺史二年進爵西城縣公武成元年朝於京師明帝甚禮之賜甲第及莊田等天和三年進位大將軍詔遷哲率金上等諸州兵鎮襄陽五年陳將章昭達攻逼江陵梁明帝告急於襄州衞公直令遷哲往救焉遷哲率其所部守江陵城外自率騎出南州又令歩兵自北門出兩軍首尾邀之陳人多投水死是夜陳人又竊於城西堞以梯登城登者已數百人遷哲又率驍勇扞之陳人復潰俄而大風暴起遷哲乘闇出兵擊其營陳人大亂殺傷甚衆江陵總管陸騰復破之於西隄陳人乃遁建徳二年進爵安康郡公三年卒於襄州贈金州總管諡曰壯武遷哲累葉雄豪為鄊里所服性復華侈能厚自奉養妾媵至有百數男女六十九人縁漢千餘里間第宅相次姬媵之有子者分處其中各有僮僕侍婢閽人守䕶遷哲毎鳴笳導從往來其間縱酒歡讌盡生平之樂子孫參見或㤀其年名者披簿以審之長子敬仁先遷哲卒第六子敬猷嗣還統父兵位儀同大將軍遷哲弟顯位上儀同大將軍楊乾運字元邈儻城興勢人也少雄武為鄊閭信服為安康郡守陷梁仕歴潼南梁二州刺史及武陵王蕭紀稱尊號以乾運威服巴渝乃拜梁州刺史鎮潼州封萬春縣公時紀與其兄湘東王繹爭帝乾運兄子畧勸乾運歸附乾運然之㑹文帝令乾運孫法洛至畧即夜送之乾運送欵文帝宻賜乾運鐡券授開府儀同三司侍中梁州刺史安康郡公及尉遲迥征蜀遂降迥迥因此進軍成都數旬克之及至京師禮遇隆渥尋卒於長安贈尚書右僕射子端嗣畧亦以歸附功位至開府儀同三司大將軍封上庸縣伯乾運女壻樂廣安州刺史封安康縣公扶猛字宗畧上甲黄土人也其種落號白虎蠻猛仕梁位南洛北司二州刺史封宕渠縣男魏廢帝元年以衆降文帝厚加撫納復爵宕渠縣男割二郡為羅州以猛為刺史令從開府賀若敦南討信州敦令猛直道白帝所由之路人迹不通猛乃梯山捫葛備歴艱阻遂入白帝城撫慰人夷莫不悦附以功進開府儀同三司俄而信州蠻反猛復從賀若敦平之進爵臨江縣公從田𢎞破漢南諸蠻進位大將軍卒陽雄字元畧上洛邑陽人也累葉豪族父猛從孝武西遷以功封郃陽伯位征東將軍揚州刺史雄起家奉朝請以軍功封安平縣侯得子孫相襲拜邑陽郡守累遷平州刺史進爵王城縣公加開府儀同三司驃騎大將軍歴京兆户部中大夫進位大將軍轉中外府長史遷江陵總管改封魯陽縣公卒於鎮追封郡公諡曰懷雄善附㑹能自謀身故任兼内外保全爵禄子長寛嗣席固字子堅其先安定人也髙祖衡因姚氏之亂寓居襄陽仕晉為建威將軍遂為襄陽著姓固少有逺志梁大同中為齊興郡守久居郡職士多附之遂有親兵千餘人梁元帝時遷興州刺史軍人募從者至五千餘人固欲自據一州以觀時變大統中以地歸魏時文帝方南取江陵西定蜀漢聞固至甚禮遇之就拜使持節驃騎大將軍開府儀同三司大都督侍中豐州刺史封新豐縣公後轉湖州刺史固唘求入覲及至進爵靜安郡公尋拜昌歸憲三州諸軍事昌州刺史固居家孝友莅官頗有聲績卒於州贈大將軍五州刺史諡曰肅敕襄州賜其墓田子雅嗣雅字彦文性方正少以孝聞位大將軍雅弟英上開府儀同大將軍任果字靜鸞南安人也本方隅豪族父襃仕梁為沙州刺史新巴縣公果性勇决志在立功魏廢帝元年率所部來附文帝嘉其逺至待以優禮果因靣陳取蜀䇿深被納之乃授沙州刺史南安縣公從尉遲迥伐蜀尋進授驃騎大將軍開府儀同三司及成都平除始州刺史文帝以其方隅首領早立忠節進爵樂安郡公賜以鐡券聽相傳襲并賜路車駟馬及儀衞等以光寵之尋為刺客所害崔彦穆字彦穆清河東武城人魏司空安陽侯林之九世孫也曽祖顗後魏平東府諮議參軍祖蔚遭從兄司徒浩之難南奔江左仕宋為給事黄門侍郎汝南義陽二郡守延興初復歸於魏拜潁川郡守因家焉後終於郢州刺史父㓜位終永昌郡守隋開皇初以獻皇后外曽祖追贈上開府儀同三司新州刺史彦穆㓜明悟神彩卓然魏吏部尚書隴西李神儁有知人之鑒見而歎曰王佐才也永安末除司徒府參軍事再遷大司馬從事中郎孝武西遷彦穆時不得從大統三年乃與兄彥珍於成臯舉義因攻拔滎陽禽東魏郡守蘇淑仍與鄊郡王元法威攻潁川斬其刺史李景道即拜滎陽郡守尋賜爵千乘縣侯十四年授𣪚騎常侍司農卿時軍國草創衆務殷繁文帝乃引彦穆入幕府兼掌文翰及于謹伐江陵彦穆以本官從平之明帝初進驃騎大將軍開府儀同三司俄拜安州刺史總管十二州諸軍事入為御正大夫陳氏請敦隣好詔彦穆使焉彦穆風韻閑曠器度方雅善元言解談謔甚為江表所稱轉戸部中大夫進爵為公天和三年聘齊還除金州刺史總管七州諸軍事進位大將軍尋徴拜小司徒及宣帝崩隋文帝輔政三方起兵以彦穆為行軍總管與襄州總管王誼討司馬消難軍次荆州總管獨孤永業有異志遂收而戮之及事平隋文帝徴王誼入朝即以彦穆為襄州刺史總管六州諸軍事加授上大將軍進爵東郡公頃之永業家自理得雪彦穆坐除名尋復官爵開皇元年卒子君綽嗣君綽性夷簡博覧經史有父風大象末丞相府賔曹參軍君綽弟君肅解巾道王侍讀大象末潁川郡守楊纂廣寧人也父安仁魏朔州鎮將纂少慷慨有志畧勇力兼人年二十從齊神武起兵於信都以軍功稍遷武州刺史自以賞薄志懷怨憤毎歎曰大丈夫富貴何必故郷若以妻子經懷豈不沮人雄志大統初乃間行入闗文帝執纂手曰人所貴者忠義也所懼者危亡也其能不憚危亡蹈兹忠義者今方見之於卿耳即授征南將軍大都督封永興縣侯從文帝解洛陽圍經河橋芒山之戰纂毎先登軍中咸推其敢勇累遷驃騎大將軍開府儀同三司加侍中進爵為公賜姓莫胡盧氏俄授岐州刺史孝閔帝踐阼進爵宋熙郡公保定元年位大將軍改封隴東郡公除隴州刺史從隋公楊忠東伐至并州而還天和六年進授柱國大將軍轉華州刺史纂性質樸又不識文字前後莅職但推誠信而已吏人以其忠恕頗亦懷之尋卒於州子睿位至上柱國漁陽郡公段永字永賔其先遼西石城人晉幽州刺史疋磾之後也曽祖愄仕魏黃龍鎮將因家髙陸之河陽焉永㓜有志操閭里稱之魏正光末北鎮擾亂遂攜老㓜避地中山後赴洛陽拜平東將軍封沃陽縣伯青州人崔社客舉兵反永討平之進爵為侯除左光禄大夫時有賊魁元伯生西自崤潼東至鞏洛屠陷城壁所在為患孝武遣京畿大都督疋婁昭討之昭請以五千人行永進曰此賊既無城柵唯以㓂抄為資取之在速不在衆也若星馳電發出其不虞精騎五百足矣帝然其計於是命永代昭以五百騎倍道兼行遂破平之及帝西遷永時不及從大統初乃結宗人潛謀歸款密與都督趙業等襲斬西中郎將慕容顯和傳首京師以功别封昌平縣子徐州刺史從禽竇泰復𢎞農破沙苑並有戰功進爵為公河橋之役永力戰先登授南汾州刺史累遷驃騎大將軍開府儀同三司賜姓爾綿氏廢帝元年授恒州刺史於時朝貴多其部人謁永之日冠蓋盈路當時榮之孝閔帝踐阼進爵廣城郡公歴文𤓰二州刺史戸部中大夫保定四年拜大將軍永厯任内外所在頗有聲稱輕財好士朝野以此重焉天和四年授小司㓂尋為右二軍總管率兵北道講武遇疾卒於賀葛城喪還武帝親臨贈使持節柱國大將軍同華等五州刺史諡曰基子岌嗣位至儀同三司兵部下大夫令狐整字延保敦煌人也本名延世為西土冠冕曽祖嗣祖紹安官至郡守咸為良二千石父蚪早以徳行著聞仕歴瓜州司馬敦煌郡守郢州刺史封長城縣子魏大統末卒於家文帝甚痛悼之遣使者監䕶喪事又敇鄊人為營墳壟贈龍驤將軍𤓰州刺史整㓜聰敏沈深有識量學藝騎射並為河右所推刺史魏東陽王元榮辟整為主簿加盪㓂將軍整進趣詳雅對揚辯暢謁見之際州府傾目榮器整徳望嘗謂僚屬曰令狐延保西州令望方成重器豈州郡之職所可縶維但一日千里必基武歩寡人當委以庶務畫諾而已頃之孝武西遷河右擾亂榮仗整防扞州境獲寧及鄧彦竊據𤓰州拒不受代整與開府張穆等密應使者申徽執彦送京師文帝嘉其忠節表為都督尋而城人張保又殺刺史成慶與凉州刺史宇文仲和構逆規據河西晉昌人吕興等復害郡守郭肆以郡應保初保等將圖為亂慮整守義不從既殺成慶因欲及整然以整為人之望復恐其下叛之遂不敢害雖外加禮敬内甚忌整整亦偽若親附而密欲圖之陰令所親說保曰君與仲和結為唇齒今東軍漸逼涼州彼勢孤危恐不能敵若或摧衂則禍及此土宜分遣鋭師星言救援二州合勢則東軍可圖然後保境息民計之上者保然之而未知所任整又令人說保曰歴觀成敗在於任使所擇不善旋致傾危令狐延保兼資文武才堪統御若使為將蔑不濟矣保納其計且以整父兄等並在城中弗之疑也遂令整行整至玉門郡召集豪傑説保罪逆馳還襲之先定晉昌斬吕興進軍擊保州人素服整威名並棄保來附保遂奔吐谷渾衆議推整為刺史整曰本以張保肆逆殺害無辜闔州之人俱陷不義今者同心務在除凶若其相推薦復恐效尤致禍於是乃推波斯使主張道義行州事具以狀聞詔以申徽為刺史徴整赴闕授壽昌郡守封襄武縣男文帝謂整曰卿早建殊勲今官位未足酬賞方當與卿共平天下同取富貴遂立為𤓰州義首整以國難未寧常願舉宗効力遂率鄊親二千餘人入朝隨軍征討整善於撫馭躬同豐約是以士衆並忘覊旅盡其力用文帝嘗從容謂整曰卿逺祖立忠而來可謂積善餘慶世濟其羙者也整逺祖漢建威將軍邁不為王莾屈其子稱避地河右故文帝稱之云累遷驃騎大將軍開府儀同三司加侍中文帝又謂整曰卿勲同婁項義等骨肉立身敦雅可以範人遂賜姓宇文氏并賜名整焉宗人二百餘戸並列屬籍孝閔帝踐阼拜司憲中大夫處法平允為當時所稱進爵彭城縣公初梁興州刺史席固以州来附文帝以固為豐州刺史固莅職既久猶習梁法凡所施為多虧政典朝議密欲代之而難其選令整權鎮豐州委以代固之畧整廣布威恩傾身撫接數月之間化洽州府於是除整豐州刺史以固為湖州豐州舊不居民中賦役參集勞逸不均整請移居武當詔可其奏奬勵撫導遷者如歸旬月之間城府周備固之遷也其部曲多願留為整左右整諭以朝制弗之許焉莫不流涕而去及整秩滿代至吏民戀之老㓜送整逺近畢集數日停留方得出界其得人心如此拜御正中大夫出為中華郡守轉同州司㑹遷始州刺史整雅識情偽尤明政術恭謹㢘慎常懼盈滿故歴居内外所在見稱進位大將軍晉公䕶之初執政也欲委整以腹心整辭不敢當頗忤其意䕶以此疎之及䕶誅附㑹者咸伏法而整獨保全時人稱其先覺卒贈本官加四州諸軍事鄜州刺史諡曰襄子熙嗣熙列在隋史整弟休㓜聰敏有文武才用與整同起兵逐張保授帥都督後為中外府樂曹參軍時諸功臣多為本州刺史晉公䕶謂整曰以公勳望應得本州但朝廷藉公委任無容逺出然公一門之内須有衣錦之榮乃以休為敦煌郡守在郡十餘年甚有政績卒於合州刺史唐永北海平夀人漢尚書令林之後也本居晉昌之憤安縣晉亂徙於丹陽祖揣始還魏官至北海太守因家焉父倫青州刺史永身長八尺少耿介有將帥才讀班超傳慨然有萬里之志正光中為北地太守當郡别將俄而賊將宿勤明達車金雀等宼郡境永擊破之境内稍安永善馭下士人競為之用臨陣常著帛裙襦把角如意以指麾處分辭色自若在北地四年與賊數十戰未嘗敗北時人語曰莫陸梁恐爾逢唐將永所營處至今猶稱唐公壘也行臺蕭寳夤表永為南幽州刺史夷人送故者莫不垂淚當路遮留追隨數日始得出境大統元年拜東雍州刺史尋加衛將軍封平夀伯卒贈司空公永性清㢘家無蓄積妻子不免饑寒世以此稱之子陵少習武藝頗閑吏職位大都督應州刺史車騎大將軍儀同三司陵子悟羙風儀博渉經史文詠可觀大象中頗被宣帝任遇位至内史下大夫漢陽公隋文帝得政廢於家而卒陵弟瑾字附璘性温㳟有器量博渉經史雅好屬文身長八尺二寸容貌甚偉年十七文帝聞其名乃貽永書曰聞公有二子曰陵曰瑾陵縱橫多武畧瑾雍容富文雅可並遣入朝孤欲委以文武之任因召拜尚書員外郎相府記室參軍事軍書羽檄瑾多掌之從破沙苑戰河橋並有功封姑臧縣子累遷尚書右丞吏部郎中於時魏室播遷庶務草創朝章國典瑾並參之數從征戰有功累遷户部尚書進位驃騎大將軍開府儀同三司賜姓宇文氏時燕公于謹勳髙望重朝野所屬白文帝曰謹幸藉時乗遂叨榮顯子弟垂纓曵組數十人其所交游未有徳義可稱尚書唐瑾學行兼修願與之同姓結為兄弟庶子孫承其餘論有益義方文帝歎異者久之更賜瑾姓万紐于氏謹乃深相結納敦長㓜之序瑾亦庭羅子孫行弟姪之敬其為朝望所宗如此進爵臨淄縣伯轉吏部尚書銓綜衡流雅有人倫之鍳以父憂去職尋起令視事時六尚書皆一時之秀文帝自謂得人號為六俊然瑾尤見器重于謹南伐江陵以瑾為元帥府長史軍中謀畧多出瑾焉江陵既平衣冠仕伍並沒為僕𨽻瑾察其才行有片善者輙議免之賴瑾獲濟者甚衆時論多焉及軍還諸將多因虜掠大獲財物瑾一無所取唯得書兩車載之以歸或白文帝曰唐瑾大有輜重悉是梁朝珍玩文帝初不信之然欲明其虚實密遣使檢閱之唯見墳籍而已文帝乃歎曰孤知此人來二十許年了謂其不以利干義向若不令檢視恐常人有投杼之疑孤所以益明之耳凡受人委任當如此也論平江陵功進爵為公六官建授禮部中大夫出為蔡州刺史歴拓州硤州皆有徳化吏民稱之轉荆州總管府長史入為吏部中大夫歴御正納言内史中大夫曽未十旬遂遷四職搢紳咸以為榮久之除司宗中大夫兼内史尋卒贈小宗伯諡曰方瑾性方重有風格退朝休假恒正衣冠以對妻子遇迅雷烈風雖暮亱晏寢必起冠帯端笏危坐又好施與家無餘財所得禄賜常散之宗族其尤貧者又割膏腴田宅以振之所留遺子孫者並墝埆之地朝野以此稱之撰新儀十篇所著賦頌碑誄二十餘萬言孫大智嗣瑾次子令則性好篇章兼解音律文多輕豔為時人所傳天和初以齊馭下大夫使於陳大象中官至樂部下大夫仕隋位太子左庶子皇太子勇廢被誅桞敏字白澤河東解人晉太常純之七世孫也父懿魏車騎大將軍儀同三司汾州刺史敏九嵗而孤事母以孝聞性好學渉獵經史陰陽卜筮之術靡不習焉年未弱冠起家員外𣪚騎常侍累遷河東郡丞朝議以敏之本邑故有此授敏雖統御鄊里而處物平允甚得時譽及文帝克復河東見而器異之乃謂之曰今日不喜得河東喜得卿也即拜丞相府參軍事俄轉户曹參軍兼記室毎有四方賔客常令接之爰及吉凶禮儀亦令監綜又與蘇綽等修撰新制為朝廷政典遷禮部郎中封武城縣子加帥都督領本鄊兵俄進大都督遭母憂居喪旬日之間髪鬢半白尋起為吏部郎中毁瘠過禮杖而後起文帝見而異之特加禀賜及尉遲迥伐蜀以敏為行軍司馬軍中籌略並以委之益州平進驃騎大將軍開府儀同三司加侍中遷尚書賜姓宇文氏六官建拜禮部中大夫孝閔帝踐阼進爵為公又除河東郡守尋復徴拜禮部出為郢州刺史甚得物情及將還朝夷夏士民感其恵政並齎酒餚及物産候之於路敏乃從他道而還復拜禮部後改禮部為司宗仍以敏為之敏操履方正性又恭勤毎日將朝必夙興待旦又久處臺閣明練故事近儀或乖先典者皆案據舊章刋正取中遷小宗伯監脩國史轉小司馬又監脩律令進位大將軍出為鄜州刺史以疾不之部武帝平齊進爵武徳郡公敏自建徳以後寢疾積年武帝及宣帝並幸其第問疾焉隋開皇元年進位上大將軍太子太保其年卒贈五州諸軍事晉州刺史臨終戒其子等喪事須務從簡約其子等並涕泣奉行少子昂知名列在隋史王士良字君明其先太原晉陽人也後因晉亂避地涼州魏太祖平沮渠氏曽祖景仁歸魏為敦煌鎮將祖公禮平城鎮司馬因家於代父延蘭陵郡守士良少脩謹不妄交游孝莊末爾朱仲逺啟為府參軍事歴大行臺郎中諫議大夫封石門縣男後與紇豆陵歩藩交戰軍敗為藩所禽遂居河右偽行臺紇豆陵伊利欽其才擢授右丞妻以孫女士良既為姻好便得盡言遂曉以禍福伊利等即歸附朝廷嘉之太昌初進爵晉陽縣子尋進爵琅邪縣侯授太中大夫右將軍出為殷州車騎府司馬東魏徙鄴之後置亰畿府專典兵馬時齊文襄為大都督以士良為司馬領外兵參軍尋遷長史加安西將軍徙封符壘縣侯武定初除行臺右中兵郎中又轉大將軍府屬從事中郎仍攝外兵事王思政鎮潁川齊文襄率衆攻之授士良大行䑓左丞加鎮西將軍進爵為公令輔其弟演於并州居守齊文宣即位入為給事黃門侍郎領中書舎人仍總知并州兵馬事加征西將軍别封新豐縣子俄除驃騎將軍尚書吏部郎中文宣自晉陽赴鄴宫復以士良為尚書左丞統留後事仍遷御史中丞轉七兵尚書未㡬入為侍中轉殿中尚書頃之復為侍中吏部尚書士良少孤事繼母梁氏以孝聞及卒居喪合禮文宣起令視事士良屢表陳誠再三不許方應命文宣見其毁瘠乃許之因此卧疾歴年文宣毎自臨視疾愈除滄州刺史乾明初徴還鄴授儀同三司孝昭即位遣三道使搜揚人物士良與尚書令趙郡王髙叡太常卿崔昂分行郡國但有一介之善者無不以聞齊武成初除太子少傅少師復除侍中轉太常卿尋加開府儀同三司出為豫州道行臺豫州刺史保定四年晉公䕶東伐權景宣以山南兵圍豫州士良舉城䧏授大將軍小司徒賜爵廣昌郡公尋除荆州總管荆州刺史復入為小司徒俄除鄜州刺史轉金州刺史士良去鄊既久忽臨本州耆老故人猶有存者逺近咸以為榮加授上大將軍以老病乞骸骨優詔許之開皇元年卒時年八十二子徳衡大象末儀同大將軍郭賢字道因趙興陽州人也性彊記學渉經史以征討有功授都督大統初齊神武襲陷夏州文帝慮其南下與朝臣議之賢進曰髙歡兵雖衆智勇已竭策其舉措必不敢逺來昔賀拔公初薨闗中振駭而歡不能因利乘便進取雍州是無智也及鑾駕西遷六軍寡弱毛鴻賔喪敗闗門不守又不能乘此危機以要一戰是無勇也今上下同心士民戮力歡志沮喪寧敢送死且豳夏荒阻千里無煙縱欲南侵資糧莫繼以此而言不來必矣齊神武後果退如賢所策孝閔踐阼進位驃騎大將軍明帝初除迎師中大夫天和元年卒於陜州刺史楊寛字䝉仁𢎞農華陰人也曽祖暉魏洛州刺史贈𢎞農公諡曰簡祖恩河間太守父鈞位七兵尚書北道大行臺恒州刺史懷朔鎮將贈侍中司空公臨貞縣伯諡曰恭寛少有大志毎與諸兒童遊處必擇髙大之物坐之見者咸異焉及長頗解屬文尤尚武藝弱冠除奉朝請父鈞出鎮恒州請隨從展効乃授髙闕戌主既而蠕蠕亂其主阿那瓌奔魏魏帝詔鈞衛送寛亦從行時北邊賊起攻圍鎮城鈞卒城人等推寛守禦尋而城陷寛乃北走蠕蠕後討六鎮賊破寛始得還朝廣陽王深與寛素相昵深犯法得罪寛被逮捕孝莊時為侍中與寛有舊蔵之於宅遇赦得免除宗正丞北海王顥少相器重時為大行臺北征葛榮欲啟寛為左丞寛辭以孝莊厚恩未報義不見利而動顥未之許顥妹壻李神軌謂顥曰匹夫猶不可奪志况義士乎乃止孝莊踐阼累遷洛陽令以都督從太宰上黨王元天穆討平邢果師未還屬元顥入洛莊帝出居河内天穆懼集諸將謀之寛勸天穆徑取成臯㑹兵伊洛天穆然之乃趣成臯令寛與爾朱兆為後拒尋以衆議不同乃回赴石濟寛夜行失道遂後期諸將咸言寛少與北海周旋今不來矣天穆答曰楊寛非輕去就者也吾當為諸君明之言訖候騎白寛至天穆撫髀而笑曰吾固知其逺來遽出帳迎握其手曰是所望也與天穆俱謁孝莊於太行仍為都督從平河内進圍北中時梁陳慶之為顥勒兵守北門天穆駐馬圍外遣寛至城下説慶之不答久之乃曰賢兄撫軍在此頗欲相見不寛答僕兄既力屈凶威迹淪逆黨人臣之理何煩相見天穆聞之自此彌加敬重孝莊反正除太府華州大中正封澄城縣伯爾朱榮被誅其從弟世澄等出據河橋還逼京師進寛使持節大都督隨機捍禦世隆謂寛曰豈忘太宰相知之深也寛答曰太宰見愛以禮人臣之交耳今日之事事君之節及爾朱兆陷洛陽囚執孝莊帝寛還洛不可遂自成臯奔梁至建業聞莊帝弑崩寛發喪盡禮梁武義之尋以禮送還孝武初除給事黃門侍郎孝武與齊神武有隙遂召募驍勇廣増宿衛以寛為閤内大都督專總禁旅從孝武入闗兼吏部尚書録從駕勳進爵華山郡公大統初遷太子太傅五年除驃騎大將軍開府儀同三司都督雍州刺史即本州也魏廢帝初為尚書左僕射將作大監坐事免明帝初拜大將軍從賀蘭祥討吐谷渾破之别封宜陽縣公除小冢宰轉御正大夫武成二年詔寛與麟趾殿學士參定經籍寛性通敏有器幹頻牧數州號稱清簡歴居臺閣有當官之譽然與桞機不協案成其罪時論頗以此譏之保定元年除總管梁興等十九州諸軍事梁州刺史薨於州贈華陜虞上潞五州刺史諡曰元子文恩入隋列在隋史通志卷一百五十八
