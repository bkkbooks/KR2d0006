body:
  text: 通志卷二十八宋右廸功郎鄭樵漁仲撰氏族略第四以名為氏臣謹按諡法起於周自堯舜禹湯之前雖天子亦以名呼故其後之人亦以名氏焉古天子名大庭氏英賢傳曰古天子號一云炎帝時諸侯大氏風俗通大庭氏之後又大填大山稽並黄帝師大款為顓帝師禮記大連東夷之子懷氏無懷氏之後吳志顧雍傳有尚書懐叙望出河内宋政和二年懷芑登科陳州人鬷氏古鬷夷氏之後左傳鄭有鬷蔑晉有鬷戾戲氏伏羲氏之後也音羲亦去聲魏志有戲志才潁川人伏氏風姓伏羲氏之後遂以為氏與任宿須句顓臾同祖又俟伏氏改為伏氏望出髙陽宓氏即伏羲氏之後也伏亦作宓仲尼弟子宓不齊字子賤魯人後轉為密臣謹按伏宓同出伏羲氏異文者其後之人以别族也有氏風俗通有巢氏之後仲尼弟子有若魯人漢有有禄神氏風俗通神農氏之後漢有騎都尉神曜姓苑云琅邪有神氏軒轅氏亦為帝鴻氏風俗通軒轅即黄帝也姓公孫或言姓姬宋祥符登科軒轅損軒氏即軒轅氏也亦省作軒氏漢有諫議大夫軒和宋登科軒彦績鴻氏大鴻氏之後也大鴻即黄帝亦謂帝鴻氏左傳衞有鴻聊魋齊有直閤將軍鴻選金氏金天氏之後也黄帝之子元枵亦為少昊氏曰少昊摯亦為青陽氏己姓後為嬴姓鳥官漢功臣表有金安上望出渤海青陽氏風俗通青陽黄帝子也始得姓焉見國語漢有東海太守青陽愔又東海王國中尉青陽精宋咸平登科有青陽相元符有青陽囬陵井監人青氏即青陽氏之後亦為青氏宋登科青傑應天府人媧氏女媧氏之後盤氏盤瓠氏之後與冉元己李田為巴南六姓昊氏又作皥風俗通云昊英氏之後也一云少昊之後少氏少昊氏之後一云少典之後禮記少連善居䘮東夷之子髙陽氏髙陽氏之後吕氏春秋古辯士髙陽魋顓玉氏帝髙陽氏也黄帝之孫帝王名臣謹按中古之前一代質於一代中古之後一代文於一代觀堯舜禹湯猶且名焉則二帝之前良可知伏羲又曰太昊帝嚳又曰高辛皆二命也堯曰放勛舜曰重華禹曰文命湯曰天乙從可知也堯氏帝堯之後也支孫以為氏望出河間上黨臣謹按諡義起於周後人不知而作諡法以堯舜禹湯為諡誤矣此皆名也禹氏姓姒夏禹之後也王僧孺百家譜云蘭陵蕭道遊娶禹氏女南唐將禹萬誠望出隴西啓氏姓姒夏后啓之後也後燕有啓崙湯氏子姓夏商之前未有諡法堯舜禹湯皆名也南史道人湯休唐貞元道人湯靈徹宋州刺史湯桑並吳人宋湯氏為著姓望出中山范陽甲氏子姓風俗通太甲之後一云鄭大夫石甲之後臣謹按商人之道以實不以文故命名無義死亦無諡自太甲至帝乙紂辛幾四十世惟以十日命生之與死皆以是己之所稱人之所呼亦以是逮周生有名死有諡生以義名死以義諡生曰昌曰發死曰文曰武微子啓微仲衍箕子比干皆周人也故去其甲乙丙丁之類始尚文焉沃氏子姓風俗通商王沃丁之後神仙傳沃焦吳人槐氏音懷夏王帝槐之後也其音囬者富父槐之後與此同文異音宋朝有尚書郎槐京古人名力氏黄帝臣力牧之後漢有魯相力題漢末有力子都為盜今臨安多有此姓牧氏黄帝臣力牧之後漢有越雋太守牧良玉氏音宿黄帝時公玉帶造合宫明堂見尸子後為玉氏後漢司徒玉況字文伯三苖氏姜姓炎帝之後為侯國因氏焉夷鼓氏英賢傳黄帝之子夷鼔之後國語秦大夫有夷鼔徳宜疇氏風俗通云摯疇之後或作儔堪氏姓苑古八元仲堪之後頡氏姓苑蒼頡之後風俗通云頡衞古之賢人倉頡氏黄帝史官子孫氏焉馮翊縣人僑氏風俗通黄帝孫僑極之後僑亦作蟜蟜氏音矯髙陽氏之元孫蟜牛之後舜之祖也禮記有蟜固漢有逸人蟜慎望出扶風童氏顓帝生老童其子孫以王父字為氏今建昌有此姓望出渤海臣謹按以王父字為氏惟見於周未知五帝之時有此義否僮氏即童也或從人以别其族漢有交趾刺史僮尹吳志丹陽僮芝自擅廬陵詐言被㫖為郡太守老氏風俗通顓帝子老童之後左傳宋有老佐論語老彭即彭祖也或云老氏老聃老萊子之後並無聞焉以其老也故以老稱之遂為氏廣氏風俗通云廣成子之後也放氏上音堯臣放齊之後也奮氏髙辛氏才子八元伯奮之後楚有奮揚蓐氏風俗通云蓐收之後栗氏栗陸氏之後也漢有栗融字容卿又有富人栗氏長安人漢景帝時栗夫人生臨江王榮尊盧氏古太昊時諸侯鬷夷氏左傳祝融董父之後為鬷夷氏勾龍氏共工氏之後勾龍為土正今社神也紹興御史中丞勾龍如淵熙氏英賢𫝊曰帝嚳使元冥為水正熙氏佐之因以為氏脩氏元㝠之佐有脩氏因以為氏焉白㝠氏史記秦嬴姓有白㝠氏根水氏世本老童娶根水氏奔水氏神農納奔水氏為妃列氏亦作烈神農之世有烈山氏焉子孫為列氏鄭有隠者列禦寇著書八篇號列子晉有恊律郎列和善吹笙夙氏古夙沙氏之後衞有夙沙衞閽寺之屬訾氏音紫風俗通帝嚳妃訾娵氏女姓苑云今齊人漢功臣表有樓虚侯訾順望出渤海姓苑云本姓祭以為不祥改為訾蚩氏蚩尤氏之後也融氏祝融氏之後也勾氏勾芒氏之後史記有勾疆宋登科勾希言又有勾土良益州人尊氏古尊盧氏之後也渾沌氏太昊佐渾沌氏也屯氏姓苑云渾沌氏之後去水為屯漢有太山太守屯莫巴都有後蜀法部尚書屯度望出巴郡汪氏汪芒氏之裔禮記有汪踦魯人也宋朝為著姓稽氏黄帝臣太山稽之後風俗通云稽黄秦賢人也漢貨殖有稽發泠氏風俗通云黄帝時典樂泠倫之後左傳秦大夫泠至周有泠州鳩漢功臣下相侯泠耳元帝功臣駟望侯泠廣又有泠褒泠豐宋登科有泠洙開封府人冷氏即泠氏又有作上音者前趙徐州刺史冷道江都人唐貞元兼監察御史冷朝陽吳人望出新蔡臨安倫氏風俗通云黄帝樂人泠倫氏之後今密州多此姓唐監察御史倫慶京兆人泠倫氏黄帝樂官二名分為四氏所以别族臺氏臺駘之後漢有侍中臺崇後漢髙士臺佟晉有術氏臺彦前趙録特進臺彦髙五代有臺濛囬氏祝融子吳回之後敳氏八凱隤敳之後以王父字為氏亷氏顓帝曽孫大亷之後以王父字為氏趙有亷頗漢有亷丹亷范宋亷布登科楚州人亷操毅昌州人臣謹按古者帝王猶以名行况臣下乎此以名為氏然以名字為氏者起於商周之世今此亷氏未有所徴且從大亷之號焉龍氏舜臣也龍為納言子孫以名為氏又董父己姓以能畜龍故賜氏為豢龍氏龍且楚人為項羽將漢有將軍龍伯髙急就章龍未央亦楚人也今望出天水武陵宋朝登進士科龍起之後有龍湑䕫州人龍瑜汾州人龍漙吉州人容氏帝王紀黄帝臣曰容成造歴舜八愷有仲容何承天姓苑云禮記容居吳人也望出敦煌重氏風俗通云顓帝重黎之後少昊時重為南正司天之事黎為北正司地之事幕氏風俗通舜祖幕之後也幕見左傅莫氏即幕氏省文漢有富人莫氏見游侠傳唐大歴比部員外郎莫藏用又河南官氏志邢莫氏改為莫氏望出江陵和氏羲和堯時掌天地之官和仲和叔因以為氏晉有和組父漢有和武又後魏有素和氏改為和氏五代有侍中和凝宋太平登科有和䝉咸平有和郁臣謹按堯舜二典所命之官如臯䕫益稷之類皆以名稱和以名為氏仲叔又其長幼之稱也羲氏羲和堯掌天地之官子孫氏焉殳氏尚書殳戕舜臣南史有殳嘉興又有殳真得道經訣望出武功禺氏音愚禺彊之後出姓苑狸氏舜八元季狸之後也纍氏風俗通纍祖之後左傳晉七輿大夫纍虎實氏實沈之後逹氏八凱叔逹之後也格氏允格之後後漢有御史格班裔孫顯後魏青州刺史雄氏舜七友雄陶之後以名為氏終氏陸終之後以名為氏望出濟南南陽宋有終慎思季連氏芊姓鬼方氏陸終第六子季連因氏焉善氏善卷之後善卷堯時髙士見吕氏春秋囂氏亦作枵世本云元囂之後臯氏臯陶之後左傳越大夫臯如風俗通漢有司徒長史臯誨敖氏顓帝師太敖之後宋敖穎士登進士第又有敖知言臨江軍人望出譙國陸終氏祝融子陸終之後也丹氏堯子丹朱之後漢有丹王君長安富人臨氏八凱大臨之後也石趙秦州刺史臨深東海人隋日者儀同臨孝恭知天文京兆人望出西河參氏董姓陸終第二子參胡後見世本唐開元登科有參開又作葠氏即古文參字徴氏杜云理徴之後吳有率更令徴宗河南人咸氏姓苑有咸氏云巫咸之後唐開元中有殿中侍御史咸虞業世居東海臨朐飛亷氏史記秦嬴姓有飛亷氏昌氏風俗通云黄帝子昌意之後今嶺南多昌族望出汝南東海豹氏八元叔豹之後也倉氏黄帝史官倉頡之後或言古有世掌倉庾者各以為氏春秋時周有倉葛魏有敦煌太守倉慈望出武陵蒼氏風俗通云八凱蒼舒之後漢有江夏太守蒼英子孫遂為江夏人望出武陵周人名服氏周内史叔服之後漢有江夏太守服徴又後漢九江太守服䖍注漢書河南人望出西平鞠氏姬姓后稷之孫生而有文在手曰鞠因以名之裔孫鞠武為燕太子丹傅風俗通漢尚書令鞠譚或為鞠氏音之訛也宋鞠詠為天章閣待制又有鞠先鞠整鞠仲謀登科麴氏即鞠氏也漢尚書令鞠譚生閟避難湟中因居西平改姓麴氏宋開寳登科有麴拱今歴陽多此姓望出吳興稷氏姬姓后稷之子孫氏焉見姓苑漢稷嗣君叔孫通支孫亦為稷氏今兗州有此姓篇氏周大夫史篇之後皮氏風俗通周卿士樊仲皮之後漢有皮尚後漢有諫議大夫皮究北齊有皮柔和唐末有皮日休宋皮仲容登進士第臣謹按世譜樊皮字仲文此則以名為氏不以字為氏也輿氏云周大夫伯輿之後以王父字為氏又莫輿氏改為輿臣謹按伯輿名也晁氏亦作朝亦作鼂姬姓周景王子王子朝之後朝亦作晁一云衞大夫史晁之後漢有御史大夫晁錯宋翰林學士晁逈子宗慤參知政事望出潁川京兆狐氏姬姓周平王之子王子狐之後以名為氏或言晉唐叔之後世為晉卿蜀有狐篤臣謹按左傳大戎狐姬生公子重耳小戎子生夷吾姬姓也狐氏也戎國也言戎國狐氏姬姓之女凡姓别婚姻氏别貴賤此言狐姬者明此姬出於王子狐之後貴族之女故兼氏言之蓋戎國不足貴矣所貴者狐氏則知王子狐之後有居於戎者也昔氏風俗通周大夫封昔因氏焉漢有昔登為烏傷令唐開元有昔安仁生豐大禮評事汝州人太氏文王四友太顚之後咸陽有此姓季騧氏周八士季騧之後晉有祁邑大夫季騧息季隨氏世本周八士季隨之後宋有季隨逄閎氏周文王四友閎夭之後漢有廣陵相閎孺牙氏風俗通云周穆王司徒君牙之後以王父字為氏臣謹按穆王所以命君牙無因不以名命也魯人名展氏姬姓魯孝公之子公子展之後以名為氏又有輾遲氏改為展氏大姓也梁有畫工展子䖍望出河東臣謹按隱八年無駭卒無駭者展之孫也傳言羽父請氏公命以字為展氏然孝公之子四人惠公公子益師字衆父其後為衆氏公子彄食臧邑其後為臧氏公子展名也古人尚質有名無字者多矣益師有字則以字氏彄有邑則以邑氏展無字邑則以名為氏何必專守王父字之說乎弓氏魯大夫叔弓之後漢有光禄勲弓社賜氏仲尼弟子端木賜之後以王父名為氏兹氏姬姓魯桓公之孫公孫兹之後今望出會稽臣謹按公孫兹曰戴伯戴諡也伯長也皆不以為氏而以名為氏則知古人以名行者初不以為惡也以此亦知不以公子字而以公孫名者亦可為氏也意如氏姬姓魯季孫意如之後遺氏魯費宰南遺之後急就章有遺餘人述氏魯大夫仲述之後見世本牢氏仲尼弟子琴牢之後以王父名為氏漢中書僕射牢梁石顯前漢儒林傳有牢邱後漢有牢慎晉人名犨氏姬姓晉大夫郄犨之後麗氏晉匠麗之後招氏晉歩招之後漢有大鴻臚招猛居氏晉大夫先且居之後以王父字為氏漢有来城侯居般今錢塘多此姓望出渤海信都臣謹按先且居字霍伯此以名為氏者曠氏風俗通師曠之後萬氏亦作婏姬姓畢萬之後一云芮伯萬之後孟軻門人萬章漢有萬攀又有吐萬氏改萬氏盈氏姬姓晉欒盈之後虢射氏晉大夫虢射之後漢桓帝時羽林右監虢射鏘季嬰氏世本晉樓季嬰之後季夙氏世本潜夫論晉靖侯孫季夙之後樓季氏姬姓潜夫論晉穆侯庻子樓季之後弗忌氏姬姓晉大夫欒弗忌之後也弗忌者靖侯之元孫也甥氏亦作生晉吕甥之後也即瑕吕飴生亦作隂飴生故又為生氏大狐氏姬姓世本晉大夫大狐伯生突生饒為大狐氏其後大狐容為晉大夫大戊氏姬姓晉公子大戊之後也世本大戊教昭為原大夫嬰氏嬴姓風俗通云晉大夫趙嬰齊之後夷吾氏姬姓晉惠公名夷吾懐公繼之不享其位其後支庻以名為氏也梁其氏姬姓晉大夫梁其踁之後英賢傳云魯伯禽庻子梁其之後曋氏狼曋之後漢書武落鍾離山黒穴有楚氏曋氏鄭氏相氏鄭人名段氏姬姓鄭武公子共叔叚之後以王父字為氏戰國韓相段規三輔决録云叚氏干木之子隠如入關去干字漢文帝時段卭為北地都尉成帝時叚會為西域都䕶後漢桓帝世段熲為太尉皆其裔也臣謹按共叔段者共諡叔字段名也此以名為氏者春秋鄭伯克段于鄢段名也封於京故謂京城太叔亦謂之太叔氏司氏鄭司臣之後宋朝有司超為防禦使望出頓山豐氏左傳鄭穆公子豐之後以王父字為氏望出松陽宋豐稷登進士第元豐登第有豐安常明州人臣謹按穆公之子皆以王父字為氏公子去疾字子良其後為良氏良霄良止是也公子喜字子罕其後為罕氏罕虎罕魋是也公子騑字子駟其後為駟氏駟帶駟乞是也公子偃字子游其後為游氏游吉游眅是也以至子孔子國子印子然皆然惟公子豐無字其後為豐施豐卷並以名為氏蘭氏姬姓鄭穆公裔也穆公名蘭其攴庻以王父名為氏漢有太守蘭廣後漢書南匈奴四姓有蘭氏又河南官氏志烏蘭氏改為蘭唐太和登第有蘭承然氏姬姓鄭穆公子然之後也然丹仕楚為右尹姓苑云今蒼梧人望出山陽子然氏姬姓鄭公子然之後也又為然氏去疾氏姬姓世本鄭穆公子去疾之後去疾字子良又有良氏所以别族吳人名壽氏姬姓風俗通吳王夀夢之後吳大夫夀越又有夀於姚漢末兗州牧夀良晉有太僕夀冲南涼有尚書夀恱南史將軍夀寂之望出京兆博陵宋登科夀朋漢州人要氏吳人要離之後漢有河南令要兢唐建中朔方大將軍要珍望出魯國既氏姬姓風俗通云吳王夫槩之後因避仇改為既氏漢有南安長既良常壽氏姬姓吳仲雍之後左傳越大夫常夀過慶忌氏姬姓吳公子慶忌之後衞人名輙氏姬姓風俗通衞出公輙之後漢有輙終古兼氏風俗通衞公子兼之後也彊梁氏世本衞將軍文子生慎子㑹生彊梁因氏焉秦有左庻子長水校尉彊梁臯子郢氏姬姓衞公子郢之後也臣謹按公子郢字子南已有子南氏復有子郢氏此後之人所以别族也齊人名高氏姜姓齊太公六代孫文公之子公子髙之孫傒以王父名為氏裔孫洪後漢渤海太守因居之又有惠公之子公子祁字子髙之後亦為髙氏鄭有髙克髙渠彌不得氏又髙麗羽真氏改為髙氏又是婁氏改為髙氏又髙獲自髙麗歸魏周賜姓獨孤氏柴氏姜姓齊文公子髙之後髙孫傒以王父名為氏十代孫高柴仲尼弟子孫舉又以王父名為柴氏漢有棘蒲侯柴武裔孫守禮五代周太祖無後以守禮子榮為嗣是為世宗臼季氏姜姓齊公子臼季之後魯有臼季宣孟激氏齊太史激之後漢書淮南王傳有激章刁氏音凋風俗通齊大夫童刁之後戰國時有刁勃漢有刁間齊人以富聞子孫居勃海後漢有侍中刁榮宋有刁湛刁約刁獻可登科氏音黎蜀有刁逵避難改焉又百濟八姓其三曰氏連氏左傳齊大夫連稱之後又是連氏改為連望出上黨法氏姜姓田氏之裔也齊襄王名法章支孫以名為氏光氏狀云田光之後秦末子孫避地以光為氏宋有光垂裕登進士第又有光利賔絳州人駱氏姜姓齊太公之後有公子駱子孫以名為氏吳有駱綂東陽人後居㑹稽曽孫勍又地駱拔氏改為駱氏望出河南㑹稽宋駱偃駱輿京登進士第宣和駱武仲京兆人望氏姜姓風俗通齊太公望之後姓苑云今魏興人景祐登科記有望儼将具氏姜姓英賢傳齊太公子將具之後見國語将鉅氏即將具氏之訛也漢藝文志六國時將具子彰著書五篇漢章帝時中謁者將具彌楚人名熊氏楚鬻熊之後以名為氏望出南昌江陵臣謹按古之諸侯傳國者為諸侯則稱國支庶非諸侯乃稱氏今楚有國稱王而其君世稱熊氏蠻夷之道也能氏姓苑云長廣人狀云楚熊摰之後避難改為能氏能音耐宋醫官能日宣又有能廸登科建州人能將撫州人鬻氏芊姓祝融之後周文王師鬻熊受封於楚著鬻熊子鬻拳之後也姓苑云建平有此姓氏班氏芈姓楚若敖生鬬伯比伯比生令尹子文為虎所乳謂虎有班文因以為氏秦有班壹避地樓煩生孺孺生長長生况况生穉穉生彪班固之父也宋雍熙登第有班綯臣謹按鬬榖於莵因為虎所乳故名榖於莵而字之曰子文其子曰鬬般與班同音不應父曰班而子亦以般名者此以名為氏者員氏音運亦作鄖芊姓楚伍員之後也伍子胥名員以父伍奢被執而奔吳為吳行人以謀楚又使於齊屬其子於鮑氏是為王孫氏吳王聞之賜子胥屬鏤以死伍氏以其祖伍參食邑於椒故其後為椒氏又子胥以名員其後亦以名為氏前涼有安夷人員半千金城人員敞大夏人員景唐吏部郎員嘉靜宋登科員安輿員子思並陵井監人員安宇開封人員逄辰華州人建氏芈姓風俗通楚太子建之後漢元后𫝊有建居趙幽王臣建徳渦氏楚大夫封渦因氏焉三輔决録扶風太守渦尚冉氏楚大夫叔山冉之後以名為氏一云髙辛之後宗冉宗閔冉䕫登進士第望出武陵染氏即冉氏石虎將染閔魏郡内黄人簒石趙號魏三年為燕慕容儁所滅枝氏楚大夫枝如子躬之後或姓枝如臣謹按此必晉欒枝或秦大夫公孫枝之後也以名為氏者若枝如子躬其後自為枝如氏矣到氏楚屈到之後以名為氏鈞氏風俗通楚大夫元鈞之後漢有御史鈞喜倚相氏楚左史倚相之後威王時有倚相季文為士官辛廖氏楚大夫辛廖之後漢有河間相辛廖通接輿氏楚隠者其後因為氏棄疾氏楚平王名棄疾後人為氏悼王時棄疾休為左宰卿射氏晉大夫虢射之後漢有大鴻臚射咸吳有中書郎射慈善治䘮服射食亦切又如字拳氏芊姓楚鬻拳之後衞有大夫拳彌僚氏姓苑宜僚之後晉大夫僚安魯寺人僚柤大心氏芊姓英賢傳楚有大心令尹得臣之子因氏焉楚懷王時大心子成為黄邑大夫楚季氏芊姓世本楚若敖生楚季因氏焉陳大夫有楚季融無庸氏芊姓姓氏英賢傳楚熊渠生無庸因氏焉又無庸先生學仙道季融氏芈姓世本楚鬬亷生季融子孫氏焉翠氏芊姓急就章有翠鴛鴦其先楚景翠之後因避難以祖名為氏子建氏芊姓楚太子建之後也頃襄王時有子建叔子為大夫子午氏芊姓楚公子午之後也齊有大夫子午明圍龜氏芊姓楚鬬圍龜之後越椒氏芊姓楚大夫鬬越椒之後也嬰齊氏芊姓楚穆王之子公子嬰齊之後也嬰齊字子重為令尹黑肱氏芊姓楚共王之子公子黒肱之後也黒肱字子晳巫臣氏芈姓楚屈蕩之子屈申也亦曰申公巫臣奔晉鮮虞氏楚申鮮虞之後也本齊人夏人名羿氏有窮后羿簒夏后相之位羿本國在澶州衞南東十五里故鉏城是也後遷窮石悅氏亦作說傅説之後以名為氏後燕録左僕射悦綰生夀南燕尚書綰昌黎人又有鮮卑人清泉侯悦真亦其族也望出昌黎奚氏夏車正奚仲之後漢功臣表魯侯奚涓成陽侯奚意傳封三代又薄奚氏改為奚氏望出譙國宋登科奚知常徽州人臣謹按奚仲封於薛薛任姓也宋人名衍氏子姓宋微仲衍之後見風俗通微氏子姓宋微仲之後左傳魯大夫微彪微生氏猶今人曰某生也微生畝魯武城人又微生髙或云即尾生也幾氏風俗通宋大夫仲幾之後以王父字為氏臣謹按幾氏子姓仲幾字子然此以名為氏者仇氏宋大夫仇牧之後王莽時有仇延唐宦者仇士良宋朝仇靄登進士第又有仇著仇伯玉並開封人又有仇悆待制望出南陽求氏姓苑云本仇氏避難改焉後漢有求仲宋朝登科求利忠越州人獲氏風俗通宋大夫猛獲之後季老氏子姓宋華氏有華季老子孫氏焉見世本子蕩氏亦作蕩氏子姓宋桓公之子公子蕩之後也鐸遏氏宋襄公下大夫鐸遏章左傳晉上軍尉鐸遏宼督氏子姓宋大夫華父督之後晉有督戎欒盈之臣漢有督瓉見風俗通又五原太守督瓊隋有督君謨善射又後漢書巴郡蠻酋有督氏與羅朴鄂度夕龔為七姓望出巴郡目夷氏子姓宋公子目夷之後也目夷字子魚又有魚氏魚孫氏皆所以别族祝其氏子姓風俗通宋戴公之子公子祝其為大司寇因氏焉漢有清河郡尉祝其承先耦氏子姓風俗通云宋卿華耦之後漢有侍中耦嘉又姓苑云今廣平有耦氏泥氏世本云宋大夫卑泥之後諸國人名庶其氏邾大夫庻其之後茅夷氏邾大夫茅夷鴻之後噲氏音快姬姓燕王噲之後孝子傳有噲㳟鶴銜珠與之又有璯氏同音漢有璯錢搖氏姒姓越王句踐裔孫東越王揺之後以王父名為氏漢功臣表有海陽侯揺毋餘舊為㑹稽望族今居餘杭由氏亦為由余氏西戎由余相秦子孫氏焉楚王孫由于亦為由氏急就章有由廣國風俗通漢長沙太守由彰余氏風俗通云由余之後世居歙州為新安大族望出下邳吳興臣謹按余氏隗姓國語潞洛泉余滿皆赤翟隗姓孫陽氏嬴姓英賢傳曰秦穆公子有孫陽伯樂善相馬漢有侍御史孫陽放偃師氏媯姓陳太于偃師之後卿氏風俗通虞卿之後戰國有卿秦為魏將或云項羽將卿子冠軍宋義之後宋朝卿尚學究出身望出渤海無婁氏嬴姓莒公子無婁之後無亦作務又無婁先生著書姓纂云今琅邪有此姓苴氏子餘切司馬穰苴之後望出平陵漢書貨殖傳有平陵苴氏離氏風俗通離婁孟子門人漢有中庻子離常之後燕有離班名字未辨綸氏魏志云公孫懿大臣有綸直綸魚鱗氏左傳宋大夫鱗矔鱗朱渾氏左傳鄭大夫渾罕衞渾良夫又官氏志吐谷渾氏改為渾又唐表渾氏出自匃奴渾邪王隨拓跋氏徙河南因以為氏自廻貴至瑊世襲臯蘭州都督府禆氏鄭大夫禆諶禆竈姓苑云今宣州有禆氏開氏姬姓衞公子開方之後漢有開章望出隴西狼氏左傳晉大夫狼瞫齊有狼蘧疏又河南官氏志叱奴氏改為狼名氏楚大夫彭名之後也顚氏晉大夫顛頡之後或言周亂臣太顛之後也麻氏風俗通齊大夫麻嬰之後漢有麻光為御史大夫又有麻達注論語唐麻嗣宗賜姓李望出上谷宋祥符登科有麻温其元豐有麻中孚懐州人皇祐有麻元伯開封人柯氏姓苑云吳公子柯蘆之後望出錢唐及齊郡宋沈季文傳有錢唐富人柯隆齊書南兗州典籖柯益孫齊郡人唐朝尚書郎柯潁又河南官氏志柯拔氏改為柯氏瑕氏周大夫瑕禽晉有瑕嘉漢有廷尉瑕更又有瑕蒼儋氏周大夫儋翩之後吳志有九真太守儋萌或云儋耳國人舟氏晉大夫舟之僑之後宋端拱登科有舟宗閔攸氏北燕有尚書攸邁祁氏周司馬祁父之後左傳祁瞞干命晉有祁嘉聞忩外人招隠者干氏宋大夫干犨之後陳有干徴師漢有蜀郡尉干獻吳有軍師干吉晉有將軍干瓉望出榮陽潁川禽氏魯大夫禽鄭者管于奚之子也墨翟弟子有禽滑釐髙士傳有禽慶孝子傳有禽賢望出魯國琴氏家語仲尼弟子琴牢字子開一名張衞人列仙傳琴髙趙人得水仙嘗於漢上乗赤鯉望出天水萇氏左傳周大夫萇𢎞之後唐大歴有奉天尉萇總望出魏郡東平黔氏禮記齊有黔敖又有黔婁先生隠者易氏齊大夫易牙之後魏有雍州刺史易愷魏郡人晉陵令易雄長沙人前凉有將軍易犍望出太原濟陽今江東多此姓宋易凖易林易東登科苫氏魯大夫苫夷之後也𢎞氏風俗通衞大夫𢎞演之後漢有宦者𢎞㳟為中書令吳孫權姊夫𢎞咨臼氏左傳華氏家臣臼任冶氏衞有冶盧魯有冶區夫茍氏國語云黄帝之後有茍實茍參或言以河内多茍杞因以為氏又若干氏改為茍氏宋朝登科有茍師顔茍鐸並滁州人又有茍毅易州人茍全䕫州人梓氏魯大夫梓慎之後也倚氏楚左史倚相之後也尾氏魯有尾生或云即微生髙汝氏尚書有汝鳩汝方左傳晉大夫汝寛汝齊漢有長水校尉汝隨後漢孝子傳有汝郁潁州人宋朝汝孝㳟登進士第又有汝孝隆汝日休並普州人望出渤海伍氏芊姓楚大夫伍參之後也伍子胥奔吳其子又為王孫氏適齊漢有伍被楚人望出安定武陵又有五氏本伍氏避仇改為五蜀有五梁晉有始興太守五裔禮氏衞大夫禮孔禮至漢有新市長禮賢後漢禮震受尚書於歐陽歙平原人也免氏音勉一音問姬姓左傳衞有免餘衞公孫也漢有免乙為上郡太守蹇氏秦有蹇叔或云西乞術白乙丙皆蹇叔子風俗通漢有蹇蘭為交趾刺史後漢小黄門蹇石望出山陽襄陽宋朝登科蹇序臣蹇逄辰成都人蹇士堯彭州人蹇綬懷安軍人散氏文王四友有散宜生今江都有此姓繞氏秦大夫繞朝之後也肆氏風俗通宋大夫肆臣之後姓苑有漁陽太守肆敏具氏晉大夫具丙之後漢有中山太守具襃後漢宦者中常侍具瑗闞氏齊卿闞止之後也宋尚書郎闞洞開封人又有闞洙登第興國軍人望出㑹稽天水洩氏亦作泄左傳鄭大夫洩駕陳大夫洩冶捷氏曹姓風俗通云邾公子捷菑之後漢藝文志有捷子二篇六國時人賔氏左傳齊大夫賔湏無周賔起為王子朝傅望出梁國恩氏風俗通云陳大夫成仲不恩之後前燕録有東庠祭酒恩茂肩吾氏莊子肩吾古賢者晉袁宏集有東海太守肩吾民徐吾氏左傳鄭大夫徐吾犯之後鍾吾氏左傳鍾吾子之後漢尉氏令鍾吾蒼由吾氏姓纂云由余之後仕吳子孫入越因號由吾氏北齊有諌議大夫由吾道榮琅邪人叔山氏左傳叔山冉之後莊子魯有叔山無趾叔先氏後漢書犍為叔先雄叔達氏八凱叔達之後公羊有叔達叚為景王大夫叔夜氏周八士叔夜之後也楚康王時有叔夜子莊見國語叔服氏周内史叔服之後也晉武公大夫有叔服子要方叔氏鼔方叔之後也見世本漢功臣新夀侯方叔無咎陶叔氏姓纂云周司徒陶叔之後也晉有陶叔真為原大夫文公時陶叔狐漢有陶叔卷為青州刺史今平原有此姓申鮮氏齊有申鮮虞漢有中靄者申鮮洫申章氏漢有長沙王太傅申章昌子師氏左傳鄭有子師僕漢有北平太守子師盤富父氏魯富父終生之後魯又有大夫富父槐仲熊氏芊姓潛夫論云楚公族有仲熊氏仲顔氏左傳魯有仲顔莊叔齊臨淄大夫仲顔據原仲氏陳大夫原仲之後楚悼王時原仲蔑慶父氏世本楚大夫慶父之後又慶父藉為楚王工正安國氏漢武帝使安國少季使南越見姓氏英賢傳仲長氏見纂要文仲行氏左傳秦三良仲行之後世本宋有仲行寅晉大夫有仲行氏榮叔氏周大夫榮叔之後韓有大夫榮叔遥墨台氏子姓宋成公子墨台之後漢書有墨台悺墨氏姓纂云孤竹君之後本墨台氏後改為墨氏望出梁郡戰國時宋人墨翟著書號墨子台氏亦作怡本墨台氏避事改焉後魏遼西郡守寛元孫峯後周樂陵公峯子昻長沙公昻弟光安平侯立如氏魯賢人立如子著書見風俗通邴意氏齊大夫邴意兹之後舒堅氏潛夫論楚公族有舒堅文叔為大夫以次為氏親附孟氏姬姓魯桓公子慶父之後也慶父曰共仲本仲氏亦曰仲孫氏為閔公之故諱弑君之罪更為孟氏亦曰孟孫氏又衞有公孟縶之後亦曰孟氏齊有孟軻字子車秦有孟説齊有仲孫湫韓子有仲孫章仲氏髙辛氏才子八元仲堪仲熊之後又仲虺為湯左相其後並為仲氏又魯公子慶父曰共仲亦為仲氏亦為仲孫氏慶父有弑君之罪更為孟氏又公子譜云宋莊公子仲之後亦稱仲氏衞人仲由為孔子弟子漢有廷尉仲定少府監仲景唐司門員外郎仲子陵仲都人宋朝登科仲伯達曹州人仲楫隨州人紹興仲安常為郡守种氏本仲氏或言仲山甫之後因避難改為种宋种放自處士召拜司諌長安人望出河南叔氏姬姓魯桓公之子叔牙之後叔牙與慶父同母慶父弑閔公叔牙有罪飲酖而死遂立公孫兹為叔氏亦曰叔孫氏亦曰叔仲氏又魯文公之子叔肸後世亦為叔氏或言八凱叔達之後及晉叔向之後亦為叔氏東觀漢記光武時壯武將軍叔壽季氏姬姓魯桓公季子友之後也亦曰季孫氏一曰陸終氏之子季連之後漢功臣表戚圉侯季必傳封四代望出夀昌魯國臣謹按世譜云諸侯之子稱公子公子之子稱公孫公孫以王父字為氏行父是季友之孫故為季氏又為季孫氏也然季氏自行父至季孫彊並稱季孫氏以傳家故也如季公鳥季公亥之類凡支庶並稱季氏以别伯氏晉大夫荀林父之後林父為中行伯孫伯黶以王父字為氏伯黶為正卿司晉之典籍以為大政故又為籍氏孔子弟子伯䖍字子析或言嬴姓伯益之後漢有并州刺史伯栁又有伯至丁氏姜姓齊太公生丁公伋支孫以丁為氏漢有丁固功臣表陽都侯丁復宣曲侯丁義並傳封四代樂成侯丁禮傳封七代臣謹按謚法雖始有周周自文王以後世世稱謚是時諸侯猶未能徧及晉魯大國也魯再世伯禽稱魯公晉再世爕父稱晉侯曹蔡皆四世未稱謚齊再世伋稱丁公三世得稱乙公四世慈母稱癸公五世哀公不辰而後稱謚則知所謂丁公者長第之次也癸氏姜姓齊癸公之後見姓苑祖氏子姓商王祖甲祖乙祖丁支庻因氏焉商有祖伊漢有祖沂始家涿郡今建州有此姓祖秀實屢作監司祖日新宋宣和登科臣謹按祖者子孫所稱其先也支庶以是為氏不獨祖乙也祖辛祖丁祖庚祖甲之子孫往往皆稱祖氏舅氏晉大夫舅犯之後也姬姓狐氏晉惠公文公皆狐氏甥故以犯為舅因以為氏咎氏即舅氏舅犯左傳亦作咎犯成湯司空又有咎單氏古氏風俗通云古公亶父之後因氏焉言古公者猶言先公也晉平公時有舟人古乗漢有孝子古初蜀志廣漢功曹古牧後魏尚書令古弼今望出新平河内又吐奚氏改為古氏宋端拱登科古成之後有古茟梅州人古亶懷安軍人禰氏父廟為禰此從父而别氏也後漢禰衡字正平平原人稚氏子姓姓纂云商後見史記次氏次非荆之勇者見吕氏春秋亦作佽漢功臣表有瞭侯次公孺氏魯有孺悲欲見孔子太叔氏姬姓衞文公之子太叔虞之後也漢有尚書太叔雄太伯氏姬姓周古公之長子讓國季歴為周之太伯故以為氏叔仲氏姬姓魯公子牙之後也公孫兹生得臣彭生得臣為叔孫氏彭生為叔仲氏史記叔仲㑹魯人仲尼弟子中叔氏中叔圉之後晉有中叔無忌漢光武時侍御史中叔僚仲叔氏左傳仲叔于奚衞大夫其後有仲叔圉第五氏媯姓齊諸田之後田氏大族漢初徙園陵者多故以次第為氏第二氏其先齊諸田漢武帝徙之諸陵以門秩次第田廣之孫田登為第二氏第八氏出陳留風俗通亦齊諸田之後田廣弟田英為第八門因氏焉王莽時有講學大夫第八矯太士氏漢建安太守太士靈秀永嘉松楊有太士氏主父氏嬴姓趙武靈王號主父支孫因以為氏漢齊相主父偃齊郡臨淄人宋登科主父喆開封人主氏嬴姓即主父氏也或單言主氏姓纂云今同州有此姓南伯氏莊子有南伯子綦南伯子葵並古之賢人也南公氏戰國時有南公子著書三十一篇言五行隂陽事盖衞南公子之後大季氏姬姓鄭穆公之子有二子孔此大子孔謂之大季氏即公子志之後也以族為氏因氏遂人之四族也頜氏音郃遂人之族也飢氏商人之七族也錡氏商人之七族漢書洛陽錡華後有荆州刺史錡嵩條氏左傳商人七族有條氏冉閔司空條攸姓苑云安定人姓纂云今寃句有此姓寃句曹州也昭氏楚辭云昭屈景楚之三族也戰國時楚有昭奚卹為上柱國繁氏音婆左傳商人七族有繁氏漢有御史大夫繁延夀望出潁川上黨嗣氏風俗通云衞嗣君之後左氏姜姓齊公族有左右公子因以為氏楚有左史倚相左史老者以為左史官故亦為左氏望出濟陽景氏芊姓楚公族也漢初徙山東豪族於關中今好畤華陽諸景是也楚有景差漢有景風宋景大方景泰登進士科望出晉陽又有景淵徽州人景光京兆人並登科臣謹按所著春秋傳即倚相之後世為楚左史官非左邱明明居左邱為左邱氏非左氏也又按景謚也楚未之聞疑齊景公之後盛繁此為姜姓之族與賞氏職尚反姓苑云賞氏吳中八族也晉有賞慶索氏桑國切商人七族索氏之後唐索元禮宋索湘索周臣索逑並登科望出敦煌汝南陘氏魯公孫有陘氏之後也黨氏公族見釋例周世族譜掌氏魯大夫黨氏之後以音掌故從音文揚雄與劉向歆書云林閭妻蜀郡掌氏晉有掌同前梁有遂興侯掌據宋有直秘閣掌禹錫又有掌奏掌天鈞密州人掌世衡許州人並登科望出琅邪敦煌長勺氏左傳商人六族有長勺氏尾勺氏左傳商人六族有尾勺氏趙陽氏姬姓潛夫論衞公侯有趙陽氏魯陽氏潛夫論芊姓楚公族有魯陽氏終葵氏左傳商人七族有終葵氏工婁氏左傳遂國有工婁氏齊大夫有工婁濟傅餘氏姓氏英賢傳云傅説為相子孫留傅巖者號傅餘氏晉傅餘頠撰複姓録臣謹按餘者餘子之族也世本於韓餘己言之矣餘氏晉餘頠著複姓録自云本出傅氏前燕錄有餘元餘和餘嚴崇舊云鮮卑種類然既出傅氏無因出鮮卑韓餘子世本韓宣子餘子之後因氏焉褐餘氏潛夫論曲沃桓叔之後也臣疑褐冠子之後也桓叔之後何以言褐梁餘氏晉下軍御梁餘子養之後本衞人須遂氏遂國有須遂氏列宗氏潛夫論楚公族列宗氏芊姓運奄氏史記秦嬴有運奄氏脩魚氏史記秦嬴有脩魚氏五王氏媯姓風俗通齊自威宣湣襄至王建五王因以為氏小王氏衞大夫小王桃甲之後也屈南氏芈姓楚屈全之後裔孫仕後魏時重複姓以自南來乃加南或作男續祁氏姬姓晉隰叔之後與士氏同族祈奚舉子祁午自代父子相續為政因氏焉羌憲氏姬姓衞公族𦍑子孫憲為羌憲氏㑹庌氏音雅姓纂云衞靈公子虺生竈為㑹庌氏樂利氏姓纂云齊胡公支子為樂利氏幹獻氏世本宋司徒華定為幹獻氏伊秩氏伊尹之孫又為伊秩氏夷屬大姓党氏党去聲今人呼為上聲本出西羌姚秦有將軍党耐虎自云夏后氏之後世為羌豪又有吳平男党娥子孫居同州宋党進節度使党祺淳化登第慶歴登科有党師經延州人朴氏亦作樸普木切後漢書巴郡蠻酋七姓羅朴督鄂度夕龔釋氏悉逹太子成道姓釋赫氏風俗通云赫胥氏之後也塞氏入聲天竺國人之姓即釋種也宜氏隨西南夷有宜繒宜林左傳陳大夫宜咎傍氏平聲西羌姓也唐初有傍企本北地羌豪為薛舉將来降後叛伏誅單氏音丹本可丹氏改為單氏又阿單氏改為單氏又渴單氏亦改為單氏雕氏漢功臣有臧馬侯雕延年匃奴降王口氏羌姓也今同州有此姓歛氏姚秦録有將軍歛憲歛方歛岐並南安人皆羌族也異氏姓纂云今温州白水蠻有此姓騶氏閩越王無諸之後紙氏官氏志云渴侯氏改為紙氏緩氏官氏志和稽氏改為緩氏畿氏後魏官氏志俟畿氏改為畿氏論氏去聲吐蕃大姓禄東贊生論欽陵欽陵生贊婆生弓仁唐左衞大將軍生傪偕伾惟真惟明惟賢惟明檢校工部尚書鄜坊節度惟賢右羽林大將軍宋論九齡登科華州人副氏河南官氏志副呂氏改為副氏沓氏官氏志沓盧氏改為沓氏蔞氏音藘官氏志云那蔞氏改為蔞氏郃氏官氏志大莫于氏改為郃氏徐盧氏漢景帝匈奴徐盧庸来降源氏出自代北後魏聖武皇帝詰汾長子疋孤七世孫禿髮傉檀據南涼生賀降後魏太武見之曰與卿同源可改為源氏位太尉隴西王生懷侍中馮翊公生子邕子㳟宋建隆登第有源獲景祐有源永勵茹氏音如官氏志蠕蠕入中國為茹氏又普陋茹氏改為茹氐望出河内宋尚書郎茹孝標慶歴登科茹約越州人元豐茹平仲汝州人乜氏彌也切蕃姓也今秦隴多此姓望出晉昌趙郡以官為氏雲氏縉雲氏之後也黄帝時官名以雲紀者為縉雲氏又連宥氏改為雲氏代姓也望出琅邪河南宋大觀中雲景祥登第太原人五鳩氏少昊氏官名因氏焉趙有將軍五鳩盧爽鳩氏左傳少昊氏官名國于齊土因氏焉桑扈氏金天氏以烏名官故有九扈之官桑扈者九扈之一也烏氏姬姓黄帝之後少昊氏以烏鳥名官以世功命氏齊有烏餘烏枝鳴莒有烏存秦有烏獲唐表言烏餘之裔世居北方號烏洛侯後徙張掖又烏石蘭改為烏氏史氏周太史史佚之後以官為氏漢有史恭其女弟為戾太子良娣生史皇孫進進生宣帝㳟三子髙曽元髙侍中大司馬車騎將軍樂陵安侯生術丹術樂陵嚴侯生崇俶丹左將軍武陽頃侯生邯武陽煬侯生獲髙曽孫岑嗣樂陵侯曽侍中中郎將將陵哀侯元侍中中郎將平臺康侯生恁平臺戴侯生習又有阿史那氏改為史氏臣謹按史之為氏者非獨佚也周有史佚史興晉有史蘇史黯史趙史龜史墨楚有史猈史皇衞有史鰌史狗史朝齊有史嚚凡此之類並以史為氏而未得世系者又有太史氏内史氏左史氏右史氏皆主於史不容無别南史氏齊有南史氏其後子孫氏焉内史氏風俗通周内史叔興之後也周又有内史過青史氏英賢傳晉太史董狐之子受封青史之田因氏焉漢書藝文志青史子著書太史氏齊太史子餘之後王史氏風俗通周先王太史號王史氏英賢傳周共王生圉圉曽孫滿生簡簡生業業生宰世傳史職因氏焉漢清河太守王史篆生音新豐令藝文志有王史氏後漢侍中王史元庠晉亦有王史氏侯史氏風俗通董狐為晉侯史官因氏焉祝史氏衞有祝史揮因氏焉姓纂云今下邳有此姓左史氏古者左史記言楚有左史倚相左史老其後也右史氏古者右史記事周有右史武見宋衷世本終古氏風俗通終古桀内史也因氏焉監氏音鑑風俗通衞康叔為連屬之監其後以為氏宋朝監由舉進士士氏陶唐之苖裔歴虞夏商周至成王遷之杜為伯宣王殺杜伯其子隰叔奔晉為士師故為士氏其子孫居隨及范故又為隨氏范氏有三族焉伊祁姓隰叔生士蔿字子輿故亦謂之士輿此為士氏又有士季氏亦為士氏後漢末有交趾太守士爕宋朝有尚書郎士建中籍氏出於伯氏晉大夫荀林父為中行伯孫伯黶以王父字為伯氏司晉之典籍故亦謂之籍氏以官為氏也昭二十五年傳曰王曰叔氏而忘之乎而髙祖孫伯黶司晉之典籍以為大政故曰籍氏或言晉文侯仇弟陽叔伯黶晉為三家所滅籍氏播遷于宋漢有倖臣籍孺又諫議大夫籍禋石趙有侍中籍羆唐太常博士籍知幾云其後也今望出廣平席氏本籍氏晉大夫籍談之後談十三世孫避項羽諱改為席氏漢初徙關東豪傑席氏於安定臨涇宋紹興參政席益河南人也師氏風俗通師樂人瞽者之稱晉有師曠魯有師乙鄭有師悝師觸師蠲師成也宋師顔為翰林學士建隆登科有帥庚師先並眉州也師晞孟汝州人望出琅邪平原太原帥氏音率亦作率狀云本姓師氏避晉景帝諱改為帥氏宋有率汀中英氏虞舜有五英樂有掌中英者因以為氏樂正氏周禮樂正因官氏焉孟子魯有樂正子春曽子弟子太祝氏見姓苑庾氏堯時掌庾大夫以官命氏至春秋時周有大夫庾皮皮子過邑于緱氏衞有庾公羌望出潁川新野千乗齊郡褚師氏宋共公子子石為褚師因氏焉又有褚師子服衞有大夫褚師圃亦為褚氏褚氏即褚師氏漢梁相褚大元成間有褚先生少孫並以儒學稱焉臣謹按褚氏即褚師氏後世略去師遂為褚氏然衞亦有褚師氏不獨宋也錢氏顓帝曽孫陸終生彭祖裔孫孚周錢府上士因官命氏焉戰國時有隠士錢丹秦有御史大夫錢産子孫居下邳漢哀平間錢遜為廣陵太守避王莽亂徙居烏程遜子晟東晉有青州刺史錢端歴陽太守錢鳯宋有太史令錢樂之五代時有錢鏐據吳越宋贈武穆王望出彭城吳興山氏周山師掌山林之官以官為氏風俗通云烈山氏之後左傳晉大夫山祈漢有武都太守山昱又吐難氏後魏改為山氏宋朝登科山説司馬氏重黎之後唐虞夏商代掌天地周宣王時裔孫程伯休父為司馬克平徐方鍚以官族為司馬氏其後世或在衞或在趙或在秦在衞者相中山在趙者以傳劍顯蒯聵其後也在秦者名錯與張儀論伐蜀錯孫靳事武安君白起靳孫昌為秦鐡官昌生漢市長無澤無澤生五大夫喜喜生太史公談談生中書令遷臣謹按晉有司馬鄔司馬彌牟司馬寅齊有司馬竈楚有司馬子魚司馬督宋有司馬彊陳有司馬桓子是皆以司馬為氏不獨程伯休父也司寇氏世本云衞靈公之子公子郢之後也郢之子孫為衞司宼以官為氏司宼亥即其裔也風俗通云蘓忿生為周武王司宼其後氏焉禮記司宼惠子魯大夫寇氏周有蘓忿生為司宼子孫以官氏焉一云衞康叔為周司宼支孫以官為氏秦滅衞君角家于上谷宼恂其八世孫也又後魏改口引氏為宼氏臣謹按司寇氏或略去司然蘇忿生之後為蘇氏此以司寇氏者未必忿生之裔司徒氏帝王世紀曰舜為堯司徒支孫氏焉衞有司徒􅀈成宋有司徒邊卭陳有司徒公子招其後皆為司徒氏漢有安平相司徒肅中謁者司徒發宋元祐登科有司徒公綽恩州人司空氏禹為堯司空支孫氏焉堯後有隰叔孫士蒍為晉司空亦因氏焉晉大夫胥臣號司空季子又有司空靖司空督惟晉官備司空餘國無之言司空氏者系出於晉宋太平登科有司空舜賔紹聖有司空宗韓洛州人司城氏宋以武公名司空故改為司城公子蕩為司城其後曰蕩氏世為司城因氏焉又陳亦有司城氏哀公之子公子勝為之也司功氏世本云晉大夫司功景子士丐弟他因官氏焉臣謹按世本世系多與經典異同如春秋世系有士丐而無景子亦無弟他司鴻氏風俗通古有司鴻茍著書漢中大夫司鴻儀司褐氏古今人表有司褐拘又有司褐扶楚靈王大夫見韓子司工氏周宣王時司工錡因官氏焉公正氏周宫正其後氏焉宋建中朝邑令公正範吳人宗正氏狀稱本劉氏楚元王交之孫劉徳為宗正支孫氏焉裔孫宗正珍孫唐有殿中少監宗正辯濟陰人宗氏又為宗伯氏周大夫宗伯之後以官命氏齊有宗樓衞有宗魯又宗伯氏漢平帝時有少府宗伯鳯唐表云宗氏子姓宋襄公母弟敖仕晉孫伯宗為三郤所殺子州犂奔楚少子連家於南陽以王父字為氏臣謹按宗伯掌禮之官然伯夷秩宗其來久矣則宗氏不必因周宗伯而後命氏符氏姬姓魯項公為楚所滅頃公之孫公雅為秦符節令因以為氏後漢有符融宋符彦卿以戚里封魏王望出琅邪軍氏冠軍侯之後因以為氏偏氏古偏將軍之後急就章漢有偏吕張調氏周禮調人之後因官為氏衡氏風俗通伊尹為湯阿衡子孫以衡為氏一云魯公子衡之後以王父字為氏漢有衡威衡驃卿又袁氏改為衡氏阿氏風俗通伊尹為阿衡支孫以官為氏又河南官氏志阿伏氏及阿賀氏並改為阿環氏楚有環列之尹子孫因氏焉楚有環泉漢有河東太守環餘隗囂將環安晉有環濟撰要略宋有環中環申登科並淮陽人箴氏姓苑楚大夫箴尹克黄之後也主箴規之官子孫以官為氏又有箴尸宜咎本陳人凌氏姬姓衞康叔支子為周凌人子孫以官為氏吳志有凌統晉有凌嵩望出渤海酒氏周官酒正因官命氏委氏周禮有委人掌委積其後氏焉漢太原太守委進柱氏柱下史官之後古有柱厲叔豎氏閽寺之官賤者為之晉有豎頭須齊有豎刁鄭有豎拊宰氏姬姓周卿士宰周公之後又有宰孔者皆周太宰以官為氏仲尼弟子宰子漢有司空掾宰直今望出西河宋登科宰需揚州人宰氏氏范蠡傳云范蠡師計然姓宰氏字文子葵邱濮上人保氏周禮保章氏因官為氏吕氏春秋楚有保申度氏古掌度之官因以命氏西京雜記漢成帝時侍郎度安世居山陽胡陸後漢荆州刺史古鄉侯度尚撰曹娥碑子禮庫氏漢文時有倉氏庫氏為吏之久故子孫以為氏後漢竇融傳有輔義侯庫鈞又河南官氏志庫傉官氏改為庫氏望出河南魯國御氏周禮有御人之職其後為氏左傳有御叔漢書有御長倩者丞相公孫𢎞故人也訓氏周禮有訓方氏以官為氏憲氏姓纂云周之憲官司冦之屬也急就章有憲義渠諫氏周禮有司諫氏因以為氏漢有持書御史諌忠見風俗通望出歙郡校氏周官校人之後唐天寶有校傑河南士曹候氏周禮候人氏子孫因氏焉漏氏古掌漏之官因以為氏今吳興有此姓節氏姓纂周禮掌節上士子孫以官為氏畜氏嬴姓自云秦非子之後也非子為周孝王主馬畜牧於汧渭之間馬大蕃息邑之秦號秦嬴支庻以畜為氏姓苑云今天水有畜氏鄐氏即畜氏漢東海太守鄐熙因官居焉僕氏周禮僕人之後漢時匈奴降者僕朋封煇渠侯生電雷屬國都尉又河南官氏志僕蘭氏改為僕氏今吳興有此姓望出河南粟氏漢有治粟都尉因以為氏魏志袁紹魏郡太守粟舉今嶺南多此姓宋登科粟彭年定州人謁氏風俗通云古有謁者官因以為氏漢有汝南太守謁瓊又張湯小吏謁居閣氏姓纂云周之閽人守王宫者所以止扇謂之閣因以為氏急就章有閣并訢漢有閣并孺者太守田延年使部汾北後至廣陵相有治名唐有潭州橋口鎮副閣輔奴自云其望出河北職氏周禮職方氏之後也嗇氏風俗通云古嗇夫子孫因氏焉太師氏商有太師摯周有太師疵大羅氏周禮羅氏掌羅鳥獸秦有將軍大羅𢎞牧師氏漢依周禮置牧師令主養馬因氏焉馬師氏姬姓鄭穆公之孫公孫鉏為馬師氏因以為氏子羽之孫羽頡為馬師亦氏焉列仙傳有馬師皇少師氏英賢傳魯有少師彊又有少師慶少正氏韓詩内傳魯大夫有少正卯仲尼誅之宰父氏仲尼弟子有宰夫黒行人氏周禮大行人也又有行氏即行人氏左傳陳行人之儀衞有行人燭過王人氏風俗通王人子突之後因氏焉漢有安平太守王人宰公徒人氏左傳齊有徒人費國語齊有徒人回左人氏仲尼弟子左人郢見史記厨人氏周禮厨人因官為氏宋有厨人濮見釋例雍人氏周禮雍人以官為氏魯雍人髙雍人檀並見左傳封人氏守封畿之官其後為氏左傳晉有蕭封人漢有司空掾封人嬰寺人氏掌府寺之官宋寺人惠牆之後太傅氏漢太子太傅疎廣曽孫彦則避王莽亂於太原因氏焉中行氏晉公族隰叔之後也荀林父將中行故曰中行氏漢文時有宦者中行說中壘氏風俗通劉向為中壘校尉支孫氏焉王官氏晉有王官無地楚有王官子羽為沄邑大夫并官氏白襃魯先賢傳孔子娶宋之并官氏左尹氏楚左尹郄宛之後宛字子惡穀梁有左尹子息右尹氏楚公子辛為右尹子孫氏焉門尹氏宋門尹般之後宋又有門尹沮渠箴尹氏芊姓楚箴尹克黄之後也楚又有箴尹宜咎本陳人工尹氏楚工尹夀之後也楚又有工尹齊工尹餘工尹赤工尹麋並見左傳禮記又有楚工尹商陽則工尹氏盛於楚矣由其世官故也廐尹氏芊姓姓纂云楚大夫廐尹然之後臣謹按廐尹即宫廐尹也鬬氏世為之連尹氏芊姓楚屈氏之後也連尹襄老沈尹氏沈邑之尹官也沈姓沈尹之後世為之陵尹氏楚大夫陵尹喜陵尹招之後季尹氏楚有季尹然齊有季尹明芈尹氏楚有大夫芊尹申無宇之後藍尹氏楚大夫藍尹亹之後也樂尹氏楚昭王以鍾建為樂尹監尹氏楚監尹大心之後也清尹氏楚大夫清尹弗忌之後也又楚有大夫清尹午子叔占尹氏齊有占尹徳又有占尹應堅将匠氏風俗通漢官有將匠少府因官為氏吳中散大夫將匠彧曲陽令將匠熈晉侍御史將匠進梁太末令將匠道李正令氏周禮太僕掌貳車正令因氏焉趣馬氏英賢傳曰周趣馬蹶之後也後漢南陽功曹趣馬恩尚方氏傅餘頠複姓録有尚方氏将軍氏世本衞靈公子昭生子郢生文子才芳為將軍氏臣謹按世譜子郢者靈公之子未聞有子昭下軍氏左傳晉欒黶為下軍大夫支孫因氏焉右行氏晉屠擊將右行因氏焉晉右行賈華右行辛為司空漢有御史中丞右行綽右宰氏左傳衞大夫右宰穀右師氏世本宋莊公至公子申世為右師氏漢有中郎將右師譚後漢有博士右師細君亞飯氏商末賢人亞飯千之後也三飯氏三飯繚之後也四飯氏四飯缺之後也理氏咎繇為堯理官子孫遂為理氏商末有理徴改姓李望出河西里氏本理氏春秋改焉晉有里克魯有里革鄭有里析後居相城者又為相里氏相里氏咎繇之後為理氏商末理徴孫仲師遭難去王為里至晉大夫里克為惠公所戮克妻司城氏擕少子季連逃居相城因為相里氏季連元孫勤見莊子韓子云相里子古賢人也著書七篇漢有河隄謁者相里平又持書御史相里虎濟陰太守相里祉始居西河前趙録偏將軍相里覽梁有相里係孫本曽仕為東平王侍郎大通二年歸化李氏嬴姓髙陽氏生大業大業生女華女華生臯陶字庭堅為堯大理因官命族為理氏夏商之李有理徴為翼𨽻中吳伯以直道不容得罪于紂其妻契和氏擕子利真逃于伊侯之墟食木子而得全遂改理為李氏利貞十一代孫老君名耳字伯陽以其聃耳故又號為老聃居苦縣頼鄉曲仁里或言聃六世祖碩宗周康王賜采邑於苦縣聃曽孫曇生崇璣崇子孫居隴西璣子孫居趙郡崇五代孫仲翔生伯考伯考生尚尚生廣又徐氏邴氏安氏杜氏胡氏𢎞氏郭氏麻氏鮮于氏張氏阿布氏阿跌氏舎利氏董氏羅氏朱邪氏並以立功従唐國姓為李氏臣謹按李氏涼武昭王有國二十年高祖有天下三百年支庶既蕃子孫必衆然譜牒之議紛紛不知何始以理官為氏以食木子又為李氏此何理也以官為氏者容有此理以食木子為氏而取理同音者無是理也今不得其始姑從理説寘在官列臣又按唐家有天下必欲世系詳明然自成紀令之後信以傳信自成紀令之前疑以傳疑蓋譜牒之家信疑相半尚為成紀令因居之其後遂為隴西成紀人故言李者稱隴西臣又按自明皇以後凡十四代諸王不出閤不分房子孫闕而不見唐之初也自高祖至睿宗子孫皆使之治官臨民然後立功立事故有可著者而其後亦盛大且以天族龍種之慧而使之出人間親世事知稼穡之艱難是故功臣文士輩出雖經武后中宗之變而唐祚不衰自明皇之後皇子王孫皆因納於富貴嗜欲之閫遂令文章事業之姿變為竒技滛巧之行枝葉披離則本根無所芘所以唐室自明皇之後一日不振於一日以此觀之則周家享國長久也宜哉以爵為氏皇氏風俗通云三皇之後因氏焉左傳鄭大夫皇頡皇辰宋有皇氏世為上卿本皇甫充石之後以字為氏者漢有琅邪相皇運吳有青州刺史皇象工書宋元豐登科皇漢傑常州人元祐有皇淳安州人王氏天子之裔也所出不一有姬姓之王有媯姓之王有子姓之王有代姓之王若琅邪太原之王則曰周靈王太子晉以直諫廢為庶人其子宗恭為司徒時人號曰王家若京兆河間之王則曰周文王第十五子畢公髙之後畢萬封魏後分晉為諸侯至王假為秦所滅子孫分散時人號曰王家或言魏至昭王彤生無忌封信陵君信陵生間憂間憂生卑子秦滅魏卑子逃于泰山漢髙帝召為中涓封蘭陵侯時人以其王族也謂之王家此皆姬姓之王也出於北海陳留者則曰舜之後也其先齊諸田為秦所滅齊人號為王家此媯姓之王也出於汲郡者則曰王子比干之後此子姓之王也出於河南者則為可類氏出於馮翊者則為鉗耳族出於營州者本髙麗出於安東者本阿布思此皆代姓之王也以其所出既多故王氏之族最為蕃盛云公氏姬姓左傳魯昭公子公衍公為之後漢有主爵都尉公儉臣謹按公衍公為即公子衍公子為去子而言公則公為爵矣昭公失國故其子孫以爵為氏霸氏益部耆舊傳有霸栩侯氏姬姓晉侯緡之後也二十八年曲沃武公伐晉侯緡而㓕之緡之子孫適他國稱侯氏以爵為氏也或云夏后氏之裔封於侯無義未聞有國號侯者也鄭有侯宣多侯羽魯有侯叔夏侯犯齊有侯朝魏有侯嬴又後魏有侯植從孝武西遷賜姓侯伏氏又賜姓賀屯氏其後復舊又古引氏改為侯氏代姓也宋侯益為太師公乘氏古爵也久居是爵者子孫氏焉宋嘉祐登科有公乗良弼相州人建炎有公乗博文東平人也公士氏古爵也久居是爵者子孫氏焉漢功臣汲侯公士不害傳封四代不更氏更音郎秦大夫爵也英賢傳云公子不更之後秦簡公時不更苖為執法庶長氏秦爵也左傳秦庻長鮑庻長武庻長無地以凶德為氏蛸氏子姓即蕭氏也齊武帝以巴東王子響叛逆改為蛸氏也莽氏莫補切漢書馬何羅逆誅後漢馬后之先也后惡其先有反者改為莽氏聞人氏風俗通少正卯魯之聞人其後遂以聞人為氏然聞達之人皆謂聞人何必少正卯以惡聞也漢有太子舎人聞人通沛人治后氏禮宋大觀登科聞人宏政和聞人穎立秀州人聞氏即聞人也宋登科有聞見昌聞舜舉梟氏隋煬帝誅楊元感改為梟氏兀氏後魏改安樂王元鑒曰兀氏勃氏梁武帝改豫章王綜為勃氏又風俗通宋左師勃之後也晉有寺人勃鞮杌氏左傳楚檮杌之後檮杌惡獸也故以為號黥氏偃姓臯陶之後淮南王英布少時以罪被黥遂為黥氏蝮氏唐史補乾封元年改武惟良為蝮氏以吉德為氏冬日氏晉趙衰之於人如冬日可愛故因氏焉老成氏古賢人老成子之裔孫也老成方為宋大夫著書十篇言黄老之道考成子古有考成子著書述黄老之道列子有考成子㓜學於尹先生以技為氏巫氏風俗通凡氏於事巫卜匠陶也商有巫咸巫賢漢有冀州刺史巫㨗又有巫都著飬性經望出平陽宋紹興簽書樞密巫伋建康人臣謹按此以技術傳家因以為氏魯有巫尫又有鍼巫氏晉有巫臯屠氏左傳晉大夫屠蒯禮記作杜蕢又屠羊說楚人晉有屠岸賈鄭有屠擊風俗通漢末有屠景先河東人望出陳留臣謹按屠蒯者晉之膳宰也屠氏之職以割牲為事甄氏音真虞舜陶甄河濵因以為氏或音堅漢末太保甄邯生豐為司徒著望中山宋甄履甄昻登進士第開封人又有甄好古瀛州人甄撤陳州人陶氏陶唐氏之後因氏焉虞思為周陶正亦為陶氏左傳商人七族有陶氏此皆以陶冶為業者也陶叔為周司徒漢功臣開封侯陶舍生青為丞相後漢徐州牧陶謙優氏史記優孟楚樂人也子孫氏焉滑稽𫝊有優㫋卜氏周禮卜人氏也魯有卜楚邱晉有卜偃楚有卜徒父皆以卜命之其後遂以為氏如仲尼弟子卜商之徒是也又須卜氏改為卜氏代姓也宋有尚書郎卜伸會稽人望出西河武陵河南也匠氏風俗通氏於事者巫卜陶匠是也古有匠石豢龍氏古飂叔安裔子曰董父好龍龍多歸之帝舜嘉之賜氏曰豢龍氏御龍氏風俗通陶唐氏之後有劉累學擾龍事夏孔甲賜氏曰御龍氏擾龍氏劉累之後漢有侍御史擾龍羣屠羊氏韓詩内傳楚有屠羊說烏浴氏伯益佐堯有飬鳥獸之功賜氏烏浴路洛氏伯益支孫又以路洛為氏者此烏浴之訛也干将氏善鑄劍故劍以干將得名以事為氏竇氏姒姓少康之後帝相遭有窮氏之難后緡方娠逃出自竇而生少康支孫以竇為氏至周世為大夫竇犨為晉大夫仕趙簡子裔孫漢丞相嬰又有鮮卑賜姓紇豆陵氏後魏孝文改為竇氏所氏所者伐木聲本虞衡主伐木之官聞聲以為氏風俗通宋大夫所華之後也漢有諌議大夫所忠武帝時人望出平原後漢有平原所輔痛氏周穆王盛姬早卒改其族曰痛氏急就章宋有痛無忌兒氏吳郡有語兒生而能語子孫氏焉又河南官氏志賀兒氏改為兒氏車氏尺遮切媯姓漢武帝時丞相田千秋以年老詔乗小車出入省中時號車丞相子孫因氏焉又後魏疎屬曰車裩氏改為車氏䲭夷氏潛夫論子姓宋微子之後説苑䲭夷子皮齊人風俗通云本范蠡也冠氏風俗通鶡冠子之後褐冠氏風俗通賨人以褐冠為姓褐冠子著書新垣氏風俗通魏將新垣衍畢公髙之後漢書文帝時新垣平善望氣白馬氏風俗通微子乗白馬朝周因氏焉一云漢公孫瓚在幽并常乗白馬因氏焉臣謹按周時無白馬氏此當為公孫瓚事也乘馬氏漢書溝洫志有諫議大夫乗馬延年又張掖有乗馬敦青牛氏魏畧初平中有青牛先生山東人也白象氏風俗通白象先生古隠者白鹿氏風俗通白鹿先生古賢人著書蒲氏姒姓有扈氏之後為啓所滅世為西羌酋長晉書苻洪傳因其家池水生昌蒲長五丈五節形如竹時人遂以為蒲家後改為苻風俗通有詹事蒲昌又有蒲遵今蜀中多此姓望出河東苻氏本蒲氏苻洪以其孫堅背上有艸付臣又土之文遂改為苻氏芻氏牛哀食芻後姓芻氏見姓苑鋭氏主兵鋭者齊有鋭司徒女嫁為辟司徒妻晉昇平中有鮮卑御史大夫鋭管有作銑管者非空桑氏姓氏英賢傳云伊尹生於空桑支孫氏焉白石氏神仙傳白石生中黄大夫弟子常煑白石為糧章仇氏姜姓本章氏齊公族漢有章弇因避仇遂加仇字唐長安元年右史知貢舉張說下進士章仇嘉勉又隋賜姓盧氏以諡為氏莊氏芊姓楚莊王之後以諡為氏楚有大儒曰莊周六國時嘗為䝉漆園吏著書號莊子齊有莊賈周有莊辛嚴氏芊姓即楚莊王之後以諡為氏因避後漢明帝諱遂改為嚴氏魏晉之際有復本氏者故有莊嚴二氏行於世前漢有會稽嚴助後漢光武友嚴光始居南陽或新野後居新安江側有釣臺祠貎存又蜀郡嚴遵字君平善易注老子又河南尹嚴延年母有五子位各二千石號為萬石嚴嫗華陽國志嚴邁為揚州刺史每值遷官吏民塞路攀轅敬氏媯姓陳厲公子敬仲之後以諡為氏姓苑云黄帝孫敬康之後秦有敬丕子教為平陽太守臣謹按姓氏之别起於商周如姓苑所引黄帝之事多不經之語又敬氏至宋朝以諱改為文今潞公家是其氏也亦改為恭氏而晉太子申生諡恭君其後以為氏亦作共漢代郡太守共友康氏姬姓衞康叔支孫以諡為氏前趙有黄門侍郎康安前燕有康遷宋有康説梁有康約望出㑹稽東平京兆宋朝登科有康戠康亞之為盛族武氏于姓宋武公之後也姓纂云周平王少子生而有文在手曰武遂以為氏此繆論也漢武臣為趙王又有武渉功臣表梁鄒侯武彪傳六代後居沛國漢又有祭酒武忠望出太原桓氏姜姓齊桓公之後以諡為氏又宋桓公之後向魋亦號桓氏後漢有太子少傅桓榮又司徒桓虞又桓庭昌唐上元中准制改姜氏又烏丸氏改桓氏代姓也穆氏或作繆音同又繆或有紕繆之音子姓宋穆公之後也其支孫以諡為氏左傳有穆伯漢有穆生為楚元王師友又有邱穆陵氏改為穆氏宋登科穆守危穆說穆修穆琪嘉祐穆演河中人紹興登科有繆若虚温州人繆渥越州人僖氏姬姓僖或作釐姓苑云魯僖公之後今彭城人左傳僖負覊今望出彭城文氏姬姓風俗通云周文王支孫以諡為氏越大夫文種宋潞公家本敬氏避國諱改為文氏哀氏諡也未詳何王公之諡與漢有哀章事王莽金陵有哀仲種述異記宋有哀道訓望出南康東陽今建州多哀族幽氏未詳何代諡然死非其道者則諡之以幽隠不欲彰之也幽氏見姓苑宣氏姬姓魯大夫叔孫僑如之後也僑如諡宣伯以諡為氏又風俗通云宋宣公之後也子姓後漢有司空宣鄷又漢年表有南安侯宣虎今望出汝南昭氏芊姓楚辭云昭屈景楚之三族也鬻熊之後戰國時楚有大夫昭奚䘏襄氏姬姓魯莊公子公子遂諡襄故曰襄仲子孫以諡為氏聲氏姬姓蔡大夫聲子之後也公孫歸生字子朝故為朝氏諡聲子故又為聲氏寧氏泰寕公之後也漢有都尉寕昱又濟南都尉寕城威氏媯姓風俗通云齊威王之後以為田氏始王故其後以為氏今望出南安隱氏姬姓吳志有廷尉左監隠蕃云魯隠公之後以諡為氏考古之命諡凡人君遭弑虐而不明者不謂之幽則謂之隠隱蕃北海人又河問中尉隠哀或作河間太守隱翁閔氏諡也夭折而死於不道者則諡之閔仲尼弟子有閔損字子騫魯人望出太原又魯國宋登科有閔昌言閔敷閔從周文聞封有閔叔獻簡氏姬姓晉大夫狐鞠居之後也狐鞠居號續簡伯續邑也簡諡也漢有簡鄉蜀志簡雍善滑稽傳云幽州人本姓耿幽人以耿為簡音訛靖氏風俗通單靖公之後以諡為氏一云齊田氏之族靖郭君之後懿氏姜姓風俗通本齊懿公之後姚秦有吏部郎懿横惠氏姬姓周惠王支孫以諡為氏戰國有惠施為梁伯漢有交趾太守惠乗太僕惠根宋惠演舉進士第望出扶風琅邪又有惠敷惠柔時常州人惠厚下耀州人厲氏或作􅀈姜姓風俗通齊厲公之後漢有魏郡太守義陽侯厲温見功臣表吳志孫皓以孫秀奔魏改姓厲氏唐有厲歸真善盡又光啓登科有厲自南今東陽多厲氏望出范陽宋登科有厲申開封人又有加邑者勵靜嘉祐登科湖州人獻氏姬姓晉獻公之後也見風俗通戰國時有秦大夫獻則孝氏姜姓齊孝公支孫之後也繆氏音謬亦作繆亦作穆嬴姓秦繆公之後亦作穆漢書楚有穆生為楚元王師亦作謬後漢獨行有謬肜宋登科有謬潛懐州人繆彦常州人肅氏嵆云周文王之子郕叔之後以諡為氏臣謹按郕叔武未聞有諡此則周卿士成肅公之後也一云肅愼氏歸中國改為肅氏梁有吳郡太守西豐侯肅正一通志卷二十八
