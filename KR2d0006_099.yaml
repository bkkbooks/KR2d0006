body:
  text: 通志卷八十七宋右迪功郎鄭樵漁仲撰周異姓世家第二越趙田氏越越王句踐其先禹之苖裔而夏后帝少康之庶子也封於會稽以奉守禹之祀文身斷髮披草萊而邑焉後二十餘世至於允常允常之時與吳王闔廬戰而相怨伐允常卒子句踐立是為越王元年吳王闔廬聞允常死乃興師伐越越王句踐使死士挑戰三行至吳陳呼而自剄吳師觀之越因襲擊吳師吳師敗於檇李射傷吳王闔廬闔廬且死告其子夫差曰必毋忘越三年句踐聞吳王夫差必欲報越謀及其未發先伐之范蠡固諫越王不聽遂興師吳王聞之悉國中兵擊越敗之夫椒越王乃以餘兵五千人保棲于會稽吳王追而圍之越王謂范蠡曰以不用公言至此為之奈何蠡對曰持滿者與天定傾者與人節事者以地卑辭厚幣以事之不許而身與之市句踐曰諾乃令大夫種行成於吳膝行頓首曰君王亡臣句踐使陪臣種敢告下執事句踐請為臣妻為妾吳王將許之子胥言於吳王曰天以越賜吳勿許也種還以報句踐句踐欲殺妻子燔寶器觸戰以死種止句踐曰夫吳太宰嚭貪可誘以利請間行言之於是句踐乃以美女寶器令種間獻吳太宰嚭嚭受乃見大夫種於吳王種頓首言曰願大王赦句踐之罪盡入其寶器不幸不赦句踐將盡殺其妻子燔其寶器悉五千人觸戰必有當也嚭因説吳王曰越以服為臣若將赦之此國之利也吳王將許之子胥進諫曰今不滅越後必悔之句踐賢君種蠡良臣若反國將為亂吳王弗聽卒赦越罷兵而歸句踐之困會稽也喟然歎曰吾終於此乎種曰湯繫夏臺文王囚羑里晉重耳奔翟齊小白奔莒其卒王霸由是觀之何遽不為福乎吳既赦越越王句踐反國乃苦身焦思置膽於坐臥即仰膽飲食亦嘗膽也曰女忘會稽之耻邪身自耕作夫人自織食不加肉衣不重采折節下賢人厚遇賔客振貧弔死與百姓同其勞欲使范蠡治國政蠡以讓大夫種而身與柘稽行成為質於吳二歲而吳歸蠡句踐自會稽歸七年拊循其士民士民欲用以報吳大夫逢同諫曰國新流亡今乃復殷給繕飾備利吳必懼懼則難必至耳鷙鳥之擊也必匿其形今夫吳兵加齊晉怨深於楚越名高天下實害周室德少而功多必淫自矜為越計莫若結齊親楚附晉以厚吳吳之志廣必輕戰是我連其權三國伐之越承其弊可克也句踐曰善居二年吳王將伐齊子胥諌曰未可臣聞句踐食不重味與百姓同苦樂此人不死必為國患吳有越腹心之疾齊與吳疥癬也願王釋齊先越吳王弗聽遂伐齊敗之艾陵虜齊高國以歸讓子胥子胥曰王毋喜王怒子胥欲自殺王聞而止之越大夫種曰臣觀吳王政驕矣請試嘗之貸粟以卜其事請貸吳王欲與子胥諫勿與王遂與之越乃私喜子胥言曰王不聽諫後三年吳其墟乎太宰嚭聞之乃數與子胥爭越議因讒子胥曰伍員貌忠而實忍人其父兄不顧安能顧王王前欲伐齊員強諫已而有功用是反怨王王不備伍員員必亂與逢同共謀讒之王王始不從乃使子胥於齊聞其託子於鮑氏王乃大怒曰伍員果欺寡人欲反使人賜子胥屬鏤劒以自殺子胥大笑曰我令而父霸我又立若若初欲分吳國半豫我我不受已今若反以讒誅我嗟乎嗟乎一人固不能獨立報使者曰必取吾眼置吳東門以觀越兵入也於是吳任嚭政居三年句踐召范蠡曰吳已殺子胥導諛者衆可乎對曰未可至眀年春吳王北會諸侯於黃池吳國精兵從王惟獨老弱與太子留守句踐復問范蠡蠡曰可矣乃發習流二千教士四萬人君子六千人諸御千人伐吳吳師敗遂殺吳太子吳告急於王王方會諸侯於黃池懼天下聞之乃祕之吳王已盟黃池乃使人厚禮以請成越越自度亦未能滅吳乃與吳平其後四年越復伐吳吳士民罷弊輕鋭盡死於齊晉而越大破吳因而留圍之三年吳師敗越遂復棲吳王於姑蘇之山吳王使公孫雄肉袒膝行以請成於越王句踐憐而將許之范蠡諫王以為不可鳴鼓欲執吳使者使者退吳王知不免乃自殺語在范蠡傳中句踐已平吳乃以兵北渡淮與齊晉諸侯會於徐州致貢於周周元王使人賜句踐胙命為伯句踐已去渡淮南以淮上地與楚歸吳所侵宋地於宋與魯泗東方百里當是時越兵橫行於江淮東諸侯畢賀號稱霸王范蠡遂去自齊遺大夫種書曰蜚鳥盡良弓藏狡兔死走狗烹越王為人長頸鳥喙可與共患難不可與共樂子何不去種見書稱病不朝人或讒種且作亂越王乃賜種劒曰子教寡人伐吳七術寡人用其三而敗吳其四在子子為我從先王試之種自殺句踐卒子王鼫與立王鼫與卒子王不壽立王不壽卒子王翁立王翁卒子王翳立王翳卒子王之侯立王之侯卒子王無強立王無強時越興師北伐齊西伐楚與中國爭強當楚威王之時越北伐齊齊威王使人詔越王曰越不伐楚大不王小不伯圖越之所為不伐楚者為不得晉也韓魏固不攻楚韓之攻楚覆其軍殺其將則葉陽翟危魏亦覆其軍殺其將則陳上蔡不安故二晉之事越也不至於覆軍殺將汗馬之力不效所重於得晉者何也越王曰所求於晉者不至頓刃接兵而況於攻城圍邑乎願魏以聚大梁之下願齊之試兵南陽莒地以聚常郯之境則方城之外不南淮泗之間不東商於析酈宋胡之地夏路以左不足以備秦江南泗上不足以待越矣則齊秦韓魏得志於楚也是二晉不戰而分地不耕而穫之不此之為而頓刃於河山之間以為齊秦用所待者如此其失計奈何其以此王也齊使者曰幸也越之不亡也吾不貴其用智之如目見豪毛而不見其睫也今王知晉之失計而不自知越之過是目論也王所待於晉者非其馬汗之力也又非可與合軍連和也將待之以分楚衆也今楚衆已分何待於晉越王曰奈何曰楚三大夫張九軍北圍曲沃於中以至旡假之關者三千七百里景翠之軍凡聚魯齊南陽分有大此者乎且王之所求者鬭晉楚也不鬭越兵不起是知二五而不知十也此時不攻楚臣以是知越大不王小不伯復讐龎長沙楚之粟也竟澤陵楚之材也越窺兵通無假之關此四邑者不上貢事於郢矣臣聞之圖王不王其敝可以伯然而不伯者王道失也故願大王之轉攻楚也於是越遂釋齊而伐楚楚威王興兵而伐之大敗越殺王無強盡取故吳地至浙江北破齊於徐州而越以此散諸族子爭立或為王或為君濵於江南海上服朝於楚後七世至閩君搖佐諸侯平秦漢高帝復以搖為越王以奉越後東越閩君皆其後也趙趙氏之先與秦共祖至中衍為帝大戊御其後世蜚廉有子三人而命其一子曰惡來事紂為周所殺其後為秦惡來弟曰季勝其後為趙季勝生孟增孟增幸於周成王是為宅臯狼臯狼生衡父衡父生造父造父幸於周繆王造父取驥之乘匹與桃林盜驪驊騮緑耳獻之繆王繆王使造父御西巡狩見西王母樂之忘歸而徐偃王反繆王日馳千里馬攻徐偃王大破之乃賜造父以趙城由此為趙氏自造父已下六世至奄父曰公仲周宣王時伐戎為御及千畝戰奄父脫宣王奄父生叔帶叔帶之時周幽王無道去周如晉事晉文侯始建趙氏於晉國自叔帶以下趙宗益興五世而生趙夙趙夙晉獻公之十六年伐霍魏耿而趙夙為將伐霍霍公求奔齊晉大旱卜之曰霍太山為祟使趙夙召霍君於齊復之以奉霍太山之祀晉復穰晉獻公賜趙夙耿夙生共孟當魯閔公之元年也共孟生趙衰字子餘趙衰卜事晉獻公及諸公子莫吉卜事公子重耳吉即事重耳重耳以驪姬之亂亡奔翟趙衰從翟伐牆咎如得二女翟以其少女妻重耳長女妻趙衰而生盾初重耳在晉時趙衰妻亦生趙同趙括趙嬰齊趙衰從重耳出亡凡十九年得反國重耳為晉文公趙衰為原大夫居原任國政文公所以反國及霸多趙衰計策語在晉事中趙衰既反晉晉之妻固要迎翟妻而以其子盾為適嗣晉妻三子皆下事之晉襄公之六年而趙衰卒諡為成季趙盾代成季任國政二年而晉襄公卒太子夷臯年少盾為國多難欲立襄公弟雍雍時在秦使使迎之太子每日夜啼泣頓首謂趙盾曰先君何罪釋其適子而更求君趙盾患之恐其宗與大夫襲誅之乃遂立太子是為靈公發兵距所迎襄公弟於秦者靈公既立趙盾益專國政靈公立十年益驕趙盾驟諫靈公弗聽及食熊蹯胹不熟殺宰人持其尸出趙盾見之靈公由此懼欲殺盾盾素仁愛人嘗所食桑下餓人反扞救盾盾以得亡未出境而趙穿弒靈公而立襄公弟黑臀是為成公趙盾復反任國政君子譏盾為正卿亡不出境反不討賊故太史書曰趙盾弒其君晉景公時而趙盾卒諡為宣孟子朔嗣趙朔晉景公之三年朔為晉將下軍救鄭與楚莊王戰河上朔娶晉成公姊為夫人晉景公之三年大夫屠岸賈欲誅趙氏初趙盾在時夢見叔帶持要而哭甚悲已而笑拊手且歌盾卜之兆絶而後好趙史援占之曰此夢甚惡非君之身乃君之子然亦君之咎至孫趙將世益衰屠岸賈者始有寵於靈公及至於景公而賈為司寇將作難乃治靈公之賊以至趙盾遍告諸將曰盾雖不知猶為賊首以臣弒君子孫在朝何以懲罪請誅之韓厥曰靈公遇賊趙盾在外吾先君以為無罪故不誅今諸君將誅其後是非先君之意而今妄誅妄誅謂之亂臣有大事而君不聞是無君也屠岸賈不聽韓厥告趙朔趣亡朔不肯曰子必不絶趙祀朔死不恨韓厥許諾稱疾不出賈不請而擅與諸將攻趙氏於下宫殺趙朔趙同趙括趙嬰齊皆滅其族趙朔妻成公姊有遺腹走公宫匿趙朔客曰公孫杵臼杵臼謂朔友人程嬰曰胡不死程嬰曰朔之婦有遺腹若幸而男吾奉之即女也吾徐死耳居無何而朔婦免身生男屠岸賈聞之索於宫中夫人置兒褲中祝曰趙宗滅乎若號即不滅若無聲及索兒竟無聲已脫程嬰請公孫杵臼曰今一索不得後必且復索之奈何公孫杵臼曰立孤與死孰難程嬰曰死易立孤難耳公孫杵臼曰趙氏先君遇子厚子強為其難者吾為其易者請先死乃二人謀取他人嬰兒負之衣以文葆匿山中程嬰出謬謂諸將軍曰嬰不肖不能立趙孤誰能與我千金吾告趙氏孤處諸將皆喜許之發師隨程嬰攻公孫杵臼杵臼謬曰小人哉程嬰昔下宫之難不能死與我謀匿趙氏孤兒今又賣我縱不能立而忍賣之乎抱兒呼曰天乎天乎趙氏孤兒何罪請活之獨殺杵臼可也諸將不許遂殺杵臼與孤兒諸將以為趙氏孤兒良已死皆喜然趙氏真孤乃反在程嬰卒與俱匿山中居十五年晉景公疾卜之大業之後不遂者為祟景公問韓厥厥知趙孤在乃曰大業之後在晉絶祀者其趙氏乎夫自中衍者皆嬴姓也中衍人面鳥噣降佐殷帝大戊及周天子皆有眀德下及幽厲無道而叔帶去周適晉事先君文侯至於成公世有立功未嘗絶祀今吾君獨滅趙宗國人哀之故見龜策唯君圖之景公問趙尚有後子孫乎韓厥具以實告於是景公乃與韓厥謀立趙孤兒召而匿之宫中諸將入問疾景公因韓厥之衆以脅諸將而見趙孤趙孤名曰武諸將不得已乃曰昔下宫之難屠岸賈為之矯以君命并命羣臣非然孰敢作難微君之疾羣臣固且請立趙後今君有命羣臣之願也於是召趙武程嬰遍拜諸將遂反與程嬰趙武攻屠岸賈滅其族復與趙武田邑如故及趙武冠為成人程嬰乃辭諸大夫謂趙武曰昔下宫之難皆能死我非不能死我思立趙氏之後今趙武既立為成人復故位我將下報趙宣孟與公孫杵臼趙武啼泣頓首固請曰武願苦筋骨以報子至死而子忍去我死乎程嬰曰不可彼以我為能成事故先我死今我不報是以我事為不成遂自殺趙武服齊衰三年為之祭邑春秋祠之世世勿絶趙氏復位十一年而晉厲公殺其大夫三郤欒書畏及乃遂弒其君厲公更立襄公曾孫周是為悼公晉由此大夫稍強趙武續趙宗二十七年晉平公立平公十二年而趙武為正卿十三年吳延陵季子使於晉曰晉國之政卒歸於趙武子韓宣子魏獻子之後矣趙武死諡為文子文子生景叔景叔之時齊景公使晏嬰如晉晏嬰與晉叔向語嬰曰齊之政後卒歸田氏叔向亦曰晉國之政將歸六卿六卿侈矣而吾君不能恤也趙景叔卒生趙鞅是為簡子趙簡子在位晉頃公之九年簡子將合諸侯戍於周其眀年入周敬王于周辟弟子朝之故也晉頃公之十二年六卿以法誅公族祁氏羊舌氏分其邑為十縣六卿各令其族為之大夫晉公室由此益弱後十三年魯賊臣陽虎來奔趙簡子受賂厚遇之趙簡子疾五日不知人大夫皆懼醫扁鵲視之出董安于問扁鵲曰血脈治也而何怪在昔秦繆公嘗如此七日而寤寤之日告公孫支與子輿曰我之帝所甚樂吾所以久者適有學也帝告我晉國將大亂五世不安其後將霸未老而死霸者之子且令而國男女無别公孫支書而藏之秦讖於是出矣獻公之亂文公之霸而襄公敗秦師於殽而歸縱淫此子之所聞今主君之疾與之同不出三日疾必間間必有言也居二日半簡子寤語大夫曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞不類三代之樂其聲動人心有一熊欲來援我帝命我射之中熊熊死又有一羆來我又射之中羆羆死帝甚喜賜我二笥皆有副吾見兒在帝側帝屬我一翟犬曰及而子之壯也以賜之帝告我晉國且世衰七世而亡嬴姓將大敗周人於范魁之西而亦不能有也今余思虞舜之勳適余將以其胄女孟姚配而七世孫董安于受言而書藏之以扁鵲言告簡子簡子賜扁鵲田四萬畝他日簡子出有人當道辟之不去從者怒將刃之當道者曰吾欲有謁於主君從者以聞簡子召之曰嘻吾有所見子晰也當道者曰屏左右願有謁簡子屏人當道者曰主君之疾臣在帝側簡子曰然有之子之見我我何為當道者曰帝令主君射熊與羆皆死簡子曰是且何也當道者曰晉國且有大難主君首之帝令主君滅二卿夫熊與羆皆其祖也簡子曰帝賜我二笥皆有副何也當道者曰主君之子將克二國於翟皆子姓也簡子曰吾見兒在帝側帝屬我一翟犬曰及而子之長以賜之夫兒何謂以賜翟犬當道者曰兒主君之子也翟犬者代之先也主君之子且必有代及主君之後嗣且有革政而胡服并二國於翟簡子問其姓而延之以官當道者曰臣野人致帝命耳遂不見簡子書藏之府異日姑布子卿見簡子簡子遍召諸子相之子卿曰無為將軍者簡子曰趙氏其滅乎子卿曰吾嘗見一子於路殆君之子也簡子召子母恤母恤至則子卿起曰此真將軍矣簡子曰此其母賤翟婢也奚道貴哉子卿曰天所授雖賤必貴自是之後簡子盡召諸子與語母恤最賢簡子乃告諸子曰吾藏寶符於常山上先得者賞諸子馳之常山上求無所得母恤還曰已得符矣簡子曰奏之母恤曰從常山臨代代可取也簡子於是知母恤果賢乃廢太子伯魯而以母恤為太子後二年晉定公之十四年范中行作亂明年春簡子謂邯鄲大夫午曰歸我衛士五百家吾將置之晉陽午許諾而其父兄不聽倍言趙鞅捕午囚之晉陽乃告邯鄲人曰我私有誅午也諸君欲誰立遂殺午趙稷涉賔以邯鄲反晉君使籍秦圍邯鄲荀寅范吉射與午善不肯助秦而謀作亂董安于知之十月范中行氏伐趙鞅鞅奔晉陽晉人圍之范吉射荀寅仇人魏襄等謀逐荀寅以梁嬰父代之逐吉射以范臯繹代之荀躒言於晉侯曰君命大臣始亂者死今三臣始亂而獨逐鞅用刑不均請皆逐之十一月荀躒韓不佞魏哆奉公命以伐范中行氏不克范中行氏反伐公公擊之范中行敗走丁未二子奔朝歌韓魏以趙氏為請十二月辛未趙鞅入絳盟于公宫其明年知伯文子謂趙鞅曰范中行雖信為亂安于發之是安于與謀也晉國有法始亂者死夫二子已伏罪而安于獨在趙鞅患之安于曰臣死趙氏定晉國寧吾死晚矣遂自殺趙氏以告知伯然後趙氏寧孔子聞趙簡子不請晉君而執邯鄲午保晉陽故書春秋曰趙鞅以晉陽畔趙簡子有臣曰周舍好直諫周舍死簡子每聽朝常不恱大夫請罪簡子曰大夫無罪吾聞千羊之皮不如一狐之腋諸大夫朝徒聞唯唯不聞周舍之鄂鄂是以憂也簡子由此能附趙邑而懷晉人晉定公十八年趙簡子圍范中行於朝歌中行文子奔邯鄲明年衛靈公卒簡子與陽虎送衛太子剻聵於衛衛不內居戚晉定公二十一年簡子拔邯鄲中行文子奔柏人簡子又圍柏人中行文子范昭子遂奔齊趙竟有邯鄲柏人范中行餘邑入於晉趙名晉卿實專晉權奉邑侔於諸侯晉定公三十年定公與吳王夫差爭長於黃池趙簡子從晉定公卒長吳定公三十七年卒而簡子除三年之喪期而已是歲越王句踐滅吳晉出公十一年知伯伐鄭趙簡子疾使太子毋恤將而圍鄭知伯醉以酒灌擊毋恤毋恤羣臣請死之毋恤曰君所以置毋恤為能忍詬然亦愠知伯知伯歸因謂簡子使廢毋恤簡子不聽毋恤由此怨知伯晉出公十七年簡子卒太子毋恤代立是為襄子趙襄子元年越圍吳襄子降喪食使楚隆問吳王襄子姊前為代王夫人簡子既葬未除服北登夏屋請代王使厨人操銅枓以食代王及從者行斟隂令宰人各以枓擊殺代王及從官遂興兵平代地其姊聞之泣而呼天摩笄自殺代人憐之所死地名之為摩笄之山遂以代封伯魯子周為代成君伯魯者襄子兄故太子太子早死故封其子襄子立四年知伯與趙韓魏盡分其范中行故地晉出公怒告齊魯欲以伐四卿四卿恐遂共攻出公出公奔齊道死知伯乃立昭公曾孫驕是為晉懿公知伯益驕請地韓魏韓魏與之請地趙趙不與以其圍鄭之辱知伯怒遂率韓魏攻趙趙襄子懼乃奔保晉陽原過從後至於王澤見三人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺趙毋恤原過既至以告襄子襄子齊三日親自剖竹有朱書曰趙毋恤余霍泰山山陽侯天使也三月丙戌余將使女反滅知氏女亦立我百邑余將賜女林胡之地至於後世且有伉王亦黑龍靣而鳥噣鬚麋髭􅏋大膺大胸修下而馮左袵界乘奄有河宗至于休溷諸貉南伐晉别北滅黑姑襄子再拜受三神之令三國攻晉陽歲餘引汾水灌其城城不浸者三版城中懸釡而炊易子而食羣臣皆有外心禮益慢唯高共不敢失禮襄子懼乃夜使相張孟同私於韓魏韓魏與合謀以三月丙戌三國反滅知氏共分其地於是襄子行賞高共為上張孟同曰晉陽之難唯共無功襄子曰方晉陽急羣臣皆懈唯共不敢失人臣禮是以先之於是趙北有代南并和氏強於韓魏遂祠三神於百邑使原過主霍泰山祠祀其後娶空同氏生五子襄子為伯魯之不立也不肻立子且必欲傳位與伯魯子代成君成君先死乃取代成君子浣立為太子襄子立三十三年卒浣立是為獻侯獻侯少即位治中牟襄子弟桓子逐獻侯自立於代一年卒國人曰桓子立非襄子意乃共殺其子而復迎立獻侯十年中山武公初立十三年城平邑十五年獻侯卒子烈侯籍立烈侯元年魏文侯伐中山使太子擊守之六年魏韓趙皆相立為諸侯追尊獻子為獻侯烈侯好音謂相國公仲連曰寡人有愛可以貴之乎公仲曰富之可貴之則否烈侯曰然夫鄭歌者槍石二人吾賜之田人萬畝公仲曰諾不與居一月烈侯從代來問歌者田公仲曰求未有可者有頃烈侯復問公仲終不與乃稱疾不朝番吾君自代來謂公仲曰君實好善而未知所持今公仲相趙於今四年亦有進士乎公仲曰未也番吾君曰牛畜荀欣徐越皆可公仲乃進三人及朝烈侯復問歌者田何如公仲曰方使擇其善者牛畜侍烈侯以仁義約以王道烈侯逌然明日荀欣侍以選練舉賢任官使能明日徐越侍以節財儉用察度功德所與無不充君説烈侯使使謂相國曰歌者之田且止官牛畜為師荀欣為中尉徐越為內史賜相國衣二襲九年烈侯卒弟武公立武公十三年卒趙復立烈侯太子章是為敬侯是歲魏文侯卒敬侯元年武公子朝作亂不克出奔魏趙始都邯鄲二年敗齊於靈邱三年救魏於廪邱大敗齊人四年魏敗我兔臺築剛平以侵衛五年齊魏為衛攻趙取我剛平六年借兵於楚伐魏取棘蒲八年拔魏黃城九年伐齊齊伐燕趙救燕十年與中山戰於房子十一年魏韓趙共滅晉分其地伐中山又戰於中人十二年敬侯卒子成侯種立成侯元年公子勝與成侯爭立為亂二年六月雨雪三年大戊午為相伐衛取鄉邑七十三魏敗我藺四年與秦戰高安敗之五年伐齊于鄄魏敗我懷攻鄭敗之以與韓韓與我長子六年中山築長城伐魏敗湪澤圍魏惠王七年侵齊至長城與韓攻周八年與韓分周以為兩九年與齊戰阿下十年攻衛取鄄十一年秦攻魏趙救之石阿十二年秦攻魏少梁趙救之十三年秦獻公使庶長國伐魏少梁虜其太子座魏敗我澮取皮牢成侯與韓昭侯遇上黨十四年與韓攻秦十五年助魏攻齊十六年與韓魏分晉封晉君以端氏十七年成侯與魏惠王遇葛孽十九年與齊宋會平陸與燕會河二十年魏獻榮椽因以為檀臺二十一年魏圍我邯鄲二十二年魏惠王拔我邯鄲齊亦敗魏於桂陵二十四年魏歸我邯鄲與魏盟漳水上秦攻我藺二十五年成侯卒公子緤與太子肅侯爭立緤敗亡奔韓肅侯元年奪晉君端氏徙處屯留二年與魏惠王遇於隂晉三年公子范襲邯鄲不勝而死四年朝天子六年攻齊拔高唐七年公子刻攻魏首垣十一年秦孝公使商君伐魏虜其將公子卬趙伐魏十二年秦孝公卒商君死十五年起夀陵魏惠王卒十六年肅侯遊大陵出於鹿門大戊午扣馬曰耕事方急一日不作百日不食肅侯下車謝十七年圍魏黃不克築長城十八年齊魏伐我決河水灌之兵去二十二年張儀相秦趙疵與秦戰敗秦殺疵河西取我藺離石二十三年韓舉與齊魏戰死於桑邱二十四年肅侯卒秦楚燕齊魏出鋭師各萬人來會葬子武靈王立武靈王元年陽文君趙豹相梁襄王與太子嗣韓宣王與太子倉來朝信宫武靈王少未能聽政博聞師三人左右司過三人及聽政先問先王貴臣肥義加其秩國三老年八十月致其禮三年城鄗四年與韓會於區鼠五年娶韓女為夫人八年韓擊秦不勝而去五國相王趙獨否曰無其實敢處其名乎令國人謂已曰君九年與韓魏共擊秦秦敗我斬首八萬級齊敗我觀澤十年秦取我西都及中陽齊破燕燕相子之為君君反為臣十一年王召公子職於韓立以為燕王使樂池送之十三年秦拔我藺虜將軍趙莊楚魏王來過邯鄲十四年趙何攻魏十六年秦惠王卒王遊大陵他日王夢見處女鼓琴而歌詩曰美人熒熒兮顔若苕之榮命乎命乎曾無我嬴異日主飲酒樂數言所夢想見其狀吳廣聞之因夫人而內其女娃嬴孟姚也孟姚甚有寵於王是為惠后十七年王出九門為野臺以望齊中山之境十八年秦武王與孟説舉龍文赤鼎絶臏而死趙王使代相趙固迎公子稷於燕送歸立為秦王是為昭王十九年春正月大朝信宫召肥義與議天下五日而畢王北略中山之地至於房子遂之代北至無窮西至河登黃華之上召樓緩謀曰我先王因世之變以長南藩之地屬阻障滏之險立長城又取藺郭狼敗林人於荏而功未遂今中山在我腹心北有燕東有胡西有林胡樓煩秦韓之邊而無強兵之救是亡社稷奈何夫有高世之名必有遺俗之纍吾欲胡服樓緩曰善羣臣皆不欲於是肥義侍王曰簡襄主之烈計胡翟之利為人臣者寵有孝悌長幼順明之節通有補民益主之業此兩者臣之分也今吾欲繼襄主之迹開於胡翟之鄉而卒世不見也為敵弱用力少而功多可以毋盡百姓之勞而序往古之勳夫有高世之功者負遺俗之纍有獨智之慮者任驁民之怨今吾將胡服騎射以教百姓而世必議寡人奈何肥義曰臣聞疑事無功疑行無名王既定負遺俗之慮殆無顧天下之議矣夫論至德者不和於俗成大功者不謀於衆昔者舜舞有苖禹袒裸國非以養欲而樂志也務以論德而約功也愚者暗成事智者覩未形則王何疑焉王曰吾不疑胡服也吾恐天下笑我也狂夫之樂智者哀焉愚者所笑賢者察焉世有順我者胡服之功未可知也雖驅世以笑我胡地中山吾必有之於是遂胡服矣使王緤告公子成曰寡人胡服將以朝也亦欲叔服之家聽於親而國聽於君古今之公行也子不反親臣不逆君兄弟之通義也今寡人作教易服而叔不服吾恐天下議之也制國有常利民為本從政有經令行為上明德先論於賤而行政先信於貴今胡服之意非以養欲而樂志也事有所止而功有所出事成功立然后善也今寡人恐叔之逆從政之經以輔叔之議且寡人聞之事利國者行無邪因貴戚者名不纍故願慕公叔之義以成胡服之功使緤謁之叔請服焉公子成再拜稽首曰臣固聞王之胡服也臣不佞寢疾未能趨走以滋進也王命之臣敢對因竭其愚忠曰臣聞中國者蓋聰明徇智之所居也萬物財用之所聚也賢聖之所教也仁義之所施也詩書禮樂之所用也異敏技能之所試也逺方之所觀赴也蠻夷之所義行也今王舍此而襲逺方之服變古之教易古之道逆人之心而怫學者離中國故臣願王圖之也使者以報王曰吾固聞叔之疾也我將自往請之王遂往之公子成家因自請之曰夫服者所以便事也聖人觀鄉而順宜因事而制禮所以利其民而厚其國也夫翦髮文身錯臂左衽甌越之民也黑齒雕題却冠􅐕絀大吳之國也故禮服莫同其便一也鄉異而用變事異而禮易是以聖人果可以利其國不一其用果可以便其事不同其禮儒者一師而俗異中國同禮而教離况於山谷之便乎故去就之變智者不能一逺近之服賢聖不能同窮鄉多異曲學多辨不知而不疑異於已而不非者公焉而衆求盡善也今叔之所言者俗也吾所言者所以制俗也吾國東有河薄洛之水與齊中山同之無舟楫之用自常山以至代上黨東有燕東胡之境而西有樓煩秦韓之邊今無騎射之備故寡人無舟楫之用夾水居之民將何以守河薄洛之水變服騎射以備燕三胡秦韓之邊且昔者簡主不塞晉陽以及上黨而襄主并戎取代以攘諸胡此愚智所明也先時中山負齊之強兵侵暴吾地係纍吾民引水圍鄗微社稷之神靈則鄗幾於不守也先王醜之而怨未能報也今騎射之備近可以便上黨之形而逺可以報中山之怨而叔順中國之俗以逆簡襄之意惡變服之名以忘鄗事之醜非寡人之所望也公子成再拜稽首曰臣愚不達於王之義敢道世俗之聞臣之罪也今王將繼簡襄之意以順先王之志臣敢不聽命乎再拜稽首乃賜胡服明日服而朝於是始出胡服令也趙文趙造周祒趙俊皆諫止王毋胡服如故法便王曰先王不同俗何古之法帝王不相襲何禮之循虙戲神農教而不誅黃帝堯舜誅而不怒及至三王隨時制法因事制禮法度制令各順其宜衣服器械各便其用故禮也不必一道而便國不必古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可非而循禮未足多也且服竒者志淫則是鄒魯無竒行也俗辟者民易則是吳越無秀士也且聖人利身謂之服便事謂之禮夫進退之節衣服之制者所以齊常民也非所以論賢者也故齊民與俗流賢者與變俱故諺曰以書御馬者不盡馬之情以古制今者不達事之變循法之功不足以高世法古之學不足以制今子不及也遂胡服招騎射二十年王略中山地至寧葮西略胡地至榆中林胡王獻馬歸使樓緩之秦仇液之韓王賁之楚富丁之魏趙爵之齊代相趙固主胡致其兵二十一年攻中山趙祒為右軍許鈞為左軍公子章為中軍王并將之牛翦將車騎趙希并將胡代趙與之陘合軍曲陽攻取丹邱華陽鴟之塞王軍取鄗石邑封龍東垣中山獻四邑和王許之罷兵二十三年攻中山二十五年惠后卒使周祒胡服傅王子何二十六年復攻中山攘地北至燕代西至雲中九原二十七年五月戊申大朝於東宫傳國立王子何以為王王廟見禮畢出臨朝大夫悉為臣肥義為相國并傳王是為惠文王惠文王惠后吳娃子也武靈王自號為主父主父欲令子主治國而身胡服將士大夫西北略胡地而欲從雲中九原直南襲秦於是詐自為使者入秦秦昭王不知已而怪其狀甚偉非人臣之度使人逐之而主父馳已脫關矣審問之乃主父也秦人大驚主父所以入秦者欲自略地形因觀秦王之為人也惠文王二年主父行新地遂出代西遇樓煩王於西河而致其兵三年滅中山遷其王於膚施起靈夀北地方從代道大通還歸行賞大赦置酺五日封長子章為代安陽君章素侈心不服其弟所立主父又使田不禮相章也李兑謂肥義曰公子章強壯而志驕黨衆而欲大殆有私乎田不禮之為人也忍殺而驕二人相得必有謀隂賊起一出身徼幸夫小人有欲輕慮淺謀徒見其利不見其害同類相推俱入禍門以吾觀之必不久矣子任重而勢大亂所始禍之所集也子必先患仁者愛萬物而智者備禍於未形不仁不智何以為國子奚不稱疾毋出傳政於公子成毋為怨府毋為禍梯肥義曰不可昔者主父以王屬義也曰毋變而度毋異而慮堅守一心以殁而世義再拜受命而籍之今畏不禮之難而忘吾籍變孰大焉進受嚴命退而不全負孰甚焉變負之臣不容於刑諺曰死者復生生者不愧吾言已在前矣吾欲全吾言安得全吾身且夫貞臣也難至而節見忠臣也纍至而行明子則有賜而忠我矣雖然吾有語在前者也終不敢失李兑曰諾子勉之矣吾見子已今年耳涕泣而出李兑數見公子成以備田不禮之事異日肥義謂信期曰公子與田不禮甚可憂也其於義也聲善而實惡此為人也不子不臣吾聞之也姦臣在朝國之殘也讒臣在中主之蠧也此人貪而欲大內得主而外為暴矯令為慢以擅一旦之命不難為也禍且逮國今吾憂之夜而忘寐飢而忘食盜賊出入不可不備自今以來若有召王者必見吾靣我將先以身當之無故而王乃入信期曰善哉吾得聞此也四年朝羣臣安陽君亦來朝主父令王聽朝而自從旁觀窺羣臣宗室之禮見其長子章傫然也反北面為臣詘於其弟心憐之於是乃欲分趙而王章於代計未決而輟主父及王遊沙邱異宫公子章即以其徒與田不禮作亂詐以主父令召王肥義先入殺之高信即與王戰公子成與李兑自國至乃起四邑之兵入距難殺公子章及田不禮滅其黨賊而定王室公子成為相號安平君李兑為司寇公子章之敗往走主父主父聞之成兑因圍主父宫公子章死公子成李兑謀曰以章故圍主父即解兵吾屬夷矣乃遂圍主父令宫中人後出者夷宫中人悉出主父欲出不得又不得食探爵鷇而食之三月餘而餓死沙邱主父定死乃發喪赴諸侯是時王少成兑專政畏誅故圍主父主父初以長子章為太子後得吳娃愛之為不出者數歲生子何乃廢太子章而立何為王吳娃死愛弛憐故太子欲兩王之猶豫未決故亂起以至父子俱死為天下笑豈不痛乎主父死惠文王立立五年與燕鄚易八年城南行唐九年趙梁將與齊合軍攻韓至魯關下及十年秦自置為西帝十一年董叔與魏氏伐宋得河陽於魏秦取梗陽十二年趙梁將攻齊十三年韓徐為將攻齊公主死十四年相國樂毅將趙秦韓魏燕攻齊取靈邱與秦會中陽十五年燕昭王來見趙與韓魏秦共擊齊齊王敗走燕獨深入取臨災十六年秦復與趙數擊齊齊人患之蘇厲為齊遺趙王書曰臣聞古之賢君其德行非布於海內也教順非洽於民人也祭祀時享非數常於鬼神也甘露降時雨至年榖豐孰民不疾疫衆人善之然而賢主圖之今足下之賢行功力非數加於秦也怨毒積怒非數深於齊也秦趙與國以強徴兵於韓秦誠愛趙乎其實憎齊乎物之甚者賢主察之秦非愛趙而憎齊也欲亡韓而吞二周故以齊餤天下恐事之不合故出兵以劫魏趙恐天下畏已也故出質以為信恐天下亟反也故徴兵於韓以威之聲以德與國而實伐空韓臣以秦計為必出於此夫物固有勢異而患同者楚久伐而中山亡今齊久伐而韓必亡破齊王與六國分其利也亡韓秦獨擅之收二周西取祭器秦獨私之賦田計功王之獲利孰與秦多説士之計曰韓亡三川魏亡晉國市朝未變而禍已及矣燕盡齊之北地去沙邱巨鹿斂三百里韓之上黨去邯鄲百里燕秦謀王之河山間三百里而通矣秦之上郡近挺關至於榆中者千五百里秦以三郡攻王之上黨羊腸之西句注之南非王有已踰句注斬常山而守之三百里而通於燕代馬胡犬不東下昆山之玉不出三寶者亦非王有已王久伐齊從強秦攻韓其禍必至於此願王孰慮之且齊之所以伐者以事王也天下屬行以謀王也燕秦之約成而兵出有日矣五國三分王之地齊倍五國之約而殉王之患西兵以禁強秦秦廢帝請服反高平根柔於魏反巠分先俞於趙齊之事王宜為上佼而今乃抵罪臣恐天下後事王者之不敢自必也願王孰計之也今王毋與天下攻齊天下必以王為義齊抱社稷而厚事王天下必盡重王義王以天下善秦秦暴王以天下禁之是一世之名寵制於王也於是趙乃輟謝秦不擊齊王與燕王遇廉頗將攻齊昔陽取之十七年樂毅將趙師攻魏伯陽而秦怨趙不與已擊齊伐趙拔我兩城十八年秦拔我石城王再之衛東陽決河水伐魏氏大潦漳水出魏冉來相趙十九年秦敗我二城趙與魏伯陽趙奢將攻齊麥邱取之二十年廉頗將攻齊王與秦昭王遇西河外二十一年趙徙漳水武平西二十二年大疫置公子丹為太子二十三年樓昌將攻魏幾不能取十二月廉頗將攻幾取之二十四年廉頗將攻魏房子拔之因城而還又攻安陽取之二十五年燕周將攻昌城高唐取之與魏共擊秦秦將白起破我華陽得一將軍二十六年取東胡歐代地二十七年徙漳水武平南封趙豹為平陽君河水出大潦二十八年藺相如伐齊至平邑罷城北九門大城燕將成安君公孫操弒其王二十九年秦韓相攻而圍閼與趙使趙奢將擊秦大破秦軍閼與下賜號為馬服君三十三年惠文王卒太子丹立是為孝成王孝成王元年秦伐我拔三城趙王新立太后用事秦急攻之趙氏求救於齊曰必以長安君為質兵乃出太后不肯大臣強諫太后明謂左右曰復言長安君為質者老婦必唾其面左師觸龍言願見太后太后盛氣而胥之入徐趨而坐自謝曰老臣病足曾不能疾走不得見久矣竊自恕而恐太后體之有所苦也故願望見太后太后曰老婦恃輦而行曰食得母衰乎曰恃粥耳曰老臣間者殊不欲食乃強步日三四里少益嗜食和於身也太后曰老婦不能太后不和之色少解左師公曰老臣賤息舒祺最少不肖而臣衰竊憐愛之願得補黑衣之缺以衛王宫昧死以聞太后敬諾年幾何矣對曰十五歲矣雖少願及未填溝壑而託之太后曰丈夫亦愛憐少子乎對曰甚於婦人太后笑曰婦人異甚對曰老臣竊以為媪之愛燕后賢於長安君太后曰君過矣不若長安君之甚左師公曰父母愛子則為之計深遠媪之送燕后也持其踵為之泣念其逺也亦哀之矣已行非不思也祭祀則祝之曰必勿使反豈非計長久為子孫相繼為王也哉太后曰然左師公曰今三世以前至於趙主之子孫為侯者其繼有在者乎曰無有曰微獨趙諸侯有在者乎曰老婦不聞也曰此其近者禍及其身逺者及其子孫豈人主之子侯則不善哉位尊而無功奉厚而無勞而挾重器多也今媪尊長安君之位而封之以膏腴之地多與之重器而不及今令有功於國一旦山陵崩長安君何以自託於趙老臣以媪為長安君之計短也故以為愛之不若燕后太后曰諾恣君之所使之於是為長安君約車百乘質於齊齊兵乃出子義聞之曰人主之子骨肉之親也猶不能持無功之尊無勞之奉而守金玉之重也而况於豫乎齊安平君田單將趙師而攻燕中陽拔之又攻韓注人拔之二年惠文后卒田單為相四年王夢衣遍裻之衣乘飛龍上天不至而墜見金玉之積如山明日王召筮史敢占之曰夢衣遍裻之衣者殘也乘飛龍上天不至而墜者有氣而無實也見金玉之積如山者憂也後三日韓氏上黨守馮亭使者至曰韓不能守上黨入之於秦其吏民皆安為趙不欲為秦有城市邑十七願再拜入之趙聽王所以賜吏民王大喜召平陽君豹告之曰馮亭入城市邑十七受之何如對曰聖人甚禍無故之利王曰人懷吾德何謂無故乎對曰夫秦蠶食韓氏地中絶不令相通固自以為坐而受上黨之地也韓氏所以不入於秦者欲嫁其禍於趙也秦服其勞而趙受其利雖強大不能得之於小弱小弱顧能得之於強大乎豈可謂非無故之利哉且夫秦以牛田之水通糧蠶食上乘倍戰者裂上國之地其政行不可與為難必勿受也王曰今發百萬之軍而攻踰年歷歲未得一城也今以城市邑十七幣吾國此大利也趙豹出王召平原君與趙禹而告之對曰發百萬之軍而攻踰歲未得一城今坐受城市邑十七此大利不可失也王曰善乃令趙勝受地告馮亭曰敝國使者臣勝敝國君使勝致命以萬户都三封太守千户都三封縣令皆世世為侯吏民皆益爵三級吏民能相安皆賜之六金馮亭垂涕不見使者曰吾不處三不義也為主守地不能死固不義一矣入之秦不聽主令不義二矣賣主地而食之不義三矣趙遂發兵取上黨廉頗將軍軍長平七年廉頗免而趙括代將秦人圍趙括趙括以軍降卒四十餘萬皆坑之王悔不聽趙豹之計故有長平之禍焉王還不聽秦秦圍邯鄲武垣令傅豹王容蘇射率燕衆反燕地趙以靈邱封楚相春申君八年平原君如楚請救還楚來救及魏公子無忌亦來救秦圍邯鄲乃解十年燕攻昌壯五月拔之趙將樂乘慶舍攻秦信梁軍破之太子死而秦攻西周拔之徒父祺出十一年城元氏縣上原武陽君鄭安平死收其地十二年邯鄲廥燒十四年平原君趙勝死十五年以尉文封相國廉頗為信平君燕王令丞相栗腹約歡以五百金為趙王酒還歸報燕王曰趙氏壯者皆死長平其孤未壯可伐也王召昌國君樂間而問之對曰趙四戰之國也其民習兵伐之不可王曰吾以衆伐寡二而伐一可乎對曰不可王曰吾即以五而伐一可乎對曰不可燕王大怒羣臣皆以為可燕卒起二軍車二千乘栗腹將而攻鄗卿秦將而攻代廉頗為趙將破殺栗腹虜卿秦樂間十六年廉頗圍燕以樂乘為武襄君十七年假相大將武襄君攻燕圍其國十八年延陵鈞率師從相國信平君助魏攻燕秦拔我榆次三十七城十九年趙與燕易土以龍兑汾門臨樂與燕燕以葛武陽平舒與趙二十年秦王政初立秦拔我晉陽二十一年孝成王卒廉頗將攻繁陽取之使樂乘代之廉頗攻樂乘樂乘走廉頗亡入魏子偃立是為悼襄王悼襄王元年大備魏欲通平邑中牟之道不成二年李牧將攻燕拔武遂方城秦召春平君因而留之泄鈞為之謂文信侯曰春平君者趙王甚愛之而郎中妬之故相與謀曰春平君入秦秦必留之故相與謀而內之秦也今君留之是絶趙而郎中之計中也君不如遣春平君而留平都春平君者言行信於王王必厚割趙而贖平都文信侯曰善因遣之城韓臯三年龎暖將攻燕禽其將劇辛四年龎暖將趙楚魏燕之鋭師攻秦蕞不拔移攻齊取饒安五年傅抵將居平邑慶舍將東陽河外師守河梁六年封長安君以饒魏與趙鄴九年趙攻燕取貍陽城兵未罷秦攻鄴拔之悼襄王卒子幽繆王遷立幽繆王遷元年城柏人二年秦攻武城扈輒率師救之軍敗死焉三年秦攻赤麗宜安李牧率師與戰肥下却之封牧為武安君四年秦攻番吾李牧與之戰却之五年代地大動自樂徐以西北至平隂臺屋墻垣大半壞地坼東西百三十步六年大飢民訛言曰趙為號秦為笑以為不信視地之生毛七年秦人攻趙趙大將李牧將軍司馬尚將擊之李牧誅司馬尚免趙忽及齊將顔聚代之趙忽軍破顔聚亡去以王遷降八年十月邯鄲為秦田氏陳完者陳厲公他之子也完生周太史過陳陳厲公使卜完卦得觀之否是為觀國之光利用賔於王此其代陳有國乎不在此而在異國乎非此其身也在其子孫若在異國必薑姓薑姓四嶽之後物莫能兩大陳衰此其昌乎厲公者陳文公少子也其母蔡女文公卒厲公兄鮑立是為桓公桓公與他異母及桓公病蔡人為他殺桓公鮑及太子免而立他為厲公厲公既立娶蔡女蔡女淫於蔡人數歸厲公亦數如蔡桓公之少子林怨厲公殺其父與兄乃令蔡人誘厲公而殺之林自立是為莊公故陳完不得立為陳大夫厲公之殺以淫出國故春秋曰蔡人殺陳他罪之也莊公卒立弟杵臼是為宣公宣公十一年殺其太子禦寇禦寇與完相愛恐禍及已完故奔齊齊桓公欲使為卿辭曰羈旅之臣幸得免負擔君之惠也不敢當高位桓公使為工正齊懿仲欲妻完卜占之曰是謂鳯皇于蜚和鳴鏘鏘有媯之後將育於薑五世其昌並於正卿八世之後莫之與京卒妻完完之奔齊齊桓公立十四年矣完卒諡為敬仲仲生稚孟夷敬仲之如齊以陳字為田氏田稚孟夷生湣孟莊田湣孟莊生文子須無田文子事齊莊公晉之大夫欒逞作亂於晉來奔齊齊莊公厚客之晏嬰與田文子諫莊公弗聽文子卒生桓子無宇田桓子無宇有力事齊莊公甚有寵無宇卒生武子開與釐子乞田釐子乞事齊景公為大夫其收賦稅於民以小斗受之其粟豫民以大斗行隂德於民而景公弗禁由此田氏得齊衆心宗族益強民思田氏晏子數諫景公景公弗聽已而使於晉與叔向私語曰齊國之政其卒歸於田氏矣晏嬰卒後范中行氏反晉晉攻之急范中行請粟於齊田乞欲為亂樹黨於諸侯乃説景公曰范中行數有德於齊齊不可不救齊使田乞救之而輸之粟景公太子死後有寵姬曰芮子生子荼景公病命其相國惠子與高昭子以子荼為太子景公卒兩相高國立荼是為晏孺子而田乞不説欲立景公他子陽生陽生素與乞歡晏孺子之立也陽生奔魯田乞偽事高昭子國惠子者每朝代參乘言曰始諸大夫不欲立孺子孺子既立君相之大夫皆自危謀作亂又紿大夫曰高昭子可畏也及未發先之諸大夫從之田乞鮑牧與大夫以兵入公室攻高昭子昭子聞之與國惠子救公公師敗田乞之衆追國惠子惠子奔莒遂返殺高昭子晏孺子奔魯田乞使人之魯迎陽生陽生至齊匿田乞家請諸大夫曰常之母有魚菽之祭幸而來會飲會飲田氏田乞盛陽生橐中置坐中央發橐出陽生曰此乃齊君矣大夫皆伏謁將盟立之田乞誣曰吾與鮑牧謀共立陽生也鮑牧怒曰大夫忘景公之命乎諸大夫欲悔陽生乃頓首曰可則立之不可則已鮑牧恐禍及已乃復曰皆景公之子何為不可遂立陽生於田乞之家是為悼公乃使人遷晏孺子於駘而殺孺子荼悼公既立田乞為相專齊政四年田乞卒子常代立是為田成子鮑牧與齊悼公有郤弒悼公齊人共立其子壬是為簡公田常成子與監止俱為左右相相簡公田常心害監止監止幸於簡公權弗能去於是田常復修釐子之政以大斗出貸以小斗收齊人歌之曰嫗乎采芑歸乎田成子齊大夫朝御鞅諫簡公曰田監不可並也君其擇焉君弗聽子我者監止之宗人也常與田氏有郤田氏疏族田豹事子我有寵子我曰吾欲盡滅田氏適以豹代田氏宗豹曰臣於田氏疏矣不聽已而豹謂田氏曰子我將誅田氏田氏弗先禍及矣子我舍公宫田常兄弟四人乘如公宫欲殺子我子我閉門簡公與婦人飲檀臺將欲擊田常太史子餘曰田常非敢為亂將除害簡公乃止田常出聞簡公怒恐誅將出亡田子行曰需事之賊也田常於是擊子我子我率其徒攻田氏不勝出亡田氏之徒追殺子我及監止簡公出奔田氏之徒遂追執簡公於徐州簡公曰早從御鞅之言不及此難田氏之徒恐簡公復立而誅已遂殺簡公簡公立四年而殺於是田常立簡公弟鷔是為平公平公即位田常為相田常既殺簡公懼諸侯共誅已乃盡歸魯衛侵地西約晉韓魏趙氏南通吳越之使修功行賞親於百姓以故齊復定田常言於齊平公曰德施人之所欲君其行之刑罰人之所惡臣請行之行之五年齊國之政皆歸田常田常於是盡誅鮑晏監止及公族之強者而割齊自安平以東至琅邪自為封邑封邑大於平公之所食田常乃選齊國中女子長七尺以上為後宫後宫以百數而使賔客舍人出入後宫者不禁及田常卒有七十餘男田常卒子襄子盤代立相齊常諡為成子田襄子既相齊宣公三晉殺知伯分其地襄子使其兄弟宗人盡為齊都邑大夫與三晉通使且以有齊國襄子卒子莊子白立田莊子相齊宣公宣公四十三年伐晉毁黃城圍陽狐明年伐魯葛及安陵明年取魯之一城莊子卒子太公和立田太公相齊宣公宣公四十八年取魯之郕明年宣公與鄭人會西城伐衛取母邱宣公五十一年卒田會自廪邱反宣公卒子康公貸立貸立十四年淫於酒婦人不聽政太公乃遷康公於海上食一城以奉其先祀明年魯敗齊平陸三年太公與魏文侯會濁澤求為諸侯魏文侯乃使使言周天子及諸侯請立齊相田和為諸侯周天子許之康公之十九年田和立為齊侯列於周室紀元年齊侯太公和立二年和卒子桓公午立桓公午五年秦魏攻韓韓求救於齊齊桓公召大臣而謀曰早救之孰與晚救之騶忌曰不若勿救段干朋曰不救則韓且折而入於魏不若救之田臣思曰過矣君之謀也秦魏攻韓楚趙必救之是天以燕子齊也桓公曰善乃隂告韓使者而遣之韓自以為得齊之救因與秦魏戰楚趙聞之果起兵而救之齊因起兵襲燕國取桑邱六年救衛桓公卒子威王因齊立是歲故齊康公卒絶無後奉邑皆入田氏齊威王元年三晉因齊喪來伐我靈邱三年三晉滅晉後而分其地六年魯伐我入陽關晉伐我至博陵七年衛伐我取薛陵九年趙伐我取鄄威王初即位以來不治委政卿大夫九年之間諸侯並伐國人不治於是威王召即墨大夫而語之曰自子之居即墨也毁言日至然吾使人視即墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽言日聞然使使視阿田野不闢民貧苦昔日趙攻鄄子弗能救衛取薛陵子弗知是子以幣厚吾左右以求譽也是日烹阿大夫及左右嘗譽者皆并烹之遂起兵西擊趙衛敗魏於濁澤而圍惠王惠王請獻觀以和解趙人歸我長城於是齊國震懼人人不敢飾非務盡其誠齊國大治諸侯聞之莫敢致兵於齊二十餘年騶忌子以鼓琴見威王威王説而舍之右室須臾王鼓琴騶忌子推户入曰善哉鼓琴王勃然不説去琴案劒曰夫子見容未察何以知其善也騶忌子曰夫大絃濁以春溫者君也小絃廉折以清者相也攫之深醳之愈者政令也鈞諧以鳴大小相益回邪而不相害者四時也吾是以知其善也王曰善語音騶忌子曰何獨語音夫治國家而弭人民皆在其中王又勃然不説曰若夫語五音之紀信未有如夫子者也若夫治國家而弭人民又何為乎絲桐之間騶忌子曰夫大絃濁以春溫者君也小絃廉折以清者相也攫之深而舍之愈者政令也鈞諧以鳴大小相益回邪而不相害者四時也夫復而不亂者所以治昌也連而徑者所以存亡也故曰琴音調而天下治夫治國家而弭人民者無若乎五音者王曰善騶忌子見三月而受相印淳于髠見之曰善説哉髠有愚志願陳諸前騶忌子曰謹受教淳于髠曰得全全昌失全全亡騶忌子曰謹受令請謹毋離前淳于髠曰豨膏棘軸所以為滑也然而不能運方穿騶忌子曰謹受令請謹事左右淳于髠曰弓膠昔幹所以為合也然而不能傳合疏罅騶忌子曰謹受令請謹自附於萬民淳于髠曰狐裘雖弊不可補以黃狗之皮騶忌子曰謹受令請謹擇君子毋雜小人其間淳于髠曰大車不較不能載其常任琴瑟不較不能成其五音騶忌子曰謹受令請謹修法律而督姦吏淳于髠説畢趨出至門而面其僕曰是人者吾語之微言五其應我若響之應聲是人必封不久矣居期年封以下邳號曰成侯威王二十三年與趙王會平陸二十四年與魏王會田於郊魏王問曰王亦有寶乎威王曰無有梁王曰若寡人國小也尚有徑寸之珠照車前後各十二乘者十枚奈何以萬乘之國而無寶乎威王曰寡人之所以為寶與王異吾臣有檀子者使守南城則楚人不敢為寇東取泗上十二諸侯皆來朝吾臣有朌子者使守高唐則趙人不敢東漁於河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門徙而從者七千餘家吾臣有種首者使備盜賊則道不拾遺將以照千里豈特十二乘哉梁惠王慙不懌而去二十六年魏惠王圍邯鄲趙求救於齊齊威王召大臣而謀曰救趙孰與勿救騶忌子曰不如勿救段干朋曰不救則不義且不利威王曰何也對曰夫魏氏并邯鄲其於齊何利哉且夫救趙而軍其郊是趙不伐而魏全也故不如南攻襄陵以弊魏邯鄲拔而乘魏之弊威王從其計其後成侯騶忌與田忌不善公孫閲謂成侯忌曰公何不謀伐魏田忌必將戰勝有功則公之謀中也戰不勝非前死則後北而命在公矣於是成侯言威王使田忌南攻襄陵十月邯鄲拔齊因起兵擊魏大敗之桂陵於是齊最強於諸侯自稱為王以令天下三十二年殺其大夫牟辛三十五年公孫閲又謂成侯忌曰公何不令人操十金卜於市曰我田忌之人也吾三戰而三勝聲威天下欲為大事亦吉乎不吉乎卜者出因令人捕為之卜者驗其辭於王之所田忌聞之因遂率其徒襲攻臨淄求成侯不勝而奔三十六年威王卒子宣王辟強立宣王元年秦用商鞅周致伯於秦孝公二年魏伐趙趙與韓親共擊魏趙不利戰於南梁宣王召田忌復故位韓氏請救於齊宣王召大臣而謀曰蚤救孰與晚救騶忌子曰不如勿救田忌曰弗救則韓且折而入於魏不如早救之孫子曰夫韓魏之兵未弊而救之是吾代韓受魏之兵顧反聽命於韓也且魏有破國之志韓見亡必東面而訴於齊矣吾因深結韓之親而晚承魏之弊則可重利而得尊名也宣王曰善乃隂告韓之使者而遣之韓因恃齊五戰不勝而東委國於齊齊因起兵使田忌田嬰將孫子為帥救韓趙以擊魏大敗之馬陵殺其將龎涓虜魏太子申其後三晉之王皆因田嬰朝齊王於博望盟而去七年與魏王會平阿南明年復會鄄魏惠王卒明年與魏襄王會徐州諸侯相王也十年楚圍我徐州十一年與魏伐趙趙決河水灌齊魏兵罷十八年秦惠王稱王宣王喜文學遊説之士自如騶衍淳于髠田駢接子慎到環淵之徒七十六人皆賜列第為上大夫不治而議論是以齊稷下學士復盛且數百千人十九年宣王卒子湣王地立湣王元年秦使張儀與諸侯執政會於齧桑三年封田嬰於薛四年迎婦於秦七年與宋攻魏敗之觀澤十二年攻魏楚圍雍氏秦敗屈丐蘇代謂田軫曰臣願有謁於公其為事甚完使楚利公成為福不成亦為福今者臣立於門客有言曰魏王謂韓馮張儀曰煮棗將拔齊兵又進子來救寡人則可矣不救寡人寡人弗能拔此特轉辭也秦韓之兵毋東旬餘則魏氏轉韓從秦秦逐張儀交臂而事齊楚此公之事成也田軫曰奈何使無東對曰韓馮之救魏之辭必不謂韓王曰馮以為魏必曰馮將以秦韓之兵東却齊宋馮因摶三國之兵乘屈丐之弊南割於楚故地必盡得之矣張儀救魏之辭必不謂秦王曰儀以為魏必曰儀且以秦韓之兵東距齊宋儀將搏三國之兵乘屈丐之弊南割於楚名存亡國實伐三川而歸此王業也公令楚王與韓氏地使秦制和謂秦王曰請與韓地而王以施三川韓氏之兵不用而得地於楚韓馮之東兵之辭且謂何曰秦兵不用而得三川伐楚韓以窘魏魏氏不敢東是孤齊也張儀之東兵之辭且謂何曰秦韓欲地而兵有案聲威發於魏魏氏之欲不失齊楚者有資矣魏氏轉秦韓爭事齊楚楚王欲而無與地公令秦韓之兵不用而得地有一大德也秦韓之王劫於韓馮張儀而東兵以徇服魏公常執左劵以責於秦韓此其善於公而惡張子多資矣十三年秦惠王卒二十三年與秦擊敗楚於重邱二十四年秦使涇陽君質於齊二十五年歸涇陽君于秦孟嘗君薛文入秦即相秦又亡去二十六年齊與韓魏共攻秦至函谷軍焉二十八年秦與韓河外以和兵罷二十九年趙殺其主父齊佐趙滅中山三十六年王為東帝秦昭王為西帝蘇代自燕來入齊見於章華東門齊王曰嘻善子來秦使魏冉致帝子以為何如對曰王之問臣也卒而患之所從來微願王受之而勿備稱也秦稱之天下安之王乃稱之無後也且讓受帝名無傷也秦稱之天下惡之王因勿稱以收天下此大資也且天下立兩帝王以天下為尊齊乎尊秦乎王曰尊秦曰釋帝天下愛齊乎愛秦乎王曰愛齊而憎秦曰兩帝立約伐趙孰與伐桀宋之利王曰伐桀宋利對曰夫約鈞然與秦為帝而天下獨尊秦而輕齊釋帝則天下愛齊而憎秦伐趙不如伐桀宋之利故願王明釋帝以收天下倍約賔秦無爭重而王以其間舉宋夫有宋衛之陽地危有濟西趙之阿東國危有淮北楚之東國危有陶平陸梁門不開釋帝而貸之以伐桀宋之事國重而名尊燕楚所以形服天下莫敢不聽此湯武之舉也敬秦以為名而後使天下憎之此所謂以卑為尊者也願王孰慮之於是齊去帝復為王秦亦去帝位三十八年秦昭王怒曰吾愛宋與愛新城陽晉同韓聶與吾友也而攻吾所愛何也蘇代為齊謂秦王曰韓聶之攻宋所以為王也齊強輔之以宋楚魏必恐恐必西事秦是王不煩一兵不傷一士無事而割安邑也此韓聶之所禱於王也秦王曰吾患齊之難知一從一衡其説何也對曰天下國令齊可知乎齊以攻宋其知事秦以萬乘之國自輔不西事秦則宋治不安中國白頭遊敖之士皆積智欲離齊秦之交伏式結軼西馳者未有一人言善齊者也伏式結軼東馳者未有一人言善秦者也何則皆不欲齊秦之合也何晉楚之智而齊秦之愚也晉楚合必議齊秦齊秦合必圖晉楚請以此決事秦王曰諾於是齊遂伐宋宋王出亡死於溫齊南割楚之淮北西侵三晉欲以并周室為天子泗上諸侯鄒魯之君皆稱臣諸侯恐懼三十九年秦來伐拔我列城九四十年燕秦楚三晉合謀各出鋭師以伐敗我濟西王解而却燕將樂毅遂入臨淄盡取齊之寶藏器湣王出亡之衛衛君辟宫舍之稱臣而共具湣王不遜衛人侵之湣王去走鄒魯有驕色鄒魯君弗內遂走莒楚使淖齒將兵救齊因相齊湣王淖齒遂殺湣王而與燕共分齊之侵地寶器湣王遇殺其子法章變名姓為莒太史敫家庸太史敫女竒法章狀貌以為非恆人憐而常竊衣食之而與私通焉淖齒既以去莒莒中人及齊亡臣相聚求湣王子欲立之法章懼其誅已也久之乃敢自言我湣王子也於是莒人共立法章是為襄王以保莒城而布告齊國中王已立在莒矣襄王既立立太史氏女為王后是為君王后生子建太史敫曰女不取媒因自嫁非吾種也汙吾世終身不覩君王后君王后賢不以不覩故失人子之禮襄王在莒五年田單以即墨攻破燕軍迎襄王於莒入臨淄齊故地盡復屬齊齊封田單為安平君十四年秦擊我剛夀十九年襄王卒子建立王建立六年秦攻趙齊楚救之秦計曰齊楚救趙親則退兵不親遂攻之趙無食請粟於齊齊不聽周子曰不如聽之以退秦兵不聽則秦兵不却是秦之計中而齊楚之計過也且趙之於齊楚扞蔽也猶齒之有脣也脣亡則齒寒今日亡趙明日患及齊楚且救趙之務宜若奉漏甕沃焦釡也夫救趙高義也却秦兵顯名也義救亡國威却強秦之兵不務為此而務愛粟為國計者過矣齊王弗聽秦破趙於長平四十餘萬遂圍邯鄲十六年秦滅周君王后卒二十三年秦置東郡二十八年王入朝秦秦王政置酒咸陽三十五年秦滅韓三十七年秦滅趙三十八年燕使荆軻刺秦王秦王覺殺軻明年秦破燕燕王亡走遼東明年秦滅魏秦兵次於歷下四十二年秦滅楚明年虜代王嘉滅燕王喜四十四年秦兵擊齊齊王聽相后勝計不戰以兵降秦秦虜王建遷之共遂滅齊為郡天下一并於秦秦王政立號為皇帝始君王后賢事秦謹與諸侯信齊亦東邊海上秦日夜攻三晉燕楚五國各自救於秦以故王建立四十餘年不受兵君王后死后勝相齊多受秦間金多使賔客入秦秦又多豫金客皆為反間勸王王從朝秦不修攻戰之備不助五國攻秦秦以故得滅五國五國已亡秦兵卒入臨淄民莫敢格者王建遂降遷於共故齊人怨王建不蚤與諸侯合從攻秦聽姦臣賔客以亡其國歌之曰松邪柏邪住建共者客邪疾建用客之不詳也通志卷第八十七
