body:
  text: 通志卷十六宋右迪功郎鄭樵漁仲撰北齊紀第十六神武帝文襄帝文宣帝濟南王孝昭帝武成帝後主幼主附高祖神武皇帝姓高氏諱歡字賀六渾勃海蓨人也齊大夫高氏之後漢永平中有高洪為勃海太守因家焉六世祖隱晉元莵太守隱生慶慶生泰泰生湖三世仕慕容氏及慕容寶敗國亂湖率衆歸魏為右將軍湖生四子第三子謐仕魏位至治書侍御史坐法徙居懷朔鎮謐生皇考樹樹性通率不事家業住居白道南數有赤光紫氣之異鄰人以為怪勸徙居以避之皇考曰安知非吉居之自若及神武生而皇妣韓氏殂養於同産姊壻鎮獄隊尉景家神武既纍世北邊故習其俗遂同鮮卑長而深沈有大度輕財重士為豪俠所宗目有精光長頭高權齒白如玉少有人傑表家貧及聘武明皇后始有馬得給鎮為隊主鎮將遼西假長常竒神武貌謂曰君有康濟才終不徒然便以子孫為託及貴追贈長司空擢其子寧而用之神武自隊主轉為函使嘗乘驛過建興雲霧晝晦雷聲隨之半日乃絶若有神應者每行道路往來無風塵之色又嘗夢履衆星而行覺而內喜為函使六年每至洛陽給令史麻祥使祥嘗以肉啖神武神武性不立食坐而進之祥以為慢已笞神武四十及自洛陽還傾産以結客親故怪問之答曰吾至洛陽宿衛羽林相率焚領軍張彛宅朝廷懼其亂而不問為政若此事可知矣財物豈可常守邪自是乃有澄清天下之志與懷朔省事雲中司馬子如及秀容人劉貴中山人賈顯智為奔走之友懷朔户曹史孫騰外兵史侯景亦相友結劉貴嘗得一白鷹與神武及尉景蔡雋子如賈顯智等獵於沃野見一赤每摶輒逸遂至逈澤澤中有茅屋將奔入有狗自屋中出噬之鷹俱死神武怒以鳴鏑射之狗斃屋中乃有二人出持神武襟甚急其母兩目盲曵杖呵其二子曰何故觸大家出甕中酒烹羊以待客因自言善暗相遍捫諸人語顯智云君後當至卿佐要不以善終語子如劉貴云並至台相次及神武曰諸君榮貴皆由此人食畢而去行數里還更訪之則本無人居乃知向非人也由是諸人益加敬異孝昌元年柔元鎮人杜洛周反於上谷神武乃與同志從之醜其行事私與尉景假榮蔡雋圖之不果而逃為其騎所追文襄及魏永熙后皆幼武明后於牛上抱負之文襄屢落牛神武彎弓將射之以決去后呼榮求救賴榮透下取之以免遂奔葛榮又亡歸爾朱榮於秀容先是劉貴事榮盛言神武美至是始得見以憔悴故未之竒也貴乃為神武更衣復求見焉因隨榮之廄廄有惡馬榮命翦之神武乃不加羈絆而翦竟不蹄齧已而起曰御惡人亦如此馬矣榮遂坐神武於牀下屏左右而訪時事神武曰聞公有馬十二谷色别為羣將此竟何用也榮曰但言爾意神武曰方今天子愚弱太后淫亂孽寵擅用朝政不行以明公雄武乘時奮發討鄭儼徐紇而清帝側霸業可舉鞭而成此賀六渾之意也榮大悅語自日中至夜半乃出自是每參軍謀後從榮徙據并州抵揚州邑人龐蒼鷹止團焦中每從外歸主人遙聞行響動地蒼鷹母數見團焦上赤氣赫然屬天又蒼鷹嘗夜欲入有青衣人拔刀叱曰何故觸王言訖不見始以為異密覘之惟見赤蛇蟠牀上乃益驚異因殺牛分肉厚以相奉蒼鷹母求以神武為義子及得志以其宅為第號為南宅雖門巷開廣堂宇崇麗其本所住團焦以石堊塗之留而不毁至文宣時遂為宮既而榮以神武為親信都督于時魏明帝銜鄭儼徐紇逼靈太后未敢制私使榮舉兵內向榮以神武為前鋒至上黨明帝又私詔停之及帝暴崩榮遂入洛因將篡位神武諫恐不聽請鑄像卜之鑄不成乃止孝莊帝立以定策勳封銅鞮伯及爾朱榮擊葛榮令神武喻下賊别稱王者七人後與行臺于暉破羊侃于太山尋與元天穆破邢杲于濟南纍遷第三鎮人酋長嘗在榮帳內榮嘗問左右曰一日無我誰可主軍皆稱爾朱兆曰此正可統三千騎以還堪代我主衆者唯賀六渾耳因誡兆曰爾非其匹終當為此子穿鼻乃以神武為晉州刺史於是大聚斂因劉貴貨榮下要人盡得其意時州庫角無故自鳴神武異之無幾而孝莊誅榮及爾朱兆自晉陽將舉兵赴洛召神武神武使長史孫騰辭以絳蜀汾胡欲反不可委去兆恨焉騰復命神武曰兆舉兵犯上此大賊也吾不能久事之自是始有圖兆計及兆入洛執莊帝以北神武聞之大驚又使孫騰偽賀兆因密覘孝莊所在將劫以舉義不果乃以書喻之言不宜執天子以受惡名於海內兆不納弒帝而與爾朱世隆等立長廣王曄改元建明封神武為平陽郡公及費也頭紇豆陵步藩入秀容逼晉陽兆徴神武神武將往賀拔焉過兒請緩行以敝之神武乃往往逗留辭以河無橋不得渡步藩軍盛兆敗走初孝莊之誅爾朱榮知其黨必有逆謀乃密勑步藩令襲其後步藩既敗兆等遂兵勢日盛兆又請救於神武神武內圖兆復慮步藩後日難除乃與兆悉力破之藩死兆深德神武誓為兄弟時世隆度律彥伯共執朝政天光據關右兆據并州仲逺據東郡各擁兵為暴天下苦之葛榮衆流入并肆者二十餘萬為契丹陵暴皆不聊生大小二十六反誅夷者半猶草竊不止兆患之問計於神武神武曰六鎮反殘不可盡殺宜選王素腹心者私使統焉若有犯者罪其帥則所罪者寡兆曰善誰可行也賀拔允時在坐請神武神武拳毆之折其一齒曰生平天柱時奴輩伏處分如鷹犬今日天下安置在王而阿鞠泥敢誣下罔上請殺之兆以神武為誠遂以委焉神武以兆醉恐醒後或致疑二遂出宣言受委統州鎮兵可集汾東受令乃建牙楊曲川陳部分有欵軍門者絳巾袍自稱梗楊驛子願厠左右訪之則以力聞嘗於并州市搭殺人者乃署為親信都督兵士素惡兆而樂神武於是莫不皆至居無何又使劉貴請兆以并肆頻歲霜旱降户掘黃鼠而食之皆靣無穀色徒汚人國土請令就食山東待溫飽而處分之兆從其議其長史慕容紹宗諫曰不可今四方擾擾人懷異望况高公雄略又握大兵將為不利兆曰香火重誓何所慮邪紹宗曰親兄弟尚難信何論香火時兆左右已受神武金因譖紹宗與神武舊隙兆乃禁紹宗而催神武發神武乃自晉陽出滏口路逢爾朱榮妻北鄉郡長公主自洛陽來有馬三百匹盡奪易之兆聞乃釋紹宗而問焉紹宗曰今猶掌握中物也兆於是自追神武至襄垣會漳水暴長橋壞神武隔水拜曰所以借公主馬非有他故備山東盜耳王受公主言自來賜追今渡河而死不辭但恐此衆便叛兆自陳無此意因輕馬浮渡與神武坐幕下陳謝遂授刀引頭使神武斫已神武大哭曰自天柱薨背賀六渾更何所仰願大家千萬歲以申力用今旁人構間至此大家何忍復出此兆投刀於地遂刑白馬而盟誓為兄弟留宿夜飲尉景伏壯士欲執兆神武齧臂止之曰今殺之其黨必奔歸聚結兵飢馬瘦不可相支若英雄崛起則為害滋甚不如且置之兆雖徑捷而凶狡無謀不足圖也旦日兆歸營又召神武神武將上馬詣之孫騰牽衣乃止兆隔水肆罵馳還晉陽兆心腹念賢領降户家纍别為營神武偽與之善觀其佩刀因取以殺之其從者盡散於是士衆咸悅俱願附從初魏太平真君中內學者奏言上黨有天子氣云在壺關大王山太武帝於是南巡以厭當之纍石為三封斬其北鳳皇山以毁其形後上黨人居晉陽號上黨坊神武實居之及是行舍大王山六旬而進將出滏口倍加約束纎毫之物不聽侵犯將過麥地神武輒步牽馬逺近聞之皆稱高儀同將兵整肅益歸心焉遂前行屯鄴北求糧於相州刺史劉誕誕不供有軍營租米神武自取之魏普泰元年二月神武軍次信都高乾封隆之開門以待遂據冀州是月爾朱度律廢元曄而立節閔帝欲羈縻神武三月乃白節閔帝封神武為渤海王徴使入覲神武辭四月癸巳又加授東道大行臺第一鎮人酋長龎蒼鷹自太原來奔神武以為行臺郎尋以為安州刺史神武自向山東養士繕甲禁兵侵掠百姓歸心乃詐為書言爾朱兆將以六鎮人配契胡為部曲衆皆愁又為并州符徴兵討步落稽發萬人將遣之孫騰尉景偽請留五日如此者再神武親送之郊雪涕執别人號慟哭聲動地神武乃喻之曰與爾俱失鄉客義同一家不意在上乃爾徴召直向西已當死後軍期又當死配國人又當死奈何衆曰唯有反耳神武曰反是急計須推一人為主衆願奉神武神武曰爾鄉里難制不見葛榮乎雖百萬衆無刑法終自灰滅今以吾為主當與前異不得欺漢兒不得犯軍令生死任吾則可不爾不能為取笑天下衆皆頓顙曰死生唯命神武陽若不得已明日椎牛饗士喻以討爾朱兆之意封隆之進曰千載一時普天幸甚神武曰討賊大順也拯時大業也吾雖不武以死繼之何敢讓焉六月庚子建義於信都尚未顯背爾朱氏及李元忠與高乾平殷州斬爾朱羽生首來謁神武撫膺曰今日反決矣乃以元忠為殷州刺史是時兵威既振乃抗表罪狀爾朱氏世隆等祕表不通八月爾朱兆攻陷殷州李元忠來奔孫騰以為朝廷隔絶不權立天子則衆望無所繫十月壬寅奉章武王融子勃海太守朗為皇帝年號中興是為廢帝時度律仲逺軍次晉陽爾朱兆會之神武用竇泰策縱反間度律仲逺不戰而還神武乃敗兆於廣阿十一月攻鄴相州刺史劉誕嬰城固守神武起土山為地道往建大柱一時焚之城陷入地麻祥時為湯隂令神武呼之曰麻都祥慙而逃永熙元年正月壬午拔鄴城據之廢帝進神武大丞相柱國大將軍太師是時青州建義大都督崔靈珍大都督耿翔皆遣使歸附行汾州事劉貴棄城來降閏三月爾朱天光自長安兆自并州度律自洛陽仲逺自東郡同會鄴衆號二十萬夾洹水而軍節閔以長孫承業為大行臺總督焉神武令封隆之守鄴自出頓紫陌時馬不滿二千步兵不至三萬衆寡不敵乃於韓陵為圓陳連牛驢以塞歸道於是將士皆為死志四靣赴擊之爾朱兆責神武以背已神武曰本戮力者共輔王室今帝何在兆曰永安枉害天柱我報讐耳神武曰我昔日親聞天柱計汝在户前立豈得言不反邪且以君殺臣何報之有今日義絶矣乃合戰大敗之爾朱兆對慕容紹宗叩心曰不用公言至此將輕走紹宗反旗鳴角收聚散卒成軍容而西上高季式以七騎追奔度野馬岡與兆遇高昻望之不見哭曰喪吾弟矣夜久季式還血滿袖斛斯椿倍道先據河橋初普泰元年十月歲星熒惑鎮星太白聚於觜參色甚明太史占云當有王者興是時神武起於信都至是而破兆等四月斛斯椿執天光度律以送洛陽長孫承業遣都督賈顯智張歡入洛陽執世隆彥伯斬之兆奔并州仲逺奔梁州遂死焉時凶蠧既除朝廷慶悅初未戰之前月章武人張紹夜中忽被數騎將踰城至一大將軍前勑紹為軍導向鄴云佐受命者除殘賊紹回視之兵不可測整疾無聲將至鄴乃放焉及戰之日爾朱氏軍人見陳外士馬四合蓋神助也既而神武至洛陽廢節閔及中興主而立孝武帝孝武既即位授神武大丞相天柱大將軍太師世襲定州刺史增封并前十五萬户神武辭天柱減户五萬壬辰還鄴魏帝餞於乾脯山執手而别七月壬寅神武帥師北伐爾朱兆封隆之言侍中斛斯椿賀拔勝賈顯智等往事爾朱普皆反噬今在京師寵任必構禍隙神武深以為然乃歸天光度律於京師斬之遂自滏口入爾朱兆大掠晉陽北保秀容并州平神武以晉陽四塞乃建大丞相府而定居焉爾朱兆既至秀容分兵守險出入寇抄神武揚聲討之師出止者數四兆意怠神武揣其歲首當宴會遣竇泰以精騎馳之一日一夜行三百里神武以大軍繼之二年正月竇泰奄至爾朱兆庭軍人因宴休惰忽見泰軍驚走追破之於赤洪嶺兆自縊神武親臨厚葬之慕容紹宗以爾朱榮妻子及餘衆自保焉突城降神武以義故待之甚厚神武之入洛也爾朱仲逺部下都督橋寧張子期自滑臺歸命神武以其助亂且數反覆皆斬之斛斯椿由是內不自安乃與南陽王寶炬及武衛將軍元毗魏光祿王思政構神武於魏帝舍人元士弼又奏神武受勑大不敬故魏帝心二於賀拔嶽初孝明之時洛下以兩拔相擊謠言銅拔打鐵拔元家世將末好事者以二拔謂拓拔賀拔言俱將衰敗之兆時司空高乾密啓神武言魏帝之二神武封呈魏帝殺之又遣東徐州刺史潘紹業密勑長樂太守龐蒼鷹令殺其弟昻昻先聞其兄死以矟刺柱伏壯士執紹業於路得勑書於袍領遂來奔神武抱其首哭曰天子枉害司空遽使以白虎幡勞其家屬時乾次弟愼在光州為政嚴猛又縱部下取納魏帝使代之愼聞難將奔梁其屬曰公家勳重必不兄弟相及乃弊衣推鹿車歸勃海逢使者亦來奔於是魏帝與神武隙矣阿至羅虜正光以前常稱藩自魏朝多事皆叛神武遣使招納便欵附先是詔以寇賊平罷行臺至是以殊俗歸降復授神武大行臺隨機處分神武賚其粟帛議者以為徒費無益神武不從撫慰如初其酋帥吐陳等感恩皆從指麾救曹泥取万俟受洛干大收其用河西費也頭虜紇豆陵伊利居苦池河恃險擁衆神武遣長史侯景屢招不從天平元年正月壬辰神武西伐費也頭虜紇豆陵伊利於河西滅之遷其部落於河東二月永寧寺九層浮屠災既而人有從東萊至云及海上人咸見之於海中俄而霧起乃滅説者以為天意若曰永寧見災魏不寧矣飛入東海勃海應矣魏帝既有異圖時侍中封隆之與孫騰私言隆之喪妻魏帝欲妻以從妹騰亦未之信心害隆之泄其言於斛斯椿椿以白魏帝又孫騰帶仗入省擅殺御史並亡來奔稱魏帝撾舍人梁續於前光祿少卿元子幹攘臂擊之謂騰曰語爾高王元家兒拳正如此領軍婁昭辭疾歸晉陽魏帝於是以斛斯椿兼領軍分置督將及河南關西諸刺史華山王鷙在徐州神武使邸珍奪其管籥建州刺史韓賢濟州刺史蔡俊皆神武同義魏帝忌之故省建州以去賢使御史中尉綦俊察俊罪以開府賈顯智為濟州俊拒之魏帝愈怒五月下詔云將征句吳發河南諸州兵增宿衛守河橋六月丁巳密詔神武曰宇文黑獺自平破秦隴多求非分脫有變非常事資經略但表啓未全背戾進討事涉匆匆遂召羣臣議其可否僉言假稱南伐內外戒嚴一則防黑獺不虞二則可威吳楚時魏帝將伐神武神武部署將帥帝慮疑故有此詔神武乃表曰荆州綰接蠻右密邇畿服關隴恃逺將有逆圖臣今潛勒兵馬三萬擬從河東而渡又遣桓州刺史庫狄干瀛州刺史郭瓊汾州刺史斛律金前武衛大將軍彭樂擬兵四萬從其來違津渡遣領軍將軍婁昭相州刺史竇泰前瀛州刺史堯雄并州刺史高隆之擬兵五萬以討荆州遣冀州刺史尉景前冀州刺史高敖曹濟州刺史蔡俊前侍中封隆之擬山東兵七萬突騎五萬以征江左皆約勒所部伏聽處分魏帝知覺其變乃出神武表命羣臣議之欲止神武諸軍神武乃集在并僚佐令其博議還以表聞仍以信誓自明忠欵曰臣為嬖佞所間陛下一旦賜疑使幽枉之情無所自明臣若不盡誠竭節敢負陛下則使身受天殃子孫殄絶陛下若垂信赤心使干戈不動佞臣一二人願斟量廢出辛未帝復録在京文武議意以答神武使舍人溫子升草勑子升逡巡未敢作帝據胡牀拔劒作色子升乃為勑曰前持心血逺以示王深冀彼此共相體悉而不良之徒坐生間二近孫騰倉卒向彼致使聞者疑有異謀故遣御史中尉綦俊具申朕懷今得王啓言誓懇惻反覆思之猶所未解以朕眇身遇王武略不勞尺刃坐為天子所謂生我者父母貴我者高王今若無事背王規相攻討則使身及子孫還如王誓皇天后土實聞此言近慮宇文為亂賀拔勝應之故纂嚴欲與王俱為聲援宇文今日使者相望觀其所為更無異迹賀拔在南開拓邊境為國立功念無可責君若欲分討何以為辭東南不賔為日已久先朝已來置之度外今天下户口減半未宜窮兵極武朕既暗昧不知佞人是誰可列其姓名令朕知也如聞庫狄干語王云本欲取懦弱者為主無事立此長君使其不可駕御今但作十五日行自可廢之更立餘者如此議論自是王間勳人豈出佞臣之口去歲封隆之背叛今年孫騰逃走不罪不送誰不怪王騰既為禍始曾無愧懼王若事君盡誠何不斬送二首王雖啓圖西去而四道俱進或欲南度洛陽或欲東臨江左言之者猶應自怪聞之者寧能不疑王若守誠不二晏然居北在此雖有百萬之衆終無圖彼之心王脫信邪棄義舉旗南指縱無匹馬隻輪猶欲奮空拳而爭死朕本寡德王已立之百姓無知或謂實可若為他所圖則彰朕之惡假令還為王殺幽辱韲粉了無遺恨何者王既以德見推以義見舉一朝背德舍義便是過有所歸本望君臣一體若合符契不圖今日分疏到此古語云越人射我笑而道之吾兄射我泣而道之朕既親王情如兄弟所以投筆拊膺不覺㱆欷初神武自京師將北以為洛陽久經喪亂王氣衰盡雖有山河之固土地褊狹不如鄴請遷都魏帝曰高祖定鼎河洛為永永之基經營制度至世宗乃畢王既功在社稷宜遵太和舊事神武奉詔至是復謀焉遣三千騎鎮建興益河東及濟州兵於白溝禁船不聽向洛諸州和糴粟運入鄴城魏帝又勑神武曰王若厭伏人情杜絶物議唯有歸河東之兵罷建興之戍送相州之粟追濟州之軍令蔡俊受代使邸珍出徐止戈散馬各事家業脫須糧廩别遣轉輸則讒人結舌疑悔不生王高枕太原朕垂拱京洛終不舉足渡河以干戈相詣王若馬首南向問鼎輕重朕雖無武欲止不能必為社稷宗廟出萬死之策決在於王非朕能定為山止簣相為惜之魏帝時以任祥為兼尚書左僕射加開府祥棄官走至河北據郡待神武魏帝乃勑文武官北來者任去留下詔罪狀神武為北伐經營神武亦勒馬先告曰孤遇爾朱擅權舉大義於四海奉戴主上義貫幽明橫為斛斯椿讒構以誠節為逆首昔趙鞅興晉陽之甲誅君側惡人今者南邁誅椿而已以高昻為前鋒曰若用司空言豈有今日之舉司馬子如答神武曰本欲立小者正為此耳魏帝徴兵關右召賀拔勝赴行在所遣大行臺長孫承業大都督潁川王斌之斛斯椿共鎮虎牢汝陽王暹鎮石濟行臺長孫子彥帥前恆農太守元洪略鎮陜賈顯智率豫州刺史斛斯元壽伐蔡俊神武使竇泰與左廂大都督莫多婁貸文逆顯智韓賢逆暹元壽軍降泰貸文與顯智遇於長壽津顯智隂納降引軍退軍司元元覺之馳還請益師魏帝遣大都督侯幾紹赴之戰於滑臺東顯智以軍降紹死之七月魏帝躬率大衆屯河橋神武至河北十餘里再遣口申誠款魏帝不報神武乃引軍渡河魏帝問計於羣臣或云南依賀拔勝或云西就關中或云守洛口死戰未決而元斌之與斛斯椿爭權不睦斌之棄椿徑還紿帝云神武兵至即日魏帝遜於長安己酉神武入洛停於永寧寺八月甲寅召集百官謂曰為臣奉主匡救危亂若處不諫爭出不陪隨緩則耽寵爭榮急便竄失臣節安在遂收開府儀同三司叱列延慶兼尚書左僕射辛雄兼吏部尚書崔孝芬都官尚書劉廞兼度支尚書楊機散騎常侍元士弼並殺之誅其二也士弼籍沒家口神武以萬機不可曠廢乃與百僚議以清河王亶為大司馬居尚書下舍而承制決事焉王稱警蹕神武醜之神武尋至𢎞農遂西克潼關執毛洪賔進軍長城龍門都督薛崇禮降神武退舍河東命行臺尚書長史薛瑜守潼關大都督庫狄溫守封陵於蒲津西岸築城守華州以薛紹宗為刺史高昻行豫州事神武自發晉陽至此凡四十啓魏帝皆不答九月庚寅神武還至洛陽乃遣僧道榮奉表關中又不答乃集百僚沙門耆老議所推立以為自孝昌衰亂國統中絶神主靡依昭穆失序永安以孝文為伯考永熙遷孝明於夾室業喪祚短職此之由遂議立清河王世子善見議定白清河王王曰天子無父茍使兒立不惜餘生乃立之是為孝靜帝魏於是始分為二神武以孝武既西恐逼崤陜洛陽復在河外接近梁境如向晉陽形勢不能相接依議遷鄴護軍祖瑩贊焉詔下三日車駕便發户四十萬狼狽就道神武留洛陽部分事畢還晉陽自是軍國政務皆歸相府先是童謡曰可憐青雀子飛來鄴城裏羽翮垂欲成化作鸚鵡子好事者竊言雀子謂魏帝清河王鸚鵡謂神武也初孝昌中山胡劉蠡升自稱天子年號神嘉居雲陽谷西土歲被其寇謂之胡荒二年正月西魏渭州刺史可朱渾道元擁衆內屬神武迎納之壬戌神武襲擊劉蠡升大破之己巳魏帝褒詔以神武為相國假黃鉞劒履上殿入朝不趨神武固辭三月神武欲以女妻蠡升太子候其不設備辛酉潛師襲之其北部王斬蠡升首以送其衆復立其子南海王神武進擊之又獲南海王及其弟西海王北海王皇后公卿已下四百餘人胡魏五萬户壬申神武朝于鄴四月神武請給遷人稟各有差九月甲寅神武以州郡縣官多乖法請出使問民疾苦三年正月甲子神武帥庫狄干等萬騎襲西魏夏州身不火食四日而至縛矟為梯夜入其城擒其刺史費也頭斛拔俄彌突因而用之留都督張瓊以鎮守遷其部落五千户以歸西魏靈州刺史曹泥與其壻涼州刺史劉豐遣使請內屬宇文泰圍泥水灌其城不沒者四尺神武命阿至羅發騎三萬徑度靈州繞出西軍後獲馬五十匹西師乃退神武率騎迎泥豐遂拔其遺户五千以歸復泥官爵魏帝詔加神武九錫固讓乃止二月神武令阿至羅逼西魏秦州刺史建忠王万俟普撥神武以衆應之六月甲午普撥與其子太宰壽命于豳州刺史叱干寶樂右衛將軍破六韓常及督將三百餘人擁部來降八月丁亥神武請均斗尺班於天下九月辛亥汾州胡王迢觸曹二龍聚衆反署立百官年號平都神武討平之十二月丁丑神武自晉陽西討遣兼僕射行臺汝陽王暹司徒高昻等趣上洛大都督竇泰入自潼關四年正月癸丑竇泰軍敗自殺神武軍次蒲津以冰薄不得赴救乃班師高昻攻克上洛二月乙酉神武以并肆汾建晉東雍南汾秦陜九州霜旱人飢流散請所在開倉賑給六月壬申神武如天池獲瑞石隱起成文曰六王三川十一月壬辰神武西討自蒲津濟衆二十萬宇文泰軍於沙苑神武以地厄少却西人鼓躁而進軍大亂棄器甲十有八萬神武跨橐駝候船以歸元象元年三月辛酉神武固請解丞相魏帝許之四月庚寅神武朝于鄴壬辰還晉陽請開酒禁并賑恤宿衛武官七月壬午行臺侯景司徒高昻圍西魏將獨孤信於金墉西魏帝及宇文泰并來赴救大都督庫狄干帥諸將前驅神武總衆繼進八月辛卯戰於河隂大破西魏軍俘獲數萬司徒高昻大都督李猛宗顯死之西師之敗獨孤信先入關宇文泰留其都督長孫子彥守金墉遂燒營以遁神武遣兵追奔至崤不及而還初神武知西師來侵自晉陽率衆馳赴至孟津未濟而軍有勝負既而神武渡河子彥亦棄城走神武遂毁金墉而還十一月庚午神武朝於京師十二月壬辰還晉陽興和元年七月丁丑魏帝進神武為相國録尚書事固讓乃止十一月乙丑神武以新宮成朝於鄴魏帝與神武宴射神武降階下稱賀又辭渤海王及都督中外諸軍事詔不許十二月戊戌神武還晉陽二年十二月阿至羅别部遣使請降神武帥衆迎之出武州塞不見大獵而還三年五月神武巡北境使使與蠕蠕和四年五月辛巳神武朝于鄴請令百官每月面敷政事明揚仄陋納諫屏邪親理獄訟褒黜勤怠牧守有愆節級相坐椒掖之內進御以序後園鷹犬悉皆棄之六月甲辰神武還晉陽九月神武西征十月己亥圍西魏儀同三司王思政於玉壁城欲以致敵西師不敢出十一月癸未神武以大雪士卒多死乃班師武定元年二月壬申北豫州刺史高愼據虎牢西叛三月壬辰宇文泰率衆援高愼圍河橋南城戊申神武大敗之於芒山擒西魏督將以下四百餘人俘斬六萬計是時軍士有盜殺驢者軍令應死神武弗殺將至并州決之明日復戰奔西軍告神武所在西師盡鋭來攻衆潰神武失馬赫連陽順下馬以授神武與蒼頭馮文洛扶上馬俱走從者步騎六七人追騎至親信都督尉興慶曰王去矣興慶腰邊百箭足殺百人神武勉之曰事濟以爾為懷州若死則用爾子興慶曰兒小願用兄許之興慶鬭矢盡而死西魏太師賀拔勝以十三騎逐神武河州刺史劉洪徽射中其二勝矟將中神武假孝先橫射勝馬殪遂免豫洛二州平神武使劉豐追奔徇地至恆農而還七月神武貽宇文泰書責以殺孝武之罪八月辛未魏帝詔神武為相國録尚書事大行臺餘如故固辭乃止是月神武命於肆州北山築城西自馬陵戍東至土隥四十日罷十二月己卯神武朝於京師庚辰還晉陽二年三月癸巳神武巡行冀定二州因朝京師以冬春亢旱請蠲縣責賑窮乏宥死罪以下又請授老人板職各有差四月丙辰神武還晉陽十一月神武討山胡破平之俘獲一萬餘户令配諸州三年正月甲午開府儀同三司爾朱文暢開府司馬任胄都督鄭仲禮中府主簿李世林前開府參軍房子逺等謀殺神武因十五日夜打簇懷刃而入其黨薛季孝以告並伏誅丁未神武請於并州置晉陽宫以處配口三月乙未神武朝鄴丙午還晉陽十月丁卯神武上言幽安定三州北接奚蠕蠕請於險要修立城戍以防之躬自臨履莫不嚴固己未神武請釋芒山俘桎梏配以人間寡婦四年八月癸巳神武將西伐自鄴會兵於晉陽殿中將軍曹魏祖曰不可今八月西方王以死氣逆生氣為客不利主人則可兵果行傷大將神武不從自東西魏構兵鄴下每先有黃黑蟻陳鬭占者以為黃者東魏戎衣色黑者西魏戎衣色人間以此候勝負是時黃蟻盡死九月神武圍玉壁以挑西師西師不敢應西魏晉州刺史韋孝寬守玉壁城中出鐵面神武使元盜射之每中其目用李業興孤虛術萃其北北天險也乃起土山鑿十道又於東面鑿二十一道以攻之城中無水汲於汾神武使移汾一夜而畢孝寬奪據土山頓軍五旬城不拔死者七萬人聚為一冢有星墜於神武營衆驢並鳴士皆讋懼神武有疾十一月庚子輿疾班師庚戌遣太原公洋鎮鄴辛亥徴世子澄至晉陽有惡鳥集於亭樹世子使斛律光射殺之己卯神武以無功表解都督中外諸軍事魏帝優詔許焉是時西魏言神武中弩神武聞之乃勉坐見諸貴使斛律金敕勒歌神武自和之哀感流涕侯景素輕世子嘗謂司馬子如曰王在吾不敢有異王無吾不能與鮮卑小兒共事子如掩其口至是世子為神武書召景景先與神武約得書書有微點乃來書至無點景不至又聞神武疾遂擁兵自固神武謂世子曰我雖疾爾面更有餘憂色何也世子未對又問曰豈非憂侯景叛邪曰然神武曰景專制河南十四年矣常有飛揚跋扈志顧我能養豈為汝駕御也今四方未定勿遽發哀庫狄干鮮卑老公斛律金勑勒老公並性遒直終不負汝可朱渾道元劉豐生逺來投我必無異心賀拔焉過兒朴實無罪過潘相樂今本作道人心和厚汝兄弟當得其力韓軌少戇宜寬借之彭相樂心腹難得宜防護之少堪敵侯景者唯有慕容紹宗我故不貴之留以與汝宜深加殊禮委以經略五年正月朔日蝕神武曰日蝕其為我邪死亦何恨丙午陳啓於魏帝是日崩於晉陽時年五十二祕不發喪六月壬午魏帝於東堂舉哀三日制緦縗詔凶禮依漢大將軍霍光東平王蒼故事贈假黃鉞使持節相國都督中外諸軍事齊王璽紱轀輬車黃屋左纛前後羽葆鼓吹輕車介士兼備九錫殊禮諡獻武王八月甲申葬於鄴西北漳水之西魏帝臨送於紫陌天保初追崇為獻武帝廟號太祖陵曰義平天統元年改諡神武皇帝廟號高祖神武性深密高岸終日儼然人不能測機權之際變化若神至於軍國大略獨運懷抱文武將吏罕有預之經馭軍衆法令嚴肅臨敵制勝策出無方聽斷昭察不可欺犯知人好士全護勳舊性周給每有文教常殷勤款悉指事論心不尚綺靡擢人授任在於得才茍其所堪乃至拔於厮養有虛聲無實者稀見任用諸將出討奉行方略罔不克捷違失指畫多致奔亡雅尚儉素刀劒鞍勒無金玉之飾少能劇飲自當大任不過三爵居家如官仁恕愛士始范陽盧景裕以明經稱魯郡韓毅以工書顯咸以謀逆見禽並蒙恩置之第館教授諸子其文武之士盡節所事見執獲而不罪者甚多故遐邇歸心皆思效力至南和梁國北懷蠕蠕吐谷渾阿至羅咸所招納獲其力用規略逺矣世宗文襄皇帝諱澄字子惠神武長子也母曰婁太后生而岐嶷神武異之魏中興元年立為渤海王世子就杜詢講學敏悟過人詢甚歎服二年加侍中開府儀同三司尚孝靜帝妹馮翊長公主時年十二神情俊爽便若成人神武試問以時事得失辨析無不中理自是軍國籌策皆預之天平元年加使持節尚書令大行臺并州刺史三年入輔朝政加領軍左右京畿大都督時人雖聞器識猶以少年期之而機略嚴明事無疑滯於是朝野震肅元象元年攝吏部尚書魏自崔亮以後選人常以年勞為制文襄乃釐改前式銓擢唯在得人又沙汰尚書郎妙選人地以充之至於才名之士咸被薦擢假有未居顯位者皆致之門下以為賔客每山園遊宴必見招攜執射賦詩各盡其所長以為娛適興和二年加大將軍領中書監仍攝吏部尚書自正光已後天下多事在任羣官亷潔者寡文襄乃奏吏部崔暹為御史中尉糾劾權豪無所縱捨於是風俗更始私枉路絶乃榜於街衢具論經國政術仍開直言之路有論事上書苦言切至者皆優容之武定四年十一月神武西討不豫班師文襄馳赴軍所侍衛還晉陽五年正月丙午神武崩祕不發喪辛亥司徒侯景據河南反潁川刺史司馬世雲以城應之景誘執豫州刺史高元成襄州刺史李密廣州刺史暴顯等遣司空韓軌率衆討之四月壬申文襄朝于鄴六月己巳韓軌等自潁川班師丁丑文襄還晉陽乃發喪告喻文武陳神武遺志七月戊戌魏帝詔以文襄為使持節大丞相都督中外諸軍録尚書事大行臺勃海王文襄啓辭位願停王爵壬寅魏帝詔太原公洋攝理軍國遣中使敦喻八月戊辰文襄啓申神武遺令請減國邑分封將督各有差辛未朝于鄴固辭丞相魏帝詔曰既朝野攸馮安危所繫不得令遂本懷須有權奪可復前大將軍餘如故壬辰尚書祠部郎中元瑾梁降人茍濟長秋卿劉思逸及淮南王宣洪華山王大器濟北王徽等謀害文襄事發伏誅九月己亥文襄請舊勳灼然未蒙齒録者悉求旌賞朝士名行有聞或以年耆疾滿告謝者準其本秩授以州郡不得蒞事聽蔭子孫自天平元年以來遇事亡官者聽復本資豪貴之家不得占護山澤其第宇車服婚姻送葬奢僭無限者並令禁斷從太昌元年以來將帥有殊功異效者其子弟年十歲以上請聽依第出身其兵士從征身殞陳場者蠲其家租課若有藏器避世者以禮招致隨才擢敘罷營構之官在朝百司怠惰不勤有所曠廢者免所居官若清幹克濟皎然可知者即宜超敘不拘常式辛丑文襄還晉陽六年正月己未文襄朝于鄴二月己卯梁遣使慰文襄并請通和文襄許其和而不答書侯景之叛也南兖州刺史石長宣頗相影響諸州刺史守令佐史多被詿誤景破後悉被禽獲尚書咸處極刑文襄並請減降於是斬長宣其餘並從寬宥三月戊申文襄請朝臣及牧守令長各舉賢良及驍武膽略堪守邊城者務在得才不拘職素其稱事六品散官五品以上朝廷所悉不在舉限其稱事七品散官六品以下并及州郡縣雜白身不限在官解職並任舉之隨才進擢辛亥文襄南臨黎陽濟於虎牢自洛陽從太行而反晉陽於路遺書朝士以相戒厲於是朝野承風莫不震肅六月文襄巡北邊城戍振賜各有差七月乙卯文襄朝于鄴八月庚寅還晉陽使大行臺慕容紹宗與太尉高嶽大都督劉豐討王思政於潁川先是文襄遣行臺尚書辛術率諸將略江淮之北至是凡所獲二十三州七年四月甲辰魏帝進文襄位相國封齊王緑綟綬贊拜不名入朝不趨劒履上殿食冀州之勃海長樂安德武邑瀛州之河間五郡邑十五萬户使持節都督中外諸軍事録尚書大行臺並如故丁未文襄入朝固讓魏帝不許五月戊寅文襄帥師自鄴赴潁川六月丙申克潁川禽西魏大將軍王思政以忠於所事釋而待之七月文襄朝于鄴請魏帝立皇太子復辭爵位殊禮未報八月辛卯遇盜而崩初梁將蘭欽子京見虜文襄以配厨欽求贖之不許京再訴文襄使監厨蒼頭薛豐洛杖之曰更訴當殺汝京與其黨六人謀作亂時文襄將受魏禪與陳元康崔季舒屏左右謀於北城東柏堂太史啓言宰輔星甚微變不一月時京將進食文襄却之謂人曰昨夜夢死奴斫我又曰急殺却京聞之置刀於盤下冒言進食文襄見之怒曰我未索食何遽來京揮刀曰將殺汝文襄自投傷足入牀下賊黨至因見弒時年二十九祕不發喪明年正月辛酉魏帝舉哀於太極東堂詔贈物八萬假凶事依漢大將軍霍光東平王蒼故事贈假黃鉞使持節相國都督中外諸軍事齊王璽紱輼輬車黃屋左纛後部羽葆鼓吹輕車介士備九錫禮諡曰文襄王二月甲申葬於義平陵之北天保初追尊曰文襄皇帝廟號世宗陵曰峻成文襄美姿容善言笑談謔之際從容𢎞雅性聰警多籌策當朝作相聽斷如流愛士好賢待之以禮有神武之風焉然少壯氣猛嚴峻刑法高愼西叛侯景南翻非直本懷狼戻兼亦有懼威略情欲奢淫動乖制度嘗於宫西造宅牆院高廣廳事宏壯亞太極殿神武入朝責之乃止顯祖文宣皇帝諱洋字子進神武第二子文襄之母弟也武明太后初孕帝每夜有赤光照室太后私怪之及産命之曰侯尼干鮮卑言有相子也以生於晉陽一名晉陽樂時神武家徒壁立后與親姻相對共憂寒餒帝生始數月尚未能言歘然曰得活太后及左右大驚不敢言及長黑色大頰兌下鱗身重踝瞻視審定不好戲弄深沈有大度晉陽有沙門乍愚乍知時人不測呼為阿秃師太后見諸子焉歷問祿位至帝再三舉手指天而已口無所言見者異之神武嘗從諸子過鳯陽門有龍在上唯神武與帝見之內雖明敏貌若不足文襄每嗤之曰此人亦得富貴相法亦何由可解神武以帝貌陋神彩不甚發揚曾問以時事帝略有所辨儻語一事必得事𠂻又嘗令諸子各使理亂絲帝獨抽刀斬之曰亂者須斬神武以為然又各配兵四出而使彭樂率甲騎偽攻之文襄等怖撓帝勒衆與彭樂相格樂免胄言情猶禽之以獻由是神武稱異之謂長史薛琡曰此兒意識過吾琡亦私怪之幼時師事范陽盧景裕默識常過人未嘗有所自明景裕不能測也天平二年封太原郡公纍遷尚書左僕射後從文襄行過遼陽山獨見天門開餘無人見者武定五年神武崩猶祕凶事衆情疑駭帝雖內嬰巨痛外若平常人情頗安魏帝授帝尚書令中書監京畿大都督七年八月文襄遇賊帝在城東雙堂事出倉卒內外震駭帝神色不變指麾部分自臠斬羣賊而漆其首祕不發喪徐言奴反大將軍被傷無大苦也當時內外莫不驚異乃諷魏朝立皇太子因以大赦乃赴晉陽總庶政帝內雖明察外若不了老臣宿將皆輕帝於是帝推誠接下務從寬厚事有不便者咸蠲省焉羣情始服八年正月辛酉魏帝為文襄舉哀於東堂戊辰詔進帝位使持節丞相都督中外諸軍録尚書事大行臺齊郡王食邑一萬户三月庚申又進封齊王食冀州之勃海長樂安德武邑瀛州之河間五郡邑十萬户帝自居晉陽寢室每夜有光如晝既為王夢人以筆點已額旦日以語館客王曇晢曰吾其退乎曇晢拜賀曰王上加點為主當進也五月辛亥帝如鄴光州獲九尾狐以獻甲寅魏帝遣兼太尉彭城王韶司空潘相樂奉册進帝位相國總百揆以冀州之勃海長樂安德武邑瀛州之河間高陽章武定州之中山常山博陵十郡邑二十萬户加九錫殊禮齊王如故丙辰魏帝遜位别宮又使兼太尉彭城王韶兼司空敬顯俊奉册禪位致璽書於帝并奉皇帝璽綬禪代之禮一依唐虞漢魏故事帝纍表固辭詔不許於是尚書令高隆之率百寮勸進天保元年夏五月戊午皇帝即位於南郊升壇柴燎告天是日鄴下獲赤雀獻于郊所事畢還宮御太極前殿大赦改元百官進兩大階六州緣邊職人三大階自魏孝莊已後百官絶祿至是復給焉己未詔封魏帝為中山王追尊皇祖文穆王為文穆皇帝皇祖妣為文穆皇后皇考獻武王為獻武皇帝皇兄文襄王為文襄皇帝命有司議祖宗以聞辛酉尊王太后為皇太后乙酉降魏朝封爵各有差其信都從義及宣力霸朝者又西來人并武定六年以來南來投化者不在降限辛未遣大使於四方觀察風俗問民疾苦甲戌遷神主於太廟六月辛巳詔改封崇聖侯孔長為恭聖侯邑一百户以奉孔子祀并下魯郡以時修葺廟宇又詔吉凶車服制度各有等差具立條式使儉而獲中分遣使人致祭於五嶽四瀆其堯祠舜廟下及孔父老君等載於祀典者咸秩罔遺又詔冀州之勃海長樂二郡先帝始封之國義旗初起之地并州之太原青州之齊郡霸朝所在王命是基君子有作貴不忘本齊郡勃海可并復一年長樂復二年太原復三年壬午詔故太傅孫騰故太保尉景故大司馬婁昭故司徒高敖曹故尚書左僕射慕容紹宗故領軍万俟干故定州刺史假榮故御史中尉劉貴故御史中尉竇泰故殷州刺史劉豐故濟州刺史蔡俊等並左右先帝經贊皇基或不幸早殂或隕身王事可遣使者就墓致祭并撫問妻子又詔封宗室太尉高嶽為清河王太保高隆之為平原王開府儀同三司高歸彥為平秦王徐州刺史高思宗為上洛王營州刺史高長弼為廣武王兼武衛將軍高普為武興王兼武衛將軍高子瑗為平昌王兼北中郎將高顯國為襄樂王前太子庶子高睿為趙郡王揚州縣開國公高孝緒為修城王又詔封功臣太師庫狄干為章武王大司馬斛律金為咸陽王并州刺史賀拔仁為安定王殷州刺史韓軌為安德王瀛州刺史可朱渾道元為扶風王司徒公彭樂為陳留王司空公潘相樂為河東王癸未詔封諸弟青州刺史浚為永安王尚書左僕射淹為平陽王定州刺史浟為彭城王儀同三司演為常山王冀州刺史渙為上黨王儀同三司淯為襄城王儀同三司湛為長廣王湝為任城王湜為高陽王濟為博陵王凝為新平王潤為馮翊王洽為漢陽王丁亥詔立王子殷為皇太子王后李氏為皇后庚寅詔以太師庫狄干為太宰司徒彭樂為太尉司空潘相樂為司徒開府儀同三司司馬子如為司空己亥以皇太子初入東宮赦畿內及并州死罪已下降餘州死罪已下囚秋七月辛亥尊文襄妃元氏為文襄皇后宮曰靖德又封文襄子孝琬為河間王孝瑜為河南王乙卯以尚書令平原王封隆之為録尚書事尚書左僕射平陽王淹為尚書令改御史中尉還為中丞詔魏御府所有珍竒雜綵常所不給人者悉送內後園以供七日宴賜八月詔郡國修立黌宇敦述儒風其國子學生亦依舊銓補往者文襄皇帝所運蔡雍石經五十二枚移置學館依次修立又詔求直言正諫之士待以不次之命牧人之官廣勸農桑庚寅詔曰朕以虛薄嗣𢎞王業思所以贊揚盛績播之萬古雖史官執筆有聞無墜猶恐緒言遺美時或未書在位三公文武大小降及庶人爰至僧徒或親奉音旨或承傳旁説凡可載之文籍悉條封上甲午詔曰魏世議定麟趾格遂為通制官司施用猶未盡善羣官可更論討新令未成之間仍以舊格從事九月癸丑以領東夷校尉遼東郡開國公高麗王成為使持節侍中驃騎大將軍領護東夷校尉王公如故丁卯詔以梁侍中使持節假黃鉞都督中外諸軍事大將軍承制邵陵王蕭綸為梁王庚午幸晉陽是日皇太子入居涼風堂監國冬十月己卯法駕御金輅入晉陽宫朝皇太后於內殿辛巳曲赦并州太原郡晉陽縣及相國府四獄囚乙酉以特進元紹為尚書左僕射并州刺史假韶為右僕射壬辰罷相國府留騎兵外兵曹各立一省别掌機密十一月宇文泰帥師至陜城分騎北度至建州甲寅梁湘東王蕭繹遣使朝貢丙寅帝親戎出次城東宇文泰見軍容嚴盛歎曰高歡不死矣遂班師十二月辛丑車駕至自晉陽是歲高麗蠕蠕吐谷渾庫莫奚並遣使朝貢二年春正月丁未梁湘東王蕭繹遣使朝貢辛亥祀園丘以神武皇帝配癸亥親耕籍田乙丑享太廟二月壬辰太尉彭樂謀反伏誅三月丙午襄城王清薨己未詔梁承制湘東王繹為梁使持節假黃鉞相國建梁臺總百揆承制梁王庚申司空司馬子如坐事免是月梁交梁義新四州刺史各以地內附西魏文帝崩夏四月壬辰梁王蕭繹遣使朝貢六月庚午以前司空司馬子如為太尉秋七月己卯改顯陽殿還為昭陽殿辛卯改殷州為趙州以避太子之諱是月侯景廢梁簡文帝立蕭棟為主九月壬申免諸伎作屯牧雜色役𨽻之徒為白户癸巳行幸趙定二州因至晉陽冬十月戊申起宣光建始嘉福仁壽諸殿庚申蕭繹遣使朝貢丁卯文襄皇帝神主入于廟十一月侯景廢梁主棟僭即偽位於建鄴自稱曰漢十二月中山王殂是歲蠕蠕室韋髙麗並遣使朝貢三年春正月丙申帝親討庫莫奚於代郡大破之以其口配山東為百姓二月蠕蠕主阿那瓌為突厥所破瓌自殺其太子菴羅辰及瓌從弟登注俟刑登注子庫提並擁衆來奔蠕蠕餘衆立注次子鐡伐為主辛丑契丹遣使朝貢三月戊子詔清河王嶽司徒潘相樂行臺辛術帥師南伐癸巳詔進梁王蕭繹為梁主夏四月壬申東南道行臺辛術於廣陵送傳國八璽甲申以吏部尚書楊愔為尚書右僕射六月己亥清河王嶽等班師乙卯車駕幸晉陽冬十月乙未次黃櫨嶺仍從長城北至社于戍四百餘里立三十六戍十一月辛巳梁主蕭繹即位於江陵是為元帝遣使來聘十二月壬子車駕還宮戊午幸晉陽是歲西魏廢帝元年四年春正月丙子山胡圍離石戍帝親討之未至而逃因巡三堆戍大狩而旋戊寅庫莫奚遣使朝貢自魏末用永安錢又有數品皆輕濫己丑鑄新錢文曰常平五銖二月送蠕蠕鐵伐父登注及子庫提還北鐵伐尋為契丹所殺國人復立登注為主仍為其大人阿富提等所殺國人復立庫提為主夏四月車駕還宮戊午西南有大聲如雷五月庚午校獵於林慮山戊子還宮六月甲辰章武王庫狄干薨秋北巡冀定幽安仍北討契丹冬十月丁酉車駕至平州遂西道趣長塹甲辰帝步踰山嶺為士卒先指麾奮擊大破契丹是行也帝露頭袒身晝夜不息行千餘里唯食肉飲水氣色彌厲丁巳登碣石山臨滄海十一月己未帝自平州還遂如晉陽閏月壬寅梁人來聘十二月己未突厥復攻蠕蠕舉國來奔癸亥帝北討突厥迎納蠕蠕乃廢其主庫提立阿那瓌子菴羅辰為主置之馬邑川追突厥於朔方突厥請降許之而還自是貢獻相繼五年春正月癸丑帝討山胡大破之男子十二已上皆斬女子及幼弱以賞軍士遂平石樓石樓絶險自魏代所不能至於是逺近山胡莫不懾伏是役也有都督戰傷其什長路暉禮不能救帝命刳其五藏使九人分食之肉及穢惡皆盡自是始行威虐是月宇文泰廢西魏帝而立齊王廓是為恭帝三月蠕蠕菴羅辰叛帝親討大破之辰父子北遁太保賀拔仁坐違緩拔其髮免為庶人使負炭輸晉陽宮夏四月蠕蠕寇肆州丁巳帝自晉陽討之至恆州時虜騎散走大軍已還帝帥麾下二千餘騎為殿夜宿黃瓜堆蠕蠕别部數萬騎扣鞍而進四面圍逼帝安睡平明方起神色自若指畫軍形潰圍而出虜走追擊之伏尸二十里獲菴羅辰妻子生口三萬餘五月丁亥地豆干契丹並遣使朝貢丁未北討蠕蠕又大破之六月蠕蠕逺遁秋七月戊子肅愼遣使朝貢壬辰降罪人庚戌至自北伐八月庚午以司州牧清河王嶽為太保以安德王軌為大司馬以扶風王可朱渾道元為大將軍以司空尉粲為司徒以太子少師侯莫陳相為司空以尚書令平陽王淹為録尚書事以常山王演為尚書令以上黨王渙為尚書右僕射丁丑行幸晉陽辛巳録尚書事平原王高隆之薨封翼州刺史假韶為平原王是月詔常山王演上黨王渙清河王嶽平原王假韶率衆於洛陽西南築伐惡城新城嚴城河南城四鎮九月帝親自臨幸欲以致西師西師不出乃如晉陽冬十月西魏攻陷江陵殺梁元帝梁將王僧辨在建業推其晉安王蕭方智為太宰都督中外諸軍事承制置百官十二月庚申車駕北巡至達速嶺親覽山川險要將起長城是歲西魏恭帝元年六年春正月壬寅清河王嶽度江克夏首梁司徒郢州刺史陸法和請降詔以梁貞陽侯蕭淵明為梁主遣尚書右僕射上黨王渙送之江南二月甲子以陸法和為使持節都督十州諸軍事太尉大都督西南道大行臺三月丙戍上黨王渙克東關斬梁將裴之橫丙申車駕至自晉陽封文襄二子孝珩為廣寧王延宗為安德王戊戍帝臨昭陽殿決獄是月發寡婦以配軍士築長城夏五月蕭淵明入于建業六月甲子河東王潘相樂薨壬申帝親討蠕蠕甲戍諸軍大會祁連池乙亥出塞至庫狄谷百餘里無水泉六軍渴乏俄而大雨秋七月己卯帝頓白道留輜重親率輕騎五千追蠕蠕壬午及之懷朔鎮帝躬犯矢石頻大破之遂至沃野壬辰還晉陽九月己卯車駕至自晉陽冬十月梁將陳霸先襲殺王僧辨廢蕭淵明復立蕭方智為主辛亥行幸晉陽十一月梁秦州刺史徐嗣徽南豫州刺史任約等襲據石頭城并以州內附壬辰大都督蕭軌帥衆至江遣都督柳達摩等渡江鎮石頭己亥太保清河王嶽薨柳達摩為霸先攻逼以石頭降是歲高麗庫莫奚並遣使朝貢詔發夫一百八十萬人築城自幽州北夏口西至恆州九百餘里七年春正月辛丑封司空侯莫陳相為白水郡王車駕至自晉陽於鄴城西馬射大集衆庶觀之二月辛未詔常山王演等於涼風堂讀尚書奏案論定得失帝親決之三月丁酉大都督蕭軌等帥衆渡江夏四月乙丑儀同三司婁睿討智陽蠻大破之丁卯造金華殿五月漢陽王洽薨帝以肉為斷慈遂不復食六月乙卯蕭軌等與梁師戰於鍾山西遇霖雨失利軌及都督李希光王敬寶東方老軍司裴英起並沒士卒還者十二三乙丑梁湘州刺史王琳獻馴象秋七月乙亥魏相宇文泰薨是月發山東寡婦二千六百人配軍士有夫而濫奪者十二三十一月壬子併省州三郡一百五十三縣三百八十九鎮三戍二十六十二月庚子魏恭帝遜位於周是歲庫莫奚契丹遣使朝貢修廣三臺宮殿先是自西河總秦戍築長城東至海前後所築東西凡三千餘里六十里一戍其要害置州鎮凡二十五所八年春三月大熱人或暍死夏四月庚午詔禁取蝦蟹蜆蛤之類唯許私家捕魚乙酉詔公私禁取鷹鷂以太師咸陽王斛律金為右丞相以前大將軍扶風王可朱渾道元為太傅以開府儀同三司賀拔仁為太保尚書令常山王演為司空以録尚書事長廣王湛為尚書令以尚書右僕射楊愔為左僕射以并省尚書右僕射崔暹為左僕射以上黨王渙為録尚書事是月帝在城東馬射勑京師士女悉赴觀不赴者罪以軍法七日乃止五月辛酉冀州人劉向於鄴謀逆黨與皆伏誅秋八月己巳庫莫奚遣使朝貢庚辰詔丘郊禘祫時祭皆市取少牢不得刲割有司監視必令豐備農社先蠶酒肉而已雩禖風雨司人司祿靈星雜祀果餅酒脯唯當務盡誠敬義同如在辛巳制𣙜酤自夏至九月河北六州河南十三州畿內八郡大蝗飛至鄴蔽日聲如風雨甲辰詔今年遭蝗處免租冬十月乙亥梁主蕭方智遜位於陳陳武帝遣使稱藩朝貢是歲周閔帝元年周冢宰宇文護弒閔帝而立明帝又改元焉初於長城內築重城自庫洛拔而東至於塢紇戍凡四百餘里九年春二月丁亥降罪人己丑詔燎野限以仲冬不得他時行火損昆蟲草木三月丁酉車駕至自晉陽夏四月辛巳大赦是月北豫州刺史司馬消難以城叛于周大旱帝以祈雨不降毁西門豹祠掘其冡五月辛丑以尚書令長廣王湛為録尚書事以驃騎大將軍平秦王歸彥為右僕射甲辰以前左僕射楊愔為尚書令六月乙丑帝自晉陽北巡己巳至祁連池戊寅還晉陽是夏山東大蝗差人夫捕而坑之秋七月辛丑給畿內老人劉奴等九百四十三人版職及杖帽各有差戊申詔趙燕瀛定南營五州及司州廣平清河二郡去年螽潦損田兼春夏少雨苖稼薄者免今年租稅八月乙丑車駕至自晉陽甲戍行幸晉陽先是發丁匠三十餘萬人營三臺於鄴因其舊基而高博之大起宮室及遊豫園至是三臺成改銅爵曰金鳳金虎曰聖應冰井曰崇光冬十一月甲午車駕至自晉陽登三臺御乾象殿朝宴羣臣以新宮成丁酉大赦內外文武官並進一大階丁巳梁湘州刺史王琳遣使請立蕭莊為梁主進居九𣲖戊寅以太傅可朱渾道元為太師以司徒尉粲為太尉以冀州刺史段韶為司空以録尚書事常山王演為大司馬以録尚書事長廣王湛為司徒起大莊嚴寺是歲殺永安王浚上黨王渙十年春正月戊戌以司空侯莫陳相為大將軍辛丑太尉長樂郡公尉粲肆州刺史濮陽公婁仲逺並進爵為王甲寅行幸遼陽甘露寺二月丙戍帝於甘露寺禪居深觀唯軍國大政奏聞三月戊戍以侍中高德正為尚書右僕射丙辰車駕至自遼陽是月梁主蕭莊至郢州遣使朝貢夏閏四月丁酉以司州牧彭城王浟為兼司空以侍中高陽王湜為尚書左僕射乙巳以兼司空彭城王浟為兼大尉攝司空事封皇子紹亷為長樂王五月癸未誅始平公元世東平公元景式等二十五家禁止特進元韶等十九家尋並誅之男子無少長皆斬所殺三千人並投漳水六月陳武帝殂秋八月戊戍封皇子紹義為廣陽王以尚書右僕射河間王孝琬為左僕射癸卯詔諸軍人或有父祖改姓冒入元氏或假託攜認妄稱姓元者不問世數逺近悉聽改復本姓是月殺左僕射高德正九月己巳行幸晉陽冬十月甲午帝暴崩於晉陽宮德陽堂時年三十一遺詔凶事一從儉約喪月之斷限以三十六日嗣子百寮內外遐邇奉制割情悉從公除癸卯發喪斂於宣德殿十一月辛未梓宮還鄴十二月乙酉殯於太極前殿乾明元年二月丙申葬於武寧陵諡曰文宣皇帝廟號高祖帝沈敏有逺量外若不逮內鑒甚明文襄年長英秀神武特所愛重百僚承風莫不震懼而帝善自晦迹言不出口恆自貶退言咸順從故深見輕雖家人亦以為不及文襄嗣業帝以次長見猜嫌帝后李氏色美每豫宴會容貌逺過靖德皇后文襄彌不平焉帝每為后私營服玩小佳文襄即令逼取后恚有時未與帝笑曰此物猶應可求兄須何容吝文襄或愧而不取便恭受亦無飾讓每退朝還第輒閉閣靜坐雖對妻子能竟日不言或袒跣奔躍后問其故對曰為爾漫戲此蓋習勞而不肯言也所寢至夜曾有光巨細可察后驚告帝帝曰愼勿妄言自此唯與后寢侍御皆令出外文襄崩祕不發喪其後漸露魏帝竊謂左右曰大將軍比殂似是天意威權當歸王室矣及帝將赴晉陽親入辭謁於昭陽殿從者千人居前持劒者十餘輩帝在殿下數十步立而衛士升階己二百許人皆攘袂扣刃若對嚴敵帝令主者傳奏須詣晉陽言訖再拜而出魏帝失色目送帝曰此人又似不能見容吾不知死在何日及至并州慰諭將士指辭款實衆皆欣然曰誰謂左僕射翻不減令公令公即指文襄也時訛言上黨出聖人帝聞之將徙一郡而郡人張思進上言殿下生於南宮坊名上黨即是上黨出聖人帝悅而止先是童謡曰一束藁兩頭然河邊羖䍽飛上天藁然兩頭於文為高河邊羖䍽為水邊羊指帝名也於是徐之才盛陳宜受禪帝曰先父亡兄功德如此尚終北面吾又何敢當之才曰正為不及父兄須早升九五如其不作人將生心且讖云羊飲盟津角拄天盟津水也羊飲水王名也角拄天大位也又陽平郡界回星驛傍有大水土人常見羣羊數百立臥其中就視不見事與讖合願王勿疑帝以問高德正德正又贊成之於是始決乃使李密卜之遇大畜曰大吉漢文帝之卦也帝乃鑄象以卜之一寫而成使段韶問斛律金於肆州金來朝深言不可以鎧曹宗景業首陳符命請殺之乃議於太后前太后謂諸貴曰我兒獰直必自無此意直高德正樂禍教之耳帝意決乃整兵而東使高德正之鄴諷喻公卿莫有應者司馬子如逆帝於遼陽固言未可杜弼亦抱馬諫帝欲還尚食丞李集曰此行事非小而言還帝偽言使向東門殺之而别令賜絹十匹四月夜禾生於魏帝銅研旦長數寸有穗五月帝復東赴鄴令左右曰異言者斬是月光州獻九尾狐帝至鄴城南召入并齎版策旦高隆之進謁曰用此何為帝作色曰我自作事若欲族滅耶隆之謝而退於是乃作圜丘備法物草禪讓事及登極之後神明轉茂外柔內剛果於斷割人莫能窺又特明吏事留心政術簡靖寬和坦於任使故楊愔等得盡於匡贊朝政粲然兼以法馭下不避權貴或有違犯不容勳戚內外莫不肅然至於軍國機策獨決懷抱規謀宏逺有人君大略又以三方鼎峙繕甲練兵左右宿衛置百保軍士每臨行陳親當矢石鋒刃交接唯恐前敵不多屢犯艱厄常致克捷嘗追及蠕蠕令都督高阿那肱率騎數千塞其走道時虜軍猶有五萬餘人肱以兵少請益帝更減其半騎那肱奮擊遂大破之虜主踰越巖谷僅以身免都督高元海王師羅並無武藝先稱怯弱一旦交鋒有踰驍壯嘗於東山遊宴以關隴未平投杯震怒召魏收於前立為詔書宣示逺近將軍西行是歲宇文泰殂西人震恐常為度隴之計既征伐四克威振戎夏六七年後以功業自矜遂留情耽湎肆行淫暴或躬自鼓舞歌謳不息從旦通宵以夜繼晝或袒露形體塗傅粉黛散髮胡服雜衣錦綵拔刃張弓遊行市肆勳戚之第朝夕臨幸時乘鹿車白象駱駝牛驢並不施鞍勒或盛暑炎赫日中暴身隆冬酷寒去衣馳走從者不堪帝居之自若街坐巷宿處處遊行多使劉桃枝崔季舒負之而行或擔胡鼓而拍之親戚貴臣左右近習侍從錯雜無復差等徵集淫嫗悉去衣裳分付從官朝夕臨視或聚棘為馬紐草為索逼遣乘騎牽引來去流血灑地以為娛樂凡諸殺害多令支解或焚之於火或投之於河沈酗既久彌以狂惑每至將醉輒拔劒挂手或張弓傅矢或執持牟槊遊行市鄽問婦人曰天子何如答曰顚顚癡癡何成天子帝乃殺之或馳騁衢路散擲錢物恣人拾取爭競喧譁方以為喜太后嘗在北宮坐一小榻帝時已醉手自舉牀后便墜落頗有傷損醒悟之後大懷慙恨遂令多聚柴火將入其中太后驚懼親自持挽又設地席令平秦王高歸彥執杖口自責疏脫背就罰勑歸彥杖不出血當即斬汝太后涕泣前自抱之帝流涕苦請不肯受於太后太后聽許方捨背杖笞腳五十莫不至到衣冠拜謝悲不自勝因此戒酒一旬還復如初自是耽湎轉劇遂幸李后家以鳴鏑射后母崔正中其頰因罵曰吾醉時尚不識太后老婢何事馬鞭亂打一百有餘三臺構木高二十七丈兩棟相距二百餘尺工匠危怯皆繫繩自防帝登脊疾走都無怖畏時復雅儛折旋中節傍人見者莫不寒心又召死囚以席為翅從臺飛下免其罪戮果敢不慮者盡皆獲全疑怯猶豫者或致損跌沈酗既久轉虧本性怒大司農穆子容使之脫衣而伏親射之不中以橛貫其下竅入腸雖以楊愔為宰輔使進厠籌以其體肥呼為楊大肚馬鞭鞭其背流血浹袍以刀子𠢐其腹崔季舒託俳言曰老小公子惡戲因掣刀子而去之又置愔於棺中載以轜車幾下釘者數四曾至彭城王浟宅謂其母爾朱曰憶汝奪我母壻時向何由可耐手自刃殺又至故僕射崔暹第謂暹妻李曰頗憶暹不李曰結髮義深實懷追憶帝曰若憶時自往看也親自斬之棄頭牆外嘗在晉陽以矟戲刺都督尉子耀應手而死在三臺大光殿上鋸殺都督穆嵩又幸開府暴顯家有都督韓哲無罪忽衆中召斬之數段魏樂安王元昻后之姊壻其妻有色帝數幸之欲納為昭儀召昻令伏以鳴鏑射一百餘下凝血垂將一石竟至於死後帝自往弔哭於喪次逼擁其妻仍令從官脫衣助襚兼錢綵號為信物一日所得將踰巨萬后啼不食乞讓位於姊太后又為言帝意乃釋所幸薛嬪甚被寵愛忽憶其經與高嶽私通無故斬首藏之於懷於東山宴勸酬始合忽探出頭投於柈上支解其尸弄其髀為琵琶一座驚怖莫不喪膽帝方收取對之流淚云佳人難再得甚可惜也載尸以出被髮步哭而隨之至有閭巷庸猥人無識知者忽令召斬鄴下繫徒罪至大辟簡取隨駕號為供御囚手自刃殺持以為戲凡所屠害動多支解或投之烈火或棄之漳流兼以外築長城內營臺殿賞費過度天下騷然內外憯憯各懷怨毒而素嚴斷臨下加之默識強記百寮戰栗不敢為非曾有典御丞李集面諫比帝有甚於桀紂帝令縛置流中沈沒久之復令引出謂曰吾何如桀紂集曰向來彌不及矣帝又令沈之引出更問如此數四集對如初帝大笑曰天下有如此癡漢方知龍逢比干非是俊物遂解放之又被引入見似有所諫帝令將出要斬其或斬或赦莫能測焉初帝登阼改年為天保士有深識者曰天保之字為一大人只十帝其不過十乎又先是謡云馬子入石室三千六百日帝以午年生故曰馬子三臺石虎舊居故曰石室三千六百日十年也又帝曾問泰山道士曰吾得幾年天子答曰得三十年道士出後帝謂李后曰十年十月十日得非三十也吾甚畏之過此無慮人生有死何得致惜但憐正道尚幼人將奪之耳帝及期而崩濟南竟不終位時以為知命曾幸晉陽夜宿扛門嶺嶺有數株柏樹皆將千年枝葉嫩茂似有神物所託時帝已被酒向嶺瞋罵射中一株未幾立枯而死又出言屢中時人故謂之神靈雖為猖獗不專云昏暴末年遂不能進食唯數飲酒麴蘖成災因而致斃先是霍州發楚夷王女冡尸如生焉得珠襦玉匣帝珍之遂以斂焉初祖珽以險薄多過帝數罪之每謂為老賊及武成時珽被任遇乃説武成曰文宣甚暴何得稱文既非創業何得稱祖若文宣為祖陛下萬歲後將何以稱武成溺於珽説天統初有詔改諡景烈廟號威宗武平初趙彥深執政又奏復帝本諡廟號顯祖云文宣帝天保十年廢帝濟南王諱殷字正道小名道人文宣之長子也母曰李皇后天保元年立為皇太子時年六歲性敏慧初學反語於迹字下注云自反時侍者未達其故太子曰迹字足傍亦為迹豈非自反邪嘗宴北宮獨令河間王勿入左右問其故太子曰世宗遇賊處河間王復何宜在此文宣每言太子得漢家性質不似我欲廢之立太原王初詔國子博士李寶鼎傅之寶鼎卒復詔國子博士邢峙侍講太子雖富於春秋而溫裕開朗有人君之度貫綜經業省覽時政甚有美名七年冬文宣召朝臣文學者及禮學官於宮宴會令以經義相質親自臨聽太子手筆措問在坐莫不歎美九年文宣在晉陽太子監國集諸儒講孝經令楊愔傳旨謂國子助教許散愁曰先生在世何以自資對曰散愁自少以來不登孌童之牀不入季女之室服膺簡策不知老之將至平生素懷若斯而已太子曰顔子縮屋稱貞柳下嫗而不亂未若此翁白首不娶者也乃賚絹百匹後文宣登金鳳臺召太子使手刃囚太子惻然有難色再三不斷其首文宣怒親以馬鞭撞太子三下由是氣悸語吃精神時復昏擾十年十月文宣崩癸卯太子即帝位於晉陽宣德殿大赦內外百官普加泛級亡官失爵聽復資品庚戍尊皇太后為太皇太后皇后為皇太后詔九州軍人七十已上授以版職武官年六十已上及癃病不堪驅使者並皆放免土木營造金銀銅鐡諸雜作工一切停罷十一月乙卯以右丞相咸陽王斛律金為左丞相以録尚書事常山王演為太傅以司徒長廣王湛為太尉以司空段韶為司徒以平陽王淹為司空高陽王湜為尚書左僕射河間王孝琬為司州牧侍中燕子獻為右僕射戊午分命使者巡省四方求政得失省察風俗問民疾苦十二月戊戍改封上黨王紹仁為漁陽王廣陽王紹義為范陽王長樂王紹廣為隴西王是歲周武成元年乾明元年春正月癸丑朔改元己未詔寬徭賦癸亥高陽王湜薨是月車駕至自晉陽己亥以太傅常山王演為太師録尚書事以太尉長廣王湛為大司馬并省録尚書事以尚書左僕射平秦王歸彥為司空趙郡王睿為尚書左僕射詔諸元良口配沒官內及賜人者並放免甲辰帝幸芳林園親録囚徒死罪已下降免各有差乙巳太師常山王演矯詔誅尚書令楊愔尚書右僕射燕子獻領軍大將軍可朱渾天和侍中宋欽道散騎常侍鄭子默戊申以常山王演為大丞相都督中外諸軍録尚書事以大司馬長廣王湛為太傅京畿大都督以司徒段韶為大將軍以前司空平陽王淹為太尉以司空平秦王歸彥為司徒彭城王浟為尚書令又以高麗王世子湯為使持節領東夷校尉遼東郡公高麗王是月王琳為陳所敗蕭莊自拔至和州三月甲寅詔軍國事皆申晉陽稟大丞相常山王規笇壬申封文襄第二子孝珩為廣陵王第三子長恭為蘭陵王夏四月癸亥詔河南定冀趙瀛滄南膠光南青九州往因螽水頗傷時稼遣使分塗贍恤是月周明帝崩五月壬子以開府儀同三司劉洪徽為尚書右僕射秋八月壬午太皇太后令廢帝為濟南王全食一郡以大丞相常山王演入纂大統是日王居别宮皇建二年九月殂於晉陽時年十七帝聰慧夙成寬厚仁智天保間雅有令名及承大位楊愔燕子獻宋欽道等同輔以常山王地親望重內外畏服加以文宣初崩之日太后本欲立之故愔等並懷猜忌常山王憂悵乃白太后誅其黨時平秦王歸彥亦豫謀焉皇建二年秋天文告變歸彥慮有後害仍白孝昭以王當咎乃遣歸彥馳駟至晉陽害之王薨後孝昭不豫見文宣為祟孝昭深惡之厭勝術備設而無益也薨三旬而孝昭崩太寧二年葬於武寧之西北諡閔悼王初文宣命邢邵制帝名殷字正道從而尤之曰殷家弟及正字一止吾身後兒不得也邵懼請改焉文宣不許曰天也因謂孝昭曰奪時但奪愼勿殺也廢帝濟南王乾明元年孝昭皇帝諱演字延安神武皇帝第六子文宣皇帝之母弟也幼而英峙早有大成之量武明皇太后早所愛重魏元象元年封常山郡公及文襄執政遣中書侍郎李同軌就霸府為諸弟師帝所覽文籍源其指歸而不好辭彩每歎云雖盟津之師左驂震而不衄同軌以為能遂篤志讀漢書至李陵傳恆壯其所為焉聰敏過人所與遊處一知其家諱終身未嘗誤犯同軌病卒又命開府長流參軍刁柔代之柔性嚴褊不適誘訓之宜中被遣出帝送出閣慘然斂容淚數行下左右莫不歔欷其敬業重舊如此天保初進爵為王五年除并省尚書令帝善斷割長思理省內畏服七年從文宣還鄴文宣以尚書奏事多有異同令帝與朝臣先論定得失然後敷奏帝長於政術割斷咸盡其理文宣歎重之八年轉司空録尚書事九年除大司馬仍録尚書事時文宣溺於遊宴帝憂憤表於神色文宣覺之謂帝曰但令汝在我何為不縱樂帝唯啼泣拜伏竟無所言文宣亦大悲抵杯於地曰汝似嫌我自今敢進酒者斬之因取所御杯盡皆壞棄後益沈湎或入諸貴戚家角力批拉不限貴賤唯常山王至內外肅然帝又密撰事條將諫其友王晞以為不可帝不從因間極言遂逢大怒順成后本魏朝宗室文宣欲帝離之隂為帝廣求淑媛望移其寵帝雖承旨有納而情義彌重帝性頗嚴尚書郎中剖斷有失輒加捶楚令史姦慝便即考竟文宣乃立帝於前以刀環擬胸召被帝罰者臨以白刃求帝之短咸無所陳方見解釋自是不許笞箠郎中後賜帝魏時宮人醒而忘之謂帝擅取遂以刀環亂築因此致困皇太后日夜啼泣文宣不知所為先是禁帝友王晞至是乃捨之令侍帝帝月餘漸瘳不敢復諌及文宣崩帝居禁中護喪事幼主即位乃即朝班除太傅録尚書事朝政皆決於帝月餘乃居藩邸自是詔敕多不關帝客或言於帝曰鷙鳥捨巢必有探卵之患今日之地何宜屢出乾明元年從廢帝赴鄴居于領軍府時楊愔燕子獻可朱渾天和宋欽道鄭子默等以帝威望既重內懼權逼請以帝為太師司州牧録尚書事長廣王湛為大司馬録并省尚書事解京畿大都督帝既以尊親而見猜斥乃與長廣王期獵謀之於野三月甲戌帝初上省旦發領軍府大風暴起壞所御車幔帝甚惡之及至省朝士咸集坐定酒數行於坐執尚書令楊愔右僕射燕子獻領軍可朱渾天和侍中宋欽道等於坐帝戎服與平原王段韶平秦王高歸彥領軍劉洪徽入自雲龍門於中書省前遇散騎常侍鄭子默又執之同斬於御府之內帝至東閣門都督成休寧抽刀呵帝帝令高歸彥喻之休寧厲聲大呼不從歸彥既為領軍素為兵士所服悉皆弛仗休寧方歎息而罷帝入至昭陽殿幼主太皇太后皇太后並出臨御坐帝奏愔等罪求伏專擅之辜時庭中及兩廊下衛士二千餘人皆被甲待詔武衛娥永樂武力絶倫又被文宣重遇撫刃思效廢帝吃訥兼倉卒不知所言太皇太后又為皇太后誓言帝無異志唯云被逼而已高歸彥敕勞衛士解嚴永樂乃內刀而泣帝乃令歸彥引侍衛之士向華林園以京畿軍入守門閣斬娥永樂於園詔以帝為大丞相都督中外諸軍録尚書事相府佐史進位一等帝尋如晉陽有詔軍國大政咸咨決焉帝既當大位知無不為擇其令典考綜名實廢帝恭己以聽政太皇太后尋下令廢少主命帝統大業皇建元年八月壬午皇帝即位於晉陽宣德殿大赦改乾明元年為皇建詔奉太皇太后還稱皇太后皇太后稱文宣皇后宮曰昭信乙酉詔曰太祖創業已來諸有佐命功臣子孫絶滅國統不傳者有司搜訪近親以名聞當量為主後諸郡國老人各授版職賜黃帽鳩杖又詔謇正之士並聽進見陳事軍人戰亡死王事者以時申聞當加榮贈督將朝士名望素高位歷通顯天保以來未蒙追贈者亦皆録奏又以廷尉中丞執法所在繩違案罪不得儛文弄法其官奴婢年六十已上免為庶人戊子以太傅長廣王湛為右丞相以太尉平陽王淹為太傅以尚書令彭城王浟為大司馬壬辰詔分遣大使巡省四方觀察風俗問民疾苦考求得失搜訪賢良甲午詔曰昔武王克殷先封往代兩漢魏晉無違兹典及元氏統歷不率舊章朕纂承大業思𢎞古典但二王三恪舊説不同可議定是非列名條奏其禮儀體式亦仰議之又詔國子寺可備立官屬依舊置生員講習經典歲時考試其文襄帝所運石經宜即施列於學館外州大學亦仰典司勤加督課丙申詔九州勳人有重封者聽分授子弟以廣骨肉之恩九月壬申詔議定三祖樂冬十一月辛亥立妃元氏為皇后世子百年為皇太子賜天下為父後者爵一級癸丑有司奏太祖獻武皇帝廟宜奏武德之樂舞昭烈之舞太宗文襄皇帝廟宜奏文德之樂舞宣政之舞高祖文宣皇帝廟宜奏文正之樂舞光大之舞詔曰可庚申詔以故太師尉景故太師竇泰故太師太原王婁昭故太宰章武王庫狄干故太尉段榮故太師万俟普故司徒蔡俊故太師高乾故司徒莫多婁貸文故太保劉貴故太保封祖裔故廣州刺史王懷十三人配饗太祖廟庭故太師清河王嶽故太宰安德王韓軌故太宰扶風王可朱渾道元故太師高昻故大司馬劉豐故太師万俟受洛干故太尉慕容紹宗十一人配饗世宗廟庭故大尉河東王潘相樂故司空薛修義故太傅破六韓常三人配饗高祖廟庭是月帝親戎北討庫莫奚出長城虜奔遁分兵致討大獲牛馬括總入晉陽宮十二月丙午車駕至晉陽二年春正月辛亥祀圜丘壬子禘於太廟癸丑詔降罪人各有差二月丁丑詔內外執事之官從五品已上及三府主簿録事參軍諸王文學侍御史廷尉三官尚書郎中中書舍人每二年之內各舉一人冬十月丙子以尚書令彭城王浟為太保長樂王尉粲為太尉己酉野雉栖于前殿之庭十一月甲辰詔曰朕嬰此暴疾奄忽無逺今嗣子沖眇未間政術社稷業重理歸上德右丞相長廣王湛研機測化體道居宗人雄之望海內瞻仰同胞共氣家國所憑可遣尚書左僕射趙郡王睿喻旨徴王統兹大寶其喪紀之禮一同漢文三十六日悉從公除山陵施用務從儉約先是帝不豫而無闕聽覽是日崩於晉陽宮時年二十七大寧元年閏十二月癸卯梓宮還鄴上諡曰孝昭皇帝庚午葬於文靜陵帝聰敏有識度深沈能斷不可窺測身長八尺腰帶十圍儀望風表逈然獨秀自居臺省留心政術間明簿領吏所不逮及正位宸居彌所刻勵輕徭薄賦勤恤人隱內無私寵外收人物雖后父位亦特進無别日昃臨朝務知人之善惡每訪問左右冀獲直言曾問舍人裴澤在外議論得失澤率爾對曰陛下聰明至公自可逺侔古昔而有識之士咸言傷細帝王之度頗為未𢎞帝笑曰誠如卿言朕初臨萬機慮不周悉故致爾耳此事安可久行恐後又嫌疏漏澤因被寵遇其樂聞過也如此趙郡王睿與庫狄顯安侍坐帝曰須拔我同堂弟顯安我親姑子今序家人禮除君臣之敬可言我之不逮顯安曰陛下多妄言曰若何對曰陛下昔見文宣以馬鞭撻人常以為非而今行之非妄言邪帝握其手謝之又使直言對曰陛下太細天子乃更似吏帝曰朕甚知之然無法來久將整之以至無為耳又問王晞晞答如顯安皆從容受納性至孝太后不豫出居南宮帝行不正履容色貶悴衣不解帶殆將四旬殿去南宮五百餘步雞鳴而去辰時方還來去徒行不乘輿輦太后所苦小增便即寢伏閣外食飲藥物盡皆躬親太后嘗心痛不自堪忍帝立侍帷前以爪搯手心血流出袖友愛諸弟無君臣之隔雄勇有謀于時國富兵強將雪神武遺恨意在頓駕平陽為進取之策逺圖不遂惜哉初帝與濟南約不相害及輿駕在晉陽武成鎮鄴望氣者云鄴城有天子氣帝恐濟南復興乃密行鴆毒濟南不從乃扼而殺之後頗愧悔初苦內熱頻進渴散時有尚書令史姓趙於鄴見文宣從楊愔燕子獻等西行言相與復讎帝在晉陽宮與毛夫人亦見焉遂漸危篤備禳厭之事或煮油四灑或持炬燒逐諸厲方出殿梁山騎棟上歌呼自若了無懼容時有天狗下乃於其所講武以厭之有驚馬帝墜而絶肋太后視疾問濟南所在者三帝不對太后怒曰殺之邪不用吾言死其宜矣臨終之際唯扶服牀枕叩頭求哀遣使詔追長廣王入纂大統又手書云宜將吾妻子置一好處勿學前人也孝昭帝皇建二年世祖武成皇帝諱湛神武皇帝第九子孝昭皇帝之母弟也儀表瓌傑神武尤所鍾愛神武方招懷荒逺乃為帝聘蠕蠕太子菴羅辰女號鄰和公主帝時年八歲冠服端嚴神情間逺華戎歎異元象中封長廣郡公天保初進爵為王拜尚書令尋兼司徒遷太尉乾明初楊愔等密相疏忌以帝為大司馬領并州刺史帝既與孝昭謀誅諸執政遷太傅録尚書事領京畿大都督皇建初進位右丞相孝昭幸晉陽帝以懿親居守鄴政事咸見委託二年孝昭崩遺詔徵帝入統大位及至晉陽發喪於崇德殿皇太后令所司宣遺詔左丞相斛律金率百僚敦勸三表乃許之大寧元年冬十一月癸丑皇帝即位於南宮大赦改皇建二年為大寧乙卯以司徒平秦王歸彥為太傅以尚書右僕射趙郡王睿為尚書令以太尉尉粲為太保以尚書令段韶為大司馬以豐州刺史婁睿為司空以太傅平陽王淹為太宰以太保彭城王浟為太師録尚書事以冀州刺史博陵王濟為太尉以中書監任城王湝為尚書左僕射以并州刺史斛律光為右僕射封孝昭皇帝太子百年為樂陵郡王庚申詔大使巡行天下求政善惡問民疾苦擢進賢良是歲周武帝保定元年河清元年春正月乙亥車駕至自晉陽辛巳祀南郊壬午享太廟丙戍立妃胡氏為皇后子緯為皇太子戊子大赦內外百官普加泛級諸為父後者賜爵一級己亥以前定州刺史馮翊王潤為尚書左僕射詔普斷屠殺以順春令二月丁未以太宰平陽王淹為青州刺史太傅領司徒以領軍大將軍宗師平秦王歸彥為太宰冀州刺史乙卯以兼尚書令任城王湝為司徒詔散騎常侍崔瞻聘于陳夏四月辛丑皇太后婁氏崩乙巳青州刺史上言今月庚寅河濟清以河濟清改大寧二年為河清降罪人各有差五月甲申祔葬武明皇后於義平陵己丑以尚書右僕射斛律光為尚書令秋七月太宰冀州刺史平秦王歸彥據州反詔大司馬段韶司空婁睿討禽之乙未斬歸彥并其三子及黨與二十人於都市丁酉以大司馬段韶為太傅以司空婁睿為司徒以太傅平陽王淹為太宰以尚書令斛律光為司空以太子太傅趙郡王睿為尚書令中書監河間王孝琬為尚書左僕射癸亥行幸晉陽陳人來聘冬十一月丁丑詔兼散騎常侍封孝琰使於陳十二月丙辰車駕至自晉陽是歲殺太原王紹德二年春正月乙亥帝詔臨朝堂策試秀孝以太子少傅魏收為兼尚書右僕射己卯兼右僕射魏收以阿縱除名丁丑以武明皇后配祭北郊辛卯帝臨都亭録見囚降在京罪人各有差三月己丑詔司空斛律光督五營軍士築戍於軹關壬申室韋國遣使朝貢丙戍以兼尚書右僕射趙彥深為左僕射夏四月并汾晉東雍南汾五州蟲旱傷稼遣使振恤戊午陳人來聘五月壬午詔以城南雙堂之苑回造大總持寺六月乙巳齊州上言濟河水口見八龍升天乙卯詔兼散騎常侍崔子武使于陳庚申司州牧河南王孝瑜薨八月辛丑詔以三臺宮為大聖寺冬十二月癸巳陳人來聘己酉周將楊忠帥突厥阿史那木可汗等二十餘萬人自恆州分為三道殺掠吏民是時大雨雪連月南北千餘里平地數尺霜晝下雨血於太原戊午帝至晉陽己未周軍逼并州又遣大將達奚武帥衆數萬至東雍及晉州與突厥相應是歲室韋庫莫奚靺鞨契丹並遣使朝貢三年春正月庚申朔周軍至城下而陳戰於城西周軍及突厥大敗人畜死者相枕數百里不絶詔平原王段韶追出塞而還三月辛酉以律令班下大赦己巳盜殺太師彭城王浟庚辰以司空斛律光為司徒以侍中武興王普為尚書左僕射甲申以尚書令馮翊王潤為司空夏四月辛卯詔兼散騎常侍皇甫亮使於陳五月甲子帝至自晉陽壬午以尚書令趙郡王睿為録尚書事以前司徒婁睿為太尉甲申以太傅段韶為太師丁亥以太尉任城王湝為大將軍壬辰行幸晉陽六月庚子大雨晝夜不息至甲辰乃止是月晉陽訛言有鬼兵百姓競擊銅鐵以捍之殺樂陵王百年歸宇文媪于周秋九月乙丑封皇子綽為南陽王儼為東平王是月歸閻媪于周陳人來聘突厥冦幽州入長城虜掠而還閏月乙未詔遣十二使巡行水潦州免其租調乙巳突厥冦幽州周軍三道並出使其將尉遲迥寇洛陽楊􅋆入軹關權景宣趣懸瓠冬十一月甲午迥等圍洛陽戊戍詔兼散騎常侍劉逖使於陳甲辰太尉婁睿大破周軍於軹關禽楊􅋆十二月乙卯豫州刺史王士良以城降周將權景宣丁巳帝自晉陽南討己未太宰平陽王淹薨壬戍太師段韶大破尉遲迥等解洛陽圍丁卯帝至洛陽免洛州經周軍處一年租賦赦州城內死罪已下囚己巳以太師段韶為太宰以司徒斛律光為太尉并州刺史蘭陵王長恭為尚書令壬申帝至虎牢經滑臺次於黎陽所經減降罪人丙子車駕至自洛陽是歲高麗靺鞨新羅並遣使朝貢山東大水飢死者不可勝計詔發粟振給事竟不行四年春正月癸卯以大將軍任城王湝為大司馬辛未幸晉陽二月甲寅詔以新羅國王金真興為使持節東夷校尉樂浪郡公新羅王壬申以年穀不登禁酤酒己卯詔減百官食稟各有差三月戊子詔給西兖梁滄趙州司州之東郡陽平清河武都冀州之長樂勃海遭水潦之處貧下户粟各有差家得斗升而已又多不付是月彗星見有物隕於殿庭如赤漆鼓帶小鈴殿上石自起兩兩相對又有神見於後園萬壽堂前山穴中其體壯大不辨其面兩齒絶白長出於脣帝直宿嬪御已下七百人咸見焉帝又夢之夏四月戊午大將軍東安王婁睿坐事免乙亥陳人來聘太史奏天文有變其占當有易王丙子乃使太宰段韶兼太尉持節奉皇帝璽綬傳位於皇太子大赦改元為天統元年百官進級降罪各有差又詔皇太子妃斛律氏為皇后於是羣公上尊號為太上皇帝軍國重事咸以奏聞始將傳政使內參乘子尚乘驛送詔書於鄴子尚出晉陽城見人騎隨後忽失之尚未至鄴而其言已布矣天統四年十二月辛未太上皇帝崩於鄴宮乾壽堂時年三十二諡曰武成皇帝廟號世祖五年二月甲申葬于永平陵武成帝大寧元年河清四年即位五年後主諱緯字仁綱武成皇帝之長子也母曰胡皇后后夢於海上坐玉盆日入裙下遂有娠天保七年五月五日生帝於并州邸帝少美容儀武成特所愛寵拜世子及武成入纂大業大寧二年正月丙戍立為皇太子河清四年武成禪位於帝天統元年夏四月丙子皇帝即位於晉陽宮大赦改河清四年為天統丁丑以太保賀拔仁為太師大尉侯莫陳相為太保司空馮翊王潤為司徒録尚書事趙郡王睿為司空尚書左僕射河間王孝琬為尚書令戊寅以瀛州刺史尉粲為太尉太尉斛律光為大將軍東安王婁睿為太尉尚書右僕射趙彥深為左僕射六月壬戍彗星出文昌東北其大如手後稍長乃至丈餘百日乃滅己巳太上皇帝詔兼散騎常侍王季高使於陳秋七月乙未太上皇帝詔增置都水使者一人冬十一月癸未太上皇帝至自晉陽己丑太上皇帝詔改太祖獻武皇帝為神武皇帝廟號高祖獻明皇后為武明皇后其文宣諡號委有司議定十二月庚戍太上皇帝狩於北郊壬子狩於南郊乙卯狩於西郊壬戍太上皇帝幸晉陽丁卯帝至自晉陽庚午有司奏改高祖文宣皇帝為威宗景烈皇帝是歲高麗契丹靺鞨並遣使朝貢河南大疫二年春正月辛卯祀圜丘癸巳祫祭於太廟詔降罪人各有差丙申以吏部尚書尉瑾為尚書右僕射庚子行幸晉陽二月庚戍太上皇帝至自晉陽壬子陳人來聘三月乙巳太上皇帝詔以三臺施興聖寺以旱故降禁囚夏四月陳文帝殂五月乙酉以兼尚書左僕射武興王普為尚書令己亥封太上皇帝子儼為東平王仁𢎞為齊安王仁固為北平王仁英為高平王仁元為淮南王六月太上皇帝詔兼散騎常侍韋道儒聘於陳秋八月太上皇帝幸晉陽冬十月乙卯以太保侯莫陳相為太傅大司馬任城王湝為太保太尉婁睿為大司馬徙馮翊王潤為太尉開府儀同三司韓祖念為司徒十一月大雨雪盜竊太廟御服十二月乙丑陳人來聘是歲殺河間王孝琬突厥靺鞨國並遣使朝貢於周為天和元年三年春正月壬辰太上皇帝至自晉陽乙未大雪平地二尺戊戍太上皇帝詔京官執事散官二品已上舉三人五品已上各舉二人稱事七品已上及殿中侍御史尚書都檢校御史主書及門下録事各舉一人鄴宮九龍殿災延燒西廊二月壬寅朔帝加元服大赦九州職人各進四級內外百官普進二級夏四月癸丑太上皇帝詔兼散騎常侍司馬幼之使於陳五月甲午太上皇帝詔以領軍大將軍東平王儼為尚書令乙未大風晝晦發屋拔樹六月己未太上皇帝詔封皇子仁機為西河王仁約為樂浪王仁儉為潁川王仁雅為安樂王統為丹陽王仁謙為東海王閏六月辛巳左丞相斛律金薨壬午太上皇帝詔尚書令東平王儼録尚書事以尚書左僕射趙彥深為尚書令并省尚書右僕射婁定逺為尚書左僕射中書監徐之才為右僕射秋八月辛未太上皇帝詔以太保任城王湝為太師太尉馮翊王潤為大司馬太宰段韶為左丞相太師賀拔仁為右丞相太傅侯莫陳相為太宰大司馬婁睿為太傅大將軍斛律光為太保司徒韓祖念為大將軍司空趙郡王睿為太尉尚書令東平王儼為司徒九月己酉太上皇帝詔諸寺署所綰雜保户姓高者天保之初雖有優放權假力用未免者今可悉蠲雜户任屬郡縣一準平民丁巳太上皇帝幸晉陽是秋山東大水人飢僵尸滿道冬十月突厥大莫婁室韋百濟靺鞨等國各遣使朝貢十一月丙午以晉陽大明殿成故大赦文武百官進二級免并州居城太原一郡來年租癸未太上皇帝幸晉陽十二月己巳太上皇帝詔以故左丞相趙郡王琛配饗神武廟庭四年春正月壬子詔以故清河王嶽河東王潘相樂十人並配饗神武廟庭癸亥太上皇帝詔兼散騎常侍鄭大護使於陳三月乙巳太上皇帝詔以司徒東平王儼為大將軍南陽王綽為司徒開府儀同三司廣寧王孝珩為尚書令夏四月辛未鄴宮昭陽殿災及宣光瑶華等殿辛巳太上皇帝幸晉陽五月癸卯以尚書右僕射胡長仁為左僕射中書監和士開為右僕射壬戍太上皇帝至自晉陽自正月不雨至於是月六月甲子朔大雨甲申大風拔木折樹是月彗星見于東井秋九月丙申周人來通和太上皇帝詔侍中斛斯文略報聘于周冬十月辛巳以尚書令廣寧王孝珩為録尚書事左僕射胡長仁為尚書令右僕射和士開為左僕射中書監唐雍為右僕射十一月壬辰太上皇帝詔兼散騎常侍李翥使於陳是月陳安成王頊廢其主伯宗而自立十二月辛未太上皇帝崩丙子大赦九州職人普加一級內外百官並加兩級戊寅上太上皇后尊號為皇太后甲申詔細作之務及所在百工悉罷之又詔掖庭晉陽中山宮人等及鄴下并州太官官口二處其年六十已上及有癃患者仰所司簡放庚寅詔天保七年已來諸家緣坐配流者所在令還是歲契丹靺鞨國並遣使朝貢五年春正月辛亥詔以金鳳等三臺未入寺者施大興聖寺是月殺定州刺史博陵王濟二月乙丑詔應宮刑者普免刑為官口又詔禁網捕鷹鷂及畜養籠放之物癸酉大莫婁國遣使朝貢己丑改東平王儼為琅邪王詔侍中叱列長義使於周是月殺太尉趙郡王睿三月丁酉以司空徐顯秀為太尉并省尚書令婁定逺為司空是月行幸晉陽夏四月甲子詔以并州尚書省為大基聖寺晉祠為大崇皇寺乙丑車駕至自晉陽秋七月己丑詔降罪人各有差戊申詔使巡省河北諸州無雨處境內遍旱者優免租調冬十月壬戍詔禁造酒十一月辛丑詔以太保斛律光為太傅大司馬馮翊王潤為太保大將軍琅邪王儼為大司馬十二月庚午以開府儀同三司蘭陵王長恭為尚書令庚辰以中書監魏收為尚書右僕射武平元年春正月乙酉朔改元太師并州刺史東安王婁睿薨戊申詔兼散騎常侍裴獻之聘於陳二月癸亥以百濟王餘昌為使持節侍中驃騎大將軍帶方郡公王如故己巳以太傅咸陽王斛律光為右丞相并州刺史右丞相安定王賀拔仁為録尚書事冀州刺史任城王湝為太師丙子降死罪已下囚閏月戊戍録尚書事安定王賀拔仁薨三月辛酉以開府儀同三司徐之才為尚書左僕射夏六月乙酉以廣寧王孝珩為司空甲辰以皇子恆生故大赦內外百官普進二級九州職人普進四級己酉詔以開府儀同三司唐雍為尚書右僕射秋七月癸丑封孝昭皇帝子彥基為城陽王彥康為定陵王彥忠為梁郡王甲寅以尚書令蘭陵王長恭為録尚書事中領軍和士開為尚書令癸亥靺鞨遣使朝貢癸酉以華山王凝為太傅八月辛卯行幸晉陽九月乙巳立皇子恆為皇太子冬十月辛巳以司空廣寧王孝珩為司徒以上洛王思宗為司空封蕭莊為梁王戊子曲降并州死罪已下囚己丑復改威宗景烈皇帝諡號為顯祖文宣皇帝十二月丁亥車駕至自晉陽詔右丞相斛律光出晉州道修城戌二年春正月丁巳詔兼散騎常侍劉俊使於陳戊寅以百濟王餘昌為使持節都督東青州刺史二月壬寅以録尚書事蘭陵王長恭為太尉并省録尚書事趙彥深為司空尚書令和士開為録尚書事左僕射徐之才為尚書令右僕射唐雍為左僕射吏部尚書馮子琮為右僕射夏四月壬午以大司馬琅邪王儼為太保甲午陳遣使連和謀伐周朝議弗許六月段韶攻周汾州克之獲刺史楊敷秋七月庚午太保琅邪王儼矯詔殺録尚書事和士開於南臺即日誅領軍大將軍庫狄伏連治書侍御史王子宣等尚書右僕射馮子琮賜死殿中八月己亥行幸晉陽九月辛亥以太師任城王湝為太宰馮翊王潤為太師己未左丞相平原王段韶薨戊午曲降并州界內死罪已下有差庚午殺太保琅邪王儼壬申陳人來聘冬十月罷京畿府入領軍府己亥車駕至自晉陽十一月庚戍詔侍中赫連子悅使於周丙寅以徐州行臺廣寧王孝珩為録尚書事庚午以録尚書事廣寧王孝珩為司徒癸酉以右丞相斛律光為左丞相三年春正月己巳親祀南郊辛亥追贈故琅邪王儼為楚帝二月己卯以衛菩薩為太尉辛巳以并省吏部尚書高元海為尚書右僕射庚寅以左僕射唐雍為尚書令侍中祖珽為左僕射是月勑撰元洲苑御覽復改名聖壽堂御覽三月辛酉詔文武官五品以上各舉一人是月周誅冢宰宇文護夏四月周人來聘秋七月戊辰誅左丞相咸陽王斛律光及其弟幽州行臺荆山公豐樂八月庚寅廢皇后斛律氏為庶人以太宰任城王湝為右丞相太師馮翊王潤為太尉蘭陵王長恭為大司馬廣寧王孝珩為大將軍安德王延宗為司徒使領軍封輔相聘于周戊子拜右昭儀胡氏為皇后己丑以司州牧北平王仁堅為尚書令特進許季良為左僕射彭城王寶德為右僕射癸巳行幸晉陽是月聖壽堂御覽成敕付史閣復改為修文殿御覽九月陳人來聘冬十月降死罪已下囚甲午拜𢎞德夫人穆氏為左皇后大赦十二月辛丑廢皇后胡氏為庶人是歲新羅百濟勿吉突厥並遣使朝貢於周為建德元年四年春正月戊寅以并省尚書令高阿那肱為録尚書事庚辰詔兼散騎常侍崔象使於陳是月鄴都并州並有狐媚多截人髮二月乙巳拜左皇后穆氏為皇后丙午置文林館乙卯以尚書令北平王仁堅為録尚書事丁巳行幸晉陽是月周人來聘三月辛未盜入信州殺刺史和士休南兖州刺史鮮于世榮討之庚辰車駕至晉陽夏四月戊午以大司馬蘭陵王長恭為太保大將軍定州刺史南陽王綽為大司馬太尉衛菩薩為大將軍司徒安德王延宗為太尉司空武興王普為司徒開府儀同三司宜陽王趙彥深為司空癸丑祈皇祠壇壝蕝之內忽有車軌之轍案驗傍無人迹不知車所從來乙卯詔以為大慶班告天下己未周人來聘五月丙子詔史官更撰魏書癸巳以領軍穆提婆為尚書左僕射以侍中中書監段孝言為右僕射是月開府儀同三司尉破胡長孫洪略等與陳將吳明徹戰於呂梁南大敗破胡走以免洪略戰殁遂陷秦涇二州明徹進陷和合二州是月殺太保蘭陵王長恭六月明徹進軍圍壽陽壬子幸南苑從官暍死者六十人以録尚書事高阿那肱為司徒丙辰詔開府王師羅使於周秋九月校獵于鄴東冬十月陳將吳明徹陷壽陽辛丑殺侍中崔季舒張雕虎散騎常侍劉逖封孝琰黃門侍郎裴澤郭遵癸卯行幸晉陽十二月戊寅以司徒高阿那肱為右丞相是歲高麗靺鞨並遣使朝貢突厥使來求婚五年春正月乙丑置左右娥英各一人二月乙未車駕至自晉陽朔州行臺南安王思好反辛丑行幸晉陽尚書令唐雍等大破思好思好投火死焚其尸並其妻李氏丁未車駕至自晉陽甲寅以尚書令唐雍為録尚書事夏五月大旱晉陽得死魃長二尺面頂各二目帝聞之使刻木為其形以獻庚申大赦丁亥陳人冦淮北秋八月癸卯行幸晉陽甲辰以高勱為尚書右僕射是歲殺南陽王綽六年春三月乙亥車駕至自晉陽丁丑烹妖賊鄭子饒於都市是月周人來聘夏四月庚子以中書監陽休之為尚書右僕射癸卯靺鞨遣使朝貢秋七月甲戍行幸晉陽八月丁酉冀定趙幽滄瀛六州大水是月周師入洛川屯芒山攻逼洛城縱火船焚浮橋河橋絶閏月己丑遣右丞相高阿那肱自晉陽禦之師次河陽周師夜遁庚辰以司空趙彥深為司徒斛律阿列羅為司空辛巳以軍國資用不足稅關市舟車山澤鹽鐵店肆輕重各有差開酒禁七年春正月壬辰詔去秋已來水潦人飢不自立者所在付大寺及諸富户濟其性命甲寅大赦乙卯車駕至自晉陽二月辛酉括雜户女年二十已下十四已上未嫁者悉集省隱匿者家長處死刑二月丙寅風從西北起發屋拔樹五日乃止夏六月戊申朔日有蝕之庚申司徒趙彥深薨秋七月丁丑大雨霖是月以水潦遣使巡撫流亡人户八月丁卯行幸晉陽雉集於御座獲之有司不敢以聞詔營邯鄲宮冬十月丙辰帝大狩於祁連池周師攻晉州癸亥帝還晉陽甲子出兵大集晉祠庚午帝發晉陽癸酉帝列陳而行上雞栖原與周齊王憲相對至夜不戰周師斂陳而退十一月周武帝退還長安留偏師守晉州高阿那肱等圍晉州城戊寅帝至圍所十二月戊申周武帝來救晉州庚戍戰于城南我軍大敗帝棄軍先還癸丑入晉陽憂懼不知所之甲寅大赦帝謂朝臣曰周師甚盛若何羣臣咸曰天命未改一得一失自古皆然宜停百賦安朝野收遺兵背城死戰以存社稷帝意猶豫欲向北朔州乃留安德王延宗廣寧王孝珩等守晉陽若晉陽不守即欲奔突厥羣臣皆曰不可帝不從其言開府儀同三司賀拔伏恩封輔相慕容鍾葵等宿衛近臣三十餘人西奔周師乙卯詔募兵遣安德王延宗為左廣廣寧王孝珩為右廣延宗入見帝帝欲向北朔州延宗泣諫不從帝密遣王康德與中人齊紹等送皇太后皇太子於北朔州丙辰帝幸城南軍營勞將士其夜欲遁諸將不從丁巳大赦改武平七年為隆化元年其日穆提婆降周詔除安德王延宗為相國委以備禦延宗流涕受命帝乃夜斬五龍門而出欲走突厥從官多散領軍梅勝郎叩馬諫乃回之鄴時唯高阿那肱等十餘騎廣寧王孝珩襄城王彥道續至得數十人同行戊午延宗從衆議即皇帝位於晉陽改隆化為德昌元年庚申帝入鄴辛酉延宗與周師戰於晉陽大敗為周師所虜帝遣募人重加官賞雖有此言而竟不出物廣寧王孝珩奏請出宮人及珍寶班賜將士帝不悅斛律孝卿居中受委帶甲以處分請帝親勞為帝撰辭且曰宜慷慨流涕感激人心帝既出臨衆將令之不復記所受言遂大笑左右亦羣咍將士莫不解體於是自大丞相已下太宰大司馬三師大將軍三公等官並增員而授或三或四不可勝數甲子皇太后從北道至引文武一品以上入朱華門賜酒食及紙筆問以禦周之方略羣臣各異議帝莫知所從又引高元海宋士素盧思道李德林等欲議禪位皇太子先是望氣者言當有革易於是依天統故事授位幼主幼主名恆帝之長子也母曰穆皇后武平元年六月生於鄴其年十月立為皇太子隆化二年春正月乙亥即皇帝位時年八歲改元為承光元年大赦尊皇太后為太皇太后帝為太上皇帝后為太上皇后於是黃門侍郎顔之推中書侍郎薛道衡侍中陳德信等勸太上皇帝往河外募兵更為經略若不濟南投陳國從之丁丑太皇太后太上皇自鄴先趣濟州周師漸逼癸未幼主又自鄴東走己丑周師至紫陌橋癸巳燒城西門太上皇將百餘騎東走乙亥度河入濟州其日幼主禪位於大丞相任城王湝令侍中斛律孝卿送禪文及璽綬於瀛州孝卿乃以之歸周又為任城王詔尊太上皇為無上皇幼主為守國天王留太皇太后濟州遣高阿那肱留守太上皇并皇后擕幼主走青州韓長鸞鄧顒等數十人從太上皇既至青州即為入陳之計而高阿那肱召周軍約生致齊主而屢使人告言賊軍在逺已令人燒斷橋道太上所以停緩周軍奄至青州太上窘急將遜於陳置金囊於鞍後與長鸞淑妃等十數騎至青州南鄧村為周將尉遲綱所獲送鄴周武帝與抗賔主禮并太后幼主諸王俱送長安封帝溫國公至建德七年誣與宜州刺史穆提婆謀反及延宗等數十人無少長咸賜死神武子孫所存者一二而已大象末陽休之陳德信等啓大丞相隋公請收葬聽之葬於長安北原洪瀆川帝幼而令善及長頗學綴文置文林館引諸文士焉而言語澀呐無志度不喜見朝士自非寵私昵狎未嘗交語性愞不耐人視有即忿責遇其怒時雖三公令録奏事莫敢仰視皆略陳大旨驚走而出每災異冦盜水旱亦不自貶損唯諸處設齋以此為修德雅信巫覡解禱無方初琅邪王舉兵入告者誤云庫狄伏連反帝曰此必仁威也又斛律光死後諸武官舉高思好堪大將軍帝曰思好喜反皆如所言遂自以策無遺算乃益驕縱盛為無愁之曲帝自彈琵琶而唱之侍和之者以百數人間謂之無愁天子嘗出見羣厲盡殺之或殺人剝面皮而視之任陸令萱和士開高阿那肱穆提婆韓長鸞等宰制天下陳德信鄧長顒何洪珍參豫機權各引親黨超居非次官由財進獄以賄成其所以亂政害人難以備載諸官奴婢閹人商人胡户雜户歌舞人見鬼人濫得富貴者將以萬數庶姓封王者百數不復可紀開府千餘儀同無數領軍一時三十連判文書各作花字不具姓名莫知誰也諸貴寵祖禰追贈官歲一進位極乃止宮掖婢皆封郡君宮女寶衣玉食者五百餘人一裙直萬匹鏡臺直千金競為變巧朝衣夕弊承武成之奢麗以為帝王當然乃更增益宮苑造偃武修文臺其嬪嬙諸院中起鏡殿寶殿玳瑁殿丹青雕刻妙極當時又於晉陽起十二院壯麗逾於鄴下所愛不恆數毁而又復夜則以火照作寒則以湯為泥百工困窮無時休息鑿晉陽西山為大佛像一夜燃油萬盆光照宮內又為胡昭儀起大慈寺未成改為穆皇后大寶林寺窮極工巧運石填泉勞費億計人牛死者不可勝紀御馬則籍以氊罽食物有十餘種將合牝牡則設青廬具牢饌而親觀之狗則飼以粱肉馬及鷹犬皆有儀同郡君之號故有赤彪儀同逍遙郡君陵霄郡君高思好書所謂駮龍逍遙者也犬於馬上設褥以抱之鬬雞亦號開府犬馬雞鷹多食縣幹鷹之入養者稍割犬肉以飼之至數日乃死又於華林園立貧窮村舍帝自弊衣為丐食兒又為窮兒之市躬自交易嘗築西鄙諸城使人衣黑衣為羌兵鼓譟陵之親率內參臨拒或實彎弓射人自晉陽東巡單馬馳騖衣解髮散而歸又好不急之務曾一夜索蝎及旦得三升特愛非時之物取求火急皆須朝徵夕辦當勢者因之貸一而責十焉賦斂日重徭役日煩人力既殫帑藏空竭乃賜諸佞幸賣官或得郡兩三或得縣六七各分州郡下逮鄉官亦多降中者故有敕用州主簿敕用郡功曹於是州縣職司多出富商大賈競為貪縱人不聊生爰自鄴都及諸州郡所在徴稅百端俱起凡此諸役皆漸於武成至帝而增廣焉然未嘗有帷薄淫穢唯此事頗優於武成云初河清末武成夢大蝟攻破鄴城故索境內蝟膏以絶之識者以後主名聲與蝟相協亡齊之徵也又婦人皆翦剔以著假髻而危邪之狀有如飛鳥至於南面則髻心正西始自宮內為之後乃被於四逺天意若曰元首翦落危側當走西也又為刀子者刃皆狹細名曰盡勢遊童戲者好以兩手持繩拂地而却上跳且唱曰高末高末之言蓋高氏運祚之末也然則亂亡之數蓋有兆云後主武平七年周師至則以七年為隆化元年而國人立安德王延宗改元德昌後主復傳位於幼主改元承光後主即位七年右北齊自文宣帝至後主五帝凡二十八年為周所滅通志卷十六
