body:
  text: 通志卷十上宋右廸功郎鄭樵漁仲撰晉紀宣帝景帝文帝武帝惠帝懷帝愍帝宣皇帝諱懿字仲達河内溫縣孝敬里人姓司馬氏其先出自帝髙陽之子重黎為夏官祝融歴唐虞夏商世序其職及商以夏官為司馬其後程伯休父周宣王時以世官克平徐方錫以官族因而為氏楚漢間司馬卬為趙將與諸侯伐秦秦亡立為殷王都河内漢以其地為郡子孫遂家焉自卬八世生征西將軍鈞字叔平鈞生豫章太守量字公度量生潁川太守雋字元異雋生京兆尹防字建公帝即防之第二子也少有奇節聰朗多大略博學洽聞伏膺儒敎漢末大亂常慨然有憂天下心南郡太守同郡楊俊名知人見帝未弱冠以為非常之器尚書清河崔琰與帝兄朗善亦謂朗曰君弟聰亮明允剛斷英特非子所及也漢建安六年郡舉上計掾魏武帝為司空聞而辟之帝知漢運方微不欲屈節曹氏辭以風痺不能起居魏武使人夜往密刺之帝堅臥不動及魏武為丞相又辟為文學掾勑行者曰若復盤桓便收之帝懼而就職於是使與太子游處遷黄門侍郎轉議郎丞相東曹屬尋轉主簿從討張魯言於魏武曰劉備以詐力虜劉璋蜀人未附而逺爭江陵此機不可失也今若曜威漢中益州震動進兵臨之勢必瓦解因此之勢易為功力聖人不能違時亦不失時矣魏武曰人苦無足既得隴右復欲得蜀言竟不從既而從討孫權破之軍還權遣使乞降上表稱臣陳說天命魏武帝曰此兒欲踞吾著爐炭上邪答曰漢運垂終殿下十分天下而有其九以服事之權之稱臣天人之意也虞夏殷周不以謙讓者畏天知命也魏國既建遷太子中庶子每與大謀輙有奇策為太子所信重與陳羣吳質朱鑠號曰四友遷為軍司馬言於魏武曰昔箕子陳謀以食為首今天下不耕者蓋二十餘萬非經國逺籌也雖戎甲未卷自宜且耕且守魏武納之於是務農積穀國用豐贍帝又言荆州刺史胡修粗暴南鄉太守傅方驕奢並不可居邊魏武不之察及蜀將關羽圍曹仁於樊于禁等七軍皆没修方果降羽而仁圍甚急焉是時漢帝都許昌魏武以為近賊欲徙河北帝諫曰禁等為水所没非戰守之所失於國家大計未有所損而便遷都既示敵以弱又淮沔之人大不安矣孫權劉備外親内疏羽之得意權所不願也可喻權所令掎其後則樊圍自解魏武從之權果遣將呂䝉西襲公安㧞之羽遂為䝉所獲魏武以荆州遺黎及屯田在潁川者逼近南冦皆欲徙之帝曰荆楚輕銳易動難安關羽新破諸為惡者藏竄觀望今徙其善者既傷其意將令去者不敢復還從之其後諸亡者悉復業及魏武薨於洛陽朝野危懼帝綱紀䘮事内外肅然乃奉梓宮還鄴魏文帝即位封河津亭侯轉丞相長史㑹孫權帥兵西過朝議以樊襄陽無穀不可以禦冦時曹仁鎮襄陽請召仁還宛帝曰孫權新破關羽此其欲自結之時也必不敢為患襄陽水陸之衝禦冦要害不可棄也言竟不從仁遂焚棄二城權果不為寇魏文悔之及魏受漢禪以帝為尚書頃之轉督軍御史中丞封安國鄉侯黄初二年督軍官罷遷侍中尚書右僕射五年天子南廵觀兵吳疆帝留鎮許昌改封向鄉侯轉撫軍假節領兵五千加給事中錄尚書事帝固辭天子曰吾於庶事以夜繼晝無須臾寧息此非以為榮乃分憂耳六年天子復大興舟師征吳復命帝居守内鎭百姓外供軍資臨行詔曰吾深以後事為念故以委卿曹參雖有戰功而蕭何為重使吾無西顧之憂不亦可乎天子自廣陵還洛陽詔帝曰吾東撫軍當總西事吾西撫軍當總東事於是帝留鎭許昌及天子疾篤帝與曹眞陳羣等見於崇華殿之南堂並受顧命輔政詔太子曰有間此三公者愼勿疑之明帝即位改封舞陽侯及孫權圍江夏遣其將諸葛瑾張霸并攻襄陽帝督諸軍討權走之進擊敗瑾斬霸并首級千餘遷驃騎將軍太和元年六月天子詔帝屯於宛加督荆豫二州諸軍事初蜀將孟達之降也魏朝遇之甚厚帝以達言行傾巧不可任驟諫不見聽乃以達領新城太守封侯假節達於是連吳固蜀潛圖中國蜀相諸葛亮惡其反覆又慮其為患達與魏興太守申儀有隙亮欲促其事乃遣郭模詐降過儀因漏泄其謀達聞其謀漏泄將舉兵帝恐達速發以書喻之曰将軍昔棄劉備託身國家國家委将軍以疆塲之任佐將軍以圖蜀之事可謂心貫白日蜀人愚智莫不切齒於将軍諸葛亮欲相破惟苦無路耳模之所言非小事也亮豈輕之而令宣露此殆易知耳達得書大喜猶與不决帝乃潛軍進討諸將言達與二賊交搆宜觀望而後動帝曰達無信義此其相疑之時也當及其未定促决之乃倍道兼行八日到其城下吳蜀各遣其將向西城安橋木闌塞以救達帝分諸將以拒之初達與亮書曰宛去洛八百里去吾一千二百里聞吾舉事當表上天子比相反覆一月間也則吾城已固諸軍足辦則吾所在深險司馬公必不自來諸將來吾無患矣及兵到達又告亮曰吾舉事八日而兵至城下何其神速也上庸城三面阻水達於城外為木柵以自固帝渡水破其柵直造城下八道攻之旬有六日達甥鄧賢将李輔等開門出降斬達傳首京師俘獲萬餘人振旅還於宛乃勸農桑禁浮費南土悅附焉初申儀久在魏興専威疆塲輙承制刻印多所假授達既誅有自疑心時諸郡守以帝新克㨗奉禮求賀皆聽之帝使人諷儀儀至問承制狀執之歸於京師又徙孟達餘衆七千餘家於幽州蜀將姚静鄭他等帥其屬七千餘人來降時邊郡新附多無戸名魏朝欲加隠實屬帝朝于京師天子訪之於帝帝對曰賊以密網束下故下棄之宜𢎞以大綱則自然安樂又問二虜宜討何者為先對曰吳以中國不習水戰故敢散居東關凡攻敵必扼其㗋而摏其心夏口東關賊之心㗋若為陸軍以向皖城引權東下為水戰軍向夏口乗其虛而擊之此神兵從天而墮破之必矣天子並然之復命帝屯于宛四年遷大將軍加大都督假黄鉞與曹眞伐蜀帝自西城斫山開道水陸並進泝沔而上至于朐䏰上音蠢下如允反㧞其新豐縣軍次丹口遇雨班師明年諸葛亮冦天水圍將軍賈嗣魏平於祁山天子曰西方有事非君莫可付者乃使帝西屯長安都督雍梁二州諸軍事統車騎將軍張郃後将軍費曜征蜀䕶軍戴淩雍州刺史郭淮等討亮張郃勸帝分軍住雍郿為後鎭帝曰料前軍獨能當之者將軍言是也若不能當而分為前後此楚之三軍所以為黥布擒也遂進軍隃麋亮聞大軍且至乃自帥衆將芟上邽之麥諸將皆懼帝曰亮慮多決少必安營自固然後芟麥吾得二日兼行足矣於是卷甲晨夜赴之亮望塵而遁帝曰吾倍道疲勞此曉兵者之所貪也亮不敢據渭水此易與耳進次漢陽與亮相遇帝列陣以待之使將牛金輕騎餌之兵才接而亮退追至祁山亮屯鹵城據南北二山斷水為重圍帝攻㧞其圍亮宵遁追擊破之俘斬萬計天子使使者勞軍増封邑時軍師杜襲督軍薛悌皆言明年麥熟亮必為冦隴右無穀宜及冬豫運帝曰亮再出祁山一攻陳倉挫衂而反縱其後出不復攻城當求野戰必在隴東不在西也亮每以糧少為恨歸必積穀以吾料之非三稔不能動矣於是表徙冀州農夫佃上邽興京兆天水南安監冶青龍元年穿成國渠築臨晉陂溉田數千頃國以充實焉二年亮又帥衆十餘萬出斜谷壘于郿之渭水南原天子憂之遣征蜀䕶軍秦朗督歩騎二萬受帝節度諸將欲注渭北以待之帝曰百姓積聚皆在渭南此必爭之地也遂引軍而濟背水為壘因謂諸將曰亮若勇者當出武功依山而東若西上五丈原則諸軍無事矣亮果上原將北渡渭帝遣将軍周當屯陽遂以餌之數日亮不動帝曰亮欲爭原而不向陽遂此意可知也遣將軍胡遵雍州刺史郭淮共備陽遂與亮㑹于積石臨原而戰亮不得進還于五丈原㑹有長星墜亮之營帝知其必敗遣奇兵掎亮之後斬五百餘級獲生口千餘降者六百餘人時朝廷以亮僑軍逺冦利在急戰每命帝持重以候其變亮數挑戰帝不出因遺帝巾幗婦人之飾帝怒表請決戰天子不許乃遣骨鯁臣衞尉辛毗杖節為軍師以制之後亮復來挑戰帝將出兵以應之毗杖節而立軍門帝乃止初蜀將姜維聞毗來謂亮曰辛毗杖節而至賊不復出矣亮曰彼本無戰心所以固請者以示武於其衆耳將在軍君命有所不受茍能制吾豈千里而請戰耶帝弟孚書問軍事帝復書曰亮志大而不見機多謀而少決好兵而無權雖提卒十萬已墮吾畫中破之必矣與之對壘百餘日㑹亮病卒諸將燒營遁走百姓奔告帝出兵追之亮長史楊儀反旗鳴鼓若將距帝者帝以窮冦不之逼於是楊儀結陣而去經日帝乃行其營壘觀其遺事獲其圖書糧穀甚衆帝審其必死曰天下奇才也辛毗以為尚未可知帝曰軍家所重軍書密計兵馬糧穀今皆棄之豈有人捐其五藏而可以生乎宜急追之關中多蒺藜帝使軍士二千人著軟材平底木屐前行蒺藜悉著屐然後馬歩俱進追到赤岸乃知亮死審問時百姓為之諺曰死諸葛走生仲達帝聞而笑曰吾便料生不便料死故也先是亮使至帝問曰諸葛公起居何如食可幾米對曰三四升次問政事曰二十罰已上皆自省覽帝既而告人曰諸葛孔明其能久乎竟如其言亮部將楊儀魏延爭權儀斬延并其衆帝欲乘隙而進有詔不許三年遷太尉累増封邑蜀將馬岱入冦帝遣將軍牛金擊走之斬千餘級武都氐王符䨇彊端帥其屬六千餘人來降關東飢帝運長安粟五百萬斛輸于京師四年獲白鹿獻之天子歸羙於帝及遼東太守公孫淵反詔徵帝詣京師天子曰此不足以勞君事欲必克故以相煩耳君度其作何計對曰棄城預走上計也據遼水以拒大軍次計也坐守襄平此成擒耳天子曰其計將安出對曰惟明者能深度彼已豫有所棄此非其所及也今懸軍遠征將謂不能持久必先距遼水而後守此中下計也天子曰往還幾時對曰往百日還百日攻百日以六十日為休息一年足矣是時百姓饑弊天子将大修宮室帝將即戎諫請息役天子納焉景初二年帥牛金胡遵等歩騎四萬發自京師車駕送出西明門詔弟孚子師送過溫賜以穀帛牛酒勅郡守典農已下皆往㑹焉見父老故舊讌飲累日遂進師經孤竹越碣石次軍于遼水淵果遣步騎數萬阻遼隧堅壁而守南北六七十里以距帝帝盛兵多張旗幟出其南賊盡銳赴之乃泛舟潛濟以出其北與賊營相逼沉舟焚梁傍遼水作長圍棄賊而向襄平諸將言曰不攻賊而作圍非所以示衆也帝曰賊堅營髙壘欲以老吾兵也攻之正入其計此王邑所以恥過昆陽也古人曰敵雖髙壘不得不與我戰者攻其所以救也賊大衆在此則巢窟虛矣我直指襄平必人懷内懼懼而求戰破之必矣遂整陣而過賊見兵出其後果邀之帝謂諸將曰所以不攻其營正欲致此不可失也乃縱兵逆擊大破之三戰皆㨗賊保固襄平進軍圍之初淵聞魏軍之出也請救於孫權權亦出兵遙為之聲援因遺淵書曰司馬公善用兵變化若神所向無前深為弟憂之㑹霖潦大水平地數尺三軍恐欲移營帝令軍中敢有言徙者斬都督令史張静犯令斬之軍中乃定賊恃水樵牧自若諸將欲取之皆不聽司馬陳珪曰昔攻上庸八部並進晝夜不息故能一旬之半㧞堅城斬孟達今者遠來而更安緩愚竊惑焉帝曰孟達衆少而食支一年吾將士四倍於達而糧不淹月以一月圖一年安可不速以四擊一正令半解猶當為之是以不計死傷與糧競也今賊衆我寡賊饑我飽水雨乃爾功力不設雖當促之亦何所為自發京師不憂賊攻但恐賊走今賊糧垂盡而圍落未合掠其牛馬抄其樵采此故驅之走也夫兵者詭道善因事變賊憑衆恃雨故雖饑困未肯束手當示無能以安之取小利以驚之非計也朝廷聞師遇雨咸請召還天子曰司馬公臨危制變計日擒之矣既而雨止遂合圍起土山地道楯櫓鉤橦發矢石雨下晝夜攻之時有長星色白有芒鬛自襄平城西南流于東北墜于梁水城中俱震慴淵大懼乃使其所署相國王建御史大夫柳甫乞降請改圍面縳不許執建等皆斬之以檄告淵曰昔楚鄭列國而鄭伯猶肉袒牽羊而迎之孤為王人位則上公而建等欲孤解圍退舍豈楚鄭之謂邪二人老耄必傳言失㫖已相為斬之若意有未巳可更遣年少有明決者來淵復遣侍中衛演乞剋日送任帝謂演曰軍事大要有五能戰當戰不能戰當死守不能守當走餘二事惟有降與死耳汝不肯面縳此為决就死也不須送任淵乃攻南圍突出帝縱兵擊敗之斬于梁水之上星墜之所既入城立兩標以别新舊焉男子年十五以上七千餘人皆殺之以為京觀偽公卿已下皆伏誅戮其將軍畢盛等二千餘人收戸四萬口三十餘萬初淵篡其叔父恭位而囚之及將反將軍綸直賈範等苦諫淵淵皆殺之帝乃釋恭之囚封直等之墓顯其遺嗣令曰古之伐國誅其鯨鯢而已諸為淵所詿誤者皆悉原之中國人欲還舊鄉恣聽之時有兵士寒凍乞襦帝弗之與或曰幸多故襦可以賜之帝曰襦者官物人臣無私施也乃奏軍人年六十已上者罷遣千餘人將吏從軍死亡者致䘮還家遂班師天子遣使者勞軍于薊増封食昆陽并前二縣初帝至襄平夢天子枕其膝曰視吾面俛視有異於常心惡之先是詔帝便道鎭關中及次白屋有詔召帝三日之間詔書五至手詔曰間側息望到到便直排閤入視吾面帝大遽乃乗追鋒車晝夜兼行自白屋四百餘里一宿而至引入嘉福殿臥内升御牀帝流涕問疾天子執帝手以齊王託帝命與大將軍曹爽並受遺詔輔少主及齊王即帝位遷侍中持節都督中外諸軍錄尚書事與爽各統兵三千人共執朝政更直殿中乘輿入殿爽欲使尚書奏事先由已乃言於天子徙帝為大司馬朝議以為前後大司馬累薨於位乃以帝為太傅入殿不趨贊拜不名劒履上殿如漢蕭何故事嫁娶䘮葬取給於官以世子師為散騎常侍子弟三人為列侯四人為騎都尉帝固讓子弟官不受魏正始元年春正月東倭重譯入貢焉耆危須諸國弱水以南鮮卑名王皆遣使來獻天子歸羙宰輔又増帝封邑初魏明帝好修宮室制度靡麗百姓苦之帝自遼東還役者猶萬餘人雕玩之物動以千計至是皆奏罷之節用務農天下欣賴焉二年夏五月吳將全琮冦芍陂朱然孫倫圍樊城諸葛瑾歩隲掠柤中帝請自討之議者咸言賊逺來圍樊不可卒㧞挫於堅城之下有自破之勢宜長策以御之帝曰邊城受敵而安坐廟堂疆埸騷動衆心疑惑是社稷之大憂也六月乃督諸軍南征車駕送出津陽門帝以南方暑濕不冝持久使輕騎挑之然不敢動於是休戰士簡精銳募先登申號令示必攻之勢吳軍夜遁走追至三州口斬獲萬餘人取其舟船軍資而還天子遣侍中常侍勞軍于宛秋七月増封食郾臨潁并前四縣邑萬戸子弟十一人皆為列侯帝勲德日盛而謙㳟愈甚以太常常林鄉邑舊齒見之每拜恒戒子弟曰盛滿者道家之所忌四時猶有推移吾何德以堪之損之又損之庶可以免乎三年春天子追封謚皇考京兆尹為舞陽成侯三月奏穿廣漕渠引河入汴溉東南諸陂始大佃於淮北先是吳遣將諸葛恪屯皖邊鄙苦之帝欲自擊恪議者多以賊據堅城積穀欲引致官兵今懸軍逺攻其救必至進退不易未見其便帝曰賊之所長者水也今攻城以觀其變若用其所長棄城奔走此為廟勝也若敢固守湖水冬淺船不得行勢必棄水相救由其所短亦吾利也四年秋九月帝督諸軍擊諸葛恪車駕送出津陽門軍次于舒恪焚燒積聚棄城而遁帝以滅賊之要在於積穀乃大興屯守廣開淮陽百尺二渠又修諸陂於潁之南北萬餘頃自是淮北倉庾相望壽陽至于京師農官屯兵連屬焉五年春正月帝至自淮南天子使持節勞軍尚書鄧颺李勝等欲令曹爽建立功名勸使伐蜀帝止之不可爽果無功而還六年秋八月曹爽毁中壘中堅營以兵屬其弟中領軍羲帝以先帝舊制禁之不可冬十二月天子詔帝朝㑹乗輿升殿七年春正月吳冦柤中夷夏萬餘家避冦北渡沔帝以沔南近賊若百姓奔還必復致冦宜權留之曹爽曰今不能修守沔南而留百姓非長策也帝曰不然凡物致之安地則安危地則危故兵書曰成敗形也安危勢也形勢御衆之要不可以不審設令賊以二萬人斷沔水三萬人與沔南諸軍相持萬人陸梁柤中將何以救之爽不從卒令還南賊果襲破柤中所失萬計八年夏四月夫人張氏薨曹爽用何宴鄧颺丁謐之謀遷太后於永寧宮専擅朝政兄弟並典禁兵多樹親黨屢改制度帝不能禁於是與爽有隙五月帝稱疾不與政事時人為之謠曰何鄧丁亂京城九年春三月黄門張當私出掖庭才人石英等十一人與曹爽為伎人爽晏謂帝疾篤遂有無君之心與當密謀圖危社稷期有日矣帝亦潛為之備爽之徒屬亦頗疑帝㑹河南尹李勝將莅荆州來候帝帝偽稱疾亟示以羸形言語錯繆勝不能覺謂為信然歸以告爽爽等不復設備嘉平元年春正月甲午天子謁髙平陵爽兄弟皆從是日太白襲月帝於是奏永寧太后廢爽兄弟時景帝為中䕶軍將兵屯司馬門帝列陣闕下假司徒髙柔節行大將軍事領曹爽營命太僕王觀行中領軍攝羲營帝親率太尉蔣濟等勒兵出迎天子屯于洛水浮橋上奏暴爽罪惡以皇太后勑罷爽及羲訓吏兵各以本官侯就第爽得奏不通留駕宿伊水城南帝之舉事也大司農桓範出赴爽範勸爽奉天子幸許昌移檄徴天下兵爽不能用而帝遣人諭爽以事止免官仍指洛水為誓爽信之遂罷兵而通帝奏語具曹爽傳中既而有司劾黄門張當以所擇才人與爽并發爽與何晏等反事收爽兄弟及其黨何晏丁謐鄧颺李勝畢軌桓範等誅之初爽司馬魯芝主簿楊綜亦斬關赴爽及爽之將歸罪也芝綜泣諫以為不可至是有司奏收芝綜帝赦之曰以勸事君者二月天子以帝為丞相増封潁川之繁昌鄢陵新汲父城并前八縣邑二萬戸奏事不名固讓丞相冬十二月加九錫之禮朝㑹不拜固讓九錫二年春正月天子命帝立廟于洛陽置左右長史増掾屬舍人滿十人歲舉掾屬任御史秀才各一人増官騎百人鼓吹十四人封子肜平樂亭侯倫安樂亭侯帝以久疾不任朝政每有大事天子親幸第以諮訪焉兖州刺史令狐愚太尉王凌貳於帝謀立楚王彪三年春正月王淩詐言吳人塞涂水請發兵以討之帝潛知其計不聽夏四月帝自帥中軍汎舟沿流九日而到甘城淩計無所出乃迎于武邱面縛水次曰淩若有罪公當折簡召淩何苦自來邪帝曰以君非折簡之客故耳即以淩歸于京師道經賈逵廟淩呼曰賈梁道王淩是大魏之忠臣惟爾有神知之至項仰鴆而死收其餘黨皆夷三族并殺彪悉錄魏諸王公置于鄴命有司監察不得交關天子遣侍中王誕持節勞軍于五池帝至自甘城天子又使兼大鴻臚太僕庾嶷持節策命帝為相國封安平郡公孫及兄子各一人為列侯前後食邑五萬戸侯者十九人固讓相國郡公不受六月帝寢疾夢賈逵王淩為祟甚惡之秋八月戊寅崩于京師時年七十三天子素服臨弔喪葬威儀依漢霍光故事追贈相國郡公弟孚表陳先志辭郡公及轀輬車九月庚申葬于河隂謚曰文貞後改謚文宣先是預作終制於首陽山為土藏不墳不樹作顧命三篇歛以時服不設明器後終者不得合葬一如遺命晉國初建追尊曰宣王武帝受禪尊號曰宣皇帝陵曰髙原廟稱髙祖帝内忌而外寛猜忌多權變魏武察帝有雄豪志聞有狼顧相欲驗之乃召使前行令反顧面正向後而身不動又嘗夢三馬同食一槽甚惡焉因謂太子丕曰司馬懿非人臣也必預汝家事太子素與帝善每相全佑故免帝於是勤於吏職夜以忘寝至於芻牧之間悉皆臨履由是魏武意遂安及平公孫淵後大行殺戮誅曹爽之際支黨皆夷三族男女無少長姑姊妹女子之適人者皆殺之既而竟遷魏鼎云明帝時王導侍坐帝問前世所以得天下導乃陳帝創業之始及文帝末髙貴鄉公事明帝以面覆牀曰若如公言晉祚復安得長逺迹其猜忍葢有符於狼顧也景皇帝諱師字子元宣帝長子也雅有風彩沉毅多大略少流美譽與夏侯元何晏齊名晏常稱曰惟幾也能成天下之務司馬子元是也魏景初中拜散騎常侍累遷中䕶軍為選用之法舉不越功吏無私焉宣穆皇后崩居䘮以至孝聞宣帝之將誅曹爽深謀秘策獨與帝潛畫文帝弗之知也將發夕乃告之既而使人覘之帝寝如常而文帝不能安席晨㑹兵司馬門鎭静内外置陣甚整宣帝曰此子竟可也初帝隂養死士三千散在人間至是一朝而集衆莫知所出也事平以功封長平鄉侯食邑千戸尋加衞將軍及宣帝薨議者咸云伊尹既卒伊陟嗣事天子命帝以輔軍大將軍輔政魏嘉平四年春正月遷大將軍加侍中持節都督中外諸軍錄尚書事命百官舉賢才明少長䘏窮獨理廢滯於是諸葛誕毋邱儉王昶陳泰胡􅀢都督四方王基州泰鄧艾石苞典州郡盧毓李豐掌選舉傅嘏虞松參計謀鍾㑹夏侯元王肅陳本孟康趙酆張緝預朝議四海傾注朝野肅然或有請改易制度者帝曰不識不知順帝之則詩人之美也三祖典制所宜遵奉自非軍事不得妄有改革五年夏五月吳太傅諸葛恪圍新城朝議慮其分兵以冦淮泗欲戍諸水口帝曰諸葛恪新得政於吳欲徼一時之利并兵合肥以冀萬一不暇復為青徐患也且水口非一多戍則用兵衆少戍則不足以禦冦恪果并力合肥卒如所度帝於是使鎭東將軍毋邱儉揚州刺史文欽等拒之儉欽請戰帝曰恪卷甲深入投兵死地其鋒未易當且新城小而固攻之未可㧞遂命諸將髙壘以待之相持數月恪攻城力屈死傷大半帝乃勅欽督銳卒趣合榆要其歸路儉帥諸將以為後繼恪懼而遁欽逆擊大破之斬首萬餘級正元元年春正月天子與中書令李豐后父光祿大夫張緝黄門監蘇鑠永寧署令樂敦冗從僕射劉寳賢等謀以太常夏侯元代帝輔政帝密知之使舍人王羡以車迎豐豐見廹隨羡而至帝數之豐知禍及因肆惡言帝怒遣勇士以刀鐶築殺之逮捕元緝等皆夷三族三月乃諷天子廢皇后張氏因下詔曰姦臣李豐等靖譖庸回隂構凶慝大將軍紏䖍天刑致之誅辟周勃之克呂氏霍光之擒上官曷以過之其増邑九千戸并前四萬帝讓不受天子以元緝之誅深不自安而帝亦慮難作潛謀廢立乃密諷魏永寧太后秋九月甲戍太后下令以皇帝耽滛女寵䙝近倡優隳人倫之序亂男女之節將危社稷不可以奉宗廟帝召羣臣㑹議流涕曰太后令如是諸君其如王室何咸曰伊尹放太甲以寧殷霍光廢昌邑以安漢權定社稷以清四海二代行之於古明公當之於今今日之事惟命是從帝曰諸君見望者重安敢避之乃與羣公卿士共奏太后曰臣聞天子者所以濟肓羣生永安萬國皇帝春秋已長未親萬機日使小優郭懷袁信等裸袒滛戲又觀廣望觀下作遼東妖婦道路行人莫不掩目清商令令狐景諫帝帝燒鐵炙之太后遭合陽君䘮帝嬉樂自若清商丞龎熙諫帝帝弗聽太后還北宮殺張美人帝甚恚望熙諫帝怒復以彈彈熙每文書入帝不省視太后令帝在式乾殿講學帝又不從不可以承天序臣請依霍光故事收皇帝璽綬以齊王歸藩奏可於是有司以太牢策告宗廟王就乗輿副車羣臣從至西掖門帝泣曰先臣受歴世殊遇先帝臨崩託以遺詔臣復忝重任不能獻可替否羣公卿士逺惟舊典為社稷深計寧負聖躬使宗廟血食於是使使者持節衞送舍河内之重門誅郭懷袁信等是日與羣臣議所立帝曰方今宇宙未清二虜爭衡四海之主惟在賢哲彭城王據太祖之子以賢則仁聖明允以年則皇室之長天位至重不得其才不足以寧濟六合乃與羣公奏太后太后以彭城王先帝諸父於昭穆之序為不次則歴祖之世永無承嗣東海定王明帝之弟欲立其子髙貴鄉公髦帝固爭不獲乃從太后令遣使迎髙貴鄉公於元城而立之改元曰正元天子受璽墮舉趾髙帝聞而憂之及將大㑹帝訓於天子曰夫聖王重始正本敬初古人所愼也明當大㑹萬衆瞻穆穆之容公卿聽玉振之音詩云示民不佻是則是效易曰出其言善則千里之外應之雖禮儀周備猶宜加之以祗恪以副四海顒顒式仰癸巳天子詔帝登位相國増邑九千并前四萬戸進號大都督假黄鉞入朝不趨奏事不名劔履上殿賜錢五十萬帛五千匹以彰元勲帝固辭相國又上書訓於天子謂冝留心道藝以養成聖質時天子頗修華飾帝復諫以為當崇樸素並敬納焉十一月有白氣經天二年春正月有彗星見于吳楚之分西北竟天鎭東大將軍毋邱儉揚州刺史文欽舉兵作亂矯太后令移檄郡國為壇盟於西門之外各遣子四人質于吳以請救二月儉欽帥衆六萬渡淮而西帝㑹公卿謀征討計朝議多謂可遣諸将擊之惟王肅及尚書傅嘏中書侍郎鍾㑹勸帝自行戍午帝統中軍歩騎十餘萬以征之倍道兼行召三方兵大㑹于陳許之郊甲申次于㶏橋儉将史招李續相次來降儉欽移入項城帝遣荆州刺史王基進㨿南頓以逼儉帝深壁髙壘以待東軍之集諸将請進軍攻其城帝曰諸君得其一未知其二淮南将士本無反志且儉欽欲蹈縱横之迹習儀秦之說謂逺近必應而事起之日淮北不從史招李續前後瓦解内乖外叛自知必敗困獸思鬭速戰更合其志雖云必剋傷人亦多且儉等欺誑將士詭變萬端小與持久詐情自露此不戰而剋之也乃遣諸葛誕督豫州諸軍自安風向夀春征東將軍胡遵督青徐諸軍出譙宋之間絕其歸路帝屯汝陽遣兖州刺史鄧艾督太山諸軍進屯樂嘉示弱以誘之欽進軍將攻艾帝潛軍銜枚徑造樂嘉與欽相遇欽子鴦年十八勇冠三軍謂欽曰及其未定請登城鼓譟擊之可破也既謀而行鴦三譟而欽不能應鴦退相與引而東帝謂諸將曰欽走矣命發銳軍以追之諸將皆曰欽舊將鴦少而銳引軍内入未有失利必不走也帝曰一鼔作氣再而衰三而竭鴦三鼔欽不應其勢已屈不走何待欽將遁鴦曰不先折其勢不得去也乃與驍騎十餘摧鋒犯陣所向皆披靡遂引去帝遣左長史司馬璉督驍騎八千翼而追之使將軍樂綝等督步兵繼其後比至沙陽頻䧟欽陣弩矢雨下欽䝉楯而馳大破其軍衆皆投戈而降欽父子與麾下走保項儉聞欽敗棄衆宵遁淮南安風津都尉追儉斬之傳首京師欽遂奔吳淮南平初帝目有瘤疾使醫割之鴦之來攻也驚而目出懼六軍之恐䝉之以被痛甚囓被敗而左右莫知焉閏月疾篤使文帝總統諸軍辛亥崩于許昌時年四十八二月帝之䘮至自許昌天子素服臨弔詔依霍光故事追加大司馬之號以冠軍大將軍増邑五萬戸謚曰武公文帝表讓曰臣亡父不敢受丞相相國九命之禮亡兄不敢受相國之位誠以太祖常所階歴也今謚與二祖同必所祗懼昔蕭何張良霍光咸有匡佐之功何謚文終良謚文成光謚宣成必以文武為謚請依何等就加詔許之謚曰忠武晉國既建追尊曰景王武帝受禪上尊號曰景皇帝陵曰峻平廟稱世宗文皇帝諱昭字子上景帝之母弟也魏景初三年封新城鄉侯正始初為洛陽典農中郎将値魏明奢侈之後帝蠲除苛碎不奪農時百姓大悅轉散騎常侍大將軍曹爽之伐蜀也以帝為征蜀將軍副夏侯元出駱谷次于興勢蜀將王林夜襲帝營帝堅臥不動林退帝謂元曰費褘以據險距守進不獲戰攻之不可宜亟旋軍以為後圖爽等引旋褘果馳兵趣三嶺爭險乃得過遂還拜議郎及誅曹爽帥衆衞二宮以功増邑千戸蜀將姜維之冦隴右也征西將軍郭淮自長安距之進帝位安西將軍持節屯關中為諸軍節度淮攻維别將句安於麴久而不決帝乃進據長城南趣駱谷以疑之維懼退保南鄭安軍絶援帥衆來降轉安東將軍持節鎭許昌及大軍討王淩帝督淮北諸軍事帥師㑹于項増食邑三百戸假金印紫綬尋進號都督統征東將軍胡遵鎭東將軍諸葛誕伐吳戰于東關二軍敗績坐失侯蜀將姜維又冦隴右揚聲欲攻狄道以帝行征西將軍次長安雍州刺史陳泰欲先賊據狄道帝曰姜維攻羌收其質任聚穀作邸閣訖而復轉行至此正欲了塞外諸羌為後年之資耳若實向狄道安肯宣露令外人知今揚聲言出此欲歸也維果燒營而去㑹新平羌胡叛帝擊破之遂耀兵靈州北虜震讋叛者悉降以功復封新城鄉侯髙貴鄉公之立也以參定策進封髙都侯増封二千戸毋邱儉文欽之亂大軍東征帝兼中領軍留鎭洛陽及景帝疾篤帝自京師省疾拜衞將軍景帝崩天子命帝鎭許昌尚書傅嘏帥六軍還京師帝用嘏及鍾㑹策自帥六軍而還至洛陽進位大將軍加侍中都督中外諸軍錄尚書事輔政劔履上殿帝固辭不受甘露元年春正月加大都督奏事不名夏六月進封髙都公地方七百里加之九錫假斧鉞進號大都督劔履上殿又固辭不受秋八月庚申加假黄鉞増封三縣二年夏五月辛未鎭東大將軍諸葛誕殺揚州刺史樂綝以淮南作亂遣子靚為質於吳以請救議者請速伐之帝曰誕以毋邱儉輕疾傾覆今必外連吳冦此為變大而遲吾當與四方同力以全勝制之乃率諸軍五十萬討誕表請天子臨戎秋七月奉天子及皇太后東征徴兵青徐荆豫分取關中游軍皆㑹淮北師次于項假廷尉何楨節使淮南宣慰將士申明逆順示以誅賞甲戍帝進軍邱頭吳使文欽唐咨全端全懌等三萬餘人來救誕諸將逆擊不能禦將軍李廣臨敵不進泰山太守常時稱疾不出並斬之以狥八月吳将朱異帥兵萬餘人留輜重於都陸輕兵至黎漿監軍石苞兖州刺史州泰禦之異退泰山太守胡烈以奇兵襲都陸焚其糧運苞泰復進擊異大破之異之餘卒餒甚食葛葉而遁吳人殺異帝曰異不得至壽春非其罪也而吳人殺之適足以謝壽春而堅誕意使其猶望救耳若其不爾彼當突圍決一旦之命或謂大軍不能久省食減口冀有他變料賊之情不出此三者今當多方以亂之備其越逸此勝計也因命合圍分遣羸疾就穀淮北廩軍士大豆人三升欽聞之果喜帝愈為羸形以示之多縱反間揚言吴救方至誕等益寛恣食俄而城中乏糧石苞王基並請攻之帝曰誕之逆謀非一朝一夕也聚糧完備外結吴人自謂足據淮南欽既同惡相濟必不便走今若急攻之損游軍之力外冦卒至表裏受敵此危道也今三叛相聚於孤城之中天其或者將使同戮吾當以長策縻之但堅守三面若賊陸道而來軍糧必少吾以游兵輕騎絶其轉輸可不戰而破外賊外賊破欽等必成擒矣全懌母孫權女也得罪於吳全端兄子褘及儀奉其母來奔儀兄靜時在壽春用鍾㑹計作褘儀書以譎靜静兄弟五人帥其衆來降城中大駭三年春正月壬寅誕欽等出攻長圍諸軍逆擊走之初誕欽内不相協及至窮蹙轉相疑貳㑹欽計事與誕忤誕挺刄殺欽欽子鴦攻誕不克踰城降以為將軍封侯使鴦廵城而呼帝見城上持弓者不發謂諸将曰可攻矣二月乙酉攻而㧞之斬誕夷三族吴將唐咨孫曼孫彌徐韶等帥其屬皆降表加爵位廪其餒疾或言吴兵必不為用請坑之帝曰就令亡還適見中國之𢎞耳於是徙之三河夏四月歸于京師魏帝命改邱頭曰武邱以旌武功五月天子以并州之太原上黨西河樂平新興鴈門司州之河東平陽八郡地方七百里封帝為晉公加九錫進位相國晉國置官司焉九讓乃止於是増邑萬戸食三縣諸子之無爵者皆封列侯秋七月奏錄先世名臣元功大勲之子隨才叙用四年夏六月分荆州置二都督王基鎭新野州泰鎭襄陽使石苞都督揚州陳騫都督豫州鍾毓都督徐州宋鈞監青州諸軍事景元元年夏四月天子復命帝爵秩如前又讓不受天子既以帝三世宰輔政非已出情不能安又慮廢辱將臨軒召百僚而行放黜五月戊子夜使冗從僕射李昭等發甲於凌雲臺召侍中王沉散騎常侍王業尚書王經出懷中黄素詔示之戒嚴俟旦沉業馳告于帝帝召䕶軍賈充等為之備天子知事泄帥左右攻相府稱有所討敢有動者族誅相府兵將止不敢戰賈充叱太子舍人成濟以戈刺天子天子崩車中帝召百僚謀其故僕射陳泰曰唯有斬賈充微有以謝天下帝不聽獨歸罪於成濟而斬之語具髙貴鄉公紀中於是太后令曰昔漢昌邑王廢為庶人此兒亦宜以庶人之禮葬之使外内咸知其所行也殺尚書王經貳於我也庚寅帝奏曰故髙貴鄉公帥從駕人兵㧞刃鳴鼔向臣所臣懼兵刃相接即勑將士不得有所傷害違令者以軍法從事騎督成倅弟太子舍人濟入兵陣傷公至隕臣聞人臣之節有死無貳事上之義不敢逃難前者變故卒至禍同發機誠欲委身守死惟命所裁然惟本謀乃欲上危皇太后傾覆宗廟臣忝當元輔義在安國即絡繹申勑不得廹近輿輦而濟妄入陣間以致大變哀怛痛恨五内摧裂濟干國亂紀罪不容誅輙收濟家屬付廷尉太后從之夷濟三族與公卿議立燕王宇之子常道鄉公璜為帝六月改元丙辰天子進帝為相國封晉公増十郡加九錫如初羣從子弟未侯者封亭侯賜錢千萬帛萬匹固讓乃止冬十一月吳吉陽督蕭愼以書詣鎭東將軍石苞偽降求迎帝知其詐也使苞外示迎之而内為之備二年秋八月甲寅天子使太尉髙柔授帝相國印綬司空鄭冲致晉公茅土九錫帝固辭三年夏四月肅愼來獻楛矢石砮弓甲貂皮等天子命歸於大將軍府四年春二月丁丑天子復命帝如前又固讓三月詔大將軍府増置司馬一人從事中郎二人舍人十人夏帝將伐蜀乃謀衆曰自定壽春已來息役六年治兵繕甲以擬二虜略計取吴作戰船通水道當用千餘萬功此十萬人百數十日事也又南土下濕必生疾疫今宜先取蜀三年之後因巴蜀順流之勢水陸並進此滅虞定虢吞韓并魏之勢也計蜀戰士九萬居守成都及備他境不下四萬然則餘衆不過五萬今絆姜維於沓中使不得東顧直指駱谷出其空虛之地以襲漢中彼若嬰城守險兵勢必散首尾離絕舉大衆以屠城散銳卒以略野劒閣不暇守險關頭不能自存以劉禪之闇而邊城外破士女内震其亡可知也征西将軍鄧艾以為未有釁屢陳異議帝患之使主簿師纂為艾司馬以喻之艾乃奉命於是徵四方之兵十八萬使鄧艾自狄道攻姜維於沓中雍州刺史諸葛緒自祁山軍于武街絶維歸路鎭西將軍鍾㑹帥前將軍李䕶征蜀䕶軍胡烈等自駱谷襲漢中秋八月軍發洛陽大賚將士陳師誓衆將軍鄧敦謂蜀未可討帝斬以徇九月又使天水太守王頎攻維營隴西太守牽𢎞邀其前金城太守楊欣趨甘松鍾㑹分為二隊入自斜谷使李輔圍王含於樂城又使郎將易愷攻蔣斌於漢城㑹直指陽安䕶軍胡烈攻陷關城姜維聞之引還王頎追敗維於彊川維與張翼廖化合軍守劒閣鍾㑹攻之冬十月天子以諸將獻捷交至乃重申相國晉公九錫之命令公卿將校皆詣府喻㫖帝猶以禮辭讓於是司空鄭冲率羣官勸進帝乃受之十一月鄧艾帥萬餘人自隂平踰絶險至江由破蜀將諸葛瞻於緜竹斬瞻𫝊首進軍雒縣劉禪降天子命晉公以相國摠百揆於是上節傳去侍中大都督錄尚書之號焉表鄧艾為太尉鍾㑹為司徒㑹潛謀叛逆因密使譖艾咸熙元年春正月檻車徵艾乙丑帝奉天子西征次于長安是時魏諸王侯悉在鄴城命從事中郎山濤行軍司事鎮於鄴遣䕶軍賈充持節督諸軍據漢中鍾㑹遂反於蜀監軍衞瓘右将軍胡烈攻㑹斬之初㑹之代蜀也西曹屬邵悌言於帝曰鍾㑹難信不可令行帝笑曰取蜀如指掌而衆人皆言不可唯㑹與吾意同滅蜀之後中國將士人自思歸蜀之遺黎猶懷震恐縱有異志無能為也卒如所量丙辰帝至自長安三月己卯進帝爵為王増封并前二十郡夏五月癸未天子追加舞陽宣文侯為晉宣王舞陽忠武侯為晉景王秋七月帝奏司空荀顗定禮儀中䕶軍賈充正法律尚書僕射裴秀議官制太保鄭冲總而裁焉始建五等爵冬十月丁亥奏遣吴人相國參軍徐劭散騎常侍水曹屬孫彧使吳喻孫皓以平蜀之事致馬錦等物以示威懷丙午天子命中撫軍新昌鄉侯炎為晉世子二年春二月甲辰朐䏰縣獻靈龜歸於相府夏四月孫皓使紀陟來聘且獻方物五月天子命帝冕十有二旒建天子旌旗出警入蹕乗金根車駕六馬備五時副車置旄頭雲䍐樂舞八佾設鍾虡宮懸位在燕王上進王妃為王后世子為太子王女王孫爵命之號皆如帝者之儀諸禁網煩苛及法式不便於時者帝皆奏除之晉國置御史大夫侍中常侍尚書中領軍衞將軍官秋八月辛卯帝崩于露寝時年五十五九月癸酉葬崇陽陵謚曰文王武帝受禪追尊號曰文皇帝廟稱太祖武皇帝諱炎字安世文帝長子也寛惠仁厚沉深有度量魏嘉平中封北平亭侯歴給事中奉車都尉中壘将軍加散騎常侍累遷中䕶軍假節迎常道鄉公於東武陽遷中撫軍進封新昌鄉侯及晉國建立為世子拜撫軍大將軍開府副貳相國初文帝以景帝既宣帝之嫡早世無後以帝弟攸為嗣特加愛異自謂攝居相位百年之後大業宜歸攸每曰此景王之天下也吾何與焉將議立世子屬意於攸何曽等固爭曰中撫軍聰明神武有超世之才髮委地手過膝此非人臣之相也由是遂定咸熙二年五月立為晉王太子八月辛卯文帝崩太子嗣相國晉王位下令寛刑宥罪撫衆息役國内行服三日是月長人見於襄武長三丈告縣人王始曰今當太平九月戊午以魏司徒何曽為丞相鎮南將軍王沉為御史大夫中䕶軍賈充為衞將軍議郎裴秀為尚書令光祿大夫皆開府十一月初置四䕶軍以統城外諸軍乙未令諸郡中正以六條舉淹滯一曰忠恪匪躬二曰孝敬盡禮三曰友于兄弟四曰潔身勞謙五曰信義可復六曰學以為已是時晉徳既洽四海宅心於是天子知歴數有在乃使太保鄭沖奉皇帝璽綬冊禪位于帝帝初以禮讓魏朝公卿何曽王沉等固請乃從之泰始元年冬十二月丙寅設壇于南郊百僚在位及匈奴南單于四夷㑹者數萬人柴燎告類于上帝登壇受禪禮畢即洛陽宮幸太極前殿下詔大赦改元賜天下爵人五級鰥寡孤獨不能自存者穀人五斛復天下租賦及關市之稅一年逋債宿負皆勿收除舊嫌解禁錮亡官失爵者悉復之丁卯遣太僕劉原告于太廟封魏帝為陳留王邑萬戸居于鄴宮魏氏諸王皆為縣侯追尊宣王為宣皇帝景王為景皇帝文王為文皇帝宣王妃張氏為宣穆皇后尊太妃王氏曰皇太后宮曰崇化封皇叔祖父孚為安平王皇叔父幹為平原王亮為扶風王伷為東莞王駿為汝隂王肜為梁王倫為琅邪王皇弟攸為齊王鑒為樂安王幾為燕王皇從伯父望為義陽王皇從叔父輔為渤海王晃為下邳王瓌為太原王珪為高陽王衡為常山王子沛為沛王泰為隴西王權為彭城王綏為范陽王遂為濟南王遜為譙王睦為中山王淩為北海王斌為陳王皇從父兄洪為河間王皇從父弟楙為東平王以驃騎將軍石苞為大司馬封樂陵公車騎將軍陳騫為髙平公衞將軍賈充為車騎將軍魯公尚書令裴秀為鉅鹿公侍中荀朂為濟北公太保鄭冲為太傅壽光公太尉王祥為太保睢陵公丞相何曽為太尉朗陵公御史大夫王沉為驃騎將軍博陵公司空荀顗為臨淮公鎮北大將軍衞瓘為菑陽公其餘増封進爵各有差文武並増位二等改景初歴為泰始歴臘以酉社以丑戊辰下詔大𢎞儉約出御府珠玉玩好之物頒賜王公以下各有差置中軍將軍以統宿衞七軍己巳詔陳留王載天子旌旗備五時副車行魏正朔郊祀天地禮樂制度皆如魏舊上書不稱臣賜山陽公劉康安樂公劉禪子弟一人為駙馬都尉乙亥以安平王孚為太宰假黄鉞大都督中外諸軍事詔曰昔王淩謀廢齊王而王竟不足以守位鄧艾雖矜功失節然束手受罪今大赦其家還使立後興滅繼絶約法省刑除魏氏宗室禁錮諸將吏遭三年䘮者遣寧終䘮百姓復其徭役罷部曲將長吏以下質任省郡國御調禁樂府靡麗百戲之伎及雕文游畋之具開直言之路置諫官以掌之是月鳳凰六青龍三白龍二麒麟各一見于郡國二年春正月丙戌遣兼侍中侯史光等持節四方循省風俗除禳祝之不在祀典者丁亥有司請建七廟帝重其役不許庚寅罷鷄鳴歌辛丑尊景皇帝夫人羊氏曰景皇后宮曰𢎞訓丙午立皇后楊氏二月除漢宗室禁錮己未常山王衡薨詔曰五等之封皆錄舊勲本為縣侯者傳封次子為亭侯為鄉侯為闗内侯亭侯為關中侯皆食本戸十分之一丁丑郊祀宣皇帝以配天宗祀文皇帝於明堂以配上帝􅏤午詔曰古者百官官箴王闕然保氏獨以諫諍為職今之侍中常侍實處此位擇其能正色弼違匡救不逮者以兼此選三月戊戍吳人來弔祭有司奏為答詔帝曰昔漢文光武懷撫尉佗公孫述皆未正君臣之儀所以羈縻未賓也皓遣使之始未知國慶但以書答之夏五月戊辰詔曰陳留王操尚謙沖每事輙表非所以優崇之也主者喻意非大事皆使王官表上之壬子驃騎將軍博陵公王沉卒六月壬申濟南王遂薨秋七月辛巳營太廟致荆山之木采華山之石鑄銅柱十二塗以黄金鏤以百物綴以明珠戊戍譙王遜薨丙午晦日有食之八月丙辰省右將軍官初帝雖從漢魏之制既葬除服而深衣素冠降席撤膳哀敬如䘮者戊辰有司奏改服進膳不許遂禮終而後復吉及太后之䘮亦如之九月乙未散騎常侍皇甫陶傅元領諫官上書諫諍有司奏請寝之詔曰凡闗言人主人臣所至難而苦不能聽納自古忠臣直士之所慷慨也每陳事出付主者多從深刻乃云恩貸當由主上是何言乎其詳評議戊戍有司奏大晉繼三皇之蹤蹈舜禹之迹應天順時受禪有魏宜一用前代正朔服色皆如虞遵唐故事奏可冬十月丙午朔日有蝕之丁未詔曰昔舜葬蒼梧農不易畎禹葬成紀市不改肆上惟祖考清簡之㫖所徙陵十里内居人動為騷擾一切停之十一月己卯倭人來獻方物並圜丘方丘於南北郊二至之祀合於二郊罷山陽公國督軍除其禁制己丑追尊景帝夫人夏侯氏為景懷皇后辛卯遷祖禰神主于太廟十二月罷農官為郡縣是歲鳯凰六青龍十黄龍九麒麟各一見於郡國三年春正月癸丑白龍二見於𢎞農澠池丁卯立皇子衷為皇太子詔以近世建立太子每施寛宥朕所不取其布告天下咸使知聞三月戊寅初令二千石得終三年䘮丁未晝昏罷武衞將軍官以李憙為太子太傅大山石崩夏四月戊午張掖太守焦勝上言氐池縣大柳谷曰有元石一所白晝成文實大晉之休祥圖之以獻詔以制幣告于太廟藏之天府秋八月罷都䕶將軍其以五署還光禄勲九月甲申詔増吏俸及賜王公以下帛各有差以太尉何曽為太保義陽王望為太尉司空荀覬為司徒冬十月聽士卒遭父母䘮者非在疆塲皆得奔赴十二月徙宗聖侯孔震為奉聖亭侯山陽公劉康來朝禁星氣讖緯之學四年春正月卒未以尚書令裴秀為司空丙戍律令成封爵賜帛各有差有星孛于軫丁亥帝耕于籍田戊子詔大赦天下長吏郡丞長史各賜馬一匹二月庚子増置山陽公國相郎中令陵令雜工宰人鼔吹車馬各有差罷中軍將軍置北軍中候官甲寅以東海劉儉有至行拜為郎以中軍將軍羊祐為尚書左僕射東莞王伷為尚書右僕射三月戊子皇太后王氏崩夏四月戊戍太保睢陵公王祥薨己亥祔葬文明皇后王氏於崇陽陵罷振威揚威䕶軍官置左右積弩將軍六月甲申朔詔郡國守相廵行屬縣見長吏觀風俗協禮律考度量存問耆老親見百年錄囚徒理寃枉察政刑得失敦喻五教勸務農功勉勵學者思勤正典無為百家庸末致遠必泥士庶有好學篤道孝悌忠信清白異行者舉而進之有不孝不悌不率禮法糾而罪之若長吏廉直不飾名譽者及貪穢諂黷公節不立者並謹察之秋七月泰山石崩衆星西流戊午遣使者侯史光循行天下己卯謁崇陽陵九月青徐兖豫四州大水伊洛溢合於河開倉以振之詔曰雖詔有所欲及奏得可而於事不便者皆不可隠情冬十月吴將施績入江夏萬郁冦襄陽遣太尉義陽王望屯龍陂荆州刺史胡烈擊敗郁吴將顧容冦鬱林太守毛炅大破之斬其交州刺史劉俊將軍修則十一月吴將丁奉等出芍陂安東将軍汝隂王駿與義陽王望擊走之己未詔王公卿尹及郡國守相舉賢良方正直言之士十二月班五條詔書於郡國一曰正身二曰勤百姓三曰撫孤寡四曰敦本息末五曰去人事庚寅帝臨聽訟觀錄廷尉洛陽獄囚親平決焉扶南林邑各遣使來獻五年春正月癸巳申戒郡國計吏守相令長務盡地利禁游食商販丙申帝臨聽訟觀錄囚徒多所原遣青龍二見於滎陽二月以雍州隴右五郡及涼州之金城梁州之陽平置秦州辛巳白龍二見於趙國青徐兖三州水遣使振恤之壬寅以尚書左僕射羊祜都督荆州諸軍事征東大將軍衞瓘都督青州諸軍事東莞王伷鎮東大將軍都督徐州諸軍事丁亥詔曰古者歲書羣吏之能否三年而誅賞之諸令史前後但簡遣踈劣而無有勸進非黜陟之謂也其條勤能有稱尤異者歳以為常吾將議其功勞己未詔蜀相諸葛亮孫京隨才署吏夏四月地震五月辛邜朔鳯凰見于趙國曲赦交趾九真日南五歲刑六月鄴奚官督郭廙上疏陳五事以諫言甚切直擢為屯留令西平人麴路伐登聞鼓言多妖謗有司奏棄市帝曰朕之過也捨而不問罷鎮軍將軍復置左右將軍官秋七月延羣公詢讜言九月有星孛于紫宮冬十月丙子以汲郡太守王宏有政績賜穀千斛十一月追封謚皇弟兆為城陽哀王以皇子景度嗣十二月詔州郡舉勇猛秀異之才六年春正月丁亥朔帝臨軒不設樂吳將丁奉入渦口揚州刺史牽𢎞擊走之三月赦五歲刑已下夏四月白龍二見於東筦五月立壽安亭侯承為南宮王六月戊午秦州刺史胡烈擊叛虜於萬斛堆力戰死之詔遣尚書石鑒行安西將軍都督秦州諸軍事與奮威䕶軍田章討之秋七月丁酉復隴右五郡遇冦害者租賦不能自存者廪貸之乙巳城陽王景度薨詔曰自泰始以來大事皆撰錄秘書寫副後有其事輒宜綴集以為常丁未以汝隂王駿為鎮西大將軍都督雍涼二州諸軍事九月大宛獻汗血馬焉耆來貢方物冬十一月幸辟雍行鄉飲酒之禮賜太常博士學生帛牛酒各有差立皇子東為汝南王十二月吴夏口督前將軍孫秀帥衆來奔拜驃騎將軍開府儀同三司封㑹稽公戊辰復置鎮軍官七年春正月丙午皇太子冠賜王公帛各有差匈奴帥劉猛叛出塞二月孫皓帥衆趨壽陽遣大司馬望屯淮北以距之三月丙戍司空鉅鹿公裴秀薨癸巳以中䕶軍王業為尚書左僕射髙陽王珪為尚書右僕射孫秀部將何崇帥衆五千人來降夏四月九真太守董元為吴將虞汜所攻軍敗死之北地胡冦金城涼州刺史牽𢎞討之羣虜内叛圍𢎞於青山𢎞軍敗死之五月立皇子憲為城陽王雍梁秦三州饑赦其境内殊死以下閏月大雩太官減膳詔交趾三郡南中諸郡無出今年戸調六月詔公卿以下舉將帥各一人辛丑大司馬義陽王望薨大雨霖伊洛河溢流居人四千餘家殺三百餘人有詔振貸給棺秋七月癸酉以車騎將軍賈充為都督秦涼二州諸軍事吴將陶璜等圍交趾太守楊稷與鬱林太守毛炅及日南等三郡降於吴八月丙戍以征東大將軍衞瓘為征北大將軍都督幽州諸軍事丙申城陽王憲薨分益州之南中四郡置寧州曲赦四郡殊死以下冬十月丁丑日有蝕之十一月丁巳衞公姬署薨十二月大雪罷中領軍并北軍中侯以光祿大夫鄭袤為司空八年春正月監軍何楨討匈奴劉猛累破之左部帥李恪殺猛而降癸亥帝耕于籍田二月乙亥禁雕文綺組非法之物壬辰太宰安平王孚薨詔内外羣官舉任邊郡者各三人帝與右將軍皇甫陶論事陶與帝爭言散騎常侍鄭徽表罪之帝曰讜言謇諤所望於左右也人主常以阿媚為患豈以爭臣為損哉徽越職妄奏豈朕之意遂免徽官夏四月置後將軍以備四軍六月益州牙門張𢎞誣其刺史皇甫晏反殺之傳首京師𢎞坐伏誅夷三族壬辰大赦丙申詔復隴右四郡遇冦害者田租秋七月以車騎將軍賈充為司空九月吴西陵督歩闡來降拜衞將軍開府儀同三司封宜都公吴將陸抗攻闡遣車騎將軍羊祜率衆出江陵荆州刺史楊肇迎闡於西陵巴東監軍徐允擊建平以救闡冬十月辛未朔日有蝕之十二月肇攻抗不尅而還闡城陷為抗所禽九年春正月辛酉司空密陵侯鄭袤薨二月癸巳司徒樂陵公石苞薨立安平亭侯隆為安平王三月立皇子祗為東海王夏四月戊辰朔日有食之五月旱以太保何曽領司徒六月乙未東海王祗薨秋七月丁酉朔日有食之吴將魯淑圍弋陽征虜將軍王渾擊敗之罷五官左右中郎將𢎞訓太僕衞尉大長秋等官鮮卑冦廣寗殺略五千人詔聘公卿以下子女以備六宮采擇未畢權禁斷婚姻冬十月辛巳制女年十七父母不嫁者使長吏配之十一月丁酉臨宣武觀大閱諸軍甲辰乃罷十年春正月辛亥帝耕于籍田閏月癸酉太傅壽光公鄭冲薨己卯髙陽王珪薨庚辰太原王瓌薨丁亥詔曰嫡庶之别所以辨上下明貴賤而近世以來多皆内寵登妃后之職亂尊卑之序自今以後皆不得登用妾媵以為嫡正二月分幽州五郡置平州三月癸亥日有蝕之夏四月己未太尉臨淮公荀顗薨六月癸巳臨聽訟觀錄囚徒多所原遣是夏大蝗秋七月丙寅皇后楊氏崩壬午吴平虜將軍孟泰偏將軍王嗣等帥衆降八月涼州虜冦金城諸郡鎮西將軍汝隂王駿討之斬其帥乞文泥等戊申葬元皇后于峻陽陵九月癸亥以大將軍陳騫為太尉攻拔吴枳里城獲吴立信校尉荘祐吴將孫遵李承帥衆冦江夏太守嵇喜擊破之立河橋于富平津冬十一月立城東七里澗石橋庚午帝臨宣武觀大閱諸軍十二月有星孛于軫置籍田令立太原王子緝為髙陽王吴威北將軍嚴聰揚威將軍嚴整偏將軍朱買來降是歲鑿陜南山決河東注洛以通運漕咸寧元年春正月戊午朔大赦改元二月以將士應已娶者多家有五女者給復辛酉以故鄴令夏謖有清稱賜穀百斛以奉祿薄賜公卿以下帛有差叛虜樹機能送質請降夏五月下邳廣陵大風拔木壞虜舍六月鮮卑力微遣子來獻吴人冦江夏西域戊巳校尉馬循討叛鮮卑破之斬其渠帥戊申置太子詹事官秋七月甲申晦日有蝕之郡國螟八月壬寅沛王子文薨以故太傅鄭冲太尉荀顗司徒石苞司空裴秀驃騎将軍王沉安平獻王孚等及太保何曽司空賈充太尉陳騫中書監荀朂平南將軍羊祜齊王攸等皆列於銘饗九月甲子青州螟徐州大水冬十月乙酉常山王殷薨癸巳彭城王權薨十一月癸亥大閱於宣武觀至於己巳十二月丁亥追尊宣帝廟曰髙祖景帝曰世宗文帝曰太祖是月大疫洛陽死者大半封裴頠為鉅鹿公二年春正月以疾疫廢朝賜諸散吏至於士卒絲各有差二月丙戍河間王洪薨甲午赦五歲刑以下東夷八國歸化并州虜犯塞監并州諸軍事胡奮擊破之初敦煌太守尹璩卒州以敦煌令梁澄領太守事議郎令狐豐廢澄自領郡事豐死弟宏代之至是涼州刺史楊欣斬宏傳首洛陽先是帝不豫及瘳羣臣上壽詔曰每念頃遇疫氣死亡為之愴然豈以一身之休息忘百姓之艱邪諸上禮者皆絶之夏五月鎮西大將軍汝隂王駿討北胡斬其渠帥吐敦立國子學庚午大雩六月癸丑薦荔支於太廟甲戍有星孛於氐自春旱至於是月始雨吴京下督孫楷帥衆來降以為車騎將軍封丹陽侯白龍二見於新興井中秋七月有星孛於大角吴臨平湖自漢末壅塞至是自開父老相傳云此湖塞天下亂此湖開天下平癸丑安平王隆薨東夷十七國内附河南魏郡暴水殺百餘人詔給棺鮮卑阿羅多等寇邊西域戊巳校尉馬循討之斬首四千餘級獲生九千餘人於是來降八月庚辰河東平陽地震己亥以太保何曽為太傅太尉陳騫為大司馬司空賈充為太尉鎮軍大將軍齊王攸為司空有星孛於太微九月又孛于翼丁未起太倉於城東常平倉於東西市閠月荆州五郡水流四千餘家冬十月以汝隂王駿為征西大將軍平南將軍羊祜為征南大將軍丁卯立皇后楊氏大赦賜王公以下及於鰥寡各有差十一月白龍二見於梁國十二月徵處士安定皇甫謐為太子中庶子封后父鎮軍將軍楊駿為臨晉侯是月以平州刺史傅詢前廣平太守孟桓清白有聞詢賜帛二百匹桓百匹三年春正月丙子朔日蝕詔立皇子裕為始平王安平穆王隆弟敦為安平王詔以衞將軍扶風王亮為宗師凡宗室戚屬所當施行皆諮之庚寅始平王裕薨有星孛于西方使征北大將軍衞瓘討鮮卑力微三月平虜護軍文淑討叛虜樹機能等並破之有星孛于胃乙未帝將射雉慮損麥苗而止夏五月戊子吴將邵凱夏祥帥衆七千餘人來降六月益梁八郡水殺三百餘人没邸閣别倉秋七月以都督豫州諸軍事王渾為都督揚州諸軍事中山王睦以罪廢為丹水侯八月癸亥徙扶風王亮為汝南王東莞王伷為琅邪王汝隂王駿為扶風王琅邪王倫為趙王渤海王輔為太原王太原王顒為河間王北海王陵為任城王陳王斌為西河王汝南王東為南陽王濟南王耽為中山王河間王威為章武王立皇子瑋為始平王允為濮陽王該為新都王遐為清河王鉅平侯羊祜為南城侯以汝南王亮為鎮南大將軍大風㧞樹暴寒且冰郡國五隕霜傷穀九月戊子以左將軍胡奮為都督江北諸軍事兖豫徐青荆益梁七州大水傷秋稼詔振給之立齊王子蕤為遼東王賛為廣漢王冬十一月丙戌帝臨宣武觀大閱至于壬辰十二月吴將孫慎入江夏汝南畧千餘家而去是歲西北雜虜及鮮卑匈奴五溪蠻夷東夷二國前後十餘輩各帥種人部落内附四年春正月庚午朔日有蝕之三月甲申尚書左僕射盧欽卒辛酉以尚書右僕射山濤為尚書左僕射東夷六國來獻夏四月蚩尤旗見於東井六月丁未隂平廣武地震甲子又震涼州刺史楊欣與虜若羅㧞能等戰于武威敗績死之𢎞訓皇后羊氏崩秋七月己丑祔葬景獻皇后羊氏于峻平陵庚寅髙陽王緝薨癸巳范陽王綏薨荆揚郡國二十皆大水九月以太傅何曽為太宰辛巳以尚書令李允為司徒冬十月以征北大將軍衞瓘為尚書令揚州刺史應綽伐吴皖城斬首五千級焚穀米百八十萬斛十一月辛巳太醫司馬程據獻雉頭裘帝以竒抜異服典禮所禁焚之于殿前甲申勅内外敢有犯者罪之吴昭武將軍劉翻厲武將軍祖始來降辛卯以尚書杜預都督荆州諸軍事征南大將軍羊祜卒十二月乙未西河王斌薨丁未太宰朗陵公何曽薨是歲東夷九國内附五年春正月虜帥樹機能攻陷涼州乙丑使討虜護軍武威太守馬隆擊之二月甲午白麟見于平原三月匈奴都督㧞奕虛帥部落歸化乙亥以百姓饑饉减御膳之半有星孛于栁夏四月又孛于女御大赦降除部曲督以下質任丁亥郡國八雨雹傷秋稼壞百姓廬舍秋七月有星孛于紫宮九月甲午麟見于河南冬十月戊寅匈奴餘渠都督獨雍等帥部落歸化汲郡人不準掘魏襄王冡得竹簡小篆古書十餘萬言藏于秘府十一月大舉伐吴遣鎮軍將軍琅邪王伷出涂中安東將軍王渾出江西建威將軍王戎出武昌平西將軍胡奮出夏口鎮南大將軍杜預出江陵龍驤將軍王濬廣武將軍唐彬率巴蜀之卒浮江而下東西凡二十餘萬以太尉賈充為大都督行冠軍將軍楊濟為副總統衆軍十二月馬隆擊叛虜樹機能大破斬之涼州平肅慎來獻楛矢石砮太康元年春正月己丑朔五色氣冠日癸丑王渾尅吴尋陽賴鄉諸城獲吴武威將軍周興二月戊午王濬唐彬等尅丹陽城庚申又尅西陵殺西陵都督鎮軍將軍留憲征南將軍成璩西陵監鄭廣壬戍濬又尅夷道樂鄉城殺夷道監陸晏水軍都督陸景甲戍杜預尅江陵斬吴江陵督王延平南將軍胡奮尅江安於是諸軍並進樂鄉荆門諸戍相次來降乙亥以濬為都督益梁二州諸軍事復下詔曰濬彬東下掃除巴邱與胡奮王戎共平夏口武昌順流東騖直造秣陵與奮戎審量其宜杜預當鎮靜零桂懷輯衡陽大兵既過荆州南境固當傳檄而定預當分萬人給濬七千給彬夏口既平奮宜以七千人給濬武昌既了戎當以六千人増彬太尉充移屯項總督諸方濬進破夏口武昌遂泛舟東下所至皆平王渾周浚與吴丞相張悌戰于版橋大敗之斬悌及其將孫震沈瑩傳首洛陽孫皓窮蹙請降送璽綬於琅邪王伷三月壬申王濬以舟師至于建鄴之石頭孫皓大懼面縳輿櫬降于軍門濬杖節解縳焚櫬送于京都收其圖籍尅州四郡四十三縣三百一十三户五十二萬三千吏三萬二千兵二十三萬男女口二百三十萬其牧守以下皆因吴所置除其苛政示之簡易吴人大悅乙酉大赦改元大酺五日恤孤老困窮夏四月河東髙平雨雹傷秋稼遣兼侍中張側黄門侍郎朱震分使揚越慰其初附白麟見于頓邱三河魏郡𢎞農雨雹傷宿麥五月辛亥封孫皓為歸命侯拜其太子為中郎諸子為郎中吴之舊望隨才擢叙孫氏大將戰亡之家徙於夀陽將吏渡江復十年百姓百工復二十年丙寅帝臨軒大㑹引皓升殿羣臣咸稱萬歲丁卯薦酃淥酒于太廟郡國六雹傷秋稼庚午詔諸士卒年六十以上罷歸于家庚辰以王濬為輔國大將軍襄陽侯杜預當陽侯王戎安豐侯唐彬上庸侯賈充琅邪王伷以下増封於是論功行封賜公卿以下帛各有差六月丁丑初置翊軍校尉官封丹水侯睦為髙陽王甲申東夷十國歸化秋七月虜軻成泥寇西平浩舋殺督將以下三百餘人東夷二十國朝獻庚寅以尚書魏舒為尚書右僕射八月車師前部遣子入侍己未封皇弟延祚為樂平王白龍二見于永昌九月羣臣以天下一統屢請封禪帝謙讓弗許冬十月丁巳除五女復十二月戊辰廣漢王賛薨二年春二月淮南丹陽地震三月丙申安平王敦薨賜王公以下吴生口各有差詔選孫皓妓妾五千人入宮東夷五國朝獻夏六月東夷五國内附郡國十六雨雹大風㧞樹壞百姓廬舍江夏泰山水流居人三百餘家秋七月上黨又暴風雨雹傷秋稼八月有星孛于張冬十月鮮卑慕容廆寇昌黎十一月壬寅大司馬陳騫薨有星孛于軒轅鮮卑寇遼西平州刺史鮮于嬰討破之三年春正月丁丑罷秦州并雍州甲午以尚書張華都督幽州諸軍事三月安北將軍嚴詢敗鮮卑慕容廆於昌黎殺傷數萬人夏四月庚午太尉魯公賈充薨閠月丙子司徒廣睦侯李允薨癸丑白龍二見于濟南秋八月罷平州寧州刺史三年一入奏事九月東夷二十九國歸化獻其方物吴故將筦恭帛奉舉兵反攻害建鄴令遂圍揚州徐州刺史嵇喜討平之冬十二月甲申以司空齊王攸為大司馬督青州諸軍事鎮東大將軍琅邪王伷為撫軍大將軍汝南王亮為太尉光祿大夫山濤為司徒尚書令衛瓘為司空丙申詔四方水旱甚者無出田租四年春正月甲申以尚書右僕射魏舒為尚書左僕射下邳王晃為尚書右僕射戊午司徒山濤薨二月己丑立長樂亭侯實為北海王三月辛丑朔日有蝕之癸丑大司馬齊王攸薨夏四月任城王陵薨五月己亥大將軍琅邪王伷薨徙遼東王蕤為東萊王六月増九卿禮秩牂柯獠二千餘落内屬秋七月壬子以尚書右僕射下邳王晃為都督青州諸軍事丙寅兖州大水復其田租八月鄯善國遣子入侍假其歸義侯以隴西王泰為尚書右僕射冬十一月戊午新都王該薨以尚書左僕射魏舒為司徒十二月庚午大閱于宣武觀是歲河南及荆州揚州大水五年春正月己亥青龍二見于武庫井中二月丙寅立南宫王子玷為長樂王壬辰地震夏四月任城魯國池水赤如血五月丙午宣帝廟梁折六月初置黄沙獄秋七月戊申皇子恢薨任城梁國中山雨雹傷秋稼減天下戸課三分之一九月南安大風折木郡國五大水隕霜傷秋稼冬十一月甲辰太原王輔薨十二月庚午大赦林邑大秦國各遣使來獻閠月鎮南大將軍當陽侯杜預卒六年春正月庚申朔以比歲不登免租貸宿負戊辰以征南大將軍王渾為尚書左僕射尚書褚䂮都督揚州諸軍事楊濟都督荆州諸軍事三月郡國六隕霜傷桑麥夏四月扶南等十國來獻參離四千餘落内附郡國四旱十大水壞百姓廬舍秋七月巴西地震八月丙戍朔日有蝕之減百姓綿絹三分之一白龍見于京兆以鎮東大將軍王濬為撫軍大將軍九月丙子山陽公劉康薨冬十月南安山崩水出南陽郡獲兩足獸龜兹焉耆國遣子入侍十二月甲申大閱于宣武觀旬日而罷庚子撫軍大將軍襄陽侯王濬卒七年春正月甲寅朔日有蝕之乙卯詔以災異屢發令公卿大臣各上封事極言其故勿有所諱夏五月郡國十三旱鮮卑慕容廆寇遼東秋七月朱提山崩犍為地震八月東夷十一國内附京兆地震九月戊寅驃騎將軍扶風王駿薨郡國八大水冬十一月壬子以隴西王泰都督關中諸軍事十二月遣侍御史廵遭水諸郡出後宫才人妓女以下二百七十人歸于家始制大臣聽終喪三年己亥河隂雨赤雪二頃是歲扶南等二十一國馬韓等十一國遣使來獻八年春正月戊申朔日有蝕之太廟殿陷三月乙丑臨商觀震夏四月齊國大水隕霜傷麥六月魯國大風㧞樹木壞百姓廬舍郡國八大水秋七月前殿地陷深數丈中有破船八月東夷二國内附九月改營太廟冬十月南康平固縣吏李豐反聚衆攻郡縣自號將軍十一月海安令蕭輔聚衆反十二月吴興人蔣廸聚黨反圍陽羡縣州郡捕討皆伏誅南夷扶南西域康居各遣使來獻是歲郡國五地震九年春正月壬申朔日有食之詔刺史二千石糾濁揚清又令内外郡官舉清能㧞寒素江東四郡地震二月尚書右僕射陽夏侯胡奮卒以尚書朱整為尚書右僕射三月丁丑皇后親桑于西郊賜帛各有差壬辰初并二社為一夏四月江南郡國八地震隴西隕霜傷宿麥五月義陽王竒有罪黜為三縱亭侯詔内外郡官舉守令之才六月庚子朔日有食之徙章武王威為義陽王郡國三十二大旱傷麥秋八月壬子星隕如雨詔郡國五歲刑以下决遣無留庶獄九月東夷七國詣校尉内附郡國二十四螟冬十二月癸邜立河間平王洪子英為章武王戊申青龍黄龍各一見于魯國十年夏四月以京兆太守劉霄陽平太守梁柳有政績各賜穀千斛郡國八隕霜太廟成乙巳遷神主于新廟帝迎于道左遂祫祭大赦文武増位一等作廟者二等丁未尚書右僕射廣興侯朱整卒癸丑崇賢殿災五月鮮卑慕容廆來降東夷十一國内附六月庚子山陽公劉瑾薨復置二社冬十月壬子徙南宫王承為武邑王十一月丙辰守尚書令左光祿大夫荀朂卒帝疾瘳賜王公以下帛有差含章殿鞠室火甲申以汝南王亮為大司馬大都督假黄鉞改封南陽王柬為秦王始平王瑋為楚王濮陽王允為淮南王並假節之國各統方州軍事立皇子乂為長沙王頴為成都王晏為吴王熾為豫章王演為代王皇孫遹為廣陵王立濮陽王子廸為漢王始平王子儀為毗陵王汝南王次子羕為西陽公徙扶風王暢為順陽王暢弟歆為新野公琅邪王覲弟澹為東武公繇為東安公漼為廣陵公卷為東莞公改諸王國相為内史十二月庚寅太廟梁折是歲東夷絶遠三十餘國西南夷二十餘國來獻虜壬戍奚軻男女十萬口來降太熙元年春正月辛酉朔改元己巳以尚書左僕射王渾為司徒司空衞瓘為太保二月辛丑東夷七國朝貢琅邪王覲薨三月甲子以右光禄大夫石鑒為司空夏四月辛丑以侍中車騎將軍楊駿為太尉都督中外諸軍事錄尚書事己酉帝崩于含章殿時年五十五葬峻陽陵廟號世祖帝宇量𢎞厚造次必於仁恕容納讜正未曽失色於人明達善謀能斷大事故得撫寧萬國綏静四方承魏氏奢侈刻弊之後百姓思古之遺風乃厲以㳟儉敦以寡欲有司嘗奏御牛青絲靷斷詔以青麻代之臨朝寛裕法度有恒髙陽許允既為文帝所殺允子奇為太常丞帝將有事於太廟朝議以奇受害之門不欲接近左右請出為長史帝乃追述允夙望稱奇之才擢為祠部郎時論稱其夷曠平吳之後天下乂安遂怠於政術耽於游宴寵愛后黨親貴當權舊臣不得専任彞章紊廢請謁行矣爰至末年知惠帝弗克負荷然恃皇孫聰睿故無廢立之心復慮非賈后所生終致危敗遂與腹心共圖後事說者紛然久而不定竟用王佑之謀遣太子母弟秦王柬都督關中楚王瑋淮南王允並鎮守要害以彊帝室又恐楊氏之逼復以佑為北軍中候以典禁兵既而寝疾彌留至于大漸佐命元勲皆已先殁羣臣惶惑計無所從㑹帝小差有詔以汝南王亮輔政又欲令朝士之有名望年少者數人佐之楊駿秘而不宣帝復尋至迷亂楊后輙為詔以駿輔政促亮進發帝尋小間問汝南王來未意欲見之有所付託左右答言未至帝遂困篤中朝之亂實始于斯矣武帝泰始十年咸寧五年太康十年太熙元年即位二十六年孝惠皇帝諱衷字正度武帝第二子也泰始三年立為皇太子時年九歲太熙元年四月己酉武帝崩是日皇太子即皇帝位大赦改元為永熙尊皇后楊氏曰皇太后立妃賈氏為皇后夏五月辛未葬武皇帝於峻陽陵丙子増天下位一等預喪事者二等復租調一年二千石已上皆封關中侯以太尉楊駿為太傅輔政秋八月壬午立廣陵王遹為皇太子以中書監何劭為太子太師吏部尚書王戎為太子太傅衞將軍楊濟為太子太保遣南中郎將石崇射聲校尉胡奕長水校尉趙俊揚烈將軍趙歡將屯兵四出冬十月辛酉以司空石鑒為太尉前鎮西將軍隴西王泰為司空永平元年春正月乙酉朔臨朝不設樂詔改永熙二年為永平元年又詔子弟及群官並不得謁陵丙午皇太子冠丁未見于太廟二月甲寅賜王公已下帛各有差癸酉鎮南將軍楚王瑋鎮東將軍淮南王允來朝戊寅復置秘書監官三月辛卯誅太傅楊駿駿弟衛將軍瑤太子太保濟中護軍張劭散騎常侍段廣楊邈左將軍劉預河南尹李斌中書令蔣俊東夷校尉文淑尚書武茂皆夷三族壬辰大赦改元賈后矯詔廢皇太后為庶人徙于金墉城告于天地宗廟誅太后母龐氏壬寅徵大司馬汝南王亮為太宰與太保衛瓘輔政以秦王柬為大將軍東平王楙為撫軍大將軍鎮東將軍楚王瑋為衛將軍領北軍中候下邳王晃為尚書令東安公繇為尚書左僕射進封東安王督將侯者千八十一人庚戍免東安王繇及東平王楙繇徙帶方夏四月癸亥以征東將軍梁王肜為征西大將軍都督關西諸軍事太子少傅阮坦為平東將軍監青徐二州諸軍事己巳以太子太傅王戎為尚書右僕射五月甲戍毗陵王軌薨壬午除天下戸調綿絹賜孝悌髙年鰥寡力田者帛人三匹六月賈后矯詔使楚王瑋殺太宰汝南王亮太保菑陽公衛瓘乙丑以瑋擅害亮瓘殺之曲赦洛陽以廣陵王師劉寔為太子太保司空隴西王泰錄尚書事秋七月分揚州荆州十郡為江州八月庚申以趙王倫為征東將軍都督徐兖二州諸軍事河間王顒為北中郎將鎮鄴太子太師何劭為都督豫州諸軍事鎮許昌徙長沙王乂為常山王己巳進西陽公羕爵為王辛未立隴西世子越為東海王九月甲午大將軍秦王柬薨辛丑徵征西大將軍梁王肜為衞將軍錄尚書事以趙王倫為征西大將軍都督雍梁二州諸軍事冬十二月辛酉京師地震是歲東夷十七國南夷二十四部並詣校尉内附二年春二月己酉賈后弑皇太后于金墉城秋八月壬子大赦九月乙酉中山王耽薨冬十一月大疫是嵗沛國雨雹傷麥三年夏四月滎陽雨雹六月𢎞農郡雨雹深三尺冬十月太原王泓薨四年春三月丁酉朔侍中太尉安昌公石鑒薨夏五月蜀郡山移淮南壽春洪水出山崩地陷壞城府及百姓廬舍匈奴郝散反攻上黨殺長吏六月壽春地大震死者二十餘家上庸郡山崩殺二十餘人秋八月郝散帥衆降馮翊都尉殺之上谷居庸上庸並地陷裂水泉涌出人有死者大饑九月丙辰赦諸州之遭地災者甲午枉矢東北竟天是歲京師及郡國八地震五年夏四月彗星見于西方孛于奎至軒轅六月金城地震東海雨雹深五寸秋七月下邳暴風壞廬舍九月鴈門新興太原上黨大風傷禾稼冬十月武庫火焚累代之寳十二月丙戍新作武庫大調兵器丹陽雨雹有石生于京師宜年里是歲荆揚兖豫青徐等六州大水詔遣御史廵行振貸六年春正月大赦司空下邳王晃薨以中書監張華為司空太尉隴西王泰為尚書令衛將軍梁王肜為太子太保丁丑地震三月東海隕霜傷桑麥彭城吕縣有流血東西百餘歩夏四月大風五月荆揚二州大水匈奴郝散弟度元帥馮翊北地馬蘭羌盧水胡反攻北地太守張損死之馮翊太守歐陽建與度元戰敗績徵征西大將軍趙王倫為車騎將軍以太子太保梁王肜為征西大將軍都督雍梁二州諸軍事鎮關中秋八月雍州刺史解系又為度元所破秦雍氐羌悉叛推氐帥齊萬年僣號稱帝圍涇陽冬十月乙未曲赦雍涼二州十一月丙子遣安西將軍夏侯俊建威將軍周處等討萬年梁王肜屯好畤關中饑大疫七年春正月癸丑周處及齊萬年戰於六陌王師敗績處死之夏五月魯國雨雹秋七月雍梁州疫大旱隕霜殺秋稼關中饑米斛萬錢詔骨肉相賣者不禁丁丑司徒京陵公王渾薨九月以尚書右僕射王戎為司徒太子太師何劭為尚書左僕射八年春正月丙辰地震詔發倉廪振雍州饑人三月壬戍大赦夏五月郊禖石破為二秋九月荆豫揚徐冀等五州大水雍州有年九年春正月左積弩將軍孟觀伐氐戰于中亭大破之獲齊萬年徵征西大將軍梁王肜錄尚書事以北中郎將河間王顒為鎮西將軍鎮關中成都王頴為鎮北大將軍鎮鄴夏四月鄴人張承基等妖言署置聚黨數千郡縣逮捕皆伏誅六月戊戍太尉隴西王泰薨秋八月以尚書裴頠為尚書僕射冬十一月甲子朔日有蝕之京師大風發屋折木十二月壬戌廢皇太子遹為庶人及其三子幽于金墉城殺太子母謝氏永康元年春正月癸亥朔大赦改元己卯日有蝕之丙子皇孫霖卒二月丁酉大風飛沙㧞木三月尉氏雨血妖星見于南方癸未賈后矯詔害庶人遹于許昌夏四月辛卯日有食之癸巳梁王肜趙王倫矯詔廢賈后為庶人司空張華尚書僕射裴頠皆遇害侍中賈謐及黨與數十人皆伏誅甲午倫矯詔大赦自為相國都督中外諸軍事如宣文輔魏故事追復故皇太子位丁酉以梁王肜為太宰左光祿大夫何劭為司徒右光祿大夫劉實為司空淮南王允為驃騎將軍己亥趙王倫矯詔害賈庶人于金墉城五月己巳立皇孫臧為皇太孫尚為襄陽王六月壬寅葬愍懷太子于顯平陵撫軍將軍清河王遐薨癸卯震崇陽陵標秋八月淮南王允舉兵討趙王倫不克允及其二子秦王郁漢王廸皆遇害曲赦洛陽平東將軍彭城王植薨改封吳王晏為賔徒縣王以齊王冏為平東將軍鎮許昌光祿大夫陳凖為太尉錄尚書事九月改司徒為丞相以梁王肜為之冬十月黄霧四塞十一月戊午大風飛砂石六日乃止甲子立皇后羊氏大赦大酺三日十二月彗星見于東方益州刺史趙廞與畧陽流人李庠害成都内史耿勝犍為太守季密汶山太守霍固西夷校尉陳總據成都反永寧元年春正月乙丑趙王倫簒帝位丙寅遷帝于金墉城號曰太上皇改金墉曰永昌宫廢皇太孫臧為濮陽王五緯經天縱横無常癸酉倫害濮陽王臧畧陽流人李特殺趙廞傳首京師三月平東將軍齊王冏起兵以討倫傳檄州郡屯于陽翟征北大將軍成都王頴征西大將軍河間王顒常山王乂豫州刺史李毅兖州刺史王彦南中郎將新野公歆皆舉兵應之衆數十萬倫遣其將閭和出伊闕張泓孫輔出堮坂以距冏孫㑹士猗許超出黄橋以距頴及頴將趙驤石超戰於溴水㑹等大敗棄軍走閠月丙戌朔日有食之夏四月歲星晝見冏將何朂盧播擊泓於陽翟大破之斬孫輔等辛酉左衛將軍王輿與尚書淮陵王漼勒兵入宫禽倫黨孫秀孫㑹許超士猗駱休等皆斬之逐倫歸第即日乗輿反正羣臣頓首謝罪帝曰非諸卿之過也癸亥詔大赦改元孤寡賜穀五斛大酺五日誅趙王倫義陽王威九門侯質等及倫之黨與五月立襄陽王尚為皇太孫六月戊辰大赦増吏位二等復封賔徒王晏為吴王庚午東萊王蕤左衛將軍王輿謀廢齊王冏事泄蕤廢為庶人輿伏誅夷三族甲戌以齊王冏為大司馬都督中外諸軍事成都王頴為大將軍錄尚書事河間王顒為太尉罷丞相復置司徒官己卯以梁王肜為太宰領司徒封齊王冏功臣葛旟牟平公路季小黄公衛毅平隂公劉真安鄉公韓泰封丘公秋七月甲午立吴王晏子國為漢王復封常山王乂為長沙王八月大赦戊辰原徙邊者益州刺史羅尚討羌破之己巳徙南平王祥為宜都王下邳王􅀈薨以東平王楙為平東將軍都督徐州諸軍事九月追東安王繇復其爵丁丑封楚王瑋子範為襄陽王冬十月流人李特反於蜀十二月司空何劭薨封齊王冏子冰為樂安王英為濟陽王超為淮南王是歲郡國十二旱六蝗太安元年春正月庚子安東將軍譙王隨薨三月癸卯赦司冀兖豫四州皇太孫尚薨夏四月彗星晝見五月乙酉侍中太宰領司徒梁王肜薨以右光禄大夫劉實為太傅太尉河間王顒遣將衙博擊李特於蜀為特所敗特遂陷梓潼巴西害廣漢太守張微自號大將軍癸卯以清河王遐子覃為皇太子賜孤寡帛大酺五日以齊王冏為太師東海王越為司空秋七月兖豫徐冀等四州大水冬十月地震十二月丁卯河間王顒表齊王冏窺伺神器有無君之心與成都王頴新野王歆范陽王虓同㑹洛陽請廢冏還第長沙王乂奉乘輿屯南止車門攻冏殺之幽其諸子于金墉城廢冏弟北海王實大赦改元以長沙王乂為太尉都督中外諸軍事封東萊王蕤子炤為齊王二年春正月甲子朔赦五歲刑三月李特攻陷益州荆州刺史宋岱擊特斬之傳首京師夏四月特子雄復據益州五月義陽蠻張昌舉兵反以山都人邱沉為主改姓劉氏偽號漢建元神鳳攻破郡縣南陽太守劉彬平南將軍羊伊鎮南大將軍新野王歆並遇害六月遣荆州刺史劉𢎞等討張昌于方城王師敗績秋七月中書令卞粹侍中馮蓀河南尹李含等貳於長沙王乂乂疑而害之張昌陷江南諸郡武陵太守賈隆零陵太守孔紘豫章太守閻濟武昌太守劉根皆遇害昌别帥石冰寇揚州刺史陳徽與戰大敗諸郡盡没臨淮人封雲舉兵應之自阜陵寇徐州八月河間王顒成都王頴舉兵討長沙王乂帝以乂為大都督帥軍禦之庚申劉𢎞及張昌戰於清水斬之顒遣其將張方頴遣其將陸機牽秀石超等來逼京師乙丑帝幸十三里橋遣將軍皇甫商距方於宜陽己巳帝旋軍于宣武塲庚午舍于石樓天中裂無雲而雷九月丁丑帝次于河橋壬午皇甫商為張方所破甲申帝軍于芒山丁亥幸偃師辛卯舍于豆田癸巳尚書右僕射興晉侯羊元之卒帝旋于城東丙申進軍緱氏擊牽秀走之大赦張方入京城燒清明開陽二門死者萬計石超逼乗輿于緱氏冬十月壬寅帝旋于宫石超焚緱氏服御無遺丁未破牽秀范陽王虓于東陽門外戊申破陸機于建春門石超走斬其大將賈崇等十六人懸首銅駝街張方退屯十三里橋十一月辛巳星晝隕聲如雷王師攻方壘不利方决千金堨水碓皆涸乃發王公奴婢手舂給兵廪一品已下不從征者男子十三以上皆從役又發奴助兵號為四部司馬公私窮踧米石萬錢詔命所至一城而已壬寅夜赤氣竟天隐隐有聲丙辰地震癸亥東海王越執長沙王乂幽於金墉城尋為張方所害甲子大赦丙寅揚州秀才周玘前南平内史王矩前吴興内史顧秘起義軍以討石冰冰退自臨淮趨壽陽征東將軍劉準遣廣陵度支陳敏擊冰李雄自郫城攻益州刺史羅尚尚委城而遁雄盡有成都之地封鮮卑段勿塵為遼西公永興元年春正月丙午尚書令樂廣卒成都王頴自鄴諷于帝乃大赦改元為永安帝逼於河間王顒密詔雍州刺史劉沉秦州刺史皇甫重以討之沉舉兵攻長安為顒所敗張方大掠洛中還長安於是軍中大餒人相食以成都王頴為丞相頴遣從事中郎成䕫等以兵五萬屯十二城門殿中宿所忌者頴皆殺之以三部兵代宿衛二月乙酉廢皇后羊氏幽于金墉城黜皇太子覃為清河王三月陳敏攻石冰斬之揚徐二州平河間王顒表請立成都王頴為太弟戊申詔曰朕以不徳纂承鴻緒于兹十有五載禍亂滔天姦逆仍起至於幽廢重宫宗廟圯絶成都王頴温仁惠和剋平暴亂其以頴為皇太弟都督中外諸軍事丞相如故大赦賜鰥寡髙年帛三匹大酺五日丙辰盜竊太廟服器以太尉顒為太宰太傅劉實為太尉六月新作三城門秋七月丙申朔右衛將軍陳眕以詔召百寮入殿中因勒兵討成都王頴戊戌大赦復皇后羊氏及皇太子覃己亥司徒王戎東海王越髙密王簡平昌公模吴王晏豫章王熾襄陽王範右僕射荀藩等奉帝北征至安陽衆十餘萬頴遣其將石超距戰己未六軍敗績于蕩隂矢及乘輿百寮分散侍中嵇紹死之帝傷頰中三矢亡六璽帝遂幸超軍餒甚超進水左右奉秋桃超遣弟熙奉帝之鄴頴帥羣官迎謁道左帝下輿涕泣其夕幸于頴軍頴府有九錫之儀陳留王送貂蟬衣鶡尾明日乃備法駕幸于鄴唯豫章王熾司徒王戎僕射荀藩從庚申大赦改元為建武八月戊辰頴殺東安王繇張方復入洛陽廢皇后羊氏及太子覃匈奴左賢王劉淵反畔於離石自號大單于安北將軍王浚遣烏丸騎攻成都王頴于鄴大敗之頴與帝單車走洛陽服御分散倉卒上下無齎侍中黄門被囊中齎私錢三千詔貸用所在買飯以供宫人止食於道中客舍宫人有持升餘秔米飯及燥蒜鹽豉以進帝帝噉之御中黄門布被次獲嘉市麤米飯盛以瓦盆帝噉兩盂有老父獻蒸雞帝受之至温將謁陵帝喪履納從者之履下拜流涕左右皆歔欷及濟河張方帥騎三千以陽燧青蓋奉迎方拜謁帝躬止之辛巳大赦賞從者各有差冬十一月乙未方請帝謁廟因刼帝幸長安方以所乗車入殿中帝馳避後園竹中方逼帝升車左右中黄門鼓吹十二人歩從惟中書監盧志侍側方以帝幸其壘帝令方具車載宫人寳物軍人因妻畧後宫分爭府藏魏晉以來之積掃地無遺矣行次新安寒甚帝墮馬傷足尚書髙光進面衣帝嘉之河間王顒帥官屬步騎三萬迎于霸上顒前拜謁帝下車止之以征西府為宫惟僕射荀藩司𨽻劉暾太常鄭球河南尹周馥與其遺官在洛陽為留臺承制行事號為東西臺焉丙午留臺大赦改元復為永安辛丑復皇后羊氏李雄僣號成都王劉淵僣號漢王十二月丁亥詔曰天禍晉邦冡嗣莫繼成都王頴自在儲貳政績虧損四海失望不可承重其以王還第豫章王熾先帝愛子令問日新四海注意今以為皇太弟以隆我晉邦以司空越為太傅與太宰顒夾輔朕躬司徒王戎參錄朝政光禄大夫王衍為尚書左僕射安南將軍虓安北將軍濬平北將軍騰各守本鎮髙密王簡為鎮南將軍領司𨽻校尉權鎮洛陽東中郎將模為寧北將軍都督冀州鎮于鄴鎮南大將軍劉𢎞領荆州以鎮南土周馥繆允各還本部百官皆復職齊王冏前應還第長沙王乂輕陷重刑封其子紹為樂平縣王以奉其嗣自頃戎車屢征勞費人力供御之物皆減三分之二戸調田租三分減一蠲除苛政愛人務本清通之後當還東京大赦改元以河間王顒都督中外諸軍事二年春正月甲午朔帝在長安夏四月詔封樂平王紹為齊王丙子張方廢皇后羊氏六月甲子侍中司徒安豐侯王戎薨隴西太守韓稚攻秦州刺史張輔殺之李雄僣即帝位國號蜀秋七月甲午尚書諸曹火燒崇禮闥東海王越嚴兵徐方將西迎大駕成都王頴部將公師藩等聚衆攻陷郡縣害陽平太守李志汲郡太守張延等轉攻鄴平昌公模遣將軍趙驤擊破之八月辛丑大赦驃騎將軍范陽王虓逐冀州刺史李義揚州刺史曹武殺丹陽太守朱建李雄遣其將李驤寇漢安車騎大將軍劉𢎞逐平南將軍彭城王釋于宛九月庚寅朔公師藩又害平原太守王景清河太守馮熊庚子豫州刺史劉喬攻范陽王虓於許昌敗之壬子以成都王頴為鎮東大將軍都督河北諸軍事鎮鄴河間王顒遣將軍呂朗屯洛陽冬十月丙子詔曰得豫州刺史劉喬檄稱潁川太守劉輿迫脅驃騎將軍虓距逆詔令造構凶逆擅刼郡縣合聚兵衆擅用茍晞為兖州斷截王命鎮南大將軍荆州刺史劉𢎞平南將軍彭城王釋等其各勒所統徑㑹許昌與喬并力今遣右將軍張方為大都督統精卒十萬建武將軍吕朗廣武將軍騫貙建威將軍刁黙等為軍前鋒共㑹許昌除輿兄弟丁丑使前車騎將軍石超北中郎將王闡討輿等赤氣見于北方東西竟天有星孛于北斗平昌公模遣將軍宋胄等屯河橋十一月立節將軍周權詐被檄自稱平西將軍復皇后羊氏洛陽令何喬攻權殺之復廢皇后十二月吕朗等東屯滎陽成都王頴進據洛陽張方劉元等並按兵不能禦范陽王虓濟自官渡㧞滎陽斬石超襲許昌破劉喬於蕭喬奔南陽右將軍陳敏舉兵反自號楚公矯稱被中詔從沔漢奉迎天子逐揚州刺史劉機丹陽太守王曠遣弟恢南畧江州刺史應邈奔弋陽光熙元年春正月戊子朔日有食之帝在長安河間王顒聞劉喬破大懼遂殺張方請和於東海王越越不聽宋胄等破頴將樓裒進逼洛陽頴奔長安甲子越遣其將祁𢎞宋胄司馬纂等迎帝三月東萊惤令劉柏根反自稱惤公襲臨淄髙密王簡奔聊城王浚遣將討柏根斬之夏四月己巳東海王越屯于温顒遣𢎞農太守彭隨北地太守刁黙距祁𢎞等於湖五月枉矢西南流范陽國地燃可以㸑壬辰祁𢎞等與刁黙戰黙大敗顒頴走南山奔于宛𢎞等所部鮮卑大掠長安殺二萬餘人是日日光四散赤如血甲午又如之己亥𢎞等奉帝還洛陽帝乗牛車行宮藉草公卿䟦涉戊申驃騎范陽王虓殺司𨽻校尉邢喬己酉盜取太廟金匱及策文各四六月丙辰朔至自長安升舊殿哀感流涕謁于太廟復皇后羊氏辛未大赦改元秋七月乙酉朔日有食之太廟吏賈苞盜太廟靈衣及劒伏誅八月以太傅東海王越錄尚書驃騎將軍范陽王虓為司空九月頓邱太守馮嵩執成都王頴送之于鄴進東嬴公騰爵為東燕王平昌公模為南陽王冬十月司空范陽王虓薨虓長史劉輿害成都王頴十一月庚午帝崩于顯陽殿時年四十八葬太陽陵帝之為太子也朝廷咸知不堪政事武帝亦疑焉嘗悉召東宫官屬使以尚書事令太子决之帝不能對賈妃遣左右代對多引古義給事張泓曰太子不學陛下所知今宜以事斷不可引書妃從之泓乃具章令帝書之武帝覽而大悅太子遂安及居大位政出羣下綱紀大壞貨賂公行勢位之家以貴陵物忠賢路絶讒邪得志更相薦舉天下謂之互市焉髙平王沉作釋時論南陽魯襃作錢神論廬江杜嵩作壬子春秋皆疾時之作也帝又常在華林園聞蝦蟆聲謂左右曰此鳴者為官乎私乎或對曰在官地為官在私地為私及天下荒亂百姓餓死帝曰何不食肉糜其蒙蔽皆此類也後因食䴵中毒而崩或曰司馬越之鴆云惠帝永平九年元康元年太安二年永興二年光熙元年即位十六年孝懷皇帝諱熾字豐度武帝第二十五子也太熙元年封豫章郡王屬惠帝之時宗室構禍帝冲素自守門絶賔游不交世事專玩史籍有譽於時初拜散騎常侍及趙王倫簒見收倫敗為射聲校尉累遷車騎大將軍都督青州諸軍事未之鎮永興元年改授鎮北大將軍都督鄴城守諸軍事十二月丁亥立為皇太弟帝以清河王覃本太子也懼不敢當典書令廬陵脩肅曰二相經營王室志寧社稷儲貳之重宜歸時望親賢之舉非大王而誰清河㓜弱未允衆心是以既升東宫復賛藩國今乘輿播越二宫又曠常恐氐羌飲馬於涇川螘衆控弦於霸水宜及吉辰時登儲副上翼大駕早寧東宫下允黔首顒顒之望帝曰卿吾之宋昌也乃從之光熙元年十一月庚午孝惠帝崩羊皇后以於太弟為嫂不得為太后催清河王覃入已至尚書閤侍中華焜等急召太弟癸酉即皇帝位大赦尊皇后羊氏為惠皇后居𢎞訓宫追尊所生太妃王氏為皇太后立妃梁氏為皇后十二月壬午朔日有食之己亥封彭城王植子融為樂城縣王南陽王模殺河間王顒於雍谷辛丑以中書監温羡為司徒尚書左僕射王衍為司空己酉葬孝惠皇帝于太陽陵李雄别帥李離寇涼州永嘉元年春正月癸丑朔大赦改元除三族刑以太傅東海王越輔政殺御史中丞諸葛玫二月辛巳東萊人王彌起兵反寇青徐二州長廣太守宋羆東牟太守龎伉並遇害二月己未朔平東將軍周馥斬送陳敏首丁卯改葬武悼楊皇后庚午立豫章王詮為皇太子辛未大赦庚辰東海王越出鎮許昌以征東將軍髙密王簡為征南大將軍都督荆州諸軍事鎮襄陽改封安北將軍東燕王騰為新蔡王都督司冀二州諸軍事鎮鄴以征南將軍南陽王模為征西大將軍都督秦雍梁益四州諸軍事鎮長安并州諸郡為劉淵所陷刺史劉琨獨保晉陽夏五月馬牧帥汲桑聚衆反敗魏郡太守馮嵩遂陷鄴城害新蔡王騰燒鄴宫火旬日不滅又殺前幽州刺史石尠於樂陵入掠平原山陽公劉秋遇害洛陽步廣里地陷有二鵝出蒼者冲天白者不能飛建寧郡夷攻陷寧州死者三千餘人秋七月己酉朔東海王越進屯官渡以討汲桑己未以平東將軍琅邪王睿為安東將軍都督揚州江南諸軍事假節鎮建鄴八月己卯朔撫軍將軍茍晞敗汲桑於鄴甲辰曲赦幽并司冀兖豫等六州分荆州江州八郡為湘州九月戊申茍晞又破汲桑陷其九壘辛亥有大星如日小者如斗自西方流於東北天盡赤俄有聲如雷始修千金堨於許昌以通運冬十一月戊申朔日有食之甲寅以尚書右僕射和郁為征北將軍鎮鄴十二月戊寅并州人田蘭薄盛等斬汲桑于樂陵甲午以前太傅劉實為太尉庚子以光祿大夫延陵公髙光為尚書令東海王越矯詔囚清河王覃于金墉城癸卯越自為丞相以撫軍將軍茍晞為征東大將軍二年春正月丙子朔日有食之丁未大赦二月辛卯清河王覃為東海王越所害庚子石勒寇常山安北將軍王浚討破之三月東海王越鎮鄄城劉淵侵汲郡畧有頓邱河内之地王彌寇青徐兖豫四州夏四月丁亥入許昌諸郡守將皆奔走五月甲子彌遂寇洛陽司徒王衍帥衆禦之彌退走秋七月甲辰劉淵寇平陽太守宋抽奔京師河東太守路述力戰死之八月丁亥東海王越自鄄城遷屯于濮陽九月石勒寇趙郡征北將軍和郁自鄴奔于衛國冬十月甲戌劉淵僣帝號於平陽仍稱漢十一月乙巳尚書令髙光卒丁卯以太子少傅荀藩為尚書令己酉石勒寇鄴魏郡太守王粹戰敗死之十二月辛未朔大赦立長沙王乂子碩為長沙王尠為臨淮王三年春正月甲午彭城王釋薨三月戊申征南大將軍髙密王簡薨以尚書左僕射山簡為征南將軍都督荆湘交廣等四州諸軍事司𨽻校尉劉暾為尚書左僕射丁巳東海王越歸京師乙丑勒兵入宫於帝側收近臣中書令繆播帝舅王延等十餘人並害之丙寅曲赦河南郡丁卯太尉劉實請老以司徒王衍為太尉東海王越領司徒劉淵寇黎陽遣車騎將軍王堪擊之王師敗績于延津死者三萬餘人大旱江漢河洛皆竭可涉夏四月左積弩將軍朱誕叛奔于劉淵石勒攻陷冀州郡縣百餘壁秋七月戊辰當陽地裂三所各廣三丈長三百餘歩辛未平陽人劉芒蕩自稱漢後誑誘羌戎僣帝號於馬蘭山支胡五斗叟郝索聚衆數千為亂屯新豐與芒蕩合黨劉淵遣子聰及王彌寇上黨圍壺闗并州刺史劉琨使兵救之為聰所敗淮南内史王曠將軍施融曹超及聰戰又敗超融死之上黨太守龎淳以郡降賊九月丙寅劉聰圍浚儀遣平北將軍曹虎討之丁丑王師敗績東海王越入保京城聰至西明門越禦之戰於宣陽門外大破之石勒寇常山安北將軍王浚使鮮卑騎救之大破勒於飛龍山征西大將軍王模使其將淳于定破劉芒蕩五斗叟並斬之使車騎將軍王堪平北將軍曹虎討劉聰王師敗績堪奔還京師李雄别帥羅羡以梓潼歸順劉聰攻洛陽西明門不尅宜都夷道山崩荆湘二州地震冬十一月石勒陷長樂安北將軍王斌遇害因屠黎陽乞活帥李惲薄盛等帥衆救京師聰退走惲等又破王彌于新汲十二月乙亥夜有白氣如帯自地升天南北各二丈四年春正月乙丑朔大赦二月石勒襲鄄城兖州刺史袁孚戰敗為其部下所害勒又襲白馬車騎將軍王堪死之李雄將文碩殺雄大將軍李國以巴西歸順戊午吴興人錢璯反自稱平西將軍三月丞相倉曹屬周玘帥郷人討璯斬之夏四月大水將軍祁𢎞破劉淵將劉靈曜于廣宗李雄陷梓潼兖州地震五月石勒寇汲郡執太守胡寵遂南濟河滎陽太守裴純奔建鄴大風折木地震幽并司冀秦雍等六州大蝗食草木牛馬毛皆盡六月劉淵死其子和嗣偽位和弟聰弑和而自立秋七月聰從弟曜及其將石勒圍懷詔征虜將軍宋抽救之為曜所敗抽死之九月河内人樂仰執太守裴整叛降于石勒徐州監軍王隆自下邳棄軍奔于周馥雍州人王如舉兵反於宛殺害令長自號大將軍司雍二州牧大掠漢沔新平人龎實馮翊人嚴嶷京兆人侯脱等各起兵應之征南將軍山簡荆州刺史王澄南中郎將杜蕤並遣兵援京師及如戰於宛諸軍皆大敗王澄獨以衆進至沛口衆潰而歸冬十月辛邜晝昏至于庚子大星西南墜有聲壬寅石勒圍倉垣陳留内史王讃擊敗之勒走河北壬子以驃騎將軍王浚為司空平北將軍劉琨為平北大將軍京師饑東海王越羽檄徵天下兵帝謂使者曰為我語諸征鎮若今日尚可救後則無逮矣時莫有至者石勒陷襄陽太守崔曠遇害遂至宛王浚遣鮮卑文鴦帥騎救之勒退浚又遣别將王申始討勒於汶石津大破之十一月甲戌東海王越帥衆出許昌以行䑓自隨宫省無復守衛荒饉日甚殿内死人交横府寺營署並掘塹自守盗賊公行枹鼓之音不絶越軍次項自領豫州牧以太尉王衍為軍司丁丑流氐隗伯符襲宜都太守嵇晞奔建鄴壬申申始攻劉曜王彌於瓶壘破之鎮東將軍周馥表迎大駕遷都壽陽越使裴頠討馥為馥所敗走保東城請救於琅邪王睿襄陽大疫死者三千餘人加涼州刺史張軌安西將軍十二月征東大將軍茍晞攻王彌别帥曹嶷破之乙酉平陽人李洪帥流人入定陵作亂五年春正月帝密詔茍晞討東海王越壬申晞為曹嶷所破乙未越遣從事中郎將楊瑁徐州刺史裴盾共擊晞癸酉勒入江夏太守楊珉奔于武昌乙亥李雄攻陷涪城梓潼太守譙登遇害湘州流人杜弢據長沙反戊寅安東將軍琅邪王睿使將軍甘卓攻鎮東將軍周馥於壽春馥衆潰庚辰太保平原王幹薨二月石勒寇汝南汝南王祜奔建鄴三月戊午詔下東海王越罪狀告方鎮討之以征東大將軍茍晞為大將軍丙子東海王越薨四月戊子石勒追東海王越喪及於東郡將軍錢端戰死軍潰太尉王衍吏部尚書劉望廷尉諸葛銓尚書鄭豫武陵王澹等皆遇害王公已下死者十餘萬人東海世子毗及宗室四十八王尋又沒于石勒賊王桑冷道陷徐州刺史裴盾遇害桑遂濟淮至于歴陽五月益州流人汝班梁州流人蹇撫作亂於湘州虜刺史茍晀南破零桂諸郡東掠武昌安城太守郭察邵陵太守鄭融衡陽内史滕育並遇害進司空王浚為大司馬征西大將軍南陽王模為太尉太子太傅傅祗為司徒尚書令荀藩為司空安東將軍琅邪王睿為鎮東大將軍東海王越之出也使河南尹潘滔居守大將軍茍晞表遷都倉垣帝將從之諸大臣畏滔不敢奉詔且宮中及黄門戀資財不欲出至是饑甚人相食百官流亡者十八九帝召羣臣㑹議將行而警衛不備帝撫手歎曰如何曽無車輿乃使司徒傅祗出詣河隂修理舟楫為水行之備朝士數十人導從帝歩出西掖門至銅駞街為盗所掠不得進而還六月癸未劉曜王彌石勒同寇洛川王師頻為賊所敗死者甚衆庚寅司空荀藩光禄大夫荀組奔轘轅太子左率温畿夜開廣莫門奔小平津丁酉劉曜王彌入京師帝開華林園門出河隂藕池欲幸長安為曜等所追及曜等遂焚燒宮廟逼辱妃后吴王晏竟陵王楙尚書左僕射和郁右僕射曹馥尚書閭邱冲袁粲王緄河南尹劉黙等皆遇害百官士庻死者三萬餘人帝䝉塵於平陽劉聰以帝為㑹稽公荀藩移檄州鎮以琅邪王為盟主豫章王端東奔茍晞晞立為皇太子自領尚書令具置官屬保梁國之䝉縣百姓饑儉米斛萬餘價秋七月大司馬王浚承制假立太子置百官署征鎮石勒冦榖陽沛王滋戰敗遇害八月劉聰使子粲攻陷長安太尉征西將軍南陽王模遇害長安遺人四千餘家奔漢中九月癸亥石勒襲陽夏至于蒙縣大將軍茍晞豫章王端並沒于賊冬十月勒宼豫州諸郡至江而還十一月猗盧寇太原平北將軍劉琨不能制徙五縣百姓於新興以其地居之六年春正月帝在平陽劉聰寇太原故鎮南府牙門將胡亢聚衆寇荆土自號楚公二月壬子日有蝕之癸丑鎮東大將軍琅邪王睿上尚書檄四方以討石勒大司馬王浚移檄天下稱被中詔承制以荀藩為太尉汝隂王熙為石勒所害夏四月丙寅征南將軍山簡卒秋七月歲星熒惑太白聚于斗牛石勒寇冀州劉粲寇晋陽平北將軍劉琨遣部將郝詵帥衆禦粲詵敗績死之太原太守髙喬以晋陽降粲八月庚戍劉琨奔于常山己亥隂平都尉董冲逐太守王鑒以郡叛降于李雄辛亥劉琨乞師于猗盧表盧為代公九月己卯猗盧使子利孫赴琨不得進辛巳前雍州刺史賈疋討劉粲於三輔走之闗中小定乃與衛將軍梁芬京兆太守梁綜共奉秦王鄴為皇太子於長安冬十月猗盧自將六萬騎次于盆城十一月甲午劉粲遁走劉琨收其遺衆保于陽曲是歲大疫七年春正月劉聰大㑹使帝著青衣行酒侍中庾珉號哭聰惡之丁未帝遇弑崩于平陽時年三十帝初誕有嘉禾生於豫章之南昌先是望氣者云豫章有天子氣其後竟以豫章王為皇太弟在東宮恂恂謙損接引朝士講論書籍及即位始遵舊制臨太極殿使尚書郎讀時令又於東堂聽政至於宴㑹輙與羣官論衆務考經籍黄門侍郎傅寅歎曰今日復見武帝之世矣秘書監荀崧又常謂人曰懷帝天姿清劭少著英猷若遭承平足為守文佳主而繼惠帝擾亂之後東海專政無幽厲之釁而有流亡之禍懷帝永嘉七年孝愍皇帝諱鄴字彦旗武帝孫吳孝王晏之子也出繼後伯父秦獻王柬襲封秦王永嘉二年拜散騎常侍撫軍將軍及洛陽傾覆避難於滎陽密縣與舅荀藩荀組相遇自密南趨許潁豫州刺史閻鼎與前撫軍長史王毗司徒長史劉疇中書郎李昕及藩組等同謀奉帝歸于長安而疇等中塗復叛鼎追殺之藩組僅而獲免鼎遂挟帝乘牛車自宛趨武闗頻遇山賊士卒亡散次于藍田鼎告雍州刺史賈疋疋遽遣州兵迎衞達于長安又使輔軍將軍梁綜助守之時有玉龜出霸水神馬鳴城南焉六年九月辛巳奉秦王為皇太子登壇告類建宗廟社稷大赦加疋征西大將軍以秦州刺史南陽王保為大司馬賈疋討賊張連遇害衆推始平太守麴允領雍州刺史為盟主承制選置建興元年夏四月丙午奉懷帝崩問舉哀成禮壬申即皇帝位大赦改元以衛將軍梁芬為司徒雍州刺史麴允為使持節領軍將軍録尚書事京兆太守索綝為尚書右僕射石勒攻龍驤將軍李惲於上白惲敗死之五月壬辰以鎮東大將軍琅邪王睿為侍中左丞相大都督陜東諸軍事大司馬南陽王保為右丞相大都督陜西諸軍事詔二王尅期大舉六月石勒害兖州刺史田徽是時山東郡國相繼陷于勒秋八月癸亥詔命始達于揚州改建鄴為建康改鄴為臨漳杜弢寇武昌燒焚城邑弢别將王真襲沔陽荆州刺史周顗奔于建康九月司空荀藩薨于滎陽劉聰寇河南河南尹張髦死之冬十月荆州刺史陶侃討杜弢黨杜曽於石城為曽所敗己巳大雨雹庚子大雪十一月流人楊武攻䧟梁州十二月河東地震雨肉二年春正月己巳朔黒霧著人如墨連夜五日乃止辛未辰時日隕于地又有三日相承出於西方而東行丁丑大赦楊武大畧漢中遂奔李雄二月壬寅以司空王浚為大司馬衞將軍荀組為司空涼州刺史張軌為太尉封西平郡公并州刺史劉琨為大將軍三月癸酉石勒陷幽州殺侍中大司馬幽州牧博陵公王浚焚燒城邑害萬餘人杜弢别帥王真襲荆州刺史陶侃於林鄣侃奔灄中夏四月甲辰地震五月壬辰太尉領護羌校尉涼州刺史西平公張軌薨六月劉曜趙冉寇新豐諸縣安東將軍索綝討破之秋七月曜冉等又逼京師領軍將軍麴允討破之冉中流矢而死九月北中郎將劉寅尅頓邱斬石勒所署太守邵攀丙戌麟見襄平單干代公猗盧遣使獻馬蒲子馬生人三年春正月盗殺晋昌太守趙珮吴興人徐馥害太守袁琇以侍中宋哲為平東將軍屯華隂二月丙子進左丞相琅邪王睿為大都督督中外諸軍事右丞相南陽王保為相國司空荀組為太尉大將軍劉琨為司空進封代公猗盧為代王荆州刺史陶侃破王真於巴陵杜弢别將杜𢎞張彦與臨川内史謝摛戰于海昏摛敗績死之三月豫章内史周訪擊杜𢎞走之斬張彦於陳夏四月大赦五月劉聰寇并州六月盗發漢霸杜二陵及薄太后陵太后面如生得金玉綵帛不可勝紀時以朝廷草創服章多闕勑收其餘以實内府丁邜地震辛巳大赦勑雍州掩骼埋胔修復陵墓有犯者誅及三族秋七月石勒䧟濮陽害太守韓𢎞劉聰寇上黨劉琨遣將救之八月癸亥戰于襄垣王師敗績荆州刺史陶侃攻杜弢弢敗走道死湘州平九月劉曜寇北地命領軍將軍麴允討之冬十月允進攻青白城以豫州牧征東將軍索綝為尚書僕射都督宮城諸軍事劉聰䧟馮翊太守梁肅奔萬年十二月涼州刺史張實送皇帝行璽一紐盗殺安定太守趙班四年春三月代王猗盧薨其衆歸于劉琨夏四月丁丑劉曜寇上郡太守藉韋率其屬奔于南鄭涼州刺史張實遣歩騎五千来赴京都石勒䧟廪邱北中郎將劉寅出奔五月平夷太守雷照害南廣太守孟桓帥二郡三千餘家叛降于李雄六月丁巳朔日有食之大蝗秋七月劉曜攻北地麴允帥歩騎三萬救之王師不戰而潰北地太守麴昌奔于京師曜進至涇陽渭北諸城悉潰建威將軍魯充散騎常侍梁緯少府皇甫陽等皆死之八月劉曜偪京師内外斷絶鎮西將軍焦嵩平東將軍宋哲始平太守竺恢等同赴國難麴允與公卿守長安小城以自固散騎常侍華輯監京兆馮翊𢎞農上洛四郡兵東屯霸上鎮軍將軍胡崧帥城西諸郡兵屯遮馬橋並不敢進冬十月京師饑甚米斗金二两人相食死者大半太倉有麴數十䴵麴允屑為粥以供帝至是復盡帝泣謂允曰今窘厄如此外無救援死於社稷是朕事也然念將士暴離斯酷今欲聞城未䧟為羞死之事庻令黎元免屠爛之苦行矣遣書朕意决矣十一月乙未使侍中宋敞送牋於曜帝乘羊車肉袒衘璧輿襯出降羣臣號泣攀車執帝之手帝亦悲不自勝御史中丞吉朗自殺曜焚櫬受璧使宋敞奉帝還宮初有童謠曰天子何在豆田中時王浚在幽州以豆有藿殺隐士霍原以應之及帝如曜營營實在城東豆田壁辛丑帝䝉塵於平陽麴允及羣官並從劉聰假帝光禄大夫懷安侯壬寅聰臨殿帝稽首于前麴允伏地慟哭因自殺尚書辛賔梁允侍中梁濬散騎常侍嚴敦左丞相臧振黄門侍郎任播張偉杜曼及諸郡守並為曜所害華輯奔南山石勒圍樂平司空劉琨遣兵援之為勒所敗樂平太守韓據出奔司空長史李𢎞以并州叛降于勒十二月甲申朔日有食之己未劉琨奔薊依段匹磾五年春正月帝在平陽庚子虹霓彌天三日並照平東將軍宋哲奔江左李雄使其將李恭羅寅寇巴東二月劉聰又使其將劉暢攻滎陽太守李距擊破之三月瑯邪王睿承制改元稱晋王於建康夏五月丙子日有食之秋七月大旱司冀青雍等四州螽蝗石勒亦競取百姓禾時人謂之胡蝗八月劉聰使趙固襲衞將軍華薈於定潁遂害之冬十一月丙子日有食之劉聰出獵令帝行車騎將軍戎服執㦸為導百姓聚而觀之故老或歔欷流涕聰聞而惡之聰後因大㑹使帝行酒洗爵反而更衣又使帝執盖晋臣在坐多失聲而泣尚書郎辛賔抱帝慟哭為聰所害十二月戊戌帝遇弑崩于平陽時年十八帝之繼皇統也屬永嘉之亂天下崩離長安城中戸不盈百牆宇頽毁蒿棘成林朝廷無車馬章服惟桑版署號而已衆惟一旅公私有車四乘噐械多闕運饋不繼巨猾滔天帝京危急諸侯無釋位之志征鎮闕勤王之舉故君臣窘廹以至殺辱云愍帝建興五年右自武帝受禪至愍帝合五十二年是為西晋元帝興江東為東晋通志卷十上
