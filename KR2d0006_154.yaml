body:
  text: 通志卷一百三十一宋右迪功郎鄭樵漁仲撰列傳第四十四宋劉穆之穆之孫子雍穆穆之中子式之之式之子瑀之從父兄子秀徐羡之兄子佩之湛佩之弟逵之逵之子之湯休傅亮兄迪隆族兄檀道濟兄韶韶孫圭韶弟祗王鎮惡朱齡石父綽石弟超毛修之沈田子弟林子璞林子子傅𢎞之朱修之王元謨從弟元象劉敬宣劉懷肅弟懷敬弟懷愼懷敬子真道懷愼子德願懷敬德願子榮祖劉粹弟道濟人族弟損宗伯龍孫處蒯恩向靖子柳劉鍾虞邱進孟懷玉弟龍符胡藩劉康祖父虔之道伯父簡之子簡之子産道産延孫劉穆之字道和小字道民東莞莒人漢齊悼惠王肥後也世居京口少好書傳博覽多通為琅邪太守濟隂江凱所知以為府主簿初穆之嘗夢與髙祖俱泛海忽值大風驚懼俯視船下見有二白龍挾舫既而至一山峰崿聳秀林木繁密意甚悅之及武帝尅京城問何無忌曰急須一主簿何由得無忌曰無過劉道民帝曰吾亦識之即馳召焉時穆之聞京城有呌譟之聲晨起出陌頭屬與信會直視不言者久之反室壞布裳為袴往見武帝帝謂曰我始舉大義方造艱難須一軍吏甚急卿謂誰堪其選穆之曰貴府始建軍吏實須其才倉卒之際略當無見踰者武帝笑曰卿能自屈吾事濟矣即於坐受署從平京邑諸大處分皆倉卒立定並穆之所建也遂委以腹心之任動止咨之穆之亦竭節盡誠無所遺隱時晉綱寬弛威禁不行盛族豪右負勢陵縱重以司馬元顯政令違舛桓元科條繁密穆之斟酌時宜隨方矯正不盈旬日風俗頓改遷尚書祠部郎復為府主簿記室録事參軍領堂邑太守以平桓元功封西華縣五等子義熙三年揚州刺史王謐薨武帝次應入輔劉毅等不欲帝入議以中領軍謝混為揚州或欲令帝於丹徒領州以內事付僕射孟昶遣尚書右丞皮沈以二議咨武帝沈先與穆之言穆之偽如厠即密疏白帝言沈語不可從帝既見沈且令出外呼穆之問焉穆之曰公興復皇祚勳髙萬古既有大功便有大位位大勳髙非可持久公今日豈得居謙遂為守藩將邪劉孟諸公與公俱起布衣共立大義事乃一時相推非宿定臣主分也力敵勢均終相吞咀揚州根本所繫不可假人前授王謐事出權宜今若復他授便應受制於人一失於權無由可得今朝議如此公唯應云在我措辭又難然神州治本宰輔崇要非可遙論便入朝共盡同異公至京邑彼必不敢越公更授餘人明矣武帝善其言由是入輔從征廣固還拒盧循常居幕中畫策劉毅等疾之每從容言其權重帝愈信仗之穆之外所聞見莫不大小必白雖復閭里諧謔塗陌細事皆一一以聞武帝每得民間委密消息以示聰明皆由穆之也穆之又愛賔遊坐客常滿廣布耳目以為視聽故朝野異同穆之莫不必知雖復親昵短長皆陳奏無隱人或譏之穆之曰以公之明將來會自聞達我蒙公恩義無隱諱此張遼所以告關侯欲反也武帝舉止施為穆之皆下節度武帝書素拙穆之曰此雖小事然宣被四逺願公小復留意帝既不能措意又稟分有在穆之乃曰公但縱筆為大字一字徑尺亦無嫌大既足有所包其勢亦美帝從之一紙不過六七字便滿穆之凡所薦達不納不止常云我雖不及荀令君之舉善然不舉不善穆之與朱齡石並便尺牘常於武帝坐與齡石共答書自旦至日中穆之得百函齡石得八十函而穆之應對無廢也轉中軍太尉司馬加丹陽尹武帝西討劉毅以諸葛長民監留府總攝後事帝疑長民難獨任留穆之以輔之加建威將軍置佐吏配給實力長民果有異謀而猶豫不能發乃屏人謂穆之曰悠悠之言皆云太尉與我不平何以至此穆之曰公泝流逺伐而以老母稚子委節下若一毫不盡豈容如此邪長民意乃小安穆之亦厚為之備語在長民傳中帝還長民伏誅十年進穆之前將軍武帝西伐司馬休之中軍將軍道憐知留任而事無大小一決穆之遷尚書右僕射領選將軍尹如故後武帝北伐留世子為中軍將軍監太尉留府轉穆之左僕射領監軍中軍二府軍司將軍尹領選如故甲仗五十人入殿入居東城穆之內總朝政外供軍旅決斷如流事無擁滯賔客輻湊求訴百端內外咨稟盈階滿室目覽辭訟手答箋書耳行聽受口並酬應不相參涉皆悉贍舉又言談賞笑彌日亘時未嘗倦苦裁有間暇手自寫書尋覽篇章校定墳籍性奢豪食必方丈旦輒為十人饌穆之既好賔客未嘗獨餐每至食時客止十人以還帳下依常下食以此為常嘗白帝曰穆之家本貧賤贍生多闕自叨忝以來雖每存約損而朝夕所須微為過豐自此以外一毫不以負公十三年十一月疾卒時年五十八武帝在長安聞問驚慟哭惋者數日本欲頓駕關中經略趙魏穆之既卒京邑任虛乃馳還彭城以司馬徐羡之代管留臺而朝廷大事嘗決於穆之者並悉北咨穆之前將軍文武二萬人以三千配羡之建威府餘悉配世子中軍府追贈穆之散騎常侍衛將軍開府儀同三司武帝表天子重贈侍中司徒封南昌縣侯及武帝受禪每歎憶之曰穆之不死當助我理天下可謂人之云亡邦國殄瘁光祿大夫范泰對曰聖主在上英彥滿朝穆之雖功著艱難未容便關興毁帝笑曰卿不聞驥騄乎貴日致千里耳帝後復曰穆之死人輕易我其見思如此以佐命元勳追封南康郡公諡曰文宣穆之少時家貧誕節嗜酒食不修拘檢好往妻兄家乞食多見辱不以為恥其妻江嗣女甚明識每禁不令往江氏後有慶會屬令勿來穆之猶往食畢求檳榔江氏兄弟戲之曰檳榔消食君乃常飢何忽須此妻復截髮市肴饌為其兄弟以餉穆之自此不對穆之梳沐及穆之為丹陽尹將召妻兄弟妻泣而稽顙以致謝穆之曰本無匿怨無所致憂及至醉飽穆之乃令厨人以金柈貯檳榔一斛以進之曰此可消食也文帝元嘉九年配食髙祖廟庭二十五年車駕幸江寧經穆之墓詔致祭墓所長子慮之嗣仕至常侍卒子雍嗣先是郡縣為封國者內史相並於國主稱臣去任便止至孝武帝孝建中始革此制為下官致敬河東王歆之嘗為南康相素輕雍後歆之與雍俱預元會並坐雍性嗜酒謂歆之曰卿昔見臣今不能見勸一杯酒乎歆之因斆孫皓歌答曰昔為汝作臣今與汝比肩既不勸汝酒亦不願汝年雍性嗜瘡痂以為味似鰒魚嘗詣孟靈休靈休先患炙瘡瘡痂落牀上雍取食之靈休大驚雍答曰性之所嗜靈休瘡痂未落者悉禠取以飴雍雍去靈休與何朂書曰劉雍向顧見噉遂舉體流血南康國吏二百許人不問有罪無罪遞與鞭瘡痂常以給膳雍卒子彤嗣坐以刀斫妻奪國土以弟彪紹封齊建元初降封南康縣侯虎賁中郎將坐廟墓不修削爵為羽林監穆之中子式之字延叔通易好士纍遷宣城淮南二郡太守贓賄狼藉揚州刺史王𢎞遣從事檢校之式之召從事謂曰還白使君劉式之於國家粗有微分偷數百萬錢何有况不偷邪從事還白𢎞由此得停從征關洛有功封德陽縣五等侯卒諡曰恭子瑀字茂琳少有才氣始興王濬為徐州刺史以瑀為别駕瑀性陵物護前時濬征北府行參軍吳郡顧邁輕薄有才能濬待之厚瑀乃折節事邁邁以瑀與之欵盡濬所言密事悉以語瑀瑀與邁共進射堂下忽顧左右索單衣幘邁問其故瑀曰公以家人待卿言無不盡卿外宣泄我是公吏何得不啓遂白之濬大怒啓文帝徙邁廣州瑀由是為文帝所知纍遷益州刺史元凶弒立瑀聞問起義孝武即位召為御史中丞瑀使氣尚人為憲司甚得志彈蕭惠開云非才非望非勳非德彈王僧達云蔭藉髙華人品冗末朝士莫不畏其筆端尋轉右衛將軍瑀年位本在何偃前孝武初偃為吏部尚書瑀圗侍中不得適與偃同從郊祀時偃乘車在前瑀策駟居後相去數十步瑀踏馬及之謂偃曰君轡何疾偃曰牛駿馭精所以疾耳偃曰君馬何遲曰騏驥羅於羈絆所以居後偃曰何不著鞭使致千里答曰一蹴自造青雲何至與駑馬爭路邪雖相嘲謔然意甚不平謂所親曰人仕宦不出當入不入當出安能長居户限上因求益州帝許之既行甚不得意至江陵與顔峻書曰朱修之三世叛兵一旦居荆州青油幕下作謝宣明面見向使齊帥以長刀引吾下席於吾何有政恐胸奴輕漢耳坐奪人妻為妾免官後為吳興太守侍中何偃嘗案之云參伍時望瑀大怒曰我於時望何參伍之有遂與偃絶及偃為吏部尚書意彌憤憤族叔秀之為丹陽瑀又與親故書曰吾家黑面阿秀遂居劉安衆處朝廷不為多士其年疽發背何偃亦發背癰瑀疾已篤聞偃亡歡躍呼呌於是亦卒諡曰剛瑀從子祥齊史有傳秀之字道寶穆之從父兄子也祖爽山隂令父仲道餘姚令秀之少孤貧有志操十餘嵗時與諸兒戲於前渚忽有大蛇來勢甚急莫不顛沛驚呼秀之獨不動衆並異焉東海何承天雅相知以女妻之兄欽之為朱齡石右軍參軍隨齡石敗沒秀之哀戚不歡宴者十年景平二年除駙馬都尉奉朝請元嘉十六年再遷建康令性纖密善糾摘微隱政甚有聲孝武鎮襄陽以為撫軍録事參軍襄陽令襄陽有六門堰溉良田數千頃堰久決壞公私廢業孝武遣秀之修復雍部由是大豐後除西戎校尉梁南秦二州刺史加都督漢川飢饉秀之躬自儉約先是漢川以絹為貨秀之限令用錢百姓利之二十七年大舉北侵遣輔國將軍楊文德巴西梓潼二郡太守劉𢎞宗受秀之節度震蕩汧隴元凶弒逆秀之即日起兵率衆求赴襄陽司空南譙王義宣不許事寧遷益州刺史折留俸祿二百八十萬付梁州鎮庫此外蕭然梁益二州土境豐富前後刺史莫不大營聚蓄多者致萬金所攜賔客並京邑貧子出為郡縣皆以茍得自資秀之為治整肅以身率下遠近悅焉南譙王義宣據荆州為逆遣使徵兵於秀之秀之即斬使戒嚴襲江陵破之事平以起義功封康樂郡侯遷丹陽尹先是秀之從叔穆之為丹陽尹與子弟於聽事上飲宴秀之亦與焉聽事柱有一穿穆之謂子弟及秀之曰汝等試以栗遙擲此柱若能入穿者後必得此郡穆之諸子並不能中惟秀之獨入焉至是其言遂驗時賖買百姓物不還錢秀之以為非宜陳之甚切雖納其言竟不用遷尚書右僕射時改定制令𨽻民殺長吏科議者謂會赦宜以徙論秀之以為律文雖不顯民殺官長之旨若值赦但止徙論便與悠悠殺人曽無一異民敬官長比之父母行害之身雖遇赦謂宜長付尚方窮其天命家口補兵從之後出為安北將軍寧蠻校尉雍州刺史加都督車駕幸新亭視秀之發引八年將徵為左僕射會卒贈司空諡忠成公秀之野率無風采而心力堅正上以其蒞官清潔家無餘財賜錢二千萬布二百匹傳封至孫齊受禪國除徐羡之字宗文東海郯人也祖寧尚書吏部郎父祚之上虞令羡之少為桓修撫軍中兵參軍與武帝同府深相親結武帝起兵版為領軍司馬與謝混共事混甚知之武帝北伐轉太尉左司馬掌留任以副二劉穆之初武帝議欲北伐朝士多諫唯羡之默然或問何獨不言羡之曰今二方已平拓地萬里唯小羌未定而公寢食不安何可輕豫其議劉穆之卒帝欲用王𢎞代之謝晦曰休元輕易不若徐羡之乃命羡之為吏部尚書建威將軍丹陽尹總知留任甲仗二十人出入轉尚書僕射義熙十四年軍人朱興妻周生子道扶年三嵗先得癎病周因其病發掘地生埋之為道扶姑雙女所告有司坐周棄市羡之議曰自然之愛豺狼猶仁周之凶忍宜加顯戮臣以為法律之外尚𢎞通理母之即刑由子明法為子之道焉有自容之地愚謂可特申之遐裔從之及武帝踐阼録佐命之功詔曰丹陽尹徐羡之江州刺史王𢎞護軍將軍檀道濟中書令傅亮侍中謝晦前左將軍檀韶雍州刺史趙倫之北徐州刺史劉懷慎散騎常侍王仲德北青州刺史向彌左衛將軍劉粹南蠻校尉到彥之西中郎司馬張劭河中太守沈林子等或忠規逺謀扶贊洪業或肆勤植績宏濟艱難經始圗終勳烈惟茂宜與國同休饗兹大賚羡之可封南昌縣公餘各改封增邑羡之遷尚書令揚州刺史位司空録尚書事羡之起自布衣又無術學直以風力局度一旦居廊廟朝野推服咸謂有宰臣之望沉密寡言不以憂喜見色頗工奕碁觀戲常若未解當世倍以此推之傅亮蔡廓常言徐公曉萬事安異同嘗與傅亮謝晦宴聚亮晦才學辨博而羡之風度詳整時然後言鄭鮮之歎曰觀徐公言論不復以學問為長武帝不豫加班劒三十人宮車晏駕與中書令傅亮領軍將軍謝晦鎮北將軍檀道濟同被顧命少帝詔羡之亮率衆宮內月一決獄帝後失德羡之等將謀廢立而廬陵王義真輕動多過不任四海乃先廢義真然後廢帝時謝晦為領軍以府舍內屋敗應修理悉移家人出宅聚將士於府內以檀道濟先朝舊將威服殿省且有兵衆召入朝告之謀既廢帝侍中程道惠勸立第五皇弟義恭羡之不許遣使殺義真於新安弒少帝於吳縣及文帝即阼遷羡之司徒封南平郡公固讓加封有司奏車駕依舊華林園聽訟詔二公如先權訊元嘉二年羡之與左光祿大夫傅亮上表歸政三奏乃見許羡之乃遜位退還私第兄子佩之及侍中程道惠吳興太守王韶之等並謂非宜敦勸甚苦復奉詔攝任三年正月帝以羡之亮晦旬日間再肆鴆毒乃下詔暴其罪誅之爾日詔召羡之行至西門外時謝晦弟皭為黃門郎正直報亮云殿內有異處分亮馳報羡之羡之回還西州乘內人問訊車出郭步走至新林入陶竈中自縊而死年六十三羡之初不應召上遣中領軍到彥之右衛將軍王華追討及死野人以告載尸付廷尉諸子從誅初羡之年少時嘗有一人來謂之曰我是汝祖羡之因起拜之此人曰汝有貴相當有大厄可以錢二十八文埋宅四角可以免災過此可位極人臣後羡之隨親之縣住在縣內嘗暫出而賊自後破縣縣內人無免者雞犬亦盡唯羡之在外獲全又隨從兄履之為臨海樂安縣嘗行經山中見黑龍長丈餘頭有角前兩足皆具無後足曳尾而行及拜司空守關將入彗星晨見危南又當拜時雙鶴集太極殿東鴟尾鳴喚竟以凶終羡之兄欽之位祕書監欽之子佩之輕薄好利武帝以其姻戚纍加寵任為丹陽尹景平初以羡之知權頗與政事與王韶之程道惠中書舍人邢安泰潘盛為黨時謝晦久病連灸不堪見客佩之等疑其託疾有異圗與韶之道惠同載詣傅亮稱羡之意欲令作詔誅之亮曰己等三人同受顧命豈可自相殘戮佩之等乃止羡之既誅文帝特宥佩之免官而已其冬佩之謀反事覺被誅佩之弟逵之尚武帝長女會稽宣公主為彭城沛二郡太守武帝諸子並幼以逵之姻戚將大任之欲先令立功及討司馬休之使統軍為前鋒待尅當即授荆州於陳見害追贈中書侍郎子湛之字孝源幼孤為武帝所愛常與江夏王義恭寢食不離帝側永初三年詔以公主一門嫡長且湛之致節之允封枝江縣侯數歲與弟淳之共車行牛奔車壞左右人馳來赴之湛之先令取弟衆咸嘆其幼而有識及長頗涉文義事祖母及母並以孝謹聞元嘉六年東宮始建起家補太子洗馬纍遷祕書監領右軍將軍會稽公主身居長嫡為文帝所禮家事大小必咨而後行西征謝晦使公主留止臺內總攝六宮每有不得意輒號哭上甚憚之初武帝微時貧陋過甚常自於新洲伐荻有納布衣襖等皆是敬皇后手自作武帝既貴以此衣付公主曰後世有驕奢不節者可以此衣示之湛之為大將軍彭城王義康所愛與劉湛等頗相附及劉湛得罪事連湛之文帝大怒將加大辟湛之憂懼無計以告公主公主即日入宮既見文帝號哭下牀不復施臣妾之禮以錦囊盛武帝納衣擲地以示上曰汝家本貧賤此是我母為汝父作納衣今日有一頓飽食便欲殘害我兒子上亦號哭湛之由是得全再遷太子詹事尋加侍中湛之善尺牘音辭流暢貴戚豪強産業甚厚室宇園池貴遊莫及妓樂之妙冠絶一時門生千餘皆三吳富人子姿質端妍衣服鮮麗每出入行遊塗巷盈滿泥雨日悉以後車載之文帝每嫌其侈縱屢以為言時安成公何朂無忌之子也臨汝公孟靈休昶之子也並名奢豪與湛之以肴膳器服車馬相尚京邑為之語曰安成食臨汝飾湛之美兼何孟朂官至侍中追諡荒公靈休善彈棊官至祕書監湛之後遷丹陽尹加散騎常侍以公主憂不拜過葬復授前職二十二年范曄等謀逆湛之始與之同後發其事所陳多不盡為曄款詞所連有司以湛之關豫逆黨事起積歲乃歸聞多有蔽匿請免官削爵付廷尉上不許湛之詣闕請罪上優詔慰譬遣之二十四年服闋轉中書令太子詹事出為南兖州刺史善於為政威惠並行廣陵城舊有髙樓湛之更加修整南望鐘山城北有陂澤水物豐盛湛之更起風亭月觀吹臺琴室果竹繁茂花藥成行招集文士盡遊玩之適時有沙門釋惠休善屬文緣情綺豔湛之與之甚厚孝武命使還俗本姓湯位至揚州從事史二十六年湛之復入為丹陽尹領太子詹事二十七年魏太武至瓜步湛之領兵與皇太子分守石頭二十八年魯爽兄弟率部曲來奔爽等軌子也湛之以為廟算特所奬納不敢苟申私怨乞屏田里不許轉尚書僕射領護軍將軍時尚書令何尚之以湛之國戚任遇隆重欲以朝政推之凡諸詞訴絶不科省湛之亦以尚書令敷奏出納事無不總令缺則僕射總任又以事歸尚之互相推委御史中丞袁淑奏並免官詔特無所問乃使湛之與尚之並受詞訴尚之雖為令而朝事悉歸湛之初劉湛伏誅殷景仁卒文帝委任沈演之庾炳之范曄等其後又有江湛何瑀之自曄誅炳之免演之瑀之並卒至是江湛為吏部尚書與湛之並居權要世謂之江徐上每有疾湛之輒入侍醫藥二凶巫蠱事發上欲廢劭賜濬死而孝武不見寵故纍出外藩不得停都下南平王鑠建平王宏並上所愛而鑠妃即湛之妹湛之勸上立之元嘉末徵鑠自夀陽入朝既至又失旨欲立宏嫌其非次是以議久不決與湛之議或連日纍夕每夜常使湛之自秉燭繞壁檢行慮有竊聽者劭入弒之旦其夕上與湛之屏人語至曉猶未滅燭湛之驚起趣北户未及開見害時年四十四孝武即位追贈司空諡曰忠烈公又詔曰徐湛之江湛王僧綽門户荼酷宜厚加恤賜於三家長給廩湛之子聿之為元凶所殺聿之子孝嗣齊史有傳傅亮字季友北地靈州人也髙祖咸晉司𨽻校尉父瑗以學業知名至安成太守瑗與郗超善超嘗造瑗瑗見其二子迪及亮亮年四五嵗超令人解亮衣使左右持去初無吝色超謂瑗曰卿小兒才名位宦當逺踰於兄然保家終在大者迪字長猷宋初官終五兵尚書贈太常桓元篡位聞亮博學有文采選為祕書郎欲令整正祕閣未及拜而元敗義旗初起丹陽尹孟昶以為建威參軍義熙元年除員外散騎侍郎遷中書黃門侍郎直西省典誥命武帝以久直勤勞欲以為東陽郡先以語迪迪喜而告亮亮不答即馳見武帝曰東陽忝祿私計為幸但馮廕之願實結本心乞歸天宇不樂外出帝笑曰謂卿須祿耳能如此甚協所望也會西討司馬休之以為太尉從事中郎掌記室亮從征關洛還至彭城宋國初建除侍中領世子中庶子加中書令從還夀陽武帝有受禪意而難於發言乃集朝臣宴飲從容言曰桓元暴篡鼎命已移我首唱大義興復皇室南征北伐平定四海功成業著遂荷九錫今年時衰暮崇極如此物戒盛滿非可久安輒欲奉還爵位歸老京師羣臣唯盛稱功德莫曉此意日晚坐散亮還外乃悟旨而宮門已閉亮於是叩扉請見武帝即開門見之亮入便曰臣暫宜還都帝知解此意無復他言直云須幾人自送亮曰須數十人於是奉辭亮既出夜見長星亘天亮拊髀曰我常不信天文今始驗矣亮至都即徵武帝入輔永初元年加太子詹事餘如故以佐命功封建成縣公入直中書省専典詔命以亮任總國權聽於省見客神虎門外每旦車常數百兩武帝登庸之始文筆皆是記室滕演北征廣固悉委長史王誕自此之後至于受命表策文誥皆亮辭也演字彥將南陽西鄂人位至祕書監二年加亮尚書僕射及武帝不豫與徐羡之謝晦並受顧命給班劒二十人少帝即位進為中書監尚書令領護軍將軍少帝廢亮率行臺至江陵奉迎文帝既至立行臺於江陵城南題曰大司馬門率行臺百僚詣門拜表威儀禮容甚盛文帝將下引見亮哭泣哀動左右既而問義真及少帝薨廢本末悲號嗚咽侍側者莫能仰視亮流汗沾背不能答於是布腹心於到彥之王華等深自結納及至都徐羡之問帝可方誰亮曰晉文景以上人羡之曰必能明我赤心亮曰不然及文帝即位加左光祿大夫開府儀同三司司空府文武即為左光祿府進爵始興郡公固讓進封元嘉三年帝將欲誅亮先呼入見省內密有報之者亮辭以嫂病篤求暫還家遣信報徐羡之因乘車出郭門騎馬奔兄迪墓屯騎校尉郭泓收付廷尉初至廣莫門上遣中書舍人以詔示亮并謂曰以公江陵之誠當使諸子無恙亮讀詔訖曰亮受先帝布衣之眷遂蒙顧託黜昏立明社稷之計欲加之罪其無辭乎於是伏誅時年五十三妻子流建安亮之方貴也兄迪每深誡焉而不能從及見世路屯險著論名曰演慎亮布衣儒生僥幸際會既居宰相兼秉重權及少帝失德內懷憂懼直宿禁中睹夜蛾赴燭作感物賦以寄意焉亮初奉迎大駕在道賦詩三首其一篇有悔懼之辭亮自知傾覆求退無由又作辛有穆生董仲道贊稱其見微之美至是竟不免長子演先亮卒演弟悝湛逃亡湛弟都徙建安後並還京師亮族兄隆字伯祚曽祖晞司徒屬父祖並早卒隆少孤貧有學行義熙初年四十為孟昶建威參軍纍遷尚書左丞以族弟亮為僕射緦服不得相臨徙太子率更令元嘉初為御史中丞甚得司直之體轉司徒左長史會稽剡縣人黃初妻趙打殺息載妻王遇赦王有父母及男稱女葉依法徙趙二千里外隆議曰禮律之興本之自然求之情理非從天墮非從地出父母至親分形同氣稱之於載即載之於趙雖言三世為體猶一稱雖創巨痛深固無讐祖之義向使石厚之子日磾之孫砥鋒挺鍔不與二祖同戴天日則石碏秺侯何得流名百代舊令言殺人父母徙之二千里外不施於父子孫祖明矣趙當避王期功千里外耳令亦云凡流徙者同籍親近欲相隨者聽之此又大通情體因親以教愛也趙既流移載為人子何得不從載從而稱不行豈名教所許如此稱趙竟不可分趙雖內愧終身稱亦沈痛沒齒孫祖之義自不得以永絶事理然也從之出為義興太守有能名拜左户尚書坐正直受節假對人未至委出白衣領職尋轉太常文帝以新撰禮論付隆使更下意隆表上五十二事後致仕拜光祿大夫歸老於家手不釋卷博學多通特精三禮年八十三卒檀道濟髙平金鄉人也世居京口少孤居喪備禮奉兄姊以和謹稱武帝建義道濟與兄韶祗等從平京城俱參武帝建武將軍事以建義功封吳興縣五等子從劉道規討桓謙苟林身先士卒所向摧破又從破徐道覆以道濟戰功居多遷安遠護軍復參太尉軍事封作唐縣男義熙十二年武帝北伐道濟為前鋒出淮肥所至諸城戍望風降服進剋許昌獲太守姚坦及大將楊素至成臯降刺史韋華徑進洛陽陳留公姚洸降凡拔城破壘俘四千餘人議者謂應悉戮以為京觀道濟曰伐罪弔民正在今日皆釋而遣之於是中原感悅相率歸之進據潼關與諸將共破姚紹長安平以為琅邪內史武帝受命轉護軍加散騎常侍領石頭戍事聽直入殿省以佐命功改封永修縣公徙丹陽尹帝不豫給班劒二十人遷鎮北將軍出為南兖州刺史徐羡之等將廢廬陵王義真以告道濟意不同屢陳不可竟不納羡之等謀欲廢立諷道濟入朝既至以謀告之將廢帝之夜道濟入領軍府就謝晦宿其夕晦悚動不得眠道濟就寢便睡熟晦以此服之文帝未至道濟入守朝堂及即位進號征北將軍給鼓吹一部進封武陵郡公固辭進封道濟素與王𢎞善時𢎞被遇方深道濟彌相結附每構羡之等𢎞亦雅仗之上將誅羡之等召道濟欲使西討謝晦王華曰不可上曰道濟從人者也曩非創謀撫而使之必將無慮道濟至之明日上誅羡之亮既而使道濟與中領軍到彥之前驅西伐上問䇿於道濟對曰臣昔與謝晦同從先帝北征入關十䇿晦有其九才略明練殆難與敵然未嘗孤軍決勝戎事非其所長臣悉晦智晦悉臣勇今奉王命外討必未陳而禽遂行彥之先與晦戰敗退保隱圻會道濟繼至晦本謂道濟與羡之等同誅忽聞來上人情凶懼遂不戰自潰事平遷都督江州豫州四郡諸軍事征南大將軍開府儀同三司江州刺史持節常侍如故元嘉八年到彥之伐魏已平河南尋失之魏逼滑臺加道濟都督征討諸軍事至東平壽張大破魏安平公乙旃眷至髙梁亭斬魏濟州刺史悉頰庫魏衆甚盛遂尅滑臺道濟與魏軍三十餘戰多捷軍至歷城以資運竭乃還時有降魏者具説糧食已罄於是士卒憂懼莫有固志道濟夜唱籌量沙以所餘米散其上及旦魏軍見之謂其資糧有餘故不復追以降者為妄斬以徇時道濟兵寡弱軍中大懼道濟乃命軍士悉解甲身自服乘輿徐出外圍魏軍懼有伏不敢逼乃歸道濟雖不剋定河南全軍而反雄名已大振魏人甚憚之至乃圖之以禳鬼還進位司空鎮夀陽道濟立功前朝威名甚重左右腹心並經百戰諸子又有才氣朝廷疑畏之時人或目之曰安知非司馬仲達也文帝寢疾纍年屢經危殆領軍劉湛貪執朝政慮道濟為異説又彭城王義康亦慮宮車晏駕道濟不可復制十二年上疾篤會魏軍南伐召道濟入朝其妻向氏曰夫髙世之勳道家所忌今無事相召禍其至矣既至上已間十三年春將遣道濟還鎮下渚未發有似鷦鳥集船悲鳴會上疾動義康矯詔召入祖道收付廷尉道濟及其子黃門侍郎植司徒從事中郎粲太子舍人混征北主簿承伯祕書郎中遵等八人並誅時人歌曰可憐白浮鳩枉殺檀江州道濟死日建康地震白毛生又收司空參軍薛彤髙進之並道濟腹心也道濟有勇力時以比蜀將關張初道濟見收憤怒氣盛目光如炬俄爾間引飲一斛脫幘投地曰乃壞汝萬里長城魏人聞之皆曰道濟已死矣吳子輩不足復憚自是頻歲南伐有飲馬長江之志文帝問殷景仁曰誰可繼道濟答曰道濟以纍有戰功故致威名餘但未任耳帝曰不然昔李廣在朝胸奴不敢南望後繼者復有幾人二十七年魏軍至瓜步文帝登石頭城望見甚有憂色至曰若道濟在彼豈至此韶字令孫以討桓元功封邑邱侯從征廣固率所領先登位琅邪內史從討盧循以功更封宜陽縣後拜江州刺史以罪免韶嗜酒貪橫所蒞無政績上嘉其合門從義道濟又有大功故特見寵授卒子臻嗣臻字係宗位員外郎臻子圭字伯玉位沅南令元徽中王僧虔為吏部尚書以圭為征北版行參軍圭訴僧虔求祿不得與僧虔書曰僕一門雖謝文遙乃忝武達羣從姑叔三忝帝姻而令子弟餓死遂不荷潤蟬腹龜腸為日已久飢彪能赫人遽與肉餓驎不噬誰為落毛雖復孤微百世國士姻媾位官亦不後物尚書同堂姊為江夏王妃檀圭同堂姑亦為南譙王妃尚書伯為江州檀圭祖亦為江州僕於尚書人地本懸至於婚宦肯不殊絶今通塞雖異猶忝氣類尚書何事為爾見苦僧虔報書曰吾與足下素無怨憾何以相苦直是意有左右耳乃用為安成郡丞祗字恭叔與兄韶弟道濟俱參義舉封西昌縣侯歷位廣陵相義熙十年亡命司馬國璠兄弟自北徐州界潛得過淮因天隂暗夜率百許人緣廣陵城入呌喚直入聽事祗被傷股語左右曰賊乘暗得入欲掩我不備但打五鼓以懼之賊必走矣賊聞鼓鳴直謂為曉乃奔散追殺百餘人宋國初建為領軍祗性矜豪樂在外放恣不願內職不得志發疾不自療其年卒于廣陵諡曰威侯傳嗣至齊受禪國除王鎮惡北海劇人也祖猛仕苻堅任兼將相父休河東太守鎮惡以五月五日生家人以俗忌欲令出繼踈宗猛見而奇之曰此非常兒昔孟嘗君以五月五日生而相齊是兒亦將興吾門矣故名之為鎮惡年十三而苻氏敗亡關中擾亂流寓崤澠之間常寄食澠池人李方家方善遇之謂方曰若遭英雄主要取萬户侯當厚相報方答曰君丞相孫人才如此何患不富貴至時願見用為本縣令足矣後隨叔父曜歸晉客居荆州頗讀諸子兵書喜論軍國大事騎乘非所長開弓甚弱而意略縱橫果決能斷廣固之役或薦鎮惡鎮惡時為天門郡臨澧令髙祖即召之與語甚異焉因留宿明旦謂諸佐曰鎮惡王猛之孫所謂將門有將也即署前部賊曹拒盧循於查浦屢戰有功封博陸縣五等子武帝謀討劉毅鎮惡曰公若有事西楚請給百舸為前驅及西討轉鎮惡參太尉軍事帝至姑孰遣鎮惡率龍驤將軍蒯恩百舸前發戒之曰若賊知吾上比軍至亦當少日耳政當岸上作軍未辦便下船也卿至彼深加籌量可擊即擊之若不可便燒其船艦且浮舸岸側以待吾至慰勞百姓宣揚詔旨并赦文及吾與衛軍府文武書罪止一人其餘不問若賊都不知消息未有備防可襲便襲今去但云劉兖州上鎮惡受命晝夜兼行至豫章口去江陵城二十里自鎮惡進路揚聲劉兖州上毅謂為信然不知見襲鎮惡自豫章口舍船步上蒯恩軍在前鎮惡次之舸留一二人對舸岸上豎六七旗旗下輒安一鼓語所留人曰計我將至城便長嚴令後有大軍狀又分隊在後令燒江津船艦鎮惡徑前襲城津戍及百姓皆言劉藩實上晏然不疑未至城五六里逢毅要將朱顯之與十許騎出江津問是何人答云劉兖州至顯之馳前問藩所在軍人答云在後及至軍後不見藩又望見江津船艦被燒煙熖張天而鼓聲甚盛知非藩上便躍馬馳去告毅外有大軍令閉諸城門鎮惡亦馳進軍人緣城得入門猶未及關因得開大城東門毅有八隊帶甲千餘已得戒嚴蒯恩與鎮惡俱由東門入分攻金城東西門自食時就鬭至日晡西人散降略盡鎮惡入城因風放火燒大城南門及東門又遣人以詔及赦文并武帝手書凡三函示毅毅皆燒不視金城內亦未知帝自來因短兵接戰鎮惡軍人與毅下將或有是父兄子弟中表者鎮惡令且鬭且語衆並知武帝在後人情離懈初毅所乘馬在城外不得入倉卒無馬使就子肅取馬肅不與朱顯之謂曰人取汝父而惜馬汝走欲何之奪馬以授毅是日一更許聼事前陳散潰三更中毅開北門突出鎮惡衝之不得去回衝蒯恩軍得從大城東門出奔牛牧佛寺自縊死鎮惡身被五箭手所執矟手中破折江陵平後二十日大軍方至以功封漢夀縣子十二年武帝北伐轉為鎮西咨議參軍行龍驤將軍領前鋒將發前將軍劉穆之引鎮惡於積弩堂謂之曰公愍此遺黎志蕩逋逆昔晉文王委蜀於鄧艾今公亦委卿以關中相勉建大功勿辜此授鎮惡曰吾等因託風雲並蒙拔擢今不剋咸陽誓不復濟江而還若三秦既定而公九錫不至亦卿之責矣鎮惡入敵境戰無不捷邵陵許昌望風奔散破虎牢及柏谷塢斬賊帥趙元軍次洛陽姚洸降進次澠池造故人李方家升堂見母厚加酬賚即版授方為澠池令遣司馬毛德祖攻𢎞農守尹雅於蠡城禽之方軌長驅徑據潼關偽大將軍姚紹率大衆拒險深溝髙壘以自固鎮惡懸軍逺入轉輸不充與賊相持日久將士乏食乃親到𢎞農督上民租百姓競送義粟軍食復振初武帝與鎮惡期若剋洛陽須大軍至未可輕前既而鎮惡等徑向潼關為紹所拒不得進軍又乏食馳告武帝求糧援時武帝入河魏軍屯據河岸軍不得前武帝呼所遣人開舫北户指河上軍示之曰我語令勿進而深入岸上如此何由得遣軍鎮惡既得義租紹又病死偽撫軍將軍姚讚代紹守嶮衆力猶盛武帝至湖城讚引退大軍遂次潼關謀進取之計鎮惡請率水軍自河入渭直至渭橋鎮惡所乘皆蒙衝小艦行船者悉在艦內羌見艦泝渭而進艦外不見有行船人北土素無舟楫莫不驚以為神鎮惡既至令將士食畢便棄船登岸渭水流急諸艦悉逐流去時姚泓屯軍長安城下猶數萬人鎮惡撫慰士卒曰卿諸人家並在江南此是長安城北門外去家萬里而船乘衣糧並已逐流去豈復有求生之計唯宜死戰可以立功不然無遺類矣乃身先士卒衆亦知無退路莫不騰踊爭先泓衆一時奔潰即陷長安泓挺身逃走明日率妻子歸降城內夷晉六萬餘户鎮惡宣揚國恩撫慰初附號令嚴肅百姓安堵奉迎武帝於灞上帝勞之曰成吾霸業者真卿也鎮惡拜謝曰此明公之威諸將之力鎮惡何功之有乎帝笑曰卿欲學馮異邪是時關中豐全倉庫充積鎮惡極意收斂子女玉帛不可勝計武帝以其功大不問進號征虜將軍時有白帝以鎮惡既克長安藏姚泓偽輦為有異志帝密遣人覘輦所在泓輦飾以金銀鎮惡悉剔取而棄輦於垣側帝聞之乃安武帝留第二子桂陽公義真為安西將軍雍秦二州刺史鎮長安鎮惡以本號領安西司馬馮翊太守委以扞禦之任及大軍東還西虜赫連勃勃冦逼北地義真遣中兵參軍沈田子拒之虜衆甚盛田子不敢進退屯留因堡遣使還報鎮惡鎮惡對田子使謂安西長史王修曰公以十歲兒付吾等而擁兵不進冦何由得平使反言之田子甚懼王猛之相苻堅也北人以方諸葛亮入關之功又鎮惡為首論者深憚之田子嶢栁之捷威震三輔而與鎮惡爭功武帝將歸留田子與鎮惡私謂田子曰鍾會不得遂其亂者為有衛瓘等也語曰猛獸不如羣狐卿等十餘人何懼王鎮惡邪故二人常有猜心時鎮惡師于涇上與田子俱會傅𢎞之壘田子求屏人因斬之幕下時年四十六田子又殺其兄基弟鴻遵深從弟昭朗凡七人𢎞之奔告義真義真率主智王修被甲登橫門以察其變俄而田子至言鎮惡反修執田子以專戮斬焉是歲義熙十四年正月十五日也武帝表天子追贈左將軍青州刺史及帝受命追封龍陽縣侯諡曰壯元嘉中配食髙祖廟庭傳國至曾孫睿齊受禪國除朱齡石字伯兒沛郡沛人也世為將祖騰伯父憲及斌並為西中郎袁真將佐桓溫伐真於夀陽真以憲兄弟與溫潛通並殺之齡石父綽逃歸溫從溫攻戰常居先壽陽平真已死綽輒發棺戮尸溫怒將斬之溫弟沖苦請得免綽為人忠烈受沖更生之恩事沖如父遂參沖軍位至西陽廣平太守及沖薨綽歐血而死沖諸子遇齡石如兄弟齡石少好武事頗輕佻不治崖檢舅淮南蔣氏人才儜劣齡石使舅卧於聼事遂剪紙方寸帖著舅枕自以刀子縣擲之相去八九尺百擲百中舅畏齡石不敢動舅頭有大瘤齡石伺舅眠密割之即死武帝剋京城以為建武參軍從至江乘將戰齡石言於帝曰世受桓氏厚恩不忍以兵刃相向乞在軍後武帝義而許之事定以為鎮軍參軍遷武康令縣人姚繼祖専為劫郡縣畏之不能討齡石至縣偽與厚召為參軍繼祖恃強乃出應召齡石斬之掩其家悉殺其兄弟由是一部得清後領中兵參軍盧循至石頭選敢死之士數千人上南岸武帝遣齡石領鮮卑步矟過淮擊之皆殊死戰殺百人賊乃退齡石既有武幹又練吏職武帝甚親委之盧循平以為寧逺將軍西陽太守義熙九年遣諸軍伐蜀命齡石為元帥以為建威將軍益州刺史率寧朔將軍臧熹河東太守蒯恩下邳太守劉鍾龍驤將軍朱牧等凡二萬人發自江陵初武帝與齡石密謀進取曰劉敬宣往年出黃虎無功而退賊謂我今應從外水往而料我當出其不意猶從內水如此必以重兵守涪城以備內道若向黃虎正墮其計今以大衆自外水取成都疑兵出內水此制敵之奇也而慮此聲先馳賊審虛實别有函封付齡石書函邊曰至白帝乃開諸軍雖進未知處分所由至白帝發書曰衆悉從外水取成都臧熹朱牧於中水取廣漢使羸弱乘髙艦十餘由內水向黃虎衆軍乃倍道兼行譙縱果備內水使其大將譙道福以重軍戍涪城遣其秦州刺史侯暉僕射譙詵等率衆萬餘屯彭模夾水為城十年六月齡石至彭模七月齡石率劉鍾蒯恩等於北城斬侯暉譙詵朱牧至廣漢復破譙道福别軍譙縱聞諸處盡敗奔于涪城巴西人王志斬送之偽尚書令馬耽封府庫以待王師道福衆亦散逃于獠中巴西民土瑶縛送之斬于軍門武帝之伐蜀也將謀元帥而難其人乃舉齡石衆咸謂自古平蜀皆雄傑重將齡石資名尚輕慮不辦克諫者甚衆武帝不從乃分大軍之半令猛將徑卒悉以配之臧熹敬皇后弟也資位在其右亦命受其節度役不淹時一戰剋捷衆咸服武帝之知人又美齡石之善於其事也以平蜀功封豐城侯十二年北伐遷左將軍配以兵刀守衛殿省劉穆之甚加信仗內外諸事皆與謀焉武帝還彭城以齡石為相國右司馬十四年安西將軍桂陽公義真被徵以齡石持節督關中諸軍事雍州刺史齡石至長安義真乃發義真敗於青泥齡石亦舉城奔走見殺時年四十傳國至孫齊受禪國除齡石弟超石亦果鋭雖出自將家兄弟並間尺牘桓謙為衛將軍以補行參軍後為武帝徐州主簿收迎桓謙身首躬營殯葬義熙十二年北伐超石前鋒入河時軍人緣河南岸牽百丈有漂度北岸者輒為魏軍所殺略帝遣白直隊主丁旿率七百人及車百乘於河北岸為却月陳兩頭抱河車置七仗士事畢使豎一長白眊魏軍不解其意並未動帝先命超石戒嚴白眊既舉超石赴之并齎大弩百張一車益二十人設彭排於轅上魏軍見營陳立乃進圍營超石先以弱弓小箭射之魏軍四面俱至魏明元帝又遣南平公長孫嵩三萬騎並薄攻營於是百弩俱發魏軍既多弩不能制超石初行别齎大槌并千餘張矟乃斷矟長三四尺以槌之一矟輒動貫三四人魏軍不能當遂潰大軍進剋蒲坂以超石為河東太守後除中書侍郎封興平縣五等侯關中亂帝遣超石慰勞河洛與齡石俱沒赫連勃勃見殺毛修之字敬文滎陽陽武人也祖武生伯父璩並益州刺史父瑾梁秦二州刺史修之有大意頗讀史籍為桓元佐命解音聲能騎射元甚遇之及篡位以為屯騎校尉隨元西奔元欲奔漢川修之誘令入蜀遂敗於峥嶸洲馮遷斬元於枚洄洲皆修之力也晉帝反正武帝以為鎮軍咨議參軍遷右衛將軍修之既有斬元之功又父伯並在蜀武帝欲引為外助故頻加榮爵及父瑾為譙縱所殺武帝表修之為龍驤將軍配給兵力遣令奔赴時益州刺史鮑陋不肯進討修之上表言狀武帝哀其情乃命冠軍將軍劉敬宣率軍伐蜀軍次黃虎無功而退譙縱由此乃送修之父伯及中表喪柩口纍並得俱還後劉毅西鎮江陵以為衛軍司馬南郡太守修之雖為毅將佐而深結於帝及毅敗遂見宥時遣朱齡石伐蜀修之固求行武帝慮修之至蜀必多所誅戮且土人既與毛氏有嫌亦當以死自固故不許修之不信鬼神所至必焚祠廟時蔣山廟中有好牛馬並奪取之纍遷相國右司馬行司州事戍洛陽修立城壘武帝至洛履行善之賜衣服玩好當時評直二千萬王鎮惡死以修之代為安西司馬值桂陽公義真已發長安軍敗修之為赫連勃勃所禽及赫連昌滅入魏初修之在洛敬事嵩山道士寇謙之謙之為魏太武所信敬營護之故不死遷於平城修之嘗為羊羮薦魏尚書尚書以為絶味獻之太武太武嘉之以為太官令被寵遂為尚書光祿大夫封南郡公領太官令常如故其後朱修之俘于魏亦見寵修之見朱修之問南國當權者誰答云殷景仁修之笑曰吾昔在南殷尚少我歸罪之日便當巾鞲到門經年不忍問家消息久之乃訪焉朱修之具答并云賢子元矯甚能自處為時人所稱修之悲不得言直視良久乃長歎曰嗚呼自此一不復及初北人去來言修之勸魏侵邊并誘以中國禮制文帝甚疑責之朱修之後得還具相申理上意乃釋初朱修之在魏魏太武以為雲中鎮將時太武征和龍宿衛之士多在戰陳行宮人少朱修之時欲引吳兵謀殺太武因入和龍冀浮海南歸以告修之修之不聼乃止後事發朱修之遂亡奔馮𢎞修之又以軍功遷特進撫軍大將軍金紫光祿大夫位次崔浩之下浩以其中國舊門雖學不博洽而猶涉獵書傳每雅重之與共論説之次遂及陳壽三國志云有古良史之風其所著述文義典正皆揚于王庭之言微而顯婉而成章班史已來無及夀者修之曰昔在蜀中聞長老言壽曾為諸葛門下書佐被撻百下故其論武侯云應變將略非其所長浩乃與論曰承祚之評亮乃有故義過美之譽案其迹也不為負之非挾恨之言矣夫亮之相蜀當九州鼎沸之會英雄奮發之時君臣相得魚水為喻而不能與曹氏爭天下委棄荆州退入巴蜀誘奪劉璋偽連孫氏窮守崎嶇之地僭號邊夷之間此䇿之下者可與趙他為偶以為管蕭之亞匹不亦過乎且亮既據蜀山險之固不達時宜不量勢力嚴威切法控勒蜀人矜才負能髙自矯舉欲以邊夷之衆抗衡上國出兵隴右再攻祁山一攻陳倉疏遲失會摧衄而返後入秦川不復攻城更求野戰魏人知其意閉壘堅守以不戰屈之智窮勢盡發病而死由是言之豈合古之善將見可而進知難而退者乎修之謂浩言非是泰延二年為外都大官卒諡曰恭修之在魏多妻妾男女甚衆在南有四子唯子法仁入魏文成初法仁為金部尚書襲爵轉殿中尚書法仁聲壯大至於軍旅田狩鳴呼處分振於山谷卒贈征東大將軍南郡王諡曰威修之孫惠素在南仕齊為少府卿性至孝母服除後更修母所住處牀帳屏幃每月朝十五向帷悲泣傍人為之感傷終身如此惠素天才強濟而臨事清刻勑市銅官碧青一千二百斤供御畫用錢六十五萬有讒惠素納利齊武帝怒勑尚書評價責二十八萬有司奏狀誅死後家徒四壁武帝後知無罪甚悔恨之沈田子吳興武康人也世為著姓祖警始為晉後將軍謝安參軍後復參前將軍王恭軍事父穆夫為王恭前將軍主簿初錢唐人杜炅字子恭通靈有道術東土豪家及都下貴望並事之為弟子執在三之敬警纍世事道亦敬事子恭子恭死門徒孫泰泰弟子恩傳其業警復事之隆安三年恩於會稽作亂自稱征東將軍三吳皆響應穆夫在會稽恩以為餘姚令及恩為劉牢之所破穆夫見害先是穆夫宗人沈預與穆夫父警不協至是告警及穆夫弟仲夫任夫預夫佩夫並遇害唯穆夫子深子雲子田子林子虔子獲全田子字敬光從武帝剋京城進平建鄴參鎮軍事封營道縣五等侯帝北伐廣固田子領偏師與龍驤將軍孟龍符為前鋒龍符戰沒田子力戰破之及盧循逼都帝遣田子與建威將軍孫季高海道襲破廣州還除太尉參軍淮陵內史賜爵都鄉侯義熙八年從討劉毅十一年從討司馬休之除振武將軍扶風太守十二年武帝北伐田子與順陽太守傅𢎞之各領别軍從武關入屯據青泥姚泓將自禦大軍慮田子襲其後欲先平田子然後傾國東出乃率步騎數萬奄至青泥田子本為疑兵所領裁數百欲擊之傅𢎞之曰彼衆我寡難可與敵田子曰師貴用奇不必在衆𢎞猶固執田子曰衆寡相傾勢不兩立若使賊圍既固人情喪阻事便去矣及其未整薄之必剋所謂先人有奪人之心也便獨率所領鼓譟而進賊合圍數里田子乃棄糧毁舍躬勒士卒前後奮擊賊衆一時潰散所殺萬餘得泓偽乘輿服御武帝表言其狀長安既平武帝宴于文昌殿舉酒賜田子曰咸陽之平卿之功也當以咸陽相賞即授咸陽始平二郡太守大軍既還桂陽公義真留鎮長安以田子為安西中兵參軍龍驤將軍始平太守時赫連勃勃來冦田子與安西司馬王鎮惡俱出北地禦之初武帝將還田子及傅𢎞之等並以鎮惡家在關中不可保信屢言之帝曰今留卿文武將士精兵萬人彼若欲為不善政足自滅耳勿復多言及俱出北地論者謂鎮惡欲盡殺諸南人以數十人送義真南還因據關中反叛田子乃於𢎞之營內請鎮惡計事使宗人敬仁於坐殺之率左右數十人自歸義真長史王修收殺田子於長安稿倉門外事聞武帝表天子以田子卒發狂易不深罪也林子字敬士少有大度年數歲隨王父在京口王恭見而奇之曰此兒王子師之流也嘗與衆人共見遺寶咸爭趣之林子直去不顧年十三遇家禍既門陷祅黨兄弟並應從誅而沈預家甚強富志相陷滅林子兄弟沈伏山澤無所投厝會孫恩屢出會稽武帝致討林子乃自歸陳情率老弱歸罪請命因流涕哽咽三軍為之感動帝甚奇之乃載以别船遂盡室移京口帝分宅給焉林子博覽衆書留心文義從剋京城進平都邑時年十八身長七尺五寸沈預慮林子為害常被甲持戈至是林子與兄田子還東報讐五月夏節日至預政大集會子弟盈堂林子兄弟挺身直入斬預首男女無論長幼悉屠之以預首祭父祖墓及帝為揚州辟為從事領建熙令封資中縣五等侯從伐慕容超平盧循並著軍功後從征劉毅參太尉軍事復從討司馬休之武帝每征討林子輒摧鋒居前時賊黨郭亮之招集蠻晉屯據武陵武陵太守王鎮惡出奔林子率軍討之斬亮之於七里澗而納鎮惡武陵既平復討魯軌於石城軌棄衆走襄陽復追躡之襄陽既定權留守江陵武帝伐姚泓復參征西軍事加建武將軍統軍為前鋒從汴入河為并州刺史河東太守尹昭據蒲坂林子於陜城與冠軍檀道濟俱攻蒲坂龍驤王鎮惡攻潼關姚泓聞大軍至遣偽東平公姚紹爭據潼關林子謂道濟曰潼關天岨所謂形勝之地鎮惡孤軍勢危力屈若使姚紹據之則難圗也及其未至當并力爭之若潼關事捷尹昭可不戰而服道濟從之及至紹舉關右之衆設重圍圍林子及道濟鎮惡等道濟議欲渡河以避其鋒或欲棄捐輜重還赴武帝林子按劔曰下官今日之事自為將軍辦之然二三君子或同業艱難或荷恩罔極以此退撓亦何以見相公旗鼓邪塞井焚舍示無全志率麾下數百人犯其西北紹衆小靡乘其亂而薄之紹乃大潰俘虜以千數悉獲紹器械資實時諸將破賊皆多其首級而林子獻捷書至每以實聞武帝問其故林子曰夫王者之師本有征無戰豈可復增張虜獲以示誇誕昔魏尚以盈級受罰此亦後乘之良轍也武帝曰乃所望於卿也初紹退走還保定城留偽武衛將軍姚鸞精兵守嶮林子銜枚夜襲即屠其城劓鸞而坑其衆紹復遣撫軍將軍姚讚將兵屯河上林氏連破之紹又遣長史姚伯子等屯據九泉慿河固嶮以絶糧援武帝復遣林子纍戰大破之即斬伯子所俘獲悉以還紹使知王師之𢎞紹志節沈勇林子每戰輒勝白武帝曰姚紹氣蓋關右而力以勢屈但恐凶命先盡不得以釁齊斧爾尋紹疽發背死武帝以林子言驗乃賜書嘉美之於是讚統後軍復襲林子林子禦之連戰皆捷帝至閿鄉姚泓掃境內兵屯嶢栁時田子自武關北入屯軍藍田泓自率大衆攻之帝慮衆寡不敵遣林子步自秦嶺以相接援比至泓已破走田子欲窮追進取長安林子止之曰往取長安如指掌爾復剋賊城便為獨平一國不賞之功也田子乃止林子威震關中豪右望風請附帝謂林子曰子綏略有方頻賜書褒美并令深慰納之長安既平姚氏十餘萬口西奔隴上林子追討至寡婦水轉鬭至槐里大軍東歸林子領水軍於石門以為聲援還至彭城帝令林子差次勳勤隨才授用文帝出鎮荆州議以林子及謝晦為蕃佐帝曰吾不可頓無二人林子行則晦不宜出乃以林子為西中郎中兵參軍領新興太守林子以役久士有歸心乃深陳事宜并言聖王所以戒愼祇肅非以崇威立武實乃經國長氓宜廣建蕃屏崇嚴宿衛武帝深相酬納俄而謝翼謀反帝歎曰林子之見何其明也文帝進號鎮西隨府轉加建威將軍河東太守時武帝以方隅未靜復欲親戎林子固諫帝答曰吾輒當不復自行帝踐阼以佐命功封漢夀縣伯固讓不許永初三年卒追贈征虜將軍元嘉二十五年諡曰懷少子璞嗣璞字道真童孺時神意間審文帝召見奇璞應對謂林子曰此非常兒也初除南平王佐常侍文帝引見謂之曰吾昔以弱年出蕃卿家以親要見輔今日之授意在不薄王家之事一以相委勿以國官乖清塗為罔罔也元嘉十七年始興王濬為揚州刺史寵愛殊異以為主薄時順陽范曄為長史行州事曄性頗踈文帝謂璞曰范曄性踈必多不同卿腹心所寄當密以在意彼雖行事其實卿也璞以任遇既深所懷輒以密啓每至施行必從中出曄政謂聖明留察故深更恭慎而莫見其際也在職八年神州大寧又無謗黷璞有力焉二十二年范曄坐事誅時濬雖日親覽州事一以付璞濬年既長璞固求辭事以璞為濬始興國大農纍遷淮南太守三十年元凶弒立璞以奉迎之晚見殺子約列在梁史傅𢎞之字仲度北地泥陽人也傅氏舊屬靈州漢末失土於馮翊置泥陽富平二縣廢靈州故傅氏悉屬泥陽晉武太康三年復立靈州縣傅氏還屬靈州𢎞之髙祖祗晉司徒後封靈州公不欲封本縣故祗一門還屬泥陽曾祖暢祕書丞沒石勒生子洪晉穆帝永和中石氏亂度江洪生梁州刺史歆歆生𢎞之𢎞之少倜儻有大志義旗建輔國將軍道規以為參軍纍遷建威將軍順陽太守武帝北伐𢎞之與扶風太守沈田子等七軍自武關入𢎞之素善騎乘於姚泓馳道內戲馬或馳或驟往反二十里中甚有姿制羌胡聚觀者數千並嗟嘆稱善初上馬以馬鞭柄策挽置兩股內及下馬柄孔常存留為桂陽公義真雍州中從事史及赫連勃勃襲長安義真東歸赫連勃勃傾國追躡於青泥大戰𢎞之躬擐甲胄氣冠三軍軍敗陷沒不為之屈時天大寒裸𢎞之𢎞之呌罵見害朱修之字恭祖義陽平氏人也曾祖燾晉平西將軍祖序豫州刺史父諶益州刺史修之初為州主簿元嘉中纍遷司徒從事中郎文帝謂之曰卿曾祖燾昔為王導丞相中郎卿今又為王𢎞中郎可謂不忝爾祖矣後隨右軍將軍到彥之北伐彥之自河南回師留修之戍滑臺被魏將安頡攻圍屢出奮擊殺傷甚衆魏人知修之糧少不復攻城築長圍守之糧盡將士熏鼠食之城陷被囚上嘉其節詔修之等家可常與供給初修之被圍既久母常悲憂忽一旦乳汁驚出母號慟告家人曰我年老非復有乳汁之時今如此兒必沒矣修之果以其日城陷太武嘉其固守之節以為雲中鎮將妻以寡姑修之潛謀南歸妻疑之謂曰觀君無停意何不告我以實義不相負每流涕言之修之深嘉其義而不告也時鮮卑馮𢎞稱燕王治黃龍城太武伐之修之及同沒人邢懷明並從又有徐卓者亦沒魏復欲率南人竊發事泄見誅修之懷明懼禍同奔黃龍馮𢎞禮之甚薄停一年會宋有臺使至外國並貴重傳詔謂為天子邊人修之名位已顯傳詔見之便拜致禮甚敬彼國人見之大驚乃厚為之禮時魏屢伐黃龍或説𢎞遣修之歸求救𢎞乃遣之泛海未至東萊舫柂折風又猛海師慮向海北垂長索舫乃止海師候視天氣見有一鳥飛知去岸不逺須臾至東萊是歲元嘉九年也既至京邑上勞賜甚厚以為黃門侍郎懷明為司徒中兵參軍孝武初修之纍遷寧蠻校尉雍州刺史加都督修之政在寬簡士衆悅附孝建元年荆州刺史南郡王義宣反檄修之舉兵修之乃悉集文武佐吏謂曰西藩違天犯順民神同憤今直取江陵卿等以為何如中兵參軍何慧文曰江陵衆強攻之難克惟遜辭偽同掩其不備則勤王之舉可以萬全修之曰不然一唱此聲誰復明本意襄陽城內舊有伍子胥廟州刺史新到必應躬往每有軍事皆祈禱然後出師廟內有修之祖考像修之初至襄陽欲往致謁未及屬起兵衆並勸祈廟修之不往遣使陳誠於孝武孝武嘉之以為安西將軍荆州刺史加都督義宣更以魯秀為雍州刺史擊襄陽修之阻南峴立樓柵以兵據之又以水軍斷峴下秀至屢挑戰修之以寇逺來欲決勝負於一戰諸軍宜案部勿與交鋒賊乃依山不得進修之潛以輕兵從險路擊其後秀敗乃收兵退走修之率衆向江陵義宣已為竺超民執之於獄修之至殺之以功封南昌縣侯修之立身清約百城贈貺一毫無所受唯以蠻人宜存撫納有餉皆受得輒與佐吏賭之未嘗入已徵為左民尚書領軍將軍去鎮之日秋毫無犯計在州已來然油及私牛馬食官穀草以私錢六十萬償之然性險刻無潤薄於恩情姊在鄉里飢寒不立修之貴為刺史未嘗供贍嘗往姊家姊為設菜羮粗飯以激之修之曰此是貧家好食進之致飽乃以外生王軌為沔陽令使姊隨子之官先是新野庾彥達為益州攜姊之鎮資給供奉中分秩祿西土稱焉修之至京邑牛奔墮車折腳辭尚書徙崇憲太僕加特進金紫光祿大夫腳疾不堪獨行特給扶侍卒贈侍中諡貞侯王元謨字彥德太原祈人也六世祖宏河東太守綿竹侯以從叔司徒允之難棄官北居新興仍為新興鴈門太守故為新興人曾祖牢為司空劉琨參軍琨敗避地遼東為慕容廆車騎長史遷上谷太守後隨慕容德居青州武帝平廣固遷居下邳父秀早卒元謨幼而不羣世父㽔有知人之鑒常笑曰此兒氣槩髙亮有太尉彥雲之風武帝臨徐州辟為從事史與語悅之少帝末謝晦為荆州請為南蠻行參軍武寧太守晦敗以非大帥見原到彥之北伐以元謨為揚武將軍領騎與將軍姚聳夫出軍向洛城魏軍望風退走河南悉平元謨至陜聞彥之敗退知虎牢陷沒乃引軍南反文帝嘉之補長沙王義欣鎮軍中兵參軍元謨上表每陳北伐之規以河朔為己任上謂殷景仁曰聞王元謨陳説使人有封狼居胥意後為興安侯義賔輔國司馬彭城太守義賔薨元謨上表以彭城要兼水陸請以皇子撫臨州政乃以孝武出鎮及大舉北伐以元謨為寧朔將軍前鋒入河受輔國將軍蕭斌節度元謨向碻磝碻磝戍主奔走所至皆捷獲牛馬粟帛不可勝計乘勝圍滑臺二百餘日魏太武自來救之南向白馬津衆號百萬登髙望之前後無際鼓鞞之音震動天地元謨之行也衆力不少器械精嚴而専仗所見多行殺戮初圍城城內多茅屋衆議以火箭燒之元謨恐損失軍實不聼城中即撒壞之穴地為窟屋及魏救將至衆復請發車為營反覆自固亦不從將士並懷離怨重募登城無復應者又營貨利一匹布責民八百大梨以此倍失人心及太武軍至乃夜徹營走委棄器甲軍資不可勝計至鹿鳴城夜迷失道麾下散亡略盡乃下船歸碻磝蕭斌將斬之沈慶之固諫曰佛狸威震天下所向無敵今控弦百萬豈元謨所能當且殺戰將以自弱非良計也斌乃止初元謨將見殺夢人告曰誦觀世音千遍則免元謨夢中曰何可竟也仍求見授既覺誦之且得千遍明日將刑誦之不輟忽傳呼停刑遣代守碻磝斌還鎮上手勑慰勉元謨曰既往之恨不復言但當勤立後效耳自古因敗成功載名史策者豈一人邪江夏王義恭為征討都督以碻磝沙城不可守召元謨令還乃毁城燒榖率衆沿河水步東下為魏騎所追元謨大破之流矢中臂二十八年正月還至歷城義恭與元謨書曰聞因敗為成大摧凶醜又毁城焚粟全師凱歸昔聞孟明驗之今日臂上金瘡得非金印之徵邪元凶弒立以元謨為冀州刺史孝武伐逆元謨遣濟南太守垣護之等將兵赴義事平遷左衛將軍徐州刺史加都督及南郡王義宣與臧質反朝廷假元謨輔國將軍為前鋒南討拜豫州刺史率寧朔將軍薛安都等諸軍出梁山大破之加都督封曲江縣侯中軍司馬劉沖之白孝武言元謨在梁山與義宣通謀檢驗雖無實而上意不能明使有司奏元謨沒匿所得賊寶物虛張戰簿與徐州刺史垣護之並免官尋為寧蠻校尉雍州刺史加都督雍土多諸僑寓元謨上言所統僑郡無有境土新舊錯亂租課不時宜加并合見許乃省并郡縣自此便之百姓當時不願屬籍其年元謨又令九品以上租使貧富相通境內莫不嗟怨民間訛言元謨欲反時栁元景當權元景弟僧景為新城太守以元景之藝制令雍土南陽順陽上庸新城諸郡並發兵欲討元謨元謨令內外宴然以解衆惑馳啓孝武具陳本末帝知其虛妄遣主書吳喜公慰撫之又答啓曰人言紛紛此甚可笑且七十老公反欲何求鄧艾所以獲申蓋由此也聊復為笑想足以申卿眉頭耳元謨為人性嚴未嘗妄笑時人言元謨眉頭未嘗申故上以此戲之後為金紫光祿大夫領太常及建明堂以本官領起部尚書又領北選孝武狎侮羣臣各有稱目多鬚者謂之羊短長肥瘦皆有比擬顔師伯缺齒號之曰齴劉秀之儉吝常呼為老慳黃門侍郎宗靈秀軀體肥壯拜起艱難每一集會輒於坐賜靈秀器服飲食前後相繼欲其占謝傾踣以為歡笑又刻木作靈秀父光祿勳叔獻像送其家聼事栁元景垣護之雖並北人而元謨獨受老傖之目凡諸稱謂四方書疏亦如之常為元謨作四時詩曰黃茹供春膳粟漿充夏飱匏醬調秋菜白醝解冬寒又寵一昆崙奴子名白主常在左右令以杖擊羣臣自柳元景以下皆罹其毒元謨尋遷徐州刺史加都督時北土災饉乃散私榖十萬斛牛千頭以賑之孝武崩與羣公俱被顧命時朝政多門元謨以嚴直不容徙青冀二州刺史加都督少帝誅顔師伯柳元景等狂悖滋甚以領軍徵元謨元謨子姪咸勸稱疾元謨曰避難茍免既乖事君之節且吾既荷先朝厚恩彌不得逡巡及至屢表諫爭又流涕請緩刑去殺以安元元之意少帝大怒明帝即位禮遇益崇時四方反叛元謨領水軍前鋒南討以腳疾未差聼乘輿出入尋除車騎大將軍江州刺史副司徒建安王休仁於赭圻明帝賜以諸葛武侯筒袖鎧年老病篤與諸將不諧和召還以為左光祿大夫開府儀同三司領護軍將軍南豫州刺史加都督薨年八十二諡曰莊公子深早卒深子績嗣深弟寬泰始初為隨郡太守逢四方反父元謨在建鄴寬棄郡自歸以母在西為賊所執請西行遂被逮郡收其母事平明帝嘉之使圗寬形以上齊永明元年為太常坐於宅殺牛免官卒於光祿大夫寬弟瞻齊史有傳元謨從弟元象位下邳太守好發人冢地無完槨人間垣內有小冢墳上殆平每朝日初升見一女子立冢上近視則亡或以告元象便命發之有一棺尚全有金蠶銅人以百數剖棺見一女子年可二十姿質若生卧而言曰我東海王家女應生資財當以相奉幸勿見害女臂有玉釧破冢者斬臂取之於是女復死元謨時為徐州刺史以事上聞元象坐免郡劉敬宣字萬壽彭城人漢楚元王交之後也父牢之晉鎮北將軍敬宣八歲喪母晝夜號泣中表異之輔國將軍桓序鎮蕪湖牢之參序軍事四月八日敬宣見衆人灌佛乃下頭上金鏡為母灌像因悲泣不自勝序歎息謂牢之曰卿此兒非唯為家之孝子必為國之忠臣起家為王恭前軍參軍又參會稽世子元顯征虜軍事隆安二年王恭起兵於京口以誅司馬尚之為名牢之時為恭前軍司馬晉陵太守置佐領兵而恭以豪戚自居甚相陵忽牢之心不能平及恭此舉使牢之為前鋒太傅會稽王道子與牢之書備言禍福使反恭牢之呼敬宣謂曰吾欲奉國威靈以明逆順汝以為何如敬宣曰恭怙亂阻兵志陵京邑大人與恭親無骨肉分非君臣雖共事少時意好不協今日討之於情何有牢之至竹里斬恭大將顔延遣敬宣率髙雅等還京襲恭恭方出城耀軍敬宣馳騎橫擊之一時散潰元顯進號後將軍以敬宣為後軍咨議參軍三年孫恩為亂東土騷擾牢之自表東討軍次虎疁賊皆死戰敬宣以騎傍南山趨其後吳賊畏馬又懼首尾受敵遂大破之進平會稽遷後軍從事中郎武帝既纍破妖賊功名日盛故敬宣深相慿結情好甚隆元顯進號驃騎敬宣仍隨府轉元顯驕肆羣下化之敬宣每預宴會調戲無所酬答元顯甚不悅元興元年牢之南討桓元元顯為征討大都督日夜昏酣牢之馳詣門不得相見帝出餞行方遇公坐而已元既至溧洲遣使説牢之牢之亦以道子昏暗元顯淫凶慮平元之後亂政方始欲假手於元誅除執政然後乘元之隙可以得志天下將許元降敬宣諫曰今天下之重在大人元雖無姬文之德實有三分之形一朝縱之使陵朝廷威望既成則難圖也董卓之變將生於今矣牢之怒曰吾豈不知今日取元如反覆手但平後令我奈驃騎何遣敬宣為任質元既得志害元顯廢道子以牢之為會稽太守牢之與敬宣謀襲元期以明旦爾日大霧府門晚開日旰敬宣不至牢之謂謀泄欲奔廣陵而敬宣還京口迎家牢之謂己為桓元所禽乃自縊而死敬宣奔喪哭畢渡江就司馬休之髙雅之等俱奔洛陽往來長安求救於姚興後奔慕容德敬宣素曉天文知必有興復晉室者尋夢丸土服之既覺喜曰丸者桓也桓既吞矣吾當復本土乎乃結青州大姓謀滅慕容德推休之為主時德司空劉軌大被任用髙雅之又要軌謀遂泄乃相與殺軌而去之淮泗間會武帝平京口手書召敬宣左右疑其詐敬宣曰吾固知其然下邳不誘我也即便馳還至京師以為輔國將軍晉陵太守襲封武岡縣男纍破諸賊遷建威將軍江州刺史固辭不許既至江州課集軍糧搜調舟乘軍戎要用常有儲擬初劉毅之少也為敬宣寧朔參軍時人或以雄傑許之敬宣曰夫非常之才當别有調度豈得便謂此君為人豪邪此人外寬而內忌自伐而尚人若一旦遭逢亦當以陵上取禍耳毅聞之深以為恨及在江陵知敬宣還乃使人言於武帝曰劉敬宣父子忠國既昧今又不豫義始猛將勞臣方須敘報如此之人宜令在後若使君不忘平生正可為員外常侍耳聞已授其郡實為過優尋知復為江州毅乃駭惋敬宣不自安安帝反正自表求解職武帝數引遊宴恩顧周洽所賜莫與為比敬宣女嫁賜錢三百萬雜綵千匹尋除宣城內史武帝方大相寵任欲先令立功義熙三年表遣率衆伐蜀博士周祗諫不從乃假敬宣節監征蜀諸軍事敬宣至黃虎去成都五百里為蜀大將譙道福等悉衆拒險相持六十日大小十餘戰賊固守不敢出敬宣食盡引軍還有司奏免官五年武帝伐慕容超除中軍咨議參軍與兖州刺史劉藩大破超軍進圍廣固屢獻規畫盧循逼建鄴敬宣分領鮮卑虎斑突騎置陳甚整循走仍從南討為左衛將軍敬宣寬厚善待士多技藝弓馬音律無事不善尚書僕射謝混美才地少所交納與敬宣遇便盡禮或問混卿未嘗輕交而傾蓋劉壽何也混曰孔文舉禮太史子義天下豈有非之邪初敬宣回師於蜀劉毅欲以重法繩之武帝既相任待又何無忌明言於毅謂不宜以私憾傷至公毅雖止猶謂武帝曰夫平生之舊豈可孤信光武悔之於龎萌曹公失之於孟卓公宜深愼之毅出為荆州謂敬宣曰吾忝西任欲屈卿為南蠻長史豈有見輔意乎敬宣懼禍及以告武帝帝笑曰但令老兄平安必無過慮出為征虜將軍北青州刺史時武帝西討劉毅豫州刺史諸葛長民監太尉軍事貽敬宣書曰盤龍狼戾専恣自取夷滅異端將盡世路方夷富貴之事相與共之敬宣報曰下官自義熙以來首尾十載遂忝三州七郡今此仗節常懼福過災生實思避盈居損富貴之旨非所敢當便遣使以長民書呈武帝謂王誕曰阿夀故為不負我也十一年進號右將軍時晉宗室司馬道賜為敬宣參軍會武帝西征司馬休之而道賜隂結同府辟閭道秀左右小將王猛子等謀反道賜自號齊王規據廣固舉兵應休之猛子取敬宣刃殺敬宣文武佐吏即討道賜道秀猛子斬之先是敬宣嘗夜與僚佐宴空中有投一隻芒屩於坐墜敬宣食盤上長三尺五寸已經人著耳鼻間欲壞頃之而敗喪至武帝臨哭甚哀子光祖嗣宋受禪國除劉懷肅彭城人武帝從母兄也家世貧寠而躬耕好學初為劉敬宣寧朔府司馬征孫恩屢有戰功為費令聞武帝起義棄縣來奔京邑平定振武將軍道規追桓元以懷肅為司馬連破城壘桓振據荆州懷肅自雲杜兼行七日而至振勒兵三萬旗幟蔽野躍馬橫矛躬自突陳流矢傷懷肅額衆懼欲奔懷肅瞑目奮戈膽氣益壯於是士卒爭先臨陳斬振首江陵平道規加懷肅督江夏九郡鎮夏口以建義功封東興縣侯義熙元年除輔國將軍淮南歷陽二郡太守二年又領劉毅撫軍司馬其冬桓石綏司馬國璠陳襲於胡桃山聚衆為寇懷肅討破之江淮間羣蠻及桓氏餘黨為亂懷肅自請出討既行失旨毅上表免懷肅官三年卒追贈左將軍無子弟懷慎以子蔚祖嗣位江夏內史蔚祖卒子道存嗣位太尉江夏王義恭咨議參軍孝武伐元凶道存出奔義軍元凶乃殺其母以徇景和中為義恭太宰從事中郎義恭敗以黨與下獄死懷肅次弟懷敬澀訥無才能初武帝産而皇妣殞孝皇帝貧薄無由得乳人議欲不舉從母生懷敬未期乃斷懷敬乳而自養之武帝以舊恩故懷敬纍見寵授至會稽太守時以為速帝曰亡姨於我恩重此何可忘歷尚書金紫光祿大夫懷敬子真道為錢唐令元嘉十三年東土飢荒帝遣揚州從事沈演之巡行在所演之表真道及餘杭令劉道錫有美政上嘉之各賜榖千斛以真道為步兵校尉十四年出為梁南秦二州刺史十八年氐帥楊難當侵寇漢中真道討破之而難當寇盜猶不已文帝遣龍驤將軍裴方明率禁兵五千受真道節度十九年方明至武興率太子積弩將軍劉康祖等進軍大致剋捷以真道為建威將軍雍州刺史方明輔國將軍梁南秦二州刺史又詔故晉夀太守薑道盛殞身鋒鏑可贈給事中賜錢十萬道盛有注古文尚書行於世真道方明並坐破仇池斷割金銀諸雜寶貨及藏難當善馬下獄死懷敬弟懷愼少謹愼質直從武帝征伐位徐州刺史為政嚴猛境內震肅以平廣固及盧循功封南城縣男十二年武帝北征以為中領軍征虜將軍宿衛輦轂坐府內相殺免官懷愼雖名位轉優而恭恪愈至每所之造位任不踰己者皆束帶門下下車其謹退類如此永初元年以佐命功進爵為侯位五兵尚書加散騎常侍光祿大夫景平元年遷護軍將軍祿賜班於宗族家無餘財卒諡肅侯子德願嗣大明初為遊擊將軍領石頭戍事坐受賈客韓佛智貨下獄奪爵後為秦郡太守德願性粗率為孝武所狎侮上寵姬殷貴妃薨葬畢數與羣臣至殷墓謂德願曰卿哭貴妃若悲當加厚賞德願應聲便號慟拊膺劈踊涕泗交流上甚悅以為豫州刺史上又令醫術人羊志哭殷氏志亦嗚咽他日有問志卿那得此副急淚志時新喪愛姬答曰我爾日自哭亡妾耳志滑稽善為諧謔上亦狎侮之德願善於御車常立兩柱使其中劣通車軸乃於百餘步上振轡長驅未至數尺打牛奔從柱間直過其精如此孝武聞其能乃為之乘畫輪車幸太宰江夏王義恭第德願岸著籠冠短朱衣執轡進止甚有容狀上歡欣賞賜甚厚景和初為廷尉坐與柳元景厚善元景敗下獄誅懷愼庶長子榮祖少好騎射為武帝所知及盧循攻逼京邑時賊乘小艦入淮拔柵武帝宣令三軍不得輒射賊榮祖不勝憤怒冒禁射之所中應弦而倒帝益竒焉以戰功參太尉軍事從討司馬休之彭城內史徐逵之敗沒諸將意沮榮祖請戰愈厲上乃解所著鎧授之榮祖陷陳身被數創及帝北伐轉鎮西中兵參軍率水軍入河與朱超石大破魏軍於半城帝大饗將士謂榮祖曰卿以寡剋衆攻無堅城雖古名將何以過此永初中為輔國將軍追論半城功賜爵都鄉侯榮祖為人輕財貴義善撫將士然性逼憤失士君子心卒於官懷愼弟懷默位江夏內史子孫登武陵內史孫登子亮少工刀楯以軍功封順陽縣侯歷梁益二州刺史在位廉儉所得公祿悉以還官明帝下詔褒美亮在梁州忽服食欲致長生迎武當山道士孫懷道使合仙藥藥成服之而卒及就殮尸弱如生諡曰剛侯孫登弟道隆前廢帝景和中位右衛將軍封永昌縣侯委以腹心之任泰始初又為明帝盡力遷左衛將軍中護軍賜死事在建安王休仁傳劉粹字道沖沛郡蕭人也家在京口少有志幹初為州從事武帝剋京城參建武軍事以從平京邑復從征廣固及起義功封西安縣五等侯轉中軍咨議參軍盧循逼京邑京口任重文帝時年四歲武帝使粹奉之以鎮京口遷建威將軍江夏相劉毅粹從兄也粹盡心武帝不與毅同武帝謀討毅衆並疑粹在夏口帝愈信之及大軍至粹竭其誠力事平封灄縣男後遷相國司馬左衛將軍永初元年以佐命功改封建安縣侯文帝即位領寧蠻校尉雍州刺史襄陽新野二郡太守在任簡役愛民罷諸沙門二千餘人補府吏元嘉三年討謝晦遣粹弟中郎道濟龍驤將軍沈敞之就粹自陸道向江陵步騎至河橋為晦司馬周超所敗降號寧朔將軍初晦與粹厚善以粹子曠之為參軍至是帝甚疑之王𢎞曰粹無私必無憂也及粹受命南討一無所顧帝以此嘉之晦遣送曠之還粹亦不害也明年粹卒曠之嗣道濟位益州刺史任長史費謙等聚斂傷政害人初晉末有司馬飛龍者自稱晉宗室走仇池元嘉九年聞道濟綏撫失和遂自仇池入綿竹為亂道濟遣軍討斬之先是道濟以五城人帛氐奴梁顯為參軍督護謙固執不與逺方商人至者謙又抑之商旅咨嗟百姓咸欲為亂氐奴等因聚黨為盜及趙廣等詐言司馬殿下猶在陽泉山中蜀土僑舊翕然並反奉道人程道養言是飛龍道養枹罕人也趙廣改道養名為龍興號為蜀王車騎大將軍益梁二州牧建號泰始元年備置百官以道養弟道助為驃騎將軍長沙王鎮涪城廣自號鎮軍將軍帛氐奴為征虜將軍梁顯為鎮北將軍奉道養圍成都道濟遣中兵參軍裴方明頻破之十年正月賊復大至攻逼成都道濟卒方明等共埋尸於後齋使書與道濟相似者為教酬答籖疏不異常日雖母妻不知也二月道養升壇郊天方就柴燎方明擊大敗之會平西將軍臨川王義慶使巴東太守周籍之帥衆援成都廣等屯據廣漢分守郫川籍之與方明攻郫克之方明禽偽驃騎將軍司馬龍伸斬之龍伸即道助也涪蜀皆平俄而張尋攻破隂平復與道養合逃于郪山其餘羣賊出為盜不絶文帝遣寧朔將軍蕭汪之討之十四年餘黨乃平遷趙廣張尋等於建鄴十六年廣尋復與國山令司馬敬琳謀反伏誅粹族弟損字子騫衛將軍毅從父弟也父鎮之字仲德以毅貴顯間居京口未嘗應召常謂毅汝必破我家毅甚畏憚之每還京口未嘗敢以羽儀入鎮之門以左光祿大夫徵不就卒於家損元嘉中為吳郡太守至昌門便入太伯廟時廟室頽毁垣牆不修損愴然曰清塵尚可髣佛衡宇一何摧頽即令修葺卒贈太常損同郡宗人有劉伯龍者少而貧薄及長歷位尚書左丞少府武陵太守貧寠尤甚常在家慨然召左右將營十一之方忽見一鬼在傍撫掌大笑伯龍嘆曰貧窮固有命乃復為鬼所笑也遂止孫處字季髙會稽永興人也籍注字故以字行少任氣武帝征孫恩季髙樂從及平建鄴封新番縣五等侯盧循之難武帝謂季髙曰此賊行破非卿不能破其窟穴即遣季髙泛海襲番禺拔之循父嘏長史孫建之司馬虞尫夫等輕舟奔始興季髙分遣振武將軍沈田子等討平嶺表諸郡循於左里走還襲廣州季髙破走之義熙七年季髙卒追贈南海太守封侯官縣侯九年武帝表贈交州刺史蒯恩字道恩蘭陵承人也武帝征孫恩縣差為征民伐馬芻恩常負大束兼倍餘人每捨芻於地嘆曰大丈夫彎弓三石奈何充馬士武帝聞之即給器仗恩喜自征妖賊常為先登多斬首級既習戰陳膽力過人於婁縣戰箭中右目從平京城進定京邑以軍功封都鄉侯從伐廣固破盧循皆有功纍遷龍驤將軍蘭陵太守隨劉藩追斬徐道覆與王鎮惡破江陵隨朱齡石平成都從武帝伐司馬休之恩自從征討每有危急輒率先諸將常陷堅破陳不避嶮難前後凡百餘戰身被重創武帝録其前後功封新寧縣男武帝北伐留恩侍衛世子命朝士與之交恩益自謙損與人語常呼官位而自稱為鄙人撫士卒甚有恩紀世子開府再遷為司馬後入關迎桂陽公義真沒於赫連勃勃傳國至孫無子國除向靖字奉仁小字彌河內山陽人也名與武帝祖諱同故以小字行彌與武帝有舊從平京城參建武軍事進平建鄴以功封山陽縣五等侯又從征廣固討盧循所在著績封安南縣男武帝西伐司馬休之征關中並見任使及帝受命以佐命功封曲江縣侯位太子左衛率加散騎常侍卒于官彌立身儉約不營室宇無園田商貨之業時人稱之子植嗣多過失不受母訓奪爵更以植次弟楨紹封又坐殺人國除楨弟柳字元義有學義才能立身方雅太尉袁淑司空徐湛之東揚州刺史顔竣皆與友善及竣貴柳猶以素情自許不推先之順陽范璩誡柳曰名位不同禮有異數卿何得作曩時意邪柳曰我與士遜心期久矣豈可以一旦藝利易之邪及柳為南康郡涉義宣事敗坐繫建康獄屢密詣竣求相申救孝武常與竣言及柳事竟不助之柳遂伏法璩字伯玉平北將軍汪曽孫也位淮南太守劉鍾字世之彭城人也少孤依鄉人中山太守劉回共居鍾有志力常慷慨於貧賤武帝伐孫恩鍾願從之戰皆摧堅陷陳武帝每有戎事鍾不辭艱劇盡其心力義旗將建武帝版鍾為郡主簿從入京城將向京邑武帝命曰豫是彭沛鄉人赴義者並可依劉主簿於是立為義隊常在左右每戰必捷及桓謙屯于東陵卞範之屯于覆舟山西武帝疑賊有伏兵顧左右政見鍾謂曰此山下當有伏兵卿可往探之鍾馳進果有伏兵鍾奮擊之一時奔走後除南齊國內史安邱縣五等侯鍾時未改葬父祖及親屬十喪帝厚加資給從征廣固孟龍符於陳陷沒鍾直入賊取其尸而反盧循逼建鄴鍾拒柵身被重創賊不得入及循南走鍾與王仲德追之又與劉藩追徐道覆於始興斬之後隨朱齡石伐蜀為前鋒去成都二百里鍾于時腳疾齡石乃詣鍾謀且欲養鋭息兵以伺其隙鍾曰不然前揚聲言大衆向內水譙道福不敢捨涪城今重軍卒至出其不意蜀人已破膽矣賊今沮兵守險是其懼不敢戰非能持人也因其凶懼攻之其勢必剋若緩兵彼將知人虛實當為蜀子虜耳齡石從之明日陷其二城徑平成都以廣固功封永新縣男及武帝北伐關洛留鍾居守纍遷右衛將軍元熙元年卒傳國至孫齊受禪國除虞邱進字豫之東海郯人也晉太元中隨謝元討苻堅以功封關內侯後從武帝征孫恩頻戰有功從定建鄴除燕國內史封龍遊縣五等侯及盧循逼都孟昶等議奉天子過江進廷議不可面折昶等武帝甚嘉之除鄱陽太守後隨劉藩斬道覆義熙九年以前後功封望蔡縣男永初二年纍遷太子右衛率卒追論討司馬休之功進爵為子傳國至曾孫齊受禪國除孟懷玉平昌安邱人也世居京口武帝東伐孫恩以懷玉為建武司馬豫義旗從平京口進定京邑以功封鄱陽縣五等侯武帝鎮京口以懷玉為下邳太守義熙三年領丹陽府兵戍石頭盧循逼京邑懷玉於石頭岸連戰有功為中軍咨議參軍及循南走懷玉與衆軍追躡直至嶺表徐道覆屯結始興懷玉攻圍之身當矢石旬月乃陷仍南追循循平又封陽豐縣男遷江州刺史南中郎將時荆州刺史司馬休之居上流有異志故授懷玉此任以防之十一年丁父艱有孝性上表陳解不許因抱疾篤卒懷玉弟龍符驍果有膽氣早為武帝所知以軍功封平昌縣五等子從伐廣固以車騎將軍加龍驤將軍廣川太守乘勝追奔被圍見害追贈青州刺史封臨沅縣男胡藩字道序豫章南昌人也父仲任治書侍御史藩少孤居喪以毁聞太守韓伯見之謂藩叔尚書少廣曰卿此姪當以義烈成名州府辟召不就須二弟冠婚畢乃參郗恢征虜軍事時殷仲堪為荆州刺史藩外兄羅企生為仲堪參軍藩過江省企生因説仲堪曰桓元意趣不常節下崇待太過非將來計也仲堪不悅藩退謂企生曰殷侯倒戈授人必至大禍卿不早去後悔無及後元自夏口襲仲堪用藩參其後軍事仲堪敗企生果以附從及禍藩轉參太尉大將軍相國軍事武帝起兵元戰敗將出奔藩叩馬諫曰今羽林射手猶有八百皆是義故西人一旦捨此欲歸可復得乎元直以馬鞭指天而已於是奔散衆相失藩追及於蕪湖元見之喜謂張須無曰卿州故為多士今復見之王修桑落之戰藩艦被燒并鎧入水潛行三十許步方得見岸乃還家武帝素聞藩直言於殷氏又為元盡節召為散騎侍郎參鎮軍軍事從征廣固賊屯聚臨朐藩言於武帝曰賊屯軍城外留守必寡今往取其城而斬其旗幟此韓信所以剋趙也武帝乃遣檀韶與藩潛往即剋其城賊見城陷一時奔走還保廣固圍之纍月將拔之夜佐吏並集忽有鳥大如鵝蒼黑色飛入武帝帳中衆皆駭愕以為不祥藩賀曰蒼黑者胡虜色明其歸我大吉之祥也明旦攻城陷之從討盧循於左里頻戰有功封吳平縣五等子尋除正員外鄱縣太守從伐劉毅初毅當之荆州表求東道還京辭墓去都數十里不過拜闕武帝出倪塘會毅藩勸於坐殺之乃謂帝曰公謂劉衛軍終肯為公下乎帝曰卿謂何如對曰公豁達大度功髙天下連百萬之衆允天人之望毅固以此服公至於涉獵經傳一詠一點自許以雄豪加以誇伐縉紳白面之士輻湊而歸此毅之所以不肯為公下也今不於此出其不意圖之他日終為公患帝曰吾與毅俱有剋復功且其過未彰不可自相圖至是謂藩曰昔從卿倪塘之謀無今舉也又從征司馬休之復為參軍領遊軍於江津徐逵之敗沒武帝怒甚即日於馬頭岸渡江而江津岸峭壁立數丈休之臨岸置陳無由可登武帝呼藩令上藩有疑色武帝奮怒命左右録來欲斬之藩不受命顧曰藩寧前死耳以刀頭穿岸劣容腳指於是徑上隨之者稍多既登岸殊死戰賊遂奔敗從伐關中參太尉軍事統别軍至河東暴風漂輜重艦度北岸魏軍牽得此艦藩氣憤率左右十二人乘小船徑往魏騎五六百見藩來並笑之藩素善射登岸射之應弦而倒者十許人魏軍皆退悉收所失而反帝又遣藩及朱超石等追魏軍於半城魏騎數萬合圍藩及超石不盈五千力戰大破之武帝還彭城參相國軍事論平司馬休之及廣固功封陽山縣男元嘉中位太子左衛率卒諡曰壯侯子隆世嗣藩諸子多不遵法度第十四子遵世同孔熙先逆謀文帝以藩功臣不欲顯其事使江州以他事殺之十六子誕世十七子茂世後欲奉庶人義康為逆交州刺史檀和之至豫章討平之劉康祖彭城吕人也世居京口伯父簡之有志幹為武帝所知帝將謀興復收集才力之士嘗再造簡之值有賔客簡之悟其意謂弟虔之曰劉下邳再來必當有意既不得共語汝可試往見之既至武帝已剋京城虔之即便投義簡之殺耕牛會衆以赴武帝簡之歷官至通直常侍太尉咨議參軍簡之弟謙之好學撰晉紀二十卷官至廣州刺史大中大夫虔之輕財好施為江夏相從武帝征司馬休之及魯宗之宗之子軌襲殺虔之追贈梁南秦二州刺史封新康縣男康祖虔之子也便弓馬智力絶人在閭里不治産業以浮蕩蒱酒為事每犯法為郡縣所録輒越屋踰牆莫之能禽夜入人家為有司所圍突圍去並莫敢追因夜還京口半夕便至明旦守門詣府州要職俄而建康移書録之府州執事者以證康祖其夕在京口遂得無恙前後屢被糾劾文帝以勳臣子每原貸之後襲封拜員外郎再坐蒱戲免官孝武為豫州刺史鎮歷陽以康祖為征虜中兵參軍既被委任折節自修歷南平王鑠安蠻府司馬元嘉二十七年魏太武親率大衆攻圍汝南文帝遣諸軍救援康祖總統為前驅軍次新蔡濟融水去懸瓠四十里魏衆大至康祖奮擊破之斬其殿中尚書乞地真太武燒營退走遷左軍將軍文帝欲大舉北伐康祖以歲月已晚請俟明年上以河北義從並起若頓兵一周沮向義之心其秋蕭斌王元謨沈慶之等入河康祖率豫州軍出許洛元謨等敗歸時南平王鑠住壽陽上慮為魏所圍急召康祖回軍援夀陽未至城數十里會魏永昌王以長安之衆八萬騎與康祖相遇於尉武康祖有八千人乃結車營而進魏軍四面來攻衆分為三且休且戰康祖率厲衆士無不一當百魏軍死者大半流血沒踝會康祖矢中頸而死於是遂大敗舉營淪覆免者才數十人魏人傳康祖首示彭城面如生詔贈益州刺史諡曰壯簡之子道産初為無錫令襲爵晉安縣五等縣侯元嘉三年纍遷梁南秦二州刺史加都督在州有惠化後為雍州刺史領寧蠻校尉加都督襄陽太守善於臨職在雍部政績尤著蠻夷前後不受化者皆順服百姓樂業由此有襄陽樂歌自道産始也卒於官諡曰襄侯道産澤被西土及喪還諸蠻皆備縗絰號哭追送至于沔口長子延孫孝武初位侍中封東昌縣侯纍遷尚書右僕射大明元年除金紫光祿大夫領太子詹事又出為南徐州刺史先是武帝遺詔京口要地去都密邇自非宗室近戚不得居之劉氏之居彭城者分為三里帝室居綏輿里左將軍劉懷肅居安上里豫州刺史劉懷武居叢亭里三里及延孫所居吕縣凡四劉雖同出楚元王由來不序昭穆延孫於帝室本非同宗不應有此授時司空竟陵王誕為徐州上深相畏忌不欲徙居京口遷之廣陵廣陵與京口對岸使腹心為徐州據京口以防誕故以南徐州授延孫而與之合族使諸王序親三年南兖州刺史竟陵王誕有罪不受徵延孫馳遣中兵參軍杜幼文赴討及至誕已閉城自守乃還誕遣劉公泰齎書要之延孫斬公泰送首建鄴復遣幼文受沈慶之節度五年詔延孫曰舊京樹親由來常準今此防久弭當以還授小兒乃徵延孫為侍中尚書左僕射領護軍延孫病不任拜赴卒贈司徒給班劍二十人有司奏諡忠穆詔改為文穆子質嗣通志卷一百三十一
