body:
  text: 通志卷一百五十四宋右迪功郎鄭樵漁仲撰列傳第六十七北齊孫搴陳元康杜弼房謨廉景孫張纂張亮趙起徐逺張曜王峻王紘敬顯俊子長瑜平鑒唐雍白建元文遙子行恭趙彥深子仲將祖珽從弟孝隱弟孝隱從父茂赫連子悅馮子琮辛術裴讓之弟諏之謁之讞之和謀之弟訥之皇甫和亮崔劼崔肇師盧潛盧詢祖崔子樞弟子端父子博發叔叔瓚子孫搴字彥舉樂安人世寒賤少勵志勤學自檢校御史再遷國子助教太保崔光引修國史歷行臺郎以文著稱後預崔祖螭反逃於王元景家遇赦乃出孫騰以宗情薦之神武未被知也會神武西討登鳳陵命中外府司馬李義深相府城局李仕略共作檄文二人皆請以搴自代神武引搴入帳自為吹火催促之搴神色安然援筆立成其文甚美神武大悅即以為相府主簿專典文筆又能通鮮卑語兼傳宣號令當繁劇之任大見賞重賜妻韋氏既士人子女又甚色貌時人榮之文襄初欲之鄴總知朝政神武以其年少未許搴為致言乃果行恃此自乞特進文襄但加散騎常侍時大括民以為軍士逃隱者身及主人三長守令罪以大辟沒入其家於是所獲甚衆搴之計也搴學淺行薄邢邵嘗謂之曰更須讀書搴曰我精騎三千足敵君羸卒數萬搴少時與溫子升齊名嘗謂子升卿文何如我子升謙曰不如卿搴要其為誓子升笑曰但知劣於卿便是何勞旦旦搴悵然曰卿不為誓事可知矣搴嘗服棘刺丸李諧調之曰卿棘刺應自足何假外求坐者皆笑司馬子如與髙季式召搴飲酒醉甚而卒神武親臨之子如叩頭請罪神武曰折我右臂贈吏部尚書青州刺史陳元康字長猷廣宗人也父終德魏濟隂內史元康貴贈度支尚書諡曰貞元康頗涉文史機敏有幹用魏正光中從李崇北伐以軍功賜爵臨清男普泰中除主書纍遷司徒髙昻記室初司馬子如髙季式與孫搴劇飲搴醉死神武命求好替子如舉魏收他日神武謂季式曰卿飲殺我主簿魏收作文書都不稱意司徒嘗道一人謹密是誰季式以元康對曰是能夜暗書快吏也召之一見便授以大丞相功曹參軍內掌機密善陳事意不為華藻遷大行臺都官郎封安平子軍國多務元康問無不知神武臨行留元康在後馬上有所號令九十餘條元康屈指數之盡能記憶神武甚親之曰如此人世間希有我今得之乃上天降佐也時趙彥深亦知機密人謂之陳趙而元康藝居趙前性又柔謹神武之伐劉蠡升天寒雪深使人舉氈元康於氈下作軍書颯颯運筆筆不及凍俄頃數紙及出神武目之曰此何如孔子邪神武嘗怒文襄於內親加歐踏極口肆詈出告元康元康俯伏泣下霑地諫曰王教訓世子自有禮法儀刑式瞻豈宜至是神武曰我性急嗔阿惠常如此元康大啼曰一度為甚况常然邪神武從此為懲忿時或恚撻輒曰勿使元康知又謂左右曰元康用心誠實必與我兒相抱死髙仲密之叛神武知其由崔暹故也將殺暹文襄匿暹而為之請神武曰我為爾存其性命然須與苦手文襄乃出暹而謂元康曰卿若使崔暹得杖無相見也暹入庭解衣將受罰元康趨入止伍伯因歷階而升曰王方以天下付世子世子有崔暹不能免其杖父子尚爾况世間人邪神武意解曰不由元康崔暹得一百乃捨之文襄入輔政崔暹崔季舒崔昻等並被任使張亮張徽纂並為神武待遇然委任皆出元康之下神武每與元康久語文襄門外待接之時人語曰三崔二張不如一康左衛將軍郭瓊以罪死子婦范陽盧道虔女也沒官神武啓以賜元康為妻元康地寒時以為殊賞元康遂棄故妻李氏識者非之元康便辟善事人希顔候意多有進舉而不能正心處物溺於財利受納金帛不可勝紀責負交易遍於州郡為清論所譏從神武於芒山將戰遺失陳圖元康冒險求得之西師既敗神武大會諸將議進取之策咸以為野無青草人馬疲瘦不可逺追元康曰兩雄交爭嵗月已久今得大捷便是天授時不可失必須乘勝追之捨之必成後患神武曰若遇伏兵孤何以濟元康曰前沙苑還軍彼尚無伏今者奔敗何能逺謀神武不從以為行臺郎及神武疾篤謂文襄曰邙山之戰不用元康之言方貽汝患以此為恨死不瞑目我死事皆當與元康定也神武崩祕不發喪唯元康知之文襄嗣事自晉陽之鄴令元康預作神武條教數十紙留付假孝先趙彥深在後以次行之别封昌國縣公以從嘉名又見任待拜散騎常侍侯景反文襄逼於諸將欲殺崔暹以謝之密語元康元康諫曰今雖四海未清綱維已定若以數將在外茍悅其心枉殺無辜虧廢典刑豈直上負天神何以下安黎庶朝錯前事願公慎之文襄乃止髙嶽討侯景未剋文襄欲遣潘相樂副之元康曰相樂緩於機變不如慕容紹宗且先王有命稱堪敵侯景公但推赤心於此人則侯景不足憂也是時紹宗在逺文襄欲召之恐其驚叛元康曰紹宗知元康特蒙顧待新使人來餉金以致誠款元康欲安其心故受之而厚答其書保無異也文襄乃任紹宗遂以破景賞元康金五十斤王思政入潁城諸將攻之不能拔元康進計於文襄曰公自匡輔朝政未有殊功雖敗侯景本非外賊今頴城將陷願公因而乘之足以取威定業文襄於是令元康馳驛觀之復命曰必可拔文襄乃親征潁川益發衆軍往既至而剋之賞元康金百鋌初魏朝授文襄相國齊王文襄頻辭不受乃召諸將及元康等密議之諸將皆勸文襄恭膺朝命元康謂魏收曰時未可耳觀諸人語專欲誤王王不宜受崔暹因間之薦陸元規為大行臺郎欲分元康權元康既貪貨賄文襄內漸嫌之又欲用為中書令以間地處之事未施行屬文襄將受魏禪元康與楊愔季舒並在坐將大遷除朝士共品藻之文襄家倉頭蘭固成掌厨膳為文襄所撻固成吳人性躁遂忿恚與其同事阿改謀害文襄阿改時事文宣常執刀隨從期聞東齋噭聲即加刃於文宣是日文宣别有所之未還而難作固成因進食置刀於盤下而殺文襄元康抱文襄文襄曰可惜可惜與賊爭刀髻解被刺傷重腸出猶手書辭母口占授祖孝徴陳權宜至夜而終時年四十三時楊愔狼狽走出遺一靴崔季舒逃匿於厠庫直紇奚舍樂捍賊死散都督王師羅戰傷監厨倉頭薛豐洛率宰人持薪以赴難乃禽盜固成一名京事見文襄本紀是時祕文襄凶問故殯元康於宫中托以出使南境虛除中書令明年詔贈司空諡文穆元康卒後母李氏哀感發病而終贈廣宗郡君諡曰貞昭元康子善藏嗣善藏溫雅有鑒裁位給事黃門侍郎開皇中尚書郎大業初卒於彭城郡贊務杜弼字輔元中山曲陽人也祖彥衡淮南太守父慈度繁畤令弼幼聰敏家貧無書年十三寄郡學受業同郡甄琛為定州刺史簡試諸生見而策問義解間明應答如響大為琛所歎服命其二子揩寬與弼為友州牧任城王澄聞而召問深相嗟賞許以王佐之才澄琛還洛稱之於丞相髙陽王等多相招命但父祖官薄不獲優敘以軍功起家除征虜府墨曹參軍典管記弼長於筆札每為時輩所推孝昌初除太學博士遷光州曲城令為政清靜逺近稱之弼父在鄉為賊所害弼居喪六年以常調除侍御史領內正字臺中彈奏皆弼所為諸御史出使所上文簿委弼覆臺然後施行儀同竇泰西伐詔弼監軍及泰失利自殺弼與其徒六人走還陜州刺史劉貴鎖送晉陽神武詰之曰竇中尉此行違吾法以自取敗亡爾何由不一言諌諍弼對曰刀筆小生唯有文墨薄伎便宜之事議所不及神武怒左遷下灌鎮司馬後纍遷大行臺郎中神武又引弼典掌機密甚見信待或有造次不及書教直付虛紙即令宣讀弼嘗承間密勸受魏禪神武舉杖擊走之相府法曹辛子炎咨事云取署子炎讀署為樹神武怒其犯偏諱杖之於前弼進曰禮二名不偏諱孔子言徴不言在子炎之罪理或可恕神武罵之曰眼看人瞋乃牽經引禮叱令出去弼行十許步呼還子炎亦蒙釋文襄聞之語楊愔曰王左右賴有此人天下蒙其利豈獨吾家也初神武自晉陽東出改爾朱氏貪政使人入村不敢飲社酒及平京洛貨賄漸行弼以文武在位罕有亷潔言之神武神武曰弼來我語爾天下濁亂習俗已久今督將家屬多在關西黑獺常相招誘人情去留未定江東復有一吳兒老翁蕭衍者專事衣冠禮樂中原士大夫望之以為正朔所在我若急作法網不相饒借恐督將盡投黑獺士子悉奔蕭衍則人物流散何以為國爾宜少待吾不忘之及將有沙苑之役弼又請先除內賊却討外寇神武曰內賊為誰弼曰諸勳貴掠奪萬民者皆是也神武不答因令軍人皆張弓挾矢舉刀按矟以夾道使弼冒出其間曰必無傷也弼戰栗流汗神武然後喻之曰箭雖注不射刀雖舉不擊矟雖按不刺爾猶頓喪魂膽諸勳人身觸鋒刃百死一生縱其貪鄙所取處大弼頓顙謝曰愚人不識至理後從神武破西魏於邙山命為露布弼手即書絹曾不起草以功賜爵定陽男加通直散騎常侍奉使詣闕魏帝見之於九龍殿曰聞卿精學聊有所問因問經中佛性法性之異弼對以正是一理又問曰説者皆妄言法性寬佛性狹如何弼曰在寬成寬在狹成狹若論性體非狹非寬詔曰既言成寬成狹何得非狹非寬弼曰若定是寬則不能為狹若定是狹亦不能為寬以非寬非狹所成雖異能成恆一上稱善引入經庫賜地持經一部賜帛百匹弼性好名理探味元宗自在軍旅恆帶經從行注老子道德經二卷表上之遷廷尉卿會梁遣貞陽侯蕭淵明等入冦彭城大都督清河王髙嶽行臺慕容紹宗討之詔弼為軍司攝行臺左丞臨發文襄賜胡馬一匹語曰此廄中第二馬孤常自乘騎今方逺别聊以為贈又令陳政務之要可為鑒戒者録一兩條弼請口陳曰天下大務莫過賞罰二端賞一人使天下之人喜罰一人使天下之人服二事得治自然盡美文襄大悅曰言雖不多於理甚當握手而别破蕭淵明於寒山又破侯景於渦陽後六年四月八日魏帝集名僧於顯陽殿講説佛經勑弼升師子坐當衆敷演辨難鋒至莫有能屈帝歎曰此賢若生孔門則如何也關中遣王思政據潁川朝廷以弼行潁州攝行臺左丞及潁州平文襄曰卿試論王思政所以禽弼曰思政不察逆順之理不識大小之形不度強弱之藝有此三蔽宜其俘獲文襄曰古有逆取順守大吳困於小越弱燕能破強齊卿之三義何以自立弼曰王若順而不大大而不強強而不順於義或偏得如聖旨今既兼備鄙言可以還立文宣作相引為兼長史進爵為侯弼志在匡贊知無不為及齊受禪以預定策功遷驃騎將軍衛尉卿别封長安縣伯常與邢邵扈從東山共論名理邢以為人死還生恐是為蛇畫足弼曰物之未生本所無也無而能有不以為疑因前生後何獨致怪邢云聖人設教本由勸奬故懼以有來望各遂其性弼曰聖人合德天地齊信四時言則為經行則為法而云以虛示物以詭勸人安得使北辰降光龍宫韞櫝既如所論福果可以鎔鑄性靈𢎞奬風教為益之大莫極於斯此即真教何謂非實邢云季札言無不之亦言散盡若復聚而為物不得言無不之也弼曰骨肉下歸於土魂氣則無不之此乃形墜魂遊往而非盡由其尚有故云無所不之若也全無之將焉適邢云神之在人猶光之在燭燭盡則光窮人死則神滅弼曰燭則因質生光質大光亦大人則神不係於形形小神不小故仲尼之智必不短於長狄孟德之雄乃逺竒於崔琰其後别與邢書前後往復再三邢理屈而止文多不載又以本官行鄭州事未發家客告弼謀反按問無實久乃見原因絶朝請坐次子廷尉監臺卿斷獄稽遲與寺官俱為郎中封靜哲所訟徙臨海鎮時楚州人東方白額謀反鎮為賊帥張綽潘天合等所攻弼率厲城人終得全固文宣嘉之勑行海州事後除膠州刺史弼所在清靜亷潔為吏民所懷耽好元理注莊子惠施篇并易上下繫名曰新注義苑並行於世性質直在霸朝多所匡正及文宣作相致位寮首初聞揖遜之議猶有諫言文宣又嘗問弼治國當用何人對曰鮮卑車馬客會須用中國人文宣曰此言譏我髙德正居要位弼不能下之乃至於衆前面折德正德正深以為恨數言其短又令主書杜永珍密啓弼在長史日受人請屬大營婚嫁帝內銜之弼恃舊仍有公事陳請十年夏上因飲酒積其愆失遣使就州斬之尋悔驛追不及子㽔逺徙臨海鎮次子臺卿先徙東豫州乾明初並得還鄴天統五年追贈弼開府儀同三司尚書右僕射武平元年又贈驃騎大將軍諡曰文肅㽔字子美學業不如弟臺卿而幹局過之武平中位大理少卿兼散騎常侍聘陳使主吏部郎中隋開皇中終於開州刺史子公贍仕隋位安陽令公贍子之松大業中起居舍人臺卿列在隋史房謨字敬放河南洛陽人也其先代人本姓屋引氏少淳厚雖無造次能而沈深內敏魏正光末歷位昌平代郡太守所在著亷惠及六鎮亂謨率郡人入九崢山結壘拒守時外無救援乃率所部奔中山遇鮮于修禮之亂朝廷以謨得北邉人情以為假燕州事北轉至幽州南為修禮所藝仍陷葛榮榮敗爾朱榮啓授行冀州事尋除太寧太守榮死其黨徴兵謨不應前後斬其三使遣弟育詣闕孝莊以育為都督育弟欽為行臺並持節詣謨同為經略及京都淪覆為賊黨建州刺史是蘭安定藝繫州獄蜀人聞謨被囚並叛安定於是給謨弱馬令軍前慰勞諸賊見謨莫不遙拜謨先所乘馬安定别給將士戰敗蜀人得之謂謨遇害莫不悲泣善飬其馬不聽乘騎兒童婦女競投草粟皆言此房公馬也其結愛人心如此爾朱世隆聞而嘉之捨其罪以為東北道行臺及爾朱氏敗濟州刺史侯景以謨先款附推謨降首謨以受眷爾朱不宜先為反覆不從其計神武入洛再遷潁川太守魏孝武帝入關神武以謨忠貞遣其弟育為大使持節勞問時軍國未寧徴發煩速至有數使同徴一物公私勞擾謨請事遣一使下自催勒朝廷從之徴為丞相右長史以清直甚被賞遇謨悉心盡力知無不為前後賜其奴婢多見放免神武後賜其生口多黥靣為房字而付之神武討關右以謨兼大行臺左丞長史如故總知府省務天平三年行定州事請在左右拾遺補闕固不肯行神武責而罷之未幾出為兖州刺史謨選用亷清廣布恩信僚屬守令有犯必知雖號細密百姓安之轉徐州刺史始謨在兖州彭城慕其政化及為刺史合境欣悅謨為政如在瑕丘先是當州兵皆僚佐驅使飢寒死病動至千數謨至皆加檢勒不令煩擾以休假番代洗沐督察主司親自檢視又使傭賃令作衣服終嵗還家無不溫飽全濟甚多時梁魏和好使人入其界者咸稱歎之神武與諸州刺史書敘謨及廣平太守羊敦廣宗太守竇瑗平原太守許季良清能以為勸勵謨曾啓神武以天下未寧宜降婚勳將收將士心深見納用魏朝以河南數州鄉俗絹濫退絹一匹徴錢三百人庶苦之謨乃表請錢絹兩受任人所樂朝廷從之徴拜侍中監國史謨無他才學每求退身不許尋兼吏部尚書加衛大將軍以子子逺罪解官久之詔復本將軍起為大丞相左長史後除晉州刺史加驃騎大將軍又攝南汾州事先時境接西魏土人多受其官為之防守至是酋長鎮將及都督守令前後降附者三百餘人謨撫接殷勤人樂為用爰及深險胡夷咸來歸服謨常以己祿物充其饗賚文襄嘉之聼用公物西魏懼乃增置城戍慕義者自相紏合擊破之自是龍門已北西魏戍皆平文襄特賜粟千石絹二百匹班示天下卒於州州府相帥贈物及車牛妻子遵其遺志拒而不納謨寡嗜欲貞白自守然內營家産足為富贍不假官俸是以世稱清白贈司空諡曰文惠謨與子結婚盧氏謨卒後盧氏將改適他姓有平陽亷景孫者少厲志節以明經舉郡孝亷為謨所重至是訟之臺府不為理乃持繩詣神廟前北靣大呼曰房謨清吏忠事髙祖及其死也妻子見陵神而有知當助申之今引決訴於地下便以繩自經於樹衛士見之救解送所司朝廷哀其至誠命女歸房族謨前妻子子逺險薄謨甚嫌之不以為子例時以謨為後妻盧氏所譖神武亦以責謨謨陳其惡神武弗信自收恤之令與諸子同學久乃令還後與任胄等謀殺神武事發神武歎曰知子莫若父信哉因上言房謨鄭述祖李道璠等三家理宜從法竊以謨立身清白履行忠謹鄭仲禮嚴祖庶兒晚始收拾李世林生自外養屬絶本宗二人特乞罪止一房魏帝許焉及謨卒子廣嗣廣弟恭懿仕隋歷州縣有能名列在良吏傳張纂字徽纂代郡平城人也初事爾朱榮又為爾朱兆長史使於神武遂被顧識及相州城拔參丞相軍事封武安縣伯纍遷神武行臺右丞從征玉壁大軍將還山東至晉州忽遇寒雨士卒飢凍有死者州以邉禁不聽入城時纂為别使遇見輒令開門內之分寄人家給其火食多所全濟神武聞而善之纂性便辟事神武二十餘歲通傳教令甚見親賞文宣時卒於護軍將軍張亮字伯德西河隰城人也初事爾朱兆神武討兆兆奔於秀容左右皆密通誠欵唯亮獨無啓疏及兆敗竄於窮山令亮及倉頭陳山提斬其首以降皆不忍兆乃自縊於樹亮伏尸而哭神武嘉歎之授丞相參軍漸見親待委以書記之任天平中為文襄行臺郎中典七兵事雖為臺郎而常在神武左右遷行臺右丞髙仲密之叛與大司馬斛律金守河陽周文時於上流放火船欲燒河橋亮乃備小艇百餘皆載長鎖鎖施釘火船將至即馳小艇以釘釘之引鎖向岸火船不得及橋橋之獲全亮之計也武定初拜太中大夫薛琡嘗夢亮於山上挂絲以告亮且占之曰山上絲幽字也君其為幽州乎數月亮出為幽州刺史纍遷尚書右僕射西南道行臺亮性質直勤力幹濟深為神武文襄信委然少風格好財利久在左右不能亷潔及歷數州咸有黷貨之號天保初别封安定縣男位中領軍卒贈司空時霸府又有趙起徐逺者並見任委起廣平人性沈謹神武頻以為相府騎兵二局典兵馬十餘載至文宣即位纍遷大鴻臚卿雖歷九卿侍中常以本官監兵馬出內居腹心寄與二張相亞武平中卒於帥贈都督滄州刺史逺廣寧人為丞相騎兵參軍深為神武所知纍遷東楚州刺史政有恩惠郭邑大火城人亡産業逺躬自赴救對之流涕仍為經營皆得安立卒於衛尉卿張曜字靈光上谷昌平人也少貞謹韓軌為刺史劾州府僚佐及軌左右以贓挂網者百餘人唯曜以清白免天保初賜爵都鄉男纍遷尚書右丞文宣曾因近出令曜居守帝夜還曜不時開門勒兵嚴備帝駐蹕門外久之催迫甚急曜以夜深真偽難辨須火至識面門乃可開於是獨出見帝帝笑曰卿欲學郅君章邪乃使曜前開門然後入深嗟賞之賜以錦綵太寧初遷祕書監曜歷仕纍朝奉職恪勤咸見親待未嘗有過每得祿賜輒散宗族性節儉率素車服飲食取給而已好讀左氏春秋月一遍時人比之賈梁道趙彥深嘗謂之曰君研深左氏豈求服虔杜預之紕繆乎曜曰何為其然乎左氏之書備敘前事惡者可以自戒善者可以庶幾故勵已溫習非欲詆訶古人得失也天統初奏事遇暴疾仆於御前帝下坐臨視呼數聲不應帝泣曰失我良臣也旬日卒贈右僕射諡曰貞簡王峻字巒嵩靈邱人也明悟有幹略歷事神武文襄為相府佐賜爵北平男除營州刺史營州地接邉賊數為人患峻至州逺設斥堠廣置疑兵賊不敢發合境獲安先是刺史陸士茂詐殺室韋八百餘人因此朝貢遂絶至是峻要其行路大破之虜其酋帥厚加恩禮放遣之室韋遂獻誠款朝貢不絶峻有力焉蠕蠕主菴羅辰東徙峻設伏大破之於此遁走歷位尚書河清中歷位南道行臺坐違格私度禁物并盜截軍糧有司定處斬刑家口配沒詔決鞭一百除名配甲坊蠲其家口武平中卒於侍中贈司空王紘字師羅太安狄那人也父基頗讀書有智略初從葛榮與周文甚相知及周文據關中神武遣基與長史侯景同往焉周文留基不遣後乃逃歸歷南益北豫二州刺史所歷皆好聚斂然性和直吏人不甚怨苦後為奴所害贈吏部尚書紘善騎射愛文學性敏捷年十三見揚州刺史太原郭元貞撫其背曰讀何書曰誦孝經曰孝經云何曰在上不驕為下不亂元貞曰吾豈驕乎紘曰君子防未萌亦願留意元貞稱善十五隨父在北豫州行臺侯景與人論掩衣法為當左右尚書敬顯俊曰孔子云微管仲吾其被髮左袵矣以此言之右袵應是紘進曰國家龍飛朔野雄步中原五帝異儀三王殊制掩衣左右何足是非景竒其早慧賜以名馬興和中文襄召為庫直奉朝請文襄遇禍紘冒刃捍禦以忠節進爵平春縣男頗為文宣所知為領左右都督文宣嘗與左右飲酒曰快哉大樂紘曰亦有大苦帝曰何苦紘曰長夜荒飲不悟國破是謂大苦帝默然後責紘曰爾與紇奚舍樂同事我兄舍樂死爾何不死紘曰君亡臣死自是常節但賊堅力薄故臣不死帝使燕子獻反縛之長廣王捉頭帝手刃將下紘呼曰楊遵彥崔季舒逃難官至僕射尚書冒死效命之士翻見屠戮曠古未有此事帝投刃於地曰王師羅不得殺遂捨之後拜驃騎大將軍武平初加開府儀同三司上言突厥與周男女來往必相影響南北寇邉宜為之備五年陳人寇淮南封輔相議討之紘曰若復出頓江淮恐北狄西寇乘弊而來莫若薄賦省徭息人養士使朝廷協睦遐邇歸心征之以仁義鼓之以道德天下皆當肅清豈直江南偽陳而已髙阿那肱謂衆曰從王武衛者南席衆皆同焉尋兼侍中聘周使還即正未幾卒紘好著述作鑒誡二十四篇敬顯俊字孝英陽平太平人也少英俠從神武信都義舉歷位度支尚書神武攻鄴顯俊督造土山以功封永安縣侯出內多歷顯官所在著名河清中卒於兖州刺史子長瑜武成時為廣陵太守多所受納刺史陸駿將表劾之以貨事和士開士開以書屏風詐為長瑜獻武成大悅駿表尋至遂不問遷合州刺史陷於陳卒子德亮齊亡後負尸歸德亮隋開皇初卒於尚書郎平鑒字明逺燕郡薊人也祖珽魏安平太守父勝安州刺史鑒少聰敏受學於華隂徐遵明受詩禮於𢎞農楊文懿通大義不為章句雅有豪俠氣孝昌末見天下將亂乃之洛陽與慕容儼以客騎馬為業兼習弓矢鑒性巧夜制胡畫以供衣食俄奔爾朱榮榮大竒之以軍功纍遷襄州刺史神武起義信都鑒棄郡來歸神武謂曰日者皇綱中弛公早已竭誠今爾朱披猖遂能捨逆從善搖落之時方識松筠之節啓授本官文襄輔政封西平縣伯遷西懷州刺史鑒奏請於州西故軹關道築城以防遏西寇朝廷從之尋西魏將楊檦來攻時新築之城糧仗未集城舊乏水衆情大懼南門內有大井隨汲即竭鑒乃具衣冠俯井而祝至旦而井泉湧溢有異於常合城取足揚示敵人將士既覩非常勇氣自立楊檦敗以功進開府儀同三司纍遷楊州刺史其妻生男鑒因喜酣醉擅免境內囚誤免關中細作二人醒而知之上表自劾文宣特原其罪賜犢百頭羊二百口酒百石令作樂河清二年重拜懷州刺史時和士開使求鑒愛妾阿劉即送之仍謂人曰老公失阿劉與死何異要自為身計不得不然後卒於郡官尚書贈司空諡曰文子子敬嗣子敬輕險無行姦穢所至禽獸不若隋開皇中為晉州行參軍為并州總管秦王所殺唐雍字道和太原晉陽人也其先自晉昌徙焉父靈芝魏壽陽令雍貴贈司空公雍少明敏有才幹初直神武外兵曹以幹濟見知擢為文襄大將軍督護文襄崩事出倉卒文宣部分將校鎮壓四方夜中召雍支配造次便了帝甚重之天保初稍遷給事中兼中書舍人封廣漢男及從征奚虜黃門侍郎袁猛舊典騎兵事至是為割配遲留鞭杖一百仍令雍監騎兵事以猛賜雍文宣頻年出塞雍必陪從專掌兵機識悟間明承受敏速自督將以還軍吏以上勞效由緒無不諳練每有顧問占對如響或於御前簡閲雖三五千人雍多不執文簿暗唱官位姓名未嘗繆誤七年於羊汾隄講武令雍總為諸軍節度事畢仍監宴射之禮帝親執其手引至太后前坐於丞相斛律金之上啓太后云唐雍強幹一人當千仍别賜錦綵錢帛雍非唯強濟明辨然亦善揣上意取進多塗是以恩寵日隆委任彌重帝又嘗對雍白太后云唐雍分明強幹每以軍機大事手作文書口具處分耳又聽受實是異人一日之中六度賜物又嘗解所服青鼠皮裘賜雍云朕意欲與卿共敝十年從幸晉陽除兼給事黃門侍郎領中書舍人文宣嘗幸并州登童子佛寺望并州城曰此是何等城或曰此是金城湯池天府之國帝云我謂唐雍是金城此非也其見重如此後語雍云髙德正妄説卿短而薦主簿郭敬朕已殺之卿劬勞既久欲除卿作州頻勑楊遵彥更除一人堪代卿者遵彥云遍訪文武如卿之徒實不可得所以遂停此意卿宜勉之帝或時切責大臣有不稱旨者云觀卿舉措不中與唐雍作奴其見賞遇多此類孝昭作相署相府司馬皇建元年除給事黃門侍郎於華林園射特賜雍金帶寶器服玩五百種太寧元年除大司農卿河清元年突厥入寇遣雍驛赴晉陽纂集兵馬在路聞虜將逼雍斟酌事宜改勑更促期會由此兵士限前畢集後拜侍中并州大中正護軍將軍從武成幸晉陽帝至武軍驛因醉責虞候都督范洪將殺之雍諫以為若非酒行戮雖族誅人無所怨假實有大罪因酒殺之恐招橫議洪因得免死雍又以軍人教習田獵依令十一月月别三圍以為人馬疲弊奉請每月兩圍又奏河陽晉州與周連境請於河陽懷州永橋義寧烏籍各徙六州軍人并家立軍府安置以備機急之用武成並從之未幾出為趙州刺史侍中護軍大中正悉如故帝謂雍曰朝臣未有帶侍中護軍中正作州者以卿舊勳故有此舉放卿百餘日休息至秋間當即追卿還雍政頗嚴酷然抑挫豪強公事甚謹尋除中書監仍侍中遷尚書右僕射武平初生斷事阿曲為御史所劾除名久之以舊恩復除將軍開府纍遷尚書令封晉昌王髙思好構逆令雍赴晉陽監勒諸軍事平録尚書事屬周師來攻洛陽右丞相髙阿那肱率兵赴援雍配割不甚從允因此有隙那肱譖之由是被疏七年車駕將幸晉陽勑斛律孝卿總知騎兵事多自決不相詢稟雍自恃從霸朝以來常典樞要歷事六帝恩遇甚重一旦為孝卿所輕負氣鬱怏形於辭色帝從平陽敗後狼狽還鄴雍懼那肱譖訴恨孝卿輕已遂留晉陽不從與莫多婁敬顯等立安德王延宗為帝信宿城陷雍遂降周依例授上開府儀同大將軍再遷户部轉少司馬封安福郡公遷鳳州刺史隋開皇初卒贈鳳州刺史雍性識明敏通解時事齊氏一代典執兵機凡是九州軍士四方勇募強弱多少番代往還及器械精粗糧儲虛實精心勤事莫不諳知自太寧以來奢侈糜費比及武平之末府藏漸虛雍度支取舍大有禆益然既被任遇意氣漸髙其未經府寺陳訴起覽辭牒條數甚多俱為憲臺及左丞彈劾並御注放免司空從事中郎封長業太尉記室參軍平濤並為徴官錢違限雍各杖背二十齊時宰相未有撾撻朝士者至是大駭物望三子長子君明開府儀同三司開皇初卒於應州刺史次子君徹中書舍人隋戎順二州刺史大業中卒於虎賁郎將少子君德以雍降周伏法齊朝因神武作相丞相府外兵曹騎兵曹分掌兵馬及天保受禪諸司咸歸尚書唯此二曹不廢令唐雍白建主之謂之外兵省騎兵省其後雍建位望轉隆各置省令中書舍人分判二省事故世稱唐白云白建字彥舉太原安邑人初入大丞相府任騎兵曹典文帳明解書計為同局所推天保末兼中書舍人孝昭輔政除大丞相騎兵參軍河清二年除員外散騎常侍仍舍人三年突厥入境代欣二牧悉是細馬合數萬匹在五臺山北柏谷中避賊賊退勑建送馬定州付人飬飼建以馬瘦違勑以便宜從事戎馬無損建有力焉武平末歷位尚書特進侍中中書令封髙昌郡公父長命贈開府儀同三司都官尚書建雖無他材伎勤於在公以溫柔自處與唐雍俱以典執兵馬致位卿相諸子幼弱俱為州郡主簿男女婚嫁皆得勝流卒贈司空元文遙字德逺河南洛陽人魏昭成皇帝六世孫也五世祖常山王遵父晞有孝行父卒廬於墓側而終文遙貴贈特進開府儀同三司中書監諡曰孝文遙敏慧夙成濟隂王暉業每云此子王佐才也暉業嘗大會賓客時有人將何遜集初入洛諸賢皆贊賞王召河間邢邵命文遙誦之幾遍可得文遙一覽便誦時年始十餘嵗濟隂王曰我家千里駒今定何如邢云此殆古來未有起家員外散騎侍郎遭父喪服闋除太尉東閣祭酒以天下方亂遂解官侍飬隱於林慮山武定中文襄召為大將軍府功曹齊受禪於登壇所授中書舍人宣傳文武號令楊遵彥每云堪解穰侯印者必在斯人後忽中旨幽縶竟不知所由如此積年文宣後自行禁獄執手愧謝親解所著金帶及御服賜之即日起為尚書祠部郎中孝昭攝政遷大丞相府功曹參典機密及踐阼除中書侍郎封永樂縣伯參軍國大事及帝大漸與平秦王歸彥趙郡王睿等同受顧託迎立武成武成即位任遇轉隆歷給事黃門侍郎散騎常侍侍中中書監天統二年詔特賜姓髙氏屬籍宗正子弟依例嵗時入廟朝祀再遷尚書左僕射進封寧都郡公仍侍中文遙歷事三主明逹世務每臨軒大集多令宣勑號令文武聲韻髙明發吐無滯然探測上旨時有委巷之言故不為知音所重齊因魏制宰縣多用厮濫至於士流恥居百里文遙以縣令為字民之切遂請革選於是密令搜揚貴遊子弟發勑用之猶恐其披訴總召集神虎門令趙郡王睿宣旨唱名厚加慰喻士人為縣自此始也既與趙彥深和士開同被任遇雖不如彥深清正守道又不為士開貪淫亂政在於季孟之間然性和厚與物無競故時論不在彥深之下初文遙自洛遷鄴唯有地十餘頃家貧所資衣食魏之將季宗姓被侮有人冒相侵奪文遙即以與之及貴此人尚在乃將家逃竄文遙大驚追加撫慰還以與之彼人愧而不受彼此俱讓遂為間田至後主嗣位趙郡王睿婁定逺等謀出和士開文遙亦參其謀睿見殺文遙由是出為西兖州刺史詣士開别士開曰處得言地使元家兒作令僕深負朝廷既言而悔仍執手慰勉之猶慮文遙自疑用其子行恭為尚書即以慰其心士開死自東徐州刺史徴入朝竟不用卒行恭美姿貌有父風兼俊才位中書舍人待詔文林館齊亡與陽休之等十八人同入關稍遷司勳下大夫隋開皇中位尚書郎坐事徙瓜州而卒行恭少頗自驕恣文遙令與范陽盧思道交遊文遙嘗謂思道云小兒比日微有所知是大弟之力然白擲劇飲甚得師風思道答云六郎辭情俊邁自是克荷堂構而白擲劇飲亦天性所得行恭弟行如亦聰慧早成武平末位著作佐郎趙隱字彥深自云南陽宛人漢太傅喜之後髙祖父難為齊州清河太守有惠政遂家焉清河後改為平原故為平原人也隱避齊廟諱故以字行父奉伯仕魏位中書舍人行洛陽令彥深貴贈司空彥深幼孤貧事母甚孝年十嵗曾候司徒崔光光謂賓客曰古人觀眸子以知人此人當必逺至性聰敏善書計安間樂道不雜交遊為雅論所歸服昧爽輒自掃門外不使人見率以為常初為尚書令司馬子如賤客供寫書子如善其無誤欲將入觀省舍彥深靴無氊衣帽穿弊子如給之用為書令史月餘補正令史神武在晉陽索二史子如舉彥深後拜子如開府參軍超拜水部郎及文襄為尚書令攝令選沙汰諸曹郎彥深以地寒被出為滄州别駕辭不行子如言於神武徴補大丞相功曹參軍專掌機密文翰多出其手稱為敏給神武曾與對坐遣造軍令以手捫其額曰若天假卿年必大有所至每謂司徒孫騰曰彥深小心恭謹曠古絶倫及神武崩祕喪事文襄慮河南有變仍自巡撫乃委彥深後事轉大行臺都官郎中臨發握手泣曰以母弟相托幸得此心既而內外寧靜彥深之力及還發喪深加褒美乃披郡縣簿為選封安國縣伯從征潁川時引水灌城城雉將沒西魏將王思政猶欲死戰文襄令彥深單身入城告喻即日降之便手牽思政出城文襄大悅先是文襄謂彥深曰吾昨夜夢獵遇一羣豕吾射盡獲之獨一大豕不可得卿言當為吾取須臾獲豕而進至是文襄笑曰夢驗矣即解思政佩刀與彥深曰使卿常獲此利文宣嗣位仍典機密進爵為侯天保初纍遷祕書監以為忠謹每郊廟必令兼太僕執御陪乘轉大司農帝或巡幸即輔贊太子知後事為東南道行臺尚書徐州刺史為政尚恩信為吏民所懷多所降下所營軍處士庶追思號趙行臺頓文宣璽書勞勉徴為侍中仍掌機密河清元年進爵樂安公纍遷尚書左僕射齊州大中正監國史遷尚書令位特進封宜陽王武平二年拜司空為祖珽所間出為西兖州刺史四年徴為司空轉司徒丁母憂尋起為本官七年六月暴疾薨時年七十彥深歷事纍朝掌參機近溫柔謹慎喜怒不形於色自皇建已還禮遇稍重每有引見或升御榻常呼官號而不名也凡諸選舉先令銓定提奬人物皆以行業為先輕薄之徒弗之齒也孝昭既執朝權羣臣多密勸進彥深獨不致言孝昭嘗謂王晞云若言衆心皆謂天下有歸何不見彥深有語晞以告彥深彥深不獲已陳請其為時重如此常遜言恭己未嘗以驕矜待物所以或出或處去而復還母傅氏雅有操識彥深三嵗傅便孀居家人欲以改適自誓以死彥深五嵗傅謂之曰家貧兒小何以能濟彥深泣而言曰若天哀矜兒大當仰報傅感其意對之流涕及彥深拜太常卿還不脫朝服先入見母跪陳幼小孤露蒙訓得至於此母子相泣久之然後改服後為宜陽國太妃彥深有七子仲將知名沈敏有父風溫良恭儉雖見妻子亦未嘗怠慢終日儼然學涉羣書善草𨽻雖與弟書書字楷正云草不可不解若施之於人即似相輕忽若當家卑幼又恐其疑所在宜爾是以必須𨽻筆彥深乞轉萬年縣子授之位給事黃門侍郎散騎常侍隋開皇中位吏部郎終於安州刺史齊朝宰相善始令終唯彥深一人然諷朝廷以子叔堅為中書侍郎頗招物議時馮子琮子慈明祖珽子君信並相繼居中書故時語云馮祖及趙穢我鳯池然叔堅身才最劣祖珽字孝徴范陽遒人也父瑩魏贈尚書左僕射司徒自有傳珽神情機警詞藻遒逸少馳令譽為當世所推起家祕書郎對策髙第為尚書儀曹郎中典儀注嘗為冀州刺史万俟受洛製清德頌其文典麗由是神武聞之時文宣為并州刺史署珽開府倉曹參軍神武口授珽三十六事出而疏之一無遺失大為僚類所賞時神武送魏蘭陵公主出塞嫁蠕蠕魏收賦出塞及公主逺嫁詩二首珽皆和之大為時人傳詠珽性疏率不能廉謹守道倉曹雖云州局及受山東課輸由此大有受納豐於財産又自解彈琵琶能為新曲招城市年少歌舞為娛遊集諸倡家與陳元康穆子容任胄元士亮等為聲色之遊諸人嘗就珽宿出山東大文綾并連珠孔雀羅等百餘匹令諸嫗擲摴蒱賭之以為戲樂參軍元景獻故尚書令元世俊子也其妻司馬慶雲女乃魏孝靜帝姑博陵長公主所生珽忽迎景獻妻赴席與諸人遞寢亦以貨物所致其豪縱淫逸如此常云丈夫一生不負身已文宣罷州珽例應隨府規為倉局之間致請於陳元康元康為白由是還任倉曹珽又委體附參軍事攝典籖陸子先為畫計請糧之際令子先宣教出倉粟十車為寮官捉送神武親問之珽自言不署歸罪子先神武信而釋之珽出而言曰此丞相天緣明鑒然實孝徴所為性不羈放縱曾至膠州刺史司馬世雲家飲酒遂藏銅疊二靣厨人請搜諸客果於珽懷中得之見者以為深恥所乘老馬常稱騮駒又與寡婦王氏姦通每人前相聞往復裴讓之與珽早狎於衆中嘲珽曰卿那得如此詭異老馬年十嵗猶號騮駒姦耳順尚稱娘子于時喧然傳之後為神武中外府功曹神武宴寮屬於坐失金叵羅竇泰令飲酒者皆脫帽於珽髻上得之神武不能罪也後為祕書丞領舍人事文襄州客至請賣華林遍略文襄多集書人一日一夜寫畢退其本曰不須也珽以遍略數帙質錢摴蒱文襄杖之四十又與令史李雙倉督成祖等作晉州啓請粟三千石代功曹參軍趙彥深宣神武教給成局參軍事過典籖髙景略疑其不實密以問彥深彥深答都無此事遂被推檢珽即引伏神武大怒決鞭二百配甲坊加鉗錮其榖倍徴未及科會并州定國寺成神武謂陳元康溫子升曰昔作芒山寺碑文時稱妙絶今定國寺碑當使誰作詞也元康因薦珽才學并解鮮卑語乃給筆扎就禁所具草一日內成其文甚麗神武以其工而且速特恕不問然猶免官散參相府文襄嗣事以為功曹參軍及文襄遇害元康被傷創重倩珽作書屬家纍事并云祖喜邉有少許物宜早索取珽乃不通此書喚祖喜私問得金二十五挺唯與祖喜二挺餘盡自入又盜元康家書數千卷祖喜懷恨遂告元康二弟叔諶季璩等叔諶以語楊愔愔嚬眉答曰恐不益亡者因此得停文宣作相珽擬補令史十餘人皆有受納而咨取教判并盜官遍略一部時又除珽祕書丞兼中書舍人遷鄴後其事皆發文宣即付從事中郎王士淹推檢并書與平陽公淹令録珽付禁勿令越逸淹遣田曹參軍孫子寬往喚珽受命便爾私逃黃門髙德正副留臺事謀云珽自知有犯驚竄是常但宣一命向祕書稱奉并州約束須五經三部仰丞親檢校催遣如此則珽意安夜當還宅然後掩收珽果如德正圗遂還宅薄晚就家掩之縛珽送廷尉據犯枉法處絞刑文宣以珽伏事先世諷所司命特寬其罰遂奏免死除名天保元年復被召從駕依除免例參於晉陽珽天性聰明事無難學凡諸伎藝莫不措懷文章之外又善音律解四夷語及隂陽占候醫藥之術尤是所長帝雖嫌其數犯刑憲而愛其才伎令直中書省掌詔誥珽通密狀列中書侍郎陸元規勑令裴英推問元規以應對忤旨被配甲坊除珽尚藥丞尋遷典御又奏造胡桃油復為割藏免官文宣每見之常呼為賊文宣崩普遷勞舊除為寧武太守會楊愔等誅不之官授著作郎數上密啓為孝昭所忿勑中書門下二省斷珽奏事珽善為胡桃油以塗畫為進之長廣王因言殿下有非常骨法孝徴夢殿下乘龍上天王謂曰若然當使兄大富貴及即位是為武成皇帝擢拜中書侍郎帝於後園使珽彈琵琶和士開胡舞各賞物百假士開忌之出為安德太守轉齊郡太守以母老乞還侍飬詔許之會南使入聘為申勞使尋為太常少卿散騎常侍假儀同三司掌詔誥初珽於乾眀皇建之時知武成隂有大志遂深自結納曲相祗奉武成於天保世頻被責心常銜之珽至是希旨上書請追尊太祖獻武皇帝為神武髙祖文宣皇帝改為威宗景烈皇帝以悅武成武成從之時皇后愛少子東平王儼願以為嗣武成以後主體正居長難於移易珽私於士開曰君之寵幸振古無二宫車一日晚駕欲何以克終士開因求䇿焉珽曰宜説主上云文襄文宣孝昭三帝子俱不得立今宜命皇太子早踐大位以定君臣若事成中宫少主皆德君此萬全計也君且微説令主上粗解珽當自外表論之士開許諾因有彗星出太史奏云除舊布新之徴珽於是上書言陛下雖為天子未是極貴案春秋元命苞云乙酉之嵗除舊革政今年太嵗乙酉宜傳立東宫令君臣之分早定且以上應天道并上魏獻文禪子故事帝從之由是拜祕書監加儀同三司大被親寵既見重二宫遂志於宰相先與黃門侍郎劉逖友善乃疏侍中尚書令趙彥深侍中左僕射元文遙侍中和士開罪狀令逖奏之逖懼不敢通其事頗泄彥深等先詣帝自陳帝大怒執珽詰曰何故毁我士開珽因厲聲曰臣由士開得進本無心毁之陛下今既問臣臣不敢不以實對士開文遙彥深等專弄威權控制朝廷與吏部尚書尉瑾內外交通共為表裏賣官鬻獄政以賄成天下歌謡若為有識所知安可聞於四裔陛下不以為意臣恐大齊之業墮矣帝曰爾乃誹謗我珽曰不敢誹謗陛下取人女帝曰我以其儉餓故收飬之珽曰何不開倉賑給乃買取將入後宫乎帝益怒以刀鐶築口鞭杖亂下將撲殺之大呼曰不殺臣陛下得名殺臣臣得名若欲得名莫殺臣臣為陛下合金丹遂少獲寬放珽又曰陛下有一范增不用知可如何帝又怒曰爾自作范增以我為項羽邪珽曰項羽人身亦何由可及但天命不至耳項羽布衣率烏合之衆五年而成霸業陛下藉父兄資財得至此臣以為項羽未易可輕臣何止方於范增縱擬張良亦不能及張良身傅太子猶因四皓方定漢嗣臣位非輔弼疏外之人竭力盡忠勸陛下禪位使陛下尊為太上子居宸扆於己及子俱保休祚蕞爾張良何足可數帝愈怒令以土塞其口珽且吐且言無所屈撓乃鞭二百配甲坊尋徙於光州刺史李祖勳遇之甚厚别駕張奉禮希大臣意上言珽雖為流囚常與刺史對坐勑報曰牢掌奉禮曰牢者地牢也乃為深坑置諸內苦加防禁桎梏不離其身家人親戚不得臨視夜中以蕪菁子燭薰眼因此失明武成崩後主憶之就除海州刺史是時陸令萱外干朝政其子穆提婆愛幸珽乃遺陸媪弟悉逹書曰趙彥深心腹隂沉欲行伊霍事儀同娣弟豈得平安何不早用智士邪和士開亦以珽能決大事欲以為謀主故棄除舊怨虛心待之與陸媪言於帝曰文襄文宣孝昭三帝其子皆不得立今至尊獨在帝位者實由祖孝徴又有大功宜重報之孝徴心行雖薄竒略出人緩急真可馮仗且其雙盲必無反意請喚取問其謀計帝從之入為銀青光祿大夫祕書監加開府儀同三司和士開死後仍説陸媪出彥深以珽為侍中在晉陽通密啓請誅琅邪王其計既行漸被任遇又靈太后之被幽也珽欲以陸媪為太后撰魏帝皇太后故事為太姬言之謂人曰太姬雖云婦人實是雄傑女媧以來無有也太姬亦稱珽為國師國寶由是拜尚書左僕射監國史加特進入文林館總監撰書封燕郡公食太原郡幹給兵七十人所住宅在義井坊旁拓鄰居大事修築陸媪自往案行勢傾朝野斛律光甚惡之遙見竊罵云多事乞索小人欲作何計數嘗謂諸將云邉境消息處分兵馬趙令嘗與吾等參論之盲人掌機密來全不共我輩語止恐誤國家事又珽頗聞其言因其女皇后無寵以謡言聞上曰百升飛上天明月照長安令其妻兄鄭道蓋奏之帝問珽珽證實又説謡云髙山崩槲樹舉盲老公背上下大斧多事老母不得語珽并云盲老公是臣自云與國同憂戚勸上行語其多事老母似道女侍中陸氏帝以問韓長鸞穆提婆并令髙元海假士良密議之衆人未從因光府參軍封士讓啓告光反遂滅其族珽又附陸媪求為領軍後主許之詔須覆述取侍中斛律孝卿署名孝卿密告髙元海元海語侯吕芬穆提婆云孝徴漢兒兩眼又不見物豈合作領軍也明旦面奏具陳珽不合之狀并書珽與廣寧王孝珩交結無大臣體珽亦求面見帝令引入珽自分疏并云與元海素嫌必是元海譖臣帝弱顔不能諱曰然珽列元海與司農卿尹子華太府少卿李叔元平凖令張叔略等結朋樹黨遂除子華仁州刺史叔元襄城郡守叔略南營州録事參軍陸媪又唱和之復除元海鄭州刺史珽自是專主機衡總知騎兵外兵事內外親戚皆得顯位後主亦令中要數人扶侍出入著紗帽直至永巷出萬春門向聖壽堂每同御榻論決政事委任之重羣臣莫比自和士開執事以來政事隳壞珽推崇髙望官人稱職內外稱美復欲增損政務沙汰人物奏罷京畿府併於領軍事連百姓皆歸郡縣宿衛都督等號位從舊官名文武服章並依故事又欲黜諸閹豎及羣小輩推誠延士為致安之方陸媪穆提婆議頗同異珽乃諷御史中丞麗伯律令劾主書王子沖納賂知其事連提婆欲使贓罪相及望因此坐并及陸媪猶恐後主溺於近習欲因后黨為援請以皇后兄胡君瑜為侍中中領軍又徴君瑜兄梁州刺史君璧欲以為御史中丞陸媪聞而懷怒百方排毁即出君瑜為金紫光祿大夫解中領軍君璧還鎮梁州皇后之廢頗亦由此王子沖釋而不問珽日以益疏又諸宦者更共譖毁之無所不至後主問諸太姬憫默不對三問乃下牀拜曰老婢合死本見和士開道孝徴多才博學言為善人故舉之比來看之極是罪過人實難容老婢合死後主令韓鳯檢案得其詐出勑受賜十餘事以前與其重誓不殺遂解珽侍中僕射出為北徐州刺史珽求見分疏韓長鸞積嫌於珽遣人推出柏閣珽固求靣見坐不肯行長鸞乃令軍士牽曵而出立珽於朝堂大加誚責上道後復令追還解其開府儀同三司直為刺史至州會有陳寇百姓多反珽不閉城門守陴者皆令下城靜坐街巷禁絶人行雞犬不聽鳴吠賊無所聞見莫測所以或疑人走城空不設警備至夜珽忽令大呌鼓躁喧天賊衆大驚登時走散後復率衆向城珽乘馬自出令録事參軍王君植率軍馬仍親臨戰陳賊先聞其盲謂為不能拒抗忽見親在戎行彎弧縱鏑相與驚怪畏之而罷時提婆憾之不已欲令城陷沒賊雖知危急不遣救援珽且守且戰十餘日賊竟奔走珽卒保全卒於州子君信涉獵書史多諸雜藝位兼通直散騎常侍聘陳使副中書郎珽出亦見廢免君信弟君彥容貌短小言辭澀訥少有才學隋大業中位至東平郡書佐郡陷翟讓因為李密所得密甚禮之署為記室軍書羽檄皆成其手及密敗為王世充所殺珽弟孝隱亦有文學早知名詞章雖不逮兄機警有口辨兼解音律魏末為兼散騎常侍迎梁使時徐君房庾信來聘名譽甚髙魏朝聞而重之接對者多取一時之秀盧元景之徒並降階攝職更遞司賔孝隱少處其中物議稱美孝隱從父弟茂頗有辭情然好酒性率不為時所重太寧中以經學為本鄉所薦除給事中以疾辭仍不復任珽受任寄故令呼茂茂不獲已暫來就之珽欲奏為官茂引逃去珽族弟崇儒涉學有辭章少以局幹知名武平末位司州别駕通直常侍入周為宕昌郡太守隋開皇初終宕州長史赫連子悅字士欣赫連勃勃之後也神武起兵時為濟州别駕勸刺史侯景赴神武後除林慮太守文襄往晉陽由郡境問所不便子悅云臨水武安去郡遙逺山嶺重疊若東屬魏郡則地平路近文襄笑曰卿徒知便人不覺損幹子悅曰所言者人所疾苦不敢以私潤負公心文襄善之乃勑依事施行自是人屬近便行路稱之天保中為揚州刺史先是城門早閉晚開廢於農作子悅到乃命以時開閉人吏便之纍遷鄭州刺史政為天下之最入為都官尚書鄭州人馬子韶崔孝武等八百餘人請立碑頌德有詔許焉加位開府歷行北豫州事兼吏部尚書子悅在官唯以清勤自守既無學術又闕風儀人倫清鑒去之彌逺一旦居銓衡之首大招物議由是除太常卿兼侍中聘周使主卒子仲章中書舍人馮子琮字子琮長樂信都人北燕主馮𢎞之後也祖嗣興相州刺史父靈紹度支即太中大夫子琮貴贈開府儀同三司子琮性識聰敏為外祖滎陽鄭伯猷所異初襲爵滎陽縣子天保初改為長安縣男皇建初為尚書駕部郎中攝庫部孝昭曾閲簿領試令口陳子琮暗對無有遺失時梁丞相王琳歸國孝昭詔子琮觀其形藝琳即與赴鄴甚見嘉賞子琮妻胡皇后娣也故詔與胡長粲輔導太子後轉太子中庶子天統元年武成禪位後主謂子琮曰少君左右宜得正人以卿心存正直今以後事相委再遷散騎常侍奏門下事尋兼并省祠部尚書後與胡長粲有隙武成深誡之曰唇亡齒寒勿復如此武成在晉陽既居舊殿少帝未有别所詔子琮監造大明宫宫成武成親自巡幸怪其不甚宏麗子琮對曰至尊幼年纂承大業欲令敦行節儉以示萬邦兼此北連天闕不宜過復崇峻武成稱善又詔子琮監議五禮與趙郡王睿分爭異同略無降下大為識者所鄙及武成崩和士開祕喪三日子琮問其故士開引神武文襄初崩並祕不舉喪至尊年少恐王公懷二欲追集然後詳議時趙郡王睿先預帷幄之謀子琮素知士開忌睿及領軍婁定逺恐其矯遺詔出睿外任奪定逺禁衛權因答云大行神武之子今上又是先皇禪位羣臣富貴皆至尊父子之恩但令一無改易必無異望世異事殊不得與霸朝相比且公不出宫門已經數日升遐之事行路皆傳久而不舉恐有他變及發喪元文遙以子琮太后妹夫恐其奬成太后干政説趙王睿及和士開出之拜鄭州刺史既非後主本意賞賜甚厚仍轉滄州别駕封寧都縣伯未幾太后為齊安王納子琮長女為妃子琮因請假赴鄴遂授侍中轉吏部尚書其妻恃親放縱請謁公行賄貨填委守宰除授先定錢帛多少然後奏聞其所通致事無不允子琮亦不禁制又廣拓傍鄰增修宅宇以夜繼晝未曾休息斛律光將兵度玉璧至龍門周有移書别須籌議詔子琮乘傳至軍與周將韋孝寬靣相要結龍門等五城因此內附後主以為子琮之功封昌黎郡公遷尚書右僕射仍攝選侍中如故和士開居要日久子琮舊所附託中雖阻異其後還相彌縫士開弟士休與盧氏成婚子琮檢校趨走與士開府僚不異是時內外官除授多由士開奏擬子琮既恃內戚兼帶選曹自擅權寵頗生間隙時陸媪藝震天下太后與之結為娣妹而和士開與太后有醜聲子琮欲隂殺陸媪及士開因廢帝而立琅邪王儼以謀告儼儼許之乃矯詔殺士開及儼見執言子琮教己太后怒又使執子琮遣右衛大將軍侯呂芬就內省以弓弦絞殺之使內參以庫車載尸歸其家諸子方握槊聞庫車來以為賜物大喜開視入哭子琮微有識鑒頗慕公正及位望轉隆宿心頓改擢引非類以為深交縱其子弟官位不依論次又專營婚媾歷選上門例以官爵許之旬月便驗頓邱李克范陽盧思道隴西李允伯李子希滎陽鄭庭堅並其女壻皆至超遷其驕縱如此祖珽先與子琮有隙於後具奏此事諸子並坐除名太后以為言又被擢用子琮有五子慈明最知名隋大業末死節列在忠義傳中辛術字懷哲隴西狄道人也父琛魏南梁太守自有傳術少明敏有識度解褐司空胄曹參軍與僕射髙隆之共典營構鄴都宫室術有思理百工剋濟再遷尚書右丞出為清河太守政有能名追授并州刺史遭父憂去職清河父老數百人詣闕上書請立碑頌德文襄嗣事與尚書左丞宋遊道中書侍郎李繪等並追詣晉陽俱為上客纍遷散騎常侍魏武定六年侯景叛除東南道行臺尚書封江夏縣男與髙嶽等破侯景禽蕭淵明遷東徐州刺史為淮南經略使天保元年侯景徴江西租稅術率諸軍度淮斷之燒其稻數百萬石還鎮下邳人隨術北度淮者三千餘家東徐州刺史郭志殺郡守文宣聞之勑術自今所統十餘州地諸有犯法者刺史先啓聽報以下先斷後表聞齊代行臺兼總民事自術始也安州刺史臨清太守盱台蘄城二鎮將犯法術皆案奏殺之睢州刺史及所部郡守俱犯大辟朝廷以其奴婢百口及資財盡賜術三辭不見許術乃送詣所司不復以聞邢邵聞之遺術書曰昔鍾離意云孔子忍渴於盜泉便以珠璣委地足下今能如此可謂異代一時及王僧辨破侯景術招擕安撫城鎮相繼款附前後二十餘州於是移鎮廣陵獲傳國璽送鄴文宣以璽告於太廟此璽即秦所制方四寸上紐交盤龍其文曰受命於天既夀永昌二漢相傳又歷魏晉晉懷帝敗沒於劉聰聰敗沒於石氏石氏敗晉穆帝永和中濮陽太守戴僧施得之遣督護何融送于建鄴歷宋齊梁梁敗侯景得之景敗侍中趙思賢以璽投景南兖州刺史郭元建送于術故術以進焉尋徴為殿中尚書領太常卿仍與朝賢議定律令遷吏部尚書食南兖州梁郡幹遷鄴以後大選之職知名者數四互有得失未能盡美文襄少年髙朗所蔽者疏袁叔德沈密謹厚所傷者細楊愔風流辨給取士失於浮華唯術性尚貞明取士必以才器循名責實新舊參舉管庫必擢門下不遺考之前後銓衡在術最為折𠂻甚為當時所稱舉天保末文宣嘗令術選百員官參選者二三千人術題目士子人無謗讟其所旌擢後亦皆致通顯術清儉寡嗜欲勤於所職未嘗暫懈臨軍以威嚴牧人有惠政少愛文史晚更勤學雖在戎旅手不釋卷及定淮南凡諸貨物一毫無犯唯大收典籍多是宋齊梁氏佳本鳩集萬餘卷并顧陸之徒名畫二王已下法書數亦不少俱不上王府唯入私門及還朝頗以餉遺貴要物議以此少之十年卒年六十皇建二年贈開府議同三司中書監青州刺史子閣卿尚書郎閣卿弟衡卿有識學開府參軍事隋大業初卒於太常丞裴讓之字士禮河東聞喜人也父他仕魏歷趙郡太守荆州刺史有惠政列在循吏傳中讓之年十六喪父殆不勝哀其母辛氏泣撫之曰棄親滅性得為孝子乎由是自勉辛氏髙明婦人又間禮度夫喪諸子多幼弱廣延師友或親自教授內外親屬有吉凶禮制多取則焉讓之少好學有文情清明俊辨早得聲譽魏天平中舉秀才對䇿髙第纍遷屯田主客郎中省中語曰能賦詩裴讓之為太原公開府記室與楊愔友善相遇則清談彌日愔每云此人風流警拔裴趙郡為不亡矣梁使至嘗令讓之攝主客郎酬應間雅為時所稱頃之弟諏之奔關右讓之兄弟皆拘繫齊神武問云諏之何在答曰昔吳蜀二國諸葛兄弟各盡心所事况讓之老母在此君臣分定失忠與孝愚夫不為伏願明公以誠信待物若以不信處物物亦安能自信以此定霸猶却行而求道耳神武善其言兄弟俱釋歷文襄大將軍主簿兼中書舍人後兼散騎常侍聘梁文襄嘗入朝讓之導引容儀醖藉文襄目之曰士禮佳舍人也遷長兼中書侍郎領舍人齊受禪靜帝遜居别宫與諸臣别讓之流涕歔欷以參掌儀注封寧都縣男帝欲以為黃門侍郎或言其體重不堪趨侍乃除清河太守至郡未幾楊愔謂讓之諸弟曰我與賢兄交款企聞善政適有人從清河來云姦吏斂迹盜賊清靜期月之期翻更非速清河有二豪吏田轉貴孫舍興久吏姦猾多有侵削因事遂脅人取財計贓依律不至死讓之以其亂法殺之時清河王嶽為司州牧遣部從事按之侍中髙德政舊與讓之不協奏言當陛下受禪之時讓之眷戀魏朝嗚咽流涕比為內官情非所願既而楊愔請救之云罪不應死文宣大怒謂愔曰欲得與裴讓之同冢邪於是朝臣無復敢言者事奏竟賜死於家諏之字士正少好儒學釋褐太學博士嘗從常景借書百卷十許日便還景疑其不能讀每卷策問應答無遺景歎曰應奉五行俱下禰衡一覽便記今復見之於裴生矣楊愔合門改葬託諏之頓作十餘墓志文皆可觀讓之諏之及皇甫和和弟亮並知名於洛下時人語曰諏勝於讓和不如亮司空髙乾致書欲相屈為户曹參軍諏之復書不受署沛王開大司馬府辟為記室遷鄴後諏之留在河南西魏領軍獨孤信入據金墉以諏之為開府屬號曰洛陽遺彥信敗諏之居南山洛陽刺史王元軌召為中從事西師忽至尋退遂隨西師入關周文以為大行臺倉曹郎中卒贈徐州刺史諏之弟讞之字士平七嵗便勤學早知名纍遷司徒主簿楊愔每稱歎曰河東士族京官不少唯此兄弟全無鄉音讞之雖年少不妄交遊唯與隴西辛術趙郡李繪頓邱李構清河崔贍為忘年友孝昭梓宫將還鄴轉儀曹郎尤悉歷代故事儀注喪禮皆能裁正為許昌太守賔客過郡出私財供給無賦於民去日為百性所懷齊亡仕周卒伊川太守讞之弟謀之字士令少有風格邢邵每云我裴四武成為開府辟為參軍掌書記謀之弟訥之字士言純謹有局量弱冠為平原公開府墨曹掌書記從至並州其母在鄴忽得心痛訥之是日不勝思慕心亦驚痛乃請急而還當時以為孝感文宣踐阼幸晉陽皇太子監國留訥之與杜臺卿並為齋帥領東宫管記轉太子舍人奏中書舍人事衛尉杜弼被其家客誣云有怨言謗訕時政并稱訥之與弼交好頗知之坐免官卒天統中追贈平州刺史長子樊出後讓之次子矩最知名隋史有傳訥之弟謁之字士敬少有志節好直言文宣末年昏縱朝臣罕有言者謁之上書正諫言甚切直文宣將殺之白刃臨頸謁之辭色不變帝曰癡漢何敢爾楊愔曰此子望陛下殺之以取後世名帝投刃曰小子望我殺爾以取名我終不成爾名也遣人送出齊亡卒於壺關令皇甫和者字長諧安定朝那人其先因官寓居漢中祖澄南齊梁二州刺史父徽字子元梁安定略陽二郡守魏正始二年隨其妻父夏侯道遷入魏道遷别上勳書欲以徽為元謀徽曰創謀之始夲不關預雖貪榮賞內愧於心遂拒不許梁州刺史羊靈祐重其敦實表為征虜府司馬卒和年十一而孤母夏侯氏才明有禮則親授以經書及長沈靜有雅量尤明禮儀宗親吉凶多相咨訪卒於濟隂太守子聿道以幹局知名位廣平令隋大業初比部郎和弟亮字君翼九嵗喪父哀毁有若成人神武起義為大行臺郎中亮率性任真不樂劇職除司徒東閣祭酒思還鄉里啓乞梁州褒中即本郡也後降梁以母兄在北求還梁武不奪也至鄴無復宦情遂入白鹿山恣泉石之賞縱酒賦詩超然自樂復為尚書殿中郎攝儀曹事以參撰禪代儀注封榆中男亮疏慢自任無幹務才每有禮儀大事常令餘司攝焉性質朴純厚終無片言矯飾屬有勑下司各列勤惰亮三日不上省文宣親詰其故亮曰一日雨一日醉一日病酒文宣以其恕實優容之杖脛三十而已所居宅汙下摽榜賣之將買者或問其故亮每答云為宅中水淹不泄雨即流入牀下由此宅終不售其淳實如此以兼散騎常侍聘陳使主以不稱免官後除任城太守病不之官卒於鄴贈驃騎大將軍安州刺史崔劼字彥元清河人魏贈太傅尚書令光之子也光自有傳劼清虛寡欲好學有家風魏末纍遷中書侍郎興和三年兼通直散騎常侍使梁天保初以議禪代除給事黃門侍郎加國子祭酒直內省典機密清儉勤慎甚為文宣帝所知拜南青州刺史有政績入為祕書監齊州大中正遷并省度支尚書俄授京省尋轉五兵尚書監國史臺閣之中見稱簡正武成之將禪後主先以問劼劼諫以為不可由是忤意出為南兖州刺史代還重為度支尚書儀同三司文登縣幹尋除中書令加開府待詔文林館監修撰新書卒贈齊州刺史尚書左僕射諡文貞初和士開擅朝曲求物譽諸公頗因此為子弟干祿世門之胄多處京官而劼二子拱撝並為外任弟廓之從容謂劼曰拱幸得不凡何不在省府中清華之所而並出外藩劼曰立身來恥以言自逹今若進兒與身何異卒無所求聞者莫不歎服劼常恨魏收書欲更作編年紀而才思竟不能就云崔肇師清河東武城人也祖亮魏贈車騎大將軍儀同三司父士泰龍驤將軍征南别將肇師少時疏放長輒變節更成謹厚涉獵經史頗有文思天平初以通直散騎侍郎為慰勞青州使至齊州界為土賊崔迦葉等拘欲逼與同事肇師執志不動喻以禍福賊遂捨之仍巡慰青部而還肇師以從弟乾亨同居事伯母甚謹文襄嘗言肇師合誅左右問其故曰崔鴻十六國春秋述諸僭偽而不及江東左右曰肇師與鴻别族乃止天保初以參定禪代禮儀封襄城縣男仍兼中書侍郎卒始鄴下有薛生者能相人言趙彥深當大貴肇師因問己答曰公門望甚髙爵位不及趙終如其言盧潛范陽涿人也祖尚之魏司徒左長史前將軍濟州刺史光祿大夫父文符通直散騎侍郎潛容貌瓌偉善言談少有成人志尚纍遷大將軍府中兵參軍機事強濟為文襄所知言其終可大用王思政見獲於頴州文襄重其才識潛常從容白文襄思政不能死節何足可重文襄謂左右曰我有盧潛便是更得一王思政天保中除左戶郎中坐譏議魏書與王松年李庶等俱被禁止會清河王嶽救江陵特赦潛為嶽行臺郎還歷中書中書黃門侍郎為奴誣告謀反文宣明之以奴付潛潛不之責黃門鄭子默奏潛從清河王嶽南討嶽令潛説梁將侯瑱大納瑱賂遺還不奏聞文宣杖潛一百乃截其鬚潛顔色不變歷魏尹丞司州别駕江州刺史所在有善政孝昭作相以潛為揚州道行臺左丞先是梁將王琳擁其主蕭莊歸夀陽朝廷以琳為揚州刺史勑潛與琳為南討經略後除行臺尚書儀同三司王琳鋭意圗南潛以為時事未可由是與琳有隙更相表列武成追琳入鄴除潛揚州刺史領行臺尚書潛在淮南十三年大樹風績為陳人所憚陳主與其邉將書云盧潛猶在卿宜深備之文宣初平淮南給復十年年滿後逮天統武平中徴稅頗雜又髙元海執政斷漁獵人家無以自資諸商胡負官責息者宦者陳德信縱其妄注淮南富家令州縣徴責又勑送突厥馬數千匹於揚州管內令土豪貴買之錢直始入便出勑括江淮間馬並送官廄由是百姓騷擾切齒嗟怨潛隨事撫慰兼行權略故得寧靖武平三年徴為五兵尚書揚州吏民以潛斷酒肉篤信釋氏大設僧會以香花緣道流涕送之潛歎曰正恐不久復來耳至鄴未幾復為揚州道行臺尚書四年陳將吳明徹來寇領軍封輔相赴援陳兵及峴輔相不從潛固爭不得憂憤發病卧幕下果敗陳人遂圍夀陽壅芍陂以水灌之詔王長春為南討都督長春軍次河南多給兵士糧便鳴角欲引而賤糴其米及頓兵更貴糶其米乃與皮景和擁衆十萬於淮北不進夀陽城中青黑龍升天城尋陷潛及行臺僕射王貴顯特進巴陵王王琳扶風王可朱渾孝裕武衛將軍奚永樂儀同索景和仁州刺史酈伯偉霍州刺史封子繡泰州刺史髙子植行臺左丞李騊駼等督將五十八軍士一萬皆沒焉陳人殺王琳餘人皆囚於東冶陳主欲知齊之虛實乃出潛潛曰囚本屬幽州於河北最小口有五十萬落陳者唯與酈伯偉二人耳時李騊駼將逃歸并要潛潛曰我此頭靣何可誑人吾少時相者云沒在吳越地死生已定弟其行也因寄書於弟士邃曰吾夢汝以某月某日得患某月某日漸損皆如其言既而歎曰夀陽沒吾欲以頸血濺城而死佛教不聽自殺故荏苒偷生今可死矣於是閉氣而絶其家購尸歸葬贈開府儀同三司尚書左僕射兖州刺史無子以弟士邃子元孝嗣潛雅性貞固祖珽嘗要潛陷仁州刺史劉逖許以髙位潛曰如此事吾不為也行臺慕容恃德嘗所推重有疾謂其子曰盧尚書教我為人有如昆弟我死持上騂馬與之其子以他馬往恃德柩出門自停不可動巫祝以為恃德聲怒曰何不與盧尚書我所騎騂馬其子遽奉命柩乃行潛以馬價為營福事其為時重如此士邃字子淹少為崔昻所知昻云此昆季足為後生之俊但恨其俱不讀書耳位尚書左右丞吏部郎中中山太守帶定州長史齊亡後卒盧詢祖范陽涿人也祖文偉魏青州刺史父恭道范陽太守詢祖襲祖爵大夏男有術學文辭華美為後生之俊舉秀才至鄴趙郡李祖勳嘗宴諸文士文宣使小黃門勑祖勳曰蠕蠕既破何無賀表使者待之諸賔皆為表詢祖俄頃便成其辭云昔十萬橫行樊將軍請而受屈五千深入李都尉降而不歸時重其工後朝廷大遷除同日催拜詢祖立於東止車門外為二十餘人作表文不加點辭理可觀詢祖初襲爵有宿德朝士曰大夏初成詢應聲曰且得燕雀相賀天保末為築長城子使自負其才內懷鬱怏遂毁容服如賤役者以見楊愔愔曰故舊皆有所縻唯大夏未加處分詢祖厲聲曰是誰之咎既至役所作築長城賦以寄其意其略曰板則紫柏杵則木瓜何斯材而斯用也草則離離靡靡緣岡而植但使十步而有一芳余亦何辭間於荆棘邢邵嘗謂曰卿小年才學富盛戴角者無上齒恐卿不夀對曰詢祖初聞此言實懷惕懼見丈人蒼蒼在鬢差以自安邵甚重其敏贍既有口辨好臧否人物衆共嫉之言其淫於從妹宗人思道謂曰大夏何為招四海議詢祖曰骨肉還相殘何况執玉帛者萬國詢祖與思道俱為北州人俊魏收揚譽思道而以詢祖為不及詢祖謂人曰見未能髙飛者借其羽毛知逸勢沖天者翦其翅翮既諸謗毁日至素論皆薄其人長廣太守邢子廣曰詢祖有規檢禰衡思道無冰稜文舉後頗折節歷太子舍人司徒記室卒有文集十卷皆遺逸崔子樞博陵安平人魏驃騎大將軍康曾孫也父長瑜位開府中兵參軍子樞學涉好文詞強辨有才幹齊時為考功郎中參議五禮待詔文林館兼散騎常侍聘周使還除通直散騎常侍兼知度支子樞明解世務所居稱職因度支有受納風聞為御史所劾遇赦免齊亡入周位至上士以預尉遲迥事被誅子樞次弟子端亦有才幹而文藝為優歷殿中侍御史卒於通直散騎侍郎子端弟子博武平末為河陽道行臺郎隋開皇末卒於泗州刺史子博弟子發有文才武平末祕書郎修起居注仕隋為秦王文學卒於國子博士子樞叔父叔瓚頗有學識性好直言其妻即昭信皇后姊也文宣擢為魏尹丞屬蝗蟲為災帝以問叔瓚對曰案漢書五行志土功不時蝗蟲作厲當今外築長城內興三臺故致此災帝大怒令左右歐之又擢其髮以溷汁沃其頭曵以出由是廢頓久之後卒於平陽太守贈本州刺史通志卷一百五十四
