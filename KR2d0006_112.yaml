body:
  text: 通志卷九十九宋右迪功郎鄭樵漁仲撰列傳第十二前漢張騫李廣利司馬遷嚴助朱買臣吾邱夀王主父偃徐樂嚴安終軍王褒賈捐之東方朔公孫賀劉屈氂車千秋王欣楊敞弟惲蔡義陳萬年子咸鄭𢎞楊王孫張騫漢中成固人建元中為郎時胸奴降者言胸奴破月氏音支王以其頭為飲器月氏遁而怨胸奴無與共擊之漢方欲事滅胡聞此言欲通使道必更胸奴中乃募能使者騫以郎應募使月氏與堂邑氏奴甘父俱出隴西徑胸奴胸奴得之傳詣單于單于曰月氏在吾北漢何以得往使吾欲使越漢肯聽我乎留騫十餘嵗豫妻有子然騫持漢節不失居胸奴西騫因與其屬亡鄉月氏西走數十日至大宛大宛聞漢之饒財欲通不得見騫喜問欲何之騫曰為漢使月氏而為胸奴所閉道脫亡唯王使人道送我誠得至反漢漢之賂遺王財物不可勝言大宛以為然遣騫為發譯道抵康居康居傳致大月氏大月氏王已為胡所殺立其夫人太子為王既臣大夏而君之地肥饒少冦志安樂又自以逺於漢殊無報胡之心騫從月氏至大夏竟不能得月氏要領留嵗餘還並南山欲從羌中歸復為胸奴所得留嵗餘單于死國內亂騫與胡妻及堂邑父俱亡歸漢拜騫為太中大夫堂邑父為奉使君騫為人強力寬大信人蠻夷愛之堂邑父胡人善射窮急射禽獸給食初騫行時百餘人去十三嵗唯二人得還騫身所至者大宛大月氏大夏康居而傳聞其旁大國五六具為天子言其地形所有語具西戎傳中騫曰臣在大夏時見卭竹杖蜀布問安得此大夏國人曰吾賈人往市之身毒國毒音篤一名天篤則浮屠胡是也身毒國在大夏東南可數千里其俗土著與大夏同而卑濕暑熱其民乘象以戰其國臨大水焉以騫度之大夏去漢萬二千里居西南今身毒又居大夏東南數千里有蜀物此其去蜀不逺矣今使大夏從羌中險羌人惡之少北則為胸奴所得從蜀宜徑又無冦天子既聞大宛及大夏安息之屬皆大國多竒物土著頗與中國同俗而兵弱貴漢財物其北則大月氏康居之屬兵強可以賂遺設利朝也誠得以義屬之則廣地萬里重九譯致殊俗威德遍於四海天子欣欣以騫言為然乃令因蜀犍為發間使數道並出出駹出莋出徙卭出僰音蒲北反皆各行一二千里其北方閉氐莋漢使見閉於夷南方閉嶲先藥反昆明昆明之屬無君長善冦盜輒殺略漢使終莫得通然聞其西可千餘里有乘象國名滇越滇音顚其國出焉而蜀賈間出物者或至焉於是漢以求大夏道始通滇國初漢欲通西南夷費多罷之及騫言可以通大夏乃復事西南夷騫以校尉從大將軍數擊胸奴知水草處軍得以不乏乃封騫為博望侯是嵗元朔六年也後二年騫為衛尉與李廣俱出右北平擊胸奴胸奴圍李將軍軍多失亡而騫後期當斬贖為庶人是嵗驃騎將軍破胸奴西邊殺數萬人至祁連山其秋渾邪王率衆降漢而金城河西並南山至鹽澤空無胸奴胸奴時有候者到而希矣後二年漢擊走單于於幕北天子數問騫大夏之屬騫既失侯因曰臣居胸奴中聞烏孫王號昆莫昆莫父難兜靡本與大月氏俱在祁連敦煌間小國也大月氏攻殺難兜靡奪其地人民亡走胸奴子昆莫新生傅父布就翖侯抱亡置草中傅父猶傅母也布就名也翖侯官名也翖與翕同為求食還見狼乳之又烏銜肉翔其旁以為神遂持歸胸奴單于愛養之及壯以其父民衆與昆莫使將兵數有功時月氏已為胸奴所破西擊塞王塞音先得反西城國名也塞王南走遠徙月氏居其北昆莫既健自請單于報父怨遂西攻破大月氏大月氏復西走徙大夏地昆莫略其衆因留居兵稍強會單于死不肯復朝事胸奴胸奴遣兵擊之不勝益以為神而逺之今單于新困於漢而昆莫地空蠻夷戀故地又貪漢物誠以此時厚賂烏孫招以東居故地漢遣公主為夫人結昆弟其藝宜聽則是斷胸奴右臂也既連烏孫自其西大夏之屬皆可招來而為外臣天子以為然拜騫為中郎將將三百人馬各二匹牛羊以萬數齎金幣帛直數千巨萬多持節副使道可便遣之旁國騫既至烏孫致賜諭指未能得其決語在西戎傳騫即分遣副使使大宛康居月氏大夏烏孫發譯道送騫與烏孫使數十人馬數十匹報謝因令窺漢知其廣大騫還拜為大行嵗餘騫卒後嵗餘所遣副使通大夏之屬者皆頗與其人俱來於是西北國始通於漢矣然騫鑿空諸後使往者皆稱博望侯以為質於外國外國由是信之其後烏孫竟與漢結婚初天子發書易曰神馬當從西北來得烏孫馬馬好名曰天馬及得宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬云而漢始築令居以西初置酒泉郡以通西北國因發使抵安息奄蔡犛靬條支身毒國而天子好宛馬使者相望於道一輩大者數百少者百餘人所齎操大放博望侯時其後益習而衰少焉漢率一嵗中使者多者十餘少者五六輩逺者八九嵗近者數嵗而反是時漢既滅越蜀所通西南夷皆震請吏置牂柯越嶲益州沈黎文山郡欲地接以前通大夏乃遣使嵗十餘輩出此初郡皆復閉昆明為所殺奪幣物於是漢發兵擊昆明斬首數萬後復遣使竟不得通語在西南夷傳自騫通外國道以尊貴其吏士爭上書言外國竒怪利害求使天子為其絶逺非人所樂聼其言豫節募吏民無問所從來為具備人衆遣之以廣其道來還不能無侵盜幣物及使失指天子為其習之輒覆案致重罪以激怒令贖復求使使端無窮而輕犯法其吏卒亦輒復盛推外國所有言大者豫節言少者為副故妄言無行之徒皆爭相效其使皆私縣官齎物欲賤市以私其利外國亦厭漢使人人有言輕重度漢兵逺不能至而禁其食物以苦漢使漢使乏絶責怨相攻擊樓蘭姑師小國當空道攻劫漢使王恢等尤甚而胸奴竒兵又時遮擊之使者爭言外國利害皆有城邑兵弱易擊於是天子遣從驃侯破奴將屬國騎及郡兵數萬擊胡胡皆去明年擊破姑師虜樓蘭王酒泉列亭鄣至玉門矣而大宛諸國發使隨漢使來觀漢廣大以大鳥卵及犛靬眩人獻於漢天子大説而漢使窮河源其山多玉石采來天子案古圖書名河所出山曰昆侖云是時上方數巡狩海上乃悉從外國客大都多人過之則散財帛賞賜厚具饒給之以覽視漢富厚焉大角氏出竒戲諸怪物多聚觀者行賞賜酒池肉林令外國客遍觀各倉庫府藏之積欲以見漢廣大傾駭之及加其眩者之工而角氐竒戲嵗增變其益興自此始而外國使更來更去大宛以西皆自恃逺尚驕恣未可詘以禮羈縻而使也漢使往既多其少從從行之微者率進孰進美語也於天子言大宛有善馬在二師城匿不肯示漢使天子既好宛馬聞之甘心使壯士車令等持千金及金馬以請宛王二師城善馬宛國饒漢物相與謀曰漢去我逺而鹽水中數有敗出其北有胡冦出其南乏水草且往往而絶邑乏食者多漢使數百人為輩來常乏食死者過半是安能致大軍乎且二師馬宛寶馬也遂不肯豫漢使漢使怒妄言椎金馬而去宛中貴人怒曰漢使至輕我遣漢使去令其東邊郁成王遮攻殺漢使取其財物天子大怒諸嘗使宛姚定漢等言宛兵弱誠以漢兵不過三千人強弩射之即破宛矣天子以嘗使浞野侯攻樓蘭以七百騎先至虜其王以定漢等言為然而欲侯寵姬李氏乃以李廣利為將軍伐宛騫孫猛字子遊有俊才元帝時為光祿大夫使胸奴給事中為石顯所譖自殺李廣利女弟李夫人有寵於上産昌邑哀王太初元年以廣利為二師將軍發屬國六千騎及郡國惡少年數萬人以往期至二師城取善馬故號二師將軍故浩侯王恢使道軍既西過鹽水當道小國各堅城守不肯給食攻之不能下下者得食不下者數日則去比至郁成士卒財有數千皆飢罷攻郁成城郁成距之所殺傷甚衆二師將軍與左右計至郁成尚不能舉况至其王都乎引而還往來二嵗至敦煌士不過什一二使使上書言道逺多乏食且士卒不患戰而患飢人少不足以拔宛願且罷兵益發而後往天子聞之大怒使使遮玉門關曰軍有敢入斬之二師恐因留屯敦煌夏漢亡浞野之兵二萬餘於胸奴公卿議者皆願罷宛軍專力攻胡天子業出兵誅宛宛小國而不能下則大夏之屬漸輕漢而宛善馬絶不來烏孫輪臺易苦漢使為外國笑乃案言伐宛尤不便者鄧光等赦囚徒扞冦盜發惡少年及邊騎嵗餘而出敦煌六萬人負私從者不與牛十萬馬三萬匹驢橐駝以萬數齎糧兵弩甚設天下騷動轉相奉伐宛凡五十餘校尉宛城中無井汲城外流水於是遣水工徙其城下水空以穴其城徙水從他道流空以穴其城者圍而攻之令作孔使穿穴也益發戍甲卒十八萬酒泉張掖北置居延休屠以衛酒泉而發天下七科適及載糒給二師糒乾飯音備轉運人徒相連屬至敦煌而拜習馬者二人為執驅馬校尉備破宛擇取其善馬云於是二師後復行兵多所至小國莫不迎出食給軍至輪臺輪臺不下攻數日屠之自此而西平行至宛城兵到者三萬宛兵迎擊漢兵漢兵射敗之宛兵走入保其城二師欲攻郁成城恐留行而令宛益生詐乃先至宛決其水原移之則宛固已憂困圍其城攻四十餘日宛貴人謀曰王母寡匿善馬殺漢使今殺王而出善馬漢兵宜解即不乃力戰而死未晚也宛貴人皆以為然共殺王其外城壞虜宛貴人勇將煎靡宛大恐走入中城相與謀曰漢所為攻宛以王母寡持其頭遣人使二師曰漢無攻我我盡出善馬恣所取而給漢軍食即不聼我我盡殺善馬康居之救又且至我居內康居居外與漢軍戰孰計之何從是時康居候視漢兵尚盛不敢進二師聞宛城中新得漢人知穿井而其內食尚多計以為求誅首惡者母寡母寡頭已至如此不許則堅守而康居候漢兵罷來救宛破漢軍必矣軍吏皆以為然許宛之約宛乃出其馬令漢自擇之而多出食食漢軍漢軍取其善馬數十匹中馬以下牝牡三千餘匹而立宛貴人之故時遇漢善者名昧蔡為宛王與盟而罷兵終不得入中城罷而引歸初二師起敦煌西為人多道上國不能食分為數軍從南北道校尉王申生故鴻臚壺充國等千餘人别至郁成城守不肯給食申生去大軍二百里負而輕之攻郁成急郁成窺知申生兵少晨用三千人攻殺申生等數人脫亡走二師二師令搜粟都尉上官桀往攻破郁成郁成降其王亡走康居桀追至康居康居聞漢已破宛出郁成王豫桀桀令四騎士縛守詣大將軍四人相謂郁成漢所毒今生將卒失大事欲殺莫適先擊上邽騎士趙弟拔劍擊斬郁成王桀等遂追及大將軍初二師後行天子使使告烏孫大發兵擊宛烏孫發二千騎往持兩端不肯前二師將軍之東諸所過小國聞宛破皆使其子弟從入貢獻見天子因為質焉軍還入玉門者萬餘人馬千餘匹後行非乏食戰死不甚多而將吏貪不愛卒侵牟之以此物故者衆天子為萬里而伐不録其過乃下詔曰胸奴為害久矣今雖徙幕北與旁國謀共要絶大月氏使遮殺中郎將江故鴈門守攘危須以西及大宛皆合約殺期門車令中郎將朝及身毒國使隔東西道二師將軍廣利征討厥罪伐勝大宛賴天之靈從􅀈河山涉流沙通西海山雪不積士大夫徑度獲王首虜珍怪之物畢陳於闕其封廣利為海西侯食邑八千戶又封斬郁成王者趙弟為新畤侯軍正趙始成功最多為光祿大夫上官桀敢深入為少府李哆有計謀為上黨太守軍官吏為九卿者三人諸侯相郡守二千石百餘人千石以下千餘人奮行者官過其望以適過行者皆黜其勞士卒賜直四萬錢伐宛再反凡四嵗而得罷焉後十一嵗征和三年二師復將七萬騎出五原擊胸奴度郅居水兵敗降胸奴為單于所殺司馬遷字子長司馬氏自顓頊命南正重司天火正黎司地唐虞之際紹重黎之後使復典之至于夏商故重黎氏世序天地其在周程伯休甫其後也當宣王時官失其守而為司馬氏司馬氏世典周史惠襄之間司馬氏適晉晉中軍隨會奔魏而司馬氏入少梁自司馬氏去周適晉分散或在衛或在趙或在秦其在衛者相中山在趙者以傳劒論顯蒯瞶其後也在秦者錯與張儀爭論於是惠王使錯將兵伐蜀遂拔因而守之錯孫蘄事武安君白起而少梁更名夏陽蘄與武安君坑趙長平軍還而與之俱賜死杜郵葬於華池蘄孫昌為秦王鐵官當始皇之時蒯瞶元孫卬為武信君將而徇朝歌諸侯之相王王卬於殷漢之伐楚卬歸漢以其地為河內郡昌生毋懌毋懌為漢市長毋懌生喜喜為五大夫卒皆葬髙門喜生談談為太史公太史公學天官於唐都受易於楊何習道論於黃子太史公仕於建元元封之間愍學者不達其意而師悖乃論六家之要指曰易大傳曰天下一致而百慮同歸而殊塗夫隂陽儒墨名法道德此務為治者也直所從言之異路有省不省耳嘗竊觀隂陽之術太詳而衆忌諱使人拘而多畏然其敘四時之大順不可失也儒者博而寡要勞而少功是以其事難盡從然其敘君臣父子之禮列夫婦長幼之別不可易也墨者儉而難遵是以其事不可遍循然其強本節用不可廢也法家嚴而少恩然其正君臣上下之分不可改也名家使人儉而善失真然其正名實不可不察也道家使人精神專一動合無形淡足萬物其為術也因隂陽之大順采儒墨之善撮名法之要與時遷徙應物變化立俗施事無所不宜指約而易操事小而功多儒者則不然以為人主天下之儀表也君倡臣和主先臣隨如此則主勞而臣佚至於大道之要去健羡黜聰明釋此而任術夫神大用則竭形大勞則敝神形蚤衰欲與天地長久非所聞也夫隂陽四時八位十二度二十四節各有教令曰順之者昌逆之者亡未必然也故曰使人拘而多畏夫春生夏長秋收冬藏此天道之大經也弗順則無以為天下紀綱故曰四時之大順不可失也夫儒者以六藝為法六藝經傳以千萬數纍世不能通其學當年不能究其禮故曰博而寡要勞而少功若夫列君臣父子之禮序夫婦長幼之別雖百家弗能易也墨者亦上堯舜言其德行曰堂髙三尺土階三等茅茨不翦採椽不斫飯土簋啜土刑糲粱之食藜藿之羮夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教喪禮必以此為萬民率故天下法若此則尊卑無别也夫世異時移事業不必同故曰儉而難遵要曰強本節用則人給家足之道也此墨子之所長雖百家不能廢也法家不別親疏不殊貴賤一斷於法則親親尊尊之恩絶矣可以行一時之計而不可長用也故曰嚴而少恩若尊主卑臣明分職不得相踰越雖百家不能改也名家苛察繳繞使人不得反其意剸決於名時失人情故曰使人儉而善失真若夫控名責實參伍不失此不可不察也道家無為又曰無不為其實易行其辭難知其術以虛無為本以因循為用無成勢無常形故能究萬物之情不為物先後故能為萬物主有法無法因時為業有度無度因物興舍故曰聖人不巧時變是守虛者道之常也因者君之綱也羣臣並至使各自明也其實中其聲者謂之端實不中其聲者謂之款款言不聽姦乃不生賢不肖自分黑白乃形在所欲用耳何事不成乃合大道混混𡨕𡨕光耀天下復反無名凡人所生者神也所託者形也神大用則竭形大勞則敝形神離則死死者不可復生離者不可復合故聖人重之由此觀之神者生之本形者生之具不先定其神形而曰我有以治天下何由哉太史公既掌天官不治民有子曰遷遷生龍門耕牧河山之陽年十嵗則誦古文二十而南遊江淮上會稽探禹冗窺九疑浮沅湘北涉汶泗講業齊魯之都觀夫子遺風鄉射鄒嶧厄困蕃薛彭城過梁楚以歸於是遷仕為郎中奉使西征巴蜀以南略卭莋昆明還報命是嵗天子始建漢家之封而太史公留滯周南不得與從事發憤且卒而子遷適反見父於河雒之間太史公執遷手而泣曰豫先周室之太史也自上世嘗顯功名虞夏典天官事後世中衰絶於豫乎女復為太史則續吾祖矣今天子接千載之統封泰山而豫不得從行是命也夫命也夫豫死爾必為太史為太史無忘吾所欲論著矣且夫孝始於事親中於事君終於立身揚名於後世以顯父母孝之大也夫天下稱周公言其能論歌文武之德宣周召之風達太王王季思慮爰及公劉以尊后稷也幽厲之後王道缺禮樂衰孔子修舊起廢論詩書作春秋則學者至今則之自獲麟以來四百有餘嵗而諸侯相兼史記放絶今漢興海內一統明主賢君忠臣義士豫為太史而不論載廢天下之文豫甚懼焉爾其念哉遷俯首流涕曰小子不敏請悉論先人所次舊聞不敢闕卒三嵗而遷為太史令紬史記石室金匱之書紬音胄謂綴集也匱與匱同五年而當太初元年十一月甲子朔旦冬至天厯始改建於明堂諸神受記太史公曰先人有言自周公卒五百嵗而有孔子孔子至于今五百嵗有能紹而明之正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢攘焉攘古讓字上大夫壺遂曰昔孔子何為作春秋哉太史公曰余聞之董生周道廢孔子為魯司冦諸侯害之大夫壅之孔子知時之不用道之不行也是非二百四十二年之中以為天下儀表貶諸侯討大夫以達三王而已矣子曰我欲載之空言不如見之行事之深切著明也春秋上明三王之道下辨人事之經紀别嫌疑明是非定猶與善善惡惡賢賢賤不肖存亡國繼絶世補敝起廢王道之大者也易著天地隂陽四時五行故長於變禮綱紀人倫故長於行書記先王之事故長於政詩記山川溪谷禽獸草木牝牡雌雄故長於風樂樂所以立故長於和春秋辨是非故長於治人是故禮以節人樂以發和書以道事詩以達意易以道化春秋以道義撥亂世反之正莫近於春秋春秋文成數萬其指數千萬物之聚散皆在春秋春秋之中弒君三十六亡國五十二諸侯奔走不得保社稷者不可勝數察其所以皆失其本已故易曰差以毫釐謬以千里故臣弒君子弒父非一朝一夕之故其漸久矣有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通於春秋之義者必蒙首惡之名為人臣子不通春秋之義者必陷篡弒誅死之罪其實皆以善為之而不知其義被之空言不敢辭夫不通禮義之指至於君不君臣不臣父不父子不子夫君不君則犯臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下大過豫之受而不敢辭故春秋者禮義之大宗也夫禮禁未然之前法施已然之後法之所為用者易見而禮之所為禁者難知壺遂曰孔子之時上無明君下不得任用故作春秋埀空文以斷禮義當一王之法今夫子上遇明天子下得守職萬事既具咸各序其宜夫子所論欲以何明太史公曰唯唯否否不然余聞之先人曰虙戲至純厚作易八卦堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋采善貶惡推三代之德褒周室非獨刺譏而已也漢興已來至明天子獲符瑞封禪改正朔易服色受命於穆清澤流罔極海外殊俗重譯款塞請來獻見者不可勝道臣下百官力誦聖德猶不能宣盡其意且士賢能矣而不用有國者耻也主上明聖德不布聞有司之過也且余掌其官廢明聖盛德不載滅功臣賢大夫之業不述墮先人所言罪莫大焉余所謂述故事整齊其傳非所謂作也而君比之春秋謬矣於是論次其文十年而遭李陵之禍幽於縲紲乃喟然而嘆曰是余之􅓧夫身虧不用矣退而深惟曰夫詩書隱約者欲遂其志之思也卒述陶唐以來至於麟止自黃帝始凡十二本紀十表八書三十世家六十九列傳惟漢繼五帝末流接三代絶業周道既廢秦撥去古文焚滅詩書故明堂石室金匱玉版圖籍散亂漢興蕭何次律令韓信申軍法張蒼為章程叔孫通定禮儀則文學彬彬稍進詩書往往間出自曹參薦蓋公言黃老而賈誼鼂錯明申韓公孫𢎞以儒顯百年之間天下遺文古事靡不畢集太史公仍父子相繼饌饌與撰同其職曰於戲音嗚呼余維先人嘗掌斯事顯於唐虞至于周復典之故司馬氏世主天官至于余乎欽念哉罔羅天下放失舊聞王迹所興原始察終見盛觀衰論考之行事略三代録秦漢上記軒轅下至于兹著十二本紀既科條之矣並時異世年差不明作十表禮樂損益律厯改易兵權山川鬼神天人之際承敝通變作八書二十八宿環北辰三十輻共一轂運行無窮輔弼股肱之臣配焉忠信行道以奉主上作三十世家扶義俶儻不令已失時立功名於天下作六十九列傳凡百三十篇五十二萬六千五百字為太史公書序略以拾遺補藝成一家言協六經異傳齊百家雜語藏之名山副在京師以俟後聖君子第七十遷之自敘云爾自此前皆其自敘之辭自此後乃班氏作傳語而十篇缺有録無書張晏曰遷沒之後亡景紀武紀禮書樂書兵書漢興以來將相年表日者列傳三王世家龜䇿列傳傅靳列傳元成之間褚先生補缺作武帝紀三王世家龜䇿日者傳言辭陋鄙非遷本意也師古曰序目本無兵書張云亡失此説非也遷遭李陵事下腐刑事在陵傳遷既被刑之後為中書令尊寵任職故人益州刺史任安豫書責以古賢臣之義遷報之曰少卿足下曩者辱賜書教以慎於接物推賢進士為務意氣勤勤懇懇若望僕不相師而用流俗人之言僕非敢如是也雖罷駑亦嘗側聞長者遺風矣顧自以為身殘處穢動而見尤欲益反損是以抑鬱而誰與語諺曰誰為為之孰令聼之蓋鍾子期死伯牙終身不復鼓琴何則士為知己用女為説已容若僕大質已虧缺雖材懷隨和行若由夷終不可以為榮適足以發笑而自點耳書辭宜答會從東上來又迫賤事相見日淺卒卒無須臾之間得竭志意今少卿抱不測之罪涉旬月迫季冬僕又薄從上雍恐卒然不可為諱是僕終已不得舒憤悶以曉左右則長逝者魂魄私恨無窮請略陳固陋闕然不報幸勿為過僕聞之修身者智之府也愛施者仁之端也取豫者義之符也耻辱者勇之決也立名者行之極也士有此五者然後可以托於世列於君子之林矣故禍莫憯於利欲悲莫痛於傷心行莫醜於辱先而詬莫大於宫刑刑餘之人無所比數非一世也所從來逺矣昔衛靈公與雍渠同載孔子適陳商鞅因景監見趙良寒心同子驂乘袁絲變色自古而耻之夫中材之人事關於宦豎莫不傷氣况慷慨之士乎如今朝雖乏人奈何令刀鋸之餘薦天下豪雋哉僕賴先人緒業得待罪輦轂下二十餘年矣所以自惟上之不能納忠效信有竒䇿材力之譽自結明主次之又不能拾遺補闕招賢進能顯巖冗之士外之不能備行伍攻城野戰有斬將搴旗之功下之不能纍日積勞取尊官厚祿以為宗族交遊光寵四者無一遂茍合取容無所短長之效可見於此矣鄉者僕亦嘗厠下大夫之列陪外廷末議不以此時引綱維盡思慮今已虧形為掃除之𨽻在闒茸之中乃欲卭首信眉論列是非不亦輕朝廷羞當世之士邪嗟乎嗟乎如僕尚何言哉尚何言哉且事本末未易明也僕少負不羈之才長無鄉曲之譽主上幸以先人之故使得奏薄技出入周衛之中僕以為戴盆何以望天故絶賔客之知忘室家之業日夜思竭其不肖之材力務一心營職以求親媚於主上而事乃有大謬不然者夫僕與李陵俱居門下素非相善也趣舍異路未嘗銜杯酒接殷勤之歡然僕觀其為人自竒士事親孝與士信臨財廉取豫義分别有讓恭儉下人常思奮不顧身以徇國家之急其素所蓄積也僕以為有國士之風夫人臣出萬死不顧一生之計赴公家之難斯已竒矣今舉事一不當而全軀保妻子之臣隨而媒孽其短僕誠私心痛之且李陵提步卒不滿五千深踐戎馬之地足歷王庭埀餌虎口橫挑強胡卬億萬之師與單于連戰十餘日所殺過當虜救死扶傷不給旃裘之君長咸震怖乃悉徴左右賢王舉引弓之人一國共攻而圍之轉鬬千里矢盡道窮救兵不至士卒死傷如積然李陵一呼勞軍士無不起躬流涕沫血飲泣張空弮昌白創北首爭死敵陵未沒時使有來報漢公卿王侯皆奉觴上夀後數日陵敗書聞主上為之食不甘味聼朝不怡大臣憂懼不知所出僕竊不自料其卑賤見主上慘悽怛悼誠欲效其款款之愚以為李陵素與士大夫絶甘分少能得人之死力雖古名將不過也身雖陷敗彼觀其意且欲得其當而報漢事已無可奈何其所摧敗功亦足以暴於天下僕懷欲陳之而未有路適會召問即以此指推言陵功欲以廣主上之意塞睚眥之辭未能盡明明主不深曉以為僕沮二師而為李陵遊説遂下於理拳拳之忠終不能自列因為誣上卒從吏議家貧財賂不足以自贖交遊莫救左右親近不為一言身非木石獨與法吏為伍深幽囹圄之中誰可告訴者此正少卿所親見僕行事豈不然邪李陵既生降隤其家聲而僕又佴以蠶室重為天下觀笑悲夫悲夫事未易一二為俗人言也僕之先人非有剖符丹書之功文史星厯近乎卜祝之間固主上所戲弄倡優畜之流俗之所輕也假令僕伏法受誅若九牛亡一毛與螻蟻何異而世又不能與死節者比特以為智窮罪極不能自免卒就死耳何也素所自樹立使然人固有一死死或重於泰山或輕於鴻毛用之所趨異也太上不辱先其次不辱身其次不辱理色其次不辱辭令其次詘體受辱其次易服受辱其次關木索被箠楚受辱其次鬄毛髮嬰金鐵受辱其次毁肌膚斷支體受辱最下腐刑極矣傳曰刑不上大夫此言士節不可不厲也猛虎處深山百獸震恐及其在穽檻之中搖尾而求食積威約之漸也故士有畫地為牢藝不入削木為吏議不對定計於鮮也今交手足受木索暴肌膚受榜箠幽於圜牆之中當此之時見獄吏則頭槍地視徒𨽻則心惕息何者積威約之藝也及已至此言不辱者所謂強顔耳曷足貴乎且西伯伯也拘羑里李斯相也具五刑淮隂王也受械於陳彭越張敖南鄉稱孤繫獄具罪絳侯誅諸呂權傾五伯囚於請室魏其大將也衣赭關三木季布為朱家鉗奴灌夫受辱居室此人皆身至王侯將相聲聞鄰國及罪至罔加不能引決自財在塵埃之中古今一體安在其不辱也由此言之勇怯藝也強弱形也審矣曷足怪乎且人不能蚤自財繩墨之外已稍陵夷至於鞭箠之間乃欲引節斯不亦逺乎古人所以重施刑於大夫者殆為此也夫人情莫不貪生惡死念親戚顧妻子至激於義理者不然乃有不得已也今僕不幸蚤失二親無兄弟之親獨身孤立少卿視僕於妻子何如哉且勇者不必死節怯夫慕義何處不勉焉僕雖怯耎欲茍活亦頗識去就之分矣何至自湛溺纍紲之辱哉且夫臧獲婢妾猶能引決况若僕之不得已乎所以隱忍茍活函糞土之中而不辭者恨私心有所不盡鄙沒世而文采不表於後也古者富貴而名磨滅不可勝記唯俶儻非常之人稱焉蓋西伯拘而演周易仲尼厄而作春秋屈原放逐乃賦離騷左邱失明厥有國語孫子臏腳兵法修列不韋遷蜀世傳呂覽韓非囚秦説難孤憤詩三百篇大抵聖賢發憤之所為作也此人皆意有所鬱結不得通其道故述往事思來者乃如左邱明無目孫子斷足終不可用退論書䇿以舒其憤思埀空文以自見僕竊不遜近自託於無能之辭網羅天下放失舊聞考之行事稽其成敗興壞之理凡百三十篇亦欲以究天人之際通古今之變成一家之言草創未就適會此禍惜其不成是以就極刑而無愠色僕誠已著此書藏之名山傳之其人通邑大都則僕償前辱之責雖萬被戮豈有悔哉然此可為智者道難為俗人言也且負下未易居下流多謗議僕以口語遇遭此禍徒重為鄉黨戮笑汙辱先人亦何靣目復上父母之邱墓乎雖纍百世垢彌甚耳是以腸一日而九廽居則忽忽若有所亡出則不知其所往每念斯耻汗未嘗不發背霑衣也身直為閨閣之臣寧得自引深藏於巖冗邪故且從俗浮湛與時俯仰以通其狂惑今少卿乃教以推賢進士無乃與僕之私指謬乎今雖欲自雕瑑曼辭以自解無益於俗不信秪取辱耳要之死日然後是非乃定書不能盡意故略陳固陋遷既死後其書稍出宣帝時遷外孫平通侯楊惲祖述其書遂宣布焉至王莽時求封遷後為史通子嚴助會稽吳人嚴夫子子也或言族家子也郡舉賢良對䇿百餘人武帝善助對繇是獨擢助為中大夫後得朱買臣吾邱夀王司馬相如主父偃徐樂嚴安東方朔枚臯膠倉終軍嚴蔥竒等並在左右是時征伐四夷開置邊郡軍旅數發內改制度朝廷多事婁舉賢良文學之士公孫𢎞起徒步數年至丞相開東閣延賢人與謀議朝覲奏事因言國家便宜上令助等與大臣辨論中外相應以義理之文大臣數詘其尤親幸者東方朔枚臯嚴助吾邱夀王司馬相如相如常稱疾避事朔臯不根持論上頗俳優畜之唯助與夀王見任用而助最先進建元三年閩越舉兵圍東甌東甌告急於漢時武帝年未二十以問大尉田蚡蚡以為越人相攻擊其常事又數反覆不足煩中國往救也自秦時棄不屬於是助詰蚡曰特患力不能救德不能覆誠能何故棄之且秦舉咸陽而棄之何但越也今小國以窮困來告急天子不振尚安所訴又何以子萬國乎上曰太尉不足與計吾新即位不欲出虎符發兵郡國乃遣助以節發兵會稽會稽守欲距法不為發助乃斬一司馬諭意指遂發兵浮海救東甌未至閩越引兵罷後三嵗閩越復興兵擊南越南越守天子約不敢擅發兵而上書以聞上多其義大為發興遣兩將軍將兵誅閩越淮南王安上書諌曰陛下臨天下布德施惠緩刑罰薄賦斂哀鰥寡恤孤獨飬耆老振乏匱盛德上隆和澤下洽近者新附逺者懷德天下懾然人安其生自以沒身不見兵革今聞有司舉兵將以誅越臣安竊為陛下重之越方外之地削髮文身之民也不可以冠帶之國法度理也自三代之盛胡越不與受正朔非強弗能服威弗能制也以為不居之地不牧之民不足以煩中國也故古者封內甸服封外侯服侯衛賔服蠻夷要服戎狄荒服逺近藝異也自漢初定已來七十二年吳越人相攻擊者不可勝數然天子未嘗舉兵而入其地也臣聞越非有城郭邑里也處溪谷之間篁竹之中習於水鬬便於用舟地深昧而多水險中國之人不知其藝阻而入其地雖百不當其一得其地不可郡縣也攻之不可暴取也以地圖察其山川要塞相去不過寸數而間獨數百千里阻險林叢弗能盡著視之若易行之甚難天下賴宗廟之靈方內大寧戴白之老不見兵革民得夫婦相守父子相保陛下之德也越人名為藩臣貢酎之奉不輸大內一卒之用不給上事自相攻擊而陛下發兵救之是反以中國而勞蠻夷也且越人愚戇輕薄負約反覆其不用天子之法度非一日之積也一不奉詔舉兵誅之臣恐後兵革無時得息也間者數年嵗比不登民待賣爵贅子以接衣食賴陛下德澤振救之得毋轉死溝壑四年不登五年復蝗民生未復今發兵行數千里資衣糧入越地輿轎而隃領拖舟而入水行數百千里夾以深林叢竹水道上下擊石林中多蝮蛇猛獸夏月暑時歐泄霍亂之病相隨屬也曾未施兵接創死傷者必衆前時南海王反陛下先臣使將軍間忌將兵擊之以其軍降處之上淦後復反會天暑多雨樓船卒水居擊棹未戰而疾死者過半親老涕泣孤子謕號破家散業迎尸千里之外裹骸骨而歸悲哀之氣數年不息長老至今以為記曾未入其地而禍已至此矣臣聞軍旅之後必有凶年言民之各以其愁苦之氣薄隂陽之和感天地之精而災氣為之生也陛下德配天地明象日月恩至禽獸澤及草木一人有飢寒不終其天年而死者為之悽愴於心今方內無狗吠之警而使陛下甲卒死亡暴露中原霑漬山谷邊境之民為之早閉晏開鼂不及夕臣安竊為陛下重之不習南方地形者多以越為人衆兵強能難邊城淮南全國之時多為邊吏臣竊聞之與中國異限以髙山人迹所絶車道不通天地所以隔內外也其入中國必下領水領水之山峭峻漂石破舟不可以大船載食糧下也越人欲為變必先田餘千界中積食糧乃入伐材治船邊城守候誠謹越人有入伐材者輒收捕焚其積聚雖百越奈邊城何且越人綿力薄材不能陸戰又無車騎弓弩之用然而不可入者以保地險而中國之人不能其水土也臣聞越甲卒不下數十萬所以入之五倍乃足挽車奉餉者不在其中南方暑溼近夏疸熱暴露水居蝮蛇蠚生疾癘多作兵未血創而病死者什二三雖舉越國而虜之不足以償所亡臣聞道路言閩越王弟甲弒而殺之甲以誅死其民未有所屬陛下若欲來內處之中國使重臣臨存施德埀賞以招致之此必攜幼扶老以歸聖德若陛下無所用之則繼其絶世存其亡國建其王侯以為畜越此必委質為藩臣世共貢職陛下以方寸之印丈二之組填撫方外不勞一卒不頓一戟而威德並行今以兵入其地此其震恐以有司為欲屠滅之也必雉兔逃入山林險阻背而去之則復相羣聚留而守之歷嵗經年則士卒罷倦食糧乏絶男子不得耕稼樹種婦人不得紡績織絍丁壯從軍老弱轉餉居者無食行者無糧民苦兵事亡逃者必衆隨而誅之不可勝盡盜賊必起臣聞長老言秦之時嘗使尉屠雎擊越又使監祿鑿渠通道越人逃入深山林叢不可得攻留軍屯守空地曠日持久士卒勞倦越出擊之秦兵大破乃發適戍以備之當此之時外內騷動百姓靡敝行者不還往者莫反皆不聊生亡逃相從羣為盜賊於是山東之難始興此老子所謂師之所處荆棘生之者也兵者凶事一方有急四靣皆從臣恐變詐之生姦邪之作由此始也周易曰髙宗伐鬼方三年而克之鬼方小蠻夷髙宗殷之盛天子也以盛天子伐小蠻夷三年而後克言用兵之不可不重也臣聞天子之兵有征而無戰言莫敢校也如使越人蒙死徼幸以逆執事之顔行厮輿之卒有一不備而歸者雖得越王之首臣猶竊為大王羞之陛下以四海為境九州為家八藪為囿江漢為池生民之屬皆為臣妾人徒之衆足以奉千官之共租稅之收足以給乘輿之御玩心神明秉執聖道負黼扆馮玉几南靣而聼斷號令天下四海之內莫不響應陛下埀德惠以覆露之使元元之民安生樂業則澤被萬世傳之子孫施之無窮天下之安猶泰山而四維之也夷狄之地何足以為一日之間而煩汗馬之勞乎詩曰王猶允塞徐方既來言王道甚大而逺方懷之也臣聞之農夫勞而君子養焉愚者言而智者擇焉臣安幸得為陛下守藩以身為鄣蔽人臣之任也邊境有警愛身之死而不畢其愚非忠臣也臣安竊恐將吏之以十萬之師為一使之任也是時漢兵遂出未踰領適會閩越王弟餘善殺王以降漢兵罷上嘉淮南王之意美將卒之功乃令嚴助諭意風指於南越南越王頓首曰天子乃幸興兵誅閩越死無以報即遣太子嬰齊隨助入侍助還天子又使助諭淮南王以發兵之指及閩王隕命南越委質事效於是淮南王謝曰雖湯伐桀文王伐崇誠不過此臣安妄以愚意狂言陛下不忍加誅使使者臨詔臣安以所不聞誠不勝厚幸助由是與淮南王相結而還上大説助侍燕從容上問助居鄉里時助對曰家貧為友壻富人所辱上問所欲對願為會稽太守於是拜為會稽太守數年不聞問賜書曰制詔會稽太守君厭承明之廬勞侍從之事懷故土出為郡吏會稽東接於海南近諸越北枕大江間者闊焉久不聞問具以春秋對毋以蘇秦從橫助恐上書謝稱春秋天王出居于鄭不能事母故絶之臣事君猶子事父母也臣助當伏誅陛下不忍加誅願奉三年計最詔許因留侍中有竒異輒使為文及作賦頌數十篇後淮南王來朝厚賂遺助交私論議及淮南王反事與助相連上薄其罪欲勿誅廷尉張湯爭以為助出入禁門腹心之臣而外與諸侯交私如此不誅後不可治助竟棄市朱買臣字翁子吳人也家貧好讀書不治産業常艾薪樵賣以給食擔束薪行且誦書其妻亦負戴相隨數止買臣毋歌嘔道中買臣愈益疾歌妻羞之求去買臣笑曰我年五十當富貴今已四十餘矣女苦日久待我富貴報女功妻恚怒曰如公等終餓死溝中耳何能富貴買臣不能留即聼去其後買臣獨行歌道中負薪墓間故妻與夫家俱上冢見買臣飢寒呼飯飲之後數嵗買臣隨上計吏為卒將重車至長安詣闕上書書久不報待詔公車糧用乏上計吏卒更乞丐之會邑子嚴助貴幸薦買臣召見説春秋言楚詞帝甚説之拜買臣為中大夫與嚴助俱侍中是時方築朔方公孫𢎞諌以為罷敝中國上使買臣難詘𢎞語在𢎞傳後買臣坐事免久之召待詔是時東越數反覆買臣因言故東越王居保泉山一人守險千人不得上今聞東越王更徙處南行去泉山五百里居大澤中今發兵浮海直指泉山陳舟列兵席卷南行可破滅也上拜買臣會稽太守上謂買臣曰富貴不歸故鄉如衣繡夜行今子何如買臣頓首辭謝詔買臣到郡治樓船備糧食水戰具須詔書到軍與俱進初買臣免待詔常從會稽守邸者寄居飯食拜為太守買臣衣故衣懷其印綬步歸郡邸直上計時會稽吏方相與羣飲不視買臣買臣入室中守邸與共飲食食且飽少見其綬守邸怪之前引其綬視其印會稽太守章也守邸驚出語上計掾吏皆醉大呼曰妄誕耳守邸曰試來視之其故人素輕買臣者入視之還走疾呼曰實然坐中驚駭白守丞相推排陳列中庭拜謁買臣徐出戶有頃長安廄吏乘駟馬車來迎買臣遂乘傳去會稽聞太守且至發民除道縣長吏並送迎車百餘乘入吳界見其故妻妻夫治道買臣駐車呼令後車載其夫妻到太守舍置園中給食之居一月妻自經死買臣乞其夫錢令葬悉召見故人與飲食諸嘗有恩者皆報復焉居嵗餘買臣受詔將兵與橫海將軍韓説等俱擊破東越有功徴入為主爵都尉列於九卿數年坐法免官復為丞相長史張湯為御史大夫始買臣與嚴助俱侍中貴用事湯尚為小吏趨走買臣等前後湯以廷尉治淮南獄排陷嚴助買臣怨湯及買臣為長史湯數行丞相事知買臣素貴故陵折之買臣見湯坐牀上弗為禮買臣深怨常欲死之後遂告湯隂事湯自殺上亦誅買臣買臣子山拊官至郡守右扶風吾邱夀王字子贛趙人也年少以善格五召待詔詔使從中大夫董仲舒受春秋髙材通明遷侍中中郎坐法免上書謝罪願養馬黃門上不許後願守塞扞冦難復不許久之上疏願擊胸奴詔問狀夀王對良善復召為郎稍遷會東都盜賊起拜為東郡都尉上以夀王為郎尉不復置太守是時軍旅數發年嵗不登多盜賊詔賜夀王璽書曰子在朕前之時知略輻湊以為天下少雙海內寡二及至連十餘城之守任四千石之重職事並廢盜賊從橫甚不稱在前時何也夀王謝罪因言其狀後徴入為光祿大夫侍中丞相公孫𢎞奏言民不得挾弓弩十賊彍弩百吏不敢前盜賊不輒伏辜免脫者衆害寡而利多此盜賊所以蕃也禁民不得挾弓弩則盜賊執短兵短兵接則衆者勝以衆吏捕寡賊其藝必得盜賊有害無利則莫犯法刑錯之道也臣愚以為禁民毋得挾弓弩便上下其議夀王對曰臣聞古者作五兵非以相害以禁暴討邪也安居則以制猛獸而備非常有事則以設守衛而施行陳及周室衰微上無明主諸侯力政強侵弱衆暴寡海內抏盡也敝巧詐並生是以智者陷愚勇者威怯茍以得勝為務不顧義理故機變械飾所以相賊害之具不可勝數於是秦兼天下廢王道立私議滅詩書而首法令去仁恩而任刑戮隳名城殺豪桀銷甲兵折鋒創其後民以耰鋤箠挺相撻擊犯法滋衆盜賊不勝至於赭衣塞路羣盜滿山卒以亂亡故聖王務教化而省禁防知其不足恃也陛下昭明德建太平舉俊才興學官三公有司或由窮巷起白屋裂地而封宇內日化方外嚮風然盜賊猶有者郡國二千石之罪非挾弓弩之過也禮曰男子生桑弧蓬矢以舉之明示有事也孔子曰吾何執執射乎大射之禮自天子降及庶人三代之道也詩云大侯既抗弓矢斯張射夫既同獻爾發功言貴中也愚聞聖王合射以明教矣未聞弓矢之為禁也且所為禁者為盜賊之以攻奪也攻奪之罪死然而不止者大姦之於重誅固不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁是擅賊威而奪民救也竊以為無益於禁姦而廢先王之典使學者不得習行其禮大不便書奏上以難丞相𢎞𢎞詘服焉及汾隂得寶鼎武帝嘉之薦見宗廟藏於甘泉宫羣臣皆上夀賀曰陛下得周鼎夀王獨曰非周鼎上聞之召而問之曰今朕得周鼎羣臣皆以為然夀王獨以為非何也有説則可無説則死夀王對曰臣安敢無説臣聞周德始乎后稷長於公劉大於太王成於文武顯於周公德澤上昭天下漏泉無所不通上天報應鼎為周出故名曰周鼎今漢自髙祖繼周亦昭德顯行布恩施惠六合和同至於陛下恢廓祖業功德愈盛天瑞並至珍祥畢見秦始皇親出鼎於彭城而不能得天祚有德而寶鼎自出此天之所以與漢乃漢寶非周寶也上曰善羣臣皆稱萬嵗是日賜夀王黃金十斤後坐事誅主父偃齊國臨災人也學長短從橫術晚乃學易春秋百家之言遊齊諸子間諸儒生相與排擯不容於齊家貧假貣無所得北遊燕趙中山皆莫能厚客甚困以諸侯莫足遊者元光元年乃入關見衛將軍衛將軍數言上上不省資用乏留久諸侯賔客多厭之乃上書闕下朝奏暮召入見所言九事其八事為律令一事諫伐胸奴曰臣聞明主不惡切諫以博觀忠臣不避重誅以直諌是故事無遺䇿而功流萬世今臣不敢隱忠避死以效愚計願陛下幸赦而少察之司馬法曰國雖大好戰必亡天下雖平忘戰必危天下既平天子大愷春搜秋獮諸侯春振旅秋治兵所以不忘戰也且怒者逆德也兵者凶器也爭者末節也古之人君一怒必伏尸流血故聖王重行之夫務戰勝窮武事未有不悔者也昔秦皇帝任戰勝之威蠶食天下并吞六國海內為一功齊三代務勝不休欲攻胸奴李斯諌曰不可夫胸奴無城郭之居委積之守遷徙鳥舉難得而制輕兵深入糧食必絶運糧以行重不及事得其地不足以為利得其民不可調而守也勝必棄之非民父母靡敝中國甘心胸奴非完計也秦皇帝不聼遂使蒙恬將兵而攻胡郤地千里以河為境地固澤鹵不生五榖然後發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不能踰河而北是豈人衆之不足兵革之不備哉其藝不可也又使天下飛芻挽粟起於黃腄琅邪負海之郡轉輸北河率三十鍾而致一石男子疾耕不足於糧餉女子紡績不足於帷幕百姓靡敝孤寡老弱不能相養道死者相望蓋天下始叛也及至髙皇帝定天下略地於邊聞胸奴聚代谷之外而欲擊之御史成諌曰不可夫胸奴獸聚而鳥散從之如搏景今以陛下盛德攻胸奴臣竊危之髙帝不聼遂至代谷果有平城之圍髙帝悔之乃使劉敬往結和親然後天下亡干戈之事故兵法曰興師十萬日費千金秦常積衆數十萬人雖有覆軍殺將係虜單于適足以結怨深讎不足以償天下之費夫胸奴行道侵歐所以為業天性固然上自虞夏殷周固不程督禽獸畜之不比為人夫不上觀虞夏殷周之統而下循近世之失此臣之所以大恐百姓所疾苦也且夫兵久則變生事苦則慮易使邊境之民靡敝愁苦將吏相疑而外市故尉他章邯得成其私而秦政不行權分二子此得失之效也故周書曰安危在出令存亡在所用願陛下熟計之而加察焉是時徐樂嚴安亦俱上書言世務書奏上召見三人謂曰公皆安在何相見之晚也乃拜偃樂安皆為郎中偃數上疏言事遷謁者中郎中大夫嵗中四遷偃説上曰古者諸侯地不過百里強弱之形易制今諸侯或連城數十地方千里緩則驕奢易為淫亂急則阻其強而合從以逆京師今以法割削則逆節萌起前日鼂錯是也今諸侯子弟或十數而適嗣代立餘雖骨肉無尺地之封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以德施實分其國必稍自銷弱矣於是上從其計又説上曰茂陵初立天下豪桀兼并之家亂衆民皆可徙茂陵內實京師外銷姦猾此所謂不誅而害除上又從之尊立衛皇后及發燕王定國隂事偃有功焉大臣皆畏其口賂遺纍千金或説偃曰大橫偃曰臣結髮遊學四十餘年身不得遂親不以為子昆弟不收賔客棄我我厄日久矣丈夫生不五鼎食死則五鼎烹耳吾日暮故倒行逆施之偃盛言朔方地肥饒外阻河蒙恬築城以逐胸奴內省轉輸戍漕廣中國滅胡之本也上覽其説下公卿議皆言不便公孫𢎞曰秦時嘗發三十萬衆築北河終不可就已而棄之朱買臣難詘𢎞遂置朔方本偃計也元朔中偃言齊王內有淫失之行上拜偃為齊相至齊遍召昆弟賔客散五百金豫之數曰始吾貧時昆弟不我衣食賔客不我內門今吾相齊諸君迎我或千里吾與諸君絶矣毋復入偃之門乃使人以王與姊姦事動王王以為終不得脫恐效燕王論死乃自殺偃始為布衣時嘗遊燕趙及其貴發燕事趙王恐其為國患欲上書言其隂事為居中不敢發及其為齊相出關即使人上書告偃受諸侯金以故諸侯子多以得封者及齊王以自殺聞上大怒以為偃劫其王令自殺乃徴下吏治偃服受諸侯之金實不劫齊王令自殺上欲勿誅公孫𢎞爭曰齊王自殺無後國除為郡入漢偃本首惡非誅偃無以謝天下乃遂族偃偃方貴幸時客以千數及族死無一人視獨孔車收葬焉上聞之以孔車為長者徐樂燕郡無終人也上書曰臣聞天下之患在於土崩不在瓦解古今一也何謂土崩秦之末世是也陳涉無千乘之尊尺土之地身非王公大人名族之後鄉曲之譽非有孔曾墨子之賢陶朱猗頓之富也然起窮巷奮棘矜偏袒大呼天下從風此其故何也由民困而主不恤下怨而上不知俗已亂而政不修此三者陳涉之所以為資也此之謂土崩故曰天下之患在乎土崩何謂瓦解吳楚齊趙之兵是也七國謀為大逆號皆稱萬乘之君帶甲數十萬威足以嚴其境內財足以勸其士民然不能西攘尺寸之地而身為禽於中原者此其故何也非權輕於匹夫而兵弱於陳涉也當是之時先帝之德未衰而安土樂俗之民衆故諸侯無境外之助此之謂瓦解故曰天下之患不在瓦解由此觀之天下誠有土崩之藝雖布衣窮處之士或首難而危海內陳涉是也况三晉之君或存乎天下雖未治也誠能無土崩之藝雖有強國徑兵不得還踵而身為禽吳楚是也况羣臣百姓能為亂乎此二體者安危之明要賢主之所留意而深察也間者關東五榖數不登年嵗未復民多窮困重之以邊境之事推數循理而觀之民宜有不安其處者矣不安故易動民動者土崩之藝也故賢主獨觀萬化之原明於安危之機修之廟堂之上而銷未形之患也其要期使天下無土崩之藝而已故雖有強國徑兵陛下逐走獸射飛鳥𢎞遊燕之囿淫從恣之觀極馳騁之樂自若金石絲竹之聲不絶於耳帷幄之私俳優朱儒之笑不乏於前而天下無宿憂名何必夏子俗何必成康雖然臣竊以為陛下天然之質寬仁之資而誠以天下為務則禹湯之名不難侔而成康之俗未必不復興也此二體者立然後處尊安之實揚廣譽於當世親天下而服四夷餘恩遺德為數世隆南靣背依攝袂而揖王公此陛下之所服也臣聞圖王不成其敝足以安安則陛下何求而不得何威而不成奚征而不服哉嚴安臨災人也以故丞相史上書曰臣聞之鄒子曰政教文質者所以云救也故守一而不變者未睹治之至也今天下人民用財侈靡車馬衣裘宫室皆競修飾離本徼末姦軌浸長犯法者衆夫佳麗珍怪固順於耳目之欲然養失而泰樂失而淫禮失而采教失而偽偽采淫泰非所以範民之道也臣願為民制度以防其淫以和其心心既和平其性恬安恬安不營則盜賊銷盜賊銷則刑罰少刑罰少則隂陽和四時正風雨時草木暢茂五榖蕃熟六畜遂字民不夭厲和之至也臣聞周有天下其治三百餘嵗及其衰也亦三百餘年故五伯更起伯者常佐天子匡正海內五伯既沒諸侯恣行是以田常篡齊六卿分晉並為戰國合從連衡車馳轂擊介胄生蟣蝨民無所告訴及至秦王并吞天下號稱皇帝壞諸侯之城銷其兵鑄以為鐘虡示不復用黎民得免於戰國人人自以為更生鄉使秦緩刑罰薄賦斂省繇役貴仁義賤權利上篤厚下佞巧變風易俗化於海內則世世必安矣秦不行是風循其故俗法令嚴苛意廣心逸欲威海外使蒙恬將兵以北攻強胡辟地進境戍於北河飛芻挽粟以隨其後又使尉屠雎將樓船之士攻越使監祿鑿渠運糧深入越地越人遁逃曠日持久糧食乏絶越人擊之秦兵大敗秦乃使尉他將卒以戍越當是時秦禍北構於胡南挂於越宿兵於無用之地進而不得退行十餘年丁男被甲丁女轉輸苦不聊生自經於道樹死者相望及秦皇帝崩天下大畔陳勝吳廣舉陳武臣張耳舉趙項梁舉吳田儋舉齊景駒舉郢周市舉魏韓廣舉燕窮山通谷豪士並起不可勝載也然本皆非公侯之後非長官之吏無尺寸之藝起閭巷杖棘矜應時而動不謀而俱起不約而同會壤長地進至乎伯王時教使然也秦貴為天子富有天下滅世絶祀窮兵之禍也故周失之弱秦失之強不變之患也今徇南夷朝夜郎降羌僰略薉州建城邑深入胸奴燔其龍城議者美之此人臣之利非天下之長䇿也今中國無狗吠之警而外纍於逺方之備靡敝國家非所以子民也行無窮之欲甘心快意結怨於胸奴非所以安邊也禍拏而不解兵休而復起近者愁苦逺者驚駭非所以持久也今天下煆甲摩劒矯箭控弦轉輸軍糧未見休時此天下所共憂也夫兵久而變起事煩而慮生今外郡之地或幾千里列城數十形束壞制帶脅諸侯非宗室之利也上觀齊晉所以亡公室卑削六卿大盛也下覽秦之所以滅刑嚴文刻欲大無窮也今郡守之權非特六卿之重也地幾千里非特閭巷之資也甲兵器械非特棘矜之用也以逄萬世之變則不可勝諱也後以安為騎馬令終軍字子雲濟南人也少好學以辨博能屬文聞於郡中年十八選為博士弟子至府受遣太守聞其有異材召見軍甚竒之與交結軍揖太守而去至長安上書言事武帝異其文拜為謁者給事中從上幸雍祠祀五畤獲白麟一角五蹄時又得竒木其枝旁出輒復合於木上上異此二物博謀羣臣軍上對曰臣聞詩頌君德樂舞后功異經而同指明盛德之所隆也南越竄屛葭葦與鳥魚羣正朔不及其俗有司臨境而東甌內附閩王伏辜南越賴救北胡隨畜薦居禽獸行虎狼心上古未能攝大將軍秉鉞單于奔幕驃騎抗旌昆邪右衽是澤南洽而威北暢也若罰不阿近舉不遺逺設官俟賢縣賞待功能者進以保祿罷者退而勞力刑於宇內矣履衆美而不足懷聖明而不專建三宮之文質章厥職之所宜封禪之君無聞焉夫天命初定萬事草創及臻六合同風九州共貫必待明聖潤色祖業傳於無窮故周至成王然後制定而休徴之應見陛下盛日月之光埀聖思於勒成專神明之敬奉燔瘞於郊宫獻享之精交神積和之氣塞明而異獸來獲宜矣昔武王中流未濟白魚入於王舟俯取以燎羣公咸曰休哉今郊祀未見於神祗而獲獸以饋此天之所以示饗而上通之符合也宜因昭時令日改定告元苴白茅於江淮發嘉號于營邱以應緝熙使著事者有紀焉蓋六鶂退飛逆也白魚登舟順也夫明暗之徴上亂飛鳥下動淵魚各以類推今野獸并角明同本也衆支內附示無外也若此之應殆將有解編髮削左衽襲冠帶要衣裳而蒙化者焉斯拱而俟之耳對奏上甚異之由是改元為元狩後數月越地及胸奴名王有率衆來降者時皆以軍言為中元鼎中博士徐偃使行風俗偃矯制使膠東魯國鼓鑄鹽鐵還奏事徙為太常丞御史大夫張湯劾偃矯制大害法至此偃以為春秋之義大夫出疆有可以安社稷存萬民顓之可也湯以致其法不能詘其義有詔下軍問狀軍詰偃曰古者諸侯國異俗分百里不通時有聘會之事安危之藝呼吸成變故有不受辭造命顓已之宜今天下為一萬里同風故春秋王者無外偃巡封域之中稱以出疆何也且鹽鐵郡有餘藏正二國廢國家不足以為利害而以安社稷存萬民為辭何也又詰偃膠東南近琅邪北接北海魯國西枕泰山東有東海受其鹽鐵偃度四郡口數田地率其用器食鹽不足以并給二郡邪將藝宜有餘而吏不能也何以言之偃矯制而鼓鑄者欲及春耕種贍民器也今魯國之鼓當先具其備至秋乃能舉火此言與實反者非偃已前三奏無詔不惟所為不許而直矯作威福以從民望干名采譽此明聖之所必加誅也枉尺直尋孟子稱其不可今所犯罪重所就者小偃自豫必死而為之邪將幸誅不加欲以采名也偃窮詘服罪當死軍奏偃矯制顓行非奉使體請下御史徴偃即罪奏可上善其詰有詔示御史大夫初軍從濟南當詣博士步入關關吏豫軍繻軍問以此何為吏曰為復傳還當以合符軍曰大丈夫西遊終不復傳還棄繻而去軍為謁者使行郡國建節東出關關吏識之曰此使者乃前棄繻生也軍行郡國所見便宜以聞還奏事上甚説當發使使胸奴軍自請曰軍無橫草之功得列宿衛食祿五年邊境時有風塵之警臣宜被堅執鋭當矢石啓前行下郎反駑下不習兵革之事今聞將遣胸奴使者臣願盡精厲氣奉佐眀使畫吉凶於單于之前臣年少材下孤於外官不足以亢一方之任竊不勝憤悶詔問畫吉凶之狀上竒軍對擢為諌大夫南越與漢和親乃遣軍使南越説其王欲令入朝比內諸侯軍自請願受長纓必羈南越王而致之闕下軍遂往説越王越王聼許請舉國內屬天子大説賜南越王大臣印綬一用漢法以新改其俗令使者填撫之越相呂嘉不欲內屬發兵攻殺其王及漢使者皆死語在南越傳軍死時年二十餘故世謂之終童王褒字子淵蜀人也宣帝時修武帝故事講論六藝羣書博盡竒異之好徴能為楚辭九江被公召見誦讀益召髙材劉向張子僑華龍柳褒等待詔金馬門神爵五鳯之間天下殷富數有嘉應上頗作歌詩欲興協律之事丞相魏相奏言知音善鼓雅琴者渤海趙定梁國龔德皆召見待詔於是益州刺史王襄欲宣風化於衆庶聞王褒有俊材請與相見使褒作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之時汜鄉侯何武為僮子選在歌中久之武等學長安歌太學下轉而上聞宣帝召見武等觀之皆賜帛謂曰此盛德之事吾何以當之褒既為刺史作頌又作其傳益州刺史因奏褒有軼材上乃徴褒既至詔褒為聖主得賢臣頌其意褒對曰夫荷旃被毳者難與道純綿之麗密羹藜含糗者不足與論太牢之滋味今臣辟在西蜀生於窮巷之中長於蓬茨之下無有遊觀廣覽之知顧有至愚極陋之纍不足以塞厚望應眀指雖然敢不略陳愚而抒情素記曰共惟春秋法五始之要在乎審已正統而已夫賢者國家之器用也所任賢則趨舍省而功施普器用利則用力少而就效衆故工人之用鈍器也勞筋苦骨終日矻矻及至巧冶鑄干將之朴清水焠其鋒越砥斂其咢水斷蛟龍陸剸犀革忽若彗汜畫塗如此則使離婁督繩公輸削墨雖崇臺五增延袤百丈而不溷者工用相得也庸人之御駑馬亦傷吻敝䇿而不進於行胸喘膚汗人極馬倦及至駕齧膝驂乘旦王良執靶韓哀附輿縱馳騁騖忽如景靡過都越國蹶如歷塊追奔電逐遺風周流八極萬里一息何其遼哉人馬相得也故服絺綌之涼者不苦盛暑之鬱燠襲貂狐之暖者不憂至寒之悽愴何則有其具者易其備賢人君子亦聖王之所以易海內也是以嘔喻受之開寬裕之路以延天下英俊也夫竭知附賢者必建仁䇿索人求士者必樹伯迹昔周公躬吐握之勞故有圉空之隆齊桓設庭燎之禮故有匡合之功由此觀之君人者勤於求賢而逸於得人人臣亦然昔賢者之未遭遇也圖事揆䇿則君不用其謀陳見悃誠則上不然其信進仕不得施效斥逐又非其愆是故伊尹勤於鼎爼太公困於鼓刀百里自鬻寧子飯牛離此患也及其遇眀君遭聖主也運籌合上意諌諍即見聼進退得關其忠任職得行其術去卑辱奧泄而升本朝離疏釋蹻而享膏粱剖符錫壤而光祖考傳之子孫以資説士故世必有聖知之君而後有賢眀之臣故虎嘯而風冽龍興而致雲蟋蟀俟秋吟蜉蝤出以隂易曰飛龍在天利見大人詩曰思皇多士生此王國故世平主聖俊乂將自至若堯舜禹湯文武之君獲稷契臯陶伊尹呂望眀眀在朝穆穆布列聚精會神相得益章雖伯牙操遞鍾逄門子彎烏號猶未足以喻其意也故聖王必待賢臣而𢎞功業俟士亦俟眀主以顯其德上下俱欲歡然交欣千載一合論説無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑其得意若此則胡禁不止曷令不行化溢四表橫被無窮遐夷貢獻萬祥畢臻是以聖王不遍窺望而視已眀不單傾耳而聼已聰恩從祥風翺德與和氣遊太平之責塞優遊之望得遵遊自然之勢恬淡無為之場休徴自至夀考無疆雍容埀拱永永萬年何必偃仰詘信若彭祖詬噓呼吸如僑松眇然絶俗離世哉詩云濟濟多士文王以寧蓋信乎其以寧也是時上頗好神仙故褒對及之上令褒與張子僑等並待詔數從褒等放獵所幸宫館輒為歌頌第其髙下以差賜帛議者多以為淫靡不急上曰不有博奕者乎為之猶賢乎已辭賦大者與古詩同義小者辨麗可喜辟如女工有綺縠音樂有鄭衛今世俗猶皆以此虞説耳目辭賦比之尚有仁義風諭鳥獸草木多聞之觀賢於倡優博奕逺矣頃之擢褒為諫大夫其後太子體不安若忽忽善忘不樂詔使褒等皆之太子宫虞侍太子朝夕誦讀竒文及所自造作疾平復乃歸太子喜褒所為甘泉及洞簫頌令後宫貴人左右皆誦讀之後方士言益州有金馬碧雞之寶可祭祀致也宣帝使褒往祀焉褒於道病死上閔惜之賈捐之字君房賈誼之曾孫也元帝初即位上疏言得失召待詔金門初武帝征南越元封元年立儋耳珠崖郡皆在南方海中洲居廣袤可千里合十六縣戶二萬三千餘其民暴惡自以阻絶數犯吏禁吏亦酷之率數年一反漢輒擊定之自初為郡至昭帝始元初二十餘年間凡六反至五年罷儋耳郡并屬珠崖至宣帝神爵三年珠崖三縣復反反後七年甘露元年九縣反輒發兵擊定之元帝初元元年珠崖又反發兵擊之諸縣更叛連年不定上與有司議大發軍捐之建議以為不當擊上使侍中駙馬都尉樂昌侯王商詰問捐之曰珠崖內屬為郡久矣今背畔逆莭而云不當擊長蠻夷之亂虧先帝功德經義何以處之捐之對曰臣幸遭眀盛之朝蒙危言之䇿無忌諱之患敢昧死竭卷卷臣聞堯舜聖之盛者也禹入聖域而不優故孔子稱堯曰大哉韶曰盡善禹曰無間以三聖之德地方不過數千里西被流沙東漸于海朔南暨聲教迄于四海欲與聲教則治之不欲與者不強治也故君臣歌德含氣之物各得其宜武丁成王殷周之大仁也然地東不過江黃西不過氐羌南不過蠻荆北不過朔方是以頌聲並作視聼之類咸樂其生越裳氏重九譯而獻此非兵革之所能致及其衰也南征不還齊桓救其難孔子定其文以至于秦興兵逺攻貪外虛內務欲廣地不慮其害然地南不過閩越北不過太原而天下潰畔禍卒在於二世之末長城之歌至今未絶賴聖漢初興為百姓請命平定天下至孝文皇帝閔中國未安偃武修文則斷獄數百民賦四十丁男三年而一事時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里師行三十里朕乘千里之馬獨先安之於是還馬與道里費而下詔曰朕不受獻也其令四方毋求來獻當此之時逸遊之樂絶竒麗之賂塞鄭衛之倡微矣夫後宫盛色則賢者隱處佞人用事則諍臣杜口而文帝不行故諡為孝文廟稱太宗孝武皇帝元狩六年太倉之粟紅朽而不可食都內之錢貫朽而不可校乃探平城之事録冒頓以來數為邊害籍兵厲馬因富民以攘服之西連諸國至于安息東過碣石以元菟樂浪為郡北郤胸奴萬里更起營塞制南海以為八郡則天下斷獄萬數民賦數百造鹽鐵酒𣙜之利以佐用度猶不能足當此之時冦賊並起軍旅數發父戰死於前子鬭傷於後女子乘亭障孤兒號於道老母寡婦飲泣巷哭遙設虛祭想魂乎萬里之外淮南王盜寫虎符隂聘名士關東公孫勇等詐為使者是皆廓地泰大征伐不休之故也今天下獨有關東關東大者獨有齊楚民衆久困連年流離離其城郭相枕席於道路人情莫親父母莫樂夫婦至嫁妻賣子法不能禁義不能止此社稷之憂也今陛下不忍悁悁之忿欲驅士衆擠之大海之中快心幽𡨕之地非所以救助飢饉保全元元也詩云蠢爾蠻荆大邦為讎言聖人起則後服中國衰則先畔動為國家難自古而患之久矣何况乃復其南方萬里之蠻乎駱越之人父子同川而浴相習以鼻飲與禽獸無異本不足郡縣置也顓顓獨居一海之中霧露氣溼多毒草蟲蛇水土之害人未見虜戰士自死又非獨珠崖有珠犀玳瑁也棄之不足惜不擊不損威其民譬猶魚鱉何足貪也臣切以往者羌軍言之暴師曾未一年兵出不踰千里費四十餘萬萬大司農錢盡乃以少府禁錢續之夫一隅為不善費尚如此况於勞師逺攻亡士毋功乎求之往古則不合施之當今又不便臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為願遂棄珠崖專用恤關東為憂對奏上以問丞相御史御史大夫陳萬年以為當擊丞相于定國以為前日興兵擊之連年護軍都尉校尉及丞凡十有一人還者二人卒士及轉輸死者萬人以上費用三萬萬餘尚未能盡降今關東困乏民難動搖捐之議是上乃從之乃下詔罷珠崖郡令民有慕義欲內屬便處之捐之數召見言多納用時中書令石顯用事捐之數短顯以故不得官後稀復見而長安令楊興新以材能得幸與捐之相善捐之欲得召見謂興曰京兆尹缺使我得見言君蘭京兆尹可立得興曰縣官嘗言興愈薛大夫我易助也君房下筆言語妙天下使君房為尚書令勝五鹿充宗逺甚捐之曰令我得代充宗君蘭為京兆京兆郡國首尚書百官本天下真大治士則不隔矣捐之前言平恩侯可為將軍期思侯並可為諸曹皆如言又薦謁者滿宣立為冀州刺史言中謁者不宜受事宦者不宜入宗廟立止相薦之信不當如是乎興曰我復見言君房也捐之復短石顯興曰顯鼎貴上信用之今欲進第從我計且與合意即得入矣捐之即與興共為薦顯奏曰竊見石顯本山東名族有禮義之家也持正六年未嘗有過眀習於事敏而疾見出公門入私門宜賜爵關內侯引其兄弟以為諸曹又共為薦興奏曰竊見長安令興幸得以知名數召見興事父母有曾氏之孝事師有顔閔之材榮名聞於四方眀詔舉茂材列侯以為首為長安令吏民敬鄉道路皆稱能觀其下筆屬文則董仲舒進談動辭則東方生置之諍臣則汲直用之介胄則冠軍侯施之治民則趙廣漢抱公絶私則尹翁歸興兼此六人而有之守道堅固執義不回臨大節而不可奪國之良臣也可試京兆尹石顯聞知白之上乃下興捐之獄令皇后父陽平侯禁與顯共雜治奏興捐之懷詐偽以上語相風更相薦譽欲得大位漏泄省中語罔上不道書曰讒説殄行震驚朕師王制順非而澤不聼而誅請論如法捐之竟坐棄市興減死罪一等髠鉗為城旦成帝時至部刺史東方朔字曼倩平原厭次人也武帝初即位徴天下舉方正賢良文學材力之士待以不次之位四方士多上書言得失自銜鬻者以千數其不足采者輒報聞罷朔初來上書曰臣朔少失父母長養兄嫂年十二學書三冬文史足用十五學擊劒十六學詩書誦二十二萬言十九學孫吳兵法戰陳之具鉦鼓之教亦誦二十二萬言凡臣朔固已誦四十四萬言又常服子路之言臣朔年二十二長九尺三寸目若懸珠齒若編貝勇若孟賁捷若慶忌廉若鮑叔信若尾生若此可以為天子大臣矣臣朔昧死再拜以聞朔文辭不遜髙自稱譽上偉之令待詔公車奉祿薄未得省見久之朔紿騶朱儒曰上以若曹無益於縣官耕田力作固不及人臨衆處官不能治民從軍擊虜不任兵事無益於國用徒索衣食今欲盡殺若曹朱儒大恐啼泣朔教曰上即過叩頭請罪居有頃聞上過朱儒皆號泣頓首上問何為對曰東方朔言上欲盡誅臣等上知朔多端召問朔何恐朱儒為對曰臣朔生亦言死亦言朱儒長三尺餘奉一囊粟錢二百四十臣朔長九尺餘亦奉一囊粟錢二百四十朱儒飽欲死臣朔飢欲死臣言可用幸異其禮不可用罷之無令但索長安米上大笑因使待詔金馬門稍得親近上嘗使諸數家射覆置守宫􅀢下射之皆不能中守宫蟲名也術家云以器養之食以丹砂滿七斤搗治萬杵以點女人體終身不滅若有房室之事則滅矣言可以防間淫逸故謂之守宫也今俗呼為辟宫辟亦禦扞之義耳朔自贊曰臣嘗受易請射之乃别蓍布卦而對曰臣以為龍又無角謂之為蛇又有足跂跂脈脈善緣壁是非守宫即蜥蜴跂跂行貌脈脈視貌揚雄方言云在澤者為蜥蜴蜥先歷反蜴余赤反上曰善賜帛十匹復使射他物連中輒賜帛時有幸倡郭舍人滑稽不窮常侍左右曰朔狂幸中耳非至數也臣願令朔復射朔中之臣榜百榜擊也音步行反朔不能中臣賜帛乃覆樹上寄生令朔射之朔曰是窶數也窶數戴器也以盆盛物戴於頭者則以窶數薦之今賣白團餅人所用者是也寄生者芝菌之類淋潦之日著樹而生形有周圜象窶數者今關中俗亦呼為寄生非為蔦之寄生也寓木宛童有枝葉者也故朔云著樹為寄生盆下為窶數眀其常在盆下今讀書者不曉其意謂射覆之物覆在盆下輒改前覆守宫􅀢下為盆字失之逺矣楊惲傳云鼠不容穴銜窶數也盆下之物有飲食氣故鼠銜之四股鐵鉤非所銜也舍人曰果知朔不能中也朔曰生肉為膾乾肉為脯著樹為寄生盆下為窶數上令倡監榜舍人舍人不勝痛呼謈音暴痛切而呌呼也又音步髙反朔笑之曰咄口無毛聲謷謷􅥑益髙舍人恚曰朔擅詆欺天子從官當棄市上問朔何故詆之對曰臣非敢詆之乃與為隱耳上曰隱云何朔曰夫口無毛者狗竇也聲謷謷者烏哺鷇也音口豆反烏哺子而活者故曰鷇生而自哺者曰雛􅥑益髙者鶴俯啄也俯音免啄音竹救反鳥觜舍人不服因曰臣願復問朔隱語不知亦當榜即妄為諧語曰令壺齟老柏塗伊優亞狋吽牙齟音側加反塗音丈加反亞音烏加反狋音五伊反吽音五侯反何謂也朔曰令者命也壺者所以盛也齟者齒不正也老者人所敬也柏者鬼之廷也塗者漸洳徑也伊優亞者辭未定也狋吽牙者兩犬爭也舍人所問朔應聲輒對變詐鋒出莫能窮者左右大驚上以朔為常侍郎遂得愛幸久之伏日詔賜從官肉大官亟日晏不來朔獨拔劒割肉謂其同官曰伏日當蚤歸請受賜即懷肉去大官奏之朔入上曰昨賜肉不待詔以劒割肉而去之何也朔免冠謝上曰先生起自責也朔再拜曰朔來朔來受賜不待詔何無禮也拔劒割肉一何壯也割之不多又何廉也歸遺細君又何仁也上笑曰使先生自責乃反自譽復賜酒一石肉百斤歸遺細君初建元三年微行始出北至池陽西至黃山南獵長楊東遊宜春微行常用飲酎已八九月中與侍中常侍武騎及待詔隴西北地良家子能騎射者期諸殿門故有期門之號自此始微行以夜漏下十刻乃出常稱平陽侯旦明入山下馳射鹿豕狐手格熊羆馳騖禾稼稻粳之地民皆號呼罵詈相聚會自言鄠杜令令往欲謁平陽侯諸騎欲擊鞭之令大怒使吏呵止獵者數騎見留乃示以乘輿物久之乃得去時夜出夕還後齎五日糧會朝長信宫上大歡樂之是後南山下乃知微行數出也然尚迫於太后未敢逺出丞相御史知指乃使右輔都尉徼循長楊以東右內史發小民共待會所後乃私置更衣從宣曲以南十二所中休更衣投宿諸宫長楊五柞倍陽宣曲尤幸於是上以為道逺勞苦又為百姓所患乃使太中大夫吾邱夀王與待詔能用算者二人舉籍阿城以南盩厔以東宜春以西提封頃畝及其賈直欲除以為上林苑屬之南山又詔中尉左右內史表屬縣草田欲以償鄠杜之民吾邱夀王奏事上大説稱善時朔在傍進諌曰臣聞謙遜靜慤天表之應應之以福驕溢靡麗天表之應應之以異今陛下纍郎臺恐其不髙也弋獵之處恐其不廣也如天不為變則三輔之地盡可以為苑何必盩厔鄠杜乎奢侈越制天為之變上林雖小臣尚以為大也夫南山天下之阻也南有江淮北有河渭其地從汧隴以東商雒以西厥壤肥饒漢興去三河之地止霸産以西都涇渭之南此所謂天下陸海之地秦之所以虜西戎兼山東者也而其山出玉石金銀銅鐵豫章檀柘異類之物不可勝原此百工所取給萬民所卬足也又有粳稻梨栗桑麻竹箭之饒土宜薑芋水多蛙魚貧者得以家給人足無飢寒之憂故酆鎬之間號為土膏其賈畝一金今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五榖是其不可一也且盛荆棘之林而長養麋鹿廣狐之苑大虎狼之虛又壞人冢墓發人室廬令幼弱懷土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之騎馳東西車騖南北又有深溝大渠夫一日之樂不足以危無隄之輿是其不可三也故務苑囿之大不恤農時非所以強國富人也夫殷作九市之宫而諸侯畔靈王起章華之臺而楚民散秦興阿房之殿而天下亂糞土愚臣忘生觸死逆盛意犯隆指罪當萬死不勝大願願陳泰階六符以觀天變不可不省是日因奏泰階之事上乃拜朔為太中大夫給事中賜黃金百斤然遂起上林苑如夀王所奏云久之隆慮公主子昭平君尚帝女夷安公主隆慮主病因以金千斤錢千萬為昭平君豫贖死罪上許之隆慮主卒昭平君日驕醉殺主傅獄繫內官以公主子廷尉上請請論左右人人為言前又入贖陛下許之上曰吾弟老有是一子死以屬我於是為之埀涕歎息良久曰法令者先帝所造也用弟故而誣先帝之法吾何面目入髙廟乎又下負萬民乃可其奏哀不能自止左右盡悲朔前上夀曰臣聞聖王為政賞不避仇讎誅不擇骨肉書曰不偏不黨王道蕩蕩此二者五帝所重三王所難也陛下行之是以四海之內元元之民各得其所天下幸甚臣朔奉觴昧死再拜上萬嵗夀上乃起入省中夕時召讓朔曰傳曰時然後言人不厭其言今先生上夀時乎朔免冠頓首曰臣聞樂太甚則陽溢哀太甚則隂損隂陽變則心氣動心氣動則精神散精神散而邪氣及銷憂者莫若酒臣朔所以上夀者眀陛下正而不阿因以止哀也愚不知忌諱當死先是朔嘗醉入殿中小遺殿上劾不敬有詔免為庶人待詔宦者署因此對復為中郎賜帛百匹初帝姑館陶公主號竇太主堂邑侯陳午尚之午死主寡居年五十餘矣近幸董偃始偃與母以賣珠為事偃年十三隨母出入主家左右言其姣好主召見曰吾為母飬之因留第中教書計相馬御射頗讀傳記至年十八而冠出則執轡入則侍內為人溫柔愛人以主故諸公接之名稱城中號曰董君主因推令散財交士令中府曰董君所發一日金滿百斤錢滿百萬帛滿千匹乃白之安陵袁叔者袁盎兄子也與偃善謂偃曰足下私侍漢主挾不測之罪將欲安處乎偃懼曰憂之久矣不知所以袁叔曰顧城廟逺無宿宫又有萩竹籍田足下何不白主獻長門園此上所欲也如是上知計出於足下也則安枕而卧長無慘怛之憂久之不然上且請之於足下何如偃頓首曰敬奉教入言之主主立奏書獻之上大説更名竇太主園為長門宫主大喜使偃以黃金百斤為袁叔夀叔因是為董君畫求見上之䇿令主稱疾不朝上往臨疾問所欲主辭謝曰妾幸蒙陛下厚恩先帝遺德奉朝請之禮備臣妾之儀列為公主賞賜邑入隆天重地死無以塞責一日卒有不勝灑掃之職先狗馬填溝壑竊有所恨不勝大願願陛下時忘萬事養精遊神從中掖庭回輿枉路臨妾山林得獻觴上夀娛樂左右如是而死何恨之有上曰主何憂幸得愈恐羣臣從官多大為主費上還有頃主疾愈起謁上以錢千萬從主飲後數日上臨山林主自執宰敝膝道入登階就坐坐未定上曰願謁主人翁主乃下殿去簪珥徒跣頓首謝曰妾無狀負陛下身當伏誅陛下不致之法頓首死罪有詔謝主簪履起之東箱自引董君董君緑幘傅韝隨主前伏殿下主乃贊館陶公主胞人臣偃昧死再拜謁因叩頭謝上為之起有詔賜衣冠上偃起走就衣冠主自奉食進觴當是時董君見尊不名稱為主人翁飲大歡樂主乃請賜將軍列侯從官金錢雜繒各有數於是董君貴寵天下莫不聞郡國狗馬蹴鞠劒客輻湊董氏常從遊戲北宫馳逐平樂觀雞鞠之會角狗馬之足上大歡樂之於是上為竇太主置酒宣室使謁者引內董君是時朔陛戟殿下辟戟而前曰董偃有斬罪三安得入乎上曰何謂也朔曰偃以人臣私侍公主其罪一也敗男女之化而亂婚姻之禮傷王制其罪二也陛下富於春秋方積思於六經留神於王事馳騖於唐虞折節於三代偃不遵經勸學反以靡麗為右奢侈為務盡狗馬之樂極耳目之欲行邪枉之道徑淫辟之路是乃國家之大賊人主之大蜮也偃為淫首其罪三也昔伯姬燔而諸侯憚奈何乎陛下上默然不應良久曰吾業已設飲後而自改朔曰不可夫宣室者先帝之正處也非法度之政不得入焉故淫亂之漸其變為篡是以豎貂為淫而易牙作患慶父死而魯國全管蔡誅而周室安上曰善有詔止更置酒北宫引董君從東司馬門東司馬門更名東交門賜朔黃金三十斤董君之寵由是日衰至年三十而終後數嵗竇太主卒與董君會葬於霸陵是後公主貴人多踰禮制自董偃始時天下侈靡趨末百姓多離農畝上從容問朔吾欲化民豈有道乎朔對曰堯舜禹湯文武成康上古之事經歷數千載尚難言也臣不敢陳願近述孝文皇帝之時當世耆老皆聞見之貴為天子富有四海身衣弋綈足履革舄以韋帶劒莞蒲為席兵木無刃衣緼無文集上書囊以為殿帷以道德為麗以仁義為凖於是天下望風成俗昭然化之今陛下以城中為小圖起建章左鳯闕右神明號稱千門萬戶木土衣綺繡狗馬被繢罽宫人簪玳瑁埀珠璣設戲車教馳逐飾文采叢珍怪撞萬石之鐘擊雷霆之鼓作俳優舞鄭女上為淫侈如此而欲使民獨不奢侈失農事之難者也陛下誠能用臣朔之計推甲乙之帳燔之於四通之衢却走馬示不復用則堯舜之隆宜可與比治矣易曰正其本萬事理失之毫釐差以千里願陛下留意察之朔雖詼笑然時觀察顔色直言切諌上常用之自公卿在位朔皆敖弄無所為屈上以朔口諧辭給好作問之嘗問朔曰先生視朕何如主也朔對曰自唐虞之隆成康之際未足以論當世臣伏觀陛下功德陳五帝之上在三王之右非若此而已誠得天下賢士公卿在位咸得其人矣譬若以周邵為丞相孔丘為御史大夫太公為將軍畢公髙拾遺於後辨嚴子為衛尉臯陶為大理后稷為司農伊尹為少府子贛使外國顔閔為博士子夏為太常益為右扶風季路為執金吾契為鴻臚龍逢為宗正伯夷為京兆管仲為馮翊魯般為將作仲山甫為光祿申伯為太僕延陵季子為水衡百里奚為典屬國栁下惠為大長秋史魚為司直蘧伯玉為太傅孔父為詹事孫叔敖為諸侯相子産為郡守王慶忌為期門夏育為鼎官羿為旄頭宋萬為式道候上乃大笑是時朝廷多賢材上復問朔方今公孫丞相兒大夫董仲舒夏侯始昌司馬相如吾邱夀王主父偃朱買臣嚴助汲黯膠倉終軍嚴安徐樂司馬遷之倫皆辨知閎達溢于文辭先生自視何與比哉朔對曰臣觀其臿齒牙樹頰胲吐脣吻擢項頤結股腳連脽凥遺蛇其迹行步偊旅臣朔雖不肖尚兼此數子者朔之進退淡辭皆此類也武帝既招英俊程其器能用之如不及時方外事胡越內興制度國家多事自公孫𢎞以下至司馬遷皆奉使方外或為郡國守相至公卿而朔嘗至太中大夫後常為郎與枚臯郭舍人俱在左右詼啁而已久之朔上書陳農戰強國之計因自訟獨不得大官欲求試用其言專商鞅韓非之語也指意放蕩頗復詼諧辭數萬言終不見用朔因著論設客難已用位卑以自慰諭其辭曰客難東方朔曰蘇秦張儀一當萬乘之主而都卿相之位澤及後世今子大夫修先王之術慕聖人之義諷誦詩書百家之言不可勝數著於竹帛脣腐齒落服膺而不釋好學樂道之效眀白甚矣自以智能海內無雙則可謂博聞辨智矣然悉力盡忠以事聖帝曠日持久官不過侍郎位不過執戟意者尚有遺行邪同胞之徒無所容居其故何也東方先生喟然長息仰而應之曰是固非子之所能備也彼一時也此一時也豈可同哉夫蘇秦張儀之時周室大壞諸侯不朝力政爭權相禽以兵并為十二國未有雌雄得士者強失士者亡故談説行焉身處尊位珍寶充內外有倉廩澤及後世子孫長享今則不然聖帝流德天下震懾諸侯賔服連四海之外以為帶安於覆盂動猶運之掌賢不肖何以異哉遵天之道順地之理物無不得其所故綏之則安動之則苦尊之則為將卑之則為虜抗之則在青雲之上抑之則在深泉之下用之則為虎不用則為鼠雖欲盡節效情安知前後夫天地之大士民之衆竭精談説並進輻湊者不可勝數悉力募之困於衣食或失門戶使蘇秦張儀與僕並生於今之世曾不得掌故安敢望常侍郎乎故曰時異事異雖然安可以不務修身乎哉詩云鼓鐘于宫聲聞于外鶴鳴于九臯聲聞于天茍能修身何患不榮太公體行仁義七十有二乃設用于文武得信厥説封於齊七百嵗而不絶此士所以日夜孶孶敏行而不敢怠也辟若鴒飛且鳴矣傳曰天不為人之惡寒而輟其冬地不為人之惡險而輟其廣君子不為小人之胸胸而易其行天有常度地有常形君子有常行君子道其常小人計其功詩云禮義之不愆何恤人之言故曰水至清則無魚人至察則無徒冕而前旒所以蔽眀黈纊充耳所以塞聰眀有所不見聰有所不聞舉大德赦小過無求備於一人之義枉而直之使自得之優而柔之使自求之揆而度之使自索之蓋聖人之教化如此欲自得之自得之則敏且廣矣今世之處士塊然無徒廓然獨居上觀許由下察接輿計同范蠡忠合子胥天下和平與義相扶寡耦少徒固其宜也子何疑於我哉若夫燕之用樂毅秦之任李斯酈食其之下齊説行如流曲從如環所欲必得功若邱山海內定國家安是遇其時也子又何怪之邪語曰以管窺天以蠡測海以莛撞鐘豈能通其條貫考其文理發其聲音哉繇是觀之譬如鼱鼩之襲狗孤豚之咋虎至則靡耳何功之有今以下愚而非處士雖欲勿困固不得已此適足以眀其不知權變而終惑於大道也又設非有先生之論其辭曰非有先生仕於吳進不稱往古以厲主意退不能揚君美以顯其功默然無言者三年矣吳王怪而問之曰寡人獲先人之功寄於衆賢之上夙興夜寐未嘗敢怠也今先生率然髙舉逺集吳地將以輔治寡人誠竊嘉之體不安席食不甘味目不視靡曼之色耳不聼鐘鼓之音虛心定志欲聞流議者三年于兹矣今先生進無以輔治退不揚主譽竊不為先生取之蓋懷能而不見是不忠也見而不行主不眀也意者寡人殆不眀乎非有先生伏而唯唯吳王曰可以談矣寡人將竦意而覽焉先生曰於戲可乎哉可乎哉談何容易夫談有悖於目拂於耳謬於心而便於身者或有説於目順於耳快於心而毁於行者非有眀王聖主孰能聼之吳王曰何為其然也中人已上可以語上也先生試言寡人將聼焉先生對曰昔者關龍逢深諌於桀而王子比干直言於紂此二臣者皆極慮盡忠閔主澤不下流而萬民騷動故直言其失切諌其邪者將以為君之榮除主之禍也今則不然反以為誹謗君之行絶無人臣之禮果紛然傷於身蒙不辜之名戮及先人為天下笑故曰談何容易是以輔弼之臣瓦解而邪諂之人並進遂及蜚廉惡來輩等二人皆詐偽巧言利口以進其身隂奉雕琢刻鏤之好以納其心務快耳目之欲以茍容為度遂往不戒身沒被戮宗廟崩阤國家為虛放戮賢聖親近讒夫詩不云乎讒人罔極交亂四國此之謂也故卑身賤體説色微辭愈愈詬詬終無益於主上之治則志士仁人不忍為也將儼然作矜嚴之色深言直諫上以拂主之邪下以損百姓之害則忤於邪主之心歷於衰世之法故養夀命之士莫肯進也遂居家山之間積土為室編蓬為戶彈琴其中以咏先王之風亦可樂而忘死矣是以伯夷叔齊避周餓于首陽之下後世稱其仁如是邪主之行固足畏也故曰談何容易於是吳王懼然易容捐薦去几危坐而聼先生曰接輿避世箕子被髮陽狂此二人者皆避濁世以全其身者也使遇眀王聖主得賜清燕之間寬和之色發憤畢誠圖畫安危揆度得失上以安主體下以便萬民則五帝三王之道可幾而見也故伊尹蒙耻辱負鼎爼和五味以干湯太公釣於渭之陽以見文王心合意同謀無不成計無不從誠得其君也深念逺慮引義以正其身推恩以廣其下本仁祖義褒有德祿賢能誅惡亂總逺方一統類美風俗此帝王所由昌也上不變天性下不奪人倫則天地和洽逺方懷之故號聖王臣子之職既加矣於是裂地定封爵為公侯傳國子孫名顯後世民到于今稱之以遇湯與文王也太公伊尹以如此龍逢比于獨如彼豈不哀哉故曰談何容易於是吳王穆然俯而深惟仰而泣下交頤曰嗟乎余國之不亡也綿綿連連殆哉世之不絶也於是正眀堂之朝齊君臣之位舉賢材布德惠施仁義賞有功躬節儉減後宫之費捐車馬之用放鄭聲逺佞人省庖厨去侈靡卑宫館壞苑囿填池塹以豫貧民無産業者開內藏振貧窮存耆老恤孤獨薄賦斂省刑辟行此三年海內晏然天下大洽隂陽和調萬物咸得其宜國無災害之變民無飢寒之色家給人足畜積有餘囹圉空虛鳯皇來集麒麟在郊甘露既降朱草萌芽逺方異俗之人鄉風慕義各奉其職而來朝賀故治亂之道存亡之端若此易見而君人者莫肯為也臣愚竊以為過故詩云王國克生惟周之楨濟濟多士文王以寧此之謂也朔之文辭此二篇最善其餘有封泰山責和氏璧及皇太子生禖屏風殿上柏柱平樂觀賦獵八言七言上下從公孫𢎞借車凡劉向所録朔書具是矣世所傳他事皆非也公孫賀字子叔北地義渠人也賀祖父昆邪景帝時為隴西守以將軍擊吳楚有功封平曲侯著書十餘篇賀少為騎士從軍數有功自武帝為太子時賀為舍人及武帝即位遷至太僕賀夫人君孺衛皇后姊也賀由是有寵元光中為輕車將軍軍馬邑後四嵗出雲中後五嵗以車騎將軍從大將軍青出有功封南窖侯後再以左將軍出定襄無功坐酎金失侯復以浮沮將軍出五原二千餘里無功後八嵗遂代石慶為丞相封葛繹侯時朝廷多事督責大臣自公孫𢎞後丞相李蔡嚴青翟趙周三人比坐事死石慶雖以謹得終然數被譴初賀引拜為丞相不受印綬頓首涕泣曰臣本邊鄙以鞍馬騎射為官材誠不任宰相上與左右見賀悲哀感動下泣曰扶起丞相賀不肯起上乃起去賀不得已拜出左右問其故賀曰主上賢眀臣不足以稱恐負重責從是殆矣賀子敬聲代賀為太僕父子並居公卿位敬聲以皇后姊子驕奢不奉法征和中擅用北軍錢千九百萬發覺下獄是時詔捕陽陵朱安世不能得上求之急賀自請逐捕安世以贖敬聲罪上許之後果得安世安世者京師大俠也聞賀欲以贖子罪笑曰丞相禍及宗矣南山之竹不足受我辭斜谷之木不足為我械安世遂從獄中上書告敬聲與陽石公主私通及使人巫祭祠詛上且上甘泉當馳道埋偶人祝詛有惡言下有司案驗賀窮治所犯遂父子死獄中家族巫蠱之禍起自朱安世成於江充遂及公主皇后太子皆敗語在江充戾園傳劉屈氂武帝庶兄中山靖王子也不知其始所以進公孫賀誅征和二年春制詔御史以涿郡太守屈氂為左丞相分丞相長史為兩府以澎戶二千二百封屈氂為澎侯其秋戾太子為江充所譖殺充發兵入丞相府屈氂挺身逃亡其印綬是時上避暑在甘泉宫丞相長史乘疾置以聞上問丞相何為對曰丞相祕之未敢發兵上怒曰事籍籍如此何謂祕也丞相無周公之風矣周公不誅管蔡乎乃賜丞相璽書曰捕斬反者自有賞罰以牛車為櫓毋接短兵多殺傷士衆堅閉城門毋令反者得出太子既誅充發兵宣言帝在甘泉病困疑有變姦臣欲作亂上於是從甘泉來幸城西建章宫詔發三輔近縣兵部中二千石以下丞相兼將太子亦遣使者矯制赦長安中都官囚徒發武庫兵命少傅石德及賔客張光等分將使長安囚如侯持節發長水及宣曲胡騎皆已裝會侍郎莽通使長安因追捕如侯告胡人曰節有詐勿聼也遂斬如侯引騎入長安又發輯濯士以豫大鴻臚商邱成初漢節純赤以太子持赤節故更為黃旄加上以相别太子召監北軍使者任安發北軍兵安受節已閉軍門不肯應太子太子引兵去驅四市人凡數萬衆至長樂西闕下逢丞相軍合戰五日死者數萬人血流入溝中丞相附兵浸多太子軍敗南奔覆盎城門得出會夜司直田仁部閉城門坐令太子得出丞相欲斬仁御史大夫暴勝之謂丞相曰司直吏二千石當先請奈何擅斬之丞相釋仁上聞而大怒下吏責問御史大夫曰司直縱反者丞相斬之法也大夫何以擅止之勝之惶恐自殺及北軍使者任安坐受太子節懷二心司直田仁縱太子皆要斬上曰侍郎莽通獲反將如侯長安男子景建從通獲少傅石德可謂元功矣大鴻臚商邱成力戰獲反將張光其封通為重合侯建為德侯成為秺侯諸太子賔客嘗出入宫門皆坐誅其隨太子發兵以反法族吏士劫略者皆徙敦煌郡以太子在外始置屯兵長安諸城門後二十餘日太子得於湖語在太子傳其眀年二師將軍李廣利將兵出擊胸奴丞相為祖道送至渭橋與廣利辭決廣利曰願君侯早請昌邑王為太子如立為帝君侯長何憂乎屈氂許諾昌邑王者二師將軍女弟李夫人子也二師女為屈氂子妻故共欲立焉是時治巫蠱獄急內者令郭穰告丞相夫人以丞相數有譴使巫祠社祝詛主上有惡言及與二師共禱祠欲令昌邑王為帝有司奏請案驗罪至大逆不道有詔載屈氂厨車以徇要斬東市妻子梟首華陽街二師妻子亦收二師聞之降胸奴宗族遂滅車千秋本姓田氏其先齊諸田徙長陵千秋為髙寢郎會衛太子為江充所譖敗久之千秋上急變訟太子寃曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上頗知太子惶恐無他意乃大感悟召見千秋至前千秋長八尺餘體貌甚麗武帝見而説之謂曰父子之間人所難言也公獨眀其不然此髙廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚數月遂代劉尾氂為丞相封富民侯千秋無他材能術學又無伐閲功勞特以一言寤意旬月取宰相封侯世未嘗有也後漢使者至胸奴單于問曰聞漢新拜丞相何用得之使者曰以上書言事故單于曰茍如是漢置丞相非用賢也妄一男子上書即得之矣使者還道單于語武帝以為辱命欲下之吏良久乃貰之然千秋為人敦厚有智居位自稱踰於前後數公初千秋始視事見上連年治太子獄誅罰尤多羣下恐懼思欲寬廣上意慰安衆庶乃與御史二千石共上夀頌德美勸上施恩惠緩刑罰玩聼音樂養志和神為天下自虞樂上報曰朕之不德自左丞相與二師隂謀逆亂巫蠱之禍流及士大夫朕日一食者纍月乃何樂之聼痛士大夫常在心既事不咎雖然巫蠱始發詔丞相御史督二千石求捕廷尉治未聞九卿廷尉有所鞫也曩者江充先治甘泉宫人轉至未央椒房以及敬聲之疇李禹之屬謀入胸奴有司無所發今丞相親掘蘭臺蠱驗所眀知也至今餘巫頗脫不止隂賊侵身逺近為蠱朕愧之甚何夀之有敬不舉君之觴謹謝丞相二千石各就館書曰毋偏毋黨王道蕩蕩毋有復言後嵗餘武帝疾立皇子鉤弋夫人男為太子拜大將軍霍光車騎將軍金日磾御史大夫桑𢎞羊及丞相千秋並受遺詔輔道少主武帝崩昭帝初即位未任聼政政事一決大將軍光千秋居丞相位謹厚有重德每公卿朝會光謂千秋曰始與君侯俱受先帝遺詔今光治內君侯治外宜有以教督使光無負天下千秋曰唯將軍留意即天下幸甚終不肯有所言光以此重之每有吉祥嘉應數褒賞丞相訖昭帝世國家少事百姓稍益充實始元六年詔郡國舉賢良文學士問以民所疾苦於是鹽鐵之議起焉千秋為相十二年薨諡曰定侯初千秋年老上優之朝見得乘小車入宫殿中故因號曰車丞相子順嗣侯官至雲中太守宣帝時以虎牙將軍擊胸奴坐盜增鹵獲自殺國除桑𢎞羊為御史大夫八年自以為國家興𣙜管之利伐其功欲為子弟得官怨望霍光與上官桀等謀反遂誅滅王欣濟南人也以郡縣吏積功稍遷為被陽令武帝末軍旅數發郡國盜賊羣起繡衣御史暴勝之使持斧逐捕盜賊以軍興從事二千石以下勝之過被陽欲斬欣欣已解衣伏質仰言曰使君顓殺生之柄威震郡國今復斬一欣不足以增威不如時有所寬以眀恩貸令盡死力勝之壯其言貰不誅因與欣相結厚勝之使還薦欣徵為右輔都尉守右扶風上數出幸安定北地過扶風宫館馳道修治供張辦武帝嘉之駐車拜欣為真視事十餘年昭帝時為御史大夫代車千秋為丞相封宜春侯眀年薨諡曰敬侯子談嗣以列侯與謀廢昌邑王立宣帝益封三百戶薨子咸嗣王莽妻即咸女莽篡位宜奉氏以外戚寵自欣傳國至元孫莽敗乃絶楊敞華隂人也給事大將軍莫府為軍司馬霍光愛厚之稍遷至大司農元鳯中稻田使者燕蒼知上官桀等反謀以告敞敞素謹畏事不敢言乃移病卧以告諫大夫杜延年延年以聞蒼延年皆封敞以九卿不輒言故不得侯後遷御史大夫代王欣為丞相封安平侯眀年昭帝崩昌邑王徵即位淫亂大將軍光與車騎將軍張安世謀欲廢王更立議既定使大司農田延年報敞敞驚懼不知所言汗出洽背徒唯唯而已延年起至更衣敞夫人遽從東箱謂敞曰此國大事今大將軍議已定使九卿來報君侯君侯不疾應與大將軍同心猶與無決先事誅矣延年從更衣還敞夫人與延年參語許諾請奉大將軍教令遂共廢昌邑王立宣帝即位月餘敞薨諡曰敬侯子忠嗣以敞居位定䇿安宗廟益封三千五百戶忠弟惲字子幼以忠任為郎補常侍騎惲母司馬遷女也惲始讀外祖太史公記頗為春秋以材能稱好交英俊諸儒名顯朝廷擢為左曹霍氏謀反惲先聞知因侍中金安上以聞召見言狀霍氏伏誅惲等五人皆封惲為平通侯遷中郎將郎官故事令郎出錢市財用給文書乃得出名曰山郎移病盡一日輒償一沐或至嵗餘不得沐其豪富郎日出遊戲或行錢得善部貨賂流行傳相放效惲為中郎將罷山郎移長度大司農以給財用其疾病休謁洗沐皆以法令從事郎謁者有罪過輒奏免薦舉其髙第有行能者至郡守九卿郎官化之莫不自厲絶請謁貨賂之端令行禁止宫殿之內翕然同聲由是擢為諸吏光祿勳親近用事初惲受父財五百萬及身封侯皆以分宗族後母無子財亦數百萬死皆豫惲惲盡復分後母昆弟再受訾千餘萬皆以分施其輕財好義如此惲居殿中廉潔無私郎官稱公平然惲伐其行治又性刻害好發人隂伏同位有忤己者必欲害之以其能髙人由是多怨於朝廷與太僕戴長樂相失卒以是敗長樂者宣帝在民間時與相知及即位拔擢親近長樂嘗使行事肄宗廟還謂掾史曰我親靣見受詔副帝肄秺侯御人有上書告長樂非所宜言事下廷尉長樂疑惲教人告之亦上書告惲罪髙昌侯車奔入北掖門惲語富平侯張延夀曰聞前曾有奔車抵殿門門關折馬死而昭帝崩今復如此天時非人力也左馮翊韓延夀有罪下獄惲上書訟延夀郎中邱常謂惲曰聞君侯訟韓馮翊當得活乎惲曰事何容易脛脛者未必全也我不能自保真人所謂鼠不容冗銜窶數者也又中書謁者令宣持單于使者語視諸將軍中朝二千石惲曰冒頓單于得漢美食好物謂之殠惡單于不來眀甚惲上觀西閣上畫人指桀紂畫謂樂昌侯王武曰天子過此一二問其過可以得師矣畫人有堯舜禹湯不稱而舉桀紂惲聞胸奴降者道單于見殺惲曰得不肖君大臣為畫善計不用自令身無處所若秦時但任小臣誅殺忠良竟以滅亡令親任大臣即至今耳古與今如一邱之貉惲妄引亡國以誹謗當世無人臣禮又語長樂曰正月以來天隂不雨此春秋所記夏侯君所言也行必不至河東矣以主上為戲語尤悖逆絶理事下廷尉廷尉定國考問左驗眀白奏惲不服罪而召戶將尊欲令戒飭富平侯延夀曰太僕定有死罪數事朝暮人也惲幸與富平侯昏姻今獨三人坐語侯言時不聞惲語自與太僕相觸也尊曰不可惲怒持大刀曰蒙富平侯力得族罪毋泄惲語令太僕聞之亂餘事惲幸得列九卿諸吏宿衛近臣上所信任與聞政事不竭忠愛盡臣子義而妄怨望稱引為訞惡言大逆不道請逮捕治上不忍加誅有詔皆免惲長樂為庶人惲既失爵位家居治産業起室宅以財自娛嵗餘其友人安定太守西河孫會宗知略士也與惲書諌戒之為言大臣廢退當闔門惶懼為可憐之意不當治産業通賔客有稱譽惲宰相子少顯朝廷一朝以暗昧語言見廢內懷不服報會宗書曰惲材朽行穢文質無所底幸賴先人餘業得備宿衛遭遇時變以獲爵位終非其任卒與禍會足下哀其愚蒙賜書教督以所不及殷勤甚厚然竊恨足下不深惟其終始而猥隨俗之毁譽也言鄙陋之愚心若逆指而文過默而息乎恐違孔氏各言爾志之義故敢略陳其愚惟君子察焉惲家方隆盛時乘朱輪者十人位在列卿爵為通侯總領從官與聞政事曾不能以此時有所建眀以宣德化又不能與羣僚同心并力陪輔朝廷之遺忘已負竊位素餐之責久矣懷祿貪勢不能自退遭遇變故橫被口語身幽北闕妻子滿獄當此之時自以夷滅不足以塞責豈意得全首領復奉先人之邱墓乎伏惟聖主之恩不可勝量君子遊道樂以忘憂小人全軀説以忘罪竊自思念過已大矣行已虧矣長為農夫以沒世矣是故身率妻子戮力耕桑灌園治産以給公上不意當復用此為譏議也夫人情所不能止者聖人弗禁故君父至尊親送其終也有時而既臣之得罪已三年矣田家作苦嵗時伏臘烹羊炮羔斗酒自勞家本秦也能為秦聲婦趙女也雅善鼓瑟奴婢歌者數人酒後耳熱仰天拊缶而呼烏烏其詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時是日也拂衣而喜奮褎低卬頓足起舞誠淫荒無度不知其不可也惲幸有餘祿方糴賤販貴逐什一之利此賈豎之事汙辱之處惲親行之下流之人衆毁所歸不寒而栗雖雅知惲者猶隨風而靡尚何稱譽之有董生不云乎眀眀求仁義常恐不能化民者卿大夫之意也眀眀求財利常恐困乏者庶人之事也故道不同不相為謀今子尚安得以卿大夫之制責僕哉夫西河魏土文侯所與有假干木田子方之遺風􅏮然皆有節槩知去就之分頃者足下離舊土臨安定安定山谷之間昆戎舊壤子弟貪鄙豈習俗之移人哉於今乃覩子之志矣方當盛漢之隆願勉旃毋多談又惲兄子安平侯談為典屬國謂惲曰西河太守建平杜侯前以罪過出今徴為御史大夫侯罪薄又有功且復用惲曰有功何益縣官不足為盡力惲素與蓋寬饒韓延夀善談即曰縣官實然蓋司𨽻韓馮翊皆盡力吏也俱坐事誅會有日食變騶馬猥佐成上書告惲驕奢不悔過日食之咎此人所致章下廷尉按驗得所豫會宗書宣帝見而惡之廷尉當惲大逆無道要斬妻子徙酒泉郡談坐不諫正惲與相應有怨望語免為庶人召拜成為郎諸在位與惲厚善者未央衛尉韋元成京兆尹張敞及孫會宗等皆免官蔡義河內溫人也以明經給事大將軍莫府家貧常步行資禮不逮衆門下好事者相合為義買犢車令乘之數嵗遷補覆盎城門候久之詔求能為韓詩者徵義待詔久不進見義上疏曰臣山東草萊之人行能亡所比容貌不及衆然而不棄人倫者竊以聞道於先師自託於經術也願賜清間之燕得盡精思於前上召見義説詩甚説之擢為光祿大夫給事中進授昭帝數嵗拜為少府遷御史大夫代楊敞為丞相封平陽侯又以定䇿安宗廟益封加賜黃金二百斤義為丞相時年八十餘短小無須眉貌似老嫗行步俯僂常兩扶夾夾乃能行時大將軍光秉政議者或言光置宰相不選賢茍用可顓制者光聞之謂侍中左右及官屬曰以為人主師當為宰相何謂云云此語不可使天下聞也義為相四嵗薨諡曰節侯無子國除陳萬年字幼公沛郡相人也為郡吏察舉至縣令遷廣陵太守以髙第入為右扶風遷太僕萬年廉平內行修然善事人賂遺外戚許史傾家自盡尤事樂陵侯史髙丞相丙吉病中二千石上謁問疾遣家丞出謝謝已皆去萬年獨留昏夜乃歸及吉病甚上自臨問以大臣行能吉薦于定國杜延年及萬年萬年竟代定國為御史大夫八嵗病卒子咸字子康年十八萬年任為郎有異材抗直數言事刺譏近臣書數十上遷為左曹萬年嘗病召咸教戒於牀下語至夜半咸睡頭觸屛風萬年大怒欲杖之曰乃公教戒汝汝反睡不聼吾言何也咸叩頭謝曰具曉所言大要教咸讇也萬年乃不復言萬年死後元帝擢咸為御史中丞總領州郡奏事課第諸刺史內執法殿中公卿以下皆敬憚之是時中書令石顯用事顓權咸頗言顯短顯等恨之時槐里令朱雲殘酷殺不辜有司舉奏未下咸素善雲雲從刺候教令上書自訟於是石顯微伺知之白奏咸漏泄省中語下獄掠治減死髠為城旦因廢成帝初即位大將軍王鳯以咸前指言石顯有忠直節奏請咸補長史遷冀州刺史奉使稱意徴為諫大夫復出為楚內史北海東郡太守坐為京兆尹王章所薦章誅咸免官起家復為南陽太守所居以殺伐立威豪猾吏及大姓犯法輒論輸府以律程作司空為地臼木杵舂不中程或私解脫鉗􅎂衣服不如法輒加罪笞督作劇不勝痛自絞死者嵗數百千人久者蟲出腐爛家不得收其治放嚴延年其廉不如所居調發屬縣所出食物以自奉養奢侈玉食然操持掾史郡中長吏皆令閉門自斂不得踰法公移敕書曰即各欲求索自快是一郡百太守也何得然哉下吏畏之豪強執服令行禁止然亦以此見廢咸三公子少顯名於朝廷而薛宣朱博翟方進孔光等仕宦絶在咸後皆以廉儉先至公卿而咸滯於郡守時車騎將軍王音輔政信用陳湯咸數賂遺湯豫書曰即蒙子公力得入帝城死不恨後竟徴入為少府少府多寶物屬官咸皆鉤校發其姦臧沒入辜𣙜財物官屬及諸中宫黃門鉤盾掖庭官吏舉奏按論畏咸皆失氣為少府三嵗與翟方進有隙方進為丞相奏咸前為郡守所在殘酷毒螫加於吏民主守盜受所監而官媚邪臣陳湯以求薦舉茍得無耻不宜處位咸坐免頃之紅陽侯立舉咸方正為光祿大夫給事中方進復奏免之後數年立有罪就國方進奏歸咸故郡以憂死鄭𢎞字稚卿泰山剛人也兄昌字次卿亦好學皆明經通法律政事次卿為太原涿郡太守𢎞為南陽太守皆著治迹條教法度為後所述次卿用刑罰深不如𢎞平遷淮陽相以髙第入為右扶風京師稱之代韋元成為御史大夫六嵗坐與京房論議免語在房傳楊王孫者孝武時人也學黃老之術家業千金厚自奉養生亡所不致及病且終先令其子曰吾欲裸葬以反吾真必亡易吾意死則為布囊盛尸入地七尺既下從足引脫其囊以身親土其子欲默而不從重廢父命欲從之心又不忍乃往見王孫友人祁侯祁侯與王孫書曰王孫苦疾僕迫從上祠雍未得詣前願存精神省思慮進近醫藥厚自持竊聞王孫先令裸葬令死者無知則已若其有知是戮尸地下將裸見先人竊為王孫不取也且孝經曰為之棺槨衣裳是亦聖人之遺制何必區區獨守所聞願王孫察焉王孫報曰蓋聞古之聖王緣人情不忍其親故為制禮今則越之吾是以裸葬將以矯世也夫厚葬誠無益於死者而俗人競以相髙靡財殫幣腐之地下或乃今日入而眀日發此真與暴骸於中野何異且夫死者終生之化而物之歸者也歸者得至化者得變是物各反其真也反真冥冥亡形亡聲乃合道情夫飾外以華衆厚葬以鬲真使歸者不得至化者不得變是使物各失其所也且吾聞之精神者天之有也形骸者地之有也精神離形各歸其真故謂之鬼鬼之為言歸也其尸塊然獨處豈有知哉裹以幣帛鬲以棺槨支體絡束口含玉石欲化不得鬱為枯臘千載之後棺槨朽腐乃得歸土就其真宅繇是言之焉用久客昔帝堯之葬也窾木為櫝葛藟為緘其穿下不亂泉上不泄殠故聖王生易尚死易葬也不加功於亡用不損財於亡謂今費財厚葬留歸鬲至死者不知生者不得是謂重惑於戲吾不為也祁侯曰善遂裸葬通志卷九十九
