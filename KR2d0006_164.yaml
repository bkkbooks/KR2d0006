body:
  text: 通志卷一百四十一宋右迪功郎鄭樵漁仲撰列傳第五十四梁孔休源裴子野劉孝綽子諒孝孝綽弟潛弟潛弟勝孝勝孝威弟孝威弟孝先孺覽覽弟遵孝綽從弟孺遵從弟苞劉峻兄孝慶劉沼孫峻從杳何遜劉顯從弟玨劉之遴子三逹叔弟之亨從坦眀山賔弟少遐張充從叔瓌率弟盾瓌子率瓌弟稷褚翔族父球宗夬袁昻馬仙琕正昻子君庾蓽子喬敻喬子庾於陵弟肩吾蔡撙江蒨弟曇祿曇弟周捨王僧孺謝朏子諼譓諼弟弟譓子哲子􅀈弟子覽子覽舉舉嘏舉兄僑謝幾卿謝微陸倕從子襄公襄兄子雲到沆從弟溉鏡子藎溉子鏡溉弟洽蕭琛陸杲子罩庾仲容蕭視素從弟洽洽弟介臧嚴從叔未甄未甄子盾盾弟厥徐君蒨孔休源字慶緒會稽山隂人晉尚書沖之八世孫沖即開府儀同三司愈之世父也曾祖遙之宋尚書水部郎父佩齊通直郎廬陵王府記室休源年十一而孤居喪盡禮每見父手所寫書必哀慟流涕不能自勝見者莫不為之垂泣後就吳興沈麟士受經略通大義州舉秀才太尉徐孝嗣省其䇿深善之謂同坐曰董仲舒華令思何以尚此可謂後生之凖的也觀其此對足稱王佐之才琅邪王融雅相友善乃薦之於司徒竟陵王以為西邸學士梁臺建與南陽劉之遴同為太學博士當時以為美選休源初到都寓於宗人少府孔登宅曾以祠事入廟中侍中范雲一與相遇深加褒賞曰不期忽覯清顏頓祛鄙吝觀天披霧驗之今日後雲命駕到少府門登便拂席整帶謂當詣已備水陸之品雲駐筯命休源及至命取其常膳正有赤倉米飯蒸鮑魚雲食休源食不舉主人之饌髙談盡日同載還家登深以為愧尚書令沈約當朝貴顯軒蓋盈門休源或時後來必虛襟引接處之坐右商略文義其為通人所推如此武帝嘗問吏部尚書徐勉曰今帝業初基須一人有學藝解朝儀者為尚書儀曹郎誰堪其選勉曰孔休源識見清通詳練故實自晉宋起居注誦略上口帝亦素聞之即日除兼尚書儀曹郎是時多所改作每逮訪前事休源即以所誦記隨機斷決曾無凝滯吏部郎任昉謂之為孔獨誦遷建康獄正平反辨析時罕寃人後有選人為獄司者帝嘗引休源以勵之除中書舍人後為尚書左丞彈肅禮闈雅允朝望時周捨撰禮疑義自漢魏至于齊梁並皆搜采休源所有奏議咸豫編録再遷長兼御史中丞正色直繩無所回避百僚憚之後為普安王府長史南郡太守行荆州府州事武帝謂曰荆州總上流衝要義高分陜今以十嵗兒委卿當善匡翼之勿憚周昌之舉也乃勑晉安王曰孔休源人倫儀表汝年尚幼當每事師之尋始興王憺代鎮荆州復以休源為憺府長史太守行府事如故在州纍政甚有政績平心決斷請託弗行帝深嘉之歷祕書監復為晉安王府長史南蘭陵太守别勑專行南徐州事休源纍佐名藩甚得人譽王深相倚仗軍民機務動必詢謀常於齋中别施一榻云此是孔長史坐人莫得預焉其見敬如此歷都官尚書普通七年揚州刺史臨川王宏薨帝與羣臣議可代居州任者于時貴戚王公咸望遷授帝曰朕已得人孔休源才識眀敏實應此選乃授宣惠將軍監揚州事休源初為臨川王行佐及王薨而管州任時論榮之神州都會簿領殷繁休源剖斷如流傍無私謁中大通二年加金紫光祿大夫在州晝決詞訟夜覽墳籍每車駕巡幸常以軍國事委之昭眀太子薨有勑夜召休源入宴居殿與羣公參定謀議立晉安王綱為皇太子自公卿珥貂插筆奏決於休源前休源怡然無愧時人名為兼天子四年遇疾勑中使候問并給醫藥日有十數及卒遺令薄葬節朔薦蔬菲而已帝為之流涕顧謝舉曰孔休源居職清忠方欲共匡政道奄至隕沒朕甚痛之舉曰此人清介強直臣竊為陛下惜之諡貞子休源風範強正眀練治體持身儉約學窮文藝當官理務不憚強禦常以天下為己任武帝深委仗之纍居顯職纎毫無犯性慎密寡嗜好出入帷幄未嘗言禁中事世以此重之聚書盈七千卷手自校理凡奏議彈文勒成十五卷長子雲童頗有父風位東揚州别駕少子宗範聰敏有識度位中書郎裴子野字幾原河東聞喜人也曾祖松之宋光祿大夫祖駰南中郎外兵參軍父昭眀齊通直散騎常侍各有傳子野生而母魏氏亡為祖母殷氏所養殷柔眀有文義以章句授之年九嵗祖母亡泣血哀慟家人異之少好學善屬文起家齊武陵王國左常侍江夏王行參軍遭父憂去職初父寢疾彌年子野禱請備至涕泗霑濡父夜夢見其容旦召視如夢俄而疾間以為至孝所感命著孝感傳固辭乃止及居喪盡禮每之墓所哭泣處草為之枯有白兔白鳩馴擾其側天監初尚書僕射范雲嘉其至行將表奏之會雲卒不果樂安任昉有盛名為後進所慕遊其門者昉必推薦子野於昉為從中表獨不至昉亦恨焉故不之善久之除右軍參軍兼廷尉正時三官通署獄子野嘗不在其同僚輒署其名奏有不允子野從坐免職或勸言請有司可無咎子野笑而答曰雖慙栁季之道豈因訟以受服自此免黜久之終無恨意時中書郎范縝與子野未遇聞其學行而善焉會遷國子博士乃上表讓之有司以資歷非次不為通後為諸暨令在縣不行鞭罰人有爭訟者示之以理百姓稱恱合境無訟初子野曾祖松之宋元嘉中受詔續修何承天宋史未成而卒子野常欲繼成先業及齊永眀末沈約所撰宋書稱松之已後無聞焉子野更刪撰為宋略二十卷其敘事評論多善而云戮淮南太守沈璞以其不從義師故也約懼徒跣謝之請兩釋焉約常歎其述作曰吾弗逮也蘭陵蕭琛言其評論可與過秦王命分路揚鑣於是吏部尚書徐勉言之於武帝以為著作郎掌修國史及起居注頃之兼中書通事舍人尋除通直著作舍人如故又勑掌中書詔誥是時西北徼外有白題及滑國遣使由岷山道入貢此二國歷世弗賔莫知所出子野曰漢潁隂侯斬胡白題將一人服虔注云白題胡名也又漢定逺侯擊虜入滑此其後乎時人服其博識勑仍使撰方國使圖廣述懷來之盛自要服至于海表凡二十國子野與沛國劉顯南陽劉之遴陳郡殷藝陳留阮孝緒吳郡顧協京兆韋稜皆博極羣書深相賞好顯尤推重之時長平侯蕭勱范陽張纘每討論墳籍咸折𠂻於子野繼母曹氏亡居喪過禮服闋再遷員外郎普通七年大舉北侵勑子野為後魏文受詔立成武帝以其事體大召尚書僕射徐勉太子詹事周捨鴻臚卿劉之遴中書侍郎朱異集夀光殿以觀之時並歎服帝目子野曰其形雖弱其文甚壯俄又勑為書喻魏相元義其夜受旨子野謂可待旦方奏未之為也及五鼓勑催令速上子野徐起操筆昧爽便就及奏帝深嘉焉自是凡諸符檄皆令具草子野為文典而速不尚麗靡其制作多法古與今文體異當時或有詆訶者及其末翕然重之或問其為文速者子野答云人皆成於手我獨成於心遷中書侍郎轉鴻臚卿領步兵校尉子野在禁省十餘年靜默自守未嘗有所請謁外家及中表貧乏所得公奉悉分給之無宅借官地二畝起茅屋數間妻子常苦飢寒唯以教誨為本子姪祗畏若奉嚴君劉顯常以師道推髙之末年深信釋氏持其教戒終身飯麥食蔬中大通二年卒時年六十二遺命務存儉約武帝悼惜為之流涕贈散騎常侍諡貞子先是五等君及侍中以上乃有諡及子野特以令望見嘉故賜諡焉先是子野自占死期不過戊戍嵗是年自省移疾謂同官劉之亨曰吾其逝矣子野少時集注喪服續裴氏家傳各三卷抄合後漢事四十餘卷又勑撰衆僧傳二十卷百官九品二卷附益諡法一卷方國使圗一卷文集二十卷並行於世又勑撰齊梁春秋始草創未就而卒及葬湘東王為之墓志銘陳于藏內邵陵王又立墓志堙于羡道羡道列志自此始焉子騫官至通直郎劉孝綽字孝綽彭城人也本名冉祖勔宋司空父繪武帝霸府從事中郎繪附其兄太常悛傳列在齊史孝綽幼聰敏七嵗能屬文舅齊中書郎王融深賞異之常與同載以適親友號曰神童融每言曰天下文章若無我當歸阿士阿士即孝綽小字也父繪齊世掌詔誥孝綽時年十四繪嘗使代草之父黨沈約任昉范雲等聞其名並命駕先造焉昉尤相賞好范雲年長繪十餘嵗其子孝才與孝綽年並十四五及雲遇孝綽便申伯季乃命孝才拜之孝綽兼善草𨽻自以書似父乃變為别體天監初起家著作佐郎為歸沐詩贈任昉昉報曰彼美洛陽子投我懷秋作詎慰耋嗟人徒深老夫託直史兼褒貶轄司専疾惡九折多美疹匪報庶良藥其為名流所重如此俄以本官兼尚書水部郎奉啓陳謝手勑答曰美錦未可便製簿領亦宜稍習頃之即真武帝雅好雕蟲時因宴幸令沈約任昉等言志賦詩孝綽亦見引嘗侍宴於坐作詩七首帝覽其文篇篇嗟賞由是朝野改觀後除祕書丞帝謂舍人周捨曰第一官當知用第一人故以孝綽居此職纍遷太子僕掌東宫管記時昭眀太子好士愛文孝綽與陳郡殷藝吳郡陸倕琅邪王筠彭城到洽等同見禮太子起樂賢堂乃使畫工先圖孝綽焉太子文章繁富羣才咸欲撰録太子獨使孝綽集而序之遷員外散騎常侍兼廷尉卿頃之即真初孝綽與到溉兄弟甚狎溉少孤宅近僧寺孝綽往溉許適見黃卧具孝綽謂僧物色也撫手笑溉知其旨奮拳擊之傷口而去又與洽同遊東宫孝綽自以才優於洽每於宴坐嗤鄙其文洽深銜之及孝綽為廷尉正携妾入官府其母猶停私宅洽尋為御史中丞遣令史案其事遂劾奏之云携少妹於華省棄老母於下宅武帝為隱其惡改妹為姝字孝綽坐免官孝綽諸弟時隨藩皆在荆雍乃與書論共洽不平者十事其辭皆鄙到氏又為别本封至東宫昭眀太子命焚之不開視也孝綽免職後武帝數使僕射徐勉宣旨撫慰之每朝宴常預焉及武帝為籍田詩又使徐勉先示孝綽時奉詔作者數十人帝以孝綽詩工即日起為西中郎湘東王咨議參軍遷黃門侍郎尚書吏部郎坐受人絹一束為餉者所訟左遷信威臨賀王長史晚年忽忽不得志後為祕書監初孝綽居母憂冬月飲冷氷因得冷癖以大同五年卒官年五十九孝綽少有盛名而仗氣負才多所陵忽有不合意者必極言詆訾領軍臧盾太府卿沈僧畟等並被時遇孝綽尤輕之每於朝集會同處公卿間無所與語唯呼騶卒訪道塗間事由此多忤於物前後凡五免孝綽辭藻為後進所宗時重其文每作一篇朝成暮遍好事者咸傳寫流聞河朔亭苑柱壁莫不題之文集數十萬言行於世孝綽兄弟及羣從子姪當時有七十人並能屬文近古未之有比其三女一適琅邪王叔英一適吳郡張嵊一適東海徐悱並有才學悱妻文尤清拔所謂劉三娘者也悱僕射勉之子為晉安郡卒喪還京師妻為祭文辭甚悽愴勉本欲為哀辭既覩之乃閣筆孝綽子諒字永信小名春少好學有文才尤博悉晉氏故事時人號曰皮裹晉書位中軍宣城王記室為湘東王所善王嘗遊江濵歎秋望之美諒對曰今日可謂帝子降於北渚王有目疾以為刺已應曰卿言目眇眇以愁豫邪從此嫌之孝綽弟潛字孝儀幼孤與諸兄弟相朂以學並工屬文孝綽嘗云三筆六詩三即孝儀六謂孝威也天監五年舉秀才纍選尚書殿中郎敕令製雍州平等寺金像碑文甚宏麗晉安王綱鎮襄陽引為安北功曹史及王為皇太子仍補洗馬遷中舍人出為陽羡令甚有稱績後為中書郎以公事左遷安西咨議參軍兼散騎常侍使魏還除中書郎纍遷尚書左丞長兼御史中丞在職多所彈紏無所顧望當時稱之出為臨海太守時政網疏闕百姓多不遵禁孝儀下車宣下條制勵精綏撫境內翕然風俗大變入遷都官尚書太清元年出為豫州刺史侯景寇建鄴孝儀遣子勵帥郡兵三千隨前衡州刺史韋粲入援及宫城不守孝儀為前歷陽太守莊鐡所逼失郡卒孝儀為人寬厚內行尤篤第二兄孝熊早卒孝儀奉寡嫂甚謹家內巨細必先咨決與妻子朝夕供事未嘗失禮時人以此稱之有文集二十卷行於世第五弟孝勝位尚書右丞兼散騎常侍聘魏還為安西武陵王紀長史蜀郡太守紀僣號於蜀以為尚書僕射隨紀出峽口兵罷被執元帝宥之以為司徒右長史第六弟孝威氣調爽逸風儀俊舉初為安北晉安王法曹後為太子洗馬中舍人庶子率更令並掌管記大同中白雀集東宫孝威上頌甚美太清中遷中庶子兼通事舍人及侯景寇亂隨司州刺史栁仲禮至安陸卒第七弟孝先位武陵王主簿與兄孝勝俱隨紀軍出峽口兵敗元帝以為黃門郎遷侍中孝綽從弟孺字孝稚世父悛子也孺幼聰敏七嵗能屬文年十四居喪毁瘠骨立宗黨咸異之叔父瑱為義興郡携以之官嘗置坐側謂賓客曰此吾家眀珠也及長美風采性通和雖家人不見其喜慍本州召迎主簿起家中軍法曹行參軍時鎮軍沈約聞其名引為主簿恆與遊宴賦詩大為約所嗟賞纍遷太子中舍人孺少好文章性又敏速嘗在御坐為李賦受詔便成文不加點武帝甚稱賞之後侍宴夀光殿詔羣臣賦詩時孺與張率並醉未及成帝取孺手版題戲之曰張率東南美劉孺洛陽才攬筆便應就何事久遲回其見親愛如此遷中書郎兼中書通事舍人歷太子中庶子尚書吏部郎纍遷散騎常侍左戶尚書大同五年守吏部尚書出為晉陵太守在郡和理為吏民所稱入為侍中後復為吏部尚書母憂以毁卒諡曰孝子孺少與從兄苞孝綽齊名苞早卒孝綽數坐免黜位並不髙唯孺貴顯有文集二十卷孺弟覽字孝智年十六精通老易位中書郎以所生母憂廬于墓嘗再期不嘗鹽酩食麥粥而已隆冬止著單布衣家人慮不勝喪中夜竊置炭於牀下覽因暖得寐及覺知之號慟歐血武帝聞其至性數使省視服闋除尚書左丞性聰敏尚書令史七百人一見並記名姓當官清正無所私孝綽為吏部郎在職頗通贓貨覽劾奏免官孝綽怨之常謂人曰犬噬行路覽噬家人出為始興內史居郡尤勵清節復為左丞卒官覽弟遵字孝陵有學行工屬文為晉安王綱宣惠雲麾二府記室甚見賓禮王立為太子仍除中庶子遵自隨蕃及在東宫以舊恩偏蒙寵遇時輩莫及卒官皇太子深悼惜之與遵從兄陽羡令孝儀令曰賢從弟中庶奄至殞逝痛可言乎其孝友淳深立身貞固內含玉潤外表瀾清言行相符終始如一文史該富琬琰為心辭章博贍元黃成采既以鳴謙表性又以難進自居吾昔在漢南連翩書記及忝朱方從容坐首鷁舟乍動朱鷺徐鳴未嘗一日而不追隨一時而不會遇益者三友此實其人及𢎞道下邑未申善政而能使人結去思野多馴翟此亦威鳳一羽足以驗其五德其見愛賞如此遵從弟苞字孝嘗一字孟嘗父愃悛之弟也位太子中庶子苞三嵗而孤至六七嵗見諸父常泣時伯父悛繪等並顯貴其母謂其畏憚怒之苞曰早孤不及有識聞諸父多相似故心中悲耳因而歔欷母亦悲慟初苞父母及兩兄相繼亡悉假瘞焉苞年十六始移墓所經營改葬不資諸父奉嫡母朱夫人及所生陳氏並扇席溫枕叔父繪常歎伏之少好學能屬文家有舊書例皆殘蠹手自編緝筐篋盈滿梁初以臨川王妃弟故自征虜主簿遷右軍功曹纍遷太子洗馬掌書記侍講壽安殿及從兄孝綽等並以文藻見知多預宴坐受詔詠天泉池荷及採菱調下筆即成天監十年卒臨終呼友人南陽劉之遴託以喪事從儉苞居官有能名性和直與人交面折其非退稱其美士友咸以此歎惜之劉峻字孝標本名法武其先平原人祖昶從慕容德入齊因家于北海父璇之宋始興內史從父兄懷珍宋齊世知名位終光祿大夫自有傳峻生期月而璇之卒其母許氏携峻及其兄法鳯還歸鄉里宋泰始初青州陷魏峻年八嵗為人所略為奴至中山中山富人劉寶愍峻以束帛贖之教以書學魏人聞其江南有戚屬更徙之桑乾峻居貧不能自立與母並出家為尼僧既而還俗峻好學家貧寄人廡下自課讀書常燎麻炬從夕達旦時或昏睡爇其髭髮既覺復讀終夜不寐其精力如此時魏孝文遴選物望河南人士才學之徒咸見申擢峻兄弟不蒙選授齊永明中俱奔江南更改名峻字孝標自以少時未開悟晚更厲精眀慧過人苦所見不博聞有異書必往祈備清河崔慰祖謂之書淫於是博極羣書文藻秀出故其自序云黌中濟濟皆升堂亦有愚者解衣裳言其少年魯鈍也時竟陵王子良招學士峻因人求為子良國職吏部尚書徐孝嗣抑而不許因為南海王侍郎不就至齊眀帝時蕭遙欣為豫州引為府刑獄參軍禮遇甚厚遙欣尋卒久不調天監初召入西省與學士賀蹤典校祕閣峻兄孝慶時為青州刺史峻請假省之坐私載禁物為有司所奏免官安成王秀雅重峻及安成王遷荆州引為戶曹參軍給其書籍使抄録事類名曰類苑未及就復以疾去職因遊東陽紫巗山築室居焉為山栖志其文甚美初武帝招文學之士有髙才者多被引進擢以不次峻率性而動不能隨衆沉浮武帝每集文士策經史事時范雲沈約之徒皆引短推長帝乃悅加其賞賚曾䇿錦被事咸言已罄帝試呼問峻峻時貧悴冗散忽請紙筆疏十餘事坐客皆驚帝不覺失色自是惡之不復引見及峻類苑成凡一百二十卷帝即命諸學士撰華林遍略以髙之峻竟不見用乃著辨命論以寄其懷論成中山劉沼致書以難之凡再反峻並為申析以答之會沼卒不見峻後報者峻乃為書以序其事其文論並多不載峻又嘗為自序其略云余自比馮敬通而有同之者三異之者四何則敬通雄才冠世志剛金石余雖不及之而節亮慷慨此一同也敬通逢中興眀君而終不試用余逄命世英主亦擯斥當年此二同也敬通有忌妻至於身操井臼余有悍室亦令家道轗軻此三同也敬通當更始世手握兵符躍馬肉食余自少訖長戚戚無歡此一異也敬通有子仲文官成名立余禍同伯道永無血允此二異也敬通旅力剛強老而益壯余有犬馬之疾溘死無時此三異也敬通雖芝殘蕙焚終填溝壑而為名賢所慕其風流郁烈芬芳久而彌盛余聲塵寂寞世不吾知還魄一去將同秋草此四異也所以力自為序遺之好事云峻本將門兄法鳳自北歸改名孝慶字仲昌早有幹略齊末為兖州刺史舉兵應武帝封餘干男歷官顯重峻獨篤志好學居東陽吳會士人多從其學普通三年卒年六十門人諡曰元靖先生劉沼字眀信中山魏昌人六世祖輿晉驃騎將軍沼幼善屬文及長博學位終秣陵令峻從孫杳字士深父懷慰齊世為齊郡太守附載懷珍傳中杳年數嵗徴士眀僧紹見之撫而言曰此兒實千里之駒十三丁父憂哀感行路天監中為宣惠豫章王行參軍杳博綜羣書沈約任昉以下每有遺忘皆訪問焉嘗於約坐語及宗廟犧􅀈約云鄭元答張逸謂為畫鳳凰尾婆娑然今無復此器有則不依古杳曰此言未必可安古者樽彜皆刻木為鳥獸形鑿頂及背以出內酒魏世魯郡地中得齊大夫子尾送女器有犧樽作犧牛形又晉永嘉中賊曹嶷於青州發齊景公冢又得二樽形亦為牛象二處皆古之遺器知非虛也約大以為然約又云何承天纂文竒博其書載張仲師及長頸王事此何所出杳曰仲師長尺二寸唯出論衡長頸是毗騫王朱建安扶南以南記云古來至今不死約即取二書尋檢一如杳言約郊居宅時新構閣齋杳遂為贊二首并以所撰文章呈約約即命工書人題其贊于壁仍報杳書共歎美之又在任昉坐有人餉昉酒而作榐字昉問杳此字是不杳對曰葛洪字苑作木旁􅀢昉又曰酒有千日醉當是虛言杳云桂陽程鄉有千里酒飲之至家而醉亦其例也昉大驚曰吾自當遺忘實不憶此杳云楊元鳳所撰置郡事元鳯是魏代人此書仍載其賦云三重五品商溪摖里昉即檢楊記言皆不差王僧孺被勑撰譜訪杳血脈所因杳云桓談新論云太史公三代世表旁行邪上並效周譜以此而推當起周代僧孺歎曰可謂得所未聞周捨又問杳尚書官著紫荷橐相傳云挈橐竟何所出杳答曰張安世傳云持橐簪筆事孝武皇帝數十年韋昭張晏注並云橐囊也近臣簪筆以待顧問范岫撰字書音訓又訪杳焉尋佐周捨撰國史出為臨津令有善績秩滿縣三百人詣闕請留勑許焉後除晉安王府參軍詹事徐勉舉杳及顧協等五人入華林撰遍略書成以本官兼廷尉正以足疾解職因著林庭賦王僧孺見而歎曰郊居以後無復此作纍遷尚書儀曹郎僕射徐勉以臺閣文議専委杳焉出為餘姚令在縣清潔湘東王繹發教褒美之大通元年為步兵校尉兼東宫通事舍人昭眀太子謂杳曰酒非卿所好而為酒府之職政為卿不愧古人耳太子有瓠食器因以賜焉曰卿有古人之風故遺卿古人之器俄有勑代裴子野知著作郎事昭眀太子薨新宫建舊人例無停者敕特留杳焉僕射何敬容奏轉杳王府咨議武帝曰劉杳須先經中書仍除中書侍郎尋為平西湘東王咨議參軍兼舍人著作如故遷尚書左丞大同二年卒年五十杳治身清儉無所嗜好不自伐不論人短長及覩釋氏經常行慈忍居母憂後便長斷腥羶持齋蔬食及臨終遺命斂以法服載以露車還葬舊墓隨得一地容棺而已不得設靈筵及祭醊其子遵而行之撰要雅五卷楚辭草木疏一卷髙士傳二卷東宫新舊記三十卷古今四部書目五卷文集十五卷並行於世杳與兄霽弟歊俱知名霽有至性列在孝友傳歊不娶不仕隱居求志在隱逸傳何遜字仲言東海郯人也曾祖承天宋御史中丞自有傳父洵齊太尉中兵參軍遜八嵗能賦詩弱冠州舉秀才南郡范雲見其對䇿大相稱賞因結忘年交自是一文一詠雲輒嗟賞謂所親曰頃觀文人質則過儒麗則傷俗其能含清濁中今古見之何生矣沈約亦愛其文嘗謂遜曰吾每讀卿詩一日三復猶不能已其為名流所稱如此天監中起家奉朝請除安成王記室王愛之隨府江州還兼尚書水部郎南平王復引為賓客掌記室事後薦之武帝與吳均俱進幸後稍失意帝曰吳均不均何遜不遜若吾有朱異信則異矣自是疏隔希復得見卒於仁威廬陵王記室初遜為南平王所知深被恩禮及聞遜卒命迎其柩而殯藏焉并餼其妻子東海王僧孺集其文為八卷初遜文章與劉孝綽並見重於世謂之何劉元帝著論論之云詩多而能者沈約少而能者謝眺何遜遜從叔僴字彥夷亦以文才著聞宦遊不逹作拍張賦以喻意末曰東方曼倩發憤於侏儒遂與火頭食子稟賜不殊位至臺郎時有會稽虞騫工為五言名與遜相埓官至王國侍郎後又有會稽孔翁歸濟陽江避並為南平王大司馬府記室翁歸工為詩避博學有思理注論語孝經二人並有文集劉顯字嗣芳沛國相人也父鬷字仲翔博識強正以名行自居幼為外祖臧質所鞠養質既富盛恆有音樂質亡後母沒十許年鬷每聞絲竹之聲未嘗不歔欷流涕天監初終於晉安內史顯幼而聰敏六嵗能誦吕相絶秦賈誼過秦琅邪王思逺吳國張融見而稱賞號曰神童族父瓛儒學有重名官至尚書左丞齊史有傳瓛卒無嗣齊武帝詔顯為後時年十八嵗本名頲齊武以字難識改名顯天監初舉秀才解褐中軍臨川王行參軍俄署法曹顯好學博涉多通任昉嘗得一篇缺簡文字零落莫能識者顯云是古文尚書所刪逸篇昉檢周書果如其説昉因大相賞異丁母憂服闋尚書令沈約時領太子少傅引為少傅五官約為丹陽尹嘗命駕造焉於坐䇿顯經史十事顯對其九約曰老夫昏忘不可受䇿雖然聊試數事不可至十顯問其五約對其二陸倕聞之擊席喜曰劉郎可謂差人雖吾家平原詣張壯武王粲謁蔡伯喈必無此對其為名流推賞如此五兵尚書傅昭掌著作撰國史顯自兼廷尉正被引為佐及革選尚書五都顯以本官兼吏部郎遷儀曹郎嘗為上朝詩沈約見而美之時郊居宅新成因命工書人題之于壁後兼中書通事舍人再遷驃騎鄱陽王記室兼中書舍人後為中書郎舍人如故顯與江東裴子野南陽劉之遴吳郡顧協連職禁中遞相師友時人莫不慕之顯博聞強識過於裴顧時波斯國獻生師子帝問曰師子有何色顯曰黃師子超不及白師子超魏人獻古器有隱起字莫能識者顯案文讀之無有滯礙考校年月一字不差武帝甚嘉焉遷尚書左丞除國子博士時有沙門訟田帝大署曰貞有司未辨遍問莫知顯曰貞字文為與上人帝因忌其能出之後為雲麾邵陵王長史尋陽太守魏使李諧至聞之恨不相識歎曰梁德衰矣善人國之紀也而出之無乃不可乎王遷鎮郢州除平西府咨議參軍久在府不得志大同九年終于夏口時年六十三凡佐兩府並事驕王人為之憂而反見禮重友人劉之遴啓皇太子曰嘗聞夷叔栁惠不逄仲尼一言則西山餓夫東國黜士名豈施於後世不朽之事寄之題目顯今卜宅有日須鐫墓板略撰其事行今輒上呈太子乃為之製銘志葬於秣陵縣劉真長舊塋子莠恁臻臻早有名列在隋文苑傳顯從弟玨字仲寶形貌短小儒雅博洽善辭翰隨湘東王在蕃十餘年寵寄甚深當時文檄皆其所為位吏部尚書國子祭酒魏尅江陵入長安劉之遴字思貞南陽涅陽人也父虬髙尚不仕列在齊隱逸傳之遴八嵗能屬文虬曰此兒必以文興吾宗常謂諸子曰若比之顏氏之遴得吾之文由是州里稱之時有沙門僧惠有異識每詣虬必呼之遴小字曰僧迦福德兒握手而進之年十五舉茂才眀經對䇿沈約任昉見而異之吏部尚書王瞻嘗候任昉值之遴在坐昉謂瞻曰此南陽劉之遴學優未仕水鏡所宜瓢擢瞻即調為太學博士昉曰為之美談不如面試時張稷新除尚書僕射託昉為讓表昉令之遴代作操筆立成昉曰荆南秀氣果有異才後仕必當過僕御史中丞樂藹即之遴之舅憲臺奏彈皆令之遴草焉為荆州中從事簡文臨荆州仍遷宣惠記室之遴篤學明審博覽羣籍時劉顯韋稜並稱強記之遴每與討論咸不過也纍遷中書侍郎鴻臚卿出為南郡太守武帝謂曰卿母年德並髙故令卿衣錦還鄉盡榮養之理轉西中郎湘東王繹長史太守如故初之遴在荆府常寄居南郡廨忽夢前太守袁彖謂曰卿後當為折臂太守即居此中之遴後牛奔墮車折臂右手偏直不復得屈伸書則以手就筆歎曰豈黥而王乎周捨嘗戲之曰雖復並坐可橫肱政恐陋巷無枕後連相兩王再為此郡歷祕書監出為郢州行事之遴意不願出固辭曰去嵗命絶離巽不敢東下今年所忌又在西方武帝手勑曰朕聞妻子具孝衰於親爵祿具忠衰於君卿既內足理忘奉公之節遂為有司奏免後為都官尚書之遴好古愛竒在荆州聚古器數十百種有一器似甌可容一斛上有金錯字時人無能知者又獻古器四種於東宫其第一種鏤銅鴟夷榼二枚兩耳有銀鏤銘云建平二年造其第二種金銀錯鏤古樽二枚有篆銘云秦容成侯適楚之嵗造其第三種外國澡灌一口有銘云元封二年龜兹國獻其第四種古製澡盤一枚銘云初平二年造時鄱陽嗣王範得班固所上漢書真本獻之東宫皇太子令之遴與張纘到溉陸襄等參校同異之遴録其異狀數十事其大略云案古本漢書稱永平十六年五月二十一日己酉郎班固上而今本無上書年月日子又案古文敘傳號為中篇今本稱為敘傳載班彪事行而古本云彪自有傳又今本紀及表志不相合為次而古本相合為次總成三十八卷又今本外戚在西域後古本外戚次帝紀下又今本髙五子文三王景十三王孝武六子宣元六王雜在諸傳帙中古本諸王悉次外戚下在陳項傳上又今本韓彭英盧吳述云信惟餓𨽻布實黥徒越亦狗盜芮尹江湖雲起龍驤化為侯王古本述云淮隂毅毅伏劔周章邦之傑子實惟彭英仕為侯王雲起龍驤又古本第三十七卷解音釋義以助雅詁而今本無此卷也之遴好屬文多學古體與河東裴子野沛國劉顯恆共討論古籍因為交好時周易尚書禮記毛詩並有武帝義疏唯左氏傳尚闕之遴乃著春秋大意十科左氏一科三傳同異十科合三十事上之帝大悅優詔褒焉始武帝於齊代為荆府咨議時之遴父虬隱在百里洲早相知聞帝偶匱乏遣就虬換榖百斛時之遴在父側曰蕭咨議躓士云何能得舂願與其米虬從之及帝即位常懷之侯景初以蕭正德為帝之遴時落景所將使授璽紱之遴預知仍剃髮披法服乃免先是平昌伏挺出家之遴為詩嘲之曰傳聞伏不鬭化為支道林及之遴遇亂遂披染服時人笑之尋避難還鄉湘東王繹嘗嫉其才學聞其西上至夏口乃密送藥殺之不欲使人知乃自製志銘厚其賻贈前後文集五十卷子三逹字三善數嵗能清言及屬文州將湘東王繹聞之盛集賓客召而試之説義屬詩皆有理致年十二聽江陵令賀革講禮還仍覆述不遺一句年十八卒之遴深懷悼恨乃題墓曰梁妙士以旌之之遴弟之亨字嘉會年四嵗出後叔父嵩及長好學美風姿善占對武帝之臨荆州唯與虬談虬見之遴之亨帝曰之遴必以文章顯之亨當以功名著後州舉秀才除太學博士仍代兄之遴為中書通事舍人纍遷步兵校尉湘東王繹咨議參軍勑賜金䇿并賜詩焉大通六年出師南鄭詔湘東王節度諸軍之亨以司農卿為行臺承制途出本州北界總督衆軍杖節而西樓船戈甲甚盛老小緣岸觀曰是前舉秀才者鄉部偉之是行也大致尅復軍士有功皆録唯之亨為蘭欽所訟執政因而陷之故封賞不行但復本位而已久之帝讀陳湯傳恨其立功絶域而為文吏所詆宦者張僧允曰外間論者謂劉之亨類之帝感悟乃封為臨江子固辭不拜之亨美績嘉聲在朱異之右既不協懼為所害故美出之以代之遴為安西湘東王繹長史南郡太守上問朱異曰之亨代兄喜不兄弟因循豈直大馮小馮而已又謂尚書令何敬容曰荆州長史南郡太守皆是僕射出入今者之亨便是九轉在郡有異績吏民稱之卒官荆土懷之不復稱名號為大南郡小南郡子廣德亦好學負才任氣承聖中位湘東太守魏平荆州依于王琳琳平陳太建中歷河東太守卒官之亨弟之遲位荆州中從事史子仲威少有志氣頗涉文史承聖中為中書侍郎蕭莊稱尊號以為御史中丞隨莊終鄴中之遴從叔坦字德度仕齊歷孱陵令南中郎録事參軍所居以幹濟稱武帝起兵時輔國將軍楊公則為湘州刺史帥師赴夏口西朝議行州事者坦求行仍除輔國長史長沙太守行湘州刺史坦嘗在湘州多舊恩道迎者甚衆齊東昏遣安成太守劉希祖破西臺所選太守范僧簡於平都希祖移檄湘部於是始興內史王僧粲應之湘部諸郡悉皆蜂起州人咸欲泛舟逃走坦悉聚船焚之前湘州鎮軍鍾元紹潛應僧粲坦聞其謀偽為不知因理訟至夜城門遂不閉以疑之元紹未及發眀旦詣坦問其故久留與語密遣親兵收其家元紹在坐未起而收兵已報具得其文書本末元紹即首伏於坐斬之焚其文書餘黨悉無所問天監初論功封荔浦子三年遷西中郎長史蜀郡太守行益州事未至蜀道卒眀山賓字孝若平原鬲人也父僧紹髙尚不仕列在隱逸傳山賓七嵗能言名理十三博通經傳起家奉朝請兄仲璋痼疾家道屢空山賓乃行干祿後為廣陽令頃之去官會詔使公卿舉士左衛將軍江祏上書薦山賓才堪理劇齊眀帝不重學謂祏曰聞山賓談書不輟何堪官邪遂不用梁臺建遷右軍記室參軍掌吉禮時初置五經博士山賓首膺其選歷中書侍郎國子博士太子率更令中庶子天監十五年出為持節都督緣淮諸軍事北兖州刺史普通二年徴為太子右衛率加給事中遷御史中丞以公事左遷黃門侍郎四年遷散騎常侍領青冀二州大中正東宫新置學士又以山賓居之俄以本官兼國子祭酒初山賓為州時所部平陸縣不稔啓出倉米以贍貧民後刺史檢州曹失簿書以山賓為耗損有司追責籍其宅入官山賓不自理更市地造宅昭眀太子聞築室不就有令曰明祭酒雖出撫大蕃擁旌推轂珥金拖紫而常事屢空聞搆宇未成今送薄助并貽之詩曰平仲古稱竒夷齊昔擅美令則挺伊賢東秦固多士築室非道傍置宅歸仁里庚桑方有繼原生今易擬必來三徑人將招五經士山賓性篤實家中常乏困貨所乘牛既售受錢乃謂買主曰此牛經患漏蹄療差已久恐後脫發無容不相語買主遽追取錢處士阮孝緒聞之嘆曰此言足使還淳反朴激薄停澆矣五年又以本官假節攝北兖州事後卒官贈侍中諡曰質子山賓纍居學官甚有訓導之益然性頗踈通接於諸生多狎比人皆愛之所著吉禮儀注一百二十四卷禮儀二十卷孝經喪服義十五卷子震字興道亦傳父業位太子舍人尚書祠部郎餘姚令山賓弟少遐字處默亦知名位都官尚書簡文謂人曰我不喜得尚書更喜朝廷得人後拜青州刺史太清之亂奔魏仕北齊卒於太子中庶子子罕司空記室眀氏南渡雖晚並有名位自宋至梁為刺史者六人張充字延符吳郡吳人也祖演宋太子中舍人父緒齊國子祭酒緒附載其叔父南兖州刺史岱傳充好逸遊緒嘗告歸至吳始入西郭逄充出獵右臂鷹左牽狗遇緒船至便放紲脫鞲拜於水次緒曰一身兩役無乃勞乎充跪曰充聞三十而立今充二十九矣請至來嵗緒曰過而能改顔氏子有焉及眀年便修改多所該通尤眀老易能清言與從叔稷俱有令譽歷尚書殿中郎武陵王友時尚書令王儉當朝用事武帝皆取決焉儉方聚親賓充縠巾葛帔至便求酒言論放逸一坐盡傾及聞武帝欲以緒為尚書僕射儉執不可充以為恨因與儉書曰頃者路長霖霞韜晦涼暑未平想無虧攝充幸以漁釣之間鎌採之暇時復引軸以自娛逍遙乎前史從橫萬古動默之路多端紛綸百年升降之塗不一故金剛水柔性之别也圎行方止器之異也善御性者不違金水之質善為器者不易方圎之用充生平少長偶不以利欲干懷三十六年差得以棲貧自淡介然之志峭聳霜崖確乎之情峯橫海岸至如彯纓天閣既謝廊廟之華綴組雲臺終愧衣冠之秀實由氣岸疏凝情塗狷隔獨師懷抱不見許於俗人孤秀神崖每邅回於在世長羣魚鳥畢景松阿雖復王沒於訪圭之辰桂掩於搜芳之日泛濫於漁父之遊偃息於卜居之會如此而已充何識哉若夫驚巖罩日吐海逄天竦石崩尋分危落仭桂蘭綺靡叢雜於山幽松柏隂森相繚於澗側元卿於是乎不歸伯休亦以兹長往至於飛竿釣渚濯足滄洲獨浪煙霞髙卧風月悠悠琴酒岫遠誰來灼灼文言空擬方寸不覺鬱然千里路隔江川每至西風何嘗不歎丈人嵗路未強學優而仕道佐蒼生功橫海望可謂德盛當時孤松獨秀者也而茂陵之彥望冠蓋而長懷渭川之氓佇簪裾而竦歎得無惜乎充昆西百姓岱表一人蠶而衣耕而食不能事王侯覔知已造時人騁遊説容與於屠博之間其歡甚矣然舉世皆謂充為狂充亦何能與諸君道之哉是以披聞見掃心胸述平生論語默所可通夢交魂推襟送抱者唯丈人而已闕廷敻阻書莫能因儻遇樵夫妄塵執事儉以為脫略弗之重也仍以書示緒緒杖之一百沈約見其書嘆曰充始為之敗終為之成久之為司徒咨議參軍與琅邪王思遠同郡陸惠曉等並為司徒竟陵王賓客纍遷義興太守為政清淨吏民便之後為侍中武帝兵至建鄴東昏遇殺百官集西鐘下召充充不至武帝霸府建以充為大司馬咨議參軍天監初歷太常卿吏部尚書居選以平允稱再遷散騎常侍國子祭酒登堂講説皇太子已下皆至時王侯多在學執經以拜充朝服而立不敢當再遷尚書僕射出為吳郡太守下車恤貧老延故舊莫不欣恱卒於吳郡諡曰穆子子最嗣充從叔瓌字祖逸宋征北將軍南兖州刺史永之子也仕宋纍遷桂陽內史不欲先兄瑋處祿自免不拜後為司徒右長史通直散騎常侍驍騎將軍初瓌父永拒桂陽王休範於白下敗績阮佃夫等欲加罪齊髙帝固申眀之瓌由此感恩自結後遭父母喪還吳持服升明元年劉秉有異圖弟遐為吳郡潛相影響齊髙帝密遣殿中將軍卞白龍令瓌取遐諸張世有豪氣瓌宅中常有父時舊部曲數百遐召瓌委以軍事瓌偽受命與叔恕領兵十八人入郡斬之郡內莫敢動事捷髙帝以告左軍張沖沖曰瓌以百口一擲出手得盧矣即受吳郡太守鍚以嘉名封義城縣侯從弟融聞之與瓌書曰吳郡何晚何須王反聞之嗟驚乃是阿兄郡人顧皓陸間並少年未知名瓌並引為綱紀後並立名世以為知人齊建元元年改封平都候遷侍中與侍中沈文季俱在門下髙帝常謂曰卿雖我臣我視卿不異賾嶷等文季每還直器物皆遷瓌止朝服而已時集書每兼門下東省實多清貧有不識瓌者常呼為散騎出為吳興太守瓌以既有國秩不取郡奉髙帝勑上庫别藏其奉以表其清武帝即位為寧蠻校尉雍州刺史加都督徴拜左戶尚書加右軍將軍還後安陸王􅒺臨雍州行部登蔓山有野老求乞􅒺問何不事産業而行乞答曰張使君臨州州理物百姓家得相保後人政嚴故至行乞􅒺由是深加嗟賞後拜太常自謂間職輒歸家武帝曰卿輩未富貴謂人不與既富貴那復欲委去瓌曰陛下御臣等若養馬無事就間廄有事復牽來帝猶怒遂以為散騎常侍光祿大夫鬱林之廢朝臣列宫門參承眀帝瓌託腳疾不至海陵立眀帝疑外藩起兵以瓌鎮石頭督衆軍事瓌見朝廷多難遂常卧疾建武末屢啓求還吳見許居室豪富妓妾盈房或有譏其衰暮畜妓瓌曰我少好音律老而方解平生嗜欲無復一存唯未能遣此耳明帝疾甚防疑大司馬王敬則授瓌平東將軍吳郡太守以為之備及敬則反瓌遣兵迎拒於松江聞敬則軍鼓聲一時散走瓌棄郡逃人間事平乃還郡有司奏免官削爵永元初為光祿大夫三年武帝起兵東昏假瓌節戍石頭尋棄城還宫天監元年拜給事中右光祿大夫以腳疾拜於家四年卒瓌有子十二人常云中應有好者子率知名率字士簡性寬雅十二能屬文常日限為詩一篇或數日不作則追補之稍進作賦頌至年十六向作二千餘首有虞訥者見而詆之率乃一旦焚毁更為詩示焉託云沈約訥便句句嗟稱無字不善率曰此吾作也訥慙而退時陸少元家有父澄書萬餘卷率與少元善遂通書籍盡讀其書齊建武三年舉秀才除太子舍人與同郡陸倕陸厥幼相友狎嘗同載詣左衛將軍沈約遇任昉在焉約謂昉曰此二子後進才秀皆南金也卿可識之由此與昉友天監中為司徒謝掾直文德待詔省勑使抄乙部書又使撰古婦人事使工書人琅邪王琛吳郡范懷約等寫給後宫率取假東歸論者以為慠世率懼乃為待詔賦奏之甚見稱賞手勑答曰相如工而不敏枚臯速而不工卿可謂兼二子於金馬矣又侍宴賦詩武帝别賜率詩曰東南有才子故能服官政余雖慙古昔得人斯為盛率奏詩往反六首後引見於玉衡殿謂曰卿東南物望朕宿昔所聞卿言宰相是何人不從天下不由地出卿名家竒才若復以禮律為意便是其人祕書丞天下清官東南望胄未有為之者今以相處為卿定名譽尋以為祕書丞掌集書詔䇿四年禊飲華光殿其日河南國獻赤龍駒能拜伏善舞詔率與到溉周興嗣為賦武帝以率及興嗣為工其年父憂去職有父時妓數十人其善謳者有色貌邑子儀曹郎顧珖之從率求妓謳者不願遂為尼嘗因齋會率宅珖之乃飛書言尼與率姦南司以事聞武帝惜其才寢其奏然猶致時論服闋久之不仕七年除中權建安王中記室參軍俄直夀光省修丙丁部書抄纍遷晉安王宣惠咨議參軍率在府十年恩禮甚篤後為揚州别駕率雖歷居職務未嘗留心簿領及為别駕奏事武帝覽牒問之並無對但答云事在牒中帝不悅後歷黃門侍郎出為新安太守丁所生母憂卒率嗜酒不事事於家務尤忘懷在新安遣家僮載米三千石還宅及至遂耗大半率問其故答曰雀鼠耗率笑而言曰壯哉雀鼠竟不研問自少屬文七略及藝文志所載詩賦今亡其文者並補作之所著文衡十五卷文集四十卷行於世子長公率弟盾字士宣以謹重稱為無錫令遇劫問劫何須劫以刀斫其頰盾曰咄咄不易餘無所言於是生資皆盡不以介懷為湘東王記室出監富陽令廓然獨處無所用心身死之日家無遺財唯有文集并書千餘卷酒米數甕而已瓌弟稷字公喬幼有孝性所生母劉無寵遘疾時稷年十一侍養衣不解帶每劇則纍夜不寢及終毁瘠過於成人杖而後起見年輩幼童輒哽咽泣淚州里謂之純孝長兄瑋善彈筝稷以劉氏先執此伎聞瑋為清調便悲感頓絶遂終身不聽之性疏率朗悟有才略起家著作佐郎不拜父永及嫡母邱相繼殂逝六年廬于墓側齊永眀中為豫章王嶷主簿與彭城劉繪俱見禮接未嘗被呼名每呼為劉四張五以貧求為剡令略不視事多為小山之遊會山賊唐宇之作亂稷率厲部民保全縣境所生母劉先假葬於琅邪黃山建武中改申葬禮賻助委積於時雖不拒絶事畢隨以還之自幼及長數十年中嘗設劉氏神座出告反面如事生焉歷給事中黃門侍郎新興永寧二郡太守郡犯私諱改永寧為長寧永元末為侍中宿衛宫城武帝師至兼衛尉江淹出奔稷兼衛尉卿副王瑩都督城內諸軍事時東昏淫虐北徐州刺史王珍國就稷謀乃使直閣張齊行弒于含德殿稷乃召右僕射王亮等列坐殿前酉鐘下議遣國子博士范雲中書舍人裴長穆等使石頭城詣武帝帝以稷為侍中左衛將軍遷大司馬左司馬梁朝建為散騎常侍中書令及上即位封江安縣子位領軍將軍武帝嘗於樂夀殿內宴稷醉後多怨辭形於色帝時亦酣謂曰卿兄殺郡守弟弒其君袖提帝首衣染天血如卿兄弟有何名稱稷曰臣乃無名稱至於陛下不得言無勳東昏暴虐義師亦來伐之豈在臣而已帝捋其鬚曰張公可畏人中丞陸果彈稷云領軍張稷門無忠貞官必險逹弒君害主業以為常武帝留中竟不問纍遷尚書左僕射帝將幸稷宅以盛暑留幸僕射省舊臨幸供具皆酬太官饌直帝以稷清貧手詔不受宋時武帝經造張永至稷三世並降萬乘論者榮之稷雖居朝右每慙口實乃名其子伊字懷尹霍字希光畯字農人同字不見見字不同以旌其志既懼且恨乃求出許之出為青冀二州刺史不得志常閉閣讀佛經禁防寬弛僚吏頗致侵擾州人徐道角等夜襲州城乃害之有司奏削爵土稷性眀烈善與人交歷官無畜積奉祿皆頒之親故家無餘財為吳興太守下車存問遺老引其子孫置之右職政稱寬恕初去郡就僕射徴道由吳鄉人候稷者滿水陸稷單裝徑還都下人莫之識其率素如此長女楚媛適會稽孔氏無子歸至家逄稷見害以身蔽刃先父而卒稷與族兄充融卷俱知名時人見云充融卷稷為四張卷字令遠少以和理著稱能清言位都官尚書天監初卒稷子嵊為侯景所害列在忠義傳褚翔字世舉河南陽翟人曾祖淵齊太宰佐命功臣自有傳祖蓁贈太常父向字景政年數嵗父母相繼亡沒哀毁若成人親表異之及長淹雅有器量位長兼侍中向風儀端正眉目如畫每公庭就列為衆所瞻望仕梁卒於北中郎廬陵王長史翔初為國子生舉髙第纍遷宣城王主簿中大通五年武帝宴羣臣樂遊苑别詔翔與王訓為二十韻詩限三刻成翔於坐立奏帝異焉即日轉宣城王文學俄遷友特宣城王友文學加正王二等翔超為之時論美焉出為義興太守翔在政潔已省繁苛去浮費百姓安之郡之西亭有古樹積年枯死翔至郡忽更生枝葉百姓咸以為善政所感及秩滿吏民詣闕請之勑許焉尋徴為吏部郎百姓無老少追送出境涕泣拜辭翔居小選公清不為請屬易意號為平允遷侍中太清二年遷守吏部尚書侯景圍宫城翔於圍內丁母憂以毁卒翔少有孝性為侍中時母疾篤請沙門祈福中夜忽見戶外有異光又聞空中彈指及曉疾遂愈或以翔精誠所致云翔族父球字仲寶宋散騎常侍裕之元孫也祖曖太宰參軍父繢太子舍人球少孤貧篤志好學有才思宋建平王景素元徽中誅滅唯有一女存故吏何昌宇王思逺聞球清立以此女妻之仕齊為溧陽令在縣清白資公奉而已仕梁歷都官尚書通直散騎常侍祕書監領著作司徒右長史常侍著作如故自魏孫禮晉荀組以後台司加貂始自球也後為散騎常侍光祿大夫加給事中卒宗夬字明揚南陽涅陽人也祖炳名列隱逸傳父繁西中郎咨議參軍夬少勤學有局幹仕齊為驃騎行參軍時竟陵王子良集學士於西邸並見圗畫夬亦預焉齊鬱林之為南郡王居西州使夬管書記以筆札貞正見許故任焉時與魏和通勑夬與尚書殿中郎任昉同接魏使皆時選也及文惠太子薨王為皇太孫夬仍管書記太孫即位多失德夬頗自疏得為秣陵令遷尚書都官郎少帝見誅舊寵多被其災唯夬與傅昭以清正免齊明帝以為郢州中從事以父老去官南康王為荆州刺史引為别駕武帝起兵遷西中郎咨議時西土位望唯夬與同郡樂藹劉坦為州人所推服故領軍蕭穎胃深相委仗武帝受禪歷太子右衛率五兵尚書參掌大選天監三年卒子曜卿袁昂字千里陳郡陽夏人也父顗宋雍州刺史顗附載其伯祖光祿大夫湛傳泰始初顗自雍州舉兵奉尋陽王子勛為帝軍敗身死家滅昂藏於沙門沙門將以出關關吏疑非常人沙門杖而語之遂免或云顗敗時昂年五嵗乳媪携抱匿于廬山州郡於野求之於乳媪匿所見一虎因去遂免會赦得出猶徙晉安在南唯以勤學為事至元徽中聽還時年十五初顗敗傳首建鄴藏於武庫以漆題顗名以為志至是始還之昂號慟嘔血絶而復蘇以淚洗所題漆字皆滅人以為孝感葬訖更制服廬于墓次從兄彖常撫視抑譬之昂容質修偉冠絶人倫以父亡不以理終身不聽音樂後與彖同見從叔司徒粲粲謂彖曰昂幼孤而能至此故知名器自有所在起家太子舍人為王儉鎮軍府功曹史儉後為丹陽尹於後堂獨引見昂儉指北堂謂昂曰卿必居此纍遷黃門郎昂本名千里齊永眀中武帝謂曰昂昂千里之駒在卿有之今改卿名為昻即字千里後為衛軍武陵王長史丁母憂哀毁過禮服未期而從兄彖卒昂幼孤為彖所養昂乃制期服人有怪而問之昂致書喻之曰昔馬稜與從弟毅同居毅亡稜為心服三年雖禮無明據而事有先例由是人始服之後為御史中丞時尚書令王晏弟詡為廣州多納贓貨昂依事奏劾不憚權要當時號為正直初昂為太子洗馬齊明帝為領軍欽昂風素頻降駕焉及踐阼奏事多留與語謂曰我昔以卿有美名親經相詣昂答曰陛下在田之日遂蒙三顧草廬帝甚悅尋遷豫章內史丁所生母憂去職以喪還江路風潮暴駭昂乃縳衣著柩誓同沉溺及風止餘船皆溺唯昂船獲全咸謂精誠所致葬訖起為吳興太守齊永元末武帝兵起州郡守宰皆望風降款昂獨拒境不受命帝手書喻之使降昂不從建康平昂舉哀慟哭時帝使豫州刺史李元履巡撫東土勑元履曰袁昻道素之門世有忠節天下須共容之勿以兵威陵辱元履至宣旨昂亦不請降開門徹備而已及至都帝亦不問其過天監二年以為臨川王後軍參軍昻奉啓謝恩陳誠帝答曰朕遺射鈎卿無自外尋為侍中遷吏部尚書固讓徙左民尚書帝謂曰齊眀帝用卿為黑頭尚書我用卿為白頭尚書良以多愧對曰臣生四十七年于兹矣四十以前臣之自有七年以後陛下所養七嵗尚書未為晚逹帝曰士固不妄有名十五年為尚書左僕射尋為尚書令時僕射徐勉勢傾天下在昻處宴賓主甚歡勉求昻出內人傳杯昻良久不出勉苦求之昻不獲已命出五六人始至齋閣昻謂勉曰我無少年妾老嫗並是兒母非王妃母便是主大家今令問訊卿勉聞大驚求止方知昻為貴昻在朝謇諤世號宗臣昭眀太子薨立晉安王綱為皇太子昻獨表言宜立昭眀長息歡為皇太孫雖不見用擅聲朝野自是告老乞骸骨不干時務昻雅有知人之鑒遊處不雜入其門者號為登龍門大通中位司空大同六年薨時年八十詔即日舉哀初昻臨終遺疏不受贈諡勑諸子不得言上行狀及立銘志凡有所須悉皆停省脫有贈官慎勿祗奉諸子纍表陳奏詔不許贈本官賜東園祕器朝服錢帛諡曰穆正公有集二十卷初昻之歸梁有馬仙琕者亦以義烈著名仙琕字靈馥扶風郿人父伯鸞宋冠軍司馬仙琕少以果敢聞遭父喪毁瘠過禮負土成墳手植松柏起家郢州主簿纍功為龍驤將軍南汝隂譙二郡太守齊眀帝永明中魏將王肅侵邉仙琕力戰以寡克衆遷寧朔將軍豫州刺史武帝起兵四方響應帝使仙琕故人姚仲賓説之仙琕先為設酒乃斬於軍門以徇帝又遣其族叔懷逺説之仙琕曰大義滅親又命斬之懷逺號泣軍中為請乃免武帝至新林仙琕猶持兵於江西口抄糧運建康城陷仙琕舉哀號哭謂衆曰我受人任寄義不容降今衆寡不侔勢必屠戮公等雖無二心其如親老何我為忠臣君為孝子各盡其道不亦可乎於是悉遣城內兵出降餘留數十壯士閉門獨守俄而兵入圍之數十里仙琕令士皆持滿兵不敢近日晚乃投弓曰諸君但來見取我義不降乃檻送建康至石頭而脫之帝使待袁昻至俱入曰使天下見二義士帝勞之曰射鉤斬袪昔人所忌卿勿以戮使斷運茍自嫌絶也仙琕謝曰小人如失主犬後主飼之便復為用帝笑而美之俄而喪母帝知其貧給賻甚厚仙琕號泣謂弟仲父曰蒙大造之恩未獲上報今復荷殊澤當與爾以心力自效耳天監四年王師北討仙琕每戰勇冠三軍當其衝者莫不摧破與諸將論議口未嘗言功人問其故仙琕曰大丈夫為時所知當進不求名退不逃罪乃平生願也何功可論為南義陽太守纍破山蠻郡境清謐以功封浛洭縣伯遷司州刺史進號貞威將軍魏豫州人白早生殺刺史以懸瓠來降武帝使仙琕赴之又遣直閣將軍武會超馬廣率衆為援仙琕進頓楚王城遣副將齊茍兒助守懸瓠魏中山王英攻懸瓠執齊茍兒進禽馬廣送洛陽仙琕不能救會超等亦相次退散魏軍進據三聞仙琕坐徴還為雲騎將軍十年胊山民殺琅邪太守劉晣以城降魏詔假仙琕節討之魏徐州刺史盧昶以衆十萬赴焉仙琕纍戰破之昶走仙琕縱兵乘之魏衆免者十一二收其兵糧牛馬器械不可勝數振族還京師進爵浛洭縣侯十一年遷持節督豫北豫霍三州諸軍事信武將軍豫州刺史領南汝隂太守仙琕自為將及居州郡能與士卒同勞逸身衣不過布帛所居無幃幕衾屏行則飲食與厮養最下者同兵在邉境常單身潛入敵境伺知壁壘村落險要處故所攻戰多尅捷士卒亦甘心為用帝雅愛仗之卒於州贈左衛將軍諡曰剛初仙琕幼名仙婢及長以婢名不典乃以玉代女云子巗夫嗣昻子君正字世忠少聰敏年數嵗父疾晝夜不眠専侍左右家人勸令暫卧答曰官既未差眠亦不安歷位太子庶子君正美風儀善自居處以貴公子早得時譽為豫章內史性不信巫邪有師萬世榮稱道術為一郡巫長君正在郡小疾主簿熊嶽薦之師云須疾者衣為信命君正以所著襦與之事竟取襦云神將送與北斗君君正使檢諸身於衣裏獲之以為亂政即刑於市而焚神宇一郡無敢行巫遷吳興太守侯景亂率數百人隨邵陵王綸赴援及臺城陷還郡君正當官蒞事有名稱而畜聚財産服玩靡麗賊遣張太墨攻之新城戍主戴僧易勸令拒守已以戌兵自外擊之君正不能決吳人陸映公等懼不濟賊種族其家勸之迎賊君正性怯懦乃送米及牛酒郊迎賊賊掠奪其財物子女因是感疾卒子樞列在陳史庾蓽字休野新野人也父琛之宋雍州刺史蓽弱冠為州主簿舉秀才仕齊為驃騎功曹史博涉羣書有口辨永明中與魏和親以蓽兼散騎常侍報使還拜散騎侍郎知東宫管記事後遷荆州别駕前後紀綱皆致富饒蓽再為之清身率下杜絶請託布被蔬食妻子不免飢寒明帝聞而嘉焉手詔褒美州里榮之初梁州人益州刺史鄧元起功勳甚著名地卑瑣願名挂士流時始興忠武王憺為州將元起位已髙而解巾不先州官則不為鄉里所悉元起乞上籍出身州從事憺命蓽用之蓽不從憺大怒召蓽責之曰元起已經我府卿何為茍惜從事蓽曰府是尊府州是蓽州宜須品藻憺不能折遂止武帝平京邑霸府建為會稽郡丞行郡府事時承雕弊之後百姓凶荒米斗至數千民多流散蓽撫循甚有理唯守公祿清節愈勵至有經日不舉火太守永陽王聞而饋之蓽謝不受天監元年卒停尸無以斂柩不能歸武帝聞之詔賜絹百匹榖五百斛初蓽為西楚望族兄子果之又有寵於齊武帝蓽早歷顯官鄉人樂藹有幹用素與蓽不平互相陵競藹事齊豫章王嶷嶷薨藹仕不得志自步兵校尉求助戌歸荆州時蓽為州别駕益忽藹及武帝踐阼藹以西朝勳為御史中丞蓽始得會稽行事既恥之矣會職事微有譴帝以藹其鄉人也使宣旨誨之蓽更大憤遂發病卒子喬復仕為荆州别駕時元帝為荆州刺史而州人范興話以寒賤仕叨九流選為主簿又皇太子令及之故元帝勒喬聽興話到職及屬元日府州朝賀喬不肯就列曰庾喬忝為端右不能與范興話為鴈行元帝聞之乃進喬而停興話興話羞慙還家憤卒世以喬為不墜家風喬子敻少聰慧家富於財好賓客食必列鼎又狀貌豐美頥頰開張人皆謂敻必為方伯無餒乏之慮及魏尅江陵卒致餓死時又有水軍都督褚羅面甚尖危有從理入口竟保衣食而終庾於陵字子介南陽新野人也後徙居江陵遂為江陵人父易髙尚不仕當世名在齊隱逸傳兄黔婁有至性列在孝友卷中於陵幼而聰慧七嵗能言元理及長清警博學有才思齊隨王子隆為荆州召為主簿使與謝朓宗夬抄撰羣書子隆代還又以為送主簿子隆為明帝所害僚吏畏避莫至於陵獨留經理喪事永元末除東陽遂安令為民吏所稱天監初為逮康獄平遷尚書功論郎待詔文德殿後兼中書通事舍人拜太子洗馬舊事東宫官屬通為清選洗馬掌文翰尤其清者近代用人皆取甲族有才望者時於陵與周捨並擢充此職武帝曰官以人清豈限甲族時論以為美纍遷中書黃門侍郎舍人如故後終於鴻臚卿領荆州大中正卒有文集十卷弟肩吾字慎之八嵗能賦詩特為兄於陵所友愛初為晉安王國常侍王每徙鎮肩吾常隨府在雍州被命與劉孝威江伯搖孔敬通申子悅徐防徐摛王囿孔鑠鮑至等十人抄撰衆籍號髙齋學士王為皇太子兼東宫通事舍人後為安西湘東王府録事咨議參軍太子率更令中庶子簡文開文德省置學士肩吾子信摛子陵吳郡張長公北地傅𢎞東海鮑至等並充其選齊永明中王融謝朓沈約等文章始用四聲以為新變至是轉拘聲韻彌尚麗靡復踰於往時時簡文與湘東王書論之曰比見京師文體懦鈍殊常競學浮疏爭事闡緩既殊比興正背風騷若夫六典三禮所施則有地吉凶嘉賓用之則有所未聞吟詠情性反擬內則之篇操筆捨志更模酒誥之作遲遲春日翻學歸藏湛湛江水遂同大傳吾既拙于為文不敢輕有掎托但以當世之作歷萬古之才人逺則揚馬曹王近則潘陸顏謝觀其遣辭用心了不相似若以今文為是則昔賢為非若以昔賢可稱則今體可棄俱為盡合則未之敢許又時有效謝康樂裴鴻臚文者亦頗有惑焉何者謝客兒吐言天拔出於自然時有不拘是其糟粕裴氏乃是良吏之才了無篇什之美是為學謝則不屆其精華但得其冗長師裴則義絶其所長唯得其所短謝故巧不可揩裴亦質不宜慕故胸馳臆斷之侣好名忘實之類沒羽謝生豈三千之可及伏膺裴氏懼兩唐之不傳故玉暉金銑反為拙目所嗤巴人下俚更合郢中之聽陽春髙而不和妙聲絶而不尋竟不精討錙銖覆量文質有異巧心終愧妍耳是以握瑜懷玉之士瞻鄭邦而知退章甫翠履之人望閩鄉而歎息詩既若此筆又如之徒以煙墨不言受其驅染紙楮無情在其搖襞甚矣哉又章橫流一至於此至如近世謝朓沈約之詩任昉陸倕之筆斯文章之冠冕述作之楷橫張士簡之賦周升逸之辨亦成佳手難可復遇文章未墜必有英絶領袖之者非弟而誰每欲論之無可與晤思吾子建一共商榷辨兹清濁使如涇渭論兹月旦類彼汝南朱白既定雌黃有别使夫懷鼠知慙濫竽自恥相思不見我勞如何及簡文即位以肩吾為度支尚書時上流藩鎮並據州拒侯景景矯詔遣肩吾使江州喻當陽公大心大心乃降賊肩吾因逃入東後賊宋子仙破會稽購得肩吾欲殺之先謂曰吾聞汝能作詩今可即作若能將貸汝命肩吾操筆便成辭采甚美子仙乃釋以為建昌令仍間道奔江陵歷江州刺史領義陽太守封武康樂侯卒贈散騎常侍中書令子信後周有傳在文苑目中蔡撙字景節濟陽考城人也父興宗宋光祿大夫附載祖尚書廓傳撙少方雅退默與第四兄寅俱知名仕齊位給事黃門侍郎丁母憂廬于墓側齊末多難服闋因居墓所除太子中庶子太尉長史並不就梁臺建為侍中遷臨海太守公事左遷太子中庶子復為侍中出為吳興太守初撙在臨海百姓楊元孫以婢采蘭貼與同里黃權約生子酬乳哺直權死後元孫就權妻吳贖婢母子五人吳背約不還元孫訴郡撙判還本主吳能為巫出入撙內以金釧賂撙妾遂改判與吳元孫撾登聞鼓訟之為有司所劾時撙已去郡雖不坐而常以為恥撙口不言錢在吳興不飲郡井齋前自種白葵紫茄以為常餌詔褒其清加信武將軍武帝將為昭眀太子納妃意在謝氏袁昻曰當今貞素簡勝性有蔡撙乃遣吏部尚書徐勉詣之停車三通不報勉笑曰當須我召也遂納授刺乃入天監九年宣城郡吏吳承伯挾祅道聚衆攻宣城殺太守朱僧勇轉寇吳興吏民並請避之樽堅守不動命衆出戰遂破賊斬承伯餘黨悉平纍遷吏部尚書居選𢎞簡有名稱又為侍中領祕書監武帝嘗謂曰卿門舊尚有堪事者多少撙曰臣門客沈約范岫各已被升擢此外無人約時為太子少傅岫為右衛將軍撙風骨梗正氣調英嶷當朝無所屈讓嘗奏用琅邪王筠為殿中郎武帝嫌不取參掌通署乃推白牒於香橙地下曰卿殊不了事撙正色俯身拾牒起曰臣謂舉爾所知許允已有前事既是所知而用無煩參掌署名臣撙少而仕宦未嘗有不了事之目因捧牒直出便命駕而去仍欲抗表自解帝尋悔取事為畫勑帝嘗設大臣餅撙在坐帝頻呼姓名撙竟不答食餅如故帝覺其負氣乃改喚蔡尚書撙始放筯執笏曰爾帝曰卿向何聾今何聰對曰臣預為右戚且職在納言陛下不應以名垂喚帝有慙色性甚疑隔幕自居遇女為昭明太子妃自詹事以下咸來造謁往往稱疾謝遣之及其引進但寒暄而已此外無復餘言後為中書令卒於吳郡太守諡曰康子司空袁昻嘗謂諸賓曰自蔡侯卒不復更見此人其為名輩所知如此子彥深宣城內史彥深弟彥髙給事黃門侍郎彥髙子凝列在陳史江蒨字彥摽濟陽考城人也曾祖湛宋左光祿大夫父斆齊贈散騎常侍太常卿自有傳蒨幼聰警讀書過口便能諷誦選為國子生通尚書舉髙第起家祕書郎纍遷廬陵王主簿居父憂以孝聞廬于墓側齊明帝遣齋仗二十人防之墓所服闋纍遷建安內史武帝起兵遣寧朔將軍劉諓之為郡蒨拒之及建鄴平蒨坐禁錮俄被原歷太尉臨川王長史尚書吏部郎領右軍蒨方雅有風格僕射徐勉以重權自處在位者莫不為之屈惟蒨及王規與抗禮勉因蒨門客翟景為子繇求蒨女昏蒨不答景再言之乃杖景四十由是與勉忤除散騎常侍不拜是時勉又為子求蒨弟葺及王泰女二人又拒之葺為吏部郎坐杖曹中幹免官泰以疾假出宅乃遷散騎常侍皆勉意也初天監六年詔以侍中常侍並侍帷幄分門下一局入集書其官品視侍中而非華胄所悅故勉斥泰為之蒨尋遷司徒左長史初王泰出閣武帝謂勉云江蒨資歷應居選部勉曰蒨有眼患又不悉人物乃止遷光祿大夫卒諡曰肅蒨好學尤悉朝儀故事撰江左遺典三十卷未就卒文集十五卷蒨弟曇字彥德少學涉有器度位侍中太子詹事承聖初卒曇弟祿字彥遐幼篤學有文章工書善琴形貌短小神眀俊發位太子洗馬湘東王録事參軍以氣陵府王王深憾焉後廬陵威王續代為荆州留為驃騎咨議參軍獻書告别王答書乃致恨祿先為武寧郡頗有資産積錢於壁壁為之倒迮銅物皆鳴人戲之曰所謂銅山西傾洪鐘東應者也湘東王恨之既深以其名祿改字曰榮財以志其忿後為唐侯相卒撰列仙傳十卷行於世及井挈臯木人賦敗船詠並以自喻子徽亦有文采而清狂不慧常以父為戲蒨子紑有至性名在孝友傳紑子總陳尚書令列在陳史周捨字升逸汝南安成人也父顒齊國子博士兼著作自有傳捨幼聰頴顒異之臨卒謂曰汝不患不富貴但當持之以道德既長博學多通尤精義理善誦詩書音韻清辨臨文諷説其言如注弱冠舉秀才起家齊太學博士從兄綿為剡縣贓汙不少籍沒資財捨乃推宅助焉建武中魏人吳苞南歸有儒學尚書僕射江祏招苞講捨造坐折苞辭理遒逸由是名為口辨王亮為丹陽尹聞而悅之辟為主簿政事多委焉遷太常丞武帝即位博求異能之士吏部尚書范雲與顒素善重捨才器言之於帝召拜尚書祠部郎時天下草創禮儀損益多自捨出先是帝與諸王及吳平侯書皆云弟捨立議引武王周公故事皆曰汝從之纍遷鴻臚卿時王亮得罪歸家故人莫至捨獨敦恩舊及亮卒身營殯葬時人稱之遷尚書吏部郎太子右衛率右衛將軍雖居職屢徙而常留省內罕得休下國史詔誥禮儀法律軍旅謀謨皆兼掌之日夜侍上豫機密二十餘年未嘗暫離左右帝以為有公輔器初范雲卒僉以沈約允當樞管帝以約輕易不如徐勉於是勉捨同參國政勉小嫌中廢捨専掌𣙜轄雅量不及勉而清簡過之兩人俱稱賢相議國史疑文帝紀傳之名捨以為帝紀之籠百事如乾象之包六爻今若追而為紀則事無所包若直書功德則傳而非紀應於上紀之前略有仰述從之捨占對辨捷嘗居直廬語及嗜好裴子野言從來不嘗食薑捨應聲曰孔稱不徹裴乃不嘗一坐皆悅捨與人泛論談謔終日不絶而無一言漏泄機事衆尤服之性儉素衣服器用居處牀席如布衣之貧者每入官府雖廣厦華堂閨閣重邃捨居之則塵埃滿積以荻為障壞亦不治歷侍中太子詹事普通五年南津校尉郭祖深獲始興相白渦書餉捨衣履及婢以聞坐免官以右驍衛將軍知詹事卒上臨哭哀動左右追贈侍中護將軍諡諡曰簡子初帝鋭意中原羣臣咸言不可唯捨贊成之大通中纍獻捷帝思其功下詔述其德美以為往者南司白渦之劾恐外議謂朕有私致此黜免追愧若人一介之善可量加褒異以旌善人捨又集二十卷二子𢎞義𢎞信弟子𢎞正𢎞讓𢎞直皆知名列在陳史王僧孺字僧孺東海郯人魏衛將軍肅八世孫也曽祖雅晉左光祿大夫儀同三司祖凖之宋司徒左長史父延任員外常侍未拜卒僧孺幼聰慧年五嵗便機警初讀孝經問授者曰此書何所述曰論忠孝二事僧孺曰若爾願常讀之又有餽其父冬李先以一與之僧孺不受曰大人未見不容先嘗七嵗能讀十萬言及長篤愛墳籍家貧常傭書以養母所寫既畢諷誦亦通仕齊為大學博士尚書僕射王晏深相賞好晏為丹陽尹召補功曹使撰東宫新記司徒竟陵王子良開西邸招文學僧孺與太學生虞羲邱國賔蕭文琰邱令揩江洪劉孝孫並以善辭藻遊焉而僧孺與髙平徐夤俱為學林文惠太子聞其名欲以為宫僚乃召入直崇明殿文惠薨出為晉安郡丞仍除候官令建武初有詔舉士始安王遙光表薦之曰前候官令王僧孺年三十五理尚棲約知思悟敏既筆耕為養亦傭書成學至乃照螢瑩雪編蒲緝栁先言往行人物雅俗甘泉遺儀南宫故事畫地成圖抵掌可述豈直鼮鼠有必對之辨竹書無落簡之謬訪對不休質疑斯在於是除尚書儀曹郎遷書侍御史出為錢塘令初僧孺與樂安任昉遇於竟陵王西邸以文學會友及將之縣昉贈詩曰唯子見知唯余知子觀行視言要終猶始敬之重之如蘭如芷形應影隨曩行令止百行之首立人斯著子之有之誰毁誰譽修名既立老至可遽誰其執鞭吾為子御劉略班藝虞志荀録伊昔有懷交相欣朂下帷無倦并髙有屬嘉爾晨登惜余夜燭其為士友推重如此天監初除臨川王後軍記室待詔文德省出為南海太守南海俗殺牛曾無限忌僧孺至便禁斷又外國舶物髙涼生口及海舶每嵗數至皆外國賈人以通貿易舊時州郡以半價就市回買而即賣其利數倍歷政以為常僧孺歎曰昔人為蜀郡長史終身無蜀物吾欲遺子孫者不在越裝並無所取視事期月聲績有聞詔徴將還郡中道俗六百人詣闕請留不許至拜中書侍郎領著作復直文德省撰中表簿及起居注遷尚書左丞俄兼御史中丞頃之即真僧孺幼貧其母鬻紗布以自業嘗携僧孺出至市道遇中丞鹵簿驅迫墜于溝中及是拜日前騶清道僧孺悲感不自勝是時武帝製春景明志詩五百字敕在朝詞人沈約以下同作帝以僧孺詩為工歷少府卿尚書吏部郎參大選請謁不行出為仁威南康王長史蘭陵太守行府州國事初帝問僧孺妾媵之數對曰臣室無傾視及在南徐州友人以妾寓之行還妾遂懷孕為王典籖湯道愍所紏僧孺遂被逮詣建康南司奉箋辭府坐免官久之不調友人廬江何炯猶為王府記室僧孺乃與炯書以見其意後為安成王參軍事鎮西中記室參軍僧孺工屬文善楷𨽻多識古事侍郎金元起欲注素問訪以砭石僧孺答曰古人當以石為針必不用鐡説文有此砭字許慎云以石刺病也東山經髙氏之山多針石郭璞云可以為砭針春秋美疢不如惡石服子慎注云石砭石也季世無復佳石故以鐵代之爾轉北中郎咨議參軍入直西省知撰譜事先是尚書令沈約以為晉咸和初蘇峻作亂文籍無遺後起咸和二年以至于宋所書並皆詳實並在下省左户曹前廂謂之晉籍有東西二庫此籍既並精詳實可寶惜位官髙卑皆可依案宋元嘉二十七年始以七條徴發既立此科人姦互起偽狀巧籍嵗月滋廣以至于齊患其不實於是東堂校籍置郎令史以掌之競行姦貨以新換故昨日卑細今日便成士流凡此姦巧並在愚下不辨年號不識官階或注隆安在元興之後或以義熙在寧康之前此時無此府此時無此國元興唯有三年而猥稱四五詔書甲子不與長歷相應校籍諸郎亦所不覺不才令史固自忘言臣謂宋齊二代士庶不分雜役減闕職由於此竊以晉籍所餘宜加寶愛武帝以是留意譜籍州郡多離其罪因詔僧孺改定百家譜始晉太元中員外散騎侍郎平陽賈弼篤好簿狀乃廣集衆家大搜羣族所撰十八州一百一十六郡合七百一十二卷凡諸大品略無遺闕藏在祕閣副在左户及弼子太宰參軍匪之匪之子長水校尉深世傳其業太保王𢎞領軍將軍劉湛並好其書𢎞日對千客不犯一人之諱湛為選曹始撰百家以助銓序而傷於寡略齊衛將軍王儉復加去取得繁省之𠂻僧孺之撰選范陽張等九族以代鴈門解等九姓其東南諸族别為一部不在百家之數焉普通二年卒年五十八僧孺好墳籍聚書至萬餘卷率多異本與沈約任昉家書相埒少篤志精力於書無所不覩其文麗逸多用新事人所未見者世重其富博僧孺集十八州譜七百一十卷百家譜集抄十五卷東南譜集抄十卷文集三十卷兩臺彈事不入集內别為五卷及東宫新記並行於世虞羲字士光會稽餘姚人盛有才藻卒於晉安王侍郎邱國賔吳興人以才志不遇著書以譏揚雄蕭文琰蘭陵人邱令楷吳興人江洪濟陽人竟陵王子良嘗夜集學士刻燭為詩四韻者則刻一寸以此為率文琰曰頓燒一寸燭而成四韻詩何難之有乃與令楷江洪等共打銅鉢立韻響滅則詩成皆可觀覽劉孝孫彭城人博學通敏而仕多不遂常歎曰古人或開一説而致卿相立談間而降白璧書籍妄耳徐夤髙平人有學行父榮祖位祕書監嘗有罪繫獄旦日原之而髮皓白齊武問其故曰臣思愆於內而髮變於外當時稱之謝朏字敬沖陳郡陽夏人也祖𢎞微宋太常卿父莊右光祿大夫莊附𢎞微傳朏幼聰慧莊常器之年十嵗能屬文莊遊土山賦詩使朏命篇朏攬筆便成琅邪王景文謂莊曰賢子足稱神童復為後來特逹莊笑撫朏背曰真吾家千金宋孝武帝遊姑蘇勑莊携朏從駕詔為洞井讃於坐上奏之帝曰雖小重器也仕宋為衛將軍袁粲長史粲性簡峻時人方之李膺朏退粲曰謝令為不死矣宋明帝嘗勑朏與謝鳳子超宗從鳯莊門入二人俱至超宗曰君命不可以不往乃趨而入朏曰君處臣以禮遂退不入時人兩稱之以比王尊王陽後為臨川內史以賄見劾袁粲寢其事齊髙帝為驃騎將軍輔政選朏為長史勑與河南褚炫濟陽江斆彭城劉悛俱入侍宋帝時號天子四友髙帝方圖禪代欲以朏佐命遷左長史每夕置酒獨與朏論魏晉故事言石苞不早勸晉文死方慟哭方之馮異非知幾也朏曰昔魏臣有勸魏武即帝位魏武曰有用我者其周文王乎晉文世事魏氏將必終身北面假使魏早依唐虞故事亦當三讓彌髙帝不悅更引王儉為左長史以朏為侍中領祕書監及齊受禪朏當日在直百僚陪位侍中當解璽朏佯不知曰有何公事傳詔云解璽授齊王朏曰齊自應有侍中乃引枕卧傳詔懼乃使稱疾欲取兼人朏曰我無疾何所道遂朝服出東掖門乃得車仍還宅是日遂以王儉為侍中解璽既而武帝請誅朏髙帝曰殺之則成其名正應容之度外又以家貧乞郡辭旨抑揚詔免官錮禁五年永明中為義興太守在郡不省雜事悉付綱紀曰吾不能作主者吏但能作太守耳歷都官尚書中書令侍中領新安王師求出仍為吳興太守眀帝謀入嗣位引朝廷舊臣朏內圖止足且實避事弟草瀹時為吏部尚書朏至郡致草瀹數斛酒還書曰可力飲此勿豫人事朏居郡不理常務聚斂衆頗譏之亦不屑也建武四年徴為侍中中書令不應遣諸子還都獨與母留築室郡之西郭明帝詔加優禮旌其素槩賜牀帳褥席奉以卿祿時國子祭酒廬江何允亦抗表還會稽永元中詔徴朏允並不屈東昏皆命迫遣會武帝起兵及建鄴平召朏允並補軍咨祭酒皆不至及即位詔徴朏為侍中左光祿大夫開府儀同三司允散騎常侍特進右光祿大夫又並不屈仍遣領軍司馬王果敦譬朏朏謀於何允允欲獨髙其節紿曰興王之世安可久處明年六月朏輕出詣闕自陳帝笑曰子陵遂能屈志詔以為侍中司徒尚書令朏辭腳疾不堪拜謁乃角巾自輿詣雲龍門謝詔見於華林園乘小車就席明旦乘輿出幸朏宅宴語盡歡朏固陳本志不許又固請自還迎母許之臨發輿駕臨幸賦詩餞别王人送迎相望於道到都敕材官起府於舊宅武帝臨軒遣謁者於府拜授詔停諸公事及朔望朝謁三年元會詔朏乘小輿升殿朏素憚煩及居台鉉兼掌內臺職事多不覽以此頗失衆望其年母憂尋有詔攝職如故五年改授中書監司徒衛將軍固讓不受遣謁者敦授留府門及暮至於經春夏八月乃拜受焉是冬薨車駕出臨哭諡曰靖初朏於宋孝武世為吳興以雞卵賦人收雞數千及遁節不全為清談所少著書及文章行於世子諼位司徒右長史坐殺牛廢黜為東陽內史及還五官送錢一萬止留一百答曰數多劉寵更以為愧次子譓不妄交遊門無雜賔有時獨醉曰入吾室者但有清風對吾飲者唯當明月位光祿大夫子哲字頴豫美風儀舉止醖藉襟情豁朗為士君子所重纍遷至廣陵太守侯景之亂因寓居焉仕陳歷吏部尚書中書令侍中司徒左長史朏弟子覽字景滌父草瀹太子詹事草瀹與兄皓列在齊史覽以選尚齊錢唐公主拜駙馬都尉武帝平建鄴朝士唯王亮王瑩等數人揖自餘皆拜覽時年二十餘為太子舍人亦長揖而已意氣間雅視瞻聰眀武帝目送良久謂徐勉曰覺此生芳蘭竟體想謝莊正當如此自此仍被賞味天監元年為中書侍郎掌吏部事頃之即真嘗侍坐受敕與侍中王􅌔為詩答贈其文甚工仍使重作復合旨帝賜詩云雙文既後進二少實名家豈伊爾棟隆信乃真國華為侍中頗樂酒因宴席與散騎常侍蕭琛辭相詆毁為有司所奏武帝以覽年少不直出為中權長史後拜吏部尚書出為吳興太守中書舍人黃睦之家居烏程子弟専橫前太守皆折節事之覽未到郡睦之弟迎覽覽逐去其船杖吏為通者自是睦之家杜門不出郡境多劫為東道患覽下車肅然初齊明帝及覽父草瀹東海徐孝嗣並為吳興號為名守覽皆過之覽昔在新安頗聚斂至是遂稱廉潔時人方之王述卒于官贈中書令覽弟舉字言揚幼好學與覽齊名年十四嘗贈沈約詩為約所賞弱冠丁父憂幾致毁滅服闋為太常博士與兄覽俱預元會江淹一見並相欽挹曰所謂馭二龍於長塗者也為太子家令掌管記深為昭眀太子賞接祕書監任昉出為新安郡别舉詩云詎念耋嗟人方深老夫託其屬意如此武帝嘗訪舉於覽覽曰識藝過臣甚逺唯飲酒不及於臣帝大悅尋除安成郡守毋往於郡喪辭不赴歷位左户尚書遷掌吏部尚書舉祖莊父草瀹兄覽並歷此職前代少比舉尤長元理及釋氏義為晉陵郡時嘗與義學僧遞講經論徴士何允自虎邱山出赴之其名盛如此先是北度人盧廣有儒術為國子博士于學發講僕射徐勉以下畢至舉造坐屢折廣辭理遒邁廣深歎服仍以所執塵尾斑竹杖滑石書格薦之以况重席焉加侍中遷尚書右僕射大同三年出為吳郡太守先是何敬容居郡有美績世稱為何吳郡及舉為政聲迹略相比曾要何徴君講中論何難以巾褐入南門乃從東園進致詩往復為虎丘山賦題于寺入為侍中太子詹事翊左將軍舉父草瀹齊時終此官纍表乞改勑不許後遷尚書僕射侍中將軍如故舉雖屢居端揆未嘗肯預時政保身固寵不能有所發明因疾陳解敕賜假并勑處方加給上藥其恩遇如此侯景來降帝詢訪朝臣舉及朝士皆請拒之帝從朱異言納之以為景能立功趙魏舉等不敢復言太清二年遷尚書令卒于內臺上曰舉非止歷官已多亦人倫儀表久著公望悵恨未授之可贈侍中衛將軍開府儀同三司舉宅內山齋捨以為寺泉石之美殆若自然臨川始興諸王常所遊踐邵陵王綸於婁湖立園廣宴酒後好聚衆賔冠手自裂破投之唾壺皆莫敢言舉嘗預宴王欲取舉幘舉正色曰裂冠毁冕下官弗敢聞命拂衣而退王屢召不反甚有慙色舉託情元勝尤長佛理注淨名經常自講説有文集二十卷子嘏字含茂風神清雅頗善屬文為太子中庶子建安太守侯景之亂之廣州依蕭勃勃敗在周迪門後依陳寶應寶應平方詣闕歷侍中中書令都官尚書卒諡曰光子有文集行於世子儼位侍中御史中丞太常卿胄位尚書僕射舉兄子僑字國美父元大位侍中僑素貴嘗一朝無食其子啓欲以班史質錢答曰寧餓死豈可以此充食乎太清元年卒集十卷長子褘僑弟札字世髙亦博涉文史位湘東王咨議先僑卒謝幾卿朏之族子也曽祖靈運宋臨川內史父超宗齊黃門郎並有傳幾卿幼清辨當世號為神童超宗坐事徙越嶲詔家人不得相隨幾卿年八嵗别父於新亭不勝其慟遂投于江超宗命估客數人入水救之良久涌出得就岸瀝耳目口鼻出水數斗十餘日乃裁能言居父憂哀毁過禮年十一召補國子生齊文惠太子自臨䇿試謂祭酒王儉曰幾卿本長元理今可以經義訪之儉承旨發問幾卿隨事辨釋辭無滯者文惠大稱賞焉儉謂人曰謝超宗為不死矣既長好學博涉有文彩纍遷為太尉晉安王府主簿天監初自尚書三公郎為書侍御史舊郎官轉為此職者世謂之為南奔幾卿頗失志多陳疾臺事略不復理纍遷尚書左丞幾卿詳悉故實僕射徐勉每有疑滯多詢訪之然性通脫會意便行不拘朝憲嘗預樂遊苑宴不得醉而還因詣道邉酒壚停車褰幔與車前三騶對飲時觀者如堵幾卿處之自若後以在省署夜著犢鼻褌與門生登閣道飲酒酣呼為有司糾奏坐免官普通六年詔西昌侯藻督衆軍北侵幾卿啓求行擢為藻軍司長史將行與僕射徐勉别勉云淮肥之役前謝已著竒功未知今謝何如幾卿應聲曰已見今徐勝于前徐後謝何必愧於前謝勉默然軍至渦陽退敗幾卿坐免官居宅在白楊石井朝中交好者載酒從之賔客常滿坐時左丞庾仲容亦免官歸二人意相得並肆情誕縱或乘露車歷遊郊野既醉則執鐸挽歌不屑物議湘東王繹在鎮與書慰勉之後為太子率更令放逹不事儀容性不容非與物多忤有班已者輒肆意罵之退無所言遷左丞僕射省嘗議集公卿幾卿外還宿醉未醒取枕髙卧傍若無人又嘗於閣省裸袒酣飲及醉小遺下霑令史為南司所彈幾卿亦不介意轉左光祿長史幾卿雖不持儉操然於家門篤睦兄才卿早卒其子藻幼孤幾卿撫養甚至及藻成立歷清途皆幾卿奬訓之力也世以此稱之病卒文集行於世謝微字元度幾卿之宗從而宋左僕射裕之元孫也父璟少與從叔朓俱知名齊竟陵王子良開西邸招文學璟亦預焉位中書郎天監中為左户尚書再遷侍中固辭年老求金紫帝不悅未敘會卒微美風采好學善屬文位兼中書舍人與河東裴子野沛國劉顯同官友善時魏中山王元略還北武帝餞於武德殿賦詩三十韻限三刻成微二刻便就文甚美帝再覽焉又為臨汝侯猷製放生文亦見賞於世後除尚書左丞及昭明太子薨帝立晉安王綱為皇太子將出詔唯召尚書右僕射何敬容宣惠將軍孔休源及微三人與議微時年位尚輕而任遇已重後卒於北中郎豫章王長史南蘭陵太守文集二十卷陸倕字佐公吳郡吳人也父慧曉齊南兖州刺史贈太常自有傳倕少勤學善屬文於宅內起兩茅屋杜絶往來晝夜讀書如此者數載所讀一遍必誦於口嘗借人漢書失五行志四卷乃暗寫還之略無遺脫幼為外祖張岱所異岱常謂諸子曰此兒汝家陽元也十七州舉秀才刺史竟陵王開西邸延英俊倕預焉天監初為右軍安成王主簿倕與樂安任昉友善為感知己賦以贈昉昉因此名以報之及昉為中丞簪裾輻湊預其宴者殷藝到溉劉苞劉孺劉顯劉孝綽及倕而已號曰龍門之遊雖貴公子孫不得預也遷臨川王東曹掾是時禮樂制度多所創革武帝雅愛其才乃勑撰新漏刻銘其文甚美纍遷太子中舍人管東宫書記又詔為石闕銘奏之勑曰倕之所製辭義典雅足為佳作昔虞邱辨物邯鄲獻賦賞以金帛前史美談可賜絹三十匹纍遷太常卿卒文集二十卷子瓉早慧七歲通經為童子師卒次緬有似於倕一看殆不能别倕從子襄字師卿襄父間齊始安王遙光揚州治中永元末遙光據東府作亂間坐誅間事具慧曉傳中間有四子襄其季也本名衰字趙卿有奏事者誤字為襄武帝乃改為襄字師卿天監三年都官尚書范岫表薦襄起家擢拜著作佐郎昭眀太子統聞襄行業啓武帝引與遊處自廬陵王記室除太子洗馬遷中書舍人並掌管記出為揚州治中從事襄以父終此官固辭職帝不許聽與府司馬換廨居之昭眀太子敬耆老襄母年將八十與蕭琛傅昭陸杲每月常遣存問加賜珍羞衣服襄母嘗卒患心痛醫方須三升粟漿是時冬月日又逼暮求索無所忽有老人詣門貨漿量如方劑始欲酬直無何失之時以襄孝感所致也纍遷太子家令復掌管記母憂去職襄年已五十毁頓過禮太子憂之日遣使誡喻昭眀太子薨官屬悉罷妃蔡氏别居金華宫以襄為步兵校尉金華宫家令知金華官事大通七年出為鄱陽內史先是郡民鮮于琮服食修道法常入山採藥拾得五色幡眊又於地中得石璽竊怪之琮先與妻别室妻望琮所處常有異氣益以為神大同元年遂結其門徒殺廣晉令王筠號上願元年署置官屬其黨轉相誑惑有衆萬餘人將出攻郡襄先已率吏民修城隍為備及賊至破之生獲琮餘衆逃散時鄰郡豫章安成等守宰案治黨與因求賄賂不得其實或有善人盡室罹禍者唯襄郡枉直無濫人作歌曰鮮于平後善惡分人無橫死賴陸君又有彭李二家先因忿爭遂相誣告襄引入內室不加責誚但和言解喻之二人感恩深自悔咎乃為設酒食令其盡歡酒罷同載而還因相親厚又歌曰陸君政無怨家鬭既罷讎共車在政六年郡中大寧郡人李睍等四百二十人詣闕拜表陳襄德化求於郡立碑降勑許之又表乞留襄固乞還太清元年為度支尚書侯景圍臺城以襄直侍中省城陷襄逃還吳景將宋子仙進攻錢唐會海鹽人陸黯舉義襲郡殺偽太守蘇單于推襄行郡事時淮南太守文成侯蕭寧逃賊入吳襄遣迎寧為盟主遣黯及兄子映公帥衆躡子仙與戰黯敗走吳下軍聞之亦散襄匿于墓下一夜憂憤卒襄弱冠遭家禍釋服猶若居憂終身蔬食布衣不聽音樂口不言殺害五十年侯景平元帝贈侍中追封餘干縣侯襄兄完位寧遠長史琅邪彭城二郡丞完子雲公字子龍年五嵗誦論語毛詩九嵗讀漢書略能記憶從祖倕與沛國劉顯質問十事雲公對無所失顯歎異之及長好學有才思為平西湘東王繹行參軍雲公先製太伯廟碑吳興太守張纘罷郡經途讀其文嘆曰今之蔡伯喈也纘至都掌選言之武帝召為尚書儀曹郎入直夀光省以本官知著作郎事纍遷中書黃門郎兼掌著作雲公善奕碁嘗夜侍坐冠武觸燭文帝笑謂曰燭燒卿貂帝將用為侍中故以此戲之時天泉池新製鯿魚舟形狹而短帝暇日常泛此舟朝中唯引太常劉之遴國子祭酒到溉右衛朱異雲公時年位尚輕亦預焉太清元年卒張纘時為湘州與雲公叔襄兄晏子書曰都信至承賢兄子賢弟黃門殞逝非惟貴門喪寶實有識同悲其為士流稱重如此雲公從父兄才子亦有才名位太子中庶子延尉與雲公並有文集行於世雲公子瓊列在陳史到沆字茂瀣彭城武原人曾祖彥之宋護軍將軍祖仲度驃騎從事中郎父撝齊五兵尚書彥之撝俱有傳沆幼聰敏五嵗時撝於屏風抄古詩沆請教讀一遍便能諷誦無所遺失既長勤學善屬文工篆𨽻美風神容止可悅武帝初臨天下收援賢俊愛其才天監初以為征虜主簿東宫建選為太子洗馬時文德殿置學士省召髙才碩學者待詔其中使校定墳史詔沆通籍焉帝宴華光殿命羣臣賦詩獨詔沆為二百字三刻便成沆於坐立奏其文甚美俄以洗馬管東宫書記及散騎省沆優於䇿文三年詔尚書郎在職清能或人才髙妙者為侍郎以沆為殿中曹侍郎此曹以文才選沆從父兄溉洽並有才名時皆相代為殿中當世榮之遷太子中舍人沆為人謙敬口不論人短任昉范雲皆與友善後卒於北中郎咨議參軍所著詩賦百餘萹行於世溉字茂灌父坦齊中書郎溉少孤貧與兄沼弟洽俱知名起家王國左常侍樂安任昉大相賞好恆提携溉洽二人廣為聲價所生母魏本寒家悉越中之資為二兒推奉昉天監初昉出守義興要溉洽之郡為山澤之遊昉還為御史中丞後進皆宗之時有彭城劉孝綽劉苞劉孺吳郡陸倕張率陳郡殷藝沛國劉顯及溉洽車軌日至號曰蘭臺聚陸倕贈昉詩云和風雜美氣下有真人遊壯矣荀文若賢哉陳太邱今則蘭臺聚萬古信為儔任君本逹識張子復清修既有絶塵到復見黃中劉時謂昉為任君比漢之三君到則溉兄弟也除尚書殿中郎後為建安太守昉以詩贈之求二衫段云鐵錢兩當一百代易名實為惠當及時無待深秋日溉答云余衣本百結閩中徒八蠶假令金如粟詎使廉夫貪還為太子中舍人溉長八尺眉目如點白晢美鬚髯舉動風華善於應答上用為通事舍人中書郎兼吏部太子中庶子湘東王繹為會稽太守以溉為輕車長史行府郡事武帝勑繹曰到溉非直為汝行事足為汝師溉嘗夢武帝遍見諸子至湘東而脫帽與之於是密敬事焉遭母憂居喪盡禮所處廬開方四尺毁瘠過人服闋猶蔬食布衣者纍載歷御史中丞都官左戶二尚書掌吏部尚書時何敬容以令參選事有不允溉輒相執敬容謂人曰到溉尚有餘臭遂學作貴人敬容時方貴寵人皆下之溉忤之如初溉祖彥之初以擔糞自給故世以為譏云後省門鴟尾被震溉左遷光祿大夫所蒞以清白自修性又率儉不好聲色虛室單牀傍無姬侍車服不事鮮華冠履十年一易朝服或至穿補傳呼清路示有朝章而已後為散騎常侍侍中國子祭酒表求列武帝所撰正言於學請置正言助教二人學生二十人尚書左丞賀琛又請加置博士一人溉特被武帝賞接每與對碁從夕逹旦或復失寢加以低睡帝詩嘲之曰狀若喪家狗又似縣風槌當時以為笑樂溉第居近淮水齋前山池有竒殭石長一丈六尺帝戲與賭之并禮記一部溉並輸焉未進帝謂朱異曰卿謂到溉所輸可以送未溉斂版對曰臣既事君安敢失禮帝大笑其見親愛如此石即迎置華林園宴殿前移石之日都下傾城縱觀所謂到公石也溉奕碁入第六品常與朱異韋黯於御坐校碁比勢覆局不差一道後因疾失眀詔以金紫光祿大夫散騎常侍就第養疾溉少有美名遂不為僕射人為之恨溉淡如也家門雍睦兄弟特相友愛與弟洽常共居一齋洽卒後便捨為寺蔣山有延賢寺溉家世所立溉所得奉祿皆充二寺因斷腥膻終身蔬食别營小室朝夕從僧徒禮誦武帝每月三置淨饌恩禮甚篤性不妄交遊唯與朱異劉之遴張綰同志友密及卧疾家園門可羅雀唯三人每嵗時常鳴騶枉道以相存問置酒極歡而去以太清二年卒臨終託張劉勒子孫薄葬之禮曰氣絶便斂斂以法服先有冢竁斂畢便葬不須擇日凶事必存儉約孫姪不得違言便屏家人請僧讀經贊唄及卒顔色如常手屈二指即佛道所云得果也時朝廷多故遂無贈諡有集二十卷梁以溉洽兄弟比之二陸故元帝贈詩曰魏世重雙丁丁儀丁廙也晉朝稱二陸何如今兩到復似淩寒竹子鏡字圓照初在孕其母夢懷鏡及生因以為名鏡五嵗便口授為詩婉有辭况位太子舍人作七悟文甚美先溉卒鏡子藎早聰慧歷尚書殿中郎嘗從武帝幸京口登北顧樓顧舊作固帝曰以理而推宜作顧望之顧因令羣臣賦詩藎受詔便就上覽以示溉曰藎定是才子翻恐卿從來文章假手於藎因賜絹二十匹後溉每和御詩上輒手詔戲溉曰得無貽厥之力乎又賜溉連珠曰硯磨墨以騰文筆飛毫而書信如飛蛾之赴火豈焚身之可吝必耄年其已及可假之於少藎其見知賞如此後除丹陽尹丞太清之亂赴江陵卒洽字茂沿清警有才學父坦以洽無外家乃求娶於羊元保以為外氏洽年十八為南徐州迎西曹行事謝眺文章盛於一時見洽深相賞好日與談論每謂洽曰君非直名人乃亦兼資文武朓後為吏部欲薦之洽覩世方亂深相拒絶遂築室巖阿幽居積嵗時人號曰居士樂安任昉有知人之鑒與洽兄沼溉並善嘗訪洽於田舍歎曰此子日下無雙遂申拜親之禮天監初沼溉俱蒙顯擢洽尤見知賞從弟沆亦相與齊名武帝問待詔邱遲曰到洽何如沆溉遲對曰正情過於沆文章不減溉加以清言殆將難及即召為太子舍人御幸華光殿詔洽及沆蕭琛任昉侍宴賦二十韻詩以洽辭為工賜絹二十匹上謂昉曰諸到可謂才子昉對曰臣嘗竊議宋得其武梁得其文二年遷司徒主簿直待詔省勑使抄甲部書為十二卷五年遷尚書殿中郎洽兄弟羣從遞居此職時人榮之七年遷太子中舍人與庶子陸倕對掌東宫管記俄為侍讀侍讀省仍置學士二人洽復充其選遷國子博士奉敕撰太學碑普通中為尚書吏部郎請託一無所行徙尚書左丞凖繩不避貴戚賄賂莫敢通時鑾輿欲親戎軍國禮容多自洽出六年遷御史中丞糾彈無所顧望號為徑直少與劉孝綽善下車便以名教隱穢首彈之孝綽記與諸弟書實欲聞之湘東王公事左降猶居職舊制中丞不得入尚書下舍洽兄溉為左戶尚書洽引服親不應有礙刺省詳決左丞蕭子雲議許入溉省亦以其兄弟素篤不能相别也出為尋陽太守卒贈侍中諡理子昭眀太子與晉安王令悼之其辭甚悽切洽美容質善言吐弱年聽伏曼容講未嘗傍膝伏深歎之文集行於世子仲舉列在陳史蕭琛字彥瑜蘭陵人也祖僧珍宋廷尉卿父惠訓齊末為巴東相武帝起兵齊和帝於荆州即位惠訓與巴西太守魯休烈並以郡相抗惠訓使子璝據上明建康城平始歸降武帝宥之以為太中大夫卒官琛少眀悟有才辨數嵗時從伯惠開見而竒之撫其背曰必興吾宗起家齊太學博士時王儉當朝琛年少未為儉所識負其才氣欲候儉時儉宴于樂遊苑琛乃著虎皮靴䇿桃枝杖直造儉坐儉與語大恱儉時為丹陽尹辟為主簿舉南徐州秀才永眀九年魏始通好琛再銜命北使還為通直散騎侍郎時魏遣李彪來使齊武帝宴之琛於御筵舉酒勸彪彪不受曰公庭無私禮不容受勸琛答曰詩所謂雨我公田遂及我私坐者皆恱服彪乃受琛酒纍遷尚書左丞齊明帝用法嚴峻尚書郎坐杖罰者皆即科行琛乃密啓曰郎之有杖起自後漢爾時郎官位卑親主文案與令史不異故郎三十五人令史二十人是以古人多恥為此職自魏晉以來郎官稍重今方參用髙華吏部又近於通貴不應官髙昔品而罰遵曩科所以從來彈舉雖在空文而許以推遷或逢赦恩或入春令便得息停宋元嘉大眀中經有被廢者别由犯忤主心非關當凖自泰始建元以來未經施行事廢已久人情未習自奉勑之後已行倉部郎江重欣杖督五十皆無不人懷慚懼兼有子弟成長彌復難為儀適其應行罰可特賜輸贖使與令史有異以彰優緩之澤帝納之自是應受罰者依舊不行東昏初嗣立時議無廟見文琛議據周頌烈文閔豫小子皆為即位朝廟之典於是從之武帝在西邸與琛有舊梁臺建以為御史中丞天監元年纍遷平西長史江夏太守始琛為宣城太守有北僧南度惟齎一瓠蘆中有漢書序傳僧云三輔舊老相傳以為班固真本琛固求得之其書多有異今者而紙墨亦古文字多如龍舉之例非𨽻非篆琛甚祕之及是以書餉鄱陽王範範乃獻于東宫後為吳興太守郡有項羽廟土民名為憤王甚有靈驗遂於郡聽事安施牀幕為神座公私請禱前後二千石皆於聽拜祠以軛下牛充祭而避居他室琛至著履登廳事聞室中有叱聲琛厲色曰生不能與漢祖爭中原死據此聽事何也因遷之於廟又禁殺牛解祀以脯代肉琛頻蒞大郡不治産業有闕則取不以為嫌厯左户度支二尚書侍中帝每朝宴接以舊恩嘗犯武帝偏諱帝斂容琛從容啓曰二名不偏諱陛下不應諱順上曰各有家風琛曰其如禮何又經預御筵醉伏上以棗投琛琛仍取栗擲上正中面御史中丞在坐帝動色曰此中有人不得如此豈有説邪琛即答曰陛下投臣以赤心臣敢不報以戰栗上笑悅上嘗呼琛為宗老琛亦奉陳昔恩以早簉中陽夙忝同閈雖迷興運猶荷𢎞慈上答曰雖云早契濶乃自非同志勿談興運初且道狂奴異琛嘗言少壯三好音律書酒年長以來二事都廢唯書籍不衰琛性通脫常自解竈事畢餕餘必陶然致醉中大通元年為晉陵太守以疾改授侍中特進金紫光祿大夫卒遺令諸子與妻同墳異藏祭以蔬菜葬止車十乘事存率素乘輿臨哭甚哀詔贈本官加雲麾將軍諡曰平子琛所撰漢書文府齊梁拾遺并諸文集數十萬言子遊位少府卿遊子密字士幾幼聰敏博學有文詞位黃門侍郎太子中庶子散騎常侍陸杲字明震吳郡吳人也祖徽字休猷宋世補建康令清平無私為文帝所善元嘉十五年除平越中郎將廣州加都督清名亞王鎮之為士庶所愛詠二十三年為益州刺史亦加都督恤隱有方威惠兼著寇盜靜息人物殷阜蜀土安之卒於官身亡之日家無餘財文帝甚褒惜之諡曰簡子父睿揚州中從事杲少好學工書畫舅張融有髙名杲風韻舉止頗類之當時稱其舅甥目下無對除尚書殿中曹郎拜日八坐丞郎並到上省交禮而杲至晚不及時刻坐免官後為司徒從事中郎梁臺建為相國西曹掾天監五年位御史中丞性婞直無所顧望時山隂令虞肩在任贓汚數百萬杲奏收劾之中書舍人王睦之以肩事託杲杲不答武帝聞之以問杲杲答曰有之帝曰識睦之不答曰臣不識其人時睦之在御側上指示曰此人也杲謂曰君小人何敢以罪人屬南司睦之失色領軍將軍張稷杲從舅也杲嘗以公事彈稷稷因侍宴訴帝曰陸杲是臣通親小事彈臣不貸帝曰杲職司其事卿何得為嫌杲在臺號不畏強禦為義興太守在郡寬惠為下所稱歷左戶尚書太常卿普通二年出為臨川內史將發辭武帝於坐通啓求募部曲帝問何不付所由呈聞杲答所由不為受帝頗怪之以其臨路不咎問後入為金紫光祿大夫特進卒諡靖子杲素信佛法持戒甚精著沙門傳三十卷弟煦學涉有思理位太子家令撰晉書未就又著陸史十五卷陸氏驪泉志一卷並行於時子罩字洞元少篤學多所該覽善屬文簡文居蕃為記室參軍撰帝集序稍遷太子中庶子掌管記禮遇甚厚大同七年以毋老求去公卿以下祖道於征虜亭皇太子賜黃金五十斤時人方之踈廣母終後位終光祿卿初簡文在雍州撰法寶聨璧罩與羣賢並抄掇區分者數嵗中大通六年而書成命湘東王為序其作者有侍中國子祭酒南蘭陵蕭子顯等三十人以比王象劉邵之皇覽焉庾仲容字子仲潁川􅋣陵人也祖徽之宋御史中丞父漪齊邵陵王記室仲容幼孤為叔父泳所養及長杜絶人事専精篤學晝夜手不輟卷初為安西法曹行參軍泳時貴顯吏部尚書徐勉擬泳子晏嬰為宫僚泳泣曰兄子幼孤人才粗可願以晏嬰所沗回用授之勉許焉轉仲容為太子舍人遷安成王主簿時平原劉峻亦為府佐並以強學為王所禮接後為永康錢塘武康令並無功績多被推劾久之除安成王中記室當出隨府皇太子以舊恩降餞賜詩曰孫生陟陽道吳子朝歌縣未若樊林舉置酒臨華殿時輩榮之後為尚書左丞坐糾察不直免官仲容博學少有盛名頗任氣使酒好危言髙論士友以此少之唯與王籍謝幾卿情好相得二人時亦不調遂相追隨誕縱酣飲不持檢操遇太清亂遊會稽卒年七十四仲容抄諸子書三十卷諸集三十卷衆家地理書二十卷列女傳三卷文集二十卷並行於世蕭視素南蘭陵人也祖思話宋贈征西將軍開府父惠眀吳興太守惠眀附載思話傳視素天監中位丹陽尹丞初拜日武帝賜錢八萬視素一朝散之親友遷司徒左司屬南徐州中從事性靜退少嗜欲好學能清言榮利不關於中喜怒不形於色在人間及居職並任情通率不自矜尚天然簡素及在京口便有終焉之志後為中書侍郎在位少時求為諸暨令到縣十餘日挂衣冠於縣門而去獨居屏事非親戚不得至其籬門妻即齊太尉王儉女久與别居遂無子卒親故迹其事行諡曰貞文先生視素從弟洽字宏稱父惠基齊給事中贈金紫光祿大夫洽幼敏悟年七嵗誦楚辭略皆上口及長好學博涉善屬文為南徐州中從事近畿重鎮職吏數十人前後居者皆致巨富洽清身率職饋遺一無所受妻子不免飢寒纍遷臨海太守為政清平不尚威猛民俗便之還拜司徒左長史勑撰當塗堰碑辭甚贍麗卒於官文集二十卷行於世洽從弟介字茂鏡父惠蒨齊左戶尚書介少頴悟有器識博涉經史兼善屬文大同中武陵王紀為揚州刺史以介為府長史在職以清白稱武帝謂何敬容曰蕭介甚貧可以處一郡復曰始興郡頻無良守可以介為之由是出為始興太守及至甚著威德徴為少府卿尋加散騎常侍會侍中闕選司舉王筠等四人並不稱旨帝曰我門中久無此職宜用蕭介為之介應對左右多所匡正帝甚重之遷都官尚書每軍國大事必先訪介帝謂朱異曰端右材也中大同二年辭疾致仕帝優詔不許終不肯起乃遣謁者僕射魏祥就拜光祿大夫太清中侯景於渦陽敗走入夀陽帝勑助防韋黯納之介聞而上表致諫曰昔吕布殺丁原以事董卓終誅董而為賊劉牢之反王恭以歸晉還背晉以興妖狼子野心終無馴狎之性帝覽表為之歎息卒不能用介性髙潔少交遊唯與族兄琛從兄視素及洽從弟淑等文酒賞會時人以比謝氏烏衣之遊初武帝總延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗盾飲盡顔色不變言笑自若介染翰便成文無加點帝兩美之曰臧盾之飲蕭介之文即席之美也年七十三卒於家介第三子允最知名允弟引亦有器度陳史皆有傳臧嚴字彥威東莞莒人也髙祖燾宋光祿大夫自有傳燾生邃宜都太守邃生凝之尚書左丞凝之生稜齊後軍參軍稜生嚴嚴幼有孝性居父憂以毁聞孤貧勤學行止書卷不離手從叔未甄為江夏郡携嚴之官於途中作屯遊賦又作七算辭並典麗性孤介未嘗造請僕射徐勉欲識之嚴終不詣纍遷湘東王宣惠輕車府參軍兼記室嚴於學多所諳記尤精漢書諷誦略皆上口王嘗自執四部書目試之嚴自甲至丁卷中各對一事并作者姓名遂無遺失王遷荆州隨府轉西中郎安西録事參軍歷義陽武寧郡守郡界蠻左前郡守常選武人以兵鎮之嚴獨以數門生單車入境羣蠻悅服後卒於鎮南咨議參軍有文集十卷未甄燾曾孫也父潭左戶尚書未甄有才幹少為外兄汝南周顒所知仕梁為太尉長史丁所生母憂三年廬于墓側歷廷尉卿江夏太守卒未甄子盾字宣卿幼從徴士諸葛璩受五經通章句璩學徒常有數十百人盾處其間無所狎比璩異之歎曰此生重器王佐才也為尚書中兵郎盾美風姿善容止每趨奏武帝甚悅焉入兼中書通事舍人盾有孝性嘗隨父宿直廷尉府母劉氏在宅夜暴亡盾左手中指忽痛不得寢及旦宅信果報凶問其感通如此服未終父卒居喪五年不出廬戶形骸枯悴家人不識武帝嘉之纍勑抑譬服闕纍遷御史中丞性公強甚稱職中大通五年帝幸同泰寺開講設四部大會衆數萬人南越所獻馴象忽於衆中狂逸衆皆駭散唯盾與散騎侍郎裴之禮嶷然自若帝甚嘉焉大同二年為中領軍領軍管天下兵要監局事多盾為人敏贍有風力長於撥繁職事甚理天監中吳平侯蕭景居職著聲至是盾復繼之後卒於領軍將軍諡曰忠盾弟厥字獻卿亦以幹局稱纍遷晉安太守郡居山海常結聚逋逃前後二千石討捕不能止厥下車宣化諸凶黨皆襁負而出自是居民復業然為政嚴酷少恩百姓謂之臧彪前後再兼中書通事舍人卒於兼司農卿厥前後居職所掌之局大事及蘭臺廷尉所不能決者勑並付厥厥辨斷精微咸得其理厥卒後有撾登聞鼓訴者求付清直舍人武帝曰臧厥既亡此時便無可付其見知如此子操尚書三公郎徐君蒨字懷簡東海郯人也祖孝嗣齊司空自有傳父緄入梁位侍中太常信武將軍君蒨幼聰朗好學尤長丁部書問無不對善絃歌為湘東王鎮西咨議參軍頗好聲色侍妾數十皆佩金翠曵羅綺服玩悉以金銀飲酒數升便醉而閉門盡日酣歌每遇歡謔則飲至斗有時載妓肆意遊行荆楚山川靡不畢踐朋從遊好莫得見之時襄陽魚𢎞亦以豪侈稱於是府中謡曰北路魚南路徐然其服玩次於𢎞也君蒨辨於辭令湘東王嘗出軍有人將婦從者王曰才愧李陵未能先誅女子將非孫武遂欲驅戰婦人君蒨應聲曰項籍壯士猶有虞兮之愛紀信成功亦資姬人之力君蒨文冠一府特有輕豔之才新聲巧變人多諷習竟卒於官通志卷一百四十一
