body:
  text: 通志卷十一宋右廸功郎鄭樵漁仲撰宋紀第十一武帝少帝文帝孝武帝前廢帝明帝後廢帝順帝髙祖武皇帝諱裕字徳輿小字寄奴彭城縣綏輿里人姓劉氏漢楚元王交之二十一世孫也彭城楚都故苗裔家焉晉氏東遷劉氏移居晉陵丹徒之京口里皇祖靖晉東安太守皇考翹字顯宗郡功曹帝以晉哀帝興寜元年歳在癸亥三月壬寅夜生神光照室盡明是夕甘露降于墓樹及長雄傑有大度身長七尺六寸風骨竒偉不事㢘隅小節奉繼母以孝聞嘗游京口竹林寺獨卧講堂前上有五色龍見衆僧見之驚以白帝帝獨喜曰上人無妄言皇考墓在丹徒之候山其地秦史所謂曲阿丹徒間有天子氣者也時有孔恭者妙善相墓帝嘗與經墓欺之曰此墓何如孔恭曰非常地也帝由是益自負行止時見二小龍附翼樵漁山澤同侣或亦覩焉及貴龍形更大帝素貧時人莫能知唯琅邪王謐獨深敬焉帝嘗負刁逵社錢三萬經時無以還被逵執謐宻以己錢代償由是得釋後伐荻新洲見大蛇長數丈射之傷明日復至洲裏聞有杵臼聲徃覘之見童子數人皆青衣於榛中搗藥問其故答曰我王為劉寄奴所射合散傅之帝曰王神何不殺之答曰寄奴王者不死不可殺帝叱之皆散仍收藥而反又經客下邳逆旅㑹一沙門謂帝曰江表當亂安之者其在君乎帝先患手創積年不愈沙門有一黄藥因留與帝既而忽亡帝以黄散傅之其創一傅而愈寳其餘及所得童子藥每遇金創傅之並驗初為冠軍孫無終司馬隆安三年十一月祅賊孫恩作亂於㑹稽朝廷遣衛將軍謝琰前將軍劉牢之東討牢之請帝參府軍事命與數十人覘賊遇賊衆賊數千帝便與戰所將人多死而帝奮長刀所殺傷甚衆牢之子敬宣疑帝為賊所困乃輕騎尋之既而衆騎並至遂平山隂恩遁入海四年五月恩復入㑹稽殺謝琰十一月牢之復東征使帝戍句章句章城小人少帝每戰䧟陣賊乃退還浹口時東伐諸將士卒暴掠百姓皆苦之惟帝獨無所犯五年春恩頻攻句章帝屢破之恩復入海三月恩北出海鹽帝築城于故海鹽賊日來攻城城内兵少帝乃選敢死士撃走之時雖連勝帝深慮衆寡不敵乃一夜偃旗示以羸弱觀其懈乃奮撃大破之恩知城不可下進向滬瀆帝棄城追之海鹽令鮑陋遣子嗣之以呉兵一千為前驅帝以呉兵不習戰命之在後不從是夜帝多設伏兵兼置旗鼓明日戰伏發賊退嗣之追奔䧟沒帝且退且戰麾下死傷將盡乃至向處止令左右解取死人衣以示暇賊疑尚有伏乃引去六月恩浮海至丹徒帝兼行與俱至奔撃大破之恩至建鄴知朝廷有備遂走鬱洲八月晉帝以帝為下邳太守帝又追恩至鬱洲及海鹽頻破之恩自是饑饉奔臨海元興元年荆州刺史桓元舉兵東下驃騎將軍司馬元顯遣牢之拒之帝又參其軍事元至帝請撃之牢之不許乃遣子敬宣詣元請和帝與東海何無忌並固諌不從元克建鄴以牢之為㑹稽内史牢之懼招帝於廣陵舉兵帝曰人情去矣廣陵亦豈可得之牢之竟縊于新洲何無忌謂帝曰我將何之帝曰可隨我還京口元必守臣節當與卿事之不然與卿圖之元從兄修以撫軍將軍鎮丹徒以帝為中兵參軍孫恩自敗後懼見獲乃投水死於臨海餘衆推恩妹夫盧循為主元復遣帝東征二年循奔永嘉帝追破之六月加帝彭城内史十二月桓元簒位遷晉帝於尋陽桓修入朝帝從至建鄴元見帝謂司徒王謐曰昨見劉裕風骨不恒蓋人傑也每游集贈賜甚厚元妻劉氏尚書令耽之女也聰明有智鑒嘗見帝因謂元曰劉裕龍行虎歩視瞻不凡恐必不為人下宜早為其所元曰我方平蕩中原非裕莫可待闗隴平定然後議之修尋還京口帝託以金創疾動不堪歩從乃與無忌同船共還建興復計及弟道規沛國劉毅平昌孟昶任城魏詠之髙平檀慿之琅邪諸葛長民太原王元徳隴西辛扈興東莞童厚之並同義謀時桓修弟𢎞為青州刺史鎮廣陵道規為𢎞中兵參軍昶為主簿乃令毅就昶謀共襲𢎞長民為豫州刺史刁逵左軍府參軍謀據歴陽相應元徳厚之謀於建鄴攻元克期齊發三年二月乙夘帝託游獵與無忌詠之慿之毅從弟藩慿之從子韶祗隆道濟昶族弟懐玉等集義徒凡二十七人願從者百餘人丙辰候城門開無忌等義徒服傳詔服稱詔居前義衆馳入齊呌吏士驚散即斬修以徇帝哭之甚慟厚加歛䘏昶勸𢎞其日出獵未明開門出獵人昶道規毅等率壯士五六十人因開門直入𢎞方噉粥即斬之因收衆濟江義軍初克京師司馬刁𢎞率文武佐吏來赴帝登城謂曰郭江州已奉乘輿反正於尋陽我等並被密詔誅逆黨今日賊元之首已當梟於大航諸君非大晉之臣乎𢎞等信之而退毅既至帝命誅𢎞等毅兄邁先在建鄴事未發數日帝遣同謀周安穆報之使為内應邁甚懼安穆慮事發馳歸時元以邁為竟陵太守邁便下船欲之郡是夜元與邁書曰北府人情云何卿近見劉裕何所道邁謂元已知其謀晨起白之元驚封邁為重安侯又以不執安穆故殺之誅元徳扈興厚之等乃遣頓邱太守呉甫之右將軍皇甫敷等距義軍元自聞義軍起便憂懼無復為計或曰裕等甚弱陛下何慮之有元曰劉裕足為一世之雄劉毅家無儋石之儲摴蒲一擲百萬何無忌劉牢之外甥酷似其舅共舉大事何謂無成時衆推帝為盟主以孟昶為長史總後事檀慿之為司馬百姓願從事者千餘人軍次竹里移檄都下暴元罪惡三月戊午遇呉甫之於江乘帝躬執長刀大呼即斬甫之進至羅洛橋遇皇甫敷檀慿之戰敗死之衆退帝進戰彌厲又斬敷首初帝建大謀有工相者相帝與無忌等近當大貴惟云慿之無相至是慿之戰死帝知其事必捷元聞敷等沒使桓謙屯東陵口卞範之屯覆舟山西己未義軍進至覆舟東張疑兵以油帔冠諸樹布滿山谷帝先馳之將士皆殊死戰無一不當百呼聲動天地因風縱火烟爓張天謙等大敗元始雖遣軍而走意已決别遣領軍殷仲文具舟石頭聞謙敗輕船南逸庚申帝鎮石頭城立留臺總百官焚桓温主於宣陽門外造晉新主於太廟遣諸將追元命尚書王嘏率百官奉迎乘輿司徒王謐與衆議推帝領揚州帝固辭乃以謐為録尚書事領揚州刺史帝為鎮軍將軍都督八州諸軍事徐州刺史領軍將軍初晉陵人韋叟善相術桓修令相帝當得州不叟曰當得邊州刺史退而私於帝曰君相貴不可言帝笑曰若中當相用為司馬至是叟詣帝曰成王不負桐葉之信公亦應不忘司馬之言今不敢希鎮軍司馬願得領軍佐於是用焉時諸葛長民失期為刁逵執送未至而元敗元經尋陽江州刺史郭昶之為具乗輿法物初荆州刺史王綏以江左冠族又桓氏之甥素甚陵帝至是及其父尚書左僕射愉有自疑志並及誅四月戊子奉武陵王遵為大將軍承制大赦惟桓氏一祖後不免桓元之簒王謐佐命手解安帝璽紱及義旗建衆謂謐宜誅惟帝素徳謐保持之劉毅嘗因朝㑹問謐璽紱所在謐益懼及王愉父子誅謐從弟諶謂謐曰王駒無罪而誅此是翦除勝已兄既桓氏黨附求免得乎駒愉小字也謐懼奔曲阿帝牋白大將軍迎還復其位元挾天子走江陵又浮江東下與劉毅何無忌劉道規等遇於崢嶸洲衆軍大破之元黨殷仲文奉晉二皇后還建鄴元復挾天子至江陵因走南郡太守王騰之荆州别駕王康産奉天子入南郡府初益州刺史毛璩遣從孫祐之與參軍費恬送弟喪下州璩弟子修之時為元屯騎校尉誘元入蜀至枚囬洲恬與祐之迎射之益州督護馮遷斬元傳首建鄴元從子振逃於華容之涌中招集逆黨襲江陵城騰之康産皆被殺桓謙先匿沮川亦聚衆應振為元舉哀立喪庭謙率衆官奉璽綬于安帝劉毅何無忌進及桓振戰敗績于靈谿十月帝領青州刺史甲仗百人入殿義熙元年正月毅等至江津破桓謙桓振江陵平三月甲子晉帝至自江陵庚子詔進帝侍中驃騎將軍都督中外諸軍録尚書事帝固讓旋鎮丹徒九月乙巳加帝領兖州刺史盧循浮海破廣州獲刺史呉隱之即以循為廣州刺史以其黨徐道覆為始興相二年三月進帝督交廣二州十月論匡復勲封帝豫章郡公邑萬户賜絹三萬匹其餘封賞各有差三年十二月司徒録尚書揚州刺史王謐薨四年正月徴帝入輔授侍中車騎將軍開府儀同三司楊州刺史録尚書事徐兖二州刺史如故表解兖州初是帝遣軍劉敬宣伐蜀賊譙縱無功而還九月帝以敬宣挫退遜位不許十月乃降為中軍將軍開府如故五年二月偽燕主慕容超大掠淮北三月帝抗表北討以丹陽尹孟昶監中軍留府事乃浮淮入泗五月至下邳留船歩軍進琅邪所過築城留守超大將公孫五樓請斷大峴堅壁清野以待超不從初謀是役議者以為賊若嚴守大峴軍無所資何能自反帝曰不然鮮卑性貪略不及逺既幸其勝且愛其榖必將引我且亦輕戰師一入峴吾何患焉及入峴帝舉手指天曰吾事濟矣衆問其故帝曰師既過險士有必死之志餘糧棲畝軍無匱乏之憂勝可必矣六月超留羸老守廣固使其廣寗王賀刺盧及公孫五樓悉力據臨胊去城四十里有巨蔑水超告五樓急據之比至為龍驤將軍孟龍符所保五樓乃退大軍分車四千兩為二翼方軌徐行車張幰御者執矟以騎為游軍軍令嚴肅比及臨朐賊騎交至帝命兖州刺史劉籓并州刺史劉道憐等䧟其陣日向昃戰猶酣帝用參軍胡籓策襲克臨胊賊乃大奔超遁還廣固獲其王璽豹尾輦等送於都丙子克廣固大城超固其小城乃設長圍以守之館榖於青土停江淮轉輸七月超尚書郎張綱乞師於姚興自長安反泰山太守申宣執送之綱有巧思先是帝修攻具城上人曰汝不得張綱何能為也及至升諸樓車以示之城内莫不失色超既求救不獲綱反見虜乃求稱藩割大峴為界獻馬千疋不聽時姚興遣使聲言將渉淮左帝謂曰爾報姚興我定青州將過函谷虜能自送今其時矣録事參軍劉穆之遽入曰此言不足威敵容能怒彼若鮮卑未拔西羌又至公何以待之帝乃笑曰此兵機也非子所及羌若能救不有先聲是自彊也十月張綱修攻具成設飛樓縣梯木幔板屋冠以牛皮弓矢無所用之劉毅遣上黨太守趙恢以千餘人來援帝夜潛遣軍㑹之明旦恢衆五千方道而進每晉使將到輙復如之六年二月丁亥屠廣固超踰城走追獲之斬于建康市殺其王公已下納生口萬餘馬二千疋初帝之北也徐道覆勸盧循乗虛而出循不從道覆乃至番禺說循曰今日之機萬不可失若克京都劉公雖還無能為也循從之是月㓂南康廬陵豫章諸郡郡守皆奔走時帝將鎮下邳進兵河洛及徴使至即日班師鎮南將軍何無忌與道覆戰敗死於豫章内外震駭朝議欲奉乗輿北走帝次山陽聞敗卷甲與數千人造江上徴問知賊尚未至四月癸未帝至都劉毅自表南征帝以賊新㨗鋒鋭湏嚴軍偕進使劉藩止之毅不從五月壬午盧循敗毅于桑落洲及審帝凱入相視失色欲還尋陽平江陵據二州以抗朝廷道覆請乗勝遂下爭之旬日乃從于時北師始還傷痍未復戰士纔數千賊衆十餘萬舳艫亘千里孟昶諸葛長民懼欲擁天子過江帝曰今兵士雖少猶足一戰若其克濟臣主同休如其不然不復能草間求活吾計决矣初帝征慕容超惟孟昶勸行丙辰昶乃表天子引罪仰藥而死時議者欲分兵屯守諸津帝曰賊衆我寡分其兵則測人虛實一處失利則沮三軍之心若聚衆石頭則衆力不分戊午帝移鎮石頭乙丑賊大至帝曰賊若新亭直上且將避之若囬泊蔡洲成禽耳徐道覆欲自新亭焚舟而戰循多疑少決每求萬全乃泊蔡洲以待軍潰帝登石頭以望見之大悦庚辰賊設伏於南岸疑兵向白石帝率劉毅諸葛長民北拒焉留參軍徐赤特戍查浦戒令勿戰帝既北賊焚查浦而至張侯橋赤特與戰大敗賊進屯丹陽郡帝馳還石頭斬徐赤特解甲乆之乃出陣於南塘七月庚申循自蔡洲退將還歸尋陽帝遣輔國將軍王仲徳等追之使建威將軍孫處自海道入番禺戒之曰我十二月必破妖㓂卿亦足至番禺先傾其巢窟也十月帝率舟師南伐使劉毅監太尉留府是月徐道覆㓂江陵荆州刺史劉道規大破之道覆走還盆口十一月孫處至番禺克其城盧循父嘏奔始興處撫其人以守十二月己卯大軍次大雷庚辰賊方江而下帝躬提幡鼓命衆軍齊力撃之軍中多萬鈞神弩所至莫不摧陷帝自於中流蹙之因風水之勢賊艦悉薄西岸岸上軍先備火具焚之大敗循還尋陽遂走豫章悉力柵左里丙申大軍次左里將戰帝麾之麾竿折幡沈于水衆咸懼帝笑曰昔覆舟之役亦如此今勝必矣攻其柵循單舸走衆皆降師旋晉帝遣侍中黄門勞師于行所七年正月己未振旅而歸改授大將軍揚州牧給班劒二十人本官如故帝固辭凡南北征伐戰亡者並列上賻贈屍喪未反者遣主帥迎接致還本土二月盧循至番禺為孫處所破收餘衆南走劉藩孟懐玉斬徐道覆于始興自晉中興以來朝綱弛紊權門兼并百姓流離不得保其産業桓元頗欲釐改竟不能行帝既作輔大示軌則豪彊肅然逺近禁止至是㑹稽餘姚唐亮復藏匿亡命千餘人帝誅亮免㑹稽内史司馬休之晉帝又申前詔帝固辭於是改授太尉中書監乃受命奉送黄鉞交州刺史杜慧度斬盧循父子函七首送都先是諸州郡所遣秀才孝㢘多非其人帝乃表申明舊例策試之荆州刺史劉道規疾患求歸八年四月改授豫州刺史以豫州刺史劉毅代之毅既有雄才大志與帝俱興復晉室自謂京城廣陵功足相抗雖權事推帝而心不服也厚自矜許朝士素望者並多歸之與尚書僕射謝混丹陽尹郗僧施並深相結及鎮江陵豫州舊府多割以自隨請僧施為南蠻校尉帝知毅終為異端心密圖之毅至西疾篤表求從弟兖州刺史藩以為副貳帝偽許焉九月藩入朝帝命收藩及謝混並賜死自表討毅又假黄鉞率諸軍西征以前鎮軍將軍司馬休之為平西將軍荆州刺史兖州刺史道憐鎮丹徒豫州刺史諸葛長民監太尉留府事加太傅司馬丹陽尹劉穆之建威將軍配以實力壬午發建鄴遣將軍王鎮惡龍驤將軍蒯恩前襲江陵克之毅及黨與皆伏誅十一月帝至江陵分荆州十郡為湘州帝仍進督焉以西陵太守朱齡石為益州刺史使伐蜀晉帝進帝太傅揚州牧加羽葆鼓吹班劒二十人九年二月乙丑帝至自江陵初諸葛長民貪滛驕横帝每優容之劉毅既誅長民謂所親曰昔年醢彭越今年殺韓信禍其至矣將謀作亂帝剋期至都而每淹留不進公卿以下頻日奉候於新亭長民亦驟出既而帝輕舟密至已還東府矣長民到門引前却人閑語凡平生言所不盡者皆與及之長民甚悦帝已密命左右丁旿自幔後出於坐拉焉死於牀側輿屍付廷尉并誅其弟黎民旿驍勇有力時人語曰勿跋扈付丁旿先是山湖川澤皆為豪彊所奪百姓薪採漁釣皆責税直至是禁斷之時人居未一帝上表定制於是依界土斷惟徐兖青三州居晉陵者不在斷例諸流寓郡縣多所併省以帝領鎮西將軍豫州刺史帝固讓太傅揚州牧及班劒奉還黄鉞七月朱齡石平蜀斬譙縱傳首建鄴九月晉帝以帝平齊定盧循功封帝次子義真為桂陽縣公并重申前命授帝太傅揚州牧加羽葆鼓吹班劒二十人將遣百僚敦勸乃受羽葆鼔吹班劒餘固辭十年息人簡役築東府城起府舍帝以荆州刺史司馬休之宗室之重又得江漢人心疑其有異志而休之子譙王文思在都招聚輕俠帝執送休之令自為其所休之表廢文思并與帝書陳謝十一年正月帝收休之子文寳兄子文祖並賜死率衆西討復加黄鉞領荆州刺史以中軍將軍道憐監留府事休之上表自陳并罪狀帝遂起兵三月帝軍次江陵初雍州刺史魯宗之負力好亂且慮不為帝容常為讖曰魚登日輔帝室與休之相結至是率其子竟陵太守軌㑹于江陵帝濟江休之衆潰與軌等奔襄陽江陵平加領南蠻校尉將拜南蠻遇四廢日佐史鄭鮮之等白遷日不許下書開寛大之恩四月進軍襄陽休之等奔姚興晉帝復申前令授太傅揚州牧劒履上殿入朝不趨贊拜不名加前部羽葆鼔吹置左右長史司馬從事中郎四人封第三子義隆為北彭城縣公八月甲子帝至自江陵奉還黄鉞固辭太傅揚州牧前部羽葆鼓吹其餘受命十二年正月晉帝詔帝依舊辟士加領平北將軍兖州刺史増督南秦凡二十二州帝以平北文武寡少不宜别置於是罷平北府以併大府二月加帝中外大都督初帝平齊仍有定闗洛意遇盧循侵逼故寢及荆雍平乃謀外略㑹姚興死子泓新立兄弟相殺闗中擾亂四月乙丑帝表伐闗洛乃戒嚴北討加領征西將軍司豫二州刺史以世子為徐兖二州刺史帝以義聲懐逺奉琅邪王北伐五月廬江霍山崩獲六鐘獻之天子癸巳加領北雍州刺史前後部羽葆鼓吹増班劒為四十人八月乙巳率大衆進發以世子為中軍將軍監太尉留府事尚書左僕射劉穆之為左僕射領監軍中軍二府軍司入居東府總攝内外九月帝至彭城加領北徐州刺史十月衆軍至洛圍金墉降之修復晉五陵置守衛十二月壬申晉帝加帝位相國總百揆揚州牧以徐州之彭城沛蘭陵下邳淮陽山陽廣陵兖州之髙平魯泰山十郡封帝為宋公備九錫之禮加璽紱逺游冠緑綟綬位在諸侯王上宋國置丞相以下一遵舊儀策書襃美功徳遣大使奉迎枹罕虜乞伏熾盤遣使謁帝求効力討姚泓拜為平西將軍河南公十三年正月帝以舟師進討留彭城公義隆鎮彭城軍次陳留城經張良廟下令以時修飾棟宇致薦焉晉帝追贈帝祖為太常父為特進左光禄大夫讓不受三月冠軍將軍檀道濟等軍次潼闗三月庚辰帝率大軍入河五月帝至洛陽謁晉五陵七月至陜龍驤將軍王鎮惡舟師自河浮渭八月扶風太守沈田子大破姚泓軍於藍田王鎮惡克長安禽姚泓始義熙元年歲鎮熒惑太白聚東井至是而闗中平九月帝至長安長安豐稔帑藏盈積帝先收其彞器渾儀土圭記里鼓指南車及秦始皇玉璽奉送之都其餘珍寳珠玉悉以班賜將帥遷姚宗于江南送泓斬于建康市謁漢長陵大㑹文武於未央殿十月晉帝詔進宋公爵為王加十郡益宋國并前為二十郡其相國揚州牧領征西將軍司豫北徐雍四州刺史如故帝欲息駕長安經略趙魏十一月前將軍劉穆之卒乃歸十二月庚子發自長安以桂陽公義真為安西將軍雍州刺史鎮長安留腹心將佐以輔之十四年正月壬戍帝至彭城解嚴息甲以輔國將軍劉遵考為并州刺史領河東太守鎮蒲坂帝解司州領徐冀二州刺史固讓進爵時漢中成固縣漢水崖際有異聲如雷俄頃岸崩有銅鐘十二出自潛壤鞏縣人宗曜於其田所獲嘉禾九穗同莖帝以獻晉帝晉帝以歸于我帝冲讓乃止六月丁亥受相國宋公九錫之命下令赦國内殊死以下詔崇豫章太夫人為宋公太妃世子為中軍將軍副貳相國府百官悉依天朝之制又詔宋國所封十郡之外悉得除用先是安西中兵參軍沈田子殺安西司馬王鎮惡諸將殺安西長史王修闗中亂十月帝遣右將軍朱齡石代桂陽公義真為雍州刺史義真還為赫連勃勃所追大敗僅以身免諸將帥及齡石並沒十二月晉安帝崩大司馬琅邪王即帝位元熙元年二月晉帝詔徴帝入輔又申前命進公爵為王以徐州之海陵北東海北譙北梁豫州之新蔡兖州之北陳留司州之陳郡汝南潁川滎陽十郡増宋國七月乃受命赦國内五歳刑以下遷都壽陽九月解揚州十二月晉帝命帝冕十有二旒建天子旌旗出警入蹕乗金根車駕六馬備五時副車置旄頭雲罕樂舞八佾設鐘虡宫縣進王太妃為太后王妃為王后世子為太子王子王孫爵命之號一如舊儀二年正月帝表讓殊禮賁陵郡江濵自開出古銅禮器十餘枚帝獻之天子天子讓不受於是歸諸瑞物藏於相府四月詔遣敦勸兼徴帝入輔六月壬戍帝至都甲寅晉帝禪位于宋有司草詔既成請書之天子即便操筆謂左右曰桓元之時天命已改重為劉公所延將二十載今日之事本所甘心甲子遣使奉策于帝又遣使持節兼太保散騎常侍光禄大夫謝澹兼太尉尚書劉宣範奉璽書歸皇帝璽綬受終之禮一如唐虞漢魏故事帝奉表陳讓晉帝已遜于琅邪王第表不獲通於是陳留王䖍嗣等二百七十人及宋臺羣臣並上表勸進猶不許太史令駱達陳天文符應曰案晉義熙元年至元熙元年太白晝見經天凡七占曰太白經天人更主異姓興義熙七年五虹見于東方占曰五虹見天子黜聖人出九年鎮星歳星太白熒惑聚于東井十三年鎮星入太微占曰鎮星守太微有立王有徙王元熙元年冬黒龍四登于天易傳曰冬龍見天子亡社稷大人受命冀州道人釋法稱告其弟子曰嵩神言江東有劉將軍漢家苗裔當受天命吾以璧三十二鎮金一餅與之劉氏十世之數也漢建武至建安末一百九十六年而禪魏魏自黄初至咸熙末四十六年而禪晉晉自太始至今百五十六年三代揖讓咸窮於六又漢光武社于南陽漢末而其樹死劉備有蜀廼應之而興及晉季年舊根始萌至是而盛矣若此者有數十條羣臣又固請乃從之永初元年夏六月丁夘皇帝即位於南郊設壇柴燎告天禮畢備法駕幸建康宫臨太極前殿大赦改元賜民爵二級鰥寡孤獨貧不能自存者人榖五斛逋租宿貸勿收其犯鄉論清議贜汚淫盗一皆蕩滌長徙之身特皆原遣亡官失爵禁錮奪勞一依舊凖封晉帝為零陵王全食一郡載天子旌旗乘五時副車行晉正朔郊祀天地禮樂制度皆用晉典上書不為表答表不稱詔官于故秣陵追尊皇考為孝穆皇帝妣為穆皇后尊王太后為皇太后詔曰夫微禹之感歎深後昆愛人懐樹猶或勿翦雖在異代義無廢絶降殺之儀一依前典可降始興公為縣公廬陵公為柴桑縣公始安公為荔浦縣侯長沙公為醴陵縣侯康樂公即降為縣侯以奉晉故丞相王導太傅謝安大將軍温嶠大司馬陶侃車騎將軍謝元之祀其宣力義熙者一仍本秩無即減降庚午以司空道憐為太尉封長沙王立南郡公義慶為臨川王僕射徐羡之加鎮軍將軍左衛將軍謝晦為中領軍宋國領軍檀道濟為護軍將軍中領軍劉義欣為青州刺史又詔論戰亡追贈及酬賞除復之科乙亥封皇子義陽公義真為廬陵王彭城公義隆為宜都王義康為彭城王丁丑使使廵行四方旌賢舉善問人疾苦獄訟虧濫政刑乖愆傷化誘俗未允人聽者皆具以聞戊寅詔増百官俸己夘改晉泰始厯為永初厯社以子臘以辰秋七月丁亥原放刼賊餘口沒在臺府者諸流徙之家並聽還本又以市税繁苦優量減降從征闗洛殞身不及殯者贍賜其家己丑陳留王曹䖍嗣薨辛夘復置五校三將官増殿中將軍員二十人餘在員外戊戍征西大將軍開府儀同三司楊盛進號車騎大將軍甲辰鎮西將軍李歆進號征西大將軍平西將軍乞伏熾盤進號安西大將軍征東將軍髙句驪王髙璉進號征東大將軍鎮東將軍百濟王扶餘映進號鎮東大將軍置東宫冗從僕射虎賁中郎將官戊申遷神主於太廟車駕親奉壬子詔改權制率從寛簡八月辛酉詔舊郡縣以北為名者悉除之寓立於南者聽以南為號戊辰詔曰彭城桑梓敦本斯隆宜同豐沛其沛郡下邳各復租布三十年辛未追諡妃臧氏為敬皇后陵曰永寜癸酉立王太子義符為皇太子乙亥赦見罪人閏月壬午置晉帝諸陵守衛其名賢先哲詳加灑埽丁酉林邑國遣使朝貢九月壬子置東宫殿中將軍十人員外二十人壬申置都官尚書是歳魏明元皇帝太恒五年西涼亡二年春正月辛酉祀南郊大赦丙寅斷金銀塗以揚州刺史廬陵王義真為司徒以尚書僕射徐羡之為尚書令揚州刺史己夘禁喪事用銅釘罷㑹稽郡府二月己丑策試州郡孝秀于延賢堂倭國遣使朝貢三月乙丑初限荆州府置將不得過二千人吏不得過一萬人州置將不得過五百人吏不得過五千人兵士不在此限夏四月己夘初禁淫祀除諸房廟其先賢以勲徳立祠者不在此例戊辰聽訟於華林園五月己酉置東宫屯騎歩兵翊軍三校尉官秋七月己巳地震九月己丑零陵王殂宋志也車駕率百僚臨于朝堂三日如魏明帝服山陽公故事使兼太尉持節護喪事葬以晉禮冬十月己亥以涼州胡帥大沮渠蒙遜為鎮軍大將軍開府儀同三司涼州刺史十一月辛亥𦵏晉恭皇帝于沖平陵車駕率百官瞻送三年春正月甲辰朔詔刑罪無輕重悉原之癸丑以尚書令揚州刺史徐羡之為司空録尚書事刺史如故進江州刺史王𢎞衛將軍開府儀同三司以太子詹事傅亮為尚書僕射中領軍謝晦為領軍二月丙戍有星孛于虛危三月上不豫太尉長沙王道憐司空徐羡之尚書僕射傅亮領軍將軍謝晦護軍將軍檀道濟並入侍醫藥羣臣請祈禱神祗上不許惟使侍中謝方明以疾告廟而已丁未以廬陵王義真為侍中車騎將軍開府儀同三司南豫州刺史己未上疾瘳大赦夏四月乙亥封仇池公楊盛為武都郡王五月上疾甚召太子戒之曰檀道濟雖有幹略而無逺志非如兄韶有難御之氣徐羡之傅亮當無異圖謝晦屢從征伐頗識機變若有異必此人也小郤可以㑹稽江州處之又為手詔朝廷不湏復有别府宰相帶揚州可置甲士千人若大臣中任要宜有爪牙以備不祥人者可以臺見留隊給之有征討悉配以臺見軍隊行還復舊後世若有幼主朝事一委任宰相母后不煩臨朝仗既不許入臺殿門要重人可詳給班劔癸亥上崩于西殿時年六十七月己酉葬丹陽建康縣蔣山初寜陵羣臣上諡曰武皇帝廟號髙祖上清簡寡欲嚴整有法度未嘗視珠玉輿馬之飾後庭無紈綺絲竹之音初朝廷未備音樂長史殷仲文以為言帝曰日不暇給且所不解仲文曰屢聽自然解之帝曰政以解則好之故不習耳寜州嘗獻虎魄枕光色甚麗價盈百金時將北伐以虎魄療金創上大悦命碎分諸將平闗中得姚興從女有盛寵以之廢事謝晦諌即時遣出財帛皆在外府内無私藏宋臺建有司奏東西堂施局腳牀金塗釘上不許使用直腳牀釘用鐵廣州嘗獻入筒細布端八丈帝惡其精麗勞人即付有司彈太守以布還之并制嶺南禁作此布帝素有熱病并患金創末年尤劇坐卧常湏冷物後有人獻石牀寢之極以為佳乃歎曰木牀且費而况石耶即令毁之制諸主出適遣送不過三十萬無錦繡金玉内外奉禁莫不節儉性尤簡易常著連齒木屐好出神虎門内左右逍遥從者不過十餘人時徐羡之住西州嘗思羡之便歩出西掖門羽儀絡繹追隨已出西明門矣諸子旦問起居入閤脱公服止著裙帽如家人之禮焉微時躬耕於丹徒及受命耨耜之具頗有存者皆命藏之以留於後及文帝幸舊官見而問焉左右以實對文帝色慙有近侍進曰大舜躬耕歴山伯禹親事土木陛下不覩列聖之遺物何以知稼穡之艱難何以知先帝之至徳乎及孝武大明中壊上所居隂室於其處起玉燭殿與羣臣觀之牀頭有土障壁上挂葛燈籠麻繩拂侍中袁覬盛稱先帝儉素之徳孝武不答獨曰田舍公得此已為過矣然則髙祖能光有天下克成大業盛矣哉武帝永初三年少帝諱義符小字車兵武帝長子也母曰張夫人晉義熙二年生帝於京口時武帝年踰不惑尚未有男及帝生甚悦年一歳拜豫章公世子帝膂力絶人善騎射解音律武帝北征闗中進號中軍將軍監太尉留府事宋臺建拜宋世子即本號副貳相國元熙元年進為宋太子武帝受禪立為皇太子永初三年五月癸亥武帝崩是日太子即皇帝位大赦制服三年尊皇太后曰太皇太后六月壬申以尚書僕射傅亮為中書監尚書令司空徐羡之領軍將軍謝晦及亮輔政戊子太尉長沙王道憐薨秋九月丁未有司奏武皇帝配南郊武敬皇后配北郊冬十一月戊午有星孛于營室十二月庚戍魏軍克滑臺景平元年春正月己亥朔大赦改元文武賜位二等辛丑祀西郊魏軍克金墉城癸夘河南郡失守乙夘有星孛于東壁二月丁丑太皇太后崩鎮軍大將軍大沮渠蒙遜河南鮮卑吐谷渾阿豺並遣使朝貢庚辰進蒙遜驃騎大將軍封河西王以阿豺為安西將軍沙州刺史封澆河公三月壬辰孝懿皇后祔葬于興寜陵是月髙麗國遣使朝貢夏閏四月己未魏軍克虎牢秋七月癸酉尊所生母張夫人為皇太后丁丑赦五歳刑以下冬十月己未有星孛于氐是歲魏明元皇帝崩二年春二月己夘朔日有食之廢南豫州刺史廬陵王義真為庶人徙新安郡乙巳大風天有雲五色占者以為有兵執政使使者誅皇弟義真于新安髙麗國遣使朝貢時帝居處所為多乖失夏五月己酉皇太后令暴帝過惡廢為滎陽王一依漢昌邑晉海西故事奉迎鎮西將軍宜都王義隆入纂皇統始徐羡之傅亮將廢帝諷王𢎞檀道濟求赴國許𢎞等來朝使中書舍人邢安泰潘盛為内應是旦道濟謝晦領兵居前羡之等隨後因東掖門開入自雲龍門盛等先戒宿衛莫有禦者時帝於華林園為列肆親自酤賣又開瀆聚土以象破岡埭與左右引船唱呼以為歡樂夕游天泉池即龍舟而寢其朝未興兵士進殺二侍者於帝側傷帝指扶出東閤就收璽紱羣臣拜辭送于東宫遂幽于呉郡是日赦死罪以下太后令奉還璽紱檀道濟入守朝堂六月癸丑徐羡之等使中書舍人邢安泰弑帝於金昌亭帝有勇力不即受制突走出昌門追以門闗踣之致殞時年十九少帝景平二年太祖文皇帝諱義隆小字車兒武帝第三子也晉義熙三年生於京口十一年封彭城縣公永初元年封宜都郡王位鎮西將軍荆州刺史加都督時年十四長七尺五寸博渉經史善隸書是歲來朝㑹武帝當聽訟仍遣上訊建康獄囚辯斷稱㫖武帝甚悦景平初有黒龍見西方五色雲隨之二年江陵城上有紫雲望氣者皆以為帝王之符當在西方其年少帝廢百官議所立徐羡之傅亮等以禎符所集備法駕奉迎入奉皇統行臺至江陵尚書令傅亮奉表進璽紱州府佐吏並稱臣請題榜諸門一依宫省上皆不許教州府國綱紀宥所統内見刑是時司空徐羡之等新有弑害及鑾駕西迎人懐疑懼惟長史王曇首司馬王華南蠻校尉到彦之共期朝臣未有異志帝曰諸君受遺不容背貳且勞臣舊將内外充滿今兵力又足以制物夫何所疑甲戍乃發江陵命王華知州府留鎮陜西令到彦之監襄陽車駕在道有黒龍躍負上所乗舟左右莫不失色上謂王曇首曰此乃夏禹所以受天命我何徳以堪之及至都羣臣迎拜於新亭先謁初寜陵還次中堂百官奉璽紱冲讓未受勸請數四乃從之元嘉元年秋八月丁酉皇帝即位于中堂備法駕入宫御太極前殿大赦改元文武賜位二等戊戍拜太廟詔追復廬陵王先封奉迎靈柩辛丑謁臨川烈武王陵癸夘進司空徐羡之位司徒江州刺史王𢎞位司空尚書令傅亮左光禄大夫開府儀同三司荆州刺史謝晦鎮北將軍南兖州刺史檀道濟征北將軍甲辰追尊所生胡媫妤為章皇太后封皇弟義恭為江夏王義宣為竟陵王義季為衡陽王己酉減荆湘二州今年租布之半九月丙子立妃袁氏為皇后是歳魏太武皇帝始光元年二年春正月丙寅司徒徐羡之尚書令傅亮奉表歸政上始親覽萬機辛未祀南郊大赦秋八月乙酉驃騎將軍南徐州刺史彭城王義康以本號開府儀同三司改授司空王𢎞車騎大將軍開府儀同三司冬十一月庚午以武都王楊元為北秦州刺史襲封武都王是歳赫連屈丐死三年春正月丙寅司徒徐羡之尚書令傅亮有罪伏誅遣中領軍到彦之征北將軍檀道濟討荆州刺史謝晦上親率六師西征大赦丁夘以江州刺史王𢎞為司徒録尚書事二月戊午以金紫光禄大夫王敬𢎞為尚書左僕射豫章太守鄭鮮之為右僕射戊辰到彦之檀道濟大破謝晦於隐磯丙子車駕自蕪湖反斾己夘禽晦於延頭送都伏誅夏五月乙未以征北將軍南兖州刺史檀道濟為征南大將軍開府儀同三司江州刺史乙巳驃騎大將軍涼州牧大沮渠蒙遜改為車騎大將軍詔大使廵行四方觀省風俗丙午臨延賢堂聽訟自是每歳三訊秋旱且蝗冬十二月前呉郡太守徐佩之謀反伏誅四年春正月乙亥朔曲赦建鄴百里内辛巳祀南郊二月乙夘行幸丹徒謁京陵三月丙子宴丹徒宫帝鄉父老咸與焉蠲丹徒今年租布原五歳刑以下丁亥車駕還宫戊子尚書右僕射鄭鮮之卒壬寅採富陽令諸葛闡議禁斷夏至日五絲命縷之屬夏五月都下疾疫遣使者存問給醫藥死無家屬者賜以棺器六月癸夘朔日有食之五年春正月乙亥詔以陰陽愆序求讜言甲申臨元武館閲武戊子都下大火遣使廵慰振恤夏六月庚戍司徒王𢎞降為衛將軍開府儀同三司都下大水乙夘遣使檢行振贍十二月天竺國遣使朝貢是歳魏元䴥元年太武皇帝伐赫連昌滅之乞伏熾盤死六年春正月辛丑祀南郊癸丑以荆州刺史彭城王義康為司徒録尚書事三月丁巳立皇子劭為皇太子戊午大赦賜文武位一等夏四月癸亥以尚書左僕射王敬𢎞為尚書令丹陽尹臨川王義慶為尚書左僕射吏部尚書江夷為右僕射五月壬辰朔日有食之秋七月百濟王遣使朝貢冬十一月己丑朔日有食之星晝見十二月西河河南國並遣使朝貢七年春二月壬戍雪且雷三月戊子遣左將軍到彦之侵魏夏六月己夘封氐楊難當為武都王冬十月戊午立錢署鑄四銖錢戊寅魏克金墉城十一月癸未又克虎牢壬辰遣征西大將軍檀道濟拒魏右將軍到彦之自滑臺奔退十二月都下火延燒于太社北牆是歳馮跋死倭百濟呵羅單林邑呵羅他師子等國並遣使朝貢呉興晉陵義興大水遣使廵行振恤八年春二月辛酉魏克滑臺癸酉檀道濟引軍還自是河南復亡三月大雩夏六月乙丑大赦旱故又大雩閏六月乙巳遣使省行獄訟簡息徭役九年春二月辛夘詔曰故太傅長沙景王故大司馬臨川烈武王故司徒南康文宣公穆之衛將軍華容公𢎞征南大將軍永修公道濟故左將軍龍陽侯鎮惡或履道廣深執徳沖邈或雅量髙劭風鑒明逺或識凖𢎞正才略開邁咸文徳以𢎞帝載武功以隆景業而太常未銘從祀闕享寤寐屬慮永言興懐便宜配祭廟庭勒功天府三月庚戍進衛將軍王𢎞為太保丁巳加江州刺史檀道濟為司空夏五月壬申新除太保王𢎞薨六月癸未置積弩彊弩將軍官乙未以征西將軍沙州刺史吐谷渾慕璝為征西大將軍西秦河二州刺史隴西王壬寅以撫軍將軍江夏王義恭為征北將軍開府儀同三司南兖州刺史秋七月庚午以領軍將軍殷景仁為尚書僕射冬十月庚寅立皇子紹為廬陵王奉孝獻王祀江夏王義恭子朗為南豐王奉滎陽王祀是歳魏延和元年十年春正月甲寅改封竟陵王義宣為南譙王己未大赦夏林邑闍婆娑州訶羅單國並遣使朝貢秋七月戊戌曲赦益梁秦三州冬十一月氐楊難當據有梁州是月沮渠蒙遜死十一年夏四月梁秦二州刺史蕭思話破氐梁州平五月丁夘曲赦梁南秦二州劒閣以北戊寅以大沮渠茂䖍為征西大將軍梁州刺史封西河王是歲林邑扶南訶羅單國並遣使朝貢十二年春正月辛酉大赦辛未祀南郊癸酉封馮𢎞為燕王夏四月丙辰詔内外舉士都下地震六月禁酒師子國遣使朝貢丹陽淮南呉呉興義興大水都下乘船己酉以徐豫南兖三州㑹稽宣城二郡米數百萬斛賜五郡遭水人秋七月辛酉闍婆娑達扶南國並遣使朝貢八月乙亥原除遭水郡諸逋負九月蜀將張尋為㓂是歲魏太延元年十三年春正月癸丑朔上有疾不朝㑹三月己未誅司空江州刺史檀道濟庚申大赦夏六月髙麗武都等國並遣使朝貢秋七月己未零陵王太妃殂追崇為章皇后𦵏以晉禮九月癸丑立皇子濬為始興王駿為武陵王是歳馮𢎞奔髙麗十四年春正月辛夘祀南郊大赦戊戍鳯皇二見于都下衆鳥隨之改其地曰鳯皇里夏四月蜀將張尋趙廣降遷之建鄴冬十二月辛酉初停賀雪河南西河訶羅單國並遣使朝貢十五年春正月以平東將軍吐谷渾慕延為鎮西將軍秦河二州刺史封隴西王秋七月辛未地震新作東宫是歳武都河南髙麗倭扶南林邑等國並遣使朝貢立儒學館于北郊命雷次宗居之十六年春正月戊寅閲武于北郊庚寅進彭城王義康為大將軍領司徒以開府儀同三司江夏王義恭為司空夏六月癸酉改封隴西王吐谷渾慕延為河南王秋八月庚子立皇子鑠為南平王九月魏滅沮渠茂䖍冬十二月乙亥皇太子冠太赦是歳武都河南林邑髙麗等國並遣使朝貢上好儒雅又命丹陽尹何尚之立元素學著作佐郎何承天立史學司徒參軍謝元立文學各聚門徒多就業者江左風俗於斯為美後言政化稱元嘉焉十七年夏四月戊午朔日有蝕之秋七月壬子皇后袁氏崩八月徐兖青冀四州大水遣使振恤九月壬子𦵏元皇后于長寜陵冬十月戊午前丹陽尹劉湛有罪伏誅大赦文武賜爵一級以大將軍領司徒錄尚書事彭城王義康為江州刺史大將軍如故甲戌以司徒江夏王義恭為司徒錄尚書事十一月尚書僕射揚州刺史殷景仁卒十二月癸亥以光禄大夫王球為尚書僕射戊辰武都河南百濟等國並遣使朝貢是歲魏太平眞君元年十八年春二月庚子雨雹戊申置尚書刪定郎官夏五月壬午衛將軍南兖州刺史臨川王義慶征北將軍南徐州刺史南譙王義宣並開府儀同三司甲申河水汎溢害居人六月戊辰遣使廵行振贍冬十一月戊子尚書僕射王球卒己亥以丹陽尹孟顗為尚書僕射氐楊難當㓂漢川十二月晉寜太守爨松子舉兵反寜州刺史徐循討平之是歲河南肅慎髙麗蘇摩黎林邑等國並遣使來朝貢十九年夏四月甲戍上以乆疾愈始奉初祠大赦五月庚寅梁秦二州刺史劉真道龍驤將軍裴方明破楊難當仇池平閏月都下水遣使廵行振恤六月以大沮渠無諱為征西大將軍涼州刺史封西河王秋七月甲戍晦日有食之九月丙辰有客星在北斗因為彗入文昌貫五車埽畢拂天節經天苑季冬乃滅冬十二月丙申詔奉聖之允速議承襲及令修廟四時饗祀并命蠲近墓五家供灑埽栽松栢六百株是歲蠕蠕河南扶南婆皇國並遣使朝貢西涼武昭王孫李寳始歸于魏二十年春正月辛亥祀南郊二月甲申閲武於白下魏軍克仇池夏四月甲戍立皇子誕為廣陵王秋七月癸丑以楊文徳為征西將軍北秦州刺史封武都王冬十月雷十一月壬午置籍田是歲河西髙麗百濟倭國並遣使朝貢自去歲至是諸州郡水旱傷稼人大飢遣使開倉振恤二十一年春正月己亥南徐南兖南豫州揚州之浙江西並禁酒辛酉親耕籍田大赦二月己丑司徒録尚書事江夏王義恭進位太尉領司徒辛夘立皇子宏為建平王秋八月戊辰以荆州刺史衡陽王義季為征北大將軍開府儀同三司南兖州刺史九月甲辰以大沮渠安周為征西將軍涼州刺史封河西王冬十月己亥命刺史郡守修東耕丙子雷且電二十二年春正月辛夘朔改用御史中丞何承天元嘉新厯二月甲戍立皇子禕為東海王昶為義陽王秋七月己未以尚書僕射孟顗為左僕射中護軍何尚之為右僕射九月己未開酒禁癸酉宴于武帳堂上將行勑諸子且勿食至㑹所賜饌日旰食不至有飢色上誡之曰汝曹少長豐佚不見百姓艱難今使爾識有飢苦知以節儉期物冬十二月乙未太子詹事范曄謀反及黨與皆伏誅丁酉免大將軍彭城王義康為庶人絶屬籍是冬浚淮起湖熟廢田千餘頃二十三年夏四月丁未大赦六月癸未朔日有食之交州刺史檀和之伐林邑國克之是歲大有年築北堤立元武湖於樂游苑北興景陽山於華林園役重人怨二十四年春正月甲戍大赦賜文武位一等夏四月河濟俱清六月都下疫癘使廵省給醫藥以貨貴制大錢一當兩秋八月乙未徐州刺史衡陽王義季薨冬十一月甲寅立皇子渾為汝陽王是歲徐兖青冀四州大水二十五年春閏二月己酉大蒐於宣武塲三月庚辰校獵夏四月乙巳新作閶闔廣莫二門改先廣莫門曰承明開陽門曰津陽五月乙夘罷當兩大錢六月庚戍零陵王司馬元瑜薨丙寅加荆州刺史南譙王義宣位司空八月甲子立皇子彧為淮陽王九月辛未以尚書右僕射何尚之為尚書左僕射冬青州城南逺望見地中如水有影謂之地鏡二十六年春正月辛巳祀南郊二月己亥幸丹徒謁京陵三月丁巳宴于丹徒宫大赦復丹徒縣僑舊今歲租布之半行所經過蠲田租之半癸亥使祭晉故司空忠肅公何無忌墓壬午至自丹徒丙戍婆皇國壬辰婆達國並遣使朝貢冬十月庚子改封廣陵王誕為隨郡王癸夘彗星見于太微甲辰以揚州刺史始興王濬為征北將軍開府儀同三司徐兖二州刺史二十七年春正月辛夘百濟國遣使朝貢二月魏軍攻縣瓠以軍興減百官奉禄三分之一三月乙丑淮南太守諸葛闡求減奉禄同内百官於是諸州郡縣丞尉並悉同減戊寅罷國子學秋七月庚午遣寜朔將軍王元謨拒魏太尉江夏王義恭出次彭城總統諸軍冬十一月丁未大赦十二月庚午魏太武帝率大衆至𤓰歩聲欲度江都下震懼咸荷擔而立壬午内外戒嚴縁江六七百里舳艫相接始議北侵朝士多有不同至是帝登烽火樓極望不悦謂江湛曰北伐之計同議者少今日士庶勞怨不得無慙貽大夫之憂在予過矣甲申使饋百牢于魏二十八年春正月丁亥魏太武帝自𤓰歩退歸俘廣陵居人萬餘家以北徐豫青冀二兖六州殺略不可勝算所過州郡赤地無餘二月甲戍降太尉領司徒江夏王義恭為驃騎將軍開府儀同三司壬午幸𤓰歩是日解嚴三月乙酉車駕還宫丙申拜初寜陵大旱夏四月癸酉婆達國遣使朝貢己夘彗星見于昴是月都下疾疫使廵省給醫藥五月乙酉亡命司馬順則自號齊王據梁鄒城丁巳婆皇國戊戍河南國並遣使朝貢戊申以尚書左僕射何尚之為尚書令太子詹事徐湛之為左僕射護軍將軍壬子彗星見太微中對帝座秋七月甲辰進安東將軍倭王綏濟為安東大將軍八月癸亥梁鄒平斬司馬順則是秋猛虎入郭内為災冬十月癸亥髙麗國遣使朝貢十二月壬寅曲赦二兖徐豫青冀六州徙彭城流人於𤓰歩淮西流人於姑熟合萬許家是歲魏正平元年二十九年春正月甲午詔經㓂六州仍逄災澇可量加救贍二月乙夘雷且雪戊午立皇子休仁為建安王三月壬午大風拔木都下火夏四月戊午訶羅單國遣使朝貢秋七月壬辰改封汝陰王渾為武昌王淮陽王彧為湘東王丁酉省大司農太子太僕廷尉監官九月丁亥以平西將軍吐谷渾拾寅為安西將軍秦河二州刺史封河南王冬十一月壬寅揚州刺史廬陵王紹薨十二月戊辰黄霧四塞辛未以南兖州刺史江夏王義恭為大將軍南徐州刺史錄尚書如故是歲魏中常侍宗愛構逆太武皇帝崩乃奉南安王余為帝改元為承平後又賊余於是殿中尚書長孫渴侯尚書陸麗奉皇孫是為文成皇帝改元曰興安三十年春正月乙亥朔㑹羣臣於太極前殿有青黒氣從東南來覆映宫上戊寅以司空荆州刺史南譙王義宣為司徒中軍將軍揚州刺史壬午以南徐州刺史始興王濬為衛將軍開府儀同三司荆州刺史戊子使江州刺史武陵王駿統衆軍伐西陽蠻二月甲子元凶劭構逆帝崩于合殿時年四十七諡景皇帝廟號中宗三月癸巳𦵏長寜陵孝武帝踐祚追改諡曰文帝廟號太祖帝聰明仁厚雅重文儒克勤政事孜孜無怠加以在位日乆惟簡靖為心于時政平訟理朝野悦睦自江左之政所未有也又性存儉約不好奢侈車府令嘗以輦䇨故請改易之又輦席舊以烏皮縁故欲代以紫皮上以竹䇨未至於壊紫色貴並不聽改其率素如此云文帝元嘉三十年世祖孝武皇帝諱駿字休龍小字道人文帝第三子也元嘉七年八月庚午夜生有光照室少機警神明爽發讀書七行俱下才藻甚美雄決英武長於騎射十二年立為武陵王二十二年累遷雍州刺史自晉江左以來襄陽未有皇子重鎮時文帝欲經略闗河故有此授及魏太武大舉至淮南時帝鎮彭城魏使尚書李孝伯至帝遣長史張暢與語而帝改服觀之孝伯目帝不輟及出謂人曰張侯側有人風骨視瞻非常士也二十八年為都督江州刺史時縁江蠻為㓂文帝遣太子歩兵校尉沈慶之等伐之使上總統衆軍三十年正月出次西陽五洲㑹元凶弑逆上率衆入討荆州刺史南譙王義宣雍州刺史臧質並舉義兵三月乙未建牙于軍門是時多不悉舊儀有一翁班白自稱少從武帝征伐頗悉其事因使指麾事畢忽失所在自冬至春常東北風連陰不霽其日牙立之後風轉而西南景色開霽有紫雲二蔭于牙上四月辛酉上次漂洲丙寅次江寜丁夘大將軍江夏王義恭來奔奉表上尊號戊辰上至新亭己巳即皇帝位大赦改文帝號諡以大將軍江夏王義恭為太尉南徐州刺史庚午以荆州刺史南譙王義宣為中書監丞相揚州刺史並錄尚書六條事以安東將軍隨王誕為衛將軍荆州刺史加雍州刺史臧質車騎將軍並開府儀同三司以江州刺史撫軍將軍蕭思話為尚書左僕射壬申以征虜將軍王僧達為右僕射改新亭為中興亭夏四月乙亥輔國將軍朱修之克東府丙申克建鄴二凶及同逆並伏誅庚辰詔分遣大使廵省方俗是日解嚴辛巳幸東府城甲申尊所生路淑媛為皇太后乙酉立妃王氏為皇后壬辰以太尉江夏王義恭為太傅領大司馬甲午謁初寜陵曲赦建鄴二百里内並蠲今年租税戊戍以撫軍將軍南平王鑠為司空建平王宏為尚書左僕射六月丙午車駕還宫初置殿門及上閤門屯兵庚午以丹陽尹禇湛之為尚書右僕射庚申詔有司論功班賞各有差辛酉安西將軍西秦河二州刺史吐谷渾拾寅進號鎮西大將軍開府儀同三司辛未改封南譙王義宣為南郡王隨王誕為竟陵王閏月丙子遣兼散騎常侍樂詢等十五人廵行風俗庚申加太傅江夏王義恭録尚書事以荆州刺史竟陵王誕為侍中驃騎大將軍開府儀同三司揚州刺史甲申蠲尋陽西陽郡租布三年是月置衛尉官秋七月辛丑朔日有食之辛酉詔崇儉約禁淫侈己巳司空南平王鑠薨以侍中南郡王世子恢為尚書右僕射冬十月癸未聽訟於閲武堂十一月丙辰停臺省衆官朔望問訊丙寅髙麗王遣使朝貢十二月甲戍省都水使者官置水衡令官癸未以將置東宫省太子率更令歩兵翊軍校尉虎賁中郎將冗從僕射左右積弩將軍官中庶子中舍人庶子舍人洗馬各減舊員之半孝建元年春正月己亥朔祀南郊大赦改元壬戍更鑄四銖錢丙寅立皇子子業為皇太子賜天下為父後者爵一級是月起正光殿二月庚子豫州刺史魯爽車騎將軍江州刺史臧質丞相荆州刺史南郡王義宣兖州刺史徐道寶舉兵反壬午曲赦豫州三月癸亥内外戒嚴夏五月甲寅義宣等攻梁山左衛將軍王元謨大破之己未解嚴癸亥以呉興太守劉延孫為尚書右僕射六月戊辰臧質走至武昌為民所斬傳首建鄴甲戍撫軍將軍栁元景進號撫軍大將軍及鎮北將軍沈慶之並開府儀同三司癸未罷南蠻校尉官戊子省録尚書官庚寅義宣於江陵賜死秋七月丙申朔日有食之既丙辰大赦賜文武爵一級冬十月戊寅詔開建仲尼廟制同諸侯之禮詳擇爽塏厚給祭秩十一月