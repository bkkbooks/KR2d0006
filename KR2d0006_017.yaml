鳥喙長頸鋭下㓜而狷急在東宫每為孝武所責孝武西廵帝啟參承起居書迹不謹上詰讓之曰書不長進此是一條耳聞汝比素業都懈狷戾日甚何以頑固乃爾初踐阼受璽紱慠然無哀容蔡興宗退而歎曰昔魯昭不戚叔孫請死國家之禍其在此乎帝始猶難諸大臣及戴法興等既殺諸大臣莫不震懾於是又誅羣公元凱以下皆被毆捶牽曳内外危懼殿省騷然太后疾篤遣呼帝帝曰病人間多鬼可畏那可徃太后怒語侍者曰將刀來破我腹那得生寜馨兒及太后崩後數日帝夢太后謂曰汝不仁不孝本無人君之相子尚愚悖如此亦非運祚所及孝武險虐滅道怨結人神兒子雖多並無天命大命所歸應還文帝之子故帝聚諸叔都下慮在外為患山隂主淫恣過度謂帝曰妾與陛下雖男女有殊俱託體先帝陛下後宫數百妾惟駙馬一人事不均平一何至此帝乃為立面首左右三十人進爵㑹稽郡長公主秩同郡王湯沐邑二千户給鼔吹一部加班劒二十人帝每出公主與朝臣常共陪輦帝少好讀書頗識古事粗有文才自造孝武帝誄及雜篇章徃徃有辭采以魏武有發邱中郎將摸金校尉乃置此二官以建安王休仁山陽王休祐領之其餘事迹分見諸列傳前廢帝景和元年太宗明皇帝諱彧字休炳小字榮期文帝第十一子也元嘉十六年十月生二十五年封淮陽王二十九年改封湘東王孝武踐阼累遷鎮軍將軍雍州刺史是歳入朝時廢帝疑畏諸父以上付廷尉明日將加禍害上乃與腹心阮佃夫李道兒等密謀時廢帝左右直閤將軍宋越譚金童太一等是夜並外宿佃夫道兒因結壽寂之等十一月十九日弑廢帝於後堂建安王休仁便稱臣奉引升西堂登御坐事出倉卒上失履跣猶著烏紗帽休仁呼主衣以白紗代之未即位凡衆事悉稱令書己未司徒豫章王子尚山陰公主並賜死宋越譚金童太一伏誅十二月庚申朔令書以東海王禕為中書監太尉以晉安王子勛為車騎將軍開府儀同三司癸亥以建安王休仁為司徒尚書令揚州刺史乙丑改封安陸王子綏為江夏王泰始元年即大明九年也魏和平六年冬十二月丙寅皇帝即位于太極前殿大赦改元辛未改封臨賀王子産為南平王晉熙王子輿為廬陵王壬申以王景文為尚書僕射乙亥追尊所生沈媫妤曰宣皇太后戊寅改太皇太后為崇憲太后立皇后王氏罷二銖錢江州刺史晉安王子勛舉兵反鎮軍長史袁顗赴之鄧琬為其謀主壬午謁太廟甲申郢州刺史安陸王子綏㑹稽太守尋陽王子房臨海王子頊並舉兵同逆二年春正月乙未晉安王子勛僭即偽位於尋陽年號義嘉壬辰徐州刺史薛安都舉兵反甲午内外戒嚴司徒建安王休仁都督諸軍南討丙戍徐州刺史申令孫司州刺史龎孟蚪豫州刺史殷琰青州刺史沈文秀冀州刺史崔道固湘州行事何慧文廣州刺史袁曇益州刺史蕭惠開梁州刺史栁元怡並同逆丙午車駕親御六軍頓中興堂辛亥南豫州刺史山陽王休祐改為豫州刺史西討呉郡太守顧琛呉興太守王曇生義興太守劉延熙晉陵太守袁標山陽太守程天祚並舉兵反鎮軍將軍巴陵王休若統軍東討壬子崇憲太皇太后崩二月乙丑以蔡興宗為尚書右僕射壬申呉興太守張永右將軍蕭道成東討平晉陵丁亥建武將軍呉喜公率諸軍破賊於呉興㑹稽平定三郡同逆皆伏誅輔國將軍蕭道成前鋒北討輔國將軍劉勔前鋒西討劉胡衆四萬據赭圻三月庚寅撫軍將軍殷孝祖攻赭圻死之以輔國將軍沈攸之代為南討前鋒賊衆稍盛袁顗頓鵲尾連營至濃湖衆十餘萬丙申南徐州刺史桂陽王休範緫統北討諸軍事戊戍貶尋陽王子房為松滋縣侯癸夘令人入米七百石除郡減此各有差壬子斷新錢專用古錢夏五月甲寅𦵏崇憲皇太后於修寜陵秋七月丁酉以仇池太守楊僧嗣為北秦州刺史封武都王八月己夘司徒建安王休仁率衆軍大敗賊斬偽尚書僕射袁顗進討江郢荆湘雍五州平之晉安王子勛安陸王子綏臨賀王子頊邵陵王子元並賜死同黨皆伏誅諸將帥封賞各有差九月癸巳六軍解嚴戊戍以王元謨為左光禄大夫開府儀同三司領䕶軍將軍冬十月乙夘永嘉王子仁始安王子真淮南王子孟南平王子産廬陵王子輿松滋侯子房並賜死丁夘以沈攸之為中領軍與張永俱北討戊寅立皇子子昱為皇太子十一月壬辰立建平王景素子延年為新安王十二月薛安都要引魏軍張永沈攸之大敗於是遂失淮北四州及豫州淮西地是歲魏天安元年三年春正月庚子以農役將興詔太官停宰牛癸夘曲赦豫南豫二州閠正月庚午都下大雨雪遣使巡行振貸各有差二月甲申為戰亡將士舉哀丙申曲赦青冀二州夏四月丙戍詔以故丞相江夏文獻王義恭故太尉巴東忠烈公栁元景故司空始興襄公沈慶之故征西將軍洮陽肅侯宗慤陪祭孝武廟庭庚子立桂陽王休範第三子徳嗣為廬陵王立侍中劉韞第三子銑為南豐王以奉廬江昭王南豐哀王祀五月丙辰詔宣太后崇寜陵禁内墳瘞遷徙者給𦵏直蠲復其家壬戍以太子詹事袁粲為尚書僕射秋八月壬寅以中領軍沈攸之行南兖州刺史率衆北伐九月戊午以皇后六宫以下雜衣千領金釵千枚賜北伐將士冬十月壬午改封新安王延年為始平王辛丑以鎮西大將軍西秦河二州刺史吐谷渾拾寅為征西大將軍十一月立建安王休仁第二子伯猷為江夏王是歳魏皇興元年四年春正月丙辰朔雨草于宫乙亥零陵王司馬朂薨二月乙巳左光禄大夫開府儀同三司王元謨薨三月交州人李長仁據州叛祅賊攻廣州殺刺史羊希龍驤將軍陳伯紹討平之夏四月丙申改封東海王禕為廬江王山陽王休祐為晉平王秋九月戊辰詔定黥刖之制有司奏自今凡刼竊執官仗拒戰邏司攻剽亭寺及傷害吏人并監司將吏自為刼皆不限人數悉依舊制斬刑若遇赦黥及兩相刼字斷去兩脚䈥徙付交梁寜州五人以下止相逼奪者亦依黥作刼字斷去兩脚䈥徙付逺州若遇赦原斷徙猶黥面依舊捕治亡家口應及坐悉依舊結譴及上崩其例乃寢庚午上備法駕幸東宫冬十月癸巳朔日有蝕之發諸州兵北伐五年春正月癸亥親耕籍田乙丑魏克青州執刺史沈文秀以歸二月丙申以廬江王禕為車騎將軍開府儀同三司南豫州刺史夏六月辛未立晉平王休祐子宜曜為南平王秋七月壬戍改輔國將軍為輔師將軍九月甲寅立長沙王纂子起之為始平王冬十月丁夘朔日有食之十一月丁未魏人來聘十二月庚申分荆益州五郡置三巴校尉六年春正月乙亥初制間二年一祭南郊間一年一祭明堂夏五月癸亥立皇子爕為晉熙王六月癸夘以王景文為尚書左僕射揚州刺史以袁粲為右僕射己未改臨賀郡為臨慶郡秋七月丙戍臨慶王智井薨九月戊寅立緫明觀徴學士以充之置東觀祭酒訪舉各一人舉士二十人分為儒道文史陰陽五部學言陰陽者遂無其人冬十月辛夘立皇子贊為武陵王十二月癸巳以邊難未息制父母隔在異域者悉使婚宦七年春正月甲戍置散騎奏舉郎二月癸丑征西將軍荆州刺史巴陵王休若進號征西大將軍及征南大將軍江州刺史桂陽王休範並開府儀同三司甲寅南徐州刺史晉平王休祐薨三月辛酉魏人來聘夏五月戊午鴆司徒建安王休仁庚午以袁粲為尚書令禇淵為右僕射丙戍追免晉平王休祐為庶人秋七月丁巳罷散騎奏舉郎乙丑江州刺史巴陵王休若賜死八月戊子以皇子躋繼江夏文獻王義恭庚寅帝疾間戊戍立皇子凖為安成王是歲魏孝文帝延興元年泰豫元年春正月甲寅朔上以疾未痊故改元丁巳巨人跡見西池氷上夏四月己亥上疾大漸加江州刺史桂陽王休範位司空以劉勔為尚書右僕射蔡興宗為征西將軍開府儀同三司荆州刺史沈攸之進號安西將軍袁粲禇淵劉勔蔡興宗沈攸之入閤被顧命是日上崩于景福殿時年三十四五月戊寅葬臨沂縣幕府山髙寜陵帝好讀書愛文義在藩時疾江左以來文章嘗自續衛瓘所註論語二卷及即大位舊臣才學之士多蒙引進末年好鬼神多忌諱言語文書有禍敗凶䘮疑似之言應囬避者犯即加戮改騧馬字為馬邊瓜以騧字似禍故也嘗以南苑借張永云且給三百年期盡更請宣陽門謂之白門上以白門不祥諱之尚書右丞江謐嘗誤犯上變色曰白汝家門路太后停屍漆牀移出東宫上幸宫見之怒免中庶子官坐死者數十人内外常慮犯觸人不自保移牀修壁先祭土神使文士為祝策如大祭饗阮佃夫楊運長王道隆皆擅威權言為詔勑郡守令長一缺十除内外混然官以賄命王阮家富於公室中書舍人胡毋顥專權奏無不可時人語曰禾絹閉眼諾胡毋大張槖禾絹謂上也及泰始泰豫之際左右失㫖徃徃有刳斮斷截禁中懔懔若踐刀劒夜夢豫章太守劉愔反遣就郡殺之軍旅不息府藏空虛内外百官並斷禄奉在朝造官者皆市井傭販之子而又令小黄門於殿内埋錢以為私藏以蜜漬鱁鮧一食數升噉䐗肉常至二百臠奢費過度毎所造制必為正御三十副御次副三十須一物輙造九十枚天下騷然民不堪命宋氏之業自此衰矣明帝泰始七年泰豫元年即位八年後廢帝諱昱字徳融明帝長子也大明七年正月辛丑生於衛尉府帝母陳氏李道兒妾明帝納之故人呼帝為李氏子帝亦自稱李將軍明帝諸子在孕皆以周易筮之即以所得卦為小字故帝小字慧震泰始二年立為皇太子六年出東宫制太子元正朝賀服衮冕九章衣明帝崩庚子太子即皇帝位大赦尚書令袁粲護軍將軍禇淵共輔朝政班劒依舊入殿六月乙巳尊皇后曰皇太后立皇后江氏秋七月戊辰拜帝所生陳貴妃為皇太妃八月戊午中書監左光禄大夫開府儀同三司蔡興宗薨冬十一月己亥新除郢州刺史劉秉為尚書左僕射元徽元年春正月戊寅大赦改元詔自元年以前徙放者並聽還本魏人來聘夏六月乙夘壽陽大水秋七月長水校尉何翌之表上所撰諌林上自虞舜下至晉武凡十二卷祕書丞王儉表上所撰七志三十卷八月都下旱庚午陳留王曹銑薨九月丁亥立衡陽王嶷子伯玉為南平王冬十二月癸夘朔日有蝕之乙巳進桂陽王休範位太尉癸亥立前建安王世子伯融為始安縣王二年夏五月壬午江州刺史桂陽王休範舉兵反庚寅内外戒嚴中領軍劉勔右衛將軍蕭道成前鋒南討出屯新亭征北將軍張永屯白下前南兖州刺史沈懐明戍石頭衛將軍袁粲中軍將軍禇淵入衛殿省壬辰賊奄至攻新亭壘道成拒撃大破之越騎校尉張茍兒斬休範賊黨杜黑蠡丁文豪分軍向朱雀航劉勔拒賊敗績死之右將軍王道隆奔走遇害張永潰于白下沈懐明自石頭奔散甲午車騎典籖茅恬開東府納賊賊入屯中堂羽林監陳顯達撃大破之丙申張苟兒等又破賊進平東府城梟禽羣賊丁酉大赦解嚴荆州刺史沈攸之南徐州刺史建平王景素郢州刺史晉熙王爕湘州刺史張興世並舉義兵赴建鄴六月癸夘晉熙王燮遣軍克尋陽江州平壬戍改輔師將軍還為輔國秋七月庚辰立皇弟友為邵陵王乙酉徐州刺史建平王景素進號征北将軍開府儀同三司九月丁酉以袁粲為中書監領司徒加護軍將軍禇淵為尚書令冬十二月丙戍帝加元服十二月癸亥立皇弟躋為江夏王贊為武陵王三年春三月己巳都下大水夏六月魏人來聘秋七月庚戍以袁粲為尚書令九月丙辰征西大將軍河南王吐谷渾拾寅進號車騎征西大將軍四年夏六月乙亥加蕭道成尚書左僕射秋七月戊子建平王景素據京城反己丑内外纂嚴遣驍騎將軍任農夫冠軍將軍黄囬北討蕭道成緫統衆軍始安王伯融都鄉侯伯猷並賜死乙未克京城斬景素同逆皆伏誅八月丁夘立皇弟凱為南陽王嵩為新興王禧為始建王九月戊子驍騎將軍髙道慶有罪賜死己丑車騎將軍揚州刺史安成王凖進驃騎大將軍開府儀同三司冬十月辛酉以王僧䖍為尚書右僕射五年夏四月甲戍豫州刺史阮佃夫歩兵校尉申伯宗朱㓜謀廢立皆伏誅五月地震六月甲戍誅司徒左長史沈勃散騎常侍杜㓜文游撃將軍孫超之長水校尉杜叔文七月戊子夜帝遇弑於仁壽殿時年十五己丑皇太后令貶帝為蒼梧郡王葬丹陽秣陵縣郊壇西初帝之生夕明帝夢人乗馬馬無頭及後足有人曰太子也及在東宮五六歲能縁漆帳竿去地丈餘如此者卒食漸長喜怒失節左右失㫖者手加撲打徒跣蹲踞及嗣位内畏太后外憚大臣猶未得肆志自加元服三年好出入單將左右或十里二十里或入市里遇慢罵則悦而受焉四年無日不出與左右解僧智張五兒恒夜出開承明門夕去晨反旦出暮歸從者並執鋋矛行人男女及犬馬牛驢逢無免者民間擾懼晝日不開門道無行人常著小袴不服衣冠有白棓數十各有名號鉗鑿錐鋸不離左右為撃腦槌隂剖心之誅日有數十常見卧屍流血然後為樂左右人見有嚬眉者帝令其正立以矛刺洞之曜靈殿上養驢數十頭所自乗馬養於御牀側與右衛翼輦營女子私通每從之游持數千錢為酒肉之費出逢婚姻𦵏送輙與挽車小兒羣聚飲酒以為歡適阮佃夫腹心人張羊為佃夫委信佃夫敗叛走復捕得自於承明門以車轢殺之殺杜延載杜㓜文躬運矛鋋手自臠割察孫超有蒜氣剖腹視之執楯馳馬自徃刺杜叔文於元武北湖孝武帝二十八子明帝殺其十六餘皆帝殺之呉興沈勃多寳貨徃刼之揮刀獨前左右未至勃時居䘮在廬帝望見之便投鋋不中勃知不免手搏帝耳唾罵之曰汝罪踰桀紂屠戮無日遂見害帝自臠割制露車一乗施䇨乗以出入從數十人羽儀追之恒不相及又各慮禍亦不敢追但整部伍别在一處瞻望而已凡諸鄙事過目則能鍜銀裁衣作帽莫不精絶未嘗吹箎執管便韻天性好殺一日無事輙慘慘不樂内外憂惶夕不及旦領軍將軍蕭道成與直閤將軍王敬則謀之七月戊子帝微行出北湖單馬先走羽儀不及左右張五兒馬墜湖帝怒自馳騎刺馬屠割之與左右作羌胡伎為樂又於蠻岡賭跳因乗露車無復鹵簿徃青園尼寺新安寺偷狗就曇度道人煑之飲酒楊玉夫常得意忽然見憎遇輙切齒曰明日當殺小子取肝肺是夜七夕令玉夫伺織女度報已因與内人穿針訖大醉卧於仁壽殿東阿氈幄中帝出入無禁王敬則先結玊夫陳奉伯楊萬年等合二十五人其夕玉夫候帝眠熟至乙夜與萬年同入氈幄内取千牛刀殺之後廢帝元徽五年順皇帝諱凖字仲謨小字知觀明帝第三子也泰始五年七月癸丑生七年封安成王帝姿貌端華眉目如畫見者以為神人廢帝即位加揚州刺史元徽二年加都督揚南豫二州諸軍事四年進號驃騎大將軍及廢帝殞蕭道成奉太后令迎王入居朝堂昇明元年秋七月壬辰皇帝即位大赦改元徽五年為昇明元年甲午蕭道成出鎮東城輔政荆州刺史沈攸之進號車騎大將軍蕭道成司空録尚書事以袁粲為中書監司徒以禇淵為衛將軍劉秉為尚書令加中軍將軍辛丑以王僧䖍為尚書僕射癸夘車駕謁太廟八月癸亥司徒袁粲鎮石頭戊辰崇拜帝所生陳昭華為皇太妃庚午以蕭道成為驃騎大將軍開府儀同三司録尚書如故九月己酉廬陵王暠薨十二月丁巳荆州刺史沈攸之舉兵不從執政丁夘蕭道成入守朝堂侍中蕭嶷鎮東府戊辰中外纂嚴壬申司徒袁粲據石頭謀誅道成不果旋見覆滅乙亥以王僧䖍為左僕射王延之為右僕射呉郡太守劉遐據郡不從執政令張瓌攻斬之閠月辛巳屯騎校尉王宜興貳於執政見誅癸巳沈攸之攻郢城前軍長史栁世隆固守己亥中外戒嚴假蕭道成黄鉞乙巳道成出頓新亭是歲魏太和元年二年春正月丁夘沈攸之敗己巳華容縣人斬攸之首送之辛未雍州刺史張敬兒克江陵荆州平丙子解嚴以栁世隆為尚書右僕射蕭道成旋鎮東府二月辛丑以王僧䖍為尚書令王延之為左僕射癸未蕭道成加授太尉以禇淵為中書監司空丙戍撫軍將軍揚州刺史晉熙王爕進號中軍將軍三月己酉朔日有食之夏四月南兖州刺史黄囬貳於執政賜死五月戊午以倭國王武為安東大將軍六月己酉以輔國將軍楊文𢎞為北秦刺史封武都王秋九月乙巳朔日有食之丙午加太尉蕭道成黄鉞都督中外諸軍事太傅領揚州牧賜殊禮以揚州刺史晉熙王爕為司徒冬十月壬寅立皇后謝氏十一月立故武昌太守劉混息頒為南豐縣王癸亥誅臨灃侯劉晃甲子改封南陽王翽為隨郡王十二月丙戍皇后見于太廟三年春正月辛亥領軍將軍蕭賾加尚書右僕射進號中軍大將軍開府儀同三司二月丙子南豫州刺史邵陵王友薨丙申地震建陽門三月癸夘朔日有食之甲辰加蕭道成相國總百揆封十郡為齊公備九錫之禮庚戍誅臨川王綽夏四月壬申進齊公蕭道成爵為王壬午安西將軍武陵王贊薨辛夘帝禪位於齊壬辰遜于東邸是日王敬則以兵陳于殿廷帝猶居内聞之逃于佛蓋下太后懼自帥閹豎索扶幸板輿黄門或促之帝怒抽刀投之中項而殞帝既出宫人行哭俱遷備羽儀乗畫輪車出東掖門封帝為汝陰王居丹徒齊兵衛之建元元年五月己未帝聞外有馳馬者懼亂作監門殺王而以疾赴齊人徳之賞之以邑六月乙酉𦵏于遂寜陵諡曰順帝宋之王侯無少長皆幽死矣順帝昇明三年右宋自武帝至順帝八主凡六十年為齊所滅通志卷十一
