body:
  text: 通志卷一百八宋迪右功郎鄭樵漁仲撰列傳第二十一後漢樊宏子倏凖族曾孫陰識弟興朱浮馮魴虞延鄭𢎞周章梁統子竦元曾孫商孫冀張純子奮曹褒鄭元鄭興子衆范升陳元賈逵張霸子楷陵楷子弟陵元桓榮子郁子煜孫焉典曽孫鸞彬鸞元孫元孫丁鴻樊宏字靡卿南陽湖陽人也世祖之舅其先周仲山甫封于樊因而氏焉為鄉里著姓父重字君雲世善農稼好貨殖重性溫厚有法度三世共財子孫朝夕禮敬常若公家其營理産業物無所棄課役童隸各得其宜故能上下戮力財利歲倍至乃開廣田土三百餘頃其所起廬舍皆有重堂髙閣陂渠灌注又池魚牧畜有求必給嘗欲作器物先種梓漆時人嗤之然積以歲月皆得其用向之笑者咸求假焉資至巨萬而賑贍宗族恩加鄉閭外孫何氏兄弟爭財重耻之以田二頃解其忿訟縣中稱美推為三老年八十餘終其素所假貸人間數百萬遺令焚削文契責家聞者皆慙爭往償之諸子從敕竟不肯受宏少有志行王莽末義兵起劉伯升與族兄賜俱將兵攻湖陽城守不下賜女弟為宏妻湖陽由是繫宏妻子令出譬伯升宏因留不返湖陽軍師欲殺其妻子長吏以下共相謂曰樊重子父禮義恩德行於鄉里雖有罪且當在後會漢兵日盛湖陽惶急未敢殺之遂得免脫更始立欲以宏為將宏叩頭辭曰書生不習兵事竟得免歸與宗家戚屬作營塹自守老弱歸之者千餘家時赤眉賊掠唐子鄉多所殘殺欲前攻宏營宏遣人持牛酒米穀勞遺赤眉赤眉長老先聞宏仁厚皆稱曰樊君素善且今見待如此何心攻之引兵而去遂免寇難世祖即位拜光祿大夫位特進次三公建武五年封長羅侯十三年封弟丹為射陽侯兄子尋元鄉侯族兄忠更父侯十五年定封宏壽張侯八年帝南祠章陵過湖陽祠重墓追爵諡為壽張敬侯立廟於湖陽車駕每南巡常幸其墓賞賜大會宏為人謙柔畏慎不求茍進常誡其子曰富貴盈溢未有能終者吾非不喜榮勢也天道惡滿而好謙前世貴戚皆明戒也保身全己豈不樂哉每當朝會迎期先到俯伏待事時至乃起帝聞之敕騶騎臨朝乃告勿令豫到宏所上便宜及言得失輒手自書寫毁削草本公朝訪逮不敢衆對宗族染其化未嘗犯法帝甚重之及病困車駕臨視留宿問其所欲言宏頓首自陳無功享食大國誠恐子孫不能保全厚恩令臣魂神慙負黃泉願還壽張食小鄉亭帝悲傷其言而竟不許二十七年卒遺敕薄葬一無所用以為棺柩一藏不宜復見如有腐敗傷孝子之心使與夫人同墳異藏帝善其令以書示百官因曰今不順壽張侯意無以彰其德吾萬歲之後欲以為式賻錢千萬布萬匹諡為恭侯贈以印綬車駕親送葬子倏嗣帝悼宏不已復封少子茂為平望侯樊氏侯者凡五國明年賜倏弟鮪及從昆弟七人合錢五千萬倏字長魚謹約有父風事後母至孝及母卒哀思過禮毁病不自支世祖常遣中黃門朝暮送饘粥服闋就侍中丁恭受公羊嚴氏春秋建武中禁網尚闊諸王既長各招引賔客以倏外戚爭遣致之而倏清靜自保無所交結及沛王輔事發貴戚子弟多見收捕倏以不豫得免帝崩倏為復土校尉永平元年拜長水校尉與公卿雜定郊祀禮儀以讖記正五經異説北海周澤琅邪承宫並海內大儒倏皆以為師友而致之於朝上言郡國舉孝亷率取年少能報恩者耆宿大賢多見廢棄宜敕郡國簡用良俊又議刑辟宜須秋月以順時氣顯宗並從之二年以壽張國益東平王徙封倏燕侯其後廣陵王荆有罪帝以至親悼傷之詔倏與羽林監南陽任隗雜理其獄事竟奏請誅荆引見宣明殿帝怒曰諸卿以我弟故欲誅之即我子卿等敢爾邪倏仰而對曰天下髙帝天下非陛下之天下也春秋之義君親無將將而誅焉是以周公誅弟季友鴆兄經傳大之臣等以荆屬託母弟陛下留聖心加惻隱故敢請耳如令陛下子臣等專誅而已帝歎息良久倏益以此知名其後弟鮪為子賞求楚王英女敬鄉公主倏聞而止之曰建武時吾家並受榮寵一宗五侯時特進一言女可以配王男可以尚主但以貴寵過盛即為禍患故不為也且爾一子奈何棄之于楚乎鮪不從十年倏卒贈賵甚厚諡曰哀侯帝遣小黃門張愔問倏遺言先是河南縣亡失官錢典負者坐死及罪徙者甚衆遂委責于人以償其耗鄉部吏司因此為姦倏常患之又野王歲獻甘醪膏餳每輒擾人吏以為利倏並欲奏罷之疾病未及得上愔歸具以聞帝覽之而悲歎敕二郡並令從之長子汜嗣以次子彬梵為郎其後楚事發覺帝追念倏謹恪又聞其止鮪姻事故其諸子得不坐焉梵字文髙為郎二十餘年三署服其重慎悉推財物二千餘萬與孤兄子官至大鴻臚汜卒子時嗣時卒子建嗣建卒無子國絶永寧二年鄧太后復封建弟盼盼卒子尚嗣初倏刪定公羊嚴氏春秋章句世號樊侯學教授門徒前後三十餘人弟子潁川李修九江夏勤皆為三公勤字伯宗為京宛二縣令零陵太守所在有理能稱安帝時位至司徒宏族曾孫凖字幼陵父瑞好黃老言清靜少欲凖少勵志行修儒術以先産業數百萬讓孤兄子永元十五年和帝幸南陽凖為郡功曹召見帝器之拜郎中從車駕還宫特補尚書郎鄧太后臨朝儒學陵替凖乃上疏請博求幽隱發揚巖穴使公卿各舉明經及舊儒子孫進其爵位使纘其業以推述先帝崇尚儒雅之道太后深納其言是後屢舉方正敦朴仁賢之士凖再拜御史中丞永元之初連年水旱災異郡國多被飢困凖上疏曰臣聞傳曰飢而不損兹曰太厥災水春秋穀梁傳曰五穀不登謂之大侵大侵之禮百官備而不製羣神禱而不祠猶是言之調和隂陽實在節儉朝廷雖勞心元元事從省約而在職之吏尚未奉承夫建化致理由近及逺故詩曰京師翼翼四方是則今可先令太官尚方考功上林池蘌諸官實減無事之物五府調省中都官吏京師作者如此則化及四方人勞省息伏見被災之郡百姓凋殘恐非賑給所能勝贍雖有其名終無其實可依征和元年故事遣使持節慰安尤困乏者徙置荆揚熟郡既省轉運之費且令百姓各安其所今雖有西屯之役宜先東州之急如遣使者與二千石隨事消息悉留富人守其舊土轉尤貧者過所衣食誠父母之計也願以臣言下公卿平議太后從之悉以公田賦與貧人即擢凖與議郎吕倉並守光祿大夫凖使冀州倉使兖州凖到部開倉廪食慰安生業流人咸得蘇息還拜巨鹿太守時飢荒之餘人庶流迸家户且盡凖課督農桑廣施方略期年間穀粟豐賤數十倍而趙魏之郊數為羌所鈔暴凖外禦寇虜內撫百姓郡境以安五年轉河內太守時羌復屢入郡界凖輒將兵討逐修理塢壁威名大行視事三以疾徴三轉為尚書令明習故事遂見任用元初三年代周暢為光祿勳五年卒於官隂識字次伯南陽新野人光烈皇后之前母兄也其先出自管仲管仲七世孫修自齊適楚為陰大夫因而氏焉秦漢之際始家新野及劉伯升起義兵識時遊學長安聞之委業而歸率子弟宗族賔客千餘人往詣伯升伯升乃以識為校尉更始元年遷偏將軍從攻宛别降新野淯陽杜衍冠軍胡陽二年更始封識陰德侯行大將軍事建武元年光武遣使迎陰貴人於新野并徴識識隨貴人至以為騎都尉更封陰鄉侯二年以征伐軍功增封識叩頭讓曰天下初定將帥有功者衆臣託屬掖庭仍加爵邑不可以示天下帝甚美之以為關都尉鎮函谷遷侍中以母憂辭歸十五年定封原鹿侯及顯宗立為皇太子以識守執金吾輔導東宫帝每巡郡國識常留鎮守京師委以禁兵入雖極言正議及與賔客語未嘗及國事帝敬重之常指識以敕戒貴戚激厲左右焉識所用掾吏皆簡賢者如虞延傅寬薛愔等多至公卿校尉顯宗即位拜為執金吾位特進永平二年卒贈以本官印綬諡曰貞侯子躬嗣躬卒子璜嗣永初七年為奴所殺無子國絶永寧元年鄧太后以璜弟淑紹封淑卒子鮪嗣躬弟子綱女為和帝皇后封綱吳房侯位特進三子軼輔敞皆黃門侍郎后坐巫蠱事廢綱自殺輔下獄死軼敞徙日南識弟興字君陵光烈皇后同母弟也為人有膂力建武二年為黃門侍郎守期門僕射典將武騎從征伐平定郡國每從出入常操持小蓋障翳風雨躬履泥塗率先期門光武所幸之處輒先入清宫甚見親信雖好施接賔然門無俠客與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而逹之友人張汜杜禽與興厚善以為華而少實但私之以財終不為言是以世稱其忠平第宅茍完裁蔽風雨九年遷侍中賜爵關內侯帝後召興欲封之置印綬於前興固讓曰臣未有先登陷陳之功而一家數人並蒙爵土令天下觖望誠為盈溢臣蒙陛下貴人恩澤至厚富貴已極不可復加至誠不願帝嘉興之讓不奪其志貴人問其故興曰貴人不讀書邪亢龍有悔夫外戚之家不知謙退嫁女欲配侯王取婦眄睨公主愚心實不安也富貴有極人當知足夸奢益為觀聼所譏貴人感其言深自降挹卒不為宗親求位十九年拜衛尉亦輔導皇太子明年夏帝風眩疾甚復以興領侍中受顧命於雲臺廣室會疾瘳召見興欲以代吳漢為大司馬興叩頭流涕固讓曰臣不敢惜身誠虧損聖德不可茍冒至誠發中感動左右帝遂聽之二十三年卒時年三十九興素與從兄嵩不相能然敬其威重興疾病帝親臨問以政事及羣臣能不興頓首曰臣愚不足以知之然伏見議郎席廣謁者陰嵩並經行明深踰於公卿興殁後帝思其言遂擢廣為光祿勳嵩為中郎將監羽林十餘年以謹敕見幸顯宗即位拜長樂衛尉遷執金吾永平元年帝思舅氏之恩詔以汝南之鮦陽封興子慶為鮦陽侯慶弟博為濦強侯博弟員丹並為郎慶推田宅財物悉與員丹帝以慶義讓擢為黃門侍郎慶卒子琴嗣建初五年興夫人卒肅宗使五官中郎將持節即墓賜䇿追諡興曰翼侯琴卒子萬全嗣萬全卒子桂嗣興弟就嗣父封宣恩侯後改封新陽侯就善談論朝臣莫及然性剛慠不得衆譽顯宗即位以就為少府特進就子豐尚酈邑公主公主嬌妬豐亦狷急永平二年遂殺主被誅父母當坐皆自殺國除帝以舅氏故不極其刑陰氏侯者凡四人初隂氏世奉管仲之祀謂為相君宣帝時陰子方者至孝有仁恩臘日晨炊而竈神形見子方再拜受慶家有黃羊因以祠之自是已後暴富至巨萬田七百餘頃輿馬僕𨽻比於邦君子方常言我子孫必將強大至識三世而遂繁昌故後常以臘日祀竈而薦黃羊焉朱浮字叔元沛國蕭人也初從光武為大司馬主簿遷偏將軍從破邯鄲光武遣吳漢誅更始幽州牧苗曾乃拜浮為大將軍幽州牧守薊城遂討定北邉建武二年封武陽侯食三縣浮少有才能頗欲勵風迹收士心辟召州中名宿涿郡王岑之屬以為從事及王莽時故吏二千石皆引置幕府乃多發諸郡倉穀廪給其妻子漁陽太守彭寵以天下未定師旅方起不宜多置官屬以損軍實不從其令浮性矜急自多頗有不平因以峻文詆之寵亦佷強兼負其功嫌怨轉積浮密奏寵遣吏迎妻而不迎其母又受貨賄殺害友人多聚兵穀意計難量寵既積怨聞遂大怒而舉兵攻浮浮以書質責之曰蓋聞知者順時而謀愚者逆理而動常竊悲京城太叔以不知足而無賢輔卒自棄於鄭也伯通以名字典郡有佐命之功臨人視職愛惜倉庫而浮秉征伐之任欲權時救急二者皆為國耳即疑浮相譖何不詣闕自陳而為族滅之計乎朝廷之於伯通恩亦厚矣委以大郡任以威武事有柱石之寄情同子孫之親匹夫媵母尚能致命一餐豈有身帶三綬職典大邦而不顧恩義生心外畔者乎伯通與吏人語何以為顔行步拜起何以為容坐卧念之何以為心引鏡窺影何施眉目舉措建功何以為人惜乎棄休令之嘉名造梟鴟之逆謀捐傳世之慶祚招破敗之重災髙論堯舜之道不忍桀紂之性生為世笑死為愚鬼不亦哀乎伯通與耿俠遊俱起佐命同被國恩俠遊謙讓屢有降挹之言而伯通自伐以為功髙天下往時遼東有豕生子白頭異而獻之行至河東見羣豕皆白懷慙而還若以子之功論於朝廷則為遼東豕也今乃愚妄自比六國六國之時其藝各盛廓土數千里勝兵將百萬故能據國相持多歷年世今天下幾里列郡幾城奈何以區區漁陽而結怨天子此猶河濵之人捧土以塞孟津多見其不知量也方今天下適定海內願安士無賢不肖皆樂立名於世而伯通獨中風狂走自捐盛時內聽驕婦之失計外信讒邪之諛言長為羣后惡法永為功臣鑒戒豈不誤哉定海內者無私讐勿以前事自誤願留意顧老母幼弟凡舉事無為親厚者所痛而為見讐者所快寵得書愈怒攻浮轉急明年涿郡太守張豐亦舉兵反時二郡畔戾北州憂恐浮以為天子必自將兵討之而但遣遊擊將軍鄧隆隂助浮浮懷懼以為帝怠於敵不能救之乃上疏曰昔楚宋列國俱為諸侯莊王以宋執其使遂有投袂之師魏公子顧朋友之要觸冒強秦之鋒夫楚魏非有分職匡正之大義也莊王但為爭強而發忿公子以一言而立信耳今彭寵反畔張豐逆節以為陛下必棄捐他事以時滅之既歷時月寂寞無音從圍城而不救放逆虜而不討臣誠惑之昔髙祖聖武天下既定猶身自征伐未嘗寧居陛下雖興大業海內未集而獨逸豫不顧北垂百姓遑遑無所繫心三河冀州曷足以傳後哉今秋稼已熟復為漁陽所掠張豐狂悖姦黨日增連年拒守吏士疲勞甲胄生蟣蝨弓弩不得弛上下燋心相望救護仰希陛下生活之恩詔報曰往年赤眉跋扈長安吾䇿其無穀必東果來歸降今度此反虜藝無久全其中必有內相斬者今軍資未充故須後麥矣浮城中糧盡人相食會上谷太守耿况遣騎來救浮浮乃得遁走南至良鄉其兵長反遮之浮恐不得脫乃下馬刺殺其妻僅以身免城降於寵尚書令侯霸奏浮敗亂幽州構成寵罪徒勞軍師不能死節罪當伏誅帝不忍以浮代賈復為執金吾徙封父城侯後豐寵並自敗帝以二千石長吏多不勝任時有纎微之過者必見斥罷交易紛擾百姓不寧六年有日食之異浮因上疏曰臣聞日者衆陽之所宗君上之位也凡居官治民據郡典縣皆為陽為上為尊為長若陽上不明尊長不足則干動三光垂示王者五典紀國家之政洪範别災異之文皆宣明天道以徴來事者也陛下哀憫海內新離禍毒保宥生人使得蘇息而今牧人之吏多未稱職小違理實輒見斥罷豈不粲然黑白分明哉然以堯舜之盛猶加三考大漢之興亦纍功效吏皆積久養老於官至名子孫因為氏姓當時吏職何能悉理論議之徒豈不喧譁蓋以為天地之功不可倉卒艱難之業當纍日也而間者守牧數見換易迎新相代疲勞道路尋其視事日淺未足昭見其職既加嚴切人不自保各相顧望無自安之心有司或因睚眥以騁私怨茍求長短求媚上意二千石及長吏迫於舉劾懼於刺譏故爭飾詐偽以希虛譽斯皆羣陽騷動日月失行之應夫物暴長者必夭折功卒成者必亟壞如摧長久之業而造速成之功非陛下之福也天下非一時之用也海內非一旦之功也願陛下遊意於經年之外望化於一世之後天下幸甚帝下其議羣臣多同於浮自是易代頗簡舊制州牧奏二千石長吏不任位者事皆先下三公三公遣掾史案驗然後黜退帝時用明察不復委用三府而權歸刺舉之吏浮復上疏曰陛下清明履約率禮無違求之於事宜以和平而災異猶見者豈徒然哉竊見陛下疾往者上威不行下專國命即位以來不用舊典信刺舉之官黜鼎輔之任至於有所劾奏便加退免覆案不關三府罪譴不蒙澄察陛下以使者為腹心而使者以從事為耳目是為尚書之平決於百石之吏故羣下苛刻各自為能兼以私情容長憎愛在職皆競張空虛以要時利故有罪者心不厭服無咎者坐被空文不可經盛衰貽後王也夫事積久則吏自重吏安則人自靜傳曰五年再閠天道乃備夫以天地之靈猶五載以成其化况人道哉帝善其奏七年轉太僕浮又以國學既興宜廣博士之選乃上書曰舊事䇿試博士必廣求詳選爰自畿夏延及四方是以博舉明經唯賢是登學者精厲逺近同慕伏聞詔書更試五人唯取見在洛陽城者臣恐自今以往將有所失求之密邇容或未盡而四方之學無所勸樂凡䇿試之本貴得其真非有期會不及逺方也又諸所徴試皆私自發遣非有傷費煩擾於事也語曰中外失禮求之於野臣浮幸得與講圖讖故敢越職帝然之二十年代竇融為大司空二十二年坐賣弄國恩免二十五年徙封新息侯帝以浮陵轢同列每銜之惜其功能不忍加罪永平中有人單辭告浮事者顯宗大怒賜浮死長水校尉樊倏言於帝曰唐堯大聖兆人獲所尚優遊四凶之獄厭服海內之心使天下咸知然後殛罰浮事雖昭昭而未逹人聽宜下廷尉章著其事帝亦悔之馮魴字孝孫南陽湖陽人也其先魏之支别食菜馮城因以氏焉秦滅魏遷于湖陽為郡族姓王莽末四方潰叛魴乃聚賔客招豪傑作營塹以待所歸是時湖陽大姓虞都尉反城稱兵先與同縣申屠季有仇而殺其兄謀滅季族季亡歸魴魴將季還其營道逢都尉從弟長卿來欲執季魴叱長卿曰我與季雖無素故士窮相歸要當以死任之卿為何言遂與俱歸季謝曰蒙恩全死無以為報恩有牛馬財物願悉獻之魴作色曰吾老親弱弟皆在賊城中今日相與尚無所顧何云財物乎季慚不敢復言魴自是為縣邑所敬信故能據營自固時天下未定而四方之士擁兵矯稱者甚衆唯魴自守兼有方略光武聞而嘉之建武三年徵詣行在所見於雲臺拜虞令為政敢殺伐以威信稱遷郟令後車駕西征隗嚻潁川盜賊羣起郟賊延褒等衆三千餘人攻圍縣舍魴率吏士七十許人力戰連日弩矢盡城陷魴乃遁去帝聞郡國反即馳赴潁川魴詣行在所帝按行鬭處知魴力戰乃嘉之曰此健令也所當討擊勿拘州郡褒等聞帝至皆自髠剔負鈇鑕將其衆請罪帝且赦之使魴轉降諸聚落縣中定詔乃悉以褒等還魴誅之魴責讓以行軍法皆叩頭曰今日受誅死無所恨魴曰汝知悔過伏罪一切相赦聽各反農桑為令作耳目皆稱萬歲是時每有盜賊並為褒等所發無敢動者縣界清靜十三年遷魏郡太守二十七年以髙第入代趙熹為太僕中元元年從東封岱宗行衛尉事還代張純為司空賜爵關內侯二年帝崩使魴持節起原陵更封楊邑鄉侯食三百五十户永平四年坐考隴西太守鄧融聽任姦吏策免削爵土六年顯宗幸魯復行衛尉事七年代隂嵩為執金吾魴性公嚴方正在位數進忠言多見納用十四年詔復爵土明年東巡郡國留魴宿衛南宫建初三年以老病乞身肅宗許之其冬為五更詔魴朝賀就列侯位元和二年卒時年八十六子柱嗣尚顯宗女獲嘉長公主少為侍中以恭肅謙約稱位至將作大匠柱卒子定嗣官至羽林郎將定卒無子國除定弟石襲母公主封獲嘉侯亦為侍中稍遷衛尉能取悅當世為安帝所寵帝嘗幸其府留飲十許日賜駁犀具劔佩刀紫艾綬玉玦各一拜子世為黃門侍郎世弟二人皆郎中自永初兵荒王侯租秩多不充於是特詔以他縣租稅足石令如舊限歲入穀三萬斛錢四萬遷光祿勳遂代楊震為太尉及北鄉侯立遷太傅與太尉東萊劉喜參録尚書事順帝既立石與喜皆以阿黨閻顯江京等䇿免復為衛尉卒子代嗣代卒弟承嗣為步兵校尉石弟珖和帝時詔封楊邑侯亦以石寵官至城門校尉卒子肅嗣為黃門侍郎虞延字子大陳留東昏人也延初生其上有物若一匹練遂上升天占者以為吉及長身長八尺六寸腰帶十圍力能扛鼎少為户牖亭長時王莽貴人魏氏賔客放縱延率吏卒突入其家捕之以此見怨故位不升性敦朴不拘小節又無鄉曲之譽王莾末天下大亂延常嬰甲胄擁衛親族扞禦鈔盜賴其全者甚衆延從女弟年在孩乳其母不能活之棄於溝中延聞其號聲哀而收之養至成人建武初仕執金吾府除細陽令每至歲時伏臘輒休遣徒擊各使歸家並感其恩澤應期而還有囚於家被病自載詣獄既至而死延率掾吏殯于門外百姓感悅之後去官還鄉里太守富宗聞延名召署功曹宗性奢靡車服器物多不中節延諫曰昔晏嬰輔齊鹿裘不完季文子相魯妾不衣帛以約失之者鮮矣宗不悅延即辭退居有頃宗果以侈縱被誅臨當伏刑攬涕而歎曰恨不用功曹虞延之諫光武聞而竒之二十年東巡路過小黃髙帝母昭靈后園陵在焉時延為部督郵詔呼引見問園陵之事延進止從容占拜可觀其陵樹株蘖皆諳其數爼豆犧牲頗曉其禮帝善之敕延從駕到魯還經封邱城門門小不容羽蓋帝怒使撻侍御史延因下見引咎以罪在督郵言辭激揚有感帝意乃制詔曰以陳留督郵虞延故貰御史罪延從送車駕西盡郡界賜錢及劔帶佩刀還郡於是聲名遂振二十三年司徒玊况玉姓也音宿辟焉時元正朝賀帝望而識延遣小黃門馳問之即日召拜公車令明年遷洛陽令是時隂氏有客馬成者常為姦盜延收考之隂氏屢請獲一書輒加篣捶也音彭二百信陽侯隂就乃訴帝譖延多所寃枉帝乃臨御道之館親録囚徒延陳其獄狀可論者在東無理者居西成乃回欲趨東延前執之謂曰爾民之巨蠧久依城社不畏熏燒今考實未竟宜當盡法成大呼稱枉陛戟郎以戟刺延叱使置之帝知延不私謂成曰汝犯王法身自取之呵使速去後數日伏誅於是外戚斂手莫敢干法在縣三年遷南陽太守永平初有新野功曹鄧衍以外戚小侯每豫朝會而容姿趨步有出於衆顯宗目之顧左右曰朕之儀貌豈若此人特賜輿馬衣服延以衍雖有容儀而無實行未嘗加禮帝既異之乃詔衍令自稱南陽功曹詣闕既到拜郎中遷元武司馬衍在職不服父喪帝聞之乃歎曰知人則哲惟帝難之信哉斯言衍慙而退由是以延為明三年徵代趙熹為太尉八年代范遷為司徒歷位二府十餘年無異政績會楚王英謀反隂氏欲中傷之使人私以楚謀告延延以英藩戚至親不然其言又欲辟幽州從事公孫𢎞以𢎞交通楚王而止並不奏聞及英事發覺詔書切讓延遂自殺家至清貧子孫不免寒餒延從曾孫放字子仲少為太尉楊震門徒及震被讒自殺順帝初放詣闕追訟震罪由是知名桓帝時為尚書以議誅大將軍梁冀功封都亭侯後為司空坐水災免性疾惡宦官遂為所陷靈帝初與長樂少府李膺等俱以黨事誅鄭𢎞字巨君會稽山隂人也從祖吉宣帝時為西域都護𢎞少為鄉嗇夫太守第五倫行春見而竒之召署督郵舉孝亷𢎞師同郡河東太守焦貺楚王英謀反發覺以疏引貺貺被收捕疾病於道亡殁妻子閉繫詔獄考掠連年諸生故人懼相連及皆改變姓名以逃其禍𢎞獨髠頭負鈇鑕詣闕上章為貺訟罪顯宗覺悟即赦其家屬𢎞躬送貺喪及妻子還鄉里由是顯名拜為騶令政有仁惠民稱蘇息遷淮隂太守四遷建初初為尚書令舊制尚書郎限滿補縣長令史丞尉𢎞奏以為臺職雖尊而酬賞甚薄至於開選多無樂者請使郎補千石令史為長帝從其議𢎞前後所陳有補益王政者皆著之南宫以為故事出為平原相徵拜侍中建初八年代鄭衆為大司農舊交趾七郡貢獻轉運皆從東冶泛海而至風波艱阻沉溺相係𢎞奏開零陵桂陽嶠道於是夷通至今遂為常路在職二年所息省三億萬計時歲天下遭旱邊方有警人食不足而帑藏殷積𢎞又奏宜省貢獻減徭役以利飢民帝順其議元和元年代鄧彪為太尉時舉將第五倫為司空班次在下每正朔朝見𢎞曲躬而自卑帝問知其故遂聽置雲母屛風分隔其間由此以為故事在位四年奏尚書張林阿附侍中竇憲而素行贓穢又上洛陽令楊光憲之賔客在官貪殘並不宜處位書奏吏與光故舊因以告之光報憲憲奏𢎞大臣漏泄密事帝詰讓𢎞收上印綬𢎞自詣廷尉詔敕出之因乞骸骨歸未許病篤上書陳謝并言憲之短帝省章遣醫占𢎞病比至已卒臨殁悉還賜物敕妻子褐巾布衣素棺殯殮以還鄉里周章字次叔南陽隨人也初仕郡為功曹時大將軍竇憲免封冠軍侯就國章從太守行春到冠軍太守猶欲謁之章進諫曰今日公行春豈可越儀私交且憲椒房之親藝傾王室而退就藩國禍福難量明府剖符大臣千里重任舉止進退其可輕乎太守不聽遂便升車章前拔佩刀絶馬鞅於是乃止及憲被誅公卿以下多以交關得罪太守幸免以此重章舉孝亷六遷為五官中郎將延平元年為光祿勳永初元年代魏霸為太常其冬代尹勤為司空是時中常侍鄭衆蔡倫等皆秉藝豫政章數進直言初和帝崩鄧太后以皇子勝有痼疾不可奉承宗廟貪殤帝孩抱養為己子故立之以勝為平原王及殤帝崩羣臣以勝疾非痼意咸歸之太后以前既不立恐後為怨乃立和帝兄清河孝王子祐是為安帝章以衆心不附遂密謀閉宫門誅車騎將軍鄧騭兄弟及鄭衆蔡倫劫尚書廢太后於南宫封帝為逺國王而立平原王事覺勝䇿免章自殺家無餘財諸子易衣而出并日而食梁統字仲寧安定烏氏人晉大夫梁益耳即其先也統髙祖父子都自河東遷居北地子都子橋以資十萬徙茂陵至哀平之末歸安定統性剛毅而好法律初仕州郡更始二年召補中郎將使安集涼州拜酒泉太守會更始敗赤眉入長安統與竇融及諸郡起兵保境謀共立帥初以位次咸共推統統辭曰昔陳嬰不受王者以有老母也今統內有尊親又德薄能寡誠不足以當之遂共推融為河西大將軍更以統為武威太守為政嚴猛威行鄰郡建武五年統等各遣使隨竇融長史劉鈞詣闕奉貢願得詣行在所詔加統宣德將軍八年夏光武自征隗嚻統與竇融等將兵會車駕及嚻敗封統為成義侯同産兄巡從弟騰並為關內侯拜騰酒泉典農都尉悉遣還河西十二年統與融等俱詣京師以列侯奉朝請更封髙山侯拜太中大夫除四子為郎統在朝廷數陳便宜以為法令既輕下姦不勝宜重刑罰以遵舊典乃上疏曰臣竊見元哀二帝輕殊死之刑以一百二十三事手殺人者減死一等自是以後著為常凖故人輕犯法吏易殺人臣聞立君之道仁義為主仁者愛人義者政理愛人以誅殘為務政理以去亂為心刑罰在𠂻無取於輕是以五帝有流殛放殺之誅三王有大辟刻肌之法故孔子稱仁者必有勇又曰理財正辭禁民為非曰義髙帝受命誅暴平蕩天下約令定律誠得其宜文帝寬惠柔克遭世康平唯除省肉刑相坐之法他皆率由無革舊章武帝值中國隆盛財力有餘征伐逺方軍役數興豪傑犯禁姦吏弄法故重首匿之科著知從之律以破朋黨以懲隱匿宣帝聰明正直總御海內臣下奉憲無所失墜因循先典天下稱理至哀平繼體而即位日淺聽斷尚寡丞相王嘉輕為穿鑿虧除先帝舊約成律數年之間百有餘事或不便於理或不厭民心謹表其尤害於體者傅奏於左惟陛下宣詔有司詳擇其善定不易之典施無窮之法天下幸甚事下三公廷尉議者以為隆刑峻法非明王急務德行日久豈一朝所釐統今所定不宜開可統復上言曰有司以臣今所言不可施行尋臣之所奏非曰嚴刑竊謂髙帝以後至于孝宣其所施行多合經傳宜比方今事驗之往古聿遵前典事無難改不勝至願願得召見若對尚書近臣口陳其要帝令尚書問狀統對曰聞聖帝明王制立刑罰故雖堯舜之盛猶誅四凶經曰天討有罪五刑五庸哉又曰爰制百姓于刑之𠂻孔子曰刑罰不𠂻則人無所措手足𠂻之為言不輕不重之謂也春秋之誅不避親戚所以防患救亂坐安衆庶豈無仁愛之恩貴絶殘賊之路也自髙祖之興至于孝宣君明臣忠謀謨深博猶因循舊章不輕改革海內稱理斷獄益少至初元建平所減刑罰百有餘條而盜賊浸多歲以萬數間者三輔從橫羣輩並起至燔燒茂陵火見未央其後隴西北地西河之賊越州度郡萬里交結攻取庫兵劫略吏人詔書討捕連年不獲是時以天下無難百姓安平而狂狡之藝猶至於此皆刑罰不中愚人易犯之所致也由此觀之則刑輕之作反生大患惠加姦軌而害及良善也故臣統願陛下采擇賢臣孔光師丹等議議上遂寢不報後出為九江太守定封陵鄉侯統在郡亦有治迹吏人畏愛之卒於官子松嗣松字伯孫少為郎尚光武女舞隂長公主再遷虎賁中郎將松博通經書明習故事與諸儒修明堂辟雍郊祀封禪禮儀當與論議寵幸莫比光武崩受遺詔輔政永平元年遷太僕松數為私書請託郡縣二年發覺免官遂懷怨望四年冬乃縣飛書誹謗下獄死國除子扈後以恭懷皇后從兄永元中擢為黃門侍郎歷位卿校尉溫恭謙讓亦敦詩書永初中為長樂少府松弟竦字叔敬少習孟氏易弱冠能教授後坐兄松事與弟恭俱徙九真既徂南土歷江湖濟沅湘感悼子胥屈原以非辜沉身乃作悼騷賦繫元石而沉之顯宗後詔聽還本郡竦閉門自養以經籍為娛著書數篇名曰七序班固見而稱之曰孔子作春秋而亂臣賊子懼梁竦作七序而竊位素餐者慙性好施不事産業長嫂舞隂公主贍給諸梁親疏有序特重敬竦雖衣食器物必有加異竦悉分親族自無所服竦生長京師不樂本土自負其材鬱鬱不得志嘗登髙逺望歎息言曰大丈夫居世生當封侯死當廟食如其不然間居可以養志詩書足以自娛州郡之職徒勞人耳後辟命交至並無所就有三男三女肅宗納其二女皆為貴人小貴人生和帝竇皇后養以為子而竦家私相慶後諸竇聞之恐梁氏得志終為己害建初八年遂譖殺二貴人而陷竦等以惡逆詔使漢陽太守鄭據傳考竦罪死獄中家屬復徙九真辭語連及舞隂公主坐徙新城使者護守宫省事密莫有知和帝梁氏生者永元九年竇太后崩松子扈遣從兄禪奏記三府以為漢家舊典崇貴母氏而梁貴人親育聖躬不蒙尊號求得申議太尉張酺引禪訊問事理會後召見因白袒奏記之狀帝感慟良久曰於君意若何酺對曰春秋之義母以子貴漢興以來母氏莫不隆顯臣愚以為宜上尊號追慰聖靈存録諸舅以明親親帝悲泣曰非君孰為朕思之會貴人姊南陽樊調妻嫕上書自訟曰妾同産女弟貴人前充後宫蒙先帝厚恩得見寵幸皇天受命誕生聖明而為竇憲兄弟所見譖訴使妾父竦寃死牢獄骸骨不掩老母孤弟逺徙萬里獨妾遺脫逸伏草野常恐沒命無由自逹今遭值陛下神聖之運親總萬機羣物得所憲兄弟姦惡既伏辜誅海內曠然各獲其宜妾得蘇息拭目更視乃敢昧死自陳所天妾聞太宗即位薄氏蒙榮宣帝繼統史族復興妾門雖有薄史之親獨無外戚餘恩誠自悼傷妾父既寃不可復生母氏年殊七十及弟棠等逺在絶域不知死生願乞收竦朽骨使母弟得歸本郡則施過天地存殁幸賴帝覽章感悟乃下中常侍掖庭令驗問之嫕辭證明審遂得引見具陳其狀乃留嫕止宫中連月乃出賞賜衣被錢帛第宅奴婢旬月之間纍資十萬嫕素有行操帝益愛之加號梁夫人擢樊調為羽林左監調光祿大夫宏兄曾孫也於是追尊恭懷皇后其冬制詔三公大鴻臚曰夫孝莫大於尊尊親親其義一也詩云父兮生我母兮鞠我顧我復我出入腹我欲報之德昊天罔極朕不敢興事覽于前世太宗中宗實我舊典追命外祖以篤親親其追封諡皇太后父竦為褒親愍侯比靈文順成侯魂而有靈加兹寵榮好爵顯服以慰母心遣中謁者與嫕及扈備禮西迎竦喪詣京師改殯賜東園畫棺玉匣衣衾建塋於恭懷皇后陵傍帝親臨送葬百官畢會徵還竦妻子封子棠為樂平侯棠弟雍乘氏侯雍弟翟單父侯邑各五千户位皆特進賞賜第宅奴婢車馬兵弩什物以巨萬計寵遇過於當世諸梁內外以親疏並補郎謁者棠官至大鴻臚雍少府棠卒子安國嗣延光中為侍中有罪免官諸梁為郎吏皆免官雍子商字伯夏少以外戚拜為郎中遷黃門侍郎永建元年襲父封乘氏侯三年順帝選商女及妹入掖庭遷侍中屯騎校尉陽嘉元年女立為皇后妹為貴人加商位特進更增國土賜安車駟馬其歲拜執金吾二年封子冀為襄邑侯商讓不受三年以商為大將軍固稱疾不起四年使太常桓焉奉䇿就第即拜商乃詣闕受命明年夫人隂氏薨追號開封君贈印綬商自以戚屬居大位每存謙柔虛已進賢辟漢陽巨覽上黨陳龜為掾屬李固周舉為從事中郎於是京師翕然稱為良輔帝委重焉每有飢饉輒載穀於城門賑與貧餒不宣己惠檢御門族未曾以權盛干法而性慎弱無威斷頗溺於內豎以小黃門曹節等用事於中遂遣子冀不疑與為交友然宦者忌商寵任反欲陷之永和四年中常侍張逵蘧政內者令石光尚方令傅福冗從僕射杜永連謀共譖商及中常侍曹騰孟賁云欲徵諸王子圖議廢立請收商等案罪帝曰大將軍父子我所親騰賁我所受必無是但汝曹共妬之耳逵等知言不用懼迫遂共矯詔收縳騰賁於省中帝聞震怒敕宦者李歙急呼騰賁釋之收逵等悉伏誅辭所連染及在位大臣商懼多侵枉乃上疏曰春秋之義功在元帥罪止首惡故賞不僭溢刑不淫濫五帝三王所以同致康乂也竊聞考中常侍張逵等辭語多所牽及大獄一起無辜者衆死囚久繫纎微成大非所以順迎和氣平致化成也宜早訖竟以止逮捕之煩帝乃納之罪止坐者六年秋商病篤敕子冀等曰吾以不德享受多福生無以輔益朝廷死必耗費帑藏衣衾飯含玉匣珠貝之屬何益朽骨百僚勞擾紛華道路秪增塵垢雖云禮制亦有權時方今邉境不寧盜賊未息豈宜重為國損氣絶之後載至冢舍即時殯殮斂以時服皆以故衣無更裁制殯以開冢冢開即葬祭食如存無用三牲孝子善述父志不宜違我言也及薨帝親臨喪諸子欲從其誨朝廷不聽賜以東園朱夀之器銀鏤黃腸玉匣什物二十八種錢二百萬布三千匹皇后錢五百萬布萬匹及葬贈輕車介士賜諡忠侯中宫親送帝幸宣陽亭猶望車騎子冀嗣冀字伯卓為人鳶肩豺目洞精矘眄眄視也矘眄直視也口吟舌言謂語吃不能了明也裁能書計少為貴戚逸欲自恣性嗜酒能挽滿彈棊格五六博蹴踘意錢之戲又好臂鷹走狗騁馬鬭雞初為黃門侍郎轉侍中虎賁中郎將越騎步兵校尉執金吾永和元年拜河南尹冀居職暴恣多非法父商所親客洛陽令吕放頗與商言及冀之短商以讓冀冀即遣人于道刺殺放而恐商知之乃推疑於放之怨仇請以放弟禹為洛陽令使捕之盡滅其宗親賔客百餘人商薨未及葬順帝乃拜冀為大將軍弟侍中不疑為河南尹及帝崩沖帝始在襁褓太后臨朝詔冀與太傅趙峻太尉李固參録尚書事冀雖辭不肯當而侈暴滋甚沖帝又崩冀立質帝帝少而聰慧知冀驕橫常朝羣臣目冀曰此跋扈將軍也冀聞深惡之遂令左右進鴆加煮餅帝即日崩復立桓帝而枉害李固及前太尉杜喬海內嗟懼語在李固傳建和元年益封冀萬三千户增大將軍府舉髙第茂才官屬倍于三公又封不疑為潁陽侯不疑弟蒙西平侯冀子允襄邑侯各萬户和平元年重增封冀萬户并前所襲合三萬户𢎞農人宰宣素性佞邪欲取媚於冀乃上言大將軍有周公之功今既封諸子則其妻宜為邑君詔遂封冀妻孫夀為襄城君兼食陽翟租歲入五千萬加賜赤紱比長公主夀色美而善為妖態作愁眉啼粧墮馬髻折腰步齲齒笑以為媚惑冀亦改易輿服之制作平上軿車埤幘狹冠折上巾擁身扇狐尾單衣夀性鉗忌能制馭冀冀甚寵憚之初父商獻美人友通期於順帝通期有微過帝以歸商商不敢留而出嫁之冀即遣客盜還通期會商薨冀行服於城西私與之居夀伺冀出多從蒼頭篡取通期歸截髮刮面笞掠之欲上書告其事冀大恐頓首請於夀母夀亦不得已而止冀猶復與私通生子伯玉匿不敢出夀尋知之使子允誅滅友氏冀慮夀害伯玊常置復璧中冀愛監奴秦宫官至太倉令得出入夀所夀見宫輒屏御者託以言事因與私焉宫內外兼寵威權大震刺史二千石皆謁辭之冀用夀言多斥奪諸梁在位者外以謙讓而實崇孫氏宗親冒名而為侍中卿校尉郡守長吏者十餘人皆貪叨凶淫各遣私客籍屬縣富人被以他罪閉獄掠考使出錢自贖資物少者至於死徙扶風人士孫奮居富而性吝冀因以馬乘遺之從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為其守藏婢云盜白珠十斛紫金千斤以叛遂收考奮兄弟死於獄中悉沒資財億七千餘萬其四方調發歲時貢獻皆輸上第於冀乘輿乃其次也吏民齎貨求官請罪者道路相望冀又遣客出塞交通外國廣求異物因行道路發取妓女御者而使人復乘藝橫暴妻略婦女歐擊吏卒所在怨毒冀乃大起第舍而夀亦對街為宅殫極土木互相誇競堂寢皆有隂陽奧室連房洞户柱壁雕鏤加以銅漆窗牖皆有綺疏青瑣圖以雲氣仙靈臺閣周通更相臨望飛梁石磴陵跨水道金玉珠璣異方珍怪充積藏室逺致汗血名馬又廣開園囿採土築山十里九坂以象二崤深林絶澗有若自然竒禽馴獸飛走其間冀夀共乘輦車張羽蓋飾以金銀遊觀第內多從倡妓鳴鐘吹管酣謳竟路或連繼日以騁娛恣客到門不得通皆請謝門者門者纍千金又多拓林苑禁同王家西至𢎞農東界滎陽南極魯陽北逹河淇包含山藪連帶邱荒周旋封域殆將千里又起莵苑于河南城西經亘數十里發屬縣卒徒繕修樓觀數年乃成移檄所在調發生莵刻其毛以為識人有犯者罪至刑死嘗有西域賈胡不知禁忌誤殺一莵轉相告言坐死者十餘人冀二弟嘗私遣人出獵上黨冀聞而捕其賔客一時殺三十餘人無生還者冀又别起第於城西以納姦亡或取良人悉為奴婢至數千人名曰自賣人元嘉元年帝以冀有援立之功欲崇殊典乃大會公卿共議其禮於是有司奏冀入朝不趨劒履上殿謁讚不名禮儀比蕭何悉以定陶陽成餘户增封為四縣比鄧禹賞賜金錢奴婢綵帛車馬衣服田第比霍光以殊元勳每朝會與三公絶席十日一入平尚書事宣布天下為萬世法冀猶以所奏禮薄意不悅專擅威柄凶恣日積機事大小莫不咨決之宫衛近侍並所親樹禁省起居纎微必知百官遷召皆先到冀門箋檄謝恩然後敢詣尚書下邳人吳樹為宛令之官辭冀冀賔客布在縣界以情託樹樹對曰小人姦蠧比屋可誅明將軍以椒房之重處上將之位宜崇賢善以補朝闕宛為大都士之淵藪自侍坐以來未聞稱一長者而多託非人誠非敢聞冀默然不悅樹到縣遂誅殺冀賔客為人害者數十人由是深怨之樹後為荆州刺史臨去辭冀冀為設酒因鴆之樹出死車上又遼東太守侯猛初拜不謁冀託以他事乃腰斬之時郎中汝南袁著年十九見冀凶縱不勝其憤乃詣闕上書曰臣聞仲尼歎鳳鳥不至河不出圖自傷卑賤不能致也今陛下居得致之位而有能致之資而和氣未應賢愚失序者藝分權臣上下壅隔之故也夫四時之運功成則退髙爵厚寵鮮不致災今大將軍位極功成可為至戒宜遵縣車之禮髙枕頤神傳曰木實繁者披枝害心若不抑損權盛將無以全其身矣左右聞臣言將側目切齒臣特以童蒙見拔故敢忘忌諱昔舜禹相戒無若丹朱周公戒成王無如殷紂願除誹謗之罪以開天下之口書得奏冀聞而密遣掩捕著著乃變易姓名後托病偽死結蒲為人市棺殯送冀亷知其詐隂求得笞殺之隱蔽其事學生桂陽劉常當世名儒素善于著冀召補令史以辱之時太原郝潔胡武皆危言髙論與著友善先是潔等連名奏記三府荐海內髙士而不詣冀冀追怒之又疑為著黨敕中都官移檄捕前奏記者並殺之遂誅武家死者六十餘人潔初逃亡知不得免因輿櫬奏書冀門書入仰藥而死家乃得全及冀誅有詔以禮祀著等冀諸忍忌皆此類也不疑好經書善待士冀隂疾之因中常侍白帝轉為光祿勳又諷衆人共薦其子允為河南尹允一名胡狗時十六容貌甚陋不勝冠帶道路見者莫不嗤笑焉不疑自耻兄弟有隙遂讓位歸第與弟蒙閉門自守冀不欲令與賔客交通隂使人變服至門記往來者南郡太守馬融江夏太守田明初除過謁不疑冀諷州郡以他事陷之皆髠笞徙朔方融自刺不殊明遂死於路永興三年封不疑子馬為潁隂侯允子桃為城父侯冀一門前後七封侯三皇后六貴人二大將軍夫人女食邑稱君者七人尚公主三人其餘卿將尹校五十七人在位二十餘年窮極滿盛威行內外百僚側目莫敢違命天子恭已而不得有所親豫帝既不平之延熹二年太史令陳授因小黃門徐璜陳災異日食之變咎在大將軍冀聞之諷洛陽令收考授死於獄帝由此發怒初掖庭人鄧香妻宣生女猛香卒宣更適梁紀梁紀者冀妻夀之舅也夀引進猛入掖庭見幸為貴人冀因欲認猛為其女以自固乃易猛姓為梁時猛姊壻邴尊為議郎冀恐尊沮敗宣意乃遣刺客於偃城刺殺尊而又欲殺宣宣家在延熹里與中常侍袁赦相比冀使刺客登赦屋欲入宣家赦覺之鳴鼓會衆以告宣宣馳入以白帝帝大怒遂與中常侍單超具瑗唐衡左悺徐璜等五人成謀誅冀語在宦者傳冀心疑超等乃使中黃門張惲入省宿以防其變具瑗敕吏收惲以輒從外入欲圖不軌帝因是御前殿召諸尚書入發其事使尚書令尹勳持節勒丞郎以下皆操兵守省閣斂諸符節送省中使黃門令具瑗將左右廄騶虎賁羽林都候劒戟士合千餘人與司𨽻校尉張彪共圍冀第使光祿勳袁盱持節收冀大將軍印綬徙封比景都鄉侯冀及妻夀即日皆自殺悉收子河南尹允叔父屯騎校尉讓及親從衛尉淑越騎校尉忠長水校尉戟等諸梁及孫氏中外宗親送詔獄無少長皆棄市不疑蒙先卒其他所連及公卿列校刺史二千石者數十人故吏賔客免黜者三百餘人朝廷為空唯尹勳袁盱及廷尉邯鄲義在焉是時事卒從中發使者交馳公卿失其度官府市里鼎沸數日乃定百姓莫不稱慶收冀財貨縣官斥賣合三十餘萬萬以充王府用減天下租稅之半散其苑囿以業窮民録誅冀功者封尚書令尹勳以下數十人張純字伯仁京兆杜陵人也髙祖父安世宣帝時為大司馬衛將軍封富平侯父放為成帝侍中純少襲爵土哀平中為侍中王莾時至列卿遭值篡偽多亡爵土純以敦謹守約保全前封建武初先詣闕故得復國五年拜太中大夫使將潁川突騎安集荆徐揚部督委輸監諸將營後又將兵屯田南陽遷五官中郎將有司奏列侯非宗室不宜復國光武曰張純宿衛十有餘年其勿廢更封武始侯食富平之半純在朝歷世明習故事建武初舊章多闕每有疑議輒以訪純自郊廟婚嫁喪紀禮儀多所正定帝甚重之以純兼虎賁中郎將數被引見一日或至數四純以宗廟未定昭穆失序十九年乃與太僕朱浮各奏言陛下興於匹庶蕩滌天下誅鉏暴亂興繼祖宗竊以經義所紀人事衆心雖實同創革而名為中興宜奉先帝恭承宗祀者也元帝以來宗祀髙皇帝為受命祖孝文皇帝為太宗孝武皇帝為世宗皆如舊制又立親廟四世推南頓君以上盡於舂陵節侯禮為人後者則為之子既事大宗則降其私親今禘祫髙廟陳序昭穆而舂陵四世君臣並列以卑厠尊不合禮意設不遭王莾而國嗣無寄推求宗室以陛下繼統者安得復顧私親違禮制乎昔髙祖以自受命不由太上宣帝以孫後祖不敢私親故為父立廟獨羣臣侍祠臣愚謂宜除今親廟以則二帝舊章願下有司博採其議詔下公卿大司徒戴涉大司空竇融議宜以宣元成哀平五帝四世代今親廟宣元皇帝尊為祖父可親奉祠成帝以下有司行事别為南頓君立皇考廟其祭上至舂陵節侯羣臣奉祠以明尊尊之敬親親之恩帝從之是時宗廟未備自元帝以上祭於洛陽髙廟成帝以下祠於長安髙廟其南頓四世隨所在而祭焉明年純代朱浮為太僕二十三年代杜林為大司空在位慕曹參之迹務於無為選辟掾吏皆知名大儒明年上穿陽渠引洛水為漕百姓得其利二十六年詔純曰禘祫之祭不行已久宜據經典定為禘祫之制純奏曰禮三年一祫五年一禘春秋傳曰大禘者何合祭也毁廟及未毁廟之主皆登合食乎太祖五年而再殷漢舊制三年一祫毁廟主合食髙廟存廟主未嘗合祭元始五年諸王公列侯廟會始為禘祭又前十八年親幸長安亦行此禮禮説三年一閏天氣小備五年再閏天氣大備三年一祫五年一禘禘之為言諦也諦定昭穆尊卑之義也禘祭以夏四月夏者陽氣在上隂氣在下故正尊卑之義也祫祭以冬十月冬者五穀成熟物備禮成故合聚飲食也斯典之廢於兹八年謂可如禮施行以時定議帝從之自是禘祫遂定時南單于及烏桓來降邊境無事百姓新去兵革歲仍有年家給人足純以聖王之建辟雍所以崇尊禮義既富而教者也乃按七經讖明堂圖河間古辟雍記孝武太山明堂制度及平帝時議欲具奏之未及上會博士桓榮上言宜立辟雍明堂章下三公太常而純議同榮帝乃許之三十年純奏上宜封禪以明中興之功中元元年帝乃東巡岱宗以純視御史大夫從并上元封舊儀及刻石文三月薨諡曰節侯子奮嗣奮字稚通父純臨終敕家丞曰司空無功於時猥蒙爵土身死之後勿議傳國奮兄根少被病光武詔奮嗣爵奮稱純遺敕固不肯受帝以奮違詔敕收下獄奮惶怖乃襲封永平四年隨例歸國奮少好學而節儉行義常分損租奉贍恤宗親雖至傾匱而施與不怠十年儋耳降附奮來朝上夀引見宣平殿應對合旨顯宗異其才以為侍祠侯建初元年拜左中郎將轉五官中郎將遷長水校尉七年為將作大匠章和元年免永元元年復拜城門校尉四年遷長樂校尉明年代桓郁為太常六年代劉方為司空時歲災旱祈雨不應乃上表曰比年不登人用飢匱今復久旱秋稼未立陽氣垂盡歲月迫促夫國以民為本民以穀為命政之急務憂之重者也臣蒙恩尤深受職過任夙夜憂懼章奏不能款心願對中常侍疏奏即時引見復口陳時政之宜明日和帝召太尉司徒幸洛陽獄録囚徒收洛陽令陳歆即時大雨三日奮在位清白無他異績九年以病罷在家上疏請定禮樂十三年更召拜太常復上疏曰漢當改作禮樂圖書著明王者化定制禮功成作樂謹條禮樂異議三事願下有司以時考定昔者孝武皇帝光武皇帝封禪告成而禮樂不定事不相副先帝已詔曹褒今陛下但奉而成之由周公斟酌文武之道非自為制誠無所疑久藝謙讓令大漢之業不以時成非所以章顯祖宗功德建太平之基為後世法帝雖善之猶未施行其冬復以病罷明年卒於家子甫嗣官至建城門候甫卒子吉嗣永初三年吉卒無子國除自昭帝封安世至吉傳國八世經歷篡亂二百年間未嘗譴黜封者莫與為比曹裦字叔通魯國薛人也父充持慶氏禮建武中為博士從巡狩岱宗定封禪禮還受詔議立七郊三雍大射養老禮儀顯宗即位充上言漢再受命仍有封禪之事而禮樂崩闕不可為後嗣法五帝不相沿樂三王不相襲禮大漢自制禮以示百世帝問制禮樂云何充對曰河圖括天地象曰有漢世禮樂文雅出尚書琁璣鈐曰有帝漢出德洽作樂名豫帝善之下詔曰今且改太樂官曰太豫樂詩曲操以俟君子拜充侍中作章句辨難於是遂有慶氏學褒少篤志有大度結髮傳充業博雅疏通尤好禮士常感朝廷制度未備慕叔孫漢禮儀晝夜研精沈吟專思寢則懷抱筆札行則誦習文書當其念至忘所之適初舉孝亷再遷圉令以禮理人以德化俗時他郡盜徒五人來入圉界吏捕得之陳留太守馬嚴聞而疾惡風縣殺之褒敕吏曰夫絶人命者天亦絶之臯陶不為盜制死刑管仲遇盜而升諸公今承旨殺之是逆天心而順府意也其罰重矣如得全此人命而身坐之吾所願也遂不為殺嚴奏裦耎弱免官歸郡為功曹徴拜博士會肅宗欲制定禮樂元和二年下詔曰河圖稱赤九會昌十世以光十一以興尚書琁璣鈐曰述堯理世平制禮樂放唐之文豫末小子託于數終曷以纘興崇𢎞祖宗仁濟元元帝命驗曰順堯考德題期立象且三五步驟優劣殊軌况豫頑陋無以克堪雖欲從之末由也已每見圖書中心恧焉裦知帝旨欲有興作乃上疏曰昔者聖人受命而王莫不制禮作樂以著功德功成作樂化定制禮所以收世俗致禎祥為萬姓獲福於皇天者也今皇天降祉嘉端並臻制作之符甚於言語宜定文制著成漢禮丕顯祖宗盛德之美章下太常太常巢堪以為一世大典非裦所定不可作帝知羣僚拘攣難與圖治朝廷禮憲宜時刋立明年復下詔曰朕以不德膺祖宗𢎞烈乃者鸞鳯仍集麟龍並臻甘露宵降嘉穀滋生赤草之類紀于史官朕夙夜祗畏上無以彰于先功下無以克稱靈物漢遭秦餘禮壞樂崩因循故事未可觀省有知其説者各盡所能裦省詔歎息謂諸生曰昔奚斯頌魯考甫詠殷夫人臣依義顯君竭忠彰主行之美也當仁不讓吾何辭哉遂復上疏具陳禮樂之本制改之意拜裦侍中從駕南巡既還以事下三公未及奏詔召元武司馬班固問改定制禮之宜固曰京師諸儒多能説禮宜廣招集共議得失帝曰諺言作舍道邊三年不成會禮之家名為聚訟互生疑異筆不得下昔堯作大章一夔足矣章和元年正月乃召裦詣嘉德門令小黃門持班固所上叔孫通漢儀十二篇敕裦曰此制散略多不合經今宜依禮條正使可施行於南宫東觀盡心集作裦既受命乃次序禮事依凖舊典雜以五經讖記之文撰次天子至於庶人冠婚吉凶終始制度以為百五十篇寫以二尺四寸簡其年十二月奏上帝以衆論難一故但納之不復令有司平奏會帝崩和帝即位裦乃為作章句帝遂以新禮二篇冠擢裦監羽林左騎永元四年遷射聲校尉後太尉張酺尚書張敏等奏裦擅制漢禮破亂聖術宜加刑誅帝雖寢其奏而漢禮遂不行褒在射聲營舍有停棺不葬者百餘所裦親自履行問其意故吏對曰此等多是建武以來絶無後者不得埋掩裦乃愴然為買空地悉葬其無主者設祭以祀之遷城門校尉將作大匠時有疾疫裦巡行病徒為致醫藥經理饘粥多蒙濟活七年出為河內太守時春夏大旱糧穀踴貴裦到乃省吏并職退去姦殘澍兩數降其秋大熟百姓給足流冗皆還後坐上災害不實免有頃徴再遷復為侍中裦博物識古為儒者宗十四年卒官作通義十二篇演經雜論百二十篇又傳禮記四十九篇教授諸生千餘人慶氏學遂行於世鄭元字康成北海髙密人也八世祖崇哀帝時為尚書僕射元少為鄉嗇夫得休歸嘗詣學官不樂為吏父數怒之不能禁遂造太學受業師事京兆第五元先始通京氏易公羊春秋三統厯九章算術又從東郡張恭祖受周官禮記左氏春秋韓詩古文尚書以山東無足問者乃入西關因涿郡盧植事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴元在門下三年不得見乃使髙業弟子傳授於元元日夜尋誦未嘗怠倦會融集諸生考論圖緯聞元善算乃召見樓上元因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣元自遊學十餘年乃歸鄉里家貧客耕東萊學徒相隨已數百千人及黨事起乃與同郡孫嵩等四十餘人俱被禁錮遂隱修經業杜門不出時任城何休好公羊學遂著公羊墨守左氏膏盲穀梁廢疾元乃發墨守針膏盲起廢疾休見而歎曰康成入吾室操吾矛以伐我乎初中興之後范升陳元李育賈逵之徒爭論古今學後馬融答北地太守劉瓌及元答何休義據通深由是古學遂明靈帝末黨禁解大將軍何進聞而辟之州郡以進權戚不敢違意遂迫脅元不得已而詣之進為設几杖禮待甚優元不受朝服而以幅巾見一宿逃去時年六十弟子河內趙商等自逺方至者數千後將軍袁隗表為侍中以父喪不行國相孔融深敬於元屣履造門告髙密縣為元特立一鄉曰昔齊置士鄉越有君子軍皆異賢之意鄭君好學實懷明德昔太史公廷尉吳公謁者僕射鄧公皆漢之名臣又南山四皓有園公夏黃公潛光隱耀世加其髙皆悉稱公然則公者仁德之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉昔東海于公僅有一節猶戒鄉人侈其門閭矧乃鄭公之德而無駟牡之路可廣開門衢令容髙車號為通德門董卓遷都長安公卿舉元為趙相道斷不至會黃巾寇青部乃避地徐州徐州牧陶謙接以師友之禮建安元年自徐州還髙密道遇黃巾賊數萬人見元皆拜相約不敢入縣境元後嘗疾篤自慮以書戒子益恩曰吾家舊貧為父母羣弟所容去厮役之吏遊學周秦之都往來幽并兖豫之域獲覲乎在位通人處逸大儒得意咸從捧手有所受焉遂博稽六藝粗覽傳記時覩祕書緯術之奧年過四十乃歸供養假田播殖以娛朝夕遇閹尹擅藝坐黨禁錮十有四年而蒙赦令舉賢良方正有道辟大將軍三司府公車再召比牒併名早為宰相惟彼數公懿德大雅克堪王臣故宜式序吾自忖度無任於此但念述先聖之元意思整百家之不齊亦庶幾以竭吾才故聞命罔從而黃巾為害萍浮南北復歸邦鄉入此歲來已七十矣宿素衰落仍有失誤案之禮典便合傳家今我告爾以老歸爾以事將間居以安性覃思以終業自非拜國君之命問族親之憂展敬墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之咨爾焭焭一夫曾無同生相依其朂求君子之道研鑽勿替敬慎威儀以近有德顯譽成於僚友德行立於己志若致聲稱亦有榮於所生可不深念邪可不深念邪吾雖無紱冕之緒頗有讓爵之髙自樂以論贊之功庶不遺後人之羞末所憤憤者徒以亡親墳壟未成所好羣書悉皆腐敝不得於禮堂寫定傳與其人日西方暮其可圖乎家今差多於昔勤力務時無恤飢寒菲飲食薄衣服節夫二者尚令吾寡恨若忽忘不識亦已焉哉時大將軍袁紹總兵冀州遣使要元大會賔客元最後至乃延升上坐身長八尺飲酒一斛秀眉明目容儀溫偉紹客多豪俊並有才説見元儒者未以通人許之競設異端百家互起元依方辨對咸出問表皆得所未聞莫不嗟服時汝南應劭亦歸於紹因自贊曰故太山太守應仲逺北面稱弟子何如元笑曰仲尼之門考以四科由賜之徒不稱官閥劭有慙色紹乃舉元茂才表為左中郎將皆不就公車徴為大司農給安車一乘所過長吏送迎元乃以病自乞還家五年春夢孔子告之曰起起今年歲在辰來年歲在巳既寤以讖合之知命當終有頃寢疾時袁紹與曹操相距於官度令其子談遣使逼元隨軍不得已載病到元城縣病篤不進其年六月卒年七十四遺令薄葬自郡守已下嘗受業者縗絰赴會千餘人門生相與撰元答諸弟子問五經依論語作鄭志八篇凡元所注周易尚書毛詩儀禮禮記周官論語孝經尚書大傳中候乾象厯又著天文七政論魯禘祫義六藝論毛詩譜駁許慎五經異義答臨孝存周禮難凡百餘萬言元質於辭訓通人頗譏其繁至於經傳洽熟稱為純儒齊魯間宗之其門人山陽郤慮至御史大夫東萊王基清河崔琰著名於世又樂安國淵任嘏時並童幼元稱淵為國器嘏有道德其餘亦多所鑒拔皆如其言元唯有一子益恩孔融在北海舉為孝亷及融為黃巾所圍益恩赴難隕身有遺腹子元以其手文似己名之曰小同鄭興字少贛河南開封人也少學公羊春秋晚善左氏傳遂積精深思通逹其旨同學者皆師之天鳯中將門人從劉歆講正大義歆美興才使撰條例章句傳詁及校三統歷更始立以司直李松行丞相事先入長安松以興為長史令還奉迎遷都更始諸將皆山東人咸勸留洛陽興説更始曰陛下起自荆楚權政未施一朝建號而山西雄桀爭誅王莽開關郊迎者何也此天下同苦虐政而思髙祖之舊德也今久不撫之誠恐百姓離心盜賊復起矣春秋書齊小白入齊不稱侯未朝廟故也今議者欲先定赤眉而後入關是不識其本而爭其末國家之守轉在函谷雖臥洛陽庸得安枕乎更始曰朕西決矣拜興為諫議大夫使安集關西及朔方涼益三州還拜涼州刺史會天水有反者攻殺郡守興坐免時赤眉入關東道不通興乃西歸隗嚻虛心禮請而興恥為之屈稱疾不起嚻矜已自飾常以為西伯復作乃與諸將議自立為王興聞之而説嚻曰春秋傳云口不道忠信之言為嚚耳不聽五聲之和為聾間者諸將集議無乃不道忠信之言大將軍之聽無乃阿而不察乎昔文王承積德之緒加之以睿聖三分天下尚服事殷及武王即位八百諸侯不謀同會皆曰紂可伐矣武王以未知天命還兵待時髙祖征伐纍年猶以沛公行師今令德雖明世無宗周之祚威略雖振未有髙祖之功而欲舉未可之事昭速禍患無乃不可乎惟將軍察之嚻竟不稱王後遂廣置職位以自尊髙興復止嚻曰夫中郎將太中大夫使持節官皆王者之器非人臣所當制也孔子曰唯器與名不可以假人不可以假人者亦不可以假於人也無益於實有損於名非尊上之意也嚻病而止之及嚻遣子恂入侍將行興因恂求歸葬父母嚻不聽而徙興舍益其秩禮興入見嚻曰前遭赤眉之亂以將軍僚舊故敢歸身明德幸蒙覆載之恩復得全其性命興聞事親之道生事之以禮死葬之以禮祭之以禮奉以周旋弗敢失墜今為父母未葬請乞骸骨若以增秩徙舍中更停留是以親為餌無禮甚矣將軍焉用之嚻曰嚻將不足留故邪興曰將軍據七郡之地擁羌胡之衆以戴本朝德莫厚焉威莫重焉居則為專命之使入必為鼎足之臣興從俗者也不敢深居屏處因將軍求進不患不逹因將軍求入何患不親此興之計不逆將軍者也興業為父母請不可以己願留妻子獨歸葬將軍何猜焉嚻曰幸甚促為辦裝遂令與妻子俱東時建武六年也侍御史杜林先與興同寓隴右乃薦之曰切見河南鄭興執義堅固敦悅詩書好古博物見疑不惑有公孫僑觀射父之德宜侍帷幄典職機密昔張仲在周燕翼宣王而詩人悅喜惟陛下留聽少察以助萬分乃徵為太中大夫明年三月晦日食興因上疏曰春秋以天反時為災地反物為妖人反德為亂亂則妖災生往年以來謫咎頻至意者執事頗有闕焉按春秋昭公十七年夏六月甲戌朔日有食之傳曰日過分而未至三辰有災於是百官降服君不舉避移時樂用鼓祝用幣史用辭今孟夏純乾用事隂氣未作其災尤重夫國無善政則謫見日月變咎之來不可不慎其要在因人之心擇人處位也堯知鯀不可用而用之屈己之明因人之心也齊桓反政而相管仲晉文歸國而任郤穀者是不私其私擇人處位也今公卿大夫多舉漁陽太守郭伋可大司空者而不以時用道路流言咸曰朝廷專用功臣功臣用則人位謬矣願陛下上師唐虞正覽齊晉以成屈己從衆之德以濟羣臣讓善之功夫日月交會數應在朔而頃年日食每多在晦先時而合皆月行疾也日君象而月臣象君亢急則臣下逼促故行疾也今年正月繁霜自爾以來率多寒日此亦急咎之罰天於賢聖之君猶慈父之于孝子也丁寧申戒欲其反政故災變仍見此乃國之福也今陛下髙明而臣下懊促宜留思柔克之政垂意洪範之法博採廣謀納臣下之䇿書奏多有所納帝嘗問興郊祀事曰吾欲以讖斷之何如興對曰臣不為讖帝怒曰卿之不為讖非之邪興惶恐曰臣於書有所未學而無所非也帝意乃解興數言政事依經守義文章溫雅然以不善讖故不能任九年使監征南積弩營於津鄉會征南將軍岑彭為刺客所殺興領其營遂與大司馬吳漢俱擊公孫述述死詔興留屯成都頃之侍御史舉興奉使私買奴婢坐左轉蓮音輦勺音酌令是時喪亂之餘郡縣荒殘興方欲築城郭修禮教以化之會以事免興好古學尤明左氏周官長於厯數自杜林桓談衛宏之屬莫不斟酌焉世言左氏者多祖於興而賈逵自恃其父業故有鄭賈之學興去蓮勺後遂不復仕客授閿音聞鄉三公連辟不肯應卒于家子衆字仲師年十二從父受左氏春秋精力於學明三統厯作春秋難記條例兼通易詩知名於世建武中皇太子及山陽王荆因虎賁中郎將梁松以縑帛聘請衆欲為通義引籍出入殿中衆謂松曰太子儲君無外交之義漢有舊防蕃王不宜私通賔客遂辭不受松復風衆以長者意不可逆衆曰犯禁觸罪不如守正而死太子及荆聞而竒之亦不強也及梁氏事敗賔客多坐之惟衆不染於辭永平初辟司空府以明經給事中再遷越騎司馬復留給事中是時北丐奴遣使求和親八年顯宗遣衆持節使丐奴衆至北庭虜欲令拜衆不為屈單于大怒圍守閉之不與水火欲脅服之衆拔刀自誓單于恐乃止乃更發使隨衆還京師朝議欲復遣使報之興上疏諫曰臣伏聞北單于所以要致漢使者欲以離南單于之衆堅三十六國之心也又當揚漢和親誇示鄰敵令西域欲歸化者局足狐疑懷土之人絶望中國耳漢使既到更偃蹇自信若復遣之虜必自謂得謀其羣臣駁議者不敢復言如是南庭動搖烏桓有離心矣南單于久居漢地具知形藝萬分離析旋為邊害今幸有度遼之衆揚威北垂雖勿報答不敢為害帝不從復遣衆衆因上言臣前奉使不為丐奴拜單于意恨故遣兵圍臣今復銜命必見陵折臣誠不忍持大漢節對氈裘獨拜如令胸奴遂能服臣將有損大漢之強帝不聽衆不得已既行在路上書固爭之詔切責衆追還繫廷尉會赦歸家其後帝見丐奴來者問衆與單于爭禮之狀皆言丐奴中傳衆意氣壯勇雖蘇武不過乃復召衆為軍司馬使與虎賁中郎將馬廖擊車師至敦煌拜為中郎將使護西域會胸奴脅車師圍戊已校尉衆發兵救之遷武威太守謹修邊備虜不敢犯遷左馮翊政有名迹建初六年代鄧彪為大司農是時肅宗議復鹽鐡官衆諫以為不可詔數切責至被奏劾衆執之不移帝不從在位以情正稱其後受詔作春秋刪十九篇八年卒官子安世亦傳家業為長樂未央廄令延光中安帝廢太子為濟隂王安世與太常桓焉太僕來歷等共正議諫爭及順帝立安世已卒追賜錢帛除子亮為郎衆曾孫公業自有傳范升字辨卿代郡人也少孤依外家居九歲通論語孝經及長習梁邱易老子教授後生王莾大司空王邑辟升為議曹史時莾頻發兵役徴賦繁興升乃奏記邑曰升聞子以人不間於其父母為孝臣以下不非其君上為忠今衆人咸稱朝聖皆曰公明蓋明者無不見聖者無不聞今天下之事昭昭於日月震震於雷霆而朝云不見公云不聞則元元焉所呼天公以為是而不言則過小矣知而從令則過大矣二者於公無可以免宜乎天下歸怨於公矣朝以逺者不服為至念升以近者不悅為重憂今動與時戾事與道反馳騖覆車之轍探湯敗事之後後出益可怪晚發愈可懼耳方春歲首而動發逺役藜藿不充田荒不耕穀價騰躍斛至數千吏人陷於湯火之中非國家之人也如此則胡貊守關青徐之寇在於帷帳矣升有一言可以解天下倒懸免元元之急不可書傳願蒙引見極陳所懷邑雖然其言而竟不用升稱病乞身邑不聽令乘傳使上黨升遂與漢兵會因留不還建武二年光武徴詣懷宫拜議郎遷博士升上疏讓曰臣與博士梁恭山陽太守吕羌俱修梁邱易二臣年並耆艾經學深明而臣不以時退與恭並立深知羌學又不能逹慙負二老無顔於世誦而不行知而不言不可開口以為人師願推博士以避恭羌帝不許然由是重之數詔引見每有大議輒見訪問時尚書令韓歆上疏欲為費氏易左氏春秋立博士詔下其議四年正月朝公卿大夫博士見於雲臺帝曰范博士可前平説升起對曰左氏不祖孔子而出於邱明師徒相傳又無其人且非先帝所存無因得立遂與韓歆及太中大夫許淑等互相辨難日中乃罷升退而奏曰臣聞主不稽古無以承天臣不述舊無以事君陛下愍學微缺勞心經藝情存博聞故異端競進近有司請置京氏易博士羣下執事莫能據正京氏既立費氏怨望左氏春秋復以比類亦希置立京費已行次復髙氏春秋之家又有騶夾如令左氏費氏得置博士髙氏騶夾五經竒異並復求立各有所執乖戾分爭從之則失道不從則失人將恐陛下有厭倦之聽孔子曰博學約之弗叛矣夫夫學而不約必叛道也顔淵曰博我以文約我以禮孔子可謂知教顔淵可謂善學老子曰學道日損損猶約也又曰絶學無憂絶未學也今費左二學無有本師而多反異先帝前世有疑於此故京氏雖立輒復見廢疑道不可由疑事不可行詩書之作其來已久孔子尚周流遊觀至于知命自衛反魯乃正雅頌今陛下草創天下紀綱未定雖設學官無有弟子詩書不講禮樂不修奏立左費非政急務孔子曰攻乎異端斯害也已傳曰聞疑傳疑聞信傳信而堯舜之道存願陛下疑先帝之所疑信先帝之所信以示反本明不專已天下之事所以異者以不一本也易曰天下之動貞夫一也又曰正其本萬事理五經之本自孔子始謹奏左氏之失凡十四事時難者以太史公多引左氏升又上太史公違戾五經謬孔子言及左氏春秋不可録三十一事詔以下博士後升為出妻所告坐繫得出還鄉里永平中為聊城令坐事免卒於家陳元字長孫蒼梧廣信人也父欽習左氏春秋事黎陽賈護與劉歆同時而别自名家王莾從歆受左氏學以欽為厭難將軍元少傳父業為之訓詁鋭精覃思至不與鄉里通以父任為郎建武初元與桓談杜林鄭興俱為學者所宗時議欲立左氏傳博士范升奏以為左氏淺末不宜立元聞之乃詣闕上疏曰陛下撥亂正本文武並用深愍經義謬雜真偽錯亂每臨朝日輒延羣臣講論聖道知邱明至賢親授孔子而公羊穀梁傳聞於後世故詔立左氏傳博詢可否示不專已盡之羣下也今論者沉溺所習玩守舊聞固執虛言傳受之辭以非親見實事之道左氏孤學少與遂為異家之所覆冒夫至音不合衆聽故伯牙絶絃至寶不同衆好故卞和泣血仲尼聖德而不容於世况於竹帛餘文其為雷同者所排固其宜也非陛下至明孰能察之臣元竊見博士范升等所議奏左氏不可立及太史公違戾凡四十五事案升等所言前後相違皆斷截小文媟黷微辭以年數小差掇為巨謬遺脫纎微指為大尤抉瑕擲釁掩其𢎞美所謂小辨破言小言破道者也升等又曰先帝不以左氏為經故不置博士後主所宜因襲臣愚以為若先帝所行而後主必行者則盤庚不當遷于殷周公不當營洛邑陛下不當都山東也往者孝武皇帝好公羊衛太子好穀梁有詔詔太子受公羊不得受穀梁孝宣皇帝在人間時聞衛太子好穀梁於是獨學之及即位為石渠論而穀梁氏興至今與公羊並存此先帝後帝各有所立不必其相因也孔子曰純儉吾從衆至於拜下則違之夫明者獨見不惑於朱紫聽者獨聞不謬於清濁故離朱不為巧眩移目師曠不為新聲易耳方今干戈少弭戎事略戢留思聖藝眷顧儒雅採孔子拜下之義卒淵聖獨見之旨分明黑白建立左氏解釋先聖之積結洮汰學者之纍惑使基業垂於萬世後進無復狐疑則天下幸甚臣元愚鄙嘗傳師言如得以褐衣召見俯伏庭下誦孔氏之正道理邱明之宿寃若辭不合經事不稽古退就重誅雖死之日猶生之年也詔下其議范升復與元相辨難凡十餘上帝卒立左氏學太常選博士四人元為第一帝以元新忿爭乃用其次司𨽻從事李封於是諸儒以左氏之立論議歡譁自公卿以下數廷爭之會封病卒左氏復廢元以髙才著名辟司空李通府時大司農江馮上言宜令司𨽻校尉督察三公事下三府元上疏曰臣聞師臣者帝賔臣者霸故武王以太公為師齊桓以夷吾為仲父孔子曰百官總己聽於冢宰近則髙帝優相國之禮太宗假宰輔之權及亡新王莾遭漢中衰專操國柄以偷天下况已自喻不信羣臣奪公輔之任損宰相之威以刺舉為明徼訐為直至於陪僕告其君長子弟變其父兄罔密法峻大臣無所措手足然不能禁董忠之謀身為世戮故人君患在自驕不患驕臣失在自任不在任人是以文王有日昃之勞周公執吐握之恭不聞其崇刺舉務督察也方今四方尚擾天下未一百姓觀聽咸張耳目陛下宜修文武之聖典襲祖宗之遺德勞心下士屈節待賢誠不宜使有司察公輔之名帝從之宣下其議李通罷後元復辟司徒歐陽歙府數陳當世便事郊廟之禮帝不能用以病去年老卒于家子堅卿有文章賈逵字景伯扶風平陵人也九世祖誼文帝時為梁王太傅曾祖父光為常山太守宣帝時以吏二千石自洛陽徙焉父徽從劉歆受左氏春秋兼習國語周官又受古文尚書於塗憚學毛詩於謝曼卿作左氏條例二十一篇逵悉傅父業弱冠能誦左氏傳及五經本文以大夏侯尚書教授雖為古學兼通五家穀梁之説自為兒童常在太學不通人間事身長八尺二寸諸儒為之語曰問事不休賈長頭性愷悌多智思俶儻有大節尤明左氏傳國語為之解詁五十一篇永平中上疏獻之顯宗重其書寫藏祕館時有神雀集宫殿官府冠羽有五彩色帝異之以問林邑侯劉復復不能對薦逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在岐宣帝威懷戎狄神雀仍集此胡降之徴也帝敕蘭臺給筆札使作神雀頌拜為郎與班固並校祕書應對左右肅宗立降意儒術特好古文尚書左氏傳建初元年詔逵入講北宫白虎觀南宫雲臺帝善逵説使出左傳大義長於二傳者逵於是條奏之曰臣謹擲出左氏三十事尤著明者斯皆君臣之正義父子之紀綱其餘同公羊者什有七八或文簡小異無害大體至如祭仲紀季伍子胥叔術之屬左氏義深於君父公羊多任於權變其相殊絶固以甚逺而寃抑積久莫肯分明臣以永平中上言左氏與圖讖合者先帝不遺芻蕘省納臣言寫其傳詁藏之祕書建平中侍中劉歆欲立左氏不先暴論大義而輕移太常恃其義長詆挫諸儒諸儒內懷不服相與排之孝哀皇帝重逆衆心故出歆為河內太守從是攻擊左氏遂為重讐至光武皇帝奮獨見之明興立左氏穀梁會二家先師不曉圖讖故令中道而廢凡所以存先王之道者要在安上理民也今左氏崇君父卑臣子強幹弱枝勸善戒惡至明至切至直至順且三代異物損益隨時故先帝博觀異家各有所採易有施孟復立梁邱尚書歐陽復有大小夏侯今三傳之異亦猶是也又五經家皆無以證圖讖明劉氏為堯後者而左氏獨有明文五經家皆言顓頊代黃帝而堯不得為火德左氏以為少昊代黃帝即圖讖所謂帝宣也如令堯不得為火則漢不得為赤其所發明補益實多陛下通天然之明建大聖之本改元正歷垂萬世則是以麟鳯百數嘉瑞雜遝猶朝夕恪勤遊情六藝研機綜微靡不審核若欲留意廢學以廣聖見庶幾無所遺失矣書奏帝嘉之賜布五百匹衣一襲令逵自選公羊嚴顔諸生髙才者二十人教以左氏與簡紙經傳各一通逵母常有疾帝欲加賜以校書例多特以錢二十萬使潁陽侯馬防與之謂防曰賈逵母病此子無人事於外屢空則從孤竹之子於首陽山矣逵數為帝言古文尚書與經傳爾雅訓詁相應詔令撰歐陽大小夏侯尚書古文同異逵集為三卷帝善之復令撰齊魯韓詩與毛詩異同并作周官解故遷逵為衛士令八年乃詔諸儒各各選髙才生受左氏穀梁春秋古文尚書毛詩由是四經遂行於世皆拜逵所選弟子及門生為千乘王國郎朝夕受業黃門署學者皆欣欣羡慕焉和帝即位永元三年以逵為左中郎將八年復為侍中領騎都尉內備帷幄兼領祕書近署甚見信用逵薦東萊司馬均陳國汝郁帝即徴之並蒙優禮均字少賔守貧好學隱居教授不應辟命信誠行乎州里鄉人有所計爭輒令祝少賔不直者終無敢言位至侍中以老病乞身帝賜以大夫祿歸鄉里郁字叔異性仁孝及親殁遂隱處山澤後纍遷為魯相以德教化百姓稱之流人歸者八九千户逵所著經傳義詁及難論百餘萬言又作詩頌誄書連珠酒令凡九篇學者宗之後世稱為通儒然不修小節當世以此頗譏焉故不至大官永元十三年卒時年七十二朝廷愍惜除兩子為太子舍人張霸字伯饒蜀郡成都人也年數歲而知孝讓雖出入飲食自然合禮鄉人號為張曾子七歲通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字曰饒焉後就長水校尉樊倏等受嚴氏公羊春秋遂博覽五經諸生孫林劉固假著等慕之各市宅其傍以就學焉舉孝亷光祿主事稍遷永元中為會稽太守表用郡人處士顧奉公孫松等奉為潁川太守松司隸校尉並有名稱其餘有行業者皆見擢用郡中爭勵志節習經者以千數道路但聞誦聲初霸以樊倏刪嚴氏春秋猶多繁辭乃減定為二十萬言更名張氏學霸始到越賊未解郡界不寧乃移書開購明用信賞賊遂束手歸附不煩士卒之力童謡曰棄我戟損我矛盜賊盡吏皆休視事三年謂掾史曰太守起自孤生致位郡守蓋日中則移月滿則虧老氏有言知足不辱遂上病後徴四遷為侍中時皇后兄虎賁中郎將鄧騭當朝貴盛聞霸名行欲與為交霸逡巡不答衆人笑其不識時務後當為五更會疾卒年七十遺敕諸子曰昔延州使齊子死嬴博因坎路側遂以葬焉今蜀道阻逺不宜歸瑩可止此葬足藏髮齒而已務遵速朽副我本心人生一世但當畏敬於人若不善加已直為受之諸子承命葬於河南梁縣因遂家焉將作大匠翟酺等與門人追録本行諡曰憲文中子楷字公超通嚴氏春秋古文尚書門徒常數百人賔客慕之自父黨夙儒偕造門焉車馬闐街徒從無所止黃門及貴戚之家皆起舍巷次以候過客往來之利楷疾其如此輒徙避之家貧無以為業常乘驢車至縣賣藥足給食者輒還鄉里司隸舉茂才除長陵令不至官隱居𢎞農山中學者隨之所居成市後華隂山南遂有公超市五府連辟舉賢良方正不就漢安元年順帝特下詔告河南尹曰故長陵令張楷行慕原憲操擬夷齊輕貴樂賤竄迹幽藪髙志確然獨拔羣俗前此徴命盤桓未至將主者玩習於常優賢不足使其難進歟郡時以禮發遣楷復告疾不到性好道術能作五里霧時關西人裴優亦能為三里霧自以不如楷從學之楷避不肯見桓帝即位優遂行霧作賊事覺被考引楷言從學術楷坐繫廷尉詔獄積二年常諷誦經籍作尚書注後以事無驗見原還家建和三年詔安車備禮聘之辭以疾篤不行年七十終於家子陵字處沖官至尚書元嘉中歲首朝賀大將軍梁冀帶劒入省陵呵叱之令出敕羽林虎賁奪冀劒冀跪謝陵不應即劾奏冀詣廷尉論罪有詔以一歲俸贖而百寮肅然初冀弟不疑為河南尹舉陵孝亷不疑疾陵之奏冀因謂曰昔舉君適所以自罰也陵對曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色陵弟元字處虛沈深有才略以時亂不仕司空張溫數以禮辟不能致中平二年溫以車騎將軍出征涼州賊邊章等將行元自田廬被褐帶索要説溫曰天下寇賊雲起豈不以黃門常侍無道故乎聞中貴人公卿已下當出祖道於平樂觀明公總天下之威重握六師之要若於中坐酒酣鳴金鼓整行陳召軍正執有罪者誅之引兵還屯都亭以次翦除中官解天下之倒縣報海內之怨毒然後顯用隱逸中正之士則邊章之徒宛轉股掌之上矣溫聞大震不能對良久謂元曰處虛非不悅子之言顧吾不能行如何元乃歎曰事行則為福不行則為賊今與公長辭矣即仰藥欲飲之溫前執其手曰子忠於我我不能用是吾罪也子何為當然且出口入耳之言誰今知之元遂去隱居魯陽山中及董卓秉政聞之辟以為掾舉侍御史不就卓臨之以兵不得已強起至輪氏道病終桓榮字春卿沛郡龍亢人也少學長安習歐陽尚書事博士九江朱普貧窶無資常客傭以自給精力不倦十五年不窺家園及王莾篡位乃歸會普卒榮奔喪九江負土成墳因留教授徒衆數百人莾敗天下亂榮抱經書與弟子逃匿山谷雖飢困而講論不輟復客授江淮間建武十九年年六十餘始辟大司徒府時憲宗為皇太子選求明經乃擢榮弟子豫章何湯為虎賁中郎將以尚書授太子世祖從容問湯本師為誰湯對曰事沛國桓榮帝即召榮令説尚書善之拜為議郎賜錢十萬入使授太子每朝會帝輒令榮於公卿前敷奏經書帝稱善曰得生幾晚會歐陽博士缺帝欲用榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎揚州從事臯𢎞帝曰俞往汝諧因拜榮為博士引閎𢎞為議郎車駕幸太學會諸博士論難於前榮被服儒衣溫恭有蘊籍辨明經義每以禮讓相厭不以辭長勝人儒者莫之及特加賞賜又詔諸生雅吹擊磬盡日乃罷後榮入會庭中詔賜竒果受者皆懷之榮獨舉手捧之以拜帝笑指之曰此真儒生也以是愈見敬厚常令宿止太子宫積五年薦門下生九江胡憲侍講乃聽得出旦一入而已榮嘗寢病太子朝夕遣中傅問病賜以珍羞帷帳奴婢謂曰如有不諱無憂家室也後病愈復入侍講三十八年大會百官詔問誰可傅太子者羣臣承望上意皆言太子舅執金吾原鹿侯隂識可博士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才帝稱善曰欲置傅者以輔太子也今博士不難正朕况太子乎乃拜佚為太子太傅而以榮為少傅賜以輜車乘馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉哉榮以太子經學成畢上疏謝曰臣幸得侍帷幄執經連年而智學淺短無以補益萬分今皇太子以聰睿之姿通明經義觀覽古今儲君副主莫能專精博學若此者也斯誠國家福祜天下幸甚臣師道已盡皆在太子謹遣掾丞汜再拜歸道太子報書曰莊以童蒙學道九載而典訓不明無所曉識夫五經廣大聖言幽逺非天下之至精其孰能與於此况以不才敢承誨命昔之先師謝弟子者有矣上則通逹經旨分明章句下則去家慕鄉求謝師門今蒙下列不敢有辭願君慎疾加餐重愛玉體三十年拜為太常榮初遭倉卒與族人桓元卿同飢厄而榮講誦不息元卿嗤榮曰但自苦氣力何時復施用乎榮笑不應及為太常元卿歎曰我農家子豈意學之為利乃若是哉顯宗即位尊以師禮甚見親重拜二子為郎榮年踰八十自以衰老數上書乞身輒加賞賜乘輿常幸太常府令榮坐東面設几杖會百官驃騎將軍東平王蒼已下及榮門生數百人天子親自執業每言輒曰太師在是既罷悉以太官供具賜太常家其恩禮若此永平二年三雍初成拜榮為五更每大射養老禮畢帝輒引榮及弟子升堂執經親自為下説乃封榮為關內侯食邑五千户榮每疾病帝輒遣使者存問太官太醫相望於道及篤上疏謝恩讓還爵土帝幸其家問起居入街下車擁經而前撫榮流涕賜以牀茵帳帷刀劒衣被良久乃去自是諸侯將軍大夫問疾者不敢復乘車到門皆拜牀下榮卒帝親自變服臨喪送葬賜冢塋于首山之陽除兄子二人補四百石都講生八人補二百石其餘門徒多至公卿子郁嗣郁字仲恩少以父任為郎敦厚篤學傳父業以尚書教授門徒常數百人榮卒郁當襲爵上書讓於兄子泛顯宗不許不得已受封悉以租入與之帝以郁先師子有禮讓甚見親寵常居中論經書問以政事稍遷侍中帝自制五家要説章句令郁校定於宣明殿以侍中監虎賁中郎將永平十五年入授皇太子經遷越騎校尉詔敕太子諸王各奉賀致禮郁數進忠言多見納録肅宗即位郁以母憂乞身詔聽以侍中行服建初二年遷屯騎校尉和帝即位富於春秋侍中竇憲自以外戚之重欲令少主頗涉經學上疏皇太后曰禮記云天下之命懸於天子天子之善成乎所習習與智長則切而不勤化與心成則中道若性昔成王幼小越在襁褓周公在前史佚在後太公在左召公在右中立聽朝四聖維之是以慮無遺計舉無過事孝昭皇帝八歲即位大臣輔政亦選名儒韋賢蔡義夏侯勝等入授於前平成聖德近建初元年張酺魏應召馴亦講禁中臣伏惟皇帝陛下躬天然之姿宜漸教學而獨對左右小臣未聞典義昔五更桓榮親為帝師子郁結髮敦尚繼傳父業故再以校尉入授先帝父子給事禁省更歷四世今白首好禮經行篤備又宗正劉方宗室之表善為詩經先帝所褒宜令郁方並入教授以崇本朝光示大化由是遷長樂少府復入侍講頃之轉為侍中奉車都尉永元四年代丁鴻為太常明年病卒郁經授二帝恩寵甚篤賞賜前後數百千萬顯於當世門人楊震朱寵皆至三公初榮受朱普學章句四十萬言浮辭繁長多過其實及榮入授顯宗減為二十三萬言郁復刪省定成十二萬言由是有桓君大小太常章句子普嗣傳爵至曾孫郁中子焉能世傳其家學焉字叔元少以父任為郎明經篤行有名稱永初元年入授安帝三遷為侍中步兵校尉永寧中順帝立為皇太子以焉為太子少傅月餘遷太傅以母憂自乞聽以大夫行喪踰年詔使者賜牛酒奪服即拜光祿大夫遷太常時廢皇太子為濟隂王焉與太僕來歷廷尉張皓諫不能得事已具來歷傳順帝即位拜太傅與太尉朱寵並録尚書事焉復入授經禁中因宴見建言宜引三公尚書入省事帝從之以焉前廷議守正封陽平侯固讓不受視事三年坐辟召禁錮者為吏免復拜光祿大夫陽嘉二年代來歷為大鴻臚數日遷為太常永和五年代王龔為太尉漢安元年以日食免明年卒於家弟子傳業者數百人黃瓊楊賜最為顯貴焉孫典字公雅復傳其家業以尚書教授頴川門徒數百人舉孝亷為郎居無幾會國相王吉以罪被誅故人親戚莫敢至者典獨棄官收斂歸葬服喪三年負土成墳為立祠堂盡禮而去辟司徒袁隗府舉髙第拜侍御史時宦官秉權典執政無所回避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史及黃巾賊起滎陽典奉使督軍賊破還以牾宦官賞不行在御史七年不調後出為即靈帝崩大將軍何進秉政典與同謀議三遷羽林中郎將獻帝即位三公奏典前與何進謀誅宦官功雖不遂忠義炳著詔拜家一人為郎賜錢二十萬從西入關拜御史中丞賜爵關內侯車駕都許遷光祿勳建安六年卒官焉弟子鸞字始春少立操行縕袍糲食不求盈餘以世濁州郡多非其人耻不肯仕年四十餘時太守向苗有名迹乃舉鸞孝亷遷為膠東令始到官而苗卒鸞即去職奔喪終三年然後歸淮汝之間髙其義後為已吾汲二縣令甚有名迹諸公並薦復徵拜議郎上陳五事舉賢才審授用黜佞幸省苑囿息役賦書奏御牾內豎故不省遂以病免中平元年卒年七十七子煜字文林一名嚴尤修志介姑為司空楊賜夫人初鸞卒姑歸寧赴哀將至止於傳舍整飾從者而後入煜心非之及姑勞問終無所言號哭而已賜遣吏奉祠因縣發取祠具煜拒不受後每至京師未嘗舍宿楊氏其貞忮若此賔客從者皆祇其志行一餐不受於人仕為郡功曹後舉孝亷有道方正茂才三公並辟皆不應初平中天下亂避地會稽遂浮海客交址越人化其節至閭里不為訟後為凶人所誣遂死於合浦獄焉兄孫彬字彥林父麟字元鳯早有才慧桓帝初為議郎入侍講禁中以直道牾左右出為許令病免會母終麟不勝喪未祥而卒年四十一所著碑誄讚説書凡二十一篇彬少與蔡雍齊名初舉孝亷拜尚書郎時中常侍曹節女壻馮方亦為郎彬勵志操與左丞劉歆右丞杜希同好交善未嘗與方同酒食之會方深怨之遂章言彬等為酒黨事下尚書令劉猛雅善彬等不舉正其事節大怒劾奏猛以為阿黨請收下詔獄在朝為之寒心猛意氣自若旬日得出免官禁錮彬遂以廢光和元年卒於家年四十六諸儒莫不傷之所著七説及書凡三篇蔡雍等共論序其志僉以彬為有過人者四夙智早成岐嶷也學優文麗至通也仕不茍祿絶髙也辭隆從窊潔操也乃共樹碑而頌焉劉猛琅邪人桓帝時為宗正直道不容自免歸家靈帝即位太傅陳蕃大將軍竇武輔政復徵用之丁鴻字孝公潁川定陵人也父綝字幼春王莾末守潁陽尉世祖略地潁陽潁陽城守不下綝説其宰遂與俱降世祖大喜厚加賞勞以綝為偏將軍因從征伐綝將兵先度河移檄郡國攻營略地下河南陳留潁川二十一縣建武元年拜河南太守及封功臣帝令各言所樂諸將皆占豐邑美縣唯綝願封本鄉或謂綝曰人皆欲縣子獨求鄉何也綝曰昔孫叔敖敕其子受封必求磽埆之地今綝能薄功微得鄉亭厚矣帝從之封定陵新安鄉侯食邑五千户後徙封陵陽侯鴻年十三從桓榮受歐陽尚書三年而明章句善論難為都講遂篤志精鋭布衣荷擔不逺千里初綝從世祖征伐鴻獨與弟盛居憐盛幼小而共寒苦及綝卒鴻當襲封上書讓國於盛不報既葬乃挂縗絰於冢廬而逃去留書與盛曰鴻貪經書不顧恩義弱而隨師生不供養死不飯唅皇天先祖並不祐助身被大病不任茅土前上疾狀願辭爵仲公章寢不報迫且當襲封謹自放棄逐求良醫如遂不瘳永歸溝壑鴻初與九江人鮑駿同事桓榮甚相友善及鴻亡封與駿遇於東海陵狂不識駿駿乃止而讓之曰昔伯夷吳札亂世權行故得申其志耳春秋之義不以家事廢王事今子以兄弟私恩而絶父不滅之基可謂智乎鴻感悟垂涕歎息乃還就國開門教授鮑駿亦上書言鴻經學至行顯宗甚賢之永平十年詔徵鴻至即召見説文侯之命篇賜御衣及綬稟食公車與博士同禮頃之拜侍中十三年兼射聲校尉建初四年徙封魯陽鄉侯肅宗詔鴻與廣平王羡及諸儒樓望成封桓郁賈逵等論定五經同異於北宫白虎觀使五官中郎將魏應主承制問難侍中淳于恭奏上帝親稱制臨決鴻以才髙論難最明諸儒稱之帝數嗟美焉時人歎曰殿中無雙丁孝公數受賞賜擢徙校書遂代成封為少府門下由此益盛逺方至者數千人彭城劉愷北海巴茂九江朱倀皆至公卿元和三年徙封馬亭鄉侯和帝即位遷太常永元四年代袁安為司徒是時竇太后臨朝憲兄弟各擅威權鴻因日食上封事曰臣聞日者陽精守實不虧君之象也月者隂精盈毁有常臣之表也故日食者臣乘君隂陵陽月滿不虧下驕盈也昔周室之季皇甫之屬專權於外黨類強盛侵奪主藝則日月薄食故詩曰十月之交朔日辛卯日有食之亦孔之醜春秋日食三十六殺君三十二變不空生各以類應夫威柄不以放下利器不以假人歷觀往古近察漢興傾危之禍靡不由之是以三桓專魯田氏擅齊六卿分晉諸吕握權統嗣幾移哀平之末廟不血食故雖有周公之親而無其德不得行其藝也今大將軍雖欲敕身自約不敢僭差然而天下逺近皆惶怖承旨刺史二千石初除謁辭求通待報雖奉符璽受臺敕不敢便去久者至數十曰背王室向私門此乃上威損下權盛也人道悖于下效驗見于天雖有隱謀神照其情垂象見戒以告人君間者月滿先節過望不虧此臣驕溢背君專功獨行也陛下未深覺悟故天重見戒誠宜畏懼以防其禍詩云敬天之怒不敢戲豫若敕政責躬杜漸防萌則凶祅消滅害除福湊矣夫壞崖破巖之水源自涓涓干雲蔽日之木起于蔥青禁微則易救末者難人莫不忽于微細以致其大恩不忍誨義不忍割去事之後未然之明鏡也臣愚以為左官外附之臣依托權門傾覆諂佞以求容媚者宜行一切之誅間者大將軍再出威振州郡莫不賦斂吏人遣送貢獻大將軍雖不受而物不還主部署之吏無所畏憚縱行非法不伏罪辜故海內貪猾競為姦吏小民吁嗟怨氣滿腹臣聞天不可以不剛不剛則三光不明王不可以不強不強則宰牧縱橫宜因大變改正匡失以塞天意書奏十餘日帝以鴻行太尉兼衛尉屯南北宫於是收竇憲大將軍印綬憲及諸弟皆自殺時大郡口五十六萬舉孝亷二人小郡口二十萬并有蠻夷者亦舉二人帝以為不均下公卿會議鴻與司空劉方上言凡口率之科宜有階品蠻夷錯雜不得為數自今郡國率二十萬口歲舉孝亷一人四十萬二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二歲一人不滿十萬三歲一人帝從之六年鴻薨賜贈有加常禮子湛嗣湛卒子浮嗣浮卒子夏嗣通志卷一百八
