body:
  text: 通志卷九十七宋右迪功郎鄭樵漁仲撰列傳第十前漢蒯通伍被江充息夫躬石奮衛綰直不疑周仁張驅賈誼爰盎鼂錯張釋之馮唐魏尚汲黯鄭當時賈山鄒陽枚乘子臯路溫舒蒯通范陽人也本與武帝同諱楚漢初起武臣略定趙地號武信君通説范陽令徐公曰臣范陽百姓蒯通也竊閔公之將死故弔之雖然賀公得通而生也徐生再拜曰何以弔之通曰足下為令十餘年矣殺人之父孤人之子斷人之足黥人之首甚衆慈父孝子所以不敢倳側吏反刃於公之腹者畏秦法也今天下大亂秦政不施然則慈父孝子將爭接刃於公之腹以復其怨而成其名此通之所以弔者也曰何以賀得子而生也曰趙武信君不知通不肖使人候問其死生通且見而説之曰必將戰勝而後略地攻得而後下城臣竊以為殆矣用臣之計毋戰而略地不攻而下城傳檄而千里定可乎彼將曰何謂也臣因對曰范陽令宜整頓其士卒以守戰者也怯而畏死貪而好富貴故欲以其城先下君先下君而君不利之則邊地之城皆將相告曰范陽令先降而身死必將嬰城固守皆為金城湯池不可攻也為君計者莫若具黃屋朱輪迎范陽令使馳騖於燕趙之郊則邊城皆將相告曰范陽令先下而身富貴必相率而降猶如阪上走丸也此臣所謂傳檄而千里定者也徐公再拜具車馬遣通通遂以此説武臣武臣以車百乘騎二百侯印迎徐公燕趙聞之降者三十餘城如通策焉後漢將韓信虜魏王破趙代降燕定三國引兵將東擊齊未度平原聞漢王使酈食其説下齊信欲止通説信曰將軍受詔擊齊而漢獨發間使下齊寧有詔止將軍乎何以得無行且酈生一士伏軾掉三寸舌下齊七十餘城將軍將數萬之衆乃下趙五十餘城為將數嵗反不如一豎儒之功乎於是信然之從其計遂度河齊已聽酈生即留之縱酒罷備漢守禦信因襲歷下軍遂至臨淄齊王以酈生為欺己而亨之因敗走信遂定齊地自立為齊假王漢方困於滎陽遣張良即立信為齊王以安固之項王亦遣武涉説信欲與連和蒯通知天下權在信欲説信令背漢乃先微感信曰僕嘗受相人之術相君之面不過封侯又危而不安相君之背貴而不可言信曰何謂也通因請間曰天下初作難也俊雄豪桀建號一呼天下之士雲合霧集魚鱗雜襲飄至風起當此之時憂在亡秦而已今劉項分爭使人肝膽塗地流離中野不可勝數漢王將數十萬衆距鞏雒阻山河一日數戰亡尺寸之功敗滎陽傷成臯還走宛葉之間此所謂智勇俱困者也楚人起彭城轉鬭逐北至滎陽乘利席勝威震天下然兵困於京索之間迫西山而不能進三年於此矣鋭氣挫於嶮塞糧食盡於內藏百姓罷極無所歸命以臣料之非天下賢聖其勢固不能息天下之禍當今之時兩主縣命足下足下為漢則漢勝與楚則楚勝臣願披心腹墮肝膽效愚忠恐足下不能用也方今為足下計莫若兩利而俱存之三分天下鼎足而立其勢莫敢先動夫以足下之賢聖有甲兵之衆據強齊從燕趙出空虛之地以制其後因民之欲西鄉為百姓請命天下孰敢不聽足下按齊國之故有淮泗之地懷諸侯以德深拱揖讓則天下君王相率而朝齊矣蓋聞天與弗取反受其咎時至弗行反受其殃願足下熟圗之信曰漢遇我厚吾豈可見利而背恩乎通曰始常山王成安君故相與為刎頸交及爭張黶陳釋之事常山王奉頭鼠竄以歸漢王借兵東下戰於鄗北成安君死於泜水之南頭足異處此二人相與天下之至歡也而卒相滅亡者何也患生於多欲而人心難測也今足下行忠信以交於漢王必不能固於二君之相與也而事多大於張黶陳釋之事者故臣以為足下必漢王之不危足下過矣大夫種存亡越伯勾踐立功名而身死語曰野禽殫走犬亨敵國破謀臣亡故以交友言之則不過張王與成安君以忠臣言之則不過大夫種此二者宜足以觀矣願足下深慮之且臣聞之勇略震主者身危功蓋天下者不賞足下涉西河虜魏王禽夏説下井陘誅成安君之罪以令於趙脅燕定齊南摧楚人之兵數十萬衆遂斬龍且西鄉以報此所謂功無二於天下略不世出者也今足下挾不賞之功戴震主之威歸楚楚人不信歸漢漢人震恐足下欲持是安歸乎夫勢在人臣之位而有髙天下之名竊為足下危之信曰生且休矣吾將念之數日通復説信曰聽者事之候也計者存亡之機也夫隨厮養之役者失萬乘之權守儋石之祿者闕卿相之位計誠知之而決弗敢行者百事之禍也故猛虎之猶與不如蜂蠆之致蠚孟賁之狐疑不如童子之必至此言貴能行之也夫功者難成而易敗時者難值而易失時乎時不再來願足下亡疑臣之計信猶與不忍背漢又自以功多漢不奪我齊遂謝通通説不聽惶恐乃陽狂為巫天下既定後信以罪廢為淮隂侯謀反被誅臨死歎曰悔不用蒯通之言死於女子之手髙帝曰是齊辨士蒯通乃詔齊召蒯通通至上欲亨之曰若教韓信反何也通曰狗各吠非其主當彼時臣獨知齊王韓信非知陛下也且秦失其鹿天下共逐之髙材疾足者先得天下胸胸爭欲為陛下所為顧力不能可殫誅邪上乃赦之至齊悼惠王時曹參為相禮下賢人請通為客初齊王田榮怨項羽謀舉兵畔之劫齊士不與者死齊處士東郭先生梁石君在劫中強從及田榮敗二人醜之相與入深山隱居客謂通曰先生之於曹相國拾遺舉過顯賢進能齊國莫若先生者先生知梁石君東郭先生世俗所不及何不進之相國乎通曰諾臣之里婦與里之諸母相善也里婦夜亡肉姑以為盜怒而逐之婦晨去過所善諸母語以事而謝之里母曰女安行我今令而家追女矣即束緼請火於亡肉家曰昨暮夜犬得肉爭鬭相殺請火治之亡肉家遽追呼其婦故里母非談説之士也束緼乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國乃見相國曰婦人有夫死三日而嫁者有幽居守寡而不出門者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士也隱居不嫁未嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命皆以為上賔通論戰國時説士權變亦自序其説凡八十一首號曰雋永雋音字兖反雋肥肉也永長也言其論甘美而義深長也初通善齊人安其生安其生嘗干項羽羽不能用其策而項羽欲封此兩人兩人卒不肯受伍被楚人也或言其先伍子胥後也被以才能稱為淮南中郎是時淮南王安好術學折節下士招致英俊以百數被為冠首久之淮南王隂有邪謀被數微諫後王坐東宫召被欲與計事呼之曰將軍上被悵然曰王安得亡國之言乎臣聞子胥諫吳王吳王不用乃曰臣今見麋鹿遊姑蘇之臺也今臣亦將見宫中生荆棘露霑衣也於是王怒繫被父母囚之三月王復召被曰將軍許寡人乎被曰小臣將為大王畫計矣臣聞聰者聽於無聲明者見於未形故聖人萬舉而萬全文王一動而功顯萬世功列三王所謂因天心以動作者也王曰方今漢廷治乎亂乎被曰天下治王不説曰公何以言治也被對曰被竊觀朝廷君臣父子夫婦長幼之序也皆得其理上之舉錯遵古之道風俗紀綱未有所缺重裝富賈周流天下道無不通交易之道行南越賔服羌僰貢獻東甌入朝廣長榆開朔方胸奴折傷雖未及古太平時然亦為治王怒被謝死罪王又曰山東即有變漢必使大將軍將而制山東公以為大將軍何如人也被曰臣所善黃義從大將軍擊胸奴言大將軍遇士大夫以禮與士卒有恩衆樂為用騎上下山如飛材力絶人如此數將習兵未易當也及謁者曹梁使長安來言大將軍號令眀當敵勇敢常為士卒先須士卒休乃舍穿井得水乃敢飲軍罷士卒已踰河乃度皇太后所賜金錢盡以賞賜雖古名將不過也王曰夫蓼太子知略不世出非常人也以為漢廷公卿列侯皆如沭猴而冠耳被曰獨先刺大將軍乃可舉事王復問被曰公以為吳舉兵非邪被曰非也夫吳王賜號為劉氏祭酒受几杖而不朝王四郡之衆地方數千里采山銅以為錢煮海水以為鹽伐江陵之木以為船國富民衆行珍寶賂諸侯與七國合從舉兵而西破大梁敗狐父奔走而還為越所禽死於丹徒頭足異處身滅祀絶為天下戮夫以吳衆不能成功者何也誠逆天違衆而不見時也王曰男子之所死者一言耳且吳何知反漢將一日過成臯者四十餘人今我令緩先要成臯之口周被下潁川兵塞轘轅伊闕之道陳定發南陽兵守武關河南太守獨有雒陽耳何足憂然此北尚有臨晉關河東上黨與河內趙國界者通谷數行人言絶成臯之道天下不通據三川之險招山東之兵公以為何如被曰臣見其禍未見其福也後漢逮淮南王孫建繫治之王恐隂事泄謂被曰事至吾欲遂發天下勞苦有間矣諸侯頗有失行皆自疑我舉兵西鄉必有應者無應即還略衡山勢不得不發被曰略衡山以擊廬江有尋陽之船守下雉之城結九江之浦絶豫章之口強弩臨江而守以禁南郡之下東保會稽南通徑越屈強江淮間可以延嵗月之壽耳未見其福也王曰左吳趙賢朱驕如皆以為什八九成公獨以為無福何被曰大王之羣臣近幸素能使衆者皆前繫詔獄餘皆無可用者王曰陳勝吳廣無立錐之地百人之衆起於大澤奮臂大呼天下嚮應西至於戲而兵百二十萬今吾國雖小勝兵可得二十萬公何以言有禍無福被曰臣不敢避子胥之誅願大王無為吳王之聽往者秦為無道殘賊天下殺術士燔詩書滅聖迹棄禮義任刑法轉海濵之粟致於西河當是時男子疾耕不足於糧餽女子紡績不足於蓋形遣蒙恬築長城東西數千里暴兵露師常數十萬死者不可勝數僵尸滿野流血千里於是百姓力屈欲為亂者十室而五又使徐福入海求仙藥多齎珍寶童男女三千人五種百工而行徐福得平原大澤止王不來於是百姓怨痛欲為亂者十室而六又使尉他踰五嶺攻百越尉他知中國勞極止王南越行者不還往者莫返於是百姓離心瓦解欲為亂者十室而七興萬乘之駕作阿房之宫收大半之賦發閭左之戍父不寧子兄不安弟政苛刑慘民皆引領而望傾耳而聽悲號仰天叩心怨上欲為亂者十室而八客謂髙皇帝曰時可矣髙帝曰待之聖人當起東南間不一嵗陳吳大呼劉項並和天下嚮應所謂蹈瑕釁因秦之亡時而動百姓願之若枯旱之望雨故起於行陳之中以成帝王之功今大王見髙祖得天下之易也獨不觀近世之吳楚乎當今陛下臨制天下一齊海內泛愛蒸庶布德施惠口雖未言聲疾雷霆令雖未出化馳若神心有所懷威動千里下之應上猶景嚮也而大將軍材能非直章邯楊熊也王以陳勝吳廣諭之被以為過矣且大王之兵衆不能什分吳楚之一天下安寧又萬倍於秦時願王用臣之計臣聞箕子過故國而悲作麥秀之歌痛紂之不用王子比干之言也故孟子曰紂貴為天子死曾不如匹夫是紂先自絶久矣非死之日天去之也今臣亦竊悲大王棄千乘之君將賜絶命之書為羣臣先身死於東宫也被因流涕而起後王復召問被茍如公言不可以徼幸邪被曰必不得已被有愚計王曰奈何被曰當今諸侯無異心百姓無怨氣朔方之郡土地廣美民徙者不足以實其地可為丞相御史請書徙郡國豪桀及耐罪己上以赦令除家産五十萬以上者皆徙其家屬朔方之郡益發甲兵急其會日又偽為左右都司空上林中都官詔獄書逮諸侯太子及幸臣如此則民怨諸侯懼即使辨士隨而説之黨可以徼幸王曰此可也雖然吾亦不至若此専發而已後事發覺被詣吏自告與淮南王謀反蹤迹如此天子以伍被雅辭多引漢美欲勿誅張湯進曰被首為王畫反計罪無赦遂誅被江充字次倩趙國邯鄲人也充本名齊有女弟善鼓琴歌舞嫁之趙太子丹齊得幸於敬肅王為上客久之太子疑齊以己隂私告王與齊忤使吏捕齊不得收繫其父兄按驗皆棄市齊遂絶迹亡西入關更名充詣闕告太子丹與同産姊及至後宫姦亂交通郡國豪猾攻剽為姦吏不能禁書奏天子怒遣使者詔郡發吏卒圍趙王宫收捕太子丹移繫魏郡詔獄與廷尉雜治法至死趙王彭祖帝異母兄也上書訟太子罪言充逋逃小臣茍為姦訛激怒聖朝欲取必於萬乘以復私怨後雖亨醢計猶不悔臣願選從趙國勇敢士從軍擊胸奴極盡死力以贖丹罪上不許竟敗趙太子初充召見犬臺宫自請願以所常被服冠見上許之充衣紗縠襌音丹衣曲裾後垂交輸冠襌纚音史步搖冠飛翮之纓鳥羽作纓充為人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多竒士既至前問以當世政事上説之充因自請願使胸奴詔問其狀充對曰因變制宜以敵為師事不可豫圗上以充為謁者使胸奴還拜為直指繡衣使者督三輔盜賊禁察踰侈貴戚近臣多奢僭充皆舉劾奏請沒入車馬令身待北軍擊胸奴奏可充即移書光祿勳中黃門逮召近臣侍中諸當詣北軍者移劾門衛禁止無令得入宫殿於是貴戚子弟惶恐皆見上叩頭求哀願得入錢贖罪上許之令各以秩次輸錢北軍凡數千萬上以充忠直奉法不阿所言中意充出逄館陶長公主行馳道中充呵問之公主曰有太后詔充曰獨公主得行車騎皆不得盡劾沒入官後充從上甘泉逄太子家使乘車馬行騎道中充以屬吏太子聞之使人謝充曰非愛車馬誠不欲令上聞之以教敕亡素者唯江君寬之充不聽遂白奏上曰人臣當如是矣大見信用威震京師遷為水衡都尉宗族知友多得其力者久之坐法免會陽陵朱安世告丞相公孫賀子大僕敬聲為巫蠱事連及陽石諸邑公主賀父子皆坐誅語在賀傳後上幸甘泉疾病充見上年老恐晏駕後為太子所誅因是為姦奏言上疾祟在巫蠱於是以充為使者治巫蠱充將胡巫掘地求偶人胡言不與華同言故充任使之捕蠱及夜祠視鬼染汚令有處詐以酒酹地也輒收捕驗治燒鐵鉗灼強服之民轉相誣以巫蠱吏輒劾以大逆無道坐而死者前後數萬人是時上春秋髙疑左右皆為巫蠱祝詛有與亡莫敢訟其寃者充既知上意因言宫中有蠱氣先治後宫希幸夫人以次及皇后遂掘蠱於太子宫得桐木人充使胡巫作而薶之太子懼不能自眀收充自臨斬之罵曰趙虜前亂乃國王父子不足邪乃復亂吾父子也太子由是遂敗語在戾園傳後武帝知充有詐夷充三族息夫躬字子微河內河陽人也少為博士弟子受春秋通覽記書容貌壯麗為衆所異哀帝初即位皇后父特進孔鄉侯傅晏與躬同郡相友善躬由是以為援交逰日廣先是長安孫寵亦以遊説顯名免汝南太守與躬相結俱上書召待詔是時哀帝被疾始即位而人有告中山孝王太后祝詛上太后及弟馮參皆自殺其罪不眀是後無鹽危山有石自立開道躬與寵謀曰上無繼嗣體久不平關東諸侯心爭隂謀今無鹽有大石自立聞邪臣託往事以為太山石立而先帝龍興東平王雲以故與其后日夜祠祭祝詛上欲求非望而后舅伍宏反因方術以醫技得幸出入禁門霍顯之謀將行於杯杓荆軻之變必起於帷幄事勢若此告之必成察國姦誅主讎取封侯之計也躬寵乃與中郎右師談共因中常侍宋𢎞上變事告焉上惡之下有司案驗東平王雲雲后謁及伍宏等皆坐誅上擢寵為南陽太守談潁川都尉𢎞躬皆光祿大夫左曹給事中是時侍中董賢愛幸上欲侯之遂下詔云躬寵因賢以聞封賢為髙安侯寵為方陽侯躬為宜陵侯邑各千戶賜談爵關內侯食邑丞相王嘉內疑東平獄事爭不欲侯賢等語在嘉傳嘉固言董賢泰盛寵躬皆傾覆有佞邪材恐必撓亂國家不可任用嘉以此得罪矣躬既親近數進言事論議無所避衆畏其口見之仄目躬上疏歷詆公卿大臣曰方今丞相王嘉健而蓄縮不可用御史大夫賈延墯弱不任職左將軍公孫祿司𨽻鮑宣皆外有直項之名內實騃不曉政事諸曹已下僕遫不足數卒有強弩圍城長戟指闕陛下誰與備之如使狂夫嘄呼於東崖胸奴飲馬於渭水邊竟雷動四野風起京師雖有武蜂精兵未有能窺與跬同左足而先應者也軍書交馳而輻湊羽檄重迹而狎至小夫愞臣之徒憒眊不知所為其有犬馬之決者仰藥而伏刃雖加夷滅之誅何益禍敗之至哉躬又言秦開鄭國渠以富國強兵今京師土地肥饒可度地勢水泉廣溉灌之利天子使躬持莭領護三輔都水躬立表欲穿長安城引漕注大倉下以省轉輸議不可成乃止董賢貴幸日盛丁傅害其寵孔鄉侯晏與躬謀欲求居位輔政會單于當來朝遣使言病願朝眀年躬因是而上奏以為單于當以十一月入塞後以病為解疑有他變烏孫兩昆彌弱卑爰疐強盛居強煌之地擁十萬之衆東結單于遣子往侍如因素強之威循烏孫就屠之迹舉兵南伐并烏孫之勢也烏孫并則胸奴盛而西域危矣可令降胡詐為卑爰疐使者來上書曰所以遣子侍單于者非親信之也實畏之耳唯天子哀告單于歸臣侍子願助戊巳校尉保惡都奴之界因下其章諸將軍令胸奴客聞焉則是所謂上兵伐謀其次伐交者也書奏上引見躬召公卿將軍大議左將軍公孫祿以為中國常以忠信懷伏夷狄躬欲逆詐造不信之謀不可許且胸奴賴先帝之德保塞稱藩今單于以疾病不任奉朝賀遣使自陳不失臣子之禮臣祿自保殁身不見胸奴為邊竟憂也躬掎祿曰臣為國家計幾先謀將然豫圗未形為萬世慮而祿欲以其犬馬齒保自所見臣與祿異議未可同日語也上曰善乃罷羣臣獨與躬議躬因建言往年熒惑守心太白髙而芒光又角星茀茀與孛同於河鼓其法為有兵亂是後訛言行詔籌經厯郡國天下騷動恐有非常之變可遣大將軍行邊兵敕武備斬一郡守以立威震四夷因以厭應變異上然之以問丞相嘉嘉對曰臣聞動民以行不以言應天以實不以文下民微細猶不可詐况於上天神眀而可欺哉天之見異所以敕戒人君欲令覺悟反正推誠行善民心説而天意得矣辨士見一端或妄以意傅著星厯虛造胸奴烏孫西羌之難謀動干戈設為權變非應天之道也守相有罪車馳詣闕交臂就死恐懼如此而談説者云云動安之危之往也搖動安全往就危亡辨口快耳其實未可從夫議政者苦其讇諛傾險辨慧深刻也讇諛則主德毁傾險則下怨恨辨慧則破正道深刻則傷恩惠昔秦繆公不從百里奚蹇叔之言以敗其師悔過自責疾詿誤之臣思黃髮之言名垂於後世唯陛下觀覽古戒反覆參考無以先入之語為主上不聽詔將軍與中二千石舉眀習兵法有大慮者各一人將軍二人將軍二人謂將軍舉二人中二千石一人耳詣公車就拜孔鄉侯傅晏為大司馬衛將軍陽安侯丁眀為大司馬驃騎將軍是日日有食之董賢用此沮躬晏之䇿後數日收晏衛將軍印綬而丞相御史奏躬罪過上由是惡躬等下詔免躬寵官遣就國躬歸國未有第宅寄居邱亭邱空也姦人以為侯家富常夜守之躬邑人河內掾賈惠往過躬教以祝盜方以桑東南指枝為七畫北斗七星於其上躬夜自被髮立中庭向北斗持七招指招指謂或招或指所以求福排禍也祝盜人有上書言躬懷怨恨非笑朝廷所進候星宿視天子吉凶與巫同祝詛上遣侍御史廷尉監逮躬繫洛陽詔獄欲掠問躬仰天大呼因僵仆吏就問云咽已絶血從鼻耳出食頃死黨友謀議相連下獄百餘人躬母聖坐祠竈祝詛上大逆不道棄市妻充漢與家屬徙合浦躬同族親屬素所厚者皆免廢錮哀帝崩有司奏方陽侯寵及右師談等皆造作姦謀罪及主者骨肉雖蒙赦令不宜處爵位在中土皆免寵等徙合浦郡初躬待詔數危言髙論自恐遭害著絶命辭其文悽愴數年乃死如其其文焉萬石君石奮其父趙人也趙亡徙溫髙祖東擊項籍過河內時奮年十五為小吏侍髙祖髙祖與語愛其恭敬問曰若何有對曰有母不幸失明家貧有姊能鼓琴髙祖曰若能從我乎曰願盡力於是髙祖召其姊為美人以奮為中涓受書謁徙其家長安中戚里以姊為美人故也上之姻戚居之故名其里曰戚里奮積功勞孝文時官至太中大夫無文學恭謹舉無與比東陽侯張相如為太子太傅免選可為傅者皆推奮為太子太傅及孝景即位以奮為九卿迫近憚之徙奮為諸侯相奮長子建次甲次乙次慶皆以馴行孝謹官至二千石於是景帝曰石君及四子皆二千石人臣尊寵乃舉集其門凡號奮為萬石君孝景季年萬石君以上大夫祿歸老于家以嵗時為朝臣過宫門闕必下車趨見路馬必軾焉子孫為小吏來歸謁萬石君必朝服見之不名子孫有過失不誚讓為便坐對桉不食然後諸子相責因長老肉袒固謝罪改之乃許子孫勝冠者在側雖燕必冠申申如也僮僕欣欣如也唯謹上時賜食於家必稽首俯伏而食如在上前其執喪哀戚甚子孫遵教亦如之萬石君家以孝謹聞於郡國雖齊魯諸儒質行皆自以為不及也建元二年郎中令王臧以文學獲罪皇太后太后以為儒者文多質少今萬石君家不言而躬行乃以長子建為郎中令少子慶為內史建老白首萬石君尚無恙每五日洗沐歸謁親入子舍竊問侍者取親中裙厠牏牏音投厠中受糞者身自浣灑復與侍者不敢令萬石君知之以為常建奏事於上前即有可言屏人乃言極切至廷見如不能言者上以是親而禮之萬石君徙居陵里內史慶醉歸入外門不下車萬石君聞之怒不食慶恐肉袒請罪不許宗族及兄建肉袒萬石君讓曰內史貴人入閭里里中長老皆走匿而內史坐車中自如固當乃謝罷慶慶及諸子入里門趨至家萬石君元朔五年卒建哭泣哀思杖乃能行嵗餘建亦死諸子孫咸孝然建最甚甚於萬石君建為郎中令奏事下建讀之驚恐曰書馬者與尾而五今乃四不足一獲譴死矣其為謹慎雖他皆如是慶為太僕御出上問車中幾馬慶以䇿數畢舉手曰六馬慶於兄弟最為簡易然猶如此出為齊相舉齊國慕其家行不治而齊國大治為立石相祠元狩元年上立太子選羣臣可傅者慶自沛守選為太子太傅七嵗遷御史大夫元鼎五年代趙周為丞相封牧邱侯是時漢方南誅兩越東擊朝鮮北逐胸奴西伐大宛中國多事天子巡狩海內修上古神祠封禪興禮樂公家用少桑𢎞羊等致利王溫舒之屬峻法兒寬等推文學九卿更進用事事不關決於丞相慶醇謹而已在位九嵗無能有所匡言嘗欲請治上近臣所忠九卿咸音減姓也宣不能服反受其過贖罪元封中關東流民二百萬口無名數者四十萬公卿議欲請徙流民於邊以適之上以為慶老謹不能與其議乃賜丞相告歸而按御史大夫以下議為請者慶慚不任職乃上書歸相印乞骸骨天子以書責之或勸慶宜引決慶懼甚不知所出遂復起視事慶為丞相文深審謹無他大略後三嵗餘薨諡曰恬侯慶中子德慶愛之上以德為嗣代侯後為太常坐法免國除慶方為丞相時諸子孫為小吏至二千石者十三人及慶死後稍以罪去孝謹益衰矣衛綰代大陵人也以戲車為郎事文帝功次遷中郎將醇謹無他孝景為太子時召上左右飲而綰稱病不行恐文帝謂豫有二心事太子也文帝且崩時屬孝景曰綰長者善遇之及孝景立嵗餘不孰何綰綰日以謹力景帝幸上林詔中郎將參乘還而問曰君知所以得參乘乎綰曰臣代戲車士幸得功次遷待罪中郎將不知也上問曰吾為太子時召君不肯來何也對曰死罪實病上賜之劒綰曰先帝賜臣劔凡六不敢奉詔上曰劒人所施易獨至今乎施讀曰貤易換之也綰曰具在上使取六劒劍尚盛未嘗服也即官有譴常蒙其罪不與他將爭有功常讓他將上以為亷忠實無他腸乃拜綰為河間王太傅吳楚反詔綰為將將河間兵擊吳楚有功拜為中尉三嵗以軍功封為建陵侯明年上廢太子誅栗卿之屬上以綰長者不忍乃賜綰告歸而使郅都治捕栗氏既已上立膠東王為太子召綰拜為太子太傅久之遷為御史大夫五嵗代桃侯劉舍為丞相綰朝奏事如職所奏然自初官以至丞相終無可言景帝以為敦厚可相少主尊寵之賞賜甚多為丞相三嵗景帝崩武帝立建元中天子以景帝病時諸官囚多坐不辜者而君不任職免之後薨諡曰哀侯子信嗣坐酎金國除直不疑南陽人也文帝時為郎其同舍有告歸誤將持其同舍郎金去已而同舍郎覺亡意不疑不疑謝有之買金償後告歸者至而歸金亡金郎大慙以此稱為長者稍遷至中大夫朝廷見人或毁不疑曰不疑狀貌甚美然特毋奈其善盜嫂何也不疑聞曰我乃無兄然終不自明也吳楚反時不疑以二千石將擊之景帝後元年拜為御史大夫天子修吳楚時功封不疑為塞侯武帝即位與丞相綰俱以過免不疑學老子言其所臨為官如故惟恐人之知其為吏迹也不好立名稱為長者薨諡信侯傳子至孫彭祖坐酎金國除周文名仁其先任城人也以醫見景帝為太子時為舍人積功遷至太中大夫景帝初立拜仁為郎中令仁為人隂重不泄常衣弊補衣溺袴故不為潔清以是得幸入卧內於後宫祕戲仁常在傍終無所言上時問人仁曰上自察之然亦無所毁如此景帝再自幸其家家徙陽陵上所賜甚多然終常讓不敢受也諸侯羣臣賂遺終無所受武帝立為先帝臣重之仁乃病免以二千石祿歸老子孫咸至大官張叔名驅音驅髙祖功臣安邱侯説少子也驅文帝時以治刑名侍太子然其人長者景帝時尊重常為九卿至武帝元朔中代韓安國為御史大夫歐為吏未嘗言案人剸與專同以誠長者處官官屬以為長者亦不敢大欺上具獄事有可郤郤之不可者不得已為涕泣面而封之其愛人如此老篤請免天子寵以上大夫祿歸老於家家陽陵子孫咸至大官賈誼雒陽人也年十八以能誦詩書屬文稱於郡中河南守吳公聞其秀才召置門下甚幸愛孝文帝初立聞河南守吳公治平為天下第一故與李斯同邑而嘗學事焉徴以為廷尉廷尉乃言誼年少頗通諸家之書文帝召以為博士是時誼年二十餘最為少每詔令議下諸老先生未能言誼盡為之對人人各如其意所出諸生於是以為能文帝説之超遷嵗中至太中大夫誼以為漢興二十餘年天下和洽宜當改正朔易服色制度定官名興禮樂乃草具其儀法色尚黃數用五為官名悉更奏之文帝謙讓未遑也然諸法令所更定及列侯就國其説皆誼發之於是天子議以誼任公卿之位絳灌東陽侯馮敬之屬盡害之乃毁誼曰雒陽之人年少初學專欲擅權紛亂諸事於是天子後亦踈之不用其議以誼為長沙王太傅誼既以適去意不自得及渡湘水為賦以弔屈原屈原楚賢臣也被讒放逐作離騷賦其終篇曰已矣國亡人莫我知也遂投江而死誼追傷之因以自諭其辭曰恭承嘉惠兮俟罪長沙仄聞屈原兮自湛汨羅造託湘流兮敬弔先生遭世罔極兮乃隕厥身烏呼哀哉兮逄時不祥鸞鳳伏竄兮鴟梟翺翔闒茸尊顯兮讒諛得志賢聖逆曵兮方正倒植謂隨夷溷兮謂跖蹻廉莫邪為鈍兮鉛刀為銛于嗟默默生之亡故兮斡棄周鼎寶康瓠兮騰駕罷牛驂蹇驢兮驥垂兩耳服鹽車兮章父薦屨漸不可久兮嗟若先生獨離此咎兮誶曰已矣國其莫吾知兮豫獨一鬱其誰語鳳縹縹其髙逝兮夫固自引而逺去襲九淵之神龍兮沕淵潛以自珍偭蟂獺以隱處兮夫豈從蝦與蛭蚓所貴聖之神德兮逺濁世而自臧使麒麟可係而羈兮豈云異乎犬羊般紛紛其離此郵兮亦夫子之故也歷九州而相其君兮何必懷此都也鳳凰翔于千仞兮覽德輝而下之見細德之險微兮遙增擊而去之彼尋常之汚瀆兮豈容吞舟之巨魚橫江湖之鱣鯨兮固將制於螻蟻誼既為長沙傅三年有服飛入誼舍止於坐隅服似梟不祥鳥也誼既以適居長沙長沙卑濕誼自傷悼以為夀不得長乃為賦以自廣其辭曰單閼之嵗四月孟夏庚子日斜服集余舍止于坐隅狀甚間暇異物來崒私怪其故發書占之讖言其度曰野鳥入室主人將去問於子服余去何之吉乎告我凶言其災淹速之度語余其期服乃太息舉首奮翼口不能言請對以意意合音當作臆萬物變化固亡休息斡流而遷或推而還形氣轉續變化而嬗沕穆亡間胡可勝言禍兮福所倚福兮禍所伏憂喜聚門吉凶同域彼吳強大夫差以敗粵棲會稽句踐霸世斯遊遂成卒被五刑傅説胥靡乃相武丁夫禍之與福何異紏纒命不可説孰知其極水激則旱矢激則逺萬物回薄震蕩相轉雲蒸雨降紏錯相紛大鈞播物坱北無垠天不可與慮道不可與謀遲速有命烏識其時且夫天地為爐造化為工隂陽為炭萬物為銅合散消息安有常則千變萬化未始有極忽然為人何足控揣音團化為異物又何足患小智自私賤彼貴我逹人大觀物亡不可貪夫徇財烈士徇名夸者死權品庶每生怵迫之徒或趨西東大人不曲意變齊同愚士繫俗僒若囚拘至人遺物獨與道俱衆人惑惑好惡積意真人恬漠獨與道息釋智遺形超然自喪寥廓忽荒與道翺翔乘流則逝得坎則止縱軀委命不私於己其生兮若浮其死兮若休淡乎若深淵之靚汜乎若不繫之舟不以生故自保養空而浮德人無纍知命不憂細故蒂芥何足以疑後嵗餘文帝思誼徵之至入見上方受釐坐宣室上因感鬼神事而問鬼神之本誼具道所以然之故至夜半文帝前席既罷曰吾久不見賈生自以為過之今不及也乃拜誼為梁懷王太傅懷王上少子愛而好書故令誼傅之數問以得失是時胸奴強侵邊天下初定制度踈濶諸侯王僭擬地過古制淮南濟北王皆為逆誅誼數上書陳政事多所欲匡建其大略曰臣竊惟今之事藝可為痛哭者一可為流涕者二可為長太息者六若其他背理而傷道者難遍以疏舉進言者皆曰天下已安已治矣臣獨以為未也曰安且治者非愚則諛皆非事實知治亂之體者也夫抱火厝之積薪之下而寢其上火未及燃因謂之安方今之藝何以異此本末舛逆首尾衡決國制搶攘非甚有紀胡可謂治陛下何不一令臣等孰數之於前因陳治安之䇿試詳擇焉夫射獵之娛與安危之機孰急使為治勞智慮苦身體乏鐘鼓之樂勿為可也樂與今同而加之諸侯軌道兵革不動民保首領胸奴賔服四荒鄉風百姓素朴獄訟衰息大數既得則天下順治海內之氣清和咸理生為明帝沒為明神名譽之美垂於無窮禮祖有功而宗有德使顧成之廟稱為太宗上配太祖與漢無極建久安之藝成長治之業以承祖廟以奉六親至孝也以幸天下以育羣生至仁也立經陳紀輕重同得後可以為萬世法程雖有愚幼不肖之嗣猶得蒙業而安至明也以陛下之明逹因使少知治體者得佐下風致此非難也其具可素陳於前願幸無忽臣謹稽之天地驗之往古按之當今之務日夜念此至孰也雖使禹舜復生為陛下計亡以易此夫樹國固必相疑之藝下數被其殃上數爽其憂甚非所以安上而全下也今或親弟謀為東帝親兄之子西鄉而擊今吳又見告矣天子春秋鼎盛行義未過德澤有加焉猶尚如是况莫大諸侯權力且十此者乎然而天下少安何也大國之王幼弱未壯漢之所置傅相方握其事數年之後諸侯之王大抵皆冠血氣方剛漢之傅相稱病而賜罷彼自丞尉以上偏置私人如此有異淮南濟北之為邪此時而欲為治安雖堯舜不能治黃帝曰日中必熭音衛操刀必割今令此道順而全安甚易不肯早為己乃墮骨肉之屬而抗頸工鼎反之豈有異秦之季世乎夫以天子之位乘今之時因天之助尚憚以危為安以亂為治假使陛下居齊桓之處將不合諸侯而匡天下乎臣又知陛下有所必不能矣假設天下如曩時淮隂侯尚王楚黥布王淮南彭越王梁韓信王韓張敖王趙貫髙為相盧綰王燕陳豨在代令此六七公者皆亡恙當是時而陛下即天子位能自安乎臣有以知陛下之不能也天下殽亂髙皇帝與諸公併起非有仄室之藝以豫席之也諸公幸者乃為中涓其次僅得舍人材之不逮至逺也髙皇帝以明聖威武即天子位割膏腴之地以王諸公多者百餘城少者乃三四十縣德至渥也然其後十年之間反者九起陛下之與諸公非親角材而臣之也又非身封王之也自髙皇帝不能以是一嵗為安故臣知陛下之不能也然尚有可諉者曰疏臣請試言其親者假令悼惠王王齊元王王楚中子王趙幽王王淮陽共王王梁靈王王燕厲王王淮南六七貴人皆亡恙當是時陛下即位能為治乎臣又知陛下之不能也若此諸王雖名為臣實有布衣昆弟之心慮亡不帝制而天子自為者擅爵人赦死罪甚者或戴黃屋漢法令非行也雖行不軌如厲王者令之不肯聽召之安可致乎幸而來至法安可得加動一親戚天下圜視而起陛下之臣雖有悍如馮敬者適啓其口七首已陷其胸矣陛下雖賢誰與領此故疏者必危親者必亂已然之效也其異姓負強而動者漢已幸勝之矣又不易其所以然同姓襲是迹而動既有徵矣其藝盡又復然殃禍之變未知所移明帝處之尚不能以安後世將如之何屠牛坦一朝解十二牛而芒刃不頓者所排擊剝割皆衆理解也至於髖音寬髀音陛之所非斤則斧夫仁義恩厚人生之芒刃也權藝法制人主之斤斧也今諸侯王皆衆髖髀也釋斧斤之用而欲嬰以芒刃臣以為不缺則折胡不用之淮南濟北藝不可也臣竊迹前事大抵強者先反淮隂王楚最強則最先反韓信倚胡則又反貫髙因趙資則又反陳豨兵精則又反彭越用梁則又反黥布用淮南則又反盧綰最弱最後反長沙乃在二萬五千户耳功少而最完藝疏而最忠非獨性異人也亦形藝然也曩令樊酈絳灌據數十城而王今雖已殘亡可也令信越之倫列為徹侯而居雖至今存可也然則天下之大計可知已欲諸王之皆忠附則莫若令如長沙王欲臣子之勿葅醢則莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則亡邪心令海內之藝如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻湊並進而歸命天子雖在細民且知其安故天下咸知陛下之明割地定制令齊趙楚各為若干國使悼惠王幽王元王之子孫畢以次各受祖之分地地盡而止及燕梁他國皆然其分地衆而子孫少者建以為國空而置之須其子孫生者舉使君之諸侯之地其削頗入漢者為徙其侯國及封其子孫也所以數償之一寸之地一人之衆天子亡所利焉誠以定治而已故天下咸知陛下之廉地制一定宗室子孫莫慮不王下無倍叛之心上無誅伐之志故天下咸知陛下之仁法立而不犯令行而不逆貫髙利幾之謀不生柴竒開章之計不萌細民鄉善大臣致順故天下咸知陛下之義卧赤子天下之上而安植遺腹朝委裘而天下不亂當時大治後世誦聖一動而五業附陛下誰憚而久不為此天下之勢方病大瘇一脛之大幾如要一指之大幾如股平居不可屈信一二指慉身慮亡聊失今不治必為錮疾後雖有扁鵲不能為己病非徒瘇也又苦􅏓盩􅏓古跖字盩古戾字言足跖反戾不可行元王之子帝之從弟也今之王者從弟之子也惠王之子親兄子也今之王者兄子之子也親者或亡分地以安天下疏者或制大權以逼天子臣故曰非徒病瘇也又苦􅏓盩可痛哭者此病是也天下之藝方倒縣凡天子者天下之首何也上也蠻夷者天下之足何也下也今胸奴嫚娒侵掠至不敬也為天下患至亡已也而漢嵗致金絮采繒以奉之夷狄徵令是主上之操也天子共貢是臣下之禮也足反居上首顧居下倒縣如此莫之能解猶謂國有人乎非亶讀曰但倒縣而已又類辟足病音璧且病痱風病音肥夫辟者一面病痱者一方痛今西邊北邊之郡雖有長爵不輕得復五尺以上不輕得息斥候望烽燧不得卧將吏被甲胄而睡臣故曰一方病矣醫能治之而上不使可為流涕者此也陛下何忍以帝皇之號為戎人諸侯藝既卑辱而禍不息長此安窮進謀者率以為是固不可解也亡具甚矣臣竊料胸奴之衆不過漢一大縣以天下之大困於一縣之衆甚為執事者羞之陛下何不試以臣為屬國之官以主胸奴行臣之計請必係單于之頸而制其命伏中行説而笞其背舉胸奴之衆唯上之令今不獵猛敵而獵田彘不摶反寇而摶畜莵玩細娛而不圗大患非所以為安也德可逺施威可逺加而直數百里外威令不信可為流涕者此也今民賣僮者為之繡衣絲履偏諸緣服虔曰如牙條以作履緣師古曰偏諸若今之織成以為要襻及褾領者也古謂之車馬裙其上為乘車騎從之象內之間中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸美者黼繡是古天子之服今富人大賈嘉會召客者以被牆古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也且帝之身自衣皂綈而富民牆屋被文繡天子之后以緣其領庶人孽妾緣其履此臣所謂舛也夫百人作之不能衣一人欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡飢胡可得也飢寒切於民之肌膚欲其亡為姦邪不可得也國已屈矣盜賊直須時耳然而獻計者曰毋動為大耳夫俗至大不敬也至亡等也至冒上也進計者猶曰毋為可為長太息者此也商君遺禮義棄仁恩并心於進取行之二嵗秦俗日敗故秦人家富子壯則出分家貧子壯則出贅借父耰鉏慮有德色母取箕帚立而誶語抱哺其子與公併倨婦姑不相説則反脣而相稽其慈子耆利不同禽獸者亡幾耳然并心而赴時猶日蹶六國兼天下功成求得矣終不知反廉愧之莭仁義之厚信并兼之法遂進取之業天下大敗衆掩寡智欺愚勇威怯壯陵衰其亂至矣是以大賢起之威震海內德從天下曩之為秦者今轉而為漢矣然其遺風餘俗猶尚未改今世以侈靡相競而上亡制度棄禮義捐廉恥日甚可謂月異而嵗不同矣逐利不耳慮非顧行也今其甚者殺父兄矣盜者剟音輟寢户之簾搴音騫兩廟之器白晝大都之中剽吏而奪之金矯偽者出幾十萬石粟賦六百餘萬錢乘傳而行郡國此其亡行義之尤至者也而大臣特以簿書不報期會之間以為大故至於俗流失世壞敗因恬而不知怪慮不動於耳目以為是適然耳夫移風易俗使天下回心而鄉道類非俗吏之所能為也俗吏之所務在於刀筆筐篋而不知大體陛下又不自憂竊為陛下惜之夫立君臣等上下使父子有禮六親有紀此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壞管子曰禮義廉耻是謂四維四維不張國乃滅亡使管子愚人也則可管子而少知治體則是豈可不為寒心哉秦滅四維而不張故君臣乖亂六親殃戮姦人並起萬民離畔凡十三嵗而社稷為虛今四維猶未備也故姦人幾幸而衆心疑惑豈如今定經制令君君臣臣上下有差父子六親各得其宜姦人無所幾幸而羣臣衆信上不疑惑此業一定世世常安而後有所持循矣若夫經制不定是猶度江河亡維楫中流而遇風波船必覆矣可為長太息者此也夏為天子十有餘世而殷受之殷為天子二十餘世而周受之周為天子三十餘世而秦受之秦為天子二世而亡人性甚不相逺也何三代之君有道之長而秦無道之暴也其故可知也古之王者太子乃生固舉以禮使士負之有司齊肅端冕見之南郊見於天也過闕則下過廟則趨孝子之道也故自為赤子而教固已行矣昔者成王幼在襁抱之中召公為太保周公為太傅太公為太師保保其身體傅傳之以德義師道之教訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也故乃提孩有識三公三少固明孝仁禮義以道習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子乃生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長於齊不能不齊語也習與不正人居之不能毋不正猶生長於楚之地不能不楚言也故擇其所耆必先受業乃得嘗之擇其所樂必先有習乃得為之孔子曰少成若天性習貫如自然及太子少長知妃色則入于學學者所學之官也學禮曰帝入東學上親而貴仁則親踈有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴德則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不隃矣帝入太學承師問道退習而考於太傅太傅罰其不則而匡其不及則德智長而治道得矣此五學者既成於上則百姓黎民化輯於下矣及太子既冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諫之鼓瞽史誦詩工誦針諫大夫進謀士傳民語習與智長故切而不愧化與心成故中道若性三代之禮春朝朝日秋暮夕月所以明有敬也春秋入學坐國老執醬而親餽之所以明有孝也行以鸞和步中采齊趣中肆夏所以明有度也其於禽獸見其生不忍其死聞其聲不食其肉故逺庖厨所以長恩且眀有仁也夫三代之所以長久者以其輔翼太子有此具也及秦而不然其俗固非貴辭讓也所上者告訐也固非貴禮義也所上者刑罰也使趙髙傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也鄙諺曰不習為吏視已成事又曰前車覆後車誡夫三代之所以長久者其已事可知也然而不能從者是不法聖智也秦世之所以亟絶者其轍迹可見也然而不避是後車又將覆也夫存亡之變治亂之機其要在是矣天下之命縣於太子太子之善在於早諭教與選左右夫心未濫而先諭教則化易成也開於道術智誼之指則教之力也若其服習積貫則左右而已夫胡粵之人生而同聲耆欲不異及其長而成俗纍數譯而不能相通行者有雖死而不相為者則教習然也臣故曰選左右早諭教最急夫教得而左右正則太子正矣太子正而天下定矣書曰一人有慶兆民賴之此時務也凡人之智能見已然不能見將然夫禮者禁於將然之前而法者禁於已然之後是故法之所用易見而禮之所為生難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地耳豈顧不用哉然而曰禮云禮云者貴絶惡於未萌而起教於微眇使民日遷善逺罪而不自知也孔子曰聽訟吾猶人也必也使毋訟乎為人主計者莫如先審取舍取舍之極定於內而安危之萌應於外矣安者非一日而安也危者非一日而危也皆以積漸然不可不察也人主之所積在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親故世主欲民之善同而所以使民善者或異或道之以德教或驅之以法令道之以德教者德教洽而民氣樂驅之以法令者法令極而民風哀哀樂之感禍福之應也秦王之欲尊宗廟而安子孫者與湯武同然而湯武廣大其德行六七百嵗而弗失秦王治天下十餘嵗則大敗此無他故矣湯武之定取舍審而秦王之定取舍不審矣夫天下大器也今人主之置器置諸安處則安置諸危處則危天下之情與器亡以異在天子之所置之湯武置天下於仁義禮樂而德澤洽禽獸草木廣裕德被蠻貊四夷纍子孫數十世此天下所共聞也秦王置天下於法令刑罰德澤亡一有而怨毒盈於世下憎惡之如仇讎禍幾及身子孫誅絶此天下之所共見也是非其明效大驗邪人之言曰聽言之道必以其事觀之則言者莫敢妄言今或言禮誼之不如法令教化之不如刑罰人主胡不引殷周秦事以觀之也人主之尊譬如堂羣臣如陛衆庶如地故陛九級上亷逺地則堂髙陛亡級廉近地則堂卑髙者難攀卑者易陵理藝然也故古者聖王制為等列內有公卿大夫士外有公侯伯子男然後有官師小吏延及庶人等級分明而天子加焉故其尊不可及也里諺曰欲投鼠而忌器此善諭也鼠近於器尚憚不投恐傷其器况於貴臣之近主乎亷耻節禮以治君子故有賜死而亡戮辱是以黥劓之罪不及大夫以其離主上不逺也禮不敢齒君之路馬蹴其芻者有罰見君之几杖則起遭君之乘車則下入正門則趨君之寵臣雖或有過刑戮之罪不加其身者尊君之故也此所以為主上豫逺不敬也所以體貌大臣而厲其莭也今自王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也而令與衆庶同黥劓髠刖笞罵音罵棄市之法然則堂不亡陛乎被戮辱者不泰迫乎亷耻不行大臣無乃握重權大官而有徒𨽻亡耻之心乎夫望夷之事二世見當以重法者投鼠而不忌器之習也臣聞之履雖鮮不加於枕冠雖敝不以苴履夫嘗己在貴寵之位天子改容而體貌之矣吏民嘗俯伏以敬畏之矣今而有過帝令廢之可也退之可也賜之死可也滅之可也若夫束縳之係緤之輸之司寇編之徒官司寇小吏詈罵而榜音彭笞之殆非所以令衆庶見也夫卑賤者習知尊貴者之一旦吾亦乃可以加此也非所以習天下也非尊尊貴貴之化也夫天子之所嘗敬衆庶之所嘗寵死而死耳賤人安宜得如此而頓辱之哉豫讓事中行之君智伯伐而滅之移事智伯及趙滅智伯豫讓釁面吞炭必報襄子五起而不中人問豫子豫子曰中行衆人畜我我故衆人事之智伯國士遇我我故國士報之故此一豫讓也反君事讎行若狗彘已而抗莭致忠行出乎列士人主使然也故主上遇其大臣如遇犬馬彼將犬馬自為也如遇官徒彼將官徒自為也頑頓亡耻詬胡結反詬音后謂無志分亡莭廉耻不立且不自好茍若而可故見利則逝見便則奪主上有敗則因而挻之耳主上有患則吾茍免而已立而觀之耳有便吾身者則欺賣而利之耳人主將何便於此羣下至衆則主上至少也所託財器職業者粹於羣下也俱亡耻俱茍妄則主上最病故古者禮不及庶人刑不至大夫所以厲寵臣之節也古者大臣有坐不亷而廢者不謂不廉曰簠簋不飾坐汚穢淫亂男女亡别者不曰汙穢曰帷薄不修坐罷軟不勝任者不謂罷軟曰下官不職故貴大臣定有其罪矣猶未斥然正以呼之也尚遷就而為之諱也故其在大譴大訶之域者聞譴訶則白冠氂纓盤水加劒造請室而請罪耳上不執縳係引而行也其有中罪者聞命而自弛上不使人頸盩而加也其有大罪者聞命則北面再拜跪而自裁上不使捽抑而刑之也曰子大夫自有過耳吾遇子有禮矣遇之有禮故羣臣自喜嬰以廉耻故人矜莭行上設廉耻禮義以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳忘身國耳忘家公耳忘私利不茍就害不茍去唯義所在上之化也故父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守圄扞敵之臣誠死城郭封疆故曰聖人有金城者此物此志也彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存彼將為我危故吾得與之俱安顧行而忘利守節而伏義故可以託不御之權可以寄六尺之孤此厲亷耻行禮誼之所致也主上何喪焉此之不為而顧彼之久行故曰可為長太息者此也是時丞相絳侯周勃免就國人有告勃謀反逮繫長安獄治卒亡事復爵邑故賈誼以此譏上上深納其言養臣下有莭是後大臣有罪皆自殺不受刑至武帝時稍復入獄自寧成始初文帝以代王入即位後分代為兩國立皇子武為代王參為太原王小子勝則梁王矣後又徙代王武為淮陽王而太原王參為代王盡得故地居數年梁王勝死亡子誼復上疏曰陛下即不定制如今之藝不過一傳再傳諸侯猶且人恣而不制豪植而大疆漢法不得行矣陛下所以為蕃扞及皇太子之所恃者唯淮陽代二國耳代北邊胸奴與強敵為鄰能自完則足矣而淮陽之比大諸侯厪如黑子之著面適足以餌大國耳不足以有所禁禦方今制在陛下制國而令子適足以為餌豈可謂工哉人主之行異布衣布衣者飾小行競小亷以自託於鄉黨人主唯天下安社稷固不耳髙皇帝瓜分天下以王功臣反者如蝟毛而起以為不可故蔪音芟去不義諸侯而虛其國擇良日立諸子雒陽上東門之外畢以為王而天下安故大人者不牽小行以成大功今淮南地逺者或數千里越兩諸侯而縣屬於漢其吏民繇役往來長安者自悉而補中道衣敝錢用諸費稱此其苦屬漢而欲得王至甚逋逃而歸諸侯者已不少矣其藝不可久臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽北邊二三列城與東郡以益梁不可者可徙代王而都睢陽梁起於新郪于移反以北著之河淮陽包陳以南揵巨偃反之江則大諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁吳楚陛下髙枕終無山東之憂矣此二世之利也當今恬然適遇諸侯之皆少數嵗之後陛下且見之矣夫秦日夜苦心勞力以除六國之禍今陛下力制天下頤指如意髙拱以成六國之禍難以言智茍身亡事畜亂宿禍熟視而不定萬年之後傳之老母弱子將使不寧不可謂仁也唯陛下財幸文帝於是從誼計乃徙淮陽王武為梁王北界泰山西至髙陽得大縣四十餘城徙城陽王喜為淮陽王撫其民時又封淮南厲王四子皆為列侯誼知上必將復王之也上疏諫曰竊恐陛下接王淮南諸子曽不與如臣者孰計之也淮南王之悖逆無道天下孰不知其罪陛下幸而赦遷之自疾而死天下孰以王死之不當今奉尊罪人之子適足以負謗於天下耳此人少壯豈能忘其父哉白公勝所為父報仇者大父與伯父叔父也白公為亂非欲取國代主也發忿快志剡手以衝仇人之胸固為俱靡而已淮南雖小黥布嘗用之矣漢存特幸耳夫擅仇人足以危漢之資於䇿不便雖割而為四四子一心也豫之衆積之財此非有子胥白公報於廣都之中即疑有剸諸荆軻起於兩柱之間所謂假賊兵為虎翼者也願陛下少留計梁王勝墜馬死誼自傷為傅無狀常哭泣後嵗餘亦死賈生之死年三十三矣後四嵗齊文王薨亡子文帝思賈生之言乃分齊為六國盡立悼惠王子六人為王又遷淮南王喜於城陽而分淮南為三國盡立厲王三子以王之後十年文帝崩景帝立三年而吳楚趙與四齊王合從舉兵西鄉京師梁王扞之卒破七國至武帝時淮南厲王子為王者兩國亦反誅孝武初立舉賈生之孫二人至郡守賈嘉最好學世其家爰盎字絲其父楚人也故為羣盜徙安陵髙后時盎為吕祿舍人孝文即位盎兄噲任盎為郎中絳侯為丞相朝罷趨出意得甚上禮之恭常目送之盎進曰丞相何如人也上曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣主在與在主亡與亡方吕后時諸吕用事擅相王劉氏不絶如帶是時絳侯為太尉本兵柄弗能正吕后崩大臣相與共誅諸吕太尉主兵適會其成功所謂功臣非社稷臣丞相如有驕主色陛下謙讓臣主失禮竊為陛下弗取也後朝上益莊丞相益畏已而絳侯望盎曰吾與汝兄善今兒乃毁我盎遂不謝及絳侯就國人上書告以為反徵繫請室諸公莫敢為言唯盎明絳侯無罪絳侯得釋盎頗有力絳侯乃大與盎結交淮南厲王朝殺辟陽侯居處驕甚盎諫曰諸侯大驕必生患可適削地上弗用淮南王益橫謀反發覺上徵淮南王遷之蜀檻車傳送盎時為中郎將諫曰陛下素驕之弗稍禁以至此今又暴摧折之淮南王為人剛有如遇霜露行道死陛下竟為以天下大弗能容有殺弟名奈何上弗聽遂行之淮南王至雍病死聞上輟食哭甚哀盎入頓首請罪上曰以不用公言至此盎曰上自寬此往事豈可悔哉且陛下有髙世之行三此不足以毁名上曰吾髙世三者何事盎曰陛下居代時太后嘗病三年陛下不交睫不解衣湯藥非陛下口所嘗弗進夫曽參以布衣猶難之今陛下親以王者修之過曽參逺矣諸吕用事大臣顓制然陛下從代乘六乘傳馳不測之淵雖賁育之勇不及陛下陛下至代邸西鄉讓天子者三南鄉讓天子者再夫許由一讓而陛下五以天下讓過許由四矣且陛下遷淮南王欲以苦其志使改過有司宿衛不謹故病死於是上乃解曰將奈何盎曰淮南王有三子唯在陛下矣文帝乃立其三子皆為王盎由此名重朝廷盎常引大體慷慨宦者趙談以數幸常害盎盎患之盎兄子種為常侍騎諫盎曰君衆辱之後雖惡君上不復信於是上朝東宫談參乘盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸餘人共載於是上笑下談談泣下車上從霸陵上欲西馳下峻阪盎並車攬轡上曰將軍怯邪盎言曰臣聞千金之子不垂堂百金之子不騎衡聖主不乘危不徼幸今陛下騁六飛馳下峻山有如馬驚車敗陛下縱自輕奈髙廟太后何上乃止上幸上林皇后慎夫人從其在禁中常同席坐及坐郎署長布席盎引却慎夫人坐夫人怒不肯坐上亦怒起盎因前説曰臣聞尊卑有序則上下和今陛下既已立后慎夫人乃妾妾主豈可與同坐哉且陛下幸之即厚賜之陛下所以為慎夫人適所以禍之陛下獨不見人彘乎於是上乃説入語慎夫人慎夫人賜盎金五十斤然盎亦以數直諫不得久居中調為隴西都尉仁愛士卒士卒皆爭為死遷齊相徙為吳相辭行種謂盎曰吳王驕日久國多姦今絲欲劾治彼不上書告君則利劒刺君矣南方卑濕君能日飲亡何時説王曰毋反而已如此幸得脫盎用種之計吳王厚遇盎盎告歸道逄丞相申屠嘉下車拜謁丞相從車上謝盎盎還愧其吏乃之丞相舍上謁求見丞相丞相良久而見之盎因跪曰願請間丞相曰使君所言公事之曹與長史掾議之吾且奏之即私邪吾不受私語盎即起説曰君為相自度孰與陳平絳侯丞相曰吾不如盎曰善君即自謂不如夫陳平絳侯輔翼髙帝定天下為將相而誅諸吕存劉氏君乃為材官蹶張遷為隊率積功至淮陽守非有竒計攻城野戰之功且陛下從代來每朝郎官上書疏未嘗不止輦受其言言不可用置之言可受采之未嘗不稱善何也則欲以致天下賢士大夫上日聞所不聞以益聖而今君自閉箝天下之口而日益愚夫以聖主責愚相君受禍不久矣丞相乃再拜曰嘉鄙人乃不知將軍幸教引與入坐為上客盎素不好鼂錯錯所居坐盎輒避盎所居坐錯亦避兩人未嘗同堂語及景帝即位鼂錯為御史大夫使吏案盎受吳王財物抵罪詔赦以為庶人吳楚反聞鼂錯謂丞史曰袁盎多受吳王金錢専為蔽匿言不反今果反欲請治盎宜知計謀丞史曰事未發治之有絶今兵西鄉治之何益且盎不宜有謀錯猶豫未決人有告盎盎恐夜見竇嬰為言吳所以反願至前口對狀嬰入言上上乃召盎盎入見竟言吳所以反獨急斬錯以謝吳吳兵乃可罷上拜盎為太常竇嬰為大將軍兩人素相善是時諸陵長安中賢大夫爭附兩人車騎隨者日數百乘及鼂錯已誅盎以太常使吳吳王欲使將不肯欲殺之使一都尉以五百人圍守盎軍中初盎為吳相時有從史盜私盎侍兒盎知之弗泄遇之如故人有告從史言君知爾與侍者通乃亡去盎驅自追之遂以侍者賜之復為從史及袁盎使吳見守從史適在守盎校為司馬乃悉以其裝齎置二石醇醪會天寒士卒飢渴飲醉西南陬卒卒皆卧司馬夜引盎起曰君可以去矣吳王期旦日斬君盎弗信曰公何為者司馬曰臣故為從史盜君侍兒者盎乃驚謝曰公幸有親吾不足以纍公司馬曰君第去臣亦且亡避吾親君何患乃以刀決張音帳道從醉卒直出司馬與分背盎解節麾懷之屐步行七十里明見梁騎馳去遂歸報吳楚已破上更以元王子平陸侯禮為楚王以盎為楚相嘗上書不用盎病免家居與閭里浮湛相隨行鬭雞走狗雒陽劇孟嘗過盎盎善待之安陵富人有謂盎曰吾聞劇孟博徒將軍何自通之盎曰劇孟雖博徒然母死客送葬車千餘乘此亦有過人者且緩急人所有夫一旦叩門不以親為解不以在亡為辭天下所望者獨季心劇孟今公陽從數騎一旦有緩急寧足恃乎遂罵富人弗與通諸公聞之皆多盎盎雖居家景帝時時使人問籌策梁王欲求為嗣盎進説其後語塞梁王以此怨盎使人刺盎刺者至關中問盎稱之皆不容口乃見盎曰臣受梁王金來刺君君長者不忍刺君然後刺君者十餘曹備之盎心不樂家又多怪乃之棓音杯生所問占還梁刺客後曹果遮刺盎安陵郭門外鼂錯潁川人也學申韓刑名於軹張恢生所與雒陽宋孟及劉帶同師以文學為太常掌故錯為人峭直刻深孝文時天下亡治尚書者獨聞濟南伏生故秦博士治尚書年九十餘老不可徵乃詔太常使人往受之太常遣錯受尚書伏生所還因上書稱説詔以為太子舍人門大夫遷博士又上書言人主所以尊顯功名揚於萬世之後者以知術數也故人主知所以臨制臣下而治其衆則羣臣畏服矣知所以聽言受事則不欺蔽矣知所以安利萬民則海內必從矣知所以忠孝盡上則臣子之行備矣此四者臣竊為皇太子急之人臣之議或曰皇太子亡以知事為也臣之愚誠以為不然竊觀上世之君不能奉其宗廟而劫殺於其臣者皆不知術數者也皇太子所讀書多矣而未深知術數者不問書説也夫多誦而不知其説所謂勞苦而不為功臣竊觀皇太子材智髙竒馭射伎藝過人絶逺然於術數未有所守者以陛下為心也竊願陛下幸擇聖人之術可用今世者以賜皇太子因時使太子陳明於前唯陛下裁察上善之於是拜錯為太子家令以其辨得幸太子太子家號曰智囊是時胸奴強數寇邊上發兵以禦之錯上言兵事曰臣聞漢興以來胡虜數入邊地小入則小利大入則大利髙后時再入隴西攻城屠邑驅略畜産其後復入隴西殺吏卒大寇盜竊聞戰勝之威民氣百倍敗兵之卒沒世不復自髙后以來隴西三困於胸奴矣民氣破傷亡有勝意今兹隴西之吏賴社稷之神靈奉陛下之明詔和輯士卒底厲其節起破傷之民以當乘勝之胸奴用少擊衆殺一王敗其衆而有大利非隴西之民有勇怯乃將吏之制巧拙異也故兵法曰有必勝之將無必勝之民繇此觀之安邊境立功名在於良將不可不擇也臣又聞用兵臨戰合刃之急者三一曰得地形二曰卒服習三曰器用利兵法曰丈五之溝漸車之水山林積石經川邱阜屮木所在此步兵之地也車騎二不當一土山邱陵曼衍相屬平原廣野此車騎之地也步兵十不當一平陵相逺川谷居間仰髙臨下此弓弩之地也短兵百不當一兩陳相近平地淺草可前可後此長戟之地也劍楯三不當一萑葦竹蕭􅋄木蒙籠支葉茂接此矛鋋之地也長戟二不當一曲道相伏險厄相薄此劍楯之地也弓弩三不當一士不選練卒不服習起居不精動靜不集趨利弗及避難不畢前擊後解與金鼓之音相失此不習勒卒之過也百不當十兵不完利與空手同甲不堅密與袒裼同弩不可以及逺與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之過也五不當一故兵法曰器械不利以其卒豫敵也卒不可用以其將豫敵也將不知兵以其主豫敵也君不擇將以其國豫敵也四者兵之至要也臣又聞小大異形強弱異勢險易異備夫卑身以事強小國之形也合小以攻大敵國之形也以蠻夷攻蠻夷中國之形也今胸奴地形技藝與中國異上下山阪出入溪澗中國之馬弗與也險道傾仄且馳且射中國之騎弗與也風雨罷勞飢渴不困中國之人弗與也此胸奴之長技也若夫平原易地輕車突騎則胸奴之衆易撓亂也徑弩長戟射疏及逺則胸奴之弓弗能格也堅甲利刃長短相雜逰弩往來什伍俱前則胸奴之兵弗能當也材官騶發矢道同的則胸奴之革笥木薦弗能支也下馬地鬭劍戟相接去就相薄則胸奴之足弗能給也此中國之長技也以此觀之胸奴之長技三中國之長技五陛下又興數十萬之衆以誅數萬之胸奴衆寡之計以一擊十之術也雖然兵凶器戰危事也以大為小以強為弱在俯仰之間耳夫以人之死爭勝跌而不振則悔之亡及也帝王之道出於萬全今降胡義渠蠻夷之屬來歸義者其衆數千飲食長技與胸奴同可賜之堅甲絮衣徑弓利矢益以邊郡之良騎令明將能知其習俗和輯其心者以陛下之眀約將之即有險阻以此通之平地通道則以輕車材官制之兩軍相為表裏各用其長技衡加之以衆此萬全之術也傳曰狂夫之言而眀主擇焉臣錯愚陋昧死上狂言唯陛下財擇文帝嘉之乃賜錯璽書寵答焉曰皇帝問太子家令上書言兵體三章聞之書言狂夫之言而明主擇焉今則不然言者不狂而擇者不眀國之大患故在於此使夫不眀擇於不狂是以萬聽而萬不當也錯復言守邊備塞勸農力本當丗急務二事曰臣聞秦時北攻胡貉築塞河上南攻揚粵置戍卒焉其起兵而攻胡粵者非以衛邊地而救民死也貪戾而欲廣大也故功未立而天下亂且夫起兵而不知其勢戰則為人禽屯則積卒死夫胡貉之地積隂之處也木皮三寸冰厚六尺食肉而飲酪其人密理鳥獸毳毛其性能寒揚粵之地少隂多陽其人疏理鳥獸希毛其性能暑秦之戍卒不能其水土戍者死於邊輸者僨於道秦民見行如往棄市因以謫發之名曰謫戍先發吏有謫及贅壻賈人後以嘗有市籍者又後以大父母父母嘗有市籍者後入閭取其左發之不順行者深怨有背畔之心凡民守戰至死而不降北者以計為之也故戰勝守固則有拜爵之賞攻城屠邑則得其財鹵以富家室故能使其衆蒙石矢赴湯火視死如生今秦之發卒也有萬死之害而亡銖兩之報死事之後不得一算之復天下眀知禍烈及己也陳勝行戍至於大澤為天下先倡天下從之如流水者秦以威劫而行之之敝也胡人衣食之業不著於地其勢易以擾亂邊境何以眀之胡人食肉飲酪衣皮毛非有城郭田宅之歸居也如飛鳥走獸放於廣壄美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國之所以離南畝也今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邊民絶望而有降敵之心救之少發則不足多發逺縣才至則胡又已去聚而不罷為費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然今逺方之卒守塞一嵗而更不知胡人之能不如選常居者家室田作且以備之為便為之髙城深塹具藺石布渠答復為一城其內城間百五十步要害之處通川之道調立城邑毌下千家為中周虎落先為室屋具田器乃募罪人及免徒復作令居之不足募以丁奴婢贖罪及輸奴婢欲以拜爵者不足乃募民之欲往者皆賜髙爵復其家豫冬夏衣廩食能自給而止郡縣之民得買其爵以自增至卿其亡夫若妻者縣官買豫之人情非有匹敵不能久安其處塞下之民祿利不厚不可使久居危難之地胡人入驅而能止其所驅者以其半豫之縣官為贖其民如是則邑里相救助赴胡不避死非以德上也欲全親戚而利其財也此與東方之戍卒不習地藝而心畏胡者功相萬也以陛下之時徙民實邊使逺方亡屯戍之事塞下之民父子相保亡係虜之患利施後世名稱聖眀其與秦之行怨民相去逺矣上從其言募兵徙塞下錯復言陛下幸募民相徙以實塞下使屯戍之事益省輸將之事益寡甚大惠也下吏誠能稱厚惠奉明法存恤所徙之老弱善遇其壯士和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相募而勸往矣臣聞古之徙逺方以實廣虛也相其隂陽之和嘗其水草之味審其土地之宜觀其屮木之饒然後營邑立城制里割宅通田作之道正阡陌之界先為築室家有一堂二內門户之閉置器物焉民至有所居作有所用此民所以輕去故鄉而勸之新邑也為置醫巫以救疾病以修祭祀男女有昏生死相恤墳墓相從種樹畜長室屋完安此所以使民樂其處而有長居之心也臣又聞古之制邊縣以備敵也使五家為伍伍有長十長一里里有假士四里一連連有假五百十里一邑邑有假候皆擇其里之賢材有護習地形知民心者居則習民於射法出則教民於應敵故卒伍成於內則軍政定於外服習以成勿令遷徙幼則同遊長則共事夜戰聲相知則足以相救晝戰目相見則足以相識歡愛之心足以相死如此則勸以厚賞威以重罰則前死不還踵矣所徙之民非壯有材力但費衣糧不可用也雖有材力不得良吏猶亡功也陛下絶胸奴不與和親臣竊意其冬來南也一大治之則終身創矣欲立威者始於折膠來而不能困使得氣去後未易服也愚臣亡識唯陛下財察後詔有司舉賢良文學士錯在選中上親策之錯對曰臣聞古之賢主莫不求賢以為輔翼故黃帝得力牧而為五帝先大禹得咎繇而為三王祖齊桓得管子而為五霸長今陛下講於大禹及髙皇帝之建豪英也退託於不眀以求賢良讓之至也臣竊觀上世之傳若髙皇帝之建功業陛下之德厚而得賢佐皆有司之所覽刻於玉版藏於金匱歷之春秋紀之後世為帝者祖宗與天地相終今平陽侯臣窟等乃以臣錯充賦甚不稱明詔求賢之意臣錯草茅誠亡識知昧死上愚對曰詔䇿曰明於國家大體愚臣竊以古之五帝明之臣聞五帝神聖其臣莫能及故自親事處於法宫之中眀堂之上動靜上配天下順地中得人故衆生之類亡不覆也根著之徒亡不載也燭以光眀亡偏異也德上及飛鳥下至水蟲草木諸産皆被其澤然後隂陽調四時節日月光風雨時膏露降五榖熟妖孽滅賊氣息民不疾疫河出圗洛出書神龍至鳳鳥翔德澤滿天下靈光施四海此謂配天地治國大體之功也詔策曰通於人事終始愚臣竊以古之三王明之臣聞三王臣主俱賢故合謀相輔計安天下莫不本於人情人情莫不欲夀三王生而不傷也人情莫不欲富三王厚而不困也人情莫不欲安三王扶而不危也人情莫不欲逸三王節其力而不盡也其為法令也合於人情而後行之其動衆使民也本於人事然後為之取人以己內恕及人情之所惡不以強人情之所欲不以禁民是以天下樂其政歸其德望之若父母從之若流水百姓和親國家安寧名位不失施及後世此明於人情終始之功也詔䇿曰直言極諫愚臣竊以五伯之臣明之臣聞五伯不及其臣故屬之以國任之以事五伯之佐之為人臣也察身而不敢誣奉法令不容私盡心力不敢矜遭患難不避死見賢不居其上受祿不過其量不以亡能居尊顯之位自行若此可謂方正之士矣其立法也非以苦民傷衆而為之機陷也以之興利除害尊主安民而救暴亂也其行賞也非虛取民財妄豫人也以勸天下之忠孝而明其功也故功多者賞厚功少者賞薄如此斂民財以顧其功而民不恨者知與而安己也其行罰也非以忿怒妄誅而從暴心也以禁天下不忠不孝而害國者也故罪大者罰重罪小者罰輕如此民雖伏罪至死不怨者知罪罰之至自取之也立法如此可謂平正之吏矣法之逆者請而更之不以傷民主行之暴者逆而復之不以傷國救主之失補主之過揚主之美眀主之功使主內無邪僻之行外無騫汚之名事君如此可謂直言極諫之士矣以五伯之所以德匡天下威正諸侯功業甚美名聲章明舉天下之賢主五伯與焉此身不及其臣而使得直言極諫補其不逮之功也今陛下人民之衆威武之重德惠之厚令行禁止之勢萬萬於五伯而賜愚臣䇿曰匡朕之不逮愚臣何足以識陛下之髙明而奉承之詔策曰吏之不平政之不宣民之不寧愚臣竊以秦事明之臣聞秦始并天下之時其主不及三王而臣不及其佐然功力不遲者何也地形便山川利財用足民利戰其所與並者六國六國者臣主皆不肖謀不輯民不用故當此之時秦最富強夫國富強而鄰國亂者帝王之資也故秦能兼六國立為天子當此之時三王之功不能進焉及其末塗之衰也任不肖而信讒賊宫室過度嗜欲無極民力罷盡賦斂不節矜奮自賢羣臣恐諛驕溢縱恣不顧禍患妄賞以隨喜意妄誅以快怒心法令煩憯刑罰暴酷輕絶人命身自射殺人天下寒心莫安其處姦邪之吏乘其亂法以成其威獄官主斷生殺自恣上下瓦解各自為制秦始亂之時吏之所先侵者貧人賤民也至其中節所侵者富人吏家也及其末塗所侵者宗室大臣也是故親疏皆危內外咸怨離散逋逃人有走心陳勝先倡天下大潰絶祀亡世為異姓福此吏不平政不宣民不寧之禍也今陛下配天象地覆露萬民絶秦之迹除其亂法躬親本事廢去淫末除苛解嬈寬大愛人肉刑不用罪人亡奴非謗不治鑄錢者除通關去塞不孽諸侯賓禮長老愛恤少孤罪人有期後宫出嫁尊賜孝悌農民不租眀詔軍師愛士大夫求進方正廢退姦邪除去隂刑害民者誅憂勞百姓列侯就都親耕節用視民不奢所為天下興利除害變法易故以安海內者大功數十皆上世之所難及陛下行之道純德厚元元之民幸矣詔䇿曰永惟朕之不德愚臣不足以當之詔䇿曰悉陳其志毋有所隱愚臣竊以五帝之賢臣明之臣聞五帝其臣莫能及則自親之三王臣主俱賢則共憂之五伯不及其臣則任使之此所謂神眀不遺而賢聖不廢也故各當其世而立功德焉傳曰往者不可及來者猶可待能明其世者謂之天子此之謂也竊聞戰不勝者易其地民貧窮者變其業今以陛下神明德厚資財不下五帝臨制天下至今十有六年民不益富盜賊不衰邊境未安其所以然意者陛下未之躬親而待賢臣也今執事之臣皆天下之選也然莫能望陛下清光譬之猶五帝之佐也陛下不自躬親而待不望清光之臣臣竊恐神明之遺也日損一日嵗亡一嵗日月益暮盛德不及究於天下以傳萬世愚臣不自度量竊為陛下惜之昧死上狂惑屮茅之愚言唯陛下財擇時賈誼已死對策者百餘人唯錯為髙第繇是遷中大夫錯又言宜削諸侯事及法令可更定者書凡三十篇孝文雖不盡聽然竒其材當是時太子善錯計䇿爰盎諸大功臣多不好錯景帝即位以錯為內史錯數請間言事輒聽幸傾九卿法令多所更定丞相申屠嘉心弗便力未有以傷之內史府居太上廟堧中門東出不便錯乃穿門南出鑿廟堧垣丞相大怒欲因此過為奏請誅錯錯聞之即請間為上言之丞相奏事因言錯擅鑿廟垣為門請下廷尉上曰此非廟垣乃堧中垣不致於法丞相謝罷朝因怒謂長史曰吾當先斬以聞乃先請固誤丞相遂發病死錯以此愈貴遷為御史大夫請諸侯之罪過削其支郡奏上上令公卿列侯宗室集議莫敢難獨竇嬰爭之繇此與錯有隙錯所更令三十章諸侯皆歡譁疾錯錯父聞之從潁川來謂錯曰上初即位公為政用事侵削諸侯别疏人骨肉人口議多怨公者何也錯曰固也不如此天子不尊宗廟不安錯父曰劉氏安矣而鼂氏危吾去公歸矣遂飲藥死曰吾不忍見禍及吾身死十餘日吳楚七國俱反以誅錯為名上與錯議出軍事錯欲令上自將兵而身居守會竇嬰言爰盎詔召入見上方與錯調兵食上問盎曰君嘗為吳相知吳臣田祿伯為人乎今吳楚反於公意何如對曰不足憂也今破矣上曰吳王即山鑄錢煮海為鹽誘天下豪桀白頭舉事此其計不百全豈發乎何以言其無能為也盎曰吳銅鹽之利則有之安得豪桀而誘之誠令吳得豪桀亦且輔而為誼不反矣吳所誘皆亡賴子弟亡命鑄錢姦人故相誘以亂錯曰盎䇿之善上問曰計安出盎對曰願屏左右上屏人獨錯在盎曰臣所言人臣不得知乃屏錯錯趨避東廂甚恨之上卒問盎對曰吳楚相遺書言髙皇帝王子弟各有分地今賊臣鼂錯擅適諸侯削奪之地以故反名為西共誅錯復故地而罷方今計獨有斬錯發使赦吳楚七國復其故地則兵可毋血刃而俱罷於是上默然良久曰顧誠何如吾不愛一人謝天下盎曰愚計出此惟上熟計之乃拜盎為太常密裝治行後十餘日丞相青翟中尉嘉廷尉歐劾奏錯曰吳王反逆亡道欲危宗廟天下所當共誅今御史大夫錯議曰兵數百萬獨屬羣臣不可信陛下不如自出臨兵使錯居守徐僮之旁吳所未下者可以豫吳錯不稱陛下德信欲疏羣臣百姓又欲以城邑豫吳亡臣子禮大逆不道錯當要斬父母妻子同産無少長皆棄市臣請論如法制曰可錯殊不知乃使中尉召錯紿載行市錯衣朝衣斬東市錯已死謁者僕射鄧公為校尉擊吳楚為將遂上書言軍事見上上問曰道軍所來聞鼂錯死吳楚罷不鄧公曰吳王為反數十年矣發怒削地以誅錯為名其意非在錯也且臣恐天下之士拑口不敢復言矣上曰何哉鄧公曰夫鼂錯患諸侯強大不可制故請削之以尊京師萬世之利也計畫始行卒受大戮內杜忠臣之口外為諸侯報仇臣竊為陛下不取也於是景帝喟然長息曰公言善吾亦恨之乃拜鄧公為城陽中尉鄧公成固人多竒計建元中上招賢良公卿言鄧先鄧先猶云鄧先生也鄧先時免起家為九卿一年復謝病免歸其子章以修黃老言顯諸公間張釋之字季南陽堵陽人也與兄仲同居以資為騎郎資五百萬得為常侍郎也事文帝十嵗不得調亡所知名釋之曰久官減仲之産不遂欲免歸袁盎知其賢惜其去乃請徙釋之補謁者釋之既朝畢因前言便宜事文帝曰卑之毋甚髙論令今可施行也於是釋之言秦漢之間事秦所以失漢所以興者文帝稱善拜為謁者僕射從行上登虎圈問上林尉禽獸簿十餘問尉左右視盡不能對虎圈嗇夫從旁代尉對上所問禽獸簿甚悉欲以觀其能口對嚮應亡窮者文帝曰吏不當若是邪尉亡賴詔釋之拜嗇夫為上林令釋之前曰陛下以絳侯周勃何如人也上曰長者又復問東陽侯張相如何如人也上復曰長者釋之曰夫絳侯東陽侯稱為長者此兩人言事曽不能出口豈效此嗇夫喋喋利口捷給哉且秦以任刀筆之吏爭以亟疾苛察相髙其敝徒文具亡惻隱之實以故不聞其過陵遲至於二世天下土崩今陛下以嗇夫口辨而超遷之臣恐天下隨風靡靡爭為口辨而亡其實且下之化上疾於景嚮舉錯不可不察也文帝曰善乃止不拜嗇夫就車召釋之驂乘徐行問釋之秦之敝具以質言至宫上拜釋之為公車令頃之太子與梁王共車入朝不下司馬門於是釋之追止太子梁王毋入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒子不謹太后乃使使承詔赦太子梁王然後得入文帝繇是竒釋之拜為中大夫頃之至中郎將從行至霸陵上居外臨厠時慎夫人從上指示慎夫人新豐道曰此至邯鄲道也使夫人鼓瑟上倚瑟而歌意悽慘悲懷顧謂羣臣曰嗟乎以北山石為槨用紵絮斫陳漆其間豈可動哉左右皆曰善釋之前曰使其中有可欲雖錮南山猶有隙使其中亡可欲雖亡石槨又何戚焉文帝稱善其後拜釋之為廷尉頃之上行出中渭橋有一人從橋下走乘輿馬驚捕屬廷尉釋之治問曰縣人來聞蹕匿橋下久以為行過既出見車騎即走耳釋之奏當此人犯蹕當罰金上怒曰此人親驚吾馬馬賴和柔令他馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天子所與天下公共也今法如是而更重之是法不信於民也且方其時上使使誅之則已今已下廷尉廷尉天下之平也一傾而天下用法皆為之輕重民安所措其手足唯陛下察之良久上曰廷尉當是也其後人有盜髙廟座前玉環得文帝怒下廷尉治按律盜宗廟服御物者為奏當棄市上大怒曰人亡道乃盜先帝器吾屬廷尉者欲致之族而君以法奏之非吾所以共承宗廟意也釋之免冠頓首謝曰法如是足矣且罪等俱死罪也然以逆順為基今盜宗廟器而族之有如萬分一假令愚民取長陵一抷步侯切掬也土陛下何以加其法乎久之文帝與太后言之乃許廷尉當是時中尉條侯周亞夫與梁相山都侯王恬啓見釋之持議平乃與結為親友張廷尉由此天下稱之後文帝崩景帝立釋之恐稱病欲免去懼大誅至欲見謝則未知何如用王生計卒見謝景帝不過也王生者善為黃老言處士嘗召居廷中三公九卿盡會立王生老人曰吾襪解顧謂張廷尉為我結音係襪釋之跪而結之既已人或讓王生曰獨奈何廷辱張廷尉乎曰吾老且賤自度終亡益於張廷尉廷尉方今天下名臣吾故聊使結襪欲以重之諸公聞之賢王生而重釋之釋之事景帝嵗餘為淮南相猶尚以前過也年老病卒子摯字長公官至大夫免以不能取容當世故終身不仕馮唐祖父趙人也父徙代漢興徙安陵唐以孝著為郎中署長事文帝帝輦過問唐曰父老何自為郎家安在具以實言文帝曰吾居代時吾尚食監髙袪數為我言趙將李齊之賢戰於巨鹿下吾每飲食意未嘗不在巨鹿也父老知之乎唐對曰齊尚不如亷頗李牧之為將也上曰何已唐曰臣大父在趙為官帥將善李牧臣父故為代相善李齊知其為人也上既聞亷頗李牧為人良説乃拊髀曰嗟乎吾獨不得亷頗李牧為將豈憂胸奴哉唐曰陛下雖得亷頗李牧弗能用也上怒起入禁中良久召唐讓曰公衆辱我獨亡間處乎唐謝曰鄙人不知忌諱當是時胸奴新大入朝那殺北地都尉卬上以胡寇為意乃卒復問唐曰公何以知吾不能用頗牧也唐曰臣聞上古王者遣將也跪而推轂曰闑以內寡人制之闑以外將軍制之軍功爵賞皆決於外歸而奏之此非空言也臣大父言李牧之為趙將居邊軍市之租皆自用饗士賞賜決於外不從中覆也委任而責成功故李牧得盡其智能選車千三百乘彀騎萬三千匹百金之士十萬是以北逐單于破東胡滅淡林西抑強秦南支韓魏當是時趙幾霸後會趙王遷立其母倡也乃用郭開讒而誅李牧令顔聚代之卒為秦所滅今臣竊聞魏尚為雲中守軍市租盡以給士卒出私養錢五日一殺牛饗賓客軍吏舍人是以胸奴逺避不近雲中之塞虜嘗一入尚帥車騎擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍伍符吏卒斬首以尺籍書下縣移郡令人故行不行奪勞二嵗伍符亦什伍之符要莭度也家人子庶人之家子也終日力戰斬首捕虜上功莫府一言不相應文吏以法繩之其賞不行吏奉法必用臣愚以為陛下法太明賞太輕罰太重且雲中守尚坐上功首虜差六級陛下下之吏削其爵罰作之由此言之陛下雖得頗牧弗能用也臣誠愚觸忌諱死罪文帝説是日令唐持節赦魏尚復以為雲中守而拜唐為車騎都尉主中尉及郡國車士十年景帝立以唐為楚相武帝即位求賢良舉唐唐時年九十餘不能為官乃以子遂為郎遂字王孫亦竒士魏尚槐里人也汲黯字長孺濮陽人也其先有寵於古之衛君也至黯十世世為卿大夫以父任孝景時為太子洗馬以莊見憚武帝即位黯為謁者東粵相攻上使黯往視之至吳而還報曰粵人相攻固其俗不足以辱天子使者河內失火燒千餘家上使黯往視之還報曰家人失火屋比延燒不足憂臣過河內河內貧民傷水旱萬餘家或父子相食臣謹以便宜持節發河內倉粟以賑貧民臣請歸節伏矯制罪上賢而釋之遷為滎陽令黯恥為令稱病歸田里上聞乃召為中大夫以數切諫不得久留內遷為東海太守黯學黃老之言治官理民好清靜擇丞史任之責大指而已不細苛黯多病卧閨閣內不出嵗餘東海大治稱之上聞召為主爵都尉列於九卿治務在無為而已引大體不拘文法黯為人性倨少禮面折不能容人之過合己者善待之不合己者弗能忍見士亦以此不附焉然好遊俠任氣莭行修潔其諫犯主之顔色常慕傅伯袁盎之為人善灌夫鄭當時及宗正劉棄疾亦數以直諌不得久居位是時太后弟武安侯田蚡為丞相中二千石拜謁蚡弗為禮黯見蚡未嘗拜揖之天子方招文學儒者上曰吾欲云云黯對曰陛下內多欲而外施仁義奈何欲效唐虞之治乎上怒變色而罷朝公卿皆為黯懼上退謂左右曰甚矣汲黯之戇也羣公或數黯黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎且已在其位縱愛身奈辱朝廷何黯多病病且滿三月上嘗賜告者數終不愈最後病嚴助為請告賜告者去官歸家也上曰汲黯何如人也助曰使黯任職居官無以愈人然至其輔少主守成招之不來麾之不去雖自謂賁育不能奪也上曰然古有社稷之臣至如汲黯近之矣大將軍青侍中上踞厠視之丞相𢎞燕見上或時不冠至如見黯上不冠不見也上嘗坐武帳中黯前奏事上不冠望見黯避帷中使人可其奏其見敬禮如此張湯以更定律令為廷尉黯質責湯於上前曰公為正卿上不能褒先帝之功業下不能化天下之邪心安國富民使囹圄空虛何空取髙皇帝約束紛更之為而公以此無種矣黯時與湯論議湯辨常在文深小苛黯憤發罵曰天下謂刀筆吏不可為公卿果然必湯也今天下重足而立仄目而視矣是時漢方征胸奴招懷四夷黯務少事間嘗言與胡和親毋起兵上方鄉儒術尊公孫𢎞及事益多吏民巧上分别文法湯等數奏決讞以幸而黯常毁儒面觸𢎞等徒懷詐飾智以阿人主取容而刀筆之吏專深文巧詆陷人於罔以自為功上愈益貴𢎞湯𢎞湯心疾黯雖上亦不説也欲誅之以事𢎞為丞相乃言上曰右內史界部中多貴人宗室難治非素重臣弗能任請徙黯為右內史數嵗官事不廢大將軍青既益尊姊為皇后然黯與亢禮或説黯曰自天子欲令羣臣下大將軍大將軍尊貴誠重君不可以不拜黯曰夫以大將軍有揖客反不重邪大將軍聞愈賢黯數請問以朝廷所疑遇黯加於平日淮南王謀反憚黯曰黯好直諫守莭死義至説公孫𢎞等如發蒙耳上既數征胸奴有功黯言益不用始黯列九卿矣而公孫𢎞張湯為小吏及𢎞湯稍貴與黯同位黯又非毁𢎞湯已而𢎞至丞相封侯湯御史大夫黯時丞史皆與同列或尊用過之黯褊心不能無少望見上言曰陛下用羣臣如積薪耳後來者居上黯罷上曰人果不可以無學觀汲黯之言日益甚矣居無何胸奴渾邪王帥衆來降漢發車二萬乘縣官亡錢從民貰馬民或匿馬馬不具上怒欲斬長安令黯曰長安令亡罪獨斬臣黯民乃肯出馬且胸奴畔其主降漢漢徐以縣次傳之何至令天下騷動罷中國甘心夷狄之人乎上默然後渾邪王至賈人與市者坐當死五百餘人黯入請間見髙門曰夫胸奴攻當路塞絶和親中國舉兵誅之死傷不可勝計而費以巨萬百數臣愚以為陛下得胡人皆以為奴婢賜從軍死者家鹵獲因與之以謝天下塞百姓之心今縱不能渾邪帥數萬之衆來虛府庫賞賜發良民侍養若奉驕子愚民安知市買長安中而文吏繩以為闌出財物如邊關乎陛下縱不能得胸奴之贏以謝天下又以微文殺無知者五百餘人臣竊為陛下不取也上弗許曰吾久不聞汲黯之言今又復妄發矣後數月坐法免官隱於田園者數年會更立五銖錢民多盜鑄錢者楚地尤甚上以為淮陽楚地之郊也召黯拜為淮陽太守黯伏謝不受印綬詔數強豫然後奉詔召上殿黯泣曰臣自以為填溝壑不復見陛下不意陛下復收用之臣常有狗馬之心今病力不能任郡事臣願為郎中出入禁闥補過拾遺臣之願也上曰君薄淮陽邪吾今召君矣顧淮陽吏民不相得吾徒得君重卧而治之黯既辭過大行李息曰黯棄逐居郡不得與朝廷議矣然御史大夫張湯智足以拒諫詐足以飾非非肯正為天下言專阿主意主意所不欲因而毁之主意所欲因而譽之好興事舞文法內懷詐以御主心外挾賊吏以為重公列九卿不早言之何公與之俱受其戮矣息畏湯終不敢言黯居郡如其故治淮陽政清後湯敗上聞黯與息言抵息罪令黯以諸侯相秩居淮陽居淮陽十嵗而卒卒後上以黯故官其弟仁至九卿子偃至諸侯相黯姊子司馬安亦少與黯為太子洗馬安文深巧善官四至九卿以河南太守卒昆弟以安故同時至二千石十人濮陽假宏事蓋侯信信任宏官亦再至九卿然衛人仕者皆嚴憚汲黯出其下鄭當時字莊陳人也其先鄭君嘗為項籍將籍死而屬漢髙祖令諸故項籍臣名籍鄭君獨不奉詔詔盡拜名籍者為大夫而逐鄭君鄭君死孝文時莊以任俠自喜脫張羽於厄聲聞梁楚間孝景時為太子舍人每五日洗沐常置驛馬長安諸郊請謝賓客夜以繼日至明旦常恐不遍莊好黃老言其慕長者如恐不稱自見年少官薄然其知友皆大父行天下有名之士也武帝立莊稍遷為魯中尉濟南太守江都相至九卿為右內史以武安魏其時議貶秩為詹事遷為大司農莊為大吏戒門下客至亡貴賤亡留門者執賓主之禮以其貴下人性亷又不治産卬奉賜以給諸公然其饋遺人不過具器食猶今言一盤食每朝候上間説未嘗不言天下長者其推轂士及官屬丞史誠有味其言也常引以為賢於己未嘗名吏與官屬言若恐傷之聞人之善言進於上唯恐後山東諸公以此翕然稱鄭莊使視決河自請治行五日上曰吾聞鄭莊行千里不齎糧治行者何也然當時在朝常趨和承意不敢甚斥臧否漢征胸奴招四夷天下費多財用益屈莊為大司農任人賓客僦子就反謂受顧賃而載運也莊保任其賓客於司農載運入多逋負司馬安為淮陽太守發其事莊以此陷罪贖為庶人頃之守長史遷汝南太守數嵗以官卒昆弟以莊故至二千石者六七人莊與汲黯列為九卿內行修潔兩人中廢賓客益落莊死家亡餘財先是下邽翟公為廷尉客亦填門及廢門外可設爵羅後復為廷尉客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見賈山潁川人也祖父祛故魏王時博士弟子也山受學祛所言涉獵書記不能為醇儒嘗給事潁隂侯為騎孝文時言治亂之道借秦為諭名曰至言其辭曰臣聞為人臣者盡忠竭愚以直諌主不避死亡之誅者臣山是也臣不敢以久逺諭願借秦以為諭唯陛下少加意焉夫布衣韋帶之士修身於內成名於外而使後世不絶息至秦則不然貴為天子富有天下賦斂重數百姓任罷赭衣半道群盜滿山使天下之人戴目而視傾耳而聽一夫大呼天下嚮應者陳勝是也秦非徒如此也起咸陽而西至雍離宫三百鐘鼓帷帳不移而具又為阿房之殿殿髙數十仞東西五里南北千步從車羅騎四馬馳騖旌旗不橈為宫室之麗至於此使其後世曾不得聚廬而託處焉為馳道於天下東窮燕齊南極吳楚江湖之上瀕海之觀畢至道廣五十步三丈而樹厚築其外隱以金椎樹以青松為馳道之麗至於此使其後世曽不得邪徑而託足焉死葬乎驪山吏徒數十萬人曠日十年下徹三泉合采金石冶銅錮其內漆塗其外被以珠玉飾以翡翠中成觀遊上成山林為葬薶之侈至於此使其後世曽不得蓬顆蔽冢而託葬焉秦以熊羆之力虎狼之心蠶食諸侯并吞海內而不篤禮義故天殃已加矣臣昧死以聞願陛下少留意而詳擇其中臣聞忠臣之事君也言切直則不用而身危不切直則不可以明道故切直之言明主所欲急聞忠臣所以蒙死而竭知也地之磽者雖有善種不能生焉江臯河瀕雖有惡種無不猥大昔者夏商之季世雖關龍逄箕子比干之賢身亡而道不用文王之時豪俊之士皆得竭其智芻蕘採薪之人皆得盡其力此周之所以興也故地之美者善養禾君之仁者善養士雷霆之所擊無不摧折者萬鈞之所壓無不糜滅者今人主之威非特雷霆也勢重非特萬鈞也開道而求諫和顔色而受之用其言而顯其身士猶恐懼而不敢自盡又乃况於縱欲恣行暴虐惡聞其過乎震之以威壓之以重則雖有堯舜之智孟賁之勇豈有不摧折者哉如此則人主不得聞其過失矣弗聞則社稷危矣古者聖王之制史在前書過失工誦針諫瞽誦詩諫公卿比諫士傳言諫過庶人謗於道商旅議於市然後君得聞其過失也聞其過失而改之見義而從之所以永有天下也天子之尊四海之內其義莫不為臣然而養三老於太學親執醬而餽執爵而酳祝䭇古饐字在前祝鯁在後公卿奉杖大夫進履舉賢以自輔弼求修正之士使直諫故以天子之尊尊養三老視孝也立輔弼之臣者恐驕也置直諫之士者恐不得聞其過也學問至於芻蕘者求善無饜也商人庶人誹謗已而改之從善無不聽也昔者秦政力并萬國富有天下破六國以為郡縣築長城以為關塞秦地之固大小之勢輕重之權其與一家之富一夫之強胡可勝計也然而兵破於陳涉地奪於劉氏者何也秦王貪狼暴虐殘賊天下窮困萬民以適其欲也昔者周蓋千八百國以九州之民養千八百國之君用民之力不過嵗三日什一而籍君有餘財民有餘力而頌聲作秦皇帝以千八百國之民自養力罷不能勝其役財盡不能勝其求一君之身耳所以自養者馳騁弋獵之娛天下弗能共也勞罷者不得休息飢寒者不得衣食亡罪而死傷者不得告訴人與之為怨家與之為讎故天下壞也秦皇帝身在之時天下已壞矣而弗自知也秦皇帝東巡狩至會稽琅邪刻石著其功自以為過堯舜統縣石鑄鐘虡篩土築阿房之宫自以為萬世有天下也古者聖王作諡三四十世耳雖堯舜禹湯文武纍世廣德以為子孫基業無過二三十世者也秦皇帝曰死而以諡法是父子名號有時相襲也以一至萬則世世不相復也故死而號曰始皇帝其次曰二世皇帝欲以一至萬也秦皇帝計其功德度其後嗣世世無窮然身死才數月耳天下四面而攻之宗廟滅絶矣秦皇帝居滅絶之中而不自知者何也天下莫敢告也其所以莫敢告者何也亡養老之義亡輔弼之臣亡進諌之士縱恣行誅退誹謗之人殺直諫之士是以道諛偷合茍容比其德則賢於堯舜課其功則賢於湯武天下已潰而莫之告也詩曰匪言不能胡此畏忌聽言則對譖言則退此之謂也又曰濟濟多士文王以寧天下未嘗亡士也然而文王獨言以寧者何也文王好仁則仁興得士而敬之則士用用之有禮義故不致其愛敬則不能盡其心不能盡其心則不能盡其力不能盡其力則不能成其功故古之賢君於其臣也尊其爵祿而親之疾則臨視之亡數死則往弔哭之臨其小斂大斂已棺塗而後為之服鍚衰麻絰而三臨其喪未斂不飲酒食肉未葬不舉樂當宗廟之祭而死為之廢樂故古之君人者於其臣也可謂盡禮矣服法服端容貌正顔色然後見之故臣下莫敢不竭力盡死以報其上功德立於後世而令聞不忘也今陛下念思祖考術追厥功圗所以昭光洪業休德使天下舉賢良方正之士天下皆欣欣焉曰將興堯舜之道三王之功矣天下之士莫不精白以承休德今方正之士皆在朝廷矣又選其賢者使為常侍諸吏與之馳驅射獵一日再三出臣恐朝廷之解弛百官之墮於事也諸侯聞之又必怠於政矣陛下即位親自勉以厚天下損食膳不聽樂減外徭衛卒止嵗貢省廄馬以賦縣傳去諸苑以賦農夫出帛十萬餘以振貧民禮髙年九十者一子不事八十者二算不事賜天下男子爵大臣皆至公卿發御府金賜大臣宗族亡不被澤者赦罪人憐其亡髮賜之巾憐其衣赭書其背父子兄弟相見也而賜之衣平獄緩刑天下莫不説喜是以元年膏雨降五榖登此天所以相陛下也刑輕於他時而犯法者寡衣食多於前年而盜賊少此天下之所以順陛下也臣聞山東吏布詔令民雖老羸癃疾扶杖而往聽之願少須臾毋死思見德化之成也今功業方就名聞方昭四方鄉風今從豪俊之臣方正之士直與之日日射獵擊兔伐狐以傷大業絶天下之望臣竊悼之詩曰靡不有初鮮克有終臣不勝大願願少衰射獵以夏嵗二月定明堂造太學修先王之道風行俗成萬世之基定然後唯陛下所幸耳古者大臣不媟故君子不常見其齊嚴之色肅敬之容大臣不得與宴逰方正修潔之士不得從射獵使皆務其方以髙其節則羣臣莫敢不正身修行盡心以稱大禮如此則陛下之道尊敬功業施於四海垂於萬世子孫矣誠不如此則行日壞榮日滅矣夫士修之於家而壞之於天子之廷臣竊愍之陛下與衆臣宴逰與大臣方正朝廷論議夫遊不失樂朝不失禮議不失計軌事之大者也其後文帝除鑄錢令山復上書諫以為變先帝法非是又訟淮南王無大罪宜急令反國又言柴唐子為不善足以戒章下詰責對以為錢者亡用器也而可以昜富貴富貴者人主之操柄也令民為之是與人主共操柄不可長也其言多激切善指事意然終不加罰所以廣諫爭之路也其後復禁鑄錢云鄒陽齊人也漢興諸侯王皆自治民聘賢吳王濞招致四方遊士陽與吳嚴忌枚乘俱仕吳皆以文辨著名久之吳王以太子事怨望稱疾不朝隂有邪謀陽奏書諫為其事尚隱惡指斥言故先引秦為諭因道胡越齊趙淮南之難然後乃致其意其辭曰臣聞秦倚曲臺之宫縣衡天下畫地而不犯兵加胡越至其晚節末路張耳陳勝連從兵之據以叩函谷咸陽遂危何則列郡不相親萬室不相救也今胡數涉北河之外上覆飛鳥下不見伏莵鬭城不休救兵不止死者相隨輦車相屬轉粟流輸千里不絶何則強趙責於河間六齊望於惠后城陽顧於盧博三淮南之心思墳墓大王不憂臣恐救兵之不專胡馬遂進窺於邯鄲越水長沙還舟青陽雖使梁并淮陽之兵下淮東越廣陵以遏越人之糧漢亦折西河而下北守漳水以輔大國胡亦益進越亦益深此臣之所為大王患也臣聞交龍襄首奮翼則浮雲出流霧雨咸集聖王底節修德則遊談之士歸義思名今臣盡智畢議易精極慮則無國不可姦飾固陋之心則何王之門不可以曵長裾乎然臣所以歷數王之朝背淮千里而自致者非惡臣國而樂吳民也竊髙下風之行尤説大王之義故願大王之無忽察聽其志臣聞鷙鳥纍百不如一鶚夫全趙之時武力鼎士袨服叢臺之下者一旦成市而不能止幽王之湛患淮南連山東之俠死士盈朝不能還厲王之西也然而計議不得雖諸賁不能守其位亦明矣故願大王審畫而已始孝文皇帝據關入立寒心銷志不明求衣自立天子之後使東牟朱虛東褒義父之後深割嬰兒王之壤子王梁代益以淮陽卒仆濟北囚弟於雍者豈非象新垣平等哉今天子新據先帝之遺業左規山東右制關中變權易藝大臣難知大王弗察臣恐周鼎復起於漢新垣過計於朝則我吳遺嗣不可期於世矣髙皇帝燒棧道水章邯兵不留行收弊民之倦東馳函谷西楚大破水攻則章邯以亡其城陸擊則荆王以失其地此皆國家之不幾者也願大王熟察之吳王不內其言是時景帝少弟梁孝王貴盛亦得士於是鄒陽枚乘嚴忌知吳不可説皆去之梁從孝王遊陽為人有智略慷慨不茍合介於羊勝公孫詭之間勝等疾陽惡之孝王孝王怒下陽吏將殺之陽客遊以讒見禽恐死而負纍乃從獄中上書曰臣聞忠無不報信不見疑臣常以為然徒虛語耳昔荆軻慕燕丹之義白虹貫日太子畏之衛先生為秦畫長平之事太白食昴昭王疑之夫精變天地而信不諭兩主豈不哀哉今臣盡忠竭誠畢議願知左右不明卒從吏訊為世所疑是則荆軻衛先生復起而燕秦不寤也願大王熟察之昔玉人獻寶楚王誅之李斯竭忠胡亥極刑是以箕子陽狂接輿避丗恐遭此患也願大王察玉人李斯之意而後楚王胡亥之聽毋使臣為箕子接輿所笑臣聞比干剖心子胥鴟夷臣始不信乃今知之願大王熟察少加憐焉語曰有白頭如新傾蓋如故何則知與不知也故樊於期逃秦之燕藉荆軻首以奉丹事王奢去齊之魏臨城自徑以郤齊而存魏夫王奢樊於期非新於齊秦而故於燕趙也所以去二國死兩君者行合於志慕義無窮也是以蘇秦不信於天下為燕尾生白圭戰亡六城為魏取中山何則誠有以相知也蘇秦相燕人惡之燕王燕王按劍而怒食以駃騠白圭顯於中山人惡之魏文侯文侯賜以夜光之璧何則兩主二臣剖心析肝相信豈移於浮辭哉故女無美惡入宫見妒士無賢不肖入朝見嫉昔司馬喜臏腳於宋卒相中山范雎拉脅折齒於魏卒為應侯此二人者皆信必然之畫捐朋黨之私挾孤獨之交故不能免於嫉妒之人也是以申徒狄蹈雍之河徐衍負石入海不容於丗義不茍取比周於朝以移主上之心故百里奚乞於道路繆公委之以政寧戚飯牛車下桓公任之以國此二人者豈素官於朝借譽於左右然後二主用之哉感於心合於行堅如膠漆昆弟不能離豈惑於衆口哉故偏聽生姦獨任成亂昔魯聽季孫之説逐孔子宋任子冉之計囚墨翟夫以孔墨之辨不能自免於讒諛而二國以危何則衆口爍金積毁銷骨也秦用戎人由余而伯中國齊用越人子臧而強威宣此二國豈係於俗牽於世繫竒偏之浮辭哉公聽並觀垂名當世故意合則胡越為兄弟由余子臧是矣不合則骨肉為讎敵朱象管蔡是矣今人主誠能用齊秦之明後宋魯之聽則五伯不足侔而三王易為也是以聖王覺寤捐子之之心而不説田常之賢封比干之後修孕婦之墓故功業覆於天下何則欲善亡厭也夫晉文親其讎強伯諸侯齊桓用其仇而一匡天下何則慈仁殷勤誠加於心不可以虗辭借也至夫秦用商鞅之法東弱韓魏立強天下卒車裂之越用大夫種之謀禽徑吳而霸中國遂誅其身是以孫叔敖三去相而不悔於陵子仲辭三公為人灌園今人主誠能去驕傲之心懷可報之意披心腹見情素墮肝膽施德厚終與之窮逹無愛於士則桀之犬可使吠堯跖之客可使刺由何况因萬乘之權假聖主之資乎然則荆軻湛七族要離燔妻子豈足為大王道哉臣聞明月之珠夜光之璧以暗投人於道衆莫不按劍相眄者何則無因而至前也蟠木根柢輪囷離竒而為萬乘器者以左右先為之容也故無因而至前雖出隋珠和璧祗恐怨而不見德有人先遊則枯木朽株樹功而不忘今夫天下布衣窮居之士身在貧羸雖蒙堯舜之術挾伊管之辨懷龍逄比干之意而素無根柢之容雖竭精神欲開忠於當世之君則人主必襲按劍相眄之迹矣是使布衣之士不得為枯木朽株之資也是以聖王制世御俗獨化於陶鈞之上而不牽乎卑亂之語不奪乎衆多之口故秦皇帝任中庶子蒙之言以信荆軻而七首竊發周文王獵涇渭載吕尚歸以王天下秦信左右而亡周用烏集而王何則以其能越攣拘之語馳域外之議獨觀乎昭曠之道也今人主沈諂諛之辭牽帷牆之制使不羈之士與牛驥同皂此鮑焦所以憤於世也臣聞盛飾入朝者不以私汙義底厲名號者不以利傷行故里名勝母曽子不入邑號朝歌墨子還車今欲使天下寥廓之士籠於威重之權脅於位藝之貴回面汙行以事諂諛之人而求親近於左右則士有伏死堀穴巖藪之中耳安有盡忠信而趨闕下者哉書奏孝王孝王立出之卒為上客初勝詭欲使王求為漢嗣王又嘗上書願賜容車之地徑至長樂宫自使梁國士衆築作甬道朝太后袁盎等皆建以為不可天子不許梁王怒令人刺殺盎上疑梁殺之使者冠蓋相望責梁王梁王始與勝詭有謀陽爭以為不可故見讒枚先生嚴夫子皆不敢諫及梁事敗勝詭死孝王恐誅乃思陽言深辭謝之齎以千金令求方略解罪於上者陽素知齊人王先生年八十餘多竒計即往見語以其事王先生曰難哉人主有私怨深怒欲施必行之誅誠難解也以太后之尊骨肉之親猶不能止况臣下乎昔秦始皇有伏怒於太后羣臣諫而死者以十數得茅焦為廓大義茅焦諫云陛下車裂假父有嫉妒之心囊撲兩弟有不慈之名遷母咸陽有不孝之行臣竊為陛下危之言訖解衣趨鑊始皇下殿手接之曰先生起矣即迎太后遂為母子如初始皇非能説其言也乃自強從之耳茅蕉亦厪脫死如毛氂耳故事所以難者也今子欲安之乎陽曰鄒魯守經學齊楚多辨知韓魏時有竒節吾將歷問之王先生曰子行矣還過我而西陽行月餘莫能為謀還過王先生曰臣將西矣為如何王先生曰吾先日欲獻愚計以為衆不可蓋竊自薄陋不敢道也若子行必往見王長君士無過此者矣陽發寤於心曰敬諾辭去不過梁徑至長安因客見王長君長君者王美人之兄也後封為蓋侯鄒陽留數日乘間而請曰臣非為長君無使令於前故來侍也愚戇竊不自料願有謁也長君跪曰幸甚陽曰竊聞長君弟得幸後宫天下無有而長君行迹多不循道理者今袁盎事即窮竟梁王恐誅如此則太后怫鬱泣血無所發怒切齒側目於貴臣矣臣恐長君危於纍卵竊為足下憂之長君懼然曰將為之奈何陽曰長君誠能精為上言之得毋竟梁事長君必固自結於太后太后厚德長君入於骨髓而長君之弟幸於兩宫金城之固也又有存亡繼絶之功德布天下名施無窮願長君深自計之昔者舜之弟象日以殺舜為事及舜立為天子封之於有庫夫仁人之於兄弟無藏怒無宿怨厚親愛而已是以後世稱之魯公子慶父使僕人殺子般獄有所歸季友不探其情而誅焉慶父親殺閔公季子緩追免賊春秋以為親親之道也魯哀薑薨于夷孔子曰齊桓公法而不譎以為過也以是説天子徼幸梁事不奏長君曰諾乘間入而言之及韓安國亦見長公主事果得不治初吳王濞與七國謀反及發齊濟北兩國城守皆不行漢既破吳齊王自殺不得立嗣濟北王亦欲自殺幸全其妻子齊人公孫玃謂濟北王曰臣請試為大王明説梁王通意天子説而不用死未晚也公孫玃遂見梁王曰夫濟北之地東接強齊南牽吳越北脅燕趙此四分五裂之國權不足以自守徑不足以扞寇又非有竒怪云以待難也雖墜言於吳非其正計也昔者鄭祭仲許宋人立公子宇以活其君非義也春秋記之以生易死以存易亡也鄉使濟北見情實示不從之端則吳必先歷齊畢濟北招燕趙而總之如此則山東之從結而無隙矣今吳楚之王練諸侯之兵驅白徒之衆西與天子爭衡濟北獨底莭堅守不下使吳失與而亡助跬步獨進瓦解土崩破敗而不救者未必非濟北之力也夫以區區之濟北而與諸侯爭強是以羔犢之弱而扞虎狼之敵也守職不橈可謂誠一矣功義如此尚見疑於上脅肩低首纍足撫襟使有自悔不前之心非社稷之利也臣恐藩臣守職者疑之臣竊料之能厯西山徑長樂抵未央攘袂而正議者獨大王耳上有全亡之功下有安百姓之名德淪於骨髓恩加於無窮願大王留意詳惟之孝王大説使人馳以聞濟北王得不坐徙封淄川枚乘字叔淮隂人也為吳王濞郎中吳王之初怨望謀為逆也乘奏書諫曰臣聞得全者昌失全者亡舜亡立錐之地以有天下禹亡十户之聚以王諸侯湯武之土不過百里上不絶三光之明下不傷百姓之心者有王術也故父子之道天性也忠臣不避重誅以直諫則事無遺策功流萬世臣乘願披腹心而效愚忠唯大王少加意念惻怛之心於臣乘言夫以一縷之任係千鈞之重上縣無極之髙下垂不測之淵雖甚愚之人猶知哀其將絶也馬方駭鼓而驚之係方絶又重鎮之係絶於天不可復結墜入深淵難以復出其出不出間不容髮能聽臣之忠言百舉必脫必若所欲為危於纍卵難於上天變所欲為易於反掌安於泰山今欲極天命之夀敝無窮之樂究萬乘之藝不出反掌之易以居泰山之安而欲乘纍卵之危走上天之難此愚臣所以為大王惑也人性有畏其景而惡其迹者郤背而走迹愈多景愈疾不知就隂而止景滅迹絶欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之滄一人炊之百人揚之無益也不如絶薪止火而已不絶之於彼而救之於此譬猶抱薪而救火也養由基楚之善射者也去楊葉百步百發百中楊葉之大加百中焉可謂善射矣然其所止乃百步之內耳比於臣乘未知操弓持矢也福生有基禍生有胎納其基絶其胎禍自何來泰山之霤穿石單極之綆斷幹水非石之鑽索非木之鋸漸靡使之然也夫銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量徑而寡失夫十圍之木始生如蘖足可搔而絶手可擢而拔據其未生先其未形也磨礱底厲不見其損有時而盡種樹畜養不見其益有時而大積德纍行不知其善有時而用棄義背理不知其惡有時而亡臣願大王熟計而身行之此百世不易之道也吳王不內乘等去而之梁從孝王遊景帝即位御史大夫鼂錯為漢定制度損削諸侯吳王遂與六國謀反舉兵西鄉以誅錯為名漢聞之斬錯以謝諸侯枚乘復説吳王曰昔者秦西舉胡戎之難北備榆中之關南距羌筰之塞東當六國之從六國乘信陵之籍明蘇秦之約厲荆軻之威并力一心以備秦然秦卒擒六國滅其社稷而并天下是何也則地利不同而民輕重不等也今漢據全秦之地兼六國之衆修戎狄之義而南朝羌筰此其與秦地相什而民相百大王之所眀知也今夫讒諛之人為大王計者不論骨肉之義民之輕重國之大小以為吳禍此臣所以為大王患也夫舉吳兵以訾於漢譬如蠅蚋之附羣牛腐肉之齒利劍鋒接必無事矣天子聞吳率失職諸侯願責先帝之遺約今漢親誅其三公以謝前過是大王之威加於天下而功越於湯武也夫吳有諸侯之位而實富於天子有隱匿之名而居過於中國夫漢并二十四郡十七諸侯方輸錯出軍行數千里不絶於道其珍怪不如東山之府轉粟西鄉陸行不絶水行滿河不如海陵之倉修治上林雜以離宫積聚玩好圈守禽獸不如長洲之苑遊曲臺臨上路不如朝夕之池深壁髙壘副以關城不如江淮之險此臣之所以為大王樂也今大王還兵疾歸尚得十半不然漢知吳之有吞天下之心也赫然加怒遣羽林黃頭循江而下襲大王之都魯東海絶吳之餉道梁王飭車騎習戰射積粟固守以備滎陽待吳之飢大王雖欲反都亦不得已夫三淮南之計不負其約齊王殺身以滅其迹四國不得出兵其郡趙囚邯鄲此不可掩亦已明矣大王已去千里之國而制於十里之內矣張韓將北地弓髙宿左右兵不得下壁軍不得大息臣竊哀之願大王熟察焉吳王不用卒見禽漢既平七國乘由此知名景帝召拜乘為𢎞農都尉乘既久為大國上賔與英俊並遊得其所好不樂郡吏以病去官復遊梁梁客皆善屬辭賦乘尤髙孝王薨乘歸淮隂武帝自為太子聞乘名及即位乘年老乃以安車蒲輪徵乘道死詔問乘子無能為文者後乃得其孽子臯臯字少孺乘在梁時取臯母為小妻乘之東歸也臯母不肯隨乘乘怒分臯數千錢留與母居年十七上書梁共王得召為郎三年為王使與冗從爭見讒惡遇罪室家沒入臯亡至長安會赦上書北闕自陳枚乘之子上得之大喜召入見待詔臯因賦殿中詔使賦平樂館善之拜為郎使胸奴臯不通經術談笑類俳倡為賦頌好嫚戲以故得媟黷貴幸比東方朔郭舍人等而不得比嚴助等得尊官武帝春秋二十九乃得皇子羣臣喜故臯與東方朔作皇太子生賦及立皇太子禖祝受詔所為皆不從故事重皇子也初衛皇后立臯奏賦以戒終臯為賦善於朔也從行至甘泉雍河東東巡狩封泰山塞決河宣房遊觀三輔離宫館臨山澤弋獵射馭狗馬蹴鞠刻鏤上有所感輒使賦之為文疾受詔輒成故所賦者多司馬相如善為文而遲故所作少而善於臯臯賦辭中自言為賦不如相如又言為賦乃俳見視如倡自悔類倡也故其賦有詆娸音欺東方朔又自詆娸其文骫骳骫古委字骳音被猶言屈曲也曲隨其事皆得其意頗詼笑不甚間靡凡可讀者百二十篇其尤嫚戲不可讀者尚數十篇路溫舒字長君巨鹿東里人也父為里監門使溫舒牧羊溫舒取澤中蒲截以為牒編用寫書稍習善求為獄小吏因學律令轉為獄史縣中疑事皆問焉太守行縣見而異之署決曹史又受春秋通大義舉孝亷為山邑丞坐法免復為郡吏元鳳中廷尉光以治詔獄請溫舒署奏曹掾守廷尉史會昭帝崩昌邑王賀廢宣帝初即位溫舒上書言宜尚德緩刑其辭曰臣聞齊有無知之禍而桓公以興晉有驪姬之難而文公用霸近世趙王不終諸吕作亂而孝文為太宗由是觀之禍亂之作將以開聖人也故桓文扶微興壞尊文武之業澤加百姓功潤諸侯雖不及三王天下歸仁焉文帝永思至德以承天心崇仁義省刑罰通關梁一逺近敬賢如大賔愛民如赤子內恕情之所安而施之於海內是以囹圄空虛天下太平夫繼變化之後必有異舊之恩此賢聖之所以昭天命也往者昭帝即世而亡嗣大臣憂戚焦心合謀皆以昌邑尊親援而立之然天不授命淫亂其心遂以自亡深察禍變之故乃皇天之所以開至聖也故大將軍受命武帝股肱漢國披肝膽決大計黜亡義立有德輔天而行然後宗廟以安天下咸寧臣聞春秋正即位大一統而慎始也陛下初登至尊與天合符宜改前世之失正始受命之統滌煩文除民疾存亡繼絶以應天意臣聞秦有十失其一尚存治獄之吏是也秦之時羞文學好武勇賤仁義之士貴治獄之吏正言者謂之誹謗遏過者謂之妖言故盛服先生不用於世忠良切言皆欎於胸譽諛之聲日滿於耳虗美熏心實禍蔽塞此乃秦之所以亡天下也方今天下賴陛下厚恩亡金革之危飢寒之患父子夫妻戮力安家然太平未洽者獄亂之也夫獄者天下之大命也死者不可復生􅓟􅓟古絶字者不可復屬書曰與其殺不辜寧失不經今治獄吏則不然上下相驅以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立大辟之計嵗以萬數此仁聖所以傷也太平之未洽凡以此也夫人情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾辭以視之吏治者利其然則指道以明之上奏畏郤則煆煉而周內之蓋奏當之成雖咎繇聽之猶以為死有餘辜何則成鍊者衆文致之罪明也是以獄吏專為深刻殘賊而亡極偷為一切不顧國患此世之大賊也故俗語曰畫地為獄議不入刻木為吏期不對此皆疾吏之風悲痛之辭也故天下之患莫深於獄敗法亂正離親塞道莫甚乎治獄之吏此所謂一尚存者也臣聞烏鳶之卵不毁而後鳳凰集誹謗之罪不誅而後良言進故古人有言山藪藏疾川澤納汙瑾瑜匿惡國君含詬音垢唯陛下除誹謗以招切言開天下之口廣針諫之路掃亡秦之迹尊文武之德省法制寬刑罰以廢治獄則太平之風可興於世永履和樂與天亡極天下幸甚上善其言遷廣陽私府長內史舉溫舒文學髙第遷右扶風丞時詔書令公卿選可使胸奴者溫舒上書願給厮養暴骨方外以盡臣節事下度遼將軍范明友太僕杜延年問狀罷歸故官久之遷臨淮太守治有異迹卒於官溫舒從祖父受歷數天文以為漢厄三七之間上封事以豫戒成帝時谷永亦言如此及王莽篡位欲章代漢之符著其語焉溫舒子及孫皆至牧守大官通志卷九十七
