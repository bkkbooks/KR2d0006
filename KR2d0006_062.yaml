body:
  text: 通志卷五十七宋右迪功郎鄭樵漁仲撰職官略第七散官第十二文散官開府儀同三司特進光祿大夫以下武散官驃騎將軍附輔國將軍諸校尉鎮軍將軍以下開府儀同三司漢文帝元年始用宋昌為衛將軍位亞三司後漢章帝建初三年始使車騎將軍馬防班同三司同三司之名自此始也殤帝延平元年以鄧騭為車騎將軍儀同三司儀同之名自此始也魏黃權以車騎將軍開府儀同三司開府之名自此始也齊開府儀同三司如公梁開府儀同位次三公諸將軍左右光祿大夫優者則加之同三公置官屬自晉以來又有加開府如儀同三司之名者自羊祜始焉江左多有之後魏普泰初特以爾朱世隆為儀同三司位次上公北齊亦有儀同三司者後周建德四年改開府儀同三司為儀同大將軍仍增置上開府儀同大將軍又改儀同三司為儀同大將軍仍增置上儀同大將軍隋文帝並以為散官又諸衛各置開府府置開府一人又有儀同府儀同以下置員與開府同初開府儀同三司為四品散實官至煬帝又改為從一品同漢魏之制位次三公唐武德七年改上開府儀同三司為上輕車都尉開府儀同三司為輕車都尉儀同三司為騎都尉後又以開府儀同三司為文散官開元以前舊例開府特進雖不帶職事皆給俸祿得與朝會班列依本官之次皆崇官盛德罷劇就間者居之天寶六載正月制內外文武以上五品官以上父祖資廕者其所用宜同子孫用廕之例特進漢制諸侯功德優盛朝廷所欽異者賜位特進位在三公下故成都侯王商以特進領城門兵置幕府得舉吏如將軍是也後漢皇后父兄率為特進侯朝會位次三公隋志曰特進舊位從公光武以鄧禹列侯就第特進奉朝請是特進引見之稱無定官之實也而竇篤進位特進得舉吏見禮依三公自二漢及魏晉以為加官從本官車服無吏卒太僕羊琇遜位拜特進加散騎常侍無餘官故給吏卒車服其餘加特進者唯食其祿賜列其班位而已晉惠帝元康中定令特進位次諸公在開府驃騎上冠進賢兩梁冠黑介幘五時朝服佩水蒼玉食奉曰四斛太康二年始賜春絹五十匹秋絹五十匹綿百五十斤元康元年給采田八頃田騶八人立夏後不及田者食俸一年置主簿功曹吏門亭長門下書佐各一人給安車黑耳駕馭一人乖軺車施耳後戶一乘無章綬齊時班位從公陳因之後魏北齊用人皆以舊德就間居者居之隋文帝以為散官不理事煬帝即位廢特進官唐改為文散官光祿大夫以下秦時光祿勳屬官有中大夫漢武帝太初元年更名光祿大夫銀章青綬掌議論屬光祿勳門外特施行馬以旌别之無常事唯顧問應對詔命所使無員後漢光祿大夫三人凡諸國嗣王之喪則掌弔問多以為拜假賵贈之使及監護喪事魏氏以來無員轉優重不復以為使命之官其諸公告老者皆家拜此位及在朝顯職復用加之魏文帝以楊彪為光祿大夫賜几杖衣服因朝會引見令彪著布單衣鹿皮冠杖而入待以賔客之禮及晉受命置左右光祿大夫假金章紫綬而光祿大夫如故著進賢兩梁冠黑介幘五時朝服佩水蒼玉并祿賜班位吏卒皆與特進同復以為優崇之制而諸公遜位不復加之其以為加官者唯假章綬祿賜班位而已不别給車服吏卒也或更拜上公或以本封食公祿其諸卿尹中朝大官年老致仕者及內外之職加此者前後甚衆由是或因得開府或進加金章紫綬又復以為禮贈官其假銀章青綬者位在金紫將軍下諸卿上泰始中唯太子詹事楊珧加給事中光祿大夫加兵之制諸所供給依三品將軍晉宣帝子平原王幹拜光祿大夫加侍中以特進假金章紫綬章服班次三司其餘皆如舊制終於武惠孝懷三世秩食俸日三斛太康二年給春絹五十匹秋絹百匹綿百斤至惠帝元康元年始給采田六頃田騶六人又置主簿功曹門史亭長等及門下書佐各一人宋氏因之齊左右光祿大夫皆據舊制位從公開府置佐吏如公年重加親信二十人魏晉以來無有定員其左右光祿大夫光祿三大夫皆銀章青綬其重者詔加金章紫綬則謂之金紫光祿大夫樂安任遐為光祿卿就王晏乞一片金晏乃啓轉為金紫是也猶屬光祿勳梁又有左右金紫光祿大夫視吏部尚書左右光祿大夫視諸曹並養老病陳因之自晉以後多為兼官後魏有光祿大夫金紫銀青光祿大夫北齊皆以舊德就間者居之與特進同後周有左右金紫左右銀青四光祿大夫隋有光祿大夫左右光祿大夫皆為散官不理事唐初猶有左右之名貞觀以後唯曰光祿大夫金紫光祿銀青光祿並為文散官按前代光祿大夫始加金章紫綬及銀章青綬並尊之合在光祿之上後魏定令遂因仍不改正正議大夫通議大夫皆隋置散官蓋取秦大夫掌論議之義唐並因之太中大夫秦官亦掌論議漢因之後漢置二十人後漢張堪拜太中大夫居中東門候舍故人號為中東門君又隗囂廣置職位以自尊髙鄭興止之曰夫太中大夫使持節官皆王者之器非人臣所當制也胡廣云諌議光祿中大夫及中散大夫此四等者於古禮皆為天子之下大夫列國之上卿也魏以來無員晉視中丞吏部絳朝服進賢一梁冠介幘泰始末詔除王覽為太中大夫祿賜與卿同梁北齊皆有唐亦有之中大夫秦官漢武改為光祿大夫自後無聞北齊有之唐又置之龍朔二年七月制諸王承嫡封郡王者出身從四品下敘中散大夫王莽所置後漢因之置三十人漢官儀曰光武中興置魏晉無員齊梁視黃門侍郎品服冠幘與太中同陳亦有之唐又置朝議大夫隋置散官以取漢諸大夫得上奉朝議為名唐因之朝請大夫隋置散官取漢將軍公卿年髙德重者以列侯就第特進奉朝請之義唐因之龍朔制諸王衆子封郡公者出身從五品上敘朝散大夫隋置散官唐因之自正議以下並為文散官朝議郎承議郎並隋置散官唐因之顯慶五年八月制郡公出身正六品下敘通議郎隋置散官隋文帝於吏部别置朝議通議朝請朝散給事承奉儒林文林等八郎武騎屯騎驍騎遊騎飛騎旅騎雲騎羽騎八尉其品則正六品以下從九品以上上皆為郎下皆為尉散官番直常出使監檢至隋煬帝皆罷唐改通議為奉議郎顯慶制縣公出身從六品上敘通直郎隋置三十人蓋採晉宋以來諸官皆有通直謂官髙下而通為宿直者也因此為名唐因之朝請郎隋置散官蓋採晉宋齊梁陳並有奉朝請員為名唐因之顯慶制侯出身正七品上敘宣德郎朝散郎並隋置散官唐因之顯慶制伯出身正七品下敘子出身從七品上敘遊騎尉隋置散官唐改為宣義郎蓋取梁宣義將軍之名顯慶制男出身從七品以下敘承奉郎隋置散官唐因之承務郎唐置蓋因隋尚書省二十四司承務郎之名而設也儒林郎隋置散官蓋取前史儒林傳之義唐因之登仕郎唐置文林郎隋置散官蓋取北齊文林館召徵文學之士以充之義唐因之將仕郎隋置散官唐因之自朝議郎以下並為文散官其散官自五品依本品衣服而無俸祿不朝會自六品以下黃衣執笏於尚書省分番上下兩番以上即便隨番許練通時務者始得參選武德令職事髙者解散官欠一階不至者為兼職事卑者不解散官貞觀十一年改令以職事髙者為守職事卑者為行其欠一階依舊為兼與當階者皆解散官官階相當無行無守其子孫用廕皆依其後散官類例紛錯難可悉舉乾封元年正月制內外官九品以下加一階七品以上加二階八品以下更加勳轉乾封以來未冇泛階應入三品皆以恩舊特拜入五品多因進敘計偕至朝散大夫以上奏取進止每年量多少進敘餘依本品授官若滿三計至郎一切聽入乾封以後始有由泛階入五品二品驃騎將軍漢武帝元狩二年始用霍去病為驃騎將軍定令令驃騎將軍祿秩與大將軍等光武中興以耿丹為驃騎大將軍位在三公下明帝初即位以弟東平王蒼有賢才以為驃騎將軍以王故位在公上蒼為驃騎輔政開東閣延英雄及蒼歸國有驃騎時吏丁牧周相以蒼敬賢下士不忍去之遂為王家大夫數十年事祖及孫後帝又間褒表之數年復罷魏晉並有之梁雜號中亦有陳後主以蕭摩訶為侍中驃騎大將軍加左光祿大夫特開黃閣施行馬聽事寢堂置鴟尾如三公制後魏初加大則在三司上太和中制加大則在都督中外諸軍之下後周亦有之隋開皇中置驃騎將軍府每府置驃騎將軍車騎將軍各二人十七年頒銅獸符於驃騎車騎府焬帝改驃騎將軍為鷹揚郎將改車騎為鷹揚副郎將唐復改為車騎驃騎其制如開皇而復益微矣故武德元年詔以軍頭為驃騎將軍軍副為車騎將軍又詔太子諸率府各置驃騎將軍五員車騎將軍十員後皆省之顯慶元年仍置復以驃騎將軍大將軍為武散官輔國將軍後漢獻帝置輔國將軍以伏完為之晉王濬平吳後拜輔國大將軍有司奏輔國依比未為逹官不置司馬不給官騎詔依征鎮給大車增兵五百人為輔國營親騎百人官騎十人置司馬宋明帝太始四年改為輔師將軍後廢帝元徽二年復故梁後魏後周隋並有之唐輔國大將軍為武散官鎮軍將軍以下鎮軍大將軍魏置文帝以陳羣為之晉則楊駿胡奮並領鎮軍將軍齊後周隋亦有之唐因之冠軍將軍魏置以文欽為之此因史記楚義帝以宋義為卿子冠軍漢武帝以霍去病功冠三軍封冠軍侯之義也晉亦有之金章紫綬給五時服武冠佩水蒼玉厯代並有隋文帝置翊軍等四十三號將軍品凡十六等為散號將軍以加泛授居曹冇職務者為執事官無職務者為散官武官以上柱國以下為散實官將軍各為散號官至煬帝時定令罷之唐因之雲麾將軍梁置雜號陳及唐並有之忠武將軍壯武將軍梁置雜號陳有之唐因之宣威將軍唐置明威將軍梁置雜號後魏亦有之唐因之定逺將軍梁置雜號唐因之寧逺將軍晉置唐因之遊騎將軍魏置陳有之唐因之遊擊將軍漢武帝置以蘇建韓説為之後漢鄧晨亦為之晉及陳並有之唐因之又置懷化大將軍歸德將軍等以授蕃官諸校尉附漢武帝初置中壘屯騎步兵越騎長水胡騎射聲虎賁等校尉為八校各有司馬後漢以屯騎越騎步兵長水射聲為五校皆掌宿衛兵蔡質漢儀曰五營司馬見校尉執版不拜並屬北軍中候時五校官顯職間而府寺寬敞輿服光麗伎巧必給故多以皇族肺腑居之至靈帝又置西園八校尉其名上軍中軍下軍典軍助軍佐軍以及左右二校尉自魏晉以下五校之名與後漢同唯後魏五校各置二十人中壘校尉漢掌北軍營壘門內又外掌西域後漢省中壘但置北門中候掌監五營門屯騎校尉漢掌騎士後漢初改為驍騎建武十五年如舊步兵校尉漢掌上林苑門屯兵晉阮籍聞步兵騎營人善釀有貯酒三百斛乃求為之又至隋時列屬鷹楊府越騎校尉漢掌越人內附以為騎也後漢初改為青巾右校尉至建武十五年復如舊制長水校尉漢掌長水宣曲胡騎宣曲觀名胡騎之屯宣曲者宋志引韋昭曰長水校尉典胡騎廄近長安水亭之左故以為名又為宣曲之稱長水蓋關中小水名也又主烏桓騎胡騎校尉漢掌池陽胡騎不常置胡騎之屯池陽後漢并長水射聲校尉漢掌待詔射聲士工射者冥冥中聞聲射則中因以名也須待所命而射故曰待詔射聲虎賁校尉漢掌輕車至後漢并射聲城門校尉漢掌京師城門屯兵凡八屯後漢以掌雒陽城門十二所若周禮司門晉干寶注曰如今校尉也驃姚校尉漢武以霍去病為之護烏桓校尉漢武帝時烏桓屬漢始於幽州部置之擁節監領後漢亦謂之領烏桓校尉主領烏桓胡并領鮮卑李膺為此官也戊巳校尉漢元帝初元元年置甲乙丙丁庚辛壬癸皆有正位唯戊巳寄治耳此所置校尉亦無常居故取戊巳為名一説戊巳居中鎮覆四方漢所置校尉亦處西域之中撫諸國也護羌校尉後漢在涼州部持節職主西羌元康元年改為涼州刺史儒林校尉蜀先主以周羣為之南蠻校尉晉武帝於襄陽置之元康中改為荆州刺史及江左初省尋又置於江陵齊書曰齊宋之際刺史多不領南蠻别以重人居之唯齊豫章郡王嶷為南蠻校尉又改為荆襄二州刺史南夷校尉晉武帝於寧州置之江左改曰鎮蠻校尉西戎校尉晉武帝於長安置之元康中改為雍州刺史安帝義熙中又置治於漢中寧蠻校尉晉安帝置治襄陽以授魯宗之護三巴校尉宋置齊建元二年改為刺史武騎尉屯騎尉驍騎尉遊騎尉飛騎尉旅騎尉雲騎尉羽騎尉建節尉奮武尉宣惠尉綏德尉懷仁尉守義尉奉誠尉立信尉都十六尉並隋置以為武散官昭武振威致果翊衛宣節禦侮仁勇倍戎八校尉各有副尉並唐採前代諸校尉以下舊名置自鎮軍將軍以下為武散官次勳官第十三上柱國柱國皆楚之寵官楚懷王使柱國昭陽將兵攻齊陳軫問楚國之法破軍殺將者何以貴之昭陽曰其官為上柱國是也陳勝為王蔡賜為上柱國厯代無聞至後魏孝莊以爾朱榮有翊戴之功拜為柱國大將軍位丞相上又拜大丞相天柱大將軍增佐吏及榮敗後天柱及柱國將軍官遂廢至大統中始以宇文泰為之其後功參佐命聲實俱重者亦居此職自大統十六年以前任者凡有八人宇文泰元欣李弼獨孤信趙貴于謹侯莫陳崇時宇文泰任總百揆督中外軍事元欣以魏氏懿戚從容禁闥而已其餘六人各督二大將軍凡十二大將軍當時榮盛莫與為比其稱門閥者咸推八柱國家其後功臣位至柱國者衆矣咸是散秩無復統御也後周建德四年增置上柱國大將軍隋置上柱國柱國以酬勳勞並為散官實不理事唐改為上柱國及柱國秦有護軍都尉漢因之髙帝時以陳平為護軍中尉盡護諸將然則復以都尉為中尉陳平為護軍中尉人讒之曰平受諸將金多者得善處少者得惡處武帝元狩四年以護軍都尉屬大司馬于時復為都尉矣成帝綏和元年居大司馬府比司直也哀帝元夀元年更名曰司寇平帝元始元年更名護軍初韓安國以護軍將軍擊胸奴趙充國以大將軍都尉擊武都漢東京省班固為大將軍中護軍隸將軍幕府非漢朝列職魏武帝為丞相以韓浩為護軍史奐為領軍亦非漢官也建安十二年改護軍為中護軍領軍為中領軍魏初因置護軍將軍主武官選隸領軍晉世則不隸矣元帝永昌元年省護軍并領軍明帝太寧二年復置魏晉江右領護各領營兵江左以來領軍不復别置營總管二衛驍騎材官諸營護軍猶有别營也周顗庾亮王羲之謝安王彪之等並為中護軍宋護軍將軍一人掌外軍領護資重者為領軍將軍護軍將軍資輕者為中領軍中護軍其官屬有長史司馬功曹主簿五官其官受命出征則置參軍齊梁陳並有之北齊護軍府統四中郎將皆置佐史隋煬帝十二衛每衛置護軍四人以副將軍將軍無則一人攝尋改護軍為虎賁郎將唐採前代舊名置上護軍護軍輕車將軍漢武帝置以公孫賀為之又有輕車校尉梁陳後魏北齊亦有輕車將軍唐採舊名置上輕車都尉輕車都尉騎都尉漢武帝置以李陵為之更始初亦有故時謡云爛羊胃騎都尉晉以後厯代皆有之唐採舊名置上騎都尉騎都尉驍騎尉飛騎尉雲騎尉武騎尉並隋置為文散官唐採置之自上柱國以下並為勳官命婦第十四凡皇帝嬪妃及太子良娣以下為內命婦公主及王妃以下為外命婦公主及縣主之制已附見后妃傳今所載者王公以下之妻耳凡三代之制諸侯之婦曰夫人大夫曰孺人士曰婦人庶人曰妻公侯有夫人有世婦有妻有妾邦君之妻君自稱之曰夫人夫人自稱於天子曰老婦自稱於天子謂畿內諸侯之夫人自稱於諸侯曰寡小君謂饗來朝諸侯之時自稱於其君曰小童邦人稱之曰君夫人異邦人稱之亦曰君夫人自世婦以下自稱曰婢子凡婦人無爵從夫之爵坐以夫命之齒爵為夫命也夫為大夫則以妻為命婦至秦漢婦人始有封君之號公主有邑司之制唐外命婦之制諸王母妻及妃文武官一品及國公其非始封者帶三品以上亦同母妻為國夫人三品以上母妻為郡夫人四品母妻為郡君若勳官二品冇封亦同四品五品母妻為縣君若勳官三品有封者亦同散官同職事若勳官四品有封母妻為鄉君其母邑號皆加太字視夫子之品若夫子兩冇官及爵或一人有官及爵者皆從髙廕其不因夫子别有邑號者夫人云某品夫人郡君云某品郡君縣君鄉君準此諸庶子有五品以上官封者若嫡母在所生之母不得為太妃以下無者聽之其承重者不合中宗時韋皇后表請諸婦人不因夫子而加邑號許同見任職事聽子孫用蔭門施棨戟制從之武太后時契丹冦平州刺史鄒保英妻爰氏率城內女子助守賊遂退封為成節夫人開元八年五月敕準令王妻為妃文武官及國公妻為夫人母加太字一人有官及爵者聽從髙敘但王者名器殊恩或頒異姓妻合從夫授秩甲令更無别條率循舊章須依往例自今已後郡嗣及異姓王母妻並宜準令為妃貞元六年太常卿崔縱奏諸國王母未有封號請遵典故為某國太妃吏部郎中栁冕等狀稱厯代故事及六典無公主母稱號伏請降於王母一等命為太儀各以公主本封加太儀云上從之臣謹按如淳曰列侯之妻稱夫人列侯死子復為列侯乃得稱太夫人子不為列侯則不得稱之晉亦有之羊祜卒二嵗而平吳武帝流涕曰羊太傅之功因以䇿告祜廟仍依蕭何故事封其夫人夏侯氏為萬嵗鄉君食邑五千戶又泰始詔太傅夀光公鄭沖太保朗陵公何曾皆假夫人世子印綬食本秩三分之一皆如郡公侯比又王導妻卒贈金章紫綬又虞潭母亦拜為武昌侯太夫人加金章紫綬潭立養堂於家王導以下皆就拜謁臣又按宋鄱陽侯孟懷玉上母擅拜國夫人有奏許之御史中丞袁豹以為婦人從夫之爵懷玉父導見任大司農其妻不宜從子奏免尚書右僕射劉抑左丞徐羡之郎何劭之官詔並贖論又按後周宣帝令內外命婦皆執笏其拜廟及天臺皆俯伏祿秩第十五祿秩幹執衣白直閣仗身士庶僕力親事夫帳內防邑士門等附致仕官祿職田公廨田周班爵祿之制孟子言其略而王制亦言之矣上至天子下至庶人之在官者各有差焉漢制祿秩自中二千石至百石各有等差宣帝又益天下吏百石以下俸十五至成帝陽朔二年除八百石五百石秩除八百就六百除五百就四百綏和二年又益吏三百石以下俸凡吏比二千石以上年老致仕者三分故祿一以與之終其身其時亦有俸錢之差但本史不具文耳故元帝時貢禹上書曰臣為諌議大夫秩八百石俸錢月九千二百廪食太官又拜為光祿大夫秩二千石俸錢月萬二千祿賜愈多家室日益富矣中二千石月俸百八十斛二千石百二十斛比二千石百斛千石八十斛六百石七十斛四百石五十斛比四百石四十五斛三百石四十斛比三百石三十七斛二百石三十斛比二百石二十七斛百石十六斛自四百石至二百石為長吏百石以下有斗食佐史之秩顔師古曰漢官名秩簿云斗食月俸一十斛佐史月俸八斛也一説云斗食者一嵗俸不滿百石計日而食日一斗二升故謂之斗食也是為小吏本史王莽詔曰自公卿以下一月之祿十斛緵布二匹帛一匹豫每念之令俸祿一嵗六十斛稍以差增上至四輔而為萬斛孟康曰緵八十縷也舊祿及穀粟及布帛又至已上增為三分之一舊令再從月俸增之後漢大將軍三公俸月三百五十斛風俗通曰漢制三公一嵗共食萬石按此則有出蓋舉大數也至建武二十六年增百官俸其千石以上減於西京舊制六百石以下增於舊秩本史永初四年又減百官及州縣俸各有差凡諸受俸皆取半錢榖延平中定制中二千石月俸錢九千米七十二斛真二千石錢六千五百米三十六斛比二千石錢五千米三十四斛千石錢四千米三十斛六百石錢三千五百米二十一斛四百石錢二千五百米十五斛三百石錢二千米一十二斛二百石錢一千米九斛一百石錢八百米四斛八斗凡中二千石丞比千石真二千石丞長史六百石比二千石丞比六百石令相千石者丞尉皆四百石其六百石者丞尉皆三百石長相四百石及三百石者丞尉皆二百石諸侯公主家丞秩皆比三百石諸邊障塞尉諸陵校尉長皆二百石有常例者不署秩本志例同大將軍三公臘賜錢各二十萬牛肉二百斤粳米二百石特進侯以下各有差立春之日遣使者賜文官司徒司空帛三十匹九卿十五匹武官太尉大將軍各六十匹執金吾諸校尉各三十匹武官倍文官漢官儀獻帝建安八年頒賜三公以下金帛由是三年一賜以為常制本史宋氏以來州郡秩俸及雜供給多隨土所出無有定準其郡縣田祿以芒種為斷前去官者則一年秩祿皆入前人此後去者悉入後人元嘉末又改此制計月分祿武帝初即位制凡中二千石祿者加公田一頃齊氏衆官有僮幹之役而不詳其制幹者若門僕之類也梁武帝天監元年定九品令帝於品下注一品秩為萬石第二第三品為中二千石第四第五品為二千石及侯景之亂國用常褊京官文武月得廩食多遙帶一郡縣官而取其祿秩焉北齊官秩一品每嵗八百匹二百匹為一秩從一品七百匹一百七十五匹為一秩二品六百匹一百五十匹為一秩從二品五百匹一百二十五匹為一秩三品四百匹一百匹為一秩從三品三百匹七十五匹為一秩四品二百四十匹六十匹為一秩從四品二百匹五十匹為一秩五品一百六十匹四十匹為一秩從五品一百二十匹三十匹為一秩六品一百匹二十五匹為一秩從六品八十匹二十匹為一秩七品六十匹十五匹為一秩從七品四十匹十匹為一秩八品三十六匹九匹為一秩從八品三十二匹八匹為一秩九品二十八匹七匹為一秩從九品二十四匹六匹為一秩祿率一分以帛一分以粟一分以錢事繁者優一秩平者守本秩間者降一秩長兼試守者亦降一秩官非執事不朝拜者皆不給祿州郡縣制祿之法刺史守令下車各前取一時之秩上上州刺史嵗秩八百匹與司州牧同上中上下各以五十匹為差中上降上下一百匹中中及中下亦以五十匹為差下上降中下一百匹下中下下亦各以五十匹為差上郡太守嵗秩五百匹降清郡尹五十匹上中上下各以五十匹為差中上降上下四十匹中中及中下各以三十匹為差下上降中下四十匹下中下下各以三十匹為差上上縣嵗一百五十匹與鄴臨漳成安三縣同上中上下各以十匹為差中上降上下三十匹中中及中下各以五匹為差下上降中下二十匹下中下下各以十匹為差州自長史下逮于史吏郡縣自丞以下逮于掾佐亦皆以帛為秩郡有尉者尉減丞之半皆以其所出常調課給之自一品以下至流外勳品各給士力一品至三十人以下流外勳品或以五人為等或以四人三人二人一人為等繁者加一等平者守本力間者降一等諸州刺史守令以下幹及力皆聽敕乃給其幹出所部之人一幹輸絹十八匹幹身放之力則以其州郡縣白直充後周制祿秩下士一百二十五石中士以上至於上大夫各倍之上大夫是為四千石卿二分孤三分公四分各益其一公因盈數為萬石凡頒祿視年之上下畝至四釡為上年上年頒其正三釡為中年中年頒其半二釡為下年下年頒其一無年為凶荒不頒祿隋京官正一品祿九百石其下每以百石為差至正四品是為三百石從四品二百五十石其下每以五十石為差至正六品是為一百石從六品九十石以下每以十石為差至從八品是為五十石食封及官不判事者并九品皆不給祿其給皆以春秋二季刺史太守縣令則計戶而給祿各以戶數為九等之差大州六百二十石其下每以四十石為差至於下下則三百石大郡三百四十石其下每以三十石為差至於下下則一百石大縣百四十石其下每以十石為差至於下下則六十石其祿唯刺史二佐及郡守縣令本志文帝時嘗以百僚供費不足臺省府寺咸置廨錢收息取給工部尚書蘇孝慈以為官人爭利非興化之道上表請罷從之公卿以下及給職田各有差義寧二年唐王為相國罷外官給祿每十斛給地二十畝也唐武德中外官無祿貞觀二年制有上考者乃給祿其後遂定給祿俸之制以民地租充之京官正一品七百石從一品六百石正二品五百石從二品四百六十石正三品四百石從三品三百六十石正四品三百石從四品二百六十石正五品二百石從五品一百六十石正六品一百石從六品九十石正七品八十石從七品七十石正八品六十七石從八品六十二石正九品五十七石從九品五十二石諸給祿者三師三公及太子三師三少若在京國諸司文武官職事九品以上并左右千牛備身左右太子千牛並依官給其春夏二季春給秋冬二季秋給在京文武官每嵗給祿總一十五萬一千五百三十三石二斗自至德後不給其在外文武官九品以上準官皆降京官以上一等給其文武官在京長上者則不降諸給祿應降等者正從一品各以五十石為一等二品三品皆以三十石為一等四品五品皆以二十石為一等六品七品皆以五石為一等八品九品皆以二石五斗為一等其俸錢之制在京諸司官初置公廨及蕃官興易以充其俸貞觀十二年罷公廨置胥士七千人取諸州上戶為之準防閣例而收其課三嵗一更計員少多而分給焉十五年以府庫尚虛敕在京諸司依舊置公廨給錢充本置令史府史胥士等令回易納利以充官人俸諫議大夫褚遂良上疏曰國家制令憲章三代商賈之人不居官位陛下近許諸司令史捉公廨本錢諸司取此色人號為捉錢令史不簡性識寧論書藝但令身能賈販家足資財録牒吏部即依補擬輸錢於官以獲品秩茍得無耻豈蹈亷隅太宗納之停諸司捉錢依舊本府給月俸二十一年復依故制置公廨給錢為之本置令史府胥士等職賈易收息以充其俸永徽元年悉發胥士等更以諸州租調腳直充之其後又令薄賦百姓一年稅錢依舊令髙戶及典正等掌之每月收息錢以充官俸其後又以稅錢為之而罷其息利凡在京文武正官每嵗供給俸食等錢并防閣庶僕及雜息等錢總一十五萬三千七百二十貫員外官不在此數外官則以公廨田收及息錢等常食公用之外分充月料先以長官定數其州縣少尹長史司馬及丞各減長官之半尹大都督府長史及副都督别駕及判司準二佐以職田數為加減其參軍及博士減判司主簿縣尉減縣丞各三分之一儀鳯二年制內外官俸食邑防閣邑士白直等宜令王公以下率口出錢充給焉調露元年九月職事五品以上準舊給仗身開元十年正月省王公以下視品官參佐及京官五品以上官仗身職員凡在京司文武職事官五品以上給防閣一品九十六人二品七十二人三品四十八人四品三十二人五品二十四人六品以下給庶僕六品五人七品四人八品三人九品二人公主邑主八十人郡主六十人縣主四十人特封縣主三十四人京官仕兩職者從多給凡州縣官皆有白直二品四十人三品三十二人四品二十人五品十六人六品十人七品六人八品五人九品四人凡諸親王府屬並給士力數如白直其防閣庶僕白直士力納課者每年不過二千五百執衣元不過一千文防閣庶僕舊制季分月俸食料雜用即有分諸官應月給開元二十四年六月乃撮而同之通謂之俸料一品月俸八千食料千八百雜用千二百防閣十五千通計二十六千自二品而下各有差二品通計二十四千二百三品通計十七千四百四品通計十一千五百六十七五品通計九千二百六品月俸二千食料四百雜用四百庶僕二千五百通計五千三百自六品而下皆用庶僕亦各有差七品通計四千五十八品通計二千五百五十九品通計千九百其數自唐初以來即有中間色目或有加減此方為定制諸州倉庫門須守護者謂之門夫後亦舉其名而收其資以給郡縣官致仕官祿唐令諸職事官年七十五品以上致仕者各給半祿謂如元制依開元五年十月敕致仕應請物令所由送至所居之宅職田公廨田古者自卿以下必有圭田圭田五十畝餘夫二十五畝故王制曰公田藉而不稅秦漢之間不詳其制至晉公卿猶各有采田及田騶多少之級後魏孝文太和五年州刺史郡太守并官節級給公田隋文帝開皇中以百僚供費不足咸置廨錢收息取利蘇孝慈上表請罷於是公卿以下內外官給職分田一品給五頃至五品則為三頃其下每以五十畝為差又給公廨田以供用唐凡應在京諸司各有公廨田司農寺給二十六頃殿中省二十五頃少府監二十二頃太常寺二十頃京兆府河南府各十七頃太府寺十六頃吏部戶部各十五頃兵部內侍省各十四頃中書省將作監各十三頃刑部大理寺各十二頃尚書都省門下省太子左春坊各十一頃工部十頃光祿寺太僕寺祕書省各九頃禮部鴻臚寺都水監太子詹事府各八頃御史臺國子監各七頃其京縣亦準此左右衛太子家令寺各六頃衛尉寺左右驍衛左右武衛左右威衛左右領軍衛左右金吾衛左右監門衛太子左右春坊各五頃太子左右衛率府太史局各四頃宗正寺左右千牛衛太子僕寺左右司禦率府左右清道率府左右監門率府各三頃內府左右內率府率更府各二頃在外諸司公廨田亦各有差大都督府四十頃中都督府三十五頃下都督府都護府上州各三十頃中州二十頃官總監下州各十五頃上縣十頃中縣八頃下縣六頃上牧監上鎮各五頃上縣及中下牧司竹監中鎮諸軍折衝府各四頃諸冶監諸倉監下鎮上關各三頃牙市監諸屯監上戍中關及津各二頃其津𨽻都水使者不給下關一頃十五畝中戍下戍嶽瀆各一頃諸京官文武職事各有職分田一品十二頃二品十頃三品九頃四品七頃五品六頃六品四頃七品三頃五十畝八品二頃五十畝九品二頃並去京城百里內給其京兆河南府及京縣官人職分田亦準此即百里內地少欲於百里外給者亦聽之諸州及都護府親王府官人職分之田亦各有差二品十二頃三品十頃四品八頃五品七頃六品五頃京畿縣亦準此七品四頃八品三頃九品二頃五十畝鎮戍關津嶽瀆及在外監官五品五頃六品三頃五十畝七品三頃八品二頃九品一頃五十畝三衛中郎將上府折衝都尉各六頃中府五頃五十畝下府及諸郎將各五頃上府果毅都尉四頃中府三頃五十畝下府三頃上府長史别將各三頃中府下府各二頃五十畝親王府典軍五頃副典軍四頃千牛備身左右太子千牛備身各三頃諸軍上折衝府兵曹二頃十畝中府下府各一頃五十畝其外軍校尉一頃二十畝旅帥一頃隊正副各八十畝皆於領側州縣界內給其校已下在本家及去家百里內領者不給其田亦借民佃植至秋冬受數而已諸職分陸田限三月三十日稻田限四月三十日以前上者並入後人以後上者入前人其麥用田以九月三十日為限若前人自耕未種後人酬其功直已自種者租準分法開元十年六月敕所置職田本非古法爰自近制是以因循事有變通應須刪改其內外所給職田從今年九月以後並宜停給十八年六月京官職田特令準令給受復用舊制自大厯以來關中匱竭時物騰踴內官不給仍減外官職田三分之一以給京官俸每嵗通計給文武官正員外員及內侍省間廄五坊南北宿衛使并教坊人家雜糧等凡給田米前後可約七十萬石數官品第十六書言唐虞建官惟百夏商倍之明堂位言虞官五十夏官百商官二百然其秩命則未之聞周始分九命以官人秦制爵二十等以賞功勞見王侯封爵篇二漢亦因秦二十等以為差功之賞而不為常秩其官秩自二千石至百石有等降魏之祿秩差次亦遵漢制以定九品焉晉宋因之梁之祿秩不異於魏而易品為班更定十八班陳復舊制仍遵九品後魏建官初有九品又有從品每一品之中分上中下三等至孝文太和二年十二月改次職令除其中等自第四品以下正從又分上下階北齊因之後周效成周建六官亦以九命官人其六官之外兼用秦漢等官然於九命之中而分正命猶下上階也謂王朝之官為內命諸侯及州縣官為外命隋開皇中削周用齊而以九品定流內分正從自第四品以下又分上下階其流外官又置視流內品至煬帝除上下階惟留正從九品又定朝之班敘以品之髙卑為列品同則以省府為前後省府同則以局寺為前後唐有四品以下亦分上下階大抵因隋制然則魏定九品之後與今不殊惟漢制異於是後漢守前漢之規而有加焉其間亦小有升降不為差異今獨存西京之故制云漢官秩差次丞相太尉司徒司空諸將軍及諸侯王國官不在此目後漢則太傅三公大將軍驃騎大將軍亦不在此目中二千石月百八十斛王莽改曰卿御史大夫太常光祿勳衛尉太僕大鴻臚廷尉宗正大司農少府執金吾二千石月百二十斛王莽亦曰真二千石上大夫太子太傅少傅將作大匠太子詹事大長秋典屬國水衡都尉京兆尹左馮翊右扶風司隸校尉城門校尉中壘校尉屯騎校尉步兵校尉越騎校尉長水校尉胡騎校尉射聲校尉虎賁校尉州牧郡太守比二千石月百斛王莽亦改為中大夫丞相司直光祿大夫光祿中郎五官左右三將光祿虎賁中郎將光祿中郎將騎都尉西域都護副校尉奉車都尉駙馬都尉郡尉千石月八十斛王莽改為下大夫丞相長史大司馬長史御史中丞更名御史長史前後左右將軍長史太常丞光祿勳丞衛尉丞太僕丞廷尉左右監大鴻臚丞宗正丞大司農丞少府丞執金吾丞太子衛率萬戶以上縣令而其次比千石光祿太中大夫光祿郎中車戶騎三將光祿謁者僕射光祿虎賁郎八百石成帝除八百石秩太子家令下比八百石光祿勳諫大夫六百石月七十斛王莽改曰元士衛尉公車司馬令衛士令旅賁令廷尉左右平太子門大夫太子庶子將作大匠丞太子詹事丞水衡都尉丞京兆尹丞左馮翊丞右扶風丞州刺史郡丞郡長史郡尉丞次萬戶以上縣令比六百石月六十斛太常太博士光祿議郎中郎光祿謁者掌賔讃受事員西域都護丞司馬候五百石成帝除五百石秩王莽復置故以為命士減萬戶縣長四百石月四十五斛自四百石至二百石為刺史王莽改曰中士太子中盾萬戶以上縣丞次萬戶以上縣丞減萬戶縣丞比四百石光祿侍郎三百石月四十斛王莽改為下士次減萬戶縣長比三百石月三十七斛光祿郎中二百石月三十斛萬戶以上縣尉次萬戶以上縣尉減萬戶縣尉百石自百石已有計食佐史之秩為少吏王莽改百石秩曰庶士通志卷五十七
