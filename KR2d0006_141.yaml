body:
  text: 通志卷一百二十一上宋右廸功郎鄭樵漁仲撰列傳第三十四上晉王祥弟覧鄭冲何曽子劭遵石苞子崇孫歐陽建鑠羊祜杜預子鍚陳騫子輿裴秀子頠楷秀從弟楷子憲衛瓘子恒孫璪玠張華子禕卞韙劉王沈子浚荀顗荀勗子藩子䆳藩藩弟組奕組子馮紞賈充孫謐模充弟混族子郭彰楊駿弟珧濟王祥字休徴琅邪臨沂人漢諌議大夫吉之後也祖仁青州刺史父融公府辟不就祥性至孝早喪親繼母朱氏不慈數譖之由是失愛於父毎使埽除牛下祥愈㳟謹父母有疾衣不觧帯湯藥必親嘗母嘗欲生魚時天寒冰凍祥觧衣将剖冰求之氷忽自觧雙鯉躍出持之而歸母又思黄雀炙復有黄雀數十飛入其幕復以供母鄉里驚歎以為孝感之所致焉有丹奈結實母命守之毎風雨祥輙抱樹而立其篤孝純至如此漢末遭亂扶母擕弟覧避地廬江隐居三十餘年不應州縣之命母終居喪毁瘁杖而後起徐州刺史呂䖍檄為别駕祥年垂耳順固辭不受覧勸之為具車牛祥乃應召䖍委以州事于時宼盗充斥祥率勵兵士頻討破之州界清静政化大行時人歌之曰海沂之康實頼王祥邦國不空别駕之功舉秀才除温令累遷大司農髙貴鄉公即位與定䇿功封闗内侯拜光禄勲轉司𨽻校尉從討毌邱儉増邑四百户遷太常封萬嵗亭侯天子幸太學命祥為三老祥南面几杖以師道自居天子北面乞言祥陳明王聖主君臣政化之要以訓之聞者莫不砥礪及髙貴鄉公之弑也朝臣舉哀祥號哭曰老臣無状涕淚交流衆有愧色頃之拜司空轉太尉加侍中五等建封睢陵侯邑一千六百户及武帝為晉王祥與荀顗徃謁顗謂祥曰相王尊重何侯既已盡敬今便當拜也祥曰相國誠為尊重然是魏之宰相吾等魏之三公相去一階而已班例大同安有天子三司而輙拜人者損魏朝之望虧晉王之徳君子愛人以禮吾不為也及入顗遂拜而祥獨長揖帝曰今日方知君見顧之重矣武帝踐阼拜太保進爵為公加置七官之職帝新受命虚己以求讜言祥與何曽鄭冲等耆艾篤老希復朝見帝遣侍中任愷諮問得失及政化所先祥以年老疲耄累乞遜位帝不許御史中丞侯史光奏祥久病闕朝㑹禮請免祥官詔不許祥固乞骸骨詔聴以睢陵公就第位同保傅在三司之右禄賜如前又詔賜几杖不朝大事皆咨訪之賜安車駟馬第一區錢百萬絹五百匹牀帳簟褥以舍人六人為睢陵公舍人置官騎二十人以公子騎都尉肇為給事中使常優游定省又以太保髙潔清素家無宅宇其權留本府須所賜第成乃出及疾篤著遺令訓子孫曰夫生之有死自然之理吾年八十有五啓手何恨不有遺言使爾無述吾生值季末登庸歴試無毗佐之勲没無以報氣絶但洗手足不須沐浴勿纒尸皆澣故衣隨時所服所賜山元玉珮衛氏玉玦綬笥皆勿以殮西芒山土自堅貞勿用甓石勿起墳隴穿深二丈槨取容棺勿作前堂布几筵置書箱鏡奩之具棺前但可施牀榻而已糒脯各一盤元酒一杯為朝夕奠家人大小不須送喪大小祥乃設特牲無違余命髙柴泣血三年夫子謂之愚閔子除喪出見援琴切切而哀仲尼謂之孝故哭泣之哀日月降殺飲食之宜自有制度夫言行可覆信之至也推羙引過徳之至也揚名顯親孝之至也兄弟怡怡宗族欣欣悌之至也臨財莫過乎讓此五者立身之本顔子所以為命未之思也夫何逺之有其子皆奉而行之泰始五年薨年八十有五詔賜東園祕器朝服一具衣一襲錢三十萬布帛百匹明年䇿諡曰元祥之薨奔赴者非朝廷之賢則親親故吏而已門無雜弔之賔族孫戎歎曰太保可謂清逹矣又稱祥在正始世不在能言之流及與之言理致清逺将非以徳掩其言乎祥有五子肇夏馥烈芬肇孽庶夏早卒馥嗣爵咸寧初以祥家甚貧儉賜絹三百匹拜馥上洛太守卒諡曰孝子根嗣散騎郎肇仕至始平太守肇子俊守太子舍人封永世侯俊子遐鬱林太守烈芬並幼知名為祥所愛二子亦同時而亡将死烈欲還𦵏舊土芬欲留葬京邑祥流涕曰不忘故鄉仁也不戀本土達也惟仁與逹吾二子有焉祥弟覧覧字元通母朱氏遇祥無道覧年數嵗見祥被楚捶輙涕泣抱持至于成童毎諌其母其母少止凶虐朱屢以非理使祥覧輙與祥俱又虐使祥妻覧妻亦趣而共之朱患之乃止祥喪父之後漸有時譽朱深疾之密使鴆祥覧知之徑起取酒祥疑有毒争而不與朱遽奪反之自後朱賜祥饌覧輙先嘗朱懼覧致斃遂止覧孝友恭恪名亞於祥及祥仕進覧亦應本郡之召稍遷司徒西曹掾清河太守五等建封即邱子邑六百户泰始末除𢎞訓少府職省轉太中大夫禄賜與卿同咸寧初詔以覧為宗正卿頃之以疾上䟽乞骸骨詔聴之以大中大夫歸老賜錢二十萬牀帳薦褥遣殿中醫療疾給藥後轉光禄大夫歸老門施行馬咸寧四年卒時年七十三諡曰貞有六子裁字士初撫軍長史基字士先治書御史㑹字士和侍御史正字士則尚書郎彦字士治中護軍琛字士偉國子祭酒初呂䖍有佩刀工相之以為必登三公可服此刀䖍謂祥曰茍非其人刀或為害卿有公輔之量故以相與祥始固辭彊之乃受祥臨薨以刀授覧曰汝後必興足稱此刀覧後弈世多賢才興於江左矣裁子導别有傳鄭冲字文和滎陽開封人也起自寒㣲卓爾立操清恬寡慾耽玩經史遂博究儒術及百家之言有姿望動必循禮任真自守不要鄉曲之譽由是州郡久不加禮及魏文帝為太子搜揚仄陋命冲為文學累遷尚書郎出補陳留太守冲以儒雅為徳莅職無幹局之譽簞食緼袍不營資産世以此重之大将軍曹爽引為從事中郎轉散騎常侍光禄勲嘉平三年拜司空及髙貴鄉公講尚書冲執經親授與侍中鄭小同俱被賞賜俄轉司徒常道鄉公即位拜太保位在三司之上封夀光侯冲雖位階台輔而不預世事時文帝輔政平蜀之後命賈充羊祜等分定禮儀律令皆先諮於冲然後施用及魏帝告禪使冲奉策武帝踐阼拜太傅進爵為公頃之司𨽻李憙中丞侯史光奏冲及何曽荀顗等各以疾病俱應免官帝不許冲遂不視事表乞骸骨優詔不許遣使申喻冲固辭上貂蟬印綬詔又不許泰始六年詔冲與太保朗陵公何曽太尉臨淮公荀顗及司空博陵元公王沉衛将軍鉅平侯羊祜各於本國置郎中令假夫人世子印綬食本秩三分之一如郡公侯比九年冲又抗表致仕詔聴所執以夀光公就第位同保𫝊在三公之右賜几杖不朝朝有大政輙就諮訪又賜安車駟馬第一區錢百萬絹五百匹牀帷簟褥置舍人六人官騎二十人以世子徽為散騎常侍使常優游定省禄賜所供策命儀制一如舊典明年薨帝於朝堂發哀追贈太傅賜祕器朝服衣一襲錢三十萬布百匹諡曰成咸寧初有司奏冲與安平王孚等十二人皆存銘太常配食于廟初冲與孫邕曹羲荀顗何晏共集論語諸家訓註之善者記其姓名因從其義有不安者輙改易之名曰論語集觧成奏之魏朝于今𫝊焉冲無子以從子徽為嗣位至平原内史徽卒子簡嗣何曽字潁考陳國陽夏人也父䕫魏太僕陽武亭侯曽少襲爵好學博聞與同郡袁侃齊名魏明帝初為平原侯曽為文學及即位累遷散騎侍郎汲郡典農中郎将給事黄門侍郎上䟽曰今之郡守則古列國之君也上當奉宣朝恩以致惠和下當興利而除其害故得其人則可安非其人則為患况今國家大舉新有發調軍師逺征上下劬勞是以郡守益不可不得其人臣聞諸郡守有年老或疾病皆委政丞掾不恤庶事或體性疎怠不以政理為意在官積年惠澤不加於人然於考課之限罪亦不至免絀故得經延嵗月而無斥罷之期臣愚以為可密詔主者使隐核參訪郡守其有老病不隐親人物及宰牧少恩好修人事煩撓百姓者皆可徴還為更選代頃之遷散騎常侍及宣帝将伐遼東曽上疏魏帝曰臣聞先王制法必全於慎故建官受任則置副佐陳師命将則立監貳宣命遣使則設介副臨敵交刃又參御右蓋以盡思謀之功防安危之變也是以在險當難則權足相濟隕缺不豫則才足相代其為國防至深至逺及至漢氏亦循舊章韓信伐趙張耳為貳馬援討越劉隆副軍前世之跡著在篇志今太尉奉辭伐罪精甲鋭鋒歩騎數萬道路廻阻且四千里雖假天威有征無戰宼或潛遁消引日月命無常期人非金石逺慮詳備誠宜有副今北軍諸将及太尉所督皆為僚屬名位不殊素無定分統御之尊卒有變急不相鎮攝存不忘亡聖逹所裁臣愚以為宜選大臣名将威重宿著者成其禮秩遣詣北軍進同謀略退為副佐雖有萬一不虞之變軍主有儲則無患矣帝不從出補河内太守在任有威嚴之稱徴拜侍中母憂去官嘉平中為司𨽻校尉撫軍校事尹模慿寵作威姦利盈積朝野畏憚莫敢言者曽奏劾之朝廷稱焉時曹爽専權宣帝稱疾曽亦謝病爽誅乃起視事魏帝之廢也曽預其謀焉時歩兵校尉阮籍負才放誕居喪無禮曽面責籍於文帝座曰卿縱情背禮敗俗之人今忠賢執政綜核名實若卿之曹不可長也因言於帝曰公方以孝治天下而聴阮籍以重哀飲酒食肉於公座乎宜擯四裔無令汚染華夏帝曰此子羸病若此君不能為吾忍邪曽重引據辭理甚切帝雖不從時人甚憚之毌邱儉誅子甸妻荀應坐死其族兄顗族父虞並景帝姻通共表魏帝以匄其命詔聴離婚荀所生女芝為潁川太守劉子元妻亦坐死以懐妊繋獄荀辭詣曽乞恩曰芝繋在廷尉顧影知命計日備法乞没為官婢以贖芝命曽哀之騰辭上議朝廷僉以為當遂改法焉曽在司𨽻積年遷尚書正元中為鎮北将軍都督河北諸軍事假節将之鎮文帝使武帝齊王攸辭送數十里曽盛為賔主備太牢之饌侍從吏騶莫不醉飽帝既出又過其子劭曽先勅劭曰客必過汝汝當豫嚴劭不冠帯停帝良久曽深以譴劭其見崇重如此遷征北将軍進封潁昌鄉侯咸熙初拜司徒改封朗陵侯文帝為晉王曽以髙柔鄭冲俱為三公将入見曽獨致拜盡敬二人猶揖而已及武帝襲王位以曽為晉丞相加侍中與裴秀王沉等勸進踐阼拜太尉進爵為公食邑千八百户㤗始初詔以曽為太保侍中如故久之以本官領司徒曽固讓不許遣散騎常侍喻㫖乃視事進位太傅曽以年老屢乞遜位詔不許又進太宰侍中如故朝㑹劒履乗輿上殿如漢相國蕭何田千秋魏太傅鍾繇故事賜錢百萬絹五百匹及八尺牀帳簟褥自副置長史掾屬祭酒及員吏一依舊制所給親兵官騎如前主者依次按禮典務使優備後毎召見勅以常所服飲物自随令二子侍從咸寧四年薨年八十帝於朝堂素服舉哀賜東園祕器朝服一具衣一襲錢三十萬布百匹将葬下禮官議諡博士秦秀諡為繆醜帝不從䇿諡曰孝太康末子劭自表改諡為元曽性至孝閨門整肅自少及長無聲樂嬖幸之好年老之後與妻相見皆正衣冠相待如賓已南面妻北靣再拜上酒酬酢既畢便出一嵗如此不過兩三焉司𨽻校尉𫝊元嘗著論稱曽及荀顗以為極盡孝道足為君子之儀表然性奢豪務在華侈帷帳車服窮極綺麗厨膳滋味過於王者毎燕見不食太官所設帝輙令取其食蒸餅上不拆作十字不食食日萬錢猶云無下箸處人以小紙為書者勅記室勿報劉毅等數劾奏曽侈忲無度帝以其重臣一無所問都官從事劉享嘗奏曽華侈以銅鉤􅀈紖車瑩牛蹄角後曽辟享為掾或勸勿應享謂至公之體不以私憾遂應辟曽嘗因小事加享杖罰其外寛内忌亦此類也時司空賈充權擬人主曽卑充而附之及充與庾純因酒相競曽黨充而抑純以此為正直所非二子遵劭劭字敬祖少與武帝同年有總角之好帝為王太子以劭為中庶子及即位轉散騎常侍甚見親待劭雅有姿望逺客朝見必以劭侍直毎諸方貢獻帝輙賜之而觀其占謝焉咸寧初有司奏劭及兄遵等受故鬲令袁毅貨雖經赦宥宜皆禁止事下廷尉詔曰太保與毅有累世之交遵等所取差薄一皆置之遷侍中尚書惠帝即位初建東宫太子年幼欲令親萬機故盛選六傅以劭為太子太師通省尚書事後轉特進累遷尚書左僕射劭博學善屬文陳説近代事若指諸掌永康初遷司徒趙王倫簒位以劭為太宰及三王交争劭以軒冕而游其間無怨之者而驕奢簡貴亦有父風衣裘服玩新故巨積食必盡四方珍異一日之供以錢二萬為限時論以為太官御膳無以加之然優游自足不貪權勢常語鄉人王詮曰僕雖名位過幸少無可書之事惟與夏侯長容諌授博士可傳史冊耳所撰荀粲王弼傳及諸奏議文章並行於世永寧元年薨贈司徒諡曰康子岐嗣劭初亡袁粲弔岐岐辭以疾粲獨哭而出曰今年決下婢子品王詮謂之曰知死弔死何必見生岐前多罪爾時不下何公新亡便下岐品人謂中正畏彊易弱粲乃止劭庶兄遵字思祖少有幹能起家散騎黄門郎散騎常侍侍中累轉大鴻臚性亦奢忲役使御府工匠作禁物又鬻行器為司𨽻劉毅所奏免官太康初起為魏郡太守遷太僕卿又免官卒於家四子嵩綏機羡嵩字泰基寛𢎞愛士博觀墳籍尤善史漢少歴清官領著作郎綏字伯蔚位至侍中尚書自以繼世名貴奢侈過度性既輕物翰札簡傲城陽王尼見綏書疏謂人曰伯蔚居亂而矜豪乃爾豈其免乎劉輿潘滔譖之於東海王越越遂誅綏初曽侍武帝宴退而告遵等曰國家應天受禪創業垂統吾毎宴見未嘗聞經國逺圖惟説平生常事非貽厥孫謀之兆也及身而已後嗣其殆乎此子孫之憂也汝等猶可獲免指諸孫曰此輩必遇亂亡也及綏死嵩哭之曰我祖其大聖乎機為鄒平令性亦矜傲責鄉里謝鯤等拜或誡之曰禮敬年爵以徳為主令鯤拜勢懼傷風俗機不以為慙羡為離狐令既驕且吝陵駕人物鄉閭疾之如讎永嘉之末何氏滅亡無遺焉石苞字仲容勃海南皮人也雅曠有智局容儀偉麗不修小節故時人為之語曰石仲容姣無雙縣召為吏給農司馬㑹謁者陽翟郭元信奉使求人為御司馬以苞及鄧艾給之行十餘里元信謂二人曰子後並當至卿相苞曰御𨽻也何卿相乎既而又被使到鄴事久未決乃販鐵於鄴市市長沛國趙元儒名知人見苞異之因與結交嘆苞逺量當至公輔由是知名見吏部郎許允求為小縣允謂苞曰卿是我輩人當相引在朝廷何欲小縣乎苞還歎息不意允之知己乃如此也稍遷景帝中護軍司馬宣帝聞苞好色薄行以讓景帝帝答曰苞雖細行不足而有經國才略夫貞亷之士未必能經濟世務是以齊桓忘管仲之奢僭而録其匡合之大謀漢髙捨陳平之汙行而取其六竒之妙算苞雖未可以上儔二子亦今日之選也帝乃釋徙鄴典農中郎将時魏室王侯多居鄴下尚書丁謐貴傾一時並較時利苞奏列其事由是益見稱歴東萊琅邪太守所在有威惠遷徐州刺史文帝之敗於東闗也苞獨全軍而還帝指所持節謂苞曰恨不以此授卿以究大事乃遷苞為奮武将軍假節監青州諸軍事及諸葛誕舉兵淮南苞統青州諸軍督兖州刺史州泰徐州刺史胡質簡鋭卒為游軍以備外宼呉遣大将軍朱異丁奉等來迎誕等留輜重於都陸輕兵渡黎水苞等逆擊大破之泰山太守胡烈以竒兵詭道襲都陸盡焚其委輸異等收餘衆而退夀春平拜苞鎮東将軍封東光侯假節頃之代王基都督揚州諸軍事苞因入朝當還辭髙貴鄉公留語盡日既出白文帝曰非常主也數日而有成濟之事後進位征東大将軍俄遷驃騎将軍文帝崩賈充荀勗議𦵏禮未定苞時奔喪慟哭曰基業如此而以人臣終乎𦵏禮乃定後毎與陳騫諷魏帝以歴數已終天命有在及禪位苞有力焉武帝踐阼遷大司馬進封樂陵郡公加侍中羽葆鼓吹自諸葛誕破滅苞便鎮撫淮南士馬彊盛邉境多務苞既勤庶事又以威惠服物淮北監軍王琛輕苞素微又聞童謡曰宫大馬幾作驢大石壓之不得舒因是密表苞與呉人交通先時望氣者云東南有大兵起及琛表至武帝甚疑之會荆州刺史呉烈表呉人欲大出為宼苞亦聞呉師将入乃築壘遏水自固帝聞之謂羊祜曰呉人毎來常東西相應無縁偏爾豈石苞果有不順乎祜深明之而帝猶疑焉㑹苞子喬為尚書郎上召之經曰不至帝謂為必叛欲討苞而隐其事遂下詔以苞不料賊勢築壘遏水勞擾百姓䇿免其官遣太尉義陽王望率大軍徴之以備非常又勅鎮東将軍琅邪王伷自下邳㑹夀春苞用掾孫鑠計放兵歩出住都亭待罪帝聞之意觧及苞詣闕以公還第苞自恥受任無效而無怨色時鄴奚官督郭廙上書理苞於是詔以苞為司徒有司奏苞前有折撓不堪其任以公還第已為𢎞厚不宜擢用詔原其事苞乃就位苞奏州郡農桑未有賞罰之制宜遣掾屬循行皆當均其土宜舉其殿最然後為之黜陟詔嘉之使専督察令増置掾屬十人聼取王官更練事業者苞在位稱為忠勤毎帝委任焉泰始八年薨帝發哀於朝堂賜祕器朝服一具衣一襲錢三十萬布百匹及葬給節幢麾曲蓋追鋒車鼓吹介士大車皆如魏司空陳泰故事車駕臨送於東掖門外䇿諡曰武咸寧初詔苞等並為王功列於銘饗苞豫為終制曰延陵薄葬孔子以為合禮華元厚葬春秋以為不臣古之明義也自今死亡者皆歛以時服不得兼重又不得飯唅為愚俗所為又不得設牀帳明器也窆之後復土滿坎一不得起墳種樹昔王孫祼𦵏矯時其子奉命君子不譏况於合禮典者邪諸子皆遵奉遺令又斷親戚故吏設祭有六子越喬統浚雋崇以統為嗣統字𢎞緒歴位射聲校尉大鴻臚子順為尚書郎越字𢎞倫早卒喬字𢎞祖歴尚書郎散騎侍郎帝既召喬不得深疑苞反及苞至有慙色謂之曰卿子㡬破卿門苞遂廢之終身不聽仕又以有穢行徙頓邱與弟崇同被害二子超熙亡走得免成都王頴之起義也以超為折衝将軍討孫秀以功封侯又為振武将軍征荆州賊李辰頴與長沙王乂相攻超常為前鋒遷中護軍陳眕等挾恵帝北伐超走還鄴頴使超距帝於蕩隂王師敗績超逼帝幸鄴宫會王浚攻頴於鄴頴以超為右将軍以距浚大敗而歸從駕之洛陽西遷長安河間王顒以超領北軍郎将使與頴共距東海王越超於滎陽募兵右将軍王闡與典兵中郎趙則並受超節度為豫州刺史劉喬繼援范陽王虓逆擊斬超而熙得走免永嘉中為太傅參軍浚字景倫清儉有鍳識敬愛人物位至黄門侍郎為當世名士早卒雋字彥倫少有名譽議者稱為令器官至陽平太守早卒崇字季倫生於青州故小名齊奴少敏惠勇而有謀苞臨終分財物與諸子獨不及崇其母以為言苞曰此兒雖小後自能得年二十餘為修武令有能名入為散騎郎遷城陽太守伐呉有功封安陽鄉侯在郡雖有職務好學不倦以疾自觧頃之拜黄門郎兄統忤扶風王駿有司承㫖奏統将加重罰既而見原以崇不詣闕謝恩有司欲復加統罪崇自表申列遂得事觧累遷散騎常侍侍中武帝以崇功臣子有幹局深器重之元康初楊駿輔政大開封賞多樹黨援崇與散騎郎蜀郡何攀共立議奏於惠帝曰陛下自東宫繼統此乃天授而班爵乃優於泰始革命之初一不安也平呉謀臣猛将以致思竭力受賞而今之恩澤優於滅呉之功不安二也大晉卜世莫知其紀今之開制當垂于後若尊卑無差有爵必進數世之後莫非公侯不安三也書奏弗納出為南中郎将荆州刺史領南蠻校尉加鷹揚将軍崇在南中得鴆鳥雛以與後軍将軍王愷時制鴆鳥不得過江為司𨽻校尉傅祗所糺詔原之燒鴆於都街崇頴悟有才氣而任俠無行檢在荆州劫逺使啇客致富不貲徵為大司農以徴書未至擅去官免頃之拜太僕出為征虜将軍假節監徐州諸軍事鎮下邳崇有别館在河陽之金谷一名梓澤送者傾都帳飲於此焉至鎮與徐州刺史髙誕争酒相侮為軍司奏免官復拜衛尉與潘岳諂事賈謐謐與之親善號曰二十四友廣城君毎出崇降車路左望塵而拜其卑佞如此財産豊積室宇宏麗後房百數皆曵紈綉珥金翠絲竹盡當時之選庖膳窮水陸之珍與貴戚王愷羊琇之徒以奢靡相尚愷以􅏁澳釜崇以蠟代薪愷作紫絲布歩鄣四十里崇作錦歩鄣五十里以敵之崇塗泥以椒愷用赤石脂崇愷争豪如此武帝毎助愷嘗以珊瑚樹賜之髙二尺許枝柯扶踈世所罕比愷以示崇崇便以鐵如意撃之應手而碎愷既惋惜又以疾己之寳聲色方厲崇日不足多恨今還卿乃命左右悉取珊瑚樹有髙三四尺者六七株條幹絶俗光彩曜目如愷比者甚衆愷怳然自失矣崇為客作豆粥咄嗟便辦毎冬得韭䓑韲嘗與愷出游争入洛城崇牛迅若飛電愷絶不能及愷毎以此三事為恨乃密貨崇帳下問其所以答云豆至難煑豫作熟末客來但作白粥以投之耳韭䓑韲是𢷬韭根雜以麥苖耳牛奔不遲良由馭者逐不及反制之可聽蹁轅則駃矣於是悉從之遂争長焉崇後知之因殺所告者嘗與王敦入太學見顔回原憲之象顧而歎曰若與之同升孔堂去人何必有間敦曰不知餘人云何子貢去卿差近崇正色曰士當身名俱泰何至甕牖哉其立意類此劉輿兄弟少時為王愷所嫉愷召之宿因欲坑之崇素與輿等善聞當有變夜馳詣愷問二劉所在愷廹卒不得隐崇徑進於後齋牽出同車而去語曰年少何以輕就人宿輿深徳之及賈謐誅崇以黨與免官時趙王倫専權崇甥歐陽建與倫有隙崇有妓曰緑珠羙而豔善吹笛孫秀使人求之崇時在金谷别館方登凉臺臨清流婦人侍側使者以告崇盡出其婢妾數十人以示之皆藴蘭麝被羅縠曰在所擇使者曰君侯服御麗則麗矣然本受命指索緑珠不識孰是崇勃然曰緑珠吾所愛不可得也使者曰君侯博古知今察逺照邇願加三思崇曰不然使者出而又反崇竟不許秀怒乃勸倫誅崇建崇建亦潛知其計乃與黄門潘岳隂勸淮南王允齊王冏以圖倫秀秀覺之遂矯詔収崇及潘岳歐陽建等崇正宴於樓上介士到門崇謂緑珠曰我今為爾得罪緑珠泣曰當効死於官前自投于樓下而死崇曰吾不過流徙交廣耳及車載詣東市崇乃歎曰奴輩利吾家財耳収者答曰知財致害何不早散之崇不能答崇母兄妻子無少長皆被害死者十五人崇時年五十二初崇家稻米飯在地經宿皆化為螺時人以為族滅之應有司簿閲崇水碓三千餘區蒼頭八百人他珍寳貨賄田宅稱是及惠帝復阼詔以卿禮葬之封崇從孫演為樂陵公苞曾孫樸字元真為人謹厚無才藝没於胡石勒以與樸同姓俱出河北引樸為宗室特加優寵位至司徒歐陽建字堅石世為冀方右族雅有理思才藻羙贍擅名北州時人為之語曰渤海赫赫歐陽堅石辟公府歴山陽令尚書郎馮翊太守甚得時譽及遇禍莫不痛惜之年三十餘臨命作詩文甚哀楚孫鑠者字巨鄴河内懐人也少樂為縣吏太守呉奮轉以為主簿鑠自㣲賤登綱紀時僚大姓猶不與鑠同坐奮大怒遂薦鑠為司𨽻都官從事司𨽻校尉劉訥甚知賞之奮又薦鑠於大司馬石苞苞辟為掾鑠将應命行逹許昌㑹臺已密遣輕軍襲苞于時汝隂王鎮許鑠過謁之王先識鑠以鄉里之情私告鑠曰無與禍鑠既出即馳詣夀春為苞畫計苞頼而獲免遷尚書郎在職駮議十有餘事為當時所稱羊祜字叔子泰山南城人也世吏二千石至祜九世並以清徳聞祖續仕漢南陽太守父衜上黨太守祜蔡邕外孫景獻皇后同産弟祜年十二喪父孝思過禮事叔父耽甚謹嘗游於汶水之濱遇父老謂之曰孺子有好相年未六十必當建大功於天下既而去莫知所在及長博學能屬文身長七尺三寸羙鬚眉善談論郡将夏侯威異之以兄霸之子妻之舉上計吏州四辟從事秀才五府交命皆不就太原郭弈見之曰此今之顔子也與王沉俱被曹爽辟沉勸就徴祜曰委質事人復何容易及爽敗沉以故吏免因謂祜曰常識卿前語祜曰此非始慮所及其先識不伐如此夏侯霸之降蜀也親姻多告絶祜獨安其室恩禮有加焉尋遭母憂長兄發又卒毁慕寝頓十餘年以道素自居恂恂若儒者文帝為大将軍辟祜未就公車徴拜中書侍郎俄遷給事中黄門郎時髙貴鄉公好屬文在位者多獻詩賦汝南和逌以忤意見斥祜在其間不得而親疎有識尚焉陳留王立賜爵闗中侯邑百户以少帝不願為侍臣求出補吏徙祕書監及五等建封鉅平子邑六百户鍾㑹有寵而忌祜亦憚之及㑹誅拜相國從事中郎與荀勗共掌機密遷中領軍悉統宿衛入直殿中執兵之要事兼内外武帝受禪以佐命之勲進號中軍将軍加散騎常侍改封郡公邑三千户固讓封不受乃進本爵為侯置郎中令備九官之職加夫人印綬泰始初詔以祜為尚書右僕射衛将軍給本營兵時王佑賈充裴秀皆前朝名望祜毎讓不處其右帝将有滅呉之志以祜都督荆州諸軍事假節散騎常侍衛将軍如故祜率營兵出鎮南夏開設庠序綏懐逺近甚得江漢之心與呉人開市大信降者欲去皆聼之時長吏喪官後人惡之多毁壊舊府祜以死生有命非由居室書下征鎮普加禁斷呉石城守去襄陽七百餘里毎為邉害祜患之竟以詭計令呉罷守於是戍邏減半分以墾田八百頃大獲其利祜之始至也軍無百日之糧及至季年有十年之積詔罷江北都督置南中郎将以所統諸軍在漢東江夏者皆以益祜祜在軍常輕裘緩帯身不被甲鈴閤之下侍衛者不過十數人而頗以畋漁廢政嘗欲夜出軍司徐允執棨當營門曰将軍都督萬里安可輕脱将軍之安危亦國家之安危也允今日若死此門乃開耳祜改容謝之此後稀出矣後加車騎将軍開府如三司之儀祜上表固讓不聼及還鎮呉西陵督歩闡舉城來降呉将陸抗攻之甚急詔祜迎闡祜率兵五萬出江陵遣荆州刺史楊肇攻抗不克闡竟為抗所擒有司奏祜所統八萬餘人賊衆不過三萬祜頓兵江陵使賊備得設乃遣楊肇偏軍入險兵少糧懸軍人挫衂背違詔命無大臣節可免官以侯就第竟坐貶為平南将軍而免楊肇為庶人祜以孟獻營虎牢而鄭人懼晏弱城東陽而萊子服乃進據險要開建五城収膏腴之地奪呉人之資石城以西盡為晉有自是前後降者不絶乃増修徳信以懐柔初附慨然有吞并之心毎與呉人交兵剋日方戰不為掩襲之計将帥有欲進譎詐之計者輙飲以醇酒使不得言人有略呉二兒為俘者祜遣送還其家後呉将夏詳邵顗等來降二兒之父亦率其屬與俱呉将陳尚潘景來宼祜追斬之羙其死節而厚加殯斂景尚子弟迎喪祜以禮遣還呉将鄧香掠夏口祜募生縳香既至宥之香感其恩甚率部曲而降祜出軍行呉境刈穀為糧皆計所侵送絹償之毎㑹衆江沔遊獵常止晉地若禽獸先為呉人所傷而為晉兵所得者皆封還之於是呉人翕然悦服稱為羊公不之名也祜與陸抗相對使命交通抗稱祜之徳量雖樂毅諸葛孔明不能過也抗嘗病祜饋之藥抗服之無疑心人多諌抗抗曰羊祜豈酖人者時談者以為華元子反復見於今抗毎告其戍曰彼専為徳我専為暴是不戰而自服也各保分界而已無求細利孫皓聞二境交和以詰抗抗曰一邑一鄉不可以無信義况大國乎臣不如此正是彰其徳於祜無傷也祜真慤無私疾惡邪佞荀勗馮紞之徒甚忌之從甥王衍嘗詣祜陳事辭甚俊辯祜不然之衍拂衣而起祜顧謂賓客曰王夷甫方以盛名處大位然敗俗傷化必此人也歩闡之役祜以軍法将斬王戎故戎衍並憾之毎言論多毁祜時人為之語曰二王當國羊公無徳咸寧初除征南大将軍開府儀同三司得專辟召初祜以伐呉必藉上流之勢又時呉有童謡曰阿童復阿童銜刀浮渡江不畏岸上虎但畏水中龍祜聞之曰此必水軍有功但當思應其名者耳㑹益州刺史王濬徴為大司農祜知其可任濬又小字阿童因表留濬監益州諸軍事加龍驤将軍密令修舟檝為順流之計祜繕甲訓卒廣為戎備至是上疏曰先帝順天應時西平巴蜀南和呉㑹海内得以休息兆庶有樂安之心而呉復背信使邊事更興夫期運雖天所受而功業必由人而成不一大舉埽除則衆役無時得安亦所以隆先帝之勲成無為之化也故堯有丹水之伐舜有三苖之征咸以寧静宇宙戢兵和衆者也蜀平之時天下皆謂呉當并之自此來十二年是謂一周平定之期復在今日矣議者常言呉楚有道後服無禮先彊此乃諸侯之時耳當今一統不得與古同諭夫適道之論皆未應權是故謀之雖多而決之欲獨凡以險阻得存者謂所敵者同力足自固茍其輕重不齊彊弱異勢則智士不能謀而險阻不可保也蜀之為國非不險也髙山尋雲霓深谷肆無景束馬懸車然後得濟皆言一夫荷㦸千人莫當及進兵之日曽無藩籬之限斬将搴旗伏尸數萬乘勝席捲徑至成都漢中諸城皆鳥棲而不敢出非皆無戰心誠力不足抗至劉禪降服諸營堡者索然俱散今江淮之難不過劒閣山川之險不過岷漢孫皓之暴侈於劉禪呉人之困甚於巴蜀而大晉兵衆多於前世資儲器械盛於往時今不於此平呉而更阻兵相守征夫苦役日尋干戈經歴盛衰不可長久宜當時定以一海内今若引梁益之兵水陸俱下荆楚之衆進臨江陵平南豫州直指夏口徐揚青兖並向秣陵鼓斾以疑之多方以誤之以一隅之呉當天下之衆勢分形散所備皆急巴漢竒兵出其空虚一處傾壊則上下震蕩呉縁江為國無有外内東西數千里以藩籬自持所敵者大無有寧息孫皓恣情任意與下多忌名臣重将不復自信是以孫秀之徒皆畏逼而至将疑於朝士困於野無有保世之計一定之心平常之日猶懐去就兵臨之際必有應者終不能齊力致死已可知也其俗急速不能持久弓弩戟楯不如中國唯有水戰是其所便一入其境則長江非復所固還保城池則去長入短而官軍懸進人有致節之志呉人戰於其内有慿城之心如此軍不踰時克可必矣帝深納之㑹秦涼屢敗祜復表曰呉平則胡自定但當速濟大功耳而議者多不同祜歎曰天下不如意常十居七八故有當斷不斷天與不取豈非更事者恨於後時哉其後詔以泰山之南武陽牟南城梁父平陽五縣為南城郡封祜為南城侯置相與郡公同祜讓曰昔張良請受留萬户漢祖不奪其志臣受鉅平於先帝敢辱重爵以速官謗固執不拜帝許之祜毎以被登進常守冲退至心素著故特見申於分列之外是以名徳逺播朝野具瞻搢紳僉議當居台輔帝方有兼并之志仗祜以東南之任故寝之祜歴職二朝任典樞要政事損益皆諮訪焉勢利之求無所闗與其嘉謀讜議皆焚其草故世莫得聞凡所進逹人皆不知所由或謂祜慎密太過者祜曰是何言歟夫入則造膝出則詭辭君臣不密之戒吾惟懼其不及不能舉賢取異豈得不愧知人之難哉且拜爵公朝謝恩私門吾所不取祜女夫嘗勸祜有所營置令有歸戴者可不羙乎祜黙然不應退告諸子曰此可謂知其一不知其二人臣樹私則背公是大惑也汝宜識吾此意嘗與從弟琇書曰既定邉事當角巾東路言歸故里為容棺之墟以白士而居重位何能不以盛滿受責乎踈廣是吾師也祜樂山水毎風景必造峴山置酒言詠終日不倦嘗慨然嘆息顧謂從事中郎鄒湛等曰自有宇宙便有此山由來賢逹勝士登此逺望如我與卿者多矣皆湮滅無聞使人悲傷如百嵗後有知魂魄猶應登此也湛曰公徳冠四海道嗣前哲令問令望必與此山俱傳至若湛輩乃當如公言耳祜當討呉賊有功将進爵土乞以賜舅子蔡襲詔封襲闗内侯邑三百戸㑹呉人宼弋陽江夏略户口詔遣侍臣移書詰祜不追討之意并欲移州復舊之宜祜曰江夏去襄陽八百里比知賊問賊去亦已經日矣歩軍方徃安能救之哉勞師以免責恐非事宜也昔魏武帝置都督類皆與州相近以兵勢好合惡離疆場之間一彼一此慎守而已古之善敎也若輙徙州賊出無常亦未知州之所宜據也使者不能詰祜寝疾求入朝既至洛陽㑹景獻宫車在殯哀慟至篤中詔申諭扶疾引見命乘輦入殿無下拜甚見優禮及侍坐面陳伐呉之計帝以其病不宜數入遣中書令張華問其籌䇿祜曰今主上有禪代之美而功徳未著呉人虐政已甚可不戰而克混一六合以興文敎則主齊堯舜臣同稷契為百代之盛軌如舍之若孫皓不幸而没呉人更立令主雖百萬之衆長江未可而越也将為後患乎華深贊成其策祜謂華曰成吾志者子也帝欲使祜卧護諸将祜曰取呉不必須臣自行但既平之後當勞聖慮耳功名之際臣所不敢居若事了當有所付授願審擇其人疾漸篤乃舉杜預自代尋卒時年五十八帝素服哭之甚哀是日大寒帝涕淚沾鬚鬢皆為冰焉南州人征市日聞祜喪莫不號慟罷市巷哭者聲相接呉守邊将士亦為之泣其仁徳所感如此賜以東園祕器朝服一襲錢三十萬布百匹詔傷悼之贈侍中太傅持節如故祜立身清儉被服率素禄俸所資皆以贍給九族賞賜軍士家無餘財遺令不得以南城侯入柩從弟琇等述祜素志求葬於先人墓次帝不許賜去城十五里外近陵葬地一頃諡曰成祜喪既引帝於大司馬門南臨送祜甥齊王攸表祜妻不以侯歛之意帝乃詔曰祜固讓歴年志不可奪身没讓存遺操益厲此夷叔所以稱賢季子所以全節也今聼復本封以彰髙美初文帝崩祜謂傅元曰三年之喪雖貴遂服自天子逹而漢文除之毁禮傷義常以歎息今主上天縱至孝有曽閔之性雖奪其服實行喪禮喪禮實行除服何為邪若因此革漢魏之薄而興先王之法以敦風俗垂美百代不亦善乎元曰漢文以末世淺薄不能行國君之喪故因而除之除之數百年一旦復古難行也祜曰不能使天下如禮且使主上遂服不猶善乎元曰主上不除而天下除此為但有父子無復君臣三綱之道虧矣祜乃止祜所著文章及為老子傳並行於世襄陽百姓於峴山祜平生游憩之所建碑立廟嵗時享祭焉望其碑者莫不流涕杜預因名為墮淚碑荆州人為祜諱名至屋宇皆以門為稱改户曹為辭曹焉祜開府累年謙讓不辟士始有所命㑹卒不得除署故參佐劉儈趙寅劉彌孫勃等牋詣預言前征南大将軍祜執徳冲虚引謙之至不備僚屬扶疾始辟四掾未至而隕昔召伯所憇愛流甘棠宣子所㳺封殖其樹夫思其人尚及其樹况生存所辟之士便當隨例放棄者乎乞䝉列上得依已至掾屬預為表陳詔不許祜卒二嵗而呉平羣臣上夀帝執爵流涕曰此羊太傅之功也因以克定之功䇿告祜廟仍以蕭何故事策封其夫人夏侯氏為萬嵗鄉君食邑五千户又賜帛萬匹穀萬斛祜年五嵗時令乳母取所弄金環乳母曰汝先無此物祜即詣鄰人李氏東垣桑樹中探得言之李氏悲惋時人異之謂李氏子即祜之前身也又有善相墓者言祜祖墓有帝王氣若鑿之則無後祜遂鑿之相者見之曰猶當出折臂三公而祜竟墮馬折臂位至公而無子帝以祜兄子暨為嗣暨以父没不得為人後帝又令暨弟伊為祜後又不奉詔帝怒並収免之太康二年以伊弟篇為鉅平侯奉祜嗣篇歴官清慎有私牛於官舍産犢及遷而留之位至散騎常侍早卒孝武太元中封祜兄元孫之子法興為鉅平侯邑五千户以桓元黨伏誅國除尚書祠部郎荀伯上表訟之曰蕭何為漢世元功故絶世輙繼臣愚以為鉅平之封宜同酇國竟寝不報祜前母孔融女生兄發官至都督淮北護軍初發與祜同母兄承俱得病祜母度不能兩存乃専心飬發故得濟而承竟死發長子倫髙陽相倫弟暨陽平太守暨弟伊初為車騎賈充掾後歴平南将軍都督江北諸軍事鎮宛為張昌所殺追贈鎮南将軍祜伯父祕官至京兆太守子祉魏郡太守祕孫亮字長元有才能多計數與之交者必為盡款誠人皆謂得其心而殊非其實也初為太傅楊駿參軍時京兆多竊盗駿欲更重其法盗百錢加大辟請官屬㑹議亮曰昔楚江乙母失布以為盗由令尹公若無欲盗宜自止何重法為駿慙而止累轉大鴻臚時惠帝在長安亮與闗東連謀内不自安奔于并州為劉淵所害亮弟陶為徐州刺史杜預字元凱京兆杜陵人也祖畿魏尚書僕射父恕幽州刺史預博學多通明於廢興之道常言徳不可以企及立功立言可庶㡬也初其父與宣帝不相能遂以幽死故預久不得調文帝嗣立預尚文帝妹髙陸公主起家拜尚書郎襲祖爵豐樂亭侯在職四年轉參相府軍事鍾㑹伐蜀以預為鎮西長史及㑹反僚佐並遇害惟預以智獲免増邑千一百五十户與車騎将軍賈充等定律令既成預為註觧乃奏之詔班于天下泰始中守河南尹預以京師王化之始自近及逺凡所施論務崇大體受詔為黜陟之課預奏古者黜陟擬議於心不泥於法末世不能紀逺而専求密㣲疑心而信耳目疑耳目而信簡書簡書愈繁官方愈偽魏氏考課即京房之遺意其文可謂至密然失於苛細以違本體故歴代不能通也豈若申唐堯舊制取大捨小去密就簡委任逹官各考所統嵗第其人言其優劣如此六載主者總集採案其言六優者超擢六劣者廢免優多劣少者平敘劣多優少者左遷其間所對不鈞品有難易主者固當凖量輕重㣲加降殺不足復曲以法盡也其有優劣循情不協公論者當委監司彈之若令上下公相容過此為清議大頽雖有考課之法亦無益也事竟不行司𨽻校尉石鍳以宿憾奏預免職時虜宼隴右以預為安西軍司給兵三百人騎百匹到長安更除秦州刺史領東羌校尉輕車将軍假節屬虜兵彊盛石鍳時為安西将軍使預出兵撃之預以虜乗勝馬肥而官軍懸乏宜并力大運須春進討陳五不可四不須鍳大怒復奏預擅飾城門官舍稽乏軍興遣御史檻車徴詣廷尉以預尚主在八議以侯贖論其後隴右之事卒如預䇿是時朝廷皆以預明於籌略㑹匃奴帥劉猛舉兵反自并州西及河東平陽詔預以散侯定計省闥俄拜度支尚書預乃奏立籍田建安邊論處軍國之要又作人排新器興常平倉定穀價較鹽運制課調内以利國外以救邉者五十餘條皆納焉石鍳自軍還論功不實為預所紏遂相讎恨言論諠譁並坐免官以侯兼本職數年復拜度支尚書元皇后梓宫将遷于峻陽陵舊制既𦵏帝及羣臣即吉尚書奏皇太子亦宜釋服預議皇太子宜復古典以諒闇終制從之預以時厯差舛不應晷度奏上二元乾度厯行於世預又以孟津渡險有覆没之患請建河橋于富平津議者以為殷周所都歴聖賢而不作者必不可立故也預曰造舟為梁則河橋之謂也及橋成帝從百寮臨㑹舉觴屬預曰非君此橋不立也對曰非陛下之明臣亦不得施其㣲巧周廟欹器至漢東京猶在御坐漢末喪亂不復存形制遂絶預創意造成奏上之帝甚嘉歎焉咸寧四年秋大霖雨蝗虫起預上疏多陳農要有益政治預在内七年損益萬機不可勝數朝野稱羙號曰杜武庫言其無所不有也時帝密有滅呉之計而朝議多違惟預羊祜張華與帝意合祜病舉預自代因以本官假節行平東将軍領征南軍司及祜卒拜鎮南大将軍都督荆州諸軍事給追鋒車第二駙馬預既在鎮繕兵甲耀威武乃簡精鋭襲呉西陵督張政大破之以功増封三百六十五户政呉之名将也據要害之地恥以無備取敗不以所喪之實告于孫皓預欲間呉邊将乃表還其所獲之衆於皓皓果召政遣武昌監劉憲代之故大軍臨至使其将帥移易以成傾蕩之勢預處分既定乃啓請伐呉之期帝報待明年方欲大舉預又表陳至計曰自閏月以來賊但勅嚴下無兵上以理勢推之賊之窮計力不兩完必先護上流勤保夏口以東以延視息無縁多兵西上空其國都而陛下過聼便用委棄大計縱敵患生此誠國之逺圖使舉而有敗勿舉可也事為之制務從完牢若或有成則開太平之基不成不過費損日月之間何惜而不一試之若當須後年天時人事不得如常臣恐其更難也陛下宿議分命臣等隨界分進其所禁持東西同符萬安之舉未有傾敗之慮臣心實了不敢以曖昧之見自取後累惟陛下察之預旬月之中又上表曰羊祜與朝臣多不同不先博畫而密與陛下共施此計故益令多異凡事當以利害相校今此舉十有八九利其一二止於無功耳其言破敗之形亦不可得直是計不出已功不在身各恥其前言故守之也自頃朝廷事無大小異意鋒起雖人心不同亦由恃恩不慮後難故輕相同異也昔漢宣帝議趙充國所上事效之後詰責諸議者皆叩頭而謝以塞異端也自秋已來討賊之形頗露今若中止孫皓怖而生計或徙都武昌更完修江南諸城逺其居人城不可攻野無所掠積大船於夏口則明年之計或無所及時帝與中書令張華圍碁而預表適至華推枰斂手曰陛下聖明神武朝野清晏國富兵彊號令如一呉主荒滛驕虐誅殺賢良當今討之可不勞而定帝乃許之預以太康元年正月陳兵于江陵遣参軍樊顯尹林鄧圭襄陽太守州竒等率衆循江西上授以節度旬月之間累克城邑皆如預䇿焉又遣牙門管定周㫖伍巢等率竒兵八百汎舟夜渡以襲樂鄉多張旗幟起火巴山出於要害之地以奪賊心呉都督孫歆震恐與伍延書曰北來諸軍乃飛渡江也呉之男女降者萬餘口㫖巢等伏兵樂鄉城外歆遣軍出距王濬大敗而還㫖等發伏兵隨歆而入歆不覺直至帳下虜歆而還故軍中為之謡曰以計代戰一當萬於是進逼江陵呉督将伍延偽請降而列兵登陴預攻克之既平上流於是沅湘以南至于交廣呉之州郡皆望風歸命奉送印綬預仗節稱詔而綏撫之凡所斬及生獲呉都督監軍十四牙門郡守百二十餘人又因兵威徙将士屯戍之家以實江北南郡故地各樹之長吏荆土肅然呉人赴者如歸矣王濬先列上得孫歆頭預後生送歆洛中以為大笑時衆軍㑹議或曰百年之宼未可盡克今向暑水潦方降疾疫方起宜俟來冬更為大舉預曰昔樂毅藉濟西一戰以并彊齊今兵威已震譬如破竹數節之後皆迎刃而觧無復著手處也遂指授羣帥徑造秣陵所過城邑莫不束手議者乃以書謝之孫皓既平振旅凱入以功進爵當陽縣侯増邑并前九千六百戸封子耽為亭侯千戸賜絹八千匹初攻江陵呉人知預病癭憚其智計以瓠繋狗頸示之毎大樹似癭輙斫使白題曰杜預頸及城平盡捕殺之預既還鎮累陳家世吏職武非其功請退不許預以天下雖安忘戰必危勤於講武修立泮宫江漢懐徳化被萬里攻破山夷錯置屯營分據要害之地以固維持之勢又修邵信臣遺跡激用滍淯諸水以浸原田萬餘頃分疆刋石使有定分公私同利衆庶頼之號曰杜父舊水道淮沔漢逹江陵千數百里北無通路又巴邱湖沅湘之㑹表裏山川實為險固荆蠻之所恃也預乃開楊口起夏水逹巴陵千餘里内瀉長江之險外通零桂之漕南士歌之曰後世無叛由杜翁孰識智名與勇功預公家之事知無不為凡所興造必考度始終鮮有敗事或譏其意碎者預曰禹稷之功期於濟世所庶幾也預好為後世名常言髙岸為谷深谷為陵刻二石為碑紀其勲績一沈萬山之下一立峴山之上曰焉知此後不為陵谷乎預身不跨馬射不穿札而毎任大事輙居将帥之列結交接物恭而有禮問無所隐誨人不倦敏於事而慎於言既立功之後從容無事乃耽思經籍為春秋左氏經傳集解又參考衆家譜第謂之釋例又作盟㑹圖春秋長厯備成一家之學比老乃成又撰女記讚當時論者謂預文義質直世人未之重惟祕書監摯虞賞之曰左邱明本為春秋作傳而左傳遂自孤行釋例本為傳設而所發明何但左傳故亦孤行時王濟觧相馬又甚愛之而和嶠頗聚斂預常稱濟有馬癖嶠有錢癖武帝聞之謂預曰卿有何癖對曰臣有左傳癖預在鎮數餉遺洛中貴要或問其故預曰吾但恐為害不求益也預初在荆州因宴醉卧齋中外人聞嘔吐聲竊窺於戸正見一大蛇垂頭而吐聞者異之其後徴為司𨽻校尉加位特進行次鄧縣而卒時年六十三帝甚嗟悼追贈征南大将軍開府儀同三司諡曰成預先為遺令曰古不合𦵏明於終始之理同於無有也中古聖人改而合之蓋以别合無在更縁生以示敎也自此以來大人君子或合或否未能知生安能知死故各以己意所欲也吾徃為臺郎嘗以公事使過密縣之邢山山上有冢問耕父云鄭大夫祭仲或云子産之冢也遂率從者祭而觀之其造冢居山之頂四望周逹連山體南北之正而邪東北向新鄭城意不忘本也其隧道惟塞其後而空其前不填之示藏無珍寳不取於重深也山多羙石不用必集洧水自然之石以為冢藏貴不勞工巧而此石不入世用也君子尚其有情小人無利可動歴千載無毁儉之致也吾去春入朝因郭氏喪亡縁陪陵舊義自表營洛陽城東首陽之南為将來兆域而所得地中有小山上無舊塚其髙顯雖未足比邢山然東奉二陵西瞻宫闕南觀伊洛北望夷叔曠然逺覧情之所安也故遂表樹開道為一定之制至時皆用洛水圓石開隧道南向儀制取法於鄭大夫欲以儉自完耳棺器小歛之事皆當稱此子孫一以遵之子錫嗣錫字世嘏有盛名起家長沙王乂文學累遷太子中舍人性亮直忠烈屢諌愍懐太子言辭懇切太子患之後置針著錫常所坐氊中刺之流血他日太子問錫向著何事錫對醉不知太子詰之曰君喜責人何自作過也後轉衛将軍長史趙王倫簒位以為治書御史孫秀求交於錫而錫拒之秀雖銜之憚其名髙不敢害也惠帝反正遷吏部郎城陽太守不拜仍遷尚書左丞年四十八卒贈散騎常侍子乂嗣在外戚傳陳騫字休淵臨淮東陽人也父矯魏司徒矯本廣陵劉氏為外祖陳氏所飬因而改焉騫沉厚有智謀初矯為尚書令侍中劉曄見幸於魏明帝譖矯専權矯憂懼以問騫騫曰主上明聖大人若不合意不過不作公耳後帝意果釋騫尚少為夏侯元所侮意色自若元以此異之起家尚書郎遷中山安平太守並著稱績徴為相國司馬長史御史中丞遷尚書封安國亭侯蜀賊宼隴右以尚書持節行征蜀将軍破賊而還㑹諸葛誕之亂復以尚書行安東将軍夀春平拜使持節都督淮北諸軍事安東将軍進爵廣陵侯轉都督江南諸軍事豫州刺史持節将軍如故又轉都督江南諸軍事徙都督荆州諸軍事征南大将軍封郯侯武帝受禪以佐命之勲進車騎将軍封髙平郡公遷侍中大将軍出為都督揚州諸軍事餘如故假黄鉞攻拔呉枳里城破涂中屯戍賜騫兄子悝爵闗中侯咸寧初遷太尉轉大司馬騫因入朝言於帝曰胡烈牽𢎞皆勇而無謀彊於自用非綏邊之材将為國恥願陛下詳之時𢎞為揚州刺史不承順騫命帝以為不協相搆於是徴𢎞既至尋復以為凉州刺史騫竊歎息以為必敗二人後果失羌戎之和皆被宼喪没征討連嵗僅而得定帝乃悔之騫少有度量含垢匿瑕所在有績與賈充石苞裴秀等俱為心膂而騫智度過之充等亦自以為不及也累處方任為士庶所懐既位極人臣年踰致仕思欲退身咸寧三年求入朝因乞骸骨賜衮冕之服詔聼留京城以前太尉府為大司馬府増置祭酒二人帳下司馬官騎大車鼓吹皆如前親兵百人厨田十頃厨園五十畝厨士十人器物經用皆留給焉又給乗輿輦出入殿中加鼓吹如漢蕭何故事騫屢稱疾辭位詔不許遣散騎常侍諭意騫輙歸第詔又遣侍中敦諭還府遂固請許之位同保傅在三司之上賜以几杖不朝安車駟馬以髙平公還第帝以其勲舊耆老禮之甚重又以騫有疾聼乘輿上殿騫素無謇諤之風然與帝語慠及見皇太子加敬時人以為諂弟雉與其子輿忿争遂説騫子女穢行騫表徙弟以此獲譏於世元康二年薨年八十一加以衮歛贈太傅諡曰武及𦵏帝於大司馬門臨喪望柩流涕禮依大司馬石苞故事子輿嗣爵輿字顕初拜散騎侍郎洛陽令遷黄門侍郎歴将校左軍将軍大司農侍中坐與叔父不睦出為河内太守輿雖無檢正而有力致尋卒子植字𢎞先嗣官至散騎常侍卒子粹嗣永嘉中遇害孝武以騫元孫襲爵卒弟子皓之嗣宋受禪國除裴秀字秀彦河東聞喜人也祖茂漢尚書令父潛魏尚書令秀少好學有風操八嵗能屬文叔父徽有盛名賔客甚衆秀年十餘嵗有詣徽者出則過秀然秀母賤嫡母宣氏不之禮嘗使進饌於客見者皆為之起秀母曰㣲賤如此當應為小兒故也宣氏知之後遂止時人為之語曰後進領䄂有裴秀度遼将軍毌邱儉嘗薦秀於大将軍曹爽曰生而岐嶷長蹈自然元静守真性入道奥博學彊記無文不該孝友著於鄉黨髙聲聞於逺近誠宜弼佐謨明助和鼎味毗贊大府光照盛化非徒子竒甘羅之儔兼苞顔冉游夏之羙矣爽乃辟為掾襲父爵清陽亭侯遷黄門侍郎爽誅以故吏免頃之為廷尉正歴文帝安東及衛将軍司馬軍國之政多見信納遷散騎常侍帝之討諸葛誕也秀與尚書僕射陳泰黄門侍郎鍾㑹以行臺從豫參謀略及誕平轉尚書進封魯陽鄉侯増邑千户常道鄉公立以豫議定策進爵縣侯増邑七百户遷尚書僕射魏咸熙初釐革憲司時荀顗定禮儀賈充正法律而秀改官制焉秀議五等之爵自騎督以上六百餘人皆封於是封秀濟川侯地方六十里邑千四百户以髙苑縣濟川墟為侯國初文帝未定嗣而屬意舞陽侯攸武帝懼不得立問秀曰人有相否因以奇表示之秀後言於文帝曰中撫軍人望既茂天表如此固非人臣之相也由是世子乃定武帝既即王位拜尚書令右光禄大夫與御史大夫王沉衛将軍賈充俱開府加給事中及帝受禪加左光禄大夫封鉅鹿郡公邑三千戸時安逺䕶軍郝詡與故人書云與尚書令裴秀相知望其為益有司奏免秀官詔曰不能使人之不加諸我此古人所難交闗人事詡之罪耳豈尚書令能防乎其勿有所問司𨽻校尉李憙復上言騎都尉劉尚為尚書令裴秀占官稻田求禁止秀詔又以秀幹翼朝政有勲績於王室不可以小疵掩大徳使推正尚罪而觧秀禁止焉久之詔以秀為司空秀儒學洽聞且留心政事當禪代之際總納言之要其所裁當禮無違者又以職在地官以禹貢山川地名從來久逺多有變易後世説者或彊牽引漸以闇昧於是甄摘舊文疑者則闕古有名而今無者皆隨事注列作禹貢地域圖十八篇奏之藏於祕府其序曰圖書之設由來尚矣自古立象垂制而頼其用三代置其官國史掌厥職暨漢屠咸陽丞相蕭何盡収秦之圖籍今祕書既無古之地圖又無蕭何所得惟有漢氏輿地及括地諸雜圖各不設分率又不考正凖望亦不備載名山大川雖有麤形皆不精審不可依據或荒外迃誕之言不合事實於義無取大晉龍興混一六合以清宇宙始於庸蜀罙入其岨文皇帝乃命有司撰訪呉蜀地圖蜀土既定六軍所經地域逺近山川險易征路迃直校驗圖記罔或有差今上考禹貢山海川流原隰陂澤古之九州及今之十六州郡國縣邑疆界鄉陬及古國盟㑹舊名水陸徑路為地圖十八篇制圖之體有六焉一曰分率所以辯廣輪之度也二曰凖望所以正彼此之體也三曰道里所以定所由之數也四曰髙下五曰分邪六曰迂直此三者各因地而制宜所以校夷險之異也有圖象而無分率則無以審逺近之差有分率而無凖望雖得之於一隅必失之於他方有凖望而無道里則施之於山海絶隔之地不能以相通有道里而無髙下方邪迂直之校則徑路之數必與逺近之實相違失凖望之正矣故以此六者參而考之然逺近之實定於分率彼此之實定於道里度數之實定於髙下方邪迂直之算故雖有峻山鉅海之隔絶域殊方之逈登降詭曲之因皆可得舉而定者凖望之法既正則曲直逺近無所隐其形也秀創制朝儀廣陳刑政朝廷多遵用之以為故事在位四載為當世名公服寒食散當飲熱酒而飲冷酒泰始七年薨時年四十八詔痛悼之賜祕器朝服一具衣一襲錢三十萬布百匹諡曰元初秀以尚書三十六曹統事凖例不明宜使諸卿任職未及奏而薨其友人料其書記得表草言平呉之事其詞曰孫皓酷虐不及聖明御世兼弱攻昧使遺子孫将遂不能臣時有否泰非萬安之勢也臣昔雖已屢言未有成㫖今既疾篤不起謹重尸啓願陛下時共施用乃封以上聞詔報曰司空薨痛悼不能去心又得表草雖在危困不忘王室盡忠憂國省益傷切輙當與諸賢共論也咸寧初與石苞等並為王公配享廟庭有二子濬頠濬嗣位至散騎常侍早卒濬庶子憬不惠别封髙陽亭侯以濬少弟頠嗣頠字逸民𢎞雅有逺識博學稽古自少知名御史中丞周弼見而歎曰頠若武庫五兵縱横一時之傑也賈充即頠從母夫也表秀有佐命之勲不幸嫡長喪亡遺孤稚弱頠才徳英茂足以興隆國嗣詔頠襲爵頠固讓不許太康三年徴為太子中庶人遷散騎常侍惠帝即位轉國子祭酒兼右軍将軍初頠兄子憬為白衣頠論述世勲賜爵髙陽亭侯楊駿将誅也駿黨左軍将軍劉豫陳兵在門遇頠問太傅所在頠紿之曰向於西掖門遇公乘素車從二人西出矣豫曰吾何之頠曰宜至廷尉豫從頠言遂委而去尋而詔頠代豫領左軍将軍屯萬春門及駿誅以功當封武昌侯頠請以封憬帝竟封頠次子該頠苦陳憬本承嫡宜襲鉅鹿先帝恩㫖辭不獲命武昌之封己之所䝉特請以封憬該時尚主故帝不聼累遷侍中時天下暫寧頠奏修國學刻石寫經皇太子既講釋奠祀孔子飲享射侯甚有儀序又令荀藩終父勗之志鑄鐘鑿磬以備郊廟朝享禮樂頠通博多聞兼明醫術荀勗之修律度也檢得古尺短世所用四分有餘頠上言宜改諸度量若未能悉革可先改太醫權衡此若差違遂失神農岐伯之正藥物輕重分兩乖互所可傷夭為害尤深古夀考而今短折者未必不由此也卒不能用樂廣嘗與頠清言欲以理服之而頠辭論豊博廣笑而不言時人謂頠為言談之林藪頠以賈后不悦太子抗表請増崇太子所生謝淑妃位號仍啓増置後衛率吏給三千兵於是東宫宿衛萬人遷尚書侍中如故加光禄大夫毎授一職未嘗不殷勤固讓表䟽十餘上博引古今成敗以為言覧之者莫不寒心頠深慮賈后亂政與司空張華侍中賈模議廢之而立謝淑妃華模皆曰帝自無廢黜之意若吾等専行之上心不以為是且諸王方剛朋黨異議恐禍如發機身死國危無益社稷頠曰誠如公慮但昬虐之人無所忌憚亂可立待将如之何華曰卿二人猶且見信然勤為左右陳禍福之戒冀無大悖幸天下尚安庶可優游卒嵗此謀遂寝頠旦夕勸説廣城君令戒諭賈后親待太子而已或説頠曰幸與中宫内外可得盡言言若不行則可辭病屏退若二者不立雖有十表難乎免矣頠慨然久之而竟不能行遷尚書左僕射侍中如故頠雖后之親屬然雅望素隆四海不謂之以親戚進也惟恐其不居位俄復使頠専任門下事固讓不聼頠上言賈模適亡復以臣代崇外戚之望彰偏私之舉后族何常有能自保皆知重親無脱者也然漢二十四帝惟孝文光武明帝不重外戚皆保其宗豈将獨賢實以安理故也昔穆叔不拜越禮之享臣亦不敢聞殊常之詔又表云咎繇謨虞伊尹相商呂望翊周蕭張佐漢咸播功化光格四海暨于繼體咎單傅説祖已樊仲亦隆中興或明揚側陋或起自庶族豈非尚徳之舉以臻斯美哉歴觀近世不能慕逺溺於近情多任后親以致不静昔踈廣戒太子以舅氏為官屬前世以為知禮况朝廷何取於外戚正復才均尚當先其踈者以明至公漢世不用馮野王即其事也表上皆優詔敦譬時以陳凖子匡韓蔚子嵩並侍東宫頠諌曰東宫之建以儲皇極其所與游接必簡英雋宜用成徳匡嵩幼弱未識人理立身之節東宫實體夙成之表而今有童子侍從之聲未是光闡遐風之𢎞理也愍懐太子之廢也頠與張華苦争不從語在華傳頠深患時俗放蕩不尊儒術何晏阮籍素有髙名於世口談浮虛不遵禮法尸禄耽寵仕不事事王衍之徒聲譽太盛位髙勢重不以物務自嬰遂相放效風敎陵遲乃著崇有之論以釋其蔽王衍之徒攻難交至並莫能屈又著辯才論古今精義皆辯釋焉未成而遇禍初趙王倫諂事賈后頠甚惡之倫數求官頠與張華復固執不許由是深為倫所怨倫又潛懐簒逆欲先除朝望因廢賈后之際遂誅之時年三十四二子嵩該倫亦欲害之梁王肜東海王越稱頠父秀有勲王室配食太廟不宜滅其後嗣故得不死徙帯方惠帝反正追復頠本官改𦵏以卿禮諡曰成以嵩嗣為中書黄門侍郎該出後從伯􅠟為散騎常侍並為乞活賊陳午所害秀從弟楷字叔則父徽魏冀州刺史楷明悟有識量弱冠知名尤精老易少與王戎齊名鍾㑹薦之於文帝辟相國掾尚書郎賈充改定律令以楷為定科郎事畢詔楷於御前執讀平議當否楷善宣吐左右屬目聼者忘倦武帝為撫軍妙選僚采以楷為參軍事吏部郎缺文帝問其人於鍾㑹㑹曰裴楷清通王戎簡要皆其選也於是以楷為吏部郎楷風神髙邁容儀俊爽博渉羣書特精義理時人謂之玉人又稱見裴叔則如近玉山映照人也轉中書郎出入宫省見者肅然改容武帝初登阼探䇿以卜世數多少既而得一帝不悅羣臣失色莫有能言者楷正容儀和其聲氣從容而進曰臣聞天得一以清地得一以寧王侯得一以為天下貞武帝大悦羣臣皆稱萬嵗俄拜散騎侍郎累遷散騎常侍河内太守入為屯騎校尉右軍将軍轉侍中石崇以功臣子有才氣與楷志趣各異不與之交長水校尉孫季舒嘗與崇酣醼慢慠過度崇欲表免之楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎崇乃止楷性寛厚與物無忤不持儉素毎遊榮貴輙取其珍玩雖車馬器服宿昔之間便以施諸窮乏嘗營别宅其從兄衍見而悅之即以宅與衍梁趙二王國之近屬貴重當時楷嵗請二國租錢百萬以散親族人或譏之楷曰損有餘以補不足天之道也安於毁譽其行己任率皆此類也與山濤和嶠並以盛徳居位帝嘗問曰朕應天順人海内更始天下風聲何得何失楷對曰陛下受命四海承風所以未比徳於堯舜者但以賈充之徒尚在朝耳方宜引天下賢人與𢎞正道不宜示人以私時任愷庾純亦以充為言帝乃出充為闗中都督充納女於太子乃止平呉之後帝方修太平之化毎延公卿與論政道楷陳三五之風次敘漢魏盛衰之迹帝稱善坐者歎服焉楷子瓚娶楊駿女然楷素輕駿與之不平駿既執政乃轉為衛尉遷太子少師優游無事黙如也及駿誅楷以婚親収付廷尉加法是日事起倉卒誅戮縱横衆人為之震恐楷容色不變舉止自若索紙筆與親故書頼侍中傅祗救䕶得免猶坐去官太保衛瓘太宰亮稱楷貞正不阿附宜䝉爵土乃封臨海侯食邑二千户代楚王瑋為北軍中候加散騎常侍瑋怨瓘亮斥己任楷楷聞之不敢拜轉為尚書楷長子輿先娶亮女女適衛瓘子楷慮内難未已求出外鎮除安南将軍假節都督荆州諸軍事垂當發而瑋果矯詔誅亮瓘瑋以楷前奪己中候又與亮瓘㛰親密遣討楷楷素知瑋有望於已聞有變單車入城匿於妻父王渾家與亮小子一夜八徙故得免難瑋既伏誅以楷為中書令加侍中與張華王戎並管機要楷有渴利疾不樂處勢王渾為楷請曰楷性不競於物安於淡退今既委頓臣深憂之光禄勲缺以為可用今張華在中書王戎在尚書足舉其契無為復令楷入名臣不多當見将飬不違其志要其逺濟之益不聼就加光禄大夫開府儀同三司及疾篤詔遣黄門郎王衍省疾楷廻眸矚之曰竟未相識衍深歎其神雋楷有知人之鍳初在河南樂廣僑居郡界未知名楷見而奇之致於宰府嘗目夏侯元云肅肅如入宗廟中但見禮樂器鍾㑹如觀武庫森森但見矛㦸在前傅嘏汪翔靡所不見山濤若登山臨下幽然深逺初楷家炊黍在甑或變如拳或作血或作蕪菁子其年而卒時年五十五諡曰元有五子輿瓚憲禮遜輿字祖明少襲父爵官至散騎侍郎卒諡曰簡瓚字國寳中書郎風神髙邁見者皆敬之特為王綏所重毎從其游綏父戎謂之曰國寳初不來汝數徃何也對曰國寳雖不知綏綏自謂知國寳楊駿之誅為亂兵所害憲字景思少而穎悟好交輕俠及弱冠更折節嚴重修尚儒學足不踰閾者數年陳郡謝鯤頴川庾敳皆雋朗士也見而奇之相謂曰裴憲鯁亮宏逹通機識命不知其何如父至於深𢎞保素不以世物嬰心者其殆過之初侍講東宫歴黄門吏部郎侍中東海王越以為豫州刺史北中郎将假節王浚承制以憲為尚書永嘉末王浚為石勒所破棗嵩等莫不謝罪軍門貢賂交錯唯憲及荀綽恬然私室勒素聞其名召而謂之曰王浚暴虐幽州人鬼同疾孤恭行乾憲拯兹黎元羈舊咸歡慶謝交路二君齊惡傲威誠信阻絶防風之戮将誰歸乎憲神色侃然泣而對曰臣等世荷晉榮恩遇隆重王浚凶麤醜正尚晉之遺藩雖忻聖化義阻誠心且武王伐紂表商容之閭未聞商容在倒戈之例也明公既不欲以道化厲物必欲以刑忍為始者防風之戮臣之分也請就辟有司不拜而出勒深嘉之待以賓禮勒乃簿王浚官僚親屬皆貲至巨萬唯憲與荀綽家有書百餘袠鹽米各數十斛而已勒聞之謂長史張賓曰名不虛也吾不喜得幽州喜獲二子署從事中郎出為長樂太守及勒僭號未遑制度憲與王波為之撰朝儀於是憲章文物擬於王者勒大悦署大中大夫遷司徒及石虎之世彌加禮重憲有二子挹㲄並以文才知名㲄仕石虎為太子中庶子散騎常侍挹㲄俱豪俠耽酒好臧否人物與河間邢魚有隙魚竊乘㲄馬奔叚遼為人所獲魚誣㲄使己以石虎當襲鮮卑告之為備時石虎適謀伐遼而與魚辭正㑹石虎悉誅挹㲄憲亦坐免未㡬復以為右光禄大夫司徒太傅封安定郡公憲歴官無幹績之稱然在朝元黙未嘗以物務經懐但以徳重名髙動見尊禮竟卒於石氏以族人峙子邁為嗣楷長兄黎次兄康並知名康子盾少歴顯位永嘉中為徐州刺史委付長史司馬奥奥勸盾刑殺立威大發良人為兵有不奉法者罪便至死在任三年百姓嗟怨東海王越盾妹夫也越既薨騎督滿衡便引所發良人東還尋而劉淵遣将王桑趙固向彭城前鋒數騎至下邳文武不堪苛政悉皆散走盾奥奔淮隂妻子為賊人所得奥又誘盾降趙固固妻盾女有寵盾向女涕泣固遂殺之盾弟邵字道期元帝為安東将軍以邵為長史王導為司馬二人相與為深交徵為太子中庶子復轉散騎常侍使持節都督揚州江西淮北諸軍事東中郎将隨越出項而卒於軍中及王導為司空既拜歎曰裴道期劉王喬在吾不得獨登此位導子仲豫與康同字導思舊好乃改為敬豫焉楷弟綽字季舒器宇宏曠官至黄門侍郎長水校尉綽子遐善言元理音辭清暢冷然若琴瑟嘗與河南郭象談論一座歎服又嘗在平東将軍周馥坐與人圍碁馥司馬行酒遐未即飲司馬醉怒曵遐墮地遐徐起還坐顔色不變復碁如故其性虛和如此東海王越引為主簿後為越子毗所害初裴王二族盛於魏晉之世時人以八裴方八王徽比王祥楷比王衍康比王綏綽比王澄瓚比王敦遐比王導頠比王戎邈比王元云通志卷一百二十一上
