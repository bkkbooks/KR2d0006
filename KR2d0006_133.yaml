body:
  text: 通志卷一百十五上宋右迪功郎鄭樵漁仲撰列傳第二十八上魏崔琰許攸婁圭毛玠徐奕何夔邢顒鮑勛父信司馬芝子岐鍾繇子育華歆王朗子肅程昱孫曉郭嘉董昭劉煜子陶蔣濟苗劉放孫資劉馥子靖司馬朗梁習張既溫恢賈逵李孚楊沛任峻蘇則杜畿子恕鄭渾倉慈顔斐孔令狐邵乂張遼樂進于禁張郃徐晃朱靈崔琰字季圭清河東武城人也少朴訥好擊劒尚武事年二十三鄉移為正始感激讀論語韓詩至年二十九乃結公孫方等就鄭元受學學未期徐州黃巾賊攻破北海元與門人到不其山避難時穀糴縣乏元罷謝諸生琰既受遣而寇盜充斥西道不通於是周旋青徐兖豫之郊東下夀春南望江湖自去家四年乃歸以琴書自娛大將軍袁紹聞而辟之時士卒暴橫掘發邱壠琰諫紹宜敕郡縣掩骼埋胔示惻怛之愛追文王之仁紹以為騎都尉後紹治兵黎陽次于延津琰復諫曰天子在許民望助順不如守境述職以寧區宇紹不從遂敗于官渡及紹卒二子交爭爭欲得琰琰稱疾固辭遂獲罪幽於囹圄賴隂夔陳琳營救得免太祖破袁氏領冀州牧辟為别駕從事謂琰曰昨案戶籍可得三十萬衆故為大州也琰對曰今天下分崩九州幅裂二袁兄弟親尋干戈冀方蒸庶暴骨原野未聞王師仁聲先路存問風俗救其塗炭而校計甲兵唯此為先斯豈鄙州士女所望於明公哉太祖改容謝之于時賔客皆伏失色太祖征并州留琰傅文帝於鄴世子好田獵琰以書切諫請燔翳捐褶以塞衆望世子報謝之太祖為丞相琰復為東曹掾屬徵事初授東曹時教曰君有伯夷之風史魚之直貪夫慕名而清壯士尚稱而厲斯可以率時者已故授東曹往踐厥職魏國初建拜尚書時未立太子臨災侯植有才而愛寵太祖狐疑以函令密訪於外唯琰露版答曰蓋聞春秋之義立子以長加五官將仁孝聰明宜承正統琰以死守之植琰之兄女壻也太祖貴其公亮喟然歎息遷中尉琰聲姿高暢眉目疏朗鬚長四尺甚有威重朝士瞻望而太祖亦敬憚焉琰嘗薦巨鹿楊訓雖才好不足而清貞守道太祖即禮辟之及太祖為魏王訓發表稱贊功伐褒述盛德時人或笑訓浮偽謂琰失所舉琰聞從訓取表草視之與訓書曰省表事佳耳時乎時乎會當有變時琰本意譏論者好譴呵而不尋情理也人得琰書以裹幘籠持其籠行都道中時有與琰宿隙者遙見琰名著幘籠從而視之遂白太祖太祖怒曰諺言生女耳耳非佳語會當有變時意指不遜乃收付獄髠刑輸徒前所白琰者復白之云琰為徒虬鬚直視辭色無撓心似不平時太祖亦以為然遂欲殺之乃使清公大吏往經營琰敕吏曰三日期消息琰不悟後數日吏故白琰平安太祖忿然曰崔琰必欲使孤行刀鋸乎吏以是教告琰琰謝吏曰我殊不宜不知公意至此也遂自殺始琰與司馬朗善朗弟懿方壯琰謂朗曰子之弟聰哲明允剛斷英跱殆非子之所及也朗以為不然而琰每秉此論琰從弟林少無名望雖姻族猶多輕之而琰常曰此所謂大器晚成者也終必遠至涿郡孫禮盧育始入軍府琰又名之曰孫疏亮亢烈剛簡能斷盧清警明理百鍊不消皆公才也後林禮育咸至鼎輔及琰友人公孫方宋階早卒琰撫其遺孤恩若己子其鑒識篤義類皆若此後明帝時林嘗與司空陳羣共論冀州人士稱琰為首羣以智不存身貶之林曰大丈夫為有邂逅耳即如卿諸人良足貴乎初太祖性忌有所不堪者魯國孔融南陽許攸婁圭皆以恃舊不虔見誅而琰最為世所痛惜至今寃之孔融傳列在漢史許攸者字子遠少與袁紹及太祖善初平中隨紹在冀州嘗議官渡之役勸紹以輕兵襲許紹不從語在紹傳會其家犯法為審配所繫遂奔太祖太祖破紹取冀州攸有力焉攸自恃勳勞時與太祖相戲至呼太祖小字曰某甲卿不得我不得冀州也太祖笑曰汝言是也然內嫌之其後從行出鄴東門顧謂左右曰此家非得我則安得出入此門也人有白者遂見收婁圭字子伯少有猛志常歎息曰男兒居世會當得數萬兵千匹騎著後耳儕輩笑之後坐藏匿亡命被繫當死得踰獄出捕者追之急子伯乃變衣服如助捕者吏不能覺遂得免會天下義兵起子伯亦於荆州北界合衆依劉表先是子伯與太祖有舊後遂歸太祖太祖以為大將不使典兵然軍國大計常與謀議劉表亡太祖向荆州表子琮降以節迎太祖諸將皆疑以為詐太祖以問子伯子伯曰天下擾擾各貪王命以自重今以節來是必至誠太祖曰大善遂進兵太祖寵賚子伯家纍千金曰婁子伯富樂於孤但勢不如孤耳從破馬超等子伯功為多太祖常歎曰子伯之計孤不及也後與南郡習授同載見太祖出授曰曹公父子如此何其快耶子伯曰大丈夫當自為之而但觀他人乎授乃白之遂見誅毛玠者字孝先陳留平邱人也少為縣吏以清公見稱將避亂荆州未至聞劉表政令不明遂住魯陽太祖臨兖州辟為治中從事玠語太祖曰今天下分崩國主遷移生民廢業飢饉流亡公家無經嵗之儲百姓無安固之志難以持久今袁紹劉表雖士民衆強皆無經遠之慮未有樹基建本者也夫兵義者勝守位以財宜奉天子以令不臣修耕植畜軍資如此則霸王之業可成也太祖敬納其言轉幕府功曹太祖為司空丞相玠嘗為東曹掾與崔琰並典選舉其所舉用皆清正之士雖於時有盛名而行不由本者終莫得進務以儉率人由是天下之士莫不以亷節自勵雖貴寵之臣輿服不敢過度太祖歎曰用人如此使天下人自治吾復何為哉文帝為五官將親自詣玠屬所親眷玠答曰老臣以能守職幸得免戾今所説人非遷次是以不敢奉命大軍還鄴議所并省玠請謁不行時人憚之咸欲省東曹乃共白曰舊西曹為上東曹為次宜省東曹太祖知其情令曰日出於東月盛於東凡人言方亦復先東何以省東曹遂省西曹初太祖平栁城班所獲器物特以素屏風素馮几賜玠曰君有古人之風故賜君古人之服玠居顯位每布衣蔬食撫育孤兄子甚篤賞賜以振施貧族家無所餘遷右軍師魏國初建為尚書僕射復典選舉時太子未定而臨災侯植有寵玠密諫曰近者袁紹以適庶不分覆宗滅國廢立大事非所宜聞後羣寮會玠起更衣太祖目指曰此古所謂國之司直我之周昌也後崔琰既死玠內不悅後有白玠出見黥面反者其妻子沒為官奴婢玠言曰使天不雨者蓋此也太祖大怒收玠付獄大理鍾繇詰玠曰自古聖帝明王罪及妻子書云左不共左右不共右豫則孥戮女司寇之職男子入于罪𨽻女子入于舂稿漢律罪人妻子沒為奴婢黥面漢法所行黥墨之刑存於古典今真奴婢祖先有罪雖歷百世猶有黥靣供官一以寬良民之命二以宥并罪之辜此何以負於神明之意而當致旱案典謀急恆寒若舒恆燠若寬則亢陽所以為旱玠之吐言以為寬邪以為急也急當隂霖何以反旱成湯聖世野無青草周宣令主旱魃為虐亢旱以來積三十年歸咎黥靣為相值不衛人伐邢師興而雨罪惡無徵何以應天玠譏謗之言流於下民不悅之聲上聞聖聽玠之吐言勢不獨語時見黥靣凡為幾人黥靣奴婢所識知邪何緣得見對之歎言時以語誰見答云何以何日月於何處所事已發露不得隱欺玠具以狀對玠曰臣聞蕭生縊死困於石顯賈子放外讒在絳灌白起賜劒於杜郵鼂錯致誅於東市伍員絶命於吳都斯數子者或妬其前或害其後臣垂齠執簡纍勤取官職在機近人事所竄屬臣以私無勢不絶語臣以寃無細不理人情淫利為法所禁法禁於利勢能害之青蠅橫生為臣作謗謗臣之人勢不在他昔王叔陳生爭正王廷宣子平理命舉其契是非有宜曲直有所春秋嘉焉是以書之臣不言此無有時人説臣此言必有徵要乞蒙宣子之辨而求王叔之對若臣以曲聞即刑之日方之安駟之贈賜劒之來比之重賞之惠謹以狀對時桓階和洽進言救之遂免黜卒於家太祖賜棺器錢帛拜子機郎中徐奕字季才東莞人也避難江東孫䇿禮命之奕改姓名微服還本郡太祖為司空辟為掾屬從西征馬超超破軍還時關中新服未甚安留奕為丞相長史鎮撫西京西京稱其威信轉為雍州刺史復還為東曹屬丁儀等見寵於時並害之而奕終不為動出為魏郡太守太祖征孫權徙為留府長史謂奕曰君之忠亮古人不過也然微太嚴昔西門豹佩韋以自緩夫能以柔制剛者望之於君也今使君統留事孤無復還顧之憂也魏國建為尚書復典選舉遷尚書令太祖征漢中魏諷等謀反中尉楊俊左遷太祖歎曰諷所以敢生亂心以吾爪牙之臣無遏姦防謀者故也安得如諸葛豐者使代俊乎桓階曰徐奕其人也太祖乃以奕為中尉手令曰昔楚有子玉文公為之側席而坐汲黯在朝淮南為之折謀詩稱邦之司直君之謂與在職數月疾篤乞退拜諫議大夫卒何夔字叔龍陳郡陽夏人也曾祖父熙漢安帝時官至車騎將軍夔幼喪父與母兄居以孝友稱長八尺三寸容貌矜嚴避亂淮南後袁術至夀春辟之夔不應然遂為術所留久之術與橋㽔俱攻圍蘄陽蘄陽為太祖固守術以夔彼郡人欲脅令説蘄陽夔謂術謀臣李業曰昔栁下惠聞伐國之謀而有憂色曰吾聞伐國不問仁人斯言何為至我哉遂遁匿灊山術知夔終不為己用乃止術從兄山陽太守遺母夔從姑也是以雖恨夔而不加害建安二年夔將還鄉里度術必急追乃間行得免明年到本郡頃之太祖辟為司空掾屬時有傳袁術軍亂者太祖問夔曰君以為信不夔對曰天之所助者順人之所助者信術無信順之實而望天人之助不可以得志於天下夫失道之主親戚叛之而况於左右乎以夔觀之其亂必矣太祖曰為國失賢則亡君不為術所用亂不亦宜乎太祖性嚴峻掾屬公事往往加杖夔常畜毒藥誓死無辱是以終不見及出為城父令遷長廣太守郡濵山海黃巾未平豪桀多背叛袁談就加以官位長廣縣人管承徒衆三千餘家為寇害議者欲舉兵攻之夔曰承等非生而樂亂也習於亂不能自還未被德教故不知反善今兵迫之急彼恐夷滅必并力戰攻之既未易拔雖勝必傷吏民不如徐喻以恩德使容自悔可不煩兵而定乃遣郡丞黃珍往為陳成敗承等皆請服夔遣吏成𢎞領校尉長廣縣承等郊迎奉牛酒詣郡牟平賊從錢衆亦數千夔率郡兵與張遼共討定之東牟人王營衆三千餘家脅昌陽縣為亂夔遣吏王欽等授以計略使離散之旬月皆平定是時太祖始制新科下州郡又收租稅綿絹夔以郡新立近以師旅之後不可卒繩以法乃言於太祖請以所領六縣乞依遠域新邦之典其民間小事使長吏臨時隨宜上不背正法下以順百姓之心比及三年民安其業然後齊之以法則無所不至矣太祖從其言徵還參丞相軍事海賊郭祖寇暴樂安濟南界州郡苦之太祖以夔前在長廣有威信拜樂安太守到官數月諸城悉平入為丞相東曹掾夔言於太祖曰自軍興以來制度草創用人未詳其本是以各引其類時忘道德夔聞以賢制爵則民愼德以庸制祿則民興功以為自今所用必先核之鄉閭使長幼順序無相踰越顯忠直之賞明公實之報則賢不肖之分居然别矣又可修保舉故不以實之令使有司别受其負在朝之臣時受教與曹並選者各任其責上以觀朝臣之節下以塞爭競之源以督羣下以率萬民如是則天下幸甚太祖稱善魏國建拜尚書僕射文帝為太子以涼茂為太傅夔為少傅特命二傅與尚書東曹並選太子諸侯官屬茂卒以夔代茂每月朔太傅入見太子太子正法服而禮焉他日無會儀夔遷太僕太子欲與辭宿戒供夔無往意乃與書請之夔以國有常制遂不往其履正如此然於節儉之世最為豪汰文帝踐阼封成陽亭侯邑三百戶疾病屢乞遜位詔報不許薨諡靖侯子曾嗣咸熙中為司徒邢顒字子昻河間鄚人也舉孝亷司徒辟皆不就易姓字適右北平從田疇遊積五年而太祖定冀州顒謂疇曰黃巾起來二十餘年海內鼎沸百姓流離今聞曹公法令嚴民厭亂矣亂極則平請以身先遂裝還鄉里田疇曰邢顒民之先覺也乃求見太祖求為鄉導以克栁城太祖辟顒為冀州從事時人稱之曰德行堂堂邢子昻除廣宗長以故將喪棄官有司舉正太祖曰顒篤於舊君有一致之節勿問也更辟司空掾除行唐令勸民農桑風化大行入為丞相門下督遷左馮翊病去官時太祖諸子高選官屬令曰侯家吏宜得淵深法度如邢顒輩遂以為平原侯植家丞顒防間以禮無所屈撓由是不合庶子劉楨以書諫植曰家丞邢顒北土之彥少秉髙節元靜淡泊言少理多真雅士也楨誠不足同貫斯人並列左右而楨禮遇殊特顒反疏簡私懼觀者將謂君侯習近不肖禮賢不足採庶子之春華忘家丞之秋實為上招謗其罪不小以此反側後顒入參丞相軍事轉東曹掾初太子未定而臨災侯植有寵丁儀等並贊翼其美太祖問顒顒對曰以庶代宗先世之戒也願殿下重察之太祖識其意後遂以為太子少傅遷太傅文帝踐阼為侍中尚書僕射賜爵關內侯出為司𨽻校尉徙太常黃初四年薨子友嗣鮑勛字叔業泰山平陽人也漢司𨽻校尉鮑宣九世孫宣後嗣有從上黨徙泰山者遂家焉勛父信少有大節沈毅有謀靈帝時大將軍何進辟拜騎都尉遣歸募兵得千餘人還到成臯而進已遇害信至京師董卓亦始到信知卓必為亂勸袁紹襲卓紹畏卓不敢發語在紹傳信乃引軍還鄉里收徒衆二萬騎七百輜重五十餘乘是歲太祖始起兵於己吾信與弟韜以兵應太祖太祖與袁紹表信行破虜將軍韜裨將軍時紹衆最盛豪桀多向之信獨歸心太祖太祖亦親異焉汴水之敗信被創韜於陳戰殁紹劫奪韓馥位遂據冀州信言於太祖曰姦臣乘釁蕩覆王室英雄奮節天下嚮應者義也今紹為盟主因權專利將自生亂是復又有一卓也若抑之則力不能制祗以構難又何能濟莫若且規大河之南以待其變太祖善之太祖為東郡太守表信為濟北相會黃巾大衆入州界劉岱欲與戰信止之岱不從遂敗太祖以賊恃勝而驕欲設竒兵挑擊之於壽張先與信出行戰地後步軍未至而卒與賊遇遂接戰信殊死戰以救太祖太祖僅得潰圍出信遂歿時年四十一建安十七年太祖追録信功表封勛兄邵新都亭侯辟勛丞相掾二十二年立太子以勛為中庶子徙黃門侍郎出為魏郡西部都尉太子郭夫人弟為曲周縣吏斷盜官布法應棄市太祖時在譙太子留鄴數手書為之請罪勛不敢擅縱具列上勛前在東宫守正不撓太子固不能悅及重此事恚望滋甚會郡界休兵有失期者密敕中尉奏免勛官久之拜侍御史延康元年太祖崩太子即王位勛以騎都尉兼侍中文帝受禪勛每陳今之所急唯在軍農寬惠百姓臺榭苑囿宜以為後帝將出遊獵勛停車上疏切諫帝手毁其表而行獵中道頓息問侍臣曰獵之為樂何如八音也侍中劉曄對曰獵勝於樂勛抗辭曰夫樂上通神明下和人理隆治致化萬邦咸乂故移風易俗莫善於樂况獵暴華蓋於原野傷生育之至理櫛風沐雨不以時隙哉昔魯隱觀漁於棠春秋以為譏陛下雖以為務愚臣所不願也因奏劉曄佞諛不忠阿順陛下過戲之言昔梁邱據取媚於遄臺曄之謂也請有司議罪以清皇朝帝怒作色罷還即出勛為右中郎將黃初四年尚書令陳羣僕射司馬懿並舉勛為宫正宫正即御史中丞也帝不得已而用之百寮嚴憚罔不肅然六年秋帝欲征吳羣臣大議勛面諫曰王師屢征而未有所克者蓋以吳蜀唇齒相依憑阻山水有難拔之勢故也往年龍舟飄蕩隔在南岸聖躬蹈危臣下破膽此時宗廟幾至傾覆為百世之戒今又勞兵襲遠日費千金中國虛耗令黠虜玩威臣竊以為不可帝益忿之左遷勛為治書執法帝從壽春還屯陳留郡界太守孫雍見出過勛時營壘未成但立標埓雍邪行不從正道軍營令史劉曜欲推之勛以塹壘未成解止不舉大軍還洛陽曜有罪勛奏黜遣而曜密表勛私解雍事詔曰勛指鹿為馬收付廷尉廷尉法議正刑五歲三官駮定依律罰金二斤帝大怒曰勛無活分汝等敢縱之收三官已下付刺姦當令十鼠同穴太尉鍾繇司徒華歆鎮軍大將軍陳羣侍中辛毗尚書衛臻守廷尉髙柔等並表勛父信有功於太祖求請勛罪帝不許遂誅之勛內行既修亷而能施死之日家無餘財後二旬文帝亦崩莫不為勛歎恨司馬芝字子華河內溫人也少為書生避亂荆州於魯陽山遇賊同行者皆棄老弱走芝獨坐守老母賊至以兵臨芝芝叩頭曰母老唯在諸君賊曰此孝子也殺之不義遂得免害以鹿車推載母居南方十餘年躬耕守節太祖平荆州以芝為管長時天下草創多不奉法郡主簿劉節舊族豪俠賔客千餘家出為盜賊入亂吏治頃之芝差節客王同等為兵掾史據白節家前後未嘗給繇若至時藏匿必為留負芝不聽與節書曰君為大宗加股肱郡而賔客每不與役既衆庶怨望或流聲上聞今條同等為兵幸時發遣兵已集郡而節藏同等因令督郵以軍興詭責縣縣掾史窮困乞代同行芝乃馳檄濟南具陳節罪太守郝光素敬信芝即以節代同行青州號芝以郡主簿為兵遷廣平令征虜將軍劉勳貴寵驕豪又芝故郡將賔客子弟在界數犯法勳與芝書不著姓名而多所屬託芝不報其書一皆如法後勳以不軌誅交關者皆獲罪而芝由是見稱遷大理正有盜官絹置都厠上者吏疑女工收以付獄芝曰夫刑罪之失失在苛暴今贓物先得而後訊其辭若不勝掠或至誣服誣服之情不可以折獄且簡而易從大人之化也不失有罪庸世之治耳今宥所疑以隆易從之義不亦可乎太祖從其議歷甘陵沛陽平太守所在有績黃初中入為河南尹抑強扶弱私請不行會內官欲以事託芝不敢發言因芝妻伯父董昭昭猶憚芝不為通芝為教與羣下曰蓋君能設教不能使吏必不犯也吏能犯教而不能使君必不聞也夫設教而犯君之劣也犯教而聞吏之禍也君劣于上吏禍於下此政事所以不理也可不各勉之哉於是下吏莫不自勵門下循行嘗疑門幹盜簪幹辭不符曹執為獄芝教曰凡物有相似而難分者自非離婁鮮能不惑就其實然循行何忍重惜一簪輕傷同類乎其寢勿問明帝即位賜爵關內侯頃之特進曹洪乳母當與臨汾公主侍者共事無澗神無澗山名在洛陽東北繫獄卞太后遣黃門詣府傳令芝不通輒敕洛陽獄考竟而上疏言其事帝手報嘉之芝居官十一年數議科條所不便者其在公卿間直道而行會諸王來朝與京都人交通坐免後為大司農先是諸典農各部吏民末作治生以要利入芝奏曰王者之治崇本抑末務農重穀王制無三年之儲國非其國也管子區言以積穀為急方今二虜未滅師旅不息國家之要唯在穀帛武皇帝特開屯田之官專以農桑為業建安中天下倉廪充實百姓殷足自黃初以來聽諸典農治生各為部下之計誠非國家大體所宜也夫王者以海內為家故傳曰百姓不足君誰與足富足之由在於不失天時而盡地力今商旅所求雖有加倍之顯利然於一統之計已有不資之損不如墾田益一畝之收也夫農民之事田自正月耕種藝鋤條桑耕熯種麥穫刈築場十月乃畢治廪繫橋運輸租賦除道理梁墐塗室屋以是終歲無日不為農事也今諸典農各言留者為行者宗田計課其力勢不得不爾不有所廢則當素有餘力臣愚以為不宜復以商事雜亂專以農桑為務於國計為便明帝從之每上官有所召問常先見掾史為斷其意故教其所以答塞之狀皆如所度芝性亮直不矜亷隅與賔客談論有不可意便面折其短退無異言卒於官家無餘財自魏迄今為河南尹者莫及芝芝卒子岐嗣從河南丞轉廷尉正遷陳留相梁郡有繫囚多所連及數歲不決詔書徙獄於岐屬縣縣請豫治牢具岐曰今囚有數十既巧詐難符且已倦楚毒其情易見豈當復久處囹圄邪及囚至詰之皆莫敢匿詐一朝決竟遂超為廷尉是時大將軍爽專權尚書何晏鄧揚等為之輔翼南陽圭泰嘗以言忤指考繫廷尉揚訊獄將致泰重刑岐數揚曰樞機大臣王室之佐既不能輔化成德齊美古人乃肆其私忿枉論無辜使百姓危心非此焉在揚於是慙怒而退岐終恐久獲罪以疾去官居家未期而卒年三十五子肇嗣肇晉太康中為冀州刺史尚書鍾繇者字元常潁川長社人也嘗與族父瑜俱至洛陽道遇相者曰此童有貴相然當厄於水努力愼之行未至十里渡橋馬驚墮水幾死瑜以相者言中益貴繇而供給資費使得專學舉孝亷除尚書郎陽陵令以疾去辟三府為廷尉正黃門侍郎是時漢帝在西京李傕郭汜等亂長安中與關東斷絶太祖領兖州牧始遣使上書傕汜等以為關東欲自立天子今曹操雖有使命非其至實議留太祖使拒絶其意繇説傕汜等曰方今英雄並起各矯命專制唯曹兖州乃心王室而逆其忠欵非所以副將來之望也傕泛等用繇言厚加答報由是太祖使命遂得通太祖既數聽荀彧之稱繇又聞其説傕泛益虛心後傕脅天子繇與尚書郎韓斌同策謀天子得出長安繇有力焉拜御史中丞遷侍中尚書僕射并録前功封東武亭侯時關中諸將馬騰韓遂等各擁強兵相與爭太祖方有事山東以關右為憂乃表繇以侍中守司𨽻校尉持節都督關中諸軍委以後事特使不拘科制繇至長安移書騰遂等為陳禍福騰遂各遣子入侍太祖在官渡與袁紹相持繇送馬二千餘匹給軍太祖與繇書曰得所送馬甚應其急關右平定朝廷無西顧之憂足下之勳也昔蕭何鎮守關中足食成軍亦適當爾其後胸奴單于作亂平陽繇率諸軍圍之未拔而袁尚所置河東太守郭援到河東衆甚盛諸將議欲釋之去繇曰袁氏方強援之來關中隂與之通所以未悉叛者顧吾威名故耳若棄而去示之以弱所在之民誰非寇讐縱吾欲歸其得至乎此為未戰先自敗也且援剛愎好勝必易吾軍若渡汾為營及其未濟擊之可大克也張既説馬騰會擊援騰遣子超將精兵逆之援至果輕渡汾衆止之不得濟水未半繇擊大破之斬援降單于語在既傳其後河東衛固作亂與張晟張琰及高幹等並為寇繇又率諸將討破之自天子西遷洛陽人民單盡繇徙關中民又招納亡叛以充之數年間民戶稍實太祖征關中得以為資表繇為前軍師魏國初建為大理遷相國文帝在東宫賜繇五熟釡為之銘曰於赫有魏作漢藩輔厥相惟鍾實幹心膂靖恭夙夜匪遑安處百寮師師楷兹度矩數年坐西曹掾魏諷謀反策罷就第文帝即王位復為大理及踐阼改為廷尉進封崇高鄉侯遷太尉轉封平陽鄉侯時司徒華歆司空王朗並先世名臣文帝罷朝謂左右曰此三公者乃一代之偉人也後世殆難繼矣明帝即位進封定陵侯增邑五百并前千八百戶遷太傅繇有膝疾拜起不便時華歆亦以高年疾病朝見皆使載輿車虎賁舁上殿就坐是後三公有疾遂以為故事初太祖下令使平議死刑可宫割者繇以為古之肉刑更歷聖人宜復施行以代死刑議者以為非悅民之道遂寢及文帝臨饗羣臣詔謂大理欲復肉刑此誠聖王之法公卿當善共議議未定會有軍事復寢太和中繇上疏曰大魏受命繼蹤虞夏孝文革法不合古道先帝聖德固天所縱墳典之業一以貫之是以繼世仍發明詔思復古刑為一代法連有軍事遂未施行陛下遠追二祖遺意惜斬趾可以禁惡恨入死之無辜使明習律令與羣臣共議出本當右趾而入大辟者復行此刑書云皇帝清問下民鰥寡有辭于苗此言堯當除蚩尤有苗之刑先審問於下民之有辭者也若今蔽獄之時訊問三槐九棘羣吏萬民使如孝景之令其當棄市欲斬右趾者許之其黥劓左趾宫刑者自如孝文易以髠笞能有姦者率年二十至四五十雖斬其足猶任生育今天下人少於孝文之世下計所全歲三千人張蒼除肉刑所殺嵗以萬計臣欲復肉刑歲生三千人子貢問濟民可謂仁乎孔子曰何事於仁必也聖乎堯舜其猶病諸又曰仁遠乎哉我欲仁斯仁至矣若誠行之斯民永濟書奏詔曰太傅學優才高留心政事又於刑理深遠此大事公卿羣寮善共平議司徒王朗議以為繇欲輕減大辟之條以增益刖刑之數此即起偃為豎化尸為人矣然臣之愚猶有未合微意之異夫五刑之屬著在科律科律自有減死一等之法不死即為減施行已久不待遠假斧鑿於彼肉刑然後有罪次也前世仁者不忍肉刑之慘酷是以廢而不用不用已來歷年數百今復行之恐所減之文未彰於萬民之目而肉刑之問已宣於寇讐之耳非所以來遠人也今可按繇所欲輕之死罪使減死之髠刖嫌其輕者可倍其居作之歲數內有以生易死不訾之恩外無以刖易釱駭耳之聲議者百餘人與朗同者多帝以吳蜀未平且寢太和四年繇薨帝素服臨弔諡曰成侯子育嗣初文帝分育戶邑封繇弟演及子劭孫豫皆為列侯育字稚叔年十四為散騎侍郎機捷談笑有父風太和初蜀相諸葛亮圍祁山明帝欲親西征育上疏曰夫策貴廟勝功尚帷幄不下殿堂之上而決勝千里之外車駕宜鎮守中土以為四方威勢之援今大軍西征雖有百倍之威於關中之費所損非一且盛暑行師詩人所重實非至尊動軔之時也遷黃門侍郎時大興洛陽宫室車駕便幸許昌天下當朝正許昌許昌逼狹於城南以氊為殿備設魚龍曼延民罷勞役育諫以為水旱不時帑藏空虛凡此之類可須豐年又上宜復關內開荒地使民肆力於農事遂施行正始中為散騎侍郎大將軍曹爽盛夏興軍伐蜀蜀拒守軍不得進爽方欲增兵育以書諫止爽爽不從竟無功而還後以失爽意徙侍中出為魏郡太守爽既誅入為御史中丞侍中廷尉聽君父已殁臣子得為理謗及夫為侯其妻不復配嫁育所創也正元中母邱儉文欽反育持節至揚豫州班行赦令告喻士民還為尚書諸葛誕反大將軍司馬昭議自詣夀春討誕會吳大將孫一率衆降或以為吳新有釁必不能復出軍東兵已多可須後問育以為夫論事科敵當以已度人今誕舉淮南之地以與吳國孫一所率口不至千兵不過三百吳之所失蓋為無幾若壽春之圍未解而吳國之內轉安未可必其不出也昭曰善遂將育行淮南既平為青州刺史加後將軍遷都督徐州諸軍事假節又轉都督荆州景元四年薨追贈車騎將軍諡曰惠侯子駿嗣育弟會自有傳華歆字子魚平原高唐人也高唐為齊名都衣冠無不遊行市里歆為吏休沐出府則歸家闔門論議持平終不毁傷人歆與北海邴原管寧俱遊學三人相善故時人號三人為一龍歆為龍頭原為龍腹寧為龍尾時同郡陶邱洪亦知名自以明見過歆時王芬與豪桀謀廢靈帝芬隂呼歆洪共定計洪欲行歆止之曰夫廢立大事伊霍所難芬性踈而不武此必無成而禍將及族子其無往洪從歆言而止後芬果敗洪乃服歆舉孝亷除郎中病去官靈帝崩何進輔政徵河南鄭泰頴川荀攸及歆等歆到為尚書郎董卓遷天子長安歆求出為下邳令病不行遂從藍田至南陽時袁術在穰留歆歆説術使進軍討卓術不能用歆欲棄去會天子使太傅馬日磾安集關東日磾辟歆為掾東至徐州詔即拜歆豫章太守歆為政清靜不煩吏民感而愛之孫策略地江東歆知策善用兵乃幅巾奉迎策以其長者待以上賔之禮後策死太祖在官渡表天子徵歆孫權欲不遣歆謂權曰將軍奉王命始交好曹公分義未固使僕得為將軍效心豈不有益乎今空留僕是為養無用之物非將軍之良計也權悅乃遣歆賔客舊人送之者千餘人贈遺數百金歆皆無所拒密各題識至臨去悉聚諸物謂諸賔客曰本無拒諸君之心而所受遂多念單車遠行將以懷璧為罪願賔客為之計衆乃各留所贈而服其德歆至拜議郎參司空軍事入為尚書轉侍中代荀彧為尚書令太祖征孫權表歆為軍師魏國建為御史大夫文帝即王位拜相國封安樂鄉侯及受禪歆登壇相儀奉皇帝璽綬以成受命之禮是時朝臣三公已下並受爵位歆以形色忤旨徙為司徒而不進爵文帝久不懌以問尚書令陳羣曰我應天受禪百辟羣后莫不人人喜悅形於聲色而相國及公獨有不怡者何也羣起離席長跪曰臣與相國曾臣漢朝心雖喜悅猶義形其色亦懼陛下實應且憎帝大悅遂重異之歆素清貧祿賜以賑施親戚故人家無儋石之儲公卿嘗並賜沒入生口唯歆出而嫁之帝聞而嘆息下詔曰司徒國之俊老所與和隂陽理庶事也今太官重膳而司徒蔬食甚無謂也特賜御衣及為其妻子男女皆作衣服又賜婢奴五十人三府議舉孝亷本以德行不復限以試經歆以為喪亂以來六籍廢墜當務存立以崇王道夫制法者所以經盛衰今聽孝亷不以經試臣恐學業遂從此而廢若有秀異可特徵用患於無其人何患不得哉帝從其言黃初中詔公卿舉獨行君子歆舉管寧帝以安車徵之明帝即位進封博平侯增邑五百戶并前千三百戶轉拜太尉歆稱病乞退讓位於寧帝不許臨當大會乃遣散騎常侍繆襲奉詔喻指命力疾就會詔旨言朕須君到然後御坐又詔襲須歆必起乃還歆不得已乃起太和中遣曹真從子午道伐蜀車駕東幸許昌歆上疏言吳蜀負險延命未有其釁宜且留心治道以征伐為後事蓋為國者以民為基民以衣食為本必使中國無飢寒之患百姓無離上之心則二敵之釁可得而待也帝詔報嘉之時秋大雨即詔真引軍還太和五年歆薨時年七十五諡敬侯子表嗣初文帝分歆戶邑封歆弟緝為列侯表咸熙中為尚書王朗字景興東海郯人也以通經拜郎中除災邱長師事太尉楊賜賜薨棄官行服舉孝亷辟公府皆不應時漢帝在長安關東兵起徐州刺史陶謙察朗茂才以為治中朗與别駕趙昱等説謙曰春秋之義求諸侯莫若勤王今天子越在西京宜遣使奉承王命謙乃遣昱奉章至長安天子嘉其意拜謙安東將軍以昱為廣陵太守朗會稽太守會稽舊祀秦始皇刻木為像與夏禹同廟朗到官以為無德之君不應見祀於是除之居郡四年惠愛在民孫策渡江略地朗功曹虞翻以為力不能拒不如避之朗自以身為漢吏宜保城邑遂舉兵與策戰敗績浮海至東冶策又追擊大破之朗乃詣策策以其儒雅詰讓而不害留置曲阿朗雖流移窮困朝不謀夕而收恤親舊分多割少行義甚著太祖表徵朗策遣之朗自曲阿展轉江海積年乃至既見拜諫議大夫參司空軍事太祖問朗曰孫策何以得至此邪朗曰策勇冠一世有俊才大志張子布民之望也北靣而相之周公瑾江淮之傑也攘臂而為其將謀而有成所規不細終為天下大賊非徒狗盜而已太祖然之魏國初建以軍祭酒領魏郡太守遷少府奉常大理務在寬恕罪疑從輕時鍾繇明察當法俱以治獄見稱文帝即王位遷御史大夫封安陵亭侯上疏以育民省刑為勸及帝踐阼改為司空進封樂平鄉侯時帝頗出遊獵或昏夜還宫朗上疏切諫帝優答之初建安末孫權始遣使稱藩而與劉備交兵詔議當興師與吳并取蜀不朗議以為天子之軍當相時而後動擇地而後行今權之師未動則助吳之軍無為先征且雨水方盛非行軍動衆之時帝納其計黃初中鵜鶘集靈芝池詔公卿舉獨行君子朗薦光祿大夫楊彪且稱疾讓位於彪詔不許乃為彪置吏卒位次三公孫權欲遣子登入侍不至是時車駕徙許昌大興屯田欲舉軍東征朗上疏曰昔南越守善嬰齊入侍遂為冡嗣還君其國康居驕黠情不副辭都護奏議以為宜遣侍子以黜無禮且吳濞之禍萌於子入隗囂之叛亦不顧子往者聞權有遣子之言而未至今六軍戒嚴臣恐輿人未暢聖旨當謂國家愠於登之逋留是以為之興師設師行而登乃至則為所動者至大所致者至細猶未足以為慶設其傲狠殊無入志懼彼輿論之未暢者並懷伊邑臣愚以為宜敕别征諸將各明禁令以愼守所部外曜威烈內廣耕稼使泊然若山淡然若淵勢不可動計不可測是時帝以成軍遂行權子竟不至車駕臨江而還明帝即位進封蘭陵侯增邑五百并前千二百戶使至鄴省文昭皇后陵見百姓或有不足是時方營修宫室朗上疏曰陛下即位已來恩詔屢布百姓萬民莫不欣欣臣頃奉使北行往返道路聞衆徭役其可得蠲除減省者甚多願陛下重留日昃之聽以計制寇昔大禹將拯天下之大患故乃先卑其宫室儉其衣食用能盡有九州弼成五服勾踐欲廣其禦兒之疆禦兒吳邉戍之地名馘夫差於姑蘇亦約其身以及家儉其家以施國用能囊括五湖席卷三江取威中國定霸華夏漢之文景亦欲恢𢎞祖業增崇洪緒故能割意於百金之臺昭儉於弋綈之服內減太官而不受貢獻外省徭賦而務農桑用能號稱升平幾致刑錯孝武之所以能奮其軍勢拓其外境誠因祖考畜積素足故能遂成大功霍去病中才之將猶以胸奴未滅不治第宅明恤遠者略近事外者簡內有漢之初及其中興皆於金革略寢之後然後鳯闕猥閌德陽並起今當建始之前足用列朝會崇華之後足用序內官華林天淵足用展遊宴若且先成閶闔之象魏使足用列遠人之朝貢增修城池使足用絶踰越成國險其餘一切且須豐年一以勤耕農為務習戎備為事則國無怨曠戶口滋盛民充兵強而寇戎不賔緝熙不作未之有也轉為司徒于時屢失皇子而後宫就館者少朗上疏曰昔周文十五而有武王遂享十子之祚以廣諸姬之胤武王既老而生成王成王是以鮮於兄弟此二王者各樹聖德無以相過比其子孫之祚則不相若蓋生育有早晚所産有衆寡也陛下既德祚兼彼二聖春秋高於姬文育武之時矣而子發未舉於椒蘭之奧房藩王未繁於掖庭之衆室以成王為喻雖未為晚取譬伯邑則不為夙周禮六宫內官百二十人而諸經常説咸以十二為限至於秦漢之末或以千百為數矣然雖彌猥而就時於吉館者或甚鮮明百斯男之本誠在於一意不但在於務廣也又少小常苦被褥泰溫泰溫則不能便柔膚弱體是以難可防護而易用感慨若常令少小之緼袍不至於甚厚則必咸保金石之性而壽比於南山矣帝報納之朗著易春秋孝經周官傳奏議論説咸傳於世太和二年薨諡曰成侯子肅嗣初文帝分朗戶邑封一子列侯朗乞封兄子詳有詔聽許肅字子雍年十八從宋忠讀太元而更為之解黃初中為散騎黃門侍郎太和二年拜散騎常侍四年大司馬曹真征蜀肅上疏曰前志有之千里饋糧士有飢色樵蘇後爨師不宿飽此謂平塗之行軍者也又况於深入阻險鑿路而前其為勞必相百也今又加之以霖雨山坂峻滑衆逼而不展糧縣而難繼實行軍之大忌也聞曹真發已踰月而行裁半谷治道功夫戰士悉作是賊偏得以逸而待勞乃兵家之所憚也言之前代則武王伐紂出關而復還論之近事則武文征權臨江而不濟豈非所謂順天知時通於權變者哉兆民知聖上以水雨艱劇之故休而息之後日有釁乘而用之則所謂悅以犯難民忘其死者矣於是遂罷又上疏宜遵舊禮為大臣發哀薦果宗廟事皆施行又上疏陳政本曰除無事之位損不急之祿止浮食之費并從容之官使官必有職職任其事事必受祿祿代其耕乃往古之常式當今之所宜也官寡而祿厚則公家之費鮮進仕之志勸進仕之志勸各展才力莫相倚仗敷奏以言明試以功能之與否簡在帝心是以唐虞之設官分職申命公卿各以其事然後試之惟龍為納言猶今尚書也以出內帝命而已夏殷不可得而詳甘誓曰六事之人明六卿亦典事者也周官則備矣五日視朝公卿大夫並進而司士辨其位焉其記曰坐而論道謂之三公作而行之謂之士大夫及漢之初依擬前代公卿皆親以事升朝故高祖躬追反走之周昌武帝遙可奉奏之汲黯宣帝使公卿五日一朝成帝始置尚書五人自是陵遲朝禮遂闕可復五日視朝之儀使公卿尚書各以事進廢禮復興光宣聖緒誠所謂名美而實厚者也青龍中山陽公薨漢主也肅上疏曰昔唐禪虞虞禪夏皆終三年之喪然後踐天子之尊是以帝號無虧君禮猶存山陽公順天進禪退處賔位不得與唐虞此按漢制總帝皇之號號曰皇帝有别稱帝無别稱皇則皇是其差輕者也故高祖之時土無二王其父見在而使稱皇明非二王之嫌也况今以贈終可使稱皇以配其諡明帝不從使稱皇乃追諡曰孝獻皇帝後肅以常侍領祕書監兼崇文觀祭酒景初間宫室盛興民失農業期信不敦刑殺倉卒肅上疏曰大魏承百王之極生民無幾干戈未戢誠宜務畜積而省徭役今宫室未就丁夫疲於力作農者離其南畝種穀者寡舊穀既沒新穀未繼斯則有國之大患非備豫之長策也今見作者三四萬人九龍可以安聖體其內足以列六宫顯陽之殿又向將畢惟泰極已前功夫尚大莫若取常食廪之士非急要者之用選其丁壯擇留萬人使一期而更之計一歲有三百六十萬夫亦不為少當一歲成者聽且三年分遣其餘使皆即農無窮之計也夫信之於民國家大寶也仲尼曰自古皆有死民無信不立前車駕幸洛陽發民為營有司命以營成而罷既成又利其功力不以時遣有司徒營其目前之利不顧經國之大體臣愚以為自今以後儻復使民宜明其令使必如期若有事以次寧復更發無或失信凡陛下臨時之所行刑皆有罪之吏宜死之人也然衆庶不知謂為倉卒故願陛下下之於吏而暴其罪鈞其死也無使汚于宫掖而為遠近所疑且人命至重難生易殺氣絶而不可復續者也漢時有犯蹕驚乘輿馬者廷尉張釋之奏使罰金文帝怪其輕而釋之曰方其時上使誅之則已今下廷尉廷尉天下之平也一傾之天下用法皆為輕重民安所措其手足臣以為大失其義非忠臣所宜陳也廷尉者天子之吏也猶不可以失平而天子之身反可以惑謬乎斯重於為已而輕於為君不忠之甚也不可不察肅又陳諸鳥獸無用之物而有芻穀人徒之費皆可蠲除帝嘗問肅曰漢桓帝時白馬令李雲上書言帝者諦也是帝欲不諦當何得不死肅對曰但為言失逆順之節原其本意皆欲盡心念存補國且帝者之威過於雷霆殺一匹夫無異螻蟻寬而宥之可以示容受切言廣德宇於天下故臣以為殺之未必為是也帝又問司馬遷以受刑之故內懷隱切著史記非貶孝武令人切齒對曰遷之記事不虛美不隱惡劉向揚雄服其善敘事有良史之才謂之實録漢武聞其述史記取孝景及已本紀覽之於是大怒削而投之於地今此兩紀有録無書後遭李陵事遂下蠶室此為隱切在孝武不在於史遷也正始元年出為廣平太守公事徵還拜議郎頃之為侍中遷太常時大將軍曹爽專權任用何晏鄧揚等肅與太尉蔣濟司農桓範論及明政肅正色曰此輩即𢎞恭石顯之屬復稱説邪爽聞之戒何晏等曰當共愼之公卿已比諸君前世惡人矣坐宗廟事免後為光祿勳時有二魚長尺集于武庫之屋有司以為吉祥肅曰魚生於淵而亢於屋介鱗之物失其所也邊將其殆有棄甲之變乎其後果有東關之敗徙為河南尹嘉平六年持節兼太常奉法駕迎高貴鄉公于元城是歲白氣經天大將軍司馬師問其故肅曰此蚩尤之旗也東南其有亂乎君若修己以安百姓則天下樂安者歸德唱亂者先亡矣明年春鎮東將軍母邱儉揚州刺史文欽起兵反師謂肅曰霍光感夏侯勝之言始重儒學之士良有以也安國寧主其術安在肅曰昔關侯率荆州之衆降于禁於漢濵遂有北向爭天下之志後孫權襲取其將士家屬彼之士衆一旦瓦解今淮南將士父母妻子皆在內州但急往禦衛使不得前必有關侯土崩之勢矣師從之遂破儉欽等後遷中領軍加散騎常侍增邑三百并前二千二百戶甘露元年薨門生縗絰者以百數追贈衛將軍諡曰景侯子惲嗣惲薨無子國絶景元四年封肅子恂為蘭陵侯咸熙中開建五等以肅著勳前朝改封恂為承子肅女適司馬昭即文明皇后生晉武帝齊獻王攸初肅善賈馬之學而不好鄭氏採會同異為尚書詩論語三禮左氏解及撰定父朗所作易傳皆列於學官其所論駮朝廷典制郊祀宗廟喪紀輕重凡百餘篇時樂安孫炎字叔然授學鄭元之門人稱東州大儒徵為祕書監不就肅集聖證論以譏短元炎駮而釋之及作周易春秋例毛詩禮記春秋三傳國語爾雅諸注又著書十餘篇頗傳於世程昱字仲德東郡東阿人也長八尺三寸美鬚髯黃巾起縣丞王度反應之燒倉庫縣令踰城走吏民負老幼東奔渠邱山昱使人偵視度度等得空城不能守出城西五六里止屯昱謂縣中大姓薛房等曰今度等得城郭不能居其勢可知此不過欲虜掠財物非有攻守之志也今何不相率還城而守之且城高厚多穀米今若還求令共堅守度必不能久攻可破也房等以為然吏民不肯從曰賊在西但有東耳昱謂房等愚民不可計事乃密遣數騎舉幡於東山上令房等望見大呼言賊已至便下山趣城吏民奔走隨之求得縣令遂共城守度等來攻城不能下欲去昱率吏民開城門急擊之度等破走東阿由此得全初平中兖州刺史劉岱辟昱昱不應是時岱與袁紹公孫瓚和親紹令妻子居岱所瓚亦遣從事范方將騎助岱後紹與瓚有隙瓚擊破紹軍乃遣使語岱令遣紹妻子使與紹絶别敕范方若岱不遣紹家將騎還吾定紹將加兵於岱岱議連日不決别駕王彧白岱程昱有謀能斷大事岱乃見昱問計昱曰若棄紹近援而求瓚遠助此假人於越以救溺子之説也夫公孫瓚非袁紹之敵也今雖壞紹軍然終為紹所禽夫趣一朝之權而不慮遠計將軍終敗岱從之范方將其騎歸未至瓚大為紹所破岱表昱為騎都尉昱辭以疾劉岱為黃巾所殺太祖臨兖州辟昱昱將行其鄉人謂曰何前後之相背也昱笑而不應太祖與語説之以昱守壽張令太祖征徐州使昱與荀彧留守鄄城張邈等叛迎吕布郡縣嚮應唯鄄城范東阿不動布軍降者言陳宫欲自將兵取東阿又使泛嶷取范吏民皆恐彧謂昱曰今兖州反唯有此三城宫等以重兵臨之非有以深結其心三城必動君民之望也歸而説之殆可昱乃歸過范説其令靳允曰聞吕布執君母弟妻子孝子誠不可為心今天下大亂英雄並起必有命世能息天下之亂者此智者所詳擇也得主者昌失主者亡陳宫叛迎吕布而百城皆應似能有為然以君觀之布何如人哉夫布粗中少親剛而無禮匹夫之雄耳宫等以勢假合不能相君也兵雖衆終必無成曹使君智略不世出殆天所授君必固范我守東阿則田單之功可立也孰與違忠從惡而母子俱亡乎唯君詳慮之允流涕曰不敢復有二心時泛嶷亦已在縣允乃見嶷伏兵刺殺之歸勒兵守昱又遣别騎絶倉亭津陳宫至不得渡昱到東阿東阿令棗祗已率厲吏民拒城堅守又兖州從事薛悌與昱協謀卒完三城以待太祖太祖還執昱手曰微子之力吾無所歸矣乃表昱為東平相屯范太祖與吕布戰於濮陽數不利蝗蟲起乃各引去於是袁紹使人説太祖欲連和欲使太祖遣家居鄴太祖新失兖州軍食盡將許之時昱使適還引見因言曰竊聞將軍欲遣家與袁紹連和誠有之乎太祖曰然昱曰意者將軍殆臨事而懼不然何慮之不深也夫袁紹據燕趙之地有并天下之心而智不能濟也將軍自度能為之下乎將軍以龍虎之威可為韓彭之事邪今兖州雖殘尚有三城能戰之士不下萬人以將軍之神武與文若昱等收而用之霸王之業可成也願將軍更慮之太祖乃止天子都許以昱為尚書兖州尚未安集復以昱為東中郎將領濟隂太守都督兖州事劉備失徐州來歸太祖昱説太祖殺之不聽語在武紀後又遣備至徐州要擊袁術昱與郭嘉復説太祖曰公前日不圖備昱等誠不及也今借之以兵必有異心太祖悔追之不及會術病死備至徐州遂殺車胄舉兵背太祖頃之遷昱振威將軍袁紹在黎陽將南渡時昱有七百兵守鄄城太祖聞之使人告昱欲益二千兵昱不肯曰袁紹擁十萬衆自以所向無前今見昱兵少必輕易不來攻若益昱兵過則不可不攻攻之必克徒兩損其勢願公無疑太祖從之紹聞昱兵少果不往太祖謂賈詡曰程昱之膽過於賁育昱遂收山澤亡命得精兵數千人乃引軍與太祖會黎陽討袁談袁尚談尚破走拜昱奮武將軍封安國亭侯太祖征荆州劉備奔吳論者以為孫權必殺備昱料之曰孫權新在位未為海內所憚曹公無敵於天下初舉荆州威震江表權雖有謀不能獨當也劉備有英名關侯張飛皆萬人敵也權必資之以禦我難解勢分備資以成又不可得而殺也權果多與備兵以禦太祖是後中夏漸平太祖拊昱背曰兖州之敗不用君言吾何以至此宗人奉牛酒大會昱曰知足不辱吾可以退矣乃自表歸兵闔門不出昱性剛戾與人多忤人有告昱謀反太祖賜待益厚魏國建為衛尉與中尉邢貞爭威儀免文帝踐阼復為衛尉進封安鄉侯增邑三百戶并前八百戶分封少子延及孫曉列侯方欲以為公會薨時年八十帝為流涕追贈車騎將軍諡曰肅侯子武嗣武薨子克嗣克薨子良嗣曉字季明有通識嘉平中為黃門侍郎時校事放橫曉上疏曰周禮云設官分職以為民極春秋傳曰天有十日人有十等愚不得臨賢賤不得臨貴於是並建聖哲樹之風聲明試以功九載考績各修厥業思不出位故欒書欲拯晉侯其子不聽死人橫於街路邴吉不問上不責非職之功下不務分外之賞吏無兼統之勢民無二事之役斯誠為國要道治亂所由也遠覽典志近觀秦漢雖官名改易職司不同至於崇上抑下顯明分例其致一也初無校事之官干預庶政者也昔武帝大業草創衆官未備而軍旅勤苦民心不安乃有小罪不可不察故置校事取其一切耳然檢御有方不至縱恣也此霸世之便宜非帝王之正典其後漸蒙見任復為疾病轉相因仍莫正其本遂令上察宫廟下攝衆司官無局業職無分限隨意任情惟心所適法造於筆端不依科詔獄成於門下不顧覆訊其選官屬以謹慎為粗疏以􅢽詷為賢能其治事以刻暴為公嚴以循理為怯弱外則託天威以為聲勢內則聚羣姦以為腹心大臣耻與分勢含忍而不言小人畏其鋒芒鬱結而無告至使尹模公於目下肆其姦慝罪惡之著行路皆知纎悉之過積年不聞既非周禮設官之意又非春秋十等之義也今外有公卿將校總統諸署內有侍中尚書總理萬機司𨽻校尉督察京輦御史中丞董攝宫殿皆高選賢才以充其職申明科詔以督其違若此諸賢猶不足任校事小吏益不可信若此諸賢各思盡忠校事區區亦復無益若更高選國士以為校事則是中丞司𨽻重增一官耳若如舊選尹模之姦今復發矣進退推算無所用之昔桑𢎞羊為漢求利卜式以為獨烹𢎞羊天乃可雨若使政事得失必感天地臣恐水旱之災未必非校事之由也曹共公遠君子近小人國風託以為刺衛獻公舍大臣與小臣謀定薑謂之有罪縱令校事有益於國以禮義言之尚傷大臣之心况姦回暴露而復不罷是袞闕不補迷而不返也於是遂罷校事官曉遷汝南太守年四十餘薨郭嘉字奉孝潁川陽翟人也初北見袁紹謂紹謀臣辛評郭圖曰夫智者審於量主故百舉百全而功名可立也袁公徒欲效周公之下士而未知用人之機多端寡要好謀無決欲與共濟天下大難定霸王之業難矣於是遂去之先是潁川戲志才籌畫士也太祖甚器之早卒太祖與荀彧書曰自志才亡後莫可與計事者汝潁固多竒士誰可以繼之彧薦嘉召見論天下事太祖曰使孤成大業者必此人也嘉出亦喜曰真吾主也表為司空軍祭酒太祖謂嘉曰本初擁冀州之衆而并青從之地廣兵強數為不遜吾欲討之力不敵如何對曰劉項之不敵公所知也漢祖惟智勝項羽雖強終為所禽以嘉料之紹有十敗公有十勝雖兵強無能為也紹繁禮多儀公體任自然此道勝一也紹以逆動公奉順以率天下此義勝二也漢末政失於寬紹以寬濟寬故不攝公糾之以猛而上下知制此治勝三也紹內忌外寬用人而疑之所任唯親戚子弟公外易簡而內機明用人無疑惟才所宜不間遠近此度勝四也紹多謀少決失於後事公策得輒行應變無窮此謀勝五也紹因纍世之資高議揖讓以收名譽士之好言飾外者多歸之公以至心待人推誠而行不為虛美以儉率下與有功者無所吝士之忠正遠見而有實者皆願為用此德勝六也紹見人飢寒恤念之形於顔色其所不見慮或不及也所謂婦人之仁耳公於目前小事時有所忽至於大事與四海接恩之所加皆過其望雖所不見慮之所周無不濟者此仁勝七也紹大臣爭權讒言惑亂公御下以道浸潤不行此明勝八也紹是非不知公所是進之以禮所不是正之以法此文勝九也紹好為虛勢不知兵要公以少克衆用兵如神軍人恃之敵人畏之此武勝十也太祖笑曰如卿所言孤何德以堪之也嘉又曰紹方北擊公孫瓚可因其遠征東取吕布不先取布若紹為寇布為援此深害也太祖曰然遂征吕布三戰破之布退固守時士卒疲倦太祖欲引軍還嘉説太祖曰昔項羽七十戰未常敗北一朝失勢而身死國亡者恃勇無謀故也今布每戰輒破氣衰力盡內外失守布之威力不及項籍而困敗過之若乘勝攻之此成禽也太祖從之遂獲布時孫䇿轉鬬千里盡有江東聞太祖與袁紹相持於官渡將渡江北襲許衆聞皆懼嘉料之曰䇿新并江東所用皆英雄豪傑能得人死力者也然策輕而無備雖有百萬之衆無異於獨行中原也若刺客伏起一人之敵耳以吾觀之必死於匹夫之手䇿臨江未濟果為許貢客所殺從破袁紹紹死又從討談尚於黎陽連戰數克諸將欲乘勝遂攻之嘉曰袁紹愛此二子莫適立也有郭圖逄紀為之謀臣必交鬬其間還相離也急之則相持緩之而後必爭不如南向荆州若征劉表者以待其變而後擊之可一舉定也太祖曰善乃南征軍至西平談尚果爭冀州談為尚軍所敗走保平原遣辛毗乞降太祖還救之遂從定鄴又從攻談於南皮冀州平封嘉洧陽亭侯太祖將征袁尚及三郡烏丸諸將多懼劉表使劉備襲許以討太祖嘉曰公雖威震天下胡恃其遠必不設備因其無備卒然擊之可破滅也且袁紹有恩於民夷而尚兄弟生存今四州之民徒以威附德施未加舍而南征尚因烏丸之資招其死難之臣胡人一動民夷俱應以生踏頓之心成覬覦之計恐青冀非己之有也表坐談客耳自知才不足以御備重任之則恐不能制輕任之則備不為用雖虛國遠征公無憂矣太祖遂行至易嘉曰兵貴神速今千里襲人輜重多難以趨利且彼聞之必為備不如留輜重輕兵兼道以出掩其不意太祖乃密出盧龍塞直指單于庭虜卒聞太祖至惶怖合戰遂大破之斬踏頓及名王已下尚及兄熙走遼東嘉深通有算略達於事情太祖曰唯奉孝為能知孤意自栁城還疾篤太祖問疾者交錯於道遂薨年三十八太祖臨其喪哀甚謂荀攸等曰諸君年皆孤輩也惟奉孝最少天下事竟欲以後事屬之而中年夭折命也夫乃表增嘉封邑八百戶并前千戶諡曰貞侯子奕嗣後太祖征荆州還於巴邱遇疾疫燒船歎曰郭奉孝在不使孤至此哀哉奉孝痛哉奉孝惜哉奉孝初陳羣非嘉不治行檢數廷訴嘉嘉意自若太祖愈益重之然以羣能持正亦悅焉奕為太子文學早薨子深嗣深薨子獵嗣董昭字公仁濟隂定陶人也舉孝亷除廮陶長柏人令袁紹以為參軍事紹逆公孫瓚於界橋巨鹿太守李邵及郡冠蓋以瓚兵強皆欲屬瓚紹聞之使昭領巨鹿問禦以何術對曰一人之微不能消衆謀欲誘致其心唱與同議及得其情乃當權以制之耳計在臨時未可得言時郡右姓孫伉等數十人專為謀主驚動吏民昭至郡偽作紹檄告郡云得賊羅候安平張吉辭當攻巨鹿賊故孝亷孫伉等為應檄到收行軍法惡止其身妻子勿坐昭案檄告令皆斬之一郡惶恐乃以次安慰遂皆平集事訖白紹紹稱善會魏郡太守栗攀為兵所害紹以昭領魏郡太守時郡界大亂賊以萬數遣使往來交易市買昭厚待之因用為間乘虛掩討輒大克破二日之中羽檄三至昭弟訪在張邈軍中邈與紹有隙紹受讒將致罪於昭昭欲詣漢獻帝至河內為張楊所留因楊上還印綬拜騎都尉時太祖領兖州遣使詣楊欲令假塗西至長安楊不聽昭説楊曰袁曹雖為一家勢不久羣曹今雖弱然實天下之英雄也當故結之况今有緣宜通其上事并表薦之若事有成永為深分楊於是通太祖上事表薦太祖昭為太祖作書與長安諸將李傕郭泛等各隨輕重致殷勤楊亦遣使詣太祖太祖遺楊犬馬金帛遂與西方往來天子在安邑昭從河內往詔拜議郎建安元年太祖定黃巾于許遣使詣河東會天子還洛陽韓暹楊奉董承及楊各違戾不和昭以奉兵馬最強而少黨援作太祖書與奉曰吾與將軍聞名慕義便推赤心今將軍拔萬乘之艱難反之舊都翼佐之功超世無儔何其休哉方今羣凶猾夏四海未寧必須衆賢以清王軌誠非一人所能獨建心腹四支實相恃賴一物不備則有闕焉將軍當為內主吾為外援今吾有糧將軍有兵有無相通足以相濟死生契闊相與共之奉得書喜悅語諸將軍曰兖州諸軍近在許耳有兵有糧國家所當依仰也遂共表太祖為鎮東將軍襲父爵費亭侯昭遷符節令太祖朝天子於洛陽引昭並坐問曰孤今來在此當施何計昭曰將軍興義兵以誅暴亂入朝天子輔翼王室此五伯之功也此下諸將人殊意異未必服從今留匡弼事勢不便惟有移駕幸許耳然朝廷播越新還舊京遠近跂望冀一朝獲安今復徙駕不厭衆心夫行非常之事乃有非常之功願將軍算其多者太祖曰此孤之本志也楊奉近在梁耳聞其兵精得無為孤纍乎昭曰奉少黨援將獨委質鎮東費亭之事皆奉所定又聞書命申束足以見信宜時遣使厚遺答謝以安其意説京都無糧欲車駕暫幸魯陽近許轉運稍易可無縣乏之憂奉為人勇而寡慮必不見疑比使往來足以定計奉何能為太祖曰善即遣使詣奉徙大駕至許奉由是失望與韓暹等到定陵鈔暴太祖不應密往攻其梁營降誅即定奉暹失衆東降袁術三年昭遷河南尹時張楊為其將楊醜所殺楊長史薛洪河內太守繆尚城守待紹救太祖令昭單身入城告喻洪尚等即日舉衆降以昭為冀州牧太祖令劉備拒袁術昭曰備勇而志大關侯張飛為之羽翼恐備之心未可得論也太祖曰吾已許之矣備到下邳殺刺史車胄反太祖自征備徙昭為徐州牧袁紹遣將顔良攻東郡又徙昭為魏郡太守從討良良死後進圍鄴城袁紹同族春卿為魏郡太守在城中其父元長在揚州太祖遣人迎之昭以書與春卿勸令易節改圖奉帝養父委身曹公則忠孝不墜榮名彰矣辭旨可稱鄴既定以昭為諫議大夫後袁尚依烏丸踏頓太祖將征之患軍糧難致鑿平虜泉州二渠入海通運昭所建也太祖表封千秋亭侯轉拜司空軍祭酒後昭建議宜修古建封五等太祖曰建設五等者聖人也又非人臣所制吾何以堪之昭曰自古以來人臣匡世未有今日之功有今日之功未有久處人臣之勢者也今明公耻有慙德而未盡善樂保名節而無大責德美過於伊周此至德之極也然太甲成王未必可遭今民難化甚於殷周處大臣之勢使人以大事疑己誠不可不重慮也明公雖邁威德明法術而不定其基為萬世計猶未至也定基之本在地與人宜稍建立以自藩衛耿弇牀下之言朱英無妄之論不得過耳昭受恩非凡不敢不陳後太祖遂受魏公魏王之號皆昭所創也及關侯圍曹仁於樊孫權遣使辭以遣兵西上欲掩取關江陵公安纍重關失二城必自奔走樊軍之圍不救自解乞密不漏令關有備太祖詰羣臣羣臣咸言宜當密之昭曰軍事尚權期於合宜宜應權以密而內露之關聞權上若還自護圍則速解便獲其利可使兩賊相對銜持坐待其弊祕而不露使權得志非計之上又圍中將吏不知有救計糧怖懼儻有他意為難不小露之為便且關為人強梁自恃二城守固必不速退太祖曰善即敕救將徐晃以權書射著圍裏及關屯中圍裏聞之志氣百倍關果猶豫權軍至得其二城關乃破敗文帝即王位拜昭將作大匠及踐阼遷大鴻臚進封右鄉侯二年分邑百戶賜昭弟訪爵關內侯徙昭為侍中三年征東大將軍曹休臨江在洞浦口自表願將鋭卒虎步江南因敵取資事必克捷若其無臣不須為念帝恐休便渡江驛馬詔止時昭侍側因曰竊見陛下有憂色獨以休濟江故乎今者渡江人情所難就休有此志勢不獨行當須諸將臧霸等既富且貴無復他望但欲終其天命保守祿祚而已何肯乘危自投死地以求徼幸茍霸等不進休意自沮臣恐陛下雖有敕渡之詔猶必沈吟未便從命也是後無幾暴風吹賊船悉詣休營下斬首獲生賊遂迸散詔敕諸軍促渡軍未時進賊救船遂至大駕幸宛征南大將軍夏侯尚等攻江陵未拔時江水淺狹尚欲乘船將步騎入渚中安屯作浮橋南北往來議者多以為城必可拔昭上疏曰武皇帝勇智過人而用兵畏敵不敢輕之若此也夫兵好進惡退常然之數平地無險尚猶艱難就當深入還道宜利兵有進退不可如意今屯渚中至深也浮橋而濟至危也一道而行至狹也三者兵家所忌而今行之賊頻攻橋設有漏失渚中精鋭非魏之有將轉化而為吳矣臣私戚之忘寢與食而議者怡然不以為憂豈不惑哉加江水向長一旦暴增何以防禦就不破賊尚當自完奈何乘危不以為懼事將危矣惟陛下察之帝悟昭言即詔尚等促出賊兩頭並前官兵一道引去不時得泄將軍石建高遷僅得自免軍出旬日江水暴長帝曰君論此事何其審也正使張陳當之何以復加五年徙封成都鄉侯拜太常其年徙光祿大夫給事中從大駕東征七年還拜太僕明帝即位進爵樂平侯邑千戶轉衛尉分邑百戶賜一子爵關內侯太和四年行司徒事六年拜真昭上疏陳末流之弊深以世尚浮偽毁壞風俗為言帝於是發切詔斥免諸葛誕鄧揚等用浮偽故也昭年八十一薨諡曰定侯子胄嗣歷位郡守九卿劉煜字子陽淮南成德人也漢光武子阜陵王延之後父普母修産渙及煜渙九歲煜七歲而母病困臨終戒渙煜以普之侍人有諂害之性我死之後懼必亂家汝長大能除之則吾無恨矣後煜年十三謂兄渙曰亡母之言可以行矣渙曰那可爾煜即入室殺侍者徑出拜墓舍內大驚白普普怒遣人追煜煜還拜謝曰亡母顧命之言敢受不請擅行之罰普心異之遂不責也汝南許劭名知人避地揚州稱煜有佐世之才揚土多輕俠狡桀有鄭寶張多許乾之屬各擁部曲寶最驍果才力過人一方所憚欲驅略百姓越赴江表以煜高族名人欲強逼煜使唱導此謀煜時年二十餘心內憂之而未有緣會太祖遣使詣州有所案問煜見為論事勢要將與歸駐止數日寶果從數百人齎牛酒來候使煜令家僮將其衆坐中門外為設酒飯與寶於內宴飲密勒健兒令因行觴而斫寶寶性不甘酒視候甚明觴者不敢發煜因自引佩刀斫殺寶斬其首以令其軍云曹公有令敢有動者與寶同罪衆皆驚怖走還營營有督將精兵數千懼其為亂煜即乘寶馬將家僮數人詣寶營呼其渠帥喻以禍福皆叩頭開門內煜煜撫慰安懷咸悉悅服推煜為主煜覩漢室漸微已為支屬不欲擁兵遂委其部曲與廬江太守劉勳勳怪其故煜曰寶無法制其衆素以鈔掠為利僕宿無資望而整齊之必懷怨難久故相與耳時勳兵強於江淮之間孫策惡之遣使卑辭厚幣以書説勳曰上繚宗民數欺下國忿之有年矣擊之路不便願因上國伐之上繚甚實得之可以富國請出兵為外援勳信之又得策珠寶葛越喜悅外內盡賀而煜獨否勳問其故對曰上繚雖小城堅池深攻難守易不可旬日而舉則兵疲於外而國內虛策乘虛而襲我則後不能獨守是將軍進屈於敵退無所歸若軍必出禍今至矣勳不從興兵伐上繚策果襲其後勳窮踧遂奔太祖太祖至壽春時廬江界有山賊陳策衆數萬人臨險而守先時遣偏將致討莫能禽克太祖問羣下可伐與不咸云山峻高而溪谷深隘攻之實難又無之不足為損有之不足為益煜曰策等小豎因亂赴險遂相依為強耳非有爵命威信相服也往者偏將資輕而中國未夷故策敢據險以守今天下略定後服先誅夫畏死趨賞愚智所同故廣武君為韓信畫䇿謂其威名足以先聲後實而服鄰國也豈況明公之德東征西怨先開賞募大兵臨之令宣之日軍門啓而虜自潰矣太祖笑曰卿言近之遂遣猛將在前大軍在後至則克䇿如煜所度太祖還辟煜為司空倉曹掾太祖征張魯轉煜為主簿既至漢中山峻難登軍食頗乏太祖曰此妖妄之國耳何能為有無吾軍食少不如速還便自引歸令煜督後諸軍使以次出煜䇿魯可克加糧道不繼雖出軍猶不能皆全馳白太祖不如致攻遂進兵多出弩以射其營魯奔走漢中遂平煜進曰明公以步卒五千將誅董卓北破袁紹南征劉表九州百郡十并其八威震天下勢懾海外今舉漢中蜀人望風破膽失守推此而前蜀可傳檄而定劉備人傑也有度而遲得蜀日淺蜀人未附也今破漢中蜀人震恐其勢自傾以公之神明因其傾而壓之無不克也若小緩之諸葛亮明於治而為相關侯張飛勇冠三軍而為將蜀民既定據險守要則不可犯矣今不取必為後憂太祖不從居七日蜀降者説蜀中聞漢中破一日數十驚備雖斬之而不能安也太祖延問煜曰今尚可擊不煜曰今已小定不可擊也大軍遂還煜自漢中還為行軍長史兼領軍延康元年蜀將孟逹率衆降逹有容止才觀文帝甚器愛之使達為新城太守加散騎常侍煜以為達有茍得之心而恃才好術必不能感恩懷義新城與吳蜀接連若有變態大為國患文帝竟不易後達終於叛敗黃初元年以煜為侍中賜爵關內侯詔問羣臣令料劉備當為關侯出報吳不衆議咸云蜀小國耳名將唯關侯死軍破國內憂懼無緣復出煜獨曰蜀雖狹弱而備之謀欲以威武自強勢必用衆以示其有餘且關侯與備義為君臣恩猶父子關死不能為興軍報敵於始終之分不足明年備果出兵擊吳孫權悉國應之而遣使稱藩帝以問煜煜對曰權無故求降必為蜀所伐既外有強寇又恐中國承其釁而征之故委地求降一以却中國之兵二則假中國之援以強其衆而疑敵人耳夫吳蜀各保一州阻山依水有急相救此小國之利也今還自相攻天亡之也宜大興師渡江襲之蜀攻其外我襲其內吳之亡不出旬月吳亡則蜀亦不能久有矣帝曰人稱臣降而伐之不祥且疑天下欲來者心遂受吳降即拜權為吳王煜又進曰不可先帝征伐天下十兼其八威震海內陛下受禪即真德合天地聲暨四遠此實然之勢非卑臣頌言也權雖有雄才故漢驃騎將軍南昌侯耳官輕勢卑士民有畏中國之心不可強迫與成所謀也不得已受其降可進其將軍號封十萬戶侯不可即以為王也夫王位去天子一階耳其禮秩服御相亂也彼直為侯江南士民未有君臣之義也我信其偽降就封殖之崇其位號定其君臣是為虎傅翼也權既受王位却蜀兵之後外盡禮事中國使其國內皆聞之內為無禮以怒陛下陛下赫然發怒興兵討之乃徐告其民曰我委身事中國不愛珍貨重寶隨時貢獻不敢失臣禮也無故伐我必欲殘我國家俘我人民子女以為僮𨽻僕妾吳民無緣不信其言也信其言而感怒上下同心戰加十倍矣帝不聽權既稱王其將陸遜大敗劉備殺其兵八萬餘人備僅以身免權外禮愈卑而內行不順悉如煜言五年帝幸廣陵泗口命荆揚州諸軍並進伐吳會羣臣問權當自來不咸曰陛下親征權恐怖必舉國而應又不敢以大衆委之臣下必自將而來煜曰彼謂陛下欲以萬乘之重牽已而超越江湖者在於别將必勒兵待事未有進退也大駕停住積日權果不至帝乃旋師云卿策之是也當念為吾破滅二賊不可但知其情而已明帝即位進爵東亭侯邑三百戶時有詔令公卿已下會議高皇之父處士君號諡煜議以為周王上祖后稷者以其佐唐有功名在祀典者也漢氏之初追諡之義不及其祖今追尊之禮宜齊高皇而已尚書衛臻與煜議同事遂施行遼東太守公孫淵奪叔父位擅自立遣使表狀煜以為公孫氏漢時所用遂世官相承水則由海陸則阻山故胡夷絶遠難制而世權日久今若不誅後必生患若懷二阻兵然後致誅於事為難不如因其新立有黨有仇先其不意以兵臨之開設賞募可不勞師而定也後淵竟反煜在朝略不交接時人或問其故煜答曰魏室即阼尚新智者知命俗或未咸僕在漢為支葉於魏備腹心寡偶少徒於宜未失也煜事明帝又大見親重帝將伐蜀朝臣內外皆云不可煜入與帝議因曰可伐出與朝臣言則曰不可伐煜有膽智言之皆有形中領軍楊暨帝之親臣又重煜持不可伐蜀之議最堅每從內出輒過煜煜講不可伐之意後暨從駕行天淵池帝論伐蜀事暨切諌帝曰卿書生焉知兵事暨謙謝曰臣出自儒生之末陛下過聽拔臣羣萃之中立之六軍之上誠不足採侍中劉煜先帝謀臣常曰蜀不可伐帝曰煜與吾言蜀可伐暨曰煜可召質也詔召煜至帝問之煜終不言後獨見煜責帝曰伐國大謀也臣得與謀常恐眯夢漏泄以益臣罪焉敢向人言之夫兵詭道也軍事未發不厭其密也陛下顯然露之臣恐敵國已聞之矣於是帝謝之煜見出責暨曰夫釣者中大魚則縱而隨之須可制而後牽則無不得也人主之威豈徒大魚而已子誠直臣然計不足采不可不精思也暨亦謝之煜能應變持兩端如此或惡煜於帝曰煜不盡忠善伺上意所趣而合之陛下試與煜言皆反意而問之若皆與所問反者是煜常與聖意合也復每問皆同者煜之情必無所逃矣帝如言以驗之果得其情從此疏焉煜遂發狂太和六年以疾拜太中大夫有間為大鴻臚在位二年遜位復為太中大夫薨諡曰景侯子宇嗣少子陶亦高才而薄行母邱儉之起也大將軍司馬師以問陶陶答依違師怒曰卿平生與吾論天下事至於今日而更不盡乎乃出為平原太守又追殺之蔣濟字子通楚國平阿人也仕郡計吏州别駕建安十三年孫權率衆圍合肥時大軍征荆州遇疾疫惟遣將軍張喜單將千騎過領汝南兵以解圍頗復疾疫濟乃密白刺史偽得喜書云步騎四萬已到雩婁遣主簿迎喜三部使齎書語城中守將一部得入城二部為賊所得權信之遽燒圍走城用得全明年使於譙太祖問濟曰昔孤與袁本初對官渡徙燕白馬民民不得走賊亦不敢鈔今欲徙淮南民何如濟對曰是時兵弱賊強不徙必失之自破袁紹北拔栁城南向江漢荆州交臂威震天下民無他志然百姓懷土實不樂徙懼必不安太祖不從而江淮間十餘萬衆皆驚走吳後濟使詣鄴太祖迎見大笑曰本但欲使避賊乃更驅盡之拜濟丹陽太守大軍南征還以溫恢為揚州刺史濟為别駕民有誣告濟為謀叛主率者太祖聞之指有令與左將軍于禁沛相封仁等曰蔣濟寧有此事有此事吾為不知人也此必愚民樂亂妄引之耳促理出之辟為丞相主簿西曹屬關侯圍樊襄陽太祖以漢帝在許近寇欲徙都司馬懿及濟説太祖曰于禁等為水所沒非戰攻之失於國家大計未足有損劉備孫權外親而內疏關侯得志權必不願也可遣人勸躡其後許割江南以封權則樊圍自解太祖如其言權聞之即引兵西襲公安江陵關遂見禽文帝即王位轉為相國長史及踐阼出為東中郎將濟請留詔曰高祖歌曰安得猛士守四方天下未寧要須良臣以鎮邊境如其無事乃還鳴玉未為後也濟上萬機論帝善之入為散騎常侍時有詔詔征南將軍夏侯尚曰卿腹心重將特當任使恩施足死惠愛可懷作威作福殺人活人尚以示濟濟既至帝問曰卿所聞見天下風教何如濟對曰未見他善但見亡國之詔耳帝忿然作色而問其故濟具以答因曰夫作威作福書之明誡天子無戲言古人所慎惟陛下察之於是帝意乃解遣追取前詔黃初三年與大司馬曹仁征吳濟别襲羡溪仁欲攻濡須洲中濟曰賊據西岸列船上流而兵入洲中是為自內地獄危亡之道也仁不從果敗仁薨復以濟為東中郎將代領其兵頃之徵為尚書車駕幸廣陵濟表水道難通又上三州論以諷帝帝不從於是戰船數千皆滯不得行議者欲就留兵屯田濟以為東近湖北臨淮若水盛時賊易為寇不可安屯帝從之車駕即發還到精湖水稍盡盡留船付濟船本歷適數百里中濟更鑿地作四五道蹴船令聚豫作土豚遏斷湖水皆引後船一時開遏入淮中帝還洛陽謂濟曰事不可不曉吾前決謂分半船燒於山陽池中卿於後致之略與吾俱至譙又每得所陳實入吾意自今討賊計畫善思論之明帝即位賜爵關內侯大司馬曹休帥軍向皖濟表以為深入虜地與權精兵對而朱然等在上流乘休後臣未見其利也軍至皖吳出兵安陸濟又上疏曰今賊示形於西必欲并兵圖東宜急詔諸軍往救之會休軍已敗盡棄器仗輜重退還吳欲塞夾口遇救兵至是以官軍得不沒遷為中護軍時中書監令號為專任濟上疏曰大臣太重者國危左右太親者身蔽古之至戒也往者大臣秉事外內扇動陛下卓然自覽萬機莫不祗肅夫大臣非不忠也然威權在下則衆心慢上勢之常也陛下既已察之於大臣願無忘於左右左右忠正遠慮未必賢於大臣至於便辟取合或能工之今外所言輒云中書雖使恭愼不敢外交但有此名猶惑世俗况實握事要日在目前儻因疲倦之間有所割制衆臣見其能推移於事即亦因時而向之一有此端因當內設自完以此衆語私招所交為之內援若此臧否毁譽必有所興功負賞罰必有所易直道而上者或壅曲附左右者反達因微而入緣形而出意所狎信不復猜覺此宜聖智所當早聞外以經意則形際自見或恐朝臣畏言不合而受左右之怨莫適以聞臣竊亮陛下潛神默思公聽並觀若事有未盡於理而物有未周於用將改曲易調遠與黃唐角功近昭武文之迹豈近習而已哉然人君猶不可悉天下事以適已明當有所付三官任一臣非周公旦之忠又非管夷吾之公則有弄機敗官之弊當今柱石之士雖少至於行稱一州智效一官忠信竭命各奉其職可並驅策不使聖明之朝有專吏之名也詔報嘉之就遷為護軍將軍加散騎常侍景初中外勤征役內務宫室怨曠者多而年穀飢儉濟上疏曰陛下方當恢崇前緒光濟遺業誠未得高枕而治也今雖有十二州至於民數不過漢時一大郡二賊未誅宿兵邊陲且耕且戰怨曠積年宗廟宫室百事草創農桑者少衣食者多今其所急惟當息耗百姓不至甚弊弊敗之民儻有水旱百萬之衆不為國用凡使民必須農隙不奪其時夫欲大興功之君先料其民力而煦休之句踐養胎以待用昭王恤病以雪仇故能以弱燕服強齊羸越滅徑吳今二敵不攻不滅不事即侵當身不除百世之責也以陛下聖明神武之略舍其緩者專心討賊臣以為無難矣又歡娛之耽害於精爽神太用則竭形太勞則弊願大簡賢妙足以充百斯男者其冗散未齒且悉分出務在清靜詔曰微護軍吾弗聞斯言也齊王即位徙為領軍將軍進爵昌陵亭侯遷太尉先是侍中高堂隆論郊祀事以魏為舜後推舜以配天濟以舜本姓媯其苗曰田非曹之先著文以追詰隆是時曹爽專政丁謐鄧揚等輕改法度會有日蝕變詔羣臣問其得失濟上疏曰昔大舜佐治戒在比周周公輔政慎於其朋齊侯問災晏嬰對以布惠魯君問異臧孫答以緩役應天塞變乃實人事今二賊未滅將士暴露已數十年男女怨曠百姓貧苦夫為國法度惟命世大才乃能張其綱維以垂于後豈中下之吏所宜改易哉終無益於治適足傷民望宜使文武之臣各守其職率以清平則和氣祥瑞可感而致也以隨太傅司馬懿屯洛水浮橋誅曹爽等進封都鄉侯邑七百戶濟上疏固讓不許初懿之起事也命濟以書與爽言但免官而已及爽誅滅濟病其言之失信因以發病是嵗薨諡曰景侯初濟為揚州别駕有時苗者字德胄巨鹿人少清白為人疾惡建安中入丞相府出為壽春令揚州治在其縣苗初至往謁濟濟素嗜酒會醉不能見苗苗怒還刻木為人署曰酒徒蔣濟置之墻下旦夕射之州郡雖知其不恪然以其履行過人無若之何始至官乘薄軬車黃牸牛布被囊居官歲餘牛生一犢及其去留其犢謂主簿曰令來時本無犢犢是淮南所生也羣吏曰六畜不識父自當隨母苗不肯時人以為矯然名聞天下還為太官令領其郡中正定九品於敘人才不能寬𢎞紀人之短雖在久遠銜之不置如所忿濟者濟復位台司不以苗前毁已為嫌苗亦不為濟貴更屈意為令數歲不肅而治遷典農中郎將卒濟薨子秀嗣秀薨子凱嗣咸熙中開建五等以濟著勳前朝改封凱為下蔡子劉放字子棄涿郡人漢廣陽順王子西鄉侯宏後也歷郡綱紀舉孝亷遭世大亂漁陽王松據其土放往依之太祖克冀州放説松曰往者董卓作逆英雄並起阻兵擅命人自封殖惟曹公能拔拯危難翼戴天子奉辭伐罪所向必克以二袁之強守則淮南氷消戰則官渡大敗乘勝席卷將清河朔威刑既合大勢已見速至者漸福後服者先亡此乃不俟終日馳騖之時也昔黥布棄南靣之尊仗劒歸漢誠識廢興之理審去就之分也將軍宜投身委命厚自結納松然之會太祖討袁談於南皮以書招松松舉雍奴泉州安次以附之放為松答太祖書其文甚麗太祖既善之又聞其説由是遂辟放建安十年與松俱至太祖大悅謂放曰昔班彪依竇融而有河西之功今一何相似也乃以放參司空軍事歷主簿記室出為郃陽祋祤贊令魏國建與太原孫資俱為祕書郎資字彥龍先是亦歷縣令參丞相軍事文帝即位放資轉為左右丞數月放徙為令黃初初改祕書為中書以放為監資為令各加給事中放賜爵關內侯資關中侯並掌機密三年放進爵魏壽亭侯資關內侯明帝即位尤見寵任同加散騎常侍進放西鄉侯資樂陽亭侯太和末吳遣將周賀浮海詣遼東招誘公孫淵帝欲邀討之朝議多以為不可惟資決行䇿果大破之進爵左鄉侯放善為書檄三祖詔命有所詔喻多放所為青龍初孫權與諸葛亮連和欲俱出為寇邊候得權書放乃改易其辭往往換其本文而傅合之與征東將軍滿寵若欲歸化封以示亮亮騰與吳大將步騭等以見權權懼亮自疑深自解説是嵗皆加侍中光祿大夫景初二年遼東平定以參謀之功各進爵封本縣放方城侯資中都侯其年帝寢疾欲以燕王宇為大將軍及領軍將軍夏侯獻武衛將軍曹爽屯騎校尉曹肇驍騎將軍秦朗共輔政宇性恭良陳誠固辭帝引見放資入卧內問曰燕王正爾為放資對曰燕王實自知不堪大任故耳帝曰曹爽可代宇不放資因贊成之又深陳宜速召太尉司馬懿以綱維皇室帝納其言即以黃紙授放作詔放資既出帝意復變詔止懿勿使來尋更見放資曰我自召懿而曹肇等反使吾止之幾敗吾事命更為詔帝獨召爽與放資俱受詔命遂免宇獻肇朗官懿亦至登牀受詔然後帝崩初放資久典機任獻肇心內不平殿中有雞栖樹二人相謂此亦久矣其能復幾指謂放資放資懼故因此勸帝召懿而廢獻肇等齊王即位以放資決定大謀增邑三百放并前千一百資千尸封愛子一人為亭侯次子騎都尉餘子皆郎中正始元年更加放左光祿大夫資右光祿大夫金印紫綬儀同三司六年放轉驃騎資衛將軍領監令如故七年復封子一人亭侯各年老遜位以列侯朝朔望位特進曹爽誅後復以資為侍中領中書令嘉平二年放薨諡曰敬侯子正嗣資復遜位歸第就拜驃騎將軍轉侍中特進如故三年薨諡曰貞侯子宏嗣放才計優資而自修不如也放資既善承順主上亦未嘗顯言得失抑辛毗而助王思以是獲譏於世然時因羣臣諫諍扶贊其義并時密陳損益不專導諛言云及咸熙中開建五等以放資著勳前朝改封正方城子宏離石子後之論者言放資稱贊曹爽勸召司馬懿魏室之亡實基於此故指此二人為姦回之首蓋有以也通志卷一百十五上
