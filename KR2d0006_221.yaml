body:
  text: 通志卷一百九十七宋右廸功郎鄭樵漁仲撰四夷傳第四南蠻上南蠻序略巴郡南郡蠻板楯蠻獠南平獠東謝蠻西趙蠻䍧柯蠻兖州蠻西爨蠻昆彌蠻尾濮木綿濮文面濮折腰濮赤口濮附黑僰濮松外諸蠻西南夷序略夜郎滇音顛卭都莋都莋音才各反冉駹音尨哀牢撣國僬僥夷附附國南蠻序略昔髙辛氏有犬戎之宼帝患其侵暴而征伐不克乃訪募有能得犬戎之將吳將軍頭者購金千鎰邑萬家又妻以少女時帝有畜狗其毛五色名曰槃瓠魏畧曰髙辛氏有老婦患耳挑之得物大如繭老婦盛於瓠中覆之以槃俄頃化為犬其文五色因名曰槃瓠令既下槃瓠遂銜人頭造闕下羣臣怪而診之乃吳將軍首也帝大喜而計槃瓠不可妻以女又無封爵之道議欲有報而未知所宜女聞之以為帝皇下令不可違信因請行帝不得已乃以女配槃瓠槃瓠得女負而走入南山止石室中所處險絶人跡不至今辰州盧溪縣西有武山黄閔武陵記曰山髙可萬仞山半有槃瓠石室可容數萬人中有石狀槃瓠行跡今案山窟前有石羊石獸古跡甚多望石窟大如三間屋遥見一石似狗形相傳為槃瓠像於是女解去衣裳為僕鑒之結著獨力之衣僕鑒獨力未詳或改鑒字為豎者妄也結音髻帝悲思之遣使尋求輙遇風雨震晦使者不得進經三年生子一十二人六男六女槃瓠死後自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形干寳晉紀曰武陵長沙廬江郡夷皆槃瓠之後雜處五谿之内憑山阻險每毎為害常揉雜魚肉叩槽而號以祭槃瓠俗稱赤髀横裙即其子孫也其母後歸以狀白帝於是帝使迎致諸子衣裳斑蘭言語侏離侏離蠻夷語聲好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷外癡内黠安土重舊以先父有功母帝之女田作賈販無闗梁符傳租稅之賦優寵之故蠲其賦役也荆州記曰元陵縣居酉口有上就武陽二鄉惟此是槃瓠子孫狗種也二鄉在武溪之北有邑君長皆賜印綬冠用獺皮名渠帥曰精夫相呼為姎徒說文曰姎女人自稱姎我也音烏朗反此已上皆見風俗通也今長沙武陵蠻是也其在唐虞與之要質故曰要服夏商之時漸為邊患逮於周世黨衆彌盛宣王中興乃命方叔南伐蠻方詩人所謂蠻荆來威者也又曰蠢爾蠻荆大邦為讐明其黨衆繁多是以抗敵諸夏也平王東遷蠻遂侵暴上國晉文侯輔政乃率蔡共侯擊破之至楚武王時蠻與羅子共敗楚師殺其將屈瑕莊王初立民饑兵弱復為所寇楚師既振然後乃服自是遂屬於楚鄢陵之役蠻與共王合兵擊晉及吳起相悼王南并蠻越遂有洞庭蒼梧秦昭王使白起伐楚畧取蠻夷始置黔中郡漢興改為武陵黔中故城在今辰州沅陵縣西嵗令大人輸布一疋小口二丈是為賨布說文曰南蠻賦也牂東反雖時為宼盗而不足為郡國患光武中興武陵蠻夷特盛建武二十三年精夫相單程等據其險隘大宼郡縣遣武威將軍劉尚發南郡長沙武陵兵萬餘人乘船泝沅水入武谿擊之沅水出牂牱故且蘭東北經辰州潭州岳州經洞庭湖入江也尚輕敵入險山深水疾舟船不得上蠻人知尚糧少入逺又不曉道徑遂屯聚守險尚食盡引還蠻縁路徼戰尚軍大敗悉為所没二十四年相單程等下攻臨沅遣謁者李嵩中山太守馬成擊之不能尅眀年春遣伏波將軍馬援中郎將劉匡馬武孫永等將兵至臨沅擊破之單程等饑困乞降㑹援病卒謁者宗均聴悉受降為置吏司羣蠻遂平肅宗初武陵澧中蠻陳從等反叛入零陽蠻界零陽縣屬武陵其冬零陽蠻五里精夫為郡擊破從從等皆降三年冬漊中蠻覃免健等復反漊水名源出澧州崇義縣也攻燒零陽作唐孱陵界中作唐縣屬武陵郡孱陵縣故城今荆州公安縣西南孱音仕顔反眀年春發荆州七郡及汝南潁川弛刑徒吏士五千餘人拒守零陽募充中五里蠻精夫不叛者四千人擊澧中賊充縣屬武陵郡充音衝五年春覃免健等請降不許郡因進兵與戰於宏下大破之斬免健首餘皆棄營走還漊中復遣乞降乃受之於是罷武陵屯兵賞賜各有差和帝永元四年冬漊中澧中蠻潭戎等反燔燒郵亭殺畧吏民郡兵擊破降之安帝元初二年澧中蠻以郡縣徭稅失平懐怨恨遂結充中諸種二千人攻城殺長吏州郡募五里蠻六亭追擊破之皆散降賜五里六亭渠帥金帛各有差眀年秋漊中澧中蠻四千人並為盜賊又零陵蠻羊孫陳湯等千餘人零陵縣屬武陵郡也著赤幘稱將軍燒官寺抄掠百姓州郡募善蠻討平之順帝永和元年武陵太守上書以蠻夷率服可比漢人增其租賦議者皆以為可尚書令虞詡獨奏曰自古聖王不臣異俗非徳不能及威不能加知其獸心貪婪難率以禮義是故覉縻而綏撫之附則受而不逆叛則棄而不追先帝舊典貢稅多少所由來久矣今猥增之必有怨叛計其所得不償所費必有後悔帝不從其冬澧中漊中蠻果争賨布非舊約遂殺鄉吏舉種反叛眀年春蠻一萬人圍充城八千人宼夷道遣武陵太守李進討破之斬首數百級餘皆降服進乃簡選良吏得其情和在郡九年梁太后臨朝下詔增進秩二千石賜錢二十萬桓帝元嘉元年秋武陵蠻詹山等四千餘人反叛拘執縣令屯結深山至永興元年太守應奉以恩信招誘皆悉降散永夀三年十一月長沙蠻反叛屯益陽至延熹三年秋遂抄掠郡界衆至萬餘人殺傷長吏又零陵蠻入長沙冬武陵蠻六千餘人㓂江陵荆州刺史劉度謁者馬睦南郡太守李肅皆奔走肅主簿胡爽叩馬首諫曰蠻夷見郡無儆備故敢乘間而進眀府為國大臣連城千里舉旄鳴鼓應聲十萬奈何委符守之重而為逋逃之人乎肅拔刃向爽曰掾促去大守今急何暇此計爽抱馬固諫肅遂殺爽而走帝聞之徵肅棄市度睦减死一等復爽門閭拜家一人為郎於是以右校令度尚為荆州刺史討長沙賊平之又遣車騎將軍馮緄討武陵蠻並皆降散軍還賊復宼桂陽太守廖祈奔走武陵蠻亦更攻其郡太守陳奉率吏民擊破之斬首三千餘級降者二千餘人至靈帝中平三年武陵蠻復叛宼郡界州郡撃破之東晉時沔中蠻因劉石亂後漸徙於陸渾以南徧于邑落宋齊以後荆雍二州荆州江陵郡雍州襄陽郡各置校尉以撫寧之羣酋蠻帥互受南北朝封爵至後魏末暴患滋甚僣稱侯王屯據峽路斷絶行旅周武帝遣開府陸騰破平之又有别種蠻曰獠徃代出自梁益間自漢中達于卭筰李勢時始出巴西渠川廣漢陽安資中犍為梓潼布滿山谷十餘萬落為梁益大患及後周平梁益遂從賦役頗同華人然天性暴亂撫御少失擾動隨之唐世兵威逺被其黔中蠻曰東謝西趙者自昔不為王臣皆置覊縻州使相攝領自是南寧昆瀰諸濮及松外諸蠻徃徃皆稽服焉巴郡南郡蠻巴郡南郡蠻本有五姓巴氏樊氏曋氏音審相氏鄭氏皆出於武落鍾離山世本曰廪君之先故出巫誕也其山有赤黑二穴巴氏之子生於赤穴四姓之子皆生黑穴未有君長俱事鬼神乃共擲劒於石穴約能中者奉以為君巴氏子務相乃獨中之衆皆歎又令各乗土船約能浮者當以為君餘姓悉沈唯務相獨浮因共立之是為廪君乃乘土船從夷水至鹽陽荆州圖經曰副夷縣西有温泉古老相傳此泉原出鹽今水有鹽氣縣西一獨山有石穴有二大石並立穴中相去可一丈俗名為隂陽石隂石常隰陽石常燥盛𢎞之荆州記曰昔廩君浮夷水射鹽神於陽石之上案今施州清江縣水一名鹽水源出清江縣西都亭山水經云夷水出巴郡魚復縣注云水色清照十丈分沙石蜀人見澄清因名清江鹽水有神女謂廪君曰此地廣大魚鹽所出願留共居廪君不許鹽神暮輙來取宿旦即化為蟲與諸蟲羣飛掩蔽日光天地晦冥積十餘日廪君思其便因射殺之天乃開眀世本曰廪君使人操青縷以遺鹽神曰嬰此即相宜乃與女俱不宜將去鹽神受縷而嬰之廪君即立陽石上詹青縷而射之中鹽神鹽神死天乃大開眀也廪君於是君乎夷城四姓皆臣之廪君死䰟魄世為白虎巴氏以虎飲人血遂以人祠焉及秦惠王并巴中以巴氏為蠻夷君長世尚秦女其民爵比不更有罪得以爵除其君長嵗出賦二千一十六錢三嵗一出義賦千八百錢其民户出幏布八丈二尺雞羽三十鍭說文幏南郡蠻夷布也音公亞反毛詩四鍭既鈞儀禮矢鍭一乗鄭元注曰鍭猶候也候物而射之也三十鍭一百二十矢俗本幏作䝉鍭作鏃者並誤也漢興南郡太守靳彊請一依秦時故事至建武二十三年南郡潳山蠻雷遷等始反叛潳音屠宼掠百姓遣武威將軍劉尚將萬餘人討破之徙其種人七千餘口置江夏界中今沔中蠻是也和帝永元十三年巫蠻許聖等巫縣屬南郡以郡收稅不均懐怨恨遂屯聚反叛眀年夏遣使者督荆州諸郡兵萬餘人討之聖等依憑岨隘久不破諸軍乃分道並進或自巴郡魚復數路攻之蠻乃散走斬其渠帥乘勝追之大破聖等聖等乞降復悉徙置江夏靈帝建寧二年江夏蠻叛州郡討平之光和三年江夏蠻復反與廬江賊黄攘相連結十餘萬人攻没四縣宼患累年廬江太守陸康討破之餘悉降散板楯蠻板楯蠻夷者秦昭襄王時有一白虎常從羣虎數遊秦蜀巴漢之境傷害千餘人昭王乃重募國中有能殺虎者賞邑萬家金百鎰時有巴郡閬中夷人能作白竹之弩乃登樓射殺白虎華陽國志曰巴夷廖仲等射殺之也昭王嘉之而以其夷人不欲加封乃刻石盟要復夷人頃田不租十妻不筭優寵之故一户免其一頃田之稅雖有十妻不輸口筭之錢復音福傷人者論殺人得以倓錢贖死何承天纂文曰倓蠻夷贖罪貨也音徒濫反盟曰秦犯夷輸黄龍一雙夷犯秦輸清酒一鍾夷人安之至漢髙祖為漢王發夷人還伐三秦秦地既定乃遣還巴中復其渠帥羅朴督鄂度夕龔七姓不輸租賦餘户乃嵗入賨錢口四十世號為板楯蠻夷閬中有渝水其人多居水左右天性勁勇初為漢前鋒數䧟陳俗喜歌舞髙祖觀之曰此武王伐紂之歌也乃命樂人習之所謂巴渝舞也遂世世服從至於東漢郡守常率以征伐桓帝之世板楯數反太守蜀郡趙温以恩信降服之靈帝光和三年巴郡板楯復叛㓂掠三蜀及漢中諸郡靈帝遣御史中丞蕭瑗督益州兵討之連年不能尅帝欲大發兵乃問益州計吏考以征討方畧漢中上計程包對曰板楯七姓射殺白虎立功先世復為義人其人勇猛善於兵戰昔永初中羗入漢川郡縣破壊得板楯救之羗死敗殆盡故號為神兵羗人畏忌傳語種軰勿復南行至建和二年羗復大入實頼板楯連摧破之前車騎將軍馮緄南征武陵雖受丹陽精兵之銳丹陽楚也南郡枝江有丹陽故城亦倚板楯以成其功近益州郡亂太守李顒亦以板楯討而平之忠功如此本無惡心長吏鄉亭更賦至重僕役箠楚過於奴虜亦有嫁妻賣子或乃至自剄割雖陳寃州郡而牧守不為通理闕庭悠逺不能自聞含怒呼天叩心窮谷愁苦賦役因羅酷刑故邑落相聚以致叛戾非有謀王僣號以圖不軌今但選眀能牧守自然安集不煩征伐也帝從其言遣太守曹謙宣詔赦之即皆降伏至中平五年巴州郡黄巾賊起板楯蠻夷因此復叛㓂掠城邑遣西園上軍别部司馬趙瑾討平之及漢末天下大亂自巴西之宕渠遷於漢中楊車坂抄掠行旅號為楊車巴氐魏武克漢中李特之祖將五百家歸之魏武又遷於畧陽北復號之為巴氐蜀後主建興十一年涪陵屬國人夷反車騎將軍鄧芝徃討皆破平之其沔中蠻至晉世劉石之亂漸得北遷陸澤以南滿於山谷宛洛蕭條郡邑邱墟矣後魏道武定中山聲教被於河表泰恒八年蠻王福安率渠帥數千朝於代都求留質子太武始光中拜安侍子豹為安逺將軍江州刺史順陽公是時羣蠻亦復臣屬江左宋因晉舊於荆州置南蠻校尉雍州置寧蠻校尉以領之蠻人順附者輸榖數斛無餘雜調而宋人賦役嚴苦貧者不復堪命多逃入蠻無徭役彊者又不供官稅結黨連羣動有數百千人州郡力弱則起為盗賊種類稍多户口不可知也文帝元嘉十八年天門今澧陽郡地漊中令宋矯之徭賦過重蠻不堪命蠻田向求等為宼破漊中虜略百姓荆州刺史衡陽王義季遣兵討破之二十年南郡臨沮當陽蠻反縛臨沮令傅驥荆州刺史南譙王義宣遣兵討破之初雍州刺史劉道産善撫諸蠻前後不附者皆引出平土多縁沔為居及道産亡蠻又反叛至孝武出為雍州羣蠻斷道臺遣太子歩兵校尉沈慶之連年討蠻所向皆平孝武即位後大眀中西陽蠻與諸蠻并叛沈慶之率江雍荆河州諸軍討之僅定眀帝順帝世暴亂尤甚荆州為之虚弊齊髙帝時武陵蠻田思飄武帝時黔陽蠻田豆渠湘州蠻陳雙並宼掠州郡其後雍司州蠻北通於魏頗為侵擾永眀中除郢州蠻帥田駟路為試守北遂安左郡太守田驢王為試守宜人左郡太守田何代為試守新平左郡太守以慰安之先是魏文成興光中蠻王文武龍請降魏拜為南雍州刺史魯陽侯孝文延興中大陽蠻酋桓誕擁漢水以北滍葉以南八萬餘落遣使内屬孝文拜誕征南將軍東荆州刺史襄陽王聴自選郡縣誕字天生晉偽楚桓元之子也元之敗也西奔至枚廻洲被殺誕時年數嵗流竄大陽蠻中遂習其俗及長多智謀為羣蠻所歸誕既内屬居朗陵太和四年王師南伐誕請為前驅乃授使持節南征西道大都督討義陽不果而還十年移居潁陽十六年依例降王為公十七年加征南將軍中道大都督征竟陵遇遷洛師停是時齊征虜將軍直閣將軍蠻酋田益宗率部曲四千餘户内屬襄陽酋雷婆思等十一人率户千餘内徙求居大和川詔給廪食後開南陽全有沔北之地蠻人安堵不為㓂賊十八年誕入朝賞遇隆厚卒諡曰剛子暉字道進位龍驤將軍東荆州刺史襲爵景眀初大陽蠻酋田育邱等二萬八千户内附詔置四郡十八縣暉卒贈冠軍將軍三年魯陽蠻魯北鷰等聚衆攻逼頻詔左衛將軍李崇討平之徙萬餘家於河北諸州及六鎮尋叛南走所在追討比及河殺之皆盡四年東荆州蠻素安反僣帝號正始元年素安弟秀安復反李崇楊大眼悉討平之二年梁沔東太守田清喜擁七郡三十一縣户萬九千遣使内附乞師討梁其雍州以東石城以西五百餘里水陸援路請率部曲斷之四年梁永寧太守文雲生六部自漢東遣使歸附初東荆州表太守桓叔興前後招慰大陽蠻歸附者一萬七百户請置郡十六縣五十詔前鎮東府長史酈道元檢行置之叔興即暉弟也延昌元年拜南荆州刺史居安昌隷於東荆州三年梁遣兵討江沔諸蠻百姓擾動蠻自相督率二萬餘人頻請統帥於叔興以為聲勢叔興給一統帥并威儀為之節度蠻人遂安其年梁荆州刺史蕭藻遣其將蔡令孫等三將㓂南荆之西南沿襄沔上下討掠諸蠻蠻酋龍驤將軍樊石㢘叛梁請援於叔興叔興遣將與石㢘督集蠻夏二萬餘人擊走之斬令孫等三將藻又遣其新陽太守邵道林於沔水之南石城東北立清水戍為抄掠之基叔興遣諸蠻破之四年叔興上表請不𨽻東荆州許之梁人每有㓂抄叔興必摧破之正光中叔興擁所部南叛蠻酋成龍彊率户數千内附拜刺史蠻帥田牛生率户二千内徙揚州拜為郡守梁義州刺史邊城王文僧眀鐵騎將軍邊城太守田官徳等率户萬餘舉州内屬拜僧眀平南將軍西豫州刺史封開封侯官徳龍驤將軍義州刺史自餘封授各有差僧眀官徳並入朝蠻出山至邊城建安者八九千户義州尋為梁將裴䆳所陷梁定州刺史田超秀亦遣使求附請援厯年朝廷恐輕致邊役未之許㑹超秀死其部曲遂相率内附其後六鎮秦隴所在反叛二荆西郢蠻大擾動斷三鵶路殺都督㓂盜至於襄城汝水百姓多被其害梁遣將圍廣陵楚城諸蠻並為前驅自汝水以南恣其暴掠連年攻討散而復合其暴滋甚又有冉氏向氏田氏者陬落尤盛餘則大者萬家小者千户更相崇署僣稱王侯屯據三峡斷遏水路荆蜀行人至有假道者周文畧定伊瀍聲教南被諸蠻畏服靡然向風矣大統五年蔡陽蠻主魯超眀内屬授南雍州刺史仍世襲焉十一年蠻酋梅勒特来貢其方物尋而蠻帥杜青和及江漢諸蠻擾動大將軍楊忠擊破之其後杜青和自稱巴西州刺史入附朝廷因其所稱而授之杜青和後遂反攻圍東梁州其唐州蠻田魯嘉亦叛自號豫州伯王雄權景宣等前後討平之廢帝初蠻酋樊舎舉落内附以為督淮北三州諸軍事淮州刺史淮安郡公于謹等平江陵諸蠻騷動詔豆盧寧蔡祐等討破之恭帝二年蠻酋宜人王田興彦北荆州刺史梅季昌等相繼款附以興彦季昌並為開府儀同三司加季昌洛州刺史賜爵石臺縣公其後巴蜀西人譙淹扇動羣蠻以附梁蠻帥向鎮侯向白虎等應之向五子王又攻陷信州田烏度田唐等抄斷江路文子榮復據荆州之政陽郡自稱江州刺史并隣州刺史蒲微亦舉兵逆命詔田宏賀若敦潘和李遷哲等討破之周武成初文州蠻反州軍討定之尋而冉令賢向五子王等又攻陷白帝殺開府楊長華遂相率作亂前後遣開府元契剛等緫兵出討雖頗剪其族類而元惡未除天和元年詔開府陸騰督王亮司馬裔等討之騰水陸俱進次於湯口先遣喻之而令賢方浚城池嚴設扞禦遣其長子西黎次子南王領其支屬於江南險要之地置立十城逺結涔陽蠻為其聲援令賢率其卒固守水邏城騰乃總集將帥謀進趣咸欲先取水邏然後經畧江南騰言於衆曰令賢内恃水邏金湯之險外託涔陽輔車之援兼復資糧充實器械精新以我懸軍攻其嚴壘脫一戰不尅更成其氣不如頓軍湯口先取江南翦其毛羽然後遊軍水邏此制勝之計也衆皆然之乃遣開府王亮率衆渡江旬日攻拔其八城凶黨奔散獲賊帥冉承公并生口三千人降其部衆一千户遂簡募驍勇數道分攻水邏路經石壁城極其險峻四面壁立故以名焉唯有一小路縁梯而上蠻蜑以為峭絶非兵衆所行騰被甲先登衆軍繼進備經危阻累日乃得舊路騰先任隆州總管雅知其路蠻帥冉伯犂冉安西與令賢有隟騰乃招誘伯犂等結為父子又多遺錢帛伯犂等恱遂為鄉導水邏側又有石勝城者亦號險要令賢使其兄龍真據之騰又宻告龍真云若平水邏使其代令賢處之龍真大恱遣其子詣騰騰厚加禮接賜以金帛蠻貪利既深仍請立効乃謂騰曰欲翻所據城恐人力寡少騰許以三百兵助之既而遣二千人銜枚夜進龍真力不能禦遂平石勝城晨至水邏蠻衆大潰斬首萬餘級令賢遁走追而獲之司馬裔又别下其二十餘城獲蠻帥并三公等騰乃積其骸骨於水邏城側為京觀後蠻蜑望見輙大哭自此狼戾之心輟矣時向五子王據石墨城令其子寶勝據雙城水邏平後頻遣喻之而五子王猶不從命騰又遣王亮屯牢坪司馬裔屯雙城以圖之騰慮雙城孤峭攻未可㧞賊若委城遁散又難追討乃令諸軍周廻立柵遏其走路賊乃大駭於是縱兵擊破之禽五子王於石墨獲寶勝於雙城悉斬諸向首領生禽萬餘口信州舊居白帝騰更於劉備故宫城南八陳之北臨江岸築城移置信州又以巫縣信陵秭歸並築城置防以為襟帶焉天和六年蠻渠冉祖憙冉龍驤又反詔大將軍趙誾討平之自是羣蠻懼息不復為㓂矣獠獠者盖南蠻之别種自漢中達於卭莋川洞之間所在皆有種類甚多散居山谷畧無氏族之别又無名字所生男女唯以長幼次第呼之其丈夫稱阿謩阿叚婦人阿夷阿等之類皆語之次第稱謂也依樹積木以居其上名曰干蘭干蘭大小隨其家口之數徃徃推一長者為王亦不逺相統攝父死則子繼若中國之貴族也獠王各有鼓角一雙使其子弟自吹擊之好相殺害多仇怨不敢逺行能卧水底持刀刺魚其口嚼食並鼻飲死者豎棺而埋之性同禽獸至於忿怒父子不相避唯手有兵刃者先殺之若殺其父走避於外求得一狗以謝其母然後敢歸母得狗謝不復嫌恨若報怨相攻擊必殺而食之平常刼掠賣取猪狗而已親戚比隣指授相賣被賣者號哭不服逃竄避之乃將買人捕逐若亡叛獲便縳之但經被縳者即服為賤隷不敢稱良矣亡失免女一哭便止不復追思唯執楯持矛不識弓矢用竹為簧羣聚鼓之以為音節能為細布色至鮮浄大狗一頭買一生口其俗畏鬼神尤尚滛祀所殺之人美鬚髯者乃剥其靣皮籠之以竹及燥號之曰鬼鼓舞祀之以求福利至有賣其昆季妻孥盡者乃自賣以供祭焉鑄銅為器大口寛腹名曰銅爨既薄且輕易於熟食李勢在蜀時諸獠始出巴西渠川廣漢陽安資中犍為梓潼布在山谷十餘萬落攻破郡縣為梁益之患勢為晉將桓温所伐内外受敵所以亡也自是蜀漢衰弱力不能制其後土人東流山險之地多空獠遂挟山傍谷與夏人參居頗輸租賦在深山者仍不為編户梁益二州嵗伐獠以禆潤公私頗藉為利後魏宣武正始中梁漢中太守夏侯道遷舉州内附宣武遣尚書邢巒為梁益二州刺史以鎮之近夏人者安堵樂業在山谷者不敢為宼後以羊祉為梁州傳豎眼為益州祉性酷虐不得物情梁輔國將軍范季旭與獠王趙清荆率衆屯孝子谷祉遣統軍趙眀擊走之後梁寧朔將軍姜白復擁夷獠入屯南城梁州人王法慶與之通謀衆屯於固門川祉遣征虜將軍討破之豎眼施恩布信大得獠和後以元法僧代傅豎眼為益州法僧在任貪殘獠遂反叛勾引梁軍圍逼晉夀朝廷憂之以豎眼先得物情復令乘傳徃撫獠聞豎眼至莫不欣然拜迎道路於是而定及元恒元子真相繼為梁州並無徳績諸獠甚苦之後朝廷以梁益二州控攝險逺乃設巴州以統諸獠後以巴酋嚴始欣為刺史又立隆城鎮所綰獠二十萬户所謂北獠也嵗輸租布又與外人交通貿易巴州生獠並皆不順其諸頭王每於時節謁見刺史而已眀帝孝昌初諸獠以始欣貪暴相率反叛攻圍巴州山南行臺魏子建勉諭之即時散罷自是獠與諸頭王相率詣行臺者接踵子建厚勞來之始欣見中國多事又失獠心慮獲罪譴時南梁州刺史隂子春扇惑邊陲始欣謀將南叛始欣族子愷時為隆城鎮將宻知之嚴設邏候遂禽梁使人並封始欣詔書鐡劵刀劒衣冠之屬表送行臺子建乃啟以鎮為南梁州愷為刺史發使執始欣囚於南鄭遇子建見代梁州刺史傅豎眼仍為行臺豎眼久病其子敬紹納始欣重賂使得還州始欣乃起衆攻愷屠滅之據城南叛梁將蕭玩率衆援接時梁益二州並遣將討之攻陷巴州執始欣大破玩軍遂斬玩以傅曇表為刺史後元羅為梁州以州入梁自此遂絶及周文平梁益之後令在所撫慰其與華人雜居者亦頗從賦役然天性暴亂旋致擾動每嵗命隨近州鎮出兵討之𫉬其生口以充賤𨽻謂之為壓獠焉復有商旅徃來者亦資以為貨公卿達於人庶之家有獠口者多矣恭帝三年陵州木籠獠反詔開府陸騰討破之周保定二年鐵山獠又反抄斷江路陸騰又攻拔其三城天和三年梁州恒稜獠叛總管長史趙文表討之軍次巴州文表欲率衆徑進軍吏等曰此獠旅拒日久部衆髙彊宜分兵四面攻之以離其勢今若大軍直進不遣竒兵恐并力於我未可制勝文表曰徃者既不能制今湏别為進趣若四面遣兵則獠降路絶理當相率以死拒戰如從一道則吾得示威恩遣人以理曉諭為惡者討之歸善者撫之善惡既分易為經略事有通變奈何欲遵前轍也文表遂以此意遍令軍中時有從軍熟獠多與恒稜親識即以實報之恒稜獠相與聚議猶豫之間文表軍已至其界獠中先有二路一路稍平一路極險俄有生獠酋帥數人來見文表曰我恐官軍不悉山川請為鄉導文表謂之曰此路寛平不湏導引卿但先去好慰喻子弟也乃遣之文表謂其衆曰向者獠帥謂吾從寛路而行必當設伏險要若從險路出其不虞獠衆自離散矣於是勒兵從險道進其有不通之處即平之乗髙而望果見其伏兵獠既失計争攜妻子退保險要文表頓軍大蓬山下示以禍福遂相率來降文表皆撫慰之仍徵其租稅無敢動者後除文表為蓬州刺史又大得人和建徳初季暉為蓬梁總管諸獠亦望風從附然其種類滋曼保據巖壑依山走險若履平地雖屢加兵弗可窮討性又無知殆同禽獸諸夷之中最難以道義招懷者也南平獠南平獠東距智州南屬渝州西接南州北接涪州部落四千餘户多瘴癘山有毒草沙蝨蝮蛇人樓居梯而上名為干欄婦人横布三幅穿中貫其首號曰通裙美髮髻垂於後竹筒三寸斜穿其耳貴者飾以珠璫俗女多男少婦人任役昬法女先以貨求男貧者無以嫁則賣為婢男子左袵露髪徒跣其王姓朱氏號劍荔王唐貞觀三年遣使入朝以其地𨽻渝州東謝蠻東謝蠻渠帥姓謝氏居黔州西三百里南距守宫獠西連夷子地方千里宜五榖為畬田嵗一易之衆處山巢居汲流以飲無賦稅刻木為契見貴人執鞭而拜賞有功者以牛馬銅鼓犯小罪則杖大事殺之盗物者倍償婚姻以牛酒為聘女歸夫家夫慙澁旬日乃出㑹擊銅鼓吹角俗椎髻韜以絳垂於後坐必蹲踞常帶刀劍男子服衫襖大口袴以帶斜繚右肩以螺殻虎豹援狖大羊皮為飾有謝氏世為酋長部落尊畏之其族不育女自以姓髙不可以嫁人貞觀三年其酋元深入朝冠烏皮若注旄以金銀絡額被毛帔韋行縢著履帝以其地為應州𨽻欽州都督府西趙蠻西趙蠻在東謝之南並南蠻别種其界東至夷子西至昆眀南至西洱河山洞深阻莫知里數南北十八日行東西二十三日行其風俗與東謝同趙氏代為酋長有萬餘户不臣中國黔州豪帥田康諷之唐貞觀中首領趙酋摩遣使入朝後率所部内附詔以酋摩為刺史䍧柯蠻䍧柯渠帥姓謝氏舊臣中國世為本土牧守隋亂遂絶唐貞觀中其酋遣使修貢勝兵數萬遂列其地為䍧州兖州蠻兖州䍧柯别部與䍧柯隣境勝兵二萬今黔中郡覊縻州唐貞觀中朝貢列其地為兖州西爨蠻西爨者南寧之渠帥梁時通焉自云本河東安邑人七世祖晉南寧太守中國亂遂王蠻中梁元帝時南寧州刺史徐文盛徵詣荆州有爨瓉者據其地延袤二千餘里土多駿馬犀象眀珠既死子震翫分統其衆隋開皇初遣使朝貢命韋世冲以兵戍之置恭州恊州昆州未幾叛史萬嵗擊之至西洱河滇池而還震翫懼而入朝文帝誅之諸子没為奴唐髙祖即位以其子宏達為昆州刺史奉父䘮歸而益州刺史叚倫遣俞大施至南寧治共範川誘諸部皆納款貢方物太宗遣將擊西爨開青蛉弄楝為縣昆彌蠻昆彌一曰昆眀在爨之西以西洱河為境即葉榆河也距長安九千里土歊濕宜秔稻人辮首左袵與突厥同隨水草畜牧夏處髙山冬入深谷俗尚戰死惡病亡勝兵數萬漢武得其地入益州部其後復絶諸葛亮定南中亦所不至唐武徳中巂州治中吉偉使南寧至其國諭使朝貢因求内屬發兵戍守自是嵗與䍧柯使偕來尾濮尾濮漢魏以後在興古郡今雲南郡地西南千五百里徼外其人有尾長三四寸欲坐輒先穿地為穴以安其尾尾折便死居木上食人俗又噉其老者唯識母而不識父其俗有賔客殺老者以供厨故賔婚有老者必泣其地有稷及陸稻多鹽井饒犀象有弓矢革鎧以赤猱猴皮垂錫珠翡翠為冠幘按木濮即尾濮也又扶南土俗傳云抅利東有蒲羅人皆有尾長五六寸其俗食人按其地並在西南蒲羅盖尾濮之地名木綿濮木綿濮産木綿特異生房甚繁房中綿其大如拳文面濮折腰濮赤口濮附文面濮其俗劖面以青畫之劖音讒又有折腰濮其俗生子必折其腰又有赤口濮在永昌南其俗折其齒劖其脣使赤又裸露無衣服黑僰濮黑僰濮在永昌西南山居耐勤苦其衣服婦人以一幅布為裙或以貫頭丈夫以榖皮為衣其境出白蹄牛犀象琥珀金桐華布又諸濮之域皆出楛矢爾雅曰南至於濮鉛周書王㑹卜人丹沙注云卜人西南之蠻丹沙所出今按卜人盖濮人也松外諸蠻松外諸蠻數十百部大者五六百户小者二三百凡數十姓趙楊李董為貴族皆擅山川不能相君長有城郭文字頗知隂陽厯數自夜郎滇池以西皆莊蹻之裔有稻麥粟豆絲麻薤蒜桃李以十二月為嵗首布幅廣七寸正月蠶生二月熟男子氊革為帔女衣絁布裙衫髻盤如髽飯用竹筲摶而噉之象杯貯羮如雞彛徒跣有舟無車死則坎地殯舎左屋之三年乃葬以蠡蚌封棺父母䘮斬衰布衣不澡者四五年近者二三年為人所殺者子以麻括髪墨面衣不緝居䘮婚嫁不廢亦弗避同姓壻不親迎富室娶妻納金銀牛羊酒女所齎亦如之有罪者樹一長木擊鼓集衆其下彊盜殺之富者貰死燒屋奪其田盗者倍九而償贓姦滛則彊族輸金銀請和而棄其妻處女嫠婦不坐凡相殺必報力不能則其部助攻之祭祀殺牛馬親聨畢㑹助以告酒多至數百人唐貞觀中數叛亂太宗遣武候將軍梁建方發蜀十二州兵討之首領雙舎拒戰敗走殺獲十餘萬建方諭降者七十餘部户千萬署首領䝉和為縣令以撫之西南夷序畧南夷君長以十數夜郎最大後為縣屬䍧柯郡其西靡莫之屬以十數滇最大地有滇池因以為名滇音顛自滇以北君長以十數卭都最大今之卭州本其地此皆椎結耕田有邑聚其外西自桐師以東北至葉榆葉榆澤名後為縣屬益州郡名為巂昆眀巂即今之巂州昆眀又在其西南即今之南寜州諸㸑所居是其地也巂音髄編髪編音步典反隨畜移徙亡常處亡君長地方可數千里自巂以東北君長以十數徙莋都為大徙及莋都二國也徙後為徙縣屬蜀郡莋都後為沈黎郡徙音斯莋音材各反自莋以東北君長以十數冉駹最大今䕫州開州首領多姓冉者本皆冉種也駹音尨其俗或土著或移徙在蜀之西自駹以東君長以十數白馬最大皆氐類也此皆巴蜀西南外蠻夷也始楚威王時使將軍荘蹻將兵循江上蹻音居畧反畧巴黔中以西黔中即今黔州是其地本巴人也莊蹻者楚莊王苖裔也蹻至滇池方三百里益州滇池縣其澤在西北澤下流淺狭状如倒流故曰滇池旁平地肥饒數千里以兵威定屬楚欲歸報㑹秦擊奪楚巴黔中郡道塞不通因乃以其衆王滇變服從其俗以長之秦時嘗破畧通五尺道其處險阸故道才通五尺諸此國頗置吏焉十餘嵗秦滅及漢興皆棄此國而闗蜀故徼西南之徼猶北方塞也徼音工釣反巴蜀民或竊出商賈取其莋馬僰僮旄牛以此巴蜀殷富建元六年大行王恢撃東粤東粤殺王郢以報恢因兵威使番陽令番音婆唐䝉風曉南粤風音諷南粤食䝉枸醬枸音矩子形如桑椹縁木而生味辛蜀人取其實為醤以為珍味也食音嗣䝉問所從来曰道西北䍧柯江江廣數里出番禺城下番音潘禺音愚䝉歸至長安問蜀賈人獨蜀出枸醤多持竊出市夜郎夜郎者臨䍧柯江江廣百餘歩足以行船南粤以財物役屬夜郎西至桐師然亦不能臣使也䝉上書說上曰南粤王黄屋左纛地東西萬餘里名為外臣實一州主今以長沙豫章徃水道多絶難行竊聞夜郎所有精兵可得十萬浮船䍧柯出不意此制粤一竒也誠以漢之彊巴蜀之饒通夜郎道為置吏甚易上許之乃拜䝉中郎將將千人食重萬餘人從巴莋闗入遂見夜郎侯多同多同其侯名也厚賜諭以威徳約為置吏使其子為令比之於漢縣也夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也乃且聴䝉約還報乃以為犍為郡發巴蜀卒治道自僰道指䍧柯江蜀人司馬相如亦言西夷卭莋可置郡使相如以中郎將徃諭皆如南夷為置一都尉十餘縣屬蜀當是時巴蜀四郡通西南夷道載轉相饟數嵗道不通士罷餓餒離暑溼死者甚衆西南夷又數反發兵興擊耗費亡功上患之使公孫宏徃問視焉還報言其不便及宏為御史大夫時方築朔方據河逐胡宏等因言西南夷為害可且罷專力事匃奴上許之罷西夷獨置南夷兩縣一都尉稍令犍為自保就及元狩元年博望侯張騫言使大夏時見蜀布卭竹杖問所從来曰從東南身毒國可數千里得蜀賈人市或聞卭西可二千里有身毒國騫因盛言大夏在漢西南慕中國患匃奴隔其道誠通蜀身毒國道便近又亡害於是天子乃令王然于柏始昌吕越人等十餘軰間出西南夷指求身毒國至滇滇王當羗乃留為求道四嵗餘皆閉昆眀莫能通滇王與漢使言漢孰與我大及夜郎侯亦然各自以一州王不知漢廣大使者還因盛言滇大國足事親附天子注意焉及至南粤反上使馳義侯因犍為發南夷兵且蘭君且子餘反恐逺行旁國虜其老弱乃與其衆反殺使者及犍為太守漢乃發巴蜀罪人當擊南粤者八校尉擊之㑹越已破漢八校尉不下中郎郭昌衞廣引兵還行誅隔滇道者且蘭斬首數萬遂平南夷為䍧柯郡夜郎始倚南粤南粤已滅還誅反者夜郎遂入朝上以為夜郎王南粤破後及漢誅且蘭卭君并殺莋侯冉駹皆震恐請臣置吏以卭都為粤巂郡莋都為沈黎郡冉駹為文山郡廣漢西白馬為武都郡使王然于以粤破及誅南夷兵威風諭滇王入朝滇王者其衆數萬人其旁東北勞深靡莫皆百姓相杖未肯聴勞莫數侵犯使者吏卒元封二年天子發巴蜀兵擊滅勞深靡莫以兵臨滇滇王始首善以故弗誅滇王離西夷舉國降離西夷謂東嚮事漢請置吏入朝於是以為益州郡賜滇王王復長其民西南夷君長以百數獨夜郎滇受王印滇小邑也最寵焉後二十三嵗孝昭始元元年益州㢘頭姑繒民反殺長吏䍧柯談指同並等二十四邑凡三萬餘人皆反反並音伴遣水衡都尉發蜀郡犍為犇命萬餘人擊䍧柯大破之後二嵗姑繒葉榆復反遣水衡都尉吕辟胡將郡兵擊之辟胡不進蠻夷遂殺益州太守乗勝與辟胡戰士戰及溺死者四千餘人眀年復遣軍正王平與大鴻臚田廣眀等並進大破益州斬首捕虜五萬餘級獲畜産十餘萬上曰鈎町侯亡波率其邑君長人民擊反者鈎音劬町音定斬首捕虜有功其立亡波為鈎町王大鴻臚廣眀賜爵闗内侯食邑三百户後間嵗武都氐人反遣執金吾馬適建龍頟侯韓增與大鴻臚廣眀將兵擊之至成帝河平中夜郎王興與鈎町王禹漏卧侯俞漏卧夷邑名後為縣俞音踰更舉兵相攻䍧柯太守請發兵誅興等議者以為道逺不可擊乃遣太中大夫蜀郡張匡持節和解興等不從命刻木象漢吏立道旁射之杜欽說大將軍王鳳曰太中大夫匡使和解蠻夷王侯王侯受詔已復相攻輕易漢使不憚國威其効可見恐議者選耎復守和解選耎怯不前之意也選音息兖反耎音人兖反太守察動静有變乃以聞如此則復曠一時王侯得收獵其衆申固其謀黨助衆多各不勝忿必相殄滅自知罪成狂犯守尉言起狂悖殺守尉也逺蔵温暑毒草之地雖有孫吳將賁育士若入水火徃必焦没知勇亡所施屯田守之費不可勝量宜因其罪惡未成未疑漢家加誅隂勑旁郡守尉練士馬大司農豫調榖積要害處選任職太守徃以秋凉時入誅其王侯尤不軌者即以為不毛之地亡用之民聖王不以勞中國宜罷郡放棄其民絶其王侯勿復通如以先帝所立累世之功不可墮壊亦宜因其萌芽早斷絶之及已成形然後戰師則萬姓被害大將軍鳳於是薦金城司馬陳立拜為䍧柯太守立者臨卭人前為連然長不韋令皆益州縣也蠻夷畏之及至䍧柯諭告夜郎王興興不從命立請誅之未報乃從吏數十人出行縣行音下更反至興國且同亭且音子余反召興興將數千人徃至亭從邑君數十人入見立立數責因斷頭數音所具反邑君曰將軍誅亡狀為民除害願出曉士衆以興頭示之皆釋兵降鈎町王禹漏卧侯俞震恐入粟千斛牛羊勞吏士立還歸郡興妻父翁指與興子邪務收餘兵廹脅旁二十二邑反至冬立奏募諸夷與都尉長史分將攻翁指等翁指據阸為壘立使竒兵絶其饟道縱反間以誘其衆都尉萬年曰兵久不决費不可共共讀曰供引兵獨進敗走趨立營立怒叱戲下令格之都尉復還戰立引兵救之時天大旱立攻絶其水道蠻夷共斬翁指持首出降立已平定西夷徵詣京師㑹巴郡有盗賊復以立為巴郡太守秩中二千石居賜爵左庶長徙為天水太守勸民農桑為天下最賜金四十斤入為左曹衞將軍䕶軍都尉卒官王莽簒位改漢制貶鈎町王以為侯王邯怨恨邯其王名也邯音酣䍧柯大尹周欽詐殺邯邯弟承攻殺欽州郡擊之不能服三邊蠻夷愁擾盡反復殺益州大尹程隆莽遣平蠻將軍馮茂發巴蜀犍為吏士賦斂取足於民以擊益州出入三年疾疫死者什七巴蜀騷動莽徵茂還誅之更遣寜始將軍亷丹與庸部牧史熊莽改益州為庸部大發天水隴西騎士廣漢巴蜀犍為吏民十萬人轉輸者合二十萬人擊之始至頗斬首數千其後軍糧前後不相及士卒饑疫三嵗餘死者數萬而粤巂蠻夷任貴亦殺太守枚根自立為卭榖王枚根太守之姓名㑹莽敗漢興誅貴復其舊號建武以後西南夷夜郎滇地卭莋冉駹諸國悉皆臣屬如先漢時又有哀牢焦僥樿國諸夷自昔不通中國者亦奉職貢有以見漢徳之大也其在隋世則復有所謂附國者距蜀都西北二千餘里大業中遣使入貢盖亦西南夷云夜郎夜郎漢時通焉初夜郎有女子浣於遯水有三節大竹流入足間聞其中有號聲剖竹視之得一男免歸而養之及長有才武自立為夜郎侯以竹為姓武帝元鼎六年平南夷為䍧柯郡夜郎侯迎降賜其王印綬後遂殺之夷獠咸以竹王非血氣所生甚重之求為立後䍧柯太守吳霸以聞天子乃封其三子為侯死配食其父今夜郎縣有竹王三郎神是也前書地理志曰夜郎有遯水東至廣鬰華陽國志云遯水通鬱林有三郎祠皆有靈響又云竹王所捐破竹於野成竹林今王祠有竹林是也王嘗從人止大石上令作羮從者白無水王以劍擊石出水今竹王水是也按漢書夜郎侯降封王不言殺之至成帝時猶謂之夜郎王獨范史云竹王被殺後封其子為侯與班氏牴牾今兩存之初楚頃襄王之時遣將莊豪從沅水伐夜郎軍至且蘭㭬船於岸而歩戰既滅夜郎因留王滇池以且蘭有㭬船䍧柯處乃改其名為䍧柯䍧柯繋船杙也按史記及漢書皆云楚威王時使莊蹻畧巴黔以西至滇池欲歸會秦奪楚巴黔中郡因以其衆王滇後十餘嵗秦滅又按楚自威王後懐王立三十年至頃襄王之二十二年秦昭襄王遣兵攻楚取巫黔中郡地後漢史則云頃襄王時莊豪王滇豪即蹻也若莊蹻自威王時将兵畧地屬秦陷巫黔中郡道塞不通凡經五十二年豈得如此淹久或恐史記誤謬班固循習而書范曄所記詳考為正又按莊蹻王滇後十五年頃襄王卒考烈王立二十五年幽王立十年王負芻立五年而楚滅後十五年而秦亡凡七十年何故云蹻之王滇後十餘嵗而秦亡斯又未之詳也蹻音渠畧反䍧柯地多雨潦俗好巫鬼禁忌寡畜産又無蠶桑故其郡最貧鈎町縣有桄榔木可以為麫百姓資之臨海異物志曰桄榔外皮有毛似栟櫚而散生其木剛作鋘鋤利如鐵中石更利惟中焦根乃致敗耳皮中有似𢷬稲米片又似麥麫中作餅餌廣志曰桄榔樹大四五圍長五六丈洪直旁無枝條其顛生葉不過數十似㯶葉破其木肌堅難傷入數寸得麫赤黄宻緻可食也公孫述時大姓龍傅尹董氏與郡功曹謝暹保境為漢乃遣使從番禺江奉貢光武嘉之並加褒賞桓帝時郡人尹珍自以生於荒裔不知禮義乃從汝南許慎應奉受經書圖緯學成還鄉里教授於是南域始有學焉珍官至荆州刺史尹珍字道真毋歛縣人也滇國滇王者莊蹻之後也元封三年武帝平之以其地為益州郡割䍧柯越巂各數縣配之後數年復并昆眀地皆以屬之此郡有池周回二百餘里水源深廣而末更淺狭有似倒流故謂之滇池河土平敞多出鸚鵡孔雀有鹽池田漁之饒金銀畜産之富人俗豪忲忲奢侈也居官者皆富及累世及王莽政亂益州郡夷棟蠶若豆等起兵殺郡守越巂姑復夷人大牟亦皆叛殺畧吏民莽遣寜始將軍㢘丹發巴蜀吏民及轉兵榖卒徒十餘萬擊之吏士饑疫連年不能尅而還以廣漢文齊為太守造起波池開通灌溉墾田二千餘頃率厲兵馬修障塞降集羣夷甚得其和及公孫述據益州文齊固守拒險述拘其妻子許以封侯齊終不降聞光武即位乃間道遣使自聞蜀平徵為鎮逺將軍封成義侯於道卒詔為起祠堂郡人立廟祀之建武十八年夷渠帥棟蠶與姑復楪榆梇棟連然滇池建怜昆眀諸種反叛殺長吏益州太守繁勝與戰而敗退保朱提縣屬犍為郡朱音殊提音匙十九年遣武威將軍劉尚等發廣漢犍為蜀郡人及朱提夷合萬三千人擊之尚軍遂渡瀘水入益州界瀘水一名若水出旄牛徼外經朱提至僰道入江在今巂州南特有瘴氣三月四月經之必死五月以後行者得無害故諸葛亮表云五月渡瀘言其艱苦也羣夷聞大兵至皆棄壘奔走尚獲其羸弱榖畜二十年進兵與棟蠶等帥連戰數月皆破之眀年四月追至不韋孫盛蜀譜曰初秦徙吕不韋子弟宗族於蜀漢武帝開西南夷置郡縣徙吕氏以充之因置不韋縣華陽國志曰武帝通博南山置不韋縣徙南越相吕嘉宗族實之因名不韋以章其先人惡行也斬棟蠶帥凡首虜七千餘人得生口五千七百人馬三千匹牛羊三萬餘頭諸夷悉平肅宗元和中蜀郡王追為太守政化尤異有神馬四匹出滇池河中甘露降白烏見始興起學校漸遷其俗靈帝熹平五年諸夷反叛執太守雍陟遣御史中丞朱龜討之不能尅朝議以為郡在邉外蠻夷喜叛勞師逺役不如棄之太尉掾巴郡李顒建䇿討伐乃拜顒益州太守與刺史龎芝發板楯蠻擊破平之還得雍陟顒卒後夷人復叛以廣漢景毅為太守討定之毅有恵政為夷人所懐蜀後主建興二年丞相諸葛亮率衆南征四郡平之改益州郡為建寜分建寧永昌為雲南郡又分建寧䍧柯為興古郡焉卭都卭都夷漢武帝所開以為卭都縣無㡬而地陷為汙澤因名為卭池南人以為卭河在今巂州越巂縣東南南中八郡志曰卭河縦廣岸二十里深百餘丈多大魚長一二丈頭特大遥視如戴鐡釡状李膺益州記云卭都縣下有一老姥家貧孤獨每食有小蛇頭上戴角在牀間姥憐而飴之後稍長大遂長丈餘令有駿馬蛇遂吸殺之令因大忿姥限責出蛇姥云在牀下令即掘地愈深愈大而無所見令又遷怒殺姥蛇乃感人以靈言瞋令何殺我母當為母報讐此後毎夜輙聞若雷若風四十許日百姓相見咸驚語汝頭那忽戴魚是夜方四十里與城一時俱陷為湖土人謂之為陷河唯姥宇無恙訖今猶存漁人採捕必依止宿每有風浪輒居宅側恬静無佗風静水清猶見城郭樓櫓畟然今水淺時彼土人没水取得舊木堅貞光黑如漆有好事人以為枕相贈畟音測後復反叛元鼎六年漢兵自越巂水伐之以為越巂郡巂水源出今巂州卭部縣西南巂山下前書地里志曰言其越巂水以置郡故名焉其土地平原有稻田青蛉縣禺同山有碧雞金馬光景時時出現禺同山在今褒州揚波縣王襃碧雞頌曰持節使王褒謹拜南崖敬移金精神馬縹碧之雞處南之荒深谿回谷非土之鄉歸来歸来漢徳無疆兼乎唐虞澤配三皇華陽國志曰碧雞光景人多見之前書音義曰金形似馬碧形似雞也俗多逰蕩而喜謳歌與䍧柯相類豪帥放縱難得制御王莽時郡守枚根調卭人長貴以為軍候漢書長貴作任貴更始二年長貴率種人攻殺枚根自立為卭榖王領太守事又降於公孫述述敗光武封長貴為卭榖王建武十四年長貴遣使上三年計天子即授越巂太守印綬十九年武威將軍劉尚擊益州夷路由越巂長貴聞之疑尚既定南邉威法必行巳不得自放縱即聚兵起營臺招呼諸君長多釀毒酒欲先以勞軍因襲擊尚尚知其謀即分兵先據卭都遂掩長貴誅之徙其家屬於成都永平元年姑復夷復叛益州刺史發兵討之斬其渠帥傳首京師後太守巴郡張翕政化清平得夷人和在郡十七年卒夷人愛慕如䘮父母蘇祈叟二百餘人蘇祈縣屬越巂郡齎牛羊送䘮至翕本縣安漢安漢縣屬巴郡起墳祭祀詔書嘉美為立祠堂安帝元初三年郡徼外夷大羊等八種户三萬一千口十六萬七千六百二十慕義内屬時郡縣賦斂煩數五年以卷夷大牛種封離等反畔殺遂久令遂久故縣在今靡州界眀年永昌益州及蜀郡夷皆叛應之衆遂十餘萬破壊二十餘縣殺長吏燔燒邑郭剽掠百姓骸骨委積千里無人詔益州刺史張喬選堪能從事討之喬乃遣從事楊竦將兵至楪榆擊之賊盛未敢進先以詔書告示三郡宻徵求武士重其購賞乃進軍與封離等戰大破之斬首三萬餘級獲生口五百人資財四千餘萬悉以賞軍士封離等惶怖斬其同謀渠帥詣竦乞降竦厚加慰納其餘三十六種皆来降附竦因奏長吏姦猾侵犯蠻夷者九十人皆减死州中論功未及上㑹竦病創卒張喬深痛惜之乃刻石勒銘圖畫其像天子以張翕有遺愛乃拜其子湍為太守夷人懽喜奉迎道路曰郎君儀貌類我府君後湍頗失衆心有欲叛者諸夷耆老相曉語曰當為先府君故遂以得安後順桓間廣漢馮顥為太守尤多異迹云莋都莋都夷者漢孝武帝所開以為莋都縣其人皆被髪左袵言語多好譬類居處略與汶山夷同土出長年神藥仙人山圖所居焉劉向神仙傳曰山圖隴西人好乗馬馬蹋折脚山中道士教服地黄當歸羗活元參服一年不嗜食病愈身輕追道士問之自云五岳使我之名山採藥能随吾汝便不死山圖追隨人不復見六十餘年一旦歸来行母服於冡間朞年復去莫知所之也元鼎六年以為沈黎郡至天漢四年并蜀為西部置兩都尉一居旄牛主徼外夷一居青衣主漢人永平中益州刺史梁國朱輔好立功名慷慨有大畧在州數嵗宣示漢徳威懐逺夷自汶山以西前世所不至正朔所未知白狼槃木唐菆等百餘國户百三十餘萬口六百萬以上舉種奉貢稱為臣僕輔上䟽曰臣聞詩云彼徂矣岐有夷之行傳曰岐道雖僻而人不逺詩人誦詠以為符驗今白狼王唐菆等慕化歸義作詩三章路經卭来大山零髙坂山海經曰崃山江水出焉郭璞曰中江所出也華陽國志曰卭来山本名卭莋故卭人莋人界也巖阻峻回曲折乃至山上凝冰夏結冬則劇寒王陽行部至此而退者也有長貧若採八渡之難陽母閎峻並坂名峭危峻險百倍岐道襁負老幼若歸慈母逺夷之語辭意難正草木異種鳥獸殊類有犍為郡掾田恭與之習狎頗曉其言輙令訊其風俗譯其辭語今遣從事史李陵與恭䕶送詣闕并上其樂詩昔在聖帝舞四夷之樂今之所上庶備其一帝嘉之事下史官録其歌焉東觀記載其歌并重譯訓詁為華言今范史所載者是也今録東觀夷語以為此注逺夷樂徳歌詩云大漢是治提宫隗搆與天合意魏冐踰糟吏譯平端㒺譯劉脾不從我来旁草支留聞風向化徵衣隨旅所見竒異知唐桑艾多賜繒布邪毗堪繡甘美酒食推潭僕逺昌樂肉飛拓拒蘇便屈申悉備局後仍離蠻夷貧薄僂讓龍洞無所報嗣莫支度由願主長夀陽雒僧鱗子孫昌熾莫穉角存逺夷慕徳歌詩曰蠻夷所處屢讓被尼日入之部且交陵悟慕義向化繩動隨旅歸日出主歸且倲雒聖徳深恩聖徳渡諾與人富厚魏菌度洗冬多霜雪綜邪流藩夏多和雨莋邪尋螺寒温時適藐潯瀘灕部人多有菌補邪推渉危歴險辟危歸險不逺萬里莫受萬栁去俗歸徳術疉附徳心歸慈母仍路孳摸逺夷懐徳歌曰荒服之外荒服之儀土地磽确黎籍憐憐食肉衣皮阻蘇邪犂不見鹽榖莫碭麤水吏譯傳風罔譯傳徽大漢安樂是漢夜拒擕負歸仁蹤優路仁觸冐險陕雷折險龍髙山岐峻倫狼蔵􅀈縁崖磻石扶路側禄木薄發家息落服淫百宿到洛理瀝髭雒父子同賜捕茝菌毗懐抱匹帛懐槀匹漏傳告種人傳室呼勑長願臣僕陵陽臣僕肅宗初輔坐事免是時郡尉府舎皆有雕飾畫山神海靈竒禽異獸以眩燿之夷人益畏憚焉和帝永元十二年旄牛徼外白狼樓薄蠻夷王唐繒等遂率種人十七萬口歸義内屬詔賜金印紫綬小豪錢帛各有差安帝永初元年蜀郡三襄種夷與徼外汙衍種并兵三千餘人反叛攻蠶陵城殺長吏二年青衣道夷邑長令田令姓田名與徼外三種夷三十一萬口齎黄金旄牛眊顧野王曰眊結毛為飾也即今馬及弓槊上纓眊也舉土内屬安帝增令田爵號為奉通邑君延光二年春旄牛夷叛攻零闗郡國志零闗道屬越巂郡殺長吏益州刺史張喬與西部都尉擊破之於是分置蜀郡屬國都尉領四縣如太守桓帝永夀二年蜀郡夷叛殺畧吏民延熹二年蜀郡三襄夷宼蠶陵殺長吏四年犍為屬國夷㓂郡界益州刺史山昱擊破之斬首千四百級餘皆解散靈帝時以蜀郡屬國為漢嘉郡冉駹冉駹夷漢武帝所開元鼎六年以為汶山郡至地節三年夷人以立郡賦重宣帝乃省并蜀郡為北部都尉其山有六夷七羗九氐各有部落其王侯頗知文書而法嚴重貴婦人黨母族死則燒其尸土氣多寒在盛夏冰猶不釋故夷人冬則避寒入蜀為傭夏則違暑反其邑衆皆依山居止累石為室髙者至十餘丈為卭籠案今彼土夷人呼為碉也又土地剛鹵不生榖粟麻菽唯以麥為資而宜畜牧有旄牛無角一名童牛肉重千斤毛可為眊出名馬有靈羊可燎毒本草經曰零羊角味醎無毒主療青盲蟲毒去惡鬼安心氣彊筋骨也又有食藥鹿鹿麑有胎者其腸中糞亦療毒疾又有五角羊麝香輕毛毼雞牲牲郭璞注山海經曰毼雞似雉而大青色有毛角闘敵死乃止其人能作旄氈班罽青頓㧘毲羊羧之屬青頓毲羧並未詳字書無此二字周書伊尹為四方獻令曰正西昆侖狗國鬼親枳已耳貫胸雕題離邱漆齒請令以丹青白旄紕罽龍角神龜為獻湯曰善何承天纂文曰紕氐罽也音卑疑反㧘即紕也特多雜藥地有鹹土煮以為鹽麡羊牛馬食之皆肥麡即麡狼也異物志狀似鹿而角觸前向人林樹掛角故常在平淺草中肉肥脆香美逐入林則摶之皮可作履韈角正四據南人因以為牀音子兮反其西又有三河槃于虜北有黄石北地盧水胡其表乃為徼外靈帝時復分蜀郡北部為汶山郡蜀後主建興十年汶山平康夷反姜維討破之哀牢夷撣國及僬僥夷並附哀牢夷後漢時通焉其先有婦人名沙壹居于牢山嘗捕魚水中觸沈木若有感因懐􅗖十月産子男十人後沈木化為龍出水上沙壹忽聞龍語曰若為我生子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因䑛之其母鳥語謂背為九謂坐為隆因名子曰九隆及後長大諸兄以九隆能為父所䑛而黠遂共推以為王後牢山下有一夫二婦復生十女子九隆兄弟皆娶以為妻後漸相滋長種人皆刻畫其身象龍文衣著尾九隆死世世相繼哀牢傳曰九隆代代相傳不可得數至於禁髙乃可記知禁髙死子吸代吸死子建非代建非死子哀牢代哀牢死子桑藕代桑藕死子栁承代栁承死子栁貌代栁貌死子扈栗代乃分置小王徃徃邑居散在谿谷絶域荒外建武二十五年其王賢栗遣兵乗箄船箄音排縳竹木為箄以當船南下江漢擊附塞夷鹿茤音多鹿茤人弱為所禽獲於是震雷疾雨南風飄起水為逆流翻涌二百餘里箄船沈没哀牢之衆溺死數千人賢栗復遣其六王將萬人以攻鹿茤鹿茤王與戰殺其六王哀牢耆老共埋六王夜虎復出其尸而食之餘衆驚怖引去賢栗惶恐謂其耆老曰我曹入邉塞自古有之今攻鹿茤輙被天誅中國其有聖帝乎天祐助之何其眀也二十七年賢栗等遂率種人户二千七百七十口萬七千六百五十九詣越巂太守鄭鴻降求内屬光武封賢栗等為君長自是嵗来朝貢永平十二年哀牢王栁貌遣子率種人内屬其稱邑王者七十二人户五萬一千八百九十口五十五萬三千七百一十一西南去洛陽七千里顯宗以其地置哀牢博南二縣割益州郡西部都尉可領六縣古今注曰永平十年置益州西部都尉居巂唐續漢志六縣謂不韋巂唐比蘇楪榆邪龍雲南也合為永昌郡始通愽南山度蘭倉水華陽國志曰愽南縣西山髙三十里越之渡蘭倉水也行者苦之歌曰漢徳廣開不賔度博南越蘭津度蘭倉為他人哀牢皆穿鼻儋耳其渠帥自謂王者耳皆下肩三寸庶人則至肩而已土地沃美宜五榖蠶桑知染采文繡罽毲帛疉杜薄傳云其國女子織作白疊花布蘭干細布華陽國志曰蘭干獠言紵織成文章如綾錦有梧桐木華績以為布廣志曰梧桐有白者剽國有桐木其花木白毳取其毳淹漬緝織以為布也幅廣五尺絜白不受垢汙先以覆亡人然後服之其竹節相去一丈名曰濮竹出銅鐵鉛錫金銀光珠華陽國志曰蘭倉水有金沙洗取融為金有光珠穴愽物志曰光珠即江珠也虎魄水精瑠璃軻蟲蚌珠孔雀翡翠犀象猩猩貃獸酈道元水經注曰猩猩形若狗而人而頭顔端正善與人言音聲妙麗如婦人對語聞之無不酸楚南中志曰猩猩在山谷中行無常語百數為羣土人以酒若糟設於路又喜屩子土人織草為屨數十兩相連結猩猩在山谷見酒及屩知其設張者即知張者先祖名字乃呼其名而罵云奴欲張我捨之而去去而又還相呼試共嘗酒初嘗少許又取屩子著之若進酒三升便大醉人出收之屩子相連不得去執還内牢土人欲取者到牢邉語云猩猩汝可自相推肥者出之既擇竟相對而泣即左思賦云猩猩啼而就禽者也昔有人以猩猩餉封溪令令問餉何物猩猩自於籠中曰但有酒及僕耳無他飲食南中八郡志曰貃大如驢状頗似熊多力食鐵所觸無不拉廣志曰貃色蒼白其皮温煖雲南縣有神鹿兩頭能食毒草先是西部都尉廣漢鄭純為政清潔化行夷貃君長感慕皆獻土珍頌徳美天子嘉之即以為永昌太守純與哀牢夷人約邑豪嵗輸布貫頭衣二領鹽一斛以為常賦夷俗安之純自為都尉太守十年卒官建初元年哀牢王類牢與守令忿争遂殺守令而反叛攻越巂唐城太守王尋奔楪榆哀牢三千餘人攻愽南燔燒民舎肅宗募發越巂益州永昌夷漢九千人討之眀年春邪龍縣邪龍縣屬永昌昆眀夷鹵承等應募率種人與諸部兵擊類牢於愽南大破斬之傳首洛陽賜鹵承帛萬匹封為破虜傍邑侯永元六年郡徼外敦忍乙王莫延慕義遣使譯獻犀牛大象九年徼外蠻及撣國王雍由調撣音擅東觀作擅字遣重譯奉國珍寶和帝賜金印紫綬小君長皆口力印綬錢帛永初元年徼外焦僥種夷陸類等三千餘口舉種内附獻象牙水牛封牛永寧元年撣國王雍由調復遣使者詣闕朝賀獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千自言我海西人海西即大秦也撣國西南通大秦眀年元㑹安帝作樂於庭封雍由調為漢大都尉賜印綬金銀綵繒各有差也附國附國隋時通焉在蜀郡西北二千餘里即漢之西南夷也有嘉良夷即其東部所居種姓自相率領土俗與附國同言語少殊不能統一其人並無姓氏附國王字宜􅵭其國南北八百里東西千五百里無城柵近川谷傍山險俗好復讎故壘石為􅠼與巢同以避其患其􅠼髙至十餘丈下至五六丈每級以木隔之基方三四歩􅠼上方二三歩狀似浮圖於下致級開小門從内上通夜必闗閉以防賊盗國有重罪者罰牛人皆輕㨗便撃劒漆皮為牟甲弓長六尺竹為箭妻其羣母及嫂免弟父兄亦納其妻好歌舞鼓簧吹長角有死者無服制置尸髙牀之上沐浴衣服以牟甲覆以獸皮子孫不哭帶刀舞劍而呼云我父為鬼所取我欲報寃殺鬼自餘親戚哭三聲而止婦人哭必兩手掩面死家殺牛親屬以䐗酒相遺共飲噉而瘞之死後十年方始大葬必集親賔殺馬動至數十匹立木為祖父神而事之其俗以皮為㡌形圓如鉢或戴羃䍦衣多毼皮裘全剝牛脚皮為靴項繫鐡鎻手貫鐡釧王與酋帥金為首飾胸前縣一金花徑三寸其土髙氣候凉多風少雨土宜小麥青稞山出金銀銅多白雉水有嘉魚長四尺而鱗細大業四年其王遣使素福等八人入朝眀年又遣其弟子宜林率嘉良夷六十人朝貢欲獻良馬以路險不通請開山道修職貢物煬帝以勞民不許嘉良有水濶六七十丈附國有水濶百餘丈並南流用皮為舟而濟附國有薄縁夷風俗亦同西有女國其東北連山緜亘數千里接於党項徃徃有羗大小左封昔衞葛延白狗向人望族林臺舂桑利豆迷桑婢藥大硖白蘭北利摸徒郍鄂當迷渠歩桑悟千碉並在深山窮谷無大君長其風俗略同於党項或役屬吐谷渾或附國大業中朝貢縁西南邉置諸道總管以管之通志卷一百九十七
