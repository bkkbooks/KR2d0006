下皆除之東平王端薨五月衛尉劉寬為太尉秋七月使胸奴中郎將張修有罪下獄死冬十月甲申司徒劉郃永樂少府陳球衛尉陽球步兵校尉劉納謀誅宦者事泄皆下獄死巴郡板楯蠻叛遣御史中丞蕭瑗督益州刺史討之不克十二月光祿勳楊賜為司徒鮮卑寇幽并二州是歲河間王利薨洛陽女子生兒兩頭四臂三年春正月癸酉大赦天下二月公府駐駕廡自壞三月梁王元薨夏四月江夏蠻叛六月詔公卿舉能通尚書毛詩左氏穀梁春秋各一人悉除議郎秋表是地震涌水出八月令繫囚罪未決入縑贖各有差冬閏月有星孛於狼弧鮮卑寇幽并二州十二月己巳立貴人何氏為皇后是歲作罼圭靈昆苑四年春正月初置騄驥廄丞領受郡國調馬豪右辜榷馬一匹至二百萬二月郡國上芝英草夏四月庚子大赦天下交址刺史朱雋討交址合浦烏滸蠻破之六月庚辰雨雹秋七月河南言鳯凰見新城羣鳥隨之賜新城令及三老力田帛各有差九月庚寅朔日有食之太尉劉寬免衛尉許戫為太尉閏月辛酉北宫東掖庭永巷署災司徒楊賜罷冬十月太常陳耽為司徒鮮卑寇幽并二州是歲帝作列肆於後宫使諸采女販賣更相盜竊爭鬭帝著商估服飲宴為樂又於西園弄狗著進賢冠帶綬又駕四驢帝躬自操轡驅馳周旋京師轉相放效五年春正月辛未大赦天下二月大疫三月司徒陳耽免夏四月旱太常袁隗為司徒五月庚申永樂宮署災秋七月有星孛於太微巴郡板楯蠻詣太守曹謙降癸酉令繫囚罪未決入縑贖八月起四百尺觀於阿亭道冬十月太尉許戫罷太常楊賜為太尉校獵上林苑歷函谷關遂巡狩於廣成苑十二月還幸太學六年春正月日南徼外國重譯貢獻二月復長陵縣比豐沛三月辛未大赦天下夏大旱秋金城河水溢五原山岸崩始置圃囿署以宦者為令冬東海東萊琅邪井中冰厚尺餘大有年中平元年春二月巨鹿人張角自稱黃天其部帥有三十六萬皆著黃巾同日反叛安平甘陵人各執其王以應之三月戊申以河南尹何進為大將軍將兵屯都亭置八關都尉官壬子大赦天下黨人還諸徙者唯張角不赦詔公卿出馬弩舉列將子弟及吏民有明戰陳之略者詣公車遣北中郎將盧植討張角左中郎將皇甫嵩右中郎將朱雋討潁川黃巾庚子南陽黃巾張曼成攻殺郡守褚貢夏四月太尉楊賜免太僕𢎞農鄧盛為太尉司空張濟罷大司農張溫為司空朱雋為黃巾波才所敗侍中向栩張鈞坐言宦者下獄死汝南黃巾敗太守趙謙於邵陵廣陽黃巾殺幽州刺史郭勳及太守劉衛五月皇甫嵩朱雋復與波才等戰於長社大破之六月南陽太守秦頡擊張曼成斬之交址屯兵執刺史及合浦太守來達自稱柱天將軍遣交址刺史賈琮討平之皇甫嵩朱雋大破汝南黃巾於西華詔嵩討東郡朱雋討南陽盧植破黃巾圍張角於廣宗宦官誣奏植抵罪遣中郎將董卓攻張角不克洛陽女子生兒兩頭共身秋七月巴郡妖巫張修反寇郡縣河南尹徐灌下獄死八月皇甫嵩與黃巾戰於倉亭獲其帥乙巳詔皇甫嵩北討張角九月安平王續有罪誅國除冬十月皇甫嵩與黃巾賊戰於廣宗獲張角弟梁角先死乃戮其尸以皇甫嵩為左車騎將軍十一月皇甫嵩又破黃巾於下曲陽斬張角弟寶湟中義從胡北宮伯玉與先零羌叛以金城人邊章韓遂為軍帥攻殺護羌都尉伶徵金城太守陳懿癸巳朱雋拔宛城斬黃巾别帥孫夏詔減太官珍羞御食一肉廄馬非郊祭之用悉出給軍十二月己巳大赦天下改元中平是歲下邽王意薨無子國除郡國生異草備龍蛇鳥獸之形二年春正月大疫琅邪王據薨二月己酉南宫大災火半月乃滅己亥廣陽門外屋自壞稅天下田畝十錢黑山賊張牛角等十餘輩並起所在寇鈔司徒袁隗免三月廷尉崔烈為司徒北宫伯王等寇三輔遣左車騎將軍皇甫嵩討之不克夏四月庚戌大風雨雹五月太尉鄧盛罷太僕河南張延為太尉秋七月三輔螟左車騎將軍皇甫嵩免八月以司空張溫為車騎將軍討北宫伯玉九月特進楊賜為司空冬十月庚寅司空楊賜薨光祿大夫許相為司空前司徒陳耽諫議大夫劉陶坐直言下獄死十一月張溫破北宫伯玊於美陽因遣蕩寇將軍周慎追擊之圍榆中又遣中郎將董卓討先零羌慎卓並不克鮮卑冦幽并二州是嵗造萬金堂於西園洛陽民生兒兩頭四臂三年春二月江夏兵趙慈反殺南陽太守秦頡庚戌大赦天下太尉張延罷車騎將軍張溫為太尉中常侍趙忠為車騎將軍復修玊堂殿鑄銅人四黃鍾四及天祿蝦蟆又鑄四出文錢五月壬辰晦日有食之六月荆州刺史王敏討趙慈斬之車騎將軍趙忠罷秋八月懷陵上有雀萬數悲鳴因鬭相殺冬十月武陵蠻叛寇郡界郡兵討破之前太尉張延為宦人所譖下獄死十二月鮮卑冦幽并二州四年春正月己卯大赦天下二月滎陽賊殺中牟令己亥南宫內殿罘罳自壞三月河南尹何苗討滎陽賊破之拜苗為車騎將軍夏四月涼州刺史耿鄙討金城賊韓遂鄙兵大敗遂寇漢陽漢陽太守傳燮戰沒扶風人馬騰漢陽人王國並叛寇三輔太尉張溫免司徒崔烈為太尉五月司空許相為司徒光祿勳沛國丁宫為司空六月洛陽民生男兩頭共身漁陽人張純與同郡張舉舉兵叛攻殺右北平大守劉政遼東太守楊終護烏桓校尉公綦稠等舉兵自稱天子冦幽冀二州秋九月丁酉令天下繫囚罪未決入縑贖冬十月零陵人觀鵠自稱平天將軍寇桂陽長沙大守孫堅擊破之十一月太尉崔烈罷大司農曺嵩為太尉十二月休屠各胡叛是嵗賣關內侯假金印紫綬傳世入錢五百萬五年春正月休屠各胡寇西河殺郡守邢紀丁酉大赦天下二月有星孛於紫宫黃巾餘賊郭大等起於西河白波谷寇太原河東三月休屠各胡攻殺并州刺史張懿遂與南胸奴左部胡合殺其單于夏四月汝南葛陂黃巾攻沒郡縣太尉曺嵩罷五月永樂少府樊陵為太尉六月丙寅大風太尉樊陵罷益州黃巾馬相攻殺刺史郗儉自稱天子又寇巴郡殺郡守趙部益州從事賈龍擊相斬之郡國七大水秋七月射聲校尉馬日磾為太尉八月初置西園八校尉司徒許相罷司空丁宫為司徒光祿勳南陽劉𢎞為司空衛尉董重為驃騎將軍九月南單于叛與白波賊寇河東遣中郎將孟益率騎都尉公孫瓚討漁陽賊張純等冬十月壬午御殿後槐樹自拔倒竪青徐黃巾復起寇郡縣甲子帝自稱無上將軍曜兵於平樂十一月涼州賊王國圍陳倉右將軍皇甫嵩救之遣下軍校尉鮑鴻討葛陂黃巾巴郡板楯蠻叛遣上軍别部司馬趙瑾討平之公孫瓚與張純戰於石門大破之是嵗改刺史新置牧六年春二月左將軍皇甫嵩大破王國於陳倉三月幽州牧劉虞購斬漁陽賊張純下軍校尉鮑鴻下獄死夏四月丙午朔日有食之太尉馬日磾免幽州牧劉虞為大尉丙辰帝崩於南宫嘉德殿年三十四戊辰皇子辨即皇帝位年十七尊皇后曰皇太后太后臨朝大赦天下改元為光熹封皇弟協為渤海王後將軍袁隗為太傅與大將軍何進參録尚書事上軍校尉蹇碩下獄五月辛巳驃騎將軍董重下獄死六月辛亥孝仁皇后董氏崩辛酉葬孝靈皇帝於文陵雨水秋七月甘陵王忠薨庚子孝仁皇后歸葬河間慎陵徙渤海王協為陳留王司徒丁宫罷八月戊辰中常侍張讓段圭等殺大將軍何進於是虎賁中郎將袁術燒東西宫攻宦者庚午張讓段圭等劫少帝及陳留王幸北宫德陽殿何進部曲將吳匡與車騎將軍何苖戰於朱雀闕下苖敗斬之辛未司隸校尉袁紹勒兵收偽司隸校尉樊陵河南尹許相及諸閹人無少長皆斬之讓圭等復劫少帝陳留王走小平津尚書盧植追讓圭等斬數人其餘投河而死帝與陳留王協夜步逐螢光行數里得民家露車共乘之辛未還宫大赦天下改光熹為昭寧并州牧董卓殺執金吾丁原司空劉𢎞免董卓自為司空九月甲戌董卓廢帝為𢎞農王六月雨至於是月靈帝建寧四年熹平六年光和六年中平六年即位二十二年孝獻皇帝諱協靈帝中子也母王美人為何皇后所害中平六年四月少帝即位封帝為渤海王徙封陳留王九月甲戌即皇帝位年九嵗遷皇太后於永安宫大赦天下改昭寧為永漢丙子董卓殺皇太后何氏初令侍中給事黃門侍郎貟各六人賜公卿以下至黃門侍郎家一人為郎以補宦官所領諸署侍於殿上乙酉以太尉劉虞為大司馬董卓自為太尉加鈇鉞虎賁丙戍太中大夫楊彪為司空甲午豫州牧黃琬為司徒遣使弔祠故太傅陳蕃大將軍竇武等冬十月乙巳葬靈思皇后白波賊寇河東董卓遣其將牛輔擊之十一月癸酉董卓為相國十二月戊戍司徒黃琬為太尉司空楊彪為司徒光祿勳荀爽為司空省扶風都尉置漢安都護詔除光熹昭寧永漢三號還復中平六年初平元年春正月山東州郡起兵以討董卓辛亥大赦天下癸酉董卓殺𢎞農王白波賊寇東郡二月乙亥太尉黃琬司徒楊彪免庚辰董卓殺城門校尉伍瓊督軍校尉周珌以光祿勳趙謙為太尉太僕王允為司徒丁亥遷都長安董卓驅徙京師百姓悉西入關自留屯畢圭苑壬辰白虹貫日三月乙巳車駕入長安幸未央宫己酉董卓焚洛陽宫廟及人家戊午董卓殺太傅袁隗太僕袁基夷其族夏五月司空荀爽薨六月辛丑光祿大夫种拂為司空大鴻臚韓融少府隂修執金吾胡母班將作大匠吳修越騎校尉王瓌安集關東後將軍袁術河內太守王匡各執而殺之唯韓融獲免董卓壞五銖錢更鑄小錢冬十一月庚戍鎮星熒惑太白合於尾是嵗有司奏和安順桓四帝無功德不宜稱宗又恭懷敬隱恭愍三皇后並非正嫡不合稱后皆請除尊號制曰可孫堅殺􅍮州刺史王睿又殺南陽太守張咨二年春正月辛丑大赦天下二月丁丑董卓自為太師袁術遣將孫堅與董卓將胡軫戰於陽人軫軍大敗董卓遂發掘洛陽諸帝陵夏四月董卓入長安六月丙戌地震秋七月司空种拂免光祿大夫濟南淳于嘉為司空太尉趙謙罷太常馬日磾為太尉九月蚩尤旗見於角亢冬十月壬戌董卓殺衛尉張溫十一月青州黃巾寇泰山泰山守應劭擊破之黃巾轉寇渤海公孫瓚與戰於東光復大破之是嵗長沙有人死經月復活三年春正月丁丑大赦天下袁術遣將孫堅攻劉表於襄陽堅戰歿袁紹及公孫瓚戰於界橋瓚軍大敗夏四月辛巳誅董卓夷三族司徒王允録尚書事總朝政遣使者張种撫慰山東青州黃巾擊殺兖州刺史劉岱於東平東郡大守曺操大破黃巾於壽張降之五月丁酉大赦天下丁未征西將軍皇甫嵩為車騎將軍董卓部曲將李傕郭泛樊稠張濟等反攻京師六月戊午陷長安城太常种拂太僕魯旭大鴻臚周奐城門校尉崔烈越騎校尉王頎並戰歿吏民死者萬餘人李傕等並自為將軍己未大赦天下李傕殺司隸校尉黃琬甲子殺司徒王允皆滅其族丙子前將軍趙謙為司徒秋七月庚子太尉馬日磾為太傅録尚書事八月遣日磾及太僕趙岐持節慰撫天下車騎將軍皇甫嵩為太尉司徒趙謙罷九月李傕自為車騎將軍郭泛後將軍樊稠右將軍張濟鎮東將軍濟出屯𢎞農甲申司空淳于嘉為司徒光祿大夫楊彪為司空並録尚書事冬十二月太尉皇甫嵩免光祿大夫周忠為太尉參録尚書事四年春正月甲寅朔日有食之丁卯大赦天下三月袁術殺揚州刺史陳溫據淮南長安宣平城門外屋自壞夏四月癸酉無雲而雷六月扶風大雨雹華山崩裂太尉周忠免太僕朱雋為太尉録尚書事下邳賊關宣自稱天子雨水遣侍御史裴茂訊詔獄原輕繫八月辛丑天狗西北行九月甲午試儒生四十餘人上第賜位郎中次太子舍人下第者罷之詔曰孔子歎學之不講不講則所識日忘今耆儒年踰六十去離夲土營求糧資不得専業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聼為太子舍人冬十月太學行禮車駕幸永福城門臨觀其儀賜博士以下各有差辛丑京師地震有星孛於天市司空楊彪免太常趙溫為司空公孫瓚殺大司馬劉儀十二月辛丑地震司空趙溫免乙巳衛尉張喜為司空是嵗琅邪王容薨興平元年春正月辛酉大赦天下改元興平甲子帝加元服二月壬午追尊諡皇妣王氏為靈懷皇后甲申改葬於文昭陵丁亥帝耕於藉田三月韓遂馬騰與郭汜樊稠戰於長平觀遂騰敗績左中郎將劉範前益州刺史种劭戰歿夏六月丙子分涼州河西四郡為雍州丁丑地震戊寅又震乙巳晦日有食之帝避正殿寢兵不聼事五月大蝗秋七月壬子太尉朱雋免戊午太常楊彪為太尉録尚書事三輔大旱自四月至於是月帝避正殿請雨遣使者洗囚徒原輕繫是嵗穀一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使侍御史侯汶出太倉米豆為飢人作糜粥經日而死者無限帝疑賦恤有虛乃親於御座前量試作糜乃知非實使侍中劉艾出讓有司於是尚書令以下皆詣省閣謝奏收侯汶考實詔曰未忍置汶於理可杖五十自是之後多得全濟八月馮翊寇屬縣郭泛樊稠擊破之九月桑復生椹人得以食司徒淳于嘉罷冬十月長安市門自壞以衛尉趙溫為司徒録尚書事十二月分安定扶風為新平郡是嵗揚州刺史劉繇與袁術將孫策戰於曲阿繇軍敗績孫策遂據山東太傅馬日磾薨於壽春二年春正月癸丑大赦天下二月乙亥李傕殺樊稠而與郭汜相攻三月丙寅李傕脅帝幸其營焚宫室夏四月甲午立貴人伏氏為皇后丁酉郭泛攻李傕矢及御前是日李傕移帝幸北宫大旱五月壬午李傕自為大司馬六月庚午張濟自陜來和傕泛秋七月甲子車駕東歸郭泛自為車騎將軍楊定為後將軍楊奉為興義將軍董承為安集將軍並侍送乘輿張濟為驃騎將軍還屯陜八月甲辰幸新豐冬十月戊戍郭泛使其將伍習夜燒所幸學舍逼脅乘輿楊定楊奉與郭泛戰破之壬寅幸華隂露次道南是夜有赤氣貫紫宫張濟復反與李傕郭泛合十一月庚午李傕郭泛等追乘輿戰於東澗王師敗績殺光祿勳鄧泉衛尉士孫瑞廷尉宣播大長秋苖祀步兵校尉魏桀侍中朱展射聲校尉沮俊壬申幸曹陽露次田中楊奉董承引白波帥胡才李樂韓暹及胸奴左賢王土單率師奉迎與李傕等戰破之十二月庚辰車駕乃進李傕等復來追戰王師大敗殺略宫人少府田芬大司農張義等皆戰歿進幸陜夜度河乙亥幸安邑是嵗袁紹遣將麴義與公孫瓚戰於鮑邱瓚軍大敗建安元年春正月癸酉郊祀上帝於安邑大赦天下改元建安二月韓暹攻衛將軍董承夏六月乙未幸聞喜秋七月甲子車駕至洛陽幸故中常侍趙忠宅丁丑郊祀上帝大赦天下己卯謁髙廟八月辛丑幸南宫楊安殿癸邜安國將軍張楊為大司馬韓暹為大將軍楊奉為車騎將軍是時宫室燒盡百官披荆棘依牆壁間州郡各擁強兵而委輸不至羣僚飢乏尚書郎以下自出採稆或飢死牆壁間或為兵士所殺辛亥鎮東將軍曹操自領司隸校尉録尚書事曹操殺侍中臺崇尚書馮碩等封衛將軍董承為輔國將軍伏完等十三人為列侯贈沮俊為𢎞農太守庚申遷都許己巳幸曹操營九月太尉楊彪司空張喜罷冬十一月丙戍曹操自為司空行車騎將軍事百官總已以聽二年春袁術自稱天子三月袁紹自為大將軍夏五月蝗秋九月漢水溢是歲飢江淮間民相食袁術殺陳王寵孫策遣使奉貢三年夏四月遣謁者裴茂率中郎將假煨討李傕夷三族呂布叛冬十一月盜殺大司馬張楊十二月癸酉曹操擊呂布於徐州斬之四年春三月袁紹攻公孫瓚於易京獲之衛將軍董承為車騎將軍夏六月袁術死是歲初置尚書左右僕射武陵女子死十四日復活五年春正月車騎將軍董承偏將軍王服越騎校尉种輯受密詔誅曹操事泄壬午曹􅋵殺董承等夷三族秋七月立皇子馮為南陽王壬午南陽王馮薨九月庚午朔日有食之詔三公舉至孝一人九卿校尉郡國守相各一人皆上封事靡有所諱曹操與袁紹戰於官渡紹敗走冬十月辛亥有星孛於大梁東海王祗薨是歲孫䇿死弟權襲其餘業六年春三月丁卯朔日有食之七年夏五月庚戌袁紹薨于闐國獻馴象是歲越嶲男子化為女子八年冬十月己巳公卿初迎冬於北郊總章始復備八佾舞初置司直官督中都官九年秋八月戊寅曹操大破袁尚平冀州自領冀州牧冬十月有星孛於東井十二月賜三公己下金帛各有差自是三年一賜以為常制十年春正月曹操破袁談於青州斬之夏四月黑山賊張燕率衆降秋九月賜百官尤貧者金帛各有差十一年春正月有星孛於北斗三月曹操破髙幹於并州獲之秋七月武威太守張猛殺雍州刺史邯鄲商是歲立故琅邪王容子熙為琅邪王濟北北海阜陵下邳常山甘陵濟隂平原八國皆除十二年秋八月曹操大破烏桓於柳城斬其踏頓冬十月辛卯有星孛於鶉尾己巳黃巾賊殺濟南王贇十一月遼東太守公孫康殺袁尚袁熙十三年春正月司徒趙溫免夏六月罷三公官置丞相御史大夫癸巳曹操自為丞相秋七月曹操南征劉表八月丁未光祿勳郗慮為御史大夫壬子曹操殺太中大夫孔融夷其族是歲劉表卒少子琮立琮以荆州降操冬十月癸未朔日有食之曹操以舟師伐孫權權將周瑜敗之於烏林赤壁十四年冬十月荆州地震十五年春二月乙巳朔日有食之十六年秋九月庚戌曹操與韓遂馬超戰於渭南遂等大敗關西平是歲趙王赦薨十七年夏五月癸未誅衛尉馬騰夷三族六月庚寅晦日有食之秋七月洧水潁水溢螟八月馬超破涼州殺刺史韋康九月庚戌立皇子熙為濟陰王懿為山陽王邈為濟北王敦為東海王冬十二月星孛於五諸侯十八年春正月庚寅復禹貢九州夏五月丙申曹操自立為魏公加九錫大雨水徙趙王圭為博陵王是歲歲星鎮星熒惑俱入太微彭城王和薨十九年夏四月旱五月雨水劉備破劉璋據益州冬十月曹操遣將夏侯淵討朱建于枹罕獲之十一月丁卯曹操殺皇后伏氏滅其族及二皇子二十年正月甲子立貴人曹氏為皇后賜天下男子爵人一級孝悌力田二級賜諸王侯公卿以下穀各有差秋七月曹操破漢中張魯降二十一年夏四月甲午曹操自進號魏王五月己亥朔日有食之秋七月胸奴南單于來朝是嵗曹操殺琅邪王熙國除二十二年夏六月丞相軍師華歆為御史大夫冬有星孛於東北是歲大疫二十三年春正月甲子少府耿紀丞相司直韋晃起兵誅曹操不克夷三族三月有星孛於東方二十四年春二月壬子晦日有食之夏五月劉備取漢中秋七月庚子劉備自稱漢王八月漢水溢冬十一月孫權取荆州二十五年春正月庚子魏王曹操薨子丕襲位二月丁未朔日有食之三月改元延康冬十月乙卯皇帝遜位魏王丕稱天子奉帝為山陽公邑一萬戶位在諸侯王上奏事不稱臣受詔不拜以天子車服郊祀天地宗廟祖臘皆如漢制都山陽之濁鹿城四皇子封王者皆降為列侯明年劉備稱帝於蜀孫權亦自王於吳於是天下遂三分矣魏青龍二年三月庚寅山陽公薨自遜位至薨十有四年年五十四諡孝獻皇帝八月壬申以漢天子禮儀葬於禪陵置園邑令丞太子早卒孫康立五十一年晉太康六年薨子瑾立四年太康十年薨子秋立二十年永嘉中為胡賊所殺國除獻帝初平四年興平二年建安二十五年即位三十一年右東漢自光武至獻帝十二帝通更始二年合一百九十七年又按前後漢起髙祖盡獻帝通王莽合四百二十六年通志卷六下
