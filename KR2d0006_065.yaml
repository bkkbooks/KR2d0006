body:
  text: 通志卷六十宋右廸功郎鄭樵漁仲撰刑法略第一歴代刑制肉刑議赦宥歴代刑制黄帝以兵定天下此刑之大者陶唐以前未聞其制虞舜聖徳聰眀建法曰象以典刑流宥五刑鞭作官刑扑作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉於是流共工于幽州放驩兠于崇山竄三苖于三危殛鯀于羽山四罪而天下咸服又五流有宅五宅三居惟明克允夏啟即位有扈不道誓衆曰不用命戮于社後又作禹刑商作湯刑洎紂無道廼重刑辟有炮烙之刑周秋官之職建三典正月之吉始和布刑于邦國都鄙乃揭刑象之法于象魏使萬民觀之浹旬而歛又執旌節以宣布于四方而憲邦之刑禁一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典凡盗賊軍鄉邑及家人殺之無罪凡報仇讐者書於士殺無罪凡殺其親者焚之殺王之親者磔之殺人者踣諸市三日傷人見血不以告者攘獄遏訟者告而誅之坐為盗賊者其孥男子入于罪𨽻女子入于舂槀凡有爵者與七十者與未齓者皆不為奴五刑之法墨罪五百劓罪五百宮罪五百刖罪五百髠罪五百凡二千五百所謂刑平國用中典者也墨者使守門劓者守闗宮者守内則者守囿髠者守積王之同族不處宫刑是不剪其類也但髠頭而已凡王族皆於隠處罰之故使守積音恣穆王享國百年耄荒命呂侯作刑訓夏贖刑訓夏禹贖刑之法從輕也墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千多於初制五百章其後又作九刑正刑五及流贖鞭扑孔子曰大罪有五而殺人為下逆天地者罪及五代誣神鬼者罪及四代逆人倫者罪及三代亂教化者罪及二代手殺人者罪止其身又曰析言破律亂名改作執左道以亂政者殺作滛聲造異服設恠伎奇器以盪上心者殺行偽而固言偽而辯學非而博順非而澤以惑衆者殺假於鬼神時日卜筮以疑人者殺此四誅者不待時不以聴秦文公二十年法初有三族罪張晏曰父母兄弟妻子如淳曰父族母族妻族武公三年誅三父等而夷三族以其殺出子寜公子三長武公為太子次徳公次出子寜公卒大庶長弗忌威壘三父廢太子而立出子為君後三父等復共殺出子立武公孝公初衛鞅請變法令令人為什伍而相収司連坐不告姦者腰斬告姦者與斬敵首同賞匿姦者與降敵同罰人有二男以上不分異者倍其賦有軍功者各以律受上爵為私鬬者各以輕重被刑大小戮力本業耕織致粟帛多者復其身事末利及怠而貧者舉以為収孥宗室非有軍功論不得為屬籍明尊卑爵秩等級各以差次名田宅臣妾衣服以家次有功者尊榮無功者雖富無所芬華令既具未布恐人之不信已乃立三丈之木於國都市南門募人有能徙者與五十金以眀不欺秦人初言令不便者以千數於是太子犯法衛鞅曰法之不行自上犯之將法太子太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈明日秦人皆趨令行之令初下有言令不便者有來言令便者衛鞅曰此皆亂化之人也盡遷於邊城其後人莫敢議令甘龍杜摯極非之令之初作一日臨渭刑七百餘人百姓皆苦之居三年道不拾遺山無盗賊家給人足勇於公戰怯於私鬬秦人大治而大恱魏文侯師李悝撰次諸國法著法經皆罪名之制也商君受之以相秦具魏世語中始皇即位遣將成蟜擊趙反死屯留軍吏皆斬及戮其屍士卒死皆戮其屍其後嫪毐作亂敗其徒二十人皆梟首車裂徇滅其宗輕者為鬼薪取薪給宗廟為鬼薪律曰鬼薪作二歳後又體觧荆軻及平六國制蔵詩書及偶語棄市以古非今者族吏見知不舉與同罪令下三十日不燒黥為城旦髠髪輸邊築長城城旦四嵗刑也燕人盧生竊言始皇樂以刑殺為威因亡去始皇聞之怒諸生在咸陽者四百六十餘人皆坑之其後東郡星隕為石或刻其石曰始皇死始皇盡誅石旁人胡亥立以趙高為郎中令更變律令有罪者相坐収族又羣盗起胡亥責李斯斯懼上書請行督責刑者相半其後趙高譖斯具五刑腰斬夷其三族漢高祖初入咸陽約法三章曰殺人者死傷人及盗抵罪蠲削秦法兆民大恱然大辟尚有三族之誅先黥劓斬左右趾笞殺梟其首葅其骨肉於市其誹謗詈詛又先斷舌故謂之具五刑彭越韓信之屬皆受此戮其後又制曰有耐罪以上請之髠其耏鬢曰耐後以三章之法不足禦姦遂令蕭何攟摭秦法取其宜於時者作律九章惠帝二年制曰今法有誹謗妖言之罪過誤之言以為妖言是使衆臣不敢盡情而上無由聞過失也其除之又制上造以上及内外公孫耳孫有罪當刑及當城旦舂者皆耐為鬼薪白粲上造爵滿十六者也耳孫元孫之子也今以上造有功勞内外孫冇骨肉屬連故事從其輕也城旦舂旦起行治城舂者婦人不參外徭但舂作米皆四歳刑也今皆就鬼薪白粲鬼薪已其上白粲坐擇米使正白為粲皆三歳刑也人年七十以上若不滿十歳有罪當刑者全之除挾書律挾蔵也秦律敢挾書者棄市呂太后初除三族罪文帝制民有犯法已論其父母妻子同産坐之及収孥律令宜除之孥子也秦法一人有罪収其家罪疑者從輕於是刑罰大省斷獄四百又感齊女淳于緹縈之言除肉刑定律曰諸當完者完為城旦舂以完易髠以笞代劓以釱左右趾代刖今既曰完矣不復云以完代完此當言髠者完之矣當黥者髠鉗為城旦舂當劓者笞三百當斬左趾者笞五百當斬右趾及殺人先自告及吏受賕枉法守縣官財物而即盗之已論命復有笞罪者皆棄市命者名也成其罪也罪人獄已决完為城且舂滿三歳為鬼薪白粲鬼薪白粲一歳為𨽻臣妾𨽻臣妾一歳免為庶人男子為𨽻臣女子為𨽻妾𨽻臣妾滿二歳為司寇司寇一歳及作如司寇二嵗皆免為庶人罪降為司宼故一歳正司寇故二歳其亡逃及有罪耐已上不用此令在夲罪中又重犯者也是後外有輕刑之名内實殺人斬右趾者又當死斬左趾者笞五百當劓者笞三百率多死笞數既多亦不活景帝制改定律笞五百曰三百笞三百曰二百猶尚不全自今吏及諸有秩皆受其官屬所治所行所將行謂按察夏孟反其餘飲食計償費勿論計所費而償其直勿論罪他物若買故賤賣故貴皆坐贓為盗他物謂非飲食吏遷徙免罷受其故官屬所將監治送財物奪爵為士伍免之謂奪其爵令為士伍又免其官職即今律所謂除名也士伍者言從士卒之伍無爵罰金二斤沒入所受有能捕告畀其所受贓其後罷磔曰棄市先此諸死刑皆磔之於市今罷之若妖逆則磔之磔謂張其尸也復下詔曰長老人所尊也鰥寡人所憐也其著令年八十以上八嵗以下孕者未乳乳産師侏儒樂師瞽者侏儒短人不能走當鞫繫者頌繫之頌讀曰容容寛不桎梏罪死欲腐者許之如腐木不生實矣六年定鑄錢偽黄金棄市律又以笞者或至死未畢復減笞三百曰二百笞二百曰百其定箠令箠長五尺其木厚一寸其末薄半寸皆平其節笞臀先時笞背畢一罪乃得更人更人更易行笞人自是笞者得全然死刑即重而生刑又輕人易犯之孝武調發煩數民窮犯法遂令張湯趙禹條定法令作見知故縱監臨部主之法見知人犯法不告為故縱而所監臨部主有罪并連坐緩深故之罪孝武欲急刑吏深害及故入人罪者皆寛緩之急縱出之誅律令凡三百五十九章蕭何夲定律九篇叔孫通又加十八篇張湯又撰越宫律二十七篇趙禹撰朝律六篇合為六十篇大辟四百九條千八百八十二事死罪决事比萬三千四百七十二事比以例相比况文書既繁主者不能遍睹或罪同而論異孝昭制子首匿父母妻匿夫孫匿大父母皆勿坐其父母匿子夫匿妻大父母匿孫罪殊死皆上請宣帝患刑法不一置廷平四人平之成帝鴻嘉初又定令年未滿七歳賊鬬殺人及犯殊死者上請廷尉以聞得减死合於三赦㓜弱老眊之人此皆法令稍定近古而便人者也哀帝綏和二年除誹謗抵欺法平帝元始中制曰前詔有司復貞婦歸女徒誠欲以防邪僻全貞信及眊悼之人刑罰所不加聖王之所制也惟苛暴吏多拘繫犯法者親屬婦人老弱其明敕百僚婦女非身犯法及男子年八十以上七嵗以下家非坐不道詔所名捕他皆無得繫名捕謂下詔特所捕也其當驗者即驗問就所居而問之定著令王莽居攝翟義劉信起兵討莽為莽敗之夷三族其後陳良終帶叛入匃奴莽求得行焚如之刑具峻酷篇後漢光武留心庶獄然自王莽篡位之後舊章不存法網弛縱無以懲肅梁統上疏曰臣竊見元帝初元五年輕殊死刑三十四事哀帝建平元年輕殊死刑八十一事其四十二事手殺人者减一等自後人輕犯法吏易殺人臣愚以為刑罰不茍務輕務其中也是以五帝有流殛放殺之誅三王有大辟刻肌之刑所以為除殘去亂也高帝定法𫝊之後代文帝遭世康平因時施恩省肉刑相坐之法天下㡬平武帝值中國全盛征伐逺方百姓罷弊豪傑犯禁姦吏弄法故重遁匿之科著知縦之律宣帝履道要以御海内臣下奉憲不失䋲墨天下稱安孝元孝哀即位日淺丞相王嘉等便以數年之間虧除先帝舊約定令斷律凡百餘事臣取其尤妨政者條奏伏請擇其善者而從之定不易之典時廷尉議以為崇刑峻法非眀王急務遂罷之章帝時郭躬條奏請重文可從輕者三十一事著于令陳寵又代躬為廷尉帝納寵言制除鉆鑽諸慘酷之科解妖惡之禁又除文致請讞五十餘事著于令寵復校律令刑法溢扵甫刑者奏除之曰今律令犯死刑者六百一十耐罪千六百九十八贖罪以下二千六百八十一溢於甫刑千九百八十九其四百一十大辟千五百七耐罪七十九贖罪請令三公廷尉集平律令可施行者大辟二百耐罪贖罪二千八百合為三千其餘千九百八十九事悉可詳除會寵得罪遂罷安帝永初中法稍苛繁人不堪之陳寵子忠復為尚書略依寵意奏上三十三條為决事比比例也必寐反以省讞之弊又上除蠶室刑西漢文景已除宫刑今復除蠶室刑者是當時雖有文而未悉斷武帝時司馬遷犯法下蠶室則其事矣今申明除之獻帝初應劭又删定律令撰具律夲章句尚書舊事廷尉版令决事比例司徒都目五曹詔書及春秋折獄凡二百五十篇又集議駁三十篇以類相從凡八十二事於是舊事存焉曹公秉政欲復肉刑陳羣深陳其便鍾繇亦贊成之孔融王修不同其議遂止於是乃定甲子科犯釱左右趾者易以木械是時乏鐵故易以木焉又以漢律太重故令依律論者聴得科半使半减也魏文帝受禪後有大女劉朱撾子婦酷暴前後三婦自殺論朱減死作尚方因是下愁毒殺人减死之令明帝改士庶罰金之令男聴以罰代金婦人加笞還從鞭督之例以其形體裸露故也時所用舊律其文起自魏文侯師李悝撰次諸國法著經以為王者之政莫急於盗賊故其律始扵盗賊頃刻追捕故著囚捕二篇其輕狡越城博戲借假不㢘滛侈踰制以為雜律一篇又以具其加减是故所著六篇而已然皆罪名之制也啇君𫝊習以為秦相漢承其制蕭何定律除參夷連坐之罪増部主見知之條益事律擅興廐户三篇合為九篇叔孫通益律所不及傍章十八篇張湯越宫律二十七篇趙禹朝律六篇合為六十篇又漢時决事為令甲以下三百餘篇又司徒鮑昱撰嫁娶辭訟决為法比都目凡九百六卷世有增損輕重乖異而通條連句上下相䝉雖大體異篇實相探入盗律有賊傷之例賊律有盗章之文興律有上獄之法廐律有逮捕之事若此之比錯糅無常後人生意各為章句叔孫宣郭令卿馬融鄭康成諸儒章句十有餘家家數十萬言凡斷罪所當由用者合二萬六千二百七十二條七百七十三萬二千二百餘言言數益繁覽者益難天子於是詔但得用鄭氏章句不得雜用餘家衛覬又奏曰刑法者國家之所貴重而私議之所輕賤獄吏者百姓之所系命而選用者之所卑下請置博士轉相教授然而律文煩廣事比衆多離夲依末决獄之吏如廷尉獄吏范𢎞受囚絹二丈附輕法論獄吏劉象受屬偏考囚張茂物故附重法論之𢎞象雖皆棄市而輕枉者相繼其後天子又下詔改刑制命陳羣劉邵等删約舊科旁採漢律定為魏法制新律十八篇州郡令四十五篇尚書官令軍中令合百八十餘篇其序略曰舊律所以難知者由於六篇篇少故也篇少則文荒文荒則事寡事寡則罪漏故集罪例以為刑名冠於律首凡所定增十三篇就故五篇合十八篇扵正律九篇為增於旁章科令為省矣更依古義制為五刑其死刑有三髠刑有四完刑作刑各三贖刑十一罰金六雜抵罪七凡三十有七各以為律首司馬景王輔政時犯大逆者其法誅及已出之女毋邱儉之誅其子甸妻荀氏應坐死其族兄顗通表魏帝以乞其命詔聴離婚荀氏所生女芝為潁川太守劉子元妻亦坐死以懐姙繫獄荀氏辭詣司隸校尉何曾乞恩求沒為官婢以贖芝命曾哀之使主簿程咸上議曰臣以為女人有三從之義無自專之道出適他族降父母之服所以明外成之節也而父母有罪則追刑夫黨見誅又随戮一人之身内外受辟女既産育則他族之母無辜受戮傷孝子之心且男既不得罪於他族而女獨嬰戮於二門臣以為在室宜從父之誅既醮可随夫之罰於是詔有司改定律令司馬文王繼秉魏政患前代律令煩雜陳羣劉邵雖經改革而科網太宻扵是命賈充鄭冲荀覬荀朂羊祜王業杜友杜預裴楷周雄郭頎成公綏栁軌榮邵等定法令就漢九章増十一篇仍其族類正其體號合三十篇六百三十條二萬七千六百五十七言蠲其苛穢歸於益時其餘未宜除之者若軍事田農酟酒未得皆從人心權設其法太平當除故不入律悉以為令施行制度以此設教違令有罪則入律也其常事品式章程各還其府為故事減梟斬族誅從坐之條除謀反適養母出女嫁皆不復還坐父母棄市省禁錮相告之條去捕亡亡沒為官奴婢之制輕過誤老小女人當罰金杖者皆令半之重姦伯叔母之令棄市淫寡女三嵗刑崇嫁娶之要峻禮教之防凖五服以制罪也凡律令合二千九百二十六條十二萬六千三百言六十卷故事三十卷晋武帝㤗始三年賈充等修律令成帝親自臨講使裴楷執讀四年正月大赦天下乃班新律其後明法掾張褧又注律表上之其要曰律始於刑名者所以定罪制也終於諸侯者所以畢其政也是以經略罪法之輕重正加减之等差明發衆篇之多義補其章條之不足較舉上下綱領其犯盗賊詐偽請賕者則求罪於此作役水火畜養守偹之細事皆求之作夲名告訙為之心舌捕繫為之手足斷獄為之定罪名例齊其法制自始及終往而不窮變動無常周流四極上下無方不離于法律之中其知而犯之謂之故意不以為然謂之失違忠欺上謂之謾背信蔵巧謂之詐虧禮廢莭謂之不恭兩訟相趣謂之鬬兩和相害謂之戲無變斬擊謂之賊不意誤犯謂之過逆節絶理謂之不道陵上僭貴謂之惡逆將害未發謂之戕唱首先言謂之造意二人對議謂之謀制衆建計謂之率不和謂之彊攻惡謂之略三人謂之羣取非其物謂之盗貨財之利謂之贓凡二十者律義之較名也五刑不簡正于五罰五罰不服正于五過意善功惡以金贖之故律制生罰不過十四等死刑不過三徒加不過六囚加不過五累作不過十一嵗累笞不過千二百刑等不過一嵗金等不過四兩夫操刀執䋲刀妄加則傷物䋲妄彈則侵直梟首者惡之長斬刑者罪之大棄市者死之下髠作者刑之威贖罰者誤之誡王者立此五刑所以寳君子而逼小人也五刑成章輙相依凖法律之義也東晋元帝為丞相在江東承制時百度草剏議斷不循法律人立異議高下無狀主簿熊逺奏曰自軍興以來臨事改制朝作夕改至扵主者不敢任法每輙闗諮委之大官非為政之體若夲曹處事不合法令監司當以法彈違不得動用闗塞以壊成事按法葢麤術非妙道也矯割物情以成法耳若每随物情輙改法制此為以情壊法法之不一是謂多門開人事之路廣私請之端非先王立法之夲意也凡為駮議者若違律令節度當合經傳及前比故事不得任情以破成法愚謂宜令錄事更立條制諸立議者皆當引律令經傳不得直以情言無所依凖以虧舊典也是時帝以權宜從事尚未能從而河東衛展為晋王大理考摘故事有不合情者又上書論之元帝令曰先自元康以來事故荐臻刑禁滋蔓大理所上宜朝堂會議蠲除詔書不可用者此孤所虛心者也宋文帝時蔡廓為侍中建議以為鞫獄不宜令子孫下辭明言父祖之罪自今但令家人與囚相見無乞鞫之詳便足以眀伏罪不須責家人下辭朝議咸以為允從之時王𢎞上疏曰主守偷五疋常偷四十疋並死太重請加主守至十疋常偷至五十疋謝莊為都官尚書奏改定州獄曰舊官長竟囚畢郡遣督郵案驗仍就施行督郵賤吏非能異扵官長雖有案驗之名而無刑究之實愚謂此制宜革自今入重之囚縣考正畢以事言郡并送囚身委二千石親臨覆辯必収聲吞釁然後就戮若二千石不能决乃度廷尉神州統外移之刺史刺史有疑亦歸臺獄必令死者不怨而坐者無恨齊武帝令删定郎王植之集注張杜舊律合為一書凡千五百三十條事未施行其文殆滅梁武帝制依周漢舊事有罪者贖其科凡在官身犯罰金鞭杖督之罪悉入贖停罪其臺省令史士卒欲贖者聴之時齊時舊郎蔡法度能言齊王植之律扵是使損益舊夲以為梁律天監初又令王亮等定為二十篇一曰刑名二曰法例三曰盗刼四曰賊叛五曰詐偽六曰受賕七曰告劾八曰討捕九曰繫訊十曰斷獄十一曰雜十二曰户十三曰擅興十四曰毁亡十五曰衛宫十六曰水火十七曰倉庫十八曰廐十九曰闗市二十曰違制其制刑為十五等之差棄市以上為死罪大罪梟其首次棄市刑二嵗以上為耐罪言各随伎能而任使之也有髠鉗五嵗刑笞二百収贖絹男子六十疋又有四嵗刑男子四十八疋又有三嵗刑男子三十六疋又有二嵗刑男子二十四疋罰金一兩以上為贖罪贖死者金二斤男子十六疋贖髠鉗五嵗刑笞二百者金一斤十二兩男子十四疋贖四嵗刑者金一斤八兩男子十二疋贖三嵗刑者金一斤四兩男子十疋贖二嵗刑者金一斤男子八疋罰金十二兩者男子六疋罰金八兩者男子四疋罰金四兩者男子二疋罰金二兩者男子一疋罰金一兩者男子二丈女子各半之五刑不簡正于五罰五罰不服正于五過以贖論故為此十四等之制又九等之差一嵗刑半嵗刑百日刑鞭杖二百鞭杖一百鞭杖五十鞭杖三十鞭杖二十鞭杖十又有八等之差一曰免官加杖督一百二曰免官三曰奪勞百日杖督一百四曰杖督一百五曰杖督五十六曰杖督四十七曰杖督二十八曰杖督十其鞭有刑鞭法鞭常鞭凡三等之差刑鞭生革亷成法鞭生革去亷常鞭熟靼不去亷皆作鶴頭紐長一尺一寸稍長二尺七寸廣三寸靶長尺五寸杖皆用生荆長六尺有大杖法杖小杖三等之差大杖頭圍寸三分小頭八分半法杖圍寸二分小頭五分小杖圍寸一分小頭極杪諸督罰大罪無過五十三十小者二十當笞二百以上者笞半餘半後决中分鞭杖老小於律令當行鞭杖罰者皆半之其制鞭制杖法鞭法杖自非特詔皆不得用士人有錮禁之科亦以輕重為差其犯清議則終身不齒凡定罪二千五百二十九條又有令三十卷其後除贖罪之科陳武帝令尚書删定郎范果參定律令又令徐陵等知其事制律三十卷科三十卷其制惟重清議禁錮之科若搢紳之族犯虧名教不孝及内亂者終身不齒自餘一用梁法當刑扵市者夜須明雨須晴朔日八節六齋日月在張心日並不得行刑廷尉寺為北獄建康縣為南獄並置正監平又制常以二月侍中吏部尚書三公郎部都令史三公錄寃屈御史中丞侍御史蘭臺令史親行京師諸獄及治署治察囚徒寃枉後魏起自北方屬晋室之亂部落漸盛其主乃峻刑法每以軍令從事人乘寛政多以違令得罪死者以萬計扵是國落騷然其後當死者聴其家獻金馬以贖犯大逆者親族男女無少長皆斬男女不以禮交皆死人相殺者聴與死家牛馬四十九頭及送葬器物以平之無繫訊連逮人坐盗官物一備十及道武既平定中原患舊制太峻命三公郎王徳除其酷法約定科令至太武帝神䴥中詔崔浩定律令除五嵗四嵗刑増一年刑大逆不道腰斬誅其同籍年十四以下腐刑女子沒縣官害其親者轘之為蠱毒者男女皆斬而焚其家其巫蠱者負羖羊抱犬沈諸泉當刑者贖貧則加鞭二百畿内人富者燒炭於山貧者役於圚溷女子入舂槀其痼疾不逮于人守苑囿王官階九品得以官爵除刑婦人當刑而孕産後百日乃决年十四以降刑之半八十及九十非殺人不坐拷訊不踰四十九論刑者部主言狀公車鞫辭而三都决之當死者定按奏聞帝親臨問無異辭怨言乃刑之諸州囚之大辟皆先讞報乃施行其後因官吏黷貨太延中詔吏民得舉告牧守之不法扵是兇悖者求得牧宰之失乃貪暴扵閭閻太平真君中以有司斷法不平詔諸疑獄皆付中書依經義論决初盗律贓四十疋致大辟人多慢政乃减至三疋十一年誅崔浩正平初又令胡方回游雅改定律制凡三百七十條門房之誅四大辟百四十五刑二百二十一文成帝太安中以庶士多因酒致酗訟制禁釀酒沽飲皆斬吉凶賔親則開禁有日程增置候官伺察諸違犯贓二丈皆斬又增律七十九章門房之誅十有三大辟三十五刑六十二至獻文帝除口誤開酒禁故事斬皆裸形伏鑕砧也孝文太和初制不令祼形又令髙閭修改舊文随例增减凡八百三十二章門房之誅十有六大辟之罪二百三十五刑三百七十七除羣行剽刼首謀門誅律重者止梟首時法官及州縣多為重枷復以石縋囚頸傷肉至骨勒以誣服吏以為能帝聞而傷之乃制非大逆有明證而不疑辭者不得大枷宣武帝正始初尚書令髙肇等奏曰杖之小大鞭之長短令有定式但枷之輕重先無成制請造大枷長丈三尺喉下長丈通頰木各方五寸以擬大逆外叛自是枷杖之制頗有定凖法例律五等爵及在官品令從第五以上皆當刑二嵗免官者三載之後聴仕降先階一等邢巒奏官人若有罪夲除名以職當刑猶有餘資得降階而叙至扵五等封爵除刑若盡永既甄削便同之除名扵例實爽愚謂自王公以下有封邑罪除名三年之後宜各降夲爵一等王及郡公降為縣公公為侯侯為伯伯為子子為男至扵縣則降為鄉男五等爵者并依此而降至扵散男其鄉男散男男無可降授者三年之後聴依其夲品之資出身從之及齊神武秉東魏政遷都扵鄴羣盗頗起遂立嚴制諸彊盗殺人者首從皆斬妻子同籍配為樂戸其不殺人及贓不滿五疋魁首斬從者死妻子亦為樂戸小盗贓滿十疋以上魁首死妻子配驛從者流北齊文宣帝受禪後命羣官刋定魏朝麟趾格又議造齊律積年不成其决獄猶依魏舊式武成帝河清三年尚書令趙郡王叡等奏上齊律十二篇一曰名例二曰禁衛三曰户婚四曰擅興五曰違制六曰詐偽七曰鬭訟八曰盗賊九曰捕斷十曰毁損十一曰廐牧十二曰雜其定罪九百四十九條又上新令四十卷大抵採魏晋故事其制刑名五一曰死重者轘之轘音患其次梟首並陳屍三日無市者列於鄉亭其次斬刑殊身首其次絞刑死而不殊凡四等二曰流刑謂論犯可死原情可降鞭笞百髠之投于邊裔以為兵卒未有道里之差其不合逺配者男子長徒女子配舂並六年三曰刑罪即耐罪也有五嵗四嵗三嵗二嵗一嵗之差凡五等各加鞭六嵗者加笞百其五嵗者八十四嵗者六十三嵗者四十二嵗者二十一嵗者無笞並鏁輸作左校而不髠無保者鉗之婦人配舂及掖庭織四曰鞭有百八十六十五十四十之差凡五等五曰杖有三十二十一十之差凡三等當加者上就次當减者下就次贖罪者舊有金皆代以中絹死者百疋流九十二疋刑五嵗七十八疋四嵗六十四疋三嵗五十疋二嵗三十六疋各通鞭笞論一嵗無笞則通鞭二十四疋鞭杖每十續絹一疋至鞭百則絹十疋無絹之鄉皆凖絹収錢自贖笞十以上至死又為十五等之差當加减次如正决法合贖者謂流内官及爵秩比視老小閹癡并過失之屬犯罰絹一疋及杖十以下皆名為罪人盗及殺人而亡者即掲名注籍甄其一房配驛戸宗室則不注盗不入奚官不加宫刑自犯流罪以下合贖者及婦人犯刑以下侏儒篤疾殘廢非犯死罪皆頌繫之又列重罪十條一曰反逆二曰大逆三曰叛四曰降五曰惡逆六曰不道七曰不敬八曰不孝九曰不義十曰内亂其犯此十者不在八議論贖之限是後法令眀審科條簡要又勑仕門子弟常講習之故齊人多曉法律其不可為定法者别制權令二卷與之並行後周文帝秉西魏政令有司斟酌今古通變修撰新律革命後武帝保定三年司憲大夫拓跋廸奏新律謂之大律凡二十五篇一曰刑名二曰法例三曰祀享四曰朝㑹五曰婚姻六曰戸禁七曰水火八曰興繕九曰衛宫十曰市鄽十一曰鬭競十二曰刼盗十三曰賊叛十四曰毁亡十五曰違制十六曰闗津十七曰諸侯十八曰廐牧十九曰雜犯二十曰詐偽二十一曰請求二十二曰告言二十三曰逃亡二十四曰繫訊二十五曰斷獄大凡定罪千五百三十條其制罪一曰杖刑五自十至五十二曰鞭刑五自六十至于百三曰徒刑五徒一年者鞭六十笞十徒二年者鞭七十笞二十徒三年者鞭八十笞三十徒四年者鞭九十笞四十徒五年者鞭百笞五十四曰流刑流衛服去皇畿二千五百里者鞭百笞六十流要服去皇畿三千里者鞭百笞七十流荒服去皇畿三千五百里者鞭百笞八十流鎮服去皇畿四千里者鞭百笞九十流藩服去皇畿四千五百里者鞭百笞百五曰死刑五一曰磬二曰絞三曰斬四曰梟五曰裂五刑之屬各有五合二十五等不立十惡之目而重惡逆不道大不敬不孝不義内亂之罪也凡惡逆肆之三曰盗賊羣攻鄉邑及入人家者殺之無罪若報讐者造於法造七報反而自殺之不坐經為盗者注其籍惟皇宗則否凡死罪枷而拲流罪枷而梏徒罪枷鞭罪桎杖罪散以待斷皇族及有爵者死罪以下鏁之徒以下散之獄成將殺者書其姓名及其罪扵拲而殺之市惟皇族與有爵者隠獄其贖杖刑五金一兩至五兩贖鞭刑五金六兩至十兩贖徒刑一年金十二兩二年十五兩三年一斤二兩四年一斤五兩五年一斤八兩贖流刑一斤十二兩俱役六年不以逺近為差等贖死刑金二斤鞭者以百為限加笞者合二百止應加鞭笞者皆先笞後鞭婦人當笞者聴以贖論徒輸作者皆任其所能而役使之若再犯徒三犯鞭者一身永配下役應贖金者鞭杖十収中絹一疋流徒者依限嵗収絹十二疋死罪者百疋其贖刑死罪五旬流刑四旬徒刑三旬鞭刑一旬限外不輸者歸扵法貧者請而免之大凡定法千五百三十七條其大略滋章條流苛宻比扵齊法煩而不要又初除復讐之法犯者以殺論帝又以齊之舊俗未改昏政賊盗姦宄頗乖憲章其年又為刑書要制以督之大抵持杖羣盗一疋以上不持杖羣盗五疋以上監臨主掌自盗二十疋以上盗及詐請官物三十疋以上正長隠五户及丁五以上及地頃以上皆死自餘依大律由是澆詐頗息焉宣帝虐忍無度令撰刑書謂之刑經聖制隋文帝初令髙熲等更定新律其刑名有五一曰死刑二有絞有斬二曰流刑三有千里千五百里二千里應配者千里居作二年千五百里居作二年半二千里居作三年三曰徒刑五有一年一年半二年二年半三年四曰杖刑五自五十至于百五曰笞刑五自十至于五十而蠲除前代鞭刑及梟首轘裂之法其流徒之罪皆减從輕流役六年改為五年徒刑五年改為三年惟大逆謀反叛者父子兄弟皆斬家口沒官又置十惡之條多採後齊之制而頗有損益一曰謀反二曰謀大逆三曰謀叛四曰惡逆五曰不道六曰大不敬七曰不孝八曰不睦九曰不義十曰内亂十惡及故殺人獄成者雖會赦猶除名其在八議之科及官品第七以上犯罪皆例减一等其品第九以上犯者聴贖應贖者皆以銅代絹銅一斤為負負十為殿笞十者銅一斤加至杖百則十斤徒一年贖銅二十斤每等則加銅十斤三年則六十斤矣流千里贖銅八十斤每等則加銅十斤二千里則百斤矣二死皆贖銅百二十斤犯法私罪以官當徒者五品以上一官當徒二年九品以上一官當徒一年當流者三流周比徒三年若犯公罪者加一年當流者各加一等其累徒過九年者流二千里自前代相承有司訊考皆法外或有用大棒束杖車輻鞵底壓踝杖桄之屬盡除之訊囚不得過二百枷杖大小咸為之程品行杖者不得易人又勑四方辭訟有枉屈縣不治者令以次經郡及州至省仍不治乃詣闕申訴有所未愜聴撾登聞鼔有司錄狀奏之帝又每季親錄囚徒常以秋分之前省閲諸州申奏罪狀後因覽刑部奏斷獄數猶至萬條以為律尚嚴宻故人多䧟罪又勑蘇威牛𢎞等更定新律除死罪八十一條流罪百五十四條徒杖等千餘條定留惟五百條凡十二卷一曰名例二曰禁衛三曰職制四曰戸婚五曰廐庫六曰擅興七曰盗賊八曰鬭訟九曰詐偽十曰雜律十一曰捕亡十二曰斷獄自是刑網簡要疎而不失於是置律愽士弟子員斷决大獄皆先牒明法定其罪名然後依斷其後帝以用律者多致蹖駁罪同論異詔諸州死罪不得便决悉移大理按覆事盡然後上奏取裁十三年改徒及流並為配防十五年制死罪者三奏而後决帝無學以文法䋲下諸州有主典盗倉粟者差人馳驛斬之又於殿前决之人或有盗一錢亦死煬帝即位以文帝禁網深刻又勑修律令除十惡之條時斗秤皆小舊二倍其贖銅亦加三倍為差杖百則三十斤矣徒一年者六十斤每等加三十斤為差三年則百八十斤矣流無異等贖二百四十斤二死同贖三百六十斤舊制釁門子弟不得居宿衛近侍之官帝下制曰諸州犯罪被戮之門期以下親仍令合仕聴參宿衛近侍之官三年新律成凡五百條為十八篇詔施行之謂之大業律一曰名例二曰衛宫三曰違制四曰請求五曰户六曰㛰七曰擅興八曰告劾九曰賊十曰盗十一曰鬭十二曰捕亡十三曰倉庫十四曰廐牧十五曰闗市十六曰雜十七曰詐偽十八曰斷獄其五刑之内降從輕典二百餘條其枷杖决罰訊囚之制葢並輕於舊是時百姓久厭苛刻喜扵刑寛其後帝外征四夷内窮嗜慾兵革歳動賦歛繁滋盗賊蜂起更為嚴制肉刑議漢文帝十三年齊大倉令淳于意有罪遂繫長安當刑其女緹縈上書曰妾父為吏齊中皆稱亷平今坐法當刑妾痛死者不可復生刑者不可復屬屬聨也之欲反雖欲改過自新其道無由妾願沒入為官婢贖父刑罪天子憐其意遂下令曰葢聞有虞氏之時畫衣冠異章服以為戮而民弗犯今有肉刑三黥劓二左右趾而姦不止吾甚自愧夫訓道不純愚人䧟焉詩曰愷悌君子民之父母今刑者斷支體刻肌膚終身不息息生也或欲改行為善而道無由豈稱為民父母之意哉其除肉刑丞相張蒼御史大夫馮敬奏議定律令諸當完者完為城旦舂當黥者髠鉗為城旦舂當劓者笞三百當斬左趾者笞五百班固之論曰禹承堯舜之後自以徳衰而制肉刑湯武順而行之者以俗薄扵唐虞故也今漢承衰周暴秦極弊之流俗以薄扵三代而行堯舜之刑是猶以鞿羈而御駻突以䋲繫馬口謂之鞿絡駻突惡馬也馬頭曰羈違救時之宜矣且除肉刑者夲欲全人之生也今去髠鉗一等轉而入扵大辟故死者嵗以萬數刑重之所致也至于穿窬之盗忿怒傷人男女滛佚吏為姦贓若此之罰又不足以懲也故刑者嵗十數萬人既不畏又曽不恥刑輕之所生也故思所以清源正夲之論删定律令篹音撰二百章以應大辟其餘罪次扵古當生今觸死者皆可篹行肉刑欲死邪欲腐邪及傷人與盗吏受賕枉法男女滛亂皆復古刑為三千章詆欺文致微細之法悉蠲除如此則刑可畏而禁易避吏不專殺法無二門順稽古之制成時雍之化矣後漢獻帝之時天下既亂刑罰不足以懲惡扵是名儒大才崔寔鄭康成陳紀之徒咸以為宜復肉刑及曹公令荀彧博訪百官欲復申之少府孔融議以為紂斬朝渉之脛天下謂之無道九牧之地千八百君若刖一人是天下常有千八百紂也且被刑之人慮不念生類多趨惡夙沙亂齊伊戾禍宋趙髙英布為世大患不能止人遂為非也雖忠如鬻拳信如卞莊智如孫臏寃如巷伯才如史遷逹如子正一罹刀鋸沒世不齒漢開改惡之路凡為此故朝廷善之卒不改焉魏武秉漢政下令又欲復肉刑御史中丞陳羣深陳其便相國鍾繇亦贊成之奉常王循不同其議魏武亦難以蕃國改漢朝之制遂不行至齊王芳正始中征西將軍夏侯太初河南尹李勝相論難勝主肉刑而太初不主肉刑凡徃復數四文多不載丁謐又論曰舜典曰象以典刑流宥五刑鞭作官刑扑作教刑金作贖刑怙終賊刑咎繇曰天討有罪五刑五用哉呂刑曰蚩尤惟始作亂延及于平民罔不寇賊鴟義姦宄寇攘矯䖍苖民惟作五虐之刑曰法殺戮無辜爰始淫為刖劓㭬黥按此肉刑在於蚩尤之世而堯舜以流放代之故黥劓之文不載唐虞之籍而五刑之數亦不具於聖人之㫖也禹承舜禪與堯同治必不釋二聖而逺則凶頑固可知矣湯武之王獨將奚取於呂侯故叔向云三辟之興皆叔世也此則近君子有徴之言矣晋武帝初廷尉劉頌上言曰臣昔上行肉刑竊以為議者徇孝文之小仁而輕違聖王之典刑未詳之甚莫過扵此今死刑重故非命者衆生刑輕故罪不禁姦所以然者肉刑不用之所致也古者用刑以止刑今反於此諸重犯亡者髠過三十輙重髠之此以刑生刑加作一嵗此以徒生徒也亡者積多繫囚猥畜復從赦之此為刑不制罪法不勝姦聖王之制肉刑逺有深理非徒懲其畏剝割之痛而不為也乃去其為惡之具亡者刖足無所用復亡盗者截手無所用復盗滛者割其勢理亦如之除惡塞源莫善於此此等已刑之後便各歸家父母妻子共相養恤不流離於塗路今宜取死刑之限經及三犯逃亡滛盗悉以肉刑代之随發被刑去其為惡之具此為已刑者皆非良士也豈與全其為姦之手足而蹴居必死之窮地同哉周禮三赦三宥施扵老㓜悼耄黔黎不屬逮者此非為惡之所出故刑法逆舍而宥之非此犯罪則必刑而無赦暨至後代以時嶮多難四赦解結權而行之又不以寛罪人也而今常以罪積獄繁赦以散之是以赦愈數而獄愈塞如此不已將至不勝原其所由肉刑不用之故也去此二端獄不得繁故無取扵數赦也疏上又不見省東晋元帝即位廷尉衛展上言古者肉刑事經前聖漢文除之増加大辟今人戸凋荒百不遺一而刑法峻重非勾踐養胎之義也詔内外通議於是王導等議以肉刑之典由來尚矣引班固之論以為據尚書令刁恊等議以今中興祚隆大命惟新誠宜設肉刑寛法以育人然懼羣小之愚習翫所見而忽異聞或未能咸服愚謂行刑之時先明申法令樂刑者刖甘死者殺則心服矣古典刑不上大夫今士人有犯者謂宜如舊不在刑例則進退為允尚書周顗等議以為肉刑平世所應立非救弊之宜也方今聖化草創民有餘姦習惡之徒為非未已截頭絞頸尚不能禁而乃更斷足劓鼻以止之乎恐受刑者轉廣而為非者日多踊貴屨賤有鼻者醜也元帝猶欲從展所上大將軍王敦以為百姓習俗日久忽復肉刑必駭逺近且逆寇未殄不宜有惨酷之聲以聞天下扵是乃止安帝元興末桓元輔政又議欲復肉刑斬左右趾之法以輕死刑命百官議蔡廓上議曰肉刑之設肇自哲王故能勝殘去殺化崇無為季末澆偽設網彌宻至扵棄市之條實非不赦之罪事非手殺考律同歸輕重均科减降路塞鍾陳以之抗言元皇所為留愍今誠宜明慎用刑愛民宏育申哀矜以革濫移大辟扵支體全性命之至重恢繁息扵將來而孔琳之議不同用王朗夏侯太初之㫖時論多與琳之同故遂不行赦宥放生附易解卦曰雷雨作解君子以赦過宥罪虞書曰宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寜失不經周官司寇曰三刺三宥三赦之法一曰訊羣臣二曰訊羣吏三曰訊萬民聴民之所刺宥以施上服下服之刑宥寛也人言殺殺之言寛寛之上服劓墨下服宫刖之刑一宥曰不識再宥曰過失三宥曰遺忘一赦曰㓜弱再赦曰老耄三赦曰憃愚又國君過市刑人赦呂刑云五刑之疑有赦五罰之疑有赦其審克之墨辟疑赦其罰百鍰刑疑則赦從罰六兩曰鍰鍰黄鐡劓辟疑赦其罰惟倍剕辟疑赦其罰倍差宮辟疑赦其罰六百鍰大辟疑赦其罰千鍰禮曰疑獄汎問與衆共之衆疑赦之管仲曰赦者先易而後難久而不勝其禍法者先難而後易久而不勝其福故惠者人之仇讐也法者人之父母也凡赦者小利而大害者也無赦者小害而大利者也夫盗賊不勝則良民危法禁不立則姦邪繁故赦者奔馬之委轡也漢景帝四年赦有犯死罪欲腐者許之腐宫刑也丈夫割勢不復生子如腐木不生實後漢光武建武中大司馬呉漢疾篤帝親臨問所欲言對曰臣無識知惟願慎無赦而已章帝章和元年赦天下繫四在四月丙子以前减死罪一等勿笞詣金城而文不及亡命未發覺郭躬上封事曰聖恩所以减死罪使戍邊重人命也今死罪亡命無慮萬人又自赦以來捕得甚衆而詔令不及皆當重狀惟天恩莫不蕩宥臣以為赦前犯死罪而繫在赦後者可皆勿詣金城以全人命有益扵諸邊帝善之下詔赦焉安帝永初中尚書陳忠上言母子兄弟相代死者聴赦所代者從之北齊赦日武庫令設金雞及鼓扵闕闔門外之右勒集囚徒於闕前撾鼓千聲脱枷鎻遣之唐令曰赦日武庫令設金雞及鼓扵宫城門外之右勒集囚徒於闕前撾鼓千聲訖宣制放其赦書頒諸州用絹寫行下貞觀二年七月上謂侍臣曰凡赦惟及不軌之輩古語云小人之幸君子不幸一嵗再赦婦兒喑啞凡養稂莠者傷禾稼惠姦兇者賊良民昔文王作罰刑茲無赦夫小仁者大仁之賊故我有天下以來不甚放赦今四海安寜禮義興行數赦則愚人常冀僥倖惟欲犯法不能改過當須慎赦武太后聖歴三年斷屠殺鳳閣舍人崔融上議曰春生秋殺天之常道冬狩夏苖國之大事豺祭獸獺祭魚自然之理也一乾豆二賔客不易之義也上自天子下至庶人莫不揮其鸞刀烹之鶴鼎所以充庖厨故能幽眀感通人祗輯睦萬王千帝殊塗同歸今者禁屠宰斷弋獵二驅莫行一切不許將恐違聖人之逹訓紊明王之善經一不可也且江南諸州以魚為命河西諸國以肉為齋一朝禁止倍生勞弊富者未革貧者難堪二不可也如有貧賤之流剝割為事家業儻失性命不全雖復日戮一人終慮未能總絶但益恐嚇惟長姦欺外有斷屠之名内誠鼔刀者衆勢利依倚請託紛紜三不可也雖好生惡殺是君子之小恩而考古㑹今非國家之大體但使順月令奉天經造次合禮儀從容中刑典自然人得其性物遂其生何必改革方為盡善景龍元年遣使往江淮分道贖生以所在官物充直中書舍人李乂上疏曰江淮水鄉採捕為業魚鼈之利黎元所資雖雲雨之私有霑於末類而生成之惠未洽於平民何則江湖之饒生育無限府庫之内支供易殫費之若少則所濟何成用之儻多則常支有闕在扵拯物豈若憂民且鬻生之徒惟利斯視錢刀日至網罟年滋施之一朝營之百倍未若廻救贖之錢物减貧無之徭賦治國愛民其福勝彼二年九月勑鳥雀昆蟲之屬不得擒捕以求贖生犯者先决三十宜令金吾及州縣市司嚴加禁斷通志卷六十
