body:
  text: 通志卷十五上宋右迪功郎鄭樵漁仲撰後魏紀第十五上聖武帝神元帝思帝昭帝桓帝穆帝平文帝惠帝煬帝烈帝昭成帝道武帝明元帝大武帝文成帝獻文帝魏之先出自黃帝軒轅氏黃帝子曰昌意昌意之少子受封北國有大鮮卑山因以為號其後世為君長統幽都之北廣漠之野畜牧遷徙射獵為業淳朴為俗簡易為化不為文字刻木結繩而已時事逺近人相揚授如史官之紀録焉黃帝以土德王北俗謂土為托謂后為跋故以為氏其裔始均仕堯時逐女於弱水北人賴其勳舜命為田祖歷三代至秦漢獯鬻獫狁山戎丐奴之屬纍代作害中州而始均之裔不交南夏是以載籍無聞積六七十代至成皇帝諱毛立統國三十六大姓九十九威振北方成帝崩節皇帝貸立節帝崩莊皇帝觀立莊帝崩明皇帝樓立明帝崩安皇帝越立安帝崩宣皇帝推寅立宣帝南遷大澤方千餘里厥土昏冥沮洳謀更南徙未行而崩景皇帝利立景帝崩元皇帝俟立元帝崩和皇帝肆立和帝崩定皇帝機立定帝崩僖皇帝蓋立僖帝崩威皇帝澮立威帝崩獻皇帝鄰立時有神人言此土荒遐宜徙建都邑獻帝年老乃以位授子聖武皇帝命南移山谷高深九難八阻於是欲止有神獸似馬其聲類牛導引厯年乃出始居丐奴故地其遷徙䇿略多出宣獻二帝故時人並號曰推寅蓋俗云鑽研之義聖武皇帝諱詰汾嘗田於山澤欻見輜軿自天而下既至見美婦人自稱天女受命相偶旦日請還期年周時復會于此言終而别及期帝至先田處果見天女以所生男授帝曰此君之子也當世為帝王語訖而去即始祖神元皇帝也故時人諺曰詰汾皇帝無婦家力微皇帝無舅家帝崩神元皇帝立神元皇帝諱力微元年嵗在庚子先是西部內侵依於沒鹿回部大人竇賔神元有雄傑之度後與賔攻西部賔軍敗失馬步走神元使以所乘駿馬給之賔歸求馬主帝隱而不言賔後知大驚將分國之半奉帝帝不受乃進其愛女賔猶思報恩乃從帝所欲徙所部北居長川積數年舊部人咸來歸附及賔臨終戒其二子使謹奉神元其子不從乃隂謀逆帝召殺之盡并其衆諸部大人悉服控弦之士二十餘萬三十九年遷於定襄之盛樂四月祭天諸部君長皆來助祭唯白部大人觀望不至徴而戮之逺近肅然帝乃告諸大人為與魏和親計四十二年遣子文帝如魏且觀風土是嵗魏景元二年也文帝諱沙漠汗以國太子留洛陽後文帝以神元春秋已髙求歸晉武帝具禮護送五十六年文帝復如晉其冬還國晉征北將軍衛瓘以文帝雄異恐為後患請留不遣復請以金錦賂國之大人令致間隙五十八年方遣帝神元使諸部大人詣隂館迎帝酒酣帝仰視飛鳥飛丸落之時國俗無彈衆大驚相謂曰太子被服同南夏兼竒術絶人若繼國統變易舊俗吾等必不得志乃謀危害帝並先馳還曰太子引空弓而落飛鳥似得晉人異法自帝在晉後諸子愛寵神元頗有所惑及聞諸大人請因曰當便除之於是諸大人馳詣塞南矯害帝其年神元不豫烏丸王庫賢親近任勢先受衛瓘之貨欲沮動諸部因於庭中礪鉞謂諸大人曰上恨汝曹讒殺太子欲盡收諸大人長子殺之大人皆信各各散走神元尋崩凡饗國五十八年年一百四嵗道武即位尊為始祖子章皇帝悉鹿立時諸部離散帝九年而崩弟平皇帝綽立七年而崩文帝少子思皇帝立思皇帝諱弗政崇寬簡百姓懷服一年而崩昭皇帝諱祿官神元帝之子也帝立九年分國為三部一居上谷北濡源西東接宇文部自統之一居代郡之參合陂北使文帝長子桓帝諱猗色統之一居定襄之盛樂故城使桓帝弟穆帝猗盧統之自神元以來與晉和好是嵗穆帝始出并州遷雜胡北徙雲中五原朔方又西度河擊丐奴烏丸諸部自杏城以北八十里迄長城原夾道立碣與晉分界二年葬文帝及皇后封氏初思帝欲改葬未果而崩至是述成前意焉三年桓帝度漠北巡因西略諸國凡積五嵗諸部降附者三十餘國桓帝英傑魁岸馬不能勝常乘安車駕大牛牛角容一石帝曽中蠱嘔吐之地仍生榆參合陂土無榆故時人異之十年丐奴别種劉淵反晉於離石自號漢王并州刺史司馬騰來乞師桓帝與帝大舉以助之大破淵衆於西河上黨桓帝與騰盟於汾東而還乃使輔相衛雄假繁於參合陂西纍石為亭樹碑以紀行焉十一年晉假桓帝大單于金印紫綬是嵗桓帝崩桓帝統部凡十一年後定襄侯衛操樹碑於大𨝍城以頌功德子普根代立十三年昭帝崩穆帝總攝三部為一統帝天姿英峙勇略過人元年劉淵僭帝號自稱大漢三年晉并州刺史劉琨遣子導為質乞師帝使弟子平文皇帝助琨破白部大人次攻鐡弗劉虎晉懷帝進帝大單于封代公帝以封邑去國縣逺從琨求句注陘北地琨大喜乃徙馬邑隂館樓煩繁畤崞五縣人於陘南更立城邑盡獻其地東接代郡西連西河朔方數百里帝乃徙十萬家以充之六年城盛樂以為北都修故平城以為南都帝登平城西山觀望地勢乃更南百里於灅水之陽黃瓜堆築新平城晉人謂之小平城使子六修鎮之統領南部八年晉愍帝進帝為代王置官屬食代常山二郡先是國俗寬簡至是明刑峻法諸部人多以違命得罪凡後期者皆舉部戮之或有室家相携悉赴死所人問何之曰當就誅其威嚴若此九年帝召六修不至怒討之失利遂崩普根先守外境聞難來攻六修滅之普根立月餘薨普根子始生桓帝后立之又薨思帝子平文皇帝立平文皇帝諱鬱律姿質雄壯甚有威略元年嵗在丁丑二年劉虎據朔方來侵西部帝大破之西兼烏孫故地東吞勿吉以西控弦士馬將百萬是嵗晉元帝即位於江南劉曜僭帝位帝聞晉愍帝為曜所害顧謂大臣曰今中原無主天其資我乎曜遣使請和帝不納三年石勒自稱趙王遣使乞和請為兄弟帝斬其使以絶之五年晉元帝遣使韓暢加崇爵服帝絶之講武有平南夏志桓帝后以帝得衆心恐不利己子害帝遂崩大人死者數十人天興初追尊曰太祖惠皇帝諱賀傉桓帝中子也以五年為元年帝未親政事太后臨朝遣使與石勒通和時人謂之女國使四年帝始臨朝以諸部人情未悉欵順乃築城於東木根山徙都之五年帝崩煬皇帝諱紇那惠帝之弟也以五年為元年三年石勒遣石虎寇邉部帝禦之不利遷於大寧時平文帝長子烈帝居於舅賀蘭部帝遣使求之賀蘭部帥藹頭擁護不遣帝怒召宇文部并力擊藹頭宇文衆敗帝還大寧五年帝出居於宇文部賀蘭及諸部大人共立烈帝烈皇帝諱翳槐以五年為元年石勒遣使求和帝遣弟昭成帝如襄國徙者五千餘家七年藹頭不修臣職召而戮之國人復二於是煬帝自宇文部還入諸部大人復奉之煬帝以烈帝七年為後元年時烈帝出居於鄴三年石虎納烈帝於大寧國人六千餘家部落叛煬帝出居於慕容部烈帝復立以煬帝三年為後元年城盛樂城在故城東南十里一年而崩弟昭成皇帝立昭成皇帝諱什翼犍平文皇帝之次子也生而竒偉寬仁大度身長八尺隆凖龍顔立髮委地卧則乳垂至席烈帝臨崩顧命迎帝曰立此人則社稷乃安故帝弟孤自詣鄴奉迎與帝俱還十一月即位於繁畤北始稱建國元年時年十九二年春始置百官分掌衆職東自濊貊西及破落那莫不欵附五月朝諸大人於參合陂議定都灅源川連日不決乃從太后計而止聘慕容皓妹為皇后三年春移都雲中之盛樂宫四年築盛樂城於故城南八里皇后慕容氏崩十月劉虎寇西境帝遣軍大破之虎死子務桓立始來歸順帝以女妻之五年五月幸參合陂七月七日諸部畢集設壇埒講武騎射因以為常八月還雲中七年二月遣大人長孫秩迎后慕容氏於和龍皓送女於境七月慕容皓遣使來聘求交婚帝許之以烈帝女妻焉十四年帝以中州紛梗將親率六軍乘石氏之亂廓定中原諸大人諫乃止十八年太后王氏崩十九年正月劉務桓死其弟閼頭立潛謀反二十一年閼頭部人多叛懼而東走度河半濟而冰陷後衆盡歸其兄子悉勿祈初閼頭之叛悉勿祈兄弟十二人在帝左右盡遣之歸欲其自相猜離至是悉勿祈奪其衆閼頭窮而歸命帝待之如初二十二年春帝東巡桑乾川四月悉勿析死弟衛辰立二十三年六月皇后慕容氏崩七月衛辰來會葬因求婚許之二十五年帝南巡君子津二十八年正月衛辰謀反度河東帝討之衛辰懼遁走三十年十月帝征衛辰時河冰未成帝乃以葦絙約澌俄然冰合乃散葦於上冰草相結若浮橋然衆軍利涉衛辰與宗族西走收其部落而還三十四年春長孫斤謀反伏誅斤之反也拔刃向御坐太子實格之傷脅五月薨後追諡焉是為獻明皇帝七月皇孫圭生大赦三十九年秦王苻堅遣其大司馬苻洛帥衆二十萬及其將朱彤張蚝鄧羌等諸道來寇王師不利帝時不豫乃率國人避於隂山之北髙車雜種盡叛四面寇鈔不得芻牧復度漠南堅軍稍退乃還十二月至雲中旬有二日皇子實君作亂帝暴崩時年五十七道武即位尊曰髙祖帝性寬厚時國少繒帛代人許謙盜絹二匹守者以告帝匿之謂燕鳯曰吾不忍視謙之面卿勿泄之謙或慙而自殺為財辱士非也帝嘗擊西部叛賊流矢中目賊破後諸大臣見執射者各持錐刀欲屠割之帝曰各為其主何罪也釋之其仁恕若此太祖道武皇帝諱圭昭成皇帝之嫡孫獻明帝之子也母曰獻明賀皇后初后因遷徙遊於雲澤寢夢日出室內寤而見光自牖屬天歘然有感以建國三十四年七月七日生帝於參合陂北其夜復有光明昭成大悅羣臣稱慶大赦告于祖宗保母以帝體重倍於常兒竊獨竒怪明年有榆生於藏胞之坎後遂成林帝弱而能言目有光矅廣顙大耳六嵗而昭成崩苻堅遣將內侮將遷帝長安賴燕鳯乃免堅軍既還國衆離散堅使劉庫仁劉衛辰分攝國事南部大人長孫嵩及元他等盡將故人衆南依庫仁帝於是轉在獨孤部元年葬昭成皇帝於金陵營梓宫木柿盡生成林帝雖沖幼而嶷然不羣劉庫仁常謂其子曰帝有高天下之志必興復洪業七年十月晉敗苻堅于淮南慕容文等殺劉庫仁弟眷代攝國部八年燕慕容暐弟沖僭立苻堅將姚萇自稱大單于萬年秦王慕容垂僭稱燕王九年劉庫仁子顯殺眷而代之乃將謀逆商人王霸知之履帝足於衆中帝乃馳還是時故大人梁盆子六眷為顯謀主盡知其計密使部人穆崇馳告帝乃隂結舊臣長孫犍元他等因幸賀蘭部其日顯果使人殺帝不及語在獻明太后傳是嵗乞伏國仁私署秦河二州牧大單于姚萇殺苻堅堅子丕僣即皇帝位於晉陽登國元年春正月戊申帝即代王位郊天建元大會於牛川復以長孫嵩為南部大人以叔孫普洛為北部大人是月慕容垂僭即皇帝位于中山國號燕二月幸定襄之盛樂息衆課農慕容沖為其部下所殺夏四月改稱魏王五月姚萇僭即皇帝位於長安國號大秦秋八月劉顯遣弟亢泥迎皇叔父窟咄于慕容永以兵隨之來逼南境帝左右于桓等與諸部大人謀應之事泄誅造謀者五人餘悉不問帝慮內難乃北踰隂山幸賀蘭部阻山為固遣行人安同長孫賀徴師于慕容垂垂令其子賀驎率師隨同等軍未至而寇逼於是北部大人叔孫普洛等十三人及諸烏丸亡奔衛辰帝自弩山幸牛川屯于延水南出代谷會賀驎於髙桞大破窟咄悉收其衆冬十月苻丕為晉將馮該所殺慕容永僭即皇帝位於長子十一月苻登僭即皇帝位於隴東十二月慕容垂遣使奉帝西單于印綬封上谷王帝不納二年夏五月遣行人安同徴兵於慕容垂垂遣子賀驎率衆來會六月帝親征劉顯顯奔慕容永盡收其部落冬十二月巡松漠還幸牛川三年夏五月癸亥北征庫莫奚大破之六月乞伏國仁死其弟乾歸立私署河南王秋七月庫莫奚部帥鳩集遺散夜犯行宫縱騎撲討盡滅之八月使九原公儀於慕容垂冬十月垂遣使朝貢四年春正月甲寅襲高車諸部落二月癸巳遂至女水討叱突鄰部並大破之是月吕光自稱三河王夏五月使陳留公虔於慕容垂冬十月垂遣使朝貢五年春三月甲申西征次鹿渾海襲髙車袁紇部大破之慕容垂遣子賀驎來會夏四月丙寅行幸意辛山與賀驎討賀蘭紇奚諸部落大破之秋八月還幸牛川使秦王觚於慕容垂九月壬申討叱奴部囊曲水破之冬十月討髙車豆陳部於狼山破之十二月帝還次白漠六年春正月幸紐垤川三月遣九原公儀陳留公虔等西討黜弗部大破之夏四月祭天秋七月壬申講武于牛川慕容垂止秦王觚而求名馬帝絶之乃遣使於慕容永永使其大鴻臚慕容鈞奉表勸進尊號九月帝襲五原屠之收其積榖還紐垤川於棝陽塞北樹碑紀功冬十月戊戍北征蠕蠕追破之於大磧南商山下十一月戊辰還幸紐垤川戊寅衛辰遣子直力鞮寇南部壬午帝大破之於鐡岐山南衛辰父子奔遁十二月滅之衛辰少子屈丐亡奔薛干部自河以南諸部悉平收衛辰子弟宗黨無少長五千餘人盡殺之是嵗起河南宫七年春正月幸木根山遂次黑鹽池饗羣臣北之美水三月還幸河南宫秋七月行幸漠南仍築巡臺冬十二月慕容永遣使朝貢八年春正月南巡二月幸羖羊原赴白樓夏六月北巡秋七月臨幸新壇先是衛辰子屈丐奔薛干部徴之不送八月帝南征薛干部屠其城九月還幸河南宫九年春三月北巡使東平公儀屯田於河北五原至於棝陽塞外夏五月田於河東秋七月還幸河南宫冬十月蠕蠕杜崙等率部落西走是嵗姚萇子興僣位殺苻登慕容垂滅永十年秋七月慕容垂遣其子寶來寇五原八月帝親兵於河南冬十月辛未寶燒船夜遁己邜帝進軍濟河乙酉夕至參合陂丙戍大破之禽其王公以下文武將吏數千人於俘虜中擢其才識者賈彝賈閏鼂崇等參謀議憲章故實十二月還幸雲中之盛樂皇始元年春正月大搜于定襄因東幸善無北陂三月慕容垂寇桑乾川陳留公虔死之垂遂至平城西北聞帝將至乃築城自守疾甚遂遁死於上谷子寶祕喪還至中山乃僭立夏六月丁亥皇太后賀氏崩是月葬獻明太后吕光僭稱天王國號涼秋七月左司馬許謙上書勸進尊號於是改元始建天子旌旗出警入蹕八月己亥大舉討慕容寶帝親勒六軍四十餘萬南出馬邑踰句注旌旗絡繹二千餘里鼓行而前人屋皆震别詔將軍封真等從東道襲幽州圍薊九月戊午次陽曲乘西山臨觀晉陽寶并州牧遼西王農棄城遁并州平初建臺省置百官封拜公侯將軍刺史太子尚書郎以下悉用文人帝初拓中原留心慰納諸士大夫詣軍門者無少長皆引入人得盡言茍有微能咸蒙敘用己未詔輔國將軍奚牧略地晉川獲慕容寶丹陽王買得等於平陶城九月晉孝武帝殂冬十一月庚子朔帝至真定自常山以東守宰或捐城奔竄或稽顙軍門唯中山鄴信都三城不下别詔東平公儀攻鄴冠軍將軍王建左軍將軍李栗等攻信都詔軍行不得傷桑棗戊午進軍中山己未圍之帝曰朕量寶不能出戰必憑城自守急攻則傷士卒久守則費糧不如先平鄴信都然後還取中山諸將稱善丁卯車駕幸魯口城二年春正月壬戍帝引騎圍信都其夜寶冀州刺史宜都王慕容鳯踰城奔中山癸亥寶輔國將軍張驤護軍將軍徐超舉城降是月鮮卑秃髮烏孤私署大單于西平王二月丁丑帝軍于巨鹿之柏肆塢臨滹沱水其夜寶悉衆犯營燎及行宫兵人駭散帝驚起不及衣冠跣出擊鼓俄而左右及中軍將士稍集帝設竒陳列烽營外縱騎衝之寶衆大敗走還中山獲其器械數十萬計寶尚書閔亮祕書監崔逞等降者相屬賜拜職爵各有差三月己酉車駕次盧奴寶求和請送秦王觚割常山以西奉魏乞守中山以東帝許之已而寶背約辛亥車駕次中山命將圍之是夜寶弟賀驎將妻子走西山寶恐賀驎先據和龍壬子夜北遁城內共立慕容普鄰為王夏四月帝以軍糧不繼詔東平公儀罷鄴圍徙屯巨鹿五月庚子帝以中山城內為普鄰所脅乃招喻之甲辰曜兵揚威以示城內命諸軍罷圍南徙以待其變甲寅以東平公儀為左丞相封衛王進襄城公題爵為王秋七月普鄰遣烏丸張􅋮率五千餘人出城求食寇靈夀賀驎自丁零中入驤軍因其衆復入中山殺普鄰而自立八月丙寅朔帝進軍九門時大疫人馬牛死者十五六中山猶拒守羣下咸思北還帝知之謂曰斯固天命將若之何四海之人皆可與為國在吾所以撫之耳何恤乎無人羣臣乃不敢言九月賀驎飢窮率三萬餘人寇新市甲子晦帝進軍討之太史令鼂崇奏曰不吉帝曰何也對曰紂以甲子亡兵家忌之帝曰周武不以甲子勝乎崇無以對冬十月丙寅帝進軍新市賀驎退阻𣲖水依漸洳澤以自固甲戍帝臨其營戰於義臺塢大破之賀驎單馬走鄴慕容德殺之甲申賀驎所署公卿尚書將吏士卒降者二萬餘人其將張􅋮李沈慕容文等先來降尋皆亡還是日復獲之皆赦而不問獲所傳皇帝璽綬圖書府庫珍寶中山平乙酉襄城王題薨天興元年春正月慕容德走保滑臺衛王儀尅鄴庚子行幸真定駕還幸鄴百姓有老病不能自存者詔郡縣振恤之帝至鄴巡登臺榭遍覽宫城將有定都之志乃置行臺遂還中山所過存問百姓詔大軍所經州郡皆復資租一年除山東人租賦之半車駕將北還發卒萬人通直道自望都鐡關鑿恆嶺至代五百餘里帝慮還後山東有變乃於中山置行臺詔衛王儀鎮之使略陽公遵鎮勃海之合口右軍將軍尹國先督租于冀州聞帝將還謀反欲襲信都安南將軍長孫嵩執送斬之辛酉車駕發中山至于望都堯山徙山東六州人吏及徒河高麗新夷三十六署百工伎巧十餘萬口以充京師車駕次于恆山之陽博陵勃海章武諸郡羣盜並起略陽公遵等討之是月慕容德自稱燕王據廣固二月車駕至自中山幸繁畤宫更選屯衛詔給內徙新户耕牛計口受田三月徴左丞相衛王儀還京師詔略陽公遵代鎮中山夏四月壬戍以歷陽公穆崇為太尉巨鹿公長孫嵩為司徒進封略陽公遵為常山王南安公順為毗陵王祭天於西郊旗幟有加焉廣平太守遼西公意列謀反與郡人韓竒矯假讖圖將襲鄴城詔反者就郡賜死是月蘭汗殺慕容寶而自立為大單于昌黎王六月丙子詔有司議定國號羣臣奏曰昔周秦以前帝王居所生之上及王天下即承為號今國家啓基雲代應以代為號詔曰昔朕逺祖總御幽都控制遐國雖踐王位未定九州逮于朕躬掃平中土凶逆蕩除遐邇率服宜仍先號為魏秋七月還都平城始營宫室建宗廟立社稷慕容寶子盛殺蘭汗而自立為長樂王八月詔有司正封畿制郊甸端徑術􅎎道里平五權較五量定五度遣使循行郡國舉奏守宰不法者親覽察黜陟之冬十月起天文殿十一月辛亥尚書吏部郎中鄧彥海典官制正爵品定律吕協音樂儀曹郎中董謐撰郊廟社稷朝覲饗宴之儀三公郎中王德定律令申科禁太史令鼂崇造渾儀考天象吏部尚書崔宏總裁之閏月左丞相衛王儀及王公卿士詣闕上書曰臣等聞宸極居中則列宿齊其晷帝王順天則羣后仰其度伏惟陛下德協二儀道隆三五仁風被于四海盛化塞于天區澤及昆蟲恩霑行葦謳歌所屬八表歸心而躬履謙虛退身後己宸儀未彰衮服未御非所以上允皇天之意下副樂推之心臣等謹昧死以聞帝三讓乃許之十二月己丑帝臨天文殿太尉司徒進璽綬百官咸稱萬嵗大赦改元追尊成帝以下及后號諡樂用皇始之舞詔百司議定行次尚書崔宏等奏從土德服色尚黃數用五祖以未臘以辰犧牲用白五郊立氣宣贊時令敬授人時行夏之正徙六州二十二郡守宰豪傑吏人二千家于代都二年春正月甲子初祀上帝于南郊以始祖神元皇帝配降壇視燎成禮而反乙丑赦京師始制三駕之法庚子北巡分命諸將大襲高車常山王遵三軍從東道出長川高原王樂真等七軍從西道出牛川車駕親勒六軍從中道自駮髯水西北出二月丁亥朔諸軍同會破高車雜種三十餘部衛王儀督三將别從西北絶漠千餘里破其遺迸七部還次牛川及薄山並刻石紀功以所獲髙車衆起鹿苑於南臺隂北距長城東苞白登屬之西山廣輪數十里鑿渠引武川水注之苑中疏為三溝分流宫城內外又穿鴻鴈池三月己未車駕至自北伐甲子初令五經羣書各置博士增國子太學生員三千人是月氐人李辨叛慕容德求援於鄴行臺尚書和跋以輕騎應之尅滑臺收德宫人府藏秋七月起天華殿辛酉大閲于鹿苑八月增啓京城十二門作西武庫除州郡人租賦之半辛亥詔禮官備撰衆儀著于新令范陽人盧溥聚衆海濵稱幽州刺史攻掠郡縣殺幽州刺史封沓于是月秃髮烏孤死其弟利鹿孤立遣使朝貢冬十月太廟成遷神元平文昭成獻明皇帝神主于太廟十二月天華殿成吕光立其子紹為天王自稱太上皇及死庶子纂殺紹而僭立三年春正月戊午材官將軍和突破盧溥於遼西獲之及其子煥傳送京師轘之癸亥祀北郊分命諸官循行州郡觀風俗察舉不法二月丁亥詔有司祀日于東郊始耕籍田壬寅皇子聰薨三月戊午立皇后慕容氏是月穿城南渠通於城內作東西魚池夏四月姚興遣使朝貢五月戊辰詔謁者僕射張濟使於姚興己巳東巡遂幸涿鹿遣使者以太牢祀帝堯帝舜廟西幸馬邑觀灅源六月庚辰朔日有蝕之秋七月乞伏乾歸大為姚興所破壬子車駕還宫起中天殿及雲母堂金華室時太史屢奏天文錯亂帝親覽經占多云宜改王易政於是數革官號欲以防塞凶狡消弭災變已而慮臣下疑惑冬十二月丙申下詔述成敗之理鑒殷周之失革秦漢之弊以喻臣下是嵗河右諸郡奉李皓為秦涼二州牧涼公四年春二月丁亥命樂師入學習儛釋菜于先聖先師丁酉分命使者巡行州郡聼察辭訟紏劾不法是月吕光弟子隆弒吕纂而自立三月帝親漁薦于寢廟夏四月辛卯罷鄴行臺詔有司明揚隱逸五月起紫極殿元武樓涼風觀石池鹿苑臺六月盧水胡沮渠蒙遜私署涼州牧張掖公秋七月詔兗州刺史長孫肥南徇許昌彭城詔賜天下鎮戍將士布帛各有差八月假興殺慕容盛盛叔父熙盡誅段氏僣即皇帝位冬十二月集博士儒生比衆經文字義類相從凡四萬餘字號曰衆文經是嵗涼李皓沮渠蒙遜並遣使朝貢五年春正月帝聞姚興將寇邉庚寅大簡輿徒詔并州諸軍積榖于平陽乾壁三月秃髮利鹿孤死夏五月姚興遣其弟義陽王平來侵平陽攻陷乾壁秋七月戊辰朔車駕西討八月乙巳至乾壁平固守進軍圍之姚興悉舉其衆來救甲子帝度蒙坑逆擊興軍大破之冬十月平赴水而死俘其餘衆三萬餘人獲興尚書左僕射狄伯支以下四品將軍以上四十餘人獲前亡臣王次多靳勒並斬以徇興頻使請和帝不許羣臣請進平蒲坂帝慮蠕蠕為難戊申班師十一月車駕次晉陽徴相州刺史庾嶽為司空十二月辛亥至自西征越勒莫弗率其部萬餘家內屬六年春正月辛未朔方尉遲部别帥率萬家內屬入居雲中夏四月癸巳朔日有蝕之五月大簡輿徒將略江淮秋七月鎮西大將軍司𨽻校尉毗陵王順有罪以王還第戊子北巡築離宫于豺山縱士校獵東北踰罽嶺出參合代谷九月行幸南平城規度灅南夏屋山背黃瓜堆將建新邑辛未車駕還宫冬十月起西昭陽殿乙卯立皇子嗣為齊王加車騎大將軍位相國紹為清河王加征南大將軍熙為陽平王曜為河南王封故秦愍王子夔為豫章王陳留桓王子悅為朱提王丁巳晉人來聘十一月庚子將軍伊謂大破高車十二月晉桓元廢其主司馬德宗為平固王而自立僣號楚天賜元年春二月晉劉裕起兵誅桓元三月初限縣户不滿百罷之夏五月置山東諸治發州郡徒謫造兵甲秋九月帝臨昭陽殿分置衆職引朝臣文武親自簡擢量能敘用制爵四等曰王公侯子除伯男之號追録舊臣加封爵各有差是秋江南大亂流人襁負奔淮北者行道相尋冬十月辛巳大赦改元築西宫十一月幸西宫大選臣寮令各辨宗黨保舉才行諸部子孫失業賜爵者二千餘人二年春正月晉主司馬德宗復位夏四月祀西郊車旗盡黑冬十月慕容德死三年春正月甲申北巡幸豺山宫校獵還至屈孤山二月乙亥幸代園山建五石亭三月庚子車駕還宫夏四月庚申復幸豺山宫占授著作郎王宜弟造兵法孤虛立成圖三百六十時遂登定襄角史山又幸馬城甲戍車駕還宫六月發八部五百里內男丁築灅南宫門闕高十餘丈引溝穿池廣苑囿規立外城方二十里分置市里經途洞逹三十日罷秋七月太尉穆崇薨八月甲辰行幸豺山宫遂至青牛山丙辰西登武要北原觀九十九泉造石亭遂之石漠九月甲戍朔幸漠南鹽池壬午至漠中觀天鹽池度漠北之吐鹽池癸巳南還長川丙申臨觀長陂冬十月庚申車駕還宫四年春二月封皇子修為河間王處文為長樂王連為廣平王黎為京兆王夏五月北巡自參合陂東過蟠羊山大雨暴水流輜重數百乘殺百餘人遂東北踰石漠至長川幸濡源常山王遵有罪賜死六月赫連屈丐自稱大單于大夏天王秋七月西幸參合陂築北宫垣三旬而罷乃還宫慕容寶飬子高雲殺慕容熙而自立僣號天王八月誅司空庾嶽五年春正月行幸豺山宫遂如參合陂觀漁于延水至寧川三月姚興遣使朝貢秋七月戊戍朔日有蝕之冬十月秃髮傉檀僣即涼王位六年夏帝不豫初帝服寒食散自太醫令隂羌死後藥數動發至此愈甚而災變屢見憂悶不安或數日不食或不寢逹旦歸咎羣下喜怒乖常謂百寮左右不可信慮如天文之占或有肘腋之虞追思既往成敗得失終日竟夜獨語不止若傍有鬼物對揚者朝臣至前追其舊惡便見殺害其餘或以顔色變動或以喘息不調或以行步乖節或以言辭失措帝以為懷惡在心變見於外乃手自毆擊死者皆陳天安殿前於是朝野人情各懷危懼有司廢怠莫相督攝百工偷劫盜賊公行巷里之間人為稀少帝亦聞之曰朕故縱之使然幸過災年當更清整之耳秋七月慕容氏支屬百餘家謀欲外奔發覺伏誅死者三百餘人八月衛王儀謀叛賜死十月戊辰清河王紹作亂帝崩於天安殿時年三十九永興二年九月甲寅上諡曰宣武皇帝葬於盛樂金陵廟號太祖泰恆五年改諡曰道武帝道武九年始稱年號登國十年皇始二年天興六年天賜六年即位三十二年太宗明元皇帝諱嗣道武皇帝之長子也母曰劉貴人登國七年生於雲中宫道武晚有男聞而大悅乃大赦帝明睿寬毅非禮不動天興六年封齊王拜相國初帝母既賜死道武召帝告曰昔漢武將立其子而殺其母不令婦人與國政汝當繼統故吾遠同漢武帝素純孝哀不自勝道武怒帝還宫哀不自止道武知而又召帝帝欲入左右諫請待和解而進帝從之及元紹之逆帝還而誅之永興元年冬十月壬午皇帝即位大赦改元追尊皇妣為宣穆皇后公卿大臣先罷歸第者悉復登用之詔南平公長孫嵩北新侯安同對理人訟簡賢任能是月馮跋殺其主高雲僣號天王國號北燕閏十月丁亥朱提王悅謀反賜死詔都兵將軍山陽侯奚斤巡諸州問人疾苦十二月戊戍封衛王儀子良為南陽王進隂平公烈爵為王改封高涼王樂真為平陽王己亥帝始居西宫御天文殿蠕蠕犯塞是嵗乞伏乾歸自稱秦王二年春正月甲寅朔詔南平公長孫嵩等北征蠕蠕因留屯漠南夏五月嵩等自大漠還蠕蠕追圍之於牛川壬申帝北伐蠕蠕蠕蠕聞而遁走車駕還幸參合陂六月晉將劉裕滅慕容起秋七月丁巳立射臺於陂西仍講武乙丑至自北伐三年春二月戊戍詔簡宫人非御及伎巧者悉以賜鰥人己亥詔北新侯安同等持節巡行并定二州及諸山居雜胡丁零問其疾苦察舉守宰不法者辛丑簡宫人工伎之不急者出賜人不能自存者三月己未詔侍臣常佩劒夏五月丙寅復出宫人賜鰥人辛卯車駕謁金陵於盛樂己巳昌黎王慕容伯兒謀反伏誅六月姚興遣使朝貢秋七月戊申賜衛士酺三日冬十一月丁未大閲于東郊四年春二月癸未登虎圈射猛虎夏四月乙未宴羣臣於西宫使各獻直言勿有所諱六月乞伏乾歸為兄子公府所弒閏月丙辰大閲于東郊秋七月己巳朔東巡置四廂大將又放十二時置十二小將以山陽侯奚斤元城公屈行左右丞相己卯大獮于石會山戊子臨去畿陂觀漁庚寅至于濡源西巡幸北部諸落八月壬子幸西宫臨板殿大饗羣臣命百姓大酺三日乙卯賜王公以下至宿衛將士布帛有差冬十一月己丑賜宗室近屬南陽王良以下至於緦麻親布帛各有差是月沮渠蒙遜僭稱西河王十二月丁巳北巡至長城而旋五年春正月己巳大閲畿內男年十二以上悉集己邜幸西宫頞拔大渠帥四十餘人詣闕奉貢賜以繒帛錦罽各有差乙酉詔諸州六十户出戎馬一匹庚寅大閲于東郊署將帥以山陽侯奚斤為前軍衆三萬陽平王熙等十二將各一萬騎帝臨白登躬自校覽二月庚戍幸高桞川癸丑穿魚池於北苑庚午姚興遣使朝貢己卯詔使者巡行天下招延雋彥搜揚隱逸夏四月乙邜西巡五月乙亥行幸雲中舊宫之大室丙子大赦六月西幸五原校獵于骨羅山獲獸十萬秋七月己巳還幸薄山帝登觀宣武遊幸刻石頌德之處乃於其旁起石壇而薦饗焉賜從者大酺於山下前軍奚斤等破越勒倍泥部於跋那山西徙二萬餘家而旋丙戍車駕自大室西南巡諸部落遂南次定襄大洛城東踰七嶺山田于善無川八月癸邜車駕還宫癸丑奚斤等班師甲寅帝臨白登山觀降人數軍實置新人於大寧給農器計口受田冬十一月癸酉大饗于西宫姚興遣使朝貢請進女帝許之神瑞元年春正月辛酉以禎瑞頻集大赦改元辛巳行幸繁畤賜王公以下至于士卒百工布帛各有差二月戊戍車駕還宫乙邜起豐宫於平城東北夏六月乞伏熾磐滅秃髮傉檀秋七月晉將朱齡石滅蜀八月戊子詔馬邑侯元陋孫使於姚興姚興遣使朝貢九月丁巳朔日有蝕之冬十一月壬午詔使者巡行諸州校閲守宰資財非自家所齎悉簿為贓守宰不如法聼百姓詣闕告之十二月丙戍朔蠕蠕犯塞丙申車駕北伐二年春正月丙辰車駕至自北伐二月丁亥大饗于西宫甲辰立宣武廟于白登西三月丁丑詔以刺史守宰率多逋惰今年資調縣違者謫出家財以充不聼徴發於人夏四月晉人來聘己邜北巡五月丁亥次於參合東幸大寧丁未田于四岬山六月戊午臨去畿陂觀漁辛酉次于濡源立蚌臺遂射白熊於頽牛山獲之丁邜幸赤城親見長老問民疾苦復租一年南次石亭幸上谷問百年訪賢雋復田租之半壬申幸涿鹿登嶠山觀溫泉使以大牢祠黃帝唐堯廟癸酉幸廣寧事如上谷乙邜登廣寧之歷山以太牢祠舜廟帝親加禮焉庚辰幸代秋七月癸未車駕還宫復所過田租之半八月庚辰晦日有蝕之九月京師人飢聼就食山東冬十月壬子姚興使奉其西平公主至帝以后禮納之辛酉行幸沮洳城癸亥車駕還宫丙寅詔以頻遇霜旱年榖不登命出布帛倉榖以振貧窮泰常元年春二月丁未姚興死三月己丑長樂王處文薨夏四月壬子大赦改元庚申河間王修薨五月甲申彗星二見六月丁巳北巡秋七月甲申大獵于牛川發釡山臨殷繁水南觀于九十九泉戊戍車駕還宫辛亥晦日有蝕之九月晉劉裕溯河伐姚泓遣部將王仲德從陸道至梁城兖州刺史尉建畏懦棄守北渡仲德遂入滑臺詔將軍叔孫建等度河耀威斬尉建於城下冬十一月戊寅起蓬臺于北苑十二月南陽王良薨二年春正月甲戍朔日有蝕之二月丙午詔使者巡行天下觀風俗問其所苦是月西涼李皓死五月西巡至雲中遂濟河田于大漠秋七月乙亥車駕還宫乙酉起白臺於城南髙二十丈是月晉劉裕滅姚泓冬十月癸丑豫章王夔薨十一月己酉詔河東河內購泓子弟播越人間者三年春三月晉人來聘庚戍幸西宫以渤海范陽郡去年大水復其租稅夏四月己巳徙冀定幽三州徒河於京師五月壬子東巡至濡源及甘松遣征東將軍長孫道生帥師襲馮跋遂至龍城徙其居人萬餘家而還秋七月戊午車駕至京師八月鴈門河內大雨水復其租稅冬十月戊辰築宫於西苑十一月赫連屈丐尅長安十二月晉安帝殂四年春正月壬辰朔車駕臨河大搜于犢渚癸邜還宫二月赫連屈丐僣即皇帝位癸丑築宫於蓬臺北夏四月庚辰享東廟逺蕃助祭者數百國辛巳南巡幸鴈門賜所過無出今年租賦五月庚寅朔觀漁于灅水己亥車駕還宫秋八月辛未東巡遣使祠恆嶽甲申車駕還宫賜所過無出今年田租九月甲寅築宫於白登山冬十一月丁亥朔日有蝕之十二月癸亥西巡至雲中踰白道北獵野馬於辱孤山至於黃河從君子津西度大狩於薛林山五年春正月丙戍朔自薛林東還至屋竇城饗勞將士大酺二日班禽以賜之己亥車駕還宫三月丙戍南陽王意文薨夏四月丙寅起灅南宫五月乙酉詔曰宣武皇帝體得一之元逺應自然之沖妙大行大名未盡盛美今啓緯圖始覩尊號其更上尊諡曰道武皇帝以章靈命之先啓聖德之元同庚戍淮南侯司馬國璠池陽侯司馬道賜等謀反伏誅六月丙寅幸翳犢山是月晉恭帝禪位于宋秋七月丁酉西至五原丁未幸雲中大室賜從者大酺八月癸亥車駕還宫閏月甲午隂平王烈薨是嵗西涼亡六年春二月己亥詔天下户二十輸戎馬一匹大牛一頭三月甲子陽平王熙薨乙亥制六部人羊滿百口者調戎馬一匹發京師六千餘人築苑起自舊苑東苞白登周回四十餘里夏六月乙酉北巡至於蟠羊山秋七月乙邜車駕還宫癸酉西巡獵于祚山親射猛獸獲之遂至于河八月庚子大獮于犢渚九月庚戍車駕還宫壬申宋人來聘冬十月己亥行幸代十二月丙申西巡于雲中七年春正月甲辰朔自雲中西幸屋竇城賜從者大酺三日二月丙戍車駕還宫三月乙丑河南王曜薨夏四月甲戍封皇子燾為太平王拜相國加大將軍丕為樂平王加車騎大將軍彌為安定王加衛大將軍範為樂安王加中軍大將軍健為永昌王加撫軍大將軍崇為建寧王加輔國大將軍俊為新興王加鎮軍大將軍獻懷長公主子稽敬為長樂王拜大司馬大將軍初帝服寒食散頻年發動不堪萬機五月立太平王燾為皇太子臨朝聼政是月宋武帝殂秋九月詔司空奚斤等帥師伐宋乙巳幸灅南宫遂如廣寧己酉詔皇太子率百國以法駕田于東苑車乘服物皆以乘輿之副辛亥築平城外郭周回三十二里辛酉幸嶠山遣使者祠黃帝唐堯廟因東幸幽州見耆年問其所苦賜以爵號分遣使者巡行州郡觀察風俗冬十月甲戍車駕還宫復所過田租之半奚斤等濟河攻滑臺不拔求濟師帝怒不許議親南征為其聲援壬辰南巡出自天門關踰恆嶺四方蕃附大人各帥所部從者五萬餘人十一月皇太子親統六軍鎮塞上安定王彌與北新公安同居守丙午曲赦司州殊死以下丙辰次於中山問民疾苦十二月丙戍行幸冀州存問民俗遣夀光侯叔孫建等率衆自平原東度徇下青兖諸郡八年春正月丙辰行幸鄴存問風俗司空奚斤既平兖豫還圍虎牢宋守將毛德祖距守不下蠕蠕犯塞二月戊辰築長城於長川之南起自赤城西至五原延袤二千餘里備置戍衛三月乙邜濟自靈昌夏四月丁邜幸成臯觀虎牢而城內乏水縣綆汲河帝令連艦上施轒輼絶其汲路又穿地道以奪其井丁丑幸洛陽觀石經閏月丁未還幸河內北登太行幸髙都己未虎牢潰士衆大疫死者十二三辛酉幸晉陽班賜王公以下至於厮役五月丙寅還次鴈門皇太子率留臺王公迎于句注之北庚寅車駕至自南巡六月己亥太尉宜都公穆觀薨丙辰北巡至參合陂秋七月幸三會屋侯泉詔皇太子率百官以從八月幸馬邑觀于灅源九月乙亥車駕還宫冬十月癸邜廣西宫起外牆周回二十里是嵗飢詔所在開倉振給十一月己巳帝崩於西宫時年三十二遺詔以司空奚斤所獲軍實賜大臣自司徒長孫嵩以下至於士卒各有差十二月庚子上諡曰明元皇帝葬于雲中金陵廟稱太宗帝兼資文武禮愛儒生好覽史傳以劉向所撰新序説苑於經典正義多有所闕乃撰新集三十篇採諸經史該洽古義云明元帝永興五年神瑞二年泰恆八年即位十五年世祖太武皇帝諱燾明元皇帝之長子也母曰杜貴嬪天賜五年生於東宫體貌瓌異道武竒之曰成吾業者必此兒也泰常七年四月封太平王五月立為皇太子及明元帝疾命帝總攝百揆帝聰明大度意豁如也八年十一月己巳明元帝崩壬申太子即皇帝位大赦天下十二月追尊皇妣為密皇太后進司徒長孫嵩爵為北平王司空奚斤為宜城王藍田公長孫翰為平陽王其餘普增爵位各有差於是除禁錮釋嫌疑開倉庫振窮乏河南流人相率內屬者甚衆始光元年春正月丙寅安定王彌薨夏四月甲辰東巡幸大寧六月宋徐羡之弒其主義符秋七月車駕還宫八月蠕蠕六萬騎入雲中殺略人吏攻陷盛樂帝帥輕騎討之虜乃退走九月大簡輿徙於東郊將北討冬十二月遣平陽王長孫翰等討蠕蠕車騎次祚山蠕蠕北遁諸軍追之大獲而還二年春正月己邜車駕至自北伐三月丙辰尊保母竇氏曰保太后丁巳以北平王長孫嵩為太尉平陽王長孫翰為司徒宜城王奚斤為司空庚申營故東宫為萬夀宫起永安安樂二殿臨望觀九華堂初造新字千餘夏四月詔龍驤將軍步堆使宋五月詔天下十家發大牛一頭運粟塞上秋八月赫連屈丐死九月永安安樂二殿成丁邜大饗以落之冬十月癸邜車駕北伐東西五道並出平陽王長孫翰等絶漠追寇蠕蠕北走三年春正月壬申車駕至自北伐乞伏熾磐遣使朝貢請討赫連昌二月起大學於城東祀孔子以顔回配夏五月辛邜進中山公纂爵為王復南安公素先爵常山王六月幸雲中舊宫謁陵廟西至五原田於隂山東至和兜山秋七月築馬射臺于長川帝親登臺走馬王公諸國君長馳射中者賜金錦繒絮各有差八月車駕還宫宋人來聘帝以赫連屈丐死諸子相攻冬十月丁巳車駕西伐幸雲中臨君子津會天暴寒數日冰合十一月戊寅率輕騎襲赫連昌壬午徙萬餘家而還至祚山班虜獲以賜將士各有差十二月詔奚斤西據長安秦隴氐羌皆叛昌詣斤降武都王楊元及沮渠蒙遜等使使內附四年春正月乙酉車駕至自西伐賜留臺文武各有差從人在道多死到者裁十六七己亥行幸幽州赫連昌遣其弟定向長安帝聞之遣就隂山伐木造攻具二月車駕還宫三月丙午詔執金吾桓貸造橋於君子津丁丑廣平王連薨夏四月丁未詔員外散騎常侍步堆使於宋五月車駕西討赫連昌次拔鄰山築城舍輜重以輕騎三萬先行戊戍至黑水帝親祈天告祖宗之靈而誓衆六月癸邜朔日有蝕之甲辰大破赫連昌昌奔上邽乙巳車駕入城虜昌羣弟及其母妹妻妾宫人萬數府庫珍寶車旗器物不可勝計辛酉班師留常山王素執金吾桓貸鎮統萬秋七月己邜築壇於祚嶺戲馬馳射賜中者金帛繒絮各有差蠕蠕寇雲中聞破赫連昌懼而逃八月壬子車駕至自西伐飲至䇿勳告宗廟班軍實以賜留臺百寮各有差冬十一月以氐王楊元為假征南大將軍都督梁州刺史南秦王十二月行幸中山守宰貪汚免者十數人癸邜車駕還宫復所過田租之半神麚元年春正月以天下守令多非法精選忠良悉代之辛未京兆王黎薨二月改元司空奚斤進軍安定監軍侍御史安頡出戰禽昌其餘衆立昌弟定為主走還平涼三月辛巳侍中古弼送赫連昌至于京師司空奚斤追赫連定於平涼馬髦嶺為定所禽將軍邱堆先在安定聞斤敗東走長安帝大怒詔頡令斬之夏四月赫連定遣使朝貢壬子西巡戊午田于河西大赦南秦王楊元遣使朝貢五月乞伏熾磐死秋八月東幸廣寧臨觀溫泉以太牢祭黃帝堯舜廟九月車駕還宫冬十一月乙未朔日有蝕之是月行幸河西大校獵十二月甲申車駕還宫二年夏四月宋人來聘庚寅車駕北伐五月丁未次于沙漠舍輜重輕騎兼冀馬至栗水蠕蠕震怖焚廬舍遁迹西走冬十月振旅凱旋于京師告于宗廟列置新人于漠南東至濡源西暨五原隂山竟三千里十一月西巡田于河西至祚山而還三年春正月庚子車駕還宫壬寅大赦癸邜行幸廣寧臨溫泉作溫泉歌二月丁邜司徒平陽王長孫翰薨戊辰車駕還宫三月壬寅進會稽公赫連昌為秦王夏四月甲子行幸雲中敕勒萬餘家叛走詔尚書封鐡追滅之五月戊午論討敕勒功大明賞罰秋七月己亥詔諸征鎮將軍王公仗節邉逺者聼開府辟召其次增設吏員庚子詔大鴻臚卿杜超假節都督冀定相三州諸軍事行征南大將軍太宰進爵為王鎮鄴為諸軍節度八月宋將到彥之自清水入河泝流西行丙寅彥之遣將度河攻蒲坂冠軍將軍安頡督諸軍擊破之九月癸邜立密皇太后廟于鄴甲辰行幸統萬遂征平涼是月馮跋死冬十月乙邜冠軍將軍安頡濟河攻洛陽甲子拔之辛巳安頡平虎牢十一月乙酉車駕至平涼己亥行幸安定庚子帝自安定還臨平涼遂掘塹圍守之行幸紐城安慰初附赦秦隴之人賜復十年辛酉安頡帥諸軍攻滑臺沮渠蒙遜遣使朝貢壬寅封夀光侯叔孫建為丹陽王十二月丁邜赫連定弟杜于度洛孤面縛出降平涼收其珍寶定長安臨晉武功守將皆遁走關中平壬申車駕還東留巴東公延普等鎮安定四年春正月壬午車駕次木根山大饗羣臣丙申宋將檀道濟王仲德從清水救滑臺丹陽王叔孫建汝隂公長孫道生拒之道濟等不敢進是月赫連定滅乞伏慕末二月辛酉安頡司馬楚之尅滑臺癸酉車駕還宫飲至䇿勳告于宗廟賜留臺百官各有差青土賜復十年定州人飢詔開倉以振之宋將檀道濟王仲德東走三月庚戍冠軍將軍安頡獻宋俘萬餘人甲兵三萬夏六月赫連定北襲沮渠蒙遜為吐谷渾慕璝所執閏月乙未蠕蠕國遣使朝貢詔散騎侍郎周紹使于宋秋七月己酉行幸河西起承華宫八月乙酉沮渠蒙遜遣子安周入侍吐谷渾慕璝遣使奉表請送赫連定己丑以慕璝為大將軍封西秦王九月癸丑車駕還宫庚申加太尉長孫嵩柱國大將軍以左光祿大夫崔浩為司徒征西大將軍長孫道生為司空癸亥詔兼太常李順持節拜西河王沮渠蒙遜為假節加侍中都督涼州持節及西域羌戎諸軍事行征西大將軍太傅涼州牧涼王壬申詔曰范陽盧元博陵崔綽趙郡李靈河間邢頴勃海高允廣平遊雅太原張偉等皆賢俊之胄冠冕州邦有羽儀之用易曰我有好爵吾與爾縻之如元之比隱迹衡門不曜名譽者盡敕州郡以禮發遣遂徴元等州郡所遣至者數百人皆差次敘用冬十月戊寅詔司徒崔浩改定律令行幸漠南十一月丙辰北部敕勒莫弗庫若干率其部數萬騎驅鹿獸數百萬詣行在所帝因而大狩以賜從者勒石漠南以紀功德宜城王奚斤坐事降爵為公十二月車駕還宫延和元年春正月丙午尊保太后為皇太后立皇后赫連氏以皇子晃為皇太子謁于太廟大赦改元三月丁未追贈夫人賀氏為皇后壬申西秦王吐谷渾慕璝送赫連定於京師夏五月宋人來聘六月庚寅車駕伐和龍詔尚書左僕射安原等屯于漠南以備蠕蠕辛邜詔兼散騎常侍鄧頴使於宋秋七月己巳車駕至和龍穿塹以守之是月築東宫九月乙邜車駕西還徙營邱成周遼東樂浪帶方元莵六郡人三萬家于幽州開倉以振之冬十月吐谷渾慕璝遣使朝貢十一月己巳車駕至自和龍十二月己丑馮𢎞子長樂公崇及其母弟朗朗弟邈以遼西內屬先是辟召賢良而州郡多逼遣之詔以禮申喻任其進退二年春二月庚午詔兼鴻臚卿李繼持節假馮崇車騎大將軍遼西王承制聼置尚書已下壬午詔兼散騎常侍宋宣使於宋夏四月沮渠蒙遜死以其子牧犍為車騎將軍改封西河王六月遣永昌王健尚書左僕射安原督諸軍討和龍辛巳詔樂安王範發秦雍兵一萬築小城於長安城內秋八月遼西王馮崇上表求説降其父帝不聼九月宋人來聘并獻馴象一戊午詔兼大鴻臚卿崔頥持節拜征虜將軍楊難當為征南大將軍儀同三司封南秦王冬十二月己巳大赦天下辛未幸隂山北詔兼散騎常侍盧元使於宋三年春正月乙未車駕次于女水大饗羣臣戊戍馮𢎞遣使求和帝不許丙辰南秦王楊難當尅漢中送雍州流人七千家于長安二月戊寅詔以頻年屢征有事西北運輸之役百姓勤勞令郡縣括貧富以為三級富者租賦如常中者復二年下窮者復三年辛邜車駕還宫三月甲寅行幸河西閏月甲戍秦王赫連昌叛走丙子河西侯將格殺之驗其謀反羣弟皆伏誅己邜車駕還宫進彭城公栗爵為王秋七月辛巳東宫成備置屯衛三分西宫之一壬午行幸美稷遂至隰城命諸軍討山胡白龍于河西九月戊子尅之斬白龍及其將帥屠其城冬十一月車駕還宫十二月甲辰行幸雲中太延元年春正月乙未朔日有蝕之壬午降死罪刑已下各一等癸未出道武明元宫人令得嫁甲申大赦改元二月庚子蠕蠕焉耆車師各遣使朝貢詔長安及平涼人徙在京師其孤老不能自存者聼還鄉里丁未車駕還宫夏五月庚申進宜都公穆夀為宜都王汝隂公長孫道生為上黨王宜城公奚斤為恆農王廣陵公婁伏連為廣陵王遣使者二十輩使西域甲戍行幸雲中六月甲午詔曰去春小旱東作不茂憂勤尅已祈請靈祗豈朕精誠有感何報應之速雲雨震灑流澤霑渥有鄙婦人持方寸玉印詣潞縣侯孫家既而亡去莫知所在印有三字為龍鳥之形要妙竒巧不涉人迹文曰旱疫平推尋其理蓋神靈之報應也比者以來禎瑞仍臻甘露流液降於殿內嘉瓜合蒂生于中山野木連理殖於魏郡在先后載誕之鄉白燕集于盛樂舊都元鳥隨之蓋有千數嘉禾頻嵗合秀於恆農白兔並見於勃海白雉三隻又集於平陽太祖之廟天降嘉貺將何德以酬之其令天下大酺五日禮報百神守宰祭界內名山大川上答天意丙午高麗鄯善國並遣使朝貢秋七月田於棝陽己邜樂平王丕等五將東伐至和龍徙男女六千口而還八月丙戍行幸河西粟特國遣使朝貢九月車駕還宫冬十月癸邜尚書左僕射安原謀反伏誅甲辰行幸定州次于新城宫十一月己巳校獵于廣川丙子行幸鄴祀密太后廟諸所過親問高年褒禮賢俊十二月癸邜遣使者以太牢祀北嶽二年春正月甲寅車駕還宫二月戊子馮𢎞遣使朝貢來送侍子帝不許壬辰遣使者十餘輩詣高麗東夷諸國詔諭之三月丙辰宋人來聘辛未遣平東將軍娥清安西將軍古弼討馮𢎞𢎞求救於高麗高麗遣其大將葛蔓盧迎之夏四月甲寅皇子小兒苖兒並薨五月乙卯馮𢎞奔高麗戊午詔散騎常侍封揆使高麗徴送馮𢎞丁邜行幸河西赫連定之西也楊難當竊據上邽秋七月庚戍命樂平王丕等討之詔散騎常侍遊雅使於宋八月丁亥遣使六輩使西域帝校獵于河西詔廣平公張黎發定州七郡一萬二千人通莎泉道甲辰高車國遣使朝貢九月庚戍樂平王丕等至略陽公楊難當奉詔攝上邽守高麗不送馮𢎞帝將伐之納樂平王丕計而止冬十一月己酉幸棝陽驅野馬於雲中置野馬苑閏月壬午車駕還宫乙丑改封頴川王提為武昌王河西王沮渠牧犍遣使朝貢是嵗吐谷渾慕璝死三年春正月癸未中山王纂薨戊子太尉北平王長孫嵩薨乙巳丹陽王叔孫建薨二月乙邜行幸幽州存恤孤老問民疾苦還幸上谷遂至代所過復田租之半三月己邜車駕還宫丁酉宋人來聘夏五月己丑詔天下吏民得舉告守令不如法者丙申行幸雲中秋七月戊子使永昌王健上黨王長孫道生討山胡白龍餘黨於西河滅之八月甲辰行幸河西九月甲申車駕還宫丁丑遣使者拜西秦王慕璝弟慕利延為鎮西大將軍儀同三司改封西平王冬十月癸邜行幸雲中十一月壬申車駕還宫是嵗河西王沮渠牧犍世子封壇來朝高麗契丹龜兹悅般焉耆車師粟特疏勒烏孫渴盤陀鄯善破落者舌等國各遣使朝貢四年春三月庚辰鄯善王弟素延耆來朝癸未罷沙門年五十已下江陽王根薨是月高麗殺馮𢎞夏五月戊寅大赦秋七月壬申車駕北伐冬十一月丁卯朔日有蝕之十二月車駕至自北伐上洛巴泉蕇等相帥內附詔兼散騎常侍高雅使于宋五年春正月庚寅行幸定州三月辛未車駕還宫庚寅以故南秦王世子楊保宗為征南大將軍秦州牧武都王鎮上邽夏五月癸未遮逸國獻汗血馬六月甲辰車駕西討沮渠牧犍侍中宜都王穆等輔皇太子決留臺事大將軍長樂王嵇敬輔國大將軍建寧王崇二萬人屯漠南以備蠕蠕秋七月己巳車駕至上都屬國城大饗羣臣講武馬射壬午留輜重分部諸軍八月丙申車駕至姑臧牧犍兄子祖踰城來降乃分軍圍之九月丙戍牧犍與左右文武五千人靣縛軍門帝解其縛待以藩臣之禮收其城內户口二十餘萬倉庫珍寶不可勝計進張掖公秃髮保周爵為王與龍􅋮將軍穆羆安逺將軍源賀分略諸郡牧犍弟張掖太守宜得西奔酒泉太守無諱後奔晉昌樂都太守安周南奔吐谷渾戊子蠕蠕犯塞遂至七介山京都大駭皇太子命上黨王長孫道生等拒之冬十月辛酉車駕還宫徙涼州人三萬餘家于京師留樂平王丕征西將軍賀多羅鎮涼州癸亥遣張掖王秃髮保周喻諸部鮮卑保周因率諸部叛於張掖十一月乙巳宋人來聘并獻馴象一十二月壬午車駕至自西伐飲至䇿勳告于宗廟楊難當寇上邽鎮將元勿頭討走之是嵗鄯善龜兹踈勒焉耆高麗粟特渴盤陀郍悉半居等國並遣使朝貢太平真君元年春正月己酉沮渠無諱圍酒泉辛亥分遣侍臣巡行州郡觀察風俗問民疾苦三月己巳詔假通直常侍邢頴使於宋發長安人五千浚昆明池三月酒泉陷夏四月戊午朔日有蝕之庚辰沮渠無諱寇張掖禿髮保周屯郍舟六月丁丑皇孫濬生大赦改元秋七月行幸隂山己丑永昌王健大破秃髮保周走之丙申保太后寶氏崩于行宫癸丑保周自殺傳首京師八月甲申沮渠無諱降九月壬寅車駕還宫是嵗州鎮十五飢詔開倉振恤之以河南王曜子羯兒為河間王後改封略陽王二年春正月癸邜拜沮渠無諱為征西大將軍涼州牧酒泉王三月辛邜葬惠太后於崞山庚戍新興王俊略陽王羯兒有罪黜為公辛亥封蠕蠕郁久閭乞歸為朔方王沮渠萬年為張掖王夏四月丁巳宋人來聘秋八月辛亥詔散騎侍郎張偉使于宋九月戊戍永昌王健薨冬十一月庚子鎮南大將軍奚眷平酒泉十二月丙子宋人來聘三年春正月甲申帝至道壇親受符籙備法駕旗幟盡青三月壬寅北平王長孫頽有罪削爵為侯夏四月酒泉王沮渠無諱走渡流沙據鄯善西涼李嵩孫李寶據敦煌遣使內附五月行幸隂山北六月丙戍楊難當朝於行宫先是起殿於隂山北殿成而難當至因曰廣德焉秋八月甲戍晦日有蝕之冬十月己邜封皇子伏羅為晉王翰為秦王談為燕王建為楚王余為吳王十二月辛巳太保襄城公盧魯元薨丁酉車駕還宫李寶遣使朝貢以寶為鎮西大將軍開府儀同三司沙州牧敦煌公四年春正月庚午行幸中山二月丙子次于恆山之陽詔有司刋石勒銘是月尅仇池三月庚申車駕還宫夏四月武都王楊保宗謀反諸將禽送京師氐羌復推保宗弟文德為主圍仇池六月庚寅詔復民資賦三年其田租嵗輸如常牧守不得妄有徴發癸巳大閲于西郊九月辛丑行幸漠南甲辰捨輜重以輕騎襲蠕蠕分軍為四道冬十一月甲子車駕還至朔方詔曰夫隂陽有往復四時有代謝授子任賢蓋古今不易之令典也其令皇太子副理萬機總統百揆諸功臣勤勞日久皆當以爵歸第隨時朝請饗宴朕前論道陳謨而已不宜復煩以劇職更舉賢俊以備百官明為科制以稱朕心十二月辛邜車駕至自北伐五年春正月壬寅皇太子始總百揆侍中中書監冝都王穆夀司徒東都公崔浩侍中廣平公張黎侍中建興公古弼輔太子以決庶政諸上書者皆稱臣上疏儀與表同戊申詔自王公以下至於庶人私養沙門師巫及金銀工巧之人在其家者皆遣詣官曹限今年二月二十五日過期不出巫沙門身死主人門誅庚戍詔自王公已下至於卿士其子息皆詣太學其百工伎巧騶卒子息當習其父兄所業不聼私立學校違者師身死主人門誅二月辛未中山王辰等八人以北伐後期斬于都南癸酉樂平王丕薨庚辰行幸廬三月戊辰大會于郍南遣使者四輩使西域甲辰車駕還宫夏四月乙亥太宰陽平王杜超為帳下所殺五月丁酉行幸隂山北六月西平王吐谷渾慕利延殺其兄子緯代立緯弟叱力延等來奔乞師以叱力延為歸義王秋八月乙丑田于河西壬午詔員外散騎常侍髙濟使於宋九月帝自河西至于馬邑觀于崞川乙亥車駕還宫丁未行幸漠南冬十月癸未晉王伏羅大破慕利延慕利延走奔白蘭其部一萬三千內附十一月宋人來聘十二月丙戍車駕還宫六年春正月辛亥行幸定州引見長老存問之詔兼員外散騎常侍宋愔使于宋二月遂西幸上黨觀連理樹於元氏至吐京討徙叛胡出配郡縣三月庚申車駕還宫詔諸有疑獄皆付中書以經義量決夏六月戊子朔日有蝕之壬辰北巡秋八月壬辰散騎常侍成周公萬度歸以輕騎至鄯善執其王真逹與詣京師帝大悅厚待之車駕幸隂山北次于廣德宫詔發天下兵三取一各當戒嚴以須後命徙諸種雜人五千餘家於北邉令人北徙畜牧至廣漠以餌蠕蠕壬寅征西大將軍高涼王郍等討吐谷渾慕利延軍到曼頭城慕利延驅其部落西度流沙郍急追故西秦王慕璝世子被囊逆軍拒戰郍擊破之中山公杜豐追度三危至雪山禽被囊及慕利延元子什歸熾盤子成龍送于京師慕利延遂西入于闐國九月盧水胡蓋吳聚衆反於杏城冬十一月高涼王郍振旅還京師庚申遼東王竇漏頭薨河東蜀薛永宗聚黨入汾曲西通蓋吳受其位號蓋吳自號天台王署百官辛未車駕還宫選六州兵勇猛者使永昌王仁高涼王郍分領為二道南略淮泗以北徙青徐之人以實河北癸未西巡七年春正月戊辰車駕次東雍禽薛永宗斬之其男女無少長皆赴水死辛未南幸汾隂蓋吳退走北地二月丙戍幸長安存問父老丁亥幸昆明池遂田于岐山之陽所過誅與蓋吳通謀反害守將者三月詔諸州坑沙門毁諸佛像徙長安城內工巧三千家於京師夏四月甲申車駕至自長安戊子毁鄴城五層佛圖於泥像中得玉璽二其文皆曰受命於天既夀永昌其一刻其旁曰魏所受漢傳國璽五月蓋吳復聚杏城自號秦地王丙戍發司幽定冀四州十萬人築畿上塞圍起上谷西至于河廣袤皆千里六月癸未朔日有蝕之秋八月蓋吳為其下人所殺傳首京師復略陽公羯兒王爵八年春正月癸未行幸中山三月河西王沮渠牧犍謀反伏誅夏五月車駕還宫六月西征諸將扶風公處真等八將坐盜沒軍資所在虜掠贓各千萬計並斬之秋八月樂安王範薨冬十一月侍中中書監宜都王穆夀薨十二月晉王伏羅薨九年春正月宋人來聘二月癸邜行幸定州山東人飢詔開倉振之罷塞圍作遂西幸上黨詔於壺關東北大王山纍石為三封又塹其鳯皇山南足以斷之三月車駕還宫夏五月甲戍以交址公韓拔為假征西將軍領護西戎校尉鄯善王鎮鄯善賦役其人比之郡縣六月辛酉行幸廣德宫丁邜悅般國遣使求與王師俱討蠕蠕帝許之秋八月詔中外諸軍戒嚴九月乙酉練兵于西郊丙戍幸隂山是月成周公萬度歸千里驛上大破焉耆國其王鳩尸卑那奔龜兹冬十月辛丑恆農王奚斤薨癸邜以婚姻奢靡喪葬過度詔有司更為科限癸亥大赦十二月詔成周公萬度歸自焉耆西討龜兹皇太子朝于行宫遂從北討至受降城不見蠕蠕因積糧城內留守而還北平王長孫敦坐事降爵為公十年春正月戊辰朔帝在漠南大饗百寮甲戍蠕蠕吐賀真懼逺遁三月搜于河西庚寅車駕還宫夏四月丙申朔日有蝕之九月閲武於磧上遂北伐冬十月庚子皇太子及羣官奉迎於行宫十二月戊申車駕至自北伐己酉以平昌公託真為中山王十一年春正月乙丑行幸洛陽所過郡國皆親對高年存恤孤寡二月甲午大搜於梁川皇子真薨是月大修宫室皇太子居于北宫車駕遂征懸瓠夏四月癸邜車駕還宫賜從者及留臺郎吏已上生口各有差六月己亥誅司徒崔浩辛丑北巡隂山秋七月宋將王元謨攻滑臺八月辛亥田于河西癸未練兵於西郊九月辛邜車駕南伐癸巳皇太子北伐屯于漠南吳王余留守京都庚子曲赦定冀相三州死罪已下冬十月乙丑車駕濟河元謨棄軍而走乃命諸將分道並進車駕自中道十一月辛邜至鄒山使使者以太牢祀孔子是月頞盾國獻師子一十二月丁邜車駕至淮詔刈雚葦作筏數萬而濟淮南皆降癸未車駕臨江起行宫於瓜步山諸軍同日皆臨江所過城邑莫不望塵奔潰其降附者不可勝數甲申宋文帝使獻百牢貢其方物又請進女於皇孫以求和好帝以師婚非禮許和而不許婚使散騎侍郎夏侯野報之帝詔皇孫為書致馬通問焉正平元年春正月丙戌朔大會羣臣於江上文武受爵者二百餘人丁亥車駕北旋二月癸未次于魯口皇太子朝于行宫三月己亥車駕至自南伐飲至策勳告於宗廟以降人五萬餘家分置近畿賜留臺文武所獲軍資生口各有差夏五月壬寅大赦六月壬戍改元車師國王遣子入侍詔以刑網太密犯者更衆命有司具案律令務求厥中自餘有不便於民者依比增損詔太子少傳遊雅中書侍郎胡方回等改定律制略陽王羯兒高涼王郍有罪賜死戊辰皇太子薨壬申葬景穆太子於金陵秋七月丁亥行幸隂山省諸曹吏員三分之一九月癸巳車駕還宫冬十月庚申行幸隂山宋人來聘詔殿中將軍郎法祐使於宋己巳司空上黨王長孫道生薨十二月丁丑車駕還宫封皇孫濬為高陽王尋以皇孫世嫡不宜在藩乃止改封秦王翰為東平王燕王談為臨淮王楚王建為廣陽王吳王余為南安王二年春正月庚辰朔南來降人五千餘家於中山謀叛州軍討平之冀州刺史張掖王沮渠萬年與降人通謀賜死三月甲寅中常侍宗愛構逆帝崩於永安宫時年四十五祕不發喪愛又矯皇后令殺東平王翰迎南安王余立大赦改元為承平尊諡帝曰太武皇帝葬於雲中金陵廟號世祖帝生不逮密太后及有所識言則悲慟哀感傍人明元聞而嘉歎及明元不豫衣不釋帶性清儉率素服御飲膳取給而已不好珍麗食不二味所幸昭儀衣無兼綵羣臣白帝更峻京邑城隍以從周易設險之義又陳蕭何壯麗之説帝曰古人有言在德不在險屈丐蒸土築城而朕滅之豈在城也今天下未平方須人力土功之事朕所未為蕭何之對非雅言也每以財者軍國之本無所輕費至於賞賜皆是勳績之家親戚愛寵未曽橫有所及臨敵常與士卒同在矢石間左右死傷相繼而帝神色自若是以人思效命所向無前命將出師指授節度從命者無不制勝違爽者率多敗失性又知人拔士於卒伍之中唯其才效所長不論本末兼甚嚴斷明於刑賞功者賞不遺賤罪者刑不避親雖寵愛之終不虧法常曰法者朕與天下共之何敢輕也故大臣犯法無所寬假雅長聼察瞬息之間下無以措其姦隱然果於誅戮後多悔之司徒崔浩死後帝北伐時宣城公李孝伯疾篤傳者以為卒帝聞而悼之謂左右曰李宣城可惜又曰朕向失言崔司徒可惜李宣城可哀褒貶雅意皆此類也太武帝始光神麚各四年延和三年太延五年太平真君十一年正平二年即位二十九年臣謹按景穆太子未嘗即位後追諡為皇帝既無年號不當立紀太子諱晃太武之長子也母曰賀夫人延和元年正月丙午立為皇太子時年五嵗明慧強識聞則不忘及長好讀經史皆通大義太武甚竒之及西征涼州皇太子監國初太武之伐河西李順等咸言姑臧無水草不可行師太子有疑色及車駕至姑臧乃詔太子曰姑臧城東西門外涌泉合於城北其大如河澤草茂盛可供大軍數年人之多言亦可惡也太子謂宫臣曰為人臣不實若此豈為忠乎吾初聞有疑但帝決行耳幾誤人大事言者復何面目見帝也太平真君四年從征蠕蠕至鹿渾谷與賊遇虜惶怖擾亂太子言於太武曰宜速進擊掩其不備中書令劉潔固諫以為塵盛賊多須軍大集太子曰此塵之盛當由賊驚故也太武疑之遂不急擊蠕蠕逺遁既而獲虜候騎乃云不覺官軍卒至上下惶懼北走經六七日知無追者乃徐行帝深恨之自是太子所言軍國大事多見納用遂知萬機及監國命有司使百姓有牛家以人牛相貿又禁飲酒雜戲棄本酤販者於是墾田大增正平元年六月戊辰薨於東宫時年二十四庚午命持節兼太尉張黎兼司空竇瑾奉策即柩諡曰景穆太子文成即位追尊為景穆皇帝廟號恭宗高宗文成皇帝諱濬景穆皇帝之長子也母曰閭氏太平真君元年六月生於東宫帝少聰逹太武常置左右號世嫡皇孫年五嵗太武北巡帝從在後逢虜帥桎一奴將加罰帝謂曰奴今遭我汝宜釋之帥奉命解縛太武聞之曰此兒雖小欲以天子自處意竒之及長風格異常每參決大政可否正平二年三月中常侍宗愛弒逆立南安王余十月丙午朔又賊殺余於是殿中尚書長孫渴侯與尚書陸麗奉迎世嫡皇孫興安元年冬十月戊申皇帝即位於永安前殿大赦改正平二年為興安元年以驃騎大將軍元夀樂為太宰都督中外諸軍録尚書事以尚書長孫渴侯為尚書令儀同三司十一月丙子二人爭權並賜死癸未廣陽王建臨淮王談薨甲申皇妣閭氏薨進平南將軍宋子侯周忸爵為樂陵王南部尚書常安子陸麗為平原王文武各加位一等壬寅追尊皇考景穆太子為景穆皇帝妣閭氏為恭皇后尊保母常氏為保太后十二月戊申祔葬恭皇后於金陵乙邜初復佛法丁巳以樂陵王周忸為太尉平原王陸麗為司徒鎮西將軍杜元寶為司空保達沙獵等國各遣使朝貢戊寅進建業公陸俟爵為東平王進廣平公杜遺爵為王癸亥詔以營州蝗開倉振恤甲子太尉樂陵王周忸有罪賜死進濮陽公閭若文爵為王二年春正月辛巳進司空杜元寶爵為京兆王廣平王杜遺薨進尚書僕射東安公劉尼爵為王封建寧王崇子麗為濟南王癸未詔與百姓雜調十五丙戍進尚書西平公源賀爵為王二月己未司空京兆王杜元寶謀反伏誅建寧王崇崇子濟南王麗為元寶所引各賜死乙丑發京師五千人穿天泉池是月宋太子劭弒文帝三月尊保太后為皇太后進安豐公閭虎皮爵為河間王夏五月宋孝武帝殺太子劭而自立閏月乙亥太皇太后赫連氏崩秋七月辛亥行幸隂山濮陽王閭若文永昌王仁謀反乙邜仁賜死若文伏誅己巳車駕還宫是月築馬射臺於南郊八月戊戍詔曰朕即位已來風雨順序邉方無事衆瑞兼呈又於苑內獲方寸玉印其文曰子孫長夀羣公卿士咸曰休哉豈朕一人克臻斯應實由天地祖宗降祐之所致也思與兆庶共兹嘉慶其令百姓大酺三日降殊死已下囚九月壬子閲武於南郊冬十一月辛酉行幸信都中山觀察風俗十二月甲午車駕還宫復北平公長孫敦王爵是嵗踈勒渴盤陀庫莫奚契丹罽賔等國各遣使朝貢興光元年春正月乙丑以侍中河南公伊馛為司空二月甲午帝至道壇登受圖籙禮畢曲赦京師夏六月行幸隂山秋七月丙申朔日有蝕之庚子皇子𢎞生辛丑大赦改元八月甲戍趙王深薨乙亥車駕還宫乙丑皇叔虎頭龍頭薨九月庫莫奚國獻名馬有一角狀如麟閉都門大索三日獲姦人亡命數百人冬十一月戊戍行幸中山遂幸信都十二月丙子還幸靈邱至溫泉宫庚辰車駕還宫出于叱萬單等國各遣使朝貢太安元年春正月辛酉奉太武景穆神主于太廟樂平王拔有罪賜死二月癸未武昌王提薨三月己亥以太武景穆神主入太廟改元曲赦京師死囚已下夏六月壬戍詔名皇子𢎞曲赦癸酉詔尚書穆真等二十人巡行州郡察風俗大明賞罰冬十月庚午以遼西公常英為太宰進爵為王是嵗遮逸波斯踈勒等國各遣使朝貢二年春正月乙邜立皇后馮氏二月丁巳立皇子𢎞為皇太子大赦夏六月羽林中郎于判元提等謀逆誅秋八月田於河西平西將軍漁陽公尉眷北擊伊吾尅其城大獲而還九月辛巳進河東公閭毗零陵公閭紇爵並為王冬十月甲申車駕還宫甲午曲赦京師十一月改封西平王源賀隴西王嚈噠普嵐等國各遣使朝貢三年春正月徴漁陽公尉眷拜太尉進爵為王録尚書事夏五月封皇弟新成為陽平王六月癸邜行幸隂山秋八月田於隂山之北己亥還宫冬十月將東巡詔大宰常英起行宫於遼西黃山十二月州鎮五蝗百姓飢使開倉振給之是嵗粟特于闐等五十餘國並遣使朝貢四年春正月丙午朔初設酒禁乙邜行幸廣寧溫泉宫遂東巡庚午至遼西黃山宫遊宴數日親對高年勞問疾苦二月丙子登碣石山觀滄海大饗羣臣於山上班賞進爵各有差改碣石山為樂遊山築壇記行於海濵戊寅南幸信都田於廣川三月丁未觀馬射於中山所過郡國賜復一年丙辰車駕還宫起太華殿乙丑東平王陸俟薨夏五月壬戍詔曰比年以來雜調減省而所在州郡咸有逋懸非在職之官緩惰失所貪穢過度誰使之然自今常調不充人不安業宰民之徒加以死罪六月丙申田於松山秋七月庚午行幸河西九月丁巳還宫辛亥太華殿成丙寅饗羣臣大赦冬十月甲戍北巡至隂山有故冢毁廢詔曰昔姬文葬枯骨天下歸仁自今有穿墳壠者斬之辛邜次于車輪山纍石紀行十一月車駕度漠蠕蠕絶迹逺遁十二月中山王託真薨五年春二月己酉司空河南公伊馛薨三月庚寅曲赦京師死罪已下夏四月乙巳封皇弟子推為京兆王五月常居國遣使朝貢六月戊申行幸隂山秋八月庚戍遂幸雲中壬戍還宫九月戊辰儀同三司敦煌公李寶薨冬十二月戊申詔以六鎮雲中高平二雍秦州遍遇災旱年榖不收開倉廪振乏有徙流者喻還桑梓和平元年春正月甲子朔大赦改元庚午詔散騎侍郎馮闡使於宋夏四月戊戍皇太后常氏崩於夀安宫五月癸酉葬昭太后於廣寧鳴雞山六月甲午詔征西大將軍陽平王新成等討吐谷渾什寅崔浩之誅也史官遂廢至是復置秋七月西征諸軍至西平什寅走保南山九月庚申朔日有蝕之是月諸軍濟河追什寅遇瘴氣多病疫乃引還庚午車駕還宫冬十月居常王獻馴象三十一月詔散騎侍郎盧度世使於宋二年春正月乙酉詔曰刺史牧民為萬里之表自頃每因發調逼人假貸大商富賈要射時利上下通同分以潤屋為政之弊莫過於此其一切禁絶犯者十匹以上皆死布告天下咸令知禁二月行幸中山遂幸信都三月宋人來聘車駕所過皆親對高年問疾苦詔年八十一子不從役靈邱南有山髙四百餘丈乃詔羣臣仰射山峯無能踰者帝彎弧發矢出三十餘丈過山南二百二十步遂刋石勒銘是月發并肆州五千餘人修河西獵道辛巳車駕還宫夏四月乙未河東王閭毗薨五月癸未詔南部尚書黃盧頭李敷業考課諸州秋七月戊寅封皇弟小新成為濟隂王天賜為汝隂王萬夀為樂良王洛侯為廣平王八月波斯國遣使朝貢冬十月詔假員外散騎常侍遊明根使于宋廣平王洛侯薨三年春正月壬午以東郡公乙渾為太原王癸未樂良王萬夀薨二月壬子朔日有蝕之癸酉田於崞山遂觀漁于旋馬池三月甲申宋人來聘高麗蓰王契嚙思厭於師疏勒石那悉居半渴盤陀等國並遣使朝貢夏六月庚申行幸隂山秋七月壬寅幸河西九月壬辰常山王素薨冬十月詔員外散騎常侍遊明根使于宋十一月壬寅車駕還宫十二月乙邜制戰陳之法十有餘條因大儺耀兵有飛龍騰蛇魚麗之變以示威武戊午零陵王閭拔薨四年春三月乙未賜京師人年七十以上太官厨食以終其年皇子胡仁薨追封樂陵王夏四月癸亥上幸西苑親射猛虎三頭五月壬辰侍中漁陽王尉眷薨壬寅行幸隂山秋七月壬午詔曰朕每嵗間月命羣臣講武所幸之處必立宫壇靡費之功勞損非一宜仍舊貫何必改作也八月丙寅遂田于河西九月辛巳車駕還宫冬十月以定相二州霣霜傷稼免其田租詔員外散騎常侍遊明根使於宋十二月辛丑詔以喪葬嫁娶大禮未備命有司為之條格使貴賤有章上下咸序著之于令壬寅詔曰婚姻者人道之始比者以來貴族之門多不率法或貪利財賂或因緣私好在於茍合無所擇選塵穢清化虧損人倫將何以宣示典謨垂之來裔今制皇族肺腑王公侯伯及士庶之家不得與百工伎巧卑姓為婚犯者加罪五年春正月丁亥封皇弟雲為任城王二月詔以州鎮十四去嵗蟲水開倉振恤夏四月癸邜進封頓邱公李峻為王閏月戊子帝以旱故減膳責身是夜澍雨大降五月宋孝武帝殂六月丁亥行幸隂山秋七月壬寅行幸河西九月辛丑車駕還宫冬十月琅邪侯司馬楚之薨十二月南秦王楊難當薨吐呼羅國遣使朝貢六年春正月丙申大赦二月丁丑行幸樓煩宫高麗蓰王對曼等國各遣使朝貢三月戊戍相州刺史西平郡王吐谷渾權薨乙巳車駕還宫夏四月破洛郍國獻汗血馬普嵐國獻寶劔五月癸卯帝崩于太華殿時年二十六六月丙寅奉尊諡曰文成皇帝廟號髙宗八月葬雲中之金陵文成帝興安二年興光元年太安五年和平六年即位十四年顯祖獻文皇帝諱𢎞文成皇帝之長子也母曰李貴人興光元年七月生於隂山之北大安二年二月立為皇太子和平六年五月甲辰即皇帝位大赦尊皇后曰皇太后車騎大將軍乙渾矯詔殺尚書楊保年平陽公賈愛仁南陽公張天度于禁中戊申司徒公平原王陸麗自湯泉入廟又殺之己酉以渾為太尉公以録尚書事東安王劉尼為司徒公以尚書左僕射和其奴為司空公六月封繁陽侯李嶷為丹陽王征東大將軍馮熙為昌黎王秋七月癸巳以太尉乙渾為丞相位居諸王上事無大小皆決焉九月庚子曲赦京師丙午詔曰先朝以州牧親民宜置良佐故賴有司班九條之制使前政選吏以待後人然牧司舉非其人愆于典度今制刺史守宰到官之日仰自舉人望忠信以為選官不論前政共相平置若簡任失所以罔上論是月宋義陽王劉昶自彭城來奔冬十月徴陽平王新成京兆王子推濟隂王小新成汝隂王天賜任城王雲入朝十一月宋湘東王彧弒其主子業而自立天安元年春正月己丑朔大赦改元二月庚申丞相太原王乙渾謀反伏誅乙亥以侍中元孔雀為濮陽王侍中陸定國為東郡王三月庚子以隴西王源賀為太尉公辛丑高宗文成皇帝神主祔于太廟辛亥帝幸道壇親受符籙曲赦京師秋九月己酉初立鄉學郡置博士二人助教二人學生六十人冬十二月皇弟安平王薨是嵗州鎮十一旱民飢開倉振恤皇興元年春正月癸巳鎮南大將軍尉元大破宋將張永沈攸之於吕梁東宋人來聘庚子東平王道符謀反於長安其司馬段太陽斬之傳首京師道符兄弟皆伏誅閏月以頓邱王李峻為太宰二月濟隂王小新成薨宋東平太守申纂戍無鹽遏絶王使詔征南大將軍慕容白曜督諸軍往討三月甲寅尅之秋八月丁酉幸武州山石窟寺戊申皇子宏生大赦改元九月己巳進馮翊公李白為梁郡王冬十月己亥朔日有蝕之癸邜田於郍男池濮陽王孔雀坐怠慢降為公二年春二月癸未田于西山親射虎豹三月慕容白曜進圍東陽戊午宋人來聘夏四月丙子朔日有蝕之辛丑進南郡公李惠爵為王五月乙邜田于崞山遂幸繁畤辛酉車駕還宫六月庚辰以河南闢地曲赦京師殊死以下以昌黎王馮熙為太傅秋九月辛亥封皇叔禎為南安王長夀為城陽王太洛為章武王休為安定王冬十月癸酉朔日有蝕之辛丑田于泠泉十一月州鎮二十七水旱詔開倉振恤十二月甲午詔曰頃張永敢拒王威暴骨原隰天下之人一也其永軍殘廢之士聼還江南露骸草莽者敕州縣收瘞之三年春正月乙丑東陽潰虜沈文秀戊辰司空平昌公和其奴薨三月己邜進上黨公慕容白曜爵為濟南王夏四月壬辰宋人來聘丙申名皇子宏大赦丁酉田于崞山五月徙青齊人於京師六月辛未立皇子宏為皇太子冬十月丁邜朔日有蝕之是月太宰頓邱王李峻薨十一月進襄城公韓頽爵為王四年春正月州鎮大飢詔開倉振恤二月以東郡王陸定國為司空公詔征西大將軍上黨王長孫觀討吐谷渾什寅廣陽王石侯薨三月丙戍詔天下人病者所在官司遣醫就家診視所須藥任醫所量給之夏四月辛丑大赦戊申長孫觀軍至曼頭山大破什寅五月封皇弟長樂為建昌王六月宋人來聘秋八月蠕蠕犯塞九月丙寅車駕北伐諸將俱會于女水大破虜軍司徒東安公劉尼坐事免壬申車駕至自北伐飲至䇿勳告于宗廟冬十月誅濟南王慕容白曜高平公李敷十一月詔弛山澤禁十二月甲辰幸鹿野苑石窟寺陽平王新成薨五年春二月乙亥詔假員外散騎常侍邢祐使于宋夏四月北平王長孫敦薨六月丁未行幸河西秋七月丙寅遂至隂山八月丁亥車駕還宫帝幼而神武聰睿機悟有濟人之規仁孝純至禮敬師友及即位雅薄時務常有遺世之心欲禪位於叔父京兆王子推羣臣固請帝乃止丙午使太保建安王陸馛太尉源賀持節奉皇帝璽綬册命皇大子升帝位於是羣公奏上尊號太上皇帝乃從之己酉太上皇帝徙御崇光宫彩椽不斫土階而已國之大事咸以聞承明元年文明太后有憾於帝帝崩於永安殿時年二十三上尊諡曰獻文皇帝廟號顯祖葬雲中金陵獻文帝天安元年皇興五年即位六年通志卷十五上
