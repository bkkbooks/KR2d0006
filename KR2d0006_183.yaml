body:
  text: 通志卷一百五十九宋右廸功郎鄭樵漁仲撰列傳第七十二後周豆盧寧楊紹王雅韓雄賀若敦申徽陸通父政弟逞庫狄峙楊荐王慶趙剛趙昶王悦趙文表元定楊􅋆韓襃趙肅張軌李彦郭彦梁昕皇甫璠辛慶之族子昂王子直杜杲呂思禮徐招檀翥孟信宗懍劉璠子祥桞遐子靖斛斯徴豆盧寧字永安昌黎徒何人其先本姓慕容氏燕北地王精之後也髙祖勝以燕皇始初歸魏授長樂郡守賜姓豆盧氏或云北人謂歸義為豆盧因氏焉又云避難改焉未詳孰是父萇魏柔元鎮將有威重見稱於時武成中以寧勲追贈柱國大將軍少保涪郡公寧少驍果有志氣身長八尺羙姿容善騎射魏永安中以别將隨爾朱天光入闗以破万俟醜奴功賜爵靈壽縣男嘗與梁仚定遇於平涼川相與肄射乃相去百歩縣莎草以射之七發五中仚定服其能贈遺甚厚天光敗從侯莫陳悦及文帝討悦寧與李弼來歸孝武西遷以奉迎勳封河陽縣伯後進爵為公從禽竇泰復𢎞農破沙苑除衛大將軍兼大都督大統七年從于謹破稽胡帥劉平伏於上郡及梁仚定反以寧為軍司監隴右諸軍事賊平進位侍中使持節驃騎大將軍開府儀同三司九年從文帝迎髙仲密與東魏戰於芒山遷左衛將軍進爵范陽郡公十六年拜大將軍羌帥傍乞鐡怱及鄭五醜等反叛寧討平之恭帝二年改封武陽郡公遷尚書右僕射孝閔帝踐阼授柱國大將軍武成初出為同州刺史遷大司㓂進封椘國公邑萬户别食鹽亭縣一千戸收其租賦保定四年授岐州刺史屬大兵東討寧輿疾從軍薨於同州贈太保十州諸軍事同州刺史諡曰昭初寧未有子養弟永恩子勣及生子讚親屬皆請讚為嗣寕曰兄弟之子猶子也吾何擇焉遂以勣嗣時以此多之及寧薨勣襲爵勣列在隋史讚以寧勳建徳初賜爵華陰縣侯累遷開府儀同大將軍進爵武陽郡公永恩少有識度與寧俱歸文帝以迎孝武功封新興伯屢從征討皆有功進位驃騎大將軍開府儀同三司孝閔帝踐阼授鄯州刺史改封沃野縣公保定元年入為司㑹中大夫寧封椘國公請以先封武陽郡三千戸益沃野之封詔許焉卒于官贈少保諡曰敬子通嗣通字平東一名㑹𢎞厚有器局以父功賜爵臨貞縣侯改封沃野縣公位開府北徐州刺史隋開皇初進爵南陳郡公尚隋文帝妹昌樂縣長公主歴定相二州刺史夏洪二州總管並以寛恵稱卒官諡曰安子寛嗣楊紹字子安𢎞農華陰人也祖興魏新平郡守父國中散大夫紹少慷慨有志略屢從征伐力戰有功魏普泰初封平郷縣男大統元年進爵冠軍縣公四年為鄜城郡守紹性恕直兼有威恵百姓安之累遷驃騎大將軍開府儀同三司鄜州刺史賜姓叱吕引氏孝閔帝踐阼進爵儻城郡公位大將軍卒贈成文等八州刺史諡曰信子雄嗣雄列在隋史王雅字度容闡熙新冏人也少沈毅木訥寡言有膽勇善騎射文帝聞其名召入軍以功賜爵居庸縣子從禽竇泰於潼闗沙苑之戰雅謂所部曰彼軍殆有百萬今我不滿萬人常理論之實難與敵但相公神武以順討逆豈計衆寡大丈夫不以此時破賊何用生為乃擐甲出戰所向披靡文帝壯之又從戰芒山時大軍失利諸將皆退雅獨拒之敵人見其無繼歩騎競進雅左右奮擊斬九級敵衆稍退雅乃還文帝歎曰王雅舉身悉是膽也進爵為伯累遷驃騎大將軍開府儀同三司明帝初除汾州刺史勵精為政人庶悦附自逺至者七百餘家卒於夏州刺史子世積嗣世積列在隋史韓雄字木蘭河南東垣人也祖景魏孝文世為赭陽郡守雄少敢勇旅力絶人工騎射有將率材畧及孝武西遷雄便慷慨有立功之志大統初遂與其屬六十餘人於洛西舉兵數日間至千人與河南行臺楊琚共為掎角毎抄掠東魏所向尅獲東魏洛州刺史韓賢以狀聞鄴乃遣其軍司慕容紹宗與賢合勢討雄戰數十合雄衆畧盡兄及妻子皆為賢所獲將以為戮乃遣人告雄至皆免之雄乃詣賢軍即隨賢還洛潛引賢黨謀欲襲之事洩遁免謁文帝於𢎞農封武陽縣侯遣還鄊里更圖進取雄乃招集義衆從獨孤信入洛陽芒山之役文帝命雄邀齊神武於隘道神武怒命三軍并力取雄雄突圍得免除東徐州刺史東魏雍州刺史郭叔畧接境頗為邊患雄密圖之輕將十騎夜入其境伏於道側遣都督韓仕於畧城服東魏人衣服詐若自河陽叛投闗西者畧出馳之雄自後射之再發咸中遂斬畧首除河南尹進爵為公尋進驃騎大將軍開府儀同三司侍中河南邑中正孝閔帝踐阼進爵新義郡公賜姓宇文氏明帝二年除都督中州刺史雄久在邊具知敵人虛實毎率衆深入不避艱難前後經四十五戰雖時有勝負而雄志氣益壯東魏深憚之卒于鎮贈大將軍五州諸軍事諡曰威子禽虎隋史有傳賀若敦河南洛陽人也其先居漠北世為部落大人曽祖貸魏獻文時入國為都官尚書封安富縣公祖伏連仕魏位雲州刺史父統勇健不好學以祖蔭為祕書郎永安初從太宰元天穆討邢杲以功封當亭子齊神武初起以統為潁川長史執刺史田迅以州䧏拜兖州刺史賜爵當亭縣公歴位北雍恒二州刺史卒贈司空諡曰哀敦少有器幹善騎射統之將執田迅也慮事不果又以累弱既多難以自拔沈吟者久之敦時年十七乃進策曰大人往事葛榮已為將帥後入爾朱禮遇尤重韓陵之後屈節髙歡既非故人又無功効今日委任無異於前者正以天下未定方藉英雄之力一旦清平豈有相容之理統流涕從之遂定謀歸文帝時羣盗蠭起大龜山賊張世顯潛來襲統敦挺身赴戰手斬七八人賊乃退走統大悦謂左右僚屬曰我少從軍旅戰陣非一如此兒年時膽畧者未見其人非惟成我門户亦當為國名將明年從河内公獨孤信於洛陽被圍敦彎三石弓箭不虚發信大竒之乃言於文帝遂引置之麾下授都督封安陵縣伯嘗從校獵於甘泉宫時圍人不齊獸多越逸文帝大怒人皆股戰圍内唯有一鹿俄亦突圍而走敦躍馬馳之鹿上東山敦棄馬歩逐至山半便乃掣之而下文帝大悦諸將因得免責累遷太子庶子魏廢帝二年拜右衛將軍俄加驃騎大將軍開府儀同三司進爵廣鄊縣公時岷蜀初開人情尚梗巴西人譙淹據南梁州與梁西江州刺史王開業共為表裏扇動羣蠻文帝令敦率軍討平之山路艱險人迹罕至敦身先將士攀木縁崖倍道兼行乘其不意淹率其衆三萬自墊江而下就梁王琳敦邀擊破之盡俘其衆進爵武都郡公拜典祀中大夫尋為金州都督蠻帥向白彪向五子王等聚衆為㓂圍逼信州詔敦與開府田𢎞赴救未至而城已陷乃進軍追討遂平信州是嵗荆州蠻帥文子榮據沮漳為逆自號仁州刺史復令敦與開府叚韶討之禽子榮并虜其衆武成元年入為軍司馬自江陵平後巴湘之地並内屬毎遣梁人守之至是陳將侯瑱侯安都等圍逼湘州遏絶糧援乃令敦率歩騎六千度江赴救瑱等以敦孤軍深入規欲取之敦毎設方畧連戰破之乘勝進次湘州因此輕敵不以為虞陳師遂斷其糧敦於是分兵抄􅀈以充資費敦恐瑱等知其糧少乃於營内多為土聚覆之以米集諸營將士各持囊若欲給糧者因召側近村民陽有所訪問令於營外遥見隨即遣之瑱等聞之良以為實乃據守要險欲曠日以老敦師敦亦増修營壘造廬舎示以持久嵗餘湘羅之間遂廢農業瑱等無如之何初土人亟乘輕船載米粟及籠雞鴨以餉瑱軍敦患之乃偽為土人裝船伏甲士於中瑱軍人望見謂餉船之至逆來爭取敦甲士遂禽之又敦軍數有叛人乘馬投瑱瑱輙納之敦又别取一馬牽以趣船令船中逆以鞭鞭之如是者再三馬便畏船不上後伏兵於江岸使人乘畏船馬以招瑱軍詐云投附瑱便遣兵迎接競來牽馬馬既畏船不上伏兵發盡殺之此後實有饋餉及亡奔瑱者猶謂敦之詐並不敢受相持嵗餘瑱等不能制求借船送敦度江敦慮其詐或謂曰舎我百里當為汝去瑱等遂留船於是將兵去津路百里敦覘知非詐勒衆而還在軍病死者十五六晉公䕶以敦失地無功除其名保定五年累遷中州刺史鎮函谷敦恃功負氣顧其流軰皆為大將軍敦獨未得兼以湘州之役全軍而反翻被除名毎出怨言晉公䕶怒徴還逼令自殺臨行呼子弼謂曰吾必欲平江南然心不果汝當成吾志吾以舌死汝不可不思因引錐刺弼舌出血誡以慎口建徳初追贈大將軍諡曰烈弼隋史有傳申徽字世儀魏郡人也六世祖鍾為後趙司徒冉閔末中原喪亂鍾子邃避地江左曽祖爽仕宋位雍州刺史祖隆道宋北兖州刺史父明仁郡功曹早卒徽少與母居盡力孝養及長好經史性審慎不妄交游遭母憂喪畢乃歸於魏元顥入洛以元邃為東徐州刺史邃引徽為主簿顥敗邃被檻車送洛陽故吏賔客並委去唯徽送之及邃得逸乃廣集賔友歎徽有古人之風尋除太尉府行參軍孝武初徽以洛陽兵難未已遂間行入闗見文帝文帝與語甚竒之薦之於賀拔岳岳亦雅相敬待引為賔客文帝臨夏州以徽為記室參軍兼府主簿文帝察徽沈密有度量毎事信委之乃為大行臺郎中時軍國草創幕府務殷四方書檄皆徽之辭也以迎孝武功封博平縣子本州大中正大統初進爵為侯四年拜中書舎人修起居注河橋之役大軍不利近侍之官分𣪚者衆徽獨不離左右魏帝稱歎之十年遷給事黄門侍郎先是東陽王元榮為𤓰州刺史其女壻劉彦隨焉及榮死𤓰州首望表榮子康為刺史彦遂殺康而取其位屬四方多難朝廷不遑問罪因授彦刺史頻徴不奉詔又南通吐谷渾將圖叛逆文帝難於動衆欲以權畧致之乃以徽為河西大使密令圖彦徽徑以五十騎行既至止於賔館彦見徽單使不以為疑徽乃遣一人微勸彦歸朝以揣其意彦不從徽又使賁成其住計彦便從之遂来至館徽先與𤓰州豪右密謀執彦遂叱而縳之彦辭無罪徽數之曰君無尺寸之功濫居方岳之重恃逺背誕不恭貢職戮辱使人輕忽詔命計君之咎實不容誅但受詔之日本令相送歸闕所恨不得即申明罰以謝邊逺耳於是宣詔慰勞吏民及彦所部復云大軍續至城内無敢動者使還遷都官尚書十二年𤓰州刺史成慶為城人張保所殺都督令狐延等起義逐保啟請刺史以徽信洽西土拜假節𤓰州刺史徽在州五稔儉約率下邊人樂而安之十六年徴兼尚書右僕射加侍中驃騎大將軍開府儀同三司魏廢帝二年進爵博平公正右僕射賜姓宇文氏徽性勤至凡所居官案牘無大小皆親自省覽以是事無稽滯吏不得為奸雖歴公卿此志不懈出為襄州刺史時南方初附舊俗官人皆通餉遺徽性㢘慎乃畫楊震像於寢室以自戒及代還民吏送者數十里不絶徽自以無徳於民慨然懷愧因賦詩題於清水亭柱長㓜聞之皆競来就讀遞相謂曰此是申公手迹並冩誦之明帝以御正任總絲綸更崇其秩為上大夫員四人號大御正又以徽為之歴小司空少保出為荆州刺史入為小司徒小宗伯天和六年上疏乞骸骨詔許之薨贈四州刺史諡曰章子康嗣位瀘州刺史司織下大夫上開府康弟敦汝南郡守敦弟靜齊郡守靜弟處上開府同昌縣侯卒陸通字仲明吳郡人也曽祖載從宋武帝平闗中軍還留載隨其子義真鎮長安遂没赫連氏魏太武平赫連氏載仕魏位中山郡守父政性至孝其母吳人好食魚北土魚少政求之常苦難後宅側忽有泉出而有魚遂得以供膳時人以為孝感所致因謂其泉為孝魚泉從爾朱天光討伐及天光敗歸文帝文帝為行臺以政為行臺左丞原州長史賜爵中都縣伯天統中卒通少敦敏好學有志節㓜從政在河西遂逢㓂難與政相失通乃自拔東歸從爾朱榮榮死又從爾朱兆及爾朱氏滅乃入關文帝時在夏州引為帳内督頃之賀拔岳為侯莫陳悦所害時有傳岳軍府已亡𣪚者文帝憂之通以為不然居數日問至果如所䇿自是愈見親禮遂晝夜陪侍家人罕見其靣通雖處機宻愈自恭謹文帝以此重之後以迎孝武功封都昌縣伯大統元年進爵為侯從禽竇泰復𢎞農戰沙苑之役力戰有功又從解洛陽圍軍還屬趙青雀反於長安文帝將討之以人馬疲弊不可速行又謂青雀等一時陸梁不足為慮乃云我到長安但輕騎臨之必當靣縳通進曰青雀等既以大軍不利謂朝廷傾危同惡相求遂成反亂然其逆謀久定必無遷善之心且其詐言大軍敗績東㓂將至若以輕騎往百姓謂為信然更沮兆庶之望大兵雖疲弊精鋭猶多以明公之威率思歸之衆以順討逆何慮不平文帝深納之因從平青雀録前後功進爵為公徐州刺史以㓂難未平留不之部與于謹討劉平伏加大都督從文帝援玉璧進儀同三司九年髙仲宻以地來附通從若干恵戰於芒山衆軍皆退唯恵與通率所部力戰至夜中乃引還敵亦不敢逼進授驃騎大將軍開府儀同三司太僕卿賜姓歩六孤氏進爵綏徳郡公孝閔踐阼拜小司空保定五年累遷大司㓂通性柔謹雖久處列位常清慎自守所得禄賜盡與親故共之家無餘財常曰凡人患貧而不貴不患貴而不貧也建徳元年轉大司馬其年薨通弟逞逞字季明初名彦字世雄魏文帝嘗從容謂之曰爾既温裕何因乃字世雄且為世之雄非所冝也於爾兄弟又復不類遂改焉逞少謹宻早有名譽兄通先以軍功别受茅土乃讓父爵中都縣伯令逞襲之起家羽林監文帝内親信時軰皆以驍勇自達唯逞獨兼文雅文帝由此加禮遇焉大統十四年參大丞相府軍事尋兼記室保定初累遷吏部中大夫歴蕃部御伯中大夫進驃騎大將軍開府儀同三司遷司宗中大夫轉軍司馬逞幹識詳明歴任三府所在著績朝廷嘉之進爵為公天和三年齊遣侍中斛斯文略中書侍郎劉逖来聘初修隣好盛選行人詔逞為使主尹公正為副以報之逞羙容止善辭令敏而有禮齊人稱焉還届近畿詔令路車儀服郊迎而入時人榮之四年除亰兆尹郡界有豕生數子經旬而死其家又有豶遂乳養之諸䐁賴之以活時論以逞仁政所致俄遷司㑹中大夫出為河州刺史晉公䕶雅重其才表為中外府司馬頗委任之尋復為司㑹兼納言遷小司馬及䕶誅坐免官頃之起為納言又以疾不堪劇任及除宜州刺史故事刺史奉辭例備鹵簿逞以時屬農要奏請停之武帝深嘉焉詔遂其所請以彰雅掺逞在州有恵政吏民稱之東宫初建授太子太保卒贈大將軍子操嗣庫狄峙其先遼東人本姓叚匹磾之後也因避難改焉後徙居代世為豪右祖凌武威郡守父貞上洛郡守峙少以𢎞厚知名善騎射有謀畧仕魏位髙陽郡守政存仁恕百姓頗悦之孝武西遷峙乃棄官從入闗大統元年拜中書舍人參掌機宻以㳟謹見稱遷黄門侍郎時與東魏爭衡蠕蠕乘虚屢為邊患朝議欲結和親乃使峙往峙狀貌魁梧善於辭令蠕蠕主雅信重之自是不復為㓂文帝謂峙曰昔魏絳和戎見稱前史以君方之彼有愧色封髙邑縣公累遷驃騎大將軍開府儀同三司拜侍中蠕蠕滅後突厥彊盛雖與周通好而外連齊氏文帝又令峙銜命喻之突厥感悟即執齊使歸諸京師進爵安豐郡公歴小司空小司㓂明帝初為益州刺史都督三十一州諸軍事峙性寛和尚清靖為夷獠所安後為宜州刺史入為少師以年老乞骸骨詔許之卒諡曰定子嶷嗣少知名位開府儀同三司職方中大夫蔡州刺史卒官嶷弟徴從平齊以功拜儀同大將軍賜爵樂陵縣公徴弟徽亦以軍功至儀同大將軍保城縣男徽弟嶔性𢎞厚有局度以齊右下大夫從武帝東伐入并州軍敗侍臣殱焉及帝之出唯嶔侍從以功授上儀同大將軍遷開府歴右宫伯賜爵樂成縣侯仕隋位至户部尚書楊荐字承畧秦郡寧夷人也父寳昌平郡守荐㓜孤早有名譽性㢘謹喜怒不形於色魏永安中隨爾朱天光入闗討羣賊封髙邑縣男文帝臨夏州補帳内都督及平侯莫陳悦使荐入洛請事孝武授文帝闗西大行臺仍除荐直閤將軍時馮翊長公主嫠居孝武意欲歸諸文帝乃令武衞元毗喻㫖荐歸白文帝又遣荐入洛陽請之孝武即許焉孝武欲向闗中荐賁成其計孝武曰卿歸語行臺迎我文帝又遣荐與長史宇文測出闗候接孝武至長安進爵清水縣子大統元年蠕蠕請和親文帝遣荐與楊寛使并結婚而還進爵為侯又使荐納幣於蠕蠕魏文帝郁久閭后崩文帝遣僕射趙善使蠕蠕更請婚善至夏州聞蠕蠕貳於東魏欲執使者善懼乃還文帝乃使荐往賜黄金十斤雜綵三百匹荐至蠕蠕責其背約食言并論結婚之意蠕蠕感悟乃遣使隨荐報命焉及侯景来附文帝令荐助鎮遏荐知景翻覆遂求還具陳事實文帝乃遣使密追助景之兵尋而景叛十六年大軍東討文帝恐蠕蠕乘虚㓂掠乃遣荐往更論和好以安慰之進使持節驃騎大將軍開府儀同三司加侍中孝閔帝踐阼除御伯大夫進爵姚谷縣公仍使突厥結婚突厥可汗弟地頭可汗阿史郍庫頭居東靣與齊通和說其兄欲背先約計謀已定將以荐等送齊荐知其意乃正色責之辭氣慷慨涕泗横流可汗慘然良久曰幸無所疑當共平東賊然後發遣我女乃令荐先報命仍請東討以奉使稱㫖遷大將軍保定四年又納幣於突厥還行小司馬又行大司徒從陳公純等逆女於突厥進爵南安郡公天和三年遷總管梁州刺史後以疾卒王慶字興慶太原祈人也父因魏靈州刺史懷徳縣公慶少開悟有才畧初從文帝征伐復𢎞農破沙苑並有戰功毎獲殊賞大統十年授殿中將軍孝閔帝踐阼晉公䕶引為典籖慶樞機明辯漸見親待授大都督武成元年以前後功賜爵始安縣男二年行小賔部保定二年使吐谷渾與其分疆仍論和好吐谷渾主悦服遣所親隨慶貢獻初突厥與周和親許納女為后既而齊人知之懼成合從之勢亦遣使求婚財饋甚厚突厥貪其重賂便許之朝議以魏氏昔與蠕蠕結婚遂為齊人離貳今者復恐改變欲遣使結之遂授慶左武伯副楊荐為使是嵗遂興入并之役慶乃引突厥騎與隋公楊忠至太原而還及齊人許送皇姑及世母朝廷遂與通和突厥聞之復致疑阻於是又遣慶往諭之可汗感悦結好如初五年復與宇文貴使突厥逆女自此以慶信著北蕃頻歳出使後更使突厥屬其可汗暴殂突厥謂慶曰前後使來值我國喪者皆𠢐靣表哀况今二國和親豈得不行此禮慶抗辭不從曰我中華之禮臨喪哭泣而已欲今𠢐靣必不敢聞命突厥見其守正卒不敢逼武帝聞而嘉之録慶前後使功遷開府儀同三司兵部中大夫進爵為公歴丹中二州刺史為政嚴肅吏不敢犯大象元年授小司徒加上大將軍總管汾石二州五鎮諸軍事汾州刺史又除延州總管進位柱國隋開皇元年進爵平昌郡公卒于鎮贈上柱國諡曰莊子淹嗣趙剛字僧慶河南洛陽人也祖寧魏髙平太守父和永平中陵江將軍南討度淮聞父喪輙還所司將致之於法和曰罔極之㤙終天莫報若許安喪禮畢而即罪戮死且無恨言訖號慟悲感傍人主司以聞遂宥之喪畢除寧逺將軍大統初追贈膠州刺史剛少機辯有幹能起家奉朝請累遷金紫光禄大夫領司徒府從事中郎加内閤都督及孝武與齊神武構隙剛密奉㫖召東荆州刺史馮景昭未及發而神武已逼洛陽孝武西遷景昭集府僚文武議其去就司馬馮道和請據州待北方處分剛抽刀投地曰公若為忠臣可斬道和如欲從賊可見殺景昭感悟遂率衆赴闗右屬侯景逼穰城東荆州人楊歡等起兵應景以其衆邀景昭於路景昭戰敗剛遂投於蠻後自贖免乃見東魏東荆州刺史李魔憐勸令歸闗西魔憐納之使剛至并州宻觀事勢神武引剛内宴因令剛齎書申飭荆州剛還報魔憐仍説魔憐斬楊歡等以州歸西魔憐乃使剛入朝大統初剛於灞上見文帝具陳闗東實情文帝嘉之封陽邑縣子論復東荆州功進爵臨汝縣伯初賀拔勝獨孤信以孝武西遷之後並流寓江左至是剛言於魏文帝請追而復之乃以剛為兼給事黄門侍郎使梁魏興齎移書與其梁州刺史杜懐珤等即與剛盟歃受移送建康仍遣人隨剛報命是年又詔剛使三荆聽在所便宜從事使還稱㫖進爵武成縣侯除大丞相府帳内都督復使魏興重申前命尋而梁人禮送賀拔勝獨孤信等頃之御史中尉董紹進策請圖梁漢以紹為行臺梁州刺史剛以為不可而朝議已决遂出軍紹竟無功還免為庶人除剛潁川郡守髙仲宻以北豫州來附兼大行臺左丞持節赴潁川節度義軍師還剛别破侯㬌前驅於南陸復獲其郡守二人時有流言傳剛東叛神武因設反間聲遣迎接剛乃率騎襲其丁塢拔之文帝知剛無貳乃加賚焉除營州刺史進爵為公渭州人鄭五醜構逆與叛羌傍乞鐡怱相應令剛往鎮之將發魏文帝引見内寢舉觴屬剛曰昔侯景在東為卿所困黠羌小醜豈足勞卿謀慮也時五醜已尅定夷鎮所在立柵剛至並攻破之𣪚其黨與五醜於是西奔鐡怱剛又進破鐡怱偽廣寧郡屬宇文貴等西討詔以剛行渭州事資給糧餼加驃騎大將軍開府儀同三司入為光禄卿六官建拜膳部中大夫孝閔帝踐阼進爵浮陽郡公出為利州總管沙州氐恃險逆命剛再討復之方州生獠自此始從賦役剛以信州濵江負險乃表請討之詔剛率利沙等十四州兵往經畧焉仍加授渠州刺史剛初至渠帥憚其軍威相次降欵剛師出踰年士卒疲弊尋復亡叛後遂以無功而還又與所部儀同尹才失和被徴赴闕遇疾卒於路贈中浙涿三州刺史諡曰成子元卿仲卿仲卿酷暴列在隋酷吏傳中趙昶字長舒天水南安人也曽祖襄仕魏至中山郡守因家於代焉昶少聰敏有志節弱冠以材力聞魏北中郎將髙千鎮陜以昶為長史中軍都督文帝平𢎞農擢為相府典籖大統九年大軍失律於芒山清水氐酋李䑕仁自軍逃還慿險作亂文帝將討之先求可使者遂令昶使焉昶見䑕仁喻以禍福羣凶或從或不從其不從命者復將加刅於昶而昶神色自若志氣彌厲䑕仁感悟遂相率降氐梁道顯叛攻南由文帝復遣昶慰喻之道顯等皆即款附東秦州刺史魏光因徙其豪帥三十餘人并部落於華州文帝即以昶為都督領之先是汾州胡叛再遣昶慰勞之皆知其虚實及大軍往討昶為先驅遂破之以功封章武縣伯十五年拜安夷郡守帯長虵鎮將氐俗荒獷昶咸懷以禮莫不悦服朞歳之後樂從軍者千餘人加授帥都督時屬軍興科發切急氐情難之復相率謀叛昶又潛遣誘説離間其情因其攜貳遂輕往臨之羣氐不知所為咸來見昶乃收其首逆者二十餘人斬之餘衆遂定朝廷嘉之除大都督行南秦州事時氐帥蓋閙等反昶復討禽之又與史寧破宕昌羌獠二十餘萬拜武州刺史魏恭帝初加驃騎大將軍開府儀同三司潭水羌叛殺武陵潭水二郡守昶率儀同駱天人等討平之明帝初鳯州人仇周貢魏興等反自號周公破廣化郡攻没諸縣分兵西入圍廣業修城二郡廣業郡守薛爽修城郡守杜杲等請昶為援昶遣使報杲為周貢黨樊伏興等所獲興等知昶將至解修城圍據泥功嶺設六伏以待昶昶至遂遇其伏合戰破之廣業之圍亦解昶追之至泥陽川而還興州人叚吒及氐酋羌多復反攻沒郡縣昶討斬之昶自以被拔擢居將帥之任傾心下士虜獲氐羌撫而使之皆為昶盡力文帝常曰不煩國家士馬而能威服氐羌者趙昶有之矣至是明帝録前後功進爵長道郡公賜姓宇文氏賞勞甚厚二年徴拜賔部中大夫行吏部尋以疾卒王悦字衆喜京兆藍田人也少有器幹為州里所稱文帝初定關隴悅率募郷里從軍屢有戰功大統元年除相府刑獄參軍封藍田縣伯四年東魏將侯㬌攻圍洛陽文帝赴援悦又率郷里千餘人從軍至洛陽將戰之夕悦罄其行資市牛饗戰士悦所部盡力斬獲居多遷大行臺右丞轉左丞久居管轄頗獲時譽三年侯景據河南來附仍請兵為援文帝先遣韋法保賀蘭願徳等帥衆助之悦言於文帝曰侯景之於髙歡始則篤郷黨之情末乃定君臣之契位居上將職重台司論其分義有同魚水今歡始死景便離貳豈不知君臣之道有違忠義之禮不足蓋其圖既大不䘏小嫌然尚能背徳於髙氏豈肯盡節於朝廷今若益之以勢援之以兵非唯侯景不為池中之物亦恐朝廷貽笑將来也文帝納之乃遣追法保等而景尋叛後拜京兆郡守𣪚騎常侍遷大行臺尚書從達奚武征梁漢軍出武令悦説其城主楊賢悦乃貽之書賢於是遂降悦又白武云白帝衝要是必爭之地今城守寡弱易可圖也若蜀兵更至攻之實難武然之即令悦率輕騎徑趣白馬悦示其禍福梁將深悟遂以城降時梁武陵王蕭紀果遣其將任珍竒欲先據白馬行次闗城聞其已降乃還及梁州平文帝即以悦行刺史事招攜初附民吏安之魏廢帝二年徴還本任屬改行臺為中外府尚書員廢悦以儀同領兵還郷里悦既久居顯職及此之還私懷怏怏猶陵駕郷里失於宗黨之情其長子康恃悦舊望遂自驕縱所部軍人將有婚禮康乃非禮陵辱軍人訴之悦及康並坐除名仍配逺防及于謹伐江陵令悦從軍展効江陵平因留鎮之孝閔帝踐阼依例復官授郢州刺史尋拜使持節驃騎大將軍開府儀同三司大都督司水中大夫進爵藍田縣侯俄遷司憲中大夫賜姓宇文氏又進爵河北縣公悦性儉約不營生業雖外内榮顯家徒四壁而已明帝手勅勞勉之保定元年卒於位子康嗣官至司邑下大夫趙文表其先天水西人也後徙居南鄭累世為二千石父珏性方嚴有度量位御伯中大夫封昌國縣伯贈虞絳二州刺史諡曰貞文表少而修謹志存忠節起家為文帝親信累遷左金紫光禄大夫保定五年授畿伯下大夫遷許公宇文貴府長史尋拜車騎大將軍儀同三司仍從貴使突厥迎皇后進止儀注皆令文表典之文表斟酌而行皆合禮度及皇后將入境突厥託以馬瘦徐行文表慮其為變遂説突厥使羅莫縁曰后自發彼蕃已淹時序途經沙漠人馬疲勞且東㓂毎伺間隙吐谷渾亦能為變今君以可汗愛女結婚上國曽無防慮豈人臣之禮乎莫縁然之遂倍道兼行數日至甘州以迎后功别封伯陽縣伯天和三年除梁州總管府長史所管地名恒稜者方數百里並夷獠所居恃其險固常懷不軌文表率衆討平之遷蓬州刺史政尚仁恕夷獠懷之加驃騎大將軍開府儀同三司又加大將軍進爵為公大象中拜吳州總管時開府毛顓為吳州刺史及隋文帝執政尉遲迥等舉兵逺近騷然人懷異望顓自以秩大且為國家肺腑懼文表背己謀欲先之乃稱疾不出文表往問之顓遂手刅文表因令其吏民告云文表謀反仍馳啟其狀帝以諸方未定恐顓為變遂授顓吳州總管以安之後知文表無異志雖不罪顓而聽其子仁海襲爵元定字願安河南洛陽人也祖比魏婺州刺史父道龍鉅鹿郡守定惇厚少言内沈審而外剛毅從文帝討侯莫陳悦以功拜歩兵校尉孝武西遷封髙邑縣男定有雄畧累從征伐毎戰必陷陣然未嘗自言其功文帝深重之諸將亦稱其長者累加驃騎大將軍開府儀同三司進爵為公魏廢帝二年以宗室進封建城郡王三年行周禮爵隨例降改封長湖郡公明帝初拜岷州刺史威恵兼濟甚得羌豪之情先是生羌據險不賔者至是並出山谷從征賦焉及定代還羌豪等咸戀慕之保定中授左宫伯中大夫久之轉左武伯中大夫進位大將軍天和二年陳湘州刺史華皎舉州歸梁梁主欲因其隙更圖攻取乃遣使請兵詔定從衛公直率衆赴之梁人與華皎皆為水軍定為陸軍直總督之俱至夏口而陳郢州堅守不下直令定圍之陳遣其將淳于量徐度吳明徹等水陸來拒皎為陳人所敗直得脱身歸梁定既孤軍縣隔進退無路陳人乘勝水陸逼之定乃率所部斫竹開路且戰且行欲趣湘州而湘州已陷徐度等知定窮迫遣使偽與定通和重為盟誓許放還國定疑其詭詐欲力戰死之而定長史長孫隆及諸將等多勸定和定乃許之於是與度等刑牲歃血解仗就船為度等所執所部衆軍亦被囚虜送詣丹陽居數月憂憤發病卒子樂嗣楊􅋆字顯進正平髙涼人也祖貴父猛並為縣令􅋆少豪俠有志氣魏孝昌中爾朱榮殺害朝士大司馬城陽王元徽逃難投􅋆􅋆藏而免之孝莊帝立徽乃出復為司馬由是􅋆以義烈聞擢拜伏波將軍給事中元顥入洛孝莊北度太行及爾朱榮奉帝南討至馬渚􅋆乃具船以濟王師顥平封肥如縣伯加鎮逺將軍歩兵校尉行濟北郡事進都督平東將軍太中大夫從孝武入闗進爵為侯加撫軍將軍銀青光禄大夫時東魏遷鄴文帝欲知其所為乃遣􅋆間行詣鄴以觀察之使還稱㫖授通直𣪚騎常侍車騎將軍稽胡恃險不賔屢行鈔竊以􅋆兼黄門侍郎往慰撫之􅋆頗有權畧䏻得邊情誘化酋渠多來款附乃有隨􅋆入朝者時𢎞農為東魏守􅋆從文帝攻拔之然自河以北猶附東魏􅋆父猛先為邵郡白水令􅋆與豪右相知請微行詣邵郡舉兵以應朝廷文帝許之􅋆遂行與土豪王覆憐等陰謀舉事宻相應㑹内外俱發遂拔郡禽守程保及縣令四人並斬之衆議推􅋆行郡事􅋆以因覆憐成事遂表覆憐為邵郡守以功授大行臺左丞仍率義徒更為經畧於是遣諜人誘説東魏城堡旬月之間正平河北南汾二綘建州大寧等諸城並有請為内應者大軍因攻而拔之以􅋆行正平郡事左丞如故齊神武敗於沙苑其將韓軌潘樂可朱渾元等為殿􅋆分兵要截殺傷甚衆東雍州刺史司馬恭懼􅋆威聲棄城遁走􅋆遂移據東雍州文帝以􅋆有謀畧堪委邊任乃表行建州事時建州逺在敵境然􅋆威恩夙著所經之處多贏糧附之比至建州衆已一萬東魏州刺史車折干洛出兵逆戰􅋆擊敗之又破其行臺斛律俱於州西大獲甲仗及軍資以給義士由是威名大振東魏遣太保尉景攻陷正平復遣行臺薛修義與斛律俱相㑹於是敵衆漸盛􅋆以孤軍無援且腹背受敵謀欲拔還復恐義徒背叛遂偽為文帝書遣人若從外送來者云已遣軍四道赴援因令人漏泄使所在知之又分土人義酋令各領所部四出鈔掠擬供軍費􅋆分遣訖遂於夜中拔還邵郡朝廷嘉其權以全軍即授建州刺史時東魏以正平為東雍州遣薛榮祖鎮之乃先遣竒兵急攻汾橋榮祖果盡出城中戰士於汾橋拒守其夜􅋆從他道濟遂襲尅之進驃騎將軍邵郡人以郡東叛郡守郭武安脱身走免􅋆又率兵攻而復之轉正平郡守又擊破東魏南綘郡虜其郡守屈僧珍錄前後功封郃陽縣伯芒山之戰􅋆攻拔桓谷塢因即鎮之及大軍不利􅋆亦拔還而東魏將侯景率騎追􅋆􅋆與儀同韋法保同心抗禦且戰且進景乃引退文帝嘉之復授建州刺史鎮車箱􅋆久從軍役未及葬父至是表請遷葬詔贈其父車騎大將軍儀同三司晉州刺史贈其母夏陽縣君並給儀衛州里榮之及齊神武圍玉璧别令侯景趣齊子嶺􅋆恐入㓂邵郡率騎禦之景逺聞􅋆至斫木斷路者六十餘里猶驚而不安遂退還河陽其見憚如此十二年進授大都督加晉建二州諸軍事又攻破蓼塢獲東魏將李顯進儀同三司尋加開府復鎮邵郡十六年大軍東討授大行臺尚書率義衆先驅敵境攻其四戌拔之時以齊軍不出乃追􅋆還改封華陽縣侯又於邵郡置邵州以􅋆為刺史率所部兵鎮之保定四年遷少師其年大軍圍洛陽詔􅋆出軹闗然􅋆自鎮東境二十餘年數與齊人戰毎常尅獲以此遂有輕敵之心時洛陽未下而􅋆深入敵境又不設備齊人奄至大破􅋆軍􅋆以衆敗遂降於齊􅋆之立勳也有慷慨壯烈之志及軍敗遂就虜以求茍免時論以此鄙之朝廷猶録其功不以為罪令其子襲爵韓襃字𢎞業潁川潁陽人也祖瓌魏平涼郡守安定郡公父演恒州刺史襃少有志尚好學而不守章句其師怪問之對曰文字之間常奉訓誘至商較異同請從所好師因此竒之及長渉獵經史深沈有逺畧屬魏室喪亂避地夏州時文帝為刺史素聞其名待以客禮及賀拔岳為侯莫陳悦所害諸將遣使迎文帝文帝問以去留之計襃曰此天授也何可疑乎文帝納焉及為丞相引為錄事參軍賜姓侯吕陵氏大統初遷行臺左丞賜爵三水縣伯丞相府從事中郎出鎮淅酈居二年徴拜丞相府司馬進爵為侯出為北雍州刺史州帯北山多有盗賊襃宻訪之並豪右所為也而陽不之知厚加禮遇謂曰刺史起自書生安知督盗所賴卿等共分其憂耳乃悉召傑黠少年素為郷里患者置為主帥分其地界有盗發而不獲者以故縱論於是諸被署者莫不惶懼皆首伏曰前盗發者並某等為之所有徒侣皆列其姓名或亡命隠匿者亦悉言其所在襃乃取盗名簿蔵之因大牓州門曰自知行盗者可急來首即除其罪盡今月不首者顯戮其身籍沒妻子以賞前首者旬月之間諸盗咸悉首盡襃取名簿勘之一無差異並原其罪許以自新由是羣盗并息入為給事黄門侍郎遷侍中除都督西涼州刺史羌胡之俗輕貧弱尚豪富豪富之家侵漁百姓同於僕𨽻故貧者日削豪者益富襃乃悉募貧人以充兵士優復其家蠲免徭賦又調富人財物以振給之毎西域商貨至又先盡令貧者市之於是貧富漸均戸口殷實魏廢帝元年為㑹州刺史後以驃騎大將軍開府儀同三司進爵為公累遷汾州刺史先是齊宼數入人廢耕桑前後刺史莫能防扞襃至適㑹宼來乃不下屬縣人既不備以故多被抄掠齊人喜於不覺以為州先未集兵今還必不能追躡由是益懈不為營壘襃已先勒精鋭伏北山中分據險阻邀其歸路乘其衆怠縱伏擊之盡獲其衆故事獲生口者並送京師襃因是奏曰所獲賊衆不足為多俘而辱之但益其忿耳請一切放還以徳報怨有詔許焉自此抄兵頗息遷河州總管仍轉鳯州刺史尋以年老請致仕詔許之天和五年拜少保歴事三帝以忠厚見知武帝深相敬重常以師道處之毎入朝見必有詔令坐然後始論政事卒贈涇岐燕三州刺史諡曰貞子繼伯嗣仕隋位終衞尉少卿趙肅字慶雍河南洛陽人也世仕河西及沮渠氏滅曽祖武始歸於魏賜爵含城侯祖興中書博士父申侯舉秀才為後軍府主簿肅早有操行知名於時孝昌中起家殿中侍御史累遷左將軍太中大夫東魏天平初除新安郡守秩滿還洛陽大統三年獨孤信東討肅率宗人為郷導授司州治中轉别駕監督糧儲軍用不匱文帝聞之謂人曰趙肅可謂洛陽主人也九年行華山郡事十三年除廷尉少卿明年元日當行朝禮非有封爵者不得預焉肅時未有茅土不入左僕射長孫儉啟文帝請之文帝乃召肅謂曰歳初行禮豈得使卿不預然何為不早言也於是令肅自選封名肅曰河清乃太平之應竊所願也於是封清河縣子邑三百户十六年除廷尉卿加征東將軍肅久在理官執心平允凡所處斷咸得其情㢘慎自居不營産業時人以此稱之十七年進位車騎大將軍儀同三司𣪚騎常侍賜姓乙弗氏先是文帝命肅撰定法律肅積思累年遂感心疾去職卒於家子軌仕隋歴官有清名列在良吏傳張軌字元軌濟北臨邑人也父崇髙平令軌少好學志識開朗初在洛陽家貧與安樂孫樹仁為莫逆之友每易衣而出以此見稱軌常謂所親曰秦雍之間必有王者爾朱氏敗後遂杖策入闗賀拔岳以軌為記室參軍典機宻尋轉倉曹時榖價踊貴或有請貸官倉者軌曰以私害公非吾宿志濟人之難詎得相違乃賣所服衣物糴粟以振其乏及岳被害文帝以軌為都督從征侯莫陳悦悦平使於洛陽見領軍斛斯椿椿曰髙歡逆謀已傳行路人情西望以日為年未知宇文何如賀拔也軌曰宇文公文足經國武足定亂至於髙識逺度非愚管所測椿曰誠如卿言真可恃也文帝為行臺授軌郎中孝武西遷除中書舎人封夀張縣子兼著作佐郎修起居注遷給事黄門侍郎兼吏部郎中出為河北郡守在郡三年聲績甚著臨民政術有循吏之羙大統間言宰民者多推尚之入為丞相府從事中郎行武功郡事章武公導出鎮秦州以軌為長史魏廢帝元年進車騎大將軍儀同三司𣪚騎常侍二年賜姓宇文氏行南秦州事魏恭帝二年徴拜度支尚書復除隴右府長史卒官諡曰質軌性清素臨終之日家無餘財惟有書數百卷子肅明帝初為宣納上士轉中外府記室參軍中山公訓侍讀早有才名性頗輕猾時人比之魏諷卒以罪考竟終李彦字彦士梁郡下邑人也祖光之魏淮南郡守父靜南青州刺史彦少有節操好學慕古孝昌中解褐奉朝請孝武入闗兼著作佐郎修起居注大統初除通直散騎侍郎累遷左戸郎中十二年省三十六曹為十二部改授戸部郎中封平陽縣子魏廢帝初拜尚書右丞轉左丞彦在尚書十有五載屬軍國草創庶務殷繁留心省閣未嘗懈怠斷決如流畧無疑滯臺閣莫不歎其公勤服其明察遷給事黃門侍郎仍左丞賜姓宇文氏出為鄜州刺史彥以東夏未平固辭州任詔許之拜兵部尚書加驃騎大將軍開府儀同三司仍兼著作六官建改授軍司馬進爵為伯彥性謹恭有禮節雖居顯要於親黨之間恂恂如也輕財重義好施愛士時論以此稱之然素多疾而勤於莅職雖沈頓枕席猶理務不輟遂至於卒諡曰敬彥臨終遺誡其子等曰昔人以􅑆木為櫝葛纍為緘下不亂泉上不泄臭實吾平生之志也但事既矯枉恐為學士所譏今可歛以時服葬於磽塉之地勿用明器芻塗及儀衛等爾其念哉朝廷嘉焉不奪其志子昇明嗣少歴顯職大象末太府中大夫儀同大將軍仕隋終於齊州刺史子仁政長安縣長唐軍至以罪誅郭彥太原陽曲人也其先從宦闗右遂居馮翊父允靈武令彦少知名文帝臨雍州辟為西曹書佐累遷虞部郎中大統十二年初選當州首望統領郷兵除帥都督以居郎官著稱封龍門縣子進大都督恭帝元年除兵部尚書仍以本兵從柱國于謹南伐江陵進驃騎大將軍開府儀同三司進爵為伯六官建拜戸部中大夫孝閔帝踐阼出為灃州刺史蠻夷生梗不營農業彦勸以耕稼人皆務本亡命之徒咸從賦役先是灃州糧儲乏少毎令荆州遞送自彦莅職倉庾充實無復轉輸之勞齊南安城主馮顯宻遣使歸降其衆未之知也柱國宇文貴令彦率兵應接時齊人先令顯率所部送糧南下彦懼其衆不從命乃於路邀之顯因得自拔其衆果拒戰彦縱兵奮擊並虜獲之以南安無備即引軍掩襲遂有其城晋公䕶嘉之進爵懷徳縣公入為工部中大夫保定四年晉公䕶東討彦從尉遲迥攻洛陽迥復令彦與權景宣出汝南及軍次豫州使彦鎮之天和中為隴右總管府長史卒於官贈小司空宜鄜丹三州刺史梁昕字元明安定烏氏人也世為闗中著姓其先因官徙居亰兆之盩厔祖重耳漳縣令父勸儒中散大夫贈涇州刺史昕少温㳟見稱州里從爾朱天光征討拜右將軍太中大夫文帝迎魏孝武軍次雍州昕以三輔望族上謁文帝見昕容貌瓌偉深賞異之即授右府長流參軍累遷丞相府主簿大統十二年除河南郡守遷東雍州刺史昕撫以仁恵蠻夷悦之封安定縣子孝閔帝踐阼進位驃騎大將軍開府儀同三司明帝初進爵胡城縣伯天和初拜工部中大夫出為陜州總管府長史昕性温裕有幹能歴官内外咸著聲稱尋卒官贈大將軍諡曰貞昕弟榮位計部下大夫開府儀同三司朝郍縣伯贈涇寧豳三州刺史諡曰靜子巘仕隋為給事郎唐貞觀中終於鄭州刺史皇甫璠字景瑜安定三水人也世為西州著姓後徙居京兆父和本州中從事大統末追贈𣪚騎常侍儀同三司涇州刺史璠少忠謹有幹畧永安中辟為都督文帝為牧補主簿以勤事被知大統四年引為丞相府行參軍孝閔帝踐阼為守廟下大夫長樂縣子保定中為鴻州刺史入為小納言累遷蕃部中大夫進驃騎大將軍開府儀同三司璠性平和小心奉法安貞守志恒以清白自處當時稱為善人建徳三年為隨州刺史政存簡恵百姓安之卒官贈交渭二州刺史諡曰恭子諒少知名大象中位吏部下大夫諒弟誕列在隋史辛慶之字餘慶隴西狄道人也世為隴右著姓父顯宗馮翊郡守贈雍州刺史慶之少以文學徴詣洛陽對策第一除祕書郎屬爾朱氏作亂魏孝莊帝令司空楊津為北道行臺節度山東諸軍以討之津啟慶之為行臺左丞與參謀議至鄴聞孝莊帝崩遂出兖冀間謀結義徒以赴國難尋而節閔帝立乃還洛陽及賀拔岳為行臺復啟慶之為行臺吏部郎大統初從文帝東討為行臺左丞六年行河東郡事九年入為丞相府右長史兼給事黃門侍郎除度支尚書復行河東郡事遷南荆州刺史加儀同三司慶之位遇雖隆而率性儉素車馬衣服亦不尚華侈志量淹和有儒者風度特為當時所重又以其經明行修令與盧誕等教授諸王廢帝二年拜祕書監卒官子加陵主寢上士慶之族子昂字進君數嵗便有成人志行有善相人者謂其父仲畧曰公家雖世載冠冕然名徳富貴莫有及此兒者仲畧亦重昂志氣深以為然年十八侯景辟為行臺郎中景後來附昂遂入朝除丞相府行參軍後追論歸朝勳封襄城縣男及尉遲迥伐蜀昂占募從軍蜀平迥表昂為龍州長史領龍安郡事州帯山谷舊俗生梗昂威恵洽著吏民畏而愛之成都一方之㑹風俗舛雜迥以昂達於從政復表昂行成都令昂到縣便與諸生祭文翁學堂因共歡宴謂諸生曰子孝臣忠師嚴友信立身之要如斯而已若不事斯語何以成名各宜自勉克成令譽昂言切理至諸生等並深感悟歸而告其父老曰辛君教誡如此不可違之於是井邑肅然咸從其化遷梓潼郡守六官建入為司𨽻上士襲爵繁昌縣公保定二年為小吏部時益州殷阜軍國所資經塗艱險每苦刼盗詔昂使於益梁軍民之務皆委决焉昂撫導荒梗頗得寧靜天和初陸騰討信州蠻詔昂便於通渠等州運糧饋之時臨信楚合等諸州人庶多從逆昂諭以禍福赴者如歸乃令老弱負糧壯夫拒戰莫有怨者使還屬巴州萬榮郡人反叛圍郡城昂於是遂募通開二州得三千人倍道兼行出其不意又令其衆皆作中國歌直趣賊壘賊謂有大軍赴救望風瓦解朝廷嘉其權以濟事詔梁州總管杞國公亮即於軍中賞昂奴婢二十口繒綵四百匹又以昂威信布於宕渠遂表為渠州刺史轉通州推誠布信甚得夷獠歡心秩滿還京首領皆隨昂詣闕朝廷以昂化洽夷落進位驃騎大將軍開府儀同三司時晉公䕶執政昂稍被䕶親待武帝頗銜之及誅䕶加之箠椘因此遂卒昂族人仲景好學有雅量其髙祖欽後趙吏部尚書雍州刺史子孫因家焉父歡魏隴州刺史朱陽公仲景年十八舉文學對策髙第拜司空府主簿建徳中位内史下大夫開府儀同三司卒于家子衡王子直字孝正京兆杜陵人也世為郡右族父琳州主簿東雍州長史子直性節儉有幹能魏正光中州辟主簿起家奉朝請永安初拜鴻臚少卿孝武西遷封山北縣男大統初漢熾屠各阻兵於南山與隴東屠各共為脣齒文帝令子直率涇州歩騎五千討破之賜書勞問除尚書左外兵郎中兼中書舎之從解洛陽圍經河橋戰兼尚書左丞出為秦州總管府司馬時涼州刺史宇文仲和據州逆命子直從隴右大都督獨孤信討平之復入為大行臺郎兼丞相府記室除太子中庶子領齊王友尋行馮翊郡事廢帝元年拜使持節大都督行𤓰州事務以徳政化人西土悦附恭帝初徴拜黄門侍郎卒官子宣禮柱國府參軍杜杲字子暉京兆杜陵人也祖建魏輔國將軍贈蒙州刺史父皎儀同三司武都郡守杲學渉經史有當世幹畧其族父清貞有識鑒深器重之常曰吾家千里駒也時仕魏為黄門侍郎兼度支尚書衛大將軍西道大行臺尚孝莊妹新豐公主因薦之朝廷永熙三年起家奉朝請明帝初為修城郡守屬鳯州人仇周貴等構亂攻逼修城杲信洽於人部内遂無叛者尋率郡兵與開府趙昶合勢並破平之入為司㑹上士初陳文帝弟安成王頊為質於梁及江陵平頊隨例遷長安陳人請之文帝許之而未遣至是帝欲歸之命杲使焉陳文帝大悦即遣使報聘并賂黔中數州地仍請畫野分疆永敦隣好以杲奉使稱㫖進授都督行小御伯更往分界陳於是歸魯山郡乃拜頊柱國大將軍詔杲送之還國陳文帝謂杲曰家弟今蒙禮遣寔是周朝之恵然不還魯山亦恐未能及此杲答曰安成之在闗中乃咸陽一布衣耳然是陳之介弟其價豈止一城本朝親睦九族恕己及物上遵太祖遺㫖下思繼好之義所以發徳音者葢為此也若知止侔魯山固當不貪一鎮况魯山梁之舊地梁即本朝藩臣若以始末言之魯山自合歸國云以尋常之土易己骨肉之親使臣猶謂不可何以聞諸朝廷陳文帝慙恧久之乃曰前言戱之耳自是接遇有加常禮及還引升殿親降御座執手以别朝廷嘉之授大都督小載師下大夫行小納言復聘於陳及華皎來附詔令衞公直都督元定等援之定等並沒自是連兵不息東南騷動武帝授杲御正中大夫使陳論保境息民之意陳宣帝遣其黃門侍郎徐陵謂杲曰兩國通好彼朝受我叛人何也杲曰陳主昔在本朝非慕義而至主上授以柱國位極人臣子女玉帛備禮將送今主社稷孰謂非恩郝烈之徒邊人狂狡曽未報徳而先納之今受華氏正是相報過自彼始豈在本朝陵曰彼納華皎志圖吞噬此受郝烈容之而已且華皎方州列將竊邑叛亡郝烈一百許戸脱身逃竄大小有異豈得同年而語乎杲曰大小雖殊受降一也若論先後本朝無失陵曰周朝送主上還國既以為恩衞公共元定度江孰云非怨計恩與怨亦足相埓杲曰元定等軍敗身囚其怨已滅陳主負扆馮玉其恩猶在且怨由彼國恩起本朝以怨酬恩未之聞也陵歎而不答杲因陳和通之便陵具以聞陳宣帝許之遂遣使來聘建徳初授司城中大夫仍使於陳宣帝謂杲曰長湖公軍人等雖築館處之然恐不能無北風之戀王襃庾信之徒既羇旅闗中亦當有南枝之思耳杲揣陳宣帝意欲以元定軍將士易王襃等乃答之曰長湖總戎失律臨難苟免既不死節安用此為且猶牛之一毛何能損益本朝之議初未及此陳宣帝乃止及杲還至石頭又遣謂之曰若欲合從共圖齊氏能以樊鄧見與方可表信杲答曰合從圖齊豈唯敝邑之利必須城鎮宜待得之於齊先索漢南使臣不敢聞命還除司倉中大夫又使於陳杲有辭辯閑於占對前後將命陳人不能屈陳宣帝甚敬異之時元定已卒乃禮送開府賀拔華及定棺柩杲受之以歸除河東郡守遷温州刺史賜爵義興縣伯大象元年徴拜御正中大夫復使陳二年除申州刺史加開府儀同大將軍進爵為侯除同州刺史隋開皇元年以杲為同州總管進爵為公俄遷工部尚書二年除西南道行臺兵部尚書尋以疾卒子運大象末宣納上士杲兄長暉位儀同三司呂思禮東平夀張人也性温潤不雜交游年十四受學於徐遵明長於論難諸生為之語曰講書論易鋒難敵十九舉秀才對策髙第除相州功曹參軍葛榮圍鄴思禮有守禦勳賜爵平陸縣伯除欒城令普泰中僕射司馬子如薦為尚書二千石郎中尋以地寒被出兼國子博士乃求為闗西大行臺郎中與姚㓜瑜茹文就俱入闗為行臺賀拔岳所重專掌機宻甚得時譽岳為侯莫陳悦所害趙貴等議遣赫連達迎文帝思禮預其謀及文帝為闗西大都督以思禮為府長史尋除行臺右丞以迎魏孝武功賜爵汶陽縣子加冠軍將軍黃門侍郎魏文帝即位領著作郎除安東將軍都督尚書兼七兵殿中二曹事從禽竇㤗進爵為侯大統四年以謗訕朝政賜死思禮好學有才雖務兼軍國而手不釋卷晝理政事夜即讀書令蒼頭執燭燭燼夜有數升沙苑之㨗命為露布食頃便成文帝歎其工而且速所為碑誄表頌並傳於世七年追贈車騎將軍定州刺史子亶嗣大象中位至駕部下大夫時有博陵崔騰早有名譽庶職清顯為丞相府長史亦以致書謗議賜死徐招字思賢髙平金郷人世為著姓招少好法律及朝廷舊事發言措筆常欲辨析秋毫初入洛陽雖未登仕已為時知朝廷疑事多預議焉魏延昌中從征浮山堰有功賜爵髙廣男及廣陽王深北討鮮于修禮啟為員外𣪚騎侍郎深府長流參軍招陳䇿請離間之葛榮竟殺修禮自為渠帥以功進爵為侯永安初射策甲科除員外散騎常侍領尚書儀曹郎中招少習吏事未能精究朝儀常恨才達恐名迹不立久之方轉二千石郎中爾朱榮死爾朱世隆屯兵河橋莊帝以招為行臺左丞自虎牢北度引馬塲河南之衆以抗世隆後爾朱兆得招鎖送洛陽仲逺數招罪將斬之招曰不虧君命得死為幸仲逺重之曰凡人受命理各為主今若為戮何以勸人臣乃釋之用為行臺右丞及仲逺南奔招獨還洛永熙末從孝武入闗中拜給事黄門侍郎兼尚書右丞時朝廷播遷典章遺闕至於臺省法式皆招所記論者多焉大統三年拜驃騎將軍侍中時魏文帝舅子王起化犯罪死有詔追贈招執奏止之後卒於度支尚書子山雲嗣檀翥字鳯翔髙平金郷人也六世祖毓晉歩兵校尉父江始還北仕至太常少卿贈兖州刺史翥十嵗喪父還京師宅與營人雜居雖㓜孤寒不與隣人來往好讀書解屬文能鼓琴早為琅邪王誦所知年十九以名家子為魏明帝挽郎後客游三輔時毛遐為行臺鎮北維表翥為行䑓郎中莊帝既誅爾朱榮遐使翥詣京師因除著作佐郎郎中如故後孝武帝西幸除兼中書舎人修國史大統初又兼著作佐郎以守闗迎駕勳封髙堂子後坐談論輕譟為黃門侍郎徐招所紏死於廷尉獄孟信字修仁廣川索盧人也家世貧寒頗傳學業信常曰窮則變變則通吾家傳儒學而未有通官當由儒非世務也遂感激棄書從軍永熙末除奉朝請從孝武帝入闗封東州子趙平太守政尚寛和權豪無犯山中老人常以㹠酒饋之信和顔接引慇懃勞問乃自出酒以鐡鐺温之素木盤盛蕪菁葅唯此而已久以一鐺借老人但執一杯各自斟酌申酬酢之意謂老人曰吾至郡來無人以一物見遺今卿獨有此餉且食菜已久欲為卿受一㹠髀耳酒既自有不能相費老人大悦再拜擘㹠進之酒盡方别及去官居貧無食唯有一老牛其兄子賣之擬供薪米券契已訖市法應知牛主住在所信適從外來見買牛人方知其賣也因告之曰此牛先來有病小用便發君不須也杖其兄子二十買牛人嗟異良久呼信曰孟公但見與牛未必須其力也苦請不得乃罷買牛者文帝帳下人文帝深嘆異焉未幾舉為太子少卿後遷太子太傅儒者榮之特加車騎大將軍儀同三司散騎常侍辭老請退文帝不奪其志賜車馬几杖衣服牀帳卒於家贈冀州刺史諡曰戴子儒宗懍字元懍南陽湼陽人也八世祖承永嘉亂討陳敏有功封柴桑縣侯除宜都郡守卒官子孫因居江陵父髙之梁山陰令懍少聪敏好讀書晝夜不倦語輙引古事鄊里呼為小兒學士梁大同六年舉秀才以不及二宫元㑹例不對策及梁元帝鎮荆州謂長史劉之遴曰貴郷多士為舉一有意少年之遴以懍應命即日引見令兼記室嘗夕被召宿省使製龍川廟碑一夜便就詰朝呈上梁元帝歎羙之後歴臨汝建城廣晉三縣令遭母憂去職哭輙嘔血兩旬之内絶而復蘇者三毎旦有羣烏數千集於廬舍候哭而來哭止而去時論稱之以為孝感所致梁元帝即位擢為尚書侍郎封信安縣侯累遷吏部尚書懔父髙之先為南䑓書侍御史犯憲懔願父釋罪當終身菜食髙之理雪故懔菜食鄊里稱之在元帝府府中多言其矯至是大進魚肉國子祭酒沛國劉㲄讓之曰本知卿不忠猶謂卿孝今日便是忠孝並無懍不能對懔博學有才藻口未嘗譽人朋友以此少之初侯景平後梁元帝議還建鄴唯懔勸都渚宫以其鄊在荆州故也及江陵平與王襃等入闗文帝以懔名重南土甚禮之孝閔帝踐阼拜車騎大將軍儀同三司明帝即位又與王襃等在麟趾殿刋定羣書數蒙宴賜保定中卒有文集二十卷行於世劉璠字寳義沛國人也六世祖敏以永嘉喪亂徙居廣陵父臧性方正篤志好學居家以孝聞仕梁為著作郎璠九嵗而孤居喪合禮少好讀書兼善文章年十七為上黃侯蕭曄所器重范陽張綰梁之外戚才髙口辯見推於世以曄懿貴亦假借之璠年少未仕而負才使氣不為之屈綰常於新渝侯宅因酒後詬京兆杜杲曰寒士不遜璠厲色曰此坐誰非寒士璠本意在綰而曄以為屬己辭色不平璠曰何王門之不可曵長裾也遂拂衣而去曄謝之乃止後隨曄在淮南璠母在建康遘疾璠弗之知嘗忽一日舉身椘痛尋而家信至云其母病璠即號泣戒道絶而復蘇當身痛之辰即母死之日也居喪毁瘠遂感風氣服闋後一年猶杖而後起及曄終於毗陵故吏多分散璠獨奉曄喪還都墳成乃退梁簡文時在東宫遇曄素重諸不送者多被劾責唯璠獨被優賞解褐王國常侍非其好也璠少慷慨好功名志欲立事邊城不樂隨牒仕進宜豐侯蕭修出為北徐州刺史即請為其輕車府主簿兼記室參軍修為梁州又版為中記室補華陽太守屬侯景度江梁室大亂修以璠有才略甚親委之時㓂難繁興未有所定璠乃喟然賦詩以見志其末章曰隨㑹平王室夷吾匡霸功虚薄無時用徒然慕昔風修開府置佐史以璠為諮議参軍梁元帝承制授樹功將軍鎮西府諮議参軍賜書曰鄧禹文學尚或執戈葛洪書生且云破賊前修無逺屬望良深元帝尋以修紹鄱陽之封且為雍州刺史復以璠為修北平府司馬及武陵王紀稱制於蜀以璠為中書侍郎屢遣召璠使者凡八反乃至蜀又以為黄門侍郎令長史劉孝勝深布心腹使工畫陳平度河歸漢圖以遺之璠苦求還中記室韋登私曰殿下忍而畜憾足下不留將致大禍脱使盗遮於葭萌則卿殆矣孰若共構大厦使身名俱羙哉璠正色曰卿欲緩頰於我邪我與府侯分義已定豈以寵辱夷險易其心乎丈夫立志當死生以之耳殿下方布大義於天下終不逞志於一人紀知不為己用乃厚贈而遣之臨别紀又解其佩刀贈璠曰想見物思人對曰敢不奉揚威靈克翦姦宄紀於是遣使拜修為益州刺史封隨郡王以璠為府長史加蜀郡太守還至白馬西屬達奚武軍已至南鄭璠不得入城遂降武文帝素聞其名先誡武曰勿使劉璠死也故武先令璠赴闕文帝見之如舊謂僕射申徽曰劉璠佳士古人何以過之徽曰昔晋人滅吳利在二陸明公今平梁漢得一劉璠也時南鄭尚拒守達奚武請屠之文帝將許焉唯令全修一家而已璠乃請之於朝文帝怒而不許也璠泣而固請移時不退桞仲禮侍側曰此烈士也文帝曰事人當如此遂許之城獲全璠之力也文帝既納蕭修之降又許其反國修至長安累月未之遣也璠因侍宴文帝曰我於古誰比對曰常以公為命世英主湯武莫逮今日所見曽是齊桓晉文之不若文帝曰我不得比湯武望與伊周為匹何桓文之不若乎對曰齊桓存三亡國晉文不失信於伐原語未終文帝撫掌曰我解爾意欲激我耳即命遣修蓋因顯璠存故主之義也修請與璠俱還文帝不許以璠為中外府記室遷黃門侍郎儀同三司璠嘗卧疾居家對雪感興乃作雪賦以述志焉初蕭修在漢中與蕭紀牋及答西魏書移襄陽文皆璠辭也明帝初授内史中大夫掌綸誥尋封平陽縣子璠在職清白簡亮不合於時左遷同和郡守璠善扵撫御莅職未期月生羌降附者五百餘家前後郡守多經營以致貲産唯璠清儉秋毫無所取妻子並隨羌俗食麥衣皮始終不改洮陽洪和二郡羌嘗越境詣璠訟理蔡公廣時鎮隴右嘉其善政又遷鎮陜州欲啟璠自隨羌人樂從者七百餘人聞者莫不歎異陳公純作鎮隴右引為總管府司錄甚禮敬之天和三年卒於官著梁典三十卷有集二十卷行於世子祥字休徴㓜聰慧賔客見者皆號神童事嫡母以至孝聞其伯父黃門郎璆有名江左在嶺南聞而竒之乃令名祥字休徴後以字行於世十嵗能屬文十二通五經仕梁為宜豐侯記室參軍江陵平隨例入闗中齊公憲召為記室府中書記皆令掌之封漢安縣子憲進爵為王以休徴為王友俄除内史上士武帝東征休徴陪侍帷幄平齊露布即休徴文也累遷車騎大將軍儀同大將軍歴長安萬年二縣令頗獲時譽卒於官初璠所撰梁典始就未及刋定而卒臨終謂休徴曰能成我志其在此書乎休徴修定繕寫勒成一家行於世桞遐字子昇河東解人宋大尉元㬌從孫也祖叔珍義陽内史事見梁史父季逺梁宜都太守遐㓜而爽邁神彩嶷然髫嵗便有成人之量篤好文學動合規矩其世父慶逺特器異之謂曰吾昔逮事伯父太尉公嘗謂吾云我昨夜夢汝登一樓甚峻麗吾以坐席與汝汝後名宦必達恨吾不及見耳吾向聊復晝寢又夣將昔時坐席還以賜汝汝之官位當復及吾特冝勉勵以應嘉祥也梁西昌侯藻鎮雍州遐時年十二以百姓禮修謁風儀端肅進止詳雅藻羡之試遣左右踐遐衣裾欲觀其舉措遐徐歩稍進曽不顧眄仕梁稍遷尚書功論郎陳郡謝舉時為僕射引遐與語甚嘉之顧謂人曰江漢英靈見於此矣岳陽侯蕭詧於襄陽承制授遐吏部郎賜爵聞喜公尋進位持節侍中驃騎大將軍開府儀同三司及詧踐帝位於江陵以襄陽來歸遐辭詧曰陛下中興鼎業龍飛舊椘臣昔因幸㑹早奉名節理當以身許國期之始終自晉氏南遷臣宗族葢寡從祖太尉世父儀同從父司空並以位望隆重遂家于金陵唯留先臣獨守墳柏嘗誡臣等使不違此志今襄陽既入北朝臣若陪隨鑾蹕進則無益塵路退則有虧先㫖詧重違其志遂許之因留郷里以經籍自娛文帝明帝頻徴固辭以疾及詧殂遐舉哀行舊臣之服保定中又徴之遐始入朝授驃騎大將軍開府儀同三司霍州刺史遐導人務先以徳再三不用命者微加貶異示恥而已其下感而化之不復為過咸曰我君仁恵如此其可欺乎卒贈金安二州刺史遐有至行初為州主簿其父卒於揚州遐自襄陽奔赴六日而至哀感行路毁悴不可識後奉喪西歸中流風起舟中人相顧失色遐抱棺號慟愬天求哀俄頃風止浪息其母嘗乳間發疽醫云此疾無可救理唯得人吮膿或望微止其痛遐應聲即吮旬日遂瘳咸以為孝感所致性又温裕畧無喜愠之容𢎞奬名教未嘗論人之短尤尚施與家無餘財臨終遺誡薄葬其子等並奉行之有十子靖莊最知名靖字思休少方雅博覽墳籍仕梁正員外隨遐入周授大都督歴河南徳廣二郡太守所居皆有政術吏民畏而愛之然性愛閑素其於名利澹如也及秩滿還郷便有終焉之志隋文帝踐極特詔徴之以疾固辭優游不仕閉門自守所對唯琴書而已足不歴園庭殆將十載子弟奉之若嚴君焉其有過者靖必下帷自責於是長㓜相率拜謝於庭靖然後見之朂以禮法鄊里亦慕而化之或有不善者皆曰唯恐桞徳廣得知也時論方之王烈前後總管到官皆親至靖家問疾遂以為故事秦王俊臨州賚以几杖并致衣服靖唯受几杖餘並固辭其為當世所重如此開皇中壽終莊列在隋史斛斯徴字士亮廣牧富昌人也其先世為莫弗大人父椿魏太保自有傳徴博渉羣書尤精三禮兼觧音律有至性居父喪朝夕共一溢米少以父勳賜爵城陽郡公大統末起家通直𣪚騎常侍稍遷兼太常少卿自魏孝武西遷雅樂廢缺徴博採遺逸稽諸典故創新改舊方始備焉又樂有錞于者近代絶此器或有自蜀得之皆莫之識徴見之曰此錞于也衆弗信之徴遂依干寳周禮注以芒筒捋之其聲極清衆乃嘆服徴仍取以合樂焉六官建拜司樂下大夫遷司樂中大夫進位驃騎大將軍開府儀同三司轉内史下大夫天和三年武帝以徴經有師法詔令授皇諸子宣帝時為魯公與皇諸子等咸服青衿行束脩之禮受業於徴仍並呼徴為夫子儒者榮之六年除司宗中大夫行内史事遷樂部進封岐國公尋轉小宗伯除太子太傅仍小宗伯宣帝嗣位遷上大將軍大宗伯時武帝初崩梓宫在殯帝意欲速葬令朝臣議之徴與内史宇文孝伯等固請依禮七月帝竟不許帝之為皇太子也宫尹鄭譯坐不能以正道調䕶被謫除名而帝雅親愛譯至是拜譯内史中大夫甚委任之譯乃獻新樂十二月各一笙毎笙用十六管帝乃令與徴議之徴駁而奏之曰禮云十二律轉相生聲五具在十六焉六律十二管還相為宫然詳一笙十六管總一百九十二管既無相生之理又無還宫之義臣恐鄭聲亂樂未合於古夫音樂之起本於人心天之應人有如影響為善者天報之以福為惡者天譴之以殃故舜彈五絃之琴歌南風之詩而天下化紂為朝歌北里之音而社稷滅是知樂也者和性情易風俗動天地感鬼神禍福所基盛衰攸繫安可不慎㢤按譯之所為不師古始若以月奏一笙則鐘鼓諸色各須一十有二雅樂之備已充廟庭今若益之於何陳列方須更闢階墀増修廊宇非急之務寧可勞人如謂笙管之外不須加造則樂之損益豈繫於笙進退無據竊謂未可帝頗納之且令停譯所獻及武帝山陵回帝欲作樂復令議其可否徴曰孝經云聞樂不樂聞尚不樂其况作乎鄭譯曰既云聞樂明即非無止可不樂何容不奏帝遂依譯議譯因此銜之帝後肆行非度昏虐日甚徴以荷武帝重恩嘗偹位師傅乃上疏極諌指陳帝失不納譯因譖之遂下徴於獄徴懼不免獄卒張元平哀之乃以佩刀穿牆送之出元平被捶拷百數而無所言徴既出匿於人家後遇赦得免然猶坐除名隋文帝踐極例復官爵除太子太傅仍詔徴修撰樂書開皇四年薨年五十六初隋文為大司馬有外姻喪徴就第弔之久而不出徴怒遂弗之待比出候徴已去矣隋文以此常恨之至是詔所司諡之曰闇子該嗣徴所撰樂典十卷兄恢散騎常侍新蔡郡公恢子政列在隋史通志卷一百五十九
