于闐西都烏滸水南二百餘里去長安一萬一百里王都號㧞底延盖王舍城也波斯居逹曷水之西都宿利城去代二萬四千二百二十八里西去海數百里東南去穆國四千餘里西至拂菻四千五百里即條支之故地伏盧尼都伏盧尼城在波斯國北去代二萬七千三百二十里悦般在烏孫西北朱俱波居于闐西千餘里西至渇槃陁南至女國三千里北至疏勒九百里南至葱嶺二百里渇槃陁治葱嶺東在朱俱波西西至䕶密國南至縣度山北至疏勒國界西北至判汗國鉢和在渇槃陁西有二道一道西行向嚈噠一道西南趨烏萇波知在鉢和西南賖彌在波知之南山烏萇在賖彌南北至葱嶺南至天竺波羅門乾陀在烏萇西阿鉤𦍑居莎車西南去代一萬三千里副貨去代一萬七千里東至阿富伏且國西至没誰國中間相去一千里北至奇沙國相去一千五百里疊伏羅去代三萬一千里㧞豆去代五萬一千里東至多勿當國西至旃那國中間相去七百五十里南至罽陵迦國北至弗那伏且國中間相去九百里者至㧞都者至㧞城在疏勒西去代一萬一千六百二十里迷密在者至㧞西去代一萬二千一百里悉萬斤都悉萬斤城在迷密西去代一萬二千七百二十里忸密在悉萬斤西去代二萬二千八百二十八里石國居於藥殺水都柘折城東與北至西突厥界西至波臘國界西南康居界南至率都沙郍國界南去撥汗六百里東南去𤓰州六千里女國在葱嶺南撥汗都葱嶺西五百餘里東去疏勒千里西去蘇對沙郍國五百里北去石國五百里東北去突厥可二千餘里東去𤓰州五千里吐火羅治薄提城去代萬二千里東至范陽國西至悉萬斤中間相去二千里北至波斯國中間相去一萬里劫國居葱嶺中西南與賖彌國界接西北至挹怛國去長安萬二千里陁羅伊羅居烏茶國北大雪山坡上越底延治辛頭河北南至婆羅門國三千里西至賖彌國千餘里北至𤓰州五千四百里大食居波斯之西右西域匃奴都單于庭直代雲中後分而為二北單于居單于庭南單于居西河羙稷漢建安末魏武始分其衆為五部魏立五部都尉以統之其左部都尉居太原故慈氏縣右部都尉居祈南部都尉居蒲子北部都尉居新興中部都尉居太陵至于晉初塞外匃奴盡向化由是與晉人雜處居平陽西河太原新興樂平諸郡靡不有焉烏桓都烏桓山漢武帝徙於上谷漁陽右北平遼東五郡塞外鮮卑都鮮卑山在柳城郡界軻比能小種鮮卑也居遼西右北平漁陽塞外宇文莫槐居遼東塞外徒河叚居遼西蠕蠕都弱落水其常所㑹庭則敦煌張掖之北高車都鹿渾海西北百餘里稽胡散居離石以西安定以東突厥世居金山後分為二其一曰沙鉢略可汗居都斤山又南徙于白道川西突厥居烏孫之故地南至突厥西至雷翥海南至疏勒北至瀚海在長安西北七千里鐡勒種類最多居西海之東依山據谷庫莫奚亦謂之奚都饒樂水即鮮卑故地契丹居松漠之間後徙遼西正北二百里依託紇臣水而居亦鮮卑故地其後都于和龍即唐之柳城也紇臣水一作紇臨水室韋居勿吉北千里去洛陽六千里地豆于居室韋西千餘里烏洛侯在地豆于北去代都四千五百餘里驅度寐在室韋北霫與靺羯鄰治黄水北亦鮮卑故地㧞悉彌在北庭北海南結骨東南依山散居去敦煌九千餘里右北狄通志卷四十一
