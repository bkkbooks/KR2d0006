body:
  text: 通志卷四十一宋右廸功郎鄭樵漁仲撰都邑略第一都邑序建邦設都皆馮險阻山川者天之險阻也城池者人之險阻也城池必依山川以為固大河自天地之西而極天地之東大江自中國之西而極中國之東天地所以設險之大者莫如大河其次莫如大江故中原依大河以為固吴越依大江以為固中原無事則居河之南中原多事則居江之南自開闢以來皆河南建都雖黄帝之都堯舜禹之都於今皆為河北在昔皆為河南大河故道自碣石入海碣石今平州也所以幽薊之邦冀都之壤皆為河南地周定王五年以後河道堙塞漸移南流至漢元光三年徙從頓邱入渤海今濵滄間也自成周以來河南之都惟長安與洛陽或逾河而居鄴者非長久計也自漢晉以來江南之都惟有建業或據上流而居江陵武昌者亦非長久計也是故定都之君惟此三都是定議都之臣亦惟此三都是議此三都者雖曰金湯之業屢為車轂之場或厯數百載或禪數十君髙城深池壍山堙谷斸土既多地絶其脉積污復久水化其味此隋人所謂不甚宜人者也而况衝車所攻矢石所集積骸灑血莽為荆榛斷垣壊壁鬼燐滅沒由兹鳩集能必其蕃育乎唐之末年博士朱朴獻遷都之議曰古之帝王不常厥居皆觀天地興衰隨時制事闗中周隋所都我實因之凡三百嵗文物資貨奢侈僭偽皆極焉廣明巨盗陷覆京闕髙祖太宗之制蕩然矣夫襄鄧之西夷漫數百里其東則漢與鳳林為之闕南則菊潭環屈而流屬於漢西有上洛重山之險北有白崖聫絡誠形勝之地沃衍之墟若廣浚河渠漕輓天下可使大集自古中興之君去已衰之衰就未王而王今南陽光武雖起而未王也臣視山河壯麗處多故都已盛而衰難可興已江南土薄水淺人心囂浮輕巧不可以都河北固水深土厚而人心彊愎狼戾未即可服襄鄧既為内地人心質良去秦咫尺而有上洛為侵軼之限此建都之極選也疏奏在廷無有是其說者豈以其人無足取故并廢其言與然其論去已衰之衰就未王而王則前此或未有之及矣臣竊觀自昔帝王之都未有建宸極於汴者雖晉之十六國徧處中州亦未聞有據夷門者何哉盖其地當四戰之衝無設險之山則國失依馮無流惡之水則民多疾癘七國之魏本都安邑為秦侵蝕不得已東徙大梁秦人卒決河流以灌其城王假就虜一國為魚焉自是曠千三四年無有居者朱全忠藉宣武資力以簒唐因而居汴未為都也不及五六年梟鏡殞命昬庸繼位或獻遷都之謀君臣皆謂夷門國家根本不可遽易遂為京室唐兵之來梁室之禍甚於王假晉遵覆轍邪律長驅取少帝如拾芥視朱氏又酷烈焉宋祖開基大臣無周公宅洛之謀小臣無婁敬入闗之請因循前人不易其故逮至九朝遂有靖康之難豈其徳之不建哉由地埶然爾六飛南廵駐蹕吴越朝曰行闕陵曰􅓖寢此豈絶念於卜宅哉咸陽郟鄏我陵我阿湯湯秦淮一葦可至而臣鄰未聞以定鼎之謀啟陳者毋亦以殘都廢邑土脉絶水泉鹵不足復興而夷門之痛况未定也嗚呼江沱不足宴安也毋已則採唐人之議取南陽為中原新宅且以繋人望云三皇都伏犧都陳宛邱城是也今陳州治周武王封舜之後於此神農都魯或云始都陳魯今兖州曲阜縣故又云神農營曲阜黄帝都有熊又遷涿鹿有熊今鄭州新鄭涿鹿即涿州五帝都少昊都窮桑即魯曲阜也故曰封伯禽於少昊之墟顓帝都髙陽澶州濮陽縣以顓帝居之故謂之帝邱其城中有顓帝冡存焉帝嚳都亳亦謂之髙辛即偃師縣今隸西京帝嚳為髙辛氏故都亦謂髙辛堯始封于唐後徙晉陽即帝位都平陽唐今定州唐縣猶有唐城存焉或云唐城在絳州翼城西二里及徙晉陽則以晉陽為唐今平定軍有古晉陽城是其地及為天子都平陽則又以平陽為唐平陽今晉州也舜始封于虞即帝位都蒲坂虞即南京虞城縣蒲坂隋改為河南縣今隸河中府夏都禹封於夏受禪之後都平陽又徙安邑夏今陜州夏縣安邑今隸蒲州平陽即堯都也禹在陽城者避商均之地而非都也按五子之歌曰惟彼陶唐有此冀方言堯舜及禹皆在冀州界少康中興復還舊都故左𫝊曰復禹之迹不失舊物商都契封於商後世遷于亳即西亳也成湯受命始遷于南亳故命以殷至仲丁遷于囂河亶甲居于相祖乙居于耿及盤庚五遷復都南亳至紂居朝歌商即上雒今為商州亳故京兆杜縣有亳亭是也杜城今在長安南故司馬遷云禹興西羌湯起亳也及湯有天下始居宋地復命以亳今南京穀熟是也或云河南偃師是盖有溵水出陽城東至西華汝陽入于潁與潁水合流古人并謂潁為溵故命以溵焉此謂之南亳囂亦作敖即河南之敖倉也相今為相州耿河中府龍門縣南十二里故耿城是朝歌隋改為衛縣衛州朝歌故城有縣西二十二里衛縣熈寕中省為鎮入黎陽夏商之際諸侯都昆吾夏之伯國杜預云東都濮陽縣按唐武徳四年析濮州濮陽置昆吾縣復舊名也八年復省入濮陽大彭商之伯國今徐州彭城是也豕韋亦商之伯國或謂之韋杜預云東郡白馬縣東南有韋城按今滑州韋城是也有豢龍井在韋城古城之内唐杜唐杜一國名商末豕韋國於唐周成王滅唐而遷之於杜為杜伯唐今定州唐縣杜在永興軍長安縣南十五里曰下杜城猶有杜伯冡在焉顧夏之諸侯國濮州范縣東南二十八里有故顧城六廬州舒城東南六十里有故六城虞夏之際封臯陶於此蓼夀州霍邱縣六蓼皆虞夏所以封臯陶扈夏為扈商為崇秦改扈為鄠今鄠縣北二十里有故扈城城周四里亦有甘亭即啟與有扈戰處鉏故鉏城在澶州衛南縣東十五里此羿本國羿後遷于窮石寒寒浞之國今濰州東二十三里寒亭是也斟灌夏同姓國杜預云樂安夀光縣東南有灌亭按夀光今隸青州斟尋夏同姓國按漢北海郡有斟縣其地在今濰州東南五十里尚有斟亭京相璠云斟尋去斟亭七里過澆之國一名有過萊州掖縣北有過鄉戈豷之國在宋鄭之間崇永興鄠縣東在夏為扈在商為崇姺商時國邳商時國今淮陽治下邳是宻須按今涇州靈臺有宻康公墓或云涇州保定有隂宻城甲父單州有甲父城飂飂叔安之國亦作廖唐州湖陽是襃襃姒之國疑蔡州襃信是防風氏湖州武康縣是厥古厥國鄆州中都有厥陽亭葛南京寗陵縣有故寗城是北去亳城百里亳即湯始居或云許州郾城北三十里有葛伯城然皆指其處也周都周本扶風郡之地名后稷始封於此其所居之地謂之邰公劉遷於豳豳亦作邠大王避狄去豳居岐及文王徳業光大作邑於豐而典治南國武王有天下乃居鎬京豐在豐水之西鎬在豐水之東周地西廹戎俗自岐之豐自豐之鎬是西逺戎而東即華也武王克商乃遷九鼎于郟鄏至成王始定鼎于此而城之以為東都謂之王城及三監導紂子武庚叛成王乃命周公營洛邑遷商之頑民於此謂之成周自武王十一世至幽王為犬戎所滅太子宜臼徙居王城謂之東周是為平王東徙之後則以王城為周而以鎬京為宗周自平王十三世至敬王有王子朝之難王城墮廢又遷成周成周在東河南在西又以王城為西周成周為東周故公羊曰王城者西周也由春秋後至赧王時周分為二而赧王復居王城為西周考王弟桓公之孫恵公居成周為東周邰今武功縣斄城是也豳班固云栒邑有豳鄉按栒邑故城在今邠州三水縣東北或云三水西南三十里有古豳城是也岐今鳳翔岐山是也豐鎬皆水名豐在今永興鄠縣東南鎬去豐二十里王城今河南縣成周今洛陽縣周諸侯都魯都曲阜魯本少昊摯居之謂之少昊之墟又大庭氏居之魯於其上作庫故謂大庭氏之庫至周成王以周公之功而封伯禽於此其地本名魯乃作都於曲阜宋祥符中改曲阜為仙源今隸兖州齊都薄姑遷于營邱齊本顓帝之墟營邱今臨淄縣薄姑亦謂之蒲姑在其西北或云營邱故城在濰州昌樂而青州博興有蒲姑故城宋都商邱杜預云梁國睢陽縣按睢陽隋改為宋城今南京治本陶唐氏之火正小伯之墟以其主火故為大辰之墟相土因之武王伐紂封紂子武庚於邶武庚叛成王殺之更封紂兄子㣲子啟於宋以為商後故謂之商邱衛都朝歌及懿公為狄所滅宋桓公迎衛之餘民渡河立戴公以廬於曹後齊桓公城楚邱而居文公焉至成公又遷於帝邱朝歌故城在衛縣西二十二里衛縣宋熈寕省為鎮入黎陽本紂都故謂之商墟曹亦作漕今滑州白馬是也楚邱今單州成武帝邱本顓帝之墟故曰帝邱夏王之世昆吾氏居之故亦謂之昆吾之墟今澶州濮陽縣鄭都本西周畿内之地周宣王以封母弟桓公友及幽王有犬戎之變鄭武公遂遷于濟洛河潁之間謂之新鄭鄭之始都謂之故鄭今華州鄭縣是也有鄭故城在縣北新鄭今之滎陽晉都唐謂之夏墟大名也本堯所都謂之平陽成王封母弟叔虞於此初謂之唐其子爕立始改為晉以有晉水出焉其地正名翼亦名絳而平陽者是其總名及昭侯立封叔父桓叔於曲沃後曲沃盛彊桓叔之孫武公滅翼遂有晉都至景公遷於新田又謂新田為絳而謂平陽為故絳唐今定州唐縣猶有唐城或云唐城在絳州翼城西二里平陽今為絳州縣翼晉之舊都今絳州翼城是也尚有故城在縣東南曲沃今為絳州縣晉先君祖廟並在此新田一名絳今絳州絳縣是也或云絳故城在曲沃南一里景公以後並都是楚都丹陽周成王封熊繹以子男之田盖居於此至熊達始盛彊僭稱王是為楚武王遷都于郢昭王為吴所滅又遷於鄀楚本名荆至成王頵始改號楚丹陽今江陵枝江縣郢江陵縣北十餘里有汜南城城東有小城名郢在江之南非今郢州鄀本鄀國楚并之在襄陽宜城縣東按今襄州南二百二十里廢樂鄉縣是其地今有鄀鄉在鄀水傍又云宜城西南有鄀亭山至考烈王徙都夀春復命曰郢今楚州者懐王孫心所都秦周孝王封非子居於秦谷至襄公赴幽王之難以兵助送平王故平王與之以岐豐之地列為諸侯莊公居犬邱文公居汧渭徳公遷于雍自徳公以下十八世居雍獻公遷櫟陽孝公乃遷咸陽秦谷故隴西縣秦亭是也隴西唐末為寨宋熈寕廢為鎮入汧原今隸隴州故秦城尚在大邱漢槐里縣今永興軍興平縣雍故扶風雍縣唐改曰天興今鳳翔治櫟陽咸陽今皆為縣隸永興軍吳都吳今蘇州城是虞都虞杜預云河東大陽縣按今陜州夏縣有大陽故闗而平陸縣東北六十里見有故虞城仲雍國於吳其支子别封於此故亦謂之西吳其虞舜之後居於虞城今為縣隸南京非此虞也虢都上陽上陽今虢州虢略此虢仲之封也謂之西虢而虢叔之封在鳳翔虢縣謂之南虢復有一虢居於滎縣謂之東虢以其在虢仲國之東南東南二虢皆主於上陽曹都曹今廣濟軍治定陶是許都許後遷于葉又遷于城父又遷于白羽又遷于容城許今許州白羽一名析鄧州淅川是或云内鄉是容城華容縣是邾都邾今兖州曲阜東南四十里古邾城是或云濟州任城南二十里復有邾婁城皆即其所也曲阜今為仙源縣莒都莒後遷鹽官故謂之南莒莒今為宻州縣紀都紀遷于劇紀本在東海故贛榆縣紀城是劇在青邱臨朐縣東夀光縣西亦名紀音訛為劇滕都小邾遷于公邱小邾即蕃縣及遷于公邱則故地為小邾國隋以其為滕舊都故改蕃為滕縣今隸徐州公邱今兖州龔邱薛仲虺之都本在魯地奚仲遷于邳魯莊公三十一年築臺於薛即薛舊都也及遷于邳又以邳為薛今徐州滕縣東南五十里薛城是州都淳于後遷華容淳于今為宻州髙宻華容今荆南府監利蔡本畿内之地以為蔡叔之采邑及蔡叔逆命國除至蔡仲始改封于汝南故以汝南為蔡及遷州來則以州來為下蔡汝南為上蔡今蔡州上蔡縣西南十里故蔡城即蔡國也州來即下蔡縣今夀州治徐都臨淮今泗州臨淮有徐城又有偃王廟徐君墓葛都寗南京寕陵縣故寗城是越都㑹稽今㑹稽城亦謂之勾踐城越州城也陳都宛邱宛邱今陳州治本太昊之墟南燕都胙東郡舊有燕縣隋改曰胙城本胙國也為燕所并胙城唐為縣隸滑州故燕城在胙城東北遂都乘邱乘邱舊為蛇邱唐省入鉅野今齊州治譚都譚齊州厯城縣有古譚城管都管鄭州管城是鄶都鄶今鄭州新鄭東北三十五里有古鄶城戴都戴今開封封邱縣有戴城任都任城今濟州任城宿都無鹽無鹽故城在鄆州須城東三十六里須句都須朐遷于須昌鄆州夀張縣西北有須朐城須昌今鄆州舒城也顓臾都費沂州費縣西北八十里有故顓臾城鄫都鄫今沂州承縣東八十里故鄫城向都向今沂州有古向城鄅都開陽故開陽城在臨沂縣北十五里蕭都蕭徐州蕭縣頓都南頓今陳州南頓縣息都新息今蔡州新息縣沈都平輿平輿故城在蔡州汝陽縣東項都項城陳州項城縣東北有故項城隨都隨今隨州鄧都鄧襄陽鄧城縣界也䕫都䕫今歸州東二十里有故䕫子城北燕都薊幽州治邢都襄國襄國隋改曰龍岡今邢州治梁都新里同州夏陽有新里城或云新里城在澄州韓都韓城故城在今同州韓城縣南十八里魏都魏城遷于大梁今陜州平陸有魏城大梁即開封趙都趙城遷于平棘趙城今隸晉州縣平棘隸趙州郕都郕武王封季載於此今濮州雷澤北三十里有故郕城郜都郜郜有南北今單州成武有二郜城應都葉汝州葉縣有故應城蔣都期思期思故城在光州固始西北七十里申都申今信陽軍吕都吕蔡州城蔡古吕國焦都焦陜州東北百歩有焦城耿都耿河中府龍門縣南十二里故耿城是霍都霍今晉州有霍邑揚都揚晉州洪洞縣東南十八里有故揚城冀都冀今河中府有冀亭芮都芮杜預云馮翊臨晉縣有芮鄉按臨晉故城在今同州朝邑西南二里賈都賈同州蒲城縣有賈城荀都荀荀城在絳州正平西十五里黎都黎今潞州黎城縣有黎侯故城邘都邘京相璠云野王縣西北三十里有故邘城野王隋改曰河内今懐州治周夷國都戎都戎城杜預云陳留濟陽縣東南有戎城又有戎州是其别邑夷都夷安杜預云在城陽莊武縣所治夷安縣是也介都黔陬介東邑國今宻州諸城縣東北一百一十里有黔陬故城根牟都安邱今宻州安邱萊都黄登州黄縣東南二十五里有故黄城即萊子國右東夷百濮都濮今江陵建寕縣是舒都舒今廬州舒城羣舒都龍舒今廬江西有龍舒允姓之戎本居𤓰州秦晉誘而致之伊川𤓰州今在極西𤓰沙之地伊川故陸渾縣其地在河南伊陽縣南伊拒泉臯伊洛之戎杜預云伊闕縣北有泉亭蠻氏都麻觧杜預云河南新城縣東南有蠻氏城俗以為麻觧城蠻麻聲近按麻觧縣亦謂之蠻王城今在汝州西南近伊闕庸都上庸房州竹山縣西二百五十里有上庸城盧戎都盧今襄州中廬巴都江州江州故縣名隋改為江津隸渝州右南蠻狄都狄亦謂之翟其别都有箕狄在慈州箕城在遼州榆社東南三十里白狄都西河白狄與秦同州今坊鄜延綏間皆古白狄之地鮮虞都鮮虞白狄之别種今定州安喜舊鮮虞縣肥都昔陽肥即白狄遷于昔陽故城在今平定軍樂平縣東五十里鼓都鼓城白狄别種今祁州鼓城縣驪戎都臨潼今永興臨潼縣東二十四里有驪戎故城右西戎赤狄都洺今洺州之地潞都潞今潞州是東山臯落氏都臯落今絳州垣縣西北六十里有臯落城服䖍云世謂之哥亳城盖聲相近山戎都薊北狄也號無終子今薊州治漁陽所以蔽北燕之路廧咎如甲氏留吁鐸辰皆赤狄别種散居河北鄋瞞在夏為防風氏商為汪芒氏皆長狄國也右北狄秦都秦都已見夲卷周諸侯都中兩漢都前漢都長安謂之西都後漢都洛陽謂之東都光武又以南陽為别都謂之南都至建安元年曹操挾獻帝遷許長安宋為永興軍治南陽鄧州許潁昌府三國都魏略云魏以長安譙許昌鄴洛陽為五都洛陽其京室也吴志云吴都鄂後遷建業故改鄂為武昌改秣陵為建業後避晉愍帝諱故又改為建康蜀志云蜀都成都譙今亳州許昌今潁昌府鄴相州鄂即鄂州建業今建康府成都益州也兩晉都晉都洛陽仍魏舊也東晉都建業本吴都也十六國都後魏雖共起其後奄有中原故不在十六國之數張軌都敦煌謂之前涼沙州吕光都姑臧謂之後涼涼州李暠都酒泉謂之西涼肅州秃髪烏孤都張掖謂之南涼蘭州與乞伏國仁分據定樂在其東沮渠䝉遜都張掖謂之北涼甘州慕容皝初都和龍後徙薊又徙鄴謂之前燕和龍唐桞城宋時大遼黄龍府薊幽州鄴相州慕容垂都中山謂之後燕今中山府慕容徳都廣固謂之南燕青州馮䟦都和龍謂之北燕劉淵都平陽謂之前趙晉州苻堅都長安謂之前秦姚萇都長安謂之後秦乞伏國仁都定樂後遷金城謂之西秦定樂蘭州東境金城河州赫連勃勃都統萬謂之夏朔方宋齊梁陳都宋因晉舊都建業齊因宋梁因齊改號不改都梁有太清之禍建康殘毁元帝興復即位于江陵魏人滅之陳復都建業江陵今荆南府後魏都魏拓跋氏甚㣲至道武帝諱珪始盛彊晉太元間作都于代六世孝文帝改姓元氏遷于洛陽後世㣲弱孝武帝為髙歡所逼出居長安依宇文泰是為西魏髙歡立孝静帝遷都于鄴是為東魏髙氏繼東魏居鄴謂之北齊宇文氏繼西魏居長安謂之後周隋都文帝繼周即都長安開皇二年帝以長安故城漢來舊邑年代既久凋弊實多又制度狹小不稱皇居乃作新都於龍首山在漢城東南屬杜縣本後周之京兆郡萬年縣界也南直終南山子午谷北據渭水東臨灞滻西枕龍首謂之大興城文帝初封大興公故登極以後其命城縣門殿池及寺皆以大興焉四夷都朝鮮都王險漢樂浪郡濊都濊