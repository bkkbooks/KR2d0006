body:
  text: 通志卷四十二宋右迪功郎鄭樵漁仲撰禮略第一吉禮上郊天大雩明堂朝日夕月大䄍臘靈星風師雨師及諸星等祠方丘神州后土附社稷山川籍田先蠶郊天有虞氏禘黃帝爾雅釋天云禘大祭也虞氏冬至大祭天於圓丘以黃帝配坐而郊嚳夏正之月祭感生帝於南郊以嚳配焉夏后氏禘黃帝而郊鯀商人禘嚳而郊冥周制大司樂云冬日至祀天於地上之圓丘又大宗伯職曰以禋祀昊天上帝禮神之玉以蒼璧其牲及幣各隨玉色牲用一犢幣用繒長一丈八尺鄭康成注云曾子問云制幣長丈八鄭約巡狩禮文也餘用幣長短皆準此王服大裘其冕無旒尸服亦然乘玉輅鍚繁纓十有再就建大常十有二斿以祀樽及葅醢之器以瓦爵以匏藉神之席以藳秸及蒲翦而不納藳秸藉天神蒲越藉配帝配以帝嚳其樂大司樂云凡樂圜鍾為宫黃鍾為角太蔟為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圓丘奏之其感生帝大傳曰禮不王不禘王者禘其祖之所自出以其祖配之王者先祖皆感太微五帝之精以生其神名鄭康成據春秋緯説蒼則靈威仰赤則赤熛怒黃則含樞紐白則白招拒黑則叶光紀皆用歲之正月郊祭之蓋特尊焉孝經云郊祀后稷以配天配靈威仰也宗祀文王於明堂以配上帝泛配上帝也因以祈穀其壇名泰壇在國南五十里禮坤之玉用四圭有邸尺有二寸牲用騂犢青幣配以稷其配帝牲亦用騂犢其樂大司樂云乃奏黃鍾歌大吕舞雲門以祀天神天神謂五帝及日月星辰王者又各以夏正月祀其所受命之帝於南郊尊之也日用辛按禮記及春秋魯郊於建子月用辛又王者必五時迎氣者奉承天道從時訓人之義故月令於四立日及季夏土德王日各迎其王氣之神於其郊月令云立春之日天子親率公卿諸侯大夫以迎春氣於東郊餘四氣皆然若以祖之所自出即禘祭靈威仰於南郊一神而已若迎王氣之神即五神同祀之其配祭以五人帝春以太皥夏以炎帝季夏以黃帝秋以少昊冬以顓帝其壇位各於當方之郊去國五十里內曰近郊為兆位於中築方壇亦曰太壇而祭之禮神之玉按大宗伯云青圭禮東方赤璋禮南方黃琮禮地則中央也白琥禮西方元璜禮北方牲用犢及幣各隨玉色樂與感帝同秦始皇既即位以昔文公出獵獲黑龍此其水德之瑞用十月為歲首色尚黑音尚大吕東遊海上禮祀八神二世尊雍四畤上帝名其祭處曰畤也春歲祠禱因泮凍秋涸凍冬塞祠五月嘗駒及四仲之月祠每畤用駒四匹木寓龍一駟木寓車馬一駟各如其帝色黃犢與羔各四圭幣各有數皆生瘞埋無爼豆之具三年一郊常以十月上宿郊見通舉火拜於咸陽之旁而衣尚白其用如常漢髙帝立二年冬敗項籍還入關問秦時上帝祠何帝也對曰四帝有白青黃赤髙帝曰乃待我而具五色遂立黑帝祠名北畤有司進祠帝不親往悉召故秦祀官復置太祝太宰皆如其故儀後四年詔御史令九天巫祠九天皆以歲時祠宫中文帝即位詔有司增雍五畤路車各一乘駕被具魯人公孫臣上書曰始皇以水德則漢當土德其應黃龍見宜改正朔易服色尚黃明年黃龍見成紀拜公孫臣為博士申明土德改歷服色事有司曰古者天子夏親祠上帝於郊故曰郊夏四月詔郊祀上帝始幸雍郊見五畤祠衣皆尚赤趙人新垣平上言長安東北有神氣成五采若人冠冕焉宜祠上帝於是作渭陽五帝廟明年四月帝親郊見五帝廟爟火舉若光屬天於是貴平至上大夫文帝出長門亭名若見五人於道北因其直立五帝壇人有告平詐偽遂誅平後渭陽長門五帝使祠官領以時致禮不親往焉武帝即位初至雍郊見五畤後常三歲一郊亳人謬忌曰天神貴者太一太一佐曰五帝古者天子以春秋祭太一於東南郊日一太牢凡七祭為壇開八通鬼道於是令太祝立太一之祠於長安城東南郊常奉祠如忌方未幾又祠天一自此方士之言興而迂怪之祠紛然起矣或以祀天為名其實非郊天之事也宣帝神爵元年正月始幸甘泉郊見泰畤修武帝故事三年幸雍祠五畤明年春幸河東祠后土然未有定制元帝即位始定舊儀間歲正月一幸甘泉郊泰畤又東至河東祠后土西至雍祠五畤凡五奉泰畤后土之祠亦施恩澤時所過毋出田租賜百户牛酒或賜爵赦罪人成帝初即位丞相匡衡等奏言先王祭天於南郊就陽之義也瘞地於北郊即陰之象也往者孝武居甘泉宫即於雲陽立泰畤祭於宫南今常幸長安郊見皇天反北之太陰祠后土反東之少陽未合承天之意於是徙甘泉泰畤置於長安又言今雍鄜密上下畤本秦氏各以其意所立非禮所載不宜復修遂廢雍鄜密上下畤九天太一天一八神之屬并餘淫祀陳寶等祠所不應禮者四百七十五所皆罷初罷甘泉泰畤作南郊日大風壞甘泉竹宫折拔畤中木十圍以上者百餘天子問劉向向曰家人尚不欲絶種祠况於國乎且甘泉汾陰及雍五畤始立皆有神祗感應然後營之誠未易動帝意恨之後以無繼嗣遂復甘泉泰畤及雍五畤如故天子親郊禮如前又復長安雍祠明著者半後成帝崩皇太后詔復南北郊長安如故以順帝意哀帝立寢疾博召方士復甘泉泰畤祀如故遣有司行事而禮祠焉平帝立王莽奏宜如建始所行丞相匡衡等議復長安南北郊祀如故莽又頗改其祭禮後漢建武元年光武即位為壇營於鄗之陽祭告天地采用前漢元始中郊祭故事六宗羣神從祀未以祖配天地共犢餘牲尚約二年正月制郊兆於雒陽城南七里依鄗故事為圓壇八陛中又為重壇天地位其上皆南面西上其外壇上為五帝位青帝位在甲寅赤帝位在丙巳黃帝位在丁未白帝位在庚申黑帝位在壬亥其外為壝重營皆紫以象紫宫有四通道以為門日月在中營內南道日在東月在西北斗在北道之西皆别位不在羣神列中八陛陛五十八醊五帝陛郭帝七十二醊中營四門門五十四神外營四門門百八神皆背營內嚮中營四門門封神四外營四門門封神四凡千五百一十四神至七年五月詔三公曰漢當郊堯其與羣臣議時御史杜林等上疏以為漢起不緣堯與商周異宜從舊制以髙帝配從之隴蜀平後乃增廣郊祀髙皇帝配食位在中壇上西面北上天地髙皇帝黃帝犢各一四方帝共用犢二日月北斗共牛一四營羣神共牛四樂奏青陽朱明西皓元冥及雲翹育命舞中營四門門用席十八外營四門門用席三十六皆莞簟率一席三神日月北斗無陛郭醊既送神燎俎實于壇南已地明帝即位永平二年以月令有五郊迎氣因采元始故事兆五郊于雒陽四方中兆在未壇皆三尺階無等立春日迎春東郊祭青帝勾芒立夏日迎夏南郊祭赤帝祝融先立秋十八日迎黃靈于中兆祭黃帝后土立秋日迎秋西郊祭白帝蓐收立冬日迎冬北郊祭黑帝元冥車旗服飾各從方色魏文帝南巡在潁陰有司為壇於繁陽故城庚午登壇受紱降壇視燎成禮未有祖配明帝即位太和元年正月丁未郊祀武帝以配天宗祀文帝於明堂以配上帝至景初元年十月乙邜始營洛陽南委粟山為圓丘詔曰曹氏世系出自有虞令祀圓丘以始祖帝舜配號圓丘曰皇皇帝天郊所祭曰皇天之神以太祖武皇帝配十一月壬子冬至始祀皇皇帝天於圓丘以始祖帝舜配自正始以後終魏代不復郊祀孫權初稱尊號於武昌祭南郊告天用元牡後自以居非土中不修設末年南郊追上父堅尊號為吳始祖以配天後三嗣主終吳代不郊祀劉備章武元年即位設壇於成都武擔山南用元牡二年十月詔丞相諸葛亮營南北郊于成都府晉武帝南郊燎告未有祖配泰始二年詔定郊祀南郊宜除五帝之座五郊同稱昊天上帝各設一座而已時羣臣議五帝即天也隨時王氣而設號耳名雖有五其實一神南郊宜除五帝座五郊同稱昊天從之二月丁丑郊以宣皇帝配十一月有司奏古者丘郊不異宜井圓方二丘更修壇兆二至合祀是月庚寅冬至帝親祀圓丘於南郊是後圓丘方澤不別立太康三年正月帝親郊祀皇太子皇子悉侍祠十年十月詔曰孝經郊祀后稷以配天宗祀文王於明堂以配上帝往者衆議除明堂五帝位考之於禮不正詩序曰文武之功起於后稷故推以配天焉宣帝以神武創業既以配天復以先帝配天可乎遂復南郊五帝位東晉元帝即位於建康議立南郊於已地太常賀循定制度多依漢及晉初之儀三月辛卯帝親郊祀饗如泰始故事成帝咸和八年正月郊天則五帝之佐日月五星二十八宿文昌北斗三台司命軒轅后土太一天一太微勾陳北極雨師雷電司空風伯老人凡六十二神從祀康帝建元元年正月辛未南郊帝親奉焉祝文稱嗣天子臣某安帝元興四年應郊帝蒙塵于江陵朝議宜依周禮宗伯攝事尚書右丞王納之曰郊天極尊非天子不祀無使皇輿不得親奉時從納之議郊廟牲幣璧玉之色雖有成文秦世多以駵駒漢則但云犢江左南北郊用元牲明堂廟社用赤牲宋永初二年正月上辛帝親郊祀三年九月司空羡之等奏髙祖武皇宜配天郊詔可孝武大明二年正月有司奏今月六日南郊輿駕親奉至時或雨遂遷日有司行事有司奏按魏代郊天值雨更用後辛晉代顧和亦云更擇吉日南郊自魏已來多使三公行事大明三年移郊兆於秣陵牛頭山西在宫之午地徐爰曰禮記燔柴於泰壇祭天也迎日於南郊就陽位也晉代過江郊悉在北或南出道狹多於已地宋因而弗改今聖圖重造舊章畢新宜移郊正午以定天位也大明五年九月甲子有司奏郊祭用三牛孝武崩廢帝以郊舊地為吉祥移置本處齊髙帝受禪明年正月上辛有事南郊而無配犧牲之色因晉宋故事建元四年武帝繼位明年正月祀南郊自兹以後間歲而祀永明元年立春前郊祀郊壇圓兆外內起瓦屋形制宏壯梁武帝即位南郊為圓壇在國之南壇髙二丈七尺上徑十一丈下徑十八丈其外再壝四門常與北郊間歲正月皇帝致齋於萬夀殿上辛行事吳操之云啓蟄而郊郊在立春後何佟之云今之郊祀是報昔歲之功而祈今年之福故取歲首上辛不拘立春前後周之冬至圓丘大報天也夏正又郊以祈農事故有啓蟄之説帝曰圓丘自是祭天先農即是祈榖祭昊天宜在冬至祈榖則必須啓蟄用特牛一祀天皇大帝於壇上以皇考太祖文帝配五帝天文從祀禮以蒼璧制幣除鬯祼佟之啓按鬯者盛以六彞覆以畫羃備其文飾施之宗廟今郊祀有祼恐乖尚質宜革之帝依此行香用沉器以陶匏素俎席用藁秸皇帝一獻再拜受福帝以一獻為質三獻為文自是天地之祭皆一獻為皇帝受福明上靈降祚臣下不敢同太尉設燎壇於丙地禮畢器席有司燒埋之五年迎五帝以始祖配十七年帝以威仰魄寶俱是天神於壇則尊於下則卑且南郊所祭天皇其五帝別有明堂之祀不煩重設又郊祀二十八宿而無十二辰於義闕然南郊可除五帝祀加十二辰與二十八宿各於其方為壇陳武帝永定元年受禪修圓丘壇髙二丈二尺五寸廣一十丈柴燎告天明年因以正月上辛有事南郊以皇考德皇帝配除十二辰風師雨師及五帝位間歲而祀文帝天嘉中改以髙祖配復三獻之禮宣帝即位以郊壇卑下更增廣之後魏道武帝即位二年正月親祀上帝於南郊以始祖神元皇帝配壇通四陛壝埓三重天位在上南面神元西面五帝以下天文從食席用藁秸玉以四圭幣用束帛牲用黝犢後冬至祭上帝於圓丘牲幣並同天賜二年四月復祀天于西郊為方壇東為二陛土陛無等周垣四門門各依方色為名置木主七於壇上牲用白犢黃駒白羊各一祭之日帝御大駕至郊所立青門內近南西面朝臣及夫人咸位於青門外后率六宫從黑門入列於青門內近北並西面廪犧令掌牲陳於壇前女巫執鼓立於陛東西面選帝七族子弟七人執酒在巫南西面北上女巫陛壇搖鼓帝拜后肅拜內外百官拜祀訖乃殺牲七執酒七人西向以酒灑天神主復拜如此者三禮畢而反自後歲一祭孝文帝太和十二年親築圓丘於南郊北齊每三年一祭以正月上辛禘祀昊天上帝於圓丘以髙祖神武帝配五精帝天文等從祀禮以蒼璧束帛蒼牲九皇帝初獻太尉亞獻光祿卿終獻司徒獻五帝司空獻日月五星二十八宿太常丞以下薦衆星後諸儒定禮圓丘改以冬至祀之南郊則歲一祀以正月上辛為壇於國南祀所感帝靈威仰以髙祖神武皇帝配用四圭幣如方色其上帝及配帝各用騂特牲一燎同圓丘後周憲章多依周制正月上辛祀昊天上帝於圓丘以其先炎帝神農氏配昊天上帝於其上五方上帝天文並從祀又祀所感帝靈威仰於南郊以始祖獻侯莫那配用牲各以方色皇帝乘蒼輅戴元冕備大駕而行從祭者皆蒼服隋文帝受命再歲冬至日祀昊天上帝於圓丘以太祖武元皇帝配五方上帝天文並從祀其牲上帝配帝用蒼犢各一五帝日月用方色犢各一五星以下羊豕各九孟春上辛祠感帝赤熛怒於南郊亦以太祖武元帝配其禮四圭有邸牲用騂犢二煬帝大業元年孟春祀感帝改以髙祖文帝配餘並仍舊十年冬至祀圓丘帝不齋于次詰朝備法駕至便行禮是日大風帝獨獻上帝三公分獻五帝禮畢御馬疾驅而歸唐武德初定令每歲冬至祀昊天上帝於圓丘以景帝配五方上帝天文皆從祀日月內官中官外官及衆星皆從祀上帝及配帝用蒼犢各一五方帝及日月用方色犢各一內官以下加羊豕各九孟春辛日祈穀祀感帝于南郊以元帝配牲用蒼犢二武德貞觀之制大享之外每歲立春立夏季夏立秋立冬郊祀並依周禮其配食及星辰從祀亦然貞觀中奉髙祖配圓丘元皇帝配感帝餘依武德制大雩周制月令建巳月大雩五方上帝左氏傳曰龍見而雩角亢見時周之六月陽氣盛常旱故雩為百穀以祈膏雨其壇名曰雩禜於南郊之傍配以五人帝太昊配青帝炎帝配赤帝軒帝配黃帝少吳配白帝顓帝配黑帝命樂正習盛樂月令云仲夏樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鐘磬柷敔而俱作故曰盛樂也舞皇舞析白羽為之形如帗也舞師云教皇舞帥而舞旱暵之事月令命有司為民祈祀山川百源百辟卿士有益於民者以祈穀實天子雩上帝諸侯雩山川卿士謂古之上公以下若勾龍社稷之類也何休注春秋公羊傳曰旱則君親之南郊以六事謝過自責政不善歟使人失職與宫室崇歟婦謁盛歟苞苴行歟讒夫昌歟使童男童女各八人而呼雩也按月令本出於管子即周時人也至秦吕不韋編為吕氏春秋漢戴聖又集成禮記原其根本並周制若國大旱則司巫帥巫而舞雩若旱暵則女巫舞雩漢承秦滅學雩禮廢旱太常禱天地宗廟雜論曰劉歆致雨具作土龍武帝元封六年旱女子及巫丈夫不入市成帝五年六月始命諸官止雨朱繩反縈社擊鼓攻之是後水旱常不和干寶曰朱絲縈社社太陰也朱火色也絲屬離天子伐鼓於社責羣陰也諸侯用幣於社請上公也伐鼓於朝退自責也此昔人厭勝之術後漢自立春至立夏盡立秋郡國上雨澤若少郡縣各掃除社稷公卿官長以次行雩禮以求雨春秋繁露曰大旱雩祭而請雨大水鳴鼓而攻社閉諸陽衣皂興土龍山海經曰大荒東北隅中有山名凶犂土邱應龍處南極殺蚩尤與夸父不得復上故下數旱而為應龍之狀乃得大雨郭璞曰今之土龍本此氣應自然冥感非人所能立土人舞僮二佾七日一變如故事反拘朱索社代朱鼓禱賽以少牢如禮晉武帝咸寧二年春旱因後漢舊典諸旱處廣加祈請五月祈雨于社稷山川東晉穆帝永和中有議制雩壇於國南郊之旁依郊壇近逺阮諶云壇在巳地按得衛宏漢儀稱魯人為雩壇在城東南諸儒所説皆云壇而今作墠又論語樊遲從遊于舞雩之下衛宏所説魯城東南舊迹猶在祈上帝百辟旱則祈雨大雩社稷山林川澤舞僮八佾凡六十四人皆皂服持羽翳而歌雲漢之詩齊明帝建武二年旱雩以武帝配饗於雩壇梁武帝天監元年有事雩壇壇於南郊之左髙及廣輪四丈周十二丈四陛帝以為雨既類陰而求之正陽其謬已甚東方既非盛陽而為生養之始則雩壇應在東方祈晴亦宜此地遂移於東郊十年帝又以雩祭燔柴以火祈水於理為乖於是停用柴燎從坎瘞典時議曹郎朱異議曰按周宣雲漢之詩毛注有瘞埋之文不見燎柴之説若以五帝必柴則明堂又無其事大同五年又築雩壇於籍田兆內四月後旱則祈雨行七事一理寃獄及失職者二賑鰥寡孤獨三省徭輕賦四舉進賢良五黜退貪邪六命會男女恤怨曠七徹膳羞弛樂天子降法服七日乃祈社稷七日乃祈山林川澤常興雲雨者七日乃祈羣廟之主于太廟七日乃祈古來百辟卿士有益於人者七日乃大雩上帝遍祈前祈所有事者大雩禮於壇用黃牯牛一祈五天帝及五人帝各依其方以太祖配位於青帝之南五官配食於下七日乃去樂又遍祈社稷山林川澤就故地處大雩國南除地為墠舞僮六十四人皆衣皂服為八列各執羽翳每列歌雲漢詩一章而畢旱而祈雨則報以太牢皆有司行事唯雩則不報也若郡國縣旱請雨則五事同時並行五事則謂黜退貪邪以上如前議守令皆齋潔三日乃祈社稷七日不雨更齋祈如初三變仍不雨復齋祈其界山林川澤常興雲雨者祈而澍亦各有報陳因梁故事武帝時以德皇帝配文帝時以武帝配廢帝時以文帝配牲用黃牛而以清酒四升洗其首其壇墠配饗歌舞皆如梁禮天子不親奉則太宰太常光祿行三獻禮其法皆採齊建武二年舊典後魏文成帝和平元年四月旱詔州郡於其界內神無大小悉灑掃薦以酒脯年登之後各隨本秩祭以牲牢北齊以孟夏龍見而雩祭太微以五精帝於夏郊之東為圓壇廣四十五尺髙九尺四面各一陛為三壝外營相去深淺并燎壇一如南郊若建午未申之月不雨則使三公祈五帝於雩壇禮用玉帛有燎不設樂選伎工端潔善謳詠者使歌雲漢之詩於壇南其儀如郊禮隋制雩壇國南十三里啓夏門外道左髙一丈周二十丈孟夏龍見則雩五方上帝配以五人帝於上以太祖配饗五官從祀於下牲用犢十各依方色若京師孟夏後旱則祈雨行七事如梁之七事七日祈嶽鎮海瀆及諸山川能興雲雨者又七日祈社稷及古來百辟卿士有益於人者又七日乃祈宗廟及古帝王有神祠者又七日乃修雩祈神州又七日仍不雨復從嶽瀆以下祈禮如初秋分以後不雩但禱而已皆用酒脯初請後二旬不雨者即徙市禁屠皇帝御素服避正殿減膳撤樂或露坐聽政百官斷傘扇令家人造土龍雨則命有司報州縣祈則理寃獄存鰥寡孤獨掩骼埋胔潔齋祈于社稷七日乃祈界內山川能興雲雨者徙市斷屠雨亦有報唐武德初定令每歲孟夏雩祀昊天上帝於圓丘景皇帝配牲用蒼犢二五方上帝五人帝五官並從祀用方色犢十貞觀雩祀於南郊顯慶禮於圓丘開元十一年孟夏後旱則祈雨審理寃獄賑恤窮乏掩骼埋胔先祈嶽鎮海瀆及諸山川能興雲雨者皆於北郊遙祭而告之又祈社稷又祈宗廟每月七日皆一祈不雨還從嶽瀆如初旱甚則大雩秋分後不雩初祈後一旬不雨即徙市禁屠殺斷扇造大土龍雨足則報祀祈用酒脯醢報準常祀皆有司行事明堂黃帝拜祀上帝于明堂或謂之合宫其堂之制中有一殿四面無壁以茅蓋通水水圜宫垣為復道上有樓從西南入名昆侖天子從之入以拜祀唐虞祀五帝於五府蒼曰靈府赤曰文祖黃曰神計白曰明紀黑曰元矩夏后氏曰世室商人曰重屋周人曰明堂其制度詳於禮經漢武帝元封五年祠太一五帝於明堂上座髙皇帝對之牲以太牢天子從昆侖道入始拜明堂如郊禮禮畢燎堂下其明堂制從公玉帶所上黃帝時圖也後漢光武建武三十年初營明堂明帝永平二年正月辛未初祀五帝於明堂光武帝配五帝座位堂上各處其方黃帝在未皆如南郊之位光武位在青帝之南少退西面牲各一犢奏樂如南郊章帝元和二年二月壬申宗祀五帝於孝武所作汶上明堂光武帝配如洛陽明堂禮癸酉更告祀髙祖太宗世宗中宗世祖顯宗於明堂各一太牢安帝延光三年祀汶上明堂如元和故事初建武營明堂其制上圓下方八窗四閨九室十二座三十六户七十二牖魏明帝太和元年正月丁未宗祀文帝於明堂以配上帝祝稱天子臣某晉武帝泰始二年正月丁丑宗祀文皇帝於明堂以配上帝又議明堂宜除五帝之座同稱昊天上帝各設一座而已十年十月詔復明堂五帝位東晉孝武帝太元十三年正月後辛祀明堂車服之儀率遵漢制出以法駕服以衮冕宋孝武大明五年依漢汶上儀設五帝位太祖文帝對饗祭皇天上帝鼎俎彛簋一依太廟禮堂制但作大殿屋十二間以應一周之數其餘煩雜一皆除之六年正月帝親奉明堂祭五時帝以太祖配齊髙帝建元元年七月祭五帝之神於明堂有功德之君配明堂制五室從王儉之議也明帝永泰元年有司奏以武帝配梁祀五帝於明堂服大裘冕樽以瓦俎豆以純漆牲以特牛肴膳準二郊若水土之品蔬菜之屬猶宜以薦郊所無者並從省行禮自東郊而升從青帝始止一獻清酒無黍肉之禮請停灌及授俎十二年毁宋太極殿以其材為明堂十二間基準太廟以中央六間安六座悉南向東來第一青帝第二赤帝第三黃帝第四白帝第五黑帝配帝總配五人帝在阼階東上北向大殿後為小殿五間以為五佐室焉陳祀昊天上帝五帝於明堂牲以太牢粢盛六飯鉶羹蔬備薦焉武帝以德帝配文帝以武帝配廢帝以文帝配堂制殿屋十二間中央六間依前代安六座四方帝各依其方黃帝居坤維而配饗坐依梁法後魏文帝太和十三年四月經始明堂改營太廟遷洛之後宣武永平延昌中欲建明堂而議者或云五室或云九室至明帝神龜中復議之元義執政遂營九室值亂不成宗配之禮迄無所設北齊採周官考工記為五室後周採漢三輔黃圖為九室並終不立隋文帝開皇中議立明堂時將作大匠宇文愷依月令造明堂木樣以獻帝異之然以衆議不定故不成終隋代祀五方上帝於明堂常以季秋在雩壇上而祀其用幣各依其方人帝各在天帝之左太祖在太昊南西向五官在庭各依其方牲用犢十二皇帝太尉司農行三獻禮于青帝及太祖自餘皆有司助奠五官位於堂下行一獻禮有燎其省牲進熟如南郊儀唐武德初定令每歲季秋祀五方上帝於明堂元帝配五人帝五官並從祀迄于貞觀之末未議立明堂季秋大享則於圓丘行事永徽三年又奉太宗配祠明堂有司遂以髙祖配五天帝太宗配五人帝下詔造明堂內出九室之樣顯慶元年禮官議太宗不當配五人帝太尉長孫無忌等議以髙祖躬受天命奄有神州為國始祖抑有舊章太宗道格上元功清下黷拯率土之塗炭布大造於生靈請準詔書宗祀於明堂以配上帝從之乾封初復議立明堂或云九室或云五室以議不定又止武后垂拱四年二月毁東都之乾元殿就其地造明堂因下詔曰時既沿革莫或相遵自我作古用適於事今以上堂為嚴配之所下室為布政之居來年正月一日可於明堂宗祀三聖以配上帝其月明堂成號為萬象神宫天授二年正月乙酉日南至親祀明堂合祭天地以周文王及武氏先考妣配百神從祠並於壇位以茅布席而祀武太后又於明堂後造佛舍髙百餘尺始造為大風振倒俄又重營其功未畢證聖元年正月丙申夜佛堂災延燒明堂至明而盡未幾復令依舊規制重造明堂凡髙二百九十四尺東西南北廣三百尺上施寶鳳俄以火珠代之明堂之下圍繞施鐵渠以為辟雍之象天册萬歲二年三月造成號為通天宫四月又行親享之禮大赦改元為萬歲通天明年九月又享於通天宫開元五年幸東都將行大享之禮以武太后所造明堂有乖典制遂拆依舊造乾元殿每臨御依正殿禮自是駕在東都常以元日冬至於乾元殿受朝賀季秋大享依舊於圓丘行事其大享儀具開元禮朝日夕月周制以柴祀日月星辰日壇曰王宫月壇曰夜明牲幣俱赤樂與祭五帝同禮神之玉以圭璧王搢大圭執鎮圭繅藉五采五就以朝日王服元冕所以尚質自朝至暮行祭之禮先以牲幣於柴上而燔之升煙於天以同五帝之義凡祭日月歲有四焉迎氣之時祭日於東郊祭月於西郊一也二分祭日月二也祭義云郊之祭大報天而主日配以月三也月令十月祭天宗合祭日月四也覲禮禮日於南門之外禮月於北門之外漢武帝立二十八年始郊太一朝日夕月改周法不俟二分於東西郊常以郊泰畤質明出行竹宫東向揖日其夕西向揖月魏文帝議其煩褻似家人之事乃以黃初二年正月乙亥朝日於東門之外前史又以正月非二分之義祕書監薛靖論云按周禮朝日無常日鄭元云用二分秋分之時月多東升西向拜之背實逺矣朝日宜用仲春之朔夕月宜用仲秋之朏淳于睿駁之引禮記云祭日於東祭月於西以端其位周禮秋分夕月並行於上代西向拜月雖如背實亦猶月在天而祭之於坎不復言背也猶如天子東西遊幸拜宫猶北向朝拜寧得以背實為疑明帝太和元年二月丁亥朔朝日于東郊八月己丑夕月于西郊始為得禮晉因之武帝太康二年有司奏春分朝日寒溫未適不可親出詔曰頃方難未平故每從所奏今戎事已息此禮為大遂親朝日後周以春分朝日於東門外為壇如其郊用特牲青幣青圭有邸皇帝乘青輅及祀官俱青冕執事者青辨司徒亞獻宗伯終獻燔燎如圓丘秋分夕月於國西門外為壇於坎中方四丈深四尺燔燎禮如朝日隋因之開皇中於國東春明門外為壇如其郊每以春分朝日又以國西開逺門外為坎深三尺廣四丈為壇於坎中髙一尺廣四尺每以秋分夕月牲幣與周同唐二分朝日夕月於國城東西各用方色犢大䄍臘䄍者索也自伊耆之代而有其禮古之君子使之必報之是報田之祭也其神神農初為田事故以報之夏氏曰嘉平商曰清祀周因之後名大䄍以歲十二月合聚萬物而索享之其樂則吹豳頌擊土鼓其服則皮辨素服又云黃衣黃冠而祭息田夫也故既䄍君子不興功秦初因曰臘後復曰嘉平漢復曰臘季冬之月星回歲終隂陽以交勞農大享臘魏因之髙堂隆議臘用日云王者各以其行之盛而祖以其終而臘水始於申盛於子終於辰故水行之君以子祖以辰臘火始於寅盛於午終於戍故火行之君以午祖以戌臘木始於亥盛於卯終於未故木行之君以卯祖以未臘金始於已盛於酉終於丑故金行之君以酉祖以丑臘土始於未盛於戌終於辰故土行之君以戌祖以辰臘今魏土德而王宜以戌祖辰臘博士秦靜議曰坤為土土位西南黃精之君盛德在未故魏以未祖易曰坤利西南得朋東北喪朋丑者土之終故以丑臘終而復始乃終有慶宜如前以未祖丑臘奏可之宋氏以水德王故祖以子臘以辰後周常以十月䄍隋初因周亦以孟冬下亥䄍百神開皇四年詔曰前周歲首今之仲冬建亥之月大䄍可也後周以夏后之時行姬氏之䄍考之前代於義有違其十月行䄍者停可以十二月為臘始革前制唐貞觀十一年房元齡等議曰按月令䄍法唯祭天宗近代䄍五天帝五人帝五地祗皆非古典今並除之季冬寅日䄍祭百神於南郊大明用犢二籩豆各四簋簠㽅俎各一神農及伊耆氏各用少牢一籩豆等與大明同后稷及五方十二次五官五方田畯五嶽四鎮四海四瀆以下方别各用少牢一其日祭井泉於川澤之下用羊一卯日祭社稷於社宫二十八宿五方之山林川澤邱陵墳衍原隰鱗羽裸毛介水墉坊郵表畷貓虎及龍麟朱鳥白虎元武方別各用少牢一每座籩豆各二簋簠㽅俎各一䄍祭凡百八十七座當方年穀不登則闕其祀䄍之明日又祭社稷於社宫如春秋二仲之禮開元中制儀季冬臘日䄍百神於南郊之壇若其方不登則闕之其儀具開元禮靈星周制仲秋之月祭靈星於國之東南漢興八年有言周興而邑立后稷之祠於是髙帝命郡國縣邑立靈星祠常以歲時祠以牛言祠后稷而謂之靈星者以后稷又配食星也舊説星謂天田星也一曰龍左角為天田主穀乃於壬辰位祠之壬為水辰為龍就其類也縣邑令長侍祠舞者童男十六人舞象教田初為芟除次耕種次藝耨驅爵及穫刈舂簸之形象成功也東晉靈星配饗南郊不特置祀唐開元禮立秋之後祀靈星於國城東南天寶四載勑升為中祠風師雨師及諸星等祠周制大宗伯以實柴祀日月星辰以槱燎祀司中司命風師雨師月令立春後丑日祭風師於國城東北立夏後申日祀雨師於國城西南秋分日享夀星於南郊立冬後亥日祀司中司命司民司祿於國城西北後漢以丙戌日祀風師於戍地以己丑日祀雨師於丑地牲用羊豕又於國都南郊立老人星廟常以仲秋祀之立心星廟于城南常以季秋祀之晉以仲春月祀于國都逺郊老人星廟季秋祀心星于南郊壇心星廟東晉以來配饗南郊不復特立隋令太史局常以二月八日於署廷中以太牢祠老人星兼祀天皇大帝天一太一日月五星勾陳北極北斗三台二十八宿丈人星孫星都四十六座凡應合祀享官示大醫給除穢氣散藥先齋一日服之以自潔唐開元二十四年七月敕所司特置夀星壇常以千秋節日修其祠典又敕夀星壇宜祭老人星及角亢七宿著之常式其儀具開元禮天寶四載敕風伯雨師並宜升入中祠仍令諸郡各置一壇因春秋祭社之日同申享祀至九月敕諸郡風伯壇置在壇之東雨師壇之西各稍北三數十步其壇卑小於社壇其祭官準祭社例取太守下充方丘神州后土附夏以五月祭地祗商以六月周制大司樂云夏日至禮地祇於澤中之方丘其丘在國之北禮神之玉以黃琮牲用黃犢幣用黃繒王及尸同服大裘配以后稷其樂則大司樂云凡樂函鐘為宫太蔟為角姑洗為徵南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地祇皆出可得而禮矣其神州地祇謂王者所卜居吉土五千里之內地名也玉用兩圭五寸有邸牲用黝犢幣用黑繒壇於北郊築土為壇名曰泰折配亦以后稷其樂奏太蔟歌應鐘舞咸池以祭地祇備五齊七獻王每獻酒皆作樂一終漢髙帝定天下百度草創詔御史置祠祀官女巫其梁山巫主祠天地武帝即位曰朕親郊上帝而后土無配則禮不答也有司與太史令談祠官寬舒議之於是東幸汾陰男子公孫滂洋等見汾旁有光如絳遂立后土祠於汾隂脽上澤中為五壇壇一黃犢以髙帝配牢具已祠盡瘞而從祀者衣尚黃始用樂舞帝親望拜如上帝禮至宣帝修武帝故事間歲正月一日至河東祠后土成帝建始初徙河東后土於長安北郊後以帝無繼嗣復汾隂后土如故帝崩皇太后詔復北郊長安平帝立地與天合祭於南郊壇後漢光武中元元年營北郊祀地祇在雒陽城北四里為方壇四陛遷呂太后於園上薄太后尊號曰髙后以配地祇正月辛未别祀地祇於南郊位南面西上髙皇后配西面北上皆在壇上地理羣神從食皆在壇下中嶽食在未四嶽各在其方海東河西濟北淮東江南山川各在其方髙后用犢各一五嶽共牛一四海四瀆共牛一羣神共牛二樂如南郊既送神瘞俎實于壇北明帝永平二年正月上丁祀南郊畢次郊魏明帝景初元年詔祀方丘所祭曰皇皇后地以舜妃伊耆氏配北郊所祭曰皇地之祇以武宣皇后配晉武帝受禪後泰始二年定郊祀北郊以先后配是年有司奏古者丘郊不異遂并圓方二丘於南郊更修壇兆其二至之祀合於二郊十一月庚寅帝親祠於南郊自後方澤不別立東晉元帝太興二年北郊未立地祇共在天郊明帝太寧三年七月始詔立北郊未及建而帝崩成帝咸和八年於覆舟山南立北郊從祀則五嶽四望四海四瀆五湖五帝之佐沂山嶽山白山霍山醫無閭山蔣山松江會稽山錢塘江先農凡四十四神江南諸小山蓋江左所立如漢西京關中小水皆有祭秩是月辛未祀北郊以宣穆張后配地魏氏故事非晉舊也康帝建元元年正月辛未南郊辛巳北郊帝皆親奉宋武帝永初二年親南北郊孝武帝大明三年移北郊於鍾山北原與南郊相對後還舊處齊髙帝受禪建元二年正月次辛北郊犧牲之色因舊不改而無配武帝永明三年議用次辛車服之儀率遵漢制梁武帝制北郊為方壇於國之北常與南郊間歲正月上辛以一特牛祀后土於壇上以德后配禮以黃琮五官先農五嶽及國內山川皆從祀其南郊明堂用沉香取天之質陽所宜也北郊用上和香以地於人親宜加雜馥天監十六年有事北郊八座奏省除四望松江浙江五湖等座其鍾山白石山既土地所在並留之如故帝行一獻之禮陳武帝亦以間歲正月上辛用特牛一祀於北郊以皇妣昭后配及文帝天嘉中南郊改以髙祖配北郊以德皇帝配宣帝即位以郊壇卑下更增廣之後魏道武瘞地於北郊以神元竇皇后配壇兆制同南郊五嶽名山在中壝內四瀆大川在外壝內后土神元后共用黑牲一玉用兩圭有邸幣用束帛五嶽等共牛一祭畢瘞牲體於壇北亥地北齊制圓丘方澤並三年一祭謂之禘祀以夏至之日禘崑崙皇地祇於方澤以武德皇后配其神社稷岱嶽沂鎮會稽鎮云云山亭亭山蒙山羽山嶧山嵩嶽霍嶽衡鎮荆山內方山大別山敷淺原山桐柏山陪尾山華嶽大嶽鎮積石山龍門山江山岐山荆山嶓冢山壺口山雷首山底柱山析城山王屋山西傾朱圉山鳥鼠同穴山熊耳山敦物山蔡蒙山梁山岫山武功山太白山恆嶽醫無閭山鎮陰山白登山碣石山太行山狼山封龍山漳山宣務山閼山方山茍山狹龍山淮水東海泗水沂水淄水濰水江水南海漢水穀水洛水伊水漾水沔水河水西海黑水潦水渭水涇水酆水濟水北海松水京水桑乾水漳水呼沱水衛水洹水延水並從祀其神州位青陛之北寅地社位赤陛之西未地稷位白陛之南庚地自餘並內壝之內內向各如其方合用牲十二儀同圓丘後周祭后土地祇於國北郊六里為壇以神農配后土之祇神州壇在其右以獻侯莫那配焉隋因周制夏至之日祭皇地祇於宫城北郊十四里方壇之上以太祖配神州迎州冀州戎州拾州柱州宫州咸州揚州其九州山川林澤邱陵墳衍原隰皆從祀地祇及配帝等牲用黃犢二神州以下用方色犢一九州山海墳衍等加羊豕各九孟冬祭神州於北郊亦以太祖武元皇帝配牲用犢二凡大祀養牲在滌九旬中祀三旬小祀一旬昊天五帝日月星辰地祇神州宗廟社稷為大祀星辰五祀四望為中祠司中司命風師雨師諸星山川為小祀其牲方色難備者聽以純色代煬帝大業元年孟冬祀神州改以髙祖文帝配唐制夏日至祭皇地祇于宫城之北郊十四里為方丘壇因隋制以景帝配神州五方嶽鎮海瀆山林川澤邱陵墳衍原隰皆從祀地祇及配帝牲用黃犢二神州用黝犢一嶽鎮以下加羊豕各五孟冬祭神州於北郊景帝配牲用黝犢二貞觀中奉髙祖配地郊永徽中許敬宗等奏祭地之外別有神州謂之北郊殊無典據遂廢神州之祀乾封初又詔依舊祀神州二年詔以髙祖太武皇帝崇配方丘等祀太極元年正月初將有事于南郊有司議唯祭昊天上帝續議設皇地祇位開元二十一年夏日至祀皇地祇于方丘以髙祖配立冬祭神州于北郊以太宗配時房元齡議以神州者國之所託餘八州則義不相及今請除八州惟祭皇地祇及神州以正祀典開元十一年上自東都將還西京便幸并州至十二年二月二十二日祠后土于汾隂睢上太史奏榮光出河休氣四塞祥雲繞壇日揚其光二十年車駕欲幸太原中書令蕭嵩上言去十一年親祠后土為蒼生祈穀自是神明昭祐纍年豐登有祈必報禮之大者且漢武親祠睢上前後數四伏請準舊年事至后土行報賽之禮從之社稷顓帝祀共工氏子勾龍為社烈山氏子柱為稷髙辛氏唐虞夏皆因之商湯為旱遷柱而以周棄代之欲遷勾龍無可繼者故止周制天子立三社祭法云王為羣姓立社曰太社於庫門內之西立之王自為立社曰王社於籍田立之亡國之社曰亳社廟門之外立之諸侯立三社祭法云諸侯為百姓立社曰國社於臯門之西立之自為立社曰侯社亦於籍田中立之而亦立亳社大夫以下立一社祭法云大夫以下成羣立社曰置社今之里社也但立名雖異其神則同皆以勾龍配之稷周棄配之社者五土之神稷者於五土之中特指原隰之祇援神契曰稷者原隰之中能生五穀之祇也社壇在東稷壇在西俱北面壇築墻開四面門天子之社則以五色土各依方色為壇廣五丈諸侯則但用當方之色為壇皆植木以表其處又別為主以象其神大夫以下但各以其地所宜之木而立之漢髙帝初起禱豐枌榆社二年東擊項籍還入關因命縣為公社後四年天下定詔御史令豐謹理枌榆社其後又令縣常以春三月及臘祠后稷平帝時王莽奏建立社稷自髙祖除秦社稷立漢社稷時已有官社以夏禹配而未立官稷至此始立之稷種穀樹徐州牧歲貢五色土一斗後漢光武建武二年立太社稷于洛陽在宗廟之右皆方壇無屋有墻有門而已二月八月及臘一歲三祀皆太牢具使有司祠郡縣皆置社稷太守令長侍祠牲用羊豕唯州所治有社無稷以其使官也魏自漢後但太社有稷官社無稷故常二社一稷也至明帝景初中立帝社明帝祭社但稱皇帝晉武帝太康九年詔曰社實一神其并社之祀東晉元帝建武元年又依洛京立二社一稷宋仍晉舊無所改作梁社稷在太廟西依晉元帝所創有太社帝社太稷凡三壇至大同初又加官社官稷為五壇陳依梁而帝社以三牲首餘以骨體薦粢盛為六飯粳以敦稻以牟黃粱以簠白粱以簋黍以瑚粢以璉後魏天興二年置太社太稷帝社於宗廟之右為方壇四陛以二月八月日用戊皆以太牢勾龍配社周棄配稷並有司侍祠北齊立太社帝社太稷三壇於國右每仲春仲秋元辰及臘各以一太牢祭焉皇帝親祭則司農卿省牲進熟司空亞獻司農終獻後周立社稷於左帝親祠則冡宰亞獻宗伯終獻隋文帝開皇初建社稷並列於含光門內之右仲春仲秋吉戊各以一太牢祭牲色用黑孟冬下亥又臘祭之州郡縣二仲月並以少牢祭百姓亦各為社唐社稷亦於含光門內之右仲春仲秋二時戊日祭太社太稷社以勾龍配稷以后土配武太后天授三年九月為社至長安四年三月制社依舊用八月神龍元年改先農壇為帝社壇於太壇西立帝稷壇禮同太社太稷其壇不備方色異於太社又其年五月詔於東都建置太社天寶三載二月詔社稷列為中祀頗紊大猷自今以後升為大祀山川黃帝祭山川為多虞氏秩于山川遍于羣神周制四坎壇祭四方以血祭祭五嶽以埋沈祭山林川澤一歲凡四祭一者謂迎氣時二者郊天時三者大雩時四者大䄍時皆因以祭之秦并天下令祠官所常奉名山大川鬼神可得而序於是自崤以東名山大川祠山曰太室恆山泰山會稽湘山水曰淮濟春以脯酒為歲禱因泮凍秋涸凍冬塞其牲用牛犢各一牢具圭幣各異自華以西名山七曰華山薄山嶽山岐山吳山鴻冢瀆山蜀之岷山也名川四曰河祠臨晉沔祠漢中湫淵祠朝那江水祠蜀亦春秋泮涸禱塞如東方山川而牲亦牛瀆圭幣各異而四大冡鴻岐昊嶽皆有嘗禾其河加有嘗醪此皆在雍州之域近天子都故加車一乘駵駒四灞滻灃潦涇渭長水皆不在大山川數以近咸陽盡得比山川祠而無車乘駵駒之加漢孝文十二年五穀不登詔增修山川羣祀武帝因巡狩禮其名山大川用駒者悉以木偶馬代行遇親祠者乃用駒後漢章帝元和二年詔祀山川百神應禮者魏文帝黃初三年禮五嶽四瀆咸秩羣祀瘞沈圭璋宋孝武帝大明七年六月有司奏奠祭霍山殿中郎邱景先議宜使太常持節牲以太牢之具羞用酒脯時穀禮以赤璋纁幣器用陶匏藉用茅席梁令郡國有五嶽者置宰祀三人及有四瀆若海應祀者皆以孟春仲冬祀之後魏明元帝立五嶽四瀆廟於桑乾水之陰春秋遣有司祭其餘山川諸神三百二十四所每歲十月遣祠官詣州鎮遍祠有水旱災厲則牧守各隨其界內而祈謁王畿內諸山川有水旱則禱之太武帝南征造恆山祀以太牢浮河濟祀以少牢過岱宗祀以太牢遂臨江登瓜步而還後周大將出征遣太祝以羊一祭所過名山大川隋制祀四鎮東鎮沂山西鎮吳山南鎮會稽山北鎮醫無閭山冀州鎮霍山並就山立祠祀四海東海於會稽縣界南海於南海鎮南並近海立祠及四瀆並取側近巫一人主知灑掃並令多植松柏唐武德貞觀之制五嶽四鎮四海四瀆年別一祭各以五郊迎氣日祭之東嶽岱山祭於兖州東鎮沂山祭於沂州東海祭於萊州東瀆大淮祭於唐州南嶽衡山於衡州南鎮會稽山於越州南海於廣州南瀆大江於益州中嶽嵩山於洛州西嶽華山於華州西鎮吳山於隴州西海及西瀆大河於同州北嶽恆山於定州北鎮醫無閭山於營州北海及北瀆大濟於洛州其牲皆用太牢祀官以當界都督刺史充先天二年封華嶽神為金天王開元十三年封泰山神為天齊王天寶五載封中嶽神為中天王南嶽神為司天王北嶽神為安天王六載河瀆封為靈源公濟瀆封為清源公江瀆封為廣源公淮瀆封為長源公會稽山為永興公嶽山為成德公霍山為應聖公醫無閭山為廣寧公八載閏六月封太白山為神應公其九州鎮山除入諸嶽外並宜封公十載正月以東海為廣德王南海為廣利王西海為廣潤王北海為廣澤王分命卿監詣嶽瀆及山取三月十七日一時備禮兼册祭其祭儀具開元禮籍田周制天子孟春之月乃擇元辰親載耒耜置之車右帥公卿諸侯大夫躬耕籍田千畝於南郊冕而朱紘躬秉耒天子三推以事天地山川社稷先古以為醴酪粢盛於是乎取之漢文帝制曰農天下之本遂開籍田朕躬耕以給宗廟粢盛漢舊儀云春始東耕於籍田官祀先農以一太牢百官皆從賜三輔二百里內孝悌力田三老帛種百穀萬斛為立籍田倉置令丞穀皆以給天地宗廟羣神之祀以為粢盛景帝詔曰朕親耕為天下先昭帝幼即位耕於勾盾弄田後漢明帝永平中二月東巡耕於下邳章帝元和中正月北巡耕於懷縣其籍田儀正月始耕常以乙日祠先農及耕於乙地晝漏上水初納執事告祠先農已享耕時有司請行事就耕位天子三公九卿諸侯百官以次耕推數如周法力田種各耰訖有司告事畢是月命郡國守皆勸民始耕魏氏雖天子親耕籍田而藩鎮闕諸侯百畝之禮晉武帝太始四年正月丁亥帝躬耕籍田于東郊詔曰近代以來籍田止於數步之中空有慕古之名曾無供祀訓農之實而有百官車徒之費今循千畝之制當與羣公卿士躬稼穡之艱難以帥先天下於東郊之南洛水之北乘輿御木輅以耕以太牢祀先農自惠帝之後其禮遂廢東晉元年將修耕籍事終不行宋文帝元嘉二十一年將親耕先立春九日司空大司農京尹令尉度官之辰地八里之外整制千畝中開阡陌立先農壇於中阡西陌南設御耕壇於中阡東陌比將耕宿青幕于耕壇之上皇后帥六宫之人出穜稑之種付籍田令耕日太祝令以一太牢祀先農如帝社儀孟春上辛後吉亥御乘耕根三蓋車駕蒼駟建青旗著通天冠青幘青衮佩蒼玉蕃王以下至六百石皆衣青唯三臺武衛不耕不改章服駕出如郊廟儀至籍田侍中跪奏至尊降車臨壇大司農跪奏先農已享請皇帝親耕太史贊曰皇帝三推三反於是羣臣以次耕王公及諸侯五推五反孤卿大夫七推七反士九推九反籍令率其屬耕終畝灑種即耰禮畢乃班下州縣悉具其禮焉齊武帝永平中耕籍田用丁亥使御史乘馬車載耒耜從五輅後梁初依宋齊禮以正月用事不齋不祭天監十二年武帝以啓蟄而耕改用二月乃與百官御事並齋三日沐浴祼饗侍中奉耒耜載於象輅以隨木輅之後普通二年又移籍田於建康北岸築兆域如南北郊別有望耕臺在壇東帝親耕畢登此臺以觀公卿之推反後魏太武帝天興二年春始躬耕籍田祭先農用羊一北齊籍田於帝城東南千畝內種赤粱白穀大豆赤黍小豆黑穄麻子大麥小麥色别一頃自餘一頃地中通阡陌作祠壇於陌南阡西廣輸三十六尺四陛三壝四門又為大營於外設御耕壇於阡東陌北每歲正月上辛後吉亥祀先農神農氏於壇上無配饗祭訖親耕隋制於國南十四里啓夏門外置地千畝為壇行籍田之禮播植九穀納于神倉以擬粢盛穰藁以餉犧牲唐貞觀三年正月二十一日太宗親祭先農籍于千畝之甸武后改籍田壇為先農壇神龍初復改先農壇為帝社壇開元二十三年二月親祠神農于東郊勾芒配禮畢躬御耒耜籍于千畝之甸時有司進儀注天子三推公卿九推庶人終畝明皇欲重勸耕籍遂進耕五十餘步盡壠乃止耕畢輦還齋宫大赦侍耕執牛官皆加級賜帛其儀備開元禮先蠶周制仲春天官內宰詔后帥外內命婦治蠶于北郊以為祭服天子諸侯必有公桑漢皇后蠶于東郊後漢皇后四月帥公卿列侯夫人蠶祠先蠶禮以少牢魏文帝黃初七年皇后蠶于北郊依周典也晉武帝太康六年蠶於西郊與籍田對其方也先蠶壇髙一丈方二丈為四出陛陛廣五尺在皇后採桑壇東南帷宫外門之外而東南去帷宫蓋十丈在蠶室西南桑林在其東取列侯妻六人為蠶母蠶將生擇吉日皇后著十二筓步搖依漢魏故事衣青衣乘油畫雲母安車駕六騩音貴馬女尚書著貂蟬佩璽陪乘載筐鈎公主三夫人九嬪世婦諸太妃太夫人及縣鄉君郡公侯特進夫人外世婦命婦皆步搖衣青各載筐鈎從蠶先桑二日蠶宫生蠶著簿上躬桑日皇后未到太祝令質明以太牢告祠謁者一人監祠祠畢撤饌頒餘胙於從桑及奉祠者皇后至西郊升壇公主以下陪列壇東皇后東面躬桑採三條諸妃公主各採五條鄉縣以下各採九條悉以桑授蠶母還蠶室事訖皇后還便座公主以下乃就位設饗宴賜絹各有差江左至宋孝武大明四年始於臺城西白石里為蠶所設兆域置大殿又立蠶觀北齊為蠶坊於京城北之西去皇宫十八里外有蠶宫方九十步墻髙一丈五尺其中起蠶室二十七口別殿一區置蠶宫令丞宦者為之每歲季春穀雨後吉日使公卿以一太牢祠先蠶黃帝於蠶壇上無配如祀先農禮訖皇后因親桑於壇備法駕服鞠衣乘重翟帥六宫升桑壇東陛即御座女尚書執筐女尚衣執鈎立壇下皇后降自東陛執筐者處右執鈎者居左蠶母在後乃躬桑三條訖升壇即御座內命婦以次就桑服鞠衣者採五條展衣七條褖衣九條以授蠶母還蠶室切之授世婦灑一簿凡應桑者並復本位后乃降壇還便殿改服設勞酒頒賚而還後周制皇后乘翠輅率六宫三妃三􅀈音􅀈婦官名御媛御婉三公夫人三孤內子至蠶所以一少牢親祭進奠先蠶西陵氏神禮畢降壇令二嬪為亞獻終獻因以躬桑隋制先蠶壇於宫北三里為壇髙四尺季春上已皇后服鞠衣乘重翟率三夫人九嬪內外命婦以一太牢制幣祭先蠶於壇上用一獻之禮祭訖就桑位於壇東面尚功進金鈎典制奉筐皇后採三條反鈎命婦各依班採五條九條世婦於蠶母受切桑灑訖皇后乃還唐顯慶元年三月辛巳皇后武氏先天三年三月辛卯皇后王氏乾元二年三月己巳皇后張氏並有事於先蠶其儀備開元禮通志卷四十二
