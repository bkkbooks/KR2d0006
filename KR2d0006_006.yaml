body:
  text: 通志卷三下宋右廸功郎鄭樵漁仲撰三王紀第三下周棄曰后稷帝嚳之子也其母有邰氏女曰姜原姜原為帝嚳元妃因出野見巨人跡心忻然説欲踐之踐之而身動如孕者居期而生子以為不祥棄之於隘巷牛羊過者皆避不踐或腓字之徙置之平林會伐林木者收而生之又遷而寘於渠中水上飛鳥以其翼覆薦之姜原以為神遂取養長之初欲棄之故名曰棄棄為兒時忔如巨人之志其游戲好蓻麻菽麻菽美及為成人遂好耕農相地之宜榖者稼穡焉民皆效之堯聞而舉為農師民得其利舜命之曰棄黎民阻飢汝后稷播時百榖封於邰今武功縣斄城是也號曰后稷别為姬姓后稷之興在陶唐虞夏之際皆有令德與契益伯夷佐禹平水土各有功稷勤於百穀而山死子不窋襲位不窋末年夏后氏政衰去稷不務不窋失其官奔戎狄之間卒子鞠立鞠亦曰鞠陶卒子公劉立公劉雖在戎狄之間復修后稷之業務耕種行地宜遷邑于豳今邠州三水西南三十里有古豳城邠即豳也乃自漆沮渡渭取材用行者有資居者有積百姓懷之多徙歸焉周道自此而興詩人樂其德而歌之卒子慶節立或言慶節國于豳卒子皇僕立卒子差弗立卒子毁隃立卒子公非立公非亦曰辟方卒子高圉立高圉能率后稷者也故周人報焉卒子亞圉立亞圉亦曰雲都卒子公叔祖類立公叔祖類亦曰太公叔類亦曰組紺諸盩卒子古公亶父立古公當殷武乙之時王綱不振能復修后稷公劉之業積德行義國人戴之薰粥來攻古公事之以皮幣犬馬珠玉菽粟貨財皆不得免焉復欲其土地與民古公曰與之耆老曰君不為社稷乎曰社稷所以為民也不可以所為亡民也耆老曰君不為宗廟乎曰宗廟吾私也不可以私害民也夫有民立君將以利之與人之兄居而殺其弟與人之父居而殺其子以其所養害其所養吾不忍也民之在我與其在彼何異二三子何患乎無君杖䇿而去率其私屬去豳渡漆沮踰梁山邑于岐山之下今鳯翔府岐山是也始改國號曰周或言后稷始封于邰即號曰周豳人曰仁人之君不可失也舉國扶老攜幼從之者二千乘一止而成三千戸之邑鄰國聞其仁而多歸之古公乃貶戎狄之俗營築城郭室屋而居作五官有司曰司徒司馬司空司士司宼民歌樂之頌其德古公娶有邰氏女曰太姜美而賢生太伯仲雍季歴或言太姜生少子季歴季歴娶摰國之女曰太任亦賢生昌有聖瑞昌在母不憂在傅不勤處師不煩事父不怒友于二虢二虢者昌之二弟虢仲虢叔古公曰我世當有興者其在昌乎太伯仲雍知古公欲立季歴以傳昌乃二人亡如荆蠻文身斷髪太伯自號句吳荆蠻義而歸者千餘家古公卒或言百二十歲武王王天下追號古公為太王太王能率稷者也故周人報焉季歴亦曰公季篤於行義諸侯順之商益衰公季以功多受圭瓚秬鬯之賜九命作伯號西伯得專征乃伐西落鬼戎俘其主以歸公季卒年百歲子昌立武王王天下追號公季為王季臣謹按王肅曰太伯見王季生文王知天命之有在去而適吳太王沒而不反或言古公將卒謂季歴曰我死汝即推兩兄彼即辭汝有義而安矣古公卒季歴之吳召二兄相從而歸羣臣欲立之太伯仲雍以先君之命不可復如荆蠻文王昌襲公季為西伯及武王王天下追諡文王文王遵后稷公劉之業則古公公季之法篤仁優老慈少禮賢日中不暇食以待士士以此多歸之伯夷叔齊兄弟辭國而歸文王曰吾聞西伯善養老盍歸乎來太顚閎夭散宜生南宮适鬻子辛甲大夫之徒皆歸之鬻子名熊時年九十西伯曰子老矣鬻子曰捕虎逐麋臣已老矣坐而籌䇿臣尚少也封於楚辛甲故商之臣事紂蓋七十五諫不聽而去至周召公與語賢之以告文王文王自迎之封於長子文王之為政也詢于八虞八虞者周之八士皆為虞官咨于二虢以為卿士度於閎夭謀於南宮諏於蔡原訪於辛甲重以周召畢榮是以能治紂用崇侯虎之讒囚文王于羑里於是究明易道或言始作彖象文王被囚七年諸侯皆從之囚紂懼而歸之日譖西伯者崇侯虎也文王之行信於諸侯諸侯皆來決平虞芮之君爭田既久俱如周質焉入其境耕者讓畔行者讓路入其邑男女異路班白不提負入其朝士讓為大夫大夫讓為卿虞芮之君皆有慚色曰吾所爭周人所耻吾曹小人不可以履君子之庭俱讓而去以其田為間田天下聞之一時歸周者三十餘國或言四十餘國諸侯皆曰西伯蓋受命之君文王自是更稱元年是時商道不宏諸侯多事文王文王一年斷虞芮之質二年伐邗三年伐密須四年伐犬夷五年伐黎黎亦謂之耆六年伐崇七年而崩史記亦以斷虞芮之訟為受命之年明年伐犬戎明年伐宻須明年敗耆國明年伐邗明年伐崇侯虎明年西伯崩雖所伐有差而同為七年崩然書明言九年大統未集安得為七年崩也自虞芮之訟決諸侯皆取質於西伯西伯為是東征西伐以討不平伯者之事也安得為受命乎初文王伐邗問太公曰孰可伐太公曰密須可管叔曰其君彊明伐之不可太公曰先王伐逆不伐順伐險不伐易遂自阮徂共而及密須密須之人自縳其君而歸文王文王伐崇宣言曰崇侯虎蔑侮父兄不敬長老聽訟不矜分財不均民力盡不得衣食予將征之乃伐崇令無殺人無壞室無塞井無伐木無掠六畜不如令者不赦三旬而崇不降退修敎而復伐之因壘而降文王行於野見枯骨命吏瘞之吏曰此無主矣文王曰有天下者天下之主有一國者一國之主吾即其主也以棺衾而葬之天下聞之曰西伯之澤及枯骨况於人乎或言文王為沼而得枯骨葬之文王問太公曰為天下若何對曰王者之國富民伯者之國富士僅存之國富大夫無道之國富倉府是謂上溢而下漏文王曰善遂發倉府賑窮獨文王之業既光大乃遷于豐豐今在永興鄠縣東南有豐水焉去岐山三百餘里分岐邦周召之地為周公旦召公奭之采邑天下三分有其二猶率殷之叛國以事紂是時五星聚於房赤雀銜書止于屋又有黄龍元龜白魚赤雀負圖銜書之應文王九年實紂之三十年也文王寢疾五日謂太子發曰見善而弗怠時至而勿疑去非而勿憚三者道之所止也太子再拜受之文王在位五十年崩呂氏春秋曰四十一年韓嬰曰五十一年年九十七葬于畢今長安縣西畢陌是也文王娶有莘氏之女曰大姒號文母文王治外文母治内文王之業賴文母之助為多焉大姒十子長伯邑考次武王發次管叔鮮次周公旦次蔡叔度次曹叔振鐸次郕叔武次霍叔處次康叔封季曰聃季載皇甫謐曰文王生伯邑考次武王次管叔次蔡叔次郕叔次霍叔次周公次曹叔次康叔次聃季名同國同而次異發旦尤賢左右文王故文王舍伯邑考而立武王也又有滕毛郜雍畢原豐郇八國皆文王子也文王身長十尺十二而冠十三而生伯邑考焉臣謹按諸侯即位而再改元者或有焉史記秦惠王十四年更為元年汲冡紀年魏惠成王三十六年改元稱一年何必受命而後改元也又按泰誓之序曰十有一年武王伐商其書曰十有三年春大㑹于孟津洪範亦曰十有三祀王訪于箕子則知武王伐商在十三年由泰誓序之訛以三為一致後之説者紛紛也又按文王即位之八年六月寢疾五日而地震東西南北不出郊圻有司曰地震為人主也羣臣皆恐欲跅其城以移之文王曰天之見妖以罰有罪我若有罪若何逃罰率德改行其可免乎於是謹其禮秩皮革以交諸侯飭其辭令幣帛以禮俊士頒其爵級田疇以賞有功未幾疾愈又按文王囚於羑里厄憤而歌曰商道溷溷寖濁煩兮朱紫相合不别分兮迷亂聲色信讒言兮炎炎之虐使我愆兮幽之牢穽由其言兮遇我四國憂勤勤兮又按文王與呂尚語而大説曰吾先君太公曰當有聖人適周周以興無乃子邪吾太公望子久矣故號太公望然此臆説也名號之義不如是且周之先公無號太公者又何望焉又按文王以伯邑考質於商為紂御紂曰吾聞聖人不食其子乃烹伯邑考以羮遺文王文王得而食之紂曰孰謂昌為聖人此皆誕語也武王即位太公望為師周公旦為輔召公畢公之徒為左右修文王之業文王之十一年或言九年東觀兵至于孟津為文王木主載之車中武王稱太子發奉先君東伐示不敢專也乃告司馬司徒司空遂興師太公左杖黄鉞右秉白旄誓衆渡河曰總爾行伍與爾舟楫後至者誅武王渡河中流白魚躍入王舟中武玉俯取以祭既渡有火自上而下至于王屋流為烏其色赤其聲魄云是時不期而會者八百諸侯皆曰紂可伐矣武王曰汝未知天命乃還師武王出見暍人蔭之於樾下左擁而右扇之天下聞之莫不懷其德紂之淫虐滋甚武王徧告諸侯曰今商如是不可以不畢伐遂率戎車三百乘虎賁三千人甲士四萬五千人將行卜戰龜焦不兆蓍立而折筮又不吉風雨暴至折蓋太公因其形而制曲蓋今猶存遺制焉羣臣盡懼太公曰枯骨朽草不踰人矣乃焚龜棄蓍帥衆先進武王從之行之日以兵忌東面而逆太歳魚辛諫曰歲在北方不北征武王不從至氾而泛將涉河陽侯之波逆流而擊舟風雨晝暝相視不見武王瞋目而撝之風霽而波靡十有三年一月戊午師渡孟津前歌後舞次于河朔諸侯以兵車會者四千乘武王乃作泰誓以告于衆曰今商王受弗恭于天降災下民沈湎冒色敢行暴虐罪人以族官人以世惟宮室臺榭陂池侈服以殘害于爾萬姓焚炙忠良刳剔孕婦皇天震怒命我文考肅將天威大勲未集肆予小子發以爾友邦冡君觀政于商惟受罔有悛心同力度德同德度義受有臣億萬惟億萬心予有臣三千惟一心商罪貫盈天命誅之予弗順天厥罪惟鈞爾尚弼予一人永清四海明日王乃大廵六師明誓衆士曰今商王受自絶于天結怨于民斮朝涉之脛剖賢人之心崇信姦回放黜師保屏棄典刑囚奴正士郊社不修宗廟不享作竒技淫巧以悦婦人上帝弗順於是降䘮爾其孜孜奉予一人恭行天罸軍至河水紂使膠鬲候周師膠鬲見武王而問曰西伯將焉之王曰將之殷膠鬲曰何日至王曰甲子膠鬲去而雨大作皆曰不可行王曰吾令膠鬲以甲子報其主矣遂行王韈係解五人御於前莫肯為王結之皆曰臣所以事君非為結韈也王乃釋旄鉞俯而自結二月甲子朝至于商郊牧野乃誓武王左杖黄鉞右秉白旄以麾曰嗟我友邦冢君司徒司馬司空亞旅師氏千夫長百夫長及庸蜀羌髳微盧彭濮人稱爾戈比爾干立爾矛予其誓王曰古人有言牝雞無晨牝雞之晨惟家之索今商王受惟婦言是用惟多罪逋逃之人是信是使俾暴虐于百姓以姦宄于商邑今予發惟恭行天之罰今日之事不愆于六步七步乃止齊焉夫子勗哉不愆于四伐五伐六伐七伐乃止齊焉勗哉夫子如虎如貔如熊如羆于商郊勗哉夫子爾所不勗其于爾躬有戮陳師牧野紂亦發兵七十萬以距之武王命師尚父與百夫致師以大卒馳紂師紂師雖衆無鬭心惟欲武王亟入武王馳之紂兵皆叛倒戈以開周師紂走而自燔武王持大白之旗以麾諸侯諸侯畢拜武王乃揖諸侯諸侯從王入商國商之百姓咸待于郊觀周師之入見畢公至商民曰是吾新君也商容曰非也視其為人嚴乎將有急色故君子臨事而懼見太公至民曰是吾新君也商容曰非也其人虎據而鷹趾當敵將衆威怒自倍見利即前不顧其後故君子臨衆果於進退見周公至民曰是吾新君也商容曰其人忻忻休休志在除賊是非天子則周之相國也故聖人臨衆不惡而嚴是以知之見武王至民曰是吾新君也商容曰然聖人為海内討惡見惡不怒見善不喜顔色相副是以知之商人皆再拜稽首武王亦答拜武王乃出復軍皇皇若天下之未定問太公曰奈商之士衆何對曰愛其人者兼其屋上之烏憎其人者盡其儲胥咸劉厥敵靡使有餘王曰不可問於召公對曰有罪者戮無辜者宥王曰不可問於周公對曰使各居其居田其田無變新舊惟仁是親王曰善哉明日除道及紂宮百夫荷䍐旗以先驅叔振鐸奉陳常車周公旦秉大鉞畢公秉小鉞以夾武王散宜生太顚閎夭皆執劒以衞既入立于社南毛叔鄭奉明水康叔封奉布兹召公奭贊采師尚父牽牲尹佚奉筴祝柴于上帝祈于社朝于湯廟乃出設奠於牧室追至三代以古公為太王公季為王季諡其父曰文王祀先公以天子之禮改文王之十三年己卯為元年以建子為正月至於授民時廵狩祭享兼用夏正建寅焉色尚赤社用栗葬用栢牲用騂以赤為徽號朝燕服冕而元衣八寸為尺其樂曰大武武王踐阼三日師尚父道丹書之言曰敬勝怠者昌怠勝敬者亡義勝欲者從欲勝義者凶以仁得之以仁守之其量百世以仁得之以不仁守之其量十世以不仁得之以不仁守之其世必傾王聞其言書之於席几鑑盥盤楹杖帶觴豆戸牖履劒弓矛皆為銘焉微子持祭器造於軍門面縳銜璧輿櫬武王親釋其縛受其璧而祓之焚其櫬禮而命之使復其位乃三分商之畿内封紂子武庚禄父為諸侯以續商祀治商之餘民恐其變也命管叔尹鄘蔡叔尹衞相祿父居邶是為三監乃命召公釋箕子之囚命畢公釋百姓之囚表商容之閭商容賢者也紂棄而不用隱於太行武王以為三公固辭不受命命南宮适散鹿臺之錢發鉅橋之粟賑貧窮起幽側放傾宮之女命史佚展九鼎寳玉命閎夭封比干之墓命宗祝享祀于軍商民大悦曰王於死者猶封其墓况生者乎亡者猶表其閭况存者乎王於財也聚者猶散之肯復藉乎王於色也在者猶歸之肯復求乎武王已平商亂罷兵西歸四月至于豐丁未祀于周廟越三日庚戍柴望大告武成薦俘馘于太廟封諸侯班宗彛分商之器物武王追思先聖乃褒封神農之後於焦今陜州有焦城黄帝之後於祝今淄州淄川帝堯之後於薊今幽州薊縣帝舜之後於陳今陳州宛邱大禹之後於把今開封雍邱於是封功臣謀士以師尚父為首封於營邱曰齊今齊州臨淄封弟周公旦於曲阜曰魯今兖州仙源召公奭於燕今幽州叔鮮於管今鄭州管城叔度於蔡今蔡州上蔡叔振鐸於曹今廣濟定陶叔武於郕今濮州雷澤叔處於霍今晉州霍邑康叔封聃季載皆少未封其餘各以次受封立七十一國封兄弟之國十五人同姓之國四十人周之子孫不狂惑者皆得為諸侯惟周公留佐周武王徴九牧之君登豳之阜以望商邑王至于周自夜不寐周公旦即王所曰曷為不寐王曰惟天不饗商自發未生於今六十年麋鹿在牧蜚鴻滿野天不饗商乃今有成我未定天保何暇寐我南望三塗北望岳鄙顧瞻有河越視伊洛母逺天室營周居于洛而後去縱馬於華山之陽放牛於桃林之野偃干戈振兵釋旅釁鼓旗甲兵藏之府庫示天下不復用也武王已克商虗已而問箕子商所以亡箕子不忍言乃問以天道箕子陳洪範武王封之於朝鮮而不臣也箕子嘗朝周過故商虛感宮室生禾黍而作麥秀之詩曰麥秀漸漸兮禾黍油油彼狡童兮不與我好兮商民聞之皆流涕後二年武王有疾天下未集羣臣懼而卜之周公乃祓齊自為質告太王王季文王欲身代武王占之曰吉周公納冊于金縢之匱中明日有瘳武王自豐遷于鎬鎬在今永興鄠縣東南豐文王都也自岐遷焉豐在豐水之南鎬在豐水之東豐鎬相去二十里在位七年崩年九十三葬于畢封禪書云武王克商二年天下未定而崩皇甫謐曰武王元年乙酉六年庚寅崩皇覽曰文王武王周公冢皆在長安鎬聚東社中也太子誦立是為成王周人禘嚳而郊稷祖文王而宗武王文武二廟蓋百世不遷云臣謹按周以木德王天下又按皇甫謐曰武王伐紂之年夏四月乙卯祀于周廟將帥之士皆封諸侯者四百人成王即位元年丙戌周公位冢宰以天下初定王年少恐諸侯畔周公攝政當國南面黼扆以朝諸侯成王冠周公命史雍曰辭達而已勿多也史雍頌曰近於民逺於佞近於義嗇於時惠於財任賢使能周公曰善成王朝于祖廟以見諸侯管叔蔡叔羣弟疑周公攝政恐不利於成王奄君告武庚祿父曰此百世之時也請舉事管蔡挾武庚率奄淮夷叛周公奉王命興師東伐周公居東二年罪人斯得誅武庚管叔放蔡叔與之車七乘徒七十人降霍叔于庶人三年不齒遂定奄及淮夷東土以寧諸侯復宗周分殷之餘民為二以其一封微子啓代殷後國於宋又以其一封康叔於衞又封季載於聃實周公之季弟也又封武王之四子於晉邗應韓晉國得嘉禾異畝合穎獻之成王成王以歸周公于兵所周公受禾東土旅天子之命作嘉禾周公遣使察民之有飢寒者獄訟之有寃者賢才之有幽滯者歸而以告周公周公於其君來朝也揖而問之百姓聞之曰何居之深而見之明也六年周公朝諸侯於明堂制禮作樂頒度量而天下大治交趾之南有越裳氏重三譯而獻白雉周公曰德澤不加君子不饗其䞇政令不施君子不臣其人譯曰吾國之黄耉曰天無烈風滛雨海不揚波三年矣意中國有聖人於是來朝周公致薦於宗廟使者迷其歸途周公錫以軿車五乘皆為司南之制使者載之由扶南林邑海際朞年而至其國故指南車常為先導示服逺人以正四方周公行政七年成王長周公反政北面就羣臣之位成王欲紹承武王之志乃使召公先相宅于洛邑周公復申視而卒營築謂之王城今河南縣也是為東都方千七百二十丈郛方十七里南繫于洛水北因于郟山故亦謂之郟鄏遷商之九鼎而居之卜世三十卜年七百乃制郊甸方六百里因西土為方千里分為百縣縣有四郡郡有鄙以東都為天下之中四方朝貢道里均焉周公又營成周今洛陽縣遷商之頑民初周公避管蔡流言之難居東思公劉太王居豳之事以比序已志及成王迎之攝政致太平其出入也一德不回純似公劉太王太師因述其志主於豳公之事故為豳風成王既伐東夷肅愼來賀王賜榮伯作賄肅愼之命虞夏商之幣金為三品或黄或白或赤或刀布或龜貝周制以商通貨以賈易物太公立九府圜法周官有太府玉府内府外府泉府天府職内職幣職金皆掌貨幣之官故曰九府黄金方寸重一斤錢圜函方輕重以銖布帛廣二尺二寸為幅長四丈為疋故曰寳於金利於刀流於泉布於布束於帛周公為太師召公為太保畢公為太傅召公以周公嘗攝王政不宜留在王朝復列臣職其意不説周公陳已意作君奭以告之衞康叔聃季載皆有馴行周公言於王舉康叔為司宼賜寳玉祭器以彰有德季載為司空各效其能餘五叔無官但有爵土而已以非材能者不可任以官也初降霍叔為庶人後三年復其舊封成王之時咸陽雨金末年四月甲子王疾大漸懼太子釗之不任乃命召公畢公率諸侯相太子而立之或言召太保奭芮伯彤伯畢公衞侯毛公率百官相太子而立之彤姒姓餘姬姓乙丑王崩在位三十年通周公攝政為三十三年鄭元曰成王二十八年或云四十七年召公畢公以太子見于先王廟申告以文武為王業之不易務節儉毋多欲以篤信臨之作顧命臣謹按鄭元曰周公避居之初是武王崩後三年成王生十三年矣居東二年成王年十四矣迎周公返而居攝成王年十五矣七年致政成王年二十一矣故金縢注云文王十五生武王九十七而終終時武王八十三矣於文王受命為七年後六年伐紂後二年有疾瘳後二年崩崩年九十三矣周公以武王崩後三年出五年秋復返居攝四年作康誥五年作召誥七年作洛誥伐紂至此十六年也作康誥時成王年十八洛誥時年二十一也即政時年二十二然則成王以文王終明年生也又按王肅金縢注云文王十五而生武王九十七而終時受命九年武王八十三矣十三年伐紂明年有疾時年八十八矣九十三而崩以冬十二月其明年稱元年周公攝政遭流言作大誥而東征二年克武庚殺管叔三年而歸制禮作樂出入四年至六年而成七年營洛邑作康誥召誥洛誥致政成王然則文王崩之年成王已三歲武王八十一而生成王武王崩時成王已十三周公攝政七年而致政成王年二十也明年即政年二十一也又按尚書大傳叙周公居攝曰一年救亂二年克商三年踐奄四年建侯于衞五年營成周六年制禮作樂七年致政又按左傳曰成王定鼎于郟鄏卜世三十卜年八百汲冢紀年曰西周二百五十七年通東周徧合七百之數三統歴西周三百五十二年并東周八百餘年康王元年癸亥即位徧告諸侯宣告文武之業以申之乃朝諸侯於鄷宮成康之際天下安寧刑錯四十餘年不用康王命作䇿畢公分居里成周郊作畢命康王在位二十六年崩年五十七子昭王瑕立昭王之時元年己丑有光五色貫紫微井水溢是時王道衰諸侯擅相征伐荆楚不朝王南征濟漢水漢濱之人以膠船進王中流膠液船解王及祭公没焉其崩不赴告諱之也在位五十一年皇甫謐曰在位二年年三十五子穆王滿立穆王即位元年庚辰春秋已五十矣王室衰微穆王閔文武之道缺乃命伯囧申戒太僕作囧命王寵盛伯之女盛姫為之築重璧之臺怠於政治徐夷作亂帥九夷以伐宗周西至河上穆王患其熾也乃分東之諸侯命徐子主之徐子嬴姓處潢池之東地方五百里行仁義通溝陳蔡之間欲舟行上國得朱弓朱矢以為天瑞自號偃王陸地而朝者三十六國臯陶之裔曰造父以善御幸於穆王王得八駿日行千里使造父御之欲車轍馬跡周於四荒八極西與王母宴于瑤池作白雲黄竹之歌樂而忘歸聞徐偃王僭竊復御八駿長驅而還使造父告楚令伐徐王孫厲謂楚子曰徐王好行仁義其志大矣君若不伐楚必事徐楚子曰若有道不可伐對曰大伐小彊伐弱猶石之投卵虎之噬豚也楚子於是伐徐偃王不忍鬭故敗乃北走鼓城東山下民從之者以萬計因名其山曰徐山徐子將死曰吾為不忍以至於此王將征犬戎祭公謀父諫曰先王耀德不觀兵夫兵戢而時動動則威觀則玩玩則無震武王致戎于商牧非務武也勤恤民隱而除其害自其君大畢伯士之終也大畢伯士犬戎氏之二君犬戎氏以其職來王今天子曰予必不享征之無乃廢先王之訓而王幾頓乎王不聼遂征之獲四白狼四白鹿以歸遷戎于太原自是荒服不至王享國百年耄荒諸侯有不睦者甫侯為相言於王修刑辟命之曰甫刑王起六師至于九江伐楚會諸侯於塗山在位五十五年崩年百五歲子共王繄扈立共亦作恭共王元年乙亥共王游於涇上密康公從有三女犇之其母曰必致之王夫獸三為羣人三為衆女三為粲夫粲物之美也衆以美物歸女而何德以堪之王猶不堪况爾小醜乎小醜備物終必亡康公不獻一年王滅密共王能庇昭穆之闕在位十年崩皇甫謐曰在位二十五年年八十四或云在位十二年子懿王囏立懿王元年乙酉之時王室遂微詩人作刺紀侯譖齊哀公于王王烹之王嘗居大邱其地與鎬京相近有離宮在焉懿王在位二十五年崩皇甫謐曰在位二十年年五十共王弟辟方立是為孝王孝王元年庚戍之時大雨雹牛馬死江漢氷召秦非子使主馬汧渭之間馬大蕃息孝王在位十五年崩年六十五懿王子燮立是為夷王夷王元年乙丑始下堂而見諸侯荒服不至命虢公帥六師伐太原之戎至俞泉獲馬千疋在位十五年崩或云六十年年六十子胡立是為厲王厲王元年庚辰暴虐楚熊渠畏其伐去三子王號淮夷入㓂王命虢仲征之不克王好利近榮夷公大夫芮良夫諫曰王室其將卑乎夫榮公好專利而不知大難夫利百物之所生也天地之所載也而或專之其害多矣匹夫專利猶謂之盜王而行之其歸鮮矣榮公若用周必敗王不聽卒以榮公為卿士諸侯不享王行暴虐侈傲國人謗之召穆公虎諫曰民不堪命矣王怒得衞巫使監謗者以告則殺之諸侯不朝三十四年王益嚴國人莫敢言道路以目王喜告召公曰吾能弭謗矣召公曰是鄣之也防民之口甚於防水水壅而潰傷人必多民亦如之是故為水者決之使導為民者宣之使言故天子聽政使公卿列士獻詩瞽獻典史獻書師箴瞍賦矇誦瞍無眸子矇有眸子而無見百工諫庶人傳語近臣盡規親戚補察瞽史敎誨耆艾修之而後王斟酌焉是以事行而不悖民之有口也猶土之有山川也財用於是乎出猶其有原隰衍沃也衣食於是乎生口之宣言也善敗於是乎興行善而備敗所以産財用衣食者也夫民慮之於心宣之於口成而行之若壅其口其與能幾何王不聽於是國人莫敢出言三年乃相與畔襲王王出奔于彘今晉州霍邑漢為彘縣太子靜匿召公之家國人圍之召公曰昔吾驟諫王王不從以及此難今殺王太子王其以我為讐而懟怒乎乃以其子代王太子太子竟得脱召公與周公二相行政號曰共和厲王在位四十年流于彘并其和十四年通五十四年崩于彘或云在位三十七年通共和為五十一年太子靜長於召公之家二相乃立之是為宣王臣謹按共和者周召二公共行政而無相違戾者也汲冡紀年及魯連子曰共國之伯名和行天子政宣王元年周召二相輔王法文武成康之遺風王命召公虎平淮夷命皇父整六師程伯休父為司馬征徐戎命召伯定南邦封申伯以褒其功命蹶父撫北土封韓侯為諸侯長命仲山甫出使喻王之德意于四方乃城東方以定齊邑海内翕然向風諸侯復宗周尹吉甫作詩以美之王不籍千畝虢文公諫曰民之大事在農故稷為大官今欲修先王之緒而棄其大功可乎王不聽大旱自二年不雨至于六年十二年春魯武公與子括戲來朝王愛戲命魯舍括而立戲仲山甫諫不聽卒立戲是為魯懿公二十二年王晏起姜后脱簪珥待罪於永巷使其傅母言於王曰使王好色而忘德失禮而晏起自臣妾始敢請罪王曰寡人之過也自是早朝晏罷卒成中興之業二十一年魯括之子伯御殺懿公而自立三十年有馬化為人有舞于鎬京三十二年王伐魯殺伯御立懿公之弟稱是為孝公諸侯自是不睦王欲得國子之能訓導諸侯者樊穆仲曰魯侯肅恭神明詢事耉老賦事行刑必問遺訓而咨於故實王曰然則能訓治其民矣乃命孝公於夷宮三十二年有馬化為狐三十四年王征獫狁三十八年王伐條戎奔戎王師敗績三十九年與姜氏之戎戰于千畝王師敗績王御奄父曰公仲脱王奄父者趙造父六世孫王既喪南國之師乃料民於太原仲山甫諫曰古者不料民而知其多少且無故料民天之所惡也王卒料之周道復衰四十一年王征申戎破之四十六年崩初王將殺杜伯而非其罪杜伯之友左儒爭之于王九復不許王曰汝别君而異友也儒曰君道友逆則順君以誅友友道君逆則帥友以違君王怒曰易而言則生不易則死儒曰士不枉義以從死不易言以求生臣能明君之過以正杜伯之無罪王殺杜伯左儒死之後宣王畋于圃田見杜伯執弓矢射王王竟崩于田所子幽王宮湼立臣謹按史記自共和之後始書年紀甲共和之前則無年也皇甫謐之徒及歴家自羲皇以來各有年代閒或異同臣今亦從之而注甲歴及異同於其下聊備觀採然皆不足取信也共和始於庚申終於癸酉盡十四年宣王元年始於甲戍自此以後年數具在甲歴可推然仲尼紀年始於魯隱蓋本東周幽王二年西周三川皆震三川者涇渭洛皆秦地之水非東周之三川也伯陽甫曰周將亡矣伯陽甫周柱下史老子也夫天地之氣不失其序若過其序民亂之也陽伏而不能出陰迫而不能蒸於是有地震今三川實震是陽失其所而塡陰也陽失而在陰原必塞原塞國必亡昔伊洛竭而夏亡河竭而商亡今周德若二代之季矣其川原又塞塞必竭夫國必依山川山崩川竭亡國之徵也若國亡不過十年數之紀也是歲三川竭岐山崩初王伐襃襃人獻襃姒王惑之襃姒年十四與虢石父比而譖申后及太子宜臼大夫尹氏及祭公復導王為非六年王命伯士伐六濟之戎王師敗績伯士死之是時四夷交侵戎圍犬邱秦世父擊之為戎所虜歲餘復歸之八年王以鄭伯友為司徒和集其民周人便之是為鄭桓公九年王廢申后及宜臼以襃姒為后立其子伯服為太子宜臼奔申太史伯陽曰禍成矣無可奈何襃姒不好笑王説之萬方不能得周制有宼至則舉烽燧大鼓諸侯悉至王乃大舉烽燧諸侯至而無宼襃姒乃大笑王為是數舉烽燧其後不信諸侯益亦不至襃姒好聞裂繒之聲王發繒裂之以適其意虢石父佞而好利王以為卿士朝多亂政諸侯不享王室騷然於是為太室之盟戎狄叛之十一年王欲殺宜臼求之於申申侯弗予王伐之申侯與鄫人召西夷犬戎攻王王舉烽燧徵兵兵莫至遂殺幽王驪山下戲水虜襃姒并殺鄭桓公盡取周賂而去諸侯即申共立宜臼是為平王以奉周祀是時秦襄公衞武公將兵救周平戎鄭人立桓公子掘突是為武公幽王末年日暈再重内赤外輕有一黑畫上下通在日中牛化為虎羊化為狼幽王在位十一年臣謹按自武王元年己卯至厲王四十年己未二百八十一年自共和元年庚申至幽王十一年庚午七十一年共三百五十二年為西周又按幽王既死鄭武公晉文侯輔平王東遷虢公立伯服是為攜王故左傳曰攜王奸命杜預曰攜王伯服也古文作伯盤攜王之立國人不順未經年而廢之又按汲冡紀年曰幽王死申侯魯侯許文公立平王於申虢公翰立王子余二王並立余為晉文侯所殺臣又按周太史伯陽讀史記曰周亡矣昔自夏后氏之衰也有二神龍止於夏庭而言曰予襃之二君夏帝卜殺之與去之與止之莫吉卜請其漦而藏之乃吉漦龍所吐沫也於是布幣而䇿告之龍亡其漦在櫝而藏之夏亡傳其器于商商王傳其器于周比三代莫敢發厲王末年發而觀之漦流于庭不可除也厲王使婦人躶而譟之漦化為黑黿入王後宮後宮之童妾既齓而遭之既笄而孕無夫而生子懼而棄之宣王之時童謠曰檿弧箕服實亡周國檿弧檿木為弓箕木名服矢房有夫婦賣是器者宣王使執而戮之逃於道見鄉者後宮所棄乃女子也夫婦哀其夜號而收之遂奔襃國襃人有罪請入是女以贖以其出於襃故謂之襃姒姒襃姓也平王即位當幽王之亡豐鎬蕩然犬戎侵逼近郊於是晉文侯鄭武公秦襄公夾輔平王于申而遷于王城即成王所營之東都也王勞晉鄭而賜之盟曰世世子孫無相害也命晉文侯為侯伯賜秬鬯圭瓚封秦襄公為諸侯賜岐以西之地秦始通于上國命鄭武公為司徒鄭於是取鄫虢十邑之地而遷焉是為新鄭自是齊楚秦晉始大政由方伯天子微弱戎狄交居乎諸夏自隴以東及乎伊洛與戎雜居故渭首有狄原封冀之戎涇北有義渠之戎洛川有大荔之戎渭南有驪戎伊洛間有揚拒泉臯之戎潁首以西有蠻氏之戎實頼秦人為西堡障故秦文公伐戎收周之餘民而得岐内之地自岐以東獻之周周平王四十九年魯隱公元年也五十一年崩太子洩父早死立其子林是為桓王桓王平王之孫也三年鄭莊公來朝王不禮焉莊公者桓公之孫武公之子也桓公死於幽王之難武公輔平王東遷莊公欲脩祖禰之好而王不禮之鄭始怨周五年鄭與魯易許田許田者天子有事于泰山鄭人來相事之田也今易於魯示忘於周也十三年王奪鄭伯政鄭伯不朝王伐鄭鄭人禦之矢中王肩二十三年桓王崩子佗立是為莊王莊王二年十月辛卯朔日有食之四年周公黑肩欲殺王而立王子克王子克者莊王之弟子儀也周大夫辛伯告王王殺黑肩克奔燕莊王在位十五年崩子胡齊立是為僖王僖王僖亦作釐三年春諸侯會于鄄齊桓公始霸楚亦始大五年崩子閬立是為惠王閬一作諒惠王二年秋周大夫蒍國邊伯詹父子禽祝跪奉莊王之寵子子頽以伐王王出奔溫蘇子奉子頽奔衞衞師燕師伐周立子頽為王設饗禮作樂徧及六代之舞三年鄭伯和王室不克遂以王居于櫟四年虢公鄭伯同伐王城殺子頽及五大夫而納王十年王使召伯廖賜齊桓公命為侯伯二十四年冬王崩太子鄭畏太叔帶之難不發喪而告難于齊二十五年春諸侯盟于洮謀王室也襄王定位而後發喪春秋書十二月丁未從告也是歲周有白兎舞于市臣謹按惠王十五年七月有神降于莘王問内史過曰何神也對曰昭王娶於房曰房后有爽德協於丹朱丹朱憑身以儀之生穆王實照臨周之子孫今在虢土虢君無道其亡乎王曰吾其若之何對曰祝史奉牲以獻焉而勿祈也虢公使祝史請土焉過聞之曰虢亡必矣襄王即位襄王之母早死陳媯繼之實惠后生叔帶有寵於惠王王欲立之襄王三年王使召武公及内史過賜晉惠公命惠公執玉惰過歸告王曰晉侯不亡必無後夏叔帶召戎伐京師入王城焚東門秦晉伐戎以救周是歲雨金于晉四年秋叔帶奔齊是歲星晝隕于秦有聲十二年宋襄公霸十四年王以富辰之言召叔帶自齊歸于京師五年為戎難齊帥諸侯戍周初平王東遷辛有適伊川見被髮祭於野者曰不及百年此其戎乎其禮先亡矣秋秦晉遷陸渾之戎于伊川十六年秦穆公霸秋狄人奉叔帶攻王王出適鄭居于氾子帶自立為王居于溫十七年晉文公用狐偃之言納襄王殺叔帶王賜晉文公南陽之田二十年晉楚戰于城濮楚師敗績五月王命晉侯為侯伯於是晉文公始霸冬王狩於河陽以勞晉師二十九年秦用由余謀伐戎益國十二開地千里王使召公過錫穆公以金鼓三十三年崩子壬臣立是為頃王頃王在位六年崩周公閲與王孫蘇爭政故不赴于諸侯是歲有星孛入于北斗匡王元年六月辛丑朔日有食之三年秋甘歜敗戎于邥埀六年崩子瑜立是為定王史記云弟瑜立定王元年春楚子伐陸渾之戎遂觀兵于周疆王使王孫滿勞楚子楚子問鼎之大小輕重滿曰在德不在鼎昔成王定鼎于郟鄏卜世三十卜年七百周德雖衰天命未改鼎之輕重未可問也五年河徙六年王使單襄公聘于宋八年使劉康公聘于魯十四年成周宣榭火十七年劉康公伐茅戎敗績二十一年崩子夷立是為簡王簡王八年春魯成公朝周王使劉康公成肅公會晉厲公伐秦十二年尹武公單襄公及諸侯伐鄭十三年春晉人弑厲公逆襄公之曽孫周于京師而立之是為悼公十四年崩子泄心立是為靈王靈王生而有髭髯甚神聖東遷之後王室衰微至靈王始振二十一年十一月庚子孔子生二十七年王崩次子貴立是為景王臣謹按皇覽曰靈王冢在河南城西南相亭西周山上蓋以靈王生而有髭又神聖故謚靈王其冢民祀之不絶又按馬總亦曰靈王生而有髭十六年太子晉登仙景王八年春魯舍中軍卑公室也四分公室季氏擇二仲叔各一皆盡征之而貢于公二十五年崩景王太子早卒王子朝以庶長景王愛而欲立之未及而崩王子丐之黨爭立國人立王子猛是為悼王臣謹按皇覽曰景王冢在洛陽太倉中秦封呂不韋洛陽十萬戸故大其城并圍景王冢悼王立未及一年王子朝攻殺之晉人攻子朝而立匄是為敬王敬王者悼王之母弟也敬王元年晉人立王王子朝自立王不得入居于澤四年晉率諸侯納王于周尹氏召伯毛伯以子朝奔楚十年王以子朝之亂王城墮壞欲遷于成周八月王使富辛石張請城于晉冬晉魏舒合諸侯之師城成周十四年春王人晉侯會諸侯于召陵謀伐楚十五年王人殺子朝于楚十六年周儋翩率王子朝之徒因鄭人作亂伐周六邑十二月天王處于姑蕕十七年尹氏復黨儋翩為亂夏單武公劉桓公敗尹氏于窮谷冬單子劉子逆王十一月王入於王城十八年春單子劉子討儋之黨以定王室三十九年春魯人西狩獲麟四十一年夏四月己丑孔子卒四十三年王崩子仁立是為元王史記四十三年敬王崩皇甫謐云四十四年崩元王在位八年崩子介立是為貞定王貞定王亦曰定王十六年三晉滅智伯分其地二十八年王崩太子去疾立是為哀王哀王在位三月弟叔襲殺哀王而自立是為思王思王在位五月少弟嵬攻殺思王而自立是為考王嵬一作隗此三王皆定王之子也考王即位封其弟于河南是為桓公以續周公之職號西周桓公桓公卒子威公立威公卒子惠公立惠公卒子武公立武公生共太子早死立公子咎為太子初惠公有二子封其少子於鞏以奉王號東周惠公十五年王崩子午立是為威烈王威烈王二十三年九鼎震或作二十一年王命晉大夫韓趙魏為諸侯二十四年王崩子驕立是為安王驕一作龍安王十六年初命齊太公田和為諸侯二十三年齊康公薨田氏遂簒齊而絶其祀二十六年韓哀侯滅鄭韓趙魏共廢晉靖公為家人三分其地晉是以不祀王崩子喜立是為烈王烈王亦曰夷烈王二年周太史儋見秦獻公曰始周與秦國合而别别五百載復合周孝王封秦仲為附庸是與周别自秦仲至孝公五百年孝公彊大周顯王入秦致伯是復合也合十七歲而霸王者出焉秦武王昭襄王皆霸至始皇而王天下十七年王崩弟扁立是為顯王顯王亦曰顯聖王五年秦獻公敗三晉于石門斬首六萬天子錫以黼黻九年致文武胙于秦孝公十六年齊威王最彊始稱王以號令天下二十五年秦孝公會諸侯朝周二十六年天子致伯于秦孝公三十三年賀秦惠王即位魏惠王卑禮厚幣招賢鄒衍淳于髠孟軻之徒皆至三十五年致文武胙於秦惠王蘇秦説燕與趙合從以拒秦三十六年蘇秦説趙肅侯請六國合從以拒秦蘇秦相六國為從約長張儀入秦秦惠文王以為客卿三十七年秦使犀首期齊魏共伐趙趙以責蘇秦蘇秦去趙而從約皆解四十一年張儀説魏王盡以上郡十五縣入于秦秦以張儀為相四十四年秦惠文王始稱王其後諸侯皆為王四十八年王崩子定立是為愼靚王愼靚王亦曰順靚王三年趙楚韓魏燕共伐秦攻函谷闗不勝皆敗走四年張儀復相秦敗韓趙兵于脩魚斬首八萬諸侯震恐六年王崩子延立是為赧王赧王之時東西周分治赧王復居王城號西周周桓公之孫惠公居洛陽為東周或言趙成侯八年成侯與韓分周以為兩赧王雖居天子之位為諸侯所侵與家人無異多負於人無以歸之乃止臺逃避周人名其臺曰逃債臺八年東周與西周戰韓救西周或為東周説韓王曰西周故天子之國多名器重寳王案兵毋出可以德東周而西周之寳必可盡矣史記於此下闕文後楚圍雍氏韓徵甲與粟於東周君東周君恐召蘇代而告之代曰君何患於是臣能使韓毋徵甲粟又能為君得高都韓邑也周君曰子茍能請以國聽子代見韓相國曰楚圍雍氏期三月也今五月不能拔是楚病也今相國乃徵甲粟於周是告楚病也相國曰善使者行矣代曰何不與周高都相國大怒曰吾不賦甲與粟於周亦已多矣何故與周高都邪代曰與周高都是周折而入韓也秦聞之必大怒忿周即不通周使是以敝高都得完周也曷為不與相國曰善果與周高都三十四年蘇厲謂周君曰秦破韓魏扑師武扑一作仆武韓将名北取趙藺離石者皆白起也是善用兵又有天命今將兵出塞攻梁梁破則周危矣何不令人説白起曰楚有養由基者善射去楊葉百步而射之百發百中觀者數千人皆曰善射有一人立其旁曰善可敎射矣養由基怒釋弓搤劒曰客安能敎我射乎客曰吾非能敎子支左詘右也夫去栁葉百步而射之百發百中不以善息少焉氣衰力倦弓撥矢鉤一發不中百發盡息今破韓魏扑師武北取趙藺離石者公之功多矣今又將兵出塞過兩周倍韓攻梁一舉不得前功盡棄公不如稱病而毋出五十九年秦取韓陽城負黍西周恐乃倍秦與諸侯約從將天下鋭師出伊闕攻秦令秦毋得通陽城秦昭王怒使將軍摎攻西周西周君奔秦頓首受罪盡獻其邑三十六口三萬秦受其獻歸其君於周周君王赧卒宋忠曰諡西周武公周民遂東亡秦取九鼎寳器而遷西周公於􅓆狐􅓆即憚字􅓆狐聚在洛陽南百五十里梁新城之間後七年秦莊襄王滅東西周兩周皆入于秦周是以不祀秦以其地為三川郡漢興九十有餘載天子將封泰山東廵狩至河南求周苖裔封其後嘉三十里地號曰周子南君比列侯以奉其先祀實武帝元鼎四年也右周之世起武王元年己卯或曰戊寅至赧王五十九年乙巳三十一世三十七王八百六十七年而亡臣謹按八百六十七年之間三百五十二年為西周五百十五年為東周也又按四百年在春秋前二百四十二年在春秋内二百二十五年在春秋後合八百六十七年通志卷三下
