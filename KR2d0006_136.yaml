body:
  text: 通志卷一百十七宋右迪功郎鄭樵漁仲撰列傳第三十魏韓暨韓宣崔林髙柔孫禮王觀辛毗楊阜髙堂隆滿寵田豫牽招郭淮徐邈胡質王昶王基王淩毋邱儉文欽諸葛誕唐咨鄧艾州泰鍾會王弼韓暨字公至南陽堵陽人也韓王信之後祖術河東太守父純南郡太守初同縣豪右陳茂譖暨父兄幾致大辟暨陽不以為言庸賃積資隂結死士遂追呼尋禽茂以首祭父墓由是顯名舉孝廉司空辟皆不就乃變姓名隱居魯陽山中山民合黨欲行寇掠暨散家財以供牛酒請其渠帥為陳安危山民化之終不為害避袁術命召徙居山都之山荆州牧劉表禮辟遂遁逃南居孱陵界所在見敬愛而表深恨之暨懼應命除宜城長太祖平荆州辟為丞相士曹掾後遷樂陵太守徙監冶謁者舊時冶作馬排蒲拜反為排以吹炭每一熟石用馬百匹更作人排又費功力暨乃因長流為水排計其利益三倍於前在職七年器用充實制書褒歎就加司金都尉班亞九卿文帝踐阼封宜城亭侯黃初七年遷太常進封南鄉亭侯邑二百户時新都洛陽制度未備而宗廟主祏皆在鄴都暨奏請迎鄴四廟神主建洛陽廟四時蒸嘗親奉粢盛崇明正禮廢去淫祀多所匡正在官八年以疾遜位景初二年春詔以暨為司徒夏四月薨遺令斂以時服葬為土藏諡恭侯子肇嗣肇薨子邦嗣暨嘗為大鴻臚其後有勃海韓宣者繼為之俱號稱職故鴻臚中為之語曰大鴻臚小鴻臚前後治行曷相如宣字景然勃海人也為人短小建安中太祖召署丞相軍謀掾冗散在鄴嘗於鄴宫出入於東掖門內與臨災侯植相遇時天新雨地有泥潦宣欲避之閡潦不得去乃以扇自障住於道邉植嫌宣既不去又不為禮乃駐車使其常從問宣何官宣云丞相軍謀掾也植曰應得唐突列侯不宣曰春秋之義王人雖微列於諸侯之上未聞宰士而為下土諸侯禮也植又曰即如所言為人父吏見其子應有禮不宣又曰於禮臣子一例也而宣年又長植知其枝柱難窮乃釋去具為太子言以為辨黃初中為尚書郎嘗以職事當受罰於殿前已縛束杖未行文帝輦過問此為誰左右對曰尚書郎勃海韓宣也帝追念前臨災侯所説乃寤曰是子建所道韓宣邪特原之遂解其縳時天大寒宣前以當受杖豫脫袴纒褌靣縛及其見原褌腰不下乃趍而去帝目而送之笑曰此家有膽諦之士也後出為清河東郡太守明帝時為尚書大鴻臚數嵗卒崔林字德儒清河東武城人也少時晚成宗族莫知唯從兄琰異之太祖定冀州召除塢長貧無車馬單步之官太祖征壺關問長吏德政最者并州刺史張陟以林對於是擢為冀州主簿徙署别駕丞相掾屬魏國建稍遷御史中丞文帝踐阼拜尚書出為幽州刺史比中郎將吳質統河北軍事涿郡太守王雄謂林别駕曰吳中郎將上所親重國之貴臣也杖節統事州郡莫不奉箋致敬而崔使君初不與相聞若以邊塞不修斬卿使君寧能護卿邪别駕具以白林林曰刺史視去此州如脫屣寧當相纍邪此州與胡虜接宜鎮之以靜擾之則動其逆心特為國家生北顧憂以此為寄在官一期寇竊寢息猶以不事上司左遷河間太守清論多為林怨也遷大鴻臚時龜兹王遣侍子來朝朝廷嘉其逺至褒賞其王甚厚餘國各遣子來朝間使連屬林恐所遣或非真的權取疏屬賈胡因通使命利得印綬而道路護送所損滋多為夷狄所笑乃遺書燉煌喻旨并録前世待遇諸國豐約故事使有常制明帝即位賜爵關內侯轉光祿勳司𨽻校尉屬郡皆罷非法除過員吏林為政推誠簡存大體是以去後每輒見思散騎常侍劉劭作考課論制下百僚林議曰案周官考課其文備矣自康王以下遂以陵遲此即考課之法存乎其人也及漢之季其失豈在乎佐吏之職不密哉方今軍旅或猥或卒備之以科條申之以內外增減無常固難一矣且萬目不張舉其綱衆毛不整振其領臯陶仕虞伊尹臣殷不仁者逺五帝三王未必如一而各以治亂易曰易簡而天下之理得矣太祖隨宜設辟以遺來今不患不法古也以為今之制度不為疏闊惟在守一勿失而已若朝臣能任仲山甫之重式是百辟則孰敢不肅景初元年司徒司空並缺散騎侍郎孟康薦林稟自然之正性體髙雅之𢎞量論其所長以比古人忠直不回則史魚之儔清儉守約則季文之匹也牧守州郡所在而治及為外司萬里肅齊誠台輔之妙器衮職之良才也後年遂為司空封安陽亭侯邑六百户三公封列侯自林始也頃之又進封安陽鄉侯魯相上言漢舊立孔子廟褒成侯嵗時奉祠辟雍行禮必祭先師王家出榖春秋祭祀今宗聖侯奉嗣未有命祭之禮宜給牲牢長吏奉祀尊為貴神制三府議博士傅祗以春秋傳言立在祀典則孔子是也宗聖適足繼絶世章盛德耳至於顯立言崇明德則宜如魯相所上林議以為宗聖侯亦以王命祀不為未有命也周武王封黃帝堯舜之後及立三恪禹湯之世不列于時復特命他官祭也今周公已上達於三皇忽焉不祀而其禮經亦存其言今獨祀孔子者以世近故也以大夫之後特受無疆之祀禮過古帝義踰湯武可謂崇明報德矣無復重祀於非族也林之著此議頗為世論所鄙明帝又分林邑封一子列侯正始五年薨諡曰孝侯子述嗣髙柔字文惠陳留圉人也父靖為蜀郡都尉柔留鄉里謂邑中曰今者英雄並起陳留四戰之地也曹將軍雖據兖州本有四方之圗未得安坐守也而張府君先得志於陳留吾恐變乘間作也欲與諸君避之衆皆以張邈與太祖善柔又年少不然其言柔從兄幹袁紹甥也在河北呼柔柔舉宗從之會靖卒於西州時道路艱澀兵寇縱橫柔冒艱險詣蜀迎喪辛苦荼毒無所不嘗三年乃還太祖平袁氏以柔為管長縣中素聞其名姦吏數人皆自引去柔各召復之還皆自相勸勵咸為佳吏髙幹既降頃之以并州叛柔自歸太祖太祖欲因事誅之以為刺姦令史柔處法允當獄無留滯又夙夜匪懈至擁膝抱文書而寢太祖嘗夜微出觀察諸吏見柔哀之徐解裘覆之而去自是辟為丞相倉曹屬太祖欲遣鍾繇等討張魯柔諌以為今猥遣大兵西有韓遂馬超謂為大軍已舉將相扇動作逆宜先招集三輔三輔苟平漢中可傳檄而定也繇入關遂超等果反魏國初建為尚書郎轉拜丞相理曹掾鼓吹宋金等在合肥亡逃舊法士亡考竟其妻子太祖患其不息更重其刑金有母妻及二弟皆給官主者奏盡殺之柔啓曰士卒亡軍誠在可疾然竊聞其中時有悔者愚謂乃宜貸其妻子一可使賊中不信二可使誘其還心正如前科固已絶其意望而猥復重之柔恐自今在軍之士見一人逃亡誅將及己亦且相隨而走不可復得殺也此重刑非所以止亡乃所以益走耳太祖曰善即止不殺金母弟及他蒙活者甚衆遷為潁川太守復遷為法曹掾時置校事盧洪趙達等使察羣下柔諌曰設官分職各有所司今置校事既非居上信下之旨又達等數以憎愛擅作威福宜檢治之太祖曰卿知達等恐不如吾也要能刺舉而辦衆事使賢人君子為之則不能也昔叔孫通用羣盜良有以也達等後姦利發太祖殺之以謝於柔文帝踐阼以柔為治書侍御史賜爵關內侯轉加執法時民間數有誹謗妖言帝疾之有妖言輒殺而賞告者柔上疏曰今妖言者必戮告之者輒賞既使過誤無反善之路又將開凶狡之羣相誣罔之漸誠非所以息姦省訟緝熙治道也昔周公作誥稱殷之祖宗咸不顧小人之怨在漢太宗亦除妖言誹謗之令臣愚以為宜除妖謗賞告之法以隆天父養物之仁帝不即從而相誣告者滋甚帝乃下詔敢以誹謗相告者以所告者罪罪之於是遂絶校事劉慈等自黃初初數年之間舉吏姦罪以萬數柔皆請懲虛實其餘小小挂法者不過罰金四年遷為廷尉魏初三公無事又希與朝政柔上疏曰天地以四時成功元首以輔弼興治成湯仗阿衡之佐文武憑旦望之功逮至漢初蕭曹之儔並以元勳代作心膂此皆明王聖主任臣於上賢相良輔股肱於下也今公輔之臣皆國之棟梁民所具瞻而置之三事不使知政遂各偃息養髙鮮有進納誠非朝廷崇用大臣之義大臣獻可替否之謂也古者刑政有疑輒議於槐棘之下自今以後朝有疑議及刑獄大事宜數以咨訪三公三公朝朔望之日又可特延入講論得失博盡事情庶有裨起天聼𢎞益大化帝嘉納焉帝以宿嫌欲枉法誅治書執法鮑勛而柔固執不從詔命帝怒甚遂召柔詣臺遣使者承指至廷尉考竟勛勛死乃遣柔還寺明帝即位封柔延夀亭侯時博士執經柔上疏曰臣聞尊道重學聖人𢎞訓褒文崇儒帝者明義昔漢末陵遲禮樂崩壤雄戰虎爭以戰陳為務遂使儒林之羣幽隱而不顯太祖初興閔其如此在於撥亂之際並使郡縣立教學之官髙祖即位遂闡其業興復辟雍州立課試於是天下之士復聞庠序之教親爼豆之禮焉陛下臨政允迪睿哲敷𢎞大猷光濟先軌雖夏啓之承基周成之繼業誠無以加也然今博士皆經明行修一國清選而使遷除限不過長懼非所以崇顯儒術帥勵怠惰也孔子稱舉善而教不能則勸故楚禮申公學士鋭精漢隆卓茂搢紳競慕臣以為博士者道之淵藪六藝所宗宜隨學行優劣待以不次之位敦崇道教以勸學者於化為𢎞帝納之後大興殿舍百姓勞役廣采衆女充盈後宫皇子連天繼嗣未育柔上疏曰二虜狡猾潛自講肄謀動干戈未圗束手宜蓄養壯士繕治甲兵以逸待之而頃興造殿舍上下勞擾若使吳蜀知人虛實通謀并勢復俱送死甚不易也昔漢文惜十家之資不營小臺之娛去病慮胸奴之害不遑治第之事況今所損者非惟百金之費所憂者非徒北狄之患可粗成見所營立以充朝燕之儀訖罷作者使得就農俟吳蜀平定復可徐興昔軒轅以二十五子傳祚彌逺周室以姬國四十歷年滋多陛下聰達窮理盡性而頃皇子連多夭逝熊羆之祥又未感應羣下之心莫不悒戚周禮天子后妃以下百二十人嬪嬙之儀既以盛矣竊聞後庭之數或復過之聖嗣不昌殆能由此臣愚以為可妙簡淑媛以備內官之數其餘盡遣還家且以育精養神專靜為寶如此則螽斯之徴可庶而致矣帝報曰知卿忠允乃心王室輒克昌言他復以聞時獵法甚峻宜陽典農劉龜竊於禁內射兔其功曹張京詣校事言之帝匿京名收龜付獄柔表請告者名帝大怒曰劉龜當死乃敢獵吾禁地送龜廷尉廷尉便當考掠何復請告者主名吾豈妄收龜邪柔曰廷尉天下之平也安得以至尊喜怒而毁法乎重復為奏辭指深切帝意寤乃下京名即還訊各當其罪時制吏遭大喪者百日後皆給役有司徒吏解𢎞遭父喪後有軍事受敕當行以疾病為辭詔怒曰汝非曽閔何言毁邪促收考竟柔見𢎞信甚羸劣奏陳其事宜加寬貸帝乃詔曰孝哉𢎞也其原之初公孫淵兄晃為叔父恭任內侍先淵未反數陳其變及淵謀逆帝不忍市斬欲就獄殺之柔上疏曰書稱用罪伐厥死用德彰厥善此王制之明典也晃及妻子叛逆之類誠應梟縣勿使遺育而臣竊聞晃先數自歸陳淵禍萌雖為凶族原心可恕夫仲尼亮司馬牛之憂祈奚明叔向之過在昔之美義也臣以為晃信有言宜貸其死苟自無言便當市斬今進不赦其命退不彰其罪閉置囹圄使自引分四方觀國或疑此舉也帝不聼竟使使齎金屑飲晃及其妻子賜以棺衣殯斂於宅是時殺禁地鹿者身死財産沒官有能覺告者厚加賞賜柔上疏曰聖王之御世莫不以廣農為務儉用為資夫農廣則榖積用儉則財蓄畜財積榖而有憂患之虞者未之有也古者一夫不耕或為之飢一婦不織或為之寒中間以來百姓供給衆役親田者既減少加頃復有獵禁羣鹿犯暴殘食生苖處處為害所傷不資民雖障防力不能禦至如滎陽左右周數百里嵗略不收元元之命實可矜傷方今天下生財者甚少而麋鹿之損者甚多卒有兵戎之役凶年之災將無以待之惟陛下覽先聖之所念愍稼穡之艱難寬民間使得捕鹿遂除其禁則衆庶永濟莫不悅豫矣頃之護軍營士竇禮近出不還營以為亡表言逐捕沒其妻盈及男女為官奴婢盈連至州府稱寃自訟莫有省者乃辭詣廷尉柔問曰汝何以知夫不亡盈垂泣對曰夫少單特養一老嫗為母事甚恭謹又哀兒女撫視不離非是輕狡不顧室家者也柔重問曰汝夫不與人有怨讐乎對曰夫良善與人無讐又曰汝夫不與人交錢財乎對曰嘗出錢與同營士焦子文求不得時子文適坐小事繫獄柔乃見子文問所坐言次曰汝頗曽舉人錢不子文曰自以單貧不敢舉人錢物也柔察子文色動遂曰汝昔舉竇禮錢何不言邪子文怪知事露應對不次柔曰汝已殺禮便宜早服子文於是叩頭具首殺禮本末埋藏處所柔便遣吏卒承子文辭往掘禮即得其尸詔書復盈母子為平民班下天下以禮為戒在官二十三年轉太常旬日遷司空徙司徒及太傅司馬懿奏免曹爽皇太后詔柔假節行大將軍事據爽營太傅謂柔曰君為周勃矣爽誅進封萬嵗鄉侯髙貴鄉公即位進封安國侯轉為太尉常道鄉公即位增邑并前四千户前後封二子亭侯景元四年年九十薨諡曰元侯孫渾嗣咸熙中開建五等以柔著勳前朝改封渾昌陸子孫禮字德達涿郡容城人也太祖平幽州召為司空軍謀掾初喪亂時禮與母相失同郡馬台求得禮母禮推家財盡以與台台後坐法當死禮私導令踰獄自首既而曰臣無逃亡之義徑詣刺姦主簿溫恢恢嘉之具白太祖各減死一等後除河間郡丞稍遷滎陽都尉魯山中賊數百人保固險阻為民作害乃徙禮為魯相禮至官出俸榖發吏民募首級招納降附使還為間應時平泰歷山陽平原平昌琅邪太守從大司馬曹休征吳於夾石口禮諌以為不可深入不從而敗遷陽平太守入為尚書明帝方修宫室而節氣不和天下少榖禮固爭罷役詔曰敬納讜言促遣民作時李惠監作復奏留一月有所成訖禮徑至作所不復重奏稱詔罷民帝竒其意而不責也帝獵於大石山虎趨乘輿禮便投鞭下馬欲奮劒砍虎詔令禮上馬明帝臨崩之時以曹爽為大將軍宜得良佐於牀下受遺詔拜禮大將軍長史加散騎常侍禮亮直不撓爽弗便也以為揚州刺史加伏波將軍賜爵關內侯吳大將全琮帥數萬衆來寇時州兵休使在者無幾禮躬勒衛兵禦之戰於芍陂自旦及暮將士死傷過半禮犯蹈白刃馬被數創手秉枹鼓奮不顧身賊衆乃退詔書慰勞賜絹七百匹禮為死事者設祀哭臨哀號發心皆以絹付亡者家無以入身徴拜少府出為荆州刺史遷冀州牧太傅司馬懿謂禮曰今清河平原爭界八年更二刺史靡能決之虞芮待文王而了宜善令分明禮曰訟者據墟墓為驗聼者以先老為正而老者不可加以檟楚又墟墓或遷就髙敞或徙避仇讐如今所聞雖臯陶猶將為難若欲使必也無訟當以烈祖初封平原時圗決之何必推古問故以益辭訟昔成王以桐葉戲叔虞周公便以封之今圗藏在天府便可於坐上斷也豈待到州乎懿曰是也當别下圗禮到案圗宜屬平原而曹爽信清河言下書云圗不可用當參異同禮上疏曰管仲霸者之佐其器又小猶能奪伯氏駢邑使沒齒無怨言臣受牧伯之任奉聖朝明圗驗地著之界界實以王翁河為限而鄃以馬丹候為驗詐以鳴犢河為界假虗訟訴疑誤臺閣竊聞衆口鑠金浮石沉木三人成市虎慈母投其杼今二郡爭界八年一朝決之者緣有解書圗畫可得尋按擲校也平原在兩河向東上其間有爵隄爵隄在髙唐西南所爭地在髙唐西北相去二十餘里可為長嘆息流涕者也案解與圗奏而鄃不受詔此臣軟弱不勝其任臣亦何顔尸祿素餐輒束帶著履駕車待放爽見禮奏大怒劾禮怨望結刑五嵗在家期年衆人多以為言除城門校尉時胸奴王劉靖部衆強盛而鮮卑數寇邉乃以禮為并州刺史加振武將軍使持節護胸奴中郎將往見太傅司馬懿有忿色而無言懿曰卿得并州少邪恚理分界失分乎今當逺别何不歡也禮曰何明公言之乖細也禮雖不德豈以官位往事為意邪本謂明公齊蹤伊吕弼輔魏室上報明帝之託下建萬世之勳今社稷將危天下洶洶此禮之所以不恱也因涕泣橫流懿曰且止忍不可忍及爽誅後入為司𨽻校尉禮凡臨七郡五州皆有威信遷司空封大利亭侯邑一百户禮與盧育同郡時輩而情好不睦為人雖互有長短然名位略齊云嘉平二年薨諡曰景侯孫元嗣王觀字偉臺東郡廪邱人也少孤貧厲志太祖召為丞相文學掾出為髙唐陽泉鄼任令所在稱治文帝踐阼入為尚書郎廷尉監出為南陽涿郡太守涿北接鮮卑數有寇盜觀令邉民十家以上屯居築京堠時有不願者觀乃假遣朝吏使歸助子弟不與期會但敕事訖各還於是吏民相率不督自勵旬日之中一時俱成守禦有備寇鈔已息明帝即位下詔書使郡縣條為劇中平者主者欲言郡為中平觀教曰此郡濵近外虜數有寇害云何不為劇邪主者曰若郡為外劇恐於明府有任子觀曰夫君者所以為民也今郡在外劇則於役條當有降差豈可為太守之私而負一郡之民乎遂言為外劇郡後送任子詣鄴時觀但有一子而又幼弱其公心如此觀治身清素帥下以儉僚屬承風莫不自勵明帝幸許昌召觀為治書侍御史典行臺獄時多有倉卒喜怒而觀不阿意順指太尉司馬懿請觀為從事中郎遷為尚書出為河南尹徙少府大將軍曹爽使材官張達斫家屋材及諸私用之物觀聞知皆録奪以沒官少府統三尚方御府內藏玩弄之寶爽等奢放多有干求憚觀守法乃徙為太僕司馬懿誅爽使觀行中領軍據爽弟羲營賜爵關內侯復為尚書加駙馬都尉髙貴鄉公即位封中鄉亭侯頃之加光祿大夫轉為右僕射常道鄉公即位進封陽鄉侯增邑千户并前二千五百户遷司空固辭不許遣使就第拜授就官數日上送印綬輒自輿歸里舍薨于家遺令藏足容棺不設明器不封不樹諡曰肅侯子悝嗣咸熙中開建五等以觀著勳前朝改封悝膠東子辛毗字佐治潁州陽翟人也其先建武中自隴西東遷毗隨兄評從袁紹太祖為司空辟毗毗不得應命及袁尚攻兄談於平原談使毗詣太祖求和太祖將征荆州次于西平毗見太祖致談意太祖大悅後數日更欲先平荆州使談尚自相敝他日置酒毗望太祖色知有變以語郭嘉嘉白太祖太祖謂毗曰談可信尚必可克不毗對曰明公無問信與詐也直當論其勢耳袁氏本兄弟相伐非謂他人能間其間乃謂天下可定於已也今一旦求救於明公此可知也顯甫見顯思困而不能取此力竭也兵甲敗於外謀臣誅於內兄弟讒鬩國分為二連年戰伐而介胄生蟣虱加以旱蝗飢饉並臻國無囷倉行無裹糧天災應於上人事困於下民無愚智皆知土崩瓦解此乃天亡尚之時也兵法稱有石城湯池帶甲百萬而無粟者不能守也今往攻鄴尚不還救即不能自守還救即談踵其後以明公之威應困窮之敵擊疲弊之寇無異迅風之振秋葉矣天以袁尚與明公明公不取而伐荆州荆州豐樂國未有釁仲虺有言取亂侮亡方今二袁不務逺略而內相圗可謂亂矣居者無食行者無糧可謂亡矣朝不謀夕民命靡繼而不綏之欲待他年他年或登又自知亡而改修厥德失所以用兵之要矣今因其請救而撫之利莫大焉且四方之寇莫大於河北河北平則六軍盛而天下震矣太祖曰善乃許談平次于黎陽明年攻鄴克之表毗為議郎久之太祖遣都護曹洪平下辨使毗與曹休參之令曰昔髙祖貪財好色而良平匡其過失今佐治文烈憂不輕矣軍還為丞相長史文帝踐阼遷侍中賜爵關內侯時議改正朔毗以魏氏遵舜禹之統應天順民至於湯武以戰伐定天下乃改正朔孔子曰行夏之時左氏傳曰夏數為得天正何必期於相反帝善而從之帝欲徙冀州士家十萬户實河南時連蝗民飢羣司以為不可而帝意甚盛毗與朝臣俱求見帝知其欲諫作色以見之皆莫敢言毗曰陛下欲徙士家其計安出帝曰卿謂我徙之非邪毗曰誠以為非也帝曰吾不與卿共議也毗曰陛下不以臣不肖置之左右厠之謀議之官安得不與臣議邪臣所言非私也乃社稷之慮也安得怒臣帝不答起入內毗隨而引其裾帝遂奮衣不還良久乃出曰佐治卿持我何太急邪毗曰今徙既失民心又無以食也帝遂徙其半常從帝射雉帝曰射雉樂哉毗曰於陛下甚樂而於羣下甚苦帝默然後遂為之希出上軍大將軍曹真征朱然于江陵毗行軍師還封廣平亭侯帝欲大興軍征吳毗諫曰吳楚險逺難禦道隆後服道汙先叛自古患之非徒今也今陛下祚有海內夫不賔者其能久乎昔尉他稱帝子陽僣號歷年未幾或臣或誅何則違逆之道不久全而大德無所不服也方今天下新定土廣民稀夫廟算而後出軍猶臨事而懼況今廟算有闕而欲用之臣誠未見其利也先帝屢起鋭師臨江而旋今六軍不增於故而復循之此未易也今日之計莫若修范蠡之養民法管仲之寄政則充國之屯田明仲尼之懷逺十年之中強壯未老童齓勝戰兆民知義將士思奮然後用之則役不再舉矣帝曰如卿意更當以虜遺子孫邪毗對曰昔周文王以紂遺武王惟知時也茍時未可容得已乎帝竟伐吳至江而還明帝即位進封潁鄉侯邑三百户時中書監劉放令孫資見信於主制斷時政大臣莫不交好而毗不與往來毗子敞諫曰今劉孫用事衆皆影附大人宜小降意和光同塵不然必有謗言毗正色曰主上雖未稱聰明不為暗劣吾之立身自有本末就與劉孫不平不過令吾不作三公而已何危害之有焉大丈夫欲為公而毁其髙節者邪冗從僕射畢軌表言尚書僕射王思精勤舊吏忠亮計略不如辛毗毗宜代思帝以訪放資放資對曰陛下用思者誠欲取其效力不貴虛名也毗實亮直然性剛而專聖慮所當深察也遂不用出為衛尉時帝方修殿舍百姓勞役毗上疏曰竊聞諸葛亮講武治兵而孫權市馬遼東量其意指似欲相左右備豫不虞古之善政而今者宫室大興加連年榖麥不收詩云民亦勞止迄可小康惠此中國以綏四方唯陛下為社稷計帝報曰二虜未滅而治宫室直諫者立名之時也夫王者之都當及民勞兼辦使後世無所復增是蕭何為漢規摹之略也今卿為魏重臣亦宜解其大歸帝又欲北平芒令於其上作臺觀則見孟津毗諫曰天地之性髙髙下下今而反之既非其理加以損費人功民不堪役且若九河泛溢洪水為害而邱陵皆夷將何以禦之帝乃止時諸葛亮圍祁山不克引退張郃追之為流矢所中死帝惜郃臨朝而歎曰蜀未平而郃死將若之何司空陳羣曰郃誠良將國所依也毗心以為郃雖可惜然已死不當內弱主意而示外以不大也乃持羣曰陳公是何言歟當建安之末天下不可一日無武皇帝也及委國祚而文皇帝受命黃初之世亦謂不可無文皇帝也及委棄天下而陛下龍興今國內所少豈張郃乎陳羣曰誠如辛毗言也帝笑曰陳公可謂善變矣青龍二年諸葛亮率衆出渭南先是大將軍司馬懿數請與亮戰明帝終不聼是嵗恐不能禁乃以毗為大將軍軍師使持節六軍皆肅準毗節度莫敢犯違懿數欲進攻毗禁不聼亮卒復還為衛尉薨諡曰肅侯子敞嗣咸熙中為河內大守毗女憲英自有傳楊阜字義山天水冀人也以州從事為牧韋端使詣許拜安定長史阜還關右諸將問袁曹勝敗孰在阜曰袁公寬而不斷好謀而少決不斷則無威少決則失後事今雖強終不能成大業曹公有雄才逺略決機無疑法一而兵精能用度外之人所任各盡其力必能濟大事者也長史非其所好遂去官而端徵為太僕其子康代為刺史辟阜為别駕察孝廉辟丞相府州表留參軍事馬超之戰敗渭南也走保諸戎太祖追至安定而蘇伯反河間將引軍東還阜時奉使言於太祖曰超有信布之勇甚得羌胡心西州畏之若大軍還不嚴為之備隴上諸郡非國家之有也太祖善之而軍還倉卒為備不周超果率諸戎渠帥以擊隴上郡縣隴上郡縣皆應之唯冀城奉州郡以固守超盡兼隴右之衆而張魯又遣大將楊昻以助之凡萬餘人攻城阜率國士大夫及宗族子弟勝兵者千餘人使從弟嶽於城上作偃月營與超接戰自正月至八月拒守而救兵不至州遣别駕閻溫循水潛出求救為超所殺於是刺史太守失色始有降超之計阜流涕諫曰阜等率父兄子弟以義相勵有死無二田單之守不固於此也奈何棄垂成之功陷不義之名阜以死守之遂號哭刺史太守卒遣人請和開城門迎超超入拘嶽於冀使楊昻殺刺史太守阜內有報超之志而未得其便頃之阜以喪妻求葬假阜外兄薑敘為撫夷將軍領兵屯歷城阜少長敘家乃西至歷城見敘母及敘説前在冀中時事歔欷悲甚敘曰何為乃爾阜曰守城不能完君亡不能死亦何面目以視息於天下馬超背父叛君虐殺州將豈獨阜之憂責一州士大夫皆蒙其恥君擁兵專制而無討賊之心此趙盾所以書弒君也超強而無義多釁易圗耳敘母慨然敕敘從阜計計定外與鄉人薑隱趙昻尹奉姚瓊孔信武都人李俊王靈結謀定討超約使從弟謨至冀語嶽并結安定梁寬南安趙衢龎恭等約誓既明十七年九月與敘起兵於魯城超聞阜等兵起自將出而衢寬等解嶽閉冀城門討超妻子超襲歷城得敘母敘母罵之曰汝背父之逆子殺君之桀賊天地豈久容汝而不早死敢以靣目視人乎超怒殺之阜與超戰身被五創宗族昆弟死者七人超遂南奔張魯隴右平定太祖封討超之功者十一人賜阜爵關內侯阜讓爵曰阜君存無扞難之功君亡無死節之效於義當絀於法當誅超又不死無宜茍荷爵祿太祖報曰君與羣賢共建大功西土之人以為美談子貢辭賞仲尼謂之止善君其剖心以順國命薑敘之母勸敘早發明智乃爾雖楊敞之妻蓋不過此賢哉賢哉良史記録必不墜於地矣太祖征漢中以阜為益州刺史還拜金城太守未發轉武都太守郡濵蜀漢阜請依龔遂故事安之而已會劉備遣張飛馬超等從沮道趣下辨而氐雷定等七部萬餘落反應之太祖遣都護曹洪禦超等超等退還洪置酒大會令女倡著羅縠之衣踏鼓一坐大笑阜厲聲責洪曰男女之别國之大節何由於廣坐之中裸女人形體雖桀紂之亂不甚於此遂奮衣辭出洪立罷女樂請阜還坐肅然憚焉及劉備取漢中以逼下辨太祖以武都孤逺欲移之恐吏民戀土阜恩信素著前後徙民氐使居京兆扶風天水界者萬餘户徙郡于槐里百姓襁負而隨之為政舉大綱而已下不忍欺也文帝問侍中劉曄等武都太守何如人也皆稱阜有公輔之節未及用會帝崩在郡十餘年徵拜城門校尉阜嘗見明帝著帽被縹綾半裦袖阜問帝曰此於禮何法服也帝默然不答自是不法服不以見阜遷將作大匠時初治宫室發美女以充後庭數出弋獵秋大雨雷電多殺鳥雀阜上疏指陳災譴之由皆從心恣欲所致其語切直又雍邱王植怨於不齒藩國至親法禁峻密阜又陳九族之義以諷焉帝詔報嘉之後遷少府是時大司馬曹真伐蜀遇雨不進阜上疏曰昔文王有赤烏之符而猶日昃不暇食武王白魚入舟君臣變色而動得吉瑞猶尚憂懼況有災異而不戰竦者哉今吳蜀未平而天屢降變諸軍始進便有天雨之患稽閡山險轉運之勞擔負之苦所費以多若有不繼必違本圗傳曰見可而進知難而退軍之善政也帝覽奏即召諸軍還後詔大議政治之不便於民者阜議以為致治在於任賢興國在於務農若舍賢而任所私此忘治之甚者也廣開宫館髙為臺榭以妨民務此害農之甚者也百工不敦其器而競作竒巧以合上欲此傷本之甚者也孔子曰苛政甚於猛虎今守功文俗之吏為政不通治體苟好煩苛此亂民之甚者也當今之急宜去四甚並詔公卿郡國舉賢良方正敦禮之士而選用之此亦求賢之一端也阜又上疏欲省宫人諸不見幸者乃召御府吏問後宫人數吏守舊令對曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密反與小吏為密乎帝聞而愈敬憚阜帝愛女淑未期而夭帝痛之甚追封平原公主立廟洛陽葬於南陵將自臨送阜上疏曰文皇帝武宣皇后崩陛下皆不送葬所以重社稷備不虞也何至孩抱之赤子而可送葬乎帝不從帝既新作許宫又營洛陽宫殿觀閣阜上疏曰堯尚茅茨而萬國安其居禹卑宫室而天下樂其業及至殷周或堂崇三尺度以九筵耳古之聖帝明王未有極宫室之髙麗以雕弊百姓之財力者也桀作璇室象廊紂為傾宫鹿臺以喪其社稷楚靈以築章華而身受其禍秦始皇作阿房而殃及其子天下叛之二世而滅夫不度萬民之力以從耳目之欲未有不亡者也陛下當以堯舜殷周為法桀紂秦楚為戒而乃自暇自逸唯宫室是飾必有危亡之禍矣君作元首臣為股肱存亡一體得失同之臣雖駑怯敢忘斯義言不切至不足以感寤陛下陛下不察臣言恐皇祖烈考之祚將墜于地使臣身死有補萬一則死之日猶生之年也謹叩棺沐浴伏俟重誅奏御天子感其忠言手筆詔答每朝廷會議阜嘗侃然以天下為己任數諫爭不聼乃屢乞遜位未許會卒家無餘財孫豹嗣髙堂隆字升平泰山平陽人魯髙堂生之後也少為諸生泰山太守薛悌命為督郵郡督軍與悌爭論名悌而呵之隆按劒叱督軍曰昔魯定見侮仲尼歷階趙彈秦筝相如進缶臨臣名君義之所討也督軍失色悌驚起止之後去吏避地濟南建安十八年太祖召為丞相軍議掾後為歷城侯徽文學轉為相徽遭太祖喪不哀及遊獵馳騁隆以義正諫甚得輔導之節黃初中為堂陽長以選為平原王傅王即尊位是為明帝以隆為給事中博士駙馬都尉帝初踐阼羣臣或以為宜饗會隆曰唐虞有遏密之哀髙宗有不言之思臣以為不宜為會帝敬納之遷陳留太守犢民酉牧年七十餘有至行隆舉為計曹掾帝嘉之特除郎中以顯焉徵隆為散騎常侍賜爵關內侯時太史上漢厯不及天時因更推步弦望晦朔為太和厯帝以隆學問優深於天文尤精乃詔使隆與尚書郎楊偉太史待詔駱祿參共推校偉祿是太史隆故據舊厯更相劾奏紛紜數嵗偉稱祿得日蝕而月晦不盡隆不得日蝕而月晦盡詔從太史隆所爭雖不得而逺近猶知其精微也青龍中大治殿舍西取長安大鐘隆上疏曰昔周景王不儀刑文武之明德忽公旦之聖制既鑄大錢又作大鐘單穆公諫而弗聼泠州鳩對而弗從遂迷不反周德以衰良史記焉以為永鑒然今之小人好説秦漢之奢靡以蕩聖心求取亡國不度之器勞役費損以傷德政非所以興禮樂之和保神明之休也是日帝幸上方隆與卞蘭從帝以隆表示蘭使難隆曰興衰在政樂何為也化之不明豈鐘之罪隆曰夫禮樂者為治之大本也故簫韶九成鳯凰來儀雷鼓六變天神以降政是以平刑是以錯和之至也新聲發響商辛以隕大鐘既鑄周景以敝存亡之機恆由斯作安在廢興之不階也帝稱善遷侍中猶領太史令崇華殿災詔問隆此何咎於禮寧有祈禳之義乎隆對曰夫災變之發皆所以明教誡也惟率禮修德可以勝之易傳曰上不儉下不節孽火燒其室又曰君髙其臺天火為災此人君茍飾宫室不知百姓空竭故天應之以旱火從髙殿起也臣案舊占災火之發皆以臺榭宫室為誡然今宫室之所以充廣者實由宫人猥多之故宜簡擇留其淑懿如周之制罷省其餘此則陛下消復之良術也詔問隆吾聞漢武帝時柏梁災而大起宫殿以厭之其義云何隆對曰臣聞西京柏梁既災越巫陳方建章是經以厭火祥乃夷越之巫所為非聖賢之明訓也五行志曰柏梁災其後有江充巫蠱殺衛太子事如志之言越巫建章無所厭也臣以為宜罷散民役清掃所災之處不敢於此有所立作則萐莆嘉禾必生於此地矣帝竟復崇華殿時郡國有九龍見故改曰九龍殿陵霄闕始構有鵲巢其上帝以問隆隆曰詩云惟鵲有巢惟鳩居之今始構闕而鵲巢之天意若曰宫室未成身不得居將有他姓制御之耳天道無親唯與善人今宜休罷百役增崇德政則可以轉禍為福矣帝於是為之改容動色是嵗有星孛于大辰隆上疏曰凡帝王徙都立邑必先定天地社稷之位敬恭以奉之將營宫室則宗廟為先廄庫為次居室為後今圜丘方澤南北郊明堂社稷神位未定宗廟之制又未如禮而崇飾宫室士民失業外人咸云宫人之用與軍國之資略齊民不堪命皆有怨怒夫采椽卑宫唐虞大禹之所以垂皇風也玉臺瓊室夏癸商辛之所以犯昊天也今宫室過盛天彗章灼斯乃慈父懇切之訓陛下當崇孝子祗聳之禮不宜有忽以重天怒時軍國多事用法深重隆上疏曰夫移風易俗在於宣明道化今有司不本大道而務糾刑書是以刑用而不措俗敝而不敦宜崇禮樂班敘明堂修三雍大射養老營建郊廟尊儒士舉逸民表章制度改正朔易服色布愷悌尚儉素然後備禮封禪歸功天地使雅頌之聲盈于六合緝熙之化混于後嗣斯蓋至治之美事不朽之貴業也夫不正其本而救其末譬猶棼絲非政理也可命羣公卿士通儒造具其事以為典式隆又以為改正朔易服色殊徽號異器械自古帝王所以神明其政變民耳目故三春稱王明三統也於是敷演舊章奏而改焉帝從其議改青龍五年春三月為景初元年孟夏四月服色尚黃犧牲用白從地正也遷光祿勳帝愈增崇宫觀雕飾觀閣鑿大行之石英采榖城之文石起景陽山於芳林之園建昭陽殿於太極之北鑄作黃龍鳯凰竒偉之獸飾金墉陵雲臺陵霄闕百役繁興作者萬數公卿以下至于學生莫不展力帝乃躬自握土以率之而遼東不朝悼皇后崩天作淫雨冀州水出漂沒民物隆上疏切諫曰昔在伊唐洪水為厄使鯀治之績用不成乃舉文命隨山刋木前後歷年二十二載災眚之甚莫過於彼力役之興莫久於此堯舜君臣南靣而已禹敷九州庶士庸勳各有等差君子小人物有服章今無若時之急而使公卿大夫並與厮徒共供事役聞之四夷非嘉聲也垂之竹帛非令名也臣觀在昔書籍所載天人之際未有不應也是以古先哲王畏上天之明命災異既發則懼而修政故無不延期流祚爰及未葉暗君荒主遂其情志恬忽變戒卒皆尋踐禍難至於顛覆者也今吳蜀二賊非徒白地小虜聚邑之寇乃據險乘流跨有士衆僭號稱帝欲與中國爭衡今若有人來告權備並修德政復履清儉輕省租賦不治玩好動咨耆賢事遵禮度陛下聞之豈不惕然惡其如此以為難卒討滅而為國家憂乎若使告者曰彼二賊並為無道崇侈無度役其士民重其徵賦下不堪命吁嗟日甚陛下聞之豈不勃然忿其困我無辜之民而欲速加之誅其次豈不幸彼疲弊而取之不難乎茍如此則可易心而度事義之數亦不逺矣夫亡國之主恆自謂不亡然後至於亡賢聖之君恆自謂當亡然後至於不亡今天下雕弊民無儋石之儲國無終年之蓄外有強敵六軍暴邉內興土功州郡騷動若有寇警則臣懼版築之士不能投命虜庭矣又將吏奉祿稍見折減方之於昔五分居一諸受休者又絶廪賜不應輸者今皆出半此為官入兼多於舊其所出與參少於昔而度支經用更每不足反而推之凡此諸費必有所在周禮天府掌九伐之則以給九式之用入有其分出有其所不相干乘而用各足各足之後乃以式貢之餘供王玩好又上用財必考于司會今陛下所與共坐廊廟治天下者非三司九列則臺閣近臣皆腹心造膝宜在無諱若見豐省而不敢以告從命奔走惟恐不勝是則具臣非鯁輔也昔李斯教秦二世曰為人主而不恣睢命之曰天下桎梏二世用之秦國以覆斯亦滅族是以史遷譏其不正諌而為世誡書奏帝覽焉謂中書監令曰觀隆此奏使朕懼哉隆疾篤口占上疏曰曽子有疾孟敬子問之曽子曰鳥之將死其鳴也哀人之將死其言也善臣寢疾病有增無損常懼奄忽忠款不昭臣之丹誠豈唯曽子願陛下少垂省覽臣聞三代之有天下也聖賢相承歷載數百尺土莫非其有一民莫非其臣萬國咸寧九有有截然癸辛縱欲皇天震怒宗國為墟紂縣白旗桀放鳴條天子之尊湯武有之豈伊異人皆明王之胄也秦并六國聖道不修乃構阿房之宫築長城之守自謂本支百葉何寤二世而亡近漢孝武乘文景之福外攘夷狄內興宫殿十餘年間天下囂然乃信越巫懟天遷怒起建章之宫千門萬户卒致江充妖蠱之變至於宫室乖離父子相殘殃咎之毒禍流數世臣聞黃初之際天兆其戒異類之鳥育長燕巢口爪胸赤此魏室之大異也宜防鷹揚之臣於蕭牆之內可選諸王使君國典兵往往棊跱鎮撫皇畿翼亮帝室昔周之東遷晉鄭焉依漢吕之亂實賴朱虛斯蓋前代之明鑒矣皇天無親唯德是輔民詠德政則延期過歷下有怨歎則輟録授能由此觀之天下乃天下之天下非獨陛下之天下也臣百疾所鍾氣力稍微輒自輿出歸還里舍若流沉淪魂而有知結草以報帝手詔慰勞之未幾而卒遺令薄葬斂以時服初太和中中護軍蔣濟上疏言宜遵古封禪帝曰聞濟斯言使吾汗出流足事寢歷嵗後遂議修之使隆撰其禮儀帝聞隆沒歎息曰天不欲成吾事髙堂生舍我亡也子琛嗣爵始景初中帝以隆與散騎常侍蘇林博士秦靜等並老恐無能傳業者乃詔郎吏髙才解經義者三十人從隆等分受四經三禮為設課試之法數年隆等皆卒學者遂廢滿寵字伯寧山陽昌邑人也年十八為郡督郵時郡內李朔等各擁部曲害于平民太守使寵糾焉朔等請罪不復鈔掠守髙平令縣人張苞為郡督郵貪穢受取干亂吏政寵因其來在傳舍率吏卒出收之詰責所犯即日考竟遂棄官歸太祖臨兖州辟為從事及為大將軍辟署西曹掾為許昌令時曹洪以宗室親貴有賔客在縣界數犯法寵收治之洪書報寵寵不聼洪白太祖太祖召許昌主吏寵知將欲原乃速殺之太祖聞而喜曰當事不當爾邪故太尉楊彪被收付縣獄尚書令荀彧少府孔融等並屬寵但當受辭勿加考掠寵一無所報考訊如法數日求見太祖言之曰楊彪考訊無他辭語當殺者宜先彰其罪此人有名海內若罪不明必大失民望竊為明公惜之太祖即日出彪初彧融聞考掠彪皆怒及因寵得出更善寵時袁紹盛於河朔而汝南紹之本郡門生賔客布在諸縣擁兵拒守太祖憂之乃以寵為汝南太守寵募其服從者五百人率攻下二十餘壁誘其未降渠帥於坐上殺十餘人一時皆平得户二萬兵二千人令就田業建安十三年從太祖征荆州大軍還留寵行奮威將軍屯當陽孫權數擾東陲復召寵還為汝南太守賜爵關內侯關侯圍襄陽寵助征南將軍曹仁屯樊城拒之而左將軍于禁等以霖雨水長為關所沒關急攻樊城樊城得水往往崩壞衆皆失色或謂仁曰今日之危非人力所支可及關圍未合乘輕船夜走雖失城尚可全身寵曰山水速疾冀其不久聞關遣别將已在郟下自許以南百姓擾擾關所以不敢遂進者恐吾軍掎其後耳今若遁去洪河以南非復國家有也君宜待之仁曰善寵乃沈白馬與軍人盟誓會徐晃等救至寵力戰有功關乃退進封寵安昌亭侯文帝即王位遷揚武將軍破吳於江陵有功更拜伏波將軍屯新野大軍南征到精湖寵率諸軍在前與賊隔水相對寵敕諸將曰今夕風甚猛賊必來燒軍宜為之備諸軍皆警夜半賊果遣十部伏夜來燒寵掩擊破之進封南鄉侯黃初三年假寵節鉞五年拜前將軍明帝即位進封昌邑侯太和二年領豫州刺史三年春降人稱吳大嚴揚聲欲詣江北獵孫權欲自出寵度其必襲西陽而為之備權聞之退還秋使曹休從廬江南入合肥令寵向夏口寵上疏曰曹休雖明果而希用兵今所從道背湖旁江易進難退此兵之窪地也若入無強口宜深為之備寵表未報休遂深入賊果從無強口斷夾石要休還路休戰不利退走會朱靈等從後來斷道與賊相遇賊驚走休軍乃得還是嵗休薨寵以前將軍代都督揚州諸軍事汝南兵民戀募大小相率奔隨道路不可禁止護軍表上欲殺其為首者詔使寵與所將親兵千人自隨其餘一無所問四年拜寵征東將軍其冬孫權揚聲欲向合肥寵表召兖豫諸軍皆集賊退還被詔罷兵寵以為今賊大舉而還非本意也此必欲偽退以罷吾兵而倒還乘虛掩不備也表不罷兵後十餘日權果更來到合肥城不克而還其明年吳將孫布遣人詣揚州求降辭云道逺不能自致乞兵見迎刺史王淩騰布書請兵馬迎之寵以為必詐不與兵而作報書曰知識邪正欲避禍就順去暴歸道甚相嘉尚今欲遣兵相迎然計兵少則不足相衛多則事必逺聞且先密計以成本志臨時節度其宜寵會被書當入朝敕留府長史若淩欲往迎勿與兵也淩於後索兵不得乃單遣一督將步騎七百人往迎之布夜掩擊督將迸走死傷過半初寵與淩共事不平淩支黨毁寵疲老悖謬故明帝召之既至進見體氣康強飲酒至一石不亂帝勞賜之遣還寵屢表求留詔不許明年吳將陸遜向廬江論者以為宜速赴之寵曰廬江雖小將徑兵精守則經時又賊舍船二百里來後尾空縣尚欲誘致今宜聼其遂進但恐走不可及耳乃整軍趨楊宜口賊聞大兵東下即夜遁時權嵗有來計青龍元年寵上疏曰合肥城南臨江湖北逺夀春賊攻圍之得據水為勢官兵救之當先破賊大輩然後圍乃得解賊往甚易而兵往救之甚難宜移城內之兵其西三十里有竒險可依更立城以固守此為引賊平地而掎其歸路於計為便護軍將軍蔣濟議以為既示天下以弱且望賊煙火而壞城此為未攻而自拔一至於此劫略無限必以淮北為守帝未許寵重表曰孫子言兵者詭道也故能而示之以弱不能驕之以利市之以懾此為形實不必相應也又曰善動敵者形之今賊未至而移城却內此所謂形而誘之也引賊逺水擇利而動舉得於外則福生於內矣尚書趙咨以寵策為長詔遂報聼其年孫權自出欲圍新城以其逺水積二十日不敢下船寵謂諸將曰權得吾移城必於其衆中有自大之言今大舉而來欲要一切之功雖不敢至必當上岸耀兵以示有餘乃潛遣步騎六千伏肥池隱處以待之權果上岸耀兵寵伏軍卒起擊之斬首數百或有赴水死者明年權自將兵號十萬攻合肥新城寵馳往赴救募壯士數十人折松為炬灌以麻油從上風放火燒賊攻具射殺權弟子孫泰賊於是引退三年春權遣兵數千家佃於江北至八月寵以田向收熟男女布野其屯衛兵去城逺者數百里可掩擊也遣長史督三千人循江東下摧破諸屯焚燒榖物而還詔美之因以所獲盡為將士賞景初二年以寵年老徵還遷為太尉寵不治家産家無餘財詔賜田十頃榖五百斛錢二十萬以明清忠儉約之節焉寵前後增邑凡九千六百户封子孫二人亭侯正始三年薨諡景侯子偉嗣偉以格度知名官至衛尉田豫字國讓漁陽雍奴人也劉備之奔公孫瓉也豫時年少自託於備備甚竒之備為豫州刺史豫以母老求歸備涕泣與别曰恨不與吾共成大事也公孫瓉使豫守東州令瓉將王門叛瓉為袁紹將萬餘人來攻衆懼欲降豫登城謂曰卿為公孫所厚而去意有所不得已也今還作賊乃知卿亂人耳夫挈瓶之智守不假器吾既受之矣何不急攻之乎門慙而退瓉雖知豫有權謀而不能用也瓉敗而鮮于輔為國人所推行太守事輔素善豫以為長史時雄傑並起輔莫知所從豫謂輔曰終能定天下者必曹氏也宜速歸命輔從其計用受封寵太祖召豫為丞相軍謀掾除潁隂朗陵令遷弋陽太守所在有治聲鄢陵侯彰征代郡以豫為相軍次易北虜伏騎擊之軍人擾亂莫知所為豫因地形回車結圜陳弓弩持滿於內疑兵塞其隙胡不能進散去追擊大破之遂前平代皆豫策也遷南陽太守先時郡人侯音反衆數千人在山中為羣盜大為郡患前太守收其黨與五百餘人表奏皆當死豫悉見諸繫囚慰喻開其自新之路一時破械遣之諸囚皆叩頭願自效即相告語羣賊一朝解散郡內清淨具以狀上太祖善之文帝初北狄強盛侵擾邉塞乃使豫持節護烏丸校尉牽招解俊并護鮮卑自髙柳以東濊貊以西鮮卑數十部比能彌加素利割地統御各有分界乃共誓要皆不得以馬與中國市豫以戎狄為一非中國之利乃先搆離之使為讐敵互相攻伐素利違盟出馬千匹與官為比能所攻求救於豫豫恐遂相兼并為害滋深宜救善討惡示信衆狄單將鋭卒深入虜庭胡人衆多鈔軍前後截斷歸路豫乃進軍去虜十餘里結屯營多聚牛馬糞然之從他道引去胡見煙火不絶以為尚在去行數十里乃知之追豫到馬城圍之十重豫密嚴使司馬建旌旗鳴鼓吹將步騎從南門出胡人皆屬目往赴之豫將精鋭自北門出鼓譟而起兩頭俱發出虜不意虜衆散亂皆棄弓馬步走追討二十餘里僵尸蔽地又烏丸王骨進桀黠不恭豫因出塞案行單將麾下百餘騎入進部進逆拜遂使左右斬進顯其罪惡以令衆衆皆怖懾不敢動便以進弟代進自是胡人破膽威震沙漠山賊髙艾衆數千人寇鈔為幽冀害豫誘使鮮卑素利部斬艾傳首京師封豫長樂亭侯為校尉九年其御夷狄常摧抑兼并乖散強猾凡逋亡姦宄為胡作計不利官者豫皆構刺攪離使凶邪之謀不遂聚居之類不安事業未究而幽州刺史王雄支黨欲令雄領烏丸校尉毁豫亂邉為國生事遂轉豫為汝南太守加殄夷將軍太和末公孫淵以遼東叛帝欲征之而難其人中領軍楊暨舉豫應選乃使豫以本官督青州諸軍假節往討之會吳賊遣將軍周賀等之遼東求市馬帝以賊衆多又以渡海詔使豫罷軍豫度賀等船垂還嵗晚風急必畏漂浪東隨無岸當赴成山無藏船之處輒便循海案行地形及諸山島徼截險要列兵屯守自入成山登漢武之觀賀等果遇惡風船皆觸山沉沒波蕩著岸無所逃竄盡虜其衆初諸將皆笑於空地致賊及賊破競欲與謀求入海鉤取浪船豫懼窮虜死戰皆不聼初豫以太守督青州青州刺史程喜內懷不服軍事之際多相違錯喜知帝寶愛明珠乃密上豫雖有戰功而禁令寬弛所得器仗珠金甚多放散皆不納官由是不見列後孫權號十萬衆攻新城征東將軍滿寵欲率諸軍救之豫曰賊悉衆大舉非徒投射小利欲質新城以致大軍耳宜聼使攻城挫其鋭氣不當與爭鋒也城不可拔衆必罷怠罷怠然後擊之可大克也若賊見計必不攻城勢將自走若便進兵適入其計又大軍相向當使難知不當使自畫也豫輒上狀天子從之會賊遁走後吳復來寇豫往拒之賊即退諸軍夜驚云賊復來豫卧不起令衆敢動者斬有頃竟無賊景初未增邑三百并前五百户正始初遷使持節護胸奴中郎將加振威將軍領并州刺史外胡聞其威名相率來獻州界寧肅百姓懷之徴為衛尉屢乞遜位太傅司馬懿以為豫克壯書喻未聼豫書答曰年過七十而以居位譬猶鐘鳴漏盡而夜行不休是罪人也遂固辭疾篤拜太中大夫食卿祿年八十二薨子彭祖嗣豫清儉約素賞賜皆散之將士每胡狄私遺悉簿藏官不以入家家常貧虛雖殊類咸髙豫節嘉平六年下詔褒揚賜其家錢榖語在徐邈傳牽招字子經安平觀津人也年十餘嵗詣同縣樂隱受學後隱為車騎將軍何苖長史招隨卒業值京都亂苖隱俱見害招與隱門生史路等觸蹈鋒刃共殯斂隱尸送喪還歸道遇寇鈔路等皆悉散走賊欲斫棺取釘招垂淚請赦賊義之乃釋而去由是顯名後袁紹在冀州辟為督軍從事兼領烏丸突騎紹舍人犯法招先斬乃白紹竒其意而不罪也紹卒又事紹子尚建安九年太祖圍鄴尚遣招至上黨督致軍糧未還尚破走到中山時尚外兄髙幹為并州刺史招以并州左有恆山之險右有大河之固帶甲五萬北阻強胡勸幹迎尚并力觀變幹既不能又隂欲害招招聞之間行而去道隔不得追尚遂東詣太祖太祖領冀州辟為從事太祖將討袁談而柳城烏丸欲出騎助談太祖以招嘗領烏丸遣詣栁城到值峭王嚴以五千騎當遣詣談又遼東太守公孫康自稱平州牧遣使韓忠齎單于印綬往假峭王峭王大會羣長忠亦在坐峭王問招曰昔袁公受天子之命假我為單于今曹公復言當更白天子假我真單于遼東復持印綬來如此誰當為正招答曰昔袁公承制得有所拜假中間違錯天子命曹公代之言當自天子更假真單于是也遼東下郡何得擅稱拜假也忠曰我遼東在滄海之東擁兵百萬又有扶餘濊貊之用當今之勢強者為右曹操獨何得為是也招呵忠曰曹公允恭明哲翼戴天子伐叛柔服寧靜四海汝君臣頑嚚今恃險逺背違王命欲擅拜假侮弄神器方當屠戮何敢慢易咎毁大人便捉忠頭頓築拔刀欲斬之峭王驚怖徒跣抱招以救請忠左右失色招乃還坐為峭王等説成敗禍福之效皆下席跪伏敬受敕教便辭遼東之使罷所嚴騎太祖滅談於南皮署招軍謀掾從討烏丸至栁城拜護烏丸校尉還鄴遼東送袁尚首縣在馬市招覩之悲感設祭頭下太祖義之舉為茂才從平漢中太祖還留招為中護軍事罷還鄴拜平虜校尉將兵督青徐州郡諸軍事擊東萊賊斬其渠帥東土寧靜文帝踐阼拜招使持節護鮮卑校尉屯昌平是時邉民流散山澤又亡叛在鮮卑中者處有千數招廣布恩信招誘降附建義中郎將公孫集等率將部曲咸各歸命使還本郡又懷來鮮卑素利彌加等十萬餘落皆令款塞大軍欲征吳召招還至值軍罷拜右中郎將出為鴈門太守郡多寇鈔招教民戰陳又表復烏丸五百餘家租調使備鞍馬逺遣偵候虜每犯塞勒兵逆擊來輒摧破於是吏民膽氣日鋭荒野無虞又構間離散使虜更相猜二鮮卑大人步度根泄歸泥等與軻比能為隙將部落三萬餘家詣郡附塞敕令還擊比能殺比能弟苴羅侯及叛烏丸歸義侯王同王寄等大結怨讐是以招自出率將歸泥等討比能於雲中故郡大破之招通河西鮮卑附頭等十餘萬家繕治陘北故上館城置屯戍以鎮內外夷虜大小莫不歸心諸亡叛雖親戚不敢藏匿咸悉收送於是野居晏間寇賊靜息招乃簡選有才識者詣太學受業還相授教數年中庠序大興郡所治廣武井水鹹苦民乃擔輦逺汲流水往返七里招準望地勢因山陵之宜鑿原開渠注水城內民賴其益明帝即位賜爵關內侯太和二年護烏丸校尉田豫出塞為阿比能所圍於故馬邑城移招求救招即整勒兵馬欲赴救豫并州以常憲禁招招以為節將見圍不可拘於吏議自表輒行又並馳布羽檄稱陳形勢云當西北掩取虜家然後東行會誅虜身檄到豫軍踊躍又遺一通於虜蹊要虜即恐怖種類離散軍到故平城便皆潰走比能復大合騎來到故平州塞北招潛行撲討大斬首級招以蜀相諸葛亮數出而比能狡猾能相交通表為防備議者以為縣逺未之信也會亮時在祈山果遣使連結比能比能至故北地石城與相首尾帝乃詔招使從便宜討之時比能已還漠南招與刺史畢軌議曰胡虜遷徙無常若勞師逺追則遲速不相及若欲潛襲則山溪艱險資糧轉運難以密辦可使守新興鴈門二牙門出屯陘北外以鎮撫內令兵田儲畜資糧秋冬馬肥州郡兵合乘釁征討計必全克未及施行會病卒招在郡十二年威風逺振其治邉之稱次於田豫百姓追而思之而漁陽傅容在鴈門有名績繼招後在遼東又有事功云招子嘉嗣次子𢎞亦猛毅有招風以隴西太守隨鄧艾伐蜀有功咸熙中為振威護軍嘉與晉司徒李允同母早卒郭淮字伯濟太原陽曲人也祖全大司農父緼鴈門太守淮建安中舉孝廉除平原府丞文帝為五官將召淮署為門下賊曹轉為丞相兵曹議令史從征漢中太祖還留征西將軍夏侯淵拒劉備以淮為淵司馬淵與備戰淮時有疾不出淵遇害軍中擾擾淮收散卒推蕩寇將軍張郃為軍主諸營乃定其明日備欲渡漢水來攻諸將議衆寡不敵備便乘勝欲依水為陳以拒之淮曰此示弱而不足挫敵非算也不如逺水為陳引而致之半濟而後擊備可破也既陳備疑不渡淮遂堅守示無還心以狀聞太祖善之假郃節復以淮為司馬文帝即王位賜爵關內侯轉為鎮西長史又行征羌護軍護左將軍張郃冠軍將軍楊秋討山賊鄭甘盧水叛胡皆破平之關中始定民得安業黃初元年奉使賀文帝踐阼而道得疾稽留及羣臣歡會帝正色責之曰昔禹會諸侯于塗山防風氏後至便行大戮今溥天同慶而卿使最留遲何也淮對曰臣聞五帝先教導民以德夏后政衰始用刑辟今臣遭唐虞之世是以自知免於防風之誅也帝悅之擢領雍州刺史封射陽亭侯五年為真安定羌大帥辟蹄反討破降之每羌胡來降淮輒先使人推問其親姻男女多少年嵗長幼及見一二知其款曲訊問周至咸稱神明太和二年蜀相諸葛亮出祁山遣將軍馬謖至街亭髙詳屯列栁城張郃擊謖淮攻詳營皆破之又破隴西名羌唐謕於枹罕加建威將軍五年蜀人出鹵城是時隴右無榖議欲關中大運淮以威恩撫循羌胡家使出榖平其輸調軍食用足轉揚武將軍青龍二年諸葛亮出斜谷並田于蘭坑是時司馬懿屯渭南淮策亮必爭北原宜先據之議者多謂不然淮曰若亮跨渭登原連兵北山隔絶隴道搖蕩民夷此非國之利也懿善之淮遂屯北原塹壘未成蜀兵大至淮逆擊之後數日亮盛兵西行諸將皆謂欲攻西圍淮獨以為此見形於西欲使官軍重應之必攻陽遂耳其夜果攻陽遂有備不得上正始元年蜀將薑維出隴西淮遂進軍追至強中維退遂討羌迷當等案撫柔氐三千餘落拔徙以實關中遷左將軍涼州休屠胡梁元碧等率種落二千餘家附雍州淮奏請徙居安平之髙平為民保鄣其後因置西川都尉轉拜前將軍領州如故五年夏侯元伐蜀淮督諸軍為前鋒淮度勢不利輒拔軍出故不大敗還假淮節八年隴西南安金城西平諸羌餓何燒戈伐同蛾遮塞等相結叛亂攻圍新邑南招蜀兵涼州名胡治無戴復叛應之討蜀護軍夏侯霸督諸軍屯為翅淮軍始到狄道議者僉謂宜先討定枹罕內平惡羌外折賊謀淮策維必來攻霸遂入渢中轉南迎霸維果攻為翅會淮軍適至維遁退淮進討叛羌斬餓何燒戈服降者萬餘落九年遮塞等屯河關白土故城據河拒官軍淮見形上流密於下渡兵據白土城擊大破之治無戴圍武威家屬留在西海淮進軍趣西海欲掩取其纍重會無戴折還與戰於龍夷之北破走之令居惡虜在石頭山之西當大道止斷絶王使淮還過討大破之薑維出石營從強川乃西迎治無戴留隂平太守廖化於成重山築城斂破羌保質淮欲分兵取之諸將以維衆西接強胡化以據險分軍兩持兵勢轉弱進不制維退不拔化非計也不如合而俱西及胡蜀未接絶其內外此交伐之兵也淮曰今往取化出賊不意維必狼顧比維自致足以定化且使維疲於奔命兵不逺西而胡交自離此一舉而兩全之策也乃别遣夏侯霸等追維於沓中淮自率諸軍就攻化等維果馳救化皆如淮計進封都鄉侯嘉平元年遷征西將軍都督雍涼諸軍事是嵗與雍州刺史陳泰協謀降蜀牙門將句安等於翅上二年詔以淮為車騎將軍儀同三司持節都督如故進封陽曲侯邑凡二千七百八十户分三百户封一子亭侯正元二年薨追贈大將軍諡貞侯子統嗣統官至荆州刺史薨子正嗣咸熙中開建五等以淮著勳前朝改封汾陽子徐邈字景山燕國薊人也太祖平河朔召為丞相軍謀掾試守奉髙令入為東曹議令史魏國初建為尚書郎時科禁酒而邈私飲至於沈醉校事趙達問以曹事邈曰中聖人達白之太祖太祖甚怒度遼將軍鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人邈性修慎偶醉言耳竟坐得免刑後領隴西太守轉為南安文帝踐阼歷譙相平陽安平太守潁川典農中郎將所在著稱賜爵關內侯車駕幸許昌問邈曰頗復中聖人不對曰昔子反斃於榖陽御叔罰於飲酒臣嗜同二子不能自懲時復中之然宿瘤以醜見傳而臣因醉見識帝大笑顧左右曰名不虛立遷撫軍大將軍軍師明帝以涼州絶逺南接蜀寇以邈為涼州刺史使持節領護羌校尉至值諸葛亮出祁山隴右三郡反邈輒遣參軍及金城太守擊南安賊破之河右少雨民常苦乏榖邈上書修武威酒泉鹽池以收虜榖又廣開水田募貧民佃之家家豐足倉庫盈溢乃支度州界軍用之餘以市金帛犬馬通供中國之費以漸收斂民間私仗藏之府庫然後率以禮義立學明訓禁厚葬斷淫祀進善黜惡風化大行百姓歸心焉西域流通荒戎入貢皆邈之勳也討叛羌柯吾有功封都亭侯邑三百户加建威將軍邈與羌胡從事不問小過若犯大罪先告部帥使知應死者乃斬以徇是以信服畏威邈所得賞賜皆散與將士無入家者妻子衣食不充天子聞而嘉之隨時供給其家正始元年還為大司農遷為司𨽻校尉百僚敬憚之公事去官後為光祿大夫數嵗即拜司空邈嘆曰三公論道之官無其人則缺豈可以老病忝之哉遂固辭不受嘉平元年年七十八以大夫薨于家用公禮葬諡曰穆侯子武嗣六年朝廷追思清節之士詔曰夫顯賢表德聖王所重舉善而教仲尼所美故司空徐邈征東將軍胡質衛尉田豫皆服職前朝歷事四世出統戎馬入贊庶政忠清在公憂國忘私不營産業身沒之後家無餘財朕甚嘉之其賜邈等家榖二千斛錢三十萬布告天下邈同郡韓觀曼遊有鑒識器幹與邈齊名而在孫禮盧育先為豫州刺史甚有治功卒官盧欽著書稱邈曰徐公志髙行潔才博氣猛其施之也髙而不狷潔而不介博而守約猛而能寬聖人以清為難而徐公之所易也或問欽徐公當武帝之時人以為通自在涼州及還京師人以為介何也欽答曰往者毛孝先崔季圭等用事貴清素之士于時皆變易車服以求名髙而徐公不改其常故人以為通比來天下奢靡轉相倣效而徐公雅尚自若不與俗同故前日之通乃今日之介也是世人之無常而徐公之有常也胡質字文德楚國夀春人也少與蔣濟朱績俱知名於江淮間仕州郡蔣濟為别駕使見太祖太祖問曰胡通達通達名敏以方正徴長者也寧有子孫不濟曰有子曰質規模大略不及於父至於精良綜事過之太祖即召質為頓邱令縣民郭政通於從妹殺其夫程他郡吏馮諒繫獄為證政與妹皆耐掠隱抵諒不勝痛自誣當反其罪質至官察其情色更詳其事檢驗具服入為丞相東曹議令史州請為治中將軍張遼與其護軍武周有隙遼見刺史溫恢求請質質辭以疾遼出謂質曰僕委意於君何以相辜如此質曰古人之交也取多知其不貪奔北知其不怯聞流言而不信故可終也武伯南身為雅士往者將軍稱之不容口今以睚眥之恨乃成嫌隙況質才薄豈能終好是以不願也遼感其言復與周平太祖辟為丞相屬黃初中徙吏部郎為恆山太守遷任東莞士盧顯為人所殺質曰此士無讐而有少妻所以死乎悉見其比居年少書吏李若見問而色動遂窮詰情狀若即自首罪人斯得質每軍功賞賜皆散之於衆無入家者在郡九年吏民便安將士用命遷荆州刺史加振威將軍賜爵關內侯吳大將朱然圍樊城質輕軍赴之議者以為賊盛不可迫質曰樊城卑下兵少故當進軍為之外援不然危矣遂勒兵臨圍城中乃安遷征東將軍假節都督青徐諸軍事廣農積榖有兼年之儲置東征臺且佃且守又通渠諸郡利舟楫嚴設備以待敵海邉無事質性沈實內察不以其節檢物所在見思嘉平二年薨家無餘財惟有賜衣書篋而已軍師以聞追進封陵陽亭侯邑百户諡曰貞侯子威嗣六年詔書褒述質清行賜其家錢榖語在徐邈傳威字伯虎官至前將軍青州刺史封平春侯晉史有傳在良吏目中王昶字文舒太原晉陽人也父澤代郡太守伯父柔北中郎將昶少與同郡王淩俱知名淩年長昶兄事之文帝在東宫昶為太子文學遷中庶子文帝踐阼徙散騎侍郎為洛陽典農時都畿樹木成林昶斫開荒萊勤勸百姓懇田特多遷兖州刺史明帝即位加揚烈將軍賜爵關內侯昶雖在外任心存朝廷以魏承秦漢之弊法制苛碎不大釐改國典以準先王之風而望治化復興不可得也乃著治論略依古制而合於時務者二十餘篇又著兵書十餘篇言竒正之用青龍中奏之其為兄子及子作名字皆依謙實以見其意故兄子默字處靜沈字處道其子渾字元沖深字道沖遂書誡之曰夫人為子之道莫大於寶身全行以顯父母此三者人知其善而或危身破家陷於滅亡之禍者何也由所祖習非其道也夫孝敬仁義百行之首而立身之本也孝敬則宗族安之仁義則鄉黨重之此行成於內名著於外者矣人若不篤於至行而背本逐末以陷浮華焉以成朋黨焉浮華則有虛偽之纍朋黨則有彼此之患此二者之戒昭然著明而循覆車滋衆逐未彌甚皆由惑當時之譽昧目前之利故也夫富貴聲名人情所樂而君子或得而不處何也惡不由其道耳人患知進而不知退知欲而不知足故有困辱之纍悔吝之咎語曰如不知足則失所欲故知足之足常足矣覽往事之成敗察將來之吉凶未有干名要利而不厭而能保世持家永全福祿者也欲使汝曹立身行已遵儒者之教履道家之言故以元默沖虛為名欲使汝曹顧名思義不敢違越也古者盤杅有銘凡杖有誡俯仰察焉用無過行況在已名可不戒之哉夫物速成則疾亡晚就則善終朝華之草夕而零落松柏之茂隆冬不衰是以大雅君子惡速成戒闕黨也若范丐對秦客而武子擊之折其委笄惡其掩人也夫人有善鮮不自伐有能者寡不自矜伐則掩人矜則陵人掩人者人亦掩之陵人者人亦陵之故三郤為戮於晉王叔負罪於周不惟矜善自伐好爭之咎乎故君子不自稱非以讓人惡其蓋人也夫能屈以為伸讓以為得弱以為強鮮不遂矣夫毁譽愛惡之原而禍福之機也是以聖人慎之孔子曰吾之於人誰毁誰譽如有所譽必有所試又曰子貢方人賜也賢乎哉我則不暇以聖人之德猶尚如此況庸庸之徒而輕毁譽哉昔伏波將軍馬援戒其兄子言聞人之惡當如聞父母之名耳可得而聞口不可得而言也斯戒至矣人或毁已當退而求之於身若已有可毁之行則彼言當矣若已無可毁之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉且聞人毁已而忿者惡醜聲之加人也人報者滋甚不如默而自修已也諺曰救寒莫如重裘止謗莫如自修斯言信矣若與是非之士凶險之人近猶不可況與對校乎其害深矣夫虛偽之人言不根道行不顧言其為浮淺較可識别而世人惑焉猶不檢之以言行也近濟隂魏諷山陽曹偉皆以傾邪敗沒熒惑當世挾持姦慝驅動後生雖刑於鈇鉞大為炯戒然所汚染固已衆矣可不慎與若夫山林之士夷叔之倫甘長飢於首陽安赴火於綿山雖可以激貪勵俗然聖人不為吾亦不願也今汝先人世有冠冕惟仁義為名守慎為稱孝悌於閨門務學於師友吾與時人從事雖出處不同然各有所取潁川郭伯益伯益名奕郭嘉之子好尚通達敏而有知其為人𢎞曠不足輕貴有餘得其人重之如山不得其人忽之如草吾以所知親之昵之不願兒子為之北海徐偉長不治名髙不求苟得淡然自守唯道是務其有所是非則託古人以見其意當時無所褒貶吾敬之重之願兒子師之東平劉公幹博學有髙才誠節有大意然性行不均少所拘忌得失足以相補吾愛之重之不願兒子慕之樂安任昭先昭先名嘏淳粹履道內敏外恕推遜恭讓處不避汙怯而義勇在朝忘身吾友之善之願兒子遵之若引而伸之觸類而長之汝其庶幾舉一隅耳及其用財先九族其施舍務周急其出入存故老其論議貴無貶其進仕尚忠節其取人務道實其處勢戒驕淫其貧賤慎無戚其進退念合宜其行事加九思如此而已吾何憂哉青龍四年詔欲得有才智文章謀慮淵深料逺若近視昧而察籌不虛運策不徒發端一小心清修密靜乾乾不解志尚在公者無限年齒勿拘貴賤卿校已上各舉一人太尉司馬懿以昶應選正始中轉任徐州封武觀亭侯遷征南將軍假節都督荆豫諸軍事昶以為國有常衆戰無常勝地有常險守無常勢今屯宛去襄陽三百餘里諸軍散屯船在宣池有急不足相赴乃表徙治新野習水軍於三州廣農墾殖倉榖盈積嘉平初太傅司馬懿既誅曹爽乃奏博問大臣得失昶陳治略五事其一欲崇道篤學抑絶浮華使國子入太學而修庠序其二欲用考試考試猶準繩也未有舍準繩而意正曲直廢黜陟而空論能否也其三欲今居官者久於其職有治績則就增位賜爵其四欲約官實祿勵以廉恥不使與百姓爭利其五欲絶侈靡崇節儉令衣服有章上下有敘儲榖蓄帛反民於朴詔書褒讃因使撰百官考課事昶以為唐虞雖有黜陟之文而考課之法不垂周制冢宰之職大計羣吏之治而誅賞又無校比之制由此言之聖主明於用賢略舉黜陟之體以委達官之長而總其統紀故能否可得而知也其大指如此二年昶奏孫權流放良臣適庶分爭可乘釁而制吳蜀白帝夷陵之間黔巫秭歸房陵皆在江北民夷與新城郡接可襲取也乃遣新城太守州泰襲黔巫秭歸房陵荆州刺史王基詣夷陵昶詣江陵兩岸引竹絙為橋渡水擊之賊奔南岸鑿七道並來攻於是昶使積弩同時俱發賊大將施績夜遁入江陵城追斬數百級昶欲引致平地與合戰乃先遣五軍案大道發還使賊望見以喜之以所獲鎧馬甲首馳環城以怒之設伏兵以待之績果追軍與戰克之績遁走斬其將鍾離茂許旻收其甲首旗鼓珍寶器仗振旅而還王基州泰皆有功於是遷昶征南大將軍儀同三司進封京陵侯母邱儉文欽作亂引兵拒儉欽有功封二子亭侯關內侯進位驃騎將軍諸葛誕反昶據夾石以逼江陵持施績全熙使不得東誕既誅詔增邑千户并前四千七百户遷司空持節都督如故甘露四年薨諡曰穆侯子渾嗣渾自越騎校尉入晉纍居方任平吳有功晉史有傳王基字伯輿東萊曲城人也少孤與叔父翁居翁撫養甚篤基亦以孝稱年十七郡召為吏非其好也遂去入琅邪界遊學黃初中察孝廉除郎中是時青土初定刺史王淩表請基為别駕後召為祕書郎淩復請還頃之司徒王朗辟基淩不遣朗以書劾州淩猶不遣淩流稱青土蓋亦基協和之輔也大將軍司馬懿辟基未至擢為中書侍郎明帝盛修宫室百姓勞弊基上疏曰臣聞古人以水喻民曰水所以載舟亦所以覆舟故在民上者不可以不戒懼夫民逸則慮易苦則思難是以先王居之以約儉俾不至於生患昔顔淵云東野子之御馬馬力盡矣而求進不已是以知其將敗今事役勞苦男女離曠願陛下深察東野之弊留意舟水之喻息奔駟於未盡節力役於未困昔漢有天下至孝文時唯有同姓諸侯而賈誼憂之以為置火積薪之下而寢其上因謂之安也今寇賊未殄猛將擁兵檢之則無以應敵久之則難以遺後當盛明之世不務以除患若子孫不競社稷之憂也使賈誼復起必深切於曩時矣散騎常侍王肅著諸經傳解及論定朝儀改易鄭元舊説而基據持元義常與抗衡遷安平太守公事去官大將軍曹爽請為從事中郎出為安豐太守郡接吳寇為政清嚴有威惠明設防備敵不敢犯加討寇將軍吳嘗大發衆集建業揚聲欲入攻揚州刺史諸葛誕使基策之基曰昔孫權再至合肥一至江夏其後全琮出廬江朱然寇襄陽皆無功而還今陸遜等已死而權年老內無賢嗣中無謀主權自出則懼內釁卒起癰疽發潰遣將則舊將已盡新將未信此不過欲補定支黨還自保護耳後權竟不能出時曹爽專柄風化陵遲基著時要論以切世事以疾徴還起家為河南尹未拜爽伏誅基嘗為爽官屬隨例罷其年為尚書出為荆州刺史加揚烈將軍隨征南王昶擊吳基别襲步協於夷陵協閉門自守基示以攻形而實分兵取雄父邸閣收米三十餘萬斛虜安北將軍談正納降數千口於是移其降民置夷陵縣賜爵關內侯基又上昶表城徙江夏治之以逼夏口由是賊不敢輕越江明制度整軍農兼修學校南方稱之時朝廷議欲伐吳詔基量進趣之宜基對曰夫兵動而無功則威名折於外財用窮於內故必全而後用之也若不資通川聚糧水戰之備則雖積兵江內無必渡之勢矣今江陵有沮漳二水溉灌膏腴之田以千數安陸左右陂池沃衍若水陸並農以實軍資然後引兵詣江陵夷陵分據夏口順沮漳資水浮榖而下賊知官兵有經久之勢則拒天誅者意沮而向王化者益固然後率合蠻夷以攻其內精卒徑兵以討其外則夏口以上必拔而江外之郡不守如此則吳蜀之交絶交絶而吳禽矣不然兵出之利未可必也於是遂止司馬師新統政事基書戒師以志正心靜為本且以許允傅嘏袁侃崔贊為薦師納用之髙貴鄉公即位進封常樂亭侯母邱儉文欽作亂以基為行監軍假節統許昌軍適與司馬師會於許昌師曰君籌儉等何如基曰淮南之逆非吏民思亂也儉等誑脅迫懼畏目下之戮是以尚羣聚耳若大兵臨逼必土崩瓦解儉欽之首不終朝而縣於軍門矣師曰善乃令基居軍前議者咸以儉欽慓悍難與爭鋒詔基停駐基以為儉等舉軍足以深入而久不進者是其詐偽已露衆心疑沮也今不張示威形以示民望而停軍髙壘有似畏懦非用兵之勢也若或虜略人民又州郡兵家為賊所得者更懷離心儉等所迫脅者自顧罪重不敢復還此為錯兵無用之地而成姦宄之原吳寇因之則淮南非國家之有譙沛汝豫危而不安此計之大失也軍宜速進據南頓南頓有大邸閣計足軍人四十日糧保堅城因積榖先人有奪人之心此平賊之要也基屢請乃聼進據濦水既至復言曰兵聞拙速未覩工遲之久方今外有強寇內有叛臣若不時決則事之深淺未可測也議者多欲將軍持重將軍持重是也停軍不進非也持重非不行之謂也進而不可犯耳今據堅城保壁壘以積實資虜縣運軍糧甚非計也師欲須諸軍集到猶尚未許基曰將在軍君令有所不受彼得則利我得亦利是謂爭城南頓是也遂輒進據南頓儉等從項亦爭欲往發十餘里聞基先到復還保項時兗州刺史鄧艾屯樂嘉儉使文欽將兵襲艾基知其勢分進兵逼項儉衆遂敗欽等已平遷鎮南將軍都督豫州諸軍事領豫州刺史進封安樂縣侯上疏求分户二百賜叔子喬爵關內侯以報叔父拊育之德有詔特聼諸葛誕反基以本官行鎮東將軍都督揚豫諸軍事時大軍在項以賊兵精詔基斂軍堅壘基纍啓求進討會吳遣朱異來救誕軍於安城基又被詔引軍轉據北山基謂諸將曰今圍壘轉固兵馬向集但當精修守備以待越逸而更移兵守險使得放縱雖有智者不能善後矣遂守便宜上疏曰今與賊衆對敵當不動如山若遷移依險人心搖蕩形勢大損諸軍並據深溝髙壘衆心皆定不可傾動此御兵之要也書奏報聼大將軍司馬昭進屯邱頭分部圍守各有所統基督城東城南二十六軍昭敕軍吏入鎮南部界一不得有所譴城中食盡賊晝夜攻壘基輒拒擊破之夀春既平昭與基書曰初議者云云求移者甚衆時未臨履亦謂宜然將軍深算利害獨秉固志上違詔命下拒衆議終至制敵禽賊雖古人所述不是過也昭欲遣諸將輕兵深入招迎唐咨等子弟因釁有蕩覆吳之勢基諌曰昔諸亮恪乘東關之勝竭江表之兵以圍新城城既不拔而衆死者太半薑維因洮上之利輕兵深入糧餉不繼軍覆上邽夫大捷之後上下輕敵輕敵則慮難不深今賊新敗於外又內患未弭是其修備設慮之時也且兵出踰年人有歸志今俘馘十萬罪人斯得自歷代征伐未有全兵獨克如今之盛者也武皇帝克袁紹於官渡自以所獲已多不復追奔懼挫威也昭乃止以淮南初定轉基為征東將軍都督揚州諸軍事進封東武侯基上疏固讓歸功參佐由是長史司馬等七人皆侯是嵗基母卒詔祕其凶問迎基父豹喪合葬洛陽追贈豹北海太守甘露四年轉為征南將軍都督荆州諸軍事常道鄉公即位增邑千户并前五千七百户前後封子二人亭侯關內侯景元二年襄陽太守表吳賊鄧由等欲來歸化基被詔當因此震蕩江表基疑其詐馳驛陳狀且曰嘉平以來纍有內難當今之務在於鎮安社稷綏寧百姓未宜動衆以求外利司馬昭報書曰凡處事者多曲相從順鮮能確然共盡理實誠感忠愛每見規示輒敬依來指後由等竟不降是嵗基薨進贈司空諡曰景侯子徽嗣早卒咸熙中開建五等以基著勳前朝改封孫廙而以東武餘邑賜一子爵關內侯晉室踐阼下詔曰故司空王基既著德立勳又治身清素不營産業久在重任家無私積可謂身沒行顯足用勵俗者也其以奴婢二人賜其家王淩字彥雲太原祁人也叔父允為漢司徒誅董卓卓將李傕郭汜等為卓報讐入長安殺允盡害其家淩及兄晨時年皆少踰城得脫亡命歸鄉里淩舉孝廉為發干長遇事髠刑五嵗當道掃除時太祖車過問此何徒左右以狀對太祖曰此子師兄子也所坐亦公耳於是主者選為驍騎主簿稍遷至中山太守所在有治聲太祖辟為丞相掾屬文帝踐阼拜散騎常侍出為兖州刺史與張遼等至廣陵討孫權臨江夜大風吳將吕範等船漂至北岸淩與諸將逆擊捕斬首虜獲舟船有功封宜城亭侯加建武將軍轉任青州是時海濵乘喪亂之後法度未整淩布政教賞善罰惡甚有綱紀百姓稱之不容於口後從曹休征吳與賊遇於夾口休軍失利淩力戰決圍休得免難仍徙為揚豫州刺史咸得軍民之歡心始至豫州旌先賢之後求未顯之士各有條教意義甚美初淩與司馬朗賈逵友善及臨兗豫繼其名迹正始初為征東將軍假節都督揚州諸軍事二年吳太將全琮將數萬衆寇芍陂淩率諸軍逆戰與賊爭塘力戰連日賊退走進封南鄉侯邑千三百五十户遷車騎將軍儀同三司是時淩外甥令狐愚以才能為兗州刺史屯平阿舅甥並典兵專淮南之重淩就遷為司空司馬懿既誅曹爽進淩為太尉假節鉞淩愚密協計謂齊王受制於司馬懿不任天位楚王彪長而才欲迎立彪都許昌嘉平元年九月愚遣將張式至白馬與彪相問往來淩又遣舍人勞精詣洛陽語子廣廣言廢立事大勿為禍先其十一月愚復遣張式詣彪未還會愚病死二年熒惑守南斗淩謂斗中有星當有暴貴者三年春吳人塞塗水淩欲因此發大嚴諸軍表求討賊詔報不聼淩隂謀滋甚遣將軍楊𢎞以廢立事告兗州刺史黃華𢎞華連名以白太傅司馬懿懿將中軍從水道討淩先下赦赦淩罪又將尚書廣東使為書喻淩大軍掩至百尺逼淩淩自知勢窮乃乘船單出迎懿遣掾王或謝罪送印綬節鉞軍到邱頭淩面縛水次懿承詔遣主簿解縛反服見淩慰勞之還印綬節鉞遣步騎六百人送還京都淩至項飲藥死懿遂至夀春張式等皆自首乃窮治其事彪賜死諸連者悉夷三族朝議咸以為春秋之義齊崔杼鄭歸生皆加追戮陳尸斫棺載在方册淩愚罪宜如舊典乃發淩愚冡剖棺暴尸於所近市三日燒其印綬朝服親土埋之進𢎞華爵為鄉侯廣有志尚學行死時年四十餘毋邱儉字仲恭河東聞嘉人也父興黃初中為武威太守伐叛柔服開通河右有功名次金城太守蘇則討賊張進及討叛胡有功封髙陽鄉侯入為將作大匠儉襲父爵為平原侯文學明帝即位為尚書郎遷羽林監以東宫之舊甚見親待出為洛陽典農時取農民以治宫室儉上疏曰臣愚以為天下所急除者二賊所急務者衣食誠使二賊不滅士民飢凍雖崇美宫室猶無益也遷荆州刺史青龍中帝圗討遼東以儉有幹策徙為幽州刺史加度遼將軍使持節護烏丸校尉率幽州諸軍至襄平屯遼隧右北平烏丸單于寇婁敦遼西烏丸都督率衆王護留等昔隨袁尚奔遼東者率衆五千餘人降寇婁敦遣弟阿羅槃等詣闕朝貢封其渠帥二十餘人為侯王賜輿馬繒采各有差公孫淵逆與儉戰不利引還明年帝遣太尉司馬懿統中軍及儉等衆數萬討淵定遼東儉以功進封安邑侯邑二千九百户正始中儉以髙句驪數侵叛督諸軍步騎萬人出元菟從諸道討之句驪王宫將步騎二萬人進軍沸流水上大戰梁口梁音遏宫連敗走儉遂束馬縣車以登丸都屠句驪所都斬獲首虜以千數句驪沛者沛者句驪國之官名名得來數諌宫宫不從其言得來歎曰立見此地將生蓬蒿遂不食而死舉國哀之儉令諸軍不壞其墓不伐其樹得其妻子皆放遣之宫單將妻子逃竄儉引軍還六年復征之宫遂奔買溝儉遣元菟太守王頎追之過沃沮千有餘里至于肅慎氏南界刻石紀功刋丸都之山銘不耐之城諸所誅納八千餘口論功行賞侯者百餘人穿山溉灌民蒙其利遷左將軍假節監豫州諸軍事領豫州刺史轉為鎮南將軍諸葛誕戰於東關不利乃令誕儉對换誕為鎮南都督豫州儉為鎮東都督揚州吳太傅諸葛恪圍合肥新城儉與文欽禦之太尉司馬孚督中軍東解圍恪退軍還初儉與夏侯元李豐等厚善揚州刺史前將軍文欽曹爽之邑人也驍果粗猛數有戰功好增虜獲以徼寵賞多不見許怨恨日甚儉以計厚待欽情好歡洽欽亦感戴投心無二正元二年正月有彗星長數十丈西北竟天起於吳楚之分儉欽喜以為己祥遂矯太后詔罪狀大將軍司馬師移諸郡國舉兵反迫脅淮南將守諸别屯者及吏民大小皆入夀春城為壇於城西歃血稱兵為盟分老弱守城儉欽自將五六萬衆渡淮西至項城儉堅守欽在外為遊兵司馬師統中外軍討之别使諸葛誕督豫州諸軍從安風津擬夀春征東將軍胡遵督青徐諸軍出於譙宋之間絶其歸路師自屯汝陽使監軍王基督前鋒諸軍據南頓以待之令諸軍皆堅壁勿與戰儉欽進不得鬬退恐夀春見襲不得歸計窮不知所為淮南將士家屬皆在北衆心沮散降者相屬惟淮南新附農民為之用師又遣兗州刺史鄧艾督泰山諸軍萬餘人至樂嘉示弱以誘之師尋自洙至欽不知果夜來欲襲艾等會明見大軍兵馬盛乃引還師縱驍騎追擊大破之欽遁走是日儉聞欽戰敗恐懼夜走衆潰比至慎縣左右人兵稍棄儉去儉獨與小弟秀及孫重藏水邉草中安風津都尉部民張屬就射殺儉傳首京師屬封侯秀重走入吳將士諸為儉欽所迫脅者悉歸降儉子甸為治書侍御史先時知儉謀將發私出將家屬逃走新安靈山上别攻下之夷儉三族欽亡入吳吳以欽為都護假節鎮北大將軍幽州牧譙侯諸葛誕字公休琅邪陽都人諸葛豐之後也初以尚書郎為滎陽令與僕射杜畿試船陶河遭風覆沒誕亦俱溺虎賁浮河救誕誕曰先救杜侯誕飄于岸絶而後蘇入為吏部郎人有所屬託輒顯其言而承用之後有當否則公議其得失以為褒貶自是羣僚莫不慎其所舉纍遷御史中丞尚書與夏侯元鄧揚等相善收名朝廷京都翕然言事者以誕揚等修浮華合虛譽漸不可長明帝惡之免誕官會帝崩正始初元等並任職復以誕為御史中丞尚書出為揚州刺史加昭武將軍王淩之隂謀也太傅司馬懿潛軍東伐以誕為鎮東將軍假節都督揚州諸軍事封山陽亭侯諸葛恪興東關遣誕督諸軍討之與戰不利還徙為鎮南將軍後毋邱儉文欽反遣使詣誕招呼豫州士民誕斬其使大將軍司馬師東征使誕督豫州諸軍渡安風津向夀春儉欽之破也誕先至夀春夀春城中十餘萬口聞儉欽敗恐誅悉破城門出流迸山澤或散走入吳以誕久在淮南復以為鎮東大將軍儀同三司都督揚州吳大將孫峻吕據留贊等聞淮南亂會文欽往乃帥衆將欽徑至夀春時誕諸軍已至城不可攻乃走誕遣將軍蔣班追擊之斬贊傳首收其印節進封髙平侯邑三千五百户轉為征東大將軍誕既與元揚等至親又王淩毋邱儉纍見夷滅懼不自安傾帑藏振施以結衆心厚養親附及揚州輕俠者數千人為死士甘露元年冬吳賊欲向徐堨計誕所督兵馬足以待之而復請十萬衆守夀春又求臨淮築城以備寇內欲保有淮南朝廷微知誕有自疑心以誕舊臣欲入廢之二年五月徴為司空誕被詔書愈恐遂反召會諸將自出攻揚州刺史樂綝殺之斂淮南及淮北郡縣屯田口十餘萬官兵揚州新附勝兵者四五萬人聚榖足一年食閉門自守遣長史吳綱將小子靚至吳稱臣請救吳人大喜遣將全懌全端唐咨王祚等率三萬衆密與文欽俱來應誕以誕為左都護假節大司徒驃騎將軍青州牧夀春侯是時鎮南將軍王基始至督諸軍圍夀春未合咨欽等從城東北因山乘險得將其衆突入城六月車駕東征至項大將軍司馬昭督中外諸軍二十六萬衆臨淮討之昭屯邱頭使基及安東將軍陳騫等四靣合圍表裏再重塹壘甚峻又使監軍石苞兖州刺史州泰等簡鋭卒為遊軍備外寇欽等數出犯圍逆擊走之吳將朱異再以大衆來迎誕等渡黎漿水泰等逆與戰每摧其鋒孫綝以異戰不進怒而殺之城中食轉少外救不至衆無所恃將軍蔣班焦彛皆誕爪牙計事者也皆以謀不用棄誕踰城自歸於昭昭乃使反間以竒變説全懌等懌等率其衆數千人開門來降城中震懼不知所為三年正月誕欽咨等大為攻具晝夜五六日攻南圍欲決圍而出圍上諸軍臨髙以發石車火箭逆燒破其攻具弩矢及石雨下死傷者蔽地血流盈塹復還入城城中食轉竭出降者數萬口欽欲盡出北方人省食與吳人堅守誕不聼由是爭恨欽素與誕有隙徒以計合事急愈相疑欽見誕計事誕遂殺欽欽子鴦及虎將兵在小城中聞欽死勒兵馳赴之衆不為用鴦虎單走踰城出自歸於昭軍吏請誅之昭令曰欽之罪不容誅其子固應當戮然鴦虎以窮歸命且城未拔殺之是堅其心也乃赦鴦虎使將兵數百騎馳巡城呼語城內云文欽之子猶不見殺其餘何懼表鴦虎為將軍各賜爵關內侯城內喜且擾又日飢困誕咨等智力窮昭乃自臨圍四面進兵同時鼓譟登城城內無敢動者誕窘急單乘馬將其麾下突小城門出昭司馬胡奮部兵逆擊斬誕傳首夷三族誕麾下數百人拱手為列每斬一人輒降之竟不變至盡時人比之田橫其得人心如此唐咨王祚及諸裨將皆靣縳降吳兵萬衆器仗軍實山積誕以二年五月反三年二月破滅夀春既破議者以為淮南仍為叛逆吳兵室家在江南不可縱宜悉坑之昭以為古之用兵全國為上戮其元惡而已吳兵就得亡還適可以示中國之𢎞耳一無所殺分布三河近郡以安處之唐咨本利城人黃初中利城郡反殺太守徐箕推咨為主文帝遣諸軍討破之咨走入海亡至吳官至左將軍封侯持節誕欽屠戮咨亦生禽三叛皆獲天下快焉拜咨安逺將軍其餘裨將咸假號位吳衆恱服江東感之皆不誅其家其淮南將吏士民諸為誕所脅略者惟誅其首逆餘皆赦之聼鴦虎收斂欽喪給其車牛致葬舊墓鄧艾字士載義陽棘陽人也少孤太祖破荆州徙汝南為農民養犢年十二隨母至潁川讀太邱長陳實碑文言文為世範行為士則艾遂自名範字士則後宗族有與同者故改焉為都尉學士以口吃不得作幹佐為稻田守叢草吏同郡吏父憐其家貧資給甚厚艾初不稍謝每見髙山大川輒規度指畫軍營處所時人多笑之後為典農綱紀上計吏因使見太尉司馬懿懿問其名乃稱艾艾懿曰公所稱艾艾復有幾艾答曰鳯兮鳯兮元是一鳯懿竒之辟以為掾遷尚書郎時欲廣田畜榖為滅吳計使艾行陳項已東至夀春艾以為田良水少不足以盡地利宜開河渠可以引水澆溉大積軍糧又通運漕之道乃著濟河論以喻其指又以為昔破黃巾因為屯田積榖於許都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費巨億以為大役陳蔡之間土下田良可省許昌左右諸稻田并水東下令淮北屯二萬人淮南三萬人十二分休常有四萬人且田且守水豐常收三倍於西計除衆費嵗完五百萬斛以為軍資六七年間可積三千萬斛於淮上此則十萬之衆五年食也以此乘吳無往而不克矣懿善之事皆施行正始二年乃開廣漕渠每東南有事大軍興舉泛舟而下達于江淮資實有儲而無水害艾所建也出參征西將軍遷南安太守嘉平元年與征西將軍郭淮拒蜀偏將軍薑維維退淮因西擊羌艾曰去賊未逺或能復還宜分諸軍以備不虞於是留艾屯白水北三日維遣廖化自白水南向艾結營艾謂諸將曰維今卒還吾軍人少法當來渡而不作橋此維使化持吾令不得還維必自東襲取洮城洮城在水北去艾屯六十里艾即夜潛軍徑到維果來渡而艾先至據城得以不敗賜爵關內侯加討寇將軍後遷城陽太守是時并州右賢王劉豹并為一部艾上言曰戎狄獸心不以義親強則侵暴弱則內附故周宣有玁狁之寇漢祖有平城之困每胸奴一盛為前代重患自單于在外莫能牽制長卑誘而致之使來入侍由是羌夷失統合散無主以單于在內萬里順軌今單于之尊日疏而外土之威寖重則胡虜不可不深備也聞劉豹部有叛胡可因其叛割為二國以分其勢去卑功顯前朝而子不繼業宜加其子顯號使居鴈門離國弱寇此御邉良計也又陳羌胡與民同處者宜以漸出之使居民表崇廉恥之教塞姦宄之路大將軍司馬師新輔政多納用焉遷汝南太守至則尋求昔所厚己吏父久以死遣吏祭之重遺其母舉其子為計吏艾所在荒野開闢軍民並豐諸葛恪圍合肥新城不克退還艾言於司馬師曰孫權已沒大臣未附吳名宗大族皆有部曲阻兵仗勢足以建命恪新秉國政而內無其主不思撫恤上下以立根本競於外事虐用其民悉國之衆頓於堅城死者萬數載禍而歸此恪獲罪之日也昔子胥吳起商鞅樂毅皆見任時君主沒而敗況恪才非四賢而不慮大患其亡可待也恪歸果見誅遷兗州刺史加振威將軍上言曰國之所急唯農與戰國富則兵強兵強則戰勝然則農者勝之本也孔子曰足食足兵食在兵前也上無設爵之勸則下無財畜之功今使考績之賞在於積粟富民則交遊之路絶浮華之源塞矣髙貴鄉公即尊位進封方城亭侯毌邱儉作亂遣健步齎書欲疑惑大衆艾斬之兼道進軍先趣樂嘉城作浮橋司馬師至遂據之文欽後以大軍破敗於城下艾追之至邱頭欽奔吳吳大將軍孫峻等號十萬衆將渡江鎮東將軍諸葛誕遣艾據肥陽艾以與賊勢相逺非要害之地輒移屯附亭遣泰山太守諸葛緒等於黎漿拒戰遂走之其年徴拜長水校尉以破欽等功進封方城鄉侯行安西將軍解雍州刺史王經圍於狄道薑維退駐鍾提乃以艾為安西將軍假節領護東羌校尉議者多以為維力已竭未能更出艾曰洮西之敗非小失也破軍殺將倉廪空虛民物流離幾於危亡今以策言之彼有勝我之勢我有虛弱之實一也彼上下相習五兵犀利我將易兵新器仗未復二也彼以船行吾以陸軍勞逸不同三也狄道隴西南安祁山各當有守彼專為一我分為四四也彼從南安隴西因食羌榖若趣祁山熟麥千頃為之縣餌五也賊有黠數其來必矣頃之維果向祁山聞艾已有備乃還從董亭趣南安艾據五成山以相持維與艾爭險不克其夜渡渭東行緣山趣上邽艾與戰於段谷大破之甘露元年詔以艾為鎮西將軍都督隴右諸軍事進封鄧侯分五百户封子忠為亭侯二年拒薑維於長城維退還遷征西將軍前後增邑凡六千六百户景元三年又破維於侯和維却保沓中四年秋詔諸軍征蜀大將軍司馬昭皆指授節度使艾與維相綴連雍州刺史諸葛緒要維令不得歸艾遣天水太守王頎等直攻維營隴西太守牽𢎞等邀其前金城太守楊欣等詣甘松維聞鍾會諸軍已入漢中引退還欣等追躡於強川口大戰維敗走聞雍州已塞道屯橋頭從孔函谷入北道欲出雍州後諸葛緒聞之却還三十里維入北道三十餘里聞諸軍却尋還從橋頭過緒趣截維較一日不及維遂東引還守劒閣鍾會攻維未能克艾上言今賊摧折宜遂乘之從隂平由邪徑經漢德陽亭趣涪出劒閣西百里去成都三百餘里竒兵衝其心腹劒閣之守必還赴涪則會方軌而進如劒閣之軍不還則應涪之兵寡矣軍志有之曰攻其不備出其不意今掩其空虛破之必矣冬十月艾自隂平道行無人之地七百餘里鑿山通道造作橋閣山髙谷深至為艱險又糧運將匱瀕於危殆艾以氊自裏推轉而下將士皆攀木緣崖魚貫而進先登至江由蜀守將馬邈降蜀衛將軍諸葛瞻自涪還綿竹列陳待艾艾遣子惠唐亭侯忠等出其右司馬師纂等出其左忠纂戰不利並退還曰賊未可擊艾怒曰存亡之分在此一舉何不可之有乃叱忠纂等將斬之忠纂馳還更戰大破之斬瞻及尚書張遵等首進軍到雒劉禪遣使奉皇帝璽綬為箋詣艾請降艾至成都禪率太子諸王及羣臣六十餘人面縳輿櫬詣軍門艾執節解縳焚櫬受而宥之檢御將士無所虜掠綏納降附使復舊業蜀人稱焉輒依鄧禹故事承制拜禪驃騎將軍太子奉車諸王駙馬都尉蜀羣司各隨髙下拜為王官或領艾官屬以師纂領益州刺史隴西太守牽𢎞等領蜀中諸郡使於綿竹築臺以為京觀用彰戰功士卒死事者皆與蜀兵同共埋藏艾深自矜伐謂蜀士大夫曰諸君賴遭某故得有今日耳若遇吳漢之徒已殄滅矣又曰薑維自一時雄兒也與某相值故窮耳有識者笑之十二月詔褒艾功即拜艾為太尉增邑二萬户封二子為亭侯各食邑千户艾言於司馬昭曰兵有先聲而後實者今因平蜀之勢以乘吳人吳人震恐此席卷之時也然大舉之後將士疲勞不可便用且徐緩之留隴右兵二萬人蜀兵二萬人煮鹽興冶為軍農要用並作舟船豫順流之事然後發使告以利害吳必歸化可不征而定也今宜厚劉禪以致孫休安士民以來遠人若便送禪於京都吳以為流徙則於向化之心不勸宜權停留須來年秋冬比爾吳亦足平以為可封禪為扶風王錫其資財供其左右郡有董卓塢為之宫室爵其子為公侯食郡內縣以顯歸命之寵開廣陵城陽以待吳人則畏威懷德望風而從矣昭遣監軍衛瓘喻艾事當須報不宜輒行艾重言曰銜命征行奉指授之策元惡既服至於承制拜假以安初附謂合權宜今蜀舉衆歸命地盡南海東接吳會宜早鎮定若待國命往復道途延引日月春秋之義大夫出疆有可以安社稷利國家專之可也今吳未賔勢與蜀連不可拘常以失事機兵法進不求名退不避罪艾雖無古人之節終不自嫌以損于國也鍾會胡烈師纂等皆白艾所作悖逆變釁已結詔書檻車徴艾艾仰天嘆曰艾忠臣也一至此乎白起之酷復見於今日矣艾父子既囚鍾會至成都先送艾然後作亂會已送艾艾本營將士追出艾檻車迎還瓘遣田續討艾遇於綿竹西斬之子忠與艾俱死餘子在洛陽者悉誅徙艾妻子及孫於西城初艾當伐蜀夢在山上而有流水以問殄虜護軍爰邵邵曰按易卦山上有水蹇蹇繇曰蹇利西南不利東北孔子曰蹇利西南往有功也不利東北其道窮也往必克蜀殆不還乎艾憮然不樂泰始元年晉室踐阼詔曰昔太尉王淩謀廢齊王而王竟不足以守位征西將軍鄧艾矜功失節實應大辟然被書之日罷遣人衆束手受罪比於求生遂為惡者誠復不同今大赦得還若無子孫者聼使立後令祭祀不絶三年議郎段耿上疏為艾理寃其後有詔以艾嫡孫朗為郎中艾在西時修治障塞築起城塢泰始中羌虜大叛頻殺刺史涼州道斷吏民安全者皆保艾所築塢焉艾州里時輩南陽州泰亦好立功業善用兵初為荆州刺史裴潛從事司馬懿鎮宛潛數遣詣懿由此為懿所知及征孟達泰又導軍遂辟泰泰頻喪考妣祖九年居喪懿留缺待之就職三十六日擢為新城太守懿為泰會使尚書鍾繇調泰曰君釋褐登宰府三十六日擁麾蓋守兵馬郡乞兒乘小車一何駛乎泰曰誠有此君召公之子少有文采故守吏職獮猴騎士牛又何遲也衆賔咸悅後官至征虜將軍假節都督江南諸軍事景元二年薨追贈衛將軍諡壯侯鍾會字士季頴川長社人太傅繇小子也少敏惠夙成中護軍蔣濟著論謂觀其眸子足以知人會年五嵗繇遣見濟濟甚異之曰非常人也及壯有才數技藝而博學精綜名理以夜續晝由是獲聲譽正始中以為祕書郎遷尚書中書侍郎髙貴鄉公即位賜爵關內侯毌邱儉作亂大將軍司馬師東征會從典知密事衛將軍司馬昭為大軍後繼師薨於許昌昭總統六軍會謀謨帷幄時中詔勑尚書傅嘏以東南新定權留衛將軍屯許昌為內外之援令嘏率諸軍還會與嘏謀使嘏表上輒與衛將軍俱發還到雒水南屯住於是朝廷拜昭為大將軍輔政會遷黃門侍郎封東武亭侯邑三百户甘露二年徴諸葛誕為司空時會居母喪在家策誕必不從命馳白昭昭以事已施行不復追改及誕反車駕住項昭至夀春會復從行初吳大將全琮孫權之婚親重臣也琮子懌孫靜從子端翩諿等皆將兵來救誕懌兄子輝儀留建業與其家內爭訟攜其母將部曲數十家渡江自歸於昭會建策密為輝儀作書使輝儀所親信齎入城告懌等説吳中怒懌等不能拔夀春欲盡誅諸將家故逃來歸命懌等恐懼遂將所領開東城門出降皆蒙封寵城中由是乖離夀春之破會謀居多親待日隆時人謂之子房軍還遷為太僕固辭不就以中郎在大將軍府管記室事為腹心之任以討諸葛誕功進爵陳侯屢讓不受詔聼會所執以成其美遷司𨽻校尉雖在外司時政損益當世與奪無不綜典嵇康等見誅皆會謀也昭以蜀大將薑維屢擾邉陲料蜀國小民疲資力單竭欲大舉圗蜀惟會亦以為蜀可取豫共籌度地形考論事勢景元三年冬以會為鎮西將軍假節都督關中諸軍事昭勑青徐兖豫荆揚諸州並使作船又令唐咨作浮海大船外為將伐吳者四年秋乃下詔使鄧艾諸葛緒各統諸軍三萬餘人艾趣甘松沓中連綴薑維緒趣武街橋頭絶維歸路會統十餘萬衆分從斜谷駱谷入先命牙門將許儀在前治道會在後行而橋穿馬足陷於是斬儀儀許褚之子有功王室猶不原貸諸軍聞之莫不震竦蜀令諸圍皆不得戰退還漢樂二城守魏興太守劉欽趣子午谷諸軍數道平行至漢中蜀監軍王含守樂城護軍蔣斌守漢城兵各五千會使護軍荀愷前將軍李輔各統萬人愷圍漢城輔圍樂城會徑過西出陽安口遣人祭諸葛亮之墓使護軍胡烈等行前攻破關城得庫藏積榖薑維自沓中還至隂平合集士衆欲赴關城未到聞其已破退趣白水與蜀將張翼廖化等合守劒閣拒會會移檄蜀將吏士民陳稱兵勢喻使詳擇利害自求多福鄧艾追薑維到隂平簡選精鋭欲從漢德陽入江由左儋道詣綿竹趣成都與諸葛緒共行緒以本受節度邀薑維西行非本詔遂進軍向白水與會合艾遣將軍田章等從劒閣西徑出江由未至百里章先破蜀伏兵三校艾使章先登遂長驅而前會與緒軍向劒閣會欲專軍勢密白緒畏懦不進檻車徴還軍悉屬會進攻劒閣不克引退蜀軍保險拒守艾遂至綿竹大戰斬諸葛瞻維等聞瞻已破率其衆東入于巴會乃進軍至涪遣胡烈田續龎會等追維艾進軍向成都劉禪詣艾降遣使勑維等令降於會維至廣漢郪縣令兵悉放器仗送節傳於胡烈便從東道詣會降會上書言狀於是禁檢士衆不得鈔略虛已誘納以接蜀之羣司與維情好甚歡洽初夏侯霸降蜀薑維問之曰司馬懿既得彼政當復有征伐之志不霸曰彼方營立家門未遑外事有鍾士季者其人雖少終為吳蜀之憂然非非常之人亦不能用也至是十五年而會果滅蜀十二月詔褒會功就拜司徒進封縣侯增邑萬户封子二人亭侯邑各千户會內有異志因鄧艾承制專事密白艾有反狀會善效人書於劒閣要艾章表白事皆易其言令辭指悖慠於是詔書檻車徴艾司馬昭懼艾不從命勑會並進軍成都監軍衛瓘在會前行以昭手筆令宣喻艾軍艾軍皆釋仗遂收艾入檻車會所憚惟艾艾既禽而會尋至獨統大衆威震西土自謂功名蓋世不可復為人下加猛將鋭卒皆在己手遂謀反欲使薑維等皆將蜀軍出斜谷會自將大衆隨其後既至長安令騎士從陸道步兵從水道順流浮渭入河以為五日可到孟津與騎會洛陽一旦天下可定也會得昭書云恐鄧艾不就徴今遣中護軍賈充將步騎萬人徑入斜谷屯樂城吾自將十萬屯長安相見在近會得書驚呼所親語之曰但取鄧艾相國知我能獨辦之今來大重必覺我異矣便當速發事成可得天下不成退保蜀漢不失作劉備也我自淮南以來畫無遺策四海所共知也我持此欲安歸乎會以五年正月十五日至其明日悉請護軍郡守牙門騎督以上及蜀之故官為太后發哀於蜀朝堂乃矯太后遺詔使會起兵廢大將軍司馬昭皆班示坐上人使下議訖書版署置更使所親信代領諸軍所請羣官悉閉著益州諸曹屋中城門宫門皆閉嚴兵圍守會帳下督邱建本屬胡烈烈薦之司馬昭會請以自隨信愛之建愍烈獨坐啓會使聼內一親兵出取飲食諸牙門隨例各內一人烈紿語親兵及疏與其子淵曰邱建密説消息會已作大坑白棓棓與棒同數千欲悉呼外兵入人賜白幍拜為散將以次棓殺投坑中諸牙門親兵亦咸説此語一夜轉相告皆遍知或説會可盡殺牙門騎督以上會猶豫未決十八日日中烈軍兵與烈兒雷鼓出門諸軍兵不期皆鼓譟出曽無督促之者而爭先赴城時方給與薑維鎧杖白外有胸胸聲似失火有頃白兵走向城會驚謂維曰兵來似欲作惡當云何維曰但當擊之耳會遣兵悉殺所閉諸牙門那守內人共舉機以柱門兵斫門不得破須臾門外倚梯登城或燒城屋蟻附亂進矢下如雨牙門郡守各緣屋出與其卒兵相得薑維率會左右戰手殺五六人衆既格斬維爭赴殺會會時年四十將士死者數百人初艾為太尉會為司徒皆持節都督諸軍如故咸未受命而斃會兄育以四年冬薨會竟未知問會兄子雍隨會與俱死會所養兄子毅及逡辿勑連反等下獄當伏誅司馬昭表天子下詔以繇育之勳特原逡辿兄弟惟毅及雍息伏法或曰育曽密啓昭言會挾術難保不可專任故宥逡等云始昭欲遣會伐吳西曹屬邵悌求見曰今遣鍾會率十餘萬衆伐蜀愚謂會單身無重任不若使餘人行昭笑曰我寧當復不知此邪蜀為天下患使民不得安息我今伐之如指掌耳而衆人皆言蜀不可伐夫人心豫怯則智勇並竭智勇竭而強使之適為敵禽耳惟會與人意同今遣會伐蜀蜀必可滅滅蜀之後就如卿所慮當何所能一辨邪凡敗軍之將不可以語勇亡國之大夫不可與圗存心膽以破故也若蜀以破遺民震懼恐不足與圗事中國將士各自思歸不肯與同也若作惡祗自滅族耳卿不須憂此慎莫使人聞也及會白鄧艾不軌昭將西行悌復曰鍾會所統五六倍於鄧艾但可勑會取艾不足自行昭曰卿忘前時所言邪而更云可不須行乎雖爾此言不可宣也我要自當以信意待人但人不當負我我豈可先人生心哉近日賈護軍問我言頗疑鍾會不我答言如今遣卿行寧可疑卿邪賈亦無以易我語也我到長安則自了矣軍至長安會果已死咸如所策會常論易無互體才性同異及會死後於會家得書二十篇名曰道論而實刑名家也其文似會初會弱冠與山陽王弼並知名弼字輔嗣幼而察慧年十餘好老氏通辨能言父業為尚書郎時裴徽為吏部郎弼未弱冠往造焉徽一見而異之問弼曰夫無者誠萬物之所資也然聖人莫肯致言而老子申之無已者何弼曰聖人體無無又不可以訓故不説也老子是有者也故恆言無所不足尋亦為傳嘏所知于時何晏為吏部尚書甚竒弼歎之曰仲尼稱後生可畏若斯人者可與言天人之際乎正始中黃門侍郎纍缺晏既用賈充裴秀朱整又議用弼時丁謐與晏爭衡致髙邑王黎於曹爽爽用黎於是以弼補臺郎初除覲爽請間爽為屏左右而弼與論道移時無所他及爽以此嗤之時爽專朝政黨與共相進用弼通俊不治名髙尋黎無幾時病亡爽用王沈代黎弼遂不得在門下晏為之歎恨弼在臺既淺事功亦雅非所長益不留意焉淮南人劉陶善論縱橫為當時所推每與弼語常屈弼弼天才卓出當其所得莫能奪也性和理樂遊晏解音律善投壺其論道賦會文辭不如何晏自然有所拔得多晏也頗以所長笑人故時為士君子所疾弼與會善會論議以校練為家然每服弼之髙致弼注易潁川人荀融難弼大衍義弼以書答其意頗譏戲之弼又注老子為之指略及著道略論其注易往往有髙麗言太原王濟好談病老莊常云見弼易注所悟者多然弼為人淺而不識物情初與王黎荀融善黎奪其黃門侍郎於是恨黎與融亦不終正始十年曹爽廢以公事免其秋遇癘疾亡時年二十四無子絶嗣弼之卒也司馬師聞之嗟嘆者纍日其為髙識所歎如此通志卷一百十七
