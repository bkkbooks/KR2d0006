body:
  text: 通志卷一百六十三宋右迪功郎鄭樵漁仲撰列傳第七十六隋假文振弟文操來護兒樊子蓋周羅㬋周法尚衛元劉權李景薛世雄裴政李諤鮑宏高構陸知命杜整梁毗柳彧趙綽榮毗兄建緒劉行本閻毗郎茂柳莊李孝貞杜臺卿崔賾陸爽侯白崔仲方崔彭辛德源杜正元弟正藏柳昻張乾威弟乾雄李騊駼弟政藻假文振北海期原人也祖壽魏滄州刺史父威周洮河甘渭四州刺史文振少有膂力膽智過人性剛直眀逹世務初為周冡宰宇文護親信護知其有器局幹用擢授中外府兵曹後從周武攻齊海昌王尉相貴於晉州其亞將侯子欽崔景嵩為內應文振杖槊登城與崔仲方等數十人先登城文振隨景嵩至相貴所拔佩刀劫之相貴不敢動城遂下帝大喜賜物千假進拔高壁等三城及攻并州陷東門而入齊安德王延宗懼而出降録前後功將拜柱國以譖毁獲譴因授上儀同賜爵襄國縣公進平鄴都又賜綺羅二千假後從滕王逌擊稽胡破之又以天官都上士從韋孝寬經略河南俄而尉遲迥作亂時文振老母妻子俱在鄴城迥遣人誘之文振不顧歸於高祖高祖引為丞相掾領宿衛司馬消難之奔陳高祖令文振安集淮南還除衛尉少卿兼內史侍郎尋以行軍長史從逹奚震討平叛蠻加上開府遷鴻臚卿衛王爽北征突厥以文振為長史坐勳簿不實免官後為石河二州刺史甚有威惠遷蘭州總管改封龍岡縣公突厥犯塞以行軍總管擊破之遂北至居延塞開皇九年大舉伐陳為元帥秦王司馬别鎮行軍總管及平江南授揚州總管司馬轉并州總管司馬以母憂去職後拜雲州總管遷太僕卿十九年突厥犯塞以行軍總管破逹頭可汗於沃野文振先與王世積有舊初文振北征世積遺以駝馬比還世積以罪誅文振坐與交關功遂不録後平越嶲叛蠻賜奴婢二百口仁壽初嘉州獠反文振以行軍總管討之引軍山谷間為賊所襲遂大敗文振復收散兵竟破之文振性素剛直無所降下初軍次益州謁蜀王秀貌頗不恭秀甚銜之及此奏文振師徒喪亂右僕射蘇威與文振有隙因譖之坐是除名及秀廢黜文振上表自申帝慰諭之授大將軍拜靈州總管煬帝即位徴為兵部尚書待遇甚重從征吐谷渾文振督兵屯雪山連營三百餘里東接楊義臣西連張壽合圍吐谷渾主於覆袁山以功進右光祿大夫帝幸江南以文振行江都郡事文振見高祖時容納突厥啓民居於塞內妻以公主賞賜重疊及大業初恩澤彌厚恐為國患乃上表引晉劉曜梁侯景為戒請以時喻遣令出塞外然後明設烽候緣邊鎮防務令嚴重此乃萬世之良策時兵部侍郎斛斯政專掌兵事文振知政險薄不可委以機要屢言於帝帝並弗納及遼東之役授左候衛大將軍出南蘇道在軍疾篤上表以遼東小醜未服嚴刑但夷狄多詐深須防禦口陳降欵心懷背叛詭伏多端勿得便受水潦方降不可淹遲惟願嚴勒諸軍星馳速發則平壤孤城勢可拔也若傾其本根餘城自尅如不時定脫遇秋霖深為艱弊兵糧又竭強敵在前靺鞨在後遲疑不決非上策也卒於師帝省表悲歎久之贈光祿大夫尚書右僕射北平公諡曰襄長子銓位虎牙郎將次子綸少以俠氣聞文振弟文操大業中為虎賁郎將性甚剛嚴帝令督祕書省學士時學士頗存儒雅文操輒鞭撻之前後或至千數時議者譏之來護兒字崇善本南陽新野人漢中郎將歙十八世孫也曾祖成魏新野縣侯後歸梁徙居廣陵因家焉位終六合令祖嶷步兵校尉秦郡太守長寧縣侯父法敏仕陳終於海陵令護兒未識而孤養於世母吳氏吳氏提攜鞠養甚有慈訓幼而卓犖初讀詩至擊鼓其鏜踊躍用兵羔裘豹飾孔武有力因舍書歎曰大丈夫在世當如是會當為國滅賊以取功名安能區區久事筆硯也羣輩驚其言而壯其志及長雄略秀出志氣英遠涉獵書史不為章句學始侯景之亂護兒世父為鄉人陶武子所害吳氏每流涕為護兒言之武子宗族數百家厚自封植護兒每思復怨因其有婚禮乃約客數人直入其家引武子斬之賔客皆懾不敢動乃以其頭祭伯父墓因潛伏歲餘會周師定河南乃歸鄉里所住白土村地居疆場數見軍旅護兒常慨然有立功名之志及開皇初宇文欣賀若弼等鎮廣陵並深相禮重除大都督領本鄉兵破陳將曾永以功授儀同三司平陳之役護兒有功焉進位上開府賞物一千假十一年高智慧據江南反以總管統兵隨楊素討之賊據浙江岸為營周亘百餘里船艦被江鼓譟而進護兒言於素曰吳人輕鋭利在舟楫必死之賊難與爭鋒公且嚴陳以待之勿與接刃請假奇兵數千潛渡江掩破其壘使退無所歸進不得戰此韓信破趙之策也素以為然護兒乃以輕舸數百直登江岸襲破其營因縱火煙焰張天賊顧火而懼素因是動一鼓破之智慧將逃於海護兒追至閩中餘黨皆平進位大將軍除泉州刺史封建陽縣公食邑一千户賜物二千假奴婢百人護兒以賊初附威惠兼舉璽書勞問前後相屬時智慧逆黨盛道延阻兵為亂護兒又討平之遷建州總管又與蒲陽守孝寬討平黟歙逆黨軍還遂進位柱國封永寧郡公高祖嘉其功使畫工圗其像以進十八年詔追入朝賜以宮女寶刀駿馬錦純各等物賜其子楷為千牛備身使護兒還職仁壽初遷瀛州刺史以善政聞頻見勞勉煬帝嗣位被追入朝百姓攀戀纍日不能出境詣闕上書致請者前後數百人帝謂曰昔國步未康卿為名將今天下無事又為良二千石可謂兼美矣仍除右驍衛大將軍尋遷左又改上柱國為光祿大夫右翊衛大將軍進封榮國公恩禮隆密朝臣無比大業六年車駕幸江都謂護兒曰衣錦晝逰古人所重今卿是也乃賜物二千假并牛酒令謁先人墓宴鄉里父老仍令三品已上並集其宅酣飲盡日朝野榮之遼東之役以護兒為平壤道行軍總管兼檢校東萊郡太守率樓船指滄海入自浿水去平壤六十里高麗王高元掃境內兵以拒之列陳數十里諸將咸懼護兒笑謂副將周法尚及軍吏曰吾本謂其堅城清野以待王師今來送死當殄之而朝食高元弟建驍勇絶倫率敢死數百人來致師護兒命虎賁郎將費靑奴及第六子左千牛整馳斬其首乃縱兵追奔直至城下俘斬不可勝計因破其郛營於城外以待諸軍高麗晝閉城門不敢出會宇文述等衆軍皆敗乃旋軍以功賜物五千假以第五子𢎞為杜城府鷹揚郎將以先封襄陽公賜其子整明年又出滄海道師次東萊會楊元感反進攻洛陽護兒聞之召禆將周法尚等議旋軍討逆法尚等咸以無勑不宜擅還再三固執不從護兒厲聲曰洛陽被圍心腹之疾高麗逆命猶疥癬耳公家之事知無不為專擅在吾不關諸人也有沮議者軍法從事即日回軍令子𢎞及整馳驛奏聞帝見𢎞等甚悅曰汝父擅赴國難乃誠臣也授𢎞通議大夫整公路府鷹揚郎將乃降璽書於護兒曰公旋師之時是朕勑公之日君臣意合逺同符契梟此元惡期在不逺勒名太常非公而誰也於是護兒與宇文述破元感於閿鄉斬平之還加開府儀同三司賜物五千假黃金千兩奴婢百人贈父法敏東陽郡太守永寧縣公十一年又率師渡海破高麗奢卑等二城高麗舉國來戰護兒大破之將趣平壤高元震懼使執叛臣斛斯政詣遼東城下請降帝許之詔護兒旋軍護兒集衆軍謂曰三度出兵未能平賊此還也不可重來今高麗困弊野無靑草以我衆戰不日尅之吾欲進兵徑圍平壤取其偽主獻捷而歸也於是拜表請行不肯奉詔長史崔君肅固爭之以為不可護兒曰賊勢破矣吾在閫外事合專決寧征得髙元還而獲譴捨此成功所不能矣君肅告衆曰若從元帥違拒詔書必當奏聞諸將懼乃同勸還師方始奉詔及帝於鴈門為突厥所圍將選精騎潰圍而出護兒及樊子蓋並固諫乃止十二年駕幸江都護兒諫曰自皇家受命將四十年薄賦輕徭户口滋殖陛下以高麗逆命稍興軍旅百姓無知易為咨怨在外羣盜往往聚結車駕遊幸深恐非宜伏願駐駕洛陽與時休息出師命將掃除羣醜上稟聖算即日尅除陛下今幸江都是臣衣錦之地臣荷恩深重不敢專為身謀帝聞之厲色而起數日不得見後怒解方被引入謂曰公意乃爾朕復何望護兒因不敢言尋代宇文述為左翊衛大將軍及宇文化及搆逆深忌之是日旦將朝見執護兒曰陛下今何在左右曰今被執矣護兒歎曰吾備位大臣荷國重任不能肅清凶逆遂令王室至此抱恨泉壤知復何言乃遇害護兒重然諾敦交契廉於財利不事産業至於行軍用兵特多謀算每覽兵法曰此亦豈異人意也善撫士卒部分嚴明故咸得其死力子十二人楷通議大夫𢎞金紫光祿大夫整左光祿大夫整尤驍勇善撫御討擊羣盜所向皆捷諸賊歌曰長白山頭百戰場十十五五把長鎗不畏官軍千萬衆只怕榮公第六郎至是並遇禍子姪死者十人惟少子恆濟二人免樊子蓋字華宗廬江人也祖道則梁越州刺史父儒侯景之亂奔於齊官至仁州刺史子蓋仕齊位東海北陳二郡太守員外散騎常侍封富陽縣侯周武帝平齊授儀同三司郢州刺史高祖受禪以儀同領鄉兵後除樅陽太守平陳之役以功加上開府改封上蔡縣伯歷辰嵩齊三州刺史轉循州總管許以便宜行事十八年入朝奏嶺南地圖賜以良馬雜物加統四州令還任所遣光祿少卿柳謇之餞於灞上煬帝即位徵還京師轉涼州刺史子蓋言於帝曰臣一居嶺表十載於兹犬馬之情不勝戀戀願趨闕庭萬死無恨帝慰喻遣之授銀青光祿大夫武威太守以善政聞大業三年入朝帝下詔美之進位金紫光祿大夫五年車駕西巡將入吐谷渾子蓋以彼多瘴氣獻青木香以禦霧露及帝還謂之曰人道公清定如此不子蓋謝曰臣安敢言清止是小心不納賄耳下詔奬勵加右光祿大夫賜縑千匹粟麥二千斛子蓋又自陳曰臣自南裔即適西垂常為外臣未居內職不得陪屬車奉丹陛溘死邊城沒有遺恨惟陛下察之帝曰公侍朕側一人而已委以西方則萬人之敵宜識此心六年帝避暑隴川宮又云欲幸河西子蓋傾望鸞輿願巡郡境帝知之下詔慰勉之是嵗朝於江都宮帝謂之曰富貴不還故鄉真衣繡夜行耳因勑廬江郡設三千人會仍賜米麥六千石使謁墳墓宴故老當時榮之還除吏部尚書時處羅可汗及高昌王欵塞復以子蓋檢校武威太守應接二蕃遼東之役攝左武威將軍出長岑道後以宿衛不行加左光祿大夫其年帝還東都使子蓋為涿郡留守九年駕復幸遼東命子蓋為東都留守屬楊元感作逆來逼王城子蓋遣河南贊治裴宏策逆擊之反為所敗遂斬宏策以徇國子祭酒楊汪小不恭子蓋又將斬之汪拜謝頓首流血久乃釋免於是三軍莫不戰栗將吏無敢仰視元感每盡鋭攻城子蓋徐設備禦至輒摧破會來護兒等救至乃解去子蓋凡所誅殺數萬人又檢校河南內史車駕至高陽追詣行在所帝勞之曰昔高祖留蕭何於關中光武委寇恂以河內公其人也進位光祿大夫封建安侯賜女樂五十人帝謂曰朕遣越王留守東都示以皇枝盤石社稷大事終以委公特宜持重戈甲五百人而後出此亦勇夫重關之義無賴不軌者便誅鋤之凡可施行無勞形迹今為公别造玉麟符以代銅虎又指越代二王曰今以二孫委公與衛元耳宜選貞良宿德有方幅者教習之於是賜以良田甲第十年駕還東都帝謂子蓋曰元感之反神明故以彰公赤心耳析圭進爵宜有令謨是日進爵為濟公言其功濟天下特為立名無此郡國也後與蘇威宇文述陪宴積翠池帝親以金杯屬子蓋酒曰良算嘉謨俟公後動即以杯賜公用為永年之瑞十一年從駕汾陽宮至於鴈門車駕為突厥所圍帝欲以精騎潰圍而出子蓋諫曰萬乘之主豈宜輕脫未若守城以挫其鋭四靣徵兵可立而待且願陛下暫停遼東之役以慰衆望厚為勳格人心自奮此不足憂也帝從之後援兵至虜乃引去納言蘇威追論勳格太重宜在斟酌子蓋執奏不宜失信帝曰公欲收物情邪子蓋默然不敢對從駕還東都時絳郡賊敬槃陀柴保昌等阻兵數萬汾晉苦之詔子蓋進討于時人物殷阜子蓋善惡無所分别汾水之北村塢盡焚之百姓大駭相率為盜其有歸首者無少長悉坑之擁數萬之衆經年不能破賊有詔徵還又將兵擊宜陽城以疾卒於東京時年七十二上悲傷者久之顧謂黃門侍郎裴矩曰子蓋臨終有何語矩曰子蓋病篤惟恨鴈門之恥帝聞之嘆息令百官就弔贈開府儀同三司諡曰景會葬者萬餘人武威吏民聞其死莫不嗟痛立碑頌德子蓋無他權略在軍持重未嘗負敗臨民明察下莫敢欺然嚴酷少恩果於殺戮臨終之日見斷頭鬼前後重沓為之厲云周羅㬋字公布九江尋陽人也父法皓仕梁至南府內史臨蒸縣侯羅㬋年十五善騎射好鷹狗任俠放蕩收聚亡命隂習兵書從祖景彥誡之曰吾世恭謹汝獨放縱難以保家若不喪身必將滅吾族羅㬋終不改陳宣帝時為句容令以軍功授開逺將軍從大都督吳明徹與齊師戰於江陽流矢中其左目齊師之圍明徹於宿預也諸軍相顧莫有鬭志羅㬋躍馬突進莫不披靡太僕卿蕭摩訶從而助之斬獲不可勝計進師徐州與周將梁士彥戰於彭城摩訶臨陳墜馬羅㬋進救之拔摩訶於重圍之內勇冠三軍明徹之敗也羅㬋全其軍而退十五年都督霍州諸軍事平山澤十五洞纍遷右軍將軍封始安縣伯檢校揚州中外諸軍事賜金銀三千兩盡散之將士分賞驍雄陳宣帝深歎美之出為晉陵太守進爵為侯後除使持節都督豫章十郡諸軍事豫章內史獄訟庭決不關吏手民懷其惠立碑頌德焉至德中除持節都督四川諸軍事江州司馬吳世興密奏羅㬋深得民心擁衆嶺表意在難測陳主惑焉蕭摩訶魯廣逹等保明之外有知者或勸其反羅㬋拒絶之還除太子左衛率信任愈重時參宴席陳主曰周左率武將詩每前成文士何為後也都官尚書孔範對曰周羅㬋執筆裁詩還如上馬入陳不在人後自是益見親禮及晉王之伐陳也羅㬋都督巴峽緣江諸軍事以拒秦王俊軍不得度相持逾月遇丹陽陷陳主被擒上江猶未下晉王遣陳主手書命之羅㬋與諸將大臨三日放散兵士然後乃降高祖慰諭之許以富貴羅㬋垂泣而對曰荷陳氏厚遇本朝淪亡無節可紀陛下所賜獲全為幸富貴榮祿非臣所望上深器之賀若弼謂之曰聞公郢漢捉兵即知揚州可得王師利涉果如所量羅㬋答曰若得與公周旋勝負未可知也其年秋拜上儀同三司鼓吹羽儀送之于宅先是陳禆將羊翔歸降使為鄉導位至上開府班在羅㬋上韓擒虎於朝堂戲之曰不知機變位在羊翔之下能無愧乎羅㬋曰昔在江南久承令問謂公天下節士今日所言殊匪誠臣之論擒虎有愧色六年冬除豳涇二州刺史並有能名開皇十八年征遼東徵為水軍總管自東萊泛海趣平壤城遭風船多漂沒無功而還十九年突厥逹頭可汗犯塞從楊素致討羅㬋先登大破之進大將軍仁壽元年入為東宫右虞候率賜爵義寧郡公轉右衛率煬帝即位授右武候大將軍副楊素討平漢王諒進授上大將軍其年冬陳主卒羅㬋請一臨哭帝許之縗絰送至墓所葬還釋服而後入朝帝甚嘉尚之世論稱其有禮時漢王諒餘黨據晉絳呂三州未下詔羅㬋行晉絳呂三州諸軍進兵圍之為流矢所中卒年六十四送柩還京行數里無故輿馬自止策之不動有飄風旋繞焉絳州長史郭雅稽顙呪曰公恨小冦未平邪尋即除殄無復戀恨於是風靜馬行見者莫不悲嘆其年七月子仲隱夢羅㬋曰我明日當戰其靈坐所有弓箭刀劒無故自動若人帶持之狀絳州陷是其日也贈柱國右翊衛大將軍諡曰壯子仲安位上開府周法尚字道邁汝南安成人也祖靈起梁廬桂二州刺史父炅定州刺史平北將軍法尚少果徑有風概好讀兵書其父卒後監定州事督父本兵數有戰功為散騎常侍遷貞毅將軍領齊昌郡事封山隂縣侯既而以其兄武昌縣公法僧代為定州刺史法尚與長沙王叔堅不相能叔堅言其將反陳宣帝執禁法僧發兵欲取法尚其下將吏皆勸之歸北法尚猶豫未決長史殷文則曰樂毅所以辭燕良不獲已請早裁之法尚乃歸周周宣帝拜順州刺史封歸義縣公賜良馬五匹女妓六人綵物五百假加以金帶陳將樊猛濟江討之法尚遣部曲督韓朗詐為背己奔陳偽告猛曰法尚步兵不願降北若得軍來必無鬭者猛引師急進法尚設奇兵大敗之猛僅以身免高祖為丞相司馬消難作亂隂遣上開府假珣攻圍之外無救援法尚棄城走消難虜其母弟及家纍三百人歸陳及高祖受禪拜巴州刺史破三鴉叛蠻復從柱國王誼擊走陳寇遷衡州總管改封譙郡公後上幸洛陽召之賜金鈿酒鍾一雙綵五百假良馬十五匹奴婢三百口給鼓吹一部法尚固辭上曰公有大功於國特給鼓吹者欲公卿知朕之寵公也轉黃州總管使經略江南伺候動靜及伐陳之役以行軍總管𨽻秦孝王出於樊口大破陳師轉鄂州刺史遷永州總管安集嶺南仍給黃州兵三千五百人為帳內前後賞賜甚厚陳桂州南康衡州陽山定州相繼降又平諸山蠻十年轉桂州總管仍為嶺南安撫大使後數年入朝以本官宿衛未幾桂州人李光仕反令法尚與上柱國王世積討之法尚發嶺南兵世積徵嶺北軍俱會尹州世積所部多遇瘴不能進頓於衡州法尚獨討之捕得其弟光略光度追斬光仕平之仁壽中遂州獠反復以行軍總管討平之嶲州烏蠻反詔法尚便道討擊破之軍還檢校潞州事煬帝嗣位轉雲州刺史遷定襄太守進金紫光祿大夫時帝幸榆州法尚朝于行宮內史令元壽言於帝曰漢武出塞旌旗千里今御營之衆請分為二十四軍自别遣一軍發相去三十里旗幟相望鉦鼓相聞首尾連注千里不絶此亦出師之盛者也法尚曰不然兵亘千里動間山川卒有不虞四分五裂腹心有事首尾未知道阻且長難以相救雖是故事此乃取敗之道也帝不懌曰卿意以為何如法尚曰給為方陳四靣外拒六宮百官家口並住其間若有變起當頭分抗內引竒兵出外奮擊車為壘壁重設鈎陳此與據城理亦何異若戰而捷抽騎追奔或戰不利屯營自守萬全之䇿也帝曰善因拜左武衛將軍明年黔安夷向思多反殺將軍鹿願圍太守蕭造法尚與將軍李景分路討之法尚破思多於清江及還從討吐谷渾别出松州道逐捕亡散至于青海出為敦煌太守遷會寧太守遼東之役以舟師指朝鮮道會楊元感反與宇文述來護兒等破之以功進授右光祿大夫時齊郡人王薄孟讓等為盜保長白山法尚頻擊破之明年復臨滄海在軍疾甚謂長史崔君書曰吾再臨滄海未能利涉時不我與將辭人世立志不果命也如何言畢而終贈武衛大將軍諡曰僖有子六人紹範最知名衛元字文升河南洛陽人也祖悅魏司農卿父檦侍中左武衛大將軍元少有器識周武帝在藩引為記室遷給事上士襲爵興勢公武帝親總萬機拜益州總管長史賜以萬釘寶帶稍遷開府儀同三司太府中大夫攝內史事仍領京兆尹稱為強濟高祖作相檢校熊州事及受禪遷淮州總管進封同軌郡公坐事免未幾拜嵐州刺史會起長城之役詔元監督之後為衛尉少卿仁壽初山獠作逆以元為資州刺史以鎮撫之元既到官時獠攻圍太牢鎮元單騎造其營謂羣獠曰我是刺史銜天子詔安養汝等汝等勿驚懼也諸賊莫敢動於是説以利害渠帥感悅解圍而去前後歸附十餘萬口高祖大悅賜縑二千匹除遂州總管仍令劔南安撫煬帝即位復徵為衛尉卿夷獠攀戀數百里不絶及與之訣並揮淚而去遷工部尚書後拜魏郡太守尚書如故未幾拜右候衛大將軍檢校左候衛事轉刑部尚書遼東之役檢校右禦衛大將軍帥師出增城道時諸軍多不利元獨全衆而還拜金紫光祿大夫九年駕幸遼東使元與代王侑留守京師拜為京兆內史尚書如故許以便宜從事勑代王待以師傅之禮會楊元感圍東都元率步騎七萬援之至華隂掘楊素冡焚其骸骨夷其塋域示士卒以必死既出潼關議者恐崤函有伏兵請於陜縣沿流東下直趣河陽以攻其背元曰此計非豎子所及於是尅行而進既度函谷卒如所量乃遣虎賁郎將張峻為疑兵軍於南道元以大兵直趣城北元感逆拒之且戰且行屯軍金谷於軍中掃地而祭高祖曰若社稷靈長宜令醜徒冰碎如或大運去矣幸使老臣先死辭氣激揚三軍莫不涕咽時衆寡不敵與賊頻戰不利死傷太半元感盡鋭來攻元苦戰賊稍却進屯北芒會宇文述來護兒等援兵至元感懼而西遁元遣通議大夫斛斯萬善監門直閣龎玉前鋒追之及于閿鄉與述等合擊破之車駕至高陽徵詣行在所帝勞之曰社稷之臣也使朕無西顧之憂乃下詔褒之加右光祿大夫賜以良田甲第資産巨萬還鎮京師帝謂之曰關右之任一委於公公安社稷乃安公危社稷亦危出入須有兵衛坐卧常宜自牢勇夫重關之義也今特給千兵以充侍從與樊子蓋俱賜以玉麟符以代銅虎十一年詔元安撫關中時盜賊蜂起百姓飢饉元竟不能救恤而官方壞亂貨賄公行自以年老上表乞骸骨帝遣內史舍人封德彛馳諭之曰京師國本宗廟園陵所在藉公卧以鎮之元乃止唐師入關自知不能守憂懼稱疾不知政事城陷歸于家義寧中卒年七十七子孝則位通事舍人兵部承務郎卒劉權字世略彭城豐人也祖軌齊羅州刺史權少有俠氣重然諾藏亡匿死吏不敢過門後更折節好學動循法度仕齊位行臺郎中齊亡周武帝以為假淮州刺史開皇中以車騎將軍領鄉兵後從晉王廣平陳進授開府儀同三司宋國公賀若弼甚禮之十二年拜蘇州刺史賜爵宋城縣公時江南初平權撫以恩信甚得人和煬帝嗣位拜衛尉卿進位銀青光祿大夫大業五年從征吐谷渾權出伊吾道逐賊至青海乘勝至伏俟城帝復令權過曼頭赤水置河源郡積石鎮大開屯田留鎮西境在邊五年諸羌懷附貢賦嵗入吐谷渾餘燼遠遁道路無壅徵拜司農卿加金紫光祿大夫尋為南海太守行至鄱陽會羣盜起不得進詔權召募討之權率兵遇賊不戰先乘單舸詣賊營説以利害羣盜感悅一時降附帝聞而嘉之及至南海甚有異政數嵗遇盜賊羣起羣豪多願推權為首權竟固守以拒之子世徹又密遣人齎書詣權稱四方擾亂諷令舉兵權召集佐寮對斬其使竟無異圖守之以死卒官世徹倜儻不羈頗為時人所許大業末羣雄並起世徹所至處輒見忌多拘禁之後竟為兖州賊帥徐圓朗所殺權從叔烈字子將美容儀有器局位鷹揚郎將有子德威知名於世李景字道興天水休官人也父超周應戎二州刺史景容貌竒偉膂力過人美鬚髯驍勇善射平齊之役頗有功授儀同三司後以平尉遲迥進位開府賜爵平寇縣公開皇九年以行軍總管從王世積伐陳以功進上開府及高智慧等反復以行軍總管從楊素擊之還授鄜州刺史十七年遼東之役為馬軍總管及還配事漢王高祖竒其壯武使袒而觀之曰卿相表當位極人臣尋從史萬嵗擊突厥於大斤山别路邀賊大破之後與上明公楊紀送義成公主於突厥至恆山遇突厥來寇時代州總管韓洪為虜所敗景率所領數百人力戰三日殺虜甚衆改授韓州刺史以事王故不之官仁壽中檢校代州總管漢王諒作亂景發兵拒之諒頻遣劉嵩喬鍾葵等攻之景帥士卒殊死戰屢挫賊鋒司馬馮孝慈司馬參軍吕玉並驍勇善戰儀同三司侯莫陳文多謀畫工拒守之術景推誠此三人無所關預唯在閣持重時出撫循而已及朔州總管楊義臣援兵至合擊大破之先是府內井中甃上生花如蓮并有龍見時變為鐵馬甲士又有神人長數丈見城下迹長四尺五寸景問巫者巫者曰此不祥之物來食血耳景大怒推出之旬日而兵至死者數萬景尋被徵進柱國拜右武衛大將軍賜女樂一部加以珍物景智略非所長而忠直為時所許帝甚信之又擊破叛蠻向思多明年擊吐谷渾於青海破之進位光祿大夫五年車駕南巡至天水景獻食於帝帝曰公主人也賜坐齊王暕上至隴川宮帝將大獵景與左武衛大將軍郭衍多有難色為人所奏帝大怒令㩧之竟以坐免嵗餘復位與宇文述等參掌選舉明年攻高麗武列城破之賜爵苑邱侯八年出渾彌道九年復出遼東及旋使景殿高麗追兵大至景擊走之進爵滑國公楊元感之反朝臣子弟多預焉景獨無關涉帝曰公誠直天然我梁棟也賜以美女帝每呼李大將軍而不名見重如此十二年帝令景營遼東戰具於北平賜御馬一匹名獅子􅀈于時盜賊蜂起景遂召募以備不虞虎賁郎將羅藝與景有隙誣景將反帝遣其子慰諭曰縱人言公窺天闕據京都吾無疑也後為高開道所圍獨守孤城士卒患腳腫死者十六七景撫循之一無離叛遼東軍資多在其所粟帛山積景無所私焉及帝崩於江都遼西太守鄧嵩救之遂歸柳城將還幽州遇賊見害契丹靺鞨素感其恩聞之莫不流涕幽燕人士于今傷惜之子世謨薛世雄字世英本河東汾隂人也其先寓居敦煌父回字道𢎞仕周位涇州刺史開皇初封舞隂郡公領漕渠監世雄兒童時與羣輩戲輒畫地為城郭令諸兒為攻守勢不從令者輒撻之諸兒畏憚莫不齊整其父見而奇之謂人曰此兒當興吾家年十七從周武帝平齊以功拜帥都督開皇中纍遷右親衛車騎將軍煬帝嗣位為右監門郎將從征吐谷渾進位通議大夫世雄性廉愼行軍破敵之處秋毫無犯帝由是嘉之帝常謂羣臣曰欲舉好人諸君知否咸曰不測聖心帝曰我欲舉薛世雄羣臣皆稱善於是超拜右翊衛將軍嵗餘為玉門道行軍大將軍與突厥啓民可汗連兵擊伊吾師次玉門啓民背約兵不至世雄孤軍度磧伊吾懼請降世雄世雄遂以漢舊伊吾城東築城號新伊吾留銀青光祿大夫王威鎮之而還進位正議大夫遼東之役為沃沮道軍將與宇文述同敗績於平壤還次白石山為賊所圍百餘重四面矢下如雨世雄以羸師為方陳選徑騎二百縱擊破之而還所亡失多竟坐免明年帝復征遼東拜右候衛將軍兵指踏頓道軍至烏骨城會楊元感反班師帝至柳城以世雄為東北道大使行燕郡太守鎮懷遠十年復從帝至遼東遷左禦衛大將軍仍領涿郡留守未幾李密逼東都詔世雄率幽薊精兵將擊之次河間營於城南竇建德率精鋭數百夜來襲之大敗世雄與左右數十騎遁入河間城慙恚發病歸涿郡卒子萬述萬淑萬鈞萬徹萬備並以驍勇知名裴政字德表河東聞喜人也高祖壽孫從宋武徙家於壽陽歷廬江太守祖邃父之禮並梁史有傳政幼聰明博聞強記逹於從事為當世所稱纍遷通直散騎常侍侯景之亂從王琳入建鄴政以軍功連最封夷陵侯遷給事黃門侍郎副王琳拒蕭紀破之及魏師圍荆州琳自桂州來赴難政從間道先報元帝為魏師所獲蕭察謂政曰我武皇帝之孫不可為爾君乎爾何煩殉身於七父若從我計則貴及子孫不然分腰領矣鎖之送至城下使謂元帝曰王僧辨聞臺城被圍已自為帝王琳孤弱不復能來政詐許之既而告城中曰援兵大至各思自勉吾以間使被禽當以碎身報國監者擊其口令更其語終不易辭察怒命趣行戮蔡大業諫曰此民望也若殺之則荆州不可下矣因釋之會江陵陷與城中朝士俱送於京師周文帝聞其忠授員外散騎侍郎引入相府命與盧辨依周禮建六官設公卿大夫并撰次朝儀車服器用多遵古禮革漢魏之法事並施行尋授刑部下大夫轉少司憲政明習故事又參定周律能飲酒至數斗不亂簿案盈几剖決如流用法寬平無有寃濫囚徒犯極刑者乃許其妻子入獄就之至冬將行決死者皆曰裴大夫致我於死死無所恨其處法詳平如此又善鍾律嘗與長孫紹逺論樂事在紹逺傳開皇元年轉率更令詔與蘇威等修定律令政採魏晉刑典下至齊梁沿革輕重取其折𠂻同撰著者十有餘人凡疑滯不通皆取決於政進位散騎常侍轉左庶子多所匡正見稱純慤東宮凡有大事皆以委之右庶子劉榮性甚專固時武職交番通事舍人趙元愷作辭見帳未及成太子再三催促榮令元愷口奏不須造帳及奏太子問名帳安在元愷云稟承劉榮不聽造帳太子即以詰榮榮便拒諱太子付政推問未及奏狀阿附榮者先言於太子曰政欲陷榮推事不實太子召責之政曰凡推事有兩一察情一據證審其曲直以定是非臣察榮位高任重縱實語元愷蓋亦纎芥之愆計不須諱又察元愷受制於榮豈敢以無端之言妄相點纍二人之情理正相似元愷引左衛率崔蒨等證蒨欵狀悉與元愷符同察情既敵須以證定臣謂榮語元愷非虛太子亦不罪榮而稱政正直政好面折人短而退無後言時雲定興數入侍太子為竒服異器進奉後宮又緣女寵來往無節政數切諌太子不納政謂定興曰公所為不合禮度又元妃暴薨道路籍籍此於太子非令名也願公自引退不然將及禍定興怒以告太子太子益踈政由是出為襄州總管妻子不之官所受秩俸散給寮吏民之有犯罪者隂悉知之或竟嵗不發至再三犯乃因都會時於衆中召出親案其罪五人處死流徙者甚衆合境惶懾令行禁止稱為神明爾後不修囹圄殆無爭訟卒於官年八十九著承聖實録十卷及太子廢高祖追憶之曰向遣裴政劉行本在共匡弼之猶應不令至此子南金至膳部郎學涉有文藻以輕財貴義稱李諤字士恢趙郡人也好學解屬文仕齊為中書舍人有口辨每接對陳使周平齊拜天官都上士諤見高祖有竒表深自結納及高祖為丞相甚見親待訪以得失時兵革屢動國用虛耗諤上重穀論以諷焉高祖納之及受禪歷比部考功二曹侍郎賜爵南和伯諤性公方明逹時務遷治書侍御史上謂羣臣曰朕昔為大司馬每求外職李諤陳十二策苦勸不許朕決意在內今此事業諤之力也賜物二千假諤見禮教凋弊公卿薨亡其愛妾侍婢子孫輒嫁賣之遂成風俗乃上書曰臣聞追逺愼終民德歸厚三年無改方稱為孝如聞大臣之內有父祖亡沒日月未久子孫無賴引其妓妾嫁賣取財有一於此實損風教妾雖微賤親承衣履服斬三年古今通式豈容遽禠縗絰強傅鉛華泣辭靈几之前送付他人之室凡在見者猶致傷心况人子孫能堪斯忍復有朝廷重臣位望通顯平生交舊情若弟兄及其亡殁杳同行路朝聞其死夕規其妾方便求聘以得為限無廉耻之心棄朋友之義且居家理務可移於官既不正私何能贊務上覽而嘉之五品以上妻妾不得改醮始於此也諤又以時文體尚輕薄流宕忘反上書曰臣聞古先哲王之化人也必變其視聽防其嗜欲塞其邪放之心示以淳和之路五教六行為訓人之本詩書禮易為道義之門故能家復孝慈人知禮讓正俗調風莫大於此其有上書獻賦制誄鐫銘皆以褒德序賢明勳證理茍非懲勸義不徒然降及後代風教漸落魏之三祖更尚文詞忽君人之大道好雕蟲之小技下之從上有同影響競騁文華遂成風俗江左齊梁其弊彌甚貴賤賢愚唯務吟詠遂復遺理存異尋虛逐微競一韻之竒爭一字之巧連篇纍牘不出月露之形積案盈箱唯是風雲之狀世俗以此相高朝廷據兹擢士利祿之路既開愛尚之情愈篤於是閭里童昏貴遊總丱未窺六甲先製五言至如羲皇舜禹之典伊傅周孔之説不復關心何嘗入耳以傲誕為清虛以緣情為勳績指儒素為古拙用詞賦為君子故文筆日繁其攻日亂良由棄大聖之軌謨構無用以為用也捐本逐末流遍華壤遞相師祖久而愈扇及大隋受命聖道聿興屏黜浮詞遏止華偽自非懷經抱質志道依仁不得引預縉紳參厠纓冕開皇四年普詔天下公私文翰並宜實録其年九月泗州刺史司馬幼之文表華艷付所司推罪自是公卿大臣莫不鑽仰墳索棄絶華綺擇先王之令典行大道於兹世如聞外州逺縣仍踵弊風選吏舉人未遵典則有宗黨稱孝鄉曲歸仁學必典謨交不茍合者則擯落私門不加收齒其學不稽古逐俗隨時作輕薄之篇章結朋黨而求譽則選充吏職舉送天朝蓋由縣令刺史未行風教猶挾私情不存公道臣既忝憲司職當紏察若聞風即劾恐挂網者多請勒有司普加搜訪有如此者具狀送臺諤又以當官者好自矜伐復上奏云凡如此輩具狀送臺明加罪黜以懲風軌上以諤前後所奏事頒示天下四海靡然向風深革其弊諤在職數年務存大體不尚嚴猛由是無剛謇之譽而潛有匡正之志邳公蘇威以臨道店舍乃求利之徒事業汙雜非敦本之義遂奏約遣歸農有願依舊者在所州縣録附市籍仍毁撤舊店並令遠道限以時日時逄冬寒莫敢陳訴諤因别使見其如此以農工有業各附所安逆旅之與旗亭自古非同一概即附市籍於理不可且行旅之所依託豈容一朝而廢徒為勞擾於事非宜遂專決之並令依舊使還詣闕然後奏聞高祖善之曰體國之臣當如此矣以年老出拜通州刺史甚有惠政民夷悅服卒官四子世子大方襲爵最有材器大業初判內史舍人次大體大鈞位並尚書郎鮑宏字潤身東海郯人也父機以才學知名仕梁位治書侍御史宏七嵗而孤為兄泉之所愛育年十二能屬文常和湘東王繹詩繹嗟賞不已引為中記室纍遷通直散騎侍郎江陵平歸于周明帝甚禮之引為麟趾殿學士纍遷遂伯下大夫與杜子暉聘陳謀伐齊遂出兵渡江以侵齊帝嘗問宏以取齊策宏以為先皇往日出師洛陽彼有其備每不尅捷如臣計者進兵汾潞直掩晉陽出其不虞以為上策帝從之及定山東除少御正賜爵平遙縣伯加儀同高祖作相宏奉使山南會王謙舉兵於蜀路次潼川為謙將逹奚惎所執逼送成都竟不屈節謙敗馳傳入京高祖喜之賜以金帶及受禪加開府進爵為公歷利卭二州刺史秩滿還京時有尉義臣者其父崇不從尉遲迥後復與突厥戰死上嘉之將賜姓為金氏訪及羣下宏曰昔項伯不同項羽漢高祖賜姓劉氏秦真父能死難魏武賜姓曹氏如臣愚見請賜以皇族高祖曰善因賜義臣姓楊氏後授均州刺史以目疾免卒於家年九十六初周武帝勑宏修皇室譜一部分為帝緒疏屬賜姓三篇有集十卷行於世高構字孝基北海人也性滑稽多智辨給過人好讀書工吏事仕齊歷蘭陵平原二郡太守齊滅入周武帝以為許州司馬高祖受禪轉户部侍郎時內史侍郎晉平東與兄子長茂爭嫡尚書省不能斷朝臣三議不決構斷析合理上以為能召入內殿勞之曰我聞尚書郎上應列宿觀卿才識方知古人之言信矣嫡庶者禮教之所重我讀卿判數遍詞理愜當意所不能及也賜米百石由是知名馮翊武鄉女子焦氏既啞又聾嫁之不售嘗樵採於野為人所犯而有孕遂生一男年六歲莫知其姓於是申省構判曰母不能言窮究理絶按風俗通姓有九種或氏於爵或氏所居此兒生在武鄉可以武為姓尋遷雍州司馬以明斷見稱嵗餘轉吏部侍郎號為稱職復徙雍州司馬坐事左轉盩厔令甚有能名上善之復拜雍州司馬仁壽初又為吏部侍郎以公事免煬帝立召令復位時為吏部者多以不稱去職唯構最有能名凡三為吏部侍郎前後典選之官皆出其下時人以其精好劇談頗謂輕薄然其內懷方雅為吏部尚書牛𢎞所重後以老病解職𢎞時典選凡將有所擢用輒遣人就第問其可否河東薛道衡才高當世每稱構有衡鑒所為文章必先以草呈構而後出之構有所詆訶道衡未嘗不嗟伏大業七年終於家所舉薦杜如晦房元齡等後皆自致公輔論者稱構有知人之鑒開皇中昌黎豆盧實為黃門侍郎稱為愼密河東裴術為右丞多所紏正河內士燮平原東方舉安定皇甫聿道俱為刑部並執法平允京兆韋焜為户部郎屢進讜言南陽韓則為延州長史甚有惠政此等事行遺闕皆有吏幹為當時所稱陸知命字仲通吳郡富春人也父敖陳散騎常侍知命性好學通識大體以貞介自持仕陳歷太學博士南嶽正及陳滅歸於家會高智慧等作亂于江右晉王廣鎮江都以其三吳之望召令諷諭反者以功拜儀同三司賜以田宅復用其弟恪為汧陽令知命以恪非百里才上表陳讓朝廷許之時見天下一統知命詣朝堂上表請使高麗以宣示皇風使彼君臣靣縛闕下書奏天子異之歲餘授晉寧鎮將人或言其正直者由是待詔御史臺煬帝嗣位拜治書侍御史侃然正色為百僚所憚帝甚敬之後坐事免歲餘復職時齊王􅌔頗驕縱昵近小人知命奏劾之􅌔竟得罪百寮震栗遼東之役為東􅀈道受降使者卒於師贈御史大夫杜整字皇育京兆杜陵人也祖盛魏潁川太守父闢滑州刺史整少有風概九嵗丁父憂哀毁骨立事母以孝聞及長驍勇有膂力好讀孫吳兵法魏大統末襲爵武鄉侯周文引為親信纍遷儀同三司武州刺史從武帝平齊加上儀同進爵平原縣公入為勳曹中大夫高祖為丞相進位開府及帝受禪加上開府進爵長廣郡公拜左武衛將軍開皇六年突厥犯塞詔衛王爽北伐以整為行軍總管兼元帥長史至合川無虜而還密進取陳策上善之以為行軍總管鎮襄陽卒上傷之諡曰襄子楷嗣位開府整弟肅亦有志行位北地太守梁毗字景和安定烏氏人也祖越魏涇豫洛三州刺史郃陽縣公父茂周滄兖二州刺史毗性剛謇頗有學涉仕周舉明經纍遷布憲下大夫宣政中封易陽縣子遷武藏大夫高祖受禪進爵為侯開皇初置御史官朝廷以毗鯁正拜治書侍御史名為稱職轉大興令遷雍州贊務毗既出憲司復典京邑直道而行無所回避頗失權貴心由是出為西寧州刺史改封邯鄲縣侯在州十一年先是蠻夷酋長皆服金冠以金多者為豪俊由是遞相陵奪每尋干戈邊境略無寧嵗毗患之後因諸酋長相率以金遺之於是置金坐側對之慟哭謂曰此飢不可食寒不可衣汝等以此相滅今將此來欲殺我耶一無所納悉以還之於是蠻夷感悟遂不相攻高祖聞而善之徵為散騎常侍大理卿處法平允時人稱之毗見左僕射楊素貴重擅權百寮震懾恐為國患因上封事曰竊見左僕射越國公素幸遇愈重權𫝑日隆所私皆非忠讜所進咸是親戚子弟布列兼州連縣天下無事容息姦圖四海稍虞必為禍始夫姦臣擅命有漸而來王莾資之於積年桓元基之於易世而卒殄漢祀終傾晉祚陛下若以素為阿衡臣恐其未必伊尹也帝大怒命有司禁止親自詰之毗極言曰素既擅權寵作威作福將領之處殺戮無道又言太子及蜀王罪廢之日百寮無不震栗唯素揚眉奮肘喜見顔色利國家有事以為身幸毗發言謇謇有誠亮之節高祖無以屈也乃釋之素自此榮寵漸衰但素任寄隆重多所折挫當時朝士無不懾伏莫敢有與相是非辭氣不撓者獨毗與柳彧及尚書左丞李綱而已後上不復專委於素蓋由察毗之言也煬帝即位遷刑部尚書并攝御史大夫事奏劾宇文述私役部兵帝議免述罪毗固爭因忤旨遂令張衡代為大夫毗憂憤卒帝令吏部尚書牛𢎞弔之子敬真位大理司直時煬帝欲成光祿大夫魚俱羅罪令敬真按其獄遂希旨陷之極刑未幾敬真有疾見俱羅為祟而死柳彧字幼文河東解人也七代祖卓隨晉南遷寓居襄陽父仲禮為梁將敗見囚於周復家河東彧少好學頗涉經史周大冡宰宇文護引為中外府記室久而出為寧州總管掾武帝親總萬機彧詣闕求試帝異之以為司武中士轉鄭令平齊之役帝賞從官留京者不預彧上表曰今太平告始信賞宜明酬勳報勞務先有本屠城破邑出自聖規斬將搴旗必由神略若負戈擐甲征扞劬勞至於鎮撫國家宿衛為重俱稟成算非專己能留從事同功勞須等於是留守並加泛級高祖受禪歷尚書虞部屯田二侍郎時制三品以上門皆列戟僕射高熲子𢎞德封應國公申牒請戟彧判曰僕射之子更不異居父之戟槊己列門外尊有壓卑之義子有避父之禮豈容外門既設內閣又施事竟不行熲聞而嘆服後遷治書侍御史當朝正色甚為百寮敬憚上嘉其婞直謂彧曰大丈夫當立名於世無容容而已賜錢十萬米百石時刺史多任武將類不稱職彧上表曰伏見詔書以上柱國和平子為杞州刺史其人年垂八十鐘鳴漏盡前在趙州暗於職務政由羣小賄賂公行百姓吁嗟歌謡滿道乃云老禾不早收餘種穢良田古人云耕當問奴織當問婢此言各有所能也平子弓馬武用是其所長臨民涖職非其所解如謂優老尚年自可厚賜金帛若令刺舉所損殊大臣死而後已敢不竭誠上善之平子竟免有應州刺史唐君明居母喪娶雍州長史庫狄士文之妹彧劾之曰君明忽劬勞之痛成燕爾之親冒此苴縗命彼䄖翟不義不昵春秋載其將亡無禮無儀詩人欲其遄死士文贊務神州名位通顯棄二姓之重匹違六禮之軌儀請禁錮終身以懲風俗二家竟坐得罪隋承衰亂之後風俗頺壞彧多所矯正上甚嘉之又見上勤於聽受百寮奏請多有煩碎因上疏諫曰人君出令誡在煩數是以舜任五臣堯咨四嶽設官分職各有司存垂拱無為天下以乂所謂勞於求賢逸於任使比見事無大小咸關聖聽陛下留心政道無憚疲勞至乃營造細小之事出給輕微之物一日之內酬答百司至乃日旰忘食分夜未寢動以文簿憂勞聖躬伏願思臣至言少減煩務上覽而嘉之以其家貧勑有司與之築宅因曰栁彧正直之士國之龜寶也其見重如此右僕射楊素當塗貴顯百寮懾憚無敢忤者常以小譴勑送南臺素恃貴坐彧牀彧從外來見素如此乃於階下端笏整容謂素曰奉勑治公之罪素遂下彧據案而坐立素於庭辨詰事狀素由是銜之彧時方為上所信任故素未有以中之彧見近代以來都邑百姓每至正月十五日作角抵戲遞相誇競至於糜費財力上奏請禁絶之曰竊見京邑爰及外州每以正月望夜充街塞陌鳴鼓聒天燎炬照地人戴獸面男為女服倡優雜伎詭狀異形外內共觀曽不相避竭資破産競此一時盡室并奴無問貴賤男女混雜緇素不分穢行因此而生盜賊由斯而起非益於化實損於人請頒天下並即禁斷詔可其奏是嵗持節巡河北五十二州奏免長吏贓汙不稱職者二百餘人州縣肅然莫不震懼上嘉之賜絹布二百匹氈三十領拜儀同三司嵗餘加員外散騎常侍仁夀初持節巡行太原十九州及還賜絹百五十匹彧嘗得博陵李文博所撰政道論十卷蜀王秀遣人求之彧送之於秀秀復彧奴婢十口及秀得罪楊素奏彧以內臣交通諸侯除名配戍懷逺鎮行逹高陽有詔徵還至晉陽遇漢王諒作亂遣使馳召彧入城而諒反形已露彧入城度不得免遂詐中惡不食自稱危篤諒怒囚之及諒敗楊素奏彧心懷兩端以候事變迹雖不反心實同逆坐徙敦煌素卒乃自申理有詔徵還卒於道有子紹為介休令趙綽字士倬河東人也性質直剛毅周初為天官府史以恭謹恪勤擢授夏官府下士稍以明幹見知為內史中士父艱去職哀毁骨立世稱其孝高祖為丞相知其清正引為録事參軍遷掌朝大夫從行軍總管是云暉擊叛蠻以功拜儀同高祖受禪授大理丞處法平允考職連最歷大理正尚書都官侍郎每有奏讞正色侃然上嘉之漸見親重上以盜賊不禁將重其法綽進諫曰陛下行堯舜之道多有寬宥况律者天下之大信其可失乎上欣然納之因謂曰若更有聞見宜數言之遷大理少卿故陳將蕭摩訶其子世略在江南作亂摩訶當從坐上曰世略年二十亦何能為以其名將之子為人所逼耳因赦摩訶綽固諫不可上不能奪欲待綽去而赦之因命綽退食綽曰臣奏獄未決不敢退朝上曰大理其為朕特放摩訶也因命左右釋之刑部侍郎辛亶嘗衣緋禈俗云利於官上以為壓蠱將斬之綽曰據法不當死臣不敢奉詔上怒甚謂綽曰卿惜辛亶而不自惜也命左僕射高熲將綽斬之綽曰陛下寧可殺臣不可殺亶至朝堂解衣當斬上使人謂綽曰竟如何對曰執法一心不敢惜死上拂衣而入良久乃釋之明日謝綽勞勉之賜物二百假時上禁行惡錢有二人在市以惡錢易好者武候執以聞上令悉斬之綽進諫曰此人坐當杖殺之非法上曰不關卿事綽曰陛下不以臣愚暗置在法司欲妄殺人豈得不關臣事上曰撼大木不動者當退對曰臣望感天心何論動木上復曰啜羮者熱則置之天子之威欲相挫邪綽拜而益前訶之不肯退治書侍御史柳彧上表切諫上乃止上以綽有誠直心每呼入閣中或遇上與皇后同榻即呼綽坐評論得失前後賞賜以萬計後進位開府贈其父為蔡州刺史時河東薛胄為大理卿俱名平恕然胄斷獄以情而綽守法俱為稱職上每謂綽曰朕於卿無所愛惜但卿骨相不當貴耳仁壽中卒官上為之流涕遣使弔祭鴻臚監護喪事二子元方元襲榮毗字子諶北平無終人也父權位兵部尚書毗少剛鯁有局量涉獵羣書仕周為內史下士開皇中纍遷殿中局監時以華隂多盜賊妙選長吏楊素薦毗為華州刺史世號為能素之田宅多在華隂左右放縱毗以法繩之無所寬假毗因朝集素謂之曰素之舉卿適以自罰也毗答曰奉法一心者但恐纍公所舉素笑曰前者戲言卿之奉法素所望也時晉王在揚州每令人密覘京師消息遣張衡於道次往往置馬坊以畜牧為辭實給私人也州縣莫敢違毗獨遏絶其事上聞而嘉之賚絹百匹轉蒲州司馬漢王諒之反也河東豪傑以城應諒刺史邱和覺變遁歸關中長史渤海高義明謂毗曰河東國之東門若失之則為難不細城中雖復胸胸非悉反也但收桀黠者十餘人斬之自當立定耳毗然之義明馳馬追和將與協計至城西門為反者所殺毗亦被執及諒平拜治書侍御史帝謂之曰今日之舉馬坊之事也無改汝心帝亦敬之毗在朝侃然正色為百寮所憚後以母憂去職嵗餘起令視事尋卒官贈鴻臚少卿毗兄建緒性甚諒直兼有學業仕周為載師下大夫儀同三司及平齊之始留鎮鄴城因著齊紀三十卷建緒與高祖有舊及為丞相加位開府拜息州刺史將之官高祖隂有禪代之計因謂建緒曰且躊躇當共取富貴耳建緒自以周之大夫因義形於色曰明公此旨非僕所聞高祖不悅建緒遂行開皇初來朝上謂之曰卿亦悔否建緒稽首曰臣位非徐廣情類楊彪上笑曰朕雖不解書語亦知卿此言不遜也歷始洪二州刺史俱有能名劉行本沛人也父瓌仕梁歷職清顯行本起家梁武陵王國常侍遇蕭修以梁州北附遂與叔父璠歸周寓居新豐每以諷讀為事精力忘疲雖衣食乏絶晏如也性剛烈有不可奪之志周大冡宰宇文護引為中外府記室武帝親總萬機轉御中正士兼領起居注纍遷掌朝下大夫周代故事天子臨軒掌朝典筆硯持至御座則承御大夫取以進之及行本為掌朝將進筆於帝承御復欲取之行本抗聲謂承御曰筆不可得帝驚視問之行本曰臣聞設官分職各有司存臣既不得佩承御刀承御亦焉得取臣筆帝曰然因令二司各行所職及宣帝嗣位多失德行本切諫忤旨出為河內太守及尉遲迥作亂攻懷州行本率吏民拒之拜儀同賜爵文安縣子高祖踐祚拜黃門侍郎上嘗怒一郎於殿前笞之行本進曰此人素清其過又小願陛下少寬假之上不顧行本於是正當上前曰陛下不以臣不肖置臣左右臣言若是陛下安得不聽臣言若非當致之於理以明國法豈得輕臣而不顧也臣所言非私因置笏於地而退上斂容謝之遂原所笞者時天下大同四夷內附行本以黨項羌密邇封域最為後服上表劾其使者曰臣聞南蠻遵校尉之統西域仰都護之威比見西羌鼠竊狗盜不父不子無君無臣異類殊方於斯為下不悟羈縻之惠詎知含養之恩狼戾為心獨乖正朔使人近至請付推科上竒其志雍州别駕元肇言於上曰有一州吏受人餽錢二百文律合杖一百然臣下車之始與其為約此吏故違請加徒一年行本駮之曰律令之明蓋發明詔令肇乃敢重其教命輕忽憲章虧法取威非人臣之禮上嘉之賜絹百匹拜太子左庶子領治書侍御史如故皇太子虛襟敬憚時唐令則亦為庶子太子昵狎之每令以絃歌教內人行本責之曰庶子當匡太子以正道何有嬖昵房帷之間哉令則甚慙而不能改時沛國劉臻平原明克讓魏郡陸爽等並以文學為太子所親行本怒其不能調護每謂三人曰卿等正解讀書耳時左衛率長史夏侯福為太子所昵嘗於閣內與太子戲福大笑聲聞於外行本時在閣下聞之待其出數之曰汝何物小人敢為褻慢因付執法者推之太子為請乃釋之太子嘗得良馬令福乘而觀之太子甚悅因欲令行本復乘行本正色曰至尊置臣於庶子之位者欲輔導殿下以正道非為殿下弄臣太子慙而止復以本官領大興令權貴憚其方正無敢至其門者由是請託路絶吏民懷之未幾卒官上甚傷惜之及太子廢上曰嗟夫若使劉行本在勇當不及此乎行本無子閻毗榆林盛樂人父慶周上柱國自有傳毗七嵗襲爵石保縣公及長儀貌矜嚴頗好經史受漢書於蕭該略通大旨能篆書工草𨽻尢善畫為當時之妙周武帝見而悅之命尚清都公主宣帝即位拜儀同三司高祖受禪以伎藝侍東宮數以雕麗之物取悅於皇太子由是甚見親待每稱之於上尋拜車騎宿衛東宮上嘗遣高熲大閲於龍臺澤諸軍步伍多不齊整唯毗一軍法制肅然熲言之於上特蒙賜帛俄兼太子宗衛率長史尋加上儀同太子服玩之物多毗所為及太子廢毗坐杖一百與妻子俱配為官奴婢後二嵗放免為民煬帝即位盛修車器以毗性巧諳練舊事詔典其職尋授朝請郎毗立議輦輅車輿多所增損擢拜起部郎帝嘗大備法駕嫌屬車太多顧謂毗曰開皇之初屬車十有二乘於事亦得今八十一乘以牛駕車不足以益文物朕欲減之從何為可毗曰臣初定數共宇文愷參詳故實據漢胡伯始蔡雍等議屬車八十一乘此始於秦遂為後式故張衡賦云屬車九九是也次及法駕三分減一為三十六乘此漢制也又據宋孝建初有司奏議晉遷江左惟設五乘尚書令建平王宏曰八十一乘義兼九國三十六乘無所準憑江左五乘儉不中禮但帝王文物旗旒之數爰及冕玉皆同十二今宜準此設十二乘開皇平陳因以為法今憲章往古大駕依秦法駕依漢小駕依宋以為差等帝曰何用秦法乎大駕宜三十六法駕宜用十二小駕除之毗研精故事皆此類也長城之役毗總其事及帝有事恆嶽詔毗營立壇場尋轉殿內丞從幸張掖郡高昌王朝於行在所詔毗持節迎勞遂將護入東都尋以母憂去職未期起令視事將興遼東之役自洛口開渠逹涿郡以通漕毗督其役明年兼領右翊衛長史營建臨朔宮及征遼東以本官領虎賁郎將典宿衛時軍圍遼東城帝令毗詣城下宣諭賊弓弩亂發流矢中所乘馬毗顔色不變辭氣抑揚卒事而去遷殿內少監又領將作少監事後復從帝征遼東會楊元感作逆帝班師從至高陽郡卒帝悼惜之贈殿內監郎茂字蔚之中山新市人也父基齊頴川郡守有惠政列在循吏傳中茂少敏慧七嵗誦騷雅日千餘言十五師事國子博士河間權會受詩易三禮及乾象刑名之學又就國子助教長樂張奉禮受三傳羣言至忘寢食家人惟恐其受病常節其燭及長以博學稱仕齊司空參軍奉詔於祕書省刋定載籍歷位保城令有能名齊平歸周上柱國王誼薦之授陳州户曹屬高祖為亳州總管見而悅之命掌書記周武帝為象經高祖從容謂茂曰人主之所為也感天地動鬼神而象經多亂法何以致人茂竊嘆曰此言豈常人所及隂有結納髙祖亦深禮之後還家為州主簿及高祖為相以書召之言及疇昔甚歡授衛州司録有能名尋除衛國令時有繫囚二百茂親自究審數日釋免者百餘人歷年詞訟不詣州省魏州刺史元暉謂曰長史言衛國人不敢申訴者畏明府耳茂曰人猶水也法令為隄防隄防不固必致奔突茍無決溢使君何患哉暉無以應有部人張元預與從父弟思蘭不睦丞尉請加嚴法茂曰元預兄弟本是憎嫉又坐得罪彌益其忿非化人之意也乃遣縣中耆老更往敦諭道路不絶元預等各生感悟詣縣頓首請罪茂曉之以義遂相親睦稱為友悌開皇中纍遷户部侍郎時尚書右僕射蘇威立條章每嵗責人間五品不遜或答者乃云管內無五品家不相應領類多如此又為餘糧簿擬有無相瞻茂以為繁紆不急皆奏罷之又奏身死王事者子不退田品官左貶不減地皆發於茂茂性明敏剖決無滯當時以吏幹見稱煬帝即位遷尚書左丞參掌選事尤工法理為世所稱其時工部尚書宇文愷左將軍于仲文競河東銀窟茂奏劾愷位望已隆祿賜優厚拔葵去織寂爾無聞求利下交曽無愧色仲文大將宿衛近臣朝夕聞道虞芮之風抑而不慕分銖之利知而必爭何以貽範庶寮示民軌物若不紏繩將虧政教愷與仲文竟坐得罪茂與崔祖濬撰州郡圖經一百卷奏之賜帛三百假以書付祕府于時帝每巡幸王綱已紊法令多失茂既先朝舊臣明習世事然善自謀身無謇諤之節見帝忌刻不敢措言惟竊嘆而已以年老乞骸骨不許會帝征遼以茂為晉陽宮留守其恆山贊治王文同與茂有隙奏茂附下罔上詔納言蘇威御史大夫裴藴雜推之茂素與二人不平因深丈其罪及弟司𨽻别駕楚之皆除名徙且末郡茂怡然任命不以為憂在塗作登隴賦以自慰後附表自陳帝頗悟十年追還京兆嵗餘卒子知年栁莊字思敬河東解人也祖季逺梁宜都太守父遐周霍州刺史自有傳莊少有器量博覽墳籍兼善辭令濟陽蔡大寶有重名於江左時為嶽陽王蕭察咨議見莊便歎曰襄陽水鑑復在於兹大寶遂以其女妻之俄而察辟為參軍及察稱帝纍遷鴻臚卿髙祖輔政蕭巋令莊奉書入關時三方構亂髙祖懼巋有異志及莊還謂之曰孤昔以開府從役江陵深蒙梁主殊眷今主幼時艱猥蒙顧託梁主奕葉重光委誠朝廷而今已後方見松筠之節君還大國幸申孤意於梁主也遂執手而别時梁之將帥咸潛請興師與尉遲迥等為連衡之勢進可以盡節於周氏退可以席捲山南惟巋疑為不可會莊至自長安申髙祖結託之義遂言於巋曰昔袁紹劉表王陵諸葛誕之徒並一時之雄傑也及據要害之地擁哮闞之羣功業莫建而禍不旋踵者良由魏武晉氏挾天子保京都仗大義以為名故能取威定霸今尉遲迥雖曰舊將昏髦日甚消難王謙常人之下者非有匡合之才况山東庸屬從化日近周氏之恩未洽在朝將相多為身計競效節於楊氏以臣斷之迥等終覆滅隋公必移周國未若保境息民以觀其變巋深以為然衆議遂息未幾消難奔陳迥及謙相次就戮巋謂莊曰近者若從衆人之言社稷已不守矣高祖踐阼莊又入朝髙祖深慰勉之及為晉王廣納妃于梁莊由是往來四五返前後賜物數千假梁國廢授開府儀同三司除給事黃門侍郎莊明習舊章雅逹政事凡所紏正帝莫不稱善蘇威嘗重莊器識奏帝云江南人有學業者多不習世務習世務者又無學業能兼之者不過栁莊髙熲亦與莊甚厚莊與陳茂同官不能降意茂見上及朝臣多屬意於莊心每不平帝與茂有舊譖訴頗行尚書省嘗奏犯罪人依法合流而上處以大辟莊據法執之帝不從由是忤旨俄屬尚藥進丸藥不稱旨茂因奏莊不親監帝怒十一年徐璒等反於江南詔莊以行軍長史隨軍討之璒平即授饒州刺史甚有能名卒於官李孝貞字元操趙郡人也祖憲魏征東將軍揚州刺史父希禮東魏信州刺史孝貞好學善屬文仕齊釋褐司徒府參軍事與弟孝基同見吏部郎中陸昂昻戲之曰弟名孝基兄其替矣孝貞對曰僕雖不肖請附子臧昻握手曰士固不妄有名吾賢必當逺至性簡靜不妄通賔客與從兄儀曹郎搔太子舍人季節博陵崔子武范陽盧詢祖為斷金之友後以射策甲科拜給事中稍遷兼通直散騎常侍副李翥使陳孝貞從姊則昭信皇后從兄祖勳女為廢帝濟南王妃祖欽女一為後主娥英一為琅邪王儼妃祖勳叔騫女為安德王延宗妃諸房子女多有才貌又因昭信后所以與帝室姻媾重疊兄弟並以文學自逹耻為外戚家于時黃門侍郎髙乾和親要用事求婚於孝貞孝貞拒之由是有隙隂譖之出為太尉府外兵參軍後歷中書舍人武平中出為博陵太守不得志尋為司州别駕後復兼散騎常侍聘周使副還除給事黃門侍郎待詔黃門侍郎待詔文林館假儀同三司以美於辭令勑與中書侍郎李若李德林别掌宣傳詔勑周武帝平齊授儀同三司小典祀下大夫宣帝即位轉吏部下大夫髙祖為丞相孝貞從韋孝寬討尉遲迥以功授上儀同開皇初拜馮翊太守為犯廟諱乃稱字後數嵗遷蒙州刺史吏民安之自此不復留意於文筆人問其故慨然歎曰五十之年倐焉而過鬢垂素髮筋力已衰宦意文情一時盡矣悲夫然每暇日輒引賔客絃歌對酒終日為歡徵拜內史侍郎與內史李德林參典文翰然孝貞無幹劇之用頗稱不理上譴怒之勑御史劾其事由是出為金州刺史卒官所著文集二十卷行於世子允玉元操弟孝基亦有才學風詞甚美為齊衛尉丞待詔文林館位儀曹郎中孝基弟孝俊齊太子洗馬孝俊弟孝威字季重涉學有器幹兄弟之中最為敦篤齊太尉外兵參軍修起居注仕隋禮部侍郎大理少卿杜臺卿字少山博陵曲陽人也父弼齊膠州刺史自有傳臺卿少好學博覽書記解屬文仕齊位中書黃門侍郎修國史性儒素每以雅道自居既居清憲忌害人物趙彥深和士開髙阿那肱等親信之後兼尚書右丞省中以其耳聾多戲弄之下辭不得理者乃至大罵臺卿見其口動謂為自陳令史又故不曉喻訓對往往乖越聽者以為嗤笑齊平歸於鄉里以禮記春秋講授子弟開皇初被徵入朝嘗採月令觸類而廣之為書名玉燭寶典十二卷至是奏之賜絹二百匹臺卿患耳不堪吏職請修國史上許之拜著作郎後致仕終於家有文集十五卷撰齊記二十卷並行於世無子崔賾字祖濬博陵安平人也父廓髙尚不仕列在隱逸傳賾七嵗能屬文容貌短小有口辨開皇初秦孝王薦之射策髙第詔與諸儒定禮樂授校書郎轉協律郎太常卿蘇威雅重之母憂去職性至孝水漿不入口者五日後徵為河南豫章二王侍讀每更日來往二王之第及河南王為晉王轉晉王記室參軍自此去豫章府豫章王重之不已以書與賾往來仍賚米并衣服錢帛時晉邸文翰多成其手王入東宫除太子齋帥俄兼舍人及元德太子薨以疾歸於家後徵為起居舍人大業四年從駕汾陽宫次河陽鎮藍田令王曇於藍田山得一玉人長三四寸著大領衣冠幘奏之詔問羣臣莫有識者賾答曰謹按漢文帝以前未有冠幘即是文帝以來所製作也臣見魏大司農盧元明撰嵩髙山廟記云有神人以玉為形像長數寸或出或隱出則令世延長伏惟陛下應天順人定鼎嵩洛嶽神自見臣敢稱慶因時拜百官畢賀天子大悅賜縑二百匹從駕登太行山詔問賾曰何處有羊腸坂賾對曰臣按漢書地理志云上黨壺關縣有羊腸坂帝曰不又答曰臣按皇甫士安撰地書云太原北九十里有羊腸坂帝曰是也因謂牛𢎞曰崔祖濬乃所謂問一知二五年受詔與諸儒撰區宇圗志二百五十卷奏之帝以為不善更令虞世基許善心衍為六百卷以父憂去職尋起令就事遼東之役授鷹揚長史置遼東郡縣名皆賾之議也奉詔作東征記九年除越王長史于時山東盜賊羣起帝令撫慰髙陽襄國歸首者八百餘人十二年從駕江都宇文化及之弒帝也引為著作郎稱疾不起在路發疾卒於彭城年六十九賾與河南元善河東栁辨太原王劭吳興姚察琅邪諸葛潁信都劉綽河間劉炫相善每因休暇清談竟日所著詞賦碑志十餘萬言撰洽聞志七卷八代四科志三十卷未及施行江都傾覆咸為煨燼陸爽字開明魏郡臨漳人父概之齊霍州刺史爽少聰敏年九嵗就學日誦二千餘言齊尚書僕射楊遵彥見而異之曰陸氏世有人焉年十七齊司州牧清河王嶽召為主簿纍遷中書侍郎及齊滅周武帝聞其名與陽休之袁叔德十餘人俱徵入關諸人多將輜重爽獨載書數千卷至長安授宣納上士髙祖受禪遷太子洗馬與左庶子宇文愷撰東宫典記七十卷朝廷以其博學有口辨陳人至境常令迎勞開皇十一年卒官贈上儀同宣州刺史子法言敏學有家風釋褐承奉郎初爽之為洗馬嘗奏髙祖云皇太子諸子未有嘉名請依春秋之義更立名字上從之及太子廢上追怒爽曰我子孫製名寧不自解陸爽乃爾多事扇惑於勇亦由此人其身雖故子孫並宜屏黜終身不齒法言竟坐除名爽同郡侯白字君素好學有捷才性滑稽尤辨俊舉秀才為儒林郎通侻不持威儀好為誹諧雜説人多愛狎之所在之處觀者如市楊素嘗與牛𢎞退朝白謂素曰日之夕矣素大笑曰以我為牛羊下來邪髙祖聞其名召與語甚悅之令於祕書修國史每將擢之髙祖輒歎曰侯白不勝官而止後給五品食月餘而死時人傷其薄命著旌異十五卷崔仲方字不齊博陵安平人父宣猷周少司徒自有傳仲方少好讀書有文武才幹年十五周文見而異之令與諸子同就學時髙祖亦在其中由是與髙祖少相欵密後以明經為晉公宇文護參軍轉記室遷司玉大夫與斛斯徵栁敏等同修禮律後以軍功授平東將軍銀青光祿大夫賜爵石城縣男時周武隂有滅齊之志仲方獻二十䇿帝大奇之復與少內史趙芬刪定格式從武帝攻晉州齊亞將崔景髙請為內應仲方與假文振等登城應接遂下晉州又令仲方説下翼城等四城授儀同進爵范陽縣侯後以行軍長史從郯國公王軌禽陳將吳明徹於呂梁仲方䇿居多宣帝嗣位為少內史會帝崩髙祖為丞相與仲方相見握手極歡仲方亦歸心焉其夜上便宜十八事髙祖並嘉納之又見衆望有歸隂勸髙祖應天受命從之及受禪上召仲方與髙熲議正朔服色事仲方曰晉為金行後魏為水周為木皇家以火承木德之統又聖躬誕載之初有赤光之瑞車服旗牲並宜用赤又勸上除六官依漢魏之舊並從之進位上開府授司農少卿進爵固安縣公令發兵三萬於朔方靈武築長城東至黃河西拒綏州南至勃出嶺綿歷七百里明年復令仲方發丁十萬於朔方已東緣邊險要築數十城以遏胡冦丁父艱去職未期起為虢州刺史上書論取陳之策曰臣謹按晉太康元年嵗在庚子晉武帝平吳至今開皇六年嵗次丙午合三百七載春秋寶乾圗云王者三百年一蠲法今三百之期可謂至矣陳氏草竊起於丙子至今丙午又子午為衝隂陽之忌昔史趙有言曰陳顓頊之族為水故嵗在鶉火以滅之又云周武王克商封胡公滿於陳至魯昭九年陳災竈曰歲及鶉火而後陳亡楚克之楚祝融後也為火正故復滅陳陳承舜後舜承顓頊太嵗左行歲星右轉鶉火之歲陳族再亡戊午之年媯虞運盡語迹雖殊考事無異皇朝五運相承感火德而國號曰隋隋與楚同分楚是火正午為鶉火未為鶉首申為實沈酉為大梁既當周秦晉趙之分若當此分發兵當得嵗之助以今量古陳滅不疑臣謂午未申酉並以數極蓋聞天時不如地利地利不如人和况主聖臣良兵強國富陳既主昏於上人讟於下險無百二之固衆非九國之師獨此島夷而稽天討伏度朝廷自有宏謨芻蕘所見冀申螢爝今惟須武昌以下蘄和徐方吳海等州更帖精兵密營渡計益信襄荆基郢等州速造舟楫多張形勢為水戰之具蜀漢二江是為上流水路衝要是爭之所賊雖於流頭荆門延洲公安巴陵隱磯夏口盆城置船然終聚漢口峽口以水戰大決若賊必以上流有軍令精兵赴援者下流諸將即須擇便橫渡如擁衆自衛上江水軍鼓行以前雖恃九江之險非德無以為固徒有三吳百越之兵無恩不能自立上覽大悅轉基州刺史徵入朝仲方因陳經略上善之賜以御袍袴並羅雜綵五百假進位開府及大舉伐陳以仲方為行軍總管與秦王會及陳平坐事免未幾復位後數載授會州總管時諸羌猶未賔附詔仲方擊之與賊三十餘戰紫祖四鄰望方涉題于碉小鐵圍山白男弱水等赭都諸賊悉平賜奴婢一百二十口黃金三十斤遷代州總管後被徴入朝會髙祖崩漢王餘黨據呂州不下煬帝遣周羅㬋攻之中流矢卒乃令仲方代總其事拔之進位大將軍歷户部禮部尚書坐事免尋為國子祭酒轉太常卿朝廷以其衰老出拜上郡太守以母憂去職歲餘起為信都太守後乞骸骨優詔許之卒於家子燾位定陶令崔彭字子彭博陵安平人也父士謙周荆州刺史自有傳彭少孤事母以孝聞性剛毅有武略工騎射善周官尚書並略通大義仕周纍遷門正上士髙祖為相周陳王純鎮齊州帝恐其為變遣彭以兩騎徵純入朝彭未至齊州三十里因詐病止傳舍遣人召純純疑有變多將從騎至彭所彭請間因顧騎士執而鎖之乃大言曰陳王有罪詔徵入朝左右不得輒動左右愕然而去至拜上儀同及踐阼遷監門郎將兼領右衛長史賜爵安陽縣男再遷驃騎將軍恆典宿衛性謹密在省闥二十餘年當上在仗危坐終日未嘗有惰容上每謂曰卿當上日我寢處自安又嘗曰卿弓馬固已絶人頗知學不彭曰臣少受周禮尚書休沐之暇不敢廢也上曰試為我言之因説君臣戒懼之義上稱善觀者以為知言後加上開府遷備身將軍上嘗宴逹頭可汗使者於武德殿有鴿鳴於梁上命彭射之中上大悅賜錢一萬及使者反可汗復遣使請崔將軍一與相見上曰此必善射聞於虜庭遂遣之及至可汗召善射者數十人因擲肉於地以集飛鳶遣其善射者射之多不中彭連發數矢皆應弦而落突厥莫不嘆服仁壽末進爵安陽縣公煬帝即位遷左領軍大將軍時漢王諒初平令彭鎮遏山東復領慈州事卒贈大將軍諡曰肅子寶德嗣辛德源字孝基隴西狄道人也祖穆魏平原太守父子馥尚書左丞德源沉靜好學十四解屬文及長博覽書記美儀容中書侍郎裴讓之特相愛好兼有龍陽之寵齊尚書僕射楊遵彥殿中尚書辛術皆一時名士並虛襟禮敬同舉薦之後為兼員外散騎常侍聘梁使副德源貧素因使薄有資裝遂餉執事為父求贈時論鄙之中書劉逖上表薦德源弱齡好古晚節逾厲枕籍六經漁獵百氏文章綺豔體調清華恭愼表於門閭謙撝著於朋執實後進之詞人當今之雅器由是除員外散騎侍郎後兼通直散騎常侍聘陳及還待詔文林館位中書舍人齊滅仕周為宣納上士因取急詣相州會尉遲迥起逆以為中郎德源辭不獲免遂亡去髙祖受禪不得調者久之隱林慮山鬱鬱不得志著幽居賦以自寄素與武陽太守盧思道友善時相往來魏州刺史崔彥武奏德源潛為交結恐有姦計由是謫令從軍討南寧及還祕書監牛𢎞以德源才學顯著奏與著作郎王劭同修國史德源每於務隙撰集注春秋三傳三十卷注楊子法言二十三卷蜀王秀奏以為掾轉咨議參軍卒官有集二十卷又撰政訓內訓各二十卷有子素臣正臣德源從祖兄元植齊天保中司空司馬學涉有名聞於世德源族叔珍之少有氣俠歷位魏北海太守後行平州事卒於州贈驃騎大將軍洛州刺史諡曰恭子慤武定末開府鎧曹參軍杜正元字知禮京兆人晉征西將軍預之後也世以文學相承祖景州府交辟不就父裕仕齊位止樂陵令齊亡教授卒於家正元耽志經史開皇十五年舉秀才試策髙第曹司以策過左僕射楊素素怒曰周孔更生尚不得為秀才刺史何忽妄舉此人可附下考乃以策抵地不視時海內惟正元一人應秀才餘當貢者隨例銓注訖正元獨不得進止曹司以選期將盡重以啓素素志在試退正元乃手題使擬司馬相如上林賦王褒聖主得賢臣頌班固燕然山銘張載劒閣銘白鸚鵡賦曰我不能為君住宿可至未時令就正元及時並了素讀數遍大驚曰誠好秀才命曹司録奏屬吏部選期已過注邑令還期年重集素謂曹司曰秀才杜正元至又試以人有竒器賦援筆立成文不加點素大嗟之命吏部優敘曹司以擬長寧王記室參軍時素情背曹官及見曰小王不盡其才也晉王廣方鎮揚州妙選府僚乃以正元為晉王府參軍後豫章王鎮揚州又為豫章王記室卒正元弟正藏字為善亦好學善屬文開皇十六年舉秀才時蘇威監選試擬賈誼過秦論及尚書湯誓匠人針連理樹賦几賦弓銘應時並就文無點竄時射策甲第者合奏曹司難為别奏抑為乙科正藏訴屈威怒改為丙第授純州行參軍遷梁郡下邑縣正大業中與劉炫同以學業該通應詔被舉時正藏弟正儀貢充進士正倫為秀才兄弟三人同時應命當世嗟美之著作郎王劭奏追修史司穀大夫薛道衡奏擬從仕並以見任且放還九年從駕征遼為夫餘道行軍長史還至涿郡卒正藏為文迅速有如宿構曽令數人並執紙筆各題一文正藏口授俱成皆有文理為當時所異又為文軌二十卷論為文體則甚有條貫後生寶而行之多資以解褐大行於世謂之杜家新書云栁昂字千里河東解人也父敏周大將軍鄜州刺史入隋進位上大將軍太子太傅自有傳昂幼聰頴有器識幹局過人周武帝時為內史中大夫開府儀同三司賜爵文成縣公當途用事百僚皆出其下昂竭誠獻替知無不為謙虛自處未嘗驕物時論以此重之武帝崩受遺輔政稍被宣帝踈然不離本職髙祖為丞相深自結納髙祖以為大宗伯拜日遂得偏風不能視事髙祖受禪疾愈加上開府拜潞州刺史昂見天下無事上表請勸學行禮上覽而善之優詔答昂自是天下州縣皆置博士習禮焉昂在州甚有惠政卒官子調歷祕書郎侍御史左僕射楊素嘗於朝堂見調因獨言曰栁條通體弱獨搖不須風調斂版正色曰調信無取公不當以為侍御信有可取不應發此言公當具瞻之地樞機何敢輕發素甚竒之煬帝嗣位纍遷尚書左司郎中時王綱不振朝士多贓貨惟調清素守常為時所美然幹用非其所長張乾威字元敬清河東武城人也父晏之齊兖州刺史自有傳乾威性聰敏涉獵羣書其世父皓之謂人曰吾家千里駒也仕齊位太常丞仕周為宣納中士開皇中纍遷晉王屬王甚美其才與河內張衡俱見禮重晉邸稱為二張焉及王為太子遷員外散騎侍郎太子內舍人煬帝即位授內史舍人儀同三司又以藩邸之舊加開府尋拜謁者大夫從幸江都以本官攝江都贊務稱為幹理乾威嘗在塗見一遺囊恐其主求失因令左右負之而行後數日物主來認悉以付之淮南太守楊綝嘗與十餘人同來謁見帝問乾威曰其首立者為誰乾威下殿就視而答曰淮南太守楊綝帝謂乾威曰卿為謁者大夫而乃不識參見人何也乾威對曰臣非不識楊綝但慮不審所以不敢輕對石建數馬足蓋愼之至其廉愼皆此類也帝甚嘉之于時帝數巡幸百姓疲弊乾威因上封事以諌帝不悅自此見踈未幾卒官有子爽仕至蘭陵令乾威弟乾雄亦有才器秦孝王俊為秦州總管選為法曹參軍王嘗親按囚徒乾雄誤不持狀口對百餘人皆盡事情同輩莫不嘆服後歷壽春陽城二縣令有政績李騊駼趙邑髙邑人也父義深魏梁州刺史自有傳騊駼少有才辨仕齊位兼通直散騎常侍聘陳陳人稱之後為壽陽道行臺左丞與王琳同陷陳周末逃歸開皇中為永安郡太守絳州長史卒子政藻明敏有才幹騊駼沒陳政藻時為開府行參軍判集書省事便謝病解職居處若在喪禮人士稱之開皇中歷尚書工部員外郎卒於宜州刺史騊駼弟文師齊中書舍人齊郡太守通志卷一百六十三
