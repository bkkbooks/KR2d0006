body:
  text: 通志卷四十五宋右廸功郎鄭樵漁仲撰禮略第四凶禮大喪及山陵制并為期以下親哭及不親事附䘮期天子弔大臣服天子為大臣及諸親舉哀諸侯及公卿大夫為天子服皇太后長公主及三夫人已下為天子服杖挽歌秀孝為舉將服郡縣吏為守令服師弟子相為服朋友相為服大䘮及山陵制并為期以下親哭及不親事附周制始崩太僕戒鼓𫝊達于四方内宗掌序哭者外宗叙外内朝暮哭者世婦掌比外内命婦之朝暮哭不敬者而呵罸之小宗伯縣縗冠之式于路門之外太僕掌縣䘮首服之法于宫門首服之法謂免髽笄總廣狹長短之數三日祝先服五日官長服官長大夫士七日國中男女服庶人三月天下服諸侯之大夫也宫正掌授廬舎辨其親踈貴賤之居廬倚廬也舎堊室也親者貴者居倚廬䟽者賤者居堊室漢舊儀曰髙帝崩三日小歛室中牖下作栗木主長八寸前方後圎圍一尺置牖中望外内張緜絮以鄣外以皓夲大如指長三尺四枚纒以皓皮四方置牖中主居其中央七日大斂棺以黍飯羊舌祭之牖中已𦵏收主為木函蔵廟太室中西牆壁埳中帝初登遐朝臣稱曰大行皇帝風俗通云俗說易稱四海為家雖都二京廵有方嶽又曰行在所由以行為辭天命有終往而不返故曰大行天子新崩梓宫在殯太子已即位存亡有别不可但稱皇帝未及定謚故曰大行皇帝宫車晏駕周康王一朝晏起詩人深刺如今崩殯則為晏駕其䘮葬儀無聞文帝遺詔其令天下吏民令到出臨三日皆釋除無禁取婦嫁女祠祀飲酒食肉自當給䘮事服臨者皆無踐絰帶無過三寸無布車及兵噐無發民哭臨宫殿中覇陵山川因其故無有所改歸夫人以下至少使中尉亞夫為車騎将軍屬國悍為将屯将軍郎中令張武為復土將軍師古曰穿壙出土下棺也已而寘土為墳故云復土發近縣卒萬六千人發内史卒萬三千人蔵郭穿復土属将軍武即張武賜諸侯王已下至孝悌力田金帛各有差毎天子即位眀年将作大匠營陵地用地七頃方中用地一頃深十三丈堂壇髙三丈墳髙十二丈武帝墳髙二十丈眀中髙一丈七尺四周二丈内梓棺栢黄腸題凑以次百官蔵畢其設四通羡門容大車六馬皆蔵之内方外陟車石外方立先閉劔戸户設夜龍莫耶劔伏弩設伏火已營陵餘地為西園后陵餘地為媫妤以下次賜親属功臣題頭也湊以頭向内所以為固也後漢制皇帝不豫太醫令丞将醫入就進所宜藥甞藥監近臣中常侍小黄門皆先甞藥過量十二公卿朝臣問起居無間太尉告請南郊司徒司空告請宗廟告五嶽四凟羣祀並禱求福登遐皇后詔三公典䘮事百官皆衣白單衣白幘不冠閉城門宫門近臣中黄門持兵虎賁羽林中署皆嚴宿衛宫府各警北軍五校繞宫屯兵黄門令尚書御史謁者晝夜行陳三公啓手足色膚如禮皇后皇太子皇子哭踊如禮沐浴如禮守宫令兼東園匠将女執事黄緜緹繒金縷玉柙如故事漢舊儀曰帝崩唅以珠纒以緹繒十二重以玉為標如鎧状連縫之以黄金為縷腰以下以玉為札長一尺廣二寸半為柙下至足亦縫以黄金縷請諸衣衾歛之凡乗輿衣服已御蔵之崩皆以歛飯唅珠玉如禮天子飯以珠唅以玉盤冰如禮大盤廣八尺長一丈三尺深三尺漆赤中百官哭臨殿下是日夜下竹使符告郡國二千石諸侯王應劭曰凡與郡國守相竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之珪璋従簡易也竹使符到皆伏哭盡哀舊漢制發兵皆以銅虎符其餘竹使而已符第合㑹為大信小歛如禮東園匠考工令奏東園祕噐表裏洞赤虡文畫日月鳥龜龍虎連璧偃月牙檜梓宫如故事大歛於兩楹之間五官左右虎賁羽林五将各将所部執虎賁㦸屯殿端門陛左右廂中黄門持兵陛殿上夜漏羣臣入晝漏上水大鴻臚設九賔隨立殿下謁者引諸侯王立殿下西面北上宗室諸侯四姓小侯在後西面北上治禮引三公就位殿下北面特進次中二千石列侯次二千石六百石博士在後羣臣陪位者皆重行西上位定大鴻臚言具謁者以聞皇后東向貴人公主宗室婦女以次立後皇太子皇子在東西向皇子少退在南北面皆伏哭大鴻臚𫝊哭羣臣皆哭三公升自阼階安梓宫内珪璋諸物近臣佐如故事嗣子哭踊如禮東園匠武士下釘祍截去牙䘮大記曰君盖用漆三祍三束鄭注曰祍小腰太常上太牢奠太官食監中黄門尚食次奠執事者如禮太常太鴻臚𫝊哭如儀三公奏尚書顧命太子即日即天子位于柩前請太子即皇帝位皇后為皇太后奏可羣臣皆出吉服入㑹如儀太尉升自阼階當柩御座北面稽首讀冊畢以𫝊國玉璽綬東面跪授皇太子即皇帝位中黄門掌兵以玉貝隋侯珠斬蛇寳劔授太尉告令羣臣羣臣皆伏稱萬嵗或大赦天下遣使者詔開城門宫門罷屯衛兵羣臣百僚罷入成䘮服如禮三公太常如禮故事百官五日一㑹臨故吏二千石刺史在京都郡國上計掾史皆五日一㑹天下吏民發䘮臨三日先葬二日皆旦晡臨既𦵏釋服無禁嫁娶祠祀佐史以下布衣冠幘絰帶無過三寸臨庭中武吏布幘大冠大司農出見錢榖給六丈布直以葬䘮期依前漢制部刺史二千石列侯在國者及闗内侯宗室長吏及因郵奉奏諸侯王遣大夫一人奉奏弔臣請驛馬露布奏可以木為重髙九尺廣容八厯裹以葦席巾門䘮帳皆以簟車皆去輔轓疏布惡輪走卒皆布褠幘太僕四輪輈為賔車大練為屋幙中黄門虎賁各二十人執紼司空擇土造穿太史卜日謁者二人中謁者僕射中謁者副匠作油緹帳以覆坑方石治廣腸題湊便房如禮大駕太僕御方相氏黄金四目蒙熊皮元衣朱裳執戈揚盾立乗四馬先驅旂之制長三仞十有二斿曵地畫日月升龍書旐曰天子之柩謁者二人立乗六馬為次大駕甘泉鹵薄金根容車蘭䑓法駕䘮服大行載飾如金根車皇帝従送如禮太常上啓奠夜漏二十刻太尉冠長冠衣齋衣乗髙車詣殿止車門外使者到南向立太尉進伏拜受詔太尉詣南郊未盡九刻大鴻臚設九賔隨立羣臣入位太尉行禮執事皆冠長冠衣齋衣太祝令跪讀謚策太尉再拜稽首治禮告事畢太尉奉謚策還詣殿端門太常上祖奠中黄門尚衣奉衣登容根車東園武士載大行司徒却行道立車前治禮引太尉入就位大行車西少南東面奉䇿太史令奉哀䇿立後太常跪曰進皇帝進太尉讀謚策蔵金匱皇帝次科蔵於廟太史奉哀策葦篋詣陵太尉旋復公位再拜立哭太常跪曰哭大鴻臚𫝊哭十五舉音止哭太常行遣奠皆如禮請哭止哭如儀晝漏上水請發司徒河南尹先引車轉太常跪曰請拜送載車著白系参繆音紏紼長三十丈大七寸為輓六行行五十人公卿以下子弟凡三百人皆素幘委貌冠衣素裳校尉三人皆赤幘不冠絳科單衣持幢幡候司馬丞為行首皆銜枚羽林孤兒巴渝櫂歌者六十人為六列鐸司馬八人執鐸先大鴻臚設九賔隨立陵南羡門道東北面諸侯王公特進道西北面東上中二千石二千石列侯宜九賓東北面西上皇帝白布幙素裏夹羡道東西向如禮容車幄坐羡道西南向車當坐南向中黄門尚衣奉衣就幄坐車少前太祝進醴獻如禮司徒跪曰大駕請舎太史令自車南北面讀哀策掌故在後已哀哭太常跪曰哭大鴻臚𫝊哭如儀司徒跪曰請就下位東園武士奉下車司徒跪曰請就下房都𨗳東園武士奉車入房司徒太史令奉諡哀策東園武士執事下眀噐眀噐神明之也孔子謂為明噐知䘮道矣備物而不可用也筲八盛容三升黍一稷一麥一粱一稻一麻一菽一小豆一甕三容三升醯一醢一屑一屑薑桂之屑黍飴載以木桁桁所以庋巵筲甕甒也覆以疏布甒二容三升醴一酒一載以木桁覆以功布瓦鐙一彤矢四軒輖中亦短衛彤矢四骨短衛既夕曰􅀈矢一乗骨鏃短衛鄭注云翭猶候也候物而射之矢也四矢曰乗骨鏃短衛亦示不用生時翭矢金鏃凡為矢五分笴長而羽其一彤弓八巵八牟八豆八籩八形方酒壺八盤􅓢一具鄭注既夕日槃匜盥噐也杖几各一蓋一鐘十六無虡鎛四無虡磬十六無虡壎一簫四笙一箎一柷一敔一瑟六琴一竽一筑一坎侯一干戈各一笮一甲一胄一輓車九乗芻靈三十六匹鄭注禮記曰芻靈束茒為人馬謂之芻靈神之類瓦竈二瓦釡二瓦甑一瓦鼎十二容五升匏勺一容一升瓦案九瓦大杯十六容三升瓦小杯二十容二升瓦飯槃十瓦酒罇二容五升匏勺二容一升祭服衣送皆畢東園匠曰可哭在房中者皆哭太常大鴻臚請哭止如儀司徒曰百官事畢臣請罷従入房者皆再拜出就位太常𨗳皇帝就贈位司徒跪曰請進贈侍中奉持鴻洞贈玉珪長尺四寸薦以紫巾廣袤各三寸緹裏赤纁周縁贈幣元三纁二各長尺二寸廣充幅皇帝進跪臨羡道房户西向手下贈投鴻洞中三東園匠奉封入蔵房中太常跪曰皇帝敬再拜請哭大鴻臚𫝊哭如儀太常跪曰贈事畢皇帝促就位續漢書曰明帝崩司徒鮑昱梓宫還至羡道半途上欲下䘮事葬日三公入安前叩頭言禮天子鴻洞以贈所以重郊廟也陛下柰何冐危嶮不以義割哀上即還容根車游載容衣司徒至便殿並䡰苦耕切騎皆従容車玉帳下司徒跪曰請就幄𨗳登尚衣奉衣以次奉噐衣物蔵於便殿太祝進醴獻几下用漏十刻禮畢司空将校復土皇帝皇后以下皆去麄服服大紅還宫反廬立主如禮桑木主尺二寸不書諡虞禮畢祔於廟如禮先大駕日游冠衣於諸宫諸殿羣臣皆吉服従㑹如儀皇帝近臣䘮服如禮醳大紅服小紅十一升都布練冠醳小紅服纎醳纎服留黄冠常冠近臣及二千石以下皆服留黄冠百官衣皂毎變服従哭詣陵㑹如儀祭以特牲不進毛血首司徒光祿勲備三爵如禮太皇太后皇太后崩司空以特牲告諡於祖廟如儀長樂太僕少府太長秋長樂宫太后所居在西京後漢都洛陽無長樂宫或是當時便循舊名為太后耳典䘮事三公奉制度他皆如禮儀合葬羡道開通皇帝謁便房太常𨗳至羡道去杖中常侍受至柩前謁伏哭止如儀辭太常𨗳出中常侍受杖升車還宫以下反虞立主如禮諸郊廟祭服皆下便房五時朝服各一襲在陵寝其餘及宴服皆封以箧笥蔵宫殿後閤室永平七年隂太后崩晏駕詔曰柩将發於殿羣臣百官陪位黄門鼓吹通鳴鐘鼓天子舉哀女侍史官三百人皆著素参以白素引棺挽歌下殿就車黄門宦者引以出宫省太后魂車鑾輅青羽蓋駟馬龍旂九旒前有方相鳯凰車大将軍妻參乗太僕妻御悉𨗳公卿百官如天子郊鹵薄儀後和熹鄧后𦵏按以為儀自此皆降損於前事也魏武帝以禮送終之制襲稱之數繁而無益俗又過之先自制送終衣服四篋題識其上春秋冬夏曰有不諱隨時以歛金珥珠玉銅鐡之物一不得送黄初三年文帝又作終制曰禮國君即位為椑存不忘亡也夀陵因山為體無封樹無立寝殿無造園邑此詔蔵之宗廟明帝時毛皇后崩未𦵏詔宜稱大行議者謂漢天子稱行在所言不常居崩曰大行者不反之謂也未葬未有諡而言大行者為嫌與嗣天子同號至於后崩未葬禮未立后宜無所嫌故漢氏諸后不稱大行謂未𦵏宜直稱皇后詔曰稱大行者所以别存亡之號故事已然今當稱大行晋尚書問今大行崩含章殿安梓宫宜在何殿博士卞㩁楊雍議曰臣子尊其君父必居之以正今太極殿古之路寝梓宫宜在太極殿依周人殯於西階既殯之後别奠下室之饌朝夕轉易諸所應設祭朔望牲用宜所施行按禮具答㩁雍議按禮天子日食少牢月朔太牢䘮禮下室之饌如他日宜隨御膳朝夕所常用也朔望則奠用太牢備物又問按景帝故事施倚廬於九龍殿上東廂今御倚廬為當在太極殿不諸王廬復應何所㩁雍議按尚書顧命成王崩康王居於翼室先儒云翼室於路寝今宜在太極殿上諸王宜各於其所居為廬朝夕則就位哭臨東晋成帝咸康七年皇后杜氏崩詔外官五日一入臨内官朝一入而已過葬虞祭禮畢止有司奏大行皇后陵所作凶門栢厯門號顯陽端門詔曰門如所處凶門栢厯大為繁費停之按蔡謨説以二瓦噐始死之祭繫於木裹以葦席置庭中近南名為重今之凶門是其象也禮既虞而作主今未𦵏未有主故以重當之禮稱為主道此其義也范堅又曰凶門非禮禮有懸重形似凶門後人出門外以表䘮俗遂行之薄帳即古弔幕之類也是時又詔曰重壌之下豈宜崇飾陵中唯絜掃而已有司又奏依舊選公卿已下六品子弟六十人為挽郎詔又停之宋崔元凱䘮儀云銘旌今之旐也天子丈二尺皆施跗樹於廣中遣車九乗謂結草為馬以泥為車疎布輤四面有障置壙四角以載遣奠牢肉斬取骨脛車各載一枚陳永定三年七月武帝崩尚書左丞庾特云晋宋以来皇帝大行儀注未祖一日告南郊太廟奏策奉謚梓宫将登輼輬侍中版奏已稱其諡皇帝遣奠出於陛階下方以此時乃讀哀策而前代策文猶稱大行皇帝請眀加詳正國子博士知禮儀沈文珂等謂應劭風俗通前帝諡未定臣子稱大行以别嗣主近檢梁儀自梓宫将登輼輬版奏皆稱某諡皇帝登輼輬伏尋今祖祭已奉策諡哀策既在廷遣奠不應猶稱大行且哀策篆書蔵於元宫請依梁儀以𫝊無窮詔可唐貞觀九年髙祖崩詔定山陵制度令依漢長陵故事務在崇厚時限既促功役勞弊祕書監虞世南上封事曰臣聞古之聖帝眀王所以薄葬者非不欲崇髙光眀珍寳異物以厚其親然審而言之髙墳厚壠珍物必備此適所以為親之累也非曰孝也是以深思逺慮安於菲薄以為長乆萬代之計割其常情以定之耳昔漢成帝造延昌二陵制度甚厚功費甚多諫議大夫劉向上書曰孝文居霸陵悽愴悲懐顧謂羣臣曰嗟乎以北山石為椁用紵絮斮陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其無可欲雖無石棺又何戚焉夫死者無終極而國家有廢興釋之所言為無窮計也孝文寤焉遂以薄葬又漢氏之法人君在位三分天下貢賦以一分入山陵武帝厯年長乆比葬陵中不得容物霍光暗於大體奢侈過度其後至更始之敗赤眉入長安破茂陵取物猶不能盡無故聚歛百姓為盗之用甚無謂也魏文帝於首陽東為夀陵作終制可謂達於事矣今為邱壠如此其内不蔵珍寳亦無益也萬代之後人但見髙墳大冡豈謂無金玉也臣之愚計以為漢文覇陵既因山勢雖不起墳自然髙敞今之所卜地勢即平不可不起宜依白虎通所陳周制為三仭之墳其方中制度事事减少且臣下除服用三十六日已依覇陵今為墳壠又以長陵為法非所依也伏願深覽古今為長久之慮書奏不報虞世南又上疏曰漢家即位之初便營陵墓近者十餘嵗逺者十五年方始成就今以數月之間而造數十年事其於人力亦以勞矣漢家大郡五十萬户即目人衆未及往時而工役與之一等此臣所致疑也又公卿上奏請遵遺詔務從節儉於是山陵制度頗有减省䘮期易云古者䘮期無數賈公彦曰此黄帝時也是其心䘮終身也虞書稱三載四海遏宻八音按唐虞雖行心喪更三年為限三王乃制䘮服商髙宗諒闇三年不言檀弓云子張問曰書云髙宗三年不言言乃讙有諸仲尼曰胡為其不然也古者天子崩王世子聼於冡宰周武王崩成王十三而嗣立周公居冡宰攝政明年六月既葬周公冠成王而朝於祖以見諸侯漢文帝遺制革三年之䘮其令天下吏民令到出臨三日皆釋服殿中當臨者皆以旦夕各十五舉音禮畢而罷非旦夕臨時禁無得擅哭臨服大紅十五日小紅十四日纎七日釋服此䘮制者文帝自率已意創而為之非有取於周禮也他不在令中者皆以此令比類従事布告天下使明知朕意䘮期之制自後遵之不改成帝時丞相翟方進母終既𦵏三十六日除服視事自以為身備漢相不敢踰國典然而原渉行父䘮三年名彰天下河間惠王行母䘮三年詔書褒稱以為宗室儀表是則䘮制三年能行者貴之矣及平帝崩王莽欲眩惑天下示忠孝使吏六百石已上皆服䘮三年莽母死但服天子弔諸侯之服一弔再㑹而已令子新都侯宗服䘮三年及元后崩莽返自服三年顛倒姦謬若此後漢安帝初長吏多避事棄官乃令自非父母服不得去職是後吏又守職居官不行三年䘮服矣建光元年尚書孟布奏宜復如建元永平故事絶刺史二千石告寧及父母䘮服又従之至桓帝永興二年復令刺史二千石行三年服永夀二年又使中常侍已下行三年服至延熹元年又皆絶之魏武帝遺令葬畢便除服文帝崩國内服三日蜀劉備臣下發䘮滿三日除服至𦵏復如禮此則魏蜀又異於漢也呉孫權令諸有居任者遭三年之䘮皆湏交代犯者定大辟之科又使代未至不得告告者抵罪其後吴令孟仁聞䘮輙去陸遜陳其素行得减死一等自此遂减晋武帝泰始元年詔諸将吏二千石以下遭三年䘮者聼歸終寧庶人復除徭役二年帝遵漢魏改葬除服按文帝以魏公咸熈二年八月辛邜崩九月癸酉𦵏武帝以十二月丙寅受魏禪改元泰始猶深衣素冠服降席撤膳遂以此禮終三年後居太后之䘮亦如文帝之崩也東晋康帝建元元年正月晦成恭杜皇后周忌有司奏至尊周年應改服詔曰君親名教之重也權制出於近代耳於是素服如舊興寧元年章皇太妃薨哀帝欲服重江彪啓先王制禮應在緦麻服詔降周彪又啓厭屈私情所以上嚴祖考於是制緦麻三月孝武寧康中崇徳太后褚氏崩后於帝為従嫂或疑其服博士徐藻議以禮其夫屬父道者妻皆母道則夫屬君道妻亦后道矣服后宜以資母之義於是帝制周服安帝隆安四年太后李氏崩帝服齊縗三年百僚疑所制服尚書左僕射何澄等議太皇太后名位允正體同皇極理制備盡情禮合伸春秋之義母以子貴既稱夫人禮服宜從正故成風著夫人之號僖公服之三年子於父之所生體尊義重且禮祖不厭孫固宜遂服無屈而縁情立制嫌文不明則宜従重應同為祖母後齊縗周永安皇后無服但一舉哀百官亦一周詔可於西堂設菰廬神武門施凶門栢厯宋永初三年武帝崩蕭太后制三年之服文帝元嘉十七年七月元皇后崩兼司徒給事中劉温持節監䘮神武門設凶門栢厯至西上閤皇太子於東宫崇正殿及永福省並設廬諸皇子未有府第者於西廨設廬太子心䘮三年心喪有禫無禫禮無成文世或兩行皇太子心䘮畢詔使博議有司奏䘮禮有禫以祥變有漸不宜便除心䘮已經十三月大祥十五月宣下以為永制詔可後魏自道武及諸帝悉依漢魏既葬公除後周武帝母叱奴太后崩帝居倚廬朝夕供一溢米羣臣表請累旬乃止及葬帝袒跣陵所行三年之制五服内並依禮隋制皇帝本服大功以上親及外祖父母皇后父母諸官正一品䘮帝不視事三日本服五服内親百官正二品已上䘮並一舉哀太陽虧國忌日本服小功緦麻親百官三品已上舉哀不視事一日皇太后皇后為本服五服内親一舉哀皇太子為本服五服内親及東宫三師三少宫臣三品已上一舉哀唐元陵遺制其䘮儀及山陵制度務従儉約並不以金銀錦綵飾天下節度觀察團練使刺史等並不湏赴哀祀祭之禮亦従節儉其天下人吏勅到後出臨三日皆釋服無禁婚娶祠祀酒肉其宫殿中當臨者朝夕各十五舉音禮固従宜䘮不可乆皇帝宜三日聼政十三日小祥二十五日大祥二十七日而釋服皇帝本服周者凡三朝哭而止本服大功者晡哭而止本服小功以下一舉哀而止天子弔大臣服周制司服職掌王之吉凶衣服王為三公六卿錫縗為諸侯緦縗為大夫士疑縗其首服皆弁絰魏蒋濟奏㑹䘮不宜去冠奏事者上言前㑹故鎮軍朱鑠䘮自卿以下皆去冠以布巾帕額使者侍中散騎則不皆非舊法夫冠成徳之表於服之尊唯君親之䘮小歛之前與服罪之人去冠其餘禮儀雖齊縗之痛有變無廢今為弔去冠其違禮意下博士杜布議以為論語曰羔裘元冠不以弔故周人元冠代以素弁漢去元冠代以布巾亦王者相變之儀未必獨非也古禮野夫著巾古者軍禮韋弁冠今者赤幘此眀轉相變易不可悉還及古今宜因漢氏故事义按漢儀注諸侯王薨天子遣使者往皆言使者素服又禮自天子下逹于士臨殯歛之事去元冠以素弁君子臨䘮必有哀素之心是以去元冠代之以素是以漢中興臨䘮之事與禮合自是之後或言臨䘮使者常吉服布巾以為使者亦宜去元冠代以布巾示不純吉服侍中散騎諸㑹䘮亦宜去元冠代以布巾詔従布議蜀謝慈䘮服圗天子弔三公弁絰錫縗弔大夫士皆弁絰疑縗弔畿内諸侯弁絰緦縗服晉摯虞云凡使弔祭同姓者素冠幘白練深衣噐用皆素異姓者服色噐用皆不變唐之制如開元禮天子為大臣及諸親舉哀後漢明帝時東海恭王薨帝出幸津門亭發哀魏大司馬曹真薨王肅為舉哀表云在禮大臣之䘮天子臨弔諸侯之薨又庭哭焉同姓之臣崇於異姓自秦逮漢多闕不脩暨光武頗遵其禮于時羣臣莫不競勸博士范升上䟽稱揚以為羙可依舊禮臣位而哭之敦睦宗族於是帝幸城東張帳而哭之及鍾太傅薨又臨弔焉晉武帝咸寧二年詔諸王公大臣薨應三朝發哀者踰月舉樂其一朝發哀者三日不舉樂按摯虞决疑注云國家為同姓王公妃主發哀於東堂為異姓公侯都督發哀於朝堂東晋元帝姨廣昌君䘮未葬中丞熊逺表云按禮君於卿大夫比葬不食肉比卒哭不舉樂惻隠之心未忍行吉事故也被尚書符冬至二日小㑹臣以為廣昌君䘮未殯聖㤙垂悼禮大夫死廢一時之祭祭猶可廢而况餘事冬至唯可奉賀而已未便小㑹詔以逺表示賀循循荅云按古者君臣義重雖以至尊之義降而無服三月之内猶錫縗以居不接吉事故春秋晋大夫智悼子未葬平公作樂杜蕢譏之咸寧詔書宜為定制唐之制如開元儀諸侯及公卿大夫為天子服周制䘮服斬縗章諸侯為天子天子至尊也漢戴徳䘮服變除云臣為君笄纚不徒跣始死深衣素冠其餘與子為父同鄭元變除云臣為君不笄纚不徒跣張祖髙問士服天王云何要記唯道大夫服君及家臣服大夫耳不說士恐有脫誤鄭云士服君亦斬縗無眀文而雜記云士居堊室此則士制周制士下吏服士恐亦應同謝沈荅曰朝廷之士服天王斬縗禮之明文也邑宰外任之士居堊室周制要記非脫誤是簡略耳晋尚書問天子崩於今臺書令史以上為皆服斬縗之服不博士卞㩁應琳議禮命士以上皆服斬臺書令史列職天朝皆應服斬又問天子崩今司州及河南郡吏出入𨗳従應易服制不卞㩁荅禮庻人在官者服齊縗三月又近臣服斬𨗳従出入皆應従服又問服隨君輕重今司𨽻服斬下吏服齊為合禮意不㩁荅凡臣従君皆降一等今之牧守皆古諸侯以禮相况輕重宜矣又問禮義服不従今司𨽻為君輕縗義服也下吏為従不每降一等當為君䘮其親者耳古今行事復云何㩁荅禮庻人為國君齊今則不服然吏若都官従士有職司於䘮庭者故宜依庶人在官義耳義服不従謂近臣服君斬服之縗依降一等者之差耳前稱𨗳從指謂近臣魏晋故事云又問諸二千石長吏見在京城皆應制服不博士卞㩁楊雍應琳等上云禮臣為君斬縗自士以上見在官者皆應制服唐元陵遺詔天下人吏勅到後三日釋服伏以公卿百僚不同人吏凖禮臣為君服斬縗三年按髙宗實録昭陵臣下䘮服皆凖漢文帝故事三十六日又按髙宗崩服紀輕重亦依太宗故事中宗睿宗時臣下䘮制並所遵守據禮及故事今百官並合凖遺詔二十七日釋服其小祥内百官並無假日每日平眀詣延英門進名起居不入正衙至臨時赴西内哭訖各歸至小祥日去首絰著巾冠其日早集於西内哭望日及大祥又赴西内哭大祥日除縗冠杖等服惨公服至山陵時却服本縗服事畢除之皇太后長公主及三夫人已下為天子服杖魏晋故事問皇太后三夫人已下皆服斬諸長公主及諸居崇陽園循容服制之宜卞㩁等議按禮與諸侯為兄弟者服斬依禮則公主宜服斬而不杖禮君夫人為長子三年妾為君之嫡子與夫人同則崇陽園循容宜三年又問太后及公主應杖不卞㩁應琳議禮為夫杖自天子達皇太后應杖明矣婦為舅姑禮無杖文皇后不應杖也君之䘮夫人世婦在次則杖即位則使人執之如禮三夫人已下皆杖東晋太元二十一年孝武帝崩李太后制三年之服宋永初三年武帝崩蕭太后制三年之服至唐天寳七載五月宗正卿褒信王璆奏皇妹及女凖禮出嫁後各降本親一等今並降為第二等臣以為執禮故親有虧常典伏請一切依服屬等第為定不在降服限乃請永為常式奉勅依挽歌魯哀公十一年呉子伐齊将戰齊将公孫夏命其徒歌虞殯孔頴達曰虞殯者謂啓殯将虞之歌也今人謂之挽歌漢髙帝時齊王田横自殺其故吏不敢哭泣但随柩叙哀而後代相承以為挽歌盖因於古也晋成帝咸康七年有司聞奏依舊選公卿以下六品子弟六十人為挽郎詔又停之摯虞云漢魏故事大䘮及大臣之䘮執紼者挽歌新禮以為挽歌出於漢武帝役人之勞歌聲哀切遂以為送終之禮雖音曲悽愴非經典所制不宜以歌為名按挽歌傳稱君子作歌惟以告哀以歌為名亦無所嫌宜定新禮如舊宋文帝元嘉十七年元皇后崩詔停選挽郎唐元陵之制屬三繆練紼於輼輬車為挽凡六紼各長三十丈圍七寸執紼挽士虎賁千人皆白布袴褶白布介幘分為兩畨挽郎二百人皆服白布深衣白布介幘助之挽兩邉各一紼挽歌二部各六十四人八人為列執翣品官左右各六人皆服白布褠衣白布介幘左右司馬各八人皆戴白布武弁服白䙱布䙱音屬謂𥜗長無領縁並執鐸代哭百五十人衣幘與挽歌同至時有司引列於輼輬車之前後其百官制鴻臚寺司儀署令掌挽歌三品以上六行三十人六品以上四行十六人皆白練褠衣皆執繹帗秀孝為舉将服魏景元元年傅元舉将僕射陳公薨以諮時賢光祿鄭小同云宜凖禮而以情義斷之服弔服加麻可也三月除之司徒鄭公云昔王司徒為諌議大夫遭舉将䘮雖有不反服今不同古便制齊縗三月漢代名臣皆然宋庾蔚之謂白衣舉秀孝既未為吏故不宜有舊君之服尊卑不同則無正服弔服加麻可也今人為守相刺史又無服但身蒙舉逹㤙深於常謂宜如鄭小同弔服加麻為允今已違適為異與舊君不同議論不奔弔故郡将䘮郡縣吏為守令服魏令曰官長卒官者吏皆齊縗葬訖而除之蜀譙周云大夫受畿内采邑有家臣雖又别典鄉遂之事其下屬皆上相屬其吏非臣也秦漢無服采邑之家臣郡縣吏權假斬縗代至則除晋䘮葬令曰長吏卒官吏皆齊縗以䘮服理事若代者至皆除之武昌太守徐彦與征西桓温牋云蔡徐州薨主簿服斬王征北薨於京都王丞相時在䘮庭徐州主簿以服事諮公公謂輕重可依蔡侯時北中郎劉公薨於淮隂州主簿相承持重至郄太宰薨州主簿改服齊縗中興以来江南皆從之公卿以下至邑宰吏服其君齊縗吏服其君齊縗則無從服之文而由来多有従服者陶大司馬遭兄子䘮府州主簿從服時卞光祿經過自說為太傅主簿太傅䘮母已不從服此是用晉令也郄太宰遭姊䘮吏服惟疑郄問譙秀言不應從服諸主簿仍便從服既服君旁親則服君便應重矣及二公之薨府州主簿服齊縗宋庾蔚之謂晉令云代至而除施之州郡縣員吏宜用齊周之制禮代殊事異理有大斷今州府之君既不乆居其位蹔来之吏不得以為純臣則齊周之制不為輕也君齊矣豈有従乎母妻其猶不從本無義於傍親卞光祿所行是也二公使吏從服姪姊可謂踈㒺其乖逺矣師弟子相為服魏王肅曰禮師弟子無服以弔服加麻臨之哭之於寝凡弔服加麻者三月除之晋賀循謂如朋友之禮異者雖出行猶絰所以尊師也按禮記夫子之䘮門人疑所服子貢曰昔夫子䘮顔囘若䘮子而無服請䘮夫子若䘮父而無服於是門人廬於墓所心䘮三年盖師徒之㤙重也無服者謂無正䘮之服也孔子之䘮二三子皆絰而出注曰為師也然則凢弔服加麻者出則變服矣新禮弟子為師齊縗三月摯虞駁曰仲尼聖師止弔服加麻心䘮三年淺教之師暫學之徒不可皆為之服或有廢興悔吝生焉宜定新禮無服如舊范寗問曰奔䘮禮師哭於廟門外孔子曰師吾哭之寝何邪徐邈荅曰盖殷周禮異也宋庾蔚之謂今受業於先生者皆不執弟子之禮惟師氏之官王命所置故諸王之敬師國子生之服祭酒猶粗依古禮弔服加麻既葬除之但不心䘮三年耳朋友相為服周制檀弓云曾子曰朋友之墓有宿草而不哭焉又曰朋友吾哭寝門之外漢戴徳云以朋友有同道之㤙加麻三月魏劉徳議問曰小記云朋友虞祔而已此謂主幼而為虞祔也若都無主族神不歆非類當為虞祔不田瓊荅曰虞安神也祔以死者祔於祖也既朋友㤙舊歡愛固當安之袝之然後義備也但後日不當祭之耳又問朋友無所歸於我殯若此者當迎彼還已館皆當停柩於何所荅曰朋友無所歸故呼而殯之不謂已殯迎之也於已館而殯之者殯之而已不於西階也晋曹述初問有仁人義士矜㓜攜飬積年為之制服當無疑邪徐邈荅曰禮縁情耳同爨緦又朋友麻通志卷四十五
