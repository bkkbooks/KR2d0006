body:
  text: 通志卷九宋右迪功郎鄭樵漁仲撰吳紀第九孫堅孫䇿大帝會稽王景帝歸命侯孫堅字文臺吳郡富春人蓋孫武之後也少為縣吏年十七與父共載船至錢唐會海賊胡玉等從匏里上掠取賈人財物方於岸上分之行旅皆住船不敢進堅謂父曰此賊可擊請討之父曰非爾所圖也堅行操刀上岸以手東西指麾若分部人兵以羅遮賊狀賊望見以為官兵捕之即委財物散走堅追斬得一級以還父大驚由是顯聞府召署假尉會稽妖賊許昌起於句章自稱陽明皇帝與其子韶扇動郡縣衆以萬數堅以郡司馬募召精勇得千餘人與州郡合討破之是嵗熹平元年也刺史臧旻列上功狀詔書除堅鹽瀆丞數嵗徙盱眙丞又徙下邳丞中平元年黃巾賊帥張角起於魏郡託有神靈遣八使以善道教化天下而潛相連結自稱黃天泰平三月甲子三十六萬一旦俱發天下響應燔燒郡縣殺害長吏漢遣車騎將軍皇甫嵩中郎將朱雋將兵討擊之雋表請堅為佐軍司馬鄉里少長隨在下邳者皆願從堅又募諸商旅及淮泗精兵合千餘人與雋并力奮擊所向無前汝潁賊困迫走保宛城堅身當一面登城先入衆乃蟻附遂大破之雋具以狀聞上拜堅别部司馬邊章韓遂作亂涼州中郎將董卓拒討無功中平三年遣司空張溫行車騎將軍西討章等溫表請堅與參軍事屯長安溫以詔書召卓卓良久乃詣溫溫責讓卓卓應對不順堅時在坐前耳語謂溫曰卓不怖罪而鴟張大語宜以召不時至陳軍法斬之溫曰卓素著威名於隴蜀之間今日殺之西行無依堅曰明公親率王兵威震天下何賴於卓觀卓所言不假明公輕上無禮一罪也章遂跋扈經年當以時進討而卓云未可沮軍疑衆二罪也卓受任無功應召稽留而軒昂自髙三罪也古之名將仗鉞臨衆未有不斷斬以示威者也是以穰苴斬莊賈魏絳戮楊干今明公垂意於卓不即加誅虧損威刑於是在矣溫不忍發舉乃曰君且還卓將疑人堅因起出章遂聞大兵當至黨衆離散皆乞降軍還議者以軍未臨敵不斷功賞然聞堅數卓三罪勸溫斬之無不歎息拜堅議郎時長沙賊區星自稱將軍衆萬餘人攻圍城邑乃以堅為長沙太守到郡親率將士施設方略旬月之間克破星等周朝郭石亦帥徒衆起於零桂與星相應遂越境尋討三郡肅然漢朝録前後功封堅烏程侯靈帝崩卓擅朝政橫恣京城諸州郡並興義兵欲以討卓堅亦舉兵荆州刺史王睿素遇堅無禮堅過殺之比至南陽衆數萬人南陽太守張咨聞軍至晏然自若堅以牛酒禮咨咨明日亦答詣堅酒酣長沙主簿入白堅前移南陽而道路不治軍資不具請收主簿推問意故咨大懼欲去兵陳四周不得出有頃主簿復入白堅南陽太守稽停義兵使賊不時討請收出案軍法從事便牽咨於軍門斬之郡中震栗無求不獲前到魯陽與袁術相見術表堅行破虜將軍領豫州刺史遂治兵於魯陽城當進軍討卓遣長史公仇稱將卒從事還州督促軍糧施帳幔於城東門外祖道送稱官屬並會卓遣步騎數萬人逆堅輕騎數十先到堅方行酒談笑敕部曲整頓行陳無得妄動後騎漸益堅徐罷坐導引入城乃謂左右曰向堅所以不即起者恐兵相蹈藉諸君不得入耳卓兵見堅士衆甚整不敢攻城乃引還堅移屯梁東大為卓軍所攻堅與數十騎潰圍而出堅常著赤罽幘乃脫幘令親近將祖茂著之卓騎爭逐茂故堅從間道得免茂困迫下馬以幘冠冡間燒柱因伏草中卓騎望見圍繞數重定近覺是柱乃去堅復相收兵合戰於陽人大破卓軍梟其都督華雄等是時或間堅於術術懷疑不運軍糧陽人去魯陽百餘里堅夜馳見術畫地計校曰所以出身不顧上為國家討賊下慰將軍家門之私讎堅與卓非有骨肉之怨也而將軍受譖潤之言還相嫌疑術踧踖即調發軍糧堅還屯卓憚堅猛壯乃遣將軍李傕等來求和親令堅列疏子弟任刺史郡守者許表用之堅曰卓逆天無道蕩覆王室今不夷汝三族縣示四海則吾死不瞑目豈將與乃和親邪復進軍大谷拒雒九十里卓尋徙都長安燒雒邑堅前入雒修諸陵平塞卓所發掘訖引軍還住魯陽初平三年術使堅征荆州擊劉表表遣黃祖逆於樊鄧之間堅擊破之追渡漢水遂圍襄陽單馬行峴山為祖軍士所射殺兄子賁帥將士衆就術術復表賁為豫州刺史堅四子䇿權翊匡權既稱尊號諡堅曰武烈皇帝䇿字伯符堅初興義兵䇿將母徙居舒與周瑜相友收合士大夫江淮間人咸向之堅薨還葬曲阿乃渡江居江都徐州牧陶謙深忌䇿䇿舅吳景時為丹陽太守䇿乃載母徙曲阿與吕範孫河俱就景因緣召募得數百人興平元年從袁術術甚竒之以堅部曲還䇿太傅馬日磾杖節安集關東在夀春以禮辟䇿表拜懷義校尉術大將喬蕤張勳皆傾心敬焉術常歎曰使術有子如孫郎死復何恨䇿騎士有罪逃入術營隱於內廄䇿指使人就斬之訖詣術謝術曰兵人好叛當共疾之何為謝也由是軍中益畏憚之術初許䇿為九江太守已而更用丹陽陳紀後術欲攻徐州從廬江太守陸康求米三萬斛康不與術大怒䇿昔曽詣康康不見使主簿接之䇿常䘖恨術遣䇿攻康謂曰前錯用陳紀每恨本意不遂今若得康廬江真卿有也䇿攻康拔之術復用其故吏劉勳為太守䇿益失望先是劉繇為揚州刺史州舊治夀春夀春術已據之繇乃渡江治曲阿時吳景尚在丹陽䇿從兄賁又為丹陽都尉繇至皆迫逐之景賁退舍歷陽繇遣樊能于糜陳橫屯江津張英屯當利口以拒術術自用故吏琅邪惠衢為揚州刺史更以景為督軍中郎將與賁共將兵擊英等連年不克䇿乃説術乞助景等平定江東術表䇿為折衝校尉行殄冦將軍兵財千餘騎數十匹賔客願從者數百人比至歷陽衆五六千䇿母先自曲阿徙於歷陽䇿又徙母阜陵渡江轉鬬所向皆破莫敢當其鋒而軍令整肅百姓懷之䇿為人美姿顔好笑語性闊達聽受善於用人是以士民見者莫不盡心樂為致死劉繇棄軍遁逃諸郡守皆捐城郭奔走吳人嚴白虎等衆各萬餘人處處屯聚吳景等欲先擊破虎等乃至會稽䇿曰虎等羣盜非有大志此成禽耳遂引兵渡浙江據會稽屠東冶乃攻破虎等盡更置長吏䇿自領會稽太守復以吳景為丹陽太守以孫賁為豫章太守分豫章為廬陵郡以賁弟輔為廬陵太守丹陽朱治為吳郡太守彭城張昭廣陵張紘秦松陳端等為謀主時袁術僭號策以書責而絶之曹公表䇿為討逆將軍封為吳侯後術死長史楊𢎞大將張勳等將其衆欲就䇿廬江太守劉勳要擊悉虜之收其珍寶以歸䇿聞之偽與勳好盟勳新得術衆時豫章上繚宗民萬餘家在江東䇿勸勳攻取之勳既行䇿輕軍晨夜襲拔廬江勳衆盡降勳獨與麾下數百人自歸曹公是時袁紹方強而䇿并江東曹公力未能逞且欲撫之乃以女弟配䇿小弟匡又為子章取賁女皆禮辟䇿弟權翊又命揚州刺史嚴象舉權茂才建安五年曹公與袁紹相拒於官渡䇿陰欲襲許迎漢帝密治兵部署諸將未發會為故吳郡太守許貢客所殺先是䇿殺貢貢小子與客亡匿江邊䇿單騎出卒與客遇客擊傷䇿創甚請張昭等謂曰中國方亂夫以吳越之衆三江之固足以觀成敗公等善相吾弟呼權佩以印綬謂曰舉江東之衆決機於兩陳之間與天下爭衡卿不如我舉賢任能各盡其心以保江東我不如卿至夜時卒時年二十六權稱尊號追諡䇿曰長沙桓王封子紹為吳侯後改封上虞侯紹卒子奉嗣孫皓時訛言奉當立誅死大皇帝諱權字仲謀兄䇿既定諸郡時權年十五以為陽羡長郡察孝廉州舉茂才行奉義校尉漢以䇿逺修職貢遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟雖各才秀眀達然皆祿祚不終惟中弟孝廉形貌竒偉骨體不恆有大貴之表年又最夀爾試識之建安四年從䇿征廬江太守劉勳勳破討黃祖於沙羡五年䇿薨以事授權權哭未及息䇿長史張昭謂權曰孝廉此寧哭時邪且周公立法而伯禽不師非欲違父時不得行也况今姦宄競逐豺狼滿道乃欲哀親戚顧禮制是猶開門而揖盜未可以為仁也乃改易權服扶令上馬使出巡軍是時惟有會稽吳郡丹陽豫章廬陵然深險之地猶未盡從而天下英豪布在州郡賔旅寄寓之士以安危去就為意未有君臣之固張昭周瑜等謂權可與共成大業故委心而服事焉曹公表權為討虜將軍領會稽太守屯吳使丞之郡行文書事待張昭以師傅之禮而周瑜程普吕範等為將率招延俊秀聘求名士魯肅諸葛瑾等始為賔客分部諸將鎮撫山越討不從命七年權母吳氏薨八年權西伐黃祖破其舟軍惟城未克而山冦復動還過豫章使吕範平鄱陽會稽程普討樂安太史慈領海昏韓當周泰吕蒙等為劇縣令長九年權弟丹陽太守翊為左右所害以從兄瑜代翊十年權使賀齊討上饒分為建平縣十二年西征黃祖虜其人民而還十三年春權復征黃祖祖先遣舟兵拒軍都尉吕蒙破其前鋒而凌統董襲等盡鋭攻之遂屠其城祖挺身亡走騎士馮則追梟其首虜其男女數萬口是嵗使賀齊討黟歙黟音伊歙音攝分歙為始新新定犂陽休陽縣以六縣為新都郡荆州牧劉表死魯肅乞奉命弔表二子且以觀變肅未到而曹公已臨其境表子琮舉衆以降劉備欲南濟江肅與相見因傳權旨為陳成敗備進住夏口使諸葛亮詣權遣周瑜程普等行是時曹公新得表衆形勢甚盛諸議者皆望風畏憚多勸權迎之惟瑜肅執拒之之議意與權同瑜普為左右督各領萬人與備俱進遇於赤壁大破曹公軍曹公燒其餘船引退士卒飢疫死者大半備瑜等復追至南郡曹公遂北還留曹仁徐晃於江陵使樂進守襄陽時甘寧在夷陵為仁黨所圍用吕蒙計留凌統以拒仁以其半救寧軍以勝反權自率衆圍合肥使張昭攻九江之當塗昭兵不利權攻城踰月不能下曹公自荆州還遣張喜將騎赴合肥未至權退十四年瑜仁相守嵗餘所殺傷甚衆仁委城走權以瑜為南郡太守劉備表權行車騎將軍領徐州牧備領荆州牧屯公安十五年分豫章為鄱陽郡分長沙為漢昌郡以魯肅為太守屯陸口十六年權徙治秣陵明年城石頭改秣陵為建業聞曹公將來侵作濡須塢十八年正月曹公攻濡須權與相拒月餘曹公望權軍歎其齊肅乃退初曹公恐江濵郡縣為權所略徵令內移民轉相驚自廬江九江蘄春廣陵戶十餘萬皆東渡江江西遂虛合肥以南惟有皖城十九年五月權征皖城閏月克之獲廬江太守朱光及參軍董和男女數萬口是嵗劉備定蜀權以備已得益州令諸葛瑾從求荆州諸郡備不許曰吾方圖涼州涼州定乃盡以荆州與吳耳權曰此假而不反徒欲以虛辭引嵗月遂置南三郡長吏關羽盡逐之權大怒乃遣吕蒙督鮮于丹徐忠孫規等兵二萬取長沙零陵桂陽三郡使魯肅以萬人屯巴邱以禦關羽權住陸口為諸軍節度蒙到二郡皆服惟零陵太守郝普未下會備到公安使關羽將三萬兵至益陽權乃召蒙等使還助肅蒙使人誘普普降盡得三郡將守因引軍還與孫皎潘璋并魯肅兵並進拒羽於益陽未戰會曹公入漢中備懼失益州使使求和權令諸葛瑾報更尋盟好遂分荆州長沙江夏桂陽以東屬權南郡零陵武陵以西屬備備歸而曹公已還權反自陸口遂征合肥合肥未下徹軍還兵皆就路權與凌統甘寧等在津北為魏將張遼所襲統等以死扞權權乘駿馬越津橋得去二十一年冬曹公次于居巢遂攻濡須二十二年春權令都尉徐詳詣曹公請降公報使修好誓重結婚二十三年十月權將如吳親乘馬射虎於庱亭庱音攄陵反馬為虎所傷權投以雙戟虎却廢常從張世擊以戈獲之二十四年關羽圍曹仁於襄陽曹公遣左將軍于禁救之會漢水暴起羽以舟兵盡虜禁等步騎三萬送江陵惟城未拔權內憚羽外欲以為已功箋與曹公乞以討羽自效曹公且欲使羽與權相持以鬬之驛傳權書使曹仁以弩射示羽羽猶豫不能去閏月權征羽先遣吕蒙襲公安獲將軍士仁蒙到南郡南郡太守麋芳以城降蒙據江陵撫其老弱釋于禁之囚陸遜别取宜都獲秭歸枝江夷道還屯夷陵守峽口以備蜀關羽還當陽西保麥城權使誘之羽偽降立幡旗為象人於城上因遁走兵皆解散尚十餘騎權先使朱然潘璋斷其徑路十二月璋司馬馬忠獲羽及其子平都督趙纍等於章鄉遂定荆州是嵗大疫盡除荆州民租稅曹公表權為驃騎將軍假節領荆州牧封南昌侯權遣校尉梁寓奉貢于漢及令王惇市馬又遣朱光等還二十五年春正月曹公薨太子丕代為丞相魏王改年為延康秋魏將梅敷使張儉求見撫納南陽陰酇築陽山都中廬五縣民五千家來附冬魏嗣王稱尊號改元為黃初二年四月劉備稱帝於蜀權自公安都鄂改名武昌以武昌下雉尋陽陽新柴桑沙羡六縣為武昌郡五月建業言甘露降八月城武昌十一月魏策命封權為吳王授金虎符第一至第五左竹使符第一至第十以大將軍使持節督交州領荆州牧事仍加九錫令上故驃騎將軍南昌侯印綬是嵗劉備率軍來伐至巫山秭歸使使誘導武陵蠻夷假與印傳許之封賞於是諸縣及五溪民皆反為蜀權以陸遜為督督朱然潘璋等以拒之遣都尉趙咨使魏魏帝問曰吳王何等主也咨對曰聰眀仁智雄略之主也帝問其狀咨曰納魯肅於凡品是其聰也拔吕蒙於行陳是其眀也獲于禁而不害是其仁也取荆州而兵不血刃是其智也據三州虎視於天下是其雄也屈身於陛下是其略也帝欲封權子登權以登年幼上書辭封重遣西曹掾沈珩陳謝并獻方物立登為王太子黃武元年春正月陸遜部將軍宋謙等攻蜀五屯皆破之斬其將三月鄱陽言黃龍見蜀軍分據險地前後五十餘營遜隨輕重以兵應拒自正月至閏月大破之臨陳所斬及投兵降首數萬人劉備奔走僅以身免初權外託事魏而誠心不欵魏欲遣侍中辛毗尚書桓階往與盟誓并徵任子權辭讓不受秋九月魏乃命曹休張遼臧霸出洞口曹仁出濡須曹真夏侯尚張郃徐晃圍南郡權遣吕範等督五軍以舟軍拒休等諸葛瑾潘璋楊粲救南郡朱桓以濡須督拒仁時揚越蠻夷多未平集內難未弭故權卑辭上書求自改厲若罪在難除必不見置當奉還土地民人乞寄命交州以終餘年文帝報曰省君上事欵誠深至良用慨然已即詔敕諸軍不得妄進若登身朝到夕召兵還此言之誠有如大江權知魏必責任子遂改年臨江拒守冬十一月大風範等兵溺死者數千餘軍還江南曹休使臧霸以輕船五百敢死萬人襲攻徐陵燒攻城車殺略數千人將軍全琮徐盛追斬魏將尹盧殺獲數百十二月權使太中大夫鄭泉聘劉備于白帝始復通也然猶與魏文帝相往來至後年乃絶是嵗改夷陵為西陵二年春正月曹真分軍據江陵中洲是月城江夏山改四分用乾象歷三月曹仁遣將軍常雕等以兵五千乘油船晨渡濡須中洲仁子泰因引軍急攻朱桓桓兵拒之遣將軍嚴圭等擊破雕等是月魏軍皆退夏四月權君臣勸即尊號不許劉備薨于白帝五月曲阿言甘露降先是戲口守將晉宗殺將王直以衆叛如魏魏以為蘄春太守數犯邊境六月權令將軍賀齊督麋芳劉邵等襲蘄春邵等生虜宗冬十一月蜀使中郎將鄧芝來聘三年夏遣輔義中郎將張溫聘于蜀秋八月赦死罪九月魏文帝出廣陵望大江曰彼有人焉未可圖也乃還四年夏五月丞相孫邵卒六月以太常顧雍為丞相皖口言木連理冬十二月鄱陽賊彭綺自稱將軍攻沒諸縣衆數萬人是嵗地連震五年春令曰軍興日久民離農畔父子夫婦不能相恤孤甚愍之今北虜縮竄方外無事其下州郡有以寬息是時陸遜以所在少榖表令諸將增廣農畝權報曰甚善令孤父子親自受田車中八牛以為四耦雖未及古人亦欲與衆均等其勞也秋七月權聞魏文帝崩征江夏圍石陽不克而還蒼梧言鳳凰見分三郡惡地十縣置東安郡以全琮為太守平討山越冬十月陸遜陳便宜勸以施德緩刑寬賦息調權納之令有司盡寫科條使郎中褚逢齎以就遜及諸葛瑾意所不安令損益之是嵗分交州置廣州俄復舊六年春正月諸將獲彭綺閠月韓當子琮以其衆降魏七年春三月封子慮為建昌侯罷東安郡夏五月鄱陽太守周魴偽叛誘魏將曹休秋八月權至皖口使將軍陸遜督諸將大破休於石亭大司馬吕範卒是嵗改合浦為珠官郡黃龍元年春公卿百司皆勸權正尊號夏四月夏口武昌並言黃龍鳳皇見丙申蒞南郊即皇帝位是日大赦改年追尊父破虜將軍堅為武烈皇帝母吳氏為武烈皇后兄討逆將軍䇿為長沙桓王吳王太子登為皇太子將吏皆進爵加賞初興平中吳中童謡曰黃金車班蘭耳闓昌門出天子五月使校尉張剛管篤之遼東六月蜀遣衛尉陳震慶權踐位權因與蜀盟作為誓書遙分天下以豫青徐幽屬吳兖冀并涼屬蜀其司州之土以函谷關為界秋九月權遷都建業因故府不改館徵上大將軍陸遜輔太子登掌武昌留事二年春正月魏作合肥新城詔立都講祭酒以教學諸子遣將軍衛溫諸葛直將甲士萬人浮海求夷洲及亶洲亶洲在海中長老傳言秦始皇帝遣方士徐福將童男童女數千人入海求蓬萊神山及仙藥止此洲不還歷世相承有數萬家其土人民時有至會稽貨布會稽東縣人海行亦有遭風流移至亶洲者所在絶逺卒不可得至但得夷洲數千人還三年春二月遣太常潘濬率衆五萬討武陵蠻夷衛溫諸葛直皆以違詔無功下獄誅夏有野蠶成繭大如卵由拳野稻自生改為禾興縣中郎將孫布詐降以誘魏將王淩淩以軍迎布冬十月權以大兵潛伏於阜陵俟之淩覺而走會稽南始平言嘉禾生十二月丁卯大赦改明年元也嘉禾元年春正月建昌侯慮卒三月遣將軍周賀校尉裴潛乘海之遼東秋九月魏將田豫要擊斬賀于成山冬十月魏遼東太守公孫淵遣校尉宿舒閬中令孫綜稱藩于權并獻貂馬權大悅加淵爵位二年春正月詔以公孫淵為使持節督幽州領青州牧遼東太守燕王大赦天下與淵更始眀下州郡咸使聞知特下燕國奉宣詔令三月遣舒綜還使太常張彌執金吾許晏將軍賀達等將兵萬人金寶珍貨九錫備物乘海授淵舉朝大臣自丞相雍已下皆諫以為淵未可信而寵待太厚但可遣吏兵數百護送舒綜權終不聽淵果斬彌等送其首于魏沒其兵資權大怒欲自征淵尚書僕射薛綜等切諌乃止是嵗權向合肥新城遣將軍全琮征六安皆不克還三年春正月詔曰兵久不輟民困於役嵗或不登其寬諸逋勿復督課夏五月權遣陸遜諸葛瑾等屯江夏沔口孫韶張承等向廣陵淮陽權率大衆圍合肥新城是時蜀相諸葛亮出武功權謂魏明帝不能逺出而帝遣兵助司馬懿拒亮自率水軍東征未至夀春權退還孫韶亦罷秋八月以諸葛恪為丹陽太守討山越九月朔隕霜傷穀冬十一月太常潘濬平武陵蠻夷事畢還武昌詔復曲阿為雲陽丹徒為武進廬陵賊李桓羅厲等為亂四年夏遣吕岱討桓等秋七月有雹魏使以馬求易珠璣翡翠玳瑁權曰此皆孤所不用而可得馬何苦而不聽其交易五年春鑄大錢一當五百詔使吏民輸銅計銅畀直設盜鑄之科三月武昌言甘露降於禮賔殿輔吳將軍張昭卒中郎將吾粲獲李桓將軍唐咨獲羅厲等十月不雨至于夏冬十月彗星見于東方鄱陽賊彭旦等為亂六年春正月詔中外羣寮議長吏遭喪去官詳為科禁顧談議以為奔喪立科輕則不足以禁孝子之情重則本非應死之罪雖嚴刑益設違奪必少若偶有犯者加其刑則恩所不忍有減則法廢不行愚以為長吏在逺茍不告語勢不得知比選代之間若有傳者必加大辟則長吏無廢職之負孝子無犯重之刑將軍胡綜議以為喪紀之禮雖有典制茍無其時所不得行方今戎事軍國異容而長吏遭喪知有科禁公敢干突茍念聞憂不奔之耻不計為臣犯禁之罪此由科防本輕所致忠節在國孝道立家出身為臣焉得兼之故為忠臣不得為孝子宜定明文示以大辟若故違犯有罪無赦以殺止殺行之一人其後必絶丞相雍奏從大辟其後吳令孟宗喪母奔赴已而自拘於武昌以聽刑陸遜陳其素行因為之請權乃減宗一等後不得以為比因此遂絶二月陸遜討彭旦等其年皆破之冬十月遣衛將軍全琮襲六安不克諸葛恪平山越事畢北屯廬江赤烏元年春鑄當千大錢夏吕岱討廬陵賊畢還陸口秋八月武昌言麒麟見有司奏言麒麟者太平之應宜改年號詔曰間者赤烏集於殿前朕所親見若神靈以為嘉祥者改年宜以赤烏為元於是改年步夫人卒追贈皇后初權信任校事吕一一性苛慘用法深刻太子登數諫權不納大臣由是莫敢言後一姦罪發露伏誅權引咎責躬乃使中書郎袁禮告謝諸大將因問時事所當損益禮還復有詔責數諸葛瑾步騭朱然吕岱等悉令盡言直諌以匡不逮二年春三月遣使者羊衜鄭胄將軍孫怡之遼東擊魏守將張持髙慮等虜得男女零陵言甘露降夏五月城沙羡冬十月將軍蔣祕南討夷賊祕所領都督廖式殺臨賀太守嚴綱等自稱平南將軍與弟潛共攻零陵桂陽及搖動交州蒼梧鬱林諸郡衆數萬人遣將軍吕岱唐咨討之嵗餘皆破三年春正月詔以民多征役嵗又水旱年榖有損而吏或不良侵奪民時以致飢饉自今以來督軍郡守其謹察非法當農桑時以役事擾民者舉正以聞夏四月大赦詔諸郡縣治城郭起譙樓穿塹發渠以備盜賊冬十一月民飢詔開倉廪以振貧窮四年春正月大雪平地深三尺鳥獸死者大半夏四月遣衛將軍全琮略淮南決芍陂燒安城邸閣收其人民威北將軍諸葛恪攻六安琮與魏將王淩戰于芍陂中郎將秦晃等十餘人戰死車騎將軍朱然圍樊大將軍諸葛瑾取柤中五月太子登卒是月魏太傅司馬懿救樊六月軍還閠月大將軍瑾卒秋八月陸遜城邾五年春正月立子和為太子大赦改禾興為嘉興百官奏立皇后及四王詔曰今天下未定民物勞瘁且有功者或未録飢寒者尚未恤猥割土壤以豐子弟崇爵位以寵妃妾孤甚不取其釋此議三月海鹽縣言黃龍見夏四月禁進獻御減大官膳秋七月遣將軍聶友校尉陸凱以兵三萬討珠崖儋耳是嵗大疫有司又奏立后及諸王八月立子霸為魯王六年春正月新都言白虎見諸葛恪征六安破魏將謝順營收其民人冬十一月丞相顧雍卒十二月扶南王范旃遣使獻樂人及方物是歲司馬懿率軍入舒諸葛恪自皖遷于柴桑七年春正月以上大將軍陸遜為丞相秋宛陵言嘉禾生是嵗步隲朱然等各上疏云自蜀還者咸言欲背盟與魏交通多作舟船繕治城郭又蔣琬守漢中聞司馬懿南向不出兵乘虛以掎角之反委漢中還近成都事已彰灼無所復疑宜為之備權揆其不然曰吾待蜀不薄聘享盟誓無所負之何以致此又司馬懿前來入舒旬日便退蜀在萬里何知緩急而便出兵乎昔魏欲入漢川此間始嚴亦未舉動會聞魏還而止蜀寧可復以此有疑邪又人家治國舟船城郭何得不獲今此間治軍寧復欲以禦蜀邪人言苦不可信朕為諸君破家保之蜀竟自無謀如權所籌八年春二月丞相陸遜卒夏雷霆犯宫門柱又擊南津大橋楹茶陵縣鴻水溢出流漂居民二百餘家秋七月將軍馬茂等圖逆夷三族八月大赦遣校尉陳勳將屯田及作士三萬人鑿句容中道自小其至雲陽西城通會市作邸閣九年春二月車騎將軍朱然征魏柤中斬獲千餘夏四月武昌言甘露降秋九月以驃騎步隲為丞相車騎朱然為左大司馬衛將軍全琮為右大司馬鎮南吕岱為上大將軍威北將軍諸葛恪為大將軍十年春正月右大司馬全琮卒二月權適南宫三月改作太初宫諸將及州郡皆義作夏五月丞相步隲卒冬十月赦死罪十一年春正月朱然城江陵二月地仍震三月宫成夏四月雨雹雲陽言黃龍見五月鄱陽言白虎見詔公卿百司勉修所職匡朕不逮以答休貺十二年春三月左大司馬朱然卒四月有兩烏銜鵲墮東館丙寅驃騎將軍朱據領丞相燎鵲以祭十三年夏五月日至熒惑入南斗秋七月犯魁第二星而東八月丹陽句容及故鄣寧國諸山崩鴻水溢詔原逋責給貸種食廢太子和處故鄣魯王霸賜死冬十月魏將文欽偽叛以誘朱異權遣吕據就異以迎欽異等持重欽不敢進十一月立子亮為太子遣軍十萬作堂邑塗塘以淹北道十二月魏大將軍王昶圍南郡荆州刺史王基攻西陵遣將軍戴烈陸凱往拒之皆引還是嵗神人授書告以改年立后太元元年夏五月立皇后潘氏大赦改年初臨海羅陽縣有神自稱王表周旋民間語言飲食與人無異然不見其形又有一婢名紡績是月遣中書郎李崇齎輔國將軍羅陽王印綬迎表表隨崇俱出與崇及所在郡守令長談論崇等無以易所歷山川輒遣婢與其神相聞秋七月崇與表至權於蒼龍門外為立第舍數使近臣齎酒食往表説水旱小事往往有驗秋八月朔大風江海涌溢平地深八尺吳髙陵松柏斯拔郡城南門飛落冬十一月大赦權祭南郊還寢疾十二月驛徴大將軍恪拜為太子太傅詔省繇役減征賦除民所患苦二年春正月立故太子和為南陽王居長沙子奮為齊王居武昌子休為琅邪王居虎林二月大赦改元為神鳯皇后潘氏薨諸將吏數詣王表請福表亡去夏四月權薨時年七十一諡曰大皇帝秋七月葬蔣陵陳夀曰孫權屈身忍辱任才尚計有句踐之竒英人之傑矣故能自擅江表成鼎峙之業然性多嫌忌果於殺戮暨臻末年彌以滋甚至于讒説殄行允嗣廢斃豈所謂貽厥孫謀以燕翼子者哉其後葉陵遲遂致覆國未必不由此也大皇帝黃武七年黃龍三年嘉禾六年赤烏十三年太元元年神鳯元年即位三十一年會稽王諱亮字子眀權少子也權春秋髙而亮最少故尤留意姊全公主常譖太子和母子心不自安因倚權意欲豫自結數稱述全尚女勸為亮納赤烏十三年和廢權遂立亮為太子以全氏為妃太元元年夏亮母潘氏立為皇后冬權寢疾徴大將軍諸葛恪為太子太傅會稽太守滕允為太常並受詔輔太子明年四月權薨太子即尊號大赦改元建興是歲魏嘉平四年也閏月以恪為帝太傅允為衛將軍領尚書事上大將軍吕岱為大司馬諸文武在位皆進爵班賞冗官加等冬十月太傅恪率軍遏巢湖巢音祖了反城東興使將軍全端守西城都尉留略守東城十二月朔丙申大風雷電魏使將軍諸葛誕胡遵等步騎七萬圍東興將軍王昶攻南郡母邱儉向武昌甲寅恪以大兵赴敵戊午兵及東興交戰大破魏軍韓綜桓嘉等是月雷雨天災武昌端門改作端門又災內殿二年春正月丙寅立皇后全氏大赦庚午王昶等皆還二月軍還自東興大行封賞三月恪率軍伐魏夏四月圍新城大疫兵卒死者大半秋八月恪引軍還冬十月大饗武衛將軍孫峻伏兵殺恪於殿堂大赦以峻為丞相封富春侯十一月有大鳥五見于春申明年改元五鳯元年夏大水秋吳侯英謀殺峻覺英自殺冬十一月有星茀于斗牛二年春正月魏鎮東將軍母邱儉前將軍文欽以淮南之衆西入戰于樂嘉閏月壬辰峻及驃騎將軍吕據左將軍留贊率兵襲夀春軍及東興聞欽等敗壬寅兵進于橐臯欽詣峻降淮南餘衆數萬口來奔魏諸葛誕入夀春峻引軍還二月及魏將軍曹珍遇于髙亭交戰珍敗績留贊為誕别將蔣班所敗於菰陂贊及將軍孫楞蔣修等皆遇害三月使鎮南將軍朱異襲安豐不克秋七月將軍孫儀張怡林恂等謀殺峻發覺儀自殺恂等伏辜陽羡離里山大石自立使衛尉馮朝城廣陵拜將軍吳穰為廣陵太守留略為東海太守是嵗大旱十二月作太廟以馮朝為監軍使者督徐州諸軍事民飢軍士怨畔太平元年春二月朔建業火峻用征北大將軍文欽計將征魏八月先遣欽及驃騎吕據車騎劉纂鎮南朱異前將軍唐咨自江都入淮泗九月丁亥峻卒以從弟偏將軍綝為侍中武衛將軍領中外諸軍事召還據等聞綝代峻大怒己丑大司馬吕岱卒壬辰太白犯南斗據欽咨等表薦衛將軍滕允為丞相綝不聽癸卯更以允為大司馬代吕岱駐武昌據引兵還欲討綝綝遣使以詔書告喻欽咨等使取據冬十月丁未遣孫憲及丁奉施寬等以舟兵逆據於江都遣將軍劉丞督步騎攻允允兵敗夷滅己酉大赦改年辛亥獲吕據於新州十一月以綝為大將軍假節封永康侯孫憲與將軍王惇謀殺綝事覺綝殺惇迫憲令自殺十二月使五官中郎將刁元告亂于蜀二年春二月甲寅大雨震電乙卯雪大寒以長沙東部為湘東郡西部為衡陽郡會稽東部為臨海郡豫章東部為臨川郡夏四月亮臨正殿大赦始親政事綝所表奏多見難問又科兵子弟年十八已下十五以上得三千餘人選大將子弟年少有勇力者為之將帥亮曰吾立此軍欲與之俱長日於苑中習焉五月魏征東大將軍諸葛誕以淮南之衆保夀春城遣將軍朱成稱臣上疏又遣子靚長史吳綱諸牙門子弟為質六月使文欽唐咨全端等步騎三萬救誕朱異自虎林率衆襲夏口夏口督孫一奔魏秋七月綝率衆救夀春次于鑊里朱異至自夏口綝使異為前部督與丁奉等將介士五萬解圍八月會稽南部反殺都尉鄱陽新都民為亂廷尉丁密步兵校尉鄭胄將軍鍾離牧率軍討之朱異以軍士乏食引還綝大怒九月朔己巳殺異於鑊里辛未綝自鑊里還建業甲申大赦十一月全緒子禕儀以其母奔魏十二月全端懌等自夀春城詣司馬師三年春正月諸葛誕殺文欽三月司馬師克夀春誕及左右戰死將吏已下皆降秋七月封故齊王奮為章安侯詔州郡伐宫材自八月沉隂不雨四十餘日亮以綝專恣與太常全尚將軍劉丞謀誅綝九月戊午綝以兵取尚遣弟恩攻殺丞于蒼龍門外召大臣會宫門黜亮為會稽王時年十六會稽王建興五鳳各二年太平三年即位七年景皇帝諱休字子烈權第六子年十三從中書郎射慈郎中盛沖受學太元二年正月封琅邪王居虎林四月權薨休弟亮承統諸葛恪秉政不欲諸王在濵江兵馬之地徙休於丹陽郡太守李衡數以事侵休休上書乞徙他郡詔徙會稽居數嵗夢乘龍上天顧不見尾覺而異之孫亮廢己未孫綝使宗正孫楷與中書郎董朝迎休休初聞問意疑楷朝具述綝等所以奉迎本意留一日二夜遂發十月戊寅行至曲阿有老公干休叩頭曰事久變生天下喁喁願陛下速行休善之是日進及布塞亭武衛將軍恩行丞相事率百僚以乘輿法駕迎於永昌亭築宫以武帳為便殿設御坐己卯休至望便殿止住使孫楷先見恩楷還休乘輦進羣臣再拜稽首休升便殿謙不即御坐止東廂户曹尚書前即階下讚奏丞相奉璽符休三讓羣臣三請休曰將相諸侯咸推寡人寡人敢不承受璽符羣臣以次奉引休就乘輿百官陪位綝以兵千人迎於半野拜于道側休下車答拜即日御正殿大赦改元是嵗魏甘露三年也永安元年冬十月壬午詔以大將軍綝為丞相荆州牧增食五縣武衛將軍恩為御史大夫衛將軍中軍督封縣侯威逺將軍授為右將軍縣侯偏將軍幹雜號將軍亭侯長水校尉張布輔導勤勞以布為輔義將軍封永康侯董朝親迎封為鄉侯又詔曰丹陽太守李衡以往事之嫌自拘有司夫射鉤斬袪在君為君遣衡還郡勿令自疑己丑封孫皓為烏程侯皓弟德錢唐侯謙永安侯十一月甲午風四轉五復蒙霧連日綝一門五侯皆典禁兵權傾人主有所陳述敬而不違於是益恣休恐其有變數加賞賜丙申詔前日與大將軍定䇿告廟人名依故事應加爵位者促施行之戊戌詔曰大將軍掌中外諸軍事事統煩多其加衛將軍御史大夫恩侍中與大將軍分省諸事壬子詔曰諸吏家有五人三人兼重為役父兄在都子弟給郡縣吏既出限米軍出又從至於家事無經護者朕甚愍之其有五人三人為役聽其父兄所欲留為留一人除其米限軍出不從又曰諸將吏奉迎陪位在永昌亭者皆加位一級頃之休聞綝逆謀隂與張布圖計十二月戊辰臘百僚朝賀公卿升殿詔武士縳綝即日伏誅己巳詔以左將軍張布討姦臣加布為中軍督封布弟惇為都亭侯給兵三百人惇弟恂為校尉詔置學官立五經博士科見吏之中及將吏子弟有志好學者各令就業一嵗課試差其品第加以位賞二年春正月震電三月備九卿官詔廣開田業輕其賦稅差科強羸課其田畝務令優均令諸卿尚書悉心咨度以稱朕意三年春三月西陵言赤鳥見秋用都尉嚴密議作浦里塘會稽郡謡言王亮當還為天子而亮宫人告亮使巫禱祠有惡言有司以聞黜為候官侯遣之國道自殺衛送者伏罪以會稽南部為建安郡分宜都置建平郡四年夏五月大雨水泉涌溢秋八月遣光祿大夫周奕石偉巡行風俗察將吏清濁民所疾苦為黜陟之詔九月布山言白龍見是嵗安吳民陳焦死埋之六日更生穿土中出五年春二月白虎門北樓災秋七月始新言黃龍見八月壬午大雨震電水泉涌溢乙酉立皇后朱氏戊子立子雨單為太子大赦休為四男作名字欲令難犯而易避皆鈔舊文會合作之太子名雨單雨單音如湖水灣澳之灣字莔莔音如迄今之迄次子名􅀢􅀢音如兕觥之觥字􅀢􅀢音如元礥首之礥次子名壾壾音如草莽之莽字昷昷音如舉物之舉次子名音如褒衣下寬大之褒字㷏㷏音如有所擁持之擁冬十月以衛將軍濮陽興為丞相廷尉丁密光祿勳孟宗為左右御史大夫休以丞相興及左將軍張布有舊恩委之政事布典宫省興關軍國休鋭意於典籍欲畢覽百家之言又好射雉春夏之間常晨出夜還唯此時舍書休欲與博士祭酒韋曜博士盛沖講論道藝曜沖素皆切直布恐入侍發其隂失令已不得專因妄飾説以拒遏之休責布曰此特君等恐曜沖輩道臣下姦變之事故耳布懼叩頭陳謝休雖心不能悅然恐布以此疑懼竟如布意廢其講業不復使沖等入是嵗使察戰到交址調孔爵大豬六年夏四月泉陵言黃龍見五月交址郡吏吕興等反殺太守孫諝諝先是科郡上手工千餘人送建業而察戰至恐復見取故興等因此扇動兵民招誘諸夷也冬十月蜀以魏見伐來告癸未建業石頭小城火燒西南百八十丈甲申使大將軍丁奉督諸軍向魏夀春將軍留平别詣施績於南郡議兵所向將軍丁封孫異如沔中皆救蜀蜀主劉禪降魏問至然後罷吕興既殺孫諝使使如魏請太守及兵丞相興建取屯田萬人以為兵分武陵為天門郡七年春正月大赦二月鎮軍陸抗撫軍步協征西將軍留平建平太守盛曼率衆圍蜀巴東守將羅憲夏四月魏將新附督王稚浮海入句章略長吏賞林及男女二百餘口將軍孫越徼得一船獲三十人秋七月海賊破海鹽殺司鹽校尉駱秀使中書郎劉川發兵廬陵豫章民張節等為亂衆萬餘人魏使將軍胡烈步騎二萬侵西陵以救羅憲陸抗等引軍退復分交州置廣州壬午大赦癸未休寢疾口不能言乃手書召丞相興入令子雨單出拜之休把興臂而指雨單以託之頃之而薨時年三十諡曰景皇帝景帝永安七年歸命侯諱皓字元宗權子和之子一名彭祖字皓宗孫休立封皓為烏程侯遣就國西湖民景養相皓當大貴皓隂喜而不敢泄休薨是時蜀初亡而交址擕叛國內震懼貪得長君左典軍萬彧昔為烏程令與皓相善稱皓才識眀斷是長沙桓王之儔也又加之好學奉遵法度屢言之於丞相濮陽興左將軍張布興布説休妃太后朱欲以皓為嗣朱曰我寡婦人安知社稷之慮茍吳國無隕宗廟有賴可矣於是遂迎立皓時年二十三改元大赦是嵗魏咸熙元年也元興元年八月以上大將軍施績大將軍丁奉為左右大司馬張布為驃騎將軍加侍中諸增位班賞一皆如舊九月貶太后為景皇后追諡父和曰文皇帝尊母何為太后十月封休太子雨單為豫章王次子汝南王次子梁王次子陳王立皇后滕氏皓既得志粗暴驕盈多忌諱好酒色大小失望興布竊悔之或以譖皓十一月誅興布十二月孫休葬定陵封后父滕牧為髙密侯舅何洪等三人皆列侯是嵗魏置交址太守之郡司馬昭為魏相國遣昔吳夀春城降將徐紹孫彧銜命齎書陳事勢利害以申喻皓甘露元年三月皓遣使隨紹彧報書曰知以髙世之才處宰輔之任漸導之功勤亦至矣孤以不德階承統緒思與賢良共濟世道而以壅隔未有所緣嘉意允著深用依依今遣光祿大夫紀陟五官中郎將𢎞璆宣明至懷紹行到濡須召還殺之徙其家屬建安始有白紹稱美中國者故也夏四月蔣陵言甘露降於是改年大赦秋七月皓逼殺景后朱氏亡不在正殿於苑中小屋治喪衆知其非疾病莫不痛切又送休四子於吳小城尋復追殺大者二人九月從西陵督步闡表徙都武昌御史大夫丁固右將軍諸葛靚鎮建業陟璆至洛陽遇司馬師卒十一月乃遣還皓至武昌又大赦以零陵南部為始安郡桂陽南部為始興郡十二月晉受禪寶鼎元年正月遣大鴻臚張儼五官中郎將丁忠弔祭晉文帝及還儼道病死忠説皓曰北方守戰之具不設弋陽可襲而取皓訪羣臣鎮西大將軍陸凱曰夫兵不得已而用之耳且三國鼎立已來更相侵伐無嵗寧居今強敵新并巴蜀有兼土之資而遣使求親欲息兵役不可謂其求援於我今敵形勢方強而欲徼幸求勝未見其利也車騎將軍劉纂曰天生五才誰能去兵譎詐相雄有自來矣若其有闕庸可棄乎宜遣間諜以觀其勢皓隂納纂言且以蜀新平故不行然遂自絶八月所在言得大鼎於是改年大赦以陸凱為左丞相常侍萬彧為右丞相冬十月永安山賊施但等聚衆數千人劫皓庶弟永安侯謙出烏程取孫和陵上鼓吹曲蓋比至建康衆萬餘人丁固諸葛靚逆之於牛屯大戰但等敗走獲謙謙自殺分會稽為東陽郡分吳丹陽為吳興郡以零陵北部為邵陵郡十二月皓還都建業衛將軍滕牧留鎮武昌二年春大赦右丞相萬彧出鎮巴邱夏六月起顯明宫冬十二月皓移居之是嵗分豫章廬陵長沙為安成郡三年春二月以左右御史大夫丁固孟仁為司徒司空秋九月皓出東關丁奉至合肥是嵗遣交州刺史劉俊前部督修則等入擊交址為晉將毛炅等所破皆死兵散還合浦建衡元年春正月立子瑾為太子及淮陽東平王冬十月改年大赦十一月左丞相陸凱卒遣監軍虞汜威南將軍薛珝蒼梧太守陶璜由荆州監軍李勗督軍徐存從建安海道皆就合浦擊交址二年春萬彧還建業李朂以建安道不通利殺導將馮斐引軍還三月天火燒萬餘家死者七百人夏四月左大司馬施績卒殿中列將何定白少府李朂枉殺馮斐擅徹軍退還朂及徐存家屬皆伏誅秋九月何定將兵五千人上夏口獵都督孫秀奔晉是嵗大赦三年春正月晦皓舉大衆出華里皓母及妃妾皆行東觀令華核等固爭乃還是嵗汜璜破交址禽殺晉所置守將九真日南皆還屬大赦分交址為新昌郡諸將破扶嚴置武平郡以武昌督范慎為太尉右大司馬丁奉司空孟仁卒西苑言鳯皇集改明年元鳯皇元年秋八月徴西陵督步闡闡不應據城降晉遣樂鄉都督陸抗圍取闡闡衆悉降闡及同計數十人皆夷三族大赦是嵗右丞相萬彧被譴憂死徙其子弟於廬陵何定姦穢發聞伏誅皓以其惡似張布追改定名為布二年春三月以陸抗為大司馬司徒丁固卒秋九月改封淮陽為魯東平為齊又封陳留章陵等九王凡十一王王給三千兵大赦皓愛妾或使人至市劫奪百姓財物司市中郎將陳聲素皓幸臣也恃皓寵遇繩之以法妾以訴皓皓大怒假他事燒鋸斷聲頭投其身於四望之下是嵗太尉范慎卒三年會稽妖言章安侯奮當為天子臨海太守奚熙與會稽太守郭誕書非論國政誕但白熙書不白妖言送付建安作船遣三郡督何植收熙熙發兵自衛斷絶海道熙部曲殺熙送首建業夷三族秋七月遣使者二十五人分至州郡科出亡叛大司馬陸抗卒自改年及是嵗連大疫分鬱林為桂林郡天册元年吳郡言掘地得銀長一尺廣三分刻上有年月字於是大赦改年天璽元年吳郡言臨平湖自漢末草穢壅塞今更開通長老相傳此湖塞天下亂此湖開天下平又於湖邊得石函中有小石青白色長四寸廣二寸餘刻上作皇帝字於是改年大赦會稽太守車浚湘東太守張詠不出算緡就在所斬之徇首諸郡秋八月京下督孫楷降晉鄱陽言歷陽山石文理成字凡二十云楚九州渚吳九州都揚州士作天子四世治太平始又吳興陽羡山有空石長十餘丈名曰石室在所表為大瑞乃遣兼司徒董朝兼太常周處至陽羡縣封禪國山明年改年大赦以協石文焉天紀元年夏夏口督孫慎出江夏汝南燒略居民初騶子張俶多所譖白纍遷為司直中郎將封侯甚見寵愛是嵗姦情發聞伏誅二年秋七月立成紀宣威等十一王王給三千兵大赦三年夏郭馬反馬本合浦太守修允部曲督允轉桂林太守疾病住廣州先遣馬將五百兵至郡安撫諸夷允死兵當分給馬等纍世舊軍不樂離别皓時又科實廣州户口馬與部曲將何典王族吳述殷興等因此恐動兵民合聚人衆攻殺廣州督虞授馬自號都督交廣二州諸軍事安南將軍興廣州刺史述南海太守典攻蒼梧族攻始興八月以軍師張悌為丞相牛渚都督何植為司徒執金吾滕循為司空未拜轉鎮將軍假節領廣州牧率萬人從東道討馬興族遇於始興未得前馬殺南海太守劉略逐廣州刺史徐旗皓又遣徐陵督陶濬將七千人從西道命交州牧陶璜部伍所領及合浦鬱林諸郡兵當與東西軍共擊馬有鬼目菜生工人黃耉家依緣棗樹長丈餘莖廣四寸厚三分又有買菜生工人吳平家髙四尺厚三分如枇杷形廣尺八寸下莖廣五寸兩邉生葉緑色東觀案圖名鬼目作芝草買菜作平慮草遂以耉為侍芝郎平為平慮郎皆銀印青綬冬晉命鎮東大將軍司馬胄向塗中安東將軍王渾揚州刺史周浚向牛渚建威將軍王戎向武昌平南將軍胡奮向夏口鎮南將軍杜預向江陵龍驤將軍王濬廣武將軍唐彬浮江東下太尉賈充為大都督量宜處要盡軍勢之中陶濬至武昌聞北軍大出停駐不前初皓每宴會羣臣無不咸令沈醉置黃門郎十人特不與酒侍立終日為司過之吏宴罷之後各奏其闕失忤視之咎謬言之愆罔有不舉大者即加威刑小者輒以為罪後宫數千而采擇無己又激水入宫宫人有不合意者輒殺流之或剝人之靣或鑿人之眼岑昏險諛貴幸致位九列好興功役衆所患苦是以上下離心莫為皓盡力蓋積惡已極不復堪命故也四年春立中山代等十一王大赦濬彬所至則土崩瓦解靡有禦者預又斬江陵督伍延渾復斬丞相張悌丹陽太守沈瑩等所在戰克三月丙寅殿中親近數百人叩頭請皓殺岑昏皓惶憒從之戊辰陶濬從武昌還即引見問水軍消息對曰蜀船皆小今得二萬兵乘大船戰自足擊之於是合衆受濬節鉞明日當發其夜衆悉逃走而王濬順流將至司馬胄王渾皆臨近境皓用光祿勳薛瑩中書令胡沖等計分遣使奉書於濬胄渾遣太常張夔等奉所佩印綬以請命於胄壬申王濬最先到於是受皓之降解縳焚櫬延請相見胄以皓致印綬於已遣使送皓皓舉家西遷以太康元年五月丁亥集于京邑四月甲申詔曰孫皓窮迫歸降前詔待之以不死今皓垂至意猶愍之其賜號為歸命侯進給衣服車乘田三十頃嵗給榖五千斛錢五十萬絹五百匹綿五百斤皓太子瑾拜中郎諸子為王者拜郎中五年皓死于洛陽時年四十二葬河南縣界初陸抗之克步闡也皓意張大乃使尚廣筮并天下遇同人之頤廣對曰吉庚子嵗青蓋當入洛陽故皓不修其政而恆有窺上國之意是嵗也實在庚子云歸命侯元興元年甘露元年寶鼎三年建衡三年鳯皇二年天册元年天璽元年天紀四年即位十六年右吳四主合五十九年為晉所滅通志卷九
