body:
  text: 通志卷一百十五下宋右迪功郎鄭樵漁仲撰列傳第二十八下劉馥字元頴沛國相人也避亂揚州建安初説袁術將戚寄秦翊使率衆與俱詣太祖太祖悅之辟為司徒掾後孫䇿所置廬江太守李述攻殺揚州刺史嚴象廬江梅乾雷緒陳蘭等聚衆數萬在江淮間郡縣殘破太祖方有袁紹之難謂馥可任以東南之事遂表為揚州刺史馥既受命單馬造合肥空城建立州治南懷乾緒等皆安集之貢獻相繼數年中恩化大行百姓樂其政流民越江山而歸者以萬數於是聚諸生立學校廣屯田興治芍陂及茹陂七門吳塘諸堨以溉稻田官民有畜又高為城壘多積木石編作草苫數千萬枚益貯魚膏數千斛為戰守備建安十三年卒孫權率十萬衆攻圍合肥城百餘日時天連雨城欲崩於是以苫蓑覆之夜然脂照城外視賊所作而為備賊以破走揚州士民益追思之以為雖董安于之守晉陽不能過也及陂塘之利至今為用馥子靖黃初中從黃門侍郎遷廬江太守詔曰卿父昔為彼州今卿復典此郡可謂克負荷者也轉任河內遷尚書賜爵關內侯出為河南尹散騎常侍應璩書與靖曰入作納言出臨京任富民之術日引月長藩落高峻絶穿窬之心五種别出遠水火之災農器必具無失時之闕蠶麥有苫備之用無雨濕之虞封符指期無流連之吏鰥寡孤獨蒙廪振之實加之以明擲幽微重之以秉憲不撓有司供承王命百里垂拱仰辦雖昔趙張三王之治未足以方也靖為政類如此初雖如碎密終於百姓便之有馥遺風母喪去官後為大司農衛尉進封廣陸亭侯邑三百戶上疏陳儒訓之本曰夫學者治亂之軌儀聖人之大教也自黃初以來崇立太學二十餘年而寡有成者蓋由博士選輕諸生避役高門子弟恥非其倫故無學者雖有其名而無其人雖設其教而無其功宜高選博士取行為人表經任人師者掌教國子依遵古法使二千石以上子孫年從十五皆入太學明制絀陟榮辱之路其經明行修者則進之以崇德荒教廢業者則退之以懲惡舉善而教不能則勸浮華交遊不禁自息矣闡𢎞大化以綏未賔六合承風遠人來格此聖人之教致治之本也後遷鎮北將軍假節都督河北諸軍事靖以為經常之大法莫善於守防使民夷有别遂開拓邊守屯據險要又修廣戾渠陵大堨水溉灌薊南北三更種稻邊民利之嘉平六年薨追贈征北將軍進封建成鄉侯諡曰景侯子熙嗣司馬朗字伯達河內溫人也祖父雋頴川太守父防京兆尹防有子八人朗最長次懿懿即晉宣王也朗九嵗人有道其父字者朗曰慢人親者必不敬其親者也客謝之十二試經為童子郎時監試者以其身體壯大疑朗匿年劾問朗朗曰朗之內外纍世長大朗雖稚弱無仰高之風損年以求早成非志所為也監試者異之後關東兵起故冀州刺史李邵家居野王近山險欲徙居溫朗謂邵曰唇齒之喻豈惟虞虢溫與野王即是也今去彼而居此是為避朝亡之期耳且君國人之望也今寇未至而先徙帶山之縣必駭是搖動民之心而開姦宄之原也竊為郡內憂之邵不從邊山之民果亂內徙或為寇鈔是時董卓遷天子都長安因留洛陽朗父防為治書御史當徙西以四方雲擾乃遣朗將家屬還本縣或有告朗欲逃亡者執以詣卓卓謂朗曰卿與吾亡兒同嵗幾大相負朗因曰明公以高世之德遭陽九之會清除羣穢廣舉賢士此誠虛心垂慮將興至治也威德以隆功業以著而兵難日起州郡鼎沸郊境之內民不安業捐棄居産流亡竄匿雖四關設禁重加刑戮猶不絶息此朗之所以於邑也願明公監觀往事少加三思即榮名並於日月伊周不足侔也卓曰吾亦悟之卿言有意朗知卓必亡恐見留即散財物以賂遺卓用事者求歸鄉里到謂父老曰董卓悖逆為天下所讐此忠臣義士奮發之時也郡與京都境壤相接洛東有成臯北界大河天下興義兵者若未得進其勢必停於此此乃四分五裂戰爭之地難以自安不如及道路尚通舉宗東到黎陽黎陽有營兵趙威孫鄉里舊姻為監營謁者統兵馬足以為主若後有變徐復觀望未晚也父老戀舊莫有從者惟同縣趙咨將家屬俱與朗往焉後數月關東諸郡起兵衆數十萬皆集滎陽及河內諸將不能相一縱兵鈔略民人死者且半久之關東兵散太祖與吕布相持於濮陽朗乃將家還溫時嵗大飢人相食朗收恤宗族教訓諸弟不為衰世解業年二十二太祖辟為司空掾屬除成臯令以病去官復為堂陽長其治務寬惠不行鞭杖而民不犯禁先時民有徙充都內者後縣調當作船徙民恐其不辦乃相率私還助之其見愛如此遷元城令入為丞相主簿朗以為天下土崩之勢由秦滅五等之制而郡國無搜狩習戰之備故也今雖五等未可復行可令州郡並置兵外備四夷內威不軌於策為長又以為宜復井田往者以民各有纍世之業難中奪之是以至今今承大亂之後民人分散土業無主皆為公田宜及此時復之議雖未施行然州郡領兵朗本意也遷兖州刺史政化大行百姓稱之雖在軍旅常粗衣惡食儉以率下雅好人倫典籍鄉人李覿等盛得名譽朗常顯貶下之後覿等敗時人服焉鍾繇王粲著論云非聖人不能致太平朗以為伊顔之徒雖非聖人使得數世相承太平可致建安二十二年與夏侯惇臧霸等征吳到居巢軍士大疫朗躬巡視致醫藥遇疾卒時年四十七遺命布衣幅巾斂以時服州人追思之明帝即位封朗子遺昌武亭侯邑百戶朗弟孚又以子望繼朗後遺薨望子洪嗣初朗所與俱徙趙咨官至太常為世好士梁習字子虞陳郡柘人也為郡綱紀太祖為司空辟召為漳長纍轉乘氏海西下邳令所在有治績還為西曹令史遷為屬并土新附習以别部司馬領并州刺史時承高幹荒亂之餘胡狄在界張雄跋扈吏民亡叛入其部落兵家擁衆作為寇害更相扇動往往棊跱習到官誘諭招納皆禮召其豪右稍稍薦舉使詣幕府豪右已盡乃次發諸丁強以為義從又因大軍出征分請以為勇力吏兵已去之後稍移其家前後送鄴凡數萬口其不從命者興兵致討斬首千數降附者萬計單于恭順名王稽顙部曲服事供職同於編戶邊境肅清百姓布野勤勸農桑令行禁止貢達名士咸顯於世語在常林傳太祖嘉之賜爵關內侯更拜為真長老稱詠以為自所聞識刺史未有及習者建安十八年州并屬冀州更拜議郎西部都督從事統屬冀州總故部曲又使於上黨取大材供鄴宫室習表置屯田都尉二人領客六百夫於道次耕種菽粟以給人牛之費後單于入侍西北無虞習之績也文帝踐阼復置并州復為刺史進封申門亭侯邑百戶政治常為天下最太和二年徵拜大司農習在州二十餘年而居處貧窮無方面珍物明帝異之禮賜甚厚四年薨子施嗣初濟隂王思與習俱為西曹令史思因直日白事失太祖指太祖大怒教召主者將加重辟時思近出習代往對已被收執矣思乃馳還自陳已罪罪應受死太祖歎習之不言思之識分曰何意吾軍中有二義士乎後同時擢為刺史思領豫州思亦能吏然苛碎無大體官至九卿封列侯張既字德容馮翊高陵人也世單家富為人有容儀少小工書疏為郡門下小吏自惟門寒念無以自達乃常畜好刀筆及版奏伺諸大吏有乏者輒給與以是見識焉後歷右職舉孝亷不行太祖為司空辟未至舉茂才除新豐令治為三輔第一時袁尚拒太祖於黎陽遣所署河東太守郭援并州刺史高幹及胸奴單于取平陽發使西與關中諸將合從司𨽻校尉鍾繇遣既説將軍馬騰等既為言利害騰等從之騰遣子超將兵萬餘人與鍾繇會擊幹援大破之斬援首幹及單于皆降其後幹復舉并州反河內張晟衆萬餘人無所屬寇崤澠間河東衛固𢎞農張琰各起兵以應之太祖以既為議郎參繇軍事使西徵諸將馬騰等皆引兵會擊晟等破之斬琰固首幹奔荆州封既武始亭侯太祖將征荆州而騰等分據關中太祖復遣既喻騰等令釋部曲東還騰已許之而更猶豫既恐為變乃移諸縣促儲偫二千石郊迎騰不得已發東太祖表騰為衛尉子超為將軍統其衆後超反既從太祖破超於華隂西定關右以既為京兆尹招懷流民興復縣邑百姓懷之魏國建既為尚書出為雍州刺史太祖謂既曰還君本州可謂衣繡晝行矣從征張魯别從散關入討叛氐收其麥以給軍食魯降既説太祖拔漢中民以實長安及三輔其後與曹洪破吳蘭於下辨又與夏侯淵宋建别攻臨洮狄道平之是時太祖徙民以充河北隴西天水南安民相恐動擾擾不安既假三郡人為將吏者休課使治屋宅作水碓民心遂安太祖將拔漢中守恐劉備北取武都氐以逼關中以問既既曰可勸使北出就穀以避賊前至者厚其寵賞則先者知利後必慕之太祖從其策乃自到漢中引出諸軍令既之武都徙氐五萬餘落出居扶風天水界是時武威顔俊張掖和鸞酒泉黃華西平麴演等並舉郡反自號將軍更相攻擊俊遣使送母及子詣太祖為質求助太祖問既既曰俊等外假國威內生悖逆計定勢足後即反耳今方事定蜀且宜兩存而闢之猶卞莊子之刺虎坐收其斃也太祖曰善歲餘鸞遂殺俊武威王祕又殺鸞是時不置涼州自三輔拒西域皆屬雍州文帝即王位初置涼州以安定太守鄒岐為刺史張掖張進執郡守舉兵拒岐黃華麴演各逐故太守舉兵以應之既進兵為護羌校尉蘇則聲勢故則得以有功既進爵都鄉侯涼州盧水胡伊健奴妾治元多等反河西大擾帝憂之曰非既莫能治涼州乃召鄒岐以既代之詔曰昔賈復請擊郾賊光武笑曰執金吾擊郾吾復何憂卿謀略過人今則其時以便宜從事勿復先請遣護軍夏侯儒將軍費曜等繼其後既至金城欲渡河諸將皆以為兵少道險未可深入既曰道雖險非井陘之隘夷狄烏合無左車之計今武威危急赴之宜速遂渡河賊七千餘騎逆拒軍於鸇隂口既掦聲軍從鸇隂乃潛由且次出至武威胡以為神引還顯美既已據武威曜乃至儒等猶未達既勞賜將士欲進軍擊胡諸將皆曰士卒疲倦虜衆氣鋭難與爭鋒既曰今軍無見糧當因敵為資若虜見兵合退依深山追之則道險窮餓兵還則出候寇鈔如此兵不得解所謂一日縱敵患在數世也遂前軍顯美胡騎數千因大風欲放火燒營將士皆恐既夜藏精卒三千人為伏使參軍成公英督千餘騎挑戰敕使陽退胡果爭奔之因發伏截其後首尾進擊大破之斬首獲生以萬數帝甚悅詔嘉其功徙封西鄉侯增邑二百并前四百戶酒泉蘇衡反與羌豪鄰戴及丁令胡萬餘騎攻邊縣既與夏侯儒擊破之衡及鄰戴等皆降遂上疏請與儒治左城築鄣塞置烽候邸閣以備胡西羌恐率衆二萬餘落降其後西平麴光等殺其郡守諸將欲擊之既曰唯光等造反郡人未必悉同若便以軍臨之吏民羌胡必謂國家不别是非更使皆相持著此為虎附翼也光等欲以羌胡為援今先使羌胡鈔擊重其賞募所虜獲者皆以畀之外沮其勢內離其交必不戰而定乃檄告諭諸羌為光等所詿誤者原之能斬賊帥送首者當加封賞於是光部黨斬送光首其餘咸安堵如故既臨二州十餘年政惠著聞其所禮辟扶風龎延天水楊阜安定胡遵酒泉龎淯敦煌張恭周生烈等終皆有名位黃初四年薨詔愍傷之賜其小子翁歸爵關內侯明帝即位追諡曰肅侯子緝嗣緝以中書郎稍遷東莞太守嘉平中女為皇后徵拜光祿大夫位特進封妻向為安城鄉君緝與中書令李豐同謀誅語在夏侯元傳溫恢字曼基太原祁人也父恕為涿郡太守卒恢年十五送喪還歸鄉里家足於財恢曰世方亂安以富為一朝盡散賑施宗族州里高之比之郇越舉孝亷為廪邱長鄢陵廣川令彭城魯相所在見稱入為丞相主簿出為揚州刺史太祖曰甚欲使卿在親近顧以為不如此州事大故書云股肱良哉庶事康哉得無當得蔣濟為治中邪時濟見為丹陽太守乃遣濟還州又語張遼樂進等曰揚州刺史曉達軍事動靜與共咨議建安二十四年孫權攻合肥是時諸州皆屯戍恢謂兖州刺史裴潛曰此間雖有賊不足憂而畏征南方有變今水生而子孝縣軍無有遠備關侯驍鋭乘利而進必將為患於是以樊城之事詔召潛及豫州刺史吕貢等潛等緩之恢密語潛曰此必襄陽之急欲赴之也所以不為急會者不欲驚動遠衆一二日必有密書促卿進道張遼等又將被召遼等素知王意後召前至卿受其責矣潛受其言置輜重更為輕裝速發果被促令遼等尋各見召如恢所策文帝踐阼以恢為侍中出為魏郡太守數年遷涼州刺史持節領護羌校尉道病卒時年四十五詔愍悼之賜恢子生爵關內侯生早卒爵絶恢卒後汝南孟建為涼州刺史有治名官至征東將軍賈逵字梁道河東襄陵人也自為兒童戲弄常設部伍祖父習異之曰汝大必為將帥口授兵法數萬言初為郡吏守絳邑長郭援之攻河東所經城邑皆下逵堅守援攻之不拔乃召單于并軍急攻之城將潰絳父老與援要不害逵絳人既潰援聞逵名欲使為將以兵劫之逵不動左右共引逵使叩頭逵叱之曰安有國家長吏為賊叩頭援怒欲斬之絳吏民聞將殺逵皆乘城呼曰負要殺我賢君寧俱死耳左右義之多為請遂得免初逵過皮氏曰爭地先據者勝及圍急知不免乃使人間行送印綬歸郡且曰急據皮氏援既并絳衆將進兵逵恐其先得皮氏乃以他計疑援謀人祝奧援由是留七日郡從逵言故得無敗後舉茂才除澠池令高幹之反張琰將舉兵以應之逵不知其謀往見琰聞變起欲還恐見執乃與琰畫計如與同謀者琰信之時縣寄治蠡城城塹不固逵從琰求兵修城諸欲為亂者皆不隱其謀故逵得盡誅之遂修城拒琰琰敗逵以喪祖父去官司徒辟為掾以議郎參司𨽻軍事太祖征馬超至𢎞農曰此西道之要以逵領𢎞農太守召見計事大悅之謂左右曰使天下二千石悉如賈逵吾何憂其後發兵逵疑屯田都尉藏亡民都尉自以不屬郡言語不順逵怒收之數以罪檛折腳坐免然太祖心善逵以為丞相主簿始逵為諸生略通大義取其可用最好春秋左傳及為牧守常自課讀之月常一遍太祖征劉備先遣逵至斜谷視形勢道逄水衡載囚人數十車逵以軍事急輒竟重者一人餘皆放遣太祖善之拜諫議大夫與夏侯尚並掌軍計及太祖崩喪還洛陽逵典喪事時鄢陵侯彰行越騎將軍從長安來赴問逵先王璽綬所在逵正色曰太子在鄴國有儲副璽綬非君侯所宜問也遂奉梓宫還鄴及文帝即王位以鄴縣戶數萬在都下多不法乃以逵為鄴令月餘遷魏郡太守大軍出征復為丞相主簿祭酒逵嘗坐人為罪王曰叔向猶十世宥之況逵功德親在其身乎從至黎陽津渡者亂行逵斬之乃整至譙以逵為豫州刺史是時天下初復州郡多不攝逵曰州本以御史出監諸郡以六條詔書察長吏二千石已下故其狀皆言嚴能鷹揚有督察之才不言安靜寬仁有愷悌之德也今長吏慢法盜賊公行州知而不紏天下復何取正乎兵曹從事受前刺史假逵到官數月乃還逵考竟其二千石已下阿縱不如法者舉奏免之帝曰逵真刺史矣布告天下當以豫州為法賜爵關內侯州南與吳接逵明斥候繕甲兵為戰守之備賊不敢犯外修軍旅內治民事遏鄢汝造新陂又斷山溜長溪水造小弋陽陂又通運渠二百餘里所謂賈侯渠者也黃初中與諸將並征吳破吕範於洞浦進封陽里亭侯加建威將軍明帝即位增邑二百戶并前四百戶時孫權在東關當豫州南去江四百餘里每出兵為冦輒西從江夏東從廬江國家征伐亦由淮沛是時州軍在項汝南弋陽諸郡守境而已權無北方之虞東西有急并兵相救故常少敗逵以為宜開直道臨江若權自守則二方無救若二方無救則東關可取乃移屯潦口陳攻取之計帝善之吳將張嬰王崇率衆降大和二年帝使逵督前將軍滿寵東莞太守胡質等四軍從西陽直向東關曹休從皖司馬懿從江陵逵至五將山休更表賊有請降者求深入應之詔懿駐軍逵東與休合進逵度賊無東關之備必并軍於皖休深入與賊戰必敗乃部署諸將水陸並進行二百里得生賊言休戰敗權遣兵斷夾石諸將不知所出或欲待後軍逵曰休兵敗於外路絶於內進不能戰退不得還安危之機不及終日賊以軍無後繼故至此今疾進出其不意所謂先人以奪其心也賊見吾兵必走若待後軍賊已斷險兵雖多何益乃兼道進軍多設旗鼓為疑兵賊見逵軍遂退逵據夾石以軍糧給休軍休軍乃振初逵與休不善黃初中文帝欲假逵節休曰逵性剛素侮易諸將不可為督帝乃止及夾石之敗微逵則休幾為虜矣會逵病篤謂左右曰受國厚恩恨不斬孫權以下見先帝喪事一不得有所修作薨諡曰肅侯子充嗣豫州吏民追思之為刻石立祠青龍中帝東征乘輦入逵祠詔曰昨過項見賈逵碑像念之愴然古人有言患名之不立不患年之不長逵存有忠勳沒而見思可謂死而不朽者矣其布告天下以勸將來充咸熙中為中護軍入晉為元功之臣晉史有傳李孚字子憲巨鹿人也興平中本郡民人飢困孚為諸生當種薤欲以成計有從索者亦不與一莖亦不自食故時人謂能行意後為吏建安中袁尚領冀州以孚為主簿後尚與其兄談爭鬬尚出軍詣平原留别駕審配守鄴城孚隨尚行會太祖圍鄴尚還欲救鄴行未到尚疑鄴中守備少復欲令配知外動止與孚議所遣孚答尚言今使小人往恐不足以知外內且恐不能自逹孚請自往尚問孚當何所將孚曰聞鄴圍甚堅多人則覺以為直當將三騎足矣尚從其計孚自選溫信者三人不語所之皆敕使具脯糧不得持兵仗各給快馬遂辭尚來南所在止亭傳及到梁淇使從者斫問事杖三十枚繫著馬邊自著平上幘將三騎投暮詣鄴下是時大將軍雖有禁令而芻牧者多故孚因此夜到以一鼓中自稱都督歷北圍循表而東從東圍表又循圍而南步步呵責守圍將士隨輕重行其罰歷太祖營前徑南過從南圍角西折當章門復責怒守圍者收縛之因開其圍馳到城下呼城上人城上人以繩引孚得入配等見孚悲喜鼓譟稱萬嵗守圍者以狀聞太祖笑曰此非徒得入也方且復得出孚事訖欲得還而顧外圍必急不可復冒謂已使命當速反乃隂心計請配曰今城中穀少無用老弱為也不如驅出之以省穀也配從其計乃復夜簡别數千人皆使持白幡從三門並出降又使人人持火孚乃無何將本所從人作降人服隨輩夜出時守圍將士聞城中悉降火光照曜但共觀火不復視圍孚出北門遂從西北角突圍得去其明太祖聞孚已得出抵掌笑曰果如吾言也孚北見尚尚甚歡喜會尚不能救鄴破走至中山而袁談又追擊尚尚走孚與尚相失遂詣談復為談主簿東還平原太祖進攻談談戰死孚還城城中雖畢降尚擾亂未安孚權宜欲得見太祖乃騎詣牙門稱冀州主簿李孚欲口白密事太祖見之孚叩頭謝太祖問其所白孚言今城中強弱相陵心皆不定以為宜令新降為內所識信者宣傳明教太祖謂孚曰卿便還宣之孚跪請教太祖曰便以卿意宣也孚還入城宣教使各安故業不得相侵陵城中以安乃還命太祖以孚為良足用也會為人所間裁署冗散出守解長名為嚴能稍遷至司𨽻校尉時年七十餘矣其於精斷無衰而術略不損於故終於陽平太守孚本姓馮後改為李楊沛字孔渠馮翊萬年人也初平中為公府令史以牒除為新鄭長興平末人多飢窮沛課民畜乾椹收䝁豆閲其有餘以補不足如此積得千餘斛藏在小倉會太祖為兖州刺史西迎天子所將千餘人皆無糧過新鄭沛謁見乃皆進乾椹太祖大喜及太祖輔政遷沛為長社令時曹洪賔客在縣界徵調不肯如法沛先檛折其腳遂殺之由此太祖以為能纍遷九江東平樂安太守並有治迹坐與督軍爭鬬髠刑五嵗輸作未竟會太祖出征在譙聞鄴下頗不奉科禁乃發教選鄴令當得嚴能如楊沛比故沛從徒中起為鄴令己拜太祖見之問曰以何治鄴沛曰竭盡心力奉宣科法太祖曰善顧謂坐席曰諸君此可畏也賜其生口十人絹百匹既欲以勵之且以報乾椹也沛辭去未到而軍中豪右曹洪劉勳等畏沛各遣家馳騎告子弟使各自檢勑沛為令數年以公能轉為護羌都尉建安十六年馬超反大軍西討沛隨軍都督孟津渡事太祖已南過其餘未畢而中黃門前渡忘持行軒私北還取之從吏求小船欲獨先渡吏呵不肯黃門與吏爭言沛問黃門有疏邪黃門云無疏沛怒曰何知汝不欲逃邪遂使人捽其頭與杖欲捶之而逸得去衣幘皆裂壞自訴於太祖太祖曰汝不死為幸矣由是聲名益振及關中平代張既為京兆尹黃初中儒雅並進而沛本以事能見用遂以議郎冗散里巷沛前後宰歷城守不以私計介意又不肯以事貴人故身退之後家無餘積治疾於家借舍從兒無他奴婢後占河南夕陽亭部荒田二頃起瓜牛廬居止其中其妻子凍餓沛病亡鄉人親友及故吏為殯葬也任峻字伯達河南中牟人也漢末擾亂關東皆震中牟令楊原愁恐欲棄官走峻説原曰董卓首亂天下莫不側目然而未有先發者非無其心也勢未敢耳明府若能倡之必有和者原曰為之奈何峻曰今關東有十餘縣能勝兵者不減萬人若權行河南尹事總而用之無不濟矣原從其計以峻為主簿峻乃為原表行尹事使諸縣堅守遂發兵會太祖起關東入中牟界衆不知所從峻獨與同郡張奮議舉郡以歸太祖峻又别收宗族及賔客家兵數百人願從太祖太祖大悅表峻為騎都尉妻以從妹甚見親信太祖每征伐峻常居守以給軍是時歲飢旱軍食不足羽林監頴川棗祗建置屯田太祖以峻為典農中郎將數年中所在積粟倉廪皆滿官渡之戰太祖使峻典軍器糧運賊數寇鈔絶糧道乃使千乘為一部十道方行為復陳以營衛之賊不敢近軍國之饒起於棗祗而成於峻太祖以峻功高乃表封為都亭侯邑三百户遷長水校尉峻寬厚有度而見事理每有所陳太祖多善之於飢荒之際收恤朋友孤遺中外貧宗周急繼乏信義見稱建安九年薨太祖流涕者久之子先嗣先薨無子國除文帝追録功臣諡峻曰成侯復以峻中子覽為關內侯蘇則字文師扶風武功人也少以學行聞舉孝亷茂才辟公府皆不就起家為酒泉太守轉安定武都所在有威名太祖征張魯過其郡見則悅之使為軍導魯破則綏定下辨諸氐通河西道徙為金城太守是時喪亂之後吏民流散飢窮戶口損耗則撫循之甚謹外招懷羌胡得其牛羊以養貧老與民分糧而食旬月間流民皆歸得數千家乃明為禁令有干犯者輒戮其從教者必賞自教民耕種其歲大豐收由是歸附者日多李越以隴西反則率羌胡圍越越即請服太祖崩西平麴演叛稱護羌校尉則勒兵討之演恐乞降文帝以其功加護羌校尉賜爵關內侯後演復結旁郡為亂張掖張進執太守杜通酒泉黃華不受太守辛機進華皆自稱太守以應之又武威三種胡並寇鈔道路斷絶武威太守母邱興告急於則時雍涼諸豪皆驅掠羌胡以從進等郡人咸以為進不可當又將軍郝昭魏平先是各屯守金城亦受詔不得西度則乃見郡中大吏及昭等與羌豪帥謀曰今賊雖盛然皆新合或有脅從未必同心因釁擊之善惡必離離而歸我我增而彼損矣既獲益衆之實且有倍氣之勢率以進討破之必矣若待大軍曠日持久善人無歸必合於惡善惡既合勢難卒離雖有詔命違而合權專之可也於是昭等從之乃發兵救武威降其三種胡與興擊進於張掖演聞之將步騎三千迎則辭來助軍而實欲為變則誘與相見因斬之出以徇軍其黨皆散走則遂與諸軍圍張掖破之斬進及其支黨衆皆降演軍敗華懼出所執乞降河西平乃還金城進封都亭侯邑三百戶徵拜侍中與董昭同僚昭嘗枕則膝卧則推下之曰蘇則之膝非佞人之枕也初則及臨災侯植聞魏氏代漢皆發服悲哭文帝聞植如此而不聞則也帝在洛陽嘗從容言曰吾應天受禪而聞有哭者何也則謂為見問鬚髯悉張欲正論以對侍中傅巽掐苦冶反則曰不謂卿也於是乃止文帝問則曰前破酒泉張掖西域通使敦煌獻徑寸大珠可復求市益得不則對曰若陛下化洽中國德流沙漠即不求自至求而得之不足貴也帝默然後則從行獵槎桎拔失鹿帝大怒據胡牀拔刀悉收督吏將斬之則稽首曰臣聞古之聖王不以禽獸害人今陛下方隆唐堯之化而以獵戲多殺羣吏愚臣以為不可敢以死請帝曰卿直臣也遂皆赦之然以此見憚黃初四年左遷東平相未至道病薨諡剛侯子怡嗣怡薨無子弟愈襲封愈咸熙中為尚書杜畿字伯侯京兆杜陵人也漢御史大夫杜延年之後延年父周自南陽徙茂陵延年徙杜陵子孫世居焉畿少孤繼母苦之以孝聞年二十為郡功曹守鄭令縣囚繫數百人畿親臨獄裁其輕重盡決遣之雖未悉當郡中竒其年少而有大意也舉孝亷除漢中府丞會天下亂遂棄官客荆州建安中乃還荀彧進之太祖太祖以畿為司空司直遷護羌校尉使持節領西平太守太祖既定河北而高幹舉并州反時河東太守王邑被徵河東人衛固范先外以請邑為名而內實與幹通謀太祖謂荀彧曰關西諸將恃險與馬征必為亂張晟寇殽澠間南通劉表固等因之吾恐其為害深河東被山帶河四鄰多變當今天下之要地也君為我舉蕭何寇恂以鎮之彧曰杜畿其人也於是追拜畿為河東太守固等使兵數千人絶陜津畿至不得渡太祖遣夏侯惇討之未至彧謂畿曰宜須大兵畿曰河東有三萬戶非皆欲為亂也今兵迫之急欲為善者無主必懼而聼於固固等勢專必以死戰討之不勝四鄰應之天下之變未息也討之而勝是殘一郡之民也且固等未顯絶王命外以請故君為名必不害新君吾單車直往出其不意固為人多計而無斷必偽受吾吾得居郡一月以計縻之足矣遂詭道從郖津渡范先欲殺畿以威衆且觀畿去就於門下斬殺主簿已下三十餘人畿舉動自若於是固曰殺之無損徒有惡名且制之在我遂奉之畿謂衛固范先曰衛范河東之望也吾仰成而已然君臣有定義成敗同之大事當共平議以固為都督行丞事領功曹將校吏兵三千餘人皆范先督之固等喜雖陽事畿不以為意固欲大發兵畿患之説固曰夫欲為非常之事不可動衆心今大發兵衆必擾不如徐以資募兵固以為然從之遂為資調發數十日乃定諸將貪多應募而少遣兵畿又喻固等曰人情顧家諸將掾史可分遣休息急緩召之不難固等惡逆衆心又從之於是善人在外隂為己援惡人分散各還其家則衆離矣會白騎攻東垣高幹入濩澤上黨諸縣殺長吏𢎞農執郡守固等密調兵未至畿知諸縣附已因出單將數十騎赴張辟拒守吏民多舉城助畿者比數十日得四千餘人固等與幹晟共攻畿不下略諸縣無所得會大兵至幹晟敗固等伏誅其餘黨與皆赦之使復其居業是時天下郡縣皆殘破河東最先定少耗減畿治之崇寬惠與民無為民嘗辭訟有相告者畿親見為陳大義遣令歸諦思之若意有所不盡更來詣府鄉邑父老自相責怒曰有君如此奈何不從其教自是少有辭訟班下屬縣舉孝子貞婦順孫復其繇役隨時勉慰之漸課民畜牸牛草馬下逮雞豚犬豕皆有章程百姓勸農家家豐實於是畿曰民富矣不可不教也乃令冬月修戎講武又開學宫親自執經教授郡中化之至今河東特多儒者畿之由也韓遂馬超之叛也𢎞農馮翊多舉縣邑以應之河東雖與賊接民無異心太祖西征至蒲阪與賊夾渭為軍軍食一仰河東及賊破餘畜二十餘萬斛太祖下令曰河東太守杜畿孔子所謂禹吾無間然矣增秩中二千石太祖征漢中遣五千人運運者自相率勉曰人生有一死不可負我府君終無一人逃亡其得人心如此時平虜將軍劉勳為太祖所親貴震朝廷嘗從畿求大棗畿拒以他故勳後伏法太祖得其書歎曰杜畿可謂不媚竈者也魏國既建以畿為尚書事平更有令曰昔蕭何定關中寇恂平河內卿有其功間將授卿以納言之職顧念河東吾股肱郡充實之所足以制天下故且煩卿卧鎮之畿在河東十六年常為天下最文帝即王位賜爵關內侯徵為尚書及踐阼進封豐樂亭侯邑百戶守司𨽻校尉帝征吳以畿為尚書僕射統留事其後帝幸許昌畿復居守受詔作御樓船於陶河試船遇風沒帝為之流涕詔曰昔冥勤其官而水死稷勤百穀而山死故尚書僕射杜畿於孟津試船遂至覆沒忠之至也朕甚愍焉追贈太僕諡曰戴侯初畿嘗見童子謂之曰司命使我召子畿固請之童子曰今更為君求相代者君其慎勿言言卒忽不見至此二十年矣畿乃言之其日而卒時年六十二子恕嗣恕字務伯太和中擢拜散騎侍郎數月轉補黃門侍郎恕推誠以質不事治飾少無名譽及在朝不結交援專心向公每政有得失常引綱維以正言於是侍中辛毗等器重之時公卿以下大議損益恕以為古之刺史奉宣六條以清靜為名故威風夙著今可勿令領兵以專民事俄而鎮北將軍吕昭又領冀州恕乃上疏曰帝王之道莫尚乎安民安民之術在於豐財豐財者務本而節用也方今二賊未滅戎車亟駕此自熊虎之士展力之秋也然縉紳之儒橫加榮慕扼腕抗論以孫吳為首州郡牧守咸共忽恤民之術修將率之事農桑之民競干戈之業不可謂務本帑藏歲虛而制度歲廣民力歲衰而賦役嵗興不可謂節用今大魏奄有十州之地而承喪亂之弊計其戶口不如往昔一州之民然而二方僭逆北虜未賓三邊遘難繞天略匝以所統一州之民經營九州之地其為艱難譬策羸馬以取道里豈可不加意愛惜其力哉以武皇帝之節儉府藏充實猶不能十州擁兵郡且二十也今荆揚青徐幽并雍涼緣邊諸州皆有兵矣其所恃內充府庫外制四夷者惟兖豫司冀而已臣前以州郡典兵則專心軍功不勤民事宜别置守將以盡治理之務而陛下復以冀州寵秩吕昭冀州戶口最多田多墾闢又有桑棗之饒國家徵求之府誠不當復任以兵事也若以北方當須鎮守自可專置大將以鎮安之計所置吏士之費與兼官無覺然昭於人才尚復易得中朝茍乏人兼才者勢不獨多以此推之知國家以人擇官不為官擇人也官得其人則政平訟理政平故民富實訟理故囹圄空虛陛下踐阼天下獄斷百數十人歲歲增多至五百餘人矣民不益多法不益峻以此推之非政教陵遲牧守不稱之明效歟往年牛死通率天下十能損二麥不半收秋種未下若二賊遊魂於疆場飛芻挽粟千里不及究此之術豈在強兵乎武士徑卒愈多愈多愈病耳夫天下猶人之體腹心充實四支雖病終無大患今兖豫司冀亦天下之腹心也是以愚臣慺慺實願四州之牧守獨修務本之業以堪四支之重然孤論難持犯欲難成衆怨難積疑似難分故纍載不為明主所察凡言此者類皆疏賤疏賤之言實未易聽若使善策必出於親貴親貴固不犯四難以求忠愛此古今之所常患也時又大議考課之制以考內外衆官恕以為用不盡其人雖才且無益所存非所務所務非世要上疏曰書稱明試以功三考黜陟誠帝王之盛制使有能者當其官有功者受其祿譬猶烏獲之舉千鈞良樂之選驥足也雖歷六代而考績之法不著關七聖而課試之文不垂臣誠以為其法可粗依其詳難備舉故也語曰世有亂人而無亂法若使法可專任則唐虞可不須稷契之佐殷周無貴伊吕之輔矣今奏考功者陳周漢之法為綴京房之本旨可謂明考課之要矣於以崇揖讓之風興濟濟之治臣以為未盡善也其欲使州郡考士必由四科皆有事效然後察舉試辟公府為親民長吏轉以功次補郡守者或就增秩賜爵此最考課之急務也臣以為便當顯其身用其言使具為課州郡之法法具施行立必信之賞施必行之罰至於公卿及內職大臣亦當以其職考課之也古之三公坐而論道內職大臣納言補闕無善不紀無過不舉且天下至大萬機至衆誠非一明所能偏照故君為元首臣作股肱明其一體相須而成也是以古人稱廊廟之材非一本之枝帝王之業非一士之略由是言之焉有大臣守職辨課可以致雍熙者哉且布衣之交猶有務信誓而蹈水火感知己而披肝膽徇聲名而立節義者况於束帶立朝致位卿相所務者非特匹夫之信所感者非徒知己之惠所徇者豈聲名而已乎諸蒙寵祿受重任者不徒欲舉明主於唐虞之上而己身亦欲厠稷契之列是以古人不患於念治之心不盡患於自任之意不足此誠人主使之然也唐虞之君委任稷契夔龍而責成功及其罪也殛鯀而放四凶今大臣親奉明詔給事目下其有夙夜在公恪勤特立當官不撓貴勢執平不阿所私危言危行以處朝廷者自明主所察也若尸祿以為高拱默以為智當官茍在於免負立朝不忘於容身潔行遜言以處朝廷者亦明主所察也誠使容身保位無放退之辜而盡節在公抱見疑之勢公義不修而私議成俗雖仲尼為課猶不能盡一才又况於世俗之人乎今之學者師商韓而尚法術競以儒家為迂闊不周世用此最風俗之流弊創業者之所致愼也後考課竟不行樂安亷昭以才能拔擢頗好言事恕上疏極諫曰伏見尚書郎亷昭奏左丞曹璠以罰當關不依詔坐判問又云諸當坐者别奏尚書令陳矯自奏不敢辭罰亦不敢以處重為恭意至懇惻臣竊愍然為朝廷惜之夫聖人不擇世而興不易民而治然而生必有賢智之佐者蓋進之以道帥之以禮故也古之帝王之所以能輔世長民者莫不遠得百姓之歡心近盡羣臣之智力誠使今朝任職之臣皆天下之選而不能盡其力不可謂能使人若非天下之選亦不可謂能官人陛下憂勞萬機或親燈火而庶事不康刑禁曰弛豈非股肱不稱之明效與原其所由非獨臣有不盡忠亦主有不能使百里奚愚於虞而智於秦豫讓茍容中行而著節智伯斯則古人之明驗矣今臣言一朝皆不忠是誣一朝也然其事類可推而得陛下感帑藏之不充實而軍事未息至乃斷四時之賦衣薄御府之私穀帥由聖意舉朝稱明與聞政事密勿大臣寧有懇懇憂此者乎騎都尉王才幸樂人孟思所為不法振動京師而其罪狀發於小吏公卿大臣初無一言自陛下踐阼以來司𨽻校尉御史中丞寧有舉綱維以督姦宄使朝廷肅然者邪若陛下以為今世無良才朝廷乏賢佐豈可追望稷契之遐蹤坐待來世之雋乂乎今之所謂賢者盡有大官而享厚祿矣然而奉上之節未立向公之心不一者皆委任之責不專而俗多忌諱故也臣以為忠臣不必親親臣不必忠何者以其居無嫌之地而事得自盡也今有疏者毁人不實其所毁而必曰私報所憎譽人不實其所譽而必曰私愛所親左右或因之以進憎愛之説非獨毁譽有之政事損益亦皆有嫌陛下當思所以闡廣朝臣之心篤厲有道之節使之自同古人望與竹帛耳反使如亷昭者擾亂其間臣懼大臣遂將容身保位坐觀得失為來世戒也昔周公戒魯侯曰無使大臣怨乎不以言賢愚明皆當為世用也堯數舜之功稱去四凶不言大小有罪則去也今者朝臣不自以為不能以陛下為不任也不自以為不知以陛下為不問也陛下何不遵周公之所以用大舜之所以去使侍中尚書坐則侍帷幄行則從華輦親對詔問所陳必達則羣臣之行能否皆可得而知忠能者進暗劣者退誰敢依違而不自盡以陛下之聖明親與羣臣論議政事使羣臣人得自盡人自以為親人思所以報賢愚能否在陛下之所用以此治事何事不辦以此建功何功不成每有軍事詔書常曰誰當憂此者耶吾當自憂耳近詔又曰憂公忘私者必不然但先公後私即自辦也伏讀明詔乃知聖恩究盡下情然亦怪陛下不治其本而憂其末也人之能否實有本性雖臣亦以為朝臣不盡稱職也夫明主之用人也使能者不敢遺其力而不能者不得處非其任選舉非其人未必為有罪也舉朝共容非其人乃為怪耳陛下知其不盡力也而代之憂其職知其不能也而教之治其事豈徒主勞而臣逸哉雖聖賢並世終不能以此為治也陛下又患臺閣禁令之不密人事請屬之不絶聽伊尹作迎客出入之制選司徒更惡吏以守寺門威禁由之實未得為禁之本也昔漢安帝時少府竇嘉辟廷尉郭躬無罪之兄子猶見舉奏章劾紛紛近司𨽻校尉孔羡辟大將軍狂悖之弟而有司默爾望風希指甚於受屬選舉不以實人事之大者也嘉有親戚之寵躬非社稷重臣猶尚如此以今况古陛下自不督必行之罰以絶阿黨之原耳伊尹之制與惡吏守門非治世之具也使臣之言少蒙察納何患於姦不削滅而養若昭等乎夫糾擲姦宄忠事也然而世憎小人行之者以其不顧道理而茍求容進也若陛下不復考其終始必以違衆忤世為奉公密行白人為盡節焉有通人大才而更不能為此邪誠顧道理而弗為耳使天下皆背道而趨利則人主之所最病者陛下將何樂焉胡不絶其萌乎夫先意承旨以求容美率皆天下淺薄無行義者其意務在於適人主之心而已非欲治天下安百姓也陛下何不試變業而示之彼豈執其所守以違聖意哉夫人臣得人主之心安業也處尊顯之官榮事也食千鍾之祿厚實也人臣雖愚未有不樂此而喜于忤者也迫於道自強耳誠以為陛下當憐而祐之少委任焉如何反録昭等傾側之意而忽若人者乎今者外有伺隙之寇內有貧曠之民陛下當大計天下之損益政事之得失誠不可以怠也恕在朝八年其論議亢直皆此類也出為𢎞農太守數嵗轉趙相以疾去官起家為河東太守嵗餘遷淮北都督護軍復以疾去恕務存大體而已其樹惠愛益得百姓之歡心不及其父畿頃之拜御史中丞恕在朝廷以不得當世之知故屢在外任復出為幽州刺史加建威將軍使持節護烏丸校尉時征北將軍程喜屯薊尚書袁侃等戒恕曰程申伯處先帝之世傾田園讓於青州足下今俱杖節使共屯一城宜深有以待之而恕不以為意至官未期有鮮卑大人兒不由關塞徑將數十騎詣州州斬所從來小子一人無表言上喜於是劾奏恕下廷尉當死以父畿勤事水死免為庶人徙章武郡是嵗嘉平元年恕倜儻任意而不思防患終致此敗初恕從趙郡還陳留阮武亦從清河太守徵俱自簿廷尉謂恕曰相觀才性可以由公道而持之不厲器能可以處大官而求之不順才學可以述古今而志之不一此所謂有其才而無其用今向間暇可試潛思成一家言在章武遂著體論八篇又著興性論一篇蓋興於為己也四年卒於徙所甘露二年河東樂詳年九十餘上書訟畿之遺績朝廷感焉詔封恕子預為豐樂亭侯邑百戶恕奏議論駮皆可觀掇其切於世大事著於篇預有大功於晉世晉史有傳鄭渾字文公河南開封人也高祖父衆衆父興皆為名儒渾兄泰與荀攸等謀誅董卓為揚州刺史衆興及泰漢史皆有傳泰卒天下大亂渾將泰小子袤避難淮南袁術賔禮甚厚渾知術必敗時華歆為豫章太守素與泰善渾乃渡江投歆太祖聞其篤行召為掾復遷下蔡長邵陵令天下未定民皆剽輕不念産殖其生子無以相活率皆不舉渾所在奪其漁獵之具課使耕桑又兼開稻田重去子之法民初畏罪後稍豐給無不舉贍所育男女多以鄭為字辟為丞相掾屬遷左馮翊時梁興等略吏民五千餘家為寇鈔諸縣不能禦皆恐懼寄治郡下議者悉以為當移就險渾曰興等破散竄在山阻雖有隨者率脅從耳今當廣開降路宣諭恩信而保險自守此示弱也乃聚斂吏民治城郭為守禦之備遂發民逐賊明賞罰與要誓其所得獲十以七賞百姓大悅皆願捕賊多得婦女財物賊之失妻子者皆還求降渾責其得他婦女然後還其妻子於是轉相寇盜黨與離散又遣吏民有恩信者分布山谷告喻出者相繼乃使諸縣長吏各還本治以安集之興等懼將餘衆聚鄜城太祖使夏侯淵就助郡擊之渾率吏民前登斬興及其支黨又賊靳富等脅將夏侯長邵陵令并其吏民入磑山渾復討擊破富等獲二縣長吏將其所略還及趙青龍者殺左內史程休渾聞遣將士就梟其首前後歸附四千餘家由是山賊皆平民安産業轉為上黨太守太祖征漢中以渾為京兆尹渾以百姓新集為制移居之法使兼復者與單輕者相伍溫信者與孤老者為比勤稼穡明禁令以發姦者由是民安於農而盜賊衰息及大軍入漢中運轉軍糧為最又遣民田漢中無逃亡者太祖益嘉之復入為丞相掾文帝即位為侍御史加駙馬都尉遷陽平沛郡二太守郡界下濕每患水潦百姓飢乏渾於蕭相二縣界興陂遏開稻田郡人皆以為不便渾曰地勢汙下宜溉灌終有魚稻經久之利此豐民之本也遂躬率吏民興立功夫一冬間皆成比年大收頃畝嵗增租入倍常民賴其利刻石頌德號曰鄭陂轉為山陽魏郡太守其治放此又以郡下百姓苦乏材木乃課樹榆為籬並益樹五果榆皆成藩五果豐實入魏郡界村落齊整如一民得財足用饒明帝聞之下詔稱述布告天下遷將作大匠渾清素在公妻子不免於飢寒及卒以子崇為郎中袤晉史有傳倉慈字孝仁淮南人也始為郡吏建安中太祖開募屯田於淮南以慈為綏集都尉黃初末為長安令清約有方吏民畏而愛之太和中遷敦煌太守郡在西陲以喪亂隔絶無太守二十嵗大姓雄張遂以為俗前太守尹奉等循故而已無所匡革慈到抑挫權右撫恤貧羸甚得其理舊大族田地有餘而小民無立錐之土慈皆隨口割賦稍稍使畢其本直先是屬城獄訟衆猥縣不能決多集治下慈躬往省閲料簡輕重自非殊死但鞭杖遣之一歲決刑曾不滿十人又常日西域雜胡欲來貢獻而諸豪族多逆斷絶既與貿遷欺詐侮易多不得分明胡常怨望慈皆勞之欲詣洛者為封過所欲從郡還者官為平取輒以府見物與共交市使吏民護送道路由是民夷翕然稱其德惠卒官吏民悲感如喪親戚圖其形思其遺像及西域諸胡聞慈死悉共會聚於戊巳校尉及長吏治下發哀或有以刀畫靣以明血誠又為立祠遙共祠之自太祖迄于咸熙魏郡太守陳國吳瓘清河太守樂安任燠京兆太守濟北顔斐𢎞農太守太原令狐邵濟南相魯國孔乂或哀矜折獄或推誠惠愛或治身清白或摘姦發伏咸為良二千石瓘燠事行無所見顔斐字文林有才學太祖為丞相召為太子洗馬黃初初轉為黃門侍郎後為京兆太守始京兆從馬超破後民人多不專於農殖又歷數四二千石取解目前亦不為民作久遠計斐到官乃令屬縣整阡陌樹桑果是時民多無車牛斐又課民以間月取車材使轉相教匠作車又課民無牛者令畜豬狗賣以買牛始者民以為煩一二年間家家有丁車大牛又起文學聽吏民欲讀書者復其小徭又於府下起菜園使吏役間鉏治又課民當輸租時車牛各因便致薪兩束為冬寒冰炙筆硯於是風化大行吏不煩民民不求吏京兆與馮翊扶風接界二郡道路既穢塞田疇又荒萊人民飢凍而京兆皆整頓開明豐富常為雍州十郡最斐又清已仰奉而已於是吏民恐其遷轉也至青龍中司馬懿在長安立軍市而軍中吏士多侵侮縣民斐以白懿懿乃發怒召軍市候便於斐前杖一百時長安典農與斐共坐以為斐宜謝乃私推築斐斐不肯謝良久乃曰斐意觀明公受分陜之任乃欲一齊衆庶必非有所左右也而典農竊見推築欲令斐謝假令斐謝是更為不得明公意也懿遂嚴持吏士自是之後軍營郡縣各得其分後數歲遷為平原太守吏民啼泣遮道車不得前步涉稽留十餘日乃出界東行至崤而疾困斐心素戀京兆其家人從者見斐病甚勸之言平原當自勉勵作健斐曰我心不願平原汝曹等呼我何不言京兆邪遂卒還平原京兆聞之皆為流涕為立碑于今稱之不忘令狐邵字孔叔父仕漢為烏丸校尉建安初袁氏在冀州邵去本郡家居鄴九年暫出到武安毛城中會太祖破鄴遂圍毛城城破執邵等輩十餘人皆當斬太祖閲見之疑其衣冠也問其祖考而識其父乃解放署軍謀掾仍歷宰守後徙丞相主簿出為𢎞農太守所在清如冰雪妻子希到官省舉善而教恕以待人不好獄訟與下無忌是時郡無知經者乃歷問諸吏有欲遠行就師輒假遣令詣河東就樂詳學經粗明乃還因設文學由是𢎞農學業轉興至黃初初徵拜羽林郎遷虎賁中郎將三歲病卒始邵族子愚為白衣時常有高志衆人謂愚必榮令狐氏而邵獨以為愚性倜儻不修德而願大必滅我宗愚聞邵言其心不平及邵為虎賁中郎將而愚仕進已多所更歷所在有名稱愚見邵因從容言次微激之曰先時聞大人謂愚為不繼今竟云何邪邵熟視而不答也退謂其妻子曰公冶性度猶如故也以吾觀之終當敗滅但不知我久當坐之不邪將逮汝曹耳邵沒之後十餘年間愚為兖州刺史果與王凌謀逆家屬誅滅事在凌傳邵子華時為𢎞農郡丞以疏屬得不坐孔乂字元雋孔子之後乂為散騎常侍事三少帝嘗上疏規諫官至大鴻臚張遼字文遠鴈門馬邑人也本聶一之後以避怨變姓少為郡吏漢末并州刺史丁原以遼武力絶人召為從事使將兵詣京都何進遣詣河北募兵得千餘人而還值進敗以兵屬董卓卓敗以兵屬吕布遷騎都尉布為李傕所敗從布東奔徐州領魯相時年二十八太祖破布於下邳遼將其衆降拜中郎將賜爵關內侯數有戰功遷裨將軍袁紹破别遣遼定魯國諸縣遼與夏侯淵圍昌豨於東海數月糧盡議引軍還遼謂淵曰數日以來每行諸圍豨輒屬目視遼又其射矢更稀此必豨計猶豫故不力戰遼欲挑與語儻可誘也乃使人謂豨曰公有命使遼傳之豨果下與遼語遼為説太祖神武方以德懷四方先附者受大賞豨乃許降遼遂單身上三公山入豨家拜妻子豨歡悅隨詣太祖太祖遣豨還責遼曰此非大將法也遼謝曰以明公威信著於四海遼奉聖旨豨必不敢害故也從討袁談袁尚於黎陽有功行中堅將軍從攻袁尚於鄴尚堅守不下太祖還許使遼與樂進拔隂安徙其民於河南復從攻鄴鄴破遼别徇趙國恆山招降緣山諸賊及黑山孫輕等從攻袁談談破遼别將徇海濵破遼東賊栁毅等還鄴太祖自出迎遼引共載以遼為蕩寇將軍復别擊荆州定江夏諸縣還屯臨潁封都亭侯從征袁尚於栁城卒與虜遇遼勸太祖戰氣甚奮太祖壯之自以所持麾授遼遼突擊大破之斬單于踏頓時荆州未定復遣遼屯長社臨發軍中有謀反者夜驚亂起火一軍盡擾遼謂左右曰勿動是不一營盡反必有造變者欲以動亂人耳乃令軍中其不反者安坐遼將親兵數十人中陳而立有頃定即得首謀者殺之陳蘭梅成以氐六縣叛太祖遣于禁臧霸等討成遼督張郃朱蓋等討蘭成偽降禁禁還成遂將其衆就蘭轉入灊山灊中有天柱山高峻二十餘里道險狹步徑裁通蘭等壁其上遼欲進諸將曰兵少道險難用深入遼曰此所謂一與一勇者得前耳遂進至山下安營攻之斬蘭成首虜其衆太祖論功增遼邑假節太祖既征孫權還使遼與樂進李典等將七千餘人屯合肥太祖征張魯教與護軍薛悌署函邊曰賊至乃發俄而權率十萬衆圍合肥乃共發教教曰若孫權至者張李將軍出戰樂將軍守護軍勿得與戰諸將皆疑遼曰公逺征在外比救至彼破我必矣是以教指及其未合逆擊之折其盛勢以安衆心然後可守也成敗之機在此一戰諸軍何疑李典亦與遼同於是遼夜募敢從之士得八百人椎牛饗將士明日大戰平旦遼被甲持戟先登陷陳斬二將殺數十人大呼自名衝壘入至權麾下權大驚衆不知所為走登高冢以長戟自守遼叱權下戰權不敢動望見遼所衆少乃聚圍遼數重遼左右麾圍直前急擊圍開遼將麾下數十人得出餘衆號呼曰將軍棄我乎遼復還突圍拔出餘衆權人馬皆披靡無敢當者自旦戰至日中吳人奪氣還修守偹衆心乃安諸將咸服權守合肥十餘日城不可拔乃引退遼率諸軍追擊幾復獲權太祖大壯遼拜征東將軍建安二十一年太祖復征孫權到合肥循行遼戰處歎息者良久乃增遼兵多留諸軍徙屯居巢關侯圍曹仁於樊會權稱藩召遼及諸軍悉還救仁遼未至徐晃已破關侯仁圍解遼與太祖會摩陂遼軍至太祖乘輦出勞之還屯陳郡文帝即王位轉前將軍分封兄况及一子列侯孫權復叛遣遼還屯合肥進遼爵都鄉侯給遼母輿車及兵馬送遼家詣屯敕遼母至導從出迎所督諸軍將吏皆羅拜道側觀者榮之文帝踐阼進封晉陽侯增邑千戶并前二千六百戶黃初二年遼朝洛陽宫文帝引遼會建始殿親問破吳意狀帝歎息顧左右曰此亦古之召虎也為起第舍又特為遼母作殿以遼所從破吳軍應募步卒皆為虎賁孫權復稱藩遼還屯雍邱得疾帝遣侍中劉曄將太醫視疾虎賁問消息道路相屬疾未瘳帝迎遼就行在所車駕親臨執其手賜以御衣太官日送御食疾小差還屯孫權復叛帝遣遼乘舟與曹休至海陵臨江權甚憚焉敕諸將張遼雖病不可當也愼之是歲遼與諸將破權將吕範遼病遂篤薨於江都帝為流涕諡曰剛侯子虎嗣六年帝追念遼典在合肥之功詔曰合肥之役遼典以步卒八百破賊十萬自古用兵未之有也使賊至今奪氣可謂國之爪牙矣其分遼典邑各百戶賜一子爵關內侯虎為偏將軍薨子統嗣樂進字文謙陽平衛國人也容貌短小以膽烈從太祖為帳下吏遣還本郡募兵得千餘人還為軍假司馬陷陳都尉從擊吕布於濮陽張超於雍邱橋㽔於苦皆先登有功封廣昌亭侯又從征張繡於安衆圍吕布於下邳破别將擊眭固於射犬攻劉備於沛皆破之拜討寇校尉渡河攻獲嘉還從擊袁紹於官渡力戰斬紹將淳于瓊從擊談尚於黎陽斬其大將嚴敬行遊擊將軍别擊黃巾破之定樂安郡從圍鄴都鄴都定從擊袁談於南皮先登入談東門談敗别攻雍奴破之建安十一年太祖表漢帝稱進及于禁張遼功各宜顯寵於是禁為虎威進折衝遼蕩寇將軍進别征髙幹從北道入上黨回出其後幹等還守壺關連戰斬首幹堅守未下會太祖自征之乃拔太祖征管承軍淳于遣進與李典擊之承破走逃入海島海濵平荆州未服遣屯陽翟後從平荆州留屯襄陽擊關羽蘇非等皆走之南郡諸縣山谷蠻夷詣進降又討劉備臨沮長杜普旌陽長梁太皆大破之後從征孫權假進節太祖還留進與張遼李典屯合肥增邑五百并前凡千二百戶以進數有功分五百戶封一子列侯進遷右將軍建安二十三年薨諡曰威侯子綝嗣綝果毅有父風官至揚州刺史諸葛誕反掩襲殺綝詔悼惜之追贈衛尉諡曰愍侯子肇嗣于禁字文則泰山巨平人也黃巾起鮑信招合徒衆禁附從焉及太祖領兖州禁與其黨俱詣為都伯屬將軍王朗朗異之薦禁才任大將太祖召見與語拜軍司馬使將兵詣徐州攻廣威拔之拜陷陳都尉從討吕布於濮陽别破布二營於城南又别將破高雅於須昌從攻壽張定陶離狐圍張超於雍邱皆拔之從征黃巾劉辟黃邵等屯版梁邵等夜襲太祖營禁帥麾下擊破之斬辟邵等盡降其衆遷平虜校尉從圍橋㽔於苦斬㽔等四將從至宛降張繡繡復叛太祖與戰不利軍敗還舞隂是時軍亂各間行求太祖禁獨勒所將數百人且戰且引雖有死傷不相離虜追稍緩禁徐整行隊鳴鼓而還未至太祖所道見十餘人被創裸走禁問其故曰為青州兵所劫初黃巾降號青州兵太祖寬之故敢因緣為略禁怒令其衆曰青州兵同屬曹公而還為賊乎乃討之數之以罪青州兵遽走詣太祖自訴禁既至先立營壘不時謁太祖或謂禁青州兵已訴君矣宜促詣公辨之禁曰今賊在後追之無時不先為備何以待敵且公聰明譖訴何緣而入徐鑿塹安營訖乃入謁具陳其狀太祖悅謂禁曰淯水之難吾其急也將軍在亂能整討暴堅壘有不可動之節雖古名將何以加之於是録禁前後功封益壽亭侯復從攻張繡於穰禽吕布於下邳别與史渙曹仁攻眭固於射犬破斬之太祖初征袁紹紹兵盛禁願為先登太祖壯之乃選步騎二千人使禁將守延津以拒紹太祖引軍還官渡劉備以徐州叛太祖東征之紹攻禁禁堅守紹不能拔復與樂進等將步騎五千擊紹别營從延津西南緣河至汲獲嘉二縣焚燒保聚三十餘屯斬首獲生各數千降紹將何茂王摩等二十餘人太祖復使禁别將屯原武擊紹别營於杜氏津破之遷裨將軍後從還官渡太祖與紹連營起土山相對紹射營中士卒多死傷軍中懼禁督守土山力戰氣益奮紹破遷偏將軍冀州平昌豨復叛遣禁征之禁急進攻豨豨與禁有舊詣禁降諸將皆以為豨已降當送詣太祖禁曰諸君不知公常令乎圍而後降者不赦夫奉法行令事上之節也豨雖舊友禁可失節乎自臨與豨決隕涕而斬之是時太祖軍淳于聞而歎曰豨降不詣吾而歸禁豈非命邪益重禁東海平拜禁虎威將軍後與臧霸攻梅成張遼張郃等討陳蘭禁到成舉衆三千餘人降既降復叛其衆奔蘭遼等與蘭相持軍食少禁運糧前後相屬遼遂斬蘭成增邑二百戶并前千二百戶是時禁與張遼樂進張郃徐晃俱為名將太祖每征伐咸遞行為軍鋒還為後拒而禁持軍嚴整得賊財物無所私入由是賞賜特重然以法御下不甚得士衆心太祖嘗恨朱靈欲奪其營以禁有威重遣禁將數十騎齎令書徑詣靈營奪其軍靈及其部衆莫敢動乃以靈為禁部下督衆皆震服其見憚如此遷左將軍假節鉞分邑五百戶封一子為列侯建安二十四年太祖在長安使曹仁討關侯於樊又遣禁助仁秋大霖雨漢水溢平地水數丈禁等七軍皆沒禁與諸將登髙望水無所回避關乘大船就攻禁等禁遂降惟龎德不屈節而死太祖聞之哀歎者久之曰吾知禁三十年何意臨危處難反不及龎德邪會孫權禽關獲其衆禁復在吳文帝踐阼權稱藩遣禁還帝引見禁鬚髮皓白形容憔悴泣涕頓首帝慰喻之制曰昔荀林父敗績于邲孟明喪師於殽秦晉不替使復其位故晉獲狄土秦霸西戎區區小國猶尚若斯而况萬乘乎樊城之敗水災暴至非戰之咎其復禁等官拜禁為安遠將軍欲遣使吳令先北詣鄴謁高陵帝使豫於陵屋畫關侯戰克龎德憤怒禁降伏之狀禁見慙恚發病薨子圭嗣封益夀亭侯諡禁曰厲侯張郃字雋乂河間鄚人也漢末應募討黃巾為軍司馬屬韓馥馥敗以兵歸袁紹紹以郃為校尉使與諸將拒公孫瓚瓚破郃功多遷寧國中郎將太祖與袁紹相拒於官渡紹遣將淳于瓊督運屯烏巢太祖自將急擊之郃説紹曰曹公兵精往必破瓊等瓊等破則將軍事去矣宜急引兵救之郭圖曰郃計非也不如攻其本營勢必還此為不救而自解也郃曰曹公營固攻之必不拔若瓊等見禽吾屬盡為虜矣紹但遣輕騎救瓊而以重兵攻太祖營不能下太祖果破瓊等紹軍潰圖慙又更譖郃曰郃快軍敗出言不遜郃懼乃歸太祖太祖得郃其喜謂曰昔子胥不早寤自使身危豈若微子去殷韓信歸漢邪拜偏將軍封都亭侯授以衆從攻鄴拔之又從擊袁談於渤海别將軍圍雍奴大破之後討栁城與張遼俱為軍鋒以功遷平狄將軍别征東萊討管承又與張遼討陳蘭梅成等破之從破馬超韓遂於渭南圍安定降楊秋與夏侯淵討鄜賊梁興及武都氐又破馬超平宋建太祖征張魯先遣郃督諸軍討興和氐王竇茂太祖從散關入漢中又先遣郃督步卒五千於前通路至陽平魯降太祖還留郃與夏侯淵等守漢中拒劉備郃别督諸軍降巴東巴西二郡徙其民於漢中進軍宕渠為備將張飛所拒引還南鄭拜蕩寇將軍劉備屯陽平郃屯廣石備以精卒萬餘分為十部夜急攻郃郃率親兵搏戰備不能克其後備於走馬谷燒都圍淵救火從他道與備相遇交戰短兵接刃淵遂沒郃還陽平當是時新失元帥恐為備所乘三軍皆失色淵司馬郭淮乃令衆曰張將軍國家名將劉備所憚今日事急非張將軍不能安也遂推郃為軍主郃出勒兵案陳諸將皆受郃節度衆心乃定太祖在長安遣使假郃節太祖遂自至漢中劉備保髙山不敢戰太祖乃引出漢中諸軍郃還屯陳倉文帝即王位以郃為左將軍進爵都鄉侯及踐阼進封鄚侯詔郃與曹真討安定盧水胡及東羌召郃與真並朝許宫遣南與夏侯尚擊江陵郃别督諸軍渡江取洲上屯塢明帝即位遣南屯荆州與司馬懿擊孫權别將劉阿等追至祁口交戰破之諸葛亮出祁山加郃位特進遣督諸軍拒亮將馬謖於街亭謖依阻南山不下據城郃絶其汲道擊大破之南安天水安定郡反應亮郃皆破平之制益封千戶并前四千三百戶司馬懿治水軍於荆州欲順沔入江以伐吳詔郃督關中諸軍往受節度至荆州會冬水淺大船不得行乃還屯方城諸葛亮復出急攻陳倉帝驛馬召郃到京都帝自幸河南城置酒送郃遣南北軍士三萬及分遣虎賁使衛郃帝因問郃曰遲將軍到亮得無已得陳倉乎郃知亮縣軍無穀不能久攻對曰比臣未到亮已走矣屈指計亮糧不至十日郃晨夜進至南鄭亮退詔郃還京都拜征西車騎將軍郃識變數善處營陳料戰勢地形無不如計自諸葛亮皆憚之郃雖武將而愛樂儒士嘗薦同鄉畢湛經明行修詔曰昔祭遵為將奏置五經大夫居軍中與諸生雅歌投壺今將軍外勒戎旅內存國朝朕嘉將軍之意今擢湛為博士諸葛亮復出祁山詔郃督諸將西至略陽亮還保祁山郃追至木門與亮軍交戰飛矢中郃右膝薨諡曰壯侯子雄嗣郃前後征伐有功明帝分郃戶封郃四子列侯賜小子爵關內侯徐晃字公明河東揚人也為郡吏從車騎將軍揚奉討賊有功拜騎都尉李催郭汜之亂長安也晃説奉令與天子還洛陽奉從其計天子渡河至安邑封晃都亭侯及到洛陽韓暹董承日爭鬪晃説奉令歸太祖奉欲從之後悔太祖討奉於梁晃遂歸太祖太祖授晃兵使擊卷原武賊破之拜裨將軍從征吕布别降布將趙庶李鄒等與史渙斬眭固於河內從破劉備又從破顔良拔白馬進至延津破文醜拜偏將軍與曹洪擊濦強賊祝臂破之又與史渙擊袁紹運車於故市功最多封都亭侯太祖既圍鄴破邯鄲易陽令韓範偽以城降而拒守太祖遣晃攻之晃至飛矢城中為陳成敗範悔晃輒降之既而言於太祖曰二袁未破諸城未下者皆傾耳以聽今日滅易陽明日皆以死守恐河北無定時也願公降易陽以示諸城則莫不望風太祖善之别討毛城設伏兵掩擊三屯從破袁談於南皮討平原叛賊克之從征踏頓拜橫野將軍從征荆州别屯樊討中廬臨沮宜城賊又與滿寵討關侯於漢津與曹仁擊周瑜於江陵十五年討太原反者圍太陵拔之斬賊帥商曜韓遂馬超等反關右遣晃屯汾隂以撫河東賜牛酒令上先人墓太祖至潼關恐不得渡召問晃晃曰公盛兵於此而賊不復别守蒲阪知其無謀也今假臣精兵渡蒲阪津為軍先置以截其裏賊可禽也太祖曰善使晃以步騎四千人渡津作塹柵未成賊梁興夜將步騎五千餘人攻晃晃擊走之太祖軍得渡遂破超等使晃與夏侯淵平踰麋汧諸氐與太祖會安定太祖還鄴使晃與夏侯淵平鄜夏陽餘賊斬梁興降三千餘戶從征張魯别遣晃討攻櫝仇夷諸山氐皆降之遷平寇將軍解將軍張順圍擊賊陳福等三十餘屯皆破之太祖還鄴留晃與夏侯淵拒劉備於陽平備遣陳式等十餘營絶馬鳴閣道晃别征破之賊自投山谷多死者太祖聞甚喜假晃節令曰此閣道漢中之險要咽喉也劉備欲斷絶外內以取漢中將軍一舉克奪賊計善之善者也太祖遂自至陽平引出漢中諸軍復遣晃助曹仁討關侯屯宛會漢水暴溢于禁等沒關圍仁於樊又圍將軍吕常於襄陽晃所將多新卒以關難與爭鋒遂前至陽陵陂屯太祖復還遣將軍徐商吕建等詣晃令曰須兵馬集至乃俱前賊屯偃城晃到詭道作都塹示欲截其後賊燒屯走晃得偃城兩面連營稍前去賊圍三丈所未攻太祖前後遣殷署朱蓋等凡十二營詣晃賊圍頭有屯又别屯四冡晃揚聲當攻圍頭屯而密攻四冡關見四冡欲壞自將步騎五千出戰晃擊之關退走遂追關與俱入圍破之或自投沔水死太祖令曰賊圍塹鹿角十重將軍致戰全勝遂陷賊圍多斬首虜吾用兵三十餘年及所聞古之善用兵者未有長驅徑入敵圍者也且樊襄陽之在圍過於莒即墨將軍之功踰孫武穰苴晃振旅還摩陂太祖迎晃七里置酒大會太祖舉巵酒勸晃且勞之曰全樊襄陽將軍之功也時諸軍皆集太祖按行諸營士卒咸離陳觀之而晃營整齊將士駐車不動太祖歎曰徐將軍可謂有周亞夫之風矣文帝即王位以晃為右將軍進封逯鄉侯及踐阼進封楊侯與夏侯尚討劉備於上庸破之以晃鎮陽平徙封陽平侯明帝即位拒吳將諸葛瑾於襄陽增邑二百并前三千二百戶疾篤遺令斂以時服性儉約畏愼將軍常遠斥候先為不可勝然後戰追奔爭利士不暇食常歎曰古人患不遭明君今幸遇之當以功自效何用私譽為終不廣交援太和元年薨諡壯侯子蓋嗣蓋薨子霸嗣明帝分晃戶封晃子孫二人列侯初清河朱靈字文博為袁紹將太祖之征陶謙紹使靈督三營助太祖戰有功紹所遣諸將各罷歸靈曰靈觀人多矣無若曹公者此乃真明主也今已遇復何之遂留不去所將士卒慕之皆隨靈留靈後遂為好將名亞晃等至後將軍封高唐亭侯通志卷一百十五下
