body:
  text: 通志卷一百九十三宋右迪功郎鄭樵漁仲撰載記卷第八西涼李皓歆夏赫連勃勃昌定後梁蕭察巋琮嶚巖岌岑瓛蔡大寶王操魏益德尹正甄元成岑善方宗如周袁敞西涼李皓字元盛小字長生隴西成紀人姓李氏漢前將軍廣之十六世孫也廣曾祖仲翔漢初為將軍討叛羌于素昌素昌即狄道也衆寡不敵死之仲翔子伯考奔喪因葬于狄道之東川遂家焉世為西州右姓髙祖雍曾祖柔仕晉並厯位郡守祖弇仕張軌為武衛將軍安世亭侯父昶幼有令名早卒遺腹生皓少而好學性沈敏寬和美器度通涉經史尤善文義及長頗習武藝誦孫吳兵法嘗與吕光太史令郭黁及其同母弟宋繇同宿黁起謂繇曰君當位極人臣李君有國土之分家有騧草馬生白額駒此其時也吕光末京兆假業自稱涼州牧以敦煌太守趙郡孟敏為沙州刺史署皓效榖令敏尋卒敦煌護軍馮翊郭謙沙州治中敦煌索仙等以皓溫毅有惠政推為寧朔將軍敦煌太守皓初難之會宋繇仕于業告歸敦煌言于皓曰兄忘郭黁之言邪白額駒今已生矣皓乃從之尋進號冠軍稱藩于業業以皓為安西將軍敦煌太守領護西胡校尉及業僭稱涼王其右衛將軍索嗣構皓于業乃以嗣為敦煌太守率騎五百而西未至二十里移皓使迎已皓驚疑將出迎之效榖令張邈及宋繇止之曰吕氏政衰假業暗弱正是英豪有為之日將軍處一國成資奈何束手于人索嗣自以本邦謂人情附已不虞將軍卒能拒之可一戰而擒矣宋繇亦曰大丈夫已為世所推今日便授首于嗣豈不為天下笑乎大兄英姿挺傑有雄霸之風張王之業不足繼也皓曰吾少無風雲之志因官至此不圖此郡士人忽爾見推向言出迎者未知士大夫之意故也因遣繇覘嗣繇見嗣啖以甘言還謂皓曰嗣志驕兵弱易擒耳于是遣其二子歆讓與邈繇及司馬尹建興等逆戰破之嗣奔還張掖皓素與嗣善結為刎􅖪交反為所構故深恨之乃罪狀嗣于假業業將沮渠男成又惡嗣亦勸業除之業乃殺嗣遣使謝皓分敦煌之涼興烏澤晉昌之宜禾三縣為涼興郡進皓持節都督涼興已西諸軍事鎮西將軍領護西夷校尉時有赤氣起于皓後園龍迹見于小城隆安四年晉昌太守唐瑶移檄六郡推皓為大都督大將軍涼州領秦涼二州牧護羌校尉皓乃赦其境內建年為庚子追尊祖弇曰涼景公父昶涼簡公以唐瑶為征東將軍郭謙為軍咨祭酒索仙為左長史張邈為右長史尹建興為左司馬張體順為右司馬張條為牧府左長史令狐溢為右長史張林為太府主簿宋繇張謖為從事中郎繇加折衝將軍謖加揚武將軍索承眀為牧府右司馬令狐遷為武衛將軍晉興太守汜德瑜為寧逺將軍西郡太守張靖為折衝將軍河湟太守索順為威逺將軍西平太守趙開為騂馬護軍大夏太守索慈為廣武太守隂亮為西安太守令狐赫為武威太守索術為武興太守以招懷東夏又遣宋繇東伐涼興并擊玉門已西諸城皆下之遂屯玉門陽關廣田積榖為東伐之資初吕光之稱王也遣使市六璽玉于于填至是玉至敦煌納之郡府仍于南門外臨水起堂名曰靖恭之堂以議朝政閲武事圖讃自古聖帝眀王忠臣孝子烈士貞女皓親為序頌以眀鑒戒之義當時文武羣寮亦皆圖焉有白雀翔于靖恭堂皓觀之大悅又立泮宫增髙門學生五百人起嘉納堂于後園以圖讃所志義熙元年皓改元為建初遣舍人黃始梁興間行奉表詣建康稱藩求稟正朔皓謂羣僚曰昔河右分崩羣豪競起吾以寡德為衆賢所推何嘗不忘寢與食思濟黎庶故前遣母弟繇董率雲騎東殄不庭軍之所至莫不賔下今惟蒙遜鵄跱一城自張掖已東晉之遺黎雖為戎虜所制至于向義思風過于殷人之望西伯大業須定不可安寢吾將遷都酒泉漸逼冦冗諸君以為何如張邈贊成其議皓大悅曰二人同心其利斷金張長史與孤同矣夫復何疑乃以張體順為寧逺將軍建康太守鎮樂涫徴宋繇為右將軍領敦煌護軍與其子敦煌太守讓鎮敦煌遂遷居于酒泉初皓之西也留女敬愛養于外祖尹文文既東遷皓從姑梁褒之母養之其後秃髮傉檀假道于北山鮮卑遣褒送敬愛于酒泉并通和好皓遣使報聘贈以方物皓親率騎二萬略地至于建東鄯善前部王遣使貢其方物沮渠蒙遜來侵至于建康掠三千餘户而歸皓大怒率騎追之及于彌安大敗之盡收所略之户初苻堅建元之末徙江漢之人萬餘户于敦煌中州之人有田疇不闢者亦徙七千餘户郭黁之寇武威武威張掖已東人西奔敦煌晉昌者數千户及皓東遷皆徙之于酒泉分南人五千户置會稽郡中州人五千户置廣夏郡餘萬三千户分置武威武興張掖三郡築城于敦煌南子亭以威南虜又以前表未報復遣沙門法泉間行奉表建康願竭誠盡節為國輸力皓既遷酒泉乃敦勸稼穡羣寮以年榖頻登百姓樂業請勒銘酒泉皓許之于是使儒林祭酒劉彥眀為文刻石頌德既而蒙遜每年侵寇不止皓志在以德撫其境內但與通和立盟弗之校也是時白狼白菟白雀白雉白鳩皆棲其園囿其羣下以為白祥金精所誕皆應時雍而至又有神光甘露連理嘉禾衆瑞請史官記其事皓從之尋而蒙遜背盟來侵皓遣世子歆要擊敗之獲其將沮渠百年皓乃修敦煌舊塞東西二圍以防北虜之患築敦煌舊塞西南二圍以威南虜皓以緯世之量當吕氏之末為羣雄所奉遂啓霸圖兵無血刃坐定千里謂張氏之業指期可成河西十郡嵗月而一既而秃髮傉檀入據姑臧沮渠蒙遜基宇稍廣于是慨然著述志賦以自見詞多不載皓寢疾顧命宋繇曰吾少離荼毒百艱備嘗于喪亂之際遂為此方所推才弱智淺不能一同河右今氣力惙然當不復起矣死者大理吾不悲之所恨志不申耳居元首之位者宜深誡危殆之機吾終之後世子猶卿子也善相輔導述吾平生勿令居人之上専驕自任軍國之宜委之于卿無使籌略乖𠂻失成敗之要十三年死時年六十七國人上諡曰武昭王墓曰建世陵廟號太祖皓世子談早卒第二子歆嗣歆字士業皓死時府寮奉為大都督大將軍涼公領涼州牧護羌校尉大赦境內改年為嘉興尊母尹氏為太后以宋繇為武衛將軍廣夏太守軍咨祭酒録三府事索仙為征虜將軍張掖太守沮渠蒙遜遣其張掖太守沮渠廣宗詐降誘歆歆遣武衛溫宜等赴之親勒大軍為之後繼蒙遜率衆三萬設伏于蓼泉歆聞引兵還為蒙遜所逼歆親貫甲先登大敗之追奔百餘里俘斬七千餘級眀年蒙遜又伐歆歆將出距之左長史張體順固諌乃止蒙遜大芟秋稼而還是嵗朝廷以歆為持節都督七郡諸軍事鎮西大將軍護羌校尉酒泉公歆用刑頗嚴又繕築不止從事中郎張顯上疏諫曰入嵗已來隂陽失序屢有賊風暴雨犯傷和氣今區域三分勢不久並并兼之本實在農戰懷逺之略事歸寬簡而更繁刑峻法宫室是務人力凋殘百姓悲悴致災之咎實此之由主簿汜稱又上疏諌曰臣聞天之子愛人后殷勤至矣故政之不修則垂災譴以誡之改者雖危必昌宋景是也其不改者雖安必亡虢公是也元年三月癸卯敦煌謙德堂陷八月效榖地裂二年元日昏霧四塞四月日赤無光二旬乃復十一月狐上南門今兹春夏地頻五震六月隕星于建康臣雖學不稽古敏謝仲舒頗亦聞道于先師且行年五十有九請為殿下略言耳目之所聞見不復能逺論書傳之事也乃者咸安之初西平地裂狐入謙光殿前俄而秦師奄至都城不守梁熙既為涼州藉秦氏兵亂規有全涼之地外不撫百姓內多聚斂建元十九年姑臧南門崩隕石于間豫堂二十年而吕光東反子敗于前身戮于後假業因羣胡創亂遂稱制此方三年之中地震五十餘所既而先王龍興瓜州蒙遜敗之張掖此皆目前之成事亦殿下之所聞知效榖先王鴻漸之始謙德即尊之室基陷地裂大凶之徴也日者太陽之精中國之象赤而無光中國將為胡夷之所陵滅諺曰野獸入家主人將去今狐上南門亦災之大也又狐者胡也天意若曰將有胡人居于此城南面而居者也昔春秋之世星隕于宋襄公卒為楚所擒地者至隂胡夷之象當靜而動反亂天常天意若曰胡夷將震動中國中國若不修德將有宋襄之禍臣願殿下親仁善鄰養威觀釁罷宫室之務止遊畋之娛後宫嬪妃諸弟子女躬受分田身勸蠶績以清儉素德為榮息兹奢靡之費庶可以弭災止變不然將恐宗廟之危必不出紀歆並不納歆立四年而宋受禪歆將謀東伐張體順切諌乃止歆聞蒙遜南伐秃髮傉檀命中外戒嚴將攻張掖尹氏固諌不聽宋繇又固諌歆並不從繇退而歎曰大事去矣吾見師之出不見師之還也歆遂率步騎三萬東伐次于都瀆澗蒙遜自浩舋來距戰于懷城為蒙遜所敗左右勸歆還酒泉歆曰吾違太后眀誨逺取敗辱不殺此胡復何面目以見母也勒衆復戰敗于蓼泉為蒙遜所害歆諸弟酒泉太守翻新城太守預領羽林右監密左將軍眺右將軍亮等西奔敦煌蒙遜遂入于酒泉歆之未敗也有大蛇從南門而入至于恭德殿前有雙雉飛出宫內通街大樹上有烏鵲爭巢鵲為烏所殺又有敦煌父老令狐熾夢白頭公衣帢而謂熾曰南風動吹長木胡桐椎不中轂言訖忽然不見歆小字桐椎至是而亡翻及弟敦煌太守恂與諸子等棄敦煌奔于北山蒙遜以索嗣子元緒行敦煌太守元緒粗嶮好殺大失人和郡人宋承張𢎞以恂在郡有惠政密信招恂恂率數十騎入于敦煌元緒東奔涼興宋承等推恂為冠軍將軍涼州刺史蒙遜遣世子德政率衆攻恂恂閉門不戰蒙遜自率衆二萬攻之三面起堤以水灌城恂遣壯士一千連版為橋潛欲決堤蒙遜勒兵逆戰屠其城歆子重耳脫身奔于江左仕于宋後歸魏為恆農太守蒙遜徙翻子寶等于姑臧嵗餘北奔伊吾後歸于魏獨尹氏及諸女死于伊吾皓以安帝隆安四年僣立至宋髙祖永初二年滅凡二十二年二世三主夏赫連勃勃字屈丐丐奴右賢王去卑之後而劉淵之族也曾祖虎劉聰世以宗室封樓煩公拜安北將軍監鮮卑諸軍事丁零中郎將雄據肆盧川為代王猗盧所敗遂出塞表祖豹子招集種落復為諸部之雄石虎遣使就拜為平北將軍左賢王丁零單于父衛辰入居塞內苻堅以為西單于督攝河西諸虜屯于代來城及堅國亂遂有朔方之地控弦之士三萬八千後魏師伐之衛辰令其子力俟提距戰為魏所敗魏人乘勝濟河克代來執衛辰殺之勃勃乃奔于叱干部叱干他斗伏送勃勃于魏他斗伏兄子阿利先戌大洛川聞將送勃勃馳諌曰鳥雀投人尚宜濟免况勃勃國破家亡歸命于我縱不能容猶宜任其所奔今執而送之深非仁者之舉他斗伏懼為魏所責弗從阿利潛遣徑勇篡勃勃于路送于姚興髙平公沒奕于奕于以女妻之勃勃身長八尺五寸腰帶十圍性辨慧美風儀興見而竒之深加禮敬拜驍騎將軍加奉車都尉常參軍國大議寵遇踰于勳舊興弟雍言于興曰勃勃天性不仁難以親近陛下寵遇太甚臣竊惑之興曰勃勃有濟世之才吾方收其藝用與之共平天下有何不可乃以勃勃為安逺將軍封陽川侯使助沒奕于鎮髙平以三城朔方雜夷及衛辰部衆三萬配之使為伐魏偵候姚雍固諌以為不可興曰卿何以知其性氣雍曰勃勃奉上慢御衆殘貪暴無親輕為去就寵之踰分終為邉害興乃止頃之以勃勃為持節安北將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方時河西鮮卑杜崘獻馬八千匹于姚興濟河至大城勃勃留之召其衆三萬餘人偽獵髙平川襲殺沒奕于而并其衆衆至數萬義熙二年僣稱天王大單于赦其境內建元曰龍升署置百官自以丐奴夏后氏之苗裔也國稱大夏以其長兄右地代為丞相代公次兄力俟提為大將軍魏公叱干阿利為御史大夫梁公弟阿利羅引為征南將軍司𨽻校尉若門為尚書令叱以鞬為征西將軍尚書左僕射乙斗為征北將軍尚書右僕射自餘以次授任其年討鮮卑薛于等三部破之降衆萬數千進討姚興三城已北諸戍斬其將楊丕姚石生等諸將諌以固險不從又復言于勃勃曰陛下將欲經營宇內南取長安宜先固根本使人心有所憑繫然後大業可成髙平險固山川沃饒可以都也勃勃曰卿徒知其一未知其二吾大業草創衆旅未多姚興亦一時之雄關中未可圖也且其諸鎮用命我若専固一城彼必并力于我衆非其敵亡可立待吾以雲騎風馳出其不意救前則擊其後救後則擊其前使彼疲于奔命我則遊食自若不及十年嶺北河東盡我有也待姚興死後徐取長安姚泓凡弱小免擒之方略已在吾計中矣昔軒轅氏亦遷居無常二十餘年豈獨我乎于是侵掠嶺北嶺北諸城門不晝啓興歎曰吾不用黃免之言以至于此黃免姚雍小字也勃勃初僣號求婚于秃髮傉檀傉檀弗許勃勃怒率騎二萬伐之自楊非至于支楊三百餘里殺傷萬餘人驅掠二萬七千口牛馬羊數十萬而還傉檀率衆追之其將焦朗謂傉檀曰勃勃天姿雄驁御軍齊肅未可輕也今因抄掠之資率思歸之士人自為戰難與爭鋒不如從溫圍北渡趣萬斛堆阻水結營制其咽喉百戰百勝之術也傉檀將賀連怒曰勃勃以死亡之餘率烏合之衆犯順結禍幸有大功今牛羊塞路財寶若山窘弊之餘人懷貪競不能督厲士衆以抗我也我以大軍臨之必土崩魚潰今引軍避之示敵以弱我衆氣鋭宜在速追傉檀曰吾追計決矣敢諌者斬勃勃聞而大喜乃于陽武下陕鑿凌埋車以塞路傉檀遣善射者射之中勃勃左臂勃勃乃勒衆逆擊大敗之追奔八十餘里殺傷萬計斬其大將十餘人以為京觀號髑髏臺還于嶺北勃勃與姚興將張佛生戰于青石原又敗之俘斬五千七百人興遣將齊難率衆二萬來伐勃勃退如河曲難以去勃勃既逺縱兵掠野勃勃潛軍覆之俘獲七千餘人收其戎馬兵杖難引軍而退勃勃復追擊于木城拔之擒難俘其將士萬有三千戎馬萬匹嶺北夷夏降附者數萬計勃勃于是拜置守宰以撫之勃勃又率騎二萬入髙岡及于五井掠平涼雜胡七千餘户以配後軍進屯依力川姚興來伐至三城勃勃候興諸軍未集率騎擊之興大懼遣其將姚文宗距戰勃勃偽退設伏以待之興遣其將姚揄生等追之伏兵夾擊皆擒之興將王奚聚羌胡三千餘户于勑竒堡勃勃進攻之奚驍悍有膂力短兵接戰勃勃之衆多為所傷于是揠斷其水堡人窘迫執奚出降勃勃謂奚曰卿忠臣也朕方與卿共平天下奚曰若蒙大恩速死為惠乃與所親數十人自刎而死勃勃又攻興將金洛生于黃石固彌姐豪地于我羅城皆拔之徙七千餘家于大城以其丞相右地代領幽州牧以鎮之遣其尚書金纂率騎一萬攻平涼姚興來救纂為興所敗死之勃勃兄子左將軍羅提率步騎一萬攻興將姚廣都于定陽克之坑將士四千餘人以女弱為軍賞拜廣都為太常勃勃又攻興將姚夀都于清水城夀都奔上邽徙其人萬六千家于大城是嵗齊難姚廣都謀叛皆誅之姚興將姚詳棄三城南奔大蘇勃勃遣其將平東鹿奕于要擊之執詳盡俘其衆詳至勃勃數而斬之其年勃勃率騎三萬攻安定與姚興將楊佛嵩戰于青石北原敗之降其衆四萬五千獲戎馬二萬匹進攻姚興將黨智隆于東鄉降之署智隆光祿勳徙其三千餘户于二城姚興鎮北參軍王買德來奔勃勃謂買德曰朕大禹之後世居幽朔祖宗重暉常與漢魏為敵國中世不競受制于人逮朕不肖不能紹隆先構國破家亡流離漂虜今將應運而興復大禹之業卿以為何如買德曰自皇晉失統神器南移羣雄嶽峙人懷問鼎况陛下奕葉載德重光朔野神武超于漢皇聖略邁于魏祖而不于天啓之機建成大業乎今秦政雖衰藩鎮猶固深願蓄力待時詳而後舉勃勃善之拜為軍師中郎將乃赦其境內改元為鳳翔以叱干阿利領將作大匠發嶺北夷夏十萬人于朔方水北黑水之南營起都城勃勃自言朕方統一天下君臨萬邦可以統萬為都城名阿利性尤工巧然殘忍刻暴乃蒸土築城錐入一寸即殺作者而并築之勃勃以為忠故委以營繕之任又造五兵之器精鋭尤甚既成呈之工匠必有死者射甲不入即斬弓人如其入也便斬鎧匠又造百錬剛刀為龍雀大環號曰大夏龍雀銘其背曰古之利器吳楚湛盧大夏龍雀名冠神都可以懷逺可以柔邇如風靡草威服九區世甚珍之復鑄銅為大鼓飛廉翁仲銅駝龍虎之屬皆以黃金飾之列于宫殿之前凡殺工匠數千以是器物莫不精麗于是議討乞伏熾磐王買德諌曰眀王之行師也軌物以德不以暴且熾磐我之與國新遭大喪今若伐之豈所謂乘理而動上感靈和之義乎茍恃衆力因人喪難匹夫猶恥為之而况萬乘哉勃勃曰甚善微卿朕安聞此言其年下書曰朕之皇祖自北遷幽朔姓改姒氏音殊中國故從母氏為劉子而從母之姓非禮也古人氏族無常或以因生為氏或以王父之名朕將以義易之帝王者係天為子是為徽赫實與天連今改姓曰赫連氏庶協皇天之意永享無疆大慶係天之尊不可令支庶同之其非正統皆以鐵伐為氏庶朕宗族子孫剛鋭如鐵皆堪伐人立其妻梁氏為王后子璝為太子封子延為陽平公昌太原公倫酒泉公定平原公滿河南公安中山公又攻姚興將姚逵于杏城二旬克之執逵及其將姚大用姚安和姚利僕尹敵等坑戰士二萬人遣其御史中丞烏洛孤盟于沮渠蒙遜以結和好蒙遜遣其將沮渠漢平報之勃勃聞姚泓將姚嵩與氐王楊盛相持率騎四萬襲上邽未至而嵩為盛所殺勃勃攻上邽二旬克之殺泓秦州刺史姚平都及將士五千人毁城而去進攻隂密又殺興將姚良子及將士萬餘人以其子昌為使持節前將軍雍州刺史鎮隂密泓將姚恢棄安定奔于長安安定人胡􅌂華韜率户五萬據安定降于勃勃以儼為侍中韜為尚書留鎮東羊茍免鎮之配以鮮卑五千進攻泓將姚諶于雍城諶奔長安勃勃進師次郿城泓遣其將姚紹來距勃勃退如安定胡儼等襲殺茍免以城降泓勃勃引歸杏城笑謂羣臣曰劉裕伐秦水陸兼進且裕有髙世之略姚泓豈能自固吾驗以天時人事必當克之又其兄弟內叛安可以距人裕既克長安利在速返正可留子弟及諸將守關中待裕發軫吾取之若拾芥耳不足復勞吾士馬于是秣馬厲兵休養士卒尋進據安定姚泓嶺北鎮戌郡縣悉降勃勃于是盡有嶺北之地俄而劉裕滅泓入于長安遣使遺勃勃書請通和好約為兄弟勃勃命其中書侍郎皇甫徽為文而隂誦之召裕使前口授舍人為書封以答裕裕覽其文而竒之使者又言勃勃容儀瓌偉英武絶人裕歎曰吾所不如也既而勃勃還統萬裕留子義真鎮長安而還勃勃聞之大悅謂王買德曰朕將進圖長安卿試言取之方略買德曰劉裕滅秦所謂以亂平亂未有德政以濟蒼生關中形勝之地而以弱才小免守之非經逺之規也狼狽而返者欲速成篡事耳無暇有意于中原陛下以順伐逆義貫幽顯百姓以君命望陛下義旗之至以日為嵗矣青泥上洛南師之衝要宜置逰兵斷其去來之路然後杜潼關塞崤陕絶其水陸之道陛下聲檄長安申布恩澤三輔父老皆壺漿以迎王師矣義真獨坐空城逃竄無所一旬之間必面縳麾下所謂兵不血刃不戰而自定也勃勃善之以子璝都督前鋒諸軍事領撫軍大將軍率騎二萬南伐長安前將軍赫連昌屯兵潼關以買德為撫軍右長史南斷青泥勃勃率大軍繼發璝至渭陽降者屬路義真遣龍驤將軍沈田子率衆逆戰不利而退屯劉回堡田子與義真司馬王鎮惡不平因鎮惡出城遂殺之義真又殺田子于是悉召外軍入于城中閉門距守關中郡縣悉降璝夜襲長安不克勃勃進據咸陽長安樵採路絶劉裕聞之大懼乃召義真東鎮洛陽以朱齡石為雍州刺史守長安義真大掠而東至于灞上百姓遂逐齡石而迎勃勃入于長安璝率衆三萬追擊義真王師敗績義真單馬而遁買德獲晉寧朔將軍傅𢎞之輔國將軍蒯恩義真司馬毛修之于青泥積人頭以為京觀于是勃勃大饗將士于長安舉觴謂王買德曰卿往日之言一周而果效可謂算無遺策矣雖宗廟社稷之靈亦卿謀猷之力也此觴所集非卿而誰于是拜買德都官尚書加冠軍將軍封河陽侯赫連昌攻齡石及龍驤將軍王敬于潼關之曺公故壘克之執齡石及敬送于長安羣臣乃勸進勃勃曰朕無撥亂之才不能𢎞濟兆庶自枕戈寢甲十有二年而四海未同遺冦尚熾不知何以謝責當年垂之來葉將眀揚仄陋以王位讓之然後歸老朔方琴書卒嵗皇帝之號豈薄德所膺羣臣固請乃許之于是為壇于灞上僣即皇帝位赦其境內改元為昌武遣其將叱奴侯提率步騎二萬攻晉并州刺史毛德祖于蒲坂德祖奔于洛陽以侯提為并州刺史鎮蒲坂勃勃歸于長安徴隱士京兆韋祖思既至而恭懼過禮勃勃怒曰吾以國士徴汝奈何以非類處吾汝昔不拜姚興何獨拜我我今未死汝猶不以我為帝王吾死之後汝輩弄茟當置吾何地遂殺之羣臣勸都長安勃勃曰朕豈不知長安纍帝舊都有山河四塞之固但荆吳僻逺勢不能為人之患東魏與我同壤境去北京裁數百餘里若都長安北京恐有不守之憂朕在統萬彼終不敢濟河諸卿適未見此耳其下咸曰非所及也乃于長安置南臺以璝領大將軍雍州牧録南臺尚書事勃勃還統萬以宫殿大成于是赦其境內又改元曰真興時元嘉元年也因刻石都南命其祕書監胡義周撰辭頌美功德名其南門曰朝宋門東門曰招魏門西門曰服涼門北門曰平朔門追尊其髙祖訓免曰元皇帝曾祖武曰景皇帝祖豹子曰宣皇帝父衛辰曰桓皇帝廟號太祖母苻氏曰桓文皇后勃勃將廢太子璝而立少子酒泉公倫璝知之是嵗以兵攻倫倫拒之敗死倫兄太原公昌襲璝殺之并其衆歸于統萬勃勃大悅立昌為太子勃勃性凶暴好殺無順守之規常居城上置弓劔于側有所嫌忿便手自殺之羣臣忤視者毁其目笑者決其脣諌者謂之誹謗先截其舌而後斬之夷夏囂然人無生賴勃勃僣立十四年而宋氏受禪以宋元嘉二年八月死偽諡武烈皇帝廟號世祖陵曰嘉平昌字還國一名折勃勃之第二子也始封太原公授雍州刺史鎮隂密以襲殺太子璝得為嗣既僣立改年承元魏太武聞勃勃死關中亂遂遣司空奚斤襲蒲坂中兵將軍周幾襲陕自將襲統萬行至君子津會天暴雨氷合率輕騎一萬八千濟河襲昌方燕羣臣聞魏師奄至上下驚擾太武次于黑水去城三十餘里昌出戰太武馳往擊之昌退走入城門未及閉魏將豆代田乘勝帥衆入其西宫焚其西門宫門閉代田踰垣而出眀日魏分軍四掠殺獲數萬太武謂諸將曰統萬未可得也他年當與卿等取之乃徙其民萬餘家而還昌遣其弟平原公定與奚斤相持于長安元嘉四年五月太武復西伐至拔鄰山築城捨輜重以輕騎三萬倍道先行羣臣咸諌曰統萬城堅非一日可拔今輕軍討之進不可克退無所資不若步軍攻具一時俱往太武曰夫用兵之術攻城最下必不得已然後用之今以步兵攻具皆進彼必懼而堅守若攻不時拔食盡兵疲外無所掠非計之得也不如以輕騎直抵其城彼見步兵未至意必寬弛吾羸形以誘之若得一戰則成禽矣吾軍去家二千餘里復有黃河之難所謂置之死地而後生也以是決戰則有餘攻城則不足遂行次于黑水分軍伏于夾谷而以少衆至其城下昌將狄子玉來降言昌聞有魏師追其弟定定曰統萬城堅未易攻拔待我禽奚斤然後徐往內外擊之蔑不濟矣故昌堅守以待之太武患之乃退軍城北示昌以弱遣永昌王健及宗正蛾清等分騎五千西掠居人會軍士負罪亡入昌城言魏軍糧盡士卒食菜輜重在後步兵未至擊之為便昌信其言引衆出城步騎三萬司徒長孫翰等咸言昌步騎難犯宜避其鋒太武曰逺來求賊唯恐不出今避而不擊彼奮我弱非計也遂收衆偽北引而疲之昌以為退鼓譟而前舒陳為翼行五六里太武衝之昌陳不動稍前行會有風雨從東南來揚沙晦冥宦者趙倪曰今風雨從賊上來我向彼背天不助人願攝陳避之太常崔浩叱之曰是何言也吾千里制勝一日之中豈得變易賊貪進不已後軍已絶宜隱軍分出奄擊不意風道在人豈有常也太武善之乃分騎為左右隊以掎之太武馬蹶而墜幾為昌兵所獲宗室拓跋齊以身捍蔽太武騰馬得上身中流矢奮擊不輟昌衆大潰魏師乘勝逐昌至城北昌遂奔上邽太武微服逐奔者入其城城中人覺之諸門悉閉太武與拓跋齊等入其宫中得裙繫之槊上乘之而上僅乃得免眀日入城獲昌王公卿校及婦女以萬數馬三千匹牛羊數千萬頭府庫珍寶車旗器物不可勝計初勃勃性豪侈築統萬城髙十仭基厚三十步上廣十步宫牆髙五仭其堅可以厲刀斧臺榭壯大皆雕鏤圖畫被以繡綺太武曰蕞爾國而用民如此欲不亡得乎奚斤追昌至雍不及而還赫連定聞統萬破亦奔昌于上邽太武還平城以常山王素鎮統萬留太僕邱堆與娥清使助奚斤擊昌五年太武復使將軍尉建攻上邽昌退屯平涼奚斤進軍安定與邱堆娥清軍合斤以馬疲糧少深壘自固遣堆行督租為昌所襲堆敗還城昌乘勝日夜鈔掠不得芻牧諸將患之監軍侍御史安頡請斤決戰斤以馬少為辭頡曰昌狷而無謀好勇而輕每自出挑戰衆皆識之今斂諸將所乘馬可得二百匹頡請募死士擊之昌可禽也斤猶難之頡乃隂與尉建選騎以待既而昌果來攻城頡出應之昌自出搏戰軍士爭赴之昌敗走頡追禽之太武使侍中古弼迎昌至平城舍之西宫門內給以乘輿之副又以妹始平公主妻之假昌常忠將軍賜爵會稽公又封為秦王後以元嘉十一年叛魏西走為候將格殺之魏人并誅其羣弟定小字直獖勃勃之第五子也始封平原公昌立進爵為王定凶暴無賴昌之被禽也定收其餘衆奔還平涼僣即偽位改年勝光奚斤以昌為偏裨所禽深恥之乃捨輜重齎三日糧追定于平涼娥清欲循水而往斤不從自北道邀其走路定軍將遁會魏小將有罪亡歸定告以魏軍食少無水定乃分兵夾擊之魏兵大潰斤清皆為所禽邱堆棄輜重奔還于是定復取長安定嘗登隂槃山望其本國泣曰先帝以朕承大業者豈有今日之事乎使天假朕年當與卿諸人建季興之業俄而羣狐百數鳴于其側定命射之無所獲惡之曰所見亦大不臧咄咄天道復何言哉定遣使求和于宋約合兵滅魏遙分河北自恆山以東屬宋以西屬夏元嘉七年魏太武自襲平涼使將軍古弼等將兵趣安定定自安定北救平涼與弼遇弼偽退以誘之定追之太武使髙車馳擊之定大敗走鶉觚原魏軍圍之斷其水草人馬飢渴定引衆下原魏軍擊之定衆大潰定中重創單騎走收餘衆西保上邽魏兵遂取安定太武還臨平涼克之復取長安八年定遣其叔父韋伐攻秦主乞伏慕末于南安以慕末歸殺之是嵗定畏魏人之逼擁秦民十餘萬口自冶城濟河欲擊北涼王沮渠蒙遜而奪其地吐谷渾王慕璝遣騎三萬乘其半濟邀擊之執定以歸眀年吐谷渾送定于魏魏人殺之始勃勃以晉安帝義熙三年僣號至定二世三主凡二十有五年而滅後梁蕭察字理孫蘭陵人梁武帝之孫昭眀太子統之第三子也幼好學善屬文尤長佛義特為武帝嘉賞梁普通中封曲江縣公及昭眀太子薨封察嶽陽郡王位東揚州刺史領會稽太守初昭眀卒武帝捨察兄弟而立簡文內常愧之故寵亞諸子以會稽人物殷阜一都之會故有此授以慰其心察既以其昆季不得為嗣常懷不平又以武帝衰老朝多秕政有敗亡之漸遂蓄聚財貨交通賔客招募輕俠折節下之其勇敢者多歸附焉左右遂至數千人皆厚加資給大同元年除西中郎將雍州刺史都督五州諸軍事寧蠻校尉察以襄陽形勝之地又武帝創基之所時平足以樹根本時亂足以圖霸功遂務修刑政太清二年武帝以察兄河東王譽為湘州刺史徙湘州刺史張纘為雍州纘恃才輕譽州府迎候有闕譽深銜之遂託疾不與相見後聞侯景作亂頗陵蹙纘纘構譽及察于梁元帝元帝令其世子方等及王僧辨相繼攻譽譽告急于察察聞之大怒及元帝將援建業令所部諸州並發兵赴都察遣府司馬劉方貴領兵為前軍出漢口及將發元帝又使咨議參軍劉玨召察自行察不從而方貴潛與元帝相知剋期襲察未及發會察以他事召方貴方貴懼謀泄遂據樊城拒命察遣軍攻之元帝乃厚資遣張纘若將述職而密援方貴纘次大隄而樊城已陷察禽方貴兄弟黨與並斬之察時以譽危急乃留咨議參軍蔡大寶守襄陽率衆伐江陵以救之元帝大懼乃遣參軍庾㲋謂察曰以姪伐叔逆順安在察曰家兄無罪屢被攻圍七父若顧先恩豈應若是如能退兵湘水吾便旋斾襄陽時攻柵不剋會大雨暴至平地四尺衆頗離心軍主杜岸岸弟幼安及其兄子龕以其屬降于江陵察乃遁歸襄陽器械輜重多沒于健水察恐不能自固乃遣蔡大寶求附庸于西魏時西魏大統十五年也西魏丞相宇文泰令其東閣祭酒榮權使焉是嵗元帝令栁仲禮圍襄陽察乃遣妃王氏及世子嶚為質請救宇文泰令榮權報命仍遣開府楊忠為援十六年忠禽仲禮平漢東西魏命察發喪嗣位察辭乃使假散騎常侍鄭孝穆及榮權䇿命察為梁王乃于襄陽置百官承制封拜十七年留尚書僕射蔡大寶守雍部而朝于長安宇文泰謂曰王之來此頗由榮權乃召權見察泰曰權吉士也寡人與之從事未嘗見失信察曰榮權常道二國之言無私故察今者得歸誠魏闕耳魏恭帝元年宇文泰命柱國于謹伐江陵察以兵會之及江陵平泰命察主梁嗣居江陵東城資以江陵一州之地其襄陽所統盡入于魏察乃稱皇帝于其國年號大定追尊其父統為昭眀皇帝廟號髙宗統妃蔡氏為昭德皇后又尊其所生母龔氏為皇太后立妻王氏為皇后子巋為皇太子其慶賞刑威官方制度並同王者唯上疏則稱臣奉魏正朔至于爵命其下亦依梁氏之舊其戎章勳級則又兼用柱國等官又追贈叔父邵陵王綸太宰諡曰壯武贈兄河東王譽丞相諡曰武桓宇文泰仍置江陵防主統兵居于西城名曰武植泰外云助察備禦內實防察初江陵滅元帝將王琳據湘州志圖匡復及察立琳乃遣其將潘純陀侯方免來冦察禦之純陀等退歸夏口察之四年察遣其大將軍王操略取王琳之長沙武陵南平等郡五年王琳又遣其將雷文柔襲陷監利郡太守大有死之尋而琳與陳人相持稱蕃乞師于察察許之師未出而琳軍敗附于齊是嵗其太子巋朝于長安六年四月大雨震其前殿崩壓三百餘人七年冬有鵩鳥鳴于寢殿八年二月察終于前殿時年四十四是嵗周保定二年也八月葬于平陵諡曰宣皇帝廟號中宗察少有大志不拘小節雖多猜忌而知人善任使撫將士有恩能得其死力性不飲酒安于儉素事母以孝聞又不好聲色尤惡見婦人雖相去數步亦云遙聞其臭經御婦人之衣更不再著並皆棄之一幸姬媵病卧纍旬又惡見人髮白事之者必方便避之擔輿者冬月必須裹頭夏月則加蓮葉帽其在東揚州頗放誕省覽簿領好為戲弄之言以此獲譏于世及江陵平宿將尹德毅謂察曰臣聞人主之行與匹夫不同匹夫者飾小行競小廉以取名譽人主者定天下安社稷以成大功今魏虜貪婪罔顧弔伐之義俘囚士庶並充軍實然此等戚屬咸在江東悠悠之人可門到户説既塗炭至此咸謂殿下為之殿下既殺人父兄孤人子弟人盡讎也又誰與為國但魏之精鋭盡萃于此犒師之禮非無故事若殿下為設享會固請于謹等為歡彼無我虞當相率而至預伏武士因而斃之撫江陵百姓而安之文武官僚隨材銓授魏人懾息未敢送死僧辨之徒折簡可致然後朝服濟江入踐皇極纘堯復禹萬世一時察謂德毅曰卿此䇿非不善也然魏人待我甚厚未可背德若遽為卿計則鄧祁侯所謂人將不食吾餘既而闔城長幼被虜入關又失襄陽之地察恨乃曰不用德毅之言以至于是又見邑居殘毁干戈日用恥其威略不振常懷憂憤乃著愍時賦以見志焉居常怏怏每誦老馬伏櫪志在千里烈士暮年壯心不己未嘗不盱衡抱歎吒者久之遂以憂憤發背而死察篤好文義所著文集十五卷內典華嚴般若法華金光眀義疏三十六卷並行于世周武帝又命其太子巋嗣位年號天保巋字仁逺察之苐三子也機辨有文學善于撫御能得其下之歡心嗣位之元年尊其祖母龔太后曰太皇太后嫡母王皇后曰皇太后所生曺貴嬪曰皇太妃其年五月太皇太后薨諡曰元太后九月太妃又薨諡曰孝皇太妃二年其皇太后薨諡曰宣靜皇后五年陳湘州刺史華皎巴州刺史戴僧朔並來附皎送其子元響為質于巋仍請兵伐陳巋上言其狀周武詔衛公直督荆州總管權景宣大將軍元定等赴之巋亦遣其柱國王操率水軍二萬會皎于巴陵既而與陳將吳眀徹等戰于沌口直軍不利元定遂沒巋大將軍李廣等亦為陳人所虜長沙巴陵並陷于陳衛公直乃歸罪于巋之柱國殷亮巋雖以退敗不獨罪亮然不敢違命遂誅之吳眀徹乘勝攻克巋河東郡獲其守將許孝敬眀年眀徹進冦江陵引江水灌城巋出頓紀南以避其鋭江陵副總管髙琳與其尚書僕射王操拒守巋馬軍主馬武吉徹等擊眀徹眀徹退保公安巋乃還江陵巋之八年陳又遣其司空章昭逹來冦江陵總管陸騰及巋之將士擊走之昭逹又冦竟陵之青泥巋令其大將軍許世武赴援大為昭逹所破初華皎戴僧朔從衛公直與陳人戰率其麾下數百人歸于巋巋以皎為司空封江夏郡公僧朔為車騎將軍封吳興縣侯巋之十年皎將來朝至襄陽請衛公直曰梁主既臣江南諸郡人少國貧朝廷興亡繼絶理宜資贍豈使齊桓楚莊獨擅救衛復陳之美望借數州以禆梁國直然之乃遣使言狀于周武帝許之詔以基平鄀三州歸之于巋及周平齊巋朝于鄴帝雖以禮接之然未之重也巋知之後因宴承間乃陳其父荷文帝拯救之恩并敘二國艱虞脣齒掎角之事辭理辨暢因泣涕交流帝亦為之歔欷自是大加賞異禮遇日隆後帝復與之宴齊氏故臣叱列長義亦預焉帝指謂巋曰是登陴罵朕者也巋曰長義未能輔桀翻敢吠堯帝大笑及酒酣帝又命琵琶自彈之仍謂巋曰當為梁王盡歡巋乃起請舞帝曰王乃能為朕舞乎巋曰陛下既親撫五絃臣何敢不同百獸帝大悅賜雜繒萬假良馬數十匹并賜齊後主妓妾及帝所乘五百里駿馬以遣之及隋文帝執政尉遲迥王謙司馬消難等各起兵時巋將帥皆密請興師與迥等為連衡之勢進可以盡節于周氏退可以席卷山南巋以為不可俄而消難奔陳迥等相次破滅隋文帝既踐極恩禮彌厚遣使賜金五百兩銀千兩布帛萬匹馬五百匹開皇二年隋文帝備禮納巋女為晉王妃又欲以其子瑒尚蘭陵公主由是罷江陵總管巋専制其國四年入朝長安帝甚敬待之詔巋位在王公之上巋被服端麗進退間雅天子矚目百僚傾慕帝賜巋縑萬匹珍玩稱是及還親執其手謂之曰梁主久滯荆楚未復舊都朕當振旅長江相送旋反巋拜謝而歸五年五月寢疾薨臨終上表奉辭并獻所服金裝劔帝覽而嗟悼巋在位二十三年梁之臣子葬之顯陵諡曰孝眀皇帝廟號世宗巋孝悌慈仁有君人之量四時祭享未嘗不悲慕流涕性尤儉約御下有方境內安之所著文集及孝經周易義記及大小乘幽微並行于世文帝又命其太子琮嗣位琮字溫文性俶儻不羈博學有文義兼善弓馬遣人伏地持帖琮奔馬射之十發十中持帖者亦不懼初封東陽王尋立為梁太子及嗣位帝賜以璽書敦勉之又賜梁之大臣璽書誡勉之時琮年號廣運有識者曰運之為字軍走也吾君將奔走乎其年琮遣大將軍戚昕以舟師襲陳公安不克而還文帝徴琮叔父岑入朝拜大將軍封懷義公因留不遣復置江陵總管以監之琮所署大將軍許世武密以城召陳將宜黃侯陳紀謀泄琮誅之後二嵗文帝徴琮入朝琮率臣下二百餘人入長安江陵父老莫不隕涕曰吾君其不反矣文帝以琮來朝遣武鄉公崔𢎞度將兵戍之軍至鄀州琮叔父嚴及弟瓛等懼𢎞度掩襲之遂引陳人至城下虜居民而叛于是廢梁國文帝遣左僕射髙熲安集之曲赦江陵死罪給復十年梁二主各給守墓十户拜琮柱國賜爵莒國公自察初即位嵗在乙亥至是嵗在丁未凡三十三載而亡琮至煬帝嗣位甚見親重拜內史令改封梁公琮之宗族緦麻以上並得隨才擢用于是諸蕭昆弟布列朝廷琮性淡雅不以職務自嬰退朝縱酒而已內史令楊約與琮同列帝令約宣旨誡勵約復以私情諭之琮曰琮若復事事則何異公哉約笑而退約兄素時為尚書令見琮嫁從父妹于鉗耳氏謂曰公帝王之族何乃適妹鉗耳氏琮曰前已嫁妹于侯莫陳氏此復何疑素曰鉗耳羌也侯莫陳虜也何得相比琮曰以羌異虜未之前聞素慙而止琮雖羈旅見北間豪貴無所降下常與賀若弼深友弼既誅復有童謡曰蕭蕭亦復起帝由是忌之遂廢于家卒贈左光祿大夫子鉉位襄城通守復以琮弟子巨為梁公巨小名曰藏煬帝甚昵之以為千牛與宇文皛出入宫掖伺察內外帝每有逰宴巨未嘗不從遂于宫中多行淫穢江都之變為宇文化及所殺察之居帝位百寮追諡長子嶚為孝惠太子次子巖封安平王岌東平王岑河間王後改封吳郡王琮弟瓛義興王瑑晉陵王璟臨海王珣南海王瑒義安王以蔡大寶為股肱王操為腹心魏益德尹正薛暉許孝敬薛宣為爪牙甄元成劉盈岑善方傅淮褚圭蔡大業典衆務張綰以舊齒處顯位沈重以儒學蒙厚禮自餘多所奬拔咸盡其器能及巋纂業親賢並用將相則華皎殷亮劉忠義宗室則蕭欣蕭翼人望則蕭確謝溫栁洋王湜徐嶽外戚則王洋王誦殷璉文章則劉孝勝范迪沈居遊君公栁信言政事則袁敞栁莊蔡延夀甄翊皇甫兹故能保其疆土而和其人焉今載察子嶚等及蔡大寶以下尤著者附于左其在梁陳隋已有傳及巋諸子未任職者則不兼録嶚字道逺察之長子也母曰宣靜皇后察之為梁王立為世子尋病卒及察稱帝追諡焉巖字義逺察苐五子也性仁厚善撫接厯尚書令太尉太傅入陳授東揚州刺史及陳亡百姓推巖為主為總管宇文述所破伏法于長安岌察苐六子也性淳和位至侍中中衛將軍巋之五年卒贈司空諡曰孝岑字智逺察苐八子也位至太尉性簡貴御下嚴整及琮嗣位自以望重屬尊頗有不法故隋文徴入朝拜大將軍封懷義郡公瓛字欽文巋苐三子也幼有令譽能屬文位荆州刺史頗有能名崔𢎞度兵至鄀州瓛懼與其叔父巖奔陳陳主以為侍中吳州刺史甚得物情三吳父老皆曰吾君之子陳亡吳人推之為主吳人見梁武簡文及察巋等兄弟中並第三而踐尊位瓛自以巋第三子深自矜負有謝異者頗知廢興梁陳之際言無不驗江左人甚敬信之及陳主被禽異奔瓛由是益為衆所歸宇文述之討瓛也瓛遣王褒守吳州自將拒述述遣兵别道襲褒褒衣道士服棄城而遁瓛敗將左右數人逃于太湖匿于人家被執述送長安斬之璟仕隋尚衣奉御瑒衛尉卿祕書監陶邱侯瑀內史侍郎河池太守蔡大寶字敬位濟陽考城人祖履齊尚書祠部郎父點梁尚書儀曺郎南兖州别駕大寶少孤而篤學不倦善屬文初以眀經對䇿第一解褐武陵王國左常侍嘗以書干僕射徐勉勉甚賞異乃令與其子逰處所有墳籍盡以給之遂博覽羣書學無不綜察初出第勉仍薦大寶為侍讀兼掌記室尋除尚書儀曺郎察出鎮會稽大寶詣選曺求咨議不得以為記室大寶攘臂而出曰不為孫秀非人也察涖襄陽遷咨議參軍謀謨皆自大寶出及梁元帝與河東王譽構隙察令大寶使江陵以觀之元帝素知大寶見之甚悅乃示所製元覽賦令注解焉三日而畢元帝大嗟賞之贈遺甚厚大寶還白察云湘東必有異圖禍亂將作不可下援臺城察納之及察于江陵稱帝為侍中尚書令參掌選事進位柱國軍師將軍封安豐縣侯巋嗣位册授司空中書監中權大將軍領吏部尚書固讓司空許之加特進巋之三年卒及葬巋三臨其喪贈司徒進爵為公諡曰文凱配食察廟庭大寶性嚴整有智謀雅逹政事文辭贍速察之章表書記教令詔册並大寶専掌之察推心委任以為謀主時人以察之有大寶猶劉先主之有孔眀焉所著文集三十卷及尚書義疏並行于世有四子次子延夀有器識博涉經籍尤善當世之務尚察女宣城公主厯中書郎尚書左丞吏部郎御史中丞從琮入隋授開府儀同三司祕書丞終于成州刺史大寶弟大業字敬道有至行位散騎常侍衛尉卿都官尚書太常卿卒贈金紫光祿大夫諡曰簡有五子允恭最知名位太子舍人梁滅入陳為尚書庫部郎陳亡仕隋起居舍人王操字子髙其先太原晉陽人察母龔氏之外弟也性敦厚有籌略初為察外兵參軍親任亞于蔡大寶及察稱帝厯五兵尚書郢州刺史進位柱國封新康縣侯巋嗣位授鎮右將軍尚書僕射及吳眀徹為冦巋出頓紀南操撫循將士莫不用命眀徹既退江陵獲全操之力也遷侍中中衛將軍尚書令開府儀同三司領荆州刺史操既位居朝右每日挹損深得當時之譽卒巋舉哀于朝堂流涕曰天不使吾平蕩江表何奪吾賢相之速也及葬親祖于瓦宫門贈司空進爵為公諡曰康節有七子次子衡最知名有才學位中書黃門侍郎魏益德襄陽人也有材幹膽勇過人察稱帝進位柱國封上黃縣侯卒贈司空諡曰忠壯進爵為公巋之五年以益德配食察廟庭尹正其先天水人察涖雍州正為其府中兵參軍禽張纘獲杜岸皆正之力察稱帝除護軍將軍位柱國封新野縣侯卒贈開府儀同三司諡曰剛巋之五年以正配食察廟庭子德毅多權略位大將軍後以見疑賜死甄元成字敬平中山人博逹經史善屬文少為簡文所知以録事參軍隨察鎮襄陽轉中記室參軍頗參政事以江陵甲兵殷盛遂懷二心密書與元帝具申誠款或有得其書送于察察深信佛法常願不殺誦法華經人元成素誦法華經遂以此獲免察後見之常曰甄公好得法華經力後位吏部尚書有文集二十卷子詡少沈敏間習政事厯中書舍人尚書右丞從琮入隋授開府儀同三司終于太府少卿岑善方字思義南陽棘陽人祖惠甫給事中父昶散騎侍郎善方有器局博綜經史以刑獄參軍隨察至襄陽察初請內附以善方兼記室充使往來凡數十反魏恭帝二年封長寧縣公及察稱帝位散騎侍郎起部尚書善方性清慎有當世幹能故察委以機密􅌰贈太常卿諡曰敬所著文集十卷有七子並有操行之元之利之象最知名之元太子舍人早卒之利仕隋位零陵郡丞之象仕隋尚書虞部員外侍郎邵陵上宜渭南邯鄲四縣令宗如周南陽人有才學以府僚隨察後至度支尚書如周面狹長察以法華經云聞經隨喜面不狹長嘗戲之曰卿何為謗經如周踧踖自陳不謗察又謂之如初如周懼出告蔡大寶大寶知其旨笑謂之曰君當不謗餘經正應不信法華耳如周乃悟又嘗有人訴事于如周謂為經作如州官也乃曰某有屈滯故來訴如州官如周曰爾何小人敢呼我名其人慙謝曰秪言如周官作如州不知如周官名如周早知如周官名如州則不敢喚如周官作如州如周乃笑曰令卿自責見侮反深衆咸服其寬雅袁敞陳郡人祖昻司空父仕俊安成內史敞少有識量博涉文史以吏部郎使詣周時主者以敞班在陳使之後敞固不從命曰昔陳之祖父乃梁諸侯下吏盜有江東今周朝宗萬國招攜以禮若使梁之行人在陳之後便恐彛倫失序豈使臣之所望焉主者不能屈遂以狀奏周武帝善之乃詔敞與陳使異日而進使還以稱旨遷侍中轉左户尚書從琮入隋授開府儀同三司終于譙州刺史通志卷一百九十三
