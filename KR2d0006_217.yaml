body:
  text: 通志卷一百九十三宋右廸功郎鄭樵漁仲撰載記卷第八西涼李暠歆夏赫連勃勃昌定後梁蕭詧巋琮嶚巖岌岑瓛蔡大寳王操魏益徳尹正甄元成岑善方宗如周袁敞西涼李暠字元盛小字長生隴西成紀人姓李氏漢前將軍廣之十六世孫也廣曾祖仲翔漢初為將軍討叛羌于素昌素昌即狄道也衆寡不敵死之仲翔子伯考奔䘮因𦵏于狄道之東川遂家焉世為西州右姓髙祖雍曾祖柔仕晉並厯位郡守祖弇仕張軌為武衛將軍安世亭侯父昶幼有令名早卒遺腹生暠少而好學性沈敏寛和羙器度通涉經史尤善文義及長頗習武藝誦孫吴兵法嘗與吕光太史令郭黁及其同母弟宋繇同宿黁起謂繇曰君當位極人臣李君有國土之分家有騧草馬生白額駒此其時也吕光末京兆叚業自稱涼州牧以敦煌太守趙郡孟敏為沙州刺史署暠效榖令敏尋卒敦煌䕶軍馮翊郭謙沙州治中敦煌索仙等以暠溫毅有恵政推為寜朔將軍敦煌太守暠初難之㑹宋繇仕扵業告歸敦煌言扵暠曰兄忘郭黁之言邪白額駒今已生矣暠乃従之尋進號冠軍稱藩于業業以暠為安西將軍敦煌太守領䕶西胡校尉及業僭稱涼王其右衛将軍索嗣構暠扵業乃以嗣為敦煌太守率騎五百而西未至二十里移暠使迎已暠驚疑将出迎之效榖令張邈及宋繇止之曰吕氏政衰叚業闇弱正是英豪有為之日將軍䖏一國成資柰何束手扵人索嗣自以本邦謂人情附已不虞將軍卒能拒之可一戰而擒矣宋繇亦曰大丈夫已為世所推今日便授首扵嗣豈不為天下笑乎大兄英姿挺傑有雄霸之風張王之業不足繼也暠曰吾少無風雲之志因官至此不圖此郡士人忽爾見推向言出迎者未知士大夫之意故也因遣繇覘嗣繇見嗣啗以甘言還謂暠曰嗣志驕兵弱易擒耳扵是遣其二子歆讓與邈繇及司馬尹建興等逆戰破之嗣奔還張掖暠素與嗣善結為刎􅖪交反為所構故深恨之乃罪状嗣扵叚業業將沮渠男成又惡嗣亦勸業除之業乃殺嗣遣使謝暠分敦煌之涼興烏澤晉昌之宜禾三縣為涼興郡進暠持節都督涼興已西諸軍事鎮西將軍領䕶西夷校尉時有赤氣起于暠後園龍跡見于小城隆安四年晋昌太守唐瑶移檄六郡推暠為大都督大將軍涼州領秦涼二州牧䕶羌校尉暠乃赦其境内建年為庚子追尊祖弇曰涼景公父昶涼簡公以唐瑶為征東將軍郭謙為軍諮祭酒索仙為左長史張邈為右長史尹建興為左司馬張體順為右司馬張條為牧府左長史令狐溢為右長史張林為太府主簿宋繇張謖為従事中郎繇加折衝將軍謖加揚武將軍索承眀為牧府右司馬令狐遷為武衛將軍晋興太守汜徳瑜為寜逺将軍西郡太守張靖為折衝将軍河湟太守索順為威逺将軍西平太守趙開為騂馬䕶軍大夏太守索慈為廣武太守隂亮為西安太守令狐赫為武威太守索術為武興太守以招懐東夏又遣宋繇東伐涼興并擊玉門已西諸城皆下之遂屯玉門陽闗廣田積榖為東伐之資初吕光之稱王也遣使市六璽玉扵于窴至是玉至敦煌納之郡府仍扵南門外臨水起堂名曰靖恭之堂以議朝政閲武事圖讃自古聖帝眀王忠臣孝子烈士貞女暠親為序頌以眀鑒戒之義當時文武羣寮亦皆圖焉有白雀翔于靖恭堂暠觀之大悦又立泮宫增髙門學生五百人起嘉納堂扵後園以圖讃所志義熙元年暠改元為建初遣舍人黄始梁興間行奉表詣建康稱藩求禀正朔暠謂羣僚曰昔河右分崩羣豪競起吾以寡徳為衆賢所推何嘗不忘寝與食思濟黎庻故前遣母弟繇董率雲騎東殄不庭軍之所至莫不賔下今惟䝉遜鵄跱一城自張掖已東晋之遺黎雖為戎虜所制至扵向義思風過扵殷人之望西伯大業須定不可安寝吾將遷都酒泉漸逼冦宂諸君以為何如張邈賛成其議暠大悦曰二人同心其利斷金張長史與孤同矣夫復何疑乃以張體順為寜逺將軍建康太守鎮樂涫徴宋繇為右將軍領敦煌䕶軍與其子敦煌太守讓鎮敦煌遂遷居于酒泉初暠之西也留女敬愛養扵外祖尹文文既東遷暠従姑梁襃之母養之其後秃髪傉檀假道扵北山鮮卑遣襃送敬愛于酒泉并通和好暠遣使報聘贈以方物暠親率騎二萬略地至于建東鄯善前部王遣使貢其方物沮渠䝉遜来侵至于建康掠三千餘户而歸暠大怒率騎追之及于彌安大敗之盡収所略之户初苻堅建元之末徙江漢之人萬餘户于敦煌中州之人有田疇不闢者亦徙七千餘户郭黁之寇武威武威張掖已東人西奔敦煌晋昌者數千户及暠東遷皆徙之于酒泉分南人五千户置㑹稽郡中州人五千户置廣夏郡餘萬三千户分置武威武興張掖三郡築城扵敦煌南子亭以威南虜又以前表未報復遣沙門法泉間行奉表建康願竭誠盡節為國輸力暠既遷酒泉乃敦勸稼穡羣寮以年榖頻登百姓樂業請勒銘酒泉暠許之扵是使儒林祭酒劉彦眀為文刻石頌徳既而䝉遜每年侵寇不止暠志在以徳撫其境内但與通和立盟弗之校也是時白狼白菟白雀白雉白鳩皆棲其園囿其羣下以為白祥金精所誕皆應時邕而至又有神光甘露連理嘉禾衆瑞請史官記其事暠従之尋而䝉遜背盟来侵暠遣世子歆要擊敗之獲其將沮渠百年暠乃修敦煌舊塞東西二圍以防北虜之患築敦煌舊塞西南二圍以威南虜暠以緯世之量當吕氏之末為羣雄所奉遂唘霸圖兵無血刄坐定千里謂張氏之業指期可成河西十郡嵗月而一既而秃髮傉檀入據姑臧沮渠䝉遜基宇稍廣扵是慨然著述志賦以自見詞多不載暠寝疾頋命宋繇曰吾少離荼毒百艱備嘗扵䘮亂之際遂為此方所推才弱智淺不能一同河右今氣力惙然當不復起矣死者大理吾不悲之所恨志不申耳居元首之位者宜深誡危殆之機吾終之後世子猶卿子也善相輔導述吾平生勿令居人之上専驕自任軍國之宜委之扵卿無使籌略乖𠂻失成敗之要十三年死時年六十七國人上諡曰武昭王墓曰建世陵廟號太祖暠世子譚早卒第二子歆嗣歆字士業暠死時府寮奉為大都督大將軍涼公領涼州牧䕶羌校尉大赦境内改年為嘉興尊母尹氏為太后以宋繇為武衛將軍廣夏太守軍諮祭酒録三府事索仙為征虜將軍張掖太守沮渠䝉遜遣其張掖太守沮渠廣宗詐降誘歆歆遣武衛溫宜䓁赴之親勒大軍為之後繼䝉遜率衆三萬設伏于蓼泉歆聞引兵還為䝉遜所逼歆親貫甲先登大敗之追奔百餘里俘斬七千餘級眀年䝉遜又伐歆歆將出距之左長史張體順固諌乃止䝉遜大芟秋稼而還是嵗朝廷以歆為持節都督七郡諸軍事鎮西大將軍䕶羌校尉酒泉公歆用刑頗嚴又繕築不止従事中郎張顯上䟽諫曰入嵗已来隂陽失序屢有賊風暴雨犯傷和氣今區域三分勢不久並并兼之本實在農戰懐逺之略事歸寛簡而更繁刑峻法宫室是務人力凋殘百姓悲悴致災之咎實此之由主簿汜稱又上䟽諌曰臣聞天之子愛人后殷勤至矣故政之不修則垂災譴以誡之改者雖危必昌宋景是也其不改者雖安必亡虢公是也元年三月癸卯敦煌謙徳堂䧟八月效榖地裂二年元日昏霧四塞四月日赤無光二旬乃復十一月狐上南門今兹春夏地頻五震六月隕星于建康臣雖學不稽古敏謝仲舒頗亦聞道扵先師且行年五十有九請為殿下略言耳目之所聞見不復能逺論書傳之事也乃者咸安之初西平地裂狐入謙光殿前俄而秦師奄至都城不守梁熙既為涼州藉秦氏兵亂規有全涼之地外不撫百姓内多聚歛建元十九年姑臧南門崩隕石扵閑豫堂二十年而吕光東反子敗扵前身戮扵後叚業因羣胡創亂遂稱制此方三年之中地震五十餘所既而先王龍興𤓰州䝉遜敗之張掖此皆目前之成事亦殿下之所聞知效榖先王鴻漸之始謙徳即尊之室基䧟地裂大凶之徴也日者太陽之精中國之象赤而無光中國將為胡夷之所陵滅諺曰野獸入家主人將去今狐上南門亦災之大也又狐者胡也天意若曰將有胡人居于此城南面而居者也昔春秋之世星隕于宋襄公卒為楚所擒地者至隂胡夷之象當静而動反亂天常天意若曰胡夷將震動中國中國若不修徳將有宋襄之禍臣願殿下親仁善鄰養威觀釁罷宫室之務止游畋之娱後宫嬪妃諸弟子女躬受分田身勸蠶績以清儉素徳為榮息兹奢靡之費庶可以弭災止變不然將恐宗廟之危必不出紀歆並不納歆立四年而宋受禪歆將謀東伐張體順切諌乃止歆聞䝉遜南伐秃髮傉檀命中外戒嚴將攻張掖尹氏固諌不聴宋繇又固諌歆並不従繇退而歎曰大事去矣吾見師之出不見師之還也歆遂率步騎三萬東伐次于都瀆澗䝉遜自浩舋来距戰于懐城為䝉遜所敗左右勸歆還酒泉歆曰吾違太后眀誨逺取敗辱不殺此胡復何面目以見母也勒衆復戰敗于蓼泉為䝉遜所害歆諸弟酒泉太守翻新城太守預領羽林右監宻左將軍眺右將軍亮等西奔敦煌䝉遜遂入于酒泉歆之未敗也有大虵従南門而入至于恭徳殿前有雙雉飛出宫内通街大樹上有烏鵲争巢鵲為烏所殺又有敦煌父老令狐熾夢白頭公衣帢而謂熾曰南風動吹長木胡桐椎不中轂言訖忽然不見歆小字桐椎至是而亡翻及弟敦煌太守恂與諸子䓁棄敦煌奔于北山䝉遜以索嗣子元緒行敦煌太守元緒麤嶮好殺大失人和郡人宋承張𢎞以恂在郡有恵政宻信招恂恂率數十騎入于敦煌元緒東奔涼興宋承䓁推恂為冠軍將軍涼州刺史䝉遜遣世子徳政率衆攻恂恂閉門不戰䝉遜自率衆二萬攻之三面起堤以水灌城恂遣壮士一千連版為橋潜欲決堤䝉遜勒兵逆戰屠其城歆子重耳脱身奔于江左仕于宋後歸魏為恒農太守䝉遜徙翻子寳䓁于姑臧嵗餘北奔伊吾後歸于魏獨尹氏及諸女死扵伊吾暠以安帝隆安四年僣立至宋髙祖永初二年滅凡二十二年二世三主夏赫連勃勃字屈丐匃奴右賢王去卑之後而劉淵之族也曾祖虎劉聰世以宗室封樓煩公拜安北將軍監鮮卑諸軍事丁零中郎將雄據肆盧川為代王猗盧所敗遂出塞表祖豹子招集種落復為諸部之雄石虎遣使就拜為平北將軍左賢王丁零單于父衛辰入居塞内苻堅以為西單于督攝河西諸虜屯于代来城及堅國亂遂有朔方之地控弦之士三萬八千後魏師伐之衛辰令其子力俟提距戰為魏所敗魏人乗勝濟河克代来執衛辰殺之勃勃乃奔于叱干部叱干他斗伏送勃勃扵魏他斗伏兄子阿利先戌大洛川聞將送勃勃馳諌曰鳥雀投人尚宜濟免况勃勃國破家亡歸命扵我縦不能容猶宜任其所奔今執而送之深非仁者之舉他斗伏懼為魏所責弗従阿利潜遣勁勇篡勃勃扵路送扵姚興髙平公没奕于奕于以女妻之勃勃身長八尺五寸腰帶十圍性辯慧美風儀興見而竒之深加禮敬拜驍騎將軍加奉車都尉常参軍國大議寵遇踰扵勲舊興弟邕言扵興曰勃勃天性不仁難以親近陛下寵遇太甚臣竊惑之興曰勃勃有濟世之才吾方收其藝用與之共平天下有何不可乃以勃勃為安逺將軍封陽川侯使助没奕于鎮髙平以三城朔方雜夷及衛辰部衆三萬配之使為伐魏偵候姚邕固諌以為不可興曰卿何以知其性氣邕曰勃勃奉上慢御衆殘貪暴無親輕為去就寵之踰分終為邉害興乃止頃之以勃勃為持節安北將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方時河西鮮卑杜崘獻馬八千匹于姚興濟河至大城勃勃㽞之召其衆三萬餘人偽獵髙平川襲殺没奕于而并其衆衆至數萬義熙二年僣稱天王大單于赦其境内建元曰龍昇署置百官自以匃奴夏后氏之苗裔也國稱大夏以其長兄右地代為丞相代公次兄力俟提為大將軍魏公叱干阿利為御史大夫梁公弟阿利羅引為征南將軍司𨽻校尉若門為尚書令叱以鞬為征西将軍尚書左僕射乙斗為征北将軍尚書右僕射自餘以次授任其年討鮮卑薛于䓁三部破之降衆萬數千進討姚興三城已北諸戍斬其將楊丕姚石生䓁諸将諌以固險不従又復言扵勃勃曰陛下將欲經營宇内南取長安宜先固根本使人心有所憑繫然後大業可成髙平險固山川沃饒可以都也勃勃曰卿徒知其一未知其二吾大業草創衆旅未多姚興亦一時之雄闗中未可圖也且其諸鎮用命我若専固一城彼必并力扵我衆非其敵亡可立待吾以雲騎風馳出其不意救前則擊其後救後則擊其前使彼疲扵奔命我則㳺食自若不及十年嶺北河東盡我有也待姚興死後徐取長安姚泓凡弱小免擒之方略已在吾計中矣昔軒轅氏亦遷居無常二十餘年豈獨我乎扵是侵掠嶺北嶺北諸城門不晝唘興歎曰吾不用黄免之言以至扵此黄免姚邕小字也勃勃初僣號求婚扵秃髮傉檀傉檀弗許勃勃怒率騎二萬伐之自楊非至于支楊三百餘里殺傷萬餘人驅掠二萬七千口牛馬羊數十萬而還傉檀率衆追之其将焦朗謂傉檀曰勃勃天姿雄驁御軍齊肅未可輕也今因抄掠之資率思歸之士人自為戰難與争鋒不如従溫圍北渡趣萬斛堆阻水結營制其咽喉百戰百勝之術也傉檀將賀連怒曰勃勃以死亡之餘率烏合之衆犯順結祸幸有大功今牛羊塞路財寳若山窘弊之餘人懐貪競不能督厲士衆以抗我也我以大軍臨之必土崩魚潰今引軍避之示敵以弱我衆氣鋭宜在速追傉檀曰吾追計决矣敢諌者斬勃勃聞而大喜乃扵陽武下陕鑿凌埋車以塞路傉檀遣善射者射之中勃勃左臂勃勃乃勒衆逆擊大敗之追奔八十餘里殺傷萬計斬其大将十餘人以為京觀號髑髏臺還于嶺北勃勃與姚興将張佛生戰于青石原又敗之俘斬五千七百人興遣将齊難率衆二萬来伐勃勃退如河曲難以去勃勃既逺縦兵掠野勃勃潜軍覆之俘獲七千餘人收其戎馬兵杖難引軍而退勃勃復追撃于木城拔之擒難俘其将士萬有三千戎馬萬匹嶺北夷夏降附者數萬計勃勃扵是拜置守宰以撫之勃勃又率騎二萬入髙岡及于五井掠平涼雜胡七千餘户以配後軍進屯依力川姚興来伐至三城勃勃候興諸軍未集率騎擊之興大懼遣其将姚文宗距戰勃勃偽退設伏以待之興遣其将姚揄生䓁追之伏兵夹擊皆擒之興将王奚聚羌胡三千餘户于勑竒堡勃勃進攻之奚驍悍有膂力短兵接戰勃勃之衆多為所傷扵是揠斷其水堡人窘廹執奚出降勃勃謂奚曰卿忠臣也朕方與卿共平天下奚曰若䝉大恩速死為恵乃與所親數十人自刎而死勃勃又攻興將金洛生于黄石固彌姐豪地于我羅城皆拔之徙七千餘家扵大城以其丞相右地代領幽州牧以鎮之遣其尚書金纂率騎一萬攻平涼姚興来救纂為興所敗死之勃勃兄子左將軍羅提率步騎一萬攻興將姚廣都于定陽克之坑將士四千餘人以女弱為軍賞拜廣都為太常勃勃又攻興將姚夀都于清水城夀都奔上邽徙其人萬六千家于大城是嵗齊難姚廣都謀叛皆誅之姚興將姚詳棄三城南奔大蘇勃勃遣其將平東鹿奕于要撃之執詳盡俘其衆詳至勃勃數而斬之其年勃勃率騎三萬攻安定與姚興將楊佛嵩戰于青石北原敗之降其衆四萬五千獲戎馬二萬匹進攻姚興將党智隆于東鄉降之署智隆光禄勲徙其三千餘户于貳城姚興鎮北参軍王買徳来奔勃勃謂買徳曰朕大禹之後世居幽朔祖宗重暉常與漢魏為敵國中世不競受制扵人逮朕不肖不能紹隆先構國破家亡流離漂虜今将應運而興復大禹之業卿以為何如買徳曰自皇晋失統神器南移羣雄岳峙人懐問鼎况陛下奕葉載徳重光朔野神武超扵漢皇聖略邁扵魏祖而不扵天唘之機建成大業乎今秦政雖衰藩鎮猶固深願蓄力待時詳而後舉勃勃善之拜為軍師中郎將乃赦其境内改元為鳳翔以叱干阿利領將作大匠發嶺北夷夏十萬人扵朔方水北黒水之南營起都城勃勃自言朕方統一天下君臨萬邦可以統萬為都城名阿利性尤工巧然殘忍刻暴乃蒸土築城錐入一寸即殺作者而并築之勃勃以為忠故委以營繕之任又造五兵之器精鋭尤甚既成呈之工匠必有死者射甲不入即斬弓人如其入也便斬鎧匠又造百錬剛刀為龍雀大環號曰大夏龍雀銘其背曰古之利器吴楚湛盧大夏龍雀名冠神都可以懐逺可以柔邇如風靡草威服九區世甚珍之復鑄銅為大鼔飛㢘翁仲銅駝龍虎之屬皆以黄金飾之列扵宫殿之前凡殺工匠數千以是器物莫不精麗扵是議討乞伏熾磐王買徳諌曰眀王之行師也軌物以徳不以暴且熾磐我之與國新遭大䘮今若伐之豈所謂乗理而動上感靈和之義乎茍恃衆力因人䘮難匹夫猶恥為之而况萬乗哉勃勃曰甚善微卿朕安聞此言其年下書曰朕之皇祖自北遷幽朔姓改姒氏音殊中國故從母氏為劉子而従母之姓非禮也古人氏族無常或以因生為氏或以王父之名朕將以義易之帝王者係天為子是為徽赫實與天連今改姓曰赫連氏庶恊皇天之意永享無疆大慶係天之尊不可令支庻同之其非正統皆以鐵伐為氏庻朕宗族子孫剛鋭如鐵皆堪伐人立其妻梁氏為王后子璝為太子封子延為陽平公昌太原公倫酒泉公定平原公滿河南公安中山公又攻姚興将姚逵于杏城二旬克之執逵及其将姚大用姚安和姚利僕尹敵䓁坑戰士二萬人遣其御史中丞烏洛孤盟扵沮渠䝉遜以結和好䝉遜遣其將沮渠漢平報之勃勃聞姚泓将姚嵩與氐王楊盛相持率騎四萬襲上邽未至而嵩為盛所殺勃勃攻上邽二旬克之殺泓秦州刺史姚平都及将士五千人毁城而去進攻隂宻又殺興将姚良子及将士萬餘人以其子昌為使持節前将軍雍州刺史鎮隂宻泓將姚恢棄安定奔于長安安定人胡􅌂華韜率户五萬據安定降于勃勃以儼為侍中韜為尚書留鎮東羊茍免鎮之配以鮮卑五千進攻泓将姚諶于雍城諶奔長安勃勃進師次郿城泓遣其将姚紹来距勃勃退如安定胡儼䓁襲殺茍免以城降泓勃勃引歸杏城笑謂羣臣曰劉裕伐秦水陸兼進且裕有髙世之略姚泓豈能自固吾驗以天時人事必當克之又其兄弟内叛安可以距人裕既克長安利在速返正可留子弟及諸将守闗中待裕發軫吾取之若拾芥耳不足復勞吾士馬扵是秣馬厲兵休養士卒尋進據安定姚泓嶺北鎮戌郡縣悉降勃勃扵是盡有嶺北之地俄而劉裕滅泓入于長安遣使遺勃勃書請通和好約為兄弟勃勃命其中書侍郎皇甫徽為文而隂誦之召裕使前口授舎人為書封以答裕裕覽其文而竒之使者又言勃勃容儀瓌偉英武絶人裕歎曰吾所不如也既而勃勃還統萬裕留子義真鎮長安而還勃勃聞之大悦謂王買徳曰朕将進圖長安卿試言取之方略買徳曰劉裕滅秦所謂以亂平亂未有徳政以濟蒼生闗中形勝之地而以弱才小免守之非經逺之規也狼狽而返者欲速成篡事耳無暇有意扵中原陛下以順伐逆義貫幽顯百姓以君命望陛下義旗之至以日為嵗矣青泥上洛南師之衝要宜置逰兵斷其去来之路然後杜潼闗塞崤陕絶其水陸之道陛下聲檄長安申布恩澤三輔父老皆壺漿以迎王師矣義真獨坐空城逃竄無所一旬之間必面縳麾下所謂兵不血刃不戰而自定也勃勃善之以子璝都督前鋒諸軍事領撫軍大将軍率騎二萬南伐長安前将軍赫連昌屯兵潼闗以買徳為撫軍右長史南斷青泥勃勃率大軍繼發璝至渭陽降者屬路義真遣龍驤将軍沈田子率衆逆戰不利而退屯劉迴堡田子與義真司馬王鎮惡不平因鎮惡出城遂殺之義真又殺田子扵是悉召外軍入于城中閉門距守闗中郡縣悉降璝夜襲長安不克勃勃進據咸陽長安樵採路絶劉裕聞之大懼乃召義真東鎮洛陽以朱齡石為雍州刺史守長安義真大掠而東至扵㶚上百姓遂逐齡石而迎勃勃入于長安璝率衆三萬追擊義真王師敗績義真單馬而遁買徳獲晋寜朔将軍傅𢎞之輔國将軍蒯恩義真司馬毛修之扵青泥積人頭以為京觀扵是勃勃大饗将士于長安舉觴謂王買徳曰卿往日之言一周而果效可謂算無遺策矣雖宗廟社稷之靈亦卿謀猷之力也此觴所集非卿而誰扵是拜買徳都官尚書加冠軍将軍封河陽侯赫連昌攻齡石及龍驤将軍王敬扵潼闗之曺公故壘克之執齡石及敬送于長安羣臣乃勸進勃勃曰朕無撥亂之才不能𢎞濟兆庻自枕戈寝甲十有二年而四海未同遺冦尚熾不知何以謝責當年垂之来葉将眀揚仄陋以王位讓之然後歸老朔方琴書卒嵗皇帝之號豈薄徳所膺羣臣固請乃許之扵是為壇扵㶚上僣即皇帝位赦其境内改元為昌武遣其将叱奴侯提率步騎二萬攻晋并州刺史毛徳祖于蒲坂徳祖奔于洛陽以侯提為并州刺史鎮蒲坂勃勃歸于長安徴隠士京兆韋祖思既至而恭懼過禮勃勃怒曰吾以國士徴汝柰何以非類䖏吾汝昔不拜姚興何獨拜我我今未死汝猶不以我為帝王吾死之後汝輩弄茟當置吾何地遂殺之羣臣勸都長安勃勃曰朕豈不知長安累帝舊都有山河四塞之固但荆吴僻逺勢不能為人之患東魏與我同壤境去北京裁數百餘里若都長安北京恐有不守之憂朕在統萬彼終不敢濟河諸卿適未見此耳其下咸曰非所及也乃扵長安置南臺以璝領大将軍雍州牧録南臺尚書事勃勃還統萬以宫殿大成扵是赦其境内又改元曰真興時元嘉元年也因刻石都南命其秘書監胡義周撰辭頌羙功徳名其南門曰朝宋門東門曰招魏門西門曰服涼門北門曰平朔門追尊其髙祖訓免曰元皇帝曾祖武曰景皇帝祖豹子曰宣皇帝父衛辰曰桓皇帝廟號太祖母苻氏曰桓文皇后勃勃将廢太子璝而立少子酒泉公倫璝知之是嵗以兵攻倫倫拒之敗死倫兄太原公昌襲璝殺之并其衆歸于統萬勃勃大悦立昌為太子勃勃性凶暴好殺無順守之規常居城上置弓劔扵側有所嫌忿便手自殺之羣臣忤視者毁其目笑者决其脣諌者謂之誹謗先截其舌而後斬之夷夏囂然人無生頼勃勃僣立十四年而宋氏受禪以宋元嘉二年八月死偽諡武烈皇帝廟號世祖陵曰嘉平昌字還國一名折勃勃之第二子也始封太原公授雍州刺史鎮隂宻以襲殺太子璝得為嗣既僣立改年承元魏太武聞勃勃死闗中亂遂遣司空奚斤襲蒲坂中兵将軍周㡬襲陕自将襲統萬行至君子津㑹天暴雨氷合率輕騎一萬八千濟河襲昌方燕羣臣聞魏師奄至上下驚擾太武次扵黑水去城三十餘里昌出戰太武馳往撃之昌退走入城門未及閉魏将豆代田乗勝帥衆入其西宫焚其西門宫門閉代田踰垣而出眀日魏分軍四掠殺獲數萬太武謂諸将曰統萬未可得也他年當與卿䓁取之乃徙其民萬餘家而還昌遣其弟平原公定與奚斤相持扵長安元嘉四年五月太武復西伐至拔鄰山築城捨輜重以輕騎三萬倍道先行羣臣咸諌曰統萬城堅非一日可拔今輕軍討之進不可克退無所資不若步軍攻具一時俱往太武曰夫用兵之術攻城最下必不得已然後用之今以步兵攻具皆進彼必懼而堅守若攻不時拔食盡兵疲外無所掠非計之得也不如以輕騎直抵其城彼見步兵未至意必寛弛吾羸形以誘之若得一戰則成禽矣吾軍去家二千餘里復有黄河之難所謂置之死地而後生也以是决戰則有餘攻城則不足遂行次于黑水分軍伏扵夹谷而以少衆至其城下昌将狄子玉来降言昌聞有魏師追其弟定定曰統萬城堅未易攻拔待我禽奚斤然後徐往内外擊之蔑不濟矣故昌堅守以待之太武患之乃退軍城北示昌以弱遣永昌王徤及宗正蛾清䓁分騎五千西掠居人㑹軍士負罪亡入昌城言魏軍糧盡士卒食菜輜重在後步兵未至撃之為便昌信其言引衆出城步騎三萬司徒長孫翰䓁咸言昌步騎難犯宜避其鋒太武曰逺来求賊唯恐不出今避而不擊彼奮我弱非計也遂収衆偽北引而疲之昌以為退鼔譟而前舒陣為翼行五六里太武衝之昌陣不動稍前行㑹有風雨従東南来揚沙晦㝠宦者趙倪曰今風雨従賊上来我向彼背天不助人願攝陣避之太常崔浩叱之曰是何言也吾千里制勝一日之中豈得變易賊貪進不已後軍已絕宜隠軍分出奄擊不意風道在人豈有常也太武善之乃分騎為左右隊以掎之太武馬蹶而墜㡬為昌兵所獲宗室拓跋齊以身捍蔽太武騰馬得上身中流矢奮擊不輟昌衆大潰魏師乗勝逐昌至城北昌遂奔上邽太武微服逐奔者入其城城中人覺之諸門悉閉太武與拓跋齊䓁入其宫中得裙繫之槊上乗之而上僅乃得免眀日入城獲昌王公卿校及婦女以萬數馬三千匹牛羊數千萬頭府庫珍寳車旗器物不可勝計初勃勃性豪侈築統萬城髙十仭基厚三十步上廣十步宫牆髙五仭其堅可以厲刀斧臺榭壮大皆雕鏤圖畫被以繡綺太武曰蕞爾國而用民如此欲不亡得乎奚斤追昌至雍不及而還赫連定聞統萬破亦奔昌扵上邽太武還平城以常山王素鎮統萬留太僕邱堆與娥清使助奚斤擊昌五年太武復使将軍尉建攻上邽昌退屯平涼奚斤進軍安定與邱堆娥清軍合斤以馬疲糧少深壘自固遣堆行督租為昌所襲堆敗還城昌乗勝日夜鈔掠不得芻牧諸将患之監軍侍御史安頡請斤决戰斤以馬少為辭頡曰昌狷而無謀好勇而輕每自出挑戰衆皆識之今斂諸将所乗馬可得二百匹頡請募死士擊之昌可禽也斤猶難之頡乃隂與尉建選騎以待既而昌果来攻城頡出應之昌自出搏戰軍士争赴之昌敗走頡追禽之太武使侍中古弼迎昌至平城舎之西宫門内給以乗輿之副又以妹始平公主妻之假昌常忠将軍賜爵㑹稽公又封為秦王後以元嘉十一年叛魏西走為候将格殺之魏人并誅其羣弟定小字直獖勃勃之第五子也始封平原公昌立進爵為王定凶暴無頼昌之被禽也定収其餘衆奔還平涼僣即偽位改年勝光奚斤以昌為偏裨所禽深恥之乃捨輜重齎三日糧追定扵平涼娥清欲循水而往斤不従自北道邀其走路定軍将遁會魏小将有罪亡歸定告以魏軍食少無水定乃分兵夹擊之魏兵大潰斤清皆為所禽邱堆棄輜重奔還扵是定復取長安定嘗登隂槃山望其本國泣曰先帝以朕承大業者豈有今日之事乎使天假朕年當與卿諸人建季興之業俄而羣狐百數鳴扵其側定命射之無所獲惡之曰所見亦大不臧咄咄天道復何言哉定遣使求和扵宋約合兵滅魏遥分河北自恒山以東屬宋以西屬夏元嘉七年魏太武自襲平涼使将軍古弼䓁将兵趣安定定自安定北救平涼與弼遇弼偽退以誘之定追之太武使髙車馳擊之定大敗走鶉觚原魏軍圍之斷其水草人馬饑渴定引衆下原魏軍擊之定衆大潰定中重創單騎走收餘衆西保上邽魏兵遂取安定太武還臨平涼克之復取長安八年定遣其叔父韋伐攻秦主乞伏慕末扵南安以慕末歸殺之是嵗定畏魏人之逼擁秦民十餘萬口自冶城濟河欲擊北涼王沮渠䝉遜而奪其地吐谷渾王慕璝遣騎三萬乗其半濟邀擊之執定以歸眀年吐谷渾送定于魏魏人殺之始勃勃以晋安帝義熙三年僣號至定二世三主凡二十有五年而滅後梁蕭詧字理孫蘭陵人梁武帝之孫昭眀太子統之第三子也㓜好學善屬文尤長佛義特為武帝嘉賞梁普通中封曲江縣公及昭眀太子薨封詧岳陽郡王位東揚州刺史領㑹稽太守初昭眀卒武帝捨詧兄弟而立簡文内常愧之故寵亞諸子以㑹稽人物殷阜一都之㑹故有此授以慰其心詧既以其昆季不得為嗣常懐不平又以武帝衰老朝多秕政有敗亡之漸遂蓄聚財貨交通賔客招募輕侠折節下之其勇敢者多歸附焉左右遂至數千人皆厚加資給大同元年除西中郎将雍州刺史都督五州諸軍事寜蠻校尉詧以襄陽形勝之地又武帝創基之所時平足以樹根本時亂足以圖覇功遂務修刑政太清二年武帝以詧兄河東王譽為湘州刺史徙湘州刺史張纉為雍州纉恃才輕譽州府迎候有闕譽深銜之遂託疾不與相見後聞侯景作亂頗陵蹙纉纉構譽及詧扵梁元帝元帝令其世子方䓁及王僧辯相繼攻譽譽告急扵詧詧聞之大怒及元帝将援建業令所部諸州並發兵赴都詧遣府司馬劉方貴領兵為前軍出漢口及将發元帝又使諮議参軍劉㲄召詧自行詧不従而方貴潜與元帝相知剋期襲詧未及發㑹詧以他事召方貴方貴懼謀泄遂據樊城拒命詧遣軍攻之元帝乃厚資遣張纉若将述職而宻援方貴纉次大隄而樊城已陷詧禽方貴兄弟黨與並斬之詧時以譽危急乃留諮議参軍蔡大寳守襄陽率衆伐江陵以救之元帝大懼乃遣参軍庾㚟謂詧曰以姪伐叔逆順安在詧曰家兄無辠屢被攻圍七父若頋先恩豈應若是如能退兵湘水吾便旋斾襄陽時攻柵不剋㑹大雨暴至平地四尺衆頗離心軍主杜岸岸弟㓜安及其兄子龕以其屬降扵江陵詧乃遁歸襄陽器械輜重多没扵健水詧恐不能自固乃遣蔡大寳求附庸于西魏時西魏大統十五年也西魏丞相宇文泰令其東閤祭酒榮權使焉是嵗元帝令栁仲禮圍襄陽詧乃遣妃王氏及世子嶚為質請救宇文泰令榮權報命仍遣開府楊忠為援十六年忠禽仲禮平漢東西魏命詧發喪嗣位詧辭乃使假散騎常侍鄭孝穆及榮權䇿命詧為梁王乃扵襄陽置百官承制封拜十七年留尚書僕射蔡大寳守雍部而朝于長安宇文泰謂曰王之来此頗由榮權乃召權見詧泰曰權吉士也寡人與之従事未嘗見失信詧曰榮權常道二國之言無私故詧今者得歸誠魏闕耳魏恭帝元年宇文泰命柱國于謹伐江陵詧以兵㑹之及江陵平泰命詧主梁嗣居江陵東城資以江陵一州之地其襄陽所統盡入扵魏詧乃稱皇帝扵其國年號大定追尊其父統為昭眀皇帝廟號髙宗統妃蔡氏為昭徳皇后又尊其所生母龔氏為皇太后立妻王氏為皇后子巋為皇太子其慶賞刑威官方制度並同王者唯上䟽則稱臣奉魏正朔至扵爵命其下亦依梁氏之舊其戎章勲級則又兼用柱國䓁官又追贈叔父邵陵王綸太宰諡曰壮武贈兄河東王譽丞相諡曰武桓宇文泰仍置江陵防主統兵居扵西城名曰武植泰外云助詧備禦内實防詧初江陵滅元帝将王琳據湘州志圖匡復及詧立琳乃遣其将潘純陁侯方免来冦詧禦之純陁䓁退歸夏口詧之四年詧遣其大将軍王操略取王琳之長沙武陵南平䓁郡五年王琳又遣其将雷文柔襲䧟監利郡太守大有死之尋而琳與陳人相持稱蕃乞師扵詧詧許之師未出而琳軍敗附扵齊是嵗其太子巋朝于長安六年四月大雨震其前殿崩壓三百餘人七年冬有鵩鳥鳴于寝殿八年二月詧終于前殿時年四十四是嵗周保定二年也八月𦵏于平陵諡曰宣皇帝廟號中宗詧少有大志不拘小節雖多猜忌而知人善任使撫将士有恩能得其死力性不飲酒安扵儉素事母以孝聞又不好聲色尤惡見婦人雖相去數歩亦云遥聞其臭經御婦人之衣更不再著並皆棄之一幸姬媵病卧累旬又惡見人髪白事之者必方便避之擔輿者冬月必須裹頭夏月則加蓮葉㡌其在東揚州頗放誕省覽簿領好為戱弄之言以此獲譏扵世及江陵平宿将尹徳毅謂詧曰臣聞人主之行與匹夫不同匹夫者飾小行競小㢘以取名譽人主者定天下安社稷以成大功今魏虜貪惏㒺頋弔伐之義俘囚士庶並充軍實然此䓁戚屬咸在江東悠悠之人可門到户説既塗炭至此咸謂殿下為之殿下既殺人父兄孤人子弟人盡讎也又誰與為國但魏之精鋭盡萃扵此犒師之禮非無故事若殿下為設享㑹固請于謹䓁為歡彼無我虞當相率而至預伏武士因而斃之撫江陵百姓而安之文武官僚随材銓授魏人懾息未敢送死僧辯之徒折簡可致然後朝服濟江入踐皇極纉堯復禹萬世一時詧謂徳毅曰卿此䇿非不善也然魏人待我甚厚未可背徳若遽為卿計則鄧祁侯所謂人将不食吾餘既而闔城長㓜被虜入闗又失襄陽之地詧恨乃曰不用徳毅之言以至扵是又見邑居殘毁干戈日用恥其威略不振常懐憂憤乃著愍時賦以見志焉居常怏怏每誦老馬伏櫪志在千里烈士暮年壮心不己未嘗不盱衡抱歎吒者久之遂以憂憤發背而死詧䔍好文義所著文集十五卷内典華嚴般若法華金光眀義䟽三十六卷並行扵世周武帝又命其太子巋嗣位年號天保巋字仁逺詧之苐三子也機辯有文學善扵撫御能得其下之歡心嗣位之元年尊其祖母龔太后曰太皇太后嫡母王皇后曰皇太后所生曺貴嬪曰皇太妃其年五月太皇太后薨諡曰元太后九月太妃又薨諡曰孝皇太妃二年其皇太后薨諡曰宣静皇后五年陳湘州刺史華皎巴州刺史戴僧朔並来附皎送其子元響為質扵巋仍請兵伐陳巋上言其状周武詔衛公直督荆州總管權景宣大将軍元定䓁赴之巋亦遣其柱國王操率水軍二萬㑹皎扵巴陵既而與陳将吴眀徹䓁戰扵沌口直軍不利元定遂没巋大将軍李廣䓁亦為陳人所虜長沙巴陵並陷扵陳衛公直乃歸辠扵巋之柱國殷亮巋雖以退敗不獨辠亮然不敢違命遂誅之吴眀徹乗勝攻克巋河東郡獲其守将許孝敬眀年眀徹進冦江陵引江水灌城巋出頓紀南以避其鋭江陵副總管髙琳與其尚書僕射王操拒守巋馬軍主馬武吉徹䓁擊眀徹眀徹退保公安巋乃還江陵巋之八年陳又遣其司空章昭逹来冦江陵總管陸騰及巋之将士擊走之昭逹又冦竟陵之青泥巋令其大将軍許世武赴援大為昭逹所破初華皎戴僧朔従衛公直與陳人戰率其麾下數百人歸扵巋巋以皎為司空封江夏郡公僧朔為車騎将軍封吴興縣侯巋之十年皎将来朝至襄陽請衛公直曰梁主既臣江南諸郡人少國貧朝廷興亡繼絶理宜資贍豈使齊桓楚荘獨擅救衛復陳之羙望借數州以禆梁國直然之乃遣使言状于周武帝許之詔以基平鄀三州歸之扵巋及周平齊巋朝扵鄴帝雖以禮接之然未之重也巋知之後因宴承間乃陳其父荷文帝拯救之恩并叙二國艱虞脣齒掎角之事辭理辨暢因泣涕交流帝亦為之歔欷自是大加賞異禮遇日隆後帝復與之宴齊氏故臣叱列長义亦預焉帝指謂巋曰是登陴罵朕者也巋曰長义未能輔桀翻敢吠堯帝大笑及酒酣帝又命琵琶自彈之仍謂巋曰當為梁王盡歡巋乃起請舞帝曰王乃能為朕舞乎巋曰陛下既親撫五絃臣何敢不同百獸帝大悦賜雜繒萬叚良馬數十匹并賜齊後主妓妾及帝所乗五百里駿馬以遣之及隋文帝執政尉遅迥王謙司馬消難䓁各起兵時巋将帥皆宻請興師與迥䓁為連衡之勢進可以盡節扵周氏退可以席卷山南巋以為不可俄而消難奔陳迥䓁相次破滅隋文帝既踐極恩禮彌厚遣使賜金五百兩銀千兩布帛萬疋馬五百匹開皇二年隋文帝備禮納巋女為晋王妃又欲以其子瑒尚蘭陵公主由是罷江陵總管巋専制其國四年入朝長安帝甚敬待之詔巋位在王公之上巋被服端麗進退閑雅天子矚目百僚傾慕帝賜巋縑萬疋珍玩稱是及還親執其手謂之曰梁主久滯荆楚未復舊都朕當振旅長江相送旋反巋拜謝而歸五年五月寝疾薨臨終上表奉辭并獻所服金装劔帝覽而嗟悼巋在位二十三年梁之臣子𦵏之顯陵諡曰孝眀皇帝廟號世宗巋孝悌慈仁有君人之量四時祭享未嘗不悲慕流涕性尤儉約御下有方境内安之所著文集及孝經周易義記及大小乗幽微並行扵世文帝又命其太子琮嗣位琮字溫文性俶儻不覊博學有文義兼善弓馬遣人伏地持帖琮奔馬射之十發十中持帖者亦不懼初封東陽王尋立為梁太子及嗣位帝賜以璽書敦勉之又賜梁之大臣璽書誡勉之時琮年號廣運有識者曰運之為字軍走也吾君将奔走乎其年琮遣大将軍戚昕以舟師襲陳公安不克而還文帝徴琮叔父岑入朝拜大将軍封懐義公因留不遣復置江陵總管以監之琮所署大将軍許世武宻以城召陳将宜黄侯陳紀謀泄琮誅之後二嵗文帝徴琮入朝琮率臣下二百餘人入長安江陵父老莫不隕涕曰吾君其不反矣文帝以琮来朝遣武郷公崔𢎞度将兵戍之軍至鄀州琮叔父嚴及弟瓛䓁懼𢎞度掩襲之遂引陳人至城下虜居民而叛扵是廢梁國文帝遣左僕射髙熲安集之曲赦江陵死辠給復十年梁二主各給守墓十户拜琮柱國賜爵莒國公自詧初即位嵗在乙亥至是嵗在丁未凡三十三載而亡琮至煬帝嗣位甚見親重拜内史令改封梁公琮之宗族緦麻以上並得随才擢用扵是諸蕭昆弟布列朝廷琮性澹雅不以職務自嬰退朝縦酒而已内史令楊約與琮同列帝令約宣旨誡勵約復以私情諭之琮曰琮若復事事則何異公哉約笑而退約兄素時為尚書令見琮嫁従父妹扵鉗耳氏謂曰公帝王之族何乃適妹鉗耳氏琮曰前已嫁妹扵侯莫陳氏此復何疑素曰鉗耳羌也侯莫陳虜也何得相比琮曰以羌異虜未之前聞素慙而止琮雖覊旅見北間豪貴無所降下常與賀若弼深友弼既誅復有童謡曰蕭蕭亦復起帝由是忌之遂廢扵家卒贈左光禄大夫子鉉位襄城通守復以琮弟子鉅為梁公鉅小名曰藏煬帝甚昵之以為千牛與宇文皛出入宫掖伺察内外帝每有逰宴鉅未嘗不従遂扵宫中多行淫穢江都之變為宇文化及所殺詧之居帝位百寮追諡長子嶚為孝恵太子次子巖封安平王岌東平王岑河間王後改封吴郡王琮弟瓛義興王瑑晋陵王璟臨海王珣南海王瑒義安王以蔡大寳為股肱王操為腹心魏益徳尹正薛暉許孝敬薛宣為爪牙甄元成劉盈岑善方傅淮褚珪蔡大業典衆務張綰以舊齒䖏顯位沈重以儒學䝉厚禮自餘多所奨拔咸盡其器䏻及巋纂業親賢並用将相則華皎殷亮劉忠義宗室則蕭欣蕭翼人望則蕭確謝溫栁洋王湜徐岳外戚則王洋王誦殷璉文章則劉孝勝范廸沈居㳺君公栁信言政事則袁敞栁荘蔡延夀甄翊皇甫兹故䏻保其疆土而和其人焉今載詧子嶚䓁及蔡大寳以下尤著者附于左其在梁陳隋已有傳及巋諸子未任職者則不兼録嶚字道逺詧之長子也母曰宣静皇后詧之為梁王立為世子尋病卒及詧稱帝追諡焉巖字義逺詧苐五子也性仁厚善撫接厯尚書令太尉太傅入陳授東揚州刺史及陳亡百姓推巖為主為總管宇文述所破伏法扵長安岌詧苐六子也性淳和位至侍中中衛将軍巋之五年卒贈司空諡曰孝岑字智逺詧苐八子也位至太尉性簡貴御下嚴整及琮嗣位自以望重屬尊頗有不法故隋文徴入朝拜大将軍封懐義郡公瓛字欽文巋苐三子也㓜有令譽能屬文位荆州刺史頗有䏻名崔𢎞度兵至鄀州瓛懼與其叔父巖奔陳陳主以為侍中吴州刺史甚得物情三吴父老皆曰吾君之子陳亡吴人推之為主吴人見梁武簡文及詧巋䓁兄弟中並第三而踐尊位瓛自以巋第三子深自矜負有謝異者頗知廢興梁陳之際言無不驗江左人甚敬信之及陳主被禽異奔瓛由是益為衆所歸宇文述之討瓛也瓛遣王襃守吴州自将拒述述遣兵别道襲襃襃衣道士服棄城而遁瓛敗将左右數人逃于太湖匿于人家被執述送長安斬之璟仕隋尚衣奉御瑒衛尉卿秘書監陶邱侯瑀内史侍郎河池太守蔡大寳字敬位濟陽考城人祖履齊尚書祠部郎父㸃梁尚書儀曺郎南兖州别駕大寳少孤而䔍學不倦善屬文初以眀經對䇿第一解褐武陵王國左常侍嘗以書干僕射徐勉勉甚賞異乃令與其子逰䖏所有墳籍盡以給之遂博覽羣書學無不綜詧初出第勉仍薦大寳為侍讀兼掌記室尋除尚書儀曺郎詧出鎮會稽大寳詣選曺求諮議不得以為記室大寳攘臂而出曰不為孫秀非人也詧涖襄陽遷諮議参軍謀謨皆自大寳出及梁元帝與河東王譽構隙詧令大寳使江陵以觀之元帝素知大寳見之甚悦乃示所製元覽賦令注解焉三日而畢元帝大嗟賞之贈遺甚厚大寳還白詧云湘東必有異圖禍亂将作不可下援臺城詧納之及詧扵江陵稱帝為侍中尚書令参掌選事進位柱國軍師将軍封安豐縣侯巋嗣位冊授司空中書監中權大将軍領吏部尚書固讓司空許之加特進巋之三年卒及𦵏巋三臨其䘮贈司徒進爵為公諡曰文凱配食詧廟庭大寳性嚴整有智謀雅逹政事文辭贍速詧之章表書記教令詔冊並大寳専掌之詧推心委任以為謀主時人以詧之有大寳猶劉先主之有孔眀焉所著文集三十卷及尚書義䟽並行扵世有四子次子延夀有器識博涉經籍尤善當世之務尚詧女宣城公主厯中書郎尚書左丞吏部郎御史中丞従琮入隋授開府儀同三司祕書丞終扵成州刺史大寳弟大業字敬道有至行位散騎常侍衛尉卿都官尚書太常卿卒贈金紫光禄大夫諡曰簡有五子允恭最知名位太子舎人梁滅入陳為尚書庫部郎陳亡仕隋起居舎人王操字子髙其先太原晋陽人詧母龔氏之外弟也性敦厚有籌略初為詧外兵参軍親任亞扵蔡大寳及詧稱帝厯五兵尚書郢州刺史進位柱國封新康縣侯巋嗣位授鎮右将軍尚書僕射及吴眀徹為冦巋出頓紀南操撫循将士莫不用命眀徹既退江陵獲全操之力也遷侍中中衛将軍尚書令開府儀同三司領荆州刺史操既位居朝右每日挹損深得當時之譽卒巋舉哀扵朝堂流涕曰天不使吾平蕩江表何奪吾賢相之速也及葬親祖扵瓦宫門贈司空進爵為公諡曰康節有七子次子衡最知名有才學位中書黄門侍郎魏益徳襄陽人也有材幹膽勇過人詧稱帝進位柱國封上黄縣侯卒贈司空諡曰忠壮進爵為公巋之五年以益徳配食詧廟庭尹正其先天水人詧涖雍州正為其府中兵参軍禽張纉獲杜岸皆正之力詧稱帝除䕶軍将軍位柱國封新野縣侯卒贈開府儀同三司諡曰剛巋之五年以正配食詧廟庭子徳毅多權略位大将軍後以見疑賜死甄元成字敬平中山人博逹經史善屬文少為簡文所知以録事参軍随詧鎮襄陽轉中記室参軍頗参政事以江陵甲兵殷盛遂懐貳心宻書與元帝具申誠款或有得其書送扵詧詧深信佛法常願不殺誦法華經人元成素誦法華經遂以此獲免詧後見之常曰甄公好得法華經力後位吏部尚書有文集二十卷子詡少沈敏閑習政事厯中書舎人尚書右丞従琮入隋授開府儀同三司終扵太府少卿岑善方字思義南陽棘陽人祖恵甫給事中父昶散騎侍郎善方有器局博綜經史以刑獄参軍随詧至襄陽詧初請内附以善方兼記室充使徃来凡數十反魏恭帝二年封長寜縣公及詧稱帝位散騎侍郎起部尚書善方性清慎有當世幹能故詧委以機宻􅌰贈太常卿諡曰敬所著文集十卷有七子並有操行之元之利之象最知名之元太子舍人早卒之利仕隋位零陵郡丞之象仕隋尚書虞部員外侍郎邵陵上宜渭南邯鄲四縣令宗如周南陽人有才學以府僚随詧後至度支尚書如周面狭長詧以法華經云聞經随喜面不狭長嘗戱之曰卿何為謗經如周踧踖自陳不謗詧又謂之如初如周懼出告蔡大寳大寳知其旨笑謂之曰君當不謗餘經正應不信法華耳如周乃悟又嘗有人訴事扵如周謂為經作如州官也乃曰某有屈滯故来訴如州官如周曰爾何小人敢呼我名其人慙謝曰秪言如周官作如州不知如周官名如周早知如周官名如州則不敢喚如周官作如州如周乃笑曰令卿自責見侮反深衆咸服其寛雅袁敞陳郡人祖昻司空父仕俊安成内史敞少有識量博涉文史以吏部郎使詣周時主者以敞班在陳使之後敞固不従命曰昔陳之祖父乃梁諸侯下吏盗有江東今周朝宗萬國招攜以禮若使梁之行人在陳之後便恐彛倫失序豈使臣之所望焉主者不能屈遂以状奏周武帝善之乃詔敞與陳使異日而進使還以稱旨遷侍中轉左户尚書従琮入隋授開府儀同三司終扵譙州刺史通志卷一百九十三
