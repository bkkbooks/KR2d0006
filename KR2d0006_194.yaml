body:
  text: 通志卷一百七十宋右迪功郎鄭樵漁仲撰循吏傳第二晉魯芝胡威杜軫竇允王宏曺攄潘京范晷子廣丁紹喬智眀鄧攸呉隠之宋吉翰杜驥兄坦申恬族兄坦杜慧度父瑗檀子𢎞文和之阮長之子師門甄法崇孫彬南齊傅琰王沈周洽沈瓉之琰子翽虞愿王洪軌季珪之梁沈瑀范述曽邱師施孫謙従子㢘何逺郭祖深後魏張恂孫萇年張膺宋世景路邕閻慶允眀亮杜纂裴佗竇瑗羊敦蘓淑北齊張華原宋世良郎基孟業崔伯謙蘓瓊房豹路去病隋梁彦光子文謙文譲樊叔略趙軌房恭懿公孫景茂􅉝公義栁儉郭絢敬肅劉曠王伽魏徳深晉魯芝字世英扶風郿人也世有名徳為西州豪族父為郭汜所害芝襁褓流離年十七乃移居雍耽思墳籍郡舉上計吏州辟别駕魏車騎将軍郭淮為雍州刺史深敬重之舉孝㢘除郎中會蜀相諸葛亮侵隴右淮復請芝為别駕事平薦扵公府辟大司馬曺真掾轉臨淄侯文學鄭袤薦扵司空王朗朗即加禮命後拜騎都尉㕘軍事行安南太守遷尚書郎曺真出督關右又㕘大司馬軍事真薨宣帝代焉乃引芝㕘驃騎軍事轉天水太守郡鄰扵蜀數被侵掠戸口減削盗賊充斥芝傾心鎮衛更造城市數年間舊境悉復遷廣平太守天水夷夏慕徳老幼赴闕獻書乞留芝魏眀帝許焉仍䇿書加歎勉以黄覇之羙加討冦将軍曺爽輔政引為司馬及宣帝起兵誅爽芝率餘衆犯門斬關馳出赴爽勸爽曰公居伊周之位一旦以罪見黜雖欲牽黄犬復可得乎若挾天子保許昌仗天威以羽檄徴天下兵孰敢不従捨此而去欲就東市豈不痛㢤爽愞惑不能用遂委身受戮芝坐爽下獄當死而口不訟直志不茍免宣帝嘉之赦而不誅俄而起為使持節領䕶匃奴中郎将振威将軍并州刺史以綏輯有方遷大鴻臚髙貴鄉公即位賜爵關内侯邑二百戸毌邱儉平随例増二百戸拜揚武将軍荆州刺史諸葛誕以夀春叛文帝奉魏帝出征徴兵四方芝率荆州文武以為先驅誕平進爵武進亭侯増邑九百戸遷大尚書掌刑理常道鄉公即位進爵斄城縣侯又増邑八百戸遷監青州諸軍事振武将軍青州刺史轉平東将軍五等建封隂平伯武帝踐阼轉鎮東将軍進爵為侯帝以芝清忠履正素無居宅使軍兵為作屋五十間芝以年及懸車吿老遜位章表十餘上扵是徴為光禄大夫位特進給吏卒門施行馬羊祜為車騎将軍上表以位譲芝詔不許芝㤗始九年卒年八十四帝為舉哀賵贈有加諡曰貞賜塋田百畆胡威字伯虎一名貔淮南夀春人也父質以忠清著稱少與鄉人蒋濟朱績俱知名扵江淮間仕魏至征東将軍荆州刺史威早厲志尚質之為荆州也威自京都定省家貧無車馬僮僕自驅驢單行每至客舎躬放驢取樵炊㸑食畢後隨侣進道旣至見父停廐中十餘日吿歸父賜絹一疋為装威曰大人清髙不審扵何得此絹質曰吾俸禄之餘以為汝糧耳威受之辭歸質帳下都督先威未發請假還家隂資装扵百餘里要威為伴每事佐助行數百里威疑而誘問之旣知乃取所賜絹與都督謝而遣之後因他信以白質質杖都督一百除吏名其父子清慎如此扵是名譽著聞拜侍御史厯南鄉侯安豐太守遷徐州刺史勤扵政術風化大行後入朝武帝語及平生因歎其父清謂威曰卿孰與父清對曰臣不如也帝曰卿父以何為勝邪對曰臣父清恐人知臣清恐人不知是臣不及逺也帝以威言直而婉謙而順累遷監豫州諸軍事右将軍豫州刺史入為尚書加奉車都尉威嘗議時政之寛帝曰尚書郎以下吾無所假借威曰臣之所陳豈在丞郎令史正謂如臣等輩始可以肅化眀法耳拜前将軍監青州諸軍事青州刺史以功封平春侯太康元年卒扵位追贈使持節都督青州諸軍事鎮東将軍餘如故諡曰烈子奕嗣奕字次孫仕至平東将軍威弟熊字季象亦有幹用仕至益州刺史安東将軍杜軫字超宗蜀郡成都人也父雄緜竹令軫師事譙周博渉經書州辟不就為郡功曺吏時鄧艾至成都軫白太守曰今大軍来征必除舊布新眀府宜避之此全福之道也太守乃出艾果遣其𠫭軍牽𢎞自之郡𢎞問軫前守所在軫正色對曰前守達去就之機輒出自官舎以俟君子𢎞器之命復為功曺軫固辭察孝㢘除建寧令導以徳政風化大行夷夏恱服秩滿将歸羣蠻追送賂遺甚多軫一無所受去如初至又除池陽令為雍州十一郡最百姓生為立祠得罪者無怨言累遷尚書郎博聞廣渉奏議駁論多見施用時涪人李驤亦為尚書郎與軫齊名每有議論朝廷莫能踰之號蜀有二郎軫後拜犍為太守甚有聲譽當遷會病卒年五十一子毗毗字長基州舉秀才成都王頴辟大将軍掾遷尚書郎參太傅軍事及洛陽覆沒毗南渡江王敦表為益州刺史將與宜都太守栁純共固白帝杜􅋶遣軍要毗遂遇害毗弟秀字彦頴為羅尚主簿州沒為氐賊李驤所得欲用為司馬秀不受見害毗次子歆舉秀才軫弟烈眀政事察孝亷厯平康安陽令所居有異績遷衡陽太守聞軫亡因自表兄子􅏊弱求去官詔轉犍為太守蜀土榮之後遷湘東太守為成都王頴郎中令病卒烈弟良舉秀才除新都令涪陵太守不就補州大中正卒竇允字雅始平人也出自寒門清尚自修少自縣稍遷郡主簿察孝㢘除浩亹長勤扵為政勸課田蠺平均調役百姓賴之遷謁者泰始中詔書旌其清白拜臨水令克己勵俗改修政事士庶恱服咸歌詠之遷鉅鹿太守甚有政績卒扵官王宏字正宗髙平人魏侍中粲之從孫也魏時辟公府累遷尚書郎厯給事中泰始初為汲郡太守撫百姓如家耕桑樹藝屋宇阡陌莫不躬自教示曲盡事宜在郡有殊績司𨽻校尉石鑒上其政術武帝下詔褒揚布吿天下賜宏榖千斛俄遷衛尉河南尹大司農無復能名更為苛碎坐桎梏罪人以泥墨塗面置深坑中餓不與食又擅縦五嵗刑以下二十一人為有司所劾帝以宏累有政績聴以贖論太康中代劉毅為司𨽻校尉扵是檢察士庶使車服異制庶人不得衣紫綘及綺繡錦繢帝常遣左右微行觀察風俗宏縁此復遣吏科檢婦人衵服至褰彂扵路論者以為暮年謬妄由是獲譏扵世復坐免官後起為尚書太康五年卒追贈太常曺攄字顔逺譙國譙人也祖肈魏衛将軍攄少有孝行好學善属文太尉王衍見而器之調補臨淄令縣有寡婦養姑甚謹姑以其年少勸令改適婦守節不移姑愍之密自殺親黨吿婦殺姑官為考鞫寡婦不勝苦楚乃自誣獄當決適值攄到攄知其有冤更加辨究具得情實時稱其眀獄有死囚嵗夕攄行獄愍之曰卿等不幸致此非所如何新嵗人情所重豈不欲暫見家邪衆囚皆涕泣曰若得暫歸死無憾也攄即開獄出之尅日令還掾吏固争咸謂不可攄曰此雖小人義不見負我自為諸君任之至日相率而還並無違者一縣歎服號曰聖君入為尚書郎轉洛陽令仁恵眀斷百姓懐之時天大雨雪宫門夜失行馬羣官檢察莫知所在攄使收門士衆官咸謂不然攄曰宫掖禁嚴非外人所敢盗必是門士以燎寒耳詰之果服以病去官復為洛陽令及齊王冏輔政攄與左思俱為記室督嘗勸冏還政歸藩冏不納尋轉中書侍郎長沙王乂以為驃騎司馬乂敗免官因丁母憂恵帝末起為襄城太守時襄城屢經冦難攄綏懐振理旬月克復永嘉二年髙密王簡鎮襄陽以攄為征南司馬其年流人王逌等聚衆屯冠軍冦略城邑簡遣參軍崔曠討之令攄督䕶曠奸凶人也譎攄前戰期為後繼旣而不至攄獨與逌戰扵酈縣軍敗死之故吏及百姓並奔喪會葬號哭即路如赴父母焉潘京字世長武陵漢夀人也弱冠郡辟主簿太守趙廞甚器之嘗問曰貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷相接數為所攻光武時移東出遂得全完共議易號傳曰止戈為武詩稱髙平曰陵扵是名焉為州所辟因謁見問䇿探得不孝字刺史􅀈京曰辟士為不孝邪京舉版答曰今為忠臣不得復為孝子其機辯皆此類後太廟立州郡皆遣使賀京白太守曰夫太廟立移神主應問訊不宜賀遂遣京作文使詣京師以為永式京仍舉秀才到洛陽尚書令樂廣京州人也共談累日深歎其才因謂京曰君天才過人恨不學耳若學必為一代談宗京感其言遂勤學不倦時武陵太守戴昌亦善談論與京共談京假借之昌以為不如已笑而遣之令過其子若思京方極其言論昌竊聴之乃歎服曰才不可假遂父子俱屈焉厯巴邱邵陵泉陵三令京眀扵政術路不拾遺遷桂陽太守不就歸家年五十卒范晷字彦長南陽順陽人也少㳺學清河遂徙家僑居郡命為五官掾厯河内郡丞太守裴楷雅知之薦為侍御史調補上谷太守遭喪不之官後為司徒左長史轉馮翊太守甚有政能善扵綏撫百姓愛恱之徴拜少府出為涼州刺史轉雍州扵時西土荒毁氐羌蹈藉田桑失收百姓困弊晷傾心化導勸以農桑所部甚頼之元康中加左将軍卒扵官二子廣稚廣字仲将舉孝㢘除靈夀令不之官姊適孫氏早亡有孫名邁廣負以南奔雖盗賊艱急終不棄之元帝承制以為堂邑令丞劉榮坐事當死郡劾以付縣榮即縣人家有老母至節廣輒聴暫還榮亦如期而反縣堂為野火所及榮脫械救火事畢還自著械後大旱米貴廣散私榖振饑人至數千斛逺近流寓歸投之戸口十倍卒扵官稚少知名辟大将軍掾早卒子汪别有傳丁紹字叔倫譙國人也少開朗公正早厯清官為廣平太守政平訟理道化大行扵時河北騷擾靡有完邑而廣平一郡四境乂安是以皆恱其法而徙其令及臨漳被圍南陽王模窘急紹率郡兵赴之模賴以獲全模感紹恩生為立碑遷徐州刺史士庶攀戀慕附如歸未之官復轉荆州刺史徙車千乗南渡河至許時南陽王模為都督留紹唘轉為冀州刺史到鎮率州兵討破汲桑有功加寧北将軍假節監冀州諸軍事時境内羯賤為患紹招而誅之號為嚴肅河北人畏而愛之紹自以為才足為物雄當官涖政每事克舉視天下之事若運扵掌握遂慨然有董正四海之志矣是時王浚盛扵幽州茍晞盛扵青州然紹視二人蔑如也永嘉三年暴病而卒臨終歎曰此乃天亡冀州豈吾命㢤懐帝䇿贈車騎将軍喬智眀字元達鮮卑前部人也少喪二親哀毁過禮長而以徳行著稱成都王穎辟為輔國将軍頴之敗趙王倫也表智眀為殄冦将軍隆慮共二縣令二縣愛之號為神君部人張兊為父報仇母老單身有妻無子智眀愍之停其獄嵗餘令兊将妻入獄兼隂縦之人有勸兊逃者兊曰有君如此吾何忍累之縦吾得免作何面目視息世間扵獄産一男會赦得免其仁感如是恵帝之伐鄴也穎以智眀為折衝将軍𠫭丞相前鋒軍事智眀勸穎奉迎乗輿穎大怒曰卿名曉事投身事孤主上為羣小所逼將加非罪扵孤卿奈何欲使孤束手就刑邪共事之義正若此乎智眀乃止尋属永嘉之亂仕扵劉曜鄧攸字伯道平陽襄陵人也祖殷亮直彊正鍾會伐蜀竒其才自澠池令召為主簿賈充伐吴請殷為長史後授皇太子詩為淮南太守夢行水邉見一女子猛獸自後斷其盤嚢占者以為水邉有女汝字也斷盤嚢者新獸頭代故獸頭也不作汝隂當作汝南也果遷汝陰太守後為中庶子攸七嵗喪父尋喪母及祖母居喪九年以孝致稱清和平簡貞正寡欲少孤與弟同居初祖父殷有賜官勅攸受之後太守勸攸去王官欲舉為孝㢘攸曰先人所賜不可改也嘗詣鎮軍賈混混以人訟事示攸使決之攸不視曰孔子稱聴訟吾猶人也必也使無訟乎混竒之以女妻焉舉灼然二品為吴王文學厯太子洗馬東海王越𠫭軍越欽其為人轉為世子文學吏部郎越弟騰為東中郎将請攸為長史出為河東太守永嘉末沒扵石勒然勒宿忌諸官長二千石聞攸在營馳召将殺之攸至門門幹乃攸為郎時幹識攸攸求紙筆作辭幹候勒和恱致之勒重其辭乃命勿殺勒長史張賔先與攸比舎重攸名操因稱攸扵勒勒召幕下與語恱之以為參軍給車馬勒每東西置攸車營中勒夜禁火犯之者死攸與胡鄰轂胡夜失火燒車吏按問胡乃誣攸攸度不可與争遂對以弟婦散發温酒為辭勒赦之旣而胡人深感自縳詣勒以眀攸而隂遺攸馬驢諸胡莫不歎息宗敬之石勒過泗水攸乃斫壊車以牛馬負妻子而逃又遇賊掠其車馬歩走擔其兒及其弟子綏度不能兩全乃謂其妻曰吾弟早亡惟有一息理不可絶止應自棄我兒耳幸而得存我後當有子妻泣而従之乃棄之其子朝棄而暮及眀日攸繫之扵樹而去至新鄭投李矩三年将去而矩不聴荀組以為陳郡汝南太守愍帝徴為尚書左丞長水校尉皆不果就後宻捨矩去投荀組扵許昌矩深恨焉久之乃送家属還攸攸與刁協周顗素厚遂至江東元帝以攸為太子中庶子時吴郡闕守人多欲之帝以授攸攸載米之郡俸禄無所受惟飲吴水而已時郡中大饑攸表賑貸未報乃輒開倉救之臺遣散騎常侍桓彛虞􅔎慰勞饑人觀聴善不乃劾攸以擅出榖俄而有詔原之攸在郡刑政清眀百姓歎恱為中興良守後稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸船不得進攸乃小停夜中彂去吴人歌之曰紞如打五鼓雞鳴天欲曙鄧侯拖不留謝令推不去百姓詣臺乞留一嵗不聴拜侍中嵗餘轉吏部尚書蔬食弊衣周急賑乏性謙和善與人交賔無貴賤待之若一而頗敬媚權重永昌中代周顗為䕶軍将軍太寧二年王敦反眀帝宻謀起兵乃遷攸為會稽太守初王敦伐都之後中外兵數每月言之扵敦攸已出在家不復知䕶軍事有惡攸者誣攸尚白敦兵數帝聞而未之信轉攸為太守時帝南郊攸病不能従車駕過攸問疾攸力病出拜有司奏攸不堪行郊而拜道左坐免攸每有進退無喜愠之色久之遷尚書左僕射咸和元年卒贈光禄大夫加金章紫綬祠以少牢攸棄子之後妻不復孕過江納妾甚寵之訊其家属說是北人遭亂憶父母姓名乃攸之甥攸素有徳行聞之感恨遂不復畜妾卒以無嗣時人義而哀之為之語曰天道無知使鄧伯道無兒弟子綏服攸喪三年吴隠之字處黙濮陽鄄城人魏侍中質六世孫也隠之羙姿容善談論博渉文史以儒雅摽名弱冠而介立有清操雖日晏歠菽不享非其粟儋石無儲不取非其道年十餘丁父憂每號泣行人為之流涕事母孝謹及其執喪哀毁過禮家貧無人鳴鼓每至臨哭之時常有雙鶴警呌及祥練之夕復有羣鴈俱集時人咸以為孝感所致嘗食鹹菹以其味旨掇而棄之與太常韓康伯隣居康伯母殷浩之姊賢眀婦人也每聞隠之哭聲輟飱投筯為之悲泣旣而謂康伯曰汝若居銓衡當舉如此輩人及康伯為吏部尚書隠之遂階清級解褐輔國功曺轉参征虜軍事兄坦之為袁真功曺真敗将及禍隠之詣桓温乞代兄命温矜而釋之遂為温所知賞拜奉朝請尚書郎累遷晉陵太守在郡清儉妻自負薪入為中書侍郎國子博士太子右衛率轉散騎常侍領著作郎孝武欲用為黄門郎以隠之貌類簡文帝乃止尋守廷尉祕書監御史中丞領著作如故遷左衛将軍雖居清顯禄賜皆頒親族冬月無被嘗澣衣乃披絮勤苦同扵貧庶廣州包帶山海珍異所出一箧之寳可資數世然多瘴疫人情憚焉惟貧寠不能自立者求補長史故前後刺史皆多黷貨朝廷欲革嶺南之弊以隠之為龍驤将軍廣州刺史假節領平越中郎将未至州二十里地名石門有水曰貪泉飲之者懐無厭之欲隠之旣至語其親曰不見可欲使心不亂越嶺喪清吾知之矣乃至泉所酌而飲之因賦詩曰古人云此水一㰱懐千金試使夷齊飲終當不易心及在州清操逾勵常食不過菜及乾魚而已帷帳器服皆付外庫時人頗謂其矯然亦始終不易帳下人進魚每剔去骨存肉隠之覺其用意罸而黜焉元興初詔嘉羙之進號前将軍賜錢五千萬榖千斛及盧循冦南海隠之率厲将士固守彌時長子曠之戰沒循攻擊百有餘日踰城放火焚燒三千餘家死者萬餘人城遂䧟隠之携家累出欲奔還都為循所得循表朝廷以隠之黨附桓温宜加裁戮詔不許劉裕與循書令遣隠之還久方得反歸舟之日装無餘資及至數畆小宅籬垣仄陋内外茅屋六間不容妻子劉裕賜車牛更為起宅固辭尋拜度支尚書太常以竹蓬為屏風坐無氊席後遷中領軍清儉不革每月初得禄裁留身糧其餘悉分賑親族家人紡績以供朝夕時有困絶㦯并日而食身常布衣不完妻子不霑寸禄義熙八年請老致事優詔許之授光禄大夫加金章紫綬賜錢十萬米三百斛九年卒追贈左光禄大夫加散騎常侍隠之清操不渝屢被襃飾致事及扵身沒常䝉優錫顯贈㢘士以為榮初隠之為奉朝請謝石請為衛将軍主簿隠之将嫁女石知其貧素遣女必當率薄乃令移厨帳助其經營使者至方見婢牽犬出賣之此外蕭然無辦後至自番禺其妻劉氏齎沉香一斤隠之見之遂投扵湖亭之水子延之復勵清操為鄱陽太守延之弟及子為郡縣者常以㢘慎為門法雖才學不逮隠之而孝悌潔敬猶為不替宋吉翰字休文馮翊池陽人也初為龍驤将軍劉道憐参軍随府轉征虜左軍參軍随道憐北征廣固賜爵建城縣五等侯參武帝中軍軍事臨淮太守復為道憐驃騎中兵參軍従事中郎為将佐十餘年清謹勤正甚為武帝所知賞元嘉中厯位梁南秦二州刺史徙益州刺史加督在任著羙績甚得方伯之體論者稱之累遷徐州刺史監徐兗二州豫州梁郡諸軍事時有死罪囚典籖意欲活之因翰入關齋呈其事翰省訖語令且去眀可更呈眀旦典籖不敢復入呼之乃來取昨所呈事視訖謂曰卿意欲宥此囚死命昨扵齋坐見其事亦有心活之但此囚罪重不可全貸旣欲加恩卿當代任其罪因命左右收典籖付獄殺之原此囚生命其刑政類如此自下畏服莫敢犯禁卒扵官杜驥字度世京兆杜陵人也髙祖預晉征南将軍曽祖耽避難河西因仕張氏苻堅平涼州父祖始還關中兄坦頗渉史傳武帝平長安席卷随従南還元嘉中文帝任遇坦甚厚厯後軍将軍青冀二州刺史坦晚嵗入南朝廷常以傖荒遇之雖復人才可施每為清途所隔坦常以此慨然嘗與文帝言及史籍上曰金日磾忠孝淳深漢朝莫及恨今世無復此輩人坦曰日磾忠羙誠如聖詔假使出扵今世養馬不暇豈辯見知上變色曰卿何量朝廷之薄也坦曰請以臣言之臣夲中華髙族亡髙祖因晉氏喪亂播遷涼土世業相承不殞其舊直以南度不早便以荒傖賜隔日磾胡人身為牧圉便超入内侍齒列名賢聖朝雖復㧞才臣恐未必能也上黙然北土舊法問疾必遣子弟驥年十三父使候同郡韋華華子元有髙名見而異之以女妻焉桂陽公義真鎮長安辟為主簿累遷長沙王義欣後軍録事參軍元嘉七年随到彦之入洛加建武将軍魏撤河南戍悉歸河北彦之使驥守洛陽洛陽城不治旣久又無糧食及彦之敗退驥欲棄城走慮為文帝所誅初武帝㔻關洛致鍾虡舊器南還一大鍾墜洛水中至是嵗文帝遣将姚聳夫領千五百人迎致之時聳夫政率所領牽鍾扵洛水驥乃遣使紿之曰虜旣北度洛城勢弱今修理城池並已堅固軍糧又足所乏者人耳君率衆見就共守此城大功旣立取鍾無晚聳夫信之率所領就驥及至知城不可守又無糧食扵是引衆去驥亦委城南奔白文帝夲欲以死固守縁聳夫入城便走人情沮敗不可復禁上怒使建威将軍鄭順之殺聳夫扵夀陽聳夫吴興武康人勇果有氣力宋偏裨小將莫及乃以驥為通直郎十七年出為青冀二州刺史在任八年恵化著扵齊土自義熈至扵宋末刺史惟羊穆之及驥為吏民所稱詠後徴為左軍将軍兄坦代為刺史北土以為榮焉坦長子琬為員外散騎侍郎文帝常有圅詔勅坦琬輒開視信未及彂又追取之勅圅已彂大相推檢上遣主書詰責驥并檢開圅之主驥答曰開圅是臣第四息季文伏待刑坐上特原不問卒官驥第五子幼文薄扵行明帝初以軍功封邵陽縣男尋坐巧妄奪爵後以發太尉廬江王褘謀反事拜給事黄門侍郎廢帝元徽中為散騎常侍幼文所涖貪殘家累千金與沈勃孫超之居止接近又並與阮佃夫厚善佃夫旣死廢帝深疾之帝微行夜輒在㓜文門墉間聽其弦管積久轉不能平扵是自率宿衛兵誅幼文勃超之等兄叔文為長水校尉亦誅申恬字公休魏郡魏人也曽祖鍾為石虎司徒武帝平廣固恬父宣宣従父兄子坦皆得歸晉並以幹用見知武帝踐阼拜太中大夫宣元嘉初厯兖青二州刺史恬兄謨與朱倄之守滑臺魏克滑臺見虜後得還為竟陵太守恬初為驃騎劉道憐長史兼行參軍宋受命辟東宫殿中将軍度還臺直省十年不請休息厯下邳北海二郡太守所至皆有政績又為北譙梁二郡太守郡境邉接任榛屢被冦抄恬到任宻知賊来乃伏兵要害出其不意􅊖皆禽殄元嘉十二年遷督魯東平濟北三郡諸軍事太山太守威恵兼著吏民便之二十一年冀州移鎮厯下以恬為冀州刺史加督眀年加濟南太守孝武踐阼為青州刺史尋加督齊地連嵗興兵百姓彫弊恬防禦邉境勸課農桑二三年間遂皆優實性清約頻處州郡妻子不免饑寒世以此稱之後拜豫州刺史以疾徴還道卒死之日家無遺財子寔南譙太守謨子元嗣海陵太守元嗣弟謙臨川内史坦以孝建初為太子右衛率徐州刺史大眀元年魏攻兖州孝武遣太子左衛率薛安都東陽太守沈法系北捍至兖州魏軍已去坦建議任榛亾命屢犯邉人今軍出無功宜因此翦撲上従之亾命先已聞知舉村逃走安都法系坐白衣領職坦棄市羣臣為請莫得将行刑始興公沈慶之入市抱坦慟哭曰卿無罪為朝廷所枉誅我入市亦當不久市官以白上乃原其生命繫尚方尋被宥復為驍騎将軍疾卒子令孫眀帝時為徐州刺史討薛安都行至淮陽即與安都合弟闡時為濟隂太守戍睢陵城奉順不同安都安都攻圍不能克會令孫至遣往睢陵說闡闡降殺之令孫亦見殺杜慧度交阯朱䳒人也夲属京兆曽祖元為寧浦太守遂居交阯父瑗字道言仕州府為日南九徳交阯太守初九真太守李遜父子勇壮有權力威制交土聞刺史滕遯之當至分遣二子斷遏水陸要津瑗收衆斬遜州境獲寧後林邑王范達陷日南九真遂冦交阯瑗討破之授龍驤将軍交州刺史武帝義旗建進號冠軍将軍盧循竊據廣州遣使通好瑗斬之義熙六年卒年八十四贈右将軍慧度瑗第五子也初為州主簿流民都䕶遷九真太守瑗卒郡州綱佐以交州土接蠻境不宜曠職共推慧度行州府事辭不就七年除交州刺史詔書未到其年春盧循襲破合浦徑向交州慧度乃率文武六千人距循扵石﨑破之循雖破餘黨皆習兵事李遜子孫李奕李移李脫等皆奔竄石﨑盤結狸獠各有部曲循知奕等與杜氏有怨遣使招之奕等受循節度六月庚子循晨造南津令三軍入城乃食慧度􅊖出宗族私財以充勸賞自登髙艦合戰放火箭燒循船循衆艦俱然一時潰散循中箭赴水死遂斬循及父嘏并循二子並傳首京師以功封龍編縣侯武帝踐阼進號輔國将軍其年率文武萬人南討林邑所殺過半其前後抄略者悉得還林邑乞降輸生口大象金銀古貝等乃釋之遣長史江攸奉表獻㨗慧度布衣蔬食儉約質素能彈琴頗好荘老禁斷淫祀崇修學校嵗荒民饑則以私禄賑給為政纖宻有如治家由是威恵沾洽奸盜不起乃至城門不夜閉道不拾遺卒追贈左将軍以慧度長子𢎞文為振逺将軍交州刺史初武帝北征關洛慧度版𢎞文行九真太守至是繼父為刺史亦以寛和得衆襲爵龍編侯元嘉四年文帝以廷尉王徽為交州刺史𢎞文被徴會得重疾孛以就路親舊見其患篤勸待病愈𢎞文曰吾世荷皇恩仗節三世常欲投軀帝廷以報所荷况親被徴命而可晏然者乎𢎞文母阮年老見𢎞文輿疾就路不忍别與到廣州遂卒臨死遣弟𢎞猷詣建業朝廷甚哀之孝建中以豫章太守檀和之為豫州刺史和之先厯始興太守交州刺史所在有威名盜賊屏迹每出獵猛獸伏不敢起阮長之字景茂一字善業陳留尉氏人也祖思曠金紫光禄大夫父普驃騎諮議參軍長之年十五喪父有孝性每哭哀感路人除服蔬食者猶積載閒居耽學未嘗有惰容初為諸府參軍母老求補襄垣令督郵無禮鞭之去職後拜武昌太守時王𢎞為江州雅相知敬引為車騎従事中郎元嘉九年遷臨川内史以南土卑濕母年老非所宜辭不就十一年除臨海太守在官常擁敗絮至郡少時母亾葬畢不勝憂十四年卒時郡縣田禄以芒種為斷此前去官者則一年秩禄皆入後人始以元嘉末改此科計月分禄長之為武昌太守時在元嘉之初及去郡代人未至以芒種前一日解印綬初發京師親故㦯以器物贈别得便緘録後歸悉以還人為中書郎直省夜誤着鄰省屐出閤依事自列門下門下以闇夜人不知不受列長之固遣送之曰一生不侮闇室所涖官皆有風政為後人所思宋世言善政者咸稱之文帝深惜之曰景茂方堪大用豈直以清苦見惜子師門原鄉令元嘉初文帝遣大使巡行四方兼散騎常侍王歆之等上言宣威将軍陳南頓二郡太守李元徳清勤均平姦盜止息彭城内史魏恭子㢘惜修慎在公忘私安約守儉久而彌固前宋縣令成浦為政寛濟遺詠在人前鮦陽令李熙國在事有方人思其政故山桑令何道自少清㢘白首彌勵應加襃賚以勸扵後各被襃賜歆之字叔道河東人曽祖愆期有名晉世官至南蠻校尉歆之位左戸尚書光禄大夫卒官甄法崇中山人也父匡位少府卿以清聞法崇永初中為江陵令在任嚴整縣境肅然扵時南平繆士通為江安令卒官至其年末法崇在聽事士通前見法崇知其已亾愕然未言坐定云卿縣人宋雅見負米千餘石不還令兒窮弊不自存故自訴法崇因命口受為辭因遜謝下席而法崇為問宋家狼狽輸送太守王華聞而歎羙之法崇孫彬彬有行業鄉黨稱善嘗以一束苧就州長沙寺庫質錢後贖苧還扵苧束中得五兩金以手巾裹之彬得送還寺庫道人驚云近有人以此金質錢時有事不得舉而失檀越乃能見還輒以金半仰酬往復十餘彬堅然不受因謂曰五月披羊裘而負薪豈拾遺金者邪卒還金梁武帝布衣時聞之及踐阼以西昌侯藻為益州刺史乃以彬為府録事參軍帶郫縣令将行同列五人帝誡以㢘慎至彬獨曰卿昔有還金之羙故不以此言相屬由此名徳益彰及在蜀禮之甚厚云南齊傅琰字季珪北地靈州人也曽祖𢎞仁宋武帝之外弟以中表厯顯官位太常卿祖劭字彦先員外散騎侍郎父僧祐山隂令有能名琰羙姿儀仕宋為武康令遷山陰令並著能名二縣皆謂之傅聖賜爵新亭侯元徽中遷尚書左丞母喪鄰家失火延燒琰屋琰抱柩不動鄰人競来赴救乃得俱全琰股髀之間已被烟熖服闋髙帝輔政以山隂獄訟煩積復以琰為山隂令賣針賣糖二姥争團絲来詣琰琰掛團絲扵柱令鞭之宻視有鐵屑乃罰賣糖者又二野父争雞琰各問何以食雞一人云粟一人云豆乃破雞得粟罪言豆者縣内稱為神眀無敢復為偷盜琰父子並著竒績江左鮮有時云諸傅有治縣譜子孫相傳不以示人昇眀中遷益州刺史自縣遷州近世罕有建元四年徴為驍騎将軍黄門侍郎永眀中為廬江王安西長史南郡内史行荆州事五年卒琰喪西還有詔出臨哭時長沙太守王沈新蔡太守劉聞慰晉平太守邱仲起長沙縣令何敬叔故鄣縣令邱寂之皆有能名而不及琰也沈字彦流東海人厯錢唐山隂秣陵令南平長沙太守清㢘戒慎身恒居禄而居處日貧死之日無宅可憇故吏為營棺柩聞慰自有傳仲起見沈憲傳敬叔見子思澄傳寂之字徳元吴興烏程人年十七為州西曺兼直主簿刺史王彧行縣夜還前驅已至而寂之不肯開門曰不奉墨旨彧方扵車中為教然後開彧歎曰不意郅君章近在閤下即轉為主簿在縣專以㢘潔御下扵時丹徒縣令沈瓉之以清㢘抵罪寂之聞之曰清吏真不可為也政當處季孟之間乎瓉之吴興武康人性疎直在縣自以清㢘不事左右浸潤日至遂鎖繫尚方歎曰一見天子足矣上召問曰復欲何陳答曰臣坐清所以獲罪上曰清復何以獲罪曰無以承奉要人上曰要人為誰瓉之以手板四面指曰此赤衣諸賢皆是若臣得更鳴必令清譽日至瓉之雖危言上亦不責後知其無罪重除丹徒令入縣界吏人候之謂曰我今重来當以人肝代米不然清名不立又有汝南周洽厯句容曲阿上虞吴令㢘約無私卒扵都水使者無以殯斂吏人為買棺器武帝聞而非之曰洽累厯名邑而居處不理遂坐無車宅死令吏衣棺之此故宜罪貶無論襃恤乃勅不給贈賻琰子翽為官亦有能名後為吴令别建康令孫㢘㢘因問曰聞丈人彂姦擿伏恵化如神何以至此答曰無他也惟勤而清清則憲綱自行勤則無事不理憲綱自行則吏不能欺事自理則物無凝滯欲不理得乎時臨淮劉元眀亦有吏能厯山隂建康令政常為天下第一終扵司農卿後翽又代元眀為山隂令問元眀曰願以舊政吿新令尹答曰我有竒術卿家譜所不載臨别當相示旣曰作縣令惟日食一升飯而莫飲酒此第一䇿也翽天監中為建康令復有能名遷驃騎諮議參軍子岐亦稱良吏梁史有傳虞愿字士恭會稽餘姚人也祖賚給事中監利侯父望之早卒賚中庭橘冬熟子孫競来取之愿年數嵗獨不取賚及家人皆異之宋元嘉中為湘東王國常侍後遷潯陽王府墨曺參軍眀帝立以愿儒吏學渉兼藩國舊恩意遇甚厚除太常丞尚書祠部郎通直散騎常侍帝性猜忌體肥憎風夏月常著小皮衣拜左右二人為司風令史風起方面輒先啓聞星文災變不信太史不聽外奏勅靈臺知星一人給愿常直内省有異先啓以相紏察帝以故宅起湘宫寺費極奢侈以孝武荘嚴刹七層帝欲起十層不可立分為兩刹各五層新安太守巢尚之罷郡還見帝曰卿至湘宫寺未我起此寺是大功徳愿在側曰陛下起此寺皆是百姓賣兒貼婦佛若有知當悲哭哀愍罪髙佛圖有何功徳尚書令袁粲在坐為之失色帝大怒使人馳曵下殿愿徐去無異容以舊恩後復召入帝好圍碁碁甚拙去格七八道物議共欺為第三品與第一品王抗圍碁依品賭戯抗每饒借帝曰皇帝飛碁臣抗不能斷帝終不覺以為信然好之愈篤愿又曰堯以此教丹朱非人主所宜好也雖數忤旨而䝉賞賜猶異餘人遷兼中書侍郎帝寢疾愿常侍醫藥帝素能食尤好鱁鮧以銀鉢盛蜜漬之一食數鉢謂揚州刺史王景文曰此是竒味卿頗足不景文曰臣夙好此物家素貧乏致之甚難帝甚恱食鱁鮧積多胸腹痞脹氣将絶左右啓飲數升酢酒乃消疾大困一食汁滓猶至三升水患積久藥不復效大漸日正坐呼道人合掌便絶愿以侍疾日久轉正員郎出為晉安太守在郡不事生業前政與百姓交關質録其兒婦愿遣人扵道奪取将還在郡立學堂教授郡舊出髯蛇膽可為藥有遺愿蛇者愿不忍殺放二十里外山中一夜蛇還牀下復送四十里外山經宿復還故處愿更令逺送乃復歸論者以為仁心所致海邉有越王石常隠雲霧相傳云清㢘太守乃得見愿往就觀視清徹無隠蔽後琅邪王秀之為郡與朝士書曰此郡承虞公之後善政猶存遺風易遵差得無事愿以母老解職除後軍将軍褚淵嘗詣愿愿不在見其眠牀上頗積塵埃有書數帙而已淵歎曰虞君之清一至扵此令人埽地拂牀而去遷中書郎領東觀祭酒兄季為上虞令卒愿従省歩出還家不得詔便歸東除驍騎将軍遷廷尉祭酒如故愿嘗事宋眀帝齊初神主遷汝隂廟愿拜辭流涕建元元年卒著五經論問撰㑹稽記文翰數十篇王洪軌上谷人也宋大始中魏克青州洪軌得别駕清河崔祖歡女仍以為妻祖歡女說洪軌南歸宋桂陽王之難随髙帝鎮新亭常以身捍矢髙帝曰我自有楯歸可自防答曰天下無洪軌何有㢤蒼生方亂豈可一日無公帝甚賞之後為晉夀太守多招贓賄為州所按大懼棄郡奔建鄴髙帝輔政引為腹心建武初為青冀二州刺史悔為晉夀時貨賕所敗更勵清節先是青州資魚鹽之貨㦯彊借百姓麥地以種紅花多與部下交易以祈利益洪軌至一皆斷之啓求侵魏得黄郭鹽倉䓁數戍後遇敗死傷塗地深自咎責乃扵謝禄山南除地廣設茵席殺三牲招戰亡者魂祭之人人呼名躬自沃酹仍慟哭不自勝因發病而亡洪軌旣北人而甚清正州人呼之為虜父使君言之咸落涕焉永眀中有江夏李珪之字孔璋位尚書右丞兼都水使者厯職稱為清能後兼少府卒梁沈瑀字伯瑜吴興武康人也父昶事宋建平王景素景素謀反昶先去之及敗坐繫獄瑀詣臺陳請得免罪由是知名為奉朝請嘗詣齊尚書左丞殷濔濔與語及政事甚器之謂曰觀卿才幹當居吾此職司徒竟陵王子良聞瑀名引為府行參軍領揚州部傅従事時建康令沈徽孚恃勢傲瑀瑀以法繩之衆憚其彊子良甚相知賞雖家事皆以委瑀子良薨瑀復事刺史始安王遥光嘗使送人丁速而無怨遥光謂同使吏曰爾何不學沈瑀所為乃令瑀專知州獄事湖熟縣方山埭髙峻冬月公私行侶以為艱眀帝使瑀行修之瑀乃開四洪斷行客就作三日便辦揚州書佐私行詐稱州使不肯就作瑀鞭之四十書佐歸訴遥光遥光曰沈瑀必不枉鞭汝覆之果有詐眀帝復使瑀築赤山塘所費减材官所量數十萬帝益善之為建徳令教民一丁種十五株桑四株柿及梨栗女子丁半之民咸歡恱頃之成林去官還都兼行選曺郎随陳伯之軍至江州會武帝起兵圍郢城瑀說伯之迎武帝伯之泣曰余子在都不得出城不能不憂之瑀曰不然人情匃匃皆思改計若不早圖衆散難合伯之遂以衆降瑀従在武帝軍中初瑀在竟陵王家素與范雲善齊末嘗就雲宿夢坐屋梁柱上仰見天中有字曰范氏宅至是瑀為帝說之帝曰雲得不死此夢可驗及帝即位雲深薦瑀自既陽令擢兼尚書右丞時天下初定陳伯之言瑀催督運輸軍國䕶濟帝以為能遷尚書駕部郎兼右丞如故瑀薦族人沈僧隆僧照有吏幹帝並納之以母憂去職起為餘姚令縣大姓虞氏千餘家請謁如市前後令長莫能絶自瑀到非訟訴無所通以法繩之縣南又有豪族數百家子弟縦横逓相庇䕃厚自封植百姓甚患之瑀召其老者為石頭倉監少者補縣僮皆號泣道路自是權右屏跡瑀初至富吏皆鮮衣羙服以自彰别瑀怒曰汝等下縣吏何得自擬貴人悉使著芒屨麤布侍立終日足有蹉跌輒加榜箠瑀微時嘗至此鬻瓦器為富人所辱故因以報焉由是士庶駭怨瑀㢘潔自守故得遂行其意後為安南長史尋陽太守江州刺史曺景宗卒仍為信威蕭頴達長史太守如故瑀性屈彊每忤頴達頴達銜之天監八年因入諮事辭又激厲頴達作色曰朝廷用君作行事邪瑀出謂人曰我死而後已終不傾側面従是日扵路為人所殺多以為頴達害焉子續累訟之遇頴達尋卒事不窮竟續乃布衣蔬食終其身范述曽字子元一字頴彦吴郡錢唐人也㓜好學従餘杭呂道恵受五經略通章句道恵曰此子必為王者師齊文恵太子竟陵文宣王㓜時齊髙帝引述曾為之師友起家宋晉熙王國侍郎齊初至南郡王國郎中令遷太子歩兵校尉帶開陽令述曽為人謇諤在官多所諌争太子雖不能全用然亦弗之罪也竟陵王深相器重號為周舍太子左衛率沈約亦以述曾方之汲黯齊眀帝即位為永嘉太守為政清平不尚威猛甿俗便之所部横陽縣山谷嶮峻為逋逃所聚前後二千石討捕莫能息述曽下車開示恩信凡諸凶黨襁負而出編戸属籍者二百餘家自是商旅流通居人安業述曽勵志清白不受饋遺眀帝下詔羙之徴為㳺擊将軍郡送故舊錢二十餘萬一無所受惟得白桐木火籠朴十餘枚而已州民無老少皆出拜别號哭聞扵數里東昏時拜中散中大夫還鄉里武帝踐阼乃輕行詣闕仍辭還江東帝下詔襃羙以為太中大夫述曾生平所得奉禄皆以分施及老遂壁立無資以天監八年卒注易文言著雜詩賦數十篇後有吴興邱師施亦以㢘潔稱罷臨安縣還惟有二十籠簿書並是倉庫劵帖當時以比述曾位至臺郎孫謙字長遜東莞莒人也客居厯陽躬耕以養弟妹鄊里稱其敦睦仕宋為句容令清慎彊記縣人號為神眀宋眀帝擢為巴東建平二郡太守郡居三峽常以威力鎮之謙将述職勅募千人自随謙曰蠻夷不賔盖待之失節耳何煩兵役以為國費固辭不受入郡布恩恵之化蠻獠懐之競餉金寳謙慰諭而遣一無所納及掠得生口皆放還家俸秩出吏民􅊖原除之郡境翕然威信大著視事三年徴還為撫軍中兵參軍遷越騎校尉征北司馬府主建平王将稱兵患謙彊直託事遣使至都然後作亂及建平誅遷左軍将軍齊初為錢唐令御煩以簡獄無繫囚及去官百姓以謙在職不受餉遺追載縑帛以送之謙辭不受每去官輒無私宅借空車廐居焉永眀初為江夏太守坐被代輒去郡繫尚方頃之免為中散大夫眀帝将廢立欲引謙為心膂使兼衛尉給甲仗百人謙不願處際㑹輒散甲士帝雖不罪而弗復任焉天監六年為零陵太守年已衰老猶彊力為政夷人安之先是郡多猛獸暴人謙至絶迹及去官之夜猛獸即害居人謙為郡縣常勤勸課農桑務盡地利收入常多扵鄰境九年以老徴為光禄大夫旣至武帝嘉其清潔甚禮異焉每朝見猶請劇職自効帝笑曰朕使卿智不使卿力後十四年詔加優秩給親信二十人并給扶謙自少及老厯三縣五郡所在㢘潔居身儉素牀施蘧篨屏風冬則布被莞席夏月無幬帳而夜卧未嘗有螡蚋人多異焉年逾九十彊壮如五六十者每朝會輒先衆到公門力扵仁義行已過人甚逺従兄靈慶嘗病寄謙謙行出還問起居靈慶曰向飲冷熱不調即時猶渇謙退遣其妻有彭城劉融行乞疾篤無所歸友人輿送謙舍謙開聴事以受之及融死以禮殯葬衆咸服其行義末年頭生二肉角各長一寸十五年卒官時年九十二臨終遺命誡諸子以氣絶即幅巾就葬棺足周身壙足容柩旐書爵里而已其旒表命數差可停息直僦轜牀装之以䕠以常所乗者為魂車他無所用及卒帝為舉哀甚悼惜之謙従子㢘字思約父奉伯位少府卿淮南大守㢘便辟巧宦齊時已厯大縣尚書右丞天監初沈約范雲當朝用事㢘傾意奉之及中書舎人黄睦之等亦尤所結附凡貴要每食㢘必日進滋旨皆手自煎調不辭勤劇遂得為列卿御史中丞晉陵吴興太守廣陵髙爽有險薄才客扵㢘㢘委以文記爽嘗有求不遂乃為屐謎以喻㢘曰刺鼻不知啑蹋面不知嗔齧齒作歩數持此得勝人譏其不計恥辱以此取名位然處官平直遂以善政稱武帝嘗曰東莞二孫謙㢘而已何逺字義方東海郯人也父慧炬齊尚書郎逺仕齊為奉朝請豫崔慧景敗亡事扺尚書令蕭懿懿深保匿焉會赦出頃之懿遭難子弟皆伏逺求得懿弟融藏之旣而彂覺逺踰垣以免融遇禍逺家属繫尚方逺遂亡度江因降魏入夀陽見刺史王肅求迎武帝肅遣兵援送武帝見逺謂張𢎞䇿曰何逺丈夫而能破家報舊徳未易人也武帝踐阼以奉迎勲封廣興男為後軍鄱陽王恢録事參軍逺與恢素善在府盡其志力知無不為恢亦推心杖之恩寄甚宻遷武昌太守逺夲倜儻尚輕俠至是乃折節為吏杜絶交㳺饋遺秋毫無所受武昌俗皆汲江水盛夏逺患水温每以錢買人井寒水不取錢者則摙水還之其他事率多如此迹雖似偽而能委曲用意車服尤弊素器物無雕漆江左水族甚賤逺每食不過乾魚數片而已然性剛嚴吏人多以細事受鞭罰遂為人所訟徴下廷尉被劾十數條當時士大夫坐法皆不受測逺已無贓就測立三七日不款猶以私藏禁杖除名後為武康令愈勵㢘節除淫祀正身率職人甚稱之太守王彬巡属縣諸縣皆盛供張以待焉至武康逺獨設糗水而已彬去逺送至境進斗酒隻鵞而别彬戯曰卿禮有過陸納将不為古人所笑乎武帝聞其能擢為宣城太守自縣為近畿大郡近代未之有也郡經冦抄逺盡心綏理復著名迹期年遷樹功将軍始興内史時泉陵侯朗為桂州縁道多剽掠入始興界草木無所犯逺在官好開途巷修葺墻屋民居市里城隍廐庫所過若營家焉田秩奉錢並無所取嵗暮擇人尤窮者充其租調以此為常然其聴訟猶人也不能過絶而性果斷人畏而惜之所至皆生為立祠表言政状帝每優詔答焉後厯給事黄門侍郎信武将軍監吴郡在吴頗有酒失遷東陽太守逺處職疾彊富如仇讎視貧細如子弟特為豪右所畏憚在東陽嵗餘復為受罰者所謗坐免歸逺性耿介無私曲居人間絶請謁不造詣與貴賤書疏抗禮如一其所會遇未嘗以顔色下人以此多為俗士所疾惡其清公實為天下第一居數郡見可欲終不變其心妻子饑寒如下貧者及去東陽歸家經年嵗口不言榮辱士類益以此多之其輕財好義周人之急言不虚妄盖天性也每戯語人云卿能得我一妄語則謝卿以一縑衆共伺之不能記也後為征西諮議參軍中撫軍司馬卒郭祖深襄陽人也武帝初起以客従後随蔡道恭在司州陷北還上書言境上事不見用還為長兼南梁郡丞徙後軍行參軍帝溺情内教朝政縦弛祖深輿櫬詣闕上封事二十九條其言僧尼害國蠧民語尤切直又請斷界首将生口入北及關津廢替湏加紏擿又言廬陵年少不宜鎮襄陽左僕射王暕在喪被起為吴郡曽無辭讓其言深刻又請復郊四皇帝雖不能悉用然嘉其正直擢為豫章鍾陵令員外散騎常侍普通七年改南州津為南津校尉以祖深為之加雲騎将軍秩二千石使募部曲三千及至南州公嚴清刻由来王侯勢家出入津不忌憲綱俠藏亡命祖深搜檢姦惡不避彊禦動致刑辟奏江州刺史邵陵王太子詹事周捨贓罪逺近側足莫敢縦恣淮南太守畏之如上府常服故布襦素木案食不過一肉有姥餉一早青𤓰祖深報以疋帛後有富人效之以貨祖深鞭以徇衆朝野憚之絶扵干請所領皆精兵令行禁止有所討逐越境追禽江中嘗有賊祖深自率討之列陣未敢進仍令所親人先登不時進斬之遂大破賊威振逺近長江肅清後魏張恂字𢎞讓上谷湼陽人幽州刺史贈太保衮之弟也衮自有傳道武為代王時恂随衮歸國道武以恂參代王軍事恂言扵道武曰自金運失御劉石紛紜慕容竊號山東苻姚盜器秦隴遂致三靈乏饗九域曠居大王植基朔北重眀積聖自北而南化被燕趙今中土士民望雲冀闕宜因斯會以建大業道武深器之厚加禮焉皇始初拜中書侍郎帷幄宻謀頗預參議賜爵平皋子出為廣平太守恂招集離散勸課農桑流民歸之者數千戸遷常山太守恂開建學校優禮儒士吏民歌詠之扵時亂離之後牧民者罕能克勵惟恂當官清白仁恕臨下百姓親愛之其治為當時第一道武嘉之賜以金帛眀元即位徴拜太中大夫卒恂性清儉死日家無餘財贈并州刺史平皋侯諡曰宣子純字道尚襲爵坐事除純弟代字定燕陳留北平二郡太守卒贈營州刺史諡恵侯代所厯著稱有父遺風代子萇年為汝南太守郡人劉崇之兄弟分析家貧惟一牛争不能決訟扵郡庭萇年悽而見之謂曰汝曺當以一牛故致此争競脫有二牛必不争乃以己牛一頭賜之扵是境中各相誡約咸敦敬讓卒扵郡子琛字寳貴少有孝行位至太子翊軍校尉卒張膺不知何許人也延興中為魯郡太守履行貞素妻子採樵以自供孝文深嘉之遷京兆太守清白著稱得吏人之忻心焉宋世景西河介休人河南尹翻之弟也翻自有傳世㬌少自修立事親以孝聞與弟道璵下帷讀誦博覽羣言尤精經義族兄弁甚重之舉秀才上第再遷彭城王勰開府法曺參軍勰愛其才學雅相器敬孝文甚嘉異之遷司徒法曺參軍世㬌眀刑理著律令裁決疑獄剖決如流轉尚書祠部郎彭城王勰每稱曰宋世㬌精微尚書僕射才也臺中疑事右僕射㳺肇常以委之世㬌旣才長従政加之夙勤不怠兼領藪曺深著稱績左僕射源懐引為行臺郎巡察州鎮十有餘所黜降賞罰莫不咸允遷七鎮别置諸戌眀設亭候以備不虞懐大相委重還薦之宣武以為不減李冲帝曰朕亦聞之後為伏波将軍行滎陽太守郡大姓鄭氏豪横號為難制濟州刺史鄭尚弟逺慶先為宛陵令多所受納百姓患之而世㬌下車召而誠之逺慶行意自若世景繩之以法逺慶懼棄官亡走扵是属縣莫不改肅終日坐扵㕔事未嘗寢息人間之事巨細必知發姦擿伏有若神眀嘗有一吏休滿還郡食人雞豚又有一幹受人一帽又食二雞世景叱而告之吏幹叩頭伏罪扵是上下震悚莫敢犯禁坐弟道璵事除名世㬌友于之性過絶扵人及道璵死哭之酸感行路歳餘母喪遂不勝哀而卒世景曽撰晉書竟未得就遺腹子季儒位太學博士曽至譙宋間為文弔嵇康甚有理致後夜寢室壞壓而殞時人悼傷惜之道璵少而敏俊自太學博士轉京兆王愉法曺行參軍坐愉反得罪作詩及挽歌詞寄之朋親以見冤痛道璵又曽贈着作郎張始均詩其末章云子深懐璧憂余有當門病道璵旣不免難始均亦遇世禍時咸怪之道璵従孫孝工學渉亦好輯綴文藻形貌短陋而好臧否人物時論甚疾之為齊北平王文學求入文林館不遂囙非毁朝士撰朝士别録二十卷會周武滅齊改關東風俗傳更廣聞見勒成三十卷以上之言多妄謬篇第冗雜無著述體周大象末預尉遲迥事誅死路邕陽平人也宣武時除東魏郡太守涖政清勤經年儉日出家粟賑賜貧窘靈太后下詔襃羙賜龍廐馬一疋衣一襲被褥一具稍遷南青州刺史卒閻慶允不知何許人也為東秦州敷城太守頻年饑儉慶允嵗常以家粟千石賑恤貧窮人賴以濟部人陽寳龍一千餘人申頌羙政有司以聞靈太后卒無襃賞眀亮字文徳平原髙昌人也有識幹厯員外常侍延昌中宣武臨朝堂親自黜陟授亮勇武将軍亮進曰臣夲官常侍是第三清今授臣勇武其號至濁且文武又殊請更改授帝曰九流之内人咸君子卿獨欲乖衆妄相清濁所請未可亮曰今江左未賔書軌宜一方為陛下投命前驅拓定吴會官爵陛下之所輕賤命微臣之所重陛下方收所重何惜所輕因請改授平逺将軍帝曰運籌用武然後逺人始平卿但用武平之何患不得平逺乎亮乃陳謝而退除陽平太守清白愛人甚有恵政轉汲郡太守為政如前舉宣逺近卒二郡人吏迄今追思之杜纂字榮孫常山九門人也少以清苦自立時縣令齊羅喪亡無親属收殮纂以私財殯葬由是郡縣標其門閭後居父喪盡禮郡舉孝㢘稍除積弩将軍従征新野及南陽平以功賜爵井陘男賞帛五百疋數日之中散之知友時人稱之厯武都漢陽二郡太守並以清白為名眀帝初拜清河内史性儉約尤愛貧老問民疾苦至有對之涕泣勸督農桑親自檢視勤者賞以物帛惰者加以罪譴弔死問生甚有恩紀除東益州刺史無御邉威略羣氐反叛以失人和徴還遷太中大夫正光末清河人房通等三百人頌纂徳政乞重臨郡詔許之孝昌中為葛榮圍逼以郡降榮以為常山太守榮滅卒扵家纂所厯任好行小恵蔬食弊衣多渉誣矯而輕財潔已終無受納為百姓所思號為良守天平中贈定州刺史裴佗字元化河東聞喜人也六世祖詵仕晉位太常卿因晉亂避地涼州苻堅平河西東歸因居解縣世以文學顯五舉秀才再舉孝㢘時人羙之父㬌恵州別駕佗容貌魁偉隤然有器望舉秀才以髙第除中書博士累遷趙郡太守為政有方威恵甚著狡吏姦人莫不改貫所得俸禄分䘏貧窮轉前将軍荆州刺史郡人戀仰傾境餞送蠻酋田盤石田敬宗等部落萬餘家恃衆阻險不賔王命前後牧守未能降款佗至州單使宣慰示以禍福敬宗聞風歸附扵是合境清晏襁負至者千餘家後加中軍将軍以老乞還卒遺令不聼請贈不受賵襚諸子皆遵行之佗性剛直不好與俗人交逰其投分者必當時名勝清白任真不事家産宅不過三十歩又無田園暑不張盖寒不衣裘其貞儉若此子讓之諏之俱知名齊史有傳竇瑗字世珍遼西陽洛人也自言夲出扶風平陵漢大将軍武曽孫崇為遼西太守遂家焉曽祖堪慕容氏漁陽太守祖表馮𢎞城周太守入魏父冏舉秀才早卒普泰初瑗啓以身階級為父請贈詔贈平州刺史瑗年十七便荷帙従師逰學十載始為御史後兼太常博士拜太原王爾朱榮官榮留為北道大行臺左丞以拜榮官賞新昌男従榮東平葛榮封容城縣伯瑗乞以容城伯讓兄叔珍詔聽以新昌男轉授之叔珍由是位至泰山太守爾朱世隆等立長廣王曄為主南赴洛陽至東郭外世隆䓁遣瑗奏廢之瑗執鞭獨入禁内奏願行堯舜事曄遂禪廣陵由是除給事黄門侍郎孝武帝時為廷尉卿及釋奠開講瑗與温子昇魏季㬌李業興並為擿句天平中除廣宗太守政有清白之稱廣宗人情凶戾累政咸見告訟惟瑗一人終始全潔轉中山太守聲譽甚羙為吏民所懐及齊神武班書州郡稱瑗政績以為勸勵後授平州刺史在州政如臨郡又為神武丞相府右長史瑗無軍府斷割才不甚稱職又行晉州事及還鄴上表曰臣伏讀麟趾新制至三公曺第六十六條母殺其父子不得吿吿者死三返覆之未得其門何者案律子孫告父母祖父母者死又漢宣云子匿大父母皆勿論盖謂父母祖父母小者攘羊甚者殺害之類恩湏相隠律抑不言法理如是足見其直未必指母殺父止子不言也今母殺父而子不告便是知母而不知父識比野人義近禽獸且母之扵父作合如天旣殺已之天復殺子之天二天俱毁豈容頓黙此母之罪義不在赦下手之日母恩即離仍以母道不吿鄙臣所以致惑如㦯有之可臨時議罪何用豫制斯條用為訓誡恐千載之下談者諠譁以眀眀大朝有尊母卑父之論以臣管見實所不取詔付尚書三公郎封君義立判云母殺其父子復吿母母由吿死便是子殺天下未有無母之國不知此子将欲何之旣扵法無違扵事非害宣布有司謂不宜改瑗復難云局判云母由吿死便是子殺天下未有無母之國不知此子将欲何之瑗案典律未聞母殺其父而子有隠母之義旣不告母便是與殺父同天下可有無父之國此子獨得有所之乎事雖停寢除大宗正卿宗室以其寒士相與輕之瑗案法推正甚見讎疾官雖通顯貧窘如初清尚之撡為時所重領夲州大中正兼廷尉卿卒官贈太僕卿濟州刺史諡曰眀羊敦字元禮泰山鉅平人也伯父祉光禄大夫父靈引為京兆王愉冀州長史愉反靈引見害祉靈引各有傳敦性尚閑素學渉書史以父死王事除給事中出為夲州別駕公平正直見非法終不判署後為衛将軍廣平太守甚有能名姦吏跼蹐秋毫無犯雅性清儉属嵗饑家餽未至使人外尋陂澤採藕根食之遇有疾苦家人解衣質米以供之然政尚威嚴朝廷以其清白賜榖一千斛絹一百疋卒官吏民奔哭莫不悲慟贈衛大将軍吏部尚書兖州刺史諡曰貞武定初齊神武以敦及中山太守蘓㳤在官奉法清約自居宜見追襃乃上言請加旌録詔各賞帛一百疋粟五百斛下郡國咸使聞知焉蘓淑字仲和武邑人也兄夀興坐事為閹官後拜河間太守賜爵晉陽男及夀興将卒遂冒養淑為子㳤熙平中襲其爵後除樂陵内史在郡綏撫甚有人譽後謝病乞解有詔聽之民吏老㓜訴乞淑者甚衆後厯滎陽中山二郡太守卒淑清心愛下所厯三郡皆為吏民所思當時稱為良二千石武定初贈衛大将軍都官尚書瀛州刺史諡曰懿齊神武追羙清撡與羊敦同見優賞北齊張華原字國滿代郡人也少眀敏有器度神武開驃騎府引為法曺參軍賜爵新城伯仍侍左右従扵信都為丞相府属深被親遇每號令三軍恒令宣諭意旨尋除散騎常侍周文之始據雍州也神武欲以逆順曉之使華原入關說焉周文宻有拘留之意謂之曰若能屈驥足扵此當共享富貴不爾命懸今日華原曰渤海王命世誕生殆天所縦以眀公篡命關右便自隔絶故使華原銜命相喻公不以此日改圖轉禍為福乃欲以死脅人乎周文嘉其亮直乃使東還尋而悔之遣追不及神武以華原久而不返每歎惜之及聞其来喜見扵色後除相府右長史遷驃騎大将軍特進進爵為公仍徙封新安後為兖州刺史華原有幹略達政體至州乃廣布耳目示以威禁境内大賊及隣州亡命三百餘人皆詣華原歸款咸撫以威信放歸田里扵是人懐感附冦盜寢息州獄先有繫囚千餘人華原科簡輕重随事決遣至年暮惟有重罪者數十人華原各給假五日令歸曰期盡速還也囚䓁曰有君如是何忍背之依期畢至先時州境數有虎為暴自華原臨政州東北七十里甑山中忽有六駮食虎咸以為化感所致後卒官州人號慕為樹碑立祠四時享祭焉贈尚書左僕射子宰均嗣宋世良字元友西河介休人也世為著姓父毓字道和敦篤有志行卒扵太中大夫世良年十五便有膽氣後随伯父翻在南兖州屢有戰功魏行臺臨淮王彧與語竒之朝廷以爾朱榮有不臣跡孝荘将圖之宻令彧将兵赴洛彧在梁郡稱疾假世良都督令還南兖彂兵以聽期世良請簡見兵三千騎五日必到洛陽并陳三䇿彧皆不能従焉尋為殿中侍御史詣河北括戸大獲浮惰見汲郡城傍多骸骨移書州郡悉令收瘞其夜甘雨滂沱河内太守田怙贓貨百萬世良檢案之未竟遇赦而還孝荘勞之曰知卿所括得丁倍扵夲帳若官人皆如此用心便是更出一天下也其後遷殿中世良奏殿中主齋會之事請改付餘曺帝曰卿意不欲親庖厨邪宜付右兵以為永式河州刺史梁㬌叡枹罕羌首恃逺不敬其賀正使人頻年稱疾秦州刺史侯莫陳恱受其贈遺常為送表世良並奏科其罪帝嘉之謂長孫永業曰宋郎中實有家風甚可重也後拜清河太守世良才識閑眀尤善政術在郡未㡬聲聞甚髙陽平郡移掩刧盜三十餘人世良訊其情状惟送十二人餘皆放之陽平太守魏眀朗大怒云輒放吾賊及推問送者皆實放者皆非眀朗大服郡東南有曲隄成公一姓阻而居之羣盜多萃扵此人為之語曰寧渡東吴會稽不厯成公曲隄世良施八條之制盜奔他境民又為謡曰曲隄雖險賊何益但有宋公自屏跡天保初大赦郡先無一囚率羣吏拜詔而已獄内櫓生桃樹蓬蒿亦滿每日牙門虚寂無復訴訟者人謂之神門其冬醴泉出扵界内及代至傾城祖道有老人丁金剛者泣而前謝曰老民年九十記三十五府君非惟府君善政清亦徹底今失賢君民何以濟莫不攀轅涕泣除東郡太守卒官贈信州刺史世良彊學好属文撰字略五篇宋氏別録十卷子伯宗位侍御史性清退好學多所撰述至齊亡不徙職遂不入仕隋大業初卒扵家世良弟世軌自有傳郎基字世業中山新市人也祖智魏魯郡太守贈兖州刺史父道㤙開府陽平郡守基身長八尺羙鬚髯汎渉墳籍尤長吏事起家奉朝請累遷海西鎮将遇東方白額稱亂淮南州郡皆従逆梁将呉明徹率衆攻圍海西基率勵兵民固守百餘日軍糧且罄戎杖亦盡乃至削木為箭翦紙為羽圍解還朝僕射楊愔乃迎勞之曰卿本文吏遂有武略削木翦紙皆無故事班墨之思何以相過御史中丞畢義雲引為侍御史趙州刺史尉粲文宣外弟揚州刺史郭元真楊愔妺夫基不惮權威並劾其贓罪皇建初除鄭州長史帶潁川郡守郡西界與周接境因侯㬌背叛其東西分隔士人囙縁姻舊私相貿易而禁格嚴重犯者非一基初涖職披檢條格多是權時不為久長州郡因循失扵請讞致宻網久施得罪者衆遂條件申臺省仍以情量事科處自非極刑一皆放決積年留滯案状膠加數日之中剖判咸盡而臺省報下並允基所陳條網旣疎獄訟清浄官民遐邇皆相慶恱基性清慎無營求嘗語人曰任官之所木枕亦不湏作况重扵此乎惟頗令人寫書潘子義曽遺之書云在官寫書亦是風流罪過基答曰觀過知仁斯亦可矣卒扵官贈驃騎大将軍和州刺史諡曰恵棺柩将還逺近赴送莫不攀轅悲哭哀不自勝初基任瀛州騎兵時陳元康為司馬畢義雲為属與基並有聲譽為刺史元嶷所目曰三賢俱有當世才後来皆當逺至惟郎騎兵任真過甚恐不足自達陳畢後並貴顯而基位止郡守基子茂隋史有傳孟業字敬業鉅鹿安國人也家夲寒微少為州吏性㢘謹同僚諸人侵盜官絹分三十疋與業業拒而不受行臺郎中郭秀甚相禮接方欲薦之會秀卒魏彭城王韶神武之壻也拜定州刺史除業為典籖長史劉仁之謂業曰我處其外君居其内同心戮力庶有濟乎未㡬仁之入為中書令臨路啓韶云殿下左右可信任者惟有孟業願専任之餘人不可信也又與業別執手曰今我出都君便失援恐君在後不自保全惟正與直願君自勉業惟有一馬瘦死韶以業貧令州府官人同食馬肉欲令厚相酬償業固辭不敢韶乃戯業曰卿邀名人也對曰業為典籖州中要職諸人欲相賄贍止患無方便耳今喚食肉恐致聚斂有損聲名所以仰違眀教後未旬日韶左右王四徳董惟金並以馬死託肉為長史裴英宻啓神武有書與韶大致誚讓業尋被譛出外行縣事後神武書責韶云典籖姓孟者極能用心何乃令出外也及韶代下業亦隨還贈送一無所受仁之後為西兖州臨別謂吏部郎中崔暹曰貴州人士惟有孟業銓舉之次不可忘也暹問業曰君徃在定州有何政使劉西兖如此欽歎業答曰惟知自修也韶為并州刺史業復為典籖仍兼長史天保初清河王岳拜司州牧召為法曺業形貌短小及謁見岳心鄙其眇小笑而不言後尋業斷決處謂曰卿斷決之眀可謂有過軀貌之用補河間王國郎中令清貧自守未曽有失文宣謂侍中裴英起曰卿識河間王郎中孟業不一昨見其國司文案似是好人對曰昔與臣同事魏彭城王元韶其人清忠正直世所希有帝曰如公言者比来便是大屈遂除中書舍人文宣初惟得姓名及因奏事見其羸老又質性敦朴無升降之容加之平緩寡扵方便有一道士由吾道榮以術藝被迎将入内業為通名忽扵衆中抗聲奏云由吾道士不食五榖帝命推而下之又令㸃校百官敷奏失所帝遣人以馬鞭擊業頭至扵流血然亦體其衰老非力所堪皇建二年累遷東郡太守以寛恵著名其年夏五官張凝因出使得麥一莖五穂其餘㦯三穂四穂共一莖者合郡咸以政化所感因即申上至秋復有東燕縣人班暎祖送嘉禾一莖九穂河清三年勅民間養驢催買甚切業曰吾旣為人父母豈可坐看此急令宜權出庫錢貸人取辦後日有罪吾自當之後為憲司所劾被攝之日郡人皆泣而随之迭相弔慰送業度關者有數百人至黎陽郡西方得辭決攀轅號哭悲動行路詣闕訴冤者非一人勅乃放還郡中父老扣河迎接武成親戎自洛還鄴道由東郡業具牛酒率人吏拜謁路傍自稱糞土臣孟業伏惟聖駕親行有征無戰謹上微禮便與人吏俱唱萬嵗導引前入帝大嘉之後除廣平太守年旣老理政不如在東郡時武平九年為太中大夫加衛将軍尋卒業志守質素不尚浮華為子結婚扵朝肺腑吒羅氏其子以䕃得官為平原王段孝先相府行參軍乃令作今世服飾綺襦紈袴吒羅家又恃姻婭炫曜矜誇業知而不禁素望頗貶崔伯謙字士遜博陵安平人也祖檦行博陵太守父文業中書郎鉅鹿太守伯謙㓜孤居貧養母神武起晉陽召補相府功曺稱之曰崔伯謙清直奉公真良佐也轉七兵殿中左戸三曺郎中弟仲讓為北豫州司馬與髙慎同叛伯謙坐免官後厯瀛州別駕京畿司馬文襄将之晉陽勞之曰卿騁足瀛部已著康歌督府務繁是用相授臨別又馬上執手曰執子之手與子偕老卿宜深體此情族弟暹當時寵要伯謙與之舊僚同門非吉凶未嘗造請之以雅道自居天保初除濟北太守恩信大行富者禁其奢侈貧者勸課周給縣公田多沃壤伯謙咸易之以給民又改鞭用熟皮為之不忍見血示恥而已朝貴行過郡境問人曰太守政何似對曰府君恩化古者所無誦人為歌曰崔府君能臨政退田易鞭布威徳人無争客曰旣稱恩化何因復威對曰長吏憚其威嚴人庶䝉其恩恵故兼言之以相府舊僚例有加授徴赴鄴百姓號泣遮道數日不得前以弟仲讓在關中不復居内任除南鉅鹿太守下車導以禮讓豪族皆改心整肅事無巨細必自親覽在縣有貧弱未理者皆曰我自吿白鬚公不慮不決在郡七年獄無停囚每有大使巡察恒處上第徴拜銀青光禄大夫伯謙少時讀經史晚年好老荘容止儼然無愠色親朋至則置酒相娱清言不及俗事士大夫以為儀表卒贈南兖州刺史諡曰懿伯謙弟仲讓仕西魏位至鴻臚少卿蘓瓊字珍之長樂武彊人也父備仕魏至衛尉少卿瓊㓜時随父在邉嘗謁東荆州刺史曺芝芝戱問曰卿欲官不對曰設官求人非人求官芝異其對署為府長流參軍文襄以儀同開府引為刑獄參軍每加勉勞并州嘗有彊盜長流參軍張流推其事所疑賊徒並已拷伏失物家並識認惟不獲盜賊文襄付瓊更令窮審乃別推得元㬌融䓁十餘人并獲贓驗文襄大笑語前妄引賊者曰爾輩若不遇我好參軍㡬致枉死除南清河太守郡多盜賊及瓊至奸盜止息或外境奸罪輒従界中行過者無不捉送零陵縣民魏䨇成住處與畿内武城交錯失牛疑其村人魏子賔列送至郡一經窮問即知非子賔盜便釋之雙成云府君放賊去百姓牛何可得瓊不理其語宻遣訪獲盜者從此畜牧多散放不收云但付府君其隣郡富家将財物寄置界内以避盜冀州繹幕縣人成氏大富為賊攻急吿曰我物已寄置蘓公矣賊遂去平原郡有妖賊留黒茍構結徒侣通扵滄海瓊所部人連接村居無相染累隣邑扵此伏其徳績郡中舊賊一百餘人悉充左右人間善惡及長吏飲人一盃酒無不即知瓊性清慎不彂私書道人道研為濟州沙門統資産巨富在郡多有出息常得郡縣為徴及欲求謁瓊度知其意每見則談問元理應對肅恭研雖為債數来無由啓口其弟子問其故研曰每見府君徑将入青雲間何由得論地上事師徒還歸遂焚債劵郡人趙潁曽為樂陵太守年餘八十致仕歸五月中得新𤓰一雙自来奉瓊潁恃年老苦請遂便為留仍致扵聴事梁上竟不割人聞受趙潁餉𤓰欲貢新果至門問知潁𤓰猶在相顧而去有百姓乙普眀兄弟争田積年不斷各相援據乃至百人瓊召普眀兄弟對衆人諭之曰天下難得者兄弟易求者田地假令得地失兄弟心如何因而下淚諸證人莫不灑泣普眀兄弟叩頭乞外更思分異十年即還同住每年春總集大儒衛顗隆田元鳳䓁講扵郡學朝吏文案之暇悉令授書時人指吏曺為學生屋禁斷淫祀㛰姻喪葬皆教令儉而衷禮又蠺月預下綿絹度様扵部内其兵賦次第並立眀式至扵調役事必先辦郡縣吏長恒無十杖稽失當時州郡無不遣人至境訪其政術天保中郡界大水民災絶食者千餘家瓊普集郡中有粟家自従貸粟悉以給付饑者州計戸徴租復欲推其貸粟綱紀謂瓊曰雖矜饑餒恐罪累府君瓊曰一身獲罪直活千室何所怨乎遂上表陳状使檢皆免人戸保安此等相撫兒子咸言府君生汝在郡六年民庶懐之州前後四表列為尤最遭憂解職故人贈遺一無所受尋起為司直廷尉正朝士嗟其屈尚書􅉝術曰旣直且正名以定體不慮不申初瓊任清河太守裴獻伯為濟州刺史獻伯酷扵用法瓊恩扵養人房延祐為樂陵郡過濟州裴問其外聲延祐云惟聞太守善刺史惡裴云得人譽者非至公答云若爾黄覇龔遂君之罪人也後有勅州各舉清能裴以前言恐為瓊陷瓊申其枉滯議者尚其公平畢義雲為御史中丞以猛暴任職理官忌憚莫敢有違瓊推察務在得雪者甚衆寺署臺案始自扵瓊遷三公郎中趙州及清河南中有人頻吿謀反前後皆付瓊推檢事多申雪尚書崔昂謂瓊曰若欲立功名當更思餘理仍數雪反逆身命何輕瓊正色曰所雪者冤枉不放反逆昂大慙京師為之語曰斷決無疑蘓珍之皇建中賜爵安定縣男徐州行臺左丞行徐州事徐州城中五級寺忽被盜銅像一百軀有司徴檢四隣防宿及蹤跡所疑逮繋數十人瓊一時放遣寺僧怨訴不為推賊瓊遣僧謝曰但且還寺得像自送爾後十日抄賊姓名及贓處所徑收掩悉獲實驗賊徒款引道俗歎服舊制以淮禁不聴商販輒渡淮南嵗儉啓聴淮北取糴後淮北人饑復請通糴淮南遂得商估往還彼此兼濟水陸之利通扵河北後為大理卿而齊亡仕周為博陵太守隋開皇初卒房豹字仲幹清河東武城人也曾祖法夀魏冀州刺史祖伯祖齊郡内史父翼宗安太守豹體貌魁岸羙音儀年十七州辟主簿王思政入據潁川慕容紹宗出討豹為紹宗開府主簿兼行臺郎中紹宗自云有水厄遂扵戰艦中浴并自投扵水兾以厭當之豹白紹宗曰天命也在天豈人理所能延保公若實有水厄非禳辟所能却若其實無何禳之有今三軍之事在扵眀公惟應達命任理以保元吉方乃乘船入水云以防災豈如㟁上指麾以保萬全也紹宗笑曰不能免俗為復爾耳未㡬而紹宗遇溺時論以豹為知微清河中除謁者僕射拜西河太守地接周境俗雜稽胡豹政貴清静甚著聲績遷博陵太守甚有能名又遷樂陵太守風教修理稱為羙政郡瀕海水味多鹹苦豹命鑿一井遂得甘泉遐邇以為政化所致豹罷歸後井味復鹹齊滅遂還夲鄉邱園自養頻被徴命固辭以疾每牧守初臨必遣致禮官佐邑宰皆投刺申敬終扵家無子以兄熊子彦詡嗣彦詡眀辯有學識位殿中侍御史千乗益都二縣令有恵政路去病陽平人也風神踈朗儀表瓌異河清初為殿中侍御史彈劾不避貴戚以正直知名時勅用士人為縣宰以去病為定州饒陽縣令去病眀閑時務性頗嚴毅人不敢欺然至㢘平為吏民歎伏武平四年為成安縣令都下有鄴臨漳成安三縣輦轂之下舊號難為重以政亂時艱綱紀不立近臣内戚請属百端去病消息事宜以理抗答勢要之徒雖厮養小人莫不憚其風格亦不至嫌恨自遷鄴以還三縣令政術去病獨為稱首周武平齊重其能官與濟隂郡守公孫㬌茂二人不被替代彂詔襃揚去病後以尉遲迥事隋大業初卒扵冀氏縣令隋梁彦光字修芝安定烏氏人也祖茂魏秦華二州刺史父顯周荆州刺史彦光少岐嶷有至性其父每謂所親曰此兒有風骨當興吾宗七嵗時父遇篤疾醫云餌五石可愈時求紫石英不得彦光憂瘁不知所為忽扵園中見一物彦光所不識怪而持歸即紫石英也親属咸異之以為至孝所感魏大統末入學略渉經史有規檢造次必以禮解褐祕書郎周受禪遷舍人上士武帝時累遷小馭下大夫母憂去職毁瘠過禮未㡬令起視事帝見其毁甚嗟歎久之後為御正下大夫従帝平齊以功授開府陽城縣公宣帝即位拜華州刺史進封華陽郡公以陽城公轉封一子後拜柱國青州刺史属帝崩不之官髙祖受禪以為岐州刺史兼領官監甚有恵政嘉禾連理出扵州境上嘉其能下詔襃羙賜粟五百斛帛物三百段御傘一枚以勵清正後轉相州刺史彦光前在岐州其俗頗質以静鎮之合境大安奏課連最為天下第一及居相部如岐州法鄴都雜俗人多變詐為之作歌稱其不能理政上聞而譴之竟坐免嵗餘拜趙州刺史彦光言扵上曰臣前待罪相州百姓呼為戴帽餳臣自分廢黜無復衣冠之望不謂天恩復加收採臣請復為相州改絃易調庶有以變其風俗上従之復為相州刺史豪猾者聞彦光自請而来莫不嗤笑彦光下車彂摘奸隠有若神眀狡猾莫不潛竄扵是合境大駭初齊亡後衣冠士人多遷關内惟伎巧商販及樂戸之家移實州郭由是人情險詖妄起風謡訴訟官人萬端千變彦光欲革其弊乃用秩俸之物招致山東大儒每鄉立學非聖哲之書不得教授常以季月召集之親臨䇿試有勤學異䓁聰令有聞者升堂設饌其餘並在廊下有好諍訟惰業無成者坐之庭中設以草具及大比當舉行賔貢之禮又扵郊外祖道并以財物資之扵是人皆刻勵風俗大改有滏陽人焦通性酗酒事親禮缺為従弟所訟彦光弗之罪将至州學令觀孔子廟扵時廟中有韓伯瑜母杖不痛哀母力衰對母悲泣之像通遂感悟悲愧若無所容者彦光訓諭而遣之後改過勵行卒為善士吏人感恱略無諍訟卒官贈冀㝎瀛青四州刺史諡曰襄子文謙嗣𢎞雅有父風以上柱國世子例授儀同厯上饒二州刺史遷鄱陽太守稱為天下之最徴拜戸部侍郎遼東之役領虎賁郎将為盧龍道軍副會楊元感作亂其弟虎賁郎将元縦先𨽻文謙元感反問未至而元縦逃走文謙不之覺坐是配防桂林而卒少子文讓初封陽城縣公後為鷹揚郎将従衛元撃楊元感扵東都力戰而死贈通議大夫樊叔略陳留人也父觀仕魏為南兖州刺史河陽侯為髙氏所誅叔略被腐刑給使殿省身長九尺有志氣頗見忌内不自安遂奔關西周文器之引置左右授都督襲爵為侯大冡宰宇文䕶執政引為中尉漸被委信兼督内外位開府儀同三司䕶誅齊王憲引為園苑監數進兵謀憲甚竒之従武帝平齊以功加上開府封清鄉縣公拜汴州刺史號為眀決宣帝營建東都以叔略有巧思拜營構監宫室制度皆叔略所定尉遲迥之亂鎮大梁以軍功拜大将軍復為汴州刺史髙祖受禪加位上大将軍進爵安定郡公在州數年甚有聲稱遷相州刺史政為當時第一上降璽書襃羙之賜以粟帛班示天下百姓為之語曰智無窮清鄉公上下正樊安定徴拜司農卿吏民莫不流涕相與立碑頌徳自為司農凡所種植叔略別有條制皆出人意表朝廷有疑滯公卿所未能決者叔略輒為評理雖無學術有所依據然師心獨見闇與理合甚為上所親委髙熲楊素皆禮遇之叔略雖為司農往往參督九卿事性頗豪侈每食方丈畢備水陸十四年従祀泰山至洛陽上令録囚徒將奏晨至獄門扵馬上暴卒上嗟悼久之贈亳州刺史諡曰襄趙軌河南雒陽人也父肅魏散騎常侍自有𫝊軌少好學有行檢仕周為蔡王記室以清苦聞髙祖受禪為齊州別駕有能名其東鄰有桑椹落其家軌遣人悉拾還其主誡其諸子曰吾非以此求名意者非機杼之物不願侵人汝等宜以為戒在州四年考績連最持節使者郃陽公梁子恭上状髙祖賜以粟帛甚優令入朝父老将送者各揮淚曰別駕在官水火不與百姓交是以不敢以壺酒相送公清若水是以請酌一杯水奉餞軌受而飲之至京詔與牛𢎞撰定律令格式時衛王爽為原州總管召為司馬在道夜行其左右馬逸入田中暴人禾軌駐馬待眀訪知禾主酬直而去原州人吏聞之莫不改操後檢校硤州刺史甚有恩恵轉夀州總管長史芍陂舊有五門堰蕪穢不修軌扵是勸課吏民更開三十六門灌田五千餘頃人賴其利秩滿歸卒扵家子𢎞安𢎞智並知名房恭懿字慎言河南洛陽人也父謨魏贈司空前史有𫝊恭懿沉深有局量達扵従政仕齊厯平恩令濟隂守並有能名齊亡不得調後預尉遲迥亂廢扵家開皇初吏部尚書蘓威舉為新豐令政為三輔之最上聞而嘉之賜物四百叚恭懿以所得賜分給窮乏未㡬復賜粟三百石恭懿又以賑貧人上聞而止之時雍州諸縣令每朔朝謁上見恭懿必呼至榻前訪以治民之術威又薦之厯澤徳二州司馬盧愷復奏恭懿政為天下之最上甚異之復賜以帛因謂諸州朝集使者曰房恭懿志在體國愛養我百姓此乃上天宗廟之所佑助豈朕寡薄能致之乎朕即拜為刺史當令天下模範之卿等宜師斆也乃下詔襃羙因授海州刺史未㡬國子博士何妥奏恭懿尉遲迥之黨蘓威盧愷曲相舉薦上大怒恭懿竟放嶺南未㡬徴還至洪州卒論者冤之公孫㬌茂字元蔚河間阜成人也容貌魁梧少好學博渉經史在魏察孝㢘射䇿甲科稍遷太常博士多所損益時人稱為書庫厯髙唐令大理正俱有能名齊滅周武帝聞而召見與語器之授濟北太守以母憂去職開皇初召拜汝南太守郡廢為曺州司馬遷息州刺史法令清静徳化大行属平陳之役征人在路病者景茂減俸禄為饘粥湯藥多方振濟之賴全活者千數上聞而嘉之詔宣示天下十五年上幸洛陽㬌茂謁見時年七十七上命升殿坐問其年哀其老嗟歎久之景茂再拜曰吕望八十而遇文王臣踰七十而逢陛下上甚恱下詔襃羙之加上儀同伊州刺史眀年以疾徴吏人號泣扵道及疾愈復乞骸骨又不許轉道州刺史悉以秩俸買牛犢雞豬散恵孤弱不自存者好單騎巡人家至戸入閱視百姓産業有修理者扵都會時乃襃揚稱述如有過惡随即訓導而不彰也由是人行義譲有無均通男子相助耕耘婦女相従紡績大村或數百戸皆如一家之務其後請致仕上優詔許之仁夀中上眀公楊紀出使河北見景茂神力不衰還以状奏扵是就拜淄州刺史賜以馬轝便道之官前後厯職皆有徳政論者稱為良牧大業初年八十七卒諡曰康身死之日諸州人吏赴喪者數千人或不及塟皆望墳慟哭野祭而去辛公義隴西狄道人也祖徽魏徐州刺史父季慶青州刺史公義早孤為母氏所養親授書傳周天和中選良家子任太學生武帝時召入露門學令受道義每月集御前令與大儒講論上數嗟異時輩慕之建徳初授宣納中士従平齊累遷掌治上士埽冦将軍髙祖作相授内史上士參掌機要開皇元年除主客侍郎攝内史舍人賜爵安陽縣男轉駕部侍郎使勾檢諸馬牧所獲十餘萬疋上喜曰惟我公義奉國罄心従軍平陳以功除岷州刺史土俗畏病若一人有病即合家避之父子夫妻不相看養孝義道絶由是病者多死公義患之欲變其俗因分遣官人巡檢部内凡有疾病者以牀輿来安置聴事暑月疫時病人或至數百㕔廊悉滿公義親設一榻獨坐其間終日連夕對之理事所得秩俸盡用市藥迎醫療之躬勸其飲食扵是悉差方召其親戚而喻之曰死生由命不關相著前汝棄之所以死耳今我聚病者坐卧其間若言相染那得不死病旣復差汝等勿復信之諸病家子孫慙謝而去後人有遇疾者争就使君其家親属固留養之始相慈愛此風遂革合境之内呼為慈母後遷并州刺史下車先至獄中因露坐牢側親自驗問十餘日間決斷咸盡方還大聴受領新訟皆不立文案遣當直佐僚一人側坐訊問事若不盡應湏禁者公義即宿聴事終不還閤人或諌之曰此事有程使君何自苦也答曰刺史無徳何以導人尚令百姓繋扵囹圄豈有禁人在獄而心自安乎罪人聞之咸自歎服後有欲諍訟者鄉閭父老遽相曉曰此盖小事何忍勞苦使君訟者多兩讓而止時山東霖雨自陳汝至扵滄海皆苦水災境内犬牙獨無所損山出黄銀獲之以獻詔水部郎婁崱就公義禱焉乃聞空中有金石絲竹之響仁夀元年追充揚州道黜陟大使豫章王暕恐其部内官寮犯法未入郡境豫令使属之公義答曰不敢有私及至揚州皆無所縦捨暕䘖之及煬帝即位揚州長史王𢎞入為黄門郎因言公義之短竟去官吏人守闕訴寃相繼不絶後數嵗帝悟除内史侍郎丁母憂未㡬起為司𨽻大夫檢校右禦衛虎賁郎将従征至栁城郡卒子融栁儉字道約河間解人也祖元璋魏司州大中正相華二州刺史父裕周聞喜令儉有局量立行清苦為州里所敬雖至親昵無敢狎侮仕周厯宣納上士畿伯大夫及髙祖受禪擢拜水部侍郎封率道縣伯未㡬出為廣漢太守甚有能名俄而郡廢時帝勵精思治妙簡良能出為牧宰儉以仁眀着稱擢拜蓬州刺史獄訟者庭決遣之佐吏従容而已獄無繋囚蜀王秀時鎮益州列上其事遷卭州刺史在職十餘年人夷恱服蜀王秀之得罪也儉坐與交通免職及還鄉妻子衣食不贍見者咸歎伏焉煬帝嗣位徴之扵時多以功臣任職牧守領郡者並帶戎資惟儉起自良吏帝嘉其績特授朝散大夫𢎞化太守儉清節愈勵大業五年入朝郡國畢集帝謂納言蘓威吏部尚書牛𢎞曰其中清名天下第一者為誰威䓁以儉對帝又問其次威以涿郡賛務郭絢潁川賛務敬肅䓁二人對帝賜儉帛二百疋絢肅各一百疋令天下朝集使送至郡邸以旌異焉論者羙之及大業末盜賊蜂起數被攻逼儉撫結人夷卒無離叛竟以保全及唐兵至長安尊立恭帝儉與留守李粲縞素扵州南向慟哭旣而歸京師相國李淵賜儉物三百段就拜上大将軍嵗餘卒扵家時年八十九郭絢河東安邑人家世寒微初為尚書令史後以軍功拜儀同厯數州司馬長史皆有能名大業初刑部尚書宇文㢸巡省河北引絢為副煬帝将有事遼東以涿郡為衝要訪可任者聞絢有幹局拜涿郡賛務吏人恱服數載遷為通守兼領留守及山東盜起絢逐捕之多所克獲時諸郡無復完者惟涿郡獨全後将兵撃竇建徳扵河間戰死人吏哭之數月不息敬肅字儉徳河東蒲坂人少以貞介知名釋褐州主簿開皇初為安陵令有能名擢拜泰州司馬轉幽州長史仁夀中為衛州司馬俱有異績煬帝嗣位遷潁川賛務大業五年朝東都帝令司𨽻大夫薛道衡為天下郡官之状稱肅曰心如鐵石老而彌篤時左翊衛大将軍宇文述當塗用事其邑在潁川每有書属肅肅未嘗開封輒令使者持去述賔客有放縦者以法繩之無所寛貸由是述䘖之八年朝扵涿郡帝以其年老有能名将擢為太守者數矣輒為述所毁不行大業末乞骸骨優詔許之去官之日家無餘財嵗餘終扵家劉曠不知何許人也性謹厚每以誠恕應物開皇初為平鄉令單騎之官人有諍訟者輒丁寧曉以義理不加繩劾各自引咎而去所得俸禄賑施窮乏百姓感其徳化更相篤勵曰有君如此何得為非在職七年風教大洽獄中無繋囚諍訟絶息囹圄皆生草庭可張羅及去官吏民無少長號泣縁路将送數百里不絶遷為臨潁令清名善政為天下第一尚書左僕射髙熲言状上召之及引見勞之曰天下縣令固多矣卿能獨異扵衆良足羙也顧謂侍臣曰若不殊奨何以勸人扵是下優詔擢拜莒州刺史王伽河間章武人也開皇末為齊州參軍初無足稱後被州使送流囚季參等七十餘人詣京師時制流人並枷鎖縳送次滎陽伽憫其辛苦悉呼而謂之曰卿輩既犯國刑虧損名教身嬰縲紲此其職也今復重勞援卒豈獨不愧扵心哉參等辭謝伽曰汝等雖犯憲法枷鎖亦大苦辛吾欲與汝䓁脫去行至京師總集能不違期不皆拜謝曰必不敢違伽扵是悉脫枷停援卒與期曰某日當至京師如致前却吾當為汝受死舍之而去流人感恱依期而至一無離叛上聞而驚異召見與語稱善久之扵是悉召流人并令携負妻子俱入賜宴扵殿庭而赦之乃下詔曰凡在有生含靈禀性咸知好惡並識是非若臨以至誠眀加勸導則俗必従化人皆勸善往以海内亂離徳教癈絶官人無慈愛之風兆庶懐姦詐之意所以獄訟不息澆薄難理朕受命上天安養萬姓思導聖法以徳化人朝夕孜孜意夲如此而伽深識朕意誠心宣導參䓁感悟自赴憲司眀率土之人非為難教良是官人不加曉示致令陷罪無由自新若使官盡王伽之儔人皆季參之輩刑厝不用其何逺㢤扵是擢伽為雍令政有能名魏徳深夲鉅鹿人也祖沖仕周為刑部大夫建州刺史因家𢎞農父毗鬰林令徳深初為髙祖挽郎後厯馮翊郡書佐武陽郡司戸書佐以能遷貴鄉長為政清静不嚴而肅會興遼東之役徴稅百端使人往来責成郡縣扵時王綱弛紊吏多贓賄所在徴斂人不堪命惟徳深一縣有無相通不竭其力所求皆給而百姓不擾又盜賊羣起武陽諸城多被淪陷惟貴鄉獨全郡丞元寳蔵受詔逐捕盜賊每戰不利則器械必盡輒徴彂扵人動以軍法従事如此者數矣其隣城營造皆聚扵聴事吏人逓相督責晝夜諠囂猶不能濟徳深各問其所欲任随便修營官府寂然恒若無事惟約束長吏所修不湏過勝餘縣使百姓勞苦然在下各自竭心恒為諸縣之冣尋轉館陶長貴鄉吏民聞之相與言及其事皆歔欷流涕語不成聲及将赴任傾城送之號泣之聲道路不絶旣至館陶闔境老㓜皆如見其父母有猾人員外郎趙君實與郡丞元寳蔵深相交結前後令長未有不受其指麾者自徳深至縣君實屏處扵室未嘗輒敢出門逃竄之徒歸来如市貴鄉父老冒渉艱險詣闕請留徳深有詔許之館陶父老復詣郡相訟以貴鄉文書為詐郡不能決㑹持節使者韋霽杜整䓁至兩縣詣使訟之乃斷従貴鄉貴鄉吏民歌呼滿道互相稱慶館陶衆庶合境悲泣囙従而居住者數百家寳蔵深害其能㑹越王侗徴兵扵郡寳蔵遂令徳深率兵千人赴東都俄而寳蔵以武陽歸李宻徳深所領皆武陽人也以夲土従賊念其親戚輒出都門東向慟哭而反人或謂之曰李密兵馬近在金墉去此二十餘里汝必欲歸誰能相禁何為自苦如此其人皆垂泣曰我與魏眀府同来不忍棄去豈道路艱難乎其得人心如此後與賊戰沒扵陣貴鄉館陶人庶至今懐之通志卷一百七十
