body:
  text: 通志卷一百四十六宋右廸功郎鄭樵漁仲撰列傳第五十九後魏衞操莫含孫題雲劉庫仁弟頭眷羅庫仁子顯元頭眷子辰羅辰孫仁之乞仁之伯父乞歸歸子嵩尉古眞弟諾侯諾子眷弟眷子多多侯子慶賓眞眷弟地千古族元孫聿穆崇崇元孫泰孫崇子觀弟觀子壽壽羆羆亮孫亮子紹子崇曽弼崇顗奚斤叔孫建子俊安同子屈原屈弟弟原頡庾業延王建羅結子斤婁伏連子大拔寶大拔孫閭大肥奚牧和跋莫題賀狄干李栗奚眷燕鳯許謙崔宏宏子浩崔寛宏弟徽寛子衡衡子敞敞弟鐘張袞孫白澤倫白澤子鄧淵子頴長孫嵩從子道生道生孫觀業觀子承業承子子彥長孫肥子翰于栗磾子洛拔拔子烈洛烈子忠勁忠弟景暉烈弟勁子崔逞子頤愍逞元孫休模休從子逞宗人王憲子嶷雲嶷子封懿子元之族孫磨奴軌磨奴繼子囘囘叔軌子偉伯衞操字德元代人也少通俠有才略晉征北將軍衞瓘以操爲牙門將當神元時頗自結附及神元崩後與從子雄及其宗室鄉親姬澹等數十人同來歸國說桓穆二帝招納晉人於是晉人附者稍衆桓帝嘉之以爲輔國任以國事及劉石之亂勸桓帝匡助晉氏司馬騰聞而喜之表加將號稍遷至右將軍封定襄侯桓帝崩後操立碑於大䢴城南以頌功德云魏軒轅之苖裔言桓穆二帝統國御衆威禁大行國無姦盗路有頌聲威武所向下無交兵招喻六狄咸來歸誠奉承晉皇扞禦邊疆王室多難天網弛綱豪心遠濟靡離其殃歲剪逆命姦盗豺狼永安元年歲次甲子姦黨猶逆東西狼跱敢逼天王兵甲屢起怙衆肆暴虐用將士鄴洛構隙棄親求疎乃招異類屠各匃奴交刃千里長蛇塞塗晉道應天言展良謨使持節平北將軍并州刺史䕶匃奴中郎將東嬴公司馬騰才神絶世規略超遠欲求外救朝臣莫應簡賢選士命兹良使遣參軍壺倫牙門中行嘉義陽亭侯衞謨協義亭侯衞鞬等馳奉檄書至晉陽城又稱桓穆二帝心存宸極輔相二衞對揚毗翼操展文謀雄奮武烈承命會議諮論奮發翼衞内外鎭靜四方志在竭力奉戴天王忠恕用命外勲亦攘功濟方州勲烈光延升平之日效貢充藩馮瞻鑾蓋歩趾三川有德無祿大命不延年三十九以永興三年六月二十四日寢疾薨殂背棄華殿雲中名都國失惠主哀感歔欷悲痛煩寃載呼載號遠近親軌奔赴梓廬仰訴造化痛延悲夫時晉光熙元年也皇興初雍州别駕鴈門叚榮於大邗掘得此碑文雖非麗事宜載焉故略附於傳操以穆帝三年卒始操所與宗室鄉親入國者衞懃安樂亭侯衞崇衞清並都亭侯衞􅀈叚繁並信義將軍都鄉侯王發建武將軍都亭侯范班折衝將軍廣武亭侯賈慶建武將軍上洛亭侯賈循都亭侯李壹關中侯郭乳關内侯皆爲桓帝所表授也六脩之難存者多隨劉琨任子遵南奔衞雄姬澹莫含等名皆見碑雄字世遠澹字世雅並勇健多計桓帝並以爲將常隨征伐雄稍遷至左將軍雲中侯澹亦以勇績著名桓帝末至信義將軍樓煩侯穆帝初並見委任衞操卒後俱爲左右輔相六脩之逆國内大亂雄澹並爲羣情所附乃與劉遵率烏丸晉人數萬而叛劉琨聞之大悅如平城撫納之欲因以滅石勒後爲勒將所害莫含鴈門繁畤人也家世貨殖貲累鉅萬劉琨爲并州辟爲從事含居近塞常徃來國中穆帝愛其才器及爲代王備置官屬求含於琨琨遣含入國含心不願琨喻之乃入代參國官甚爲穆帝所重常參軍國大議卒於左將軍關中侯其故宅在桑乾川南世稱莫含壁含音訛或謂之莫囘城云子顯昭成世爲左常侍顯子題道武初爲大將以功賜爵東宛侯常與李栗侍宴栗坐不敬獲罪題亦被黜爲濟陽太守後道武欲廣宮室規度平城四方數十里將模鄴洛長安之都運材數百萬根以題機巧徵令監之召入與論興造之制題久侍頗怠賜死題弟雲好學善射道武時嘗典選曹賜爵安德侯遷執金吾參軍國謀議太武尅赫連昌詔雲與常山王素留鎭統萬進爵安定公雲撫慰新舊皆得其所卒諡敬公劉庫仁字没根獨孤部人劉虎之宗也少豪俠有智略母平文皇帝之女昭成皇帝復以宗女妻之爲南部大人始建國三十九年皇子寔君弑逆昭成暴崩道武時年六歲秦苻堅伐亂遂取其國乃以庫仁爲陵江將軍關内侯令與衞辰分國部衆而統之自河以西屬衞辰自河以東屬庫仁於是獻眀皇后攜道武及衞秦二王自賀蘭部來依庫仁庫仁盡忠奉事不以廢興易節庫仁又竭誠事堅故堅以爲廣武將軍給幢麾鼓蓋儀比諸侯衞辰恥在庫仁之下殺堅五原太守而叛庫仁破之追至陰山西北千餘里獲其妻子盡收其衆及畜產徙其部落置之桑乾川苻堅賜庫仁妻公孫氏厚其資送加庫仁振威將軍後慕容垂圍苻丕於鄴又遣將平規攻堅幽州刺史王永于薊庫仁遣妻兄公孫希率騎三千人助永擊規大破之坑規降卒五千餘人乘勝長驅進據唐城與垂子麟相持庫仁聞希破規復將大舉以救丕發鴈門上谷代郡兵次於繁畤先是慕容文等當徙長安遁依庫仁部常思東歸是役也文等夜率三郡人攻庫仁庫仁匿於馬廐文執而殺之乘其駿馬奔慕容垂公孫希聞亂走丁零庫仁弟頭眷繼攝事頭眷第二子羅辰有智謀謂眷曰此來行兵所向無敵心腹之疾願早圖之眷曰誰也對曰從兄顯忍人也爲亂非旦則夕耳眷不以爲意顯果殺眷代立顯庫仁子也顯既殺眷又謀逆及道武即位討顯于馬邑追至彌澤大破之後奔慕容驎驎徙之中山羅辰即宣穆皇后兄也顯既殺眷羅辰遂奔道武顯恃彊每欲謀逆羅辰輙先聞奏拜南部大人從平中原以軍功賜爵永安公除征東將軍定州刺史卒諡曰敬子殊暉襲爵位并州刺史卒子求引位武衞將軍卒諡曰貞子尒頭位魏昌癭陶二縣令贈鉅鹿太守子仁之字山靜少有操尚粗渉書史歴位衞將軍西兗州刺史在州有當時之譽武定二年卒贈衞大將軍吏部尚書青州刺史諡曰敬仁之外示長者内多矯詐其對賔客破牀弊席麤飯冷菜衣服故惡乃過逼下善候當塗能爲詭激每於稠人廣衆中或撾一姦吏或縱一孤貧大言自眩淺識者皆稱其美公能之譽動過其實性又酷虐齊神武在晉陽曾營城雉仁之統監作役以小稽緩遂杖前殷州刺史裴瑗并州刺史王綽神武大加譴責性好文字吏書失體便加鞭撻言韻微訛亦見捶楚吏人以此苦之而愛好文史敬重人流與齊帥馮元興交欵元興死後積年仁之營視其家常出隆厚時人以此尚之仁之伯父乞歸太平眞君中除中散大夫性寛和與物無競未嘗言人善惡曾遇患書寢有奴偷竊乞歸詐睡不見亦不泄之此奴走入蠕蠕方笑言之亦無嗔色獻文末除主客尚書孝文初位東雍州刺史賜爵永安侯卒子嵩字阿龍好周人之急與王仲興自平城被追赴洛仲興家貧不能自達嵩事事資遣宣武時仲興寵幸乃奏除給事請疏黄河以通船漕授龍門都將歴年功不就坐流元曄僭立授大鴻臚卿子桃湯位奉朝請尉古眞代人也道武之在賀蘭部賀染干遣侯引乙突等詣行宮將肆逆古眞知之密以馳告侯引等不敢發染干疑古眞泄其謀乃執拷之以兩車軸柙其頭傷其一目不伏乃免之登國初從征庫莫奚及叱突隣並有功又從平中原賜爵束州侯眀元初爲鴻飛將軍鎭大洛卒於定州刺史子億萬襲古眞弟諾少侍道武以忠謹著稱從道武圍中山諾先登傷一目道武歎曰諾兄弟並毁其目以建功效誠可嘉也寵待遂隆賜安樂子從平姚平還拜國部大人太武時改封遼西公卒第八子歡襲諾長子眷忠謹有父風眀元時執事左右爲太官令時侍臣受斤亡入蠕蠕詔眷追之遂至虜庭禽之大檀前由是以驍烈聞太武即位命眷與散騎侍郎劉庫仁等八人分典四部綰奏機要加陳兵將軍文成時拜侍中大尉封漁陽王與太宰常英等録尚書事文成北巡狩以寒雪方降議還眷曰今去都不遠而旋虜必疑我有内難雖方寒雪宜更進前遂度漠而還帝以眷元老賜杖履上殿薨諡曰莊子多侯襲多侯有武幹獻文時假節領䕶羌戎校尉敦煌侯將至鎭求率輕騎五千入于闐兼平諸國因敵取資以平定爲效弗許孝文初又求北取伊吾斷蠕蠕通西域路帝善其計以東作方興難之爲妻元所害多侯弟子慶賔善騎射有將畧稍遷太中大夫眀帝時朝議送蠕蠕主阿那瓌還國慶賔上表固爭不從後蠕蠕遂執行臺元孚慶賔後拜肆州刺史時爾朱榮兵威漸盛曾經肆州慶賔惡之據城不納榮襲之拘還秀容呼爲假父後以憂還都尋起爲光祿大夫督鎭汝陰還朝卒贈司空子瑾列在齊史眷弟地干機悟有才藝馳馬立射五的時人莫能及太武時位庫部尚書加散騎常侍領侍輦郎奉上忠謹尤善嘲笑太武見其效人舉措忻悅不能自勝甚見親愛參軍國大謀時征平原試衝車以攻冢地干爲索所羂折脅而卒帝親徃哭慟贈中領軍燕郡公諡曰惠子長壽位右曹殿中尚書賜爵㑹稽公卒於涇州刺史古眞族元孫聿字成興性耿介眀帝時爲武衞將軍時領軍元义執權百寮莫不加敬聿獨長揖不拜尋出爲涼州刺史涼州緋色天下之最义送白綾二千匹令聿染聿拒不受义諷御史劾之驛徵至京覆無狀還任卒穆崇代人也其先効節於神元桓穆之時崇機㨗便辟少以盜竊爲事道武之居獨孤部崇常徃來奉給時人無及者劉顯之謀逆也平文皇帝外孫梁眷知之宻遣崇告道武眷謂崇曰顯若知之雖刀劒刳割勿泄也因以寵妻及所乘良馬付崇曰事覺吾當以此自眀崇來告難道武馳如賀蘭部顯果疑眷泄其謀將囚之崇乃唱言曰梁眷不顧恩義將顯爲逆今我掠得其妻馬足以雪忿顯聞而信之窟咄之難崇外甥子植等與崇謀執道武以應之崇夜告道武道武誅植等北踰陰山復幸賀蘭部崇甚見寵待道武爲魏王拜崇征虜將軍後平中原賜爵歴陽公散騎常侍後遷太尉除豫州刺史又徙宜都公天賜三年薨先是衞王儀謀逆崇豫焉道武惜其功而祕之及有司奏諡道武親覽諡法至述義不克曰丁道武曰此當矣乃諡丁公初道武避窟咄難遣崇還察人心崇留馬與從者微服入其營會有火光爲舂妾所識賊皆驚起崇求從者不得因匿坑中徐乃竊馬奔走宿於大澤有白狼向崇號崇覺悟馳隨狼奔遂免難道武異之命崇立祀子孫世奉焉太和中追進錄功臣以崇配饗崇長子逐留以功賜爵零陵侯後以罪廢子乙以功賜爵富城公卒於侍中諡曰靜子眞尚長城公主拜駙馬都尉後勅離婚納文眀太后姊位南部尚書侍中卒諡曰宣孝文追思崇勲令著作郎韓顯宗與眞撰定碑文建於白登山眞子泰本名石洛孝文賜名焉以功臣子孫尚章武長公主拜駙馬都尉典羽獵四曹事後爲尚書右僕射馮翊侯出爲定州刺史初文眀后幽孝文於别室將謀黜廢泰切諌乃止孝文德之故寵待隆至自陳久病乞爲恒州許之泰不願遷都潛圖叛乃與定州刺史陸叡及安樂侯元隆等謀推朔州刺史陽平王賾爲主賾密表其事帝乃遣任城王澄發并肆兵討之澄先遣書侍御史李煥單騎入代出其不意泰等驚駭計無所出煥曉諭逆徒示以禍福於是凶黨離心莫爲之用泰自度必敗乃率麾下攻煥郭門不克走出爲人所禽送孝文幸代泰等伏誅子士儒字叔賢徙涼州後得還爲太尉參軍事子子容少好學無所不覽求天下書逄即寫錄所得萬餘卷魏末爲兼通直散騎常侍聘梁齊受禪卒於司農卿逐留弟觀字闥拔襲崇爵少以文藝知名眀元中位爲左衞將軍綰門下中書出納詔命及訪舊事未嘗有遺漏尚宜陽公主拜駙馬都尉位太尉太武監國觀爲右弼出則統攝朝政入則應對左右事無巨細皆關決焉終日怡怡無愠色勞謙善誘不以富貴驕人泰恒八年暴疾薨年三十五眀元親臨其喪悲動左右賜以通身隱起金飾棺喪禮一依安成王叔孫俊故事贈宜都王諡曰文成太武即位每與羣臣談宴未嘗不歎息殷勤以爲自道武以來佐命勲臣文武兼資無及之者子壽襲爵尚樂陵公主拜駙馬都尉眀敏有父風太武愛重之擢爲下大夫敷奏機辯有聲内外遷侍中中書監領南部尚書進爵宣都王加征東大將軍壽辭曰臣祖崇先皇之世屬逢艱危幸天贊梁眷誠心先告故得効功前朝流福於後昔陳平受賞歸功無知今眷元勲未錄臣獨奕世受榮豈惟仰媿古賢抑亦有虧國典太武嘉之乃求眷孫賜爵郡公輿駕征涼州命壽輔景穆總錄機要内外聽焉次雲中將濟河帝别御靜室召壽及司徒崔浩尚書李順謂壽曰蠕蠕吳提與牧犍連和今聞朕征涼州必來犯塞若伏兵漢南殄之爲易牧田訖可分伏要害以待虜至引使深入然後擊之若違朕指授爲虜侵害朕還斬卿崔浩李順爲證非虚言也壽信卜筮言謂賊不來竟不設備吳提果至京邑大駭壽不知所爲欲築西郭門請景穆避保南山惠保太后不聽乃止遣司空長孫道生等擊之太武還以無大損傷故不追咎景穆監國壽與崔浩等輔政人皆敬浩壽獨陵之又自恃位任以人莫已及謂其子師曰但令吾兒及我亦足勝人不須苦敎之遇諸父兄有如僕𨽻夫妻並坐共食而令諸父餕餘爲時人鄙笑薨贈太尉諡曰文宣子平國襲爵尚城陽長公主拜駙馬都尉侍中中書監爲太子四輔卒子伏干襲尚濟北公主拜駙馬都尉卒諡曰康無子伏干弟羆襲爵尚新平長公主拜駙馬都尉虎牢鎭將頻以不法致罪孝文以其勲徳之舊讓而赦之轉吐京鎭將深自尅勵後改吐京鎭爲汾州仍以羆爲刺史前吐京太守劉升在郡甚有威惠限滿還都胡人八百餘人詣羆請之前定陽令吳平仁亦有恩信户増數倍羆以吏民懐之並爲表請孝文皆從焉羆既頻薦升等所部守令咸自砥礪威化大行州人李軌郭及祖七百餘人詣闕稱羆恩德孝文以羆政和人悅増秩延限後徵爲光祿勲隨例降王爲魏郡公累遷侍中中書監穆泰之反羆與潛通赦後事發削封爲編户卒于家宣武時追贈鎭北將軍恒州刺史羆弟亮字㓜輔早有風度獻文時起家侍御中散尚中山長公主拜駙馬都尉封趙郡王加侍中徙封長樂王孝文時除征南大將軍領䕶西戎校尉仇池鎭將宕昌王梁彌機死子彌博立爲吐谷渾所逼來奔仇池亮以彌博兇悖氐羌所棄彌機兄子彌承戎人歸樂表請納之孝文從焉於是擊走吐谷渾立彌承而還氐豪楊卜自延興以來從軍二十一戰前來鎭將抑而不聞亮表卜爲廣業太守豪右咸悅境内大安徵爲侍中尚書左僕射于時復置司州孝文曰司州始立未有寮吏須立中正以定選舉然中正之任必須德望兼資世祖時崔浩爲冀州中正長孫嵩爲司州中正可謂得人公卿等宜審推舉尚書陸叡舉亮爲司州大中正後拜司空參議律令例降爵爲公時文眀太后崩已過朞月孝文毁瘠猶甚亮表請上承金冊遺訓下稱億兆之心時襲輕服數御常膳修崇郊祠垂惠咸秩詔曰茍孝悌之至無所不通今飄風亢旱時雨不降實由誠慕未濃幽顯無感也尋領太子太傅時將建太極殿帝引見羣臣於太華殿曰將營殿宇今後徙居永樂以避囂埃土木雖復無心毁之能不悽愴今故臨對卿等與之取别此殿乃髙宗所制爰歴顯祖逮朕沖年受位於此但事來奪情將有改制仰唯疇昔唯深悲感亮稽首請稽之卜筮又以去歲役作爲功甚多太廟眀堂一年便就若仍歲頻興恐民力凋弊且材幹新伐願待餘年帝曰朕遠覽前王無不興造故有周創業經營靈臺洪漢受命未央是作草創之初猶尚如此况朕承累聖之運屬太平之基欲及此時以就大功人生定分修短命也蓍蔡雖智其如命何當委之分豈假卜筮移御永樂宮後帝臨朝嘗謂亮曰三代之禮日出視朝自漢魏以降禮儀漸殺晉令有朔望集公卿於朝堂而論政事亦無天子親臨之文今因卿等日中之集中前卿等自論政事中後與卿等共議可否遂命讀奏案帝親決之及遷都加武衞大將軍以本官董攝中軍事帝南伐以亮錄尚書事留鎭洛陽後帝自小平津汎舟幸石濟亮諌曰昔漢帝欲乘舟渡渭廣德欲以首血汚車輪帝乃感而就橋渭之小水猶尚若斯况洪河有不測之慮帝曰司空言是也及羆豫穆泰反事覺亮上表自劾帝優詔還令攝事亮固請久乃許之後徙封頓邱縣公以紹崇爵宣武即位拜尚書令司空公薨宣武親臨小斂贈太尉諡曰匡子紹字永業尚琅邪長公主拜駙馬都尉歴位祕書監侍中衞將軍太常卿中書令七兵殿中二尚書遭所生憂免官居喪以孝聞又歴衞大將軍中書監侍中領本邑中正紹無他才能而資性方重罕接賔客稀造人門領軍元乂當權熏灼曾徃紹宅紹迎送下階而已時人歎尚之及靈太后欲黜乂猶豫未決紹讚成之以功加特進侍中元順與紹同直常因醉入紹寢所紹擁被而起正色讓順曰老身二十年侍中與卿先君亟連職事縱卿後進何宜相排突也遂謝事還家詔諭乃起除侍中託疾未起故免河陰之害莊帝立爾朱榮徵之紹以爲必死哭辭家廟及見榮捧手不拜榮亦矯意禮之顧謂人曰穆紹不虚作大家兒車駕入宮尋授尚書令司空進爵爲王給班劒四十人仍加侍中時河南尹李奨徃詣紹奬以紹郡人謂必致敬紹又恃封邑是奬國王匡坐待之不爲動膝奬憚其位望致拜而還議者兩譏焉未幾降王復本爵普泰元年除驃騎大將軍開府青州刺史加都督未行而薨贈大將軍尚書令太保諡曰文獻子長嵩字子岳襲爵位光祿少卿平國弟正國尚長樂公主拜駙馬都尉正國子平城早卒孝文時始平公主薨於宮追贈平城駙馬都尉與公主冥婚壽弟多侯封長寧子位司衞監文成崩乙渾專權召司徒陸麗麗時在温湯療疾多侯謂曰渾有無君心大王衆所望也去必危宜除歸而圖之麗不從遂爲渾所害多侯亦見殺觀弟翰平原鎭將西海王薨子龍兒襲降爵爲公卒子弼有風格善自位置渉獵經史與長孫承業陸希道等齊名然矜已陵物頗以此損焉孝文定氏族欲以弼爲國子助敎弼辭以爲屈帝曰朕欲敦勵胄子屈卿先之白玉沈泥豈能相汚弼曰既遇眀時恥沈泥滓會司州牧咸陽王禧入帝曰朕與卿作州督舉一主簿即命弼謁之因爲帝所知宣武初爲廣平王懐國郎中令數有匡諌之益除中書舍人卒於華州刺史諡曰懿翰弟顗有才力以侍御郎從太武征赫連昌勇冠一時賜爵泥陽子拜司衞監從太武田崞山有虎突出顗搏而獲之帝歎曰詩云有力如虎顗乃過之後從征白龍討蠕蠕以功進爵建安公後拜殿中尚書出鎭涼州還加散騎常侍領太倉尚書文成時爲征西大將軍督諸軍西討吐谷渾坐擊賊不進免官爵徙邊文成以顗著勲前朝徵爲内都大官卒贈征西大將軍建安王諡曰康子寄生襲崇宗人醜善道武初率部歸附與崇同心勠力捍禦左右拜天部大人居東蕃子莫提從平中原位相州刺史假陵陽侯其子孫位亦通顯奚斤代人也世典馬牧父簞有寵於昭成皇帝時國有良馬曰騧騮一夜忽逸後知南部大人劉庫仁所盗養於窟室簞聞而馳徃取馬庫仁以國甥恃寵慙而逆擊簞簞捽其髪落傷其一乳及苻堅使庫仁與衞辰分領國部簞懼遂奔衞辰及道武滅衞辰簞晚乃得歸故名位後於近臣斤機辯有識度登國初與長孫肥等俱統禁兵後以爲侍郎親近左右從征慕容寶於參合皇始初拜越騎校尉典宿衞禁旅車駕還京師博陵渤海章武諸郡羣盗並起斤與略陽公元遵等討平之從征破高車諸部又破庫狄宥連部徙其别部諸落於塞南又進擊侯莫陳部至大峨谷置戍而還遷都水使者出爲晉兵將軍幽州刺史賜爵山陽侯眀元即位爲鄭兵將軍詔以斤世忠孝贈其父簞長寧子眀元幸雲中斤留守京師昌黎王慕容伯兒謀反斤召入天安殿東廡下誅之詔與南平公長孫嵩等俱坐朝堂錄決囚徒眀元大閱于東郊講武以斤行左丞相事蒐於石會山車駕西廵詔斤先驅討越勒部於鹿那山大破之又詔斤與長孫嵩等八人坐止車門左聽理萬機拜天部大人進爵爲公命斤出入乘軺軒備威儀導從太武之爲皇太子臨朝聽政以斤爲左輔宋廢主義符立其國内離阻乃遣斤收河南地仍假斤節都督前鋒諸軍事司空晉兵大將軍行揚州刺史率吳兵將軍公孫表等南征用表計攻滑臺不拔求濟師帝怒其不先略地切責之乃親南廵次中山斤自滑臺趨洛陽長驅至虎牢遂平兖豫諸郡還圍虎牢及虎牢平斤置守宰以撫之自魏初大將行兵唯長孫嵩拒宋武斤征河南獨給漏刻及十二牙旗太武即位進爵宜城王仍爲司空太武征赫連昌遣斤率義兵將軍封禮等襲蒲坂斤又西據長安秦雍氐羌皆來歸附與赫連定相持累戰破定定聞昌敗走上邽斤追至雍不及而還詔斤班師斤請因其危平之乃進討安定昌退保平涼斤屯軍安定以糧竭馬死深壘自固監軍侍御史安頡擊昌禽之昌衆復立昌弟定爲主守平涼斤恥以元帥而禽昌之功更不在已乃舍輜重追定於平涼定衆將出會一小校有罪亡入賊具告其實定知斤軍無糧乏水乃邀斤前後斤衆大潰斤及將娥清劉拔爲定所禽後太武尅平涼斤等得歸免爲宰人使負酒食從駕還京師以辱之尋拜安東將軍降爵爲公太延初爲衞尉改爲𢎞農王後爲萬騎大將軍太武議伐涼州斤等三十餘人議以爲不可帝不從涼州平以戰功賜僮𨽻七十户又以斤元老賜安車平決獄訟諮訪朝政斤聰辯彊識善於談論遠說先朝故事雖未皆是時有所得聽者歎美之每議大政多見從用朝廷稱焉太平眞君九年薨時年八十九太武親臨哀慟諡曰昭王斤有數十婦子男二十餘人長子他觀襲爵太武曰斤自西土之敗國有常刑以其佐命先朝故復其爵秩將收孟眀之効今斤終其天年君臣之分全矣於是降他觀爵爲公傳國至孫緒無子國除太和初孝文追錄先朝功臣以斤配饗廟庭宣武繼世以緒弟子監紹其後叔孫建代人也父骨爲昭成母王太后所養與皇子同列建少以智勇著稱道武之幸賀蘭部常從左右登國初爲外朝大人與安同等十三人迭典庶事參軍國之謀隨秦王觚使慕容垂歴六載乃還累遷中領軍賜爵安平公出爲并州刺史後以公事免守鄴城園眀元即位念前功以爲正直將軍相州刺史飢胡劉虎等聚黨叛眀元假建節前號安平公督公孫表等以討虎斬首萬餘級餘衆奔走投汾水死水爲不流晉將劉裕伐姚泓令其部將王仲德爲前鋒將逼滑臺兖州刺史尉建率所部棄城濟河仲德遂入滑臺乃宣言曰晉本意欲以布帛七萬疋假道於魏不謂魏之守將便爾棄城眀元聞之詔建度河曜威斬尉建投其屍於河呼仲德軍人與語詰其侵境之狀尋遷廣阿鎭將威名甚著久之除使持節都督前鋒諸軍事楚兵將軍徐州刺史率衆自平原濟河徇下青兖諸郡遂東入青州圍宋刺史竺䕫於東陽城宋遣將檀道濟王仲德救䕫建不尅而還以功賜爵壽光公與汝陰公長孫道生濟河而南仲德等自清入濟東走青州太武以建威名南震爲宋所憚除平原鎭大將封丹陽王加征南大將軍先是簡幽易以南戍兵集于河上一道攻洛陽一道攻滑臺宋將檀道濟王仲德救滑臺建與汝陰公道生拒擊之建分軍挾戰縱輕騎邀其前後焚燒穀草以絶糧道道濟兵飢叛者相繼由是安頡等得攻滑臺建沈敏多智東西征伐常爲謀主容貌清整號曰嚴眀又雅尚人倫禮賢愛士在平原十餘年綏懐内外甚得邊稱魏初名將鮮有及之南方憚其威略青兖輟不爲寇太延三年薨時年七十三諡曰襄賜葬金陵長子俊字醜歸少聰敏年十五内侍左右性謹密初無過行以便弓馬轉爲獵郎道武崩清河王紹閉宮門眀元在外紹拘逼俊以爲已援外雖從紹内實忠款仍與元磨渾等說紹歸眀元時眀元左右唯車路頭王洛兒等及得俊等大悅以爲爪牙及即位稍遷衞將軍賜爵安成公及朱提王悅懐刃入禁欲行大逆俊覺悅舉動有異乃於悅懐中得兩刃匕首遂執悅殺之眀元以俊前後功重軍國大計一以委之羣官上事先由俊銓校然後奏聞性平正柔和未嘗有喜怒色忠篤愛厚不諂上抑下每奉詔宣外必告示慇懃是以上下嘉歎泰恒元年卒時年二十八眀元親臨哀慟朝野無不追惜贈司空安成王諡孝元賜温眀祕器載以輼輬車衞士導從陪葬金陵子蒱襲爵後有大功及寵幸貴臣薨賵賻送終禮皆依俊故事無得踰之者初俊卒眀元命其妻桓氏曰夫生既共榮没宜同穴能殉葬者可任意桓氏乃縊遂合葬焉俊既爲安成王俊弟隣襲父爵降爲丹陽公位尚書令涼州鎭大將與鎭副將奚牧並以貴戚子弟競貪財貨遂相糾坐誅安同遼東胡人也其先祖曰世髙漢時以安息王侍子入洛歴魏至晉避亂遼東遂家焉父屈仕慕容暐暐爲苻堅所滅屈友人公孫眷妹没入苻氏宮出賜劉庫仁爲妻庫仁貴寵之同隨眷商販見道武有濟世才遂留奉侍性端嚴眀惠好長者之言登國初道武徵兵於慕容垂同頻使稱旨爲外朝大人與和跋等出入禁中迭典庶事從征姚平於柴壁姚興悉衆救平同進計曰汾東有䝉阬東西三百餘里徑路不通姚興來必從汾西乘高臨下直至柴壁如此則寇内外勢接宜截汾爲南北浮橋乘西岸築圍西圍既固賊至無所施其智力矣從之興果視平屠滅而不能救以謀功賜爵北新侯眀元即位命同與南平公長孫嵩並理民訟又詔同與肥如侯賀䕶持節循察并定二州及諸山居雜胡丁零宣詔撫慰問其疾苦糾舉守宰不法郡國肅然同東出井陘至鉅鹿發衆修大嶺山通天門關又築城於宋子以鎭静郡縣䕶嫉同得衆心使人告同築城聚衆圖大事上知其誣不問太武監國臨朝聽政以同爲左輔及即位進爵高陽公冀青二州刺史同長子屈眀元時典太倉事盗官粳米數石欲以養親同大怒求戮屈自劾不能訓子帝嘉而恕之遂詔長給米同在官眀察長於校閱家法修整爲世所稱及在冀州年老頗殖財貨大興寺塔爲百姓所苦卒贈髙陽王諡曰恭惠屈弟原雅性矜嚴沈勇多智略眀元時爲獵郎出監雲中軍事時赫連屈丐犯河西原以數十騎擊之殺十餘人帝以原輕敵違節度將加罪然知原驍勇遂任以爲將鎭雲中蠕蠕犯塞原輙破之以功賜爵武原侯加魯兵將軍太武即位拜駕部尚書車駕征蠕蠕大檀分爲五道遷尚書左僕射進爵河間公原在朝無所比周然恃寵驕恣多所排抑爲子求襄城公盧魯元女魯元不許原告其罪狀事相連逮歴時不決原懼不勝遂謀逆事泄伏誅原兄弟外節儉而内實積畜及誅後籍其財至數萬弟頡辯慧多䇿略最有父風眀元初爲内侍長令察舉百寮糾刺姦匿無所逥避嘗告其父陰事帝以爲忠特親寵之宜城王奚斤自長安追赫連昌至安定頡爲監軍侍御史斤以馬多疫死士衆乏糧乃築壘自固遣太僕邱堆等督租於民間爲昌所敗昌遂驕矜日來侵掠頡曰等死當戰死寧可坐受囚乎斤以馬死爲辭頡乃陰與尉眷等謀選騎焉昌來攻壘頡出應之昌馬蹶而墜頡禽昌送京師賜爵西平公代堆統攝諸軍赫連定將復入長安詔頡鎭蒲坂以拒之宋將到彥之寇淮南以援定列守南岸至於衡關太武西征定以頡爲援軍將軍督諸軍擊彥之遂濟河攻洛陽拔之進攻虎牢虎牢潰又琅邪王司馬楚之平滑臺禽宋將朱修之李元德及東郡太守申謨乃振旅還京師進爵爲王卒諡曰襄頡爲將善綏士衆及卒宋士卒降者無不歎惜庾業延代人也後賜名岳其父及兄和辰世典畜牧稍轉中部大人昭成崩苻氏内侮事難之間收斂畜產富擬國君劉顯謀逆道武外幸和辰奉獻眀太后道武歸又得其資用以和辰爲内侍長和辰分别公私舊畜頗不會旨道武由是恨之岳獨恭愼修謹善處危難之間道武嘉之與王建等俱爲外朝大人參預軍國從平中原拜安遠將軍官軍之警於栢肆也賀蘭部帥附力眷紇突鄰部帥匿物尼紇奚部帥叱奴根等聞之反於陰館南安公元順討之不尅詔岳討破離石叛胡帥呼延鐵西河叛胡帥張崇等以功賜爵西昌公遷鄴行臺岳爲將有謀略士衆服其智勇名冠諸將及罷鄴行臺以所統六郡置相州即拜岳爲刺史秉法平當百姓稱之鄴舊有園池時果初熟丞吏送之岳不受曰果未進御吾何得先食其謹如此遷司空岳兄子路有罪諸父兄弟悉誅特赦岳父子候官告岳父子衣服鮮麗行止風采擬儀人君遇道武不豫多所猜忌遂誅之時人咸惜焉岳葬在代西善無界後太武征赫連氏經其墓宅愴然改容遂下詔爲立廟令一州之人四時致祭求其子孫任爲帥者得其子陵從征有功聽襲爵王建廣寗人也祖姑爲平文后生昭成皇帝伯祖豐以帝舅貴重豐子支尚昭成女甚見親待建少尚公主登國初爲外朝大人與和跋等十三人迭典庶事參預計謀道武遣使慕容垂建辭色髙亢垂壯之還爲左大夫建兄廻時爲大夫諸子多不愼法建具以狀聞廻父子伏誅其訐直如此從征伐諸國破二十餘部又從征衞辰破之爲中部大人破慕容寶於參合帝乘勝將席卷南夏於是簡擇俘衆有才能者留之其餘欲悉給衣糧遣歸令中州之人咸知恩德建以爲寶覆敗於此國内空虚獲而歸之縱敵生患不如殺之帝曰若從建言非伐罪弔民之義諸將咸以建言爲然建又固執乃坑之帝既而悔焉并州既平車駕出井陘次恒山諸郡皆降唯中山鄴信都三城不下乃遣衞王儀南攻鄴建攻信都等城建等攻城六十餘日不能尅士卒多傷帝自中山幸信都降之車駕幸鉅鹿破寶衆軍於栢肆塢遂圍中山寶棄城走和龍城内無主將夜入乘勝據守其門建貪而無謀意在虜獲恐士卒肆掠盗亂府庫請候天眀帝乃止是夜徒河人共立慕容驎爲主遂閉門固守帝乃悉衆攻之使人登巢車臨城招其衆皆曰但恐如參合之衆故求延月日命耳帝聞之顧視建而唾其面中山平賜建爵濮陽公遷太僕徙眞定公加散騎常侍青冀二州刺史卒陪葬金陵羅結代人也其先世領部落爲魏附臣劉顯之逆結從道武幸賀蘭部後以功賜爵屈蛇侯太武初累遷侍中外都大官總三十六曹事年一百七歲精爽不衰太武以其忠慤甚信待之監典後宮出入臥内因除長秋卿年一百一十詔聽歸老賜大寗東川爲私第别業并爲築城即號曰羅城朝廷每有大事驛馬詢問焉年一百二十卒贈幽州刺史諡曰貞子斤從太武討赫連昌力戰有功歴位四部尚書從平涼州以功賜爵帶方公除長安鎭都大將會蠕蠕侵境除柔元鎭都大將卒諡曰靜陪葬金陵子敢襲爵位庫部尚書卒子伊利襲婁伏連代人也代爲酋帥伏連忠厚有器量年十三襲父位領部落道武初從破賀蘭部又平中山及征姚平於柴壁以功賜爵安邑侯眀元時爲晉兵將軍并州刺史太武即位封廣陵公再遷光祿勲進爵爲王後鎭統萬薨諡恭王子眞襲降爵爲公眞弟大拔封鉅鹿子大拔孫寶字道成性淳朴好讀書眀帝時仕至朔州刺史時邊事屢興民多流散及寶至稍安集之殘壊舊宅皆命葺構人歸繼路歲考爲天下最後隨大都督源子邕討擊葛榮王師敗績寶困於榮軍變姓名匿於戎伍以免害久之賊中有朔州人識寶者謂寶曰使君寧自苦至此遂將詣榮榮笑曰婁公吾方圖事何相見之晚因顧謂人曰此公行善天道報之得免亂兵即其驗也寳遇逃者密啓賊形勢規爲内應天子感其壯志召寶弟二子景賢授員外散騎常侍郎葛榮滅寶始得還永定中除假員外散騎常侍使蠕蠕先是蠕蠕稱藩上表後以中州不競書爲敵國之儀寶責之蠕蠕主大驚自知罪惡謝曰此作書人誤遂更稱藩孝武立勅寶與行臺長孫子彥鎭恒農後從入關封廣寧縣伯大統元年詔領著作郎監修國史事平封平城縣子後授國子祭酒侍中進儀同三司兼太子太傅攝東宮詹事寶爲人清簡少言頗諳舊事位歴師傅守靖謙恭以此爲人所敬後行涇州事卒於州閭大肥蠕蠕人也道武時歸魏尚華陰公主賜爵期思子與弟並爲上賔入八議眀元即位爲内都大官進爵爲侯宣城王奚斤之攻虎牢大肥與娥清領十二軍出中道太武初復與奚斤出雲中白道討大檀破之後從討赫連昌以功授滎陽公公主薨復尚濩澤公主太武將拜大肥爲王遇疾卒奚牧代人也重厚有智謀道武寵遇之稱曰仲兄初劉顯謀逆梁眷知之潛使牧與穆崇至七个山以告帝錄先帝舊臣又以牧告顯功使敷奏政事參與計謀從征慕容寶以功拜并州刺史賜爵任城公州與姚興接界興頗寇邊牧乃與興書稱頓首禮抗之責興侵邊不直之意興以與國和通恨之有言於道武道武戮之和跋代人也世領部落爲魏附臣至跋以才辯知名道武擢爲外朝大人參軍國大謀雅有智算賜爵日南公從平中原以功進爲尚書鎭鄴以破慕容徳軍改封定陵公與恒山王遵討賀蘭部别帥木易于破之出爲平原太守道武寵跋過於諸將羣臣皆敦尚恭儉而跋專修虛譽炫曜於時性尤奢淫帝戒之不革後車駕北狩豺山收跋刑之路側妻劉氏自殺以從初將刑跋道武命其諸弟毗等視訣跋謂毗曰灅北地瘠可居水南就耕良田廣爲產業各相勸勵令之背己曰汝曹何忍視吾之死毗等解其微意詐稱使者奔長安道武誅其家後太武幸豺山校獵忽暴霧四塞怪問之羣下僉言跋世居此祠冢猶存或者能致斯變帝遣建興公古弼祭以三牲霧即除後太武蒐狩之日每先遣祭之莫題代人也多智有才用初爲幢將領禁兵道武之征慕容寶寶夜犯營軍人驚駭遂有亡還京師者言官軍敗於栢肆京師不安南安公元順因欲攝國事題曰大事不可輕爾不然禍將及矣順乃止後封高邑公窟咄寇南鄙題時貳於帝遺箭於窟咄謂之曰三歲犢豈勝重載言窟咄長而帝少也帝既銜之後有告題居處倨傲擬則人主帝乃使人示之以箭告之曰三歲犢能勝重載不題奉詔父子對泣詰朝乃刑賀狄干代人也家本小族世忠厚爲將以平當稱稍遷北部大人登國初與長孫嵩爲對眀於聽察爲人愛敬道武遣狄干致馬千匹結婚於姚萇會萇死興立因止狄干而絶婚興弟平寇平陽道武討平之禽其將狄伯支唐小方等四十餘人後興以駿馬千匹贖伯支而遣狄干還帝許之狄干在長安因習讀書史通論語尚書諸經舉止風流有似儒者初帝普封功臣狄干雖爲姚興所留遙賜狄干爵襄武侯加秦兵將軍及狄干至帝見其言語衣服類中國以爲慕而習之故忿焉既而殺之李栗鴈門人也昭成時父子入北栗少辯㨗有才能兼將略初隨道武幸賀蘭部愛其藝能時王業草創爪牙心腹多任親近唯栗一介遠寄兼非戚舊數有戰功拜左軍將軍栗性簡慢矜寵不率禮每在道武前舒放倨傲不自祇肅笑唾任情道武積其宿過誅之於是威嚴始厲制勒羣下盡謙卑之禮自栗始也奚眷代人也少有將略道武世有戰功眀元時爲虎牢鎭將爲寇所憚太武時賜爵南陽公及征蠕蠕眷以部曹尚書督偏將出别道詔會鹿渾海眷與中山王辰等諸大將俱後期斬于都南爵除燕鳳字子章代人也少好學博綜經史眀習陰陽䜟緯昭成素聞其名使人以禮迎致之鳳不應聘及軍圍代城謂城人曰燕鳳不來吾將屠汝代人懼遂送鳳昭成與語大悅待以賔禮後拜代王左長史參决國事又以經授獻眀帝苻堅遣使牛恬朝貢令鳳報之堅問鳳代王何如人對曰寛和仁愛經略髙逺一時雄主也常有并天下之志堅曰卿輩北人無剛甲利兵敵弱則進彊則退走安能并兼邪鳳曰北人壯悍上馬持三仗驅馳若飛主上雄俊率服北土控弦百萬號令若一軍無輜重樵爨之苦輕行速㨗因敵取資此南方所以疲弊而北方之所以常勝也堅曰彼國人馬多少鳳曰控弦之士數十萬見馬一百萬匹堅曰卿言人衆則可說馬太多鳳曰雲中川自東山至西河二百里北山至南山二百餘里每歲孟秋馬常大集略爲滿川以此推之使人言猶未盡鳳還堅厚加贈遺及昭成崩道武將遷長安鳳以道武幼弱固請於苻堅曰代主初崩臣子亡叛遺孫沖幼莫相輔立其别部大人劉庫仁勇而有智鐵弗衞辰狡猾多變皆不可獨任宜分諸部爲二令各統之兩人素有深讐其勢莫敢先發此禦邊之良䇿待其孫長乃存而立之是陛下施大惠於亡國也堅從之鳳尋東還及道武即位歴吏部郎給事黄門侍郎行臺尚書甚見禮重眀元世與崔宏封懿梁越等入講經傳出議朝政太武初以舊勲賜爵平舒侯加鎭遠將軍神䴥元年卒子才襲許謙字元遜代人也少有文才善天文圖䜟之學逮建國時將家歸附昭成嘉之擢爲代王郎中令兼掌文記與燕鳳俱授獻眀帝經從征衞辰以功賜僮𨽻三十户昭成崩後謙徙長安苻堅從弟行唐公洛鎭和龍請謙之鎭未幾以繼母老辭歸登國初遂歸道武道武悅以爲右司馬與張衮等參贊初基慕容寶之來寇也道武使謙告難於姚興興遣將楊佛嵩來援佛嵩稽緩道武命謙爲書遺之佛嵩乃倍道兼行道武大悅賜謙爵關内侯寶敗重遣謙與佛嵩盟眀年慕容垂復來寇道武謂謙曰事急矣卿其行也謙未發而垂退及聞垂死謙上書勸進道武善之并州平以謙爲陽曲䕶軍賜爵平舒侯安遠將軍皇始元年卒贈平東將軍左光祿大夫幽州刺史髙陽公諡曰文子洛陽襲眀元追錄謙功以洛陽爲鴈門太守洛陽家田三生嘉禾皆異畝同穎太武善之進爵北地公卒諡曰恭崔宏字元伯清河東武城人魏司空林六世孫也祖悅仕石虎位司徒左長史父潛仕慕容暐爲黄門侍郎並以才學稱宏少有儁才號曰冀州神童苻融之牧冀州虚心禮敬拜陽平公侍郎冀州從事出總庶務入爲賔友衆事修理處斷無滯苻堅聞之徵爲太子舍人辭以母疾不就左遷著作佐郎太原郝軒名知人稱宏有王佐才近代所未有也堅亡避難齊魯間爲丁零翟釗及晉叛將張願所留郝軒歎曰斯人也遇斯時不用扶搖之勢而與鷃雀飛沈豈不惜哉仕慕容垂爲吏部尚書左丞髙陽内史所歴著稱立身雅正雖在兵亂厲志篤學不以資産爲意妻子不免飢寒道武征慕容寶次中山宏棄郡東走海濵帝素聞其名遣騎追求執送於軍門引見與語悅之以爲黄門侍郎與張衮對掌機要草創制度時晉使來聘帝將報之詔有司博議國號宏議曰三皇五帝之立號也或因所生之土或以封國之名故虞夏商周始皆諸侯及聖徳既隆萬國宗戴稱號隨本不復更立唯商人屢徙故改號曰殷然猶兼行不廢始基之號故詩云殷商之旅此其義也漢祖以漢王定三秦威彊楚故遂以漢爲國號國家雖統北方廣漠之土逮于陛下應運龍飛雖曰舊拜受命惟新是以登國之初改代曰魏又慕容永奉進魏土夫魏者大名神州之上國斯乃革命之徵驗利見之元符也臣愚以爲宜號曰魏道武從之於是稱魏及帝幸鄴歴問故事宏應對若流帝善之還次恒嶺帝親登山頂撫慰新人適遇宏扶老母登嶺賜以牛米因詔諸徙人不能自進者給以車牛遷吏部尚書時命有司制官爵撰朝儀協音樂定律令申科禁宏總而裁之以爲永式及置八部大人以擬八坐宏通置三十六曹如令僕統事深被信任勢傾朝廷而儉約自居不營産業家惟四壁出無車乘朝晡步上母年七十供養無重膳帝聞而益厚重之厚加饋遺時人亦譏過約而宏居之愈甚帝常引問古今舊事王者制度治世之則宏陳古人制作之體及眀君賢臣徃代廢興之由甚合上意未嘗蹇愕忤旨亦不諂諛茍容及道武季年大臣多犯威怒宏獨無譴者由於此也帝曾令宏講漢書至婁敬說漢髙祖欲以魯元公主妻匈奴善之嗟歎者良久是以諸公主皆釐降于賔附之國朝臣子弟雖名族美彥不得尚焉尚書職罷賜宏爵白馬侯加周兵將軍與舊功臣庾岳奚斤等同班而信寵過之道武崩眀元未即位清河王紹因人心不安大出財帛班賜朝士宏獨不受紹財眀元即位命宏居門下虚已訪問特賜帛二百疋長孫嵩已下咸愧焉詔遣使者循行郡國糾察守宰不如法者令宏與宜都公穆觀等按之帝稱其平允又詔宏與長孫嵩等於朝堂决刑獄眀元以郡國豪右大為蠹害乃優詔徵之人多戀本而長吏逼遣之於是輕薄少年因相扇動所在聚結西河建興盗賊並起守宰討之不能禁帝乃引宏及北新侯安同壽光侯叔孫建元城侯元屈等問焉宏欲大赦以紓之屈等對曰不如先誅首惡赦其黨類宏曰王者臨天下以安人爲本何顧小曲直也夫赦雖非正道而可以權行若赦而不改誅之不晚眀元從之神瑞初詔宏與南平公嵩等坐止車門總理機事并州胡數萬南掠河内遣將軍公孫表等討之敗績帝問計於羣臣宏曰表等諸軍不爲不足但失於處分故使小盗假息且胡衆雖多而無猛烈主將所謂千奴共一膽也宜得大將素爲胡所服信者將數百騎就攝表軍以討之賊聞必望風震怖壽光侯建時在并州諸將莫及帝從之遂平胡寇尋拜天部大人進爵爲公泰恒三年夏宏病篤帝遣侍中穆觀就受遺言侍臣問疾一夜數返卒追贈司空諡文貞公喪禮一依安成王叔孫俊故事詔羣臣及附國渠帥皆㑹葬自親王以外盡命拜送子浩襲太和中孝文追錄先朝功臣以宏配饗廟庭浩字伯深小名桃簡浩少好學博覽經史元象陰陽百家之言無不關綜研精義理時人莫及弱冠爲通直郎天興中給事祕書轉著作郎道武以其工書常置左右帝季年威嚴頗峻宮省左右多以微過得罪莫不逃隱避目下之變浩獨恭謹不怠或終日不歸帝知之輙命賜以御粥其砥直任時不爲窮通改節皆此類也眀元初拜博士祭酒賜爵武城子常授帝經書每至郊祠父子並乘軺軒時人榮之帝好陰陽術數聞浩說易及洪範五行善之因命浩筮吉凶參觀天文考定疑惑浩綜覈天人之際舉其綱紀者數家諸所處決多有應驗常與軍國大謀甚爲寵密時有兎在後宫檢無從得入帝令浩推之浩謂當有隣國貢嬪嬙者眀年姚興果獻女神瑞二年秋穀不登太史令王亮蘇坦因華陰公主等言䜟書云國家當治鄴應大樂五十年勸帝遷都於鄴就穀浩與特進周澹言於帝曰今國家遷都於鄴可救今年之飢非長久之䇿也東州之人常謂國家居廣漠之地人畜無算號稱牛毛之衆今留守舊都分家南徙恐不滿諸州之地參居郡縣處榛林之下不便水土疾疫死傷情見事露則百姓意沮四方聞之有輕侮之意屈丐及蠕蠕必提挈而來雲中平城則有危殆之事阻隔恒代千里之際須欲救援赴之甚難如此則聲實俱損矣今居北方假令山東有變輕騎南出耀威桑梓之中誰知多少百姓見之望塵振伏此是國家威制諸夏之長䇿也至春草生乳酪將出兼有菜果足接來秋若得中熟事則濟矣帝曰惟此二人與朕意同復使中貴人問浩澹曰今既餬口無以至來秋或復不熟將如之何浩等對曰可簡窮下之户諸州就穀若來秋無年願更圖也但不可遷都帝從之於是分民詣山東三州就食出倉穀以廪之來年遂大熟賜浩澹妾各一人御衣一襲絹五十疋綿五十斤初姚興死之前歲也太史奏熒惑在瓠𤓰星中一夜忽然亡失不知所在或謂下入危亡之國將爲童謠妖言而後行其災禍帝聞之驚乃召諸碩儒十數人令與史官求其所詣浩對曰按春秋左氏傳神降于莘其至之日各以其物也請以日辰推之庚午之夕辛未之朝天有陰雲熒惑之亡當此二日之内庚之與午皆主於秦辛爲西夷今姚興據咸陽是熒惑入秦矣諸人皆作色曰天上失星人安能知其所詣而妄說無徵之言浩笑而不應後八十餘日熒惑果出於東井留守盤旋秦中大旱赤地昆眀池水竭童謠訛言國内諠擾眀年姚興死二子交兵三年國滅於是諸人乃服曰非所及也泰恒元年晉將劉裕伐姚泓舟師自淮泗入欲泝河西上求假道詔羣臣議之外朝公卿咸曰凾谷關號曰天險一人荷戈萬夫不得進裕舟船步兵何能西入揚言伐姚意或難測其水道最不可縱宜先發兵斷河上流勿令西過又議之内朝或同外計帝將從之浩曰非上䇿也姚興使司馬休之輩擾其荆州裕切齒久矣今興死子幼乘其危亡而伐之臣觀其意必欲入關勁躁之人不顧後患今若塞其西路裕必上岸北侵如此則姚泓無事而我受敵矣今蠕蠕内寇民食又乏不可發軍發軍赴南則北寇進擊若其救北則南州復危未若假之水道縱裕西入然後興兵塞其東歸之路所謂卞莊刺虎兩得之勢也使裕勝也必德我假道之惠令姚氏勝也亦不失救隣之名縱使裕得關中懸遠難守彼不能守終爲我物今不勞兵馬坐觀成敗鬭兩虎而收長久之利上䇿也夫爲國之計擇利而爲之豈顧婚姻酬一女子之惠也假令國家棄恒山以南裕必不能發吳越之兵與官軍爭守河北也居然可知議者猶曰裕西入凾谷則進退路窮腹背受敵北上岸則姚軍必不出關助我揚聲西行意在北進其勢然也帝遂從羣議遣長孫嵩發兵拒之戰於畔城爲裕將朱超石所敗師人多傷帝始恨不用浩計二年晉齊郡太守王懿來降上書陳計稱劉裕在洛勸國家以軍絶其後路則裕軍可不戰而尅書奏帝善之會浩在前進講書傳帝問浩曰劉裕西伐前軍已至潼關以卿觀之事得濟不對曰昔姚興好養虚名而無實用子泓又病衆叛親離裕乘其危亡兵精將勇尅之必矣帝曰劉裕武能何如慕容垂浩曰裕勝夫慕容垂承父祖累世之資生便尊貴同類歸之若夜蛾之赴火少加倚仗便足立功劉裕挺出寒微不階尺土之資不因一卒之用奮臂大呼而夷滅桓元北禽慕容超南摧盧循等僭晉陵遲遂執國命裕若平泓而還必篡其主其勢然矣秦地戎夷混并虎狼之國裕亦不能守之風俗不同人情難變欲行荆揚之化於三秦之地是無翼而欲飛無足而欲走不可得也秦地當終爲國家有帝曰裕已入關不能進不能退我遣精騎南襲彭城壽春裕亦何能自立浩曰今西北二寇未殄陛下不可親御六師兵衆雖盛而將無韓白長孫嵩有治國之用無進取之能非劉裕敵也臣謂待之不晚帝笑曰卿量之已審矣浩曰臣嘗私論近世人物不敢不上聞若王猛之治國苻堅之管仲也慕容恪之輔少主慕容暐之霍光也劉裕之平逆亂司馬徳宗之曹操也帝曰卿謂先帝如何浩曰小人管窺乾象何能見昊穹之廣大雖然太祖用漠北淳樸之人南入漢地變風易俗化洽四海自與羲農舜禹齊烈臣豈能仰名帝曰屈丐何如浩曰屈丐家國夷滅一身孤寄爲姚氏封殖不思樹黨彊隣報讐雪恥乃結蠕蠕背德於姚興橛豎小人無大經略正可殘暴終爲人所滅耳帝大悅語至中夜賜浩御縹醪酒十觚水精戎鹽一兩曰朕味卿言若此鹽酒故與卿同其味也三年彗星出天津入太微經北斗絡紫微犯天棓八十餘日至天漢而滅帝復召諸儒術士問之曰今天下未一四方岳峙災咎之應將在何國朕甚畏之浩對曰災異由人而起人無釁妖不自作臣按漢書載王莽篡位之前彗星出入正與今同國家主尊臣卑人無異望是爲僭晉將滅劉裕篡逆之應也五年裕果廢其主而自立南鎭上宋改元赦書時帝幸東南舄滷池射鳥聞之驛馳召浩而謂曰徃年卿言彗星之占驗矣朕於今日始信天道初浩父疾篤浩乃剪髮截爪夜在庭中仰禱斗極爲父請命求以身代叩頭流血歲餘不息家人罕有知者及父終居喪盡禮時人稱之襲爵白馬公自朝廷禮儀文䇿詔誥軍國書記盡關於浩浩能爲雅說不長屬文而留心於制度科律及經術之言作家祭法次序五宗蒸嘗之禮豐儉之節義理可觀性不好老莊之書每讀不過數十行輙棄之曰此矯誣之說不近人情必非老子所言老聃習禮仲尼所師豈設敗法之言以亂先王之敎袁生所謂家人筐篋中物不可揚於王庭也帝常有微疾而災異屢見乃使中貴人密問於浩曰春秋星孛北斗七國之君皆將有咎今兹日蝕於胃昴盡光趙代之分朕疾疢彌年療治無損恐一旦奄忽諸子並少將如之何其爲我設圖後之計浩曰陛下春秋富盛聖業方融德以除災幸就平愈且天道㝠遠或消或應昔宋景見災修德熒惑退舍願陛下遺諸憂慮恬神保和納御嘉福無以闇昧之說致損聖思必不得已請陳瞽言自聖化龍興不崇儲貳是以永興之始社稷幾危今宜早建東宮選公卿忠賢陛下素所委仗使爲師傅左右信臣簡在聖心者以充賔友入總萬機出統戎政監國撫軍大柄在手若此則陛下可以優游無爲頤神養壽進御醫藥萬歲之後國有成主民有所歸則奸宄息望旁無覬覦此乃萬代之令典塞禍之大備也今長皇子諱年漸一紀眀叡温和衆情所繫時登儲副則天下幸甚立子以長禮之大經若並待成人而擇倒錯天倫則生履霜堅氷之禍自古以來載籍所記興衰存亡尠不由此帝納之於是使浩奉䇿告宗廟命太武爲國副主居正殿臨朝司徒長孫嵩山陽公奚斤北新公安同爲左輔坐東廂西向浩與太尉穆觀散騎常侍邱堆爲右弼坐西廂東向百寮總已以聽焉眀元避居西宮時隱而窺之聽其決斷大悅謂左右侍臣曰長孫嵩宿徳舊臣歴事四世功存社稷奚斤辯㨗智謀名聞遐邇安同曉解俗情眀於校練穆觀達政事要識吾旨趣崔浩博聞彊識精天人之會邱堆雖無大用然在公專謹以此六人輔相吾子足以經國吾與汝曹遊行四境伐叛柔服可得志於天下矣羣臣時奏事所疑眀元曰此非我所知當決之汝曹國主也會聞宋武帝殂眀元欲取虎牢滑臺浩曰陛下不以劉裕歘起納其使貢裕亦敬事陛下不幸今死乘喪伐之雖得之不令春秋晉士丐帥師侵齊聞齊侯卒乃還君子大其不伐喪以爲恩足以感孝子義足以動諸侯今國家亦未能一舉而定江南宜遣人弔祭存其孤弱恤其凶災布義風於天下令德之事也若此則化被荆揚南金象齒羽毛之珍可不求而自至且裕新死黨與未離兵臨其境必相率拒戰功不可必不如緩之待其惡稔如其彊臣爭權變難必起然後命將揚威可不勞士卒而收河北之地眀元既銳意南伐語浩曰劉裕因姚興死而滅其國裕死我伐之何爲不可浩固執曰興死二子交爭裕乃伐之眀元大怒不從浩言遂遣奚斤南伐議於監國之前曰先攻城也先略地也斤曰請先攻城浩曰南人長於守城苻氏攻襄陽經年不拔今以大國之力攻其小城若不時尅挫損軍勢危道也不如分軍略地至淮爲限列置守宰收斂租穀滑臺虎牢反在軍北絶望南救必沿河東走若或不然即是囿中之物公孫表請先圖其城斤等濟河先攻滑臺經時不拔表請濟師眀元怒乃親南廵守拜浩相州刺史加左光祿大夫隨軍爲謀主及車駕之還也浩從眀元幸西河太原登憩髙陵之上下臨河流傍覽川域慨然有感遂與同寮論五等郡縣之是非考秦始皇漢武之違失浩好古識治體時伏其言天師寇謙之每與浩言聞其論古治亂之迹常自夜達旦竦意斂容無有懈倦既而歎美之曰斯人言也惠皆可底行亦當今之臯繇也但世人貴遠賤近不能深察之耳因謂浩曰吾行道隱居不營世務忽受神中之訣今當兼修儒敎輔助太平眞君繼千載之絶統而學不稽古臨事闇昧卿當爲吾撰列王者政典并論其大要浩乃著書二十餘篇上推太初下盡秦漢變弊之迹大旨先以復五等爲本太武即位左右忌浩正直共排毁之帝雖知其能不免羣議故出浩令以公歸第及有疑議召而問焉浩纎妍白晳如美婦人而性敏達長於謀計常自比張良而謂已稽古過之既得歸第因欲修服食養性之術而寇謙之有神中錄圖新經浩因師事之始光中進爵東郡公拜太常卿時議討赫連昌羣臣皆以爲難唯浩曰徃年以來熒惑再守羽林越鈎陳咸皆拘忌其占秦亡又今年五星併出東方利以西伐天應人和時會並集不可失也帝乃使奚斤等擊蒲坂而親率輕騎襲其都城大獲而還後帝復討昌次其城下收衆僞退昌鼓譟而前舒陣爲兩翼會有風雨從東南來揚沙昬㝠宦者趙倪進曰今風雨從賊後來我向彼背天不助人又將士飢渴願陛下攝騎避之更待後日浩叱之曰是何言歟千里制勝一日之中豈得變易賊前行不止後已離絶宜分軍隐出奄擊不意風道在人豈有恒也帝曰善分騎奮擊昌軍大潰神䴥二年議擊蠕蠕朝臣内外盡不欲行保太后亦固止帝帝皆不聽唯浩贊成䇿略尚書令劉絜左僕射安原等乃使黄門侍郎仇齊推赫連昌太史張淵徐辯說帝曰今年己巳三陰之歲歲星襲月太白在西方不可舉兵北伐必敗雖尅之不利於上又羣臣共贊和淵等云淵少時嘗諫苻堅不可南征堅不從而敗今天時人事都不和協何可舉動帝意不決乃召浩令與淵等辯之浩難淵曰陽者德也陰者刑也故日蝕修德月蝕修刑夫王者之用刑大則陳之原野小則肆之市朝戰伐者用刑之大者也以此言之三陰用兵蓋得其類修刑之義也歲星襲月年飢民流應在他國遠期十二年太白行蒼龍宿於天文爲東不妨北伐淵等俗生志意淺近牽於小數不達大體難與遠圖臣觀天文比年以來月行掩昴至今猶然其占三年天子大破旄頭之國蠕蠕髙車旄頭之衆也夫聖眀御時能行非常之事古人語曰非常之原黎民懼焉及其成功天下晏然願陛下勿疑也淵等慙而言曰蠕蠕荒外無用之物得其地不可耕而食得其民不可臣而使輕疾無常難得而制有何汲汲而苦勞士馬也浩曰淵言天時是其所職若論形勢非彼所知斯乃漢世舊說常談施之於今不合事宜何以言之夫蠕蠕者舊是國家北邊叛𨽻今誅其元惡收其善民令復舊役非無用也漠北髙涼不生蚊蚋水草美善夏則北遷田牧其地非不可耕而食也蠕蠕子弟來降貴者尚公主賤者將軍大夫居列滿朝又髙車號爲名騎非不可臣而畜也夫以南人追之則患其輕疾於國兵則不然何者彼能遠走我亦能遠逐非難制也往數入塞國人驚震今夏不乘虚掩進破滅其國至秋復來不得安臥自太宗之世迄於今日無歲不警豈不汲汲乎哉世人皆謂淵辯通解數術眀決成敗臣請試之問其西國未滅之前有何亡徵知而不言是其不忠若實不知是其無術時赫連昌在坐淵等自以無先言慙赧而不能對帝大悅謂公卿曰吾意決矣亡國之臣不可與謀信矣哉而保太后猶疑之復令羣臣於保太后前評議帝謂浩曰此等意猶不伏卿善曉之令寤既罷朝或有尤浩者曰今吳賊南寇而舍之北伐行師千里其誰不知若蠕蠕遠遁前無所獲後有南賊之患此危道也浩曰不然今年不摧蠕蠕則無以禦南賊自國家并西國以來南人恐懼揚聲動衆以衞淮北彼北我南彼征我息其勢然矣北破蠕蠕往還之間故不見其至也何以言之劉裕得關中留其愛子精兵數萬良將勁卒猶不能固守舉軍盡没號哭之聲至今未已如何正當國家休眀之世士馬彊盛之時而欲以駒犢齒虎口也設令國家與之河南彼必不能守之自量不能守是以必不來若或有衆備邊之軍耳夫見瓶水之涷知天下之寒嘗肉一臠識鑊中之味物有其類可推而得也且蠕蠕恃其絶遠謂國家力不能至自寛來久故夏則散衆放畜秋肥乃聚背寒向温南來寇抄今出其慮表攻其不備大軍卒至必驚駭星分望塵奔走牡馬䕶牧牝馬戀駒驅馳難制不得水草未過數日朋聚而困弊可一舉而滅蹔勞永逸長久之利時不可失也唯患上無此意今聖慮已決發曠世之謀如何止之陋哉公卿也諸軍遂行天師謂浩曰是行也如之何可果尅乎浩對曰天時形勢必尅無疑但恐諸將瑣瑣前後顧慮不能乘勝深入使不全舉耳及軍入其境蠕蠕先不設備民畜布野驚怖四奔於是分軍搜討東西五千里南北三千里凡所俘虜及獲畜産車廬彌漫山澤蓋數百萬髙車殺蠕蠕種類降者三十餘萬落虜遂散亂矣帝沿弱水西行至涿邪山諸大將果疑深入有伏兵勸帝止天師以浩曩日之言固勸帝窮討帝不聽後有降人言蠕蠕大檀先被疾不知所爲乃焚燒穹廬科車自載將數百人入山南走民畜窘聚方六十里中無人統領相去百八十里追軍不至乃徐徐西遁惟此得免後聞涼州賈胡言若復前行二日則盡滅之矣帝深恨之大軍既還南賊終不能動如浩所量浩眀識天文好觀星變常置金銀銅鋌於酢器中令青夜有所見即以鋌畫紙作字以記其異帝每幸浩第多問以異事或倉卒不及束帶奉進蔬食不暇精美帝爲舉匕箸或立嘗而旋其見寵愛如此於是引浩出入臥内加侍中特進撫軍大將軍左光祿大夫以賞謀謨之功帝從容謂浩曰卿才智深博事朕祖考忠著三世朕故延卿自近宜思盡規諫輔予弼予勿有隱懐朕雖當時遷怒若或不用久久可不深思卿言也因令歌工歴頌羣臣事在長孫道生傳又召新降高車渠帥數百人賜酒食於前帝指浩以示之曰汝曹視此人尫纎懦弱手不能彎弓持矛其胸中所懐乃踰於兵甲朕始時雖有征討之意而志慮不自決前後尅㨗皆此人導吾令至此矣乃勅諸尚書曰凡軍國大計卿等所不能決皆先諮浩然後施行俄而南蕃諸將表宋師欲犯河南請兵三萬先其未發逆擊之因誅河北流民在界上者絶其鄉導足以挫其銳氣使不敢深入詔公卿議之咸言宜許浩曰此不可從也往年國家大破蠕蠕馬力有餘南賊震懼常恐輕兵奄至臥不安席故先聲動衆以備不虞非敢先發又南土下濕夏月蒸暑水潦方多草木深邃疾疫必起非行師之時且彼先嚴有備必堅城固守屯軍攻之則糧食不給分兵肆討則無以應敵未見其利就使能來待其勞倦秋涼馬肥因敵取食徐往擊之萬全之計在朝羣臣又西北守將從陛下征討西滅赫連北破蠕蠕多獲美女珍寶馬畜成羣南鎭諸將聞而生羡亦欲南鈔以取資財是以披毛求瑕妄張賊勢冀得肆心既不獲聽故數稱賊動以恐朝廷背公存私爲國生事非忠臣也帝從浩議南鎭諸將復表賊至而自陳兵少求簡幽州以南戍兵佐守就漳水造船嚴以爲備公卿議者僉然欲遣騎五千并假署司馬楚之魯軌韓延之等令引誘邊民浩曰非上䇿也彼聞幽州以南精兵悉發大造舟船輕騎在後欲存立司馬誅除劉族必舉國駭擾懼於滅亡當悉發精兵銳卒來備北境後審知官軍有聲無實恃其先聚必喜而前行徑來至河肆其侵暴則我守將無以禦之若彼有見機之人善設權譎乘間深入虞我國虚生變不難非制敵之良計今公卿欲以威力攘賊乃所以招令速至也夫張虚聲而召實害此之謂矣不可不思後悔無及我使在彼期四月前還可待使至審而後發猶未晚也楚之等是彼所忌將奪其國彼安得端坐視之故楚之往則彼來楚之止則彼息其勢然也且楚之等瑣才能招合輕薄無頼而不能成就大功爲國生事使兵連禍結必此之羣矣臣嘗聞魯軌說姚興求入荆州至則散敗乃不免蠻賊掠賣爲奴使禍及姚泓已然之效浩復陳天時不利於彼曰今兹害氣在揚州不宜先舉兵一也午歲自刑先發者傷二也日蝕滅光晝昬星見飛鳥墮落宿當斗牛憂在危亡三也熒惑伏匿於翼軫戒亂及喪四也太白未出進兵者敗五也夫興國之君先修人事次盡地利後觀天時故萬舉而萬全國安而身盛今宋新國是人事未周也災變屢見是天時不協也舟行水涸是地利不盡也三事無一成自守猶或不安何得先發而攻人哉彼必聽我虚聲而嚴我亦承彼嚴而動兩推其咎皆自以爲應敵兵法當分災迎受害氣未可舉動也帝不能違衆乃從公卿議浩復固爭不從乃遣陽平王杜超鎭鄴琅邪王司馬楚之等屯潁川於是賊來遂疾到彦之自清水入河泝流西行分兵列守南岸西至潼關帝聞赫連定與宋縣分河北乃治兵欲先討赫連羣臣皆曰劉義隆猶在河中舍之西行前寇未可必尅而義隆乘虚則失東州矣帝疑焉問計於浩浩曰義隆與赫連定同惡相招連結馮跋牽引蠕蠕規逆肆心虚相唱和義隆望定進定待義隆前皆莫敢先入以臣觀之有似連雞不得俱飛無能爲害也臣始謂義隆軍來當屯住河中兩道北上東道向冀州西道衝鄴如此則陛下當自致討不得徐行今則不然東西列兵徑二千里中一處不過數千形分勢弱以此觀之儜兒情見止望固河自守免死爲幸無北度意也赫連定殘根易摧擬之必仆尅定之後東出潼關席卷而前則威震南極江淮以北無立草矣聖䇿獨發非愚近所及願陛下必西行勿疑平涼既平其日宴會帝執浩手以示䝉遜使曰所云崔公此是也才略之美當今無比朕行止必問成敗決焉若合符契後冠軍將軍安頡軍還獻南俘囚說南賊之言云宋勅其諸將若北國兵動先其未至徑前入河若其不動住彭城勿進如浩所量帝謂公卿曰卿輩前謂我用浩計爲謬驚怖固諫常勝之家始皆自謂踰人遠矣至於歸終乃不能及遷浩司徒時方士祁纎奏立四王以日東西南北爲名欲以致禎祥除災異詔浩與學士議之浩對曰先王建國以作藩屏不應假名以爲其福夫日月運轉周歴四方京師所居在於其内四王之稱實奄邦畿名之則逆不可承用先是纎奏改代爲萬年浩曰昔太祖道武皇帝應天受命開拓洪業諸所制置無不循古以始封代土後稱爲魏故代魏兼用猶彼殷商國家積徳著在圖史當享萬億不待改名以爲益也纎之所聞皆非正義帝從之是時河西王沮渠牧犍内有貳意帝將討焉先問於浩浩對曰牧犍惡心已露不可不誅官軍往年北伐雖不尅獲實無所損于時行者内外軍馬三十萬匹計在道死傷不滿八千歲常羸死恒不減萬乃不少於前而遠方乘虚便謂大損不能復振今出其不圖大軍卒至必驚懼騷擾不知所出禽之必矣牧犍幼弱諸弟驕恣爭權縱横人心離解加以比年以來天災地變都在秦涼誠滅亡之國也帝曰善吾意亦以爲然命公卿議之𢎞農王奚斤等三十餘人皆表曰牧犍西垂下國雖心不爲純臣然繼父職貢朝廷接以蕃禮又王姬釐降罪未甚彰謂且羈縻而已今士馬勞止宜可小息又其地鹵斥畧無水草大軍既到不得久停彼聞軍來必完聚城守攻則難㧞野無所掠於是尚書古弼李順之徒皆曰自温圉河以西至於涼州地純枯石了無水草不見流川皆言姑臧城南天梯山上冬有積雪深一丈餘至春夏消液下流成川引以溉灌彼聞軍至決此渠口水不通流則致渴乏去城百里之内赤地無草又不任久停軍馬斤等議是也帝乃命浩以其前言與斤共相難抑諸人不復餘言唯曰彼無水草浩曰漢書地理志稱涼州之畜爲天下饒若無水草何以畜牧又漢人爲居終不於無水草之地築城郭立郡縣也雪之消液纔不斂塵何得通渠引漕溉灌數百萬頃乎此言大詃誣於人矣李順等復曰耳聞不如目見吾曹目見何可共辯浩曰汝曹受人金錢欲爲人爲辭謂我目不見便可欺也帝隱聽聞之乃出親見斤等辭旨嚴厲形於神色羣臣乃不敢復言但唯唯而已於是遂討涼州平之州饒水草如浩所言乃詔浩曰昔皇祚之興世隆北土太祖道武皇帝協順天人奄有區夏太宗承統光隆前緒朕以𦕈年獲奉宗廟即位之初不遑寧處揚威朔裔埽定赫連逮於神䴥始命史職注集前功以成一代之典自爾已來戎旗仍舉秦隴尅定徐兖無塵平逋寇於龍川討孽𨽻於涼域而史闕其職篇籍不著每懼斯事之墜焉命公留臺綜理史務述成此書務從實錄浩於是監祕書事以中書侍郎髙允散騎侍郎張偉參著作續成前紀至於損益褒貶折衷潤色浩所總焉浩有鑒識以人倫爲己任眀元太武之世徵海内賢才起自仄陋及所得外國遠方名士拔而用之皆浩之由也至於禮樂憲章皆歸宗於浩及景穆始總百揆浩復與宜都王穆壽輔政事時又將討蠕蠕劉絜復致異議帝愈欲討之乃召問浩浩對曰往擊蠕蠕師不多日絜等各欲逥還後獲其生口云軍還之時去賊三十里是絜等之計過矣夫北土多積雪至冬時常避寒南徙若因其時潛軍而出必與之遇既與之遇則可禽獲帝以爲然乃分軍爲四道詔諸將俱會鹿渾海期日有定而絜恨計不用沮誤諸將無功而還帝西廵詔浩與尚書順陽公蘭延都督行臺中外諸軍事帝至東雍親臨汾曲觀叛賊薛永宗壘進軍圍之永宗出兵欲戰帝問浩曰今日可擊不浩曰永宗未知陛下自來人心安閒北風迅疾宜急擊之須臾必破若待眀日恐其見官軍盛大必夜遁走帝從之永宗潰滅車駕濟河前驅告賊在渭北帝至洛水橋賊已夜遁詔問浩曰蓋吳在長安北九十里渭北地空穀草不備欲度渭南西行何如浩對曰蓋吳營去此六十里賊魁所在擊蛇之法當先破頭頭破則尾豈能復動宜乘勢先擊蓋吳今軍往一日便到平蓋吳之後逥向長安亦一日而至一日之内未便損傷愚謂宜從北道若從南道則蓋吳徐入北山卒未可平帝不從乃度渭南蓋吳聞帝至盡散入北山果如浩言軍無所尅帝悔之後以浩輔東宮之勤賜繒絮布帛各千叚太武蒐于河西詔浩詣行在所議軍事浩表猶如前議以謂漢武患匈奴彊盛故開涼州五郡通西域廣農積穀爲滅賊之資東西迭擊故漢未疲而匈奴已弊今募徙豪彊大家充實涼土軍舉之日東西齊勢此計之得者浩又上五寅元歴表曰太宗即位元年勅臣解急就章孝經論語詩尚書春秋禮記周易三年成訖復詔臣學天文星歴易式九宮無不盡看三十九年晝夜無廢臣禀性弱劣力不及健婦人更無餘能是以專心思書忘寢與食至乃夢共鬼爭義遂得周公孔子之要術始知古人有虚有實妄語者多眞正者少自秦始皇焚書之後經典絶滅漢髙祖以來世人妄造歴術者十餘家皆不得天道之正大誤四千小誤甚多不可言盡臣愍其如此今遭陛下太平之世除僞從眞宜改誤歴以從天道是以臣前奏造歴今始成訖謹以奏呈惟垂恩省察以臣歴術宣示中書博士然後施用非但時人天地鬼神知臣得正可以益國家萬世之名過於三皇五帝矣浩又以晉書諸家並多誤著晉後書未就傳世者五十餘卷初道武詔祕書郎鄧淵著國記十餘卷編年次事體例未成逮于眀元廢而不述神䴥二年詔集諸文人摭錄國書浩及弟覽髙讜鄧頴鼂繼范享黄輔等共參著作敘成國書三十卷著作令史太原閔湛趙郡郗摽素諂事浩乃請立石銘刋載國書以彰直筆并勒浩所注五經浩贊成之景穆善焉遂營於天郊東三里方百步用功三百萬乃訖浩所著國記盡述國事備而不典而石銘顯在衢路北人咸悉忿毒相與譖浩於帝帝大怒使有司按浩取祕書郎史及長歴生數百人意狀浩服受賕太平眞君十一年六月誅浩清河崔氏無遠近及范陽盧氏太原郭氏河東栁氏皆浩之姻親盡夷其族其祕書郎史已下盡死浩始弱冠太原郭逸以女妻之浩晚成不曜華采故時人未之知也逸妻王氏即宋鎭北將軍王仲德姊也每奇浩才能自以爲得佳壻俄而女亡王氏深以傷恨復以少女繼㛰逸及親屬以爲不可王氏固執與之逸不能違遂重結好浩非毁佛法而妻郭氏好釋典時時讀誦浩怒取而焚之捐灰於厠中及浩幽縶置之檻内送於城南使衞士數十人溲其上呼聲嗷嗷聞于行路自宰司之被戮辱未有如浩者世皆以爲報應之驗也初浩之害李順基萌已成夜夢秉火爇順寢室火作而順死浩與室家羣立而觀之俄而順弟息號哭而出曰此輩吾賊也以戈擊之悉投於河寤而惡之以告館客馮景仁景仁曰此眞不善也非復虚事夫以火爇人暴之極也且兆始惡者有終殃積不善者無餘慶厲階成矣公其圖之浩曰吾方思之而不能悛至是而族浩既工書人多託寫急就章從少至老初不憚勞所書蓋以百數必稱爲代疆以示不敢犯國其謹也如此浩書體勢及其先人而妙巧不如也世寶其迹多裁割綴連以爲模楷浩母盧諶孫女也浩著食經序曰余自少及長耳目聞見諸母諸姑所修婦功無不藴習酒食朝夕養舅姑四時供祭祀雖有功力不任僮使常手自親焉昔遭喪亂饑饉仍臻饘蔬餬口不能具其物用十餘年間不復備設先妣慮久廢忘後生無所知見而少不習書乃占授爲九篇文辭約舉婉而成章聰辯彊記皆此類也親沒之後遇國龍興之會平暴除亂拓定四方余備位台鉉與參大謀賞獲豐厚牛羊蓋澤貲累鉅萬衣則重錦食則粱肉遠惟平生季路負米之時不可復得故序遺文垂示來世浩弟簡字仲亮一名覽好學少以善書知名道武初歴中書侍郎爵五等侯參著作事卒簡弟恬字叔元小名白位豫州刺史爵武陽侯坐浩伏誅宏祖悅與范陽盧諶並以博藝齊名諶法鍾繇悅法衞瓘而俱習索靖之草皆盡其妙諶傳子偃偃傳子邈悅傳子潛潛傳子宏世不替業故魏初重崔盧之書宏自非朝廷文誥四方書檄初不妄染故世無遺文尤善草𨽻爲世摹楷行法特盡精巧而不見遺迹始宏因苻氏亂欲避地江南爲張願所獲本圖不遂乃作詩以自傷而不行於世蓋懼罪也浩誅中書侍郎髙允受勅收浩家書始見此詩允知其意允孫綽錄於允集初宏父潛爲兄渾等誄手筆本草延昌初著作佐郎王遵業買書於市遇得之年將二百寶其書迹深藏祕之武定中遵業子松年將以遺黄門郎崔季舒人多摹榻之左光祿大夫姚元􅋆以工書知名於時見潛書以爲過於已也宏弟徽字元猷少有文才與渤海髙演俱知名歴位祕書監賜爵貝邱侯樂安王範鎭長安選舊德之士與俱範以徽爲平西將軍副將行樂安王傅進爵濟南公徽爲政務存大體不親小事性好人倫引接賔客或談及平生或講論道義誨誘後進終日不止以疾徵還京師卒諡曰元公士類無不歎息始清河崔寛祖肜隨晉南陽王保避地隴右遂仕西涼及沮渠氏肜生剖字伯宗每慷慨有懐東土常歎曰風雨如晦雞鳴不已吾所庶幾及太武西廵剖乃總率同義使子寛送款太武嘉之拜寛岐陽令賜爵延水男遣使與寛俱西撫慰初附徵剖詣京師未至而卒文成以剖誠著先朝贈涼州刺史武陵公諡曰元寛字景仁還京封安國子位𢎞農太守初寛通欵見浩浩與相齒次厚存接之及浩誅以遠來疎族獨得不坐遂家于武城居司空林舊墟以一子繼浩與浩弟覽妻封氏相奉如親寛後襲爵武陵公陜城鎭將三崤地險人多刼寇而寛性滑稽誘接豪右宿盗魁帥與相交結傾衿待遇不逆細微莫不感其意氣時官無祿力唯取給於人寛善撫納招致禮遺大有取受而與之者無恨又𢎞農出漆蠟竹木之饒路與南通貿易來往家産豐富而百姓樂之諸鎭之中號曰能政及解鎭人人追戀詣闕上疏者三百餘人卒遺言薄葬斂以時服長子衡字伯玉少以孝行著稱學崔浩書頗亦類焉天安元年擢爲内祕書中散班下詔命及御所覽書多其迹也衡舉李冲李元愷程駿等終爲名器承眀元年遷内都坐令善折獄孝文嘉之太和二年襲爵武陵公衡涉獵書史頗爲文筆蠕蠕時犯塞衡上疏陳備禦之方便國利人之䇿凡五十餘條除秦州刺史徙爵齊郡公先是河東年饑刼盗大起衡至修龔遂法勸課農桑周年間寇盗止息卒贈冀州刺史諡惠公衡五子長子敞字公世襲爵例降爲侯爲平原相敞性狷急與刺史楊椿迭相表列敞坐免官宣武初爲鉅鹿太守弟朏之逆敞爲黄太軍主韓文殊所藏其家悉見籍沒唯敞妻李氏以公主之甥自隨奴婢田宅二百餘口得免正光中普釋禁錮敞復爵郡侯卒於趙郡太守敞弟鐘字公祿奉朝請弟胐之逆以出後被原歴司徒右長史金紫光祿大夫冀州大中正敞亡後鐘貪其財誣敞息子積等三人非兄允辭訴累世人士嫉之爾朱世隆爲尚書令奏除其官終身勿齒胐好學有文才爲京兆王愉錄事參軍與愉同逆伏法宏同郡董謐謐父京與同郡崔康時霍原等俱以碩學播名遼海謐好學傳父業中山平入朝拜儀曹郎撰朝覲饗宴郊廟社稷之儀張袞字洪龍上谷沮陽人也祖翼遼東太守父卓昌黎太守衮篤實好學有文才初爲郡五官掾道武爲代王選爲左長史從道武征蠕蠕追之五六百里諸部帥因衮言糧盡不宜深入帝問衮若殺副馬足三日食乎皆言足也帝乃倍道追之及於廣漠赤地南林山下大破之既而帝問衮卿曹外人知我問三日糧意乎對曰皆莫知也帝曰此易知耳蠕蠕奔走數日畜産失飲至水必留計其道程三日足及輕騎卒至出其不意彼必驚散其勢然矣衮以帝言出告部帥咸曰聖策長遠非愚近所及衮常參大謀決策幃幄帝器之禮遇優厚衮每告人曰昔樂毅杖策於燕昭仲達委身於魏武蓋命世難可期千載不易遇主上天姿傑邁逸志陵霄必能囊括六合混一四海夫遭風雲之會不建騰躍之功者非人豪也遂策名委質竭誠伏事時劉顯地廣兵彊跨有朔裔㑹其兄弟乖離共相疑阻衮言於道武曰顯志大意高今因其内釁宜速乘之帝從之遂破走顯又從破賀訥道武登勿居山遊宴從官請聚石為峯以記功德乃命衮為文慕容寶之來寇也衮言於帝曰寶乘滑臺之功因長子之㨗傾資竭力難與争鋒愚以為宜羸師卷甲以侈其心帝從之果破之參合皇始初遷給事黃門侍郎道武南伐師次中山衮言於帝曰寶憑三世之資城池之固雖皇威震赫勢必擒殄然窮兵極武非王者所宜若酈生一說田横委質魯連飛書聊將授首臣誠德非古人略無奇䇿仰憑威靈庶必有感衮乃遺寶書喻以成敗寶見書大懼遂奔和龍既克中山聽入八議拜奮武將軍幽州刺史賜爵臨渭侯衮清儉寡欲勸課農桑百姓安之天興初徵還京師後與崔逞答晉將郗恢書失旨黜爲尚書令史衮遇創業之初始以才謨見任率心奉上不顧嫌疑帝曾問南州人於衮衮與盧溥州里數稱薦之又未嘗與崔逞相見聞風稱美及中山平盧溥聚黨爲逆崔逞答書不允並乖夲言故忿之衮年過七十闔門守靜手執經書刋定乖失愛好人物善誘無倦士類以此髙之永興二年疾篤上疏後數日卒年七十二太武後追錄舊勲遣大鴻臚即衮墓冊贈太保諡文康公子度少有學尚襲爵臨渭侯卒於中都大官度子白澤年十一遭母憂以孝聞長而博學文成初除殿中曹給事中甚見寵任白澤夲名鍾葵獻文賜名白澤納其女爲嬪出行雍州刺史清心少欲民吏安之獻文詔諸監臨官取所監羊一口酒一斛者罪至大辟與者以從坐論糾得尚書以下罪狀者各隨所糾官輕重而授之白澤以爲此法若行之不已恐姦人窺望勞臣解節請依律令舊法獻文納之太和初懐州人伊祁茍初三十餘人謀反文眀皇太后欲盡誅一城人白澤諫以爲周書父子兄弟罪不相及不誣十室而况一州后從之乃止轉散騎常侍殿中尚書卒贈相州刺史廣平公諡曰簡長子倫字天念大司農少卿燕州大中正熙平中蠕蠕主醜奴遣使來朝抗敵國之禮不修臣敬朝議將依漢答匈奴故事遣使報之倫表以爲虜雖慕德亦來觀我懼之以彊儻或歸附示之以弱窺覦或起春秋所謂以我卜也髙祖世宗知其若此來既莫逆去又不追必其委質玉帛之辰屈膝藩方之禮則豐其勞賄藉以珍物至於王人遠役銜金虜庭優以匹敵之尊加之想望之寵恐徒生虜慢無益聖朝不從孝莊初卒於大司農卿衮弟恂列在循吏傳鄧淵字彥海安定人也祖羌苻堅車騎將軍父翼河間相慕容垂之圍鄴以爲冀州刺史爵眞定縣侯翼拒對使者曰先君忠于秦室翼豈可先叛乎忠臣不事二主未敢聞命垂喻遣之曰吾與車騎結爲異姓兄弟卿亦猶吾子弟安得辭乎翼曰冀州宜任親賢翼請他役効命垂乃用爲河間太守後卒於趙郡内史淵性貞素言行可復博覽經書長於易筮道武定中原擢爲著作郎再遷尚書吏部郎淵眀制度多識故事與尙書崔宏參定朝儀律令音樂及軍國文記詔䇿多淵所爲從征平陽以功賜爵下博子加中壘將軍道武詔淵撰國記十餘卷唯次年月起居行事而已未有體例淵謹於朝事未嘗忤旨其從父弟暉時爲尚書郎兇俠好奇與定陵侯和跋厚跋有罪誅其子弟奔長安或告暉將送出之由是道武疑淵知情遂賜淵死既而悔之時人咸愍惜焉子頴襲爵稍遷中書侍郎太武詔太常卿崔浩集諸文學撰述國書頴與浩弟覽等俱參著作事太武幸漠南髙車莫弗庫若干率騎數萬餘驅鹿百餘萬詣行所詔頴爲文銘於漠南以記功德兼散騎常侍使宋進爵爲侯卒諡曰文恭子怡襲爵位荆州刺史賜爵南陽公卒子侍孝文賜名述位齊州刺史初改置百官始重公府元佐以述爲太傅元丕長史卒於司空長史諡曰貞長孫嵩代人也父仁昭成時爲南部大人嵩寛雅有器度昭成賜名焉年十四代父統事昭成末年諸部乖亂苻堅使劉庫仁攝國事嵩與元他等率部衆歸之劉顯之謀難也嵩率舊人及庶師七百餘家叛顯走將至五原時寔君之子烏渥亦聚衆自立嵩欲歸之見烏渥烏渥稱逆父之子勸嵩歸道武嵩未決烏渥廻其牛首嵩黽勉從之見道武于三漢亭道武以爲南部大人累著軍功後從征中山除冀州刺史賜爵鉅鹿公歴侍中司徒相州刺史改封南平公所在著稱眀元即位與山陽侯奚斤北新侯安同白馬侯崔宏等八人坐止車門右聽理萬機故世號八公晉將劉裕之伐姚泓眀元假嵩節督山東諸軍事傳詣平原緣河北岸列軍次於畔城軍頗失利詔假裕道裕於舟中望嵩麾蓋遺以酃酒及江南食物嵩皆送京師詔嵩厚答之又勅簡精兵爲戰備若裕西過者便率精銳南出彭沛如不時過但引軍隨之彼至崤陜間必與姚泓相持一死一傷衆力疲弊比及秋月徐乃乘之則裕首可不戰而縣矣於是叔孫建等尋河趣洛遂入關嵩與建等自成臯南濟晉諸屯戍皆望塵奔潰裕尅長安嵩乃班師眀元寢疾問後事於嵩嵩曰立長則順以德則人服今長皇子賢而世嫡天所命也請立乃定䇿詔太武臨朝監國嵩爲左輔太武即位進爵北平王司州中正詔問公卿赫連蠕蠕征討何先嵩與平陽王長孫翰司空奚斤等曰赫連土居未能爲患蠕蠕世爲邊害宜先討大檀及則收其畜産足以富國不及則校獵陰山多殺禽獸皮肉筋角以充軍實亦愈於破一小國太常崔浩曰大檀遷徙鳥逝疾追則不足經久大衆則不能及之赫連屈丐土宇不過千里其刑政殘虐人神所棄宜先討之尚書劉絜武京侯安原請先平馮跋帝黙然遂西廵狩後聞屈丐死關中大亂議欲征之嵩等曰彼若城守以逸待勞大檀聞之乘虚而寇此危道也帝乃問幽微於天師寇謙之謙之勸行杜超之贊成之崔浩又言西伐利嵩等固諫不可帝大怒責嵩在官貪汚使武士頓辱尋遷太尉久之加柱國大將軍自是輿駕征伐嵩以元老多留鎭京師坐朝堂平斷刑獄薨年八十諡曰宣王後孝文追錄先朝功臣以嵩配饗廟庭子頽善騎射彎弓三百斤襲爵加侍中征南大將軍有罪黜爲戍兵後復爵薨諡曰安王子敦字孝友位北鎭都將坐黷貨降爲公孝文時自訟先世勲重帝復其王爵薨諡曰簡王子道字念僧襲爵久之隨例降爲公位右衞將軍卒諡曰愼子悅襲爵建義初復夲王爵尋降爲公位光祿少卿卒贈司空嵩五世孫儉仕周知名有傳嵩從子道生忠厚亷謹道武愛其謹重使掌機密與賀毗等四人内侍左右出入詔命眀元即位除南統將軍冀州刺史後取人美女以獻眀元切責之以舊臣不加罪黜太武即位進爵汝陰公遷廷尉卿從征蠕蠕與尉眷等率衆出白黑兩漠間大㨗而還太武征赫連昌道生與司徒長孫翰宗正娥清爲前驅遂平其國昌弟定走保平涼宋遣將到彥之王仲德寇河南以救定詔道生與丹陽王太之屯河上以禦之遂誘宋將檀道濟邀其前後追至歴城而還除司空加侍中進封上黨王薨年八十二贈太尉諡曰靖道生亷約身爲三司而衣不華飾食不兼味一熊皮障泥數十年不易時人比之晏嬰第宅卑陋出鎭後其子弟頗更修繕起堂廡道生還歎曰昔霍去病以匈奴未滅無用家爲今彊寇尚游魂漠北吾豈可安坐華美也乃切責子弟令毁其宅太武世所在著績每建大議多合時機爲將有權略善待士衆帝命歌工歴頌羣臣曰智如崔浩亷如道生及年老頗惑其妻孟氏以此見譏與從父嵩俱爲三公當世以爲榮子抗位少府卿早卒抗子觀少以壯勇知名後襲祖爵上黨王時異姓諸王襲爵多降爲公帝以其祖道生佐命先朝故特不降以征西大將軍假司空督河西七鎭諸軍討吐谷渾部帥拾寅拾寅遁藏焚其城邑而還孝文初拜殿中尚書侍中吐谷渾又侵逼復假觀司空討降之後爲征南大將軍薨諡曰定葬禮依其祖靖王故事陪葬雲中金陵子冀歸六歲襲爵降爲公孝文以其幼承家業賜名幼字承業承業聰敏有才藝虚心愛士爲前將軍從孝文南討宣武時爲揚州刺史假鎭南大將軍都督淮南諸軍事梁將裴䆳虞鴻襲據壽春承業諸子驍果䆳頗難之號曰鐵小兒詔河間王琛總衆援之琛欲決戰承業以雨久更須持重琛弗從遂戰爲賊所乘承業後殿初承業既總彊兵久不決戰議者疑有異圖朝廷重遣河間王琛及臨淮王彧尚書李憲等三都督外聲助承業内實防之會鮮于修禮反於中山以承業爲大都督北討尋以夲使達鄴城詔承業解行臺罷大使遣河間王琛爲大都督酈道元爲行臺承業遣子子裕奉表稱與琛同在淮南俱當國難琛敗臣全遂生私隙且臨機奪帥非䇿所長書奏不納琛與承業前到呼沲承業未欲戰而琛不從行達五鹿爲修禮邀擊琛不赴之賊總至遂大敗承業與琛並除名尋而正平蜀郡反復假承業鎭西將軍討蜀都督頻戰有功除平東將軍復夲爵後除尚書右僕射未幾雍州刺史蕭寶夤據州反復以承業爲行臺討之承業時背疽未愈靈太后勞之曰卿疹源如此朕欲相停更無可寄如何承業答曰死而後已敢不自力時子彥亦患脚痺扶杖入辭尚書僕射元順顧相謂曰吾等備爲大臣各居寵位危難之日病者先行無乃不可乎莫有對者時薛鳳賢反於正平薛修義屯聚河東分據鹽池攻圍蒲坂東西連結以應寶夤承業乃據河東時有詔廢鹽池稅承業上表曰鹽池天資賄貨密邇京畿唯須寶而䕶之均贍以理今四境多虞府庫罄竭然冀定二州且亡且亂常調之絹不可復收仰惟府庫有出無入必須經綸出入相補略論鹽稅一年之中凖絹而言猶不應減三十萬疋也便是移冀定二州置於畿甸今若廢之事同再失臣前仰違嚴旨而先討關賊徑解河東者非是閑長安而急蒲坂蒲坂陷沒失鹽池三軍口命濟贍理絶天助大魏兹計不爽昔髙祖昇平之年無所乏少猶創置鹽官而加典䕶非爲物而競利恐曰利而亂俗也况今王公素餐百官尸祿租徵六年之粟調折來歲之資此皆出入私財奪人膂力豈是願言事不獲已臣輙符司監將尉還率所部依常收稅更聽後勅及雍州平除雍州刺史孝莊初封上黨王尋改馮翊王後降爲郡公遷司徒公加侍中兼尚書令大行臺仍鎭長安節閔立遷太尉公錄尚書事及韓陵之敗斛斯椿先據河橋謀誅爾朱使承業入洛啓節閔誅世隆兄弟之意孝武初轉太傅以定䇿功更封開國子承業表請廽授其姨兄廷尉卿元洪超次子惲初承業生而母亡爲洪超母所撫養是以求讓許之孝武入關承業時鎭虎牢亦隨赴長安位太師錄尚書事封上黨王大統元年薨贈假黄鉞大丞相都督三十州諸軍事雍州刺史諡曰文宣承業少輕俠鬭雞走馬力爭殺人因亡抵龍門將陳興德家會赦得免因以後妻羅前夫女呂氏妻興德兄興恩以報之羅年大承業十餘歲酷妬忌承業雅相敬愛無姬妾童侍之中在承業左右嫌疑致死者乃有數四前妻張氏二子子彥子裕羅生三子紹遠士亮季亮兄弟皆雄武子彥夲名雋有膂力以累從父征討功封槐里縣子孝武帝與齊神武搆隙加子彥中軍大都督行臺僕射鎭𢎞農以爲心膂及從帝入關封髙平郡公位儀同三司以從征竇泰戰沙苑功加開府侍中及東復舊京以子彥兼尚書令行司州牧留鎭洛陽後以不利班師大統七年拜太子太傅子彥少嘗墜馬折臂肘上起骨寸餘乃命開肉鋸骨流血數升言戲自若時以爲踰於關羽末年石發舉體生瘡雖親戚兄弟以爲惡疾子彥曰惡疾如此難以自眀世無良醫吾其死矣嘗聞惡疾蝮蛇螫之不痛試爲求之當令兄弟知我乃於南山得蛇以股觸之痛楚號呌俄而腫死文帝聞之慟哭曰失我良將贈雍州刺史子裕位衞尉少卿啓捨汎階十七級爲子義貞求官除左衞將軍加通直散騎常侍又以父勲封平原縣侯抗弟禮少以父任爲散騎侍郎與襄城公盧魯元等内侍恭敏有才志太武寵信之曰其父親近吾祖其子在我左右不亦宜乎長孫肥代人也昭成時年十三以選内侍少有雅度果毅少言道武之在獨孤及賀蘭部常從禦侮左右帝深信仗之登國初與莫題等俱爲大將屢有軍功後從平中山以功賜爵琅邪公遷衞尉卿改爵盧鄉時中山太守仇儒不樂内徙亡匿趙郡推趙准爲主妄造祅言云燕東傾趙當續欲知其名淮水不足准喜而從之自號鉅鹿公儒爲長史據關城連引丁零殺害長吏肥討破准於九門斬仇儒禽准詔以儒肉食准傳送京師轘之於市夷其族除肥兖州刺史姚平之寇平陽道武徵肥與毗陵王順等爲前鋒平退保柴壁帝進攻屠之遣肥還鎭兖州撫慰河南威信著於淮泗肥善䇿謀勇冠諸將前後征討未嘗失敗故每有大難令肥當之南平中原西摧羌寇肥功居多賞賜千計後降爵藍田侯卒諡曰武陪葬金陵子翰襲爵翰少有父風道武時以善騎射爲獵郎眀元之在外翰與元磨渾等潛謀奉迎眀元即位與磨渾等拾遺左右以功累遷平南將軍率衆鎭北境威名甚著太武即位封平陽王蠕蠕大檀之入寇雲中太武親征之遣翰與東平公娥清出長川討大檀大檀北遁追擊尅獲而還遷司徒從襲赫連昌破之翰清正嚴明善撫將士薨太武為之流涕親臨其喪喪禮依安成王叔孫俊故事諡曰威陪葬金陵子成襲爵降為公位南部尚書卒陪葬金陵翰弟陵位駕部尚書性寛厚好學愛士封吳郡公卒贈吳郡王諡曰恭陪葬金陵于栗磾代人也少習武藝材力絶人能左右馳射登國中拜冠軍將軍假新安子與寧朔將軍公孫蘭潛自太原從韓信故道開井陘關路襲慕容寶於中山道武後至見道路修治大悅賜以名馬及趙魏平帝置酒髙會謂栗磾曰卿吾之黥彭也進假新安公道武田於白登山見熊將數子顧謂栗磾曰卿勇幹如此能搏之乎對曰天地之性人為貴若搏之不勝豈不虚斃一壯士自可驅致御前坐而制之尋皆禽獲帝顧謝之後為河内鎭將劉裕之伐姚泓也栗磾慮裕侵擾河北築壘河上裕憚之遺栗磾書假道西上題曰黒矟公麾下栗磾以狀表聞明元因之授栗磾黑矟將軍栗磾好持黑矟裕望而異之故有其號也永興中關東羣盗大起西河反叛栗磾受命征伐所向皆平遷豫州刺史進爵新安侯洛陽雖歴代所都實為邊界栗磾安集之甚得百姓歡心明元南幸孟津謂栗磾曰河可橋乎栗磾曰杜預造橋遺事可想乃編次大船為橋於野坂六軍既濟帝深歎美之太武之征赫連昌勅栗磾與宋兵將軍周幾襲陜城長驅至三輔進爵為公累遷外都大官平刑折獄甚有聲稱卒年七十五賜東園祕器朝服一具衣一襲贈太尉栗磾自少總戎迄於白首臨事善斷所向無前加以謙虚下士刑罰不濫太武甚悼惜之子洛拔有姿容善應對拜侍御中散太武甚加愛寵因賜名焉轉監御曹令景穆在東宮厚加禮遇洛拔恒畏避屏退不敢逆自結納頃之襲爵後爲侍中尚書令百僚憚之卒於官洛拔有六子長子烈善射少言有不可犯之色少拜羽林中郎累遷侍中殿中尚書于時孝文幼冲文明太后稱制烈與元丕陸叡李冲等各賜金䇿許以有罪不死進爵洛陽侯轉衞尉卿及遷都洛陽人情戀本多有異議帝以問烈烈曰陛下聖略深遠非愚管所測若隱心而言樂遷之與戀舊中半耳帝曰卿不唱異同朕深感不言之益勅鎭代留臺庶政一相參委車駕幸代執烈手曰宗廟至重翼衞不輕卿當祇奉靈駕時遷洛邑烈與髙陽王雍奉神主於洛陽遷光祿卿十九年大選百僚子登引例求進烈表引已素無敎訓請乞黜落帝曰此乃有識之言不謂烈能辦此乃引見登詔曰朕今創禮新邑明揚天下卿父乃行謙讓之表而有直士之風故進卿為太子翊軍校尉又加烈散騎常侍封聊城縣子及穆泰陸叡謀反舊京帝幸代泰等伏法賜烈及李冲璽書述叙金策之意時代鄉舊族同惡者多唯烈一宗無所染預帝益器重之歎曰元儼決斷威恩深自不惡然盡忠猛決不如烈也爾日烈在代都必即斬其五王元首烈之節槩不謝金日磾詔除領軍將軍以本官從征荆沔加鼓吹一部二十三年齊將陳顯達入寇馬圈帝輿疾討之執烈手以京邑為託帝崩於行宮彭城王勰祕諱而返稱詔召宣武會駕魯陽以烈留守之重密報凶問烈處分行留神色無變宣武即位寵任如前咸陽王禧為宰輔權重當時曾遣家僮傳言於烈求舊羽林虎賁執仗出入烈不許禧遣謂烈曰我是天子兒天子叔元輔之命與詔何異烈厲色答曰向亦不道王非天子兒叔若是詔應遣官人所由若遣私奴索官家羽林烈頭可得羽林不可得也禧惡其剛直出之為恒州刺史烈不願蕃授謂彭城王勰曰殿下忘先帝南陽之詔乎而逼老夫乃至於此遂以疾辭宣武以禧等專擅潛謀廢之景明二年正月初祭三公致齋於廟帝夜召烈子忠謂曰卿父明可早入及明烈至詔曰諸父怠慢今欲使卿以兵召之卿其行乎烈曰老臣歴奉累朝頗以幹勇賜識今日之事所不敢辭乃將直閤以下六十餘人宣旨召咸陽王禧彭城王勰北海王詳衞送至帝前諸公各稽首歸政以烈為領軍進爵為侯自是長直禁中機密大事皆所參焉咸陽王禧之謀反宣武從禽於野左右分散倉卒之際莫知其計乃勅烈子忠馳覘虚實烈時留守已處分有備因忠奏曰臣雖朽邁心力猶可禧等猖狂不足為慮願緩蹕徐還以安物望帝甚以為慰車駕還宮禧已逃詔烈追執之順后既立以世父之重彌見優禮及卒宣武舉哀於朝堂給東園第一祕器贈太尉鉅鹿郡公子祚襲祚弟忠字思賢本字千年弱冠拜侍御中散文明太后臨朝刑政頗峻侍臣左右多以微譴得罪忠朴直少言終無過誤太和中授武騎侍郎因賜名登累遷左中郎將領直寢元禧之亂車駕在外變起倉卒忠曰臣父為領軍計必無慮帝遣忠馳觀之烈嚴備果如所量忠還宣武撫其背曰卿差彊人意先帝賜卿名登誠為美稱朕嘉卿忠款今改名忠既表貞固之誠亦以名實相副也以父憂去職徙為司徒長史時太傅錄尚書北海王詳親尊權重將作大匠王遇多隨詳所欲而給之忠於詳前謂遇曰殿下國之周公阿衡王室何至阿諛附勢損公惠私也遇既不寧詳亦慙謝以平元禧功封魏郡公及遷散騎常侍兼武衞將軍每以鯁氣正辭為北海所忿面責忠曰我憂在前見爾死不憂爾見我死時也忠曰人生自有定分若應死王手避亦不免不爾王不能殺詳因忠表讓之際密勸帝以忠為列卿於是詔停其封優進太府卿正始二年詔忠以本官使持節兼侍中為西道大使刺史鎭將贓罪顯暴者以狀聞守令以下便行決斷與尚書李崇分使二道忠劾并州刺史髙聰贓罪二百餘條論以大辟除華州刺史遭繼母憂不行服闋再遷衞尉卿河南邑中正忠與吏部尚書元暉度支尚書元匡河南尹元萇等推定代方姓族髙肇忌其為人乃言於宣武稱中山要鎭作捍須才乃出忠為定州刺史既而帝悔復授衞尉卿領左將軍恒州大中正密遣使詣忠慰勉之延昌初除都官尚書領左衞中正如故又加散騎常侍嘗因侍宴賜之劒杖舉酒屬忠曰卿世執貞節故恒以禁衞相委昔以卿行忠賜名曰忠今以卿才堪禦侮以所御劒杖相錫循名取義意在不輕出入恒以自防也遷侍中領軍將軍忠辭無學識宣武曰學識有文章者不少但心直不如卿欲使卿劬勞於下我當無憂於上及帝崩夜忠與侍中崔光遣右衞將軍侯剛迎明帝於東宮而即位忠與門下議以帝沖年未親機政太尉髙陽王雍屬尊望重宜入居西栢堂省決庶政任城王澄明德茂親可為尚書令總攝百揆奏中宮請即勅授御史中尉王顯欲逞姦計與中常侍給事中孫蓮等厲色不聽寢門下之奏孫蓮等密欲矯太后令以髙肇錄尚書事顯與髙猛為侍中忠即殿下收顯殺之忠既居門下又總禁衞遂執朝政權傾一時初太和中軍國多事孝文以用度不足百官祿四分減一忠既擅朝欲以惠澤自固乃悉復所減之祿職人進位一級舊制百姓絹布一疋之外各輸綿麻八兩忠悉以與之乃白髙陽王雍自云宣武本許優轉雍憚忠威權便順意加忠車騎大將軍忠自謂新故之際有安社稷功諷百寮令加己賞太尉清河王懌廣平王懷難違其意封忠恒山郡公忠又難於獨受乃諷朝廷同在門下者並加封邑尚書左僕射郭祚尚書裴植以忠權勢日盛勸雍出忠忠聞之逼有司誣奏其罪祚有師傅舊恩植擁地入國忠並矯詔殺之朝野憤怨無不切齒王公以下畏之累跡又欲殺髙陽王雍侍中崔光固執乃止遂免雍太尉以王還第自此詔命生殺皆出於忠既尊靈太后為皇太后居崇訓宮忠為儀同三司尚書令崇訓衞尉侍中領軍如故靈太后臨朝解忠侍中領軍崇訓衞尉止為儀同尚書令侍中忠為令旬餘靈太后引門下侍官問忠在端右聲聽咸曰不稱厥任乃出為冀州刺史太傅清河王等奏忠擅殺樞納輙廢宰輔朝野駭心遠近怪愕功過相除悉不合賞請悉追奪靈太后從之熙平元年御史中尉元匡奏忠以鴻勲盛德受遇累朝幸國大災專擅朝命無人臣之心裴郭受寃於既往宰輔黜辱於明世又自矯旨為儀同三司尚書令領崇訓衞尉原其此意便欲無上自處既事在恩後宜加顯戮請遣御史一人令史二人就州行決靈太后令以忠事經肆眚遂不追罪又詔以忠歴任禁要誠節皎然賜爵靈壽縣公初宣武崩後髙太后將害靈太后劉騰以告侯剛剛以告忠忠請計於崔光光曰宜置胡嬪於别所嚴兵守衞忠從之具以此意啓靈太后太后意乃安故太后深德騰等四人並有寵授忠以毁之者多懼不免禍願還京欲自營救靈太后不許二年四月除尚書右僕射加侍中將軍如故神龜元年三月復儀同三司疾未拜見裴郭為祟自知必死先表養亡弟第二子司徒掾永超為子乞以為嫡靈太后許之薨贈司空有司奏太常少卿元端議案諡法剛彊正直曰武怙威肆行曰醜宜諡武醜公太常卿元修義議忠盡心奉上剪除凶逆依諡法除偽寧眞曰武夙夜恭事曰敬宜諡武敬公二卿不同靈太后令依正卿議忠性多阻忌不交勝已唯與直閤將軍章初瓌千牛備身楊保元為斷金之交李世哲求寵於忠私以金帛貨初瓌保元二人談之遂被賞愛引為腹心忠擅權昧進為崇訓之由皆世哲計也忠弟景字百年忠薨後為武衞將軍謀廢元义义黜為懷荒鎭將及蠕蠕主阿那瓌叛鎭人請糧景不給鎭人遂執縛景及其妻拘守别室皆去其衣服令景著皮裘妻著故絳旗襖毁辱如此月餘乃殺之烈弟果嚴毅直亮有父兄風歴朔華并恒四州刺史賜爵武城子果弟勁勁字鐘葵頗有武略位沃野鎭將賜爵富昌子宣武納其女為后封勁太原郡公妻劉氏為章武郡君後為征北將軍定州刺史卒贈司空諡曰恭莊公自栗磾至勁累世貴盛一皇后四贈公三領軍二尚書令三開國公勁雖以后父但以順后且崩竟不居公輔子暉字宣明后母弟也少有氣幹襲爵位汾州刺史暉善事人為爾朱榮所親以女妻其子長儒歴侍中河南尹後兼尚書僕射東南道行臺與齊神武討平羊侃於兖州元顥入洛害之勁弟天恩位内行長遼西太守贈平東將軍燕州刺史天恩子仁生位太中大夫仁生子安定平原郡太守高平郡都將安定子子提隴西郡守茂平縣伯周保定二年以子謹著勲追贈太保建平郡公謹自有傳崔逞字叔祖清河東武城人魏中尉琰之五世孫也曾祖諒晉中書令祖遇仕石氏為特進父瑜黃門郎逞少好學有文才仕慕容暐補著作郎撰燕記遷黃門侍郎暐滅苻堅以為齊郡太守堅敗仕晉歴清河平原二郡太守為翟遼所虜以為中書令慕容垂滅翟釗以為祕書監慕容寶東走和龍為留臺吏部尚書及慕容驎立逞擕妻子歸魏張衮先稱美之由是道武禮遇甚厚拜尚書錄三十六曹别給吏屬居門下省尋除御史中丞道武攻中山未尅六軍乏糧問計於逞逞曰飛鴞食葚而改音詩稱其事可取以助軍糧帝雖銜其侮慢然兵既須食乃聽人以葚當租逞又言可使軍人及時自取過時則落盡帝怒曰内賊未平兵人尚可解甲收葚乎以中山未拔故不加罪及姚興侵晉襄陽戍將郗恢馳使乞師於恒山王遵書云賢兄虎步中原道武以為悖君臣之體勅逞與張衮為遵書答使亦貶其主號以報之逞衮為書乃云貴主帝怒其失旨黜衮遂賜逞死後晉荆州刺史司馬休之等數十人為桓元所逐皆將來奔至陳留聞逞被殺分為二輩一奔長安一奔廣固帝聞深悔自是士人有過多見優容逞子諲毅褘嚴頤初逞之内徙終慮不免乃使其妻張氏與四子歸慕容德於廣固獨與小子頤在代京及逞死亦以此為譴頤字太沖位散騎常侍賜爵清河侯太武聞宋以其兄諲為冀州刺史乃曰義隆用其兄我豈無冀州地邪乃以頤為冀州刺史入為大鴻臚持節策拜楊難當為南秦王奉使數返光揚朝命太武善之後與方士韋文秀詣王屋山造金丹不就太平眞君初卒始崔浩與頤及滎陽太守模等年皆相次浩為長次模次頤三人别祖而模頤為親浩恃其家世魏晉公卿常侮模浩不信佛道模深所歸向雖糞壤中禮拜形像浩大笑曰持此頭顱不淨處跪是胡神也模嘗謂人曰桃簡可欺我何容輕我周兒也浩小名桃簡頤小名周兒太武頗聞之故浩誅二家獲免頤五子少子叡以交通境外伏誅自逞之死至叡之誅三世積五十餘年在北一門盡矣諲仕宋位青冀二州刺史諲子靈和宋員外散騎侍郎靈和子宗伯始還魏追贈清河太守宗伯子休字惠盛休少孤貧矯然自立舉秀才入京師與宋弁邢巒雅相知友尚書王嶷欽其人望為長子聘休姊贍以財貨由是少振孝文納休妹為嬪頻遷兼給事黃門侍郎休勤學公事軍旅之隙未嘗釋卷禮遇亞于宋弁郭祚孝文南伐以北海王詳為尚書僕射統留臺事以休為尚書左丞詔以北海年少百揆務殷便以委休轉長史兼給事黃門侍郎參定禮儀帝嘗閱故府得舊冠題曰南部尚書崔逞制顧休曰此卿家舊事也後從駕南行及還幸彭城汎舟泗水詔在侍筵觀者榮之宣武初休以祖父未葬弟夤又亡固求出為渤海太守性嚴明雅長政體下車先戮豪猾數人姦盗莫不禽翦清身率下部内安之時大儒張吾貴名盛山東弟子恒數千人所在多不見容休招延禮接使肄業而還儒者稱為口實入為吏部郎中遷散騎常侍權兼選任多所拔擢廣平王懷數引談宴以與諸公交游免官後為司徒右長史公平清潔甚得時譽歴幽青二州刺史皆以清白稱二州懷其德澤入為度支七兵殿中三尚書休久在臺閣明習典故每朝廷疑議咸取正焉諸公咸謂崔尚書下意處不可異也卒贈尚書右僕射諡曰文貞休少而謙退事母孝謹及為尚書子仲文娶丞相高陽王雍女女適元义庶長子舒挾二家勢志氣微改陵藉同列尚書令李崇左僕射蕭寶夤右僕射元欽皆以此憚下之始休母房氏欲以休女妻其外孫邢氏休乃違母情以妻义子論者非之休子㥄知名列在齊史休弟夤字敬禮位太子舍人卒贈樂安太守妻樂安王長女晉寧公主也貞烈有德行子愍字長謙幼聰敏濟州刺史盧尚之欲以長女妻之㥄為長謙求尚之次女曰家道多由婦人欲令姊妹為妯娌尚之感其義於是同日成婚休誡諸子曰汝等宜皆一體勿作同堂意若不用吾言鬼神不享汝祭祀休亡枕中有書如平生所誡諸子奉焉長謙與休第二子仲文同年而月長其家謂之大二小二長謙少與太原王延業俱為著作佐郎監典校書後為青州司馬賊圍城二百日長謙讀書不廢凡手抄八千餘紙天文律厯醫方卜相風角鳥言靡不閑解晚節頗以酒為損遷司徒諮議修起居注加金紫光祿大夫後兼散騎常侍使梁將行謂人曰我戹在吳國忌在酉年今恐不免及還未及境卒年二十八贈南青州刺史逞兄遹字寧祖亦有名於時為慕容垂尚書左丞范陽昌黎二郡太守遹曾孫延壽冀州主簿輕財好施甚收鄉曲譽延壽子隆宗簡率友弟居喪以孝聞仕蘭陵燕二郡太守仁信待物檢復至誠故見重於時卒贈齊州刺史諡曰孝子敬保冀州儀同府中郎卒贈冀州刺史敬保子子恒位魯郡太守早卒子恒弟子安子昇武定中連元謹事伏誅逞宗人模字思範琰兄霸之後也父遵慕容垂少府卿模仕宋為滎陽太守神䴥中平滑臺歸降後賜爵武城男模長者篤厚不營榮利雖為崔浩輕侮而不為浩屈與崔頤相親往來如一家始模在南妻張氏有二子仲智季柔模至京師賜妻金氏生子幼度仲智等以父隔遠乃聚貨規贖之其母張曰汝父志懷無決必不能來行人以賄至都模果顧念幼度等指謂行人曰何忍捨此輩致為刑辱當為爾取一人使名位不減我乃授以申謨宋東郡太守也神䴥中被執賜妻生子靈授申謨聞變乃棄妻子走還江外靈授刑為閹人初太平眞君末模兄協子衺利為宋魯郡太守以郡降賜爵臨淄子拜廣寗太守卒衺利二子懷順次恩仍居宋青州懷順以父入魏故不仕及魏克青州懷順迎衺利喪還青州云王憲字顯則北海劇人也其先姓田秦始皇滅齊田氏稱王家子孫因以為氏仍居海岱祖猛仕苻堅位丞相父休河東太守憲幼孤隨伯父永在鄴苻丕稱尊號復以永為丞相永為慕容垂所殺憲奔清河匿於民家皇始中乃歸魏道武見之曰此王猛孫也厚待之以為本州中正領選曹事兼掌門下太武即位行廷尉卿出為上谷太守賜爵高唐子清身率下風化大行尋拜外都大官復移中都歴任二曹斷獄稱旨進爵劇縣侯出為并州刺史加安南將軍進爵北海公境内清肅及還京師以憲元老特賜錦繡布帛珍羞禮饍天安初卒年八十九諡曰康子崇襲崇弟嶷字道長孝文初為南部尚書在任十四年時南州多事訟者塡門嶷性儒緩不斷終日昬睡李訢鄧宗慶等號為明察而二人終見誅戮餘十數人或出或免唯嶷卒得自保時人為之語曰實癡實昬終得保存後封華山公入為内都大官卒子祖念襲爵祖念弟雲字羅漢頗有風尚位南兖州刺史坐受所部荆山戌主杜䖍財又取官絹因染遂有割易為御史糾劾㑹赦免卒官贈豫州刺史諡文昭子昕晞皓列在齊史封懿字處德渤海蓚人也曾祖釋晉東夷校尉父放慕容暐吏部尚書兄孚慕容超太尉懿有才器能屬文與孚雖器行有長短而名位略齊仕慕容寶位中書令户部尚書寶敗歸魏除給事黃門侍郎都坐大官封章安子道武引見問以慕容舊事懿應對疎慢廢黜還家明元初復徵拜都坐大官進爵為侯卒官懿撰燕書頗行於世子元之坐與司馬國璠温楷等謀亂伏誅臨刑明元謂曰終不令汝絶種也將宥汝一子元之以弟䖍之子磨奴字君明早孤乞全其性命乃殺元之四子赦磨奴刑為宦人崔浩之誅也太武謂磨奴曰汝本應全所以致刑者由浩也後為中曹監使張掖賜爵富城子卒於懷州刺史贈勃海公諡曰定以族子回為後回字叔念孝文賜名焉慕容暐太尉奕之後也父鑒初磨奴既以回為後請於獻文贈鑒寧遠將軍滄水太守回襲磨奴爵富城子宣武時累遷安州刺史安州山民愿朴父子賔旅同寢一室回下車勒令别處其俗遂改明帝時為瀛州刺史時大乘寇亂之後加以水潦表求賑恤免其兵調州内賴之歴度支都官二尚書冀州大中正滎陽鄭雲諂事長秋卿劉騰貨紫纈四百匹得為安州刺史除書旦出晚往詣回坐未定問回安州興生何事為便回曰卿荷國寵靈位至方伯不能拔園葵去織婦宜思方略以濟百姓如何見造問興生乎封回不為商賈何以相示雲慙失色轉七兵尚書領御史中尉劾奏尚書右僕射元欽與從兄麗妻陸氏姦通時人稱之後為殿中尚書右光祿大夫莊帝初遇害河陰贈司空諡曰孝宣長子隆之列在齊史鑒長子琳字彥寶位中書侍郎與侍中南平王馮誕等議定律令有識者稱之歴位太尉長史司宗下大夫南夏青二州刺史光祿大夫琳弟子肅列在文苑傳中懿從兄子愷字思悌奕之孫也父勸慕容垂侍中太常卿愷位給事黃門侍郎散騎常侍入代都名出懿子元之之右俱坐司馬氏事死愷妻盧元女也愷子伯達棄母及妻李氏南奔河表改婚房氏獻文末伯達子休傑内入祖母盧猶存垂百歲矣而李已死休傑位冀州咸陽王府諮議參軍回族叔軌字廣度好學通覽經傳與光祿大夫武邑孫惠蔚同志友善惠蔚每推軌曰封生之於經義吾所弗如者多矣頗自修潔儀容甚偉或曰學士不事修飾此賢何為如此軌聞笑曰君子整其衣冠尊其瞻視何必蓬頭垢面而後為賢言者慙退以兼員外散騎常侍銜命高麗高麗王雲恃其偏遠稱疾不親受詔軌輙正色詰之喻以大義雲乃北面受旨使還轉考功郎中除本郡中正渤海太守崔休入為吏部郎中以已考事干軌軌曰法者天下之事不可以舊君故虧之也休歎其守正軌在臺中稱為儒雅除國子博士假通直散騎常侍慰勞汾州山胡司空清河王懌表修明堂辟雍詔百寮集議軌議曰周官匠人職云夏后氏世室商人重屋周人明堂五室九階四户八牕鄭元曰或舉宗廟或舉王寢或舉明堂互文以見同制然則三代明堂其制一也案周與夏殷損益不同至於明堂因而弗革明五室之義得天數矣是以鄭元又曰五室者象五行也然則九階者法九土四户者達四時八牕者通八風誠不易之大範有國之恒式若其上圓下方以則天地通水環宮以節觀者茅蓋白盛為之質飾赤綴白綴為之户牖皆典籍所載制度之明義也秦焚滅五典變更先聖不依舊憲故呂氏月令見九室之義大戴之禮著十二堂之文漢承秦法亦未能改東西二京俱為九室是以黃圖白虎通蔡邕應劭等咸稱九室以象九州十二堂以象十二辰夫室以祭天堂以布政依行而祭故室不過五依時布政故堂不過四州之與辰非所可法九與十二厥用安在今聖朝欲尊道趨人備禮化物宜則五室以為永制至如廟學之嫌臺沼之雜袁凖之徒已論正矣後卒於廷尉少卿贈濟州刺史初軌深為郭祚所知祚常謂子景尚曰封軌高綽二人並幹國之才必應遠至吾平生不妄進舉而每薦此二人非直為國進賢亦為汝等之津梁其見重如此軌既以方直自業高綽亦以風槩立名高肇拜司徒綽送迎往來軌竟不詣綽顧不見軌乃遽歸曰吾一生自謂無愆規矩今日舉措不如封生遠矣軌以務德愼言修身之本姦回讒佞世之巨害乃為務德愼言遠佞防姦四戒文多不載長子偉伯字君良博學有才思弱冠除太學博士每朝廷大議偉伯參焉雅為太保崔光僕射游肇所知賞太尉清河王懌辟參軍事懌親為孝經解詁命偉伯為難例九條皆發起隱漏偉伯又討論禮傳詩易疑事數十條儒者咸稱之時朝廷將經始明堂廣集儒學議其制度九五之論久而不定偉伯乃搜撿經緯上明堂圖說六卷又撰封氏本錄六卷正光末尚書僕射蕭寶夤為關西行臺引為行臺郎及寶夤為逆偉伯與南平王冏潛結關中豪右韋子粲等謀舉義兵事發見殺永安中贈瀛州刺史聽一子出身無子轉授弟翼通志卷一百四十六
