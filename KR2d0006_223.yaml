body:
  text: 通志卷一百九十九宋右迪功郎鄭樵漁仲撰四夷傳第六北國上北國序略胸奴南胸奴附序略北國之先皆軒轅氏之苗裔世居朔漠稟北方嚴肅之氣故其人天資剛徑喜殺伐習攻戰世與中國為敵在唐虞時則有山戎夏時則有薰粥音育殷時則有鬼方周時則有玁狁上音險下音允夏道衰公劉失其稷官邑于豳今豳州也其後三百有餘歲狄人攻太王亶父亶父亡走于岐下豳人從亶父而邑焉以作周邦及文王為西伯西有昆夷之患北有玁狁之難遂命將出師而伐之莫不賓服武王滅商放逐戎狄于涇洛以北使以時入貢名曰荒服穆王時周室衰王伐犬戎而荒服遂不至懿王時王室愈微戎狄交侵暴虐中國中國被其害詩人疾而歌之曰靡室靡家玁狁之故豈不日戒玁狁孔棘至懿王曾孫宣王大興師以征之詩人美大其功曰薄伐玁狁至于太原出車彭彭城彼朔方是時戎狄復賓服稱中興焉幽王遭驪山之禍身死國破戎狄縱橫上子用反下胡孟反不復可制東遷後六十有五年而山戎越燕伐齊齊釐公與戰于齊郊後四十四年又伐燕齊桓公救燕敗走之後二十餘年戎狄遂至雒邑伐周襄王王出居于鄭初襄王欲伐鄭故取狄女為后與狄共伐鄭已而黜狄后狄后怨而襄王繼母曰惠后有子帶欲立之惠后與狄后及子帶謀為內應開戎狄戎狄以故得入破逐襄王而立子帶為王於是戎狄或居於陸渾東至于衛侵盜尤甚周襄王居外四年乃使使告急于晉晉文公初立欲修霸業興兵伐狄逐子帶迎襄王入于雒邑而文公遂以兵威攘戎狄使居西河圜洛之間圜音嚚字本作圁音銀今銀州銀水是也號赤狄白狄先時晉北已有林胡樓煩之戎燕北有東胡山戎各立君長不相統一後百有餘年晉悼公使魏絳和諸戎翟戎翟皆朝于晉後百餘年當安玉時晉卿趙襄子踰句注而破之句注山名在鴈門郡句音鉤以臨胡貃莫伯反趙氏後與韓魏氏共滅智伯分其地而有之則趙有代句注以北而魏有西河上郡以與戎狄界邊先是有義渠戎入居西河上郡間築城郭以自守而秦稍蠶食之至惠王時拔義渠二十五城惠王又伐魏魏盡入西河上郡于秦惠王遂伐滅義渠秦既并有隴西北地上郡乃築長城以拒胡而趙武靈亦變胡服習騎射北破林胡樓煩自代並陰山下至高闕為塞高闕在九原郡西北並步浪反而置雲中鴈門郡其後燕將秦開為質於胡胡甚信之歸而襲破東胡東胡郤千餘里與荆軻刺秦王舞陽者開之孫也燕亦築長城自造陽至襄平造陽在上谷界襄平即遼東所治也置上谷漁陽右北平遼西遼東郡以距胡當是時諸胡中胸奴為最強中國冠帶之國七而三國邊於胸奴李牧之為趙將也胸奴不敢入於趙邊秦滅六國始皇帝使蒙恬將數十萬衆北擊胡悉收河南地今洛交安化郡地也因河為塞築四十四縣城臨河徙適戍以充之而通直道自九原至雲陽因邊山險塹溪谷可繕者繕之起臨洮至遼東萬餘里又渡河據陽山北假中北假地名及秦亂劉項相持未遑邊備單于頭曼稍渡河南復其故地至冒頓世冒音墨頓音狄胸奴益張圍漢高帝於白登今雲中郡東南帝因婁敬之説以宗女為公主妻之文帝亦通和親其後復大入蕭關今平涼郡蕭闋縣燒回中營今扶風郡界帝置細柳棘門霸上三軍以備之又納朝錯説募人實邊故終景帝世無大患武帝因王恢議誘單于入塞不尅自爾侵盜尤甚衛青霍去病纍歲窮討胸奴於是盡徙漠北矣是時漢境至于陰山乃自關河以西置酒泉等郡隔絶羌胡遂通西域宣帝時五單于爭立其國大亂呼韓邪單于南移近塞朝漢為藩臣郅支單于遠遁康居竟為甘延壽誅滅成帝時呼韓邪單于又來朝上書願保塞上谷以西至敦煌請罷備邊塞吏卒以休天子人民及王莽輔政易單于璽曰章改號胸奴單于為恭奴善于單于復大寇盜莽又改號為降奴服于發兵屯戍議滿三十萬十道窮追分裂其國竟不得志後漢建武末其國飢疫分為南北單于其南單于款塞願為藩蔽扞禦北狄入居雲中後又移居美稷今西河郡廷臣請遂滅北胸奴光武務欲息民不許和帝時北單于卒為竇憲破滅安帝世南單于屢被鮮卑侵掠靈獻之際轉又挫傷魏武遂分為五部置於西河離石諸郡今太原西河昌化郡之間劉淵則左賢王之孫而南胸奴種微矣烏桓在漢武帝世霍去病擊胸奴左地因徙於上谷漁陽之間為漢偵察胸奴動靜始置護烏桓校尉監統之至東都時種類大盛光武納班彪之䇿又置校尉監領獻帝以後寇掠轉甚遂為魏武所滅桓靈之際鮮卑復盛全有胸奴土宇至光和中其帥爭立國亂而檀石槐之種為小種鮮卑軻比能所滅比能繼亦離散而諸部大人慕容拓跋宇文更盛焉蠕蠕自拓跋初徙雲中即有種落其後盡據胸奴故地其主杜崘始號可汗魏氏世受其患明帝熙平以後其國始亂東西魏時突厥暴興蠕蠕不能自立奔於西魏卒被誅滅突厥既盛又盡有蠕蠕故地北齊後周爭結婚媾傾府藏事之至大邏便與沙鉢略為仇大邏便西據烏孫舊地號西突厥遂分為二焉西突厥頗亦強盛其後羣酋互相攻滅因而傳繼離合不恆終唐中葉而後破散北突厥自隋開皇中國內叛亂其主染干入朝于隋并徙種落於朔州及夏勝二州之間朔今馬邑郡夏今朔方郡勝今榆林郡煬帝親幸其部其後染干之子始畢可汗圍帝於鴈門僅而得免後因隋室崩離華人奔湊轉更強盛唐貞觀初頡利可汗徑至渭橋卒為太宗所滅自三代以還北狄盛衰可略而紀其小國時有侵擾不為大害者則不録焉唯契丹當武后世亦寇亂幽薊王師屢出始克平定其部落世受唐室爵命然叛服無有常時綿延至于五季竟竊大號與中國抗衡云胸奴胸奴其先夏后氏之苖裔曰淳維世居北邊隨水草畜牧而轉移其畜之所多則馬牛羊其竒畜則橐他驢騾駃騠騊駼驒奚橐他言能負橐囊而馱物也騾驢種而馬生也駃騠俊馬也生七日而超其母騊駼馬類也生北海驒奚䣕驢類也他音徒何反駃音決騠音提騊音桃駼音塗驒音顚逐水草遷徙無城郭常居耕田之業然亦各有分地無文書以言語為約束兒能騎羊引弓射鳥鼠少長則射狐兔肉食士力能彎弓盡為甲騎其俗寬則隨畜田獵禽獸為生業急則人習戰攻以侵伐其天性也其長兵則弓矢短兵則刀鋋鋋音蟬利則進不利則退不羞遁走茍利所在不知禮義自君王以下咸食畜肉衣其皮革被旃裘壯者食肥美老者飲食其餘貴壯健賤老弱父死妻其後母兄弟死皆取其妻妻之其俗有名不諱而無字當戰國時國始大與燕趙秦三國為鄰秦并天下始皇帝使蒙恬將數十萬衆北擊胸奴悉奪其河南地並河為塞因邊山險塹溪谷築長城起臨洮至遼東萬餘里以拒胸奴是時東胡強而月氏盛氏音支胸奴單于曰頭曼曼音莫安反頭曼不勝秦北徙十有餘年而蒙恬死諸侯畔秦中國擾亂諸秦所徙適邊者皆復去於是胸奴得寬復稍度河南與中國界於故塞單于有子名冒頓既立為太子後有愛閼氏生少子閼氏胸奴皇后號閼音於連反氏音支頭曼欲廢冒頓而立少子乃使冒頓質於月氏冒頓既質而頭曼急攻月氏月氏欲殺冒頓冒頓盜其善馬騎亡歸頭曼以為壯令將萬騎冒頓乃作鳴鏑習勒其騎射令曰鳴鏑所射而不悉射者斬行獵射有不射鳴鏑所射輒斬之已而冒頓復以鳴鏑自射善馬左右或莫敢射冒頓立斬之居頃之復以鳴鏑自射其愛妻左右或頗恐不敢射復斬之頃之冒頓出獵以鳴鏑射單于善馬左右皆射之於是冒頓知其左右可用從其父單于頭曼獵以鳴鏑射頭曼其左右皆隨鳴鏑而射殺頭曼盡誅其後母與弟及大臣不聽從者於是冒頓自立為單于冒頓既立時東胡強聞冒頓殺父自立乃使使謂冒頓曰欲得頭曼時號千里馬冒頓問羣臣皆曰此胸奴寶馬也勿豫冒頓曰奈何與人鄰國愛一馬乎遂與之頃之東胡以為冒頓畏之使使謂冒頓曰欲得單于一閼氏冒頓復問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人鄰國愛一女子乎遂取所愛閼氏豫東胡東胡王愈驕西侵東胡與胸奴中間棄地莫居千餘里各居其邊為甌脫甌脫者境上候望之處作土室若今之伏宿舍甌一侯反脫上活反東胡使使謂冒頓曰胸奴所與我界甌脫外棄地胸奴不能至也吾欲有之冒頓問羣臣或曰此棄地豫之於是冒頓大怒曰地者國之本也奈何豫人諸言豫者皆斬之冒頓上馬令國中有後者斬遂東襲擊東胡東胡初輕冒頓不為備及冒頓以兵至大破東胡王虜其民衆畜産既歸西擊走月氏南并樓煩白羊河南王悉復收秦所使蒙恬所擊胸奴地者與漢關故河南塞至朝那膚施遂侵燕代是時漢方與項羽相距中國罷於兵革以故冒頓得自強控弦之士三十餘萬自淳維以至頭曼千有餘嵗時大時小别散分離尚矣其世傳不可得而次然至冒頓而胸奴最強大盡服從北夷而南與諸夏為敵國其世姓官號可得而記云單于姓攣鞮氏攣音力全反鞮音丁奚反後書言單于姓虛連題其國稱之曰撑犁孤塗單于撑音大庚反胸奴謂天為撑犁謂子為孤塗單于者廣大之貌也言其象天單于然也置左右賢王左右谷蠡谷音鹿蠡音盧奚反左右大將左右大都尉左右大當戶左右骨都侯胸奴謂賢曰屠耆故常以太子為左屠耆王自左右賢王以下至當戶大者萬餘騎小者數千凡二十四長號曰萬騎後書言其大臣貴者左賢王次左谷蠡王次右賢王次左谷蠡王謂之四角次左右日逐王次左右溫禺鞮王次左右漸將王是為六角皆單于子弟次第當為單于者也異姓大臣左右骨都侯次左右尸逐骨都侯其餘日逐且渠當户諸官號各以權力優劣部衆多少為髙下次第焉其大臣皆世官呼衍氏蘭氏其後有須卜氏此三姓其貴種也後書復言有邱林氏凡四姓為國中名族常與婚姻呼衍氏為左蘭氏須卜氏為右主斷獄聽訟平決輕重口白單于無文書簿領呼衍氏即今鮮卑姓呼延者也諸左王將居東方直上谷以東接穢貉朝鮮右王將居西方直上郡以西接氐羌而單于庭直抵雲中各有分地逐水草移徙而左右賢王谷蠡最大左右骨都侯輔政諸二十四長亦各自置千長百長什長裨小王相都尉當戶且渠之屬且音子余反嵗正月諸長少會單于庭祠五月大會龍城祭其先天地鬼神後書言胸奴俗嵗有二龍祠常以正月五日九月戊日祭天神因會諸部議國事走馬及橐他為樂秋馬肥大會蹛林課校人畜計蹛音帶又音多蹛者繞林木而祭也秋社八月中之祭無林木者乃竪柳枝衆騎馳繞三周乃止計者人畜之數其法拔刃尺者死坐盜者沒入其家有罪小者軋軋謂輾轢其骨莭若今之厭踝者也軋音於黠反輾音女展反大者死獄久者不滿十日一國之囚不過數人而單于朝出營拜日之始生夕拜月其坐長左而北向以左為尊日上戊巳其送死有棺槨金銀衣裳而無封樹喪服近幸臣妾從死者多至數十百人舉事常隨月盛壯以攻戰月虧則退兵其攻戰斬首虜賜一巵酒而所得鹵獲因以豫之得人以為奴婢故其戰人人自為趨利善為誘兵以包敵故其逐利如鳥之集其困敗瓦解雲散矣戰而扶輿死者盡得死者家財後北服渾窳屈射丁零隔昆龍新䔣之國五小國也渾音胡昆反窳音弋主反䔣音犁於是胸奴貴人大臣皆服以冒頓為賢是時漢初定徙韓王信於代都馬邑胸奴大攻圍馬邑韓信降胸奴胸奴得信因引兵南踰句注攻太原至晉陽下髙帝自將兵往擊之會天大寒雨雪卒之墮指者十二三於是冒頓陽敗走誘漢兵漢兵逐擊冒頓冒頓匿其精兵見其羸弱於是漢悉兵多步兵三十二萬北逐之髙帝先至平城步兵未盡到冒頓縱精兵三十餘萬騎圍髙帝於白登七日漢兵中外不得相救餉胸奴騎其西方盡白東方盡駹北方盡驪南方盡騂馬駹青馬也驪深黑色騂赤馬也駹音尨騂息營反髙帝乃使使厚遺閼氏閼氏乃謂冒頓曰兩主不相困今得漢地單于終非能居之且漢王有神單于察之冒頓與韓信將王黃趙利期而兵久不來疑其與漢有謀亦取閼氏之言乃開圍一角於是髙皇帝令士皆持滿傅矢外鄉從解圍直出得與大軍合而冒頓遂引兵去漢亦引兵罷使劉敬結和親之約是後韓信為胸奴將及趙利王黃等數背約侵盜代鴈門雲中居無幾何陳豨反與韓信合謀擊代漢使樊噲往擊之復收代鴈門雲中郡縣不出塞是時胸奴以漢將數率衆往降故冒頓常往來侵盜伐地於是高祖患之乃使劉敬奉宗室女翁主為單于閼氏歲奉胸奴絮繒酒食物各有數約為兄弟以和親冒頓乃少止後燕王盧綰復反率其黨且萬人降胸奴往來苦上谷以東終高祖世孝惠高后時冒頓寖驕乃為書使使遺高后曰孤僨之君僨音方問反生於沮澤之中長於平野牛馬之域數至邊境願遊中國陛下獨立孤僨獨居兩主不樂無以自虞願以所有易其所無高后大怒召丞相平及樊噲季布等議斬其使者發兵擊之樊噲曰臣願得十萬衆橫行胸奴中問季布布曰噲可斬也前陳豨反於代漢兵三十二萬噲為上將軍時胸奴圍高帝於平城噲不能解圍天下歌之曰平城之下亦誠苦七日不食不能彀弩彀音工豆反今歌吟之聲未絶而瘡痍者甫起而噲欲搖動天下妄言以十萬衆橫行是面謾也且冒頓譬如禽獸得其善言不足喜惡言不足怒也高后曰善令大謁者張澤報書曰單于不忘弊邑賜之以書弊邑恐懼退日自圖年老氣衰髮齒墮落行步失度單于過聽不足以自汙弊邑無罪宜在見赦竊有御車二乘馬二駟以奉常駕冒頓得書復使使來謝曰未嘗聞中國禮義陛下幸而赦之因獻馬遂和親至孝文即位復修和親其三年夏胸奴右賢王入居河南地為寇於是文帝下詔曰漢與胸奴約為兄弟無侵害邊境所以輸遺胸奴甚厚今右賢王離其國將衆居河南地非常故往來入塞捕殺吏卒驅侵上郡保塞蠻夷令不得居其故驅與驅同陵轢邊吏入盜甚驁無道非約也其發邊吏車騎八萬詣高奴遣丞相灌嬰將擊右賢王右賢王走出塞文帝幸太原是時濟北王反文帝歸罷丞相擊胡之兵其明年單于遺漢書曰天所立胸奴大單于敬問皇帝無恙前時皇帝言和親事稱書意合歡漢邊吏侵侮右賢王右賢王不請聽後義盧侯難支等計與漢吏相恨絶二主之約離昆弟之親皇帝讓書再至發使以書報不來漢使不至漢以其故不和鄰國不附今以少吏之敗約故罰右賢王使至西方求月氏擊之以天之福吏卒良馬力強以滅夷月氏盡斬殺降下定之樓蘭烏孫呼揭及其旁二十六國皆已為胸奴諸引弓之民并為一家北州以定願寢兵休士養馬除前事復故約以安邊民以應古始使少者得成其長老者得安其處世世平樂未得皇帝之志故使郎中係呼淺奉書請呼音火故反獻橐他一騎馬二駕二駟皇帝即不欲與胸奴近塞則且詔吏民遠舍使者至即遣之六月中來至新望之地書至漢議擊與和親孰便公卿皆曰單于新破月氏乘勝不可擊也且得胸奴地澤鹵非可居也和親甚便漢許之孝文前六年遺胸奴書曰皇帝敬問胸奴大單于無恙使係呼淺遺朕書云願寢兵休士除前事復故約以安邊民世世平樂朕甚嘉之此古聖王之志也漢與胸奴約為兄弟所以遺單于甚厚背約離兄弟之親者常在胸奴然右賢王事已在赦前勿深誅單于若稱書意明告諸吏使無負約有信敬如單于書使者言單于自將并國有功甚苦兵事服繡夾綺衣長􅀈錦袍各一服者天子所自服也夾者衣無絮也繡夾綺衣以繡為表綺為裏也夾音工洽反比疏一辮髮之飾也以金為之比音頻寐反疏字或作余黃金飭具帶一黃金犀毗一犀毗胡帶之鉤也亦曰鮮卑亦曰師比總一物也語有輕重耳繡十匹錦二十匹赤綈緑繒各四十匹使中大夫意謁者令肩遺單于後頃之冒頓死子稽粥立稽音雞粥音育號曰老上單于老上稽粥單于初立文帝復遣宗人女翁主為單于閼氏使宦者燕人中行説傅翁主中行姓説名也行音胡郎反説音悅説不欲行漢強使之説曰必我也為漢患者中行説既至因降單于單于愛幸之初單于好漢繒絮食物中行説曰胸奴人衆不能當漢之一郡然所以強之者以衣食異無卬於漢卬音牛向反今單于變俗好漢物漢物不過什二則胸奴盡歸於漢矣其得漢絮繒以馳草棘中衣袴皆裂弊以視不如旃裘堅善也得漢食物皆去之以視不如重酪之便美也重乳汁也重音竹用反字本作潼其音則同於是説教單于左右疏記以計識其人衆畜牧識音式志反漢遺單于書以尺一牘辭曰皇帝敬問胸奴大單于無恙所以遺物及言語云云中行説令單于以尺二寸牘及印封皆令廣長大倨驁其辭曰天地所生日月所置胸奴大單于敬問漢皇帝無恙所以遺物言語亦云云漢使或言胸奴俗賤老中行説窮漢使曰而漢俗屯戍從軍當發者其親豈不自奪溫厚肥美齎送飲食行者乎飲音於禁反食音嗣下同漢使者曰然説曰胸奴明以攻戰為事老弱不能鬬故以其肥美飲食壯健以自衛如此父子各得相保何以言胸奴輕老也漢使曰胸奴父子同穹廬卧父死妻其後母兄弟死盡妻其妻無冠帶之節闕庭之禮中行説曰胸奴之俗食畜肉飲其汁衣其皮畜食草飲水隨時轉移故其急則人習騎射寬則人樂無事約束徑易行君臣簡可久一國之政猶一體也父兄死則妻其妻惡種姓之失也故胸奴雖亂必立宗種今中國雖陽不取其父兄之妻親屬益疏則相殺至制易姓皆從此類也且禮義之敝上下交怨而室屋之極生力屈焉夫力耕桑以求衣食築城郭以自備故其民急則不習戰攻緩則罷於作業嗟土室之人顧無喋喋占占冠固何當嗟者嘆愍之言也喋喋利口也占占衣裳貌也漢人且當思念無為喋喋占占耳雖自謂著冠何所當益也喋音蝶占音昌沾反自是之後漢使欲辨論者中行説輒曰漢使毋多言顧漢所輸胸奴繒絮米糵令其量中必善美而已中去聲何以言為乎且所給備善則已不備善而苦惡則候秋熟以騎馳蹂乃稼穡也日夜教單于候利害處孝文十四年胸奴單于十四萬騎入朝那蕭關殺北地都尉卬虜人民畜産甚多遂至彭陽使騎入燒回中宮候騎至雍甘泉於是文帝以中尉周舍郎中令張武為將軍發車千乘十萬騎軍長安旁以備胡寇而拜昌侯盧卿為上郡將軍寧侯魏遫為北地將軍隆慮侯周竈為隴西將軍慮音盧東陽侯張相如為大將軍成侯董赤為將軍大發車騎往擊胡單于留塞內月餘漢逐出塞即還不能有所殺胸奴日以驕歲入邊殺略人民甚衆雲中遼東最甚郡萬餘人漢甚苦之乃使使遺胸奴書單于亦使當戶報謝復言和親事孝文後二年使使遺胸奴書曰皇帝敬問胸奴大單于無恙使當戶且渠雕渠難郎中韓遼遺朕馬二匹已至敬受當戶且渠者一人為一官雕渠難者其姓名也先帝制長城以北引弓之國受令單于長城以內冠帶之室朕亦制之使萬民耕織射獵衣食父子毋離臣主相安俱無暴虐今聞泄惡民貪降其趨背義絶約忘萬民之命離兩主之歡然其事已在前矣書云二國已和親兩主歡説寢兵休卒養馬世世昌樂翕然更始朕甚嘉之聖者日新改作更始使老者得息幼者得長各保其首領而終其天年朕與單于俱由此道順天恤民世世相傳施之無窮天下莫不感嘉漢與胸奴鄰敵之國胸奴處北地寒殺氣早降故詔吏遺單于秫糵金帛繒絮他物歲有數今天下大安萬民熙熙獨朕與單于為之父母朕追念前事薄物細故謀臣計失皆不足以離昆弟之歡朕聞天不頗覆地不偏載朕與單于皆捐細故俱蹈大道墮壞前惡以圖長久使萬國之民若一家子元元萬民下及魚鱉上及飛鳥跂行喙息蠕動之類莫不就安利避危殆故來者不止天之道也俱去前事朕釋逃虜民單于毋言章尼等皆單于降漢者朕聞古之帝王約分明而不食言單于留志天下大安和親之後漢過不先單于其察之單于既約和親於是制詔御史胸奴大單于遺朕書和親已定亡人不足以益衆廣地胸奴無入塞漢無出塞犯令約者殺之可以久親後無咎俱便朕已許其布告天下使明知之後四年老上單于死子軍臣單于立而中行説復事之漢復與胸奴和親軍臣單于立歲餘胸奴復絶和親大入上郡雲中各三萬騎所殺略甚衆於是漢使三將軍軍屯北地代屯句注趙屯飛狐口緣邊亦各堅守以備胡寇又置三將軍軍長安西細柳渭北棘門霸上以備胡胡騎入代句注邊烽火通於甘泉長安數月漢兵至邊胸奴亦遠塞漢兵亦罷後歲餘文帝崩景帝立而趙王遂乃陰使於胸奴吳楚反欲與趙合謀入邊漢圍破趙胸奴亦止自是後景帝復與胸奴和親通關市給遺單于遣翁主如故約終景帝世時時小入盜邊無大寇武帝即位明和親約束厚遇關市饒給之胸奴自單于以下皆親漢往來長城下漢使馬邑人聶翁一姓聶名一翁者老人之稱也間關出物與胸奴交易陽為賣馬邑城以誘單于單于信之而貪馬邑財物乃以十萬騎入武州塞漢伏兵三十餘萬馬邑旁御史大夫韓安國為護軍將軍護四將軍以伏單于單于既入漢塞未至馬邑百餘里見畜布野而無人牧者怪之乃攻亭時鴈門尉史行徼見寇保此亭單于得欲刺之尉史知漢謀乃下具告單于單于大驚曰吾固疑之乃引兵還出曰吾得尉史天也以尉史為天王漢兵約單于入馬邑而縱兵單于不至以故無所得將軍王恢部出代擊胡輜重聞單于還兵多不敢出漢以恢本建造兵謀而不進誅恢自是後胸奴絶和親攻當路塞往往入盜於邊不可勝數然胸奴貪尚樂關市耆漢財物耆讀曰嗜漢亦通關市不絶以中之自馬邑軍後五歲之秋漢使四將各萬騎擊胡關市下將軍衛青出上谷至龍城得胡首虜七百人公孫賀出雲中無所得公孫敖出代郡為胡所敗七年李廣出鴈門為胡所敗胸奴生得廣廣道亡歸漢囚敖廣敖廣贖為庶人其冬胸奴數千人盜邊漁陽尤甚漢使將軍韓安國屯漁陽備胡其明年秋胸奴二萬騎入漢殺遼西太守略二千餘人又敗漁陽太守軍千餘人圍將軍安國安國時千餘騎亦且盡會燕救至胸奴乃去又入鴈門殺略千餘人於是漢使將軍衛青將三萬騎出鴈門李息出代郡擊胡得首虜七千其明年衛青復出雲中以西至隴西擊胡之樓煩白羊至於河南得胡首虜數千羊百餘萬於是漢遂取河南地築朔方復繕故秦時蒙恬所為塞因河而為固漢亦棄上谷之斗辟縣造陽地以豫胡斗絶也縣之斗曲入胸奴界者其中造陽地也辟讀曰僻是歲元朔二年也其後冬軍臣單于死其弟左谷蠡王伊稚斜自立為單于攻敗軍臣單于太子於單於單亡降漢漢封於單為陟安侯數月死伊稚斜單于既立其夏胸奴數萬騎入代郡殺太守共友共音龔略千餘人秋又入鴈門殺略千餘人其明年又入代郡定襄上郡各三萬騎殺略數千人胸奴右賢王怨漢奪其河南地而築朔方數盜寇邊又入河南侵擾朔方殺略吏民甚衆其明年春漢遣衛青將六將軍十餘萬人出朔方高闕右賢王以漢兵不能至飲酒醉漢兵出塞六七百里夜圍右賢王右賢王大驚脫身逃走精騎往往隨後去漢將軍得右賢王人衆男女萬五千人裨小王十餘人其秋胸奴萬騎入代郡殺都尉朱央略千餘人其明年春漢復遣大將軍衛青將六將軍十餘萬騎仍再出定襄數百里擊胸奴得首虜前後萬九千餘級而漢亦亡兩將軍三千餘騎右將軍建得以身脫而前將軍翕侯趙信兵不利降胸奴趙信者故胡小王降漢漢封為翕侯以前將軍與右將軍并軍介獨遇單于兵故盡沒單于既得翕侯以為自次王用其姊妻之與謀漢信教單于益北絶幕以誘罷漢兵徼極而取之毋近塞單于從之其明年胡數萬騎入上谷殺數百人明年春漢使驃騎將軍去病將萬騎出隴西過焉耆焉音於堅反耆音支山千餘里得胡首虜八千餘級得休屠王祭天金人胸奴祭天處本在雲陽甘泉山下秦奪其地後徙之休屠王右地故休屠有祭天金人蓋天神之主即今佛像是其遺法屠音除其夏驃騎將軍復與合騎侯數萬騎出隴西北地二千里過居延攻祁連山得胡首虜三萬餘級裨小王以下十餘人是時胸奴亦來入代郡鴈門殺略數百人漢使博望侯及李將軍廣出右北平擊胸奴左賢王左賢王圍李廣廣軍四千人死者過半殺虜亦過當會博望侯軍救至李將軍得脫盡亡其軍合騎侯從驃騎將軍期及博望侯皆當死贖為庶人其秋單于怒昆邪王休屠王居西方昆音下門反為漢所殺虜數萬人欲召誅之昆邪休屠王恐謀降漢漢使驃騎將軍迎之昆邪王殺休屠王并將其衆降漢凡四萬餘人號十萬於是漢已得昆邪則隴西北地河西益少胡寇徙關東貧民處所奪胸奴河南地新秦中以實之而減北地以西戍卒半明年春胸奴入右北平定襄各數萬騎殺略千餘人其年春漢謀以為翕侯信為單于計居幕北以為漢兵不能至乃粟馬發十萬騎私負從馬凡十四萬匹糧重不與焉令大將軍青驃騎將軍去病中分軍大將軍出定襄驃騎將軍出代咸約絶幕擊胸奴單于聞之遠其輜重以精兵待於幕北與漢大將軍接戰一日會暮大風起漢兵縱左右翼圍單于單于自度戰不能與漢兵遂獨與壯騎數百潰漢圍西北遁走漢兵夜追之不得行捕斬首虜凡萬九千級北至置陽山趙信城而還趙信所作因以名城置音徒千反單于之走其兵往往與漢軍相亂而隨單于單于久不與其大衆相得右谷蠡王以為單于死乃自立為單于真單于復得其衆右谷蠡王乃去號復其故位驃騎之出代二千餘里與左王接戰漢兵得胡首虜凡七萬餘人左王將皆遁走驃騎封於狼居胥山禪姑衍臨瀚海而還是後胸奴遠遁而幕南無王庭漢度河自朔方以西至令居令音零往往通渠置田官吏卒五六萬人稍蠶食地接胸奴以北初漢兩將大出圍單于所殺虜八九萬而漢士物故者亦萬數漢馬死者十餘萬匹胸奴雖病遠去而漢馬亦少無以復往單于用趙信計遣使好辭請和親天子下其議或言和親或言遂臣之丞相長史任敞曰胸奴新困宜使為外臣朝請於邊漢使敞使於單于單于聞敞計大怒留之不遣先是漢亦有所降胸奴使者單于亦輒留漢使相當漢方復收士馬會驃騎將軍去病死於是漢久不北擊胡數歲伊稚斜單于立十三年死子烏維立為單于是歲元鼎三年也烏維單于立而漢武帝始出巡狩郡縣其後漢方南誅兩越不擊胸奴胸奴亦不入邊烏維立三年漢已滅兩越遣故太僕公孫賀將萬五千騎出九原二千餘里至浮苴井苴音子餘反從票侯趙破奴萬餘騎出令居數千里至胸奴河水皆不見胸奴一人而還是時天子巡邊親至朔方勒兵十八萬騎以見武節而使郭吉風告單于既至胸奴胸奴主客問所使郭吉卑辭好言曰吾見單于而口言單于見吉吉曰南越王頭已縣於漢北闕下今單于即能前與漢戰天子自將兵待邊即不能亟南面而臣於漢何但遠走亡匿於幕北寒苦無水草之地為語卒單于大怒立斬主客見者而留郭吉不歸遷辱之北海上而單于終不肯為寇於漢邊休養士馬習射獵數使使好辭甘言求和親漢使王烏等窺胸奴胸奴法漢使不去節不以墨黥其面不得入穹廬王烏北地人習胡俗去其節黥面入廬單于愛之陽許之曰吾為遣其太子入質於漢以求和親漢使楊信使於胸奴是時漢東拔濊貉朝鮮以為郡濊與穢同或亦作薉而西置酒泉郡以隔絶胡與羌通之路又西通月氏大夏以翁主妻烏孫王以分胸奴西方之援國又北益廣田至眩雷為塞而胸奴終不敢以為言是歲翕侯信死漢用事者以胸奴已弱可臣從也楊信為人剛直屈強素非貴臣也單于不親欲召入不肯去節乃坐穹廬外見楊信楊信説單于曰即欲和親以單于太子為質於漢單于曰非故約故約漢常遣翁主給繒絮食物有品以和親而胸奴亦不復擾邊今乃欲反古令吾太子為質無幾矣胸奴俗見漢使非中貴人其儒生以為欲説折其辭辨少年以為欲刺折其氣每漢兵入胸奴胸奴輒報償漢留胸奴使胸奴亦留漢使必得當乃止楊信既歸漢使王烏等如胸奴胸奴亦讇以甘言欲多得漢財物紿王烏曰吾欲入漢見天子面相結為兄弟王烏歸報漢漢為單于築邸于長安胸奴曰非得漢貴人使吾不與誠語胸奴使其貴人至漢病服藥欲愈之不幸而死漢使路充國佩二千石印綬使送其喪厚幣直數千金單于以為漢殺吾貴使乃留路充國不歸諸所言者單于特空紿王烏殊無意入漢遣太子來質於是胸奴數使竒兵侵犯漢邊漢乃拜郭昌為拔胡將軍及浞野侯屯朔方以東備胡浞野侯趙破奴也浞音仕角反烏維單于立十歲死子詹師廬立號為兒單于是歲元封六年也自是後單于益西北左方兵直雲中右方兵直酒泉敦煌兒單于立漢使兩使一人弔單于一人弔右賢王欲以乖其國使者入胸奴胸奴悉將致單于單于怒而悉留漢使漢使留胸奴前後十餘輩而胸奴使來漢亦輒留之相當是歲漢使二師將軍西伐大宛而令因杅將軍築受降城杅音于其冬胸奴大雨雪畜多飢寒死兒單于年少好殺伐國中不安左大都尉欲殺單于使人間告漢曰我欲殺單于降漢漢遠漢即來兵近我我即發初漢聞此言故築受降城猶以為遠其明年春漢使浞野侯破奴將二萬騎出朔方北二千餘里期至浚稽山而還浚音俊稽音雞浞野侯既至期左大都尉欲發而覺單于誅之發兵擊浞野侯浞野侯行捕首虜數千人還未至受降城四百里胸奴八萬騎圍之浞野侯夜出自求水胸奴生得浞野侯因急擊其軍軍吏畏亡將而誅莫相勸而歸軍遂沒於胸奴單于大喜遂遣兵攻受降城不能下乃侵入邊而去明年單于欲自攻受降城未到病死兒單于立三歲而死子少胸奴乃立其季父烏維單于弟右賢王句黎湖為單于句音鉤是歲太初三年也句黎湖單于立漢使光祿徐自為出五原塞數百里遠者千里築城障列亭至盧朐而使遊擊將軍韓説長平侯衛伉屯其旁使強弩都尉路博德築居延澤上其秋胸奴大入雲中定襄五原朔方殺略數千人敗數二千石而去行壞光祿所築亭障又使右賢王入酒泉張掖略數千人會任文擊救盡復失其所得而去聞二師將軍破大宛斬其王還單于欲遮之不敢其冬病死句黎湖單于立一歲死其弟左大都尉且鞮侯立為單于且音子餘反鞮音丁奚反漢既誅大宛威震外國天子竟欲遂困胡乃下詔曰高皇帝遺朕平城之憂高后時單于書絶悖逆昔齊襄公復九世之讐春秋大之是歲太初四年也且鞮侯單于初立恐漢襲之盡歸漢使之不降者路充國等於漢單于乃自謂我兒子安敢望漢天子漢天子我丈人行丈人尊老之稱行音胡郎反漢遣中郎將蘇武厚幣賂遺單于單于益驕禮甚倨非漢所望也明年浞野侯破奴得亡歸漢其明年漢使二師將軍三萬騎出酒泉擊右賢王於天山得首虜萬餘級而還胸奴大圍二師幾不脫漢兵物故什六七漢又使因杅將軍出西河與強弩都尉會涿邪山亡所得使騎都尉李陵將步兵五千人出居延北千餘里與單于會合戰陵所殺傷萬餘人兵食盡欲歸單于圍陵陵降胸奴其兵得脫歸漢者四百人單于乃貴陵以其女妻之後二歲漢使二師將軍六萬騎步兵七萬出朔方強弩都尉路博德將萬餘人與二師會遊擊將軍説步兵三萬人出五原因杅將軍敖將騎萬步兵三萬人出鴈門胸奴聞悉遠其纍重於余吾水北而單于以十萬待水南與二師接戰二師解而引歸與單于連鬬十餘日遊擊無所得因杅與左賢王戰不利引歸明年且鞮侯單于死立五年長子左賢王立為狐鹿姑單于是歲太始元年也初且鞮侯兩子長為左賢王次為左大將病且死言立左賢王左賢王未至貴人以為有病更立左大將為單于左賢王聞之不敢進左大將使人召左賢王而讓位焉左賢王辭以病左大將不聽謂曰即不幸死傳之於我左賢王許之遂立為狐鹿姑單于狐鹿姑單于立以左大將為左賢王數年病死其子先賢撣不得代撣音㕓更以為日逐王日逐王者賤於左賢王單于自以其子為左賢王單于既立六年而胸奴入上谷五原殺略吏民其年胸奴復入五原酒泉殺兩部都尉於是漢遣二師將軍七萬人出五原御史大夫商邱成將三萬餘人出西河重合侯莽通將四萬騎出酒泉千餘里單于聞漢兵大出悉遣其輜重徙趙信城北邸郅居水郅音之日反左賢王驅其人民度余吾水六七百里居兜銜山單于自將精兵左安侯度姑且水且子余反御史大夫軍至追邪徑無所見還胸奴使大將與李陵將三萬餘騎追漢軍至浚稽山合轉戰九日漢兵陷陳郤敵殺傷虜甚衆至蒲奴水虜不利還去重合侯軍至天山胸奴使大將偃渠與左右呼知王將二萬餘騎要漢兵見漢兵強引去重合侯無所得失是時漢恐車師兵遮重合侯乃遣開陵侯將兵别圍車師盡得其王民衆而還二師將軍出塞胸奴右大都尉與衛律將五千騎要擊漢軍於夫羊句山狹句音鉤二師遣屬國胡騎二千與戰虜兵壞散死傷者數百人漢軍乘勝追北至范夫人城本漢將築此城將亡其妻率餘衆完保之因以為名范氏能詛胡者胸奴奔走莫敢拒敵會二師妻子坐巫蠱收聞之憂懼其掾胡亞夫亦避罪從軍説二師曰夫人室家皆在吏若還不稱意適與獄會郅居以北可復得見乎二師由是狐疑欲深入要功遂北至郅居水上虜已去二師遣護軍將二萬騎度郅居之水一日逢左賢王左大將將二萬騎與漢軍合戰一日漢軍殺左大將虜死傷甚衆軍長史與決睢都尉輝渠侯謀本胸奴官也功臣表歸義侯僕多子雷後以屬國都尉擊胸奴封輝渠輝渠魯陽縣也睢音息隨反輝音輝曰將軍懷異心欲危衆求功恐必敗謀共執二師二師聞之斬長史引兵還至速邪烏燕然山速邪烏地名燕然山在其中單于知漢軍勞倦自將五萬騎遮擊二師相殺傷甚衆夜塹漢軍前深數尺從後急擊之軍大敗亂二師降單于素知其漢大將貴臣以女妻之尊寵在衛律上其明年單于遣使遺漢書曰南有大漢北有強胡胡者天之驕子也不為小禮以自煩今欲與漢開大關取漢女為妻歲給遺我糵酒萬石稷米五千斛雜繒萬匹他如故約則邊不相盜矣漢遣使者報送其使單于使左右難漢使者曰漢禮義國也二師道前太子發兵反何也使者曰然乃丞相私與太子爭鬬太子發兵欲誅丞相丞相誣之故誅丞相此子弄父兵罪笞小過耳孰與冒頓單于身殺其父代立常妻後母禽獸行也單于留使者三歲乃得還二師在胸奴歲餘衛律害其寵會母閼氏病律飭胡巫言先單于怒曰胡故時祠兵常言得二師以社今何故不用於是收二師二師罵曰我死必滅胸奴遂屠二師以祠會連雨雪數月畜産死人民疫病穀稼不熟單于恐為二師立祠室自二師沒後漢新失大將軍士卒數萬人不復出兵三歲武帝崩前此者漢兵深入窮追二十餘年胸奴孕重墯殰罷極苦之孕重懷任者也墮落也殰敗也音讀罷讀曰疲自單于以下常有欲和親計後三年單于欲求和親會病死初單于有異母弟為左大都尉賢國人鄉之母閼氏恐單于不立子而立左大都尉也乃私使殺之左大都尉同母兄怨遂不肯復會單于庭又單于病且死謂諸貴人我子少不能治國立弟右谷蠡王及單于死衛律等與顓渠閼氏謀匿單于死詐嬌單于令嬌與矯同與貴人飲盟更立子左谷蠡王為壺衍鞮單于是歲始元二年也壺衍鞮單于既立風謂漢使者言欲和親左賢王右谷蠡王以不得立怨望率其衆欲南歸漢恐不能自致即脅盧屠王欲與西降烏孫謀擊胸奴盧屠王告之單于使人驗問右谷蠡王不服反以其罪罪盧屠王國人皆寃之於是二王去居其所未嘗肯會龍城後二年秋胸奴入代殺都尉單于年少初立母閼氏不正國內乖離常恐漢兵襲之於是衛律為單于謀穿井築城治樓以藏穀與秦人守之秦時有人亡入胸奴者今其子孫猶號秦人漢兵至無奈我何即穿井數百伐材數千或曰胡人不能守城是遺漢糧也衛律於是止乃更謀歸漢使不降者蘇武馬宏等馬宏者前副光祿大夫王忠使西域為胸奴所遮忠戰死馬宏生得亦不肯降故胸奴歸此二人欲以通善意是時單于立三歲矣明年胸奴發左右部二萬騎為四隊並入邊為寇漢兵追之斬首獲虜九千人生得甌脫王漢無所失亡胸奴見甌脫王在漢恐以為道擊之即西北遠去不敢南逐水草發人民屯甌脫明年復遣九千騎屯受降城以備漢北橋余吾令可度以備奔走是時衛律已死衛律在時常言和親之利胸奴不信及死後兵數困國益貧單于弟左谷蠡王思衛律言欲和親而恐漢不聽故不肯先言常使左右風漢使者然其侵盜益希遇漢使愈厚欲以漸致和親漢亦羈縻之其後左谷蠡王死明年單于使犁汗王窺邊言酒泉張掖兵益弱出兵試擊冀可復得其地時漢先得降者聞其計天子詔邊警備後無幾右賢王犁汙王四千騎分三隊入日勒屋蘭番和番音盤張掖太守屬國都尉發兵擊大破之得脫者數百人屬國千長義渠王騎士射殺犁汙王賜黃金二百斤馬二百匹因封為犁汙王屬國都尉郭忠封安成侯自是後胸奴不敢入張掖其明年胸奴三千餘騎入五原略殺數千人後數萬騎南旁塞獵旁音步浪反行攻塞外亭障略取吏民去是時漢邊郡烽火候望精明胸奴為邊寇者少利希復犯塞漢復得胸奴降者言烏桓嘗發先單于冢胸奴怨之方發二萬騎擊烏桓大將軍霍光欲發兵邀擊之以問護軍都尉趙充國充國以為烏桓數犯塞今胸奴擊之於漢便又胸奴希寇盜北邊幸無事蠻夷自相攻擊而發兵要之招寇生事非計也光更問中郎將范明友明友言可擊於是拜明友為度遼將軍將二萬騎出遼東胸奴聞漢兵至引去初光誡明友兵不空出即後胸奴遂擊烏桓烏桓時新中胸奴兵明友既後胸奴因乘烏桓敝擊之斬首六千餘級獲三王首還封為平陵侯胸奴繇是恐不能出兵即使使之烏孫求欲得漢公主擊烏孫取車延惡師地烏孫公主上書下公卿議救未決昭帝崩宣帝即位烏孫昆彌復上書言連為胸奴所侵削昆彌願發國半精兵人馬五萬匹盡力擊胸奴唯天子出兵哀救公主本始二年漢大發關東輕鋭士選郡國吏三百石伉健習騎射者皆從軍遣御史大夫田廣明為祁連將軍四萬餘騎出西河度遼將軍范明友三萬餘騎出張掖前將軍韓增三萬餘騎出雲中後將軍趙充國為蒲類將軍三萬餘騎出酒泉雲中太守田順為虎牙將軍三萬餘騎出五原凡五將軍兵十餘萬騎出塞各二千餘里及校尉常惠使護發兵烏孫西域昆彌自將翕侯以下五萬餘騎從西方入與五將軍兵凡二十餘萬衆胸奴聞漢兵大出老弱奔走驅畜産遠遁逃是以五將少所得度遼將軍出塞千二百餘里至蒲離候水斬首捕虜七百餘級鹵獲馬牛羊萬餘前將軍出塞千二百餘里至烏員員音云斬首捕虜至候山百餘級鹵馬牛羊二千餘蒲類將軍兵當與烏孫合擊胸奴蒲類澤烏孫先期至而去漢兵不與相及蒲類將軍出塞千八百餘里西去候山斬首捕虜得單于使者蒲陰王以下三百餘級鹵馬牛羊七千餘聞虜已引去皆不至期還天子薄其過寬而不罪祁連將軍出塞千六百里至雞秩山斬首捕虜十九級獲牛馬羊百餘逄漢使胸奴還者冉𢎞等言雞秩山西有虜衆祁連即戒𢎞使言無虜欲還兵御史屬公孫益壽諌以為不可祁連不聽遂引兵還虎牙將軍出塞八百餘里至丹余吾水上即止兵不進斬首捕虜千九百餘級鹵馬牛羊七萬餘引兵還上以虎牙將軍不至期詐增鹵獲而祁連知虜在前逗遛不進皆下吏自殺擢公孫益壽為侍御史校尉常惠與烏孫兵至右谷蠡庭獲單于父行及嫂居次名王犂汙都尉千長將以下三萬九千餘級虜馬牛羊驢騾橐駝七千餘萬漢封惠為長羅侯然胸奴民衆死傷而去者及畜産遠移死亡不可勝數於是胸奴遂衰耗怨烏孫其冬單于自將數萬騎擊烏孫頗得老弱欲還會天大雨雪一日深丈餘人馬畜産凍死還者不能什一於是丁令乘弱攻其北令音零烏桓入其東烏孫擊其西凡三國所殺數萬級馬數萬匹牛羊甚衆又重以餓死人民死者什三畜産什五胸奴大虛弱諸國羈屬者皆瓦解攻盜不能理其後漢出三千騎為三道並入胸奴捕虜得數千人還胸奴終不敢取當兹欲鄉和親而邊境少事矣壺衍鞮單于立十七年死弟左賢王立為虛閭權渠單于是歲地節二年也虛閭權渠單于立以右大將女為大閼氏而黜前單于所幸顓渠閼氏顓渠閼氏父左大且渠怨望是時胸奴不能為邊寇於是漢罷外城以休百姓單于聞之喜召貴人謀欲與漢和親左大且渠心害其事曰前漢使來兵隨其後今亦效漢發兵先使使者入乃自請與呼盧訾王各將萬騎南旁塞獵相逄俱入訾音子移反行未到會三騎亡降漢言胸奴欲為寇於是天子詔發邊騎屯要害處使大將軍監治衆等四人將五千騎分三隊出塞各數百里捕得虜各數十人而還時胸奴亡其三騎不敢入即引去是歲也胸奴飢人民畜産死十六七又發兩屯各萬騎以備漢其秋胸奴前所得西嗕居左地者嗕音奴獨反其君長以下數千人皆驅畜産行與甌脫戰所殺傷甚衆遂南降漢其明年西域城郭共擊胸奴取車師國得其王及人衆而去單于復以車師王昆弟兜莫為車師王收其餘民東徙不敢居故地而漢益遣屯士分田車師地以實之其明年胸奴怨諸國共擊車師遣左右大將各萬餘騎屯田右地欲以侵迫烏孫西域後二歲胸奴遣左右薁鞬各六千騎薁音郁鞬音居言反與左大將再擊漢之田車師城者不能下其明年丁令比三歲入盜胸奴殺略人民數千驅馬畜去胸奴遣萬餘騎往擊之無所得其明年單于將十餘萬騎旁塞獵欲入邊寇未至會其民題除渠堂亡降漢言狀漢以為言兵鹿奚盧侯而遣後將軍趙充國將兵四萬餘騎屯緣邊九郡備虜月餘單于病歐血因不敢入還去即罷兵乃使題王都犁胡次等入漢請和親未報會單于死是歲神爵二年也虛閭權渠單于立九年死自始立而黜顓渠閼氏顓渠閼氏即與右賢王私通右賢王會龍城而去顓渠閼氏語以單于病甚且勿遠後數日單于死郝宿王刑未央使人召諸王未至郝音火各反顓渠閼氏與其弟左大且渠都隆竒謀立右賢王屠耆堂為握衍朐鞮單于握衍朐鞮單于者代父為右賢王朐音劬烏維單于耳孫也握衍朐鞮單于立復修和親遣弟伊酋若王勝之入漢獻見單于初立凶惡盡殺虛閭權渠時用事貴人刑未央等而任用顓渠閼氏弟都隆竒又盡免虛閭權渠子弟近親而自以其子弟代之虛閭權渠單于子稽侯㹪既不得立㹪音先安反亡歸妻父烏禪幕禪音蟬烏禪幕者本烏孫康居間小國數見侵暴率其衆數千人降胸奴狐鹿姑單于以其弟子日逐王姊妻之使長其衆居右地日逐王先賢撣其父左賢王當為單于讓狐鹿姑單于狐鹿姑許立之國人以故頗言日逐王當為單于日逐王素與握衍朐鞮單于有隙即率其衆數萬騎歸漢漢封日逐王為歸德侯單于更立其從兄薄胥堂為日逐王明年單于又殺先賢撣兩弟烏禪幕請之不聽心恚其後左薁鞬王死單于自立其小子為薁鞬王留庭薁鞬貴人共立故薁鞬王子為王與俱東徙單于遣右丞相將萬騎往擊之失亡數千人不勝時單于已立三歲暴虐殺伐國中不附及太子左賢王數讒左地貴人左地貴人皆怨其明年烏桓擊胸奴東邊姑夕王頗得人民單于怒姑夕王恐即與烏禪幕及左地貴人共立稽侯㹪為呼韓邪單于發左地兵四五萬人西擊握衍朐鞮單于至姑且水北且音子余反未戰握衍朐鞮單于兵敗走使人報其弟右賢王曰胸奴共攻我若肯發兵助我乎右賢王曰若不愛人殺昆弟諸貴人各自死若處無來汙我握衍朐鞮單于恚自殺左大且渠都隆竒亡之右賢王所其民盡降呼韓邪單于是歲神爵四年也握衍朐鞮立三年而敗呼韓邪單于歸庭數月罷兵使各歸故地乃收其兄呼屠吾斯在民間者立為左谷蠡王使人告右賢貴人欲令殺右賢王其冬都隆竒與右賢王共立日逐王薄胥堂為屠耆單于發兵數萬人東襲呼韓邪單于呼韓邪單于兵敗走屠耆單于還以其長子都塗吾西為左谷蠡王少子姑瞀樓頭為右谷蠡王瞀音莫構反留居單于庭明年秋屠耆單于使日逐王先賢撣兄右薁鞬王與烏藉都尉各二萬騎屯東方以備呼韓邪單于是時西方呼揭王來與唯犂當戶謀揭音邱例反唯音弋癸反共讒右賢王言欲自立為烏藉單于屠耆單于殺右賢王父子後知其寃復殺唯犁當戶於是呼揭王恐遂畔去自立為呼揭單于右薁鞬王聞之即自立為車犂單于烏藉都尉亦自立為烏藉單于凡五單于屠耆單于自將兵東擊車犂單于使都隆竒擊烏藉烏藉車犂皆敗西北走與呼揭單于兵合為四萬人烏藉呼揭皆去單于號共并力尊輔車犂單于屠耆單于聞之使左大將都尉將四萬騎分屯東方以備呼韓邪單于自將四萬騎西擊車犁單于車犁單于敗西北走屠耆單于即引西南留闟敦地闟音踏敦音頓又音對其明年呼韓邪單于遣其弟右谷蠡王等西擊屠耆單于屯兵殺略萬餘人屠耆單于聞之即自將六萬騎擊呼韓邪單于行千里未至嗕姑地嗕音乃榖反逄呼韓邪單于兵可四萬人合擊屠耆單于兵敗自殺都隆竒乃與屠耆少子右谷蠡王姑瞀樓頭亡歸漢車犂單于東降呼韓邪單于呼韓邪單于左大將烏厲屈與父呼遫纍烏厲溫敦呼遫纍者其官號也遫古速字纍音力追反皆見胸奴亂率其衆數萬人南降漢封烏厲屈為新城侯烏厲溫敦為義陽侯是時李陵子復立烏藉都尉為單于呼韓邪單于捕斬之遂復都單于庭然衆裁數萬人屠耆單于從弟休旬王將所主五六百騎擊殺左大且渠并其兵至右地自立為閏振單于在西邊其後呼韓邪單于兄左賢王呼屠吾斯亦自立為郅支骨都侯單于在東邊其後二年閏振單于率其衆東擊郅支單于郅支單于與戰殺之并其兵遂進攻呼韓邪呼韓邪破走郅支都單于庭呼韓邪單于之敗也左伊秩訾王為呼韓邪計勸令稱臣入朝事漢從漢求助如此胸奴乃定呼韓邪議問諸大臣皆曰不可胸奴之俗本上氣力而下服役以馬上戰鬬為國家故有威名於百蠻戰死壯士所有也今兄弟爭國不在兄則在弟雖死猶有威名子孫常長諸國漢雖強猶不能兼并胸奴奈何亂先古之制臣事於漢卑辱先單于為諸國所笑雖如是而安何以復長百蠻左伊訾曰不然強弱有時今漢方盛烏孫城郭諸國皆為臣妾自且鞮侯單于以來胸奴日削不能取復雖屈強於此未嘗一日安也今事漢則安存不事則危亡計何以過此諸大人相難久之呼韓邪從其計引衆南近塞遣子右賢王銖婁渠堂婁音力俱反入侍郅支單于亦遣子右大將駒于利受入侍是歲甘露元年也明年呼韓邪單于款五原塞願朝三年正月漢遣車騎都尉韓昌迎發過所七郡郡二千騎為陳道上所過之郡每為發兵陳列於道以為寵衛也單于正月朝天子于甘泉宮漢寵以殊禮位在諸侯王上贊謁稱臣而不名賜以冠帶衣裳黃金璽盩綬盩古戾字戾草名也以戾染綬亦諸侯王之制也玉具劒摽首鐔衛盡用玉為之也鐔劒口旁橫出者也衛劒鼻也鐔音淫衛字本作彘其音同耳佩刀弓一張矢四發發猶放也四發則四矢也棨戟十棨戟有衣之戟也安車一乘鞍勒一具馬十五匹黃金二十斤錢二十萬衣被七十七襲襲猶副也錦繡綺縠雜帛八千匹絮六千斤禮畢使使者道單于先行宿長平上自甘泉宿池陽宮上登長平詔單于毋謁其左右當戶之羣臣皆得列觀及諸蠻夷君長王侯數萬咸迎於渭橋下夾道陳上登渭橋咸稱萬歲單于就邸留月餘遣歸國單于自謂願留光祿塞下徐自為所築者也有急保受降城漢遣長樂衛尉高昌侯董忠車騎都尉韓昌將騎萬六千又發邉郡士馬以千數送單于出朔方雞鹿塞在朔方窳渾縣西北詔忠等留衛單于助誅不服又轉邊榖米糒糒乾飯也音備前後三萬四千斛給贍其食是歲郅支單于亦遣使奉獻漢遇之甚厚明年兩單于俱遣使朝獻漢待呼韓邪使有加明年呼韓邪單于復入朝禮賜如初加衣百一十襲錦帛九千匹絮八千斤以有屯兵故不復發騎為送始郅支單于以為呼韓邪降漢兵弱不能復自還即引其衆西欲攻定右地又屠耆單于小弟本侍呼韓邪亦亡之右地收兩兄餘兵得數千人自立為伊利目單于道逄郅支合戰郅支殺之并其兵五萬餘人聞漢出兵穀助呼韓邪即遂留居右地自度力不能定胸奴乃益西近烏孫欲與并力遣使見小昆彌烏就屠烏就屠見呼韓邪為漢所擁郅支亡虜欲攻之以稱漢稱音尺孕反乃殺郅支使持頭送都護在所發八千騎迎郅支郅支見烏孫兵多其使又不返勒兵逄擊烏孫破之即北擊烏揭烏揭降發其兵西破堅昆北降丁令并三國數遣兵擊烏孫常勝之堅昆東去單于庭七千里南去車師五千里郅支留都之元帝初即位呼韓邪單于復上書言民衆困乏漢詔雲中五原郡轉穀二萬斛以給焉郅支單于自以道逺又怨漢擁護呼韓邪遣使上書求侍子漢遣谷吉送之郅支殺吉漢不知吉音問而胸奴降者言聞甌脫皆殺之呼韓邪單于使來漢輒簿責之甚急明年漢遣車騎都尉韓昌光祿大夫張猛送呼韓邪單于侍子求問吉等因赦其罪勿令自疑昌猛見單于民衆盛塞下禽獸盡單于足以自衛不畏郅支聞其大臣多勸單于北歸者恐北去後難約束昌猛即與為盟約曰自今以來漢與胸奴合為一家世世毋得相詐相攻有竊盜者相報行其誅償其物有寇發兵相助漢與胸奴敢先背約者受天不祥令其世世子孫盡如盟昌猛與單于及大臣俱登胸奴諾水東山刑白馬單于以徑路刀金留犂橈酒徑路胸奴寶刀也金契金也留犂飯匕也橈和也契金著酒中撓攪飲之契刻也橈音呼高反以老上單于所破月氏王頭為飲器者共飲血盟昌猛還奏事公卿議者以為單于保塞為藩雖欲北去猶不能為危害昌猛擅以漢國世世子孫與夷狄詛盟令單于得以惡言上告于天羞國家傷威重不可行宜遣使往告祠天與解盟昌猛奉使無狀罪至不道上薄其過有詔昌猛以贖論勿解盟其後呼韓邪竟北歸庭人衆稍稍歸之國中遂定郅支既殺使者自知負漢又聞呼韓邪益強恐見擊襲欲逺去會康居王數為烏孫所困與諸翕侯計以為胸奴大國烏孫素服屬之今郅支單于困厄在外可迎置東邊使合兵取烏孫以立之長無胸奴憂矣即使使至堅昆通語郅支郅支素恐又怨烏孫聞康居計大説遂與相結引兵而西康居亦遣貴人橐他驢馬數千匹迎郅支郅支人衆中寒道死餘財三千人到康居其後都護甘延壽與副陳湯發兵即康居誅斬郅支郅支既誅呼韓邪單于且喜且懼上書言曰常願謁見天子誠以郅支在西方恐其與烏孫俱來擊臣以故未得至漢今郅支已伏誅願入朝見竟寧元年單于復入朝禮賜如初加衣服錦帛絮皆倍于黃龍時單于自言願壻漢氏以自親元帝以後宮良家子王嬙字昭君賜單于單于歡喜上書願保塞上谷以西至敦煌傳之無窮請罷邊備塞吏卒以休天子人民天子令下有司議議者皆以為便郎中令侯應習邊事以為不可許上問狀應曰周秦以來胸奴暴桀寇侵邊境漢興尤被其害臣聞北邊塞至遼東外有陰山東西千餘里草木茂盛多禽獸本冒頓單于依阻其中治作弓矢來出為寇是其苑囿也至孝武世出師征伐斥奪此地攘之於幕北建塞徼起亭隧築外城設屯戍以守之然後邊境得用少安幕北地平少草木多大沙胸奴來寇少所隱蔽從塞以南徑深山谷往來差難邊長老言胸奴失陰山之後過之未嘗不哭也如罷備塞戍卒示夷狄之大利不可一也今聖德廣被天覆胸奴胸奴得蒙全活之恩稽首來臣夫夷狄之情困則卑順強則驕逆天性然也前以罷外城省亭隧今裁足以候望通烽火而已古者安不忘危不可復罷二也中國有禮義之教刑罰之誅愚民猶尚犯禁又况單于能必其衆不犯約哉三也自中國尚建關梁以制諸侯所以絶臣下之覬故也設塞徼置屯戍非獨為胸奴而已亦為諸屬國降民本故胸奴之人恐其思舊逃亡四也近西羌保塞與漢人交通吏民貪利侵盜其畜産妻子以此怨恨起而背叛世世不絶今罷乘塞則生嫚易分爭之漸五也往者從軍多沒不還者子孫貧困一旦亡出從其親戚六也又邊人奴婢愁苦欲亡者多曰聞胸奴中樂無奈候望急何然時有亡出塞者七也盜賊桀黠羣輩犯法如其窘急亡走北出則不可制八也起塞以來百有餘年非皆以土垣也或因山巖石木柴僵落溪谷水門稍稍平之卒徒築治功費久逺不可勝計臣恐議者不深慮其終始欲以一切省繇戍十年之外百歲之內卒有他變障塞破壞亭隧滅絶當更發屯繕治纍世之功不可卒復九也如罷戍卒省候望單于自以保塞守禦必深德漢請求無已小失其意則不可測開夷狄之隙虧中國之固十也非所以永持至安威制百蠻之長策也對奏天子有詔勿議罷邊塞事使車騎將軍口諭單于曰單于上書願罷北邊吏士屯戍子孫世世保塞單于鄉慕禮義所以為民計者甚厚此長久之策也朕甚嘉之中國四方皆有關梁障塞非獨以備塞外也亦以防中國姦邪放縱出為寇害故明法度以專衆心也敬諭單于之意朕無疑焉為單于怪其不罷故使大司馬車騎將軍嘉曉單于嘉許嘉也單于謝曰愚不知大計天子幸使大臣告語甚厚初左伊秩訾為呼韓邪畫計歸漢竟以安定其後或讒伊秩訾自伐其功常鞅鞅呼韓邪疑之左伊秩訾懼誅將其衆千餘人降漢漢以為關內侯食邑三百戶令佩其王印綬及竟寧中呼韓邪來朝與伊秩訾相見謝曰王為我計甚厚令胸奴至今安寧王之力也德豈可忘我失王意使王去不復顧留皆我過也今欲白天子請王歸庭伊秩訾曰單于賴天命自歸於漢得以安寧單于神靈天子之祐也我安得力既已降漢又復歸胸奴是兩心也願為單于侍使於漢不敢聽命單于固請不能得而歸王昭君號寧胡閼氏生一男伊屠智牙師為右日逐王呼韓邪立二十八年建始二年死始呼韓邪嬖左伊秩訾兄呼衍王女二人長女顓渠閼氏生二子長曰且莫車且音子余反次曰囊知牙斯少女為大閼氏生四子長曰雕陶莫臯次曰且麋胥且音子余反皆長於且莫車少子咸樂二人皆小於囊知牙斯又他閼氏子十餘人顓渠閼氏貴且莫車愛呼韓邪病且死欲立且莫車其母顓渠閼氏曰胸奴亂十餘年不絶如髮賴蒙漢力故得復安今平定未久人民創艾戰鬭創初亮反艾讀曰乂且莫車年少百姓未附恐復危國我與大閼氏一家共子不如立雕陶莫臯大閼氏曰且莫車雖少大臣共持國事今舍貴立賤後世必亂單于卒從顓渠閼氏計立雕陶莫臯約令傳國與弟呼韓邪死雕陶莫臯立為復株絫若鞮單于絫音力追反復株絫若鞮單于立遣子右致盧兒王醯諧屠奴侯入侍以且麋胥為左賢王且莫車為右谷蠡王囊知牙斯為右賢王復株絫單于復妻王昭君生二女長女為須卜居次小女為當于居次須卜當于皆胸奴之貴族居次者女之號若漢言公主也河平元年單于遣右臯林王伊邪莫演等奉獻朝正月既罷遣使者送至蒲阪伊邪莫演言欲降即不受我我自殺終不敢還歸使者以聞下公卿議議者或言宜如故事受其降光祿大夫谷永議郎杜欽以為漢興胸奴數為邊害故設金爵之賞以待降者今單于屈體稱臣列為北藩遣使朝賀無有二心漢家接之宜異於往時今既享單于聘貢之質而更受其逃逋之臣是貪一夫之得而失一國之心擁有罪之臣而絶慕義之君也假令單于初立欲委身中國未知利害私使伊邪莫演詐降以卜吉凶受之虧德沮善令單于自疏不親邊吏或者設為反間欲因而生隙受之適合其策使得歸曲而直責此誠邊竟安危之原師旅動靜之首不可不詳也不如勿受以昭日月之信抑詐諼之謀懷附親之心便對奏天子從之遣中郎將王舜往問降狀伊邪莫演曰我病狂妄言耳遣去歸到官位如故不肯令見漢使明年單于上書願朝河平四年正月遂入朝加錦繡繒帛二萬匹絮二萬斤他如竟寧時復株絫單于立十歲鴻嘉元年死弟且麋胥立為搜諧若鞮單于搜諧若鞮單于立遣子左祝都韓王朐留斯侯入侍朐音許于反以且莫車為左賢王搜諧單于立八歲元延元年為朝二年發行未入塞病死弟且莫車立為車牙若鞮單于車牙單于立遣子右於塗仇撣王烏夷當入侍塗音徒撣音㕓以囊知牙斯為左賢王車牙單于立四歲綏和元年死弟囊知牙斯立為烏珠留若鞮單于烏珠留單于立以第二閼氏子樂為左賢王以第五閼氏子輿為右賢王此第二閼氏即上所謂大閼氏也第五閼氏亦呼韓邪之閼氏樂輿二人皆烏珠留之弟遣子右股奴王烏鞮牙斯入侍漢遣中郎將夏侯藩副校尉韓容使胸奴時帝舅大司馬驃騎將軍王根領尚書事或説根曰胸奴有斗入漢地直張掖郡斗絶也直當也生竒材木箭竿就羽就大雕也黃頭赤目其羽可為箭竿音工旱反如得之於邊甚饒國家有廣地之實將軍顯功垂於無窮根為上言其利上直欲從單于求之為有不得傷命損威根即但以上指曉藩令從藩所説而求之藩至胸奴以語次説單于曰竊見胸奴斗入漢地直張掖郡漢三都尉居塞上士卒數百人寒苦候望久勞單于宜上獻此地直斷閉之省兩都尉士卒數百人以復天子厚恩其報必大單于曰此天子詔語邪將從使者所求也藩曰詔旨也然藩亦為單于畫善計耳單于曰孝宣孝元皇帝哀憐父呼韓邪單于從長城以北胸奴有之此溫偶駼王所居地也偶音五口反駼音塗下同未曉其形狀所生請遣使問之藩容歸漢後復使胸奴至則求地單于曰父兄傳五世漢不求此地至知獨求何也已問溫偶駼王胸奴西邊諸侯作穹廬及車皆仰此山材木且先父地不敢失也藩還遷為太原太守單于遣使上書以藩求地狀聞詔報單于曰藩擅稱詔從單于求地法當死更大赦二今徙藩為濟南太守不令當胸奴明年侍子死歸葬復遣子左於駼仇撣王稽留昆入侍至哀帝建平二年烏孫庶子卑援疐援音爰疐音竹二反翕侯人衆入胸奴西界寇盜牛畜頗殺其民單于聞之遣左大當戶烏夷泠泠音零將五千騎擊烏孫殺數百人略千餘人驅牛畜去卑援疐恐遣子趨逯為質胸奴逯音録單于受以狀聞漢遣中郎將丁野林副校尉公乘音使胸奴責讓單于告令遣還卑援疐質子單于受詔遣歸建平四年單于上書願朝五年時哀帝被疾或言胸奴從上遊來厭人遊猶流也河水從西北來故曰上遊也厭音一涉反自黃龍竟寧時單于朝中國輒有大故上由是難之以問公卿亦以為虛費府帑可且勿許單于使辭去未發黃門郎揚雄上書諫曰臣聞六經之治貴於未亂兵家之勝貴於未戰二者皆微然而大事之本不可不察也今單于上書求朝國家不許而辭之臣愚以為漢與胸奴從此隙矣胸奴本北地之狄五帝所不能臣三王所不能制其不可使隙甚明臣不敢逺稱請引秦以來明之以秦始皇之強蒙恬之威帶甲四十餘萬然而不敢窺西河乃築長城以界之會漢初興以高祖之威靈三十萬衆困於平城士或七日不食時竒譎之士石畫之臣甚衆石言堅固如石也畫計策也卒其以所脫者世莫得而言也謂自免之計其事醜惡故不傳又高皇后嘗忿胸奴羣臣廷議樊噲請以十萬衆橫行胸奴中季布曰噲可斬也妄阿順指於是大臣權書遺之然後胸奴之結解中國之憂平及孝文時胸奴侵暴北邊候騎至雍甘泉京師大駭發三將軍屯細柳棘門霸上以備之數月乃罷孝武即位設馬邑之權欲誘胸奴使韓安國將三十萬衆徼於便墬徼要也工堯反墬古地字胸奴覺之而去徒費財勞師一虜不可得見況單于之面乎其後深惟社稷之計規恢萬載之策乃大興師數十萬使衛靑霍去病操兵前後十餘年於是浮西河絶大幕破填顔襲王庭窮極其地追奔逐北封狼居胥山禪於姑衍以臨瀚海虜名王貴人以百數自是之後胸奴震怖益求和親然而未肯稱臣也且夫前世豈樂傾無量之費役無罪之人快心於狼望之北哉以為不一勞者不久佚不暫費者不永寧是以忍百萬之師以摧餓虎之喙運府庫之財填盧山之壑而不悔也至本始之初胸奴有桀心欲掠烏孫侵公主乃發五將之師十五萬騎獵其南而長羅侯以烏孫五萬騎震其西皆至質而還時鮮有所獲徒奮揚威武明漢兵若雷風耳雖空行空反尚誅兩將軍故北狄不服中國不得高枕安寢也逮至元康神爵之間大化神明鴻恩溥洽而胸奴內亂五單于爭立日逐呼韓邪攜國歸死扶伏稱臣然尚羈縻之計不專制自此之後欲朝者不距不欲者不強何者外國天性忿鷙形容魁楗負力怙氣難化以善易肄以惡其強難屈其和難得故未服之時勞師逺攻傾國殫貨伏尸流血破堅拔敵如彼之難也既服之後慰薦撫循交接賂遺威儀俯仰如此之備也往時嘗屠大宛之城蹈烏桓之壘探姑繒之壁藉蕩姐之場羌屬也姐音紫艾朝鮮之旃拔兩越之旗近不過旬月之役逺不離二時之勞固已犂其庭掃其閭郡縣而置之雲徹席卷後無餘災古災字唯北狄為不然真中國之堅敵也三垂比之懸矣前世重之兹甚未易可輕也今單于歸義懷款誠之心欲離其庭陳見於前此乃上世之遺策神靈之所想望國家雖費不得已者也奈何距以來厭之辭疏以無日之期消往昔之恩開將來之隙夫款而隙之使有恨心負前言緣往辭歸怨於漢因以自絶終無北靣之心威之不可諭之不能焉得而不為大憂乎夫眀者視於無形聰者聽於無聲誠先於未然即蒙恬樊噲不復施棘門細柳不復備馬邑之䇿安所設衛霍之功何得用五將之威安所震不然一有隙之後雖智者勞心於內辨者轂擊於外猶不若未然之時也且往者圖西域制車師置城郭都護三十六國費歲以大萬計者豈為康居烏孫能踰白龍堆而寇西邊哉乃以制胸奴故也夫百年勞之一日失之費十而愛一臣竊為國不安也唯陛下少留意於未亂未戰以遏邊萌之禍書奏天子悟焉召還胸奴使者更報單于書而許之賜雄帛五十匹黃金十斤單于未發會病復遣使願朝明年故事單于朝從名王以下及從者二百餘人單于又上書言蒙天子神靈人民盛壯願從者五百人入朝以明天子盛德上皆許之元壽二年單于來朝上以太歲厭勝所在舍之上林苑蒲陶宫告之以加敬於單于單于知之加賜衣三百七十襲錦繡繒帛三萬匹絮三萬斤他如河平時既罷遣中郎將韓況送單于單于出塞到休屯井北度車田盧水道里回逺回音胡對反況等乏食單于乃給其糧失期不還五十餘日初上遣稽留昆隨單于去到國復遣稽留昆同母兄右大且方與婦入侍且音子余反還歸復遣且方同母兄左日逐王都與婦入侍是時漢平帝幼太皇太后稱制新都侯王莽秉政欲説太后以威德至盛異於前乃風單于令遣王昭君女須卜居次云入侍太后所以賞賜之甚厚會西域車師後王句姑句音鉤去胡來王唐兜皆怨恨都護校尉將妻子人民亡降胸奴單于受置右谷蠡地遣使上書言狀曰臣謹已受詔遣中郎將韓隆王昌副校尉甄阜侍中謁者帛敞長水校尉王歙使胸奴告單于曰西域內屬不當得受今遣之單于曰孝宣孝元皇帝哀憐為作約束自長城以南天子有之長城以北單于有之有犯塞輒以狀聞有降者不得受臣知父呼韓邪單于蒙無量之恩死遺言曰有從中國來降者勿受輒送至塞以報天子厚恩此外國也得受之使者曰胸奴骨肉相攻國幾絶蒙中國大恩危亡復續妻子完安纍世相繼宜有以報厚恩單于叩頭謝罪執二虜還付使者詔使中郎將王萌待西域惡都奴界上逆受單于遣使送到國因請其罪使者以聞有詔勿聽會西域諸國王斬以示之乃造設四條中國人亡入胸奴者烏孫亡降胸奴者西域諸國佩中國印綬降胸奴者烏桓降胸奴者皆不得受遣中郎將王駿王昌副校尉甄阜王尋使胸奴班四條與單于雜函封付單于令奉行因收故宣帝所為約束封函還時莽奏令中國不得有二名因使使者以風單于宜上書慕化為一名漢必加厚賞單于從之上書言幸得備藩臣竊樂太平聖制臣故名囊知牙斯今謹更名曰知莽大説白太后遣使者答諭厚賞賜焉漢既班四條後護烏桓使者告烏桓民毋得復與胸奴皮布稅胸奴以故事遣使者責烏桓稅胸奴人民婦女欲賈販者皆隨往焉烏桓距曰奉天子詔條不當豫胸奴稅胸奴使怒收烏桓酋豪縛到懸之酋豪昆弟怒共殺胸奴使及其官屬收略婦女馬牛單于聞之遣使發左賢王兵入烏桓責殺使者因攻擊之烏桓分散或走上山或東保塞胸奴頗殺人民驅婦女弱小且千人去置左地告烏桓曰持馬畜皮布來贖之烏桓見略者親屬二千餘人持財畜往贖胸奴受留不遣王莽之篡也建國元年遣五威將王駿率甄阜王颯陳饒帛敞丁業六人多齎金帛重遺單于諭曉以受命代漢狀因易單于故印文曰胸奴單于璽莽更曰新胸奴單于章新者莽自係其國號將率既至授單于印紱詔令上故印紱單于再拜受詔譯前欲解取故印紱單于舉掖授之左姑夕侯蘇從旁謂單于曰止不見新印文宜且勿與單于止不肯與請使者坐穹廬單于欲前為壽五威將曰故印紱當以時上單于曰諾復舉掖授譯蘇復曰未見印文且勿與單于曰印文何由變更遂解故印紱奉上將率受著新紱不解視印飲食至夜乃罷右率陳饒謂諸將率曰鄉者姑夕侯疑印文幾令單于不與人如令視印見其變改必求故印此非辭説所能距也既得而復失之辱命莫大焉不如椎破故印以絶禍根將率猶豫莫有應者饒燕士勇悍即引斧椎壞之明日單于果遣右骨都侯當白將率曰漢賜單于印言璽不言章又無漢字諸王已下乃有漢言章今印去璽加新與臣下無别願得故印將率示以故印謂曰新室順天制作故印隨將率所自為破壞單于宜承天命奉新室之制當還白單于知已無可奈何又多得賂遺即遣弟右賢王輿奉馬牛隨將率入謝因上書求故印將率還到左犂汙王咸所居地見烏桓民多以問咸咸具言狀將率曰前封四條不得受烏桓降者亟還之咸曰請密與單于相聞得語歸之單于使咸報曰當從塞內還之邪從塞外還之邪將率不敢顓決以聞詔報從塞外還之單于始用夏侯藩求地有距漢語後以求稅烏桓不得因寇略其人民釁由此生重以印文改易故怨恨乃遣右大且渠蒲呼盧訾等十餘人將兵衆萬騎以護送烏桓為名勒兵朔方塞下朔方太守以聞明年西域車師後王須置離謀降胸奴都護但欽誅斬之置離兄狐蘭支將人衆二千餘人歐畜産舉國亡降胸奴單于受之狐蘭支與胸奴共入寇車師殺後城長傷都護司馬復還入胸奴時戊巳校尉史陳良終帶司馬丞韓元右曲候任商等見西域頗背畔聞胸奴欲大侵恐并死即謀劫略吏卒數百人共殺戊巳校尉刁護遣人與胸奴南犂汙王南將軍相聞胸奴南將軍一千騎入西域迎良等良等盡脋略戊巳校尉吏士男女二千餘人入胸奴元商留南將軍所良帶徑至單于庭人衆别置零吾水上田居單于號良帶曰烏桓二將軍留居單于所數呼與飲食西域都護但欽上書言胸奴南將軍右伊秩訾將人衆寇擊諸國莽於是大分胸奴為十五單于遣中郎將蘭苞副校尉戴級將兵萬騎多齎珍寶至雲中塞下招誘呼韓邪單于諸子欲以次拜之使譯出塞誘呼右犂汙王咸咸子登助三人至則脋拜咸為孝單于賜安車鼓吹各一黃金千斤雜繒千匹戲戟十戲戟有旗之戟戲音許宜反又音麾拜助為順單于賜黃金五百斤傳送助登長安莽封苞為宣威公拜為虎牙將軍封級為揚威公拜為虎賁將軍單于聞之怒曰先單于受漢宣帝恩不可負也今天子非宣帝子孫何以得立遣左骨都侯右伊秩訾王呼盧訾及左賢王樂將兵入雲中益壽塞大殺吏民是嵗建國三年也是後單于歷告左右部都尉諸邊王入塞寇盜大輩萬餘中輩數千少者數百殺鴈門朔方太守都尉略吏民畜産不可勝數緣邊虛耗莽新即位怙府庫之富欲立威乃拜十二部將率發郡國勇士武庫精兵各有所屯守轉委輸於邊議滿三十萬衆齎三百日糧同時十道並出窮追丐奴內之于丁令因分其地立呼韓邪十五子莽將嚴尤諌曰臣聞丐奴為害所從來久矣未聞上世有必征之者也後世三家周秦漢征之然皆未有得上䇿者也周得中䇿漢得下策秦無䇿焉當周宣王時獫狁內侵至于涇陽命將征之盡境而還其視戎狄之侵譬猶蚊虻之螫驅之而已故天下稱明是為中䇿漢武帝選將練兵約齎輕糧深入逺戍雖有克獲之功胡輒報之兵連禍結三十餘年中國罷耗胸奴亦創艾而天下稱武是為下䇿秦始皇不忍小恥而輕民力築長城之固延袤萬里轉輸之行起於負海疆境既完中國內竭以喪社稷是為無䇿今天下遭陽九之厄比年飢饉西北邊尤甚發三十萬衆具三百日糧東援海岱南取江淮然後乃備計其道里一年尚未集合兵先至者聚居暴露師老械弊藝不可用此一難也邊既空虛不能奉軍糧內調郡國不相及屬此二難也計一人三百日食用糒十八斛非牛力不能勝牛又當自齎食加二十斛重矣胡地沙鹵多乏水草以往事揆之軍出未滿百日牛必物故且盡餘糧尚多人不能負此三難也胡地秋冬甚寒春夏甚風多齎釜鍑薪炭重不可勝釜古釡字鍑釡之大口者也鍑音富食糒飲水以歷四時師有疫疾之憂是故前世伐胡不過百日非不欲久藝力不能此四難也輜車自隨則輕鋭者少不得疾行虜徐遁逃藝不能及幸而逢虜又纍輜重如遇險阻銜尾相隨虜要遮前後危殆不測此五難也大用民力功不可必立臣伏憂之今既發兵宜縱先至者令臣尤等深入霆擊且以創艾胡虜莽不聽尤言轉兵榖如故天下騷動咸既受莽孝單于之號馳出塞歸庭具以見脅狀白單于單于更以為於粟置支侯胸奴賤官也後助病死莽以登代助為順單于厭難將軍陳欽震狄將軍王巡屯雲中葛邪塞是時胸奴數為邊寇殺將率吏士略人民驅畜産去甚衆捕得虜生口驗問皆曰孝單于咸子角數為寇兩將以聞四年莽會諸蠻夷斬子登于長安市初北邊自宣帝以來數世不見煙火之警人民熾盛牛馬布野及莽撓亂丐奴與之搆難撓攪也音火髙反邊民死亡係獲又十二部兵久屯而不出吏士罷弊數年之間北邊虛空野有暴骨矣烏珠留單于立二十一嵗建國五年死丐奴用事大臣右骨都侯須卜當即王昭君女伊墨居次云之壻也云常欲與中國和親又素與咸厚善見咸前後為莽所拜故遂越輿而立咸為烏纍若鞮單于纍音力追反烏纍單于咸立以弟輿為左谷蠡王烏珠留單于子蘇屠胡本為左賢王以弟屠耆閼氏子盧渾為右賢王烏珠留單于在時左賢王數死以為其號不祥更易命左賢王曰護于護于之尊最貴次當為單于故烏珠留單于授其長子以為護于欲傳以國咸怨烏珠留貶賤已號不欲傳國及立貶護于為左屠耆王云當遂勸咸和親天鳳元年云當遣人之西河虎猛制虜塞下告塞吏曰欲見和親侯和親侯王歙者王昭君兄子也中部都尉以聞莽遣歙歙弟騎都尉展德侯颯使胸奴賀單于初立賜黃金衣被繒帛紿言侍子登在因購求陳良終帶等單于盡收四人及手殺校尉刁護賊芝音妻子以下二十七人皆械檻付使者遣右厨唯姑夕王富等四十人送歙颯莽作焚如之刑燒殺陳良等罷諸將率屯兵但置遊擊都尉單于貪莽賂遺故外不失漢故事然內利寇掠又使還知子登前死怨恨寇虜從左地入不絶使者問單于輒曰烏桓與胸奴無狀黠民共入為寇入塞譬如中國有盜賊耳咸初立持國威信尚淺盡力禁止不敢有二心天鳳二年五月莽復遣歙與五威將王咸率伏黯丁業等六人使送右厨唯姑夕王因奉歸前所斬侍子登及諸貴人從者喪皆載以常車至塞下單于遣云當子男大且渠奢等至塞迎咸等至多遺單于金珍因諭説改其號號胸奴曰恭奴單于曰善于賜印綬封骨都侯當為後安公當子男奢為後安侯單于貪莽金幣故曲聽之然寇盜如故咸歙又以陳良等購金付云當令自差與之十二月還入塞莽大喜賜歙錢二百萬悉封黯等單于咸立五嵗天鳳五年死弟左賢王輿立為呼都而尸道臯若鞮單于丐奴謂孝曰若鞮自呼韓邪後與漢親密見漢諡帝為孝慕之故皆為若鞮呼都而尸單于輿既立貪利賞賜遣大且渠奢與云女弟當戶居次子醯櫝王俱奉獻至長安莽遣和親侯歙與奢等俱至制虜塞下與云當會因以兵迫脅將至長安云當小男從塞下得脫歸丐奴當至長安莽以為須卜單于欲出大兵以輔立之兵調度亦不合而胸奴愈怒並入北邊北邊由是壞敗會當病死莽以其庶女陸逯任妻後安公奢陸逯邑也莽改公主曰任奢本為侯莽以女妻之故進為公逯音録任音壬所以尊寵之甚厚終為欲出兵立之者會漢兵誅莽云奢亦死更始二年冬漢遣中郎將歸德侯颯大司馬護軍陳遵使胸奴授單于漢舊制璽綬王侯以下印綬因送云當餘親屬貴人從者單于輿驕謂遵颯曰胸奴本與漢為兄弟丐奴中亂孝宣皇帝輔立呼韓邪單于故稱臣以尊漢今漢亦大亂為王莽所篡胸奴亦出兵擊莽空其邊境令天下騷動思漢莽卒以敗而漢復興亦我力也當復尊我遵與相牚距牚音丑庚反單于終持此言其明年夏還會赤眉入長安更始敗光武初方平諸夏未遑外事至六年始令劉颯使胸奴胸奴亦遣使來獻漢復令中郎將韓統報命賂遺金帛以通舊好而單于益踞傲帝容忍待之故使命常通先是漁陽太守彭寵以建武初畔亂與單于共連兵因復立安定人盧芳為漢帝使入居五原自是胸奴數與芳共侵北邊九年帝遣大司馬吳漢等擊之經嵗無功而丐奴轉盛鈔暴日增十三年遂寇河東州郡不能禁於是漸徙幽并邊人於常山關居庸關已東胸奴左部遂復轉居塞內朝廷患之增緣邊兵郡數千人大築亭候修烽火設重賞購求盧芳於胸奴胸奴貪得漢財物乃遣芳還降望得其賞而芳以自歸為功不稱胸奴所遣單于復恥言其計故賞遂不行由是大恨入寇尤深二十年遂至上黨扶風天水二十一年冬復寇上谷中山殺略甚衆北邊無復寧嵗初單于弟右谷蠡王伊屠知牙斯以次當為左賢王左賢王有傳國之漸單于欲傳其子遂殺知牙斯知牙斯者王昭君之子也于時單于兄烏珠留單于子比為右薁鞬日逐王部領南邊及烏桓見知牙斯被誅出怨言曰以兄弟言之右谷蠡王次當立以子言之我前單于長子我當立遂內懷猜懼庭會稀濶單于疑之乃遣兩骨都侯監領比所部兵二十三年單于輿死子左賢王烏逹鞮侯立為單于復死弟左賢王蒲奴立為單于比不得立既懷憤恨而胸奴中連年旱蝗赤地數千里草木盡枯人畜飢疲死耗大半單于畏漢承其敝乃遣使詣漁陽求和親於是遣中郎將李茂報命而比密遣漢人郭衡奉胸奴地圖二十三年詣西河太守求內附兩骨都侯頗覺其意會五月龍祠因白單于言薁鞬日逐夙來欲為不善若不誅且亂國時比弟漸將王在單于帳下聞之馳以報比比懼遂斂所主南邊八郡衆四五萬人待兩骨都侯還欲殺之骨都侯且到知其謀皆輕騎亡去以告單于單于遣萬騎擊之見比衆盛不敢進而還二十四年春八部大人共議立比為呼韓邪單于以其大父嘗依漢得安故欲襲其號於是款五原塞願永為藩蔽扞禦北虜帝用五官中郎將耿國議乃許之其冬比自立為呼韓邪單于復號醯落尸逐鞮單于單于自復株絫以下皆稱若鞮今自比以下直稱鞮也胸奴自是始分為南北單于二十五年春南單于遣弟左賢王莫將兵萬餘人擊北單于弟薁鞬左賢王生獲之又破北單于帳下并得其衆合萬餘人馬七千匹牛羊萬頭北單于震怖却地千里初帝造戰車可駕數牛上作樓櫓置於塞上以拒胸奴時人見者或相謂曰讖言漢九世當却北狄地千里豈謂此邪及是果拓地焉北部薁鞬骨都侯與右骨都侯率衆三萬餘人來歸南單于南單于復遣使詣闕奉藩稱臣獻國珍寶求使者監護遣侍子修舊約二十六年遣中郎將假郴副校尉王郁使南單于亡其庭去五原西部塞八十里單于乃延迎使者曰單于當伏拜受詔單于顧望有頃乃伏稱臣拜訖令譯曉使者曰單于新立誠慙於左右願使者衆中無相屈折也骨都侯見皆泣下郴等反命詔乃聽南單于入居雲中遣使上書獻橐他二頭文馬十匹夏南單于所獲北虜薁鞬左賢王將其衆及南部五骨都侯合三萬餘人畔歸去北庭三百餘里共立薁鞬左賢王為單于月餘日更相攻擊五骨都侯皆死左賢王遂自殺諸骨都侯子各擁兵自守秋南單于遣子入侍奉奏詣闕詔賜單于冠帶衣裳黃金璽盩緺綬盩音戾注已前見緺古蛙反紫青色也安車羽蓋華藻駕駟寶劒刀箭黑節三駙馬二黃金錦繡繒布萬匹絮萬斤樂器鼓車棨戟甲兵飲食什器又轉河東米糒三萬五千斛牛羊三萬六千頭以贍給之令中郎將置安集掾史將弛刑五千人持兵弩隨單于所處參辭訟察動靜單于嵗盡輒遣奉奏送侍子入朝中郎將從事一人將領詣闕漢遣謁者送前侍子還單于庭交會道路元正朝賀拜祠陵廟畢漢乃遣單于使令謁者將送賜綵繒千匹錦四端金十斤太官御食醫及橙橘龍眼荔支賜單于母及諸閼氏單于子及左右賢王左右谷蠡王骨都侯有功善者繒綵合萬匹嵗以為常冬前畔五骨都侯子復將其衆三千人歸南部北單于使騎追擊悉獲其衆南單于遣兵拒之逆戰不利於是復詔單于徙居西河美稷因使中郎將假郴及副校尉王郁留西河擁護之為設官府從事史掾史令西河長史歲將騎二千弛刑五百人助中郎將衛護單于冬屯夏罷自後以為常及悉復緣邊八郡南單于既居西河亦列置諸部王助為扞戍使韓氏骨都侯屯北地右賢王屯朔方當于骨都侯屯五原呼衍骨都侯屯雲中郎氏骨都侯屯定襄左南將軍屯鴈門栗籍骨都侯屯代郡皆領部衆為郡縣偵羅耳目偵音丑政反羅音力賀反偵羅猶探候也北單于惶恐頗還所略漢人以示善意鈔兵每到南部下還過亭候輒謝曰自擊亡虜薁鞬日逐耳非敢犯漢人也二十七年北單于遂遣使詣武威求和親天子召公卿廷議不決皇太子言曰南單于新附北虜懼於見伐故傾耳而聽爭欲歸義耳今未能出兵而反交通北虜臣恐南單于將有志北虜降者且不復來矣帝然之告武威太守勿受其使二十八年北胸奴復使詣闕貢馬及裘更乞和親并請音樂又求率西域諸國胡客與俱獻見帝下三府議酬答之宜司徒掾班彪奏曰臣見孝宣皇帝敕邊守尉曰胸奴大國多變詐交接得其情則却敵折衝應對入其數則反為輕欺今北胸奴見南單于來附懼謀其國故數求和親又逺驅牛馬與漢合市重遣名王多所貢獻斯皆外示富強以相欺誕也臣見其獻益重知其國益虛歸親愈數為懼愈多然今既未獲助南亦不宜絶北羈縻之義禮無不答謂可頗加賞賜略與所獻相當明加曉告以前世呼韓邪郅支行事報答之辭令必有適今立藁草并上曰單于不忘漢恩追念先祖舊約欲修和親以輔身安國計議甚髙為單于嘉之往者丐奴數有乖亂呼韓邪郅支自相讐隙並蒙孝宣皇帝垂恩救護故各遣侍子稱藩保塞其後郅支忿戾自絶皇澤而呼韓邪附親忠孝彌著及漢滅郅支遂保國傳嗣子孫相繼今南單于攜衆而南欵塞歸命自以呼韓嫡長次第當立而侵奪失職猜疑相背數請兵將歸掃北庭䇿謀紛紜無所不至惟念斯言不可獨聽又以北單于比年貢獻欲修和親故拒而未許將以成單于忠孝之義漢秉威信總率萬國日月所照皆為臣妾殊俗百蠻義無親疏服順者褒賞畔逆者誅罰善惡之效呼韓邪郅支是也今單于欲修和親欵誠已達何嫌而欲率西域諸國俱來獻見西域國屬胸奴與屬漢何異單于數連兵亂國內虛耗貢物裁以通禮何必獻馬裘今齎雜繒五百匹弓鞬韥丸一矢四發遣遺單于又賜獻馬左骨都侯右谷蠡王雜繒各四百匹斬馬劒各一單于前言先帝時所賜呼韓邪竽瑟空侯皆敗願復裁賜念單于國尚未安方厲武節以戰攻為務竽瑟之用不如良弓利劒故未以齎朕不愛小物於單于便宜所欲遣驛以聞帝悉納從之二十九年賜南單于羊數萬頭三十一年北胸奴復遣使如前乃璽書報答賜以綵繒不遣使者單于比立九年死中郎將假郴將兵赴弔祭以酒米分兵衛護之弟左賢王莫立為邱浮尤鞮單于帝遣使者齎璽書鎮慰拜授璽綬遺冠幘絳單衣三襲童子佩刀緄帶各一緄織成帶也音古本反又賜繒綵四千匹令賞賜諸王骨都侯已下其後單于死弔祭慰賜以此為常邱浮尤鞮單于莫中元元年立一年死弟汙立為伊伐於慮鞮單于汙中元二年立永平二年北胸奴護于邱率衆千餘人來降南部單于汙立二年死單于比之子適以永平二年立為醯僮尸逐侯鞮單于永平五年冬北胸奴六七千騎入于五原塞遂寇雲中至原陽南單于擊却之西河長史馬襄赴援虜乃引去單于適立四年死單于莫子蘇立是為邱除車林鞮單于數月復死單于適之弟長立為胡邪尸逐侯鞮單于長以永平六年立時北胸奴猶盛數寇邊朝廷以為憂會北單于欲合市遣使求和親顯宗冀其交通不復為寇乃許之八年遣越騎司馬鄭衆北使報命而南部須卜骨都侯等知漢與北虜交使懷嫌怨欲畔密因北使令遣兵迎之鄭衆出塞疑有異伺候果得須卜使人乃上言宜更置大將以防二虜交通由是始置度遼營以中郎將吳棠行度遼將軍事副校尉來苖左校尉閻章右校尉張國將黎陽虎牙營士屯五原曼柏又遣騎都尉秦彭將兵屯美稷其年秋北虜果遣二千騎候望朔方作馬革船欲度迎南部畔者以漢有備乃引去復數寇鈔邊郡焚燒城邑殺略甚衆河西城門晝閉帝患之十六年乃大發緣邊兵遣諸將四道出塞北征胸奴南單于遣左賢王信隨大僕祭肜及吳棠出朔方髙闕攻臯林溫禺犢王於涿邪山虜聞漢兵來悉度幕北去肜棠坐不至涿邪山免以騎都尉來苖行度遼將軍其年北胸奴入雲中遂至漁陽太守亷范擊郤之詔遣使者高𢎞發三郡兵追之無所得建初元年來苗遷濟陰太守以征西大將軍耿秉行度遼將軍時臯林溫禺犢王復將衆居涿邪山南單于聞知遣輕騎與緣邊郡及烏桓兵出塞擊之斬首數百級降者三四千人其年南部苦蝗大飢肅宗稟給其貧人三萬餘口七年耿秉遷執金吾以張掖太守鄧鴻行度遼將軍八年北胸奴三木樓訾大人稽留斯等率三萬八千人馬二萬匹牛羊十餘萬款五原塞降元和元年武威太守孟雲上言北單于復願與吏民合市詔書聽雲遣驛使迎呼慰納之北單于乃遣大且渠伊莫訾王等驅牛馬萬餘頭來與漢賈客交易諸王大人或前至所在郡縣為設官邸賞賜待遇之南單于聞乃遣輕騎出上郡遮略生口鈔掠牛馬驅還入塞二年正月北胸奴大人車利涿兵等亡來入塞凡七十三輩時北虜衰耗黨衆離畔南部攻其前丁零寇其後鮮卑擊其左西域侵其右不復自立乃逺引而去單于長立二十三年死單于扞之子宣立為伊耆於閭鞮單于宣元和二年立其嵗單于遣兵千餘人獵至涿邪山與北虜溫禺犢王卒遇卒音七忽反因戰獲其首級而還冬孟雲上言北虜以前和親而南部復往鈔掠北單于謂漢欺之謀欲犯塞謂宜還南所掠生口以慰安其意肅宗從太僕袁安議許之乃下詔曰昔獫狁薰粥之敵中國其所由來尚矣往者雖有和親之名終無絲髮之效墝埆之人屢嬰塗炭父戰於前子死於後弱女棄於亭障孤兒號於道路老母寡妻設位祭飲泣淚想望歸魂於沙漠之表豈不哀哉傳曰江海所以能長百川者以其下之也少加屈下尚何足病况今與胸奴君臣分定辭順約明貢獻纍至豈宜違信自受其曲其勑度遼及領中郎將龎奮倍雇南部所得生口以還北虜其南部斬首獲生計功受賞如常科於是南單于復令薁鞬日逐王師子將輕騎數千出塞掩擊北虜復斬獲千人北虜衆以南部為漢所厚又聞取降者歲數千人章和元年鮮卑入左地擊北丐奴大破之斬優留單于取其胸奴皮而還北庭大亂屈蘭儲卑胡都須等五十八部口二十萬勝兵八千人詣雲中五原朔方北地降單于宣立三年死單于長之弟屯屠何立為休蘭尸逐侯鞮單于屯屠何以章和二年立時北虜大亂加以飢蝗降者前後而至南單于將并北庭會肅宗崩竇太后臨朝其年七月單于上言臣纍世蒙恩不可勝數孝章皇帝聖恩逺慮遂欲見成就故令烏桓鮮卑討北虜斬單于首級破壞其國今所新降虛渠等詣臣自言去嵗三月中發虜北庭北單于創艾南兵又畏丁令鮮卑遁逃逺去依安侯河西今年七月骨都侯等復共立單于母兄右賢王為單于其人以兄弟爭立並各離散臣與諸王骨都侯及新降渠師雜議方略皆曰宜及北虜分爭出兵討伐破北成南并為一國令漢家長無北念又今月八日新降右須日逐鮮堂輕從虜庭逺來詣臣言北虜諸部多欲內顧但恥自發遣故未有至者若出兵奔擊必有響應今年不往恐復并一臣伏念先父歸漢以來被蒙覆載嚴塞明候大臣擁護積四十年臣等生長漢地開口仰食嵗時賞賜動輒億萬雖垂拱安枕慙無報效之地願發國中及諸部故胡新降精兵遣左谷蠡王師子左呼衍日逐王須訾將萬騎出朔方左賢王安國右大且渠王交勒蘇將萬騎出居延期十二月同會虜地臣將餘兵萬人屯五原朔方塞以為拒守臣素愚淺又兵衆單少不足以防內外願遣執金吾耿秉度遼將軍鄧鴻及西河雲中五原朔方上郡太守并力而北令北地安定太守各屯要害冀因聖帝威神一舉平定臣國成敗要在今年已敕諸部嚴兵馬訖九月龍祠悉集河上唯陛下裁哀省察太后以示耿秉秉上言昔武帝殫極天下欲臣虜胸奴未遇天時事遂無成宣帝之世會呼韓來降故邊人獲安中外為一生人休息六十餘年及王莽篡位變更其號耗擾不止單于乃畔光武受命復懷納之緣邊壞郡得以還復烏桓鮮卑咸脅歸義威鎮四夷其效如此今幸遇天授北虜分爭以夷伐夷國家之利宜可聽許秉因自陳受恩分當出命效用太后從之永元元年以秉為征西將軍與車騎將軍竇憲率騎八千與度遼兵及南單于衆三萬騎出朔方擊北虜大破之北單于奔走斬捕首虜二十餘萬事具竇憲傳二年春鄧鴻遷大鴻臚以定襄太守皇甫稜行度遼將軍南單于復上書求滅北庭於是遣左谷蠡王師子等將左右部八千騎出雞鹿塞中郎將耿談遣從事將護之至涿邪山乃留輜重分為二部各引輕兵兩道襲之左部北過西海至河雲北右部從胸奴河水西繞天山南度甘微河二軍俱會夜圍北單于單于大驚率精兵千餘合戰單于被創墮馬復上將輕騎數十遁走僅而免脫得其玉璽獲閼氏及男女五人斬首八千級生虜數千口而還是時南部連尅獲納降黨衆最盛領戶三萬四千口二十三萬七千三百勝兵五萬一百七十故從事中郎將置從事二人耿談以新降者多上增從事十二人三年北單于復為右校尉耿夔所破逃亡不知所在其弟右谷蠡王於除鞬自立為單于將右溫禺鞬王骨都侯已下衆數千人止蒲類海遣使款塞大將軍竇憲上書立於除鞬為北單于朝廷從之四年遣耿夔即授璽綬賜玉劒四具羽蓋一駟使中郎將任尚持節衛護屯伊吾如南單于故事方欲輔歸北庭會竇憲被誅五年於除鞬自畔還北帝遣將兵長史王輔以千餘騎與任尚共追誘將還斬之破滅其衆單于屯屠何立六年死單于宣弟安國以永元五年立為單于安國初為左賢王而無稱譽左谷蠡王師子素勇黠多知前單于宣及屯屠何皆愛其氣決故數遣將兵出塞掩擊北庭還受賞賜天子亦加殊異是以國中盡敬師子而不附安國安國由是疾師子欲殺之其諸新降胡初在塞外數為師子所驅掠皆多怨之安國由是委計降者與同謀議安國既立為單于師子以次轉為左賢王覺單于與新降者有謀乃别居五原界單于每會龍祠議事師子輒稱病不往皇甫稜知之亦擁護不遣單于懷憤益甚六年春皇甫稜免以執金吾朱徽行度遼將軍時單于與中郎將杜崇不相平乃上書告崇崇諷西河太守令斷單于章無由自聞而崇因與朱徽上言南單于安國疏逺故胡親近新降欲殺左賢王師子及左臺且渠劉利等又右部降者謀共迫脅安國起兵背畔請西河上郡安定為之警備和帝下公卿議皆以為蠻夷反覆雖難測知然大兵聚會必未敢搖動今宜遣有方略使者之單于庭與杜崇朱徽及西河太守并力觀其動靜如無他變可令崇等就安國會其左右大臣責其部衆橫暴為邊害者共平罪誅若不從命令為權時方略事畢之後裁行客賜言以主客之禮裁量賜物不多與也亦足以威示百蠻帝從之於是徽崇遂發兵造其庭安國夜聞漢軍至大驚棄帳而去因舉兵及將新降者欲誅師子師子先知乃悉將廬落入曼柏城安國追到城下門閉不得入朱徽遣吏曉譬和之安國不聽城既不下乃引兵屯五原崇徽因發諸郡騎追赴之急衆皆大恐安國舅骨都侯喜為等慮并被誅乃格殺安國安國立一年單于適之子師子立為亭獨尸逐侯鞮單于師子以永元六年立師子新立降胡五六百人夜襲其帳安集掾王恬將衛護士與戰破之於是新降胡遂相驚動十五部二十餘萬人皆反畔脅立前單于屠屯何子薁鞬日逐王逢侯為單于遂殺略吏民燔燒郵亭廬帳將車重向朔方欲度幕北於是遣行車騎將軍鄧鴻越騎校尉馮柱行度遼將軍朱徽將左右羽林北軍五校士及郡國積射緣邊兵烏桓校尉任尚將烏桓鮮卑合四萬人討之時南單于及中郎將杜崇屯牧師城逢侯將萬騎攻圍之未下冬鄧鴻等至美稷逢侯乃乘冰度隘向滿夷谷南單于遣子將萬騎及杜崇所領四千騎與鄧鴻等追擊逢侯於大城塞斬首三千餘級得生口及降者萬餘人馮柱復分兵追擊其别部斬首四千餘級任尚率鮮卑大都護蘇拔廆胡罪反烏桓大人勿柯八千騎要擊逢侯於滿夷谷復大破之前後凡斬首萬七千餘級逢侯遂率衆出塞漢兵不能追七年正月軍還馮柱將虎牙營留屯五原罷遣鮮卑烏桓羌胡兵封蘇拔廆為率衆王又賜金帛鄧鴻還京師坐逗留失利下獄死後帝知朱徽杜崇失胡和又禁其上書以致反畔皆徵下獄死以鴈門太守龐奮行度遼將軍逢侯於塞外分為二部自領右部屯涿邪山下左部屯朔方西北相去數百里八年冬左部胡自相疑畔還入朔方塞龐奮迎受慰納之其勝兵四千人弱小萬餘口悉降以分處北邊諸郡南單于以其右溫禺犢王烏居戰烏居戰乃右禺犢王名也始與安國同謀欲考問之烏居戰將數千人遂復反畔出塞外山谷間為吏民害秋龐奮馮柱與諸郡兵擊烏居戰其衆降於是徙烏居戰衆及諸還降者二萬餘人於安定北地馮柱還遷將作大匠逢侯部衆飢窮又為鮮卑所擊無所歸竄逃去塞者駱驛不絶單于師子立四年死單于長之子檀立為萬氏尸逐鞮單于檀以永元十年立十二年龐奮遷河南尹以朔方太守王彪行度遼將軍南單于比嵗遣兵擊逢侯多所虜獲收還生口前後以千數逢侯轉困迫十六年北單于遣使詣闕貢獻願和親修呼韓邪故約和帝以其舊禮不備未許之而厚加賞賜不答其使元興元年重遣使詣敦煌貢獻辭以國貧未能備禮願請大使當遣子入侍時鄧太后臨朝亦不答其使但加賜而已永初三年夏漢人韓琮隨南單于入朝既還説南單于云關東水潦人民飢餓死盡可擊也單于信其言遂起兵反畔攻中郎將耿种於美稷秋王彪卒冬遣行車騎將軍何熙副中郎將龐雄擊之四年春單于遣千餘騎寇常山中山以西域校尉梁慬行度遼將軍與遼東太守耿夔擊破之單于見諸軍並進大恐怖顧讓韓琮曰汝言漢人死盡今是何等人也乃遣使乞降許之單于脫帽徒跣對龎雄等拜陳道死罪於是赦之遇待如初乃還所鈔漢民男女及羌所略轉賣及胸奴中者合萬餘人五年梁慬免以雲中太守耿夔行度遼將軍元初元年夔免以烏桓校尉鄧遵為度遼將軍遵皇太后之從弟故始為真將軍焉四年逢侯為鮮卑所破部衆分散皆歸北虜五年春逢侯將百餘騎亡還詣朔方塞降鄧遵奏徙逢侯於潁川郡建光元年鄧遵免復以耿夔代為度遼將軍時鮮卑寇畔夔與溫禺犢王呼尤徵將新降者連年出塞討擊鮮卑還復各令屯列衝要而耿夔徵發煩劇新降皆悉恨謀畔單于檀立二十七年死弟拔立為烏稽侯尸逐鞮單于拔以延光三年立是嵗耿夔復免以太原太守法度為度遼將軍時新附一部大人阿族等反畔脅呼尤徴欲與俱去呼尤徵曰我老矣受漢家恩寧死不能相隨衆欲殺之有救者得免阿族等遂將妻子輜重亡去中郎將馬翼遣兵與胡騎追擊破之斬首及自投河死者殆盡獲馬牛羊萬頭冬法度卒四年漢陽太守傅衆代為度遼將軍其冬傅衆復卒永建元年以遼東太守龎參代為度遼將軍先是朔方以西障塞多不修復鮮卑因此數寇南部殺漸將王單于憂恐上書求復障塞順帝從之乃遣黎陽營兵出屯中山北界增置緣邊諸郡兵别屯塞下教習戰射單于拔立四年死弟休利立為去特若尸逐鞮單于休利以永建三年立四年龎參遷大鴻臚以東平相宋漢代為度遼將軍陽嘉二年漢遷太僕以烏桓校尉耿曄代為度遼將軍永和元年曄病徵以護羌校尉馬續代為度遼將軍五年夏南胸奴左部句龍王吾斯車紐等背畔率三千餘騎寇西河因復招誘右賢王合七八千騎圍美稷殺朔方代郡長吏馬續與中郎將梁並烏桓校尉王元發緣邊兵及烏桓鮮卑羌胡合二萬餘人掩擊破之吾斯等遂更屯聚攻沒城邑天子遣使責讓單于開以恩義令相招降單于本不預謀乃脫帽避帳詣並謝罪並以病徵五原太守陳龜代為中郎將龜以單于不能制下逼迫之單于及其弟左賢王皆自殺單于休利立十三年龜又欲徙單于近親於內郡而降者遂更狐疑龜坐下獄死大將軍梁商以羌胡新反黨衆初合難以兵服宜用招降乃上表曰胸奴寇畔自知罪極窮鳥困獸皆知救死況種類繁熾不可殫盡今轉運日增三軍疲苦虛內給外非中國之利宜令度遼將軍馬續深溝髙壁以恩信招降宣示購賞明其期約如此則醜類可服國家無事矣帝從之乃詔續招降畔虜商又移書續等曰中國安寧忘戰日久良騎野合交鋒接矢決勝當時戎狄之所長中國之所短也強弩乘城堅營固守以待其衰中國之所長而戎狄之所短也宜務先所長以觀其變設購開賞宜示反悔勿貪小功以亂大謀續及諸郡並各遵行於是右賢王部抑鞮等萬三千口詣續降秋句龍吾斯等立句龍王車紐為單于東引烏桓西收羌戎及諸胡等數萬人攻破京兆虎牙營殺上郡都尉及軍司馬遂寇掠并涼幽冀四州乃徙西河治離石上郡治夏陽朔方治五原冬遣中郎將張耽將幽州烏桓諸郡營兵擊畔虜車紐等戰於馬邑斬首三千級獲生口及兵器牛羊甚衆車紐等將諸豪帥骨都侯乞降而吾斯猶率其部曲與烏桓寇鈔六年春馬續率鮮卑五千騎到榖城擊之斬首數百級張耽性勇鋭而善撫士卒軍中皆為用命遂繩索相懸上通天山大破烏桓悉斬其渠帥還得漢民獲其畜産財物夏馬續復免以城門校尉吳武代為度遼將軍漢安元年秋吾斯與薁鞮臺耆且渠伯德等復略并部呼蘭若尸逐就單于兜樓儲先在京師漢安二年立之天子臨軒大鴻臚持節拜授璽綬引上殿賜青蓋馬駟鼓安車駙馬騎玉具刀劒什物給綵布二千匹賜單于閼氏以下金錦錯雜具軿車馬二乘遣行中郎將持節護送單于歸南庭詔太常大鴻臚與國侍子於廣陽城門外祖會饗賜作樂角抵百戲順帝幸胡桃宫臨觀之冬中郎將馬實募刺殺句龍吾斯送首洛陽建康元年進擊餘黨斬首千二百級烏桓七十萬餘口皆詣實降車重牛羊不可勝數單于兜樓儲立五年死伊陵尸逐就單于居車兒建和元年立至永壽元年胸奴左薁鞮臺耆且渠伯德等復畔寇鈔美稷安定屬國都尉張奐擊破降之延熹元年南單于諸部並畔遂與烏桓鮮卑寇緣邊九部以張奐為北中郎將討之單于諸部悉降奐以單于不能統理國事乃拘之上立左谷蠡王桓帝詔曰春秋大居正居車兒一心向化何罪而黜其遣還單于居車兒立二十五年死子某以熹平元年立為屠特若尸逐就單于凡言某者史失其名故稱曰某六年單于與中郎將臧旻出鴈門擊鮮卑檀石槐大敗而還是嵗單于死子呼徵立為單于呼徵光和元年立二年中郎將張修與單于不相能修擅斬之更立右賢王羌渠為單于修以不先請而擅誅殺檻車徵詣廷尉抵罪單于羌渠光和二年立中平四年前中山太守張純反畔遂率鮮卑寇邊郡靈帝詔發南胸奴兵配幽州牧劉虞討之單于遣左賢王將騎詣幽州國人恐單于發兵無已五年右部醯落與休屠各胡白馬銅等十餘萬人反攻殺單于單于羌渠立十年子右賢王於扶羅立為持至尸逐侯單于於扶羅乃前趙劉淵之祖劉淵乃亂晉之首於扶羅以中平五年立國人殺其父者遂畔共立須卜骨都侯為單于而於扶羅詣闕自訟會靈帝崩天下大亂單于將數千騎與白波賊合兵寇河內諸郡時民皆保聚鈔略無所得而兵遂挫傷復欲歸國國人不受乃止河東河東平陽也於扶羅國於此須卜骨都侯為單于一年而死南庭遂虛其位以老王行國事單于於扶羅立七年死弟呼厨泉立為單于呼厨泉興平二年立以兄被逐不得歸國數為鮮卑所鈔建安元年獻帝自長安東歸右賢王去卑與白波賊帥韓暹等侍衛天子擊拒李傕郭汜及車駕還洛陽又徙遷許然後歸國謂歸河東平陽二十一年單于來朝魏武為丞相因留單于於鄴而遣去卑歸監其國嵗給單于綿絹錢榖如列侯子孫襲號分其衆為五部部中立其貴者為帥選漢人為司馬以監督之魏世之末復改帥為都尉其左部都尉所統可萬餘落居于太原故兹氏縣右都尉可六千餘落居祈縣南部都尉可三千餘落居蒲子縣北部都尉可四千餘落居新興縣中部都尉可六千餘落居太陵縣北部胸奴雖分居五部然皆家于晉陽汾澗之間晉初塞外胸奴大水塞泥黑難等二萬餘落歸化武帝復納之使居河西故宜陽城下後復與晉人雜居由是平陽西河太原新興上黨樂平諸郡靡不有焉泰始七年單于猛叛屯孔邪城武帝遣婁侯何楨持節討之楨素有志略以猛衆凶悍非少兵所制乃潛誘猛左部督李恪殺猛於是胸奴震服積年不敢復反其後稍因忿恨殺害長吏漸為邊患侍御史西河郭欽上疏曰戎狄強獷歷古為患魏初人寡西北諸郡皆為戎居今雖服從若百年之後有風塵之警胡騎自平陽上黨不三日而至孟津北地西河太原馮翊安定上郡盡為狄庭矣宜及平吳之威謀臣猛將之略出北地西河安定復上郡實馮翊於平陽已北諸縣募取死罪徙三河三魏見士四萬家以充之裔不亂華漸徙平陽𢎞農魏郡京兆上黨雜胡峻四夷出入之防明先王荒服之制萬世之長策也帝不納至太康五年復有胸奴胡太阿厚率其部落二萬九千三百人歸化七年又有胸奴胡都大博及萎莎胡等各率種類大小凡十餘萬口詣雍州刺史扶風王駿降附明年胸奴都督大豆得一育鞠等復率其種落大小萬一千五百口牛二萬二千頭羊十萬五千口車廬什物不可勝紀來降并貢其方物帝並撫納之按晉史云胸奴以部落為種類其入居塞者有屠各種鮮支種寇頭種烏談種赤勒種捍蛭種黑狼種赤沙種鬱鞞種萎莎種秃童種勃蔑種羌渠種賀賴種鍾跂種大樓種雍屈種真樹種力羯種凡十九種皆有部落不相錯雜屠各最豪貴故得為單于統領諸種其國號有左賢王右賢王左奕蠡王右奕蠡王左於陸王右於陸王左漸尚王右漸尚王左朔方王右朔方王左獨鹿王右獨鹿王左顯祿王右顯祿王左安樂王右安樂王凡十六等皆用單于親子弟也其左賢王最貴唯太子得居之其四姓有呼延氏卜氏蘭氏喬氏而呼延氏最貴則有左日逐右日逐世為輔相卜氏則有左沮渠右沮渠蘭氏則有左當户右當户喬氏則有左都侯右都侯又有車陽沮渠餘地諸雜號猶中國百官也其國人有綦母氏勒氏皆勇健好反叛武帝時有騎督綦毋俔邪伐吳有功遷赤沙都尉惠帝元康中胸奴郝散攻上黨殺長吏入守上郡明年散弟度元又率馮翊北地羌胡攻破二郡自此以後胸奴種類羣聚難以驅逼而於扶羅之孫淵遂吞噬神州邱墟帝室云通志卷一百九十九
