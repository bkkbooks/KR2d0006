body:
  text: 通志卷一百六十宋右廸功郎鄭樵漁仲撰列傳第七十三隋髙熲牛𢎞李徳林楊素父敷淑子元感進趙元劉元素素弟約從叔异蘇威子䕫韓禽虎弟僧壽洪僧壽弟賀若弼叔父誼李穆子渾崇穆兄子詢詢弟崇子敏梁睿長孫覽從子熾熾弟晟髙熲字昭元一名敏自言勃海蓨人也其先因官北邉沒於遼左曾祖暠以太和中自遼東歸魏官至衛尉卿祖孝安位兗州刺史父賓仕東魏位諫議大夫大統六年避讒棄官奔西魏獨孤信引賓為僚佐賜姓獨孤氏及信誅妻子徙蜀文獻皇后以賓父之故吏每往來其家賓敏於從政果敢斷決賜爵陽武縣伯歴位齊公憲府長史驃騎大將軍開府儀同三司襄州總管府司録卒於州及熲貴開皇中贈禮部尚書武陽公諡曰簡熲少明敏有器局畧渉書史尤善詞令初孩孺時家有栁樹高百許尺亭亭如蓋里中父老曰此家當出貴人年十七周齊王憲引爲記室襲爵武陽縣伯再遷内史下大夫以平齊功拜開府高祖得政素知熲彊明久習兵馬多計畧意欲引之入府遣邗公楊恵諭意熲承旨欣然曰願受驅馳縱令公事不成熲亦不辭滅族於是爲相府司錄時長史鄭譯司馬劉昉並以奢縱被踈高祖彌屬意於熲委以心膂尉遲迥之起兵也高祖遣韋孝寛伐之官軍至河陽莫敢先進高祖以諸將不一令崔仲方監之仲方辭以父在山東時熲見劉昉鄭譯等並無去意熲遂自請行深合上旨受命便發遣人辭母云忠孝不可兩兼歔欷就路至軍爲橋於沁水賊於上流縱火栰熲預爲土狗以禦之既度焚橋而戰大破之及平迥還侍晏於卧内上撤御帷以賜之進位柱國改封義寜縣公遷丞相府司馬任遇益隆高祖受禪拜尚書左僕射兼納言進封勃海郡公朝臣莫與爲比帝每呼爲獨孤而不名也熲佯避權勢上表遜位讓於蘇威帝欲成其羙聽解僕射數日上曰蘇威高蹈前朝熲能舉善吾聞進賢受上賞寜可令去官於是命熲復位俄拜左衛大將軍本官如故突厥屢爲邉患詔熲鎮遏綠邉及還賜馬五百匹牛羊千計領新都大監制度多出於熲熲每坐朝堂北槐樹下以聽事其樹不依行列有司將伐之上特命勿去以示後人其見重如此又拜左領軍大將軍餘官如故母憂去職二旬起令視事熲流涕辭讓不許開皇二年長孫覽元景等伐陳令熲節度諸軍會陳宣帝崩熲以禮不伐䘮奏請班師蕭巖之叛詔熲綏集江漢甚得民和上嘗問熲以取陳之策熲曰江北地寒田收差晚江南土熱水田早熟量彼収穫之際微徵士馬聲言掩襲賊必屯兵禦守足得廢其農時彼既聚兵我便解甲再三若此彼必翫以爲常後更集兵彼必不信猶豫之頃我乃濟師登陸而戰兵氣益倍又江南土薄舍多竹茅所有儲積皆非地窖密遣行人因風縱火待彼修立復更燒之不出數年財力俱盡帝用其策由是陳人益弊九年晉王廣伐陳以熲爲元帥長史三軍咨禀皆取斷於熲及陳平晉王欲納陳主寵姬張麗華熲曰武王滅殷戮妲己今平陳不宜取麗華乃命斬之王甚不悅及軍還以功加上柱國封齊國公賜物九千段定食千乘縣千五百戸上因勞之曰公伐陳後人言公反朕已斬之君臣道合非青蠅所間也熲又遜位優詔不許是後左衛將軍龎晃及將軍盧賁等前後短熲於帝帝怒之皆被疎黜因謂熲曰獨孤公猶鏡也每被磨瑩皎然益明未幾尚書都事姜煜楚州行參軍李君才並奏稱水旱不調罪由高熲請廢黜之二人俱得罪而去親禮逾密帝行幸并州留熲居守及上還京賜縑五千疋行宮一所以爲莊舍其夫人賀㧞氏寢疾中使顧問不絶帝親幸其第賜錢百萬絹萬疋後復賜以千里馬嘗從容命熲與賀若弼言及平陳事熲曰賀若弼先獻十策後於蔣山苦戰破賊臣文吏耳焉敢與猛將論功帝大笑時論嘉其有讓㝷以其子表仁尚太子勇女前後賞賜不可勝計時熒惑入太微犯左執法術者劉暉私於熲曰天文不利宰相可脩徳以禳之熲不自安以暉言奏之上厚加賞慰突厥犯塞以熲爲元帥擊破之又出白道進圖入磧遣使請兵近臣言熲欲反帝未有所答熲亦破賊而還時太子勇失愛於上帝潛有廢立之志謂熲曰晉王妃有神憑之言王必有天下若之何熲長跪曰長㓜有序其可廢乎上黙然而止獨孤后知熲不可奪隂欲去之初熲夫人卒后言於上曰高僕射老矣而䘮夫人陛下何以不爲之娶上以后言告熲熲流涕謝曰臣今已老退朝之後惟齋舍讀佛經而已雖陛下埀哀之深至於納室非臣所願上乃止至是熲愛妾産男帝聞之極歡后甚不悅上問其故后曰陛下當復信高熲邪始陛下欲爲熲娶熲心存愛妾面欺陛下今詐形已見矣上由是疎熲㑹議伐遼東熲固諫不可帝不從以熲爲元帥長史從漢王征遼東遇霖潦疾疫不利而還后言於帝曰熲初不欲行陛下彊之妾固知其無功矣又帝以漢王年少專委軍於熲熲以任寄隆重每懷至公無自疑意諒所言多不用因甚衘之及還諒泣言於后曰免熲殺幸矣帝聞彌不平俄而柱國王世積以罪當誅推覈之際乃有宮禁之事云於熲處得之帝欲成熲罪聞此大驚時上柱國賀若弼呉州總管宇文㢸刑部尚書薛胄戸部尚書斛律孝卿兵部尚書栁述等明熲無罪上愈怒皆以之屬吏自是朝臣莫敢言熲竟坐免以公就第未幾上幸秦王俊宅召熲侍宴熲歔欷悲不自勝獨孤后亦對之泣左右皆流涕帝謂熲曰朕不負公公自負朕也因謂侍臣曰我於高熲勝兒子雖或不見常似目前自其解落暝然忘之如本無高熲人不可以身要君自云第一也頃之熲國令上熲隂事稱其子表仁謂熲曰昔司馬仲逹初託疾不朝遂有天下公今遇此安知非福於是上大怒囚熲於憲司復奏熲他事云沙門眞覺嘗謂熲曰明年國有大䘮尼令暉復云十七八年皇帝有大厄十九年不可過帝聞益怒顧謂羣臣曰帝王豈可力求孔丘以大聖之才作法垂於後代寜不欲大位邪天命不可耳熲與子言自比晉帝此何心乎有司請斬熲上曰去年殺虞慶則今年斬王世積如更殺熲天下其謂我何於是除名爲民熲初爲僕射其母誡之曰汝富貴已極但有一斫頭耳爾其愼之熲由是常恐禍變及此熲歡然無恨色以爲得免於禍煬帝即位拜太常卿時有詔將收周齊故樂人及天下散樂熲奏此樂久廢今若徵之恐無識之徒棄本逐末遞相敎習帝不悅時帝侈靡聲色滋甚又起長城之役熲甚病之謂太常丞李懿曰周天元以好樂而亡殷鑒不遠安可復爾時帝遇啓民可汗恩禮過厚熲謂太府卿何稠曰此虜頗知中國虚實山川險易恐爲後患復謂觀王雄曰近來朝廷殊無綱紀帝聞之以爲謗訕朝政下詔誅之諸子徒邉熲有文武大畧明達世務及䝉任寄之後竭誠盡節進引忠良以天下爲己任蘇威楊素賀若弼韓禽虎等皆熲所推薦各盡其用爲一代名臣自餘立功立事者不可勝數當朝執政將二十年朝野推服物無異議治政昇平熲之力也論者以爲真宰相及其被誅天下莫不傷惜至今稱寃不已所有竒策密謀及損益時政熲皆削藁世無知者子盛道位莒州刺史徙桞城卒盛道弟𢎞徳封應國公晉王記室次弟表仁勃海郡公徙蜀郡牛𢎞字里仁安定鶉觚人也其先嘗避難改姓遼氏祖熾本郡中正父元魏侍中工部尚書臨涇公復姓牛氏𢎞在襁褓有相者見之謂其父曰此兒當貴善愛養之及長鬚貎甚偉性寛裕好學博聞仕周位中外府記室内史納言上士專掌文翰脩起居注後襲封臨涇公轉内史下大夫儀同三司開皇初授散騎常侍祕書監𢎞以典籍遺逸上表請開獻書之路曰昔周徳既衰舊經紊棄孔子以大聖之才開素王之業憲章祖述制禮删詩正五始而脩春秋闡十翼而𢎞易道及秦始皇馭下吞滅諸侯先王墳籍埽地皆盡此則書之一厄也漢興建藏書之策置校書之官至孝成之代遣謁者陳農求遺書於天下詔劉向父子讐校篇籍漢之典文於斯為盛及王莽之末並從焚燼此則書之二厄也光武嗣興尤重經誥未及下車先求文雅至肅宗親臨講肆和帝數幸書林其蘭臺石室鴻都東觀祕牒填委更倍於前及孝獻移都吏民擾亂圖畫縑帛皆取為帷囊所收而西裁七十餘乘屬西京燔蕩此則書之三厄也魏文代漢更集經典皆藏在祕書内外三閣遣祕書郎鄭黙刪定舊文論者羙其朱紫有别晉氏承之文籍尤廣晉祕書監荀最定魏内經更著新簿屬劉石憑陵從而失墜此則書之四厄也永嘉之後寇竊競興其建國立家雖傳名號憲章禮樂寂滅無聞劉裕平姚氏收其圖籍五經子史纔四千卷皆赤軸青紙文字古拙並歸江左宋秘書丞王儉依劉氏七畧撰為七志梁人阮孝緒亦為七録總其書數三萬餘卷及侯景渡江破滅梁室祕書經籍雖經兵火其文徳殿書史宛然猶存蕭繹據有江陵遣將破侯景收文徳之書及公私典籍重本七萬餘卷悉送荆州及周師及郢繹悉焚之於外城所收十纔一二此則書之五厄也後魏爰自幽方遷宅伊洛日不暇給經籍闕如周氏創基關右戎車未息保定之始書止八千後加收集方盈萬卷髙氏據有山東初亦採訪驗其本目殘闕猶有多東夏初平獲其經史四部重雜三萬餘卷所益舊書五千而已今御出單本合一萬五千餘卷部帙之間仍有遺闕比梁之舊目止有其半至於隂陽河洛之篇醫方圖譜之說彌復為少臣以經書自仲尼迄今數遭五厄興集之期屬膺聖代今祕藏見書亦足披覽但一時載籍湏令大備不可王府所無私家乃有若猥發明詔兼開購賞則異典必至觀閣斯積上納之於是下詔獻書一卷賚縑一疋一二年篇籍稍備進爵竒章公三年拜禮部尚書奉勅修撰五禮勒成百卷行於當代𢎞請依古制脩立明堂上議曰竊謂明堂者所以通神靈感天地出敎化崇有徳黄帝曰合宮堯曰五府舜曰總章布政興教由來尚矣周官考工記曰夏后氏世室堂脩七尋廣四脩一鄭元注云脩十四歩其廣益以四方脩之一則堂廣十七歩半也殷人重屋堂脩七尋四阿重屋鄭云其修七尋廣九尋也周人明堂廣九尺之筵南北七筵五室凡室二筵鄭云此三者或舉宗廟或舉王寢或舉明堂互言之明其制同也馬融王肅干寳所注與鄭亦異今不具出漢司徒馬宮議云夏后氏世室室顯於堂故命以室殷人重屋屋顯於堂故命以屋周人明堂堂大於夏室故命以堂夏后氏益其堂之廣百四十四尺周人明堂以為兩序間大夏后氏七十二尺若據鄭元之說則夏室大於周堂如依馬宮之言則周堂大於夏室後王轉文周大為是但宮之所言未詳其義此皆去聖久遠禮文殘闕先儒觧說家異人殊鄭注玉藻亦云宗廟路寢與明堂同制王制曰寢不踰廟明大小是同今依鄭注每室及堂止有一丈八尺四壁之外四尺有餘若以宗廟論之祫享之日周人旅酬六尸并后稷為七先公昭穆二尸合十一尸三十六主及君北靣行事於二丈之堂愚不及此若以正寢論之便湏朝宴據燕禮諸侯宴則賔及卿大夫脫屨升坐是知天子宴則三公九卿并升堂燕義又云席小卿次上卿言皆侍席上於二筵之間豈得行禮若以明堂論之總享之時五帝各於其室設青帝之位湏於室内少北西面太昊從食坐於其西近南北靣祖宗配享者又於青帝南稍退西靣丈八之室神位有三加以簠簋豆籩牛羊之爼四海九州羙物咸設復湏席上升歌出樽反坫揖讓升降亦以隘矣據兹而說近是不然案劉向别録及馬宮蔡邕等所見當時有古文明堂禮王居明堂禮明堂圖明堂大圖明堂隂陽太山通義魏文侯孝經傳等並說古明堂事其書皆亡莫得而正今明堂月令者鄭元云是吕不韋著春秋十二紀之首章禮家鈔合為記蔡邕王肅云周公所作周書有月令第五十三即此也各有證明文多不載束晳以為夏時書劉瓛云不韋鳩集儒者尋于聖王月令之事而記之不韋安能獨為此記今案不得全稱周書亦不可即為秦典其内雜有虞夏殷周之法皆聖王仁恕之政也蔡邕具為章句又論之曰明堂所以宗祀其以配上帝也夏后氏曰世室殷人曰重屋周人曰明堂東曰青陽南曰明堂西曰總章北曰元堂内曰太室聖人南靣而聼嚮明而治人君之位莫不正焉故雖有五名而主以明堂也制度之數各有所依方一百四十四尺坤之策也屋圓楣徑二百一十六尺乾之策也太廟明堂方六丈通天屋徑九丈隂陽九六之變且圓蓋方覆九六之道也八闥以象卦九室以象州十二宮應日辰三十六戸七十二牖以四戸八牖乘九宮之數也戸皆外設而不閉示天下以不藏也通天屋髙八十一尺黄鍾九九之實也二十八柱布四方四方七宿之象也堂髙三尺以應三統四向五色各象其行水濶二十四丈象二十四氣於外以象四海王者之大禮也觀其模範天地則象隂陽必據古文義不虚出今若直取考工不參月令青陽總章之號不得而稱九月享帝之禮不得而用漢代二京所建與此說悉同建安之後海内大亂魏氏三方未平無聞興造晉則侍中裴頠議直為一殿以崇嚴父之祀其餘雜說一皆除之宋齊已還咸率兹禮前王盛事於是不行後魏代都所造出自李沖二三相重合為九屋簷不覆基房間通街穿鑿處多迄無可取及遷洛陽更加營構五九紛競遂至不成宗祀之事於焉靡記今皇猷遐闡化覃海外方建大禮埀之無窮𢎞等不以庸虚謬當議限今檢明堂必湏五室者何尚書帝命驗曰帝者承天立五府赤曰文祖黄曰神斗白曰顯紀黑曰元矩蒼曰靈府鄭注曰五府與周明堂同矣且三代相沿多有損益至於五室確然不變夫室以祭天天實有五若立九室四無所用布政視朔自依其辰鄭司農云十二月分在青陽等左右之位不云居室鄭元亦云每月於其時之堂而聼政焉禮圖畫个皆在堂偏是以湏為五室明堂必湏上圓下方者何孝經援神契曰明堂者上圓下方八窻四達布政之宮禮記盛徳篇曰明堂四戸八牖上圓下方是以湏為圓方明堂必湏重屋者何案考工記夏言九階四旁兩夾忩門堂三之二室三之一殷周不言者明一同夏制殷言四阿重屋周承其後不言屋制亦盡同可知也其殷人重屋之下本無五室之文鄭注云五室者亦據夏以知之明周不云重屋因殷則有灼然可見禮記明堂位曰太廟天子明堂言魯為周公之故得用天子禮樂魯之太廟與周之明堂同又曰複廟重簷刮楹達嚮天子之廟飾鄭注云複廟重屋也據廟既重屋明堂亦不疑矣春秋文公十三年太室屋壊五行志曰前堂白太廟中央曰太室屋其上重者也服䖍亦云太室太廟之上屋也周書作洛篇曰乃立太廟宗宮路寢明堂咸有四阿反坫重亢重廊孔晁注云重亢累棟重廊累屋也依黄圖所載漢之宗廟皆為重屋此去古猶近遺法尚存是以湏為重屋明堂必湏為辟雍者何禮記盛徳篇云明堂者明諸侯之尊卑也外水曰辟雍明堂隂陽録曰明堂之制周圜行水左旋以象天内有太室以象紫宫此則明堂有水之明文也然馬宫王肅以為明堂辟雍太學同處蔡邕盧植亦為明堂靈臺辟雍太學同實異名邕云明堂者取其宗祀之清貎則謂之清廟取其正室則曰太室取其堂則曰明堂取其四門之學則曰太學取其周水圜如璧則曰辟雍其實一也其言别者五經通義曰靈臺以望氣明堂以布政辟雍以養老三者不同袁凖鄭元亦以為别歴代所疑豈能輒定今據郊祀志云欲為明堂未曉其制濟南人公玉帯上黄帝時明堂圖一殿無壁蓋之以茅水圜宫垣天子從之以此而言其來則久漢中元二年起明堂辟雍靈臺於洛陽並别處然明堂亦有璧水李尤明堂銘曰流水洋洋是也以此湏有辟雍今造明堂湏以禮經為本形制依於周法度數取於月令遺闕之處參以餘書庶使該詳沿革之理其五室九階上圓下方四阿重屋四旁兩門依考工記孝經說堂方一百四十四尺屋圜楣四徑二百一十六尺太室方六丈通天屋徑九丈八闥二十八柱堂髙三尺四向五色依周書月令論殿垣方在内水周於外水内徑三百歩依太山盛徳記覲禮經仰觀俯察皆有則象足以盡誠上帝祗配祖宗𢎞風布敎作範於後矣上以時事草創未遑制作竟寢不行六年除太常卿九年詔定雅樂又作樂府歌詞撰定圜丘五帝凱樂并議樂事𢎞上議云謹案禮五聲六律十二管還相為宫周禮奏黄鍾歌大吕奏太蔟歌應鍾皆旋相為宫之義蔡邕明堂月令章句曰孟春月則太蔟為宫姑洗為商㽔賔為角南吕為徴應鍾為羽大吕為變宫夷則為變徴他月放此故先王之作律吕也所以辨天地四方隂陽之聲揚子雲曰聲生於律律生於辰故律吕配五行通八風歴十二辰行十二月循環轉運義無停止譬如立春木王火相立夏火王土相季夏餘分土王金相立秋金王水相立冬水王木相遞相為宫者謂當其王月名之為宫今若十一月不以黄鍾為宫十二月不以太蔟為宫便是春木不王夏土不相豈不隂陽失度天地不通哉劉歆鍾律書云春宫秋律百卉必彫秋宫春律萬物必榮夏宫冬律雨雹必降冬宫夏律雷必發聲以斯而論誠為不易且律十二今直為黄鍾一均唯用七律以外五律竟復何施恐失聖人制作本意故湏依理作還相為宫之法上曰不湏作還相為宫且作黄鐘一均也𢎞又論六十律不可行謹案續漢書律厯志元帝遣韋元成問京房於樂府房對受學故小黄令焦延壽六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於中吕十二律畢矣中吕上生執始執始下生去滅上下相生終於南事六十律畢矣十二律之變至於六十猶八卦之變至於六十四也冬至之聲以黄鍾為宫太蔟為商姑洗為角林鍾為徴南吕為羽應鍾為變宫㽔賔為變徴此聲氣之元五音之正也故各統一日其餘以次運行宫日者各自為宫而商徴以類從焉房又曰竹聲不可以度調故作凖以定數凖之状如瑟長一丈而十三絃隠間九尺以應黄鍾之律九寸中央一絃下畫分寸以為六十律清濁之節執始之類皆房自造房云受法於焦延壽未知延壽所承也至元和年待詔侯鍾殷肜上言官無曉六十律以凖調音者故待詔嚴嵩具以凖法敎其子宣願召宣補學官主調樂噐太史丞𢎞試宣十二律其二中其四不中其六不知何律宣遂罷自此律家莫能為凖施絃熹平年東觀召典律者太子舍人張光問凖意光等不知歸閱舊藏乃得其噐形制如房書猶不能定其絃緩急故史官能辨清濁者遂絶其可以相傳者唯大㩁常數及候氣而已據此而論房法漢世已不能行沈約宋志曰詳案古典及今音家六十律無施於樂禮云十二管還相為宫不言六十封禪書云大帝使素女鼔五十絃瑟而悲破為二十五絃假令六十律為樂得成亦所不用取大樂必易大禮必簡之意也又議曰案周官云大司樂掌成均之法鄭衆注云均調也樂師主調其音三禮義宗稱周官奏黄鍾者用黄鍾為調歌大吕者用大吕為調奏者謂堂下四縣歌者謂堂上所歌但以一祭之間皆用二調是知據宫稱調其義一也明六律六吕迭相為宫各自為調今見行之樂用黄鍾之宫乃以林鍾為調與古典有違案晉内書監荀朂依典記以五聲十二律還相為宫之法制十二笛黄鍾之笛正聲應黄鍾下徴應林鍾以姑洗為清角大吕之笛正聲應大吕下徴應夷則以外諸均例皆如是然今所用林鍾是朂下徴之調不取其正先用其下於理未通故湏改之上甚善其議詔𢎞與姚察許善心何妥虞世基等正定新樂是後議置明堂詔𢎞條上故事議其得失上甚敬重之時楊素恃才矜貴輕侮朝臣唯見𢎞未嘗不改容自肅素将擊突厥詣太常與𢎞言别𢎞送素至中門而止素謂曰大將出征故來敘别何相送之近也𢎞遂揖而退素笑曰竒章公可謂其智可及其愚不可及也亦不以屑懐尋授大将軍拜吏部尚書時帝又令𢎞與楊素蘇威薛道衡許善心虞世基崔子發等并召諸儒論新禮降殺輕重𢎞所立議衆咸推服之仁壽二年獻皇后崩王公已下不能定其儀注楊素謂𢎞曰公舊學時賢所仰今日之事決在於公𢎞了不辭讓斯湏之間儀注備悉皆有故實素歎曰衣冠禮樂盡在此矣非吾所及也𢎞以三年之䘮祥練具有隆殺朞服十一月而練者無所象法以聞於帝帝下詔除朞練之禮自𢎞始也𢎞在吏部其所選舉先徳行而後文才務在審慎雖致停緩所有進用並多稱職吏部侍郎髙孝基鑒賞機悟清慎絶倫然爽俊有餘迹似輕薄時宰多以此疑之唯𢎞深識其真推心任委隋之選舉於斯為最時論彌服𢎞識度之遠焬帝之在東宫數有詩書遺𢎞𢎞亦有答及即位又嘗賜𢎞詩曰晉家山吏部魏代盧尚書莫言先哲異竒才並佐余學士敦時俗道素乃沖虚納言雲閣上禮儀皇運初彛倫攸有叙埀拱事端居其同被賜詩者至於文詞贊掦無如𢎞美大業三年進位上大将軍改右光禄大夫從拜恒嶽壇墠珪幣牲牢之屬並𢎞所定還下太行山煬帝嘗召入内帳對皇后賜以同席飲食其親重如此𢎞謂其子曰吾受非常之遇荷恩深重汝等子孫宜以誠敬自立以答恩遇之隆六年從幸江都卒年六十六帝傷惜之賵贈甚厚歸𦵏安定贈開府儀同三司光禄大夫文安侯謚曰憲𢎞榮寵當代而車服卑儉事上盡禮待下以仁訥於言而敏於行上嘗令其宣勅𢎞至階下不能言而退還拜謝云並忘之上曰傳語小辯故非宰臣任也愈稱其質直大業之世委遇彌隆性寛厚篤志於學雖職務繁擁而書不釋手隋室舊臣始終信任悔吝不及唯𢎞一人而已有弟曰弼好酒而酗嘗因醉射殺𢎞駕車牛𢎞來還宅其妻迎謂之曰叔射殺牛矣𢎞聞之無所怪問直答云作脯坐定其妻又曰叔忽射殺牛大是異事𢎞曰已知之矣顔色自若讀書不輟其寛和如此有文集十二卷子方大有學業官至内史舍人次子方裕性凶險無仁心從幸江都與裴䖍通等同謀弑逆事見司馬徳戡傳李徳林字公輔博陵安平人也祖壽魏湖州戸曹從事父敬族歴太學博士鎮遠将軍魏静帝時命當世通人正定文籍以為内校書别在直閤省徳林㓜聰敏年數歲誦左思蜀都賦十餘日便度髙隆之見而歎異之徧告朝士云若假其年必為天下偉噐鄴京人士多就宅觀之月餘日中車馬不絶年十五誦五經及古今文集日數千言俄而該博墳典隂陽緯候無不通渉善屬文辭覈而理暢魏収嘗對髙隆之謂其父曰賢子文筆終當繼温子昇隆之大笑曰魏常侍殊已嫉賢何不近比老彭乃遠求温子年十六遭父艱自駕靈輿反𦵏故里時正嚴寒單縗跣足州里人物敬慕之居貧轗軻母氏多疾方留心典籍無復宦情其後母病稍愈逼令仕進齊任城王湝為定州刺史重其才名召入州館朝夕同遊殆均師友常語徳林云竊聞蔽賢受顯戮久令君沈滯吾獨得潤身朝廷縱不見尤亦懼明靈所譴於是舉秀才入鄴于時天保八年也王因遺尚書令楊遵彦書云燕趙固多竒士此言不謬今歲所貢秀才李徳林者文章學識固不待言觀其風神氣宇終為棟梁之用經國大體是賈生晁錯之儔雕蟲小技殆相如子雲之輩今雖唐虞君世俊乂盈朝然修大厦者豈厭夫良材之積也遵彦即命徳林作辭尚書令表援筆立成不加治㸃因大相賞以示禮部郎陸卬卬云已大見其文筆浩浩如長河東注比來所見後生制作乃涓滴之流耳時遵彦銓衡深慎選舉秀才擢第罕有甲科徳林射策五條考皆為上第授殿中将軍既是西省散員非其所好乃謝病還郷闔門守道皇建初詔捜揚人物追赴晉陽撰春思賦一篇世稱典麗時長廣王作相授丞相府行參軍未幾王即帝位累遷中書舍人加通直散騎侍郎别典機密尋丁母艱去職勺飲不入口五日因發熱病徧體生瘡黄腫數日間一時俱差皆云孝感所致朝廷嘉之裁百日奪情起復固辭不起魏収與陽休之論齊書起元事百司㑹議収與徳林致書往復詞多不載後除中書侍郎仍詔修國史時齊帝留情文雅召入與黄門侍郎顔之推同判文林館事累遷儀同三司及周武帝入鄴之日遣使就宅宣旨慰喻云平齊之利唯在於爾宜入相見詔問齊朝風俗政敎人物善惡即留内省三宿乃歸仍遣從駕入長安授内史上士自此以後詔誥格式及用山東人物一以委之周武帝嘗於雲陽宫作鮮卑語謂羣臣云我常日唯聞李徳林名及見其與齊朝作詔書移檄我正謂其是天上人豈言今日得其驅使復為我作文書極為大異神武公紇豆陵毅答曰臣聞明王聖主得麒麟鳳凰為瑞是聖徳所感非力能致之瑞物雖來不堪使用如李徳林來受驅策亦是陛下聖徳感致有大才用勝於麒麟鳳凰遠矣帝大笑曰誠如公言宣政末授御正下大夫後賜爵成安縣男宣帝大漸髙祖初受顧命令邗國公楊恵謂徳林曰朝廷賜令總文武事經國任重非羣才輔佐無以克成大業今欲與公共事必不得辭徳林答曰願以死奉公髙祖大恱即召與語劉昉鄭譯初矯詔召髙祖受顧命輔少主總知内外兵馬事諸衛既奉勅並受髙祖節度鄭譯劉昉議欲授髙祖冡宰鄭譯自攝大司馬劉昉又求小冡宰髙祖私問徳林曰欲何以見處徳林云即宜作大丞相假黄鉞都督内外諸軍事不爾無以厭衆心及發䘮便即依然以譯為相府長史帯内史上大夫昉但為相府司馬譯昉由是不平以徳林為丞相府屬加儀同大将軍未幾而三方構亂指授兵畧皆與之參詳軍書羽檄朝夕填委一日之中動逾百數或機速競發口授數人意緒百端不加治㸃勛公韋孝寛為東道元帥師次永橋為沁水漲孝寛師未得度長史李詢上密啓云諸大将梁士彦宇文忻崔𢎞度並受尉遲迥饟金軍中慅慅人情大異髙祖得啓深以為憂共鄭譯議欲代此三人徳林獨進計云公與諸将並是國之貴臣未相伏馭今以挾令之威使得之耳安知後所遣者能盡腹心又取金之事虛實難明且臨敵代将自古所難樂毅所以辭燕馬服以之敗趙也如愚所見但遣公一腹心明於智畧為諸将舊來所信伏者速至軍所觀其情偽縱有異意必不敢動髙祖大悟曰若公不發此言幾敗大事即令髙熲馳驛往軍所為諸将節度竟成大功凡厥謀謨多此類也進授丞相府從事内郎禪代之際其相國總百揆九鍚殊禮詔策牋表璽書皆徳林之辭也髙祖登阼之日授内史令将受禪虞慶則勸髙祖盡滅宇文氏髙熲楊恵亦依違從之唯徳林固争以為不可髙祖作色怒云君讀書人不足平章此事於是盡誅之自是品位不加唯依班例授上儀同進爵為子開皇元年勅令與太尉于翼髙熲等同修律令事訖奏聞别賜九環金帯及駿馬格令班後蘇威每欲改易事條徳林以為格式一班義湏劃一縱令小有踳駮非過蠧政害民者不可數有改張威又奏置五百家郷正即令理民間詞訟徳林以為本廢郷官判事為其里閭親識割斷不平今置郷正為害更甚勅令就東宫㑹議自皇太子以下多從徳林議蘇威又言廢郡徳林語之云修令時公何不論廢郡為便今令纔出其可改乎髙熲助威之議奏稱徳林狠戾多固執由是髙祖盡依威議五年勅令撰録作相時文翰勒成五卷謂之霸朝雜集髙祖省讀訖明旦謂徳林曰自古帝王之興必有異人輔佐我昨讀霸朝集方知感應之理昨宵愠夜長不能早見公靣必令公貴與國始終乃追贈其父爵為刺史安平縣公諡曰孝以徳林襲焉徳林既少有才名長以貴顯凡製文章動行於世或有不知者謂為古人焉徳林自隋有天下每贊平陳之計八年駕幸同州徳林以疾不從勅書追之書後御筆注云伐陳事意宜自隨也時髙熲因使入京上語熲曰徳林若患未堪行宜自至其宅取其方畧髙祖以之付晉王廣然後從駕還在塗中髙祖以馬鞭南指云待平陳訖㑹以七寶粧嚴公使自山東無及之者及陳平授柱國郡公實封八百戸晉王廣宣勅訖有人說髙熲曰天子畫策晉王及諸将勠力之所致也今乃歸功李徳林諸将必當憤惋且後代觀之有若虛行熲入言之乃止初大象末髙祖以逆人王謙宅賜之文書已出至地官府忽改賜崔謙上語徳林曰夫人欲與其舅於公無形迹不湏争之可自選一好宅并覔荘店作替徳林奏取逆人髙阿那肱衛國縣市店八十區為王謙宅替九年車駕幸晉陽店人表訴稱地是民物髙氏彊奪於内造舍上責徳林徳林請勘逆人文簿及本換宅之意上不聼悉追店給所住者由是嫌之十三年虞世則等於關東諸道廵省使還奏云郷正專理詞訟不便於民黨與受憎公行貨賄上令廢之徳林奏云此事臣本以為不可然置來始爾今復停廢政令不一朝成暮毁臣望陛下若於律令輒欲改張即以軍法從事上遂大怒詬曰爾欲将我作王莽邪初徳林稱其父為太尉諮議以取贈官李元操等隂奏之云徳林父終於校書妄云諮議上甚衘之至是廷議忤㫖因數之曰公為内史典朕機密比不預計議者以公不𢎞耳朕方以孝理天下故立五教以𢎞之公言孝由天性何湏設敎然則孔子不當說孝經又罔冐取店妄加父官朕實忿之而未能發今當以一州相遣耳因出為湖州刺史徳林拜謝曰臣不敢復望内史令請預散參侍陛下登封告成一觀盛禮然後守拙邱園死且不恨上不許轉懐州刺史在州逢亢旱課人掘井溉田勞而無益為考司所貶歲餘卒官時年六十贈大将軍㢘州刺史謚曰文将𦵏勅令羽林百人并鼔吹一部以給䘮事祭以太牢徳林羙容儀善談吐噐量沈深時人未能測齊任城王湝趙彦深魏收陸卬大相欽重徳林少孤未有字魏收謂之曰卿識度天挺必至公輔吾輒以此字卿當副其實自從官以後即典機密性慎密未嘗有所非毁少以才學見知為齊中書侍郎於賔館受書陳使江總目送之曰此即河朔之英靈也及位望稍髙頗傷自任争競之徒更相譖愬雖運屬興王功參佐命十餘年間不徙一級所撰文集勒成八十卷遭亂亡失見五十卷行於世勅撰齊史未成子百藥博渉多才詞藻清贍大業末位建安郡丞楊素字處道𢎞農華隂人魏華州刺史播之族曾孫也四世祖暉洛州刺史贈恒農公諡曰簡髙祖恩河間太守曾祖鈞博學彊識頗有幹用位七兵尚書北道行臺恒州刺史懐朔鎮将贈侍中司空公進封臨貞縣伯諡曰恭祖暄字宣和性通朗彊識有學位諫議大夫以别將從廣陽王深征葛榮遇害贈殿中尚書華州刺史父敷少有志操重然諾人景慕之魏建義初襲祖鈞爵臨貞縣伯稍遷廷尉少卿斷獄以平允稱周孝閔踐阼進爵為侯天和中為汾州刺史進爵為公齊将段孝先率衆來寇城陥見禽齊人方任用之敷不為屈遂以憂憤卒於鄴素少落拓有大志不拘小節世人多未之知唯從祖寛深異之每謂子孫曰處道逸羣絶倫非常之器非汝曹所逮後與安定牛𢎞同志好學研精不倦多所通渉善屬文工草隸書頗留意風角羙鬚髯有英傑之表周大冡宰宇文䕶引為中外記室轉禮曹加大都督周武帝親總萬機素以其父守節陥齊未䝉朝命上表申理至於再三帝大怒命左右斬之素又言曰臣事無道天子死其分也帝悟其言赦之贈敷使持節大将軍譙廣復三州刺史諡曰忠壯拜素車騎大將軍儀同三司漸見禮遇嘗令為詔下筆立成詞義兼羙帝嘉之謂曰善相自勉勿憂不富貴素應聲曰臣但恐富貴來逼臣臣無心圖富貴及平齊之役素請率麾下先驅帝從之賜以竹策曰朕方欲大相驅策故用此物賜卿從齊王憲與齊人戰於河隂以功封清河縣子授司城大夫復從憲㧞晉州屯兵雞棲原齊主以大軍至憲懼宵遁為齊兵所躡衆多敗散素與驍將十餘人盡力苦戰憲僅而獲免齊平加上開府改封成安縣公尋從王軌破陳將呉明徹於吕梁行東楚州事封弟慎為義安侯陳将樊毅築城泗口素擊走之夷毅所築城宣帝即位襲父爵臨貞縣公以弟約為安成公尋從韋孝寛徇譙南及髙祖為丞相素深自結納髙祖甚器之以為汴州刺史至洛陽會尉遲迥作亂榮州刺史宇文胄據虎牢應迥素不得進帝拜素大将軍擊胄破之遷徐州總管位柱國封清河郡公以弟岳為臨貞公及隋受禪加上柱國拜御史大夫其妻鄭氏性妬悍素忿之曰我若作天子卿定不能為皇后鄭氏奏之由是坐免上方圖江表先是素數進取陳計未幾拜信州總管賜錢百萬錦千叚馬二百匹遣之素居永安造大艦名曰五牙上起樓五層髙百餘尺左右前後置六檣竿邉髙百五十尺容戰士八百人旂幟加於上次曰黄龍置兵百餘人自餘平乗舴艋等各有差及大舉伐陳以素為行軍元帥引舟師趣三硤至流頭灘陳将戚欣以青龍百餘艘屯兵守狼尾灘以遏軍路其地嶮峭諸将患之素曰負勝在此一舉若晝日下船彼則見我灘流迅激制不由人則吾失其便乃夜掩之素親率黄龍十艘衘枚而下遣開府王長襲從南岸擊欣别柵令大将軍劉仁恩趣白沙北岸比明而至擊之欣敗虜其衆勞而遣之秋毫不犯陳人大恱素率水軍東下舟艦被江旌甲曜日素坐平乗大船容貎雄偉陳人望之懼曰清河公即江神也陳南康内史吕仲肅屯岐亭正據江峡於北岸纜巖綴鐵銷三條横截上流以遏戰船素與仁恩登陸俱發先攻其柵仲肅軍夜潰素徐去其鎖仲肅復據荆州之延洲素遣巴蛇卒數千乗五牙四艘以檣竿碎賊十餘艦遂大破之仲肅僅以身免陳主遣其信州刺史顧覺鎮安蜀城荆州刺史陳紀鎮公安皆懼而走巴陵以東無敢守者湘州刺史岳陽王陳叔慎請降素下至漢口與秦孝王㑹乃還拜荆州總管進爵郢國公真食長壽縣千户以其子元感為儀同三司元奨為清河郡公賜物萬段粟萬石加之金寶又賜陳主妹女妓十四人素言於上曰里名勝母曾子不入逆人王誼前封郢臣不願與同於是改封越國公尋拜納言轉内史令俄而江南人李稜等為亂以素為行軍總管討之帝命平定日男子悉斬女婦賞征人在陣免者從賤賊朱莫問自稱南徐州刺史以盛兵據京口素舟師入自楊子津進擊破之晉陵顧世興自稱太守與其都督鮑遷等復來拒戰素逆擊破之執遷虜三千餘人進擊無錫賊帥葉皓又平之呉郡沈元懀沈傑等以兵圍蘇州刺史皇甫績頻戰不利素率衆援之元懀勢逼走投南沙賊帥陸孟孫素擊孟孫於松江大破之禽孟孫元懀黟歙賊帥沈雪沈能據柵自固又攻拔之江浙賊髙智慧自號東揚州刺史呉州總管五原公元契鎮㑹稽以其兵盛而降之智慧盡屠其衆契自殺智慧有船艦千餘艘屯據要害兵甚勁素擊之自旦至申苦戰破之智慧逃入海躡之從餘姚汎海趣永嘉智慧來拒戰素擊走之賊帥汪文進自稱天子據東陽署其徒蔡道人為司空守樂安素進討悉平之又破永嘉賊帥沈孝徹於是歩道向天台指臨海郡逐捕遺逸前後百餘戰智慧遁于閩越上以素久勞於外詔令馳傳入朝加子元感上開府賜綵八千叚素以餘寇未殄恐為後患又自請行詔以素為元帥復乗傳至㑹稽先是泉州人王國慶南安豪族也殺刺史劉𢎞據州為亂自以海路艱阻非北人所習不設備伍素泛海奄至國慶遑遽棄州走素分遣諸将水陸追捕時南海先有五六百家居水為亡命號曰遊艇子智慧國慶欲徃依之素乃密令人說國慶令斬智慧以自効國慶乃斬智慧於泉州自餘支黨悉降江南大定上遣左領軍将軍獨孤陀至浚儀迎勞比到京師問者日至拜素子元奨儀同賜黄金四十斤加銀缾實以金錢縑三千叚馬二百匹羊三千口田百頃宅一區代蘇威為尚書右僕射與髙熲專掌朝政素性疎而辯髙下在心朝貴之内頗推髙熲敬牛𢎞厚接薛道衡視蘇威蔑如也自餘朝臣多被陵轢其才藝風調優於髙熲至於推誠體國處物平當有宰相識度不如熲遠矣尋令素監營仁壽宫素遂夷山堙谷督役嚴急作者多死宫側時聞鬼哭及宫成上令髙熲前視奏稱頗傷綺麗大損人丁帝不恱素懼即於北門啓獨孤皇后曰帝王法有離宫别館今天下太平造一宫何足損費后以此理諭上上乃解於是賜錢百萬綿絹三千叚開皇十八年突厥達頭可汗犯塞以素為靈州道行軍總管出塞討之賜物二千叚黄金百斤先是諸将與虜戰毎慮胡騎奔突皆戎車歩騎相參與鹿角為方陣騎在内素曰此乃自固之道於是悉除舊法令諸軍為騎陣達頭開之大喜以為天賜下馬仰天而拜率精騎十餘萬至素奮擊大破之達頭被重創而遁衆號哭而去優詔賜縑二萬匹及萬釘寳帯加子元感位大将軍元奨元縱積善並上儀同素多權畧乗機赴敵應變無方然大抵馭戎嚴整有犯令者立斬無所寛貸毎将臨寇輒求人過失而斬之多者百餘人少不下數十流血盈前言笑自若及對陣先令三百人赴敵陥陣則已如不能陥而還無問多少悉斬之又令二百人復進還如向法将士股慄有必死心由是戰無不勝稱為名将素時貴倖言無不從其從素征伐者微功必録至於他将雖大功多為文吏所譴却故素雖嚴忍士亦以此願從二十年晉王廣為靈朔道行軍元帥素為長史王卑躬交素及為太子素之謀也仁壽初代髙熲為尚書左僕射賜良馬十匹牝馬二百匹奴婢百口其年以素為行軍元帥出雲中擊突厥連破之突厥走追至夜及之将復戰恐賊越逸令其騎稍後於是親将兩騎并降突厥二人與虜並行不之覺也候其頓舍未定趣後騎掩擊大破之自是突厥遠遁磧南無復虜庭以功進子元感位柱國元縱為淮南郡公賞物二萬叚及獻皇后崩山陵制度多出於素上善之下詔曰君為元首臣則股肱共理百姓義同一體上柱國尚書左僕射仁壽宫大監越國公素志度恢𢎞機鑒明遠懐佐時之畧包經國之才王業初基霸圖肇建策名委質受脤出師禽翦凶魁克平虢鄭頻承廟算揚旍江表毎禀戎律長驅塞垣南指而呉越肅清北臨而獯獫摧服自居端揆參贊機衡當朝正色直言無隠論文則詞藻縱横語武則權竒閒出既文且武唯朕所命任使之處夙夜無怠獻皇后奄離六宫遠日云及塋兆安厝委素經紀然𦵏事依禮唯卜泉石至如吉凶不由於素義存奉上情深體國欲使幽明俱泰永保無窮以為隂陽之書聖人所作禍福之理特湏審慎乃徧歴川原親自占擇志圖元吉孜孜不已遂得神臯福壤營建山陵論素此心事極誠孝豈與平戎定寇比其功業若不加褒賞何以申兹勸勵可别封一子義康郡公邑萬戸子子孫孫承襲不絶餘如故并賜田三千頃絹萬疋米萬石金鉢一實以金銀鉢一實以珠并綾錦五百叚時素貴寵日隆其弟約從父文思弟紀及族父异並尚書列卿諸子無汗馬勞位柱國刺史家僮數千後庭妓妾曵綺羅者以千數第宅華侈制擬宫禁有鮑亨者善屬文殷胄者工草隸並江南士人因髙智慧沒為奴親戚故吏布列清顯其盛近古未聞煬帝初為太子忌蜀王秀與素謀之構成其罪後竟廢黜朝臣有違忤者雖至誠體國如賀若弼史萬歲李綱栁彧等素皆隂中之若有附㑹及親戚雖無才用必加進擢朝廷靡然莫不畏附唯兵部尚書栁述以帝壻之重數於上前靣折素大理卿梁毗抗表言素作威作福上漸疎忌之後因出勅曰僕射國之宰輔不可躬親細務但三五日一度向省評論大事外示優崇實奪之權終仁壽之末不復通判省事上賜三公已下射素箭為第一上手以外國所獻金精盤價直巨萬以賜之四年從幸仁壽宫宴賜重疊及上不豫素與兵部尚書栁述黄門侍郎元嚴等入侍疾時皇太子入居大寳殿慮上有不諱湏豫防擬乃手自為書封出問素條録事狀以報太子宫人潛送於上上覽而大恚所寵陳貴人又言太子無禮上遂發怒欲召庶人勇太子謀之素素矯詔追東宫兵士帖上臺宿衛門禁出入並取宇文述郭衍節度又令張衡侍疾上以此日崩由是頗有異論㑹漢王諒反遣茹茹天保往東蒲州燒斷河橋又遣王􅡭子并力拒守素将輕騎五千襲之潛於渭口宵濟比明擊之天保敗􅡭子懼以城降有詔徴還初素将行計日破賊皆如所量帝於是以素為并州道行軍總管河北道安撫大使討諒時晉絳吕三州並為諒城守素各以二千人縻之而去諒遣趙子開擁衆十餘萬築絶徑路屯據髙壁布陳五十里素令諸将以兵臨之自以竒兵深入霍山縁崖谷而進直指其營一戰破之諒所署介州刺史梁脩羅屯介休聞素至懼棄城而走進至清源去并州三十里諒率其将王世宗趙子開蕭摩訶等來拒戰又擊破之禽蕭摩訶諒退保并州素進兵圍之諒窮而降餘黨悉平帝遣素弟脩武公約齎手詔勞素素上表陳謝其月還京師從駕幸洛陽以素領營東京大監以平諒功拜其子萬石仁行姪元挺皆儀同三司賚物五萬叚羅綺千匹諒之妓妾二十人大業元年遷尚書令賜東京甲第一區物二千叚尋拜太師餘官如故前後賞錫不可勝計明年拜司徒改封楚公真食二千五百戸其年病薨諡曰景武贈光禄大夫太尉公𢎞農河東絳郡臨汾文城河内汲郡長平上黨西河十郡太守給輼輬車班劔三十人前後部羽葆鼔吹粟麥五千石物五千叚鴻臚監䕶䘮事帝又下詔立碑以彰盛羙素嘗以五言詩七百字贈番州刺史薛道衡詞氣穎㧞風韻秀上為一時盛作未幾而卒道衡歎曰人之将死其言也善若是乎集十卷素雖有建立策及平楊諒功然特為帝猜忌外示殊禮内情甚薄大業中言楚分野有大䘮因改封素於楚寝疾之日帝毎令名醫診候賜以上藥然密問醫人恒恐不死素又自知名位已極不肯服藥亦不将慎每語弟約曰我豈湏臾活邪素貪財貨營求産業東西京居宅侈麗朝毁夕復營繕無已爰及諸方都㑹之處邸店水磑田宅以千百數時議以此鄙之子元感少時晚成人謂之癡唯素每謂所親曰此兒不癡也及長美鬚髯儀貎雄俊好讀書便騎射弱冠以父軍功位柱國與其父俱為第二品朝㑹則齊列後髙袓命元感降一等元感拜謝曰不意陛下寵臣之甚許以公庭獲展私敬初拜郢州刺史到官潛布耳目察長吏能否纖介必知吏民敬服皆稱其能後轉宋州刺史以父憂去職歲餘起拜鴻臚卿襲爵楚國公遷禮部尚書性雖驕倨而愛重文學四海知名之士多趨其門自以累代尊顯有盛名於天下在朝文武多父之将吏復見朝綱漸紊帝又猜忌日甚内外不自安遂與諸弟潛謀廢帝立秦王浩及從征吐谷渾還至達斗拔谷時從官狼狽元感欲襲擊行宫其叔慎曰士心尚一國未有釁不可圖也元感乃止時帝好征伐元感欲立威名隂求將領謂兵部尚書叚文振曰元感世荷國恩寵踰涯分自非立効邉裔何以塞責若方隅有風塵之警庶得執鞭行陣少展絲髮之功明公兵革是司敢布心腹文振因言於帝帝嘉之顧謂羣臣曰将門出将相門出相故不虚也於是賚物千叚禮遇益隆頗預朝政帝征遼東令元感於黎陽督運于時百姓苦役天下思亂元感遂與虎賁郎将王仲伯汲郡贊治趙懐義等謀議欲令帝所軍旅饑餒每為遲留不時進發帝遲之遣使者促逼元感揚言曰水路多盗賊不可前後而發其弟虎賁郎将元縱鷹揚郎將萬石並從幸遼東元感潛遣人召之時将軍來䕶兒以舟師自東萊将入海趣平壤城軍未發元感無以動衆乃遣家奴偽為使者從東方來謬稱䕶兒失軍期而反元感遂入黎陽縣閉城大募男夫於是取颿布為牟甲置官屬皆准開皇之舊移書傍郡以討䕶兒為名各令發兵㑹於倉所以東光縣尉元務本為黎州刺史趙懐義為衛州刺史河内郡主簿唐禕為懐州刺史有衆且一萬将襲洛陽唐禕至河内馳往東都告之越王侗民部尚書樊子蓋等大懼勒兵備禦脩武縣民相率守臨清關元感不得濟遂於汲郡南渡河從亂者如市數日屯兵上春門衆至十餘萬子蓋令河南贊治裴𢎞策拒之𢎞策戰敗瀍洛父老競致牛酒元感屯兵尚書省誓衆曰我身為上柱國家累萬金至於富貴無所求也今者不顧破家滅族者為天下解倒懸之急救黎元之命耳衆皆恱詣轅門請自効者日有數千與樊子蓋書曰夫建志立義事有多途見機而作蓋非一揆昔伊尹放太甲於桐宫霍光廢劉賀於昌邑此並公度内不能一二披陳髙祖文皇帝誕膺天命造兹區宇在璇璣以齊七政握金鏡以馭六龍無為而至化流埀拱而天下乂今上纂承寳厯宜固洪基乃自絶于天殄人敗徳頻年肆眚盗賊於是滋多所在脩營人力為之凋盡荒淫酒色子女必被其侵耽玩鷹犬禽戰皆離其毒朋黨相扇貨賄公行納邪佞之言杜正直之口加以轉輸不息徭役無期士卒填溝壑骸骨蔽原野黄河之北則千里無烟江淮之間則鞠為茂草元感世荷國恩位居上將先公奉遺詔曰好子孫為我輔弼之惡子孫為我屏黜之所以上稟先旨下順民心廢此昬淫更立明哲今四海同心九有咸應士卒用命如赴私讐人庶相趨義形公道天意人事較然可知公獨守孤城勢何支久願以黔黎在念社稷為心勿拘小禮自貽伊戚誰謂國家一旦至此執筆澘然言無所具遂逼都城刑部尚書衛元率衆數萬自關中來援東都以歩騎二萬度瀍澗挑戰元感偽北元逐之伏兵發前軍盡沒後數日元復與元感戰兵始合元感詐令人大呼曰官軍已得元感矣元軍稍怠元感與數千騎乗之大潰擁八千人而去元感驍勇多力毎戰親運長矛身先士卒喑嗚叱咤所當者莫不震懼論者方之項羽又善撫馭士樂致死由是戰無不捷元軍日蹙糧又盡乃悉衆決戰陣於北邙一日間戰十餘合元感弟元挺中流矢而斃元感稍却樊子蓋復遣兵攻尚書省又殺數百人帝遣虎賁郎将陳稜攻元務本於黎陽武衛将軍屈突通屯河陽左翊衛大將軍宇文述發兵繼進右驍衛大将軍來䕶兒復來赴援元感請計於前民部尚書李子雄子雄曰屈突通曉習兵事若渡河則勝負難決不如分兵拒之通不能濟則樊衛失援元感然之将拒通子蓋知其謀數擊其營元感不果進通遂濟河軍於破陵元感為兩軍西抗衛元東拒屈突通子蓋復出兵於是大戰元感頻北復請於子雄子雄曰東都援軍益至我師不可久留不如直入關中開永豐倉以賑貧乏三輔可指麾而定據有府庫東靣而爭天下此亦霸王之業㑹華隂諸楊請為郷導元感遂釋洛陽西圖關中宣言已破東都取關西宇文述等諸軍躡之至𢎞農宫父老遮說元感曰宫城空虚又多積粟攻之易下進可絶敵人之食退可割宜陽之地元感以為然留攻之三日城不下追兵遂至元感西至閿郷上槃豆布陳亘五十里與官軍且戰且行一日三敗復陳於董杜原諸軍擊之元感大敗獨與十餘騎竄林木間将奔上洛追騎至元感叱之皆懼而返走至葭蘆戍元感窘逼獨與弟積善歩行自知不免謂積善曰事敗矣我不能受人戮辱汝可殺我積善抽刀殺之因自刺不死為追兵所執與元感首俱送行在磔其屍於東都市三日復臠而焚之餘黨悉平其弟元奨為義陽太守将歸元感為郡丞周旋玉所殺元縱弟萬石自帝所逃歸至髙陽止傳舍監事許華與郡兵執之斬於涿郡萬石弟仁行官至諫議大夫斬於長安並具梟磔公卿請改其姓為梟氏詔可之元感之亂有趙元淑者預謀誅又有劉元進亦舉兵應之元淑博陵人父世模初從髙寳寜後以衆歸周授上開府寓居京兆之雲陽髙祖踐阼恒典宿衛後從晉王伐陳力戰而死朝廷以其身死王事以元淑襲父本官賜物三千叚元淑性疎誕不事産業家徒壁立後授驃騎将軍将之官無以自給時長安富民宗連家累千金仕周為三原令有季女慧而有色連每求賢壻聞元淑請與相見連有風儀美談笑元淑亦慕之及至其家服玩居處擬於将相酒酣奏女樂元淑所未見也及出連又致殷勤元淑再三來宴樂多侈於前因問所湏盡買與之元淑致謝連復拜求以女妻之元淑感而納焉遂為富人從楊素平楊諒以功進位柱國歴徳州刺史熲川太守並有威惠入為司農卿元感有異志遂與結交遼東之役領将軍典宿衛加光禄大夫封葛國公明年帝復征髙麗以元淑鎮臨渝及元感作亂其弟元縱自駕所逃歸路經臨渝元淑出其小妻魏氏見元縱對宴極歡因與通謀并受元縱賂遺及元感敗人有告其事者帝以屬吏元淑及魏氏俱斬於涿郡籍沒其家元進餘杭人少好任侠為州里所宗兩手各長尺餘臂埀過膝屬遼東之役百姓騷動元進自以相表非常遂聚亡命㑹元感起於黎陽元進應之旬月衆至數萬将渡江而元感敗呉郡朱爕晉陵管崇亦舉兵有衆七萬共迎元進奉以為主據呉郡稱為天子以爕崇俱為僕射署百官帝令将軍吐萬緒光禄大夫魚俱羅討焉為緒所敗朱爕戰死俄而緒俱羅並得罪江都郡丞王世充發兵擊之有大流星墜于江都未及地而南逝磨拂竹木皆有聲至呉郡而落于地元進惡之令掘地入二丈得一石徑丈餘數日失石所在世充渡江元進遣兵人各持茅因風縱火世充大懼将棄營遁遇反風火轉元進衆懼燒而退世充大破之元進及崇皆為世充所殺世充阬其衆於黄亭澗死者三萬人其後董道沖沈法興李子通等並乗此而起素母弟約字惠伯童兒時嘗登樹墜地為查所傷由是竟為宦者性好沈静内多譎詐好學彊記素友愛之凡有所為先籌於約而行在周末以素軍功賜爵安成縣公拜上儀同三司髙祖受禪歴位長秋卿鄜州刺史宗正大理二少卿時皇太子無寵晉王廣規奪宗以素幸於上而雅信約乃用張衡計遣宇文述大以金寳賂約因通王意說之曰夫守正履道固人臣之常致反經合義亦達者之令圖自古賢人君子莫不與時消息以避禍患公兄弟功名蓋世用事有年朝臣為足下家所屈辱者可勝數哉又儲宫以所欲不行毎切齒於執政公雖自結於人主而欲危公者亦多矣主上一旦棄羣臣公亦何以取庇今皇太子失愛於皇后主上素有廢黜之心此公所知也今若請立晉王在賢兄之口耳誠能因此時建大功王必鏤銘於骨髓斯則去累卵之危成太山之安也約然之以白素素本凶險聞之大喜乃撫掌曰吾智慧殊不及此頼汝起予約知其計行復謂素曰今皇后之言上無不用宜因機㑹早自結託則匪惟長保榮禄傳祚子孫又晉王傾身禮士聲名日盛躬履節儉有主上之風以約料之必能安天下兄若遲疑一旦有變令太子用事恐禍至無日素遂行其策太子果廢及晉王入東宫引約為左庶子封脩武公進位大将軍及髙祖崩遣約入京易留守者縊殺庶人勇然後陳兵發凶問煬帝聞之曰令兄之弟果堪大任即位數日拜内史令約有學術兼達時務帝甚任之後加光禄大夫及帝在東都令約詣京師享廟行至華隂見其先墓遂枉道拜哭為憲司所劾坐免官尋拜浙陽太守其兄子元感時為禮部尚書與約恩義甚篤既愴分離形於顔色帝謂曰公比憂瘁得非為叔也元感再拜流涕曰誠如聖㫖帝亦思約廢立功由是徴入朝未幾卒以素子元挺後之素叔祖穆字紹叔仕魏華州别駕孝武末弟寛請以澄城縣伯讓穆詔許之終于并州刺史贈開府儀同三司華州刺史穆弟儉字景則偉容儀有才行位北雍州刺史政尚寛惠夷夏安之後從破齊神武於沙苑封夏陽縣侯位開府儀同三司華州刺史卒諡曰静子异字文殊美風儀有器局髫齓就學日誦千言見者竒之九歲丁父憂哀毁過禮殆將滅性及免䘮之後絶慶弔閉戸讀書數年之間博渉書記周閔帝時為寜都郡太守甚有能名賜爵樂昌縣子後數以軍功進爵為侯髙祖作相行濟州事及踐阼拜宗正少卿加上開府蜀王秀之鎮益州也朝廷盛選綱紀以异方直拜益州總管長史尋遷西南道行臺兵部尚書後歴宗正卿刑部尚書出為呉州總管甚有能名時晉王廣鎮揚州詔令异毎歲一與王相見評論得失規諫疑闕卒於官子䖍遜嗣儉弟寛列在周史蘇威字無畏京兆武功人父綽魏度支尚書周史有傳威少有至性五歲䘮父哀毁有若成人襲爵美陽縣公仕郡功曹周革命大冢宰宇文䕶甚敬禮之以其女新興公主妻焉威見䕶專權恐禍及乃逃入山中為叔父所逼卒不獲免然每屏居山寺以諷讀為娯未幾授持節車騎大将軍儀同三司改封懐道縣公周武親總萬機拜稍伯下大夫前後所授並辭疾不拜有從父妹適河南元世雄世雄先與突厥有隙突厥入朝請世雄及其妻子将甘心焉周遂遣之威以夷人昧利遂摽賣田宅罄資産贖世雄論者義之宣帝嗣位就拜開府髙祖為丞相髙熲屢言其賢髙祖亦素重其名召入卧内與語大恱居月餘威聞禪代之議遁歸田里髙熲請追之髙祖曰此不欲預吾事耳且置之及受禪徴拜太子少保追贈其父為邳國公以威襲焉俄兼納言民部尚書威上表陳讓優詔不許帝嘗與獻文皇后對觴召威及髙熲楊素廣平王雄四人謂曰太史言朕祚運盡於三年朕為之憂懣故舉此酒耳今欲營南山險處與公等固之以觀時變公等以為如何威進曰昔周文脩徳旋地動之災宋景一言退法星三舍臣願陛下恢崇徳度享天之休若棄徳恃險同舟之人誰非敵國縱南山之阻安足固哉帝善其言屬之以酒初威父綽在西魏時以國用不足為征稅之法頗稱為重既而歎曰今者所為正如張弓非平世之法也後之君子誰能弛乎威聞其言每以為已任至是奏減賦役務從輕典上悉從之漸見親重與髙熲參掌朝政威時見宫中以銀為幔鈎者因盛陳前世節儉之羙以為風諭帝為之改容由是雕飾舊物悉令除毁上嘗怒一人将殺之威入閤進諫不納上怒甚将自出斬之威當上前不去上避之而出威又遮止上拂衣而入良久乃召威謝之曰公能如是吾復何憂矣於是賜馬二匹錢十餘萬歲餘尋復兼大理卿京兆尹御史大夫本官悉如故治書侍御史梁毗劾威身領五職安繁戀劇無舉賢自代之心上曰蘇威朝夕孜孜志存遠大舉賢有闕何遽逼之顧謂威曰用之則行舍之則藏惟我與爾有是夫因謂朝臣曰蘇威不值我無以措其言我不得蘇威何以行其道楊素才辯無䨇至若斟酌古今助我宣化非威之匹也蘇威若逢亂世當為商山四皓豈易屈哉其為人主見重如此未幾拜刑部尚書解少保御史大夫官後京兆尹廢以威檢校雍州别駕時髙熲與威同心協贊政刑大小無不籌之故革運數年天下稱平俄轉户部尚書納言如故屬山東諸州人饑帝令威振恤之遷吏部尚書兼國子祭酒隋承戰爭之後憲章踳駮上令朝臣釐改舊法為一代通典律令格式多威所定世以為能九年拜尚書左僕射其年以母憂去職柴毀骨立敇勉諭殷勤未幾起令視事固辭優詔不許明年帝幸并州命與髙熲同總留事俄追詣行在所使決民訟尋令持節廵撫江南得以便宜從事過㑹稽踰五嶺而還江表自晉已來刑法疏緩代族貴賤不相陵越平陳之後牧人者盡改變之無長㓜悉使誦五敎威加以煩鄙之辭百姓嗟怨使還奏言江表依内州責戸籍上以江表初平召戸部尚書張嬰責以政急時江南州縣又訛言欲徙之入關遠近驚駭饒州呉世華起兵為亂生臠縣令㗖其肉於是舊陳率土皆反執長吏抽其腸而殺之曰更使儂誦五敎邪尋詔内史令楊素討平之時突厥都藍可汗屢為患復令威至可汗所威子夔與國子博士何妥各有所持於是夔妥各為一議使百寮署其所同朝廷多附威同夔者十八九妥恚曰吾席間函丈四十餘年反為昨暮兒之所屈也遂奏威與禮部尚書盧愷吏部侍郎薛道衡尚書右丞王𢎞考功侍郎李同和等共為朋黨省中呼王𢎞為世子李同和為叔言二人如威之子弟復言威以曲道任其從父弟徹肅等罔冐為官又國子學請黎陽人王孝逸為書學博士威屬盧愷以為其府參軍上令蜀王秀上柱國虞慶則等雜案之事皆驗上取宋書謝晦傳中朋黨事令威讀之威惶懼免冠頓首上曰謝已晚矣遂免威官爵以開府就第知名之士坐威得罪者百餘人未幾上曰蘇威徳行者但為人所誤耳命之通籍歲餘復爵邳公拜納言從祠太山坐不敬免俄而復位上謂羣臣曰世人言蘇威詐清家累金玉此妄言也然其性狠戾不切世要求名太甚從已則恱違之必怒此其大病耳仁壽初復拜尚書右僕射上幸仁壽宫不豫皇太子自京師求侍疾詔威留守京師及帝還御史奏威職事多不理帝怒詰責威威謝帝亦止煬帝嗣位加上大將軍上将大起長城之役威諌止之髙熲賀若弼之誅也威坐相連免官歲餘拜魯郡太守脩羽儀召拜太常卿從征吐谷渾進拜右光禄大夫歲餘復為納言與左翊衛大將軍宇文述黄門侍郎裴矩御史大夫裴藴内史侍郎虞世基參掌朝政時人稱為五貴及征遼東以本官領右武衛大將軍進位光禄大夫賜爵房陵侯尋進爵為公以年老乞骸骨不許復以本官參掌選事明年從征遼東領右禦衛大將軍楊元感之反帝引威於帳中懼見於色謂之曰此小兒聰明得不為患邪威曰夫識是非審成敗者乃所謂聰明元感麤疎非聰明者必無所慮但恐浸成亂階耳威見勞役不息百姓思亂微欲以此諷帝帝不寤從還至涿郡詔威安撫闗中以威孫尚輦直長儇為副威子鴻臚少卿夔先為闗中簡黜大使一家三人俱奉使闗右三輔榮之歲餘帝手詔曰玉以潔潤丹紫莫能渝其質松表歲寒霜雪莫能凋其采可謂温仁勁直性之然乎房陵公威先后舊臣朝之宿齒棟梁社稷弼諧朕躬守文奉法卑身率禮昔漢之三傑輔惠帝者蕭何周之十亂佐成王者邵奭國之寳器其在得賢參爕台階具瞻斯允雖事藉論道終期獻替銓衡時務朝寄為重可開府儀同三司餘並如故威當時尊重朝臣莫與為比後從幸鴈門帝為突厥所圍朝廷危懼欲輕騎潰圍而出威諫曰城守則我有餘力輕騎則彼之所長陛下萬乗之主何宜輕脫帝乃止突厥俄亦解圍去車駕次太原威曰今者盗賊不止士馬疫弊願陛下還京深根固本為社稷之計帝初然之後竟用宇文述等議遂往東都時天下大亂威知帝不可匡正意甚患之屬帝問侍臣盗賊事宇文述曰盗賊信少不足為虞威不能詭對以身隠於殿柱帝呼威問之威對曰臣非職司不知多少但恐其漸近帝曰何謂也威曰他日賊據長白山今者近在滎陽氾水帝不恱而罷尋屬五月五日百寮上饋多以珍翫威獻尚書一部微以諷帝帝彌不平後復問伐遼東事威對願赦羣盗遣討髙麗帝益怒御史大夫裴藴希㫖令白衣御史張行本奏威昔在髙陽典選濫授人官畏怯突厥請還京師帝令案其事乃下詔曰威立性朋黨好為異端懐挟詭道徼幸名利詆訶律令謗訕臺省昔歲薄伐奉述先志凡預切問各盡胸臆而威不以開懐遂無對命啓沃之道其若是乎於是除名後月餘人有奏威與突厥隂圖不軌大理簿責威威自陳精誠不能上感瑕釁屢彰罪當萬死帝憫而釋之其年從幸江都宫帝将復用威裴藴虞世基奏威昏耄羸疾帝乃止宇文化及之弑逆也以威為光禄大夫開府儀同三司化及敗歸於李密密敗歸東都越王侗以為上柱國邳公王世充僭號署太師威自以隋室舊臣遭逢䘮亂所經之處皆與時消息以求容免及唐秦王平王世充坐於東都閶闔門内威請謁見稱老病不能拜起王遣人數之曰公隋室宰輔政亂不能匡救遂令品物塗炭君弑國亡見李密王世充皆拜伏舞蹈今既老病無勞相見也尋歸長安至朝堂請見唐髙祖又不許卒於家時年八十二歲治身清儉以㢘慎見稱每至公議惡人異已雖或小事必固争之時人以為無大臣體所修格令章程並行於當世然頗傷苛碎及大業末年尢多征役於論功行賞威每承望風㫖輙寝其事時羣盗蜂起郡縣有表奏詣闕者又訶詰使人令減賊數故出師攻討多不克㨗由是致敗亂為物議所譏子夔字伯尼少聰敏有口辯八歲誦詩兼解騎射年十三從父至尚書省與安徳王雄馳射賭得駿馬而歸十四詣學與諸儒論議詞致可觀見者莫不稱善及長博覽羣言尢以鍾律自命初名哲字知人父威由是改之頗為有識所哂起家太子通事舍人楊素甚竒之素每戲威曰楊素無兒蘇夔無父後與鄭譯何妥議樂得罪議寢不行著樂志十五篇以見其志數載遷太子舍人以罪免居職數年仁夀三年詔天下舉達禮樂源者晉王昭時為雍州牧舉夔與諸州所舉五十餘人謁見帝望夔謂侍臣曰唯此一人稱吾所舉於是拜晉王友焬帝嗣位歴太子洗馬司朝謁者以父免職夔亦去官後歴尚書職方郎燕王司馬遼東之役以功拜朝散大夫時帝方勤遠略蠻夷朝貢前後相屬帝從容謂宇文述虞世基曰四夷率服觀禮華夏鴻臚之職湏歸令望寜有多才藝羙容儀可以接對賔客者為之乎咸以夔對帝然之即日拜鴻臚少卿其年髙昌王麴伯雅來朝朝廷妻以公主䕫有雅望令主婚其後延和𢎞化等數郡盗賊屯結詔夔廵闗中及突厥圍鴈門䕫於鎮城東南為弩樓車箱虎圈一夕而就帝見善之以功進位通議大夫坐父事除名後㑹丁母憂不勝哀卒時年四十九韓禽虎字子通河南東垣人後家新安父雄以武烈知名仕周至都督中州刺史自有傳禽虎少慷慨以膽略見稱容貎魁岸有雄傑之表性又好書經史百家皆略知大㫖周文見而異之令與諸子游集後以軍功稍遷儀同三司襲爵新義郡公周武帝伐齊禽虎說下獨孤永業於金墉城及平范陽加上儀同永州刺史髙祖作相遷和州刺史陳将甄慶任蠻奴蕭摩訶等共為聲援頻寇江北前後入界禽虎屢挫其鋒陳人奪氣開皇初髙祖有潛吞江南之志以禽虎有文武才用夙著威名於是拜為廬州總管委以平陳之任甚為敵人所憚及大舉伐陳以禽虎為先鋒禽虎領五百人宵濟襲採石守者皆醉遂取之進攻姑孰半日而拔次於新林江南父老素聞其威信來謁軍門晝夜不絶陳人大駭其将樊廵魯世真田瑞等相繼䧏之晉王上其狀髙祖大恱晉王遣行軍總管杜彦與禽虎合軍陳主叔寳遣領軍蔡徴守朱雀航聞禽虎將至衆懼而潰陳將任蠻奴為賀若弼所敗棄軍䧏禽虎禽虎以精騎五百直入朱雀門陳人欲戰蠻奴撝之曰老夫尚䧏諸軍何事衆皆散走遂平金陵執陳主叔寳時賀若弼亦有功乃下詔於晉王曰此二公者有深謀大略東南逋寇朕本委之静地恤民悉如朕意九州不一已數百年以名臣之功成太平之業平定江表乃二人之力也天下盛事何用過此賜物萬叚又下優詔於禽虎弼曰申國威於萬里宣朝化於一隅使東南之民俱出湯火數百年賊旬日廓清專是公之功也髙名塞於宇宙盛業光於天壤逖聼前古罕聞其匹班師凱入誠知非遠相思之甚寸隂若歲及至京師弼與禽虎争功於上前弼曰臣在蔣山死戰破其銳卒擒其騎將震揚威武遂平陳國韓禽虎略不交陣豈臣之比禽虎曰本奉明㫖令臣與弼同時合勢以取偽都弼乃敢先期逢賊遂戰致令將士死傷甚多臣以輕騎五百兵不血刃直取金陵䧏任蠻奴執陳叔寳據其府庫傾其巢穴弼至夕方扣北掖門臣啓門而納之斯乃救罪不暇安得與臣為比上曰二將俱合上勲於是進位上柱國賜物八千叚有司劾禽虎放縱士卒滛汙陳宫坐此不得國公及真食邑大軍之始出也上敇有司曰亡國物我一不以入府可於苑内築五垜當悉賜文武百官大射以取之及是上御元堂大陳陳之奴婢貨賄㑹王公文武官七品已上武職領兵都督已上及諸考使以射之先是江東有謠曰黄班青驄馬發自夀陽涘來時冬氣末去日春風始皆不知所謂禽虎平陳之際又乘青驄馬往返時節與謠相應至是方悟其後突厥來朝上謂之曰汝聞江南有陳國乎對曰聞之上命左右引突厥詣禽虎前謂曰此是執得陳國天子者禽虎更厲色顧之突厥惶恐不敢視其威容如此别封夀光縣公真食千戸以行軍總管屯金城禦備胡寇即拜涼州總管俄徴還京恩禮殊厚無何其鄰母見禽虎門下儀衛甚盛有同王者母異而問之其中人云我來迎王忽然不見又有人疾篤忽驚走至禽虎家曰我欲謁王左右問曰何王也答曰閻羅王禽虎子弟欲撻之禽虎止之曰生為上柱國死作閻羅王斯亦足矣因寝疾數日卒年五十五子世諤嗣世諤倜儻驍㨗有父風楊元感亂引為將每先登元感敗為吏所拘時帝在髙陽送詣行在所世諤日令守者市酒殽以酣暢揚言曰吾死在朝夕不醉何為漸以酒進守者守者狎之遂飲令醉因得逃奔山賊不知所終禽虎母弟僧夀字元慶亦以勇烈知名周武帝時為侍伯中旅下大夫髙祖得政從韋孝寛平尉遲迥以功授大将軍封昌樂縣公開皇初拜安州刺史時禽虎為廬州總管朝廷不欲其兄弟同在淮南轉熊蔚二州刺史進爵廣陵郡公尋以行軍總管擊破突厥於雞頭山後坐事免數歲復拜蔚州刺史突厥甚憚之後檢校靈州總管事從楊素破突厥進位上柱國改封江都郡公煬帝即位封新蔡郡公自是不復任用大業五年從幸太原時有京兆人達奚通妾王氏能清歌朝臣多相命觀之僧夀亦豫焉坐除名尋復本位卒於京師有子孝基僧夀弟洪字叔明少驍勇善騎射旅力過人仕周以軍功拜大都督髙祖為丞相從韋孝寛破尉遲迥加上開府封甘棠縣侯及髙祖受禪進爵為公開皇九年平陳之役授行軍總管及陳平晉王廣大獵於蒋山有猛虎在圍中衆皆懼洪馳馬射之應弦而倒陳氏諸将列觀皆歎伏焉王大喜賜縑百疋尋以功加柱國拜蒋州刺史轉㢘州時突厥屢為邉患朝廷以洪驍勇令檢校朔州總管事尋拜代州總管仁夀元年突厥達頭可汗犯塞洪率蔚州刺史劉隆大將軍李藥王拒之遇虜於恒安衆寡不敵洪四靣搏戰身被重創將士沮氣虜悉衆圍之矢下如雨洪偽與虜和圍少懈洪率所領潰圍而出死者大半殺虜亦倍洪及藥王除名隆竟坐死焬帝北廵至恒安見白骨被野以問侍臣曰往者韓洪與虜戰處也帝憫然傷之改𦵏骸骨命五郡沙門為設齊供拜洪隴西太守未幾珠崖人王萬昌作亂詔洪平之以功加金紫光禄大夫領郡如故俄而萬昌弟仲通復叛又詔洪平之還師未幾旋遇疾卒賀若弼字輔伯河南洛陽人也父敦周中州刺史贈大將軍自有傳弼少有大志驍勇便弓馬解屬文博渉書記有重名周齊王憲聞而敬之引為記室封當亭縣公遷小内史與韋孝寛伐陳攻拔數十城弼計居多拜夀州刺史改封襄邑縣公髙祖為丞相尉遲迥作亂髙祖恐弼為變遣長孫平馳驛代之及髙祖受禪隂有平江南志訪可任者髙熲薦弼有文武才幹於是拜呉州總管委以平陳事弼忻然以為已任與夀州總管源雄並為重鎮弼遺雄詩曰交河驃騎幕合浦伏波營勿使麒麟上無我二人名獻取陳十策上稱善賜以寳刀開皇九年大舉伐陳以弼為行軍總管將渡江酹酒而誓曰弼親承廟略遠振國威伐罪弔民上天長江鑒其若此如使福善禍淫大軍利渉如事有乖違得𦵏江魚腹中死且不恨先是弼請縁江防人每交代之際必集歴陽於是大列旗幟營幕被野陳人以為大兵至悉發國中士馬後知防人交代其衆復散遂以為常不復設備及此弼以大軍濟江陳人不之覺乃襲陳南徐州拔之執其刺史黄恪軍令嚴肅秋毫不犯有軍士於民間酤酒者弼立斬之進屯蔣山之白土崗陳将魯廣達周智安任蠻奴田瑞樊毅孔範蕭摩訶等以勁兵拒戰田瑞先犯擊走之魯廣達等相繼遞進弼軍屢却弼揣知其驕士卒且惰於是督厲将士殊死戰遂大破之麾下士開府員明擒摩訶至弼命左右牽斬之摩訶顔色自若弼釋而禮之從北掖門入時韓禽虎已執陳主叔寳弼至乃呼叔寳視之叔寳惶懼流汗股慄再拜弼謂曰小國之君當大國卿拜禮也入朝不失作歸命侯無勞恐懼既而弼忿恨不獲叔寳功在韓禽虎之後於是與禽虎相詬挺刃而出令蔡徴為叔寳作䧏牋命乘騾車歸已事不果上聞弼有功大悅下詔褒揚之晉王以弼先期決戰故違軍令於是以弼屬吏上驛召之及見迎勞曰克定三呉公之功也命登御座賜物八千叚加位上柱國進爵宋國公真食襄邑三千戸加寳劔寳帯金甕金盤各一并雉尾扇曲蓋雜綵二千叚女樂二部又賜叔寳妹為妾拜右領軍大將軍平陳後六年弼撰其畫策上之謂為御授平陳七策上弗省曰公欲發揚我名我不求名公宜自載家傳七策其一請廣陵頓兵一萬番代往來陳人初見設備後以為常及大兵南伐不復疑也其二使兵縁江時獵人馬喧譟及兵臨江陳人以為獵也其三以老馬多買陳船而匿之買弊船五六十艘於瀆内陳人覘以為内國無船其四積葦荻於楊子津其髙蔽艦及大兵將渡乃卒通瀆於江其五塗戰船以黄與枯荻同色故陳人不預覺之其六先取京口倉儲速據白土岡置兵死地故一戰而克其七臣奉勅兵以義舉及平京口俘五千餘人便悉給糧勞遣付其勅書命别道宣喻是以大兵渡江莫不草偃十七日之間南至林邑東至滄海西至象林皆悉平定轉右武候大將軍弼時貴盛位望隆重其兄隆為武都郡公弟柬萬榮郡公並刺史列將弼家珍玩不可勝數婢妾曵綺羅者數百時人榮之弼自以功名出朝臣之右每以宰相自許既而楊素為僕射弼仍為將軍甚不平形於言色由是免官弼怨望逾甚後數載下弼獄上謂曰我以髙熲楊素為宰相汝每唱言云此二人唯堪噉飯耳是何意也弼曰熲臣之故人素臣之舅子臣並知其為人誠有此語公卿奏弼怨望當死上曰臣下守法不移公自可求活理弼曰臣恃至尊威靈將八千兵渡江即禽陳叔寳竊以此望活上曰此已格外酬賞何用追論弼曰平陳之日諸公議不許臣行推心為國已䝉格外酬賞今還格外望活既而上低徊者數日惜其功特令除名為民歲餘復其爵位上亦忌之遂不復任使然宴賜遇之甚厚開皇十九年上幸仁夀宫讌王公弼為五言詩詞意憤怨帝覽而容之明年春弼又有罪在禁所詠詩自若上數之曰人有性善行惡者公之為惡乃與行俱有三太猛嫉妬心太猛自是非人心太猛無上心太猛昔在周朝已教他兒子反此心終不能改邪他日上謂侍臣曰初欲平陳時弼謂髙熲曰陳叔寳可平不作髙鳥盡良弓藏邪熲云必不然平陳後便索内使又索僕射我語熲曰功臣正宜授勲官不可預朝政弼後語熲皇太子於已出口入耳無所不盡公終久何必不得弼力何脉脉邪意圖鎮廣陵又求荆州總管並是作亂處意終不改也後突厥入朝上賜之射突厥一發中的上曰非賀若弼無能當此於是命弼弼再拜而呪曰臣若赤誠奉國者當一發破的如其不然發不中也既射一發而中上大悅顧謂突厥曰此人天賜我也煬帝之在東宫嘗謂弼曰楊素韓禽虎史萬歲三人俱稱良将也其間優劣何如弼曰楊素是猛将非謀将韓禽虎是鬬將非領将史萬歲是騎将非大將太子曰然則大將誰也弼拜曰唯殿下所擇弼意自許為大将及煬帝即位尤被疎忌大業三年從駕北伐廽至榆林帝時為大帳其下可坐數千人召突厥啓民可汗饗之弼以為太侈與髙熲宇文弼等私議得失為人所告竟坐誅時年六十四妻子為官奴婢羣從徙邉子懐亮慷慨有父風以柱國世子拜儀同三司坐弼為奴俄亦誅死弼叔父誼性剛果有幹略周文據闗中引之左右累遷儀同三司略陽公府長史周閔帝受禪封霸城縣子加開府歴原信二州總管及兄敦以讒毁伏誅坐免官從武帝平齊拜洛州刺史進封建威縣侯開皇中位左武侯將軍海陵郡公後以突厥為邉患誼素有威名拜靈州刺史進位柱國誼時年老猶能重鎧上馬甚為北夷所憚數載上表乞骸骨卒於家子舉襲爵李穆字顯慶自云其先隴西成紀人漢都尉陵之後兄賢周太師遠柱國大将軍皆列在周史穆少明敏有度量周文入闗便給事左右深被信遇穆亦小心謹肅未嘗懈怠及侯莫陳悦害賀拔岳周文自夏州赴難而悅黨史歸據原州猶為恱守周文令侯莫陳崇襲之穆時先在城中與兄賢遠應崇遂禽歸以功授都督從迎魏孝武封永平縣子又領郷兵禽竇泰復𢎞農並有戰功沙苑之㨗穆言於周文曰髙歡今日䘮膽矣請速逐之可禽也周文不聼論前後功進爵為公芒山之戰周文馬中流矢驚逸墜地敵人追及之左右皆奔散穆下馬以策擊周文背因大罵曰籠東軍士爾曹主何在爾獨住此敵人見而輕侮之不疑是貴人遂捨之而過穆以馬授周文遂與俱逸是日微穆周文已不濟矣既而與穆相對而泣自是恩眄更隆顧左右曰成我事者其此人乎即令撫慰闗中所至克定擢授武衛將軍儀同三司進封安武郡公前後賞賜不可勝計周文歎其忠節曰人所貴唯命穆遂輕命濟孤爵位玉帛未足為報乃特賜以鐵劵恕其十死進驃騎大将軍開府儀同三司侍中初芒山之敗穆以驄馬授周文其後廐内有驄馬盡以賜之又賜穆嗣子惇安樂郡公姊一人為郡君自餘姊妺皆為縣君兄弟子姪及緦麻已上親并舅氏皆沾厚賜其褒崇如此從解玊壁圍拜安定國中尉歴同州刺史太僕卿從于謹破江陵以功别封一子長城縣侯尋進位大将軍賜姓拓拔氏又擊曲沔蠻破之俄授原州刺史拜世子惇為儀同三司以兄賢子為髙平郡守遠子為髙平縣令並加鼔吹穆自以叔姪一家三人皆牧宰郷里恩遇過隆深懼滿盈固辭不受周文不許後遷雍州刺史兼小冢宰孝閔踐阼又封一子為升遷縣伯穆請廻授賢子孝軌許之及兄子植謀害宇文䕶被誅穆亦坐除名先是穆知植非保家之主每勸遠除之遠不能用及遠臨刑泣謂穆曰顯慶吾不用汝言以至於此將柰何穆以此獲免及其子弟亦免官時植弟淅州刺史基當從坐戮穆請以子惇怡等代基之命辭理酸切聞者莫不動容䕶義之而兩釋焉明帝即位拜驃騎大将軍開府儀同三司大都督復爵安武郡公拜直州刺史武成中子弟免官爵者悉復之累遷大司空天和二年奉詔築通洛城進爵申國公舊爵廻授一子尋持節綏集東境築武申旦郛慈澗崇徳安民交城鹿盧諸鎮建徳初遷太保尋出為原州總管四年武帝東征令穆别攻軹闗及河北諸縣並破之後以帝疾班師棄而不守六年進位上柱國除并州總管時東夏初平人情尚擾穆靖以鎮守百姓懐之大象元年加邑至九千戸遷大左輔總管如舊二年詔加太傅仍總管及髙祖作相尉遲迥舉兵遣使招穆穆鎻其使上其書初穆子士榮以穆所居皆天下精兵處隂勸穆應迥穆曰周徳既衰愚智共悉天時若此吾豈能違天乎乃遣使謁髙祖并奉十三環金帯蓋天子服也以微申其意時迥子誼為朔州刺史亦執送京師迥令其署行臺韓長業攻䧟潞州執刺史趙威署城人郭子勝為刺史穆遣兵討獲子勝髙祖嘉之以穆勞同破鄴城第一勲加三轉聼分授其二子榮才及賢子孝軌榮及才並儀同大將軍孝軌進開府儀同大将軍又别封子雄為容國公穆尋以天命有在密表勸進髙祖既受禪詔曰公既舊徳且又父黨敬惠來㫖義無有違便以今月十三日恭膺天命俄而穆來朝髙祖䧏坐禮之拜太師贊拜不名真食成安縣三千戸於是穆子孫雖在襁褓悉拜儀同其一門執象笏者百餘人穆之貴盛當時無比穆上表乞骸詔曰公既耆年筋力難煩今勒所司敬蠲朝集若有大事湏共謀議别遣侍臣就第詢訪時太史奏云當有移都之事上以初受命甚難之穆乃上表極言移都之便上素嫌臺城制度窄小又宫内多鬼妖蘇威嘗勸遷上不納遇太史奏狀意乃惑之至是省穆表上曰天道聰明已有徴應太師民望復抗此請則可矣遂從之歲餘下詔羙之且曰穆自今已後雖有愆罪但非謀逆縱有百死終不推問開皇六年薨于第年七十七遺令曰吾荷國恩年官已極啓足歸泉故無所恨但不得陪玉賛於岱宗預金泥於梁甫眷眷光景所在斯乎詔遣黄門侍郎監䕶䘮事賵儀甚厚贈使持節十州諸軍事冀州刺史諡曰明賜以石槨前後部羽葆鼔吹轀輬車百僚送之郭外詔太常卿牛𢎞齎哀册文祭以太牢長子惇字士獻周文令功臣長子並與略陽公游處惇於輩流中特被引接毎有遐方服翫珍竒無不班賜封安樂郡公位驃騎大將軍開府儀同三司鳳州刺史先穆卒子筠襲祖爵惇弟怡位儀同三司贈渭州刺史怡弟雅少有識量仕周以軍功封西安縣男位荆州總管開皇初進爵為公雅弟恒位鹽州刺史封曲陽侯恒弟榮位合州刺史長城縣公榮弟直位車騎將軍歸政縣侯直弟雄位柱國驃騎将軍密國公雄弟渾仁夀初忽忿其叔父筠恡嗇隂遣兄子善衡賊弑之求盗不獲髙祖大怒盡追其親族初筠與從父弟瞿曇有隙渾遂證瞿曇殺之而善衡獲免筠死髙祖議立後邳公蘇威奏筠不軌宜絶其封帝不許乃以渾為嗣渾字金才穆第十子也姿貎瓌偉羙鬚髯起家為周左侍上士尉遲迥反於鄴時穆在并州髙祖慮其為迥所誘遣渾乘驛往布腹心穆遽令渾入京奉熨斗於髙祖曰願執威柄以慰安天下髙祖大悅又遣渾詣韋孝寛所而述穆意適遇平鄴以功授上儀同三司封安武郡公開皇初受象城府驃騎将軍晉王廣出蕃渾以本官領親信從往揚州及筠卒髙祖議立嗣渾規欲紹之謂其妻兄太子左衛率宇文述曰若得襲封當分以國賦之半每歲相奉述利之為言於皇太子太子為之表奏乃襲申國公以奉穆嗣大業六年追改封穆為郕公渾仍襲焉累加光禄大夫九年遷右驍騎衛大将軍渾既紹父業日增豪侈後房曵羅綺者以百數二歲之後不以俸物與述述大恚之因醉謂其友人于象賢曰我竟為金才所賣死且不忘渾聞之由是結隙及帝討遼東有方士安伽陀自言曉圖䜟謂帝曰當有李氏應為天子勸盡誅海内姓李者述知之言於帝曰伽陀之言信矣臣與金才夙親聞其情趣大異常日數共李敏善衡等日夜屏語或終夕不寝渾大臣也身總禁兵不宜如此帝曰卿可覔其事述乃遣虎賁郎将裴藴雜推之數日不得反狀帝更遣述推述入獄中召出敏妻宇文氏謂曰夫人帝甥也何患無賢夫李敏金才名當袄䜟夫人當自求全因教言金才嘗告敏云汝應圖籙當為天子今主上好兵勞擾百姓此亦天亡隋時也若復度遼吾與汝必為大将軍每軍二萬餘兵固以五萬人矣又發諸房子姪内外親婭並募從征吾家子弟決為主帥分領兵馬散在諸軍吾與汝前發襲取御營子弟響赴一日之間天下定矣述口自傳授令敏妻寫表封云上密述持入奏云已得金才反狀并有敏妻密表帝覽之泣曰吾宗社幾傾頼親家公而獲全耳於是誅渾敏等宗族三二十人自餘無少長皆徙嶺表穆兄子詢字孝詢賢之子也深沈有大畧頗渉書記仕周累遷司衛上士武帝幸雲陽宫委以留府事衛王直作亂焚肅章門詢於内益火故賊不得入武帝善之累遷英果中大夫屢以軍功加位大将軍賜爵平髙郡公髙祖為丞相尉遲迥作亂遣韋孝寛擊之以詢為元帥長史委以心膂軍至永橋諸将不一詢密啓請重臣監䕶髙祖令髙熲監軍與熲同心唯詢而已及迥平進位上柱國改封隴西郡公開皇初歴位隰州總管以疾徴還京師卒帝悼惜者久之諡曰襄子元方嗣詢弟崇字永隆英果有籌算膽力過人周元年以父賢勲封廻樂縣侯時年尚小拜爵日親族相賀崇獨泣下賢問之對曰無勲於國㓜少封侯當報主恩不得終於孝養是以悲耳賢由此大竒之起家州主簿非其好也辭不就職求為将兵都督隨宇文䕶伐齊以功最授儀同三司歴位少侍伯大夫少承御大夫攝太子宫正周武平齊引參謀議以勲加授開府封襄陽縣公尋改封廣宗縣公髙祖為丞相加授上開府儀同大将軍懐州刺史進爵郡公尉遲迥反遣使招之崇初欲相應後知叔父穆以并州附髙祖慨然太息曰合家富貴數十人遇國有難竟不能扶傾繼絶何靣目處天地間乎韋孝寛亦疑之與俱卧起其兄詢時為元帥長史每諷諭之崇由是亦歸心焉及迥平授徐州總管進位上柱國開皇三年除幽州總管突厥犯塞崇輙破之奚霫契丹等讋其威略爭來内附後突厥大為侵掠崇率歩騎三千拒之轉戰十餘日師人多死遂保于沙城突厥圍之死亡畧盡突厥欲䧏之謂曰䧏者封為特勒崇知不免令其士卒曰吾䘮師徒罪當萬死今効命以謝國家汝看吾死且可䧏賊方便散走還見至尊道此意也乃挺刃突賊復殺二人沒於陣贈六州諸軍事豫州刺史諡曰壯子敏嗣敏字樹生髙祖以其父死王事養於宫中及長襲爵廣宗公起家左千牛羙姿容善騎射工歌舞弦管開皇初周宣帝后樂平公主有女娥英妙擇婚對勅貴公子弟集𢎞聖宫者日以百數公主選取敏禮儀如尚帝女後将侍宴公主謂敏曰我以天下與至尊唯一女夫當為汝求柱國若授餘官謹無謝及進見上上親御琵琶遣敏歌儛大恱謂公主曰敏何官對曰一白丁耳謂敏曰今授儀同敏不答上曰不滿爾意邪今授開府又不謝上曰公主有大功於我我何得向其女壻惜官今授卿柱國敏廼拜而蹈舞遂於坐發詔授柱國以本官宿衛後避煬帝諱改封經城縣公歴豳金華岐數州刺史多不莅職常留京師往來宫内侍從遊宴賞賜超於功臣大業初轉衛尉卿樂平公主将薨遺言於煬帝曰妾唯一女不自憂死深憐之湯沐乞廻與敏帝從之竟食五千户攝屯衛将軍楊元感反後城闕大興敏之策也轉将作監從征髙麗領新城道軍加光禄大夫十年帝復征遼東遣敏黎陽督運時或言敏一名洪兒帝疑洪字當䜟嘗靣告之冀其引決敏由是大懼數與從叔渾及從弟善衡等屏人私語宇文述知而奏之竟與渾同誅事列于前其妻宇文氏尋亦賜鴆而終梁睿字恃徳安定烏氏人也父禦西魏東雍州刺史周史有傳睿少沈敏有行檢周文時以功臣子養宫中復命與諸子游處同師共業情契甚懽七歲襲爵廣平郡公累加儀同三司本州大中正開府改封五龍郡公渭州刺史周閔帝踐阼徴為御伯出為中州刺史鎮新安以備齊齊人來冦睿輙挫之帝甚嘉歎拜大将軍以父禦佐命功進爵蒋國公入為司㑹後從齊王憲拒齊將斛律明月於洛陽每戰有功遷小冡宰歴敷州刺史涼安二州總管俱有惠政進位柱國髙祖總百揆代王謙為益州總管行至漢州而謙反攻始州睿不得進髙祖命睿為行軍元帥率行軍總管于義張威達奚長儒梁昇石孝義歩騎二十萬討之謙遣開府李三王守通谷睿使張威擊破之進至龍門謙將趙儼秦㑹擁衆十萬據嶮為營周亘三十里睿令将士衘枚出自閒道四靣奮擊大破之鼔行而進謙将敬豪守劔閣梁巖拒平林並懼而來䧏謙又命髙阿那瓌達奚惎等以盛兵攻利州聞睿将至分兵據開遠睿遣上開府拓拔宗趣劔閣大将軍宇文夐指巴西大將軍趙達水軍入嘉陵遣張威王倫賀若震于義韓相貴阿那惠等分道攻惎自午及申破之惎奔歸于謙睿逼成都謙令達奚惎乙弗䖍守城親率精兵五萬背城結陣睿擊破之謙將入城惎䖍以城降謙将麾下三千騎遁走新都令王寳執之睿斬謙于市劔南悉平進位上柱國總管如故賜物五千叚奴婢一千口金二千兩銀三千兩邑千戸睿時威振西州夷獠歸附唯南寜酋帥爨震恃遠不賔睿上疏曰南寜州漢牂柯之地近代已來分置興古雲南建寜朱提四郡戸口殷衆金寳富饒二河有駿馬明珠益寜出鹽井犀角晉泰始七年以益州曠遠分置寜州至偽梁南寜州刺史徐文盛被湘東徴赴荆州屬東夏尚阻未遑遠畧土人爨瓚竊據一方國家遥授刺史其子震相承至今而震臣禮多虧貢賦不入如聞彼人苦其苛政思被皇風幸因平蜀士衆不煩重興師旅夷獠既訖即請畧定南寜髙祖深納之然以天下初定恐民心不安故未之許後竟遣史萬歲討平之並用睿之䇿也睿威惠兼著民夷恱服聲望逾重髙祖隂憚之薛道衡從軍在蜀因入接宴說睿曰天下之望已歸于隋當達事機故睿密表勸進髙祖大悦及受禪待之甚隆睿復上平陳之䇿詔嘉之睿時見突厥方彊復陳鎮守之䇿十餘事上深嘉歎答以厚意睿時自以周代舊臣久居重鎮内不自安屢請入朝於是召還京師及引見上為之興命睿升殿握手極歡睿退謂所親曰功遂身退今其時也遂謝病於家闔門自守不交當世上賜以板輿毎有朝覲必令三衛輿上殿睿初平王謙之始自以威名大盛恐為時所忌遂大受金賄以自穢由是勲簿多不以實詣朝堂稱屈者前後百數人上令有司案驗其事主者多獲罪睿懼上表陳謝請歸大理上慰諭遣之十五年從至洛陽而卒諡曰襄子洋嗣歴位嵩徐二州刺史虎賁郎将大業六年詔追改睿封為戴公命以洋襲焉長孫覽字休因其先代人也祖承業魏太師上黨王父紹遠周贈柱國大將軍俱有傳覽性雄雅有噐度喜愠不形於色略渉書記尤曉鍾律周明帝時為大都督明帝以覽性質淳和堪為師表使事魯公甚見親善及魯公即位是為武帝超拜車騎大将軍毎公卿上奏必令省讀覽有口辨聲氣雄壯凡所宣傳百寮矚目帝每嘉歎之覽初名善帝謂曰朕以萬機委卿先覽遂賜名焉及誅宇文䕶以功進封薛國公累遷小司空從平齊進位柱國武帝崩受遺輔政宣帝時位上柱國遷大司徒歴同涇二州刺史髙祖為丞相轉宜州刺史開皇二年将有事於江南徴覽為東南道行軍元帥統八總管出夀陽水陸俱進師臨江陳人大駭㑹陳宣帝殂覽欲乘釁滅之監軍髙熲以禮不伐䘮乃還上嘗命覽與安徳王楊雄上柱國元諧李充左僕射髙熲右衛大将軍虞慶則呉州總管賀若弼等同宴上曰朕昔在周備展誠節但苦被猜忌毎致寒心為臣若此竟何情頼朕與公等義則君臣恩猶父子朕當與公等共享終吉罪非謀逆一無所問朕亦知公至誠侍太子宜數參見之柱臣素望實屬於公宜識朕意其恩禮如此又為蜀王秀納覽女為妃後授涇州刺史所至有政績卒官子洪嗣位宋順臨三州刺史司農少卿北平太守覽從子熾字仲光父兕仕魏别封鄴縣侯周天和初進驃騎大將軍開府儀同三司歴熊綘二州刺史襲爵平原縣公熾性敏慧羙姿容頗渉羣書兼長武藝初周武帝崇尚道法求學兼經史者為通道館學士熾應其選髙祖作相自御正上士擢為丞相府功曹參軍加大都督封陽平縣子遷稍伯下大夫以平王謙功拜儀同三司及髙祖受禪熾率官屬先入清宫即授内史舍人上儀同三司攝東宫右庶子出入兩宫甚被委遇累遷太常少卿改封饒陽縣子進位開府儀同三司改授吏部侍郎大業中歴位大理卿戸部尚書吐谷渾寇張掖令熾擊之追至青海以功授銀青光禄大夫六年帝幸江都宫留熾東都居守攝左侯衛將軍卒官諡曰静子安世通事謁者熾弟晟字季晟性通敏累渉書記善彈工射趫㨗過人時周室尚武貴遊子弟咸以相矜每共馳射時輩皆出其下年十八仕周為司衛上士未知名唯髙祖一見深嗟異焉乃攜其手而謂人曰長孫郎武藝逸羣適與其言又多竒畧後之名將豈非此子邪宣帝時突厥攝圖請婚于周以趙王招女妻之然周與攝圖各相誇競妙選驍勇以充使者因遣晟副汝南公宇文神慶送千金公主至其牙帳前後使人數十輩多為攝圖所不禮見晟而獨愛焉每共遊獵留之竟歲嘗有二鵰飛而争肉因而以兩箭與晟曰請射取之晟乃彎弓馳往遇鵰相攫遂一發而䨇貫焉攝圖嘉之命諸子弟貴人皆相親友冀昵近之以學彈射其弟處羅侯號突利設尤得衆心焉為攝圖所忌密託心腹隂與晟盟以相託晟毎與之遊獵因察山川形勢部衆彊弱皆盡知之時髙祖作相晟以狀白髙祖髙祖大喜遷奉車都尉至開皇元年攝圖曰我周家親也今隋公自立而不能制復何靣目見可賀敦乎因與髙寳寜攻陥臨渝鎮約諸靣部落謀共南侵髙祖新立由是大懼脩築長城發兵屯北境命隂夀鎮幽州虞慶則鎮并州屯兵為之備晟以先知攝圖玷厥阿波突利等叔姪兄弟各統彊兵俱號可汗分居四靣内懐猜忌外示和同難以力征易可離間因上書曰臣於周末忝充外使匈奴倚伏實所具知玷厥之於攝圖兵彊而位下外名相屬内隙已彰鼔動其情必將自戰又處羅侯者攝圖之弟姦多而勢弱曲取衆心國人愛之因為攝圖所忌又阿波首䑕介在其間頗畏攝圖受其牽率唯彊是與未有定心宜遠交而近攻離彊而合弱通使玷厥說合阿波則攝圖還兵自防右地又引處羅遣連奚霫則攝圖分衆還備左方首尾猜嫌腹心離阻十數年後承釁討之必可一舉而空其國上省表大恱因召與語晟復口陳形勢手畫山川寫其虚實如指諸掌上深嗟異皆納用焉因遣太僕元暉出伊吾道使詣玷厥賜以狼頭纛謬為欽敬玷厥使來引居攝圖使上反間既行果相猜貳授晟車騎將軍出黄龍道齎幣賜奚霫契丹等遣為郷導得至處羅侯所深布心腹誘令内附二年攝圖號四十萬騎自蘭州入至于周盤破達奚長儒軍更欲南入玷厥不從引兵而去時晟又說染干詐告攝圖曰鐵勒等欲襲其牙攝圖乃懼退兵出塞後數年突厥大入發八道元帥出拒之阿波至涼州與竇榮定戰賊帥累北時晟為偏將使謂之曰攝圖每來戰皆大勝阿波纔入便即致敗此乃突厥之恥且攝圖之與阿波兵勢本敵今攝圖日勝為衆所崇阿波不利為國生辱攝圖必當因此以罪歸於阿波成其夙計滅北牙矣阿波使至晟又謂曰今達頭與隋連和而攝圖不能制可汗何不依附天子連結達頭相合為彊此萬全之計豈若䘮兵負罪歸就攝圖受其戮辱邪阿波納之因留塞上後使人隨晟入朝時攝圖與衛王軍遇戰於白道敗走至磧聞阿波懐貳乃掩北牙盡獲其衆而殺其母阿波還無所歸西奔玷厥乞師十餘萬東擊攝圖復得故地收散卒與攝圖相攻阿波頻勝其勢益彊攝圖又遣使朝貢公主自請改姓乞為帝女上許之四年遣晟副虞慶則使于攝圖賜公主為楊氏改封大義公主攝圖奉詔不肯起拜晟進曰突厥與隋俱是大國天子可汗不起焉敢違意但可賀敦為帝女則可汗是大隋女壻柰何無禮不拜婦公乎攝圖笑謂其達官曰湏拜婦公乃拜受詔書使還稱㫖授儀同三司左勲將車騎將軍七年攝圖死遣晟持節拜其弟處羅侯為莫何可汗以其子雍閭為葉䕶可汗處羅侯因晟奏曰阿波為天所滅與五六千騎在山谷間當取之以獻時召文武議焉樂安公元諧曰請就彼梟首以懲其惡武陽公李充請生將入朝顯戮而示百姓上問晟晟曰阿波之惡非負國家因其困窮取而為戮恐非招遠之道不如兩存之上曰善八年處羅侯死遣晟往弔仍齎陳國所獻寳噐以賜雍閭十三年流民楊欽亡入突厥詐言彭城公劉昶共宇文氏女謀欲反隋遣其來密告公主雍閭信之乃不脩貢又遣晟出使微觀察焉公主見晟言辭不遜又遣所私胡人安遂迦共欽計議扇惑雍閭晟還以狀奏又遣晟往索欽雍閭欲勿與謬曰客内無此色人晟乃貨其達官知欽所在夜掩獲之以示雍閭因發公主私事國人大恥雍閭執遂迦等並以付晟使還上大喜加授開府仍遣入蕃涖殺大義公主雍閭又表請婚僉議將許之晟奏曰臣觀雍閭反覆無信特共玷厥有隙所以依倚國家縱與為婚終當必叛今若得尚公主承藉威靈玷厥染干必又受其徴發彊而更反後恐難圖且染干者處羅侯之子素有誠欵于今兩世臣前與相見亦乞通婚不如許之招令南徙兵少力弱昜可撫馴使敵雍閭以為邉捍上曰善又遣慰喻染干許尚公主十七年染干遣使隨晟來逆女以宗女封安義公主以妻之晟說染干南徙居度斤舊鎮雍閭疾之亟來抄掠染干伺知動静輙遣奏聞是以賊來每先有備十九年染干因晟奏雍閭作攻具欲攻大同城詔發六總管並取漢王節度分道出塞討之雍閭懼復共達頭同盟合力掩襲染干大戰于大長城下染干敗績其兄弟子姪盡見殺而部落亡散染干與晟獨以五騎逼夜南走至旦行百餘里收得數百騎乃相與謀曰今兵敗入朝一䧏人耳大隋天子豈禮我乎玷厥雖來本無寃隙若往投之必相存濟晟知懐貳乃密遣使者入伏遠鎮令速舉烽染干見四烽俱發問晟城上烽然何也晟紿之曰城髙地逈必遙見賊來我國家法若賊少舉二烽來多舉三烽大逼舉四烽彼見賊多而又近斗染干大懼謂其衆曰追兵已逼且可投城既入鎮晟留其達官執室以領其衆自將染干馳驛入朝帝大喜進晟左勲衛驃騎將軍持節䕶突厥晟遣䧏虜覘候雍閭知其牙内屢有災變夜見赤虹光照數百里天狗霣雨血三日流星墜其營内有聲如雷每夜自驚言隋師且至並遣奏知尋以染干為意彌豆啓民可汗賜射於武安殿選善射者二十二人分為兩朋啓民曰臣由長孫大使得見天子今日賜射願入其朋許之給箭六發皆入鹿啓民之朋竟勝時有鳶羣飛上曰公善彈為我取之十發俱中並應丸而落是日百官獲賚晟獨居多尋遣領五萬人於朔州築大利城以處染干安義公主死持節送義城公主復以妻之晟又奏染干部落既衆雖在城内猶被雍閭抄畧往來辛苦不得寜居請徙五原以河為固於夏勝兩州間東西至河南北四百里掘為横塹令處其内任情放牧免於抄掠人必自安上並從之二十年都藍大亂為部下所殺晟因奏曰賊内攜離其主被殺乘此招誘必來䧏附請遣染干部下分頭招慰上許之果盡來附達頭恐怖又大集兵詔晟部領䧏民為秦州行軍總管取晉王廣節度出討達頭達頭與王相抗晟進策曰突厥飲泉易可行毒因取諸藥毒水上流達頭人畜飲之多死於是大驚曰天雨惡水其亡我乎因夜遁晟追之斬首千餘級俘百餘口王大喜引晟入内同宴極懽有突厥達官來䧏時亦預坐說言突厥之内大畏長孫總管聞其弓聲謂為霹靂見其走馬稱為閃電王笑曰將軍震怒威行域外遂與雷霆為比一何壯哉師旋授上開府儀同三司仁夀元年晟奏曰臣夜登城樓望見磧北有赤氣長百餘里皆如雨足下埀被地講驗兵書此名灑血其下之國必且破亡欲滅匈奴宜在今日詔楊素為行軍元帥晟為受䧏使者送染干北伐二年軍次北河逢賊帥思力俟斤等領兵拒戰晟與大將軍梁黙擊走之轉戰六十里賊衆多䧏晟又敎染干分遣使者往北方鐵勒等部招攜取之三年有鐵勒思結伏具渾斛薛阿拔僕骨等十餘部盡背達頭請來䧏附達頭之衆大潰西奔吐谷渾晟送染干安置于磧石事畢入朝遇髙祖崩煬帝引晟於大行前委以内衙宿衛知門禁事即日拜左領軍將軍遇楊諒作逆勑以本官為相州刺史發山東兵馬與李雄等共經畧之晟辭以子行布在逆地帝曰公終不以兒害義其勿辭也於是馳遣赴相州諒破追還轉武衛將軍大業三年煬帝幸榆林欲出塞外陳兵耀武經突厥中指于涿郡仍恐染干驚懼先遣晟往喻㫖稱述帝意染干聼之因召所部諸國奚霫室韋等種落數十酋長咸萃晟見牙中草穢欲令染干親自除之示諸部落以明威重乃指帳前草曰此根大香染干遽取嗅之曰殊不香也晟曰國家法天子行幸所在諸侯並躬親洒埽耘除御路以表至敬之心今牙中蕪穢謂是留香草耳染干乃悟曰奴罪過奴之骨肉皆天子賜也得効筋力豈敢有辭特以邉人不知法耳頼將軍敎導之遂拔佩刀親自芟草其貴人及諸部落争倣傚之乃發榆林北境至于其牙又東達于薊長三千里廣百餘歩舉國就役而開御道帝聞晟策乃益喜焉後除淮南太守未赴任復為右驍衛將軍五年卒年五十八帝悼惜之後突厥圍鴈門帝歎曰向使長孫晟在不令匈奴至此晟好竒計務立功名性至孝居憂毁瘠為朝士所稱唐貞觀中追贈司空上柱國齊國公諡曰獻少子無忌嗣其長子行布亦多謀畧有父風起家漢王諒庫直後遇諒并州起逆率衆南拒官軍留行布守城遂與豆盧毓閉門拒守諒城陥遇害次子恒安以兄功授鷹揚郎將通志卷一百六十
