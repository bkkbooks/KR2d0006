body:
  text: 通志卷十四宋右廸功郎鄭樵漁仲撰陳紀第十四武帝文帝廢帝宣帝後主高祖武皇帝諱霸先字興國小字法生吳興長城下若里人姓陳氏其本甚微自云漢太邱長實之後也實元孫晉太尉凖凖生匡匡生逹永嘉中南遷為丞相掾太子洗馬出為長城令悦其山水遂家焉嘗謂所親曰此地山川秀麗當有王者興焉二百年後我子孫必鍾斯運逹生康復為丞相掾咸和中土斷故為長城人康生盱台太守英英生尚書郎公弼公弼生歩兵校尉鼎鼎生散騎侍郎高髙生懐安令詠詠生安成太守猛猛生太常卿道巨道巨生皇考文讚帝以梁天監二年癸未嵗生少俶儻有大志長於謀畧意氣雄傑不事生産及長渉獵史籍好讀兵書明緯候孤虛遁甲之術多武藝明逹果斷為當時推服身長七尺五寸日角龍顔埀手過膝嘗游義興館於許氏夢天開數丈有四人朱衣捧日而至納之帝口及覺腹内猶熱帝心獨喜初仕鄉為里司後至建鄴為油庫吏徙為新喻侯蕭映傳教勤於其事為映所賞及映為吳興太守甚重帝謂僚佐曰此人將來逺大必勝於我及映為廣州帝為中直兵參軍隨之鎭映令帝招集士馬先是武林侯蕭諮為交州刺史以嚴刻失和土人李賁連結數州豪傑同時反臺遣髙州刺史孫冏新州刺史盧子雄將兵擊賁冏等不時進皆於廣州伏誅子雄弟子畧與冏子姪及其主帥杜天合杜僧明共舉兵執南江督䕶沈顗進冦廣州晝夜苦攻州中震恐帝率精兵救之賊衆大潰天合死僧明降梁武帝深歎異焉授直閤將軍封新枋縣子仍遣圖帝貎而觀之其年冬蕭映卒明年帝送喪還至大庾嶺會有詔以帝為交州司馬與刺史楊㬓南討帝益招勇敢器械精利㬓委帝經畧時蕭勃為定州刺史於西江相會勃知軍士憚逺役因詭說留㬓㬓集諸將問計帝曰交州叛渙罪由宗室節下奉辭伐罪故當死生以之於是鼓行而進軍次交州㬓推帝為前鋒所向摧䧟賁竄入屈獠洞中屈獠斬賁傳首建鄴是嵗太清元年也賁兄天寳遁入九眞與刼帥李紹隆收餘兵殺徳州刺史陳文戒進圍愛州帝討平之除振逺將軍西江督䕶髙要太守督七郡諸軍事二年冬侯景冦逼帝將赴援廣州刺史元景仲隂將圖帝帝知之與成州刺史王懐明等集兵於南海馳檄以討景仲景仲縊於閤下帝迎蕭勃鎭廣州時臨賀内史歐陽頠監衡州蘭裕蘭京禮扇誘始興等十郡共攻頠頠請援於勃勃令帝救之悉禽裕等仍監始興郡事帝遣杜僧明胡頴將二千人頓于嶺上并厚結始興豪傑同謀義舉侯安都張偲等率衆來附蕭勃聞之遣鍾休悦說停帝帝泣謂休悅曰君辱臣死誰敢愛命僕行計决矣時蔡路飬起兵據南康勃遣腹心譚世逺為曲江令與路飬相結同遏義軍大寳元年正月帝發始興次大庾嶺大破路飬軍進頓南康湘東王繹承制授帝持節明威將軍交州刺史改封南野縣伯於是修理﨑頭古城徙居之劉惠騫等望見恒有紫氣冒城上逺近驚異故惠騫等深自結於帝尋改封長城縣侯南江州刺史時寧都人劉藹等資高州刺史李遷仕舟艦兵仗將襲南康帝遣杜僧明等據白石禦之二年僧明禽遷仕送南康斬之承制授帝江州刺史帝發南康灨石舊有二十四灘灘多巨石行旅以為難帝之發也水暴起數丈三百里間巨石皆沒進軍頓西昌有龍見水濱高五丈五采鮮曜軍人觀者數萬人帝又嘗獨坐胡牀於閤下忽有神光滿閤廊廡之間並得相見趙知禮侍側怪而問帝帝笑不答時承制遣征東將軍王僧辯督衆軍討侯景次盆城帝率杜僧明等合三萬兵會焉時西軍乏食帝先計軍糧五十萬石至是分三十萬石以資之仍頓巴邱會侯景廢簡文立豫章嗣王棟帝遣兼長史沈衮奉表於江陵勸進承制授帝平東將軍揚州刺史領會稽太守三年帝帥師發自豫章二月次桑落洲時僧辯已發盆城會帝于白茅灣乃登岸結壇刑牲盟約進次大雷軍人杜稜夢雷池君周何神自稱征討大將軍乘朱航陳甲仗稱下征侯景須臾便還云已殺景竟三月帝與諸軍進剋姑熟仍次蔡洲侯景登石頭城望官軍之盛不悦曰一把子人何足可打密謂左右曰此軍上有紫氣不易可當乃以舣䑰貯石沈塞淮口緣淮作城自石頭迄青溪十餘里中樓雉相接僧辯遣杜崱問計於帝帝以諸將不敢當鋒請先往立柵即於石頭西横壠築柵衆軍次連八城直出東北賊恐西州路斷亦於東北果林作五城以遏大路帝曰善用兵者如常山之蛇使救首救尾困而無暇今我師既衆賊徒甚寡應分賊兵力以弱制彊乃命諸將分處置兵帝與王琳杜龕等悉力乘之景衆大潰僧辯啓命帝鎭京口五月齊遣將辛術圍嚴超逹於秦郡帝命徐度領兵助其固守齊衆起土山穿地道攻之甚急帝乃自率萬人解其圍振旅南歸承制授帝征北大將軍開府儀同三司南徐州刺史進封長城縣公及王僧辯征陸納於湘州承制命帝代鎭揚州承聖二年湘州平帝旋鎭京口三年三月進帝位司空及魏平江陵帝與王僧辯等進啓請晉安王以太宰承制十二月晉安王至自尋陽入居朝堂給帝班劔二十人四年五月齊送貞陽侯淵明還主社稷王僧辯納之淵明即位改元天成以晉安王為皇太子初齊之納貞陽也帝固爭之以為不可僧辯不見從帝居常憤歎曰嗣主髙祖之孫元皇之子竟有何辜坐致廢黜假立非次此情可知乃密具袍數千領及錦綵金銀以為賞賜之資九月壬寅帝召徐度侯安都周文育等仍部列將士水陸俱進夜發南徐州討王僧辯甲辰帝至石頭前遣勇士自城北踰入時僧辯方視事聞外白有兵遽走帝大兵尋至因風縱火僧辯就禽是夜縊之及其子頠於是廢貞陽侯而奉晉安王即位紹泰元年壬子詔授帝侍中大都督中外諸軍事車騎將軍揚南徐二州刺史持節司空班劔鼓吹並如故仍詔甲仗百人出入殿省霍州刺史杜龕據吳興與義興太守韋載舉兵逆命辛未帝表自東討留髙州刺史侯安都石州刺史杜稜宿衞臺省甲戌軍至義興秦州刺史徐嗣徽據城入齊又要南豫州刺史任約舉兵應龕齊人資其兵食嗣徽乘虛奄至闕下侯安都出戰嗣徽等退據石頭丁丑載及龕從弟北叟來降帝撫而釋之仍以載兄鼎知郡事帝以嗣徽冦逼卷甲還都命周文育進討杜龕十一月己卯齊遣兵五千渡江據姑熟又遣安州刺史翟子崇楚州刺史劉士榮淮州刺史柳逹摩領兵萬人於湖墅度米粟三萬石馬千匹入石頭帝乃遣侯安都領水軍夜襲湖墅燒齊船周鐵虎率舟師斷齊運輸帝領鐵騎自西明門襲之齊人大潰嗣徽留逹摩等守城自率親屬腹心往南州採石以迎齊援先是太白自十一月丙戌不見十二月乙卯出于東方丙辰帝盡命衆軍分部甲卒對冶城立航度兵攻其水南二柵柳逹摩等度淮置陣帝督兵疾戰縱火燒栅煙塵張天齊人大潰盡收其船艦是日嗣徽約等領齊兵還據石頭帝遣侯安都領水軍襲破之嗣徽等單舸脫走丁巳拔石頭南岸柵移度北岸起柵以絶其汲路又堙塞東門故城中諸井齊所據城中無水水一合貿米一升一升米貿絹五匹或炒米食之逹摩謂其衆曰頃在北童謡云石頭擣兩襠擣青復擣黄侯景服青已倒於此今吾徒衣黄豈謡言驗邪庚申逹摩遣侯子欽劉士榮等請和帝許之乃於城外盟約其將士恣其南北辛酉帝出石頭南門陳兵送齊人歸北者及至齊人殺之壬戌齊和州長史烏丸逺自南州奔還歴陽江寧令陳嗣黄門侍郎曹朗據姑熟不從帝命侯安都徐度等討平之聚其首為京觀是月杜龕以城降二年正月癸未誅龕其弟翕從弟北叟司馬沈孝敦並賜死三月戊戌齊遣水軍儀同蕭軌庫狄伏連堯難宗東方老侍中裴英起東廣州刺史獨孤辟惡洛州刺史李希光并任約徐嗣徽王僧愔等衆十萬出柵口向梁山帳内盪主黄叢逆擊破之燒其前軍船艦齊頓軍保蕪湖五月丙申齊兵至秣陵故城己亥帝率宗室王侯及朝臣於大司馬門外白虎闕下刑牲告天以齊人背約發言慷慨涕泗交流士卒觀者益奮辛丑齊軍於秣陵故城跨淮立橋柵引度兵馬癸卯自方山進及兒塘游騎至臺都下震駭帝潛以精卒三千配沈泰度江襲齊行臺趙彦深於𤓰歩獲其舟粟六月甲辰齊兵潛至鍾山龍尾丁未進至莫府山帝遣錢明領水軍出江乗要擊齊人糧道盡獲之齊軍大餒殺馬驢而食之壬子齊軍至元武湖西北莫府山南將據北郊壇衆軍自覆舟東移頓郊壇北與齊人相對其夜大雨震電暴風拔木平地水丈餘齊軍晝夜坐立泥中縣鬲以爨足指皆爛而臺中及潮溝北水退路燥官軍每得番易甲寅少霽是時食盡調市人餽軍皆是麥屑為飯以荷葉裹而分給間以麥䬳兵士皆困會文帝遣送米三千石鴨千頭帝即炊米煮鴨誓申一戰士及防身計糧數臠人人裹飯混以鴨肉帝命衆軍蓐食攻之齊軍大潰執嗣徽及其弟嗣宗斬之以徇虜蕭軌東方老王敬寳李希光裴英起王僧智等將帥四十六人其軍士得竄至江者縛筏以濟中江而溺流屍至京口者彌岸惟任約王僧愔獲免先是童謡云虜萬夫入五湖城南酒家使虜奴自晉宋以後經絓在魏境江淮以北南人皆謂為虜是時以賞俘貿酒者一人裁得一醉丁巳衆軍出南州燒賊舟己未斬劉歸義徐嗣産𫝊野猪于建康市是日解嚴庚申誅蕭軌東方老王敬寳李希光裴英起等太平元年九月壬寅帝進位丞相錄尚書事鎭衛大將軍揚州牧進封義興郡公庚申追贈皇考侍中光祿大夫封義興郡公諡曰恭十月甲戌梁帝勅丞相自今問訊可施别榻以近扆坐二年正月壬寅詔加帝班劔十人并前為三十丁未詔贈皇兄道談南兖州刺史長城縣公諡曰昭烈皇弟休光侍中南徐州刺史武康縣侯諡曰忠壯甲寅遣兼侍中謁者僕射陸繕䇿拜長城縣夫人章氏為義興國夫人丁卯詔贈皇祖侍中太常卿諡曰孝追封皇祖妣許氏吳郡嘉興縣君諡曰敬皇祖妣張氏義興國太夫人諡曰宣二月庚午蕭勃舉兵自廣州度嶺頓南康遣其將歐陽頠傅泰及其子孜為前軍至豫章分屯要險南江州刺史余孝頃起兵應勃帝命周文育侯安都率衆討平之八月甲午帝進位太尉加黄鉞劍履上殿入朝不趨贊拜不名丙申加前後部羽葆鼓吹是時湘州刺史王琳擁兵不應命遣周文育侯安都率衆討之九月辛丑梁帝進帝位相國總百揆以南豫州之陳留南丹揚宣城揚州之吳興東陽新安新寧南徐州之義興江州之鄱陽臨川十郡封帝為陳公備九錫之禮加璽紱逺游冠綠綟綬位在諸侯王上陳國置丞相以下一遵舊式十月戊辰梁帝又進帝爵為王以揚州之會稽臨海永嘉建安南徐州之晉陵信安江州之尋陽豫章安成廬陵并前為二十郡益封陳國其相國揚州牧鎭衛大將軍並如故又命陳王冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲䍐樂儛八佾設鍾虡宫縣王妃王子王女爵命之號陳臺百官一依舊典辛未梁帝勅書禪位于陳遣兼太保尚書左僕射王通兼太尉司徒左長史王瑒奉皇帝璽紱受終之禮一依唐虞故事是日梁帝遜于别宫帝謙讓再三羣臣固請乃許之永定元年冬十月乙亥皇帝即位于南郊升壇柴燎告類上帝先是氛霧雨雪晝夜晦㝠至是日景氣清晏禮畢輿駕還宫臨太極前殿大赦改元賜百姓爵二級文武位三等鰥寡孤獨不能自存者人榖五斛逋租宿責皆勿復收有犯鄉論清議贓汚淫盗者皆洗除先注與之更始其長徒勅繫特皆原之亡官失爵禁錮奪勞一依舊典又詔以江隂郡奉梁主為江隂王行梁正朔車旗服色一依前凖梁皇太后為江隂國太妃皇后為江隂國妃又詔百司各依位攝職丙子幸鍾山祭蔣帝廟戊寅幸華林園覧辭訟臨赦囚徒己卯分遣大使宣勞四方庚辰詔出佛牙於杜姥宅集四部設無遮大會辛巳追尊皇考曰景皇帝廟號太祖皇妣董太夫人曰安皇后前夫人錢氏為昭皇后世子克為孝懐太子立夫人章氏為皇后癸未尊景帝陵曰瑞陵昭皇后陵曰嘉陵依梁初園陵故事立刪定郎刋定律令戊子遷景皇帝神主祔于太廟是月西討都督周文育侯安都於郢州敗績没于王琳十一月丙申封皇兄子長城縣侯蒨為臨川郡王頊襲封始興郡王皇弟子曇朗襲封南康郡王庚申都下火十二月庚辰皇后謁太廟是嵗周閔帝元年及九月冢宰宇文䕶廢閔帝而奉明帝又為明帝元年二年春正月乙未以車騎將軍開府儀同三司侯瑱為司空辛丑祀南郊大赦甲寅遣中書舍人韋鼎䇿吳興楚王神為帝戊午祀明堂二月壬申南豫州刺史沈泰奔齊辛卯詔司空侯瑱總督水陸衆軍以禦齊三月王琳立梁永嘉王蕭莊以奉梁後即位于郢州夏四月甲子祀太廟乙丑江隂王殂陳志也追諡梁敬帝詔太宰弔祭司空監䕶喪事以梁武林侯蕭諮子季卿嗣為江隂王戊辰重雲殿東鴟尾有紫煙屬天五月乙未都下地震壬寅立梁邵陵攜王廟室祭以太牢辛酉帝幸大莊嚴寺捨身壬戌羣臣表請還宫六月己巳詔司空侯瑱領軍將軍徐度討王琳初侯景之平也太極殿被焚承聖中議欲營之獨闕一柱秋七月有樟木大十八圍長四丈五尺流泊陶家後渚監軍鄒子度以聞詔中書令沈衆兼起部尚書搆太極殿八月周文育侯安都等於王琳所逃歸自劾廷尉即日引見宥之並復本官丁亥加江州刺史周廸平南將軍開府儀同三司冬十月庚午遣鎭南將軍周文育都督衆軍出豫章討余孝勱乙亥幸莊嚴寺發金光明經題丁酉加髙州刺史黄法氍平南將軍開府儀同三司十二月甲子幸大莊嚴寺設無碍大會捨乗輿法物羣臣備法駕奉迎即日還宫丙戌加北江州刺史熊曇朗平西將軍開府儀同三司三年春正月丁酉鎭南將軍廣州刺史歐陽頠即本號開府儀同三司是夜大雪及旦太極殿前有龍跡見甲子廣州言仙人見于羅浮山寺小石樓二月辛酉加平西將軍桂州刺史淳于量鎭西大將軍開府儀同三司夏閏四月甲午詔依前代置西省學士兼取伎術士是時久不雨丙午幸鍾山祭蔣帝廟是日降雨迄于月晦五月丙辰朔日有食之有司奏舊儀帝御前殿服朱紗袍通天冠詔曰此乃前代承用意有未同合朔仰助太陽宜偹衮冕之服自今永可為凖丙子扶南國遣使朝貢乙酉北江州刺史熊曇朗殺都督周文育舉兵反王琳遣其將常衆愛曹慶率兵援余孝勱六月戊子儀同侯安都敗衆愛等於左里獲琳從弟襲主帥羊暕等四十餘人衆愛遁走庚寅廬山人斬之傳首建鄴甲午衆軍凱歸丁酉帝不豫遣兼太宰尚書右僕射王通以疾告太廟兼太宰中書令謝哲告太社南北郊辛丑帝小瘳故司空周文育之柩至自建昌壬寅帝素服哭于朝堂哀甚癸卯上臨訊獄訟是夜熒惑在天尊上疾甚丙午帝崩于璿璣殿時年五十七遺詔追臨川王蒨入纘大業甲寅殯于太極殿西階八月甲午羣臣上諡曰武皇帝廟號髙祖丙申葬萬安陵帝雄武多英畧性甚仁愛及居阿衡恒崇寛簡雅尚儉素常膳不過數品私饗曲宴皆瓦器蜯盤肴核庶羞裁令充足不為虛費初平侯景及立敬帝子女玉帛皆班將士其充闈房者衣不重采飾無金翠聲樂不列於前踐阼之後彌厲恭儉故能隆功茂徳光于江左云武帝永定三年世祖文皇帝諱蒨字子華始興昭烈王之長子也少沈敏有識量美容儀留意經史武帝甚愛之常稱吾家英秀梁太清初帝夢兩日鬭一大一小大者光滅墜地色正黄其大如斗帝三分取一懐之侯景之亂避難臨安縣郭文舉舊宅及武帝舉兵南下景遣吳興太守信都遵收帝及衡陽獻王出都帝乃密袖小刀侯見景欲圖之及至以付郎中王翻幽守故其事不遂武帝圍石頭景欲加害者數矣會景敗乃得出起家吳興太守武帝之討王僧辯也先召帝與謀時僧辯壻杜龕據吳興兵衆甚盛武帝密令帝還長城立柵偹之龕遣將杜泰乗虛掩至將士相視失色帝言笑自若部分益明於是衆心乃定及武帝遣周文育討龕帝遣將軍劉騰蔣元舉攻下龕拜會稽太守武帝受禪立為臨川王夢梁武帝以寳刀授已周文育侯安都之敗於沌口武帝詔帝入總軍政尋命率兵城南皖永定三年六月丙午武帝崩皇后稱遺詔徴帝入纂皇統甲寅至自南皖入居中書省皇后令帝嗣膺寳籙帝辭讓至于再三公卿固請其日即皇帝位於太極前殿大赦詔州郡悉停奔赴秋七月丙辰尊皇后為皇太后辛酉以司空侯瑱為太尉以南豫州刺史侯安都為司空以南徐州刺史徐度為侍中中撫軍將軍開府儀同三司乙丑重雲殿災八月庚戌立皇子伯茂為始興王奉昭烈王後徙封始興嗣王頊為安成王九月辛酉立皇子伯宗為皇太子王公以下賜帛各有差乙亥立妃沈氏為皇后冬十月甲子齊文宣帝殂十一月乙卯王琳冦大雷詔太尉侯瑱司空侯安都儀同徐度禦之是嵗周明帝改天王稱皇帝復建年號曰武成元年天嘉元年春正月癸丑大赦改元詔賜鰥寡孤獨不能自存者人粟五斛孝悌力田殊行異等加爵一級甲寅分遣使者宣勞四方辛酉祀南郊詔賜民爵一級二月丙申太尉侯瑱敗王琳于梁山敗齊兵于博望禽齊將劉伯球王琳及其主蕭莊奔齊庚子分遣使者齎璽書宣勞四方乙巳遣太尉侯瑱鎭盆城庚戌立武帝第六子昌為衡陽王三月丙辰蕭莊所署郢州刺史孫瑒舉州内附丁巳江州刺史周廸平南中斬賊帥熊曇朗傳首建鄴戊午齊軍棄魯山城走詔南豫州刺史程靈洗守之丙子衡陽王昌沈于江夏四月丁亥立皇子伯信為衡陽王奉獻王後辛丑周明帝崩六月辛巳改諡皇祖妣景安皇后曰景文皇后壬辰詔改葬梁元帝於江寧舊塋車旗禮章悉同梁典仍依魏葬漢獻帝故事甲午追䇿故始興昭烈王妃曰孝妃辛丑國哀周忌上臨于太極前殿百僚陪哭赦建鄴殊死以下秋七月丙辰立皇子伯山為鄱陽王八月壬午齊孝昭帝廢其主殷而自立戊子詔非兵器及國家所須金銀珠玉衣服雜玩悉皆禁斷丁酉幸正陽堂閱武九月癸丑彗星見乙卯周將獨孤盛領水軍趣巴湘與賀若敦水陸俱進太尉侯瑱自尋陽禦之冬十月癸巳侯瑱襲破獨孤盛於楊葉洲盛登岸築城自保丁酉詔司空侯安都率衆會侯瑱南拒周軍十二月己亥周巴陵城主尉遲憲降庚子獨孤盛潛遁走二年春正月庚戌大赦辛未周湘州城主殷亮降湘州平二月庚寅曲赦湘州諸郡三月乙卯大尉湘州刺史侯瑱薨夏六月己亥齊人通好秋七月丙午周將賀若敦遁歸武陵天門南平義陽河東宜都郡悉平九月甲寅詔以故太尉侯瑱故司空周文育故開府儀同三司杜僧明故中䕶軍胡頴故領軍陳擬配食武帝廟庭冬十月癸丑霍州西山蠻率部内屬乙卯高麗國遣使朝貢十一月甲辰齊孝昭帝殂十二月甲申立始興國廟于都下用王者禮以國用不足立煑海鹽賦及榷酤科先是縉州刺史留異應王琳丙戍詔司空侯安都討之是嵗周武帝保定元年三年春正月庚戌設帷宫於南郊幣告胡公以配天辛亥祀南郊詔賜民爵一級孝悌力田加一等二月梁宣帝殂閏月己酉以百濟王餘明為撫東大將軍髙麗王髙陽為寧東將軍江州刺史周廸舉兵應留異甲子改鑄五銖錢三月丙子安成王頊至自周丁丑以安右將軍吳明徹為安南將軍江州刺史督衆軍南討甲申大赦庚寅司空侯安都破留異於桃枝嶺異奔晉安東陽郡平夏四月癸卯曲赦東陽郡乙巳齊人來聘秋七月己丑皇太子納妃王氏在位文武賜帛各有差孝悌力田為父後者賜爵二級九月戊辰朔日有食之以侍中到仲舉為尚書右僕射丁酉周廸請降四年春正月丙子于陁利國遣使朝貢甲申周廸走投閩州刺史陳寳應納之夏四月辛丑設無碍大會捨身於太極前殿乙卯加驃騎將軍揚州刺史安成王頊開府儀同三司六月癸巳司空侯安都賜死秋九月壬戌開府儀同三司廣州刺史歐陽頠薨癸亥曲赦都下辛未周廸復冦臨川詔護軍將軍章昭逹討平之冬十月丙申大赦詔昭逹進軍建安討陳寳應五年春三月壬午詔以䕶軍將軍周鐵虎配食武帝廟庭夏五月周齊並遣使來聘秋七月丁丑曲赦都下九月城西城冬十一月己丑章昭逹禽陳寳應留異送建鄴晉安郡平甲辰以䕶軍將軍章昭逹為鎭軍將軍開府儀同三司十二月甲子曲赦建安晉安二郡討陳寳應將士死王事者並給棺槥送還本鄉并復其家癸未齊人來聘六年春正月甲午皇太子加元服王公以下賜帛各有差孝悌力田為父後者賜爵一級鰥寡孤獨不能自存者榖人五斛夏四月甲寅以開府儀同三司揚州刺史安成王頊為司空五月齊武成帝傳位於太子緯自稱太上皇帝六月辛酉彗星見于上台北周人來聘秋七月癸未有大風自西南至廣百餘歩激壊靈臺候樓甲申儀賢堂無故自壊丙戌臨川太守駱牙斬周廸傳首建鄴梟於朱雀航八月己卯立皇子伯固為新安王伯恭為晉安王伯仁為廬陵王伯義為江夏王九月新作大航冬十月辛亥齊人來聘十二月乙卯立皇子伯禮為武陵王癸亥曲赦都下天康元年春二月丙子大赦改元三月己卯以司空安成王頊為尚書令夏四月乙卯皇孫至澤生賜在位文武帛各有差為父後者賜爵一級癸酉皇帝崩于有覺殿遺詔皇太子可即君臨萬國山陵務在儉速大歛竟羣臣三日一臨公除之制率依舊典六月甲子羣臣上諡曰文皇帝廟號世祖丙寅葬永寧陵文帝起自布衣知百姓疾苦國家資用務存儉約妙識眞偽下不容姦一夜内刺閨取外事分判者輙前後相續每雞人伺漏傳籖於殿中者令投籖於階石上鎗然有聲云吾雖得眠亦令驚覺其自彊若此云文帝天嘉六年天康一年即位七年廢帝諱伯宗字奉業小字藥王文帝嫡長子也梁承聖三年五月庚寅生永定二年二月戊辰拜臨川王世子三年文帝嗣位八月庚戌立為皇太子自梁室亂離東宫焚燼太子居于永福省天康元年四月癸酉文帝崩是日太子即皇帝位于太極前殿大赦詔内外文武各復其職逺方悉停奔赴五月己卯尊皇太后曰太皇太后皇后曰皇太后庚寅以司空揚州刺史新除尚書令安成王頊為司徒錄尚書都督中外諸軍事丁酉以中軍大將軍開府儀同三司徐度為司空以鎮東將軍東揚州刺史始興王伯茂為征東將軍開府儀同三司以吏部尚書袁樞為尚書左僕射以吳興太守沈欽為右僕射秋七月丁酉立妃王氏為皇后冬十月庚申享太廟十一月乙亥周人來弔十二月甲子髙麗國遣使朝貢是嵗周天和元年光大元年春正月癸酉尚書左僕射袁樞卒乙亥大赦改元賜孝悌力田爵一級辛卯祀南郊二月辛亥南豫州刺史余孝頃謀反伏誅三月甲午以尚書右僕射沈欽為侍中尚書僕射夏五月乙未湘州刺史華皎不從執政丙申以中撫軍大將軍淳于量為征南大將軍總舟師討之六月壬寅以中軍大將軍司空徐度為車騎將軍總督都下衆軍自歩道襲湘州秋七月戊申立皇子至澤為皇太子賜天下為父後者爵一級王公以下賚帛各有差九月丙辰百濟國遣使朝貢是月周將拓拔定入郢州與華皎水陸俱進都督淳于量吳明徹等大破之皎單舸奔江陵禽定送建鄴冬十月辛巳曲赦湘巴二州為皎所詿誤者十一月甲子中權將軍開府儀同三司王沖薨十二月庚寅以儀同三司兼從事中郎孔英哲為奉聖亭侯奉孔子祀二年春正月己亥司徒安成王頊進位太傅領司徒加殊禮以新除征南大將軍淳于量為中軍大將軍及安南將軍湘州刺史吳明徹即本號並開府儀同三司庚子詔討華皎軍人死王事者並給棺槥送還本鄉仍復其家甲子司空徐度薨夏五月丙辰太傅安成王頊獻玉璽一六月丁亥彗星見秋七月戊申新羅國遣使朝貢壬戌立皇弟伯智為永陽王伯謀為桂陽王九月林邑狼牙修國並遣使朝貢冬十一月甲寅慈訓太后下令暴帝過失廢為臨海王送還藩邸令乗輿迎太傅安成王入即位是日帝出居别第太建二年四月乙卯薨時年十九帝性仁弱無君人之器及即尊位刑政皆歸冢宰故皇太后稱文帝遺志而廢焉廢帝光大二年高宗孝宣皇帝諱頊字紹世小字師利始興昭烈王第二子也梁中大通二年七月辛酉生有赤光滿室少寛容多智畧及長美容儀身長八尺三寸埀手過膝有勇力善騎射武帝平侯景鎭京口梁元帝徴武帝子姪入侍武帝遣帝赴江陵累官為中書侍郎時有軍主李總與帝有舊每同游處帝嘗夜被酒張燈而寐總適出尋反乃見帝身是大龍便驚走他室魏平江陵遷于長安帝貌若不慧魏將楊忠門客張子煦見而竒之曰此人虎頭當大貴也永定元年遥襲封始興郡王文帝嗣位改封安成王天嘉三年自周還授侍中中書監中衞將軍置佐吏歴位司空尚書令廢帝即位拜司徒錄尚書都督中外諸軍事光大二年正月進位太傅領司徒加殊禮劔履上殿十一月甲寅慈訓太后黜廢帝為臨海王以帝入纂皇統是月齊武成帝殂太建元年春正月甲午皇帝即位於太極前殿大赦改元文武賜位一階孝悌力田及為父後者賜爵一級鰥寡不能自存者人賜榖五斛復太皇太后尊號曰皇太后立妃柳氏為皇后世子叔寳為皇太子封皇子江州刺史康樂侯叔陵為始興王奉昭烈王祀乙未謁太廟丁酉分命大使觀省四方風俗以尚書僕射沈欽為左僕射度支尚書王勱為右僕射辛丑祀南郊壬寅封皇子建安侯叔英為豫章王豐城侯叔堅為長沙王二月乙亥耕籍田夏五月甲午齊人來聘丁巳以吏部尚書徐陵為尚書右僕射秋七月辛卯皇太子納妃沈氏王公以下賜帛各有差冬十月新除左衞將軍歐陽紇據廣州反辛未遣開府儀同三司章昭逹討之二年春二月癸未章昭逹禽歐陽紇送都斬于建康市廣州平三月丙申皇太后崩丙午曲赦廣衡二州丁未大赦又詔自討周廸華皎以來兵所有死亡者並令收歛并給棺槥送還本鄉夏四月乙卯臨海王伯宗薨戊寅皇太后祔葬于萬安陵五月壬午齊人來弔六月戊子新羅國遣使朝貢辛卯大雨雹乙巳分遣大使廵州郡省寃屈冬十一月辛酉髙麗國遣使朝貢十二月癸巳雷三年春正月癸丑以尚書右僕射徐陵為尚書僕射辛酉祀南郊二月辛巳祀明堂丁酉耕籍田三月丁丑大赦夏四月壬辰齊人來聘五月辛亥髙麗新羅丹丹天竺盤盤等國並遣使朝貢六月丁亥江隂王蕭季卿以罪免甲辰封東中郎將長沙王府諮議參軍蕭彜為江隂王冬十月乙酉周人來聘十二月壬辰司空章昭逹薨四年春正月丙午以尚書僕射徐陵為左僕射中書監王勱為右僕射二月乙酉立皇子叔卿為建安王三月乙丑扶南林邑國並遣使朝貢夏五月癸卯尚書右僕射王勱卒是月周人誅冢宰宇文䕶秋八月辛未周人來聘九月庚子朔日有食之辛未大赦丙寅以故太尉徐度儀同三司杜稜程靈洗配食武帝廟庭故司空章昭逹配食文帝廟庭冬十一月己亥地震是嵗周建徳元年五年春正月癸酉以吏部尚書沈君理為尚書右僕射領吏部辛巳祀南郊二月辛丑祀明堂乙卯夜有白氣如虹自北方貫北斗紫宫三月壬午以開府儀同三司吳明徹都督征討諸軍事畧地北邊丙戌西衡州獻馬生角己丑皇孫允生内外文武賜帛各有差為父後者賜爵一級夏六月癸卯周人來聘秋九月癸未尚書右僕射沈君理卒壬辰晦夜明冬十月己亥以特進周𢎞正為尚書右僕射乙巳吳明徹剋夀陽城斬王琳傳首建鄴梟于朱雀航十二月壬辰詔熊曇朗留異陳寳應周廸鄧緒等及王琳首並還親屬以𢎞廣宥乙巳立皇子叔明為宜都王叔獻為河東王是嵗諸軍畧地所在剋㨗六年春正月壬戌赦江右淮北諸州甲申周人來聘高麗國遣使朝貢二月壬辰朔日有食之辛亥耕籍田夏四月庚子彗星見六月壬辰尚書右僕射周𢎞正卒冬十一月乙亥詔北邊行軍之所並給復十年十二月戊戌以吏部尚書王瑒為尚書右僕射七年春正月辛未祀南郊三月辛未詔豫二兖譙徐合霍南司定九州及南豫江郢所部在江北諸郡置雲旗義士駐大軍及諸鎮備防夏四月丙戌有星孛于大角庚寅監豫州陳桃根獻青牛詔以還百姓乙未桃根又上織成羅紋錦被表各二詔於雲龍門外焚之壬子郢州獻瑞鍾六六月丙戌詔為北行將士死王事者剋日舉哀壬辰以尚書右僕射王瑒為尚書僕射乙酉改作雲龍神虎門秋八月癸卯周人來聘閏九月壬辰都督呉明徹大破齊軍於吕梁是月甘露頻降樂游苑丁未輿駕幸苑採甘露宴羣臣詔於苑龍舟山立甘露亭冬十月己巳立皇子叔齊為新蔡王叔文為晉熙王十二月壬戌以尚書僕射王瑒為左僕射太子詹事陸繕為右僕射甲子南康郡獻瑞鍾一八年春二月壬申以開府儀同三司吳明徹為司空夏五月庚寅尚書左僕射王瑒卒六月甲寅以尚書右僕射陸繕為左僕射新除晉陽太守王克為右僕射秋九月戊戌立皇子叔彪為淮南王九年春正月乙亥齊主傳位於其太子恒自號太上皇是月周滅齊二月壬子耕籍田秋七月己卯百濟國遣使朝貢庚辰大雨震萬安陵華表己丑震慧日寺刹及瓦宫寺重門一女子震死冬十月戊午司徒吳明徹破周將梁士彦於吕梁十二月戊申東宫成皇太子移于新宫十年春二月甲子周軍救梁士彦大敗司空吳明徹於吕梁及將卒皆見囚俘不反三月辛未震武庫丙子分命衆軍以備周乙酉大赦夏四月庚戌詔絓在軍者並賜爵二級又詔御府堂署所營造禮樂儀服軍器之外悉皆停息掖庭常供王侯妃主諸有奉䘏者並各量減庚申大雨雹六月丁酉周武帝殂閏六月丁卯大雨震大皇寺刹莊嚴寺露盤重陽閣東樓千秋門内槐樹及鴻臚府門秋七月戊戌新羅國遣使朝貢八月戊寅隕霜殺稻菽九月乙巳立方明壇于婁湖戊申以揚州刺史始興王叔陵兼王官伯臨盟甲寅幸婁湖臨誓衆乙卯分遣大使以盟誓班下四方以上下相警冬十月戊子以尚書左僕射陸繕為尚書僕射十二月乙亥合州廬江蠻田伯興出冦樅陽刺史魯廣逹討平之是嵗周宣政元年十一年春正月丁酉南兖州言龍見二月癸亥耕籍田秋七月辛卯初用大貨六銖錢八月丁卯幸大壯觀閱武冬十月甲戌以尚書僕射陸繕為尚書左僕射以祠部尚書晉安王伯恭為右僕射十一月辛卯大赦戊戌周將梁士彦圍壽陽剋之辛亥又剋霍州癸丑以揚州刺史始興王叔陵為大都督總督水歩衆軍十二月乙丑南北兖晉三州及盱台山陽陽平馬頭秦歴陽沛北譙南梁等九郡民並自拔向建鄴周又剋譙北徐二州自是淮南之地盡歸于周矣己巳詔非軍國所須多所減損歸于儉約是嵗周宣帝大象元年十二年夏四月癸亥尚書左僕射陸繕卒己卯大雩壬午雨五月癸巳以尚書右僕射晉安王伯恭為尚書僕射己酉周宣帝崩六月壬戌大風吹壊臯門中閫秋八月己未周鄭州總管司馬消難以所統九州八鎭之地來降詔因以消難為大都督加司空封隨郡公庚申詔鎭西將軍樊毅進督沔漢諸軍事遣南豫州刺史任忠率衆趨歴陽超武將軍陳慧紀為前軍都督趨南兖州戊辰以司空司馬消難為大都督水陸諸軍事庚午通直散騎常侍淳于陵剋臨江郡癸酉智武將軍魯廣逹剋郭黙城甲戌大雨霖丙子淳于陵剋祏州城九月癸未周臨江太守劉顯光率衆來降是夜天東南有聲如風水相激三夜乃止丁亥周將王延貴率衆拔歴陽任忠擊破之禽延貴等己酉周廣陵義軍主曹藥率衆來降冬十月癸丑大雨震電十二月庚辰南徐州刺史河東王叔獻薨十三年春正月壬午以中權將軍䕶軍將軍鄱陽王伯山即本號開府儀同三司以尚書僕射晉安王伯恭為左僕射吏部尚書袁憲為右僕射二月乙亥耕籍田秋九月癸未夜大風從西北來發屋拔樹大雨雹冬十月壬寅丹丹國遣使朝貢十二月辛巳彗星見西南是嵗周靜帝大定元年遜位于隋文帝改元開皇元年十四年春正月乙酉上弗豫甲寅崩于宣福殿時年五十三遺詔凡厥終制事從省約金銀之飾不以入壙明器皆用瓦以日易月及公除之制悉依舊凖在位百司三日一臨四方州鎭五等諸侯各守所職並停奔赴二月辛卯羣臣上諡曰孝宣皇帝廟號髙宗癸巳葬顯寧陵帝之在田本有恢𢎞之度及居尊位實允天人之屬于時國歩初彌創痍未復淮南之地並入于齊帝志復舊境惟彊弱之形縣絶故深自懲艾恐犯不韙及夫周兵滅齊乗勝畧地還至江際帝自此懼矣既而修飾都城為扞禦之備獲銘云二百年後當有癡人修破吾城者時莫測所從云孝宣帝太建十四年後主諱叔寳字元秀小字黄奴宣帝嫡長子也梁承聖二年十一月戊寅生于江陵明年魏平江陵宣帝遷于長安留後主於穰城天嘉三年歸建鄴立為安成王世子光大二年累遷侍中大建元年正月甲午立為皇太子十四年正月甲寅宣帝崩乙卯始興王叔陵搆逆伏誅丁巳太子即皇帝位于太極前殿大赦在位文武及孝悌力田為父後者並賜爵一級孤老鰥寡不能自存者賜榖人五斛帛二疋癸亥以侍中丹楊尹長沙王叔堅為驃騎將軍開府儀同三司揚州刺史乙丑尊皇后為皇太后丁卯立皇弟叔敦為始興王奉昭烈王祀己巳立妃沈氏為皇后辛未立皇弟叔儼為尋陽王叔愼為岳陽王叔達為義陽王叔熊為巴山王叔虞為武昌王甲戌設無碍大會於太極前殿三月癸亥詔内外衆官九品以上各薦一人又詔求忠讜無所𨼆諱己巳以新除翊左將軍永陽王伯智為尚書僕射夏四月丙申立皇子永康公允為皇太子賜天下為父後者爵一級王公以下賚帛各有差庚子詔鏤刻金銀一切華綵之屬及布帛短狹輕疎者並傷財廢業尤成蠹患又僧尼道士挾邪左道不依經律人間淫祀祅書諸珍怪事詳為條制並皆禁絶秋七月辛未大赦是月自建鄴至荆州江水色赤如血八月癸未天有聲如風水相激乙酉夜又如之九月丙午設無碍大會於太極前殿捨身及乗輿御服大赦辛亥夜天東北有聲如蟲飛漸移西北丙寅以驃騎將軍開府儀同三司揚州刺史長沙王叔堅為司空征南將軍江州刺史豫章王叔英即本號開府儀同三司至徳元年春正月壬寅大赦改元以江州刺史豫章王叔英為驃騎將軍開府儀同三司以司空揚州刺史長沙王叔堅為江州刺史征東將軍開府儀同三司癸卯立皇子深為始安王秋八月丁卯以驃騎將軍開府儀同三司長沙王叔堅為司空九月丁巳天東南有聲如蟲飛冬十月丁酉立皇弟叔平為湘東王叔敖為臨賀王叔宣為山陽王叔穆為西陽王叔儉為南安王叔澄為南郡王叔興為沅陵王叔韶為樂山王叔純為新興王十二月丙辰頭和國遣使朝貢司空長沙王叔堅有罪免戊午夜天開自西北至東南其内有青黄雜色隆隆若雷聲二年春正月丁卯分遣大使廵省風俗癸巳大赦夏五月戊子以吏部尚書江總為尚書僕射秋七月壬午皇太子加元服在位文武賜帛各有差孝悌力田為父後者賜爵一級鰥寡癃老不能自存者人榖五斛冬十一月丙寅大赦是月盤盤百濟國並遣使朝貢三年春正月戊午朔日有食之庚午鎭左將軍長沙王叔堅即本號開府儀同三司三月辛酉前豐州刺史章大寳舉兵反夏四月庚戌豐州義軍主陳景詳斬大寳傳首建鄴冬十月己丑丹丹國遣使朝貢十一月己未詔修復仲尼廟辛巳幸長干寺大赦十二月癸卯髙麗國遣使朝貢是嵗梁明帝殂四年春正月甲寅詔王公以下各薦所知無隔輿皁二月丙申立皇弟叔謨為巴東王叔顯為臨江王叔坦為新會王叔隆為新寧王夏五月丁巳立皇子莊為會稽王秋九月甲午幸元武湖肄艫艦閱武丁未百濟國遣使朝貢冬十月癸亥以尚書僕射江總為尚書令吏部尚書謝伷為尚書僕射十一月己卯大赦禎明元年春正月戊寅大赦改元乙未地震秋九月庚寅梁太傅安平王蕭巖荆州刺史蕭瓛遣其都官尚書沈君公詣荆州刺史陳紀請降辛卯巖等帥其文武官男女濟江甲午大赦冬十二月丙子以蕭巖為平東將軍開府儀同三司東揚州刺史丁亥以驃騎大將軍開府儀同三司豫章王叔英為兼司徒十二月丙辰以前鎭衞大將軍開府儀同三司東揚州刺史鄱陽王伯山為鎭衛大將軍開府儀同三司二年春正月辛巳立皇子恮為東陽王恬為錢唐王夏四月戊申有羣䑕無數自蔡洲岸入石頭渡淮至于青塘兩岸數日自死随流出江是月郢州南浦水黑如墨五月甲午東冶鑄鐵有物赤色大如數升自天墜鎔所有聲隆隆如雷鐵飛出牆外燒人家六月戊戌扶南國遣使朝貢庚子廢皇太子允為吳興王立揚州刺史始安王深為皇太子辛丑以太子詹事袁憲為尚書僕射丁巳大風自西北激濤水入石頭城淮渚暴溢漂沒舟乗冬十月己亥立皇子藩為吳王己酉幸莫府山大校獵十一月丁卯詔剋日於大政殿訊獄丙子立皇弟叔榮為新昌王叔匡為太原王初隋文帝受周禪甚敦鄰好宣帝尚不禁侵掠太建末隋兵大舉聞宣帝崩乃命班師遣使赴弔修敵國之禮書稱姓名頓首而後主益驕書末云想彼統内如宜此宇宙清泰隋文帝不説以示朝臣清河公楊素素以為主辱臣死再拜請罪及襄邑公賀若弼並奮求致討後主使袁彦聘隋竊圖隋文帝狀以歸後主見之大駭曰吾不欲見此人每遣間諜隋文帝皆給衣馬禮遣以歸後主愈驕不虞外難荒于酒色不恤政事左右嬖佞珥貂者五十人婦人美貎麗服巧態以從者千餘人常使張貴妃孔貴人等八人夾坐江總孔範等十人豫宴號曰狎客先令八婦人襞采箋製五言詩十客一時繼和遲則罰酒君臣酣飲從夕達旦以此為常而盛修宫室無時休止稅江稅市徴取百端刑罰酷濫牢獄常滿覆舟山及蔣山栢林冬月常多采醴後主以為甘露之瑞前後災異甚多有神自稱老子游於都下與人對語而不見形言吉凶多驗得酒輙釂之經三四年乃去船下有聲云明年亂視之得嬰兒長三尺而無頭蔣山衆鳥鼓兩翼以拊膺曰柰何帝柰何帝又建鄴城無故自壊青龍出建陽門井涌霧赤地生黑白毛大風拔朱雀門臨平湖草舊塞忽然自通後主又夢黄衣圍城乃盡去繞城橘樹又見大蛇中分首尾各走夜中索飲忽變為血有血霑階至於坐牀頭而火起有狐入其牀下捕之不見以為祅乃自賣於佛寺為奴以禳之於郭内大皇佛寺起七層塔未畢火從中起飛至石頭燒死者甚衆又采木湘州擬造正寢栰至牛渚磯盡沒水中既而漁人見栰浮於海上又起齊雲觀國人歌曰齊雲觀冦來無際畔始北齊末諸省官人多稱省主未幾而滅至是舉朝亦有此稱識者以為省主主將見省之兆隋文帝謂僕射髙熲曰我為百姓父母豈可限一衣帶水不拯之乎命大作戰船人請宻之隋文帝曰吾將顯行天誅何宻之有使投柹于江若彼能改吾又何求及納梁蕭瓛蕭巖隋文帝愈憤以晉王廣為元帥總十八總管致討乃送璽書暴後主二十惡又散遣詔書書三十萬紙徧喻江外諸軍既下江濱鎭戍相繼奏聞新除湘州刺史施文慶中書舍人沈客卿掌機宻並抑而不言初蕭巖蕭瓛之至也德教學士沈君道夢殿前長人朱衣虎冠頭出欄上攘臂怒曰那忽受叛蕭誤人事後主聞之忌二蕭故逺散其衆以巖為東揚州刺史瓛為吳州刺史使領軍任忠出守吳興郡以襟帶二州使南平王嶷鎭江州永嘉王彦鎭南徐州尋召二王赴期明年元會命緣江諸防船艦悉從二王還都以示威勢由是江中無一鬭船上流諸州兵皆阻楊素軍不得至都下甲士尚十餘萬人及聞隋軍臨江後主曰王氣在此齊兵三度來周兵再度至無不摧没虜今來者必自敗孔範亦言無度江理但奏伎縱酒作詩不輟三年春正月乙丑朔朝會大霧四塞入人鼻皆辛酸後主昏睡至晡時乃罷是日隋將賀若弼自北道廣陵濟韓擒虎趨横江濟分兵晨襲采石取之進拔姑熟次於新林時弼攻下京口縁江諸戌望風盡走弼分兵斷曲阿之衝而入丙寅采石戌主徐子建至告變戊辰乃下詔曰犬羊陵縱侵竊郊畿蠭蠆有毒宜時掃定朕當親御六師廓清八表内外並可戒嚴於是以蕭摩訶為皇畿大都督樊猛為上流大都督樊毅為下流大都督司馬消難施文慶並為大監軍重立賞格分兵鎭守要害僧尼道士盡皆執役庚午賀若弼攻䧟南徐州辛未韓擒虎又䧟南豫州隋軍南北道並進辛巳賀若弼進軍鍾山頓白土岡之東南衆軍敗績弼乗勝進軍宫城燒北掖門是時韓擒虎率衆自新林至石子岡鎭東大將軍任忠出降擒虎仍引擒虎經朱雀航趣宫城自南掖門入城内文武百司皆遁出唯尚書僕射袁憲後閤舍人夏侯公韻侍側憲勸端坐殿上正色以待之後主曰鋒刃之下未易可當吾自有計乃逃於井二人苦諫不從以身蔽井後主與爭乆之方得入沈后居處如常太子深年十五閉閤而坐舍人孔伯魚侍焉戎士叩閤而入深安坐勞之曰戎旅在途不至勞也既而軍人窺井而呼之後主不應欲下石乃聞呌聲以繩引之驚其太重及出乃與張貴妃孔貴人三人同乗而上隋文帝聞之大驚開府鮑宏曰東井上於天文為秦今帝都所在投井其天意邪先是江東謡多唱王獻之桃葉辭云桃葉復桃葉度江不用檝但度無所苦我自接迎汝及晉王廣軍於六合鎭其山名桃葉果乗陳船而度丙戌晉王廣入據臺城送後主于東宫三月己巳後主與王公百司同發自建鄴之長安隋文帝權分京城人宅以俟内外修整遣使迎勞之陳人謳詠忘其亡焉使還奏言自後主以下大小在路五百里纍纍不絶隋文帝嗟嘆曰一至於此及至京師列陳之輿服器物於庭引後主於前及前後二太子諸父諸弟衆子之為王者凡二十八人司空司馬消難尚書令江總僕射袁憲驃騎蕭摩訶䕶軍樊毅中領軍魯廣達鎭軍將軍任忠吏部尚書姚察侍中中書令蔡徴左衞將軍樊猛自尚書郎以上二百餘人文帝使納言宣詔勞之次使内史令宣詔讓後主後主伏地屏息不能對乃見宥隋文帝詔陳武文宣三帝陵總給五百戸分守之初武帝始即位其夜奉朝請史普直宿省夢有人自天而下導從數十至太極殿前北靣執玉䇿金字曰陳氏五帝三十二年及後主在東宫時有婦人突入唱曰畢國主有鳥一足集其殿庭以觜畫地成文曰獨足上髙臺盛草變成灰欲知我家處朱門當水開解者以為獨足蓋指後主獨行無衆盛草言荒穢隋承火運草得火而灰及至京師與其家屬館於都水臺所謂上髙臺當水也其言皆驗或言後主名叔寳反語為少福亦敗亡之徴云既見宥隋文帝給賜甚厚數得引見班同三品每預宴恐致傷心為不奏吳音後監守者奏言叔寳云既無秩位每預朝集願得一官號隋文帝曰叔寳全無心肝監者又言叔寳常沉醉罕有醒時隋文帝使節其酒既而曰任其性不爾何以過日未幾帝又問監者叔寳所嗜對曰嗜驢肉問飲酒多少對曰與其子弟日飲一石隋文帝大驚及從東廵登芒山侍飲賦詩曰日月光天徳山河壯帝居大平無以報願上東封書并表請封禪隋文帝優詔謙讓不許後從至仁夀宫常侍宴及出隋文帝目之曰此敗豈不由酒將作詩功夫何如思安時事當賀若弼度京口彼人密啓告急叔寳為飲酒遂不省之髙熲至日猶見啓在牀下未開封此亦是可笑蓋天亡也昔苻氏所征得國皆榮貴其主茍欲求名不知違天命與之官乃違天也隋文帝以陳氏子弟既多恐京下為過皆分置諸州縣每嵗賜以衣服以安全之後主以隋仁夀四年十一月壬子終於洛陽時年五十二贈大將軍封長城縣公諡曰煬葬河南洛陽之芒山後主至徳四年禎明二年即位六年右陳五主凡三十三年為隋所滅通志卷十四
