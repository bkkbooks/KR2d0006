body:
  text: 通志卷八十九宋右迪功郎鄭樵漁仲撰列傳第二春秋周富辰王孫滿劉康公單襄公太子晉單穆公魯衆仲申繻公子彄臧孫達臧孫辰臧孫許臧孫紇公子遂公子季友季孫行父季孫宿季孫意如季孫斯季孫肥叔孫得臣叔孫豹叔孫婼叔孫州仇仲孫榖難仲孫蔑仲孫速仲孫羯仲孫貜仲孫何忌子服椒子服何曹劌展喜子家羈陽虎周富辰周大夫也襄王十三年鄭人伐滑王使伯服遊孫伯如鄭請滑鄭人不聼王命而執二子王怒將以狄伐鄭富辰諫曰不可臣聞之大上以德撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之允也召穆公思周德之不類故紏合宗族于成周而作詩曰常棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟鬩于牆外禦其侮如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何庸勳親親昵近尊賢德之大者也即聾從昧與頑用嚚姦之大者也棄德崇姦禍之大者也鄭有平惠之勳又有厲宣之親棄嬖寵而用三良於諸姬為近四德具矣耳不聼五聲之和為聾目不别五色之章為昧心不則德義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿德也猶曰莫如兄弟故封建之其懷柔天下也猶懼有外侮扞禦侮者莫如親親故以親屏周召穆公亦云今周德既衰於是乎又渝周召以從諸姦無乃不可乎民未忘禍王又興之其若文武何王弗聽使頽叔桃子出狄師十六年狄伐鄭取櫟王德狄人將以其女為后富辰諫曰不可夫婚姻禍福之階也由之利內則福利外則取禍今王外利矣其無乃階禍乎昔摯疇之國也由大任杞繒由大姒齊許申吕由大薑陳由大姬是皆能內利親親者也昔􅋣之亡也由仲任密須由伯姞鄶由叔妘聃由鄭姬息由陳媯鄧由楚曼羅由季姬盧由荆媯是皆外利離親者也王曰利何如而內何如而外對曰尊貴眀賢庸勳長老愛親禮新親舊然則民莫不審固其心力以役上令官不易方而財不匱竭求無不至動無不濟百姓兆民夫人奉利而歸之上是利之內也若七德離判民乃擕二各以利退上求不暨是其外利也夫狄無列於王室鄭伯南也王而卑之是不尊貴也狄豺狼之德也鄭未失周典王而蔑之是不眀賢也平桓莊惠皆受鄭勞王而棄之是不庸勳也鄭伯捷之齒長矣王而弱之是不長老也狄隗姓也鄭出自宣王王而虐之是不愛親也夫禮新不間舊王以狄女間薑任非禮且棄舊也王一舉而棄七德臣故曰利外矣書有之曰必有忍也若能有濟也王不忍小忿而棄鄭又登叔隗以階狄狄封豕豺狼也不可厭也王又弗聼初王子帶有寵於惠后惠后將立之未及而卒叔帶奔齊富辰言於王曰請召大叔詩曰協比其鄰昏姻孔云吾兄弟之不協焉能怨諸侯之不睦王乃復之至是大叔通於狄后王替隗氏頽叔桃子曰我實使狄狄其怨我遂奉大叔以狄師攻王王遂出及坎欿國人納之頽叔桃子復以狄師伐周富辰曰昔吾驟諫王王弗從以及此難若我不出王其以我為懟乎乃以其屬死之王孫滿周大夫頃王之孫也襄王二十五年秦師襲鄭過周北門左右皆免胄而下超乘者三百乘王孫滿觀之言於王曰秦師必有謫王曰何故對曰師輕而驕輕則寡謀驕則無禮無禮則脫寡謀自陷入險而脫能無敗乎秦師無謫是道廢也是行也秦師還晉人敗諸崤獲其三帥白乙丙西乞術孟眀視定王元年楚莊王伐陸渾之戎遂至於雒觀兵于周強王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎昔夏之方有德也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若螭魅罔兩莫能逢之用能協于上下以承天休桀有昏德鼎遷于商載祀六百啇紂暴虐鼎遷于周德之休眀雖小重也其姦回昏亂雖大輕也天祚眀德有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也劉康公季子定王之母弟也故亦曰王季子為周卿士食采於劉定王八年王使康公聘於魯發幣於大夫季文子孟獻子皆儉叔孫宣子東門子家皆侈歸王問魯大夫孰賢對曰季孟其長處魯乎叔孫東門其亡乎若家不亡身必不免王曰何故對曰臣聞之為臣必臣為君必君寬肅宣惠君也敬恪恭儉臣也寬所以保本也肅所以濟時也宣所以教施也惠所以和民也本有保則必固時動而濟則無敗功教施而宣則遍惠以和民則阜若本固而功成施遍而民阜乃可以長保民矣其作事不徹敬所以承命也恪所以守業也恭所以給事也儉所以足用也以敬承命則不違以恪守業則不懈以恭給事則寬於死以儉足用則逺於憂若承命不違守業不懈寬於死而逺於憂則可以上下無隙矣其何任不堪上作事而徹下能堪其任所以為令聞長世也今夫二子者儉其能足用矣用足則族可以庇二子者侈侈則不恤匱匱而不恤憂必及之若是則必廣其身且夫人臣而侈國家弗堪亡之道也王曰幾何對曰東門之位不若叔孫而泰侈焉不可以事二君叔孫之位不若季孟而亦尚泰侈焉不可以事三君也若皆蚤世猶可若登年以載其毒必亡十六年魯宣公卒赴者未及東門氏來告亂子家奔齊簡王十一年魯叔孫宣伯亦奔齊皆如其言焉簡王之八年康公與成肅公會晉侯伐秦成子受脤于社不敬康公曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反乎反役成肅公卒于瑕單襄公朝周之卿士也其先食采於單故以為氏定王六年王使襄公聘于宋遂假道於陳以聘于楚火朝覿矣道茀不可行候不在疆司空不視塗澤不陂川不梁野有庾積場功未畢道無列樹墾田若藝膳宰不致餼司里不受館國無寄寓縣無施舍民將築臺於夏氏及陳陳靈公與孔寧儀父南冠以如夏氏留賓不見襄公歸告王曰陳侯不有大咎國必亡王曰何故對曰夫辰角見而雨畢天根見而水涸本見而木節解駟見而隕霜火見而清風戒寒故先王之教曰雨畢而除道水涸而成梁草木節解而備藏隕霜而冬裘具清風至而修城郭宫室故夏令曰九月除道十月成梁其時警曰收而場功偫而畚梮營室之中土功其始火之初見期於司里此先王所以不用財賄而廣施德於天下者也今陳國火朝覿矣而道路若塞野場若棄澤不陂障川無舟梁是廢先王之教也周制有之曰列樹以表道立鄙食以守路國有郊牧疆有寓望藪有圃草囿有林池所以禦災也其餘無非榖土民無懸耜野無奧草不奪民時不蔑民功有優無匱有逸無罷國有班事縣有序民今陳國道路不可知田在草間功成而不收民罷於逸樂是棄先王之法制也周之秩官有之曰敵國賔至關尹以告行理以節逆之候人為導卿出郊勞門尹除門宗祝執祀司里授館司徒具徒司空視塗司寇詰姦虞人入材甸人積薪火師監燎水師監濯膳宰致饔廩人獻餼司馬陳芻工人展車百官以物至賔入如歸是故小大莫不懷愛其貴國之賔至則以班加一等益虔至於王吏則皆官正蒞事上卿監之若王巡守則君親臨監今雖朝也不才有分族於周承王命以為過賔於陳而司事莫至是蔑先王之官先王之令有之曰天道賞善而罰淫故凡我造國無從匪彜無即慆淫各守爾典以承天休今陳侯不念允續之常棄其伉儷妃嬪而帥其卿佐以淫於夏氏不亦瀆姓矣乎陳我大姬之後也棄衮冕而南冠以出不亦簡彜乎是又犯先王之令也昔先王之教懋帥其德也猶恐隕越若廢其教而棄其制蔑其官而犯其令將何以守國居大國之間而無此四者其能久乎既而陳靈公殺於夏氏楚子入陳陳幾亡簡王十年晉厲公克楚于鄢陵使郤至告慶于周未將事王叔簡公飲之酒交酬好貨皆厚飲酒宴語相説也明日王叔子譽諸朝郤至見召桓公與之語召公以告襄公曰王叔子譽溫季以為必相晉國相晉國必大得諸侯勸二三君子必先導焉可以樹今夫子見我以晉國之克也為已實謀之曰微我晉不戰矣楚有五敗晉不知乘我則強之背宋之盟一也德薄而以地賂諸侯二也棄壯之良而用幼弱三也建立卿士而不用其言四也夷鄭從之三陳而不整五也罪不由晉晉得其民四軍之帥旅力方剛卒伍治整諸侯與之是有五勝也有辭一也得民二也軍帥強禦三也行列治整四也諸侯輯睦五也有一勝猶足用也有五勝以伐五敗而避之者非人也不可以不戰欒范不欲我則強之戰而勝是吾力也且夫戰也微謀吾有三伐勇而有禮反之以仁吾三逐楚軍之卒勇也見其君必下而趨禮也能獲鄭伯而赦之仁也若是而知晉國之政楚越必朝吾曰子則賢矣抑晉國之舉也不失其次吾懼政之未及子也謂我曰夫何次之有昔先大夫荀伯自下軍之佐而以政趙宣子未有軍行而以政今欒伯自下軍往是三子者吾又過於四之無不及若佐新軍而升為政不亦可乎將必求之是其言也君以為奚若襄公曰人有言曰兵在其頸其郤至之謂乎君子不自稱也非以讓也惡其蓋人也夫人性陵上者也不可蓋也求蓋人其抑下滋甚故聖人貴讓且諺曰獸惡其網民惡其上書曰民可近也而不可上也詩曰愷悌君子求福不回在禮敵必三讓是則聖人知民之不可加也故王天下者必先諸民然後庇焉則能長利今郤至在七人之下而欲上之是求蓋七人也其亦有七怨怨在小醜猶不可堪而况在侈卿乎其何以待之晉之克也天有惡於楚也故警之以晉而郤至佻天之功以為已力不亦難乎佻天不祥乘人不義不祥則天棄之不義則民叛之且郤至何三伐之有夫仁禮勇皆民之為也以義死用謂之勇奉義順則謂之禮畜義豐功謂之仁姦仁為佻姦禮為羞姦勇為賊夫戰盡敵為上守和同順義為上故制戎以果毅制朝以序成叛戰而擅舍鄭君賊也棄毅行容羞也叛國即讎佻也有三姦以求替其上逺於得政矣以吾觀之兵在其頸不可久也雖吾王叔未能違難在泰誓曰民之所欲天必從之王叔欲郤至能勿從乎十一年襄公及尹武公會諸侯于柯陵襄公見晉厲公視逺步髙晉郤錡見其語犯郤犫見其語迂郤至見其語伐齊國佐見其語盡魯成公見言及晉難及郤犫之譖襄公曰君何患焉晉將有亂其君與三郤共當之乎魯侯曰寡人懼不見赦於晉今君曰將有亂敢問天道乎抑人故也對曰吾非瞽史焉知天道吾見晉君之容而聼三郤之語矣殆必禍者也夫君子目以定體足以從之是以觀其容而知其心矣目以處義足以步目今晉侯視逺而足髙目不存體而足不步目其心必異矣目體不相從何以能久夫合諸侯民之大事也於是乎觀存亡故國將無咎其君在會步言視聼必皆無謫則可以知德矣視逺日絶其義足髙日棄其德言爽日反其信聼淫日離其名夫目以處義足以踐德口以庇信耳以聼名者也故不可不慎也偏喪有咎既喪則國從之晉侯喪二吾是以云夫郤氏晉之寵人也三卿而五大夫可以戒懼矣髙位實疾顛厚味實臘毒今郤伯之語犯叔迂季伐犯則陵人迂則誣人伐則掩人有是寵也而益之以三怨其誰能忍之齊國子亦將與焉立於淫亂之國而好盡言以招人過怨之本也唯善人能受盡言齊其有乎吾聞之國德而鄰於不修必受其福今君逼於晉而鄰於齊齊晉有禍可以取伯無德之患何憂於晉且夫長狄之人利而不義其利淫矣流之若何魯侯歸乃逐叔孫僑如眀年晉殺三郤又眀年晉厲公弒齊人殺國武子其後伯輿之獄王叔陳生亦出奔晉晉襄公之孫曰惠伯談談之子周適京師事襄公立無跛視無還聼無聳言無逺言敬必及天言忠必及意言信必及身言仁必及人言義必及制言智必及事言勇必及利言教必及辨言孝必及神言惠必及和言讓必及敵晉國有憂未嘗不戚有慶未嘗不怡襄公有疾召其子頃公而告之曰必善晉周將得晉國其行也文能文則得天地天地所祚小而後國夫敬文之恭也忠文之實也信文之孚也仁文之愛也義文之制也智文之輿也勇文之帥也教文之施也孝文之本也惠文之慈也讓文之材也象天能敬帥意能忠思身能信愛人能仁利制能義事建能智帥義能勇施辨能教昭神能孝慈和能惠推敵能讓此十一者夫子皆有焉天六地五數之常也經之以天緯之以地經緯不爽文之象也文王質文故天祚之以天下夫子被文矣其昭穆又近可以得國且夫立無跛正也視無還端也聼無聳成也言無逺慎也夫正德之道也端德之性也成德之終也慎德之守也守終純固道正事信明令德矣慎成端正德之相也為晉休戚不背本也被文相德非國何取成公之歸也吾聞晉之筮也遇乾之否曰配而不終君三出焉一既往矣後之不知其次必此且吾聞成公之生也其母夢神規其臀以墨曰使有晉國三而畀歡之孫故名之曰黑臀於今再矣襄公曰歡此其孫也而令德孝恭非此其誰且其夢曰必歡之孫實有晉國其卦曰必三取君於周其德又可以君國三襲焉吾聞之太誓故曰朕夢協朕卜襲于休祥戎商必克以三襲也晉仍無道而鮮胄其將失之矣必早善晉子其當之也頃公許諾及厲公之亂召周子而立焉是為悼公太子晉靈王之太子也早卒不得立靈王之二十一年榖洛鬭將毁王宫王欲壅之太子晉諌曰不可晉聞古之長民者不墮山不崇藪不防川不竇澤夫山土之聚也藪物之歸也川氣之導也澤水之鍾也夫天地成而聚於髙歸物於下疏為川谷以導其氣陂塘汙庳以鍾其美是故聚不陀崩而物有所歸氣不沈滯而亦不散越是以民生有財用而死有所葬然則無夭昏扎瘥之憂而無飢寒乏匱之患故上下能相固以待不虞古之聖王唯此之慎昔共工棄此道也虞于湛樂淫失其身欲壅百川墮髙堙庳以害天下皇天弗福庶民弗助禍亂並興共工用滅在有虞有崇伯鯀播其淫心稱遂共工之過堯用殛之于羽山其後伯禹念前人之非度釐改制量象物天地比類百則儀之于民而度之于羣生共之從孫四嶽佐之髙髙下下疏川導滯鍾水豐物封崇九山決汨九川陂障九澤豐殖九藪汨越九原宅居九隩合通四海故天無伏隂地無散陽水無沈氣火無災燀神無間行民無淫心時無逆數物無害生帥象禹之功度之于軌儀莫非嘉績克厭帝心皇天嘉之祚以天下賜姓曰姒氏曰有夏謂其能以嘉祉殷富生物也祚四嶽國命以侯伯賜姓曰薑氏曰有呂謂其能為乎股肱心膂以養物豐民也此一王四伯豈繄多寵皆亡王之後也唯能釐舉嘉義以有允在下守祀不替其典有夏雖衰杞鄫猶在申吕雖衰齊許猶在唯有嘉功以命姓受祀迄于天下及其失之也必有慆淫之心間之故亡其氏姓踣斃不振絶後無主湮替𨽻圉夫亡者豈繄無寵皆黃炎之後也惟不帥天地之度不順四時之序不度民神之義不儀生物之則以殄滅無允至于今不祀及其得之也必有忠信之心間之度於天地而順於時動和於民神而儀於物則故髙明令終顯融昭明命姓受氏而附之以令名若啓先王之遺訓省其典圖刑法而觀其廢興者皆可知也其興者必有夏吕之功焉其廢者必有共鯀之敗焉今吾執政無乃實有所避而滑夫二川之神使至於爭眀以妨王宫王而飾之無乃不可乎人有言曰無過亂人之門又曰佐􆃉者嘗焉佐鬭者傷焉又曰禍不好不能為禍詩曰四牡騤騤旟旐有翩亂生不夷靡國不泯又曰民之貪亂寧為荼毒夫見亂而不愓所殘必多其飾彌章民有怨亂猶不可遏而況神乎王將防鬭川以飾宫是飾亂而佐鬭也其無乃章禍且遇傷乎自我先王厲宣幽平而貪天禍至于今未弭我又章之懼長及子孫王室其愈卑乎其若之何自后稷以來寧亂及文武成康而僅克安民自后稷之始基靖民十五王而文始平之十八王而康克安之其難也如是厲始革典十四王矣基德十五而始平基禍十五其不濟乎吾將警懼其何德之修而少光王室以逆天休王又章輔禍亂將何以堪之王無亦鑒于黎苖之王下及夏商之季上不象天而下不儀地中不和民而方不順時不共神祗而蔑棄王則是以人夷其宗廟而火焚其彜器子孫為𨽻下夷於民而亦未觀夫前哲令德之則則此六者而受天之豐福饗民之勳力子孫豐厚令聞不忘是皆天子之所知也天所崇之子孫或在畎畝由欲亂民也畎畝之人或在社稷由欲靖民也無有異焉詩云殷鑒不逺在夏后之世將欲用飾宫其以徼亂也度之天神則非祥也比之地物則非義也類之民則則非仁也方之時動則非順也咨之前訓則非正也觀之詩書與民之憲言則皆亡王之為也上下議之無所比度王其圖之夫事大不從象小不從文上非天刑下非地德中非民則方非時動而作之者必不節矣作又不節害之道也王卒壅之及景王多寵人亂於是乎始生景王崩王室始亂及貞定王王室遂卑單穆公旗單襄公之五世孫也為王官伯景王二十一年將鑄大錢穆公曰不可古者天災降戾於是乎量資幣權輕重以振救民民患輕則為作重幣以行之於是乎有母權子而行民皆得焉若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之今王廢輕而作重民失其資能無匱乎若匱王用將有所乏乏則將厚取於民民不給將有逺志是離民也且夫備有未至而設之有至而後救之是不相入也可先而不備謂之怠可後而先之謂之召災周固羸國也天未厭禍焉而又離民以佐災無乃不可乎將民之與處而離之將災是備禦而召之則何以經國國無經何以出令令之不從上之患也故聖人樹德於民以除之夏書有之曰關石和鈞王府則有詩亦有之曰瞻彼旱麓榛楛濟濟愷悌君子干祿愷悌夫旱麓之榛楛殖故君子得以易樂干祿焉若夫山林匱竭林麓散亡藪澤肆既民力雕盡田疇荒蕪資用乏匱君子將險哀之不暇而何易樂之有焉且絶民用以實王府猶塞川原而為潢汙也其竭也無日矣若民離而財匱災至而備亡王其若之何吾周官之於災備也其所怠棄者多矣而又奪之資以益其災是去其藏而翳其人也王其圖之王弗聼卒鑄大錢三十三年王將鑄無射而為之大林穆公曰不可作重幣以絶民資又鑄大鍾以鮮其繼若積聚既喪又鮮其繼生何以殖且夫鍾不過以動聲若無射有林耳弗及矣夫鍾聲以為耳也耳所不及非鍾聲也猶目所不見不可以為目也夫目之察度也不過步武尺寸之間其察色也不過墨丈尋常之間耳之察和也在清濁之間其察清濁也不過一人之所勝是故先王之制鍾也大不出鈞重不過石律度量衡於是乎生小大器用於是乎出故聖人慎之今王作鍾也聼之弗及比之不度鍾聲不可以知和制度不可以出節無益於樂而鮮民財將焉用之夫樂不過以聼耳而美不過以觀目若聼樂而震觀美而眩患莫甚焉夫耳目心之樞機也故必聼和而視正聼和則聰視正則明聰則言聼明則德昭聼言昭德則思慮純固以言德於民民歆而德之則歸心焉上得民心以殖義方是以作無不濟求無不獲然後能樂夫耳內和聲而口出美言以為憲令而布諸民正之以度量民以心力從之不倦成事不二樂之至也口內味而耳內聲聲味生氣氣在口為言在目為明言以信名明以時動名以成政動以殖生政成生殖樂之至也若視聼不和而有以震眩則味入不精不精則氣佚氣佚則不和於是乎有狂悖之言有眩惑之明有轉易之名有過慝之度出令不信刑政放紛動不順時民無據依不知所力各有離心上失其民作則不濟求則不獲其何以能樂三年之中有離民之器二焉國其危哉王弗聼卒鑄大鍾既而鍾不和伶州鳩曰王其以心疾死乎語具伶州鳩傳中初景王有庶長子曰子朝有寵於王王與其傅賓孟言將立之劉獻公之庶子伯蚠事穆公惡賓孟之為人也願殺之又惡子朝之將姦位也願去之賓孟適郊見雄雞自斷其尾問之侍者曰憚其犧也遽歸告王曰吾見雄雞自斷其尾而人曰憚其犧也吾以為信畜矣人犧實難已犧何害抑其惡為人用也乎則可也人異於是犧者實用人也王弗應田于鞏使公卿皆從將殺穆公及子朝未克王遇心疾而崩魯衆仲魯大夫公子益師之子也益師字衆父以父字為氏焉隱公之四年衛州吁弒其君桓公而自立將修先君之怨於鄭而求寵於諸侯以和其民故宋公陳侯蔡人從州吁代鄭公問於衆仲曰衛州吁其成乎對曰臣聞以德和民不聞以亂以亂猶治絲而棼之也夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也夫州吁弒其君而虐用其民於是乎不務令德而欲以亂成必不免矣是歲州吁如陳衛石碏使陳人執之而殺之於濮五年公考惠公夫人仲子之宫將萬焉問羽數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之於是初獻六羽始用六佾也八年無駭卒羽父請諡與族公問族於衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之公命以字為展氏氏族之源興於此焉申繻事桓公為大夫桓公之六年子同生以太子生之禮舉之接以太牢卜士負之士妻食之公與文薑宗婦命之公問名於申繻對曰名有五有信有義有象有假有類以名生為信以德命為義以類命為象取於物為假取於父為類不以國不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山是以大物不可以命公曰是其生也與吾同物命之曰同十八年公將會齊襄公于濼遂與薑氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗既而文薑至齊襄公通焉公謫之以告襄公享公使公子彭生乘公公薨于車魯人告于齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生是申繻之所謂易禮必敗者也君子謂申繻於是乎知言初鄭厲公之出也鄭有內蛇與外蛇鬭於鄭南門中莊公十四年而厲公復入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣焰以取之妖由人興也人無釁焉妖不自作人棄常則妖興故有妖焉公善之公子彄苦侯反者魯孝公之子而惠公之弟也於隱公為叔父姓臧氏諡曰僖伯隱公之五年公將矢魚于棠棠地名今髙平方與縣北有武唐亭魯侯觀魚臺矢陳也言陳魚而觀之僖伯諫公曰凡物不足以講大事大事祀與戎也其材不足以備器用則君不舉焉君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物是謂亂政亂政亟行所以敗也故春搜夏苖秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也鳥獸之肉不登於爼皮革齒牙骨角毛羽不登於器則公不射古之制也若夫山林川澤之實器用之資皂𨽻之事官司之守非君所及也公曰吾將略地焉遂往陳魚而觀之僖伯稱疾不從春秋書之曰公矢魚于棠非禮也且言逺地也是歲冬僖伯卒公曰叔父有憾於寡人寡人弗敢忘葬之加一等僖伯之子曰逹臧哀伯逹僖伯之子也桓公二年取郜鼎于宋納于太廟哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫是以清廟茅屋大路越席大羮不致粢食不鑿昭其儉也衮冕黻珽帶裳幅舄衡紞紘綖昭其度也藻率鞞鞛鞶厲遊纓昭其數也火龍黼黻昭其文也五色比象昭其物也鍚鸞和鈴昭其聲也三辰旗旗昭其明也夫德儉而有度登降有數文物以紀之聲明以發之以臨照百官百官於是乎戒懼不敢易紀律今滅德立違而置其賂器於太廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于雒邑義士猶或非之而况將昭違亂之賂器於太廟其若之何公不聼周內史聞之曰臧孫逹其有後於魯乎君違不忘諫之以德臧文仲辰哀伯之孫也文仲之父伯氏瓶不顯文仲嗣世為大夫莊公十一年宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧孫曰宋其興乎禹湯罪已其興也勃焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎二十八年魯飢文仲言於公曰夫為四鄰之援結諸侯之信重之以婚姻申之以盟誓固國之艱急是為鑄名器藏寶財固民之殄病是待今國病矣君盍以名器請糴于齊公然之遂往如齊告曰天災流行戾于敝邑飢饉荐降民羸幾卒大懼乏周公太公之命祀職貢業事之不共而獲戾不腆先君之弊器敢告滯積以紓執事以救敝邑使能共職豈惟寡君與二三臣實受君賜其周公太公及百辟神祗實永饗而賴之齊人歸其玉而與之糴宋襄公欲合諸侯文仲聞之曰以欲從人則可以人從欲鮮濟僖公二十一年夏大旱公欲焚巫尫文仲曰非旱備也修城郭貶食省用務穯勸分此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是歲也飢而不害明年公伐邾取須句邾人以須句故出師公卑邾不設備而禦之文仲曰國無小不可易也無備雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄氷又曰敬之敬之天惟顯思命不易哉先王之明德猶無不難也無不懼也況我小國乎君其無謂邾小蜂蠆有毒而況國乎弗聼八月丁未公及邾師戰于升陘我師敗績邾人獲公胄縣諸魚門齊孝公伐我北鄙文仲欲以辭告之使展喜受命於展禽以告於是齊師乃止語在展喜傳是歲文仲如楚乞師見子玉道之伐齊宋以其不臣也於是子玉伐宋圍緡文仲相公以如楚師伐齊取榖晉文公削曹地以分諸侯使文仲往宿於重館重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以南東傅于濟盡曹地也楚滅六文仲聞之曰臯陶庭堅不祀忽諸德之不建民之無援哀哉文仲卒其言立後卿大夫多宗之至於下展禽廢六官妾織蒲作虛器縱逆祀祀爰居其仁智所未盡也故聖人惜之子宣叔臧宣叔許宣公即位以宣叔為司寇始襄仲立宣公故其子歸父有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之公薨季文子言於朝曰使我殺適立庶以失大援者仲也夫臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之遂逐東門氏成公元年宣叔聞齊將出楚師故及晉侯盟于赤棘於是令國中修賦繕完具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至雖晉人伐齊楚必救之是齊楚同我也知難而有備乃可以逞次年齊師伐我宣叔如晉乞師主於郤獻子六月及齊侯戰于鞍齊師敗績楚師侵衛遂侵我師于蜀使臧孫往辭曰楚逺而久固將退矣無功而受名臣不敢楚侵及陽橋孟孫請往賂之而止公許之孟孫請盟楚人許平公及楚子盟于蜀楚師及宋公衡逃歸宣叔曰衡父不忍數年之不宴以棄魯國國將若之何誰居後之人必有任是夫國棄矣三年晉侯使荀庚來聘衛侯使孫良夫來聘皆尋盟也公問諸宣叔曰中行伯之於晉也其位在下卿孫子之於衛也其位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衛在晉不得為次國晉為盟主其將先之公從之四年卒武仲嗣臧武仲紇宣叔之子也生而短小多智時號為聖人成公十八年晉士魴來乞師季文子問師數於武仲對曰伐鄭之役知伯實來下軍之佐也今彘季亦佐下軍如伐鄭可也事大國無失班爵而加敬焉禮也文子從之陳成公卒楚人將伐陳聞喪乃止陳人不聼命臧武仲聞之曰陳不服於楚必亡大國行禮而不服在大猶有咎而況小國乎既而楚彭名侵陳襄公四年邾人莒人伐鄫臧紇救鄫侵邾敗於狐駘國人逆喪者皆髽魯於是乎始髽國人誦之曰臧之狐裘敗我於狐駘我君小子朱儒是使朱儒朱儒使我敗於邾十三年將城防武仲請俟農畢及冬城之衛獻公出奔齊臧紇如齊唁衛侯與之言虐退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國子展子鮮聞之見臧孫紇與之言道臧孫説謂其人曰衛君必入矣夫二子者或挽之或推之欲無入得乎季武子以所得於齊之兵作林鍾而銘魯功焉臧武仲謂季孫曰非禮也夫銘天子令德諸侯言時計功大夫稱伐今稱伐則下等也計功則借人也言時則妨民多矣何以為銘且夫大伐小取其所得以作彜器銘其功烈以示子孫昭明德而懲無禮也今將借人之力以救其死若之何銘之小國幸於大國而昭所獲焉以怒之亡之道也邾庶其以漆閭邱來奔季武子以公姑姊妻之皆有賜於其從者於是魯多盜季武子謂武仲曰子盍詰盜武仲曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司寇將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜子為正卿而來外盜使紇去之將何以能庶其竊邑於邾以來子以姬氏妻之而與之邑其從者皆有賜焉若大盜禮焉以君之姑姊與其大邑其次皂牧輿馬其小者衣裳劒帶是賞盜也賞而去之其或難焉紇也聞之在上位者灑濯其心一以待人軌度其信而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎夏書曰念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功將謂由已一也信由已一而後功可念也季武子無適子公彌長而愛悼子欲立之訪於申豐曰彌與紇吾皆愛之欲擇材焉而立之復訪於臧紇臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻臧孫命北面重席新樽潔之召悼子降逆之大夫皆起及旅而召公鉏使與之齒公鉏遂廢於是季孫愛臧孫孟孫惡之及孟孫卒臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣孟氏閉門告於季孫曰臧氏將為亂不使我葬季孫不信臧孫聞之戒十月孟氏將辟藉除於臧氏臧孫使正夫助之除於東門甲從已而視之孟氏又告季孫季孫怒命攻臧氏乙亥臧紇斬鹿門之關以出奔邾初臧宣叔娶于鑄生賈及為而死繼室以其姪穆薑之姨子也生紇長於公宫薑氏愛之故立之臧賈臧為出在鑄武仲自邾使告臧賈且致大蔡焉曰紇不佞失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為以納請遂自為也臧孫如防使來告曰紇非能害也智不足也非敢私請茍守先祀無廢二勳敢不辟邑乃立臧為臧紇致防而奔齊其人曰其盟我乎臧孫曰無辭魯人將盟臧氏季孫召外史掌惡臣而問盟首焉對曰盟東門氏也曰毋或如東門遂不聼公命殺適立庶盟叔孫氏也曰毋或如叔孫僑如欲廢國常蕩覆公室季孫曰臧孫之罪皆不及此孟椒曰盍以其犯門斬關季孫用之乃盟臧氏曰毋或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居其孟椒乎齊侯將為臧紇田臧孫聞之見齊侯與之言伐晉對曰多則多矣抑君似鼠夫鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠如何乃弗與田仲尼曰知之難也有臧武仲之智而不容於魯國抑有由也作不順而施不恕也昭公十年平子伐莒及郠獻俘始用人于亳社臧武仲在齊聞之曰周公其不饗魯祭乎周公饗義而魯無義視人如牲將誰福哉東門襄仲遂莊公之子也居于東門因以命氏僖公二十六年齊伐我襄仲如楚乞師三十年聘于周次年如晉拜曹田三十三年帥師伐邾文公八年襄仲會晉趙孟盟于衡雍遂會伊雒之戎十二年秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也主人三辭賓答曰寡君願要福于周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之公及齊侯盟于榖襄仲如齊拜榖盟復曰聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰民主偷必死文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲惠伯不可仲見于齊侯而請之齊侯新立而欲親魯許之於是仲殺惡及視而立宣公仲以君命召惠伯其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聼弗聼乃入仲殺而埋之馬矢之中既而復叔仲氏夫人薑氏歸于齊將行哭而過市曰天乎仲為無道殺適立庶市人皆哭魯人謂之哀薑宣公元年遂如齊逆女三月遂以夫人婦薑至自齊八年仲遂卒公子季友桓公之子而莊公之季弟也莊公有弟三人長曰慶父次曰叔牙次曰季友季友之母出自陳桓公絶愛幸之季友將生公使人卜之曰男也其名曰友在公之右間于兩社為公室輔季氏亡則魯不昌及生有文在其手曰友遂以名之號為成季莊公立娶齊女為夫人曰哀薑無子哀薑娣曰叔薑生子開始莊公嘗築臺臨黨氏見孟任説之生子般莊公既無適嗣以愛欲立般公病而問嗣於弟叔牙叔牙曰一繼一及魯之常也慶父在可為嗣君何憂公患叔牙欲立慶父退而問季友季友曰臣以死奉般公曰叔牙奈何成季以君命命僖叔待於針巫氏使針季鴆之曰飲此則有後於魯國不然死且無後飲之歸及逵泉而卒立其子為叔孫氏公薨季友立子般慶父使殺子般于黨氏季友奔陳慶父如齊及歸自齊以私於哀薑故立薑娣子開是為閔公閔公元年公及齊桓公盟于落姑請復季友齊侯許之使召諸陳公次于郎以待之孔子書曰季子來歸慶父與哀薑通益甚哀薑與慶父謀殺閔公而立慶父慶父使卜齮賊公于武闈成季以閔公兄申適邾魯人不欲慶父慶父懼如莒季友入立申為僖公以賂求慶父于莒莒人歸之及密使公子魚請不許哭而往慶父曰奚斯之聲也乃縊其後為孟氏僖公元年季友帥師敗莒師於酈獲莒拏公以費封季友使為相其後為季氏季文子名行父公子季友之孫也文公之初季子始為卿六年聘于晉使求遭喪之禮以行其人曰將焉用之文子曰備豫不虞古之善教也求而無之實難過求何害十五年齊人侵我西鄙季文子告于晉冬十一月晉會諸侯于扈謀伐齊也齊人賂晉侯故不克而還齊侯謂諸侯不能治復侵我西鄙遂伐曹入其郛討其朝於我也季文子曰齊侯其不免乎已則無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰畏天之威于時保之不畏於天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣次年及齊平公有疾使季文子會齊侯于陽榖請盟齊侯不肯曰請俟君間莒紀公生太子僕又生季他愛季他而黜僕且多行無禮於國僕因國人以弒紀公以其寶玉來奔納諸宣公公命與之邑曰今日必授季文子使司寇出諸竟曰今日必逹公問其故季文子使太史克對曰先大夫臧孫辰教行父事君之禮行父奉以周旋弗敢失墜曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之若鷹鸇之逐鳥雀也先君周公制周禮曰則以觀德德以處事事以度功功以食民作誓命曰毁則為賊掩賊為藏竊賄為盜盜器為姦主藏之名賴姦之用為大凶德有常無赦在九刑不忘行父還觀莒僕莫可則也孝敬忠信為吉德盜賊藏姦為凶德夫莒僕則其孝敬則弒君父矣則其忠信則竊寶玉矣其人則盜賊也其器則姦兆也保而利之則主藏也以訓則昏民無則焉不度於善而皆在於凶德是以去之昔髙陽氏有才子八人蒼舒隤􅢺檮戭大臨尨降庭堅仲容叔逹齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅共懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名以至於堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方父義母慈兄友弟共子孝內平外成昔帝鴻氏有不才子掩義隱賊好行凶德醜類惡物頑嚚不友是與比周天下之民謂之渾敦少皥氏有不才子毁信廢忠崇飾惡言靖譖庸回服讒搜慝以誣盛德天下之民謂之窮竒顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚傲狠明德以亂天常天下之民謂之檮杌此三族也世濟其凶增其惡名以至于堯堯不能去縉雲氏有不才子貪于飲食冒于貨賄侵欲崇侈不可盈厭聚斂積實不知紀極不分孤寡不恤窮匱天下之民以比三凶謂之叨餮舜臣堯賔于四門流四凶族渾敦窮竒檮杌叨餮投諸四裔以禦魑魅是以堯崩而天下如一同心戴舜以為天子以能舉十六相去四凶也故虞書數舜之功曰慎徽五典五典克從無違教也曰納于百揆百揆時序無廢事也曰賔于四門四門穆穆無凶人也舜有大功二十而為天子今行父雖未獲一吉人去一凶矣於舜之功二十之一也庶幾免於戾乎宣公元年文子如齊納賂以請會成公二年文子帥師會郤克敗齊師于鞍四年相公如晉晉侯見公不敬季文子曰晉侯必不免詩曰敬之敬之天惟顯思命不易哉晉侯之命在諸侯矣可不敬乎秋公至自晉欲求成于楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇於我諸侯聼焉未可以二史佚之志有之曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止六年文子以鞍之功立武宫吳伐郯郯成文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也詩曰不弔昊天亂靡有定其此之謂乎有上不弔其誰不受亂吾亡無日矣君子曰知懼如是斯不亡矣八年晉侯使韓穿來言汶陽之田歸之于齊文子餞之而私焉曰大國制義以為盟主是以諸侯懷德畏討無有二心謂汶陽之田敝邑之舊也而用師于齊使歸諸敝邑今有二命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體詩曰女也不爽士二其行士也罔極二三其德七年之中一與一奪二三孰甚焉士之二三猶喪妃耦而況霸主乎霸主將德是以而二三之其何以長有諸侯乎詩曰猶之未逺是用大簡行父懼晉之不逺猶而失諸侯也是以敢私言之成公之母曰穆薑宣伯僑如通之欲去季孟而取其室十六年晉侯伐鄭公將會之穆薑送公而使逐二子公以晉難告曰請反而聼命薑怒公子偃公子鉏趨過指之曰女不可是皆君也公待於壞隤申宫警備設守而後行是以後宣伯使告郤犫曰魯侯待于壞隤以待勝者郤犫將新軍且為公族大夫以主東諸侯取貨於宣伯而訴公於晉侯晉侯不見公七月公會尹武公及諸侯伐鄭將行薑又命公如初公又申守而行宣伯使告郤犫曰魯之有季孟猶晉之有欒范也政令於是乎成今而謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志于魯請止行父而殺之我斃蔑也而事晉不然歸必叛矣九月晉人執季文子于苕邱公還待于鄆使子叔聲伯請季孫于晉郤犫曰茍去仲孫蔑而止季孫行父吾與子國親於公室對曰僑如之情子必聞之矣若棄蔑與行父是棄魯國而罪寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之密邇仇讎亡而為讎治之何及郤犫曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私謀國家不二圖其身不忘其君若虛其請是棄善人也子其圖之乃許魯平赦季孫初穆薑使擇美檟以自為櫬與頌琴及齊薑薨季文子取以葬君子譏之以其虧姑以成婦也襄公四年定姒薨不殯于廟無櫬不虞匠慶謂季文子曰子為正卿而小君之喪不成不終君也君長誰受其咎初季孫為已樹六檟於蒲圃東門之外匠慶請木季孫曰略匠慶用蒲圃之檟季孫不御六年卒初文子之為相仲孫他諫曰子為上卿妾不衣帛馬不食粟人以子為愛且不華國也文子曰吾亦願之然吾觀國人其父兄之食粗而衣惡者猶多而吾獨美妾與馬可乎吾聞榮於德者華於國不聞以妾與馬也子宿季武子宿襄公六年代其父文子為卿冬如晉七年如衛九年相公會晉侯伐鄭師還公送之晉侯以公宴于河上問公年季武子曰會于沙隨之歲寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鍾磬焉十一年武子作三軍與孟氏叔孫氏三分公室而各有其一孟氏使半為臣若子若弟叔孫氏使盡為臣季氏使其乘之人以其役邑入者無征其不入者倍征之十二年莒人伐我東鄙圍台季子救台遂入鄆取其鍾以為公盤十九年晉人以我故伐齊武子如晉拜師晉侯享之范宣子為政賦黍苖武子興再拜稽首曰小國之仰大國也如百榖之仰膏雨焉若常膏之其天下輯睦豈惟敝邑賦六月二十年武子聘于宋褚師假逆之以受享賦常棣之七章以卒宋人重賄之歸復命公享之賦魚麗之卒章公賦南山有臺武子去所曰臣不堪矣二十九年公自楚還及方城武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祗見疏也公謂公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服固辭強之而後受公欲無入榮成伯賦式微乃歸五月公至自楚公冶致其邑於季氏而終不入焉曰欺其君何必使余季孫見之則言季氏如他日不見則不言季氏及疾聚其臣曰我死必無以冕服斂非德賞也且無使季氏葬我昭公五年叔孫穆子卒武子謀舍中軍而卑公室故毁中軍于施氏成諸臧氏初作中軍三分公室而各有其一及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公六年武子如晉晉侯享之有加籩武子退使行人告曰小國之事大國也茍免於討不敢求貺得貺不過三獻今豆有加下臣弗堪無乃戾乎韓宣子曰寡君以為歡也對曰寡君猶未敢況下臣君之𨽻也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨七年公如楚晉人來治杞田武子欲以成與之謝息為孟孫守不可曰人有言曰雖有挈瓶之智守不假器禮也夫子從君而守臣喪邑雖吾子亦有猜焉武子曰君之在楚於晉罪也又不聼晉魯罪重矣晉師必至吾無以待之不如與之間晉而取諸杞吾與子桃成反誰敢有之是得二成也魯無憂而孟孫益邑子何病焉辭以無山與之萊柞乃遷于桃晉人為杞取成冬武子病次子紇既立而卒諡曰悼子悼子之子曰意如季平子意如昭公十年始為卿秋伐莒取郠獻俘用人于亳社平子立不禮於南蒯南蒯謂子仲曰吾出季氏而歸其室於公子更其位我以費為公臣子仲許之南蒯語叔仲穆子且告之故季悼子之卒也叔孫昭子以再命為卿及平子伐莒克之更受三命叔仲子欲構二家謂平子曰三命踰父兄非禮也平子曰然故使昭子辭昭子曰叔孫氏有家禍殺適立庶故婼音綽也及此若因禍以斃之則聞命矣若不廢君命則固有著矣昭子朝而命吏曰婼將與季氏訟書辭無頗季孫懼而歸罪於叔仲子故叔仲小南蒯公子憖謀季氏憖告公而遂從公如晉南蒯懼不克以費叛如齊子仲還及衛聞費叛遂奔齊平子欲使昭子逐叔仲小小聞之不敢朝昭子謂小待政於朝曰吾不為怨府十三年平子使叔弓圍費弗克敗焉平子怒令見費人執之以為囚俘冶區夫曰非也若見費人寒者衣之飢者食之為之令主而共其困乏費來如歸南氏亡矣民將畔之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之是歲秋平子相公會諸侯于平邱邾人莒人訴公于晉晉侯不見公晉人遂執季孫意如以幕蒙之使狄人守之司鐸射懷錦奉壺飲氷以蒲伏焉守者御之乃與之錦而入晉以平子歸子服惠伯從私于中行穆子穆子告韓宣子宣子歸之惠伯有辭宣子用叔鮒之計平子懼而先歸焉事在叔向傳二十一年晉士鞅來聘叔孫為政季孫欲惡諸晉使有司以齊鮑國之位歸費之禮為士鞅士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢初季公鳥娶妻於齊鮑文子生申公鳥死季公亥與公思展與公鳥之臣申夜姑相其室及季姒與饔人檀通而懼乃使其妾抶已以示秦遄之妻曰公若欲使余余不可而抶余又訴於公甫曰展與夜姑將要余秦姬以告公之公之與公甫告平子平子拘展於卞而執夜姑將殺之公若泣而哀之曰殺是是殺余也將為之請平子使豎勿內日中不得請有司逆命公之使速殺之故公若怨平子季郈之雞鬭季氏介其雞郈氏為之金距平子怒益宫於郈氏且讓之故郈昭伯亦怨平子臧昭伯之從弟會為讒於臧氏而逃於季氏臧氏執之平子怒拘臧氏老將禘於襄公萬者二人其衆萬於季氏臧孫曰此之謂不能庸先君之廟大夫遂怨平子公若獻弓於公為且與之出射於外而謀去季氏公為告公果公賁公果公賁使侍人僚柤告公公寢將以戈擊之乃走公曰執之亦無命也懼而不出數月不見公不怒又使言公執戈以懼之乃走又使言公曰非小人之所及也公果自言公以告臧孫臧孫難之告郈孫郈孫以為可於是衆伐季氏殺公之于門遂入之平子登臺而請曰君不察臣之罪使有司討臣以干戈臣請待於沂上以察罪弗許請囚於費弗許請以五乘亡弗許子家子曰君其許之郈孫曰必殺之公使郈孫逆孟懿子叔孫氏之司馬鬷戾言於其衆曰若之何莫對又曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以往陷西北隅以入公徒釋甲執氷而踞遂逐之孟氏使登西北隅以望季氏見叔孫氏之旌以告孟氏執郈昭伯殺之于南門之西遂伐公徒公與臧孫如墓謀遂行孫于齊次于陽州齊侯唁公于野井二十六年齊侯將納公平子使申豐賂梁邱據齊師乃止明年諸侯會于扈且謀納公宋衛皆利納公固請于晉范鞅取貨於季孫以辭却之三十一年晉侯將以師納公范鞅曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來吾受其無咎故季孫意如會晉荀躒于適厯荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之季孫練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命君若以臣為有罪請囚于費以待君之察也亦惟君若以先臣之故不絶季氏而賜之死若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心夏四月季孫從知伯如乾侯荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復於寡君退而謂季孫曰君怒未怠子姑歸祭三十有二年公薨于乾侯明年公之喪歸于魯及葬季孫使役如闞公氏將溝焉榮駕鵝曰生不能事死又離之以自旌也縱子忍之後必或恥之乃止季孫復問駕鵝曰吾欲為君諡使子孫知之對曰生弗能事死又惡之以自信也將焉用之乃止平子葬昭公于墓道南及孔子為司寇然後溝而合諸墓昭公之出也平子禱于煬宫公薨于外平子以為獲福故立煬宮焉定公五年平子行東野還未至卒于房季桓子斯季平子之子也平子卒桓子代立陽虎欲以璠璵斂平子仲梁懷弗與曰改步改玉陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉既葬桓子行東野及費子泄為費宰逆勞於郊桓子敬之勞仲梁懷仲梁懷弗敬子泄怒謂陽虎曰子行之乎陽虎囚季桓子而逐仲梁懷既而盟桓子於稷門之內而釋之定公六年魯侵鄭晉故也桓子如晉獻鄭俘七年齊伐魯桓子與孟懿子禦之陽虎御桓子欲陷桓子於齊師以及孟孫桓子之臣苫夷曰若季孟及難余必殺虎虎懼以桓子還八年陽虎謀享季氏於蒲圃而殺之使其黨林楚御桓子將如蒲圃桓子知不免要林楚使拔已於難林楚因怒馬及衢而騁以桓子入保孟氏孟氏闔門陽虎與戰不勝而奔語具陽虎傳孟氏之臣公斂陽欲因亂害桓子以強孟宗孟孫懼而歸之十二年仲由為季氏宰將墮三都於是桓子帥師墮費哀公二年桓子伐邾將伐絞邾人賂以漷沂之田而受盟焉三年城啓陽是歲司鐸火桓子御公立于象魏之外命救火者傷人則止曰財可為也令藏象魏曰舊章不可忘也秋桓子有疾命其臣正常曰無死南孺子之子男也則以告而立之女也則肥也可桓子卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退公使共劉視之則或殺之矣乃討之復立康子初定公時齊人饋女樂桓子受之孔子去適衛語具孔子傳中及桓子病謂康子曰昔者孔子幾興魯矣以吾受羣婢故去我死而相魯必召仲尼云季康子肥立哀公十年齊國書帥師伐魯及清康子用冉求之謀敗齊師于艾陵師還康子命修守備曰小勝大禍也齊至無日矣十一年欲以田賦使冉有訪諸仲尼仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私於冉有曰君子之行也度於禮施取於厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲用而法則周公之典在若欲茍而行又何訪焉弗聼卒用田賦二十三年宋景曹卒景曹宋元公夫人桓子外祖母康子使冉有弔且送葬曰敝邑有社稷之事使肥與有職競焉是以不得助執紼使求從輿人曰以肥之得備彌甥也彌謂逺也不腆先人之畜馬使求薦諸夫人之宰其可以稱旌繁乎越既滅吳欲霸中國二十五年公如越得太子適郢適郢越太子名得猶親也將妻公而多與之地或以告康子康子懼因太宰嚭而納賂焉嚭吳舊臣明年公至自越康子與孟武伯逆於五梧郭重僕見二子曰惡言多矣君請盡之公宴於五梧武伯為祝惡郭重曰何肥也康子曰請飲彘也以魯國之密邇仇讎臣是以不獲從君克免於大行又謂重也肥公曰是食言多矣能無肥乎飲酒不樂二十七年康子卒是歲哀公亦奔越叔孫莊叔名得臣其王父叔牙莊公之弟也莊公無適嗣愛孟女欲立其子般公疾問後於叔牙對曰慶父材莊公病其言以般屬之季友季友以公命鴆叔牙而立其後為叔孫氏語具季友傳叔牙生公孫兹曰戴伯戴伯生得臣文公元年王使毛伯衛錫文公命公使莊叔如周拜三年莊叔會諸侯伐沈以其服於楚也冬公如晉與晉侯盟晉侯饗公公賦菁菁者莪莊叔以公降拜曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂十一年鄋瞞侵齊遂伐魯公卜使莊叔追之吉侯叔夏御綿房甥為右富父終甥駟乘莊叔遂敗狄于鹹獲長狄僑如及虺也豹也而皆以名其子豹賢能世其家叔孫穆叔豹叔孫宣伯僑如之弟也初宣伯通於穆薑成公之母欲去季孟而取其室成公十六年公會晉侯伐鄭師次督揚使穆叔請逆于晉師宣伯將為亂構公及季孟於晉晉人執季平子公待命于鄆使子叔聲伯請季孫且言宣伯亂故於是晉許魯平而歸季孫焉國人逐僑如穆叔聞之奔齊季孫召穆叔于齊而立之襄公二年穆叔聘于晉三年及諸侯之大夫及陳袁僑盟四年夏如晉以報知武子之聘晉侯饗之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以饗元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牲君所以勞使臣也敢不重拜皇皇者華君教使臣曰必咨於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜是歲冬公如晉請屬鄫晉許之明年穆叔覿鄫太子于晉以成屬鄫也既而穆叔復以屬鄫為弗利告於晉使仍其舊焉七年衛孫文子來聘公登亦登穆子相趨進曰諸侯之會寡君未嘗後衛君今吾子不後寡君寡君未知所過吾子其少安孫子無辭亦無悛容穆叔曰孫子必亡為臣而君過而不悛亡之本也詩云退食自公委蛇委蛇謂從者也衡而委蛇必折其後文子竟不終十一年武子將作三軍告於穆叔曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆叔曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍十四年夏穆叔會諸侯之大夫伐秦十五年齊師伐魯穆叔與季孫城成郛以備之明年齊師又至穆叔如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶幾乎比執事之間恐無及也見中行獻子賦圻父獻子曰偃之罪也敢不從執事以同恤社稷而使魯及此見范宣子賦鴻鴈之卒章宣子曰丐在此敢使魯無鳩乎十九年齊及晉平故穆叔會范宣子于柯穆叔見叔向賦載馳之四章叔向曰肸敢不承命穆叔歸曰齊猶未也不可以不懼乃城武城二十二年春臧武仲如晉雨過御叔御叔在其邑將飲酒曰焉用聖人我將飲酒而已雨行何以聖為穆叔聞之曰不可使也而慠使人國之蠧也令倍其賦二十四年穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔丐之祖自唐虞已上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世祿非不朽也魯有先大夫曰臧孫辰既沒而言立其是之謂乎豹聞之太上有立德其次有立功其次有立言雖久而不廢此之謂不朽若夫保姓受氏以守宗祊世不絶嗣無國無之祿之大者不可謂不朽是嵗齊人為王城郟穆叔如周聘且賀城王嘉其有禮賜之大路二十七年齊慶封來聘其車美孟孫謂穆叔曰慶季之車不亦善乎曰豹聞之服美不稱必以惡終美車何為穆叔與慶封食不敬為賦相鼠亦不知也二十八年冬公如楚拜宋盟過鄭鄭伯不在伯有迋勞公於黃崖不敬穆叔曰伯有無戾於鄭鄭必有大咎敬民之主也而棄之何以承守鄭人不討必受其辜濟澤之阿行潦之蘋藻置諸宗室季蘭尸之敬也敬可棄乎及漢楚康王卒公欲反叔仲昭伯曰我楚國之為豈為一人行也子服惠伯曰君子有逺慮小人從邇飢寒之不恤誰遑其後不如姑歸也穆叔曰叔仲子專之矣子服子始學者也公遂行至楚楚人使公親襚公患之穆叔曰袚殯而襚則布幣也乃使巫以桃茢先袚殯楚人弗禁既而悔之三十年楚使薳罷來聘穆叔問王子圍之為政何如對曰吾儕小人食而聼事猶懼不給命而不免於戾焉與知政固問焉不告穆叔曰楚令尹將有大事子蕩將與焉助之匿其情矣冬穆叔會晉趙武及諸侯之大夫于澶淵謀宋災也明年至自會見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八九十者弗能久矣若趙孟死為政者其韓子乎吾子盍與季孫言之可以樹善君子也晉君將失政矣若不樹焉使早備魯既而政在大夫韓子懦弱大夫多貪求欲無厭齊楚未足與也魯其懼哉孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔出而告人曰孟孫將死矣吾語諸趙孟之偷也而又過焉是歲秋孟孝伯卒後三歲而趙孟亡如其言焉穆叔又與季孫語晉故季孫不從及趙文子卒晉公室卑政在侈家韓子為政不能圖諸侯魯不堪晉求讒慝滋多是以有平邱之會公之適楚也歸作楚宫穆叔曰太誓云民之所欲天必從之君欲楚也夫故作其宫若不復適楚必死是宫也六月公薨于楚宫魯人立胡女敬歸之子子野子野毁而卒立敬歸之娣齊歸之子公子裯穆叔不欲曰太子死有母弟則立之無則立長年鈞擇賢能鈞則卜古之道也非適嗣何必娣之子為且是人也居喪而不哀在戚而有嘉容是為不度不度之人鮮不為患若果立之必為季氏憂武子不聼卒立之比及葬三易衰衰衽如故衰於是昭公十九年矣猶有童心君子是以知其不能終也昭公元年春穆叔會諸侯之大夫于虢三月季武子伐莒取鄆莒人告於會楚告於晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂桓子相趙文子欲求貨於叔孫而為之請使請帶焉弗與梁其脛曰貨以藩身子何愛焉穆叔曰諸侯之會衛社稷也我以貨免魯必受師是禍之也何衛之為人之有牆以蔽惡也牆之隙壞誰之咎也衛而惡之吾又甚焉雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨然鮒也賄弗與不已召使者裂裳帛而與之曰帶其褊矣趙孟聞之曰臨患不忘國忠也思難不越官信也圖國忘死貞也謀主三者義也有是四者又可戮乎乃請諸楚曰魯雖有罪其執事不辟難畏威而敬命矣子若免之以勸左右可也若子之羣吏處不辟汚出不逃難其何患之有患之所生行而不治難而不守所由來也能是二者又何患焉不靖其能其誰從之魯叔豹可謂能矣請免之以靖能者子會而赦有罪又賞其賢諸侯誰不欣焉望楚而歸之視逺如邇疆場之邑一彼一此何常之有王伯之令也引其封疆而樹之官舉之表旗而著之制令過則有刑猶不可一於是乎虞有三苖夏有觀扈商有姺邳周有徐奄自無令王諸侯逐進狎主齊盟其又可一乎恤大舍小足以為盟主又焉用之封疆之削何國蔑有主齊盟者誰能辨焉吳濮有釁楚之執事豈其顧盟莒之疆事楚勿與知諸侯無煩不亦可乎莒魯爭鄆為日久矣茍無大害於其社稷可無亢也去煩宥善莫不競勸子其圖之固請諸楚楚人許之乃免叔孫叔孫歸曾夭御季孫以勞之旦及日中不出曾夭謂曾阜曰旦及日中吾知罪矣魯以相忍為國也忍其外不忍其內焉用之阜曰數月於外一旦於是庸何傷賈而欲贏而惡囂乎阜謂叔孫曰可以出矣叔孫指楹曰雖惡是其可去乎乃出見之三年邾穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其二又卑一睦焉逆羣好也其如舊而加敬焉志曰能敬無災又曰敬逆來者天所福也季孫從之初穆子之生也莊叔以易筮之遇明夷之謙以示卜楚邱曰是將行而歸為子祀以讒人入其名曰牛卒以餒死明夷日也日之數十故有十時亦當十位自王已下其二為公其三為卿日上其中食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀日之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗於人為言敗言為讒故曰有攸往主人有言言必讒也純離為牛世亂讒讒勝將適離故曰其名曰牛謙不足飛不翔垂不峻翼不廣故曰其為子後乎吾子亞卿也抑少不終及穆子辟難奔齊及庚宗遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶於國氏生孟丙仲壬夢天壓已弗勝顧而見人黑而上僂深目而豭喙號之曰牛助余乃勝之旦而皆召其徒無之且曰志之及宣伯奔齊饋之宣伯曰魯以先子之故將存吾宗必召女召女何如對曰願之久矣魯人召之不告而歸既立所宿庚宗之婦人獻以雉問其姓對曰余子長矣能奉雉而從我矣召而見之則所夢也未問其名號之曰牛曰唯皆召其徒使視之遂使為豎有寵長使為政公孫明知叔孫於齊歸未逆國薑子明取之故怒其子長而後使逆之田於邱蕕遂遇疾焉豎牛欲亂其室而有之強與孟盟不可叔孫為孟鍾曰爾未際期饗大夫以落之既具使豎牛請日入弗謁出命之日及賔至聞鍾聲牛曰孟有北婦人之客怒將往牛止之賔出使拘孟丙而殺諸外又強與仲盟不可仲與公御萊書觀於公公與之環使牛入示之入不示出命佩之牛謂叔孫曰見仲而何叔孫曰何為曰不見既自見矣公與之環而佩之矣遂逐之奔齊疾急命召仲牛許而不召杜泄見告之飢渴授之戈對曰求之而至又何去焉豎牛曰夫子疾病不欲見人使置饋于個而退牛弗進而置虛命徹四年十二月癸丑叔孫不食乙卯卒牛立昭子而相之公使杜泄葬叔孫豎牛賂叔仲昭子與南遺使惡杜泄於季孫而去之杜泄將以路葬且盡卿禮南遺謂季孫曰叔孫未乘路葬焉用之且冢卿無路介卿以葬不亦左乎季孫曰然使杜泄舍路不可曰夫子受命而朝而聘於王王思舊勳而賜之路復命而致之君君不敢逆王命而復賜之使三官書之吾子為司徒實書名夫子為司馬與工正書服孟孫為司空以書勳今死而弗以是棄君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之乃使以葬季孫謀去中軍豎牛曰夫子固欲去之五年季氏毁中軍以自益焉三軍之始作也三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公以書使杜泄告於殯曰子固欲毁中軍既毁之矣故告杜泄曰夫子唯不欲毁也故盟諸僖閎詛諸五父之衢受其書而投之帥士而哭之叔仲子謂季孫曰帶受命於子叔孫曰葬鮮者自西門季孫命杜泄杜泄曰卿喪自朝魯禮也吾子為國政未改禮而又遷之羣臣懼死不敢自也既葬而行仲至自齊季孫欲立之南遺曰叔孫氏厚則季氏薄彼實家亂子勿與知不亦可乎南遺使國人助豎牛以攻諸大庫之庭司宮射之中目而死豎牛取東鄙三十邑以與南遺叔孫昭子婼者穆子之庶子也穆子適齊娶於國氏生孟丙仲壬豎牛之亂殺孟丙而逐仲壬及穆子卒仲至自齊豎牛又殺之故立昭子而相之昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從殺適立庶又披其邑將以赦罪罪莫大焉必速殺之豎牛懼奔齊孟仲之子殺諸塞關之外投其首於寧風之棘上孔子曰叔孫昭子之不勞不可能也昭公築郎囿季平子欲速成之昭子曰詩云經始勿亟庶民子來焉用速成其以勦民也無囿猶可無民其可乎十年齊高強來奔昭子如晉還大夫皆見髙強見而退昭子謂諸大夫曰為人子不可不慎也哉昔慶封亡子尾多致邑而稍致諸君君以為忠而甚寵之將死疾于公宮輦而歸君親推之其子不能任是以在此忠為令德其子弗能任罪猶及之難不慎也喪夫人之力棄德曠宗以及其身不亦害乎十二年宋元公立華定來聘享之為賦蓼蕭弗知又不答賦昭子曰必亡宴語之不懷寵光之不宣令德之不知同福之不受將何以在十六年齊侯伐徐師至于蒲隧徐人行成徐子及郯人莒人會齊侯盟于蒲隧賂以甲父之鼎叔孫昭子曰諸侯之無伯害哉齊君之無道也興師而伐逺方會之有成而還莫之亢也無伯也夫詩曰宗周既滅靡所止戾正大夫離居莫知我肄其是之謂乎十七年小邾穆公來朝公與之宴季平子賦采菽穆公賦菁菁者莪昭子曰不有以國其能久乎夏六月甲戌朔日有食之祝史請用幣昭子曰日有食之天子不舉諸侯用幣於社伐鼓於朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否太史曰在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏平子弗從昭子退曰夫子將有異志不君君矣秋郯子來朝公與之燕昭子問焉曰少皥氏以鳥名官何也郯子曰吾祖也我知之昔黃帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名太皥氏以龍紀故為龍師而龍名我髙祖少皥摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏厯正者也元鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也雎鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也自顓頊已來不能紀逺乃紀於近為民師而命以民事則不能故也孔子聞之見於郯子而學之既而告人曰吾聞之天子失官學在四夷尤信十九年楚工尹赤遷隂于下隂令尹子瑕城郟昭子曰楚不在諸侯矣其僅自完也以持其世而已二十一年日有食之叔輒哭昭子曰子叔將死非所哭也八月叔輒卒二十三年邾人城翼還將自離姑公孫鉏曰魯將御我欲自武城還循山而南徐鉏邱弱茅地曰道下遇雨將不出是不歸也遂自離姑武城人塞其前斷其後之木而弗殊邾師過之乃推而蹶之遂取邾師獲鉏弱地邾人訴于晉晉人來討昭子如晉晉人執之使與邾大夫坐昭子曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服回在請使當之不敢廢周制故也乃不果坐韓宣子使邾人聚其衆將以昭子與之昭子聞之去衆與兵而朝士彌牟謂韓宣子曰子弗良圖而以叔孫與其讐叔孫必死之魯亡叔孫必亡邾邾君亡國將焉歸子雖悔之何及所謂盟主討違命也若皆相執焉用盟主乃弗與使客居一館士伯聼其辭而訴諸宣子乃皆執之士伯御叔孫從者四人過邾館以如吏先歸邾子士伯曰以芻蕘之難從者之病將館子於都昭子旦而立期焉乃館諸箕舍子服昭伯於他邑范獻子求貨於昭子使請冠焉取其冠法而與之兩冠曰盡矣魯為叔孫故申豐以貨如晉昭子曰見我吾告女所行貨見而不出明年晉士彌牟逆昭子于箕將歸之昭子使梁其脛待于門內曰余左顧而咳乃殺之右顧而笑乃止昭子見士伯士伯曰寡君以為盟主之故是以久子不腆敝邑之禮將致諸從者使彌牟逆吾子昭子受禮而歸初吏人之與昭子居於箕者請其吠狗弗與及將歸殺而與之食之昭子所館者雖一日必葺其牆屋去之如始至二十五年昭子聘于宋桐門右師見之語卑宋大夫而賤司城氏昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮今夫子卑其大夫而賤其宗是賤其身也能有禮乎無禮必亡是歲昭子如闞平子出昭公昭子自闞歸見平子平子稽顙曰子若我何昭子曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何平子曰茍使意如得改事君所謂生死而肉骨也昭子從公于齊與公言子家子命適公館者執之公與昭子言於帷內曰將安衆而納公公徒將殺昭子伏諸道左師展告公公使昭子自鑄歸平子有異志冬十月辛酉昭子齊於其寢使祝宗祈死戊辰卒子不敢立是為成子成子卒子州仇嗣叔孫武叔州仇以定公五年立初成子欲立武叔公若藐固諫曰不可成子立之而卒公南使賊射之不能殺公南為馬正使公若為郈宰武叔既定使郈馬正侯犯殺公若不能其圉人曰吾以劔過朝公若必曰誰之劔吾稱子以告必觀之吾偽固而授之末則可殺也使如之公若曰爾欲吳王我乎遂殺公若定公十年侯犯以郈叛武叔與孟懿子圍郈弗克秋二子及齊師再圍之弗克武叔謂郈工師駟赤曰郈非惟叔孫氏之憂社稷之患也將若之何對曰臣之業在揚水卒章之四言矣叔孫稽首駟赤謂侯犯曰居齊魯之際而無事必不可矣子盍求事於齊以臨民不然將叛侯犯從之齊使至駟赤與郈人為之宣言於郈中曰侯犯將以郈易於齊齊人將遷郈民衆凶懼駟赤謂侯犯曰衆言異矣子不如易於齊與其死也猶是郈也而得紓焉何必此齊人欲以此逼魯必倍與子地且盍多舍甲於子之門以備不虞侯犯曰諾乃多舍甲焉侯犯請易於齊齊有司觀郈將至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯駟赤偽將射之侯犯止之曰謀免我侯犯請行許之駟赤先如宿侯犯殿每出一門郈人閉之及郭門止之曰子以叔孫氏之甲出有司若誅之羣臣懼死駟赤曰叔孫氏之甲有物吾未敢以出犯謂駟赤曰子止而與之數駟赤止而納魯人侯犯奔齊齊人乃致郈武叔聘于齊齊侯享之曰子叔孫若使郈在君之他竟寡人何知焉屬與敝邑際故敢助君憂之對曰非寡君之望也所以事君封疆社稷是以敢以家𨽻勤君之執事夫不令之人天下之所惡也君豈以為寡君賜十二年仲由謀墮郈城武叔遂墮之哀公二年與孟懿子盟邾子于句繹三年與季桓子城啓陽冬及孟懿子帥師圍邾十一月從季孫敗齊師于艾陵武叔卒子舒立是為文子孟文伯榖公子慶父之孫也慶父賊殺莊公之子般又弒閔公遂出奔莒公子季友以賂求于莒而殺之事具魯世家中慶父既死季友立其後為仲孫氏亦曰孟氏慶父生公孫敖曰穆伯穆伯娶于莒曰戴已生文伯其娣聲已生惠叔戴已卒又聘于莒莒人以聲已辭則為襄仲聘焉襄仲穆伯從父兄弟文公七年徐伐莒莒人來請盟穆伯如莒蒞盟且為仲逆及鄢陵登城見之美自為娶之仲請攻之公將許之叔仲惠伯諫曰臣聞之兵作於內為亂於外為寇寇猶及人亂自及也今臣作亂而君不禁以啓寇讐若之何公止之惠伯成之使仲舍之公孫敖反之復為兄弟如初從之八年穆伯如周弔喪不至以幣奔莒從已氏於是魯人立文伯穆伯生二子於莒而求復文伯以為請襄仲使無朝聼命復而不出二年而盡室復適于莒文伯疾而請曰榖之子弱請立難也許之文伯卒立惠叔穆伯請重賂以求復惠叔以為請許之將歸及齊而卒告喪請葬弗許齊人或為孟氏謀曰魯爾親也飾棺置諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立於朝以待命許之取而殯之齊人送之葬視共仲共仲慶父也聲已不視帷堂而哭襄仲欲勿哭惠伯曰喪親之終也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔災祭敬喪哀情雖不同母絶其愛親之道也子無失道何怨於人襄仲叔帥兄弟以哭之孟獻子為政莒二子來獻子愛之聞於國或譖之曰將殺子獻子以告季文子二子曰夫子以愛我聞我以將殺子聞不亦逺於禮乎不如死一人門于句鼆一人門于戾邱皆死句鼆戾邱二邑有寇攻門二子禦之皆死初周內史叔服至魯公孫敖聞其善相人也見其二子焉叔服曰榖也食子難也收子榖也豐下必有後於魯國及敖卒文伯已死惠叔葬之文伯之子曰蔑孟獻子蔑宣公九年王徵聘於魯公使獻子聘如周王以為有禮厚賄之十四年楚子圍宋獻子言於公曰臣聞小國之免於大國也聘而獻物於是有庭實旅百朝而獻功於是有容貌采章嘉淑而有加貨謀其不免也誅而薦賄則無及也今楚在宋君其圖之公説明年使公孫歸父會楚子于宋是歲獻子會齊高固於無婁成公六年晉人來命伐宋故獻子及叔孫宣伯侵宋十三年春晉侯使郤錡來乞師將事不敬獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師將社稷是衛而惰棄君命不亡何為三月公如周朝王獻子為介王説獻子賜之加厚遂從公會晉侯伐秦獻子謂公曰晉帥乘和師必有大功及晉師與晉師戰于麻隧秦師敗績十八年秋公薨冬獻子會晉侯及諸侯盟于虛朾謀救宋也於是獻子請于諸侯而先歸會葬襄公元年春會諸侯之大夫圍宋彭城夏復會諸侯之大夫次于鄫二年秋會于戚冬復會于戚遂城虎牢三年公如晉盟於長樗獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣獻子曰以敝邑介在東表密邇仇讐寡君將君是望敢不稽首四年公如晉聼政晉侯享公公請屬鄫晉侯不許獻子曰寡君願固事君無失官命鄫無賦於司馬為執事朝夕之命敝邑敝邑褊小闕而為罪寡君是以願借助焉晉侯許之五年會吳于善道七年夏四月三卜郊不從乃免牲獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也十年楚子囊鄭子耳侵我西鄙還圍蕭八月丙寅克之九月子耳侵宋北鄙獻子曰鄭其有災乎師競已甚周猶不堪競况鄭乎有災其執政之三士乎是年也盜殺子駟子國子耳十五年宋向戌來聘且尋盟見獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢間十九年獻子卒獻子好禮其居喪也既􅎭縣而不樂比御而不入孔子曰獻子加於人一等矣獻子為卿不驕禮賢下能處已若虛士以是多歸之所友裘牧仲未嘗有獻子之家獻子亦能亡其家而與之齊子速嗣孟莊子速幼以勇聞於諸侯襄公十六年齊侯圍成孟孺子速徼之齊侯曰是好勇去之以為之名速遂塞海陘而還十八年從晉師圍齊范鞅門于雍門孺子斬其橁以為公琴示無畏也獻子卒莊子伐立二十年會莒人盟于向秋伐邾二十三年卒子羯嗣孟孝伯羯莊子之庶子孺子秩之弟也初孟氏之御騶豐點好羯也曰從余言必為孟孫再三云羯從之孟莊子疾豐點謂公鉏荀立羯請讐臧氏公鉏季武子長子為臧紇所黜故公鉏謂季孫曰孺子秩固其所也若羯立則季氏信有力於臧氏矣弗應已卯孟孫卒公鉏奉羯立于户側季孫至入哭而出曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也且夫子之命也遂立羯秩奔邾襄公二十四年孝伯帥師侵齊二十八年如晉告將為宋之盟故如楚也次年會諸侯之大夫城杞三十一年卒貜嗣孟僖子貜昭公之九年僖子以正卿聘于齊十年與季孫意如叔弓帥師伐莒十一年會邾莊公于祲祥二十四年卒初昭公如楚僖子從之鄭伯勞于師之梁僖子為介不能相儀及楚不能答郊勞僖子病之反自楚乃講學之茍能禮者從之及其將死也召其大夫曰禮人之幹也無禮無以立吾聞將有逹者曰孔邱聖人之後也而滅於宋其祖弗父何以國讓其弟厲公及其曾孫正考父佐三君位愈髙而德愈共臧孫紇有言曰聖人有明德者若不當世其後必有逹人今其將在孔丘乎我若獲沒必屬説與何忌於夫子使事之學禮焉以定其位故孟懿子與南宮敬叔師事仲尼焉仲尼曰能補過者君子也詩曰君子是則是效孟僖子可則效巳矣孟懿子何忌始僖子之盟於祲祥也泉邱人有女夢以其帷幕孟氏之廟遂奔僖子其僚從之盟于清邱之社曰有子無相棄也僖子使助薳氏之簉簉初又切反自祲祥宿於薳氏生懿子及南宮敬叔於泉邱人其僚無子使字敬叔故懿子得立昭公三十二年懿子會諸侯之大夫城成周定公三年及邾子盟于拔六年與季桓子圍鄆八年復與桓子侵衛十年與叔孫武叔圍郈以討侯犯之叛仲由之謀墮三都也叔孫氏墮郈季氏墮費將墮成公斂處父謂懿子曰墮成齊人必至于北門且成孟氏之保鄣也無成是無孟氏也子偽不知我將不墮故公圍成弗克哀公二年懿子伐邾邾人以漷東并沂西田為賂遂與叔孫武叔盟邾子于句繹十四年懿子卒子泄立是為孟武伯子服惠伯椒孟氏之支庶也故亦曰孟椒以王父字為氏襄公薨滕成公來會葬惰而多涕惠伯曰滕君將死矣怠於其位而哀巳甚兆於死所矣能無從乎三年而滕子卒昭公十二年南蒯以費叛如齊初南蒯之將叛也枚筮之遇坤之比曰黃裳元吉以為大吉也示惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外強內溫忠也和以率貞信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外內倡和為忠率事以信為共供養三德為善非此三者弗當且夫易不可以占險將何事也且可飾乎中美能黃上美為元下美為裳參成可筮猶有闕也筮雖吉未也十三年諸侯會于平邱邾莒怒魯訴于晉晉人執平子以歸惠伯從之惠伯私於中行穆子曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具若為夷棄之使事齊楚其何瘳於晉親親與大賞共罰否所以為盟主也子其圖之諺曰臣一主二吾豈無大國穆子告韓宣子曰楚滅陳蔡不能救而為夷執親將焉用之乃歸季孫惠伯有辭宣子患之乃用叔鮒之謀懼平子平子歸使惠伯待禮語具叔向傳惠伯卒子昭伯回嗣昭公十五年昭伯從公如晉既反語季平子曰晉之公室其將卑矣君幼六卿強而奢傲將因是以習習貫為常能無卑乎平子曰爾幼惡識國明年冬平子如晉葬昭公平子曰子服回之言猶信子服氏有子哉昭伯卒子何嗣子服景伯何哀公之三年僖宮災景伯至命宰人出禮書以待命命不共有常刑校人乘馬巾車脂轄百官官備府庫慎守官人肅給濟濡帷莫鬱攸從之蒙葺公室自太廟始外內以悛助所不給有不用命則有常刑無赦七年公會于鄫吳徵魯百牢景伯對曰先王未之有也吳人曰宋百牢我魯不可以後宋且魯牢晉大夫過十吳王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣若亦棄禮則有淫者矣周之王也制禮尚物不過十二以為天之大數也今棄周禮而曰必百牢亦唯執事吳人不聼景伯曰吳將亡矣棄天而背本不與必棄疾於我乃與之季康子欲伐邾乃饗大夫以謀之景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保於城城保於德失二德者危將焉保孟孫曰二三子以為何如惡賢而逆之對曰禹合諸侯於塗山執玉帛者萬國今其存者無𢾗十焉惟大不字小小不事大也知必危何故不言魯德如邾而以衆加之可乎不樂而出秋季子遂伐邾以邾子來獻于亳社邾茅夷鴻請救於吳明年吳師伐魯孟懿子謂景伯曰若之何對曰吳師來斯與之戰何患焉且召之而至又何求焉吳師克東陽而進舍於五梧明日舍於蠶室公賔庚公甲叔子與戰于夷獲叔子與析朱鉏明日舍于庚宗遂次于泗上微虎欲宵攻王舍私屬徒七百人三踊於幕庭卒三百人有若與焉及稷門之內或謂季孫曰不足以害吳而多殺國士不如已也乃止吳子聞之一夕三遷吳人行成將盟景伯曰楚人圍宋易子而食析骸而爨猶無城下之盟我未及虧而有此盟是棄國也吳輕而逺不能久將歸矣請少待之弗從景伯負載造於萊門乃請釋子服何於吳吳人許之以王子姑曹當之而後止十三年公會晉侯及吳子于黃池吳人將以公見晉侯景伯對使者曰王合諸侯則伯帥侯牧以見於王伯合諸侯則侯帥子男以見於伯自王已下朝聘玉帛不同故敝邑之職貢於吳有豐於晉無不及焉以為伯也今諸侯會而君將以寡君見晉君則晉成為伯矣敝邑將改職貢魯賦於吳八百乘若為子男則將半邾以屬於吳而如邾以事晉且執事以伯召諸侯而以侯終之何利之有焉吳人乃止既而悔之將囚景伯景伯曰何也立後於魯矣將以二乘與六人從遲速唯命遂囚以還及户牖謂太宰曰魯將以十月上辛有事於上帝先王季辛而畢何世有職焉自襄已來未之改也若不會祝宗將曰吳實然且謂魯不共而執其賤者七人何損焉太宰嚭見於王曰無損於魯而祗為名不如歸之乃歸景伯曹劌魯人以勇力聞於諸侯莊公十年齊師伐魯公將戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未遍民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乘戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之夏六月齊師宋師次于郎公用公子偃之謀大敗宋師于乘邱齊師乃還齊以不得志於魯也故欲益兵以伐魯魯不敢戰去國五十里而為之關請比於關內以從齊桓公許之魯人請盟故會于柯桓公與莊公既盟于壇上曹劌執匕首劫桓公桓公左右莫敢動而問曰子將何求劌曰齊強魯弱而大國侵魯亦巳甚矣今魯城壞即壓齊境君其圖之桓公乃許盡歸魯之侵地既巳言曹劌投其匕首下壇北面就臣之位顔色不變辭令如故桓公怒欲背其約管仲曰不可夫貪小利以自快而棄信於諸侯失天下援不如與之於是桓公遂割所侵地以盡復于魯二十三年公將如齊觀社曹劌諫曰不可夫禮所以整民也故會以訓上下之則制財用之節朝以正班爵之義帥長幼之序征伐以討其不然諸侯有王王有巡守以大習之非是君不舉矣君舉必書書而不法後嗣何觀公不聼遂如齊展喜公子展之後仕魯為大夫僖公二十六年齊孝公伐魯北鄙公使展喜犒師使受命于展禽禽喜之兄柳下惠也齊未入竟展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊人曰室如懸罄野無青草何恃而不恐對曰恃先王之命昔周公大公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府太師職之桓公是以紏合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊人乃還子家懿伯羈莊公之後以王父字為氏季平子之專國也諸大夫多怨昭公亦宿憾於季氏二十五年公為公若及郈昭伯之徒勸公討之公以告子家子對曰讒人以君徼幸事若不克君受其名不可為也舍民數世以求克事不可必也且政在焉其難圖也公退之辭曰臣與聞命矣言若泄臣不獲死乃館於公及伐季氏殺公之于門遂入之平子登臺而請欲待於沂上以察罪及請囚於費及以五乘亡皆不許子家子曰君其許之政自之出久矣隱民多取食焉為之徒者衆矣日入慝作弗可知也衆怒不可蓄也蓄而弗治將藴藴蓄民將生心生心同求將合君必悔之弗聼於是叔孫氏之司馬鬷戾請救季氏帥徒以陷公圍孟氏亦執郈昭伯殺之遂攻公徒子家子曰諸臣偽劫君者而負罪以出君止意如之事君也不敢不改公曰余不忍也與臧孫如墓謀遂行孫于齊齊侯唁公于平隂且曰自莒疆以西請致千社公喜子家子曰天祿不再天若祚君不過周公以魯足矣失魯而以千社為臣誰與之立且齊君無信不如早之晉弗從臧昭伯率從者將盟載書曰戮力一心好惡同之信罪之有無繾綣從公無通內外以公命示子家子子家子曰如此吾不可與盟羈也不佞不能與二三子同心而以為皆有罪或欲通外內且欲去君二三子好亡而惡定焉可同也陷君於難罪孰大焉通外內而去君君將速入弗通何為而何守焉乃不與盟二十六年公至自齊居于鄆孟懿子陽虎伐鄆鄆人將戰子家子曰天命不慆久矣使君亡者必此衆也天既禍之而自福也不亦難乎猶有鬼神此必敗也鳴呼為無望也夫其死於此乎公使子家子如晉公徒敗于且知於是公如齊齊侯請饗之子家子曰朝夕立於其朝又何饗焉其飲酒也乃飲酒焉齊侯使宰獻而請安子家子乃以君出遂如晉將如乾侯子家子曰有求於人而即其安人孰矜之其造於竟弗聼使請逆於晉晉人曰天禍魯國君淹恤在外君亦不使一個辱在寡人而即安於甥舅其亦使逆君使公復于竟而後逆之公復于鄆齊使髙張來唁公稱主君子家子曰齊卑君矣君祗辱焉故如乾侯衛侯來獻其馬曰啓服塹而死公將為之櫝子家子曰從者病矣請以食之乃以幃裹之三十一年晉侯召季平子使從荀躒如乾侯請公歸國子家子曰君與之歸一慙之不忍而終身慙乎公曰諾既而辭於知伯曰請必逐季孫而後歸荀躒掩耳而走使季孫歸祭語具季平子傳中季孫猶在乾侯子家子曰君以一乘入于魯師季孫必與君歸公欲從之衆從者脅公不得歸三十二年冬公疾遍賜大夫大夫不受賜子家子雙琥一環一璧輕服受之大夫皆受其賜頃之公薨子家子反賜於府人曰吾不敢逆君命也大夫皆反其賜明年叔孫成子逆公之喪于乾侯季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聼命焉子家子不見叔孫易幾而哭叔孫請見子家子子家子辭曰吾未得見而從君以出君不命而薨羈不敢見叔孫使告之曰公衍公為實使羣臣不得事君若公子宋主社稷則羣臣之願也凡從君出而可以入者將惟子是聼子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也寇而出者行可也若羈也則君知其出也而未知其入也羈將逃也遂亡陽虎季氏之家臣也昭公出季平子攝政陽虎以陪臣執國命國人憚之平子卒桓子立陽虎逐季氏之臣及其子若弟囚桓子與之盟而釋之事具桓子傳中定公六年魯侵鄭往不假道于衛及還陽虎使季孟自南門入出自東門舍於豚澤衛侯怒使彌子瑕追之公叔文子老矣輦而如公曰尤人而效之非禮也昭公之難君將以文之舒鼎成之昭兆定之鞶鑑茍可以納之擇用一焉公子與二三臣之子諸侯茍憂之將以為之質此羣臣之所聞也今將以小忿蒙舊德無乃不可乎太姒之子惟周公康叔為相睦也而效小人以棄之不亦誣乎天將多陽虎之罪以斃之君姑待之若何乃止夏季桓子如晉獻鄭俘陽虎強使孟懿子往報夫人之幣晉人兼享之孟孫立于房外謂范獻子曰陽虎若不能居魯而息肩於晉所不以為中軍司馬者有如先君獻子曰寡君有官將使其人鞅何知焉獻子謂簡子曰魯人患陽虎矣孟孫知其釁以為必適晉故強為之請以取入焉秋陽虎又盟公及三桓於周社盟國人于亳社詛于五父之衢明年齊國夏伐我陽虎御季桓子公斂處父御孟懿子將宵軍齊師齊師聞之墮伏而待之處父曰虎不圖禍而必死苫夷曰虎陷二子於難不待有司余必殺汝虎懼乃還不敗季寤公鉏極公山不狃皆不得志於季氏叔孫輒無寵於叔孫氏叔仲志不得志於魯陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏巳更孟氏故五人因陽虎以作亂八年冬順祀先公而祈焉辛卯禘于僖公壬辰將享季氏於蒲圃而殺之戒都車曰癸巳至成宰公斂處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也必及於子請先備諸與孟孫以壬辰為期陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿將如蒲圃桓子咋謂林楚曰而先皆季氏之良也爾以是繼之對曰臣聞命後陽虎為政魯國服焉違之徵死死無益於主桓子曰何後之有而能以我適孟氏乎對曰不敢愛死懼不免主桓子曰往也孟氏選圉人之壯者三百人以為公期築室於門外林楚怒馬及衢而騁陽越射之不中築者闔門有自門間射陽越殺之陽虎劫公與武叔以伐孟氏公斂處父帥成人自上東門入與陽氏戰于南門之內弗勝又戰于棘下陽氏敗陽虎説甲如公宮取寶玉大弓以出舍于五父之衢寢而為食其徒曰追其將至虎曰魯人聞余出喜於徴死何暇追余徒曰嘻速駕公斂陽在公斂陽請追之孟孫弗許陽欲殺桓子孟孫懼而歸之陽虎入于歡陽關以叛孔子書曰盜竊寶玉大弓故陽虎聞而歸之九年魯伐陽關陽虎使焚萊門師驚犯之而出奔齊請師以伐魯曰三加必取之齊侯將許之鮑文子諫曰臣嘗為𨽻於施氏矣魯未可取也上下猶和衆庶猶睦能事大國而無天災若之何取之陽虎欲勤齊師也齊師罷大臣必多死亡已於是乎奮其詐謀夫陽虎有寵於季氏而將殺季孫以不利魯國而求容焉親富不親仁君焉用之君富於季氏而大於魯國兹陽虎所欲傾覆也魯免其疾而君又收之無乃害乎齊侯執虎將東之陽虎願東乃囚諸西鄙盡借邑人之車鍥其軸麻約而歸之載蔥靈寢於其中而逃追而得之囚於齊又以蔥靈逃奔宋遂奔晉適趙氏趙鞅厚遇之仲尼曰趙氏其世有亂乎通志卷八十九
