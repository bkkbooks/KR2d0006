body:
  text: 通志卷一百三十六宋右迪功郎鄭樵漁仲撰列傳第四十九宋沈慶之慶之弟子文秀沈攸之臧寅雍之邊榮之程宗儼宗慤栁元景殷孝祖族子琰劉勔魯爽弟秀薛安都鄧琬劉胡宗越談金一童太吳喜黃回王宜興髙道慶沈慶之字𢎞先吳郡武康人也少有志力晉末孫恩作亂使其衆寇武康慶之未冠隨鄉族擊之屢捷由是以勇聞荒擾之後鄉邑離散慶之躬耕壟畝勤苦自立年三十未知名兄敞之為趙倫之征虜參軍監南陽郡擊蠻有功遂即真慶之往襄陽省兄倫之見而賞之倫之子伯符為竟陵太守倫之命伯符版為寧逺中兵參軍時竟陵蠻屢為寇慶之為設規略每擊破之伯符由此致將帥之稱永初二年慶之除殿中員外將軍又隨伯符𨽻到彥之北侵伯符病歸慶之仍𨽻檀道濟道濟北伐還白文帝稱慶之忠謹曉兵上使領隊防東掖門稍得引接出入禁省領軍劉湛知之欲相引接謂之曰卿在省年月久比當相論慶之正色曰下官在省十年自應得轉不復以此仰纍尋為正員將軍及湛被收之夕上開門召慶之慶之戎服履韎縛袴入上見而驚曰卿何意乃爾急裝慶之曰夜半喚隊主不容緩服乃遣收吳郡太守劉斌殺之元嘉十九年雍州刺史劉道産卒羣蠻大動征西司馬朱修之討蠻失利以慶之為建威將軍率衆助修之修之失律下獄慶之專軍進討大破緣沔諸蠻擒生口七千人後為孝武撫軍中兵參軍孝武以本號為雍州隨府西上時蠻寇太甚水陸梗阻孝武不得進遣慶之掩討大破之降二萬口孝武至鎮而驛道蠻反慶之又討之平定諸山獲七萬餘口又翦定鄖山蠻擒三萬餘口還都復為廣陵王誕北中郎中兵參軍加建威將軍南濟隂太守雍州蠻又為寇慶之以將軍太守復隨誕入沔及至襄陽率後軍中兵參軍栁元景隨郡太守宗慤等伐沔北諸山蠻大破之威震諸山羣蠻皆稽顙歸順慶之患頭風嘗好著狐皮帽羣蠻惡之號曰蒼頭公每見慶之軍輒畏懼曰蒼頭公已復來矣慶之引軍出前後破降甚衆又討犬羊諸山蠻蠻緣險築重城施門櫓甚峻慶之連營山下營中開門相通又令諸軍各穿池於營內朝夕不外汲兼以防蠻之火頃之風甚蠻夜下山人提一炬燒營火至輒以池水灌滅之蠻被圍守日久並飢乏自後稍出歸附慶之前後所獲之蠻並移京邑以為營户二十七年遷太子步兵校尉其年文帝將北侵慶之諫曰馬步不敵為日已久請舍逺事且以到彥之檀道濟言之道濟再行無功彥之失利而反今料王元謨等未踰兩將六軍之盛不過往時恐重辱王師難以得志上曰王師再屈别有所由道濟養寇自資彥之中塗疾動虜所恃唯馬夏水浩大泛舟濟河碻磝必走滑臺小戍易可覆拔剋此二戍館穀弔民虎牢洛陽自然不固比及冬間城守相接胡馬過河便成禽也慶之又固陳不可時丹陽尹徐湛之吏部尚書江湛並在坐上使湛之等難慶之慶之曰為國譬如治家耕當問奴織當訪婢陛下今欲伐國而與白面書生輩謀之事何由濟上大笑及軍行慶之副元謨元謨進圍滑臺慶之與蕭斌留守碻磝仍領斌輔國司馬元謨攻滑臺積旬不拔魏太武大軍南向斌遣慶之將五千人救元謨慶之曰少軍輕往必無益也會元謨退還碻磝斌欲斬之慶之固諫乃止文帝後問何故諫殺元謨對曰諸將奔退莫不懼罪自歸而死將至逃散大敵方至未宜自弱是以諫耳帝嘉之蕭斌以前驅敗績欲死固碻磝慶之曰深入寇境規求所欲退敗如此何可久住會詔使至不許退斌復問計於慶之慶之曰閫外之事將軍所專詔從逺來事勢已異節下有一范增而不能用空議何施斌及坐者並笑曰沈公乃更學問慶之厲聲曰衆人雖見古今不如下官耳學也元謨自以退敗求戌碻磝斌乃還歷城申坦垣護之共據清口慶之奔驛馳歸二十九年師復行慶之固諫不從以立議不同不使北出是時亡命司馬黑石廬江叛吏夏侯方進在西陽五水歡動羣蠻自淮汝間至江沔咸離其患乃遣慶之督諸將討之制江豫荆雍並遣軍受慶之節度三十年孝武出次五洲總統羣帥慶之從巴水出至五洲咨受軍略會孝武典籖董元嗣自建鄴還陳元凶弒逆孝武遣慶之料諸軍慶之謂腹心曰蕭斌婦人不足數其餘將帥並易與耳今輔順討逆不憂不濟也時元凶密與慶之書令殺孝武慶之入未見孝武稱疾不敢見慶之突前以元凶手書呈簡孝武泣求入內與母辭慶之曰下官受先帝厚恩常願報德今日之事唯力是視殿下何見疑之深帝起再拜曰國家安危在於將軍慶之即勒內外處分府主簿顔竣聞慶之至馳入見帝曰今西方尚未知義師之舉而劭據有天府首尾不相應赴此危道也宜待諸鎮脣齒然後舉事慶之厲聲曰今方興大事而黃頭小兒皆參預此禍至矣宜斬以徇衆帝曰竣何不拜謝竣起再拜慶之曰君但當知筆扎之事於是處分旬日內外整辦時皆謂神兵百姓欣悅衆軍既集假慶之為武昌內史領府司馬孝武還至尋陽慶之栁元景並以天下無主勸孝武即位不許賊劭遣慶之門生錢無忌齎書説慶之解甲慶之執無忌白之孝武踐阼以慶之為領軍將軍尋出為南兖州刺史加都督鎮旴台封南昌縣公孝建元年正月魯爽等反遣慶之與薛安都等往討之安都臨陳斬爽進慶之鎮北大將軍尋與栁元景俱開府儀同三司固辭改封始興郡公慶之以年滿七十固請辭事上嘉其意許之以為侍中左光祿大夫開府儀同三司又固讓乃至稽顙自陳言輒涕泣上不能奪聽以郡公罷就第月給錢十萬米百斛衛史五十人大明三年司空竟陵王誕據廣陵反復以慶之都督南兖徐三州諸軍事車騎大將軍開府儀同三司率衆討之誕遣客沈道愍齎書説慶之餉以玉鐶刀慶之遣道愍反數以罪惡慶之至城下誕登城謂曰沈公君白首之年何為來此慶之曰朝廷以君狂愚不足勞少壯故使僕來耳慶之塞塹造攻道立行樓土山并諸攻具時夏雨不得攻城上使御史中丞庾徽之奏免慶之官以激之制無所問誕餉慶之食提挈者百餘人慶之不開悉焚之誕於城上投函表令慶之為送慶之曰我奉制討賊不能為汝送表每攻城慶之輒身先士卒上戒之曰卿為督帥當令處分有方何須身受矢石邪自四月至七月乃屠城斬誕進慶之司空又固讓爵於是與栁元景並依晉密陵侯鄭袤故事朝會慶之位次司空元景在從公之上給恤吏五十人門施行馬初慶之嘗夢引鹵簿入厠中慶之甚惡入厠之鄙時有善占夢者為解之曰君必大富貴然未在旦夕問其故答云鹵簿故是富貴容厠中所謂後帝也知君富貴不在今主及中興之功自五校至是而登三事四年西陽五水蠻復為寇慶之以郡公統諸軍討平之慶之居清明門外有宅四所室宇甚麗又有園舍在婁湖慶之一夜擕子孫徙居之以宅還官悉移親戚中表於婁湖列門同閈焉廣開田園之業每指地語人曰錢盡在此慶之中興初身享大國家素富厚産業纍萬金奴僮千計再獻錢千萬穀萬斛以始興封優近求改封南海郡不許妓妾十數人並美容工藝慶之優遊無事盡意歡愈自非朝賀不出門每從逰幸及校獵據鞍陵厲不異少壯太子妃上孝武金鏤匕筯及杅杓上以賜慶之曰觴爵之賜宜以大夫為先也上嘗歡飲普令羣臣賦詩慶之粗有口辨手不知書眼不識字上逼令作詩慶之曰臣不知書請口授師伯上即令顔師伯執筆慶之曰微生值多幸得逢時運昌朽老筋力盡徒步還南岡辭榮此聖世何愧張子房上甚悅衆坐稱其詞意之美孝武晏駕慶之與栁元景等並受顧命遺詔若有大軍旅及征討悉委慶之前廢帝立加慶之几杖給三望車一乘慶之每朝賀常乘豬鼻無幰車左右從者不過三五騎履行園田政一人視馬而已每農桑劇日無人從行遇之者不知三公也及加三望車謂人曰我每逰履園田有人時則與馬成三無人時則與馬成二今乘此車安所之乎及賜几杖並固讓栁元景顔師伯嘗詣慶之會其逰田元景等鳴笳列卒滿道慶之獨與左右一人在田見之悄然改容曰夫貧賤不可居富貴亦難守吾與諸公並出貧賤因時際會榮貴至此唯當共思損挹之事老子八十之年目見成敗者已多諸君炫此車服欲何為乎於是插杖而耘不為之顧元景等徹侍蹇裳從之慶之乃與相對為歡慶之既通貴鄉里老舊素輕慶之者後見皆膝行而前慶之歎曰故是昔時沈公時諸沈為劫者數十人士民悉患之慶之詭為置酒大會於坐一時殺之於是合境肅清人皆喜悅廢帝狂悖無道衆咸勸慶之廢立及栁元景等連謀以告慶之慶之與江夏王義恭不厚發其事帝誅義恭元景等以慶之為侍中太尉及義陽王昶反慶之從帝渡江總統衆軍帝凶暴日甚慶之猶盡言諫諍帝意稍不悅及誅何邁慮慶之不同量其必至乃開青溪諸橋以絶之慶之果往不得度而歸帝又忌慶之乃遣其從子攸之齎藥賜慶之死時年八十是嵗旦慶之夢有人以兩匹絹與之謂曰此絹足度慶之寤而謂人曰老子今年不免兩匹八十尺也足度無盈餘矣乃死贈賻甚厚追贈侍中太尉如故給鸞輅輼輬車前後羽葆鼓吹諡曰忠武公未及葬帝敗明帝即位追贈侍中司空諡曰襄公太始七年改封蒼梧郡公慶之羣從婚戚由慶之在列位者數十人長子文叔位侍中慶之之死也不肯飲藥攸之以被掩殺之文叔密取藥藏録或勸文叔逃避文叔見帝斷截江夏王義恭支體慮奔亡之日帝怒容致義恭之變乃飲藥自殺文叔子昭明位祕書郎聞父死曰何忍獨生亦自縊死元徽元年還復先封時改始興為廣興昭明子曇亮襲廣興郡公齊受禪國除慶之次子文季與昭明昭略列在齊史慶之弟邵之南中郎行參軍邵之子文秀字仲逺前廢帝時纍遷青州刺史將之鎮部曲出次白下文秀説慶之以帝狂悖禍在難測欲以見衆圖之慶之不從及行慶之果見害帝又遣直閣將軍江方興領兵誅文秀未至而明帝已定亂時晉安王子勛據尋陽文秀與徐州刺史薛安都等並同子勛反尋陽平定明帝遣其弟文景喻之文秀即歸命請罪詔即安本任泰始四年封新城縣侯先是冀州刺史崔道固亦據城同反與文秀遣使引魏魏遣慕容白曜援之及白曜至而文秀已受朝命遂嬰城固守文秀善於撫馭被圍三載無叛者五年竟為白曜所剋城陷文秀取所持節衣冠儼然坐齋內亂兵入曰文秀何在文秀厲聲曰身是兵人執而裸送于白曜左右令拜文秀曰各二國大臣無相拜禮白曜忿之因至撾撻後還其衣為之設饌與長史房天樂司馬沈嵩等鎖送代京面縛數罪宥死待為下客給以粗衣蔬食魏獻文重其節稍亦嘉禮之拜外都下大夫孝文帝初遷外都大官孝文嘉其忠於國賜絹綵二百匹後為南征都將臨發賜以戎服除懷州刺史假吳郡公文秀在州政尚清節不能禁止盜賊然大興水田於公私頗有利益卒官子保沖後為徐州冠軍長史坐據清口退敗有司處之死刑孝文詔保沖文秀之子可特原命配洛陽作部終身宣武時卒於下邳太守房天樂者清河人滑稽多智文秀拔為長史督齊郡州事一以委之卒于洛陽弟子嘉慶漁陽太守沈攸之字仲達司空慶之之從父兄子也父叔仁為衡陽王義季征西府長史兼行參軍領隊攸之少孤貧元嘉二十七年魏軍南攻朝廷發三吳民丁攸之亦被發及至建鄴詣領軍將軍劉遵考求補白下隊主遵考以為形陋不堪攸之歎曰昔孟嘗身長六尺為齊相今求士取肥大者哉因隨慶之征討二十九年征西陽蠻始補隊主巴口建義授南中郎將版長兼行參軍新亭之戰身被重創事寧為太尉行參軍封平洛縣五等侯隨府轉大司馬行參軍晉世京邑二岸揚州舊置都部從事分掌二縣非違永初以後罷省孝建三年復置其職攸之掌北岸會稽孔璪掌南岸後又罷攸之遷員外散騎侍郎又隨慶之征廣陵屢有功被箭破骨孝武以其善戰配以仇池步矟事平當加厚賞為慶之所抑遷太子旅賁中郎攸之甚恨之前廢帝景和元年除豫章王子尚車騎中兵參軍直閣與宋越談金等並廢帝所寵誅戮羣公攸之等皆為之用命封東興縣侯明帝即位以例削封尋告宋越談金等謀反復召為直閣會四方反叛南賊已次近道以攸之為寧朔將軍尋陽太守率軍據虎檻時王元謨為大統未發前鋒有五軍在虎檻五軍又駱驛繼至每夜各立姓號不相稟受攸之謂軍吏曰今衆軍同舉而姓號不同若有耕夫漁婦夜相呵叱便致駭亂此敗道也請就一軍取號衆咸從之殷孝祖為前鋒都督大失人情攸之內撫將士外諧羣帥衆並安之時殷孝祖中流矢死軍主范潛率五百人投賊人情震駭並謂攸之宜代孝祖為統時建安王休仁屯虎檻總統衆軍聞孝祖死遣寧朔將軍江方興龍驤將軍劉靈遺各率三千人赴赭圻攸之以為孝祖既死賊有乘勝之心明日若不更攻則示之以弱方興名位相亞必不為已下軍政不一致敗之由乃率諸軍主詣方興推重并慰勉之方興甚悅攸之既出諸軍主並尤之攸之曰卿忘亷藺賈寇事邪吾本以濟國活家豈計此之升降明旦進戰自寅訖午大破賊於赭圻尋進號輔國將軍代孝祖督前鋒諸軍事薛常保等在赭圻食盡南賊大帥劉胡屯濃湖以囊盛米繫流查及船腹陽覆船順風而下以餉赭圻攸之疑其有異遣人取船及流查大得囊米尋剋赭圻遷寧蠻校尉雍州刺史加都督袁顗復率大衆來入鵲尾相持既久軍主張興世越鵲尾上據錢溪劉胡自攻之攸之率諸將攻濃湖錢溪信至大破賊攸之悉以錢溪所送胡軍耳鼻示之顗駭懼急追胡還攸之諸軍悉力進攻多所斬獲胡於是棄衆而奔顗亦奔走赭圻濃湖之平也賊軍委棄資財珍貨山積諸軍各競收斂以強弱為少多唯攸之與張興世約勒所部不犯秋毫諸將以此多之攸之進平尋陽遷中領軍封貞陽縣公時劉遵考為光祿大夫攸之在御坐謂遵考曰形陋之人今何如帝問之攸之依實對帝大笑纍遷郢州刺史為政刻暴或鞭士大夫上佐以下忤意輒面加詈辱而曉達吏事自強不息士民畏憚人莫敢欺聞有虎輒自圍捕往無不得一日或得兩三或逼暮不禽則宿昔圍守賦斂嚴苦徴發無度繕治船舸營造器甲自至夏口便有異圖進監豫司之二郡軍事進號領軍將軍泰豫元年明帝崩攸之與蔡興宗並在外藩同豫顧命會巴西人李承明反蜀土騷擾時荆州刺史建平王景素被徴新除荆州刺史蔡興宗未之鎮乃遣攸之權行荆州事會承明已平乃以攸之都督荆湘雍益梁寧南北秦八州諸軍事鎮西將軍荆州刺史至荆州聚斂兵力養馬至二千餘匹皆分賦邏將士使耕田而食廩財悉充倉儲荆州作部嵗送數千人仗攸之割留之簿上云供討四山蠻裝戰艦數百千艘沈之靈溪裏錢帛器械山積時幼主在位羣公當朝攸之漸懷不臣之迹朝廷制度無復遵奉富貴擬於王者夜中諸廂廊然燭達旦後房服珠玉者數百人皆一時絶貌江州刺史桂陽王休範密有異志欲以微旨動攸之使道士陳公昭作天公書一函題云沈丞相送付攸之門者攸之不開書推檢得公昭送之朝廷後廢帝元徽二年休範舉兵襲京邑攸之謂僚佐曰桂陽今逼朝廷必聲言吾與之同若不顛沛勤王必增朝野之惑於是遣使受郢州刺史晉熙王燮節度會休範平使乃還進攸之號征西大將軍開府儀同三司固辭開府攸之自擅閫外朝廷疑憚之纍欲徴入慮不受命乃止四年建平王景素據京城反攸之復應朝廷景素尋卒時有臺直閣髙道慶家在江陵因休在家牒其親戚十餘人求州從事西曹攸之唯用三人道慶大怒自入州取教毁之而去道慶素便馬攸之與宴飲於廳事前合馬槊道慶槊中攸之馬鞍攸之怒索刃槊道慶馳馬而出還都説攸之反狀請三千人襲之朝議慮其難濟齊髙帝又保持不許楊運長等常相疑畏乃與道慶密遣刺客齎廢帝手詔以金餅賜攸之州府佐吏進其階級時有象三頭至江陵城北數里攸之自出格殺之忽有流矢集攸之馬鄣泥其後刺客事發廢帝亦殞順帝即位進攸之號車騎大將軍開府儀同三司齊髙帝遣攸之長子司徒長史元琰齎廢帝刳斫之具以示攸之元琰至江陵攸之大怒曰吾寧為王陵死不作賈充生尚未得即起兵乃上表稱慶并與齊髙帝書云少帝昏狂宜與諸公密議共白太后下令廢之奈何交結左右親行弒逆移易朝舊布置親黨宫閣管籥悉關他人吾不知子孟孔明遺訓固如是乎足下既有賊宋之心吾敢捐包胥之節書至朝廷恇懼攸之有素書十數行常韜兩襠角云是明帝與己約誓又皇太后使至賜攸之燭十挺割之得太后手令曰國家之事一以委公其年十一月便舉兵其妾崔氏許氏諫曰官年已老那不為百口作計攸之指兩襠角以示之攸之素畜士馬資用豐積至是戰士十萬鐵馬三千遣使要雍州刺史張敬兒梁州刺史朝柏年司州刺史姚道和湘州行事庾珮玉巴陵內史王文和等敬兒文和斬其使馳表以聞柏年道和珮玉懷兩端密相應和十二月十二日攸之遣軍相繼下攸之自率大衆至夏口攸之將發江陵使沙門釋僧粲筮之云不至京邑當自郢州回還意甚不悅初發江津有氣狀如塵霧從西北來正蓋車上攸之聞齊髙帝世子據盆口震懾不敢下因盡鋭攻郢城齊髙帝遣衆軍西討尚書符征西府募得攸之有重賞并聲其罪惡齊髙帝出頓新亭攸之攻郢城日久屢為郢州行事栁世隆所破衆於是離散不可復制升明二年還向江陵聞城已為張敬兒所據無所歸乃與第三子中書侍郎文和至華容之􅀈頭林投州吏家此吏嘗為攸之所鞭至是待攸之甚厚不以往罰為怨殺豚薦食既而村人欲取之攸之於櫟林與文和俱自經死村人斬首送都或割其腹心有五竅征西主簿茍昭先以家財葬攸之攸之晚好讀書手不釋卷史漢事多所記憶常嘆曰早知窮達有命悔不十年讀書及攻郢城夜嘗風浪米船沈沒倉曹參軍崔靈鳳女先適栁世隆子攸之正色謂曰當今軍糧要急而卿不以在意由與城內婚姻邪靈鳳答曰樂廣有言下官豈以五男易一女攸之歡然意解攸之招集才力之士隨郡人雙泰真有幹力召不肯來攸之遣二十人被甲追之泰真射殺數人欲過家將母去事迫不獲單身走入蠻追者既失之録其母去泰真既失母乃自歸攸之不之罪曰此孝子也賜錢一萬轉補隊主其抑情待士如此初攸之賤時與吳郡孫超之全景文共乘一小船出京都三人共上引埭有人止之而相之曰君三人皆當至方伯攸之曰豈有三人而俱有此事相者曰骨法如此若有不驗便是相書誤耳其後攸之為郢荆二州刺史超之廣州刺史景文南豫州刺史景文字𢎞達齊永明中卒於光祿大夫攸之初至郢州有順流之志府主簿宗儼之勸攻郢城功曹臧寅以為攻守勢異非旬日所拔若不時舉銼鋭損威攸之不從既敗諸將帥皆奔散唯寅曰我委質事人豈可幸其成而責其敗乃投水死攸之在荆州倉曹金城邊榮為府録事所辱攸之為榮鞭殺録事攸之自江陵下以榮為留府司馬守城敬兒將至人或説之使詣敬兒降榮曰受沈公厚恩一朝緩急便改易本心不能也城敗見敬兒敬兒問曰邊公何為同人作賊何不早來榮曰沈荆州舉義兵匡社稷身雖可滅要是宋世忠臣天下尚有直言之士不可謂之為賊身本不蘄生何須見問敬兒曰死不難得命斬之榮歡笑而去容無異色太山程雍之素依隨榮至是抱持榮謂敬兒曰君入人國不聞仁惠之聲而先戮義士三楚之人寧蹈江漢而死豈肯與將軍同日而生敬兒曰求死甚易何為不許先殺雍之然後及榮三軍莫不垂泣曰奈何一日殺二義士比之臧洪及陳容廢帝之殞也攸之欲起兵問其知星人葛珂之珂之曰自古起兵皆候太白太白見則成伏則敗昔桂陽以太白伏時舉兵一戰授首此近世明驗今蕭公廢昏立明正值太白伏時此與天合也且太白尋出東方東方利用兵西方不利故攸之止不下及後舉兵珂之又曰今嵗星守南斗其國不可伐攸之不從果敗攸之表檄文疏皆其記室南陽宗儼之辭也事敗有司詰責之答曰士為知己用豈為君輩所識遂伏誅景和中攸之與齊髙帝同直殿省申以歡好帝以長女義興憲公主妻攸之第三子文和生二女並養之宫中恩禮甚厚及嫁皆得素舊公家營遣焉齊武帝制以攸之弟雍之孫僧昭為義興公主後僧昭別名法朗有道術在藝術傳中宗慤字元幹南陽湟陽人也叔父炳髙尚不仕慤年少時炳問其所志慤答曰願乘長風破萬里浪炳曰汝若不富貴必破我門户兄泌娶妻始入門夜被劫慤年十四挺身與劫相拒十餘人皆披散不得入室時天下無事士人並以文義為業炳既髙尚諸子羣從皆愛好墳典而慤獨任氣好武故不為鄉曲所知江夏王義恭為征北將軍南兖州刺史慤隨鎮廣陵引以為客時從兄綺為府主簿與慤同住綺妾與給吏牛秦私通綺嘗入直而秦潛來就妾慤知之操刃入內殺秦然後白綺義恭壯其意不罪也後以補國上軍將軍元嘉二十三年伐林邑慤自奮願行義恭舉慤有膽勇乃除振武將軍為安西參軍蕭景憲軍副隨交州刺史檀和之圍區粟城林邑遣將范毗沙達來救區粟和之遣偏軍拒之為賊所敗又遣慤慤乃分軍為數道偃旗潛進令曰聽鼓譟乃出山路榛深賊不為防卒見軍至驚走慤拔區粟乘勝泛海徑入象浦林邑王范陽邁傾國來逆以具裝被象前後無際諸將欲待後軍集然後進慤曰吾已屠堅城我氣方厲彼膽已破一戰可定然吾聞外國有師子威服百獸乃制為其形與象相禦象果驚奔衆因潰亂慤乃奮擊陽邁逆走遂克林邑收其珍異皆是未名之寶金銀各六萬兩其餘雜物不可勝計慤部領還臺一無所取既至唯有被梳枕刷此外蕭然文帝甚嘉之以為征北中兵參軍詔隨沈慶之討蠻慤與諸將攻之羣蠻大潰由是畏服三十年孝武伐逆召慤為南中郎咨議參軍領中兵新亭之戰與栁元景守北柵事平功次元景孝武即位以為左衛將軍封洮陽侯孝建中遷豫州刺史監五州諸軍事先是鄉人庾業家甚富豪侈侯服玉食與賔客相對膳必方丈而為慤設粟飯菜葅謂賔客曰宗軍人串噉粗食慤致飽而退初無異辭至是業為慤長史帶梁郡太守慤待之甚厚不以昔事為嫌大明三年竟陵王誕據廣陵反慤表求赴討乘驛詣都面受節度時車駕出白下會慤至上停輿慰勉慤聳躍數十左右顧盼上壯之初誕誑其衆云宗慤率衆助我及慤至躍馬繞城呼曰我宗慤也𨽻車騎大將軍沈慶之自當攻道事平入為左衛將軍五年從獵墮馬腳折不堪朝直以為光祿大夫加金章紫綬有佳牛堪進御官買不肯賣坐免官明年復先職廢帝即位為寧蠻校尉雍州刺史加都督卒贈征西將軍諡曰肅侯配食孝武廟庭子雍雲卒子元寶嗣栁元景字孝仁河東解人也髙祖純位平陽太守不拜曽祖卓自本郡遷於襄陽官至汝南太守祖恬西河太守父憑馮翊太守元景少便弓馬數隨父伐蠻以勇稱寡言語有器質荆州刺史謝晦聞其名要之未及往而晦敗雍州刺史劉道産深愛其能會荆州刺史江夏王義恭復召之道産謂曰久規相屈今貴王有召難輒相留殊為罔罔丁父憂服闋纍遷義恭司徒太尉城局參軍文帝見而又知之先是劉道産在雍州有惠化逺蠻歸懷皆出緣沔為村落户口殷盛及道産死羣蠻大為寇暴孝武西鎮襄陽義恭薦元景乃以為虎威將軍隨郡太守及至廣設方略斬其渠帥數百人郡境肅然隨王誕鎮襄陽元景復為後軍中兵參軍及朝廷大舉北討使諸鎮各出軍二十七年八月誕遣尹顯祖出資谷魯方平薛安都龎法起入盧氏田義仁出魯陽加元景建威將軍總統羣帥後軍外兵參軍龎季明年七十三秦冠族羌人多附之求入長安招懷關陜乃自資谷入盧氏盧氏人趙難納之法起方平安都諸軍遂入盧氏以趙難為盧氏令難驅率義徒為衆軍鄉導法起等度鐵嶺山次關方口季明出木城與法起相會元景大軍次臼口以前鋒深入懸軍無繼馳遣尹顯祖入盧氏以為諸軍聲援元景以軍食不足難可曠日相持乃束馬懸車引軍上百丈崖出溫谷以入盧氏法起諸軍進次方伯堆去𢎞農五里遂進圍𢎞農城生擒太守李初古以下百姓安堵元景引軍度熊耳山安都頓軍𢎞農法起進據潼關季明率方平趙難諸軍向陜十一月元景率衆至𢎞農營於關方口誕以元景為𢎞農太守初安都留住𢎞農而諸軍已進陜元景既到謂安都曰卿無坐守空城而令龎公孤軍深入宜急進軍衆軍並造陜下列營以逼之並大造攻具魏城臨河為固恃險自守季明安都方平顯祖趙難諸軍頻三攻未拔而魏洛州刺史張是提率二萬衆度崤救之安都方平列陳於城東南以待之魏兵大合輕騎挑戰安都嗔目橫矛單騎突陳四向奮擊左右皆辟易殺傷不可勝計於是衆兵鼓噪俱前士皆殊死戰魏多縱突騎衆軍患之安都怒甚乃脫兜鍪解所帶鎧唯著絳衲兩襠衫馬亦去具裝馳奔入賊陳猛氣咆勃所向無前當其鋒者無不應刃而倒如是者數四每入衆無不披靡魏軍奔入城詰朝魏軍又出列陳於城外方平諸軍並成列安都并領馬軍方平悉勒步卒左右掎角之餘諸義軍方於城西南列陳方平謂安都曰今勍敵在前堅城在後是吾取死之日卿若不進我當斬卿我若不進卿當斬我也安都曰善我豈惜身命乎遂列陳合戰初魏軍之將至也方平遣驛馳告元景時諸軍糧盡各餘數日食元景方督義租并上驢馬以為糧運之計遣軍副栁元怙勒衆從城南門函道直出北向結陳鼓譟而前魏衆大駭安都方平一時齊奮安都不勝其憤橫矛直前出入魏陳殺傷甚多流血凝肘矛折易之復入軍副談金率騎從而奔之自詰旦戰至日晏魏衆大潰斬張是提元景輕騎晨至面縛軍門者二千餘人諸將欲盡殺之元景以為不可乃釋而遣之皆稱萬嵗而去法起長驅入關關中義徒蜂起元景進軍𢎞農入壺關口時北討諸軍王元謨等敗退魏兵深入文帝以元景不宜獨進且令班師元景乃率諸軍自狐關度白楊嶺出于長洲安都斷後宋越副之法起自潼關向商城與元景會季明亦從胡谷南歸諸將並有功而入誕登城望之以鞍下馬迎元景除元景寧朔將軍時魯爽向虎牢復使元景率安都等北出爽退乃還再出北侵威信著於境外孝武入討元凶以為咨議參軍配萬人為前鋒宗慤安都等十三軍皆𨽻焉時義軍船乘小陋慮水戰不敵元景至蕪湖大喜倍道兼行潛至新亭依山建壘柵東西據險劭自登朱雀門督軍以元景壘塹未立遂攻之元景令軍中曰鼓繁氣易衰呌數力易竭但各銜枚疾戰一聽吾營鼓音元景察賊氣衰竭乃命開壘鼓譟以奔之賊衆大潰劭更率餘衆自來攻壘復大破之劭僅以身免上至新亭即位以元景為侍中領左衛將軍尋轉寧蠻校尉雍州刺史監雍梁南北秦四州荆之竟陵隨二郡諸軍事始上在巴口問元景事平何所欲對曰若有過恩願還鄉里故有此授初臧質起義以南譙王義宣暗弱易制欲相推奉潛報元景使率所領西還元景即以質書呈孝武語其信曰臧冠軍當是未知殿下舉義耳方應伐逆不容西還質以此恨之及元景為雍州質慮其為荆州後患稱爪牙不宜逺出上重違其言更以元景為領軍將軍加散騎常侍領石頭戍封枝江縣公孝建元年魯爽反遣左衛將軍王元謨討之加元景撫軍將軍假節置佐繼元謨後以為領南蠻校尉雍州刺史加都督臧質義宣並反王元謨南據梁山垣護之薛安都度據歷陽元景出屯采石元謨求益兵上使元景進屯姑熟元景悉遣精兵助王元謨以羸弱居守所遣軍多張旗幟梁山望之如數萬人皆謂京師兵悉至由是克捷與沈慶之俱以本號開府儀同三司改封晉安郡公固讓開府復為領軍太子詹事加侍中大明三年為尚書令太子詹事侍中中正如故以封在嶺南改封巴東郡公又命左光祿大夫開府儀同三司侍中中正如故又讓開府乃與沈慶之俱依晉密陵侯鄭袤不受司空故事六年進司空侍中中書令中正如故又固讓乃受驃騎大將軍南兖州刺史留衛京都孝武晏駕與太宰江夏王義恭僕射顔師伯並受遺詔輔幼主遷尚書令領丹陽尹侍中將軍如故加開府儀同三司給班劒二十人固辭班劒元景少時貧苦嘗下都至大雷日暮寒甚頗有羈旅之嘆岸側有一老父自稱善相謂元景曰君方大富貴位至三公元景以為戲之曰人生免飢寒幸甚豈望富貴老父曰後當相憶及貴求之不知所在元景起自將帥及當朝理務雖非所長而有宏雅之美時在朝勳要多事産業唯元景獨無所營南岸有數十畝菜園守園人賣菜得錢三萬送還宅元景怒曰我立此園種菜以供家中啖耳乃復賣以取錢奪百姓之利邪以錢乞守園人孝武嚴暴無常元景雖荷寵遇常慮及禍太宰江夏王義恭及諸大臣莫不重足屏息未嘗敢私相往來孝武崩義恭元景等並相謂曰今日始免橫死義恭與義陽等諸王元景與顔師伯等常相馳逐聲樂酣飲以夜繼晝前廢帝少有凶德內不能平殺戴法興後悖情轉露義恭元景等並憂懼無計乃與師伯等謀廢帝立義恭持疑不能速決發覺帝親率宿衛兵自出討之稱詔召元景左右奔告兵刃非常元景知禍至整朝服乘車應召出門逢弟車騎司馬叔仁戎服左右壯士數十人欲拒命元景苦禁之及出巷軍士大至元景下車受戮容色恬然年六十長子慶宗有幹力而情性不倫孝武使元景送還襄陽於道賜死次子嗣宗紹宗茂宗孝宗文宗仲宗成宗秀宗至是並遇禍元景六弟僧景僧珍叔宗叔政叔珍叔仁僧珍叔仁及子姪在都下襄陽死者數十人元景少子承宗嗣宗子謨並在孕獲全明帝即位贈太尉班劍三十人羽葆鼓吹一部諡曰忠烈公元景從父兄元怙大明末同晉安王子勛為逆事敗歸降元景從祖弟光世留鄉里在魏為河北大守封西陵男與司徒崔浩親浩被誅光世南奔明帝時位右衛將軍順陽太守子欣慰謀反光世賜死叔宗子世隆叔珍子慶逺齊史並有傳殷孝祖陳郡長平人也曾祖羡晉光祿勳父祖宦並不達孝祖少誕節好酒色有氣幹孝武帝時以軍功仕至積射將軍前廢帝景和元年為兖州刺史明帝即位四方反叛孝祖外甥司徒參軍頴川荀僧韶建議銜命徴孝祖入朝上遣之時徐州刺史薛安都遣薛索兒等屯據津徑僧韶間行得至説孝祖曰景和凶狂開闢未有朝野憂危假命刻漏主上曽不浹辰夷凶翦暴國亂朝危宜立長主公卿百辟人無異議而羣迷相扇搆造無端貪利幼弱競懷希幸舅少有立功之志長以氣節成名若能控濟河義勇還奉朝廷非惟匡主靜亂乃可以垂名竹帛孝祖即日棄妻子率文武二千人隨僧韶還都時普天同逆朝廷惟保丹陽一郡而永世縣尋又反叛內外憂危咸欲奔散孝祖忽至人情乃安進號冠軍將軍假節督前鋒諸軍事遣向虎檻拒對南賊御仗先有諸葛亮筒袖鎧鐵帽二十五石弩射之不能入上悉以賜孝祖孝祖負其誠節陵轢諸將臺軍有父子兄弟在南者孝祖並欲推治由是人情乖離莫樂為用時賊據赭圻孝祖將進攻之與大將王元謨別悲不自勝衆並駭怪泰始二年三月三日孝祖與賊合戰每戰常以鼓蓋自隨軍中相謂曰殷統軍可謂死將矣與賊交鋒而以羽儀自標顯若射者十手攢射欲不斃得乎是日於陳中流矢死追贈建安縣侯諡曰忠孝祖族子琰字敬珉父道鸞位衡陽王義季右軍長史琰少為文帝所知見遇與琅邪王景文相埒前廢帝永光元年纍遷黃門侍郎出為山陽王休祐右軍長史南梁郡太守休祐入朝琰乃行府州事明帝泰始元年以休祐為荆州會晉安王子勛反即以琰為豫州刺史土人前右軍杜叔寶等並勸琰同逆琰素無部曲無以自立受制於叔寶二年正月帝遣輔國將軍劉勔西討之築長圍創攻道於東南角并作大蝦蟇車載土以牛皮蒙之三百人推以塞塹十二月琰乃始降時琰有疾以版輿自詣將帥面縛請罪勔並撫宥之無所誅戮後除少府加給事中卒官琰性和雅靜素寡嗜欲諳前世舊事事兄甚謹少以名行見稱在夀陽被攻圍積時為城內所懷附揚州刺史王景文征西將軍蔡興宗司空褚淵並相與友善劉勔字伯猷彭城上里人也祖懷義父潁之位並郡守勔少有志節兼好文義家貧仕宋初為廣州增城令稍遷鬱林太守大明初還都徐州刺史劉道隆請為寧朔司馬竟陵王誕據廣陵為逆勔隨道隆受沈慶之節度事平封金城縣五等侯除西陽王子尚撫軍參軍入直閣先是費沈伐陳壇不剋乃除勔龍驤將軍西江督護鬱林太守勔既至隨宜翦定大致名馬并獻珊瑚連樹上甚悅前廢帝即位為屯騎校尉又入直閣明帝即位江州刺史晉安王子勛為逆四方響應勔以本官領建平王景素輔國司馬進據梁山會豫州刺史殷琰反叛召勔還都復兼山陽王休祐驃騎司馬致討破琰將劉順於寃唐杜叔寶於橫唐琰嬰城固守自始春至於末冬勔內攻外禦戰無不捷善撫將帥以寬厚為衆所依將軍王廣之求勔所自乘馬諸將並忿廣之叨冒勸勔以法裁之勔歡笑即時解馬與廣之及琰開門請降勔約令三軍不得妄動城內士民秋毫無所失百姓感悅咸曰來蘇百姓生為立碑還京都拜太子右衛率封鄱陽侯遷右衛將軍行豫州刺史加都督後徴拜散騎常侍中領軍勔以世路糾紛有懷止足求東陽郡上以勔啓遍示羣臣自尚書僕射袁粲以下莫不稱賀或謂其辭宜許上曰巴陵建平二王並有獨往之志若世道寧晏皆當申其所請勔經始鐘嶺之南以為栖息聚石蓄水髣佛邱中朝士雅素者多往遊之明帝臨崩顧命以為守尚書右僕射中領軍廢帝即位加兵五百人元徽初月犯右執法太白犯上將或勸勔解職勔曰吾執心行已無愧幽明若才輕任重災眚必及天道密微避豈能免桂陽王休範為亂奄至建鄴加勔使持節鎮軍將軍置佐鎮扞石頭既而賊衆屯朱雀航南右軍將軍王道隆率宿衛向朱雀聞賊已至急信召勔勔戰敗死之事平贈司空諡曰昭公子悛齊史有傳魯爽小字女生扶風郿人也祖宗之字彥仁晉太元末自鄉里出襄陽歷官至南陽太守義熙元年起義以功為雍州刺史武帝討劉毅與宗之同會江陵進號鎮北將軍封南陽公自以非武帝舊𨽻屢建大功有自疑之志會司馬休之見討猜懼因與休之北奔盡室入姚氏頃之病卒父軌一名象齒便弓馬膂力絶人為竟陵太守隨父入姚氏及武帝定長安軌與休之北奔魏魏以軌為荆州刺史襄陽公鎮長社孝武鎮襄陽軌遣親人程整奉書規欲南歸拔髮致誠以昔殺劉康祖及徐湛之父故不敢歸文帝纍遣招納許以為司州刺史爽少有武藝魏太武知之常置左右元嘉二十六年軌死爽代為荆州刺史襄陽公鎮長社幼染殊俗無復華風粗中使酒數有過失太武怒將誅之爽懼密懷歸南計爽有七弟次弟秀小字天念頗有意略仕魏以軍功為中書郎封廣陵侯或告太武鄴人欲反復遣秀檢察并燒石虎時餘殘宫殿秀常乘驛往返是時病還遲為太武所詰秀復恐懼太武尋南攻因從度河先是廣平人程天祚為殿中將軍有武力元嘉二十七年助戍彭城為魏所獲善針術深被太武賞愛封南安公常引置左右恆勸秀令南歸及太武至瓜步爽始得與秀定歸南之謀及太武還至湖陸爽等請曰奴與南國有讐每兵來常慮禍及墳墓乞共迎喪還葬國都北方羣下言於其主稱奴如中國稱臣也太武許之爽率腹心馳入虎牢爽唯第三弟在北餘家屬悉自隨部曲及願從合千家奔汝南遣秀詣夀陽奉箋於南平王鑠曰爽秀得罪晉朝負釁三世生長絶域逺身朔漠兄弟闔門淪沒偽朝殞命不可還國無因延係南雲傾屬東日蓋猶痿人思步盲者願明逼迫丹心仰希懷逺鑠馳驛以聞上大悅下詔以爽為督司州五郡諸軍事征虜將軍司州刺史秀輔國將軍榮陽潁川二郡守其諸子弟及同契士庶委征虜府以時申言詳加酬敘爽至汝南加領義陽內史秀仍參右將軍南平王鑠軍事爽北鎮義陽是嵗元嘉二十八年也魏人毁其墳墓明年四月入朝時太武已崩上更謀經略五月遣爽秀及程天祚等出許洛王元謨攻碻磝不拔敗退爽亦收衆南還三十年元凶弒逆南郡王義宣起兵入討爽即受命率部曲至襄陽與雍州刺史臧質俱詣江陵義宣留爽江陵事平以爽為左將軍豫州刺史加都督爽至夀陽便曲意賔客爵命士人蓄仗聚馬如寇將至元凶之為逆也秀在建鄴元凶謂秀曰我為卿誅徐湛之矣方相委任以秀為右軍將軍配精兵使攻新亭壘將戰秀命打退軍鼓因此歸順孝武即位以為左將軍司州刺史加都督領汝南太守爽與義宣及質相結已久義宣等亦欲資其勇力情契甚至孝建元年二月義宣與爽謀反報爽俟秋同舉爽狂酒乖謬即日便起兵使其衆戴黃標稱建平元年便竊造法服義宣質聞爽已處分便狼狽同反爽於是送所造輿服詣江陵版義宣及臧質等文曰丞相劉今補天子名義宣車騎臧今補丞相名質平西朱今補車騎名修之皆版到奉行義宣駭愕爽所送法物並留竟陵縣不聽進使爽直至歷陽自采石濟軍與質水陸俱下孝武遣左軍將軍薛安都步騎為前驅鎮軍將軍沈慶之後進安都進軍與爽遇於小峴爽親戰而飲酒遇醉安都刺爽馬倒左右斬首傳送京師進平夀陽子弟並伏誅初義宣舉兵也召秀假節進號征虜將軍及義宣敗還江陵與秀北走衆叛且盡斬首傳京師薛安都字休達河東汾隂人也世為強族族衆有三千家父廣為宗豪武帝定關河以廣為上黨太守安都少驍勇身長七尺八寸便弓馬頗結輕俠諸兄患之安都乃求以一身分出不取片資兄許之居於別廄逺近交遊者爭有送遺馬牛衣服什物充滿其庭仕魏以軍功為雍秦二州都統元嘉二十一年來奔求北還構扇河陜招聚義衆文帝許之孝武鎮襄陽版為揚武將軍北𢎞農大守以北軍強盛乃歸襄陽二十七年隨王誕版安都為建武將軍隨栁元景向關陜率步騎居前所向克捷二十九年魯爽向虎牢安都復隨元景北出即據關城期俱濟河取蒲坂會爽退乃還孝武伐逆加寧朔將軍與元景俱發至朱雀航橫矛瞋目叱賊將皇甫安民等曰賊弒君父何心事之孝武踐阼除右軍將軍率所領騎馬為前鋒直入殿庭賊尚有數百人一時奔散以功封南鄉男安都初征關陜至臼口夢仰頭見天正見天門開謂左右曰汝等見天門開否至是嘆曰夢天門開乃中興之象邪從弟道生亦以軍功為大司馬參軍犯罪為秣陵令庾淑之所鞭安都大怒即日乘馬從數十人令左右執矟欲往殺淑之行至朱雀航逢栁元景遙問曰薛公何之安都躍馬至元景車後曰小子庾淑之鞭我從弟今指往刺殺之元景慮其不可駐車紿之曰小子無宜適卿往與手甚快安都既回馬元景復呼之令下馬入車因責之曰卿從弟服章言論與寒細不異且人身犯罪理應加罰卿為朝廷勳臣宜崇奉法憲云何放恣輒於都邑殺人非惟科律所不容主上亦無辭以相宥載與俱歸安都乃止其年以憚直免官孝建元年除左軍將軍及魯爽反叛上遣安都率步騎據歷陽爽以衆阻大峴食少引還沈慶之使安都率輕騎追之及爽於小峴爽自與腹心壯騎斷後安都望見爽便躍馬大呼直往刺之應手而倒斬爽首爽纍世梟猛生習戰陳咸云萬人敵安都單騎直入斬之而反時人皆謂關侯斬顔良不過是也進爵為侯時王元謨拒南郡王義宣臧質於梁山安都復領騎為支軍義宣遣將劉湛及臧質攻元謨元謨命衆軍擊之使安都引騎出賊陳右橫擊陷之賊遂大潰轉太子右衛率大明元年魏軍向無鹽遣安都領馬軍東陽太守沈法系統水軍並授徐州刺史申坦節度時魏軍已去坦求回軍討任榛見許會天旱水泉多竭人馬疲困不能逺追安都法系坐白衣領職坦繫尚方任榛大城在任城界積世逋叛所聚棘榛深密難為用師故能久自保藏屢為人患安都明年復職改封武昌縣侯景和元年為平北將軍徐州刺史加都督明帝即位進號安北將軍安都不受命舉兵同晉安王子勛初安都從子索兒前廢帝景和中以為前軍直閣明帝以為左將軍直閣如故安都將為逆密信報之又遣人至瓜步迎接時右衛將軍栁光世亦與安都通謀二人俱逃擕安都諸子及家纍席卷北奔青州刺史沈文秀冀州刺史崔道固並皆同反明帝遣齊髙帝率前將軍張永等北討所至奔散斬薛索兒子勛平定安都遣別駕從事史畢衆愛下邳太守王煥等奏啓事詣明帝歸欵薛索兒之死也安都使栁光世守下邳至是亦率所領歸降明帝以四方已平欲示威於淮外遣張永沈攸之以重軍迎安都安都謂既已歸順不應遣重軍懼不免罪乃遣信投誠於魏以第四子道次為質魏獻文乃遣鎮東大將軍尉元等赴之拜安都鎮南大將軍徐州刺史賜爵河東公元等既入彭城安都中悔謀圖元等元知之遂不果發安都因重貨元等委罪於女壻裴祖隆元乃殺祖隆而隱安都謀魏皇興二年與畢衆敬朝于代甚見禮重子姪羣從並處上客皆封侯至於門生無不收敘又為起第宅館宇崇麗資給甚厚明年卒時年六十贈黃鉞秦州刺史河東王諡曰康子道􅋆襲爵位平州刺史政有聲稱歷相秦二州刺史卒道􅋆弟道異亦以勳為第一客早卒贈秦州刺史安邑侯道異弟道次既質京師賜爵安邑侯位秦州刺史進河南公鄧琬字元琰豫章南昌人也父允之孝武征虜長史光祿勳孝武起義初琬為南海太守以弟瓊與臧質同逆逺徙仍停廣州久之得還歷位丹陽郡丞大明七年車駕幸歷陽追思在藩之舊擢琬為給事黃門侍郎明年出為晉安王子勛鎮軍長史尋陽內史行江州事前廢帝狂悖無道以文帝孝武帝並次居第三以登極位子勛次第既同深致嫌疑因何邁之謀乃遣使齎藥賜子勛死使至子勛典籖謝道邁主帥潘欣之侍書褚靈嗣等馳以告琬泣涕請計琬曰身南土寒士蒙先帝殊恩以愛子見託豈得惜門户百口當以死報效景和元年冬子勛戎服出聽事宣旨欲舉兵四座未答録事參軍陶亮曰請效死前驅衆並奉旨會明帝定亂進子勛號車騎將軍開府儀同三司令書至諸佐史並喜造琬曰暴亂既除殿下又開黃閣實為公私大慶琬取令書投地曰殿下當開端門黃閣是吾徒事耳衆並駭愕琬與陶亮等繕治器甲徴兵四方郢州刺史安陸王子綏荆州刺史臨海王子頊會稽太守尋陽王子房雍州刺史袁顗梁州刺史栁元怙益州刺史蕭惠開廣州刺史袁曇逺徐州刺史薛安都青州刺史沈文秀冀州刺史崔道固湘州行事何惠文吳郡太守顧琛吳興太守王曇生晉陵太守袁摽義興太守劉延熙並同叛逆琬乃建牙於桑尾傳檄建鄴購明帝萬户侯布絹二萬匹金銀三百斤其餘各有差明帝遣荆州典籖邵軍乘驛詣江陵經過襄陽袁顗馳書報琬勸勿解甲并奉勸子勛即偽位琬乃稱説符瑞令顧昭撰為瑞命記造乘輿御服立宗廟設壇場矯作崇憲太后璽令羣僚上偽號於子勛泰始三年正月七日即位於尋陽城改景和三年為義嘉元年其日雲雨晦合行禮忘稱萬嵗取子勛所乘車除腳以為輦置偽殿之西其夕有鳩集其中梟集其幰又有秃鶖鳥集城上拜安陸王子綏為司徒因雷電晦冥震其黃閣柱鴟尾墮地又有鴟集其帳上琬性鄙暗貪吝過甚財貨酒食皆身自量校至是父子並賣官鬻爵使婢僕出市道販賣酣歌博奕日夜不休賔客到門者歷旬不得前內事悉委褚靈嗣等三人羣小競為威福士庶忿怨內外離心矣明帝遣領軍將軍王元謨領水軍南討吳興太守張永為繼尚書下符奉詔以四王幼弱不幸被難兵交之日不得妄加侵犯若有逼損誅翦無貸琬遣孫沖之等前鋒一萬據赭圻沖之於道與子勛書欲沿流挂帆直取白下請速遣陶亮衆軍相接分據新亭亮大無幹略聞建安王休仁自上殷孝祖又至不敢進及孝祖中流矢死沈攸之代為前鋒沖之謂陶亮曰孝祖梟將一戰便死天下事定矣不須復戰便當直取京師亮不從明帝遣員外散騎侍郎王道隆至赭圻督戰衆軍奮擊大破之琬遣豫州刺史劉胡來屯鵲尾胡宿將攸之等甚憚之胡鄉人蔡那佼長生張敬兒各領軍𨽻攸之在赭圻胡因要那等共語那等説令歸順胡回軍入鵲尾無他權略建安王休仁自虎檻進據赭圻時胡等兵衆強盛逺近疑惑明帝欲綏慰人情遣吏部尚書褚淵至虎檻選用將帥以下申謙杜幼文因此求黃門沈懷明劉亮求中書郎建安王休仁即使淵擬選上不許曰忠臣殉國不謀其報臨難以干朝典豈為下之節沈攸之等與劉胡相持久不決上又遣強弩將軍任農夫等領兵繼至攸之繕修船舸板材不周計無所出會琬送五千片榜供胡軍用俄而風潮奔迅榜突柵出江胡等力不能制趂流而下泊攸之等營於是材板大足琬進袁顗都督征討諸軍事率樓船千艘來入鵲尾張興世建議越鵲尾上據錢溪斷其糧道胡纍攻之不能克乃遣龍驤將軍陳慶領三百舸向錢溪戒慶不須戰陳慶至錢溪不敢攻越溪於梅根立寨胡別遣將王起領百舸攻興世興世擊大破之胡率其餘舸馳還顗更使胡攻興世休仁因此命沈攸之吳喜佼長生劉雴遺劉伯符等進攻濃湖造皮艦千乘拔其營柵苦戰移日大破之顗被攻急馳信召胡令還張興世既據錢溪江路阻斷胡軍乏食琬大送資糧畏興世不敢下胡遣將迎之為錢溪所破夜走徑趣梅根顗聞胡走亦棄衆西奔至青林見殺琬惶擾無計初子勛建偽號以吳郡張悅與琬共附偽政悅見事敗稱疾呼琬計事令左右伏甲戒之若聞索酒便出琬至謀斬晉安王封府庫以謝罪悅曰寧可賣殿下求活邪因呼求酒再呼左右震懾不能應第二子詢提刀出餘人續至即斬琬悅因齎琬首詣建安王休仁降蔡那子道深以父為明帝效力被繫作部因亂脫鎖入城執子勛囚之沈攸之諸軍至江州斬子勛於桑尾牙下傳首建鄴劉胡走入沔竟陵郡丞陳懷直斷道邀之胡人馬既疲困因隨懷直入城告渴得酒飲畢引佩刀自刺不死斬首送建鄴張興世弟僧彥追殺懷直取胡首竊有其功荆州聞濃湖平更議奉子頊奔益州就蕭惠開典籖阮道預邵宰不同曰雖復欲西豈可得至遣使歸罪荆州中從事宗景土人姚儉等勒兵入城執子頊以降劉胡南陽涅陽人也本以面坳黑似胡故名坳胡及長單名胡焉出身郡將稍至隊主討伐諸蠻往無不捷明帝即位除越騎校尉蠻甚畏憚之小兒啼輒怖云劉胡來便止宗越南陽葉人也本為南陽次門安北將軍趙倫之鎮襄陽襄陽多雜姓越更被黜為役門出身補郡吏父為蠻所殺越於市中刺殺讐人太守夏侯穆嘉其意擢為隊主蠻有為寇盜者常使越討伐往輒有功家貧無以市馬刀楯步出單身挺戰衆莫能當每一捷郡輒賞錢五千因此得買馬元嘉二十四年啓文帝求復次門移户屬冠軍縣許之二十七年隨栁元景侵魏領馬幢𨽻栁元怙有戰功還補後軍參軍督護隨王誕戲之曰汝何人遂得我府府資四字越答曰佛狸未死不憂不得咨議參軍誕大笑孝武即位以為江夏王義恭大司馬行參軍濟陽太守臧質魯爽反朝廷致討越戰功居多追奔至江陵時荆州刺史朱修之未至越多所誅戮又逼略南郡王義宣子女坐免官繫尚方尋被宥追論前功封范陽縣子大明三年為長水校尉竟陵王誕據廣陵反越領馬軍𨽻沈慶之攻誕及城陷孝武使悉殺城內男丁越受旨行誅躬臨其事莫不先加捶撻或有鞭其面者欣欣然若有所得凡殺數千人改封始安縣子前廢帝景和元年進爵為侯召為遊擊將軍直閣領南濟隂太守改領南東海太守帝凶暴無道而越談金童太一並為之用命誅戮羣公及何邁等莫不盡心竭力故帝憑其爪牙無所忌憚賜與越等美女金帛充牣其家越等武人粗強識不及逺感一往意氣皆無復二心帝時南巡明旦便發其夕悉聽越等出外宿明帝因此定亂明晨越等並入被撫接甚厚越改領南濟隂太守本官如故越等既為廢帝盡心慮明帝不能容之上接待雖厚內並懷懼上意亦不欲使其居中從容謂曰卿遭罹暴朝勤勞日久兵馬大郡隨卿等所擇越等素已自疑及聞此旨皆相顧失色因謀作難以告沈攸之攸之具白帝即日下獄死越善立營陳每數萬人止頓自騎馬前行使軍人隨其後馬止營合未嘗參差及沈攸之代殷孝祖為南討前鋒時孝祖新死衆心並懼攸之嘆曰宗公可惜故有勝人處而性嚴酷好行刑誅時王元謨御下亦少恩將士為之語曰寧作五年徒不逐王元謨元謨猶尚可宗越便殺我談金在魏時與薛安都有舊後出新野居牛門村及安都歸國金常隨征討副安都排堅陷陳氣力兼人孝建三年為屯騎校尉直閣領南清河太守景和元年前廢帝誅羣公金等為之用封金平都縣男童太一宜陽縣男沈攸之東興縣男越州里又有武念佼長生曹欣之蔡那並以將帥顯武念位至南陽太守長生寧蠻校尉曹欣之驍騎將軍蔡那見子道恭傳吳喜吳興臨安人也本名喜公明帝減為喜出身為領軍府白衣吏少知書領軍將軍沈演之使寫起居注寫既畢暗誦略皆上口演之嘗作讓表未奏失本喜經一見即寫無所漏脫演之甚知之因此涉獵史漢頗見古今演之門生朱重民入為主書薦喜為主書吏進為主圖令史文帝嘗求圖畫喜開卷倒進之帝怒遣出會太子步兵校尉沈慶之征蠻啓文帝請喜自隨為孝武所知稍遷至河東太守殿中御史明帝即位四方反叛喜請得精兵三百致死於東帝大悅即假建武將軍簡羽林勇士配之議者以喜刀筆吏不嘗為將不可遣中書舍人巢尚之以喜隨沈慶之屢經軍旅性既勇決又習戰陳若能任之必有成績喜乃東討喜在孝武世既見驅使性寬厚所至人並懷之及東討百姓聞吳河東來便望風降散故喜所至克捷遷步兵校尉封竟陵縣侯東土平定又率所領南討遷尋陽太守泰始四年改封東興縣侯除右軍將軍淮陽太守兼太子左衛率三年轉驍騎將軍太子兼率如故其年大破魏軍於荆亭六年又率軍向豫州拒魏軍加都督豫州諸軍事明年還建鄴初喜東征白明帝得尋陽王子房及諸賊帥即於東梟斬東土既平喜見南賊方熾慮後翻覆受禍乃生送子房還都凡諸大帥顧琛王曇生之徒皆被全活上以喜新立大功不問而心銜之及平荆州恣意剽虜贓私萬計又嘗對客言漢髙魏武本是何人上聞之益不悅後夀寂之死喜內懼因乞中散大夫上尤疑之及上有疾為身後之患疑其將來不能事幼主乃賜死上召入內殿與言謔酬接甚欵賜以名饌並金銀御器勑將命者勿使食器宿喜家上素多忌諱不欲令食器停凶禍之室故也及喜死發詔賻贈子徽人襲黃回竟陵郡軍人也出身充郡府雜使稍至傳教臧質為郡轉為齋帥及去職以回自隨質討元凶回隨從有功免軍户後隨質於梁山敗走被録遇赦因下都於宣陽門與人相競詐稱江夏王義恭馬客被鞭二百付右尚方會中書舍人戴明寶被繫差回為户伯奉事明寶竭心盡力明寶尋得原散委任如初啓免回以領隨身隊統知宅及江西墅事性巧觸類多能明寶甚寵任之回拳捷果徑勇力兼人在江西與諸楚子相結屢為劫盜會明帝初即位四方反叛明寶啓帝使回募江西楚人得快手八百𨽻劉勔西討纍遷至將校以功封葛陽縣男元徽初桂陽王休範為逆回以屯騎校尉領軍𨽻齊髙帝於新亭創詐降之計回見休範可乘謂張敬兒曰卿可取之我誓不殺諸王敬兒即日斬休範事平進爵為侯改封聞喜縣四年遷冠軍將軍南琅邪濟陽二郡太守建平王景素反回又率軍前討城平日回軍先入又以景素功讓張敬兒奴倪奴明年遷右軍將軍沈攸之反以回為平西將軍郢州刺史率衆出新亭為前鋒未發而袁粲據於石頭不從齊髙帝回與新亭諸將任候伯彭文之王宜興等謀應粲攻髙帝於朝堂事既不果髙帝撫之如舊回與宜興素不協斬之宜興吳興人也形狀短小而果徑有膽力少年時為劫不須伴郡縣討逐圍繞數十重終莫能擒嘗舞刀楯回使十餘人以水交灑不能著明帝泰始中為將在夀陽間與魏戰每以少制多挺身深入以平建平王景素功封長樂縣男至是為屯騎校尉見殺回進軍未至郢州而沈攸之敗走回不樂停郢州固求南兖遂率部曲輒還改封安陸郡公徙南兖州刺史加都督齊髙帝以回專殺終不附己乃使召之及上車愛妾見赤光冠其頭至足苦止不肯住及至見誅回既貴祗事戴明寶甚謹言必自名未嘗敢坐躬至帳下及入內料檢有無隨乏供送以此為常回同時為將有南郡髙道慶凶險暴橫求欲無已有失其意輒加捶拉往往有死者朝廷畏之如虎狼齊髙帝與袁粲等議收付廷尉賜死通志卷一百三十六
