body:
  text: 通志卷一百四十四宋右迪功郎鄭樵漁仲撰列傳第五十七陳杜僧眀周文育子寶安侯瑱侯安都歐陽頠子紇黃法氍淳于量章昭達吳眀徹胡穎徐度子敬成杜稜周鐵虎程靈洗子文季沈恪陸子隆子之武弟子才錢道戢駱牙孫瑒徐世譜周敷荀朗周炅魯悉達蕭摩訶子世亷深陳智任忠樊毅弟猛裴忌父之平韓子髙華皎孔奐王沖子瑒瑜王通弟勱固質王猛到仲舉庾持許亨褚玠杜僧眀字𢎞照廣陵臨澤人也形貌眇小而膽氣過人有勇力善騎射梁大同中盧安興為廣州刺史南江督護僧眀與兄天合及周文育並為安興所啓請與俱行頻征俚獠有功為新州助防天合亦有才幹預在征伐安興死僧眀復副其子子雄及交州豪士李賁反於交州逐刺史蕭咨咨奔廣州臺遣子雄與廣州刺史孫冏討賁時春草已生瘴癘方起子雄請待秋討之廣州刺史新喻侯蕭映不聽子雄等不得已遂行至合浦死者十六七衆並憚役潰散禁之不可乃引其餘兵退還蕭咨啓子雄及冏與賊交通逗遛不進梁武帝勑於廣州賜死子雄弟子略子烈並豪俠家屬在南江天合謀於衆曰盧公纍葉立功待遇我等亦甚厚矣今見枉而不能為報非丈夫也我弟僧眀萬人之敵若圍州城召百姓誰敢不從城破斬二侯然後待臺使至束手詣廷尉死猶勝生縱其不捷亦無恨矣衆咸慷慨曰是所願也惟足下命之乃與周文育等率衆結盟奉子雄弟子略為主以攻刺史蕭映子略頓城南天合頓城北僧眀文育分據城東西吏民並應之一日之中衆至數萬髙祖時在髙要聞事起率衆來討大破之殺天合禽僧眀及文育等竒其才並釋之引為主帥從髙祖征交趾及討元景仲僧眀文育皆為前鋒所向尅捷侯景之亂俱隨髙祖入援京師髙祖於始興破蘭裕僧眀為前鋒斬裕及與蔡路養戰於南野僧眀馬被傷髙祖馳救之以所乘馬授僧眀僧眀得馬復進殺數十人因而乘之大敗路養髙州刺史李遷仕又據大臯入贛石以逼髙祖髙祖遣周文育為前鋒與僧眀擊走之遷仕與寧都人劉孝尚并力將襲南康髙祖又令僧眀與文育等拒之相持連戰百餘日卒禽遷仕送於髙祖及髙祖下南康留僧眀頓西昌督安成廬陵二郡軍事梁元帝承制授假節清野將軍新州刺史封新野縣子侯景遣于慶等寇南江髙祖頓豫章命僧眀為前驅大破之髙祖表為長史仍隨東討軍至蔡洲率麾下燒賊水門大艦及景平以功除眀威將軍南兖州刺史進爵臨江縣侯邑五百戶仍領晉陵太守及荆州陷髙祖使僧眀率吳眀徹等隨侯瑱西援江州病卒贈散騎常侍諡曰威年四十六文帝即位追贈開府儀同三司配享髙祖廟庭子晉嗣周文育字景德義興陽羡人也少孤貧本居新安夀昌縣姓項氏名猛奴年十一能反覆遊水中數里跳髙五六尺與羣兒聚戲衆莫能及義興人周薈為夀昌浦口戍主見而竒之因召與語文育對曰母老家貧兄弟姊並長大困於賤役薈哀之乃隨文育至家就其母請文育養為己子母遂與之後薈秩滿與文育還都見太子詹事周捨請製名字捨因為立名為文育字景德命兄子𢎞讓教之書計𢎞讓善𨽻書寫蔡雍勸學及古詩以遺之文育不之省謂𢎞讓曰誰能學此取富貴但有大槊耳𢎞讓壯之教之騎射文育大悅司州刺史陳慶之與薈同郡素相善啓薈為前軍軍主慶之使薈將五百人往新蔡懸瓠慰勞白水蠻蠻謀執薈以入魏事覺薈與文育拒之賊徒甚盛一日之中戰數十合文育前鋒陷陳勇冠軍中薈於陳戰死文育馳取其尸賊不敢逼及夕各引去文育身被九創創愈辭請還葬薈慶之壯其節厚加賻遺而遣之葬訖會盧安興為南江督護啓文育同行纍征有功除南海令安興死後文育與杜僧眀攻廣州為髙祖所獲宥之後監州王勱以文育為長流遂深被委任及勱被代文育欲與之俱下至大庾嶺詣卜者卜者曰君北下不過作令長南入則為公侯文育曰足錢便可誰望公侯卜人又曰君須臾當暴得銀二千兩若不見信以此為驗其夕宿逆旅有賈人求與文育博文育勝之得銀二千兩旦辭勱勱問其故文育以告勱乃遣之髙祖聞其還大喜遣人迎之厚加賞賜分麾下配焉髙祖之討侯景文育與杜僧眀為前軍尅蘭裕援歐陽頠皆有功髙祖破蔡路養於南野文育為賊所圍四面數重矢石雨下所乘馬死文育右手搏戰左手解鞍潰圍而出遂與杜僧眀相得并力復進大敗之髙祖乃表文育為府司馬李遷仕之據大臯遣其將軍杜平虜入贛石魚梁作城髙祖命文育擊之平虜棄城走文育據其城遷仕聞平虜敗留老弱於大臯悉選精兵自將以攻文育文育與戰遷仕稍却相持未解會髙祖遣杜僧眀來援别破遷仕水軍遷仕衆潰不敢還大臯直走新淦梁元帝授文育義州刺史遷仕又與劉孝尚謀拒義軍髙祖遣文育與侯安都杜僧眀徐度杜稜築城於白口拒之文育頻出與戰遂禽遷仕髙祖發自南康遣文育將兵五千開通江路侯景將王伯醜據豫章文育擊走之遂據其城纍功封東遷縣侯髙祖軍至白茅灣命文育與杜僧眀常為軍鋒及至姑熟與侯景將侯子鑒戰破之景平改封南移縣侯纍遷散騎常侍髙祖誅王僧辨令文育督衆軍會文帝於吳興圍尅杜龕又濟江襲會稽太守張彪得其郡城及文帝為彪所襲文育時頓城北香巖寺文帝夜往趣之彪又來攻文育苦戰遂破平彪髙祖以侯瑱擁據江州命文育討之仍除南豫州刺史率兵襲盆城未克徐嗣徽引齊人渡江據蕪湖詔徵文育還都嗣徽等乃列艦於青墩至於七磯以斷文育歸路及夕文育鼓譟而發嗣徽等不能制至旦反攻嗣徽嗣徽驍將鮑砰獨以小艦殿軍文育乘單舴艋跳入砰艦斬砰仍牽其艦而還賊衆大駭因留船蕪湖自丹陽步上時髙祖拒嗣徽於白城適與文育相會將戰風急髙祖曰矢不逆風文育曰事急矣當決之何用古法抽槊上馬馳而進衆軍從之風亦尋轉殺傷數百人嗣徽等移營莫府山文育徙頓對之以頻戰功最加平西將軍進爵夀昌縣公給鼓吹一部及廣州刺史蕭勃舉兵踰嶺詔文育督衆軍討之時新吳洞主余孝頃舉兵應勃遣其弟孝勱守郡城自出豫章據於石頭勃使其子孜將兵與孝頃相會又遣其别將歐陽頠頓軍苦竹灘傅泰據塶口城以拒官軍官軍船少孝頃有舴艋三百艘艖百餘乘在主牢文育遣軍主焦僧度羊柬潛軍襲之悉取而歸仍於豫章立柵時官軍食盡欲退還文育不許乃使人間行遺周迪書約為兄弟并陳利害迪得書喜甚許饋以糧於是文育分遣老小乘故船舫沿流俱下燒豫章所立柵偽退孝頃望之大喜因不設備文育由間道信宿達芊韶芊韶上流則歐陽頠蕭勃下流則傅泰余孝頃文育據其中間築城饗士賊徒大駭歐陽頠乃退入泥溪作城自守文育遣嚴威將軍周鐵虎與長史陸山才襲頠禽之於是盛陳兵甲與頠乘舟而宴以巡傅泰城下因攻泰尅之蕭勃在南康聞之衆皆股栗其將潭世逺斬勃欲降為人所害世逺軍主夏侯眀徹持勃首以降蕭孜余孝嗣猶據石頭髙祖遣侯安都助文育攻之孜降文育孝頃退走新吳廣州平文育還頓豫章以功詔授鎮南將軍開府儀同三司都督江廣衡交州諸軍事時王琳擁據上流詔侯安都為西道都督文育為南道都督同會武昌與琳戰於沌口為琳所執後得逃歸請罪詔不問復其官爵及周迪破余孝頃孝頃子公揚弟孝勱猶據舊柵擾動南土髙祖復令文育及周迪黃法氍等討之豫章內史熊曇朗亦率衆來會文育遣吳眀徹為水軍配周迪運糧自率衆軍入象牙江築城於金口公揚偽降謀執文育事覺文育囚之送都以其部曲分𨽻衆軍乃捨舟為步軍進據三陂王琳遣將曹慶救孝勱分遣主帥常衆愛與文育相拒自率所領攻周迪吳眀徹軍迪等敗文育退據金口熊曇朗因失其利謀害文育以應衆愛文育監軍孫白象頗知其事勸令先之文育曰不可我舊兵少客軍多若取曇朗人人驚懼亡立至矣不如推心以撫之初周迪之敗也棄船走莫知所在及得迪書文育喜齎示曇朗遂於坐中為曇朗所害年五十一髙祖聞之即日舉哀贈侍中司空諡曰忠愍初文育之據三陂有流星墜地其聲如雷地陷方一丈中有碎炭數斗又軍市中忽聞小兒啼一市皆驚聽之在土下軍人掘焉得棺長三尺文育惡之俄而迪敗文育見殺天嘉二年詔配享髙祖廟庭子寶安嗣文育本族兄景曜因文育官至新安太守寶安字安人年十餘歲便習騎射以貴公子驕蹇遊逸好狗馬樂驅馳靡衣偷食文育之為晉陵以征討不遑之郡令寶安監知郡事尤喜聚惡少年髙祖患之及文育西征敗績縶於王琳寶安便折節讀書與士君子遊綏御文育士卒甚有威惠文育歸復除吳興太守文育為熊曇朗所害徵寶安還起為猛烈將軍領其舊兵仍令南討文帝即位深器重之寄以心膂精卒多配焉及平王琳頗有功周迪之破熊曇朗寶安南入窮其餘燼天嘉二年重拜吳興太守襲封夀昌縣公三年征留異為侯安都前軍異平除給事黃門侍郎衛尉卿再遷左衛將軍領衛尉卿卒諡曰成子䂮嗣位晉陵定逺二郡太守侯瑱字伯玉巴西充國人也父弘逺世為西蜀酋豪蜀賊張文蕚據白崖山有衆萬人梁益州刺史鄱陽王蕭範命𢎞逺討之𢎞逺戰死瑱固請復讎每戰必先陷陳遂斬文蕚由是知名因事範範委以將帥之任山谷夷獠不附者並遣瑱征之纍功授輕車府中兵參軍晉康太守範為雍州刺史瑱除馮翊太守範遷鎮合肥瑱又隨之侯景圍臺城範乃遣瑱輔其世子嗣入援都城及城陷瑱與嗣退還合肥仍隨範徙鎮盆城俄而範及嗣皆卒瑱領其衆依於豫章太守莊鐵鐵疑之瑱懼不自安詐引鐵謀事因刃之據豫章之地後降於侯景將于慶慶送瑱於景景以瑱與己同姓託為宗族相待甚厚留其妻子及弟為質遣瑱隨于慶平蠡南諸郡及景敗巴陵景將宋子仙任約等並為西軍所獲瑱乃誅景黨以應義師景亦盡誅其弟及妻子梁元帝授瑱南兖州刺史郫縣侯仍隨都督王僧辨討景常為前鋒既復臺城景奔吳郡僧辨遣瑱率兵追之與景戰於吳松江大敗景盡獲其軍實景將皆降以功除南豫州刺史鎮姑熟及齊遣郭元建帥師出濡須僧辨遣瑱於東關拒之大敗元建魏攻荆州王僧辨以瑱為前軍赴援未至而魏尅荆州瑱頓九江因衛晉安王還都僧辨承制以瑱為侍中車騎將軍江州刺史加都督改封康樂縣公及司徒陸法和據郢州引齊兵來寇乃使瑱西討未至而法和入齊齊遣慕容恃德鎮夏首瑱攻之恃德食盡請和瑱還鎮豫章僧辨使其弟僧愔與瑱共討蕭勃及髙祖之誅僧辨僧愔隂欲圖瑱而奪其軍瑱知之盡收僧愔徒黨僧愔奔齊是時瑱據中流兵甚強盛又以本事僧辨雖外示臣節未肯入朝初余孝頃為豫章太守及瑱鎮豫章乃於新吳縣别立城柵與瑱相拒瑱留軍人妻子於豫章令從弟奫知後事悉衆以攻孝頃自夏迄冬不能克奫與其部下侯方兒不協方兒乃攻殺奫虜瑱軍府妓妾金玉歸於髙祖瑱既失根本兵衆俱潰輕身歸豫章豫章人拒之乃趣盆城就其將焦僧度僧度勸令投齊填以髙祖有大量必能容己乃詣闕請罪髙祖復其爵位永定二年進位司空王琳至沌口周文育侯安都並沒乃以填為都督西討諸軍事頓於梁山文帝即位進授太尉王琳至柵口又以瑱為都督侯安都等並𨽻焉填與琳相持百餘日未決天嘉元年二月東關春水稍長舟艦得通琳引合肥漅湖之衆舳艫相次而下其勢甚盛瑱率軍進虎檻洲琳亦出船列於江西隔洲而泊眀日合戰琳軍少却退保西岸及夕東北風大起吹其舟艦並壞沒於沙中溺死者數千浪大不得還浦夜中有流星墜於賊營及旦風靜琳入浦治船以荻塞於浦口又以鹿角繞岸不敢復出時西魏將史寧躡其上流瑱聞之知琳不能持久收軍却據湖浦以待其弊及史寧至圍郢州琳恐衆潰乃率船東下去蕪湖十里而泊眀日齊遣儀同劉伯球率萬人助琳水戰行臺慕容德會領鐵騎三千在蕪湖西岸博望山南為其聲勢瑱令軍中晨炊蓐食頓蕪湖洲尾以待之將戰有微風至自東南衆軍施拍縱火定州刺史章昭達乘平虜大艦中江而進琳軍大敗其步軍在西岸者自相蹂踐馬騎並淖於蘆荻中盡獲其舟艦器械并禽劉伯球慕容德會俘馘萬計琳與其將潘純陀乘單舴艦冒陳走湓城與妻妾左右十餘人入齊詔以瑱為都督湘巴郢江吳等五州諸軍事鎮湓城周將賀若敦獨狐盛等來攻巴湘又以瑱為西討都督大敗盛軍以功授湘州刺史改封零陵郡公邑七千户二年以疾表求還朝三月於道薨時年五十二贈大司馬諡曰壯肅加羽葆鼓吹班劍給東園祕器配享髙祖廟庭子淨藏嗣尚文帝女富陽公主侯安都字師成始興曲江人也為郡著姓父捍少仕州郡以忠謹稱安都貴後官至光祿大夫始興內史安都工𨽻書能鼓琴涉獵書傳為五言詩頗清靡兼善騎射為邑里雄豪侯景之亂招集兵甲至三千人髙祖入援臺城安都引兵從髙祖攻蔡路養破李遷仕平侯景皆力戰有功梁元帝授猛烈將軍封富春縣子隨髙祖鎮京口除蘭陵太守髙祖謀襲王僧辨諸人莫知唯與安都定計乃使率水軍自京口趣石頭城髙祖自率馬步從江乘羅落會之安都至石頭北棄舟登岸僧辨不之覺也石頭城北接岡阜雉堞不甚危峻安都被甲帶長刀軍人捧之投於女垣內衆隨而入進逼僧辨卧室髙祖大軍亦至與僧辨戰於廳事前安都自內閣出腹背擊之遂禽僧辨以功除仁威將軍南徐州刺史髙祖東征杜龕安都留臺居守徐嗣徽任約等引齊兵入據石頭遊騎至於闕下安都閉門偃旗示之以弱令城中曰有登陴看賊者斬及夕賊收軍還石頭安都夜令士卒密營禦敵之具將旦賊騎至安都率五百人開東西掖門與戰大敗之賊乃退據石頭不敢逼臺城及髙祖至以安都為水軍於中流斷賊糧運又襲秦郡破嗣徽柵收其家口并馬驢輜重得嗣徽所彈琵琶及所養鷹遣信餉之曰昨至弟處得此今以相還嗣徽等見之大懼乃請和髙祖聽其還北及嗣徽等濟江齊之餘軍猶據采石守備甚嚴又遣安都攻之多所俘獲眀年春詔安都率兵鎮梁山以備齊徐嗣徽等復入丹陽至湖熟高祖遣安都拒之戰於耕壇南安都率十二騎突其陳破之生禽齊儀同乞伏無芳又刺齊將東方老墮馬會賊騎至救老得免賊北度蔣山安都又與齊將王敬寶戰於龍尾使從弟曉軍主張纂前犯其陳曉被創墜馬張纂死之安都馳往救曉斬其騎士十二人取纂尸而還齊軍不敢逼髙祖與齊軍戰於莫府山命安都領步騎千餘自白下橫擊其後齊軍大敗以功進爵為侯又進號平南將軍改封西江縣公仍督水軍至豫章助豫州刺史周文育討蕭勃安都未至文育已斬勃并禽其將歐陽頠傅泰等唯余孝頃與勃子孜猶於豫章之石頭作兩城孝頃與孜各據其一又多設船艦夾水而陳安都至乃銜枚夜燒其艦文育率水軍安都領步騎登岸結陳孝頃俄斷後路安都乃令軍士豎柵引營漸進頻致尅獲孜乃降孝頃奔歸新吳請入子為質許之以功加開府儀同三司仍率衆會武昌與周文育西討王琳將發公卿餞於新林安都躍馬度橋人馬俱墜水中又坐𦪙內墜於櫓井時以為不祥至武昌琳將樊猛棄船走文育亦自豫章至時兩將俱行不相統攝因部下交爭稍不平軍至郢州琳將潘純於城中遙射官軍安都怒圍之未克而王琳至弇口安都乃釋郢州悉衆往沌口以禦之遇風不得進琳據東岸官軍據西岸相持數日乃合戰安都等敗績安都與文育徐敬成並為琳所囚琳總以一長鎖繫之置於𦪙下令宦者王子晉掌視之琳下至湓城白水浦安都等甘言許厚賂子晉子晉乃偽以小船依𦪙而釣夜載安都文育敬成上岸入深草步投官軍還都自劾詔並赦之復其官爵尋為丹陽尹出為南豫州刺史令繼周文育攻余孝勱及王琳將曹慶常愛衆等安都自宫亭湖出松門躡愛衆後文育為熊曇朗所害安都回取大艦遇琳將周炅周協南歸與戰破之禽炅協孝勱弟孝猷率部下四千家欲􅈬王琳遇炅乃詣安都降安都又進軍於禽竒州破曹慶常愛衆等焚其船艦愛衆奔廬山為村人所殺餘衆悉平還軍至南皖而髙祖崩安都隨文帝還朝乃與羣臣議翼奉文帝時帝謙讓不敢當太后又以衡陽王故未肯下令羣臣不能決安都曰今四方未定何暇及逺臨川王有功天下須共立之今日之事後應者斬便按劍上殿白太后出璽義手解文帝髮推就喪次文帝即位遷司空仍授南徐州刺史給扶王琳下至柵口大軍出頓蕪湖時侯瑱為大都督而指麾經略多出安都及王琳入齊安都進軍湓城討琳餘黨所向皆下仍別奉中旨迎衡陽王昌初昌之將入也致書於文帝辭甚不遜文帝不懌乃召安都從容而言曰太子將至須別求一藩吾其老焉安都對曰自古豈有被代天子臣愚不敢奉詔因自迎昌濟漢中流而殺之以功進清逺郡公邑五千户自是威名甚重羣臣無出其右安都父捍為始興內史卒於官文帝徵安都為發喪尋起復本官贈其父散騎常侍金紫光祿大夫拜其母為清逺國太夫人仍迎赴都母固求停鄉里上乃下詔改封郡之汝城縣為廬陽郡分衡州之始興安逺二郡合三郡為東衡州以安都從弟曉為刺史安都第三子祕年九歲上以為始興內史並令在鄉侍奉改封安都桂陽郡公王琳敗後周兵入據巴湘安都奉詔西捍及留異據東陽安都又奉詔東討異本謂臺軍自錢唐江上安都乃步由會稽之諸暨出永康異大恐奔桃枝嶺處巖谷間豎柵以自守安都躬自接戰為流矢所中血流至踝安都乘輿麾軍容止不變因其山壠為堰屬夏潦水漲安都引船入堰接艦與異城等放拍碎其樓異與第三子忠臣脫身奔晉安安都虜其妻子振旅而還加侍中征北大將軍仍還本鎮吏民詣闕表請立碑頌美安都功績詔許之自王琳平後安都勳庸轉大又自以功安社稷漸用驕矜數招聚文武之士或射馭馳騁或命以詩筆第其髙下以差次賞賜之文士則褚玠馬樞隂鏗張正見徐伯陽劉刪祖孫登武士則蕭摩訶裴子烈等為之賓客齋內動至千人部下將帥多不遵法度檢問收攝則奔歸安都文帝性嚴察深銜之安都不之改日益驕橫表啓封訖有事未盡乃開封自書之云又啓某事及侍宴酒酣或箕踞傾倚嘗陪樂遊禊飲乃白帝曰何如作臨川王時帝不應安都再三言之帝曰此雖天命抑亦眀公之力宴訖又啓便借供帳水飾將載妻妾於御堂歡會文帝雖許其請甚不懌眀日安都坐於御坐列賓客居羣臣位稱觴上夀初重雲殿災安都率將士帶甲入殿帝甚惡之自是隂為之備又周迪之反朝望當使安都討之帝乃使吳眀徹往又頻遣臺使按問安都部下檢括亡叛安都內不自安天嘉三年冬遣其別駕周𢎞實自託於舍人蔡景歷并問省中事景歷録其狀奏之稱安都謀反帝慮其不受召眀年春乃除安都為征南大將軍江州刺史自京口還都部伍入於石頭帝引安都宴於嘉德殿又集其部下將帥會於尚書朝堂於坐收安都囚於西省又收其將帥盡奪馬仗而釋之因出景歷表以示於朝乃下詔暴其罪眀日於西省賜死時年四十四尋有詔宥其妻子家口葬以士禮初髙祖嘗與諸將宴杜僧眀周文育侯安都為夀各稱功伐帝曰卿等悉良將也而並有所短杜公志大而識暗狎於下而驕於尊矜其功不收其拙周侯交不擇人而推心過差居危履險猜防不設侯郎慠誕而無厭輕佻而肆志並非全身之道卒皆如言太建三年宣帝追封安都陳集縣侯子亶為嗣歐陽頠字靖世長沙臨湘人也為郡豪族少質直有思理以言行著於嶺表父喪哀毁甚至家産纍積悉讓與諸兄州郡頻辟不應乃廬於麓山寺傍專精習業博通經史年三十其兄逼令從宦梁左衛將軍蘭欽少與頠相善頠常隨欽征討南征夷獠禽陳文徹所獲不可勝計大獻銅鼓纍代所無頠預其功還為直閣將軍除天門太守欽征交州復啓頠同行欽度嶺而卒頠除臨賀內史啓乞送欽喪然後之任時湘衡之界五十餘洞不賓勑衡州刺史韋粲討之粲委頠為都督悉皆平殄粲啓梁武帝加頠超武將軍討廣衡二州山賊侯景構逆粲自解還都征景以頠監衡州臺城陷後嶺南互相吞併蘭欽弟前高州刺史裕攻始興內史蕭昭基奪其郡以兄欽與頠舊遣招之頠不從謂其使曰髙州昆季隆顯莫非國恩今應赴難援都豈可自為跋扈及高祖入援都將至始興頠乃深自結託裕遣兵攻頠高祖援之裕敗髙祖以王懷眀為衡州刺史遷頠為始興內史髙祖之討蔡路養李遷仕也頠助帝平之梁元帝承制以始興郡為東衡州授頠持節雲麾將軍東衡州刺史封新豐縣伯侯景既平元帝遍問朝宰今天下始定極須良才卿等各舉所知羣臣未對帝曰吾已得一人矣歐陽頠是也公正有濟世之才恐蕭廣州不肯致之乃授武州刺史尋授郢州欲令出嶺蕭勃留之不獲拜命尋授衡州刺史進封始興縣侯時蕭勃在廣州兵強位重元帝深患之遣王琳代為刺史琳已至小桂嶺勃遣其將孫瑒監州盡率部下至始興避琳兵鋒頠別據一城不往謁勃勃閉門髙壘亦不拒戰勃怒遣兵襲頠盡收其資財馬伏尋赦之還復其所復與結盟魏平荆州頠委質於勃及勃度嶺出南康以頠為前軍都督周文育破之禽頠送於髙祖髙祖釋之深加禮接蕭勃死後嶺南擾亂頠有聲南土且與髙祖有舊乃授頠安南將軍衡州刺史封始興縣侯未至嶺頠子紇已尅定始興及頠至嶺南皆懾伏乃進廣州盡有越地改授都督交廣等十九州諸軍事鎮南將軍平越中郎將廣州刺史王琳據有中流頠自海道及東嶺奉使不絶永定三年即本號開府儀同三司文帝嗣位進號征南將軍改封陽山郡公邑二千户給鼓吹初交州刺史袁曇緩密以金五百兩寄頠令以百兩還合浦太守龔蒍四百兩付兒智矩餘人不知也頠尋為蕭勃所破資財並盡唯所寄金獨存曇緩亦尋卒至是頠並依信還之時人莫不歎伏之時頠弟盛為交州刺史次弟邃為衡州刺史合門貴顯威振南土又多致銅鼓生口獻奉珍異前後委積頗有助軍國天嘉四年薨於廣州年六十六贈司空諡曰穆子紇嗣紇字奉聖頗有幹略襲父官爵在州十餘年威惠著於百越宣帝以紇久在南服頗疑之太建元年徵為左衛將軍其下多勸之反紇遂舉兵攻衡州刺史錢道戢詔儀同章昭達討禽之送至都伏誅子詢以年幼免黃法氍字仲昭巴山新建人也少徑捷有膽力日步行二百里能距躍三丈頗便書疏間眀簿領出入州郡中為鄉里所憚侯景之亂於鄉里合徒衆太守賀詡下江州法氍監知郡事髙祖將踰嶺入援建鄴李遷仕作梗中途髙祖命周文育屯西昌法氍遣兵助文育時法氍出頓新淦縣景遣行臺于慶來襲新淦法氍敗之梁元帝承制授交州刺史資領新淦縣令封巴山縣子敬帝即位改封新建縣侯太平元年割江西四郡置髙州以法氍為刺史鎮巴山蕭勃歐陽頠來攻法氍破之永定三年王琳遣李孝欽樊猛余孝頃攻周迪且謀法氍法氍援迪禽孝頃等三將以功授平南將軍開府儀同三司熊曇朗於金口害周文育法氍共周迪討平之天嘉三年周迪反法氍與吳眀徹討平迪法氍功居多廢帝即位進爵為公大建五年大舉北侵法氍為都督出歷陽於是為拋車及步艦豎拍以逼之炮加其樓堞尅之盡誅其戍卒進兵合肥望旗降欵法氍禁侵掠躬自勞撫而與之盟並放還北以功加侍中改封義陽郡公七年為豫州刺史鎮夀陽薨贈司空諡曰威子玩嗣淳于量字思眀其先濟北人也世居建鄴父文成仕梁為將帥位梁州刺史量少善自居處偉姿容有幹略便弓馬梁元帝為荆州刺史文成分量人馬令往事焉以軍功封廣晉縣男侯景之亂梁元帝凡遣五軍入援臺量預其一臺城陷量還荆州元帝承制以為巴州刺史侯景西上攻巴州元帝使都督王僧辨入據巴陵量與僧辨并力拒景大敗之禽其將任約進攻郢州獲宋子仙仍隨僧辨平侯景封謝沐縣侯尋出為都督桂州刺史及魏尅荆州量保桂州王琳擁割湘郢纍遣召量量外雖與琳往來而别遣使歸髙祖髙祖受禪進位鎮西大將軍開府儀同三司天嘉五年徵為中撫軍大將軍量所部將率多戀本土欲並逃入山谷不願入朝文帝使湘州刺史華皎征衡州且以兵迎量天康元年至都以在郡淹留為有司奏免儀同餘如故華皎構逆以量為征南大將軍西討大都督總率大艦自郢州樊浦拒之皎平并降周將長湖公元定等以功授侍中中軍大將軍開府儀同三司進封醴陵縣公未拜出為南徐州刺史太建元年進號征北大將軍給扶三年就江隂王蕭季卿買梁陵中樹季卿坐免量免侍中尋復侍中吳眀徹之北侵也量讚成其事又遣第六子岑率所領從軍淮南尅定量改封始安郡公及周獲吳眀徹乃以量為都督水陸諸軍事車騎將軍都督南兖州刺史十四年薨贈司空章昭達字伯通吳興武康人也家世冠族性倜儻輕財尚氣少時遇相者謂曰卿容貌甚善須小虧則當富貴梁大同中昭達為東宫直後因醉墮馬鬢角小傷昭達喜之相者曰未也及侯景之亂昭達率鄉人援臺城為流矢所中眇其一目相者見之曰卿相善矣不久當富貴臺城陷昭達還鄉里與文帝遊因結君臣之分侯景平文帝為吳興太守昭達仗䇿來謁文帝見之大喜因委以將帥恩寵優渥超於儕等髙祖誅討王僧辨令文帝還長城招聚兵衆以備杜龕頻使昭達往京口稟承計畫僧辨誅後杜龕遣其將杜泰來攻長城昭達因從文帝進軍吳興以討龕龕平又從討張彪於會稽尅之纍功除定州刺史時留異擁據東陽髙祖患之乃使昭達為長山令居其心腹天嘉元年追論長城功封昭達欣樂縣侯尋隨侯安都拒王琳戰於蕪湖昭達乘平虜大艦中流而進先鋒發拍中賊艦王琳平昭達册勳第一二年除都督郢州刺史周迪據臨川反詔昭達便道征之迪敗走徵為護軍將軍給鼓吹改封邵武縣侯四年陳寶應納周迪共寇臨川又以昭達為都督討迪迪走昭達乃踰嶺討陳寶應與戰不利因據上流為筏施拍其上壞其水柵又出兵攻其步軍方大合戰會文帝遣余孝頃出海道適至因并力乘之遂定閩中盡禽留異寶應以功授鎮軍將軍開府儀同三司初文帝常夢昭達升於台鉉及旦以告之至是侍宴酒酣文帝顧昭達曰卿憶夢不何以償夢昭達對曰當效犬馬之用以盡臣節自餘無以奉償尋授鎮南大將軍都督江州刺史廢帝即位改封邵陵郡公華皎之反其移文並假以昭達為辭又頗遣使招之昭達盡執其使送都秩滿徵為中撫軍大將軍宣帝即位進號車騎大將軍以還朝遲留為有司所劾降號車騎將軍歐陽紇據嶺南反詔昭達都督衆軍討之紇聞昭達奄至惶擾不知所為乃出頓洭口多聚沙石盛以竹籠置於水柵之外用遏舟艦昭達居其上流裝艦造拍以臨賊柵又令軍人銜刀濳行水中以斫竹籠籠篾解因縱大艦隨流突之賊大敗禽紇送京師廣州平以功進位司空太建二年率師征梁眀帝於江陵是時眀帝與周軍大蓄舟艦於青泥中昭達分遣偏將錢道戢程文季乘輕舟焚之周又於峽口南岸築壘名曰安蜀城於江上橫引大索編葦為橋以度軍糧昭達乃命軍士為長戟施於樓船上仰割其索索斷糧絶因縱兵攻其城降之三年於軍中病薨贈大將軍昭達性嚴刻每奉命出征必盡夜倍道然其尅捷必歸功將帥厨膳飲食並同於羣下將士亦以此附之每飲食必盛設女伎雜樂備羌胡之聲音律姿容並一時之妙雖臨敵不之廢也四年詔配享文帝廟庭子大寶襲邵陵郡公位豐州刺史在州貪縱百姓怨酷後主以太僕卿李暈代之乃襲殺暈而反尋被禽梟首朱雀航夷三族吳眀徹字通照秦郡人也父樹梁右軍將軍眀徹幼孤性至孝年十四感墳塋未修家貧無以取給乃勤力耕種時天下亢旱苖稼焦枯眀徹哀憤每之田中號哭仰天自訴居數日有自田還者云苖已更生眀徹疑其紿已及往如言秋而大獲足充葬用時有伊氏者善占墓謂其兄曰君葬之日必有乘白馬逐鹿者經墳所此是最小孝子大貴之徵至時果有此應眀徹即樹之小子也及侯景寇京師天下大亂眀徹有粟麥三千餘斛而鄰里飢餒乃白諸兄曰今世亂如此人不圖久奈何不與鄉里共此於是計口平分同其豐儉羣盜聞而避焉賴以存者甚衆髙祖出鎮京口深相要結眀徹乃詣髙祖髙祖為之降階執手即席與論當世之務眀徹亦微涉書史經傳就汝南周𢎞正學天文孤虛遁甲略通其術頗以英雄自許髙祖亦深竒之紹泰初隨周文育討擊功髙授東兖州刺史髙祖受禪授安南將軍與侯安都周文育將兵討王琳及衆軍敗沒眀徹自拔還都文帝即位以本官加右衛將軍及周迪反詔以眀徹為江州刺史領豫章太守總衆軍以討迪眀徹雅性剛直統內不甚和文帝聞之遣安成王頊代眀徹令以本號還朝天嘉五年遷鎮東將軍吳興太守及引辭之郡文帝謂曰吳興雖郡帝鄉之重故以相授君其勉之及廢帝即位拜領軍將軍丹陽尹仍詔以甲仗四十人出入殿省到仲舉之矯令出宣帝也毛喜知其詐宣帝疑懼遣喜與眀徹籌焉眀徹曰嗣君諒暗萬機多闕外鄰強敵內有大喪殿下親實周召德冠伊霍社稷至重願留中深計愼勿致疑及湘州刺史華皎隂有異志詔授眀徹都督湘州刺史仍與征南大將軍淳于量等討皎皎平授開府儀同三司進爵為公宣帝大建五年朝議北伐公卿互有同異眀徹決策請行詔加侍中都督征討諸軍事賜女樂一部眀徹總統諸軍十餘萬發自京師緣江城鎮相續降款軍至秦郡齊大將軍尉破胡將兵為援眀徹破走之秦郡降宣帝以秦郡為眀徹舊邑詔具太牢令拜祠上冡文武羽儀甚盛鄉里榮之進尅仁州授征北大將軍改封南平郡公進逼夀陽齊遣王琳拒守王貴顯保其外郭眀徹以琳初入衆心未附乘夜攻之中宵而潰齊兵退據相國城及金城眀徹令軍中益修攻具又遏肥水以灌城城中苦濕多腹疾手足皆腫死者十六七會齊又遣大將皮景和率兵數十萬來援去夀春三十里頓軍不進諸將咸曰堅城未拔大援在近不審眀公計將安出眀徹曰兵貴在速而彼結營不進自挫其鋒吾知其不敢戰眀矣於是躬擐甲胄四面疾攻城中震恐一鼓而禽王琳琳之獲也其舊部曲多在眀徹軍琳素得士卒心見者皆歔欷不能仰視眀徹慮其有變即斬琳傳其首於建鄴景和懼而遁走詔以眀徹都督豫合等六州諸軍事車騎大將軍豫州刺史增封并前三千五百户詔遣謁者蕭淳就夀陽授册眀徹於城南設壇列卒二十萬陳旗鼓戈甲登壇拜受成禮而退將校莫不踴躍焉六年自夀陽入朝輿駕幸其第賜賞萬計七年進攻彭城軍至吕梁齊遣援兵前後至者數萬眀徹皆大破之八年進位司空詔給大都督鈇鉞龍麾尋授都督南兖州刺史其次將校除授各有差會周氏滅齊宣帝將事徐兖九年詔眀徹進軍北伐令其世子慧覺攝行州事軍至吕梁周徐州總管梁士彥率衆拒戰眀徹頻破之士彥守城不出眀徹仍迮清水以灌其城環列舟艦於城下攻之甚急周遣上大將軍王軌救之輕行自清水入灌口橫流樹木以鐵鎖貫車輪遏斷船路諸將聞之甚恐議欲破堰拔軍以舫載馬馬眀戍主裴子烈曰君若決堰下船船必傾倒豈可得乎不如前遣馬出適會眀徹苦背疾甚篤知事不濟遂從之乃遣蕭摩訶率馬軍數千前還眀徹乃自決其堰乘水勢以追軍至清水口水勢漸微舟艦並不得渡衆軍皆潰眀徹窮蹙乃就執周封懷德郡公位大將軍以憂遘疾卒於長安後故吏盜其柩歸至德元年詔追封邵陵侯以其息慧覺嗣裴子烈字大士河東聞喜人梁員外散騎常侍猗之子少孤有志氣以驍勇聞位北譙太守嶽陽內史封海安伯胡穎字方秀吳興人也偉姿容性寬厚梁末髙祖時在廣州穎深自結託從克元景平蔡路養李遷仕皆有功髙祖進軍頓西昌以穎為巴邱令鎮大臯督糧運下至豫章以穎監豫章郡髙祖率衆與王僧辨會白茅灣同討侯景以穎知留府事梁承聖初元帝授穎羅州刺史封漢陽縣侯尋除豫章內史隨髙祖鎮京口齊遣郭元建出東關髙祖令穎率府內驍勇隨侯瑱於東關大破之後從髙祖襲王僧辨又隨周文育於吳興討杜龕髙祖受禪兼左衛將軍天嘉元年除散騎常侍吳興太守卒官諡曰壯二年配享髙祖廟庭子六同嗣徐度字孝節安陸人也世居京師少倜儻不拘小節姿貌瓌偉嗜酒好博常使僮僕屠酤為事梁始興內史蕭介之郡度從之將領士卒征諸山洞以驍勇聞髙祖時征交趾厚禮招之度乃委質侯景之亂髙祖尅廣州平蔡路養破李遷仕計畫多出於度兼統兵甲每戰有功歸自白茅灣梁元帝授寧朔將軍合州刺史侯景平後追録前後戰功加通直散騎常侍封廣德縣侯髙祖鎮朱方除度蘭陵太守髙祖遣衡陽獻王往荆州度率所領從焉江陵陷間行東歸髙祖平王僧辨度與侯安都為水軍紹泰元年髙祖東討杜龕奉敬帝幸京口以度領宿衛并知留府事徐嗣徽任約等來寇髙祖與敬帝還都時賊已據石頭城市㕓居民並在其路去臺遙逺恐為賊所乘乃使度將兵鎮于治城寺築壘以斷之眀年嗣徽等又引齊寇濟江度隨衆軍破之於北郊壇以功除信威將軍郢州刺史兼領吳興太守文帝即位遷侍中中撫軍將軍開府儀同三司進爵為公重出為吳郡太守天嘉元年以平王琳功改封湘東郡公及太尉侯瑱薨於湘州乃以度代瑱為湘州刺史秩滿復為侍中中軍大將軍文帝崩度豫顧命許以甲仗五十人入殿省廢帝即位進司空華皎據湘州反引周兵下至沌口與王師相持乃加度使持節車騎將軍督步軍自安成郡由嶺路出于湘東以襲湘州盡獲其所留軍人家口以歸光大二年薨時年六十贈太尉諡曰忠肅太建四年配享髙祖廟庭子敬成嗣敬成幼聰慧好讀書起家著作佐郎永定元年領度所部士卒隨周文育侯安都征王琳於沌口敗績為琳所縶二年隨文育安都得歸父度為吳郡太守以敬成監郡光大元年為巴州刺史尋為水軍隨吳眀徹平華皎太建二年以父憂去職尋起為南豫州刺史襲爵湘東郡公太建五年除吳興太守隨都督吳眀徹北討出秦郡別遣敬成為都督乘金翅自歐陽引埭泝江由廣陵齊人皆城守弗敢出自繁梁湖下淮尅淮隂山陽鹽城三郡仍進尅鬱洲進號壯武將軍鎮胊山坐於軍中輒科訂并誅新附者免官尋除安州刺史鎮宿豫卒諡曰思子敞嗣杜稜字雄盛吳郡錢唐人也世為縣著姓稜頗涉書傳少落泊不為當世所知遂遊嶺南事梁廣州刺史新渝侯蕭映映卒為髙祖府典書記從髙祖平蔡路養李遷仕皆有功梁元帝承制授仁威將軍石州刺史上陌縣侯侯景平髙祖鎮朱方以稜監義興琅邪二郡髙祖謀誅王僧辨引稜與侯安都等共議稜難之髙祖懼其泄已乃以手巾絞稜稜悶絶於地因閉於別室軍發召與同行及僧辨平後髙祖東征杜龕等留稜與安都居守徐嗣徽任約引齊兵濟江攻臺城安都與稜隨方抗拒稜晝夜巡警綏撫士卒未嘗解帶賊平以功除通直散騎常侍右衛將軍丹陽尹永定元年位侍中中領軍三年髙祖崩文帝在南皖時內無嫡嗣外有強敵侯瑱侯安都徐度並在軍中朝廷宿將唯稜在都獨典禁兵乃與蔡景歷等祕不發喪奉迎文帝文帝即位遷領軍將軍天嘉元年以預建立之功改封永成縣侯出為雲麾將軍晉陵太守加秩中二千石二年召為侍中丹陽尹廢帝即位加特進侍中光大元年解尹量置佐史給扶太建元年出為吳興太守二年徵為侍中尋加特進護軍將軍三年以公事免侍中護軍四年復為侍中右光祿大夫將軍佐史扶並如故稜歷事三帝並見寵遇末年不預征役優遊京師賞賜優洽卒於官年七十贈開府儀同三司喪事所須並令官給諡曰成配享髙祖廟庭子安世嗣周鐵虎不知何許人也語音傖重膂力過人便馬槊仕梁河東王蕭譽以勇敢聞譽為湘州以為臨蒸令侯景之亂元帝遣世子方等伐譽譽拒戰大捷方等死鐵虎功最及王僧辨討譽於陳獲之將烹焉鐵虎呼曰侯景未滅奈何殺壯士僧辨竒其言宥之還其麾下及侯景西上鐵虎從僧辨尅任約獲宋子仙每戰有功元帝承制授潼州刺史封沌陽縣子又從僧辨定建鄴降謝答仁平陸納於湘州録前後功進爵為侯髙祖既誅僧辨鐵虎率所部降因復其本職徐嗣徽引齊寇度江鐵虎破其水軍嗣徽平遷太子左衛率尋隨周文育拒蕭勃文育命鐵虎偏軍襲勃禽勃前軍歐陽頠又隨文育西征王琳於沌口敗績與文育侯安都並為琳所禽琳見諸將與語唯鐵虎辭氣不屈故琳盡宥文育之徒獨鐵虎見害贈侍中護軍天嘉三年文帝又詔配食髙祖廟庭子瑜嗣程靈洗字元滌新安海寧人也少以勇力聞步行日二百里便騎善遊素為鄉里畏伏侯景之亂據黟歙聚徒黨以拒景景軍據有新安新安太守湘西鄉侯蕭隱奔依靈洗靈洗奉以主盟梁元帝授靈洗譙州刺史資領新安太守封巴邱縣侯後助王僧辨鎮防及髙祖誅僧辨靈洗率所領來援其夜力戰於石頭西門髙祖軍不利遣使招喻久之乃降髙祖義之授蘭陵太守仍助防京口及平徐嗣徽靈洗有功除南丹陽太守封遂安縣侯隨周文育西討王琳軍敗為琳所拘尋與侯安都等逃歸纍遷太子左衛率髙祖崩王琳前軍東下靈洗於南陵破之虜其兵士并獲青龍十餘乘以功授都督南豫州刺史侯瑱等敗王琳於柵口靈洗逐北據有魯山徵為左衛將軍天嘉四年周迪重寇臨川以靈洗為都督自鄱陽别道擊之迪又走山谷間遷中護軍出為都督郢州刺史廢帝即位進號雲麾將軍華皎之反遣使招靈洗靈洗斬皎使以聞朝廷深嘉其忠因推心待之使其子文季領水軍助防時周將元定率步騎二萬助皎圍靈洗靈洗嬰城固守及皎敗乃出軍躡定定不獲濟江以其衆降因進攻尅沔州禽其刺史裴寬以功改封重安縣公靈洗性嚴急御下甚苛刻士卒有小罪必以軍法誅之號令分眀與士卒同甘苦衆亦以此德之性好播植躬勤耕稼至於水陸所宜刈穫早晚雖老農不能及也妓妾無遊手並督之紡績至於散用資財亦弗儉吝卒贈鎮西將軍開府儀同三司諡曰忠壯太建四年配享髙祖廟庭子文季嗣文季字少卿幼習騎射多幹略果決有父風靈洗與周文育侯安都等敗於沌口為王琳所執髙祖召陷賊諸子弟厚遇之文季最有禮容深見賞文帝嗣位除宣惠始興王府限內中直兵參軍纍遷臨海太守後乘金翅助父鎮郢城華皎平靈洗及文季並有扞禦之功及靈洗卒文季盡領其衆起為超武將軍仍助防郢州文季性至孝雖軍旅奪禮而毁瘠甚至服闋襲封重安縣公隨都督章昭達率軍往荆州征梁梁人與周軍多造舟艦置於青泥水中昭達遣文季共錢道戢盡焚其舟艦既而周兵大出文季僅以身免以功加通直散騎常侍太建五年都督吳眀徹北討至秦郡秦郡前江浦通塗水齊人並下大柱為杙柵水中文季乃前領驍勇拔開其柵眀徹率大軍自後而至攻尅秦郡又別遣文季攻涇州屠其城進拔盱眙乃隨眀徹圍夀陽文季臨事謹飭御下嚴整前後所尅城壘率皆迮水為堰土木之工動踰數萬置陳役人文季必先於諸將夜則早起迄暮不休軍中莫不服其勤幹每戰為前鋒齊軍深憚之謂為程虎以功除散騎常侍帶新安內史纍遷北徐州刺史加都督後隨眀徹北侵軍敗為周所囚仍授開府儀同三司十一年自周逃歸至渦陽為邊吏執送長安死於獄是時朝廷與周絶不之知至德元年後主知之贈散騎常侍又下詔傷其廢絶降封重安縣侯以子響襲封沈恪字子恭吳興武康人也深沈有幹局初從梁新渝侯蕭映之廣州討伐俚洞有功除中兵參軍髙祖與恪同郡情好甚昵蕭映卒後武帝南討李賁仍遣妻子附恪還鄉尋補東宫直後以嶺南勳除員外散騎侍郎仍令招集宗從子弟侯景圍臺城起東西二土山以逼城城內亦作土山以應之恪為東土山主晝夜拒戰以功封東興縣侯京城陷恪間行歸鄉里髙祖之討侯景遣使報恪恪乃於東起兵相應賊平謁髙祖於京口即日授都軍副及髙祖謀討王僧辨恪預其謀髙祖使文帝還長城立柵備杜龕使恪還武康招集兵衆及僧辨誅龕果遣副將杜泰襲文帝於長城恪時已出縣誅龕黨與髙祖尋遣周文育來援長城文育至泰乃走及龕平文帝襲東揚州刺史張彪以恪監吳興郡髙祖受禪時恪自吳興入朝髙祖使中書舍人劉師知引恪令勒兵入因衛敬帝如別宫恪乃排闥入見髙祖叩頭謝曰恪身經事蕭家來今日不忍見此事分受死耳決不奉命髙祖嘉其意乃不復逼更以蕩主王僧志代之髙祖踐阼除吳興太守永定二年除散騎常侍會稽太守歷事文帝及廢帝纍遷護軍將軍至宣帝即位遷平越中郎將都督廣州刺史恪未至嶺前刺史歐陽紇舉兵拒險恪不得進朝廷遣司空章昭達討紇紇平乃得入州州罹兵荒所在殘毁恪綏懷安輯被以恩惠嶺表賴之及代還以途逺不時至為有司所奏免太建十三年遷護軍將軍後主即位以疾拜特進金紫光祿大夫卒時年七十四贈翊左將軍詔給東園祕器後主仍出舉哀葬事所須並令資給諡曰元子法興嗣陸子隆字興世吳郡人也祖敞之梁嘉興令父悛封氏令子隆少慷慨有志功名侯景之亂於鄉里招聚徒黨時張彪為吳郡太守引為將帥仍隨彪徙鎮會稽及文帝討彪彪將沈泰吳寶真申縉等皆降而子隆力戰敗績文帝義之復使領其部曲及文帝嗣位徵子隆領甲仗宿衛封益陽縣子纍遷廬陵太守周迪據臨川反子隆隨章昭達討迪迪退走因隨昭達討陳應寶晉安平子隆功最遷武州刺史改封潮陽縣伯華皎據湘州反以子隆居其心腹皎深患之頻遣使招子隆不從攻又不尅及皎敗於郢州子隆出兵襲其後因與大軍相會進爵為侯尋遷都督荆州刺史荆州新置居公安城池未固子隆修立城郭綏集夷夏甚得人和號為稱職吏民詣闕求立碑頌美功績詔許之卒諡曰威子之武嗣之武年十六領其舊軍後為𢎞農太守乃𨽻吳眀徹於吕梁軍敗逃歸為人所害子隆弟子才亦有幹略從子隆征討有功除始平太守封始康縣子卒於信州刺史錢道戢字子韜吳興長城人也父景深梁漢夀令道戢少以孝行著聞及長頗有才幹髙祖微時以從妹妻焉髙祖輔政道戢隨文帝平張彪於會稽以功拜東徐州刺史封永安縣侯天嘉元年為臨海太守侯安都之討留異道戢帥軍出松陽以斷其後異平以功拜都督衡州刺史領始興內史後與章昭達討歐陽紇紇平除左衛將軍太建二年又隨昭達征江陵以功加散騎常侍後為都督郢州刺史與儀同黃法氍攻下歷陽因以道戢鎮之卒官諡曰肅子邈嗣駱牙字旗門吳興臨安人也父裕梁鄱陽嗣王中兵參軍事牙年十二宗人有善相者云此郎容貌非常必將逺致梁大清末文帝避地臨安牙母陵覩帝儀表知非常人賓待甚厚及帝為吳興太守引牙為將帥從平杜龕張彪勇冠衆軍文帝即位封臨安縣侯位越州刺史初牙母卒時兵荒至是始葬詔贈臨安國太夫人諡曰恭太建八年牙纍遷散騎常侍入直殿省十年授豐州刺史至德二年卒贈廣州刺史子義嗣孫瑒字德璉吳郡吳人也世為冠族父修道梁中散大夫以雅素知名瑒少倜儻好謀略博涉經史尤便書翰仕梁為邵陵王中兵參軍太清之難授假節宣猛將軍軍主王僧辨之討侯景也王琳為前軍琳與瑒親婭乃表薦為宜都太守後以軍功封富陽侯敬帝立纍遷巴州刺史及髙祖受禪王琳立梁永嘉王蕭莊於郢州徵瑒為少府卿尋以瑒為安西將軍都督郢州刺史總留府之任周遣大將軍史寧乘虛而至起土山髙梯日夜攻逼因風縱火燒其城樓瑒兵不滿千人乘城拒守親自撫巡行酒賦食士卒皆為之用周人苦攻不能尅及王琳乘勝而進周兵乃解瑒於是盡有中流之地王僧辨誅瑒集其將士而謂之曰吾與王公陳力協義同奬梁室亦已勤矣今時如此天可違乎乃奉表歸陳天嘉元年授安南將軍湘州刺史封定襄縣侯瑒懷不自安乃固請入朝徵為侍中領軍將軍未拜而文帝謂瑒曰昔朱買臣願為本郡卿豈有意授乎乃改授安東將軍吳郡太守給鼓吹一部將之鎮乘輿幸近畿餞送鄉里榮之秩滿徵拜散騎常侍中護軍及留異反據東陽詔瑒督舟師進討異平遷鎮右將軍頃之出為建安太守太建四年為都督荆州刺史出鎮公安瑒增浚城池懷服邊逺為鄰境所憚居職六年以公事免及吳眀徹軍敗吕梁詔授都督緣江水陸諸軍事尋授都督郢州刺史十二年坐疆埸交通抵罪後主嗣位復爵邑歷位度支尚書侍中祠部尚書後主頻幸其宅賦詩述勳德之美展君臣之意焉遷五兵尚書領左軍將軍侍中如故禎眀元年卒官後主臨哭盡哀諡曰桓瑒事親以孝聞於諸弟甚篤睦性通泰有財散之親友其自居處頗失於奢家庭穿築極林泉之致歌童舞女當世罕儔賓客填門軒蓋不絶及出鎮郢州乃合十餘船為大舫於中立亭池植荷芰每良辰美景賓僚並集泛長江而置酒亦一時之勝賞焉常於山齋設講肆集賢儒之士冬夏資奉為學者所稱而處已率易不以名位驕物時興皇寺朗法師該通釋典瑒每造講筵時有抗論法侣莫不傾心又巧思過人為起部尚書軍國器械多所創立有鑒識男女婚姻皆擇素貴及卒尚書令江總為之銘志後主又題銘後四十字遣左户尚書蔡徵宣敇就宅鐫之其詞曰秋風動竹煙水驚波幾人樵徑何處山阿今時日月宿昔綺羅天長路逺地久靈多功臣未勒此意如何時論以為榮瑒二十一子咸有父風第二子訓頗知名位髙唐太守陳亡入隋徐世譜字興宗巴東魚復人也世居荆州為主帥征伐蠻蛋至世譜尤勇敢有膂力善水戰梁元帝之為荆州世譜將領鄉人事焉侯景之亂因預征討纍遷至員外散騎常侍尋領水軍從司徒陸法和與景戰於赤亭湖時景軍盛世譜乃別造樓船拍艦火舫水車以益軍勢將戰又乘大艦居前大敗景軍生禽景將任約景退走因隨王僧辨攻郢州世譜復乘大艦臨其倉門賊將宋子仙據城降以功除信州刺史封魚復縣侯邑五百户仍隨僧辨東下常為軍鋒侯景平以功除通直散騎常侍衡州刺史資領河東太守增邑并前一千戶西魏攻荆門世譜鎮馬頭岸據有龍洲梁元帝授侍中使持節都督江南諸軍事鎮南將軍護軍將軍給鼓吹一部江陵陷沒世譜東下依侯瑱紹泰元年徵為侍中左衛將軍髙祖之拒王琳其水戰之具悉委世譜世譜性機巧解舊法所造器械並隨機損益妙思出人永定二年遷護軍將軍文帝嗣位加特進右光祿大夫尋以疾失眀謝病不朝卒諡曰桓周敷字仲逺臨川人也為郡豪族敷形貌眇小如不勝衣膽力徑果超出時輩性豪俠輕財重士鄉黨少年任氣者皆歸之侯景之亂鄉人周續合衆以討賊為事梁內史始興蕃王蕭毅以郡讓續續所部有欲侵掠毅者敷擁護之親率其黨捍送至豫章時梁觀寧侯蕭永長樂侯蕭基豐城侯蕭泰避難流寓聞敷信義皆往依之敷愍其危懼屈體崇敬厚加給恤送之西上俄而續部下將帥爭權殺續以降周迪迪素無薄閥又失衆心倚敷族望深求交結敷未能自固事迪甚恭迪大憑仗之迪據臨川之土塘敷鎮臨川故郡侯景平梁元帝授敷寧州刺史封西豐縣侯髙祖受禪王琳據有上流余孝頃與琳黨李孝欽等共圍周迪敷助於迪迪禽孝頃等敷功最多熊曇朗之殺周文育據豫章將兵襲敷敷大破之曇朗走巴山郡敷與周迪黃法氍進兵擊之王琳平授散騎常侍豫章太守時江南酋帥並顧戀巢窟唯敷獨先入朝天嘉二年詣闕進號安西將軍令還鎮豫章周迪以敷素出已下超致顯達深不平乃舉兵反遣弟方興襲敷敷大破之仍從都督吳眀徹攻破迪禽方興再遷都督南豫州刺史迪又收餘衆襲東興文帝遣都督章昭達征迪敷又從軍至定川縣與迪相對迪紿敷求還朝欲立盟敷許之方登壇為迪所害諡曰脫子智安嗣位至太僕卿荀朗字深眀潁川潁隂人也祖延祖梁潁川太守父伯通衛尉卿朗少慷慨有將帥大略侯景之亂據巢湖無所屬臺城陷沒後梁簡文帝密詔授朗豫州刺史令與外蕃討侯景景使其儀同宋子仙任約等頻征之不能尅時都下飢朗更招致部曲衆至數萬侯景敗於巴陵朗截破其後軍景平後又別破齊將郭元建於踟蹰山及魏尅荆州髙祖入輔齊遣蕭軌東方老等來寇據石頭朗自宣城來赴與侯安都大破之髙祖受禪賜爵興寧縣侯以朗兄昻為左衛將軍弟晷為太子左衛率髙祖崩宣太后與舍人蔡景歷祕不發喪朗弟曉在都微知之謀率其家兵襲臺事覺景歷殺曉仍繫其兄弟文帝即位並釋之因厚撫朗令與侯安都等拒王琳琳平遷都督合州刺史卒諡曰壯子法尚嗣法尚少俶儻有文武幹略禎眀中為都督郢州刺史及隋軍濟江法尚降入隋歷邵觀綿豐四州刺史巴東敦煌二郡太守周炅字文昭汝南安成人也祖強齊梁州刺史父靈起梁廬桂二州刺史保城縣侯炅少豪俠任氣有將帥才梁太清元年為弋陽太守侯景之亂元帝承制改授西陽太守封西陵縣伯以軍功纍遷都督江州刺史進爵為侯髙祖踐阼王琳擁據上流炅以江州從之後為安都所禽送都文帝釋之授定州刺史帶西陽武昌二郡太守太建五年為都督安州刺史改封龍源縣侯其年隨都督吳眀徹北討所向尅捷一月之中獲十二城敗齊尚書左丞陸騫軍進攻巴州尅之於是江北諸城及榖陽土人並誅其渠帥以城降進號和戎將軍仍敇追炅入朝後梁定州刺史田龍升以城降詔以為定州刺史封赤圡亭王及炅入朝龍升以江北六州七鎮叛入於齊齊遣歷陽王髙景安應之於是令炅為江北道大都督總統衆軍以討龍升斬之盡復江北之地進號平北將軍卒於官贈司州刺史改封武昌郡公諡曰壯魯悉達字志通扶風郿人也祖斐齊衡州刺史陽塘侯父益之梁雲麾將軍新蔡義陽二郡太守悉達幼以孝聞起家為梁南平嗣王中兵參軍侯景之亂悉達糾合鄉人保新蔡力田蓄榖時兵荒京都及上川餓死者十八九有得存者皆攜老幼以歸焉悉達分給糧廪濟活甚衆仍於新蔡置頓以居之招集晉熙等五郡盡有其地使其弟廣達領兵隨王僧辨平侯景梁元帝授持節仁威將軍北江州刺史敬帝即位王琳據有上流留異余孝頃周迪等所在鋒起悉達撫綏五郡甚得民和士卒樂為之用琳授悉達鎮北將軍髙祖時亦遣趙知禮授征西將軍江州刺史各送鼓吹女樂悉達兩授之遷延顧望髙祖遣安西將軍沈泰濳謀襲之不克齊遣行臺慕容紹宗以衆三萬來攻鬱口諸鎮兵甲甚盛悉達與戰大敗齊軍紹宗僅以身免王琳欲圖東下以悉達制其中流遣使招誘悉達終不從琳不得下乃連結於齊共為表裏齊遣清河王髙嶽助之相持嵗餘會禆將梅天養等懼罪乃引齊軍入城悉達勒麾下數千人濟江而歸髙祖髙祖見之甚喜曰來何遲也對曰臣鎮撫上流願為藩屏陛下授臣以官恩至厚矣沈泰襲臣威亦深矣然臣所以自歸於陛下者誠以陛下豁達大度同符漢祖故也髙祖笑曰卿言得之矣授平南將軍北江州刺史封彭澤縣侯悉達仗氣任俠不以富貴驕人雅好詞賦招禮才賢與之賞會文帝即位遷安南將軍吳州刺史遭母憂哀毁過禮因遘疾卒時年三十八贈安左將軍諡曰孝侯子覽嗣悉達弟廣達臺城陷戰敗被執以憂憤卒列在忠義傳蕭摩訶字元允蘭陵人也父諒梁始興郡丞摩訶隨父之郡年數嵗而父卒其姊夫蔡路養時在南康乃收養之稍長果毅有勇力侯景之亂髙祖赴援京師路養起兵拒髙祖摩訶時年十三單騎出戰軍中莫有當者及路養敗摩訶歸侯安都常從征討安都遇之甚厚及任約徐嗣徽等引齊兵為寇髙祖遣安都北拒齊軍於鍾山龍尾及北郊壇安都謂摩訶曰卿驍勇有名千聞不如一見摩訶對曰今日令公見之及戰安都墜馬被圍摩訶獨騎大呼直衝齊軍齊軍稍解去安都乃免以平留異歐陽紇功纍遷巴山太守太建五年衆軍北伐摩訶隨都督吳眀徹濟江攻秦郡時齊遣大將尉破胡等率衆十萬來援其前隊有蒼頭犀角大力之號皆身長八尺膂力絶倫其鋒甚鋭又有西域胡妙於弓矢弦無虛發衆軍憚之及將戰眀徹謂摩訶曰若殪此胡則彼軍奪氣君有關張之名可斬顔良矣摩訶曰願得識其形狀當為公取之眀徹乃召降人有識胡者云胡著絳衣樺皮裝弓兩端骨弭眀徹遣人覘伺知胡在陳乃自酌酒以飲摩訶摩訶飲訖馳馬衝齊軍胡挺身出陳前十餘步彀弓未發摩訶遙擲銑鋧正中其額應手而仆齊軍大力十餘人出戰摩訶又斬之於是齊軍退走以功授眀毅將軍封亷平縣伯尋進為侯位太僕卿又隨眀徹進圍宿豫擊走齊將王康德以功除晉熙太守九年眀徹進軍吕梁與齊人大戰摩訶帥七騎先入手奪齊軍大旗齊衆大潰以功授譙州刺史及周武帝滅齊遣其大將軍宇文欣率衆爭吕梁欣有精騎數千摩訶以十二騎深入周軍縱橫奮擊斬馘甚衆周又遣大將王軌來赴結長圍連鎖於吕梁下流斷大軍還路摩訶謂眀徹曰聞王軌始鎖下流其兩頭築城今尚未立公若見遣擊之彼必不敢相拒水路未斷賊勢不堅彼城若立則吾屬虜矣眀徹乃奮髯曰搴旗陷陳將軍事也長算逺略老夫事也摩訶失色而退一旬之間水路遂斷周兵益至摩訶又謂眀徹曰今求戰不得進退無路若潛軍突圍未足為恥願公率步卒乘馬輿徐行摩訶領鐵騎數千驅馳前後必使公達京邑眀徹曰弟計乃良圖也然老夫受脤專征不能戰勝攻取今被圍逼置慙無地且步軍既多吾為總督必須身居其後相率兼行弟馬軍宜須在前不可遲緩摩訶因率馬軍夜發先是周長圍既合又於要路下伏數重摩訶選精騎八千衝突自後衆騎繼之比旦達淮南宣帝徵還詔授摩訶右衛將軍及宣帝崩始興王叔陵於殿內手刃後主遂奔東府摩訶入受敇乃率馬步數百趣東府城斬之以功授車騎大將軍封綏建郡公叔陵素所蓄聚金帛纍巨萬後主悉以賜之改授侍中驃騎大將軍左光祿大夫舊制三公黃閣聽事置鴟尾後主特詔摩訶開黃閣門施行馬聽事寢堂並置鴟尾仍以其女為皇太子妃會隋遣總管賀若弼鎮廣陵窺江左後主委摩訶備禦之授徐州刺史禎眀三年元會徵摩訶還朝賀若弼乘虛濟江襲京口摩訶請率兵逆戰後主不許及弼進鍾山摩訶又曰弼懸軍深入聲援猶逺且其壘塹未堅人情惶懼出兵掩襲必大尅之後主又不許及隋軍大至後主謂曰公可為我一決摩訶曰從來行陳為國為身今日之事兼為妻子後主多出金帛賦諸軍以充賞賜令中領軍魯廣達陳兵白土岡居衆軍之南鎮東大將軍任忠次之護軍將軍樊毅都官尚書孔範又次之摩訶軍最居北衆軍南北亘二十里首尾進退各不相知賀若弼初謂未戰將輕騎登山望見衆軍因馳下置陳後主通於摩訶之妻故摩訶雖領徑兵八千初無戰意唯魯廣達田端以其徒力戰賀若弼及所部行軍七總管楊牙韓洪員眀黃昕張默言達奚隆張辨等甲士凡八千各各勒陳以待之弼躬當魯廣達麾下戰死者二百七十三人弼縱煙以自隱窘而復振陳兵得人頭皆走獻後主求賞金銀弼更趣孔範範兵暫交便敗走陳軍盡潰死者五千人諸門衛皆走黃昕馳燒北掖門而入員眀禽摩訶以送弼以刀臨頸詞色不撓乃釋而禮之及京城陷賀若弼置後主於德教殿令兵衛守摩訶請於弼曰今為囚虜命在斯須得一見舊主死無所恨弼哀而許之摩訶入見後主俯伏號泣仍於舊厨取食而進之辭訣而出守衛者皆不能仰視隋文帝聞摩訶抗答賀若弼曰壯士也此亦人之所難其年入隋授為開府儀同三司尋從漢王諒向并州同諒作逆伏誅年七十三摩訶訥於言恂恂然若長者至於臨戎對寇志氣奮發所向無前年未弱冠隨侯安都在京口性好獵無日不畋遊及安都征伐摩訶功常居多子世亷有父風性至孝及摩訶凶終服闋後追慕彌切其父時賓故脫有所言及世亷對之哀慟不自勝言者為之歔欷終身不執刀斧時人嘉焉摩訶有騎士陳智深者勇力過人以平叔陵功為巴陵內史摩訶之戮也其子先已籍沒智深收摩訶尸手自殯斂哀感行路君子義之潁川陳禹亦隨摩訶征討有識量涉獵經史解風角兵書頗能屬文便騎射官至王府咨議任忠字奉誠小名蠻奴汝隂人也少孤微不為鄉黨所齒及長譎詭多計略膂力過人尤善騎射州里少年皆附之梁鄱陽王蕭範為合州刺史聞其名引置左右侯景之亂忠率鄉黨數百人隨晉熙太守梅伯龍討景將王貴顯於夀春每戰却敵會土人胡通聚衆寇抄範命忠與主帥梅思立并軍討平之仍隨範世子嗣率衆入援會京城陷旋戍晉熙侯景平授蕩寇將軍王琳立蕭莊署忠為巴陵太守琳敗還朝授明毅將軍安湘太守仍隨侯瑱進討巴湘纍遷豫寧太守衡陽內史華皎之舉兵也忠豫其謀及皎平宣帝以忠先有密啓於朝廷釋而不問太建初隨章昭達討歐陽紇於廣州以功授直閣將軍遷武毅將軍廬陵內史秩滿入為右軍將軍五年衆軍北伐忠將出西道擊走齊歷陽王髙景安於大峴逐北至東關仍尅其東西一城進軍攻蘄譙並拔之徑襲合肥入其郛進尅霍州以功授員外散騎常侍封安樂縣侯吕梁之喪師也忠全軍而還尋授忠都督夀陽新蔡霍州緣淮衆軍霍州刺史入為左衛將軍遷平南將軍西豫州刺史加都督率步騎趣歷陽周遣王延貴為援忠大破之生禽延貴後主嗣位進號征南將軍給鼓吹一部入為領軍將軍加侍中改封梁信郡公出為吳興內史及隋兵濟江忠自吳興入赴屯軍朱雀門後主召蕭摩訶以下於內殿定議忠曰兵法客貴速戰主貴持重今國家足食足兵固宜守臺城緣江立柵北軍雖來勿與交戰分兵斷江路無令彼信得通給臣精兵一萬金翅三百艘下江徑掩六合彼大軍必言其渡江將士已被獲自然挫氣淮南土人與臣舊相知悉今聞臣往必皆景從臣復揚聲欲往徐州斷彼歸路則諸軍不擊而自去待春水長上江周羅㬋等衆軍必沿流赴援此良計也後主不能從眀日歘然曰腹煩殺人喚蕭郎作一打忠叩頭苦請勿戰後主從孔範言乃戰於是赴白土岡陳及軍敗忠馳入臺見後主言敗狀啓云官好住無所用力後主與之金兩縢曰為我於南岸收募人猶可一戰忠曰陛下唯當具舟楫就上流衆軍臣以死奉衛後主信之敇忠出部分忠辭云臣處分訖即當奉迎後主令宫人裝束以待忠久望不至時隋將韓擒虎自新林進軍忠率數騎往石子岡降之仍引擒虎軍共入南掖門臺城陷隨例入長安授開府儀同三司卒年七十七隋文帝後以散騎常侍袁元友能直言於後主擢拜主爵侍郎謂羣臣曰平陳之初我悔不殺任蠻奴受人榮祿兼當重寄不能橫尸云無所用力與𢎞演納肝何其遠也子幼武位儀同三司樊毅字智烈南陽湖陽人也祖方興梁散騎常侍司州刺史魚復縣侯父文熾梁散騎常侍東益州刺史新蔡縣侯毅家本將門少習武善騎射侯景之亂率部曲隨叔父文皎援臺城文皎於青溪戰死毅赴江陵乃𨽻王僧辨討河東王蕭譽以功除右中郎將代兄俊為梁興太守領三州遊軍隨宜豐侯蕭修討陸納於湘州軍次巴陵營頓未立納潛軍夜至薄營大譟軍中將士皆驚擾毅獨與左右數十人當營門力戰斬十餘級擊鼓申令衆乃定焉以功封夷道縣伯尋除天門太守進爵為侯及西魏圍江陵毅率郡兵赴援會魏尅江陵為後梁所俘久之遁歸髙祖受禪毅與弟猛舉兵應王琳琳敗奔齊太尉侯瑱遣使招毅毅率子弟部曲還朝太建初為豐州刺史封髙昌縣侯入為左衛將軍五年衆軍北伐毅攻廣陵楚子城拔之擊走周軍及吕梁喪師詔以毅為大都督率衆度淮對清口築城與周人相抗霖雨城壞毅全軍自拔尋遷中領軍十一年周將梁士彥圍夀陽詔以毅為都督北討前軍事十三年為荆州刺史後主即位改封逍遙郡公入為侍中護軍將軍及隋師濟江毅謂僕射袁憲曰京口採石俱是要所宜各領卒數千金翅二百都下江中上下防捍如其不然大事去矣諸將咸從其議會施文慶等寢隋兵消息毅計不行臺城平隨例入關卒毅弟猛字智武幼俶儻有幹略及長便弓馬膽氣過人青溪之戰猛自旦訖暮與侯景軍短兵接戰殺傷甚衆臺城平隨兄毅西上梁南安侯方矩為湘州以猛為司馬會武陵王紀舉兵自漢江東下方矩遣猛隨都督陸法和進軍拒之猛手禽紀父子三人斬於𦪙中盡收其船艦器械以功封安山縣伯進軍撫定梁益還遷司州刺史進爵為侯永定二年周文育等敗於沌口為王琳所獲琳乘勝將爭南中諸郡遣猛與李孝欽等將兵攻豫章進逼周迪軍敗為迪所執尋遁歸王琳琳敗還朝天嘉二年授永陽太守太建中以軍功封富川縣侯歷散騎常侍荆州刺史入為左衛將軍後主即位為南豫州刺史隋將韓擒虎之濟江猛在都下第六子巡攝行州事擒虎進軍攻陷之巡及家口並見執時猛與左衛將軍蔣元遜領青龍八十艘為水軍於白下遊奕以禦隋六合兵後主知猛妻子在隋懼有異志欲使任忠代之令蕭摩訶徐喻毅毅不悅摩訶以聞後主重傷其意乃止禎眀三年入隋裴忌字無畏河東聞喜人也祖髦梁中散大夫叔祖邃梁豫州刺史邃自有傳父之平字如原少倜儻有志略以軍功封費縣侯承聖中纍遷散騎常侍太子詹事文帝初除光祿大夫慈訓宫徵衛尉並不就天康元年卒於家諡曰禧忌少而聰敏有識量頗涉史傳為當時所稱侯景之亂招集勇力乃隨髙祖征討及髙祖誅王僧辨僧辨弟僧智舉兵據吳郡髙祖遣黃他攻之不能尅命忌勒部下精兵自錢唐直趣吳郡夜至城下鼓譟薄之僧智疑大軍至輕舟奔杜龕忌入據吳郡髙祖嘉之表授吳郡太守天嘉五年纍遷衛尉卿封東興縣侯及華皎稱兵上流宣帝時為録尚書輔政盡命衆軍出討委忌總知中外城防諸軍事宣帝即位改封安樂縣侯歷位都官尚書及吳眀徹督衆北伐詔忌以本官監眀徹軍淮南平授豫州刺史忌善於撫綏甚得人和及眀徹進軍彭汴以眀徹為都督忌與眀徹俱進吕梁軍敗見囚于周授上開府隋開皇十四年卒於長安韓子髙會稽山隂人也家世微賤侯景之亂寓都下景平文帝出守吳興子髙年十六尚總角容貌美麗狀似婦人於淮渚附部伍寄載欲還鄉里文帝見而問曰能事我乎子髙許諾子髙本名蠻子帝改名之性恭謹恆執備身刀及傳酒炙帝性急子髙恆會意旨稍長習騎射頗有膽決願為將帥及平杜龕配以士卒文帝甚愛之未嘗離左右帝嘗夢騎馬登山路危欲墮子髙推捧而升文帝之討張彪也沈泰等先降帝據有州城周文育鎮北郭香巖寺張彪自剡縣夜還襲城文帝自北門出倉卒暗夕軍人擾亂唯子髙在側文帝乃遣子髙自亂兵中往見文育反命酬答於暗中又往慰勞衆軍文帝散兵稍集子髙引入文育營因共立柵明日敗彪彪奔松山浙東平文帝乃分麾下多配子髙子髙亦輕財禮士歸之者甚衆文帝嗣位除右軍將軍封文招縣子及王琳平子髙所統益多將士依附之其有所論進帝皆任使焉天嘉六年為右衛將軍文帝不豫入侍醫藥廢帝即位加散騎常侍宣帝入輔子髙兵權過重深不自安好參訪臺閣又求出為衡廣諸鎮光大二年八月前上虞縣令陸昉及子髙軍主告其謀反宣帝在尚書省因召文武在位議立皇太子子髙預焉執送廷尉其夕與到仲舉同賜死父延慶及子弟並原宥華皎晉陵既陽人也世為小吏皎梁代為尚書比部令史侯景之亂事景之黨王偉髙祖南下文帝為景所囚皎遇文帝甚厚及景平文帝為吳興太守以皎為都録事深見委任及文帝平杜龕仍配以甲兵御下分眀善於撫接解衣推食多少必均天嘉元年封懷仁縣伯王琳東下皎隨侯瑱拒之琳平知江州事後隨都督吳眀徹征周迪迪平以功進爵為侯仍授都督湘州刺史皎起自下吏善營産業又征川洞多致銅鼓及生口並送都下廢帝即位改封重安縣公韓子髙誅後皎內不自安光大元年密啓求廣州以觀時主意宣帝偽許之而詔書未出皎亦遣使引周兵又崇奉梁眀帝士馬甚盛詔乃以吳眀徹為湘州刺史實欲以輕兵襲之慮皎先發乃前遣眀徹衆三萬乘金翅直趣郢州又遣撫軍大將軍淳于量率衆五萬乘大艦繼之時梁眀帝遣水軍為皎聲援周武帝遣衛公宇文直頓魯山又遣柱國長湖公元定攻圍郢州梁眀帝授皎司空巴州刺史戴僧朔衡陽內史任蠻奴巴陵內史潘智虔嶽陽太守章昭裕桂陽太守曹宣湘東太守錢眀並𨽻皎又長沙太守曹慶等本𨽻皎下因為之用帝恐上流宰守並為皎扇惑乃下詔曲赦湘巴二州其賊主帥節將並許開恩出首皎以大艦載薪因風放火俄而風轉自焚皎大敗乃與戴僧朔奔江陵元定等無復船涉步趣巴陵巴陵城已為官軍所據乃降送於建鄴皎遂終於江陵其黨並誅唯任蠻奴章昭裕曹宣劉廣業獲免孔奐字休文會稽人也世為冠族六世祖靖宋開府儀同三司祖臻齊太子舍人三公郎父幼孫梁寧逺枝江公主簿無錫令奐數歲而孤為叔父虔孫所養好學善屬文經史百家莫不通涉沛國劉顯以博學稱每共奐談論深相歎美乃執奐手曰昔伯喈墳素悉與仲宣吾當希彼蔡君足下無愧王氏所保書籍尋以相付仕梁州舉秀才射策髙第起家揚州主簿不就後遷尚書儀曹侍郎時左户郎沈炯為飛書所謗將陷重辟連官臺閣人懷憂懼奐廷議理之竟得眀白侯景陷建鄴朝士並被拘縶或薦奐於賊帥侯子鑒乃脫桎梏厚遇之令掌書記子鑒景之腹心朝士莫不卑屈奐獨無所下或諫奐曰不宜髙抗奐曰吾性命有在豈可取媚凶醜以求全乎時賊徒剝掠子女拘逼士庶奐保持得全者甚衆尋遭母憂時天下喪亂皆不能終三年之喪唯奐及吳國張種在寇亂中守法度並以孝聞及景平司徒王僧辨先下辟書引奐為左西掾梁元帝於荆州即位徵奐及沈炯並令西上僧辨纍表請留之帝手敇報曰孔沈二士今且借公其為朝廷所重如此僧辨為揚州刺史又補從事史時景新平每事草創憲章故事無復存者奐博物強識甄眀故實問無不知儀注體式箋表書翰皆出於奐髙祖作相除司徒左長史遷給事黃門侍郎齊遣東方老蕭軌來寇軍至後湖都邑搔擾四方壅隔糧運不繼三軍取給唯在都下乃除奐為建康令時纍歲兵荒户口流散勍敵忽至征求無所髙祖剋日決戰乃令奐多營麥飯以荷葉裹之一宿之間得數萬裹軍人旦食訖決戰大破賊髙祖受禪遷太子中庶子二年除晉陵太守晉陵自宋齊已來為大郡雖經寇擾猶為全實前後二千石多行侵暴奐清白自守妻子並不之官唯以單船臨郡所得秩俸隨即分贍孤寡郡中號曰神君曲阿富人殷綺見奐居處儉素乃餉以衣氊一具奐曰太守身居美祿何為不能辦此但百姓未周不容獨享溫飽勞卿厚意幸勿為煩文帝即位徵為御史中丞奐性剛直善持理多所糾刻朝廷甚敬憚之又達於政體每所奏未嘗不稱善百司滯事皆付奐決遷散騎常侍領步兵校尉中書舍人重除御史中丞尋為五兵尚書掌詔誥時文帝不豫臺閣衆事並令僕射到仲舉共奐決之及帝疾篤奐與宣帝及到仲舉并吏部尚書袁樞中書舍人劉師知等入侍醫藥文帝嘗謂奐等曰今三方鼎峙生民未輯四海事重宜須長君朕欲近則晉成逺隆殷法卿等須遵此意奐乃流涕欷歔跪而對曰陛下御膳違和痊復非久皇太子春秋鼎盛聖德日躋安成王介弟之尊足為周旦廢立之事臣不敢聞文帝曰古之遺直復見於卿矣乃用奐為太子詹事文帝崩廢帝即位除散騎常侍國子祭酒出為南中郎康樂侯長史尋陽太守行江州事宣帝即位為始興王長史奐在職清儉多所規正宣帝嘉之賜米五百斛并纍降勑書殷勤勞問太建六年為吏部尚書八年加侍中時有事北邊尅復淮泗徐豫守長降附相繼封賞選敘紛紜重疊奐應接引進門無停賓加以鑒識人物詳練百氏凡所甄拔衣冠搢紳莫不悅服性耿介絶請託雖儲副之尊公侯之重溺情相及終不為屈始興王叔陵之在湘州纍諷有司固求台鉉奐曰衮章之職本以德舉未必皇枝因抗言於宣帝帝曰始興郍忽望公且朕兒為公須在鄱陽王後奐曰臣之所見亦如聖旨後主時在東宫欲以江總為太子詹事令管記陸瑜言之於奐奐謂瑜曰江有潘陸之華而無園綺之實輔弼儲二竊謂非才瑜具以白後主後主深以為恨乃自言於宣帝帝許之奐乃奏曰江總文華之人今太子文華不少無藉於總如臣愚見願選敦重之才以居輔導帝曰即如卿言誰當居此奐曰都官尚書王廓世有懿德識性敦敏可以居之後主時亦在側乃曰廓王泰之子不可居太子詹事奐又奏曰宋朝范煜即范泰之子亦為太子詹事後主固爭之帝以總為詹事由是忤旨其正直如此初後主欲官其私寵微諷於奐奐不從及左僕射陸繕遷職宣帝欲用奐代繕已草詔訖為後主所抑遂不行十四年為散騎常侍金紫光祿大夫領前軍將軍未行改領𢎞範宫衛尉至德元年卒年七十餘有集十五卷彈文四卷子紹安紹新紹忠紹忠字孝揚亦有才學位太子洗馬鄱陽王東曹掾王沖字長深琅邪臨沂人宋太保𢎞元孫也祖僧衍位侍中父茂璋字允光仕梁位給事黃門侍郎尚梁武帝妹新安公主卒於齊世梁武深鍾愛沖賜爵東安亭侯尋遷侍中南郡太守習於法令政號平理雖無赫赫之譽久而見思喜聼音樂習歌舞善與人交貴遊之中聲名籍甚侯景之亂元帝承制沖求解南郡讓王僧辨并獻女妓十人以助軍賞侯景平授丹陽尹魏平江陵敬帝為太宰承制以沖為左長史紹泰中纍遷光祿大夫尚書左僕射開府儀同三司給扶髙祖受禪領太子少傅加特進左光祿大夫領丹陽尹參撰律令帝以沖前代舊臣特申長幼之敬文帝即位益加尊重嘗從幸司空徐度宅宴筵之上賜以几光大元年薨年七十六贈司空諡曰元簡沖有子三十人並致通官第十二子瑒字子璵沈靜有器局美風儀梁元帝時位太子中庶子髙祖入輔以為司徒左長史文帝即位纍遷太子中庶子散騎常侍侍中父沖嘗為瑒辭領中庶子文帝顧沖曰所以久留瑒於承華正欲使太子微有瑒風法耳宣帝即位歷中書令吏部尚書瑒性寬和務清靜無所抑揚遷尚書左僕射加侍中參選事瑒居家篤睦每歲時饋遺遍及近親敦誘諸弟稟其規訓卒贈特進諡曰光子瑒弟瑜字子圭亦知名美容儀年三十官至侍中永定元年使齊以陳郡袁憲為副齊以王琳故囚之齊文宣每行載死囚以從齊人呼曰供御囚每盛怒則召殺之瑜及憲並危殆者數矣齊僕射楊遵彥每救護之天嘉二年還朝復為侍中卒諡曰貞子王通字公達琅邪臨沂人也祖份梁侍中特進父琳司徒左長史母梁武帝妹義興公主通兄弟九人並知名兄銓錫僉前史俱有傳通仕梁為黃門侍郎敬帝承制以為尚書右僕射髙祖受禪遷右僕射太建元年位左光祿大夫六年加特進侍中將軍光祿佐吏扶並如故未拜卒諡曰成通弟勱字公齊美風儀博涉書史恬然清簡未嘗以利欲干懷仕梁為輕車河東王功曹史王出鎮京口勱將隨之蕃范陽張纘時典選舉勱造纘言別纘嘉其風采乃曰王生才地豈可遊外府乎奏為太子洗馬後為南徐州別駕從事史大同末梁武謁園陵道出朱方勱隨例迎候勑令從輦側所經山川莫不顧問勱隨事應對咸有故實又從登北顧樓賦詩辭義清典帝甚嘉之時河東王為廣州刺史乃以勱為冠軍河東王長史南海大守王至嶺南多所侵掠因懼罪稱疾委州還朝勱行府州事越中饒沃前後守宰例多貪縱勱獨以清白著聞入為給事黃門侍郎侯景之亂奔江陵歷位晉陵太守時兵飢之後郡中凋弊勱為政清簡吏民便安之徵為侍中遷五兵尚書會魏軍至元帝徵湘州刺史宜豐侯蕭修入援以勱監湘州及魏平江陵敬帝承制以為中書令加侍中歷髙祖司空丞相長史侍中中書令並如故及蕭勃平以勱為廣州刺史未行改為衡州刺史王琳據有上流衡廣攜二勱不得之鎮留於大庾嶺太建元年纍遷尚書右僕射時東境大水以勱為晉陵太守在郡甚有威惠郡人表請立碑頌勱政德詔許之徵為中書監重授尚書左僕射領右軍將軍卒諡曰溫子勱弟質字子貞少慷慨涉獵書史梁世以武帝甥封甲口亭侯位太子中舍人庶子侯景濟江質領步騎頓於宣陽門外景軍至都質不戰而潰為桑門潛匿人間城陷後西奔荆州元帝承制歷位侍中吳州刺史領鄱陽內史魏平荆州侯瑱鎮盆城與質不協質率所部依於留異永定二年髙祖命質率所部隨都督周文育討王琳質與琳素善或譖云於軍中潛信交通髙祖命文育殺質文育啓救之獲免文帝嗣位以為五兵尚書宣帝輔政為司徒左長史坐招聚博徒免官後為都官尚書卒諡曰安子質弟固字子堅少清正頗涉文史梁時以武帝甥封莫口亭侯位丹陽丞梁元帝承制以為相國户曹屬掌管記尋聘魏魏人以其梁氏外戚待之甚厚承聖元年為太子中庶子遷尋陽太守魏尅荆州固之鄱陽隨兄質度東嶺居信安縣永定中移居吳郡文帝以固清靜且欲申以婚姻天嘉中歷位中書令散騎常侍國子祭酒以其女為皇太子妃禮遇甚重廢帝即位授侍中金紫光祿大夫宣帝輔政固以廢帝外戚妳媪恆來往禁中頗宣密旨事泄比黨皆誅宣帝以固本無兵權且居處清素止免所居官禁錮太建中卒於太常卿諡恭子固清靜寡欲居喪以孝聞又信佛法及丁所生母憂終身蔬食夜則坐禪晝誦佛經嘗聘魏因宴饗際請停殺一羊羊於固前跪拜又宴昆眀池魏人以南人嗜魚大設罟網固以佛法咒之遂一鱗不獲子寬位侍中王猛字世雄本名勇琅邪臨沂人宋贈太常準之元孫也祖進之梁左衛將軍父清鎮東府長史新野東陽二郡太守承聖末為歐陽頠所殺事具清本傳清之遇害也猛時年五歲文帝渡浙江訪之將加夷滅母韋氏攜之遁於會稽遂免及長勤學不倦博涉經史兼習孫吳兵法以父遇酷終文帝之世不聽音樂蔬食布衣以喪禮自處宣帝立乃始求位太建初釋褐鄱陽王府中兵參軍再遷永陽王府録事參軍猛慷慨常慕功名先是上疏陳安邊拓境之策甚見嘉納至是詔隨大都督吳眀徹略地以軍功封應陽縣子纍遷太子右衛率徙晉陵太守威惠兼舉姦盜屏迹富商野次云以付王府君郡人歌之以比漢之趙廣漢至德初徵為左驍騎將軍加散騎常侍深見信重時孔範施文慶等並相比周害其梗直議將出之而未有便會廣州刺史馬靖不受徵乃除猛都督東衡州刺史領始興內史與廣州刺史陳方慶共取靖猛至即禽靖送建鄴進爵為公加先勝將軍平越中郎將大都督發廣桂等二十州兵討嶺外荒梗所至皆平禎眀二年招授鎮南大將軍都督二十四州諸軍事尋命徙鎮廣州未之鎮而隋師濟江猛總督所部赴援時廣州刺史臨汝侯方廢西衡州刺史衡陽王伯信並𨽻猛督府各觀望不至猛使髙州刺史戴智烈清逺太守曾孝逺各以輕兵就斬之而發其兵及聞臺城不守乃舉哀素服藉藁不食歎曰申包胥獨何人哉因勒兵緣江拒守以固誠節及審後主不死乃遣其部將辛昉馳驛赴京師歸欵隋文帝大悅謂昉曰猛懷其舊主送故情深即是我之誠臣保守一方不勞兵甲又是我之功臣即日拜昉開府儀同三司仍詔猛與行軍總管韋洸便留嶺表經略猛母妻子先留建鄴因隨後主入京詔賜宅及什物甚厚別賚物一千段又遣璽書勞猛仍討平山越馳驛奏聞時文帝幸河東會猛使至大悅楊素賀因曰昔漢武此地聞喜用改縣名王猛今者告捷逺符前事於是又降璽書褒賞以其長子繕為開府儀同三司猛尋卒於廣州文帝聞而痛之遣使弔祭贈上開府儀同三司封歸仁縣公命其子繕襲仍授普州刺史仁夀元年繕弟續表陳猛志求葬關中詔許之仍贈使持節大將軍宋州刺史三州軍事諡曰成到仲舉字德言彭城武原人宋護軍將軍彥之元孫也父洽梁贈侍中仲舉無他藝業而立身耿正仕梁為長城令政號亷平文帝居鄉里嘗詣仲舉時天隂兩仲舉獨坐齋內聞城外有簫鼓聲俄而文帝至仲舉異之乃深自結納帝又嘗因飲夜宿仲舉帳中忽有神光五采照於室內由是祗事益恭及侯景平文帝為吳興太守以仲舉為郡丞與潁川庾持俱為文帝賓客文帝嗣位授侍中參掌選事天嘉元年守都官尚書封寶安縣侯三年遷尚書左僕射丹陽尹參掌如故改封建昌縣侯仲舉既無學術朝章非其所長選舉引用皆出自袁樞性疏簡不干時務與朝士無所親狎但聚財酣飲而已文帝積年寢疾不親萬機尚書中書事皆使仲舉斷決天康元年遷侍中尚書僕射文帝疾甚入侍醫藥及帝崩宣帝受遺詔為尚書令入輔仲舉與左丞王暹中書舍人劉師知殷不佞以朝望有歸仍遣不佞宣旨遣宣帝還東府事發師知下獄賜死暹不佞並付推乃以仲舉為貞毅將軍金紫光祿大夫初仲舉子郁尚文帝妹信義長公主官至中書侍郎出為宣城太守文帝配以士馬是年遷南康內史以國哀未之任仲舉既廢居私宅與郁皆不自安時韓子髙在都人馬素盛郁每乘小輿蒙婦人衣與子髙謀子髙軍主告其事宣帝收子髙仲舉及郁並於獄賜死郁諸男女以帝甥獲免庾持字元德潁隂人也父沙彌梁邵陵王參軍沙彌有至性列在孝友傳持少孤性亦至孝父憂居喪過禮篤志好學仕梁為尚書左丞户郎後兼建康監文帝為吳興太守以為郡丞兼掌書翰天嘉初為尚書左丞封崇德縣子拜封之日請令史為客受其餉遺文帝怒之因坐免後為臨安令坐杖殺人免還為給事黃門侍郎歷鹽官令祕書監知國史事又為少府卿遷太中大夫領步兵校尉卒持善字書每屬辭好為竒字文士亦以此譏之有集十卷子自直在文苑傳許亨字亨道髙陽新城人也父懋梁太子中庶子自有傳亨少傳家業孤介有節行博通羣書多識前代舊事甚為南陽劉之遴所重梁太清初為西中郎記室兼太常丞侯景之亂避地郢州會梁邵陵王自東至引為咨議參軍王僧辨之襲郢州素聞其名召為儀同從事中郎遷太尉從事中郎與吳興沈炯對掌書記府政朝務一以委之晉安王承制授給事黃門侍郎髙祖受禪為太中大夫領大著作知梁史事初髙祖之誅王僧辨也以僧辨及其子頠尸於方山掘坎埋瘞至是無敢言改葬之者亨乃表請葬之與故義徐陵張種孔奐等相率以家財營葬凡七柩皆改窆焉光大中宣帝入輔以亨貞正有古人風甚相欽重常以師禮事之及到仲舉之謀出宣帝宣帝問亨亨勸勿奉詔宣帝即位拜衛尉卿卒於官亨初撰齊書并志五十卷遇亂亡失後撰梁史成者五十八卷梁太清之後所製文筆六卷子善心位尚書度支侍郎入隋位終通議大夫行給事中列在文苑傳禇玠字溫理河南陽翟人也祖澐字士洋仕梁為曲阿令歷晉安王中録事正員郎烏程令兄遊亡棄縣還為太尉屬延陵令中書侍郎太子率更令御史中丞湘東王府咨議參軍卒澐之為縣令清愼可紀好學解音律重賓客雅為湘東王所親愛澐生蒙蒙位太子舍人蒙生玠玠九歲而孤為叔父驃騎從事中郎隨所養早有令譽先達多以才器許之及長美風儀善占對博學能屬文詞義典實不尚淫靡起家王府記室天嘉中兼通直散騎常侍聘齊還遷中書侍郎太建中山隂縣多豪猾前後令皆以贓汚免宣帝謂中書舍人蔡景歷曰稽隂大邑久無良宰卿於文士之內試思其人景歷曰禇玠亷儉有幹用未審堪其選不帝曰善卿言與朕意同乃除戎昭將軍山隂令縣人張次的王休達等與諸猾吏賄賂通姦全丁亡户類多隱沒玠鎖次的等具狀啓臺宣帝手勑慰勞并遣使助玠搜括所出軍人八百餘户時舍人曹義達為宣帝所寵縣人陳信家富諂事義達父顯文恃勢橫暴玠乃遣使執顯文鞭之一百於是吏民股栗莫敢犯者帝手勑慰勞後為義達所譖坐免官玠在任嵗餘守祿俸而已去官之日不堪自致因留縣境種蔬菜以自給或嗤玠非百里才玠答曰吾委輸課最不後列城除害去暴姦吏局蹐若謂其不能自潤脂膏則如來命以為不達從政吾未服也時人以為信然皇太子知玠無還裝手書賜米二百斛於是勑還都太子愛其文辭令入直殿省掌東宫管記遷御史中丞卒玠剛毅有膽決善騎射嘗從司空侯安都於徐州出獵遇虎玠射之載發皆中口入腹俄而虎斃及為御史中丞甚有繩糾之稱自梁末喪亂朝章廢弛司憲因循守而勿革玠方欲改張大為條例綱維略舉而卒皇太子親製志銘以表惟舊至德二年贈祕書監玠所製雜文二百餘篇皆切事理由是見重於世子亮位尚書殿中侍郎通志卷一百四十四
