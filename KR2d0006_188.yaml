body:
  text: 通志卷一百六十四宋右迪功郎鄭樵漁仲撰列傳七十七隋盧賁薛道衡族父孺房彥謙盧思道從兄昌衡盧愷王誼長孫平源師從叔雄薛胄令狐熙裴肅張定和張奫麥鐡杖子孟才沈光權武王仁恭吐萬緒董純魚俱羅王辨斛斯萬善陳稜趙才宇文述雲定興司趙行樞化及馬德戡述子裴虔通李密王世充假達盧賁字子徴范陽涿人也父光周開府燕郡公附在兄辨傳賁略涉書史頗解鍾律周武帝時襲爵燕郡公歷位魯陽太守太子少宮尹儀同三司纍遷司武上士時髙祖為太司馬賁知帝非常人深自推結宣帝嗣位加開府及高祖初被顧託羣情未一乃引賁置在左右髙祖將之東第百官皆不知所去髙祖潛令賁部伍仗衛因召公卿而謂曰欲求富貴當皆相隨來時往往偶語欲有去就賁嚴兵而至衆莫敢動出崇陽門至東宫門者拒不納賁諭之不去瞋目叱之門者遂却既而高祖得入賁常典宿衛後承間進説曰周厯已盡天人之望實歸明公願早應天順人髙祖然之及受禪命賁清宫因典宿衛賁於是奏改周代旗幟更為嘉名其青龍騶虞朱雀元武千秋萬嵗之旗皆賁所創也尋拜散騎常侍兼太子左庶子左領軍將軍及高熲蘇威共掌朝政賁甚不平之柱國劉昉時被疏忌賁因諷昉及上柱國元諧李詢華州刺史張賔等謀黜熲威五人相與輔政又以晉王上之愛子謀行廢立復私謂皇太子曰賁將數謁殿下恐為上譴願察區區之心謀泄昉等委罪於賔賁公卿奏二人坐當死帝以龍潛之舊不忍加刑並除名為民賔未幾卒嵗餘賁復爵位檢校太常卿賁以古樂宫縣七八損益不同歷代通儒議無定凖乃上表曰殷人以上通用五音周武克殷得鶉火天駟之應其音用七漢興加應鍾故十六枚而在一簴鄭元注周禮二八十六為簴此則七八之義其來逺矣然世有沿革用捨不同至周武帝復改縣七以林鍾為宫夫樂者政之本也故移風易俗莫善於樂是以吳札觀而辨興亡然則樂也者所以動天地感鬼神情發於聲安危斯應周武以林鍾為宫蓋將亡之徴也且林鍾之管即黃鍾下生之義黃鍾君也而生於臣明為皇朝九五之應又隂者臣也而居君位更顯國家登極之祥斯實冥數相符非關人事臣聞五帝不相沿樂三王不相襲禮此蓋隨時改制而不失雅正者也帝從之改七縣八黃鍾為宮又詔賁與儀同楊慶和刋定周齊音律未幾歷郢虢懷三州刺史在懷州決沁水東注名曰利人渠又派入溫縣名曰溫潤渠以溉舄鹹民賴其利後為齊州刺史民飢穀湧貴賁坐閉人糶而私糴除名後從幸洛陽上從容謂賁曰我始為大司馬時卿布腹心於我及總百揆頻繁左右與卿足為恩舊卿若無過者位與高熲齊又坐與凶人交構由是廢黜言念疇昔之恩復處牧伯之位何乃不思報效以至於此吾不忍殺卿是屈法申私耳賁俯伏陳謝詔復本官後數日對詔失旨又自敘功績有怨言上大怒顧謂羣臣曰吾將與賁一州觀此不可復用後皇太子為其言曰此輩並有佐命之功雖性行輕險誠不可棄上曰我屈抑之全其命也微劉昉鄭譯及賁栁裘皇甫績等則我不至於此然此等皆反覆子也當周宣帝時以無賴得幸及帝大漸顔之儀等請以趙王輔政此輩行詐顧命於我我將為政又欲亂之故昉謀大逆於前譯為巫蠱於後如賁之徒皆不滿志任之則不遜致之則怨自難信也非我棄之衆人見此或有竊議者必謂我薄於功臣斯不然矣蘇威進曰漢光武欲全功臣皆以列侯奉朝請至尊仁育復用此道以安之上曰然遂廢於家卒薛道衡字元卿河東汾隂人也父孝通魏恆山太守附在髙祖辨傳道衡六嵗而孤專精好學年十三講左氏傳見子産相鄭之功作國僑贊詞致清正見者奇之其後才名益著齊司州牧彭城王浟引為兵曺從事尚書左僕射楊愔一代偉人見而嗟賞授奉朝請吏部尚書辛術與語歎曰鄭公業不亡矣河東裴讞目之曰自鼎遷河朔吾謂關西孔子罕值其人今復遇薛君矣武成作相召為記室及即位纍遷太尉府主簿兼散騎常侍接對周陳二使武平初詔與諸儒修定五禮除尚書左外兵郎陳使傅縡聘齊以道衡兼主客郎接對之縡贈詩五十韻道衡和之南北稱美魏收曰傅縡所謂以蚓投魚耳待詔文林館與范陽盧思道李德林齊名友善復以本官直中書省尋拜中書侍郎仍參太子侍讀後主之世漸見親用于時頗有附會之譏後與侍中斛律孝卿參預政事道衡具陳備周之策孝卿不能用及齊亡周武帝引為御史二命士後歸鄉里自州主簿入為司祿上士髙祖作相從元帥梁睿擊王謙攝陵州刺史大定中授儀同守卭州刺史高祖受禪坐事除名河間王𢎞北征突厥召典軍書還除內史舍人其年兼散騎常侍聘陳使主道衡因奏曰陛下比隆三代平一九州豈容區區之陳久在天網之外臣今奉使請責以稱藩帝曰朕且含養置之度外勿以言辭相折江東雅好篇什陳主尤愛雕蟲道衡每有所作南人無不吟誦焉八年伐陳授淮南道行臺尚書吏部郎兼掌文翰王師將臨江表高熲夜坐幕下謂之曰今假之舉克定江東已否君試言之道衡曰凡論大事成敗先須以至理斷之禹貢所載九州本是王者封域後漢之季羣雄競起孫權兄弟遂有吳楚之地晉武受命尋即吞并永嘉南遷重此分割自爾以來戰爭不息郭璞有云江東偏王三百年還與中國合今數將滿矣以運數而言其必克一也有德者昌無德者亡自古興滅皆由此道主上躬履恭儉憂勞庶政叔寶峻宇雕牆酣酒荒色上下離心其必克二也為國之體在於任寄彼之公卿備員而已拔小人施文慶委以政事尚書令江總惟事詩酒本非經略之才蕭摩訶任蠻奴是其大將一夫之用耳其必克三也我有道而大彼無德而小量其甲士不過十萬西自巫峽東至滄海分之則勢懸而力弱聚之則守此而失彼其必克四也席卷之勢其在不疑熲欣然曰君言成敗理甚分眀吾今豁然矣本以才學相期不意籌略乃爾還除吏部侍郎後坐抽擢人物有言其黨蘇威任人有意故者除名配防嶺表晉王廣時在揚州隂令人諷道衡從揚州路將奏留之道衡不樂為王府用後從漢王諒之計遂道出江陵尋有詔徴還直內史省晉王由是銜之然愛其才猶頗見禮後數嵗授內史侍郎加上儀同三司道衡每構文必隱坐空齋踏壁而臥聞户外有人便怒其沈思如此高祖每曰道衡所作文書必稱我意然誡之以迂誕後髙祖善其稱職謂楊素牛𢎞曰道衡老矣驅使勤勞宜使其朱門列戟於是進位上開府賜物百假道衡辭以無功上曰爾久勞階陛國家大事皆爾宣行豈非爾功也道衡久當樞要才名益顯太子諸王爭相與交好髙熲楊素雅相推重聲名藉甚無競一時仁夀中楊素專掌朝政道衡既與素善上不欲道衡久知機密因出檢校襄州總管道衡久蒙驅䇿一旦違離言之哽咽髙祖更愴然改容曰爾光隂晚暮侍奉誠勞朕欲令爾將攝兼撫萌俗今爾之去朕如斷一臂於是賜物三百假九環金帶并時服一襲馬十匹慰勉遣之在任清簡吏民懷之煬帝嗣位轉潘州刺史嵗餘上表求致仕帝謂內史侍郎虞世基曰道衡將至當以祕書監待之道衡既至上高祖文皇帝頌帝覽之不悅顧謂蘇威曰道衡致美先朝此魚藻之義也於是拜司𨽻大夫將置之罪而道衡不悟司𨽻刺史房彥謙素與相善知必及禍勸之杜絶賔客卑辭下氣而道衡不能用會議新令久不能決道衡謂朝士曰向使高熲不死令當久行即有人奏之帝怒曰汝憶髙熲邪付執法者推之道衡自以非大過促憲司早具斷暨於奏日冀帝赦之勑家人具饌以備賔客來候者帝令自盡道衡殊不意未能引決憲司重奏縊而殺之妻子並徙且末時年七十天下寃之有文集七十卷行於世子五人收最知名出繼族父孺孺清貞孤介不交流俗涉獵經史有才思雖不大為文有所賦詠辭致清逺開皇中為侍御史揚州總管司空參軍每以方直自處府僚多不便之卒於襄城郡掾所涖官皆有能名道衡偏相友愛收初生即與孺為後養於孺宅至於成長殆不識本生太常丞胡仲操曾在朝堂就孺借刀子割爪甲孺以仲操非雅士竟不與之其不肯妄交清介獨行皆此類也道衡兄溫字尼卿沈敏有器局博覽墳典尤善𨽻書仕周為上黃郡守周平齊徙燕郡太守以簡惠稱宣政元年賜爵齊安縣子卒於郡子邁嗣邁字𢎞仁性寡言長於辭辨開皇初襲爵齊安子改封鍾山歷位太子舍人大業中為刑部選部二侍郎道衡從父弟道實位禮部侍郎離石郡太守知名於世從子德音有俊才起家遊騎尉佐魏淡修魏史史成遷著作佐郎及越王侗稱制東都王世充之僭號軍書羽檄皆出其手世充平以罪誅其文筆皆行於世房彥謙字孝沖清河東武城人也髙祖法夀魏贈青州刺史自有傳父熊字子威性至孝聰眀有節槩州辟主簿仕齊行清河廣川二郡事彥謙長兄彥詢最知名以魏勳門嫡孫賜爵永始縣子特為伯父樂陵太守豹所重病卒豹取急送柩還鄉悲痛傷惜以為喪當家之寶初彥詢少時為監館嘗接陳使江總及陳滅總入關見彥謙曰公是監館弟耶因慘然曰昔因將命得申言款彥詢所贈總詩今見在總集彥謙早孤不識父為母兄所鞠養彥詢雅有清鑒以彥謙天性頴悟每奇之親教讀書年七嵗誦數萬言為宗黨所異十五出後叔父子貞事所繼有踰本生子貞哀之撫養甚厚後丁繼母憂勺飲不入口者五日事伯父豹竭盡心力每四時珍果弗敢先嘗遇期功之戚必蔬食終禮宗從取則焉其後受學于博士尹琳手不釋卷遂通涉五經解屬文雅有詞辨風槩髙人年十八屬齊廣寧王孝珩為齊州刺史辟為主簿時禁網疏濶州郡之職尤多縱弛及彥謙在職清簡守法州境肅然莫不敬憚及周師入鄴齊主東奔以彥謙為齊州中從事彥謙痛本朝傾覆將紏率忠義潛謀匡輔事不果而止齊亡歸于家周武帝遣柱國辛遵為齊州刺史為賊帥輔帶劒所執彥謙以書喻之帶劔慙懼送遵還州諸賊並各歸首及髙祖受禪之後遂優遊鄉曲誓無仕心開皇七年刺史韋藝固薦之不得已而應命吏部尚書盧愷一見重之擢授承奉郎俄遷監察御史後屬陳平奉詔安撫泉括等十州以銜命稱旨賜物百段米百石衣一襲奴婢百口遷秦州總管録事參軍因朝集時左僕射髙熲定考課彥謙謂熲曰書稱三載考績黜陟幽眀唐虞以降代有其法黜陟合理褒貶無虧便是進必得賢退皆不肖如或舛謬法乃虛設比見諸州考校執見不同進退多少參差不類况復愛憎肆意致乖平坦清介孤直未必髙第卑諂巧宦翻居上等真偽混淆是非瞀亂宰貴既不精練斟酌取捨曾經驅使者多以蒙識獲成未歷臺省者皆為不知被退又四方懸遠難可詳悉惟凖量人數半破半成徒計官員之少多莫顧善惡之衆寡欲求允當其道無由明公鑒逹幽微平心遇物今所考校必無阿枉脫有前件數事未審何以裁之惟願逺布耳目精加采訪褒秋毫之善貶纎芥之惡非直有光至道亦足摽奬賢能詞氣侃然觀者屬目熲為之動容深見嗟賞因歷問河西隴右官人景行彥謙對之如響熲謂諸州總管刺史曰與公言不如獨共秦州考使語後數日熲言於帝帝弗能用以秩滿遷長葛令甚有惠化百姓號為慈父仁夀中上令持節使者巡行州縣察長吏能否以彥謙為天下第一超授鄀州司馬吏民號哭相謂曰房眀府今去吾屬何用生為其後百姓思之立碑頌德鄀州久無刺史州務皆歸彥謙名有異政內史侍郎薛道衡一代文宗位望清顯所與交結皆海內名賢深重彥謙為人甚加友敬及為襄州總管辭翰往來交錯道路煬帝即位道衡轉牧潘州路經彥謙所留連數日屑涕而别黃門侍郎張衡亦與彥謙相善于時帝營東都窮極侈麗天下失望又漢王構逆罹罪者多彥謙見衡當塗而不能匡救以書諭之頗陳時政得失衡得書歎息而不敢奏聞彥謙知王綱不振遂去官隱居不仕將結構于蒙山之下以求其志會置司𨽻官盛選天下知名之士朝廷以彥謙公方宿著時望所歸徴授司𨽻刺史彥謙亦慨然有澄清天下之志凡所薦舉皆人倫表式其有彈射當之者曾無怨言司𨽻别駕劉灹陵上侮下訐以為直刺史憚之皆為之拜惟彥謙執法不撓抗禮長揖有識嘉之灹亦不恨大業九年從駕度遼監扶餘道軍事其後隋政漸亂朝廷靡然莫不變節彥謙直道守常介然孤立頗為執政者所嫉出為涇陽令終于家年六十九彥謙居家每子姪定省常為講説督勉之亹亹不倦家有舊業資産素殷又前後居官所得俸祿皆以周恤親友家無餘財車服器用務存素儉自少及長一言一行未嘗涉私雖致屢空怡然自得嘗從容獨笑顧謂其子元齡曰人皆因祿富我獨以官貧所遺子孫在於清白耳所有文筆恢廓間雅有古人之深致又善草𨽻人有得其尺牘者皆寶玩之太原王劭北海髙構蓨縣李綱中山郎茂河東栁彧薛孺皆一時知名雅淡之士彥謙並與為友雖冠蓋成列而門無雜賔體資文雅深達政務有識者咸以遠大許之初開皇中平陳之後天下一統論者咸云將至太平彥謙私謂所親趙郡李少通曰主上性多忌刻不納諫諍太子卑弱諸王擅威在朝者惟行苛酷之政不𢎞逺大之體天下雖安方憂危亂少通初謂不然及仁夀大業之際其言皆驗唐貞觀初以子元齡著勳庸贈徐州都督臨淄縣公諡曰定盧思道字子行范陽涿人也高祖元魏散騎常侍自有傳父道亮隱居不仕思道聰爽俊辨通侻不羈年十六遇中山劉松為人作碑銘以示思道思道讀之多不解於是感激閉戶讀書師事河間邢子才後思道復為文以示劉松松又不能甚解思道乃喟然歎曰學之有益豈徒然哉因就魏收借異書數年之間才學兼著不持操行好輕侮人物齊天保中魏史未出思道多所非毁由是大被笞辱前後屢犯典憲因而落魄不調其後左僕射楊愔薦之於朝解褐司空行參軍長兼員外散騎侍郎直中書省文宣帝崩當時文士各作挽歌十首擇其善者而用之魏收陽休之祖孝徴等不過得一二首惟思道獨得八首故時人稱之為八米盧郎後以漏泄省中語出為丞相西閣祭酒歷太子舍人司徒録事參軍每居官多被譴辱後以擅用庫錢免歸家嘗於薊北悵然感慨為五言詩見意世以為工後為給事黃門侍郎待詔文林館周武帝平齊授儀同三司追赴長安與同輩陽休之等數人作聽蟬鳴篇思道所為詞意清切為時人所重新野庾信遍覽諸同作者而深歎美之未幾母疾還鄉遇同郡祖英伯及從兄昌期與宋護等作亂思道預焉柱國宇文神舉討平之獲思道罪當極刑神舉聞其名引出令作露布思道援筆立成文無加點神舉嘉而宥之後除掌教上士高祖為丞相遷武陽太守位下不得志為孤鴻賦以寄其情開皇初以母老表請解位優詔許之思道自恃才地多所陵轢由是宦塗淪滯既而又著勞生論指切當時嵗餘奉詔郊勞陳使頃之遭母憂未幾起為散騎侍郎兼內史侍郎事于時議置六卿將除大理思道上表曰省有駕部寺留太僕省有刑部寺除大理斯則重畜産而賤刑名誠為未可又陳殿廷非杖罰之所朝臣犯笞罪請以贖論上悉嘉納之是嵗卒于京師上甚惜之遣使弔祭焉有文集二十卷行於世子赤松大業中位河東縣長思道從兄昌衡字子均小字龍子父道虔魏幽州刺史昌衡沈靖有才識風神淡雅容止可法博涉經史工草行書思道小字釋奴宗中稱英妙昌衡與之俱被推重故幽州為之語曰盧家千里釋奴龍子仕魏兼太尉外兵參軍齊受禪歷平恩令為僕射祖孝徴所薦遷尚書金部郎孝徴每曰吾用盧子均為尚書郎自謂無愧幽明矣始天保中尚書王昕以雅談獲罪諸弟相尚守而不墜自兹以後此道浸微昌衡與頓邱李若彭城劉珉河南陸彥師隴西辛德源王循並為後進風流之士後兼散騎侍郎迎勞周使周武平齊授司玉中士與大宗伯斛斯徴修禮令開皇初拜尚書祠部侍郎髙祖嘗大集羣下令自陳功績人皆競進昌衡獨無所言左僕射高熲目而異之陳使賀徹周濆相繼來聘朝廷每令昌衡接對之未幾出為徐州總管長史甚有能名吏部尚書蘇威考之曰德為人表行為世則論者以為美談嘗行至浚儀所乘馬為人牛所觸致死牛主陳謝求還價直昌衡曰六畜相觸自關常理此豈人情也君何謝焉拒而不受性寬厚不校皆此類也轉夀州總管長史刺史宇文述甚敬之委以州務嵗餘遷金州刺史仁夀中奉詔持節為河南道巡省大使及還以奉使稱旨授儀同三司賜物二百段昌衡自以年在懸車上表乞骸骨優詔不許大業初徴為太子左庶子行詣洛陽道卒子寶素寶允盧愷字長仁范陽涿人也父柔周開府儀同三司自有傳愷性孝友神情爽悟略涉書記有當世幹能頗解屬文周齊王憲引為記室從憲伐齊説齊柏社鎮下之遷小吏部大夫時染工王神歡者以賂自進冢宰宇文護引為計部下大夫愷諫曰古者登髙能賦可為大夫求賢審官理須詳慎今神歡出自染工更無殊異徒以家富自通遂與縉紳並列實恐鵜翼之刺聞之外境護竟寢其事轉內史下大夫武帝在雲陽宫勑諸屯簡老牛欲以享士愷進諫曰昔田子方贖老馬君子以為美談向奉眀勑欲以老牛享士有虧仁政帝美其言乃止轉禮部大夫為聘陳使副先是行人多從其國禮及愷為使一依本朝陳人莫能屈建德四年李穆攻拔軹關柏崖二鎮命愷作露布帝讀大悅曰盧愷文章大進荀景倩故是令君之子大象元年拜東都吏部大夫開皇初加上儀同三司除尚書吏部侍郎進爵為侯仍攝尚書左丞每有敷奏侃然正色雖逢喜怒不改其常加散騎常侍八年上親考百寮以愷為上愷固讓不敢受髙祖曰吏部勤幹舊所聞悉今者上考僉議攸同當仁不讓何愧之有皆在朕心無勞飾讓嵗餘拜禮部尚書攝吏部尚書會國子博士何妥與右僕射蘇威不平奏威陰事愷坐與相連憲司奏愷曰房恭懿者尉遲迥之黨不當仕進威愷二人曲相薦達纍轉海州刺史又吏部預選者甚多愷不即授官皆注色而遣威之從父弟徹肅二人並以鄉正徴詣吏部文狀後至而先任用肅左足攣蹇才用無算愷以威故授朝請郎愷之朋黨事甚眀白上大怒曰愷敢將天子官以為私惠愷免冠頓首曰皇太子將以通事舍人蘇夔為舍人夔即蘇威之子臣以夔未當遷固啓乃止臣若與威有私豈當如此上曰蘇威之子朝廷共知卿乃固執以徼身幸至所不知者便行朋附姦臣之行也於是除名為百姓卒於家自周氏以降選無清濁及愷攝吏部與薛道衡陸彥師等甄别士流故涉黨錮之譖遂及於此子義恭王誼字宜君其先樂浪人也父顯周鳳州刺史洛邑縣公誼少慷慨有大志便弓馬博覽羣言周閔帝時為左中侍上士時大冢宰宇文護執政帝拱默無所關預有朝士於帝側微不為恭誼悖然而進將擊之其人惶懼請罪乃止自是朝臣無敢不肅遷御正大夫丁父艱毁瘁過禮廬于墓側負土成墳武帝即位纍遷內史大夫封楊國公從武帝伐齊至并州帝既入城反為齊人所敗左右多死誼率麾下驍雄赴之賴以全濟時帝以六軍挫衄欲班師誼固諫帝從之齊平自相州刺史徵為大內史汾州稽胡亂誼擊之帝弟越王盛譙王儉雖為總管並受誼節度賊平封一子開國公後帝臨崩謂皇太子曰王誼社稷臣宜處以機密不須逺任也及太子即位是為宣帝憚誼剛正出為襄州總管及髙祖為丞相轉鄖州總管司馬消難舉兵反以誼為行軍元帥率四總管討之未至而消難奔陳于時北至商洛南拒江淮東西二千餘里巴蠻多叛共推渠帥蘭洛州為主洛州自號河南王以附消難北連尉遲迥誼分兵討之旬月皆平髙祖以誼前代舊臣甚加禮遇遣使勞問冠蓋不絶以第五女妻其子奉孝尋拜大司徒誼自以與帝有舊亦歸心焉及隋受禪眷遇彌厚帝親幸其第與之極歡太常蘇威議以户口滋多民田不贍欲減功臣之地以給民誼奏曰百官者歷世勳賢方蒙爵土一旦削之未見其可臣所慮正恐朝臣功德不建何患人田有不足帝以為然竟寢威議帝將幸岐州誼奏曰陛下初臨萬國人情未洽何用此行上戲之曰吾昔與公位望齊等一朝屈節為臣或當恥愧是行也震揚威武欲以服公心耳誼笑而退尋奉使突厥上嘉其稱旨進封郢國公未幾其子奉孝卒踰年誼表言公主少請除服御史大夫楊素劾誼曰臣聞喪服有五親疏異節喪制有四降殺殊文王者之所常行故曰不易之道也而儀同王奉孝既尚蘭陵公主以去年五月身喪始經一周而誼便請除釋竊以公主雖曰王姬終成下嫁之禮主於奉孝猶在移天之義况復三年之喪自上達下及期釋服在禮未詳然則夫婦之則人倫攸始喪紀之制人道至大茍不重之取笑君子故鑽燧改火責以居喪之速朝祥暮歌譏其忘哀之早然誼雖不自強爵位已重欲為無禮其可得乎乃薄俗傷教為父則不慈輕禮易喪致婦於無義若縱而不正恐傷風俗請付法推科有詔不問然恩禮由是稍薄誼頗怨望或告誼謀反帝令按其事主者奏誼有不遜之名實無反狀帝賜之酒而釋之于時上柱國元諧亦失意誼數與相往來言論醜惡胡僧告之公卿奏誼大逆不道罪當死上見誼愴然曰朕與公舊為同學甚相憐愍將奈國法何於是詔賜死於家時年四十六長孫平字處均其先代人也父儉周柱國夏州總管封鄫國公自有傳平美容儀有器幹頗覽書記為周衛王侍讀時武帝逼於宇文護與衛王謀誅之王常使平通意於帝護誅拜開府儀同三司宣帝置東宫官屬以平為小司寇與宗伯趙芬分掌六府髙祖龍潛時與平情好款洽及為丞相恩禮彌厚時尉遲迥王謙司馬消難三方稱兵髙祖深以淮南為憂而賀若弼鎮夀陽帝恐其懷二遣平馳驛往代之為揚州總管賜爵襄陽公弼果不從平麾壯士執弼送于京師開皇三年拜度支尚書平見天下州縣多罹水旱百姓不給奏令民間每秋家出粟麥一石已下貧富為差等儲之閭里以備凶年名曰義倉因上書言之上深嘉納自是州里豐衍民多賴焉後轉工部尚書名為稱職時有人告都督邴紹非毁朝廷為憒憒者上怒將斬之平進諫曰川澤納汙所以成其深山嶽藏疾所以就其大鄙諺曰不癡不聾未堪作大家翁此言雖小可以喻大邴紹之言不應聞奏陛下又復誅之臣恐百代之後有虧聖德上於是赦紹因敕羣臣誹謗之罪勿復以聞後突厥達頭可汗與都藍可汗相攻各遣使請援上遣平持節宣諭令其和解平至為陳利害遂各解兵可汗贈平馬二百匹還進所得馬上盡以賜之未幾遇譴以尚書檢校汴州事尋除汴州刺史後歷許貝二州俱有善政鄴都俗薄前後刺史多不稱職朝廷以平為相州刺史甚有能名在州數年坐正月十五日百姓大戲畫衣裳鍪甲象上怒免之俄而上念平鎮淮南時事進位大將軍拜太常卿吏部尚書卒官諡曰康子師孝性輕狡好利數犯法上以其不克負荷遣使弔平以師孝為勃海郡主簿屬大業之季恣行貪濁一郡苦之後為王世充所害源師字踐言其先西平樂都人西河王秃髮傉檀之後也祖子恭魏中書監魏尹父彪仕齊位祕書監入周為司成下大夫開皇中拜莒州刺史前史俱有傳師少知名明辨有識悟尤以吏事自許仕齊為尚書左外兵郎中又攝祠部後屬孟夏以龍見請雩時高阿那肱為録尚書事謂為真龍出見大喜問龍所在云作何顔色師整容答曰此是龍星初見依禮當雩祭郊壇非謂真龍别有所降也阿那肱忿然作色曰漢兒多事強知星宿祭遂不行師出而竊歎曰國家大事在祀與戎禮既廢也其能久乎齊亡無日矣七年周武平齊授司賦上士髙祖受禪除尚書考功侍郎朝章國憲多所參定纍遷尚書左丞以明幹著稱時蜀王秀頗違法度乃以師為益州總管司馬俄而秀被徴秀恐京師有變將謝病師數勸之不可違命秀乃作色曰此我家事何預卿也師垂涕苦諫秀乃從徴秀發後州官屬多相連坐師以此獲免後加儀同三司煬帝即位拜大理少卿帝在顯仁宮敕宮外衛士不得輒離所守有一主帥私令衛士出外帝付大理繩之師據律奏徒帝令斬之師奏曰此人罪誠難恕若陛下初便殺之自可不關文墨既付有司義歸常典脫宿衛近侍者更有此犯將何以加之帝乃止轉刑部侍郎居職強眀有口辨而無廉平之稱卒於刑部侍郎師從叔雄字世略父纂魏太府少卿遇害河隂贈定州刺史雄少寬厚美姿容初仕魏歷位祕書郎在周以伐齊功封朔方公歷冀平二州刺史檢校徐州總管及尉遲迥作亂時雄家纍在相州迥潛以書誘之雄卒不顧高祖遺書慰勉之迥遣其將畢義緒據蘭陵席毗陷昌慮下邑雄遣衆悉平之陳人見中原多故遣其將陳紀蕭摩訶任蠻奴周羅㬋樊毅等侵江北自江陵東距夀陽人多應之攻陷城鎮雄與吳州總管于顗等擊走之悉復故地進位上大將軍拜徐州總管遷朔州總管平陳之役從秦王俊出信州道陳平以功進位上柱國賜子崇爵端氏縣伯褒為安化縣伯復鎮朔方嵗餘上表乞骸骨徴還京師卒于家子嵩嗣大業中為尚書虞部郎討北海賊力戰死之贈正議大夫薛胄字紹元河東汾隂人也父端周基州刺史自有傳胄少聰眀每覽異書便曉其義常歎訓注不會聖人深旨輒以意辨之諸儒莫不稱善性慷慨志立功名周明帝時襲爵文城郡公纍遷儀同尋拜司金大夫後加開府高祖受禪三遷為兖州刺史到官繫囚數百胄剖斷旬日便了囹圄空虛有陳州人向道力偽作高平郡守將之官胄遇諸塗察其有異將留詰之司馬王君馥固諫乃聽詣郡既而悔之即遣主簿追道力有部人徐俱羅嘗在海陵郡先是已為道力偽代之比至秩滿公私不悟俱羅遂謂君馥曰向道力經賜代為郡使君豈容疑之君馥以俱羅所陳又固請胄胄呵君馥乃止遂收之道力懼而引偽其發姦擲伏皆此類也時人謂為神眀先是兖州城東沂泗二水合而南流泛濫大澤中胄遂積石堰之決令西注陂澤盡為良田又通轉運利盡淮海百姓賴之號為薛公豐兖渠胄以天下太平遂遣博士登泰山觀古迹撰封禪圗及儀上之帝謙讓不許轉郢州刺史有惠政徴拜衛尉卿轉大理卿持法寬平名為稱職遷刑部尚書時左僕射高熲稍被疏忌及王世積誅熲事與相連上因此欲成熲罪胄明雪之正議其獄由是忤旨械繫之久而得免檢校相州事甚有能名漢王諒作亂并州遣其將綦良東略地攻逼慈州刺史上官政請援於胄胄畏諒兵鋒不敢拒良又引兵攻胄胄欲以計却之遣親人魯世範説良曰天下事未可知胄為人臣去就須得其所何遽相攻也良乃釋去進圍黎陽及良為史祥所攻棄軍歸胄朝廷以胄懷二心鎖詣大理相州吏民素懷其恩詣闕理胄者百餘人胄竟免除名配防嶺南道卒子筠獻知名令狐熙字長熙敦煌人也父整周大將軍自有傳熙性嚴重有雅量雖在私室終日儼然不妄通賔客凡所交結皆一時名士博覽羣書尤明三禮善騎射頗知音律起家以通經為周吏部上士轉夏官府都上士俱有能名以母憂去職殆不勝喪其父戒之曰大孝在於安親義不絶嗣吾今見存汝又隻立何得過爾毁頓貽吾憂也熙自是稍加饘粥服闋除小駕部復丁父憂非杖不起人有聞其哭聲莫不為之下泣河隂之役詔令墨衰從事授職方下大夫襲彭城縣公及武帝平齊以留守功進位儀同歷司勳吏部二曺中大夫甚有當時譽髙祖受禪之際熙以本官行納言事尋除司徒左長史加上儀同進爵河南郡公時吐谷渾寇邊以行軍長史從元帥元諧討之以功進上開府後拜滄州刺史在職數年風教大洽稱為良二千石開皇四年髙祖幸洛陽熙來朝吏民恐其遷悲泣於道及還百姓出境迎謁歡呌盈路在州獲白馬白麞嘉麥甘露降於庭前栁樹八年徙為河北道行臺度支尚書吏民追思相與立碑頌德及行臺廢纍遷鴻臚卿後以本官兼吏部尚書往判五曺尚書事號為明幹上甚任之及髙祖祠泰山還次汴州惡其殷盛多有姦俠以熙為汴州刺史熙下車禁遊食抑工商人有向術開門者杜之船客停於郭外星居者勒為聚落僑人逐令歸本其有滯獄並決遣之令行禁止上聞而嘉之顧侍臣曰鄴都天下難臨處敕相州刺史豆盧通令習熙法其年來朝考績為天下之最賜帛三百匹頒告天下以嶺南夷數起亂徴拜桂州總管十七州諸軍事許以便宜從事刺史已下官得承制補授給帳內五百人帛五百匹發傳送其家纍改封武康郡公熙至部大𢎞恩信其溪洞渠帥更相謂曰前總管皆以兵威相脅今者乃以手教相諭我輩其可違乎於是相率歸附先是州縣生梗長吏多不得之官寄政於總管府熙悉遣之為建城邑開設學校人夷感化焉時有寧猛力者與陳後主同日生自言貌有貴相在陳世已據南海平陳後髙祖因而撫之即拜安州刺史然驕倨恃險未嘗參謁熙手書諭之申以交友之分其母有疾熙復遺以藥猛力感之詣府請謁不敢為非熙以州縣皆有同名於是奏改安州為欽州黃州為峯州利州為智州德州為歡州東寧州為融州上皆從之在職數年上表以年老疾患請解所任優詔不許賜以醫藥熙奉詔令交州渠帥李佛子入朝佛子欲為亂請至仲冬上道熙意在羈縻遂從之有人詣闕訟熙受佛子賂而捨之上聞佛子反問至上大怒以為信然遣使鎖熙詣闕熙性素剛鬱鬱不得志行至永州憂憤病卒上怒不解沒其家財及行軍總管劉方禽佛子送京師言熙實無贓上悟乃召其四子聽仕少子德棻知名裴肅字神封河東解人也父俠周贈太子少師蒲州刺史自有傳肅貞亮有才藝少與安定梁毗同志友善周天和中舉秀才纍遷御正下大夫以行軍長史從韋孝寬征淮南屬高祖為丞相肅聞而歎曰武帝以雄才定六合墳土未乾而一朝遷革豈天道歟髙祖聞之甚不悅由是廢于家開皇五年授膳部侍郎歷朔州總管長史貝州長史俱有能名仁夀中肅見皇太子勇蜀王秀左僕射高熲俱廢黜遣使上書言高熲天挺良才元勳佐命願録其大功忘其小過二庶人得罪已久寧無革心願各封小國觀其所為若能遷善漸更增益如或不悛貶削非晚書奏上謂楊素曰肅憂我家事如此亦至誠也於是徴肅入朝皇太子聞之謂左庶子張衡曰肅欲使勇自新欲何為也衡曰觀肅意欲令勇如吳大伯漢東海王耳太子甚不悅肅至京見上於含章殿上謂曰朕貴為天子富有四海後宫寵幸不過數人自勇以下並皆同母非謂愛憎輕事廢立因言勇不可復收之意既已罷遣未幾上崩煬帝嗣位不得調者久之肅亦杜門不出後執政者以嶺南遐逺希旨授肅永平郡丞肅在官甚得夷人心嵗餘卒夷獠思之為立廟於鄣江之浦有子尚賢張定和字處謐京兆萬年人也家少貧賤有志節初為侍官開皇九年平陳定和當從征無以自給其妻有嫁時衣服定和求鬻之妻不與定和遂行以功拜儀同賜帛千匹遂棄其妻後數以軍功加上開府驃騎將軍從上柱國李充擊突厥先登陷陳虜刺之中頸定和以草塞創而戰神氣自若虜遂敗上聞而壯之遣使齎藥馳詣定和所勞問之進位柱國封武安縣侯賞物二千假良馬二匹金百兩煬帝嗣位歷宜州刺史河內太守頗有惠政遷左屯衛大將軍從帝征吐谷渾至覆袁川時吐谷渾主與數騎遁其名王詐為吐谷渾主保車我真山帝命定和擊之既與賊遇輕其衆少呼之令降賊不肯下定和不被甲挺身登山中流矢而斃其亞將栁武達擊賊悉斬之帝為之流涕贈光祿大夫時舊爵例除於是復封武安侯諡曰壯武子世立嗣尋拜光祿大夫張奫字文懿清河東武城人也七代祖沈石虎末自廣陵六合渡江因家焉仕至桂陽太守孫朏晉佐著作郎坐外祖楊佺期除名徙于南譙因寓居之奫好讀兵書長於騎射尤便刀楯父雙自清河太守免歸周時鄉人郭子冀密引陳寇雙欲率子弟擊之猶豫未定奫贊成其謀竟破賊由是以勇決知名起家州主簿及髙祖作相授丞相府大都督領鄉兵賀若弼之鎮江都也特敕奫從因為間諜平陳之役頗有力焉進位開府儀同三司封文安縣子嵗餘奫率水軍破逆賊笮子遊於京口薛子建於和州徴入拜大將軍高祖命升御坐宴之謂曰卿可為朕兒朕為卿父今日聚集示無外也後賜緑沈甲虎文具裝綺羅千匹尋從楊素征江表别破高智慧於會稽吳世華於臨海進位上大將軍歷撫濟二州刺史俱有能名開皇十八年為行軍總管從漢王諒征遼東諒軍多物故奫衆獨全帝善之仁夀中卒於潭州總管諡曰莊子孝亷麥鐡杖始興人也貧賤少驍勇有膂力日行五百里走及奔馬性疏誕使酒重信義每以漁獵為事不營産業陳太建中結聚為羣盜廣州刺史歐陽頠俘之以獻沒為官户配執御繖每罷朝後行百餘里夜至南徐州踰城而入從城中劫盜旦還及牙時仍又執繖如此者十餘度物主識之州以狀奏朝士見鐡杖每旦常在弗之信也後數告變尚書蔡徴曰此可驗矣於仗下時購以百金求人送詔書與南徐州刺史鐡杖出應募齎敕而往明旦反奏事帝曰信然為盜明矣惜其勇捷誡而釋之陳亡徙居清流縣遇江東反楊素遣鐡杖頭戴草束夜浮渡江覘賊中消息具知還報後復更往為賊所禽逆帥李稜縳送髙智慧行至庱亭衛者憩食哀其餒解手以給其飱鐡杖取賊刀亂斬衛者殺之皆盡悉割兵鼻懷之以歸素大竒之後敘戰勳不及鐡杖遇素馳驛歸于京鐡杖步追之每夜則同宿素見而悟特奏授儀同三司以不識書放還鄉里成陽公李徹稱其驍武開皇十六年徴至京師除車騎將軍仍從楊素北征突厥加上開府煬帝即位漢王諒反從楊素擊之每戰先登進位柱國除萊州刺史無涖政名轉汝南太守稍習法令羣盜屏迹後因朝集考功郎竇威嘲之曰麥是何姓鐡杖應聲曰麥豆不殊那忽相怪威赧然無以應時人以為敏捷尋除左屯衛大將軍帝待之愈密鐡杖自以荷恩深重每懷竭命之志及遼東之役請為先鋒顧謂醫者吳景賢曰丈夫性命自有所在豈能艾炷灸頞瓜蒂噴鼻療黃不差而臥死兒女手乎將渡遼呼其三子曰阿奴當備淺色黃衫吾荷國恩今是死日我既被殺汝當富貴惟誠與孝爾其勉之及濟橋未成去東岸尚數丈賊大至鐡杖跳上岸戰死虎賁郎將錢士雄孟金義亦死之左右更無及者帝為流涕購得其尸贈光祿大夫宿國公諡曰武烈子孟才嗣授光祿大夫孟才二弟仲才季才俱拜正議大夫賵贈巨萬賜輼輬車給前後部羽葆鼓吹命平壤道敗將宇文述等百餘人皆為執紼王公已下皆送至郊外士雄贈左光祿大夫右屯衛將軍武強侯諡曰剛子傑嗣金義贈右光祿大夫子善誼襲官孟才字智稜果烈有父風帝以其死節將子恩錫殊厚拜虎賁郎及江都之難慨然有復讐志與虎賁郎將錢傑素交友二人相謂曰吾等世荷國恩門著誠節今賊臣弒逆社稷淪亡無節可紀何面目視息世間哉乃流涕扼腕相與謀於顯福宫邀擊宇文化及事臨發陳藩之子謙知而告之與其黨沈光俱為化及所害忠義之士哀焉光字總持吳興人也父居道仕陳為吏部侍郎陳滅徙家于長安皇太子勇引署學士後為漢王諒府掾諒敗除名光少驍捷善戲馬為天下之最略綜書記微有詞藻常慕立功名不拘小節家甚貧窶父兄並售書為事光獨跅弛交通輕俠為京師惡少年之所朋附人多贍遺得以養親每致甘食美服未嘗困匱初建禪定寺其中幡竿高十餘丈適值繩絶非人力所及諸僧患之光謂諸僧曰當相為上繩諸僧驚喜光因取索口銜繩拍竿而上至龍頭繫繩畢手足皆放透空而下以掌拓地倒行數十步觀者駭恱莫不嗟異時人號為肉飛仙大業中煬帝徴天下驍果之士伐遼東光預焉同類數萬人皆出其下光將詣行在所賔客送至灞上者百餘騎光酹酒而誓曰是行也若不建立功名當死於髙麗不復與諸君相見矣及從帝攻遼東以衝梯擊城竿長十五丈光升其端臨城與賊戰短兵接敵殺傷十數人賊競擊之而墜未及於地適遇竿有垂絙光接而復上帝望見壯而異之驛召與語大悅即日拜朝散大夫常致左右親顧漸密未幾以為折衝郎將賞遇優重帝每推食解衣而賜之同輩莫比光自以荷恩深重思懷竭節及江都之難潛結義勇將為帝復讐先是帝寵昵官奴名為給使宇文化及以光驍勇方任之使總統營於禁內時麥孟才錢傑等隂圗化及因説光曰我等荷國厚恩不能死難今又俯首事讐受其驅率有靦面目何用生為吾必殺之死無所恨公義士也肯從我乎光泣下霑襟曰是所望於將軍也僕領給使數百人並荷先皇厚恩今在化及內營以此復讐如鷹鸇之逐鳥雀孟才為將軍領江淮之衆數千人期以營將發時晨起襲化及光語泄陳謙走告化及化及大懼曰此麥鐡杖子也及沈光者皆勇決不可當吾須出營以避其鋒是夜即與腹心走出營外留人告司馬德戡等領兵馬逮捕孟才光聞營內喧聲知事發不及被甲即襲化及營內空無所獲逢舍人元敏數而斬之德戡兵至四面圍合光大呼潰圍給使齊奮斬首數十級賊皆披靡德戡復遣騎持弓弩翼而射之光身無介胄遂為所害時年二十八麾下數百人皆鬪而死一無降者壯士聞之莫不殞涕權武字武弄天水人也祖超魏秦州刺史父襲慶仕周為開府武元皇帝之為周將也與齊師戰於并州襲慶時從被圍百餘重力戰矢盡短兵接戰殺傷甚衆刀矟皆折脫胄擲地向賊大罵曰何不來斫頭賊遂殺之武以忠臣子起家拜開府襲爵齊郡公武少果徑勇力絶人能重甲上馬嘗倒投於井未及泉復躍而出其拳捷如此頻以軍功增邑周宣帝拜徑捷左旅上大夫進位上開府高祖為丞相引置左右平陳之役以行軍總管從晉王出六合還拜豫州刺史以創業之舊進位大將軍檢校潭州總管其年桂州人李世賢作亂武以行軍總管與武候大將軍虞慶則擊平之慶則以罪誅功竟不録復還于州多造金帶遺嶺南酋領其人復答以寶物武皆納之由是致富武晚生一子與親客宴集酒酣擅赦所部獄囚武常以南越邉逺政從其俗務適便宜不依律令而每言當今法急官不可為上令有司案之皆驗令斬之武於獄中上書言父為武元皇帝戰死於馬前以求哀由是除名仁夀中復拜大將軍封邑如舊未幾授太子右衛率煬帝即位拜左武衛將軍坐事免後為右屯衛大將軍坐事除名卒于家子𢎞王仁恭字元實天水上邽人也祖建周鳳州刺史父猛鄴州刺史仁恭少剛毅修謹工騎射秦孝王引為記室後為車騎將軍從楊素擊突厥於靈武以功拜上開府以驃騎將軍典蜀王軍事蜀王以罪廢官屬多罹其患上以仁恭素質直置而不問後從楊素討漢王諒以功進位大將軍歷呂衛二州刺史尋改為汲郡太守有能名上徴入朝慰勉之褒賜甚厚遷信州太守汲郡吏民扣馬號哭於道數日不能出境遼東之役以仁恭為將軍及班師仁恭為殿遇賊敗之進左光祿大夫眀年復以軍將指扶餘道帝謂曰往者諸軍多不利公獨以一軍破賊古人云敗軍之將不可以言勇諸將其可任乎今委公為前軍前後賞賚甚重仁恭遂進軍至新城破其軍因圍之帝聞之大悅遣使賜以珍物進光祿大夫會楊元感反其兄子虎賁郎將仲伯預焉由是坐免尋而突厥為寇詔仁恭以夲官領馬邑太守其年始畢可汗來寇馬邑復令二將勒兵南過時郡兵不過三千仁恭簡精鋭逆擊破之并斬二將後突厥復入定襄仁恭復大破之時天下大亂道路隔絶仁恭頗改舊節受納貨賄又不敢輒開倉賑恤百姓其麾下校尉劉武周與仁恭侍姬姦通恐其事泄遂害之武周於是開倉賑恤郡內皆從之自稱天子置百官轉攻傍郡吐萬緒字長緒代郡鮮卑人也父通周郢州刺史緒少有武略在周襲爵元夀縣公纍遷大將軍小司武高祖受禪拜襄州總管封榖城郡公轉青州總管頗有政名徙朔州總管甚為北狄所憚後帝有吞陳志轉徐州總管令修戰具及大舉濟江緒以行軍總管與西河紇豆陵洪景屯兵江北及陳平拜夏州總管晉王廣為太子引為右虞候率及帝即位恐漢王諒有變拜緒晉絳二州刺史未出關諒己舉兵詔緒與楊素擊破之拜左武候將軍大業初轉光祿卿賀若弼遇讒引緒為證緒眀其無罪由是免官後守東平太守帝幸江都路經其境迎謁道傍帝命升龍舟緒因頓首謝往事帝大悅拜金紫光祿大夫太守如故及遼東之役請為先鋒拜左屯衛大將軍指蓋馬道及還留鎮懷逺進位左光祿大夫時劉元進作亂攻潤州帝徴緒往討之緒擊破元進解潤州圍賊窮蹙請降元進及其偽僕射朱燮僅以身免於陳斬其偽僕射管崇及其將軍陸顗等五十餘人進解會稽圍元進復據建安帝令進討之緒以士卒疲弊請息甲待來春帝不悅密求緒罪有司奏緒怯懦違詔除名配防建安尋徴詣行在所緒鬱鬱不得志還至永嘉發疾而卒董純字德厚隴西成紀人也祖和魏太子左衛率父升周柱國純少有膂力便弓馬仕周位司御上士典馭下大夫從武帝平齊拜儀同進爵大興縣侯高祖受禪進爵漢曲縣公後以軍功進位上開府開皇末以勞舊拜左衛將軍改封順政縣公後從楊素平漢王諒以功拜柱國進爵郡公再遷左驍衛將軍齊王暕之得罪純坐與交通帝譴之純曰比數詣齊王以先帝在仁夀宫置元德太子及齊王於膝上謂曰汝好看此二兒勿忘吾言臣誠不敢忘先帝言時陛下亦侍先帝側帝改容曰誠有斯旨於是捨之數日出為汶山太守嵗餘突厥寇邉轉榆林太守會彭城賊帥張大彪宗世模等保懸薄山帝令純討破之斬萬餘級築為京觀又破賊魏麒麟於單父及帝重征遼東復以純為彭城留守東海賊彭孝才轉入沂水保五不及山純擊之禽孝才於陳車裂之時盜賊日益純雖克捷然所在蜂起有譖純怯懦不能平賊帝遣鎖詣東都有司見帝怒甚希旨致純死罪竟誅魚俱羅馮翊下邽人身長八尺膂力絶人聲氣甚壯偉言聞數百步為大都督從晉王廣平陳以功拜開府及沈元懀髙智慧等作亂江南楊素以俱羅壯勇請與同行有功加開府封髙唐縣公拜疊州總管以母憂去職還至扶風會楊素將出靈州道擊突厥逢之遂與俱行及遇賊俱羅與數騎奔擊嗔目大呼所當皆披靡以功進位柱國拜豐州總管突厥入境輒禽斬之自是屛迹不敢畜牧於塞下初煬帝在藩俱羅弟贊以左右從纍遷大都督及帝嗣位拜車騎將軍贊凶暴令左右炙肉遇不中意以籖刺瞎其眼溫酒不適口者並斷其舌帝以藩邸之舊不忍加誅謂近臣曰弟既如此兄亦可知因召俱羅責之出贊於獄令自為計贊至家飲藥而死帝恐俱羅不安慮生邉患轉安州刺史遷趙郡太守後因朝集至東都與將軍梁伯隱有舊數相往來又從郡多將雜物以貢獻帝不受因遺權貴御史劾俱羅以郡將交通內臣帝大怒與伯隱俱除名未幾越嶲飛山蠻反詔俱羅白衣領將并率蜀郡都尉假鍾葵討平之大業九年重征高麗以俱羅為碣石道軍將及還江南劉元進作亂詔俱羅將兵向會稽諸郡逐捕之時百姓思亂從盜如市俱羅擊賊帥朱燮管崇等戰無不捷然賊勢浸盛敗而復聚俱羅度賊非嵗月可平諸子並在京洛又見天下漸亂終恐道路隔絶于時東都飢饉穀食踊貴俱羅遣家僮將船米至東都糶之益市財貨潛通諸子朝廷微知之恐有異志案驗不得其罪帝復令大理司直梁敬真就鎖將詣東都俱羅相表異人目有重瞳隂為帝之所忌敬真希旨奏俱羅師徒敗衄斬東都市家口籍沒王辨字景略馮翊蒲城人也祖訓以行商致富魏世出粟助給軍糧為假清河太守辨少習兵書尤善騎射慷慨有大志在周以軍功授都督仁夀中纍遷車騎將軍後從楊素討平漢王諒賜爵武寧縣男纍以軍功加至通議大夫尋遷虎賁郎將及山東盜賊起帝引辨升御榻問以方略辨論取賊勢帝稱善曰誠如此賊不足憂於是發從行步騎三千擊敗之賜黃金二百兩勃海賊帥高士達自號東海公衆以萬數令辨擊之屢挫其鋭帝在江都聞而召之及見禮賜甚厚復令往信都經略士達復戰破之優詔褒顯時賊帥郝孝德孫宣雅時季康竇建德魏刁兒等往往屯聚大者十數萬小者數千寇掠河北辨擊之所向皆捷及翟讓寇徐豫辨頻擊破之讓尋與李密屯據洛口倉辨與王世充討密阻洛水相持經年辨攻敗密乘勝將入城世充不知恐將士勞倦鳴角收兵翻為密徒所乘官軍大潰不可救止辨至洛水橋已壞遂涉水至中流為溺人所引墜馬竟溺死三軍莫不痛惜之時有河南斛斯萬善驍勇果毅與辨齊名從衛元討楊元感萬善與數騎追及之元感窘迫自殺由是知名拜虎賁郎將突厥始畢之圍鴈門萬善奮擊之所向皆破由是突厥莫敢逼城十許日竟退萬善力也後頻討羣盜纍功至將軍又有將軍鹿願范貴馮孝慈俱為將帥數從征伐並有名於世事皆亡失故史官闕云陳稜字長威廬江襄安人也祖碩以漁釣自給父峴少驍勇事章大寶為帳內部曲告大寶反授譙州刺史陳滅廢于家高智慧汪文進反廬江豪傑亦舉兵相應以峴舊將共推為主峴欲拒之稜謂峴曰衆亂即作拒之禍且及己不如偽從别為後計峴然之後潛使稜至柱國李徹所請為內應徹上其事拜上大將軍宣州刺史封譙郡公詔徹應接之徹軍未至謀泄為其黨所殺稜僅以獲免高祖以其父之故拜稜開府尋領鄉兵大業三年拜虎賁郎將後三嵗與朝請大夫張鎮周發東陽兵萬人自義安汛海擊流求國月餘而至流求人初見船艦以為商旅往往詣軍貿易稜率衆登岸遣鎮周為先鋒其王歡斯渴刺兜遣兵拒戰鎮周頻破之稜進至低沒檀洞其小王歡斯老模來拒戰稜敗之斬老模其日霧雨晦冥將士皆懼稜刑白馬祭海神既而開霽分為五軍趣其都邑乘勝逐北至其柵破之斬渴刺兜獲其子島捶虜男女數千而歸帝大悅進稜位右光祿大夫鎮周金紫光祿大夫遼東之役以宿衛遷左光祿大夫眀年帝復征遼東稜為東萊留守楊元感之反也稜擊平黎陽斬元感所署刺史元務本尋奉詔於江南營戰艦至彭城賊帥孟讓據都梁宫阻淮為固稜潛於下流而濟至江都襲破讓以功進位光祿大夫賜爵信安侯後帝幸江都俄而李子通據海陵左才相掠淮北杜伏威屯六合衆各數萬帝遣稜擊之往見克捷超拜右禦衛將軍復渡清江擊宣城賊俄而帝以弒崩宇文化及引軍北上召稜守江都稜集衆縞素為煬帝發哀使備儀衛改葬於吳公臺下衰杖送喪慟感行路論者深義之後為李子通所陷奔杜伏威伏威忌而害之趙才字孝才張掖酒泉人也祖隗魏銀青光祿大夫樂浪太守父夀周順政太守才少驍武便弓馬性粗悍無威儀仕周為輿正上士髙祖受禪以軍功至上儀同後配事晉王為右虞候率煬帝即位轉左備身驃騎右驍衛將軍帝以才藩邸舊臣漸見親待才亦恪勤匪懈所在有聲轉右驍衛將軍從征吐谷渾以為行軍總管率衛尉卿劉權兵部侍郎明雅等出合河道破賊以功進金紫光祿大夫及遼東之役再出碣石道再遷右候衛大將軍時帝每事巡幸才恆為斥候肅遏姦非無所廽避在塗遇公卿妻子有違禁者才輒醜言大罵多所援及時人雖患其不遜然才守正無如之何十二年帝將幸江都才見四海土崩諌請還京師安兆庶帝大怒以才屬吏旬日乃出之遂幸江都待遇逾昵時江都糧盡內史侍郎虞世基祕書監袁充等多勸帝幸丹陽才極陳入京策世基極言渡江便帝無言才與世基相忿而出宇文化及弒逆之際才時在苑北化及遣驍果席德方執之謂曰今日之事祗得如此才默然不對化及忿才無言將殺之三日乃釋以本官從事鬱鬱不得志才嘗對化及宴請勸其同謀逆者一十八人楊仕覽等酒化及許之才執杯曰十八人止可一度作勿復餘處更為諸人默然不對行至聊城遇賊俄而化及為竇建德所破才復見虜心彌不平數日而卒仁夀大業間有蘭興洛賀蘭番俱為武候將軍剛嚴正直不避強禦咸以稱職知名宇文述字伯通代郡武川人也本姓破野頭役屬鮮卑俟豆歸後從其主為宇文氏高祖侰與敦曽祖長夀祖孤仕魏並為沃野鎮軍主父盛仕周位上柱國大宗伯述少驍鋭便弓馬年十一有相者謂曰公子善自愛後當位極人臣周武帝時以父功起家拜開府述性謹密周大冢宰宇文護甚愛之以本官領護親信及武帝親總萬機召為左宮伯纍遷中大夫賜爵博陵郡公改封濮陽郡公高祖作相尉遲迥作亂以述為行軍總管從韋孝寬擊之破迥將李俊軍於懷州又與諸將破尉遲惇於永平橋以功超拜上柱國封褒國公開皇初拜右衛大將軍平陳之役復為行軍總管率衆自六合而濟時韓擒虎賀若弼兩軍趣丹陽述進據石頭為韓擒虎賀若弼兩軍聲援陳主既擒而蕭瓛蕭巖據東吳之地述領行軍總管元契張默言等討之水陸俱進落叢公燕榮以舟師自東海至亦受述節度瓛大敗巖以會稽降吳會悉平以功授子化及為開府徙拜安州總管時晉王廣鎮揚州甚善於述欲述近已奏為夀州總管王時陰有奪宗之志請計於述述曰皇太子失愛已久大王才能蓋世數經鎮領深有大功主上之與內宮咸所鍾愛四海之望實歸大王然廢立者國家大事處人父子骨肉之間誠非易謀也然能移主上者唯楊素耳與之謀者惟其弟約述雅知約請朝京師與約相見共圗廢立晉王大恱多賫金寶資述入關述數請約盛陳器玩與之酣暢因共博戲每陽不勝所齎金寶盡輸之約所得既多稍以謝述述因曰此晉王之賜令述與公為歡樂耳約大驚曰何為者述因為王申意約然其説退言於素素亦從之由是晉王與述情好益密命其子士及尚南陽公主賞物不可勝計及晉王為皇太子以述為左衛率舊令率官第四品以述素貴遂進率品第三其見重如此煬帝嗣位拜左衛大將軍參掌武官選事後改封許國公尋加開府儀同三司每至冬朝會輒給鼓吹一部後幸榆林時鐡勒契弊歌稜攻敗吐谷渾其部攜散遂遣使請降求救帝令述以兵撫納降附吐谷渾見述擁強兵懼不敢降遂西遁述追至曼頭城攻拔之乘勝至赤水城復拔之其餘黨走屯尼邱川進擊大破之獲其王公尚書將軍二百人吐谷渾主南走雪山故地皆空帝大悅眀年從帝西巡至金山登燕支述每為斥候時渾賊復寇張掖述進擊走之還至江都宮敕述與蘇威常典選舉參預朝政述時貴重委任與蘇盛等其親愛則過之帝所得逺方貢獻及四時口味輒見班賜中使相望於道述善於供奉俯仰折旋容止便僻宿衛者咸取則焉又有巧思凡所裝飾皆出人意表數以奇服異物進獻宫掖由是帝彌寵悅焉述時貴幸言無不從勢傾朝廷左衛將軍張瑾與述連官嘗有評議述張目叱之瑾惶懼而走文武百寮莫敢違忤然性貪鄙知人有珍異之物必求取之富商大賈及隴右諸胡子弟述皆接以恩意呼之為兒由是競加饋遺金寶纍積後庭曳羅綺者數百家僮千餘人皆控良馬被服金玉及征高麗述為扶餘道軍將臨發帝謂述曰禮七十者行役以婦人從公宜以家纍自隨古稱婦人不入軍謂臨戰時耳至於營柵之間無所傷也頂籍虞姬即其故事述與九軍至鴨淥水糧盡議欲班師諸將多異同述又不測帝意會乙支文德來詣其營實詐降也述先與于仲文俱奉密旨令誘執文德既而緩縱文德逃歸述內不自安遂與諸將渡水追之文德見述軍中多飢色欲疲述衆每鬬便北述一日之中七戰皆捷既恃驟勝又內逼羣議遂進東濟薩水去平壤城三十里阻山為營文德復遣使偽降請述曰若旋師者當奉高元朝行在所述見士卒疲弊不可復戰又平壤險固卒難致力遂因其詐而還衆半濟賊擊後軍於是大潰不可禁止九軍敗績一日一夜還至鴨淥水行四百五十里初渡遼九軍三十萬五千人及還至遼東城惟二千七百人帝大怒以述等屬吏除名為庶人明年帝又事遼東復述官爵待之如初從至遼東與將軍楊義臣率兵復臨鴨渌水會楊元感作亂帝召述班師令馳驛赴洛陽發諸郡兵討之時元感逼東都聞述軍至懼而西遁將圗關中述與刑部尚書衛元右禦衛大將軍來護兒武衛將軍屈突通等躡之至閿鄉皇天原與元感相及述與護兒陳當其前遣屈突通以奇兵擊其後大破之遂斬元感傳首行在所復從東征至懷逺而還突厥之圍鴈門也帝大懼述請潰圍而出來護兒及樊子蓋並固諫帝乃止及圍解車駕次太原議者多勸帝還京師帝有難色述奏曰從官妻子多在東都請便道向洛陽自潼關而入可也帝從之尋至東都述又觀望帝意勸幸江都帝大恱述於江都遇疾及疾篤帝令中使相望于第謂述有何言述曰願陛下一能降臨帝遣司宫魏氏謂曰公危篤朕憚相煩動必有言可自陳也述有二子化及智及並得罪于家述流涕曰化及臣之長子早預藩邸願陛下哀憐之士及夙蒙天恩亦堪驅策臣死後智及不可久留願早除之望不破門户魏氏反命隱其言因詭對曰述惟憶陛下耳帝泫然曰述憶我耶將親臨之宫人百寮諫乃止及薨帝為廢朝贈司徒尚書令十郡太守班劔四十人輼輬車前後部鼓吹諡曰恭詔黃門侍郎裴矩祭以太牢鴻臚監護喪事雲定興者附會於述初定興女為皇太子勇昭訓及勇廢除名配少府定興先得昭訓明珠絡帳私賂於述自是數共交遊初定興每時節必有賂遺并以音樂干述述好著奇服炫耀時人定興為製馬韀於後角上缺方三寸以露白色世輕薄者爭倣學之謂為許公缺勢述又遇天寒定興曰入內宿衛必當耳冷述曰然乃製夾頭巾令深袙耳人又學之名為許公袙勢述大恱曰雲兄所作必能變俗我聞作事可法故不虛也帝後將事四夷大造兵器述薦之因敕少府工匠並取其節度述欲為之求官謂定興曰兄所製器仗並合上心而不得官者為長寧兄弟猶未死耳定興曰此無用物何不勸上殺之述因奏曰房陵諸子年並成立今欲動兵征討若將從駕則守為難若留一處又恐不可進退無用請早處分之帝從之因鴆殺長寧又遣以下七弟分配嶺表仍遣使於路盡殺之其年大閲帝稱甲仗為佳述奏並雲定興之功也擢定興少府丞十一年纍遷左衛大將軍知少府事凡述薦逹皆至大官又有趙行樞者本太常樂戶家財億計述謂為兒受其賂遺稱為驍勇起家為折衝郎將述子化及性凶險不循法度好乘肥挾彈馳騖道中由是長安謂之輕薄公子煬帝在東宮時常領千牛出入卧內纍遷至太子僕以受貨賄再三免官太子嬖昵之俄而復職又以其弟士及尚南陽公主由此益驕縱處公卿間言辭不遜多所陵轢見人子女狗馬珍玩必請託求之嘗與屠販者遊以規其利煬帝即位拜太僕少卿益恃舊恩貪冒尤甚煬帝幸榆林化及與弟智及違禁與突厥交市帝大怒囚之數月還京師欲斬之而後入城解衣辮髮訖以公主故乃釋并賜述為奴述薨後帝追憶之起化及為右屯衛將軍智及為將作少監時李密起兵據洛口煬帝在江都不敢還從駕驍果多關中人久客羈旅見帝無西意謀欲叛歸時虎賁郎將司馬德戡總領驍果屯於東城風聞兵士欲叛未審遣校尉元武達隂問知情因謀構逆與所善虎賁郎將元禮直閣裴虔通互相扇惑曰今聞至尊欲築都丹陽勢不還矣人人並謀逃去我欲言之恐先事見誅今知不言後事發當族將如之何虔通曰主上實爾德戡又謂兩人曰我聞關中陷沒李孝常以華陰叛陛下囚其二弟將盡殺之吾輩家屬在西安得無此慮虔通等曰正恐旦暮及誅計無所出德戡曰驍果若走可與俱去虔通等曰誠如公言因遞相招誘又轉告內史舍人元敏鷹揚郎將孟秉符璽郎將李覆牛方裕直長許𢎞仁薛世良城門郎唐奉義醫正張愷等日夜聚博約為刎頸之交情相歡昵言無回避於坐中輒論叛計並相然許時李質在禁令驍果守之中外交通所謀益急又趙行樞先交智及勳侍楊士覽者宇文氏之甥二人同以告智及智及素狂悖聞之喜即共見德戡期以三月十五日舉兵同叛劫十二衛兵馬虜掠居人財物結黨西歸智及曰不然今天實喪隋英雄並起同心叛者已數萬人因行大事此帝王業也德戡然之行樞世良請以化及為主相約既定方告化及化及本駑怯初聞之大懼色動流汗久之乃定義寧二年三月一日德戡欲宣言告衆恐人心未一更譎詐以脅驍果謂許𢎞仁張愷曰君是良醫國家所使出言惑衆衆必信君可入備身府遍告所識者詭言至尊聞驍果欲叛多醖毒酒因享會以鴆殺之獨與南人留此羣情必駭因而舉事無不諧矣其月五日𢎞仁等宣布此言驍果遞相告謀反逾急德戡知計已行遂以十日總召故人諭以所為衆皆伏曰惟將軍命其夜奉義主閉城門門皆不下鑰至夜三更德戡於東城內集兵得數萬人舉火與城外相應帝聞有聲問是何事虔通偽曰草坊被燒外人救火故喧囂耳中外隔絶帝以為然孟秉智及於城外得千餘人劫虎衛虎賁馮普樂共布兵捉郭下街巷至五更德戡授虔通兵以換諸門衛士虔通因自開門領數百騎至成象殿殺將軍獨孤盛虎賁郎將元禮遂引兵進宿衛者皆走帝遂匿於西樓虔通進兵排左閣馳入永巷大呼曰陛下安在有美人出房指云在西閣虔通與監門校尉令狐行達拔刀上從往執帝遂扶帝下樓帝謂虔通曰卿非我故人乎何恨而反虔通曰臣不敢反但將士思歸奉陛下還京師耳帝曰即與汝西歸何忍殺我虔通自勒兵守之至旦孟秉以甲騎迎化及化及未知事果戰栗不能言人有來謁之者但低頭據鞍答云罪過時士及在公主第弗之知也智及遣家僮莊桃樹就第殺之桃樹不忍執詣智及久之乃見釋化及至城門德戡迎謁化及引入朝堂號為丞相令果毅郎將馬文舉將帝出江都門以示羣賊復將入宮帝曰我有何罪致此文舉數其五罪使令狐達與驍果于𢎞達牽頓使坐以練布縊帝於寢殿又執朝臣不同已者數十人及諸王外戚無少長皆害之惟留秦孝王子浩立以為帝其二十七日化及擁衆奪江都人船楫從水路西歸至顯福宮宿衛麥孟才折衝郎將沈光等謀擊化及反為所害於是化及入據六宮其自奉養一如煬帝故事每於帳中南面端坐人有白事者默然不對下牙時方收取啓狀共奉義方裕世良愷等參決之行至徐州水路不通復奪車牛得二千兩並載宮人珍寶其戈甲戎器悉令軍士負之道逺疲極三軍始怨德戡失望竊謂行樞曰君大謬誤我當令撥亂必藉英賢化及庸昧羣小在側事將必敗若何行樞曰在我等耳廢之何難因共李孝本宇文導師尹正卿等謀以後軍襲殺化及更立德戡為主𢎞仁知之密告化及盡收德戡及支黨十餘人殺之引兵向東郡通守王軌以城降之元文都推越王侗為主拜李密為太尉令擊化及密壁清淇與徐世績以烽火相應化及數戰不利其將軍于𢎞達為密所擒送於侗所鑊烹之化及糧盡渡永濟渠與密決戰於童山遂入汲郡求軍糧又遣使拷掠東郡民吏責米栗王軌怨之以城歸李密化及懼自汲郡將圗以北諸州其將陳智略率嶺南驍果萬餘人張童兒率江東驍果數千人皆叛歸李密化及尚有衆二萬北走魏縣張愷與其將陳伯謀去之事覺為化及所殺腹心稍盡兵勢日蹙兄弟更無他計但相聚酣宴奏女樂化及醉後尤智及曰我初無此心由汝為計強來立我今所向無成負弒主之名天下所不納滅族之誅豈不由汝乎因抱其兩子而泣智及怒曰事捷日都不賜智及及將敗乃欲歸罪何不殺我以降建德兄弟數相鬭鬩言無長幼醒而復飲以此為恆自知必敗乃歎曰人生會當死豈不一日作天子乎於是鴆殺浩僭即皇帝位於魏縣國號許建元為天夀置百官攻元寶藏於魏州反為所敗乃東北趣聊城將招攜海曲諸賊時遣士及徇濟北徴求餽餉唐遣淮安王神通安撫山東并招誘化及等化及不從神通圍之十餘日不克而還竇建德悉衆攻之先是齊州賊帥王薄聞其多寶物詐來投附化及信之與共居守至是薄引建德入城生擒化及悉虜其衆先執智及元武達孟秉楊士覽許𢎞仁等皆斬之乃以檻車載化及至大陸縣城下數其弒君之罪并其二子承基承迹皆斬之傳首於突厥義成公主梟於虜庭士及自濟北西歸長安智及幼頑凶好與人羣聚鬪雞習放鷹狗初以父功賜爵濮陽郡公蒸淫醜穢無所不為其妻長孫氏妬而告述述雖為隱而大忿之纎介之愆必加鞭捶弟士及恃尚主又輕忽之惟化及事事營護父述再三欲殺輒救免之由是頗相親昵遂勸化及遣人入蕃私為交易事發當誅述獨證智及罪過而為化及請命帝因兩釋之述將死抗表告其凶勃必且破家帝後思述拜智及將作少監其江都弒逆事皆智及之謀也化及為丞相以為右僕射領十二衛大將軍及僭號封齊王竇建德獲而斬之并其黨十餘人皆暴尸梟首司馬德戡扶風雍人父元謙仕周為都督德戡幼孤以屠豕自給有桑門釋粲通德戡母娥氏遂撫教之因解書計開皇中為侍官漸遷至大都督從楊素出討漢王諒充內營左右進止便僻俊辨多姦計素大善之以勳授儀同三司大業三年為鷹揚郎將從討遼左進位正議大夫遷虎賁郎將煬帝甚昵之從至江都領左右備身驍果萬人營於城內驍果之謀為逆也德戡實首扇動之煬帝既被執德戡與孟秉等推化及為丞相化及首封德戡為溫國公加光祿大夫仍統本兵化及意甚忌之後數日化及署諸將分配士卒乃以德勘為禮部尚書外示美遷實奪其兵也由是懷怨所獲賞物皆賂於智及智及為言之行至徐州捨舟登陸令德戡將後軍德戡乃與其黨謀以所將兵萬餘人襲殺化及遣人使于賊帥孟海公結為外助遷延未發以待使報許𢎞仁張愷知之以告化及因遣其弟士及陽為遊獵至于後軍德戡不知事露出營參謁因命執之并其黨與化及責之曰與公勠力共定海內出於萬死今始事成願得同守富貴公又何為反也德戡曰本殺昏主苦其毒害立足下而又甚之逼於物情不獲已也化及不對命送至幕下縊而殺之裴虔通河東人初煬帝為晉王以親信從稍遷至監門校尉帝即位擢舊左右授宣惠尉纍從征役至通議大夫與司馬德戡同謀作亂先開宮門騎至成象殿殺將軍獨孤盛執帝于西閣化及以虔通為光祿大夫莒國公化及引兵之北也令鎮徐州化及敗後歸唐即授徐州總管轉辰州刺史封長蛇男尋以江都弒逆之罪除名徙於嶺表而死李密字法主隴西成紀人也曾祖弼周太師趙國公號為名將自有傳祖曜邢國公位開府父寬自周入隋數經將領位柱國蒲山郡公密才兼文武志氣雄逺少襲爵蒲山公養客禮賢無所愛吝與楊元感為刎頸交後更折節耽學尤好兵書誦皆上口師事國子助教包愷受史記漢書愷門徒皆出其下大業初授親衛大都督以疾歸及元感有逆謀召密令與弟元挺赴黎陽以為謀主密進三計曰今天子逺在遼外公長驅入薊直扼其喉前有髙麗退無歸路不戰而禽此計上也又關中四塞衛元不足為意今率衆務早入西萬全之計此計中也若隨近先向東都以引嵗月此計之下也元感曰公下計乃上策耳今日百官家口並在東都若不取之安能動物且經城不拔何以示威密計不行元感既至東都自謂功在朝夕及獲韋福嗣既非同謀設籌皆持兩端元感後使作檄文固辭不肯密揣知其情請斬之元感不從密退謂所親曰楚公好反而不欲勝吾屬今為虜矣後元感將西入福嗣竟亡歸東都時李雄勸元感速稱尊號元感以問密密以為不可元感笑而止及宇文述來護兒等軍且至元感謂密計將安出密曰元𢎞嗣統強兵於隴右今可揚言其反遣使迎公因此入關可得紿衆元感遂用密謀號令西至陕縣圍𢎞農不拔西至閿鄉追兵至元感敗密間行入關與元感從叔詢相隨匿馮翊詢妻家尋為鄰人告被捕與其黨俱送帝所在途與其衆謀逃其徒多金密令出示使者曰吾等死日此金留付公幸用相瘞其餘即皆報德使者利金遂相許及出關密每夜宴飲行次邯鄲夜宿村中密等七人皆穿墻而遁與王仲伯亡抵平原賊帥都孝德孝德不甚禮之備遭飢饉削樹皮而食之仲伯潛歸天水密詣淮陽舍於村中變姓名稱劉智逺聚徒教授經數月鬱鬱不得志為五言詩詩成泣下數行時人有怪之以告太守趙他他下縣捕之密亡抵其妹夫雍丘令丘君明君明從子懷義後告之密得遁去君明竟坐死密投東都賊帥翟讓乃因王伯當以策干讓遣説諸小賊所至輒降讓始敬焉召與計事密以兵衆無糧勸讓直趨榮陽休兵館榖然後爭利讓從之乃掠下滎陽太守郇王慶及通守張須陀以兵討讓讓數為須陀敗將逺避之密勸讓列陳以待密以竒兵掩擊大破之斬須陀於陳讓於是令密建牙别統所部密復説讓以廓清天下為事令掩據興洛倉發粟以賑窮乏於是與讓以義寧元年春出陽城北踰方山自羅口襲興洛倉破之開倉振百姓越王侗遣虎賁郎將劉長恭討密密城洛口周回四十里以居之讓上密號為魏公設壇場即位稱元年以房彥藻為左長史邴元真為右長史楊德方為左司馬鄭德韜為右司馬拜讓為司徒封東郡公長白山賊孟讓掠東都燒豐都市而歸密攻下鞏縣獲縣長柴孝和拜為護軍虎賁郎將裴仁基以虎牢歸密密因遣仁基與孟讓襲破回洛倉據之俄而德韜德方俱死復以鄭頲為左司馬鄭虔象為右司馬柴孝和説密令裴仁基守回洛翟讓據洛口身率精鋭西襲長安不然他人我先密曰此誠上策然我之所部並山東人既見未下洛陽恐不肯西入孝和請間行觀隙乃與數十騎至陕縣賊歸之者萬餘人密時兵鋒甚鋭每入苑與官兵連戰會密為流矢所中卧於營內東都出兵擊之密衆大潰棄回洛倉歸洛口孝和之衆聞密敗各分散而去孝和輕騎歸密煬帝遣王世充率江淮徑卒五萬討密敗之孝和溺洛水死密甚傷之世充營於洛西與密相拒百餘日武陽郡丞元寶藏黎陽賊帥李文相洹水賊帥張升清河賊帥趙君德平原賊帥郝孝德並歸密襲破黎陽倉據之周法明舉江黃之地以附密齊郡賊帥徐圓朗任城大俠徐師仁淮陽太守趙他等前後欵附以千百數翟讓所部王儒信勸讓為太宰總衆務以奪密權兄寬復謂讓曰天子止可自作安得與人汝若不作我當為之密聞惡之會讓拒世充軍退數百步密與單雄信等赴之世充敗走讓欲乘勝破其營會日暮固止之明日讓與數百人至密所欲為宴樂其所將左右各就食諸門並設備讓不覺密引讓入坐令讓射引滿將發密遣壯士蔡建自後斬之遂殺其兄寬及儒信等從者亦有死焉讓步將徐世績為亂兵所斫中重創密止之僅得免雄信等皆叩頭求哀密並釋而慰之於是詣讓營遣王伯當邴元真單雄信等告以殺讓意令世績雄信伯當分統其衆世充夜襲倉城密拒破之斬虎賁郎將費青奴世充復營洛北於洛水構浮橋悉衆擊密密拒之不利而退世充因薄其城下密擊之大潰爭橋橋陷溺水者數萬人虎賁郎將楊威王辨霍世舉劉長恭梁德重董智通等皆沒于陳世充僅而獲免不敢還東都遂走河陽其夜大雪餘衆死亡殆盡密乃修金墉故城居之衆三十餘萬攻上春門留守韋津出戰被執其黨勸密即尊號密不許及唐師圍東都密出軍爭之交綏而退俄而宇文化及弒逆自江都北指黎陽密拒之會越王侗稱尊號遣使授密太尉尚書令東南道大行臺行軍元帥魏國公令先平化及然後入朝輔政化及至黎陽徐世績守倉城不下密共化及隔水語密數之曰卿本胸奴皂隸破野頭耳父與兄弟皆受隋恩豈容躬行殺虐今若速來歸義尚可全後嗣化及默然俯仰良久乃瞋目大言曰共你論相殺事何須作書傳雅語密謂從者曰化及庸懦如此忽欲圗帝王吾當折杖驅之知其糧且盡因偽與之和化及大喜恣其兵食冀密饋之會密下有人獲罪亡投之具言密情化及大怒又食盡乃與密戰于童山下自辰逹酉密中流矢頓於汲縣化及掠汲郡北趣魏縣以輜重留於東郡遣其刑部尚書王軌守之軌以郡降密以軌為滑州總管密引兵而西遣記室參軍李儉朝于東都執弒帝人于𢎞達以獻越王侗侗以儉為司農少卿使召密入朝密至溫縣聞世充己殺元文都盧楚等乃歸金墉城世充既擅權乃厚賜將士時密兵少衣世充乏食乃請交易邴元真等各求私利遽勸密密許焉初東都絶糧人歸密者日有數百至此得食降人益少密悔而止密雖據倉無府庫兵數戰不賞又厚撫初附兵於是衆心漸怨時邴元真守洛口倉性貪鄙宇文溫每謂密曰不殺元真公難未已密不答而元真知之謀叛楊慶聞而告密密因疑焉會世充悉衆來戰密留王伯當守金墉自就偃師北阻芒山以待之世充令數百騎渡御河密遣裴行儼等逆之會日暮行儼孫長樂程咬金等驍將十數人皆被重創密甚惡之世充夜潛濟詰朝而陳密方覺之狼狽出戰敗績馳向洛口世充夜圍偃師守將鄭頲為其部下翻城而降世充密將入洛口倉城元真已遣人引世充密隂知之不發其事欲待世充兵半渡洛水然後擊之密候騎不時覺比將出戰世充軍悉已濟密引騎而遁元真以城降世充密衆漸離將如黎陽人或曰殺翟讓之際徐世績幾死其心安可保密乃止時王伯當棄金墉城保河陽密自虎牢濟歸之謂曰久苦諸君我今自刎以謝衆衆皆泣莫能仰視密復曰諸君幸不相棄當共歸關中密身雖愧無功諸君必保富貴其府掾栁燮曰明公與長安宗族有疇昔之遇雖不陪起義然阻東都斷隋歸路使唐公不戰而得京師此公之功也衆咸曰然密遂歸唐封邢國公拜光祿卿尋奉使出關安撫至熊州而逃叛見殺王世充字行滿本西域胡人也祖支頽褥徙居新豐頽褥死其妻少寡與儀同王粲野合生子曰瓊粲遂納之以為小妻其父收幼孤隨母嫁粲粲愛而養焉因姓王氏官至懷汴二州長史世充捲髮豺聲沈猜多詭詐頗窺書傳尤好兵法曉龜策推步盈虛然未嘗為人言也開皇中為左翊衛後以軍功拜儀同授兵部員外郎善敷奏眀習法律而舞弄文墨髙下在心或有駮難之者世充利口飾非辭義鋒起衆雖知其否而莫能屈稱為眀辨煬帝世纍遷至江都郡丞時帝數幸江都世充善候人主顏色阿諛順旨每入言事帝善之又以郡丞領江都宮監乃雕飾池臺陰奏逺方珍物以媚於帝由是益昵之大業八年隋始亂世充內懷徼幸卑身禮士陰結豪俊多收衆心江淮間人素輕薄又屬盜賊羣起人多犯法有繫獄抵罪者世充枉法出之以樹私恩及楊元感反吳人朱燮晉陵人管崇起兵江南以應之自稱將軍擁衆十餘萬帝遣將軍吐萬緒魚俱羅討之不能克世充募江都萬餘人擊破之每有克捷必歸功於下所獲軍實皆推與士卒身無所取由此人爭為用功最居多十年齊郡賊帥孟讓自長白山冦掠諸郡至盱眙有衆十餘萬世充以兵拒之而羸師示弱保都梁山為五柵相持不戰後因其懈弛出兵奮擊大破之乘勝盡滅諸賊讓以數十騎遁去斬首萬人六畜軍資莫不盡獲帝以世充有將帥才略始遣領兵討諸小盜所向破之然性多矯偽詐為善能自勤苦以求聲譽十一年突厥圍帝於鴈門世充盡發江都人往赴難在軍中垢面悲泣曉夜不解甲藉草而坐帝聞之以為愛己益信任之十二年遷為江都通守時厭次人栁謙為盜數年兵十餘萬在豆子䴚中世充破斬之威振羣盜又擊盧明月破之於南陽後還江都帝大悅自執杯酒以賜之時世充又知帝好內乃言江淮良家多有美女願備後庭無由自進帝愈喜因密令世充閲觀諸女資質端麗合相法者取正庫及應入京物以聘納之所用不可勝計帳上所司云敕别用不顯其實有合意者乃厚賞世充或不中者又以賚之後令以船送東京而道路賊起使者苦役於淮泗中沈船溺殺之者前後十數或有發露世充為祕之又遽簡閲以供進是後益見親昵遇李密攻陷興洛倉進逼東都官軍數敗光祿大夫裴仁基以虎牢降于密帝惡之大發兵將討焉特發中詔遣世充為將軍於洛口以拒密前後百餘戰互有勝負世充軍渡洛水逼倉城李密與戰世充敗績赴水溺死者萬餘人時天寒大雨雪兵既渡水衣皆沾濕在道凍死者又數萬人比至河陽才以千數世充自繫獄請罪越王侗遣使赦之召令還都收合亡散屯於含嘉城中不敢復出宇文化及弒帝於江都世充與太府卿元文都將軍皇甫無逸右司馬盧楚奉越王侗為主侗以世充為吏部尚書封鄭國公及侗用元文都盧楚之謀拜李密為太尉尚書令密遂稱臣復以兵拒化及於黎陽遣使獻捷衆皆悅世充獨謂其麾下諸將士曰文都之輩刀筆吏耳吾觀其勢必為李密所禽且吾軍人馬每與密戰殺其父兄子弟前後已多一旦為之下吾屬無類矣出此言以激怒其衆文都知而大懼與楚等謀將因世充入內伏甲而殺之期有日矣將軍假逹遣女壻張志以楚等謀告之世充夜勒兵圍宫城將軍費曜田世闍等與戰於東太陽門外曜軍敗世充遂攻門而入無逸以單騎遁走獲楚殺之時宫門尚閉世充遣人扣門言於侗曰元文都等欲執皇帝降于李密假逹知而以告臣臣非敢反誅叛者耳文都聞變入奉侗於乾陽殿陳兵衛之令將帥乘城以拒難兵敗侗命開門以納世充世充悉遣人代宿衛者明日入謁頓首流涕而言元文都等無狀謀相屠害事急為此不敢背國侗與之盟世充尋遣韋節等諷侗命拜己為尚書左僕射都督內外諸軍事又授其兄惲為內史令入居禁中未幾李密破化及還其徑兵良馬多戰死士卒皆勸世充欲乘其弊而擊之世充恐人心不一乃假託鬼神言夢見周公乃立祠於洛水之上遣巫宣言周公欲令僕射急討李密當有大功不則兵皆疫死世充兵多楚人俗信妖妄故出此言以惑之衆皆請戰世充簡練精勇得兵二萬餘人馬千匹營洛水南密軍偃師北山于時密新得志於化及有輕世充之心不設壁壘世充遣二百餘騎潛入北山伏溪谷中令軍秣馬蓐食既而宵濟人馬奔馳比明而薄密密出兵應之陳未成列而兩軍合戰其伏兵蔽山而上潛登北原乘高而下馳壓密營密營亂無能拒者即入縱火密軍大驚而潰降其將張童兒陳智略進下偃師初世充兄偉及子元應隨化及至東郡密獲而囚之於城中至是盡獲之又執密長史邴元真妻子司馬鄭虔象之母及諸將子弟皆撫慰之各令潛呼其父兄兵次洛口元真鄭虔象等舉倉城以應之密以數十騎遁逸世充收其衆而還東盡于海南至于江悉來歸附世充又令韋節諷侗拜己為太尉署置官屬以尚書省為其府尋自稱鄭王遣其將高略帥師攻壽安不利而旋又帥師攻圍穀州三日而退眀年自稱相國受九錫備法物是後不朝侗矣有道士桓法嗣者自言解圖讖世充昵之法嗣乃上孔子閉房記畫作丈夫持一干以驅羊法嗣云楊隋姓也干一者王字也王居楊後眀相國代隋為帝也又取莊子人間世德充符二篇上之法嗣釋曰上篇言世下篇言充此則相國名矣當德被人間而應符命為天子也世充大悅曰此天命也再拜受之即以法嗣為諫議大夫世充又羅取雜鳥書帛繫其頸自言符命而散之於空或有彈射得鳥而來獻者亦拜官爵既而廢侗陰殺之遂僭即皇帝位建元曰開明國號鄭唐太宗帥師圍之世充頻出兵戰輒不利諸城相繼送欵世充窘迫遣使請救於竇建德建德率兵援之至虎牢太宗破之禽建德執詣城下世充將潰圍而出諸將莫有應之者於是出降至長安為讎家所殺假逹武威姑臧人父嚴周朔州刺史逹在周年始三嵗襲爵襄陽縣公及長身長八尺美鬚髯便弓馬高祖為丞相以為大都督領親信兵常置左右及踐阼為左直齊遷車騎將軍都督晉王府軍事以擊高智慧功授上儀同又敗汪文進等加開府仁壽初為太子左衛副率大業初以藩邸之舊拜左翊衛將軍從征吐谷渾進位金紫光祿大夫帝征遼東平原郝孝德清河張金稱等並起為盜帝令逹擊之數為金稱等所挫諸賊輕之號為假姥後用鄃令楊善會謀更與賊戰方致克捷還亰師以公事坐免眀年帝征遼東使逹留守涿郡俄復拜左翊衛將軍高陽魏刁兒聚衆自號歷山飛冦掠燕趙逹率涿郡通守郭絢擊敗之時盜賊既多逹不能因機決勝惟持重自守時人皆謂之怯懦十二年帝幸江都宫詔逹與太府卿元文都等留守東都李密縱兵侵掠城下逹與監門郎將龎玉虎牙郎將霍世舉禦之以功遷左驍衛大將軍王世充之敗也密進據北芒外薄上春逹與判戶部尚書韋津拒之逹見賊未陳而走軍大潰津沒于密及帝崩於江都逹與元文都等推越王侗為主署開府儀同三司兼納言陳國公元文都等之謀誅王世充逹預焉既而陰告世充逹為之內應及事發迫越王送文都於世充世充甚德於逹既破李密諷越王禪讓世充僭號以逹為司徒及東都平坐誅妻子籍沒通志卷一百六十四
