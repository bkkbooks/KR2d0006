body:
  text: 通志卷一百八十六宋右迪功郎鄭樵漁仲撰載記第一前涼張軌實茂駿重華耀靈祚元靚天錫前趙劉淵和聰粲曜劉宣陳元達序晉史曰古者帝王乃生竒類淳維伯禹之苖裔豈異類哉反首衣皮飱羶飲湩而震驚中域其來自逺天未悔禍種落彌繁其風俗險詖性靈馳突前史載之亦以詳備軒帝患其干紀所以徂征武王竄以荒服同乎禽獸而於露寒之野候月覘風覩隙揚埃乘間騁暴邊城不得緩帶百姓靡有室家孔子曰微管仲吾其被髮左袵矣此言能教訓卒伍整齊車甲邊場既伏境內以安然則燕築造陽之郊秦塹臨洮之險登天山絶地脈苞元菟欵黃河所以防夷狄之亂中華其備豫如此漢宣帝初納呼韓居之亭鄣委以候望始寬戎狄光武亦以南庭數萬徙入西河後亦轉至五原連延七郡董卓之亂則汾晉之郊蕭然矣郭欽騰箋於武帝江統獻策於惠皇皆以為魏處戎夷繡居都鄙請移沙塞之表定一殷周之服統則憂諸并部欽則慮在盟津言猶自口劉淵已至語曰失以豪釐晉卿大夫之辱也聰之誓兵東兼齊地曜之馳斾西踰隴山覆沒兩京蒸徒百萬天子陵江御物分據地險回首中原力不能救劃長淮以北大抵棄之胡人利我艱虞分鑣起亂晉臣或阻兵遐逺接武效尤大凡劉淵以惠帝永興元年據離石稱漢後九年石勒據襄國稱趙張氏先據河西是歲自石勒後三十六年也重華自稱涼王後一年冉閔據鄴稱魏後一年苻健據長安稱秦慕容氏先據遼東稱燕是歲自苻健後一年也俊始僭號後三十一年後燕慕容垂據鄴後二年西燕慕容沖據阿房是歲也乞伏國仁據袍罕稱秦後一年慕容永據上黨是歲也吕光據姑臧稱涼後十二年慕容德據滑臺稱南燕是歲也禿髮烏孤據廉川稱南涼段業據張掖稱北涼後三年李皓據敦煌稱西涼後一年沮渠蒙遜殺段業自稱涼後四年譙縱據蜀稱成都王後二年赫連勃勃據朔方稱大夏後二年馮跋殺離班據和龍稱北燕提封天下十喪其八莫不龍旌帝服建社開枋華夷咸暨人物斯在或篡通都之鄉或擁數州之地雄圖內卷師旅外并窮兵凶於勝負盡人命於鋒鏑其為戰國者一百三十六載抑淵為之禍首云臣謹按魏史以張實與乞伏氏同書李皓與沮渠氏並例此舊史平心之論也唐人修晉史以本朝譜系之故尊顯李皓不使儕之僭偽編諸列傳曰涼武昭王至為諱其名以字書之既而疑其獨異也則又取張軌世家列于其首使人不得議其私也軌以惠帝永寧初自散騎常侍征西軍司出為護羌校尉涼州刺史奉王命為方伯挂名列傳猶之可也然自中州覆沒子孫相承九主七十六年不稟江東正朔謂非僭國可乎李皓遭吕氏崩離盜割其壤建年立號鴟峙一方稽之於時蓋去中興已八十四年彼豈知建業復有典午氏宗枋邪雖嘗奉表歸誠不過仗名義崛強自立耳非真欲延首萬里受人羈縻也張氏之先委質王庭且不得立在列傳李皓特沮渠乞伏之雌者其得在列傳間邪甚矣晉史之失也且其序載記也各以世次書張氏據河西李皓據敦煌則其姓字已參錯於扛鼎者之列而乃竄其傳於他卷中又自相戾已今依舊史所定以二涼歸之載記使以類比又自梁氏敗亡蕭察稱制江陵歷魏周隋傳三主三十三年縣疣附贅不當閏位故亦繼載記後云前涼張軌字士彥安定烏氏人漢常山景王耳十七世孫也家世孝廉以儒學顯父溫為太官令軌少明敏好學有器望與同郡皇甫謐善隱于宜陽女几山泰始初受叔父錫官五品中書監張華與軌論經義及政事損益甚器之謂安定中正為蔽才乃美為之談以為二品之精衛將軍楊珧辟為掾除太子舍人纍遷散騎常侍征西軍司軌以時方多難隂圖據河西筮之遇泰之觀乃投策喜曰霸者兆也於是求為涼州公卿亦舉軌才堪御逺永寧初出為護羌校尉涼州刺史于時鮮卑反叛冦盜從橫軌到官即討破之斬首萬餘級遂威著河右以宋配隂充汜瑗隂淡為股肱謀主徵九郡胄子五百人立學校始置崇文祭酒位視别駕春秋行鄉射之禮祕書監繆世徵少府摯虞夜觀星象相與言曰天下方亂避難之國唯涼土耳張涼州德量不恆殆其人乎及河間成都二王之難遣兵三千東赴京師初漢末金城人陽城逺殺太守以叛郡人馮忠赴尸號哭歐血而死張掖人吳詠為護羌校尉馬賢所辟後為太尉龎參掾參賢相誣罪應死各引詠為證詠計理無兩直遂自刎而死參賢慙悔自相和釋軌皆祭其墓而旌其後永興中鮮卑若羅拔能皆為冦軌遣司馬宋配擊之斬拔能俘十餘萬口威名大震惠帝遣加安西將軍封安樂鄉侯邑千戶於是大城姑臧其城本胸奴所築也南北七里東西三里地有龍形故名卧龍城初漢末博士敦煌侯瑾謂門人曰後城西泉水當竭有雙闕起其上與東門相望中有霸者出焉至魏嘉平中郡官果起學館築雙闕于泉上與東門正相望至是張氏遂霸河西永嘉初東羌校尉韓稚殺秦州刺史張輔軌少府司馬楊允言於軌曰今稚逆命擅殺張輔明公杖鉞一方宜懲不恪春秋之義諸侯相滅桓公不能救則桓公恥之軌從焉遣中督護汜瑗率衆討之先遺稚書諭以禍福稚得書而降軌遣主簿令狐亞聘南陽王模模甚悅遺軌以帝所賜劍謂軌曰自隴以西征伐斷割悉以相委如此劒矣俄而王彌冦洛陽軌遣北宫純張纂馬魴隂濬等率州軍擊破之又敗劉聰于河東京師歌之曰涼州大馬橫行天下涼州鴟苕冦賊消鴟苕翩翩怖殺人帝嘉其忠進封西平郡公不受張掖臨松山石有金馬字磨滅粗可識而張字分明又有文曰初祚天下西方安萬年姑臧又有元石白點成二十八宿時天下既亂所在使命莫至軌遣使貢獻不廢朝廷嘉之屢降璽書尉勞軌後患風口不能言使子茂攝州事酒泉太守張鎮潛引秦州刺史賈龕以代軌密使詣京師請尚書侍郎曹袪為西平太守圖為輔車之勢軌别駕麴朝欲專威福又遣使詣長安告南陽王模稱軌廢疾以請賈龕而龕將受之其兄讓龕曰張涼州一時名士威著西州汝何德以代之龕乃止更以侍中爰瑜為涼州刺史治中楊淡馳詣長安割耳盤上訴軌之被誣模乃表停之晉昌張越涼州大族讖言張氏霸涼自以才力應之從隴西內史遷梁州刺史越志在涼州遂託病歸河西隂圖代軌乃遣兄鎮及曹袪麴佩移檄廢軌以軍司杜耽攝州事使耽表越為刺史軌令曰吾在州八年不能綏靖區域又值中州兵亂秦隴倒懸加以寢患委篤實思斂迹避賢恆負荷任重未便輒遂不圖諸人橫興此變是不明吾心也吾視去貴州如脫屣耳欲遣主簿尉髦奉表詣闕便當歸老宜陽長史王融參軍孟暢踏折鎮檄排閣入諌曰晉室多故人神塗炭實賴明公撫寧西夏張鎮兄弟敢肆凶逆宜聲其罪而戮之不可成其志也軌默然融等出而戒嚴武威太守張琠遣子坦馳詣京表請留軌軌尋以子實為中督護率兵討鎮遣鎮外甥太府主簿令狐亞前喻鎮鎮懼委罪於功曹魯連而斬之詣實歸罪南討曹袪走之張坦至自京師帝優詔勞軌依模所表命誅曹袪軌大悅赦州內殊死已下命實率尹員宋配步騎三萬討袪别遣從事田逈王豐率騎八百自姑臧西南出石驢據長寧袪遣麴朝距戰于黃阪實詭道出浩亹戰于破羌軌斬袪及牙門田嚻遣治中張閬送義兵五千及郡國秀孝貢計器甲方物歸于京師令有司可推詳立州已來清貞德素嘉遁遺榮高才碩學著述經史臨危殉義殺身為君忠諌而嬰禍專對而釋患權智雄勇為時除難諂佞誤主傷陷忠賢具狀以聞州中父老莫不相慶光祿傅祗太常摯虞遺軌書告京師飢匱軌即遣參軍杜勳獻馬五百匹毯布三萬匹帝遣使者進拜鎮西將軍都督隴右諸軍事封霸城侯進車騎大將軍開府辟召儀同三司䇿未至而王彌遂逼洛陽軌遣將軍張斐北宫純郭敷等率精騎五千來衛京都及京都陷斐等皆沒於賊中州避難來者日月相繼分武威置武興郡以居之太府主簿馬魴言於軌曰四海傾覆乘輿未返明公以全州之力徑造平陽必當萬里風披有征無戰未審何憚不為此舉軌曰是孤心也又聞秦王入關乃馳檄關中曰主上遘危遷幸非所普天分崩率土喪氣秦王天挺聖德神武應期世祖之孫王今為長凡我晉人食土之類龜筮克從幽明同款宜簡令辰奉登皇位今遣前鋒督護宋配步騎二萬徑至長安翼衛乘輿折衝左右西中郎實中軍三萬武威太守張琠胡騎二萬駱繹繼發仲秋中旬會于臨晉俄而秦王為皇太子遣使拜軌為驃騎大將軍儀同三司固辭秦州刺史裴苞東羌校尉貫與據險斷使命宋配討之西平王叔與曹袪餘黨麴儒等劫前福祿令麴恪為主執太守趙彛裴苞實回師討之斬儒等左督護隂預與苞戰狹西大敗之苞奔桑凶塢是歲北宫純降劉聰皇太子遣使重申前授固辭左司馬竇濤力勸受命軌不從初實平麴儒徙元惡六百餘家治中令狐瀏勸實悉徙其黨實不納儒黨果叛實進平之愍帝即位進位司空固讓太府參軍索輔言於軌曰古以金貝皮幣為貨息榖帛量度之耗二漢制五銖錢通易不滯泰始中河西荒廢遂不用錢裂匹以為段數縑布既壞市易又難徒壞女工不任衣用弊之甚也今中州雖亂此方安全宜復五銖以濟通變之會軌納之立制凖布用錢錢遂大行人賴其利是時劉曜冦北地軌又遣參軍麴陶領三千人衛長安帝遣大鴻臚辛攀拜軌侍中太尉涼州牧西平公軌又固辭在州十三年寢疾表立子實為世子卒年六十諡曰武公實字安遜學尚明察敬賢愛士以秀才為郎中永嘉初固辭驍騎將軍請還涼州許之改授議郎及至姑臧以討曹袪功封建武亭侯尋遷西中郎將進爵福祿縣侯建興初除西中郎將領護羌校尉軌卒州人推實攝父位愍帝因下䇿書授持節都督涼州諸軍事西中郎將涼州刺史領護羌校尉西平公蘭池長趙奭上軍士張冰得璽文曰皇帝璽羣僚上慶稱德實曰孤常忿袁本初擬肘諸君何忽有此言因送于京師下令國中求言賊曹佐高昌隗瑾言刑政小大宜與衆共之若恆內斷聖心則羣僚畏威面從雖賞千金終無言也實納之增位三等賜帛四十匹遣督護王該送諸郡貢計獻名馬方珍經史圖籍于京師會劉曜逼長安實遣將軍王該率衆以援京城帝嘉之拜都督陜西諸軍事及帝將降于劉曜密遣黃門郎史淑侍御史王沖齎詔授實大都督涼州牧侍中司空承制行事且命挾贊琅邪王共濟艱運實以天子蒙塵沖讓不拜建威將軍西海太守張肅實叔父也以京師危逼請為先鋒擊劉曜實以肅年老弗許既而聞京師陷沒肅悲憤而卒實知劉曜逼遷天子大臨三日遣太府司馬韓璞滅冦將軍田齊撫戎將軍張閬前鋒督護隂預步騎一萬東赴國難命討虜將軍陳安故太守賈騫隴西太守吳紹各統郡兵為璞等前驅戒璞曰前遣諸將多違機信所執不同致有乖阻且內不和親安能服物今遣卿督五將兵事當如一體不得令乖異之問達孤耳也復遺南陽王保書言朝廷傾覆為忠不達於主遣兵不及於難痛慨之深死有餘責今更遣韓璞等唯公命是從及璞次南安諸羌斷軍路相持百餘日糧竭矢盡璞殺駕牛饗軍泣謂衆曰汝曹念父母乎曰念念妻子乎曰念欲生還乎曰欲從我令乎曰諾乃鼓譟進戰會張閬率金城軍繼至夾擊大敗之斬級數千時焦嵩陳安冦隴右東與劉曜相持雍秦之人死者十八九初永嘉中長安謡曰秦川中血沒腕唯有涼州倚柱觀至是謡言驗矣焦嵩陳安逼上邽南陽王保遣使告急以金城太守竇濤為輕車將軍率威逺將軍宋毅及和苞張閬宋輯辛韜張選董廣步騎二萬赴之軍次新陽會愍帝崩問至素服舉哀大臨三日時南陽王保謀稱尊號破羌都尉張詵言於實曰南陽王忘莫大之恥而欲自尊天不授其圖籙德不足以應運終非濟時救難者也晉王明德昵藩先帝憑屬宜表稱聖德勸即尊號傳檄諸藩副言相府則欲競之心息未合之徒散矣從之於是馳檄天下推崇晉王為天子遣牙門蔡忠奉表江南勸即尊位是歲元帝即位于建鄴改年太興實猶稱建興六年不從中興之所改也保聞愍帝崩自稱晉王建元署置百官遣使拜實征西大將軍儀同三司增邑三千戶俄而保為陳安所叛氐羌皆應之保窘迫遂去上邽遷祁山實遣將韓璞步騎五千赴難陳安退保綿諸保歸上邽未幾保復為安所敗使詣實乞師實遣宋毅赴之而安退會保為劉曜所逼遷于桑城將謀奔實實以其宗室之望若至河右必動物情遣將陰監逆保聲言翼衛實禦之也會保薨其衆散奔涼州者萬餘人實自恃險逺頗自驕恣初實寢室梁間有人像無頭久而乃滅實甚惡之京兆人劉𢎞者挾左道客居天梯第五山然燈懸鏡於山穴中為光明以惑百姓受道者千餘人實左右皆事之帳下閻沙牙門趙仰皆𢎞鄉人𢎞謂之曰天與我神璽應王涼州沙仰信之密與實左右十餘人謀殺實奉𢎞為主實潛知其謀收𢎞殺之沙等不之知以其夜害實實在位六年私諡曰昭公元帝賜諡曰元子駿年幼弟茂攝事茂字成遜虛靖好學不以世利嬰心建興初南陽王保辟從事中郎又薦為散騎侍郎中壘將軍皆不就徴為侍中以父老固辭尋拜平西將軍秦州刺史太興三年實既遇害州人推茂為大都督太尉涼州牧茂不從但受使持節平西將軍涼州牧乃誅閻沙及黨與數百人赦其境內復以兄子駿為撫軍將軍武威太守西平公歲餘茂築靈鈞臺周輪八十餘堵基高九仞武陵人閻曽夜叩門呼曰武公遣我來曰何故勞百姓而築臺乎姑臧令辛巖以閻曽妖妄請殺之茂曰吾信勞人曽稱先公之令何謂妖乎太府主簿馬魴諌曰今世難未夷唯當𢎞尚道素不宜勞役崇飾臺榭且比年已來轉覺衆務日奢於往每所經營輕違雅度實非士女所望於明公茂曰吾過也命止作役明年劉曜遣其將劉咸攻韓璞於冀城呼延實攻寧羌護軍陰鑒于桑壁臨洮人翟楷石琮等逐令長以縣應曜河西大震參軍馬岌勸茂親征長史汜褘怒曰亡國之人復欲干亂大事宜斬岌以安百姓岌曰汜公書生糟粕刺舉近才不惟家國大計且朝廷旰食有年矣今大賊自至不煩逺師遐邇之情實繫此州事勢不可以不出且宜立信勇之驗以副秦隴之望茂曰馬生之言得之矣乃出次石頭茂謂參軍陳珍曰劉曜以乘勝之聲握三秦之鋭繕兵積年士卒習戰若以精騎奄克南安席卷河外長驅而至者計將何出珍曰曜雖乘威怙衆恩德未結於下又其關東離二內患未除精卒寡少多是氐羌烏合之衆終不能近舍關東之難增隴上之戍曠日持久與我爭衡也若二旬不退者珍請為明公率弊卒數千以擒之茂大悅以珍為平虜護軍率卒騎一千八百救韓璞曜陰欲引歸聲言要先取隴西然後回滅桑壁珍募發氐羌之衆擊曜走之克復南安茂深嘉之拜折衝將軍未幾茂復大城姑臧修靈鈞臺别駕吳紹諌止之茂曰王公設險武夫重閉達人之至戒也亡兄怛然失身於物直以危機密發雖有賁育之勇無所復施今事未靖不可以拘繫常言以太平之理責人於屯邅之世紹無以對茂雅有志節能斷大事涼州大姓賈摹實之妻弟也勢傾西土先是謡曰手莫頭圖涼州茂以為信誘而殺之於是豪右屏迹威行涼域永昌初茂使將軍韓璞率衆取隴西南安之地以置秦州太寧三年卒臨終執駿手泣曰昔我先人以孝友見稱自漢初以來世執忠順今華夏大亂皇輿播遷汝當謹守人臣之節無或失墜吾遭擾攘之運承先人餘德假攝此州以全性命上欲不負晉室下欲保完百姓然官非王命位由私議茍以集事豈榮之哉氣絶之日白帢入棺無以朝服以彰吾志焉年四十八在位五年私諡曰成茂無子駿嗣位駿字公庭幼而竒偉建興四年封霸城侯十歲能屬文卓越不羈而淫縱過度常夜微行于邑里國中化之及統任年十八先是愍帝使人黃門侍郎史淑在姑臧左長史馬謨等諷淑令拜駿使持節大都督大將軍涼州牧領護羌校尉西平公赦其境內置左右前後四率官繕南宫劉曜又使人拜駿涼州牧涼王時辛晏阻兵於枹罕駿宴羣僚于間豫堂命竇濤等進討辛晏從事劉慶諌曰昔周武回戈以須亡殷之期曹公緩袁氏使自斃辛晏父子安忍凶狂亡可立待願且旋師以俟後舉駿納之遣參軍王騭聘于劉曜曜謂之曰貴州必欲追蹤竇融款誠和好卿能保之乎騭曰不能曜侍中徐邈曰君來和同而云不能何也騭曰齊桓貫澤之盟憂心兢兢諸侯不召自至葵邱之會驕而矜誕叛者九國趙國之化常如今日可也若政教陵遲尚未能察邇者之變况鄙州乎曜顧謂左右曰此涼州高士使乎得人禮而遣之太寧元年駿猶稱建興十二年駿親耕籍田尋承元帝崩問駿大臨三日會有黃龍見于揖次之嘉泉右長史汜褘言於駿曰案建興之年是少帝始起之號帝以凶終理應改易朝廷越在江南音問隔絶宜因龍改號以章休徵不從初駿之立也姑臧謡曰鴻從南來雀不驚誰謂孤雛尾翅生高舉六翮鳯凰鳴至是而復收河南之地咸和初駿遣武威太守竇濤金城太守張閬武威太守辛巖揚烈將軍宋輯等率衆東會韓璞攻討秦州諸郡曜遣其將劉允來距屯於狄道城韓璞進度沃千嶺辛巖曰我握衆數萬藉氐羌之鋭宜速戰以滅之不可以久久而變生璞曰自夏末以來太白犯月辰星逆行白虹貫日皆變之大者不可以輕動輕動而不捷為禍更深吾將久而斃之且曜與石勒相攻允亦不能久也積七十餘日軍糧竭遣辛巖督運於金城允聞之大悅謂其將士曰韓璞之衆十倍於吾羌胡皆叛不為之用吾糧廩將懸難以持久今虜分兵運糧可謂天授吾也若敗辛巖璞等自潰彼衆我寡宜以死戰戰而不捷當無匹馬得還宜厲爾戈矛竭汝智力衆咸奮於是率騎三千襲巖于沃干嶺敗之璞軍遂潰死者二萬餘人面縛歸罪駿曰孤之罪也將軍何辱皆赦之允乘勝追奔濟河攻陷令居入據振武河西大震駿遣皇甫該禦之赦其境內會劉曜東討石生長安空虛大搜講武將襲秦雍理曹郎中索詢諌曰曜雖東征允猶守本險阻路遙為主人甚易允若輕騎憑氐羌以距我者則奔突難測輟彼東合而逆戰者則冦我未已頃年頻出戎馬生郊外有飢羸內資虛耗豈殿下子物之謂邪駿悅以羊酒禮之西域諸國獻汗血馬火浣布犎牛孔雀巨象及諸珍異二百餘品西域長史李柏請擊叛將趙貞為貞所敗議者以柏造謀致敗請誅之駿曰吾每以漢世宗之殺王恢不如秦穆之赦孟明竟以減死論羣心咸悅駿觀兵新鄉狩於北野因討軻沒虜破之下令境中曰昔鯀殛而禹興芮誅而缺進唐帝所以殄洪災晉侯所以成五霸法律犯死罪期親不得在朝今盡聽之唯不宜內參宿衛耳於是刑清國富羣僚勸駿稱涼王領秦涼二州牧置公卿百官如魏武晉文故事駿曰此非人臣所宜言也敢有言此者罪在不赦然境內皆稱之為王羣寮又請駿立世子駿不從中堅將軍宋輯極言國嗣不可久曠駿遂立子重華為世子先是駿遣傅潁假道于蜀通表京師李雄弗許駿又遣治中從事張淳稱藩于蜀託以假道焉雄大悅雄又有憾於南氐楊初淳因説曰南氐無狀屢為邊害宜先討百頃次平上邽二國并勢席捲三秦東清許洛掃氛燕趙拯二帝梓宫於平陽反皇輿於洛邑此英霸之舉千載一時寡君所以遣下臣冒險通誠不逺萬里者以陛下義聲逺播必能愍寡君勤王之志天下之善一也惟陛下圖之雄怒偽許之將覆淳於東峽蜀人橋贊密以告淳淳言於雄曰寡君使小臣行無迹之地通百蠻之域萬里表誠者以陛下義矜勠力之臣能成人之美節故也若欲殺臣者當顯於都市宣示衆目云涼州不忘舊義通使琅邪為表忠誠假途於我主聖臣明發覺殺之當令義聲逺著天下畏威今盜殺江中威刑不顯何足以揚休烈示天下也雄大驚曰安有此邪當相放還河右耳雄司𨽻校尉景騫言於雄曰張淳壯士宜留任之雄曰壯士豈為人留且可以卿意觀之騫謂淳曰卿體大暑熱可且遣下吏小住須涼淳曰寡君以皇輿幽辱梓宫未反天下之恥未雪蒼生之命倒懸故遣淳來表誠大國所論事重非下吏能傳若下吏所了者則淳亦不來雖有火山湯海無所辭難豈寒暑之足避哉雄曰此人矯矯不可得用也厚禮遣之謂淳曰貴主英名蓋世土險兵盛何不稱帝自娛一方淳曰寡君以乃祖乃父世濟忠良未能雪天人之大恥解衆庶之倒懸日昃忘食枕戈待旦以琅邪中興江東故萬里翼戴將成桓文之事何言自娛邪雄有慙色曰我乃祖乃父亦是晉臣往與六郡避難此都為同盟所推遂有今日琅邪若能中興大晉於中州者亦當率衆輔之淳還至龍鶴募兵通表後皆達京師朝廷嘉之駿議欲嚴刑峻制衆咸以為宜黃斌進曰臣未見其可駿問其故斌曰夫法制所以經綸邦國篤俗齊物既立必行不可窪隆也若尊者犯令則法不行矣駿屏几改容曰夫法唯上行制無高下且微黃君吾不聞過矣黃君可謂忠之至也於坐擢為敦煌太守駿有計略於是厲操改節勤修庶政總御文武咸得其用逺近嘉詠號曰積賢君自軌據涼州屬天下之亂所在征伐軍無寧歲至駿境內漸平又使其將楊宣率衆越流沙伐龜兹鄯善於是西域並降鄯善王元孟獻女號曰美人立賓遐觀以處之焉耆前部于填王並遣使貢方物得玉璽於河其文曰執萬國建無極時駿盡有隴西之地士馬強盛雖稱臣於晉而不行中興正朔舞六佾建豹尾所置官僚府寺擬於王者而微異其名又分州西界三郡置沙州東界六郡置河州二府官僚莫不稱臣又於姑臧城南築城起謙光殿畫以五色飾以金玉窮盡珍巧殿之四面各起一殿東曰宜陽青殿以春三月居之章服器物皆依方色南曰朱陽赤殿夏三月居之西曰政刑白殿秋三月居之北曰元武黑殿冬三月居之其傍皆有直省內官寺署一同方色及末年任所遊處不復依四時而居咸和初懼為劉曜所逼使將軍宋輯魏纂將兵徙隴西南安人二千餘家於姑臧使聘於李雄修鄰好及曜攻枹罕護軍辛晏告急駿使韓璞辛巖率步騎二萬擊之戰於臨洮大為曜軍所敗璞等退走追至令居駿遂失河南之地初戊已校尉趙貞不附於駿至是駿擊擒之以其地為高昌郡及石勒殺劉曜駿因長安亂復收河南地至於狄道置武衛石門候和漒川甘松五屯護軍與勒分境勒遣使拜駿官爵駿不受留其使後懼勒強遣使稱臣於勒兼貢方物遣其使歸駿境內嘗大飢榖價踊貴市長談詳請出倉榖與百姓秋收三倍徵之從事陰據諌曰昔西門豹宰鄴積之於人解扁涖東封之邑計入三倍文侯以豹有罪而可賞扁有功而可罰今詳欲因人之飢以要三倍反裘傷皮未足諭之駿納之初建興中敦煌計吏耿訪到長安既而遇賊不得反奔漢中因東渡江以太興二年至京都屢上書以本州未知中興宜遣大使乞為鄉導時連有內難許而未行至是始以訪守治書御史拜駿鎮西大將軍校尉刺史公如故選西方人隴西賈陵等十二人配之訪停梁州七年以驛道不通召還訪以詔書付賈陵託為賈客到長安不敢進以咸和八年始達涼州駿受詔遣部曲督王豐等報謝并遣陵歸上疏稱臣而不奉正朔猶稱建興二十一年九年復使訪隨豐等齎印版進駿大將軍自是每歲使命不絶後駿遣參軍麴護上疏言雄勒既死人懷反正石虎李期篡逆相繼臣願率秦隴突騎吞噬遺羯乞勑司空鑒征西亮泛舟江沔使首尾俱發自後駿遣使多為石虎所獲不達後駿又遣護羌參軍陳宇從事徐虓華馭等至京師征西大將軍亮上疏言陳宇等冒險逺至宜蒙銓敘詔除宇西平相虓等為縣令永和元年以世子重華為五官中郎將涼州刺史駿在位二十二年卒時年四十私諡曰文公穆帝追諡曰忠成公重華字泰臨駿之第二子也寬和懿重沉毅少言父卒時年十六以永和二年自稱持節大都督太尉護羌校尉涼州牧西平公假涼王赦其境內尊其母嚴氏為太王太后居永訓宫所生母馬氏為王太后居永夀宫輕賦斂除關稅省園囿以恤貧窮遣使奉章於石虎虎使王擢麻秋孫伏都等侵冦不輟金城太守張沖降於秋於是涼州振動重華掃境內使其征南將軍裴恆禦之恆壁於廣武欲以持久弊之牧府司馬張耽言強冦在郊諸將不進人情騷動危機稍逼主簿謝艾兼資文武明識兵略若授以斧鉞委以專征必能折衝禦侮殱殄凶類重華召艾問以討冦方略艾曰昔耿弇不欲以賊遺君父黃權願以萬人當冦乞假臣兵七千為殿下吞王擢麻秋等重華大悅以艾為中堅將軍配步騎五千擊秋引師出振武夜有二梟鳴於牙中艾曰梟邀也六博得梟者勝今梟鳴牙中克敵之兆於是進戰大破之斬首五千級重華封艾為福祿伯善待之諸寵貴惡其賢共毀譖之乃出為酒泉太守石虎又令麻秋進陷大夏大夏護軍梁式執太守宋晏以城應秋秋遣晏以書誘宛戍都尉宋矩宋矩謂秋曰辭父事君當立功義功義不立當守名節矩終不背主偷生於世於是先殺妻子自刎而死俄而麻秋進攻枹罕與晉陽太守郎坦以城大難守宜棄外城武城太守張悛曰棄外城則大事去矣不可以動衆心寧戎校尉張璩從之固守大城秋率衆八萬圍塹數重雲梯雹車地突百道皆通於內城中亦應之殺傷秋衆已數萬石虎復遣其將劉渾等率步騎二萬會之郎坦恨言之不從教軍士李嘉潛與秋通引賊千餘人上城西北隅璩使宋修張𢎞辛挹郭普距之短兵接戰斬二百餘人賊乃退璩戮李嘉以徇燒其攻具秋退保大夏謂諸將曰我用兵於五都之間攻城略地往無不捷及登秦隴謂有征無戰豈悟南襲仇池破軍殺將築城長最匹馬不歸及攻此城傷兵挫鋭殆天所贊非人力也石虎聞而歎曰吾以偏師定九州今以九州之力困於枹罕真所謂彼有人焉未可圖也重華以謝艾為使持節軍師將軍率步騎三萬進軍臨河秋以三萬衆距之艾乘軺車冠白幍鳴鼓而行秋望而怒曰艾年少書生冠服如此輕我也命黑矟龍驤三千人馳擊之艾左右大擾左戰帥李偉勸艾乘馬艾不從乃下車踞胡牀指麾處分賊以為伏兵發也懼不敢進張瑁從左南緣河而截其後秋軍乃退艾乘勝奔擊遂大敗之斬秋將杜勳汲魚俘擒一萬三千級秋匹馬奔大夏重華論功以謝艾為太府左長史進封福祿縣伯邑五千戶帛八千匹麻秋又據枹罕有衆十二萬進屯河內遣王擢略地晉興廣武越洪池嶺至於曲柳姑臧大震重華議欲親出距之謝艾固諌以為不可别駕從事索遐進曰賊衆甚盛漸逼京畿君者國之鎮也不可以親動左長史謝艾文武兼資國之方召宜委以推轂之任殿下居中作鎮授以算略小賊不足平也重華納之於是以艾為使持節都督征討諸軍事行衛將軍遐為軍正將軍率步騎二萬距之艾建牙旗盟將士有西北風吹旌旗東南指遐曰風為號令今能令旗指之天所贊也破之必矣軍次神鳥王擢與前鋒戰敗遁還河南艾還討叛虜斯骨真萬餘落破之斬首千餘級俘擒二千八百獲牛羊十餘萬頭重華自以連破勍敵頗怠政事希接賓客司直索遐以書入諌其辭切直重華覽大悅優文答謝然不之改也詔遣侍御史俞歸拜重華護羌校尉涼州刺史假節是時虎西中郎將王擢屯結隴上為苻雄所破奔重華重華厚寵之以為征虜將軍秦州刺史假節使張𢎞宗悠率步騎萬五千配擢伐苻健健遣苻碩禦之戰於龍黎擢等大敗單騎而還𢎞悠皆沒重華痛之素服為戰亡吏士舉哀號慟各遣弔問其家復授擢兵使攻秦州克之遣使上疏言石虎自斃遺燼遊魂亡可立待山東騷擾不足厝懷長安膏腴宜速平蕩臣今遣前鋒都督裴恆步騎七萬遙出隴上以俟聖朝大舉於是康獻皇后詔報遣使進重華為涼州牧是時御史俞歸至涼州重華方謀為涼王不肯受詔使親信人沈猛謂歸曰我家主公奕世忠於晉室而不如鮮卑矣臺加慕容皓燕王今甫授州主大將軍何以加勸有功忠義之臣乎明臺今宜移河右共勸州主為涼王大夫出使茍利社稷專之可也歸對曰王者之制異姓不得稱王九州之內重爵不得過公漢高一時王異姓尋皆誅滅蓋權時之宜非舊體也故王陵曰非劉氏而王天下共伐之至於戎狄不從此例春秋時吳楚稱王而諸侯不以為非者蓋蠻狄畜之也假令齊魯稱王諸侯豈不伐之故聖上以貴公忠賢是以爵以上公位以方伯鮮卑北狄豈足為比哉子失問也曰吾又聞之有殊勳絶世者亦有不世之賞若今便以貴公為王者設貴公以河右之衆南平巴蜀東掃趙魏修復舊都以迎天子天子復以何爵何位可以加賞幸三思之猛具宣歸言重華遂止重華好與羣小遊戲屢出錢帛以賜左右徵事索振切諌重華善之將受詔未及而卒時年二十七在位十一年私諡曰昭公後改曰桓公穆帝賜諡曰敬烈子耀靈嗣耀靈字元舒年十歲嗣事稱大司馬校尉刺史西平公伯父長寧侯祚性傾巧善承內外初與重華寵臣趙長尉緝等結異姓兄弟長等矯稱重華遺令以祚為持節督中外諸軍撫軍將軍輔政長等議以耀靈沖幼時難未夷宜立長君祚先蒸重華母馬氏馬氏遂從緝議命廢耀靈為涼寧侯而立祚祚尋使楊秋胡害耀靈於東苑埋之於沙坑私諡曰哀公祚字太伯博學雄武有政事之才既立自稱大都督大將軍涼州牧涼公淫暴不道又通重華妻裴氏自閣內媵妾及駿重華未嫁子女無不暴亂國人相目咸賦牆茨之詩永和十年祚納尉緝趙長等議僭稱帝位立宗廟儛八佾置百官下書改建興四十二年為和平元年赦殊死賜鰥寡帛加文武爵各一級追崇曽祖軌為武王祖實為昭王從祖茂為成王父駿為文王弟重華為明王立妻辛氏為皇后弟天錫為長寧王子泰和為太子庭堅為建康王耀靈弟元靚為涼武侯其夜天有光如車蓋聲若雷霆震動城邑明日大風拔木災異屢見而祚凶虐愈甚其尚書馬岌以切諌免官郎中丁琪又諌曰先公纍執忠節五十餘載故能以一州之衆抗崩天之虜今陛下勳德未高於先公而遽行革命之事自尊一隅負乘致冦臣竊見其未可祚大怒斬之於闕下遣其將和昊率衆伐驪靬戎於南山大敗而還太尉桓溫入關王擢時鎮隴西馳使於祚言溫善用兵勢在難測祚既震懼又慮擢反噬即召馬岌復位而與之謀密遣親人刺擢事覺不克祚益懼大聚衆聲言東征實欲西保敦煌會溫還而止更遣其平東將軍秦州刺史牛霸司兵張芳率三千人擊擢破之擢奔於苻健其國中五月霜降殺苖稼果實祚宗人張瓘時鎮枹罕祚惡其強遣其將易揣張玲率步騎萬三千以襲之時張掖人王鸞頗知神道言於祚曰軍出不復還涼國將有不利矣祚大怒以鸞訞言沮衆斬之以徇三軍乃發鸞臨刑曰我死不二十日軍必敗時有神降於元武殿自稱元冥與人交語祚日夜祈之神言與之福利祚甚信之祚又遣張掖太守索孚代瓘鎮枹罕為瓘所殺玲等濟河未畢又為瓘兵所破揣單騎奔走瓘軍躡之祚衆震懼敦煌人宋混與弟澄等聚衆以應瓘趙長張璹等懼罪入閣呼重華母馬氏出殿拜耀靈庶弟元靚為主揣等率衆入殿伐長殺之瓘弟琚及子嵩募數百市人揚聲言張祚無道我兄大軍已到城東敢有舉手者誅三族祚衆披散琚嵩率衆入城祚案劒殿上大呼令左右死戰祚既失衆心莫有鬪志於是被殺梟其首宣示內外暴尸道左國內咸稱萬歲祚篡立三年而亡元靚字元安既立自號大都督大將軍校尉涼州牧西平公赦其國內廢和平之號復稱建興四十三年誅祚二子以張瓘為衛將軍領兵萬人行大將軍事改易僚屬有隴西人李儼誅大姓彭姚自立於隴右奉中興年號百姓悅之元靚遣牛霸率衆討之未達而西平人衛綝又據郡叛霸衆潰單騎而還瓘先欲征綝以兄圭在綝中為疑綝亦以弟在瓘中故彼我經年不相伐西平人郭勛解天文不應州郡之命綝禮聘之勛曰張氏應衰衛氏當興豈得以一弟而滅一門宜速伐瓘綝將從之瓘遣弟琚領大衆征綝敗之西平田旋要酒泉太守馬基背瓘應綝旋謂基曰綝擊其東我等絶其西不六旬天下可定斯閉口捕舌也基許之瓘遣司馬張姚王國將二千人伐基敗之斬基旋二人之首傳姑臧瓘兄弟強盛負其勳力有篡立之謀輔國宋混與弟澄共討瓘盡夷其屬元靚以混為都督中外諸軍事車騎大將軍假節輔政混卒又以澄代之元靚右司馬張雍惡澄專擅殺之遂滅宋氏元靚乃以雍為中護軍叔父天錫為中領軍共輔政雍自以功大驕矜淫縱又通馬氏樹黨專權國人患之天錫腹心郭增劉肅二人並年十八九因寢謂天錫曰天下事欲未靜天錫曰何謂也二人曰今護軍出入有似長寧天錫大驚曰我早疑之未敢出口計當云何肅曰政當速除之耳天錫曰安得其人肅曰肅即是也天錫曰汝年少更求可與謀者肅曰趙白駒及肅二人足以辦之矣於是天錫從兵四百人與雍俱入朝肅與白駒剔刀鞘出刃從天錫入值雍於門下肅斫之不中白駒繼之又不克二人與天錫俱入禁中雍得逸走因率甲士三百餘人反攻禁門天錫上屋大呼謂將士曰張雍凶逆所行無道諸宋何罪盡誅滅之傾覆國家肆亂社稷我不惜死實懼先人廢祀事不獲已故耳我家門户事而將士豈可以干戈見向今之所取雍身而已天地有靈吾不食言雍衆聞之悉散走雍以劒自刎而死於是悉誅雍黨元靚年既幼沖性又仁弱天錫既克雍專掌朝政改建興四十九年奉升平之號興寧元年駿妻馬氏卒元靚以其庶母郭氏為太妃郭氏以天錫專政與大臣張欽等謀討之事泄欽等伏法是歲天錫率衆入禁門潛害元靚宣言暴薨時年十四在位九年私諡曰沖公孝武帝賜諡曰敬悼公天錫字純嘏駿少子也小名獨活初字公純嘏入朝人笑其三字因自改焉元靚死國人立之自號大將軍校尉涼州牧西平公遣司馬綸騫奉章請命并送御史俞歸還京都太和初詔以天錫為大將軍大都督督隴右關中諸軍事護羌校尉涼州刺史西平公天錫數宴園池政事頗廢蕩難將軍校書祭酒索商上疏極諌天錫不從羌廉岐自稱益州刺史率略陽四千家背苻堅就李儼天錫自往討之以别駕楊遹為監前鋒軍事前將軍趣金城晉興相常據為使持節征東將軍向左南遊擊將軍張統出白土天錫自率三萬人次倉松伐儼儼大敗入城固守遣子純求救於苻堅堅使其將王猛救之天錫敗績死者十二三天錫乃還立子大懷為世子自天錫之嗣事也連年地震山崩水泉湧出柳化為松火生泥中而天錫荒于聲色不恤政事初安定梁景敦煌劉肅並以門胄總角與天錫友昵張雍之誅肅景有勳天錫深德之賜姓張氏又改其字以為己子天錫諸子皆以大為字故景曰大奕肅曰大誠廢大懷為高昌公更立嬖子大豫為世子景肅等俱參政事人情怨懼從弟從事中郎憲切諌不納時苻堅強盛每攻之兵無寧歲天錫甚懼乃立壇刑牲率典軍將軍張寧中堅將軍馬芮等遙與晉三公盟誓獻書大司馬桓溫尅六年夏誓同大舉遣從事中郎韓博奮節將軍康妙奉表并送盟文博有口才溫甚稱之嘗大會溫使司馬刁彛嘲之彛謂博曰君是韓盧後邪博曰卿是韓盧後溫笑曰刁以君姓韓故相問焉他自姓刁那得韓盧後邪博曰明公脫未之思短尾者則為刁也一坐推歎焉太元元年苻堅遣其將茍萇毛當梁熙姚萇來冦渡石城津天錫集議中録事席仂曰先公既有故事徐思後變此孫仲謀屈伸之略也衆以仂為老怯咸曰龍驤將軍馬達精兵萬人距之必不敢進廣武太守辛章保城固守章與晉興相彭知正西平相趙疑謀曰馬達出於行陳必不為用則秦軍深入吾相與率三郡精卒斷其糧運決一朝命矣征東常據亦欲先擊姚萇須天錫命天錫率萬人頓金昌城馬達率萬人逆萇等因請降兵人散走常據席仂皆戰死司兵趙充哲與萇苦戰又死中衛將軍史景亦沒于陳天錫大懼出城自戰城內又反天錫窘逼降于萇等初天錫所居西昌門及平章殿無故而崩旬日而國亡即位凡十三年自軌為涼州至天錫凡九世七十六年矣苻堅先為天錫起宅至以為尚書封歸義侯堅大敗于淮肥時天錫為苻融征南司馬於陳歸國詔以為散騎常侍左員外又詔復其先爵西平郡公俄拜金紫光祿大夫天錫少有文才流譽逺近及歸朝甚被恩遇朝士以其國破身虜多共毀之會稽王道子嘗問其西土所出天錫應聲曰桑椹甜甘鴟梟革響乳酪養性人無妬心後形神昏喪雖處列位不復被齒遇隆安中會稽世子元顯用事常延致之以為戲弄以其家貧拜廬江太守本官如故桓元時欲招懷四逺乃用天錫為護羌校尉涼州刺史尋卒年六十一追贈金紫光祿大夫前趙劉淵字元海新興胸奴人冒頓之後也初漢高祖以宗女為公主以妻冒頓約為兄弟故其子孫遂冒姓劉氏建武初烏珠留若鞮單于子右奧鞬日逐王比自立為南單于入居西河美稷今離石左國城即單于所徙庭也中平中單于羌渠使子於扶羅將兵助漢討平黃巾會羌渠為國人所殺於扶羅以其衆留漢自立為單于屬董卓之亂冦掠太原河東屯于河內於扶羅死弟呼厨泉立以於扶羅子豹為左賢王即淵之父也魏武分其衆為五部以豹為左部帥其餘部帥皆以劉氏為之太康中改置都尉左部居太原兹氏右部居祈南部居蒲子北部居新興中部居大陵劉氏雖分居五部然皆家于晉陽汾澗之濱豹妻呼延氏魏嘉平中祈子於龍門俄而有一大魚頂有二角軒鬐躍鱗而至祭所久之乃去巫覡皆異之曰此嘉祥也其夜夢旦所見魚變為人左手把一物大如半雞子光景非常授呼延氏曰此是日精服之生貴子寤而告豹豹曰吉徵也吾昔從邯鄲張冏母司徒氏相云吾當有貴子孫三世必大昌仿像相符矣自是十三月而生淵左手文有其名遂以名焉齠齓英慧七歲遭母憂劈踊號呌哀感旁鄰宗族部落咸共歎賞司空太原王昶等聞而嘉之並遣弔賻幼好學師事上黨崔遊習毛詩京氏易馬氏尚書尤好春秋左氏傳孫吳兵法略皆誦之史漢諸子無不綜覽嘗謂同門生朱紀范隆曰吾每觀書傳常鄙隨陸無武絳灌無文道由人𢎞一物之不知者固君子之所恥也二生遇高皇而不能建封侯之業兩公屬太宗而不能開庠序之美惜哉於是遂學武事妙絶於衆猿臂善射膂力過人姿儀魁偉身長八尺四寸須長三尺餘當心有赤毫毛三根長三尺六寸有屯留崔懿之襄陵公師彧等皆善相人及見淵驚而相謂曰此人形貌非常吾所未見也於是深相崇敬推分結恩太原王渾虛襟友之命子濟拜焉咸熙中為任子在洛陽文帝深待之泰始之後渾又屢言之於武帝帝召與語大悅之謂王濟曰劉淵容儀機鑒雖由余日磾無以加也濟對曰淵容儀機識實如聖旨然其文武才幹賢於二子逺矣陛下若任之以東南之事吳會不足平也帝稱善孔恂楊珧進曰臣觀劉淵之才當今懼無其比陛下若輕其衆不足以成事若假之威權平吳之後恐其不復北渡也非我族類其心必異任之以本部臣竊為陛下寒心若舉天阻之固以資之無乃不可乎帝默然後秦涼覆沒帝疇咨將帥上黨李喜曰陛下誠能發胸奴五部之衆假劉淵一將軍之號鼓行而西可指期而定孔恂曰李公之言未盡殄患之理也喜勃然曰以胸奴之徑悍劉淵之曉兵奉宣聖威何不盡之有恂曰淵若能平涼州斬樹機能恐涼州方有難耳蛟龍得雲雨非復池中物也帝乃止後王彌從洛陽東歸淵餞彌於九曲之濱泣謂彌曰王渾李喜以鄉曲見知每相稱達讒間因之而進深非吾願適足為害吾本無宦情惟足下明之恐死洛陽永與子别因慷慨歔欷縱酒長嘯聲調亮然坐者為之流涕齊王攸時在九曲比聞而馳遣視之見淵在焉言於帝曰陛下不除劉淵臣恐并州不得久寧王渾進曰劉淵長者渾為君王保明之且大晉方表信殊俗懷逺以德如之何以無萌之疑殺人侍子以示晉德不𢎞帝曰渾言是也會豹卒以淵代為左部帥太康末拜北部都尉明刑法禁姦邪輕財好施推誠接物五部雋傑無不至者幽冀名儒後門秀士不逺千里亦皆遊焉楊駿輔政以淵為建威將軍五部大都督封漢光鄉侯元康末坐部人叛出塞免官成都王頴鎮鄴表淵行寧朔將軍監五部軍事惠帝失馭冦盜蜂起淵從祖故北部都尉左賢王劉宣等竊議曰昔我先人與漢約為兄弟憂泰同之自漢亡以來魏晉代興我單于雖有虛號無復尺土之業自諸王侯降同編户今司馬氏骨肉相殘四海鼎沸興邦復業此其時矣左賢王淵姿器絶人幹宇超世天若不恢崇單于終不虛生此人也於是密共推淵為大單于乃使其黨呼延攸詣鄴以謀告之淵請歸會葬頴弗許乃令攸先歸告宣等招集五部引會宜陽諸胡聲言應頴實背之也頴為皇太弟以淵為太弟屯騎校尉惠帝伐頴次于蕩陰頴假淵輔國將軍督北城守事及六軍敗績頴以淵為冠軍將軍封盧奴伯并州刺史東瀛公騰安北將軍王浚起兵伐頴淵説頴曰今二鎮跋扈衆餘十萬恐非宿衛及近都士庶所能禦之請為殿下還説六部以赴國難頴曰五部之衆可保發已不縱能發之鮮卑烏丸徑速如風雨何易可當邪吾欲奉乘輿還洛陽避其鋒鋭徐傳檄天下以逆順制之君意何如淵曰殿下武皇帝之子有殊勳於王室威恩光洽四海欽風孰不思為殿下沒命投軀者哉何難發之有乎王浚豎子東瀛疏屬豈能與殿下爭衡邪殿下一發鄴宫示弱於人洛陽可復至乎縱達洛陽威權不復在殿下也紙檄尺書誰為人奉之且東胡之悍不踰五部願殿下勉撫士衆靖以鎮之當為殿下以二部摧東瀛三部梟王浚二豎之首可指日而懸矣頴悅拜淵為北單于參丞相軍事淵至左國城劉宣等上大單于之號二旬之間衆已五萬都於離石王浚使將軍祁𢎞率鮮卑攻鄴頴敗挾天子南奔洛陽淵曰頴不用吾言逆自奔潰直奴才也然吾與其有言矣不可不救於是命右於陸王劉景左獨鹿王劉延年等率步騎二萬將討鮮卑劉宣等固諌曰晉為無道奴𨽻遇我是以右賢王猛不勝其忿屬晉綱未弛大事不遂右賢塗地單于之恥也今司馬氏父子兄弟自相魚肉此天厭晉德授之於我單于積德在躬為晉人所服方當興我邦族復呼韓邪之業鮮卑烏丸可以為援奈何距之而拯仇敵今天假手於我不可違也違天不祥逆衆不濟天與不取反受其咎願單于勿疑淵曰善當為崇岡峻阜何能為培塿乎夫帝王豈有常哉大禹出於西戎文王生於東夷顧惟德所授耳今見衆十餘萬皆一當晉十鼓行而摧亂晉猶拉枯耳上可成漢高之業下不失為魏氏雖然晉人未必同我漢有天下世長恩德結於人心是以昭烈﨑嶇於一州之地而能抗衡於天下吾又漢氏之甥約為兄弟兄亡弟紹不亦可乎且可稱漢追尊後主以懷人望乃遷於左國城逺人歸附者數萬永興元年淵乃為壇於南郊僭即漢王位下令赦其境內年號元熙追尊劉禪為孝懷皇帝立漢高祖以下三祖五宗神主而祭之立其妻呼延氏為王后置百官以劉宣為丞相崔遊為御史大夫劉宏為太尉其餘拜授各有差東瀛公騰使將軍聶元討之戰于大陵元師敗績騰懼率并州二萬餘戶下山東遂所在為冦淵遣其建武將軍劉曜冦太原泫氏屯留長子中都皆陷之二年騰又遣司馬瑜周良石鮮等討之次于離石汾城淵遣其虎牙將軍劉欽等六軍距瑜等四戰瑜皆敗欽振旅而歸是歲離石大飢遷于黎亭以就邸閣榖留其太尉劉宏護軍馬景守離石使大司農卜豫運糧以給之以其前將軍劉景為使持節征討大都督大將軍要擊并州刺史劉琨于版橋為琨所敗琨遂據晉陽其侍中劉殷王育進諌淵曰殿下自起兵以來漸已一周而顓守偏方王威未震誠能命將四出決機一擲梟劉琨定河東建帝號鼓行而南克長安而都之以關中之衆席卷洛陽如指掌耳此高皇帝之所以創啓鴻基克殄強楚者也淵悅曰此孤心也遂進據河東攻冦蒲阪平陽皆陷之淵遂入都蒲子河東平陽屬縣壘壁盡降時汲桑起兵趙魏上郡四部鮮卑陸逐延氐酋大單于徵東萊王彌及石勒等並相次降之淵悉署其官爵永嘉二年淵僭即皇帝位大赦境內改元永鳯以其大將軍劉和為大司馬封梁王尚書令劉歡樂為大司徒封陳留王御史大夫呼延翼為大司空封鴈門郡公宗室以親疏為等悉封郡縣王異姓以勳謀為差皆封郡縣公侯太史令宣于修之言於淵曰陛下雖龍興鳯翔奄受大命然遺晉未殄皇居仄陋紫宫之變猶鍾晉氏不出三年必克洛陽蒲子﨑嶇非可久安平陽勢有紫氣兼陶唐舊都願陛下上迎乾象下協坤祥於是遷都平陽汾水中得玉璽文曰有新保之蓋王莽時璽也得者因增泉淵光三字淵以為已瑞大赦境內改年河瑞封子裕為齊王隆為魯王於是命其子聰與王彌進冦洛陽劉曜與趙固等為之後繼東海王越遣平北將軍曹武將軍宋抽彭默等距之王師敗績聰等長驅至宜陽平昌公模遣將軍淳于定吕毅等自長安討之戰于宜陽定等敗績聰恃連勝不設備𢎞農太守垣延詐降夜襲聰軍大敗而還淵素服迎師是冬復大發卒遣聰彌劉曜劉景等率精騎五萬冦洛陽使呼延翼率步卒繼之敗王師于河南聰進屯于西明門護軍賈允夜薄之戰于大夏門斬聰將呼延皓其衆遂潰聰回軍而南壁於洛水尋進屯宣陽門曜屯上東門彌屯廣陽門景攻大夏門聰親祁嵩嶽令其將劉厲呼延朗等督留軍東海王越命參軍孫詢將軍邱光樓裒等率帳下徑卒二千自宣陽門擊朗斬之聰聞而馳還厲懼聰之罪已也赴水而死王彌謂聰曰今既失利洛陽猶固殿下不如還師徐為後舉下官當於兖豫之間收兵積榖伏聽嚴期宣于修之又言於淵曰歲在辛未當得洛陽今晉氣猶盛大軍不歸必敗淵馳遣黃門郎傅詢召聰等還師王彌出自轘轅越遣薄盛等追擊彌戰于新汲彌師敗績於是攝蒲阪之戍還於平陽以劉歡樂為太傅劉聰為大司徒劉延年為大司空劉洋為大司馬赦其境內立妻單氏為皇后子和為皇太子封子乂為北海王淵寢疾將為顧託之計以歡樂為太宰洋為太傅延年為太保聰為大司馬大單于並録尚書事置單于臺于平陽西以其子裕為大司徒淵疾篤召歡樂及洋等入禁中受遺詔輔政以永嘉四年死在位六年偽諡光文皇帝廟號高祖墓號永光陵子和立和字元泰身長八尺雄毅美姿儀好學夙成習毛詩左氏春秋鄭氏易及為儲二內多猜忌馭下無恩淵死和嗣偽位其衛尉西昌王劉鋭宗正呼延攸恨不參顧命也説和曰先帝不惟輕重之計而使三王總強兵於內大司馬握十萬徑卒居于近郊陛下今便為寄坐耳此之禍難未可測也願陛下早為之所和即攸之甥也深然之召其領軍劉盛及劉欽馬景等告之盛曰先帝尚在殯宫四王未有逆節今忽一旦自相魚肉臣恐人不食陛下之餘四海未定大業甫爾願陛下以上成先帝鴻基為志且塞耳勿聽此狂簡之言也詩云豈無他人不如我同父陛下既不信諸弟復誰可信哉鋭悠怒曰今日之議理無有二於是命左右刃之景懼曰惟陛下詔臣等以死奉之蔑不濟矣乃相與盟于東堂使鋭景攻聰攸率劉安國攻裕使侍中劉乘武衛劉欽攻魯王隆尚書田密武衛劉璿攻北海王乂密璿等使人斬關奔于聰聰命貫甲以待之鋭知聰之有備也馳還與攸乘等會攻隆裕攸乘懼安國欽之有異志也斬之是日斬裕及隆聰攻西明門克之鋭等奔入南宫前鋒隨之斬和于光極西室鋭攸梟首通衢劉聰字元明一名載淵第四子也母曰張夫人初聰之在孕也張氏夢日入懷寤而以告淵曰此吉徵也慎勿言十五月而生聰焉夜有白光之異形體非常左耳有一白毫長二尺餘甚光澤幼而聰悟好學博士朱紀大竒之年十四究通經史兼綜百家之言孫吳兵法靡不誦之工草𨽻善屬文著述懷詩百餘篇賦頌五十餘篇十五習擊刺猿臂善射彎弓三百斤膂力驍捷冠絶一時太原王渾見而悅之謂淵曰此兒吾所不能測也弱冠遊於京師名士莫不交結樂廣張華尤異之也新興太守郭頤辟為主簿舉良將入為驍騎别部司馬纍遷右部都尉善於撫接五部豪右無不歸之河間王顒表為赤沙中郎將聰以淵在鄴懼為成都王頴所害乃亡奔成都王拜右積弩將軍參前鋒戰事淵為北單于立為右賢王隨還右部及即大單于位更拜鹿蠡王既殺其兄和羣臣勸即尊位聰初讓其弟北海王乂乂與公卿涕泣固請聰久而許之曰乂及羣公正以四海未定禍難尚殷貪孤年長故耳此國家之事孤敢不祗從今便欲逺遵魯隱待乂年長復子明辟於是以永嘉四年僭即皇帝位大赦境內改年光興尊淵妻單氏曰皇太后其母張氏為帝太后乂為皇太弟領大單于大司徒立其妻呼延氏為皇后封其子粲為河內王署使持節撫軍大將軍都督中外諸軍事易河間王翼彭城王悝高平王遣粲及其征東王彌龍驤劉曜等率衆四萬長驅入洛川遂出轘轅周旋梁陳汝潁之間陷壘壁百餘以其司空劉景為大司馬左光祿劉殷為大司徒右光祿王育為大司空偽太后單氏姿色絶麗聰蒸焉單即乂之母也乂屢以為言單氏慙恚而死聰悲悼無已後知其故乂之寵因此漸衰然猶追念單氏未便黜廢又尊母為皇太后署其衛尉呼延晏為使持節前鋒大都督前軍大將軍配禁兵二萬七千自宜陽入洛川命王彌劉曜及鎮軍石勒進師會之晏比及河南王師前後十二敗死者三萬餘人彌等未至晏留輜重于張方故壘遂冦洛陽攻陷平昌門焚東陽宣陽諸門及諸府寺懷帝遣河南尹劉默距之王師敗於社門晏以外繼不至出自東陽門掠王公已下子女二百餘人而去時帝將濟河東遁具船于洛水晏盡焚之還于張方故壘王彌劉曜至復與晏會圍洛陽時城內飢甚人皆相食百官分散莫有固志宣陽門陷彌晏入于南宫升太極前殿縱兵大掠悉收宫人珍寶曜於是害諸王公及百官已下三萬餘人於洛水北築為京觀遷帝及惠帝羊后傳國六璽于平陽聰大赦改年嘉平以帝為特進左光祿大夫平阿公遣其平西趙染安西劉雅率騎二萬攻南陽王模于長安粲曜率大衆繼之染敗王師于潼關將軍吕毅死之軍至于下邽模乃降染染送模於粲粲害模及其子范陽王黎送衛將軍梁芬模長史魯繇兼散騎常侍杜驁辛謐及北宫純等于平陽聰以粲之害模也大怒粲曰臣殺模本不以其晚識天命之故但以其晉氏肺腑洛陽之難不能死節天下之惡一也故誅之聰曰雖然吾恐汝不免誅降之殃也夫天道至神理無不報署劉曜為車騎大將軍開府儀同三司雍州牧改封中山王鎮長安王彌為大將軍封齊公尋而石勒等殺彌於已吾而并其衆表彌叛狀聰大怒遣使讓勒專害公輔有無上之心又恐勒之有二志也以彌部衆配之劉曜既據長安安定太守賈匹及諸氐羌皆送質任唯雍州刺史麴特新平太守竺恢固守不降護軍麴允頻陽令梁肅自京兆南山將奔安定遇匹任子於陰密擁還臨涇推匹為平西將軍率衆五萬攻曜於長安扶風太守梁綜及麴時竺恢等亦率衆十萬會之曜遣劉雅趙染來距敗績而還曜又盡長安鋭卒與諸軍戰于黃邱曜衆大敗中流矢退保甘渠杜人王秃紀特等攻劉粲于新豐粲還平陽曜攻陷池陽掠萬餘人歸于長安時閻鼎等奉秦王為皇太子入于雍城關中戎晉莫不響應聰后呼延氏死將納其太保劉殷女其弟乂固諌聰更訪之於太宰劉延年太傅劉景景等皆曰臣常聞太保自云周劉康公之後與聖氏本源既殊納之為允聰大悅使其兼大鴻臚李𢎞拜殷二女為左右貴嬪位在昭儀上又納殷女孫四人為貴人位次貴嬪謂𢎞曰此女輩皆姿色超世女德冠時且太保於朕實自不同卿意安乎𢎞曰太保允自有周與聖源實别陛下正以姓同為恨耳且魏司空東萊王基當世大儒豈不達禮乎為子納司空太原王沉女以其姓同而源異故也聰大悅賜𢎞黃金六十斤曰卿當以此意諭吾子弟輩於是六劉之寵傾於後宫聰稀復出外事皆中黃門納奏左貴嬪決之聰假懷帝儀同三司封會稽郡公庾珉等以次加秩聰引帝入宴謂帝曰卿為豫章王時朕嘗與王武子相造武子示朕於卿卿言聞其名久矣以卿所製樂府歌示朕謂朕曰聞君善為辭賦試為看之朕時與武子俱為盛德頌卿稱善者久之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿贈朕柘弓銀研卿頗憶不帝曰臣安敢忘之但恨爾日不早識龍顔聰曰卿家骨肉相殘何其甚也帝曰此殆非人事皇天之意也大漢將應乾受歷故為陛下自相驅除且臣家若能奉武皇之業九族敦睦陛下何由得之至日夕乃出以小劉貴人賜帝謂帝曰此名公之孫今特以相妻卿宜善遇之拜劉為會稽國夫人遣其鎮北靳沖冦太原平北卜珝率衆繼之沖攻太原不克而歸罪於珝輒斬之聰聞之大怒曰此人朕所不得加刑沖何人哉遣其御史中丞浩衍持節斬沖左都水使者襄陵王攄坐魚蟹不供將作大匠望都公靳陵坐溫明徽光二殿不成皆斬于東市聰遊獵無度常晨出暮歸觀漁於汾水以燭繼晝中軍王彰切諌聰大怒命斬之上夫人王氏叩頭乞哀乃囚之詔獄聰母以聰刑怒過差三日不食弟乂子粲並輿櫬切諌聰怒曰吾豈桀紂幽厲乎而汝等生來哭人其太宰劉延年及諸公卿列侯百餘人皆免冠涕泣固諌聰於是赦彰麴特等圍長安劉曜連戰敗績乃驅掠士女八萬餘口退還平陽因攻司徒傅祗于三渚使其右將軍劉參攻敦默于懷城祗病卒城陷遷祗孫純粹并其二萬餘戶于平陽縣聰贈祗太保純粹皆給事中以其忠於主也聰遣劉粲劉曜等攻劉琨于晉陽琨使張喬距之戰於武灌喬敗績死之晉陽危懼太原太守高喬琨别駕郝聿以晉陽降粲琨與左右數十騎擕其妻子奔于趙郡之亭頭遂如常山粲曜入于晉陽先是琨與代王猗盧結為兄弟乃告敗於猗盧且乞師猗盧遣子日利孫賓六須及將軍衛雄姬淡等率衆數萬攻晉陽琨收散卒千餘為之鄉導猗盧率衆六萬至于狼猛曜及賓六須戰于汾東曜墜馬中流矢身被七創討虜傅武以馬授曜曜曰當今危亡之極人各思免吾創已重自分死此矣武泣曰武小人蒙大王識拔以至於是常思效命今其時矣且皇室始基大難未弭天下何可一日無大王也於是扶曜乘馬驅令渡汾回而戰死曜入晉陽夜與劉粲等掠百姓踰蒙山遁歸猗盧率騎追之戰于藍谷粲敗績斬其征虜邢延獲其鎮北劉豐琨收合離散保于陽曲猗盧戍之而還正旦聰宴于光極前殿逼帝行酒光祿大夫庾珉王俊等起而大哭聰惡之會有告珉等謀以平陽應劉琨者聰遂鴆帝而誅珉俊復以賜帝劉夫人為貴人大赦境內殊死已下立左貴嬪劉氏為皇后聰將為劉氏起凰儀殿於後庭廷尉陳元達諌曰天生蒸民而樹之君使父母之晉氏暗虐視百姓如草芥天用剿絶其命乃眷皇漢與民息肩人懷更蘇之望有日矣我高祖光文皇帝身衣大布居不重茵先后妃嬪服無綺綵重逆羣臣之請僅建南北宫焉今光極之前足以朝羣后饗萬國矣昭德溫明已後足可以容六宫列十二等矣陛下龍興以來外殄二京不世之冦內興殿觀四十餘所兵疲於外人怨於內為民父母固若是乎伏聞詔旨將營凰儀以臣觀之尤實非宜昔太宗承高祖之業天下殷富尚以百金之費而輟露臺今陛下之所有不過太宗二郡地耳戰守之備豈僅胸奴南越而已哉孝文之廣思費如彼陛下之狹欲損如此愚臣所以敢昧死犯顔色冒不測之禍者也聰大怒曰吾為萬機主將營一殿豈問汝鼠子乎不殺此奴沮亂朕心朕殿何當得成邪將出斬之并其妻子同梟東市使羣鼠共穴時在逍遙園李中堂元達抱堂下樹呌曰臣所言者社稷之計也而陛下殺臣若死者有知臣要當上訴陛下於天下訴陛下於先帝朱遊有云臣得與龍逢比干遊於地下足矣未審陛下何如主耳元達先鎖腰而入及至即以鎖繞樹左右曵之不能動聰怒甚劉氏時在後堂聞之密遣中常侍私敕左右停刑於是手疏切諌聰乃解引元達而謝之易逍遙園為納賢園李巾堂為愧賢堂時愍帝即位于長安聰遣劉曜及司𨽻喬智明虎牙李景年等冦長安命趙染率衆赴之時大都督麴允據黃白城纍為曜染所敗染謂曜曰麴允率大衆在外長安可襲而取之得長安黃白城自服願大王以重衆守此染請輕騎襲之曜乃承制加染前鋒大都督安南大將軍以精騎五千配之而進王師敗於渭陽將軍王廣死之染夜入長安外城帝奔射鴈樓染焚燒龍尾及諸軍營殺掠千餘人旦退屯逍遙園麴允率衆襲曜連戰敗之曜入粟邑遂歸平陽時流星起於牽牛入紫微龍形委蛇其光照地落于平陽北十里視之則有肉長三十步廣二十七步臭聞于平陽肉旁常有哭聲晝夜不止聰甚惡之延公卿已下問曰朕之不德致有斯異其各極言勿有所諱陳元達及博士張師等進對曰星變之異其禍行及臣恐後庭有三后之事亡國喪家靡不由此願陛下慎之聰曰此陰陽之理何關人事既而劉氏産一蛇一猛獸各害人而走尋之不得頃之見在隕肉之旁俄而劉氏死乃失此肉哭聲亦止自是後宫亂寵進御無序矣聰以劉易為太尉初置相國官上公有殊勳德者死乃贈之於是大定百官置太師丞相自大司馬以上七公位皆上公緑綟綬逺遊冠置輔漢都護中軍上軍撫軍鎮衛京前後左右上下軍輔國冠軍龍驤虎牙大將軍營各配兵二千皆以諸子為之置左右司𨽻各領戶二十餘萬萬户置一內史凡內史四十三單于左右輔各主六夷十萬落萬落置一都尉省吏部置左右選曹尚書自司𨽻以下六官皆位次僕射置御史大夫及州牧位皆亞公以其子粲為丞相領大將軍録尚書事進封晉王食五郡劉延年録尚書六條事劉景為太師王育為太傅任顗為太保馬景為大司徒朱紀為大司空劉曜為大司馬曜復次渭汭趙染次新豐索綝自長安東討染染狃于纍捷有輕綝之色長史魯徽曰今司馬鄴君臣自以逼僭王畿雄劣不同必致死距我將軍宜整陳案兵以擊之弗可輕也困獸猶鬪況於國乎染曰以司馬模之強吾取之如拉朽索綝小豎豈能汚吾馬蹄刀刃邪要擒之而後食晨率精騎數百馳出逆之戰于城西敗績而歸悔曰吾不用魯徽之言以至於此何面見之於是斬徽徽臨刑謂染曰將軍愎諫違謀戇而取敗而復忌前害勝誅戮忠良以逞愚忿亦何顏面瞬息世間哉袁紹為之於前將軍踵之於後覆亡敗喪亦當相尋所恨不得一見大司馬而死死者無知則已若其有知下見田豐為徒要當訴將軍於黃泉使將軍不得服牀枕而死叱刑者曰令吾面東向大司馬曜聞之曰蹄涔不容尺鯉染之謂也曜還師攻郭默于懷城收其米粟八十萬斛列三屯以守之聰遣使謂曜曰今長安假息劉琨遊魂此國家所尤宜先除也郭默小醜何足以勞公神略可留征虜將軍貝邱王翼光守之公其還也於是曜歸蒲阪俄而徵曜輔政趙染冦北地夢魯徽大怒引弓射之染驚悸而寤旦將攻城中弩而死聰以粲為相國總百揆省丞相以并相國平陽地震烈風拔樹發屋光義人羊充妻産子二頭其兄竊而食之三日而死聰以其太廟新成大赦境內改年建元雨血於其東宫延明殿徹瓦在地者深五寸劉乂惡之以訪其太師盧志太傅崔瑋太保許遐志等曰主上往以殿下為太弟者蓋以安衆望也志在晉王久矣王公已下莫不希旨歸之相國之位自魏武已來非復人臣之官主上本發明詔置之為贈官今忽以晉王居之羽儀威尊踰於東宫萬機之事無不由之置太宰大將軍及諸王之營以為羽翼此事勢去矣殿下不得立明也然非止不得立而已不測之危厄在於旦夕宜早為之所四衛精兵不減五千餘營諸王皆年齒尚幼可奪而取之相國輕佻正可煩一刺客耳大將軍無日不出其營可襲而得也殿下但當有意二萬精兵立便可得鼓行向雲龍門宿衛之士孰不倒戈奉迎大司馬不慮為異也乂弗從乃止聰如中護軍靳凖第納其二女為左右貴嬪大曰月光小曰月華皆國色也數月立月光為皇后東宫舍人荀裕告盧志等勸乂謀反乂不從之狀聰於是收志瑋遐於詔獄假以他事殺之使冦威卜抽監守東宫禁乂朝賀乂憂懼不知所為乃上表自陳乞為黔首并免諸子之封褒美晉王粲宜登儲副抽又抑而弗通其青州刺史曹嶷攻汶陽關公邱陷之害齊郡太守徐浮執建威劉宣齊魯之間郡縣壘壁降者四十餘所嶷遂略地西下祝阿平陰衆十餘萬臨河置戍而歸于臨淄嶷於是遂有雄據全齊之志石勒以嶷之懷二也請討之聰又憚勒之并齊乃寢而弗許劉曜濟自盟津將攻河南將軍魏該奔于一泉塢曜進攻李矩于滎陽矩遣將軍李平師於成臯曜覆而滅之矩恐送質請降時聰以其皇后靳氏為上皇后立貴妃劉氏為左皇后右貴嬪靳氏為右皇后左司𨽻陳元達以三后之立也極諌聰不納乃以元達為右光祿大夫外示優賢內實奪其權也於是太尉范隆大司馬劉丹大司空呼延晏尚書令王鑒等皆抗表遜位以讓元達聰乃以元達為御史大夫儀同三司劉曜寇長安頻為王師所敗曜曰彼猶強盛弗可圖矣引師而歸聰宫中鬼夜哭二日而聲向右司𨽻寺乃止其上皇后靳氏有淫穢之行陳元達奏之聰廢靳靳慙恚自殺靳有殊寵聰迫於元達之勢故廢之既而追念其姿色深仇元達劉曜進師上黨將攻陽曲聰遣使謂曜曰長安擅命國家之深恥也公宜以長安為先陽曲一委驃騎天時人事其應至矣公其亟還曜回滅郭邁朝于聰遂如蒲阪平陽地震雨血于東宫廣袤頃餘劉曜又進軍屯于粟邑麴允飢甚去黃白而軍于靈武曜進攻上郡太守張禹與馮翊太守梁肅奔于允吾於是關右翕然所在應曜曜進據黃阜聰武庫陷入地一丈五尺時聰中常侍王沉宣懷俞容中宫僕射郭猗中黃門陵修等皆寵幸用事聰遊宴後宫或百日不出羣臣皆因沉等言事多不呈聰率以其意愛憎而決之故或有勳舊功臣而弗見敘録姦佞小人數日而便至二千石者軍旅無歲不興而將士無錢帛之賞後宫之家賜賚及於僮僕動至數千萬沉等車服宅宇皆踰於諸王子弟中表布衣為內史令長者三十餘人皆奢僭貪殘賊害良善靳凖合宗內外諂以事之郭猗有憾於劉乂謂劉粲曰太弟於主上之世猶懷不逞之志此則殿下父子之深仇四海蒼生之重怨也而主上過垂寬仁猶不替二尊之位一旦有風塵之變臣竊為殿下寒心且殿下高祖之世孫主上之嫡統凡在含齒孰不係仰萬機事大何可與人臣昨聞太弟與大將軍相見極有言矣若事成許以主上為太上皇大將軍為皇太子乂又許衛軍為大單于二王已許之矣二王居不疑之地並握重兵以此舉事事何不成臣謂二王兹舉禽獸之不若也背父親人人豈親之今又茍貪其一切之力耳事成之後主上豈有全理殿下兄弟故在忘言東宫相國單于在武陵兄弟何肯與人許以三月上已因宴作難事淹變生宜早為之所春秋傳曰蔓草猶不可除况君之寵弟乎臣屢啓主上主上性敦友于謂臣言不實刑臣刀鋸之餘而蒙主上殿下成造之恩故不慮逆鱗之誅每所聞必言冀垂採納臣當入言之願殿下不泄密表其狀也若不信臣言可呼大將軍從事中郎王皮衛軍司馬劉惇假之恩顧通其歸善之路以問之必可知也粲深然之猗密謂皮惇曰二王逆狀王相已具知之矣卿同之乎二人驚曰無之猗曰此事必無疑吾憐卿親舊并見族耳於是歔欷流涕皮惇大懼叩頭求哀猗曰吾為卿作計卿能用不二人皆曰謹奉大人之教猗曰相國必問卿卿但云有之若責卿何不先啓卿即答云臣誠負死罪然仰惟主上聖性寬慈殿下篤於骨肉恐言成注偽故也皮惇許諾粲俄而召問二人至不同時而辭若畫一粲以為信然初靳凖從妹為乂孺子淫于侍人乂怒殺之而屢以嘲凖凖深慙恚説粲曰東宫萬機之副殿下宜自居之以領相國使天下知早有所繫望也至是凖又説粲曰昔孝成距子政之言使王氏卒成篡逆可乎粲曰何可之有凖曰然誠如聖旨下官亟欲有所言矣但以德非更生親非皇宗恐忠言暫出霜威已及故不敢耳粲曰君但言之凖曰聞風塵之言謂大將軍衛將軍及左右輔皆謀奉太弟剋季春構變殿下宜為之備不然恐有商臣之禍粲曰為之奈何凖曰主上愛信於太弟恐卒聞未必信也如下官愚意宜緩東宫之禁固勿絶太弟賓客使輕薄之徒得與交遊太弟既素好待士必不思防此嫌輕薄小人不能無逆意以勸太弟之心小人有始無終不能如貫高之流也然後下官為殿下露表其罪殿下與太宰拘太弟所與交通者考問之窮其事原主上必以無將之罪罪之不然今朝望多歸太弟主上一旦晏駕恐殿下不得立矣於是粲命卜抽引兵去東宫聰自去冬至是遂不復受朝賀軍國之事一決於粲唯發中旨殺生除授王沉郭猗等意所欲皆從之又立市於後庭與宫人宴戲或三日不醒聰臨上秋閣誅其特進綦母達太中大夫公師彧尚書王琰田歆少府陳休左衛卜崇大司農朱誕等皆羣閹所忌也侍中卜幹泣諌聰曰陛下方隆武宣之化欲使幽谷無考槃奈何一旦先誅忠良將何以垂之於後昔秦愛三良而殺之君子知其不霸以晉厲之無道尸三卿之後猶有不忍之心陛下如何忽信左右愛憎之言欲一日尸七卿詔尚在臣間猶未宣露乞垂昊天之澤回雷霆之威且陛下直欲誅之耳不露其罪名何以示四海此豈是帝王三訊之法邪因叩頭流血王沈叱幹曰卜侍中欲距詔乎聰拂衣而入免幹為庶人太宰劉易及大將軍劉敷御史大夫陳元達金紫光祿大夫王延等詣闕諌曰臣聞善人者乾坤之紀政教之本也邪佞者宇宙之螟螣王化之蟊賊也故文王以多士基周桓靈以羣閹亡漢國之興亡未有不由此也自古明王之世未嘗有宦者與政武元安順豈足為故事乎今王沉等處常伯之位矯弄詔旨欺誣日月威權之重侔於人主多樹姦徒殘毒忠善知王琰等忠臣必盡節於陛下懼其姦萌發露陷之極刑四海悲惋賢愚傷懼比年地震日蝕雨血火災皆沉等之由願陛下割翦凶醜免沈等官付有司定罪聰以表示沈等笑曰是兒等為元達所引遂成癡也寢之沈等頓首泣曰臣等小人過蒙陛下識拔幸得備灑掃宫閣而王公朝士疾臣等如仇讎又深恨陛下願收大造之恩以臣等膏之鼎鑊皇朝上下自然雍穆矣聰曰此等狂言恆然卿復何足恨乎更以訪粲粲盛稱沈等忠清乃心王室聰大悅封沈等為列侯太宰劉易詣闕又上疏固諌聰大怒手壞其表易遂忿恚而死元達哭之慟曰人之云亡邦國殄悴吾既不復能言安用此默默生乎歸而自殺北地飢甚人相食噉羌酋大軍須運糧以給麴昌劉雅擊敗之麴允與劉曜戰于磻石谷王師敗績允奔靈武平陽大飢流叛死亡十有五六石勒遣石越率騎二萬屯于并州以懷撫叛者聰使黃門侍郎喬詩讓勒勒不奉命潛結曹嶷規為鼎峙之勢聰立上皇后樊氏即張氏之侍婢也時四后之外佩皇后璽綬者七人朝廷內外無復綱紀阿諛日進貨賄公行軍旅在外飢疫相仍後宫賞賜動至千萬劉敷屢泣言之聰不納怒曰爾欲得使汝公死乎朝朝夕夕生來哭人敷憂忿發病而死河東大蝗唯不食黍豆靳凖率部人收而埋之哭聲聞於十餘里後乃鑽土飛出復食黍豆平陽飢甚司𨽻部人奔于冀州二十萬戶石越招之故也犬與豕交于相國府門又交于宫門又交司𨽻御史門有豕著進賢冠升聰坐犬冠武冠帶綬與豕並升俄而鬪死殿上宿衛莫有見其入者而聰昏虐愈甚無誡懼之心宴羣臣于光極前殿引見其太弟乂容貌毀悴鬢髮蒼然涕泣陳謝聰亦對之悲慟縱酒極歡待之如初劉曜陷長安外城愍帝使侍中宋敞送箋于曜帝肉袒牽羊輿櫬銜璧出降及至平陽聰以帝為光祿大夫懷安侯使粲告于太廟大赦境內改年麟嘉麴允自殺聰東宫四門無故自壞後內史女人化為文夫時聰子約死一指猶暖遂不殯殮及蘇言見淵於不周山經五日遂復從至昆崘山三日而復返於不周見諸王公卿將相死者悉在宫室甚壯麗號曰蒙珠離國淵謂約曰東北有遮須夷國無主久待汝父為之汝父後三年當來來後國中大亂相殺害吾家死亡略盡但可永明輩十數人在耳汝且還後年當來見汝不久約拜辭而歸道遇一國曰猗尼渠餘國引約入宫與約皮囊一枚曰為吾遺漢皇帝約辭而歸謂約曰劉郎後年來必見過當以小女相妻約歸置皮囊於几上俄而蘇使左右几上取皮囊開之有一方白玉題文曰猗尼渠餘國天王敬信遮須夷國天王歲在攝提當相見也馳使呈聰聰曰若審如此吾不懼死也及聰死與此玉并葬焉時東宫鬼哭赤虹經天南有一岐三日並照各有兩珥五色甚鮮客星歷紫宫入於天獄而滅太史令康相言於聰曰蛇虹見彌天一岐南徹三日並照客星入紫宫此皆大異其徵不逺也今虹達東西者許洛已南不可圖也一岐南徹者李氏當仍跨巴蜀司馬睿終據全吳之象天下其三分乎月為胡王皇漢雖苞括二京龍騰九五然世雄燕代肇基北朔太陰之變其在漢域乎漢既據中原歷命所屬紫宫之異亦不在他此之深重胡可盡言石勒鴟視趙魏曹嶷狼顧東齊鮮卑之衆星布燕代齊代燕趙皆有將大之氣願陛下以東夏為慮勿顧西南吳蜀之不能北侵猶大漢之不能南向也今京師寡弱勒衆精盛若盡趙魏之鋭燕之突騎自上黨而來曹嶷率三齊之衆以繼之陛下將何以抗之紫宫之變何必不在此乎願陛下早為之所無使兆人生心陛下誠能發詔外以逺追秦皇漢武循海之事內為高帝圖楚之計無不克矣聰覽之不悅劉粲使王平謂劉乂曰適奉中詔云京師將有變勑𠂻甲以備之乂以為信然令命宫臣𠂻甲以居粲馳遣告靳凖王沉等曰向也王平告云東宫陰備非常將若之何凖白之聰大驚曰豈有此乎王沉等同聲曰臣等久聞但恐言之陛下弗信於是使粲圍東宫粲遣沉凖收氐羌酋長十餘人窮問之皆懸首高格燒鐡灼目乃自誣與乂同造逆謀聰謂沉等言曰而今而後吾知卿等忠於朕也當念為知無不言勿恨往日言不用也於是誅乂素所親厚大臣及東宫官屬數十人皆靳凖及閹豎所怨也廢乂為北部王粲使凖賊殺之坑士衆萬五千餘人平陽街巷為之空氐羌叛者十餘萬落以靳凖行車騎大將軍以討之時聰境內大蝗平陽冀雍尤甚靳凖討之震其二子而死河汾大溢漂沒千餘家東宫災門閣宫殿蕩然立粲為皇太子大赦殊死已下以粲領相國大單于總攝朝政如前聰校獵上林以帝行車騎將軍戎服執戟前導行三驅之禮粲言於聰曰今司馬氏跨據江東趙固李矩同逆相濟興兵聚衆者皆以子鄴為名不如除之以絶其望聰然之趙固郭默攻其河東至於絳邑右司𨽻部人盜牧馬負妻子奔之者三萬餘騎騎兵將軍劉勳追討之殺萬餘人固默引歸劉頡遮邀擊之為固所敗使粲及劉雅等伐趙固次于小平津固揚言曰要當生縳劉粲以贖天子聰聞而惡之李矩使郭默郭誦救趙固屯于洛汭遣耿稚張皮潛濟襲粲貝邱王翼光自釐城覘之以告粲粲曰征東南渡趙固望聲逃竄彼方憂自固何暇來邪且聞上身在此自當不敢北視況敢濟乎不須驚動將士也是夜稚等襲敗粲軍粲奔據陽鄉稚館穀粲壘雅聞而馳還柵于壘外與稚相持聰聞粲敗使太尉范隆率騎赴之稚等懼率衆五千突圍趨北山而南劉勳追之戰于河陽稚師大敗死者三千五百人投河死者千餘人聰所居螽斯則百堂災焚其子會稽王𠂻已下二十有一人聰聞之自投於牀哀塞氣絶良久乃蘇平陽西明門社自亡霍山崩署其驃騎大將軍濟南王劉驥為大將軍都督中外諸軍事録尚書衛大將軍齊王劉勱為大司徒中常侍王沉養女年十四有妙色聰立為左皇后尚書令王鑒中書監崔懿之中書令曹恂等諌曰臣聞王者之立后也將以上配乾坤之性象二儀敷育之義生承宗廟母臨天下亡配后土執饋皇姑必擇世德名宗幽間淑令副四海之望稱神祗之心是故周文造舟姒氏以興關雎之化饗則百世之祚永孝成任心縱欲以婢為后使皇統亡絶社稷淪傾有周之隆既如彼矣大漢之禍又如此矣從麟嘉以來亂於淫色縱沉之弟女刑餘小醜猶不可塵瓊寢汙清廟况其家婢邪六宫妃嬪皆公子公孫奈何一旦以婢主之何異象榱玉簀而對腐木朽楹哉臣恐無福於國家也聰覽之大怒使宣懷謂粲曰鑒等小子慢侮國家狂言自口無復君臣上下之禮其速考竟於是收鑒等送市金紫光祿大夫王延馳將入諌門者弗通鑒等臨刑王沉以杖叩之曰庸奴復能為惡乎乃公何與汝事鑒瞋目叱之曰豎子使皇漢滅者坐汝鼠輩與靳凖耳要當訴汝於先帝取汝等於地下懿之曰靳凖梟聲鏡形必為國患汝既食人人亦當食汝皆斬之聰又立其中常侍宣懷養女為中皇后鬼哭於光極殿又哭於建始殿雨血平陽廣袤十里時聰子約已死至是晝見聰甚惡之謂粲曰吾寢疾惙頓怪異特甚往以約之言為妖比纍日見之此兒必來迎吾也何圖人死定有神靈如是吾不悲死也今世難未夷非諒暗之日朝終夕殮旬內而葬徵劉曜為丞相録尚書輔政固辭乃止仍以劉景為太宰劉驥為大司馬劉顗為太師朱紀為太傅呼延晏為太保並録尚書事范隆守尚書令儀同三司靳凖為大司空領司𨽻校尉皆送決尚書奏事太興元年聰死在位九年偽諡曰昭武皇帝廟號烈宗粲字士光少而俊傑才兼文武自為宰相威福任情疏逺忠賢昵近姦佞任性嚴刻無恩惠距諌飾非好興造宫室相國之府仿像紫宫在位無幾作兼晝夜飢困窮叛死亡相繼粲弗之恤也既嗣偽位尊聰后靳氏為皇太后樊氏號𢎞道皇后宣氏號𢎞德皇后王氏號𢎞孝皇后靳等年皆未滿二十並國色也粲晨夜蒸淫於內志不在哀立其妻靳氏為皇后子元公為太子大赦境內改元漢昌雨血于平陽靳凖將有異謀私於粲曰如聞諸公將欲行伊尹霍光之事謀先誅太保及臣以大司馬統萬機陛下若不先之臣恐禍之來也不晨則夕粲弗納凖懼其言之不從謂聰二靳氏曰今諸公侯欲廢帝立濟南王恐吾家無復種矣盍言之於帝二靳承間言之粲誅其太宰上洛王劉景太師昌國公劉顗大司馬濟南王驥大司徒齊王劉勱等太傅朱紀大尉范隆出奔長安又誅其車騎大將軍吳王劉逞驥母弟也粲大閲上林謀討石勒以靳凖為大將軍録尚書事粲荒耽酒色遊宴後庭軍國之事一決於凖凖矯粲命以從弟明為車騎將軍康為衛將軍凖將作亂以金紫光録大夫王延耆德時望謀之于延延弗從馳將告之遇靳康劫延以歸凖勒兵入宫升其光極前殿下使甲士執粲數而殺之劉氏男女無少長皆斬于東市發掘淵聰墓焚燒其宗廟鬼大哭聲聞百里凖自號大將軍漢大王置百官遣使稱藩于晉左光祿劉雅出奔西平尚書北宫純胡嵩等招集晉人堡於東宫靳康攻滅之凖將以王延為左光祿延罵曰屠各逆奴何不速殺我以吾左目置西陽門觀相國之入也右目置建春門觀大將軍之入也凖怒殺之劉曜字永明劉淵之族子也少孤見養於淵幼而聰慧有竒度年八歲從淵獵于西山遇雨止樹下迅雷震樹旁人莫不顛仆曜神色自若淵異之曰此吾家千里駒也從兄為不亡矣身長九尺三寸垂手過膝生而眉白目有赤光須髯不過百餘根而皆長五尺性拓落高亮與衆不羣讀書志於廣覽不精思章句善屬文工草𨽻雄武過人鐡厚一寸射而洞之于時號為神射尤好兵書略皆暗誦常輕侮吳鄧而自比樂毅蕭曹時人莫之許也惟聰每曰永明世祖魏武之流數公何足道哉弱冠遊于洛陽坐事當誅亡匿朝鮮遇赦而歸自以形質異衆恐不容于世隱迹管涔山以琴書為事嘗夜間居有二童子入跪曰管涔王使小臣奉謁趙皇帝獻劒一口置前再拜而去以燭視之劒長二尺光澤非常赤玉為室背上有銘云神劒御除衆毒曜遂服之劒隨四時而變為五色淵世頻歷顯職後拜相國都督中外諸軍事鎮長安靳凖之難自長安赴之至于赤壁太保呼延晏等自平陽奔之與太傅朱紀太尉范隆等上尊號曜以太興元年僭即皇帝位大赦境內惟凖一門不在赦例改元光初以朱紀領司徒呼延晏領司空范隆以下悉復本位使征北劉雅鎮北劉策次于汾陰與石勒為掎角之勢靳凖遣侍中卜泰降於勒勒囚泰送之曜謂泰曰先帝末年實亂大倫羣閹撓政誅滅忠良誠是義士匡討之秋司空執心忠烈行伊霍之權拯濟塗炭使朕及此勳高古人德格天地朕方寧濟大艱終不以非命及君子賢人司空若執忠誠早迎大駕者政由靳氏祭則寡人以朕此意布之司空宣之朝士泰還平陽具宣曜旨凖自以殺曜母兄沉吟未從尋而喬泰王騰靳康馬忠等殺凖推尚書令靳明為盟主遣卜泰奉傳國六璽降于曜曜大悅謂泰曰使朕獲此神璽而成帝王者子也石勒聞之怒甚增兵攻之明戰纍敗遣使求救於曜曜使劉雅劉䇿等迎之明率平陽士女萬五千歸于曜曜命誅明靳氏男女無少長皆死使劉雅迎母胡氏喪于平陽還葬粟邑墓號陽陵偽諡宣明皇太后僭尊高祖父亮為景皇帝尊祖父廣為獻皇帝祖防懿皇帝考曰宣成皇帝徙都長安起光世殿於前紫光殿於後立其妻羊氏為皇后子熙為皇太子封子襲為長樂王闡太原王沖淮南王敞齊王高魯王徽楚王徵諸宗室皆進封郡王繕宗廟社稷南北郊以水承晉金行國號曰趙牲牡尚黑旗幟尚元冒頓配天淵配上帝大赦境內殊死已下黃石屠各路松多起兵於新平扶風聚衆數千附于南陽王保保以其將楊曼為雍州刺史王連為扶風太守據陳倉張顗為新平太守周庸為安定太守據陰密松多下草壁秦隴氐羌多歸之曜遣其車騎劉雅平西劉厚攻楊曼于陳倉二旬不克曜率中外精鋭以赴之行次雍城太史令辨廣明言於曜曰昨夜妖星犯月師不宜行乃止勑雅等攝圍固壘以待大軍地震長安尤甚時曜妻羊氏有殊寵頗與政事陰有餘之徵也三年曜發雍攻陳倉曼連謀曰諜者適還云其五牛旗建多言胡主自來其鋒恐不可當也吾糧廩既少無以支久若頓軍城下圍人百日不待兵刃而吾自滅不如率見衆以一戰如其勝也關中不待檄而至如其敗也一等死早晚無在遂盡衆背城而陳為曜所敗王連死之楊曼奔于南氐曜進攻草壁又陷之松多奔隴城進陷安定保懼遷于桑城氐羌悉從之曜振旅歸于長安署劉雅為大司徒晉將李矩襲金墉克之曜左中郎將宋始震威宋恕降於石勒署其大將軍廣平王嶽為征東大將軍鎮洛陽會三軍疫甚嶽遂屯澠池石勒遣石生馳應宋始等軍勢甚盛曜將尹安趙慎等以洛陽降生嶽乃班師鎮于陜城西明門內大樹風吹折經一宿樹撥變為人形髮長一尺須眉長三寸皆黃白色有斂手之狀亦有兩腳著裙之形惟無目鼻每夜有聲十日而生柯條遂成大樹枝葉甚茂長水校尉尹車謀反潛結巴酋徐庫彭曜乃誅車囚庫彭等五千餘人于阿房將殺之光祿大夫遊子逺固諌曜不從子逺叩頭流血曜大怒幽子逺而盡殺庫彭等尸諸街巷之中十日乃投之於水於是巴氐盡叛推巴歸善王句渠知為主四山羌氐巴羯應之者三十餘萬關中大亂城門晝閉子逺又從獄表諌曜怒甚毀其表曰大荔奴不憂命在須臾猶敢如此嫌死晚邪叱左右速殺之劉雅朱紀呼延晏等諌曰子逺幽而尚諌者所謂忠於社稷不知死之將至陛下縱不能用奈何殺之若子逺朝誅臣等亦暮死以彰陛下過差之咎天下之人皆當去陛下蹈西海而死耳陛下復與誰居乎曜意解乃赦之於是勑內外戒嚴將親討渠知子逺進曰陛下誠能納愚臣之計者不勞大駕親動一月之中可使清定曜曰卿試言之子逺曰彼匪有大志希竊非望也但逼於陛下峻網耳今死者不可追莫若赦諸逆人之家老弱沒奚官者使迭相撫育聽其復業大赦與之更始彼生路既開不降何待若渠知自以罪重不即下者願假臣弱兵五千以為陛下梟之不敢勞陛下之將帥也不爾者今賊黨既衆彌川被谷雖以天威臨之恐非年歲可除曜大悅以子逺為車騎大將軍開府儀同三司都督雍秦征討諸軍事大赦境內子逺次于雍城降者十餘萬進軍安定氐羌悉下惟句氏宗黨五千餘家保于陰密進攻平之遂振旅循隴右陳安郊迎先是上郡氐羌十餘萬落保嶮不降酋大虛除權渠自號秦王子逺進師至其壁下權渠率衆來距五戰敗之權渠恐將降其子伊餘大言於衆曰往劉曜自來猶無若我何況此偏師而欲降之率徑卒五萬晨壓壘門左右勸戰子逺曰吾聞伊餘之勇當今無敵士馬之強復非其匹又其父新敗怒氣甚盛且西戎剽徑鋒鋭不可擬也不如緩之使氣竭而擊之乃堅壁不戰伊餘有驕色子逺候其無備夜誓衆蓐食晨大風霧子逺曰天贊我也躬先士卒掃壁而出遲明覆之生擒伊餘悉俘其衆權渠大懼被髮割面而降子逺啓曜以權渠為征西將軍西戎公分徙尹餘兄弟及其部落二十餘萬口于長安西戎之中權渠部最強皆稟其命而為冦暴權渠既降莫不歸附曜大悅宴羣臣于東堂語及平生泫然流涕遂下書褒贈新贈大司徒烈愍公崔嶽為使持節侍中大司徒遼東公中書令曹恂為大司空南郡公太子洗馬劉綏為左光祿大夫平昌公晉陽太守王忠為鎮軍將軍安平侯並加散騎常侍仍令有司班訪嶽等子孫授以茅土初曜之亡與曹恂奔於劉綏綏匿之於書匱載送於忠忠送之朝鮮歲餘飢窘變姓名客為縣卒嶽為朝鮮令見而異之推問所由曜叩頭自首流涕求哀嶽曰卿謂崔元嵩不如孫賓碩乎何懼之甚也今詔捕卿甚峻百姓間不可保也此縣幽僻勢能相濟雖有大急不過解印綬與卿俱去耳吾既門衰無兄弟之纍身又薄祐未有兒子卿猶吾子弟也勿為過憂大丈夫處身立世鳥獸投人要欲濟之而況君子乎給以衣服資供書傳曜遂從嶽質通疑滯恩顧甚厚嶽從容謂曜曰劉生姿宇神調命世之才也四海脫有微風搖之者英雄之魁卿其人矣曹恂雖於屯厄之中事曜有君臣之禮故皆德之曜立太學於長樂宫東小學於未央宫西簡百姓二十五已下十三已上神志可教者千五百人選朝賢宿儒明經篤學以教之以中書監劉均領國子祭酒置崇文祭酒秩次國子散騎侍郎董景道以明經擢為崇文祭酒以遊子逺為大司徒曜命起酆明觀立西宫建陵霄臺於滈池又將於霸陵西南營夀陵侍中喬豫和苞上疏諌曰臣伏奉詔書將營酆明觀市道芻蕘咸以非之曰一觀之功可以平涼州矣又奉勑旨復欲擬阿房而建西宫模瓊臺而起陵霄此則費萬酆明功億前役也以此功費亦可以吞吳蜀翦齊魏矣陛下何為於中興之日而蹤亡國之事自古聖王人誰無過陛下此役實為過舉貴在能改終之實難又伏聞勑旨將營建夀陵周回四里下深二十五丈以銅為棺椁黃金飾之恐此功費非國內所能辦也且臣聞堯葬榖林市不改肆顓頊葬廣陽下不及泉聖王之於終也如是秦皇下錮三泉周輪七里身亡之後毀不旋踵暗主之於終也如此向魋石椁孔子以為不如速朽王孫倮葬識者嘉其矯世自古無有不亡之國不掘之墓故聖王知厚葬之招害也故不為之臣子之於君父陵墓豈不欲高廣如山嶽哉但以保全始終安固萬世為優耳興亡奢儉冏然於前惟陛下覽之曜大悅下書悉停夀陵制度一依霸陵之法封豫為安昌子苞平輿子並領諌議大夫省酆水囿以與貧戶終南山崩長安人劉終於崩所得白玉方一尺有文字曰皇亡皇亡敗趙昌井水竭構五梁㕺酉小衰困囂喪嗚呼嗚呼赤牛奮靷其盡乎時羣臣咸賀以為勒滅之徵曜大悅齋七日而後受之於太廟大赦境內以終為奉瑞大夫中書監劉均進曰臣聞國主山川故山崩川竭君為之不舉終南京師之鎮國之所瞻無故而崩其凶焉可極言昔三代之季其災也如是今朝臣皆言祥瑞臣獨言非誠上忤聖旨下違衆議然臣不達大理竊所未同何則玉之於山石也猶君之於臣下山崩石壞象國傾人亂皇亡皇亡敗趙昌者此言皇室將為趙所敗趙因之而昌今大趙都於秦雄而勒跨全趙之地趙昌之應當在石勒不在我也井水竭構五梁者井謂東井秦之分也五謂五車梁謂大梁五車大梁趙之分也此言秦將竭滅以構成趙也㕺者歲之次名作㕺也言歲馭作㕺酉之年當有敗軍殺將之事困謂困敦歲在子之名元囂亦在子之次言歲馭於子國當喪亡赤牛奮靷謂赤奮若在丑之歲名也牛謂牽牛東北維之宿丑之分也言歲在於丑當滅亡盡無復遺也此其誡悟蒸蒸欲陛下勤修德化以禳之縱為嘉祥尚願陛下夕惕以答之書曰雖休勿休願陛下追蹤周旦盟津之美捐鄙虢公夢廟之凶謹歸沐浴以待妖言之誅曜憮然改容御史劾均狂言瞽説誣罔祥瑞請依大不敬論曜曰此之災瑞誠不可知深戒朕之不德朕收其忠惠多矣何罪之有乎曜親征氐羌仇池楊難敵率衆來距前鋒擊敗之難敵退保仇池仇池諸氐羌多降於曜曜後復西討楊韜于南安韜懼與隴西太守梁勛等降于曜皆封列侯使侍中喬豫率甲士五千遷韜等及隴右萬餘戶于長安曜又進攻仇池時曜寢疾兼癘疫甚議欲班師恐難敵躡其後乃以其尚書郎王獷為光國中郎將使于仇池以説難敵難敵於是遣使稱蕃曜大悅署難敵為使持節侍中假黃鉞都督益寧南秦涼梁巴六州隴上西域諸軍事上大將軍益寧南秦三州牧領護南氐校尉寧羌中郎將武都王子弟為公侯列將二千石者十五人陳安請朝曜以疾篤不許安怒且以曜為死也遂大掠而歸曜疾甚篤馬輿而還使其將呼延實監輜重於後陳安率精騎要之于道實奔戰無路與長史魯憑俱沒于安安囚實而謂之曰劉曜已死子誰輔哉孤當與足下終定大業實叱安曰狗輩汝荷人榮寵處不疑之地前背司馬保今復如此汝自視何如主上憂汝不久梟首上邽通衢何謂大業可速殺我懸我首於上邽東門觀大軍之入城也安怒遂殺之以魯慿為參軍又遣其弟集及將軍張明等率騎二萬追曜曜衛軍呼延瑜逆擊斬之悉俘其衆安懼馳還上邽曜至自南安陳安使其將劉烈趙罕襲􅛪城拔之西州氐羌悉從安安士馬雄盛衆十餘萬自稱使持節大都督假黃鉞大將軍雍涼秦梁四州牧涼王以趙募為相國領左長史魯慿對安大哭曰吾不忍見陳安之死也安怒命斬之慿曰死自吾分懸吾頭於秦州通衢觀趙之斬陳安也遂殺之曜聞慿死悲慟休屠王石武以桑城降曜大悅署武為使持節都督秦州隴上雜夷諸軍事平西大將軍秦州刺史封酒泉王曜后羊氏死偽諡獻文皇后羊氏內有特寵外參朝政生曜三子熙襲闡曜始禁無官者不聽乘馬祿八百石已上婦女乃得衣錦繡自季秋農功畢乃聽飲酒非宗廟社稷之祭不得殺牛犯者皆死曜臨太學引試學生之上第者拜郎中武功男子蘇撫陜男子伍長平並化為女子石言於陜若言勿東者曜將葬其父及妻親如粟邑以規度之負土為墳其下周回二里作者繼以脂燭怨呼之聲盈于道路遊子逺諌曰臣聞聖主明王忠臣孝子之於終葬也棺足周身椁足周棺藏足周椁而已不封不樹為無窮之計伏惟陛下聖慈幽被神鑒洞逺每以清儉恤下為先社稷資儲為本今二陵之費至以億計計六萬夫百日作所用六百萬功二陵皆下錮三泉上崇百尺積石為山增土為阜發掘古塜以千百數役夫呼嗟氣塞天地暴骸原野哭聲盈衢臣竊謂無益於先皇先后而徒喪國之儲力陛下脫仰尋堯舜之軌者則功不盈百萬費亦不過千計下無怨骨上無怨人先帝先后有太山之安陛下饗舜禹周公之美惟陛下察焉曜不納乃使其將劉嶽等帥騎一萬迎父及弟暉喪於太原疫氣大行死者十三四上洛男子張盧死二十七日有盜發其冢者盧得蘇曜葬其父墓號永垣陵葬妻羊氏墓號顯平陵大赦境內殊死已下賜人爵二級孤老貧病不能自存者帛各有差太寧元年陳安攻曜征西劉貢于南安休屠王石武自桑城將攻上邽以解南安之圍安聞之懼馳歸上邽遇於瓜田武以衆寡不敵奔保張春故壘安引軍追武曰叛逆胡奴要當生縛此奴然後斬劉貢武閉壘距之貢敗安後軍俘斬萬餘安馳還赴救貢逆擊敗之俄而武騎大至安衆大潰收騎八千奔于隴城貢乃留武督後衆躬先士卒戰輒敗之遂圍安于隴城大雨霖震曜父墓門屋大風飄發其父寢堂于垣外五十餘步曜避正殿素服哭于東堂五日使其鎮軍劉襲太常梁胥等繕復之松柏衆木殖已成林至是悉枯署其大司馬劉雅為太宰加劒履上殿入朝不趨讚拜不名給千兵百騎甲仗百人入殿增班劒六十人前後鼓吹各二部曜親征陳安圍安于隴城安頻出挑戰纍擊敗之斬獲八千餘級右軍劉幹攻平襄克之隴上諸縣悉降曲赦隴右殊死已下惟陳安趙募不在其例安留楊伯支薑沖兒等守隴城帥騎數百突圍而出欲引上邽平襄之衆還解隴城之圍安既出知上邽被圍平襄已敗乃南走陜中曜使其將軍平先邱中伯率徑騎追安頻戰敗之俘斬四百餘級安與壯士十餘騎於陜中格戰安左手奮七尺大刀右手執丈八蛇矛近交則刀矛俱發輒害五六逺則雙帶鞬服左右馳射而走平先亦壯健絶人勇捷如飛與安摶戰三交奪其蛇矛而退會日暮雨甚安棄馬與左右五六人步踰山嶺匿于溪澗翌日尋之遂不知所在會連雨始霽輔威呼延清尋其徑迹斬安于澗曲曜大悅安善於撫接吉凶夷險與衆同之及其死隴上歌之曰隴上壯士有陳安軀幹雖小腹中寬愛養壯士同心肝𩣘驄父馬鐡瑕鞍七尺大刀奮如湍丈八蛇矛左右盤十蕩十決無當前戰始三交失蛇矛棄我𩣘驄竄巖幽為我外援而懸頭西流之水東流河一去不還奈子何曜聞而嘉傷命樂府歌之楊伯支斬薑沖兒以隴城降宋亭斬趙募以上邽降徙秦州大姓楊薑諸族二千餘戶于長安氐羌悉下並各送質任時劉嶽與涼州刺史張茂相持于河上曜自隴長驅至西河戎卒二十八萬五千臨河列營百餘里中鐘鼓之聲沸河動地自古軍旅之盛未有斯比茂臨河諸戎皆望風奔退揚聲欲百道俱渡直至姑臧涼州大怖人無固志諸將咸欲速濟曜曰吾軍旅雖盛不踰魏武之東也畏威而來者三有二焉中軍宿衛已皆疲老不可用也張氏以吾新平陳安師徒殷盛以形聲言之非彼五郡之衆所能抗也必怖而歸命受制稱藩吾復何求卿等試之不出中旬張茂之表不至者吾為負卿矣茂懼果遣使稱藩獻馬一千五百匹牛三千頭羊十萬口黃金三百八十斤銀七百斤女妓二千人及諸珍寶珠玉方域美貨不可勝紀曜大悅使其大鴻臚田嵩署茂使持節假黃鉞侍中都督涼南北秦梁益巴漢隴右西域雜夷胸奴諸軍事太師領大司馬涼州牧領西域大都護護氐羌校尉涼王曜至自河西遣胡元增其父及妻墓高九十尺楊難敵以陳安既平內懷危懼奔于漢中鎮西劉厚追擊之獲其輜重千餘兩士女六千餘人還之仇池曜以大鴻臚田嵩為鎮南大將軍益州刺史鎮仇池以劉嶽為侍中都督中外諸軍事進封中山王初靳凖之亂曜世子允沒于黑匿郁鞠部至是允自言郁鞠大驚資給衣馬遣子送之曜對允悲慟嘉郁鞠忠款署使持節散騎常侍忠義大將軍左賢王允字義孫美姿貌善機對年十歲身長七尺五寸眉鬢如畫聰竒之謂曜曰此兒神氣豈同義真乎固當應為卿之冡嫡義真曜子儉之字也聰於是封儉為臨海王立允為曜世子允雖少離屯難流躓殊荒而風骨俊茂爽朗卓然身長八尺三寸髮與身齊多力善射驍捷如風雲曜固以重之其朝臣亦屬意焉曜於是顧謂羣下曰義孫可謂歲寒而不凋涅而不緇者矣義光雖先已樹立然沖幼懦謹恐難乎為今世之儲二也朕欲逺追周文近蹤光武於諸卿意何如其太傳呼延晏等皆贊以為然左光祿卜泰太子太保韓廣進曰昔周文以未建之前擇聖表而超樹之可也光武緣母色而廢立豈足為聖朝之模範光武誠以東海纂統何必不如明帝皇子允文武才略神度𢎞逺信獨絶一時足以擬蹤周發然太子孝友仁慈志尚沖雅亦足以堂負聖基為承平之賢主何況儲宫者六合人神所繫望也不可輕以廢易陛下誠實爾者臣等有死而已未敢奉詔曜默然允前泣曰慈父之於子也當務存尸鳩之仁何可替熙而立臣也陛下謬恩乃爾者臣請死於此以明赤心且陛下若愛忘其醜以臣微堪指授亦當能輔導義光仰遵聖軌因歔欷流涕悲感朝臣曜亦以太子羊氏所生羊有寵哀之不忍廢乃止追諡前妻卜氏為元悼皇后允之母也卜泰允之舅曜嘉之拜上光祿大夫儀同三司領太子太傅封允為永安王署侍中衛大將軍都督二宫禁衛諸軍事開府儀同三司録尚書事領太子太傅號曰皇子命熙於允盡家人之禮時有鳯皇將五子翔於故未央殿五日悲鳴不食皆死曜立后劉氏石勒將石他自鴈門出上郡襲安國將軍北羌王盆句除俘三千餘落獲牛馬羊百餘萬而歸曜大怒投袂而起是日次于渭城遣劉嶽追之曜次于富平為嶽聲援嶽及石他戰于河濵敗之斬他及其甲士一千五百級赴河死者五千餘人悉收所虜振旅而歸楊難敵自漢中還襲仇池克之執田嵩立之於前難敵左右叱嵩令拜嵩瞋目叱之曰氐狗安有天子牧伯而向賊拜乎難敵曰子岱吾當與子終定大事子謂劉氏可為盡忠吾獨不可乎嵩厲色大言曰若賊氐奴才安敢欲希覬非分吾寧為國家鬼豈可為汝臣何不速殺我顧排一人取其劒前刺難敵不中為難敵所殺曜遣劉嶽攻石生于洛陽配以近郡甲士五千宿衛精卒一萬濟自盟津鎮東呼延謨率荆司之衆自崤澠而東嶽攻石勒盟津石梁二戍克之斬獲五千餘級進圍石生于金墉石虎率步騎四萬入自成臯關嶽陳兵以待之戰于洛西嶽師敗績嶽中流矢退保石梁虎遂塹柵列圍遏絶內外嶽衆飢甚殺馬食之虎又敗呼延謨斬之曜親率軍援嶽虎率騎三萬來距曜前軍劉黑大敗虎將石忩于八特坂曜次于金谷夜無故大驚軍中潰散乃退如澠池夜中又驚士卒奔潰遂歸長安虎執劉嶽及其將王騰等八十餘人并氐羌三千餘人送于襄國坑士卒一萬六千曜至自澠池素服郊哭七日乃入城武功豕生犬上邽馬生牛及諸妖變不可勝記曜命其公卿各舉博識直言之士一人司空劉均舉參軍臺産曜親臨東堂遣中黃門策問之産極言其故曜覽而嘉之引見東堂訪以政事産流涕歔欷具陳災變之禍政化之闕辭旨諒直曜改容禮之即拜博士祭酒諌議大夫領太史令其後所言皆驗曜彌重之歲中三遷歷位尚書光祿大夫太子少師位特進曜署劉允為大司馬進封南陽王以漢陽諸郡十三為國置單于臺于渭城拜大單于置左右賢王已下皆以胡羯鮮卑氐羌豪桀為之曜自還長安憤恚發病至是疾瘳曲赦長安殊死已下署其汝南王劉咸為太尉録尚書事光祿大夫劉綏為大司徒卜泰為大司空曜妻劉氏疾甚曜親省臨之問其所欲言劉泣曰妾叔父昶無子妾少養於叔恩撫甚隆無以報德願陛下貴之妾叔皚女芳有德色願備後宫曜許之言終而死偽諡獻烈皇后以劉昶為使持節侍中大司徒録尚書事進封河南郡公封昶妻張氏為慈鄉君立劉皚女芳為皇后追念劉氏之言也俄署驃騎劉述為大司徒劉昶為太保召公卿已下子弟有勇幹者為親御郎被甲乘鎧馬動止自隨以充折衝之任尚書郝述都水使者支當等固諌曜大怒鴆而殺之咸和三年曜夢三人金面丹脣東向逡巡不言而退曜拜而履其迹旦召公卿已下議之朝臣咸賀以為吉祥惟太史令任義進曰三者厯運統之極也東為震位王者之始次也金為兑位物衰落也脣丹不言事之畢也逡巡揖讓退舍之道也為之拜者屈伏於人也履迹而行慎不出疆也東井秦分也五車趙分也秦兵必暴起亡主喪師留敗趙地逺至三年近七百日其應不逺願陛下思而防之曜大懼於是躬親二郊飾繕神祠望秩山川靡不周及大赦殊死已下復百姓租稅之半長安自春不雨至於五月曜遣其武衛劉朗率騎三萬襲楊難敵于仇池弗克掠三千餘戶而歸張駿聞曜軍為石氏所敗乃去曜官號復稱晉大將軍涼州牧遣金城太守張閬及枹罕護軍辛晏將軍韓璞等率衆數萬人自大夏攻掠秦州諸郡曜遣劉允率步騎四萬擊之夾洮相持七十餘日冠軍呼延那雞率親御郎二千騎絶其運路允濟師逼之璞軍大潰奔還涼州允追之及于令居斬級二萬張閬辛晏率衆數萬降于曜皆拜將軍封列侯石勒遣石虎率衆四萬自軹關西入伐曜河東應之者五十餘縣進攻蒲坂曜將東救蒲坂懼張駿楊難敵承虛襲長安遣其河間王述發氐羌之衆屯于秦州曜盡中外精鋭水陸赴之自衛關北濟虎懼引師而退追之及于高候大戰敗之斬其將軍石瞻枕尸二百餘里收其資仗億計虎奔于朝歌曜遂濟自太陽攻石生于金墉決千金堨以灌之曜不撫士衆專與嬖臣飲博左右或諌曜怒以為妖言斬之大風拔樹昏霧四塞聞虎進據石門續知勒自率大衆已濟始議增滎陽戍杜黃馬關俄而洛水候者與勒前鋒交戰擒羯送之曜問曰大胡自來邪其衆大小復如何羯曰大胡自來軍盛不可當也曜色變使攝金墉之圍陳于洛西南北十餘里曜少而淫酒末年尤甚勒至曜將戰飲酒數斗常乘赤馬無故局頓乃乘小馬比出復飲酒斗餘至于西陽門撝陳就平勒將石堪因而乘之師遂大潰曜昏醉奔退馬陷石渠墜于氷上被瘡十餘通中者三為堪所執送于勒所曜曰石王憶重門之盟不勒使徐光謂曜曰今日之事天使其然復云何邪幽曜于河南丞廨使金瘡醫李永療之歸于襄國曜瘡甚勒載以馬輿使李永與同載北苑市三老孫機上禮求見曜勒許之機進酒于曜曰僕谷王關右稱帝皇當持重保土強輕用兵敗洛陽祚運窮天所亡開大分持一觴曜曰何以健邪當為翁飲勒聞之悽然改容曰亡國之人足令老叟數之舍曜于襄國永豐小城給其妓妾嚴兵圍守遣劉嶽劉震等乘馬從男女衣帢以見曜曜曰久謂卿等為灰土石王仁厚全宥至今而我殺石他負盟之甚今日之禍自其分耳留宴終日而去勒諭曜與其太子熙書令速降之曜但勑熙與諸大臣匡維社稷勿以吾易意也勒覽而惡之後為勒所殺熙及劉允劉咸等議西保秦州尚書胡勳曰今雖喪主國尚全完將士情一未有離叛可共并力距險走未晚也允不從怒其沮衆斬之遂率百官奔于上邽劉厚劉䇿皆捐鎮奔之關中擾亂將軍蔣英辛恕擁衆數十萬據長安遣使招勒勒遣石生率洛陽之衆以赴之允及劉遵率衆數萬自上邽將攻石生于長安隴東武都安定新平北地扶風始平諸郡戎夏皆起兵應允允次于仲橋石生固守長安勒使石虎率騎二萬距允戰於義渠為虎所敗死者五千餘人允奔上邽虎乘勝追戰枕尸千里上邽潰虎執其偽太子熙南陽王劉允并將相諸王等及其諸卿校公侯已下三千餘人皆殺之徙其臺省文武關東流人秦雍大族九千餘人于襄國又坑其王公等及五郡屠各五千餘人于洛陽曜在位十年而敗始劉淵以懷帝永嘉四年僭位至曜三世凡二十有七載以成帝咸和四年滅劉宣字士則朴鈍少言好學修潔師事樂安孫炎沉精積思不捨晝夜好毛詩左氏傳炎每歎之曰宣若遇漢武當踰於金日磾也學成而返不出門閭蓋數年每讀漢書至蕭何鄧禹傳未曽不反覆詠之曰大丈夫若遭二祖終不令兩公獨擅美於前矣并州刺史王廣言之於武帝帝召見嘉其占對因曰吾未見宣謂廣言虛耳今見其進止風儀真所謂如圭如璋觀其性質足能撫集本部乃以宣為右部都尉特給赤幢曲蓋蒞官清恪所部懷之淵即王位宣之謀也故特荷尊重勳戚莫二軍國內外靡不專之陳元達字長宏後部人也本姓高以生月妨父故改云陳少而孤貧常躬耕兼誦書樂道行詠欣欣如也至年四十不與人交通劉淵之為左賢王聞而招之元達不答及淵僭號人謂元達曰往劉公相屈君蔑而不顧今稱號龍飛君其懼乎元達笑曰是何言邪彼人姿度卓犖有籠羅宇宙之志吾固知之久矣然往日所以不往者以期運未至不能無事喧喧彼自有以亮吾矣卿但識之吾恐不過二三日驛書必至其暮淵果徵元達為黃門郎人曰君殆聖乎既至引見淵曰卿若早來豈為郎官而已元達曰臣惟性之有分盈分者巔臣若早叩天門者恐大王賜處於九卿納言之間此則非臣之分臣將何以堪之是以抑情盤桓待分而至大王無過授之謗小臣免招冦之禍不亦可乎淵大悅在位忠謇屢進讜言退而削草雖子弟莫得而知也聰每謂元達曰卿當畏朕反使朕畏卿乎元達叩頭謝曰臣聞師臣者王友臣者霸臣誠愚暗無可採也幸邀陛下垂齊桓納九九之義故使微臣得盡愚忠昔世宗遙可汲黯之奏故能恢隆漢道桀紂誅諌幽厲弭謗是以三代之亡也忽然陛下以大聖應期挺不世之量能逺捐商周覆國乏弊近模孝武光漢之美則天下幸甚羣臣知勉及其死也人盡寃之通志卷一百八十六
