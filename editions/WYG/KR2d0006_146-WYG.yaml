body:
  text: 通志卷一百二十四下宋右廸功郎鄭樵漁仲撰列傳第三十七下江統字應元陳留圉人也祖㽔以義行稱為譙郡太守封亢父男父祚南安太守統靜黙有遠志時人為之語曰嶷然稀言江應元與鄉人蔡克俱知名襲父爵除山隂令時關隴屢為氐𦍑所擾孟觀西討日擒氐帥齊萬年統深惟四夷亂華宜杜其萌乃作徙戎論其辭曰夫夷蠻戎狄謂之四海九服之制地在要荒春秋之義内諸夏而外夷狄以其言語不通贄幣不同法俗詭異種類乖殊或居絶域之外山河之表崎嶇川谷阻險之地與中國壤斷土隔不相侵涉賦役不及正朔不加故曰天子有道守在四夷禹平九土而西戎即叙其性氣貪婪凶悍不仁四夷之中戎狄為甚弱則畏服彊則侵叛雖有賢聖之世大德之君咸未能以通化率導而以恩德柔懷也當其彊也以殷之高宗而憊於鬼方有周文王而患昆夷獫狁髙祖困於白登孝文軍於霸上及其弱也周公來九譯之貢中宗納單于之朝以元成之微而猶四夷賔服此其已然之效也故匈奴求守邊塞而侯應陳其不可單于屈膝未央望之議以不臣是以有道之君牧夷狄也惟以待之有備禦之有常雖稽顙執贄而邊城不弛固守為寇賊彊暴而兵甲不加遠征期令境内獲安疆埸不侵而已及至周室失統諸侯專征以大兼小轉相殘滅封疆不固而利害異心戎狄乘間得入中國或招誘安撫以為已用故申繒之禍顛覆宗周襄公要秦遽興羌戎當春秋時義渠大荔居秦晉之域陸渾陰戎處伊洛之間鄋瞞之屬害及濟東侵入齊宋陵虐邢衞南夷與北狄交侵中國不絶若綫齊桓攘之存亡繼絶北伐山戎以開燕路故仲尼稱管仲之力嘉左衽之功逮至春秋之末戰國方盛楚吞蠻氏晉翦陸渾趙武胡服開榆中之地秦雄咸陽減義渠之等始皇之并天下也南兼百越北走匈奴五嶺長城戎卒億計雖師役煩殷冦賊横暴然一世之功戎虜奔却當時中國無復四夷也漢興而都長安關中之郡號曰三輔禹貢雍州宗周豐鎬之舊也及至王莽之敗赤眉因之西都荒毁百姓流亡建武中以馬援領隴西太守討叛羌徙其餘種於關中居馮翊河東空地而與華人雜處數歳之後族類蕃息旣恃其肥彊且苦漢人侵之永初之元騎都尉王𢎞使西域發調羌氐以為行衞於是羣羌奔駭互相扇動二州之戎一時俱發覆沒將守屠破城邑鄧騭之征棄甲委兵輿尸喪師前後相繼諸戎遂熾至於南入蜀漢東掠趙魏唐突軹關侵及河内及遣北軍中候朱寵將五營士於孟津距羌十年之中夷夏俱斃任尚馬賢僅乃克之此所以為害深重累年不定者雖由禦者之無方將非其才亦豈不以寇發心腹害起肘腋疢篤難療瘡大遲愈之故哉自此之後餘燼不盡小有際會輙復侵叛馬賢狃忕終於覆敗叚熲臨衝自西征東雍州之戎常為國患中世之冦惟此為大漢末之亂關中殘滅魏興之初與蜀分隔疆場之戎一彼一此魏武皇帝令將軍夏侯妙才討叛氐阿貴千萬等後因㧞棄漢中徙武都之種於秦川欲以弱冦疆國扞禦蜀虜此權宜之計一時之勢非所以為萬世之利也今者當之已受其弊矣夫關中土沃物豐厥田上上加以涇渭之流漑其舄鹵鄭國白渠灌浸相通黍稷之饒畝號一鍾百姓謠詠其殷實帝王之都每以為居未聞戎狄宜在此土也非我族類其心必異戎狄志態不與華同而因其衰弊遷之畿服士庶翫習侮其輕弱使其怨恨之氣毒於骨髓至於蕃育衆盛則坐生其心以貪悍之性挾憤怒之情候隙乘便輙為横逆而居封域之内無障塞之隔掩不備之人收散野之積故能為禍蔓滋暴害不測此必然之勢已騐之事也當今之宜宜及兵威方盛衆事未罷徙馮翊北地新平安定界内諸羌著先零罕开析支之地徙扶風始平京兆之氐出還隴右著陰平武都之界廪其道路之糧令足自致各附夲種反其舊土使屬國撫夷就安集之戎晉不雜各得其所上合往古即叙之義下為盛世永久之規縱有猾夏之心風塵之警則絶遠中國隔閡山河雖為冦暴所害不廣是以充國子明能以數萬之衆制羣羌之命有征無戰全軍獨尅雖有謀謨深計廟勝遠圖豈不以華夷異處戎夏區别要塞易守之故得成其功也哉難者曰方今關中之禍暴兵二載征戌之勞老師十萬水旱之害荐饑累荒疫癘之災札瘥天昏凶逆旣戮悔惡初附且款且畏咸懷危懼百姓愁苦異人同慮望寜息之有期若枯旱之思雨露誠宜鎮之以安豫而子方欲作役起徒興功造事使疲悴之衆徙自猜之冦以無榖之人遷乏食之虜恐勢盡力屈緒業不卒羌戎離㪚心不可一前害未及弭而後變復横出矣答曰羌戎狡猾擅相號署攻城野戰傷害牧守連兵聚衆載離寒暑矣而今異類瓦解同種土崩老幼繫虜丁壯降散禽離獸迸不能相一子以此等為尚挾餘資悔惡反善懷我德恵而來柔附乎將勢窮道盡智力俱困懼我兵誅以至於此乎曰無有餘力勢窮道盡故也然則我能制其短長之命而令其進退由已矣夫樂其業者不易事安其居者無遷志方其自疑危懼畏怖促遽故可制以兵威使之左右無違也迨其死亡散流離逿未鳩與關中之人户皆為讎故可遐遷遠處令其心不懷土也夫聖賢之謀事也為之於未有理之於未亂道不著而平德不顯而成其次則能轉禍為福因敗為功值困必濟遇否能通今子遭弊事之終而不圖更制之始愛易轍之勤而得覆車之軌何哉且關中之人百餘萬口率其少多戎狄居半處之與遷必須口實若有窮乏糝粒不繼者故當傾關中之榖以全其生生之計必無擠於溝壑而不為侵掠之害也今我遷之傳食而至附其種族自使相贍而秦地之人得其半榖此為濟行者以廪糧遺居者以積倉寛關中之逼去盜賊之原除旦夕之損建終年之益若憚蹔舉之小勞而忘永逸之𢎞策惜日月之煩費而遺累世之寇敵非所謂能開物成務創業􅂷統崇基拓跡謀及子孫者也并州之胡本實匈奴桀惡之寇也漢宣之世凍餒殘破國内五裂後合為二呼韓邪遂衰弱孤危不能自存依阻塞下委質柔服建武中南單于復求降附遂令入塞居於漠南數世之後亦輙叛戾故何熙梁覲戎車屢征中平中以黄巾賊起發調其兵部衆不從而殺羌渠由是於彌扶羅求助於漢以討其賊仍值世喪亂遂乘釁而作鹵掠趙魏寇至河南建安中又使右賢王去卑誘質呼厨泉聽其部落散居六郡咸熙之際以一部大彊分為三率泰始之初又增為四於是劉猛内叛連結外虜近者郝散之變發於榖遠今五部之衆戸至數萬人口之盛過於西戎然其天性驍勇弓馬便利倍於氐羌若有不虞風塵之慮則并州之域可為寒心滎陽句驪本居遼東塞外正始中幽州刺史毌邱儉伐其叛者徙其餘種始徙之時戸落百數子孫孳息今以千計數世之後必至殷熾今百姓失職猶或亡叛犬馬肥充則有噬齧況於夷狄能不為變但顧其微弱勢力不停耳夫為邦者患不在貧而在不均憂不在寡而在不安以四海之廣士庶之富豈須夷虜在内然後取足哉此等皆可申諭發遣還其本域慰彼羇旅懷土之思釋我華夏纎介之憂惠此中國以綏四方德施永世於計為長帝不能用未及十年而夷狄亂華時人服其深識遷中郎選司以統叔父春為宜春令統因上疏曰故事父祖與官職同名皆得改選而未有身與官職同名不改選之例臣以為父祖改選者蓋為臣子開地不為父祖之身也而身名所加亦施於臣子佐吏係屬朝夕從事官位之號發言所稱若指實而語則違經禮諱尊之議若詭辭避廻則為廢官擅犯憲制今以四海之廣職位之衆名號繁多士人殷富至使有受寵皇朝出身宰牧而令佐吏不得表其官稱子孫不得言其位號所以上嚴君父下為臣子體例不通若易私名以避官職則違春秋不奪人親之義臣以為身名與官職同者宜與觸父祖名為比體例既全於義為𢎞朝廷從之轉太子洗馬在東宫累年甚被親禮太子頗闕朝覲奢廢過度多諸禁忌統上書諌曰臣聞古之為臣者進思盡忠退思補過獻可替否拾遺補闕是以人主得以舉無失行言無口過德音發聞揚名後世臣等不逮無能云補思竭愚誠謹陳五事如左惟䝉一省再省少􅂷察納其一曰六行之義以孝為首虞舜之德以孝為稱故太子以朝夕視君膳為職左右就飬無方文王之為世子可謂篤於事親者也故能擅三代之羙為百王之宗自頃聖體屢有疾患數闕朝侍遠近觀聽者不能深知其故以致疑惑伏願殿下雖有微苦可堪扶輿則宜自力易曰君子終日乾乾蓋自勉彊不息之謂也其二曰古之人君雖有聰明之姿叡喆之質必須輔弼之助相導之功故虞舜以五臣興周文以四友隆及成王之為太子也則周召為保傅史佚昭文章故能聞道早備登崇大業刑措不用流聲洋溢伏惟殿下天授逸才聰鑒特逹臣謂猶宜時𤼵聖令宣揚德音諮詢保傅訪逮侍臣覲見賔客得令接盡壅否之情沛然交泰殿下之美煥然光明如此則高朗之風扇於前人𢎞範令軌永為後式其三曰古之聖王莫不以儉為德故堯稱采椽茅茨禹稱卑宫惡服漢文身衣弋綈足履革舄以身先物政致太平存為明主沒見宗祀及諸侯脩之者魯僖以躬儉節用聲列雅頌蚡冐以篳路藍縷用張楚國大夫脩之者文子相魯妾不衣帛晏嬰相齊鹿裘不補亦能匡君濟俗興國隆家庶人脩之者顔囘以簞食瓢飲揚其仁聲原憲以蓬戸繩樞邁其清德此皆聖主明君賢臣智士之所履行也故能懸名日月永世不朽蓋儉之福也及到末世以奢失之者帝王則有瑤臺瓊室玉杯象著肴膳之珍則熊蹯豹胎酒池肉林諸侯為之者至於丹楹刻桷餼徵百牢大夫有瓊弁玉纓庶人有擊鐘鼎食亦㒺不亡國喪宗破家失身醜名彰聞以為後戒竊聞後園鏤飾金銀刻磨犀象畫室之巧課試日精臣等以為今四海之廣萬物之富以今方古不足為侈也然上之所好下必從之是故居上者必慎其所好也昔漢光武皇帝時有獻千里馬及寶劔者馬以駕鼔車劔以賜騎士世祖武皇帝有上雉頭裘者即詔有司焚之都街高世之主不尚尤物故能正天下之俗刑四方之風臣等以為畫室之功可且減省後園雜作一皆罷遣肅然清静優游道德則日新之美光于四海矣其四曰以天下而供一人以百里而供諸侯故王侯食籍而衣税公卿大夫受爵而資祿莫有不贍者也是以仕農工商四業不雜交易而退以通有無者庶人之業也周禮三市旦則百族晝則商賈夕則販夫販婦買賤賣貴販鬻菜果收十百之盈以救旦夕之命故為庶人之貧賤者也樊遲匹夫請學為圃仲尼不答魯大夫臧文仲使妾織蒲又譏其不仁公儀子相魯則㧞其園葵言食祿者不與貧賤之人爭利也秦漢以來風俗轉薄公侯之尊莫不殖園圃之田而收市井之利漸冉相放莫以為恥律以古道誠可愧也今西園賣葵菜藍子雞麫之屬虧敗國體貶損令問其五曰竊見禁土令不得繕修墻壁動正屋瓦臣以為此既違典彛舊義且以拘攣小忌而廢𢎞廓大道宜可蠲除於事為宜朝廷善之及太子廢徙許昌賈后諷有司不聽宫臣送統與宫臣冐禁至伊水拜辭道左悲泣流連都官從事悉收統等付河南洛陽獄付郡者河南尹樂廣悉散遣之繫洛陽者猶未釋都官從事孫琰謂賈謐曰所以廢徙太子以為惡故耳東宫故臣冐罪拜辭涕泣路次不顧重辟乃更彰太子之徳不如釋之謐語洛陽令曹攄由是皆免及太子薨改𦵏統作誄叙哀為世所重後為博士尚書郎參大司馬齊王冏軍事冏驕荒將敗統切諫文多不載遷廷尉正每州郡疑獄斷處從輕成都王頴請為記室多所箴諫申論陸雲兄弟辭甚切至以母憂去職服闋為司徒左長史東海王越為兖州牧以統為别駕委以州事與統書曰昔王子師為豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應此者不統舉高平郄鑒為賢良陳留阮脩為直言濟北程收為方正時以為知人遷黄門侍郎散騎常侍領國子博士永嘉四年避難奔于成臯病卒凡所造賦頌表奏皆傳於後二子虨惇虨字思元本州辟舉秀才平南將軍温嶠以為參軍復為州别駕辟司空郄鑒掾除長山令鑒又請為司馬轉黄門郎車騎將軍庾冰鎮江州請為長史氷薨庾翼以為諮議參軍俄而復補長史翼薨大將于瓚作難虨討平之除尚書吏部郎仍遷御史中丞侍中吏部尚書永和中代桓景為䕶軍將軍出補會稽内史加右將軍代王彪之為尚書僕射哀帝即位欲臨軒拜授母周貴人為皇太妃虨議曰天高地卑名位定矣母貴子賤人倫序矣今稱皇帝策命命貴人斯則子爵母也貴人北面而拜授斯則母臣子也此雖欲加崇貴人而實卑之雖顯明國典而實廢之無乃不順乎竊謂應告顯宗之廟稱貴人仁淑之至宜加殊禮以酬鞠育之惠奉先靈之命事不在已可也又妃后雖是配君之名然自后以下有夫人九嬪無稱妃焉今宜稱皇太夫人於名禮順矣帝不從特下詔拜為皇太妃帝欲於殿庭立鴻祀又欲躬自籍田虨並以為禮廢日久儀注不存中興以來所不行謂宜停之為僕射積年簡文帝為相每訪政事虨多所補益轉䕶軍將軍領國子祭酒卒官子敳歴琅邪内史驃騎諮議敳子恒元熙中為西中郎長史恒弟夷尚書惇字思悛孝友淳粹高節邁俗性好學儒元並綜每以為君子立行應依禮而動雖隱顯殊途未有不傍禮敎者也若乃放逹不覊以肆縱為貴者非但動違禮法亦道之所棄也乃著通道崇檢論世多稱之蘇峻之辭避地東陽山太尉郄鑒檄為兖州治中又辟太尉掾康帝為司徒亦辟焉征西將軍庾亮請為儒林參軍徵拜博士著作郎皆不就邑里宗其道有事必諮而後行東陽太守阮裕長山令王濛皆一時名士並與惇游處深相欽重養志二十餘年永和九年卒時年四十九友朋相與刋石立頌以表德羙云孫楚字子荆太原中都人也祖資魏驃騎將軍父宏南陽太守楚才藻卓絶爽邁不羣多所陵傲缺鄉曲之譽年四十餘始參鎮東軍事文帝遣苻劭孫郁使吳將軍石苞令楚作書遺孫皓曰蓋聞見機而作周易所貴小不事大春秋所誅此乃吉凶之萌兆榮辱所由生也是故許鄭以銜璧全國曹譚以無禮取滅載籍旣記其成敗古今又著其愚智不復廣引譬類崇飾浮辭茍以夸大為名更喪忠告之實今粗論事要以相覺悟昔炎精幽昧厯數將終桓靈失德災釁並興豺狼抗爪牙之毒生靈罹塗炭之難由是九州絶貢王綱解紐四海蕭條非復漢有太祖承運神武應期征討暴亂尅寜區夏協建靈符天命旣集遂廓洪基奄有魏域土則神州中嶽器則九鼎猶存世載淑美重光相襲故知四隩之攸同帝者之壯觀也昔公孫氏承籍父兄世居東裔擁帶燕胡憑陵險遠講武游盤不供職貢内傲帝命外通南國乘桴滄海交酬貨賄葛越布于朔土貂馬延于吳會自以控弦十萬奔走之力信能右折燕齊左震扶桑輮轢沙漠南面稱王宣王薄伐猛鋭長驅師次遼東而城池不守枹皷蹔鳴而元凶折首於是遠近疆場列郡大荒收離聚散大安其居衆庶悦服殊俗款附自兹以降九野清泰東夷獻其樂器肅慎貢其楛矢曠世不覊應化而至巍巍蕩蕩想所具聞也吳之先祖起自荆楚遭時擾攘潛播江表昭烈震懼亦逃巴岷遂因山陵積石之固三江五湖浩汗無涯假氣游魂迄兹四紀兩邦合從東西唱和互相扇動距捍中國自謂三分鼎峙之勢可與太山共相終始也相國晉王輔相帝室文武桓桓志厲秋霜廟勝之算應變無窮獨見之鑒與衆絶慮主上欽明委以萬機長轡遠御妙略潛授偏師同心上下用力凌威奮武罙入其阻并敵一向奪其膽氣小戰江由則成都自潰曜兵劒閣則姜維靣縳開地六千領郡三十兵不踰時梁益肅清使竊號之雄稽顙絳闕球琳重錦充於府庫夫韓并魏徙虢滅虞亡此皆前鑒後事之表又南中呂興深覩天命蟬蜕内附願為臣妾外失輔車脣齒之援内有羽毛零落之漸而徘徊危國冀延日月此由魏武侯却指山河自以為彊殊不知物有興亡則所美非其地也方今百僚濟濟儁乂盈朝武臣猛將折衝萬里國富兵彊六軍精鋭思復翰飛飲馬南海自頃國家整脩器械興造舟楫簡習水戰樓船萬艘千里相望刳木已來舟車之用未有如今之殷盛者也驍勇百萬畜力待時役不再舉今日之師也然主相眷眷未便電發者猶以為愛人治國道家所尚崇城遂卑文王退舍故先開大信喻以存亡殷勤之指往使所究也若能審識安危自求多福蹶然改容祗承往錫追募南越嬰齊入侍北面稱臣伏聽告策則世祚江表永為魏藩豐功顯報隆於今日矣若猶侮慢未順王命然後謀力雲合指麾從風雍梁二州順流而東青徐戰士列江而西荆揚兖豫爭驅八衝征東甲卒虎歩秣陵爾乃王輿整駕六戎徐征羽校燭日旌旗星流龍游燿路歌吹盈耳士卒奔邁其會如林煙塵俱起震天駭地渴賞之士鋒鏑爭先忽然一旦身首横分宗祀淪覆取戒萬世引領南望良助寒心夫療膏肓之疾者必進苦口之藥決狐疑之慮者亦告逆耳之言如其猶豫迷而不反恐俞附見其已死扁鵲知其無功矣勉思良圖惟所去就劭等至呉不敢為通楚後遷佐著作郎復參驃騎將軍石苞軍事楚既負其才氣頗侮易於苞初至長揖曰天子命我參卿軍事因此而嫌隙遂構苞奏楚與呉人孫世山共訕毁時政楚亦抗表自理紛紜經年事未判又與鄉人郭奕忿爭武帝雖不顯明其罪然以少賤受責遂湮廢積年初參軍不敬府主楚既輕苞遂制致敬自楚始也征西將軍扶風王駿與楚舊好起為參軍轉梁令遷衞將軍司馬時龍見武庫井中羣臣將上賀楚上言曰頃聞武庫井中有二龍羣臣或有謂之禎祥而稱賀者或有謂之非祥無所賀者可謂楚既失之而齊亦未為得也夫龍或俯鱗潛于重泉或仰攀雲漢游乎蒼昊而今蟠于坎井同於蛙蝦者豈管庫之士或有隱伏厮役之賢沒於行伍故龍見光景有所感悟願陛下赦小過舉賢才埀夢於傅巖望想於渭濵脩學官起淹滯申命公卿舉獨行君子可惇風厲俗者又舉亮㧞秀異之才可以撥煩理難矯世抗言者無繫世族必先逸賤夫戰勝攻取之勢并兼混一之威五伯之事韓白之功耳至於制禮作樂闡揚道化甫是士人出筋力之秋也伏願陛下擇狂夫之言惠帝初為馮翊太守元康三年卒初楚與同郡王濟友善濟為本州大中正訪問銓邑人品狀至楚濟曰此人非卿所能目吾自為之乃狀楚曰天才英博亮拔不羣楚少時欲隱居謂濟曰當欲枕石潄流誤云潄石枕流濟曰流非可枕石非可潄楚曰所以枕流欲洗其耳所以潄石欲厲其齒楚少所推重唯雅敬濟初楚除婦服作詩以示濟濟曰未知文生於情情生於文覽之悽然増伉儷之重三子衆洵纂衆及洵俱未仕而早終惟纂子統綽並知名統字承公幼與綽及從弟盛過江誕任不覊而善屬文時人以為有楚風征北將軍禇裒聞其名命為參軍辭不就家于會稽性好山水乃求為鄞令轉在吳寜居職不留心碎務縱意游肆名山勝川靡不窮究後為餘姚令卒子騰嗣以博學著稱位至廷尉騰弟登少善名理注老子行於世仕至尚書郎早終綽字興公博學善屬文少與高陽許詢俱有高尚之志居于會稽遊放山水十有餘年乃作遂初賦以致其意嘗鄙山濤而謂人曰山濤吾所不解吏非吏隱非隱若以元禮門為龍津則當㸃額暴鱗矣所居齋前種一株松恒自守䕶之隣人謂曰樹子非不楚楚可憐但恐永無棟梁日耳綽答曰楓栁雖復合抱亦何所施邪綽與詢一時名流或愛詢高邁則鄙於綽或愛綽才藻而無所取於詢沙門支遁試問綽君何如許答云髙情致遠弟子早已伏膺然一詠一吟許將北面矣絶重張衡左思之賦每云三都二京五經之鼓吹也嘗作天台山賦辭致甚工初成以示友人范榮期云卿試擲地當作金石聲也榮期曰恐此金石非中宫商然每至佳句輙云應是我輩語除著作佐郎襲爵長樂侯綽性通率好譏調嘗與習鑿齒共行綽在前顧謂鑿齒曰沙之汰之瓦石在後鑿齒曰簸之颺之糠粃在前征西將軍庾亮請為參軍補章安令徵拜太學博士遷尚書郎揚州刺史殷浩以為建威長史會稽内史王羲之引為右軍長史轉永嘉太守遷散騎常侍領著作郎時大司馬桓温欲經緯中國以河南粗平將移都洛陽朝廷畏温不敢為異而北土蕭條人情疑懼雖並知不可莫敢先諫綽乃上疏曰伏見征西大將軍臣温表便當躬率三軍討除二宼蕩滌河渭清灑舊京然後神旂電舒朝服濟江反皇居於中土正玉衡於天極斯超世之宏圖千載之盛事然臣之所懐竊有未安以為帝王之興莫不藉地利人和以建功業貴能以義平暴因而撫之懷愍不建淪胥秦京遂令胡戎交侵神州絶綱土崩之釁誠由道喪然中夏蕩蕩一時横流百郡千城曾無完郛者何哉亦以地不可守投奔有所故也天祚未革中宗龍飛非惟信順協於天人而已實頼萬里長江畫而守之耳易稱王公設險以守其國險之時義大矣哉斯已然之明效也今作勝談自當任道而遺險校實量分不得不保小以固存自喪亂以來六十餘年蒼生殄滅百不遺一河洛邱墟函夏蕭條井堙木刋阡陌夷滅生理茫茫永無依歸播流江表已經數世存者長子老孫亡者邱壠成行雖北風之思感其素心目前之哀實為交切若遷都旋軫之日中興五陵即復􅃡成遐域泰山之安既難以理保烝烝之思豈不纒於聖心哉温今此舉誠欲大覽始終為國遠圖向無山陵之急亦未首決大謀獨任天下之至難也今發憤忘食忠慨亮到凡在有心孰不致感而百姓震駭同懷危懼者豈不以反舊之樂賖而趨死之憂促哉何者植根於江外數十年矣一朝拔之頓驅踧於空荒之地提挈萬里踰險浮深離墳墓棄生業富者無三年之糧貧者無一飡之飯田宅不可復售舟車無從而得捨安樂之國適習亂之鄉出必安之地就累卵之危將頓仆道塗飄溺江川僅有達者夫國以民為本疾寇所以為民衆喪而寇除亦安所取裁此仁者所宜哀矜國家所宜深慮也自今古帝王之都豈有常所哉時隆則宅中而圖大勢屈則遵養以待會使德不可勝家有三年之積然後始可謀太平之事耳今天時人事有未至者矣一朝欲一宇宙無乃頓而難舉乎臣之愚計以為且可更遣一將有威名資實者先鎮洛陽於陵所築二壘以奉衞山陵埽平梁許清一河南運漕之路既通然後盡力於開墾廣田積榖漸為徙者之資如此賊見亡徵勢必遠竄如其迷逆不化復欲送死者南北諸軍風馳電赴若身手之救痛痒率然之應首尾山陵既固中夏小康陛下且端委紫極増脩德政躬行漢文簡樸之至去小惠節游費審官人練甲兵以養士滅寇為先十年行之無使隳廢則貧者殖其財怯者先其勇人知天德赴死如歸以此致政猶運諸掌握何故捨百勝之長理舉天下而一擲哉陛下春秋方富温克壯其猷君臣相與𢎞養德業括囊元吉豈不快乎今温唱髙議聖朝互同臣以輕微獨獻管見出言之難實在今日而臣區區必聞天聽者竊以無諱之朝狂瞽進説芻蕘之謀聖賢所察所以不勝至憂觸冒干陳若陛下垂神温少留意豈非屈於一人而允億兆之願哉如以干忤罪大欲加顯戮使丹誠上達退受刑誅雖沒泉壤尸且不朽温見綽表不悦曰致意興公何不尋君遂初賦知人家國事邪尋轉廷尉卿領著作綽少以文才垂稱于時文士綽為其冠温王郄庾諸公之薨必須綽為碑文然後刋石焉年五十八卒子嗣有綽風文章相亞位至中軍參軍早亡羅憲字令則襄陽人也父䝉蜀廣漢太守憲年十三能屬文早知名師事譙周周門人稱為子貢性方亮嚴整待士無倦輕財好施不營産業仕蜀為太子舍人宣信校尉再使於吳吳人稱焉時黄皓預政衆多附之憲獨介然皓恚之左遷巴東太守時大將軍閻宇都督巴東拜憲領軍為宇副貳魏之伐蜀召宇西還憲守永安城及成都敗城中擾動邊江長吏皆棄城走憲獨斬亂者一人百姓乃安知劉禪降乃帥所統臨于都亭三日吳聞蜀敗遣將軍盛憲西上外託救援内欲襲憲憲曰本朝傾覆吳為唇齒不恤我難而邀其利吾寜當為降虜乎乃歸順於是繕甲完聚厲以節義士皆用命及鍾會鄧艾死百城無主呉又使歩協西征憲大破其軍孫休怒又遣陸抗助協憲拒守經年救援不至城中疾疫大半或勸南出䍧牱北奔上庸可以保全憲曰夫為人主百姓所仰既不能存急而棄之君子不為也畢命於此矣會荆州刺史胡烈等救之抗退加陵江將軍監巴東軍事使持節領武陵太守泰始初入朝詔曰憲忠烈果毅有才䇿器幹可給鼓吹又賜山元玉佩劒泰始六年卒贈使持節安南將軍武陵太守追封西鄂侯諡曰烈初憲侍讌華林園詔問蜀大臣子弟後問先輩宜時叙用者憲薦蜀人常忌杜軫等皆西國之良器武帝並召而任之子襲歴給事中陵江將軍統其父部曲至廣漢太守兄子尚尚字敬之一名仲父式䍧牱太守尚少孤依叔父憲善屬文荆州刺史王戎以尚及劉喬為參軍並委任之太康末為梁州刺史及趙廞反于蜀尚表曰廞非雄才必無所成計曰聽其敗耳乃假尚節為平西將軍益州刺史西戎校尉性貪少斷蜀人言曰尚之所愛非邪則佞尚之所憎非忠則正富擬魯衞家成市里貪如豺􅀈無復極已又曰蜀賊尚可羅尚殺我平西將軍反更為禍時李特亦起於蜀攻蜀殺趙廞又攻尚於成都尚退保江陽初尚乞師方嶽荆州刺史宗岱率建平太守孫阜救之次于江州岱阜兵盛諸為寇所逼者人有奮志尚乃使兵曹從事任鋭偽降因出密宣告於外剋日俱擊遂大破之斬李特傳首洛陽特子雄僭號都於郫城尚遣將軍隗伯攻之不剋俄而尚卒雄遂據有蜀土滕脩字顯先南陽西鄂人也仕呉為將帥封西鄂侯孫皓時代熊睦為廣州刺史甚有威惠徵為執金吾廣州部曲督郭馬等為亂皓以脩宿有威惠為嶺表所伏以為使持節都督廣州軍事鎮南將軍廣州牧以討之未克而王師伐呉脩率衆赴難至巴邱而皓已降乃縞素流涕而還與廣州刺史閭豐蒼梧太守王毅各送印綬詔以脩為安南將軍廣州牧持節都督如故封武當侯加鼓吹委以南方事脩在南積年為邊夷所附太康九年卒請𦵏京師帝嘉其意賜墓田一頃諡曰聲脩之子並上表曰亡父脩覊紲呉壤為所驅馳幸逢開通沐浴至化得從俘虜握戎馬之要未覲聖顔委南藩之重實由勲勞少聞天聽故也年衰疾篤屢乞骸骨未䝉垂哀奄至薨隕臣承遺意輿櫬還都瞻望雲闕實懷痛裂竊聞博士諡脩曰聲直彰流播不稱行績不勝愚情冒昧聞訴帝乃賜諡曰忠並子含初為庾冰輕車長史討蘇峻有功封夏陽縣開國侯邑千六百户授平南將軍廣州刺史在任積年甚有威惠卒諡曰戴含弟子遯交州刺史脩曽孫恬之龍驤將軍魏郡太守戍黎陽為翟遼所執死之馬隆字孝興東平平陸人少而智勇好立名節魏兖州刺史令狐愚坐事伏誅舉州無敢收者隆以武吏託稱愚客以私財殯𦵏服喪三年列植松栢禮畢乃還一州以為羙談署武猛從事泰始中將興伐呉之役下詔曰呉會未平宜得猛士以濟武㓛雖舊有薦舉之法未足以盡殊才其普告州郡有壯勇秀異才力傑出者皆以名聞將簡其尤異擢而用之茍有其人勿限所取兖州舉隆才堪良將稍遷司馬督初涼州刺史楊欣失羌戎之和隆陳其必敗俄而欣為虜所沒河西斷絶帝每有西顧之憂臨朝而歎曰誰能為我討此虜通涼州者乎朝臣莫對隆進曰陛下若能任臣臣能平之帝曰必能滅賊何為不任顧卿方略何如耳隆曰陛下若能任臣當聽臣自任帝曰云何隆曰臣請募勇士三千人無問所從來率之鼓行而西禀陛下威德醜虜何足滅哉帝許之乃以隆為武威太守公卿僉曰六軍既衆州郡兵多但當用之不宜横設賞募以亂常典隆小將妄説不可從也帝不納隆募限腰引弩三十六鈞弓四鈞立標簡試自旦至中得三千五百人隆曰足矣因請自至武庫選杖武庫令與隆忿爭御史中丞奏劾隆隆曰臣當亡命戰場以報所受武庫令乃以魏時朽杖見給不可復用非陛下使臣滅賊之意也帝從之又給其三年軍資隆於是西渡温水虜樹機能等以衆萬計或乘險以遏隆前或設伏以截隆後隆依八陣圖作偏箱車地廣則鹿角車營路狹則為木屋施於車上且戰且前弓矢所及應弦而倒奇謀間發出敵不意或夾道累磁石賊負鐵鎧行不得前隆卒悉被犀甲無所留礙賊咸以為神轉戰千里殺傷以千數自隆之初西音問斷絶朝廷憂之或謂已沒後隆使夜到帝撫掌大笑詰朝召羣臣謂曰若從諸卿言是無秦涼也乃詔加隆假節宣威將軍赤幢曲蓋鼓吹隆到武威虜大人猝䟦韓且万能等率萬餘落歸降前後誅殺及降附者以萬計又率善戎沒骨能等與樹機能大戰斬之涼州遂平朝議將加隆將士勲賞有司奏隆將士皆先加顯爵不應更授衞將軍楊珧駮曰前精募將士少加爵命者此適所以為誘引今隆全軍獨尅西土獲安不得便以前授塞此後功宜皆聽許以明要信乃從珧議賜爵加秩各有差太康初朝廷以西平荒毁宜時興復以隆為平虜䕶軍西平太守將所領精兵又給牙門一軍屯據西平時南虜成奚每為邊患隆至率軍討之虜據險距守隆令軍士皆負農器將若田者虜以隆無征討意御衆稍怠隆因其無備進兵擊破之畢隆之政不敢為寇太熙初封奉髙縣侯加授東羌校尉積十餘年威信振於隴右時略陽太守馮翊嚴舒與楊駿通親密圖代隆毁隆年老謬耄不宜服戎於是徵隆以舒代鎮氐羌聚結百姓驚懼朝廷恐關隴復擾乃免舒遣隆復職竟卒於官子咸嗣亦驍勇成都王頴攻長沙王乂以咸為鷹揚將軍率兵屯河橋中渚為乂將王瑚所敗沒於陣胡奮字元威安定臨涇人魏車騎將軍陰密侯遵之子也奮性開朗有籌略少好武事宣帝之伐遼東也以白衣侍從左右甚見接待還為校尉稍遷徐州刺史封夏陽子匈奴中部帥劉猛叛使驍騎路蕃討之以奮為監軍假節頓軍硜比為蕃後繼撃猛破之猛帳下將李恪斬猛而降以功累遷征南將軍假節都督荆州諸軍事遷䕶軍加散騎常侍􅁬家世將門晚乃好學有刀筆之用所在有聲績居邊特有威惠泰始末武帝怠政事而耽於色大採擇公卿女以充六宫􅁬女選入為貴人􅁬惟有一子為南陽王友早亡及聞女為貴人哭曰老奴不死惟有二兒男入九地之下女上九天之上􅁬既舊臣兼有椒房之助甚見寵待遷左僕射加鎮東大將軍開府儀同三司時楊駿以后父驕傲自得奮謂駿曰卿恃女更益豪邪歴觀前代與天家婚未有不滅門者但早晚事耳觀卿舉措適所以速禍駿曰卿女不在天家乎奮曰我女與卿女作婢耳何能損益時人皆為之懼駿雖銜之而不能害後卒於官贈車騎將軍諡曰壯奮兄弟六人兄廣弟烈並知名廣字宣祖位至散騎常侍少府廣子喜字林甫亦以開濟為稱仕至涼州刺史建武將軍假節䕶羌校尉烈字武元為將伐蜀鍾會之反也烈與諸將皆被閉烈子世元時年十八為士卒先攻殺會名馳逺近烈為秦州刺史及涼州叛烈屯於萬斛堆為虜所圍無援遇害陶璜字世英丹陽秣陵人也父基吳交州刺史璜仕呉歴顯位孫皓時交阯太守孫諝貪虐為百姓所患會察戰鄧荀至擅調孔雀三千頭遣送秣陵既苦遠役咸思為亂郡吏吕興殺諝及荀以郡内附武帝拜興安南將軍交阯太守尋為其功曹李統所殺帝更以建寧爨谷為交阯太守谷又死更遣巴西馬融代之融病卒南中監軍霍弋又遣犍為楊稷代融與將軍毛炅九真太守董元牙門孟幹孟通李松王業爨能等自蜀出交阯破呉軍于古城斬大都督脩則交州刺史劉俊吳遣虞汜為監軍薛珝為威南將軍大都督璜為蒼梧太守距稷戰于分水璜敗退保合浦亡其二將珝怒謂璜曰若自表討賊而喪二帥其責安在璜曰下官不得行意諸軍不相順故致敗耳珝怒欲引軍還璜夜以數百兵襲董元獲其寶物船載而歸珝乃謝之以璜領交州為前部督璜從海道出其不意徑至交阯元距之諸將將戰璜疑斷牆内有伏兵列長㦸於其後兵纔接元偽退璜追之伏兵果出長㦸逆之大破元等以前所得寶船上錦物數千匹遺扶嚴賊帥梁奇奇將萬餘人助璜元有勇將解系同在城内璜誘其弟象使為書與系又使象乘璜軺車鼓吹導從而行元等曰象尚若此系必有去志乃就殺之珝璜遂䧟交阯吳因用璜為交州刺史璜有謀策周窮好施能得人心滕脩數討南賊不能制璜曰南岸仰吾鹽鐵斷勿與市皆壞為田器如此二年可一戰而滅也脩從之果破賊初霍弋之遣稷炅等與之誓曰若賊圍城未百日而降者家屬誅若過百日救兵不至吾受其罪稷等守未百日糧盡乞降璜不許給其糧使守諸將並諫璜曰霍弋已死不能救稷等必矣可須其曰滿然後受降使彼得無罪我受有義内訓百姓外懷鄰國不亦可乎稷等期訖糧盡救兵不至乃納之脩則既為毛炅所殺則子允隨璜南征城既降允求復讎璜不許炅密謀襲璜事覺收炅呵曰晉賊炅厲聲曰呉狗何等為賊允剖其腹曰復能作賊不炅猶罵曰吾志殺汝孫皓汝父何死狗也璜既擒稷等並送之稷至合浦發病死孟幹爨能李松等至建鄴皓將殺之或勸皓幹等忠於所事宜宥之以勸邊將皓從其言將徙之臨海幹等志欲北歸慮東徙轉遠以吳人愛蜀側竹弩言能作之皓留付作部後幹逃至京師松能為皓所殺幹陳伐呉之計帝乃厚加賞賜以為日南太守先是以楊稷為交州刺史毛炅為交阯太守印綬未至而敗即贈稷交州炅及松能子並關内侯九真郡功曹李祚保郡内附璜遣將攻之不尅祚舅黎晃隨軍勸祚令降祚答曰舅自呉將祚自晉臣唯力是視耳踰時乃㧞皓以璜為使特節都督交州諸軍事前將軍交州牧武平九德新昌土地阻險夷獠勁悍歴世不賔璜征討開置三郡及九真屬國三十餘縣徵璜為武昌都督以合浦太守脩允代之交土人請留璜以千數於是遣還皓既降晉手書遣璜息融勅璜歸順璜流涕數日遣使送印綬詣洛陽帝詔復其本職封宛陵侯改為冠軍將軍呉既平普減州郡兵璜上言曰交土荒裔斗絶一方或重譯而言連帶山海又南郡去州海行千有餘里外距林邑纔七百里夷帥范熊世為逋寇自稱為王數攻百姓且連接扶南種類猥多朋黨相倚負險不賔往隸呉時數作寇逆攻破郡縣殺害長吏臣以尫駑昔為故國所採偏戍在南十有餘年雖前後征討翦其渠魁深山僻穴尚有逋竄又臣所統之卒本七千餘人南土温濕多有氣毒加累年征討死亡減耗其見在者二千四百二人今四海混同無思不服當卷甲消刃禮樂是務而此州之人識義者寡厭其安樂好為禍亂又廣州南岸周旋六千餘里不賔屬者乃五萬餘户及桂林不覊之輩復當萬户至於服從官役纔五千餘家二州脣齒唯兵是鎮又寧州興古接據上流去交阯郡千六百里水陸並通互相維衞州兵未宜約損以示單虚夫風塵之變出於非常臣亡國之餘議不足採聖恩廣厚猥垂飾擢蠲其罪舋故授方任去辱即寵拭目更視誓念投命以報所授臨履所見謹冒瞽陳又以合浦郡土地磽确無有田農百姓唯以采珠為業啇賈去來以珠􅐙米而吳時珠禁甚嚴慮百姓私散好珠禁絶來去人以饑困又所調猥多限每不充今請上珠三分輸二次者輸一麤者蠲除自十月訖二月非採上珠之時聽商旅往來如舊並從之在南三十年威恩著于殊俗及卒舉州號哭如䘮慈親朝廷乃以員外散騎常侍吾彥代璜彥卒又以員外散騎常侍顧祕代彥祕卒州人逼祕子參領州事參尋卒參弟壽求領州州人不聽固求之遂領州壽乃殺長史胡肇等又將殺帳下督梁碩碩走得免起兵討壽禽之付壽毋令鴆殺之碩乃迎璜子蒼梧太守威領刺史在職甚得百姓心三年卒威弟淑之綏後並為交州自基至綏四世為交州者五人璜弟濬吳鎮南大將軍荆州牧濬弟抗太子中庶子濬子湮字恭之湮弟猷字恭豫並有名湮至臨海太守黄門侍郎猷宣城内史王導右軍長史湮子馥于湖令為韓晃所殺追贈廬江太守抗子囘自有傳吾彥字士則吳郡吳人也出自寒微有文武才幹身長八尺手格猛獸膂力絶羣仕吳為通江吏時將軍薛翊杖節南行軍容甚盛彥觀之慨然而歎有善相者劉札謂之曰以君之相後當至此不足慕也初為小將給呉大司馬陸抗抗奇其勇略將㧞用之患衆情不允乃會諸將密使人陽狂㧞刀躍而來坐上諸將皆懼而走唯彥不動舉几禦之衆服其勇乃擢用焉稍遷建平太守時王濬將伐吳造船於蜀彥覺之請増兵為備皓不從彥乃輙為鐵鏁横斷江路及晉師臨境沿江諸城皆望風降附或見攻而㧞唯彥獨堅守大衆攻之不能克乃退舍禮之呉亡彥始歸附武帝以為金城太守帝嘗從容問薛瑩曰孫皓所以亡國者何也瑩對曰歸命侯臣皓之君吳昵近小人刑罰妄加大臣大將無所親信人人憂恐各不自安敗亡之釁由此而作矣其後帝又問彥對曰吳主英俊宰輔賢明帝笑曰君明臣賢何為亡國彥曰天禄永終厯數有屬所以為陛下擒此蓋天時豈人事也張華時在坐謂彥曰君為吳將積有歳年蔑爾無聞竊所惑矣彥厲聲曰陛下知我而卿不聞乎帝甚嘉之轉任敦煌恩威甚著遷鴈門太守時順陽王暢驕縱前後内史皆誣之以罪及彥為順陽内史彥清身率下威刑嚴肅衆皆畏懼暢不能誣乃更薦之冀其去職遷員外散騎常侍帝嘗問彥陸喜陸抗二人誰多也彥對曰道德名望抗不及喜立功立事喜不及抗會交州刺史陶璜卒以彥為南中都督交州刺史重餉陸機兄弟機將受之雲曰彥本微賤為先公所㧞而答詔不善安可受之機乃止因此每毁之長沙孝亷尹虞謂機等曰自古由賤而興者乃有帝王何但公卿若何元幹侯孝明唐儒宗張義允等並起自寒微皆内侍外鎮人無譏者卿以士則答詔小有不善毁之無已吾恐南人皆將去卿卿便獨坐也於是機等意始解毁言漸息矣初陶璜之死也九真戍兵作亂逐其太守九真賊帥趙祉圍郡城彦悉討平之在鎮二十餘年威信宣著南州寧靖自表求代徵為大長秋卒於官張光字景武江夏鍾武人也身長八尺明眉目美音聲少為郡吏家世有部曲以牙門將伐吳有功遷江夏西部都尉轉北地都尉初趙王倫為關中都督氐羌反叛太守張損戰沒郡縣吏士少有全者光以百餘人戍馬蘭山北賊圍之百餘日光撫厲將士屢出竒兵撃賊破之光以兵少路逺自分敗没會梁王肜遣司馬索靖將兵迎光舉軍悲泣遂還長安肜表光處絶圍之地有耿恭之忠宜加甄賞以明奬勸於是擢授新平太守加鼓吹屬雍州刺史劉忱被密詔討河間王顒光起兵助忱忱時委任秦州刺史皇甫重重自以闗西大族心每輕光謀多不用及二州軍潰為顒所擒顒謂光曰前起兵欲作何策光正色答曰但劉雍州不用鄙計故令大王得有今日也顒壯之引與歡宴彌日表為右衞司馬陳敏作亂除光順陽太守加陵江將軍率歩騎五千詣荆州討之刺史劉𢎞雅敬重光稱為南楚之秀時江夏太守陶侃與敏大將錢端相距於長岐將戰襄陽太守皮初為歩軍使光設伏以待之武陵太守苖光為水軍藏舟艦於沔水皮初等與賊交戰光發伏兵應之水陸同奮賊衆大敗𢎞表光有殊勲遷材官將軍梁州刺史先是秦州人鄧定等二千餘家饑餓流入漢中保于城固漸為抄盜梁州刺史張殷遣巴西太守張燕討之定窘急偽乞降於燕并餽燕金銀燕喜之為之緩師定密結李雄雄遣衆救定燕退定遂進逼漢中太守杜正沖東奔魏興殷亦棄官而遁光不得赴州止於魏興乃給諸郡守共謀進取燕唱言曰漢中荒敗迫近大賊尅復之事當俟英雄正沖曰張燕受賊金銀不時進討阻兵緩寇致喪漢中實燕之罪也光於是發怒呵燕令出斬之以徇綏撫荒殘百姓悦服光於是却鎮漢中時逆賊王如餘黨李運楊武等自襄陽將三千餘家入漢中光遣參軍晉邈率衆於黄金距之邈受運重賂勸光納運光從邈言使居城固既而邈以運多珍貨又欲奪之復言於光曰運之徒屬不事佃農但營器杖意在難測可掩而取之光又信焉遣邈衆討運不尅光乞師於氐王楊茂搜茂搜遣子難敵助之難敵求貨於光光不與楊武乃厚賂難敵謂之曰流人寶物悉在光處今伐我不如伐光難敵大喜聲言助光内與運同光弗之知也遣息援率衆助邈運與難敵夾攻邈等援為流矢所中死賊遂大盛光嬰城固守自夏迄冬憤激成疾佐吏及百姓咸勸光退據魏興光按劒曰吾受國厚恩不能翦除寇賊今得自死便如登仙何得退還也聲絶而卒時年五十五百姓悲泣遠近傷惜之有子炅邁炅少辟太宰掾邁多才略有父風州人推邁權領州事與賊戰沒别駕范曠及督䕶王喬奉光妻息率兵遺衆還據魏興其後義陽太守任愔為梁州光妻子歸本郡南平太守應詹白都督王敦稱光在梁州能興微繼絶威振巴漢值中原傾覆征鎮失守外無救助内闕資儲以寡敵衆經年抗禦厲節不撓宜應追論顯贈以慰存亡敦不能從趙誘字元孫淮南人也世以將顯州辟主簿值刺史卻隆被齊王冏檄使起兵討趙王倫隆欲承檄舉義而諸子姪並在洛陽欲坐觀成敗恐為冏所討進退有疑會羣吏計議誘説隆曰趙王簒逆海内所病今義兵飈起其敗必矣今為明使君計莫若自將精兵徑赴許昌上䇿也不然且可留後遣猛將將兵赴盟亦中䇿也若遣小軍隨形助勝下䇿耳隆曰我受二帝恩無所偏助正欲保州而已誘與治中留寶主簿張裦等諫隆若無所助變難將生州亦不可保也隆猶豫不決遂為其下所害誘還家杜門不出左將軍王敦以為參軍加廣武將軍與甘卓周訪共討華軼破之又撃杜弢於西湘大興初復與卓攻弢滅之累功賜爵平阿縣侯代陶侃為武昌太守時杜曾迎第五猗於荆州作亂敦遣誘與襄陽太守朱軌共距之猗既愍帝所遣加有時望為荆楚所歸誘等若戰皆沒敦甚悼惜之表贈征虜將軍秦州刺史諡曰敬子龔與誘俱死元帝為晉王下令贈新昌太守龔弟允字伯舒王敦使周訪撃杜曾允請從行訪憚曾之彊欲先以允餌曾使其衆疲而後繋之允多梟首後王導引為從事中郎南頓王宗反允殺宗於是王導庾亮並倚仗之轉冠軍將軍遷西豫州刺史卒於官周處字子隱義興陽羡人也父魴吳鄱陽太守處少孤未弱冠膂力絶人好馳騎田獵不脩細行縱情肆慾州曲患之處自知為人所惡乃慨然有改勵之志謂父老曰今時和歳豐何苦而不樂邪父老歎曰三害不除何樂之有處曰何謂也答曰南山白額猛虎長橋下蛟并子為三矣處曰若此為患吾能除之父老曰子若除之則一郡之大慶非徒去害而已處乃入山射殺猛虎因投水搏蛟蛟或浮或沉行數十里而處與之俱經三日三夜人謂為死皆相慶賀處果殺蛟而反聞鄉里相慶始知人患已之甚乃入吳尋二陸時機不在見雲具以情告曰欲自脩改而年已蹉跎恐將無及雲曰古人貴朝聞夕改君前塗尚可但患志之不立何憂名之不彰處遂勵志好學有文思志存義烈言必忠信克已期年州府交辟仕吳為東觀左丞孫皓末為無難督及吳平王渾登建鄴宫釃酒既酣謂吳人曰諸君亡國之餘得無慼乎處對曰漢末分崩三國鼎立魏滅於前吳亡於後亡國之慼豈惟一人渾有慙色入洛稍遷新平太守撫和戎狄叛羌歸附雍土羙之轉廣漢太守郡多滯訟有經三十年而不決者處詳其枉直一朝決遣以母老罷歸尋除楚内史未之官徵拜散騎常侍處曰古人辭大不辭小乃先之楚而郡既經喪亂新舊雜居風俗未一處敦以敎義又檢尸骸無主及白骨在野收𦵏之然後就徵遠近稱歎及居近侍多所規諷遷御史中丞凡所糺劾不避寵戚梁王肜違法處深文案之及氐人齊萬年反朝臣惡處彊直皆曰處吳之名將子也忠烈果毅乃使隸夏侯駿西征伏波將軍孫秀知其將死謂之曰卿有老母可以此辭也處曰忠孝之道安得兩全旣辭親事君父母安得而子乎今日是我死所也萬年聞之曰周府君昔臨新平我知其為人才兼文武若專斷而來不可當也如受制於人此成禽耳既而梁王肜為征西大將軍都督關中諸軍事處知肜不平必當䧟已自以人臣盡節不宜辭憚乃悲慨即路志不生還中書令陳凖知肜將逞宿憾乃言於朝曰駿及梁王皆是貴戚非將率之才進不求名退不畏咎周處吳人忠勇果勁有怨無援將必喪身宜詔孟觀以精兵萬人為處前鋒必能殄寇不然肜當使處先驅其敗必也朝廷不從時賊屯梁山有衆七萬而駿逼處以五千兵擊之處曰軍無後繼必至覆敗雖在亡身為國取恥肜復命處進討乃與振威將軍虞播雍州刺史解系攻萬年於六陌將戰處軍人未食肜促令速進而絶其後繼處知必敗賦詩曰去去世事已策馬觀西戎藜藿甘梁黍期之克令終言畢而戰自旦及暮斬首萬計弦絶矢盡播系不救左右勸退處按劔曰此是吾効節授命之日何退之為且古者良將受命鑿凶門以出蓋有進無退也今諸軍負信勢必不振我為人臣以身殉國不亦可乎遂力戰而沒追贈平西將軍贈錢百萬𦵏地一頃京城地五十畝為第又賜王家近田五頃詔曰處母年老加以遠人朕每愍念給其醫藥酒米賜以終年處著黙語三十篇及風土記并撰集吳書時潘岳奉詔作關中詩曰周殉師令身膏齊斧人之云亡貞節克舉又西戎校尉閻纘亦上詩云周全其節令問不已身雖云沒書名良史及元帝為晉王將加處策諡太常賀循議曰處履徳清方才量髙世歴守四郡安人立政入司百寮貞節不撓在戎致身見危授命此皆忠賢之茂實烈士之遠節按諡法執徳不囘曰孝遂以諡焉有三子玘靖札靖早卒玘札並知名玘字宣佩彊毅沉斷有父風而文學不及閉門潔已不妄交游士友咸望風敬憚焉故名重一方弱冠州郡辟命不就刺史初到召為别駕從事虚已備禮方始應命累薦名宰府舉秀才除議郎大安初妖賊張昌邱沈等聚衆於江夏百姓從之如歸惠帝使監軍華宏討之敗于障山昌等寖盛殺平南將軍羊伊鎮南大將軍新野王歆等所在覆沒昌别率封雲攻徐州石冰攻揚州刺史陳徽出奔冰遂略有揚土玘密欲討冰潛結前南平内史王矩共推吳興太守顧祕都督揚州九郡軍事及江東人士同起義兵斬冰所置吳興太守區山及諸長史冰遣其將羌毒領數萬人距玘玘臨陣斬毒時右將軍陳敏自廣陵率衆助玘斬冰别率趙驡於蕪湖因與玘俱前攻冰於建康冰北走投封雲雲司馬張統斬雲冰以降徐揚並平玘不言功賞散衆還家陳敏反于揚州以玘為安豐太守加四品將軍玘稱疾不行密遣使告鎮東將軍劉凖令發兵臨江已為内應翦髪為信凖在壽春遣督䕶衡彥率衆而東時敏弟昶為廣武將軍歴陽内史以吳興錢廣為司馬玘密諷廣殺昶玘與顧榮甘卓等以兵攻敏敏衆奔潰單馬北走追獲之於江乘界斬之於建康夷三族東海王越聞其名召為參軍詔補尚書郎散騎郎並不行元帝初鎮江左以玘為倉曹屬初吳興人錢璯亦起義兵討陳敏越命為建威將軍使率其屬會于京都璯至廣陵聞劉聰逼洛陽畏愞不敢進帝促以軍期璯乃謀反時王敦遷尚書當應徵與璯俱西璯欲隂殺敦藉以舉事敦聞之奔告帝璯遂殺度支校尉陳豐焚燒邸閣自號平西大將軍八州都督刼孫皓子充立為吳王旣而殺之來宼玘縣帝遣將軍郭逸都尉宋典等討之並以兵少未敢前玘復率合鄉里義衆與逸等俱進討璯斬之傳首于建康玘三定江南開復王略帝嘉其勲以玘行建威將軍吳興太守封烏程縣侯吳興宼亂之後百姓饑饉盜賊公行玘甚有威恵百姓愛敬之期年之間境内寧謐帝以玘頻興義兵勲誠並茂乃以陽羡及長城之西鄉丹陽之永世别為義興郡以彰其功焉玘宗族彊盛人情所歸帝疑憚之于時中州人士佐佑王業而玘自以為不得調内懷怨望復為刁協輕之恥恚愈甚時鎮東將軍祭酒東萊王恢亦為周顗所侮乃與玘隂謀誅諸執政推玘及戴若思與諸南士共奉帝以經緯世事先是流人帥夏鐵等寓于淮泗恢隂書與鐵令起兵已當與玘以三吳應之建興初鐵已聚衆數百人臨淮太守蔡豹斬鐵以聞恢聞鐵死懼罪奔于玘玘殺之埋于豕牢帝聞而祕之召玘為鎮東司馬朱到復改授建武將軍南郡太守玘既南行至蕪湖又下令曰玘奕世忠烈義誠顯著孤所矜嘉今以為軍諮祭酒將軍如故進爵為公祿秩僚屬一同開國之例玘忿於廻易又知其謀泄遂憂憤發背而卒時年五十六將卒謂子勰曰殺我者諸傖子能復之乃吾子也吳人謂中州人曰傖故云耳贈輔國將軍諡曰忠烈子勰嗣勰字彥和常緘父言時中國亡官失守之士避亂來者多居顯位駕御吳人吳人頗怨勰因之欲起兵潛結吳興郡功曹徐馥馥家有部曲勰使馥矯稱叔父札命以合衆豪俠樂亂者翕然附之以討王導刁協為名孫皓族人弼亦起兵於廣德以應之馥殺吳興太守袁琇有衆數千將奉札為主時札以疾歸家聞而大驚乃告亂於義興太守孔侃勰知札不同不敢發兵馥黨懼攻馥殺之孫弼衆亦潰宣城太守陶猷滅之元帝以周氏奕世豪望吳人所宗故不窮治撫之如舊勰為札所責失志歸家淫侈縱恣每謂人曰人生幾時但當快意耳終於臨淮太守勰弟彜少知名元帝辟為丞相掾早亡玘弟札字宣季性矜險好利外方内荏少以豪右自處州郡辟命皆不就察孝亷除郎中大司馬齊王冏參軍出補句容令遷吳國上軍將軍辟東海王越參軍不就以討錢璯功賜爵漳浦亭侯元帝為丞相表札為寧遠將軍歴陽内史不之職轉從事中郎徐馥平以札為奮武將軍吳興内史錄前後功改封東遷縣侯進號征虜將軍監揚州江北軍事東中郎將鎮涂中未之職轉右將軍都督石頭水陸軍事札脚疾不堪拜固讓經年有司彈奏不得已乃視職加散騎常侍王敦舉兵攻石頭札開門應敦故王師敗績敦轉札為光祿勲尋補尚書頃之遷右將軍會稽内史時札兄靖子懋晉陵太守清流亭侯懋弟莚征虜將軍吳興内史莚弟贊大將軍從事中郎武康縣侯贊弟縉太子文學都鄉侯次兄子勰臨淮太守烏程公札一門五侯並居列位吳士貴盛莫與為比王敦深忌之後莚喪母送者千數敦益憚焉及敦疾錢鳳以周氏宗彊與沈充權勢相侔欲自託於充謀滅周氏使充得專威揚士乃説敦曰夫有國者患於彊逼自古釁難常必由之今江東之豪莫彊周沈公萬世之後二族必不静矣周彊而多俊才宜先為之所後嗣可安國家可保耳敦納之時有道士李脱者妖術惑衆自言八百歳故號李八百自中州至建鄴以鬼道療病又署人官位時人多信事之弟子李𢎞養徒灊山云應讖當王故敦使廬江太守李恒告札及其諸兄子與脱謀圖不軌時莚為敦諮議參軍即營中殺莚及脱𢎞又遣參軍賀鸞就沈充盡掩殺札兄弟子既而進軍會稽襲札札先不知卒聞兵至率麾下數百人出距之兵散見殺札性貪財好色惟以業產為務兵至之日庫中有精仗外白以配兵札猶惜不與以弊者給之其鄙吝如此故士卒莫為之用及敦死札莚故吏並詣闕訟周氏之寃宜加贈諡事下八坐尚書卞壼議以札石頭之役開門延寇遂使賊敦恣亂札之責也追贈意所未安懋莚兄弟宜復本位司徒王導議以札在石頭忠存社稷義在忘身至於往年之事自臣等有識以上與札情豈有異此言實貫於聖鑒論者見姦逆既彰便欲徵往年已有不臣之漸即復使爾要當時衆所未悟既悟其姦萌札與臣等便以身許國死而後已札亦尋取梟夷朝廷檄命既下大事既定便正以為逆黨邪正失所進退無據誠國體所宜深惜臣謂宜與周顗戴若思等同例尚書郄鑒議曰夫襃貶臧否宜令體明例通今周戴以死節復位周札以開門同例事異賞均意所疑惑如司徒議謂往年之事自有識以上皆與札不異此為邪正坦然有在昔宋文失禮華樂荷不臣之罰齊靈嬖孽高厚有從昏之戮以古況今譙王周戴宜受若此之責何加贈復位之有乎今據已顯復則札宜貶責明矣導重議曰省令君議必札之開門與譙王周戴異今札開門直出風言竟實事邪便以風言定襃貶意莫若原情考徵也論者謂札知隗協亂政信敦匡救茍匡救信姦佞除即所謂流四凶族以隆人主巍巍之功耳如此札所以忠於社稷也後敦悖謬出所不圖札亦闔門以此滅族是其死於為義也夫信敦當時之匡救不圖將來之大逆惡隗協之亂政不失為臣之貞節者于時朝士豈惟周札邪若盡謂不忠懼有誣乎譙王周戴各以死衞國斯亦人臣之節也但所見有同異然期之於必忠故宜申明耳即如令君議宋華齊髙其在隗協矣昔子糾之難召忽死之管仲不死若以死為賢則管仲當貶若以不死為賢則召忽死為失先典何以兩通之明為忠之情同也死雖是忠之一目亦不必為忠皆當死也漢祖遺約非劉氏不王非功臣不侯違命天下共誅之後吕后王諸吕周勃從之王陵廷爭可不謂忠乎周勃誅吕尊文安漢社稷忠莫尚焉則王陵又何足言而前史兩為羙談固知死與不死爭與不爭茍原情盡意不可定於一概也且札闔棺定諡違逆黨順受戮凶邪不負忠義明矣鑒又駁不同而朝廷竟從導議追贈札衞尉遣使者祠以少牢札長子澹太宰府掾次子雅察孝廉不行札兄子莚卓犖有才幹拜征虜將軍吳興太守遷黄門侍郎徐馥之役莚族兄續亦聚衆應之元帝議欲討之王導以為兵少則不足制宼多遣則根本空虚黄門侍郎周莚忠烈至到為一郡所敬意謂直遣莚足能殺續於是詔以力士百人給莚使輕騎還陽羡莚即日取道晝夜兼行既至郡將入遇續於門莚謂續曰宜與君共詣孔府君有所論續不肯入莚逼牽與俱坐定莚謂太守孔侃曰府君何以置賊在座續衣裏帶小刀便操逼莚莚叱郡傳敎吳曽何不與手曾有膽力便以刀環築續殺之莚遂因欲誅勰札距不許委罪於從兄邵誅之莚不歸家省母長驅而去母狼狽追之其忠公如此遷太子右衞率及王敦作難加冠軍將軍都督會稽吳興義興晉陵東陽軍事率水軍三千人討沈充未發而王師敗績莚聞札開城納敦憤咤慨慷義形於色尋遇害敦平後與札同被復官初莚於姑孰立屋五間而六梁一時躍出堕地衡獨立柱頭零節之上甚危雖以人力不能然也後竟覆族莚弟縉少無行檢嘗在建康烏衣道中逢孔氏婢時與同寮二人共載便令左右捉婢上車其彊暴如此周訪字士逹本汝南安成人也漢末避地江南至訪四世吳平因家廬江尋陽焉祖纂吳威遠將軍父敏左中郎將訪少沉毅謙而能讓果於斷割周窮振乏家無餘財為縣功曹時陶侃為散吏訪薦為主簿相與結友以女妻侃子瞻訪察孝廉除郎中上甲令皆不之官鄉人盜訪牛於冢間殺之訪得之密埋其肉不使人知及元帝渡江命參鎮東軍事時有與訪同姓名者罪當死吏誤收訪訪奮撃收者數十人皆散走而自歸於帝帝不之罪以為揚烈將軍領兵一千二百屯尋陽鄂陵與甘卓趙誘討華軼所統厲武將軍丁乾與軼所統武昌太守馮逸交通訪收斬之逸來攻訪訪率衆撃破之逸遁保柴桑訪乘勝進討詄遣其黨王約傅札等萬餘人助逸大戰於湓口約等又敗訪與甘卓等會於彭澤與軼水軍將朱矩等戰又敗之軼將周廣燒城以應訪軼衆潰訪執軼斬之遂平江州帝以訪為振武將軍尋陽太守加鼓吹曲蓋復命訪與諸軍共征杜弢弢作桔橰打官軍船艦訪作長岐棖以距之桔橰不得為害而賊從青草湖密抄官軍又遣其將張彥䧟豫章焚燒城邑王敦時鎮湓口遣督䕶繆㽔李恒受訪節度共撃彥㽔於豫章石頭與彥交戰彥軍退走訪率帳下將李午等追彥破之臨陣斬彥時訪為流矢所中折前兩齒形色不變及暮訪與賊隔水賊衆數倍自知力不能敵乃密遣人如樵採者而出於是結陳鳴鼓而來大呼曰左軍至士卒皆稱萬歳至夜令軍中多布火而食賊謂官軍益至未曉而退訪謂諸將曰賊必引退然終知我無救軍當還掩人宜促渡水北既濟斷橋訖而賊果至隔水不得進於是遂歸湘州訪復以舟師造湘城軍逹富口而弢遣杜𢎞出海昏時湓口騷動訪歩上柴桑偷渡與賊戰斬首數百賊退保廬陵訪追撃敗之賊嬰城自守尋而軍糧為賊所掠退住巴邱糧廪既至復圍𢎞於廬陵𢎞大擲寶物於城外軍人競拾之𢎞因陣亂突圍而出訪率軍追之獲鞍馬鎧仗不可勝數𢎞入南康太守將率兵逆擊又破之奔于臨賀帝又進訪龍驤將軍王敦表為豫章太守加征討都督賜爵尋陽縣侯時梁州刺史張光卒愍帝以侍中第五猗為征南大將軍監荆梁益寧四州出自武闗賊帥杜曽摯瞻胡混等並迎猗奉之聚兵數萬破陶侃於石城攻平南將軍荀崧於宛不尅引兵向江陵王敦以從弟廙為荆州刺史令督征虜將軍趙誘襄陽太守朱軌陵江將軍黄峻等討曾而大敗於女觀湖誘軌並遇害曾遂逐廙徑造沔口大為寇害威振江沔元帝命訪擊之訪有衆八千進至沌陽曾等鋭氣甚盛訪曰先人有奪人之心軍之善謀也使將軍李恒督左甄許朝督右甄訪自領中軍高張旗幟曾果畏訪先攻左右甄曾勇冠三軍訪甚惡之自於陣後射雉以安衆心令其衆曰一甄敗鳴三鼓兩甄敗鳴六鼓趙允領其父餘兵屬左甄力戰敗而復合允馳馬告訪訪怒叱令更進允號哭還戰自旦至申兩甄皆敗訪聞鼓音選精鋭八百人自行酒餘之敕不得妄動聞鼓音乃進賊未至三十歩訪親鳴鼓將士皆騰躍奔赴曾遂大潰殺千餘人訪夜追之諸將請待明日訪曰曾驍勇能戰向之敗也彼勞我逸是以尅之宜及其衰乘之可滅鼓進而行遂定漢沔曾等走固武當訪以功遷南中郎將督梁州諸軍梁州刺史屯襄陽訪謂其僚佐曰昔城濮之役晉文以得臣不死而有憂色今不斬曾禍難未已於是出其不意又擊破之曾遁走訪歩將蘇温收曾詣軍并獲第五猗胡混摯瞻等送於王敦又白敦説猗逼於曾不宜殺敦不從而斬之進位安南將軍持節都督刺史如故初王敦懼杜曾之難謂訪曰擒杜曾當相論為荆州刺史及是而敦不用至王廙去職詔以訪為荆州敦以訪名將勲業隆重有疑色其從事中郎郭舒説敦曰鄙州雖遇寇難荒弊實為用武之國若以假人將有尾大之患公宜自領訪為梁州足矣敦從之訪大怒敦手書譬釋并遺玉環玉椀以申厚意訪投椀於地曰吾豈賈豎可以寶悦乎隂欲圖之既在襄陽務農訓卒勤於採納守宰有闕輙補然後言上敦患之而憚其彊不敢有異訪威風既著遠近悦服智勇過人為中興名將性謙虚未嘗論功伐或問訪曰人有小善鮮不自稱卿功勲如此無一言何也訪曰朝廷威靈將士用命訪何功之有士以此重之訪練兵簡卒欲宣布中原與李知郭黙相結慨然有平河洛之志善於撫納士衆皆為致死聞敦有不臣之迹訪常切齒敦雖懐逆謀故終訪之世未敢為非初訪少時遇善相者廬江陳訓謂訪與陶侃曰二君位至方岳功名略同但陶侃得上壽周當下壽優劣更由年耳訪小侃一歲太興三年卒時年六十一帝哭之甚慟詔贈征西將軍諡曰壯立碑於夲郡二子撫光撫字道和彊毅有父風而將御不及元帝辟為丞相掾父喪去官服闋襲爵除鷹揚將軍武昌太守王敦命為從事中郎與鄧嶽俱為敦爪牙甘卓遇害敦以撫為沔北諸軍事南中郎將鎮沔中及敦作逆撫領二千人從之敦敗撫與嶽俱亡走撫弟光將資遺其兄而隂欲取嶽撫怒曰我與伯山同亡何不先斬我會嶽至撫出門遙謂之曰何不速去今骨肉尚欲相危況他人乎嶽廻船而走撫遂共入西陽蠻中蠻酋向蠶納之初嶽為西陽欲伐諸蠻及是諸蠻皆怨將殺之蠶不聴曰鄧府君窮來歸我我忍殺之由是俱得免明年詔原敦黨嶽撫詣闕請罪有詔禁錮之咸和初司徒王導以撫為從事中郎出為寧遠將軍江夏相蘇峻作逆率所領從温嶠討之峻平遷監沔北軍事南中郎將鎮襄陽石勒將郭敬率騎攻撫撫不能守率所領奔于武昌坐免官尋遷振威將軍豫章太守後代毌邱奥監巴東諸軍事益州刺史假節將軍如故尋進征虜將軍加督寧州諸軍事永和初桓温征蜀進撫督梁州之漢中巴西梓潼陰平四郡軍事鎮彭模撫撃破蜀餘寇隗文鄧定等斬偽尚書僕射王誓平南將軍王潤以功遷平西將軍隗文鄧定等復反立范賢子賁為帝初賢為李雄國師以左道惑百姓人多事之賁遂有衆一萬撫與龍驤將軍朱壽撃破斬之以功進爵建城縣公征西督䕶蕭敬文作亂殺征虜將軍楊謹據涪城自號益州牧桓温使督䕶鄧遐助撫討之不能㧞引退温又令梁州刺史司馬勲等會撫伐之敬文固守自二月至于八月乃出降撫斬之傳首京師升平中進鎭西將軍在州三十餘年興寧三年卒贈征西將軍諡曰襄子楚嗣楚字元孫起家參征西軍事從父入蜀拜鷹揚將軍犍為太守父卒以楚監梁益二州假節襲爵建城公世在梁益甚得物情時梁州刺史司馬勲作逆楚與朱序討平之進冠軍將軍太和中蜀盜李金銀廣漢妖賊李𢎞並聚衆為寇偽稱李勢子當以聖道王年號鳳皇又隴西人李高詐稱李雄子破涪城梁州刺史楊亮失守楚遣其子討平之是歳楚卒諡曰定子瓊嗣瓊勁烈有將略歴數郡代楊亮為梁州刺史建武將軍領西戎校尉初氐人竇衝求降朝廷以為東羌校尉後衝反欲入漢川安定人皇甫釗京兆人周勲等謀納衝瓊密知之收釗勲等斬之子虓嗣虓字孟威少有節操州召為祭酒後歴位至西夷校尉領梓潼太守寧康初苻堅將楊安寇梓潼虓固守涪城遣歩騎數千送母妻從漢水將抵江陵為堅將朱彤所獲虓遂降于安堅欲以為尚書郎虓曰䝉國厚恩以至今日但老母見獲失節於此母子獲全秦之惠也雖公侯之貴不以為榮況郎任乎堅乃止自是每入見堅輙箕踞而坐呼之為氐賊堅不悦屬元㑹威儀甚整堅謂虓曰晉家元會何如此虓攘袂厲聲曰戎狄集聚譬如犬羊相羣何敢比天子及呂光征西域堅出餞之戎士二十萬旌旗數百里又問虓曰朕衆力何如虓曰戎狄已來未之有也堅黨以虓不遜屢請除之堅待之彌厚虓乃宻書與桓沖説賊姦計太元三年虓潛至漢中堅追得之後又與堅兄子苞謀襲堅事泄堅引虓問其狀虓曰昔漸離豫讓燕智之微臣猶漆身吞炭不忘忠節況虓累世䝉恩豈敢忘也生為晉臣死為晉鬼復何問乎堅曰今殺之適成其名遂撻之徙于太原後堅復䧟順陽魏興獲二守皆執節不撓歎曰周孟威不屈於前丁彥遠潔已於後吉祖沖不食而死皆忠臣也虓竟以病卒於太原其子興迎致其喪􅃣軍將軍謝元親臨哭之上疏稱其忠烈為求襃贈於是孝武帝詔贈龍驤將軍益州刺史賻錢二十萬布百匹又贍賜其家撫弟光少有父風年十一見王敦敦謂曰貴郡未有將誰可用者光曰明公不恥下問竊謂無復見勝敦笑以為寧遠將軍尋陽太守及敦舉兵光率千餘人赴之既至敦已死光未之知求見敦王應祕不言以疾告光退曰今我逺來而不得見王公公其死乎遽見其兄撫曰王公已死兄何為與錢鳳作賊衆並愕然其夕衆散錢鳳走出至闔廬洲光捕鳳詣闕贖罪故得不廢蘇峻作逆随温嶠力戰有功峻平賜爵曲江男卒官子仲孫興寧初督寧州軍事振武將軍寧州刺史在州貪暴人不堪命桓温以梁益多寇周氏世有威稱復除仲孫監益州梁州之三郡寧康初楊安寇蜀仲孫失守免官後徵為光祿勲卒初陶侃微時丁艱將𦵏家中忽失牛而不知所在遇一老謂之曰前岡見一牛眠山汙中其地若𦵏位極人臣矣又指一山云此亦其次當世出二千石言訖不見侃尋牛得之因𦵏其處以所指别山與訪訪父死𦵏焉果為刺史著稱寧益自訪以下三世為益州四十一年如其所言云通志卷一百二十四下
