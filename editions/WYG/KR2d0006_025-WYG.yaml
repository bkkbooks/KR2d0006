body:
  text: 通志卷十八宋右廸功郎鄭樵漁仲撰隋紀第十八文帝煬帝恭帝高祖文皇帝姓楊氏諱堅小名那羅延本𢎞農華隂人漢太尉震之十四世孫也震八世孫燕北平太守鉉鉉子元夀魏初為武川鎭司馬因家于神武樹頽焉元夀生太原太守惠嘏惠嘏生平原太守烈烈生寧逺將軍禎禎生皇考忠初禎屬魏末喪亂避地中山結義徒以討鮮于修禮遂死之周保定中皇考著勲追贈柱國大將軍少保興城郡公皇考美須髯身長七尺八寸狀貎瓌偉武藝絶倫識量深重有將帥之畧年十八客游泰山㑹梁兵陷郡國没江南及北海王元顥入洛乃與俱歸顥敗爾朱度律召為帳下統軍後從獨孤信屢有軍功又與信從魏孝武西遷東魏荆州刺史辛纂據穰城皇考從信討之與都督康洛兒元長生乘城而入彎弓大呼斬纂以徇城中懾服居半嵗以東魏之逼與信俱歸周文帝召居帳下嘗從周文狩於龍門皇考獨當一猛虎左挾其腰右㧞其舌周文壯之北臺謂猛虎為揜于因以字之從禽竇泰破沙苑陣封襄武縣公河橋之役皇考與壯士五人力戰守橋敵人不敢進又與李逺破黑水稽胡并與怡峯解玉璧圍以功歴雲洛二州刺史芒山之戰先登䧟陣除大都督及侯景度江梁氏喪敗周文將經畧乃授皇考都督荆州等十五州諸軍事鎭穰城梁雍州刺史岳陽王蕭詧雖曰稱藩而尚懷貳心皇考自樊城觀兵漢濵易旗遞進實二千騎詧登樓望之以為三萬懼而服焉又攻梁隨郡尅之獲其守桓和所過城戍望風請服進圍安陸梁司州刺史桞仲禮恐安陸不守馳歸赴援諸將恐仲禮至則安陸難下請急攻之皇考曰仲禮已在近路吾以竒兵襲之一舉必尅則安陸不攻自拔諸城可傳檄而定於是選騎二千銜枚夜進遇仲禮於漴頭禽之悉俘其衆安陸竟陵並降梁元帝大懼送子方略為質并送載書請魏以石城為限梁以安陸為界皇考乃旋師進爵陳留郡公位大將軍十七年梁元帝逼其兄邵陵王綸綸送質於齊欲來冦梁元帝密報周文遣皇考討之禽綸數其罪殺之初皇考禽桞仲禮遇之甚厚仲禮至京反譖皇考言在軍大取金寳周文以皇考功重不問然皇考悔不殺仲禮故至此殺綸皇考間嵗再舉盡定漢東地甚得新附心魏㳟帝賜姓普六茹氏行同州事及于謹伐江陵皇考為前軍屯江津遏其走路梁人束刃於象鼻以戰皇考射之二象反走江陵平周文立蕭詧為梁主令皇考鎭穰城周孝閔踐阼入為小宗伯及司馬消難請降皇考與柱國逹奚武援之入齊境五百里前後遣三使報消難皆不反命及去北豫州三十里武疑有變欲還皇考曰有進死無退生獨以千騎夜趣城下候門開而入乃馳遣召武時齊鎭城伏敬逺勒甲士三千據東陴舉烽嚴警武憚之不欲保城乃多取財寳以消難先歸皇考以三千騎殿到洛南皆解鞍而卧齊衆來追至於洛北皇考謂將士曰但飽食今在死城賊必不敢度水食畢齊兵陽若度水皇考馳將擊之齊兵不敢逼遂徐引而還武歎曰達奚武自言是天下健兒今日服矣進位柱國大將軍武成元年進封隋國公邑萬户别食竟陵縣一千户收其租賦保定二年為大司空時朝議與突厥伐齊公卿以齊兵彊國冨斛律明月不易可當兵非十萬衆不可皇考獨曰萬騎足矣明月豎子亦何能為三年乃以皇考為元帥大將軍楊纂李穆王傑爾朱敏及開府元夀田𢎞慕容近等皆𨽻焉又令達奚武帥步騎三萬自南道進期會晉陽皇考乃留敏據什賁游兵河上皇考出武川過故宅祭先人饗將士席卷二十餘城齊人守陘嶺之隘皇考縱竒兵大破之留楊纂屯靈邱為後拒突厥木杆可汗控地頭可汗歩離可汗等以十萬騎來會四年正月朔攻晉陽時大雪風寒齊人乃悉其精鋭鼔譟而出突厥引上西山不肯戰衆失色皇考乃率七百人歩戰死者十四五以武後期乃班師齊人亦不敢逼突厥乃縱兵大掠自晉陽至平城七百餘里人畜無遺周武帝拜皇考為太傅晉公護以其不附已以為涇州總管是嵗大軍又東伐晉公護出洛陽令皇考出沃野以應接突厥時軍糧少諸將憂之皇考曰當權以濟事耳乃招誘稽胡首領咸令在坐使王傑盛軍容鳴鼓而出皇考陽怪問之傑曰大冢宰已至洛陽天子聞銀夏間胡擾動故使傑就攻除之又令突厥使者馳告曰可汗更入并留兵馬十萬在長城下故令問公若有稽胡不服欲來共破之坐者皆懼皇考慰喻遣之於是歸命饋輸塡積屬晉公護先退皇考亦罷兵而還鎭又以政績稱詔賜錢三千萬布五百疋穀二千斛以疾還京周武帝及晉公護屢臨視焉薨贈太保都督同朔等十二州軍事同州刺史本官如故諡曰桓公開皇元年追尊為武元皇帝廟號太祖帝武元皇帝之長子也皇妣曰呂氏以周大統七年六月癸丑夜生帝於馮翊波若寺有紫氣充庭時有尼來自河東謂皇妣曰此兒所從來甚異不可於俗間處之乃將帝舍於别舘躬自撫養皇妣抱帝忽見頭上出角徧體起鱗墜帝于地尼自外見曰已驚我兒致令晩得天下帝龍頷額上有五柱入頂目光外射有文在手曰王字長上短下沈深嚴重初入大學雖至親昵不敢狎也年十四京兆尹薛善辟為功曹十五以皇考勲授散騎常侍車騎大將軍儀同三司封成紀縣公十六遷驃騎大將軍加開府周文帝見而歎曰此兒風骨非世間人明帝即位授右小宗伯進封大興郡公明帝常遣善相者來和視帝和詭對曰不過柱國既而私謂帝曰公當為天下君必大誅殺而後定周武帝即位遷小宗伯出為隨州刺史進位大將軍後徵還遇皇妣寢疾三年晝夜不離左右以純孝稱宇文䕶執政尤忌帝屢將害焉賴大將軍侯伏侯壽等救䕶以免後襲爵隋國公周武既為皇太子聘帝長女為妃益加禮重齊王憲言於周武曰普六茹堅相貎非常臣每見之不覺自失恐非人下請早除之周武曰此止可為將耳内史王軌驟諫曰皇太子非社稷主普六茹堅有反相周武不悅曰必有天命將若之何帝甚懼深自晦匿後從周武平齊進柱國又與齊王憲破齊任城王湝於冀州除定州總管先是州城門久閉不行齊人自文宣時或請開之文宣不許曰當有聖人啓之及帝至而開之莫不驚異遷亳州總管周宣帝即位以后父徴拜上柱國大司馬大象元年遷大後丞右司武俄轉大前疑周宣帝每廵幸恒委以居守時宣帝為刑經聖制其法深刻帝以法令滋章非興化之道切諫不納帝位望益隆宣帝頗以為忌時宣帝有四幸姬並為皇后争寵相毁宣帝每謂后曰必族滅爾家因召帝命左右曰若色動即殺之帝容色自若遂免二年五月以帝為揚州總管將發暴足疾而止乙未宣帝不悆時静帝幼冲前内史上大夫鄭譯御正大夫劉昉以帝皇后之父衆望所集遂矯詔引帝入侍疾因受遺輔政都督内外諸軍事帝恐周武諸王在藩生變稱趙王招將嫁女於突厥為詞以徵之己酉宣帝崩庚戌静帝詔帝假黄鉞左大丞相百官總已而聽焉以正陽宮為丞相府以鄭譯為長史劉昉為司馬具置寮佐周宣時刑政峻酷者悉更以寛大之制天下歸心矣六月趙王招陳王純越王逹代王盛滕王逌並至長安相州總管尉遲迥自以宿將至是不能平遂舉兵趙魏之士響應旬日間衆至十餘萬宇文胄以榮州石愻以建州席毗以沛郡毗弟义羅以兖州皆應迥遣子質於陳以求援帝命上柱國鄖公韋孝寛討之雍州牧畢王賢及趙陳等五王謀作亂帝執賢斬之而掩趙王等罪因詔五王劒履上殿入朝不趨以安之時五王隂謀滋甚帝以酒肴造趙王觀其指趙王伏甲於卧内帝賴元胄以免於是誅趙越二王八月庚午韋孝寛破尉遲迥斬之傳首闕下餘黨悉平初迥之亂鄖州總管司馬消難據州應迥淮南州縣多從之襄州總管王誼討之消難奔陳荆郢羣蠻乘釁而起命亳州總管賀若誼討平之先是上柱國王謙為益州總管亦擁衆巴蜀以匡復為辭帝以東夏山南為事未遑致討謙遂出劒口陷始州至是乃命上柱國梁睿討平之傳首闕下隳劒閣之險以絶姦亂之萌焉九月壬子周帝進帝大丞相十月周帝詔追贈皇曾祖烈為柱國太保都督徐兖等十州諸軍事徐州刺史隋國公諡曰康皇祖禎為柱國太傅都督陜蒲等十三州諸軍事同州刺史隋國公諡曰獻皇考忠為上柱國太師大冢宰都督冀定等十三州諸軍事雍州牧壬戌誅陳王純周帝進帝大冢宰五府總於天官十一月辛未誅代王逹滕王逌十二月甲子周帝授帝相國總百揆去都督内外諸軍事大冢宰之號進爵為王以隋州之崇業鄖州之安陸城陽溫州之冝人應州之平靖上明順州之淮南士州之永川昌州之廣昌安昌申州之義陽淮安息州之新蔡建安豫州之汝南臨潁廣寧初安蔡州之蔡陽郢州之漢東二十郡為隋國劒履上殿入朝不趨贊拜不名備九錫之禮加璽紱逺游冠相國印綠綟綬位在諸侯王上隋國置丞相以下一依舊式帝再讓乃授王爵十郡而已周帝詔進皇祖皇考爵並為王夫人為王妃大定元年二月壬子下令曰以前賜姓皆復其舊甲寅帝受九錫之禮丙辰周帝又詔帝冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲䍐樂舞八佾設鐘簴宫縣王妃為王后世子為太子前後三讓乃受俄而下詔依唐虞漢魏故事帝三讓不許乃遣太傅上柱國把國公椿奉冊大宗伯大將軍金城公趙煚奉皇帝璽紱于隋宫百官勸進帝乃受焉開皇元年春二月甲子自相府常服入宫備禮即皇帝位於臨光殿設壇於南郊遣兼太傅上柱國鄧公竇熾柴燎告天是日告廟大赦改元京師慶雲見改周官依漢魏之舊制以柱國司馬高熲為尚書左僕射兼納言相國司録虞慶則為内史監兼吏部尚書相國内郎李德林為内史令上開府韋世康為禮部尚書上開府元暉為都官尚書開府户部尚書元巖為兵部尚書上儀同司宗長孫毗為工部尚書上儀同司會楊尚希為度支尚書雍州牧楊惠為左衞大將軍乙丑追尊皇考為武元皇帝廟號太祖皇妣吕氏為元明皇后改周氏左社右廟制為右社左廟遣八使廵省風俗丙寅修廟社立王后獨孤氏為皇后王太子勇為皇太子丁卯以大將軍趙煚為尚書右僕射以上開府伊婁彦恭為右武侯大將軍己巳以五千户封周帝介國公為隋室賔旌旗車服禮樂一如其舊上書不為表答表不稱詔周氏諸王盡降為公辛未以皇弟同安郡公爽為雍州牧乙亥封皇弟邵國公慧為滕王同安公爽為衞王皇子鴈門公廣為晉王俊為秦王秀為越王諒為漢王并州總管李穆為太師上柱國竇熾為太傅幽州總管于翼為太尉觀國公田仁恭為太子太師武徳郡公桞敏為太子太保丁丑以晉王廣為并州總管封陳留郡公智積為蔡王興城郡公静為道王戊寅改東京府為尚書省發官牛五千頭分賜貧人三月宣仁門槐樹連理衆枝内附壬午白狼國獻方物丁亥詔犬馬器翫口味不得獻上戊子弛山澤禁己丑移盩厔連理樹植于宫庭戊戌以太子少保蘇威兼納言吏部尚書庚子詔前代品爵悉依舊定丁未梁蕭巋使其太宰蕭巖來賀夏四月辛巳大赦戊戌太常散樂並免為編户禁雜樂百戲辛丑陳人來聘于周至而上已受禪致之介國是月發稽胡修築長城二旬而罷五月戊午封䢴國公楊雄為廣平王永康郡公楊𢎞為河間王辛未介公薨上舉哀於朝堂諡曰周静帝六月癸未詔以初受命赤雀降祥推五徳相生為火色其郊及社廟依服冕之儀而朝會之服旗幟犧牲盡尚赤戎服尚黄秋七月乙卯上始服黄百寮畢賀八月壬午廢東京官甲午遣樂安公元諧擊吐谷渾於青海破而降之九月戊申遣使振給戰亡者家庚午陳將周羅㬋攻陷胡墅蕭摩訶冦江北辛未以越王秀為益州總管改封蜀王壬申以薛公長孫覽宋安公元景山並為行軍元帥伐陳仍令尚書左僕射高熲節度諸軍是月行五銖錢冬十月乙酉百濟王扶餘昌遣使來賀授昌上開府儀同三司帶方郡公戊子行新律壬辰行幸岐州十一月乙卯以永富郡公竇榮定為右武侯大將軍遣兼散騎侍郎鄭撝使於陳己巳有流星聲如隤墻光照于地十二月甲申以禮部尚書韋世康為吏部尚書庚子至自岐州壬寅高麗王高陽遣使朝貢授陽大將軍遼東郡公太子太保桞敏卒是嵗靺鞨突厥阿波可汗沙鉢略可汗並遣使朝貢二年春正月庚申陳宣帝殂辛酉置河北道行臺尚書省於并州以晉王廣為尚書令置河南道行臺尚書省於洛州以秦王俊為尚書令置西南道行臺尚書省於益州以蜀王秀為尚書令戊辰陳人遣使請和求歸胡墅甲戍詔舉賢良二月己丑詔以陳有喪命高熲等班師庚寅加晉王廣左武衞大將軍秦王俊右武衞大將軍庚子京師雨土三月初命入宫殿門通籍戊申開渠引杜陽水於三畤原四月丁丑以寧州刺史竇榮定為左武侯大將軍韓僧夀破突厥於雞頭山上柱國李充破突厥於河北山五月戊申以上開府長孫平為度支尚書己酉上以旱親省囚徒其日大雨己未高寶寧冦平州突厥入長城庚申以豫州刺史皇甫績為都官尚書甲子改傳國璽曰受命璽丁卯制民年六十以上免課六月壬午以大府卿蘇孝慈為兵部尚書甲申使使弔陳乙酉上柱國李充破突厥于馬邑丙申詔遷都龍首山命左僕射高熲將作大匠劉龍鉅鹿郡公賀婁子幹太府少卿高龍义等創造新都秋七月癸巳詔新置都處墳墓令悉遷葬設祭仍給人功無主者命官為殯𦵏甲午行新令冬十月以撤毁故徙居東宫給内外宫人祿癸酉皇太子勇屯兵咸陽以備胡虜庚寅上疾愈享百寮於觀徳殿賜錢帛皆任自取盡力以出辛卯以營新都副監賀婁子幹為工部尚書十一月丙午初命為方陣戰法及制軍營圖様下諸軍府以擬征突厥十二月辛未上講武于後園甲戍上柱國竇毅卒丙子名新都曰大興城乙酉遣彭城公虞慶則屯𢎞化以備胡突厥冦周槃行軍總管逹奚長儒為虜所敗丙戍賜國子生經明者束帛丁亥親録囚徒是嵗高麗百濟並遣使朝貢三年春正月庚子將遷新都大赦禁大刀長矟始令人以二十一成丁嵗役功不過二十日不役者收庸廢遠近酒坊罷鹽井禁二月己巳朔日有蝕之癸酉陳人來聘突厥犯邊癸未以左武衞大將軍李禮成為右武衞大將軍三月丁未上柱國鮮虞縣公謝慶恩卒丙辰以雨故常服入新都京師承明里醴泉出丁巳詔購遺書於天下癸亥城榆闗夏四月己巳衞王爽大破突厥於白道山停築原陽雲内紫河等鎭而還上柱國建平郡公于義卒庚午吐谷渾冦臨洮洮州刺史皮子信死之壬申以尚書右僕射趙煚兼内史令丁丑以滕王瓚為雍州牧庚辰行軍總管隂夀大破高寳寧于黄龍甲申以旱故上親祀雨師丙戍詔天下勸學行禮己丑陳郢州城主張子譏遣使請降上以和好不納辛卯遣兼散騎常侍薛舒聘於陳癸巳上親雩五月癸卯太尉任城公于翼薨行軍總管李晃破突厥於摩那渡口乙巳梁太子蕭琮來賀遷都辛酉親祀方澤壬戍行軍元帥竇榮定破突厥及吐谷渾於涼州赦黄龍死罪以下六月庚午封衞王爽子集為遂安郡王戊寅突厥遣使求和庚辰行軍總管梁逺破吐谷渾於爾汗山斬其名王秋七月壬戍詔徃者山東河表經此妖亂孤城逺守多不自全濟隂太守杜猷身陷賊徒命懸逆手郡省事范臺玟傾産營護免其戮辱眷言誠節實有可嘉宜超爵賞用明沮勸臺玟可大都督假湘州刺史丁卯日有蝕之八月壬午遣尚書右僕射高熲出寧州道吏部尚書虞慶則出原州道並為行軍元帥以擊胡戊子親祀太社九月壬子幸城東觀穀稼癸丑大赦冬十月甲戍廢河南道行臺省十一月發使廵省風俗庚辰陳人來聘陳主知帝貎異世人使副使袁彦圖像而去甲午罷天下諸郡十二月乙卯遣兼散騎常侍唐令則使於陳戊午以刑部尚書蘇威為户部尚書是嵗高麗突厥靺鞨並遣使朝貢四年春正月甲子朔日有蝕之祀太廟辛未祀南郊壬申梁主蕭巋來朝甲戍大射於北苑十日而罷壬午齊州水辛卯渝州獲獸似麋一角同蹄壬辰班新歴二月乙巳上餞梁主于霸上庚戌行幸隴州突厥可汗阿史那玷厥率其屬來降夏四月己亥敕總管刺史父母及子年十五以上不得將之官庚子以吏部尚書虞慶則為尚書右僕射瀛州刺史楊尚希為兵部尚書毛州刺史劉仁恩為刑部尚書五月癸酉契丹主莫賀弗遣使請降拜大將軍六月庚子降囚徒壬子開通濟渠自渭逹河以通運漕甲寅制官人非戰功不授上柱國以下戎官以雍同華岐宜五州旱命無出今年租調戊午秦王俊來朝秋七月丙寅陳人來聘八月甲午遣十使廵省天下戊戍衞王爽來朝壬寅上柱國太傅鄧公竇熾薨乙卯陳將夏侯苗請降上以通和不納九月己巳上親錄囚徒庚午契丹内附甲戍以關中饑行幸洛陽冬十一月壬戍遣兼散騎常侍薛道衡使於陳甲戍改周十二月為臘蜡是嵗靺鞨及女國並遣使朝貢五年春正月戊辰詔行新禮壬申詔罷江陵總管其後梁主請依舊許之三月戊午以尚書左僕射高熲為左領軍大將軍以上柱國宇文忻為右領軍大將軍夏四月甲午契丹遣使朝貢壬寅上柱國王誼謀反誅乙卯詔徵山東大儒馬榮伯等戊申車駕至自洛陽五月甲申初置義倉梁主蕭巋殂遣上大將軍元契使于突厥阿波可汗秋七月庚申陳人來聘壬午突厥沙鉢略可汗上表稱臣八月甲辰河南諸州水遣户部尚書蘇威振給之戊申有流星數百四散而下九月乙丑改鮑陂曰杜陂霸水曰滋水丙子遣兼散騎常侍李若使於陳冬十一月丁卯晉王廣來朝十二月丁未降囚徒六年春正月甲子党項羌内附庚子班歴於突厥壬申使户部尚書蘇威廵省山東二月乙酉山南荆浙七州水遣前工部尚書長孫毗振恤之丙戍制刺史上佐每嵗暮更入朝上考課丁亥發丁男十一萬修築長城二旬而罷庚子大赦三月己未洛陽男子高徳上書請帝為太上皇傳位皇太子帝曰朕承天命撫育蒼生日旰孜孜猶恐不逮豈學近代帝王事不師古傳位於子自求逸樂哉癸亥突厥沙鉢略可汗遣使朝貢夏四月己亥陳人來聘秋七月辛亥河南諸州水乙丑京師雨毛如馬騣尾長者二尺餘短者有六七寸八月辛卯關内七州旱蠲其賦稅遣散騎常侍裴世豪使于陳戊申上柱國太師申公李穆薨閏月丁卯皇太子鎮洛陽辛未晉王廣秦王俊並來朝丙子上柱國郕公梁士彦上柱國把公宇文忻柱國舒公劉昉謀反伏誅上柱國許公宇文善有罪除名九月辛巳帝素服御射殿詔百寮射賜梁士彦三家資物丙戍上柱國宋安公元景山卒辛丑詔振恤大象以來死事之家冬十月己酉以河北道行臺尚書令并州總管晉王廣為雍州牧餘官如故以兵部尚書楊尚希為禮部尚書癸丑置山南道行臺尚書省於襄州以秦王俊為尚書令七年春正月癸巳祀太廟乙未制諸州嵗貢三人二月丁巳祀朝日於東郊己巳陳人來聘壬申幸醴泉宫是月發丁男十萬修築長城二旬而罷夏四月庚戍於揚州開山陽瀆以通運漕突厥沙鉢略可汗卒癸亥頒靑龍符於東方總管刺史西方以白虎南方以朱雀北方以元武甲戍遣兼散騎常侍楊周使于陳以户部尚書蘇威為吏部尚書五月乙亥朔日有蝕之己卯隕石於武安滏陽間十餘里秋七月己丑衞王爽薨八月庚申梁王蕭琛來朝九月乙酉梁安平王蕭巖掠於其國以奔陳辛卯廢梁國曲赦江陵以梁王蕭琛為柱國封莒國公冬十月庚申行幸同州以先帝所居故曲赦囚徒癸亥幸蒲州丙寅宴父老上極歡曰此間人物衣服鮮麗容止閑雅良由仕宦之鄉陶染成俗也十一月甲午幸馮翊祠故社父老對詔失㫖上大怒免其縣官而去戊戍車駕至自馮翊八年春正月乙亥陳人來聘二月辛酉陳人冦陜州三月辛未上柱國隴西公李詢卒甲戌遣兼散騎常侍程尚賢使于陳戊寅詔大舉伐陳秋八月丁未河北諸州飢遣吏部尚書蘇威振恤之九月癸巳嘉州言龍見冬十月己未置淮南行臺省於夀春以晉王廣為尚書令辛酉陳人來聘拘留不遣甲子有星孛于牽牛享太廟授律令晉王廣秦王俊清河公楊素並為行軍元帥以伐陳於是晉王出六合秦王出襄陽清河公楊素出信州荆州刺史劉仁恩出江陵冝陽公王世積出蘄春新義公韓擒虎出廬江襄邑公賀若弼出呉州洛藂公燕榮出東海合總管九十兵五十一萬八千皆受晉王節度東接滄海西拒巴蜀旌旃舟檝横亘數千里仍曲赦陳國十一月丁卯車駕餞師詔購陳叔寳位上柱國萬户公乙亥行幸定城陳師誓衆丙子幸河東十二月車駕至自河東九年春正月癸酉以尚書左僕射虞慶則為右衞大將軍丙子賀若弼敗陳師於蔣山獲其將蕭摩訶韓擒虎進師入建鄴獲陳主叔寳陳國平得州四十郡一百縣四百户五十萬口二百萬癸巳遣使持節廵撫之二月乙未廢淮南尚書省丙申制五百家為鄉正一人百家為里長一人夏四月己亥幸驪山親勞旋師乙巳三軍凱入獻俘於太廟以晉王廣為太尉庚戍帝御廣陽門宴將士頒賜各有差辛亥大赦以陳都官尚書孔範散騎常侍王瑳王儀御史中丞沈觀等邪佞於其主以致亡滅皆投之邊裔陳人普給復十年軍人畢世免徭役擢陳之文武衆才而用之官奴數千可歸者歸之其餘盡以分賜將士及王公貴臣其資物皆於五垜賜王公以下大射毁所得秦漢三大鐘越二大鼓又設亡陳女樂謂公卿等曰此聲似啼朕聞之甚不喜故與公等一聼亡國之音俱為永鍳焉辛酉以吏部侍郎宇文㢸為刑部尚書宗正卿楊异為工部尚書壬戍詔曰今率土大同含生遂性兵可立威不可不戢刑可助化不可專行禁衞九重之餘鎮守四方之外戎旅軍器皆冝停罷武力之子俱可學文民間甲仗悉皆除毁閏月丁丑頒木魚符於總管刺史雌一雄一己卯以吏部尚書蘇威為尚書右僕射六月乙丑以荆州總管楊素為納言丁卯以吏部侍郎盧愷為禮部尚書時羣臣咸請封禪詔不許曰豈可命一將軍除一小國以薄徳而封名山用虚言而干上帝耶八月壬戍以廣平王雄為司空冬十一月壬辰定州刺史豆盧通等上表請封禪上不許庚子以右衞軍大將軍虞慶則為右武侯大將軍右領軍將軍李安為右領軍大將軍甲寅降囚徒十二月甲子詔太常卿牛𢎞通直散騎常侍許善心祕書丞姚察通直郎虞世基等議定樂十年春正月乙未以皇孫昭為河南王楷為華陽王二月庚申幸并州夏五月乙未詔以魏末喪亂兵士軍人權置坊府居處無定自今軍人可悉屬州縣墾田籍帳一同編户軍府統領冝依舊式罷山東河南及北方緣邊之地新置軍府六月辛酉制人年五十免役折庸秋七月癸卯以納言楊素為内史令庚戌上親録囚徒辛亥高麗遼東郡公高陽卒八月壬申遣柱國韋洸上開府王景並持節廵撫嶺南百越皆服九月丁酉至自并州冬十月甲子頒木魚符於京官五品以上十一月辛卯幸國學頒賜各有差辛丑祀南郊是月婺州人汪文進會稽人高智慧蘇州人沈元懀皆舉兵反自稱天子樂安蔡道人饒州呉代華永嘉沈孝徹泉州王國慶餘杭楊寳英交阯李春等皆自稱大都督詔内史令楊素討平之是嵗吐谷渾契丹並遣使來朝貢十一年春正月丁酉以平陳所得古器多為妖變悉命毁之丙午皇太子妃元氏薨上舉哀於東宫文思殿二月戊午以大將軍蘇孝慈為工部尚書丙子以臨潁令劉曠政績尤異擢為莒州刺史辛巳晦日有蝕之夏五月乙巳以右衞將軍元旻為左衞大將軍秋八月壬申滕王瓚薨乙亥上柱國沛國公鄭譯卒是嵗高麗靺鞨並遣使朝貢突厥獻七寳盌十二年春正月己巳以蜀王秀為内史令兼右領軍大將軍以漢王諒為雍州牧右衞大將軍秋七月乙巳尚書右僕射邳公蘇威禮部尚書容城侯盧愷並坐事除名壬申晦日有蝕之八月甲戌制天下死罪諸州不得便决皆令大理覆之癸巳制宿衞者不得輙離所守丁酉上柱國楚公豆盧勣卒戊戍上親錄囚徒冬十月丁丑以遂安王集為衞王壬午祀太廟至太祖神主前帝流涕嗚咽不自勝十一月辛亥祀南郊己未上柱國新義公韓擒虎卒甲子百寮大射於武徳殿十二月乙酉以内史令楊素為尚書右僕射是嵗突厥吐谷渾靺鞨並遣使朝貢十三年春正月乙巳上柱國郇公韓建業卒壬子祀感生帝己未以信州總管韋世康為吏部尚書壬戍行幸岐州二月丙子詔營仁夀宫丁亥至自岐州己卯立皇孫暕為豫章王戊子晉州刺史南陽郡公賈悉逹隰州總管撫寧郡公韓延等以賄伏誅己丑制坐事去官者配防一年丁酉制私家不得隱藏緯侯圖䜟夏五月癸亥詔禁人間撰集國史臧否人物秋七月戊辰晦日有蝕之九月丙辰降囚徒庚申封卲公楊綸為滕王冬十一月乙卯上柱國華隂公梁彦光卒是嵗契丹霫室韋靺鞨並遣使朝貢十四年夏四月乙丑詔曰比命有司總令研究正樂雅聲詳定已訖冝即施用見行者停人間音樂流僻日久棄其舊體競造繁聲流宕不歸遂以成俗冝加禁約務存其本五月辛酉京師地震關内諸州旱六月丁卯詔省府州縣皆給廨田不得興生與人争利秋七月乙未以邳公蘇威為納言八月辛未闗中大旱人飢行幸洛陽并命百姓山東就食冬閏十月甲寅詔曰梁齊陳徃皆創業一方綿歴年代既宗祀廢絶祭奠無主興言矜念良以愴然莒國公蕭琮及高仁英陳叔寳等冝令以時世修祭祀所須器物有司給之乙卯制外官九品以上父母及子年十五不得從之官十一月壬戍制州縣佐史三年一代不得重任癸未有星孛于角亢十二月乙未東廵狩十五年春正月壬戍車駕次齊州親問疾苦丙寅旅王符山庚午以嵗旱祀太山以謝愆咎大赦二月丙辰禁私家畜兵器關中緣邉不在其例禁河以東無得乘馬丁巳上柱國蔣公梁睿卒三月乙未車駕至自東廵望祭五嶽海瀆丁亥幸仁夀宫夏四月己丑朔大赦甲辰以趙州刺史楊逹為工部尚書五月丁亥制京官五品以上佩銅魚符六月戊子詔鑿砥柱庚寅相州刺史豆盧通貢綾文布命焚之于朝堂辛丑詔名山未在祀典者悉命祀之秋七月甲戍遣邳公蘇威廵省江南戊寅至自仁夀宫辛巳制九品以上官以理去官者並聽執笏冬十二月戊子敇盗邊糧一升以上皆斬籍没其家己丑詔文武官以四考更代是嵗吐谷渾林邑等國並遣使朝貢十六年春二月丁亥封皇孫裕為平原王筠為安成王嶷為安平王恪為襄城王該為高陽王韶為建安王煚為潁川王夏六月甲午制工商不得進仕并州大蝗辛丑詔九品以上妻五品以上妾夫亡不得改嫁秋八月庚戍詔决死罪者三奏而後行刑冬十月己丑幸長春宫十一月壬子至自長春宫十七年春二月癸未太平公史萬嵗伐西寧剋之庚寅行幸仁夀宫庚子上柱國王世積討柱州賊李光仕平之三月丙辰詔諸司屬官有犯聼於律令外斟酌決杖辛酉上親録囚徒癸亥上柱國彭城公劉昶以罪伏誅庚午遣御史栁彧皇甫誕廵省河南北夏四月戊寅頒新歴五月庚申宴百寮於玉女泉班賜各有差己巳蜀王秀來朝閏月己夘羣鹿入殿門馴擾侍衞之内秋七月丁丑桂州人李世賢反遣右武侯大將軍虞慶則討平之丁亥并州總管秦王俊坐事免以王就第九月甲申車駕至自仁夀宫庚寅上謂侍臣曰廟庭設樂本以迎神齋祭之日觸目多感當此之際何可為心在路奏樂禮為未允公卿冝更詳之冬十月丁未頒銅虎符於驃騎車騎府戊申道王静薨庚午詔自今享廟日不須備鼓吹殿庭勿設樂縣辛未京下大索十二月壬子上柱國右武侯大將軍魯公虞慶則以罪伏誅是嵗高麗突厥並遣使朝貢十八年春正月辛丑詔曰呉越之人徃承弊俗所在之處私造大船因相聚結致有侵害江南諸州人間有船長三丈以上悉括入官二月甲辰幸仁夀宫丁巳以漢王諒為行軍元帥水陸三十萬伐高麗夏五月辛亥詔畜猫鬼蠱毒厭魅野道之家投于四裔六月丙寅詔黜高麗王高元官爵秋八月丙子詔京官五品以上總管刺史舉志行修謹清平幹濟之士九月己丑漢王諒師遇疾疫而旋死者十二三庚寅敇舍客無公驗者坐及刺史縣令辛夘車駕至自仁夀宫冬十一月甲戍帝親録囚徒癸未祀南郊十二月庚子上柱國夏州總管東萊公王景以罪伏誅是嵗自京師至仁夀宫置行宫十所把宋陳亳曹戴潁等州水詔並免庸調十九年春正月癸酉大赦戊寅大射于武徳殿二月己亥晉王廣來朝甲寅幸仁夀宫夏四月丁酉突厥利可汗内附逹頭可汗犯塞行軍總管史萬嵗擊破之六月丁酉以豫章王暕為内史令秋八月癸卯上柱國尚書左僕射齊公高熲坐事免辛亥上柱國皖城公張威卒甲寅上柱國城陽公李徹卒九月乙丑以太常卿牛𢎞為吏部尚書冬十月甲午以突厥利可汗為啓民可汗築大利城處其部落十一月有司言元年已來日漸長十二月乙未突厥都藍可汗為部下所殺國大亂星隕於勃海二十年春正月辛酉朔突厥高麗契丹並遣使朝貢二月丁丑無雲而雷三月辛夘熙州人李英林反遣行軍總管張衡討之夏四月壬戍突厥犯塞以晉王廣為行軍元帥擊破之乙亥天有聲如寫水自南而北六月丁丑秦王俊薨秋九月丁未車駕至自仁夀宫冬十月乙丑廢皇太子勇及其諸子並為庶人殺柱國太平公史萬嵗己巳殺左衞大將軍五原公元旻十一月戊子以晉王廣為皇太子天下地震京城大風雪十二月戊午詔東宫官屬於皇太子不得稱臣辛巳詔毁壞偷盗佛及天尊像嶽鎮海瀆神形者以不道論沙門壞佛像道士壞天尊像以惡逆論仁夀元年春正月乙酉朔大赦改元以尚書右僕射楊素為左僕射以納言蘇威為右僕射丁酉徙河南王昭為晉王突厥冦恒安遣柱國韓洪擊之敗焉以晉王昭為内史令辛丑詔曰投生殉節自古稱難殞身王事禮加二等而世俗之徒不逹大義致命戎旅不入兆域興言念此每深愍歎且入廟祭祀並不廢闕何止墳塋獨在其外自今戰亡之徒冝入墓域二月乙夘朔日有蝕之夏五月己丑突厥男女九萬餘口來降壬辰驟雨震雷大風㧞木冝君湫水移於始平六月乙夘遣十六使廵省風俗乙丑廢太學及州縣學唯留國子一學取正三品以上子七十二人充生員頒舍利於諸州秋七月戊戍改國子為太學十一月己丑祀南郊十二月楊素擊突厥大破之二年春三月己亥幸仁夀宫夏四月庚戍岐雍二州地震秋七月丙戍詔内外官各舉所知八月己巳皇后獨孤氏崩九月丙戍車駕至自仁夀宫壬辰河北諸州大水遣工部尚書楊逹振恤之乙未上柱國襄州總管金水公周揺卒隴西地震冬十月壬子曲赦益州管内癸丑以工部尚書楊逹為納言閏月甲申詔尚書左僕射楊素與諸術者刋定隂陽舛謬己丑詔左僕射越公楊素右僕射邳公蘇威吏部尚書竒章公牛𢎞内史侍郎薛道衡秘書丞許善心内史舍人虞世基著作郎王劭等修定五禮壬寅𦵏獻皇后於太陵十二月癸巳益州總管蜀王秀有罪廢為庶人交州人李佛子舉兵反遣行軍總管劉方討平之三年春二月戊子以大將軍蔡陽郡公姚辨為左武侯大將軍夏五月癸夘詔曰六月十三日是朕生日其日令海内為武元皇帝元明皇后㫁屠六月甲午詔三年之喪依禮十三月而祥中月而禫用合聖人之意秋七月丁夘詔州縣搜揚賢哲皆取明知古今通識安危究政教之本逹禮樂之原不限多少不得不舉徴召將送必須以禮八月壬申上柱國檢校幽州總管落藂公燕榮以罪伏誅九月壬戍置常平官甲子以營州總管韋冲為户部尚書十二月癸酉河南諸州水遣納言楊逹振恤之四年春正月丙辰大赦甲子幸仁夀宫夏四月乙夘上不豫六月庚午大赦有星入月中數日而退長人見於鴈門秋七月乙未日青無光八日乃復甲辰帝疾甚卧於仁夀宫與百寮辭訣上握手歔欷丁未崩于大寳殿時年六十四遺詔公卿大臣内外羣官勠力王室與皇太子廣共安天下朕雖瞑目何所復恨國家大事不可限以常制其㓙禮所須纔令周事務從節儉既𦵏公除悉遵舊典諸州總管刺史以下冝率其職不湏奔赴乙夘發喪河間楊栁四株無故黄落既而花葉復生八月丁夘梓宫至自仁夀宫丙子殯於大興前殿十月乙夘𦵏於太陵同墳而異六士庻赴𦵏者皆聼入視陵内帝性嚴重有威容外質木而内明敏有大略初得政之始羣情不附諸子幼弱内有六王之謀外致三方之亂握彊兵居重鎮者皆周之舊臣上推以赤心各盡其用不踰期月剋定三邊未及十年平一四海薄賦歛輕刑罰内修制度外撫戎夷每旦聼朝日昃忘倦居處服翫每事儉素令行禁止上下化之開皇仁夀之間丈夫不衣綾綺而無金玉之飾常服率多布帛装帶不過以銅鐡骨角而已雖嗇於財至於賞賜有功亦無所愛惜每乗輿四出路逄上表者駐馬親自臨問或潛遣行人采聼風俗吏政得失民間疾苦無不留意嘗遇闗中飢遣左右視百姓所食有得豆屑雜糠而奏之者上流涕以示羣臣深自咎責為之損膳而不御酒肉者殆將一期及東拜太山關中户口就食洛陽者道路相屬帝敇斥侯不得輙有驅逼男女參厠於仗衞之間遇逄扶老攜幼者輙引馬避之慰勉而去至艱嶮之處見負擔者遽令左右扶助之其有將士戰歿必加優賞仍令使者就家勞問自彊不息朝夕孜孜民庻殷繁帑藏充實雖未能致臻於至道亦足稱近代之良主然雅性沈猜素無學術好為小數言神燭聖杖堪能療病又信王劭觧石文以為已瑞不逹大體故忠臣義士莫得盡心竭辭其草創元勲及有功諸將誅夷獲罪罕有存者又不悦詩書楊素由之希㫖遂奏除學校唯婦言是用廢黜諸子逮于暮年持法尤峻喜怒失常果於殺戮嘗令左右送西域朝貢使出關其人所經之處受牧宰小物饋鸚鵡麖皮馬鞭之屬聞而大怒又詣武庫見署中蕪穢不治於是執武庫令及諸受遺者出開逺門外親自臨决死者數十人又徃徃潛令賂遺令史府史受者必死無所寛貸議者以此少之高祖開皇二十年仁夀四年即位二十四年煬皇帝諱廣一名英小字阿􅐣高祖第二子也母曰文獻獨孤皇后上美姿儀少敏慧高祖及后於諸子中特所鍾愛在周以高祖勲封鴈門郡公開皇元年立為晉王拜柱國并州總管時年十三㝷授武衛大將軍進上柱國河北道行臺尚書令大將軍如故高祖令項城公歆安道公才李徹輔導之上好學善屬文沈深嚴重朝野屬望高祖密令善相者來和徧視諸子和曰晉王眉上雙骨隆起貴不可言既而高祖幸上所居第見樂器絃多㫁絶又有塵埃若不用者以為不好聲伎之翫上尤自矯飾當時稱為仁孝嘗觀獵遇雨左右進油衣上曰士卒皆霑濕我獨衣此乎乃令持去六年轉淮南道行臺尚書令其年徵拜雍州牧内史令八年冬大舉伐陳以上為行軍元帥及陳平執陳湘州刺史施文慶散騎常侍沈客卿市令湯慧朗刑法監徐析尚書都令史暨慧以其邪佞有害於民斬之石闕下以謝三呉於是封府庫資財無所取天下稱賢進位太尉賜路車乘馬衮冕之服元珪白璧各一雙復拜并州總管俄而江南高智慧等相聚作亂徙上為揚州總管鎮江都每嵗一朝高祖之祠太山也領武候大將軍明年歸藩後數載突厥寇邊復為行軍元帥出靈武無虜而旋及太子勇廢立上為皇太子是月當受冊高祖曰吾以太興公成帝業令上出舍太興其夜烈風大雪地震山崩民舍多壊壓死者百餘口仁夀初奉詔廵撫東南是後高祖每避暑仁夀宫恒令上監國四年七月高祖崩上即位於仁夀宫八月奉梓宫還京師并州總管漢王諒舉兵反詔尚書左僕射楊素討平之九月乙巳以備身將軍崔彭為左領軍大將軍十一月乙未幸洛陽丙申發丁男十數萬掘塹自龍門東接長平汲郡抵臨清關度河至浚儀襄城逹于上洛以置關防癸丑詔營建東京於雒陽十二月乙丑右武衛將軍來䕶兒為右驍衛大將軍戊辰以柱國李景為右武衞大將軍以右衞率周羅睺為右武侯大將軍大業元年春正月壬辰朔大赦改元立妃蕭氏為皇后改豫州為溱州洛州為豫州廢諸州總管府丙申立晉王昭為皇太子丁酉以上柱國宇文述為左衞大將軍上柱國郭衍為左武衞大將軍延夀公于仲文為右衛大將軍己亥以豫章王暕為豫州牧戊申發八使廵省風俗詔令薦拔淹滯申逹幽枉孝悌力田給以優復鰥寡孤獨不能自存者量加賑濟義夫節婦旌表門閭高年之老加其板授篤疾之徒給以侍丁其有名行顯著操履修潔及學業才能一藝可取咸宜訪採將身入朝所在州縣以禮發遣其蠧政害民不便於時者使還之日具録奏聞己酉以呉州總管宇文㢸為刑部尚書二月己夘以尚書左僕射楊素為尚書令三月丁未詔尚書令楊素納言楊逹將作大匠宇文愷營建東京徙豫州郭下居民以實之戊申詔民下有知州縣官人政治苛刻侵害百姓背公徇私不便於民者聽詣朝堂封奏又於皂澗營顯仁宫採海内竒禽異獸草木之類以實園苑徙天下富商大賈數萬家於東京辛亥發河南諸郡男女七百萬開通濟渠自西苑引榖洛水逹于河自板渚引河通于淮庚申遣黄門侍郎王𢎞上儀同于士澄徃江南採木造龍舟鳯䑽黄龍赤艦樓船等數萬艘夏四月癸亥大將軍劉仲方擊林邑破之五月庚戍户部尚書義豐侯韋沖卒甲子熒惑入太微秋七月丁酉制戰亡之家給復十年丙午滕王綸衛王集並奪爵徙邊閏七月甲子以尚書令楊素為太子太師安德王雄為太子太傅河間王𢎞為太子太保丙子詔諸孝秀在家及見入學者若有篤志好古耽典悦禮學行優敏堪膺時務所在採訪具以名聞即當随其器能擢以不次若研精經術未願進仕可依其藝業深淺門䕃高卑雖未升朝並量凖給祿其國子等學亦宜申明舊制教習生徒具為課試之法以盡砥礪之道八月壬寅上御龍舟幸江都以左武衞大將軍郭衍為前軍右武衛大將軍李昞為後軍文武官五品已上給樓舩九品已上給黄篾舳艫相接二百餘里冬十月己丑赦江淮已南揚州給復五年舊總管内給復三年十一月己未以大將軍崔仲方為禮部尚書二年春正月辛酉東京成賜監督者有差以大理卿梁毗為刑部尚書丁夘遣十使併省州縣二月丙戍詔尚書令楊素吏部尚書牛𢎞大將軍宇文愷内史侍郎虞世基禮部侍郎許善心制定輿服始備輦輅及五時副車上常服皮弁十有二琪文官弁服佩玉五品已上給犢車通幰三公親王加油絡武官平巾幘袴褶三品以上給瓟槊下至胥吏服色各有差非庶人不得戎服戊戍置都尉官三月庚午車駕發江都先是太府少卿何稠太府丞雲定興盛修儀仗於是課州縣送羽毛百姓求捕之網羅被水陸禽獸有堪氅眊之用者殆無遺類至是而成夏四月庚戍上自伊闕陳法駕備千乗萬騎入於東京辛亥上御端門大赦天下免今年租賦癸丑以冀州刺史楊文思為民部尚書五月甲寅金紫光禄大夫兵部尚書李通坐事免乙夘詔自古以來賢人君子有功徳於民者並宜營立祠宇以時致祭墳壟之處不得侵踐有司量為條式以聞六月壬子以尚書令太子太師楊素為司徒進封豫章王暕為齊王秋七月癸丑以衞尉卿衞元為工部尚書庚申制百官不得計考増級必有德行功能灼然顯著者擢之壬戍擢藩邸舊臣鮮于羅等二十七人官爵有差甲戍皇太子昭薨乙亥上柱國司徒楚國公楊素薨八月辛邜封皇孫倓為燕王侗為越王侑為代王九月乙丑立秦王俊子浩為秦王冬十月戊子以靈州刺史叚文振為兵部尚書十二月庚寅詔自古以来帝王陵墓可給隨近十户蠲其雜役以供守視三年春正月癸亥敇并州逆人已流配而逃亡者所獲之處即宜斬決丙子長星竟天出於東壁二旬而止是月武陽郡上言河水清二月己丑彗星見於東井文昌歴太陵五車北河入太微掃帝座前後百餘日而止三月辛亥車駕還京師壬子以大將軍姚辯為左衛將軍癸丑遣羽騎朱寛使於流求國乙夘河間王𢎞薨夏四月庚辰詔曰古者帝王觀風俗皆所以憂勤兆庶安集遐荒自蕃夷内附未遑親撫山東經亂復加存恤今欲安輯河北廵省趙魏所司依式甲申頒律令大赦天下闗内給復三年壬辰改州為郡改度量衡並依古式改上柱國以下官為大夫甲午詔以孝悌徳行節義可稱操履清潔彊毅正直執憲不撓學業優敏文才美秀及才堪將畧力有驍壯者為十科令文武有職事者五品已上依令十科舉人有一於此不必求備朕當待以不次随才升用其見任九品已上官者不在舉送之限丙申車駕北廵狩丁酉以刑部尚書宇文㢸為禮部尚書戊戍敇百司不得踐暴禾稼其有須開為路者有司計地所收即以近倉酬賜務從優厚己亥至赤岸澤以太牢祭故太師李穆五月丁巳突厥啟民可汗遣子拓特勒来朝戊午發河北十餘郡丁男自太行山逹于并州以通馳道丙寅啓民可汗遣其兄子毗黎伽特勒来朝辛酉啓民可汗遣使請自入塞奉迎輿駕上不許癸酉有星孛于文昌上將星常皆動揺六月辛巳獵於連谷丁亥詔為高祖文皇帝别建廟宇以彰盛徳戊子次榆林郡丁酉啓民可汗来朝己亥吐谷渾高昌並遣使貢方物甲辰上御北樓觀漁于河以宴百寮秋七月辛亥啓民可汗上表請變服襲冠帶詔啓民贊拜不名位諸侯王上甲寅上於郡城東御大帳其下備儀衛建旌旗宴啟民及其部落三千五百人奏百戱之樂賜啟民及其部落各有差丙子殺光禄大夫賀若弼禮部尚書宇文㢸太常卿高熲尚書左僕射蘇威坐事免發丁男百餘萬築長城西距榆林東至紫河二旬而罷死者十五六八月壬午車駕發榆林乙酉啟民飾廬清道以候乗輿帝幸其帳啟民奉觴上夀宴賜極厚上謂高麗使者曰歸語爾王當早来朝見不然者吾與啓民廵彼土矣皇后亦幸義成公主帳己丑啟民可汗歸蕃癸巳入樓煩闗壬寅次太原詔營晉陽宫九月己未次濟源幸御史大夫張衡宅宴享極歡己巳至于東都壬申以齊王暕為河南尹開府儀同三司癸酉以户部尚書楊文思為納言四年春正月乙巳詔發河北諸郡男女百餘萬開永濟渠引沁水南逹于河北通涿郡庚戍百寮大射於允武殿丁夘賜城内居民米各十石壬申以太府卿元夀為内史令鴻臚卿楊元感為禮部尚書癸酉以工部尚書衛元為右武侯大將軍大理卿長孫熾為户部尚書二月己夘遣司朝謁者崔毅使突厥處羅致汗血馬三月辛酉以將作大匠宇文愷為工部尚書壬戍百濟倭赤土迦羅舍國並遣使貢方物乙丑車駕幸五原因出塞廵長城丙寅遣屯田主事常駿使赤土致羅罽夏四月丙午以離石之汾源臨泉鴈門之秀容為樓煩郡起汾陽宫癸丑以河内太守張定和為左屯衛大將軍乙夘詔於萬夀戍為突厥意利珍豆啓民可汗置城造屋其帷帳牀褥以上随宜量給務從優厚五月壬申蜀郡獲三足烏張掖獲元狐各一秋七月辛巳發丁男二十餘萬築長城自榆林谷而東乙未左翊衛大將軍宇文述破吐谷渾於曼頭赤水八月辛酉親祠恒岳河北道郡守畢集大赦天下車駕所經郡縣免一年租調九月辛未徵天下鷹師悉集東京至者萬餘人戊寅彗星出五車埽文昌至房而滅辛巳詔免長城役者一年租賦冬十月丙午詔立孔子後為紹聖侯令有司求其苖裔録以申上辛亥詔求周漢魏晉之胄緒並立後以存繼絶之義乙夘頒新式於天下五年春正月丙子改東京為東都癸未詔天下均田戊子上自東都還京師己丑制民間鐡义搭鈎䂎刅之類皆禁絶之太守每嵗密上屬官景迹二月戊戍次于閿鄉詔祭古帝王陵及開皇功臣墓庚子制魏周官不得為䕃辛丑赤土國遣使貢方物戊申車駕至京師丙辰宴耆舊四百人於武徳殿頒賜各有差己未上御崇徳殿之西院愀然不悦顧謂左右曰此先帝所居寔用増感情所未安於此院之西别營一殿壬戍制父母聼随子之官三月己巳車駕西廵河右庚午有司言武功男子史永遵與從父昆弟同居上嘉之賜物一百段米二百石表其門閭乙亥幸扶風舊宅夏四月己亥大獵於隴西壬寅高麗吐谷渾伊吾並遣使来朝乙巳次狄道党項羗来貢方物癸亥出臨津闗度黄河至西平陳兵講武五月乙亥上大獵於延山長圍周亘二千里庚辰入長寧谷壬午度星嶺甲申宴羣臣於金山之上丙戍梁浩亹御馬度而橋壞斬朝散大夫黄亘及督役者九人吐谷渾王率衆保覆袁川帝分命内史元夀南屯金山兵部尚書叚文振北屯雪山太僕卿楊義臣東屯琵琶峽將軍張夀西屯泥嶺四面圍之吐谷渾王伏允以數十騎遁出遣其名王詐稱伏允保車我眞山壬辰詔右屯衛大將軍張定和往捕之定和挺身挑戰為賊所殺亞將栁武建擊破之斬首數百級甲午其仙頭王窮蹙率男女十餘萬口来降六月丁酉遣左光禄大夫梁黙右翊衛將軍李瓊等追吐谷渾王皆遇賊死之癸夘經大斗拔谷山路隘險魚貫而出風霰晦暝與後宫相失士卒凍死者太半丙午次張掖辛亥詔諸郡學業該通才藝優洽膂力驍壯超絶等倫在官勤奮堪理政事立性正直不避彊禦四科舉人壬子高昌王麴伯雅來朝伊吾吐屯設等獻西域數千里之地上大恱癸丑置西海河源鄯善且末等四郡丙辰上御觀風行殿盛陳文物奏九部樂設魚龍曼延宴高昌王吐屯設於殿上以寵異之其蠻夷陪列者三十餘國戊午大赦天下開皇已來流配悉放還鄉晉陽逆黨不在此例隴右諸郡給復三年秋七月丁邜置馬牧於青海渚中以求龍種無効而止九月癸未車駕入長安冬十月癸亥詔今嵗耆老赴集者可於近郡處置年七十已上疾患沈滯不堪居職即給賜帛送還本郡其官至七品以上者量給廩以終厥身十一月丙子車駕幸東都六年春正月癸亥朔旦有盗數十人皆素冠練衣焚香持華自稱彌勒佛入自建國門監門者皆稽首既而奪衛士仗將為亂齊王暕遇而斬之於是都下大索與相連坐者千餘家丁丑角觝大戯於端門街天下竒伎異藝畢集終月而罷帝數微服徃觀之己丑倭國遣使貢方物二月乙巳虎賁郎將陳稜朝請大夫張鎮州擊流求破之獻俘萬七千口頒賜百官乙邜詔以國初草創妄假茅土名實相乖自今已後唯有功勲乃得賜封仍令子孫承襲丙辰改封安徳王雄為觀王河間王子慶為郇王庚申徵魏齊周陳樂人悉配太常三月癸亥幸江都宫甲子以鴻臚卿史祥為左驍衛大將軍夏四月丁未宴江淮已南父老頒賜各有差六月辛夘室韋赤土並遣使貢方物壬辰鴈門賊帥尉文通聚衆三千保於莫壁谷遣鷹楊楊伯泉擊破之甲寅制江都太守秩同京尹冬十月壬申刑部尚書梁毗卒壬子户部尚書銀青光禄大夫長孫熾卒十二月己未左光禄大夫吏部尚書牛𢎞卒辛酉朱崖人王萬昌舉兵作亂遣隴西太守韓洪討平之七年春正月壬寅左武衛大將軍光禄大夫眞定侯郭衍卒二月己未上升釣臺臨揚子津大宴百寮頒賜各有差庚申百濟遣使朝貢乙亥上自江都御龍舟入通濟渠遂幸于涿郡壬午詔以高麗失禮將欲問罪遼左仍事省方入往涿郡廵撫民俗其河北諸郡及山西山東年九十已上版授太守八十者授縣令三月丁亥右光禄大夫左屯衛大將軍姚辯卒夏四月庚午幸涿郡之臨朔宫五月戊子以武威太守樊子蓋為民部尚書秋大水山東河南漂没三十餘郡民相賣為奴婢冬十月乙夘底柱山崩堰水逆流數十里戊午以東平太守吐万緒為左屯衛大將軍十二月己酉突厥處羅多利可汗來朝帝大悅接以殊禮于時遼東戰士及餽運者填咽於道晝夜不絶苦役者始為羣盗甲子敇都尉鷹揚與郡縣相知追捕随獲斬決之八年春正月辛巳大軍集于涿郡以兵部尚書叚文振為左候衛大將軍壬午下詔東伐高麗分命諸軍其左第一軍出鏤方道第二軍長岑道第三軍海㝠道第四軍蓋馬道第五軍建安道第六軍南蘇道第七軍遼東道第八軍元菟道第九軍扶餘道第十軍朝鮮道第十一軍沃沮道第十二軍樂浪道右第一軍黏蟬道第二軍含資道第三軍渾彌道第四軍臨屯道第五軍候城道第六軍提奚道第七軍踏頓道第八軍肅慎道第九軍碣石道第十軍東􅀈道第十一軍帶方道第十二軍襄平道凡二十四軍總一百一十三萬三千八百號二百萬其餽運者倍之癸未第一軍發終四十日引師乃盡旌旗亘千里近古出師之盛未之有也乙未以右候衛大將軍衛元為刑部尚書甲辰内史令元夀卒二月甲寅詔征遼從行從一品以下佽飛募人以上家口郡縣宜數存問有糧食乏少皆賑給之或雖有田疇貧弱不能自耕可於多丁富室勸課相助壬戍司空京兆尹光禄大夫觀王雄薨三月辛夘兵部尚書左候衛大將軍段文振卒癸巳上御師甲子臨戎于遼水橋戊戍大軍為賊所拒不果濟右屯衛大將軍左光禄大夫麥鐡杖虎賁郎將錢士雄孟金义等皆死之甲午車駕度遼大戰于東岸擊賊破之進圍遼東乙未大頓見二大鳥高丈餘皜身朱足游泳自若上異之命工圖寫并立銘頌五月戊午納言楊逹卒于時諸將各奉㫖不敢越機既而高麗各固城守攻之不下六月己未幸遼東責怒諸將止城西數里御六合城七月壬午宇文述等敗績于薩水右屯衛將軍薛世雄死之九軍並陷師奔還至者千餘騎癸夘班師九月庚辰上至東都己丑詔諸武臣授勲官者不得回授文階以其不習政事故也冬十月戊寅工部尚書宇文愷卒十一月己夘以宗女華容公主嫁于高昌王辛巳光禄大夫韓夀卒甲申敗將宇文述于仲文等除名為民斬尚書右丞劉士龍以謝天下是嵗大旱疫民多死山東尤甚宻詔江淮南諸郡閱視民間童女姿質端麗者每嵗貢之九年春正月丁丑徵天下兵募民為驍果集于涿郡壬午賊帥杜彦永王潤等陷平原郡大掠而去辛夘置折衝果毅武勇雄武等郎將官以領驍果乙未平原李徳逸聚衆數萬稱阿舅賊劫掠山東靈武白榆妄稱奴賊劫掠牧馬北連突厥隴右多被其患遣將軍范貴討之連年不能尅戊戌大赦己亥遣代王侑刑部尚書衛元鎮京師辛丑以右驍衛將軍李渾為右驍衛大將軍二月己未濟北人韓進洛聚衆數萬為羣盗壬午復宇文述等官爵又徵兵討高麗三月丙子濟北人孟海公起兵為盗衆至數萬丁丑發丁男十萬城大興戊寅幸遼東以越王侗工部尚書樊子蓋鎭東都庚子北海人郭方預聚徒為賊自號盧公衆至三萬攻陷郡城大掠而去夏四月庚午車駕度遼壬申遣宇文述楊義臣趣平壤城五月丁丑熒惑入南斗己夘濟北人甄寳車聚衆萬餘冦掠城邑六月乙巳禮部尚書楊元感反於黎陽丙辰元感逼東都河南賛治裴𢎞策拒之反為賊所敗戊辰兵部侍郎斛斯政奔于高麗庚午上班師高麗犯後軍敇右武衛大將軍李景為後拒遣左翊衛大將軍宇文述左候衛將軍屈突通等馳𫝊𤼵兵以討元感秋七月己夘令所在發人城縣府驛癸未餘杭人劉元進舉兵反衆至數萬八月壬寅左翊衛大將軍宇文述等破楊元感於閿鄉斬之餘黨悉平癸夘呉人朱爕晉陵人管崇擁衆十萬餘自稱將軍冦江左甲辰制驍果之家蠲免賦役丁未詔郡縣城去道過五里已上者徙就之戊申制盗賊籍没其家乙夘賊帥陳瑱等三萬攻陷信安郡辛酉司農卿光禄大夫葛國公趙元淑以罪伏誅九月己夘濟隂人呉海流東海人彭孝才並舉兵為盗衆至數萬庚辰賊帥梁慧尚聚衆四萬陷蒼梧郡甲午車駕次上谷以供費不給上大怒免太守虞荷等官丁酉東陽人李三兒向但子舉兵作亂衆至萬餘閏月己巳幸博陵冬十月丁丑賊帥吕明星率衆數千圍東郡虎賁郎將費青奴擊斬之乙酉詔以博陵為高祖歴試之地可改為高陽郡赦境内死罪己下給復一年於是召高祖時故吏皆量才授職壬辰以納言蘇威為開府儀同三司朱燮管崇推劉元進為天子遣將軍吐万緒魚俱羅討之連年不能剋齊人孟讓王薄等衆十餘萬據長白山攻剽諸郡清河賊張金稱衆各數萬勃海賊帥格謙自號燕王孫宣雅自號齊王衆各十萬山東苦之丁亥以右候衛將軍郭榮為右候衛大將軍十一月己酉右候衛將軍馮孝慈討張金稱於清河反為所敗孝慈死之十二月甲辰車裂楊元感弟朝請大夫積善及黨與十餘人仍焚而揚之丁亥扶風人向海明舉兵作亂稱皇帝建元白烏遣太僕卿楊義臣擊破之十年春正月甲寅以宗女為信義公主嫁於突厥曷娑那可汗二月辛未詔百寮議伐高麗數日無敢言者戊子詔徃嵗征遼東陣亡者衆不及埋藏可遣使分道收𦵏設祭辛夘詔親征高麗分命六師百道俱進丁酉扶風人唐弼舉兵反衆十萬推李𢎞為天子自稱唐王三月壬子行幸涿郡癸亥次臨榆宫親御戎服禡祭黄帝斬叛軍者以釁鼓夏四月辛未彭城賊張大彪聚衆數萬保縣薄山為盗遣榆林太守董純擊破斬之甲午車駕次北平五月庚子詔舉郡孝悌廉㓗各十人壬寅賊帥宋世謨陷琅邪庚申延安人劉迦論舉兵反自稱皇王建元大世六月辛未賊帥鄭文雅林寳䕶等衆三萬陷建安郡太守楊景祥死之秋七月癸丑車駕次懷逺鎮乙夘曹國遣使貢方物甲子高麗遣使請降囚送斛斯政上大悦八月己巳班師右衛大將軍左光禄大夫鄭榮卒冬十月丁夘上至東都己丑還京師十一月丙申支觧斛斯政於金光門外乙巳有事於南郊己酉賊帥司馬長安破長平郡乙夘離石胡劉苖王舉兵反自稱天子以其弟六兒為永安王衆至數萬將軍潘長文討之不能剋是月賊帥王徳仁擁衆數萬保林慮山為盗十二月壬申上如東都其日大赦天下戊子入東都庚寅賊帥孟讓衆十餘萬據都梁宫遣江都丞王世充擊破之盡虜其衆十一年春正月甲午朔宴百寮突厥新羅靺鞨畢大辭訶咄傳越烏那曷波臘吐火羅俱慮建忽論靺鞨訶多沛汗龜兹䟽勒于闐安國曹國何國穆國畢衣密失範延伽折契丹等國並遣使朝貢戊戍虎賁郎將高建毗破賊帥顏宣政於齊郡虜男女數千口乙夘大㑹蠻夷設魚龍曼延之樂頒賜各有差二月戊辰賊帥楊仲緒率衆萬餘攻北平滑公李景破斬之庚午詔百姓悉城居丙子王須㧞反自稱漫天王國號燕賊帥魏刁兒自稱歴山飛衆各十餘萬北連突厥南冦燕趙三月丁酉殺右驍衛大將軍光禄大夫郕公李渾將作監光祿大夫李敏並族滅其家癸夘賊帥司馬長安破西河己酉幸太原避暑汾陽宫秋七月己亥淮南人張起緒舉兵為盗衆至三萬辛丑光禄大夫右禦衛大將軍張夀卒八月乙夘廵北塞戊辰突厥始畢可汗率騎數十萬謀襲乗輿義成公主遣使告變壬申車駕馳幸鴈門癸酉突厥圍城官軍頻戰不利上大懼欲率精騎潰圍而出民部尚書樊子蓋固諫乃止齊王暕以後軍保于崞縣甲申詔天下諸郡募兵於是守令各來赴難九月甲辰突厥觧圍而去丁未曲赦太原鴈門死罪已下冬十月壬戍上至于東都丁邜彭城人魏騏驎聚衆萬餘為盗冦魯郡壬申賊帥盧明月聚衆十餘萬冦陳汝間東海賊李子通擁衆度淮自號楚王建元明政寇江都十一月乙夘賊帥王須㧞破高陽郡十二月戊寅有大流星如斛墜明月營破其衝車庚辰詔民部尚書樊子蓋發關中兵討絳郡賊敬盤陁柴保昌等經年不能剋譙郡人朱粲擁衆數十萬寇荆襄僭稱楚帝建元昌逹漢南諸郡多為所陷焉十二年春正月甲午鴈門人翟松栢起兵於靈邱衆至數萬轉攻傍縣二月己未眞臘遣使貢方物甲子夜有二大鳥似鵰飛入大業殿止于御幄至明而去癸亥東海賊盧公暹率衆萬餘保于蒼山夏四月丁巳顯陽門灾癸亥魏刁兒所部將甄翟兒號歴山飛衆十萬轉寇太原將軍潘長文討之反為所敗長文死之五月丙戍朔日有蝕之既癸巳有大流星隕於呉郡為石壬午上於景華宫徵求螢火得數斛夜出遊山放之光徧巖谷秋七月壬戍民部尚書光禄大夫濟北公樊子蓋卒甲子幸江都宫以越王侗光禄大夫段逹太府卿元文都檢校民部尚書韋津右武衛將軍皇甫無逸右司郎盧楚等總留守事奉信郎崔民象以盗賊充斥於建國門表諫不宜廵幸上大怒先觧其頤乃斬之戊辰馮翊人孫華自號總管舉兵為盗高涼通守洗珤徹舉兵作亂嶺南溪洞多應之己巳熒惑守羽林月餘乃退車駕次汜水奉信郎王愛仁以盗賊日盛諫上請還西京上怒斬之而行八月乙巳賊帥趙萬海衆數十萬自恒山寇高陽壬子有大流星如斗出王良閣道聲如壞牆癸丑有大流星如甕出羽林九月丁酉東海人杜揚州沈覔敵等作亂衆至數萬右禦衛將軍陳稜擊破之戊午有二枉矢出北斗魁委曲虵形注於南斗壬戍安定人荔非世雄殺臨涇令舉兵作亂自號將軍冬十月己丑開府儀同三司左翊衛大將軍光禄大夫許公宇文述薨十二月癸未鄱陽賊操天成舉兵反自號元興王建元始興攻陷豫章郡乙酉以右翊衛大將軍來䕶兒為開府儀同三司行左翊衛大將軍壬辰鄱陽人林士𢎞自稱皇帝國號楚建元太平攻䧟九江廬陵郡唐公李淵破甄翟兒於西河虜男女千口十三年春正月壬子齊郡賊杜伏威率衆度淮攻陷歴陽郡丙辰勃海賊竇建徳設壇於河間之樂夀自稱長樂王建元丁丑辛巳賊帥徐圓朗率衆數千破東平郡𢎞化人到企成聚衆萬餘人為盗傍郡苦之二月壬午朔方人梁師都殺郡丞唐世宗據郡反自稱大丞相遣銀青光禄大夫張世隆擊之反為所敗戊子賊率王子英破上谷郡己丑馬邑校尉劉武周殺太守王仁恭舉兵作亂北連突厥自稱定楊可汗庚寅賊帥李密翟讓等陷興洛倉越王侗遣虎賁郎將劉長恭光祿少卿房崱擊之反為所敗死者十五六庚子李密自號魏公稱元年開倉以賑羣盗衆至數十萬河南諸郡相繼皆陷焉壬寅劉武周破虎賁郎將王智辯於桑乾鎮智辯死之三月戊午廬江人張子路舉兵反遣右禦衛將軍陳稜討平之丁丑賊帥李通徳衆十萬寇廬江左屯衛將軍張鎮州擊破之夏四月癸未金城校尉薛舉率衆反自稱西秦霸王建元秦興攻陷隴右諸郡己丑賊帥孟讓夜入東都外郭燒豐都市而去癸巳李密陷廻洛東倉丁酉賊帥房憲伯陷汝隂郡是月光禄大夫虎賁郎將裴仁基淮陽太守趙佗等並以衆叛歸李密五月辛夘夜有流星如甕墜於江都甲子唐公李淵起兵太原丙寅突厥數千騎寇太原淵擊破之秋七月壬子熒惑守積屍丙辰武威人李軌舉兵反攻陷河西諸郡自稱涼王建元安樂八月辛巳唐公李淵破虎牙郎將宋老生於霍邑斬之九月己丑帝括江都子女寡婦以配從兵是月武陽郡丞元寳藏以郡叛歸李密與賊帥李文相攻陷黎陽倉彗星見於營室冬十月丁亥太原楊世洛聚衆萬餘人冦掠城邑丙申羅令蕭銑以縣反鄱陽人董景珍以郡反迎銑於羅縣號為梁王攻陷傍郡戊戍虎賁郎將高毗敗濟北郡賊甄寳車於􅱘山十一月丙辰唐公李淵入京師辛酉遥尊帝為太上皇立代王侑為帝改元義寧上起宫丹陽將遜于江左有烏鵲來巢幄帳驅不能止熒惑犯太微有石自江浮入于揚子日光四散如流血上甚惡之義寧二年三月右屯衛將軍宇文化及虎賁郎將司馬徳戡元禮監門直閣裴䖍通將作少監宇文智及武勇郎將趙行樞鷹揚郎將孟景内史舍人元敏符璽郎李覆牛方裕千牛左右李本本弟孝質直長許𢎞仁薛世良城門郎唐奉義醫正張愷等以驍果作亂入犯宫闈上崩于温室時年五十蕭后令宫人撤牀簣為棺以埋之化及發後右禦衛將軍陳稜奉梓宫於成象殿葬呉公臺下發歛之始容貎若生衆咸異之唐平江南之後改𦵏雷塘初上自以蕃王次不當立每矯情飾行以釣虚名隂有奪宗之計時高祖雅重文獻皇后而后性忌妾媵皇太子勇内多嬖幸以此失愛帝後庭有子皆不育之示無私寵取媚於后大臣用事者傾心與交中使至第無貴賤皆曲承顔色申以厚禮婢僕往來者無不稱其仁孝又常私入宫掖密謀於文獻皇后楊素等因機構扇遂成廢立自高祖大漸暨諒闇之中蒸滛無度山陵始就即事廵游以天下承平日久士馬全盛慨然慕秦皇漢武之事乃盛治宫室窮極侈靡召募行人分使絶域諸蕃至者厚加禮賜有不恭命以兵擊之盛興屯田於玉門桞城之外課天下富室分道市戎馬疋直十餘萬富室坐是凍餒者十家而九性多詭譎所幸之處不欲人知每幸之所輙數道置頓四海珍羞殊味水陸必備焉求市者無逺不至郡縣競為獻食豐厚者進擢踈儉者獲罪姦吏侵漁内外虛竭頭會箕歛民不聊生于時軍國多務日不暇給帝方驕怠惡聞政事寃屈不理奏請罕决又猜忌臣下無所專任朝臣有不合意者必構其罪而族滅之高熲賀若弼先皇心膂參謀帷幄張衡李金才藩邸故舊績著經綸惡其直道忌其正言求其無形之罪加以丹頸之戮其餘事君盡禮謇謇匪躬無罪無辜横受夷戮者不可勝紀政刑弛紊賄貨公行莫敢有言道路以目六軍不息百役繁興行者不歸居者失業人饑相食邑落為墟上弗之恤也東西行幸靡有定居每以供費不給逆收數年之賦所至唯與後宫流連耽湎惟日不足招迎姥媪朝夕共肆醜言又引少年令與宫人穢亂不軌不遜以為娯樂區宇之内盗賊蜂起劫掠從官屠陷城邑近臣互相掩蔽皆隠賊數不以實對或有言賊多者輙大被詰責各求茍免上下相䝉每出師徒敗亡相繼戰士盡力不加賞賜百姓無辜咸受屠戮蒸庻積怨天下土崩至於就禽而猶未之寤也煬帝大業十三年其年唐立恭帝改義寧明年而煬帝遇弑即位十四年恭皇帝諱侑元徳太子之子也母曰韋妃帝性聰敏有氣度大業三年立為陳王後數載徙為代王及煬帝親征遼東令於京師總留事十一年從幸晉陽拜太原太守㝷鎮京師唐公李淵入長安尊煬帝為太上皇奉帝纂業以十一月壬戍即皇帝位於大興殿大赦天下詔改大業十三年為義寧元年十一月十六日昧爽以前大辟罪已下皆赦除之常赦所不免者不在赦限甲子以光禄大夫大將軍太尉唐公李淵為假黄鉞使持節大都督内外諸軍事尚書令大丞相進封唐王丙寅詔軍國機務事無大小文武設官位無貴賤憲章賞罰咸歸相府己巳以唐王李淵子隴西公建成為唐國世子敦煌公世民為京兆尹改封秦公元吉為齊公太原置鎮北府乙亥張掖康老和舉兵反十二月癸未薛舉自稱天子冦扶風秦公世民為元帥擊破之丁亥桂陽人曹武徹舉兵反建元通聖丁酉唐兵禽驍衛大將軍屈突通於閿鄉乙巳賊帥張善安陷廬江郡二年春正月丁未詔唐王李淵劒履上殿入朝不趨贊拜不名加前後羽葆鼔吹壬戍將軍王世充為李密所敗河内通守孟善誼虎賁郎將王辯楊威劉長恭梁徳董智通皆死之庚戍河陽郡尉獨孤武都降於李密三月丙辰右屯衛將軍宇文化及弑太上皇於江都宫右禦衛將軍獨孤盛死之齊王暕趙王果燕王倓右翊衛大將軍宇文恊内史侍郎虞世基御史大夫裴藴給事郎許善心皆遇害化及立秦王浩為帝自稱大丞相朝士文武皆受其官爵光祿大夫宿公麥才折衝郎將朝請大夫沈同謀討賊夜襲化及營反為所害戊辰詔唐王李淵備九錫之禮加璽紱逺游冠緑綟綬位在諸侯王上唐國置丞相已下一依舊式五月乙巳朔詔唐王李淵冕十有二旒建天子旌旗出警入蹕金根車駕備五時副車置旄頭雲䍐車舞八佾設鐘簴宫縣王后王子王女爵命之號一遵舊典戊午詔遜位于唐如漢魏故事仍敇有司凡有表奏辭讓皆不得以聞唐受命以帝為􅈶國公武徳二年夏五月崩年十五恭帝義寧二年右隋三帝凡三十八年為唐所滅通志卷十八
