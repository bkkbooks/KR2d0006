body:
  text: 通志卷一百七下宋右廸功郎鄭樵漁仲撰列傳第二十下馮衍字敬通京兆杜陵人也祖野王元帝時為大鴻臚衍幼有奇材年九歳能誦詩至二十而博通羣書王莽時諸公多薦舉之者衍辭不肯仕時天下兵起莽遣更始將軍㢘丹討伐山東丹辟衍為掾與俱至定陶莽追詔丹曰倉廪盡矣府庫空矣可以怒矣可以戰矣將軍受國重任不捐身於中野無以報恩塞責丹惶恐夜召衍以書示之衍因說丹曰衍聞順而成者道之所大也逆而功者權之所貴也是故期於有成不問所由論於大體不守小節昔逢丑父伏軾而使其君取飲稱於諸侯鄭祭仲立突而出忽終得復位美於春秋盖以死易生以存易亡君子之道也詭於衆意寧國存身賢智之慮也故易曰窮則變變則通通則久是以自天祐之吉無不利若夫知其不可而必行之破軍殘衆無補於主身死之日負義於時智者不為勇者不行且衍聞之得時無怠張良以五世相韓椎秦始皇博浪之中勇冠乎賁育名髙乎泰山將軍之先為漢信臣新室之興英俊不附今海内潰亂小人懐徳甚於詩人之思召公也愛其甘棠而况子孫乎人所歌舞天必從之方今為將軍計莫若屯據大郡鎮撫吏士砥礪其節百里之内牛酒日賜納雄桀之士詢忠智之謀要將來之心待從横之變興社稷之利除萬人之害則福禄流於無窮功烈著於不滅何與軍覆於中原身膏於草野功敗名䘮恥及先祖哉聖人轉禍而為福智士因敗而為功願明公深計而無與俗同丹不能從進入睢陽復說丹曰盖聞明者見於無形智者見於未萌况其昭晳者乎凡患生於所忽禍發於細微敗不可悔時不可失公孫鞅曰有髙人之行負非於世有獨見之慮見贅於時故信庸庸之論破金石之策襲當世之操失髙明之徳夫決者智之君也疑者事之役也時不重至公勿再計丹不聽遂進及無鹽與赤眉戰死衍乃亡命河東更始二年遣尚書僕射鮑永行大將軍事安集北方衍因以計說永曰衍聞明君不惡切慤之言以測幽𡨕之論忠臣不顧爭引之患以達萬機之變是故君臣兩興功名兼立銘勒金石令問不忘今衍幸蒙寛明之日將值危言之時豈敢拱黙被罪而不竭其誠哉伏念天下離王莽之害久矣始自東郡之師繼以西海之役巴蜀沒於南夷緣邊破於北狄逺征萬里暴兵累年禍挐未解兵連不息刑法彌深賦斂愈重衆彊之黨横擊於外百僚之臣貪殘於内元元無聊饑寒並臻父子流亡夫婦離散廬落邱墟田疇蕪穢疾疫大興災異蜂起於是江湖之上海岱之濵風騰波涌更相駘藉四垂之人肝腦塗地死亡之數不啻大半殃咎之毒痛入骨髓匹夫僮婦咸懐怨怒皇帝以聖徳靈威龍興鳳舉率宛葉之衆將散亂之兵挿血昆陽長驅武關破百萬之陳摧九虎之軍雷震四海席卷天下攘除禍亂誅滅無道一朞之間海内大定繼髙祖之休烈修文武之絶業社稷復存炎精更輝徳冠往初功無與二天下自以去亡新就聖漢當蒙其福而賴其願樹恩布徳易以周洽其猶順驚風而飛鴻毛也然而諸將虜掠逆倫絶理殺人父子妻人婦女燔其室屋掠其財産饑者毛食寒者裸跣寃結失望無所歸命今大將軍以明淑之徳秉大使之權統三軍之政存撫并州之人恵愛之誠加乎百姓髙世之聲聞乎羣士故其延頸企踵而望者非特一人也且大將軍之事豈得珪璧其行束脩其心而已哉將定國家之大業成天地之元功也昔周宣中興之主齊桓霸彊之君耳猶有申伯召虎夷吾吉甫攘其蝥賊安其疆宇況乎萬里之漢明帝復興而大將軍為之梁棟此誠不可以忽也且衍聞之兵久則力屈人愁則變生今邯鄲之賊未滅真定之際復擾而大將軍所部不過百里守城不休戰軍不息兵革雲翔百姓震駭奈何自怠不為深憂夫并州之地東帶名關北逼彊胡年榖獨熟人庶多資斯四戰之地攻守之場也如其不虞何以待之故曰徳不素積人不為用備不豫具難以應卒今生人之命懸於將軍將軍所杖必須良材而改易非任更選賢能夫十室之邑必有忠信審得其人以承大將軍之明雖則山澤之人無不感徳思樂為用矣然後簡精鋭之卒發屯守之士三軍既整甲兵已具相其土地之饒觀其水泉之利制屯田之術習戰射之敎則威風逺暢人安其業若鎮太原撫上黨收百姓之歡心樹名賢之良佐天下無變則足以顯聲譽一朝有事則可以建大功惟大將軍開日月之明發深淵之慮鑒六經之論觀孫吳之䇿省羣議之是非詳衆士之白黑以超周南之迹垂甘棠之風令夫功烈施於千載富貴𫝊於無窮伊望之䇿何以加兹永既素重衍為且受使得自置偏裨乃以衍為立漢將軍領狼孟長屯太原與上黨太守田邑等繕甲養士扞衞并土及世祖即位遣宗正劉延攻天井關與田邑連戰十餘合延不得進邑迎母弟妻子為延所獲後邑聞更始敗乃遣使詣洛陽獻璧馬即拜為上黨太守因遣使者招永衍永衍等疑不肯降而忿邑背前約衍乃遺邑書曰盖聞晉文出奔而子犯宣其忠趙武逢難而程嬰明其賢二子之義當矣今三王背叛赤眉危困天下螘動社稷顛隕是忠臣立功之日志士馳馬之秋也伯玉擢選剖符専宰大郡夫上黨之地有四塞之固東帶三關西為國蔽奈何舉之以資彊敵開天下之匈假仇讐之刃豈不哀哉衍聞之委質為子無有二心挈瓶之智守不假器是以晏嬰臨盟擬以曲㦸不易其辭謝息守郕脅以晉魯不䘮其邑由是言之内無鉤頸之禍外無桃萊之利而被畔人之聲䝉降城之恥竊為左右羞之且邾庶其竊邑叛君以要大利曰賤而必書莒牟夷以土地求食而名不滅是以大丈夫動則思禮行則思義未有背此而身名能全者也為伯玉深計莫若與鮑尚書同情戮力顯忠貞之節立超世之功如以尊親係累之故能捐位投命歸之尚書大義既全敵人紓怨上不損剖符之責下足救老幼之命申眉髙談無愧天下若乃貪上黨之權惜全邦之實衍恐伯玉必懐周趙之憂上黨復有前年之禍昔晏平仲納延陵之誨終免欒髙之難孫林父違穆子之戒故陷終身之惡以為伯玉聞北至言必若刺心自非嬰城而堅守則策馬而不顧也聖人轉禍而為福智士因敗以成勝願自彊於時無與俗同邑報書曰僕雖駑怯亦欲為人也豈茍貪生而畏死哉曲㦸在頸不易其心誠僕志也間者老母諸弟見執於軍而邑安然不顧者豈非重其節乎若使人居天地夀如金石要長生而避死地可也今百齡之期未有能至老壯之間相去幾何誠使故朝尚在忠義可立雖老親受戮妻兒横分邑之願也間者上黨黠賊大衆圍城義兵兩軰入據井陘邑親潰敵圍拒擊宗正自試智勇非不能當誠知故朝為兵所害新帝司徒已定三輔隴西北地從風響應其事昭昭日月經天河海帶定不足以比死生有命富貴在天天下存亡誠云命也邑雖沒身能如命何夫人道之本有恩有義義有所宜恩有所施君臣大義母子至恩今故主已亡義無誰為老母拘執恩所當留而厲以貪權誘以䇿馬抑其利心必其不顧何其愚乎邑年三十歴位卿士性少嗜慾情厭事為况今位尊身危財多命殆鄙人知之何疑君子君長敬通掲節垂組自相署立盖仲由使門人為臣孔子譏其欺天君長據位兩州加以一郡而河東叛國兵不入彘上黨見圍不窺大谷宗正臨境莫之能援兵威屈辱國權日損三王背叛赤眉害主未見兼行倍道之赴若墨翟累繭救宋申包胥重胝存楚衛女馳歸唁兄之志主亡一歳莫知定所虚冀妄言茍肆鄙塞未能事生安能事死未知為臣焉知為主豈厭為臣子思為君父乎欲摇泰山而蕩北海事敗身危要思邑言衍不從或訛言更始随赤眉在北永衍信之故屯兵界休方移書上黨云皇帝在雍以惑百姓永遣弟叔及子壻張舒誘降湼城舒家在上黨邑悉擊之又書勸永降永不答自是與邑有隙邑字伯玉馮翊人也後為漁陽太守永衍審知更始已歿乃共罷兵幅巾降於河内帝怨衍等不時至永以立功得贖罪遂任用之而衍獨見黜永謂衍曰昔髙祖賞季布之罪誅丁固之功今遭眀主亦何憂哉衍曰記有之人有挑其鄰之妻者挑其長者長者詈之挑其少者少者報之後其夫死而取其長者或謂之曰夫非罵爾者邪曰在人欲其報我在我欲其罵人也夫天命難知人道易守守道之臣何患死亡頃之帝以衍為曲陽令誅斬劇賊郭勝等降五千餘人論功當封以讒毁故賞不行建武六年日食衍首陳八事一曰顯文徳二曰襃武烈三曰修舊功四曰招俊傑五曰眀好惡六曰簡法令七曰差禄秩八曰撫邊境書奏帝将召見初衍為狼孟長以罪摧掐大姓令狐略是時略為司空長史䜛之於尚書令王護尚書周生豐曰衍所以求見者欲毁君也護等懼之即共排間衍不得入後衛尉陰興信陽侯陰就以外戚貴重深敬重衍衍遂與之交結由是為諸王所聘請尋為司隸從事帝懲西京外戚賓客故皆以法繩之大者抵死徙其餘至貶黜衍由此得罪嘗自詣獄有詔赦不問西歸故郡閉門自保不敢復與親故通建武末衍上疏自陳曰臣伏念髙祖之略而陳平之謀毁之則疏譽之則親以文帝之明而魏尚之忠繩之以法則為罪施之以徳則為功逮至晚世董仲舒言道徳見妒於公孫𢎞李廣奮節於匈奴見排於衞青此忠臣之常所為流涕也臣衍自惟微賤之臣上無無知之薦下無馮唐之說乏董生之才寡李廣之勢而欲免䜛口濟怨嫌豈不難哉臣衍之先祖以忠貞之故成私門之禍而臣衍復遭擾攘之時值兵革之際不敢回行求時之利事君無傾邪之謀将帥無虜掠之心衛尉陰興敬慎周密内自修勅外逺嫌疑故敢與交通知臣之貧數欲本業之臣自惟無三益之才不敢處三損之地固讓而不受之昔在更始太原執貨財之柄居倉卒之間據位食禄二十餘年而財産歳狭居處日貧家無布帛之積年無輿馬之飾於今遭清眀之時飭躬力行之秋而怨讐叢興譏議横世盖富貴易為善貧賤難為工也疏逺壠畝之臣無望髙闕之下惶恐自陳以救罪尤書奏猶以前過不用衍不得志退而作賦又自論曰馮子以為夫人之徳不碌碌如玉落落如石風興雲蒸一龍一蛇與道翺翔與時變化夫豈守一節哉用之則行舍之則蔵進退無主屈伸無常故曰有法無法因時為業有度無度與物趣舍常務道徳之實而不求當世之名濶略杪小之禮蕩佚人間之事正身直行恬然肆志顧常好俶儻之策時莫能聽用其謀喟然長歎自傷不遭久棲遲於小官不得舒其所懐抑心折節慮悽情悲夫伐冰之家不利雞豚之息委積之臣不探市井之利况歴位食禄二十餘年而財産益狭居處益貧惟夫君子之仕行其道也慮時務者不能興其徳為身求者不能成其功去而歸家復羈旅於州郡身愈據職家彌窮困卒離飢寒之災有䘮元子之禍先將軍𦵏渭陵哀帝之崩也營之以為園於是以新豐之東鴻門之上夀安之中地勢髙敞四通廣大南望酈山北屬涇渭東瞰河華龍門之陽三晉之路西顧豐鎬周秦之邱宫觀之墟通視千里覽見舊都遂定塋焉退而幽居盖忠臣過故墟而歔欷孝子入舊室而哀歎每念祖考著盛徳於前垂鴻烈於後遭時之禍墳墓蕪穢春秋蒸嘗昭穆無列年衰歳暮悼無成功将西田牧肥饒之野殖生産修孝道營宗廟簡祭祀然後闔門講習道徳覽觀乎孔老之論庶幾乎松喬之福上隴阪陟髙岡游精宇宙流目八紘歴觀九州山川之體追覽上古得失之風愍道陵遲傷徳分崩夫覩其終必原其始故存其人而詠其道疆理九野經營五山𦕈然有思陵雲之意乃作賦自厲命其篇曰顯志顯志者言光明風化之情昭章元妙之思也文多故不載顯宗即位又多短衍以文過其實遂廢於家衍娶北地女任氏悍忌不得畜媵妾兒女常自操井臼老竟出之遂埳􅇄於時然有大志不戚戚於賤貧居常慷慨歎曰衍少事名賢經歴顯位懐金垂紫掲節奉使不求茍得常有凌雲之志三公之貴千金之富不得其願不槩於懐貧而不衰賤而不恨年雖疲曵猶庶幾名賢之風修道徳於幽𡨕之路以終身名為後世法居貧年老卒扵家所著賦誄銘說問交徳誥慎情書記說自序官錄說策五十篇肅宗甚重其文子豹字仲文年十二母為父所出後母惡之嘗因豹夜寐欲行毒害豹走得免敬事愈慎而母疾之益深時人稱其孝長好儒學以詩春秋教授麗山下鄉里為之語曰道徳彬彬馮仲文舉孝㢘拜尚書郎忠勤不懈每奏事未報嘗伏省閤或從昬至明肅宗聞而嘉之使黄門持被覆豹勅令勿驚由是數加賞賜是時方平西域以豹有才謀拜為河西校尉和帝初數言邊事奏置戊巳校尉城郭諸國復率舊職遷武威太守視事二年河西稱之復徴入為尚書永平十四年卒於官申屠剛字巨卿扶風茂陵人也七世祖嘉文帝時為丞相剛質性方直常慕史鰌汲黯之為人仕郡功曹平帝時王莽専政朝夕猜忌遂隔絶帝外家馮衞二族不得交宦剛常疾之及舉賢良方正因對䇿曰臣聞王事失則神祇怨怒姦邪亂正故陰陽謬錯此天所以譴告王者欲令失道之君曠然覺悟懐邪之臣瞿然自刻者也今朝廷不考功校徳而虚納毁譽數下詔書張設重法抑斷誹謗禁割論議罪之重者乃至腰斬傷忠臣之情挫直士之銳殆乖建進善之旌縣敢諫之鼓闢四門之路眀四目之義也臣聞成王幼少周公攝政聽言下賢均權布寵無舊無新唯仁是親動順天地舉措不失然近則召公不恱逺則四國流言夫子母之性天道至親今聖主幼少始免襁褓即位已來至親分離外戚杜隔恩不得通且漢家之制雖任英賢猶援姻戚親疏相錯杜塞間隙誠所以安宗廟重社稷也今馮衞無罪久廢不錄或處窮僻不若民庶誠非慈愛忠孝承上之意夫為人後者自有正義至尊至卑其勢不嫌是以人無賢愚莫不為怨姦臣賊子以之為便不諱之變誠難其慮今之保傅非古之周公周公至聖猶尚有累何况事失其衷不合天心者哉昔周公先遣伯禽守封於魯以義割恩寵不加後故配天郊祀三十餘世霍光秉政輔翼少主修善進士名為忠直而尊其宗黨摧抑外戚結貴據權至堅至固終沒之後受禍滅門方今師傅皆以伊周之位據賢保之任以此思化則功何不至不思其危則禍何不到損益之際孔父攸歎持滿之戒老氏所慎盖功冠天下者不安威震人主者不全今承衰亂之後繼重敝之世公家屈竭賦斂重數苛吏奪其時貪夫侵其財百姓困乏疾疫夭命盜賊羣軰且以萬數軍行衆止竊號自立攻犯京師燔燒縣邑至乃訛言積弩入宫宿衞驚懼自漢興以來誠未有也國家微弱姦謀不禁六極之效危於累卵王者承天順地典爵主刑不敢以天官私其宗不敢以天罰輕其親陛下宜遂聖眀之徳昭然覺悟逺述帝王之迹近遵孝文之業差五品之屬納至親之序亟遣使者徴中山太后置之别宫令時朝見又召馮衞二族裁與冗職使得執㦸親奉宿衞以防未然之符以抑禍患之端上安社稷下全保傅内和親戚外絶邪謀書奏莽令元后下詔曰剛所言僻經妄說違背大義其罷歸田里後莽簒位剛遂避地河西轉入巴蜀往來二十許年及隗囂據隴右欲背漢而附公孫述剛說之曰愚聞人所歸者天所與人所畔者天所去也伏念本朝躬聖徳舉義兵龔行天罰所當必摧誠天之福非人力也將軍本無尺土孤立一隅宜推誠奉順與朝并力上應天心下醻人望為國立功可以永年嫌疑之事聖人所絶以將軍之威重逺在千里動作舉措可不慎歟今璽書數到委國歸信欲與將軍共同吉凶布衣相與尚有沒身不負然諾之信况於萬乘哉今何畏何利久疑如是卒有非常之變上負忠孝下媿當世夫未至豫言固常為虚及其已至又無所及是以忠言至諫希得為用誠願反覆愚老之言囂不納遂畔從述建武七年詔書徴剛剛將歸與囂書曰愚聞専己者孤拒諫者塞孤塞之政亡國之風也雖有眀聖之姿猶屈己以從衆故慮無遺䇿舉無過事夫聖人不以獨見為明而以萬物為心順人者昌逆人者亡此古今之所共也將軍以布衣為郷里所推廟堂之計既不豫定動軍發衆又不深料今東方政教日睦百姓平安而西州發兵人人懐憂騷動惶懼莫敢正言羣衆疑惑人懐顧望非徒無精銳之心其患無所不至夫物窮則變生事急則計易其勢然也夫離道徳逆人情而能有國有家者古今未有也將軍素以忠孝顯聞是以士大夫不逺千里慕樂徳義今茍欲決意徼幸此何如哉夫天所祐者順人所助者信如未䝉祐助令小人受塗地之禍毁壊終身之徳敗亂君臣之節汙傷父子之恩衆賢破膽可不慎哉囂不納剛到拜侍御史遷尚書令光武嘗欲出游剛以隴蜀未平不宜宴安逸豫諫不見聽遂以頭軔乗輿輪帝遂為止時内外羣官多帝自選舉加以法理嚴察職事過苦尚書近臣至乃捶撲牽曳於前羣臣莫敢正言剛毎輙極諫又數言皇太子宜時就東宫簡任賢保以成其徳帝並不納以數切諫失㫖數年出為平陰令復徴拜太中大夫以病去官卒於家鮑永字君長上黨屯留人也父宣哀帝時任司隸校尉為王莽所殺永少有志操習歐陽尚書事後母至孝妻嘗於母前叱狗永即去之初為郡功曹莽以宣不附己欲滅其子孫都尉路平承望風㫖規欲害永太守茍諫擁護召以為吏嘗置府中永因數為諫陳興復漢室翦滅簒逆之策諫毎戒永曰君長幾事不密禍倚人門永感其言及諌卒自送䘮歸扶風路平遂收永弟升太守趙興到聞而嘆曰我受漢家茅土不能立節而鮑宣死之豈可害其子也即勅縣出升復署永功曹時有矯稱侍中止𫝊舍者興欲謁之永疑其詐諫不聽而出興遂駕往永乃㧞佩刀截馬當胷乃止後數日莽詔書果下捕矯稱者永由是知名舉秀才不應更始二年徴再遷尚書僕射行大將軍事持節將兵安集河東并州朔部得自置偏裨輙行軍法永至河東因擊青犢大破之更始封為中陽侯永雖為將率而車服敝素為道路所識時赤眉害更始三輔道絶光武即位遣諫議大夫儲大伯持節徴永詣行在所永疑不從乃收繫大伯遣使馳至長安既知更始已亡乃發䘮出大伯封上将軍列侯印綬悉罷兵但幅巾與諸将及同心客百餘人詣河内帝見永問曰卿衆所在永離席叩頭曰臣事更始不能令全誠慙以其衆幸富貴故悉罷之帝曰卿言大而意不恱時攻懐未㧞帝謂永曰我攻懐三日而兵不下關東畏服卿可且将故人自往城下譬之即拜永諫議大夫永至懐乃說更始河内太守於是開城而降帝大喜賜永洛陽商里宅固辭不受時董憲裨将屯兵於魯侵犯百姓乃拜永為魯郡太守永到擊討大破之降者數千人惟别帥彭豐虞休皮常等各千餘人稱将軍不肯下頃之孔子闕里無故荆棘自除從講堂至扵里門永異之謂府丞及魯令曰方今危急而闕里自開斯豈夫子欲令太守行禮助吾誅無道邪乃會人衆修郷射之禮請豐等㑹觀欲因此禽之豐等亦欲圖永乃持牛酒勞饗而潛挾兵器永覺之手格殺豐等禽破黨與帝嘉其略封為關内侯遷揚州牧時南土尚多冦暴永以吏民痍傷之後乃緩其銜轡示誅彊横而鎮撫其餘百姓安之㑹遭母憂去官悉以財産與孤弟子建武十一年徴為司隸校尉帝叔父趙王良尊戚貴重永以事劾良大不敬由是朝廷肅然莫不戒慎永乃辟扶風鮑恢為都官從事恢亦抗直不避彊禦帝曰貴戚且宜斂手以避二鮑其見憚如此永行縣到霸陵路經更始墓引車入陌從事諫止之永曰親北面事人寧有過墓不拜雖以獲罪司隸無所避也遂下車拜哭盡哀而去西至扶風椎牛上茍諫冢帝聞之意不平問公卿曰奉使如此何如太中大夫張湛對曰仁者行之宗忠者義之主也仁不遺舊忠不忘君行之髙者也帝意乃釋後大司徒韓歆坐事永固請之不得以此忤帝意出為東海相坐度田事不實被徴諸郡守多下獄永至城臯詔書迎拜為兖州牧便道之官視事三年病卒子昱字文泉少𫝊父學客授於東平建武初太行山中有劇賊太守戴涉聞昱有知畧乃就謁請署守髙都長昱應之遂討擊羣賊誅其渠帥道路開通由是知名後為泚陽長政化仁愛境内清靜荆州刺史表上之再遷中元元年拜司隸校尉詔昱詣尚書使封胡降檄光武遣小黄門問昱有所怪否對曰臣聞故事通官文書不著姓又當司徒露布怪使司隸下書而著姓也帝報曰吾固欲令天下知忠臣之子復為司隸也昱在職奉法守正有父風永平五年坐救火遲免後拜汝南太守郡多陂池歳歳決壊年費常三千餘萬昱乃上作方梁石洫猶今之水門水常饒足溉田倍多民以殷富十七年代王敏為司徒賜錢帛什器帷帳除子徳為郎建初元年大旱榖貴肅宗召昱問曰旱既太甚將何以消復災眚對曰臣聞聖人理國三年有成今陛下始踐天位刑政未著如有失得何能致異但臣前在汝南典理楚事繫者千餘人恐未能盡當其罪先帝詔言大獄一起寃者過半又諸徙者骨肉離分孤魂不祀一人呼嗟王政為虧宜一切還諸徙家屬蠲除禁錮興滅繼絶死生獲所如此和氣可致帝納其言四年代牟融為太尉六年薨年七十餘子徳修志操有名稱累官為南陽太守時歳多荒災唯南陽豐穰吏民愛恱號為神父時郡學久廢徳乃修起横舍備爼豆黼冕行禮奏樂又尊饗國老宴㑹諸儒百姓觀者莫不勸服在職九年徴大司農卒扵官子昻字叔雅有孝義節行初徳被病數年昻俯伏左右衣不緩帶及處䘮毁瘠三年抱負乃行服闋遂潛扵墓次不關時務舉孝㢘辟公府連徴不至卒扵家郅惲字君章汝南西平人也年十二失母居䘮過禮及長理韓詩嚴氏春秋眀天文厯數王莽時惲仰占天象謂友人曰方今鎮歳熒惑並在漢分翼軫之域去而復來漢必再受命福歸有徳如有順天發策者必成大功時左隊大夫逯音錄姓也並素好士惲說之曰當今上天垂象智者以昌愚者以亡昔伊尹自鬻輔商立功全人惲竊不遜敢希伊尹之蹤應天人之變眀府倘不疑逆俾成天徳並奇之使署為吏惲不謁曰文王㧞吕尚於渭濵髙宗禮傅說於巖築桓公取管仲於射鈎故能立𢎞烈就元勲未聞師相仲父而可為吏位也非闚天者不可與圖逺君不授驥以重任驥亦俛首裹足而去耳遂不受署西至長安乃上書王莽曰臣聞天地重其人惜其物故運璣衡垂日月含元包一甄陶品類顯表紀世圖錄豫設漢厯久長孔為赤制不使愚惑殘人亂時智者順以成徳愚者逆以取害神器有命不可虚獲上天垂誡欲悟陛下令就臣位轉禍為福劉氏享天永命陛下順節盛衰取之以天還之以天可謂知命矣若不早圖是不免於竊位也且堯舜不以天顯自與故禪天下陛下何貪非天顯以自累也天為陛下嚴父臣為陛下孝子父教不可廢子諫不可拒惟陛下留神莽大怒即收繫詔獄劾以大逆猶以惲據經䜟難即害之使黄門近臣脅惲令自告狂病恍惚不覺所言惲乃瞋目詈曰所陳皆天文聖意非狂人所能造遂繫須冬㑹赦得出乃與同郡鄭敬南遁蒼梧建武三年又至廬江因遇積弩將軍傅俊東徇揚州俊素聞惲名乃禮請之上為將兵長史授以軍政惲乃誓衆曰無掩人不備窮人於戹不得斷人肢體裸人形骸放滛婦女時俊軍士猶發冢陳尸掠奪百姓惲諫俊曰昔文王不忍露白骨武王不以天下易一人之命故能獲天地之應尅商如林之旅將軍如何不師法文王而犯逆天地之禁多傷人害物虐及枯尸取罪神眀今不謝天改政無以全命願将軍親率士卒收傷葬死哭所殘暴以眀非將軍本意也俊從之百姓恱服所向皆下七年俊還京師而上論之惲恥以軍功取位遂辭歸郷里縣令卑身崇禮請以為門下掾惲友人董子張者父先為郷人所害及子張病將終惲往候之子張垂歿視惲歔欷不能言惲曰吾知子不悲天命而痛讐不復也子在吾憂而不手子亡吾手而不憂也子張但目擊而已惲因起將客遮仇人取其頭以示子張子張見而氣絶惲因而詣縣以狀自首令應之遲惲曰為友報讐吏之私也奉法不阿君之義也虧君以生非臣節也趨出就獄令跣而追之不及遂自至獄令拔刃自向以要惲曰子不從我出敢以死眀心惲得此乃出因病去久之太守歐陽歙請為功曹汝南舊俗十月享㑹百里内縣皆齎牛酒到府醼飲時臨享禮訖歙教曰西部督郵繇音遥姓也延天資忠貞禀性公方摧破姦凶不嚴而理今與衆儒共論延功顯之於朝太守敬嘉厥休牛酒養徳主簿讀書敎戸曹引延受賜惲於下座愀然前曰司正舉觥以君之罪告謝於天案延資性貪邪外方内員朋黨構姦罔上害人所在荒亂怨慝並作明府以惡為善股肱以直從曲此既無君又復無臣惲敢再拜奉觥歙色慙動不知所言門下掾鄭敬進曰君明臣直功曹言切明府徳也可無受觥哉歙意少解曰實歙罪也敬奉觥惲乃免冠謝曰昔虞舜輔堯四罪咸服䜛言弗庸孔壬不行故能作股肱帝用有歌惲不忠孔壬是昭豺虎從政既陷誹謗又露所言罪莫重焉請收惲延以眀好惡歙曰是重吾過也遂不讌而罷惲歸府稱病延亦自退鄭敬素與惲厚見其言忤歙乃相招去曰子廷爭繇延君猶不納延今雖去其勢必還直心無諱誠三代之道然道不同者不相為謀吾不能忍見子有不容君之危盍去之乎惲曰孟軻以彊其君之所不能為忠量其君之所不能為賊惲業已彊之矣障君於朝既有其直而不死職罪也延退而惲又去不可敬乃獨隱於弋陽山中居數月歙果復召延惲於是乃去從敬止漁釣自娛留數十日惲志在從政既乃喟然而歎謂敬曰天生俊士以為人也鳥獸不可與同羣子從我為伊吕乎将為巢許乎而父老堯舜也敬曰吾足矣初從生步重華於南野謂来歸於松子今幸得全軀樹類還奉墳墓盡問孝道雖不從政施之有政是亦為政也吾年耄矣安得從子子勉性命勿勞神以害生惲於是告别而去敬字次都清志髙世光武連徴不到惲遂客居江夏教授郡舉孝㢘為上東城門候帝嘗出獵車駕夜還惲拒關不開帝令從者見面於門間惲曰火眀遼逺遂不受詔帝乃迴從東中門入眀日惲上書諫曰昔文王不敢槃於游田以萬人惟憂而陛下逺獵山林夜以繼晝其如社稷宗廟何暴虎馮河未至之誡誠小臣所竊憂也書奏帝賜布百疋而貶東中門候為參封尉後令惲受皇太子韓詩侍講殿中及郭皇后廢惲乃言於帝曰臣聞夫婦之好父不得之於子况臣能得之於君乎是臣所不敢言雖然願陛下念其可否之計無令天下有議社稷而已帝曰惲善恕己量主知我必不有所左右而輕天下也后既廢而太子意不自安惲乃說太子曰久處疑位上違孝道下近危殆昔髙宗明君吉甫賢臣及有纎介放逐孝子春秋之義母以子貴太子宜因左右及諸皇子引愆退身奉養母氏以明聖教不背所生太子從之帝意聽許惲再遷長沙太守先是長沙有孝子古初遭父䘮未葬隣人失火初匍匐柩上以身扞火火為之滅惲歎異之以為首舉後坐事左轉芒長又免歸避地教授著書八篇以病卒子夀字伯孝善文章以㢘能稱舉孝㢘稍遷冀州刺史時冀部屬郡多封諸王賔客放縱類不檢節夀案察之無所容貸乃使部從事専住王國又徙督郵舍王宫外動静失得即時馳驛言上奏王罪及劾傅相於是藩國畏懼並為遵節視事三年冀土肅清三遷尚書令朝廷每有疑議常獨進見肅宗奇其智策擢為京兆尹郡多彊豪姦暴不禁三輔素聞夀在冀州皆懐震竦各相檢勅莫敢干犯夀雖威嚴而推誠下吏皆願効死莫有欺者以公事免復徴為尚書僕射是時大將軍竇憲以外戚之寵威傾天下憲嘗使門生齎書詣夀有所請託夀即送詔獄前後上書陳憲驕恣引王莽以誡國家是時憲征匈奴海内供其役費而憲及其弟篤景並起第宅驕奢非法百姓苦之夀以府蔵空虚軍旅未休遂因朝㑹譏刺憲等厲音正色辭㫖甚切憲怒陷夀以買公田誹謗下吏當誅侍御史何敞上疏理之得減死論徙合浦未行自殺家屬得歸郷里蘇竟字伯况扶風平陵人也平帝世竟以明易為博士講書祭酒善圖緯能通百家之言王莽時與劉歆等共典校書拜代郡中尉時匈奴擾亂北邊多罹其禍竟終完輯一郡光武即位就拜代郡太守使固塞以拒匈奴建武五年冬盧芳略得北邊諸郡帝使偏将軍隨弟屯代郡竟病篤以兵屬弟詣京師謝罪拜侍中數月以病免初延岑護軍鄧仲况擁兵據南陽陰縣為寇而劉歆兄子龔為其謀主竟時在南陽與龔書曉之曰君執事無恙走昔以摩研編削之才與國師公從事出入校定祕書竊自依依末由自達盖聞君子愍同類而傷不通人無愚智莫不先避害然後求利先定志然後求名昔智果見智伯窮兵必亡故變名逃遁陳平知項王為天所棄故歸心髙祖皆智之至也聞君前權時屈節北面延牙乃後覺悟棲遲養徳先世數子又何以加君處陰中土多賢士若以須㬰之間研考異同揆之圖書測之人事則得失利害可陳於目何自負畔亂之困不移守惡之名乎與君子之道何其反也世之俗儒末學醒醉不分而稽論當世疑誤視聽或謂天下迭興未知誰是稱兵據土可圖非冀或曰聖王未啓宜觀時變倚彊附大顧望自守二者之論豈其然乎夫孔丘祕經為漢赤制元包幽室文𨼆事眀且火徳承堯雖昧必亮承積世之祚握無窮之符王氏雖乗間偷簒而終嬰大戮支分體解宗氏屠滅非其效歟皇天所以眷顧踟蹰憂漢子孫者也論者若不本之於天參之於聖猥以師曠雜事輕自眩惑說士作書亂夫大道焉可信哉諸儒或曰今五星失晷天時謬錯辰星久而不效太白出入過度熒惑進退見態鎮星繞帶天街歳星不舍氐房以為諸如此占歸之國家盖災不徒設皆應之分野各有所主夫房心即宋之分東海是也尾為燕分漁陽是也東海董憲迷惑未降漁陽彭寵逆亂擁兵王赫斯怒将兵並征故熒惑應此憲寵受殃太白辰星自亡新之末失行算度以至於今或守東井或没羽林或徘徊藩屏或躑躅帝宫或經天反明或潛蔵久沈或衰微暗昧或煌煌南北或盈縮成鉤或偃蹇不禁皆大運蕩除之祥聖帝應符之兆也賊臣亂子往往錯互指麾妄說𫝊相壊誤由此論之天文安得遵度哉乃者五月甲申天有白虹自子加午廣可十丈長可萬丈正臨倚彌倚彌即黎邱秦豐之都也是時月入於畢畢為天網主網羅無道之君故武王將伐紂上祭於畢求助天也夫仲夏甲申為八魁八魁上帝開塞之将也主退惡攘逆流星狀似蚩尤旗或曰營頭或曰天槍出奎而西北行至延牙營上散為數百而滅奎為毒螫主庫兵此二變郡中及延牙士衆所共見也是故延牙遂之武當託言發兵實避其殃今年比卦部歳坤主立冬坎主冬至水性滅火南方之兵受歳禍也徳在中宫刑在木木勝土刑制徳今年兵事畢已中國安寧之效也五七之家三十五姓彭秦延氏不得豫焉如何怪惑依而恃之葛藟之詩求福不回其若是乎圖䜟之占衆變之驗皆君之所眀善惡之分去就之決不可不察無忽鄙言夫周公之善康叔以不從管蔡之亂也景帝之悦濟北以不從吳濞之畔也自更始以來孤恩背逆歸義同善臧否粲然可不察歟良醫不能救無命彊梁不能與天爭故天之所壊人不得支宜密與太守劉君共謀降議仲尼栖栖墨子遑遑憂人之甚也屠羊救楚非要爵禄茅焦干秦豈求報利盡忠博愛之誠憤懣不能已耳又與仲况書諫之文多不載於是仲况與龔遂降龔字孟公長安人善論譏扶風馬援班彪並器重之竟終不伐其功潛樂道術作記誨篇及文章傳於世年七十卒扵家楊厚字仲桓廣漢新都人也祖父春卿善圖䜟學為公孫述將漢兵平蜀春卿自殺臨命戒其子統曰吾綈袠中有先祖所傳祕記為漢家用爾其修之統感父遺言服闋辭家從犍為周循學習先法又就同郡鄭伯山受河洛書及天文推歩之術建初中為彭城令一州大旱統推陰陽消伏縣界䝉澤太守宗湛使統為郡求雨亦即降澍自是朝廷災異多以訪之統作家法章句及内䜟二卷解說位至光禄大夫為國三老年九十卒統生厚厚母初與前妻子博不相安厚年九歳思令和親乃託疾不言不食母知其㫖瞿然改意恩養加篤博後至光禄大夫厚少學統業精力思述初安帝永初二年太白入北斗洛陽大水時統為侍中厚随在京師朝廷以問統統對年老耳目不明子厚曉讀圖書粗識其意鄧太后使中常侍承制問之厚對以為諸王子多在京師容有非常宜亟發遣各令就國太后從之星尋滅不見又尅水退期日皆如所言除為中郎太后特引見問以圖䜟厚對不合免歸復習業犍為不應州郡三公之命方正有道公車特徴皆不就永建二年順帝特徴詔告郡縣督促發遣厚不得已至長安以病自上因陳漢三百五十年之戹宜蠲法改憲之道及消伏災異凡五事制書襃述有詔太醫致藥太官賜羊酒及至拜議郎三遷為侍中特䝉引見訪以時政四年厚上言今夏必盛寒當有疾疫蝗虫之害是歳果六州大蝗疫氣流行後又連上西北二方有兵氣宜備邊寇車駕臨當西巡感厚言而止陽嘉三年西羌寇隴右眀年烏桓圍度遼將軍耿􅁮永和元年復上京師應有水患又當火災三公有免者蠻夷當反叛是夏洛陽暴水殺千餘人至冬承福殿災太尉龎參免荆交二州蠻夷殺長吏寇城郭又言陰臣近戚妃黨當受禍眀年宋阿母與宦者襃信侯李元遘姦廢退後二年中常侍張逵等復坐誣罔大將軍梁商専恣悉伏誅每有災異輙上消救之法而閹宦専政言不得信時大將軍梁冀威權傾朝遣弟侍中不疑以車馬珍玩致遺於厚欲與相見厚不答固稱病求退帝許之賜車馬錢帛歸家修黄老教授門生上名錄者三千餘人太尉李固數薦言之太初元年梁太后詔備古禮以聘厚遂辭疾不就建和三年太后復詔徴之經四年不至年八十二卒於家䇿書弔祭郷人諡曰文公門人為立廟郡文學掾史春秋饗射常祠之郎顗字雅光北海安邱人也父宗字仲綏學京氏易善風角星算六日七分能望氣占候吉凶常賣卜自奉安帝徴之對䇿為諸儒表後拜吳令時卒有暴風宗占知京師當有大火記識時日遣人參候果如其言諸公聞而表上以博士徴之宗恥以占驗見知聞徴書到夜縣印綬於縣廷而遁遂終身不仕顗少𫝊父業兼明經典隠居海畔延致學徒常數百人晝研精義夜占象度勤心銳思朝夕無倦州郡辟召舉有道方正不就順帝時災異屢見陽嘉二年正月公車徴顗乃詣闕拜章曰臣聞天垂妖象地見災符所以譴告人主責躬修徳使正機平衡流化興政也易内傳曰凡災異所生各以其政變之則除消之亦除伏惟陛下躬日昃之聽温三省之勤思過念咎務消祇悔方今時俗奢佚淺恩薄義夫救奢必於儉約拯薄無若敦厚安上理民莫善於禮修禮遵約盖惟上興革文變薄事不在下故周南之徳關雎政本本立道生風行草從澄其源者流清溷其本者末濁天地之道其猶鼓籥以虚為徳自近及逺者也伏見往年以來園陵數災炎光熾猛驚動神靈易天人應曰君子不思遵利兹謂無澤厥災孽火燒其宫又曰君髙臺府犯陰侵陽厥災火又曰上不儉下不節炎火並作燒居室自頃繕理西苑修復太學宫殿官府多所搆飾昔盤庚遷殷去奢即儉夏后卑室盡力致羙又魯人為長府閔子騫曰仍舊貫何必改作臣愚以為諸所繕修事可省減廪䘏貧民賑贍孤寡此天之意也人之慶也仁之本也儉之要也焉有應天養人為仁為儉而不降福者哉土者地祇陰性澄静宜以施化之時敬而勿擾竊見正月以來陰闇連日易内傳曰久陰不雨亂氣也䝉之比也䝉者君臣上下相冒亂也又曰欲徳不用厥異常陰夫賢者化之本雲者雨之具也得賢而不用猶久陰而不雨也又頃前數日寒過其節冰既解釋還復凝合夫寒往則暑來暑往則寒來此言日月相推寒暑相避以成物也今立春之後火卦用事當温而寒違反時節由功賞不至而刑罰必加也宜須立秋順氣行罰臣伏案飛候參察庶政以為立夏之後當有震裂涌水之害又比熒惑失度盈縮往來涉歴輿鬼環繞軒轅火精南方夏之政也政有失禮不從夏令則熒惑失行正月三日至於九日三公卦三公上應台階下同元首政失其道則寒暑反節節彼南山詠自周詩股肱良哉著於虞典而今之在位競託髙虚納累鍾之奉忘天下之憂棲遲偃仰寝疾自逸被䇿文得賜錢即復起矣何疾之易而愈之速以此消伏災𤯝興致升平其可得乎今選舉牧守委任三府長吏不良既咎州郡州郡有失豈得不歸責舉者而陛下崇之彌優自下慢事愈甚所謂大綱疏小綱數三公非臣之仇臣非狂夫之作所以發憤忘食懇懇不已者誠念朝廷欲致興平故不能面譽也書奏帝復使對尚書顗復條序前章暢其㫖趣條便宜七事以對一事陵園至重聖神攸馮而災火炎赫迫近寝殿䰟而有靈猶將驚動尋宫殿官府近始永平歳時未積便更修造又西苑之設禽畜是處離房别觀本不常居而皆當務精土木營建無已消功殫賄巨億萬計易内傳曰人君奢侈多飾宫室其時旱其災火是故魯僖遭旱修政自勅下鐘鼓之縣休繕治之官雖則不寧而時雨自降由此言之天之應人敏於影響今月十七日戊午徴日也日加申風從寅來丑時而止丑寅申皆徴也不有火災必當為旱願陛下校計繕修之費永念百姓之勞罷將作之官減彫文之飾損庖厨之饌退宴私之樂易中孚傳曰陽感天不旋日如是則景雲降集眚沴息矣二事去年以來兊卦用事類多不效易傳曰有貌無實佞人也有實無貌道人也寒温為實清濁為貌今三公皆令色足恭外厲内荏以虚事上無佐國之實故清濁效而寒温不效也是以陰寒侵犯消息占曰日乗則有妖風日䝉則有地裂如是三年則致日食陰侵其陽漸積所致立春前後温氣應節者詔令寛也其後復寒者無寛之實也夫十室之邑必有忠信率土之人豈無貞賢未聞朝廷有所賞拔非所以求善贊務𢎞濟元元也宜採納良臣以助聖化三事臣聞天道不逺三五復反今年少陽之歳法當乗起恐後年已往將遂驚動涉歴天門災成戊巳今春當旱夏必有水臣以六日七分候之可知夫災眚之來縁類而應行有玷缺則氣逆於天精感變出以戒人君王者之義時有不登則損滋徹膳數年以來榖收稍減家貧户饉歳不如昔百姓不足君誰與足水旱之災雖尚未至然君子逺覽防微慮萌老子曰人之飢也以其上食稅之多也故孝文皇帝綈袍革舄木器無文約身薄賦時致升平今陛下聖徳中興宜遵前典惟節惟約天下幸甚易曰天道無親常與善人是故髙宗以享福宋景以延年四事臣竊見皇子未立儲宫無主仰觀天文太子不明熒惑以去年春分後十六日在婁五度推步三統熒惑今當在翼九度今反在柳三度則不及五十餘度去年八月二十四日戊辰熒惑歴輿鬼東入軒轅出后星北東去四度北旋復還軒轅者後宫也熒惑者至陽之精也天之使也而出入軒轅繞還往來易曰天垂象見吉凶其意昭然可見也禮天子一娶九女嫡媵畢具今宫人侍御動以千計或生而幽隔人道不通鬱積之氣上感皇天故遣熒惑入軒轅理人倫垂象見異以悟主上昔武王下車出傾宫之女表商容之閭以理人倫以表賢徳故天授以聖子成王是也今陛下多積宫人以違天意故皇允多夭嗣體莫寄詩云敬天之怒不敢戲豫方今之福莫若廣嗣廣嗣之術可不深思宜簡出宫女恣其姻嫁則天自降福子孫千億惟陛下丁寧再三留神扵此左右貴倖亦宜惟臣之言以悟陛下盖善言古者合於今善言天者合於人願訪問百僚有違臣言者臣當受茍言之罪五事臣竊見去年閏十月十七日己丑夜有白氣從西方天苑趨左足入玉井數日乃滅春秋曰有星孛于大辰大辰者何大火也大火為大辰罰又為大辰北極亦為大辰所以孛一宿而連三宿者言北辰王者之宫也凡中宫無節政教亂逆威武衰微則此三星以應之也罰者白虎其宿主兵其國趙魏變見西方亦應三輔凡金氣為變發在秋節臣恐立秋以後趙魏關西將有羌寇叛戾之患宜豫告諸郡使敬授人時輕徭薄賦勿妄繕起堅倉獄備守衞囘選賢能以鎮撫之金精之變責歸上司宜以五月丙午遣太尉服干戚建井旟書玉版之䇿引白氣之異於西郊責躬求愆謝咎皇天消滅祅氣盖以火勝金轉禍為福也六事臣竊見今月十四日乙卯巳時白虹貫日凡日傍色氣白而純者名為虹貫日中者侵太陽也見於春者政變常也方今中官外司各各考事其所考者或非急務又恭陵火災主名未立多所収捕備經考毒尋火為天戒以悟人君可順而不可違可敬而不可慢陛下宜恭己内省以備後災凡諸考案并須立秋又易傳曰公能其事序賢進士後必有喜反之則白虹貫日以甲乙見者則譴在中台自司徒居位陰陽多謬乆無虚已進賢之䇿天下興議異人同咨且立春以來金氣再見金能勝木必有兵氣宜黜司徒以應天意陛下不早攘之將負臣言遺患百姓七事臣伏惟漢興以來三百三十九歳於詩三基髙祖起亥仲二年今在戌仲十年詩汜歴樞曰卯酉為革政午亥為革命神在天門出入候聽言神在戌亥司候帝王興衰得失厥善則昌厥惡則亡於易雌雄祕歴今值困乏凡九二困者衆小人欲共困害君子也經曰困而不失其所其唯君子乎唯獨聖賢之君遭困遇險能致命遂志不去其道陛下乃者潛龍養徳幽𨼆屈戹即位之元紫宫驚動歴運之㑹時氣已應然猶恐祅祥未盡君子思患而豫防之臣以為戌仲已竟來年入季文帝改法除肉刑之罪至今適三百載宜因斯際大蠲法令官名稱號輿服器械事有所更變大為小去奢就儉機衡之政除煩為簡改元更始招求幽𨼆舉方正徴有道博採異謀開不諱之路臣陳引際㑹恐犯忌諱書不盡言未敢究暢臺詰顗曰對云白虹貫日政變常也朝廷率由舊章何所變易而言變常又言當大蠲法令革易官號或云變常以致災或改舊以除異何也又陽嘉初建復欲改元據何經典其以實對顗對曰方春東作布徳之元陽氣開發養導萬物王者因天視聽奉養時氣宜務崇温柔遵其行令而今立春之後考事不息秋冬之政行乎春夏故白虹春見掩蔽日曜凡邪氣乗陽則虹霓在日斯皆臣下執事刻急所致殆非朝廷優寛之本此其變常之咎也又今選舉皆歸三司非有周召之才而當則哲之重每有選用輙參之掾屬公府門巷賔客填集送去逆來財貨無已其當遷者競相薦謁各遣子弟充塞道路開長姦門興致浮偽非所謂率由舊章也尚書職在機衡宫禁嚴密私曲之意差不得通偏黨之恩或無所用選舉之任不如還在機密臣誠愚戇不知折中斯固逺近之論當今之宜又孔子曰漢三百載計厯改憲三百四歳為一徳五徳千五百二十歳五行更用王者随天譬猶自春徂夏改青服絳者也自文帝省刑適三百年而輕微之禁漸以殷積王者之法譬猶江河當使易避而難犯故易曰易則易知簡則易從易簡而天下之理得矣今去奢即儉以先天下改易名號随事稱謂易曰君子之道或出或處同歸殊塗一致百慮是知變常而善可以除災變常而惡必致於異今年仲竟來年入季仲終季始厯運變改故可改元所以順天道也顗又上書薦光禄大夫江夏黄瓊處士漢中李固宜䝉徴用任以時政并陳消災之術條便宜四事附奏於左一事孔子作春秋書正月者敬歳之始也王者則天之象因時之序宜開發徳號爵賢命士流寛大之澤垂仁厚之徳順助元氣含養庶類如此則天文昭爛星辰顯列五緯循軌四時和睦不則太陽不光天地溷濁時氣錯逆霾霧蔽日自立春以來累經旬朔未見仁徳有所施布但聞罪罰考掠之聲夫天之應人疾於影響而自從入歳常有䝉氣月不舒光日不宣曜日者太陽以象人君政變於下日應於天清濁之占随政抑揚天之見異事無虚作豈獨陛下倦於萬機帷幄之政有所闕歟何天戒之數見也臣願陛下發揚乾剛援引賢能勤求機衡之寄以獲斷金之利臣之所陳輙以太陽為先者明其不可久闇急當改正其異雖微其事甚重臣言雖約其㫖甚廣惟陛下乃眷臣章深留眀思二事孔子曰雷之始發大壯始君弱臣彊從解起今月九日至十四日大壯用事消息之卦也於此六日之中雷當發聲發聲則歳氣和王道興也易曰雷出地奮豫先王以作樂崇徳殷薦之上帝雷者所以開發萌芽辟陰除害萬物須雷而解資雨而潤故經曰雷以動之雨以潤之王者崇寛大順春令則雷應節不則發動於冬當震反潛故易傳曰當雷不雷太陽弱也今䝉氣不除日月變色則其效也天網恢恢踈而不失隨時進退應政得失大人者與天地合其徳與日月合其眀璇璣動作與天相應雷者號令其徳生養號令殆廢當生而殺則雷反作其時無歳陛下若欲除災昭祉順天致和宜察臣下尤酷害者亟加廢黜以安黎元則太皓恱和雷聲乃發三事去年十月二十日癸亥太白與歳星合於房心太白在北歳星在南相離數寸光芒交接房心者天帝眀堂布政之宫孝經鈎命決曰歳星守心年榖豐尚書洪範記曰日行中道移節應期徳厚受福重華留之重華者謂歳星在心也今太白從之交合眀堂金木相賊而反同合此以陰陵陽臣下専權之異也房心東方其國主宋石氏經曰歳星出左有年出右無年今金木俱東歳星在南是為出右恐年榖不成宋人飢也陛下宜審詳明堂布政之務然後妖異可消五緯順序矣四事易傳曰陽無徳則旱陰僭陽亦旱陽無徳者人君恩澤不施於人也陰僭陽者禄去公室臣下専權也自冬涉春訖無嘉澤數有西風反逆時節朝廷勞心廣為禱祈薦祭山川暴龍移市臣聞皇天感物不為偽動災變應人要在責已若令雨可請降水可攘止則歳無隔并太平可待然而災害不息者患不在此也立春以来未見朝廷賞錄有功表顯有徳存問孤寡賑恤貧窮而但見洛陽都官奔車東西收繫纎介牢獄充盈臣聞恭陵火處比有光曜眀此天災非人之咎丁丑大風掩蔽天地風者號令天之威怒皆所以感悟人君忠厚之戒又連月無雨將害粟麥若一榖不登則飢者十三四矣陛下誠宜廣被恩澤貸贍元元昔堯遭九年之水人有十年之蓄者簡稅防災為其方也願陛下早宣徳澤以應天功若臣言不用朝政不改者立夏之後乃有澍雨於今之際未可望也若政變於朝而天不雨則臣為誣罔分當鼎鑊書奏特詔拜郎中辭病不就即去歸家至四月京師地震遂陷其夏大旱秋鮮卑入馬邑城破代郡兵眀年西羌冦隴右皆略如顗言後公車徴不行同縣孫禮者積惡凶暴好游俠與其同里人常慕顗名徳欲與親善顗不顧以此結怨遂為禮所殺襄楷字公矩平原隰陰人也好學博古善天文陰陽之術桓帝時宦官専朝政刑暴濫又比失皇子災異尤數延熹九年楷自家詣闕上疏曰臣聞皇天不言以文象設敎堯舜雖聖必厯象日月星辰察五緯所在故能享百年之夀為萬世之法臣竊見去歳五月熒惑入太微犯帝坐出端門不軌常道其閏月庚辰太白入房犯心小星震動中耀中耀天王也傍小星者天王子也夫太微天廷五帝之座而金火罰星陽光其中於占天子凶又俱入房心法無繼嗣今年歳星乆守太微逆行西至掖門還竊執法歳為木精好生惡殺而淹留不去者咎在仁徳不修誅罰太酷前七年十二月熒惑與歳星俱入軒轅逆行四十餘日而鄧皇后誅其冬大寒殺鳥獸害魚鼈城傍竹栢之葉有傷枯者臣聞於師曰栢傷竹枯不出三年天子當之今洛陽城中人夜無故呌呼云有火光人聲正諠於占亦與竹栢枯同自春夏以来連有霜雹及大雨雷而臣作威作福刑罰急刻之所感也太原太守劉瓆南陽太守成瑨志除姦邪其所誅翦皆合人望而陛下受閹豎之譖乃逺加考逮三公上書乞哀瓆等不見採察而嚴被譴讓憂國之臣將遂杜口矣臣聞殺無罪誅賢者禍及二世自陛下即位以来頻行誅罰梁冦孫鄧並見族滅其從坐者又非其數李雲上書明主所不當諱杜衆乞死諒以感悟聖朝曽無赦宥而并被殘戮天下之人咸知其寃漢興以来未有拒諫誅賢用刑太深如今者也永平舊典諸當重論皆須冬獄先請後刑所以重人命也頃數十歳以来州郡翫習又欲避請讞之煩輙託疾病多死牢獄長吏殺生自已死者多非其罪䰟神寃結無所歸訴淫厲疾疫自此而起昔文王一妻誕致十子今宫女數千未聞慶育宜修徳省刑以廣螽斯之祚又七年六月十二日河内野王山上有龍死長可數十丈扶風有星隕為石聲聞三郡夫龍形狀不一小大無常故周易况之大人帝王以為符瑞或聞河内龍死諱以為蛇夫龍能變化蛇亦有神皆不當死昔秦之將衰華山神操璧以授鄭客曰今年祖龍死始皇逃之死於沙邱王莽天鳳二年訛言黄山宫有死龍之異後漢誅莽光武復興虚言猶然况於實邪夫星辰麗天猶萬國之附王者也下將畔上故星亦畔天石者安類墜者失勢春秋五石隕宋其後襄公為楚所執秦之亡也石隕東郡今隕扶風與先帝園陵相近不有大䘮必有叛逆案春秋以來及古帝王未有河清及學門自壊者也臣以為河者諸侯位也清者屬陽濁者屬陰河當濁而反清者陰欲為陽諸侯欲為帝也太學天子教化之宫其門無故自壊者言文徳將䘮教化廢也京房易傳曰河水清天下平今天垂異地吐祅人厲疫三者並時而有河清猶春秋麟不當見而見孔子書之以為異也臣前上琅邪宫崇受干吉神書不合眀聽臣聞布榖鳴於孟夏蟋蟀吟於始秋物有微而志信人有賤而言忠臣雖至賤誠願賜清閒極盡所言書奏不省十餘日復上書曰臣伏見太白北入數日復出東方其占當有大兵中國弱四夷彊臣又推步熒惑今當出而潛必有陰謀皆由獄多寃結忠臣被戮徳星所以久守執法亦為此也陛下宜承天意理察寃獄為劉瓆成瑨虧除罪辟追錄李雲杜衆等子孫夫天子事天不孝則日蝕星鬬比年日蝕於正朔三光不眀五緯錯戾前者宫崇所獻神書専以奉天地順五行為本亦有興國廣嗣之術其文易曉參同經典而順帝不行故國允不興孝冲孝質頻世短祚臣又聞之得主所好自非正道神為生虐故周衰諸侯以力征相尚於是夏育申休宋萬彭生任鄙之徒生於其時殷紂好色妲己是出葉公好龍真龍游廷今黄門常侍天刑之人陛下愛待兼倍常寵繼嗣未兆豈不為此天官宦者星不在紫宫而在天市眀當給使主市里也今乃反處常伯之位實非天意又聞宫中立黄老浮屠之祠此道清虚貴尚無為好生惡殺省慾去奢今陛下嗜慾不去殺罰過理既乖其道豈獲其祚哉或言老子入夷狄為浮屠浮屠不三宿桑下不欲久生恩愛精之至也天神遺以好女浮屠曰此但革囊盛血遂不盻之其守一如此乃能成道今陛下淫女豔婦極天下之麗甘肥飲美殫天下之味奈何欲如黄老乎書上即召詔尚書問狀楷曰臣聞古者本無宦臣武帝末春秋髙數游後宫始置之耳後稍見任至於順帝遂益繁熾今陛下爵之十倍於前至今無繼嗣者豈獨好之而使之然乎尚書上其對詔下有司處正尚書承㫖奏曰宦者之官非近世所置漢初張澤為大謁者佐絳侯誅諸吕孝文使趙談驂乗而子孫昌盛楷不正辭理指陳要務而析言破律違背經藝假借星宿偽託神靈造合私意誣上罔事請下司𨽻正楷罪遂收送洛陽獄帝以楷言雖激切然皆天文恒象之數故不誅猶司冦論刑初順帝時琅邪宫崇詣闕上其師干吉於曲陽泉水上所得神書百七十卷皆縹白素朱介青首朱目號太平清領書其言以陰陽五行為家而多巫覡雜語有司奏崇所上妖妄不經乃收蔵之後張角頗有其書焉及靈帝立以楷書為然太傅陳蕃舉方正不就郷里宗之毎太守至輙致禮請中平中與荀爽鄭元俱以博士徴不至卒於家郭伋字細侯扶風茂陵人也髙祖父解武帝時以任俠知名父梵為蜀郡太守伋少有志行哀平間辟大司空府三遷為漁陽都尉王莽時為上谷大尹遷并州牧更始新立三輔連被兵冦百姓震駭彊宗右姓各擁衆保營莫肯先附更始素聞伋名徴拜大馮翊使鎮撫百姓世祖即位拜雍州牧再轉為尚書令數納忠諫諍建武四年出為中山太守眀年彭寵滅轉為漁陽太守漁陽既離王莽之亂重以彭寵之敗民多猾惡㓂賊充斥伋到示以信賞紏戮渠帥盜賊消散時匈奴數抄郡界邊境苦之伋整勒士馬設攻守之略匈奴畏憚逺迹不敢復入塞民得安業在職五歳户口増倍潁川盜賊羣起九年徴拜潁川太守召見辭謁帝勞之曰賢能太守去帝城不逺河潤九里冀京師并蒙福也君雖精於追捕而山道險阸自鬭當一士耳深宜慎之伋到郡招懐山賊陽夏趙宏襄城召吳等數百人皆束手詣伋降悉遣歸附農因自劾専命帝美其䇿不以咎之後宏吳等黨與聞伋威信逺自江南或從幽冀不期俱降駱驛不絶十一年省朔方刺史屬并州帝以盧芳據北土為冦乃調伋為并州牧過京師謝恩帝即引見并召皇太子諸王宴語終日賞賜車馬衣服什物伋因言選補衆職當簡天下賢俊不宜専用南陽人帝納之伋前在并州素結恩徳及後入界所到縣邑老㓜相携逢迎道路所過問民疾苦聘求耆徳雄俊設几杖之禮朝夕與參政事始至行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問曰兒曹何自逺来對曰聞使君到喜故来奉迎伋辭謝之及事訖諸兒復送至郭外問使君何日當還伋謂别駕從事計日當告之行部既還先期一日伋為違信於諸兒遂止於野亭須期乃入是時朝廷多舉伋可為大司空帝以并部尚有盧芳之警且匈奴未安欲使久於其事故不召伋知盧芳夙賊難卒以力制常嚴烽候眀購賞以結寇心芳將隋昱遂謀脅芳降伋芳乃亡入匈奴伋以老病上書乞骸骨二十二年徴為太中大夫賜宅一區及帷帳錢榖以充其家伋輙散與宗族無所遺餘眀年卒年八十六帝親臨弔賜冢塋地杜詩字公君河内汲人也少有才能仕郡功曹有公平稱更始時辟大司馬府建武元年歳中三遷為侍御史安集洛陽時將軍蕭廣放縱兵士暴横民間百姓惶擾詩勅曉不改遂格殺廣還以狀聞光武召見賜以棨㦸復使之河東誅降逆賊楊異等詩到大陽聞賊規欲北度乃與長史急焚其船部勒郡兵將突騎赴擊斬異等賊遂翦滅拜成臯令視事三歳舉政尤異再遷為沛郡都尉轉汝南都尉所在稱治七年遷南陽太守性節儉而政治清平以誅暴立威善於計略省愛民役作水排鑄為農器排音蒲拜反冶鑄者為排以吹炭今激水以鼓之也排當作㰆古字通用用力少見功多百姓便之又脩治陂池廣拓土田郡内比室殷足時人方於召信臣故南陽為之語曰前有召父後有杜母詩自以無勞不安久居大郡求欲降避功臣乃上疏曰陛下亮成天工克濟大業偃武修文羣帥反旅海内和合萬世蒙福天下幸甚唯匈奴未譬聖徳威侮二垂陵虐中國邊民虚耗不能自守臣恐武猛之將雖勁亦未得解甲櫜弓也夫勤而不息亦怨勞而不休亦怨怨恨之師難復責功臣伏覩將帥之情功臣之望冀一休足於内郡然後即戎出命不敢有恨臣愚以為師克在和不在衆陛下雖垂念北邊亦當頗泄用之昔湯武善御衆故無忿鷙之師陛下起兵十有三年將帥和睦士卒鳧藻今若使公卿郡守出於軍壘則將帥自厲士卒之復比於宿衞則戎事自百何者天下已安各重性命大臣以下咸懐樂土不讐其功而厲其用無以勸也陛下誠宜虚􅆙數郡以俟振旅之臣重復厚賞加於久役之士如此縁邊屯戍之師競而忘死乗城拒塞之吏不辭其勞則烽火精眀守戰堅固聖王之政必因人心今猥用愚薄塞功臣之望誠非其宜臣詩伏自惟忖本以史吏一介之才遭陛下創制大業賢俊在外空乏之間超受大恩牧養不稱奉職無効久竊禄位令功臣懐慍誠惶誠恐八年上書乞避功徳陛下殊恩未許放退臣詩䝉恩尤深義不敢茍冒虚請誠不勝至願願退大郡受小職及臣齒壯力能經營劇事如使臣詩必有補益復受大位雖析珪受爵所不辭也惟陛下哀矜帝惜其能遂不許之詩雅好推賢數進知名士清河劉統及魯陽長董崇等初禁網尚簡但以璽書發兵未有虎符之信詩上疏曰臣聞兵者國之凶器聖人所慎舊制發兵皆以虎符其餘徴調竹使而已符策合㑹取為大信所以明著國命斂持威重也閒者發兵但用璽書或以詔令如有姦人詐偽無由知覺愚以為軍旅尚興賊虜未殄徴兵郡國宜有重慎可立虎符以絶姦端昔魏之公子威傾鄰國猶假虎符以解趙圍若無如姬之仇則其功不顯事有煩而不可省費而不得已盖謂此也書奏從之詩身雖在外盡心朝廷讜言善䇿隨事獻納視事七年政化大行十四年坐遣客為弟報仇被徴㑹病卒司隸校尉鮑永上言詩貧困無田宅䘮無所歸詔使治䘮郡邸賻絹千匹孔奮字君魚扶風茂陵人也曽祖霸元帝時為侍中奮少從劉歆受春秋左氏傳歆稱之謂門人曰吾已從君魚受道矣遭王莽亂奮與老母幼弟避兵河西建武五年河西大將軍竇融請奮署議曹掾守姑臧長八年賜爵關内侯時天下擾亂惟河内獨安而姑臧稱為富邑通貨羌胡市日四合每居縣者不盈數月輙致豐積奮在職四年財産無所増事母孝謹雖為儉約奉養極求珍膳躬率妻子同甘菜茹時天下未定士多不脩節操而奮力行清潔為衆人所笑或以為身處脂膏不能以自潤徒益苦辛耳奮既立節治貴仁平太守梁統深相敬待不以官屬禮之常迎於大門引入見母隴蜀既平河西守令咸被徴召財貨連轂彌竟川澤唯奮無資單車就路姑臧吏民及羌胡更相謂曰孔君清㢘仁賢舉縣䝉恩如何今去不共報徳遂相賦斂牛馬器物千萬以上追送數百里奮謝之而已一無所受既至京師除武都郡丞時隴西餘賊隗茂等夜攻府舍殺郡守賊畏奮追急乃執其妻子欲以為質奮年已五十惟有一子終不顧望遂窮力討之吏民感義莫不倍用命焉郡多氐人便習山谷其大豪齊鍾留者為羣氐所信向奮乃率鍾留等令要遮鈔擊共為表裏賊窘懼逼急乃推奮妻子以置軍前冀當退郤而奮擊之愈厲遂禽滅茂等奮妻子亦為所殺世祖下詔襃美拜為武都太守奮自為府丞已見敬重及拜太守舉郡莫不改操為政眀斷甄善疾非見有美徳愛之如親其無行者忿之若讐郡中稱為清平弟竒游學洛陽奮以竒經眀當仕上病去官守約郷閭卒扵家竒博通經典作春秋左氏刪奮晚有子嘉官至城門校尉作左氏說云張堪字君游南陽宛人也為郡族姓堪早孤讓先父餘財數百萬與兄子年十六受業長安志美行厲諸儒號曰聖童光武微時見堪志操常嘉焉及即位中郎將来歙薦堪召拜郎中三遷為謁者使送委輸縑帛并領騎七千匹詣大司馬吳漢伐公孫述在道追拜蜀郡太守時漢軍餘七日糧陰具船欲遁去堪聞之馳往見漢說述必敗不宜退師之䇿漢從之乃示弱挑敵述果自出戰死城下成都既拔堪先入據其城檢閲庫藏收其珍寳悉條列上言秋毫無私慰撫吏民蜀人大恱在郡二年徴拜騎都尉後領驃騎將軍杜茂營擊破匈奴於髙柳拜漁陽太守捕擊姦猾賞罰必信吏民皆樂為用匈奴嘗以萬騎入漁陽堪率數千騎奔擊大破之郡界以静乃於狐奴開稻田八千餘頃勸民耕種以致殷富百姓歌曰桑無附枝麥穂兩岐張君為政樂不可支視事八年匈奴不敢犯塞帝嘗召諸郡計吏問其風土及前後守令能否蜀郡計掾樊顯進曰漁陽太守張堪昔在蜀仁以恵下威能討姦前公孫述破時珍寳山積捲握之物足富十世捲握猶掌握也謂珠玉之類而堪去職之日乗折轅車布被囊而已帝聞良久嘆息拜顯為魚復長方徴堪㑹病卒帝深悼惜之下詔襃揚賜帛百匹㢘范字叔度京兆杜陵人趙將㢘頗之後漢興以㢘氏豪宗自苦陘徙焉世為邊郡守或葬隴西襄武故因仕焉曽祖父襃成哀間為右將軍祖父丹王莽時為大司馬庸部牧皆有名前世范父遭䘮亂客死於蜀漢范遂流寓西州西州平歸郷里年十五辭母西迎父䘮蜀郡太守張穆丹之故吏乃重資送范范無所受與客步負䘮歸至葭萌載船觸石破沒范抱持棺柩遂俱沈溺衆傷其義鈎求得之療救僅免於死穆聞復馳遣使持前資物追范范又固辭歸葬服竟詣京師受業事博士薛漢京兆隴西二郡更請召皆不應永平初隴西太守鄧融備禮謁范為功曹㑹融為州所舉按范知事譴難解欲以權相濟乃託病求去融不達其意大恨之范乃變名姓東至洛陽求代廷尉獄卒居無幾融果徴下獄范遂得衞侍左右盡心勤勞融怪其類范而殊不意乃謂曰卿何似我故功曹邪范訶之曰君困厄瞀亂邪語遂絶融繫出困病范隨而往視及死竟不言身自將車送䘮至南陽葬畢乃去後辟公府㑹薛漢坐楚王事誅門生故人莫敢視范獨往收歛之吏以聞顯宗大怒召范入詰責曰薛漢與楚王同謀交亂天下范公府掾不與朝廷同心而反收歛罪人何也范叩頭曰臣無狀愚戅以為漢等皆已伏誅不勝師資之情罪當萬坐帝怒稍解問范曰卿㢘頗後邪與右將軍襃大司馬丹有親屬乎范對曰襃臣之曽祖丹臣之祖也帝曰怪卿志膽敢爾遂貰之由此顯名舉茂才數月再遷為雲中太守㑹匈奴大入塞烽火日通故事虜過五千人移書傍郡吏欲傳檄求救范不聽自率士卒拒之虜衆盛而范兵不敵㑹日暮令軍士各交縛兩炬三頭爇火營中星列虜遥望火多謂漢兵救至大驚待旦將退范乃令軍中蓐食晨往赴之斬首數百級虜自相轔藉死者千餘人是後不敢復向雲中後頻歴武威武都二郡太守隨俗化導各得治宜建初中遷蜀郡太守其俗尚文辯好相持短長范每勵以淳厚不受偷薄之說成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相𨼆蔽燒者日屬范乃毁削先令但嚴使儲水而已百姓為便乃歌之曰㢘叔度來何暮不禁火民安作平生無襦今五袴在蜀數年坐法免歸郷里范世在邊廣田地積財粟以賑宗族朋友肅宗崩范奔赴敬陵時廬江郡掾嚴麟奉章弔國俱㑹於路麟乗小車塗深馬死不能自進范見而愍然命從車下馬與之不告而去麟事畢不知馬所歸乃縁蹤訪之或謂麟曰故蜀郡太守㢘叔度好周人窮急今奔國䘮獨當是耳麟亦素聞范名以為然即牽馬造門謝而歸之世服其好義然依倚大將軍竇憲以此為譏卒於家初范與洛陽慶鴻為刎頸交時人稱曰前有管鮑後有慶㢘鴻慷慨有義節位至琅邪㑹稽二郡太守所在有異迹王堂字敬伯廣漢郪人也初舉光禄茂才遷榖城令治有名迹永初中西羌冦巴郡為民患詔遣中郎將尹就攻討連年不克三府舉堂治劇拜巴郡太守堂馳兵赴賊斬虜千餘級巴庸清静吏民生為立祠刺史張喬表其治能遷右扶風安帝西巡阿母王聖中常侍江京等並請屬於堂堂不為用掾史固諫之堂曰吾䝉國恩豈可為權寵阿意以死守之即日遣家屬歸閉閤上病果有誣奏堂者㑹帝崩京等悉誅堂以中正見稱永建二年徴入為將作大匠四年坐公事左轉議郎復拜魯相政存簡一至數年無辭訟遷汝南太守捜賢禮士不茍自専乃敎掾史曰古人勞於求賢逸於任使故能化清於上事緝於下其憲章朝右簡覈才識委功曹陳蕃匡政理務拾遺補闕任主簿應嗣庶循名責實察言觀效焉自是委誠求當不復妄有辭敎郡内稱治時大將軍梁商及尚書令袁湯以求屬不行並恨之後廬江賊迸入弋陽界堂勒兵追討即使奔散而商湯猶因此諷州奏堂在任無警免歸家年八十六卒遺令薄歛瓦棺以葬子穉清行不仕曽孫商益州牧劉焉以為蜀郡太守有治聲蘇章字孺文扶風平陵人也八世祖建武帝時為右將軍祖父純字桓公有髙名性彊切而持毁譽士友咸憚之至乃相謂曰見蘇桓公患其敎責人不見又思之三輔號為大人永平中從奉車都尉竇固軍出擊北匈奴車師有功封中陵郷侯官至南陽太守章少博學能屬文安帝時舉賢良方正對䇿髙第為議郎數陳得失言甚切直出為武原令時歳飢輙開倉廪活三千餘户順帝時遷冀州刺史故人為清河太守章行部按其姦臧乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史按事者公法也遂舉正其罪州境知章無私望風畏肅換為并州刺史以摧折權豪忤㫖坐免隱身郷里不交當世後徴為河南尹不就時天下日敝民多愁苦論者舉章有幹國才朝廷不能復用卒扵家兄曽孫不韋字公先父謙初為郡督郵時魏郡李暠為美陽令與中常侍具瑗交通貪暴為民患前後監司畏其勢援莫敢紏問及謙至部案得其臧論輸左校謙累遷至金城太守去郡歸郷里漢法免罷守令自非詔徴不得妄到京師而謙後私至洛陽時暠為司隸校尉收謙詰掠死獄中暠又因刑其尸以報宿怨不韋時年十八徴詣公車㑹謙見殺不韋載䘮歸郷里􅄟而不葬仰天嘆曰伍子胥獨何人也乃蔵母於武都山中遂變名姓盡以家貲募劔客邀暠於諸陵間不尅㑹暠遷大司農時右校芻廥在寺北垣下不韋與親從兄弟潛入廥中夜則鑿地晝則逃伏如此經月遂得傍達暠之寝室出其牀下值暠在厠因殺其妾并及小兒留書而去暠大驚懼乃布棘於室以板藉地一夕九徙雖家人莫知其處每出輙劒㦸隨身壯士自衞不韋知暠有備乃日夜飛馳徑到魏郡掘其父阜冢斷取阜頭以祭父墳又摽之於市曰李君遷父頭暠匿不敢言而自上退位歸郷里私掩塞冢槨捕求不韋歴歳不能得暠恚感傷發病歐血死不韋後遇赦還家乃始改葬行䘮士大夫多譏其發掘冢墓歸罪枯骨不合古義惟任城何休方之伍員太原郭林宗聞而論之曰子胥雖云逃命而見用彊吳慿闔廬之威因輕悍之衆雪怨舊郢曽不終朝而但鞭墓戮屍以舒其忿竟無手刃後主之報豈如蘇子單特孑立靡因靡資彊讐豪援據位九卿城闕天阻官府幽絶埃塵所不能過霧露所不能沾不韋殺身焦慮出於百死冒觸嚴禁陷族禍門雖不獲逞為報已深况復分骸斷首以毒生者使暠懐忿結不得其命猶假手神靈以斃之也力唯匹夫功隆千乗比之於員不以優乎議者於是貴之後太傅陳蕃辟不應為郡五官掾初𢎞農張奐睦於蘇氏而武威叚熲與暠素善後奐熲有隙及熲為司隸以禮辟不韋不韋懼之稱病不詣熲既積忿於奐因發怒乃追咎不韋前報暠事以為暠表治謙事被報見誅君命天也而不韋仇之又令長安男子告不韋多將賔客奪舅財物遂使從事張賢等就家殺之乃先以鴆與賢父曰若賢不得不韋便同飲此賢到扶風郡守使不韋奉謁迎賢賢即時收執并其一門六十餘人盡誅滅之諸蘇以是衰破及叚熲為楊球所誅天下以為蘇氏之報焉羊續字興祖泰山平陽人也其先七世二千石卿校祖父侵安帝時司隸校尉父儒桓帝時為太常續以忠臣子孫拜郎中去官後辟大將軍竇武府及武敗坐黨事禁錮十餘年幽居守静及黨禁解復辟太尉府四遷為廬江太守後揚州黄巾賊攻舒焚燒城郭續發縣中男子二十以上皆持兵勒陣其小弱者悉使負水灌火㑹集數萬人并勢力戰大破之郡界平後安風賊戴風等作亂續復擊破之斬首三千餘級生獲渠帥其餘黨軰原為平民賦與佃器使就農業中平三年江夏兵趙慈反殺南陽太守秦頡攻沒六縣拜續為南陽太守當入郡界乃羸服閒行侍童子一人觀歴縣邑採問風謡然後乃進其令長貪潔吏民良猾悉逆知其狀郡内驚悚莫不震懾乃發兵與荆州刺史王敏共擊慈斬之獲首五千餘級屬縣餘賊並詣續降續為上言宥其枝附賊既清平乃班宣政令候民病利百姓歡服時權豪之家多尚奢麗續深疾之常敝衣薄食車馬羸敗府丞常獻其生魚續受而縣於庭丞後又進之續乃出前所縣者以杜其意續妻後與子祕俱詣郡舍續閉門不内妻自將祕行其資蔵唯有布衾敝袛裯袛裯短衣也廣雅云即襜褕也袛丁奚反裯丁勞反鹽麥數斛而已顧勅祕曰吾自奉若此何以資爾母乎使與母俱歸六年靈帝欲以續為太尉時拜三公者皆輸東園禮錢千萬令中使督之名為左騶其所之往輙迎致禮敬厚加贈賂續乃坐使人於單席舉緼袍以示之曰臣之所資唯斯而已左騶白之帝不恱以此故不登公位而徴為太常未及行㑹病卒年四十八遺言薄歛不受􅀈遺舊典二千石卒官賻百萬府丞焦儉遵續先志一無所受詔書襃美勅泰山太守以府錢百萬賜續家云賈琮字孟堅東郡聊城人也舉孝㢘再遷為京兆尹有政理迹舊交趾土多珍産眀璣翠羽犀象瑇瑁異香美木之屬莫不自出前後刺史多無清行上承權貴下積私賂財計盈給輙復求見遷代故吏民怨叛中平元年交趾屯兵反執刺史及合浦太守自稱柱天將軍靈帝特勅三府精選能吏有司舉琮為交趾刺史琮到部訊其反狀咸言賦斂過重百姓空單京師遥逺告寃無所民不聊生自活故聚為盜賊琮即移書告示各使安其資業招撫荒散蠲復徭役誅斬渠帥為大害者簡選良吏試守諸縣歳間蕩定百姓以安巷路為歌曰賈父来晚使我先反今見清平吏不敢飯在事三年為十三州最徴拜議郎時黄巾新破兵凶之後郡縣重斂因縁生姦詔書沙汰刺史二千石更選清能吏乃以琮為冀州刺史舊典𫝊車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當逺視廣聽紏察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震其諸臧過者望風解印綬去惟癭陶長濟陰董昭觀津長梁國黄就當官待琮於是州界翕然靈帝崩大將軍何進表琮為度遼將軍卒官陸康字季寧吳郡吳人也祖父續在獨行𫝊父襃有志操連徴不至康少仕郡以義烈稱刺史臧旻舉為茂才除髙成令縣在邊垂舊制令户一人具弓弩以備不虞不得行来長吏新到輙發民繕修城郭康至皆罷遣百姓大恱以恩信為治寇盜亦息州郡表上其狀光和元年遷武陵太守轉守桂陽樂安二郡所在稱之時靈帝欲鑄銅人而國用不足乃詔調民田畝斂十錢而比水旱傷稼百姓貧苦康上疏諫曰臣竊聞詔書畝斂田錢鑄作銅人伏讀惆悵悼心失圖夫什一而稅周謂之徹徹者通也言其法度可通行萬世也故魯宣稅畝而蝝災自生哀公増賦而孔子非之豈有聚奪民物以勞無用之銅人捨聖戒自蹈亡王之法哉傳曰君舉必書書而不法後世何述焉書奏内倖因此譖康援引亡國以譬聖明大不敬檻車徴詣廷尉侍御史劉岱典考其事岱為表陳解釋免歸田里復徴拜議郎㑹廬江賊黄穰等與江夏蠻連結十餘萬人攻沒四縣拜康廬江太守康申眀賞罰擊破穰等餘黨悉降帝嘉其功拜康孫尚為郎中獻帝即位天下大亂康䝉險遣孝㢘計吏奉貢朝廷詔書䇿勞加忠義將軍秩中二千石時袁術屯兵夀春部曲飢餓遣使求委輸兵甲康以其叛逆閉門不通内修戰備以禦之術大怒遣其將孫䇿攻康圍城數重康固守吏士有先受休假者皆遁伏還赴暮夜縁城而入受敵二年城陷月餘發病卒年七十家族百餘人遭離飢戹死者將半朝廷愍其守節拜子雋為郎中少子績仕吳為鬱林太守吳史有傳通志卷一百七下
