body:
  text: 通志卷二宋右廸功郎鄭樵漁仲撰五帝紀第二帝少昊帝顓頊帝嚳帝堯帝舜帝少昊青陽氏即元囂也亦謂之摰或言名摰以金德王天下亦謂之金天氏邑於窮桑帝初為已姓之祖後改為嬴作都於曲阜樂曰九淵用度量制樂器有鳳鳥之瑞故以鳥紀官為鳥師而鳥名鳳鳥氏歴正也元鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也瞗鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正九扈為九農正官修其方而天下理帝有四子重該修熙重為木正曰句芒該為金正曰蓐收修熙相代為水正曰元㝠又有金天氏之裔子曰昧為元㝠師有共工氏之子為土正曰句龍有髙陽氏之孫黎為髙辛氏之火正曰祝融是為五官皆在髙陽髙辛之世少昊在位八十四年年百嵗或云在位百年命歴序曰少昊傳八世五百年或云十世四百年葬雲陽臣謹按昊亦作皥以能修太昊之法故曰少昊或言明象日月故曰少昊然昊者天之昭著也太昊少昊皆明於天事者諸家記載並存少昊惟司馬遷失紀謂黄帝崩髙陽立且有君如少昊詎可不書况與髙陽髙辛堯舜之帝是為五帝顓頊髙陽氏黄帝之孫昌意之子生十嵗而佐少昊十二而冠二十即帝位受學於綠圖静淵以有謀疏通而知事養材以任地載時以象天依鬼神以制義治氣以教化絜誠以祭祀樂曰五莖或云六莖作都于衛是為帝邱後徙髙陽故稱髙陽氏尚赤薦玉以赤繒少昊之衰也九黎亂德民神雜糅不可方物家為巫史無有要質民匱于祀嘉生不降無物以享禍災荐臻莫盡其氣顓帝受之乃命南正重司天以屬神北正黎司地以屬民使復舊常無相侵瀆作歴以孟春為元是時正月朔旦立春五星會于營室冰始泮蟄始出雞三號天曰作時地曰作昌人曰作樂鳥獸萬物皆以和應故顓帝聖人為歴宗也命飛龍氏作樂效八風之音名曰承雲以祭上帝北至于幽陵南至于交趾西至于流沙東至于蟠木東海有山名曰度索上有大桃樹屈蟠三千里動静之物小大之神日月所照莫不砥屬有子四人曰窮蟬伯鯀臯陶老童顓帝崩葬濮陽在位七十八年年九十八嵗或云九十一嵗命歴序曰顓帝傳九世三百五十年或云八世五百四十八年臣謹按髙陽氏以水德王天下又按容成造歴雖起於黄帝而三統歴始自伏羲然歴法以顓帝為宗上古之時民淳俗熙為君者惟以奉天事神為務故其治略於人而詳於天其行事見於方冊者載在歴家及緯書為多唐虞之後以民事為急故其治詳於人而略於天孔子不語怪力亂神故著書斷自唐虞又按顓帝之法婦人不避男子於路者刜之四逹之衢命鱓先為樂倡鱓乃偃浸以其尾鼓其腹其音英此皆誕言也帝嚳髙辛氏亦曰俈黄帝之曾孫也黄帝生元囂是為少昊元囂生蟜極蟜極不得位而生嚳姬姓嚳問道於栢招年十五佐高陽三十登帝位以其居於髙辛故曰髙辛氏樂曰六英或曰五英作都于亳尚黑薦玉以黑繒命咸黑為聲歌九韶六列六英命倕作鞞鼓鍾磬吹笭管壎箎鳳鳥天翟來舞以光帝德命重黎為火正曰祝融或言顓帝生稱稱生卷章卷章生重黎為嚳火正焞燿敦大天明地德光照四海生柔嘉材故命曰祝融共工氏作亂帝命重黎誅之而不盡帝以庚寅日誅重黎以其弟吳回為重黎後復居火正為祝融遂平共工氏帝生而神靈自言其名博愛利物不於其身聰以知逺明以察微順天之義知民之急仁而威惠而信修身而天下治取地之財而節用之撫萬民而利誨之歴日月而迎送之明鬼神而謹事之帝執中而徧天下日月所照風雨所至莫不服從帝有六子陳鋒氏女曰慶都孕十四月生堯於丹陵娵訾氏女曰常儀生摯有邰氏女曰姜原生棄有娀氏女曰簡狄生契又有閼伯封商邱主辰實沈封大夏主參未知其母之為誰也嚳在位七十五年年百五嵗或云六十三年年百嵗又云九十八嵗九十二嵗葬濮陽命歴序曰嚳傳十世四百年摯嗣立荒淫無度諸侯廢之推堯為天子摯在位九年非帝之限不當五運自黄帝至摯三百四十一年少昊至摯四世二百四十一年命歴序曰黄帝傳十世千五百二十年或云十八代臣謹按髙辛氏以木德王天下又按共工氏在伏羲之後專任知刑以水德居木火之間霸而不王亦以水紀官周語曰共工欲壅防百川墮髙堙庳以害天下皇天弗福庶民弗佑是以滅亡賈逵曰共工諸侯也炎帝之後姜姓髙陽氏衰共工與髙辛争而王歸藏啓筮曰共工人面蛇身朱髮淮南子曰共工之力觸不周之山使地傾東南與髙辛争而帝遂潛于淵又曰舜時有共工振滔洪水以薄空桑文子曰共工水害顓帝誅之荀卿曰禹伐共工據此所言皆不足信然共工氏當始於伏羲之後子孫承傳以至堯舜之世皆謂之共工氏帝堯陶唐氏曰放勲嚳之子姓伊祁身長十尺年十五佐兄摯封唐侯二十一即帝位或言摯禪于堯髙氏云摯崩而帝放勲立堯始封于唐今中山唐邑後遷于晉陽及為天子都平陽樂曰大章帝聰明文思允恭克讓其仁如天其知如神就之如日望之如雲富而不驕貴而不舒以尹夀為師以許由為友内則親睦九族外則辨章百姓協和萬邦黎民於變時雍黄收純衣彤車乗白馬尚白薦玉以白繒茅茨不翦土階三尺樸桷不斵素題不枅大羮不和粢食不鑿大路無文越席不純飯土簋飲土鉶夏葛衣冬鹿裘棄金玉捐文綺不視異物不寶玩器衣履不盡敝不更為禁淫偽輕徭賦不奪民時不争民利置諌鼓逹窮民立謗木使人書之樂聞過也廵狩告成周流五嶽存鰥寡賑荒札一民饑則曰我饑之一民寒則曰我寒之一民罹辜則曰我䧟之故民戴之如日月愛之如父母不賞而勸不罰而治三苗復九黎之亂堯克之于丹水之浦以服南蠻不忘重黎之舊使其後復典之是為羲氏和氏乃命以順天之道歴象日月星辰分為四序以授民時羲仲居嵎夷理東作以殷春中羲叔居南交理南訛以正夏至和仲居昧谷理西成以殷秋中和叔居朔方理朔易以正冬至四時之氣既正日星之躔無爽故人民之作息鳥獸之孳乳皆可得而理乃正閏餘以成嵗功下逮商周重黎氏世叙天地而别其分主是時龍門未開呂梁未發河出孟門江淮通流無有平原髙阜故曰洪水滔天懷山襄陵堯憂民之憂而求治水者羣臣四嶽皆舉髙陽氏之子伯鯀堯封鯀為崇伯使之治水鯀乃興徒役而作九仞之城訖無成功堯有子十人散宜氏之女曰女皇生丹朱應嗣堯以年老欲巽位而丹朱嚚訟不可授乃以天下授許由許由不受乃訪諸四嶽嶽曰有鰥民曰虞舜瞽瞍之子父頑母嚚弟傲舜以孝道諧其家使不至於惡堯曰我其試哉乃妻以二女封之有虞而為諸侯歴試三年知舜之德以為授舜則天下得其利而丹朱病授丹朱則天下病而丹朱得其利堯曰終不以天下之病而利一人卒授舜陶唐氏之世俗熙民泰有老人擊壤而歌於路曰吾日出而作日入而息鑿井而飲耕田而食帝力於我何有哉故仲尼稱之曰惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功堯生以甲申即位以甲辰召舜以甲午召舜之年堯七十一矣舜以甲寅攝政堯九十一矣以辛巳崩是避位二十八年在位九十八年凡百十八嵗葬于榖林實濟隂百姓悲哀如喪父母三年四方莫舉樂舜畢三年之喪避丹朱於南河之南諸侯朝覲者不之丹朱而之舜獄訟者不之丹朱而之舜謳歌者不謳歌丹朱而謳歌舜舜曰天也而後之中國踐天子位焉臣謹按陶唐氏以火德王天下又按陶唐之世越裳國獻神龜蓋千嵗方三尺餘背有科斗文記開闢以來堯命錄之謂之龜歴又堯之庭有草生焉曰蓂莢十五之前日生一葉十五之後日落一葉小餘則一葉厭而不落觀之可以知旬朔故又名歴草景星見甘露降醴泉溢朱草生神禾敷鳳巢阿閣龍見宫沼玉藕生沼中蒭化為禾烏化為白宫中一日而十瑞又按淮南子堯時十日並出堯命羿仰射之中其九九烏皆死墮其羽翼或言十日並出焦禾稼殺草木而民無所食䝟貐鑿齒九嬰大風封豨修蛇皆為民害堯使羿誅鑿齒於疇華之野殺九嬰於凶水之上繳大風於青邱之澤上射十日下殺䝟貐斷修蛇於洞庭禽封豨於桑林於是山川險夷道里逺近可得而理也又按任昉述異記堯誅鯀於羽山化為黄熊入於羽淵今㑹稽人祭禹廟不用熊白黄能即黄熊也陸居曰熊水居曰能昉按今江淮中獸名能能蛇之精冬化為雉春復為蛇今吳中不食雉毒故也臣謹按能乃來切所以古人借為耐字其音與熊自是相逺惟文相近所以致訛實非熊也又按如淳曰誹謗之木即橋梁交午柱頭也應邵曰誹謗木橋梁邊版也所以書政治之愆至秦去之帝舜有虞氏曰重華亦曰大舜亦曰都君顓頊生窮蟬窮蟬生敬康敬康生句芒句芒生蟜牛蟜牛生瞽瞍瞽瞍生舜自窮蟬至舜皆微為庶人舜重瞳龍顔大口黑色長六尺生於姚墟故姓以姚舜之母曰握登死而瞽瞍以繼室生象瞽瞍惑於繼室而昵象象復隂相父母有殺舜之心舜無所恨而事父母與弟不敢怠遑年雖五十猶作嬰兒慕親堯聞其賢聘之於草茅之中與之語禮樂而知其道廣大不窮妻以二女以觀其内使九男與處以觀其外舜遷于媯汭二女從之率舜之教不敢以貴易其親戚盡婦道焉九男相與益篤舜冀州人也耕于歴山歴山之人皆譲畔漁于雷澤雷澤之人皆讓居陶於河濱河濱之器不苦窳作什器於夀邱就時於負夏一年所居成聚二年成邑三年成都昔髙陽氏有才子八人天下謂之八愷髙辛氏有才子八人天下謂之八元此十六族者世濟其美不隕其名堯不能舉舜舉八愷使主后土以揆百事莫不時序舉八元使布五教于四方内平外成昔帝鴻氏有不才子天下謂之渾敦少昊氏有不才子天下謂之窮竒顓頊氏有不才子天下謂之檮杌縉雲氏有不才子天下謂之饕餮渾敦窮竒檮杌饕餮皆惡獸也能為人害故天下之人目為四㓙堯不能去舜乃流四㓙族投諸四裔以禦魑魅舜有大功二十四方莫不仰戴堯知舜之足授天下也使攝行天子事舜辭不獲乃以正月朔受終于文祖文祖者堯之祖廟以明天下之重不敢以已授也舜用璿璣玉衡以齊日月五星之政類于上帝禋于六宗望于山川徧于羣神集五瑞五瑞者五等諸侯所執之玉也覲四嶽羣牧然後班瑞修廵狩之禮嵗二月東廵狩至于岱宗柴望秩于山川覲東方諸侯協時月正日同律度量衡修五禮五玉三帛二生一死贄如五瑞卒乃復五月南廵狩八月西廵狩十一月北廵狩各於方嶽其禮如初歸格于祖廟用特牛禮五載一廵狩諸侯四朝敷奏以言明試以功車服以庸肇十有二州封其山望濬其川瀆法有常典惟刑之恤伯鯀治水九載而功用不成三苗為亂於江淮驩兠舉共工試以工師滛荒怠事舜因廵狩歸而言於帝請流共工于幽州以變北狄放驩兠于崇山以變南蠻遷三苗於三危以變西戎殛鯀于羽山以變東夷四罪而天下咸服舜攝位二十八年堯崩舜仰慕三年坐則見堯於牆食則覩堯於羮三年䘮畢而避丹朱天下不歸丹朱而歸舜然後踐天子位即位之明年正月元日格于文祖詢四嶽闢四門明四目逹四聰四方之情無所壅蔽命十二牧所重民食敬授民時逺至邇懷蠻夷率服舜本處虞之媯汭號曰有虞氏作都于蒲阪尚赤其社用土封丹朱于丹淵為諸侯以奉先祀服其服禮樂如之謂之虞賓示弗臣也舜載天子之旗徃朝瞽瞍彌奉子道封象於有庳象雖為諸侯不得為政天子使吏治其民而納其貢賦舜廣視聼求賢以自輔作五明扇立誹謗木恭已無為彈五絃之琴歌南風之詩曰南風之薫兮可以解吾民之愠兮南風之時兮可以阜民之財兮當堯之時禹臯陶稷契伯夷䕫龍垂益彭祖皆以舉用未有分職舜知任不專則功不成業不世則知不周鯀雖治水無功而禹為其子九年之間足知利害不使易業故首命禹為司空平水土誅父用子而舜無疑心戮力勤王而禹無仇色又命棄為后稷播百榖命契為司徒敷五教命臯陶為士明五刑命垂作工理百工命益作虞治山澤命伯夷作秩宗典三禮命䕫典樂敎胄子命龍作納言出納帝命舜於是總命之曰各恭厥職時亮天功三載考績三考黜陟幽明庶績咸熙乃封契於商賜姓子封棄於邰賜姓姬封禹於夏賜姓姒禹曰非予能成大費是輔舜嘉大費之功錫以元玉妻以姚姓之女封之土田賜姓嬴祚四嶽之國命以侯伯賜姓姜封於申呂即伯夷也垂益䕫龍之後不知所封䕫效山林谿谷之音以歌以麋􅛘置缶而鼓之擊石拊石象上帝石磬之音以致舞獸拌五絃之瑟為十五絃命曰大章以祭上帝或曰重黎舉䕫舜以為樂正乃命益八絃為二十三絃之瑟䕫修九韶六列六英以明帝德正六律和五聲以通八風重黎欲益求人舜曰一䕫足矣十二牧行而九州莫敢違惟禹之功為大披九山通九澤決九河復舊制而定九州土田貢賦各効其職方五千里至於荒服天下明德自虞帝始其樂曰大韶故仲尼稱之曰韶盡美矣又盡善也君臣悦懌相和而歌曰元首明哉股肱良哉庶事康哉又相戒勅而歌曰元首叢脞哉股肱惰哉萬事墮哉于時日月光華卿雲叢聚又相和而歌卿雲帝歌曰卿雲爛兮糺縵縵兮日月光華旦復旦兮八伯稽首曰明明上天爛然星陳日月光華宏于一人帝乃再歌曰日月有常星辰有行四時順經萬姓允誠於予論樂配天之靈遷于賢聖莫不咸聼鼚乎鼓之軒乎舞之精華已竭褰裳去之有苗氏左洞庭右彭蠡大山在其南殿山在其北負固不服禹欲伐之舜曰吾德不厚而行武可乎乃大敷文德舞干羽于兩階七旬有苖格初舜娶堯二女曰娥皇女英女英生商均亦不肖舜子九人在位三十三載命禹攝行天子事禹推與臯陶不獲乃以正月朔旦受命于神宗帥百官若帝之初舜生三十徴庸三十在位五十載陟方乃死是為天子五十年年百十嵗司馬遷曰舜二十以孝聞三十堯舉之五十攝行天子事五十八堯崩六十一代堯踐帝位三十九年南廵狩崩於蒼梧之野葬於江南九疑是為零陵或言舜𦵏于紀市㕓不變其肆皇甫謐曰舜以堯之二十一年甲子生三十一年甲午召用七十九年壬午即眞百嵗癸夘崩盖本史記之言也或云舜一百五嵗或云百十二嵗舜豫薦禹於天十七年而崩三年之喪畢禹亦避舜之子諸侯歸之然後踐天子位丹朱商均皆有土世為唐虞之國以奉先祀服其服禮樂亦如之以客禮見天子天子弗臣示不敢專也有虞氏禘黃帝而祖顓頊郊堯而宗舜幕能帥顓頊者也故報焉熊安生解禮云周以黄帝堯舜之後為三恪臣謹按有虞氏以土德王天下又按司馬遷本孟子之言而表裏之曰堯賜舜絺衣與琴為築倉廪與牛羊瞽瞍尚復欲殺之使舜上塗廩瞽瞍從下縱火焚廩舜乃以兩笠自扞而下去得不死後瞽瞍又使舜穿井舜穿井為匿空旁出舜既入深瞽瞍與象共下土石實井舜從匿空出去瞽瞍象喜以舜為已死象曰本謀者象象與其父母分乃取舜妻二女與琴而以牛羊倉廩與父母象乃止舜宫居鼓其琴舜往見之象鄂不懌曰我思舜正鬱陶舜曰然爾其庶哉舜復事瞽瞍愛弟彌謹又按韋昭曰三苗炎帝之後諸侯也堯舜之時誅討有罪廢絶其世不滅其國立其近親紹其先祀所以有苗國歴代常存屢不從化隨巢子汲冡紀年曰三苗將亡天雨血夏有冰地坼及泉青龍生於廟日夜出晝日不出又按韓子曰瞽瞍為父而舜放之象為弟而舜殺之觀此所言則六經不得夫子所謂聖人者其難為聖人矣韋昭三苗之說有理哉又按任昉述異記湘水去岸三十里有相思宫望帝臺昔舜南廵而歿葬於蒼梧娥皇女英追之不及相與慟哭淚霑竹竹文悉為之斑斑然又云㑹稽山下有虞舜廵狩臺臺下有望陵祠舜南廵九疑民思之故作是祠又云舜都郭門古宫存焉宫前有堯臺舜館銘記文古不復識者按皇覽曰舜冡在零陵營浦縣其山九谿皆相似故號九疑傳曰舜葬蒼梧象為之耕山海經曰蒼梧山舜葬于陽丹朱葬于隂皇甫謐曰二妃葬衡山右五帝自少昊至舜凡五世共三百八十五年通志卷二
