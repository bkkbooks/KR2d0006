body:
  text: 通志卷一百七十二宋右廸功郎鄭樵漁仲撰儒林傳第一前漢丁寛施讐孟喜梁丘賀京房費直髙相伏生歐陽生林尊夏侯勝周堪張山拊孔安國申公王式轅固生后蒼韓嬰趙子毛公魯徐生孫延襄孟卿胡母生嚴彭祖顔安樂瑕邱江公房鳯後漢劉昆洼丹觟陽鴻任安楊政張興戴憑孫期歐陽歙牟長宋登張馴尹敏周防孔僖子季彦楊倫髙翊包咸魏應伏㳟任末景鸞薛漢杜撫召馴楊仁趙煜衞宏董鈞丁恭周澤孫堪鍾興甄宇樓望程曽張元李育何休服䖍頴容謝該許慎蔡元魏董遇賈洪薛夏隗禧樂詳前漢太史公曰余讀功令至于廣厲學官之路未嘗不廢書而歎也曰嗟乎夫周室衰而闗睢作幽厲微而禮樂壊諸侯恣行政由彊國故孔子閔王路廢而邪道興于是論次詩書修起禮樂適齊聞韶三月不知肉味自衞反魯然後樂正雅頌各得其所世以混濁莫能用是以仲尼于七十餘君無所遇曰茍有用我者期月而已矣西狩獲麟曰吾道窮矣故因史記作春秋以當王法其辭微而指博後世學者多錄焉自孔子卒後七十子之徒散游諸侯大者為師傅卿相小者友教士大夫或隐而不見故子路居衛子張居陳澹䑓子羽居楚子夏居西河子貢終於齊如田子方叚干木吴起禽滑釐之属皆受業於子夏之倫為王者師是時獨魏文侯好學陵遲以至於始皇天下並争于戰國儒術既絀焉然齊魯之間學者獨不廢也至于威宣之際孟子荀卿之列咸遵夫子之業而潤色之以學顯於當世及至秦之季世焚詩書坑術士六蓺從此缺焉陳渉之王也而魯諸儒持孔氏之禮器徃歸陳王于是孔甲為陳渉博士卒與渉俱死陳渉起匹夫驅瓦合適戍旬月以王楚不滿半嵗竟㓕亡其事至微淺然而縉紳先生之徒負孔子禮器徃委質為臣者何也以秦焚其業積怨而發憤于陳王也及髙皇帝誅項籍舉兵圍魯魯中諸儒尚講誦習禮樂絃歌之音不絶豈非聖人之遺化好禮樂之國哉故孔子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之夫齊魯之間於文學自古以来其天性也故漢興然後諸儒始得修其經蓻講習大射鄉飲之禮叔孫通作漢禮儀因為太常諸生弟子共定者咸為選首于是喟然歎興于學然尚有干戈平定四海亦未暇遑庠序之事也孝恵吕后時公卿皆武力有功之臣孝文時頗徴用然孝文帝本好刑名之言及至孝景不任儒者而竇太后又好黄老之術故諸愽士具官待問未有進者及武帝即位趙綰王臧之属明儒學而上亦鄉之于是招方正賢良文學之士自是之後言詩于魯則申培公于齊則轅固生于燕則韓太傅言尚書自濟南伏生言禮自魯髙堂生言易自菑川田生言春秋于齊魯國胡母生于趙自董仲舒及竇太后崩武安侯田蚡為丞相絀黄老刑名百家之言延文學儒者數百人而公孫𢎞以春秋白衣為天子三公封以平津侯天下之學士靡然郷風矣公孫𢎞為學官悼道之欎滯乃請白丞相御史言制曰盖聞導民以禮風之以樂婚姻者居室之大倫也今禮廢樂崩朕甚愍焉故詳延天下方正􅀶聞之士咸登諸朝其令禮官勸學講議洽聞舉遺興禮以為天下先太常議與博士弟子崇郷里之化以廣賢才焉謹與太常臧博士平等議曰聞三代之道郷里有教夏曰校殷曰序周曰庠其勸善也顯之朝廷其懲惡也加之刑罰故教化之行也建首善自京師始由内及外今陛下昭至徳開大明配天地本人倫勸學修禮崇化厲賢以風四方太平之原也古者政教未洽不備其禮請因舊官而興焉為博士官置弟子五十人復其身太常擇民年十八已上儀状端正者補博士弟子郡國縣道邑有好文學敬長上肅政教順鄉里岀入不悖所聞者令相長丞上属所二千石二千石謹察可者當與計偕詣太常補受業如弟子一嵗皆輒試能通一藝以上補文學掌故缺其髙第可以為即中者大常籍奏即有秀才異等輒以名聞其不事學若下材及不能通一藝輒罷之而請諸不稱者罰臣謹按詔書律令下者明天人分際通古今之義文義爾雅訓辭深厚恩施甚美小吏淺聞不能究宣無以明布諭下治禮次治掌故以文學禮義為官遷留滯請選擇其秩比二百石以上及吏百石通一藝以上補左右内史大行卒史比百石以下補郡太守卒史皆各二人邊郡一人先用誦多者若不足乃擇掌故補中二千石属文學掌故補郡属備員請著功令佗如律令制曰可自此以来則公卿大夫士吏斌斌多文學之士矣班固曰昭帝時舉賢良文學増博士弟子貟滿百人宣帝末増倍之元帝好儒能通一經者皆復數年以用度不足更為設員千人郡國置五經百石卒史成帝末或言孔子布衣養徒三千人今天子太學弟子少于是増弟子貟三千人嵗餘復如故平帝時王莽秉政増元士之子得受業如弟子勿以為員嵗課甲科四十人為即中乙科二十人為太子舍人丙科四十人補文學掌故云自魯商瞿子木受易孔子以授魯橋庇子庸子庸授江東馯臂子弓子弓授燕周醜子家子家授東武孫虞子乗子乗授齊田何子装及秦禁學易為筮卜之書獨不禁故傳受者不絶也漢興田何以齊田徙杜陵號杜田生受東武王同子仲雒陽周王孫丁寛齊服生皆著易傳數萹同授淄川楊何字叔元元光中徴為太子中大夫齊即墨成至城陽相廣川孟但為太子門大夫魯周霸莒衡胡臨淄主父偃皆以易至大官要言易者本之田何丁寛字子襄梁人也初梁項生從田何受易時寛為項生從者讀易精敏過于項生遂事何學成何謝寛寛東歸何謂門人曰易以東矣寛至雒陽復從周王孫受古義號周氏傳景帝時寛為梁孝王将軍拒吴楚號丁将軍作易説三萬言訓故舉大義而已今小章句是也寛授同郡碭田王孫王孫授施讐孟喜梁邱賀繇是易有施孟梁邱之學施讐字長卿沛人也沛與碭相近讐為童子從田王孫受易後讐徙長陵田王孫為博士復從卒業與孟喜梁邱賀並為門人謙讓常稱學廢不教授及梁邱賀為少府事多廼遣子臨分将門人張禹等從讐問讐自匿不肯見賀固請不得已乃授臨等于是賀薦讐結髪事師數十年賀不能及詔拜讐為博士甘露中與五經諸儒雜論同異于石渠閣讐授張禹琅邪魯伯伯為會稽太守禹至丞相禹授淮陽彭宣沛戴崇子平崇為九卿宣大司空禹宣皆有傳魯伯授太山毛莫如少路姓毛名莫如字少路琅邪邴丹曼容著清名莫如至恒山大守此其知名者也繇是施家有張彭之學孟喜字長卿東海蘭陵人也父號孟卿善為禮春秋授后蒼疏廣世所傳后氏禮疏氏春秋皆岀孟卿孟卿以禮經多春秋煩雜乃使喜從田王孫受易喜好自稱譽得易家候隂陽灾變書詐言師田生且死時枕喜䣛獨傳喜諸儒以此耀之同門梁邱賀疏通證明之曰田生絶于施讐手中時喜歸東海安得此事又蜀人趙賔好小數書後為易飾易文以為箕子明夷隂陽氣亡箕子箕子者萬物方荄兹也賔持論巧慧易家不能難皆曰非古法也云受孟喜喜為名之後賔死莫能持其説喜因不肯􅌇以此不見信喜舉孝亷為即曲臺署長病免為丞相掾博士缺衆人薦喜上聞喜改師法遂不用喜喜授同郡白光少子沛翟牧子兄皆為博士繇是有翟孟白之學梁邱賀字長翁琅邪諸人也以能心計為武騎從大中大夫京房受易房者淄川楊何弟子也房岀為齊郡大守賀更事田王孫宣帝時聞京房為易明求其門人得賀賀時為都司空令坐事論免為庶人待詔黄門數入説教侍中以召賀賀入説上善之以賀為即會八月飲酎行祠孝昭廟先敺旄頭劍挺墮墜首垂臿泥中刃鄉乗輿車馬驚于是召賀筮之曰有兵謀不吉上還使有司侍祠是時霍氏外孫代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城界中夜元服入廟居郎間執㦸立廟門待上至欲為逆發覺伏誅故事上常夜入廟其後待明而入自此始也賀以筮有應繇是近幸為大中大夫給事中至少府為人小心周宻上信重之年老卒官傳子臨亦入説為黄門即甘露中奉使問諸儒于石渠臨學精熟專行京房法琅邪王吉通五經聞臨説善之時宣帝選髙材郎十人從臨講吉乃使其子郎中駿上疏從臨受易臨授五鹿充宗君孟為少府駿御史大夫自有傳充宗授平陵士孫張仲方沛郡彭祖子夏齊衡咸長賔張為博士至揚州牧光禄大夫給事中家世傳業彭祖真定太傅咸王莽講學大夫繇是梁邱有士孫鄧衡之學京房受易梁人焦延夀延夀云嘗從孟喜問易㑹喜死房以為延夀易即孟氏學翟牧白生不肯皆曰非也至成帝時劉向校書考易説以為諸易家説皆祖田何楊叔丁将軍大誼畧同惟京氏為異黨延夀獨得隐士之説託之孟氏不相與同房以明灾異得幸為石顯所譖誅自有傳房授東海殷嘉河東姚平河南乗𢎞皆為郎博士繇是易有京氏之學費直字長翁東莱人也治易為即至單父令長于卦筮亡章句徒以彖象繋辭十篇文言觧説上下經琅邪王璜平中能傳之璜又傳古文尚書髙相沛人也治易與費公同時其學亦亡章句専説隂陽灾異自言岀于丁将軍傳至相相授子康及蘭陵毋将永康以明易為即永至豫章都尉及王莽居攝東郡太守翟誼舉兵誅莽事未𤼵康候知東郡有兵私語門人門人上書言之後數月翟誼兵起莽召問對受師髙康莽惡之以為惑衆斬康繇是易有髙氏學髙費皆未嘗立於學官伏生濟南人也張晏曰名勝伏生碑云也故為秦愽士孝文時求能治尚書者天下亡有聞伏生治之欲召伏生時年九十餘老不能行乃詔太常使掌故朝錯徃受之秦時焚書伏生壁藏之其後大兵起流亡及漢定伏生求其書亡數十篇獨得二十九篇即以教于齊魯之間齊學者由此頗能言尚書山東大師亡不渉尚書以教伏生教濟南張生及歐陽生張生為博士而伏生孫以治尚書徵弗能明定是後魯周霸雒陽賈嘉頗能言尚書云歐陽生字伯和千乘人也事伏生授兒寛寛又受業孔安國至御史大夫自有傳寛有俊材初見武帝語經學上曰吾始以尚書樸弗好及聞寛説可觀乃從寛問一篇歐陽大小夏侯氏學皆岀于寛寛授歐陽生子世世相傳至曽孫髙子陽為博士髙孫地餘長賔以太子中庶子授太子後為愽士論石渠元帝即位地餘侍中貴幸至少府戒其子曰我死官属即送汝財物慎毋受汝九卿儒者子孫以亷潔著可以自成及地餘死少府官属共送數百萬其子不受天子聞而嘉之賜錢百萬地餘少子政為王莽講學大夫由是尚書世有歐陽氏學林尊字長賔濟南人也事歐陽髙為博士論石渠後至少府太子太傅授平陵平當梁陳翁生當至丞相自有傳翁生信都太傅家世傳業由是歐陽有平陳之學翁生授琅邪殷崇楚國龔勝崇為博士勝右扶風自有傳而平當授九江朱普公文上黨鮑宣普為博士宣司𨽻校尉自有傳徒衆尤盛知名者也夏侯勝其先夏侯都尉從濟南張生受尚書以傳族子始昌始昌傳勝勝又事同郡簡卿簡卿者兒寛門人勝傳從兄子建建又事歐陽髙勝至長信少府建太子太傅自有傳由是尚書有大小夏侯之學周堪字少卿齊人也與孔霸俱事大夏侯勝霸為博士堪譯官令論于石渠經為最髙後為太子太傅而孔霸以太中大夫授太子及元帝即位堪為光禄大夫與蕭望之並領尚書事為石顯所譛皆免官望之自殺上愍之擢堪為光禄勲堪授牟卿及長安許商長伯牟卿為博士霸以帝師賜號襃成君傳子光亦事牟卿至丞相自有傳由是大夏侯有孔許之學商善為筭著五行論歴四至九卿號其門人沛唐林子髙為徳行平陵吴章偉君為言語重泉王吉少音為政事齊炔欽幼卿為文學炔音桂王莽時林吉為九卿自表上師冢大夫博士郎吏為許氏學者各從門人㑹車數百兩儒者榮之欽章皆為博士徒衆尤盛章為王莽所誅張山拊字長賔平陵人也事小夏侯建為博士論石渠至少府授同縣李尋鄭寛中少君山陽張無故子儒信都秦恭延君陳留假倉子驕無故善修章句為廣陵太傅守小夏侯説文恭増師法至百萬言為陽城内史倉以謁者論石渠至膠東相尋善説灾異為騎都尉自有傳寛中有雋材以博士授太子成帝即位賜爵關内侯食邑八百户遷光禄大夫領尚書事甚尊重㑹疾卒谷永上疏乞加其葬禮賜之令謚以章尊師傅之徳于是上弔贈寛中甚厚由是小夏侯有鄭張秦假李氏之學寛中授東郡趙元無故授沛唐尊恭授魯馮賔賔為博士尊王莽太傅元哀帝御史大夫至大官知名者也孔氏有古文尚書孔安國以今文字讀之因以起其家逸書得十餘篇盖尚書兹多于是矣遭巫蠱未立于學官安國為諫大夫授都尉朝朝名都尉姓而司馬遷亦從安國問故遷書載尭典禹貢洪範微子金縢諸篇多古文説都尉朝授膠東庸生庸生授清河胡常少子以明榖梁春秋為博士部刺史又傳左氏嘗授虢徐敖敖為右扶風掾又傳毛詩授王璜平陵塗惲子真子真授河南桑欽君長王莽時諸學皆立劉歆為國師璜惲等皆貴顯世所傳百兩萹者岀東萊張霸分析合二十九篇以為數十又采左氏傳書叙為作首尾凡百二篇篇或數簡文意淺陋成帝時求其古文者霸以能為百兩徴以中書校之非是霸辭受父父有弟子尉氏樊並時太中大夫平當侍御史周敞勸上存之後樊並謀反迺黜其書申公魯人也少與楚元王交俱事齊人浮邱伯受詩漢興髙祖過魯申公以弟子從師入見于魯南宫吕太后時浮邱伯在長安楚元王遣子郢與申公俱卒學元王薨郢嗣立為楚王令申公傅太子戊戊不好學病申公及戊立為王胥靡申公申公媿之歸魯退居家教終身不岀門復謝賔客獨王命召之乃徃弟子自逺方至受業者千餘人申公獨以詩經為訓故以教亡傳疑者則闕弗傳蘭陵王臧既從受詩已通事景帝為太子少𫝊免去武帝初即位臧乃上書宿衛累遷一歲至郎中令及代趙綰亦嘗受詩申公為御史大夫綰臧請天子立明堂以朝諸侯不能就其事乃言師申公於是上使使束帛加璧安車以蒲裹輪駕駟迎申公弟子二人乘軺傳從至見天子天子問治亂之事申公時八十餘老對曰為治者不在多言顧力行何如耳是時上方好文辭見申公對黙然然已招致則以為太中大夫舍魯邸議明堂事竇太后好老子不說儒術得綰臧之過以讓上曰此欲復為新垣平也上因廢明堂下綰臧吏皆自殺申公亦以疾免歸數年卒弟子為博士者十餘人孔安國至臨淮太守周霸膠西内史夏寛城陽内史碭魯賜東海太守蘭陵繆生長沙内史徐偃膠西中尉鄒人闕門慶忌膠東内史其治官民皆有亷節其學官弟子行雖不備而至於大夫即中掌故以百數申公卒以詩春秋授而瑕邱江公盡能傳之徒衆最盛及魯許生免中徐公皆守學教授韋賢治詩事博士大江公及許生又治禮至丞相傳子元成以淮陽中尉論石渠後亦至丞相元成及兄子賞以詩授哀帝至大司馬車騎將軍自有傳由是魯詩有韋氏學王式字翁思東平新桃人也事免中徐公及許生式為昌邑王師昭帝崩昌邑王嗣位以行滛亂廢昌邑羣臣皆下獄誅惟中尉王吉郎中令龔遂以數諌減死論式繋獄當死治事使者責問曰師何以亡諌書式對曰臣以詩三百五篇朝夕授王至於忠臣孝子之篇未嘗不為王反復誦之也至於危亡失道之君未嘗不流涕為王深陳之也臣以詩三百五篇諌是以亡諌書使者以聞亦得減死論歸家不教授山陽張長安幼君長安名先事式後東平唐長賔沛禇少孫亦來事式問經數篇式謝之曰聞之於師具是矣自潤色之不肯復授唐生禇生應博士弟子選詣博士摳衣登堂頌禮甚嚴頌音容試誦說有法疑者邱盖不言邱蓋者疑也諸博士驚問何師對曰事式皆素聞其賢共薦式詔除下為博士式徵來衣博士衣而不冠曰刑餘之人何宜復充禮官既至止舍中會諸大夫博士共持酒肉勞式皆注意髙仰之博士江公世為魯詩宗至江公著孝經說心嫉式謂歌吹諸生曰歌驪駒式曰聞之於師客歌驪駒主人歌客毋庸歸今日諸君為主人日尚早未可也江翁曰經何以言式曰在曲禮江翁曰何狗曲也式恥之陽醉逷墬上音蕩下音地式客罷讓諸生曰我本不欲來諸生彊勸我竟為䜿子所辱遂謝病免歸終於家張生唐生禇生皆為博士張生論石渠至淮陽中尉唐生楚太𫝊由是魯詩有張唐禇氏之學張生兄子游卿為諫大夫以詩授元帝其門人琅邪王扶為泗水中尉授陳留許晏為博士由是張家有許氏學初薛廣徳亦事王式以博士論石渠授龔舎廣徳至御史大夫舍泰山太守皆有傳轅固生齊人也以治詩孝景時為博士與黄生爭論於上前黃生曰湯武非受命乃殺也固曰不然夫桀紂荒亂天下之心皆歸湯武湯武因天下之心而誅桀紂桀紂之民弗為使而歸湯武湯武不得已而立非受命為何黄生曰冠雖弊必加於首履雖新必貫於足何者上下之分也今桀紂雖失道然君上也湯武雖聖臣下也夫主有失行臣下不能正言匡過以尊天子反因過而誅之代立南面非殺而何固曰必若所云則是髙皇帝代秦即天子之位非邪於是上曰食肉毋食馬肝未為不知味也言學者毋言湯武受命不為愚遂罷竇太后好老子書召問固固對曰此家人言耳太后怒曰安得司空城旦書乎城旦書刑書也道家以儒家為急故比於律令云乃使固入圈撃彘上知太后怒而固直言無罪乃假固利兵下圈刺彘正中其心彘應手而倒太后黙然亡以復罪後上以固廉直拜為清河王太傅久之病免孝武帝初即位復以賢良徵諸儒多嫉毁曰固老罷歸之時固已九十餘矣公孫𢎞亦徵仄目而事固固曰公孫子務正學以言無曲學以阿世諸齊以詩顯貴皆固之弟子也昌邑太傳夏侯始昌最明自有傳后蒼字近君東海郯人也事夏侯始昌始昌通五經蒼亦通詩禮為博士至少府授翼奉蕭望之匡衡奉為諫大夫望之前將軍衡丞相皆有傳衡授琅邪師丹伏理斿君潁川滿昌君都君都為詹事理髙密太傅家世傳業丹大司空自有傳由是齊詩有翼匡師伏之學滿昌授九江張邯琅邪皮容皆至大官徒衆尤盛韓嬰燕人也孝文時為博士景帝時至常山王太傅嬰推詩之意而為内外傳數萬言其語頗與齊魯間殊然其歸一也淮南賁生受之賁音肥燕趙間言詩者由韓生韓生亦以易授人推易意而為之傳燕趙間好詩故其易㣲唯韓氏自傳之武帝時嬰嘗與董仲舒論於上前其人精悍處事分明仲舒不能難也後其孫商為博士孝宣時涿郡韓生其後也以易徵待詔殿中曰所受易即先太傅所傳也嘗受韓詩不如韓氏易深太傅故專傳之司𨽻校尉蓋寛饒本受易於孟喜見涿郡韓生説易而好之即更從受焉趙子河内人也事燕韓生授同郡蔡誼誼至丞相自有傳誼授同郡食子公食音嗣與王吉吉為昌邑中尉自有傳食生為博士授泰山栗豊吉授淄川長孫順順為博士豐部刺史由是韓詩有王食長孫之學豐授山陽張就順授東海髪福皆至大官徒衆尤盛毛公趙人也治詩為河間獻王博士授同國貫長卿長卿授解延年延年為阿武令授徐敖敖授九江陳俠為王莽講學大夫由是言毛詩者本之徐敖漢興魯髙堂生博士禮十七篇而魯徐生善為頌頌讀與容同容貌威儀也孝文時徐生以頌為禮官大夫傳子至孫延襄襄其資性善為頌不能通經延頗能未善也襄亦以頌為大夫至廣陵内史延及徐氏弟子公戸滿意桓生單次皆為禮官大夫而瑕邱蕭奮以禮至淮陽太守諸言禮為頌者由徐氏孟卿東海人也事蕭奮以授后倉魯閭邱卿倉說禮數萬言號曰后氏曲臺記在曲臺校書著記因以為名曲臺殿在未央宫授沛聞人通漢子方梁戴德延君戴聖次君沛慶普孝公孝公為東平太傅德號大戴為信都太傅聖號小戴以博士論石渠至九江太守由是禮有大戴小戴慶氏之學通漢以太子舎人論石渠至中山中尉普授魯夏侯敬又傳族子咸為豫章太守大戴授琅邪徐良斿卿為博士州牧郡守家世傳業小戴授梁人橋仁季卿楊榮子孫仁為大鴻臚家世傳業榮琅邪太守由是大戴有徐氏小戴有橋楊氏之學臣謹按戴聖為九江太守治行多不法前刺史以其大儒優容之及何武為刺史聖懼自免後為博士毁武於朝廷武聞之終不揚其惡聖之子賔客為羣盗為人捕繋廬江聖自以子必死武之手而武平心决之卒得不死自是慚服且以二戴之名與聖人之經並行而身為臧吏子為盗賊猶不知非己而復謗人有子如此猶冀生乎曾跖蹻之不如也觀此則為儒者不可不鑒用儒者亦不可不審胡母生字子都齊人也治公羊春秋為景帝博士與董仲舒同業仲舒著書稱其徳年老歸教於齊齊之言春秋者宗事之公孫𢎞亦頗受焉而董仲舒為江都相自有傳弟子遂業者蘭陵禇大東平嬴公廣川段仲温吕歩舒大至梁相歩舒丞相長史唯嬴公守學不失師法為昭帝諫大夫授東海孟卿魯眭孟孟為符節令坐說灾異誅自有傳嚴彭祖字公子東海下邳人也與顔安樂俱事眭孟孟弟子百餘人唯彭祖安樂為明質問疑誼各持所見孟曰春秋之意在二子矣孟死彭祖安樂各顓門敎授由是公羊春秋有顔嚴之學彭祖為宣帝博士至河南東郡太守以高第入為左馮翊遷太子太傅廉直不事權貴或說曰天時不勝人事君以不修小禮曲意亡貴人左右之助經誼雖髙不至宰相願少自勉彊彭祖曰凡通經術固當修行先王之道何可委曲從俗茍求富貴乎彭祖竟以太傅官終授琅邪王中為元帝少府家世傳業中授同郡公孫文東門雲雲為荆州刺史文東平太傅徒衆尤盛雲坐為江賊拜辱命下獄誅顔安樂字公孫魯國薛人眭孟姊子也家貧為學精力官至齊郡太守丞後為仇家所殺安樂授淮陽泠豐次君淄川任公公為少府豐淄川太守由是顔家有泠任之學始貢禹事嬴公成於眭孟至御史大夫疏廣事孟卿至太子太傅皆自有傳廣授琅邪筦路路為御史中丞禹授潁川堂谿惠惠授泰山㝠都都為丞相史都與路又事顔安樂故顔氏復有筦冥之學路授孫寳為大司農自有傳豐授馬宫琅邪左咸咸為郡守九卿徒衆尤盛官至大司徒自有傳瑕邱江公受穀梁春秋及詩於魯申公傳子至孫為博士武帝時江公與董仲舒並仲舒通五經能持論善屬文江公呐於口上使與董仲舒議不及仲舒而丞相公孫𢎞本為公羊學比輯其義卒用董生於是上因尊公羊家詔太子授公羊春秋由是公羊大興太子旣通復私問穀梁而善之其後浸㣲唯魯榮廣王孫皓星公二人受焉廣盡能傳其詩春秋髙材㨗敏與公羊大師眭孟等論數困之故好學者頗復受穀梁沛蔡千秋少君梁周慶㓜君丁姓子孫皆從廣受千秋又事皓星公為學最篤宣帝卽位聞衛太子好穀梁春秋以問丞相韋賢長信少府夏侯勝及侍中樂陵侯史髙皆魯人也言穀梁子本魯學公羊氏乃齊學也宜興穀梁時千秋為郎召見與公羊家並說上善穀梁說擢千秋為諫大夫給事中後有過左遷平陵令復求能為穀梁者莫及千秋上愍其學且絶乃以千秋為郎中戸將選即十人從受汝南尹更始翁君本自事千秋能說矣㑹千秋病死徵江公孫為博士劉向以故諌大夫通逹待詔受穀梁欲令助之江博士復死乃徵周慶丁姓待詔保宫使卒授十人自元康中始講至甘露元年積十餘歲皆明習乃召五經名儒太子太傅蕭望之等大議殿中平公羊穀梁同異各以經處是非時公羊博士嚴彭祖侍郎申輓伊推宋顯穀梁議郎尹更始待詔劉向周慶丁姓並論公羊家多不見從願請内侍郎許廣使者亦並内穀梁家中郎王亥各五人議三十餘事望之等十一人各以經誼對多從穀梁由是穀梁之學大盛慶姓皆為博士姓至中山太傅授楚申章昌曼君申章姓也名昌字曼君為博士至長沙太傅徒衆尤盛尹更始為諫大夫長樂户將又受左氏傳取其變理合者以為章句傳子咸及翟方進琅邪房鳳咸至大司農方進丞相自有傳房鳳字子元不其人也以射䇿乙科為太史掌故太常舉方正為縣令都尉失官大司馬驃騎將軍王根奏除補長史薦鳳明經通達擢為光祿大夫遷五官中郎將時光禄勲王龔以外屬内卿與奉車都尉劉歆共校書三人皆侍中歆白左氏春秋可立哀帝納之以問諸儒皆不對歆於是數見丞相孔光為言左氏以求助光卒不肯唯鳳龔許歆遂共移書責讓太常博士語在歆傳大司空師丹奏歆非毁先帝所立上於是出龔等補吏龔為𢎞農歆河内鳳九江太守至青州牧始江博士授胡常常授梁蕭秉君房王莽時為講學大夫由是穀梁春秋有尹胡申章房氏之學漢興北平侯張蒼及梁太傅賈誼京兆尹張敞太中大夫劉公子皆修春秋左氏傳誼為左氏傳訓故授趙人貫公為河間獻王博士子長卿為蕩隂令授清河張禹長子禹與蕭望之同時為御史數為望之言左氏望之善之上書數以稱說後望之為太子太傅薦禹於宣帝徵禹待詔未及問㑹疾死禹授尹更始更始傳子咸及翟方進胡常常授黎陽賈䕶季君哀帝時待詔為即授蒼梧陳欽子佚以左氏授王莽至將軍而劉歆從尹咸及翟方進受由是言左氏者本之賈䕶劉歆班氏曰自武帝立五經博士開弟子員設科射䇿勸以官禄訖於元始百有餘年傳業者寖盛枝葉蕃滋一經說至百餘萬言大師衆至千餘人蓋利禄之路然也初書惟有歐陽禮后易楊春秋公羊而已至孝宣世復立大小夏侯尚書大小戴禮施孟梁邱易穀梁春秋至元帝世復立京氏易平帝時又立左氏春秋毛詩逸禮古文尚書所以罔羅遺失兼而存之是在其中矣後漢范氏曰昔王莽更始之際天下散亂禮樂分崩典文殘落及光武中興愛好經術未及下車而先訪儒雅採求闕文補綴漏逸先是四方學士多懐挾圖書遁逃林藪自是莫不抱負墳䇿雲㑹京師范升陳元鄭興杜林衛宏劉昆桓榮之徒繼踵而集於是立五經博士各以家法敎授易有施孟梁邱京氏尚書歐陽大小夏侯詩齊魯韓毛禮大小戴春秋嚴顔凡十四博士太常差次總領焉建武五年乃修起太學稽式古典籩豆干戚之容備之於列服方領習矩歩者委它乎其中中元元年初建三雍明帝卽位親行其禮天子始冠通天衣日月備法物之駕盛清道之儀坐明堂而朝羣后登靈臺以望雲物􅃝割辟雍之上尊養三老五更饗射禮畢帝正坐自講諸儒執經問難於前冠帶縉紳之人圜橋門而觀聽者蓋億萬計其後復為功臣子孫四姓末屬别立校舎搜選髙能以受其業自期門羽林之士悉令通孝經章句匈奴亦遣子入學濟濟乎洋洋乎盛於永平矣建初中大㑹諸儒於白虎觀考詳同異連月乃罷肅宗親臨稱制如石渠故事顧命史臣著為通義又詔髙才生受古文尚書毛詩穀梁左氏春秋雖不立學官然皆擢髙第為講即給事近署所以網羅遺逸博存衆家孝和亦數幸東觀覽閱書林及鄧后稱制學者頗懈時樊凖徐防並陳敦學之宜又言儒職多非其人於是制詔公卿妙簡其選三署郎能通經術者皆得察舉自安帝覽政薄於藝文博士倚席不講朋徒相視怠散學舎頽敝鞠為園蔬牧兒蕘豎至於薪刈其下順帝感翟酺之言乃更修黌宇凡所造構二百四十房千五百五十室試明經下第補弟子增甲乙之科員各十人除郡國耆儒皆補郎舎人太初元年梁太后詔曰大將軍下至六百石悉遣子就學每歲輒於郷射月一饗㑹之以此為常自是遊學增盛至三萬餘生然章句漸疎而多以浮華相尚儒者之風蓋衰矣黨人旣誅其髙名善士多坐流廢後遂至忿爭更相言告亦有私行金貨定蘭臺漆書經字以合其私文熹平四年靈帝乃詔諸儒正定五經刋於石碑為古文篆𨽻三體書法以相參檢樹之學門使天下咸取則焉初光武遷還洛陽其經牒秘書載之二千餘两自此以後參倍於前及董卓移都之際吏民擾亂自辟雍東觀蘭臺石室宣明鴻都諸藏典冊文章競共剖散其縑帛圖書大則連為帷蓋小乃制為縢囊及王允所收而西者裁七十餘乘道路艱遠復棄其半矣後長安之亂一時焚蕩莫不冺盡焉東京學者猥衆難以詳載今但錄其能通經名家者以為儒林篇其自有列傳者則不兼書若師資所承宜摽名為證者乃著之云劉昆字桓公陳留東昏人梁孝王之允也少習容禮平帝時受施氏易於沛人戴賔能彈雅琴知清角之操王莽世敎授弟子恒五百餘人每春秋饗射常備列典儀以素木瓠葉為爼豆桑弧蒿矢以射莬首每有行禮縣宰輒率吏屬而觀之王莽以昆多聚徒衆私行大禮有僭上心乃繋昆及家屬於外黃獄尋莽敗得免既而天下大亂昆避難河南負犢山中建武五年舉孝廉不行遂逃敎授於江陵光武聞之卽除為江陵令時縣連年火灾昆輒向火叩頭多能降雨止風徵拜議郎稍遷侍中𢎞農太守先是殽黽驛道多虎灾行旅不通昆為政三年虎皆負子渡河帝聞而異之二十二年徵代杜林為光禄勲詔問昆曰前在江陵反風滅火後守𢎞農虎北渡河行何徳政而致是事昆對曰偶然耳左右皆笑其質訥帝歎曰此乃長者之言也顧命書諸䇿乃令以經入授皇太子及諸王小侯五十餘人二十七年拜騎都尉三十年以老乞骸骨詔賜洛陽第舍以千石禄終其身中元二年卒子軼字君文傳昆業門徒亦盛永平中為太子中庻子建初中稍遷宗正卒官遂世掌宗正焉洼丹字子玉風俗通洼音圭南陽育陽人也世傳孟氏易王莽時常避世敎授專志不仕徒衆數百人建武初為博士稍遷十一年為大鴻臚作易通論七篇世號洼君通丹學義研深易家宗之稱為大儒十七年卒於官年七十時中山觟陽鴻字孟孫姓觟陽名鴻觟音胡瓦反亦以孟氏易敎授有名稱永平中為少府任安字定祖廣漢綿竹人也少游太學受孟氏易兼通數經又從同郡楊厚學圖䜟䆒極其術時人稱曰欲知仲桓問任安又曰居今行古任定祖學終還家敎授諸生自遠而至初仕州郡太尉再辟除博士公車徵皆稱疾不就州牧劉焉表薦之時王塗隔塞詔命竟不至年七十九建安七年卒于家楊政字子行京兆人也少好學從代郡范升受梁邱易善說經書京師為之語曰說經鏗鏗楊子行敎授數百人范升嘗為出婦所告坐繋獄政乃肉􅃝以箭貫耳抱升子潛伏道傍候車駕而持章叩頭大言曰范升三娶惟有一子今適三歲孤之可哀武騎虎賁懼驚乘輿舉弓射之猶不肯去旄頭又以㦸义政傷胸政猶不退哀泣辭請有感帝心詔曰乞楊生師即尺一出升政由是顯名政為人嗜酒不拘小節果敢自矜然篤於義時帝壻梁松皇后弟隂就皆慕其聲名而請與交友政每與言論常切磋懇至不為屈撓嘗詣楊虚侯馬武武難見政稱疾不為起政入戸徑升牀排武臂責之曰卿䝉國恩備位藩輔不思求賢以報殊寵而驕天下英俊此非養身之道也今日動者刀入脅武諸子及左右皆大驚以為見刧操兵滿側政顔色自若會隂就至責數武令為交友其剛果任情皆如此也建初中官至左中即將張興字君上潁川鄢陵人也習梁邱易以敎授建武中舉孝亷為即謝病去復歸聚徒後辟司徒馮勤府舉為孝亷稍遷博士永平初遷侍中祭酒十年拜太子少傅顯宗數訪問經術旣而聲稱著聞弟子自遠至者著錄且萬人為梁邱家宗十四年卒於官子魴傳興業位至張掖屬國都尉戴憑字次仲汝南平輿人也習京氏易年十六郡舉明經徵試博士拜郎中時詔公卿大㑹羣臣皆就席憑獨立光武問其意憑對曰博士說經皆不如臣而坐居臣上是以不得就席帝卽召上殿令與諸儒難說憑多所解釋帝善之拜為侍中數進見問得失帝謂憑曰侍中當匡輔國政勿有隱情憑對曰陛下嚴帝曰朕何用嚴憑曰伏見前太尉西曹掾蔣遵清亮忠孝學通古今陛下納膚受之愬遂致禁錮臣以是為嚴帝怒曰汝南子欲復黨乎憑出自繋廷尉有詔勑出後復引見憑謝曰臣無謇諤之節而有狂瞽之言不能以尸伏諫偷生茍活誠慙聖朝帝卽勑尚書解遵禁錮拜憑虎賁中郎將以侍中兼領之正旦朝賀百僚畢㑹帝令羣臣能說經者更相難詰義有不通輙奪其席以益通者憑遂重坐五十餘席故京師為之語曰解經不窮戴侍中在職十八年卒於官賜東園梓器錢二十萬時南陽太守魏滿字叔牙亦習京氏易教授永平中至𢎞農太守孫期字仲彧濟隂成武人也少為諸生習京氏易古文尚書家貧事母至孝牧豕於大澤中以奉養焉遠人從其學者皆執經壟畔以追之里落化其仁讓黄巾賊起過期里陌相約不犯孫先生舎郡舉方正遣吏齎羊酒請期期驅豕入草不顧司徒黄琬特辟不行終於家建武中范升傳孟氏易以授楊政而陳元鄭衆皆傳費氏易其後馬融亦為其傳融授鄭元元作易注荀爽又作易傳自是費氏興而京氏遂衰歐陽歙字正思樂安千乘人也自歐陽生傳伏生尚書至歙八世皆為博士歙既傳業而謙恭好禮讓王莽時為長社宰更始立為原武令光武平河北到原武見歙在縣修政遷河南都尉後行太守事光武卽位始為河南尹封被陽侯建武五年坐事免官明年拜揚州牧遷汝南太守推用賢俊政稱異迹九年更封夜侯歙在郡敎授數百人視事九歲徵為大司徒坐在汝南臧罪千餘萬發覺下獄諸生守闕為歙求哀者千餘人至有自髠剔者平原禮震年十七聞獄當斷馳之京師行到河内獲嘉縣自繋上書求代歙死曰伏見臣師大司徒歐陽歙學為儒宗八世博士而以臧咎當伏重辜歙門單子㓜未能傳學身死之後永為廢絶上令陛下獲殺賢之譏下使學者喪師資之益乞殺身以代歙命書奏而歙已死獄中歙掾陳元上書追訟之言甚切至帝乃賜棺木贈印綬賻縑三千匹子復嗣後卒無子國除濟隂曹曾字伯山從歙受尚書門徒三千人位至諌議大夫子祉河南尹傳父業敎授又陳留陳弇字叔明亦授歐陽尚書於司徒丁鴻仕為蘄長牟長字君髙樂安臨濟人也其先封牟春秋之末國滅因氏焉長少習歐陽尚書不仕王莽世建武二年大司空𢎞特辟拜博士稍遷河内太守坐墾田不實免長自為博士及在河内諸生講學者常有千餘人著錄前後萬人著尚書章句皆本之歐陽氏俗號為牟氏章句復徵為中散大夫賜告一歲卒於家子紆又以𨼆居敎授門生千人肅宗聞而徵之欲以為博士道物故宋登字叔陽京兆長安人也父由為太尉登少傳歐陽尚書敎授數千人為汝隂令政為明能號稱神父遷趙相入為尚書僕射順帝以登明識禮樂使持節臨太學奏定典律轉拜侍中數上封事抑退權臣由是出為潁川太守市無二價道不拾遺病免卒于家汝隂人配社祠之張馴字子雋濟隂定陶人也少游太能誦春秋左氏傳以大夏侯尚書敎授辟公府舉髙第拜議即與蔡邕共奏定六經文字擢拜侍中典領秘書近署甚見納異多因便宜陳政得失朝廷嘉之遷丹陽太守化有惠政光和七年徵拜尚書遷大司農初平中卒於官尹敏字㓜季南陽堵陽人也少為諸生初習歐陽尚書後受古文兼善毛詩穀梁左氏春秋建武二年上疏陳洪範消灾之術時光武方草創天下未遑其事命敏待詔公車拜即中辟大司空府帝以敏博通經記令校圖䜟便蠲去崔發所為王莽著錄比次敏對曰䜟書非聖人所作其中多近鄙别字頗類世俗之辭恐疑誤後生帝不納敏因其闕文增之曰君無口為漢輔帝見而怪之召敏問其故敏對曰臣見前人增損圖書敢不自量竊幸萬一帝深非之雖竟不罪而亦以此沈滯與班彪親善每相遇輒日旰忘食夜分不寢自以為鍾期伯牙莊周惠施之相得也後三遷長陵令永平五年詔書捕男子周慮慮素有名稱而善於敏敏坐繋免官及出歎曰瘖聾之徒真世之有道者也何謂察察而遇斯患乎十一年除即中遷諫議大夫卒於家周防字偉公汝南汝陽人也父楊少孤微常修逆旅以供過客而不受其報防年十六仕郡小吏光武廵狩汝南召掾史試經防尤能誦讀拜為守丞防以未冠謁去師事徐州刺史盖豫受古文尚書經明舉孝亷拜即中撰尚書雜記三十二篇四十萬言太尉張禹薦補博士稍遷陳留太守坐法免卒於家年七十八子舉自有傳孔僖字仲和魯國魯人也自安國以下世傳古文尚書毛詩曾祖父子建少游長安與崔篆友善及篆仕王莽為建新大尹嘗勸子建仕對曰吾有布衣之心子有衮冕之志各從所好不亦善乎道旣乖矣請從此辭歸終於家僖與崔篆孫駰復相友善同游太學習春秋因讀吳王夫差時事僖廢書歎曰若是所謂畫龍不成反為狗者駰曰然昔孝武皇帝始為天子年方十八崇信聖道師則先王五六年間號勝文景及後恣己忘其前之為善僖曰書傳若此多矣鄰房生梁郁儳和之曰如此武帝亦是狗邪僖駰黙然不對郁怒恨之隂上書告駰僖誹謗先帝刺譏當世事下有司駰詣吏受訊僖以吏捕方至恐誅乃上書肅宗自訟曰臣之愚意以為凡言誹謗者謂實無此事而虚加誣之也至如孝武皇帝政之美惡顯在漢史坦如日月是為直説書傳實事非虚謗也夫帝者為善則天下之善咸歸焉其不善則天下之惡亦萃焉斯皆有以致之故不可以誅於人也且陛下即位以來政敎未過而徳澤有加天下所具知也臣等獨何譏刺哉假使所非實是則固應悛改儻其不當亦宜含忍又何罪焉陛下不推原大數深自為計徒肆私忿以快其意臣等受戮死即死矣顧天下之人必回視易慮以此事闚陛下心自今以後茍見不可之事終莫復言者矣臣之所以不愛其死猶敢極言者誠為陛下深惜此大業陛下若不自惜則臣何賴焉昔齊桓公親揚其先君之惡以唱管仲然後羣臣得盡其心今陛下乃欲以十世之武帝遠諱實事豈不與桓公異哉臣恐有司卒然見搆銜恨䝉枉不得自叙使後世論者擅以陛下有所方比寧可復使子孫追掩之乎謹詣闕伏待重誅帝始亦無罪僖等意及書奏立詔勿問拜僖蘭臺令史元和二年春帝東廵狩還過魯幸闕里以太牢祠孔子及七十二人大㑹孔氏男子二十以上者六十三人命儒者講論語僖因自陳謝帝曰今日之㑹寧於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乘辱臨敝里此乃崇禮先師增輝聖徳至於光榮非所敢承帝大笑曰非聖者子孫焉有斯言乎遂拜僖即中賜襃成侯損及孔氏男女錢帛詔僖從還京師使校書東觀冬拜臨晉令崔駰以家林筮之謂為不吉止僖曰子盍辭乎僖曰學不為人仕不擇官凶吉由已而由卜乎在縣三年卒官遺令即葬二子長彦季彦並十餘歲蒲坂令許君然勸令反魯對曰今載柩而歸則違父命舍墓而去心所不忍遂留華隂長彦好章句學季彦守其家業門徒數百人延光元年河西大雨雹大者如斗安帝詔有道術之士極陳變𤯝召季彦見於徳陽殿帝親問其故對曰此皆隂乘陽之徵也今貴臣擅權母后黨盛陛下宜修聖徳慮此二者帝嘿然左右皆惡之舉孝廉不就三年年四十七終於家初平帝時王莽秉政乃封孔子後孔均為襃成侯追諡孔子為襃成宣尼及王莽敗失國建武十三年光武復封均子志為襃成侯志卒子損嗣永平四年徙封襃亭侯損卒子曜嗣曜卒子完嗣世世相傳至獻帝初國絶楊倫字仲理陳留東昏人也少為諸生師事司徒丁鴻習古文尚書為郡文學掾更歴數時志乖於時以不能人間事遂去職不復應州郡命講授於大澤中弟子至千餘人元初中郡禮請三府並辟公車徵皆辭疾不就後特徵博士為清河王傅是歲安帝崩倫輒棄官奔喪號泣闕下不絶聲閻太后以其專擅去職坐抵罪順帝卽位詔免倫刑遂留行喪于恭陵服闋徵拜侍中是時邵陵令任嘉在職貪穢因遷武威太守後有人奏嘉臧罪千萬徵考廷尉其所牽染將相大臣百有餘人倫乃上書曰臣聞春秋誅惡及本本誅則惡消振裘持領領正則毛理今任嘉所坐狼藉未受辜戮猥以垢身改典大郡自非案坐舉者無以禁絶姦萌徃者湖陸令張疊蕭令駟賢徐州刺史劉福等釁穢旣章咸伏其誅而犲狼之吏至今不絶者豈非本舉之主不加之罪乎昔齊桓之霸殺姦臣五人并及舉者以弭謗讟當斷不斷黃石所戒夫聖王所以聽僮夫匹婦之言者猶塵加嵩岱霧集淮海雖未有益不為損也書奏有司以倫言切直辭不遜順下之尚書奏倫探知密事徼以求直坐不敬結鬼薪詔書以倫數進忠言特原之免歸田里陽嘉二年徵拜太中大夫將軍梁商以為長史諫諍不合出補恒山王傅病不至官詔書勑司𨽻催促發遣倫乃留河内朝歌以疾自上曰有留死一尺無北行一寸刎頸不易九裂不恨匹夫所執彊於三軍固敢有辭帝乃下詔曰倫出幽升髙寵以藩傅稽留王命擅止道路託疾自從茍肆狷志遂徵詣廷尉尋有詔原罪倫前後三徵皆以直諫不合旣歸閉門講授自絶人事公車復徵遜遁不行卒於家中興北海牟融習大夏侯尚書東海王良習小夏侯尚書沛國桓榮習歐陽尚書榮世習相傳授東京最盛扶風杜林傳古文尚書林同郡賈逵為之作訓馬融作傳鄭元注解由是古文尚書遂顯於世髙詡字季回平原般人般卜滿切也曾祖父嘉以魯詩授元帝仕至上谷太守父容少傳嘉學哀平間為光禄大夫詡以父任為即中世傳魯詩以信行清操知名王莽簒位父子稱盲逃不仕莽世光武即位大司空宋𢎞薦詡徵為即除符離長去官後徵為博士建武十一年拜大司農在朝以方正稱十三年卒官賜錢及冢田包咸字子良㑹稽曲阿人也少為諸生受業長安師事博士右師右師姓也細君習魯詩論語王莽末去歸鄉里於東海界為赤眉賊所得遂見拘執十餘日咸晨夜誦經自若賊異而遣之因住東海立精舎講授光武即位乃歸鄉里太守黃讜署户曹史欲召咸入授其子咸曰禮有來學而無徃敎讜遂遣子師之舉孝廉除即中建武中入授皇太子論語又為其章句拜諫議大夫侍中右中郎將永平五年遷大鴻臚每進見賜以几杖入屏不趨贊事不名經傳有疑輒遣小黄門就舍即問顯宗以咸有師傅恩而素清苦常特賞賜珍玩奉禄增於諸卿咸皆散與諸生乏貧者病篤帝親輦駕臨視八年年七十二卒於官子福拜即中亦以論語入授和帝魏應字君伯任城人也少好學建武初詣博士受業習魯詩閉門誦習不交僚黨京師稱之後歸為郡吏舉明經除濟隂王文學以疾免官敎授山澤中徒衆常數百人永平初為博士再遷侍中十三年遷大鴻臚十八年拜光禄大夫建初四年拜五官中即將詔入授千乘王伉應經明行修弟子自遠方至者著録數千人肅宗甚重之數進見論難於前特授賞賜時㑹京師諸儒於白虎觀講論五經同異使應専掌難問侍中淳于恭奏之帝親臨幸稱制如石渠故事明年出為上黨太守徵拜騎都尉卒於官伏恭字叔齊琅邪東武人司徒湛之兄子也湛弟黯字雅文以明齊詩改定章句作解說九篇位至光禄勲無子以恭為後恭性孝事所繼母甚謹少傳黯學以任為郎建武四年除劇令視事十三年以惠政公廉聞青州舉為尤異太常試經第一拜博士遷常山太守敦修學校教授不輟由是北州多為伏氏學永平二年代梁松為太僕四年帝立辟雍於行禮中拜恭為司空儒者以為榮初父黯章句繁多恭乃省減浮辭定為二十萬言在位九年以病乞骸骨罷詔賜千石奉以終其身十五年行幸琅邪引遇如三公儀建初二年冬肅宗行饗禮以恭為三老年九十元和元年卒賜葬顯節陵下子壽官至東郡太守任末字叔本蜀郡繁人也少習齊詩遊京師教授十餘年友人董奉徳於洛陽病亡末躬推鹿車載其喪致墓所由是知名為郡功曹辭以病免後奔師喪於道物故臨命勑兄子造曰必致我尸於師門使死而有知魂靈不慚如其無知得土而已造從之景鸞字漢伯廣漢梓潼人也少隨師學經渉七州之地能理齊詩施氏易兼受河洛圖緯作易說及詩解文句兼取河洛以類相從名為交集又撰禮内外記號曰禮畧又抄風角雜書列其占驗作興道一篇及作月令章句凡所著述五十餘萬言數上書陳救灾變之術州郡辟命不就以壽終薛漢字公子淮陽人也世習韓詩父子以章句著名漢少傳父業善說灾異䜟緯敎授常數百人建武初為博士受詔校定圖䜟當世言詩者推漢為長永平中為千乘太守政有異迹後坐楚事辭相連下獄死弟子犍為杜撫㑹稽澹臺敬伯鉅鹿韓伯髙最知名杜撫字叔和犍為武陽人也少有髙才受業於薛漢定韓詩章句後歸郷里敎授沈静樂道舉動必以禮弟子千餘人後為驃騎將軍東平王蒼所辟及蒼就國掾史悉補王官屬未滿歲皆自劾歸時撫為大夫不忍去蒼聞賜車馬財物遣之辟太尉府建初中為公車令數月卒官其所作詩題約義通學者傳之曰杜君注云召馴字伯春九江壽春人也曾祖信臣元帝時為少府父建武中為卷令俶儻不拘小節馴少習韓詩博通書傳以志義聞郷里號之曰徳行恂恂召伯春累仕州郡辟司徒府建初元年稍遷騎都尉侍講肅宗拜左中郎將入授諸王帝嘉其義學恩寵甚榮出拜陳留太守賜刀劒錢物元和二年入為河南尹章和二年代任隗為光禄勲卒於官賜冢塋陪園陵孫休位至青州刺史楊仁字文義巴郡閬中人也建武中詣師習韓詩數年歸靜居敎授仕郡為功曹舉孝廉除即太常上仁經中博士仁自以年未五十不應舊科上府讓選顯宗特詔補北宫衛士令引見問當世政迹仁對以寛和任賢抑黜驕戚為先又上便宜十二事皆當世急務帝嘉之賜以縑錢及帝崩時諸馬貴盛各爭欲入宫仁被甲持㦸嚴勒門衛莫敢進者肅宗旣立諸馬共譖仁刻峻帝知其忠愈善之拜什邡令為政寛惠勸課掾史弟子悉令入學其有通明經術者顯之右署或貢之朝由是義學大興墾田千餘頃行兄喪去官後辟司徒桓虞府掾有宋章者貪奢不法仁終不與交言同席時人畏其節後為閬中令卒於官趙煜字長君㑹稽山隂人也少常為縣吏奉檄迎督郵煜恥於胥役遂棄車馬到犍為資中詣杜撫受韓詩究竟其術積二十年絶問不還家為發喪制服撫卒乃歸州召補從事不就舉有道卒于家煜著吳越春秋詩細歴神淵蔡邕讀詩細而歎息以為長於論衡邕還京師傳之學者咸誦習焉時山陽張匡字文通亦習韓詩作章句後舉有道博士徵不就卒於家衛宏字敬仲東海人也少與河南鄭興俱好古學初九江謝曼卿善毛詩乃為其訓宏從曼卿受學因作毛詩序善得風雅之㫖于今傳於世後從大司空杜林更受古文尚書為作訓㫖時濟南徐巡師事宏後從林受學亦以儒顯由是古學大興光武以為議郎宏作漢舊儀四篇以載西京雜事又著賦頌誄七首皆傳於世中興後鄭衆賈逵傳毛詩後馬融作毛詩傳鄭元作毛詩箋董鈞字文伯犍為資中人也習慶氏禮事大鴻臚王臨元始中舉明經遷廪犠令病去官建武中舉孝廉辟司徒府鈞博通古今數言政事永平中為博士時草創五郊祭祀及宗廟禮樂威儀章服輒令鈞參議多見從用當世稱為通儒累遷五官中郎將常敎授門生百餘人後坐事左轉騎都尉年七十餘卒於家中興鄭衆傳周官經後馬融作周官傳授鄭元元作周官注元本習小戴禮後以古經校之取其義長者故為鄭氏學元又注小戴所傳禮記四十篇通為三禮焉丁恭字子然山陽東緍人也習公羊嚴氏春秋恭學義精明敎授常數百人州郡請召不應建武初為諫議大夫博士封關内侯十一年遷少府諸生自遠方至者著録數千人當世稱為大儒太常樓望侍中承宫長水校尉樊儵等皆受業於恭二十年拜侍中祭酒騎都尉與侍中劉昆俱在光武左右每事諮訪焉卒於官周澤字稺都北海安邱人也少習公羊嚴氏春秋隠居敎授門徒常數百人建武末辟大司馬府署議曹祭酒數月徵試博士中元元年遷黽池令奉公剋已矜恤孤羸吏民歸愛之永平五年遷右中郎將十年拜太常澤果敢直言數有據爭後北地太守廖信坐貪穢下獄没入財産顯宗以信臧物班諸廉吏唯澤及光禄勲孫堪大司農常冲特䝉賜焉是時京師翕然在位者咸自勉勵堪字子稺河南緱氏人也明經學有志操清白貞正愛士大夫然一毫未嘗取於人以節介氣勇自行王莽末兵革並起宗族老弱在營保間堪常力戰陷敵無所回避數被創刃宗族頼之郡中咸服其義勇建武中仕郡縣公正廉潔奉禄不及妻子皆以供賔客及為長吏所在有迹為吏人所敬仰喜分明去就嘗為縣令謁府趨歩遲緩門亭長譴堪御吏堪便解印綬去不之官後復仕為左馮翊坐御下促急司𨽻校尉舉奏免官數月徴為侍御史再遷為尚書令永平十一年拜光禄勲堪清廉果於從政數有直言多見納用十八年以病乞身為侍中騎都尉卒於官堪行類於澤故京師號曰二穉十二年以澤行司徒事如眞澤性簡忽威儀頗失宰相之望數月復為太常清潔循行盡敬宗廟嘗臥病齋宫其妻哀澤老病闚問所苦澤大怒以妻干犯齋禁遂收送詔獄謝罪當世疑其詭激時人為之語曰生世不諧作太常妻一歲三百六十日三百五十九日齋一日不齋醉如泥十八年拜侍中騎都尉後數為三老五更建初中致仕卒於家鍾興字次文汝南汝陽人也少從少府丁恭受嚴氏春秋恭薦興學行髙明光武召見問以經義應對甚明帝善之拜郎中稍遷左中郎將詔令定春秋章句去其復重以授皇太子又使宗室諸侯從興受章句封關内侯興自以無功不敢受爵帝曰生敎訓太子及諸王侯非大功邪興曰臣師丁恭於是復封恭而興遂固辭不受爵卒於官甄宇字長文北海安邱人也清靜少欲習嚴氏春秋敎授常數百人建武中為州從事徵拜博士稍遷太子少傳卒於官傳業子普普傳子承承尤篤學未嘗視家事講授常數百人諸儒以承三世傳業莫不歸服之建初中舉孝廉卒於梁相子孫傳學不絶樓望字次子陳留雍邱人也少習嚴氏春秋操節清白有稱郷閭建武中趙節王栩聞其髙名遣使齎玉帛請以為師望不受後仕郡功曹永平初為侍中越騎校尉入講省内十六年遷大司農十八年代周澤為太常建初五年坐事左轉太中大夫後為左中郎將敎授不倦世稱儒宗諸生著錄九千餘人年八十永元十二年卒於官門生會葬者數千人儒家以為榮程曾字秀升豫章南昌人也受業長安習嚴氏春秋積十餘年還家講授㑹稽顧奉等數百人常居門下著書百餘篇皆五經通難又作孟子章句建初三年舉孝廉遷海西令卒於官張元字君夏河内河陽人也少習春秋顔氏兼通數家法建武初舉明經補𢎞農文學遷陳倉縣丞清浄無欲專心經書方其講問乃不食終日及有難者輒為張數家之說令擇從所安諸儒皆服其多通著錄千餘人初為縣丞嘗以職事對府不知官曹處吏白門下責之時左扶風琅邪徐業亦大儒也聞元諸生試引見之與語大驚曰今日相遭眞解矇矣遂請上堂難問極日後元去官舉孝廉除為郎㑹顔氏博士缺元試䇿第一拜為博士居數月諸生上言元兼說嚴氏宣氏不宜專為顔氏博士光武且令還署未及遷而卒李育字元春扶風漆人也少習公羊春秋沈思專精博覽書傳知名太學深為同郡班固所重固奏記薦育於驃騎將軍東平王蒼由是京師貴戚爭徃交之州郡請召育到輒辭病去常避地敎授門徒數百頗渉獵古學嘗讀左氏傳雖樂其文采然謂不得聖人深意以為前世陳元范升之徒更相非折而多引圖䜟不據理體於是作難左氏義四十一事建初元年衛尉馬廖舉育方正為議郎後拜博士四年詔與諸儒論五經於白虎觀育以公羊義難賈逵徃返皆有理證稱為通儒再遷尚書令及馬氏廢育坐為所舉免歸歲餘復徵再遷侍中卒於官何休字邵公任城樊人也父豹少府休為人質朴訥口而雅有心思精研六經世儒無及者以列卿子詔拜郎中非其好也辭病而去不任州郡進退必以禮太𫝊陳蕃辟之與參政事蕃敗休坐廢錮乃作春秋公羊解詁覃思不闚門十有七年又注訓孝經論語風角七分皆經緯典謨不與守文同說又以春秋駮漢事六十餘條妙得公羊本意休善歴筭與其師博士羊弼追述李育意以難二傳作公羊墨守左氏膏盲穀梁廢疾黨禁解又辟司徒羣公表休道術深明宜侍帷幄倖臣不悅之乃拜議郎屢陳忠言再遷諌議大夫光和五年卒年五十四服䖍字子愼初名重又名祗後改為䖍河南滎陽人也少以清苦建志入太學受業有雅才善著文論作春秋左氏傳解行之至今又以左傳駮何休之所駮漢事六十條舉孝廉稍遷中平末拜九江太守免遭亂行客病卒所著賦碑誄書記連珠九憤凡十餘篇頴容字子嚴陳國長平人也博學多通善春秋左氏師事太尉楊賜郡舉孝廉州辟公車徵皆不就初平中避亂荆州聚徒千餘人劉表以為武陵太守不肯起著春秋左氏條例五萬餘言建安中卒謝該字文儀南陽章陵人也善明春秋左氏為世名儒門徒數百千人建安中河東人樂詳條左氏凝滯數十事以問該皆為通解之名為謝氏釋行於世仕為公車司馬令以父母老託疾去官欲歸鄉里㑹荆州道㫁不得去少府孔融上書薦之卽徵還拜議郎以壽終建武中鄭興陳元傳春秋左氏學時尚書韓歆上疏欲爲左氏立博士范升與歆爭之未决陳元上書訟左氏遂以魏郡李封爲左氏博士後羣儒蔽固者數廷争之及封卒光武重違衆議因不復補臣謹按左氏起於六國公穀起於漢有左氏而後有公穀公穀據左氏事而專爲浮說者也使無左氏則公穀無作矣左氏雖麗藻少實然文有經緯而博通古今可謂大儒矣公穀之徒於章句言語之下穿鑿其義此青衿學子之事也然辭俚而意迂多齊東之言而公羊俚俗尤甚奈何漢儒交口譏排左氏不與立博士而復以公羊尊於穀梁何其倒置如此邪許愼字叔重汝南召陵人也性淳篤少博學經籍馬融常推敬之時人為之語曰五經無雙許叔重為郡功曹舉孝廉再遷除洨長卒于家初愼以五經傳說臧否不同於是撰為五經異義又作說文解字十四篇皆傳於世蔡元字叔陵汝南南頓人也學通五經門徒常千人其著錄者萬六千人徴辟並不就順帝特徵拜議郎講論五經異同甚合帝意遷侍中出為𢎞農太守卒於官魏按魏畧以董遇賈洪邯鄲淳薛夏隗禧蘇林樂詳等七人爲儒宗傳今以邯鄲淳事已在王粲傳蘇林事在劉劭傳特叙五人焉董遇字季直𢎞農人也性質訥而好學興平中關中擾亂與兄季中依將軍段煨遇采柜負販而常挾持經書投閑習讀其兄笑之而遇不改及建安初王綱小設郡舉孝廉稍遷黄門侍郎是時漢帝委政太祖遇旦夕侍講爲天子所愛信至二十二年許中百官矯制遇雖不與謀猶被錄詣鄴轉為冗散常從太祖西征過𢎞農王冢太祖疑欲謁顧問左右左右莫對遇進曰春秋之義國君卽位未逾年而卒不成為君𢎞農王卽阼旣淺又為暴臣所制降在藩國不應謁太祖乃過黄初中出為郡守明帝時入爲侍中大司農數年病亡初遇善治老子爲老子作訓註又善左氏傳更爲作朱墨别異人有從學者遇不肯敎之而云必當先讀百遍言讀書百遍而義自見從學者云苦渴無日遇言當以三餘或問三餘之意答曰冬者歲之餘夜者日之餘隂雨者時之餘由是諸生少從遇學無傳其朱墨者遇子綏亦有才學位至秘書監賈洪字叔業京兆新豐人也好學有才而特精於春秋左傳建安初仕郡舉計掾應州辟時州中自參軍事以下百餘人唯洪與馮翊嚴苞交通材學最髙洪歴守三縣令所在輒開除黌舍親授諸生後馬超反超刧洪將詣華隂使作露布洪不獲已為作之司𨽻鍾繇在東識其文曰此賈洪作也及超破走太祖召洪署軍謀掾猶以其前爲超作露布文故不卽叙晚乃出爲隂泉長延康中轉爲白馬王相洪善能談戲王彪亦雅好文學常師宗之過於三卿數歲病亡亡時年五十餘時人為之恨仕不至二千石而嚴苞亦歴守二縣黄初中以髙才入爲秘書丞數奏文賦文帝異之出爲西平太守卒於官薛夏字宣聲天水人也博學有才天水舊有姜閻任趙四姓常推於郡中而夏爲單家不爲降屈四姓欲共治之夏乃游逸東詣京都太祖宿聞其名甚禮遇之後四姓又使囚遙引夏關移潁川收捕繋獄時太祖已在冀州聞夏爲本郡所質撫掌曰夏無罪也漢陽兒輩直欲殺之耳乃告潁川使理出之召署軍謀掾文帝又嘉其才黄初中爲秘書丞帝每與夏推論書傳未嘗不終日也每呼之不名而謂之薛君夏居甚貧帝又顧其衣薄解所御服􅂁賜之其後征東將軍曹休來朝時帝方與夏有所咨論而外啓休到帝引入坐定帝顧夏言之於休曰此君秘書丞天水薛宣聲也宜共談其見遇如此尋欲用之會文帝崩至太和中嘗以公事移蘭臺蘭臺自以臺也而秘書署耳謂夏爲不得儀推吏當有坐者夏報之曰蘭臺爲外臺秘書爲内閣臺閣一也何不相移之有蘭臺屈無以折自是之後遂以爲常後數歲病亡勑其子無還天水隗禧字子牙京兆人也世單家少好學初平中三輔亂禧南客荆州不以荒擾擔負經書每以採柜餘日則誦習之太祖定荆州召署軍謀掾黃初中爲譙王即中王宿聞其儒者常虚心從學禧亦敬恭以授王由是大得賜遺以病還拜郎中年八十餘以老處家就之學者甚多禧旣明經又善星官常仰瞻天文歎息謂魚豢曰天下兵戈尚猶未息如之何豢又常從問左氏傳禧答曰欲知幽微莫若易人倫之紀莫若禮多識山川草木之名莫若詩左氏直相斫書耳不足精意也豢因從問詩禧說齊韓魯毛四家義不復執文有如諷誦又撰作諸經解數十萬言未及繕寫而得聾疾後數歲病亡樂詳字文載河東人也少好學建安初詳聞公車司馬令南郡謝該善左氏傳乃從南陽歩詣該問疑難諸要今左氏樂氏問七十二事詳所撰也所問旣畢遂歸郷里時杜畿為太守亦甚好學署詳文學祭酒使教後進於是河東學業大興至黄初中徵拜博士于時太學初立有博士十餘人學多􅄶狹又不熟悉畧不親教備員而已惟詳五業並受其或難教質而不解詳無愠色以杖畫地牽譬引類至忘寢食以是獨擅名於遠近詳學既精悉又善推歩别受詔與太史典定律厯太和中轉拜騎都尉以才劣於學故歴三世竟不出為守宰正始中以年老罷歸門徒數千人通志卷一百七十二
