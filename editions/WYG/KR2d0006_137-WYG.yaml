body:
  text: 通志卷一百十八上宋右廸功郎鄭樵漁仲撰列傳第三十一上蜀諸葛亮子膽樊建董厥徐庶關羽張飛馬超黄忠趙雲龎統徳公法正許靖麋竺孫乾簡雍伊籍秦宓音宻董和子允董陳祗恢劉巴馬良弟謖楊顒陳震吕乂劉封彭羕廖立李嚴劉琰魏延楊儀霍峻子弋王連向朗兄子寵張裔楊洪何祗費詩杜微杜瓊許慈胡潛孟光來敏尹黙李譔譙周郤正黄權李恢吕凱馬忠王平張嶷蒋琬子斌劉敏費禕姜維鄧芝張翼宗預廖化楊戲衛繼諸葛亮字孔明琅邪陽都人也漢司隸校尉諸葛豐之後也父珪字君貢漢末為泰山郡丞亮早孤從父元為袁術所署豫章太守元将亮及亮弟均之官㑹漢朝更選朱皓代元元素與荆州牧劉表有舊往依之元卒亮遂家於南陽之鄧縣相距襄陽城西二十餘里號曰隆中躬耕壟畝好為梁甫吟身長八尺每自方於管仲樂毅時人莫之許也唯博陵崔州平潁川徐庶元直與亮友善謂為信然初亮在荆州與元直及汝南孟公威潁川石廣元逰學三人務於精熟而亮獨觀其大略每晨夜抱膝長嘯謂三人曰卿諸人仕進可至郡守刺史也三人問其所志亮笑而不言後公威思鄉里欲北歸亮謂之曰中國饒士大夫逰遨何必故鄉邪及先主屯新野訪世事於司馬徳操徳操曰儒生俗士豈識時務識時務者在乎俊傑此間自有伏龍鳳雛先主問為誰曰諸葛孔明龎士元也時徐庶亦見先主先主器之庶謂先主曰諸葛孔明者卧龍也将軍豈願見之乎先主曰君與俱來庶曰此人可就見不可屈致也将軍宜枉駕顧之先主遂詣亮凡三往乃見因屏人曰漢室傾頽奸臣竊命主上蒙塵孤不度徳量力欲信大義於天下而智術淺短遂用猖蹶至於今日然志猶未已君謂計将安出亮曰自董卓已來豪傑並起跨州連郡者不可勝數曹操比於袁紹則名微而衆寡然操遂能克紹以弱為彊者非惟天時抑亦人謀也今操已擁百萬之衆挾天子而令諸侯此誠不可與争鋒孫權據有江東已歴三世國險民附賢能為之用此可與為援而不可圗也荆州北據漢沔利盡南海東連吳會西通巴蜀此用武之國也而其主不能守此殆天所以資将軍将軍豈有意乎益州險塞沃野千里天府之土髙祖因之以成帝業劉璋闇弱張魯在北民殷國富而不知存恤智能之士思得明君将軍既帝室之胄信義著於四海總攬英雄思賢如渴若跨有荆益保其巖阻西和諸戎南撫夷越外結好孫權内修政理天下有變則命一上将将荆州之軍以向宛洛将軍身率益州之衆出於秦川百姓孰敢不簞食壺漿以迎将軍者乎若然則覇業可成漢室可興矣先主曰善於是與亮情好日宻闗侯張飛䓁不悦先主觧之曰孤之有孔明猶魚之有水也願諸君勿復言闗張乃止劉表長子琦亦深器亮表受後妻之言愛少子琮不悦於琦琦刼亮圗自安之術亮曰君不見申生在内而危重耳在外而安乎琦即感悟隂䂓出計事在劉表傳中會黄祖死琦得出為江夏太守俄而表卒琮聞曹操來征遣使請降先主在樊聞之率其衆南行亮與徐庶並從為曹操所追庶母被執庶辭先主而指其心曰本欲與将軍共圗王覇之業者以此方寸之地也今失老母方寸亂矣無益於事請従此别遂詣曹操先主至夏口亮曰事急矣請奉命求救於吳時孫權擁軍柴桑觀望成敗亮説權曰海内大亂将軍起兵據有江東劉豫州亦收衆漢南與曹操並争天下今操芟夷大難畧已平矣遂破荆州威震四海英雄無所用武故豫州遁逃至此将軍量力而處之若能以吳越之衆與中國抗衡不如早與之絶若不能當何不案兵束甲北面而事之今将軍外託合従之名而内懐猶豫之計事急而不斷禍至無日矣權曰茍如君言劉豫州何不遂事之乎亮曰田横齊之壮士耳義猶不辱况劉豫州王室之胄英才盖世衆庶慕仰若水之歸海事之不濟此乃天也安能復為之下乎權勃然曰吾不能舉全吳之地十萬之衆受制於人吾計决矣非劉豫州莫可以當曹操者然豫州新敗之後安能抗此難乎亮曰豫州軍雖敗於長阪今戰士還者及闗羽水軍精甲萬人劉琦合江夏戰士亦不下萬人曹操之衆逺來疲敝聞追豫州輕騎一日一夜行三百餘里此所謂彊弩之末勢不能穿魯縞者也故兵法忌之曰必蹶上将軍且北方之人不習水戰又荆州之民附操者偪兵勢耳非心服也今将軍誠能命猛将統兵數萬與豫州協䂓同力破操軍必矣操軍敗必北還如此則荆吳之勢彊鼎足之形成矣成敗之機在於今日權大悦即遣周瑜程普魯肅䓁水軍三萬随亮詣先主并力拒曹操曹操敗於赤壁引軍歸鄴先主遂收江南以亮為軍師中郎将使督零陵桂陽長沙三郡調其賦税以充軍實亮時住臨蒸建安十六年益州牧劉璋遣法正迎先主使擊張魯亮與闗侯鎮荆州先主自葭萌還攻璋亮與張飛趙雲等率衆沂江分定郡縣與先主共圍成都成都平以亮為軍師将軍署左将軍府事先主外出亮常鎮守成都足食足兵二十六年羣下勸先主稱尊號先主未許亮説曰昔吳漢耿弇䓁初勸世祖即帝位世祖辭讓數四耿純進言曰天下英雄喁喁冀有所望如不従議者士大夫各歸求主無為従公也世祖感純言深至遂然諾之今曹氏簒位天下無主大王劉氏苗族紹世而起今即帝位乃其宜也士大夫随大王久勤苦者亦望尺寸之功如純言耳先主於是即帝位以亮為丞相錄尚書事假莭張飛卒後領司隸校尉章武三年春先主於永安病篤召亮於成都屬以後事謂亮曰君才十倍曹丕必能安國終定大事若嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢竭股肱之力効忠貞之莭繼之以死先主又為詔勅後主曰汝與丞相従事事之如父建興元年封亮武鄉侯開府治事頃之又領益州牧政事無巨細咸决於亮南中諸郡並皆叛亂亮以新遭大䘮故未便加兵且遣使聘吳因結和親遂為與國三年春亮率衆南征所在克㨗亮聞孟獲者為夷漢所服募生致之既得使觀於營陣之間問曰此軍何如獲對曰向者不知虚實故敗今蒙賜觀㸔營陣若秪如此即定易勝耳亮笑縦使更戰七縦七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣遂至滇池其秋南中悉平亮皆即其渠率而用之或以諫亮亮曰若留外人則當留兵兵留則無所食一不易也加夷新傷破父兄死䘮留外人而無兵者必成禍患二不易也又夷累有廢殺之罪自嫌釁重若留外人終不相信三不易也今吾欲使不留兵不運糧而綱紀粗定夷漢粗安故耳乃還治戎講武以俟大舉五年率諸軍北駐漢中臨發上疏曰先帝創業未半而中道崩殂今天下三分益州疲弊此誠危急存亡之秋也然侍衛之臣不懈於内忠志之士忘身於外者盖追先帝之殊遇欲報之於陛下也誠宜開張聖聴以光先帝遺徳恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諌之路也宫中府中俱為一體陟罰臧否不宜異同若有作奸犯科及為忠善者宜付有司論其刑賞以昭陛下平眀之理不宜偏私使内外異法也侍中侍郎郭攸之費禕董允䓁此皆良實志慮忠純是以先帝簡㧞以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能裨補闕漏有所廣益将軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵為督愚以為營中之事悉以咨之必能使行陳和睦優劣得所親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍皆悉貞良死莭之臣願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕南陽茍全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂歎恐託付不效以傷先帝之明故五月渡瀘深入不毛今南方已定兵甲已足當奨率三軍北定中原庶竭駑鈍掃除奸凶興復漢室還于舊都此臣所以報先帝而忠於陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以吿先帝之靈責攸之禕允等之慢以彰其咎陛下亦宜自謀以諮諏善道察納雅言深追先帝之遺詔臣不勝受恩感激今當逺離臨表涕零不知所言遂行屯于沔陽遣魏延諸軍并兵東下亮唯留萬人守城司馬懿率二十萬衆拒亮而與延軍錯道徑前當亮六十里所偵候白懿随至将士失色莫知其計亮意氣自若勅軍中皆卧旗息鼓不得妄出菴幔又令大開四城門掃地却洒懿常謂亮持重而猥見勢弱疑有伏兵於是引軍北趣山明日食時亮調參佐拊手大笑曰司馬懿必謂吾怯将有彊伏循山走矣候邏還白如亮所言懿後知之深以為恨六年春亮揚聲由斜谷道取郿使趙雲鄧芝為疑軍據箕谷魏大将軍曹真舉衆拒之亮身率諸軍攻祁山戎陣整齊賞罰肅而號令明南安天水安定三郡叛魏應亮闗中響震蜀人皆賀亮亮愀然有戚容謝曰普天之下莫非漢民國家威力未舉使百姓困於豺狼之吻一夫有死亮之罪也以此相賀能不為愧於是蜀人咸知亮有吞魏之志非惟拓境而已魏明帝西鎮長安命張郃拒亮亮使馬謖督諸軍在前與郃戰於街亭謖違亮莭度舉動失宜大為郃所破亮㧞西縣千餘家還於漢中戮謖以謝衆上疏曰臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣授任無方臣明不知人恤事多闇春秋責帥臣職是當請自貶三等以督厥咎於是以亮為右将軍行丞相事所總統如前亮於是考微勞甄烈壮引咎責躬布所失於天下厲兵講武以為後圗既而聞孫權破曹休魏兵東下闗中虚弱亮欲出兵攻魏羣臣多以為疑十一月亮上言曰先帝慮漢賊不兩立王業不偏安故託臣以討賊也以先帝之明量臣之才故知臣伐賊才弱敵彊也然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寝不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不可得偏全於蜀都故冒危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵法乘虛此進趍之時也謹陳其事如左髙帝明並日月謀臣淵深然渉險被創危然後安今陛下未及髙帝謀臣不如良平而欲以長計取勝坐定天下此臣之未觧一也劉繇王朗各據州郡論安言計動引聖人羣疑滿腹衆難塞胷今嵗不戰明年不征使孫䇿坐大遂并江東此臣之未觧二也曹操智計殊絶於人其用兵也髣髴孫吳然困於南陽險於烏巢危於祁連逼於黎陽㡬敗伯山殆死潼闗然後偽定一時耳况臣才弱而欲以不危定之此臣之未觧三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圗之委夏侯而夏侯敗亡先帝毎稱操為能猶有此失况臣駑下何能必勝此臣之未觧四也自臣到漢中中閒朞年耳然䘮趙雲陽羣馬玉閻芝丁立白夀劉郃鄧銅䓁及曲長屯将七十餘人突将無前賨叟青𦍑散騎武騎一千餘人此皆數十年之内所糾合四方之精鋭非一州之所有若復數年則損三分之二也當何以圗敵此臣之未觧五也今民窮兵疲而事不可息事不可息則住與行勞費正䓁而不乘虚圗之欲以一州之地與賊持久此臣之未觧六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下已定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事将成矣然後吳更違盟闗侯敗毁秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡力死而後已至於成敗利鈍非臣之所能逆覩也十二月亮遂復出散闗圍陳倉曹真拒之亮糧盡而還魏将王雙率騎追亮亮與戰破之斬雙七年亮遣陳戒攻武都隂平魏雍州刺史郭淮率衆欲撃戒亮自出至建威淮退還遂平二郡詔復亮丞相九年亮復出祁山以木牛運糧盡退軍魏将張郃率将追之亮與交戰射殺郃十二年春亮悉大衆由斜谷出以流馬運據武功五丈原與司馬懿對於渭南亮每患糧不繼使己志不伸是以分兵屯田為久駐之基耕者雜於渭濵居民之間而百姓安堵軍無私焉相持百餘日亮數挑戰懿亦表固請戰魏使衛尉辛毗持莭以制之姜維謂亮曰辛毗仗莭而到賊不復出矣亮曰彼本無戰情所以固請者以示武於其衆耳将在軍君命有所不受茍能制吾豈千里而請戰邪時有星赤而芒角自天東北西南流投於亮營三投再還往大還小八月亮疾病卒於軍時年五十四楊儀䓁整軍而出百姓奔告懿懿追焉姜維令儀反旗鳴鼓若将向懿者懿不敢逼於是儀結陣而去入谷然後發䘮懿之退也百姓為之諺曰死諸葛走生仲達或以告懿懿曰吾能料生不便料死也及軍退懿按行其營壘處所曰天下竒才也亮遺命𦵏漢中定軍山因山為墳冢足容棺歛以時服不須器物䇿書哀悼使使持莭左中郎将杜瓊贈丞相武鄉侯印綬諡曰忠武侯初亮自表後主曰臣成都有桑八百株薄田十五頃子弟衣食有餘饒至於臣在外任無别調度随身衣食悉仰於官不别治生以長尺寸若臣死之日不使内有餘帛外有贏財以負陛下及卒如其所言亮性長於巧思損益連弩木牛流馬皆出其意推演兵法作八陣圗咸得其要云亮言教書奏多可觀别為一集景耀六年春詔為亮立廟於沔陽亮初亡所在求立廟朝議以禮秩不聴於是百姓祭於巷陌夷戎祀於郊野至是歩兵校尉習隆中書郎向充䓁表請乞於近墓立廟斷其私祭以崇正禮従之是嵗秋魏鎮西将軍鍾會伐蜀至漢川祭亮之廟令軍士不得於亮墓所左右牧芻樵採亮弟均官至長水校尉亮子瞻嗣爵初亮未有子於吳求兄瑾第二子喬為嗣瑾啟孫權遣喬來西喬字伯松本字仲慎與兄恪俱有名於時喬至蜀亮以為己適子故易其字焉拜為駙馬都尉随亮至漢中年二十五建興元年卒子攀官至行䕶軍翊武将軍亦早卒諸葛恪見誅於吳子孫皆盡而亮自有胄裔故攀還復為瑾後瞻字思逺建興十二年亮出武功與兄瑾書曰瞻今已八嵗而聪慧可愛嫌其早成恐不為重器耳十七尚公主拜駙馬都尉其明年為羽林中郎将屢遷射聲校尉侍中尚書尚書僕射加軍師将軍瞻工書畫彊識念蜀人追思亮咸愛其才敏每朝廷有一善政佳事雖非瞻所建倡百姓皆傳相告曰葛侯之所為也是以美聲溢譽有過其實景曜四年為行都䕶衛将軍與輔國大將軍南鄉侯董厥並平尚書事六年冬魏征西将軍鄧艾伐蜀自隂平入景谷道旁入瞻督諸軍至涪停住前鋒破退還住綿竹艾遣書誘瞻曰若降者必表為琅邪王瞻怒斬艾使遂戰大敗臨陣死時年三十七衆皆離散艾長驅至成都瞻長子尚瞻敗時尚歎曰父子荷國重恩不早斬黄皓以致傾敗用生何為乃馳赴魏軍而死次子京及攀子顯䓁咸熙元年内徙河東京入晉位至江州刺史董厥者丞相亮時為府令史亮稱之曰董令史良士也吾每與之言思慎宜適徙為主簿亮卒後稍遷至尚書僕射代陳祗為尚書令遷大将軍平臺事而義陽樊建代焉延熙二十四年以校尉使吳值孫權病篤不自見建權問諸葛恪曰樊建何如宗預也恪對曰才識不及預而雅性過之後為侍中守尚書令自瞻厥建統事姜維常征伐在外宦人黄皓竊弄機柄咸共将䕶無能匡矯然建特不與皓和好往來蜀破之明年春厥建俱詣洛陽同為相國司馬昭參軍其秋並兼散騎常侍使蜀慰勞云先是亮所與友善者徐庶庶本名福單家子少好任侠擊劒中平末嘗為人報讐白堊突面被髪而走為吏所得問其姓字閉口不言吏乃於車上立柱維磔之撃鼓以令於市􅆵莫敢識者而其黨伍共簒觧之得脱於是感激棄其刀㦸更練布單衣折莭學問始詣精舎諸生聞其前作賊不肯與共止庶乃卑躬早起常獨埽除動静先意聴習經業義理精熟與石韜廣元相親愛初平中中州兵起乃與韜南客荆州因與亮交焉及荆州内附亮與先主相随去庶乃與韜俱來北黄初中韜仕歴郡守典農校尉庶至右中郎将建興中亮出隴右聞元直廣元仕財如此嘆曰魏豈多士邪何彼二人不見用乎庶後病卒有碑彭城云晉陳夀評諸葛亮曰亮之為相國也撫百姓示儀軌約官職從權制開誠心布公道盡忠益時者雖讐必賞犯法怠慢者雖親必罰服罪輸誠者雖重必釋㳺辭巧飾者雖輕必戮善無微而不賞惡無纎而不貶庶事精練物理其本循名責實虚偽不齒終於邦域之内咸畏而愛之刑故雖峻而無怨者以其用心平而勸戒明也可謂識治之良才管蕭之亞匹矣然連年動衆未能成功盖應變将畧非其所長歟闗侯字雲長本字長生河東觧人也好左氏傳諷誦畧皆上口亡命奔涿郡先主於鄉里合徒衆而侯與張飛為之禦侮先主為平原相以侯飛為别部司馬分統部曲先主與二人寝則同牀恩若兄弟而稠人廣坐侍立終日随先主周旋不避艱險先主之襲殺徐州刺史車胄使侯守下邳城行太守事而身還小沛建安五年曹操東征先主奔袁紹操禽侯以歸拜為偏将軍禮之甚厚袁紹遣大将軍顔良攻東郡太守劉延於白馬曹操使張遼與侯為先鋒撃之侯望見良麾盖策馬刺良於萬衆之中斬其首還紹諸将莫能當者遂觧白馬圍曹操即表封侯為漢夀亭侯初曹操壮侯為人而察其心神無久留之意謂張遼曰卿試以情問之既而遼以問闗侯嘆曰吾極知曹公待我厚然吾受劉将軍厚恩誓以共死不可背之吾終不留當立效以報曹公乃去遼欲白操恐侯見殺不白非君臣之道嘆曰曹公君父也侯兄弟耳遼遂白之操曰事君不忘其本天下義士也度何時能去遼曰侯受公恩必當立效報公而後去及侯殺顔良曹操知其必去乃厚加賞賜侯盡封所賜拜書告辭而奔先主於袁軍左右請追之操曰彼各為其主勿追之從先主就劉表表卒曹操定荆州先主自樊将南渡江别遣侯乘船數百艘會江陵曹操追至當陽長阪先主斜趣漢津適與侯船相值共至夏口孫權遣兵佐先主拒操操敗還先主收江南諸郡乃封拜元勲以侯為襄陽太守盪㓂将軍駐江北先主西定益州拜侯董督荆州事侯聞馬超來降舊非故人乃以書與諸葛亮問超人才可誰比類亮知侯護前乃答之曰孟起兼資文武雄烈過人一世之傑黥彭之徒當與益徳並驅争先猶未及髯之絶倫逸羣也侯羙鬚髯故亮謂之髯侯省書大悦以示賓客侯嘗為流矢所中貫其左臂後創雖愈每至隂雨骨常疼痛醫曰矢鏃有毒毒入於骨當破臂作創刮骨去毒然後此患乃除耳侯便伸臂命醫劈之時侯適請諸将飲食相對臂血流離盈於盤器而侯割炙引酒言笑自若二十四年先主為漢中王拜侯為前将軍假莭鉞是嵗侯率衆攻曹仁於樊曹操遣于禁助仁秋大霖雨漢水汎濫禁所督七軍皆沒禁降闗侯又斬将軍龎悳梁郏陸渾羣盗或遥受侯印號為之支黨侯威震華夏曹操議徙許都以避其鋭司馬懿蒋濟以為闗侯得志孫權必不樂可遣人勸權躡其後許割江南以封權則樊圍自觧操從之先是權遣使為子索侯女羽罵辱其使不許㛰權大怒又南郡太守麋芳在江陵将軍傅士仁屯公安素皆嫌侯輕己自侯之出軍芳仁供給軍資不悉相救侯言還當治之芳仁咸懐懼不安於是權隂誘芳仁芳仁使人迎權而曹操遣徐晃救曹仁侯不能克引軍退還權已據江陵盡虜侯士衆妻子侯軍遂散權遣将逆撃侯禽之權欲留闗侯以敵曹操左右曰狼子不可飬後必為害乃斬侯并其子平于臨沮侯初出軍圍樊夢猪嚙其足語子平曰今年衰矣恐不能還果敗先主追諡曰壮繆侯子興嗣興字安國少有令問諸葛亮深器異之弱冠為侍中中監軍數嵗卒子統嗣尚公主官至虎賁中郎将卒無子以興庶子彛續封張飛字益徳涿郡人也少與闗侯俱事先主侯年長數嵗飛常兄事之先主従曹操破吕布随還許曹操拜飛為中郎将先主背曹操依袁紹劉表表卒操入荆州先主奔江南操追至當陽之長阪先主聞曹操卒至棄妻子走使飛将二十騎拒後飛據水斷橋瞋目横矛曰身是張益徳也可來共决死敵皆無敢近者故遂得免先主既定江南以飛為宜都太守征虜将軍封新亭侯後轉在南郡先主入益州還攻劉璋飛與諸葛亮䓁泝流而上分定郡縣至江州破璋将巴郡太守嚴顔生獲顔飛呵顔曰大軍至何以不降而敢拒戰顔曰卿䓁無状侵奪我州我州但有斷頭将軍無有降将軍也飛怒令左右牽去斫頭顔色不變曰斫頭便斫頭何為怒邪飛壮而釋之引為賔客飛所過戰克與先主㑹成都益州既平賜諸葛亮法正飛及闗侯金各五百斤銀千斤錢五千萬錦千疋其餘頒賜各有差以飛領巴西太守曹操破張魯留夏侯淵張郃守漢川郃别督諸軍下巴西欲徙其民於漢中進軍宕渠蒙頭盪石與飛相拒五十餘日飛率精卒萬餘人従他道邀郃軍交戰山道迮狹前後不得相救飛遂破郃郃棄馬縁山獨與麾下十餘人従閒道退引軍還南鄭巴土獲安先主為漢中王拜飛為右将軍假莭章武元年遷車騎将軍領司隸校尉進封西鄉侯飛雄壮威猛亞於闗侯魏謀臣程昱䓁咸稱飛侯萬人之敵也侯善待卒伍而驕於士大夫飛愛敬君子而不恤小人先主常戒之曰卿刑殺既過差又日鞭撾健兒而令在左右此取禍之道也飛猶不悛先主伐吳飛當率兵萬人自閬中會江州臨發其帳下将張達范彊殺飛持其首順流而奔孫權飛營都督表報先主先主聞飛都督之有表也曰噫飛死矣追諡飛曰桓侯長子苞早夭次子紹嗣官至侍中尚書僕射苞子遵為尚書随諸葛瞻於綿竹與鄧艾戰死馬超字孟起右扶風茂陵人也父騰靈帝末與邉章韓遂䓁俱起事於西州初平三年遂騰率衆詣長安漢朝以遂為鎮西将軍遣還金城騰為征西将軍遣屯郿後騰去郿襲長安敗走退還涼州司隸校尉鍾繇鎮闗中移書遂騰為陳禍福騰遣超随繇討郭援高幹於平陽超将龎悳親斬援首後騰與韓遂不和求還京畿於是徴為衛尉以超為偏将軍封都亭侯領騰部曲超既統衆遂與韓遂合從及楊秋李堪成宜等相結進軍至潼闗曹操與遂超單馬㑹語超負其多力隂欲突前捉操操左右将許褚瞋目眄之超乃不敢動操用賈詡謀離閒遂超更相猜貳軍以大敗超走保諸戎操追至安定會北方有事引軍東還楊阜説操曰超有信布之勇甚得𦍑胡心若大軍還不嚴為其備隴上諸郡非國家之有也超果率諸戎以撃隴上郡縣隴上郡縣皆應之殺涼州刺史韋康據冀城有其衆超自稱征西将軍領并州牧督涼州軍事康故吏民楊阜姜叙梁寛趙衢䓁合謀撃超阜叙起於鹵城超出攻之不能下寛衢閉冀城門超不得入進退狼狽乃奔漢中依張魯魯不足與計事内懐於邑聞先主圍劉璋於成都宻書請降先主遣人迎超超将兵徑到城下城中震怖璋即稽首以超為平西将軍督臨沮因為前都亭侯先主為漢中王拜超為左将軍假莭章武元年遷驃騎将軍領凉州牧封斄鄉侯二年卒時年四十七臨沒上疏曰臣門宗二百餘口為孟徳所誅略盡惟有従弟岱當為微宗血食之繼深託陛下餘無復言追諡超曰威侯子承嗣岱位至平北将軍陳倉侯黄忠字漢升南陽人也荆州牧劉表以為中郎将與表従子􅀢共守長沙攸縣及曹操克荆州假行裨将軍仍就故任統屬長沙太守韓元先主南定諸郡忠遂委質随従入蜀自葭萌受任還攻劉璋忠常先登陷陣勇冠三軍益州既定拜為討虜将軍建安二十四年於漢中定軍山擊夏侯淵淵衆甚精忠推鋒必進勸率士卒金鼓振天歡聲動谷一戰斬淵淵軍大敗遷征西将軍是嵗先主為漢中王欲用忠為後将軍諸葛亮說先主曰忠之名望素非闗馬之倫也而今便令同列馬張在近親見其功尚可喻指闗遥聞之恐必不悦得無不可乎先主曰吾自當觧之遂與闗等齊位賜爵闗内侯明年卒追諡剛侯子叙早沒無後趙雲字子龍常山真定人也本屬公孫瓚瓚遣先主為田楷拒袁紹雲随從為先主主騎及先主為曹操所追於當陽長阪棄妻子南走雲身抱弱子即後主也保護甘夫人即後主母也皆得免難遷為牙門将軍先主入蜀雲留荆州先主自葭萌還攻劉璋召諸葛亮亮率雲與張飛䓁俱泝江西上平定郡縣至江州遣雲従外水上江陽與亮會成都成都既定以雲為翊軍将軍時議欲以成都中屋舎及城外園地桑田分賜諸将雲駮之曰霍去病以匃奴未滅無用家為今國賊非但匈奴未可求安也須天下都定各返桑梓歸耕本土乃其宜耳益州人民初罹兵革田宅皆可歸還令安居復業然後可役調得其歡心先主即従之夏侯淵敗曹操爭漢中地運米北山下數千萬囊黄忠以為可取雲兵随忠取米忠過期不還雲将數十騎輕行出圍迎視忠䓁値曹操揚兵大出雲為操前鋒所擊方戰其大衆至勢逼遂前突其陣且鬬且却操軍散已復合雲陷敵還趣圍其将張著被創雲復馳馬還營迎著操軍追至圍時沔陽長張翼在圍内欲閉門拒守雲入營更大開門偃旗息鼓操軍疑雲有伏兵引去雲雷鼓震天惟以戎弩自後射之操軍驚駭自相蹂踐堕漢水中死者甚多先主明旦自來至雲營圍視昨戰處曰子龍一身都為膽也作樂飲宴至暝軍中號雲為虎威将軍孫權襲荆州先主大怒欲討權雲諫曰國賊是曹操非孫權也且先滅魏則吳自服操身雖斃子丕簒盗當因衆心早圗闗中居河渭上流以討凶逆闗東義士必裹糧策馬以迎王師不應先置魏與吳戰兵勢一交不可卒觧也先主不聴遂東征留雲督江州先主失利於秭歸雲進兵至永安吳兵已退建興元年為中護軍征南将軍封永昌亭侯遷征東将軍五年随諸葛亮駐漢中明年亮出軍揚聲由斜谷道曹真遣大衆當之亮令雲與鄧芝往拒而身攻祁山雲芝兵弱敵彊失利於箕谷然歛衆固守不至大敗軍退貶為鎮軍将軍七年卒追諡曰順平侯初先主時惟法正見諡後主時諸葛亮功徳盖世蔣琬費褘荷國之重亦見諡陳祗寵待特加殊奨夏侯覇逺來歸國故復得諡於是闗侯張飛馬超龎統黄忠及雲乃追諡時論以為榮雲子統嗣官至虎賁中郎督行領軍次子廣牙門将随姜維㳫中臨陣戰死龎統字士元襄陽人龎徳公従子也謂諸葛孔明為卧龍士元為鳳雛司馬徳操為水鏡皆徳公語也孔明每至其家獨拜牀下徳公初不令止徳操嘗造徳公值其渡沔上冢徳操徑入其室呼徳公妻子使速作黍徐元直向云有客當來就我與龎公譚其妻子皆羅列拜於堂下奔走供設須㬰徳公還直入相就不知何者是客也徳操年小徳公十嵗兄事之統少時樸鈍未有識者唯徳公重之使往見徳操焉徳操潁川人名徽清雅有知人鑒時徽採桑於樹上坐統在樹下共語自晝達夜徽甚異之歎曰此盛徳之人當為南州士之冠冕由是漸顯後郡命為功曹統性好人倫每所稱述多過其才時人怪而問之統荅曰當今天下大亂雅道陵遲善人少而惡人多方欲興風俗長道業不羙其譚即聲名不足慕企而為善者少矣今㧞十失五猶得其半而可以崇邁世教使有志者自勵不亦可乎吳将周瑜助先主取荆州因領南郡太守聞統名召為功曹及瑜卒統送䘮至吳吳人多聞其名及當西還並會閶門陸績顧劭全琮皆往送之統曰陸子可謂駑馬有逸足之力顧子可謂駑牛能負重致逺也謂全琮曰卿好施慕名有似汝南樊子昭雖智力不多亦一時之佳也或竊問統曰如所目陸子為勝乎統曰駑馬雖精所致一人耳駑牛一日行三百里所致豈一人之重哉劭就統宿語因問卿名知人吾與卿孰愈統曰陶冶世俗甄綜人物吾不及卿論帝王之秘策攬倚伏之要最吾似有一日之長績劭謂統曰使天下太平當與卿共料四海之士深與統相結而别先主領荆州統以従事守耒陽令在縣不治免官吳将魯肅遺先主書曰龐士元非百里才也使處治中别駕之任始當展其驥足耳諸葛亮亦言於先主先主與語大器之以為治中従事親待亞於諸葛亮遂與亮並為軍師中郎将統説先主曰荆州荒殘人物殫盡東有吳孫北有曹氏鼎足之計難以得志今益州國富民彊户口百萬四部兵馬所出名貝寳貨無求於外今可權借以定大事先主曰今指與吾為水火者曹操也操以急吾以寛操以暴吾以仁操以譎吾以忠每與操反事乃可成耳今以小故而失信義於天下吾所不為也統曰權變之時固非一道所能定也逆取順守報之以義事定之後封以大國何負於信今日不取終為人利耳先主遂行亮留鎮荆州統随先主入蜀益州牧劉璋與先主會涪統進策曰今因此㑹便可執之則将軍無用兵之勞而坐定一州也先主曰初入他國恩信未著此不可也璋既還成都先主當為璋北征漢中統復説曰隂選精兵徑襲成都璋既不武又素無預備大軍卒至一舉便定此上計也楊懐髙沛璋之名将各仗彊兵據守闗頭聞數有牋諌璋使發遣将軍還荆州将軍未至遣與相聞説荆州有急欲還救之並使装束外作歸形此二子既服将軍英名又喜将軍之去計必輕騎來見将軍因此執之進取其兵乃向成都此中計也退還白帝連引荆州徐還圗之此下計也若沈吟不去将致大困不可久矣先主然其中計即斬懐沛還向成都所過輙克於涪大㑹致酒作樂謂統曰今日之㑹可謂樂矣統曰伐人之國而以為歡非仁者之兵也先主醉怒曰武王伐紂前歌後舞非仁者邪卿言不當宜速起出於是統逡廵引退先主尋悔請還統復故位初不顧謝飲食自若先主謂曰向者之論阿誰為失統對曰君臣俱失先主大笑宴樂如初進圍雒縣統率衆攻城為流矢所中卒時年三十六先主痛惜言則流涕拜統父議郎遷諫議大夫諸葛亮親為之拜追賜統爵闗内侯諡曰靖侯統子宏字巨師剛簡有臧否輕傲尚書令陳祗為祗所抑卒於涪陵太守統弟林以荆州治中従事參鎮北将軍黄權征吳値軍敗随權入魏魏封列侯至鉅鹿太守法正字孝直右扶風郿人也祖父真有清莭髙名建安初天下饑荒正與同郡孟達䓁俱入蜀依劉璋久之為新都令後召署軍議校尉既不任用又爲其州邑俱僑客者所謗無行志意不得益州别駕張松與正相善正忖璋不足與有為常竊嘆息松於荆州見曹操還勸璋絶操而自結於先主璋曰誰可使者松乃舉正正辭讓不得已而往正既還為松稱說先主有雄畧宻謀協規願共戴奉而未有縁後因璋聞曹操欲遣将征張魯之有懼心也松遂說璋宜迎先主使之討魯復令正銜命正既宣㫖隂獻策於先主曰以明将軍之英才乘劉牧之懦弱張松州之股肱以響應於内然後資益州之殷富慿天府之險阻以此成王業猶反掌也先主然之泝江而西與璋㑹涪北至葭萌南還取璋璋従事鄭度說璋曰左将軍縣軍襲我兵不滿萬士衆未附野糓是資軍無輜重其計莫若盡驅巴西梓潼民内涪水以西其倉􅅒野糓一皆燒除高壘深溝静以待之彼至請戰勿許久無所資不過百日必将自走走而擊之則成禽耳先主聞而惡之以問正正曰終不能用無可憂也璋果如正言謂其羣下曰吾聞拒敵以安民未聞動民以避敵也於是黜度不用其計及軍圍雒城正牋與璋曰正受性無術盟好違損懼左右不眀本末必並歸咎蒙恥沒身辱及執事是以捐身於外不敢反命恐聖聴穢惡其聲故中間不有牋敬顧念宿遇瞻望悢悢然惟前後披露腹心自従始初以至於終實不藏情有所不盡但愚闇䇿薄精誠不感以致於此耳今國事已危禍害在速雖捐放於外言足憎尤猶貪極所懐以盡餘忠明将軍本心正之所知也實為區區不欲失左将軍之意而卒至於是者左右不達英雄従事之道謂可違信黷誓而以意氣相致日月相選趨求順耳悦目随阿遂指不圗速慮為國深計故也事變既成又不料彊弱之勢以為左将軍縣逺之衆糧糓無儲欲得以多擊少曠日相持而從闗至此所歴輙破離宫别屯日自零落雒下雖有萬兵皆壊陳之卒破軍之将若欲争一旦之戰則兵将勢力實不相當若欲逺期計糧者今此營守已固糓米已積而明将軍土地日削百姓日困敵對遂多所供逺曠愚意計之謂必先竭将不復以持久也空爾相守猶不相堪今張益徳數萬之衆已定巴東入犍為界分平資中徳陽三道並侵将何以禦之本為明将軍計者必謂此軍縣逺無糧饋運不及兵少無繼今荆州道通衆數十倍加孫車騎遣弟及李異甘寧等為其後繼若争客主之勢以土地相勝者今此全有巴東廣漢犍為過半已定巴西一郡復非明将軍之有也計益州所仰唯蜀蜀亦破壊三分亡二吏民疲困思為亂者十户而八若敵逺則百姓不能堪役敵近則一旦易主矣廣漢諸縣是明比也又魚復與闗頭實為益州禍福之門今二門悉開堅城皆下諸軍並破兵将俱盡而敵家數道並進已入心腹坐守雒都存亡之勢昭然可見斯乃大畧其外較耳其餘屈曲難以辭極也以正下愚猶知此事不可復成况明将軍左右明智用謀之士豈當不見此數哉旦夕偷幸求容取媚不慮逺圗莫肯盡心獻良計耳若事窮勢廹将各索生求濟門户展轉反覆與今計異不為明将軍盡死難也而尊門猶當受其憂正雖獲不忠之謗然心自謂不負聖徳顧惟分義實竊痛心左将軍従本舉來舊心依依實無薄意愚以為可圗變化以保尊門十九年進圍成都璋蜀郡太守許靖将踰城降事覺不果璋以危亡在近故不誅靖璋既稽服先主以此薄靖不用也正說曰天下有獲虚譽而無其實者許靖是也然今主公始創大業天下之人不可户曉靖之浮稱播流四海若其不禮天下之人以謂主公為賤賢也宜加敬重以眩逺近追昔燕王之待郭隗先主於是乃厚待靖以正為蜀郡太守揚武将軍正外統都畿内為謀主一飡之徳睚眦之怨無不報復擅殺毁傷已者數人或謂諸葛亮曰法正於蜀郡太縦横宜啟主公抑其威福亮曰主公之在公安也北畏曹操之彊東憚孫權之逼近則懼孫夫人生變於肘腋之下當斯之時進退狼跋法孝直為之輔翼令翻然翺翔不可復制如何禁止法正使不得行其意邪初孫權以妹妻先主妹才㨗剛猛有諸兄之風侍婢百餘人皆親執刀侍立先主每入裏心常凛凛亮又知先主雅愛信正故言如此二十二年正説先主曰曹操一舉而降張魯定漢中不因此勢以圗巴蜀而留夏侯淵張郃屯守身遽北還此非其智不逮而力不足也必将内有憂偪故耳今䇿淵郃才畧不勝國之将帥舉衆往討則必可克之克之之日廣農積糓觀釁伺隙上可以傾覆宼敵尊奨王室中可以蠶食雍􅈵廣拓境土下可以固守要害為持久之計此盖天以與我時不可失也先主善其䇿乃率諸将進兵漢中正亦從行二十四年先主自陽平南渡沔水縁山稍前於定軍興勢作營淵将兵來争其地正曰可擊矣乃命黄忠乘高鼓譟攻之大破淵軍淵等授首曹操西征聞正之䇿乃曰吾故知元徳不辨有此必為人所教也先主立為漢中王以正為尚書令護軍将軍明年卒時年四十五先主為之流涕者累日諡曰翼侯賜子邈爵闗内侯官至奉車都尉漢陽太守諸葛亮與正雖好尚不同以公義相取亮每竒正智術先主既即尊號将東征孫權以復闗侯之恥羣臣多諫一皆不從章武二年大軍敗績還住白帝諸葛亮嘆曰法孝直若存則能制主上令不東行就復東行必不傾危矣許靖字文休汝南平輿人少與従兄劭俱知名並有人倫臧否之稱而私情不恊劭為郡功曹排擯靖不得齒叙以馬磨自給潁川劉翊為汝南太守乃舉靖計吏察孝㢘除尚書郎典選舉靈帝崩董卓秉政以漢陽周毖為吏部尚書與靖共謀議進退天下之士沙汰穢濁顯抜幽滯進用潁川荀爽韓融陳紀䓁為公卿郡守拜尚書韓馥為冀州牧侍中劉岱為兗州刺史潁川張咨為南陽太守陳留孔伷為豫州刺史東郡張邈為陳留太守而遷靖巴郡太守不就補御史中丞馥䓁到官各舉兵還向京都欲以誅卓卓怒毖曰諸君言當㧞用善士卓従君計不欲違天下人心而諸君所用人至官之日還來相圗卓何用相負叱毖令出於外斬之靖従兄陳相㻛又與伷合規靖懼誅奔伷伷卒依揚州刺史陳禕禕死吳郡都尉許貢會稽太守王朗素與靖有舊故往保焉靖収恤親理經紀振贍出於仁厚孫䇿東渡江皆走交州以避其難靖身坐岸邊先載附従疎親悉發乃従後去見者歎息既至交阯交阯太守士爕厚加禮待陳國袁徽以寄寓交州徽與尚書令荀彧書曰許文休英才偉士智畧足以計事自流宕以來與羣士相随每有緩急常先人後已與九族中外同其饑寒其紀綱同類仁恕惻隐皆有效事不能復一二陳之耳鉅鹿張翔銜王命使交部乘勢募靖欲與誓要靖拒而不許靖與曹操書曰世路戎夷禍亂遂合駑怯偷生自竄蠻貊契濶十年吉凶禮廢昔在㑹稽得所貽書辭㫖款宻久要不忘廹於袁術放命圮族扇動羣逆津塗四塞雖懸心北風欲行靡由正禮師退術兵前進㑹稽傾覆景興失據三江五湖皆為虜庭臨時困厄無所控告便與袁沛鄧子孝等浮涉滄海南至交州經歴東甌閩越之國行經萬里不見漢地漂薄風波絶糧茹草饑殍荐臻死者大半既濟南海與領守兒孝悳相見知足下忠義奮發整飭元戎西迎大駕廵省中嶽承此休問且悲且憙即與袁沛及徐元賢復共嚴装欲北上荆州㑹蒼梧諸縣夷越蠭起州府傾覆道路阻絶元賢被害老弱並殺靖尋循渚岸五千餘里復遇疾癘伯母殞命並及羣従自諸妻子一時畧盡復相扶持前到此郡計為兵害及病亡者十遺一二生民之艱辛苦之甚豈可具陳哉懼卒顛仆永為亡虜憂瘁慘慘忘寝與食欲附奉朝貢使自獲濟通歸死闕庭而荆州水陸無津交部驛使斷絶欲上益州復有峻防故官長吏一不得入前令交阯太守士威彦深相分託於益州兄弟又靖亦自與書辛苦懇惻而復寂寞未有報應雖仰瞻光靈延頸企踵何由假翼自致哉知聖主允明顯授足下專征之任凡諸逆莭多所誅討想力競者一心順従者同䂓矣又張子雲昔在京師志匡王室今雖臨荒域不得參與本朝亦國家之藩鎮足下之外援也子雲名津南陽人為交州刺史若荆楚和平王澤南至足下忽有聲問於子雲勤見保屬令得假途由荆州出不然當復相介紹於益州兄弟使相納受儻天假其年人緩其禍得歸死國家觧逋逃之負泯軀九泉将復何恨若時有險易事有利鈍人命無常隕歿不達者則永銜罪責入於裔土矣昔營邱翼周杖鉞専征博陸佐漢虎賁警蹕今日足下扶危持傾為國柱石秉師望之任兼霍光之重五侯九伯制御在手自古及今人臣之尊未有及足下者也夫爵髙者憂深禄厚者責重足下據爵高之任當責重之地言出於口即為賞罰意之所存便為禍福行之得道則社稷用寜行之失道即四方散亂國家安危在於足下百姓之命縣於執事自華及夷顒顒注望足下任此豈可不逺覽載籍廢興之由榮辱之機棄忘舊惡寛和羣司審量五材為官擇人茍得其人雖讐必舉茍非其人雖親不授以寧社稷以濟下民事立功成則繫音於管絃勒勲於金石願君勉之為國自重為民自愛翔恨靖之不自納搜索靖所寄書疏盡投之於水後劉璋遂使使招靖靖來入蜀璋以靖為巴郡廣漢太守南陽宋仲子於荆州與蜀郡太守王商書曰文休倜儻瑰偉有當世之具足下當以為指南建安十六年轉在蜀郡十九年先主克蜀以靖為左将軍長史先主為漢中王靖為太傅及即尊號䇿拜司徒靖雖年逾七十愛樂人物誘約後進清談不倦丞相諸葛亮皆為之拜章武二年卒子欽先靖夭沒欽子㳺景耀中為尚書始靖兄事潁川陳紀與陳郡袁渙平原華歆東海王朗䓁親善歆朗及紀并子羣魏初為公輔大臣咸與靖書申陳舊好情義款至文多故不載麋竺字子仲東海胊人也祖世貨殖僮客萬人貲産鉅億後徐州牧陶謙辟竺為别駕従事謙卒竺奉謙遺命迎先主於小沛建安元年吕布乘先主之出拒袁術襲下邳虜先主妻子先主轉軍廣陵海西竺於是進妹於先主為夫人奴客二千金銀貨幣以助軍資於時困匱賴此復振後曹操表竺領嬴郡太守竺弟芳為彭城相皆去官随先主周旋先主将適荆州遣竺先與劉表相聞以竺為左将軍従事中郎及益州既平拜為安漢将軍班在軍師将軍之右竺雍容敦雅而幹翮非所長是以待之以上賔之禮未嘗有所統御然賞賜優寵無與為比芳為南郡太守與闗侯共事而私好携貳叛迎孫權侯因覆敗竺面縛請罪先主慰諭以兄弟罪不相及崇待如初竺慙恚發病嵗餘卒子威官至虎賁中郎将威子照虎騎監自竺至照皆便弓馬善射御云臣謹按竺嘗従洛歸未達家數十里路傍見一婦女従竺求寄載行可數里婦謝去謂竺曰我天使也當往燒東海麋竺家感君見載故以相語竺因私請之婦曰不可得不燒君可馳去我當緩行日中火必發竺乃急行達家便出財物日中而火大發出搜神記孫乾字公祐北海人也先主領徐州辟為従事後随従周旋先主之背曹操遣乾自結袁紹将適荆州乾又與麋竺俱使劉表皆如意指後表與袁尚書說其兄弟分争之變曰昔與劉左将軍孫公祐共論此事未嘗不痛心入骨相為悲傷也其見重如此先主定益州乾自従事中郎為秉忠将軍見禮次麋竺與簡雍同䓁頃之卒簡雍字憲和涿郡人也少與先主有舊随従周旋先主至荆州雍與麋竺孫乾同為従事中郎常為談客往來使命先主入益州劉璋見雍甚愛之後先主圍成都遣雍往説璋璋與雍同輿而載出城歸命先主拜雍為昭徳将軍雍優㳺風儀性簡傲跌宕在先主坐席猶箕踞傾倚威儀不肅自縦適諸葛亮以下則獨擅一榻傾枕卧語無所為屈時天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰雍従先主逰觀見一男子行道謂先主曰彼人欲行淫何以不縛先主曰卿何以知之雍曰彼有其具與欲釀者同先主大笑而原欲醸者雍之滑稽皆此類也伊籍字機伯山陽人少依邑人鎮南将軍劉表先主之在荆州籍常往來自託表卒遂随先主南渡江従入益州益州既定以籍為左将軍従事中郎見待亞於簡雍孫乾䓁遣東使吳孫權聞其才辯欲逆折以辭籍適入拜權曰勞事無道之君乎籍即對曰一拜一起未足為勞籍之機㨗類皆如此權甚異之後遷昭文将軍與諸葛亮法正劉巴李嚴共造蜀科蜀科之制由此五人焉秦宓字子勅廣漢緜竹人也少有才學州郡辟命輙稱疾不往奏記州牧劉焉薦儒士任安定祖曰昔百里蹇叔以耆艾而定䇿甘羅子竒以童冠而立功故書羙黄髪而易稱顔回固知選士用能不拘長幼明矣乃者以來海内察舉率多英儁而遺舊齒衆論不齊異同相半此乃承平之翔歩非亂世之急務也夫欲救危拯亂宜得卓犖超倫與時殊趣者使之震驚鄰國駭動四方雖遭凶難無所憂懼昔葉公好龍神龍下之好偽徹天何况於真今處士任安仁義直道流名四逺如令見察則一州斯服昔湯舉伊尹不仁者逺何武貢二龔雙名竹帛故貪尋常之高而忽萬仞之嵩樂目前之飾而忘天下之譽斯誠往古之所重慎也足下甫欲鑿石索玉剖蚌求珠今乃隋和炳然有如皎日復何疑哉劉璋時宓同郡王商為治中従事與宓書請與州尊相見宓荅書拒之後商為嚴君平李𢎞立祠宓與書曰疾病伏匿甫知足下為嚴李立祠可謂厚黨勤類者也觀嚴文章冠冒天下由夷逸操山嶽不移使揚子不歎固自昭明如李仲元不遭法言令名必淪其無虎豹之文故也可謂攀龍附鳳者矣如揚子雲潛心著述有補於世泥蟠不滓行參聖師於今海内談詠厥辭邦有斯人以耀四逺怪子替兹不為立祠又蜀本無學士文翁遣相如東受七經還教吏民於是蜀學比於齊魯故地里志曰文翁倡其教相如為之師漢家得士盛於其世仲舒之徒不達封禪相如制其禮夫能制禮造樂移風易俗非禮所秩有益於世者乎雖有王孫之累猶孔子大齊桓之覇公羊賢叔術之讓僕既善長卿之化謂亦宜立祠速定其銘先主定益州廣漢太守夏侯纂請宓為師友祭酒領五官掾稱曰仲父宓稱疾卧家纂将功曹古朴主簿王普詣宓談宴宓卧如故纂問朴曰至於貴州飬生之具實絶餘州矣不知士人何如餘州也朴對曰乃自先漢以來其爵位者或不如餘州耳至於著作為世師或不負於餘州也嚴君平見黄老作指歸揚雄見易作大元見論語作法言司馬相如為武帝作封禪之文于今天下所共聞也纂曰仲父何如宓以簿簿手版也撃頬曰願明府勿以仲父之言假於小草民請為明府陳其本紀蜀有汶阜之山江出其腹帝以會昌神以建福故能沃野千里淮濟四瀆江為其首此其一也禹生石紐今之汶山郡是也昔堯遭洪水鯀所不治禹疏江決河東注於海為民除害生民以來功莫先者此其二也天帝布治房心決政參伐參伐則益州分野三皇乘祗車出谷口今之斜谷是也此便鄙州之阡陌明府以雅意論之何若於天下乎於是纂逡廵無以復荅益州辟宓為従事祭酒先主既稱尊號将東征吳宓陳天時無利坐下獄幽閉然後貸出建興二年丞相亮領益州牧選宓迎為别駕尋拜左中郎将長水校尉吳遣使張温來聘百官皆往餞焉衆人皆集而宓未往亮累遣使促之温曰彼何人也亮曰益州學士也及至温問宓曰君學乎宓曰五尺童子皆學何必小人温復問曰天有頭乎宓曰有之温曰在何方也曰在西方詩云乃眷西顧以此推之頭在西方温曰天有耳乎宓曰天處髙而聴卑詩云鶴鳴九臯聲聞於天若其無耳何以聴之温曰天有足乎宓曰有詩云天歩艱難之子不猶若其無足何以歩之温曰天有姓乎宓曰有温曰何姓宓曰姓劉温曰何以知之宓曰天子姓劉故以此知之温曰日生於東乎宓曰雖生於東而沒於西荅問如響應聲而出於是温大敬服之宓之文辯皆此類也遷大司農四年卒初宓見帝系之文五帝皆同一族因辨其不然之本又論皇帝王覇飬龍之説甚有通理譙周少時數往諮訪記錄其言於春秋然否論文多故不載董和字幼宰南郡枝江人也其先本巴郡江州人漢末和率宗族西遷益州牧劉璋以為牛鞞江原長成都令蜀土富實時俗奢侈貨殖之家侯服玉食婚姻送葬傾家竭産和躬率以儉惡衣蔬食防遏踰僭為之軌制所在皆移風變善畏而不犯然縣界豪彊憚和嚴法説璋轉和為巴東屬國都尉吏民老弱相携乞留和者數千人璋聴留二年還遷益州太守其清約如前與蠻夷従事務推誠心南土愛而信之先主定蜀徴和為掌軍中郎将與軍師将軍諸葛亮並署左将軍大司馬府事獻可替否共為歡交自和居官食禄外牧殊域内幹機衡二十餘年死之日家無擔石之儲亮後為丞相敎與羣下曰夫參署者集衆思廣忠益也若逺小嫌難相違覆曠闕損矣違覆而得中猶棄弊蹻而獲珠玉然人心苦不能盡惟徐元直處兹不惑又董幼宰參署七年事有不至至於十反來相啟告茍能慕元直之十一幼宰之殷勤有忠於國則亮可少過矣又曰昔初交州平屢聞得失後交元直勤見啟誨前參事於幼宰每言則盡後従事於偉度數有諌止雖姿性鄙暗不能悉納然與此四子終始好合亦足以明其不疑於直言也其追思和如此偉度姓胡名濟義陽人為亮主簿後官至右驃騎将軍和子允字休昭先主立太子允以選為舍人徙洗馬後主襲位遷黄門侍郎丞相亮将北征駐漢中慮後主富於春秋朱紫難别以允秉心公亮欲任以宫省之事上疏曰侍中郭攸之費禕侍郎董允䓁先帝簡拔以遺陛下至於斟酌規益進盡忠言則其任也愚以為宫中之事悉以咨之必能禆補闕漏有所廣益若無興徳之言則戮允䓁以彰其慢亮尋請禕為參軍允遷為侍中領虎賁中郎将統宿衛親兵攸之性素和順備員而已攸之南陽人也獻納之任允皆専之矣允處事為防制甚盡匡救之理後主常欲采擇以充後宫允以為古者天子后妃之數不過十二今嬪嬙已具不宜增益終執不聴後主益嚴憚之尚書令蒋琬領益州刺史上疏以讓費禕及允又表允内侍歴年翼賛王室宜賜爵土以褒勲勞允固辭不受後主漸長大愛宦人黄皓皓便僻佞慧欲自容入允常上則正色匡主下則數責於皓皓畏允不敢為非終允之世皓位不過黄門丞允嘗與尚書令費禕中典軍胡濟䓁共期逰宴嚴駕已辦而郎中襄陽董恢詣允修敬恢年少官微見允停出逡廵求去允不許曰本所以出者欲與同好逰談也今君已自屈方展濶積捨此之談就彼之宴非所謂也乃命觧驂禕䓁罷駕不行其守正下士皆此類也延熙六年加輔國将軍七年以侍中守尚書令為大将軍費禕副貳九年卒陳祗代允為侍中與黄皓互相表裏皓始預政事祗死後皓従黄門令為中常侍奉車都尉操㺯威柄終至覆國蜀人無不追思允及鄧艾至蜀聞皓姧險收閉将殺之而皓厚賂艾左右得免祗字奉宗汝南人許靖兄之外孫也少孤長於靖家弱冠知名稍遷至選曹郎矜厲有威容多技藝挟數術費禕甚異之故超繼允内侍吕乂卒祗又以侍中守尚書令加鎮軍大将軍姜維雖班在祗上常率衆在外希親朝政祗上承主指下接閹豎深見信愛權重於維景耀元年卒後主痛惜發言流涕下詔褒稱勲績諡曰忠侯賜子粲爵闗内侯抜次子裕為黄門侍郎自祗之有寵後主追怨允日深謂為自輕由祗媚兹一人皓構閒浸潤故耳允所留與語董恢者襄陽人字休緒入蜀以宣信中郎副費禕使吳孫權嘗大醉問禕曰楊儀魏延牧豎小人耳雖嘗有鳴吠之勞無益於時務然既已任之勢不得輕若一朝無諸葛亮必為禍亂矣諸君憒憒曾不知防慮於此豈所謂貽厥孫謀者乎禕愕然四顧視不能即荅恢目禕曰可速言儀延之不恊起於私忿耳而無韓黥難御之心也今方掃除彊賊混一函夏功以才成業由才廣若舎此不任防其後患是猶欲備風波而逆廢舟楫非長計也權大笑樂諸葛亮聞之以為知言還未滿三日辟為丞相府屬遷巴郡太守允孫宏晉巴西太守劉巴字子初零陵烝陽人也祖父曜蒼梧太守父祥江夏太守盪㓂将軍時孫堅起兵討董卓以南陽太守張咨不給軍糧殺之祥與同心南陽士民怨祥舉兵攻之祥與戰敗亡荆州牧劉表亦素不善祥拘巴欲殺之數遣祥故所親信者宻詐謂巴曰劉牧欲相危害可相随逃之如此冄三巴輙不應具以報表表乃不殺巴年十八郡署户曹史主記主簿先主在荆州欲遣甥周不疑就巴學巴荅曰昔㳺荆北時渉師門記問之學不足紀名内無楊朱守静之術外無墨翟務時之風猶天之南箕虚而不用賜書乃欲令賢甥擢鸞鳳之􅃩遊燕雀之宇将何以啟明之哉表後連辟巴及舉茂才皆不就表卒曹操征荆州先主奔江南荆楚羣士従之如雲而巴北詣曹操操辟為掾使招納長沙零陵桂陽㑹先主畧有三郡巴不得反使遂逺適交阯先主深以為恨巴復従交阯至蜀俄而先主定益州初劉璋遣法正迎先主巴諌曰劉備人雄也入必為害不可内既入巴復諌曰若使備討張魯是放虎於山林也璋不聴巴閉門稱疾先主攻成都令軍中有害巴者誅及三族及得巴甚喜巴辭謝罪負先主不責諸葛亮數稱薦之先主辟為左将軍西曹掾張飛嘗就巴宿巴不與語飛忿恚亮謂巴曰張飛雖實武人甚敬慕足下主公今方收合文武以定大事足下雖天素高亮宜少降意也巴曰大丈夫處世當交四海英雄如何與兵子共語乎先主聞之怒曰孤欲定天下而子初専亂之其欲還北假道於此豈欲成孤事邪及先主怒觧則又曰子初才智絶人如孤可任用之非孤者難獨任也亮亦曰運籌䇿於帷幄之中吾不如子初逺矣若提枹鼓㑹於軍門使百姓喜勇當與人議之耳初攻劉璋先主與士衆約若事定府庫百物孤無與焉及㧞成都士衆皆捨干戈赴諸藏競取貨寳軍用不足先主甚憂之巴曰此易耳但當鑄直百錢平諸物價令吏為官市先主従之數月之閒府庫充實建安二十四年先主為漢中王巴為尚書後代法正為尚書令躬履清儉不治産業又自以歸附非素懼見猜嫌恭黙守静退無私交非公事不言先主稱尊號昭吿於皇天上帝后土神祗凡諸文誥䇿命皆巴所作也章武二年卒後魏尚書僕射陳羣與諸葛亮書問巴消息曰劉君子初甚敬重焉馬良字季常襄陽宜城人也兄弟五人並有才名鄉里為之諺曰馬氏五常白眉最良良眉中有白毛故以稱之先主領荆州辟為従事尋辟左将軍掾後遣使吳良謂諸葛亮曰今銜國命恊穆二家幸為良介於孫将軍亮曰君試自為文良即為草曰寡君遣掾馬良通聘繼好以紹昆吾豕韋之勲竒人吉士荆楚之令鮮於造次之華而有克終之美願降心存納以慰将命權敬待之先主稱尊號以良為侍中及東征吳遣良入武陵招納五溪蠻夷蠻夷渠帥皆受印號咸如意指會先主敗績於夷陵良亦遇害先主拜良子秉為騎都尉良弟謖字幼常以荆州従事随先主入蜀除緜州成都令越嶲太守才器過人好論軍計丞相諸葛亮深加器異先主臨薨謂亮曰馬謖言過其實不可大用君其察之亮猶謂不然以謖為參軍每引見談論自晝達夜建興三年亮征南中謖送之數十里亮曰雖共謀之歴年今可更恵良䂓謖對曰南中恃其險逺不服久矣雖今日破之明日復反耳今公方傾國北伐以事彊賊彼知官勢内虚其叛亦速若殄盡遺類以除後患既非仁者之情且又不可倉卒也夫用兵之道攻心為上攻城為下心戰為上兵戰為下願公服其心而已亮納其䇿赦孟獲以服南方故終亮之世南方不敢復反六年亮出軍向祁山時有宿将魏延吳壹䓁論者皆言以為宜令為先鋒而亮違衆㧞謖統大衆在前與魏将張郃戰於街亭為郃所破士卒離散亮進無所據退軍還漢中謖下獄物故謖臨終與亮書曰明公視謖猶子謖視明公猶父願深惟殛鯀興禹之義使平生之交不虧於此謖雖死無恨於黄壤也於時十萬之衆為之垂泣亮親自臨祭待其遺孤若平生蒋琬後詣漢中謂亮曰昔椘殺得臣然後文公喜可知也天下未定而戮智計之士豈不惜乎亮流涕曰孫武所以能制勝於天下者用法明也是以揚干亂法魏絳戮其僕四海分裂兵交方始若復廢法何用討賊邪良死時年三十六謖年三十九楊顒字子昭襄陽人也為丞相諸葛亮主簿亮嘗自校簿書顒直入諌曰為治有體上下不可相侵請為明公以作家譬之今有人使奴執耕婢典爨雞司晨犬吠盗牛負重馬渉逺私業無曠所求皆足雍容高拱飲食而已忽一旦盡欲以身親其役形疲神困終無一成豈其智之不如奴婢雞狗哉失為家主之法也是故古人稱坐而論道謂之三公作而行之謂之士大夫邴吉不問横道死人而憂牛喘陳平不肯知錢糓之數而云自有主者彼誠達於位分之體也今明公躬校簿書流汗終日不亦勞乎亮謝之及顒卒亮垂泣三日陳震字孝起南陽人也先主領荆州牧辟為従事部諸郡随先主入蜀蜀既定為蜀郡北部都尉因易郡名為汶山太守轉任犍為建興二年入拜尚書遷尚書令奉命使吳七年權稱尊號以震為衛尉賀權踐阼諸葛亮與兄瑾書曰孝起忠純之性老而益篤及其賛述東西歡樂和合有可貴者震入吳界移闗候曰東之與西驛使往來冠盖相望申盟初好日新其事東尊應保聖祚吿燎受符剖判土宇天下響應各有所歸於此時也以同心討賊則何㓂不滅哉西朝君臣引領欣賴震以不才得充下使奉聘叙好踐界踴躍入則如歸獻子適魯犯其山諱春秋譏之望必啟告使行人睦焉即日張旍誥衆各自約誓順流漂疾國典異制懼或有違幸必斟誨示其所宜震到武昌孫權與震升壇㰱盟交分天下以徐豫幽青屬吳并涼冀兖屬蜀其司州之土以函谷闗為界震還封城陽亭侯九年都䕶李平坐誣㒺廢諸葛亮與長史蒋琬侍中董允書曰孝起前臨至吳為吾説正方腹中有鱗甲鄉里以為不可近吾以為鱗甲者但不當犯之耳不圗復有蘇張之事出於不意可使孝起知之十三年震卒子濟嗣吕乂字季陽南陽人也父常送故将軍劉焉入蜀值王路隔塞遂不得還乂少孤好讀書鼓琴先主定益州置鹽府校尉較鹽鐡之利後校尉王連請乂及南陽杜祺南鄉劉幹䓁並為典曹都尉乂遷新都緜竹令乃心隐䘏百姓稱之為一州諸城之首遷為巴西太守丞相諸葛亮連年出軍調發諸郡多不相救乂募五千兵詣亮慰喻檢制無逃竄者徙為漢中太守兼領督農供繼軍糧亮卒累遷廣漢蜀郡太守蜀郡一都之㑹户口衆多自亮卒之後士伍亡命更相重冒姦巧非一乂到官為之防禁開喻勸導數年之間漏脱自出者萬餘口後入為尚書代董允為尚書令庶事無留門無停賔乂既歴職内外治身儉約謙静少言為政簡易號為清能然持法刻深好用文俗吏故居大官名聲損於郡縣延熙十四年卒子辰景耀中為成都令辰弟雅謁者雅清厲有文著格論十五篇杜祺歴郡守監軍大将軍司馬劉幹官至巴西太守皆與乂親善亦有當時之稱而儉素守法不及於乂劉封者本羅侯寇氏之子長沙劉氏之甥也先主至荆州以未有繼嗣飬封為子及先主入蜀自葭萌還攻劉璋時封年二十餘有武藝氣力過人将兵俱與諸葛亮張飛䓁泝流西上所在戰克益州既定以封為副軍中郎将初劉璋遣扶風孟達副法正各将兵三千人使迎先主先主因令達并領其衆留屯江陵蜀平後以達為宜都太守建安二十四年命達従秭歸北攻房陵房陵太守蒯祺為達兵所害達将進攻上庸先主隂恐達難獨任乃遣封自漢中乘沔水下統達軍與達會上庸上庸太守申耽舉衆降遣妻子及宗族詣成都先主加耽征北将軍領上庸太守員鄉侯如故以耽弟儀為建信将軍西城太守遷封為副軍将軍自闗侯圍樊城襄陽連呼封達令發兵自助封達辭以山郡初附未可動摇不承侯命會侯覆敗先主恨之又封與達忿争不和封尋奪達鼓吹達既懼罪又忿恚封遂表辭先主率所領降魏魏文帝善達之姿才容觀以為散騎常侍建武将軍封平陽亭侯合房陵上庸西城三郡為新城郡以達領新城太守遣征東将軍夏侯尚右将軍徐晃與達共襲封達與封書曰古人有言疏不閒親新不加舊此謂上明下直讒慝不行也若乃權君譎主賢父慈親猶有忠臣蹈功以罹禍孝子抱仁以陷難種商白起孝已伯竒皆其類也其所以然非骨肉好離親親樂患也或有恩移愛易亦有讒閒其間雖忠臣不能移之於君孝子不能變之於父者也勢利所加改親為讐况非親親乎故申生衛伋禦冦椘建禀受形之氣當嗣立之正而猶如此今足下與漢中王道路之人耳親非骨肉而據勢權義非君臣而處上位征則有偏任之威居則有副軍之號逺近所聞也自立阿斗為太子已來有識之人相為寒心如使申生従子輿之言必為太伯衛伋聴其弟之謀無彰父之譏也且小白出奔入而為覇重耳踰垣卒以克復自古有之非獨今也夫智貴免禍明尚夙達僕揆漢中王慮定於内疑生於外矣慮定則心固疑生則心懼亂禍之興作未曾不由廢立之閒也私怨人情不能不見恐左右必有以間於漢中王矣然則疑成怨聞其發若踐機耳今足下在逺尚可假息一時若大軍遂進足下失據而還竊相為危之昔微子去殷智果别族違難背禍猶皆如斯今足下棄父母而為人後非禮也知禍将至而留之非智也見正不從而疑之非義也自號為丈夫為此三者何所貴乎以足下之材棄身來東繼嗣羅侯不為背親也北面事君以正綱紀不為棄舊也怒不致亂以免危亡不為徒行也加陛下新受禪命虚心側席以徳懐逺若足下翻然内向非但與僕為倫受三百户封繼統羅國而已當更剖符大邦為始封之君陛下大軍金鼓以震當轉都宛鄧若二敵不平軍無還期足下宜因此時早定良計易有利見大人詩有自求多福行矣今足下勉之無使狐突閉門不出封不従達言申儀叛封封破走還成都申耽降魏魏假耽懐集将軍徙居南陽儀魏興太守封真鄉侯屯洵口封旣至先主責封之侵陵達又不救侯諸葛亮慮封剛猛易世之後終難制御勸先主因此除之於是賜封死使自裁封嘆曰恨不用孟子度之言先主為之流涕達本字子敬避先主叔父敬改之封子林為牙門将咸熙初内徙河東彭羕字永年廣漢人也身長八尺容貌甚偉姿性驕傲多所輕忽惟敬同郡秦宓子勅薦之於太守許靖以為高概莭行守真不虧雖古人潛遁蔑以加也羕仕州不過書佐後又為衆人所謗毁於州牧劉璋璋髠鉗羕為徒𨽻㑹先主入蜀泝流北行羕欲納説先主乃往見龐統統與羕非故人又適有賔客羕徑上統牀卧謂統曰須客罷當與卿善談統客既罷往就羕坐羕又先責統食然後共語因留信宿至於經日統大善之而法正宿自知羕遂並致之先主先主亦以為竒數令羕傳宣軍事指授諸将奉使稱意識遇日加成都既定先主領益州牧抜羕為治中従事羕起徒歩一朝處州人之上形色嚻然自矜得遇滋甚諸葛亮雖外接待羕而内不能善屢宻言先主羕心大志廣難可保安先主既敬信亮加察羕行事意以稍疎左遷羕為江陽太守羕聞當逺出私情不悦往詣馬超超問羕曰卿才具秀抜主公相待至重謂卿當與孔明孝直諸人齊足並驅寧當外授小郡失人本望乎羕曰老革荒悖可復道邪又謂超曰卿為其外我為其内天下不足定也超羈旅歸國常懐危懼聞羕言大驚黙然不荅羕退具表羕辭於是収羕付有司羕於獄中與諸葛亮書曰僕昔有事於諸侯以為曹操暴虐孫權無道振威闇弱其惟主公有覇王之器可與興業致治故乃翻然有輕舉之志㑹公來西僕因法孝直自衒鬻龎統斟酌其間遂得詣公於葭萌指掌而譚論治世之務講覇王之義建取益州之䇿公亦宿慮明定即相然賛遂舉事焉僕於故州不免凡庸憂於罪㒺得遭風雲激矢之中求君得君志行名顯従布衣之中擢為國士盗竊茂才分子之厚誰復過此羕一朝狂悖自求葅醢為不忠不義之鬼乎先民有言左手據天下之圗右手刎咽喉愚夫不為也况僕頗别菽麥者哉所以有怨望意者不自度量茍以為首興事業而有投江陽之論不觧主公之意意卒感激頗以被酒侻失老語此僕之下愚薄慮所致主公實未老也且夫立業豈在老少西伯九十寧有衰志負我慈父罪有百死至於内外之言欲使孟起立功北州戮力主公共討曹操耳寧敢有他志邪孟起説之是也但不分别其間痛人心耳昔與龎統共相誓約庶託足下末蹤盡心於主公之業追名古人載勲竹帛統不幸而死僕敗以取禍自我堕之将復誰怨足下當世伊吕也宜善與主公計事濟其大猷天地明察神祇有靈復何言哉貴使足下明僕本心耳行矣努力自愛自愛羕竟誅死時年三十七通志卷一百十八上
