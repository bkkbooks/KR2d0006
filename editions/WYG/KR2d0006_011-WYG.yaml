body:
  text: 通志卷六下宋右廸功郎鄭樵漁仲撰後漢紀第六下順帝冲帝質帝桓帝靈帝獻帝孝順皇帝諱保安帝之子也母李氏為閻皇后所害永寧元年立為皇太子延光三年安帝乳母王聖大長秋江京中常侍樊豐譖太子乳母王男厨監邴吉殺之太子數為歎息王聖等懼有後禍遂與豐京共搆陷太子太子坐廢為濟陰王眀年三月安帝崩北鄉侯立濟陰王以廢黜不得上殿親臨梓宫悲號不食内外羣僚莫不哀之及北鄉侯薨車騎將軍閻顯及江京與中常侍劉安陳達等白太后秘不發喪而更徵立諸國王子乃閉宮門屯兵自守十一月丁巳京師及郡國十六地震是夜中黃門孫程等十九人共斬江京劉安陳達等迎濟陰王於徳陽殿西鐘下即皇帝位年十一近臣尚書以下從輦到南宮登雲䑓召百官尚書令劉光等奏言孝安皇帝聖徳眀茂早棄天下陛下正統當奉宗廟而姦臣交搆遂令陛下龍潛蕃國羣僚逺近莫不失望天命有常北鄉不永漢徳盛眀福祚孔章近臣建策左右扶翼内外同心稽合神眀陛下踐阼奉遵鴻緒為郊廟主承續祖宗無窮之烈上當天心下厭民望而即位倉卒典章多缺請條案禮儀分别具奏制曰可乃召公卿百僚使虎賁羽林士屯南北宮諸門閻顯兄弟聞帝立率兵入北宮尚書郭鎮與交鋒刃遂斬顯弟衛尉景戊午遣使者入省奪得璽綬乃幸嘉徳殿遣侍御史持節收閻顯及其弟城門校尉耀執金吾晏並下獄誅己未開門罷屯兵壬戌詔司隸校尉惟閻顯江京近親當伏辜誅其餘務崇寛貸壬申謁髙廟癸酉謁光武廟乙亥詔益州刺史罷子午道通褒斜路己卯𦵏少帝以諸王禮司空劉授免賜公卿以下錢穀各有差十二月甲申以少府河南陶敦為司空其令郡國守相視事未滿歳者一切得舉孝亷吏癸卯尚書奏請下有司收還延光三年九月丁酉以皇太子為濟陰王詔可京師大疫辛亥詔公卿郡守國相舉賢良方正能直言極諫之士各一人尚書令以下從輦幸南宮者皆增秩賜布各有差永建元年春正月甲寅詔大赦天下賜男子爵人二級為父後三老孝悌力田人三級流民欲自占者一級鰥寡孤獨篤癃貧不能自存者粟人五斛貞婦帛人三匹坐法當徙勿徙亡徙當傳勿傳宗室以罪絶皆復屬籍其與閻顯江京等交通者悉勿考辛未皇太后閻氏崩辛巳太傅馮石太尉劉熹司徒李郃免二月甲申𦵏安思皇后丙戌太常桓焉為太傅大鴻臚朱寵為太尉參録尚書事長樂少府九江朱倀為司徒賜百官隨輦宿衛及拜除者布各有差隴西鍾羌叛䕶羌校尉馬賢討破之夏五月丁丑詔幽并涼州刺史使各實二千石以下至黃綬年老力弱不任軍事者上名嚴勅障塞繕設屯備立秋之後簡習戎馬六月己亥封濟南王錯子顯為濟南王秋七月庚午衛尉来歴為車騎將軍八月鮮卑寇代郡代郡太守李超戰殁九月辛亥初令三公尚書入奏事冬十月辛巳詔減死罪以下徙邊其亡命贖各有差丁亥司空陶敦免鮮卑犯邊庚寅遣黎陽營兵出屯中山北界告幽州刺史其令縁邊郡增置歩兵列屯塞下調五營弩師郡舉五人令教習戰射壬寅廷尉張皓為司空甲辰詔以疫癘水潦令人勿輸今年田租傷害什四以上勿收責不滿者以實除之十二月辛巳賜王主貴人公卿以下布各有差二年春正月戊申樂安王鴻来朝丁卯常山王章薨二月鮮卑寇遼東元菟甲辰詔稟貸荆豫兖冀四州流冗貧人所在安業之疾病致醫藥䕶烏桓校尉耿曄率南單于擊鮮卑破之三月旱遣使者録囚徒疏勒國遣使奉獻夏六月乙酉追尊諡皇妣李氏為恭愍皇后𦵏於恭北陵西域長史班勇敦煌太守張朗討焉耆尉犂危須三國破之並遣子貢獻秋七月甲戌朔日有食之壬午太尉朱寵司徒朱倀罷庚子太常劉光為太尉録尚書事光禄勲許敬為司徒辛丑下邳王成薨三年春正月丙子京師地震漢陽地陷裂甲午詔實覈傷害者賜年七歲以上錢人二千一家被害郡縣為收歛乙未詔勿收漢陽今年田租口賦夏四月癸卯遣光禄大夫案行漢陽及河内魏郡陳留東郡稟貸貧人六月旱遣使者録囚徒理輕繫甲寅濟南王顯薨秋七月丁酉茂陵園寢灾帝縞素避正殿辛亥使太常王龔持節告祠茂陵九月鮮卑寇漁陽冬十二月己亥太傅桓焉免是歲車騎將軍来歴罷四年春正月丙寅詔赦天下從甲寅赦令已来復秩屬籍三年正月已来還贖其閻顯江京等知識婚姻禁錮一原除之務崇寛和敬順時令遵典去苛以稱朕意丙子帝加元服賜王主貴人公卿以下金帛各有差賜男子爵及流民欲占者人一級為父後三老孝悌力田人二級鰥寡孤獨篤癃不能自存帛一匹二月戊戌詔以民入山鑿石發洩藏氣勅有司檢察所當禁絶如建武永平故事夏五月壬辰詔還桂陽太守文礱力公反所獻大珠仍切責之五州雨水秋八月庚子遣使實覈死亡收歛稟賜丁巳太尉劉光司空張皓免九月復安定北地上郡歸舊土癸酉大鴻臚龎參為太尉録尚書事太常王龔為司空冬十一月庚辰司徒許敬免鮮卑寇朔方十二月乙卯宗正劉﨑為司徒是歲分會稽為吴都拘彌國遣使貢獻五年春正月疏勒王遣侍子及大宛莎車王皆奉使貢獻夏四月京師旱辛巳詔郡國貧人被災者勿收責今年過更京師及郡國十二蝗冬十月丙辰詔郡國中都官死罪繫囚皆減罪一等詣北地上郡安定戌乙亥定逺侯班始坐殺其妻隂城公主腰斬同産皆棄市六年春二月庚午河間王開薨三月辛亥復伊吾屯田復置伊吾司馬一人秋九月辛巳繕起大學䕶烏桓校尉耿曄遣兵擊鮮卑破之丁酉于闐王遣侍子貢獻冬十一月辛亥詔以連年災潦冀部尤甚其令本部勿收今年田租芻稾十二月日南徼外葉調國樿音檀國遣使貢獻壬申客星出牽牛于闐王遣侍子詣闕貢獻陽嘉元年春正月乙巳立皇后梁氏賜爵人二級三老孝悌力田三級爵過公乘得移與子若同産同產子民無名數及流民欲占著者人一級鰥寡孤獨篤癃貧不能自存者粟人五斛二月海賊曾旌等寇會稽殺句章鄞鄮三縣長攻會稽東部都尉詔縁海縣各屯兵戌丁巳皇后謁髙廟光武廟詔稟甘陵貧人大小口各有差京師旱庚申勅郡國二千石各禱名山嶽瀆遣大夫謁者詣嵩髙首陽山并祠河洛請雨戊辰雩以冀部比年水潦民食不贍詔案行稟貸勸農功賑乏絶甲戌詔以冬鮮宿雪春無澍雨遣侍中王輔等持節分詣岱山東海滎陽河洛盡心祈焉三月揚州六郡妖賊張河等寇四十九縣殺傷長吏庚寅帝臨辟雍饗射大赦天下改元陽嘉詔宗室絶屬籍者一切復籍稟冀州尤貧民勿收今年更租口賦夏五月戊寅阜陵王恢薨秋七月史官始作候風地動銅儀丙辰以太學新成試眀經下第者補弟子増甲乙科員各十人除郡國耆儒九十人補郎舍人九月詔郡國中都官繫囚皆減死一等亡命者贖各有差鮮卑寇遼東冬十一月甲申望都蒲隂狼殺女子九十七人詔賜狼所殺者錢人三千辛卯初令郡國舉孝亷限年四十以上諸生通章句文吏能牋奏乃得應選其有茂才異行若顔淵子竒不拘年齒十二月丁未東平王敞薨庚戌復置元菟郡屯田六郡閏月丁亥令諸以詔除郎年四十以上課試如孝亷科者得參亷選歳舉一人戊子客星出天苑辛卯詔曰間者選舉不實官非其人是以天心未得人情多怨書歌股肱詩刺三事今刺史二千石之選歸任三司其簡序先後情覈髙下歳月之次文武之宜務存厥衷庚子恭陵百丈廡災是歳起西苑修飾宮殿二年春二月甲申詔以吳郡會稽饑荒貸人種糧三月使匈奴中郎將王稠率左骨都侯等擊鮮卑破之辛酉除京師耆儒年六十以上四十八人補郎舍人及諸王國郎夏四月復置隴西南部都尉官己亥京師地震五月庚子詔羣公卿士其各悉心直言震動之咎靡有所諱戊午司空王龔免六月辛未太常魯國孔扶為司空疏勒國獻師子封牛丁丑洛陽地䧟是月旱秋七月己未太尉龎參免八月己巳大鴻臚沛國施延為太尉鮮卑寇代郡冬十月庚午行禮辟雍奏應鍾始復黃鍾作樂器隨月律三年春二月己丑詔以乆旱京師諸獄無輕重皆且勿考竟須得澍雨三月庚戌益州盜賊刼質令長殺列侯夏四月丙寅車師後部司馬率後部王加特奴等掩擊匈奴大破之獲其季母五月戊戌制詔罪已嘉與海内洗心更始其大赦天下自殊死以下謀反大逆諸犯不當得赦者皆赦除之賜民年八十以上米一斛肉二十斤酒五斗九十以上加賜帛人二匹絮三斤秋七月庚戌鍾羌寇隴西漢陽冬十月䕶羌校尉馬續擊破之十一月壬寅司徒劉﨑司空孔扶免乙巳大司農南郡黃尚為司徒光禄勲河東王卓為司空丙午武都塞上屯羌及外羌攻破屯官驅略人畜四年春二月丙子初聼中官得以養子為後世襲封爵自去冬旱至於是月謁者馬賢擊鍾羌大破之夏四月甲子太尉施延免戊寅執金吾梁商為大將軍前太尉龎參為太尉六月己未梁王匡薨秋七月己亥濟北王登薨閏月丁亥朔日有食之冬十月烏桓寇雲中十一月圍度遼將軍耿煜於蘭池發諸郡兵救之烏桓退走十二月甲寅京師地震永和元年春正月夫餘王来朝乙卯詔以典籍所忌震食為重今日變方逺地揺京師咎徵不虚必有所應羣公百僚其各上封事指陳得失靡有所諱己巳宗祀眀堂登雲臺改元永和大赦天下秋七月偃師蝗冬十月丁亥承福殿火帝避御雲臺十一月丙子太尉龎參罷十二月象林蠻夷叛乙巳以前司空王龔為太尉二年春正月武陵蠻叛圍充縣又寇夷道二月廣漢屬國都尉擊破白馬羌武陵太守李進擊叛蠻破之二月辛亥北海王翼薨乙卯司空王卓薨乙丑光禄勲馮翊郭䖍為司空夏四月丙申京師地震五月日南叛蠻攻郡府秋七月九真交阯二郡兵反八月庚子熒惑犯南斗江夏盜賊殺邾長冬十月甲申行幸長安所過鰥寡孤獨貧不能自存者賜粟人五斛庚子幸未央宫會三輔郡守都尉及官屬勞賜作樂十一月丙午祠髙廟丁未遂有事十一陵丁卯京師地震十二月乙亥至自長安三年春二月乙亥京師及金城隴西地震二郡山岸崩地䧟戊子太白犯熒惑夏四月九江賊蔡伯流寇郡界及廣陵殺江都長戊戌遣光禄大夫案行金城隴西賜壓死者年七歳以上錢人二千一家皆被害為收歛之除今年田租尤甚者勿收口賦閏月蔡伯流等率衆詣徐州刺史應志降己酉京師地震五月吴郡丞羊珍反攻郡府太守王衡破斬之六月辛丑琅邪王遵薨九真太守祝良交阯刺史張喬慰誘日南叛蠻降之嶺外平秋七月丙戌濟北王多薨八月己未司徒黄尚免九月己酉光禄勲長沙劉壽為司徒丙戌令大將軍三公各舉故刺史二千石及見令長郎謁者四府掾屬剛毅武猛有謀謨任將帥者各二人特進卿校尉各一人冬十月燒當羌寇金城䕶羌校尉馬賢擊破之羌遂相招而叛十二月戊戍朔日有食之四年春正月庚辰中常侍張逵蘧政楊定等有罪誅連及𢎞農太守張鳯安平相楊皓下獄死三月乙亥京師地震夏四月癸卯䕶羌校尉馬賢討燒當羌大破之戊午大赦天下賜民爵及粟帛各有差戊辰封故濟北惠王壽子安為濟北王秋八月太原郡旱民庶流冗癸丑遣光禄大夫案行稟貸除更賦冬十月戊午校獵上林苑歴函谷關而還十一月丙寅幸廣成苑五年春二月戊申京師地震夏四月庚子中山王𢎞薨南匈奴左部句龍大人吾斯車紐等叛圍美稷五月度遼將軍馬續討吾斯車紐破之使匈奴中郎將陳龜廹殺南單于己丑晦日有食之且凍羌寇三輔殺令長丁丑令死罪以下及亡命贖各有差九月令扶風漢陽築隴道塢三百所置屯兵辛未太尉王龔罷且凍羌寇武都燒隴關壬午太常桓焉為太尉丁亥徙西河郡居離石上郡居夏陽朔方居五原句龍吾斯等東引烏桓西收羌胡寇上郡立車紐為單于冬十一月辛巳遣使匈奴中郎將張耽擊破之車紐降六年春正月丙子征西將軍馬賢與且凍羌戰於射姑山賢軍敗沒安定太守郭璜下獄死詔貸王侯國租一嵗閏月鞏唐羌寇隴西遂及三輔二月丁巳有星孛於營室三月武都太守趙冲討鞏唐羌破之庚子司空郭䖍免丁巳河間王政薨丙午太僕趙戒為司空夏五月庚子齊王無忌薨使匈奴中郎將張耽大破烏桓羌胡於天山鞏唐羌寇北地秋七月甲午詔假民有貲者戶錢一千八月丙辰大將軍梁商薨壬戌河南尹梁冀為大將軍九月諸種羌寇武威辛亥晦日有食之冬十月癸丑徙安定居扶風北地居馮翊十一月庚子以執金吾張喬行車騎將軍事將兵屯三輔漢安元年春正月癸巳宗祀眀堂大赦天下改元漢安二月丙辰詔大將軍公卿舉賢良方正能探賾索隐者各一人秋七月始置承華廐八月南匈奴左部大人句龍吾斯與薁鞬臺耆等反叛丁卯遣侍中杜喬光禄大夫周舉守光禄大夫郭遵馮羡欒巴張綱周栩劉班等八人分行州郡班宣風化舉實臧否九月廣陵盜賊張嬰等寇郡縣冬十月辛未太尉桓焉司徒劉壽免甲戌行車騎將軍張喬罷十一月壬午司隸校尉趙峻為太尉大司農胡廣為司徒癸卯詔大將軍三公選武猛試用有效騐任為將校者各一人是歳廣陵賊張嬰等詣太守張綱降二年春二月丙辰鄯善國遣使貢獻夏四月庚戌䕶羌校尉趙冲與漢陽太守張貢撃燒當羌於參􅝂破之六月乙丑熒惑犯鎮星丙寅立南匈奴守義王兠樓儲為南單于冬十月辛丑令郡國中都官繋囚殊死以下出縑贖各有差其不能入贖者遣詣臨羌縣居作二歳甲辰減百官奉丙午禁酤酒又貸王侯國租一歳閏月趙冲撃燒當羌於河陽破之十一月使匈奴中郎將馬寔遣人刺殺句龍吾斯十二月揚徐盜賊攻燒城寺殺略吏民是歳􅈵州地百八十震建康元年春正月辛丑詔曰隴西漢陽張掖北地武威武都自去年正月已来地百八十震山谷坼裂壊敗城市殺害民庶夷狄叛逆賦役重數内外怨曠罹咎歎息其遣光禄大夫案行宣暢恩澤惠此下民勿為煩擾三月庚子沛王廣薨領䕶羌校尉衛琚追討叛羌破之南郡江夏盜賊寇掠城邑州郡討平之夏四月使匈奴中郎將馬寔撃南匈奴左部破之於是胡羌烏桓悉詣寔降辛巳立皇子炳為皇太子改元建康大赦天下賜人爵各有差秋七月丙午清河王延平薨八月揚徐盜賊范容周生等寇掠城邑遣御史中丞馮赦督州郡兵討之庚午帝崩於玉堂前殿時年三十遺詔無起寢廟歛以故服珠玉玩好皆不得下順帝永建六年陽嘉四年永和六年漢安二年建康一年即位十九年孝冲皇帝諱炳順帝之子也母曰虞貴人建康元年立為皇太子其年八月庚午即皇帝位年二歳尊皇后曰皇太后太后臨朝丁丑以太尉趙峻為太傅大司農李固為太尉參録尚書事九月丙午𦵏孝順皇帝於憲陵廟曰敬宗是日京師及太原鴈門地震三郡水涌土裂庚戌詔三公特進侯卿校尉舉賢良方正幽逸修道之士各一人百僚皆上封事己未九江太守邱騰有罪下獄死揚州刺史尹耀九江太守鄧顯討賊范容等於歴陽軍敗耀顯為賊所殁冬十月日南蠻夷攻燒城邑交阯刺史夏方招誘降之壬申常山王儀薨己卯零陵太守劉康坐殺無辜下獄死十一月九江盜賊徐鳯馬勉等稱無上將軍攻燒城邑己酉令郡國中都官繋囚減死一等徙邊謀反大逆不用此令十二月九江賊黃虎等攻合肥是歲羣盜發憲陵䕶羌校尉趙冲追撃叛羌於鸇陰河戰死永嘉元年春正月戊戌帝崩於玉堂前殿年三歲清河王蒜徵至京師冲帝永嘉一年孝質皇帝諱纘肅宗元孫曾祖父千乘貞王伉祖父樂安夷王寵父渤海孝王鴻母陳夫人冲帝不豫大將軍梁冀徵帝到洛陽都亭及冲帝崩皇太后與冀定策禁中丙辰使冀持節以王青蓋車迎帝入南宫丁巳封為建平侯其日即皇帝位年八歲己未𦵏孝冲皇帝於懐陵廣陵賊張嬰等復反攻殺堂邑江都長九江賊徐鳯等攻殺曲陽東城長甲申謁髙廟乙酉謁光武廟二月豫章太守虞續坐贓下獄死乙酉大赦天下賜人爵及粟帛各有差還王侯所削戶邑彭城王道薨叛羌詣左馮翊梁竝降三月九江賊馬勉稱皇帝九江都尉滕撫討馬勉范容周生大破斬之夏四月壬申雩庚辰濟北王安薨丹陽賊陸宫等圍城燒亭寺丹陽太守江漢撃破之五月甲午皇太后詔以自春涉夏大旱炎赫比日隂雲還復開霽將由二千石令長不崇寛和而為苛刻所致其令中都官繋囚罪非殊死考未竟者一切任出以須立秋郡國有名山大澤能興雲雨者二千石長吏各潔齋請禱竭誠盡禮又兵役連年死亡流離或支骸不歛或停棺莫收朕甚愍焉今遣使者案行若無家屬及貧無資者隨宜賜䘏以慰孤魂是月下邳人謝安應募撃徐鳯等斬之丙辰詔曰孝殤皇帝雖不永休祚而即位踰年君臣禮成孝安皇帝承襲統業而前世遂令恭陵在康陵之上先後相踰失其次序非所以奉祖宗之重垂無窮之制昔定公追正順祀春秋善之其令恭陵次康陵憲陵次恭陵以序親秩為萬世法六月鮮卑寇代郡秋七月庚寅阜陵王代薨廬江盜賊攻尋陽又攻盱台滕撫遣司馬王章撃破之九月戊戍太傅趙峻薨冬十一月己丑南陽太守韓昭坐贓下獄死丙午中郎將滕撫撃廣陵賊張嬰破之丁未中郎將趙序坐事棄市歴陽賊華孟自稱黑帝攻殺九江太守楊岑滕撫率諸將撃孟等大破斬之本初元年春正月丙申詔以方春東作育微敬始其勅有司罪非殊死且勿案騐以崇在寛壬子廣陵太守王喜坐討賊逗留下獄死二月庚辰詔曰九江廣陵二郡數離寇害殘夷尤甚生者失其資業死者委尸原野其調比郡見穀出稟窮弱收𦵏枯骸務加理䘏以稱朕意夏四月庚辰令郡國舉眀經年五十以上七十以下詣太學自大將軍至六百石皆遣子受業歳滿課試以髙第五人補郎中次五人太子舍人又千石六百石四府掾屬三署郎四姓小侯先能通經者各令隨家法其髙第者上名牒當以次賞進五月庚寅徙樂安王為渤海王海水溢戊申使謁者案行收葬樂安北海人為水所漂沒死者又禀給貧羸庚戌太白犯熒惑六月丁巳大赦天下賜民爵及粟帛各有差閏月甲申大將軍梁冀潛行鴆弑帝崩於玉堂前殿年九歳丁亥太尉李固免戊子司徒胡廣為太尉司空趙戒為司徒與梁冀參録尚書事太僕袁湯為司空質帝本初一年孝桓皇帝諱志肅宗曾孫也祖父河間孝王開父蠡吾侯翼母匽氏翼卒帝襲爵為侯本初元年梁太后徵帝到夏門亭將妻以女弟會質帝崩太后遂與兄大將軍冀定策禁中閏月庚寅使冀持節以王青葢車迎帝入南宫其日即皇帝位時年十五太后猶臨朝政秋七月乙卯𦵏孝質皇帝於静陵齊王喜薨辛巳謁髙廟光武廟丙戌詔曰孝亷亷吏皆當典城牧民禁姦舉善興化之本恒必由之今選舉乖錯害及元元深惟蠲滌貪穢以祈休祥其令秩滿百户十歲以上有殊才異行乃得參選贓吏子孫不得察舉杜絶邪偽請託之原令亷白守道者得信其操各眀守所司以觀厥後九月戊戌追尊皇祖河間孝王曰孝穆皇夫人趙氏曰孝穆皇后皇考蠡吾侯曰孝崇皇冬十月甲午尊皇母匽氏為孝崇博園夫人建和元年春正月辛亥朔日有食之詔三公九卿校尉各言得失戊午大赦天下賜吏更勞一歲男子爵人二級為父後及三老孝悌力田人二級鰥寡孤獨篤癃貧不能自存者粟人五斛貞婦帛人三匹灾害所傷什四以上勿收田租其不滿者以實除之二月荆揚二州人多餓死遣四府掾分行賑給沛國言黄龍見譙夏四月庚寅京師地震詔大將軍公卿校尉舉賢良方正能直言極諫者各一人又命列侯將大夫御史謁者千石六百石愽士議郎郎官各上封事指陳得失又詔大將軍公卿郡國舉至孝篤行之士各一人壬辰詔州郡不得廹脅驅逐長吏長吏贓滿三十萬而不糾舉者刺史二千石以縱避為罪若有擅相假印綬者與殺人同棄市論丙午詔郡國繋囚減死罪一等勿笞唯謀反大逆不用此書又詔曰比起陵塋彌歴時歲力役既廣徒隸尤勤頃雨澤不降密雲復散儻或在兹其令徒作陵者減刑咎六月是月立阜陵王代兄勃遒亭侯便為阜陵王郡國六地裂水涌井溢芝草生中黄藏府六月太尉胡廣罷太司農杜喬為太尉秋七月勃海王鴻薨立弟蠡吾侯悝為勃海王乙未立皇后梁氏九月丁卯京師地震太尉杜喬免冬十月司徒趙戒為太尉司空袁湯為司徒前太尉胡廣為司空十一月濟隂言有五色大鳥見于已氏戊午減天下死罪一等戌邊清河劉文反殺國相謝暠欲立清河王蒜為天子事覺伏誅蒜坐貶為尉氏侯徙桂陽自殺前太尉李固杜喬皆下獄死陳留盜賊李堅自稱皇帝伏誅二年春正月甲子皇帝加元服庚子大赦天下賜河間勃海二王黃金各百斤彭城諸國王各五十斤公主大將軍三公特進侯中二千石二千石將大夫郎吏從官四姓及梁鄧小侯諸夫人以下帛各有差年八十以上賜米酒肉九十以上加帛二匹綿三斤三月戊辰帝從皇太后幸大將軍梁冀府白馬羌寇廣漢屬國殺長吏益州刺史率板楯蠻討破之夏四月丙子封帝弟顧為平原王奉孝崇皇祀尊孝崇皇夫人馬氏為孝崇園貴人嘉禾生大司農帑藏五月癸丑北宫掖廷中德陽殿及左掖門火車駕移幸南宮六月改清河為甘陵立安平王得子經侯理為甘陵王秋七月京師大水河東生木連理冬十月長平陳景自號黃帝子署置官屬又南頓管伯亦稱真人並圖舉兵悉伏誅三年春三月甲申彭城王定薨夏四月丁卯晦日有蝕之五月乙亥詔以日食之故自永建元年迄於今歲凡諸妖惡支親從坐及吏民減死徙邉者悉歸本郡唯沒入者不從此令六月庚子詔大將軍三公特進侯其與校尉舉賢良方正能直言極諫之士各一人乙卯震憲陵寢屋秋七月庚申亷縣雨肉八月乙丑有星孛於天市京師大火九月己卯地震庚寅地又震詔死罪以下及亡者贖各有差郡國五山崩冬十月太尉趙戒免司徒袁湯為太尉大司農河内張歆為司徒十一月甲申詔曰朕攝政失中災眚連仍今京師厮舍死者相枕郡縣阡陌處處有之甚違周文掩胔之義其有家屬而貧無以𦵏者給直人三千喪主布三疋若無親屬可於官壖地𦵏之表識姓名為設祠祭又徒在作部疾病致醫藥死亡厚埋藏民有不能自振及流移者禀穀如科州郡檢察務崇恩施以康我民和平元年春正月甲子大赦天下改元和平己亥太后詔復政於皇帝二月扶風妖賊裴優自稱皇帝伏誅甲寅皇太后梁氏崩三月車駕徙幸北宮甲午𦵏順烈皇后夏五月庚辰尊愽園匽貴人曰孝崇皇后秋七月梓潼山崩冬十一月減天下死罪一等徙邊戍元嘉元年春正月京師疾疫使光禄大夫將醫藥案行癸酉大赦天下改元元嘉二月九江廬江大疫甲午河間王建薨夏四月己丑安平王得薨京師旱任城梁國飢民相食司徒張歆罷光禄勲吳雄為司徒秋七月武陵蠻叛冬十月司空胡廣罷十一月辛巳京師地震閏月庚午任城王崇薨太常黃瓊為司空二年春正月西域長史王敬為于闐國所殺丙辰京師地震夏四月甲寅孝崇皇后匽氏崩庚午常山王豹薨五月辛夘𦵏孝崇皇后於博陵秋七月庚辰日有食之八月濟隂言黃龍見句陽金城言黃龍見允街冬十月乙亥京師地震十一月司空黃瓊免十二月特進趙戒為司空右北平太守和旻坐贓下獄死永興元年春二月張掖言白鹿見三月丁亥幸鴻池夏五月丙申大赦天下改元永興丁酉濟南王廣薨無子國除秋七月郡國三十二蝗河水溢百姓飢窮流冗道路至有數十萬户冀州尤甚詔在所賑給乏絶安慰居業冬十月太尉袁湯免太常胡廣為太尉司徒吴雄罷司空趙戒免以太僕黃瓊為司徒光禄勲房植為司空十一月丁丑詔減天下死罪一等徙邊戌是歲武陵太守應奉招誘叛蠻降之二年春正月甲午大赦天下二月辛丑初聽刺史二千石行三年喪服癸卯京師地震詔公卿校尉舉賢良方正能直言極諫者各一人詔以灾異比見自今輿服制度有踰侈長飾者皆宜損省郡縣務存儉約申眀舊令如永平故事六月彭城泗水增長逆流詔司隸校尉部刺史曰蝗災為害水變仍至五穀不登人無宿儲其令所傷郡國種蕪菁以助人食京師蝗東海胊山崩九月丁卯朔日有食之詔曰朝政失中雲漢作旱郡縣當為飢餒者儲天下一家穀不糜爛則為國寳其令郡國不得賣酒祠祀裁足太尉胡廣免司徒黃瓊為太尉閏月光禄勲尹頌為司徒減天下死罪一等徙邊戌蜀郡李伯詐稱宗室當立為太初皇帝伏誅冬十月甲辰校獵上林苑遂至函谷關賜所過道傍年九十以上錢各有差泰山琅邪賊公孫舉等反叛殺長吏永壽元年春正月戊申大赦天下改元永壽二月司隸冀州飢人相食勅州郡賑給貧弱若王侯吏民有積穀者一切貸得十分之三以助稟貸其百姓吏民者以其見錢雇直王侯須新租乃償夏四月白烏見齊國六月洛水溢壊鴻徳苑南陽大水司空房植免太常韓縯為司空詔泰山琅邪遇賊者勿收租賦復更算三年又詔被水死流失屍骸者令郡縣鉤求收𦵏及所唐突壓溺物故七歳以上賜錢人二千壊敗廬舍亡失穀食尤貧者稟人二斛巴郡益州郡山崩秋七月初置泰山琅邪都尉官南匈奴左臺且渠伯德等叛寇美稷安定屬國都尉張奐討除之二年春正月初聽中官得行三年服二月甲申東海王臻薨三月蜀郡屬國夷叛秋七月鮮卑寇雲中泰山賊公孫舉等寇青兖徐三州遣中郎將叚熲討破斬之冬十一月置太官右監丞官十二月京師地震三年春正月己未大赦天下夏四月九真蠻夷叛太守兒式討之戰殁遣九真都尉魏朗撃破之復屯據日南閏月庚辰晦日有食之六月初以小黃門為守宫令置冗從右僕射官京師蝗秋七月河東地裂冬十一月司徒尹頌薨長沙蠻叛寇益陽司空韓縯為司徒太常北海孫朗為司空延熹元年春三月乙酉初置鴻徳苑令夏五月己酉大會公卿以下賞賜各有差甲戌晦日有食之京師蝗六月戊寅大赦天下改元延熹丙戌分中山置博陵郡以奉孝崇皇園陵大雩秋七月己巳雲陽地裂甲子太尉黃瓊免太常胡廣為太尉冬十月校獵廣成遂幸上林苑十二月鮮卑寇邊使匈奴中郎將張奐率南單于撃破之二年春二月鮮卑寇鴈門己亥阜陵王便薨蜀郡夷寇蠶陵殺縣令三月復斷刺史二千石行三年喪夏京師雨水六月鮮卑寇遼東秋七月初造顯陽苑置丞丙午皇后梁氏崩乙丑𦵏懿獻皇后於懿陵大將軍梁冀謀為亂八月丁丑帝御前殿詔司隸校尉張彪將兵圍冀第收大將軍印綬冀與妻皆自殺衛尉梁淑河南尹梁允屯騎校尉梁讓越騎校尉梁忠長水校尉梁㦸等及中外宗親數十人皆伏誅太尉胡廣坐免司徒韓縯司空孫朗下獄壬午立皇后鄧氏追廢懿陵為貴人冢詔曰梁冀奸㬥濁亂王室孝質皇帝聰敏早茂冀心懐忌畏私行殺毒永樂皇后親尊莫二冀又遏絶禁還京師使朕離母子之愛隔顧復之恩禍害深大罪釁日滋頼宗廟之靈及中常侍單超徐璜具瑗左悺唐衡尚書令尹勲等激憤建策内外協同漏刻之間桀逆梟夷斯誠社稷之祐臣下之力宜班慶賞以酬忠勲其封超等五人為縣侯勲等七人為亭侯於是舊故恩私多受封爵大司農黄瓊為太尉光禄大夫中山祝恬為司徒大鴻臚梁國盛允為司空初置祕書監官冬十月壬申行幸長安乙酉幸未央宫甲午祠髙廟十一月庚子遂有事十一陵壬寅中常侍單超為車騎將軍十二月己巳至自長安賜長安民粟人十斛園陵人五斛行所過縣三斛燒當等八種羌叛寇隴右䕶羌校尉叚熲追撃於羅亭破之天竺國来獻三年春正月丙申大赦天下丙午車騎將軍單超薨閏月燒當羌叛寇張掖䕶羌校尉叚熲追撃於積石大破之白馬令李雲坐直諫下獄死夏四月上郡言甘露降五月甲戌漢中山崩六月辛丑司徒祝恬薨秋七月司空盛允為司徒太常虞放為司空長沙蠻寇郡界九月泰山琅邪賊勞丙等復叛寇掠百姓遣御史中丞趙某持節督州郡討之丁亥詔無事之官權絶奉豐年如故冬十一月日南蠻賊率衆詣郡降勒姐羌圍允街叚熲撃破之泰山賊叔孫無忌攻殺都尉侯章十二月遣中郎將宋資討破之武陵蠻寇江陵車騎將軍馮緄討之皆降散荆州刺史度尚討長沙蠻平之四年春正月辛酉南宫嘉徳殿火戊子丙署火大疫三月壬辰武庫火司徒盛允免大司農种暠為司徒三月省冗從右僕射官太尉黃瓊免夏四月太常劉矩為太尉甲寅封河間王開子博為任城王五月辛酉有星孛於心丁卯原陵長壽門火己卯京師雨雹六月京兆扶風及涼州地震庚子岱山及博尤来山並頽裂己酉大赦天下司空虞放免前太尉黃瓊為司空犍為屬國夷寇鈔百姓益州刺史山昱撃破之零吾羌與先零諸種並叛寇三輔秋七月京師雩減公卿以下奉貸王侯半租占賣關内侯虎賁羽林緹騎營士五大夫錢各有差九月司空黃瓊免大鴻臚劉寵為司空冬十月天竺國来獻南陽黃武與襄城惠得昆陽樂季訞言相署皆伏誅先零沈氐羌與諸種羌寇并涼二州十一月中郎將皇甫規撃破之十二月夫餘王遣使来獻五年春正月省太官右監丞壬午南宫丙署火三月沈氐羌寇張掖酒泉壬午濟北王次薨夏四月長沙賊起寇桂陽蒼梧驚馬逸象突入宫殿乙丑恭陵東闕火戊辰虎賁掖門火己巳太學西門自壊五月康陵園寢火長沙零陵賊起攻桂陽蒼梧南海交阯遣御史中丞盛脩督州郡討之不克乙亥京