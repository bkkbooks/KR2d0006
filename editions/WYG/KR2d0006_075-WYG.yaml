  text: 通志卷七十宋右廸功郎鄭樵漁仲撰藝文略第八别集四後魏北齊後周陳隋唐後魏孝文帝集四十卷司空髙允集二十卷司農卿李諧集十卷太常卿盧元明集十七卷司空祭酒袁躍集十三卷著作佐郎韓顯宗集十卷散騎常侍温子昇集三十九卷太常卿陽固集三卷薛孝通集六卷宗欽集二卷魏孝景集一卷右後魏十一部一百六十一卷北齊特進邢子才集三十卷尚書僕射魏收集七十卷儀同劉逖集二十六卷陽休之集三十卷右北齊四部一百五十六卷後周明帝集五十卷趙平王集十卷滕簡王集十二卷儀同宗懔集十二卷沙門釋忘名集十卷小司空王襃集二十一卷少傅蕭撝集十卷開府儀同庾信集二十一卷又略集三卷王衡集三卷右後周十部一百五十二卷陳後主集五十五卷後主沈后集十卷大匠卿杜之偉集十二卷金紫光禄大夫周𢎞讓集九卷周𢎞讓後集十二卷侍中洗炯前集七卷沈炯後集十三卷尚書僕射周𢎞正集二十卷鎮南府司馬隂鏗集一卷左衛将軍顧野王集十九卷尚書左僕射徐陵集三十卷右衛將軍張式集十四卷度支郎張正見集十四卷司農卿陸琰集二卷少府卿陸玢集十卷光禄卿陸瑜集十一卷䕶軍將軍蔡景厯集五卷御史中丞褚玠集十卷安右府諮議司馬君卿集二卷著作佐郎張仲簡集一卷沙門釋標集二卷釋洪偃集八卷釋靈裕集四卷釋瑗集六卷策上人集五十卷釋髙集六卷右陳二十六部三百三十三卷隋煬帝集五十五卷王祐集一卷武陽太守盧思道集三十卷金州刺史李元操集十卷蜀王府記室辛徳源集三十卷太尉楊素集十卷懐州刺史李徳林集十卷吏部尚書牛𢎞集十二卷司𨽻大夫薛道衡集三十卷國子祭酒何妥集十卷秘書監栁􅈯集五卷開府江總集三十卷江總後集二卷記室參軍蕭慤集九卷著作郎諸葛頴集十四卷著作郎魏彦深集三卷著作郎王胄集十卷殷英童集三十卷尹式集五卷虞茂世集五卷劉興宗集三卷李播集三卷道士江旻集三十卷劉子政母祖氏集九卷右隋二十四部三百五十六卷唐太宗集四十卷髙宗集八十六卷中宗集四十卷睿宗集十卷武后垂拱集一百卷武后金輪集十卷陳叔達集十五卷竇威集十卷褚亮集二十卷虞世南集三十卷蕭瑀集一卷沈齊家集十卷薛收集十卷楊師道集十卷庾抱集十卷孔頴達集五卷王勣集五卷郎楚之集五卷魏徵集二十卷許敬宗集八十卷于志寧集四十卷上官儀集三十卷李義府集四十卷顔師古集六十卷岑文本集六十卷劉子翼集二十卷殷聞禮集一卷陸士季集十卷劉孝孫集三十卷鄭世翼集八卷崔君實集十卷李百藥集三十卷孔紹安集五十卷髙季輔集二十卷温彦博集二十卷李元道集十卷謝偃集十卷沈叔安集二十卷陸楷集十卷曹憲集三十卷蕭徳言集二十卷潘求仁集三卷殷芊集三卷蕭鈞集三十卷袁朗集十四卷楊續集十卷王約集一卷任希古集十卷凌敬集十四卷王徳儉集十卷徐孝徳集十卷杜之松集十卷宋令文集十卷陳子良集十卷顔顗集十卷劉潁集十卷司馬僉集十卷鄭秀集十二卷耿義襃集七卷楊元亨集五卷劉綱集三卷王歸一集十卷馬周集十卷薛元超集三十卷髙智周集五卷褚遂良集二十卷劉褘之集七十卷郝處俊集十卷崔知悌集五卷李安期集二十卷唐覲集五卷張大素集十五卷鄧元挺集十卷劉允濟集二十卷駱賔王集十卷盧照隣集二十卷幽憂子集三卷盧照隣撰楊炯盈川集三十卷王勃集三十卷狄仁傑集十卷李懐逺集八卷盧受采集二十卷王適集二十卷喬知之集二十卷蘇味道集十五卷薛耀集二十卷郎餘慶集十卷盧光容集二十卷崔融集六十卷閻鏡機集十卷李嶠集五十卷喬備集六卷陳子昻集十卷元希聲集十卷李適集十卷沈佺期集十卷徐彦伯前後集二十卷宋之問集十卷杜審言集十卷谷倚集十卷富嘉謨集十卷吴少微集十卷劉希夷集十卷張柬之集十卷桓彦範集三卷韋承慶集六十卷閭邱鈞集二十卷郭元振集二十卷魏知古集二十卷閻朝隱集五卷蘇瓌集十卷員半千集十卷李乂集五卷姚崇集十卷邱悦集十卷劉子元集三十卷盧藏用集三十卷明皇集卷亡徳宗集卷亡濮王㤗集二十卷上官昭容集二十卷令狐徳棻集三十卷許彦伯集十卷劉洎集十卷来濟集三十卷杜正倫集十卷李敬元集三十卷裴行儉集二十卷崔行功集六十卷張文琮集二十卷麴崇裕集二十卷劉憲集三十卷薛稷集三十卷宋璟集十卷蔣儼集五卷趙宏智集二十卷賀徳仁集二十卷許子儒集十卷蔡允恭集二十卷張昌齡集二十卷杜易簡集二十卷顔元孫集三十卷姚璹集七卷杜元志集十卷楊仲昌集十五卷崔液集十卷裴耀卿纂張説集三十卷又燕公外集一卷蘇頲集三十卷徐堅集三十卷元海集十卷李邕集七十卷王澣集十卷張九齡集二十卷康國安集十卷孫逖集二十卷趙冬曦集卷亡毛欽一集三卷王助雕蟲集一卷王維集十卷康希銑集二十卷張均集二十卷權若訥集十卷白履忠集十卷鮮于向集十卷許渾丁卯集二卷康元辯集十卷崔國輔集卷亡嚴從集三卷從卒詔求其藁呂向集而進焉髙適集二十卷陶翰集卷亡崔輔國集賈至集二十卷又别集十五卷蘇冕編張孝嵩集十卷儲光羲集七十卷蘇源明前集二十卷李白草堂集二十卷李陽氷録又度北門集一卷杜甫集六十卷小集六卷潤州刺史樊晃集岑參集十卷盧象集十二卷蕭頴士游梁新集三卷又集十卷李華前集十卷中集二十卷李翰前集三十卷王昌齡集五卷元結文編十卷邵説集十卷裴倩集五卷裴均父又湓城集五卷劉彚集三卷樊澤集十卷崔良佐集十卷楊賁集十五卷劉逈集五卷武就集五卷元衡父于休烈集十卷元載集十卷張薦集三十