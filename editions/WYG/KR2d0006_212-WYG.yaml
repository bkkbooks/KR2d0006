body:
  text: 通志卷一百八十八宋右廸功郎鄭樵漁仲撰載記第三前燕慕容廆皝儁暐裴嶷髙瞻慕容翰陽裕韓恒李産子績慕容恪陽騖皇甫真慕容廆字奕洛瓌昌黎棘城鮮卑人也其先有熊氏之苖裔世居北夷邑於紫蒙之野號曰東胡其後與匈奴並盛控弦之士二十餘萬風俗官號與匈奴畧同秦漢之際為匈奴所敗分保鮮卑山因以為號曽祖莫䕶跋魏初率其諸部入居遼西從司馬懿伐公孫氏有功拜率義王始建國於棘城之北時燕代多冠歩搖冠莫䕶跋見而好之乃斂髮襲冠諸歩因呼之為歩搖其後音訛遂為慕容焉或云慕二儀之徳繼三光之容遂以慕容為氏祖木延左賢王父渉歸以全栁城之功進拜鮮卑單于遷邑於遼東北於是漸慕諸夏之風矣廆㓜而魁岸羙姿貌身長八尺雄傑有大度安北将軍張華稚有知人之鑒廆童冠時徃謁華甚歎異謂曰君至長必為命世之器匡難濟時者也因以所服簪幘遺廆結殷勤而别渉歸死其弟耐簒位将謀殺廆廆亡􅅗以避禍後國人殺耐迎廆立之初渉歸有憾於宇文鮮卑廆将脩先君之怨表請討之武帝弗許廆怒入㓂遼西殺略甚衆帝遣幽州諸軍討廆戰於肥如廆衆大敗自後復掠昌黎毎嵗不絶又率衆東伐扶餘扶餘王依慮自殺廆夷其國城驅萬餘人而歸東夷校尉何龕遣督䕶賈沉将迎立依慮之子為王廆遣其将孫丁率騎邀之沉力戰斬丁遂復扶餘之國廆謀於其衆曰吾先公以來世奉中國且華裔理殊強弱固别豈能與晋競乎何為不和以害吾百姓邪乃遣使來降帝嘉之拜為鮮卑都督廆致敬於東夷府巾衣詣門抗士大夫之禮何龕嚴兵引見廆乃改服戎衣而入人問其故廆曰主人不以禮賓復何為哉龕聞而慚之彌加敬憚時東胡宇文鮮卑叚部以廆威徳日廣懼有吞併之計因為㓂掠徃來不絶廆卑辭厚幣以撫之太康十年廆又遷干徒河之青山廆以大棘城即帝顓頊之墟也元康四年乃移居之教以農桑法制同於上國永寜中燕垂大水廆開倉振給幽方獲濟天子聞而嘉之褒賜命服太安初宇文莫圭遣弟屈雲㓂邉城雲别帥大素延攻掠諸部廆親擊敗之素延怒率衆十萬圍棘城衆咸懼人無距志廆曰素延雖犬羊蟻聚然軍無法制已在吾計矣諸君但為力戰無所憂也乃躬貫甲胄馳出擊之素延大敗追奔百里俘斬萬餘人永嘉初廆自稱鮮卑大單于遼東太守龎本以私憾殺東夷校尉李臻附塞鮮卑素連木津䓁託為臻報讐實欲因而為亂遂攻䧟諸縣殺掠士庻太守袁謙頻戰失利校尉封釋懼而請和連嵗㓂掠百姓失業流亡歸附者日月相繼廆子翰言於廆曰求諸侯莫如勤王自古有為之君靡不仗此以成事業者也今連津跋扈王師覆敗蒼生屠膾豈甚此乎豎子外以龎本為名内實幸而為㓂封使君以誅本請和而毒害滋深遼東傾沒垂已二周中原兵亂州師屢敗勤王仗義今其時也單于冝明九伐之威救倒懸之命數連津之罪合義兵以誅之上則興復遼邦下則并吞二部忠義彰於本朝私利歸於我國此則吾鴻漸之始也終可以得志於諸侯廆從之是日率騎討連津大敗斬之二部悉降徙之棘城立遼東郡而歸懐帝䝉塵于平陽王浚承制以廆為散騎常侍冠軍将軍前鋒大都督大單于廆不受建興中愍帝遣使拜廆鎮軍将軍昌黎遼東二國公建武初元帝承制拜廆假莭散騎常侍都督遼左雜夷流人諸軍事龍驤将軍大單于昌黎公廆讓而不受征虜将軍魯昌說廆曰今两京傾沒天子蒙塵琅邪承制江東實人命所繫眀公雄據海朔跨總一方而諸部猶怙衆稱兵未遵道化者盖以官非王命又自以為彊今宜通使琅邪勸承大統然後敷宣帝命以伐有罪誰敢不從廆善之乃遣其長史王濟浮海勸進及帝即尊位遣謁者陶遼重申前命授廆将軍單于廆固辭公封時二京傾覆幽兾淪陷廆刑政脩眀虚懐引納流亡士庻多襁負歸之廆乃立郡以統流人兾州人為冀陽郡豫州人為成周郡青州人為營邱郡并州人為唐國郡於是推舉賢才委以庻政以河東裴嶷代郡魯昌北平陽耽為謀主北海逄羡廣平游䆳北平西方䖍渤海封抽西河宋奭河東裴開為股肱渤海封奕平原宋該安定皇甫岌蘭陵繆愷以文章才儁任居樞要㑹稽朱左車泰山胡母翼魯國孔纂以舊徳清重引為賓友平原劉讚儒學該通引為東庠祭酒其世子皝率國胄束脩受業焉廆覽政之暇親臨聴之於是路有頌聲禮讓興矣時平州刺史東夷校尉崔毖自以為南州士望意存懐集而流亡者莫有赴之毖意廆拘留乃隂結髙句驪及宇文叚國䓁謀滅廆以分其地太興初三國伐廆廆曰彼信崔毖虚說邀一時之利烏合而來耳既無統一莫相歸伏吾今破之必矣然彼軍初合其鋒甚銳幸我速戰若逆擊之落其計矣靖以待之必懐疑貳迭相猜防一則疑吾與毖譎而覆之二則自疑三國之中與吾有韓魏之謀者待其人情沮惑然後取之必矣於是三國攻棘城廆閉門不戰遣使送牛酒以犒宇文大言於衆曰崔毖昨有使至於是二國果疑宇文同於廆也引兵而歸宇文悉獨官曰二國雖歸吾當獨兼其國何用人為盡衆逼城連營三十里廆簡銳士配皝推鋒於前翰頒精騎為竒兵從旁出直衝其營廆方陣而進悉獨官自恃其衆不設備見廆軍之至方率兵距之前鋒始交翰已入其營縱火焚之其衆皆震擾不知所為遂大敗悉獨官僅以身免盡俘其衆於其營候獲皇帝玉璽三紐遣長史裴嶷送于建鄴崔毖懼廆之仇已也使兄子燾偽賀廆會三國使亦至請和曰非我本意崔平州教我耳廆将燾示以攻圍之處臨之以兵曰汝叔父教二國滅我何以詐來賀我乎燾懼首服廆乃遣燾歸說毖曰降者上策走者下策也以兵随之毖與數十騎棄家室奔於髙句麗廆悉降其衆徙燾及髙瞻䓁于棘城待以賓禮眀年髙句麗㓂遼東廆遣衆擊敗之裴嶷至自建鄴帝遣使者拜廆監㔻州諸軍事安北将軍㔻州刺史増邑二千户尋加使持莭都督幽州東夷諸軍事車騎将軍㔻州牧進封遼東郡公邑一萬户常侍單于並如故丹書鐵劵承制海東命備官司置㔻州守宰叚末波初統其國而不脩備廆遣皝襲之入令支收其名馬寳物而還石勒遣使通和廆距之送其使於建鄴勒怒遣宇文乞得龜擊廆廆遣皝距之以裴嶷為右部都督率索頭為右翼命其少子仁自平郭趣伯林為左翼攻乞得龜克之悉虜其衆乗勝㧞其國城收其資用億計徙其人數萬户以歸成帝即位加廆侍中位特進咸和五年又加開府儀同三司固辭不受廆甞從容言曰獄者人命之所懸也不可以不慎賢人君子國家之基也不可以不敬稼穡者國之本也不可以不急酒色便佞亂徳之甚也不可以不戒乃著家令數千言以申其旨遣使與太尉陶侃箋申布忠懇詞㫖可觀使者遭風沒海其後廆更寫前箋并齎其東夷校尉封抽行遼東相韓矯䓁三十餘人䟽上侃府欲進廆為燕王行大将軍事侃報抽䓁書其略曰車騎将軍憂國忘身貢篚載路羯賊求和執使送之西討叚國北伐塞外逺綏索頭荒服以獻惟北部未賓屢遣征伐又知東方官號髙下齊班進無統攝之權退無等差之降欲進車騎為燕王一二具之夫功成進爵古之成制也車騎雖未能為官摧勒然忠義竭誠今騰牋上聽可不遲速當任天臺也朝議未定八年廆卒乃止時年六十五在位四十九年帝遣使者策贈大将軍開府儀同三司諡曰㐮及儁僭號偽諡武宣皇帝慕容皝字元真廆第三子也龍顔版齒身長七尺八寸雄毅多權畧尚經術逹天文廆為遼東公立為世子建武初拜為冠軍将軍左賢王封望平侯率衆征討累有功太寕末拜平北将軍進封朝鮮公廆卒嗣位以平北將軍行㔻州刺史督攝部内尋而宇文乞得龜為别部逸豆歸所逐奔死于外皝率騎討之逸豆歸懼而請和遂築榆隂安晋二城而還初皝庻兄建威翰驍武有雄才素為皝所忌母弟征虜仁廣武昭並有寵於廆皝亦不平之及廆卒並懼不自容至此翰出奔叚遼仁勸昭舉兵廢皝皝殺昭遣使按檢仁之虚實遇仁於險瀆仁知事發殺皝使東歸平郭皝遣其弟建武幼司馬佟夀䓁討之仁盡衆距戰㓜等大敗皆沒於仁㐮平令王冰将軍孫機以遼東叛于皝東夷校尉封抽䕶軍乙逸遼東相韓矯元莬太守髙詡䓁棄城奔還仁於是盡有遼左之地自稱車騎将軍平州刺史遼東公宇文歸叚遼及鮮卑諸部並為之援咸和九年皝遣其司馬封奕攻鮮卑木堤于白狼揚威淑虞攻烏丸悉羅侯於㔻堈皆斬之材官劉佩攻乙連不克叚遼遂㓂徒河皝将張萌逆擊敗之遼弟蘭與翰㓂栁城都尉石琮擊敗之旬餘蘭翰復圍栁城皝遣寕逺慕容汗及封奕䓁救之皝戒汗曰賊衆氣銳難與争鋒冝頋萬全慎勿輕進必湏兵集陣整然後擊之汗性驍銳遣千餘騎為前鋒而進封奕止之汗不從為蘭所敗死者大半蘭復攻栁城為飛梯地道圍守二旬石琮躬勒将士出擊敗之斬首千五百級蘭乃遁歸是嵗成帝遣謁者徐孟閭邱幸䓁持莭拜皝鎮軍大将軍㔻州刺史大單于遼東公持莭都督承制封拜一如廆故事皝自征遼東克襄㔻仁所署居就令劉程以城降新昌人張衡執縣宰以降於是斬仁所置守宰分徙遼東大姓於棘城置和陽武次西樂三縣而歸咸康初遣封奕襲宇文别部渉奕于大獲而還渉奕于率騎追戰於渾水又敗之皝将乗海討仁羣下咸諫以海道危阻宜從陸路皝曰舊海水無凌自仁反已來凍合者三矣昔漢光武因滹沲之氷以濟大業天其或者欲吾乗此而克之乎吾計决矣有沮謀者斬乃率三軍從昌黎踐淩而徃仁不虞皝之至也軍去平郭七里候騎乃告仁狼狽出戰為皝所擒振旅而還立籍田於朝陽門東置官司以主之叚遼遣其将李詠夜襲興國遇雨引還都尉張萌追擊擒詠叚蘭擁衆數萬屯于曲水亭将攻栁城宇文歸入㓂安晉為蘭聲援皝以歩騎五萬擊之師次栁城蘭歸皆遁遣封奕率輕騎追擊敗之收其軍實館穀二旬而還謂諸将曰二虜恥無功而歸必復重至冝於栁城左右設伏以待之遣封奕率騎􅇓于馬兠山諸道俄而遼騎果至奕夾擊大敗之斬其将榮保遣兼長史劉斌郎中令陽景送徐孟䓁歸于京師使其世子儁伐叚遼諸城封奕攻宇文别部皆大㨗而歸立納諫之木以開讜言之路後徙昌黎郡築好城於乙連東使将軍蘭勃戍之以逼乙連又城曲水以為勃援乙連饑甚叚遼輸之粟蘭勃要擊獲之遼遣将屈雲攻興國與皝将慕容遵大戰於五官水上雲敗斬之盡俘其衆封奕䓁以皝任重位輕冝稱燕王皝於是以咸康三年僭即王位赦其境内以封奕為國相韓夀為司馬裴開陽騖王㝢李洪杜羣宋該劉瞻石琮皇甫真陽恊宋晃平熈張泓䓁並為列卿将帥起文昌殿乗金根車駕六馬出入稱警蹕以其妻叚氏為王后世子儁為太子皆如魏武晋文輔政故事皝以叚遼屢為邉患遣将軍宋回稱藩于石虎請師討遼虎於是總衆而至皝率諸軍攻遼令支以北諸城遼遣其将叚蘭来距大戰敗之斬級數千掠五千餘戸而歸虎至徐無遼奔密雲山虎進入令支怒皝之不㑹師也進軍擊之至于棘城戎卒數十萬四面進攻郡縣諸部叛應虎者三十六城相持旬餘左右勸皝降皝曰吾方取天下何乃降人乎遣子恪䓁率騎二千晨出擊之虎諸軍驚擾棄甲而遁恪乗勝追之斬獲三萬餘級築戍凡城而還叚遼遣使詐降於石虎請兵應接虎遣其将麻秋率衆迎遼恪伏精騎七千於密雲山大敗之獲其司馬陽裕将軍單于亮擁叚遼及其部衆以歸帝又遣使拜為征北大将軍幽州牧領平州刺史加散騎常侍増邑萬戸持莭都督單于公如故皝前軍帥慕容評敗虎将石成等于遼西斬其将呼延晃張支掠千餘戸以歸叚遼謀叛皝誅之虎又使石成入攻凡城不克進䧟廣城皝雖稱燕王未有朝命乃遣其長史劉祥獻㨗京師兼言權假之意并請大舉討平中原又聞庾亮薨弟冰翼皆為将相乃表言不冝崇顕舅氏又與氷書戒以負乗之累氷見表及書甚懼以其甚逺非所能制遂與何充䓁奏聴皝稱燕王其年皝伐髙句麗王釗乞盟而還眀年釗遣其世子朝於皝初叚遼之敗也建威翰奔于宇文歸自以威名夙振終不保全乃陽狂恣酒被髮歌呼歸信而不禁故得周游自任至於山川形便攻戰要路莫不練之皝遣商人王車隂使察翰翰見車無言撫膺而已車還以白皝曰翰欲來也乃遣車遺翰弓矢翰乃竊歸駿馬携其二子而還皝将圖石氏從容謂諸将曰石虎自以安樂諸城守防嚴重城之南北必不設備今若詭路出其不意冀之北土盡可破也於是率騎二萬出蠮螉塞長驅至於薊城進渡武遂津入於髙陽所過焚燒積聚掠徙幽冀三萬餘戸使陽裕唐柱䓁築龍城構宫廟改栁城為龍城縣於是成帝使兼大鴻臚郭希持莭拜皝侍中大都督河北諸軍事大将軍燕王其餘官皆如故封諸功臣百餘人咸康七年皝遷都龍城率勁卒四萬入自南陕以伐宇文髙句麗又使翰及子垂為前鋒遣長史王㝢䓁勒衆萬五千從北置而進髙句麗王釗謂皝軍之從北路也乃遣其弟武統精銳五萬攻北置躬率弱卒以防南陕翰與釗戰於木底大敗之乗勝遂入丸都釗單馬而遁皝掘釗父利墓載其尸并其母妻珍寳掠男女五萬餘口焚其宫室毁丸都而歸明年釗遣使稱臣於皝貢其方物乃歸其父尸宇文歸遣其國相莫淺渾伐皝諸将請戰皝不許渾以皝為憚之荒酒縱獵不復設備皝曰渾奢怠已甚今則可一戰矣遣翰率騎擊之渾大敗僅以身免盡俘其衆皝躬廵郡縣勸課農桑起龍城宫闕尋又率騎二萬親伐宇文歸以翰及垂為前鋒歸使其驍将渉奕于盡衆距翰皝急遣謂翰曰奕于雄悍冝小避之待虜勢驕然後取也翰曰歸之精銳盡在於此今若克之歸則不勞兵而滅奕于徒有虚名其實易與耳不宜縱敵挫吾兵氣於是前戰斬奕于盡俘其衆歸逺遁漠北皝開地千餘里徙其部人五萬餘落於昌黎改渉奕于城為威徳城行飲至之禮論功行賞各有差以牧牛給貧家田于苑中公收其八二分入私有牛而無地者亦田苑中公收其七三分入私皝記室參軍封裕入諌以為宜省罷諸苑以業流人人至而無資産者賜之以牧牛且魏晋雖道消之世猶削取百姓不至於七八持官牛者官得六分百姓得四分私牛而官田者與官中分百姓安之人皆恱樂臣猶曰非明王之道而况増於此者乎又水旱之厄堯湯所不免王者冝濬治溝澮循鄭白西門史起溉灌之法旱則決溝為雨水則入於溝凟上無雲漢之憂下無昬墊之患句麗百濟及宇文叚部之人皆兵勢所徙非如中國慕義而至咸有思歸之心今戸垂十萬狭湊都城恐方将為國家深害宜分其兄弟宗属徙於西境諸城撫之以恩檢之以法使不得散在居人知國之虚實今中原未平資産未廣官司猥多㳺食者衆一夫不耕嵗受其飢政之巨患莫甚於此其有經畧出世才稱時求者自可随湏置之列位非此已徃其耕而食蠺而衣亦天之道也殿下聖性寛明思言若渴前者參軍王憲大夫劉眀並竭忠獻欵主者責以妖妄致之於法雖殿下苞容恕其大辟然猶加黜削禁錮以此求言豈有得邪又四業者國之所資教學者有國盛事習戰務農尤其本也百工商賈猶其末耳冝量軍國所湏置其員數已外歸之於農教之戰法學者三年無成亦宜還之於農不可徒充大貟以塞聪儁之路皝覽諌乃下令曰君以黎元為國黎元以榖為命然則農者國之本也其悉罷苑囿以給百姓無田業者全無資産不能自存各賜牧牛一頭若私有餘力樂取官牛墾官田者其依魏晋舊法溝洫溉灌有益官私主者量造務盡水陸之勢中州未平兵難不息勲誠既多官僚不可以減也待克平㐫醜徐更議之百工商賈數四佐與列将速定大員餘者還農學生不任訓教者亦除員錄夫人臣闗言於人主至難也妖妄不經之事皆應蕩然不問擇其善者而從之王憲劉明雖其罪應禁黜亦猶孤之無大量也可悉復本官仍居諫司封生蹇蹇深得王臣之體詩不云乎無言不酬其賜錢五萬明宣内外有欲陳孤過者不拘貴賤勿有所諱時有黒龍白龍各一見于龍山皝親率羣僚觀之去龍二百餘歩祭以太牢二龍交首嬉翔觧角而去皝大恱還宫赦其境内號新宫曰和龍立龍翔佛寺於山中賜其大臣子弟為官學生者號髙門生立東庠於舊宫以行鄉射之禮毎月臨觀考試優劣皝雅好文籍勤於講授學徒甚盛至千餘人親造太上章以代急就又著典誡十五篇以教胄子慕容恪攻髙句麗南蘇克之置戍而還三年遣其世子儁與恪率騎萬七千東襲扶餘克之虜其王及部衆五萬餘口以還皝親臨東庠考試學生其經通秀異者擢充近侍以久旱丐百姓田租罷成周冀陽營邱䓁郡以渤海人為興集縣河間人為寕集縣廣㔻魏郡人為興平縣東萊北海人為育黎縣吴人為吴縣悉𨽻燕國皝甞畋於西鄙将濟河見一父老服朱衣乗白馬舉手麾皝曰此非獵所王其還也祕之不言遂濟河連日大獲後見白兎馳射之馬倒被傷乃說所見輦而還宫引儁属以後事以永和四年死在位十五年時年五十二儁僭號􅇷諡文明皇帝慕容儁字宣英皝之第二子也初廆常言吾積福累仁子孫當有中原既而生儁廆曰此􅅜骨相不恒吾家得之矣及長身長八尺二寸姿貌魁偉博觀圗書有文武幹畧皝為燕王拜儁假莭安北将軍東夷校尉左賢王燕王世子皝死永和五年僭即燕王位依春秋列國故事稱元年赦於境内是時石虎死趙魏大亂儁将圖兼并之計以慕容恪為輔國將軍慕容評為輔弼将軍陽騖為輔義将軍慕容垂為前鋒都督建鋒将軍簡精卒二十餘萬以待期是嵗穆帝使謁者陳沉拜儁為使持莭侍中大都督都督河北諸軍事幽冀并㔻四州牧大将軍大單于燕王承制封拜一如廆皝故事明年儁率三軍南伐出自盧龍次於無終石虎幽州刺史王午棄城走留其将王他守薊儁攻陷其城斬他因而都之徙廣寗上谷人於徐無代郡人于凡城而還及冉閔殺石祗僭稱大號遣其使人常煒聘於儁儁引之觀下使其記室封裕詰之曰冉閔養息常才負恩簒逆有何祥應而僭稱大號煒曰天之所興其致不同狼烏紀於三王麟龍表於漢魏寡君應天馭厯能無祥乎且用兵殺罰哲王盛典湯武親行誅放而仲尼羙之魏武養於宦官莫知所出衆不盈旅遂能終成大功暴胡酷亂蒼生屠膾寡君奮劍而誅除之黎元獲濟可謂功格皇天勲侔髙祖恭承乾命有何不可裕曰石祗去嵗使張舉請救云璽在㐮國其言信不又聞閔鑄金為己象壊而不成奈何言有天命煒曰誅胡之日在鄴者略無所遺璽何從而向襄國此求救之辭耳天之神璽實在寡君且妖孽之徒欲假竒眩衆或改作萬端以神其事寡君今已握乾苻類上帝四海懸諸掌大業集於身何所求慮而取信此乎鑄形之事所未聞也儁既銳信舉言又欣於閔鑄形之不成也必欲審之乃積薪置火於其側命裕䓁以意喻之煒神色自若抗言曰結髪已來尚不欺庸人况千乗乎巧詐虚言以救死者使臣所不為也直道受戮死自分耳益薪速火君之大恵左右勸儁殺之儁曰古者兵交使在其間此亦人臣常事遂赦之遣慕容恪略地中山慕容評攻王午於魯口恪次唐城冉閔将白同中山太守侯龕固守不下恪留其将慕容彪攻之進討常山評次南安王午遣其将鄭生距評評逆擊斬之侯龕踰城出降恪進克中山斬白同儁軍令嚴明諸将無所犯閔章武太守賈堅率郡兵邀評戰于髙城擒堅於陣斬首三千餘級是嵗丁零翟䑕及冉閔将劉凖䓁率其所部降于儁封䑕歸義王拜凖左司馬時鮮卑叚勤初附於儁其後復叛儁遣慕容恪及相國封奕討冉閔于安喜慕容垂討叚勤于繹幕儁如中山為二軍聲勢閔懼奔於常山恪追及於𣲖水閔威名素振衆咸憚之恪謂諸將曰閔師老卒疲實為難用加其勇而無謀一夫之敵耳雖有甲兵不足擊也吾今分軍為三部犄角以待之閔性輕銳又知吾軍勢非其敵必出萬死衝吾中軍吾今貫甲厚陣以俟其至諸君但厲卒從傍湏其戰合夹而擊之蔑不克也及戰敗之斬首七千餘級擒閔送之斬於龍城恪屯軍呼池閔将蘇亥遣其将金光率騎數千襲恪恪逆擊斬之亥大懼奔扵并州恪進據常山叚勤懼而請降遂進攻鄴閔将蒋幹閉城距守儁又遣慕容評䓁率騎一萬會攻鄴是時䴏巢于儁正陽殿之西椒生三雛頂上有豎毛凡城獻異鳥五色成章儁謂羣僚曰是何祥也咸稱䴏者燕鳥也首有毛冠者言大燕龍興冠通天章甫之象也巢正陽西椒者言至尊臨軒朝萬國之徴也三子者數應三統之驗也神鳥五色言聖朝将繼五行之籙以御四海者也儁覽之大悅既而蒋幹率銳卒五千出城挑戰慕容評䓁擊敗之斬首四千餘級幹率騎還鄴於是羣臣勸儁稱尊號儁答曰吾本幽漠射獵之鄉被髮左袵之俗厯數之籙寕有分邪卿䓁苟相褒舉以覬非望實匪寡徳所冝聞也慕容恪封奕討王午於魯口降之尋而慕容評攻克鄴城送冉閔妻子僚属及其文物於中山先是蒋幹以傳國璽送于建鄴儁欲神其事業言厯運在己乃詐云閔妻得之以獻賜號曰奉璽君因以永和八年僭即皇帝位大赦境内建元曰元璽署置百官以封奕為太尉慕容恪為侍中陽騖為尚書令皇甫真為尚書左僕射張希為尚書右僕射宋活為中書監韓恒為中書令其餘封授各有差追尊廆為髙祖武宣皇帝皝為太祖文明皇帝時朝廷遣使詣儁儁謂使者曰汝還白汝天子我承人乏為中國所推己為帝矣初石虎使人􅊥策于華山得玉版文曰嵗在申酉不絶如綫嵗在壬子真人乃見及此燕人咸以為儁之應也改司州為中州置司𨽻校尉官羣下言大燕受命上承光紀黒精之君運歴傳属代金行之后冝行夏之時服周之冕旗幟尚黒牲牡尚元儁從之其從行文武諸藩使人及登號之日者悉増位三級𣲖河之師守鄴之軍下及戰士賜各有差臨陣戰亡者将士加贈二䓁士卒復其子孫殿中舊人皆随才擢叙立其妻可足渾氏為皇后世子曄為皇太子晋寕􅃋将軍榮胡以彭城魯郡叛降于儁常山人李犢聚衆數千反于普璧壘儁遣慕容恪率衆討降之初冉閔既敗王午自號安國王午既死吕䕶復襲其號保魯口恪進討走之遣前軍恱綰追入于野王悉降其衆姚㐮以梁國降于儁以慕容評為都督秦雍益梁江揚荆徐兖豫十州河南諸軍事權鎮于洛水慕容彊為前鋒都督都督荆徐二州緣淮諸軍事進據河南儁自和龍至薊城幽冀之人以為東遷互相驚擾所在屯結其下請討之儁曰羣小以朕東廵故相惑耳今朕既至尋當自定然不虞之備亦不可不為於是令内外戒嚴苻生河内太守王會黎陽太守韓髙以郡歸儁晋蘭陵太守孫黒濟北太守髙柱建興太守髙瓫各以郡叛歸于儁初儁車騎大将軍范陽公劉寕屯據蕕城降于苻氏至此率戸三千詣薊歸罪拜後将軍髙句麗王釗遣使謝恩貢其方物儁以釗為營州諸軍事征東大将軍營州刺史封樂浪公王如故初叚蘭之子龕因冉閔之亂擁衆東屯廣固自號齊王稱藩于建鄴遣書抗中表之儀非儁正位儁遣慕容恪慕容塵討之恪既濟河龕弟羆驍勇有智計言於龕曰慕容恪善用兵加其衆旅既盛恐不可抗也若頓兵城下雖復請降懼終不聼王但固守羆請率精銳距之若其戰㨗王可馳來追擊使虜匹馬無反如其敗也遽出請降不失千戸侯也龕弗從羆固請行龕怒殺之率衆三萬来距恪恪遇龕于濟水之南與戰大敗之遂斬其弟欽盡俘其衆恪進圍廣固命諸将築室反耕為持久之計以困龕龕所署徐州刺史王騰索頭單于薛雲降于恪叚龕之被圍也遣使詣建鄴請救穆帝遣北中即将荀羡赴之憚虜彊遷延不敢進攻破陽都斬王騰以歸恪遂克廣固以龕為伏順将軍徙鮮卑胡羯三千餘戸于薊留慕容塵鎮廣固恪振旅而歸儁太子曄死偽諡獻懐升平元年復立次子暐為皇太子赦其境内改元曰光夀遣其撫軍慕容垂中軍慕容䖍與䕶軍平熙䓁率歩騎八萬討丁零勑勤于塞北大破之俘斬十餘萬級獲馬十三萬匹牛羊億餘萬初廆有駿馬曰赭白有竒相逸力石虎之伐棘城也皝将出避難欲乗之馬悲鳴踶齧人莫能近皝曰此馬見異先朝孤常杖之濟難今不欲者盖先君之意乎乃止虎尋退皝益竒之至是四十九嵗矣而駿逸不虧儁比之於鮑氏騘命鑄銅以圗其象親為銘贊鐫勒其旁置之薊城東掖門是嵗象成而馬死匃奴單于賀賴頭率部落三萬五千降于儁拜寕西将軍中郡公處之於代郡平舒城晉泰山太守諸葛攸伐其東郡儁遣慕容恪距戰王師敗績北中即将謝万先據梁宋懼而遁歸恪進兵入㓂河南汝潁譙沛皆䧟置守宰而還儁自薊城遷于鄴赦其境内繕脩宫殿復銅雀臺使昌黎遼東二郡營起廆廟范陽燕郡搆皝廟以其䕶軍平熙領将作大匠監造二廟焉苻堅平州刺史劉特率戸五千降于儁河間李黒聚衆千餘攻略州郡殺棗彊令衛顔儁長樂太守傳顔討斬之常山大樹自抜根下得璧七十珪七十三光色精竒有異常玉儁以為嶽神之命遣其尚書即叚勒以太牢祀之初冉閔之僭號也石虎将李厯張平髙昌䓁並率其所部稱藩於儁遣子入侍既而投欵建鄴結援苻堅並受爵位覊縻自固雖貢使不絶而誠莭未盡吕䕶之走野王也遣弟奉表謝罪於儁拜寕南将軍河内大守又上黨馮鴦自稱太守附於張平平屢言之儁以平故赦其罪以為京兆太守䕶鴦亦隂通京師張平跨有新興雁門西河太原上黨上郡之地壘壁三百餘胡晉十餘萬戸遂拜置征鎮為鼎跱之勢儁遣其司徒慕容評討平領軍慕輿根討鴦司空陽騖討昌撫軍慕容臧攻厯并州壘壁降者百餘所以尚書右僕射恱綰為安西将軍領䕶匈奴中即将并州刺史以撫之平所署征西諸葛驤鎮北蘇象寕東喬庻鎮南石賢䓁率壘壁百三十八降于儁儁大恱皆復其官爵既而平率衆三千奔於平陽鴦奔于野王厯走滎陽昌奔邵陵悉降其衆儁於是復圖入㓂兼欲經略闗西乃令州郡校閱見丁精覆隠漏率戸留一丁餘悉發之欲使歩卒滿一百五十萬期明年大集将進臨洛陽為三方莭度武邑劉貴上書極諌陳百姓凋弊召兵非法恐人不堪命有土崩之禍并陳時政不便于時者十有三事儁覧而恱之付公卿博議事多納用乃改為三五占兵寛戎備一周悉令明年季冬赴集鄴都是嵗晉将荀羡攻山茌拔之斬儁泰山太守賈堅儁青州刺史慕容塵遣司馬恱明救之羡師敗績復䧟山茌儁立小學扵顯賢里以教胄子封其子泓為濟北王冲為中山王讌羣臣於蒲池酒酣賦詩因談經史語及周太子晋澘然流涕顧謂羣臣曰昔魏武追痛倉舒孫權悼登無已孤常謂二主緣愛稱竒無大雅之體自􅁮亡以來孤鬢髪中白始知二主有以而然卿䓁言曄定何如也孤今悼之得無貽怪将來乎其司徒左長史李績對曰獻懷之在東宫臣為中庻子既忝近侍聖質志業臣實不敢不知臣聞道備無愆其唯聖人乎先太子大徳有八未見闕也儁曰卿言亦以過矣然試言之績曰至孝自天性與道合此其一也聰敏慧悟機思若流此其二也沉毅好㫁理詣無幽此其三也疾䛕亮物雅恱直言此其四也好學愛賢不耻下問此其五也英姿邁古藝業超時此其六也虚襟恭譲尊師重道此其七也輕財好施勤恤民隠此其八也儁泣曰卿雖褒譽然此􅅜若在吾死無憂也吾既不能追蹤唐虞官天下以禪有徳近模三王以世傳授景茂幼冲器藝未舉卿以為何如績曰皇太子天資岐嶷聖敬日躋而八徳閴然二闕未補雅好逰田娱心絲竹所以為損耳儁顧謂暐曰伯陽之言藥石之恵汝宜戢之因問髙年疾苦孤寡不能自存者賜榖帛有差儁夜夢石虎齧其臂寤而惡之命發其墓剖棺出尸蹋而罵之曰死胡安敢夢生天子遣其御史中尉陽約數其殘酷之罪鞭之棄于漳水諸葛攸又率水陸二萬討儁入自石門屯于河渚攸部将匡超進據嵪㠂蕭舘屯於新柵又遣督䕶徐冏率水軍三千泛舟上下為東西聲勢儁遣慕容評傅顔䓁統歩騎五萬戰於東阿王師敗績塞北七國賀蘭渉勒䓁皆降俄而儁寝疾謂慕容恪曰吾所疾惙然當恐不濟脩短命也復何所恨但二㓂未降景茂冲㓜慮其未堪多難吾欲逺追宋宣以社稷屬汝恪曰太子雖㓜天縱聪聖必能勝殘刑措不可以亂正統也儁怒曰兄弟之間豈虚餙也恪曰陛下若以臣堪荷天下之任者寕不能輔少主乎儁曰若汝行周公之事吾復何憂李績清方忠亮堪大任汝善遇之是時兵集鄴城盗賊互起毎夜攻劫晨昬斷行於是寛常賦設竒禁賊盗有相告者賜奉車都尉捕誅賊首木榖和等百餘人乃止升平四年儁死時年四十二在位十一年偽諡景昭皇帝廟號烈祖墓號龍陵儁雅好文籍自初即位至末年講論不倦覽政之暇唯與侍臣錯綜義理凡所著述四十餘萹性嚴重慎威儀未曽以慢服臨朝雖閑居宴處亦無懈怠之色云慕容暐字景茂儁第三子也初封中山王尋立為太子及儁死羣臣欲立慕容恪恪辭曰國有儲君非吾節也於是立暐升平四年僭即皇帝位大赦境内改元建熙立其母可足渾氏為皇太后以慕容恪為太宰錄尚書行周公事慕容評為太傅副贊朝政慕輿根為太師慕容垂為河南大都督征南将軍兖州牧荆州刺史領䕶南蠻校尉鎮梁國孫希為安西将軍并州刺史傅顔為䕶軍将軍其餘封授各有差暐既庸弱國事皆委之於恪慕輿根自恃勲舊驕傲有無上之心忌恪之總朝權将伺隙為亂乃言於恪曰今主上幼冲母后干政殿下冝慮楊駿諸葛元遜之變思有以自全且定天下者殿下之功也兄亡弟及先王之成制過山陵之後可廢主上為一國王殿下踐尊位以建大燕無窮之慶恪曰公醉乎何言之悖也昔曹臧吴札並於家難之際猶曰為君非吾莭况今儲君嗣統四海無虞宰輔受遺奈何便有私議公忘先帝之言乎根大懼陳謝而退恪以告慕容垂垂勸恪誅之恪曰今新遭大㐫二虜伺隙山陵未建而宰相自相誅滅恐乖逺近之望且可容忍之根與左衛慕輿干潛謀誅恪及評因而簒位入白可足渾氏及暐曰太宰太傅将謀為亂臣請率禁兵誅之以安社稷可足渾氏将從之暐曰二公國之親穆先帝所託終應無此未必非太師将為亂也於是使其侍中皇甫真䕶軍傅顔收根䓁於禁中斬之大赦境内遣傅顔率騎二萬觀兵河南臨淮而還軍威甚盛初儁所署寕南将軍呂䕶據野王隂通京師穆帝以䕶為前将軍冀州刺史儁死謀引王師襲鄴事覺暐使慕容恪䓁率衆五萬討之傅顔言於恪曰䕶窮㓂假合王師既臨則上下喪氣曽不敢闚兵中路展其螗蜋之心此則士卒懾魂敗亡之驗也殿下前以廣固天險守易攻難故為長久之策今賊形便不與徃同冝急攻之以省千金之費恪曰䕶老賊經變多矣觀其為備之道未易卒平今圈之窮城樵採路絶内無蓄積外無彊援不過十旬其斃必矣何必遽殘士卒之命而趣一時之利哉吾嚴濬圍壘休飬将卒以重官羙貨間而離之事淹勢窮其釁易動我則未勞而㓂已敝此為兵不血刃坐以制勝也遂列長圍守之䕶遣其将張興率勁卒七千出戰傅顔擊斬之自三月至八月而野王潰䕶南奔于晉悉降其衆尋復叛歸於暐暐待之如初因遣傅顔與䕶率衆據河隂顔北襲𠡠勤大獲而還䕶攻洛陽中流矢而死将軍叚崇收軍北渡屯于野王暐遣其寕東慕容忠攻䧟滎陽又遣鎮南慕容塵㓂長平時晉冠軍将軍陳祐戍洛陽遣使請救帝遣桓温援之興寕初暐復使慕容評㓂許昌懸弧陳城並陷之遂畧汝南諸郡徙萬餘戸于幽冀暐豫州刺史孫興上疏請歩卒五千先圖洛陽暐納之遣其太宰司馬悅希軍於盟津孫興分戍成臯以為之聲援尋而陳祐率衆奔陸渾河南諸壘悉陷於希慕容恪攻陷金墉害楊威将軍沈勁以其左中即慕容筑為假節征虜将軍洛州刺史鎮金墉慕容垂為都督荆揚洛徐兖豫雍益凉秦等十州諸軍事征南大将軍荆州牧配兵一萬鎮魯陽時暐境内多水旱慕容恪慕容評並稽首歸政暐不許評恪等固請暐勅㫁其讓表乃止暐鍾律即郭欽奏議以暐承石虎水為木徳暐從之太和元年暐遣撫軍慕容厲攻晉泰山太守諸葛攸攸奔于淮南厲悉陷兖州諸郡置守宰而還慕容恪有疾深慮暐政不在已慕容評性多猜忌大司馬之位不能允授人望乃召暐兄樂安王臧謂之曰今勁秦跋扈彊吴未賓二㓂並懐進取但患事之無由耳夫安危在得人國興在賢輔若能推才任忠和同宗盟則四海不足圖二虜豈能為難哉吾以常才受先帝顧託之重毎欲掃平闗隴蕩一甌吴庻嗣成先帝遺志謝憂責於當年而疾固彌留恐此志不遂所以沒有餘恨也吴王天資英傑經畧超時司馬統職兵權不可以失人吾終之後必以授之若以親踈次第不以授汝當以授冲汝等雖才識明敏然未堪多難國家安危實在于此不可昧利忘憂以致大悔也又以告評月餘而死其國中皆痛惜之先是晋南陽督䕶趙𢎞以宛降暐暐遣其南中即将趙盤自魯陽戍宛至此晉右将軍桓豁攻宛拔之趙盤退奔魯陽豁遣輕騎追盤及於雉城大戰敗之執盤戍宛而歸苻堅将苻謏據陕降于暐時有圖書云燕馬當飲渭水堅恐暐乗釁入闗大懼乃盡精銳以備華隂暐羣下議欲遣兵救謏因圗闗右慕容評素無經畧又受苻堅間貨沮議曰秦雖有難未易可圖朝廷雖明豈如先帝吾等經畧又非太宰之匹終不能平秦也但可閉闗息旅保寜疆埸足矣暐魏尹慕容徳上疏乞命皇甫真引并冀之衆徑趣蒲坂臣垂引許洛之兵馳觧謏圍太傅總京都虎旅為二軍後繼斯誠圗氐之上策也暐覽表大恱将從之評固執不許乃止苻謏知評暐之無逺略恐救師弗至乃牋於慕容垂皇甫真曰苻堅王猛皆人傑也謀為燕患為日久矣今若乗機不赴恐燕之君臣将有甬東之悔垂得書私于真曰方為人患者必在於秦主上富於春秋未能留心政事觀太傅度畧豈能抗苻堅王猛乎真曰然繞朝有云謀之不從可如何暐僕射恱綰言於暐曰太宰政尚寛和百姓多有隠附傳曰唯有徳者可以寛臨衆其次莫如猛今諸軍營戸三分共貫風教陵弊威綱不舉冝悉罷軍封以實天府之饒肅明法令以清四海暐納之綰既定制朝野震局出戸二十餘萬慕容評大不平尋賊綰殺之晉大司馬桓温江州刺史桓冲豫州刺史袁真率衆五萬伐暐前兖州刺史孫元起兵應之温部将檀元攻胡陸執暐寕東慕容忠暐遣其将慕容厲與温戰於黄墟厲師大敗單馬奔還髙平太守徐翻以郡歸順温前鋒朱序又破暐将傅顔于林渚温軍大振次于枋頭暐懼謀奔和龍慕容垂曰不然臣請擊之若戰不㨗走未晚也乃以垂為使持節南討大都督慕容徳為征南将軍率衆五萬距温使其散騎侍郎樂嵩乞師於苻堅堅遣将軍荀池率衆二萬出自洛陽師于潁川外為赴援内實觀隙有兼併之志矣慕容徳屯於石門絶温糧漕豫州刺史李邦率州兵五千㫁温餽運温頻戰不利糧運復絶又聞堅師之至乃焚舟棄甲而退徳率勁騎四千先温至㐮邑東伏於澗中與垂前後夹擊王師大敗死者三萬餘人茍池聞温班師邀擊于譙温衆又敗死者萬計垂既有大功威徳彌振慕容評素不平之垂又言其将孫盖䓁摧鋒陷銳冝論功超授評寝而不錄垂數以為言頗與廷争可足渾氏素惡垂毁其戰功遂與評謀殺垂垂懼奔于苻堅先是暐使其黄門侍即梁琛聘于堅琛還言於評曰秦揚兵講武運粟陕東以琛觀之無久和之理兼吴王西奔必有觀釁之計深宜備之評曰不然秦豈可受吾叛臣而不懐和好哉琛曰鄰國相并有自來矣况今並稱大號理無俱存苻堅機明好斷納善如流王猛有王佐之才銳於進取觀其君臣相得自謂千載一時桓温不足為慮終為人患者其唯王猛乎暐評不以為虞皇甫真又陳其事曰苻堅雖聘使相尋託輔車為論然抗均鄰敵勢同戰國明其甘於取利無慕善之心終不能守信存和以崇久要也頃來行人累續兼師出洛川夷險要害具之耳目觀虛實以措奸圖聴風塵而伺國隙者㓂之常也又吴王外奔為之謀主伍員之禍不可不慮洛陽并州壺闗諸城並宜増兵益守以防未兆暐召評而謀之評曰秦國小力弱仗我為援且苻堅庻幾善道終不納叛臣之言不冝輕自擾懼以動㓂心也暐從之俄而堅遣其将王猛率衆伐暐攻慕容筑于金墉暐遣慕容臧率衆救之臧次滎陽猛部将梁成洛州刺史鄧羌與臧戰于石門臧師敗績死者萬餘遂相持于石門筑以救兵不至以金墉降於猛梁成又敗慕容臧斬首三千餘級獲其将軍楊璩臧遂城新樂而還桓温之敗也歸罪於豫州刺史袁真真怒以夀陽降暐暐遣其大鴻臚温統署真為使持莭散騎常侍都督淮南諸軍事征南大将軍領䕶南蠻校尉揚州刺史封宣城公未至而真統俱卒真黨朱輔立真子瑾為建威将軍豫州刺史以固夀陽時外則王師及苻堅交侵兵革不息内則暐母亂政評䓁貪冐政以賄成官非才舉羣下切齒焉其尚書左丞申紹上疏極陳時政之闕暐不納苻堅又使王猛楊安率衆伐暐猛攻壺闗安攻晉陽暐使慕容評䓁率中外精卒四十餘萬距之猛安進師潞川州郡盗賊大起鄴中多怪異暐憂懼不知所為乃召其使而問曰秦衆何如今大師既出猛等能戰否或對曰秦國小兵弱豈王師之敵景畧常才又非太傅之匹不足憂也黄門侍郎梁琛中書侍郎樂嵩進曰不然兵書之義計敵能鬬當以筭取之若冀敵不闘非萬全之道也慶鄭有云秦衆雖少戰士倍我衆之多少非可問也且秦行師千里固戰是求何不戰之有乎暐不恱猛與評䓁相持評以猛懸軍逺入利在速戰議以持久制之猛乃遣其将郭慶率騎五千夜從間道起火髙山焼評輜重火見鄴中評性貪鄙鄣固山泉賣樵鬻水積錢絹如邱陵三軍莫有闘志暐遣其侍中蘭伊讓評曰王髙祖之子也冝以宗廟社稷為憂奈何不務撫養勲勞専以聚斂為心乎府藏之珎貨朕豈與王愛之若㓂軍冐進王持錢帛安所置也皮之不存毛将安傅錢帛可散之三軍以平㓂凱旋為先也評懼而與猛戰於潞川評師大敗死者五萬餘人評䓁單騎遁還猛遂長驅至鄴堅復率衆十萬會猛攻暐先是慕容桓以衆萬餘屯于沙亭為評䓁後繼聞評敗引屯内黄堅遣将鄧羌攻信都桓率鮮卑五千退保和龍散騎侍郎徐蔚䓁率扶餘髙句麗及上黨質子五百餘人夜開城門以納堅軍暐與評䓁數十騎奔于昌黎堅遣郭慶追及暐於髙陽堅将巨武執暐将縛之暐曰汝何小人而縛天子武曰我梁山巨武受詔縛賊何謂天子邪遂送暐于堅堅詰其奔状暐曰狐死首邱欲歸死于先人墳墓耳堅哀而釋之令還宫率文武出降郭慶遂追評桓于和龍桓殺其鎮東慕容亮而并其衆攻其遼東太守韓稠于平州郭慶遣将軍朱嶷擊桓執而送之堅徙暐及其王公已下并鮮卑四萬餘戸於長安封暐新興侯署為尚書堅征夀春以暐為平南将軍别部都督淮南之敗随堅還長安既而慕容垂攻苻丕于鄴慕容冲起兵闗中暐謀殺堅以應之事發為堅所誅時年三十五及徳僭稱尊號偽諡幽皇帝始廆以武帝太康六年稱公至暐四世暐在位二十一年以海西公太和五年滅通廆皝凡八十五年裴嶷字文冀河東聞喜人也父昶司𨽻校尉嶷清方有幹畧累遷至中書侍即轉給事黄門郎滎陽太守屬天下亂嶷兄武先為元莬太守嶷遂求為昌黎太守至郡久之武卒嶷被徴乃将武子開送喪俱南既逹遼西道路梗塞乃與開投廆時諸流寓之士見廆草創並懐去就嶷首定名分為羣士啓行廆甚恱以嶷為長史委以軍國之謀及悉獨官㓂逼城下内外騷動廆問策於嶷嶷曰悉獨官雖擁大衆軍無號令衆無部伍但當伺其無備則成擒耳廆從之遂䧟㓂營廆威徳於此甚振将遣使獻㨗扵建鄴妙簡行人令嶷将命初朝廷以廆僻在荒逺猶以邉裔之豪處之嶷既使至盛言廆威畧又知四海英賢並為其用舉朝改觀焉嶷将還帝試留嶷以觀之嶷辭曰臣世荷朝恩濯纓華省因亂流寄投迹荒遐今遭開泰得覩朝廷復賜恩詔即留京輦於臣之私誠為厚幸顧以皇居播遷山陵幽辱慕容龍驤将軍越在遐表乃心王室慷慨之誠義感天地方掃平中壤奉迎皇輿故遣使臣萬里表誠今若留臣必謂國家遺其僻陋孤其丹心使懐義懈怠是以微臣區區忘身為國貪還反命耳帝曰卿言是也乃遣嶷還廆後謂羣僚曰裴長史名重中朝而降屈如此豈非天以授孤也出為遼東相轉樂浪太守髙瞻字子前渤海蓨人也少而英爽有俊才身長八尺二寸光熙中調補尚書郎属永嘉之亂還鄉里乃與父老議曰今皇綱不振兵革雲擾此郡沃壤憑固河海若兵荒嵗儉必為㓂庭非謂圖安之所王彭祖先在幽薊據燕代之資兵彊國富可以託也諸君以為何如衆咸善之乃與叔父隠率數千家北徙幽州既而以王浚政令無恒乃依崔毖随毖如遼東毖之與三國謀伐廆也瞻固諫以為不可毖不從及毖奔敗瞻随衆降於廆廆署為将軍瞻稱疾不起廆敬其姿器數臨候之撫其心曰君之疾在此不在餘也今天子播越四海分崩蒼生紛擾莫知所係孤思與諸君匡復帝室翦鯨豕扵二京迎天子於吴㑹廓清八表侔勲古烈此孤之心也孤之願也君中州大族冠冕之餘宜痛心疾首枕戈待旦奈何以華夷之異有懐介然且大禹出於西羌文王生于東夷但問志畧何如耳豈以殊俗不可降心乎瞻仍辭疾篤廆深不㔻之瞻又與宋該有隙該隂勸廆除之瞻聞其言彌不自安遂以憂死慕容翰字元邕廆之庻長子也性雄豪多權略猨臂工射膂力過人廆甚竒之委以折衝之任行師征伐所在有功威聲大振為逺近所憚作鎮遼東髙句麗不敢為㓂善撫接愛儒學自士大夫至於卒伍莫不樂而從之及奔叚遼深為遼所敬愛栁誠之敗叚蘭欲乗勝深入翰慮成本國之害詭說於蘭蘭遂不進後石虎征遼皝親将三軍略令支以北遼議欲追之翰知皝躬自總戎戰必克勝乃謂遼曰今石氏向至方對大敵不冝復以小小為事燕主自來士馬精銳兵者㐫器戰有危慮若其失利何以南禦乎蘭怒曰吾前聽卿誑說致成今患不復入卿計中矣乃率衆追皝蘭果大敗翰雖處仇國因事立忠皆此類也及遼奔走翰又北投宇文歸既而逃歸歸乃遣勁騎百餘􅇷之翰遙謂追者曰吾既思戀而歸理無反面吾之弓矢汝曹足知無為相逼自取死也吾處汝國久恨不殺汝汝可百歩豎刀吾射中者汝便宜反不中者可来前也歸騎觧刀豎之翰一發便中刀環追騎乃散既至皝甚加恩禮建元二年從皝討宇文歸臨陣為流矢所中卧病積時後疾漸愈於其家中騎馬自試或有人告翰私習騎疑為非常皝素忌之遂賜死焉翰臨死謂使者曰翰懐疑外奔罪不容誅不能以骸骨委賊庭故歸罪有司天慈曲愍不肆之市朝今日之死翰之生也但逆胡跨據神州中原未靖翰常剋心自誓志吞醜虜上承先王遺旨下謝山海之責不圖此心不遂沒有餘恨命也奈何仰藥而死陽裕字士倫右北平無終人也少孤兄弟皆早亡單煢獨立雖宗族無能識者惟叔父耽㓜而竒之曰此􅅜非惟吾門之標秀乃佐時之良器也刺史和演辟為主簿王浚領州轉治中從事忌而不能任石勒既克薊城問棗嵩曰幽州人士誰最可者嵩曰燕國劉翰徳素長者北平陽裕幹事之才勒曰若如君言王公何以不任嵩曰王公由不能任所以為明公擒也勒方任之裕乃微服􅅗遁時鮮卑單于叚眷為晉驃騎大将軍遼西公雅好人物虚心延裕裕謂友人成泮曰仲尼喜佛肸之召以匏𤓰自喻伊尹亦稱何事非君何使非民聖賢尚如此况吾曹乎眷今召我豈徒然哉泮曰今華夏分崩九州幅裂軌迹所及易水而已欲偃蹇考槃以待大通者俟河之清也人夀幾何古人以為白駒之歎少游有云郡椽足以䕃後况國相乎卿􅇷縱伊孔抑亦知機其神也裕乃應之拜郎中令中軍将軍處上卿位厯事叚氏五主甚見尊重叚遼與皝相攻裕諫曰臣聞親仁善鄰國之寳也慕容與國世為婚姻且皝令徳之主不冝連兵構怨凋殘百姓臣恐禍害之興将由於此願两追前失通欵如初使國家有泰山之安蒼生蒙息肩之恵遼不從出為燕郡太守石虎克令支裕以郡降拜北平太守徴為尚書左丞叚遼之請迎於虎也裕以左丞領征東麻秋司馬秋敗裕為軍人所執将詣皝皝素聞裕名即命釋其囚拜郎中令遷大将軍左司馬東破髙句麗北㓕宇文歸皆豫其謀皝甚器重之及遷都和龍裕雅有巧思皝所制城池宫閣皆裕之規模裕雖仕皝日近寵秩在舊人之右性謙恭清儉剛蕳慈篤雖厯居朝端若布衣之士士大夫流亡羇絶者莫不經營收葬存恤孤遺士無賢不肖皆傾身待之是以所在推仰初范陽盧諶毎稱之曰吾及晉之清平厯觀朝士多矣忠清簡毅䔍信義烈如陽士倫者實亦未幾及死皝甚悼之時年六十一韓恒字景山灌津人也父黙以學行顯名恒少能屬文師事同郡張載載竒之曰王佐才也身長八尺一寸博覽經籍無所不通永嘉之亂避地遼東廆既逐崔毖復徙昌黎召見嘉之拜參軍事咸和中宋該䓁建議以廆立功一隅勤誠王室位卑任重不足以鎮華夷冝表請大将軍燕王之號廆納之命羣寮博議咸以為冝如該議恒駮曰自羣胡乗間人嬰荼毒諸夏蕭條無復綱紀眀公忠武䔍誠憂勤社稷抗莭孤危之中建功萬里之外終古勤王之義未之有也夫立功者患信義不著不患名位不髙故桓文有寕復一匡之功亦不先求禮命以令諸侯宜繕甲兵候機㑹除羣㐫靖四海功成之後九錫自至且要君以求寵爵者非為臣之義也廆不平之出為新昌令皝為鎮軍復叅軍事遷營邱太守政化大行儁為大将軍徴拜諮議叅軍加揚烈将軍儁僭位将定五行次衆論紛紜恒時疾在龍城儁召恒以决之恒未至而羣臣議以燕宜承晉為水徳既而恒至言於儁曰趙有中原非唯人事天所命也天實與之而人奪之臣竊謂不可且大燕王迹始自於震於易震為青龍受命之初有龍見於都邑成龍為木徳幽契之符也儁初雖難改後終從恒議儁祕書監清河聶熊聞恒言乃歎曰不有君子國何以興其韓令君之謂乎後與李産俱傅東宫從太子曄入朝儁顧左右曰此二傅一代偉人未易繼也其見重如此李産字子喬范陽人也少剛厲有志格永嘉之亂同郡祖逖擁衆部於南土力能自固産遂徃依之逖素好從横弟約有大志産微知其㫖乃率子弟十數人閒行還鄊里仕於石氏為本郡太守及慕容儁南征前鋒逹郡界鄉人皆勸産降産曰夫受人之禄當同其安危今若舍此莭以圖存義士将謂我何衆潰始詣軍請降儁嘲之曰卿受石氏寵任衣錦本鄉何故不能立功於時而反委質乎烈士處身於世固當如是邪産泣曰誠知天命有歸非微臣所抗然犬馬為主豈忘自效但以孤窮勢蹙致力無術僶俛歸死實非誠款儁嘉其慷慨顧謂左右曰此真長者也乃擢用之厯位尚書性剛正好直言毎至進見未曽不論朝政之得失同軰咸憚焉儁亦敬其儒雅前後固辭年老不堪理劇轉拜太子太保謂子績曰以吾之才而致於此始者之願亦已過矣不可復以西夕之年取笑於來今也固辭而歸死於家子績績字伯陽少以風莭知名清辯有辭理弱冠為郡功曹時石虎親征叚遼師次范陽百姓饑儉軍供有闕虎大怒太守惶怖避匿績進曰郡帯北裔與㓂接壤疆場之間人懐危慮聞輿駕親戎将除殘賊雖嬰􅅜白首咸思効命非唯為國亦自求寕雖身膏草野猶甘為之敢有私吝而闕軍實但比年災儉家有菜色困敝力屈無所取濟逋廢之罪情在可矜虎見績年少有壮莭嘉而恕之於是太守獲免刺史王午辟為主簿儁之南征也随午奔魯口鄧恒謂午曰績鄊里在北父已降燕今雖在此終不為用方為人患午曰績於喪亂之中捐家立義情莭之重有侔古烈若懐嫌害之必駭衆望恒乃止午恐績終為恒所害乃資遣之及到儁責其背親後至績荅曰臣聞豫譲報智伯仇稱於前史既官身所在何事非君陛下方𢎞唐虞之化臣實未謂歸之晚也儁曰此亦事主之一莭耳累遷太子中庻子及暐立慕容恪欲以績為尚書右僕射暐憾績徃言不許恪屡請乃謂恪曰萬幾之事委之叔父伯陽一人暐請獨裁績遂憂死慕容恪字元恭皝之第四子也㓜而謹厚沉深有大度母髙氏無寵皝未之竒也年十五身長八尺七寸容貌魁傑雄毅嚴重毎所言及輙經綸世務皝始異焉乃授之以兵數從皝征伐臨機多竒策使鎮遼東甚有威恵髙句麗憚之不敢為㓂皝使恪與儁俱伐夫餘儁居中指授而已恪身當矢石摧鋒而進所嚮輙潰皝将終謂儁曰今中原未一方建大事恪智勇俱濟汝其委之及儁嗣位彌加親任累戰有大功封太原王拜侍中假莭大都督錄尚書儁寝疾引恪與慕容評屬以後事及暐之世總攝朝權初建鄴聞儁死曰中原可圖矣桓温曰慕容恪尚存所憂方為大耳慕輿根之就誅也内外危懼恪容止如常神色自若出入徃還一人歩從或有諫之者恪曰人情懐懼且當自安以靖之吾復不安則衆何瞻仰哉於是人心稍定恪虚襟待物諮詢善道量才處任使人不踰位朝廷謹肅進退有常度雖執權政毎事必諮之於評罷朝歸第則盡心色養手不釋卷其百寮有過未嘗顕之自是庻僚化徳稀有犯者恪之圍洛陽也秦中大震苻堅親将以備潼闗軍逥乃定恪為将不尚威嚴専以恩信御物務於大畧不以小令勞衆軍士有犯法宻縱舍之捕斬賊首以令軍營内不整似可犯而防禦甚嚴終無喪敗臨終暐親臨問以後事恪曰臣聞報恩莫大薦士版築猶可而况國之懿藩吴王文武兼才管蕭之亞陛下若任之以政國其少安不然臣恐二㓂必有闚􅎿之計言終而死陽騖字士秋右北㔻無終人也父耽仕廆官至東夷校尉騖少清素好學器識沉逺起家為平州别駕屢獻安時彊國之術事多納用廆甚竒之皝即王位遷左長史東西征伐㕘謀幃幄皝臨終謂儁曰陽士秋忠幹貞固可託付大事汝善待之儁之将圖中原也騖制勝之功亞於慕容恪暐既嗣偽位申以師傅之禮親遇日隆及為太尉慨然而歎曰昔常林徐邈先代名臣猶以鼎足任重而終辭三事以吾虚薄何徳以堪之固求罷職言甚懇至暐優答不許騖清貞謙謹老而彌䔍既以宿望舊齒自慕容恪已下莫不畢拜性儉約常乗敝車瘠馬及死無歛財皇甫真字楚季安定朝那人也弱冠以髙才廆拜為遼東國侍郎皝嗣位遷平州别駕時内難連年百姓勞悴真議欲寛減嵗賦休息力役不合㫖免官後以破麻秋之功拜奉車都尉守遼東營邱二郡太守皆有善政及儁僭位入為典書令後從慕容評攻㧞鄴都珍貨充溢真一無所取唯存恤人物收圗籍而已儁臨終與慕容恪等俱受顧託慕輿根将謀為亂真隂察知之乃言於恪請除之恪未忍顯其事俄而根謀發伏誅恪謝真曰不從君言幾成禍敗吕䕶之叛恪謀於朝曰逺人不服文徳以來之今䕶宜以恩詔降乎不宜以兵戈取也真曰䕶九年之間三背王命揆其奸心㐫悖未已明公方飲馬江湘勒銘劍閣况䕶蕞爾近畿而不梟戮宜以兵筭取之不可復以文檄喻也恪從之以真為冠軍将軍别部都督師還拜鎮西将軍并州刺史領䕶匈奴中郎將徴還拜侍中光禄大夫累遷太尉待中苻堅宻謀兼并欲觀審釁隙乃遣其西戎主簿郭辯潛結匈奴左賢王曹轂令轂遣使詣鄴辯因從之真兄典仕苻堅為散騎常侍從子奮覆並顯闗西辯既至鄴厯造公卿言於真曰辯家為秦所誅故寄命曹王貴兄常侍及奮覆兄弟並相知在素真怒曰臣無境外之交斯言何以及我君似奸人得無因縁假託乎乃白暐請窮詰之暐評不許辯還謂堅曰燕朝無綱紀實可圖之鑒機識變唯皇甫真耳堅曰以六州之地豈無智識士一人哉真亦秦人而燕用之固知闗西多君子矣真性清儉寡慾不營産業飲酒至石餘不亂雅好屬文凡著詩賦四十餘萹王猛入鄴真望馬首拜之明日更見語乃卿猛猛曰昨拜今卿何恭慢之相違也真荅曰卿昨為賊朝是國士吾拜賊而卿國士何所怪也猛大嘉之謂權翼曰皇甫真故大器也從堅入闗為奉車都尉數嵗而死通志卷一百八十八
