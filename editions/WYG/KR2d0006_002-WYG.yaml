body:
  text: 通志總目録卷下卷第一百十二李固子爕杜喬呉祐延篤史弼盧植趙岐皇甫規張奐段熲陳蕃朱震王允王宏趙士孫瑞戩黨錮劉淑李膺杜宻劉祐魏朗夏馥宗慈巴肅范滂尹勲蔡衍羊陟張儉岑晊陳翔孔昱范康檀敷劉儒賈彪何顒卷第一百十三上下郭太左原史茅容淑叔賔孟敏黄允庾乘謝甄宋果邉讓賈王柔苻融許劭竇武胡騰何進鄭太孔融皇甫嵩朱雋董卓李傕郭汜劉虞公孫瓚陶謙袁紹子譚尚熙劉表劉焉子璋袁術吕布張邈陳宫髙順陳登卷第一百十四魏張楊張燕公孫度子康晃康兄㳟淵康子晃弟張繡張魯夏侯惇韓浩史煥夏侯淵子覇榮稱夏侯尚子元許允李豐王經荀彧荀攸賈詡袁渙張範弟承涼茂國淵王脩卷第一百十五上下崔琰許攸婁圭毛玠徐弈何䕫邢顒鮑勛父信司馬芝子岐鍾繇子毓華歆王朗子肅程昱孫曉郭嘉董昭劉煜子陶蔣濟時苖劉放孫資劉馥子靖司馬朗梁習張既溫恢賈逵李孚楊沛任峻蘇則杜畿子恕鄭渾倉慈顔斐令狐邵孔乂張遼樂進于禁張郃徐晃朱靈卷第一百十六李典李通臧覇孫觀文聘桓禺呂䖍許禇衛覬潘朂劉廙劉劭繆襲恵蘇休該韋誕摯夏侯孫杜傅嘏桓階陳羣子泰陳矯子本徐宣衞臻父兹盧毓和洽常林楊俊王象杜襲趙儼裴潛卷第一百十七韓暨韓宣崔林髙柔孫禮王觀辛毗楊阜髙堂隆滿寵田豫牽招郭淮徐邈胡質王昶王基王淩母邱儉文欽諸葛誕唐咨鄧艾州泰鍾㑹王弼卷第一百十八上下蜀諸葛亮子瞻樊建董厥徐庶關羽張飛馬超黄忠趙雲龎統徳公法正許靖麋竺孫乾簡雍伊籍秦宓音宻董和子允董陳祗恢劉巴馬良弟謖楊顒陳震吕乂劉封彭羕廖立李嚴劉琰魏延楊儀霍峻子弋王連向朗兄子寵張裔楊洪何祗費詩杜㣲杜瓊許慈胡潛孟光來敏尹黙李譔譙周郤正黄權李恢吕凱馬忠王平張嶷蔣琬子斌劉敏費禕姜維鄧芝張翼宗預廖化楊戲衛繼卷第一百十九呉劉繇子基太史慈士爕爕弟壹子徽䵋子武壹匡張昭子承子休弟奮顧雍子邵弟承邵子譚悌譚雍族人諸葛瑾子融歩騭闡張紘孫尚嚴畯程秉闞澤薛綜子瑩周瑜子允魯肅吕蒙程普黄蓋韓當蒋欽周泰陳武子脩表董襲甘寧凌統徐盛潘璋丁奉卷第一百二十朱治朱然子績吕範子據朱桓子異虞翻陸績張溫駱統陸瑁吾粲朱據陸遜子抗賀齊全琮吕岱周魴鍾離牧潘濬陸凱弟允子禕是儀胡綜徐詳諸葛恪滕允濮陽興王蕃樓元賀邵韋昭晉避諱改曜華覈李衡孟宗鄭泉紀陟卷第一百二十一上下晉王祥弟覽鄭沖何曽子劭遵石苞子崇孫歐陽建鑠羊祜杜預子錫陳騫子輿裴秀子頋楷秀從弟楷子憲衞瓘子恒玠孫璪張華子禕卞韙劉王沈子浚荀顗荀朂子藩組藩子邃弈藩弟組子馮統賈充孫謐子充弟混族模郭彰楊駿弟珧濟卷第一百二十二魏舒李熹劉寔弟智髙光王渾子濟王濬唐彬山濤子簡遐簡子王戎從弟衍郭衍弟澄舒樂廣鄭袤子黙球黙子李允盧欽子浮子志弟珽諶珽志子華表子廙恒廙子恒弟嶠石鑒溫羡卷第一百二十三劉毅子暾程衞和嶠武陔任愷崔洪郭奕侯史光何攀劉頌李重傅元子咸咸從弟祗向雄叚灼閻纘阮籍兄子咸瞻咸子瞻弟孚放從子脩裕族弟族弟嵇康向秀劉伶謝鯤胡母輔之子謙之畢卓王尼羊曼弟􅆅光逸庾峻子珉敳珉弟郭象庾純子旉秦秀卷第一百二十四上下皇甫謐子方回摯虞束晢王接郤詵阮种華譚袁甫陸機孫拯弟耽弟雲兄雲從父喜夏侯湛弟淳子淳承潘岳從子尼張載弟協江統子虨惇孫楚子衆纂洵纂子統統弟綽羅憲兄子尚滕脩馬隆胡奮陶璜吾彦張光趙誘周處子玘玘玘子勰弟札子札兄筵周訪子撫子虓撫子楚撫弟光椘子瓊孫瓊光子仲卷第一百二十五解系弟結育結弟孫旂孟觀牽秀繆播從弟允皇甫重張輔李含張方閻鼎索靖子綝賈疋周浚子嵩弟謨從父稪成公簡茍晞華軼劉喬孫耽桞耽子劉琨子羣輿琨兄輿子演祖逖兄訥邵續李矩叚匹磾魏浚族子該郭黙王導子悦子恬洽珣洽珉卷第一百二十六劉𢎞陶侃兄子臻臻弟輿温嶠郗鑒子愔愔愔子超弟曇鑒曇子恢叔父隆顧榮紀瞻賀循楊方薛兼劉隗孫波訥隗伯父訥子疇刀協子彜逵彜子戴若思弟邈周顗子閔應詹甘卓鄧騫卞壼從父兄敦劉超鍾雅卷第一百二十七孫恵熊逺王鑒陳頵髙崧郭璞葛洪庾亮子彬氷羲氷龢條亮弟懌翼懌弟弟條弟桓彜子雲石雲弟豁民豁子石䖍石石䖍子振䖍弟秀石石生綏石康石豁弟祕允祕弟沖謙沖子嗣徐嗣子允弟謙弟修寧王湛子承述承子述子坦之綏禕之族坦之子愷恱愉忱愉子承子嶠袁之國寳祖台之荀崧子蕤羡范汪子寗堅汪叔劉惔張慿韓伯卷第一百二十八王舒子允之王廙弟彬彬彬子彪之從弟稜虞潭孫嘯父􅔎潭兄子顧衆張闓陸煜煜弟玩玩子納何充禇翜蔡謨諸葛恢殷浩頋悦之蔡裔孔愉子汪祗安國弟從子垣弟羣嚴子從羣沈丁潭張茂陶回謝尚謝安安子琰万琰子混万弟石安兄弈朗弈子元子安弟石兄子朗弟邈卷第一百二十九上下王羲之子元之之凝之之徽之之徽之子楨之徽弟操獻許邁王遜蔡豹羊鑒劉允桓宣族子伊朱伺毛寳子穆之宗安之祖孫璩人徳劉遐鄧嶽子遐朱序陳壽王長文虞溥司馬彪王隱虞預孫盛干寳鄧粲謝沈習鑿齒顧和袁瓌子喬祖喬孫山松耽瓌弟猷質瓌從凖凖孫耽子江逌從弟灌灌子績車允殷覬王雅王㳟庾楷劉牢之殷仲堪楊佺期劉毅兄邁諸葛長民何無忌檀慿之魏詠之卷第一百三十王敦沈允桓溫孟嘉桓元卞範之殷仲文王彌張昌陳敏王如杜曽杜弢王機祖約蘇峻孫恩盧循徐道覆譙縱卷第一百三十一宋劉穆之穆之孫子邕穆穆之中子式之之式之子瑀之從父兄子秀徐羡之兄子佩之湛佩之弟逵之逵之子之湯休傅亮兄廸隆族兄