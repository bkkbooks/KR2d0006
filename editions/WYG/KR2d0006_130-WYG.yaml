body:
  text: 通志卷一百十三上宋右廸功郎鄭樵漁仲撰列傳第二十六上後漢郭太左原叔茅容黄孟敏謝庾乘邊宋果王賈淑史賔允甄讓柔苻融許劭竇武胡騰何進鄭太孔融皇甫嵩朱雋董卓李傕郭汜劉虞公孫瓚陶謙袁紹子譚尚熙劉表劉焉子璋袁術呂布張邈高順陳陳宮登郭太字林宗太原界休人也家世貧賤早孤母欲使給事縣廷林宗曰大丈夫焉能處斗筲之役乎遂辭就成臯屈伯彦學三年業畢博通墳籍善談論美音制乃游於洛陽始見河南尹李膺膺大竒之遂相友善於是名震京師後歸鄉里衣冠諸儒送至河上車數千兩林宗惟與李膺同舟而濟衆賔望之以為神仙焉司徒黄瓊辟太常趙典舉有道或勸林宗仕進者對曰吾夜觀乾象晝察人事天之所廢不可支也遂並不應性明知人好奬訓士類身長八尺容貌魁偉襃衣博帶周遊郡國嘗於陳梁間行遇雨巾一角墊時人乃故折巾一角以為林宗巾其見慕如此或問汝南范滂曰郭林宗何如人滂曰隱不違親貞不絶俗天子不得臣諸侯不得友吾不知其他遭母憂以至孝聞林宗雖善人倫而不為危言覈論故宦者擅政而不能傷也及黨事起知名之士多被其害唯林宗及汝南袁閎得免焉遂閉門教授弟子以千數建寧元年太傅陳蕃大將軍竇武為閹人所害林宗哭之於野慟既而歎曰人之云亡邦國殄瘁瞻烏爰止不知于誰之屋耳明年春卒于家時年四十二四方之士千餘人皆來會葬同志者乃共刻石立碑蔡邕為其文既而謂涿郡盧植曰吾為碑銘多矣皆有慙德唯郭有道無愧色耳其奬拔士人皆如所鑒初太始至南州過袁奉高不宿而去從叔度累日不去或以問太太曰奉高之器譬之泛濫雖清而易挹叔度之器汪汪若千頃之波澄之不清擾之不濁不可量也已而果然太以是名聞天下後之好事或附益增張故多華辭不經又類卜相之書今録其章章效於事者著之篇末左原者陳留人也為郡學生犯法見斥林宗嘗遇諸路為設酒肴以慰之謂曰昔顔涿聚梁甫之巨盜段干木晉國之大駔卒為齊之忠臣魏之名賢蘧瑗顔回尚不能無過况其餘乎愼勿恚恨責躬而已原納其言而去或有譏林宗不絶惡人者對曰人而不仁疾之已甚亂也原後忽更懷忿結客欲報諸生其日林宗在學原愧負前言因遂罷去後事露衆人咸謝服焉茅容字季偉陳留人也年四十餘耕於野時與等輩避雨樹下衆皆夷踞相對容獨危坐愈恭林宗行見而異之遂與之言因請寓宿旦日容殺雞為饌林宗謂為己設既而以供其母自以草蔬與客同飯林宗起拜之曰卿賢乎哉因勸令學卒以成德孟敏字叔達鉅鹿楊氏人也客居太原嘗荷甑墜地不顧而去林宗見而問其意對曰甑已破矣視之何益林宗以此異之因勸令游學十年知名三公俱辟並不屈云庾乘字世遊潁川鄢陵人也少給事縣庭為門士林宗見而拔之勸游學宫遂為諸生傭後能講論自以卑第每處下坐諸生博士皆就讐問由是學中以下坐為貴徴辟並不就號曰徴君宋果字仲乙扶風人也性輕悍喜與人報讐為郡縣所疾林宗乃訓之義方懼以禍敗果感悔叩頭謝負遂改節自敕後以烈氣聞辟公府侍御史并州刺史所在能化賈淑字子厚林宗鄉人也雖世有冠冕而性險害邑里患之林宗遭母憂淑來修弔既而鉅鹿孫威直亦至威直以林宗賢而受惡人弔心怪之不進而去林宗追而謝之曰賈子厚誠實凶德然洗心向善仲尼不逆互鄉故吾許其進也淑聞之改過自厲終成善士鄉里有憂患者淑輙傾身營救為州閭所稱史叔賔者陳留人也少有盛名林宗見而吿人曰牆高基下雖得必失後果以論議阿枉敗名云黄允字子艾濟陽人也以雋才知名林宗見而謂曰卿有絶人之才足成偉器然恐守道不篤將失之矣後司徒袁隗欲為從女求姻見允而歎曰得壻如是足矣允聞而黜遣其妻夏侯氏婦謂姑曰今當見棄方與黄氏長辭乞一會親屬以展離訣之情於是大集賔客三百餘人婦中坐攘袂數允隱匿穢惡十五事言畢登車而去允以此廢於時謝甄字子微汝南召陵人也與陳留邊讓並善談論俱有盛名每共候林宗未嘗不連日達夜林宗謂門人曰二子英才有餘而並不入道惜乎甄後不拘細行為時所毁讓以輕侮曹操操殺之王柔字叔優弟澤字季道林宗同郡晉陽縣人也兄弟總角共候林宗以訪才行所宜林宗曰叔優當以仕進顯季道當以經術通然違方改務亦不能至也後果如所言柔為護匈奴中郎將澤為代郡太守又識張孝仲芻牧之中知范特祖郵置之役召公子許偉康並出屠沽司馬子威拔自卒伍及同郡郭長信王長文韓文布李子政曹子元定襄周康子西河王季然雲中丘季智郝禮眞等六十人並以成名苻融字偉明陳留浚儀人也少為都官吏恥之委去後遊太學師事少府李膺膺風性高簡每見融輙絶他賔客聽其言論融幅巾奮褏談辭如雲膺每捧手歎息郭林宗始入京師時人莫識融一見嗟服因以介於李膺由是知名時漢中晉文經梁國黄子艾並恃其才智眩曜上京卧託養疾無所通接洛中士大夫好事者承其聲名坐門問疾猶不得見三公所辟召者輙以詢訪之隨所臧否以為與奪融察其非眞乃到太學并見李膺曰二子行業無聞以豪傑自置遂使公卿問疾王臣坐門融恐其小道破義空譽違實特宜察焉膺然之二人自是名論漸衰旬日之間慙歎逃去後果為輕薄子並以罪廢棄融益以知名州郡禮請舉孝廉公府連辟皆不應太守馮岱有名稱到官請融相見融一往薦達郡士范冉韓卓孔伷等三人因辭病自絶會有黨事亦遭禁錮妻亡貧無殯斂鄉人為具棺服不肯受曰古之亡者棄之中野唯妻子可以行志但即土埋藏而已融同郡田盛字仲嚮與郭林宗同好亦名知人優游不仕並以壽終許劭字子將汝南平輿人也少峻名節好人倫多所賞識若樊子昭和陽士者並顯名於世故天下言拔士者咸稱許郭初為郡功曹太守徐璆甚敬之府中聞子將為吏莫不改操飭行同郡袁紹公族豪俠去濮陽令歸車徒甚盛將入郡界乃謝遣賔客曰吾輿服豈可使許子將見乎遂以單車歸家劭常到潁川多長者之遊唯不候陳寔又陳蕃喪妻還葬鄉人必至而劭獨不往或問其故劭曰太邱道廣廣則難周仲舉性峻峻則少通故不造也其多所裁量若此曹操微時常卑辭厚禮求為己目劭鄙其人而不肯對操乃伺隙脅劭劭不得已曰君清平之奸賊亂世之英雄操大悅而去劭從祖敬敬子訓訓子相並為三公相以能謟事宦官故自致台司封侯數遣請劭劭惡其薄行終不候之劭邑人李逵壯直有高氣劭初善之而後為隙又與從兄靖不睦時議以此少之初劭與靖俱有高名好共覈論鄉黨人物每月輙更其品題故汝南俗有月旦評焉司空楊彪辟舉方正敦樸徴皆不就或勸劭仕對曰方今小人道長王室將亂吾欲避地淮海以全老㓜乃南到廣陵徐州刺史陶謙禮之甚厚劭不自安告其徒曰陶恭祖外慕聲名内非眞正待吾雖厚其埶必薄不如去之遂復投揚州刺史劉繇於曲阿其後陶謙果捕諸寓士及孫策平呉劭與繇南奔豫章而卒時年四十六兄䖍亦知名故汝南人稱曰平輿淵有二龍焉竇武字游平扶風平陵人安豐戴侯融之元孫也父奉定襄太守武少以經行著稱常教授於大澤中不交時事名顯闗西延熹八年長女選入掖庭桓帝以為貴人拜武郎中其冬貴人立為皇后武遷越騎校尉封槐里侯五千户明年冬拜城門校尉在位多辟名士清身疾惡禮賂不通妻子衣食裁充足而已是時羌蠻寇難嵗儉民飢武得兩宫賞賜悉散與太學諸生及載肴糧於路匄施貧民兄子紹為虎賁中郎將性疎簡奢侈武每數切戒厲猶不覺悟乃上書求退紹位又自責不能訓道當先受罪由是紹更遵節大小莫敢違犯時國政多失内官專寵李膺杜密等為黨事考逮永康元年上疏諫曰臣聞名主不諱譏刺之言忠臣不恤諫爭之患臣幸遭盛明之世豈敢懐禄逃罪不竭其誠乎陛下初從藩國爰登聖祚天下逸豫謂當中興而自即位以來未聞善政梁孫寇鄧雖或誅滅而常侍黄門續為禍虐欺罔陛下競行譎詐自造制度妄爵非人朝政日衰姦臣日横伏尋西京放恣王氏佞臣執政終喪天下今不慮前事之失復循覆車之軌臣恐二世之難必將復及趙高之變不朝則夕近者姦臣牢脩造設黨議遂收前司𨽻校尉李膺太僕杜宻御史中丞陳翔太尉掾范滂等逮考連及數百人曠年拘錄事無効驗臣惟膺等建中抗節志經王室此誠陛下稷卨伊呂之佐而虛為姦臣賊子之所誣枉天下寒心四海失望惟陛下留神澄省時見理出以厭人鬼喁喁之心臣聞古之明君必須賢佐以成政道今臺閣近臣尚書令陳蕃僕射胡廣尚書朱㝢荀緄劉祐魏朗劉矩尹勲等皆國之貞士朝之良佐尚書郎張陵媯皓范康楊喬邊韶戴恢等文質彬彬明達國典内外之職羣才並列而陛下委任近習專樹饕餮外典州郡内幹心膂宜以次貶黜案罪糾罰抑奪宦官欺國之封案其無狀誣罔之罪信任忠良平決臧否使邪正毁譽各得其所寳愛天官唯善是授如此咎徴可消天應可待閒者有嘉禾芝草黄龍之見夫瑞生必於嘉士福至實由善人在德為瑞無德為災陛下所行不合天意不宜稱慶書奏因以病上還城門校尉槐里侯印綬帝不許有詔原李膺杜宻等自黄門北寺若盧都内諸獄繫囚罪輕者皆出之其冬帝崩無嗣武召侍御史河間劉儵參問其國中王子侯之賢者儵稱解瀆亭侯宏武入白太后遂徴立之是為靈帝拜武為大將軍常居禁中帝既立論定䇿功更封武為聞喜侯子機渭陽侯拜侍中兄子紹鄠侯遷歩兵校尉紹弟靖西鄉侯為侍中監羽林左騎武既輔朝政常有誅翦宦官之意太傅陳蕃亦素有謀時共會朝堂蕃以私謂武曰中常侍曹節王甫等自先帝時操弄國權濁亂海内百姓匈匈歸咎於此今不誅節等後必難圖武深然之蕃大喜以手推席而起武於是引同志尹勲為尚書令劉瑜為侍中馮述為屯騎校尉又徴天下名士廢黜者前司𨽻李膺宗正劉猛太僕杜宻廬江太守朱㝢等列於朝廷請前越嶲太守荀昱為從事中郎辟潁川陳寔為屬共定計䇿於是天下雄雋知其風㫖莫不延頸企踵思奮其智力會五月日食蕃說武曰昔蕭望之困一石顯近者李杜諸公禍及妻子况今石顯數十輩乎蕃以八十之年欲為將軍除害今可且因日食斥罷宦官以塞天變又趙夫人及女尚書旦夕亂太后急宜退絶惟將軍慮焉武乃白太后曰故事黄門常侍但當給事省内典門户主近署財物耳今乃使與政事而任權重子弟布列專為貪暴天下匈匈正以此故宜悉誅廢以清朝廷太后曰漢家故事世有宦官但當誅其有罪豈可盡廢邪時中常侍管霸頗有材畧專制省内武乃先白誅霸及中常侍蘇康等竟死武復數白誅曹節等太后冘豫未忍故事久不發至八月太白出西方劉瑜素善天官惡之上書皇太后曰太白犯房左驂上將星入太微其占宫門當閉將相不利姦人在主傍願急防之又與武蕃書以星辰錯謬不利大臣宜速斷大計武蕃得書將發於是以朱㝢為司𨽻校尉劉祐為河南尹虞祁為洛陽令武乃奏免黄門令魏彪以所親小黄門山冰代之使冰奏素狡猾尤無狀者長樂尚書鄭䬃送北寺獄蕃謂武曰此曹子便當收殺何復考為武不從令冰與尹勲侍御史祝瑨雜考䬃辭連及曹節王甫勲冰即奏收節等使劉瑜内奏時武出宿歸府典中書者先以告長樂五官史朱瑀瑀盜發武奏罵曰中官放縱者自可誅耳我曹何罪而當盡見族滅因大呼曰陳蕃竇武奏白太后廢帝為大逆乃夜召素所親壯健者長樂從官史共普張亮等十七人喢血共盟誅武等曹節聞之驚起白帝曰外間切切請出御德陽殿令帝拔劒踴躍使乳母趙嬈等擁衛左右取棨信閉諸禁門召尚書官屬脅以白刃使作詔版拜王甫為黄門令持節至北寺獄收尹勲山冰冰疑不受詔甫格殺之遂害勲出鄭䬃共刼太后奪璽綬令中謁者守南宫閉門絶複道使鄭䬃等持節及侍御史謁者捕收武等武不受詔馳入歩兵營與紹共射殺使者召北軍五校士數千人屯都亭下令軍士曰黄門常侍反盡力者封侯重賞詔以少府周靖行車騎將軍加節與護匈奴中郎將張奐率五營士討武夜漏盡王甫將虎賁羽林廐騶都候劒㦸士合千餘人出屯朱雀掖門與奐等合明旦悉軍闕下與武對陣甫兵漸盛使其士大呼武軍曰竇武反汝皆禁兵當宿衛省何故隨反者乎先降有賞營府素畏服中官於是武軍稍稍歸甫自旦至食時兵降畧盡武紹遂走諸軍追圍之皆自殺梟首洛陽都亭收捕親屬賔客姻屬悉誅之及劉瑜馮述皆夷其族徙武家屬日南遷太后於雲臺當是時凶豎得志士大夫皆喪其氣矣武府掾桂陽胡騰少師事武獨殯斂行喪坐以禁錮武孫輔時年二嵗迸竄得全事覺節等捕之急胡騰及令史南陽張敞共匿輔於零陵界詐云已死騰以為己子而使聘娶焉後舉桂陽孝廉至建安中荆州牧劉表聞而辟焉以為從事使還竇姓以事列上會表卒曹操定荆州輔與宗人徙居於鄴辟丞相府從征馬超為流矢所中死初武母産武而并産一虵送之林中後母卒及葬未窆有大虵自榛草而出徑至喪所以頭擊柩涕血皆流仰俯蛣屈若哀泣之容有頃而去時人知為竇氏之祥騰字子升初桓帝廵狩南陽以騰為護駕從事公卿貴戚車騎萬計徴求費役不可勝極騰上言天子無外乘輿所幸即為京師臣請以荆州刺史比司𨽻校尉臣自同都官從事帝從之自是肅然莫敢妄有干欲騰以此顯名黨錮解官至尚書張敞者太尉温之弟也何進字遂高南陽宛人也異母女弟選入掖庭為貴人有寵於靈帝拜進郎中再遷虎賁中郎將出為潁川太守光和二年貴人立為皇后徴進入拜侍中將作大匠河南尹中平元年黄巾賊張角等起以進為大將軍率左右羽林五營營士屯都亭修理器械以鎭京師張角别黨馬元義謀起洛陽進發其姦以功封愼侯四年滎陽數千人羣起攻燒郡縣殺中牟縣令詔使進弟河南尹苗出擊之苗攻破羣賊平定而還詔遣使者迎於成臯拜苗為車騎將軍封濟陽侯五年天下滋亂望氣者以為京師當有大兵兩宫流血大將軍司馬許涼假司馬伍宕說進曰太公六韜有天子將兵事可以威厭四方進以為然入言之於帝於是乃詔進大發四方兵講武於平樂觀下起大壇上建十二重五采華蓋高十丈壇東北為小壇復建九重華蓋高九丈列歩兵騎士數萬人結營為陣天子親出臨軍駐大華蓋下進駐小華蓋下禮畢帝躬擐甲介馬稱無上將軍行陣三匝而還詔使進悉領兵屯於觀下是時置西園八校尉以小黄門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎都尉鮑鴻為下軍校尉議郎曹操為典軍校尉趙融為助軍校尉淳于瓊為佐軍校尉又有左右校尉帝以蹇碩壯健而有武畧特親任之以為元帥督司𨽻校尉以下雖大將軍亦領屬焉碩雖擅兵於中而猶畏忌於進乃與諸常侍共說帝遣進西擊邊章韓遂帝從之賜兵車百乘虎賁斧鉞進知其謀乃上遣袁紹東擊徐兖二州兵須紹還即戎事以稽行期初何皇后生皇子辯王貴人生皇子協羣臣請立太子帝以辯輕佻無威儀不可為人主然皇后有寵且進又居重權故久不決六年帝疾篤屬協於蹇碩碩既受遺詔且素輕忌於進兄弟及帝崩碩時在内欲先誅進而立協會進從外入碩司馬潘隱與進早舊迎而目之進驚馳從儳道歸營引兵入屯百郡邸因稱疾不入碩謀不行皇子辯乃即位何太后臨朝進與太傅袁隗輔政錄尚書事進素知中官天下所疾兼忿蹇碩圖已及秉朝政陰規誅之袁紹亦素有此謀因進親客張津勸之曰黄門常侍權重日久又與長樂太后專通姦利將軍宜更清選賢良整齊天下為國家除患進然其言又以袁氏累世寵貴海内所歸而紹素善養士能得豪傑用其從弟虎賁中郎將術亦尚氣俠故並厚待之因復博徴智謀之士龎紀何顒荀攸等與同腹心蹇碩疑不自安與中常侍趙忠等書曰大將軍兄弟秉國專朝今與天下黨人謀誅先帝左右埽滅我曹但以碩典禁兵故且沈吟今宜共閉上閤急捕誅之中常侍郭勝進同郡人也太后及進之貴幸勝有力焉故勝親信何氏遂共趙忠等議不從碩計而以其書示進進乃使黄門令收碩誅之因領其屯兵袁紹復說進曰前竇武欲誅内寵而反為所害者以其言語漏洩而五營百官服畏中人故也今將軍既有元舅之重而兄弟並領勁兵部曲將吏皆英俊名士樂盡力命事在掌握此天贊之時也將軍宜一為天下除害名垂後世雖周之申伯何足道哉今大行在前殿將軍宜受詔領禁兵不宜輕出入宫省進甚然之乃稱疾不入陪喪又不送山陵遂與紹定籌䇿而以其計白太后太后不聼曰中官統領禁省自古及今漢家故事不可廢也且先帝新棄天下我柰何楚楚與士人共對事乎進難違太后意且欲誅其放縱者紹以為中官親近至尊出入號令今不悉廢後必為患而太后母舞陽君及苗數受諸宦官賂遺知進欲誅之數白太后為其障蔽又言大將軍專殺左右擅權以弱社稷太后疑以為然中官在省闥者或數十年封侯貴寵膠固内外進新當重任素敬憚之雖外收大名而内不能斷故事久不決紹等又為畫䇿多召四方猛將及諸豪傑使並向京城以脅太后進然之主簿陳琳入諫曰易稱即鹿無虞諺有掩目捕雀夫微物尚不可欺以得志况國之大事其可以詐立乎今將軍總皇威握兵要龍驤虎歩高下在心此猶鼓洪爐燎毛髮耳夫違經合道天人所順而反委釋利器更徴外助大兵聚會彊者為雄所謂倒持干戈授人以柄功必不成秪為亂階進不聽遂西召前將軍董卓屯闗中上林苑又使府掾太山王匡東發其郡彊弩并召東郡太守橋瑁屯成臯使武猛都尉丁原燒孟津火照城中皆以誅宦官為言太后猶不從苗謂進曰始從南陽來俱以貧賤依省内以致富貴國家之事亦何容易覆水不收宜深思之且與省内和也進意更狐疑紹懼進變計乃脅之曰交構已成形勢已露事留變生將軍復欲何待而不早決之乎進於是以紹為司𨽻校尉假節專命擊斷從事中郎王允為河南尹紹使洛陽方畧武吏司察宦者而促董卓等使馳驛上欲進兵平樂觀太后乃恐悉罷中常侍小黄門使還里舎唯留進素所私人以守省中諸常侍小黄門皆詣進謝曰唯所措置進謂曰天下匈匈正患諸君耳今董卓垂至諸君何不早各就國袁紹勸進便以此決之至于再三進不許中官懼而思變張讓子婦太后之妹也讓向子婦叩頭曰老臣得罪當與新婦俱歸私門惟受恩累世今當遠離宫殿情懷戀戀願復一入直得暫奉望太后陛下顔色然後退就溝壑死不恨矣子婦言於舞陽君入白太后乃詔諸常侍皆復入直八月進入長樂白太后請盡誅諸常侍以下選三署郎入守宦官廬諸宦官相謂曰大將軍稱疾不臨喪不送葬今歘入省此意何為竇氏事竟復起邪又張讓等使人潛聽具聞其語乃率常侍段珪畢嵐等數十人持兵自側闥入伏省中及進出因詐以太后詔召進入坐省閤讓等詰進曰天下憒憒亦非獨我曹罪也先帝嘗與太后不快幾至成敗我曹涕泣救解各出家財千萬為禮和悅上意但欲託卿門戸耳今乃欲滅我曹種族不亦太甚乎卿言省内穢濁公卿以下忠清者為誰於是尚方監渠穆拔劒斬進於嘉德殿前讓珪等為詔以故太尉樊陵為司𨽻校尉少府許相為河南尹尚書得詔版疑之曰請大將軍出共議中黄門以進頭擲與尚書曰何進謀反已伏誅矣進部曲將呉匡張璋素所親幸在外聞進被害欲將兵入宫宫閤閉袁術與匡共斬攻之中黄門持兵守閤會日暮術因燒南宫九龍門及東西宫欲以脅出讓等讓等入白太后言大將軍兵反燒宫攻尚書闥因將太后天子及陳留王又劫省内官屬從複道走北宫尚書盧植執戈於閣道窻下仰數段珪珪等懼乃釋太后太后投閣得免袁紹與叔父隗矯詔召樊陵許相斬之苗紹乃引兵屯朱雀闕下捕得趙忠斬之呉匡等素怨苗不與進同心而又疑其與宦官同謀乃令軍中曰殺大將軍者即車騎也士吏能為報讐乎進素有仁恩士卒皆流涕曰願致死匡遂引兵與董卓弟奉車都尉旻攻殺苗棄其屍於苑中紹遂閉北宫門勒兵捕宦者無少長皆殺之或有無須而誤死者至自發露然得免者二千餘人紹因進兵排宫或上端門屋以攻省内張讓段珪等困廹遂將帝與陳留王數十人歩出榖門奔小平津公卿並出平樂觀無得從者唯尚書盧植夜馳河上王允遣河南中部掾閔貢隨植後貢至手劒斬數人餘皆投河死明日公卿百官乃奉迎天子還宫以貢為郎中封都亭侯董卓遂廢帝又廹殺太后及舞陽君何氏遂亡而漢室亦自此敗亂鄭太字公業河南開封人司農衆之曾孫也少有才畧靈帝末知天下將亂陰結豪桀家富於財有田四百頃而食常不足名聞山東初舉孝廉三府辟公車徴皆不就及大將軍何進輔政徴用名士以公業為尚書侍郎遷侍御史進將誅閹官欲召并州牧董卓為助公業謂進曰董卓彊忍寡義志欲無厭若借之朝政授以大事將恣凶慾必危朝廷明公以親德之重據阿衡之權秉意獨斷誅除有罪誠不宜假卓以為資援也且事留變生殷鑒不遠又為陳時務之所急數事進不能用乃棄官去謂潁川人荀攸曰何公未易輔也進尋見害卓果作亂公業等與侍中伍瓊卓長史何顒共說卓以袁紹為渤海太守以發山東之謀及義兵起卓乃會公卿議大發卒討之羣僚莫敢忤㫖公業恐其衆多益横凶彊難制獨曰夫政在德不在衆也卓不悅曰如卿此言兵為無用邪公業懼乃跪辭更對曰非謂無用以為山東不足加大兵耳如有不信請為明公畧陳其要今山東合謀州郡連結人庶相動非不彊盛然光武以來中國無警百姓優逸忘戰日久仲尼有言不教人戰是謂棄之其衆雖多不能為害一也明公出自西州少為國將閑習軍事數踐戰塲名振當世人懷懾服二也袁本初公卿子弟生處京師張孟卓東平長者坐不闚堂孔公緒清談高論噓枯吹生並無軍旅之才執銳之幹臨鋒決敵非公之儔三也山東之士素乏精悍未有孟賁之勇慶忌之捷聊城之守良平之謀可任以偏師責以成功四也就有其人而尊卑無序王爵不加若恃衆怙力將各基峙以觀成敗不肯同心共膽與齊進退五也關西諸郡頗習兵事自頃以來數與羌戰婦女猶戴㦸操矛挾弓負矢况其壯勇之士以當妄戰之人乎其勝可必六也且天下彊勇百姓所畏者有并涼之人及匈奴屠各湟中義從西羌八種而明公擁之以為爪牙譬驅虎兕以赴犬羊七也又明公將帥皆中表腹心周旋日久恩信淳著忠誠可任智謀可恃以膠固之衆當瓦合之勢猶以烈風埽彼枯葉八也夫戰有三亡以亂攻理者亡以邪攻正者亡以逆攻順者亡今明公秉國平正討滅宦豎忠義克立以此三德待彼三亡奉辭伐罪誰敢禦之九也東州鄭元學該古今北海邴原清高直亮皆儒生之所仰羣士楷式彼諸將若詢其計畫足知彊弱且燕趙齊梁非不盛也終滅於秦呉楚七國非不衆也卒敗滎陽况今德政赫赫股肱惟良彼豈讚成其謀造亂長寇哉其不然十也若其所陳少有可採無事徴兵以驚天下使患役之民相聚為非棄德恃衆自虧威重卓乃悅以公業為將軍使統諸軍討擊闗東或說卓曰鄭公業智畧過人而結謀外寇今資之士馬就其黨與竊為明公懼之卓乃收還其兵留拜議郎卓既遷都長安天下饑亂士大夫多不得其命而公業家有餘資日引賔客高會倡樂所贍救者甚衆乃與何顒荀攸謀共謀殺卓事泄顒等被執公業脫身自武闗走東歸袁術術上以為揚州刺史未至官道卒時年四十一孔融字文舉魯國人孔子二十世孫也七世祖霸為元帝師位至侍中父宙太山都尉融㓜有異才年十嵗隨父詣京師時河南尹李膺以簡重自居不妄接士賔客敕外自非當世名人及與通家皆不得白融欲觀其人故造膺門語門者曰我是李君通家子弟門者言之膺請融問曰高明祖父嘗與僕有恩舊乎融曰然先君孔子與君先人李老君同德比義而相師友則融與君累世通家衆坐莫不歎息太中大夫陳煒後至坐中以告煒煒曰夫人小而聰了大未必竒融應聲曰觀君所言將不早慧乎膺大笑曰高明必為偉器年十三喪父哀悴過毁扶而後起州里歸其孝性好學博渉多該覽山陽張儉為中常侍侯覽所怨覽為刋章下州郡以名捕儉儉與融兄裦有舊亡抵於裦不遇時融年十六儉少之而不告融見其有窘色謂曰兄雖在外吾獨不能為君主邪因留舎之後事泄國相以下宻就掩捕儉得脫走遂并收裦融送獄二人未知所坐融曰保納舎藏者融也當坐之裦曰彼來求我非弟之過請甘其罪吏問其母母曰家事任長妾當其辜一門爭死郡縣疑不能決乃上讞之詔書竟坐裦焉融由是顯名州郡禮命皆不就辟司徒楊賜府時隱覈官僚之貪濁者將加貶黜融多舉中官親族尚書畏廹内寵召掾屬詰責之融陳對罪惡言無阿撓河南尹何進當遷為大將軍楊賜遣融奉謁賀進不時通融即奪謁還府投劾而去河南官屬恥之私遣劒客欲追殺融客有言於進曰孔文舉有重名將軍若造怨此人則四方之士引領而去矣不如因而禮之可以示廣於天下進然之既拜而辟融舉高第為侍御史與中丞趙舎不同託病歸家後辟司空掾拜中軍候在職三日遷虎賁中郎將會董卓廢立融每因對荅輙有匡正之言以忤卓㫖轉為議郎時黄巾寇數州而北海最為賊衝卓乃諷三府同舉融為北海相融到郡收合士民起兵講武馳檄飛翰引謀州郡張饒等羣軰二十萬衆從冀州還融逆擊為饒所敗乃收散兵保朱虛縣稍復鳩集吏民為黄巾所誤者男女四萬餘人更置城邑立學校表顯儒術薦舉賢良鄭元彭璆邴原等郡人甄子然臨孝存知名早卒融恨不及之乃命配食縣社其餘雖一介之善莫不加禮焉郡人無後及四方游士有死亡者皆為具棺而斂葬之時黄巾復來侵暴融乃出屯都昌為賊管亥所圍融逼急乃遣東萊太史慈求救於平原相劉備備驚曰孔北海復知天下有劉備邪即遣兵三千救之賊乃散走時袁曹方盛而融無所協附左丞黄祖稱有意謀勸融有所結納融知紹操終圖漢室不欲與同故怒而殺之融負其才氣志在靖難而才疎意廣迄無成功在郡六年劉備表領青州刺史建安元年為袁譚所攻自春至夏戰士所餘裁數百人流矢雨集戈矛内接融隱几讀書談笑自若城夜陷乃奔山東妻子為譚所虜及獻帝都許徴融為將作大匠遷少府每朝會訪對融輙引正定議公卿大夫皆𨽻名而已初太傅馬日磾奉使山東及至淮南數有意於袁術術輕侮之遂奪取其節求去又不聽因欲逼為軍師日磾深自恨遂嘔血而斃及喪還朝廷議欲加禮融乃獨議曰日磾以上公之尊秉髦節之使衘命直指寧輯東夏而曲媚姦臣為所牽率章表署用輙使首名附下罔上姦以事君昔國佐當晉軍而不撓宜僚臨白刃而正色王室大臣豈得以見脅為辭又袁術僭逆非一朝一夕日磾隨從周旋歴嵗漢律與罪人交闗三日已上皆應知情春秋魯叔孫得臣卒以不發揚襄仲之罪貶不書日鄭人討幽公之亂斵子家之棺聖上哀矜舊臣未忍追案不宜加禮朝廷從之時論者多欲復肉刑融乃建議曰古者敦厖善否不别吏端刑清政無過失百姓有罪皆自取之末世陵遲風化壞亂政撓其俗法害其人故曰上失其道民散久矣而欲繩之以古刑投之以殘棄非所謂與時消息者也紂斮朝渉之脛天下謂為無道夫九牧之地千八百君若各刖一人是下常有千八百紂也求俗休和弗可得已且被刑之人慮不念生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙高英布為世大患不能止人遂為非也適足絶人還為善耳雖忠如鬻權信如卞和智如孫臏寃如巷伯才如史遷達如子政一離刀鋸沒世不齒是太甲之思庸穆公之霸秦南睢之骨立衛武之初筵陳湯之都賴魏尚之守邊無所復施也漢開改惡之路凡為此也故明德之君遠度深惟棄短就長不茍革其政者也朝廷善之卒不改焉是時荆州牧劉表不供職貢多行僭偽遂乃郊祀天地擬儀社稷詔書班下其事融上疏請為隱諱其事以崇國防五年南陽王馮東海王祗薨帝傷其早殁欲為脩四時之祭以訪於融融言前梁懷王臨江愍王齊哀王臨淮懷王並薨無後同産昆弟即景武昭明四帝是也未聞前朝脩立祭祀恐於典禮不合遂止初曹操攻屠鄴城袁氏子婦多見侵畧操子丕私納袁熙妻甄氏融乃與操書稱武王伐紂以妲己賜周公操不悟問出何經典對曰以今度之想當然耳後操討烏桓又嘲之曰大將軍遠征蕭條海外昔肅愼不貢楛矢丁零盜蘇武牛羊可并案也時年饑兵興操表制酒禁融以書爭之曰酒之為德久矣古先哲王類帝禋宗和神定人以濟萬國非酒莫以也故天垂酒星之耀地列酒泉之郡人著㫖酒之德堯不千鍾無以建太平孔非百觚無以堪上聖樊噲解戹鴻門非豕肩鍾酒無以奮其怒趙之厮養東迎其王非引巵酒無以激其氣高祖非醉斬白虵無以暢其靈景帝非醉幸唐姬無以開中興袁盎非醇醪之力無以脫其命定國不酣飲一斛無以決其法故酈生以高陽酒徒著功於漢屈原不哺醩歠醨取困於楚由是觀之酒何負於政哉又書曰昔徐偃王行仁義而亡今令不絶仁義燕噲以讓失社稷今令不禁謙退魯因儒而損今令不棄文學夏商亦以婦人失天下今令不斷婚姻而將酒獨急者疑但惜榖耳非以為戒也融見操雄詐漸著數不能堪故發辭偏宕多致乖忤又嘗奏宜凖古王畿之制千里寰内不以封建諸侯操疑其所論建漸廣益憚之然以融名重天下外相容忍而潛忌正議慮鯁大業初山陽郗慮字鴻豫少受學於鄭元有時名獻帝嘗見慮及融問融曰鴻豫何所優長融曰可與適道未可與權慮舉笏曰融昔宰北海政散人亡其權安在遂與融互相長短以至不穆至是慮為御史大夫承望風㫖以微法奏免融官因顯明讐怨操以書譬解融然實激厲之也融不逆其詐書報謝之嵗餘復拜太中大夫融寛容少忌好士喜誘後進及退閑職賔客日盈其門常歎曰坐上客常滿尊中酒不空吾無憂矣與蔡邕素善邕卒後有虎賁士貌類於邕融每酒酣引與同坐曰雖無老成人且有典刑融聞人之善若出諸已言有可採必演而成之面告其短而退稱所長薦達名士多所奬進知而未言以為己過故海内英俊皆信服之曹操既積嫌忌而郗慮復構成其罪遂令丞相軍謀祭酒路粹枉狀奏融曰少府孔融昔在北海見王室不靜而招合徒衆欲規不軌云我大聖之後而見滅於宋有天下者何必卯金刀及與孫權使語謗訕朝廷又融為九列不遵朝儀禿巾微行唐突宫掖又前與白衣禰衡跌蕩放言云父之於子當有何親論其本意實為情欲發耳子之於母亦復奚為譬如寄物缻中出則離矣既而與衡更相贊揚衡謂融曰仲尼不死融荅曰顔回復生大逆不道宜極重誅書奏下獄棄市時年五十六妻子皆被誅初女年七嵗男年九嵗以其㓜弱得全寄他舎二子方奕棊融被收而不動左右曰父執而不起何也荅曰安有巢毁而卵不破乎主人有遺肉汁男渴而飲之女曰今日之禍豈得久活何賴知肉味乎兄號哭而止或言於曹操遂盡殺之及收至女謂兄曰若死者有知得見父母豈非至願乎乃延頸就刑顔色不變莫不傷之初京兆人脂習元升與融相善每戒融剛直及被害許下莫敢收者習往撫尸曰文舉舎我死吾何用生為操聞之大怒將收習殺之會赦得免魏文帝深好融文辭每歎曰揚班之儔也募天下有上融文章者輙賞以金帛所著詩頌碑文論議六言策文表檄教令書記凡二十五篇文帝以習有欒布之節加中散大夫還家年八十餘卒皇甫嵩字義眞安定朝那人度遼將軍規之兄子也父節鴈門太守嵩少有文武志介好詩書習弓馬初舉孝廉茂才太尉陳蕃大將軍竇武連辟並不就靈帝公車徴為議郎遷北地太守初鉅鹿張角自稱大賢良師奉事黄老畜養弟子跪拜首過首式受反符水呪說以療病病者頗愈百姓信向之角因遣弟子八人使於四方以善道化天下轉相誑惑十餘年間衆徒數十萬連結郡國自青徐幽冀荆揚兖豫八州之人莫不畢應遂置三十六方方猶將軍號也大方萬餘人小方六七千各立渠帥訛言蒼天已死黄天當立嵗在甲子天下大吉以白土書京城寺門及州郡官府皆作甲子字中平元年大方馬元義等先收荆揚數萬人期會發於鄴元義往來京師以中常侍封諝徐奉等為内應約以三月五日内外俱起未及作亂而張角弟子濟南唐周上書告之於是車裂元義於洛陽靈帝以周章下三公司𨽻使鉤盾令周斌將三府掾屬按驗宫省直衛及百姓有事角道者誅數千餘人推考冀州逐捕角等角等知事以露晨夜馳敕諸方一時俱起皆着黄巾為標幟時人謂之黄巾亦名為蛾賊蛾魚綺反即蟻字也殺人以祠天角稱天公將軍角弟寳稱地公將軍寳弟梁稱人公將軍所在燔燒官府劫畧聚邑州郡失據長吏多逃亡旬日之間天下嚮應京師震動詔敕州郡修理攻守簡練器械自函谷大谷廣城伊闕轘轅旋門孟津小平津諸闗並置都尉召羣臣會議嵩以為宜解黨禁出中藏錢西園廐馬以班軍士帝從之於是發天下精兵博選將帥以嵩為左中郎將持節與右中郎將朱雋共發五校三河騎士及募精勇合四萬餘人嵩雋各統一軍共討穎川黄巾雋前與賊波才戰戰敗嵩因進保長社波才引大衆圍城嵩兵少軍中皆恐乃召軍吏謂曰兵有竒變不在衆寡今賊依草結營易為風火若因夜縱燒必大驚亂吾出兵擊之四面俱合田單之功可成也其夕遂大風嵩乃約敕軍士皆束苣乘城使銳士間出圍外縱火大呼城上舉燎應之嵩因鼓而奔其陣賊驚亂奔走會帝遣騎都尉曹操將兵適至嵩操與朱雋合軍更戰大破之斬首數萬級封嵩都鄉侯嵩雋乘勝進討汝南陳國黄巾追波才於陽翟擊彭脫於西華並破之餘賊降散三郡悉平又進擊東郡黄巾卜已於倉亭生禽卜已斬首七千餘級時北中郎將盧植及東中郎將董卓討張角並無功而還乃詔嵩進兵討之嵩與角弟梁戰於廣宗梁衆精勇嵩不能尅明日乃閉營休士以觀其變知賊意稍懈乃潛夜勒兵雞鳴馳赴其陣戰至晡時大破之斬梁獲首三萬級赴河死者五萬許人焚燒車重三萬餘兩悉虜其婦子繫獲甚衆角先以病死乃剖棺戮尸傳首京師嵩又與鉅鹿太守馮翊郭典攻角弟寳於下曲陽又斬之首獲十餘萬人築京觀於城南即拜嵩為左車騎將軍領冀州牧封槐里侯食槐里美陽兩縣合八千户以黄巾既平故改年為中平嵩奏請冀州一年田租以贍饑民帝從之百姓歌曰天下大亂兮市為墟母不保子兮妻失夫賴得皇甫兮復安居嵩溫䘏士卒甚得衆心每軍行頓止須營幔修立然後就舎帳軍士皆食已乃嘗飯吏有因事受賂者嵩更以錢物賜之吏懷慙或至自殺嵩既破黄巾威震天下而朝政日亂海内虛困故信都令漢陽閻忠干說嵩曰難得而易失者時也時至不旋踵者幾也故聖人順時以動智者因幾以發今將軍遭難得之運蹈易駭之機而踐運不撫臨機不發將何以保大名乎嵩曰何謂也忠曰天道無親百姓與能今將軍受鉞於暮春收功於末冬兵動若神謀不再計摧彊易於折枯消堅甚於湯雪旬月之間神兵電掃封戸刻石南向以報威德震本朝風聲馳海外雖湯武之舉未有高將軍者也今身建不賞之功體兼高人之德而北面庸主何以求安乎嵩曰夙夜在公心不忘忠何故不安忠曰不然昔韓信不忍一餐之遇而棄三分之業利劒以揣其喉方發悔毒之歎者機失而謀乖也今主上勢弱於劉項將軍權重於淮陰指撝足以振風雲叱咤可以興雷電赫然奮發因危抵頽崇恩以綏先附振武以臨後服徴冀方之士動七州之衆羽檄先馳於前大軍響振於後蹈流漳河飲馬孟津誅閹宦之罪除羣凶之積雖僮兒可使奮拳以致力女子可使褰裳以用命况厲熊羆之士因迅風之勢哉功業已就天下已順然後請呼上帝示以天命混齊六合南面稱制移寳器於將興推亡漢於己墜實神機之至會風發之良時也木既朽不雕衰世難佐若欲輔難佐之朝雕朽敗之木是猶逆坂走丸迎風縱棹豈云易哉且今宦豎羣居同惡如市上令不行權歸近習昬主之下難以久居不賞之功䜛人側目如不早圖後悔無及嵩懼曰非常之謀不施於有常之埶創圖大功豈庸才所致黄巾細孽敵非秦項新結易散難以濟業且人未忘主天不祐逆若虛造不冀之功以速朝夕之禍孰與委忠本朝守其臣節雖云多䜛不過放廢猶有令名死且不朽反常之論所不敢聞忠知計不用因亡去會邊章韓遂作亂隴右明年春詔嵩廻鎭長安以衛園陵章等遂復入寇三輔使嵩因討之初嵩討張角路由鄴見中常侍趙忠舎宅踰制乃奏沒入之又中常侍張讓私求錢五千萬嵩不與二人由此為憾奏嵩連戰無功所費者多其秋徴還收左車騎將軍印綬削戸六千更封都鄉侯二千户五年梁州賊王國圍陳倉復拜嵩為左將軍督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之埶在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者動於九天之上不足者陷於九地之下今陳倉雖小城堅守固非九地之陷也王國雖彊而攻我之所不救非九天之埶也夫埶非九天攻者受害陷非九地守者不拔今國已䧟受害之地而陳倉保不拔之城我可不煩兵動衆而取全勝之功將何救焉遂不聽時王國圍陳倉自冬迄春八十日城堅守固竟不能拔衆疲敝果自解去嵩進兵擊之卓曰不可兵法窮寇勿迫歸衆勿追今我追國是迫歸衆追窮寇也困獸猶鬬蜂蠆有毒况大衆乎嵩曰不然前吾不擊避其銳也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬬志以整擊亂非窮寇也遂獨進擊之使卓為後拒戰大破之斬首萬餘級國走而死卓大慙恨由是忌嵩明年卓拜為并州牧詔使以兵委嵩卓不從嵩從子酈時在軍中說嵩曰本朝失政天下倒懸能安危定傾者唯大人與董卓耳今怨隙已結埶不俱存卓被詔委兵而上書自請此逆命也又以京師昬亂躊躇不進此懷姦也且其兇戾無親將士不附大人今為元師杖國威以討之上顯忠義下除國害此桓文之事也嵩曰專命雖罪專誅亦有責也不如顯奏其事使朝廷裁之於是上書以聞帝讓卓卓又增怨於嵩及後秉政初平元年乃徴嵩為城門校尉因欲害之嵩將行長史梁衍說曰漢室微弱閹豎亂朝董卓雖誅之而不能盡忠於國遂復寇掠京邑廢立從意今徴將軍大則危禍小則困辱今卓在洛陽而天子來西以將軍之衆精兵三萬迎接至尊奉令討逆發命海内徴兵羣帥袁氏逼其東將軍迫其西此成禽也嵩不從遂就徴有司承㫖奏嵩下吏將遂誅之嵩子堅壽與卓素善自長安亡走洛陽歸投於卓卓方置酒歡會堅壽直前質讓責以大義叩頭流涕坐者感動皆離席請之卓乃起牽與共坐使免嵩囚復拜議郎遷御史中丞及卓還長安公卿百官迎謁道次卓諷令御史中丞以下皆拜以屈嵩既而抵手言曰義眞犕犕音服未乎嵩笑而謝之曰安知明公乃至于是卓曰鴻鵠固有遠志但燕雀自不知耳嵩曰昔與公俱為鴻鵠不意明公今日變為鳯凰卓笑曰卿早服今可不拜卓乃執其手曰怖乎嵩曰明公以德輔政朝廷何怖之有若淫刑以逞天下皆懼豈獨嵩乎卓意乃解及卓被誅以嵩為征西將軍又遷車騎將軍其年秋拜太尉冬以流星䇿免復拜光祿大夫遷太常尋李傕作亂嵩以病卒贈驃騎將軍印綬拜家一人為郎嵩為人愛愼盡勤前後上表陳諫有補益者五百餘事皆手書毁草不宣於外又折節下士門無留客時人皆稱而附之堅壽亦顯名後為侍中辭不拜病卒朱雋字公偉會稽上虞人也少孤母常販繒為業雋以孝養致名為縣門下書佐輕財重義鄉閭敬之時同郡周規辟公府當行乃假郡庫錢百萬以為冠幘費而後倉卒督責規家貧無以償雋乃竊母繒帛為規解對母既失産業深恚責之雋曰小損當大益初貧後富必然理也本縣長山陽度尚見而竒之薦於太守韋毅稍歴郡職太守尹端以雋為主簿熹平二年端坐討賊許昭失利為州所奏應棄市雋乃羸服間行輕齎數百金到京師賂主章吏遂得刋定州奏故端得輸作左校端喜於降免而不知其由雋亦終無所言後太守徐珪舉雋孝廉再遷除蘭陵令政有異能為東海相所表會交趾部羣賊並起牧守輕弱不能制又交趾賊梁龍等萬餘人與南海太守孔芝反叛攻破郡縣光和元年即拜雋交趾刺史令過本郡簡募家兵及所調合五千人分為兩道而入既到州界按甲不前先遣使詣郡觀賊虛實宣揚威德以震動其心既而與七郡兵俱進逼之遂斬梁龍降者數萬人旬月盡定以功封都亭侯千五百戸賜黄金五十觔徴拜諫議大夫及黄巾起公卿多薦雋有才畧拜為右中郎將持節與左中郎將皇甫嵩討潁川汝南陳國諸賊悉破平之嵩乃上言其狀以功歸雋於是進封西鄉侯遷鎭賊中郎將時南陽黄巾張曼成起兵稱神上使衆數萬殺郡守褚裒屯宛下百餘日為後太守秦頡所殺其衆更以趙𢎞為帥聚十餘萬衆據宛城雋與荆州刺史徐璆及秦頡合兵萬八千人圍𢎞自六月至八月不拔有司奏欲徴雋司空張溫上疏曰昔秦用白起燕用樂毅皆曠年歴載乃能克敵雋討潁川以有功効引師南指方畧已設臨軍易將兵家所忌宜假以嵗月責其成功靈帝乃止雋因急擊𢎞斬之賊餘帥韓忠復據宛拒雋雋兵少不敵乃張圍結壘起土山以臨城内鳴鼓攻其西南賊悉衆赴之雋自將精兵五千掩其東北乘城而入忠乃退保小城惶懼乞降司馬張超及徐璆秦頡皆欲聽之雋曰兵有形同而埶異者昔秦項之際民無定主故賞附以勸來耳今海内一統唯黄巾造寇納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱賊長寇非良計也因急攻連戰不尅雋登土山望之顧謂張超曰吾知之矣賊今外圍周固内營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當况十萬乎其害甚矣不如撤圍并兵入城忠見圍解埶必自出出則意散易破之道也既而解圍忠果出戰雋因擊大破之乘勝逐北數千里斬首萬餘級忠等遂降而秦頡積忿忠遂殺之餘衆懼不自安復以孫夏為帥還屯宛中雋急攻之夏走追至西鄂精山又破之復斬萬餘級賊遂解散明年春遣使者持節拜雋右車騎將軍振旅還京師以為光祿大夫增邑五千更封錢塘侯加位特進以母喪去官起家復為將作大匠轉少府太僕自黄巾賊後復有黑山黄龍白波右校郭大賢青牛角于氐根張白騎劉石老髭文八平漢大計司𨽻掾哉雷公浮雲飛鷰白雀楊鳯于毒五鹿李大目白繞畦固苦唒才由反之徒起山谷間不可勝數其大聲者稱雷公騎白馬者為張白騎輕便者號飛鷰多髭者號于氐根大眼者為大目如此稱號各有所因大者二三萬小者六七千賊帥常山人張燕輕勇趫捷故軍中號曰飛燕善得士卒心乃與中山常山趙郡上黨河内諸山谷寇賊更相交通衆至百萬號曰黑山賊河北諸郡縣並被其害朝廷不能討燕乃遣使至京師奏書乞降遂拜燕平難中郎將使領河北諸山谷事嵗得舉孝廉計吏燕後漸寇河内逼近京師於是出雋為河内太守將家兵擊却之其後諸賊多為袁紹所定事在紹傳復拜雋為光禄大夫轉屯騎尋拜城門校尉河南尹時董卓擅政以雋宿將外甚親納而心實忌之及闗東兵盛卓懼數請公卿會議徙都長安雋輙止之卓雖惡雋異已然貪其名重乃表遷太僕以為己副使者拜雋辭不肯受因曰國家西遷必孤天下之望以成山東之釁臣不見其可也使者詰曰召君受拜而君拒之不問徙事而君陳之其故何也雋曰副相國非臣所堪也遷都計非事所急也辭所不堪言所非急臣之宜也使者曰遷都之事不聞其計就有未露何所承受雋曰相國董卓具為臣說所以知耳使人不能屈由是止不為副卓後入闗留雋守洛陽而雋與山東諸將通謀為内應既而懼為卓所襲乃棄官奔荆州卓以𢎞農楊懿為河南尹守洛陽雋聞復進兵還洛懿走雋以河南殘破無所資乃東屯中牟移書州郡請師討卓徐州刺史陶謙遣精兵三千餘州郡稍有所給謙乃上雋行車騎將軍董卓聞之使其將李傕郭汜等數萬人屯河南拒雋雋逆擊為傕汜所破雋自知不敵留闗下不敢復前及董卓被誅傕汜作亂雋時猶在中牟陶謙以雋名臣數有戰功可委以大事乃與諸豪桀共推雋為太師移檄牧伯同討傕等奉迎天子於是謙及前揚州刺史周乾琅邪相陰德東海相劉馗彭城相汲廉北海相孔融沛相袁忠太山太守應劭汝南太守徐璆前九江太守服䖍博士鄭元等同共奏記於雋請受節度會李傕用太尉周忠尚書賈詡䇿徴雋入朝軍皆憚入闗欲應陶謙等雋曰以君召臣義不俟駕况天子語乎且傕汜小豎樊稠傭兒無他遠畧又埶力相敵變難必作吾乘其間大事可濟遂辭謙議而就傕徴復為太僕謙等遂罷初平四年代周忠為太尉錄尚書事明年秋以日食免復行驃騎將軍事持節鎭闗東未發會李傕殺樊稠而郭汜又自疑與傕相攻長安中亂故雋不出留拜大司農獻帝詔雋與太尉楊彪等十餘人譬郭汜令與李傕和汜不肯遂留質雋等雋素剛即日發病卒子皓亦有才行官至豫章太守董卓字仲頴隴西臨洮人也性麄猛有謀少嘗遊羌中盡與諸豪帥相結後歸耕於野諸豪帥有來從之者卓為殺耕牛與共宴樂豪帥感其意歸相斂得雜畜十餘頭以遺之由是以健俠知名為州兵馬掾常徼守塞下卓膂力過人雙帶兩鞬左右馳射為羌胡所畏桓帝末以六郡良家子為羽林郎從中郎張奐為軍司馬共擊漢陽叛羌破之拜郎中賜縑九千匹卓曰為者則已有者則士乃悉分與吏兵無所留稍遷西域戊已校尉坐事免後為并州刺史河東太守中平元年拜東中郎將持節代盧植擊張角於下曲陽軍敗抵罪其冬北地先零羌及枹罕河闗羣盜反叛遂共立湟中義從胡北宫伯玉李文侯為將軍殺護羌校尉泠徴伯玉等乃劫致金城人邊章韓遂使專任軍政共殺金城太守陳懿攻燒州郡明年春將數萬騎入寇三輔侵逼園陵託誅宦官為名詔以卓為中郎將副左車騎將軍皇甫嵩征之嵩以無功免歸而邊章韓遂等大盛朝廷復以司空張温為車騎將軍假節執金吾袁滂為副拜卓破虜將軍與盪寇將軍周盛並統於温并諸郡兵歩騎各十餘萬屯美陽以衛園陵章遂亦進兵美陽温卓與戰輒不利十一月夜有流星如火長十餘丈照章遂營中驢馬盡鳴賊以為不祥欲歸金城卓聞之喜明日乃與右扶風鮑鴻等并兵俱攻大破之斬首數千級章遂敗走榆中温乃遣周愼將三萬人追討之温參軍事孫堅說愼曰賊城中無榖皆外轉糧食堅願得萬人斷其運道將軍以大兵繼後賊必困乏而不敢戰若走入羌中并力討之則涼州可定也愼不從引軍圍榆中城而章遂分屯葵園狹反斷愼運道愼懼乃棄車重而退温時亦使卓將兵三萬討先零羌卓於望垣北為羌胡所圍糧食將絶進退逼急乃於所度水中偽立􅋣以為捕魚而潛從􅋣下過軍比賊追之決水已深不得度時衆軍敗退唯卓全師而還屯於扶風封斄鄉侯邑千户三年春遣使者持節就長安拜張温為太尉三公在外始之於温其冬徴温還京師韓遂乃殺邊章及伯玉文侯擁兵十餘萬進圍隴西太守李相如反與遂連和共殺涼州刺史耿鄙而鄙司馬扶風馬騰亦擁兵反叛又漢陽王國自號合衆將軍皆與韓遂合共擁王國為主悉令領其衆寇掠三輔五年圍陳倉乃拜卓前將軍與左將軍皇甫嵩擊破之韓遂等復共廢王國而劫故信都令漢陽閻忠使督統諸部忠恥為衆所脅感恚病死遂等稍爭權利更相殺害其諸部曲並各分乖六年徴卓為少府不肯就上書言所將湟中義從及秦胡兵皆詣臣曰牢直不畢廪賜斷絶妻子饑凍挽臣車使不得行羌胡敝腸狗態臣不能禁止輒將順安慰增異復上朝廷不能制頗以為慮及靈帝寢疾璽書拜卓為并州牧令以兵屬皇甫嵩卓復上書言曰臣既無老謀又無壯士天恩誤加掌戎十年士卒大小相狎彌久戀臣畜養之恩為臣奮一旦之命乞將之北州効力邊垂於是駐兵河東以觀時變及帝崩大將軍何進司𨽻校尉袁紹謀誅宦官而太后不許乃私呼卓將兵入朝以脅太后卓得召即時就道并上書曰中常侍張讓等竊倖承寵濁亂海内臣聞揚湯止沸莫若去薪潰癰雖痛勝於内食昔趙鞅興晉陽之甲以逐君側之惡人今臣輒鳴鐘鼓如洛陽請收讓等以清姦穢卓未至而何進敗虎賁中郎將袁術乃燒南宫欲討宦官而中常侍段珪等劫少帝及陳留王夜走小平津卓遠見火起引兵急進未明到城西聞少帝在北芒因往奉迎帝見卓將兵卒至恐怖涕泣卓與言不能辭對與陳留王語遂及禍亂之事卓以王為賢且為董太后所養卓自以與太后同族有廢立意初卓之入也歩騎不過三千自嫌兵少恐不為逺近所服率四五日輒夜潛出軍近營明旦乃大陳旌鼓而還以為西兵復至洛中無知者尋而何進及弟苗先所領部曲皆歸於卓卓又使吕布殺執金吾丁原而并其衆卓兵士大盛乃諷朝廷策免司空劉𢎞而自代之因集議廢立百僚大會卓乃奮首而言曰大者天也其次君臣所以為政皇帝闇弱不可以奉宗廟為天下主今欲依伊尹霍光故事更立陳留王如何公卿以下莫敢對卓又抗言曰昔霍光定策延年按劒有敢沮大議皆以軍法從之坐者震動尚書盧植獨曰昔太甲既立不明昌邑罪過千餘故有廢立之事今上富於春秋行無失德非前事之比也卓大怒罷坐明日復集羣僚於崇德前殿遂脅太后策廢少帝曰皇帝在喪無人子之心威儀不類人君今廢為𢎞農王乃立陳留王是為獻帝又議太后蹙迫永樂太后至令憂死逆婦姑之禮無孝順之節遷於永安宫遂以弑崩卓遷太尉領前將軍事加節傳斧鉞虎賁更封郿侯卓乃與司徒黄琬司空楊彪俱帶鈇鑕詣闕上書追理陳蕃竇武及諸黨人以從人望於是悉復蕃等爵位擢用子孫尋進卓為相國入朝不趨劒履上殿封母為池陽君置令丞是時洛中貴戚室第相望金帛財産家家殷積卓縱放兵士突其廬舎淫畧婦女剽虜資物謂之搜牢二字皆去音人情崩恐不保朝夕及何后葬發開文陵卓悉取藏中珍物又姧亂公主妻畧宫人虐刑濫罰睚眦必死羣僚内外莫能自固卓嘗遣軍至陽城時人㑹於社下悉令就斬之駕其車重載其婦女以頭繫車轅呼歌而還又壊五銖錢更鑄小錢悉取洛陽及長安銅人鐘虡飛廉銅馬之屬以充鑄焉故貨賤物貴榖石數萬又錢無輪郭文章不便人用時人以為秦始皇見長人於臨洮乃鑄銅人卓臨洮人也而今毁之雖成毁不同凶暴相類焉卓素聞天下同疾閹宦誅殺忠良及其在事雖行無道而猶忍性矯情擢用羣士乃任吏部尚書漢陽周珌侍中汝南伍瓊尚書鄭公業長史何顒等以處士荀爽為司空其染黨錮者陳紀韓融之徒皆為列卿幽滯之士多所顯㧞以尚書韓馥為冀州刺史侍中劉岱為兖州刺史陳留孔伷為豫州刺史頴川張咨為南陽太守卓所親愛並不處顯職但將校而已初平元年馥等到官與袁紹之徒十餘人各興義兵同盟討卓而伍瓊周珌陰為内主初靈帝末黄巾餘黨郭太等復起西河白波谷轉寇太原遂破河東百姓流轉三輔號為白波賊衆十餘萬卓遣中郎將牛輔擊之不能却及聞東方兵起懼乃鴆殺𢎞農王欲徙都長安㑹公卿議太尉黄琬司徒楊彪廷爭不能得而伍瓊周珌又固諫之卓因大怒曰卓初入朝二子勸用善士故相從而諸君到官舉兵相圖此二君賣卓卓何用相負遂斬瓊珌而彪琬恐懼詣卓謝曰小人戀舊非欲沮國事也請以不及為罪卓既殺瓊珌旋亦悔之故表彪琬為光禄大夫於是遷天子西都長安長安遭赤眉之亂宫室營寺焚滅無餘是時唯有高廟京兆府舎遂便時幸焉後移未央宫於是盡徙洛陽人數百萬口於長安歩騎驅蹙更相蹈藉饑餓寇掠積尸盈路卓自留屯畢圭苑中悉燒宫室官府居家二百里内無復孑遺又使呂布發諸帝陵及公卿以下冡墓收其珍寳時長沙太守孫堅亦率豫州諸郡兵討卓卓遣將徐營李䝉四出虜掠營遇堅於梁與戰破堅生禽頴川太守李旻亨之卓所得義兵士卒皆以布纒裹倒立於地熱膏灌殺之時河南太守王匡屯兵河陽津將以圖卓卓遣疑兵挑戰而潛使銳卒從小平津過津北破之死者畧盡明年孫堅收合散卒進屯梁縣之陽人卓遣將胡軫吕布攻之布與軫不相能軍中自驚恐士卒散亂堅追擊之軫布敗走卓遣將李傕詣堅和堅拒絶不受進軍大谷距洛九十里卓自出與堅戰於諸陵墓間卓敗走却屯澠池聚兵於陜堅進洛陽宣揚城門更擊吕布布復敗走堅乃埽除宗廟平塞諸陵分兵出函谷闗至新安澠池間以伐卓卓謂長史劉艾曰闗東諸將數敗矣無能為也唯孫堅少戇諸將軍宜愼之乃使東中郎將董越屯澠池中郎將段煨屯華隂中郎將牛輔屯安邑其餘中郎將校尉布在諸縣以禦山東卓諷朝廷使光祿勲宣璠持節拜卓為太師位在諸侯王上乃引還長安百官迎路拜揖卓遂僭擬車服乘金華青蓋爪畫兩幡時人號竿摩車言其服飾近天子也竿摩謂相逼近也今俗以事干人者謂之相竿摩以弟旻為左將軍封鄠侯兄子璜為侍中中軍校尉皆典兵事於是宗族内外並居列位其子孫雖在髫齓男皆封侯女為邑君數與百官置酒宴會淫樂縱恣乃結壘於長安城東以自居又築塢於郿高厚七丈號曰萬嵗塢積榖為三十年儲自云事成雄據天下不成守此足以畢老至郿行塢公卿以下祖道於横門外横音光門名也卓施帳幔飲設誘降北地反者數百人於坐中殺之先斷其舌次斬手足或鑿其眼目以鑊煮之未及得死偃轉盃案間會者戰慄亡失匕箸而卓飲食自若諸將有言語蹉跌便戮於前又稍誅闗中舊族陷以叛逆時太史望氣者言當有大臣戮死者卓乃使人誣衛尉張温與袁術交通遂笞温於市殺之以塞天變前温出屯美陽令卓與邊章等戰無功温召又不時應命既到而辭對不遜時孫堅為温參軍勸温陳兵斬之温曰卓有威名方倚以西行堅曰明公親帥王師威振天下何恃於卓而頼之乎堅聞古之名將仗鉞臨衆未有不斷斬以示威武者也故穰苴斬莊賈魏絳戮揚干今若縱之自虧威重後悔何及温不能從而卓猶懐忌恨故及於難温字伯愼少有名譽累登公卿亦隂與司徒王允共謀誅卓事未及發見害越騎校尉汝南伍孚忿卓凶毒志手刃之乃朝服懐佩刀以見卓孚語畢辭去卓起送至閤以手撫其背因出刀刺之不中卓自奮得免急呼左右執殺孚而大詬曰虜欲反邪孚大言曰恨不得磔裂姦賊於都市以謝天地言未畢而斃時王允與吕布及僕射士孫瑞謀誅卓有人書吕字於布上負而行於市歌曰布乎布乎又有童謡言千里草何青青十日下猶不生又作董逃之歌有告卓者而卓不悟三年四月帝疾新愈大會未央殿卓朝服升車既而馬驚墜泥還入更衣其少妻止之卓不從遂行乃陳兵夾道自壘及宫左歩右騎屯衛周匝令吕布等扞衛前後王允乃與士孫瑞宻表其事使瑞自書詔以授布令騎都尉李肅與布同心勇士十餘人偽着衛士服於北掖門内以待卓卓將至馬驚不行怪懼欲還布勸令進遂入門肅以㦸刺之卓衷甲不入傷臂墜車顧大呼曰吕布何在布曰有詔討賊臣董卓卓大罵曰庸狗敢如是邪布應聲持矛刺卓趣兵斬之主簿田儀及卓倉頭前赴其尸布又殺之馳齎赦書以令宫陛内外士卒皆稱萬嵗百姓歌舞於道長安中士女賣其珠玉衣裝市酒肉相慶者塡滿街肆使皇甫嵩攻卓弟旻於郿塢殺其母妻男女盡滅其族乃尸卓於市天時始熱卓素充肥脂流於地守尸吏然火置卓臍中光明達曙如是積日諸袁門生又聚董氏之尸焚灰揚之於路塢中珍蔵有金二三萬觔銀八九萬觔錦綺繢縠紈素竒玩積如邱山初卓以牛輔子壻素所親信使以兵屯陜輔分遣其校尉李傕郭汜張濟將歩騎數萬擊破河南尹朱雋於中牟因掠陳留潁川諸縣殺畧男女所過無復遺類吕布乃使李肅以詔命至陜討輔等逆與肅戰肅敗走𢎞農布誅殺之其後牛輔營中無故大驚輔懼乃齎金寳踰城走左右利其貨斬輔送首長安傕汜等以王允吕布殺董卓故忿怒并州人并州人其在軍者男女數百人皆誅殺之牛輔既敗衆無所依欲各散去傕等懼乃遣使詣長安求乞赦免王允以為一嵗不可再赦不許之傕等益懐憂懼不知所為武威人賈詡時在傕軍說之曰聞長安中議欲盡誅涼州人諸君若棄軍單行則一亭長能束君矣不如相率而西以攻長安為董公報仇事濟奉國家以正天下若不克走未後也傕等然之各相謂曰京師不赦我我當以死決之若攻長安尅則得天下矣不尅則鈔三輔男女財物西歸鄉里尚可延命衆以為然於是共結盟率軍數千晨夜西行王允聞之乃遣卓故將胡軫徐榮擊之於新豐榮戰死軫以衆降傕隨收兵比至長安已十餘萬與卓故部曲樊稠李䝉等合圍長安城城峻不可攻守之八日吕布軍有叟兵内反叟兵蜀兵也漢世謂蜀為叟孔安國注尚書云蜀叟也引傕衆得入城潰放兵虜掠死者萬餘人殺衛尉种拂等吕布戰敗出奔王允奉天子保宣平城門樓上於是大赦天下李傕郭汜樊稠等皆為將軍遂圍門樓共表請司徒王允出問太師何罪允窮蹙乃下後數日見殺傕等葬董卓於郿并收董氏所焚尸之灰合斂一棺而葬之葬日暴風大雨霆震卓墓流水入藏漂其棺木傕又遷車騎將軍開府領司𨽻校尉假節汜後將軍稠右將軍張濟為鎭東將軍並封列侯傕汜稠共秉朝政濟出屯𢎞農以賈詡為左馮翊欲侯之詡曰此救命之計何功之有固辭乃止更以為尚書典選明年夏大雨晝夜二十餘日漂没人庶又風如冬時帝使御史裴茂訊詔獄原繫者二百餘人其中有為傕所枉繫者傕恐茂赦之乃表奏茂擅出囚徒疑有姦故請收之詔曰災異屢降隂雨為害使者衘命宣布恩澤原解輕微庶合天心欲釋寃結而復罪之乎一切勿問初卓之入闗要韓遂馬騰共謀山東遂騰見天下方亂亦欲倚卓起兵興平元年馬騰從隴右來朝進屯霸橋時騰私有求於傕不獲而怒遂與侍中馬宇右中郎將劉範前涼州刺史种邵及中部將杜禀合兵攻傕連日不決韓遂聞之乃率衆來欲和騰傕既而復與騰合傕使兄子利共郭汜樊稠與騰等戰於長平觀下遂騰敗斬首萬餘級种邵劉範等皆死遂騰走還涼州稠等又追之韓遂使人語稠曰天下反覆未可知相與州里今雖少違要當大同欲共一言乃駢馬交臂相加笑語良久軍還利告傕曰樊韓駢馬笑語不知其辭而意愛甚宻於是傕稠始相猜疑猶加稠及郭汜開府與三公合為六府皆參選舉時長安中盜賊不禁白日虜掠傕汜稠乃三分城内各備其界猶不能制而其子弟縱横侵暴百姓是時榖一斛五十萬豆麥二十萬人相食啖白骨委積臭穢滿路帝使侍御史侯汶出太倉米豆為饑人作麋經日而死者無限帝疑賦䘏有虛乃親於御前自加臨檢既知不實使侍中劉艾出讓有司於是尚書令以下皆詣省閤謝奏收侯汶考實詔曰未忍致汶于理可杖五十自是後多得全濟明年春傕因會刺殺樊稠於坐由是諸將各相疑異傕汜遂復理兵相攻安西將軍楊定者故卓部曲將也懼傕忍害乃與汜合謀迎天子幸其營傕知其計即使兄子暹將數千人圍宫以車三乘迎天子皇后太尉楊彪謂暹曰古今帝王無在人臣家者諸君舉事當上順天心柰何如是暹曰將軍計決矣帝於是遂幸傕營彪等皆徒從亂兵入殿掠宫人什物傕又徙御府金帛乘輿器服而放火燒宫殿官府居人悉盡帝使楊彪與司空張喜等十餘人和傕汜汜不從遂質留公卿彪謂汜曰將軍達人間事柰何君臣分爭一人劫天子一人質公卿此可行邪汜怒欲手刃彪彪曰卿尚不奉國家吾豈求生邪左右多諫汜乃止遂引兵攻傕矢及帝前又貫傕耳傕將楊奉本白波賊帥乃將兵救傕於是汜衆乃退是日傕復移帝幸其北塢唯皇后宋貴人俱傕使校尉監門隔絶内外尋復欲徙帝於黄白城羣臣惶懼司徒趙温深解譬之乃止詔遣謁者僕射皇甫酈和傕汜酈先譬汜汜即從命又詣傕不聽曰郭多盜馬虜耳何敢欲與我同邪必誅之君觀我方畧士衆足辨郭多不多又劫質公卿所為如是而君茍欲左右之邪汜一名多酈曰今汜質公卿而將軍脅主誰輕重乎傕怒訶遣酈因使虎賁王昌追殺之昌偽不及酈得以免傕乃自為大司馬與郭汜相攻連月死者以萬數張濟自陜來和解二人仍欲遷帝權幸𢎞農帝亦思舊京因遣使敦請傕求東歸十反乃許車駕即日發邁李傕出屯曹陽以張濟為驃騎將軍復還屯陜遷郭汜車騎將軍楊定後將軍楊奉興義將軍又以故牛輔部曲董承為安集將軍汜等並侍送乘輿汜遂復欲脅帝幸郿定奉承不聽汜恐變生乃棄軍還就李傕車駕進至華隂寧輯將軍段煨乃具服御及公卿以下資儲請帝幸其營初楊定與煨有隙遂誣煨欲反乃攻其營十餘日不下而煨猶奉給御膳禀贍百官終無二意李傕郭汜既悔令天子東乃來救段煨因欲劫帝而西楊定為汜所遮亡奔荆州而張濟與楊奉董承不相平乃反合傕汜共追乘輿大戰於𢎞農東澗承奉軍敗百官士卒死者不可勝數皆棄其婦女輜重御物符䇿典籍畧無所遺射聲校尉沮雋被創墜馬李傕謂左右曰尚可活不雋罵之曰汝等凶逆逼迫天子亂臣賊子未有如汝者傕使殺之天子遂露次曹陽承奉乃譎傕等與連和而宻遣閒使至河東招故白波帥李樂韓暹胡才及南匈奴右賢王去卑並率其衆數千騎來與承奉共擊傕等大破之斬首數千級乘輿乃得進董承李樂擁衛左右胡才楊奉韓暹去卑為後距傕等復來戰奉等大敗死者甚於東澗自東澗兵相連綴四十里方得至陜乃結營自守時殘破之餘虎賁羽林不滿百人皆有離心董承奉等夜乃潛議過河使李樂先度具舟船舉火為應帝歩出營臨河欲濟岸高十餘丈乃以絹縋而下餘人或匍匐岸側或從上自投死亡傷殘不復相知爭赴船者不可禁制董承以戈擊披之斷手指於舟中者可掬同濟唯皇后宋貴人楊彪董承及后父執金吾伏完等數十人其宫女皆為傕兵所掠奪凍溺死者甚衆既到太陽止於人家然後幸李樂營百官饑餓河内太守張楊使數千人負米貢餉帝乃御牛車因都安邑河内太守王邑奉獻綿帛悉賦公卿以下封邑為列侯拜胡才東征將軍張楊為安國將軍皆假節開府其壘壁羣豎競求拜職刻印不給至乃以錐畫之或齎酒肉就天子燕飲又遣太僕韓融至𢎞農與傕汜等連和傕乃放遣公卿百官頗歸宫人婦女及乘輿器服初帝入闗三輔戸口尚數十萬自傕汜相攻天子東歸後長安城空四十餘日彊者四散羸者相食二三年間闗中無復人跡建安元年春諸將爭權韓暹遂攻董承承奔張楊楊乃使承先繕脩洛宫七月帝還至洛陽幸楊安殿張楊以為己功故因以楊名殿乃謂諸將曰天子當與天下共之朝廷自有公卿大臣楊當出扞外難何事京師遂還野王楊奉亦出屯梁乃以張楊為大司馬楊奉為車騎將軍韓暹為大將軍領司𨽻校尉皆假節鉞暹與董承並留宿衛暹矜功恣雎干亂政事董承患之潛召兖州牧曹操操乃詣闕貢獻禀公卿以下因奏韓暹張楊之罪暹懼誅單騎奔楊奉帝以暹楊有翼車駕之功詔一切勿問於是封衛將軍董承輔國將軍伏完等十餘人為列侯贈沮雋為𢎞農太守曹操以洛陽殘荒遂移帝幸許楊奉韓暹欲要遮車駕不及曹操擊之奉暹奔袁術遂縱暴揚徐間明年左將軍劉備誘奉斬之暹懼走還并州道為人所殺胡才李樂留河東才為怨家所害樂自病死張濟饑餓出至南陽攻穰戰死郭汜為其將伍習所殺三年使謁者僕射裴茂詔闗中諸將段煨等討李傕夷三族以段煨為安南將軍封閺鄉侯四年張楊為其將楊醜所殺以董承為車騎將軍開府自都許之後權歸曹氏天子總已百官備員而已帝忌操專偪乃宻詔董承使結天下義士共誅之承遂與劉備同謀未發會備出征承更與偏將軍王服長水校尉种輯議郎呉碩結謀事泄承服輯碩皆為操所誅韓遂與馬騰自還涼州更相戰爭乃下隴據闗中操方事河北慮其乘間為亂七年乃拜騰征南將軍遂征西將軍並開府後徴段煨為大鴻臚病卒復徴馬騰為衛尉封槐里侯騰乃應召而留子超領其部曲十六年超與韓遂舉闗中背曹操操擊破之遂超敗走騰坐夷三族超攻殺涼州刺史韋康復據隴右十九年天水人楊阜破超超奔漢中降劉備韓遂走金城羌中為其帳下所殺初隴西人宗建在枹罕自稱河首平漢王署置百官三十許年曹操因遣夏侯淵擊建斬之涼州悉平通志卷一百十三上
