body:
  text: 通志卷七十四宋右廸功郎鄭樵漁仲撰災祥略第一序天日月星地山附水旱火風災祥序仲尼既没先儒駕以妖妄之說而欺後世後世相承罔敢失墜者有兩種學一種妄學務以欺人一種妖學務以欺天凡說春秋者皆謂孔子寓褒貶於一字之間以隂中時人使人不可曉觧三傳唱之於前諸儒從之於後盡推己意而誣以聖人之意此之謂欺人之學說洪範者皆謂箕子本河圖洛書以明五行之㫖劉向創釋其傳於前諸史因之而為志於後析天下災祥之變而推之於金木水火土之域乃以時事之吉凶而曲為之配此之謂欺天之學夫春秋者成周之典也洪範者皇極之書也臣舊作春秋傳專以明王道削去三家褒貶之說所以杜其妄今作災祥畧專以記實迹削去五行相應之說所以絶其妖且萬物之理不離五行而五行之理其變無方離固為火矣而離中有水坎固爲水矣而坎中有火安得直以秋大水為水行之應成周宣榭火為火行之應乎况周得木徳而有赤烏之祥漢得火徳而有黃龍之瑞此理又如何邪豈其晉厲公一視之遠周單公一言之徐而能關於五行之沴乎豈其晉申生一衣之偏鄭子臧一冠之異而能關於五行之沴乎如是則五行之繩人甚於三尺矣臣竊觀漢儒之說以亂世無如春秋之深災異無如春秋之衆者是不考其實也臣每謂春秋雖三王之亂世猶治於漢唐之盛時何哉春秋二百四十年而日食三十六唐三百年而日食過百舉春秋地震五漢和平中積二十一日而地百二十四動舉春秋山傾者二漢文帝時一年之間齊楚山二十九所同日圯舉春秋大水者八後漢延平中一月之間郡國三十六大水其他小小災異則二百四十年之事不及後世一年也如李梅冬實鸜鵒來巢之類在後世不勝書使春秋之人而親見後世事豈但慟哭流涕而已哉以春秋視後世不為亂世也何哉後世之法度不及春秋之法度後世之人才不及春秋之人才其所以感和氣而弭災異者又安可望春秋乎嗚呼天地之間災祥萬種人間禍福㝠不可知奈何以一虫之妖一氣之戾而一一質之以為禍福之應其愚甚矣况凶吉有不由於災祥者宋之五石六鷁可以為異矣而内史叔興以為此隂陽之事非吉凶所生魏安平太守王基筮於管輅輅曰君家有三怪一則生男墮地走入竈死二則大蛇牀上衘筆三則烏來入室與燕鬬兒入竈者宋無忌之妖蛇銜筆者老書佐之妖烏與燕鬬者老鈴下之妖此三者足以為異而無凶兆無所憂也王基之家卒以無患觀叔興之言則國不可以災祥論興衰觀管輅之言則家不可以變怪論休咎惟有和氣致祥乖氣致異者可以為通論天天裂漢孝惠帝二年天開東北長二十餘丈廣十餘丈晉惠帝元康二年春二月天西北大裂太安二年秋八月庚午天中裂為二無雲有聲如雷者三己成帝咸和四年天裂西北穆帝升平五年秋八月卯夜天中裂廣三四丈有聲如雷野雉皆鳴裂梁武帝天監十三年春二月庚辰朔震于西南天如太清二年夏六月天裂于西北長十丈濶二丈光出如電冬十二月戊申天西北裂有光如火陳後主至徳元年冬十二月戊午夜天開自西北至東南其内有青黄雜色隆隆若雷天鳴晉元帝太興二年秋八月戊戌天鳴東南有聲如風水相薄閏三年冬十月壬辰天鳴至甲午止安帝隆安五年月癸丑天東南鳴二年秋九月戊子天東南又鳴天義熙元年秋八月天鳴在東南元興元年秋八月鳴二年秋九月又鳴雷梁武帝中大通六年閏十二月丙午天西南有聲如大同十一年夏六月辛巳竟天有聲如風水相薄風陳宣帝大建十二年秋九月癸未夜天東南有聲如水相擊十四年秋八月癸未天有聲如風水相擊乙酉夜亦如之九月辛亥夜天東北有聲如蟲飛漸移西北後主至徳元年秋九月丁巳天東南有聲如蟲飛如北齊文宣帝天保四年夏四月戊午天西南有大聲雷後周武帝建徳六年春正月天西方有聲如雷戌隋文帝開皇二十年夏四月壬天有聲如瀉水自南而北天變色宋文帝元嘉十八年秋七月天黄色洞照有齊武帝永明八年夏六月丙申大雷雨黃光竟天照地狀如金無雲而雨隋文帝開皇末二無雲而雷漢成帝元延元年夏四月丁酉無雲有雷聲光耀耀四面下至地昏止後漢獻帝初平三年夏五月丙申無雲而雷春四年夏五月癸酉無雲而雷隋文帝開皇二十年二月丁丑無雲而雷天雨螽春秋魯文公三年雨螽于宋襄公二年雨螽于江天雨魚漢孝武帝鴻嘉四年秋雨魚長五寸以下天雨土漢孝昭帝始元中雨土晝昏雨梁武帝大同元年冬十月天黃塵四二年冬十一月丙寅天雨黄塵大後魏宣武帝景明年凉州雨土如霧後周宣帝象二年春正月戊申雨細黄土子隋文帝開皇二年春二月庚京師雨土天雨毛漢武帝天漢元年春三月天雨白毛雨三年秋八月天雨白氂年西晉武帝泰始八年蜀地白毛隋文帝開皇六秋七月乙丑京師雨毛如馬尾長者二尺餘短者有六七寸天雨沙梁簡文帝大寳元年春正月丁巳天雨黄沙天雨灰商紂末年天雨灰天梁武帝大同三年春正月壬寅雨􅁅黃色天雨草漢元帝永光三年秋八月天雨草而葉相樛結大如彈丸帝平帝元始三年春正月天雨草狀如永光時宋明太始四年雨草于宫中天雨水銀隋文帝仁壽二年宫中再雨水銀花至四年陜州又雨天雨氷夏桀時雨氷元後漢時京師雨氷張駿太元年秋九月雨氷天雨榖後漢光武建武三十一年陳留雨榖形如稗實天雨血漢孝惠帝四年雨血於宜陽一頃所孝哀帝建平四年夏四月山陽湖陵雨血廣三尺長五尺大者如錢小者如麻子餘晉惠帝元康六年春三月彭城吕縣有流血東西百歩永康元年春三月尉氏雨血皆陳後主至徳三年有赤物隕于太極殿前初下時鐘鳴又嘗進白飲忽變為血沾殿階瀝瀝然至御榻主北齊武成帝河清二年冬十二月雨血於太原後武平中有血㸃地自斛律明月宅至太廟天雨木氷春秋魯成公十六年春正月雨木氷魏文帝黃初六年春正月雨木氷八晉元帝大興三年春二月辛未雨木氷十穆帝永和年春正月乙巳雨木氷孝武帝太元四年冬十二月乙巳雨木氷天雨肉漢孝桓帝建和三年秋七月北地廉縣雨肉似羊肋或大如手魏公孫淵時襄平北市生肉長圍各數尺有頭目口喙無手足而動搖晉愍帝建興元年冬十二月河東雨肉天雨石商紂末年天雨石如大甕孝惠帝三年隕石緜諸一秦始皇時隕石年漢孝武帝征和四春二月隕石于雍二聲間四百里建孝元帝建昭元年春正月戊辰隕石梁國六成帝始四年春正月隕石槀四肥累一五陽朔三年春三月壬戌隕石東郡八隕鴻嘉二年夏月隕石杜衍三元延三年春三月石都關二隕孝哀帝建平元年春正月隕石北地十其九月甲辰石虞二平帝元始二年夏六月隕石鉅鹿二自惠盡平隕石凡後漢殤帝延平元年一皆有光耀雷聲成哀尤屢九月隕石陳留四孝桓帝延熹七年春三月隕石右扶風一鄠又隕石二皆有聲如雷魏明帝青龍三年春正月乙亥隕石于壽光晉武帝太康五年夏五月丁巳隕石于温及河陽各二六年春正月隕石于温三成帝咸和八年夏五月隕石于凉州二安隋文帝開皇十七年石隕于武滏陽間十餘天雨金秦獻公時櫟陽雨金晉惠帝二年雨金塔隋文帝仁壽四年諸軍州舍利成陜州雨金日日食周平王五十一年春二月己巳日有食之二桓王十一年秋七月壬辰朔日有食之莊王年冬十月朔日有食之日惠王元年春三月日有食之亥八年夏六月辛未朔有食之九年冬十二月癸朔日有食之月十三年秋九月庚午朔日有食之三二十二年秋九戊申朔日有食之襄王四年春月庚午朔日有食之有七年夏三月日有食之月二十六年春二月癸亥日食之匡王元年夏六辛丑日有食之丙定王六年秋七月甲子日有食之既日八年夏四月辰日有食之十五年夏六月癸卯有食之十簡王十一年夏六月丙寅朔日有食之春十二年冬二月丁巳朔日有食之靈王十三年二月乙未朔日有食之辰十四年秋八月丁巳日有食之庚十九年冬十月丙朔日有食之二十年秋九月戌朔日有食之冬十月庚辰朔日有食之七二十二年春二月癸酉朔日有食之二十三年秋月甲子朔日有食之既八月癸巳朔日有食之夏二十六年冬十二月乙卯朔日有食之景王十年四月甲辰朔日有食之甲十八年夏六月丁巳朔日有食之月二十年夏六月辰朔日有食之二十一年秋七壬午朔日有食之夏二十五年冬十二月癸酉朔日有食之月敬王二年五月乙未朔日有食之九年冬十二辛亥朔日有食之二十五年春三月辛亥朔日有食之秋二十二年冬十月丙寅朔日有食之二十五年八月庚辰朔日有食之六三十九年夏五月庚申朔日有食之貞定王二十年日有食之晝晦星見史失紀月之考王六年六月日有食之二威烈王十六年日有食安王五年日有食之十年日有食之晝晦年烈王元年日有食之紀七年日有食之二赧王十四日有食之晝晦並失月秦莊襄王年四月日有食之晦漢高帝三年冬十月甲戌晦日有食之十一月癸卯日有食之九年夏六月乙未晦日有食之既晦惠帝七年春正月辛丑朔日有食之夏五月丁卯先一日食幾盡髙后二年夏六月丙戌晦日有食之月七年春正月己丑晦日有食之月文帝二年冬十一癸卯晦日有食之三年冬十丁酉晦日有食之十一月丁卯晦日有食之壬後四年夏四月丙寅晦日有食之景帝三年二月子晦日有食之四年十月戊戌晦日有食之甲七年冬十一月庚寅晦日有食之中二年秋九月戌晦日有食之三年秋九月戊戌晦日有食之幾盡日四年冬十月戊午日有食之六年秋七月辛亥晦有食之後元年秋七月乙巳晦日有食之九武帝建元二年春二月丙戌朔日有食之三年秋月丙子晦日有食之元光元年秋七月癸未日有食之五元朔二年春三月乙亥晦日有食之元狩元年夏月乙巳晦日有食之元鼎五年夏四月丁丑晦日有食之八太始四年冬十月甲寅晦日有食之征和四年秋月辛酉晦日有食之元昭帝始元三年冬十一月壬辰朔日有食之年元鳯年秋七月乙亥晦日有食之宣帝地節元冬十二月癸亥晦日有食之月五鳯元年冬十二月乙酉朔日有食之四年夏四辛丑晦日有食之元帝永光二年春三月壬戌朔日有食之壬四年夏六月戊寅晦日有食之建昭五年夏六月申晦日有食之成帝建始三年冬十二月戊申朔日有食之乙河平元年夏四月己亥晦日有食之三年秋八月卯晦日有食之丁四年春三月癸丑朔日有食之九陽朔元年春二月未朔日有食之建始元年秋月丁巳晦日有食之晦二年春二月己酉晦日有食之晦三年春正月己卯日有食之四年秋七月辛未日有食之年元延元年春正月己亥朔日有食之年哀帝元壽元春正月辛丑朔日有食之與惠帝七同月日二年夏四月壬辰晦日有食之九平帝元始元年夏五月丁巳朔日有食之二年秋月戊申晦日有食之天孺子嬰居攝元年冬十月丙辰朔日有食之月王莾鳯元年三月壬申晦日有食之三年秋七戊子晦日有食之五光武建武二年春正月甲子朔日有食之三年夏月乙卯晦日有食之五年秋九月丙寅晦日有食之晦六年秋九月丙寅晦日有食之丑七年春三月癸亥日有食之十六年春三月辛晦日有食之月十七年春二月乙亥晦日有食之三二十二年夏五乙未晦日有食之二十五年春月戊申晦日有食之五二十九年春二月丁巳朔日有食之三十一年夏月癸酉晦日有食之中元元年冬十一月甲子晦日有食之十明帝永平三年秋八月壬申晦日有食之八年冬月壬