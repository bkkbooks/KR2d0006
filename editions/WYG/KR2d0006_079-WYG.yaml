燒後宫屋三千中大通元年秋九月辛巳朱雀航華表災大同三年春正月辛丑夜朱雀門災月十一年夏四月同泰寺災元帝承聖三年冬十一江陵城内火燒居人數千家明陳武帝永定三年秋七月乙丑重雲殿災後主禎二年夏五月甲午東冶鑄鐵有物赤色大如數升自天墜鎔所有聲隆隆如雷鐵飛出牆外燒人家是嵗大皇佛寺塔火從中起飛至石頭燒死者甚衆四東魏孝静帝天平二年冬十月甲寅閶闔門災廣年夏六月壬午閶闔門災武定五年秋八月宗都火燒數千家年北齊後主天綂五年鄴宫九龍殿災延燒西廊四夏四月辛未鄴宫昭陽殿災延燒宣光瑶華等殿之隋文帝開皇十四年將祠泰山令使者致石像神祠所未至數里野火􅣐起燒像碎如小塊年煬帝大業十二顯陽門災風大風春秋僖公十六年春正月六鷁退飛過宋都大風也漢髙帝二年夏四月大風從西北起折木發屋揚砂晝晦人孝文帝二年夏六月淮南王都壽春大風毁民室殺十月楚王都彭城大風從東南來毁市門殺人月孝武帝建元四年夏有風赤如血風元光五年秋七大風拔木征和二年夏四月大發屋折木以孝昭帝元鳯元年燕王都薊大風雨拔宫中木七園上十六枚壊城樓建始元年夏四月壬寅晨大風從西北起雲氣赤黃四塞天下終日夜下着地者黃土塵也冬十二月大風抜甘泉畤中大木十圍以上孝平帝元始四年冬大風吹長安東門屋瓦且盡注王莽地皇四年漢兵起圍莽大風屋瓦皆飛雨下如後漢安帝永初元年二十八大風月二年夏京都及郡國四十八大風拔樹三年夏五京都大風拔南郊道梓樹九十六枚都七年秋八月京都大風拔樹國元初二年春二月京大風拔樹六年夏四月沛勃海大風拔樹二萬餘枚三永寜元年冬十月自三月至是月京師及郡國三十大風延光元年冬十二月京師及郡國二十七大風風夏六月郡國十一大風二年春正月河東潁川大三年京師及郡國三十六大風拔樹十孝靈帝建寜二年夏四月癸巳京都大風拔郊道樹圍以上百餘枚其後晨迎氣黃郊道於雒水西橋逢暴風雨逆鹵薄車或發蓋還不至郊使有司行禮迎氣西郊亦壹如此中平二年夏四月庚戌大風六五年夏六月丙寅大風拔樹魏孝獻帝初平四年夏月右扶風大風發屋拔木齊王正始九年冬十一月大風數十日發屋折木十二月戊午晦尤甚動太極東閣嘉平元年春正月壬辰朔西北大風發屋折木昏塵蔽天深呉大帝太元元年秋八月朔大風江海涌溢平地水八尺拔髙陵樹二千株石碑蹉動呉城兩門飛落永㑹稽王建興元年冬十二月丙辰大風震電景帝安元年冬十一月甲午風四轉五復䝉霧連日十二月丁卯夜有大風拔木揚砂咸晉武帝泰始五年夏五月辛卯朔廣平大風折木寜元年夏五月下邳廣陵大風壞千餘家折樹木其月甲申廣陵下邳大風折木三年八月河間大風折木太康二年夏五月濟南暴風折木傷麥六月髙平大風折木發壊邸閻四十餘區七月上黨又大風傷秋稼八年夏六月郡國八大風夏九年春正月京都風發屋拔樹庚孝惠帝元康四年六月大風拔樹五年夏四月寅夜暴風城東渠波浪殺人秋七月下邳大風壊廬舍九月鴈門新興太原上黨災風傷稼六年夏四月大風子九年夏六月颷風吹賈謐朝服飛數百丈十一月甲朔京都連大風發屋折木永康元年春二月丁酉大風飛砂拔木三月又大風雷電夏四月張華第舍颷風起折木飛繪折軸六七冬十一月戊午朔大風從西北來折木飛砂石六日止乙永寜元年秋八月郡國三大風永興元年春正月丑西北大風趙王倫建始元年春正月癸酉倫祠太廟災風暴起塵四合年孝懐帝永嘉四年夏五月大風折木元帝永昌元秋七月丙寅大風屋瓦皆飛八月暴風壊屋拔御道柳樹百餘株其風縱横無常若風自八方來者成帝咸康四年春三月壬辰成都大風發屋折木升康帝建元元年秋七月庚寅晉陵呉郡災風穆帝平元年秋八月丁未疾風大五年春正月戊午朔疾風年哀帝太和六年春二月風迅急孝武帝寜康元春三月京都大風火大起從三年春三月戊申朔暴風迅起從丑上來須臾逆轉子上來飛砂揚礫太元二年春二月乙丑朔暴風折木閏三月甲子朔暴風疾雨俱至發屋折木夏六月己巳暴風揚砂石三年春三月乙丑雷雨暴風發屋折木夏六月長安風拔苻堅宫中樹四年秋八月乙未暴風揚砂石十二年春正月壬子夜暴風發屋折木秋七月甲辰大風折木乙十三年冬十二月己未大風晝晦十七年夏六月未大風折木飛落安帝元興二年春二月夜大風雨大航門屋瓦三年春正月桓元出遊大航南飄風飛其䡟輗蓋夏五月江陵又大風折木冬十一月辛卯朔西北疾風起拔樹五年閏十一月丁亥大風發屋六年夏五月壬辰大風拔北郊樹樹幾百年也并吹琅邪揚州二射堂倒壊是日盧循大艦飄没甲戌又風發屋折木四九年春正月大風白馬寺浮圖刹柱圻壊七十年夏月己丑朔大風拔木六月辛亥大風拔木月淮北大風壊廬舍十宋少帝景平二年春二月乙巳大風帝文帝元嘉二九年春三月壬午大風折木齊武永明四年春二月丙寅大風呉郡偏甚樹葉皆赤八八年夏六月都下大風發屋梁武帝天監六年秋月戊戌大風拔木拔元帝承聖三年冬十月丁卯帝出行江陵城柵大風木十一月甲申帝閲武於南城北風雨總集旗帳飃亂丁酉又大風城内火起百陳文帝天嘉六年秋七月癸未有大風自西南至廣餘歩擊壞靈臺侯樓臯門中閫宣帝大建十二年夏六月壬戌大風吹壞十三年秋九月癸未夜大風從北地來發屋抜樹石後主禎明二年夏六月丁巳大風自西北激濤水入頭是嵗大風拔朱雀門北齊武成帝河清二年大風三旬乃止夏後主天綂三年夏五月大風晝晦發屋拔樹四年六月甲辰大風拔樹武平七年春二月丙寅大風從西北起發屋拔樹五日乃止仁隋文帝開皇二年冬十二月京都大風發屋拔木壽元年夏五月壬辰大風拔木通志卷七十四
