以歴推之從嵗星也四星合聚漢孝平帝元始四年四星聚于柳張各五日後漢孝獻帝初平元年四星聚于箕尾七建安二十五年四星又聚西晉懐帝永嘉六年秋月四星聚于牛女之間熙孝武帝太元十九年冬十月四星合于氐塡安帝義三年春二月癸亥土火金水聚于奎婁從星也几年春二月壬辰木火土金聚于東井從嵗星也東後魏明元帝永興四年春二月壬辰木火土金聚于井後木火入鬼火節閔帝普泰元年冬十月甲寅金土木入參觜甚明三星合聚漢孝文帝後六年夏四月乙巳三星合于東井後孝景帝元年秋七月乙丑金木水三星俱合于張漢孝和帝永元二年春正月乙卯金木俱合于奎丙寅水又在奎辛未水金木在婁五年夏四月金火水俱聚於東井七年春二月癸酉金火俱在參戊寅在井秋八月甲寅水土金俱在軫冬十二月丙辰火金水俱在斗孝靈帝光和五年冬十月木火金合於虛相去各五六寸如連珠建孝獻帝初平元年冬十一月庚戌土火金合於尾安十八年秋木土火合于太㣲逆行留守帝坐百餘日晉惠帝元康三年塡星嵗星太白三星聚于畢昴孝懐帝永嘉六年秋七月火木金聚于牛女之間宋孝武帝大元十七年秋九月丁丑木火土同在氐文帝元嘉二十三年春二月金火水合於東井周後魏道武帝天賜四年春二月癸亥火土金聚後宣帝宣政元年夏六月壬午木火金合于井于静帝大象元年夏四月戊子金木水合井老人星梁天監四年秋八月庚子老人星見自此後每常以秋分後見於參南至春分而伏矣流星自上而降曰流自下而升曰飛至秦始皇二年三月乙未有流星大小西行不可勝數曉乃息漢孝昭帝始元中有流星下燕萬載宫極東去西元平元年春二月甲申晨有流星大如月衆星皆隨行三月丙戌流星出翼軫東北干太㣲入紫宫始出小且入大有光入有頃聲如雷三鳴乃止孝成帝建始元年秋九月戊子有流星出文昌色白光燭地長可五六丈大四圍所詘折委曲貫紫宫西在斗西北子亥間復詘如環北方不合留一刻所元延元年夏四月丁酉日晡時天腥晏隐隐如雷聲有流星頭大如缶長十餘丈皎然赤白色從日下東南去四面或大如盂或如雞子燿燿如雨下至昏止十綏和元年春二月辛未有流星從東南入北斗長數丈二刻所息北光武建武十年春三月癸卯流星如月從太㣲出入斗魁第六星色白旁有小星射者十餘枚滅則有聲如雷食頃止冬十二月己亥大流星如缶出柳西南行入軫且滅時分為十餘如遺火狀須臾有聲隐隐如雷北十二年春正月己未小星流百枚以上或西北或正或東北二夜止夏六月戊戌晨小星流百枚以上四靣行雷中元二年冬十月戊子大流星從西南東北行聲如孝明帝永平元年夏四月丁酉流星大如斗起天市樓西南行光照地星大如杯從織女西行光照地七年春正月戊子流孝章帝建初二年秋九月甲寅流星過紫宫中長數丈㪚為三滅有孝和帝永元元年春正月辛卯有流星起參長四丈光色黄白一云大如拳起參東南又云大如桃色赤起太㣲東蕃二月流星起天棓東北行二丈所滅色青白壬申夜有流星起太㣲東蕃長三丈三月丙辰流星大如桃起天津東至斗黄白頻有光壬戌有流星起天將軍東北行色黄無光行二年春二月丁酉有流星大如桃起紫宫東蕃西北五丈稍滅四月丙辰有流星大如𤓰起文昌東北西南行至少㣲有頃音如雷八月丁卯有流星如雞子起太㣲西東南行四丈所消冬十月癸未有流星大如碗起天津西行六丈所消十一月辛酉有流星大如拳起紫宫西行到胃消三年秋九月丁卯有流星大如雞子起紫宫西南至北斗柄間消黃七年春正月丁巳有流星起天津入紫宫中滅色青有光冬十二月乙卯有流星起文昌入紫宫消有十一年夏五月丙午有流星大如𤓰起氐西南行稍光白色十六年冬十月辛亥流星起勾陳北行二丈有光色黄月元興元年春二月庚寅有流星起角亢五丈所夏四辛亥有流星起斗東北行到須女秋七月己巳有流星起天市五丈所其色光赤孝順帝永和三年春二月辛丑有流星大如斗從西北行長八九尺色赤黃有聲隆隆然如雷孝桓帝永壽元年秋九月己酉晝有流星長二尺所色黃白行孝靈帝熹平二年夏四月有流星出文昌入紫宫蛇有首尾無身赤色有光照垣􅘘入光和元年夏四月癸丑流星犯軒轅第二星東北行北斗魁中中平中夏流星赤如火長三丈起河鼓入天市抵觸宦者星色白長二三丈後尾再屈食頃乃滅魏明帝景初二年秋八月丙寅夜有大流星長數十丈白色有芒鬛墜遼東襄平城東南分陳留王景元四年夏六月有大星二並如斗見西方流南北光照地隆隆有聲三蜀後主建興十三年諸葛亮屯渭南有星流投亮營投再還晉懐帝永嘉元年秋九月辛卯有大星如日自西南流于東北小者如斗相隨天盡赤聲如雷元帝永昌元年秋七月甲午有流星大如甕長百餘丈青赤色從西方來尾分為百餘岐方散赤成帝咸康三年夏六月辛未流星大如二斗魁色青光燿地出奎中没婁北西六年春二月庚午朔有流星大如斗光燿地出天市行入太㣲穆帝永和八年夏六月辛巳日未入有流星大如三斗魁從辰巳上東南行以晷度推之在奎斗之間蓋燕分也十年夏四月癸未流星大如斗色赤黃出織女没造父有聲如雷海西公太和四年冬十月壬申有大流星西下有聲如雷牽安帝隆安五年春三月甲寅流星赤色衆多西行經牛虚危天津閣道貫太㣲紫宫宋文帝元嘉十年冬十二月有流星大如甕尾長二十餘丈三孝武孝建初二月流星大如月西行梁武帝太清年春正月戊辰有流星長三十丈墮武庫中元帝承聖三年冬十一月庚子夜有流星墜江陵城後魏道武帝登國四年春三月丁未有大流星東南行尾屬地六七丈有