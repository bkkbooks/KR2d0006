body:
  text: 通志卷二百宋右廸功郎鄭樵漁仲撰四夷傳第七北國下烏桓鮮卑軻比能宇文莫槐徒河叚務勿塵附蠕蠕高車稽胡突厥西突厥鐵勒庫莫奚契丹室韋地豆于烏洛侯驅度寐霫㧞悉彌烏桓烏桓者本東胡也漢初匈奴冒頓滅其國餘類保烏桓山因以為號焉俗善騎射弋獵禽獸為事隨水草放牧居無常處以穹廬為舍東開向日食肉飲酪以毛毳為衣貴少而賤老其性悍塞怒則殺父兄而終不害其母以母有族類父兄無相仇報故也有勇健能理決鬭訟者推為大人無世業相繼邑落各有小帥數百千落自為一部大人有所召呼則刻木為信雖無文字而部衆不敢違犯氏姓無常以大人健者名字為姓大人以下各自畜牧營産不相徭役其嫁娶則先略女通情或半嵗百日然後送牛馬羊畜以為聘幣壻隨妻還家妻家無尊卑旦旦拜之而不拜其父母為妻家僕役一二年間妻家厚遣送女居處財物一皆為辦其俗妻後母報寡嫂死則歸其故夫計謀從用婦人唯鬭戰之事乃自決之父子男女相對踞蹲以髠頭為輕便婦人至嫁時乃養髮分為髻著句決飾以金碧猶中國有簂歩摇簂音吉悔反字或作國婦人首飾也續漢輿服志曰公卿列侯夫人紺繒幗釋名云皇后首飾上有埀珠歩則摇之也婦人能刺韋作文繡織氀毼氀毼罽也氀音力于反毼音胡達反男子能作弓矢鞍勒勒馬衘也鍜金鐵為兵器其土地宜穄及東牆東牆似蓬草實如穄子至十月而熟見鳥獸乳孕以别四節俗貴兵死斂屍以棺有哭泣之哀至葬則歌舞相送肥養一犬以彩繩纓牽并取死者所乘馬衣物皆燒而送之言以屬累犬屬累乃付託也屬音之欲反累音力瑞反使䕶死者神靈歸赤山赤山在遼東西北數千里如中國人死者䰟神歸岱山也博物志曰太山天帝孫也主召人䰟東方萬物始生故知人生命敬鬼神祠天地日月星辰山川及先大人有健名者祠用牛羊畢皆燒之其約法違大人言者罪至死若相賊殺者令部落自相報不止詣大人告之聽出馬牛羊以贖死其自殺父兄則無罪若亡畔為大人所捕者邑落不得受之皆徙逐於雍狂之地沙漠之中其土多蝮蛇在丁令西南烏孫東北焉丁令匈奴别種也令音零烏桓自為冒頓所破衆遂孤弱常臣伏匈奴嵗輸牛馬羊皮過時不具輙沒其妻子及漢武帝遣驃騎將軍霍去病撃破匈奴左地因徙烏桓於上谷漁陽右北平遼東五郡塞外為漢偵察匈奴動靜其大人嵗一朝見於是始置䕶烏桓校尉秩二千石擁節監領之使不得與匈奴交通昭帝時烏桓漸彊乃發匈奴單于冢墓以報冒頓之怨匈奴大怒乃東撃破烏桓大將軍霍光聞之因遣度遼將軍范明友將二萬騎出遼東邀匈奴而虜已引去明友乘烏桓新敗遂進撃之斬首六千餘級獲其三王首而還由是烏桓復㓂幽州明友輙破之宣帝時乃稍保塞降附及王莽篡位欲撃匈奴興十二部軍使東城將嚴尤領烏桓丁令兵屯代郡皆質其妻子於郡縣烏桓不便水土懼久屯不休數求謁去莽不肯遣遂自亡畔還為抄盗而諸郡盡殺其質由是結怨於莽匈奴因誘其豪帥以為吏餘者皆羈縻屬之光武初烏桓與匈奴連兵為冦代郡以東尤被其害居止近塞朝發穹廬暮至城郭五郡民庶家受其辜至於郡縣損壊百姓流亡其在上谷塞外白山者最為彊富建武二十一年遣伏波將軍馬援將三千騎出五阮關掩繫之關在代郡烏桓逆知悉相率逃走追斬百級而還烏桓復尾撃援後援遂晨夜奔歸北入塞馬死者千餘匹二十二年匈奴國亂烏桓乘弱撃破之匈奴轉北徙數千里漢南地空帝乃以幣帛賂烏桓二十五年遼西烏桓大人郝且等九百二十二人率衆向化詣闕朝貢獻奴婢牛馬及弓虎豹貂皮是時四夷朝賀絡驛而至天子乃命大會勞饗賜以珍寳烏桓或願留宿衛於是封其渠帥為侯王君長者八十一人皆居塞内布於縁邊諸郡令招來種人給其衣食遂為漢偵候助撃匈奴鮮卑時司徒班彪上言烏桓天性輕黠好為㓂賊若久放縱而無總領者必復侵掠居民但委主降掾吏蓋當時權置也下兵馬掾亦同恐非所能制臣愚以為宜復置烏桓校尉誠有益於附集省國家之邊慮帝從之於是始復置校尉於上谷寗城寗城縣名開營府并領鮮卑賞賜質子嵗時互市焉及明章和三世皆保塞無事安帝永初三年夏漁陽烏桓與右北平胡千餘宼代郡上谷秋鴈門烏桓率衆王無何與鮮卑大人邱倫等及南匈奴骨都侯合七千騎寇五原與太守戰於九原高渠谷九原縣屬五原郡漢兵大敗殺郡長吏乃遣車騎將軍何熙度遼將軍梁慬等撃大破之無何乞降鮮卑走還塞外是後烏桓稍復親附拜其大人戎末廆為親漢都尉廆音胡罪反順帝陽嘉四年冬烏桓寇雲中遮截道上商賈車牛千餘兩度遼將軍耿曅率二千餘人追撃不利又戰於沙南斬首五百級沙南縣屬雲中郡有蘭池城烏桓遂圍曅於蘭池城於是發積射士二千人度遼營千人配上郡屯以討烏桓烏桓乃退永和五年烏桓大人阿堅羌渠等與南匈奴左部句龍吾斯反畔中郎將張耽撃破斬之餘衆悉降桓帝永壽中朔方烏桓與休屠屠各並畔中郎將張奐撃平之延熹九年夏烏桓復與鮮卑及南匈奴鮮卑冦緣邊九部俱反張冀討之皆出塞去靈帝初烏桓大人上谷有難樓者衆九千餘落遼西有邱力居者衆五千餘落皆自稱王又遼東蘓僕延衆千餘落自稱峭王峭音七笑反右北平烏延衆八百餘落自稱汗魯王並勇健而多計䇿中平四年前中山太守張純畔入邱力居衆中自號彌天安定王遂為諸郡烏桓元帥寇掠青徐幽冀四州五年以劉虞為幽州牧虞購募斬純首北州乃定獻帝初平中邱力居死子樓班年少從子蹋頓有武略代王蹋音大蠟反總攝三郡衆皆從其號令建安初冀州牧袁紹與前將軍公孫瓚相持不決蹋頓遣使詣紹求和親遂遣兵助撃瓚破之紹矯制賜蹋頓難樓蘇僕延烏桓烏延等皆以單于印綬後難樓蘓僕延率其部衆奉樓班為單于蹋頓為王然蹋頓猶秉計策廣陽人閻柔少沒烏桓鮮卑中為其種人所歸信柔乃因鮮卑殺烏桓校尉邢舉而代之袁紹因寵慰柔以安北邊及紹子尚敗奔蹋頓時幽冀吏民奔烏桓者十萬餘户尚欲憑其兵力復圖中國會曹操平河北閻柔率鮮卑烏桓歸附操即以柔為校尉建安十二年曹操自征烏桓大破蹋頓於栁城斬之首虜二十餘萬人袁尚與樓班烏延等皆走遼東遼東太守公孫康並斬送之其餘衆萬餘落悉徙中國云西晉王浚為幽州牧有烏桓單于審登前燕慕容雋時有烏桓單于薛雲後燕慕容盛時有烏桓渠帥莫賀咄科㪍並其别種然皆微弱不足云矣鮮卑鮮卑者亦東胡之支也别依鮮卑山故因號焉其言語習俗與烏桓同唯㛰姻先髠頭以季春月大㑹於饒樂水上水在今營州北飲讌畢然後配合又禽獸異於中國者野馬原羊角端牛以角為弓俗謂之角端弓者郭璞注爾雅曰原羊似吳羊而大角出西方前書音義曰角端似牛角可為弓又有貂豽鼲子皮毛柔蝡豽音女滑反鼲音胡昆反貂鼲並䑕屬豽狗屬也故天下以為名裘漢初亦為冒頓所破還竄遼東塞外與烏桓相接未嘗通中國焉光武初匈奴彊盛率鮮卑與烏桓寇抄北邊殺略吏民無有寧嵗建武二十一年鮮卑與匈奴入遼東遼東太守祭彤撃破之斬獲殆盡由是震怖及南單于附漢北虜孤弱二十五年鮮卑始通驛使其後都護偏何等詣祭彤求自効功因令撃北匈奴左伊育訾部斬首二千餘級其後偏何連嵗出兵撃北虜還輙持首級詣遼東受賞賜三十年鮮卑大人於仇賁滿頭等率種人詣闕朝賀慕義内屬帝封於仇賁為王滿頭為侯時漁陽赤山烏桓歆志賁等數寇上谷永平元年祭彤復賂偏何撃歆志賁破斬之於是鮮卑大人皆求歸附並詣遼東受賞賜青徐二州給錢嵗二億七十萬為常明章二帝保塞無事和帝永元中大將軍竇憲遣右校尉耿䕫撃破北匈奴北單于逃走鮮卑因北轉徙據其地匈奴餘種留者尚有十餘萬落皆自號鮮卑鮮卑由此漸盛九年遼東鮮卑攻肥如縣肥如縣故城在今平州也太守祭參坐沮敗下獄死十三年遼東鮮卑冦右北平因入漁陽太守撃破之延平元年鮮卑復寇漁陽漁陽太守張顯率數百人出塞追之兵馬掾嚴授諫曰前道險阻賊勢難量宜且結營先令輕騎偵視之顯意甚鋭怒欲斬之因復進兵遇虜伏發士卒悉走唯授力戰身被十創手殺數人而死顯中流矢主簿衛福功曹徐咸皆自投赴顯俱殁於陣鄧太后䇿書褒歎賜顯錢六十萬以家三人為郎授福咸各錢十萬除一子為郎安帝永初中鮮卑大人燕荔陽詣闕朝賀鄧太后賜燕荔陽王印綬赤車參駕令止烏桓校尉所居寗城下通胡市因築南北兩部質館築館以受降賀鮮卑邑落百二十部各遣入質是後或降或畔與匈奴烏桓更相攻撃元初二年秋遼東鮮卑圍無慮縣無慮縣屬遼東郡也州郡合兵固保清野鮮卑無所得復攻扶黎營殺長吏扶黎縣屬遼東國故城在今營州東南四年遼西鮮卑連休等遂燒塞門寇百姓烏桓大人於秩居等與連休有宿怨共郡兵奔撃大破之斬首千三百級悉獲其生口牛馬財物五年秋代郡鮮卑萬餘騎連穿塞入寇分攻城邑燒宫寺殺長吏而去乃發緣邊甲卒黎陽營兵屯上谷以備之冬鮮卑入上谷攻居庸關復發緣邊諸郡黎陽營兵積射士歩卒二萬人屯列衝要六年秋鮮卑入馬城塞殺長吏馬城縣名屬代郡也度遼將軍鄧遵發積射士三千人及中郎將馬續率南單于與遼西右北平兵馬㑹出塞追撃大破之獲生口及牛羊財物甚衆又發積射士三千人馬三千匹詣度遼營屯守永寧元年遼西鮮卑大人烏倫其至鞬率衆詣鄧遵降奉貢獻詔封烏倫為率衆王其至鞬為率衆侯賜綵繒各有差建光元年秋其至鞬復叛冦居庸雲中太守成嚴撃之兵敗散功曹楊穆以身捍嚴與俱戰殁鮮卑於是圍烏桓校尉徐常於馬城度遼將軍耿䕫與幽州刺史龎參發廣陽漁陽涿郡中卒分為兩道救之常夜得潛出與䕫等并力並進攻賊圍解之鮮卑既累殺郡守膽意轉盛控弦數萬騎延光元年冬復寇鴈門定襄遂攻太原掠殺百姓二年冬其至鞬自將萬餘騎入東領候分為數道攻南匈奴於蔓栢縣名屬五原郡也薁鞬日逐王戰死殺千餘人三年秋復冦高柳撃破南匈奴殺漸將王順帝永建元年秋鮮卑其至鞬寇代郡太守李超戰死明年春中郎將張國遣從事將南單于兵歩騎萬餘人出塞撃破之獲其資重二千餘種時遼東鮮卑六千餘騎亦冦遼東元莬烏桓校尉耿曅發緣邊諸郡兵及烏桓率衆王出塞撃之斬首數百級大獲其生口牛馬什物鮮卑乃率種衆三萬人詣遼東乞降三年四年鮮卑頻寇漁陽朔方六年秋耿曅遣司馬將胡兵數千人出塞撃破之冬漁陽太守又遣烏桓兵撃之斬首八百級獲牛馬生口烏桓豪人扶潄官勇健潄音所救反每與鮮卑戰輙陷敵詔賜號率衆君陽嘉元年冬耿曅遣烏桓親漢都尉戎末廆率衆王侯咄歸等出塞抄撃鮮卑大斬獲而還賜咄歸等已下為率衆王侯長賜綵繒各有差鮮卑後冦遼東屬國於是曅乃移屯遼東無慮城拒之二年春匈奴中郎將趙稠遣從事將南匈奴骨都侯夫沈等出塞撃鮮卑破之斬獲甚衆詔賜夫沈金印紫綬及縑綵各有差秋鮮卑穿塞入馬城代郡太守撃之不能克後其至鞬死鮮卑冦盗差稀桓帝時鮮卑檀石槐者其父投鹿侯初從匈奴軍三年其妻在家生子投鹿侯歸怪欲殺其妻言嘗晝行聞雷震仰天視而雹入其口因吞之遂􅗖身十月而産此子必有竒異且宜長視投鹿侯不聴遂棄之妻私語家令収養焉名檀石槐年十四五勇健有智略異部大人抄取其外家牛羊檀石槐單騎追撃之所向無前悉還得所亡者由是部落畏服乃施法禁平曲直無敢犯者遂推以為大人檀石槐乃立庭於彈汗山歠仇水上歠音昌悦反去高柳北三百餘里兵馬甚盛東西部大人皆歸焉因南抄緣邊北拒丁零東郤夫餘西撃烏孫盡據匈奴故地東西四千餘里網羅山川水澤鹽池永壽二年秋檀石槐遂將三四千騎冦雲中延熹元年鮮卑冦邊冬使匈奴中郎將張奐率南單于出塞撃之斬首二百級二年復入鴈門殺數百人大抄掠而去六年夏千餘騎寇遼東屬國九年夏遂分騎數萬人入緣邊九部並殺掠吏民於是復遣張奐撃之鮮卑乃出塞去朝廷積患之而不能制遂遣使持印綬封檀石槐為王欲與和親檀石槐不肯受而冦抄滋甚乃自分其地為三部從右北平東至遼東接夫餘濊貊二十餘邑為東部從右北平以西上谷十餘邑為中部從上谷以西至敦煌烏孫二十餘邑為西部各置大人主領之皆屬檀石槐靈帝立幽并涼三州緣邊諸部無嵗不被鮮卑冦抄殺略不可勝數熹平三年冬鮮卑入北地太守夏育率休屠屠各追撃破之遷育為護烏桓校尉五年鮮卑寇幽州六年夏鮮卑寇三邊秋夏育上言鮮卑冦邊自春以來三十餘發請徵幽州諸郡兵出塞撃之一冬二春必能禽滅朝廷未許先是護羌校尉田晏坐事論刑被原欲立功自効乃請中常侍王甫求得為將因此議遣兵與育并力討賊帝乃拜晏為破鮮卑中郎將大臣多有不同乃召百官議朝堂議郎蔡邕上議曰自匈奴北遁鮮卑彊盛據其故地稱兵十萬加以關塞不嚴禁網多漏精金良鐵皆為賊有漢人逋逃為之謀主夫邊垂之患手足之蚧掻中國之困胷背之瘭疽也蚧音介掻新到反埤蒼曰瘭必燒反杜氏注左傳曰疽惡瘡也方今郡縣盗賊尚不能禁況醜虜而可服乎昔高祖忍平城之恥吕后棄慢書之垢方之於今何者為甚天設沙漠秦築長城漢起塞垣所以别内外異殊俗也茍無蹙國内侮之患則可矣豈與蟲螘狄冦計徃來哉雖或破之豈可殄盡而方令本朝為之旰食乎夫䘏人救急雖成郡列縣尚猶棄之況障塞之外未嘗為人居者乎備邊之術李牧善其宜保塞之論嚴尤申其要遺業猶在文章尚存循二子之䇿守先帝之規臣曰可矣帝不從遂遣夏育出高栁田晏出雲中匈奴中郎將臧旻率南單于出鴈門各將萬騎三道出塞二千餘里檀石槐命三部大人各帥衆逆戰育等大敗喪其節傳輜重各將數千騎奔還死者十七八三將檻車徵下獄贖為庶人冬鮮卑寇遼西光和元年冬又寇酒泉緣邊莫不被毒種衆日多田畜射獵不足給食檀石槐乃自徇行見烏侯秦水廣從數百里水停不流從子用反其中有魚不能得之聞倭人善網捕於是東撃倭人國得千餘家徙置秦水上捕魚以助糧食光和中檀石槐死時年四十五子和連代立和連才力不及父亦數為寇抄性貪淫斷法不平衆畔者且半後出攻北地廉人善弩射者㢘縣名屬北地郡射中和連即死其子騫曼年小兄子魁頭立後騫曼長大與魁頭爭國衆遂離散魁頭死弟歩度根立衆稍衰弱中兄扶羅韓亦别擁衆數萬為大人建安中曹操定幽州歩度根與軻比能等因烏桓校尉閻柔上貢獻後代郡烏桓能臣氐等叛求屬扶羅韓扶羅韓將萬餘騎迎之到桑乾氐等議以為扶羅韓部威禁寛緩恐不見濟更遣人呼軻比能比能即將萬餘騎到當共盟誓比能便於會上殺扶羅韓扶羅韓子泄歸泥及部衆悉屬比能比能自以殺泄歸泥父特又善遇之歩度根由是怨比能魏文帝踐阼田豫為烏桓校尉持節并護鮮卑屯昌平歩度根遣使獻馬帝拜為王後數與軻比能更相攻撃歩度根力不能抗將其衆萬餘落保太原鴈門郡歩度根乃使人招呼泄歸泥曰汝父為比能所殺不念報讐反屬怨家今雖厚待汝是欲殺汝計也不如還我我與汝是骨肉至親豈與讐等由是歸泥將其部落逃歸歩度根比能追之弗及黄初五年歩度根詣闕貢獻厚加賞賜是後一心守邊不為冦害而軻比能衆遂彊盛明帝即位務欲綏和戎狄以息征伐覊縻兩部而已青龍元年比能誘歩度根深結和親於是歩度根將泄歸泥及部衆悉保比能冦鈔并州殺略吏民帝遣驍騎將軍秦朗征之歸泥叛比能將其部衆降拜歸義王賜幢麾曲蓋鼓吹居并州如故歩度根為比能所殺軻比能軻比能本小種鮮卑以勇健斷法平端不貪財物衆推以為大人部落近塞自袁紹據河北中國人多亡叛歸之教作兵器鎧楯頗學文字故其勒御部衆擬則中國出入弋獵建立旌麾以鼓節為進退建安中因烏桓校尉閻柔上貢獻魏武西征關中田銀反河間比能將二千餘騎隨柔撃破銀後代郡烏丸反比能復助為寇害魏武以鄢陵侯彰為驍騎將軍北征大破之比能走出塞後復通貢獻延康初比能遣使獻馬魏文帝亦立比能為附義王黄初二年比能出諸魏人在鮮卑者五百餘家還居代郡明年比能帥部落大人小子代郡鳥丸修武盧等三千餘騎驅牛馬十萬餘口交市遣魏人千餘家居上谷後與東部鮮卑大人素利及歩度根三部爭鬭更相攻撃校尉田豫和合之使不得相侵五年比能復撃素利豫率輕騎徑進掎其後比能使别小帥𤨏奴拒豫豫進討破走之由是懷貳乃與輔國將軍鮮于輔書曰夷狄不識文字故校尉閻柔保我於天子我與素利為讐徃年攻撃之而田校尉助素利我臨陣使𤨏奴徃聞使君來即便引軍退歩度根數數鈔盗又殺我弟而誣我以鈔盗我夷狄雖不知禮義兄弟子孫受天子印綬牛馬尚知美水草况我有人心邪將軍當保明於天子輔得書以聞帝帝復使豫招納安慰比能衆遂彊盛控弦十餘萬騎每鈔掠得財物均平分付一決目前終無所私故得衆死力餘部大人皆敬憚之然猶未能及檀石槐也太和二年豫遣譯夏舍詣比能女壻鬱築鞬部舍為鞬所殺其秋豫將西部鮮卑蒲頭泄歸泥出塞討鬱築鞬大破之還至馬城比能自將三萬騎圍豫七日上谷太守閻志柔之弟也素為鮮卑所信志徃解喻即解圍去後幽州刺史王雄并領校尉撫以恩信比能數欵塞詣州貢獻至青龍元年比能誘納歩度根使叛并州與結和親自勒萬騎迎其累重於陘北并州刺史畢軌遣將軍蘇尚董弼等撃之比能遣子將騎與尚等㑹戰於樓煩臨陣害尚弼至三年中雄遣勇士韓龍刺殺比能更立其弟素利彌加厥機皆為大人在遼西右北平漁陽塞外道逺初不為邊患然其種衆多於比能也其後諸子爭立衆遂離散諸部大人慕容托跋更盛焉宇文莫槐宇文莫槐出於遼東塞外其先南單于之逺屬也世為東部大人其語與鮮卑頗異人皆翦髮而留其頂上以為首飾長過數寸則截短之婦女被長襦及足而無裳焉秋收烏頭為毒藥以射禽獸莫槐虐用其人為部下所殺更立其弟普撥為大人普撥死子邱不勒立娶代王鬱律女邱不勒死子莫廆立莫廆遣弟屈雲攻慕容廆慕容廆撃破之又遣别部素延伐慕容廆於棘城復為慕容廆所破時莫廆部衆彊盛自稱單于塞外諸部咸憚之莫廆死子遜昵延立率衆攻慕容廆於棘城廆子翰先戍於外遜昵延謂其衆曰翰素果勇必為人患宜先取之棘城不足憂也乃分騎數千襲翰翰聞之使人詐為叚末波使者逆謂遜昵延曰翰數為吾患久思除之今聞來討甚善當戒嚴相待宜兼路早赴翰設伏待之遜昵延以為信然長驅不備至於伏所為翰所敗翰馳使告廆乘勝遂進及晨而至廆亦盡鋭應之遜昵延率衆逆戰前鋒始交而翰已入其營縱火燎之衆乃大潰遜昵延單馬奔還悉俘其衆遜昵延父子世雄漠北又先得玉璽二紐自言為天所相每自誇大及此敗也乃卑辭厚幣遣使朝貢于代王什翼健什翼健嘉之以女妻焉遜昵延死子乞得龜立復伐慕容廆廆拒之乞得龜屯保澆水固壘不戰遣其兄悉跋惟襲廆子仁于栢林仁逆撃斬悉跋惟廆又攻乞得龜克之乞得龜單騎夜奔悉虜其衆乘勝長驅入其國城收資財億計徙部人數萬户以歸先是海出大龜枮死於平郭至是而乞得龜敗别部人逸豆歸殺乞得龜而自立與慕容皝迭相攻撃遣其國相莫渾伐皝而莫渾荒酒縱獵為皝所破死者萬餘人其後皝伐逸豆歸逸豆歸拒之為皝所敗殺其驍將渉亦干逸豆歸逺遁漠北遂奔髙麗皝徙其部衆五千餘落於昌黎自是散滅後周宇文氏之源蓋出於此徒河叚務勿塵附徒河叚就六眷出於遼西其伯祖日陸眷因亂被賣為漁陽烏丸大人庫辱官家奴諸大人集會幽州皆持唾壺唯庫辱官獨無乃唾日陸眷口中日陸眷因咽之西向拜天曰願使主君之智慧禄相盡移入我腹中其後漁陽大饑庫辱官以日陸眷為健使將人衆詣遼西逐食招誘亡叛遂至彊盛日陸眷死弟乞珍代立乞珍死子務勿塵代立即就六眷父也據遼西之地而臣於晉其所統三萬餘家控弦上馬四五萬騎晉惠帝時幽州刺史王浚以叚氏數為已用深徳之乃封務勿塵為遼西公假大單于印綬浚使務勿塵率萬餘騎伐石勒於恒山封龍山下大破之務勿塵死就六眷立就六眷與弟匹磾從弟末波等率五萬餘騎圍石勒於襄國勒登城望之見將士皆釋仗寢卧無警備之意勒因其懈怠選募勇健穿城突出直衝末波生禽之置之座上與飲宴盡歡約為父子盟誓而遣之末波既得免就六眷等遂攝軍而還不復報浚歸于遼西自此以後末波常不敢南向溲焉人問其故末波曰吾父在南其感勒不害已也如此就六眷死其子㓜弱匹磾與劉琨世子羣奔喪匹磾隂卷甲而徃欲殺其叔羽鱗及末波而奪其國末波等知之遣軍逆撃匹磾劉羣為末波所獲匹磾走還薊懼琨禽已請琨宴會因執而害之匹磾既殺劉琨與羽鱗末波自相攻撃部衆乖離欲擁其衆徙保上谷阻軍都之險以距末波等代王鬱律聞之隂嚴精騎將撃之匹磾恐懼南奔樂陵後石勒遣石虎撃叚文鴦于樂陵破之生禽文鴦匹磾遂率其屬及諸塢壁降于石勒末波自稱幽州刺史於遼西末波死國人因立陸眷弟䕶遼為主代王翳槐假䕶遼驃騎大將軍幽州刺史大單于北平公弟鬱蘭撫軍將軍冀州刺史勃海公石虎後敗䕶遼於遼西䕶遼奔於平岡山遂投慕容皝皝殺之鬱蘭奔于石虎虎以所徙鮮卑五千人配之使屯令支鬱蘭死子龕代之及冉閔之亂龕率衆南移遂據齊地慕容儁使其弟恪帥衆伐龕於廣固儁毒其目而殺之阬其徒三千餘人蠕蠕蠕蠕而兖反姓郁久閭托䟦力微之在北荒也部騎掠得一奴髮始齊眉忘其本名力微字之曰木骨閭者夷言首秃也木骨閭與郁久閭聲相近故其後子孫因以為氏焉木骨閭既壯免奴為騎卒代王猗盧時有所攻討木骨閭坐後期當斬亡匿廣漠谿谷之間收合逋逃得百餘人而長之木骨閭死子車鹿㑹雄健得衆心始有部落自號柔然部後以為國號魏太武以其無知狀類於蟲故改其號曰蠕蠕宋齊謂之苪芮隋史亦曰芮芮木骨閭六代孫曰社崙兇狡有權略魏道武之與秦王姚興搆怨也遣兵攻其屬國没奕于黜弗素古延社崙方睦於秦遣將救之大敗逺遁漠北侵高車深入其地遂呑并諸部凶勢益振北徙弱洛水始立軍法千人為一軍軍置將一人百人為幢幢置帥一人攻戰先登者賜以虜獲畏懦者以石撃其首殺之是時西北有匈奴餘種最為富彊復為社崙所并其境土西則焉耆之北東則朝鮮故地之西北則渡沙漠窮瀚海南則臨大磧其常所會庭則敦煌張掖之北社崙乃自號為邱豆伐可汗是嵗晉安帝元興元年也可汗之號始於此邱豆伐猶言駕馭開張也可汗猶言皇帝也蠕蠕之俗君及大臣因其行能即為稱諡既死之後不復追稱社崙自是屢擾魏邊明元永興二年社崙圍魏師於牛川明元率衆救之大敗社崙社崙走死其弟斛律立斛律五年將嫁女於燕兄子歩鹿真謂諸大臣曰斛律將以汝等女為媵大臣恐逆執斛律與女皆送於燕而立歩鹿真為可汗社崙季父之子曰大檀領别部得衆心或告歩鹿真云國人欲立大檀歩鹿真發兵襲之兵敗見殺而大檀遂自立為紇升盖可汗斛律至和龍燕王馮跋待以客禮斛律請還跋遣其將萬淩帥騎送之淩憚逺役殺之而還大檀立遂侵魏明元撃之大檀走魏兵追之遇大雪士卒凍死墮指者什二三太武始光二年大舉伐蠕蠕五道並進軍至漠南舍輜重輕騎齎十五日糧度漠撃之蠕蠕大驚絶迹北走神䴥二年太武復伐蠕蠕率輕騎兼馬驟至栗水大檀先不設備遂燒廬舍西遁部衆四散太武分軍捜討東西五千里南北二千里俘斬甚衆高車諸部乘勢鈔掠蠕蠕種類前後降魏者三十餘萬落獲戎馬百餘萬匹畜産車廬無慮數百萬太武循弱水西行至涿邪山諸將慮有伏兵勸太武還兵還至黑山得蠕蠕降人云可汗被病以車自載入南山民畜窘聚方八十里無人統領相去百八十里追兵不至乃徐西去若復前行二日則盡滅之矣太武深悔之大檀因憤悒而卒子吳提立號勑連可汗吳提四年遣使朝獻先是北鄙候騎獲吳提南偏邏者二十餘人太武賜之衣服遣歸吳提上下感徳故朝貢焉帝厚賔其使而遣之延和三年以吳提尚西海公主又遣使者納吳提妹為夫人又進為左昭儀吳提遣其兄秃鹿傀及左右數百人來朝獻馬二千匹帝大悅班賜甚厚至太延二年乃絶和犯塞四年車駕幸五原遂征之樂平王丕河東公駕多羅督十五將出東道永昌王健宜都王穆夀督十五將出西道車駕出中道至浚稽山分中道復為二道陳留王崇從大澤向涿邪山車駕從浚稽北向天山西登子阜刻石記行不見蠕蠕而還時漠北大旱無水草軍馬多死五年車駕西伐沮渠牧犍宜都王穆夀輔景穆居守長樂王嵇敬建寧王崇二萬人鎮漠南以備蠕蠕吳提果犯塞穆夀素不設備賊至七介山京邑大駭爭奔中城司空長孫道生拒之於吐頽山吳提之冦也留其兄乞列歸與北鎮諸軍相守敬崇等破乞列歸于隂山之北獲乞列歸乞列歸歎曰沮渠陷我也又獲其伯父他吾無鹿胡及其將帥五百人斬首萬餘級吳提聞而遁走道生追之至于漠南而還太平真君四年車駕幸漠南分軍為四道樂安王範建寧王崇各統十五將出東道樂平王丕督十五將出西道車駕出中道中山王辰領十五將為中軍後繼車駕至鹿渾谷與賊相遇吳提遁走追至頞根河撃破之車駕至石水而還五年復幸漠南欲襲吳提吳提逺遁乃止吳提死子吐賀真立號處可汗十年正月車駕北伐髙昌王那出東道略陽王羯􅅜出西道車駕與景穆自中道出涿邪山吐賀真别部帥爾綿他抜等率千餘家來降是時軍行數千里吐賀真新立恐懼逺遁九月車駕北伐髙昌王那出東道略陽王羯􅅜出中道與諸軍期會於地弗池吐賀真悉國精鋭軍資甚盛圍那數十重那掘長圍堅守相持數日吐賀真數挑戰不利以那衆少而固疑大軍將至解圍走遁那引軍追之九日九夜吐賀真益懼棄輜重踰穹隆嶺遁那收其輜重引軍還與車駕會於廣澤略陽王羯􅅜盡收其人戸畜産百餘萬自是吐賀真遂單弱逺竄邊疆息警矣文成太安四年車駕北征騎十萬車十五萬兩旌旗千里遂渡大漠吐賀真逺遁其莫弗烏朱駕䫋率衆數千落來降自太武征伐之後意存休息蠕蠕亦怖威北竄不敢復南和平五年吐賀真死子予成立號受羅部真可汗自稱永康元年率部衆侵塞北鎮游軍大破其衆獻文皇興四年予成犯塞車駕北討京兆王子推東陽公元丕督諸軍出西道任城王雲等督軍出東道汝隂王賜濟南公羅烏抜督軍為前鋒隴西王源賀督諸軍為後繼諸將會車駕于女水之濵獻文選精兵五千人挑戰多設竒兵以惑之虜衆奔潰逐北三千餘里斬首五萬級降者萬餘人戎馬器械不可稱計旬有九日徃返六千餘里改女水曰武川焉孝文延興五年予成求通婚聘有司以予成數犯邊塞絶其使發兵討之帝曰蠕蠕譬若禽獸貪而亡義朕要當以信誠待物不可抑絶之也予成既悔前非遣使請和求結姻援安可孤其款意乃詔報曰所論婚事今始一反尋覽事理未允厥中夫男而下女爻象所明初婚之吉敦崇禮聘君子所以重人倫之本不敬其初令終難矣予成每懷譎詐及見詔書乃中止太和元年遣莫何去汾比抜等來獻良馬貂裘比抜等稱伏聞天朝珍寶華麗甚積來一觀之乃勑有司出御府珍玩金玉文繡器物御廐文馬竒禽異獸及人間所宜用者列之京肆令其歴觀焉比抜見之自相謂曰大國富麗一生所未見也二年又遣比抜等朝貢尋復請婚焉孝文志在招納許之予成雖嵗貢不絕而款約不著婚事亦停九年予成死子豆崙立號伏古敦可汗自稱太平元年豆崙性殘暴好殺其名臣毉堊石洛候以忠言諫之又勸與魏通和勿侵中國豆崙怒誣石洛候謀反殺之夷其三族十六年孝文遣陽平王頤左僕射陸叡並為都督領軍斛律桓等十二將七萬騎討豆崙豆崙部内髙車阿伏至羅率衆十餘萬西走自立為主豆崙與叔父那盖為二道追之豆崙出自浚稽山北而西那盖出自金山豆崙頻為阿伏至羅所敗那盖累有勝㨗國人咸以那盖為天所助欲推那盖為主那盖不從衆彊之那盖曰我為臣不可焉能為主衆乃殺豆崙母子以尸示那盖那盖乃襲位那盖號侯其伏代庫者可汗自稱太安元年那盖死子伏圖立號他汗可汗自稱始平元年宣武正始三年伏圖遣使紇奚勿六䟦朝獻請求通和宣武不報其使詔有司勑勿六䟦曰蠕蠕逺祖社崙是大魏叛臣往者包容暫時通使今蠕蠕衰微有損疇日大魏之徳方隆周漢跨據中原指清八表正以江南未平權寛北略通和之事未容相許若修蕃禮款誠昭著者當不孤爾也永平元年伏圖又遣勿六䟦奉函書一封并獻貂裘宣武不納依前諭遣伏圖西征高車為高平王彌俄突所殺子醜奴立號豆羅伏䟦豆伐可汗自稱建昌元年永平四年九月醜奴遣沙門洪宣奉獻珠像延昌三年冬宣武遣驍騎將軍馬義舒使於醜奴未發而崩事遂停寢醜奴壯健善用兵四年遣使俟斤尉比建朝貢孝明熙平元年西攻高車大破之禽其主彌俄突殺之盡并叛者國復彊盛二年又遣使俟斤尉比建紇奚勿六䟦鞏顧禮等朝貢神龜元年明帝臨顯陽殿引顧禮等二十人於殿下遣中書舍人徐紇宣詔讓以蠕蠕蕃禮不備之意初豆崙之死也那盖為主伏圖納豆崙之妻俟吕陵氏生醜奴阿那瓌等六人醜奴立後忽亡一子字祖恵求募不能得有尼引副升牟妻曰豆渾地萬年二十許為醫巫假託神鬼先嘗為醜奴所信出入去來乃言此􅅜今在天上我能呼得醜奴母子欣悦後嵗仲秋在大澤中施帳屋齋潔七日祈請天神經一宿祖恵忽在帳中自云恒在天上醜奴母子抱之悲喜大會國人號地萬為聖女納為可賀敦授夫副升牟爵位賜牛馬羊三千頭地萬既挾左道亦略有姿色醜奴甚加重愛信用其言亂其國政如是積嵗祖恵年長其母問之祖恵言我恒在地萬家不曾上天言天上者地萬敎也其母具以狀告醜奴醜奴言地萬懸鑒逺事不可不信勿用䜛言也既而地萬恐懼譖祖恵於醜奴醜奴隂殺之正光初醜奴母遣莫何去汾李具列等絞殺地萬醜奴怒欲誅具列等又阿至羅侵醜奴醜奴擊之軍敗還為母與其大臣所殺立醜奴弟阿那瓌為主阿那瓌立經十日其族兄俟力發示發率衆數萬以伐阿那瓌阿那瓌戰敗將弟乙居伐輕騎南走歸魏阿那瓌母俟吕陵氏及其二弟尋為示發所殺而阿那瓌未之知也阿那瓌至明帝臨顯陽殿引見勞問阿那瓌執所啟再拜殿下陳懇失國歸命之由辭㫖哀苦上憐之尋封阿那瓌為朔方郡公蠕蠕王賜以衣冕加之軺盖侍從儀衛同于戚藩頃之明帝以阿那瓌國無定主欲令還往綏集詔羣臣議之朝論意有同異或言聴還或言不可領軍元义為宰相阿那瓌私以金百斤餽之遂得歸國阿那瓌請辭帝臨西堂贈賜甚厚詔侍中崔光黄門元纂郭外勞遣阿那瓌來奔之後其從父兄俟力發婆羅門率數萬人入討示發破之示發走奔地豆于為地豆于所殺衆推婆羅門為主號彌偶可社句可汗時安北將軍懷朔鎮將楊鈞表傳聞蠕蠕已自立君乃阿那瓌同堂兄弟夷人獸心已相君長恐未肯郊迎其失國之主輕往虚反徒損國威自非廣加兵衆無以資其北入帝詔舊經蠕蠕使者牒云具仁往喻婆羅門迎阿那瓌復藩之意婆羅門殊自驕慢無遜避之心責具仁禮敬具仁執節不屈婆羅門遣大官莫何去汾俟斤邱升頭等六人將二千騎隨具仁迎阿那瓌具仁還鎮與阿那瓌商確事勢阿那瓌慮不敢入表求還京會婆羅門為高車所逐率部落千餘詣涼州降附於是蠕蠕數萬衆相率來迎阿那瓌還國阿那瓌啟乞給賜精兵一萬資送詔遣散騎常侍王遵業馳驛宣㫖慰諭阿那瓌并申賜賚時婆羅門亦自懷朔鎮奉表規望乞軍并請阿那瓌歸藩錄尚書事高陽王雍尚書令李崇等奏稱漢立南北單于使之相維為國藩翰今阿那瓌婆羅門既並向此宜兩存之以凖漢制臣等參議以為懷朔鎮北土名若結山吐若奚泉及敦煌北西海郡皆漢晉舊鄣二處寛平原野彌漫宜置阿那瓌於西吐奚若泉置婆羅門於西海郡各令總率部落收聚離散其爵號及資給亦宜為之裁處盖阿那瓌所居既是境外宜少優遣以示恩恵令沃野懷朔武川鎮各選二百人軍主監率給其糧仗送至前所仍於彼為之營搆功􅈬聴還諸於北來在婆羅門前投化者令州鎮上佐凖程給糧送付阿那瓌阿那瓌草創先無儲積請給近州麻子乾飯二千斛官駞運送婆羅門居於西海既是境内資廩不得同之阿那瓌新造藩屛請各遣使持節先詣慰喻并委經略明帝從之詔安西將軍廷尉元洪超兼尚書行臺詣敦煌安置婆羅門婆羅門尋與部衆謀叛投嚈噠嚈噠三妻皆婆羅門姊妹也仍為州軍所討禽之三年阿那瓌上表乞粟以為田種詔給萬石四年阿那瓌衆大饑入塞㓂鈔明帝詔尚書左丞元孚兼行臺尚書持節喻之孚見阿那瓌為其所執以孚自隨驅掠良口二千并公私驛馬牛羊數十萬北遁尋謝孚放還詔驃騎大將軍尚書令李崇等率騎十萬討之出塞三千餘里至瀚海不及而還婆羅門至洛陽明帝臨西堂引見之五年婆羅門死於洛南之館詔贈使持節鎮西將軍秦州刺史廣牧公是嵗沃野鎮人破六韓㧞陵反諸鎮相應孝昌元年阿那瓌率衆討之詔遣牒云具仁齎雜物勞賜阿那瓌拜受詔命勒衆十萬從武川鎮西向沃野頻戰剋㨗明帝又遣通直散騎常侍中書舍人馮雋使阿那瓌宣勞班賜有差阿那瓌部衆既和士馬稍盛乃號勑連頭兵伐可汗遂遣郁久閭彌娥等朝貢三年復遣使人鞏鳳景等入朝此後使命繼至建義初孝莊詔阿那瓌讚拜不言名上書不稱臣太昌元年阿那瓌遣烏勾蘭樹升伐等朝貢并為長子請尚公主明年孝武詔以范陽王誨長女琅邪公主許之未及成㛰而帝入關自是東西魏競結阿那瓌為㛰好西魏文帝乃以孝武時舍人元昱女稱為化政公主妻阿那瓌之弟塔寒又自廢其后乙弗氏納阿那瓌女為后加以金帛誘之阿那瓌遂留東魏使元整不報信命後遂率衆渡河以廢后猶在為言文帝不得已勑廢后自殺東魏靜帝元象元年阿那瓌掠幽州范陽南至易水又掠肆州秀容至於三堆又殺元整轉謀侵害東魏乃囚阿那瓌使温豆㧞等齊神武以阿那瓌兇狡將撫懷之乃遣其使人龍無駒北還以通温豆㧞等音問始阿那瓌殺元整亦謂温豆㧞等不存既見無駒微懷感愧興和二年春復遣龍無駒等朝貢東魏然猶未盡誠款阿那瓌女妻文帝者遇疾死齊神武因遣相府功曹參軍張徽纂使於阿那瓌閒説周文百端且言文帝之后死非其命若可汗能念舊恩得存和睦當以天子懿親公主結成㛰媾阿那瓌召其大臣議之即歸誠於鄴遣其俟利莫何緣游大力等朝貢因為其子菴羅辰請㛰靜帝詔兼散騎常侍太府卿羅念兼直散騎常侍中書舍人穆景相等使於阿那瓌阿那瓌遣莫何去折豆渾十升等報聘復因求㛰齊神武請以常山王騭妹樂安公主許之改封為蘭陵郡長公主阿那瓌遣吐豆登郁久閭譬渾俟利莫何折豆渾侯煩等奉馬千匹以為聘禮請迎公主詔兼宗正卿元夀兼太常卿孟韶等送公主自晉陽北邁資用器物神武親自經紀咸出豐渥阿那瓌遣其吐豆登郁久閭匿伏俟利阿夷普掘蒲提棄之伏等迎公主於新城之南齊神武慮阿那瓌難信又以國事加重躬送公主於樓煩之北接勞其使每皆隆厚阿那瓌大喜自是朝貢東魏相尋四年阿那瓌請以其孫女號鄰和公主妻齊神武第九子長廣公湛靜帝詔為㛰焉阿那瓌遣其吐豆登郁久閭譬掘俟利莫何游大力送女於晉陽武定四年阿那瓌有愛女號為公主以齊神武威徳日盛又請致之靜帝聞而詔神武納之阿那瓌遣其吐豆登郁久閭汗㧞姻姬等送女於晉陽自此東魏邊塞無事至於武定末使貢相尋始阿那瓌初復其國盡禮朝廷明帝之後中原䘮亂未能外略阿那瓌統率北方頗為彊盛稍敢驕大禮敬頗闕遣使朝貢不復稱臣天平以來逾自踞慢汝陽王暹之為泰州也遣其典籖齊人淳于覃使於阿那瓌遂留之親寵任事阿那瓌因入洛陽心慕中國設立官號僭擬王者遂有侍中黄門之屬以覃為祕書監黄門郎掌其文墨覃教阿那瓌轉至不遜每奉國書與朝廷抗禮及齊受東魏禪亦嵗時往來不絶天保三年阿那瓌為突厥所破自殺其太子菴羅辰及阿那瓌從弟登注俟利登注子庫提並擁衆奔齊其餘衆立登注次子鐵伐為主四年齊文宣送登注及子庫提還北鐵伐尋為契丹所殺其國人仍立登注為主又為大人阿富提等所殺其國人復立庫提為主是嵗復為突厥所攻舉國奔齊文宣乃北討突厥迎納蠕蠕廢其王庫提立阿那瓌子菴羅辰為主致之馬邑川給其廪餼繒帛親追突厥於朔方突厥請降許之而還於是蠕蠕貢獻不絶五年菴羅辰叛文宣親討大破之菴羅辰父子北遁既而復㓂肆州帝自晉陽討之至恒州黄𤓰堆虜散走時大軍已還帝麾下千餘騎遇蠕蠕别部數萬四靣圍逼帝神色自若指畫形勢虜衆披靡遂縱兵潰圍而出虜退走追撃之伏尸二十五里獲菴羅辰妻子及生口三萬餘人是嵗帝又北討蠕蠕大破之蠕蠕率部衆東徙將南侵帝帥輕騎於金川下邀撃蠕蠕蠕蠕聞而逺遁六年文宣又親討蠕蠕頓兵白道留輜重率輕騎五千追蠕蠕躬犯矢石頻大破之國人立阿那瓌叔父鄧叔子為主是時又累為突厥所破以西魏㳟帝二年率部落千餘家奔于關中突厥既恃兵彊又藉西魏和好忌其連類依慿大國使驛相繫請盡殺以甘心焉周文遂收縛蠕蠕主以三千餘人付突厥使於長安青門外斬之中男以下免死配王公家為奴𨽻云高車高車盖赤狄之餘種也初號為狄歴北方以為勑勒諸夏以為高車丁零焉其語略與匈奴同而時有小異或云其先匈奴甥也其種有伏氏袁紇氏斛律氏解枇氏䕶骨氏異氏竒斤氏俗云匈奴單于生二女姿容甚美國人皆以為神單于曰吾有此女安可配人將以與天乃於國北無人之地築髙臺置二女其上曰請天自迎之經三年其母欲迎之單于曰不可未徹之間且復一年乃有一老狼晝夜守臺嘷呼因穿臺下為空穴經時不去其小女曰吾父處我於此欲以與天而今狼來或是神物天使之然將下就之其姊大驚曰此是畜生無乃辱父母妹不從下為狼妻而産子後遂滋繁成國故其種人好引聲長歌又似狼嘷無都統大帥當種各有君長性麤猛黨類同心至於寇難僉然相依鬭無行陣頭别衝突乍出乍入不能堅戰其俗蹲踞䙝瀆無所忌避㛰姻用牛馬納聘以多為榮結言既定男黨營車闌馬令女黨恣取上馬袒而乘之馬主立闌外振手驚馬不墜者即取之墜則更取數滿乃止俗無穀不作酒迎婦之日男女相將持馬酪熟肉節解主人延賔亦無行位穹廬前叢坐宴飲終日復留其宿明日將婦歸既而夫黨復入女家馬羣選取良馬父母兄弟雖惜終無言者頗諱取寡婦而優憐之其畜産自有記識雖闌縱在野終無妄取俗不潔淨喜置震霆每震則呌呼射天而棄之移去至來嵗秋馬肥復相率候於震所埋羖羊然火㧞刀女巫祝説如中國祓除而羣隊馳馬旋繞百匝乃止人持一束栁桋回䜿之以乳酪灌焉婦人以皮裹羊骸戴之首上縈屈髮髾而綴之有似軒冕其死亡葬送掘地作坎坐尸於中張臂引弓佩刀挾矟無異於生而露坎不掩時有震死及疫癘則為之祈福若安全無他則為報賽多殺雜畜燒骨以燎走馬繞旋多者數百匝男女無大小皆集會平吉之人則歌舞作樂死䘮之家則悲吟哭泣其遷徙隨水草衣皮食肉牛羊畜産盡與蠕蠕同唯車輪高大輻數至多為異後徙於鹿渾海西北百餘里部落彊大常與蠕蠕為敵亦每侵盜于魏魏道武襲之大破其諸部後道武復度弱洛水西行至鹿渾海停駕簡輕騎西北行百餘里襲破之虜獲生口牛馬羊二十餘萬復討其餘種於狼山大破之車駕廵分命諸將為東西二道道武親勒六軍從中道自駮髯水西北徇略其部諸軍同時雲合破其雜種三千餘落衛王儀别督諸將從西北絶漠千餘里復破其遺迸七部於是高車大懼諸部震駭道武自牛川南引大校獵以高車為圍騎徒遮列周七百餘里聚雜獸於其中因驅至平城即以高車衆起鹿苑南因臺隂北距長城東包白登之西山尋而高車姪利曷莫弗敕力犍率其九百餘落内附拜敕力犍為揚威將軍置司馬參軍賜穀二萬斛後高車解枇莫弗幡豆建復率其部三十餘落内附亦拜為揚逺將軍置司馬參軍賜衣服嵗給廩食蠕蠕社崙破敗之後收拾部落轉徙廣漠之北侵入高車之地斛律部帥倍俟利患之曰社崙新集兵貧馬少易與耳乃舉衆掩擊入其國部高車昩利不顧後患分其廬室妻其婦女安息寢卧不起社崙登高望見乃招集亡散得千人晨掩殺之走而脱者十二三倍俟利遂奔魏賜爵孟都公俟利質直勇健過人奮戈陷陣有異於衆北方之人畏之嬰􅅜啼者語曰倍俟利來便止處女歌謡云求良夫當如倍俟其服衆如此善用五十蓍筮吉凶每中故得親幸賞賜豐厚命其少子曷堂内侍及倍俟利卒道武悼惜葬以魏禮諡曰忠壯王後詔將軍伊謂帥二萬騎北襲高車餘種袁紇烏頻破之道武時分散諸部唯高車以類麤獷不任役使故得別為部落後太武征蠕蠕破之而還至漠南高車東部在已尼陂人畜甚衆去官軍千餘里將遣左僕射安原等討之司徒長孫翰尚書令劉潔等諫太武不聽乃遣原等并發新附高車合萬騎至於已尼陂高車諸部望軍而降者數十萬落獲馬牛羊亦百餘萬皆徙置漠南千里之地高車逐水草畜牧蕃息數年之後漸加粒食嵗致貢獻由是國家馬及牛羊遂至于賤氈皮委積文成時五部高車合聚祭天衆至數萬大會走馬殺牲游繞歌吟忻忻其俗稱自前世以來無盛於此會車駕臨幸莫不忻悦後孝文召高車之衆隨車駕南討高車不願南行遂推表紇樹者為主相率北叛蹂踐金陵都督宇文福追討大敗而還又詔平北將軍江陽王繼為都督討之繼先遣人慰勞樹者樹者入蠕蠕尋悔相率而降高車之族又有十二姓一曰泣伏利氏二曰叱盧氏三曰乙旃氏四曰大連氏五曰窟賀氏六曰達薄干氏七曰阿崙氏八曰莫允氏九曰俟分氏十曰副伏羅氏十一曰乞袁氏十二曰右升沛氏先是副伏羅部為蠕蠕所役屬豆崙之世蠕蠕亂離國部分散副伏羅阿伏至羅與從弟窮竒俱統領軍高車之衆十餘萬落太和十一年豆崙犯塞阿伏至羅等固諫不從怒率所部之衆西叛至前部西北自立為王國人號之曰侯婁匐勒猶魏言大天子也窮竒號候倍猶魏言儲主也二人和穆分部而立阿伏至羅居北窮竒在南豆崙追討之頻為阿伏至羅所敗乃引衆東徙十四年阿伏至羅遣商胡越者至京師以二箭奉貢云蠕蠕為天子之賊臣諫之不從遂叛來此而自䜿立當為天子討蠕蠕孝文未之信也遣使者于提往觀虛實阿伏至羅與窮竒遣使者薄頡隨提來朝貢其方物詔員外散騎侍郎可足渾長生復與于提使高車各賜繡袴褶一具雜綵百疋窮竒後為嚈噠所殺虜其子彌俄突等其衆分散或來奔附或投蠕蠕詔遣宣威將軍羽林監孟威撫納降人置之高平鎮阿伏至羅長子蒸阿伏至羅餘妻謀害阿伏至羅阿伏至羅殺之阿伏至羅又殘暴大失衆心衆共殺之立其宗人䟦利延為主嵗餘嚈噠伐高車將納彌俄突國人殺䟦利延迎彌俄突而立之彌俄突既立復遣朝貢又奉表獻金方一銀方一金杖二馬七匹駞十頭詔使者慕容坦賜彌俄突雜綵六十匹宣武嘉其忠誠詔慰諭之彌俄突尋與蠕蠕主伏圖戰於蒲類海北為伏圖所敗西走三百餘里伏圖次於伊吾北山先是高昌王趜嘉表求内徙宣武遣孟威迎之至伊吾蠕蠕見威軍怖而遁走彌俄突聞其離駭追撃大破之殺伏圖於蒲類海北割其髮送於孟威又遣使獻龍馬五匹金銀貂皮及諸方物詔東城子于亮報之賜樂器一部樂工八十人赤紬十匹雜綵六十疋彌俄突遣其莫何去汾屋引吐賀真貢其方物明帝初彌俄突與蠕蠕主醜奴戰敗被禽醜奴繫其兩脚於駑馬之上頓曵殺之漆其頭為飲器其部衆悉入嚈噠經數年嚈噠聴彌俄突弟伊匐還國伊匐既復國遣使奉表於是詔遣使者谷偕等拜為鎮西將軍西海郡開國公高車王伊匐復大破蠕蠕蠕蠕主婆羅門走投涼州正光中伊匐遣使朝貢因乞朱畫歩挽一乘并幔褥鞦韆一副繖扇各一枚青曲盖五枚赤漆扇五枚鼔角十枚詔給之伊匐後與蠕蠕戰敗歸其弟越居殺伊匐而自立天平中越居復為蠕蠕所破伊匐子比適復殺越居而自立興和中比適又為蠕蠕所破越居子去賔自蠕蠕奔東魏齊神武欲招納逺人上言封去賔為高車王拜安北將軍肆州刺史既而病死初道武時有吐突隣部在女水上常與解如部相為脣齒不供職貢登國三年道武親西征渡弱洛水復西行趣其國至女水上討解如部落破之明年春盡略徙其部落畜産而還又有絶突隣部與絶奚部世同部落而各有大人長帥擁集種類常為㓂於意辛山登國五年道武勒衆親討焉慕容驎率師來會大破之絶突隣大人屋地鞬絶奚大人庫寒等皆舉部歸降皇始二年車駕伐中山軍於栢肆慕容寳夜來攻營軍人驚走還於國路由并州遂反將攻晉陽并州刺史元延討平之絶突隣部帥匿物尼絶奚部帥叱奴根等復聚黨反於隂館南安公元順討之不剋死者數千人道武聞之遣安逺將軍庫兵還討匿物尼等皆殄之又有俟呂隣部衆萬餘口常依嶮畜牧登國中其大人叱伐為宼於苦水河八年夏道武大破之并禽其别帥焉古延等又有薛于部常屯衆於三城之間及滅衛辰後其部帥太悉伏望軍歸順道武撫安之車駕還衛辰子屈丐奔其部道武聞之使使詔太悉伏執送之太悉伏出屈丐以示使者曰今窮而見役寧與俱亡何忍送之遂不遣道武大怒車駕親討之會太悉伏先出撃曹覆寅官軍乘虛遂屠其城獲太悉伏妻子珍寶徙其人而還太悉伏來赴不及遂奔姚興未幾亡歸嶺北上郡以西諸鮮卑雜胡聞而皆應之天賜五年屈丐盡劫掠總服之及平統萬薛于種類皆得為編戸矣而率屯山鮮卑别種破多蘭部相傳主其部落至木易于有武壯力勇劫掠左右西及金城東侵安定數年間諸種患之天興四年遣常山王遵討之攻於高平木易于將數千騎棄國遁走盡徙其人於京師餘種分迸其後為赫連屈丐所滅又黜弗素古延等諸部天興五年材官將軍和突率六千騎襲而獲之又越勒倍泥部永興五年轉牧䟦那山西明元遣奚斤討破之徙其人而還稽胡稽胡一曰歩落稽盖匈奴别種劉淵五部之苖裔也或云山戎赤狄之後自離石以西安定以東方七八百里居山谷間種落繁熾其俗土著亦知種田地少桑蠶多衣麻布其丈夫衣服及死亡殯葬與中夏略同婦人則多貫蜃貝以為耳頸之飾與華人錯居其渠帥頗識文字言語類夷狄因譯乃通蹲踞無禮貪而忍害俗好淫穢女子尤甚將嫁之夕方與淫者叙離夫氏聞之以多為貴既嫁頗亦防閑方犯姦者隨事懲罰又兄弟死者皆納其妻雖分統郡縣列於編戸然輕其徭賦有異華人山谷阻深者又未盡役屬而兇悍恃險數為寇害後魏明帝孝昌中有劉蠡升者居雲陽谷自稱天子立年號署百官屬魏氏亂力不能討蠡升遂分遣部衆鈔掠汾晉之間略無寧嵗神武遷鄴後始宻圖之乃偽許以女妻蠡升太子蠡升遂遣子詣鄴齊神武厚禮之緩以㛰期蠡升既恃和親不為之備西魏大統元年齊神武襲之蠡升率輕騎出外徵兵為其北部王所殺送首於神武其衆復立蠡升第三子南海王為主神武滅之獲其偽主及其弟西海王并皇后夫人王公以下四百餘人歸於鄴其居河西者多恃險不賔時周文方與神武爭衡未遑經略乃遣黄門侍郎楊檦就安撫之五年黒水部衆先叛七年别帥夏州刺史劉平伏又據上郡反自是北山諸部連嵗寇暴周文前後遣于謹侯莫陳崇李弼等相繼討平之周武成初延州稽胡郝阿保狼皮率其種人附於齊氏阿保自署丞相狼皮署柱國并與其别部劉桑徳共為影響柱國豆盧寧督諸軍撃破之二年狼皮等餘黨復叛詔大將軍韓果討破之保定中離石生胡數寇汾北敷州刺史韋孝寛於險要處築城置兵糧以遏其路及大將軍楊忠與突厥伐齊稽胡等復懷旅拒不供糧餼忠乃詐其酋帥云與突厥廻兵討之酋帥等懼乃相率供饋焉其後丹州綏州等部内諸胡與蒲州别率郍三郎等又頻年逆命復詔達奚震辛威于寔等前後窮討散其種落天和二年延州總管宇文盛率衆城銀州稽胡白郁久同喬是羅等欲邀襲盛盛並討斬之又破其别帥為喬三勿同等五年開府劉雄出綏州廵檢北邊川路稽胡白郎喬素勿同等渡河逆戰雄復破之建徳五年武帝敗齊師於晉州乘勝逐北齊人所棄甲仗未暇收斂稽胡乘閒竊出並盜而有之乃立蠡升孫没鐸為主號聖武皇帝年曰太平武帝定東夏將討之議欲窮巢穴齊王憲以為種類既多又山谷阻絶王師一舉未可盡除且當翦其魁率餘加慰撫帝然之乃以憲為行軍元帥行軍總管趙王招譙王儉滕王逌等討之憲軍次馬邑乃分道俱進没鐸遣其黨天柱守河東又遣其大帥穆攴據河西規欲分守險要掎角憲軍憲命譙王儉撃破之斬獲千餘級趙王招又禽没鐸衆盡降宣政元年汾胡帥劉受羅千復反趙王盛督諸軍討禽之自是離散突厥突厥其先居西海之右獨為部落盖匈奴之別種也姓阿史那氏後為隣國所破盡滅其族有一兒年且十餘嵗兵人見其小不忍殺之乃刖足斷其臂棄草澤中有牝狼每啣肉食之食音嗣及長與狼交合遂有孕焉隣國聞此􅅜尚在重遣人殺之使者見􅅜在狼側并欲殺狼於時若有神物投此􅅜及狼於西海之東落高昌國西北山山有洞穴穴内有平壤茂草周廻數百里四靣俱山狼匿其中遂生十男十男長外託妻孕其後各為一姓阿史那即其一也最賢子孫蕃育漸至數百家經數世有阿賢設者率部落出於穴中臣於蠕蠕至大葉䕶種類稍彊當魏之末有伊利可汗以兵撃鐵勒大敗之降五萬餘家復襲破蠕蠕部落遂盛伊利卒弟阿逸可汗立又破蠕蠕阿逸病且卒捨其子攝圖立其弟叔稱為木杆可汗或云突厥本平涼雜胡姓阿史那氏魏太武滅阻渠氏阿史那以五百家奔蠕蠕世居金山之陽為蠕蠕鐵工金山形似兠鍪俗呼兠鍪為突厥因以為號又曰突厥之先出於索國在匈奴之北其部落大人曰阿謗歩兄弟七十人其一曰伊質泥師都狼所生也阿謗歩等性並愚癡國遂被滅泥師都既别感異氣能徵召風雨娶二妻云是夏神冬神之女一孕而生四男其一變為白鴻其一國於阿輔水劒水之間號為契骨其一國於處折水其一居䟦斯處折施山即其大􅅜也山上有阿謗歩種類並多寒露大􅅜為出火温養之咸得全濟遂共奉大􅅜為主號為突厥即訥都六設也都六有十妻所生子皆以母族為姓阿史那是其小妻之子也都六死十母子内擇立一人乃相率於大樹下共為約曰向樹跳躍能最高者即推立之阿史那子年㓜而跳最高諸子遂奉以為主號阿賢設此説雖殊然狼種也阿賢設之後曰土門始至塞上市繒絮願通中國西魏大統十一年周文作相遣酒泉胡安諾槃陁使其國國人皆相慶曰今大國使至吾國將興乎明年土門遂遣使獻方物時鐵勒將伐蠕蠕土門率所部邀撃之盡降其衆五萬餘落恃其彊盛乃求㛰於蠕蠕蠕蠕主阿那瓌大怒使人詈辱之曰爾是我鍜奴何敢發是言也土門亦怒殺其使者遂與之絕而求㛰於魏周文許其使以魏長樂公主妻之魏文帝崩土門遣使來弔贈馬二百匹廢帝初土門發兵撃蠕蠕大破之於懷荒北阿那瓌自殺其子菴羅辰奔齊餘衆復立阿那瓌叔父鄧叔子為主土門遂自號伊利可汗猶古之單于也號其妻為可賀敦亦猶古之閼氏也其子弟謂之特勒别部領兵者謂之設其大官屈律啜次阿波次頡利發吐屯次俟斤其初國貴賤官號凡有十等或以形體或以老少或以顔色鬢髪或以酒肉或以獸名其勇健者謂之始波羅亦呼為英賀弗肥麤者謂之大羅大羅便酒器也似角而麤短體貎似之故以為號此官特貴唯其子弟為之又謂老為哥利故有哥利達官謂馬為賀闌故有賀蘭蘇尼闕蘇尼掌兵之官也謂黑色者為珂羅便故有珂羅啜官甚高耆年者為之謂髮為索葛故有索葛吐屯此如州郡官也謂酒為匐你熱汗熱汗掌監察非違釐整班次謂肉為安禪故有安禪具泥具泥掌家事如國官也有時置附隣可汗附隣狼名也取其貪殺為稱亦有可汗位在葉䕶位下者或有居家大姓相呼為遺可汗者突厥呼屋為遺言屋可汗也土門亦與齊通使往來土門死子科羅立科羅號乙息記可汗科羅破蠕蠕鄧叔子於沃野北頼山病且死捨其子攝圖而立其弟俟斤是為木杆可汗俟斤一名燕尹靣廣尺餘其色赤甚眼若瑠璃剛暴而多智務於征伐乃率兵撃鄧叔子破之叔子以其餘燼奔西魏俟斤又西破嚈噠東走契丹北并契骨威服塞外諸國其地東自遼海以西至西海萬里南自沙漠以北至北海五六千里皆屬焉抗衡中國後與魏伐齊至并州其俗被髮左袵穹廬氊帳隨逐水草遷徙以畜牧射獵為事食肉飲酪身衣裘毼賤老貴壯寡亷恥無禮義猶古之匈奴其主初立近侍重臣等舁之以氊隨日轉九回每回臣下皆拜拜訖乃扶令乗馬以帛絞其頸使纔不至絶然後釋而急問之曰能作幾年可汗乎其主既神情瞀亂不能詳定多少臣下等隨其所言以驗修短之數其後大官有葉䕶次特勒次俟利發次吐屯發及餘小官凡二十八等皆世為之兵器有角弓鳴鏑甲矟刀劒佩飾則兼有伏突旗纛之上施金狼頭侍衛之士謂之附離夏言亦狼也盖本狼生志不忘舊焉善騎射性殘忍無文字其徵發兵馬及諸税雜畜刻木為數并一金鏃箭蠟封印之以為信契候月將滿轉為寇抄其刑法反叛殺人及姦人之婦盜馬絆者皆死淫者割勢而腰斬之姦人女者重責財物即以其女妻之鬪傷人者隨輕重輸物傷目者償以女無女則輸婦損折支體者輸馬盜馬及雜物者各十餘倍徵之死者停屍於帳子孫及親屬男女各殺羊馬陳於帳前祭之繞帳走馬七匝諸帳門以刀􅋇靣且哭血淚俱流如此者七度乃止擇日取亡者所乘馬及經服用之物併屍俱焚之收其餘灰待時而葬春夏死者候草木黄落秋冬死者候華茂然後坎而瘞之葬日親屬設祭及走馬􅋇靣如初死之儀表為塋立屋中圖畫死者儀形及其生時所戰陳狀嘗殺一人則立一石有至千百者又以祭之羊馬頭盡懸之於標上是日也男女咸盛服飾會於葬所男有悦愛於女者歸即遣人聘問其父母多不違也父兄伯叔死子弟及姪等妻其從母世叔母嫂唯尊者不得下淫移徙無恒而各有地分可汗恒處於都斤山牙帳東開盖敬日之所出也每嵗率諸貴人祭其先窟又以五月中旬集他人以水拜祭天神於都斤西五百里有高山逈出上無草樹謂為㪍登凝黎夏言地神也其書字類胡而不知年歴唯以草青為記男子好摴蒱女子蹋鞠飲馬酪取醉歌呼相對敬鬼信巫重兵死恥病亡大抵與匈奴同俗俟斤部衆既盛乃遣使請誅鄧叔子等於魏周文收叔子已下千人付其使者殺之於青門外俟斤遂襲撃吐谷渾破之周明帝二年俟斤遣使來獻武帝保定初又遣三輩貢其方物時與齊人交爭戎車嵗動故連結之以為外援初魏恭帝世俟斤許進女於周文契未定而周文殂尋而俟斤又以他女許武帝未及結納齊人亦遣求㛰俟斤貪其厚幣將悔之至是武帝詔遣涼州刺史楊荐武伯王慶等往結之慶等至諭以信義俟斤遂絶齊使而定㛰焉仍請舉國東伐於是詔隋公楊忠伐齊忠軍度陘嶺俟斤以大衆來會明年正月攻齊主於晉陽不剋俟斤縱兵大掠而歸是嵗俟斤復遣使來獻更請東伐詔楊忠出沃野晉公䕶趣洛陽以應之會護戰不利俟斤引還五年詔陳公純大司徒宇文貴神武公竇毅南安公楊荐往逆女天和二年俟斤又遣使奉獻陳公純等至俟斤復貳於齊會有風雷之變乃許純等以后歸四年又遣使貢獻俟斤死復捨其子大邏便而立其弟是為他鉢可汗他鉢以攝圖為爾伏可汗統其東西又以其弟褥但可汗子為歩離可汗居西方自俟斤以來其國富彊有淩轢中夏之志朝廷與之和親嵗給繒絮錦綵十萬叚突厥在京師者又待以優禮衣錦食肉常有千數齊人懼其寇掠亦傾府藏以給之他鉢益驕慠謂其徒屬曰但使我在南兩􅅜孝順何患貧也建徳二年他鉢遣使獻馬及齊滅齊定州刺史范陽王高紹義自馬邑奔之他鉢立紹義為齊帝召集所部云為之復讐宣政元年他鉢遂入寇幽州柱國劉雄拒戰兵敗死之武帝親總六軍將北伐會帝崩班師是冬也他鉢復寇邊圍酒泉大掠而去大象初他鉢復請和親帝策趙王招女為千金公主以嫁之并遣執紹義送闕他鉢不許仍寇并州二年始遣使奉獻且逆公主而獨留紹義不遣帝又令亳州總管賀若誼往諭之始送紹義他鉢病且卒謂其子菴邏曰吾聞親莫過於父子吾兄不親其子委位於我我死汝當避大邏便及卒國中將立大邏便以其母賤衆不服菴邏實貴突厥素重之攝圖最後至謂國人曰若立菴邏者我當率兄弟以事之如立大邏便我必守境利刄長矛以相待也攝圖長而且雄國人莫敢拒竟立菴邏為嗣大邏便不得立心不服菴邏每遣人詈辱之菴邏不能制因以國讓攝圖國中相與議曰四可汗子攝圖最賢因迎立之號伊利俱盧設莫何始波邏可汗一號沙鉢畧居都斤山菴邏降居獨洛水稱第三可汗大邏便乃謂沙鉢畧曰我與爾俱可汗子各承父後爾今極尊我獨無位何也沙鉢畧惡之以為阿波可汗還領所部沙鉢畧勇而得衆北夷皆附之隋文帝受禪待之甚薄北夷大怨會營州刺史高寳寧作亂沙鉢畧與之合軍攻陷臨渝鎮上勅緣邊修堡障峻長城以備之沙鉢畧復尚周千金公主公主傷宗祀絶滅勸沙鉢略悉衆入寇控弦之士四十餘萬上令柱國馮昱屯乙弗泊蘭州總管叱李崇屯幽州行軍總管達奚長儒據周槃皆為所敗於是沙鉢略縱兵自木硤石門兩道來寇武威天水安定金城上郡𢎞化延安六畜咸盡上詔河間王𢎞上柱國豆盧勣竇榮定左僕射高熲右僕射虞慶則並為元帥出塞撃之沙鉢略率阿波貪汗二可汗來拒戰皆敗走時突厥饑不行食粉骨為糧又多災疫死者極衆既而沙鉢略以阿波驍悍忌之因其先歸襲撃其大部大破之殺阿波母阿波還無所歸西奔達頭可汗達頭者名玷厥沙鉢略之從父也舊為西面可汗達頭以兵資阿波使率而東其部落歸之者將十萬騎遂與沙鉢略相攻貪汗可汗者素睦於阿波沙鉢略奪其衆而廢之貪汗又亡奔達頭沙鉢略從弟地勒察别統部落與沙鉢略有隙後以衆叛歸阿波連兵不已各遣詣闕請和求援上皆不許會千金公主上書請為一子之例文帝遣開府徐子和使於沙鉢略晉王廣時鎮并州請因其釁乘之上不許沙鉢略遣使致書曰辰年九月十日從天生大突厥天下賢聖天子伊利俱盧設莫何始波羅可汗致書大隋皇帝使人開府徐子和至辱告言語具聞也皇帝是婦父即是翁此是女夫即是􅅜例兩境雖殊情義是一今重疊親舊子子孫孫乃至萬世不斷上天為證終不違負此國所有羊馬都是皇帝畜生彼有繒綵都是此物彼此不異也文帝報書曰大隋天子貽書大突厥伊利俱盧設莫何沙鉢略可汗得書知大有好心向此也既是沙鉢略婦翁今日看沙鉢略共􅅜子不異既以親舊厚意常使之外今特别遣大臣虞慶則往彼看女復看沙鉢略也沙鉢略陳兵列其寳物坐見慶則稱病不能起且曰我祖父以來不向人拜慶則責而喻之千金公主私謂慶則曰可汗豺狼性過與爭將齧人副使長孫晟説諭之沙鉢略屈乃頓顙受璽書以戴於首既而大慙其羣下因相聚慟哭慶則又遣稱臣沙鉢略謂其屬曰何名為臣報曰隋國臣猶此稱奴沙鉢略曰得作大隋天子奴虞僕射之力也贈慶則馬千匹以從妹妻之時沙鉢略既為達頭所困又東畏契丹遣使告急請將部落度漠南寄白道川内有詔許之晉王廣以兵援之給以衣食賜以車馬鼓吹沙鉢略因西撃阿波禽之而阿㧞國部落乘虚掠其妻子官軍為撃阿㧞破之所獲悉與沙鉢略沙鉢略大喜乃立約以磧為界因上表曰大突厥伊利俱盧設莫何始波羅可汗臣攝圖言大使尚書右僕射虞慶則至伏奉詔書兼宣慈㫖仰惟恩信之篤愈久愈明徒知負荷不能答謝突厥自天置以來五十餘載保有沙漠自王蕃隅地過萬里士馬億數恒力兼戎夷抗禮華夏在於戎狄莫與為比頃者氣候清和風雲順序意以華夏其有大聖興焉伏惟大聖皇帝真皇帝也豈敢阻兵恃險偷竊名號今便感慕淳風歸心有道雖復南瞻魏闕山川悠逺北面之禮不敢廢失當令侍子入朝神馬嵗貢朝夕恭承惟命是視謹遣第七􅅜臣窟合真等奉表以聞文帝下詔曰沙鉢略往雖與和猶是二國今作君臣便成一體已勅有司肅告郊廟宜傳頒天下咸使知聞自是詔答諸事並不稱其名以異之其妻可賀敦周千金公主賜姓楊氏編之屬籍改封大義公主䇿拜窟合真為柱國封安國公宴於内殿引見皇后賞勞甚厚沙鉢略大悦於是嵗時貢獻不絶七年正月沙鉢略遣其子入貢方物因請獵於恒代之間詔許之仍遣使人賜其酒食沙鉢略率部落再拜受賜沙鉢略一日手殺鹿十八頭齎尾舌以獻還至紫河鎮其牙帳為火所燒沙鉢略惡之月餘而卒初攝圖以其子雍虞閭性愞遺令立其弟葉䕶處羅侯雍虞閭遣使迎處羅侯將立之處羅侯曰我突厥自木杆可汗來多以弟代兄以庶奪嫡失先祖之法不相敬畏汝當嗣位我不憚拜汝也雍虞閭又遣使謂處羅侯曰叔與我父共根連體我是枝葉寧有我作主令根本反同枝葉願叔勿疑相讓者五六處羅侯竟立是為葉䕶可汗遣使上表言狀上賜之鼔吹幡旗處羅侯長頤僂背眉目疎朗勇而有謀以隋所賜旗鼔西征阿波敵人以為得隋兵所助即來降附遂禽阿波既而上書請阿波死生之命上下其議左僕射高熲進曰骨肉相殘教之蠧也宜存養以示寛大上曰善後處羅侯又西征中流矢卒其衆奉雍虞閭為主是為頡伽施多那都藍可汗雍虞閭遣使詣闕賜物三千叚每嵗遣使朝貢時有流人楊欽亡入突厥中謬云彭國公劉昶與宇文氏謀反正令大義公主發兵擾邊都藍執欽以聞并貢勃布魚膠其弟欽羽設部落彊盛都藍忌而撃之斬首於陣其年遣其母弟褥但特勒獻于闐玉杖上拜褥但為柱國康國公明年突厥部落大人相率遣使貢馬萬匹羊二萬口駞牛各五百頭尋遣請緣邊置市與中國貿易詔許之平陳後上以陳叔寳屛風賜大義公主主心恒不平因書屏風為詩叙陳亡以自寄其辭悽怨上聞而惡之禮賜益薄公主復與西突厥泥利可汗連結上恐其為變將圖之會主與所從胡私通因發其事下詔廢之恐都藍不從遣竒章公牛𢎞將美妓四人以㗖之時沙鉢略子曰染干號突利可汗居北方遣使求㛰上令裴矩謂曰當殺大義公主方許㛰突利以為然復譖之都藍因發怒遂殺公主於帳都藍因與突利可汗有隙數相征伐上和解之各引兵去十七年突利遣使來逆女上舍之太常教習六禮妻以宗女義安公主欲離間北狄故特厚其禮遣近臣牛𢎞蘇威斛律孝卿相繼為使突厥前後遣使入朝三百七十輩突利本居北方以尚主故南徙度斤舊鎮錫賚優厚雍虞閭怒曰我大可汗也反不如染干於是朝貢遂絶數為邊患十八年詔蜀王秀出靈州道撃之明年又遣漢王諒為元帥左僕射高熲率將軍王察上柱國趙仲卿並出朔州道右僕射楊素率柱國李徹韓僧夀出靈州道柱國燕榮出幽州道以撃之雍虞閭與玷厥舉兵攻染干盡殺其兄弟子女遂渡河入蔚州染干夜以五騎與隋使長孫晟歸朝上令染干與雍虞閭使者因頭特勒相辯詰染干辭直上乃厚待之雍虞閭弟都速六棄其妻子與突利歸朝上嘉之勅染干與都速六樗蒱稍稍輸以寳物用歸其心六月高熲楊素撃玷厥大破之拜染干為意利珍豆啟民可汗華言意智健也啟民上表謝恩上於朔州築大利城以居之時義安公主已卒上以宗女義成公主妻之部落歸者甚衆雍虞閭又撃之上復令入塞雍虞閭侵掠不已遂遷於河南在夏勝二州間發徒掘塹數百里東西距河盡為啟民畜牧地於是遣越國公楊素出靈州行軍總管韓僧夀出慶州太平公史萬嵗出燕州大將軍姚辯出河州以撃都藍師未出塞而都藍為其麾下所殺達頭自立為歩伽可汗其國大亂遣太平公史萬嵗出朔州以撃之遇達頭於太斤山虜不戰而遁尋遣其子俟利伐從磧東攻啟民上又發兵助啟民守要路俟利伐退走入磧啟民上表陳謝仁夀元年代州總管韓洪為虜敗於恒安詔楊素為雲州道行軍元帥率啟民北征斛薛等諸姓初附於啟民至是而叛素軍河北逢突厥阿勿思力俟斤等南渡掠啟民男女雜畜而去素率上大將軍梁黙追之大破俟斤悉得人畜以歸啟民素又遣柱國張定和領軍大將軍劉昇别路邀撃並多斬獲而還兵既渡河賊復掠啟民部落素率驃騎范貴於窟結谷東南復破之是嵗泥利可汗及葉䕶俱被鐵勒所敗歩伽尋亦大亂奚霫五部内徙歩伽奔吐谷渾啟民遂有其衆遣使朝貢大業三年煬帝幸榆林啟民及義成公主來朝于行宫前後獻馬三千匹帝大悦賜帛萬三千叚啟民及義成公主上表乞依大國服餙法用一同華夏帝下其議公卿請依所奏帝以為不可詔從其國俗帝法駕御千人大帳享啟民及其部落酋長三千五百人賜物三千叚其下各有差復下詔襃寵之賜路車乘馬鼓吹幡旗賛拜不名位在諸王侯上帝親廵雲中泝金河而東北幸啟民所居啟民奉觴上夀跪伏甚恭帝大悦賜啟民及主金甕各一及衣服被褥錦綵特勒以下各有差先是高麗私通使於啟民所啟民不敢隱境外之交是日持高麗使以見勅令牛𢎞宣㫖謂曰朕以啟民誠心奉國故親至其所明年當往涿郡爾囬日語高麗王宜早來朝使人甚懼啟民乃扈從入塞至定襄詔令歸蕃明年朝於東都禮賜益厚是嵗啟民疾卒立其子吐吉是為始畢可汗吐吉表請尚公主詔從其俗十一年來朝於東郡其年車駕避暑汾陽宫八月始畢率其種落入寇圍帝於鴈門援兵方至始畢引去由是朝貢遂絶明年復寇馬邑唐公李淵撃走之隋末亂離中國人歸之者無數遂大彊盛薛舉竇建徳王世充劉武周梁師都李軌高開道之徒雖僭尊號皆稱臣受其可汗之號使者往來相望於道東自契丹西盡吐谷渾高昌諸國皆臣屬之控弦百萬戎狄之盛近代未之有也唐兵起太原劉文靜䀻其國引以為援始畢遣特勒康利獻馬千匹會于綘郡又遣二千騎助軍從平京城高祖受隋禪賞賜不可勝紀始畢尋卒其子什鉢苾音弼年㓜不任立立其弟俟利弗設是為處羅可汗又以隋義成公主為妻先是隋煬帝蕭后及齊王􅌔之子正道陷于竇建徳處羅遣使迎之至于牙所立正道為隋帝隋末中國人在北者悉𨽻之行隋正朔置百官居于定襄城有徒衆萬餘俄而處羅卒義成公主以其子奥射醜弱廢不立之遂立處羅之弟吐苾是為頡利可汗仍以義成公主為妻頡利承父兄之資兵馬彊盛馮陵唐室卒為太宗所滅云西突厥西突厥者木杆可汗之子大邏便也初木杆與沙鉢略可汗有隙因分為二大邏便即阿波可汗其國居烏孫之故地東至突厥國西至雷翥海南至疎勒北至瀚海在京師西北七千里自焉耆國西北七日行至其南庭自南庭又正北八日行至其北庭鐵勒龜兹及西域諸國皆歸附之其人雜有都陸及弩矢畢葛邏禄處月處宻伊吾等諸種風俗大抵與突厥同唯言語微異其官有葉護有設有特勒常以可汗子弟及宗族為之又有乙斤屈利啜閻洪達頡利發吐屯俟斤等官皆代襲其位大邏便既為處羅可汗所擒其國立鞅素特勒之子是為泥利可汗至其子達漫號泥厥處羅可汗即大邏便之種落與北突厥處羅可汗號同非一人也其母向氏本中國人生達漫而泥利卒而向氏又嫁其弟婆實特勒隋開皇末婆實與向氏詣長安遇達頭之亂遂留京師每舍之鴻臚寺處羅可汗居無常處然多在烏孫故地立小可汗分統所部一在石國以制諸胡一居龜兹北其地名應婆每五月八月相聚祭神嵗遣重臣向其先代所居之窟而致祭焉當大業初處羅可汗撫御無道其國多叛與鐵勒屢相攻大為鐵勒所敗時黄門侍郎裴矩在敦煌引致西域聞其國亂復知處羅思其母因奏之煬帝遣司朝謁者崔君肅慰諭之處羅甚踞受詔不肯起君肅謂處羅曰突厥本一國也中分為二自相仇敵每嵗交兵積十年而莫能相滅者明知啟民與處羅國其勢敵耳今啟民與其部落兵且百萬入臣天子甚有丹誠者何也但以切恨可汗而不能獨制故卑事天子以借漢兵連二大國欲破滅可汗耳百官兆庶咸請許之天子弗違師出有日顧可汗母向氏本中國人歸在京師處于賔館聞天子之詔懼可汗之滅旦夕守闕哭甚悲哀是以天子憐焉為其輟䇿向夫人又匍匐謝罪因請發使以召可汗令入内屬乞恩於啟民天子從之遣使到此可汗若稱藩拜詔國乃永安而母得延夀不然者則向夫人為誑天子必當取戮而傳首虜庭廢大隋之兵資北畜之衆左提右挈以撃可汗死亡則無日矣奈何惜兩拜之禮剿慈母之命恡一句稱臣喪匈奴之國也處羅聞之瞿然而起流涕再拜跪受詔書君肅又説處羅曰啟民内附先帝嘉之賞賜極厚故致兵彊國富今可汗後附與之爭寵須深結於天子自表至誠既以逺地未得朝覲宜立一功以明臣節處羅曰如何君肅曰吐谷渾者啟民少子莫賀咄設之母家也今天子又以義成公主妻啟民啟民畏天子之威而與之絶吐谷渾亦因憾漢職貢不修可汗若請誅之天子必許漢撃其内可汗攻其外破之必矣然後身自入朝道路無阻因見老母不亦可乎處羅大喜遂遣使朝貢大業六年帝將西討吐谷渾遣侍御韋節召處羅會於大斗㧞谷其國人不從處羅謝使者辭以他故適會其酋長射匱使來求㛰裴矩因奏曰處羅不朝自恃彊大臣請以計弱之分裂其國則易制也射匱者都六之子達頭之孫達頭舊為西面可汗初與沙鉢略有隙遂分為别部因東可汗雍虞閭死後自立為歩伽可汗達頭死後其孫射匱微弱不得為可汗代為可汗君臨西面今聞其失職附𨽻於處羅故遣使來以結援耳願厚禮其使拜為大可汗突厥勢分兩從我矣帝從之遂召其使者言處羅不順之意稱射匱有好心吾得立為大可汗令發兵誅處羅然後當為㛰也帝取桃竹白羽箭一枚以賜射匱因謂之曰此事宜速疾如箭也使者反路經處羅處羅愛箭將留之使者譎而得免射匱聞而大喜興兵襲之處羅大敗棄妻子將左右數千騎東走遁於高昌東保時羅漫山高昌王麴伯雅上狀帝遣裴矩將向氏親要左右往曉喻之遂入朝詔留其累弱萬餘口令其弟闕達設牧畜於會寧郡處羅至長安煬帝留不遣後從征高麗賜號為曷􅀢那可汗賞賜甚厚十年以信義公主嫁焉賜錦綵袍千具綵萬匹帝將為之復國以遼東之役故未遑也每從行幸遇江都之亂從宇文化及至河北化及敗唐已革命歸于京師封歸義郡王初處羅與始畢可汗有隙及是始畢遣使請殺之高祖重違始畢意乃引處羅於内殿與縱酒既而送至中書門下省縱北突厥使殺之闕達設初居於會寧有部落三千餘騎至隋末自稱闕可汗武徳初遣使内附詔厚加撫勞尋為李軌所滅自曷􅀢那可汗之入隋也射匱悉有其地國人立之為可汗射匱復開土宇東至金山西臨西海自玉門以西諸國皆役屬之遂與北突厥為敵乃建庭於龜兹北三彌山尋卒弟統葉護可汗代立統葉護可汗勇而有謀善攻戰遂北并鐵勒西拒波斯南接罽賔悉歸之控弦數十萬霸有西域據舊烏孫之地又移庭於石國北千里其西域諸國王悉授頡利發并遣吐屯一人監統之督其征賦西戎之盛未之有也自統葉護之後其種類互相攻滅因而傳禪或離或合終唐中葉然後破散云鐵勒鐵勒之先匈奴之苖裔也種類最多自西海之東依山據谷往往不絶獨洛河北有僕骨同羅韋紇㧞也古覆羅並號俟斤䝉陳吐如紇斯結渾斛􅀢等諸姓勝兵可二萬伊吾以西焉耆之北傍白山則有契弊薄洛職乙咥蘇婆那曷烏護紇骨也咥於尼護等勝兵可二萬金山西南有􅀢延陁咥勒􅅜十槃達契等萬餘兵康國北傍阿得水則有訶咥曷嶻撥忽比干具海曷比悉阿嵯蘇㧞也末謁達等有三萬許兵傍嶷海東西有蘇路羯三索咽蔑促􅀢忽等諸姓八千餘兵拂菻東則有恩屈阿蘭北褥丸離伏嗢昬等近二萬人北海南則都波等雖姓氏各别總謂為鐵勒並無君長分屬東西兩突厥居無恒所隨水草流移人性凶忍善於騎射貪婪尤甚以寇抄為生近西邊者頗為藝植多牛而少馬自突厥有國東西征討皆資其用以制北荒十六國慕容垂時塞北後魏末河西並云有勅勒鐵勒盖勅勒之音訛也隋開皇末晉王廣北征納啟民破歩伽可汗鐵勒於是分散大業元年突厥處羅可汗撃鐵勒諸部厚税斂其物又猜忌􅀢延陀等恐為變遂集其魁帥數百人誅之由是一時反叛拒處羅遂立俟利發俟斤契弊歌楞為易勿真莫何可汗居貪汗山復立􅀢延陀内俟斤字也咥為小可汗處羅既敗莫何可汗始大莫何勇毅絶倫甚得衆心為鄰國所憚伊吾高昌焉耆諸國悉附之其俗大抵與突厥同唯丈夫㛰畢便就妻家待産乳男女然後歸舍死者殯埋之此其異也三年遣使貢方物自是不絶云庫莫奚庫莫奚聞於後魏及後周其先東部鮮卑宇文之别種也初為慕容廆所破遺落者竄匿松漠之間其俗甚不潔而善射獵好為寇抄邊郡頗罹其害後魏登國三年道武親自出討至弱水南大破之獲其馬牛羊豕十餘萬魏氏南遷未遑征討種類漸盛及獻文文成之世嵗致名馬文皮孝文初遣使朝貢太和四年輙入塞内辭以畏地豆于鈔掠詔切責之二十年入寇安州時營燕幽三州兵撃走之後復款附每求入塞交易宣武許之自是嵗常朝獻至于齊世不絶與契丹宻壤每相攻撃突厥之興也嘗臣屬之衆既繁顆遂分為五部一曰辱紇主二曰莫賀弗三曰契箇四曰木崑五曰室得冶饒樂水北即鮮卑故地一名如洛環水盖饒樂之訛也每部置俟斤一人為其帥隨逐水草頗同突厥有阿會氏五部中最為彊盛諸部歸之至隋代始去庫莫獨稱曰奚唐貞觀中酋長可度者内附太宗為置饒樂都督府拜可度者為使持節六州諸軍事饒樂都督樓煩縣公賜姓李氏以所統五部為五州各以酋豪為刺史其後歴唐數世叛服不常懿宗時契丹彊大奚不敢與亢舉部服屬之契丹政苛奚不堪命其别部分保媯州北山遂為東西奚云契丹契丹之先與庫莫奚異種而同類並為慕容氏所破俱竄於松漠之間後魏登國中為道武所破遂逃併與庫莫奚分皆經數十年稍滋蔓有部落遂於和龍之北數百里專為寇鈔邊郡苦之大武太平真君以來始貢名馬獻文時使莫弗紇何辰來獻得班饗於諸國之末於是東北羣狄悉萬丹部阿大何部伏弗郁部羽陵部曰連部匹絜部犂部吐六千部各從契丹以其名馬文皮入貢故諸部嵗得交市於和龍宻雲之間而常貢亦且不絶太和三年高句麗與蠕蠕謀欲取地豆于地分之契丹懼其侵軼其莫賀弗勿于率其部落車三千乘衆萬餘口驅雜畜求内附止於白狼水東自宣武孝明世訖于齊氏受禪使命相尋天保四年契丹犯塞文宣親戎北討至平州遂西趣長漸詔司徒潘相樂帥精騎五千自東道趣青山復詔安徳王韓軌帥精騎四千東趣斷契丹走路帝躬踰山嶺奮撃大破之虜十餘萬口雜畜數十萬頭相樂又於青山大破契丹别部所虜生口皆分置諸州其後復為突厥所逼又以萬家寄於高麗其俗與靺鞨同好為寇暴父母死而悲哭者以為不壯但以其屍置於山樹之上經三年然後收其骨而焚之因酌酒而祝之曰冬月時向陽食夏月時向隂食若我射獵時令我多得猪鹿其無禮頑嚚於諸夷最甚隋開皇四年酋帥莫賀弗來謁五年悉其衆款塞文帝納之聴居其故地其後契丹别部出伏等四千餘家背突厥來降文帝方與突厥和好重失逺人之情悉令給糧還本勅突厥撫納之固辭不去由是部落漸衆遂北逐水草當遼西正北二百里依託紇臣水而居東西亘五百里南北三百里分為十部兵多者三千少者千餘逐寒暑隨水草畜牧有戰伐則酋帥相與議之興兵動衆合如符契突厥沙鉢略可汗使吐屯潘咥統之契丹殺潘咥而遁大業七年遣使獻其方物唐初其君長頻至京師貞觀中酋帥窟哥率其部内屬太宗以契丹部為松漠都督府拜窟哥為持節十州諸軍事松漠都督封無極男賜姓李氏武后世窟哥之孫盡忠與其將孫萬榮大為寇亂王師數出始克殄滅自是唐室世授契丹爵命或出降公主以慰安之其在開元天寳間遣使朝獻者無慮二十輩至徳寳應時再修職貢大歴中十三貞元間三元和中七大和開成間凡四然天子惡其反覆不親信之也會昌二年為囬紇所破始復内附咸通中其王習爾之再遣使入朝部落寢盛習爾之死族人欽徳嗣光啟初天下盜起北疆多故欽徳乗亂侵掠奚室韋諸部盡役屬之欽徳末年政不競諸部離貳初契丹有八部皆號大人内推一人為主法常三嵗一代有耶律安巴堅者自怙其彊不肯受代七部劫之不得已傳之次第者自帥種落居古漢城别為一部後稍以兵撃滅七部北侵室韋女真西取突厥故地東北諸部皆憚服之遂稱帝改年後唐天成中卒子徳光代立陷營平二州晉祖起并州籍其兵勢割幽薊瀛莫涿檀順新媯儒武雲應寰朔蔚十六州以報之後改稱為大遼云室韋室韋後魏末通焉其國在勿吉北千里去洛陽六千里室或為失盖契丹之類其南者為契丹在北者號為室韋路出和龍北千餘里入契丹國又北行十日至啜水又北行三日有善水又北行三日有犢子山其山高大周囬三百餘里又北行三百里有大水名曰屈利又北行三日至刃水又北行五日到其國有大水從北來廣四里餘名捺水國人音語與庫莫微豆莫婁國同地宜粟麦及穄又多貂皮夏則城居冬逐水草丈夫索髪用角弓其箭尤長婦女束髪作义手髻其國少竊盜盜一徵三殺人者責三百匹男女悉衣白鹿皮襦袴有麴釀酒俗愛赤珠為婦人飾穿掛於頸以多為貴女不得此乃至不嫁東魏武定二年始遣使張烏豆伐等來獻方物迄齊世朝聘不絶其後分為五部不相總一所謂南室韋北室韋深末恒室韋大室韋並無君長人衆貪弱突厥沙鉢略可汗常以吐屯潘垤統領之南室韋在契丹北三千里土地卑濕至夏則移向北貸㪍欠對二山多草木饒禽獸又多蚊蚋人皆巢居以避其患漸分為二十五部每部有餘莫弗暪咄猶酋長也死則子弟代之絶嗣則擇賢豪而立之其衣服與契丹同乗牛車以蘧蒢為屋如突厥氊車之狀渡水則束薪為栰或有以皮為舟者馬則織草為韉結繩為轡寢則屈木為室以蘧蒢覆上移則載行以䐗皮為席編木為籍婦女皆抱膝而坐地力薄田收甚微無羊少馬多䐗牛與靺鞨同俗㛰嫁之法二家相許竟輙盜婦將去然後送牛馬為聘更將婦歸家待有娠乃相隨還舍婦人不再嫁以為死人之妻難以與居部落共為大棚人死則置之棚上居䘮三年唯四哭其國無鐵取給於高麗自南室韋北行十一日至北室韋分為九部落繞吐紇山而居其部落渠帥號乞引莫賀咄每部有莫何弗三人以貳之氣候最寒雪深没馬冬則入山居土穴牛畜多凍死饒麞鹿以射獵為務食肉衣皮鑿冰没水中而網取魚鼈地多積雪懼陷阬穽騎木而行倃即止俗皆捕貂為業􅃣以狐貂衣以魚皮又北行千里至鉢室韋依胡布山而住人衆多於北室韋不知為幾部落用樺皮盖屋其餘同北室韋從北室韋西南四日行至深末怛室韋因水為號冬月穴居以避太隂之氣又西北數千里至太室韋徑路險阻言語不通尤多貂皮青䑕北室韋時遣使貢獻餘無至者隋開皇大業間並來朝貢唐時所聞則又分為數部焉有謂嶺西室韋山北室韋黄頭室韋大如者室韋小如者室韋婆萵室韋訥北室韋駱丹室韋悉處栁城郡之東北近者三千五百里逺者六千二百里貞觀五年始獻豐貂後再入貢長夀二年叛將軍李多祚撃定之景龍元年修貢如初開元天寳間十大歴間十一朝獻貞元四年寇振武明年遣使謝罪太和間三大中間一朝獻咸通時大酋怛列通表至京師以非顯夷史略其事云地豆于地豆于後魏時通焉在室韋西千餘里多牛羊出名馬皮為衣服無五穀唯食肉酪魏延興二年遣使朝貢至太和六年貢使不絶十四年頻來犯塞孝文詔征西大將軍陽平王頤撃走之自後嵗朝京師迄武定末貢使相尋及齊受禪亦來朝貢烏洛侯烏洛侯後魏時通焉在地豆于北去代都四千五百餘里其地下濕多霧氣而寒民冬則穿地為室夏則隨原阜畜牧多豕有榖麥無大君長部落莫弗皆世為之其俗繩髪皮服以珠為􅎖人尚勇不為姦竊故慢藏野積而無寇盜好射獵樂有箜篌木槽革面而施九絃其國西北有完水東北流合於難水其小水皆注於難水東入于海又西北二十日行有于已尼大水所謂北海也魏太武太平真君四年來朝稱其國西北有魏先帝舊墟石室南北九十歩東西四十歩高七十尺室有神靈人多祈請太武遣中書侍郎李敞告祭焉刻祝文於石室之壁而還唐貞觀六年遣使朝貢云烏羅渾國亦謂之烏䕶皆烏洛侯音之訛也東與靺鞨南與契丹北與烏丸為隣風俗與靺鞨同驅度寐驅度寐隋時聞焉在室韋之北其人甚長而衣短不索髪皆裹頭居土窟中唯有䐗更無諸畜人輕㨗一跳三丈餘又能立浮卧浮履水没腰與陸走不别數乗大船至北室韋鈔掠無甲胄以石為矢鏃霫先立反霫匃奴之别種隋時通焉與靺鞨為隣治黄水北亦鮮卑故地勝兵萬餘人習俗與突厥略同亦臣于頡利其渠帥號為俟斤唐貞觀中遣渠帥内附㧞悉彌㧞悉彌一名弊利國隋時聞焉在北庭北海南結骨東南依山散居去敦煌九千餘里有渠帥無王號户二千餘其人雄健能射獵國多雪恒以木為馬雪上逐鹿其狀似楯而頭高其下以馬皮順毛衣之令毛著雪而滑如著屧屐縛之足下若下阪走過奔鹿若平地履雪即以杖刺地而走如船焉上阪即手持之而登每獵得鹿將家室就而食之盡更移處其所居即以樺皮為舍丈夫翦髪樺皮為㡌通志卷二百
