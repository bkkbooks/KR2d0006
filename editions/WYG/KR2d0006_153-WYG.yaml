body:
  text: 通志卷一百三十宋右廸功郎鄭樵漁仲撰列傳第四十三晉王敦沈充桓温孟嘉桓元卞範之殷仲文王彌張昌陳敏王如杜曽杜弢王機祖約蘇峻孫恩盧循徐道覆譙縱王敦字處仲司徒導之從父兄也父基治書侍御史敦少有竒人之目尚武帝女㐮城公主拜駙馬都尉除太子舎人時王愷石崇以豪侈相尚愷嘗置酒敦與導俱在坐有女伎吹笛小失聲韻愷便敺殺之一坐改容敦神色自若他日又造愷愷使羙人行酒以客飲不盡輙殺之酒至敦導所敦故不肯持羙人悲懼失色而敦慠然不視導素不能飲恐行酒者得罪遂勉彊盡觴導還嘆曰處仲若當世心懐剛忍非令終也洗馬潘㴞見敦而目之曰處仲蜂目已露而豺聲未振若不噬人亦當為人所噬及太子遷許昌詔東宫官屬不得送敦及洗馬江統潘㴞舎人杜蕤魯瑶等冐禁於路側望拜流涕時論稱之遷給事黄門侍郎趙王倫篡位敦叔父彦爲兖州刺史倫遣敦慰勞之㑹諸王起義彦被齊王冏檄懼倫兵彊不敢應命敦勸彦起兵應諸王故彦遂立勲績惠帝反正敦遷散騎常侍左衛將軍大鴻臚侍中出除廣武將軍青州刺史永嘉初徵為中書監于時天下大亂敦悉以公主時侍婢百餘人配給將士金銀寳物散之於衆單車還洛東海王越自滎陽來朝敦謂所親曰今威權悉在太傅而選用表請尚書猶以舊制裁之太傅今至必有誅罰俄而越収中書令繆播等十餘人殺之越以敦為揚州刺史潘㴞説越曰今樹處仲於江外使其肆豪彊之心是見賊也越不從其後徵拜尚書不就元帝召為安東軍諮祭酒㑹揚州刺史劉陶卒帝復以敦為揚州刺史加廣武將軍尋進左將軍都督征討諸軍事假節帝初鎮江東威名未著敦與從弟導等同心翼戴以隆中興時人謂之語曰王與馬共天下尋與甘卓等討江州刺史華軼斬之蜀賊杜弢等作亂荆州刺史周顗退走敦遣武昌太守陶侃豫章太守周訪等討弢而敦進住豫章為諸軍繼援及侃破弢敦上侃為荆州刺史既而侃為弢將杜曽所敗敦以處分失所自貶為廣武將軍帝不許侃之滅弢也敦以元帥進鎮東大將軍開府儀同三司加都督江揚荆湘交廣六州諸軍事江州刺史封漢安侯敦始自選置兼統州郡焉頃之杜弢將杜𢎞南走廣州求討桂林賊自效敦許之陶侃距𢎞不得進乃詣零陵太守尹奉降奉送𢎞與敦敦以為將遂見寵待南康人何欽所居險固聚黨數千人敦就加四品將軍於是專擅之迹漸彰矣建武初又遷征南大將軍開府如故中興建拜侍中大將軍江州牧遣部將朱軌趙誘伐杜曽為曽所殺敦自貶免侍中并辭牧不拜尋加荆州牧敦上疏曰昔漢祖以神武革命開建帝業繼以文帝之賢纂承洪緒清虛元黙擬跡成康賈誼歎息以為天下倒懸雖言有抑揚不失事體今聖朝肈建漸振宏綱往叚匹磾遣使求效忠節尚未有勞便以方州與之今靳明等為國雪耻欲除大逆此之志望皆欲附翼天飛雖功大宜報亦宜有以裁之當杜漸防萌愼之在始中間不逞互生事變皆非忠義率以一朝之榮天下漸弊實由於此春秋之時天子微弱諸侯奢侈晉文思崇周室至有求隧之請襄王譲之以禮聞義而服自爾諸侯莫敢越度臣謂前者賊宼未殄茍以濟事朝廷諸所加授頗多爵位兼重今自臣以下宜皆除之且以塞群小矜功之望夷狄無懕之求若復遷延顧望流俗使姦狡生心遂相怨謗指擿朝廷讒謏蜂起臣有以知陛下無以正之此安危之機天下之望臣門戶特受榮任備兼權重渥恩偏隆寵過公族行路厮賤猶謂不可臣獨何心可以安之臣一宗誤陛下傾覆亦將尋至雖復灰身剖心陛下追悔將何所及伏願諒臣至欵及今際㑹小觧散之並授賢儁少慰有識各得盡其所懐則人思競勸矣州牧之號所不敢當輙送所假侍中貂蟬又宜并官省職以塞群小覬覦之望帝優詔不許又固辭州牧聽爲刺史時劉隗用事頗疎間王氏導等甚不平之敦上疏曰導昔䝉殊寵委以事機䖏已求當竭誠奉國遂藉恩私居輔政之重帝王體遠事義不同雖皇極初建道敎方闡惟新之羙猶有所闕臣每慷慨於遐逺愧憤於門宗是以前後表疏何嘗不寄言及此陛下未能少垂顧眄暢臣微懐云導頃見疎外所陳如作而其萌已著其為咎責豈惟導身而已群從所䝉並過才分導誠不能自量陛下亦爱忘其短長人近情恃恩昧進獨犯龍鱗迷不自了臣竊所自憂慮未詳所由惶愧踧踖情如灰土天下事大盡理實難導雖凡近未有穢濁之累既往之勲疇昔之顧情好綢繆足以厲薄俗眀君臣合徳義同古賢昔臣親受嘉命云吾與卿及茂𢎞當管鮑之交臣忝外任漸冉十載訓誘之誨日有所忘至於斯命銘之於心竊猶眷眷謂前恩不得一朝而盡伏惟陛下聖哲日新廣延俊乂臨之以政齊之以禮頃者令導内綜機宻出録尚書杖節京師并統六軍既為刺史兼居重號殊非人臣之體流俗好評必有譏謗宜省録尚書杖節及都督且王佐之器當得宏逹逺識髙正明斷道徳優備者以臣闇識未見其才然於見人未踰於導加輔翼積年實盡心力霸王之主何嘗不任賢使能共相終始管仲有三歸反坫之譏子犯有臨河要君之責蕭何周勃得罪囹圄然終為良佐以導之才何能無失當令任不過分役其所長以功補過要之將來導性慎宻尤能忍事善於斟酌有文章才義動静顧問起予聖懐外無過寵公私得所今皇祚肇建八表承風聖恩不終則遐邇失望天下荒弊人心易動物聽一移將致疑惑臣非敢茍私親親惟欲忠於社稷表至導封以還敦敦復遣奏之初敦務自矯厲雅尚清談口不言財色既素有重名又立大功於江左專任閫外手控彊兵羣從貴顯威權莫貳遂欲專制朝廷有問鼎之心帝畏而惡之遂引劉隗刁恊等以為心膂敦益不能平於是嫌隙始構矣每酒後輙詠魏武帝樂府歌曰老驥伏櫪志在千里烈士暮年壯心不已以如意打唾壺為節壺邉盡缺及湘州刺史甘卓遷梁州敦欲以從事中郎陳頒代卓帝不從更以譙王承鎮湘州敦復上表陳古今忠臣見疑於君而蒼蠅之人交構其間欲以感動天子帝愈忌憚之俄加敦羽葆鼓吹増從事中郎掾屬舎人各二人帝以劉隗為鎮北將軍戴若思為征西將軍悉發揚州奴為兵外以討胡實禦敦也永昌元年敦率衆内向以誅隗為名上疏曰劉隗前在門下邪佞諂媚譖毁忠良疑惑聖聽遂居權寵撓亂天機威福自由有識杜口大起事役勞擾士庶外託舉義内自封植奢僭過制乃以黄散為参軍晋魏已來未有此比傾盡帑藏以自資奉賦役不均百姓嗟怨免良人奴自為惠澤自可使其大田以充倉廪今便割配皆充隗軍臣前求迎諸將妻息聖恩聽許而隗絶之使三軍之士莫不怨憤又徐州流人辛苦經載家計始立隗悉驅逼以實已府當陛下踐阼之始投刺王官本以非常之慶使豫䝉榮分而更充征役復依舊名普取出客從來乆逺經涉年載或死亡滅絶或自贖得免或見放遣或父兄時事身所不及有所不得輙罪本主百姓哀憤怨聲盈路身欲北渡以遠朝廷爲名而宻知機要潛行險慝進人退士髙下任心姦狡饕餮未有隗比雖無忌宰噽𢎞㳟石顯未足為諭是以遐邇憤慨群后失望臣備位宰輔與國存亡誠乏平勃濟時之畧然自忘駑駘志存社稷豈忍坐視成敗以虧聖羙事不獲已今輙進軍同討姦孽願陛下深垂省察速斬隗首則衆望厭服皇祚復隆隗首朝懸諸軍夕退昔太甲不能遵明湯典顚覆厥度幸納伊尹之勲殷道復昌漢武雄畧亦惑江充䜛佞邪說至乃父子相屠流血丹地終能剋悟不失大綱今日之事有逾於此願陛下深垂三思諮詢善道則四海乂安社稷永固矣又曰陛下昔鎮揚州虚心下士優賢任能寛以得衆故君子盡心小人畢力臣以闇蔽豫奉徽猷是以遐邇望風有識自竭王業遂隆四海延頸咸望太平自從信隗以來刑賞不中街談巷議皆云如吳之將亡聞之惶惑精魂飛散不覺胷臆推破泣血横流陛下當全祖宗之業存神器之重察臣前後所啓奈何棄忽忠言遂信奸佞誰不痛心願出臣表諮之朝臣介石之機不俟終日令諸軍早還不至虚擾敦黨吳興人沈充起兵應敦敦至蕪湖又上表罪狀刁恊帝大怒下詔曰王敦憑恃寵靈敢肆狂逆方朕太甲欲見幽囚是可忍也孰不可忍也今親帥六軍以誅大逆有殺敦者封五千戶侯召戴若思劉隗並㑹京師敦兄含時為光禄勲叛奔于敦敦至石頭欲攻劉隗其將杜𢎞曰劉隗死士衆多未易可尅不如攻石頭周扎少恩兵不為用攻之必敗扎敗則隗自走敦從之扎果開城門納𢎞諸將與敦戰王師敗績敦入石頭擁兵不朝放肆兵士刧掠内外宫省奔散惟有侍中二人侍帝帝脫戎衣著朝服顧而言曰欲得我處但當早道我自還琅邪何至困百姓如此敦収周顗戴若思害之以敦為丞相江州牧進爵武昌郡公邑萬户使太常荀崧就拜又加羽葆鼓吹並偽譲不受還屯武昌多害忠良寵樹親戚以兄含為衛将軍都督沔南軍事領南蠻校尉荆州刺史以義陽太守任愔督沔北諸軍事南中郎将敦又自督寜益二州及帝崩太寕元年敦諷朝廷徵已明帝乃手詔徵之語在明帝紀又使兼太常應詹拜授加黄鉞班劒虎賁二十人奏事不名入朝不趨劒履上殿敦移鎮姑孰帝使侍中阮孚齎牛酒犒勞敦稱疾不見使主簿受詔以王導為司徒敦自為揚州牧敦既得志暴慢愈甚四方貢獻多入已府將帥岳牧悉出其門徙含為征東將軍都督揚州江西諸軍事從弟舒為荆州彬為江州邃為徐州含字處𢎞凶頑剛暴時所不齒以敦貴重故歴顯位敦以沈充錢鳳爲謀主諸葛瑶鄧嶽周撫李恒謝雍為𤓰牙充等並凶險驕恣共相驅扇殺戮自己又大起營府侵人田宅發掘古墓剽掠市道士庻觧體咸知其禍敗焉敦從弟豫章太守稜日夜切諌敦怒陰殺之敦無子飬含子應及敦病甚拜應為武衛將軍以自副錢鳳謂敦曰脫其不諱便當以後事付應敦曰非常之事豈常人所能且應年少安可當大事我死之後莫若觧衆放兵歸身朝廷保全門户此計之上也退還武昌收兵自守貢獻不廢亦中計也及吾尚存悉衆而下萬一僥倖計之下也鳳謂其黨曰公之下計乃上䇿也遂與沈充定謀湏敦死後作難敦又忌周扎殺之而盡滅其族常從督冉曽公乘雄等元帝腹心敦又害之以宿衛尚多奏令三畨休二及敦病篤詔遣侍中陳晷散騎常侍虞􅔎問疾時帝將討敦微服至蕪湖察其營壘又屢遣大臣訊問其起居遷含驃騎大将軍開府儀同三司含子瑜散騎常侍敦以温嶠為丹陽尹欲使覘伺朝廷嶠至具言敦宻謀帝欲討之知其為物情所畏服乃偽言敦死於是下詔曰先帝以聖徳應運創業江東司徒導首居心膂以道翼讃故大將軍敦参處股肱或内或外夾輔之勲與有力焉階緣際㑹遂據上宰杖節專征委以五州刁恊劉隗立朝不允敦抗義致討情希鬻拳兵雖犯順猶嘉乃誠禮秩優崇人臣無貳事觧之後刼掠城邑放恣兵人侵及宫省背違赦信誅戮大臣縱凶極逆不朝而退六合阻心人情同憤先帝含垢忍耻容而不責委任如舊禮秩有加朕以不天尋丁酷罰焭焭在疚哀悼靡寄而敦曽無臣子追逺之誠又無輔孤同奨之操繕甲聚兵盛夏来至輙以天官假授私屬將以威脅朝廷傾危宗社朕愍其狂戾冀其覺悟故且含忍以觀其終而敦矜其不義之彊有侮弱朝廷之志棄親用羇背賢任惡錢鳳豎子専為謀主逞其凶慝誣罔忠良周嵩亮直讜言致禍周扎周莚累世忠義聽受讒構殘夷其宗秦人之酷刑不過五敦之誅戮傍濫無辜滅人之族莫知其罪天下駭心道路以目神怒人怨篤疾所嬰昬荒悖逆日以滋甚輙立兄息以自承代多樹私黨莫非同惡未有宰相繼體而不由王命者也頑凶相奨無所顧忌擅録冶工輙割運漕志騁凶醜以闚神器社稷之危匪夕則旦天不長姦敦以隕斃鳳承凶宄彌復煽逆是可忍也孰不可忍也今遣司徒導鎮南将軍丹陽尹嶠建威将軍趙允虎旅三萬十道並進平西將軍邃率兖州刺史遐奮武将軍峻奮武将軍瞻精銳三萬水陸齊埶朕親御六軍左衛将軍亮右衛將軍允護軍将軍詹領軍將軍瞻中軍将軍壼驍騎將軍艾驃騎将軍南頓王宗鎮軍将軍汝南王祐太宰西陽王羕被練三千組甲三萬總統諸軍討鳳之罪罪止一人朕不濫刑有能殺鳳送首封五千户侯賞布五千疋冠軍将軍鄧嶽志氣平厚識經邪正前将軍周撫質性詳簡義誠素著功臣之胄情義兼常往年從敦情節不展畏逼首領不得相違論其乃心無貳王室朕嘉其誠方任之以事其餘文武諸為敦所授用者一無所問刺史二千石不得輙離所職書到奉承自求多福無或猜嫌以取誅滅敦之将士從敦彌年怨曠日乆或父母隕没或妻子䘮亡不得奔赴銜哀從役朕甚愍之希不悽惶其單丁在軍無有兼重者皆遣歸家終身不調其餘皆假三年休訖還臺當與宿衛同例三畨明承詔書朕不負信又詔曰敢有捨王敦姓名而稱大將軍者軍法從事敦病轉篤不能御衆使錢鳳鄧嶽周撫等率衆三萬向京師含謂敦曰此家事吾便當行乃以含爲元帥鳳等問敦曰事尅之日天子云何敦曰尚未南郊何得稱天子便盡卿兵執保護東海王及裴妃而已乃上疏罪狀温嶠以誅姦臣為名含至江寜司徒導遺含書曰近承大将軍困篤綿綿或云已有不諱悲怛之情不能自勝尋知錢鳳大嚴欲肆姦逆朝士忿憤莫不扼腕去月二十三日得征北告劉遐陶瞻蘓峻等深懐憂慮不謀同辭都邑大小及二宫宿衛咸懼有往年之掠不復保其妻孥是以聖主發赫斯之命具如檄㫖近有嘉詔崇兄八命望兄奨群賢忠義之心抑姦細不逞之計當還武昌盡力藩任卒奉来告乃承與犬羊俱下雖當逼廹猶以罔然兄立身率素見信於門宗年踰耳順位極人臣仲玉安期亦不足作佳少年本來門戶良可惜也兄之此舉謂可得如大將軍昔年之事乎昔年佞臣亂朝人懐不寕如導之徒心思外濟今則不然大将軍來屯於湖漸失人心君子危怖百姓勞弊将終之日委重安期安期斷乳來幾日又於時望便可襲宰相之迹邪自開闢以来頗有宰相孺子者不諸有耳者皆謂是將禅代意非人臣之事也先帝中興遺爱在人聖主聰明徳洽朝野思與賢哲𢎞濟艱難不北面而執臣節乃私相樹建肆行威福凢在人臣誰不憤歎此直錢鳳不良之心聞於逺近自知無全遂唱姦逆至如鄧伯山周道和恒有好情往来人士咸皆明之方欲委任與共勠力非徒無慮而已也導門户大小受國厚恩兄弟顯寵可謂隆矣導雖不武情在寕國今日之事明目張膽為六軍之首寕忠國而死不無頼而生矣但恨大將軍桓文之勲不遂而兄一旦為逆節之臣負先人平素之志既沒之日何顔見諸父於黄泉謁先帝於地下邪執省來告為兄羞之且悲且慙願速建大計惟取錢鳳一人使天下獲安家國有福故是竹素之事非惟免禍而已夫福如反手用之即是導所統六軍石頭萬五千人宫内後苑二萬人護軍屯金城六千人劉遐已至征北昨已濟江萬五千人以天子之威文武畢力豈可當乎事猶可追兄早思之大兵一奮導以為灼怛也含不答帝遣中軍司馬曹渾等擊含于越城含軍敗敦聞怒曰我兄老婢耳門户衰矣兄弟才兼文武者世將處季皆早死今世事去矣語参軍吕寳曰我當力行因作執而起困乏復卧鳳等至京師屯於水南帝親率六軍以禦鳳頻戰破之敦謂羊鑒及子應曰我亡後應便即位先立朝廷百官然後乃營𦵏事初敦始病夢白犬自天而下嚙之又見刁協乘軺車導從瞋目令左右執之俄而敦死時年五十九應秘不發喪裹尸以席蠟塗其外埋於㕔事中與諸葛瑶等常縱酒淫樂沈充自吳帥衆萬餘人至與含等合充司馬顧颺説充曰今舉大事而天子已扼其喉情離衆沮鋒摧執挫持疑猶豫必至禍敗今若决破柵塘因湖水灌京邑肆舟艦之執極水軍之用此所謂不戰而屈人之兵上䇿也藉初至之鋭并東南衆軍之力十道俱進衆寡過倍理必摧陷中䇿也轉禍為福因敗為成召錢鳳計事因斬之以降下䇿也充不能用颺逃歸于吳含復率衆渡淮蘇峻等逆擊大敗之充亦燒營而退既而周光斬錢鳳吳儒斬沈充並傳首京師有司議曰王敦㴞天作逆有無君之心宜依崔杼王淩故事剖棺戮屍以彰元惡於是發瘞出尸焚其衣冠跽而刑之敦充首同日懸於南桁觀者莫不稱慶敦首既懸莫敢収𦵏者尚書令郗鑒言於帝曰昔王莾漆頭以輗車董卓然腹以照市王淩儭土徐馥焚首前朝誅楊駿等皆先極官刑後聽私殯然春秋許齊㐮之𦵏紀侯魏武義王脩之哭袁譚由斯言之王誅加於上私義行於下臣以為可聽私𦵏於義為宏詔許之於是敦家収𦵏焉含父子乘單船奔荆州刺史王舒舒使人沉之于江餘黨悉平敦眉目疎朗性簡脫有鑒裁學通左氏口不言財利尤好清談時人莫知唯族兄戎異之經畧指麾千里之外肅然而麾下擾而不能整武帝嘗召時賢共言伎蓺之事人人皆有所説惟敦都無所闗意色殊惡自言唯知擊鼓因振䄂揚袍音節諧順神氣自得傍若無人舉坐嘆其雄爽石崇以奢豪矜物厠上常有十餘婢侍列皆有容色置甲煎粉沉香汁有如厠者皆易新衣而出客多羞脱衣而敦脫故着新意色無怍群婢相謂曰此客必能作賊又嘗荒恣於色體為之弊左右諌之敦曰此甚易耳乃開後閤驅諸婢妾數十人並放之時人嘆異焉沈充字士居吳興人少好兵書頗以雄豪聞于鄉里敦引為参軍充因薦同郡錢鳳鳳字世儀敦以為鎧曹参軍數得進見知敦有不臣之心因進邪説遂相朋構專弄威權言成禍福遭父喪外託還葬而宻為敦使與充交構初敦参軍熊甫見敦委任鳳将有異圖因酒酣謂敦曰開國承家小人勿用佞倖在位鮮不敗業敦作色曰小人阿誰甫無懼容因此告歸臨與敦别因歌曰徂風飈起蓋山陵氛霧蔽日玉石焚往事既去可長嘆念别惆悵㑹復難敦知其諷已而不納明帝將伐敦遣其鄉人沈禎諭充許以為司空充謂禎曰三司具瞻之重豈吾所任幣重言甘古人所畏且丈夫共事終始當同寕可中道改易人誰容我禎曰不然舎忠與順未有不亡者也大將軍阻兵不朝爵賞自已五尺之童知其異志今此之舉將行篡弑耳豈同於往年乎是以疆場諸將莫不歸赴本朝内外之士咸願致死正以移國易主義不北面以事之也奈何恊同逆圖當不義之責乎朝廷坦誠禎所具也賊之黨類猶宥有罪與之更始况見機而作邪充不納率兵臨發謂其妻子曰男兒不豎豹尾終不還也及敗歸吳興亡失道誤入其故将吳儒家儒誘充内重壁中因笑謂充曰三千户侯也充曰封侯不足貪也爾以大義存我我宗族必厚報汝若必殺我汝族滅矣儒遂殺之充子勁竟滅吳氏勁見忠義傳桓温字元子宣城太守彜之子也生未朞而太原温嶠見之曰此兒有竒骨可試使啼及聞其聲曰眞英物也彜以嶠所賞故遂名之曰温嶠笑曰果爾後将易吾姓也彜為韓晃所害涇令江播豫焉温時年十五枕戈泣血志在復讎至年十八㑹播已終子彪兄弟三人居䘮置刃杖中以為温備温詭稱弔賔得進刃彪於廬中并追二弟殺之時人稱焉温豪爽有風槩姿貌甚偉面有七星少與沛國劉惔善惔嘗稱之曰温眼如紫石稜鬚作蝟毛磔孫仲謀晋宣王之流亞也選尚南康長公主拜駙馬都尉襲爵萬寕縣男除琅邪太守累遷徐州刺史温與廋翼友善恒相期以寕濟之事翼嘗薦温於明帝曰桓温少有雄畧願陛下勿以常人遇之常壻畜之宜委以方召之任託其𢎞濟艱難之勲翼卒以温為都督荆梁四州諸軍事安西将軍荆州刺史領護南蠻校尉假節時李勢微弱温志在立勲于蜀永和二年率衆西伐時康獻太后臨朝温将發上疏而行朝廷以蜀險逺而温兵寡少深入敵場甚以為憂初諸葛亮造八陣圖於魚復平沙之上壘石為八行行相去二丈温見之謂此常山蛇勢也文武皆莫能識之及軍次彭模乃命参軍周楚孫盛守輜重自將步卒直指成都勢使其叔父福及從兄權等攻彭模楚等禦之福退走温又擊權等三戰三㨗賊衆散自閒道歸成都勢於是悉衆與温戰于笮橋参軍龔護戰没衆懼欲退而鼓吏誤鳴進鼓於是攻之勢衆大潰乗勝直進焚其小城勢遂夜遁九十里至晋夀葭萌城其将鄧嵩咎堅勸勢降乃面縛輿櫬請命温觧縳焚櫬送于京師温停蜀三旬舉賢旌善僞尚書僕射王誓中書監王愉鎮東将軍鄧定散騎常侍韓璩等皆蜀之良也並以為参軍百姓咸悦軍未旋而王誓鄧定隗文等反温復討平之振旅還江陵進位征西大将軍開府封臨賀郡公及石虎死温欲率衆北征先上疏求朝廷議水陸之宜乆不報時知朝廷杖殷浩等以抗已温甚忿之然素知浩弗之惮也以國無他釁遂得相持彌年雖有君臣之迹亦相覊縻而已八州士衆資調殆不為國家用聲言北伐拜表便行順流而下行逹武昌衆四五萬殷浩慮為温所廢将謀避之又欲以騶虞幡駐温軍内外噂􅊱人情震駭簡文帝時為撫軍與温書明社稷大計疑惑所由温即廻軍還鎮上疏曰臣近親率所統欲北埽趙魏軍次武昌獲撫軍大將軍㑹稽王昱書説風塵紛紜妄生疑惑辭㫖危急憂及社稷省之惋愕不觧其由形影相顧隕越無地臣以闇蔽沗荷重任雖才非其人職在静亂㓂讎不滅國恥未雪幸因開泰之時遇可乘之㑹匹夫有志猶懐憤慨臣亦何心坐觀其弊故荷戈驅馳不遑寕處前後表陳于今歴年矣丹誠坦然公私所察有何纎介容此嫌忌豈醜正之徒心懐怵惕操弄虚說以惑朝聽昔樂毅竭誠垂涕流奔霍光盡忠上官告變讒説殄行姦邪亂徳乃歴代之常患存亡之所由也今主上富於陽秋陛下以聖淑臨朝恭已委任責成羣下方寄㑹通於群才布徳信於遐荒况臣世䝉殊恩服事三朝身非覊旅之賔跡無韓彭之釁而反間起於心胷交亂過於四國此古賢所以歎息於既往而臣亦大懼於當年也今㓂賊氷消大事垂定晉之遺黎鵠立南望赴義之衆慷慨即路元凶之命懸在漏刻而横議忘生成此貝錦使垂滅之賊復獲蘓息所以痛心絶氣悲慨彌深臣雖所存者公所務者國然外難未弭而内弊交興則臣夲心陳力之志也進位太尉固譲不拜時殷浩至洛陽修復園陵經渉數年屢戰屢敗器械都盡温復進督司州因朝野之怨乃奏廢浩自此内外大權一歸温矣温遂統步騎四萬發江陵水軍自㐮陽入均口至南鄉步自淅川以征闗中命梁州刺史司馬勲出子午道别軍攻上洛獲苻健荆州刺史郭敬進擊青泥破之健又遣子生弟雄衆數萬屯嶢栁愁思塠以距温遂大戰生親自䧟陣殺温将應誕劉泓死傷千數温軍力戰生衆乃散雄又與将軍桓冲戰白鹿原又為冲所敗雄遂馳襲司馬勲勲退次女媧堡温進至灞上健以五千人深溝自固居民皆安堵復業持牛酒迎温於路者十八九耆老感泣曰不圖今日復見官軍初温恃麥熟取以為軍資而健芟苖滿野軍糧不屬収三千餘口而還帝使侍中黄門勞温于㐮陽初温自以雄姿英氣是宣帝劉琨之儔有以其比王敦者意甚不平及是征還於北方得一巧作老婢訪之乃琨妓女也一見温便澘然而泣問其故答曰温甚似劉司空温大悦出外整理衣冠又呼婢問婢云面甚似恨薄眼甚似恨小鬚甚似恨赤形甚似恨短聲甚似恨雌温於是禠冠觧帶昬然而睡不怡者數日母孔氏卒上疏觧職欲送𦵏宛陵詔不許贈臨賀太夫人印綬諡曰敬遣侍中弔祭謁者監護喪事旬月之中使者八至軺軒相望於道温𦵏畢視事欲復修園陵移都洛陽表疏十餘上不許進温征討大都督督司冀二州諸軍事委以專征之任温遣督護髙武據魯陽輔國将軍戴施屯河上勒舟師以逼許洛以譙梁水道既通請徐豫兵乘淮泗入河温自江陵北伐行經金城見少為琅邪時所種桞皆已十圍慨然曰木猶如此人何以堪攀枝執條泫然流涕於是過淮泗踐北境與諸寮屬登平乘樓眺矚中原慨然曰遂使神州陸沉百年邱墟王夷甫諸人不得不任其責袁宏曰運有興廢豈必諸人之過温作色謂四座曰頗聞劉景升有千斤大牛噉芻豆十倍於常牛負重致逺曽不若一羸牸魏武入荆州以享軍士意以况宏坐中皆失色師次伊水姚㐮屯水北距水而戰温結陣而前親被甲督弟冲及諸將奮擊㐮大敗自相殺死者數千人越北芒而西走追之不及遂奔平陽温屯故太極殿前徒入金墉城謁先帝諸陵陵被侵毁者皆繕復之兼置陵令遂旋軍執降賊周成以歸遷降人三千餘家於江漢之間遣西陽太守滕畯出黄城討蠻賊文盧等又遣江夏相劉岵義陽太守胡驥討妖賊李𢎞皆破之傳首京師温還軍之後司豫青兖復䧟于賊升平中改封南郡公降臨賀為縣公以封其次子濟隆和初㓂逼河南太守戴施出奔冠軍將軍陳祐告急温使竟陵太守鄧遐率三千人助祐并欲還都洛陽上疏曰巴蜀既平逆胡消滅時來之㑹既至休泰之慶顯著而人事乖違屢喪王畧復使二賊䨇起海内崩裂河洛蕭條山陵危逼所以遐邇悲惶痛心於既往者也伏惟陛下禀乾坤自然之姿挺羲皇元明之徳鳳棲外藩龍飛皇極時務陵替備徹天聽人之情偽備知之矣是以九域宅心幽遐企踵思佇雲羅混網四裔誠宜逺圖廟算大存經畧光復舊京疆理華夏使惠風陽澤洽被八表霜威寒飈陵振無外豈不允應靈休天人齊契今江河悠濶風馬殊邈故向義之徒覆亡相尋而建節之士猶繼踵無悔况辰極既迴衆星斯仰本源既運枝𣲖自遷則晉之餘黎欣皇徳之攸憑群凶妖逆知滅亡之無日騁思順之心鼓雷霆之勢則二豎之命不誅而自絶矣故圓通貴於無滯明哲尚於應機介如石焉所以成務若乃海運既徙而鵬翼不舉永結根於南垂廢神州於龍漠令五尺之童掩口而嘆息夫先王經始元聖宅心畫為九州制為九服貴中區而内諸夏誠以晷度自中霜露惟均冠冕萬國朝宗四海故也自彊胡陵暴中華蕩覆狼狽失據權幸揚越蠖屈以待龍申之㑹潛蟠以俟風雲之期蓋屯圯所鍾非理勝而然也而喪亂緬邈五十餘載先舊徂没後來童㓜班荆輟音積習成俗遂望絶於本邦宴安於所託眷言悼之不覺悲嘆臣雖庸劣才不周務然攝官承乏屬當重任願竭筋骨宣力先鋒翦除荆棘驅諸豺狼自永嘉之亂播流江表者請一切北徙以實江南資其舊業反其土宇勤農桑之務盡一時之利導之以義齊之以禮使文武兼宣信順交暢井邑既修綱維粗舉然後陛下建三辰之章振旂旗之旌冕旒鍚鑾朝服濟江則宇宙之内誰不幸甚夫人情昧安難與圖始非常之事衆之所疑伏願陛下決元照之明斷常均之外責臣以興復之效委臣以終濟之功此事既就此功既成則陛下盛勲比隆前代周宣之詠復興當年如其不效臣之罪也褰裳赴鑊其甘如薺詔曰在昔喪亂忽涉五紀戎狄肆暴繼襲凶跡眷言西顧慨歎盈懐知欲躬率三軍蕩滌氛穢廓清中畿光復舊京非夫外身殉國孰能若此者哉諸所䖏分委之髙算但河洛邱墟所營者廣經始之勤致勞懐也於是改授并司冀三州以交廣遼逺罷都督温表辭不受又加侍中大司馬都督中外諸軍事假黄鉞温以既總督内外不宜在逺又上疏陳便宜七事其一朋黨雷同私議沸騰宜抑杜浮競莫使能植其二户口凋寡不當漢之一郡宜并省官職令乆於其事其三機務不可停廢常行文按宜為限日其四宜明長㓜之禮奬忠公之吏其五襃貶賞罸宜允其實其六宜述遵前典敦明學業其七宜選建史官以成晉書有司皆奏行之尋加羽葆鼓吹置左右長史司馬從事中郎四人受鼓吹餘皆辭復率舟軍進合肥加揚州牧録尚書事使侍中顔旄宣㫖召温入参朝政温上疏曰方攘除羣凶埽平禍亂當竭天下智力與衆共濟而朝論咸疑聖詔彌固事異本圖豈敢執遂至於入参朝政非所敢聞臣違離宫省二十餘載鞸䩬戎務役勤思苦若得觧帶逍遥鳴玉闕庭参贊無為之契豫聞曲成之化雖實不敏豈不是願但顧以江漢艱難不同曩日而梁益新平寕州始服懸兵漢川戍禦彌廣加彊蠻盤牙勢䖏上流江湖悠逺當制命侯伯自非望實重威無以鎮御遐外臣知捨此之艱危敢背之而無怨願奮臂投身造事中原者實耻皇居仄陋於東南神葉遂埋於戎狄若憑宗廟之靈則雲徹席卷呼吸蕩清如當假息㳺魂則臣據河洛親臨二宼廣宣皇靈襟帶秦趙遠不五載大事必定今臣昱以親賢贊國光輔二世即無煩以臣疎鈍並閒機務且不有行者誰扞牧圉表裏相濟實深實重伏願陛下察臣所陳兼訪内外乞時還屯撫寜方隅詔不許復徵温温至赭圻詔又使尚書車灌止之温遂城赭圻固譲内録遥領揚州牧屬鮮卑攻洛陽陳祐出奔簡文帝時輔政㑹温于洌洲議征討事温移鎭姑孰㑹哀帝崩事遂寢温性儉每宴惟下七奠柈茶果而已然以雄武專朝窺覦非望或卧對親寮曰為爾寂寂将為文景所笑衆莫敢對既而撫枕起曰既不能流芳後世不足復遺臭萬載邪嘗行經王敦墓望之曰可人可人其心迹若是時有遠方比邱尼名有道術於别室浴温竊窺之尼祼身先以刀自破腹次斷兩足浴竟出温問吉凶尼云公若作天子亦當如是太和四年又上疏悉衆北伐平北將軍郗愔以疾觧職又以温領平北將軍徐兖二州刺史率弟南中郎冲西中郎袁眞步騎五萬北伐百官皆於南州祖道都邑盡傾軍次胡陸攻慕容暐將慕容忠獲之進次金鄉時亢旱水道不通乃鑿鉅野三百餘里以通舟運自清水入河暐將慕容垂傅末波等帥衆八萬距温戰于林渚温擊破之遂至枋頭温先使袁眞伐譙梁開石門以通運眞討譙梁皆平之而不能開石門軍糧竭盡温焚舟步退自東燕出倉垣經陳留鑿井而飲行七百餘里垂以八千騎追之戰于㐮邑温軍敗績死者三萬人温甚耻之歸罪於眞表廢為庻人眞怨温誣已據壽陽以自固潛通苻堅慕容暐帝遣侍中羅含以牛酒犒温於山陽使㑹稽王昱㑹温于涂中詔以温世子給事熙為征虜將軍豫州刺史假節及南康公主薨詔賻布千疋錢百萬温辭不受又陳息熙三尺之孤且年少未宜便居偏任詔不許發州人築廣陵城移鎭之時温行役既乆又兼疾癘死者十四五百姓嗟怨袁眞病死其將朱輔立其子瑾以為嗣事慕容暐苻堅並遣軍援瑾温使督護竺瑶矯陽之等與水軍擊之時暐軍已至瑶等與戰於武邱破之温率二萬人自廣陵又至瑾嬰城固守温築長圍守之苻堅乃使其將王鑒張蚝等率兵以救瑾屯洛澗先遣精騎五千次于肥水北温遣桓伊及弟子石䖍等逆擊大破之瑾衆遂潰生禽之并其宗族數十人及朱輔送于京師斬之瑾所侍養乞活數百人悉阬之以妻子為賞温以功詔加班劒十人犒軍於路次文武論功賞賜各有差温既負其才力乆懐異志欲先立功河朔還受九錫既逢覆敗名實頓減於是参軍郗超進廢立之計温乃廢帝而立簡文帝詔温依諸葛亮故事甲仗百人入殿賜錢五千萬絹二萬疋布十萬疋温多所廢徙誅庾倩殷涓曹秀等是時温威勢翕赫侍中謝安見而遥拜温驚曰安石卿何事乃爾安曰未有君拜於前臣揖於後時温有脚疾詔乘輿入朝既見欲陳廢立本意帝便泣下數十行温兢懼不得一言而出初元明世郭璞為䜟曰君非無嗣兄弟代禅謂成帝有子而以國祚傳弟又曰有人姓李兒專征戰譬於車軸脫在一面兒者子也李去子木存車去軸為亘合成桓字也又曰爾來爾來河内大縣爾來謂自爾已來為元始温字元子也故河内大縣温也成康既崩桓氏始大故連言之又曰頼子之薨延我國祚痛子之隕皇運其暮二子者元子道子也温志在篡奪事未成而死幸之也㑹稽王道子雖首亂晋國而其死亦晋衰之由也故云痛也温復還白石上疏求歸姑孰詔進温丞相大司馬本官如故留鎭京師温固辭仍請還鎭遣侍中王坦之徵温入相増邑為萬戸又辭詔以西府經袁眞事故軍用不足給世子熙布三萬疋米六萬斛又以熙弟濟為給事中及帝不豫詔温曰吾遂委篤足下便入冀得相見便來便來於是一日一夜頻有四詔温上疏曰聖體不和以經積日愚心惶恐無所寄情夫盛衰常理過備無害故漢髙枕疾呂后問相孝武不豫霍光啟嗣嗚噎以問身後蓋所存者大也今皇子幼稚而朝賢時譽惟謝安王坦之才識智能皆簡在聖鑒内輔幼君外禦彊宼實群情之大懼然理盡於此陛下便宜崇授使羣下知所寄而安等奉命陳力公私為宜至如臣温位兼將相加陛下垂布衣之顧但朽邁疾病懼不乆支無所復堪託以後事疏未及奏而帝崩遺詔家國事一禀之於温如諸葛武侯王丞相故事温初望簡文臨終禪位於已不爾便為周公居攝事既不副所望故甚憤怨與弟冲書曰遣詔使吾依武侯王公故事耳王謝䖏大事之際日憤憤少懐及孝武即位詔曰先帝遺勅云事大司馬如事吾令答表便可盡敬又詔大司馬社稷所寄先帝託以家國内外衆事便就闗公施行復遣謝安徴温入輔加前部羽葆鼓吹虎賁六十人温譲不受及温入朝赴山陵詔曰公勲徳尊重師保朕躬兼有風患其無敬又勅尚書安等於新亭奉迎百寮皆拜於道側當時豫有位望者皆震慴失色或云因此殺王謝内外懐懼温既至以盧悚入宫乃収尚書陸始赴廷尉責替慢罪也於是拜髙平陵左右覺其有異既登車謂從者曰先帝向遂靈見既不述帝所言故衆莫之知但見將拜時頻言臣不敢而已又問左右殷涓形狀答者言肥短温云向亦見在帝側初殷浩既為温所廢死涓頗有氣尚遂不詣温而與武陵王晞遊故温疑而害之竟不識也及是亦見涓為祟因而遇疾凡停京師十有四日歸於姑孰遂寢疾不起諷朝廷加已九錫累相催促謝安王坦之聞其疾篤宻緩其事錫文未及成而薨時年六十二皇太后與帝臨於朝堂三日詔賜九命衮冕之服及朝服一具衣一襲東園祕器錢二百萬布二千疋蠟五百斤以供䘮事及𦵏一依太宰安平獻王漢大將軍霍光故事賜九旒鑾輅黄屋左纛輼輬車挽歌二部羽葆鼓吹虎賁班劒百人優冊即前南郡公増七千五百户進地方三百里賜錢五千萬絹二萬疋布十萬疋追贈丞相初冲問温以謝安王坦之所任温曰伊等不為汝所䖏分温知已存彼不敢異害之無益於冲更失時望所以息謀温六子熙濟韻禕偉元熙字伯道初為世子後以才弱使冲領其衆及温病熙與叔祕謀殺冲冲知之徙於長沙濟字仲道與熙同謀俱徙長沙韻字叔道賜爵臨賀公禕最愚不辨菽麥偉字幼道平厚篤實居藩為士庶所懐歴使持節督荆益寜秦梁五州諸軍事安西將軍領南蠻校尉荆州刺史西昌侯贈驃騎將軍開府儀同三司元嗣温爵元别有傳孟嘉者字萬年江夏鄳人吳司空宗曽孫也嘉少知名太尉庾亮領江州辟部廬陵從事嘉還都亮引問風俗得失對曰還傳當問吏亮舉麈尾掩口而笑謂弟翼曰孟嘉故是盛徳人轉勸學從事禇裒時為豫章太守正旦朝亮裒有器識亮大㑹府州人士嘉坐次甚逺裒問亮聞江州有孟嘉其人何在亮曰在坐卿但自覔裒歴觀指嘉謂亮曰此君小異將無是乎亮欣然而笑喜裒得嘉竒嘉為裒所得乃益器焉後為征西桓温將軍温甚重之九月九日温宴龍山僚佐畢集時佐史並著戎服有風至吹嘉㡌堕落嘉不之覺温使左右勿言欲觀其舉止嘉良乆如厠温令取還之命孫盛作文嘲嘉著嘉坐䖏嘉還見即答之其文甚羙四座嗟歎嘉好酣飲愈多不亂温問嘉酒有何好而卿嗜之嘉曰公未得酒中趣耳又問聽妓絲不如竹竹不如肉何謂也嘉曰漸近使自然一座咨嗟轉從事中郎遷長史年五十三卒於家桓元字敬道一名靈寳大司馬温之孽子也其母馬氏嘗與同軰夜坐於月下見流星墜銅盆水中忽如二寸火珠烱然明净競以瓢接取馬氏得而吞之若有感遂有娠及生元有光照室占者竒之故小名曰靈寳妳媪每抱詣温輙易人而後至云其重兼常兒温甚爱異之臨終命以為嗣襲爵南郡公年七嵗温服終府州文武辭其叔父冲冲撫元頭曰此汝家之故吏也元因涕淚覆面衆並異之及長形貌瓌竒風神疎朗博綜蓺術善屬文常負其才地以雄豪自䖏衆咸憚之朝廷亦疑而未用年二十三始拜太子洗馬時議謂温有不臣之迹故折元兄弟而為素官太元末出補義興太守鬱鬱不得志嘗登髙望震澤歎曰父為九州伯兒為五湖長棄官歸國自以元勲之門而負謗於世乃上疏曰臣聞周公大聖而四國流言樂毅王佐而被謗騎劫巷伯有豺虎之慨蘇公興飄風之刺惡直醜正何代無之先臣䝉國殊遇姻婭皇極常欲以身報徳投􅃑乘機西平巴蜀北清河洛使竊盜之㓂繫頸北闕園陵修復大恥載雪飲馬灞滻垂旌趙魏勤王之師功非一㨗太和之末皇基有潛移之懼遂乃奉順天人翼登聖朝明離既朗四凶兼澄向使此功不建此事不成宗廟之事豈可熟念昔太甲雖迷商祚無憂昌邑雖昬弊無三孽因兹而言晉室之機危於殷漢先臣之功髙於伊霍矣而負重既往䝉謗清時聖世明王黜陟之道不聞廢忽顯明之功探射冥冥之心啟嫌謗之塗開邪枉之路者也先臣勤王艱難之勞匡復尅平之勲朝廷若其遺之臣亦不復計也至於先帝龍飛九五陛下之所以繼明南面請問談者誰之由邪誰之徳邪豈惟晉室永安祖宗血食於陛下一門實竒功也自頃權門日盛醜正寔繁咸稱述時㫖互相扇附以臣之兄弟皆晉朝之罪人臣等復何理可以茍存聖世何顔可以尸饗封禄若陛下忘先臣大造之功信貝錦萋菲之説臣等自當奉還三封受戮市朝然後下從先臣歸先帝於元宫耳若陛下述遵先㫖追録舊勲竊望少垂愷悌覆蓋之恩疏寢不報元在荆楚積年優游無事荆州刺史殷仲堪甚敬憚之及中書令王國寳用事謀削弱方鎭内外騷動知王㳟有憂國之言元潛有意於功業乃説仲堪曰國寳與君諸人素已為對唯患相弊之不速耳今既執權要與王緒相為表裏其所廻易罔不如志孝伯居元舅之地正情為朝野所重必未便動之唯當以君為事首君為先帝所㧞超居方任人情未以為允咸謂君雖有思致非方伯人若發詔徵君為中書令用殷覬為荆州君何以䖏之仲堪曰憂之乆矣君謂計將安出元曰國寳姦兇天下所知孝伯疾惡之情毎至而當今日之㑹以理推之必當過人君若宻遣一人信説王恭宜興晉陽之師以内匡朝廷已當悉荆楚之衆順流而下推王為盟主僕等亦皆投􅃑當此無不響應此事既行桓文之舉也仲堪持疑未决俄而王恭信至招仲堪及元匡正朝廷國寳既死於是兵罷元乃求為廣州㑹稽王道子亦憚之不欲使在荆楚故順其意隆安初詔以元督交廣二州建威將軍平越中郎將廣州刺史假節受命不行其年王恭又與庾楷起兵討江州刺史王愉及譙王尚之兄弟元仲堪謂㳟事必尅㨗一時響應仲堪給元五千人與楊佺期俱為前鋒軍至湓口王愉奔於臨川元遣偏軍追獲之元佺期至石頭仲堪至蕪湖㳟將劉牢之背恭歸順㳟既死庾楷戰敗奔于元軍既而詔以元為江州仲堪等皆被換易乃各廻舟西還屯於尋陽共相結約推元為盟主元始得志乃連名上疏申理王恭求誅尚之牢之等朝廷深惮之乃免桓修復仲堪以相和觧初元在荆州豪縱士庶惮之甚於州牧仲堪親黨勸殺之仲堪不聼及還尋陽資其聲地故推為盟主元逾自矜重佺期為人驕悍當自謂承籍華胄江表莫比而元每以寒士裁之佺期甚憾即欲於壇所襲元仲堪惡佺期兄弟虓勇恐尅元之後復為己害苦禁之於是各奉詔還鎭元亦知佺期有異謀潛有吞并之計於是屯於夏口隆安中詔加元都督荆州四郡以兄偉為輔國將軍南蠻校尉仲堪慮元跋扈遂與佺期結婚為援初元既與仲堪佺期有隙恒慮掩襲求廣其所統朝廷亦欲成其釁隙故分佺期所督四郡與元佺期甚忿懼會姚興侵洛陽佺期乃建牙聲云援洛宻欲與仲堪共襲元仲堪雖外結佺期而疑其心距而不許猶慮弗能禁復遣從弟遹屯於北境以遏佺期佺期既不能獨舉且不測仲堪夲意遂息甲南蠻校尉楊廣佺期之兄也欲距桓偉仲堪不聽乃出廣為宜都建平二郡太守加征虜將軍佺期弟孜敬先為江夏相元以兵襲而召之既至以為諮議参軍元於是興軍西征亦聲云救洛與仲堪書説佺期受國恩而棄山陵宜共罪之今親率戎旅徑造金墉使仲堪収楊廣如其不爾無以相信仲堪夲計欲两全之既得元書知不能禁乃曰君自汚而行不得一人入江也元乃止後荆州大水仲堪振恤饑者倉廪空竭元乗其虛而伐之先遣軍襲巴陵梁州刺史郭銓當之所鎭路經夏口元聲云朝廷遣佺期為己前鋒乃授以江夏之衆使督諸軍並進宻報兄偉令為内應偉遑遽不知所為乃自齎疏示仲堪仲堪執偉為質令與元書辭甚苦至元曰仲堪為人不能專决常懐成敗之計為兒子作慮我兄必無憂矣元既至巴陵仲堪遣衆距之為元所敗元進至楊口又敗仲堪弟子道䕶乗勝至零口去江陵二十里仲堪遣軍數道距之佺期自㐮陽來赴與兄廣共擊元元懼其鋭乃退軍馬頭佺期等方復追元苦戰佺期敗走還㐮陽仲堪出奔酇城元遣将軍馮該躡佺期後獲之廣為人所縛送元並殺之仲堪聞佺期死乃將數百人奔姚興至冠軍城為該所得元令害之於是遂平荆雍乃表求領江荆二州詔以元都督荆司秦梁寕益七州後將軍荆州刺史假節以桓修為江州刺史元上疏固争江州於是進督八州及揚豫八郡復領江州刺史元又輙以偉為冠軍將軍雍州刺史時㓂賊未平朝廷難違其意許之元於是樹用腹心兵馬日盛屢上疏求討孫恩詔輙不許其後恩逼京師元建牙聚衆外託勤王實欲觀釁而進乃復上疏請討之㑹恩已走元又奉詔解嚴以偉為江州刺史鎭夏口司馬刁惕為輔國将軍督八郡鎭㐮陽遣桓振皇甫敷馮該等戍湓口移沮漳蠻二千戸於江南立武寕郡更招集流人立綏安郡又置諸郡丞詔徵廣州刺史刁逵豫章太守郭昶之元皆留不遣自謂三分有二知勢運所歸屢上禎祥以為已瑞初庾楷既奔於元元之求討孫恩也以為右將軍元既觧嚴楷亦去職楷以元方與朝廷構怨恐事不克禍及於己乃宻結於後將軍元顯許為内應元興初元顯稱詔伐元元從兄石生時為太傅長史宻書報元元本謂揚土饑饉孫恩未滅必未遑討已可得蓄力養衆觀釁而動既聞元顯欲伐之甚懼欲保江陵長史卞範之説元曰公英畧威名震天下元顯口尚乳臭劉牢之大失物情若頓兵近畿示以威賞則土崩之勢可翹足而待何有延敵入境自取蹙弱乎元大悦乃留其兄偉守江陵抗表率衆下至尋陽移檄京邑罪狀元顯檄至元顯大懼下船而不克發元既失物情而興師犯順慮衆不為用常有廻斾之計既過尋陽不見王師意大悦其將吏亦振庾楷謀泄収縶之至姑孰使其將馮該苻宏皇甫敷索元等先攻譙王尚之尚之敗劉牢之遣子敬宣詣元降元至新亭元顯自潰元入京師矯詔曰義師雲集罪在元顯太𫝊已别有敎其解嚴息甲以副義心又矯詔加已總百揆侍中都督中外諸軍事丞相録尚書事揚州牧領徐州刺史乂加假黄鉞羽葆鼓吹班劒二十人置左右長史司馬從事中郎四人甲仗二百人入殿元表列太傅道子及元顯之惡徙道子於安成郡害元顯於市於是元入居太傅府害太傅中郎毛泰泰弟㳺擊將軍邃太傅参軍荀遜前豫州刺史庾楷父子吏部郎袁遵譙王尚之等流尚之弟丹陽尹恢之廣晋伯允之驃騎長史王誕太傅主簿毛遁等於交廣諸郡尋追害恢之允之於道以兄偉為安西將軍荆州刺史領南蠻校尉從兄謙為左僕射加中軍將軍領選修為右將軍徐兖二州刺史石生爲前將軍江州刺史長史卞範之爲建武將軍丹陽尹王謐為中書令領軍將軍大赦改元為大亨元譲丞相自署太尉領平西將軍豫州刺史又加衮冕之服緑綟綬増班劒為六十人劍履上殿入朝不趨讚拜不名元將出居姑孰訪之於衆王謐對曰公羊有言周公何以不之魯欲天下一乎周也願静根夲以公旦為心元善其對而不能從遂大築城府臺館山池莫不壯麗乃出鎭焉既至姑孰固辭録尚書事詔許之而大政皆諮焉小事則决於桓謙卞範之自禍難屢構干戈不戢百姓厭之思歸一統及元初至也黜凡佞擢賢儁君子之道粗備京師欣然後乃陵侮朝廷幽擯宰輔豪奢縱侈衆務䌓興於是朝野失望人不安業時㑹稽饑荒元令振貸之百姓散在山湖採梠内史王愉悉召之還請米米既不多吏不時給頓仆道路死者十八九焉元又害吳興太守髙素輔國將軍竺謙之謙之從兄髙平相朗之輔國將軍劉襲襲弟彭城内史季武冠軍將軍孫無終等皆劉牢之之黨北府舊將也襲兄冀州刺史軌及寕朔將軍高雅之牢之子敬宣並奔慕容徳元諷朝廷以已平元顯功封豫章公食安成郡地方二百二十五里邑七千五百户平仲堪佺期功封桂陽郡公地方七十五里邑二千五百户本封南郡如故元以豫章改封息昇桂陽郡公賜兄子俊降為西道縣公又發詔為桓温諱有姓名同者一皆改之贈其母馬氏豫章公太夫人元興二年元詐表請平姚興又諷朝廷作詔不許元本無資力而好為大言既不克行乃云奉詔故止初欲飾裝無他䖏分先使作輕舸載服玩及書畫等物或諌之元曰書畫服玩宜常在左右且兵凶戰危脫有不意當使輕而易運衆皆笑之是嵗元兄偉卒贈開府驃騎將軍以桓修代之從事中郎曹靖之說元以桓修兄弟職居内外恐權傾天下元納之乃以南郡相桓石康為西中郎將荆州刺史偉服始以公除元便作樂初奏元撫節慟哭既而収淚盡懽元所親仗唯偉偉既死元乃孤危而不臣之迹已著自知怨滿天下欲速定篡逆殷仲文卞範之等又催促之於是先改授羣司觧琅邪王司徒遷太宰加殊禮以桓謙為侍中衛將軍開府録尚書事王謐散騎常侍中書監領司徒桓允中書令加桓修散騎常侍撫軍大將軍置學官敎授二品子弟數百人又矯詔加已相國總百揆封南郡南平宜都天門零陵營陽桂陽衡陽義陽建平十郡為楚王揚州牧領平西將軍豫州刺史如故加九錫備物楚國置丞相以下一遵舊典又諷天子御前殿而䇿授焉元屢偽譲詔遣百僚敦勸又云當親降鑾輿乃受命矯詔贈父温為楚王南康公主為楚王后以平西長史劉瑾為尚書刁逵為中領軍王嘏為太常殷叔文為左衛皇甫敷為右衛凡衆官合六十餘人為楚官屬元觧平西豫州以平西文武配相國府新野人庾庂聞元受九錫乃起義兵襲馮該於㐮陽走之庂有衆七千於城南設壇祭祖宗七廟南蠻参軍庾彬安西参軍楊道䕶江安令鄧襄子謀為内應庂本仲堪黨桓偉既死石康未至故乘間而發江陵震動桓濟之子亮起兵於羅縣自號平南將軍湘州刺史以討庂為名南蠻校尉羊僧夀與石康共攻㐮陽庂衆散奔姚興彬等皆遇害長沙相陶延夀以亮乘亂起兵遣収之元徙亮於衡陽誅其同謀桓奥等元偽上表求歸藩又自作詔留之遣使宣㫖元又上表固辭又諷天子作手詔固留焉元好逞偽辭塵穢簡牘皆此類也謂代謝之際宜有禎祥乃宻令所在上臨平湖開除清朗使衆官集賀矯詔曰靈瑞之事非所敢聞也斯誠相國至徳故事為之應太平之化於是乎始六合同悦情何可言又詐云江州甘露降王成基家竹上元以歴代咸有肥遯之士而已世獨無乃徵皇甫謐六世孫希之為著作并給其資用皆令譲而不受號曰髙士時人名爲充隐議復肉刑斷錢貨廻換改易造革紛紜志無一定條制森然動害政理性貪鄙好竒異尤愛寳物珠玉不離於手人士有法書好畫及佳園宅者悉欲歸已猶難逼奪之皆蒱愽而取遣臣佐四出掘果移竹不逺數千里百姓佳果美竹無復遺餘信悦諂譽逆忤黨言或奪其所憎與其所愛十一月元矯制加已冕十有二旒建天子旌旗出警入蹕乗金根車駕六馬備五時副車置旄頭雲罕樂舞八佾設鐘虡宫縣妃為王后世子為太子其女及孫爵命之號皆如舊制元乃多斥朝臣為太宰僚佐又矯詔使王謐兼太保領司徒奉皇帝璽綬禅位於已又諷帝以禅位告廟出居永安宫移晉神主於琅邪廟初元恐帝不肯為手詔又慮璽不可得逼臨川王寳請帝自為手詔因奪取璽比臨軒璽已乆出元甚喜百官到姑孰勸元僭位元偽譲朝臣固請乃於城南七里立郊登壇簒位以元牡告天百僚陪列而儀注不備忘稱萬嵗又不易帝諱識者覘其不終元於是下書大赦改元永始賜天下爵二級孝悌力田人三級鰥寡孤獨不能自存者榖人五斛其賞賜之制徒設空文無其實也初出偽詔改元為建始右丞王悠之曰建始趙王倫偽號也又改為永始復是王莽始執權之嵗其兆號不祥㝠符僭逆如此又下書以南康之平固縣奉晋帝為平固王車旗正朔一如舊典遷帝居尋陽即陳留王䖏鄴宫故事降永安皇后為遷陵君琅邪王為石陽縣公武陵王遵為彭澤縣侯追尊其父温宣武皇帝廟稱太祖南康公主為宣皇后封子昇為豫章郡王叔父雲孫放之為寕都縣王豁孫稚玉為臨沅縣王豁次子石康為右將軍武陵郡王祕子蔚為醴陵縣王贈冲太傅宣城郡王加殊禮依晋安平王故事以孫允襲爵爲吏部尚書冲次子謙為揚州刺史新安郡王謙弟脩為撫軍大將軍安成郡王兄歆臨賀縣王禕富陽縣王贈禕侍中大將軍義興郡王以子濬襲爵為輔國将軍濬弟邈西昌縣王封王謐爲武昌公班劒二十人卞範之為臨汝公殷仲文為東興公馮該為魚復侯又降始安郡公為縣公長沙為臨湘縣公廬陵爲巴邱縣公各千戸其康樂武昌南昌望蔡建興永脩觀陽皆降封百户公侯之號如故又普進諸征鎮軍號各有差以相國左長史王綏為中書令崇桓謙母庾爲宣城太妃加殊禮給以輦乘號温墓曰永崇陵置守衛四十人元入建康宫逆風迅激菸旗儀餙皆傾偃及小會于西堂設妓樂殿上施絳綾帳鏤黄金為顔四角作金龍頭銜五色羽葆旒蘓羣臣竊相謂曰此頗似轜車亦王莽仙蓋之流也龍角所謂亢龍有悔者也又造金根車駕六馬是月元臨聽訟觀閲囚徒罪無輕重多被原放有干輿乞者時或䘏之其好行小惠如此自以水徳壬辰臘子祖改尚書都官郎為賊曹又増置五校三將及彊弩積射武衛官元興三年元之永始二年也尚書答春蒐字誤爲春莵凡所闗署皆被降黜元大綱不理而糾摘纎微皆此類也以其妻劉氏為皇后將修殿宇乃移入東宫又開東掖平昌廣莫及宫殿諸門皆為三道更造大輦容三十人坐以二百人舁之性好畋遊以體大不堪乗馬又作徘􅆦輿施轉闗令廻動無滯既不追尊祖曽疑其禮儀問於群臣散騎常侍徐廣據晋典宜追立七廟又敬其父則子悦位彌髙者情禮得申道愈廣者納敬必普也元曰禮云三昭三穆與太祖為七然則太祖必居廟之主也昭穆皆自下之稱則非逆數可知也禮太祖東向左昭右穆如晋室之廟則宣帝在昭穆之例不得在太祖之位昭穆既錯太祖無寄失之逺矣元曽祖以上名位不顯故不欲序列且以王莽九廟見譏於前史遂以一廟矯之郊廟齊二日而已祕書監卞承之曰祭不及祖知楚徳之不長也又毁晋小廟以廣臺榭其庶母蒸嘗靡有定所忌日見賔客㳺宴唯至亡時一哭而已期服之内不廢音樂元出遊水門飄風飛其儀蓋夜濤水入石頭大桁流壊殺人甚多大風吹朱雀門樓上層墜地元自篡盗之後驕奢荒侈遊獵無度以夜繼晝兄偉𦵏日旦哭晚遊或一日之中屢出馳騁性又急暴呼召嚴速直官咸擊馬省前禁内讙雜無復朝廷之體於是百姓疲苦朝野勞悴怨怒思亂者十室八九焉於是劉裕劉毅何無忌等共謀興復裕等斬桓脩於京口斬桓𢎞于廣陵河内太守辛扈興𢎞農太守王元徳振武將軍童厚之竟陵大守劉邁謀為内應至期裕遣周安穆報之而邁惶懼遂以告元元震駭即殺扈興等安穆馳去得免封邁安重侯一宿又殺之裕率義軍至竹里元移還上宫百僚步從召侍官皆入止省中赦揚豫徐兖青冀六州加桓謙征討都督假節以殷仲文代桓脩遣頓邱太守吳甫之右衛將軍皇甫敷北距義軍裕等於江乗與戰臨陣斬甫之進至羅落橋與敷戰復梟其首元聞之大懼乃召諸術人推算數為厭勝之法乃問衆曰朕其敗乎曹靖之對曰神怒人怨臣實懼焉元曰人或可怨神何為怒對曰移晋宗廟飄泊無所大楚之祭不及於祖此其所以怒也元曰卿何不諌對曰輦上諸君子皆以為堯舜之世臣何敢言元愈忿懼使桓謙何澹之屯東陵卞範之屯覆舟山西衆合二萬以距義軍裕至蔣山使羸弱貫油帔登山分張旗幟數道並前元偵候還云裕軍四塞不知多少元益憂惶遣武衛將軍庾頥之配以精卒副援諸軍于時東北風急義軍放火煙塵張天鼓譟之音震駭京邑劉裕執鉞麾而進謙等諸軍一時奔潰元率親信數千人聲言赴戰遂將其子昇兄子濬出南掖門西至石頭使殷仲文具船相與南奔初元在姑孰將相星屢有變篡位之夕月及太白又入羽林元甚惡之及敗走腹心或勸其戰元不暇答直以䇿指天而經日不得食左右進以麤飯咽不能下昇時年數嵗抱元胷而撫之元悲不自勝劉裕以武陵王遵攝萬機立行臺總百官遣劉毅劉道規躡元誅元諸兄子及石康兄權振兄洪等元至尋陽江州刺史郭昶之給其器用殷仲文自後至望見元舟旌旗輿服備帝者之儀歎息曰敗中復振故可也元於是逼乗輿西上桓歆聚黨向歴陽宣城内史諸葛長民擊破之元於道作起居注叙其距義軍之事自謂經畧指授算無遺䇿諸將違節度以致虧喪非戰之罪於是不遑與群下謀議唯耽思誦述宣示逺近元至江陵石康納之張幔屋於城南署置百官以卞範之為尚書僕射其餘職多用輕資於是大脩舟師曽未三旬衆且二萬樓船器械甚盛謂其群黨曰卿等並清塗翼從朕躬都下竊位者方應謝罪軍門其觀卿等入石頭無異雲霄中人也元以奔敗之後懼法令不肅遂輕怒妄殺人多離怨殷仲文諌曰陛下少播英譽遠近所服遂掃平荆雍一匡京室聲被八方矣既據有極位而遇此圯運非為威不足也百姓喁喁想望皇澤宜𢎞仁風以収物情元怒曰漢髙魏武㡬遇敗但諸将失利耳頃以天文惡故還都舊楚而群小愚惑妄生是非方當糾之以猛未宜施之以恩也元左右稱元為桓詔桓允諌曰詔者施於辭令不以為稱謂也漢魏之主皆無此言唯聞北虜以苻堅為苻詔耳願陛下稽古帝則令萬世可法元曰此事已行今宣勑罷之更為不祥必其宜革可待事平也荆江郡守以元播越或遣使通表有匪寕之辭元悉不受仍乃更令所在表賀遷都元遣遊擊將軍何澹之武衛將軍庾稚祖江夏太守桓道㳟就郭銓以數千人守湓口又遣輔國將軍桓振往義陽聚衆至弋陽為龍驤將軍胡譁所破振車馬走還何無忌劉道規等破郭銓何澹之郭昶之於桑落洲進師尋陽元率船艦二百發江陵使苻宏羊僧夀為前鋒以播陽太守徐放為散騎常侍欲遣説解義軍謂放曰諸人不識天命致此妄作遂懼禍屯結不能自反卿三州所信可明示朕心若退軍散甲當與之更始各授位任令不失分江水在此朕不食言放對曰劉裕為唱端之主劉毅兄為陛下所誅並不可説也輙當申聖㫖於何無忌元曰卿使若有功當以吳興相叙放遂受使入無忌軍魏誅之破桓歆於歴陽諸葛長民又敗歆于芍陂歆單馬渡淮毅率道規及下邳太守孟懐玉與元戰於峥嶸洲于時義軍數千元兵甚盛而元懼有敗衂常漾輕舸於舫側故其衆莫有闘心義軍乗風縱火盡鋭争先元衆大潰燒輜重夜遁郭銓歸降元故將劉統馮稚等聚黨四百人襲破尋陽城毅遣建威將軍劉懐肅討平之元留永安皇后及皇后於巴陵殷仲文時在元艦求出别船収集散軍因叛元奉二后奔於夏口元入江陵城馮該勸使更下戰元不從欲出漢川投梁州刺史桓希而人情乖阻制令不行元乘馬出城至門左右於闇中斫之不中前後相殺交横元僅得至船於是荆州别駕王康産奉帝入南郡府舎太守王騰之率文武營衛時益州刺史毛璩使其從孫祐之参軍費恬送弟璠喪𦵏江陵有衆二百璩弟子脩之為元屯騎校尉誘元以入蜀元從之逹枚回洲恬與祐之迎擊元矢下如雨元嬖人丁仙期萬蓋等以身蔽元並中數十箭而死元被箭其子昇輙㧞去之益州督䕶馮遷抽刀而前元㧞頭上玉導與之仍曰是何人邪敢殺天子遷曰欲殺天子之賊耳遂斬之時年三十六又斬石康及濬等五級庾賾之戰死昇云我是豫章王諸君勿見殺遂至江陵市斬之初元在宫中恒覺不安若為鬼神所擾語其所親云恐已當死故與時競元興中衡陽有雌雞化為雄八十日而冠緌具及元建國於楚衡陽屬焉自篡盗至敗時凡八旬矣其時有童謡云長干巷巷長干今年殺郎君後年斬諸桓其凶兆符㑹如此郎君謂元顯也是月王騰之奉帝入居太府桓謙亦聚衆沮中為元舉哀立喪庭偽諡為武悼皇帝毅等傳送元首梟於大桁百姓觀者莫不欣幸何無忌等攻桓謙於馬頭桓蔚於龍洲皆破之義軍乘勝競進振該等距戰於靈溪道規等敗績死没千餘人義軍退次尋陽更繕舟甲毛璩自領梁州遣將攻漢中殺桓希江夏相張暢之髙平太守劉懐肅攻何澹之於西塞磯破之振遣桓蔚代王矌守㐮陽道規進討武昌破偽太守王旻魏詠之劉藩破桓石綏於白茅義軍發尋陽桓亮自號江州刺史侵豫章江州刺史劉敬宣討走之義軍進次夏口偽鎭東將軍馮該等守夏口揚武將軍孟山圖據魯城輔國將軍桓山客守偃月壘劉毅攻魯城道規攻偃月壘無忌與檀祗列艦中流以防越逸義軍騰赴呌聲動山谷自辰及午二軍俱潰馮該散走生禽山客毅等平江陵毛璩遣涪陵太守文處荗東下振遣桓放之為益州屯夷陵處荗距戰放之敗走還江陵義熙元年正月南陽太守魯宗之起義襲㐮陽破偽雍州刺史桓蔚無忌諸軍次江陵之馬頭振擁帝出營江津魯宗之率衆於柞溪破偽虎賁中郎温楷進至紀南振自擊宗之宗之失利時蜀軍據靈溪毅率無忌道規等破馮該軍推鋒而前即平江陵振見火起知城已䧟乃與謙等北走是日安帝反正大赦天下唯逆黨就戮詔特免桓允一人桓亮自豫章自號鎮南將軍湘州刺史苻宏㓂安成廬陵劉敬宣遣將討之宏走入湘中二月桓謙何澹之温楷等奔於姚興桓振與宏出自溳城襲破江陵劉懐肅自雲杜伐振等破之廣武將軍唐興斬振及偽輔國將軍桓珍毅於臨鄣斬偽零陵太守劉叔祖桓亮苻宏復出㓂湘中害郡守長史檀祗討宏於湘東斬之廣武將軍郭彌斬亮於益陽其餘擁衆假號皆討平之詔徙桓允及諸黨與於新安諸郡三年東陽太守殷仲文與永嘉太守駱球謀反欲建桓允為嗣曹靖之桓石松卞承之劉延祖等潛相交結劉裕以次収斬之并誅其家屬後桓謙走入蜀蜀賊譙縱以謙為荆州刺史使率兵而下荆楚之衆多應之謙至枝江荆州刺史劉道規斬之梁州刺史傅歆又斬桓石綏桓氏遂滅卞範之字敬祖濟隂宛句人也識悟聰敏見羙於當世太元中自丹陽丞為始安太守桓元少與之游及元為江州引為長史委以心膂之任潛謀宻計莫不决之後元為篡亂以範之爲丹陽尹範之與殷仲文隂撰冊命進範之爲征虜將軍散騎常侍元僭位以範之為侍中班劒二十人進號後將軍封臨汝縣公其禪詔即範之文也元既奢侈無度範之亦盛營館第自以佐命元勲深懐矜伐以富貴驕人子弟慠慢衆咸畏嫉之義軍起範之屯兵於覆舟山西為劉毅所敗随元西走元又以範之為尚書僕射元為劉毅等所敗左右分散唯範之在側元平斬於江陵殷仲文南蠻校尉覬之弟也少有才藻羙容貌從兄仲堪薦之於㑹稽王道子即引為驃騎參軍甚見賞待俄轉諮議参軍後為元顯征虜長史㑹桓元與朝廷有隙元之姊仲文之妻疑而間之左遷新安太守仲文於元雖為姻親而素不交宻及聞元平京師便棄郡投焉元甚悦之以為諮議参軍時王謐見禮而不親卞範之被親而少禮而仲文寵遇隆重兼於王卞矣元將為亂使總領詔令以為侍中領左衛將軍元九錫仲文之辭也初元篡位入宫其牀忽陷羣下失色仲文曰將由聖徳深厚地不能載元大悦以佐命親貴厚自封崇輿馬器服窮極綺麗後房妓妾數十絲竹不絶音性貪吝多納貨賄家累千金常若不足元為劉裕所敗随元西走其珍寳玩好悉藏地中皆變為土至巴陵因奉二后投義軍而為鎮軍長史轉尚書帝初反正仲文抗表待罪乞觧所職詔不許仲文因月朔與衆至大司馬府府中有老槐樹顧之良久而嘆曰此樹婆娑無復生意仲文素有名望自謂必當朝政又謝琨之徒疇昔所輕者並皆比肩常怏怏不得志忽遷為東陽太守意彌不平劉毅愛才好士深相禮接臨當之郡游宴彌日行至富陽慨然嘆曰看此山川形勢當復出一伯符何無忌甚慕之東陽無忌所統仲文許當便道修謁無忌故益欽遲之令府中命文人殷闡孔寗子之徒撰義構文以俟其至仲文失志恍惚遂不過府無忌疑其薄已大怒思中傷之時屬慕容超南侵無忌言於劉裕曰桓允殷仲文乃腹心之疾北虜不足為憂義熙三年又以仲文與駱球等謀反及其弟南蠻校尉叔文並伏誅仲文時照鏡不見其面數日而遇禍仲文善屬文為世所重謝靈運嘗云若殷仲文讀書半袁豹則文才不減班固言其文多而見書少也王彌東萊人也家世二千石祖頎魏元莵太守武帝時至汝南太守彌有才幹博渉書記少游侠京師隐者董仲道見而謂之曰君豺聲豹視好亂樂禍若天下騷擾不作士大夫矣恵帝末妖賊劉栢根起於東萊之惤縣彌率家僮從之栢根以為長史栢根死聚徒海渚為茍純所敗亡入長廣山為群盗彌多權畧凡有所掠必預圖成敗舉無遺䇿弓馬迅㨗膂力過人青土號為飛豹後引兵入宼青徐兖州刺史茍晞逆擊大破之彌退集亡散衆復大振晞與之連戰不能尅彌進兵宼泰山魯國譙梁陳汝南潁川㐮城諸郡入許昌開府庫取器杖所在䧟没多殺守令有衆數萬朝廷不能制㑹天下大亂進逼洛陽京邑大震宫城門晝閉司徒王衍等率百官距守彌屯七里澗王師進擊大破之彌謂其黨劉靈曰晋兵尚彊歸無所厝劉淵昔為質子我與之周旋京師深有分契今稱漢王將歸之可乎靈然之乃渡河歸淵淵聞而大悦遣其侍中兼御史大夫郊迎致書於彌曰以將軍有不世之功超時之徳故有此迎耳遲望將軍之至孤今親行將軍之館輙拂席洗爵敬待將軍及彌見淵勸稱尊號淵謂彌曰孤本謂將軍如竇周公耳今眞吾孔明仲華也烈祖有云吾之有將軍如魚之有水於是署彌司隸校尉加侍中特進彌固辭使随劉曜宼河内又與石勒攻臨漳永嘉初宼上黨圍壺闗東海王越遣淮南内史王曠安豐太守衛乹等討之及彌戰於髙都長平間大敗之死者十六七淵進彌征東大將軍封東萊公與劉曜石勒等攻魏郡汲郡頓邱䧟五十餘壁皆調為軍士又與勒攻鄴安北將軍和郁棄城而走懐帝遣北中郎將裴憲次白馬討彌車騎將軍王堪次東燕討勒平北將軍曹武次大陽討劉淵武部將軍彭黙為劉聪所敗見害衆軍皆退聰度黃河帝遣司隸校尉劉暾將軍宋抽等距之皆不能抗彌聰以萬騎至京城焚二學東海王越距戰於西明門彌等敗走彌復以二千騎㓂㐮城諸縣河東平陽𢎞農上黨諸流人之在頴川㐮城汝南南陽河南者數萬家為舊居人所不禮皆焚燒城邑殺二千石長吏以應彌彌又以二萬人㑹石勒㓂陳郡潁川屯陽翟遣弟璋與石勒共宼徐兖因破越軍彌復與曜㓂㐮城遂逼京師時京邑大饑民相食百姓流亡公卿奔河隂曜彌等遂䧟宫城至太極前殿縱兵大掠幽帝于端門逼辱羊皇后殺皇太子詮發掘陵墓焚燒宫廟城府蕩盡百官及男女遇害者三萬餘人遂遷帝於平陽彌之掠也曜禁之彌不從曜斬其牙門王延以徇彌怒與曜阻兵相攻死者千餘人彌長史張嵩諌曰明公與國家共興大事事業甫耳便相攻討何面見主上乎平洛之功誠在將軍然劉曜皇族宜小下之晉二王平吳之鑒其則不逺願明將軍以為慮縱將軍阻兵不還其若子弟宗族何彌曰善微子吾不聞此過也於是詣曜謝結分如初彌曰下官聞過乃是張長史之功曜謂嵩曰君為朱建矣豈况范生乎各賜嵩金百斤彌謂曜曰洛陽天下之中山河四險之固城池宫室無假營造可徙平陽都之曜不從焚焼而去彌曰屠各子豈有帝王之意乎汝奈天下何遂引衆東屯項闗初曜以彌先入洛不待己怨之至是嫌隙遂構劉暾說彌還據青州彌然之乃以左長史曹嶷為鎮東將軍給兵五千多齎寳物還鄉里招誘亡命且迎其室彌將徐邈髙梁輙率部衆數千人随嶷去彌益衰弱初石勒惡彌驍勇常宻為之備及彌破洛陽也多遺勒羙女寳貨以結之時勒擒茍晞以為左司馬彌謂勒曰公獲茍晞而用之何其神妙使晞為公左彌為公右天下不足定也勒愈忌彌隂圖之劉暾又勸彌徵曹嶷藉其衆以誅勒於是彌使暾詣青州令曹嶷引兵㑹已而詐要勒共向青州暾至東阿為勒游騎所獲勒見彌與嶷書大怒乃殺暾彌未之知勒伏兵請彌殺之并其衆張昌本義陽蠻也少為平氏縣吏武力過人每自占卜言應當冨貴好論攻戰儕類咸共笑之及李流宼蜀昌潛遁半年聚黨數千人盗得幢麾詐言臺遣其募人討流會壬午詔書發武勇以赴益土號曰壬午兵自天下多難數術者云當有帝王興於江左及此調發人咸不樂西征昌黨因之誑惑百姓各不肯去而詔書催遣嚴速所經之縣停留者五日二千石免由是郡縣官長皆躬出驅逐展轉不逺屯聚而為劫掠是嵗江夏大稔流人就食者數千口太安二年昌於安陸縣石巖山屯聚去郡八十里諸流民及避戍役者多往從之昌乃易姓名為李辰太守弓欽遣軍就討輙為所破昌徒衆日多遂來攻郡欽出戰大敗乃將家南奔沔口鎭東大將軍新野王歆遣騎督靳滿討昌於随郡西大戰滿敗走昌得其器杖據有江夏即其府庫造祅言云當有聖人出山都縣吏邱沉遇於江夏昌名之為聖人盛車服出迎之立為天子置百官沉易姓名為劉尼稱漢後以昌為相國昌兄味為車騎將軍弟放廣武將軍各領兵於石巖中作宫殿又於巖上織竹為鳥形衣以五綵聚肉於其傍衆鳥群集詐云鳳凰降又言珠袍玉璽鐵劵金鼓自然而至乃下赦書建元神鳳郊祀服色依漢故事其有不應其募者族誅又流訛言云江淮已南皆圖反逆官軍大起悉誅討之群小互相扇動人情惶懼江沔間一時焱起豎牙旗鳴鼓角以應昌旬月之間衆十三萬皆以絳科頭撍之以毛江夏義陽士庶莫不從之惟江夏舊姓江安令王傴秀才吕蕤不從昌以三公位徵之傴㽔懼宻將家室北奔汝南投豫州刺史劉喬鄉人期思令李權常安令吳鳳孝㢘吳暢紏合善士得五百餘家追随傴等不豫妖逆新野王歆上言妖賊張昌劉尼妄稱神聖犬羊萬計絳頭毛面跳刀走㦸其鋒不可當請臺勑諸軍三道救助於是劉喬率諸軍據汝南以禦賊前將軍趙驤領精卒八千據宛助平南將軍羊伊距守昌遣其將軍黄林為大都督率二萬人向豫州前驅李宫欲掠取汝水居人喬遣將軍李揚逆擊大破之林等東攻弋陽太守梁桓嬰城固守又遣其將馬武破武昌害太守昌自領其衆西攻宛破趙驤害羊伊進攻㐮陽害新野王歆昌别率石氷東破江揚二州偽置守長當時五州之境皆畏逼從逆又遣其將陳貞陳蘭張甫等攻長沙湘東零陵諸郡昌雖跨帶五州樹立牧守皆桀盗小人而無禁制但以劫掠為務人情漸離是嵗詔以寕朔將軍領南蠻校尉劉𢎞鎭宛𢎞遣司馬陶侃参軍蒯桓皮初等率衆討昌於竟陵劉喬又遣將軍李楊督護尹奉總兵向江夏侃等與昌苦戰累日大破之納降萬計昌乃沉竄于下雋山明年秋乃擒之傳首京師同黨並夷三族陳敏字令通廬江人也少有幹能以郡㢘吏補尚書倉部令史及趙王倫簒逆三王起義兵屯不散京師倉廪空虚敏建議曰南方米榖皆積數十年時將欲腐敗而不漕運以濟中州非所以救患周急也朝廷從之以敏為合肥度支遷廣陵度支張昌之亂遣其將石氷等趨夀春都督劉凖憂惶計無所出時敏統大軍在夀春謂凖曰此等夲不樂遠戍故逼廹成賊烏合之衆其勢易離敏請合率運兵公分配衆力破之必矣凖乃益敏兵擊之破吳𢎞石氷等敏遂乗勝逐北戰數十合時氷衆十倍敏以少擊衆毎戰皆尅遂至揚州廻討徐州賊封雲雲將張統斬雲降敏以功為廣陵相時恵帝幸長安四方交争敏遂有割據江東之志其父聞之怒曰滅我門者必此兒也父亡去職東海王越當西迎大駕承制起敏為右將軍假節前鋒都督致書奬喻使赴國難時越討豫州刺史劉喬敏引兵㑹之與越俱敗於蕭敏因中國大亂遂請東歸収兵據歴陽㑹吳王常侍甘卓自洛至教卓假稱皇太弟命拜敏為揚州刺史并假江東首望顧榮等四十餘人為將軍郡守榮等並偽從之敏為息娶卓女遂相為表裏揚州刺史劉機丹陽太守王廣等皆棄官奔走敏弟昶知顧榮等有貳心勸敏殺之敏不從昶將精兵數萬據烏江弟恢率錢端等南宼江州刺史應邈奔走弟斌東畧諸郡遂據有吳越之地敏命寮佐以己為都督江東軍事大司馬楚公封十郡加九錫列上尚書稱自江入河奉迎鑾駕東海王軍諮祭酒葉譚聞敏自相署置而顧榮等江東首望悉受敏官爵乃遺榮等書曰陳敏本以倉曹令史頑冗下材朝廷以石氷之亂録其微功越次超授庻其有韓盧一噬之效而本性凶狡貪榮干運阻兵作威盗據吳㑹天道伐惡人神所不佑雖阻長江命危朝露蓋忠節令圖君子高行而屈節附逆義士所耻諸賢既吳㑹仁人並受國寵或剖符名郡或列為近臣而便辱身奸人之朝降節逆叛之黨稽顙屈膝不亦羞乎遥度雅量豈獨是安况今皇輿東軒行即紫館廟謨逺算潛運帷幄便當發荆州虎旅順流東下徐州鋭鋒南據堂邑征東勁卒曜武歴陽飛橋越横江之津汎舟渉𤓰步之渚威震丹陽擒賊建鄴而諸賢復何顔見中州之士邪僕與諸君昔為同志今已異域往為一體今成異身引領南望情存舊懐願圖良䇿以存嘉謀也敏凡材無逺略一旦據有江東刑政無章不為英儁所服且子弟凶暴所在為患周玘顧榮之徒常懼禍敗又得譚書皆有慙色玘榮遣使宻報征東大將軍劉凖遣兵臨江已為内應凖遣揚州刺史劉機寜逺將軍衡彦等出歴陽敏使弟昶及將軍錢廣次烏江以距之又遣弟閎為歴陽太守戍牛渚錢廣家在長城玘鄉人也玘潛使圖昶廣遣其屬何康錢象投募送白事於昶昶傾頭視書康揮刀斬之稱州下已殺敏敢有動者誅三族吹角為内應廣先勒兵在朱雀橋陳兵水南玘榮又説甘卓卓遂背敏率敏萬餘人將與卓戰未獲濟榮自以白羽扇麾之敏衆潰㪚敏單騎東奔至江乗為義兵所斬母及妻子皆伏誅於是㑹稽諸郡並殺敏諸弟無遺焉王如京兆新豐人也初為州武吏遇亂流移至宛時諸流人有詔並遣還鄉里如以闗中荒殘不願歸征南將軍山簡南中郎將杜蕤各遣兵送之而促期令發如遂潛結諸無頼少年夜襲二軍破之杜蕤悉衆擊如戰於湼陽蕤軍大敗山簡不能禦移屯夏口如又破㐮城於是南安龐實馮翊嚴嶷長安侯脱等各率其黨攻諸城鎭多殺令長以應之未幾衆至四五萬自號大將軍領司雍二州牧如懼石勒之攻已也乃厚賄於勒結為兄弟勒亦假其彊而納之時侯脱據宛與如不恊如説勒曰侯脱雖名漢臣其實漢賊如常恐其來襲兄宜備之勒素怒脱貳已憚如唇齒故不攻之及聞如言甚悦遂夜令三軍蓐食待命雞鳴而駕後出者斬晨壓宛門攻之旬有二日而尅之勒遂斬脫如於是大掠沔漢進逼㐮陽征南山簡使將趙同帥師擊之經年不能尅智力並屈遂嬰城自守王澄帥軍赴京都如邀擊破之如連年種榖皆化為莠軍中大飢其黨互相攻劫官軍進討各相率來降如計無所出歸於王敦敦從弟稜愛如驍武請敦配已麾下敦曰此輩虓險難畜汝性忌急不能容飬更成禍端稜固請與之稜置諸左右甚加寵遇如數與敦諸將角射屢鬭争為過失稜果不容而杖之如甚以為耻初敦有不臣之迹稜每諫之敦常怒其異己及敦聞如為稜所辱宻使人激怒之勸令殺稜如詣稜因開宴請劒舞為歡稜從之如於是舞刀為戲漸漸來前稜惡而呵之不止叱左右使牽去如直前害稜敦聞而陽驚亦捕如誅之杜曽新野人南中郎將蕤之從祖弟也少驍勇絶人能被甲游於水中始為新野王歆鎭南參軍歴華容令至南蠻司馬凡有戰陣勇冠三軍㑹永嘉之亂荆州荒梗故牙門將胡亢聚衆於竟陵自號楚公假曽竟陵太守亢後與其黨自相猜貳誅其驍將數十人曽心不自安潛謀圖之乃卑身屈節以事於亢亢弗之覺甚信任之㑹荆州賊王冲自號荆州刺史部衆亦盛屢遣兵抄亢所統亢患之問計於曽曽勸令擊之亢以為然曽白亢取帳下刀㦸付工磨之因潛引王冲之兵亢遣精騎出距冲城中空虗曽因斬亢而并其衆自稱南中郎將領竟陵太守曽求南郡太守劉務女不得盡滅其家㑹愍帝遣第五猗為安南將軍荆州刺史曽迎猗於㐮陽為兄子娶猗女遂分據沔漢時陶侃新破杜弢乗勝擊曽有輕曽之色侃司馬魯恬言於侃曰古人戰争先料其將今使君諸將無及曽者未易可逼也侃不從進軍圍之於石城時曽軍多騎而侃兵無馬曽宻開門突侃陣出其後反擊其背侃師遂敗投水死者數百人曽將趨順陽下馬拜侃告辭而去旣而致箋於平南將軍荀崧求討丹水賊以自效崧納之侃遺崧書曰杜曽凶狡所將之卒皆豺狼也可謂梟䲭食母之物此人不死州土未寧足下當識吾言崧以宛中兵少籍曽為外援不從侃言曽復率流亡二千餘人圍㐮陽數日不下而還及王廙為荆州刺史曽距之廙使將朱軌趙誘擊曽皆為曽所殺王敦遣周訪討之屢戰不尅訪潛遣人縁山開道出曽不意以襲之曽衆潰其將馬儁蘇温等執曽詣訪降訪欲生致武昌而朱軌息昌趙誘息允等皆乞曽以復寃於是斬曽而昌允臠其肉而噉之杜弢字景文蜀郡成都人也祖植有名蜀士武帝時為符節令父眕略陽護軍弢初以才學著稱州舉秀才遭李庠之亂避地南平太守應詹愛其才而禮之後爲醴陵令時巴蜀流人汝班蹇碩等數萬家布在荆湘間而為舊百姓之所侵苦並懐怨恨㑹蜀賊李驤殺縣令屯聚樂鄉衆數百人弢與應詹擊驤破之蜀人杜疇蹇撫等復擾湘州参軍馮素與汝班不協言於刺史荀眺曰流人皆欲反眺以為然欲盡誅流人班等懼死聚衆以應疇時弢在湘中賊衆共推弢為主弢自稱梁益二州牧平難將軍湘州刺史攻破郡縣眺委城走廣州廣州刺史郭訥遣始興太守嚴佐率衆攻弢弢逆擊破之荆州刺史王澄復遣王機擊弢敗於巴陵弢遂縱兵肆暴偽降於山簡簡以為廣漢太守眺之走也州人推安成太守郭察領州事因率衆討弢反為所敗察死之弢遂南破零陵東侵武昌害長沙太守崔敷宜都太守杜鑒邵陵太守鄭融等元帝命征南將軍王敦荆州刺史陶侃等討之前後數十戰弢將士多物故於是請降帝不許弢乃遺應詹書布其誠欵辭㫖哀苦詹甚憐之乃啓呈弢書請遣大使宣揚聖㫖以赦其罪帝乃使前南海太守王運受弢降宣詔書大赦凡諸反逆一皆除之加弢巴東監軍弢受命後諸將殉功者攻擊之不已弢不勝憤怒遂殺運而使其將王眞領精兵三千為竒兵出江南向武陵斷官軍運路陶侃使伏波將軍鄭攀邀擊大破之眞歩走湘城於是侃等諸軍齊進眞遂降侃衆黨散潰弢乃逃遁不知所在王機字令明長沙人也父毅廣州刺史甚得南越之情機羙姿儀俶黨有度量陳恢之亂機年十七率衆擊破之常慕王澄為人澄亦雅知之以為已亞遂與友善内綜心膂外為爪牙尋用為成都内史機終日醉酒不存政事由是百姓怨之人情騷動㑹澄遇害機懼禍及又屬杜弢所在發墓而獨為機守冢機益自疑就王敦求廣州敦不許㑹廣州人背刺史郭訥迎機為刺史機遂將奴客門生千餘人入廣州州部將温邵率衆迎機敦遣参軍葛幽追之及於廬陵機叱幽曰何以敢來欲取死邪幽不敢逼而歸郭納聞卲之納機也乃遣兵擊邵反為所破訥又遣機父兄時吏距之咸倒戈迎機訥衆皆散乃握節而避機機遂入城就訥求節訥歎曰昔蘇武不失其節前史以為美談此節天朝所假義不相與自可遣兵來取之機慙而止機自以篡州懼為王敦所討乃更求交州時杜弢餘黨杜𢎞奔臨賀送金數千両與機求討桂林賊以自効機為列上朝廷許之王敦以機難制又欲因機討梁碩故以降杜𢎞之勲轉為交州刺史碩聞而遣子侯候機於鬱林機怒其迎遲責云湏至州當相収拷碩子馳使報碩碩曰王即已壊廣州何可復來破交州也乃禁州人不許迎之府司馬杜讚以碩不迎機率兵討碩為碩所敗碩恐諸僑人為機於是悉殺其良者乃自領交阯太守機既為碩所距遂住鬱林時杜𢎞大破桂林賊還遇機於道機勸𢎞取交州𢎞素有志乃執機節曰當相與迭持何可獨捉機遂以節與之於是機與𢎞及温邵劉沉等並反尋而陶侃為廣州到始興州人皆諌不可輕進侃不聽及至州諸郡縣皆已迎機矣侃先討温邵劉沉皆殺之機遣牙門屈藍還州詐言増糧宻招誘所部欲以距侃侃即収藍斬之遣督䕶許髙討機走之病死於道髙掘出其尸斬首并殺其二子焉機兄矩字令式羙姿容毎出游觀者盈路初為南平太守豫討陳恢有功遷廣州刺史將赴職忽見一人持奏謁矩自云京兆杜靈之矩問之答稱天上京兆被使召君為主簿矩意甚惡之至州月餘卒祖約字士少豫州刺史逖之弟也初以孝㢘為城臯令與逖甚相友愛永嘉末随逖過江元帝稱制引為掾屬與陳留阮孚齊名後轉從事中即典選舉約妻無男而性妬約亦不敢違忤嘗夜寢於外忽為人所傷疑其妻所為約求去職帝不聽約便從右司馬營東門私出司直劉隗劾之曰約幸荷殊寵顯位選曹銓衡人物衆所具瞻當敬以直内義以方外杜漸防萌式遏冦害而乃變起蕭墻患生婢妾身被刑傷虧其膚髮群小噂􅊱嚻聲逺被塵穢清化垢累明時天恩含垢猶復慰喻而約違命輕出既無明智以保其身又孤恩廢命宜加貶黜以塞衆謗帝不之罪隗重加執據終不許及逖有功於譙沛約漸見任遇逖卒自侍中代逖為平西將軍豫州刺史領逖之衆約異母兄光禄大夫納宻言於帝曰約内懐陵上之心抑而使之可也今顯侍左右假其權勢將爲亂階矣帝不納時人亦謂納與約異生忌其寵貴故有此言而約竟無綏馭之才不為士卒所附及王敦舉兵約歸衛京都率衆次夀陽逐敦所署淮南太守任台以功封五等侯進號鎭西將軍使屯夀陽為北境藩捍約自以名輩不後郗卞而不豫明帝顧命又望開府及諸所表請多不見許遂懐怨望石聰嘗以衆逼之約屢表請救而官軍不至聰既退朝議又欲作涂塘以逼胡㓂約謂為棄已彌懐憤恚先是太后使蔡謨勞之約見謨瞋目攘􅃑非毁朝政及蘇峻舉兵遂推崇約而罪執政約聞而大喜從子智及衍並傾險好亂更讚成其事於是命逖子沛内史渙女婿淮南太守許栁以兵㑹峻逖妻栁之姊也固諌不從及峻尅京師矯詔以約為侍中太尉尚書令潁川人陳光率其屬攻之約左右閻秃貌類約光謂為約而擒之約踰垣獲免光奔於石勒而約之諸將復隂結於勒請為内應勒遣石聰來攻之約衆潰奔歴陽遣兄子渙攻桓宣於皖城㑹毛寳援宣擊渙敗之趙允復遣將軍甘苖從三焦上歴陽約懼而夜遁其將牽騰率衆出降約以左右數百人奔於石勒勒薄其為人不見者久之勒將程遐説勒曰天下初定當顯明逆順此漢髙祖所以斬丁公也今忠於事君者莫不顯擢背叛不臣者無不夷戮此天下所以歸伏大王也祖約猶存臣竊惑之且約大引賔客又占奪鄉里先人田地地主多怨於是勒乃詐約曰祖侯逺來未得善歡可集子弟一時俱㑹至日勒辭之以疾令遐請約及其宗室約知禍及大飲致醉既至於市抱其外孫而泣遂殺之并其親屬中外百餘人悉滅之婦女妓妾班賜諸胡初逖有胡奴曰王安待之甚厚及在雍邱告之曰石勒是汝種類吾亦不在爾一人乃厚資遣之遂為勒將祖氏之誅也安多將從人於市觀省潛取逖庶子道重藏之為沙門時年十嵗石氏滅後來歸蘇峻字子髙長廣掖人也父模安樂相峻少為書生有才學仕郡主簿年十八舉孝㢘永嘉之亂百姓流亡所在屯聚峻紏合得數千家結壘於本縣于時豪傑所在屯聚而峻最彊遣長史徐瑋宣檄諸屯示以王化又収枯骨而𦵏之逺近感其恩義推峻為主遂射獵於海邉青山中元帝聞之假峻安集將軍時曹嶷領青州刺史表峻為掖令峻辭疾不受嶷惡其得衆恐必為患將討之峻懼率其所部數百家汎海南渡既至廣陵朝廷嘉其逺至轉鷹揚將軍會周堅反於彭城峻助討之有功除淮陵内史遷蘭陵相王敦作逆詔峻討敦峻卜之不吉遲逥不進及王師敗績峻退保盱眙淮陵故吏徐深艾毅重請峻為内史詔聽之加􅁬威將軍太寕初更除臨淮内史王敦復肆逆尚書令郗鑒議召峻及劉遐援京師敦遣峻兄説峻曰富貴可坐取何為自來送死峻不從遂率衆赴京師頓於司徒故府道逺行速軍人疲困沈充錢鳳謀曰北軍新到未堪攻戰擊之必尅若復猶豫後難犯也賊於其夜度竹格渚㧞柵將戰峻率其將韓晃於南塘横截大破之又隨庾亮追破沈充進使持節冠軍將軍歴陽内史加散騎常侍封邵陵公食邑一千八百户峻本以單家聚衆扵擾攘之際歸順之後志在立功既有功於國威望漸著至是有鋭卒萬人器械甚精朝廷以江外寄之而峻頗懐驕溢自負其衆潛有異志撫納亡命得罪之家有逃死者峻輙蔽匿之衆力日多皆仰食縣官運漕者相屬稍不如意便肆忿言時明帝初崩委政宰輔䕶軍庾亮欲徵之峻聞將徵遣司馬何仍詣亮曰討賊外任逺近從命至於内輔實非所堪不從遂下優詔徵峻爲大司農加散騎常侍位特進以弟逸代領部曲峻素疑亮欲害已表曰昔眀皇帝親執臣手使臣北討胡㓂今中原未靖無用家為乞補靑州界一荒郡以展鷹犬之用復不許峻嚴裝將赴召而猶豫未決参軍任譲謂峻曰將軍求處荒郡而不見許事勢如此恐無生路不如勒兵自守峻從之遂不應命朝廷遣使諷諭之峻曰臺下云我欲反豈得活邪我寧山頭望廷尉不能廷尉望山頭往者國危累卵非我不濟狡兎既死獵犬理自應烹但當死報造謀者耳於是遣參軍徐㑹結祖約謀為亂而以討亮為名約遣祖渙許栁率衆助峻峻遣將軍韓晃張健等襲姑孰進逼慈湖殺于湖令陶馥及振威將軍司馬流峻自率渙柳衆萬人乗風濟自横江次于陵口與王師戰頻㨗遂據蔣陵覆舟山率衆因風放火臺省及諸營寺署一時蕩盡遂䧟宫城縱兵大掠侵逼六宫窮凶極暴殘酷無道驅役百官光禄勲王彬等皆被捶撻逼令擔負登蔣山祼剝士女皆以壊席苫草自鄣無草者坐地以土自覆哀號之聲震動内外時官有布二十萬疋金銀五千斤錢億萬絹數萬匹他物稱是峻盡費之矯詔大赦惟庾亮兄弟不在原例自為驃騎領軍將軍録尚書事許桞丹陽尹加前將軍馬雄左衛將軍祖渙驍騎將軍復弋陽王羕為西陽王太宰録尚書事羕息播亦復本官於是改易官司置其親黨朝廷政事一皆由之又遣韓晃入義興張健管商𢎞徽等入晉陵時温矯陶侃已唱義於武昌峻聞兵起用參軍賈寧計還據石頭更分兵距諸義軍所過無不殘滅嶠等將至峻遂遷天子於石頭逼迫居人盡聚之後苑使懐徳令匡術守苑城嶠等既到乃築壘於白石峻率衆攻之幾至陷沒東西抄掠多所擒虜兵威日盛戰無不尅由是義衆沮衂人懐異計朝士之奔義軍者皆云峻狡黠有智力其徒黨驍勇所向無敵惟當以天討有罪誅滅不久若以人事言之未易除也温嶠怒曰諸君怯愞乃是譽賊及後累戰不㨗嶠亦深憚之管商等進攻吳郡焚吳縣海鹽嘉興敗諸義軍韓晃又攻宣城害太守桓彛商等又焚餘杭而大敗於武康退還義興嶠與趙允率歩兵萬人從白石南上欲以臨之峻與匡孝將八千人逆戰峻遣子碩與孝以數十騎先薄趙允敗之峻望見允走曰孝能破賊我更不如乎因舎其衆與數騎北下突陣不得入將迴趨白木陂牙門彭世李千等投之以矛墜馬斬首臠割之焚其骨三軍皆稱萬嵗峻司馬任譲等共立峻弟逸為主求峻尸不獲碩乃發庾亮父母墓剖棺焚尸逸閉城自守韓晃聞峻死引兵赴石頭管商及𢎞徽進攻庱亭壘督䕶李𢎞及輕車長史滕含擊破之斬首千級商率衆走延陵李閎與庱亭諸軍追之斬獲數千級商詣庾亮降匡術舉宛城降韓晃與蘇逸等并力攻術不能䧟温嶠等選精鋭將攻賊營碩率驍勇數百渡淮而戰於陣斬碩晃等震懼以其衆奔張健於曲阿門阨不得出更相蹈藉死者萬數逸為李湯所執斬於車騎府初管商之降也餘衆並歸張健健又疑𢎞徽等不與己同盡殺之更以舟軍自延陵向長塘小大二萬餘口金銀寳物不可稱數揚烈將軍王允之與吳興諸軍擊健大破之獲男女萬餘口健復與馬雄韓晃等輕軍俱走閎率鋭兵追之及於巖山攻之甚急健等不敢下山惟晃獨出帶两步靫箭却據胡牀彎弓射之傷殺甚衆箭盡乃斬之健等遂降並梟其首孫恩字靈秀琅邪人孫秀之族也世奉五斗米道恩叔父泰字敬逺師事錢塘杜子恭而子㳟有祕術嘗就人借𤓰刀其主求之子恭曰當即相還耳既而刀主行至嘉興有魚躍入船中破魚得𤓰刀其為神效往往如此子㳟死泰傳其術然浮狡有小才誑誘百姓愚者敬之如神皆竭財産進子女以求福慶王珣言於㑹稽王道子流之於廣州刺史王懐之以泰行鬱林太守南越亦歸之太子少傅王雅先與泰善言於孝武帝以泰知飬性之方因召還道子以為徐州主簿猶以道術眩惑士庻稍遷輔國將軍新安太守王㳟之役泰私合義兵得數千人為國討㳟黄門郎孔道鄱陽太守桓放之驃騎諮議周勰等皆敬事之㑹稽世子元顯亦數詣泰求其祕術泰見天下兵起以為晉祚將終乃扇動百姓私集徒黨於時朝士皆懼泰為亂以其與元顯交厚咸莫敢言㑹稽内史謝輶發其謀道子誅之恩逃于海衆聞泰死惑之皆謂蟬蛻登仙故就海中資給恩聚合亡命得百餘人志欲復讎及元顯縱暴吳㑹百姓不安恩因其騷動自海攻上虞殺縣令因襲㑹稽害内史王凝之有衆數萬於是㑹稽謝鍼吳郡陸瓌吳興邱尫義興許允之臨海周胄永嘉張永及東陽新安等凡八郡一時俱起殺長吏以應之旬日之中衆數十萬於是吳興太守謝邈永嘉太守謝逸嘉興公顧允南康公謝明慧黄門郎謝冲張琨中書郎孔道太子洗馬孔福烏程令夏侯愔等皆遇害吳國内史桓謹義興太守魏傿臨海太守新蔡王崇等並出奔於是恩據㑹稽自號征東將軍號其黨曰長生人宣語令誅異已有不同者戮及嬰孩由是死者十七八畿内諸縣處處蜂起朝廷震懼内外戒嚴遣衛將軍謝琰鎭北將軍劉牢之討之並轉鬬而前吳㑹承平日久久不習戰又無器械故所在多被破亡諸賊皆燒倉廪焚邑屋刋木堙井虜掠財寳相率聚于㑹稽其婦女有嬰累不能去者囊簏盛嬰兒投於水而告之曰賀汝先登仙堂我尋後就汝初恩聞八郡響應告其屬曰天下無復事矣當與諸君朝服而至建康既聞牢之臨江復曰我割浙江不失作勾踐也尋知牢之已濟江乃曰孤不羞走矣遂虜男女二十餘萬口一時逃入海懼官軍之躡乃縁道多棄寳物子女時東土殷實莫不粲麗盈目牢之等遽於収歛故恩復得逃海朝廷以謝琰為㑹稽率徐州文武戍海浦隆安四年恩復入餘姚破上虞進至刑浦琰遣参軍劉宣之距破之恩退縮少日復㓂刑浦害謝琰朝廷大震遣冠軍將軍桓不才輔國將軍孫無終寧朔將軍髙雅之擊之恩復還于海於是復遣牢之東屯㑹稽吳國内史袁山松築扈瀆壘㳂海備恩明年恩復入浹口雅之敗績牢之進擊恩恩復還於海轉㓂扈瀆害袁山松仍浮海向京口牢之率衆要擊未逹而恩已至劉裕乃總兵沿海距之及戰恩衆大敗狼狽赴船尋又集衆欲向京都朝廷駭懼陳兵以待之恩至新洲不敢進而退北宼廣陵䧟之乃浮海而北劉裕與劉敬宣并軍躡之於郁州累戰恩復大敗由是漸衰弱復沿海還南裕亦尋海要截復大破恩於扈瀆恩遂逺迸海中及桓元用事恩復㓂臨海臨海太守辛景討破之恩窮蹙乃赴海自沉妖黨及妓妾謂之水僊投水從死者百數餘衆復推恩妹夫盧循爲主自恩初入海所虜男女之口其後戰死及自溺并流離被傳賣者至恩死時裁數千人存而恩攻没謝琰袁山松䧟廣陵前後數十戰亦殺百姓數萬人盧循字子先小名元龍司空從事中郎諶之曽孫也雙眸冏徹瞳子四轉善草隸奕棊之蓻沙門惠逺有鑒裁見而謂之曰君雖體渉風素而志存不軌循娶孫恩妹及恩作亂與循通謀恩性酷忍循毎諌止之人士多頼以濟免㤙亡餘衆推循為主元興二年正月㓂東陽八月攻永嘉劉裕討循至晉安循窘急汎海到畨禺㓂廣州逐刺史吳隱之自攝州事號平南將軍遣使獻貢時朝廷新誅桓氏中外多虞乃權假循征虜將軍廣州刺史平越中郎將義熙中劉裕伐慕容超循所署始興太守徐道覆循之姊夫也使人勸循乘虛而出循不從道覆乃至畨禺説循曰朝廷恒以君為腹心之疾劉公未有旋日不乗此機而保一日之安若平齊之後劉公自率衆至豫章遣鋭師過嶺雖復君之神武必不能當也今日之機萬不可失既尅都邑劉裕雖還無能為也君若不同使當率始興之衆直指尋陽循甚不樂此舉無以奪其計乃從之初道覆宻欲裝舟艦乃使人伐船材於南康山偽云將下都貨之後稱力少不能得致即於郡賤賣之價減數倍居人貪賤賣衣物而市之贛石水急出船甚難皆儲之如是者數四故船板大積而百姓弗之疑及道覆舉兵案賣劵而取之無得隱匿者乃并力装之旬日而辦遂舉衆㓂南康廬陵豫章諸郡守相皆委任奔走鎭南將軍何無忌率衆距之兵敗被害循遣道覆㓂江陵未至為官軍所敗馳走告循曰請并力攻京都若尅之江陵非所憂也乃連旗而下戎卒十萬舳艫千計敗衛將軍劉毅於桑落洲逕至江寕道覆素有膽決知劉裕已還欲乾没一戰請於新亭至白石焚舟而上數道攻之循多謀少決欲以萬全為計固不聽道覆以循無斷乃歎曰我終為盧公所誤事必無成使我得為英雄驅馳天下不足定也裕懼其侵軼乃柵石頭斷柤浦以距之循攻柵不利船艦為暴風所傾人有死者列陣南岸戰又敗績乃進攻京口㓂掠諸縣無所得循謂道覆曰師老矣弗能復振可據尋陽并力取荆州徐更與都下争衡猶可以濟因自蔡洲南走復據尋陽裕先遣羣帥追討自統大衆繼進又敗循於雷池循欲遁還豫章乃悉力柵斷左里裕命衆攻柵循衆雖死戰猶不能抗裕乗勝擊之循單舸而走収散卒得千餘人還保廣州裕先遣孫處從海道據畨禺城循攻之不下道覆保始興因險自固循乃襲合浦尅之進攻交州至龍編刺史杜慧度譎而敗之循勢屈知不免先鴆妻子十餘人又召妓妾問曰我今將自殺誰能同者多云雀䑕貪生就死實人情所難有云官尚當死某豈願生於是悉鴆諸辭死者因自投於水慧度取其尸斬之及其父嘏同黨盡獲傳首京都譙縱巴西南充人也祖獻之有重名於西土縱少而謹愼蜀人愛之為安西府参軍義熙元年刺史遣縱及侯暉等領諸縣氐進兵東下暉有異志因梁州人不樂東也將圖益州刺史毛璩與巴西陽昧結謀於五城水口共逼縱為主縱懼而不當走投於水暉引出而請之至於再三遂以兵逼縱於輿上攻璩弟西夷校尉瑾於涪城城䧟瑾死之縱乃自號梁秦二州刺史璩聞縱反自涪城歩還成都遣参軍王瓊率三千人討縱又遣弟瑗領兵四千繼瓊後進縱遣弟明子及暉距瓊於廣漢瓊擊破暉等追至綿竹明子設二伏以待之大敗瓊衆死者十八九益州營户李騰開城以納縱毛璩既死縱以從弟洪為益州刺史明子為鎭東將軍巴州刺史率其衆五千人屯白帝自稱成都王明年遣使稱藩於姚興將順流東㓂以討車騎將軍劉裕為名乞師於姚興且請桓謙為助興遣之九年劉裕以西陽太守朱齡石為益州刺史寕朔將軍臧喜下邳太守劉鍾蘭陵太守蒯恩等率衆二萬自江陵討縱初謀元率僉難其人齡石資名素淺裕違衆拔之授以麾下之半臧喜裕妻弟也位出其右又隸焉齡石次于白帝縱遣譙道福重兵守涪齡石師次平模去成都二百里縱遣其大將軍侯暉尚書僕射譙悦屯平模夾岸連城層樓重柵衆未能攻齡石謂劉鍾曰天方暑熱賊今固險攻之難拔祗困我師吾欲蓄鋭息兵伺隙而進卿以為何如鍾曰不然前揚聲言大將由内水故道福不敢捨涪今重軍逼之出其不意侯暉之徒已破膽矣正可因其兇而攻之勢當必尅尅平模之後自可鼓行而前成都必不能守若緩兵相持虚實相見涪軍復來難為敵也進不能戰退無所資二萬餘人因為蜀子虜耳從之翌日進攻皆尅斬侯暉等於是遂進縱之城守者相次瓦觧縱乃出奔其尚書令馬耽封倉庫以待王師及齡石入成都誅縱同祖之親餘皆安堵使復其業縱之走也先如其墓縱女謂縱曰走必不免祗取辱焉等死死於先人之墓可也縱不從投道福於涪道福怒謂縱曰大夫夫居如斯功業安可棄哉今欲為降虜豈可而得人誰不死何懼之甚因投縱以劍中其馬鞍縱去之乃自縊道福謂其徒曰吾飬爾等正為今日蜀之存亡實繫在我不在譙王我尚在猶足一戰士咸許諾乃散金帛以賜其衆衆受之而走道福獨奔廣漢廣漢人杜瑾執之朱齡石徙馬耽於越嶲追殺之耽之死也謂其徒曰朱侯不送我京師滅衆口也吾必不免乃盥洗而卧引繩而死湏臾齡石使至遂戮尸焉通志卷一百三十
