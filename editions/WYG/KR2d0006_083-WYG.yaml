body:
  text: 通志卷七十七下宋右廸功郎鄭樵漁仲撰周同姓世家第一下晉鄭魏韓晉唐叔虞者周武王子而成王弟初武王與叔虞母㑹時夢天謂武王曰余命女生子名虞余與之唐及生子文在其手曰虞故遂因命之曰虞武王崩成王立唐有亂周公誅滅唐成王與叔虞戲削桐葉為珪以與叔虞曰以此封若史佚因請擇日立叔虞成王曰吾與之戲耳史佚曰天子毋戲言言則史書之禮成之樂歌之於是遂封叔虞於唐唐在河汾之東方百里故曰唐叔虞姓姬氏字子干叔虞之子爕是為晉侯晉侯子寧族是為武侯武侯之子服人是為成侯成侯子福是為厲侯厲侯子宜臼是為靖侯靖侯已來年紀可推自唐叔至靖侯五世無其年數靖侯十七年周厲王出奔於彘大臣行政號曰共和十八年靖侯卒子釐侯司徒立釐侯十四年周宣王初立十八年釐侯卒子獻侯籍立獻侯十一年卒子穆侯費王立穆侯取齊女為夫人七年伐條生太子仇十年伐千畆有功生少子名曰成師晉人師服曰異哉君之命子也太子曰仇仇者讐也少子曰成師成師大號成之者也名自命也物自定也今適庶名反逆此後晉其能毋亂乎二十七年穆侯卒弟殤叔自立太子仇出奔殤叔三年周宣王崩四年穆侯太子仇率其徒襲殤叔而立是為文侯文侯十年周幽王為犬戎所殺周東徙而秦襄公始列為諸侯三十五年文侯仇卒子昭侯伯立昭侯元年封文侯弟成師於曲沃曲沃邑大於翼翼晉君都邑也成師封曲沃號為桓叔靖侯庶孫欒賔相桓叔桓叔是時年五十八矣好徳晉國之衆皆附焉君子曰晉國之亂其在曲沃矣末大於本而得民心不亂何待七年晉大臣潘父弑其君昭侯而迎曲沃桓叔桓叔欲入晉晉人發兵攻桓叔桓叔敗還歸曲沃晉人共立昭侯子平為君是為孝侯誅潘父孝侯八年曲沃桓叔卒子鱓代桓叔是為曲沃莊伯孝侯十五年曲沃莊伯弑其君晉孝侯於翼晉人攻曲沃莊伯莊伯復入曲沃晉人復立孝侯子郄為君是為鄂侯鄂侯二年魯隠公初立鄂侯六年卒曲沃莊伯聞鄂侯卒乃興兵伐晉周平王使虢公將兵伐曲沃莊伯莊伯走保曲沃晉人共立鄂侯子光是為哀侯哀侯二年曲沃莊伯卒子稱代莊伯立是為曲沃武公哀侯六年魯弑其君隠公哀侯八年晋侵陘廷陘廷與曲沃武公謀九年伐晉於汾旁虜哀侯晉人乃立哀侯子小子為君是為小子侯小子元年曲沃武公使韓萬殺所虜晉哀侯曲沃益彊晉無如之何晉小子之四年曲沃武公誘召晉小子殺之周桓王使虢仲伐曲沃武公武公入於曲沃乃立哀侯弟緡為晉侯晉侯緡四年宋執鄭祭仲而立突為鄭君晉侯十九年齊人管至父弑其君襄公二十八年齊桓公始霸曲沃武公伐晉侯緡滅之盡以其寳器賂獻於周釐王釐王命曲沃武公為晉君列為諸侯於是盡併晉地而有之曲沃武公已即位三十七年矣更號曰晉武公晉武公始都晉國前即位曲沃通年三十八年武公稱者先晉穆侯曾孫也曲沃桓叔孫也桓叔者始封曲沃武公莊伯子也自桓叔初封曲沃以至武公滅晉也凡六十七歲而卒代晉為諸侯武公代晉二歲卒與曲沃通年即位凡三十九年而卒子獻公詭諸立獻公元年周惠王弟頽攻惠王惠王出奔居鄭之櫟邑五年伐驪戎得驪姬驪姬弟俱愛幸之八年士蒍説獻公曰故晉之羣公子多不誅亂且起乃使盡殺晉諸公子而城聚都之命曰絳始都絳九年晋羣公子既亡奔虢虢以其故再伐晉弗克十二年驪姬生奚齊獻公有意廢太子乃曰曲沃吾先祖宗廟所在而蒲邊秦屈邊翟不使諸子居之我懼焉於是使太子申生居曲沃公子重耳居蒲公子夷吾居屈獻公與驪姬子奚齊居絳晉國以此知太子不立也太子申生其母齊桓公女也曰齊姜早死申生同母女弟為秦穆公夫人重耳母翟之狐氏也夷吾母重耳母女弟也獻公子八人而太子申生重耳夷吾皆有賢行及得驪姬乃逺此三子十六年晉獻公作二軍公將上軍太子申生將下軍趙夙御戎畢萬為右伐滅霍滅魏滅耿還為太子城曲沃賜趙夙耿賜畢萬魏以為大夫士蒍曰太子不得立矣分之都城而位以卿先為之極又安得立不如逃之無使罪至為吳太伯不亦可乎猶有令名太子不從十七年獻公使太子申生伐東山里克諫曰太子君之適嗣古者君行則守有守則從從曰撫軍守曰監國今以帥師非古制也公曰寡人有子未知其誰立里克不對而退公竟令太子帥師衣之偏衣佩之金玦里克謝病不從太子太子遂伐東山十九年獻公曰始吾先君莊伯之誅晉亂而虢常助晉伐我又匿晉亡公子果為亂今弗誅後遺子孫憂乃使荀息以屈産之乘假道於虞以伐虢取其下陽以歸獻公私謂驪姬曰吾欲廢太子以奚齊代之驪姬泣曰太子之立諸侯皆已知之而數將兵百姓附之奈何以賤妾之故廢適立庶君必行之妾自殺也驪姬佯譽太子而陰令人譖惡太子而欲立其子二十一年驪姬謂太子曰君夢齊姜太子速祭曲沃歸釐於君太子於是祭其母於曲沃上其薦胙於獻公獻公時出獵置胙於宫中驪姬使人置毒藥胙中居二日獻公從獵来還宰人上胙獻公獻公欲饗之驪姬從旁止之曰胙所從來逺宜試之祭地地墳與犬犬死與小臣小臣死驪姬泣曰太子何忍也其父而欲弑代之况他人乎且君老矣旦暮之人曾不能待而欲弑之謂獻公曰太子所以然者不過以妾及奚齊之故妾願子母辟之他國若早自殺毋徒使母子為太子所魚肉也始君欲廢之妾猶恨之至於今妾殊自失於此太子聞之奔新城獻公怒乃誅其傳杜原款或謂太子曰為此藥者乃驪姬也太子何不自辭明之太子曰吾君老矣非驪姬寢不安食不甘即辭之君且怒之不可或謂太子曰可奔他國太子曰被此惡名以出人誰内我我自殺耳遂自縊於新城此時重耳夷吾來朝人或告驪姬曰二公子怨驪姬之譖殺太子驪姬恐因譖二公子申生之藥胙二公子知之二子聞之恐重耳走蒲夷吾走屈保其城自備守二十二年獻公怒二子不辭而去果有謀矣乃使兵伐蒲蒲人之宧者勃鞮命重耳促自殺重耳踰垣宧者追斬其衣袪重耳遂奔翟使人伐屈屈城守不可下是歲也晉復假道於虞以伐虢虞之大夫宫之竒諫虞君曰晉不可假道也是且滅虞虞之與虢脣之與齒脣亡則齒寒虞公不聴遂許晉宫之竒以其族去虞語具荀息傳中其冬晉滅虢虢公醜奔周還襲滅虞虜虞公及其大夫井伯百里奚以媵秦穆姬而脩虞祀二十三年獻公遂發賈華等伐屈屈潰夷吾將奔翟冀芮曰不可重耳已在矣今往晉必移兵伐翟翟畏晉禍且及不如走梁梁近於秦秦彊吾君百歲後可以求入焉遂奔梁二十五年晉伐翟翟以重耳故亦擊晉於齧桑晉兵解而去當此時晉彊西有河西與秦接境北邊翟東至河内驪姬弟生悼子二十六年夏齊桓公大㑹諸侯於葵邱獻公病行後未至逢周之宰孔宰孔曰齊桓公益驕不務德而務逺畧諸侯弗平君第毋㑹毋如晉何獻公亦病復還歸病甚乃謂荀息曰吾以奚齊為後年少諸大臣不服恐亂起子能立之乎荀息曰能獻公曰何以為驗對曰使死者復生生者不慙為之驗於是屬奚齊於荀息荀息為相主國政秋九月獻公卒里克邳鄭欲内重耳以三公子之徒作亂謂荀息曰三怨將起秦晉輔之子將何如荀息曰吾不可負先君言十月里克殺奚齊於䘮次獻公未葬也荀息將死之或曰不如立奚齊弟悼子而傳之荀息立悼子而葬獻公十一月里克弑悼子於朝荀息死之君子謂荀息不負其言也初獻公將伐驪戎卜曰齒牙為禍及破驪戎獲驪姬愛之竟以亂晉里克等已殺奚齊悼子使人迎公子重耳於翟欲立之重耳謝曰負父之命出奔父死不得修人子之禮侍喪重耳何敢入大夫其更立他子還報里克里克使迎夷吾於梁夷吾欲往吕省郤芮曰内猶有公子可立者而外求難信計非之秦輔彊國之威以入恐危乃使郤芮厚賂秦約曰即得入請以晉河西之地予秦乃遺里克書曰誠得立請遂封子於汾陽之邑秦穆公乃發兵送夷吾於晉齊桓公聞晉内亂亦率諸侯如晉秦兵與夷吾亦至晉齊乃使隰朋㑹秦俱入夷吾立為晉君是為惠公齊桓公至晉之髙梁而還歸惠公元年使邳鄭謝秦曰始夷吾以河西地許君今幸得入立大臣皆曰地者先君之地君亡在外何以得擅許秦者寡人爭之弗能得故謝秦亦不與里克汾陽邑而奪之權四月周襄王使周公忌父會齊秦大夫共禮晉惠公惠公以重耳在外畏里克為變賜里克死語在里克傳時邳鄭使謝秦未還故不及於難晉君改葬共太子申生秋狐突之下國遇申生與之言曰夷吾無禮予請於帝許罰有罪矣語在狐突傳中其時又有童兒謠云共太子改葬矣後十四年晉亦不昌昌乃在兄邳鄭使秦聞里克誅乃説秦繆公曰吕省郤稱冀芮實為不從若重賂與謀出晉君入重耳事必就秦繆公許之使人與歸報晉厚賂三子三子曰幣厚言甘此必邳鄭賣我於秦遂殺邳鄭及里克邳鄭之黨七輿大夫邳鄭子豹奔秦言伐晉繆公弗聽惠公之立倍秦地及里克誅七輿大夫國人不附二年周使召公過禮晉惠公惠公禮倨召公譏之四年晉饑乞糴於秦繆公問百里奚百里奚曰天菑流行國家代有救菑恤隣國之道也與之邳鄭子豹曰伐之繆公曰其君是惡其民何罪卒與粟自雍屬絳五年秦饑請糴於晉晉君謀之慶鄭曰以秦得立已而倍其地約晉饑而秦貸我今秦饑請糴與之何疑而謀之虢射曰往年天以晉賜秦秦弗取而貸我今天以秦賜晉晉其可以逆天乎遂伐之惠公用虢射謀不與秦粟而發兵且伐秦秦大怒亦發兵伐晉六年春秦繆公將兵伐晉晉惠公謂慶鄭曰秦師深矣奈何鄭曰秦内君君倍其賂晉饑秦輸粟秦饑而晉倍之乃欲因其饑伐之其深不亦宜乎晉卜御右慶鄭皆吉公曰鄭不孫乃更令歩陽御戎家僕徒為右進兵九月壬戌秦繆公晉惠公合戰韓原惠公馬縶不行秦兵至公窘召慶鄭為御鄭曰不用卜敗不亦當乎遂去更令梁繇靡御虢射為右輅秦繆公繆公壯士冐敗晉軍晉軍敗遂失秦繆公反獲晉侯以歸秦將以祀上帝晉君姊為繆公夫人衰絰涕泣公曰得晉侯將以為樂今乃如此且吾聞箕子見唐叔之初封曰其後必大晉庸可滅乎乃與晉侯盟王城而許之歸晉侯亦使吕省等報國人曰孤雖得歸毋面目見社稷卜曰立子圉晉人聞之皆哭秦繆公問吕省晉國和乎對曰不和小人懼失君亡親不憚立子圉曰必報讐寧事戎狄其君子則愛君而知罪以待秦命曰必報德有此二故不和於是秦繆公更舍惠公餽之七牢十一月歸晉侯晉侯至國誅慶鄭修政教謀曰重耳在外諸侯多利内之欲使人殺重耳於翟重耳聞之如齊八年使太子圉質秦初惠公亡在梁梁伯以女妻之生一男一女梁伯卜之男為人臣女為人妾故名男為圉女為妾十歲秦滅梁梁伯好土功治城溝民力罷怨其衆數相驚曰秦㓂至民恐惑秦竟滅之十三年晉惠公病内有數子太子圉曰吾母家在梁梁今秦滅之我外輕於秦而内無援於國君即不起病大夫輕更立他公子乃謀與其妻俱亡歸秦女曰子一國太子辱在此秦使婢子侍以固子之心子亡矣我不從子亦不敢言子圉遂亡歸晉十四年九月惠公卒太子圉立是為懐公子圉之亡秦怨之乃求公子重耳欲内之子圉之立畏秦之伐也乃令國中諸從重耳亡者與期期盡不到者盡滅其家狐突之子毛及偃從重耳在秦弗肯召懐公怒囚狐突突曰臣子事重耳有年數矣今召之是教之反君也何以教之懐公卒殺狐突秦繆公乃發兵送内重耳使人告欒郤之黨為内應殺懐公於髙梁入重耳重耳立是為文公重耳自少好士年十七有賢士五人曰趙衰狐偃咎犯文公舅也賈佗先軫魏武子自獻公為太子時重耳固已成人矣獻公即位重耳年二十一獻公十三年以驪姬故重耳備蒲城守獻公二十一年殺太子申生驪姬讒之恐不辭獻公而守蒲城獻公二十二年使宧者勃鞮趣殺重耳重耳踰垣宧者遂斬其衣袪重耳遂奔翟翟其母國也是時重耳年四十三從此五士其餘不名者數十人至翟翟伐咎如得二女以長女妻重耳生伯儵叔劉以少女適趙衰生盾居翟五歲而晉獻公卒里克已殺奚齊悼子乃使人迎立重耳重耳畏殺因固謝不敢入已而晉更迎其弟夷吾而立之是為惠公惠公七年畏重耳乃使宧者勃鞮與壯士欲殺重耳重耳聞之乃謀趙衰等曰始吾奔翟非以為可用興以近易通故且休足休足久矣固願徙之大國夫齊桓公好善志在霸王收恤諸侯今聞管仲隰朋死此亦欲得賢佐盍往乎於是遂行重耳謂其妻曰待我二十五年不來乃嫁其妻笑曰犁二十五年吾冢上柏大矣雖然妾待子重耳居翟凡十二年而去過衛衛文公不禮去過五鹿飢而從野人乞食野人盛土器中進之重耳怒趙衰曰土者有土也君其拜受之至齊齊桓公厚禮而以宗女妻之有馬二十乗重耳安之重耳至齊二歲而桓公卒會竪刁等為内亂齊孝公之立諸侯兵數至留齊凡五歲重耳愛齊女毋去心趙衰咎犯乃於桑下謀行齊女侍者在桑上聞之以告其主其主乃殺侍者勸重耳趣行重耳曰人生安樂孰知其他必死於此不能去齊女曰子一國公子窮而來此數士者以子為命子不疾反國報勞臣而懐女德竊為子羞之且不求何時得功乃與趙衰等謀醉重耳載以行行逺而覺重耳大怒引戈欲殺咎犯咎犯曰殺臣成子偃之願也重耳曰事不成我食舅氏之肉咎犯曰事不成犯肉腥臊何足食乃止遂行過曹曹共公不禮欲觀重耳駢脅曹大夫釐負覊曰晉公子賢又同姓窮來過我奈何不禮共公不從其謀負覊乃私遺重耳食置璧其下重耳受其食還其璧去過宋宋襄公新困兵於楚傷於泓聞重耳賢乃以國禮禮於重耳宋司馬公孫固善於咎犯曰宋小國新困不足以求入更之大國乃去過鄭鄭文公弗禮鄭叔瞻諫其君曰晉公子賢而其從者皆國相且又同姓鄭之出自厲王而晉之出自武王鄭君曰諸侯亡公子過此者衆安可盡禮叔瞻曰君不禮不如殺之且後為國患鄭君不聽重耳去之楚楚成王以適諸侯禮待之重耳謝不敢當趙衰曰子亡在外十餘年小國輕子况大國乎今楚大國而固遇子子其毋譲此天開子也遂以客禮見之成王厚遇重耳重耳甚卑成王曰子即反國何以報寡人重耳曰羽毛齒角玉帛君王所餘未知所以報王曰雖然何以報不榖重耳曰即不得已與君王以兵車㑹平原廣澤請辟王三舍楚將子玉怒曰王遇晉公子至厚今重耳言不遜請殺之成王曰晉公子賢而困於外久從者皆國器此天所置庸可殺乎且言何以易之居楚數月而晉太子圉亡秦秦怨之聞重耳在楚乃召之成王曰楚逺更數國乃至晉秦晉接境秦君賢子其勉行厚送重耳重耳至秦繆公以宗女五人妻重耳故子圉妻與往重耳不欲受司空季子曰其國且代况其故妻乎且受以結秦親而求入子乃拘小禮忘大醜乎遂受繆公大歡與重耳飲趙衰歌黍苖詩繆公曰知子欲急反國矣趙衰命重耳下再拜曰孤臣之仰君如百榖之望時雨是時晉惠公十四年秋惠公以九月卒子圉立十一月葬惠公十二月晉國大夫欒郤等聞重耳在秦皆陰來勸重耳趙衰等反國為内應甚衆於是秦繆公乃發兵與重耳歸晉晉聞秦兵來亦發兵拒之然皆知公子重耳入也唯惠公之故貴臣吕郤之屬不欲立重耳重耳出亡凡十九歲而得入時年六十二矣晉人多附焉文公元年春秦送重耳至河咎犯曰臣從君周旋天下過亦多矣臣猶知之况於君乎請從此去矣重耳曰若反國所不與子犯共者河伯視之乃投璧河中以與子犯盟渡河秦兵圍令狐晉軍於廬栁二月辛丑咎犯與秦晉大夫盟於郇壬寅重耳入於晉師丙午入於曲沃丁未朝於武宫即位為晉君是為文公羣臣皆往懐公圉奔髙梁戊申使人殺懐公懐公故大臣吕省郤芮本不附文公文公立恐誅乃欲與其徒謀燒公宫殺文公文公不知始嘗欲殺文公宧者履鞮知其謀欲以告文公解前罪求見文公文公不見使人譲之曰蒲城之事女斬予袪其後我從翟君獵女為惠公來殺我惠公與女期三日至而女一日至何速也女其念之宧者曰臣刀鋸之餘不敢以二心事君倍主故得罪於君君已反國其毋蒲翟乎且管仲射鉤桓公以覇今刑餘之人以事告而君不見禍又且及矣於是見之遂以吕郤等告文公欲召吕郤吕郤等黨多文公恐初入國國人賣已乃為微行會秦繆公於王城國人莫知三月己丑吕郤等果反焚公宫不得文公文公之衛徒與戰吕郤等引兵欲奔秦繆公誘吕郤等殺之河上晉國復而文公得歸夏迎夫人於秦秦所與文公妻者卒為夫人秦送三千人為衛以備晉亂文公修政施惠百姓賞從亡者及功臣大者封邑小者尊爵未盡行賞周襄王以弟帶難出居鄭地來告急晉晉初定欲發兵恐他亂起是以賞從亡未至隠者介子推推亦不言祿祿亦不及推謂文公之興天實啟之而諸從亡者貪天之功以為已力不可與䖏乃竄身緜上山中文公求之不獲環其山而封之號介山曰以記吾過且旌善人事具子推傳是時有從亡賤臣壺叔者請於文公曰君三行賞賞不及臣敢請罪文公曰夫導我以仁義防我以德惠此受上賞輔我以行卒以成立此受次賞矢石之難汗馬之勞此復受次賞若以力事我而無補吾缺者此復受次賞三賞之後故且及子晉人聞之皆説二年春秦軍河上將入王趙衰曰求霸莫如入王尊周周晉同姓晉不先入王後秦入之毋以令於天下方今尊王晉之資也三月甲辰晉乃發兵至陽樊圍温入襄王於周四月殺王弟帶周襄王賜晉河内陽樊之地四年楚成王及諸侯圍宋宋公孫固如晉告急先軫曰報施定霸於今在矣狐偃曰楚新得曹而初婚於衛若伐曹衛楚必救之則宋免矣於是晉作三軍趙衰舉郤縠將中軍郤臻佐之使狐偃將上軍狐毛佐之命趙衰為卿欒枝將下軍先軫佐之荀林父御戎魏犨為右往伐冬十二月晉兵先下山東而以原封趙衰五年春晉文公欲伐曹假道於衛衛人弗許還自河南渡侵曹伐衛正月取五鹿二月晉侯齊侯盟於歛盂衛侯請盟晉人不許衛侯欲與楚國人不欲故出其君以説晉衛侯居襄牛公子買守衞楚救衞不卒晉侯圍曹三月丙午晉師入曹數之以其不用釐負羈言而用羙女乘軒者三百人也令軍毋入釐負羈宗家以報德楚圍宋宋復告急晉文公欲救則攻楚為楚嘗有德不欲伐也欲釋宋宋又嘗有德於晉患之先軫曰執曺伯分曺衛地以予宋楚急曹衛其埶宜釋宋於是文公從之楚成王乃引兵歸楚將子玉曰王遇晉至厚今知楚急曹衛而故伐之是輕王王曰晉侯亡在外十九年困日久矣果得反國險阨盡知之能用其民天之所開不可當子玉請曰非敢必有功願以間執讒慝之口也楚王怒少與之兵於是子玉使宛春告晉請復衞侯而封曹臣亦釋宋咎犯曰子玉無禮矣君取一臣取二勿許先軫曰定人之謂禮楚一言定三國子一言而亡之我則無禮不許楚是棄宋也不如私許曹衛以誘之執宛春以怒楚既戰而後圗之晉侯乃囚宛春於衞且私許復曹衞曹衛告絶於楚楚得臣怒擊晉師晉師退軍吏曰何為退文公曰昔在楚約退三舍可倍乎楚師欲去得臣不肯四月戊辰宋公齊將秦將與晉侯次城濮己巳與楚兵合戰楚兵敗得臣收餘兵去甲午晉師還至衡雍作王宫於踐土初鄭助楚楚敗懼使人請盟晉侯晉侯與鄭伯盟五月丁未獻楚俘於周駟介百乘徒兵千天子使王子虎命晉侯為伯賜大輅彤弓矢百玈弓矢千秬鬯一卣珪瓚虎賁三百人晉侯三辭然後稽首受之周作晉文侯命王若曰父義和丕顯文武能慎明德昭登於上布聞在下維時上帝集厥命於文武恤朕身繼予一人永其在位於是晉文公稱伯癸亥王子虎盟諸侯於王庭晉焚楚軍火數日不息文公歎左右曰勝楚而君猶憂何文公曰吾聞能戰勝安者唯聖人是以懼且子玊猶在庸可喜乎子玉之敗而歸楚成王怒其不用其言貪與晋戰譲責子玉子玉自殺晉文公曰我撃其外楚誅其内内外相應於是乃喜六月晉人復入衞侯壬午晋侯渡河北歸國論功行賞語在狐偃傳冬晉侯㑹諸侯於温欲率之朝周力未能恐其有畔者乃使人言周襄王狩于河陽壬申遂率諸侯朝王於踐土孔子讀史記至文公曰諸侯無召王王狩河陽者春秋諱之也丁丑諸侯圍許曹伯臣或説晉侯曰齊桓公合諸侯而國異姓今君為會而滅同姓曹叔振鐸之後晉唐叔之後合諸侯而滅兄弟非禮晉侯説復曹伯於是晉始作三行荀林父將中行先縠將右行先蔑將左行七年晉文公秦繆公共圍鄭以其無禮於文公亡過時及城濮時鄭助楚也圍鄭欲得叔瞻叔瞻聞之自殺鄭持叔瞻尸告晉晉曰必得鄭君而甘心焉鄭恐乃使人説秦繆公曰亡鄭厚晉於晉得矣而秦未為利君何不解鄭使為東道交秦伯説罷兵晉亦罷兵九年冬晉文公卒子㐮公歡立是歳鄭伯亦卒鄭人或賣其國於秦秦繆公發兵往襲鄭十二月秦兵過我郊襄公元年春秦師過周無禮王孫滿譏之兵至滑鄭賈人弦髙將市於周遇之以十二牛勞秦師秦師驚而還滅滑而去晉先軫曰秦伯不用蹇叔反其衆心此可擊欒枝曰未報先君施於秦擊之不可先軫曰秦侮吾孤伐吾同姓何德之報遂擊之㐮公墨衰絰四月敗秦師于殽虜秦三將孟明視西乞術白乙丙以歸遂墨以葬文公文公夫人秦女為秦請三將遣之後三年秦復使孟明伐晉報殽之敗取晉汪以歸四年秦繆公大興兵伐我渡河取王官封殽尸而去晉恐不敢出遂城守五年晉伐秦取新城報王官役也六年趙衰成子欒貞子咎季子犯霍伯皆卒趙盾代趙衰執政七年八月襄公卒太子夷臯少晉人以難故欲立長君趙盾曰立㐮公弟雍好善而長先君愛之且近於秦秦故好也立善則固事長則順奉愛則孝結舊好則安賈季曰不如其弟樂辰嬴嬖於二君立其子民必安之趙盾曰辰嬴賤班在九人下其子何震之有且為二君嬖淫也為先君子不能求大而出在小國僻也母淫子僻無威陳小而逺無援將何可乎使士會如秦迎公子雍賈季亦使人召公子樂於陳趙盾廢賈季以其殺陽處父十月葬襄公十一月賈季奔翟是歲秦繆公亦卒靈公元年四月秦康公曰昔文公之入也無衛故有吕郤之患乃多與公子雍衛太子母繆嬴日夜抱太子以號泣於朝曰先君何罪其嗣亦何罪舍適而外求君將焉置此出朝則抱以適趙盾所頓首曰先君奉此子而屬之子曰此子材吾受其賜不材吾怨子今君卒言猶在耳而棄之若何趙盾與諸大夫皆患繆嬴且畏誅乃背所迎而立太子夷臯是為靈公發兵以距秦送公子雍者趙盾為將往擊秦敗之令狐先蔑隨㑹亡奔秦秋齊宋衞鄭曹許君皆會趙盾盟於扈以靈公初立故也四年伐秦取少梁秦亦取晉之殽六年秦康公伐晉取羈馬晉侯怒使趙盾趙穿郤缺擊秦大戰河曲趙穿最有功七年晉六卿患隨會之在秦常為晉亂乃佯令魏夀餘反晉降秦秦使隨會之魏因執㑹以歸晉八年周頃王崩公卿爭權故不赴晉使趙盾以車八百乘平周亂而立匡王是年楚莊王初即位十二年齊人弑其君懿公十四年靈公壯侈厚歛以雕墻從臺上彈人觀其逃丸也宰夫胹熊蹯不熟靈公怒殺宰夫使婦人持其屍出棄之過朝趙盾隨會前數諫不聴已又見死人手二人前諫隨會先諫不聽靈公患之使鉏麑刺趙盾盾閨門開居䖏節鉏麑退歎曰殺忠臣棄君命罪一也遂觸樹而死初盾嘗田首山見桑下有餓人餓人示眯明也盾與之食食其半問其故曰宧三年未知母之存不願遺母盾義之益與之飯肉已而為晉宰夫趙盾弗復知也九月晉靈公飲趙盾酒伏甲將攻盾公宰示眯明知之恐盾醉不能起而進曰君賜臣觴三行可以罷欲以去趙盾令先毋及難盾既去靈公伏士未㑹先縱齧狗名敖明為盾摶殺狗盾曰棄人用狗雖猛何為然不知明之為隂德也已而靈公縱伏士出逐趙盾示眯眀反擊靈公之伏士伏士不能進而竟脱盾盾問其故曰我桑下饑人問其名弗告明亦亡去盾遂奔未出晉境乙丑盾昆弟將軍趙穿襲弑靈公於桃園而迎趙盾趙盾素貴得民和靈公少侈民不附故為弑易盾復位晉太史董狐書曰趙盾弑其君以視於朝盾曰弑者趙穿我無罪太史曰子為正卿而亡不出境反不誅國亂非子而誰孔子聞之曰董狐古之良史也書法不隠宣子良大夫也為法受惡惜也出彊乃免趙盾使趙穿迎㐮公弟黑臀于周立之是為成公成公者文公少子其母周女也壬申朝于武宫成公元年賜趙氏為公族伐鄭鄭倍晉故也三年鄭伯初立附晉而棄楚楚怒伐鄭晉往救之六年伐秦虜秦將赤七年成公與楚莊王爭彊㑹諸侯於扈陳畏楚不㑹晉使中行桓子伐陳因救鄭與楚戰敗楚師是年成公卒子景公據立景公元年春陳大夫夏徴舒弑其君靈公二年楚莊王伐陳誅徴舒三年楚莊王圍鄭鄭告急晉晉使荀林父將中軍隨㑹將上軍趙朔將下軍郤克欒書先縠韓厥鞏朔佐之六月至河聞楚已服鄭鄭伯肉袒與盟而去荀林父欲還先縠曰凡來救鄭不至不可將率離心卒渡河楚已服鄭欲飲馬於河為名而去楚與晉軍大戰鄭新附楚畏之反助楚攻晉晉軍敗走河爭渡船中人指甚衆楚虜我將智罃歸而林父曰臣為督將軍敗當誅請死景公欲許之隨會曰昔文公之與楚戰城濮成王歸殺子玉而文公乃喜今楚已敗我師又誅其將是助楚殺仇也乃止四年先縠以首計而敗晉軍河上恐誅乃奔翟與翟謀伐晉晉覺乃族縠縠先軫子也五年伐鄭為助楚故也是時楚莊王彊以挫晉兵河上也六年楚伐宋宋來告急晉晉欲救之伯宗謀曰楚天方開之不可當乃使解揚紿為救宋鄭人執與楚楚厚賜使反其言令宋急下解揚紿許之卒致晉君言楚欲殺之或諫乃歸解揚七年晉使隨㑹滅赤狄八年使郤克於齊齊頃公母從樓上觀而笑之所以然者郤克僂而魯使蹇衛使眇故齊亦令人如之以導客郤克怒歸至河上曰不報齊者河伯視之至國請伐齊景公問知其故曰子之怨安足以煩國弗聽魏文子請老休辟郤克郤克執政九年楚莊王卒晉伐齊齊使太子彊為質於晉晉兵罷十一年春齊伐魯取隆魯告急衛衛與魯皆因郤克告急於晉晉乃使郤克欒書韓厥以兵車八百乘與魯衛共伐齊夏與頃公戰於鞌傷困頃公頃公乃與其右易位下取飲以得脱去齊師敗走晉追北至齊頃公獻寳器以求平不聽郤克曰必得蕭同叔子為質齊使曰蕭同叔子頃公母頃公母猶晉君母奈何必得之不義請復戰晉乃許與平而去楚申公巫臣盜夏姬以奔晉晉以巫臣為邢大夫十二年冬齊頃公如晉欲上尊晉景公為王景公謝不敢晉始作六卿韓厥鞏朔趙穿荀騅趙括趙㫋皆為卿智罃自楚歸十三年魯成公朝晉晉弗敬魯怒去倍晉晉伐鄭取汜十四年梁山崩問伯宗伯宗以為不足怪也十六年楚將子反怨巫臣滅其族巫臣怒遺子反書曰必令子罷於奔命乃請使吳令其子為吳行人教吳乘車用兵吳晉始通約伐楚十七年誅趙同趙括族滅之韓厥曰趙衰趙盾之功豈可忘乎奈何絶祀乃復令趙庶子武為趙後復與之邑十九年夏景公病立其太子夀曼為君是為厲公後月餘景公卒厲公元年初立欲和諸侯與秦桓公夹河而盟歸而秦倍盟與翟謀伐晉三年使吕相譲秦因與諸侯伐秦至涇敗秦師於麻隊虜其將成差五年三郤讒伯宗殺之伯宗以好直諫得禍國人以是不附厲公六年春鄭倍晉與楚盟晉怒欒書曰不可以當吾世而失諸侯乃發兵厲公自將五月渡河聞楚兵來救范文子請公欲還郤至曰發兵誅逆見彊辟之無以令諸侯遂與戰癸巳射中楚共王目楚兵敗於鄢陵子反収餘兵拊循欲復戰晉患之共王召子反其侍者豎陽穀進酒子反醉不能見王怒譲子反子反死王遂引兵歸晉由此威諸侯欲以令天下求霸厲公多外嬖姬歸欲盡去羣大夫而立諸姬兄弟寵姬兄曰胥童嘗與郤至有怨及欒書又怨郤至不用其計而遂敗楚乃使人間謝楚楚來詐厲公曰鄢陵之戰實至召楚欲作亂内子周立之㑹與國不具是以事不成厲公告欒書欒書曰其殆有矣願公試使人之周㣲考之果使郤至於周欒書又使公子周見郤至郤至不知見賣也厲公驗之信然遂怨郤至欲殺之八年厲公獵與姬飲郤至殺豖奉進宧者奪之郤至射殺宧者公怒曰季子欺予將誅三郤未發也郤錡欲攻公曰我雖死亦病矣郤至曰信不反君智不害民勇不作亂失此三者誰與我我死耳十二月壬午公令胥童以兵八百人襲攻殺三郤胥童因以劫欒書中行偃于朝曰不殺二子患必及公公曰一旦殺三卿寡人不忍益也對曰人將忍君公弗聽謝欒書等以誅郤氏罪大夫復位二子頓首曰幸甚幸甚公使胥童為卿閏月乙夘厲公㳺匠驪氏欒書中行偃以其黨襲捕厲公囚之殺胥童而使人迎公子周于周而立之是為悼公悼公元年正月庚申欒書中行偃弑厲公葬之以一乘車厲公囚六日死死十日庚午智罃迎公子周來至絳刑雞與大夫盟而立之辛巳朝於武宫二月乙酉即位悼公周者大父㨗晉㐮公少子也不得立號為桓叔桓叔最愛桓叔生惠伯談談生悼公悼公之立年十四矣悼公初立逐不臣者七人修舊功施德惠收文公入時功臣後秋伐鄭鄭師敗遂至陳三年晉會諸侯悼公問羣臣孰可用者祁傒舉解狐解狐傒之仇復問舉其子祁午君子謂祁傒可謂不黨矣外舉不隠仇内舉不隠子方會諸侯悼公弟揚于亂行魏絳戮其僕悼公怒或諫公公卒賢絳任之政使和戎戎大親附十一年悼公曰自吾用魏絳九合諸侯和戎翟魏子之力也賜之樂三譲乃受之冬秦取我櫟十四年晉使六卿率諸侯伐秦及涇大敗秦軍至棫林而去十五年悼公問治國於師曠師曠曰唯仁義為本冬悼公卒子平公彪立平公元年伐齊齊靈公與戰靡下齊師敗走晉追逐圍臨菑盡燒屠其郭中東至膠南至沂齊皆城守晉乃引兵歸六年魯㐮公朝晉晉欒逞有罪奔齊八年齊莊公㣲遣欒逞於曲沃以兵隨之齊兵上太行欒逞從曲沃中反襲入絳絳不戒平公欲自殺范獻子止公以其徒擊逞逞敗走曲沃曲沃攻逞逞死遂滅欒氏宗逞者欒書孫也其入絳與魏氏謀齊莊公聞逞敗乃還取晉之朝歌去以報臨菑之役也十年齊崔杼弑其君莊公晉因齊亂伐敗齊於髙唐去報太行之役也十四年吳延陵季子來使與趙文子韓宣子魏獻子語曰晉國之政卒歸此三家矣十九年齊使晏嬰如晉與叔嚮語叔嚮曰晉季世也公厚賦為臺池而不恤政政在多門其可久乎晏子然之二十二年伐燕二十六年平公卒子昭公夷立昭公六年卒六卿彊公室卑子頃公去疾立頃公六年周景王崩王子争立晉六卿平王室亂立敬王九年魯季氏逐其君昭公昭公居乾侯十一年衛宋使使請晉納魯君季平子私賂范獻子獻子受之乃謂晉君曰季氏無罪不果入魯君十二年晉之宗家祁傒孫叔嚮子相惡於君六卿欲弱公室乃遂以法盡滅其族而分其邑為十縣各令其子為大夫晉益弱六卿皆大十四年頃公卒子定公午立定公十一年魯陽虎奔晉趙鞅簡子舍之十二年孔子相魯十五年趙鞅使邯鄲大夫午不信欲殺午午與中行寅范吉射親攻趙鞅鞅走保晉陽定公圍晉陽荀櫟韓不信魏侈與范中行為仇乃移兵伐范中行范中行反晉君擊之敗范中行范中行走朝歌保之韓魏為趙鞅謝晉君乃赦趙鞅復位二十二年晉敗范中行氏二子奔齊三十年定公與吴王夫差會黄池爭長趙鞅時從卒長吳三十一年齊田恒弑其君簡公三十三年孔子卒三十七年定公卒子出公鑿立出公十七年智伯與趙韓魏共分范中行地以為邑出公怒告齊魯欲以伐四卿四卿恐遂反攻出公出公奔齊道死故智伯乃立昭公曾孫驕為晉君是為哀公哀公大父雍晉昭公少子也號為戴子戴子生忌忌善智伯早死故智伯欲盡并晉未敢乃立忌子驕為君當是時晉國政皆决智伯晉哀公不得有所制智伯遂有范中行地最彊哀公四年趙㐮子韓康子魏桓子共殺智伯盡并其地十八年哀公卒子幽公栁立幽公之時晉畏反朝韓趙魏之君獨有絳曲沃餘皆入三晉十五年魏文侯初立十八年幽公淫婦人夜竊出邑中盜殺幽公魏文侯以兵誅晉亂立幽公子止是為烈公烈公十九年周威烈王賜趙韓魏皆命為諸侯二十七年烈公卒子孝公頎立孝公九年魏武侯初立襲邯鄲不勝而去十七年孝公卒子靜公俱酒立是歲齊威王元年也静公二年魏武侯韓哀侯趙敬侯滅晉而三分其地靜公遷為家人晉絶不祀鄭鄭桓公友者周厲王少子而宣王庶弟也宣王立二十二年友初封於鄭封三十三歲百姓皆便愛之幽王以為司徒和集周民周民皆説河雒之間人便思之為司徒一歲幽王以襃后故王室治多邪諸侯或畔之於是桓公問周太史伯曰王室多故予安逃死乎太史伯對曰獨雒之東土河濟之南可居公曰何以對曰地近鄶虢鄶虢之君貪而好利百姓不附今公為司徒民皆愛公公誠請居之虢鄶之君見公方用事輕分公地公誠居之虢鄶之民皆公之民也公曰吾欲南之江上如何對曰昔祝融為髙辛火正其功大矣而其於周未有興者楚其後也周衰楚必繼興興非鄭之利也公曰吾欲居西方何如對曰其民貪而好利難久居公曰周衰何國興者對曰齊秦晉楚乎夫齊姜姓伯夷之後也伯夷佐堯典禮秦嬴姓伯翳之後也伯翳佐舜懐柔百物及楚之先皆嘗有功於天下而周武王克紂後成王封叔虞于唐其地阻險以此有徳與周衰並亦必興矣桓公曰善於是卒言諸王東徙其民雒東而虢鄶果獻十邑竟國之二歲犬戎殺幽王於驪山下并殺桓公鄭人共立其子掘突是為武公武公娶申女為夫人曰武姜生太子寤生生之難夫人弗愛後生少子叔叚叚生易夫人愛之二十七年武公疾夫人請立叚為太子公弗聽是歲武公卒寤生立是為莊公莊公元年封弟叚於京號太叔祭仲曰京大於國非所以封庶也莊公曰武姜欲之我弗敢奪也叚至京繕甲治兵二十二年叚果襲鄭武姜為内應莊公發兵伐叚叚走伐亰亰人畔叚叚出走鄢鄢潰叚出奔共於是莊公遷其母武姜於城潁誓言曰不至黄泉毋相見也居歲餘已悔思母潁谷之考叔有獻於公公賜食考叔曰臣有母請君食賜臣母莊公曰我甚思母惡負盟奈何考叔曰穿地至黄泉則相見矣於是遂從之見母二十四年宋繆公卒公子馮奔鄭鄭侵周地取禾二十五年衛州吁弑其君桓公自立與宋伐鄭以馮故也二十七年始朝周桓王桓王怒其取禾弗禮也二十九年莊公怒周弗禮魯易祊許田三十三年宋殺孔父三十七年莊公不朝周桓王率陳蔡虢衛伐鄭莊公與祭仲髙渠彌發兵自救王師大敗祝􅆅射中王臂祝􅆅請從之鄭伯止之曰犯長且難之况敢陵天子乎乃止夜令祭仲問王疾三十八年北戎伐齊齊使求救鄭遣太子忽將兵救齊齊釐公欲妻之忽謝曰我小國非齊敵也時祭仲與俱勸使取之曰君多内寵太子無大援將不立三公子皆君也所謂三公子者太子忽其弟突次弟子亹也四十三年鄭莊公卒初祭仲甚有寵於莊公莊公使為卿公使娶鄧女生太子忽故祭仲立之是為昭公莊公又娶宋雍氏女生厲公突雍氏有寵於宋宋莊公聞祭仲之立忽乃使人誘召祭仲而執之曰不立突將死亦執突以求賂焉祭仲與宋盟以突歸立之昭公忽聞祭仲以宋要立其弟突九月辛亥忽出奔衛己亥突至鄭立是為厲公厲公四年祭仲專政厲公患之隂使其壻雍糾殺祭仲祭仲反殺雍糾語在祭仲傳中厲公懼出居邉邑櫟祭仲迎昭公忽六月乙亥復入鄭即位秋鄭厲公突因櫟人殺其大夫單伯遂居之諸侯聞厲公出奔伐鄭弗克去宋頗與厲公兵自守於櫟鄭以故亦不伐櫟昭公二年自昭公為太子時惡髙渠彌及昭公即位渠彌懼其殺已冬十月辛夘渠彌與昭公出獵射殺昭公於野祭仲與渠彌不敢入厲公乃更立昭公弟子亹為君是為子亹也無諡號子亹元年七月齊襄公㑹諸侯於首止鄭子亹往㑹髙渠彌相從祭仲稱疾不行所以然者子亹自齊襄公為太子時嘗會鬭相仇及㑹祭仲請子亹無行子亹曰齊彊而厲公居櫟即不往是率諸侯伐我内厲公我不如往往何必遽辱且又何至是卒行於是祭仲恐齊并殺之故稱疾子亹至不謝齊侯齊侯怒遂伏甲而殺子亹髙渠彌亡歸歸與祭仲謀召子亹弟公子嬰於陳而立之是為鄭子是歲齊襄公使公子彭生醉拉殺魯桓公鄭子八年齊人管至父等作亂弑其君㐮公十二年宋人長萬弑其君湣公鄭祭仲死十四年故鄭亡厲公突在櫟者使人誘劫鄭大夫甫瑕要以求入瑕曰舍我我為君殺鄭子而入君厲公與盟乃舍之六月甲子瑕殺鄭子及其二子而迎厲公突突自櫟復入即位初内虵與外虵鬭於鄭南門中内虵死居六年厲公果復入入而譲其伯父原曰我亡國外居伯父無意入我亦甚矣原曰事君無二心人臣之職也原知罪矣遂自殺厲公於是謂甫瑕曰子之事君有二心矣遂誅之瑕曰重德不報誠然哉厲公突後元年齊桓公始霸五年燕衛與周惠王弟頽伐王王出奔温立弟頽為王六年惠王告急鄭厲公發兵擊周王子頽弗勝於是與周惠王歸王居於櫟七年春鄭厲公與虢叔襲殺王子頽而入惠王于周秋厲公卒子文公踕立厲公立四歲亡居櫟居櫟十七歲入立七歲與亡凡二十八年文公十七年齊桓公以兵破蔡遂伐楚至召陵二十四年文公之賤妾曰燕姞夢天與之蘭曰余為伯鯈余爾祖也以是為而子蘭有國香以夢告文公文公幸之而予之草蘭為符遂生子名曰蘭三十六年晉公子重耳過文公弗禮文公弟叔詹曰重耳賢又且同姓窮而過君不可無禮文公曰諸侯亡公子過者多矣安能盡禮之詹曰君如弗禮遂殺之弗殺使即反國為鄭憂矣文公弗聽三十七年春晉公子重耳反國立是為文公秋鄭入滑滑聽命已而反與衛於是鄭伐滑周㐮王使伯犕請滑鄭文公怨惠王之亡在櫟而文公之父厲公入之而不賜厲公爵祿又怨㐮王之與衛滑故不聽㐮王請而囚伯犕王怒與翟人伐鄭弗克冬翟攻伐㐮王㐮王出奔鄭鄭文公居王于汜三十八年晉文公入㐮王成周四十一年助楚擊晉自晉文公之過無禮故背晉助楚四十三年晉文公與秦繆公共圍鄭討其助楚攻晉者及文公之過無禮也初鄭文公有三夫人寵子五人皆以罪蚤死公怒溉逐羣公子子蘭奔晉從晉文公圍鄭時蘭事晉文公甚謹愛幸之乃私於晉以求入鄭為太子晉於是欲得叔詹為僇鄭文公恐不敢謂叔詹言詹聞言於鄭君曰臣謂君君不聽臣晉卒為患然晉所以圍鄭以詹詹死而赦鄭國詹之願也乃自殺鄭人以詹尸與晉晉文公曰必欲一見鄭君辱之而去鄭人患之乃使人私於秦曰破鄭益晉非秦之利也秦兵罷晉文公欲入蘭為太子以告鄭鄭大夫石癸曰吾聞姞姓乃后稷之元妃其後當有興者子蘭母其後也且夫人子盡已死餘庶子無如蘭賢今圍急晉以為請利孰大焉遂許晉與盟而立蘭為太子晉兵乃罷去四十五年文公卒子蘭立是為繆公繆公元年春秦繆公使三將將兵欲襲鄭至滑逢鄭賈人弦髙詐以十二牛勞軍故秦兵不至而還晉敗之於殽初往年鄭文公之卒也鄭司城繒賀以鄭情賣之秦兵故來三年鄭發兵從晉伐秦敗秦兵於汪往年楚太子商臣弑其父成王代立二十一年與宋華元伐鄭華元殺羊食士不與其御羊斟怒以馳鄭鄭囚華元宋贖華元元亦亡去晉使趙穿以兵伐鄭二十二年鄭繆公卒子夷立是為靈公靈公元年春楚獻黿於靈公子家子公將朝靈公子公之食指動謂子家曰他日指動必食異物及入見靈公進黿􅃵子公笑曰果然靈公問其笑故具告靈公靈公召之獨弗予􅃵子公怒染其指嘗之而出公怒欲殺子公子公與子家謀先夏弑靈公鄭人欲立靈公弟去疾去疾譲曰必以賢則去疾不肖必以順則公子堅長堅者靈公庻弟去疾之兄也於是乃立子堅是為襄公襄公立將盡去繆氏繆氏者殺靈公子公之族家也去疾曰必去繆氏我將去之乃止皆以為大夫襄公元年楚怒鄭受宋賂縱華元伐鄭鄭背楚與晉親五年楚復伐鄭晉來救之六年子家卒國人復逐其族以其弑靈公也七年鄭與晉盟鄢陵八年楚莊王以鄭與晉盟來伐圍鄭三月鄭以城降楚楚王入自皇門鄭襄公肉袒牽羊以迎曰孤不能事邉邑使君王懷怒以及弊邑孤之罪也敢不唯命是聽君王遷之江南及以賜諸侯亦唯命是聽若君王不忘厲宣王桓武公哀不忍絶其社稷錫不毛之地使復得改事君王孤之願也然非所敢望也敢布腹心唯命是聽莊王為却三十里而後舍楚羣臣曰自郢至此士夫亦久勞矣今得國舍之何如莊王曰所為伐伐不服也今已服尚何求乎卒去晉聞楚之伐鄭發兵救鄭其來持兩端故遲比至河楚兵已去晉將率或欲渡河或欲還卒渡河莊王聞還擊晉鄭反助楚大破晉軍於河上十年晉來伐鄭以其反晉而親楚也十一年楚莊王伐宋宋告急於晉晉景公使勇士解揚告宋令無降楚過鄭鄭與楚親執解揚獻之楚楚王厚賜解揚與約使反其言解揚許之登諸樓車解揚大呼宋人致晉君命楚王怒將殺解揚既而赦之語具解揚傳中十八年㐮公卒子悼公㵒立悼公元年鄦公惡鄭於楚悼公使弟睔於楚自訟訟不直楚囚睔於是鄭悼公來與晉平遂親睔私於楚子反子反言歸睔於鄭二年楚伐鄭晉兵來救是歲悼公卒立其弟睔是為成公成公三年楚共王曰鄭成公孤有德焉使人來與盟成公私與盟秋成公朝晉晉曰鄭私平於楚執之使欒書伐鄭四年春鄭患晉圍公子如乃立成公庶兄繻為君其四月晉聞鄭立君乃歸成公鄭人聞成公歸亦殺君繻迎成公晉兵去十年背晉盟盟於楚晉厲公怒發兵伐鄭楚共王救鄭晉楚戰鄢陵楚兵敗晉射傷共王目俱罷而去十三年晉悼公伐鄭兵於洧上鄭城守晉亦去十四年成公卒子惲立是為釐公釐公五年鄭相子駟朝釐公釐公不禮子駟怒使厨人藥殺釐公赴諸侯曰釐公暴病卒立釐公子嘉嘉時年五歲是為簡公簡公元年諸公子謀欲誅相子駟子駟覺之反盡誅諸公子二年晉伐鄭鄭與盟晉去冬又與楚盟子駟畏誅故兩親晉楚三年相子駟欲自立為君公子孔使尉止殺子駟而代之子孔又欲自立子産曰子駟為不可誅之今又效之是亂無時息也於是子孔從之而相鄭鄭簡公四年晉怒鄭與楚盟伐鄭鄭與盟楚共王救鄭敗晉兵簡公欲與晉平楚又囚鄭使者十二年簡公怒相子孔專國權誅之而以子産為卿十九年簡公如晉請衛君還而封子産以六邑子産譲受其半二十二年吳使延陵季子於鄭見子産如舊交謂子産曰鄭之執政者侈難將至政將及子子為政必以禮不然鄭將敗子産厚遇季子二十三年諸公子争寵相殺又欲殺子産公子或諫曰子産仁人鄭所以存者子産也勿殺乃止二十五年鄭使子産於晉問平公疾平公曰卜而曰實沈臺駘為祟史官莫知敢問對曰高辛氏有二子季曰實沈主參參為晉星則實沈參神也金天氏有裔孫曰臺駘主宣汾洮則臺駘汾洮神也然此二者山川之神水旱是司不害君身若君疾抑飲食哀樂女色之所由致也平公及叔嚮曰博物君子也厚為之禮語具子産傳中二十七年夏鄭簡公朝晉冬畏楚靈王之彊又朝楚子産從二十八年鄭君病使子産㑹諸侯與楚靈王盟於申誅齊慶封三十六年簡公卒子定公寧立秋定公朝晉昭公定公元年楚公子棄疾弑其君靈王而自立為平王欲行德諸侯歸靈王所侵鄭地于鄭四年晉昭公卒其六卿彊公室卑子産謂韓宣子曰為政必以徳毋忘所以立六年鄭火公欲禳之子産曰不如脩德八年楚太子建來奔十年太子建與晉謀襲鄭鄭殺建建子勝奔吳十一年定公如晉晉與鄭謀誅周亂臣入敬王于周十六年定公卒子獻公蠆立獻公十三年卒子聲公勝立當是時晉六卿彊侵奪鄭鄭遂弱聲公五年鄭相子産卒鄭人皆哭泣悲之如亡親戚子産者鄭成公少子也為人仁愛人事君忠厚孔子嘗過鄭與子産如兄弟云及聞子産死孔子為泣曰古之遺愛也兄事子産八年晉范中行氏反晉告急於鄭鄭救之晉伐鄭敗鄭軍於鐡十四年宋景公滅曹二十年齊田恒弑其君簡公而恒相於齊二十二年楚惠王滅陳孔子卒二十六年晉智伯伐鄭取九邑三十七年聲公卒子哀公易立哀公八年鄭人弑哀公而立聲公弟丑是為共公共公三年晉滅智伯三十年共公卒子幽公已立幽公元年韓武子伐鄭殺幽公鄭人立幽公弟駘是為繻公繻公十五年韓景侯伐鄭取雍邱鄭城亰十六年鄭伐韓敗韓兵於負黍二十年韓趙魏列為諸侯二十三年鄭圍韓之陽翟二十五年鄭君殺其相子陽二十七年子陽之黨共弑繻公駘而立幽公弟乙為君是為鄭君鄭君乙立二年鄭負黍反復歸韓十一年韓伐鄭取陽城二十一年韓哀侯滅鄭并其國魏魏之先畢公髙之後也畢公髙與周同姓武王之伐紂而高封於畢於是為畢姓其後絶封為庻人或在中國或在夷狄其苖裔曰畢萬事晉獻公獻公之十六年趙夙為御畢萬為右以伐霍耿魏滅之以耿封趙夙以魏封畢萬為大夫卜偃曰畢萬之後必大矣萬盈數也魏大名也以是始賞天啓之矣天子曰兆民諸侯曰萬民今命之大以從盈數其必有衆初畢萬􅁲事晉遇屯之比辛廖占之曰吉屯固比入吉孰大焉其必蕃昌畢萬封十一年晉獻公卒四子爭更立晉亂而畢萬之世彌大從其國名為魏氏生武子魏武子以魏諸子事晉公子重耳晉獻公之二十一年武子從重耳出亡十九年反重耳立為晉文公而令魏武子襲魏氏之後封列為大夫治於魏生悼子魏悼子徙治霍生魏絳魏絳事晉悼公悼公三年㑹諸侯悼公弟揚千亂行魏綘僇辱揚干悼公怒曰合諸侯以為榮今辱吾弟將誅魏絳或説悼公悼公止卒任魏綘政使和戎翟戎翟親附悼公之十一年曰自吾用魏綘八年之中九合諸侯戎翟和子之力也賜之樂三譲然後受之徙治安邑魏綘卒諡為昭子生魏嬴嬴生魏獻子獻子事晉昭公昭公卒而六卿彊公室卑晉頃公之十二年韓宣子老魏獻子為國政晉宗室祁氏羊舌氏相惡六卿誅之盡取其邑為十縣六卿各令其子為之大夫獻子與趙簡子中行文子范獻子並為晉卿其後十四歲而孔子相魯後四歲趙簡子以晉陽之亂也而與韓魏共攻范中行氏魏獻子生魏侈魏侈與趙鞅共攻范中行氏魏侈之孫曰魏桓子與韓康子趙襄子共伐滅智伯分其地桓子之孫曰文侯都魏文侯元年秦靈公之元年也與韓武子趙桓子周威王同時六年城少梁十三年使子擊圍繁龎出其民十六年伐秦築臨晉元里十七年伐中山使子擊守之趙倉唐傳之子擊逢文侯之師田子方於朝歌引車避下謁田子方不為禮子擊因問曰富貴者驕人乎且貧賤者驕人乎子方曰亦貧賤者驕人耳夫諸侯而驕人則失其國大夫而驕人則失其家貧賤者行不合言不用則去之楚越若脫躧然奈何其同之哉子擊不懌而去西攻秦至鄭而還築雒隂合陽二十二年魏趙韓列為諸侯二十四年秦伐我至陽狐二十五年子擊生子罃文侯受子夏經藝客段干木過其閭未嘗不軾也秦嘗欲伐魏或曰魏君賢人是禮國人稱仁上下和合未可圖也文侯由此得譽於諸侯任西門豹守鄴而河内稱治魏文侯謂李克曰先生嘗教寡人曰家貧則思良妻國亂則思良相今所置非成則璜二子何如李克對曰臣聞卑不謀尊疎不謀戚臣在闕門之外不敢當命文侯曰先生臨事勿譲李克曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舍寡人之相定矣李克趨而出過翟璜之家翟璜曰今者聞君召先生而􅁲相果誰為之克曰魏成子為相矣翟璜忿然作色曰以耳目之所覩記臣何負於魏成子西河之守臣之所進也君内以鄴為憂臣進西門豹君謀伐中山臣進樂羊中山已抜無使守之臣進先生君之子無傳臣進屈侯鮒臣何以負於魏成子李克曰且子之言克於子之君者豈將比周以求大官哉君問而置相非成則璜二子何如克對曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉是以知魏成子之為相也且子安得與魏成子比乎魏成子以食祿千鍾什九在外什一在内是以東得卜子夏田子方段干木此三人者君皆師之子之所進五人者君皆臣之子惡得與魏成子比也翟璜逡廵再拜曰璜鄙人也失對願卒為弟子二十六年號山崩壅河三十二年伐鄭城酸棗敗秦於注三十五年齊伐我取襄陵三十六年秦侵我陰晉三十八年伐秦敗我武下得其將識是歲文侯卒子擊立是為武侯武侯元年趙敬侯初立公子朔為亂不勝奔魏與魏襲邯鄲魏敗而去二年城安邑王垣七年伐齊至桑邱九年翟敗我于澮使吳起伐齊至靈邱齊威王初立十一年與韓趙三分晉地滅其後十三年秦獻公縣櫟陽十五年敗趙北藺十六年伐楚取魯陽武侯卒子罃立是為惠王惠王元年初武侯卒也子罃與公中緩爭為太子公孫頎自宋入趙自趙入韓謂韓懿侯曰魏罃與公中緩争為太子君亦聞之乎今魏罃得王錯挾上黨固半國也因而除之破魏必矣不可失也懿侯説乃與趙成侯合軍并兵以伐魏戰於濁澤魏氏大敗魏君圍趙謂韓曰除魏君立公中緩割地而退我且利韓曰不可殺魏君人必曰暴割地而退人必曰貪不如兩分之魏分為兩不彊於宋衛則我終無魏之患矣趙不聽韓不説以其少卒夜去惠王之所以身不死國不分者二家謀不和也若從一家之謀則魏必分矣故曰君終無適子其國可破也二年魏敗韓于馬陵敗趙于懷三年齊敗我觀五年與韓會宅陽城武堵為秦所敗六年伐取宋儀臺九年伐敗韓於澮與秦戰少梁虜我將公孫座取龎秦獻公卒子孝公立十年伐取趙皮牢彗星見十二年星書墜有聲十四年與趙會鄗十五年魯衛宋鄭君來朝十六年與秦孝公㑹社平侵宋黄池宋復取之十七年與秦戰元里秦取我少梁圍趙邯鄲十八年㧞邯鄲趙請救於齊齊使田忌孫臏救趙敗魏桂陵十九年諸侯圍我㐮陵築長城塞固陽二十年歸趙邯鄲與盟漳水上二十一年與秦會彤趙成侯卒二十八年齊威王卒中山君相魏三十年魏伐趙趙告急齊齊宣王用孫子計救趙擊魏魏遂大興師使龎涓將而令太子申為上將軍過外黄外黄徐子謂太子曰臣有百戰百勝之術太子曰可得聞乎客曰固願効之曰太子自將攻齊大勝并莒則富不過有魏貴不益為王若戰不勝齊則萬世無魏矣此臣之百戰百勝之術也太子曰諾請必從公之言而還矣客曰太子雖欲還不得矣彼勸太子戰攻欲啜汁者衆太子雖欲還恐不得矣太子因欲還其御曰將出而還與北同太子果與齊人戰敗於馬陵齊虜魏太子申殺將軍涓軍遂大破三十一年秦趙齊共伐我秦將商君詐我將軍公子卬而襲奪其軍破之秦用商君東地至河而齊趙數破我安邑近秦於是徙治大梁以公子赫為太子三十三年秦孝公卒商君亡秦歸魏魏怒不入三十五年與齊宣王㑹平阿南惠王數被於軍旅卑禮厚幣以招賢者於是鄒衍淳于髠孟軻皆至梁惠王曰寡人不佞兵三折於外太子虜上將死國以空虛以羞先君宗廟社稷寡人甚醜之叟不逺千里辱幸至弊邑之廷將何以利吾國孟軻曰君不可以言利若是夫君欲利則大夫欲利大夫欲利則庻人欲利上下争利國則危矣為人君仁義而已矣何以利為三十六年復與齊王㑹甄是歲惠王卒子襄王立㐮王元年與諸侯㑹徐州相王也追尊父惠王為王五年秦敗我龍賈軍四萬五千于雕陰圍我焦曲沃予秦河西之地六年與秦會應秦取我汾陰皮氏焦魏伐楚敗之陘山七年魏盡入上郡于秦秦䧏我蒲陽八年秦歸我焦曲沃十二年楚敗我㐮陵諸侯執政與秦相張儀㑹齧桑十三年張儀相魏魏有女子化為丈夫秦取我曲沃平周十六年襄王卒子哀王立張儀復歸秦哀王元年五國共攻秦不勝而去二年齊敗我觀津五年秦使樗里子伐取我曲沃走犀首岸門六年秦求立公子政為太子與秦會臨晉七年攻齊與秦伐燕八年伐衛抜列城二衛君患之如耳見衛君曰請罷魏兵免成陵君可乎衛君曰先生果能孤請世世以衛事先生如耳見成陵君曰昔者魏伐趙斷羊腸㧞閼與約斬趙趙分而為二所以不亡者魏為從主也今衛已廹亡將西請事於秦與其以秦醳衛不如以魏醳衛衛之德魏終必無窮成陵君曰諾如耳見魏王曰臣有謁於衛衛故周室之别也其稱小國多寳器今國廹於難而寳器不出者其心以為攻衛醳衛不以王為主故寳器雖出必不入於王也臣竊料之先言醳衛者必受衛者也如耳出成陵君入以其言見魏王魏王聽其説免成陵君終身不見九年與秦王㑹臨晉張儀魏章皆歸於魏魏相田需死楚害張儀犀首薛公楚相昭魚謂蘇代曰田需死吾恐張儀犀首薛公有一人相魏者也代曰然相者欲誰而君便之昭魚曰吾欲太子之自相也代曰請為君北必相之昭魚曰奈何對曰君其為梁王代請説君昭魚曰奈何對曰代也從楚來昭魚甚憂曰田需死吾恐張儀犀首薛公有一人相魏者也代曰梁王長主也必不相張儀張儀相必右秦而左魏犀首相必右韓而左魏薛公相必右齊而左魏梁王長主也必不便也王曰然則寡人孰相代曰莫若太子之自相太子之自相是三人者皆以為太子為非常相也皆將務以其國事魏欲得丞相璽也以魏之彊而王萬乘之國輔之魏必安矣故曰莫若太子之自相也遂北見梁王以此告之太子果相魏十年張儀死十一年與秦武王㑹應十二年太子朝於秦秦來伐我皮氏未㧞而解十四年秦來歸武王后十六年秦拔我蒲坂陽晉封陵十七年與秦㑹臨晉秦予我蒲坂十八年與秦伐楚二十一年與齊韓共敗秦軍函谷二十三年秦復予我河外及封陵為和哀王卒子昭王立昭王元年秦㧞我㐮城二年與秦戰我不利三年佐韓攻秦秦將白起敗我軍伊闕二十四萬六年予秦河東地方四百里芒卯以詐重七年秦㧞我城大小六十一八年秦昭王為西帝齊湣王為東帝月餘皆復稱王歸帝九年秦拔我新垣曲陽之城十年齊滅宋宋王死我温十二年與秦趙韓燕共伐齊敗之濟西湣王出亡燕獨入臨菑與秦王㑹西周十三年秦㧞我安城兵到大梁去十八年秦㧞郢楚王徙陳十九年昭王卒子安釐王立安釐王元年秦㧞我兩城二年又抜我二城軍大梁下韓來救予秦温以和三年秦拔我四城斬首四萬四年秦破我及韓趙殺十五萬人走我將芒卯魏將叚干子請予秦南陽以和蘇代謂魏王曰欲璽者段于子也欲地者秦也今王使欲地者制璽使欲璽者制地魏氏地不盡則不知已且夫以地事秦譬猶抱薪救火薪不盡火不滅王曰是則然也雖然事始已行不可更矣對曰王獨不見夫博之所以貴梟者便則食不便則止矣今王曰事始已行不可更是何王之用智不如用梟也九年秦拔我懐十年秦太子外質於魏死十一年秦拔我郪邱秦昭王謂左右曰今時韓魏與始孰彊對曰不如始彊王曰今時如耳耳魏將魏齊與孟嘗芒卯孰賢對曰不如王曰以孟嘗芒卯之賢率彊韓魏以攻秦猶無奈寡人何也今以無能之如耳魏齊而率弱韓魏以伐秦其無奈寡人何亦明矣左右皆曰甚然中旗馮琴對曰王之料天下過矣當晉六卿之時知氏最彊滅范中行又率韓魏之兵以圍趙襄子於晉陽決晉水以灌晉陽之城不湛者三版知伯行水魏桓子御韓康子為驂乘知伯曰吾始不知水之可以亡人之國也乃今知之汾水可以灌安邑綘水可以灌平陽魏桓子肘韓康子韓康子履魏桓子肘足接於車上而知氏地分身死國亡為天下笑今秦雖彊不能過知氏韓魏雖弱尚賢其在晉陽之下也此方其用肘足之時也願王之必勿易也於是秦王恐齊楚相約而攻魏魏使人求救於秦冠蓋相望也而秦救不至魏人有唐雎者年九十餘矣謂魏王曰老臣請西説秦王令兵先臣出魏王再拜遂約車而遣之唐雎到入見秦王秦王曰丈人芒然乃逺至此甚苦矣夫魏之來求救數矣寡人知魏之急已唐雎對曰大王已知魏之急而救不發者臣竊以為用䇿之臣無任矣夫魏一萬乘之國也然所以西靣而事秦稱東藩受冠帯祠春秋者以秦之彊足以為與也今楚齊之兵已合於魏郊矣而秦救不發亦將頼其未急也使之大急彼且割地而約從王尚奚救焉必待其急而救之是失一東藩之魏而彊二敵之齊楚則王何利焉於是秦昭王遽為發兵救魏魏復定趙使人謂魏王曰為我殺范痤吾請獻七十里之地魏王曰諾使吏捕之圍而未殺痤因上屋騎危危楝上也謂使者曰與其以死痤市不如以生痤市有如痤死趙不與王地則王將奈何故不若與先定割地然後殺痤魏王曰善痤因上書信陵君曰痤故魏之免相也趙以地殺座而魏王聽之有如彊秦亦將襲趙之欲則君且奈何信陵君言於王而出之魏王以秦救之故欲親秦而伐韓以求故地無忌謂魏王曰秦與戎翟同俗有虎狼之心貪戾好利無信不識禮義德行苟有利焉不顧親戚兄弟若禽獸耳此天下之所識也非有所施厚積德也故太后母也而以憂死穣侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此於親戚若此而况於仇讐之國乎今王與秦共伐韓而益近秦患臣甚惑之而王不識則不明羣臣莫以聞則不忠今韓氏以一女子奉一弱主内有大亂外交彊秦魏之兵王以為不亡乎韓亡秦有鄭地與大梁鄰王以為安乎王欲得故地今負彊秦之親王以為利乎秦非無事之國也韓亡之後必將更事更事必就易與利就易與利必不伐楚與趙矣是何也夫越山踰河絶韓上黨而攻彊趙是復閼與之事秦必不為也若道河内倍鄴朝歌絕漳􅇭水與趙兵決於邯鄲之郊是知伯之禍也秦又不敢伐楚道渉山谷行三千里而攻㝠阨之塞所行甚逺所攻甚難秦又不為也若道河外倍大梁右蔡左召陵與楚兵決於陳郊秦又不敢故曰秦必不伐楚與趙矣又不攻衛與齊矣夫韓亡之後兵出之日非魏無攻已秦固有懐茅邢邱城垝津以臨河内河内共汲必危有鄭地得垣雍決滎澤水灌大梁大梁必亡王之使者出過而惡安陵氏於秦秦之欲誅之久矣秦葉陽昆陽與舞陽鄰聽使者之惡之隨安陵氏而亡之繞舞陽之北以東臨許南國必危國無害己夫憎韓不愛安陵氏可也夫不患秦之不愛南國非也異日者秦在河西晉國去梁千里有河山以闌之有周韓以間之從林郷軍以至於今秦七攻魏五入囿中邉城盡拔文臺墮垂都焚林木伐麋鹿盡而國繼以圍又長驅梁北東至陶衛之郊北至平監所亡於秦者山南山北河外河内大縣數十名都數百秦乃在河西晉去梁千里而禍若是矣又况於秦無韓有鄭地無河山而闌之無周韓而間之去大梁百里禍必由此矣異日者從之不成也楚魏疑而韓不可得也今韓受兵三年秦撓之以講識亡不聽投質於趙請為天下鴈行頓刃楚趙必集兵皆識秦之欲無窮也非盡亡天下之國而臣海内必不休矣是故臣願以從事王王速受楚趙之約趙挾韓之質以存韓而求故地韓必効之此士民不勞而故地得其功多於與秦共伐韓而又與彊秦鄰之禍也夫存韓安魏而利天下此亦王之天時已通韓上黨於共寗使道安成出入賦之是韓重質韓以其上黨也今有其賦足以富國韓必德魏愛魏重魏畏魏韓必不敢反魏是韓則魏之縣也魏得韓以為縣衞大梁河外必安矣今不存韓二周安陵必危楚趙大破衞齊甚畏天下西鄉而馳秦入韓而為臣不久矣二十年秦圍邯鄲信陵君無忌矯奪將軍晉鄙兵以救趙趙得全無忌因留趙二十六年秦昭王卒三十年無忌歸魏率五國兵攻秦敗之河外走蒙驁魏太子增質於秦秦怒欲囚魏太子增或為增謂秦王曰公孫喜固謂魏相曰請以魏疾擊秦秦王怒必囚增魏王又怒擊秦秦必傷今王囚增是喜之計中也故不若貴增而合魏以疑之於齊韓秦乃止增三十一年秦王政初立三十四年安釐王卒太子增立是為景湣王信陵君無忌卒景湣王元年秦㧞我二十城以為秦東郡二年㧞我朝歌衞徙野王三年秦抜我汲五年秦拔我垣蒲陽衍十五年景湣王卒子王假立王假元年燕太子丹使荆軻刺秦王秦王覺之二年秦灌大梁虜王假遂滅魏以為郡縣韓韓之先與周同姓姓姬氏其後苖裔事晉得封於韓原曰韓武子武子後三世有韓厥從封姓為韓氏韓厥晉景公之三年晉司㓂屠岸賈將作亂誅靈公之賊趙盾趙盾已死矣欲誅其子趙朔韓厥止賈賈不聽厥告趙朔令亡朔曰子必能不絕趙祀死不恨矣韓厥許之及賈誅趙氏厥稱疾不出程嬰公孫杵臼之藏趙孤趙武也厥知之景公十一年厥與郤克將兵八百乘伐齊敗頃公于鞍獲逢丑父於是晉作六卿而韓厥在一卿之位號為獻子晉景公十七年病卜大業之不遂者為祟韓厥稱趙成季之功今後無祀以感景公景公問曰尚有世乎厥於是言趙武而復與故趙氏田邑續趙氏祀晉悼公之十年韓獻子老獻子卒子宣子代宣子徙居州晉平公十四年吳季札使晉曰晉國之政卒歸于韓魏趙矣晉頃公十二年韓宣子與趙魏共分祁氏羊舌氏十縣晉定公十五年宣子與趙簡子侵伐范中行氏宣子卒子貞子代立貞子徙居平陽貞子卒子簡子代簡子卒子莊子代莊子卒子康子代康子與趙襄子魏桓子共敗知伯分其地地益大大於諸侯康子卒子武子代武子二年伐鄭殺其君幽公十六年武子卒子景侯立景侯䖍元年伐鄭取雍邱二年鄭敗我負黍六年與趙魏俱得列為諸侯九年鄭圍我陽翟景侯卒子烈侯立烈侯三年聶政殺韓相俠累九年秦伐我宜陽取六邑十三年烈侯卒子文侯立是歲魏文侯卒文侯二年伐鄭取陽城伐宋到彭城執宋君七年伐齊至桑邱鄭反晉九年伐齊至靈邱十年文侯卒子哀侯立哀侯元年與趙魏分晉國二年滅鄭因徙都鄭六年韓嚴弑其君哀侯而子懿侯立懿侯二年魏敗我馬陵五年與魏惠王㑹宅陽九年魏敗我澮十二年懿侯卒子昭侯立昭侯元年秦敗我西山二年宋取我黄池魏取朱六年伐東周取陵觀邢邱八年申不害相韓修術行道國内以治諸侯不來侵伐十年韓姬弑其君悼公十一年昭侯如秦二十二年申不害死二十四年秦來㧞我宜陽二十五年旱作高門屈宜臼曰昭侯不出此門何也不時吾所謂時者非時日也人固有利不利時昭侯嘗利矣不作高門徃年秦㧞宜陽今年旱昭侯不以此時䘏民之急而顧益奢此謂時絀舉嬴二十六年髙門成昭侯卒果不出此門子宣惠王立宣惠王五年張儀相秦八年魏敗我韓舉十一年君號為王與趙㑹區鼠十四年秦伐敗我鄢十六年秦敗我修魚虜得韓將䱸申差於濁澤韓氏急公仲謂韓王曰與國非可恃也今秦之欲伐楚久矣王不如因張儀為和於秦賂以一名都具甲與之南伐楚此以一易二之計也韓王曰善乃警公仲之行將西購於秦楚王聞之大恐召陳軫告之陳軫曰秦之欲伐楚久矣今又得韓之名都一而具甲秦韓并兵而伐楚此秦所禱祀而求也今已得之矣楚國必伐矣王聽臣為之警四境之内起師言救韓命戰車滿道路發信臣多其車重其幣使信王之救己也縱韓不能聽我韓必德王也必不為鴈行以來是秦韓不和也兵雖至楚不大病也為能聽我絶和於秦秦必大怒以厚怨韓之南交楚必輕秦輕秦其應秦必不敬是因秦韓之兵而免楚國之患也楚王曰善乃警四境之内興師言救韓命戰車滿道路發信臣多其車重其幣謂韓王曰不穀國雖小已悉發之矣願大國遂肆志於秦不穀將以楚徇韓韓王聞之大説乃止公仲之行公仲曰不可夫以實伐我者秦也以虛名救我者楚也王恃楚之虛名而輕絶彊秦之敵王必為天下笑且楚韓非兄弟之國也又非素約而謀伐秦也已有伐形因發兵言救韓此必陳軫之謀也且王已使人報於秦矣今不行是欺秦也夫輕欺彊秦而信楚之謀臣恐王必悔之韓王不聽遂絶於秦秦因大怒益甲伐韓大戰楚救不至韓十九年大破我岸門太子倉質於秦以和二十一年與秦共攻楚敗楚將屈丐斬首八萬於丹陽是歲宣惠王卒太子倉立是為㐮王㐮王四年與秦武王㑹臨晉其秋秦使甘茂攻我宜陽五年秦㧞我宜陽斬首六萬秦武王卒六年秦復與我武遂九年秦復取我武遂十年太子嬰朝秦而歸十一年秦伐我取穣與秦伐楚敗楚將唐昧十二年太子嬰死公子咎公子蟣虱爭為太子時蟣虱質於楚蘇代謂韓咎曰蟣虱亡在楚楚王欲内之甚今楚兵十餘萬在方城之外公何不令楚王築萬室之都雍氏之旁韓必起兵以救之公必將矣公因以韓楚之兵奉蟣虱而内之其聽公必矣必以楚韓封公也韓咎從其計楚圍雍氏韓求救於秦秦未為發使公孫昧入韓公仲曰子以秦為且救韓乎對曰秦王之言曰請道南鄭藍田出兵於楚以待公殆不合矣公仲曰子以為果乎對曰秦王必祖張儀之故智楚威王攻梁也張儀謂秦王曰與楚攻魏魏折而入於楚韓固其與國也是秦孤也不如出兵以到之魏楚大戰秦取西河之外以歸今其狀陽言與韓其實陰善楚公待秦而到必輕與楚戰楚陰得秦之不用也必易與公相支也公戰而勝楚遂與公乘楚弛三川而歸公戰不勝楚楚塞三川守之公不能救也竊為公患之司馬庚三反於郢甘茂與昭魚遇於商於其言收璽實類有約也公仲恐曰然則奈何曰公必先韓而後秦先身而後張儀公不如亟以國合於齊楚齊楚必委國於公公之所惡者張儀也其實猶不無秦也於是楚解雍氏圍蘇代又謂秦太后弟芈戎曰公叔伯嬰恐秦楚之内蟣虱也公何不為韓求質於楚楚王聽入質子於韓則公叔伯嬰知秦楚之不以蟣虱為事必以韓合於秦楚秦楚挾韓以窘魏魏氏不敢合於齊是齊孤也公又為秦求質子於楚楚不聽怨結於韓韓挾齊魏以圍楚楚必重公公挾秦楚之重以積德於韓公叔伯嬰必以國待公於是蟣虱竟不得歸韓韓立咎為太子齊魏王來十四年與齊魏王共擊秦至函谷而軍焉十六年秦與我河外及武遂襄王卒太子咎立是為釐王釐王三年使公孫喜率周魏攻秦秦敗我二十四萬虜喜伊闕五年秦抜我宛六年與秦武遂地二百里十年秦敗我師于夏山十二年與秦昭王會西周而佐秦攻齊齊敗湣王出亡十四年與秦會兩周間二十一年使暴䳒救魏為秦所敗䳒走開封二十三年趙魏攻我華陽韓告急於秦秦不救韓相國謂陳筮曰事急願公雖病為一宿之行陳筮見穣侯穣侯曰事急乎故使公來陳筮曰未急也穣侯怒曰是可以為公之主使乎夫冠蓋相望告敝邑甚急公來言未急何也陳筮曰彼韓急則變而他從以未急故復來耳穣侯曰公無見王請今發兵救韓八日而至敗趙魏於華陽之下是歲釐王卒子桓惠王立桓惠王元年伐燕九年秦㧞我陘城汾旁十年秦撃我於太行我上黨郡守以上黨郡降趙十四年秦㧞趙上黨殺馬服子卒四十餘萬於長平十七年秦㧞我陽城負黍二十三年秦昭王卒二十四年秦㧞我城臯滎陽二十六年秦悉㧞我上黨二十九年秦㧞我十三城三十四年桓惠王卒子王安立王安五年秦攻韓韓急使韓非使秦秦留非因殺之九年秦虜王安盡入其地為潁川郡韓遂亡通志卷七十七下
