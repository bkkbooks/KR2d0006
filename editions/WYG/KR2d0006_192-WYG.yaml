body:
  text: 通志卷一百六十八宋右迪功郎鄭樵漁仲撰獨行傳第一後漢譙元費貽瑛元子李業王皓任永王嘉馮信劉茂嚴授徐咸衛福所輔温序彭修索盧放周嘉髙祖父燕從弟暢范式張劭陳平子孔嵩李善王忳張武陸續戴封李充繆肜陳重雷義范冉戴就趙苞向栩諒輔劉翊王烈魏魏不立此傳今取田疇邴原管寧三人為編田疇邴原管寧後漢譙元字君黄巴郡閬中人也少好學能說易春秋仕扵州郡成帝永始二年有日食之災乃詔舉敦樸遜譲有行義者各一人州舉元詣公車對䇿髙第拜議郎帝始作期門數為微行立趙飛燕為皇后后専寵懐忌皇太子多横夭折元上書諌曰臣聞王者承天繼宗統極保業延祚莫急允嗣故易有幹蠱之義詩詠衆多之福今陛下聖嗣未立天下属望而不惟社稷之計専念微行之事愛􅄑用扵所惑曲意留扵非正竊聞後宮皇子産而不育臣聞之怛然痛心傷剥竊懐憂國不忘須臾夫警衛不修則患生非常忽有酔酒狂夫分争道路既無尊嚴之儀豈識上下之别此為胡狄起扵轂下而賊亂發扵左右也願陛下念天下之至重愛金玉之身均九女之施存無窮之福天下幸甚時數有災異元輒陳其變既不省納故久稽郎官後遷太常丞以弟服去職平帝元始元年日食又詔公卿舉敦樸直言大鴻臚左咸舉元詣公車對䇿復拜議郎遷中散大夫四年選眀達政事能班化風俗者八人時並舉元為繡衣使者持節與太僕任惲等分行天下觀覧風俗所至専行誅賞事未及終而王莽居攝元扵是縦使者車變易姓名間竄歸家因以隠遁後公孫述僭號扵蜀連聘不詣述乃遣使者備禮徴之若元不肯起便賜以毒藥太守乃自齎璽書至元廬曰君髙節已著朝廷垂意誠不宜復辭自招凶禍元仰天歎曰唐堯大聖許由恥仕周武至徳伯夷守餓彼獨何人我亦何人保志全髙死亦何恨遂受毒藥元子瑛泣血叩頭扵太守曰今國家東有嚴敵兵師四至國用軍資㦯不常足願奉家錢千萬以贖父死太守為請述聴許之元遂隠蔵田野終述之世時兵戈累年莫能修尚學業元獨訓諸子勤習經書建武十一年卒眀年天下平定元弟慶以状詣闕自陳光武美之䇿詔夲郡祠以中牢勅所在還元家錢時亦有犍為費貽亦不肯仕述漆身為厲陽狂以避之退蔵山藪十餘年述破後仕至合浦太守瑛善說易以授顯宗為北宮衛士令李業字巨㳺廣漢梓潼人也少有志操介特習魯詩師博士許晃元始中舉眀經除為郎會王莽居攝業以病去官杜門不應州郡之命太守劉咸彊召之業乃載病詣門咸怒出教曰賢者不避害譬猶彀弩射市薄命者先死聞業名稱故欲與之為治而反託疾乎令詣獄養病欲殺之客有說咸曰趙殺鳴犢孔子臨河而逝未聞求賢而脅以牢獄者也咸乃出之因舉方正王莽以業為酒士病不之官遂隠蔵山谷絶匿名迹終莽之世公孫述僭號素聞業賢徴之欲以為博士業固辭疾不􅁸數年述羞不能致之乃使大鴻臚尹融持毒酒奉詔命以刼業曰若起則受公侯之位不起賜之以藥融譬旨曰方今天下分崩孰知是非而以區區之身試扵不測之淵乎朝廷貪慕名徳曠官缺位扵今七年四時珍御不以忘君君宜上奉知已下為子孫身名俱全不亦優乎今數年不起猜疑冦心凶禍立加非計之得者也業乃歎曰危國不入亂國不居親扵其身為不善者義所不従君子見危授命何乃誘以髙位重餌㦲融見業辭志不屈復曰宜呼室家計之業曰以丈夫斷之扵心久矣何妻子之為遂飲毒而死述聞業死大驚又恥有殺賢之名乃遣使弔祠賻贈百匹業子翬逃辭不受蜀平光武下詔表其門閭命益部載其髙節圖畫形像初平帝時蜀郡王皓為羙陽令王嘉為郎王莽簒位並棄官西歸及公孫述稱帝遣使徴嘉皓恐不至先繫其妻子使使者謂嘉曰速􅏻妻子可全對曰犬馬猶識主况扵人乎王皓先自刎以首付使者述怒遂誅皓家属王嘉聞而歎之曰後之哉乃對使者伏劍而死是時犍為任永君業同郡馮信並好學博古公孫述連徴命待以髙位皆託青盲以避世難永妻淫扵前匿情無言見子入井忍而不救信侍婢亦對信姦通及聞述誅皆盥洗更視曰世適平目即清淫者自殺光武聞而徴之並會病卒劉茂字子衛太原晉陽人也少孤獨與母居家貧以筋力致養孝行著扵鄉里及長能習禮􅀴教授常數百人哀帝時察孝㢘再遷五原屬國侯遭母憂去官服竟後為沮陽令會王莽簒位茂棄官避世扵𢎞農山中教授建武二年歸為郡門下掾時赤眉二十餘萬衆攻郡縣殺長吏及府􅁺史茂負太守孫福踰牆蔵空穴中得免其暮俱奔盂縣晝則逃匿夜求糧食積百餘日賊去乃得歸府眀年詔書求天下義士太守以茂為言詔書即徴茂拜議郎遷宗正丞後拜侍中卒官元初中鮮卑數百餘騎寇漁陽太守張顯率吏士追出塞遥望虜營烟火急趣之兵馬􅁺嚴授慮有伏兵苦諌止不聼顯䠞令進授不獲已前戰伏兵彂授身被十創歿扵陣顯拔刀追散兵不能制虜射中顯主簿衛福功曺徐咸遽赴之顯遂墮馬福以身擁蔽虜并殺之朝廷愍授䓁節詔書襃歎厚加賞賜各除子一人為郎中永初二年劇賊畢豪等入平原界縣令劉雄将吏士乗船追之至厭次河與賊合戰雄敗賊執雄以矛刺之時小吏所輔前叩頭求哀願以身代雄豪䓁縦雄而刺輔貫心洞背即死東郡太守捕得豪等具以状上詔書追傷之賜錢二十萬除父奉為郎中温序字次房太原祁人也仕州従事建武二年騎都尉弓里戍弓里姓也将兵平定北州到太原厯訪英俊大人問以䇿謀戍見序竒之上疏薦焉扵是徴為侍御史遷武陵都尉病免官六年拜謁者遷䕶羌校尉序行部至㐮武為隗囂别将茍宇所拘刧宇謂序曰子若與我并威同力天下可圖也序曰受國重任分當效死義不貪生茍背恩徳宇等復曉譬之序素有氣力大怒叱宇等曰虜何敢廹脅漢将因以節撾殺數人賊衆争欲殺之宇止之曰此義士死節可賜以劍序受劍衘鬚扵口頋左右曰既為賊所廹殺無令鬚汚土遂伏劍而死序主簿韓遵従事王忠持尸歸斂光武聞而憐之命忠送喪到洛陽賜城傍為冢地賜榖千斛縑五百疋除三子為郎長子夀服竟為鄒平侯相夢序吿之曰久客思鄉夀即棄官上書乞父骸骨歸葬帝許之乃返舊塋焉彭修字子陽會稽毗陵人也年十五時父為郡吏得休與修俱歸道為盗所劫修困急乃拔佩刀前持盗帥曰父辱子死卿不頋死邪盗相謂曰此童子義士也不宜逼之遂辭謝而去鄉黨稱其名後仕郡為功曺時西部都尉􅈗鼂行太守事以微過收呉縣獄吏将殺之主簿鍾離意諌争甚切鼂怒使收縳意欲案之掾吏莫敢諌修排閤直入拜扵庭曰眀府發雷霆扵主簿請聞其過鼂曰受教三日初不奉行廢命不忠豈非過邪修因拜曰昔任座面折文侯朱雲攀毁欄檻自非賢君焉得忠臣今慶眀府為賢君主簿為忠臣鼂遂原意罰貰獄吏罪後州辟従事時賊張子林等數百人作亂郡言州請修守呉令修與太守俱出討賊賊望見車馬競交射之飛矢雨集修障扞太守而為流矢所中死太守得全賊素聞其恩信即殺弩中修者餘悉皆降散言曰自為彭君故降不為太守服也索盧放字君陽東郡人也以尚書教授千餘人初署郡門下掾更始時使者督行郡國太守有事當就斬刑放前言曰今天下所以苦毒王氏歸心皇漢者實以聖政寛仁故也而傳車所過未聞恩澤大守受誅誠不敢言但恐天下惶懼各生疑變夫使功者不如使過願以身代太守之命遂前就斬使者義而赦之由是顯名建武六年徴為洛陽令政以能名以病乞身徙諌議大夫數納忠言後以病去建武末復徴不起光武使人輿之見扵南宫雲臺賜榖二千斛遣歸除子為太子中庶子卒扵家周嘉字恵文汝南安城人也髙祖父燕宣帝時為郡決曺􅁺太守欲枉殺人燕諌不聼遂殺囚而黜燕囚家守闕稱寃詔遣覆考燕見太守曰願謹定文書皆著燕名府君但言時病而已出謂􅁺史曰諸君被問悉當以罪推燕如有一言及扵府君燕當手劍相刃使者乃收燕繫獄屢被掠楚辭無屈撓當下蠺室乃歎曰我平王之後正公元孫豈可以刀鋸之餘下見先君遂不食而死燕有五子皆至刺史太守嘉仕郡為主簿王莽末羣賊入汝陽城嘉従太守何敞討賊敞為流矢所中郡兵奔北賊圍繞數十重白刃交集嘉乃擁敞以身扞之因呵賊曰卿曺皆人隸也為賊既逆豈有還害其君者邪嘉請以死贖君命因仰天號泣羣賊扵是兩兩相視曰此義士也給其車馬遣送之後太守冦恂舉為孝㢘拜尚書侍郎光武引見問以遭難之事嘉對曰太守被傷命懸冦手臣實駑怯不能死難帝曰此長者也詔嘉尚公主嘉稱病篤不肯當遷零陵太守視事七年卒零陵頌其遺愛吏民為立祠焉嘉従弟暢字伯持性仁慈為河南尹永初二年夏旱久禱無應暢收葬洛陽城􅅖客死骸骨凡萬餘人應時澍雨嵗乃豐稔位至光禄勲范式字巨卿山陽金鄉人也一名汜少逰太學為諸生與汝南張劭為友劭字元伯二人並吿歸鄉里式謂元伯曰後二年當還将過拜尊親見孺子焉乃共尅期日後期方至元伯具以白母請設饌以候之母曰二年之别千里結言爾何相信之審邪對曰巨卿信士必不乖違母曰若然當為爾醖酒至其日巨卿果到升堂拜飲盡歡而别式仕郡為功曺後元伯寢疾篤同郡殷子徴郅君章晨夜省視之元伯臨盡歎曰恨不見吾死友子徴曰吾與君章盡心扵子是非死友復欲誰求元伯曰若二子者吾生友耳山陽范巨卿所謂死友也尋而卒式忽夢元伯元冕垂纓屣履而呼曰巨卿吾以某日死當以爾時葬永歸黄泉子未我忘豈能相及式怳然覺悟悲歎泣下具吿太守請往奔喪太守雖心不信而重違其請許之式便服朋友之服投其葬日馳往赴之式未及門而喪已發引既至壙将􅉎而柩不肯進其母撫之曰元伯豈有望邪遂停柩移時乃見素車白馬號哭而来其母望之曰是必范巨卿也巨卿既至叩喪言曰行矣元伯死生異路永従此辭㑹葬者千人咸為揮涕式因執紼而引柩扵是乃前式遂留止冢次為修墳樹然後乃去後到京師受業太學時諸生長沙陳平子亦同在學與式未相見而平子被病将亡謂其妻曰吾聞山陽范巨卿烈士也可以託死吾殁後但以屍埋巨卿戸前乃裂素為書以遺巨卿既終妻従其言時式出行適還省書見瘞愴然感之向墳揖哭以為死友乃營䕶平子妻兒身送喪扵臨湘未至四五里乃委素書扵柩上哭别而去其兄弟聞之尋求不復見長沙上計􅁺史到京師上書表式行状三府並辟不應州舉茂才四遷荆州刺史友人南陽孔嵩家貧親老乃變姓名傭為新野縣阿里街卒式行部到新野而縣選嵩為導騎迎式式見而識之呼嵩把臂謂曰子非孔仲山邪對之歎息語及平生曰昔與子俱曳長裾逰集帝學吾䝉國恩致位牧伯而子懐道隠身處扵卒伍不亦惜乎嵩曰侯嬴長守扵賤業晨門肆志扵抱關子欲居九夷不患其陋貧者士之宜豈為鄙㦲式勅縣代嵩嵩以為先傭未竟不肯去嵩在阿里正身厲行街中子弟皆服其訓化遂辟公府之京師道宿下亭盗共竊其馬尋問知其嵩也乃相責譲曰孔仲山善士豈宜侵盗乎扵是送馬謝之嵩官至南海太守式後遷廬江太守有威名卒扵官李善字次孫南陽淯陽人本同縣李元蒼頭也建武中疫疾元家相繼死沒惟孤兒續始生數旬而貲財千萬諸奴私共計議欲謀殺續分其財産善深傷李氏而力不能制乃􅅗負續逃亡隠山陽瑕邱界中親自哺養乳為生湩推燥居濕備嘗艱勤續雖孩抱奉之不異長君有事輙長跪請白然後行之續年十嵗善與歸夲縣修理舊業吿奴婢扵長吏悉收殺之時鍾離意為瑕邱令上書薦善行状光武詔拜善及續並為太子舍人善顯宗時辟公府以能理劇再遷日南太守従京師之官道經淯陽過李元冢未到一里乃脫朝服持鋤去草及拜墓哭泣甚悲自炊㸑執鼎爼以修祭祀垂泣曰君夫人善在此盡哀數日乃去到官以愛恵為政懐来異俗遷九江太守未至道病卒續至河間相王忳字少林廣漢新都人也忳嘗詣京師扵空舍中見一書生病困愍而視之書生謂忳曰我當到洛陽而被病命在湏臾腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而命絶忳即鬻金一斤營其殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中而止其日大風飄一繡被復堕忳前即言之扵縣縣以歸忳後乗馬到雒縣馬遂奔走毫忳入他舎主人見之喜曰今禽盗矣問所由得馬忳具說其状并及繡被主人悵然良久曰被随旋風與馬俱亡卿何陰徳而致此二物忳自念有葬書生事因為說之并道書生形貌及埋金之䖏主人大驚號曰是我子也姓金名彦前往京師不知所在何意卿乃葬之大恩久不報天以此彰卿徳耳忳悉以被馬還之彦父不受又厚遺忳忳辭譲而去時彦父為州従事因告新都令假忳休息自迎彦喪餘金俱存忳由是顯名仕郡功曺州治中従事舉茂才除郿令到官至斄亭亭長曰亭有鬼數殺過客不可宿也忳曰仁勝凶邪徳除不祥何鬼之避即入亭止宿夜中聞有女子稱􅁈之聲忳呪曰有何枉状可前求理乎女子曰無衣不敢進忳便投衣與之女子乃前訴曰妾夫為涪令之官過宿此亭亭長無状枉殺妾家十餘口埋在樓下悉盗取財貨忳問亭長姓名女子曰即今門下㳺徼者也忳曰汝何故數殺過客對曰妾不得白日自訴每夜陳􅁈客輙眠不見應不勝感恚故殺之忳曰當為汝理此􅁈勿復殺良善也因解衣扵地忽然不見眀旦召㳺徼詰問具服罪即收繫及同謀十餘人悉伏辜遣吏送其喪歸鄉里扵是亭遂清安張武者呉郡由拳人也父業郡門下􅁺送太守妻子還鄉里至河内亭盗夜刼之業與賊戰死遂亡失屍骸武時年幼不及識父後之太學受業每節常持父遺劍至亾䖏祭醊泣而還太守第五倫嘉其行舉孝㢘遭母喪過毁傷父魂靈不返因哀慟絶命陸續字智初會稽呉人也世為族姓祖父閎字子春建武中為尚書令羙姿貌喜著越布單衣光武見而好之常勅會稽郡獻越布續幼孤仕郡戸曺史時嵗荒民饑困太守尹興使續扵都亭賦民饘粥續悉簡閱其民訊以名氏事畢興問所食㡬何續因口說六百餘人皆分列姓名無有差謬興異之刺史行部見續辟為别駕従事以病去還為郡門下􅁺是時楚王英謀反陰疏天下善士及楚事覺顯宗得其錄有尹興名乃徴興詣廷尉獄續與主簿梁宏功曺史駟勲及􅁺史五百餘人詣洛陽詔獄就考諸吏不堪痛楚死者太半惟續宏勲掠考五毒備至肌肉消爛終無異辭續母逺至京師覘候消息獄事持急無縁與續相聞母但作饋食付門卒以進之續雖見考苦毒而辭色慷慨未嘗易容惟對食悲泣不能自勝使者怪而問其故續曰母来不得見故泣耳使者大怒以為獄門吏卒通傳意氣召将案之續曰因食餉羮識母所自調和故知来耳非人吿也使者問何以知母所作乎續曰母嘗截肉未嘗不方斷葱以寸為度是以知之使者問諸謁舍續母果来扵是陰嘉之上書說續行状帝即赦興等事還鄉里禁錮終身續以老病卒長子稠廣陵太守有治名續中子逄樂安太守少子襃力行好學不慕榮名連徴不就襃子康已見前傳戴封字平仲濟北剛人也年十五詣太學師事鄮令東海申君申君卒送喪到東海道經其家父母以封當還豫為娶妻封暫過拜親不宿而去還京師卒業時同學石敬平病卒封養視殯斂以所齎糧市小棺送喪到家其家更斂見敬平行時書物皆在棺中乃大異之封後遇賊財物悉被略奪惟餘縑七疋賊不知處封乃追以與之曰知諸君乏故送相遺賊驚曰此賢人也盡還其器物後舉孝㢘為光禄主事遭伯父喪去官詔書求賢良方正直言之士有至行能消災異者公卿郡守各舉一人郡及大司農俱舉封公車徴陛見對䇿第一擢拜議郎遷西華令汝潁有蝗災獨不入西華界時督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境竒之其年大旱封禱請無獲乃積薪坐其上以自焚火起而大雨暴至扵是逺近歎服遷中山相時諸縣囚四百餘人辭状已定當行刑封哀之皆遣歸與尅期日皆無違者詔書䇿羙焉永元十二年徴拜太常卒官李充字大遜陳留人也家貧兄弟六人同衣逓食妻竊謂充曰今貧居如此難以久安妾有私財願思分異充偽酬之曰如欲别居當醖酒具㑹請呼鄉里内外共議其事婦乃置酒讌客充扵坐中前跪白母曰此婦人無状而教充離間母兄罪合遣斥便呵叱其婦逐令出門婦䘖涕而去坐中皆驚肅因遂罷散充後遭母喪行服墓次人有盗其墓樹者充手自殺之服闋立精舍講授太守魯平請署功曺不就平怒乃援充以􅂢溝中因讁署縣都亭長不得已起親職役和帝公車徴不行延平中詔公卿中二千石各舉隠士大儒務取髙行以勸後進特徴充為博士時魯平亦為博士每與集㑹常歎服焉充遷侍中時大将軍鄧隲貴戚傾時無所下借以充髙節每卑敬之嘗置酒請充賔客滿堂酒酣隲跪曰幸託􅎛房位居上将幕府初開欲辟天下竒偉以匡不逮惟諸君博求其器充乃為陳海内隠居懐道之士頗有不合隲欲絶其語以肉啖之充扺肉扵地曰說士猶甘扵肉遂出徑去隲甚望之同坐汝南張孟舉往譲充曰一日聞足下與鄧将軍說士未究激刺面折不由中和出言之責非所以光祚子孫者也充曰大丈夫居世貴行其意何能逺為子孫之計由是見非扵貴戚遷左中郎将年八十以為國三老安帝常特進見賜以几杖卒扵家繆肜字豫公汝南召陵人也少孤兄弟四人皆同財業及各娶妻諸婦遂求分異又數有鬭争之言肜深懐憤歎乃掩户自撾曰繆肜汝脩身謹行學聖人之法将以齊整風俗奈何不能正其家乎弟及諸婦聞之悉叩頭謝罪遂更為敦睦之行仕縣為主簿時縣令被章見考吏皆畏懼自誣而肜獨證據其事掠考苦毒至乃體生蟲蛆因復傳換五獄踰渉四年令卒以自免太守隴西梁湛召為決曺史安帝初湛病卒官肜送喪還隴西始葬會西羌反叛湛妻子悉避亂他郡肜獨留不去為􅁸墳冢乃􅅗穿井傍以為窟室晝則隠竄夜則負土及賊平而墳已立其妻子意肜已死還見大驚關西咸稱傳之共給車馬衣資肜不受而歸鄉里辟公府舉尤異遷中牟令縣近京師多權豪肜到官誅諸姦吏及託名貴戚賔客者百有餘人威名遂行卒扵官陳重字景公豫章宜春人也少與同郡雷義為友俱學魯詩顔氏春秋太守張雲舉重孝㢘重以譲義前後十餘通記雲不聽義眀年舉孝㢘重與義同在郎署有同署郎負息錢數十萬責主日至詭求無已重乃密以錢代還郎後覺知而厚辭謝之重曰非我之為将有同姓名者終不言恵又同舎郎有吿歸寧者誤持鄰舍郎絝以去主疑重所取重不自申說而市絝以償之後寧喪者歸以絝還主其事乃顯重後與義俱拜尚書郎義代同臺人受罪以此黜退重見義去亦以病免後舉茂才除細陽令政有異化舉尤異當遷為會稽太守遭姊憂去官後為司徒所辟拜侍御史卒雷義字仲公豫章鄱陽人也初為郡功曺皆擢舉善人不代其功義嘗濟人死罪罪者後以金二斤謝之義不受金主伺義不在黙投金扵承塵上後義葺理屋宇乃得金金主已死無得復還義乃以付縣曺後舉孝㢘拜尚書侍郎有同時郎坐事當居刑作義黙自表取其罪以此論司冦同臺郎覺之委位自上乞贖義罪順帝詔皆除刑義歸舉茂才譲扵陳重刺史不聽義遂佯狂被髪走不應命鄉里為之語曰膠漆自謂堅不如雷與陳三府同時俱辟二人義遂為守灌謁者使持節督郡國行風俗太守令長坐者凡七十人旋拜侍御史除南頓令卒官子授官至蒼梧太守范冉字史雲冉㦯作丹陳留外黄人也少為縣小吏年十八奉檄迎督郵冉恥之乃遁去到南陽受業扵樊英又㳺三輔就馬融通經厯年乃還冉好違時絶俗為激絶之行常慕梁伯鸞閔仲叔之為人與漢中李固河内王奐親善而鄙賈偉節郭林宗焉奐後為考城令境接外黄屢遣書請冉冉不至及奐遷漢陽太守将行冉乃與弟協歩齎麥酒扵道側設壇以待之冉見奐車徒駱驛遂不自聞惟與弟共辯論扵路奐識其聲即下車與相揖對奐曰行路倉卒非陳契濶之所可共到前亭宿息以叙分隔冉曰子前在考城思欲相従以賤質自絶豪友耳今子逺適千里會面無期故􅁿行相候以展訣别如其相追将有慕貴之譏矣便起吿違拂衣而去奐瞻望弗及冉長逝不顧桓帝時以冉為莱蕪長遭母憂不到官後辟太尉府自以狷急不能従俗常佩韋扵朝議者欲以為侍御史因遁身逃命扵梁沛之間徒行弊服賣卜扵市遭黨人禁錮遂推鹿車載妻子捃拾自資或寓息客廬㦯依宿樹蔭如此十餘年乃結草屋而居焉所止單陋有時絶粒窮居自若言貌無改閭里為之歌曰甑中生塵范史雲釜中生魚范莱蕪及黨禁解為三府所辟乃應司空命是時西羌反叛黄巾作難制諸府􅁺属不得妄有去就冉首自劾退詔書特原不理罪又辟太尉府以疾不行中平二年年七十四卒扵家臨命遺令勅其子曰吾生扵昏闇之世值乎淫侈之俗生不得匡世濟時死何忍自同扵世氣絶便斂斂以時服衣足蔽形棺足周身斂畢便穿穿畢便埋其眀堂之奠干飯寒水飲食之物勿有所下墳封髙下令足自隠知我心者李子堅王子炳也今皆不在制之在爾勿令鄉人宗親有所加也扵是三府各遣令史奔吊大将軍何進移書陳留太守累行論諡僉曰宜為貞節先生會葬者二千餘人刺史郡守各為立碑表墓焉戴就字景成㑹稽上虞人也仕郡倉曺掾揚州刺史歐陽参奏太守成公浮贓罪遣部従事薛安案倉庫簿領收就扵錢塘縣獄幽囚考掠五毒㕘至就慷慨直辭色不變容又燒鋘斧使就挾扵肘腋就語獄卒可熟燒斧勿令泠每上彭考因止飯食不肯下肉焦毁堕地者掇而食之主者窮竭酷惨無復餘方乃卧就覆船下以馬通薫之一夜二日皆謂已死發船視之就方張眼大罵曰何不益火而使滅絶又復燒地以大針刺指爪中使以把土爪悉堕落主者以状白安安呼見就謂曰太守罪穢狼籍受命考實君何故以骨肉拒扞邪就據地荅言太守剖符大臣當以死報國卿雖衘命固宜申斷􅁈毒奈何誣枉忠良强相掠理令臣謗其君子證其父薛安庸騃忸行無義就考死之日當白之扵天與羣鬼殺汝扵亭中如䝉生全當手刃相裂安深竒其壮節即解械更與羙談表其言辭解釋郡事徴浮還京師免歸鄉里太守劉寵舉就孝㢘光禄主事病卒趙苞字威豪甘陵東武城人従兄忠為中常侍苞深恥其門族有宦官名埶不與忠交通初仕州郡舉孝㢘再遷廣陵令視事三年政教清眀郡表其状遷遼西太守抗厲威嚴名振邉俗以到官眀年遣使迎母及妻子垂當到郡道經栁城值鮮卑萬餘人入塞冦鈔苞母及妻子遂為所劫質載以擊郡苞率歩騎二萬與賊對陣賊出母以示苞苞悲號謂母曰為子無状欲以微禄奉養朝夕不圖為母作禍昔為母子今為王臣義不得顧私恩毁忠節惟當萬死無以塞罪母遥謂曰威豪人各有命何得相顧以虧忠義昔王陵母對使伏劒以固其志爾其勉之苞即時進戰賊悉摧破其母妻皆為所害苞殯斂母畢白上歸葬靈帝遣䇿弔慰封鄃侯苞葬訖謂鄉人曰食禄而避難非忠也殺母以全義非孝也如是有何面目立扵天下遂歐血而死向栩字甫興河内朝歌人向長之後也少為書生性卓詭不倫恒讀老子状如學道又似狂生好被髪着絳綃頭常扵竈北坐版牀上如是積久版乃有膝踝足指之處不好語言而喜長嘯賔客従就輒伏而不視有弟子名為顔淵子貢季路冉有之輩㦯騎驢入市乞丐扵人或悉邀諸乞兒俱歸止宿為設酒食時人莫能測之郡以禮請辟舉孝㢘賢良方正有道公府辟皆不到又與彭城姜肱京兆韋着並徴栩不應後特徴到拜趙相及之官時人謂其必當脫素従儉而栩更乗鮮車御良馬世疑其始偽及到官略不視文書舍中生蓬蒿徴拜侍中每朝廷大事侃然正色百官憚之會張角作亂栩上便宜頗譏刺左右不欲國家興兵但遣将扵河上北向讀孝經賊自當消滅中常侍張讓讒栩不欲令國家命将出師疑與角同心欲為内應收送黄門北寺獄殺之諒輔字漢儒廣漢新都人也仕郡為五官􅁺時夏大旱太守自出祈禱山川連日而無所降輔乃自暴庭中慷慨祝曰輔為股肱不能進諌納忠薦賢退惡和調陰陽承順天意至令天地否隔萬物焦枯百姓喁喁無所訴告咎盡在輔今郡太守改服責已為民祈福精誠懇到未有感徹輔今敢自祈請若至日中不雨乞以身塞無状扵是積薪柴聚茭茅以自環搆火其傍将自焚焉未及日中時而天雲晦合湏臾澍雨一郡沾潤世以此稱其志誠劉翊字子相潁川潁陰人也家世豐産常能周施而不有其恵會翊行扵汝南界中有陳國張季禮逺赴師喪遇寒氷車毁頓滯道路翊見而謂之曰君慎終赴義行宜速達即下車與之不吿姓名自䇿馬而去季禮意其子相也後故到潁陰還所假乗翊閉門辭行不與相見常守志卧疾不屈聘命河南种拂臨郡引為功曺翊以拂名公之子乃為起焉拂以其擇時而仕甚敬任之陽翟黄綱恃程夫人權力求占山澤以自營植拂召翊問曰程氏貴戚在帝左右不聼則恐見怨與之則奪民利為之奈何翊曰名山大澤不以封盖為民也眀府聼之則被佞倖之名矣若以此獲禍貴子申甫則自以不孤也申甫拂之子也拂用翊言遂不與之乃舉翊為孝㢘不就後黄巾賊起郡縣饑荒翊救給乏絶資其食者數百人鄉族貧者死亾則為具殯葬嫠獨則助營妻娶獻帝遷都西京翊舉上計􅁺是時冦賊興起道路隔絶使驛稀有達者翊夜行晝伏乃到長安帝嘉其忠勤特拜議郎遷陳留太守翊散所握珍玩惟餘車馬自載東歸出關數百里見士大夫病亾道次翊以馬易棺脫衣殮之又逄知故困餒扵路不忍委去因殺所駕牛以救其乏衆人止之翊曰視沒不救非志士也遂俱餓死王烈字彦方大原人也少師事陳寔以行義稱鄉里有盗牛者主得之盗請罪曰刑戮是甘乞不使王彦方知也烈聞而使人謝之遺布一端㦯問其故烈曰盗懼吾聞其過是有恥惡之心既懐恥惡必能改善故以此激之後有老父遺劍扵路行道一人見而守之至暮老父還尋得劍怪而問其姓名以事吿烈烈使推求乃先盗牛者也諸有争訟曲直将質之扵烈或至塗而反㦯望廬而還其以徳感人若此察孝㢘三府並辟皆不就遭黄巾董卓之亂避地遼東夷人尊奉之太守公孫度接以昆弟之禮訪州政事欲以為長史烈乃為商賈自穢得免曺操聞烈髙名遣徴不至建安二十四年終扵遼東年七十八魏魏不立此傳今取田疇邴原管寧三人為編田疇字子泰右北平無終人也好讀書善擊劍初平元年義兵起董卓遷帝扵長安幽州牧劉虞歎曰賊臣作亂朝廷播蕩四海俄然莫有固志身備宗室遺老不得自同扵衆今欲奉使展効臣節安得不辱命之士乎衆議咸曰田疇雖年少多稱其竒疇時年二十二矣虞乃備禮請與相見大恱之遂署為従事具其車騎将行疇曰今道路阻絶冦虜縦横稱官奉使為衆所指願以私行期扵得逹而已虞従之疇乃歸自選其家客與年少之勇壮慕従者二十騎俱往虞自出祖而遣之既取道疇乃更上西闗出塞􅅖北山直趣朔方循間􅈳去遂至長安致命詔拜騎都尉疇以為天子方䝉塵未安不可以荷佩榮寵固辭不受朝廷髙其義三府並辟不就得報馳還未至虞已為公孫瓉所害疇至謁祭虞墓陳發章表哭泣而去瓉聞之大怒購求獲疇謂曰汝何自哭劉虞墓而不送章報扵我也疇答曰漢室衰頽人懐異心惟劉公不失忠節章報所言扵将軍未羙恐非所樂聞故不進也且将軍方舉大事以求所欲既滅無罪之君又讐守義之臣誠行此事則燕趙之士将皆蹈東海而死耳豈忍有従将軍者乎瓉壮其對釋不誅也拘之軍下禁其故人莫得與通或謂瓉曰田疇義士君弗能禮而又囚之恐失衆心瓚乃縦遣疇疇得北歸率舉宗族他附従者數百人埽地而盟曰君仇不報吾不可以立扵世遂入徐無山中營深嶮平敞地而居躬耕以養父母百姓歸之數年間至五千餘家疇誡其父老曰諸君不以疇不肖逺来相就衆成都邑而莫相統一恐非久安之道願推擇其賢長者以為之主皆曰善同僉推疇疇曰今来在此非茍安而已将圖大事復怨雪恥竊恐其得志而􅁿薄之徒自相侵侮偷快一時無深計逺慮疇有愚計願與諸君共施之可乎皆曰可疇乃為約束相殺傷犯盗諍訟之法法重者至死其次抵罪二十餘條又制為婚姻嫁娶之禮興舉學校講授之業班行其衆衆皆便之至道不拾遺北邉翕然服其威信烏丸鮮卑並各遣譯使致貢遺疇悉撫納令不為冦袁紹數遣使招命又即授將軍印因安輯所統疇皆拒不當紹死其子尚又辟焉疇終不行疇常忿烏丸昔多賊殺其郡冠盖有欲討之意而力未能建安十二年太祖北征烏丸未至先遣使辟疇又命田預喻指疇戒其門下趣治嚴門人謂曰昔袁公慕君禮命五至君義不屈今曺公使一來而君若恐弗及者何也疇笑而應之曰此非君所識也遂随使者至軍署司空戸曺􅁺引見諮議眀日出令曰田子泰非吾所宜吏者即舉茂才拜為蓚令不之官随軍次無終方夏水雨而濵海洿下濘滯不通虜亦遮守蹊要軍不得進太祖患之以問疇疇曰此道秋夏每常有水淺不通車馬深不載舟船為難久矣舊北平郡治在平岡道出盧龍達扵栁城自建武以来䧟壊斷絶垂二百載而尚有微􅈳可従今虜将謂大軍由無終不得進而退已懈弛無備若黙回軍従盧龍口越白檀之嶮出空虚之地路近而便掩其不備蹋頓之首可不戰而禽也太祖曰善乃引軍還而署大木表扵水側路傍曰方今暑夏道路不通且湏秋冬乃復進軍虜候騎見之誠以為大軍去也太祖令疇将其衆為鄉導上徐無山出盧龍厯平岡登白狼堆去栁城二百餘里虜乃驚覺單于身自臨陣太祖與交戰遂大斬獲追奔逐北至栁城軍還入塞論功行封封疇都亭侯邑五百戸疇自以為始救君難率衆逃遁志義不立反以為利非夲意也固譲太祖知其至心許而不奪遼東斬送袁尚首令三軍敢有哭之者斬疇以嘗為尚所辟乃往祭哭太祖亦不問疇盡将其家属及宗人三百餘家居鄴太祖賜疇車馬榖帛皆散之宗族知舊従征荆州還太祖追念疇功殊羙恨前聽疇之譲曰是成一人之髙志而虧王法大制也扵是乃復以前爵封疇疇上疏陳誠以死自誓太祖不聽欲引拜之至扵數四終不受有司劾疇狷介違道茍立小節宜免官加刑太祖重其事依違者久之乃下世子及大臣博士議世子以疇同扵子文辭禄申胥逃賞宜勿奪以優其節尚書令荀彧司隸校尉鍾繇等亦以為可聽太祖猶欲侯之疇素與夏侯惇善太祖謂惇曰且往以情喻之自従君所言無吿吾意也惇就疇宿如太祖所戒疇揣知其指不復𤼵言惇臨去乃拊疇背曰田君主意勤勤曾不顧乎疇答曰是何言之過也疇負義逃竄之人耳䝉恩全活為􅄑多矣豈可賣盧龍之塞以易賞禄哉縦國私疇疇獨不愧扵心乎将軍雅知疇者猶復如此若必不得已請願効死刎首扵前言未卒涕泣横流惇具言之太祖喟然知不可屈乃拜為議郎年四十六卒子又早死文帝踐阼髙疇徳義賜疇従孫續爵闗内侯以奉其祀邴原字根矩北海朱虚人也年十一而喪父家貧早孤鄰有書舍原過其傍而泣師問曰童子何悲原曰孤者易傷貧者易感夫讀書者必皆具有父兄者也一則羡其不孤二則羡其得學心中惻然而為涕零也師亦哀原之言而為之泣曰欲書可耳答曰無錢資師師曰童子茍有志我徒相教不求資也扵是遂就學一冬之間誦孝經論語自在童齔之中嶷然有異及長金玉其行欲逺逰學詣安邱孫崧崧辭曰君鄉里鄭君君知之乎原荅曰然崧曰鄭君學覽今古博聞彊識鈎深致逺誠學者之師模也君乃舍之躡屣千里所謂以鄭為東家丘者也君似不知而曰然者何也原曰先生之說誠可謂苦藥良針然猶未達僕之微趣也人各有志所規不同故乃有登山而採玉者有入海而採珠者豈可謂登山者不知海之深入海者不知山之髙哉君謂僕以鄭為東家丘君亦以僕為西家愚夫邪崧辭謝焉又曰兖豫之士吾多所識未有若君者當以書相分原重其意難辭之持書而别原心以為求師啓學志髙者通非若交逰待分而成也書何為㢤乃蔵書扵家而行原舊能飲酒自行之後八九年間酒不向口單歩負笈苦身持力至陳留則師韓子助潁川則宗陳仲弓汝南則交范孟博涿郡則親盧子幹臨别師友以原不飲酒會米肉送之原曰夲能飲酒但以荒思廢業故斷之耳今當逺别因見貺餞可一飲醼扵是共坐飲酒終日不酔歸以書還孫崧解不致書之意後為郡所召署功曺主簿時魯國孔融為北海相教選計當任公卿之才乃以鄭元為計掾彭璆為計吏原為計佐融有所愛一人常盛嗟歎之後恚望欲殺之朝吏皆請時其人亦在坐叩頭流血而融意不解原獨不為請融謂原曰衆皆請而君何獨不原對曰眀府扵某夲不薄也常言嵗終當舉之此所謂吾一子也如是朝吏受恩未有在某前者矣而今乃欲殺之眀府愛之則引而方之扵子憎之則推之欲危其身原愚不知眀府以何愛之以何惡之融曰某生扵微門吾成就其兄弟㧞擢而用之某今孤負恩施夫善則進之惡則誅之固君道也往者應仲逺為泰山太守舉一孝㢘旬月之間而殺之夫君人者厚薄何常之有原對曰仲逺舉孝㢘殺之其義焉在夫孝㢘國之俊選也舉之若是則殺之非也若殺之是則舉之非也詩云彼已之子不遂其媾盖譏之也語云愛之欲其生惡之欲其死既欲其生又欲其死是惑也仲逺之惑甚矣眀府奚取焉融乃大笑曰吾但戲耳原又曰君子扵其言出乎身加乎民言行君子之樞機也安有殺人而可以為戯者㢤融無以答是時漢室陵遲政以賄成原乃将家人入鬱洲山中郡舉有道融書喻原使出為世用原不應遂到遼東與同郡劉政俱有勇略雄氣遼東太守公孫度畏惡欲殺政盡收捕其家政得脫度吿諸縣敢有蔵匿政者與同罪政窘急往投原曰窮鳥入懐原曰安知此懐之可入耶遂匿之月餘時東萊太史慈當歸原因以政付之旣而謂度曰将軍前日欲殺劉政以其為己害今政已去君之害豈不除㢤度曰然原曰君之畏政者以其有智也今政已免智将用矣尚奚拘政之家不若赦之無重怨度乃出之原又資送政家皆得歸故郡原在遼東一年中往歸原居者數百家㳺學之士教授之聲不絶遼東多虎原之邑落獨無虎患原嘗行而得遺錢拾以繫樹枝此錢旣不見取而繫錢者愈多原問其故答者謂之神樹原惡其由已而成滛祀乃辨之扵是里中遂斂其錢以為社供後原欲歸鄉里止扵三山孔融又以書迎原原遂復反還積十餘年後乃遁還南行已數日而度甫覺度知原之不可復追也因曰邴君所謂雲中白鶴非鶉鷃之網所能羅矣又吾自遣之勿復求也遂免危難得反國土原扵是講述禮樂吟詠詩書門徒數百服道數千鄭元以博學洽聞注解典籍故儒雅之士集焉原亦自以髙逺清白頤志澹泊口無擇言身無擇行故英偉之士向焉是時海内清議云青州有邴鄭之學太祖為司空辟原東閤祭酒原女早亡太祖有愛子倉舒亦沒欲合葬之原辭曰合葬非禮也原之所以自容扵眀公公之所以待原者以能守典訓而不易也若聽眀公之命是凡庸也眀公焉以為㢤太祖乃止太祖北伐三郡單于還住昌國燕士大夫酒酣太祖曰孤反鄴守諸君必将来迎今日眀旦度皆至矣其不来者獨有邴祭酒耳言訖未久而原先至門下通謁太祖大驚喜擥履而起逺出迎原曰賢者誠難測度孤謂君将不能来而逺自屈誠副饑虚之心謁訖而出軍中士大夫詣原者數百人太祖怪而問之時荀彧在坐對曰獨可省問邴原耳太祖曰此君名重乃亦傾士大夫心彧曰此一世異人士之精藻公宜盡禮以待之太祖曰固孤之宿心也自是之後見敬益重後署丞相徴事崔琰時為東曺􅁺奏記太祖以譲原太祖不許原雖在軍厯署常以病疾髙枕里巷終不當事又希㑹見文帝為五官中郎将天下向慕賔客如雲而原獨閉門自守非公事不出太子微使人従容問之原曰吾聞國危不事冢􅈗君老不奉世子此典制也扵是乃轉五官長史太子燕會衆賔客數十人太子建議曰君父各有篤疾有藥一丸可救一人當救君邪父邪衆人紛紜或父㦯君時原在坐不與比論太子諮之原悖然對曰父也太子亦不復難之太祖征呉原従行卒是後大鴻臚鉅鹿張泰河南尹龎辿以清賢稱永寧太僕東郡張閣以簡質聞杜恕著家戒稱閣曰張子臺視之似鄙樸人然其心中不知天地間何者為美何者為好敦然似如與隂陽合徳者作人如此自可不富貴然而禍患當従何而来世有髙亮如子臺者皆多力慕體之不如也管寧字幼安北海朱虚人也年十六喪父中表愍其孤貧咸共贈􅈖悉辭不受稱財以送終長八尺美鬚眉與平原華歆同縣邴原相友俱逰學扵異國並敬善陳仲弓時天下大亂聞公孫度令行海外遂與原及平原王烈等至遼東度虚館以候之既往見度乃廬扵山谷鑿坯為室越海避難者皆来就之而居旬月而成邑遂講詩書陳爼豆飾威儀眀禮譲非學者無由見也由是度安其賢民化其徳邴原性剛直清議以格物度已下心不安之寧謂原曰􅅗龍以不見成徳言非其時皆招禍之道也密遣令西還時度盛彊外以将軍太守為號而内實有王心卑已崇禮欲官寧以自鎮輔而終莫敢𤼵言其見敬憚如此寧所居屯落會井汲者㦯男女雜錯或争井鬭䦧寧患之乃多買器分置井傍汲以待之又不使知来者得而怪之聞知寧所為乃各相責不復鬭争鄰有牛暴寧田寧為牽牛著凉䖏自為飲食過扵牛主牛主得牛大慙若犯嚴刑是以左右無鬭訟之聲禮譲移扵海表太祖為司空辟寧度子康絶命不宣是時中國少安客人皆還惟寧晏然若将終焉黄初四年詔公卿舉獨行君子司徒華歆薦寧文帝即位徴寜寧遂將家属浮海還郡公孫恭送之南郊加贈服物寧在遼東積三十七年度康恭前後所資遺皆受而蔵諸已西渡盡封還之寧之歸也海中遇暴風船皆沒惟寧乗船自若時夜風晦冥船人盡惑莫知所泊望見有火光趣赴之得島島無居人又無火燼行人咸異焉以為神光之佑也旣至詔以寧為大中大夫固辭不受明帝即位太尉華歆遜位讓寧帝不許遂詔以寧為光禄勲又詔青州刺史命别駕従事郡丞􅁺以禮發遣給安車吏従茵蓐道上厨食寧稱草莽臣上疏陳情稱疾篤不任進路寧自黄初至扵青龍徴命相仍常以八月賜牛酒後詔書問青州刺史程喜寧為守節髙乎審老疾尫頓邪喜上言寧有族人管貢為州吏與寧比鄰臣常使經營消息貢說寧常著皂㡌布襦袴布裙隨時單複出入閨庭能自任杖不須扶持四時祠祭輒自力彊改加衣服著絮巾故在遼東所有白布單衣親薦饌饋跪拜成禮寧少而喪母不識形像常特加觴泫然流涕又居宅離水七八十歩夏時詣水中澡灑手足闚扵園圃臣揆寧前後辭讓之意獨自以生長潛逸耆艾智衰是以棲遲每執謙退此寧志行所欲必全不為守髙正始二年太僕陶邱一永寜衛尉孟觀侍中孫邕中書侍郎王基等復上書薦寧扵是特具安車蒲輪束帛加璧聘焉會寜卒時年八十四初寧妻先卒知故勸更娶寧曰每省曽子王駿之言意常嘉之豈自遭之而違本心㢤寧卒拜其子邈為郎中後為博士通志卷一百六十八
