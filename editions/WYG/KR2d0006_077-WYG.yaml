body:
  text: 通志卷七十二宋右廸功郎鄭樵漁仲撰圖譜略第一索象原學明用記有記無索象河出圖天地有自然之象洛出書天地有自然之理天地出此二物以示聖人使百代憲章必本於此而不可偏廢者也圖經也書緯也一經一緯相錯而成文圖植物也書動物也一動一植相湏而成變化見書不見圖聞其聲不見其形見圖不見書見其人不聞其語圖至約也書至􅀶也即圖而求易即書而求難古之學者為學有要置圖扵左置書扵右索象扵圖索理扵書故人亦易為學學亦易為功舉而措之如執左契後之學者離圖即書尚辭務説故人亦難為學學亦難為功雖平日胷中有千章萬卷及寘之行事之間則茫茫然不知所向秦人雖棄儒學亦未甞棄圖書誠以為國之具不可一日無也蕭何知取天下易守天下難當衆人爭取之時何則入咸陽先取秦圖書以為守計一旦干戈既定文物悉張故蕭何定律令而刑罰清韓信申軍法而號令明張蒼定章程而典故有倫叔孫通制禮儀而名分有别且髙祖以馬上得之一時間武夫役徒知詩書為何物而此數公又非老師宿儒􅀶通古今者若非圖書有在指掌可明見則一代之典未易舉也然是時挟書之律未除屋壁之藏不啓所謂書者有㡬無非按圖之效也後世書籍既多儒生接武及乎議一典禮有如聚訟玩嵗愒日紛紛紜紜縦有所獲披一斛而得一粒所得不償勞矣何為其然㢤歆向之罪上通扵天漢初典籍無紀劉氏創意總括羣書分為七略只收書不收圖藝文之目逓相因習故天禄蘭臺三館四庫内外之藏但聞有書而已蕭何之圖自此委地後之人將慕劉班之不暇故圖消而書日盛惟任宏校兵書一類分為四種有書五十三家有圖四十三卷載在七略獨異於他宋齊之間羣書失次王儉於是作七志以為之紀六志收書一志専收圖譜謂之圖譜志不意末學而有此作也且有専門之書則有専門之學有専門之學則其學必𫝊而書亦不失任宏之略劉歆不能廣之王儉之志阮孝緒不能續之孝緒作七録散圖而歸部録雜譜而歸記注蓋積書猶調兵也聚則易固散則易亡積書猶賦粟也聚則易贏散則易乏按任宏之圖與書㡬相等王儉之志自當七之一孝緒之錄雖不専收猶有總記内篇有圖七百七十卷外篇有圖百卷未知譜之如何耳隋家藏書富於古今然圖譜無所繫自此以来蕩然無紀至今虞夏商周秦漢上代之書具在而圖無𫝊焉圖既無𫝊書復日多兹學者之難成也天下之事不務行而務説不用圖譜可也若欲成天下之事業未有無圖譜而可行於世者作圖譜略原學何為三代之前學術如彼三代之後學術如此漢微有遺風魏晉以降日以陵夷非後人之用心不及前人之用心實後人之學術不及前人之學術也後人學術難及大槩有二一者義理之學二者辭章之學義理之學尚攻擊辭章之學務雕捜耽義理者則以辭章之士為不達淵源玩辭章者則以義理之士為無文彩要之辭章雖富如朝霞晚照徒焜耀人耳目義理雖深如空谷尋聲靡所底止二者殊塗而同歸是皆從事於語言之末而非為實學也所以學術不及三代又不及漢者抑有由也以圖譜之學不𫝊則實學盡化為虛文矣其間有屹然特立風雨不移者一代得一二人實一代典章文物法度紀綱之盟主也然物希則價難平人希則人罕識世無圖譜人亦不識圖譜之學張華晉人也漢之宫室千門萬户其應如響時人服其博物張華固博物矣此非博物之效也見漢宫室圖焉武平一唐人也問以魯三桓鄭七穆春秋族系無有遺者時人服其明春秋平一固熟扵春秋矣此非明春秋之效也見春秋世族譜焉使華不見圖雖讀盡漢人之書亦莫知前代宫室之出處使平一不見譜雖誦春秋如建瓴水亦莫知古人氏族之始終當時作者後世史臣皆不知其學之所自况他人乎臣舊亦不之知及見楊佺期洛京圖方省張華之由見杜預公子譜方覺平一之故由是益知圖譜之學學術之大者且蕭何刀筆吏也知炎漢一代憲章之所自歆向大儒也父子紛争扵言句之末以計較毫釐得失而失其學術之大體何秦人之典蕭何能收扵草昧之初蕭何之典歆向不能紀於承平之後是所見有異也逐鹿之人意在扵鹿而不知有山求魚之人意在於魚而不知有水劉氏之學意在章句故知有書而不知有圖嗚呼圖譜之學絶紐是誰之過與明用善為學者如持軍治獄若無部伍之法何以得書之紀若無覈實之法何以得書之情今總天下之書古今之學術而條其所以為圖譜之用者十有六一曰天文二曰地理三曰宫室四曰器用五曰車旗六曰衣裳七曰壇兆八曰都邑九曰城築十曰田里十一曰㑹計十二曰法制十三曰班爵十四曰古今十五曰名物十六曰書凡此十六類有書無圖不可用也人生覆載之間而不知天文地理此學者之大患也在天成象在地成形星辰之次舍日月之往来非圖無以見天之象山川之紀夷夏之分非圖無以見地之形天官有書書不可以仰觀地理有志志不可以俯察故曰天文地理無圖有書不可用也稽之人事有宫室之制有宗廟之制有明堂辟廱之制有居廬琧室之制有臺省府寺之制有庭霤户牗之制凡宫室之屬非圖無以作室有尊彛爵斝之制有簠簋爼豆之制有弓矢鈇鉞之制有圭璋壁琮之制有璽節之制有金鼓之制有棺槨之制有重主之制有明器祭噐之制有鈎盾之制凡器用之屬非圖無以制噐為車旂者則有車輿之制有驂服之制有旟旐之制有儀衛鹵簿之制非圖何以明章程為衣服者則有弁冕之制有衣裳之制有屨舄之制有笄總之制有襚含之制有杖絰之制非圖何以明制度為壇域者則有壇墠之制有邱澤之制有社稷之制有兆域之制大小髙深之形非圖不能辨為都邑者則有京輔之制有郡國之制有閭井之制有市朝之制有蕃服之制内外重輕之勢非圖不能紀為城築者則有郛郭之制有苑囿之制有臺門魏闕之制有營壘斥候之制非圖無以眀闗要為田里者則有夫家之制有溝洫之制有原隰之制非圖無以别經界為㑹計者則有貨泉之制有貢賦之制有户口之制非圖無以知本末法有制非圖無以定其制爵有班非圖無以正其班有五刑有五服五刑之屬有適輕適重五服之别有大宗小宗權量所以同四海規矩所以正百工五聲八音十二律有節三歌六舞有序昭夏肆夏宫陳軒陳皆法制之目也非圖不能舉内而公卿大夫外而州牧侯伯貴而妃嬪賤而妾媵官有品命有數禄秩有多寡考課有殿最繅籍有數玉帛有等上下異儀尊卑異事皆班爵之序也非圖不能舉要通古今者不可以不識三統五運而三統之數五運之紀非圖無以通要别名物者不可以不識蟲魚草木而蟲魚之形草木之状非圖無以别要明書者不可以不識文字音韻而音韻之清濁文字之子母非圖無以明凡此十六種可以類舉為學者而不知此則章句無所用為治者而不知此則綱紀文物無所施記有楊佺期唐洛陽京城圖唐長安京城圖呂大防唐長安京城圖唐太極宫圖唐大明宫圖唐興慶宫圖三宫合為一圖洛陽宫闕圖宋朝宫闕圖汴京圖唐九􅉄山昭陵建陵合為一圖梁元帝二十八國職貢圖閻立本西域諸國風物圖大遼對境圖大金接境圖契丹地里圖西夏賀蘭山圖山海經圖勃海圖三輔黄圖天文横圖隔子横圖天文圓圖隔子圓圖紫微天心圖璇璣圖日食圖月暈圖分野圖七曜災祥圖七曜厯文圖刻漏圖九江刻漏圖氣象圖雲氣圖日出長短圖海潮時刻四應圖華夷圖守令圖百川源委圖澚閘圖交廣圖諸路至京驛程圖江行備用圖禹穴圖經春秋世系圖春秋機要圖春秋盟㑹圖春秋列國圖春秋十二國年厯杜預釋例地名譜杜預小公子譜春秋明例總括圖荆定易圖先天圖漢上易圖八卦小成圖乾生歸一圖龍圖伏羲俯仰畫卦圖陳希夷易圖劉牧鈎隐圖稽覽圖尚書治要圖鄭康成詩圖小戎圖王制井田圖方田圖鄊遂圖封建圖律呂圖聶崇義三禮圖博古圖考古圖釋奠祭器圖考正禮器圖鄊飲禮圖五服年月圖大宗小宗圖宫架圖舞鑑圖琴式尚象圖景祐大樂圖三樂圖衙鼓格投壺格摴蒱格象戲格聲韻圖指歸圖僧守温三十六字母圖定韻清濁鈐内外轉歸字圖徐浩書譜筆陣圖國相成名圖厯代君臣圖古今類聚年號圖帝王年代圖五運厯年紀劉恕十國年表閩中王氏啓運圖唐孟冬祫饗于太廟禮科帝系圖唐貞元孟冬祫祭圖唐朝功臣配享圖唐貞元孟夏禘饗圖司馬溫公厯年圖宋氏紹宗圖仙源積慶圖衣冠盛事圖太廟圖治平八廟圖熈寧廟圖大宋配享功臣圖文武合班圖朔日視朝儀注圖正冬大慶殿朝㑹立班圖大慶殿再坐上夀立班圖垂拱殿五日一次起居門外敘班圖文徳殿常朝朝堂敘班圖文徳殿常朝立班圖東上閤門拜表立班圖賀祥瑞勝㨗紫宸殿外叙班圖同天節紫宸殿上夀圖集英殿大宴坐次圖大禮尚書省受誓戒圖大禮大慶殿奏請致齋立班圖正冬御殿朝賀上夀垂拱殿樞宻使以下稱賀圖紫宸殿上夀賜宴圖紫宸殿常朝起居圖垂拱殿常朝起居圖集英殿大宴門外立班圖集英殿大宴樞宻使以下起居圖唐宰相表唐官品圖武侯八陣圖攻守器械圖五陣圖文教圖閻立本厯代帝王圖厯代聖賢圖銅人俞穴鍼炙圖仙人水鑑圖明堂偃側人圖難經圖素問氣圖金丹圖煙蘿圖含象鑑圖黄庭五藏圖黄庭五藏道引圖六氣道引圖道源宗師圖仙班朝會圖告元圖内外二景圖上清天闗三圖經上清混合變化圖三五含景圖五常雜修行圖河圖寳錄結璘奔日月圖九宮紫房圖長生寳鑑圖八道祕言圖五嶽真形神仙圖古今五嶽真形圖嶽瀆名山圖大洞九天圖山水穴實圖萬靈朝真圖三皇真形圖列宿朝真圖攝生月令圖伏承圖藝文略作永此作承當考狐剛子粉圖三才定位圖二十四鼎鑪圖黄帝鼎圖西傳宗𣲖圖聲鐘圖趙少保辨才法師繫念圖六想圖重元圖綱格圖北齊六學士勘書圖慶厯彩選圖秦府十八學士圖明皇擊桐圖桐字當考明皇試馬圖王維春社圖王維輞川圖蓮社圖顧凱之列女圖月令圖郭子儀宴魚朝恩圖選日立成圖三元遁甲圖九宫八門圖山形總載圖寳星圖鬼谷子觀氣色出相圖勅律指掌圖姓氏譜錢譜記無地理地域方丈圖地域方尺圖僧道安江圖賈耽地圖裴矩西域圖華夷列國入貢圖馬寔諸道行程血脉圖開元分野圖冀州圖十七路轉運圖河北四十四郡圖十七路圖蜀程圖沈括使北圖洞庭譜嶽瀆福地圖蔣炳西山圖會要南卓唐朝綱領圖王彦威占額圖孫結大唐國照圖大唐國要圖曹臻圖照夏侯頗鹽鐡轉運圖紀運王氏五運圖廣五運圖年厯圖帝王正閏五運圖路惟衡帝王厯數圖薛璫唐聖運圖劉恕年略譜魏森古今通系圖侯利建視古圖劉軻唐年厯龔頴運厯圖徐鍇厯年年譜古今年表帝王接受圖盧元福共和以来甲乙紀帝王真偽圖徐整三五厯紀國朝年表百官唐宰輔譜桞芳大唐宰相表萬當世文武百官圖缺牧圖易唐一行大衍元圖范諤昌易源流圖詩成伯璵毛詩圖草木蟲魚圖禮賀循䘮服圖子游䘮服圖蔡謨䘮服圖張薦五服圖仲陵子五服圖夏侯伏明三禮圖張鎰三禮圖梁正三禮圖紀僧真玉璽譜袁郊二儀實錄衣服名義圖鹵簿圖南郊圖唐志凶儀圖梁隐列國祖廟式樂十二律譜唐郊祀樂章譜吕渭廣陵正息譜王大力琴聲律譜李良輔廣陵正息譜陳康士琹譜離騷譜李約東杓引譜琴式譜阮咸譜琴指圖觱栗格沈括樂律圖春秋嚴彭祖春秋圖張傑春秋圖顧啓期大夫圖春秋車服圖春秋宗族名氏圖演左傳氏族圖春秋名號歸一圖春秋圖鑑春秋手鑑圖孝經應瑞圖論語井田義圖論語世譜經學授經圖韋表微九經歸授譜小學郭璞爾雅圖辨字圖刑法路仁恕五刑旁通圖天文張衡靈憲圖髙文𢎞天文横圖孝經内記星圖周易八野星圖太白會運逆兆通代記圖大象列星圖長慶筭五星所在宿度圖南陽化元元黄十二次分野圖時令王涯月令圖筭數劉徽九章重差圖隂陽三隂圖二宅圖五行家國通用圖太一遊圖五符圖八曜圖五虎圖古墓圖氣神随日用局圖揲蓍圖皮日休支干定命圖遁甲天目圖占氣色要訣圖道家二十八宿真形圖正一真人二十四治圖正一氣化圖五帝修行圖四氣攝生圖參同契大丹圖太易隂陽手鑑圖鈆永五行圖八封真形圖掌訣圖八仙圖元化圖五禽道引圖大象握機圖皇人三一圖存五星圖火鑑周天圖釋氏法界僧圖道綽行圖古今譯圖符瑞玉芝瑞草圖靈芝圖侯亶祥瑞圖孫之柔瑞應圖顧野王符瑞圖張掖郡元石圖上黨十九瑞圖貫怪圖兵家解忠鯁龍武元兵圖神機靈祕圖五行陣圖藝術欹器圖射鑑九圖禮圖等雜畫董蕚畫盤車圖曹元廓畫後周北齊梁陳隋武徳貞觀永徽等朝臣圖韓幹畫龍朔功臣圖王象畫鹵簿圖寳師綸畫内庫瑞錦對雉闘羊翔鳯游麟圖八駿圖辨馬圖食貨于公甫古今泉貨圖醫藥孔穴蝦蟆圖黄帝明堂五藏圖秦承祖明堂圖明堂人形圖指難圖王惟一鍼炙圖五藏攝養明鑑圖崔知悌産圖安濟圖侍膳圖原平仲靈秀本草圖藥圖世系帝系之譜皇帝之譜戚里之譜百官族姓之譜諸家譜通志卷七十二
