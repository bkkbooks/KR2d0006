body:
  text: 通志卷一百五十七宋右廸功郎鄭樵漁仲撰列傳第七十後周陸騰周恵達馮景蘇綽弟椿盧辯弟光韋孝寛子總兄夐韋瑱柳蚪蚪弟子帶韋𢎞蚪弟慶慶子寇儁長孫儉長孫紹逺弟澄盧柔裴俠裴寛寛弟漢裴果裴文舉崔猷崔士謙弟訦李昶鄭道邕鄭偉司馬裔司馬消難薛端弟裕薛善弟愼薛寘薛憕陸騰字顯聖代人魏東平王俟元孫也父旭魏太和中徴拜中書博士稍遷散騎常侍頗明易緯候之學知天下将亂隱於大行山屢徴不起卒騰慷慨有大節從爾朱榮平葛榮以功賜爵清河縣伯稍遷通直散騎常侍及魏孝武西遷騰時使靑州遂没於鄴東魏拜征西将軍陽城鎭将大統九年大軍東討陽城騰拒守月餘城䧟被執文帝釋而禮之問其東間消息騰盛論東州人物又叙述時事辭理抑揚文帝笑曰卿眞不背本也即拜帳内大都督未幾除太子庶子遷武衞将軍騰既為文帝所知思欲立功不願内職及安康賊黄衆寶等作亂結連漢中衆數萬人攻圍東梁州城中糧盡詔騰率軍自子午谷以援之與戰大破之軍還拜龍州刺史文帝謂騰曰今欲通江由路直出南秦卿宜善思經略騰曰臨機制變未敢預陳文帝曰此是卿取柱國之日卿其勉之即解所服金帶賜之州人李廣嗣李武等據險歴攻不能制騰造飛梯夜襲破之執廣嗣等於鼓下其黨有任公忻圍逼州城請免廣嗣及武即㪚兵請罪騰謂将士曰吾不殺廣嗣等可謂堕軍實而長寇讎即斬廣嗣及武以首示之於是出兵奮擊盡獲之進位驃騎大将軍開府儀同三司轉江州刺史進爵上庸縣公陵州木籠獠恃險暴横每行抄刼詔騰討之獠既因山為城攻之未可拔騰遂於城下多設聲樂及諸雜妓示無戰心諸賊累棄其兵仗或擕妻子臨城觀樂騰知其無備遂密縱兵奮擊諸賊惶懼不知所為盡破之斬首萬級俘獲五千人明帝初陵眉戎等八州夷夏並反衆數萬人攻破郡縣騰討平之武成元年詔騰入朝明帝面勑之曰益州險逺非親勿居故令齊公憲作鎭卿文武之備已著遐邇兵馬鎭防皆當委卿統攝於是徙為隆州刺史随憲入蜀及趙公招代憲復請留之遷隆州總管領刺史保定二年資州石磐人反殺郡守據險自守州軍不能制騰率軍討擊盡破斬之蠻獠互反所在蜂起山路險阻難得掩襲騰遂量山川形勢随便開道蠻獠畏威承風請服所開之路多得古銘並是諸葛亮桓温舊道是年鐡山獠抄斷内江路驛使不通騰乃進軍討之出其不意一日下其三城招納降附者三萬户帝以騰母在齊未令東討適有其親屬自齊還朝者晉公䕶奉令偽吿騰云齊為無道已誅公家母兄並從塗炭盖欲發其怒也騰乃發哀泣血志在復讎四年齊公憲與晉公䕶東征請騰為副趙公招時在蜀復欲留之晉公䕶與招書曰今朝廷令齊公埽除河洛欲與此人同行汝彼無事且宜借吾也於是命騰馳傳還朝副憲東討天和初信州蠻蜑據江硖反叛連結二千餘里自稱王侯詔騰討之騰先趣益州募驍勇具樓船沿江而下軍至湯谷分道奮擊所向摧破乃築京觀以旌武功涪陵郡守蘭休祖據地方二千里阻兵為亂復詔騰討之拔其魚令城又破銅槃等七柵騰自在龍州至是前後破平諸賊凡賞得奴婢八百口馬牛稱是於是巴蜀悉定詔令樹碑紀績焉四年遷江陵總管陳遣其将章昭達圍江陵衞王直聞有陳寇遣大将軍趙誾李遷哲等率歩騎赴之並受騰節度時遷哲等守外城陳将程文季雷道勤夜來掩襲遷哲等驚亂不能抗禦騰夜遣開門奮擊大破之陳人奔潰道勤中流矢而斃陳人決龍川寧朔隄水灌江陵城騰親率将士戰於西隄破之陳人乃遁六年進位柱國爵上庸郡公建徳二年徴拜大司空尋出為涇州總管宣政元年冬薨於京師贈太尉公諡曰定子元嗣元字士鑒入闗時年七嵗仕齊為奉朝請成平縣令齊平武帝見元特加勞勉即拜地官府都上士大象末為隋文帝相府外兵參軍元弟融字士顯最知名少歴顯職大象末位至大将軍定陵縣公周恵達字懷文章武文安人也父信歴樂鄉平舒成平三縣令皆以廉能見稱恵達幼有節操好讀書美容貎魏齊王蕭寶夤為瀛州刺史召恵達及河間馮景同在閤下甚禮之及寶夤入朝恵達隨入洛陽寶夤西征恵達復隨入闗寶夤除雍州刺史令恵達使洛陽未還而寶夤謀反聞於京師以恵達是其行人将執之恵逹乃私馳還至潼闗遇大使楊侃侃謂曰何故入虎口恵達曰蕭王必為左右所誤今往庶其改圖及至寶夤反形已露不可彌縫遂用恵達為光祿勳中書舍人寶夤既敗唯恵逹等數人從之寶夤語恵達曰人生富貴左右咸言盡節及遭厄難乃知嵗寒也賀拔岳為闗中大行臺惠達為岳府府屬岳為侯莫陳悅所害恵達遁入漢陽之積麥崖悦平歸於文帝文帝復以為府司馬便委任焉文帝為大将軍大行臺以恵達為行臺尚書大将軍府司馬封文安縣子文帝出鎭華州留恵逹知後事時既承喪亂庶事多闕恵達營造戎仗儲積倉糧簡閱士馬以濟軍國之務甚為朝廷所稱後拜中書令進爵為公大統四年兼尚書右僕射其年文帝與魏文帝東討令恵達輔魏太子居守總留臺事及芒山失律人情駭動趙青雀據長安子城反恵達奉太子出渭橋北以禦之軍還靑雀等誅拜吏部尚書久之復為右僕射自闗右草創禮樂缺然恵逹與禮官損益舊章是以儀軌稍備魏文帝因朝奏樂顧謂恵達曰此卿功也恵達雖居顯職性謙退善下人盡心勤公愛拔良士以此皆敬而附之薨子題嗣隋開皇初以恵達著績前代追封蕭國公馮景字長明河間武垣人也父傑為伏與令景少與周恵逹友俱以客從蕭寶夤寶夤後為尚書右僕射引景領尚書都令史正光中寶夤為闗西大行臺景又為行臺都令史及寶夤敗還長安或議歸罪闕下或言留州立功景曰擁兵不還此罪将大寶夤不從遂反及寶夤平景方得還洛朝廷聞景有諌言故不罪之後事賀拔岳為行臺郎岳使景詣齊神武察其行事神武聞岳使至甚有喜色問曰賀拔公詎憶吾耶與景㰱血託岳為兄弟景還以状報岳岳曰此姦有餘而實不足自古王臣無私盟者也吾料之熟矣岳北合費也頭東引紇豆陵伊利西總侯莫陳悅河州刺史梁景叡及酋渠為盟誓共會平涼移軍東下懼有専任之嫌使景啟孝武帝帝甚悅又為岳大都督府從事中郎侯莫陳悅平文帝使景於京師告㨗帝有西遷意因問闗中事勢景勸帝西遷後以迎孝武功封高陽縣伯除㪚騎常侍行臺尚書大統初詔行涇州事卒於官蘇綽字令綽武功人魏侍中則之九世孫也累世二千石父恊武功郡守綽少好學博覽羣書尤善算術從兄讓為汾州刺史文帝餞於都門外臨别謂曰卿家子弟之中誰可任用者讓因薦綽文帝乃召為行臺郎中在官歲餘未見知然諸曹疑事皆詢於綽而後定所行公文綽又為之條式臺中咸稱其能文帝與僕射周惠達論事恵達不能對請出外議之乃召綽以告其事綽即為量定恵達入呈文帝稱善曰誰與卿為此議者恵達以綽對因稱其有王佐之才文帝曰吾亦聞之久矣尋除著作佐郎屬文帝與公卿往昆明池觀漁行至城西故倉地顧問左右莫有知者或曰蘇綽博物多通請問之乃召綽問具以状對文帝大悅因問天地造化之始歴代興亡之迹綽既有口辯應對如流文帝益嘉之乃與綽並馬徐行至池竟不施網罟而還遂留綽至夜問以政道文帝卧而聽之綽於是指陳帝王之道兼述申韓之要文帝乃起整衣危坐不覺膝之前席語遂達曙不厭詰朝乃謂周恵達曰蘇綽眞竒士吾方任之以政即拜大行臺左丞參典機密自是寵遇日隆綽始制文案程式朱出墨入及計帳户籍之法大統三年齊神武三道入寇諸将咸欲分兵禦之獨綽意與文帝同遂併力拒竇泰擒之於潼闗封美陽縣伯十一年授大行臺度支尚書領著作兼司農卿文帝方欲革易時政務行彊國富民之道故綽得盡其智能贊成其事減官員置二長并置屯田以資軍國又為六條詔書奏施行之其一先脩心曰凡今之方伯守令皆受命天朝出臨下國論其尊貴並古之諸侯也是以前代帝王每稱共治天下者唯良守宰耳明知百僚卿尹雖各有所司然其治民之本莫若守宰之最重也凡治民之體當先治己心心者一身之主百行之本心不淸靜則思慮妄生思慮妄生則見理不明見理不明則是非謬亂是非既亂則一身不能自治安能治人也是以治民之要在於清心而已夫所謂淸心者非不貪貨財之謂乃欲使心氣清和志意端靜心和志靜則邪僻之慮無自而作邪僻不作則凡所思念無不皆得至公之理率至公之理以臨其人則彼下人孰不從化是以稱治民之本先在治心其次又在治身凡人君之身者乃百姓之表一國之的也表不正不可求直影的不明不可責射中今君身不能自治而望治百姓是猶曲表而求直影也君行不能自脩而欲百姓脩行者是猶無的而責射中也故為人君者必心如清水形如白玉躬行仁義躬行孝悌躬行忠信躬行禮讓躬行廉平躬行儉約然後繼之以無倦加之以明察行此八者以訓其人是以其人畏而愛之則而象之不待家敎目見而自興行矣其二敦敎化曰天地之性唯人為貴明其有中和之心仁恕之行異於木石不同禽獸故貴之耳然性無常守隨化而遷化於敦樸者則質直化於澆偽者則浮薄浮薄者則衰弊之風質直者則淳和之俗衰弊則禍亂交興淳和則天下自治自古安危興亡無不皆由所化也然世道雕喪已數百年大亂滋甚且二十載人不見徳惟兵革是聞上無敎化唯刑罰是用而中興始爾大難未弭加之以師旅因之以饑饉凡百草創率多權宜致使禮讓弗興風俗未反比年稍登稔徭賦差輕衣食不切則敎化可脩矣凡諸牧守令長各宜洗心革意上承朝㫖下宣敎化者貴能扇之以淳風浸之以大和被之以道徳示之以朴素使百姓亹亹日遷於善邪偽之心嗜慾之性潛以消化而不知其所以然此之謂化也然後敎之以孝悌使人慈愛敎之以仁順使人和睦敎之以禮義使人敬讓慈愛則不遺其親和睦則無怨於人敬讓則不競於物三者既備則王道成矣此之謂敎也先王之所以移風易俗還淳反素垂拱而臨天下以至於太平者莫不由此此之謂要道也其三盡地利曰人生天地之間衣食為命食不足則饑衣不足則寒饑寒切體而欲使人興行禮讓者此猶逆坂走丸勢不可得也是以古之聖王知其若此先足其衣食然後敎化隨之夫衣食所以足者由於地利盡地利所以盡者由於勸課有方主此敎者在乎牧守令長而已人者𡨕也智不自周必待勸敎然後得盡其力諸州郡縣每至嵗首必戒勑部人無問少長但能操持農器者皆令就田墾發以時勿失其所及布種既訖嘉苖須理麥秋在野蠶停於室若此之時皆宜少長悉力男女併功若揚湯救火寇盜之将至然後可使農夫不失其業蠶婦得就其功若游手怠惰早歸晚出好逸惡勞不勤事業者則正長牒名郡縣守令隨事加罰罪一勸百此則明宰之敎也夫百畆之田必春耕之夏種之秋收之然後冬食之此三時者農之要月也若失其一時則穀不可得而食故先王之戒曰一夫不耕天下必有受其饑者一婦不織天下必有受其寒者若此三時不務省事而令人廢農者是則絶人之命驅以就死然單劣之户及無牛之家勸令有無相通使得兼濟三農之隙及隂雨之暇又當敎人種桑植果藝其蔬菜脩其園圃畜育雞豚以備生生之資以供養老之具夫為政不欲過碎碎則人煩勸課亦不容太簡簡則人怠善為政者必消息時宜而適煩簡之中故詩曰不剛不柔布政優優百祿是遒如不能爾則必䧟於刑辟矣其四擢賢良曰天生蒸黎不能自化故必立君以理之人君不能獨理故必置臣以佐之上自帝王下及列國置臣得賢則安失賢則亂此乃自然之理百王不能易也今刺史縣令悉有僚吏皆佐助之人也刺史府官則命於天朝其州吏以下並牧守自置自昔以來州郡大夫但取門資多不擇賢良末曹小吏唯試刀筆並不問志行夫門資者乃先世之爵祿無妨子孫之愚瞽刀筆者乃身外之末材不廢性行之澆偽若門資之中而得賢良是則策騏驥而取千里也若門資之中而得愚瞽是則土牛木馬形似而用非不可以渉道也若刀筆之中而得志行是則金相玉質内外俱美實為人寶也若刀筆之中而得澆偽是則飾畫朽木悅目一時不可以充榱椽之用也今之選舉者當不限資蔭唯在得人苟得其人自可起厮養而為卿相則伊尹傅說是也而况州郡之職乎苟非其人則丹朱商均雖帝王之允不能守百里之封而况於公卿之胄乎由此而言官人之道可見矣凡所求材藝者為其可以理人若有材藝而以正直為本者必以材而為理也若有材藝而以姦偽為本者将因其官而亂也何致化之可得乎是故将求材藝必先擇志行善者則舉之其志行不善則去之而今擇人者多云邦國無賢莫知所舉此乃未之思也非適理之論所以然者古人有言明主聿興不降佐於昊天大人基命不擢才於后土常引一世之人理一世之務故殷周不待稷契之臣魏晉無假蕭曹之佐仲尼曰十室之邑必有忠信如丘者焉豈有萬家之都而云無士但求之不勤擇之不審或授之不得其所任之不盡其材故云無耳古人云千人之秀曰英萬人之英曰儁今之智効一官行聞一邦者豈非近英儁之士也但能勤而審之去虚取實各得州郡之最而用之則人無多少皆足化矣孰云無賢夫良玉未剖與瓦石相類名驥未馳與駑馬相雜及其剖而瑩之馳而試之玉石駑驥然後始分彼貧士之未用也混於凡品竟何以異要任之以事業責之以成務方與彼庸流較然不同昔吕望之屠釣百里奚之飯牛寗生之扣角管夷吾之三敗當此之時悠悠之徒豈謂其賢及升王朝登覇國積數十年功成事立始識其竒士也於是後世稱之不容於口彼瓌瑋之材不世之傑尚不能以未遇之時自異於凡品況降此者哉若必待太公而後用是千載無太公必待夷吾而後任是百世無夷吾所以然者士必從微而至著功必積小以至大豈有未任而已成不用而先達也若識此理則賢可求士可擇得賢而任之得士而使之則天下之理何向而不可成也然善官人者必先省其官官省則善人易充善人易充則事無不理官煩則必雜不善之人雜不善之人則政必有得失故語曰官省則事省事省則人淸官煩則事煩事煩則人濁清濁之由在於官之煩省案今吏員其數不少昔人殷事廣尚能克濟況今户口減耗依員而置猶以為少如聞在下州郡尚有兼假擾亂細人甚為無理諸如此輩悉宜罷黜無得習常非直州郡之官宜須善人爰至黨族閭里正長之職皆當審擇各得一鄉之選以相監統夫正長者理人之基基不傾者上必安凡求賢之路自非一途然所以得之審者必由任而試之考而察之起於居家至於鄉黨訪其所以觀其所由則人道明矣賢與不肖别矣率此以求則庶無愆悔矣其五恤獄訟曰人受隂陽之氣以生有情有性性則為善情則為惡善惡既分賞罰隨焉賞罰得中則怨止而善勸賞罰不中則人無所措手足而怨叛之心生是以先王重之特加戒愼者欲使察獄之官精心悉意推究根源先之以五聽參之以徴驗妙覩情狀窮鑒隱伏使姦無所容罪人必得然後隨事加刑輕重皆當舍過矜愚得情勿喜又能消息情理斟酌禮律無不曲盡人心而逺明大敎使獲罪者如歸此則善之上者也然宰守非一不可人人皆有通識推理求情時或難盡唯當率至公之心去阿枉之志務求曲直念盡平當聽察之理必窮所見然後考訊以法不苛不暴有疑則從輕未審不妄罰隨事斷理獄無停滯此亦其次若乃不仁恕而肆其殘暴同人木石専用捶楚巧詐者雖事彰而獲免辭弱者乃無罪而被罰有如此者斯則下矣非共理所寄今之宰守當勤於中科而慕其上善如在下條則刑所不赦又當深思逺大念存徳敎先王之制曰與殺無辜寧赦有罪與其害善寧其利滛明必不得中寧濫捨有罪不謬害善人也今之從政者則不然深文巧劾寧致善人於法不免有罪於刑所以然者非皆好殺人也但云為吏寜酷可免後患此則情有自便不念至公奉法如此皆姦人也夫人者天地之貴物一死不可復生然楚毒之下以痛自誣不被申理遂陷刑戮者将恐往往而有是以自古以來設五聽三宥之法著明愼庶獄之典此皆愛人甚也凡伐木殺草田獵不順尚違時令而虧帝道況刑罰不中濫害善人寧不傷天心犯和氣和氣損而欲陰陽調適四時順序萬物阜安蒼生悅樂者不可得也故語曰一夫吁嗟王道為之傾覆正謂此也凡百宰守可無愼乎若深姦巨猾傷化敗俗悖亂人倫不忠不孝故為背道殺一利百以淸王化重刑可也識此二途則刑政盡矣其六均賦役曰聖人之大寶曰位何以守位曰仁何以聚人曰財以仁守位國而無財位不可守是故三五以來皆有征稅之法雖輕重不同而濟用一也今寇逆未平軍國費廣雖未遑減省以䘏人瘼然宜令平均使下無怨平均者不舍豪彊而徵貧弱不縱姦巧而困愚拙此之謂均也故聖人曰盖均無貧然財貨之生其均不易紡紝織績起於有漸非旬日之間所可造次必須勸課使豫營理絹鄉先事織紝麻土早脩紡績及時而備至時而輸故王賦獲供下人無困如其不豫勸戒臨時廹切復恐稽緩以為己過捶扑交至取辦目前富商大賈緣兹射利有者從之貴愛無者與之舉息輸稅之人於是弊矣租稅之時雖有大式至於斟酌貧富差次先後皆事起於正長而繫之於守令若斟酌得所則政和而民悅若檢理無方則吏姦而人怨又差發徭役多不存意致令貧弱者或重徭而逺戍富彊者或輕使而近防守令用懷如此不存䘏民之心皆王政之罪人也文帝甚重之常置諸坐右又令百司習誦之其牧守令長非通六條及計帳者不得居官自有晉之季文章競為浮華遂以成俗文帝欲革其弊因魏帝祭廟羣臣畢至乃命綽為大誥奏行之其辭曰唯中興十有一年仲夏庶邦百辟咸會於王庭柱國泰洎羣公列将莫不來朝時乃大稽百憲敷於庶邦用綏我王度皇帝若曰昔尭命羲和允釐百工舜命九官庶績咸熙武丁命說克號高宗時休哉朕其欽若格爾有位胥暨我太祖之庭朕将丕命爾以厥官六月丁巳皇帝朝格於太廟凡厥具僚罔不在位皇帝若曰咨我元輔羣公列将百辟卿士庶尹御事朕唯寅敷祖宗之靈命稽於先王之典訓以大誥於爾在位昔我太祖神皇肇膺明命以創我皇基烈祖景宗廓開四表底定武功暨乎文祖誕敷文徳龔惟孝武不霣其舊自時厥後陵夷之弊用興大難於彼東土則我黎庶咸墜塗炭惟台一人纘戎下武夙夜祗畏若渉大川罔識攸濟是用稽於帝典揆於王度拯我民瘼惟彼哲王示我通訓曰天生黎蒸罔克自乂上帝降鑒叡聖植元后以乂之時惟元后弗克獨乂博求明徳命百辟羣吏以佐之肆天之命辟辟之命官惟以恤人弗惟逸豫辟惟元首黎元惟趾股肱惟弼上下一體各勤攸司兹用克臻於皇極故皇其彛訓曰后克艱厥后臣克艱厥臣政乃乂今台一人膺天之嘏既陟元后股肱百辟乂服我國家之命罔不咸守厥職嗟后弗艱厥后臣弗艱厥臣政於何弗繹嗚呼艱哉凡爾在位其敬聽命皇帝若曰柱國唯四海之不造載繇二紀我太祖烈祖之用命用錫我以元輔國家将墜公惟棟樑皇之弗極公惟作相百揆諐度公惟大錄公其允文允武克明克乂廸七徳敷九功龕暴除亂下綏我蒼生傍施於九正若伊之在商周之有吕說之相丁用保無疆之祚皇帝若曰羣公太宰太尉司徒司空惟公作朕鼎足以弼於朕躬宰惟天官克諧六職尉惟司武武在止戈徒惟司衆敬敷五敎空惟司土利用厚生惟時三事若三階之在天惟兹四輔若四時之成嵗天工人其代諸皇帝若曰列将汝惟鷹揚作朕爪牙寇賊姦宄蠻夷猾夏汝徂征綏之以恵董之以威刑期無刑萬邦咸寧俾八表之内莫違朕命時汝功皇帝若曰庶邦列辟汝惟守土作民父母人惟不勝其饑故先王重農不勝其寒故先王貴女工人之不率於孝慈則骨肉之恩薄弗惇於禮讓則爭奪之萌生惟兹六物實為敎本嗚呼為上克寛寛則人怠齊之以禮不剛不柔稽極於道皇帝若曰卿士庶尹凡百御事王省惟嵗卿士惟月庶尹惟日御事惟時嵗月日時罔易其度百憲咸貞庶績其凝嗚呼惟若王官陶鈞萬國若天之有斗斟元氣酌隂陽弗失其和蒼生永頼悖其序萬物以傷時惟艱哉皇帝若曰惟天地之道一隂一陽禮俗之變一文一質爰自三五以迄於兹匪惟相革惟其救弊匪惟相襲惟其可久唯我有魏承乎周之末流接秦漢遺弊襲魏晉之華誕五代澆風因而未革将以穆俗興化庸可暨乎嗟我公輔庶僚列辟朕惟否徳其一朕心力祗愼厥艱克遵前王之丕顯休烈弗敢怠荒咨爾在位亦叶於朕心惇徳允元惟厥艱是務克損厥華即厥實背厥偽崇厥誠勿諐勿忘一乎三代之彛典歸於道徳仁義用保我祖宗之丕命荷天之休克綏我萬方永康我黎庶戒之哉朕言不再柱國泰洎庶僚百辟拜手稽首曰亶聰明作元后元后作民父母惟三五之王率繇此道用臻於刑措自時厥後歴千載未聞惟帝念功将反叔世逖致於雍熙庸錫降丕命於我羣臣博哉王言非言之難行之實難臣聞靡不有初鮮克有終商書曰終始惟一徳乃日新惟帝敬厥始愼厥終以躋日新之徳則我羣臣敢不夙夜對揚休命惟兹大誼未光於四表以邁種徳俾九域幽遐咸昭奉元后之明訓率遷於道永膺無疆之休帝曰欽哉自是之後文筆皆依此體綽性儉素不事產業家無餘財以海内未平常以天下為己任博求賢俊共𢎞政道凡所薦達皆至大官文帝推心委任而無間言或出遊嘗預署空紙以授綽若須有處分則隨事施行及還啟知而已綽嘗謂為國之道當愛人如慈父訓人如嚴師每與公卿議論自晝達夜事無巨細若指諸掌積思勞倦遂成氣疾十二年卒於位年四十九文帝痛惜之哀動左右及将葬乃謂公卿曰蘇尚書平生謙約吾欲全其素志便恐悠悠之徒有所未逹如其厚加贈諡又乖宿昔相知之道進退維谷孤有疑焉尚書令史麻瑶越次而進曰昔晏子齊之賢大夫一狐裘三十年及其死也遣車一乘齊侯不奪其志綽既操履清白謙挹自居愚謂宜從儉約以彰其美文帝曰善因薦瑶於朝廷及綽歸葬武功惟載以布車一乘文帝與羣公歩送出同州郭門外文帝親於車後酹酒而言曰尚書平生為事妻子兄弟不知者吾皆知之惟爾知吾心吾知爾意方欲共定天下不幸遂捨吾去奈何舉聲一慟不覺巵墜於手至葬日又遣使祭以太牢文帝自為其文綽又著佛性論七經論並行於世明帝二年以綽配太祖廟庭子威嗣威隋史有傳綽弟椿字令欽性廉愼沈勇有決斷魏正光中闗右賊亂椿應募討之受盪寇将軍以功累遷中散大夫賜爵美陽子大統初拜鎭東将軍金紫光祿大夫賜姓賀蘭氏後除都督行𢎞農郡事椿當官彊濟特為文帝所知十四年置黨州鄉師自非鄉望允當衆心不得預焉乃令驛追椿領鄉兵其年破槃頭氐有功除散騎常侍加大都督十六年征隨郡軍還除武功郡守既為本邑以淸儉自居小大之政必盡忠恕進爵為侯位驃騎大将軍開府儀同三司大都督卒子植嗣盧辯字景宣范陽涿人累世儒學父靜魏太常丞辯少好學博通經籍正光初舉秀才為太學博士以大戴禮未有解詁辯乃注之其兄景裕為當時碩儒謂辯曰昔侍中注小戴今爾注大戴庶纂前修矣侍中辯叔父同也節閔帝立除中書舍人屬齊神武起兵信都既破爾朱氏遂鼓行指洛節閔遣辯持節勞之於鄴神武令辯見其所奉中興主辯抗節不從神武怒曰我舉大義誅羣醜車駕在此誰遣爾來辯抗言酬答守節不撓神武異之捨而不逼孝武即位以辯為廣平王贊師永熙二年平等浮屠成孝武會萬僧於寺石佛低舉其頭終日乃止帝禮拜之辯曰石立社移自古有此陛下何怪及帝入闗事起倉卒辯不及至家單馬而從或問辯曰得辭家不辯曰門外之道以義斷恩復何辭也帝至長安封范陽縣公授給事黄門侍郎領著作加本州大中正文帝以辯有儒術甚禮之朝廷大議常召顧問遷太子少保領國子祭酒趙靑雀之亂魏太子出居渭北辯時隨從亦不告家人其執志敢決皆此類也尋除太常卿太子少傅魏太子及諸王等皆行束脩之禮受業於辯進爵范陽郡公轉少師自魏末離亂孝武西遷朝儀湮墜於時朝廷憲章乘輿法服金石律吕晷刻渾儀咸令辯因時制宜皆合軌度多依古禮性彊記黙識能斷大事凡所創制處之不疑加驃騎大将軍開府儀同三司累遷尚書令及六官建為師氏中大夫明帝即位遷小宗伯進位大将軍帝嘗與諸公幸其第儒者榮之出為宜州刺史以患不之部薨諡曰獻配食太祖廟廷子愼嗣位復州刺史愼弟詮性趫㨗善騎射位儀同三司隋開皇初以辯前代名徳追封沈國公初文帝欲行周官命蘇綽専掌其事未幾而綽卒乃令辯成之於是依周禮建六官革漢魏之法以魏恭帝三年始命行之六卿之外置太師太傅太保各一人是曰三孤時未建東宫其太子官員改創未畢尋又改典命為大司禮置中大夫自兹厥後世有損益武成元年增御正四人位上大夫保定四年改宗伯為納言禮部為司宗大司禮為禮部大司樂為樂部五年左右武伯各置大夫一人以建徳元年改置宿衛官員二年省六府諸司中大夫以下官府置四司以下大夫為官之長士貳之是嵗又增改東宫官員三年初置太子諌議大夫員四人文學十人皇弟皇子友員各二人學士六人四年又改置宿衛官員其司武司衛之類皆後所增改太子正宫尹之屬亦後所創置而典章㪚滅弗可復知宣帝嗣位事不師古官員班品隨意變革至如初置四輔官及六府諸司復置中大夫並御正内史增置上大夫等則載於外史餘則朝出夕改莫能詳錄於時雖行周禮其内外衆職又兼用秦漢等官今略舉其名號及命數附之於左其紀傳内更有餘官而此不載者亦史之闕文也柱國大将軍建徳四年增置上柱國上将軍也右正九命驃騎大将軍開府儀同三司建徳四年改為開府儀同大将軍仍增上開府儀同大将軍車騎大将軍儀同三司建徳四年改為儀同大将軍仍增上儀同雍州牧右正九命驃騎大将軍右光祿大夫車騎将軍左光祿大夫户三萬以上州刺史右正八命征東征西征南征北中軍鎭軍撫軍等将軍左右金紫光祿大夫大都督户二萬以上州刺史京兆尹右八命平東平西平南平北前右左後等将軍左右銀靑光祿大夫帥都督柱國大将軍府長史司馬司錄户一萬以上州刺史右正七命冠軍輔國等将軍太中中㪚等大夫都督户五千以上州刺史户一萬五千以上郡守右七命鎭逺建忠等将軍諫議諮議等大夫别将開府長史司馬司錄户不滿五千以下州刺史一萬以上郡守大呼藥右正六命中堅寧朔等将軍左右中郎将儀同府正八命州長史司馬司錄户五千以上郡守小呼藥右六命寧逺揚烈等将軍左右員外常侍統軍驃騎車騎将軍府八命州長史司馬司錄柱國大将軍府中郎掾屬户一千以上郡守長安萬年縣令右正五命伏波輕車等将軍奉車奉騎等都尉四征中鎭撫将軍府正七命州長史司馬司錄開府府中郎掾屬户不滿一千以下郡守户七千以上縣令正八命州呼藥右五命宣威眀逺等将軍虎賁冗從等給事儀同府中郎掾屬柱國大将軍府列曹參軍四平前右左後将軍府七命州長史司馬司錄正八命州别駕户四千以上縣令八命州呼藥右正四命襄威厲威等将軍給事中奉朝請軍主開府列曹參軍冠軍輔國将軍府正六命州長史司馬司錄正七命州别駕正八命州中從事七命郡丞户二千以上縣令正七命州呼藥右四命威烈討寇等将軍左右員外侍郎幢主儀同府正八命州列曹參軍柱國大将軍府參軍鎭逺建忠中堅寧朔将軍府長史司馬司錄正六命州别駕正七命州中從事正六命郡丞户五百以上縣令七命州呼藥右正三命蕩寇蕩難等将軍武騎常侍侍郎開府參軍驃騎車騎将軍府八命州列曹參軍寧逺揚烈伏波輕車将軍府長史正六命州中從事六命郡丞户不滿五百以下縣令戍主正六命州呼藥右三命殄寇殄難等将軍彊弩積弩等司馬四征中鎭撫将軍府正七命州列曹參軍正五命郡丞右正二命掃寇掃難等将軍武騎武威等司馬四平前右左後将軍府七命州列曹參軍五命郡丞戍副右二命曠野横野等将軍殿中員外二司馬冠軍輔國将軍府正六命州列曹參軍右正一命虎威虎牙等将軍淮海山林二都尉鎭逺建忠中堅寜朔寜逺揚烈伏波輕車将軍府列曹參軍右一命周制封郡縣五等爵者皆加開國授柱國大将軍開府儀同者並加使持節大都督其開府又加驃騎大将軍侍中其儀同又加車騎大将軍㪚騎常侍其授總管刺史則加使持節諸軍事以此為常大象元年詔總管刺史及行兵者加持節餘悉罷之辯所制定之後又有改革今粗附之云辯弟光字景仁性温謹博覽羣書精於三禮善隂陽解鐘律又好元言魏孝昌初釋褐司空府參軍事及孝武西遷光於山東立義遥授晉州刺史大統六年攜家西入除丞相府記室參軍賜爵范陽縣伯俄拜行臺郎中専掌書記改封安息縣伯歴位京兆郡守侍中開府儀同三司匠師中大夫進爵燕郡公虞州刺史行陜州總管府長史卒官武帝少嘗受業於光故賻贈有加恒典贈少傅諡曰簡光性崇佛道至誠信敬嘗從文帝狩於檀臺山時獵圍既合帝遥指山上謂羣公曰公等有所見不咸曰無所見光獨曰見一桑門帝曰是也即解圍而還令光於桑門立處造浮圖掘基一丈得瓦鉢錫杖各一帝稱歎因立寺焉及為京兆而郡舍先是數有妖怪前後郡将無敢居者光曰吉凶由人妖不妄作遂入居之未幾光所乘馬忽升聽事登牀南首而立食器無故自破光並不以介懷其精誠守正如此注道徳經章句行於世子賁嗣賁列在隋史韋叔裕字孝寛京兆杜陵人也少以字行世為三輔著姓祖直善魏馮翊扶風二郡守父旭武威郡守建義初為大行臺右丞加輔國将軍雍州大中正永安二年拜右将軍南幽州刺史時氐賊數為抄竊旭隨機招撫並即歸附尋卒官贈司空冀州刺史諡曰文恵孝寛沈敏和正渉獵經史年十五便有壮志善籌算識者稱之屬蕭寶夤作亂闗右乃詣闕請為軍前驅朝廷嘉之即拜統軍隨馮翊公長孫承業西征每戰有功拜國子博士行華山郡事屬侍中楊侃為大都督出鎮潼闗引孝寛為司馬侃竒其才以女妻之永安中授宣威将軍給事中尋賜爵北山縣男普泰中以都督從荆州刺史源子恭鎭穰城以功除淅陽郡守時獨孤信為新野郡守同𨽻荆州與孝寛情好欵密政術俱美荆州部吏民號為連璧孝武初以都督鎭彭城文帝自原州赴雍州命孝寛隨軍及克潼闗即授𢎞農郡守從擒竇泰兼左丞節度宜陽兵馬事仍與獨孤信入洛為陽城郡守復與宇文貴怡峯應接潁州義從破東魏将任祥尭雄於潁川孝寛又進平樂口下豫州獲刺史馮邕又從戰於河橋時大軍不利邊境騷然乃令孝寛以本将軍行宜陽郡事尋遷南兖州刺史是歳東魏将軍叚琛據宜陽號驍猛遣其揚州刺史牛道恒扇誘邊民孝寛深患之乃遣諜人訪獲道恒手迹令善學書者偽作道恒與孝寛書論歸欵之意又為落燼燒迹若火下書者令諜人遺之於琛營琛得書果疑道恒其所欲經略皆不見用孝寛知其離阻因出竒兵掩襲禽道恒及琛等崤澠遂淸大統五年進爵為侯八年轉晉州刺史尋移鎭玉壁兼攝南汾州事先是山胡負險屢為刼盜孝寛示以威信州境肅然進授大都督十二年齊神武傾山東之衆志圖西入以玉壁衝要先命攻之連營數十里至於城下乃於城南起土山欲乘之以入當其山處城上先有兩高樓孝寛更縛木接之令極高峻多積戰具以禦之齊神武使謂城中曰縱爾縛樓至天我會穿城取爾遂於城南鑿地道又於城北起土山攻具晝夜不息孝寛復掘長壍要其地道仍簡戰士屯壍城外每穿至壍戰士即擒殺之又於壍外積柴貯火敵人有在地道内者便下柴下以皮排吹之火氣一衝咸即灼爛城外又造攻車車之所及莫不摧毁雖有排楯莫之能抗孝寛乃縫布為縵隨其所向則張設之布懸於空中其車竟不能壞城外又縛松於竿灌油加火規以燒布并欲焚樓孝寛復作長鐡鈎利其鋒刃火竿既來以鈎遥割之松麻俱落外又於城四面穿地作二十一道分為四路於其中各施梁柱作訖以油灌柱放火燒之柱折城並崩壞孝寛又隨崩處豎木柵以扞之敵不得入城外盡其攻擊之術孝寛咸拒破之神武無如之何乃遣倉曹參軍祖孝徴謂曰未聞救兵何不降也孝寛報云我城池嚴固兵食有餘攻者自勞守者常逸豈有旬朔之間己須救援適憂爾衆有不反之危韋孝寛闗西男子必不為降将軍也俄而孝徴復來謂城中人曰韋城主受彼榮祿或復可爾自外軍士何事相隨入湯火中邪乃射募格於城中云能斬城主降者拜太尉封開國郡公邑萬户賞帛萬疋孝寛手題書背反射城外云若有斬高歡者一依此賞孝寛弟子遷先在山東又鎻至城下臨以白刃云若不早降便行大戮孝寛慷慨激揚畧無顧意士卒莫不感勵人有死難之心齊神武苦戰六旬傷及病死者十四五智力俱困因而發疾其夜燒營而遁因此忿恚發病而殂魏文帝嘉孝寛功令殿中尚書長孫紹逺左丞王悅至玉壁勞問授驃騎大将軍開府儀同三司進爵建忠郡公廢帝二年為雍州刺史先是路側一里置一土堠經雨頽毁每須修之自孝寛臨州乃勒部内當土堠處植槐樹代之既免修復行旅又得庇廕文帝後見怪問知之曰豈得一州獨爾當令天下同之於是令諸州夾道一里種一樹十里種三樹百里種五樹焉魏恭帝元年以大将軍與燕公于謹伐江陵平之以功封穰縣公還拜尚書右僕射賜姓宇文氏三年文帝北廵命孝寛還鎭玉壁孝閔帝踐阼拜小司徒明帝初參麟趾殿學士考校圖籍保定初以孝寛立勳玉壁遂於玉壁置勳州仍授勳州刺史齊人遣使置玉壁求通互市晉公䕶以其相持日久絶無使命一旦忽來求交易疑别有故又以皇姑皇世母先没在彼因其請和之際或可致之遂令司門下大夫尹公正至玉壁與孝寛詳議孝寛乃於郊盛設供帳令公正接對使人兼論皇家親屬在東之意於是使者忻然辭色甚悅時又有汾州胡抄得闗東人孝寛復放東還并致書一牘具陳國家欲敦隣好遂以禮送皇姑及䕶母等孝寛善於撫御能得人心所遣間諜入齊者皆為盡力亦有齊人得孝寛金貨遥通書疏故齊人動靜朝廷皆得先知時有主帥許盆孝寛委以心膂令守一城盆乃以城東入孝寛怒遣諜取之俄而斬首而還其能致物情如此汾州之北離石以南悉是生胡抄掠居民阻斷河路孝寛深患之而地入於齊無方誅翦欲當其要處置一大城乃於河西徵役徒十萬甲士百人遣開府姚岳監築之岳色懼以兵少為難孝寛曰計成此城十日即畢既去晉州四百餘里一日創手二日偽境始知設令晉州徴兵二日方集謀議之間自稽三日計其軍行二日不到我之城隍足得辦矣乃令築之齊人果至南首疑有大軍乃停留不進其夜又令汾水以南傍界山稷山諸村所在縱火齊人謂是軍營遂収兵自固版築克就卒如孝寛言四年進位柱國時晉公䕶将東討孝寛遣長史辛道憲啟陳不可䕶不從既而大軍果不利後孔城遂陷宜陽被圍孝寛乃謂其将帥曰宜陽一城之地未能損益然兩國爭之勞師數載彼多君子寧乏謀猷若棄崤東來圖汾北我之疆界必見侵擾今宜於華谷及長秋速築城以杜賊志脱其先我圖之實難於是畫地形具陳其状晉公䕶令長史叱羅恊謂使人曰韋公子孫雖多數不滿百汾北築城遣誰固守事遂不行天和五年進爵鄖國公増邑通前萬户是歳齊人解宜陽之圍經畧汾北築城守之其丞相斛律明月率數十騎至汾東請與孝寛相見眀月云宜陽小城久勞戰爭今既入彼欲於汾北取償幸勿怪也孝寛答曰宜陽彼之要衝汾北我之所棄我棄彼圖取償安在且君輔翼㓜主位重望隆理宜調隂陽撫百姓焉用極武窮兵結怨連禍且滄瀛大水千里無煙復欲使汾晉之間横尸暴骨苟貪尋常之地塗炭疲弊之民竊為君不取也時孝寛參軍曲巖頗知卜筮謂孝寛曰來年東朝必大相殺戮孝寛因令巖作謡歌曰百升飛上天明月照長安百升斛也又言高山不摧自崩槲木不扶自豎令諜人多齎此文遺之於鄴祖孝徴既聞更潤色之明月竟以此誅建徳之後武帝志在平齊孝寛乃上疏陳平齊三䇿其第一曰臣在邊積年頗見間隙不因際會難以成功是以往嵗出軍頗有勞費功績不立由失機會何者長淮之南舊為沃土陳氏以破亡餘燼猶能以一舉平之齊人歴年赴救䘮敗而反内離外叛計盡力窮傳不云乎讐有釁焉不可失也今大軍若出軹闗方軌而進兼與陳氏共為犄角并令廣州義旅出自三鵶又募山南驍鋭沿河而下復遣北山稽胡絶其并晉之路凡此諸軍仍令各募闗河之外勁勇之士厚其爵賞使為前驅岳動山移雷駭電激百道俱進並趨虜庭必當望旗奔潰所向摧殄一戎大定實在此機其第二策曰若國家更為後圖未即大舉宜與陳人分其兵勢三鵶以北萬春以南廣事屯田預為積貯募其驍悍立為部伍彼既東南有敵戎馬相持我出竒兵破其疆埸彼若興師赴援我則堅壁清野待其去逺還復出師常以邊外之軍引其腹心之衆我無宿舂之費彼有奔命之勞一二年中必自離叛且齊氏昏暴政出多門鬻獄賣官唯利是視荒淫酒色忌害忠良闔境熬然不勝其弊以此而觀覆亡可待然後乘間電掃事等摧枯其第三策曰竊以大周土宇跨據闗河蓄席捲之威持建瓴之勢太祖受天明命與物更新是以二紀之中大功克舉南淸江漢西龕巴蜀塞表無虞河右底定唯彼趙魏獨為榛梗者正以有事三方未遑東畧遂使漳滏游魂更存餘晷昔勾踐平吳尚期十載武王取亂猶煩再舉今若更存遵養且復相時臣謂宜還崇隣好申其盟約安民和衆通商恵工蓄銳養威觀釁而動斯則長策逺馭坐自兼并也書奏武帝遣小司寇淮南公元衛開府伊婁謙等重幣聘齊爾後遂大舉再駕而定山東卒如孝寛之䇿孝寛每以年迫懸車屢請致仕帝以海内未平優詔弗許至是復稱疾乞骸骨帝曰往已靣申本懷何煩重請也五年帝東伐過幸玉壁觀禦敵之所深歎美之移時乃去孝寛自以習練齊人虚實請為先驅帝以玉壁要衝非孝寛無以鎭之乃不許及趙王招率兵出稽胡與大軍犄角乃勑孝寛為行軍總管圍守華谷以應接之孝寛克其四城武帝平晉州復令孝寛還舊鎭及帝凱旋復幸玉壁從容謂孝寛曰世稱老人多智善為軍謀然朕唯共少年一舉平賊公以為如何孝寛對曰臣今衰耄唯有誠心而已然昔在少壮亦曾輸力先朝已定闗右帝大笑曰實如公言乃詔孝寛隨駕還京拜大司空出為延州總管進位上柱國大象元年除徐兖等十一州十五鎭諸軍事徐州總管又為行軍元帥狥地淮南及分遣杞公宇文亮攻黄城郕公梁士彥攻廣陵孝寛率衆攻壽陽並拔之初孝寛到淮南所在皆密送款然彼五門尤為險要陳人若開塘放水即津濟路絶孝寛遽令分兵據守之陳刺史吳文立果遣決堰已無及於是陳人退走江北悉平軍還至豫州宇文亮舉兵文立以數百騎襲孝寛營時亮國官茹寛密白其状孝寛有備亮不得入乃遁走孝寛追獲之詔以平淮南之功别封一子滑國公及宣帝崩隋文帝輔政時尉遅迥先為相州總管詔孝寛代之又以小司徒叱列長文為相州刺史先令赴鄴孝寛續進至朝歌迥遣其都督賀蘭貴齎書候孝寛孝寛留貴與語以察之疑其有變遂稱疾徐行又使人至相州求醫藥密以伺之既到湯隂値長文奔還孝寛兄子魏郡守藝又棄郡南走孝寛審知其状乃馳歸所經橋道皆令毁撤驛馬悉擁以自備又勒驛将曰蜀公将至可多備餚酒及芻粟以待之迥果遣儀同梁子康将數百騎追孝寛驛司供設豐厚所經之處皆輙停留由是不及時或勸孝寛以為洛京虚弱素無守備河陽鎭防悉是闗東鮮卑迥若先往據之則為禍不小乃入保河陽河陽城内舊有鮮卑八百人家並在鄴見孝寛輕來謀欲應迥孝寛知之遂密造東京官司詐稱遣行分人詣洛受賜既至洛陽並留不遣因此離解其謀不成六月詔發闗中兵以孝寛為元帥東伐七月軍次河陽迥所署儀同薛公禮圍逼懷州孝寛遣兵擊破之進次懷縣永橋城之東南其城既在要衝雉堞牢固迥已遣兵據之諸将士以此城當路請先攻取孝寛曰城小而固若攻而不拔損我兵威今破其大軍此亦何能為也於是引軍次于武陟大破迥子惇惇輕騎奔鄴軍進次於鄴西門豹祠之南迥自出戰又破之迥窮廹自殺兵士在小城中盡阬之㳺豫圍諸有未服者皆隨機討之闗東悉平十月凱還京師十一月薨時年七十二贈太傅十二州諸軍事雍州牧諡曰襄孝寛在邊多載屢抗彊敵所有經畧布置之功人莫之解見其成事方乃驚服雖在軍中篤意文史政事之餘每自披閲末年患眼猶令學士讀而聽之又早喪父母事兄嫂甚謹所得俸祿不入私房親族有孤遺者必加賑贍朝野以此稱焉長子諶年已十嵗魏文帝欲以女妻之孝寛辭以兄子世康年長帝嘉之遂以妻世康孝寛有六子總壽霽津知名總字善會聰敏好學位驃騎大将軍開府儀同三司納言京兆尹武帝常戯總曰卿師尹帝鄉故當不以富貴威福鄉里邪總乃正色對曰陛下擢臣非分竊謂己鑒愚誠今奉嚴㫖便似未照丹赤豈可久忝此職用疑聖慮請解印綬以避賢能帝大笑曰前言戲之耳從武帝東征總每率麾下先驅䧟陣遂於并州戰没時年二十九贈上大将軍追封河南郡公諡曰貞六年重贈柱國五州刺史子國成嗣後襲孝寛爵鄖國公隋文帝追錄孝寛舊勳開皇初詔國成食封三千户収其租稅壽字世齡以貴公子早有令譽位京兆尹武帝親征齊委以後事以父軍功賜爵永安縣侯隋文帝為丞相以其父平尉遲迥拜壽儀同三司進封滑國公文帝受禪歴毛恒二州刺史頗有能名以疾徴還卒於家諡曰定仁夀中文帝為晉王廣納其女為妃其子保巒嗣壽弟霽位太常少卿安邑縣伯霽弟津位内史侍郎户部侍郎判尚書事孝寛兄夐字敬逺志尚夷簡澹於榮利弱冠召拜雍州治中從事非其好也遂謝病去職前後十見徵辟皆不應命屬文帝經綸王業側席求賢聞夐養高不仕虚心敬悅遣使辟之備加禮命雖情諭甚至而竟不能屈文帝彌重之亦不之奪也所居之宅枕帶林泉夐對玩琴書蕭然自逸時人號為居士焉至有慕其閑素者或載酒從之夐亦為之盡歡接對㤀倦明帝即位禮敬逾厚乃為詩以貽之曰六爻貞遯世三辰光少微潁陽讓逾逺滄洲云不歸香動秋蘭佩風飄蓮葉衣坐石窺仙洞乘槎下釣磯嶺松千仞直巖泉百丈飛聊登平樂觀遥望首陽薇詎能同四隱來參予萬機夐答帝詩願時朝謁帝大悅勑有司日給河東酒一斗號之曰逍遥公時晉公䕶執政廣營第宅嘗召夐至宅訪以政事夐仰觀其堂徐而歎曰酣酒嗜音峻宇雕牆有一于此未或不亡䕶不悅有識者以為知言陳遣其尚書周𢎞正來聘素聞夐名請與相見朝廷許之𢎞正乃造夐談謔盡日恨相遇之晚後請夐至賓館夐不時赴𢎞正乃贈詩曰徳星猶未動眞車詎肯來其為當時所欽挹如此武帝嘗與夐夜宴大賜之縑帛令侍臣數人負以送出夐惟取一疋示承恩㫖而已帝以此益重之孝寛為延州總管時夐至州與孝寛相見及還孝寛送以所乘馬及轡勒與夐夐以其華飾心弗欲之笑謂孝寛曰昔人不棄遺簮墜屨者惡與之同出不與之同歸吾之操行雖不逮前烈然捨舊錄新亦非吾志也於是乃乘舊馬以歸武帝又以佛道儒三敎不同詔夐辯其優劣夐以三敎雖殊同歸於善其迹似有深淺其理致如無等級乃著三敎序奏之帝覽而稱善時宣帝在東宫亦遺夐書并令以帝所乘馬迎之問立身之道夐對曰傳不云乎儉為徳之共侈為惡之大欲不可縱志不可滿並聖人之訓也願殿下察之夐子瓘行隨州刺史因疾殁故孝寛子總復於并州戰殁一日之中㐫問俱至家人相對悲慟而夐神色自若謂之曰死生命也去來常事亦何足悲援琴撫之如舊夐又雅好名義虚襟善誘雖耕夫豎子有一介可稱者皆接引之特與族人處元及安定梁曠為放逸之友少愛文史留情著述手自抄錄數十萬言晚年虚靜唯以體道會真為務舊所制述咸削其藁故文筆多不載建徳中夐以年老預戒其子等曰昔士安以籧篨束體王孫以布囊繞尸二賢高達非庸才能繼吾死之日可斂以舊衣勿更新造使棺足周尸牛車載柩墳高四尺壙深一丈其餘煩雜悉無用也朝晡奠食於事彌煩吾不能頓絶汝軰之情可朔望一奠而已但薦蔬食勿設牲牢親友欲以物弔祭者並不得為受吾恐臨終恍惚故以此言預戒汝輩瞑目之日勿違吾言也宣政元年二月卒於家時年七十七諸子皆為方伯柱國武帝遣使弔祭賻贈有加其喪制葬禮諸子並遵其遺戒子世康洸瓘藝沖並列在隋史韋瑱字世珍京兆杜陵人也世為三輔著姓曾祖恵度姚泓尚書郎隨劉義眞過江仕宋為順陽太守行南雍州事後於襄陽歸魏拜中書侍郎贈洛州刺史祖干雄畧陽郡守父英代郡守贈兖州刺史瑱幼聰敏有夙成之量起家太尉府法曹參軍累遷諫議大夫文帝為丞相封長安縣男轉行臺左丞遷南郢州刺史復令為行臺左丞瑱明察有幹局再居左轄時論榮之從復𢎞農戰沙苑加衞大将軍左光祿大夫從戰河橋進爵為子大統八年齊神武侵汾絳瑱從文帝禦之軍還以本官鎭蒲津闗帶中潬城主歴鴻臚卿以望族兼領鄉兵加帥都督進㪚騎常侍魏恭帝三年賜姓宇文氏三年除瓜州刺史州通西域蕃夷往來前後刺史多受賂遺胡寇犯邊又莫能禦瑱雅性清儉兼有武畧蕃夷贈遺一無所受胡人畏服不敢為寇公私安靜夷夏懷之孝閔帝踐阼進爵平齊縣伯秩滿還京吏民戀慕老幼追送留連十數日方得出境明帝嘉之授侍中驃騎大将軍開府儀同三司卒贈岐宜二州刺史諡曰恵又追封為公詔其子峻襲峻位至車騎大将軍儀同三司峻子徳政隋大業中給事郎峻弟師隋史有傳桞蚪字仲蟠河東解人也五世祖恭仕後趙為河東郡守後以秦趙喪亂率民南徙居汝潁間遂仕江表祖緝同州别駕宋安郡守父僧習善隸書敏於當世與豫州刺史裴叔業據州歸魏歴北地潁川二郡守揚州大中正蚪年十三便専精好學時貴游子弟就學者並車服華盛唯蚪不脩容飾徧受五經畧通大義兼渉子史雅好屬文舉秀才兖州刺史馮儁引蚪為府主簿既而樊子鵠為吏部尚書其兄義為揚州刺史乃以蚪為揚州從事加鎭逺将軍非其好也棄官還洛陽屬天下喪亂乃退耕於陽城有終焉之志大統三年馮翊王元季海領軍獨孤信鎭洛陽于時舊京荒廢人物罕存唯有蚪在陽城裴諏在潁川信等乃俱徴之以蚪為行臺郎中諏為北府屬並掌文翰時人為之語曰北府裴諏南府栁蚪時軍旅務殷蚪勵精從事或通夜不寢季海常云栁郎中判事我不復重㸔四年入朝文帝欲官之蚪辭母老乞侍醫藥文帝許焉又為獨孤信開府從事中郎信出鎭隴右因為秦州刺史以蚪為二府司馬雖處元僚不綜府事唯在信左右談論而已因使見文帝被留為丞相府記室追論歸朝功封美陽縣男蚪以史官密書善惡未足懲勸乃上疏言古者人君立史官非但記事而已盖所為鑒誡也故動則左史書之言則右史書之彰善癉惡以樹風聲故南史抗節表崔杼之罪董狐書法明趙盾之愆是知執筆於朝其來久矣而漢魏已還密為記注徒聞後世無益當時豈所謂将順其美匡救其惡者且著述之人密書縱能直筆人莫知之何止横生物議亦自異端互起故班固致受金之名陳壽有求米之論著漢魏者非一氏造晉史者至數家後代紛紜莫知凖的伏惟陛下則天稽古勞心庶政開誹謗之路納忠讜之言請自今諸史官記事者皆當朝顯言其狀然後付之史閣庶令是非明著得失無隱使聞善者日脩有過者知懼事遂施行十四年除祕書丞領著作舊丞不參史事自蚪為丞始令監掌焉遷中書侍郎修起居注仍領丞事時人論文體有古今之異蚪以為時有古今非文有古今乃為文質論文多不載廢帝初遷祕書監加車騎大将軍儀同三司蚪脫畧人間不事小節弊衣蔬食未嘗改操人或譏之蚪曰衣不過適體食不過充饑孜孜營求徒勞思慮耳恭帝元年卒年五十四贈兖州刺史諡曰孝有文章數十篇行於世蚪弟檜為魏興華陽郡守死於王事列在忠義傳檜弟鷟好學善屬文卒於魏臨淮王記室參軍事子帶韋字孝孫深沈有度量少好學身長八尺三寸美風儀善占對文帝辟為參軍事侯景作亂江南文帝令帶韋使江郢二州與梁邵陵南平二王通好行至安州遇叚寶等反帶韋乃矯為文帝書以安之並即降附及見邵陵具申文帝意邵陵遣使隨帶韋報命以奉使稱㫖授輔國将軍中㪚大夫後達奚武經畧漢川以帶韋為行臺左丞從軍南討時梁宜豐侯蕭脩守南鄭武攻之未拔乃令帶韋入城說脩降之魏廢帝元年出為解縣令加授驃騎将軍左光祿大夫轉汾陰令發擿姦伏百姓畏而懷之武成元年授武蔵下大夫天和二年封康成縣男累遷兵部中大夫雖頻改職仍領武藏五年轉武蔵中大夫俄遷驃騎大将軍開府儀同三司凡居劇職十有餘年處斷無滯官曹清肅時譙王儉為益州總管漢王贊為益州刺史武帝以帶韋為益州總管府長史領益州别駕輔弼二王總知軍事及大軍東討徵為前軍總管齊王憲府長史齊平以功授上開府儀同大将軍進爵為公陳王純鎭并州以帶韋為并州司會并州總管府長史卒官諡曰愷子祚嗣少有名譽位宣納上士入隋位司勳侍郎鷟弟慶字更興幼聰敏有器量博渉羣書不為章句好飲酒嫻於占對年十三因暴書父僧習試令慶於雜賦集中取賦一篇千餘言誦之慶立讀三遍便誦之無漏時僧習為潁川郡守地接都畿人多豪右将選鄉官皆依貴勢競來請託選用既定僧習謂諸子曰權貴請託吾並不用其使欲還皆須有答汝等各以意為吾作書慶乃具書草僧習讀歎曰此兒有意氣丈夫理當如是即依慶所草以報起家奉朝請慶出後第四叔及遭父憂議者不許為服重慶泣曰禮緣人情若於出後之家更有苴斬之服可奪此以從彼今四叔薨背已久情事不追豈容奪禮乖違天性時論不能抑遂以苫由終喪既葬乃與諸兄負土成墳孝武将西遷慶以散騎侍郎馳傳入闗慶至高平見文帝共論時事文帝即請奉迎輿駕仍令慶先還復命時賀拔勝在荆州帝屏左右謂慶曰朕欲往荆州何如慶曰闗中金城千里天下之彊國也荆州地無要害寧足以固鴻基帝納之及帝西遷慶以母老不從獨孤信之鎭尋陽乃得入闗除相府東閤祭酒大統十年除尚書都兵郎中并領記室時北雍州獻白鹿羣臣欲賀尚書蘇綽謂慶曰近代以來文章華靡逮于江左彌復輕薄洛陽後進祖述未已相公柄人軌物君職典文房宜製此表以革前弊慶操筆立成辭兼文質綽讀而笑曰枳橘猶自可移況才子也尋以本官領雍州别駕廣陵王欣魏之懿親其甥孟氏屢為兇橫或有告其盗牛慶捕得實趣令就禁孟氏殊無懼容乃謂慶曰若加以桎梏後獨何以脱之欣亦遣使辯其無罪孟氏由此益驕慶乃大集僚吏盛言孟氏倚權侵虐之状言畢令笞殺之此後貴戚斂手有賈人持金二十斤詣京師寄人居止每欲出行常自執管鑰無何緘閉不異而並失之謂主人所竊郡縣訊問主人因自誣服慶疑之乃召賈人曰卿鑰常置何處對曰恒自帶之慶曰頗與人同宿乎曰無與同飲乎曰日者曾與一沙門再度酣宴醉而晝寢慶曰沙門乃眞盗耳即遣捕沙門乃懷金逃匿後捕得盡獲所失金十二年改三十六曹為十二部以慶為計部郎中别駕如故又有胡家被刼郡縣按察莫知賊所隣近被囚者甚多慶以賊是烏合可以詐求之乃作匿名書多牓官門曰我等共刼胡家徒侣混雜終恐泄露今欲首伏懼不免誅若聽先首免罪便欲來告慶乃復施免罪之牒居二日廣陵王欣家奴面縛自告牒下因此盡獲黨與慶之守正眀察皆此類也每嘆曰昔于公斷獄無私闢高門以待封儻斯言有驗吾其庶幾乎封淸河縣男除尚書左丞攝計部文帝嘗怒安定國臣王茂将殺之而非其罪朝臣咸知而莫敢諫慶乃進爭之文帝愈怒曰卿若明其無罪亦須坐之乃執慶于前慶辭氣不撓抗聲曰竊聞君有不達者為不明臣有不才者為不忠慶謹竭愚誠實不敢愛死但懼公為不明之君耳文帝乃悟而赦茂已不及矣文帝黙然明日謂慶曰吾不用卿言遂令王茂寃死可賜茂家錢帛以旌吾過尋進爵為子慶威儀端肅樞機明辯文帝每發號令常使慶宣之天性抗直無所回避文帝亦以此深委仗焉魏恭帝初進位驃騎大将軍開府儀同三司尚書右僕射轉左僕射領著作六官建拜司會中大夫孝閔帝踐阼賜姓宇文氏進爵平齊縣公晉公䕶初執政欲引為腹心慶辭之頗忤㫖又與楊寛有隙及寛參知政事慶遂見疎忌出為萬州刺史明帝尋悟留為雍州别駕領京兆尹武成二年除宜州刺史慶自為郎迄為司會府倉儲並其職也及在宜陽寛為小冡宰乃囚慶故吏求其罪失案驗積六十餘日吏或有死於獄者終無所言唯得乘錦數疋時人服其廉愼又入為司會先是慶兄檜為魏興郡守為賊黃衆寶所害檜子三人皆幼弱慶撫養甚篤後衆寶歸朝朝廷待以優禮居數年檜次子雄亮白日手刃衆寶於長安城中晉公䕶聞而大怒執慶諸子侄皆囚之讓慶擅殺人對曰慶聞父母之讎不同天兄弟之讎不同國明公以孝臨天下何乃責於此乎䕶愈怒慶辭色無屈竟以俱免卒贈鄜綏丹三州刺史諡曰景子機嗣機列在隋史機弟𢎞字匡道少聰明工草隸博渉羣書辭采雅贍與𢎞農楊素為莫逆友解巾中外府記室建徳初除内史上士歴小宫尹御正上士陳遣王偃人來聘武帝令𢎞勞之偃人謂𢎞曰來日至藍田正逢滋水暴長所齎國信溺而從流今所進假之從吏請勒下流人見為尋此物𢎞曰昔淳于之獻空籠前史稱以為美足下假物而進詎是陳君命乎偃人慙不能對武帝聞而嘉之盡以偃人所進物賜𢎞仍令報聘占對敏㨗見稱於時後卒於御正下大夫贈晉州刺史楊素誄之曰山陽王弼風流長逝潁川荀粲零落無時脩竹夾池永絶梁園之賦長楊映沼無復洛川之文其為士友所痛惜如此有文集行於世𢎞弟旦旦弟肅並附機傳於後寇㒞字祖儁上谷昌平人也祖讚魏南兖州刺史父臻𢎞農太守讚自有傳儁性寛雅幼有識量好學性廉恕不以財利為心家人曾賣物與人而剰得絹一疋儁於後知之乃曰惡木之陰不可暫息盜泉之水無容誤飲得財失行吾所不取遂訪主還之以選為魏孝文挽郎除奉朝請大乗賊起燕趙擾亂儁參䕶軍事東討以功授員外㪚騎侍郎累遷司空府主簿時靈太后臨朝減食祿官十分之一造永寧佛寺令儁典之資費鉅萬主吏不能欺隱寺成又極壮麗靈太后嘉之除左軍将軍孝昌中朝論以國用不足乃置鹽池都将秩比上郡前後居職者多有侵隱乃以儁為之仍主簿永安初華州人史底與司徒楊椿訟田長史以椿勢貴皆言椿直欲以田給椿儁曰史底窮民楊公横奪其地若欲損不足以給有餘見使雷同未敢聞命遂以地還史底孝莊帝後知之嘉儁守正不撓拜大司馬其附椿者咸責焉二年出為梁州刺史民俗荒獷多為盜賊儁乃令郡縣為立庠序勸其耕桑敦以禮讓數年之中風俗頓革梁遣其将曹琰之鎭魏興繼日版築琰之屢擾疆埸邊人患之儁遣長史杜林道攻克其城并禽琰之琰之即梁大将景宗之季弟也於是梁人懼焉屬魏室多故州又僻逺梁人知無外援遂大兵頓魏興志圖攻取儁撫厲将士人思効命梁人知其得衆心也弗之敢逼儁在州清苦不治産業秩滿其子等並徒歩而還吏民送儁留連於道久之乃得出界大統三年東魏授儁洛州刺史儁因此乃謀歸闕五年将家及親屬四百餘口入闗拜祕書監時軍國草創墳典㪚逸儁始選置令史抄集經籍四部羣書稍得周備加鎭東将軍封西安縣男十七年加㪚騎常侍儁以年老乞骸骨不許遂稱疾篤不復朝覲魏恭帝二年賜姓若口引氏孝閔帝踐阼進爵為子武成元年進驃騎開府儀同三司儁年齒雖高而氣識未衰敎授子孫必先典禮明帝尚儒重徳特欽賞之數加恩賜思與相見儁不得已乃入朝明帝與同席而坐因顧訪洛陽故事儁身長八尺鬚鬢皓然容止端詳音韻清朗帝與之談論不覺屢為前膝及儁辭還帝親執其手曰公年徳俱尊朕所欽向乞言之事所望於公宜數相見以慰虚想以御輿令於帝前乘出顧謂左右曰如此之事唯積善可以致之何止見重於今亦将傳之萬古時人咸以為榮保定三年卒年八十二武帝歎惜之贈本官加冀定瀛三州諸軍事冀州刺史諡曰元儁篤於仁義期功之中有孤㓜者衣食豐約並與之同少為司徒崔光所知光命其子勵與儁交結儁每造光清談移日小宗伯盧辯以儁業行俱崇待以師友之禮每有閑暇輙詣儁亦讌語彌日常謂人曰不見西安君煩憂不遣其為通人所敬重如此子奉位至儀同大将軍順陽郡守洵州刺史昌國縣公奉弟顯少好學最知名居喪哀毁位儀同大将軍掌朝布憲為典祀下大夫小納言濩澤郡公長孫儉本名慶明其先代人魏太尉北平王嵩之五世孫也曾祖地汾安東将軍臨川公祖酌恒州刺史父􅖢員外㪚騎侍郎早卒儉少方正有操行狀貌魁偉神彩嚴肅雖在私室終日儼然性不妄交非其同志雖貴㳺造門亦不與相見太昌中邊方騷動儉初假夏州防城大都督從爾朱天光破宿勤眀達等以功賜爵索盧侯文帝臨夏州以儉為錄事參軍深敬器之及賀拔岳被害文帝赴平涼凡有經綸謀策儉皆參預從平侯莫陳悅留儉為秦州長史防城大都督委以後事别封信都縣伯渭州刺史可朱渾元奔東魏後河渭間人情離阻刺史李弼令儉權鎭渭州儉将十餘萬騎冒難赴之復隨機安撫羌胡悅復轉夏州刺史甚得人和時西夏州仍未内屬而東魏遣許和為刺史儉以信義招之和乃舉州歸附即以儉為西夏州刺史總統三夏州諸軍事時荆襄初附文帝表儉功績尤美宜委東南之任授儉都督三荆等十二州諸軍事荆州刺史東南道行臺僕射所部鄭縣令泉璨為民所訟推案獲實儉即大集僚屬而謂之曰此由刺史敎誨不明信不被物是我之愆非泉璨之罪遂於聽事前肉袒自罰捨璨不問於是屬城肅勵莫敢犯法魏文帝璽書勞之文帝又與儉書曰近行路傳公以部内縣令有罪遂自杖三十用肅羣下聞之嘉歎良久不可言儉清正率下兼懷仁恕有竊盜者原情得實誨而放之荆蠻舊俗少不事長儉殷勤勸導風俗大革務廣耕桑兼習武事故得邊境無虞民安其業吏民表請為儉構清徳樓樹碑刻頌朝議許焉吏民又以儉秩滿恐至代至上闗乞留儉朝廷嘉而許之在州遂歴七載徴授大行臺尚書兼相府司馬嘗與羣公侍坐於文帝及退文帝謂左右曰此公閑雅孤每與語嘗肅然畏敬恐有所失他日文帝又謂儉曰名實理須相稱尚書既志安貧素可改名儉以彰雅操遷尚書左僕射加侍中行除東南道行臺僕射大都督十五州諸軍事荆州刺史時梁岳陽王蕭詧内附初遣使入朝至荆州儉於聽事列軍儀具戎服以賓主禮見使容貎魁偉音聲如鐘大為鮮卑語遣人傳譯以答問客惶恐不敢仰視日晚儉乃著裙襦紗㡌引客宴於别齋因敘梁國䘮亂朝廷招擕之意發言可觀使人大悅出曰吾所不能測也魏廢帝二年授東南道大都督荆襄等三十三州鎭防諸軍事及梁元帝嗣位於江陵外敦隣睦内懷異計儉密啟文帝陳攻取之謀於是徴儉入朝問其經畧儉陳其謀文帝深然之乃令還州密為之備尋令柱國燕公于謹總戎伐江陵事平以儉元謀賞奴婢三百口文帝與儉書曰本圖江陵由公畫計今吳民離㪚事藉招懷南服重鎭非公莫可遂令儉鎭江陵進爵昌寜郡公遷大将軍後移鎭荆州授總管荆襄等五十二州諸軍事行荆州刺史及孝閔帝初趙貴等将圖晉公䕶儉長子僧衍預其謀坐死䕶乃徴儉拜小冡宰保定四年拜柱國朝議以儉操行清白勲績隆重乃下詔襃美之兼賜以雜綵粟麥以彰其美天和初轉陜州總管七州諸軍事陜州刺史儉舊嘗詣闕奏事時値大雪遂立於雪中待報自旦達暮殊無惰容其奉公謹慤皆此類也以疾還京詔以儉舊居狹隘賜甲第一區後薨於夏州總管臨終遺令斂以時服素車載柩不設儀仗親友贈禭一無所受諸子並奉行之又遺啟眀帝請葬於文帝陵側并以官所賜之宅還官詔皆從之贈本官加涼𤓰等十州諸軍事涼州刺史追封鄫國公諡曰文荆州人儀同趙超等六百九十七人感儉遺愛詣闕請為儉立廟樹碑詔許之建徳元年詔曰故柱國鄫國公儉臨終審正爰吐徳音以所居之宅本因上賜制度宏麗非諸子所居請以還官更遷他所昔叔敖辭沃壤之地蕭何就窮僻之鄉以古方今無慙曩哲言尋加尚弗忘於懷而有司未達大體遽以其第外給夫追善念功先王令典豈得遂其謙挹致乖懲勸今以本宅還其妻子俾清風逺播無替聿修次子隆位司令中大夫從長湖公元定伐陳没江南卒隆弟平最知名平列在隋史長孫紹逺字士師少名仁代人魏司空上黨王道生元孫也父承業太師錄尚書事前史皆有傳紹逺寛容有大度雅好墳籍聰慧過人父承業作牧壽春時紹逺年十三承業管記有王碩者文學士也聞紹逺彊記遂白承業求驗之承業命試之碩乃試以禮記月令於是紹逺讀數紙纔一遍誦之若流碩歎服之起家司徒府參軍事後以别将討平河東蜀薛封東阿縣伯魏孝武西遷紹逺隨承業奔赴以功别封文安縣子大統二年除太常卿遷中書令仍襲父爵後例降為公改馮翊郡恭帝二年累遷錄尚書事文帝每謂羣公曰長孫公任使之處令人無反顧憂漢之蕭寇何足多也且其容止堂堂足為當今模楷六官建拜大司樂孝閔踐阼封上黨公初紹逺為太常廣召工人創造樂器土木絲竹各得其宜唯黄鍾不調紹逺每以為意嘗因退朝經韓使君佛寺前浮屠三層之上有鳴鐸焉忽聞其音雅合宫調因取而配奏方始克諧乃啟明帝曰魏氏來宅秦雍雖祖述樂章然黃鍾為君天子之正位往經創造歴稔無成方知水行将季木運伊始天命有歸靈樂自降此盖乾坤祐助宗廟致感方當降物和神祚隆萬世詔曰朕以菲薄何徳可以當之此盖天地祖宗之祐亦由公達鑒所致也俄改授禮部中大夫時猶因魏氏舊樂未遑更造但云小吕加大吕而已紹逺上疏陳雅樂詔並行之紹逺所奏樂以八為數故梁黄門侍郎裴正上書以為昔者大舜欲聞七始下洎周武爰制七音持林鍾作黄鍾以為正調之首詔與紹逺詳議正曰天子用八非無典故縣而不擊未聞厥理且黃鍾為天大吕為地太蔟為人今縣黃鍾而擊太蔟便是虚天位専用人矣紹逺曰夫天不言四時行焉地不言萬物生焉人感中和之氣居變通之道今縣黃鍾而擊太蔟是天子端拱羣司奉職從此而議何往不可正曰案吕氏春秋曰楚之衰也為作巫音齊之衰也為作大吕且大吕以下七鍾皆是林鐘之調何得稱為十一月調専用六月之均便是欲迎仲冬猶存季夏以此而奏深非正理紹逺曰卿之所言似欲求勝若窮理盡性自伐更深何者案周禮祀天樂云黄鍾為宫大吕為角此則是大吕之用宛而成章雖知引吕氏之小文不覺失周公之大禮且今縣大吕則有黄鍾林鍾二均乃備春夏則奏林鍾秋冬則奏黃鍾作黄鍾不擊大吕作林鍾不擊黄鍾此所謂左之右之君子宜之右之左之君子有之而卿不縣大吕止有黄鍾一宫便是季夏之時仍作仲冬之調以此為至理無乃不可乎然周禮又云乃奏黃鍾歌大吕以祀天神謂五帝及日月星辰也王者各以夏之正月祀炎帝於南郊又朝日以春分夕月以秋分依如正禮並用仲冬之調又曰乃奏太蔟歌應鍾以祭地祗謂神州及社稷以春秋二仲依如正禮唯奏孟春之宫自外四望山川先妣先祖並各用宫不依月變畧舉大綱則三隅可反然則還相為宫雖有其義引禮取證乃不月别變宫且黄鍾為君則陽之正位若隨時變易是君無定體而卿用林鍾以為正調便是君臣易位隂陽相反正之名器将何取焉正曰今用林鍾為黄鍾者實得相生之義既清且韻妙合眞體然八音平濁何足可稱紹逺曰天者陽位故其音平而濁濁則君聲地者陰位故其音急而清清則臣調然急清者於體易絶平濁者在義可久可久可大王者之基至於鄭衛新聲非不清韻若欲施之聖世吾所不取也於是遂定以八為數焉尋拜京兆尹歴少保小司空出為河州刺史河右戎落向化日近同姓婚姻因以成俗紹逺導之以禮大革弊風政存簡恕百姓悅服入為小宗伯武帝讀史書見武王克殷而作七始又欲廢八縣七并除黄鍾之正宮用林鍾為調首紹逺奏云天子縣八百王共軌下逮周武甫修七始之音詳諸經義又無廢八之典且黃鍾為君天子正位今欲廢之未見其可臣案周禮奏黄鍾歌大吕此則先聖之𢎞範不易之明證願勿輕變古典趣改樂章帝黙然久之曰朕欲廢七縣八者所望體本求直豈苟易名當更思其義後竟行七音屬紹逺遘疾未獲面陳慮有司遽捐樂器乃與樂部齊樹書曰伏聞朝廷前議而欲廢八縣七然則天子縣八有自來矣古先聖王殊塗一致逮周武克殷逆取順守専用干戈事乖揖遜反求經義是用七音盖非萬物不易之典其縣八筍簴不得毁之宜待吾疾瘳當别奏聞此後紹逺疾篤乃命其子覽曰夫黄鍾者天子之宫大吕者皇后之位今廢黄鍾之位而祿去王公若用林鍾為首是政由私門将恐八百之祚不得同姬周之永也吾既為人臣義無寢黙必輿疾固爭闕庭後疾甚乃上遺表曰謹案春秋隱公傳云天子用八周禮云天子縣二八倕氏之鐘十六毋句氏之磬十六漢成帝獲古磬十六周禮圖縣十六此數事者昭爛典章揚搉而言足為龜鏡伏惟陛下受圖蒼帝接統元精秦漢以還獨為稱首至如周武有事干戈臣獨鄙之而況陛下以臣自揣餘息匪夕伊朝伏願珍御萬機不勞改八從七帝省表涕零重贈柱國大将軍諡曰獻號樂祖配饗廟庭子覽嗣覽列在隋史紹逺弟澄字士亮年十歲司徒李琰之見而竒之遂以女妻焉十四從父承業征討有智謀勇冠諸将以功封西華縣侯及長容貎魁岸風儀温雅魏大統中歴位豫渭二州刺史以軍别封永寜縣伯尋進覆津縣侯魏文帝與文帝及羣公宴從容曰孝經一卷人行之本諸君宜各引孝經之要言澄應聲曰夙夜匪懈以事一人座中有人次曰匡救其惡既出西閤文帝深歎澄之合機而譴其次答者孝閔帝踐阼拜大将軍進爵義門郡公出為玉壁總管頗有威信卒於鎭贈柱國諡曰簡自喪初至及葬明帝三臨之典祀中大夫宇文容諫曰君臨臣喪自有節制今乘輿屢降恐乖典禮帝不從其為上所追惜如此子嶸嗣盧柔字子剛范陽涿人也祖洪魏樂陵陽平二郡太守父崇驃騎府法曹參軍柔少孤為叔母所養撫視甚於其子柔盡心温凊亦同己親親黨歎重之性聰敏好學未弱冠便解屬文但口吃不能持論頗使酒誕節為世所譏司徒臨淮王彧見而器之以女妻焉及魏孝武懼齊神武之逼詔賀拔勝出牧荆州以為外援柔謂因此可以著功績遂從勝之荆州以柔為大行臺郎中掌書記軍之機務柔多預焉及勝為太保以柔為掾孝武後召勝引兵赴洛勝以問柔柔對曰高歡託晉陽之甲意實難知公宜席卷赴都與决勝負存没以之此忠之上䇿也若北阻魯陽南并舊楚東連兖豫西接闗中帶甲十萬觀釁而動亦中策也舉三荆之地通款梁國可以庇身功名去矣䇿之下者勝輕柔年少笑而不應及孝武西遷東魏遣侯景襲穰勝敗南奔歸梁柔亦從之勝頻表梁武帝求歸闗中梁武帝覽表嘉其辭彩既知柔所製因遣舍人勞問并遺縑錦後與勝俱還行及襄陽齊神武懼勝西入遣侯景以輕騎邀之勝及柔懼乃棄船山行贏糧冒險經數百里時屬秋霖徒侣凍餒死者大半大統二年遂至長安封容城縣男文帝重其才引為行臺郎中除從事中郎與郎中蘇綽對掌機密時沙苑之役大軍屢㨗汝潁之間多舉義來附書翰往返日百餘牒柔隨機報答皆合事宜進爵為子累遷中書侍郎兼著作撰起居注後為黄門侍郎文帝知其貧解衣賜之後遷中書監孝閔帝踐阼拜小内史大夫進位儀同三司卒於位所作詩頌碑銘檄表啓行於世者數十篇子愷嗣愷列在隋史裴俠字嵩和河東解人也祖思齊舉秀才拜議郎父欣西河郡守贈晉州刺史俠年七歲猶不能言後於洛城見羣烏蔽天從西來舉手指之而言遂智識聰慧有異常童年十三遭父憂哀毁有若成人将擇葬地而行忽聞空中有人言曰童子何悲葬於桑東當封公侯俠懼以告其母母曰神也吾聞鬼神福善爾家未嘗有惡當以吉祥告汝耳時俠宅側有大桑林因葬焉州辟主簿舉秀才魏正光中觧巾奉朝請稍遷義陽郡守元顥入洛俠執其使人焚其赦書孝莊嘉之授東郡太守帶防城别将及孝武與齊神武有隙徴兵河南以備之俠率所部赴洛陽武衛将軍王思政謂曰當今權臣擅命王室日卑若何俠曰宇文泰為三軍所推居百二之地所謂己操戈矛寜肯授人以柄雖欲撫之恐是據於蒺藜也思政曰奈何俠曰圖歡有立至之憂西廵有将來之慮且至闗右日愼一日徐思其宜耳思政然之乃進俠於帝授左中郎将及帝西遷俠将行而妻子猶在東郡滎陽鄭偉謂俠曰天下方亂未知烏之所集何如東就妻子徐擇木焉俠曰忠義之道庸可忽乎吾既食人之祿寜以妻子易圖也遂從入闗賜爵清河縣伯除丞相府士曹參軍大統三年領鄉兵從戰沙苑先鋒䧟陣俠本名恊至是文帝嘉其勇決乃曰仁者必有勇因命改名俠焉以功進爵為侯王思政鎭玉壁以俠為長史齊神武以書招思政思政令俠草報書辭甚壮烈文帝善之曰雖魯仲連無以加也除河北郡守俠躬履儉素愛民如子所食唯菽麥鹽菜而已吏民莫不懷之郡舊制有漁獵夫三十人以供郡守俠曰以口腹役人吾所不為也乃悉罷之又有丁三十人供郡守役使俠亦不以入私並収庸直為官市馬歳時既積馬遂成羣去職之日一無所取民歌之曰肥鮮不食丁庸不取裴公清恵為世規矩俠嘗與諸牧守俱謁文帝文帝命俠别立謂諸牧守曰裴俠清愼奉公為天下最今衆中有如俠者可與之俱立衆皆黙然無敢應者文帝乃厚賜俠朝野歎服號為獨立使君俠撰九世伯祖貞侯潛傳以為裴氏清公自此始也欲使後生奉而行之宗室中知名者咸付一通從弟伯鳳世彥時並為丞相府佐笑之曰人生仕進須身名俱泰清苦若此竟欲何為俠曰清者涖職之本儉者持身之基況我大宗世濟其美故能存見稱於朝廷没流芳於典策今吾幸以凡庸濫䝉殊遇固其窮困非慕名也志在自脩懼辱先也翻被嗤笑知復何言伯鳳等慙而退再遷郢州刺史加儀同三司梁竟陵太守孫暠酇城守張建並以郡來附俠見之密謂人曰暠目動言肆輕於去就者也建神情審定當無異心乃馳啓其状文帝曰裴俠有知人之鑒深得之矣遣大都督苻貴鎭竟陵而酇城竟不遣監統及柳仲禮軍至暠還以郢叛卒如俠言尋轉大将軍拓州刺史徴拜雍州别駕孝閔帝踐阼除司邑下大夫加驃騎大将軍開府儀同三司進爵為公遷户部中大夫時有姦吏主守倉儲積年隱没至千萬者及俠在官勵精發擿數旬之内姦盜畧盡轉工部中大夫有大司空掌錢物典李貴乃於府中悲泣或問其故對曰所掌官物多有費用裴公清嚴有名懼遭罪責是以泣耳俠聞之許其自首貴自言隱費錢五百萬俠之肅姦皆此類也俠嘗遇疾沈頓士友憂之忽聞五鼓便即驚起顧左右曰可向府邪所苦因此而瘳晉公䕶聞之曰裴俠危篤若此而不廢憂公因聞鼓聲疾病遂愈此豈天祐其勤恪也又司空許國公宇文貴小司空北海公申徽並來候俠疾所居第屋不免霜露貴等還言之於帝帝矜其貧苦乃為起宅并賜良田十頃奴𨽻耕耒糧粟莫不備足搢紳咸以為榮卒於位贈太子少師蒲州刺史諡曰貞河北郡前功曹張回乃吏民等感俠遺愛乃作頌紀其清徳焉子祥性忠謹有理劇才少為成都令淸不及俠斷決過之後除長安令為權要所憚遷司倉下大夫俠之終也以毁卒祥弟肅列在隋史裴寛字長寛河東聞喜人也祖徳歡魏中書侍郎河内郡守父靜慮銀青光祿大夫贈汾州刺史寛儀貎瓌偉博渉羣書弱冠為州里所稱親殁撫諸弟以篤友聞滎陽鄭孝穆嘗謂其從弟文直曰裴長寛兄弟天倫篤睦人之師表吾愛之重之汝可與之游處年十三以選為魏孝明帝挽郎釋褐㪚騎侍郎及孝武西遷寛謂其諸弟曰君臣逆順大義昭然今天子西幸理無東面以虧臣節乃将家屬避難於大石嶺獨孤信鎭洛陽始出見焉時汾州刺史韋子粲降於東魏子粲兄弟在闗中者咸已從坐其季弟子爽先在洛窘急乃投寛寛開懷納之遇有大赦或傳子爽合免因爾遂出子爽卒以伏法獨孤信知而責之寛曰窮來見歸義無執送今而獲罪是所甘心以經赦宥遂得不坐大統五年授都督同軌防長史加征虜将軍十三年從防主韋法保向潁川解侯景圍景密謀南叛偽親狎於法保寛謂法保曰侯景狡猾必不肯入闗雖詭款於公恐未可信若伏兵斬之亦一時之功也如曰不然便須深加嚴警不得信其誑誘自貽後悔法保納其言然不能圖景但自固而已十四年與東魏将彭樂樂恂戰於新城因傷被禽至河隂見齊文襄寛舉止閑雅善於占對文襄甚賞異之解鎻赴舘厚加禮遇寛乃裁所卧氊夜縋而出因得遁還見於文帝帝顧謂諸公曰被堅執銳或有其人疾風勁草歳寒方驗裴長寛為高澄如此厚遇乃能冒死歸我雖古之竹帛所載何以加之乃手書署寛名下授持節帥都督封夏陽縣男即除孔城城主十六年遷河南郡守仍鎭孔城魏廢帝元年進使持節車騎大将軍儀同三司㪚騎常侍孝閔帝踐阼進爵為子寛在孔城十三年與齊洛州刺史獨孤永業相對永業有謀計多譎詐或聲言春發秋乃出兵或掩蔽消息倐忽而至寛每揣知其情出兵邀擊無不克之天和三年除温州刺史初陳氏與周通和脩聘好自華皎附後乃圖寇掠沔州既接敵境於是以寛為沔州刺史陳将程靈洗攻之力屈城陷陳人乃執寛至揚州尋被送嶺外經數載復還建鄴遂卒於江左子義宣從御正杜果使於陳始得将寛柩還隋開皇元年文帝詔贈襄郢二州刺史義宣位司金二命士合江令寛弟漢字仲霄操尚𢎞雅聰敏好學嘗見人作百字詩一覽便誦魏孝武初釋褐員外㪚騎侍郎大統五年除大丞相府士曹行參軍轉墨曹漢善尺牘尤便簿領理識明贍斷割如流相府為之語曰日下燦爛有裴漢武成中為司車路下大夫與工部郭彥太府高賓等參議格令每較量時事必有條理天和五年加車騎大将軍儀同三司漢少有宿疾常帶虚羸劇職繁官非其好也時晉公䕶擅權搢紳等多諂附之以圖仕進漢直道自守故八年不徙職性不飲酒而雅好賓游每良辰美景必招引時彥宴賞留連間以篇什當時人物以此重之自寛没後遂斷㳺從不聽琴瑟嵗時伏臘哀慟而已撫養兄弟子情甚篤至借人異書必躬自錄本至于疾疹彌年亦未嘗釋卷卒贈晉州刺史子鏡人少聰敏渉獵經史為大将軍譚公會記室參軍累遷春官府都上士仕隋位兵曹郎漢弟尼字景尼性𢎞雅有器局位御正下大夫卒贈隨州刺史子之隱趙王招府記室參軍之隱弟師人好學有識度見稱於時起家秦王贄府記室參軍仍兼侍讀寛族弟鴻少恭謹有幹畧歴官内外天和初拜郢州刺史轉襄州總管府長史賜爵高邑縣侯從衛公直南征軍敗遂没尋卒於陳朝廷哀之贈豐資三州刺史裴果字戎昭河東聞喜人也祖思賢魏靑州刺史父遵齊州刺史果少慷慨有志畧魏太昌中為陽平郡丞文帝曾使并州與果遇果知非常人密託附焉永安中盜賊蜂起果從軍征討乘黄驄馬衣青袍每先登陷陣時人號為黄驄年少永熙中授河北郡守及齊神武敗於沙苑果乃率其宗黨歸闕文帝嘉之賜田宅奴婢牛馬什物等從戰河橋解玉壁圍摧鋒陷擊所向披靡大統九年又從戰芒山於文帝前挺身陷陣禽東魏都督賀婁焉邏蘭勇冠當時衆人莫不歎服以此文帝愈親待之補帳内都督遷帥都督平東将軍後從開府楊忠平隨安陸以功加大都督除正平郡守正平果本郡也以威猛為政百姓畏之然盜賊亦為之屏息遷司農卿又從大将軍尉遲迥伐蜀果率所部為前軍開劍閣破季慶堡降楊乾運皆有功廢帝三年授龍州刺史封冠軍縣侯俄而州人張遁李拓驅率百姓圍逼州城時糧仗皆闕兵士又寡果設方畧以拒之賊便退走於是出兵追擊累戰破之旬月之間州境清晏轉陵州刺史孝閔帝踐阼除隆州刺史加持節驃騎大将軍開府儀同三司進爵為公歴眉復二州刺史果性嚴猛能斷決抑挫豪右申理屈滯歴牧數州號為稱職卒於位贈本官加綘晉建州刺史諡曰質子孝仁嗣孝仁㓜聰敏渉獵經史有譽於時起家舍人上士累遷長寜鎭将捍禦齊人甚有威邊之畧歴建譙亳州刺史裴文舉字道裕河東聞喜人也祖秀業魏天水郡守贈平州刺史父邃性方嚴為州里所推挹大統三年東魏來寇邃乃糾合鄉人分據險要以自固及李弼畧地東境邃為之鄉導多所降下文帝嘉之特賞衣物封澄城縣子卒於正平郡守贈開府儀同三司定州刺史文舉少忠謹渉獵經史大統十三年起家奉朝請文帝諸子年幼盛簡賔友文舉以選與諸公子㳺雅相欽敬未嘗戲狎遷著作郎中外府參軍魏恭帝二年賜姓賀蘭氏孝閔帝踐阼襲爵澄城縣子齊公憲初開幕府以文舉為司錄及憲出鎭劒南復以文舉為總管府中郎武成二年就加使持節車騎大将軍儀同三司蜀土沃饒商販百倍或有勸文舉以利者文舉答之曰利之為貴莫若安身身安則道隆非貨之謂是以不為非惡財也憲矜其貧窶每欲資給之文舉恒自謙遜辭多受少保定三年遷絳州刺史邃之任正平也以廉約自守每行春省俗單車而已及文舉臨州一遵其法百姓美而化之總管韋孝寛特相欽重每與談論不覺膝前於席天和初進驃騎大将軍開府儀同三司㝷為孝寛柱國府司馬六年入為司憲中大夫進爵為伯轉軍司馬文舉少喪父其兄又在山東唯與弟璣幼相訓養友愛甚篤璣又早亡文舉撫視遺孤逾於己子時人以此稱之初文舉叔父季和為曲沃令終於聞喜川而叔母韋氏卒於正平縣屬東西分隔韋氏墳壟遂在齊境及文舉在本州每加賞募齊人感其孝義潛相要結以韋柩西歸竟得合葬六年除南青州刺史宣政元年卒於位子胄嗣位至大都督子神安邑通守有子知禮崔猷字宣猷博陵安平人也祖挺魏司徒司馬父孝芬吏部尚書為齊神武所誅事具挺傳猷少好學風度閑雅性鯁正有軍國籌畧普泰初累遷司徒從事中郎既遭家難遂間行入闗及謁魏孝武哀動左右帝為之改容目送曰忠孝之道萃在一門即以本官奏門下事大統初兼給事黄門郎平原縣伯二年正黄門行軍禽竇泰復𢎞農破沙苑猷常以本官從軍典文翰五年除司徒左長史加驃騎将軍時太廟初成四時祭祀猶設俳優角牴之戲其郊廟祭官多有假兼猷上疏諌書奏並納焉遷京兆尹時婚姻禮嫁聚會之辰多舉音樂又壥里富室衣服奢淫乃有織成文繡者猷請禁斷事並施行與盧辯等剙脩六官十二年除淅州刺史十四年侯景據河南歸款遣行臺王思政赴之文帝與思政書曰崔宣猷智畧明贍有應變之才若有所疑宜與量其可不思政初頓兵襄城後於潁川為行臺并致書於猷猷復曰襄城控帶京洛實當今之要地如有動静易相應接潁川既隣寇境又無山川之固賊若潛來徑至城下莫若頓兵襄城為行臺所潁川置州遣郭賢守則表裏膠固人心易安縱有不虞豈能為患使人見文帝具以啓聞文帝令依猷䇿思政重啓求與朝廷立約賊若水攻乞一周為斷陸攻請三歳為期限内有事不煩赴援過此以往唯朝廷所裁乃許之及潁川沒文帝深追悔焉以疾去職屬大軍東征文帝賜以馬隨軍與之籌畧十七年進侍中驃騎大将軍開府儀同三司本州大中正賜姓宇文氏魏恭帝元年文帝欲開梁漢舊路乃命猷督儀同劉道通等五人開通車路鑿山堙谷五百餘里至於梁州即以猷為都督梁州刺史及文帝崩始利渉興等諸州阻兵為逆信合開楚四州亦叛唯梁州境内人無二心利州刺史崔士謙請援猷遣兵六千赴之信州糧盡猷為送米四千斛於是二鎭獲全猷第二女帝養為己子封富平公主明帝即位徴拜御正中大夫時依周禮稱天王又不建年號猷以為世有澆淳故帝王因以沿革今天子稱王不足以威天下請遵秦漢稱皇帝建年號朝議從之除司會中大夫御正如故明帝遺詔立武帝晉公䕶謂猷曰魯公禀性寛仁在文帝諸子之中年又最長今尊奉遺㫖翊戴為主君以為如何猷曰殷道尊尊周道親親今朝廷既遵周禮無容輙違此義䕶曰天下事大恐冀公幼耳猷曰昔周公輔成王以朝諸侯况明公親賢莫二若行周公之事方為不負顧託事雖不行當時稱其守正及陳将華皎來附晉公䕶議欲南伐公卿莫敢言猷獨進曰前歲東征死傷過半比雖加撫循而創痍未復近者長星為災乃上元所以垂鑒誡也豈可窮兵極武而重其譴責哉䕶不從後水軍果敗而裨将元定等遂沒江南建徳六年拜少司徒加上開府儀同大将軍隋文帝受禪以猷前代舊齒授大将軍進爵汲郡公開皇四年卒諡曰明子仲方列在隋史猷弟宣度位齊王開府司馬恒農太守宣度弟宣軌有才學位考功郎中與弟宣質宣靜宣畧並早卒崔士謙字士遜博陵安平人也祖辯魏武邑太守父楷殷州刺史辯自有傳士謙幼聰明神彩嶷然及長深沈有識量歴觀經史不持章句志在博聞而已每覽經國緯民之事心常好之未嘗不撫卷歎息孝昌中解褐著作郎賀拔勝出鎭荆州以士謙為行臺左丞勝雖居方岳之任至於安輯夷夏綱紀衆務皆委士謙焉士謙亦盡其智能以相佐佑勝有聲南州皆士謙之力也及魏孝武将備齊神武之逼乃詔勝引兵赴洛軍至廣州帝已西遷勝乃遲疑将旋士謙謂勝曰昔周室不造諸侯釋位漢祚中微列藩盡節今皇家多故主上䝉塵斯實忠臣枕戈之時義士立功之日公受方面之重總宛葉之衆若仗義而動首唱勤王天下聞風孰不感􅈭誠宜倍道兼行謁帝闗右然後與宇文行臺同心協力電討不庭則二伯之勳復興兹日中道而退人皆解體一失事機後悔何及勝不能用人情果大駭動州民劉誕引侯景軍奄至勝與戰敗績遂将麾下數百騎奔梁士謙亦隨行及至梁每乞師赴援梁武雖不為出軍而嘉勝等志節並許其還國乃令士謙先且通隣好文帝素聞其名甚禮之授征西将軍賜爵千乘縣男及勝至拜太師長史以功賜爵為子拜尚書右丞從文帝解洛陽圍經河橋戰加定州大中正瀛州刺史又破柳仲禮於隨郡討李遷哲於魏興並有功進驃騎大将軍開府儀同三司直州刺史賜姓宇文氏恭帝初轉利州刺史士謙性明悟深暁政術吏民畏而愛之保定二年遷總管安州刺史加大将軍進爵武康郡公天和三年授江陵總管荆州刺史既統攝遐方俗兼夷夏又南接陳境東隣齊寇士謙外禦彊敵内撫軍民風化大行號稱良牧每年考績常為天下之最屢有詔褒美焉士謙隨賀拔勝之在荆州也雖被親遇而名位未顯及踐其位朝野以為榮四年卒於州闔境痛惜之立祠堂四時祭饗子曠嗣士謙性至孝與弟訦特相友愛雖復年位並高資產皆無私焉居家嚴肅曠及訦子𢎞度並奉其遺訓云曠少温雅隋大業末位開府儀同三司大将軍浙州刺史曠弟彭有盛名列在後史訦本名士約少有氣槩膂力過人尤工騎射賀拔勝攻荆州以為假節冠軍将軍防城都督又隨奔梁復自梁歸西魏授武衛将軍都督封安昌縣子後文帝復𢎞農戰沙苑皆有功進爵為侯除京兆郡守累遷都官尚書定州大中正改封安固縣侯賜姓宇文氏并賜名訦焉進驃騎大将軍開府儀同三司加侍中進爵高平縣公再遷總管涼州刺史訦涖政彊毅百姓畏之後除使持節能和忠三州崇徳等十三防諸軍事加授大将軍改封安平縣公建徳四年卒贈廓延等五州刺史諡曰壮子𢎞度仕周歴隋性酷虐列在酷吏傳中李昶小名那頓邱衛國人魏御史中尉彪之孫也彪自有傳昶伯父志為南荆州刺史父㳺隨志在任建義初與志俱奔江左昶性峻急不雜交游幼年已解屬文有聲洛下時洛陽初置眀堂昶年十數歲為眀堂賦雖優洽未足才制可觀見者咸曰有家風也初謁文帝文帝深竒之厚加資給令入太學文帝每見學生必問才行及問昶昶神情清悟應對明辯文帝稱嘆之綏徳公陸通盛選僚佐請以昶為司馬文帝許之昶雖年少通特見接待公私之事咸取決焉又兼二千石郎中典儀注累遷都官郎中相州大中正昶雖處郎官文帝恒欲以書記委之於是為丞相府記室參軍著作郎脩國史轉大行臺郎中中書侍郎又轉黄門侍郎封臨黄縣伯嘗謂曰卿祖昔在中朝為御史中尉卿操尚貞固理應不墜家風但孤以中尉彈劾之官愛憎所在故未即受卿耳然此職久曠無以易卿乃奏昶為御史中尉賜姓宇文氏六官建拜内史下大夫進爵為侯明帝初行御伯中大夫武成元年除中外府司錄保定初進驃騎大将軍開府儀同三司轉御正中大夫時以近侍清要盛選國華乃以昶及安昌公元則中都公陸逞臨淄公唐瑾等並為納言尋進爵為公五年出為昌州刺史在州遇疾求入朝詔許之未至京卒贈相瀛二州刺史昶文帝世已當樞要兵馬處分専以委之詔策文筆皆昶所作也及晉公䕶執政委任如舊昶常曰文筆之事不足流於後世經邦致化庶及古人故所作文筆了無藁草唯留心政事而已又以父在江南身寓闗右自少及終不飲酒聴樂時論以此稱焉子丹嗣鄭道邕字孝穆滎陽開封人也祖敬叔魏濮陽太守父瓊范陽太守道邕幼謹厚以清約自居年未弱冠渉獵經史父叔四人並早殁昆季之中道邕居長撫訓諸弟有如同生閨門之中怡怡如也魏孝昌初解褐太尉行參軍累以戰功進至光祿大夫太師咸陽王長史及孝武西遷從入闗除司徒左長史領臨洮王友賜爵永寕縣侯大統初行岐州刺史在任未幾有能名王羆時為雍州刺史欽其善政貽書盛相稱述先是所部百姓久遭離亂逃㪚殆盡道邕下車之日户止三千留情綏撫逺近咸至數年之内有四萬家歳考績為天下最文帝賜書歎美之徴拜京兆尹及梁岳陽王蕭詧稱藩乃假道邕㪚騎常侍持節拜詧為梁王使還稱㫖進儀同三司加㪚騎常侍時文帝東討除大丞相府右長史封金鄉縣男軍次潼闗命道邕與左長史孫儉司馬楊寛尚書蘇亮諮議劉孟良等分掌衆務仍令道邕引接闗東歸附人士并品藻才行而任用之撫納銓叙咸得其宜後拜中書令賜姓宇文氏㝷以疾免孝閔帝踐阼加驃騎大将軍開府儀同三司進爵為子歴御伯中大夫御正宜華虞陜四州刺史頻歴數州皆有政績入為少司空卒贈本官加鄭梁北豫三州刺史諡曰貞子詡嗣歴位納言為聘陳使後至開府儀同大将軍邵州刺史詡弟譯於隋文帝有翊贊功開皇初又追贈道邕大将軍徐兖等六州刺史改諡曰文譯隋史有傳鄭偉字子直道邕之族子也父先䕶魏孝莊世尚書右僕射為爾朱仲逺所害先䕶事具從曾祖祕書監羲傳中偉少倜儻有大志每以功名自許善騎射膽力過人初仲逺之入洛也偉逃奔梁及爾朱氏滅後自梁歸魏及孝武西遷偉亦歸鄉里不求仕進大統三年河内公獨孤信既復洛陽偉乃與宗人榮業糾合州里舉兵於陳留信宿間衆有萬人遂拔梁州禽東魏刺史鹿永及鎭城守将令狐徳并獲陳留郡守趙季和乃率衆西附因是梁陳間相次降款偉馳入闗西文帝與語歎美之拜北徐州刺史封武陽縣伯從戰河橋及解玉壁圍偉常先鋒陷陣侯景歸欵文帝命偉率所部應接及景叛偉亦全軍而還除滎陽郡守進爵襄城郡公侍中驃騎大将軍開府儀同三司魏恭帝二年進位大将軍江陵防主都督十五州諸軍事偉性麤獷不遵法度睚眦之間便行殺戮朝廷以其立義之效每優容之及在江陵乃専戮副防主杞賓工坐除名保定元年詔復官爵天和六年為華州刺史偉前後涖職皆以威猛為政吏民莫敢犯禁盗賊亦為之休止雖非仁政然頗以此見稱卒於州贈本官加少傅都督司州刺史諡曰肅偉性吃少時嘗逐鹿於野失之遇牧豎問焉牧豎答之其言亦吃偉怒謂其效己遂射殺之其忍暴如此子大士嗣司馬裔字遵允河内溫人也晉宣帝弟太常卿馗之後曾祖楚之屬宋武帝誅晉氏戚屬避難歸魏位至鎭西将軍封琅邪王楚之生吏部尚書金龍金龍生豫州刺史悅悅生裔裔少孤有志操州郡辟召並不應後起家司徒府參軍以軍功授員外㪚騎常侍及魏孝武西遷裔時在鄴志在立功潛歸鄉里大統三年於溫起義及六軍西征裔乃於溫送欵遂率所部從戰有功六年授北徐州刺史八年入朝文帝嘉之特䝉賞勞頃之河内有四千餘家歸附並裔之鄉舊乃命領河内郡守令安集流民十五年文帝令山東立義諸将能率衆入闗者並加重賞裔領户千室先至文帝欲以封裔裔固辭曰立義之士辭鄉里捐親戚逺歸皇化者皆是其誠心内發豈裔能率之乎今以封裔便是賣義士以取榮非所願也文帝善而從之授帥都督拜其妻元為襄城郡公主孝閔帝踐阼除巴州刺史進使持節驃騎大将軍開府儀同三司進爵琅邪伯四年為御正中大夫進爵為公大軍東討裔與少師楊檦守軹闗即授懷州刺史天和初信州蠻酋冉令賢等反連結二千餘里裔隨上庸公陸騰討之裔自開州道先入晝夜攻圍腹背受敵自春至秋五十餘戰賊黨糧仗俱竭乃降於是羣蠻率服歴信潼二州刺史六年徴拜大将軍除西寧州刺史未之部卒於京師裔性清約不事生產所得俸祿並㪚之親戚身死之日家無餘財宅舍卑陋喪庭無所詔為起祠堂焉贈本官加四州刺史諡曰定子偘嗣偘字道遷少果勇未弱冠便從戎旅位樂安郡守以軍功加驃騎大将軍開府儀同三司遷兖州刺史未之部卒贈本官加豫州刺史諡曰恵子運嗣司馬消難字道融河内溫人也父子如為齊神武佐命位尚書令自有傳消難㓜聰慧微渉經史有風神好自矯飾以求名譽起家著作郎子如既當朝貴消難亦愛賔客邢子才王元景魏收陸卬崔瞻等皆游其門稍遷光祿卿出為北豫州刺史齊文宣末年昏虐滋甚消難既懼禍及常有自全之謀曲意撫納頗為百姓所附不能廉潔為御史所劾又尚公主而情好不睦公主愬之屬文宣在并州驛召上黨王渙渙懼害斬使者東奔鄴中大擾後竟獲於濟州渙之初走朝士疑赴成臯云若與司馬北豫連謀必為國患此言達於文宣頗見疑消難懼密令所親裴藻間行入闗請舉州來附晉公䕶遣達奚武楊忠迎之消難入朝授大将軍封滎陽公累遷大司寇從武帝東伐還除梁州總管大象初遷大後丞遂納女為静帝后尋出為䢵州總管隋文帝輔政消難既聞蜀公尉遲迥不受代遂欲與迥合勢亦舉兵應之使其子永質於陳以求援隋文帝命襄州總管王誼為元帥發荆襄兵以討之八月消難聞軍将至夜率其麾下奔於陳初楊忠之迎消難結為兄弟情好甚篤隋文每以叔禮事之及陳平消難至京特免死配為樂户經二旬放免猶被舊恩特䝉引見㝷卒於家消難性貪滛輕於去就故世言反覆者皆以方之其妻高齊神武女也在鄴極加禮敬入闗便相棄薄及赴䢵州留妻及三子在京妻言於文帝曰滎陽公擕寵自隨必不顧妻子願防慮之及消難入陳高母子因此獲免子譚即高氏所生以消難勲拜儀同大将軍坐消難除名裴藻字文芳少機辯有不覊之志為子如太傅主簿消難鎭北豫又以為中兵參軍入周封聞喜縣男除晉州刺史薛端字仁直本名沙陁河東汾隂人也祖驎駒魏中書博士徙居馮翊之夏陽父英集書侍御史通直㪚騎常侍端少有志操遭父憂居喪合禮與弟裕勵精篤學不交人事年十七司空高乾邕辟為參軍賜爵平隂男端以天下擾亂遂棄官歸鄉里魏孝武西遷文帝令大都督薛崇禮據龍門引端同行崇禮尋失守降東魏東魏遣行臺薛脩義督乙千貴西度據楊氏壁端與宗親及家僮等先在壁中脩義乃令其兵逼端等東渡方欲濟河會日暮端宻與宗室及家僮等叛之脩義亦遣騎追端且戰且馳遂入石城柵得免柵中先有百家端與并力固守貴等數來慰喻知端無降意遂拔還河東東魏又遣其将賀蘭懿南汾州刺史薛琰達守楊氏壁端率其屬并招喻村人多設竒兵以臨之懿等疑有大軍便東遁赴船溺死者數千人端收其器械復還楊氏壁文帝遣南汾州刺史蘇景恕鎭之降書勞問徴端赴闕以為大丞相府户曹參軍從禽竇泰復弘農戰沙苑並有功進爵為伯後改封交城縣伯累遷吏部郎中端性彊直每有奏請不避權貴文帝嘉之故賜名端欲令名實相副自居選曹先盡賢能雖貴逰子弟才劣行薄者未嘗升擢之每啓文帝云設官分職本康時務苟非其人不如曠職文帝深然之大統十六年軍東討柱國李弼為别道元帥妙簡英僚數日不定文帝謂弼曰為公思得一長史無過薛端弼對曰眞才也乃遣之轉尚書右丞仍掌選事梁主蕭詧曾獻馬瑙鍾文帝執之顧丞郎曰能擲摴蒲頭得盧者便與鍾已經數人不得頃至端乃執摴蒱而言曰非謂此鍾可貴但露其誠耳便擲之五子皆黑文帝大悅即以賜之魏帝廢近臣有勸文帝踐極文帝召端告之端以三方未一遽正名號示天下以不廣請待龕翦僭偽然後俯順樂推文帝撫端背曰成我者卿也卿心既與我同身豈與我異遂脫所著冠帯袍袴並以賜之進授吏部尚書賜姓宇文氏端久處選曹雅有人倫之鑒其所擢用咸得其才六官建拜軍司馬加侍中驃騎大将軍開府儀同三司進爵為侯孝閔帝踐阼再遷户部中大夫進爵為公晉公䕶将廢帝召羣臣議之端頗具同異䕶不悅出為蔡州刺史為政寛恵吏民愛之轉基州刺史基州地接梁陳事藉鎭撫總管史寜遣司馬梁榮催令赴任蔡州父老訴榮請留端者千餘人至基州未幾卒遺誡薄葬府州贈遺勿有所受贈本官加大将軍進封文城郡公諡曰質子胄嗣胄列在隋史端弟裕字仁友少以孝悌聞於州里弱冠丞相參軍事時京兆韋夐志安放逸不干世務裕慕其恬靜數載酒肴候之談宴終日夐遂以孫女妻之裕嘗謂親友曰大丈夫當聖明之運而無灼然文武之用為世所知雖復栖遲徒為勞苦耳至如韋居士退不邱壑進不市朝怡然守道榮辱弗及何其樂也裕曾宿宴于夐之廬後庭有井裕夜出户若有人欲牽其手裕便却行遂落井同坐共出之因勸裕酒曰向慮卿不測憂幸得無他宜盡此爵裕曰墜井蓋小小耳方當逾於此也人問其故裕曰近夢恐有兩楹之憂尋卒文章之士誄之者百數人文帝傷惜之追贈洛州刺史薛善字仲良端之族曽孫也父和南青州刺史善少為司空府參軍再遷監池都将魏孝武西遷東魏改河東為秦州以善為别駕善家素富僮僕數百人兄元信仗氣豪侈每食方丈坐客恒滿絃歌不絶而善獨恭己率素愛樂閑靜大統三年齊神武敗於沙苑留善族兄崇禮守河東文帝遣李弼圍之崇禮固守不下善密謂崇禮曰髙歡戎車犯順致主上播越與兄忝是衣冠緒餘受國榮寵今大軍已臨而兄欲為髙氏盡力若城䧟之日送首長安云逆賊某甲之首死而有靈豈不殁有餘愧不如早歸誠款雖未足表竒節庶獲全首領崇禮猶持疑不決會善從弟馥妹夫高子信為防城都督守城南面子信遣馥來詣善云意欲應接西軍但恐力所不制善即令弟濟将門生數十人與子信馥等斬闗引弼軍入時預謀者並賞五等爵善以背逆歸順臣子常情豈容闔門大小俱叨封邑遂與弟愼等並固辭不受文帝嘉之以善為汾陰令善幹用彊明一郡稱最太守王羆美之令善兼督六縣事尋為行臺郎中時欲廣置屯田以供軍實乃除司農少卿領同州夏陽縣二十屯監又扵夏陽諸山置鐡冶復以善為冶監每月役八千人營造軍器善親自督課兼加撫慰甲兵精利而皆忘其勞苦焉遷大丞相從事中郎追論屯田功賜爵龍門縣子遷黄門侍郎除河東太守進驃騎大将軍開府儀同三司賜姓宇文氏六官建拜工部中大夫進爵博平縣公轉民部中大夫時晉公䕶執政儀同齊軌語善云兵馬萬機須歸天子何因猶在權門善白之䕶遂殺軌以善忠於己引為中外府司馬遷司會中大夫副總六府事加授京兆尹仍行司會出為隆州刺史兼益州總管府長史徴拜武威少府卒贈三司刺史武帝以善告齊軌事諡曰繆公子襃嗣官至髙陽郡守善弟愼字伯䕶好學能屬文善草書少與同郡裴叔逸裴諏之桞虬范陽盧柔隴西李璨友善起家丞相府墨曹參軍文帝於行臺省置學取丞郎及府佐徳行明敏者充生悉令旦理公務晚就講習先六經而後子史又於諸生中簡徳行淳懿者侍讀書慎與李璨及隴西李伯良辛韶武功蘇衡譙郡夏侯裕安定梁曠梁禮河南長孫璋河東裴舉薛同滎陽鄭朝等十二人並應其選又以慎為學師以知諸生課業文帝雅好談論并簡名僧深識元宗者一百人於第内講說又命愼等十二人兼學佛義使内外俱通由是四方競為大乘之學在學數年復以愼為宜都公侍讀累遷禮部郎中六官建拜膳部下大夫愼兄善又任工部並居清顯時人榮之孝閔帝踐阼除御正下大夫封淮南縣子歴師氏御伯中大夫保定初出為湖州刺史界既雜蠻夷恒以刼掠為務愼乃集諸豪帥具宣朝㫖仍令首領每月一參或預言事者不限時節慎每見必殷勤勸誡及賜酒食一年之間翕然從化諸蠻乃相謂曰今日始知刺史真民父母也莫不欣悅自是襁負而至者千餘户蠻俗婚娶之後父母雖在即與别居慎謂守令曰牧守令長是化人者也豈有子娶妻便與父母離析非唯氓俗之失亦是牧守之罪愼乃親自誘導示以孝慈并遣守令各喻所部有數户蠻别居數年乃還奉養及行得果膳歸奉父母愼以其從善之速具状以聞有詔蠲其賦役於是風化大行有同華俗尋為蕃部中大夫以疾去職卒於家有文集頗為世所傳薛寘河東汾陰人也祖遵顔魏河東郡守安邑侯父乂清河廣平二郡守寘幼覽篇籍好屬文起家奉朝請從魏孝武西遷封郃陽縣子廢帝元年領著作佐郎脩國史尋拜中書侍郎脩起居注遷中書令燕公于謹征江陵以寘為司錄軍中謀畧寘並參之江陵平進爵為伯朝廷方改物創制欲行周禮乃令寘與小宗伯盧辯斟酌古今共詳定行之六官建授内史下大夫孝閔帝踐阼進爵為侯轉御正中大夫時前中書監盧柔學業優深文藻華贍而寘與之方駕故世號曰盧薛焉久之進位驃騎大将軍開府儀同三司出為淅州刺史卒於位吏民哀惜之贈虞州刺史諡曰理所著文集二十餘卷行於世又撰西京記三卷引據該洽世稱其博聞焉寘性至孝雖年齒已衰職務繁廣至於溫清之禮朝夕無違當時以此稱之子明嗣大象末儀同大将軍清水郡守薛憕字景猷河東汾隂人也曾祖𢎞敞值赫連之亂率宗人避地襄陽憕早喪父家貧躬耕以養祖母有暇則覽文籍疎宕不拘時人未之奇也江表取人多以世族憕世無貴仕解褐不過侍郎既覉旅不被擢用常歎曰豈能五十年戴幘死一校尉低頭傾首俯仰而向人也常鬱鬱不得志每在人間輙陵架勝逹負才使氣未嘗趨世祿之門左中郎将京兆韋潛度謂之曰君門地非下身才不劣何不􅗓裾數參吏部憕曰世胄躡髙位英俊沈下僚古人以為歎息竊所未能也潛度告人曰此年少實慷慨但不遭時耳孝昌中杖策還洛陽先是憕從祖眞度與族祖安都擁徐兖歸魏其子懷儁見憕甚相親善屬爾朱榮廢立憕遂還河東止懷儁家不交人物終日讀書手自抄畧将二百卷唯郡守元襲時相要屈與之抗禮懷儁謂憕曰汝還鄉里不營產業不肯娶妻豈復欲南乎憕亦不介意普泰中拜給事中加伏波将軍及齊神武起兵憕乃東㳺陳梁間謂族人孝通曰髙歡阻兵陵上喪亂方始闗中形勝之地必有霸王據之乃與孝通俱㳺長安侯莫陳悦聞之召為行臺郎除鎭逺将軍歩兵校尉及悅害賀拔岳軍人咸相慶慰憕獨謂軍司傅長髙曰悅才畧本寡輙害良将敗亡之事其則不逺吾屬今即為人所虜何慶之有乎長高以憕言為然並有憂色尋而文帝平悅引憕為記室參軍孝武西遷授征虜将軍中㪚大夫封夏陽男魏文即位拜中書侍郎加安東将軍大統四年宣光清徽殿初成憕為之頌魏文又造二欹器一為二仙人共持一鉢同處一盤鉢盖上有山山有香氣一仙人又持金瓶以臨器上傾水灌山則出於瓶而注乎器烟氣通發山中謂之仙人欹器一為二荷同處一盤相去盈尺中有蓮下垂器上以水注荷則出於蓮而盈乎器以鳬鴈蟾蜍以飾之謂之水芝欹器二盤各處一牀鉢圓而牀方其中有人三才之象也皆置清徽殿前器形似觥而方滿則平溢則傾憕各為頌皆為時所稱大統初儀制多闕文帝令憕與盧辯檀翥等參定之自以流離世故不聽音樂雖幽室獨處嘗有戚容後坐事賜死子舒嗣官至禮部下大夫儀同大将軍聘陳使副通志卷一百五十七
