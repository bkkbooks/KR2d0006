body:
  text: 通志卷二十九宋右廸功郎鄭樵漁仲撰氏族略第五臣謹按複姓者為有重複之義兩字具二義也有王氏而又有叔有子所以别王氏之族有公氏而又有子有孫所以别公氏之義或以爵系别或以國系别或以族系别或以名氏别或以邑氏别皆本乎兩字之義所以别族是之謂複也後代北姓多兩字而無兩字之義名雖同而實異耳以爵系為氏王叔氏姬姓周襄王之子王叔虎之後也王子氏姬姓周大夫王子狐王子城父之後也漢有王子中同治尚書王孫氏姬姓周大夫王孫滿之後滿頃王孫也衛有王孫賈楚有王孫由于漢書貨殖有王孫大卿陳留耆舊𫝊有王孫滑治三禮為博士公子氏春秋時列國公子之後公孫氏春秋時諸侯之孫亦以為氏者曰公孫氏皆貴者之稱或言黄帝姓公孫因亦以為氏元祐登科有公孫尚漢州人士孫氏漢書平陵士孫張為博士揚州牧明梁邱易生仲徹長安令裔孫睦後漢𢎞農太守生瑞尚書令以國系為氏唐孫氏祈姓堯之裔唐侯子孫仕晉號唐孫氏室孫氏王室之孫也古有室孫子著書姓纂云今棣州有室孫氏廖叔氏古飂叔安之後秦恵公有大夫廖叔滕叔氏滕叔繡之後楚考烈時有滕叔辛蔡仲氏姬姓蔡仲胡之後趙将有蔡仲其齊季氏姜姓齊襄公子季奔楚因氏焉世本魯有大夫齊季窺以族系為氏仲孫氏魯公子慶父之後慶父曰共仲故以為仲氏亦曰仲孫氏為閔公之故諱弑君之罪更為孟氏亦曰孟孫氏叔孫氏魯公子叔牙之後叔牙與慶父同母慶父弑閔公故牙有罪飲鴆而死遂立公孫兹為叔孫氏亦曰叔仲氏即叔氏也又後魏乙旃氏改為叔孫氏臣謹按叔氏桓公子叔牙之後叔牙飲酖而卒季友為之立後故以叔為氏至於得臣則叔牙之孫也故為叔孫氏季孫氏魯公子季友之後也亦曰季氏臧孫氏姬姓魯公子彄食邑于臧其後謂之臧孫魚孫氏子姓宋公子目夷字子魚其後以魚孫為氏楊孫氏楊晉邑也其先有食於楊者猶臧孫然秦有下大夫楊孫氏始皇時楊孫皓賈孫氏衛大夫王孫賈之後以去王室賈為始祖後漢侍中賈孫􅀈北海人古孫氏姬姓王孫賈之後亦隨音改為古孫氏見姓纂福子氏齊大夫福子丹見國語卷子氏姬姓衛文公之後也以名氏為氏國邑鄉附士丐氏姬姓晉士氏之子士丐之後也士季氏姬姓晉士氏之子士季生渥濁為士季氏見姓氏英賢傳士蒍氏姬姓晉隰叔為士氏之祖士蒍其子也為晉士官故以為氏士吉氏姬姓晉士蒍生吉為士吉氏士貞氏穀梁晉康公支子士貞之後士思氏古今人表晉有士思癸鄭有士思卜秦有将軍士思穆伍參氏世本楚伍参之後支孫以為氏國語楚昭王時有伍参蹇胡非氏媯姓陳胡公後有公子非其後子孫為胡非氏戰國有胡非子著書鬬耆氏芊姓莫賢𫝊云鬬伯比之孫鬬耆仕晉因氏焉伯宗氏世本晉孫伯起生伯宗因氏焉祁夜氏英賢𫝊祁大夫之後後漢龍驤将軍祁夜豐鬬彊氏芊姓世本若敖生鬬彊因氏焉鬬班氏芈姓世本鬬彊生班因氏焉臣謹按世本世系及名氏多與春秋公子譜不同譜中自無鬬彊雖有鬬般又鬬穀於莬之子若敖之曽孫也魏彊氏姬姓魏武子支孫荘子快生彊為魏彊氏巫咸氏商卿也其後氏焉匠麗氏左𫝊晉有匠麗氏漢功臣祝其侯匠麗舒祝圉氏衛祝圉之後漢侍御史祝圉遥臧會氏姬姓魯大夫臧會之後韓嬰氏姬姓姓纂云晉韓宣子元孫也為韓嬰氏臣謹按世譜韓宣子元孫無名嬰者惟韓襄王太子嬰韓言氏姬姓世本晉韓厥生無忌無忌生襄襄生子魚為韓言氏韓厥氏姬姓韓獻子厥支孫氏焉韓籍氏姬姓晉韓起之子籍字叔禽為韓籍氏韓褐氏姬姓英賢𫝊云晉韓厥之後韓子云趙肅侯大夫韓褐胥居孟獲氏吕氏春秋齊力人孟獲之後一云即宋猛獲也史葉氏姬姓釋例云衛頃侯之後公子史食采於葉因氏焉左傳作史華封具氏姬姓鄭公子具食采開封因氏焉鄭城父大夫封具狐人精縱氏姬姓周平王子精别封縱邑因氏精縱屠住氏芈姓英賢𫝊楚公子屠食采於住鄉因氏焉邵皓氏晉有平陽從事邵皓宣邪干已氏陳大夫干徵師食采於已因氏焉漢京兆尹干已衍先縠氏晉國士氏之别族也隰叔初封于先故以為氏彭祖氏彭姓也陸終氏之子支孫氏焉熊率氏芊姓左傳楚大夫熊率且比之後熊相氏芊姓英賢𫝊楚熊相宜僚之後懐王時将軍熊相祁以國爵為氏邑爵附夏侯氏娰姓夏禹之後至東樓公封為杞侯至簡公為楚恵王所滅弟他奔魯悼公以他夏後受爵為侯因氏焉後去魯之沛分沛立譙遂為郡人漢有太僕夏侯嬰又有夏侯始昌生勝宋朝建隆初夏侯冕登科後又有夏侯嶠夏侯嘉真柏侯氏柏成子髙堯時諸侯也因氏焉漢有尚書令柏侯奮管寜從柏侯子安受春秋子安南陽人韓侯氏周宣王時韓侯支孫氏焉屈侯氏屈舊國也風俗通魏賢人屈侯鮒史記漢有郎中令屈侯豫羅侯氏羅君之後也支孫氏焉其國在宜城山中後遷枝江晉中山王司馬服妃蜀郡羅侯氏白侯氏白楚邑也白舊侯國楚人取而邑之後漢尚書郎白侯擕吴志白侯子張莒子氏嬴姓春秋時楚滅之子孫以莒子為氏戎子氏戎子駒支之後此允姓之戎也而姓纂謂姜姓舒子氏偃姓僖公三年徐滅之子孫氏焉滑伯氏姬姓舊河南緱氏縣即其地今廢為鎮隸偃師葛伯氏嬴姓夏時諸侯為商所滅子孫因以為氏許州郾城北三十里有葛伯城息夫氏媯姓風俗通息公子邉為大夫因氏焉漢有光祿大夫息夫躬世居河内河陽以邑系為氏邑官附原伯氏左傳周原伯絞之後因氏焉今澤州沁水有原城晉孝公時有原伯盖見英賢傳温伯氏周邑也其地在河陽縣温西南召伯氏周邑也召公食采之地姓纂云左傳召伯奭之後申叔氏楚大夫申叔侯食邑于申此申叔時之後也沂相氏英賢傳云魯沂大夫為相因氏焉漢侍御史沂相封甘士氏周甘平公為王卿士因氏焉以官名為氏官氏附師宜氏後漢有師宜官南陽人善𨽻書師延氏宋有大夫師延宜其先掌樂職師祁氏左傳楚有師祁黎漢有郎中師祁番尹午氏楚大夫敖尹午之後又楚有大夫尹午子叔吕相氏秦相吕不韋本陽翟賈人子孫以貴氏焉史晁氏世本衛史晁之後侍其氏漢廣野君酈食其曽孫賜以食其為氏元孫武平帝時為侍中改為侍其焉宋朝雍熈登科有侍其頴皇祐登科有侍其瑋嘉祐登科侍其端並開封人以邑諡為氏苦成氏姬姓郄犨别封於苦為苦成子潜夫論苦成城名在鹽池東北然此城因苦成子之封而得苦成城之名其實成諡也古成氏風俗通苦成之後後隨音改焉有廣漢都尉古成雲姚興給事中黄門侍郎古成詵又将軍古成和晉袁宏集有南海太守古成彪唐開元雲陽尉古成䕫庫成氏風俗通云本苦成方言音變為庫成敦煌實錄石趙奉車都尉庫成述生濟大夏令又郎中庫成佇廣平太守庫成防從孫馗臧文氏姬姓魯大夫臧文仲之後丁若氏姜姓風俗通齊丁公子懿伯食采於若因氏焉晉遂興令丁苦堅髙宻人以諡氏為氏釐子氏出楚釐子觀起之後芊姓楚有大夫釐子班釐即僖字共叔氏姬姓鄭武公之子共叔叚之後惠叔氏姬姓魯大夫孟恵叔之後漢有尚書恵叔儉顔成氏曹姓邾婁顔之後有諡成者其後以為氏荘子有顔成子游士成氏莊子有士成綺尹文氏世本齊有尹文子著書五篇鬬文氏姓纂云楚若敖生鬬文子因氏焉武仲氏姬姓臧武仲之後也以爵諡為氏成公氏姬姓衛成公之後以諡為氏成王氏芊姓楚成王之後漢中郎成王弼代北複姓長孫氏出自拓跋鬱律生二子長曰沙莫雄次曰仲翼犍即後魏道武皇帝祖也後魏獻帝拓跋與隣七分國人以兄弟分統之沙莫䧺為南部大人後改名仁號為拓䟦氏至孝文帝以拓䟦為皇枝之長改為長孫氏以與隣長兄為紇骨氏次兄普氏改為周氏帝拓跋氏改為元氏次兄為達奚氏次兄為伊婁氏改為婁氏次兄敦邱氏改為邱氏次兄俟氏改為万俟氏又叔父之後乙旃氏改為叔孫氏疎屬車焜氏改為車氏是為十姓臣謹按北朝之制雖文采不足而古道猶存觀武王得天下封同姓五十國而兄弟之國十有六今獻帝十姓而七分兄弟其國豈非成周之道乎元魏之起甚微其後盛彊奄有中原垂百六十載豈無所自而然万俟氏後魏獻帝季弟之後獻帝七分國人與兄弟統領之是為十姓官氏志云万俟氏中間失譜太平興國登科有万俟湘政和二年登科乃右丞相万俟禼望出開封宇文氏本出遼東南單于之後有葛烏兎為鮮卑君長世襲大人至普廻因獵得玉璽自以為天所授鮮卑謂天子為宇文因號宇文氏或云神農氏為黄帝所滅子孫遁居北方以神農有甞草之功北俗呼草為俟汾音訛為宇文普廻子莫那自隂山徙居遼西至後周追諡獻侯獻侯生可地汗號莫何單于闢地西出玉門東踰遼水六世孫失豆歸自稱大單于為慕容皝所滅生拔拔瓌陵㧞㧞瓌陵後周所承也西魏遷豪傑於代都故陵徙居代州武川瓌即安化化政清河南安四公子所承也慕容氏髙辛少子居東北夷後徙遼西號鮮卑國于昌黎棘城至渉歸為鮮卑單于自云慕二儀之徳繼三光之容或云冠歩揺音訛為慕容初慕容氏破後種族仍繁後魏天賜末頗忌而誅之時有免者皆以興為氏延昌末詔復舊姓而其子女先入掖庭者猶號慕容多於他族元豐登科有慕容彦達慕輿氏即鮮卑慕容氏音訛又為慕輿前燕錄有將軍慕輿虎領軍慕輿根御史中丞慕輿千司徒慕輿㧞虎生常侍中零陵公居昌黎慕利氏後魏有吐谷渾主慕利延與慕容氏同祖豆盧氏本姓慕容燕主廆弟西平王慕容運孫北地王精之後入後魏北人謂歸義為豆盧道武因賜姓豆盧氏天禧登科有豆盧若獨孤氏本姓劉氏北蕃右賢王之後其先尚公主因從母姓劉氏後漢度遼将軍劉進伯擊匈奴兵敗被執囚之孤山下生尸利單于以為谷蠡王號獨孤部尸利六世孫羅辰從後魏孝文徙洛陽為河南人初以其部為氏姓纂云後魏代北有三十六部有伏留屯為部大人居于雲中和平中以貴人子弟鎮武川因家焉伏留屯之後有俟尼生庫者後魏司空生信又髙䕶自髙麗歸賜姓獨孤氏又獨孤楷本姓李氏也達奚氏後魏獻帝第五弟之後為十姓逺祖長寜公革生司空斤亦單姓奚氏與于婁賀劉尉為北人八族斤元孫武後周太保大冢宰鄭國公賀蘭氏有紇伏者與後魏俱起為賀蘭莫何弗因以為氏其後鎮武川因家之後生庫者賀若氏代居元朔隨魏南遷北俗謂志正為賀若因以命氏孝文時代人咸改單姓惟賀若氏不改逺祖達羅安樂王爾朱氏其先契胡部落大人世為酋帥居爾朱川因以為氏後魏有爾朱羽健從駕平晉陽定中山有功割秀容三百里封之以為世業赫連氏劉去卑之後也去卑獨孤氏之祖也勃勃僣帝號稱夏都朔方自云赫赫連天因以為氏二主共二十五年賀㧞氏與後魏同出隂山世為酋長北人謂地為㧞言總有其地而人相賀因以為氏尉遲氏與後魏同起號尉遲部如中華之諸侯國孝文改為尉遲氏崇寜登科有尉遲繹濰州人屈突氏本居元朔後徙昌黎孝文改為屈氏至西魏復本姓斛律氏代人世為部落統帥號斛律部因為氏焉斛斯氏其先居廣牧世襲莫弗大人號斛斯部因氏焉賀婁氏代人本居漢北以國為氏孝文改為婁氏伊婁氏後魏獻帝與隣第六弟為伊婁氏為十姓見官氏志庫狄氏鮮卑叚疋磾之後避難改姓庫狄居代後遷中夏若干氏出自代北以國為氏呼延氏匈奴四族有呼衍氏入中國改為呼延氏又有呼衍氏見匈奴傳宋太平登科有呼延遇大觀有呼延次升夀春人呼延範邠州人柘王氏狀云本姓王樂浪人逺祖羆後魏伏波将軍鎮武川賜姓柘王氏乙弗氏前燕有髙麗王乙弗利後魏書云代人世統部落太武時乙弗疋知隨魏南遷遂為河南人孝文改為乙氏又有乙弗根周有乙弗鳳薩孤氏代人隨魏南徙紇骨氏後魏獻帝兄紇骨氏為十姓見官氏志居代北邱敦氏後魏獻帝弟為邱敦為十姓孝文改為邱氏綦連氏代人號綦連部即以為氏史家謂其先姬姓六國末避亂出塞保祁連山因以山為姓北人語訛故曰綦連是連氏自代北隨魏南徙可達氏代北武川人隨魏南徙叱利氏一云叱列西部大人世為酋帥後魏初各依舊號為叱利氏後周改為利氏拔也氏與斛律同祖為㧞也部因氏焉叱干氏代人後魏獻帝定姓為叱干氏居武川乙干氏代人隨魏南徙屋引氏本居元朔隨魏南遷孝文改為屋氏唐洪仁府統軍屋引豐生封渭原縣公貫盩厔賀遂氏晉州稽族晉初賜姓呼延居西州後魏正始中呼延勤為定州刺史於定陽鎮賜姓賀遂氏因住南汾州仵城縣音訛者又為賀悦拓䟦氏後魏書云黄帝子昌意之後受封北土黄帝土徳王北人以土為拓后受為䟦號拓后跋氏後從省為拓跋孝文帝遷都洛陽改為元氏唐開元後有右監門大将軍西平公静邉州都督拓跋守寂亦此蕃也孫乾暉銀州刺史姪澄峴任銀州刺史沮渠氏本臨松盧水土人其先為匈奴官號沮渠因氏焉呉有沮渠萬年為張掖王晉末沮渠蒙遜僣稱西河王號北凉都張掖二主三十九年為後魏所滅也秃髪氏西河鮮卑也與後魏同出聖武帝詰汾長子疋孤神元時率其部衆徙河西六代孫樹機能據有凉州其族孫思復鞬生烏孤僣號西平王稱南凉都廣武弟利鹿孤傉檀三主十八年為乞伏熾磐所滅傉檀之子賀歸魏太武賜姓源氏乞伏氏乞伏國仁本鮮卑乞伏部酋帥也晉孝武時僣號西秦王大單于弟乾歸生熾磐熾磐生慕末四主四十七年赫連勃勃滅之見載記宋端揆登科有乞伏矩折婁氏本鮮卑隨魏南徙谷渾氏吐谷渾歸化因氏焉素和氏鮮卑檀石槐之支裔後魏有尚書素和䟦弟毗又将軍素和突後魏書云以本白部故號素和孝文改為和氏吐萬氏代人世為部落酋帥也車焜氏後魏獻帝命疎屬為車焜氏繫十姓之列孝文改為車氏車非氏後魏獻帝次兄為普氏孝文改為周氏至金水公揺周閔帝賜姓車非氏紇干氏代人孝文改為干氏乙旃氏後魏官氏志獻帝命叔父之裔為乙旃氏是為十姓見長孫氏譜孝文改為叔孫氏可頻氏周書王雄傳云太原人唐貞觀志云代人䧺涇州縂管庸國公西魏賜姓可頻氏生謙周益州縂管阻兵為隋文帝所滅宋朝建中中藍田尉可頻瑜其後也仇尼氏後燕錄有榮州刺史洛陽公仇尼倪賀悦氏即賀遂氏之訛也姓纂云今關西有此姓徒何氏周書柱國太尉李弼賜姓徒何氏谷會氏官氏志改為谷氏後有谷會琨大野氏後魏末南青州刺史大野拔都督大野況周書閻慶賜姓大野氏後魏龍驤将軍謝懿賜姓大野氏孫孝政孫偃有詞賦並行於世拔略氏後魏官氏志拔略改為蘇氏賀㧞勝𫝊有都督拔略昶俟利氏後魏疋孤之後猶中國方伯也俟元氏改為元氏俟畿氏改為畿氏俟力氏改為􅇹氏俟奴氏改為俟氏賀魯氏改為周氏賀葛氏改為葛氏賀賴氏南燕有徐州刺史賀賴盧賀兒氏改為兒氏是婁氏改為髙氏是賁氏改為封氏是云氏改為是氏西魏有是氏開府是云寶是奴氏改為是氏叱利氏改為利氏叱門氏改為門氏叱呂氏改為吕氏叱李氏改為李氏叱盧氏改為祝氏宥連氏改為雲氏費連氏改為費氏叱羅氏改為羅氏西魏有柱國叱羅協叱奴氏改為狼氏西魏開府叱奴興周文帝叱奴后生武帝又光祿大夫叱奴祐出連氏改為畢氏西秦錄乞伏國仁之先如弗與出連斯引叱靈二部自漠北出隂山有丞相出連乞都尉雍州刺史出連本右僕射出連䖍右輔将軍出連髙明費羽氏改為羽氏黜弗氏改為弗氏莫盧氏改為盧氏莫輿氏改為輿氏莫者氏西秦錄有右衛将軍莫者羖􅀈西安太守莫者㓜春尚書郎莫者阿胡莫侯氏西秦録有南凉州刺史莫侯弟眷蓋婁氏改為婁氏疋婁氏改為婁氏後魏疋婁内干女為齊神武皇帝髙歡后生文宣等三帝詳見婁氏悦力氏後魏有謁者悦力延勅力氏後魏髙車别帥勅力揵倍利氏斛律部别帥倍利奔後魏封孟都公多蘭氏後魏初多蘭部大人因氏焉賀術氏後魏初賀術部居賀術山因氏焉吐奚氏後魏吐古弼大人本姓吐奚名華後魏司徒賜姓古名弼越勒氏後魏有越勒部因氏焉尔綿氏改為綿氏後魏蠕蠕渠帥尔綿他拔來降温孤氏代人改為温垂拱中有温孤元軌解毗氏改為解後魏髙車别帥解毗莫弗幡豆建牒云氏北齊營州刺史漢中公牒云樂護諾氏後魏西河人護諾于内附鐡伐氏赫連勃勃以其本宗支庶非正統者並為鐡伐氏胡掖氏秃髪思復鞬娶胡掖氏生烏孤木易氏後魏有木易于為多蘭部帥者舌氏本康居國人朝後魏因留中國尸逐氏姓氏英賢傳云南匈奴尸逐鞬裔孫降漢因氏焉何柰氏匈奴單于之裔歸漢為何柰氏晉幽州牧王浚有将軍何柰彪先賢氏匈奴單于從兄日逐王先賢撣漢元時降漢封歸徳侯生冨昌𫝊封三代唯徐氏按史記景帝時有容成侯唯徐盧呼毒氏漢武帝時匈奴王呼毒尼降封下摩侯𫝊封三代渠復氏漢武帝時屬國酋渠復累封昆侯𫝊子絶植黎氏後魏有蠕蠕别帥植黎勿地來降竒斤氏蠕蠕别帥歸中國後改為竒氏茹茹氏其先蠕蠕種類為突厥所破歸中國後魏蔚州刺史髙平公茹茹敦生慎周寜州刺史洋公生師寶海寶師寶隋車騎大將軍安次公生盛夀海寶唐右屯衛大将軍吐賀氏後魏有吐賀真吐突氏唐有中官右監門大将軍吐突承瓘紇單氏改為單唐有日者紇單珤悉居氏古西掖國人也麗飛氏與荔菲同承吐門氏改為門氏吐難氏改為山氏渇單氏改為單氏阿單氏改為單氏渇侯氏改為紙氏統萬氏改為