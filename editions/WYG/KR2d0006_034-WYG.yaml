登科有辜甫泉州人又紹興登科有辜氏其後也軲氏音枯見字統藇氏音胥又音湑見姓苑望出吴郡如氏桓譚新論有道人如子禮漢書長安富人如氏又有如羅氏改為如氏絇氏宋登科絇紡開封人儲氏後漢儲大伯又富人儲老王莽亂以五百人據大庾嶺唐開元汜水尉儲光羲澗川人裔孫隐檢校郎中宋儲卿材登進士第望出河東今泉州有儲氏也紆氏後漢有肥鄉侯始􅊭紆邈蘧氏衛大夫蘧瑗字伯玉之後漢有大行令蘧正望出黎陽璩氏唐神功登科有璩抱朴望出豫章宋登科璩秉璩重並岳州人沮氏音葅黄帝史臣沮論之後後漢射聲校尉沮雋於氏出姓苑唐初宇文化及将於澄以魏州降今餘杭有之望出廣陵京兆洙氏宋登科有洙頏渠氏周大夫渠伯之後衛有渠孔漢有渠参封贊侯䟱氏望出東海漢太子太傅䟱廣廣兄子受世本有䟱踦束氏晉書䟱廣之後曽孫孟達避王莽亂自東海徙鹿山因去足為束氏望出南陽初氏見姓苑宋初房舉賢良方正熈寕登科初爕宻州人元豐初西美鄆州人初汝為登州人鉏氏左傳晉有力士鉏麑虚氏見姓苑犀氏史記秦有犀首䧑氏即古隄字見姓苑洼氏音珪望出南陽後漢大鴻臚洼丹毒氏下珪反見纂要云人姓􅦂氏下珪反梁有􅦂闖淮氏見姓苑棓氏音裴漢書袁盎從棓塑問占文穎曰秦末之賢士也枚氏六國時賢人枚被漢𢎞農太守枚乗望出淮隂新氏晉大夫新穆稚子之後見國語真氏風俗通云漢有太尉長史真祐西京雜記真元菟善筭又百濟八姓其一曰真望出上谷頻氏風俗通云漢有酒泉太守頻陽欣氏望出西河五代貞明登科有欣彪渤海人今臨海有此姓仁氏見姓苑出彭城誾氏姓苑廣平人勤氏風俗通魯有大夫勤成唐勤曽為舘陶尉筋氏見姓苑芬氏風俗通晉大夫芬賢見戰國策言氏孔子弟子言偃字子游望出汝南垣氏漢西河太守垣恭之南齊司馬垣歴生溒氏音袁出何氏纂要薫氏見姓苑鐏氏見纂要敦氏陳留風俗𫝊敦氏姞姓之後急就章有敦倚㑮氏牛坤切見纂要文乾氏居寒切見姓苑端氏讙氏官氏並見姓苑莞氏姓苑云吴人但氏平聲漢有西域都䕶但欽又濟隂太守但巴籛氏音牋姓苑云彭祖姓籛名鏗難氏見姓苑姍氏古刪字姓纂云人姓􅗎氏音閑濟南􅗎氏豪族為郅都所滅又前漢有宗氏瞷氏長安大豪也間氏見姓苑馯氏邱奸切前漢馯臂字子弓吴人治易堅氏見姓苑全氏祥符登科有全安石肩氏賢氏並見姓苑蜎氏如字又狂兖切漢書藝文志有蜎子十三篇楚人也老子弟子名淵涓氏列仙𫝊涓子齊人便氏平聲漢有少府便樂成望出魯國牽氏見姓苑延氏見姓苑後漢有延岑又有延篤南陽人為京兆尹殺梁冀使者又河南官氏志可地延氏改為延氏䖍氏風俗通云陳留䖍氏黄帝之後又荘子有䖍天根吞氏音天漢有吞景雲望出晉陽或作天者非纒氏藝文志纒子著書銚氏音姚饒氏見姓苑韶氏出姓苑今開封有此姓望出太原遼氏何氏姓苑有遼氏聊氏望出潁川風俗通漢侍中聊蒼著書號聊子又有潁川太守聊某著萬姓譜貂氏見姓苑超氏漢有太僕超喜朝氏音雕左傳蔡大夫朝吾麃氏秦始皇将軍麃公漢有太守麃宣膠氏商末賢人膠鬲之後漢有膠倉蒿氏見姓苑桃氏見姓苑蛾氏見姓苑左傳晉大夫蛾析之後後魏平東将軍蛾青蛾又音螘傰氏音多又音朋漢南山盜帥傰宗茶氏徒加切蘇林云音琅邪之邪漢書江都易王𫝊有男子茶悟沙氏見姓苑望出東莞姓纂云今東莞有沙氏風俗通晉有沙廣又百濟八族其一曰沙族又五代貞明登科沙承贊渤海人今吴興亦有此姓望出汝南佘氏音蛇從示唐開元有太學博士佘欽南昌人唐又有右司郎中佘珩祖文集隋考功主事洛陽人宋登科佘贇洪州人佘剛衢州人佘赫徽州人蛇氏見姓苑姚萇蛇后南安人兄越滂為南安太守又有建武将軍蛇元望出鴈門諸氏音遮後漢洛陽令諸施吴郡人今呉郡有此氏查氏側加切望出齊郡宋登科雍熈有查盛待制查道新安人也花氏出姓苑唐有倉部員外郎花季睦宋有尚書郎花尹今望出東平琅氏姓苑云齊有琅過相氏音湘見姓苑疆氏晉大夫疆劍後漢疆華又漢陽太守疆釋之並見風俗通將氏平聲石趙堂山太守将容見姓苑又有将先生出道語芳氏風俗通漢有幽州刺史芳垂敷涼氏魏志有太子太傳涼茂望出山陽彊氏望出丹陽與扶風姓苑云丹陽有彊氏前秦有将軍彊求北齊有彊諌後漢光武同舍生彊華注云又作强其兩切宋登科有彊弼卬氏漢公卿表御史大夫卬祗荒氏鄉氏當氏䘮氏並見姓苑無定望鄺氏音荒一音廣姓苑云今臨淮有此姓望出廬江杭氏宋登科杭開饒州人征氏姓苑今淮南有此姓宋征復登科訇氏許横切蜀錄關中流人訇𤦺訇廣經氏見姓苑晉太元中有經曠出還寃記望出苑陽零氏見姓苑庚氏唐太常博士庚季良更氏國語魏有更盈能虛弓落鴈星氏見姓苑南陽太守羊續娶濟北星重女見羊氏家傳瓶氏見姓苑風俗通有太子太𫝊瓶守稱氏漢元帝功臣有新山侯稱忠登氏後漢有左馮翊登道又将作大匠登豹蜀錄有關中流人始平登定望出始平南陽繒氏漢功臣表有繒賀恒氏風俗通楚大夫恒思公之後見世本漢有東安長恒裴子孫因居之望出東海憂氏見姓苑尤氏見姓苑宋尤鶴登進士第又有尤絢尤昱南劍人望出吴興脩氏漢有左騎校尉脩炳不詳所出吴有合浦太守脩允臨川人又王太后外孫脩成子仲或為脩氏郵氏古今人表有郵無恤西京雜記公孫𢎞故人郵長倩望出臨菑秋氏姓苑古有秋胡子宋中書舍人秋富望出天水不氏甫鳩切晉時有汲郡人不凖發魏襄王冢得竹書科斗文者又姚興安逺将軍不䝉世氏音浮見纂要猷氏風俗通衛有猷康望出遼西投氏漢有光禄投調或言其先周郇伯因桓王伐鄭投先驅以策其後氏焉無是理也摎氏居求切一音留史記南越王趙嬰齊在長安時娶邯鄲摎氏女魏有河内太守摎尚漢功臣表有龍侯摎廣徳侵氏望出扶風三輔決錄有扶風太守侵恭因居焉鐔氏音尋又音滛漢有廷尉鐔政後漢有鐔顯蜀志又有太常鐔丞望出廣漢今蜀中有此姓乃呼為蟾蜀音之訛也欽氏見姓苑諶氏姓苑陶侃母諶氏今南昌多此姓望出豫章鹽氏見姓苑望出北海魯國先賢𫝊漢北海相鹽津因居之潛氏望出臨川姓苑臨川有此姓宋潜有成登進士第開封人又有潜時舉江陵人也鍼氏左傳魯大夫鍼巫鍼季函氏見姓苑漢南昌太守函熙藍氏望出中山戰國策中山大夫藍諸宋有尚書郎藍丞端拱登科藍成務天聖藍畫今望出東莞汝南也上聲奉氏重氏隴氏並見姓苑䦱氏音蒍國語䦱大夫之後也起氏見姓苑俟氏風俗通俟子著書六國時人又後魏獻帝次弟為俟亥氏後為俟氏又俟奴氏改為俟氏被氏吕氏春秋鄭有大夫被瞻風俗通漢有牂牁太守被條弭氏三輔決録云王莽時有弭彊漢末新豐人弭仲叔亦見决録望出新豐紫氏履氏並見姓苑鬼氏古今人表鬼臾區舞氏宇氏並見姓苑萭氏音矩前漢游俠傳有萭章急就章萭改卿又作楀詩謂楀維師氏府氏風俗通漢有府悝為司徒掾鬴氏即釜字見姓苑望出襄陽栩氏陳留先賢𫝊有栩氏又董賢傳有栩丹序氏禮有序㸃侍孔子㸃揚觶後漢有序淵舉氏見姓苑處氏漢書藝文志趙有辨士處子著書風俗通有處興為北海太守望出潁川晉有處桂又陳留相處就並潁川人後魏有處徳又望出沛國巨氏漢有荆州刺史巨武望出平昌仵氏望出襄陽急就章仵終古今莆田多此姓宣和六年仵良翰登科大名府人堵氏又音者左傳有堵寇堵師叔堵俞彌鄭有堵狗堵汝父魏志張燕本姓堵浦氏晉起居注有尚方丞浦選宋有員外郎浦延熈望出京兆圃氏姥氏亡古切補氏禮氏見姓苑衛大夫禮孔後漢禮震受尚書於歐陽歙望出平原邸氏風俗通漢有上郡太守邸社北齊有行臺僕射邸珍中山曲陽人孫懐道唐右司郎中又居洛陽望出中山洗氏又音線晉忠義傳有洗勁南海人亥氏戰國策晉有隐者亥唐河南官氏志俟亥氏改為亥氏望出河南改氏秦有大夫改産海氏見姓苑忖氏齊有忖乙管仲誅之菌氏見姓苑本氏見姓苑雋氏才兖切漢有京兆尹雋不疑渤海人望出渤海平陽棧氏見姓苑魏志有棧潜望出任城琯氏見纂要㬊氏音緩晉有西中郎将㬊清又寜州刺史㬊静望出荆州今江陵多此姓寋氏其偃切宋寋綬登進士第蜀人圈氏音倦芊姓風俗通楚鬻熊之後望出陳留漢有圈稱撰陳留風俗傳又有圈宣明郭林宗𫝊有陳留人圈文宣卷氏音捲望出琅邪陳留風俗𫝊陳留太守琅邪卷基本圈氏因避仇去圈又有琅邪卷焉兖氏宋登科兖公序典氏風俗通魏志有校尉典韋多力者生滿望出陳留肁氏即肇字戰國策趙有大夫肁賈紹氏見姓苑表氏見姓苑考氏見姓苑今開封有此姓稻氏見姓苑今為晉陵人寶氏見姓苑我氏六國時有我子著書假氏漢有假倉治尚書陳留人望出陳留仉氏音掌梁州有仉唘仰氏出姓苑今新安呉興並有此姓宋紹興登科仰文蔚溫州人望出汝南錢唐養氏楚有養由基孝子𫝊有養奮梁有養彭舒望出山陽強氏苻秦錄有強永强帛姚秦有强起强斌西陽侯强京並畧陽氐人唐兵部郎中强寶質孫修御史中丞其先畧陽氐人徙扶風望出扶風宋强至強浚明登進士第餘杭人又有强相如強公諶皆登第常州人望出天水臣謹按彊强一字耳舊以為氏分二族兩音彊平聲強上聲後世無復上聲只作强字用平聲鞅氏見姓苑象氏見姓苑潁川望族今南昌多此姓􅯵氏畧養反見姓苑汻氏呼廣反今涇州有此姓井氏穆天子傳云周有大夫井利又左傳虞大夫井伯漢有司徒掾井宗後漢有井丹望出扶風南陽宋有尚書郎井淵又井亮功井宗元嘉祐六年登科澶州人又有井公南崇寜登科蔡州人永氏見姓苑列仙𫝊有永石公幸氏望出南昌晉書術士幸靈唐幸南容並洪州人宋有幸白幸佑幸之武登進士第望出鴈門杏氏見姓苑秉氏漢有秉寛省氏宋有大夫省臧猛氏宋有猛獲望出城陽鈄氏天口切今臨海有此姓五代漢鈄滔為處州刺史鈕氏音紐又有紐氏東晉有鈕滔吴興人隋有鈕回以孝行稱宋登科鈕昌言永興軍人守氏見姓苑糗氏風俗通漢有糗宗為嬴長醜氏後漢袁紹𫝊有醜長棸氏側紂反又音鄒晉有棸籌今襄陽江南並有此姓厚氏見姓苑後氏五代有後贊為飛龍使今開封府有此姓望出東海部氏見姓苑審氏漢辟陽侯審食其為左丞相沛人後漢末袁紹将審配望出魏郡品氏見姓苑枕氏姓苑云下邳人檢氏漢末勾章尉檢某見姓苑儉氏見姓苑湛氏後漢有大司農湛重晉荆州刺史陶侃母湛氏新淦人又有湛方宋有湛茂梁有司州刺史湛僧智唐有湛賁袁州人宋有尚書郎湛俞閩人望出新淦及豫章也啖氏亦作噉前秦有將軍啖鐡又啖助治春秋大歴水部郎中啖彦珍會昌進士啖鱗避武宗諱改為澹望出東河昝氏子感􅋀何氏姓苑有昝氏蜀人也晉書桓温將昝堅唐昝慎盈宋昝居潤為宣徽使望出太原彭城元祐登科有昝昌覽氏望出彭城湳氏乃感切見纂要減氏亦作咸漢有減宣為司𨽻校尉急就章有減罷軍或云巫咸氏之後望出汝南魯國今東海有此姓橄氏胡減切懐州人橄氏望出河内範氏宋登科範昱饒州人去聲統氏見姓苑鳳氏神仙傳有鳳綱望出平陽郃陽祕氏漢功臣表戴侯祕彭祖𫝊封七代西秦錄有僕射祕宣五代有祕瓊望出天水宋登科祕景儉真定人利氏或言楚公子食采於利後以為氏利今之葭萌也漢有利㡬又仙人利真源漢陽人風俗通漢有利乾為中相又河南官氏志叱利氏改為利氏宋利溉舉進士又有利璨登科英州人望出河南義氏漢有酷吏南陽太守義縱世居河東封岸頭侯蜀録有上庸都尉義歆宋義稹登進士第近有義道人年百五十嵗泰州人望出河東及平原騎氏去聲史記有燕将騎劫匱氏見姓苑望出廬江今廬州有此氏類氏出姓苑近為福州寜徳尉類演宋登科類從道宻州人貴氏風俗通云陸終之後漢有廬江太守貴遷晉武帝才人常山貴氏生東海王越又有司空中郎将貴霸尉氏鄭大夫尉翩之後又音欎暣氏古氣字見纂要意氏見姓苑謂氏唐以前無聞宋太平興國登科有謂凖露氏風俗通漢有上黨都尉露平固氏晉平公時有舟人固來故氏見姓苑喻氏又音樹望出南昌姓苑云南昌有喻氏東晉有喻歸撰西河記三卷又有諭氏今喻氏多作諭氏布氏風俗通趙有布子善相馬望出江夏晉陶侃别𫝊有江夏人布興樹氏姓苑云今河東有樹氏宋有諸司使樹滋近改作壹望出河南及河東又河南官氏志樹洛于氏改為樹氏遇氏風俗通漢有東安太守遇冲宋登進士第遇昌朝望出東莞附氏後漢叚熲将附都魏志有附𫝊唐監察御史附得意上元登科有附不疑望出新平務氏堯時有務成子見易𫝊列仙𫝊務光夏時人瓠氏淮南子古有瓠巴善鼓琴錯氏音措宋有太宰錯居據氏住氏並見姓苑鑢氏音慮又音盧楚大夫有鑢金庶氏子思之出母庻氏急就章有庶覇遂絮氏女據切又女居切漢書張敞傳有京兆捕賊掾絮舜謂敞為五日京兆敞殺之姓纂有去聲非是桂氏見風俗通望出燕郡天水漢有楊州刺史桂襃燕人唐永寜令桂仲武呉人宋桂軻登進士第臣謹按後漢太守陳球碑隂有城陽炅横被誅四子一守墳姓炅一避難徐州姓昋一居幽州姓桂一居華陽姓炔四字並音桂字各九畫以避難也昋氏一本作炅有昋道元著與天公論今臨海有此姓及𢎞農虢略漢有衛尉昋横又有上計掾昋景雲魏志吕䖍𫝊有炅母計氏國語有計然為越大夫范蠡之師本葵邱濮上人姓辛字文子其先晋國亡公子也漢有司空掾計訓後漢有計子勲望出齊郡京兆宋有尚書郎計用章又有計良輔計有功登科並卭州人棣氏王莽時有司馬棣立𨽻氏古有𨽻首善算制氏漢初有制氏以雅樂聲律世在樂官毳氏見姓苑蒂氏亦作䠠王莽𫝊有中常侍蒂惲張細切又徒葢切税氏盛𢎞之荆州記云建平信陵縣有税氏昔蜀王欒君王巴蜀王見廩君兵彊結好飲晏以税氏五千人遺巴蜀廩君望出河間宋税挺登進士第藝氏裔氏並見姓苑古今人表有裔欵弊氏左傳有弊無存世氏戰國時有秦大夫世鈞漢有九江尉世寵又世顧著子書炔氏漢書齊人炔欽治尚書帯氏六國時有帯他見姓苑藹氏去聲齊南海太守藹煥沛氏望出吴興貝氏宋貝寶登科常州人兌氏見姓苑佴氏如代切晉山公集有佴湛進氏後漢有進延為小黄令見華嶠後漢書延或作儉遴氏古文吝字見纂要慎氏風俗通慎到為韓大夫著慎子三十篇晉有東陽太守慎修望出天水宋有給事中慎鏞又有慎錡祥符登科靳氏楚大夫靳尚漢有靳歙又汾陽侯靳彊後漢末范陽令靳先後燕錄有太史令鴈門靳安唐金紫光禄大夫靳孝謨武功人吏部郎中靳常館陶人又居汝南今望出西河宋乾徳登科有靳穎又有靳裁之潁昌人靳守中齊州人貫氏戰國策齊有貫珠漢初趙相貫髙後漢西羌校尉貫友又博士貫長卿望出西河冠氏列仙𫝊有冠玉爨氏望出晉昌後漢河南尹爨肅見謝承後漢書蜀志交趾刺史爨琛建寜大姓也又有寜州刺史爨頠華陽國志爨習官至領軍昌寜大姓也贊氏出姓苑今開封有之炭氏西京雜記長安有炭虬戰氏後漢初戰兢為諫議大夫五代有戰貽慶登進士第戀氏漢有戀祕為南郡太守賤氏風俗通漢有右北平太守賤瓊又有賤虞練氏出姓苑今建安多此姓嘉祐登科記有練定變氏見氏薦氏並見姓苑燃氏女見切見纂要同州有此姓淖氏音閙魯共王有淖姬姓纂楚将淖齒漕氏漢書任俠漕仲叔西河人少子游亦以俠聞好氏火報切見纂要耗氏見姓苑播氏風俗通播鞉武商末賢人操氏隋大業末鄱陽賊操天成自號元興王建元始興舍氏見姓苑厙氏音舍姓苑云人姓今天台括蒼有此姓化氏見姓苑晋氏音亞見纂要斥氏音拓蔡州有此姓暢氏陳留風俗𫝊有暢氏不詳所出齊有暢恵明撰論語義十卷宋暢适暢彦雄登科並河中人暢鈎河南人伉氏漢有中大夫伉喜晉有漢中太守伉嘉抗氏望出丹陽後漢泰山都尉抗徐世居丹陽亢氏出姓苑唐登科有亢潮京兆人又有五官正亢軫曠氏宋登科有曠湜潭州人相氏去聲亦作平聲漢書武洛山出四姓其二曰相氏姚秦有相雲作獵徳賦世居馮翊望出西河諒氏後漢有洛陽令諒輔廣漢人亮氏盎氏並見姓苑況氏姓苑云廬江有此姓浪氏晉書永嘉中張平保青州為其下浪逢所殺聖氏性氏並見姓苑豆氏後魏将軍豆大田鏤氏姓苑云今遼東有此姓勾氏舊去聲今作平聲蜀志左将軍宕渠侯勾扶巴西人今蜀川多此姓富氏周大夫富辰之後又魯大夫富父終生鄭有富子繡氏漢書游俠𫝊有繡君賔馬嶺人救氏風俗通漢有諫議大夫敇乂乂或作仁廐氏灸氏胄氏舊氏並見姓苑就氏見姓苑河南官氏志就賴氏改為就氏望出河南禁氏姓苑吴興念氏望出河南西魏太傅安定公念賢代人也生華合州刺史入聲澓氏望出東海澓仲翁為漢宣帝師木氏端木賜之後因避仇改為木氏晉文章志有木華作海賦為太傅楊駿主簿又有木槩著戰國策春秋二十卷見七録又百濟八姓其五曰木氏宋熈寜登科木炎開封人崇寜木輅温州人沐氏漢有沐寵為東平太守狀云端木賜之後避難改為沐氏谷氏有聞於漢宋登科谷大向大方並曹州人谷大忠興仁人谷椿衢州人睦氏宋登科睦緯大名府人潚氏漢有鴈門太守潚何鵠氏望出東海蓛氏望出晉陵郁氏望出魯國國語云魯相郁貢子孫因居之今吴中有此姓又望出黎陽宋郁藻郁澄登科皆浙人束氏附平聲䟱氏宋登科束向揚州人束長孺博州人束贇卿鄆州人氏子木切望出彭城􅪿氏於六􅋀出姓苑逯氏音緑風俗通漢大司馬逯並後漢有逯明廣平人唐夏官郎中逯仁傑河陽人望出廣平及河内又為綠氏緑圗顓帝師今或讀為禄字宋景祐登科逯昂逯湛元祐有逯勉大名府人卓氏史記蜀郡卓氏本趙人以鐡冶致富徙臨卭後漢太傅卓茂南陽宛人望出南陽西河偓氏列仙𫝊有偓佺濁氏漢書貨殖傳有濁氏賣脯濯氏見風俗通朔氏望出南陽學氏術氏並見姓苑暨氏音訖吴有尚書暨豔唐天寶有暨晃弟昱望出餘杭渤海又有暨善應廬陵人又暨佐時上元中准制改為周氏宋登科暨唐裔建州人暨商俊南雄人悉氏古今人表悉清為神農師帙氏見纂要􅀈氏古聿字見纂要鬱氏見姓苑尉氏音鬰亦作尉鄭有尉止尉翩古賢有尉繚著書號尉繚子又河南官氏志尉遲氏魏孝文改為尉氏近有朝請大夫尉大㢘未知何許人宋初有尉昭敏為節度使又有尉春登科永静人茀氏音弼左傳有茀翰胡論語佛􅆄以中牟叛古今人表作茀􅆄恤氏恤由之後也恤由之䘮哀公使孺悲弔之孔子學士䘮禮􅞣氏音弗漢有九江太守􅞣修厥氏漢文帝賜衡山王宫人厥氏姓苑云今京兆人骨氏望出河南隋京兆郡丞骨儀官氏志紇骨氏改為骨氏南唐有歙州刺史骨言望出郃陽髪氏漢有髮福東海人治詩笪氏音妲今建州多此姓宋笪深舉進士建平人又有笪揆登科廣濟人察氏脫氏並見姓苑糴氏又音兆晉大夫糴筏折氏常列切望出西河宋為大姓世守麟州猶古諸侯今端明殿學士折彦質渫氏古有渫子賢人也見韓子桀氏古隐者桀溺漢㐮城侯桀龍蘖氏望出東莞姓苑云東莞蘖本姓薛避仇改焉齧氏荘子齧缺堯時賢人學於王倪别氏姓苑云京兆人宋有别仝望出天水京兆鐡氏隋有将軍鐡士雄宋有進士鐡南仲淮甸人恪氏晉有郎中令恪啟望出陳留佫氏音各洛氏並見姓苑薄氏風俗通衛賢人薄疑漢髙帝薄夫人生文帝夫人弟昭封軹侯官至車騎将軍子戍奴嗣唐天寶中大理評事薄芬櫟陽人望出鴈門譙國宋太平登科薄賁皇祐薄洙并州人錯氏姓纂云今温州有此姓矍氏唐有黄州刺史矍璋又四門博士矍参鐸氏晉大夫鐸遏冦楚将有鐸椒漢藝文志春秋鐸氏微㫖三篇風俗通漢有廷尉鐸政望出絳郡姓苑云今絳州有鐸氏博氏風俗通漢有博子勞善相馬望出淮南廣平畧氏姜姓吴志有畧統望出武陵藥氏望出河内後漢南陽太守藥崧又有太尉掾藥穆蜀録晉有牙門藥冲唐大歴有閑廐使兼御史大夫藥子昂生峯崙望出河内宋藥丕顯藥咸寜藥太元並登科約氏韓子古賢人約續馬融妾約氏直氏漢御史大夫直不疑封塞侯姓苑云楚人直躬之後食氏望出河南風俗通漢有博士食子通河南人敇氏音棘望出遼東後燕合浦公敕勃東夷人墨氏孤竹君之後有墨台墨翟望出梁郡勒氏晉鎮南将軍王歆騎督勒滿討張昌於随郡植氏姓纂云南越有此姓特氏左傳晉大夫特宫望出平昌錫氏錫夀之後也漢末有交趾太守錫光後梁有錫休為益州刺史望出樂安壁氏齊有壁司徒㲻氏古溺字見纂要夕氏後漢巴中渠帥有夕氏巴郡七姓一曰夕蜀志尚書令夕斌室氏見姓苑唐朝邊相室昉歸明為諸衛将軍赤氏風俗通帝嚳師赤松子之後見神仙傳辟氏左傳有辟司徒漢書富人辟子方笮氏側伯切亦作􅪩吴志漢中有笮融丹陽人風俗通楚有笮倫今呉郡有此姓適氏見姓苑麥氏姓苑云髙要始興有此姓隋有麥鐡杖始興人官至萊州刺史右屯衛大将軍今望出汝南宋登科麥致逺廣州人帛氏姓苑云呉郡人漢五威将軍帛敞後漢有帛宣神仙傳有帛和晉有髙僧帛道佺益氏今望出城陽馮翊革氏漢初功臣有煮棗侯革朱望出清河澤氏見姓苑給氏見姓苑集氏風俗通漢有外黄令集一襲氏晉有隐士襲元之南史有襲蒍蓋氏古盍切漢有蓋公又司𨽻校尉蓋寛饒後漢二十八将有蓋延又官氏志蓋樓氏改為蓋氏宋有蓋源蓋沂蓋㝢登科並大名人蓋𫝊兖州人㧁氏古闔字見纂要䪞氏才盍切見纂要納氏見姓苑涉氏晉大夫涉他神仙傳涉正宋太平登科有涉緯接氏三輔決錄有接子名昕著書十篇複姓凡複姓有不知其詳本者則附四聲之後綦母氏左傳晋有綦母張風俗通漢有廷尉綦毋参戰國策綦母子與公孫龍争辨大觀登科有綦母蕡南平人西乞氏秦将西乞術之後西都氏見王符潜夫論西鉏氏左傳宋大夫西鉏吾漢有侍御史西鉏虛見英賢𫝊南榮氏南榮疇見古今人表北人氏荘子舜友北人無擇晏子云古有北人無擇清身絜已疾世人濁自投清泠之淵九百氏姓苑云代縣有九百里為小吏叚干氏見姓苑叚干木之後也西河人青萍氏見姓苑長盧氏列子楚賢者長盧氏著書索盧氏吕氏春秋禽滑釐門人索盧参後漢淮陽令索盧放蒲盧氏姜姓齊人蒲盧胥善弋射盧蒲氏姜姓齊桓公之後左傳齊有盧蒲就魁盧蒲癸盧蒲嫳兹毋氏毋音無下同左𫝊齊大夫兹母還漢有侍御史兹母常巨毋氏王莽時有長人巨毋覇毋將氏毋終氏左傳毋終子嘉父翟國君也毋車氏見風俗通漢下邳相毋車伯竒望出樂安宣于氏前趙錄有劉淵太史令宣于修之鬬于氏多于氏並見姓苑梁由氏晉有梁由靡漢有将軍梁由是先安帝時人梁石氏漢隱者梁石君曹参所禮者也梁可氏後魏上谷梁可頭又代郡太守梁可浪仲梁氏魯大夫仲梁懐見左傳又春秋後語仲梁閔榖梁氏魯有榖梁赤傳春秋尸子云穀梁淑字元始魯人亦傳春秋十五篇望出下邳姓纂今下邳有穀梁氏将梁氏史記秦為嬴姓有将梁氏容成氏古容成子造歴神仙傳有容成公廣成氏神仙傳廣成子居崆峒山務成氏吕氏春秋務成子堯師也新序子夏曰舜學於務成跗析成氏左傳齊有析成鉏陽成氏風俗通陽成胥梁晉隱士也漢有諫議大夫陽成公衡功臣表梧齊侯陽成延𫝊封六代成或作城王莽時陽成修獻符命上成氏後漢書宻縣上成公白日昇天盆成氏孟子有盆成括仕齊将閭氏漢書藝文志将閭子名菟著書林閭氏嬴姓漢蜀郡林閭翁孺博學能文見文章志庚桑氏荘子庚桑楚之後有男氏姒姓史記禹後有有男氏澹臺氏風俗通澹臺滅眀字子羽武城人漢有博士澹臺恭浩星氏漢有浩星公治穀梁又有浩星賜趙充國所善也墨夷氏風俗通宋大夫有墨夷湏墨夷皋養由氏楚大夫養由基之後安期氏英賢傳安期生古仙人漢有安期生蒯通友人沐蘭氏望出任城端木氏端木賜仲尼弟子姑布氏趙簡子時姑布子卿善相見史記又漢有姑布子望出東平黔婁氏烈女𫝊黔婁先生古賢士中梁氏姓氏英賢傳古隱者中梁之後中野氏子姓潜夫論宋微子之後椘文王御史中野彪室中氏漢書藝文志有室中周著書十篇王莽時室中公避地漢中漢功臣表清簡侯室中同傳封四代路中氏漢書路中大夫之後歩叔氏家語步叔乗齊人仲尼弟子石作氏姓氏英賢𫝊石作蜀仲尼弟子見史記古野氏晏子春秋齊景公勇士也一作古冶壤駟氏家語壤駟赤秦人仲尼弟子合博氏漢功臣昔侯合博胡害曽孫興昭帝時将軍漆雕氏史記漆雕徒父漆雕開漆雕哆並仲尼弟子空相氏史記商後有空相氏晉恵時有空相機京相氏見英賢𫝊望出濟南晉京相璠作春秋土地名三卷馬矢氏漢有大司徒馬宫本馬矢氏馬適氏英賢𫝊漢有畢梁侯馬適育漢功臣馬適求聚黨討王莽見害巫馬氏史記巫馬施字子期仲尼弟子關龍氏夏桀時忠臣關龍逢之後青烏氏漢青烏子善術數神仙傳有青烏公羊角氏列女傳有羊角氏苑羊氏左傳莒大夫苑羊牧之後羺羊氏左傳衛石碏宰羺羊肩浩羊氏風俗通齊大夫浩羊嘉長魚氏左傳晉有長魚矯昭沙氏一作昭涉史記功臣表平州侯昭沙掉尾樂王氏晉大夫樂王鮒之後也漢有郎中樂王茂泠州氏左傳周泠州鳩之後老萊氏老萊子楚賢人著書列禦氏鄭穆公時列禦寇著書瞻葛氏英賢傳有熊氏之後世本宋景公時有瞻葛祁為大夫瑕吕氏左傳晉有瑕吕飴甥不苐氏子姓潜夫論宋不苐氏鈎弋氏英賢傳漢昭帝母鈎戈夫人又為鈎弋氏神仙傳有鈎弋君吕管氏英賢傳漢鉅鹿都尉吕管次祖中山人陵終氏王莽曽祖翁孺與東平陵終氏有怨邑裘氏衛大夫邑裘氏之後縣潘氏衛大夫栁荘卒君贈邑裘縣潘二氏書納諸棺見禮記屠㟁氏晉屠岸賈見史記函冶氏英賢傳後漢黄門侍郎函冶子覺洞沐氏漢有洞沐孟陽善易甫爽氏世本宋大夫甫爽之後安是氏英賢傳晉厲公大夫安是叔施遫僕氏漢校尉遫僕多見霍去病𫝊補禄氏英賢傳晉恵帝時殿中中郎補禄彪游􅀈氏英賢傳游􅀈子著書一篇言法家事通志卷二十九
