body:
  text: 通志卷一百一宋右廸功郎鄭樵漁仲撰列傳十四前漢韋賢子元成魏相丙吉趙廣漢尹翁歸韓延夀張敞王尊王章蓋寛饒諸葛豐劉輔鄭崇孫寶毋將隆何並眭𢎞息隨反夏侯始昌夏侯勝勝從父子建京房翼奉李㝷韋賢字長孺魯國鄒人也其先韋孟家本彭城為楚元王傅傅子夷王及孫王戊戊荒淫不遵道孟作風諫其辭曰肅肅我祖國自豕韋黼衣朱紱四牡龍旗彤弓斯征撫寧遐荒總齊羣邦以翼大商迭彼大彭勲績惟光至于有周歴世㑹同王赧聽譖寔絶我邦我邦既絶厥政斯逸賞罰之行非繇王室庶尹羣后靡扶靡衞五服崩離宗周以隊我祖斯微遷于彭城在予小子勤誒厥生阸此嫚秦耒耜以耕悠悠嫚秦上天不寧廼眷南顧授漢于京於赫有漢四方是征靡適不懐萬國攸平廼命厥弟建侯於楚俾我小臣惟傅是輔兢兢元王恭儉淨壹惠此黎民納彼輔弼饗國漸世埀烈于後廼及夷王克奉厥緒咨命不永唯王統祀左右陪臣此惟皇士如何我王不思守保不惟履氷以繼祖考邦事是廢逸游是娛犬馬繇繇是放是驅務彼鳥獸忽此稼苖烝民以匱我王以媮所𢎞非德所親非俊唯囿是恢唯䛕是信睮睮謟夫咢咢黄髮如何我王曽不是察既藐下臣追欲從逸嫚彼顯祖輕兹削黜嗟嗟我王漢之睦親曽不夙夜以休令聞穆穆天子臨爾下土明明羣司執憲靡顧正遐繇近殆其怙兹嗟嗟我王曷不此思非思非鑒嗣其罔則彌彌其失岌岌其國致氷匪霜致隊靡嫚瞻惟我王昔靡不練興國救顚孰違悔過追思黄髮秦繆以霸歲月其徂年其逮耉於昔君子庶顯于後我王如何曽不斯覽黄髮不近胡不時監後遂去位徙家於鄒又作一篇亦傳於時自孟至賢五世賢為人質朴少欲篤志於學兼通禮尚書以詩教授號稱鄒魯大儒徵為博士給事中進授昭帝詩稍遷光禄大夫詹事至大鴻臚昭帝崩無嗣大將軍霍光與公卿共尊立孝宣帝帝初即位賢以與謀議安宗廟賜爵闗内侯食邑徙為長信少府以先帝師甚見尊重本始三年代蔡義為丞相封扶陽侯食邑七百户時賢七十餘為相五歲地節三年以老病乞骸骨賜黄金百斤罷歸加賜第一區丞相致仕自賢始年八十二薨諡曰節侯賢四子長子方山為高寢令早終次子𢎞至東海太守次子舜留魯守墳墓少子元成復以明經歴位至丞相故鄒魯諺曰遺子黄金滿籯不如一經元成字少翁以父任為郎常侍騎少好學修父業尤謙遜下士出遇知識步行輙下從者與載送之以為常其接人貧賤者益加敬繇是名譽日廣以明經擢為諫大夫遷大河都尉初元成兄𢎞為太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以𢎞當為嗣故勑令自免𢎞懐謙不去官及賢病篤𢎞竟坐宗廟事繫獄罪未决室家問賢當為後者賢恚恨不肯言於是賢門下生博士義倩等與宗家計議共矯賢令使家丞上書言大行以大河都尉元成為後賢薨元成在官聞喪又言當為嗣元成深知其非賢雅意即陽為病狂卧便利妄笑語昬亂徵至長安既葬當襲爵以病狂不應召大鴻臚奏狀章下丞相御史案騐元成素有名聲士大夫多疑其欲譲爵辟兄者案事丞相史廼與元成書曰古之辭讓必有文義可觀故能垂榮於後今子獨壊容貎蒙恥辱為狂癡光曜晻而不宣㣲哉子之所託名也僕素愚陋過為宰相執事願少聞風聲不然恐子之傷高而僕為小人也元成犮人侍郎章亦上疏言聖王貴以禮讓為國宜優養元成勿枉其志使得自安衡門之下而丞相御史遂以元成實不病劾奏之有詔勿劾引拜元成不得已受爵宣帝高其節以元成為河南太守兄𢎞太山都尉遷東海太守數歲元成徵為未央衞尉遷太常坐與故平通侯楊惲厚善惲誅黨犮皆免官後以列侯侍祀孝惠廟當晨入廟天雨淖不駕駟馬車而騎至廟下有司劾奏等輩數人皆削爵為闗内侯元成自傷貶黜父爵歎曰吾何面目以奉祭祀乃作詩以自劾責初宣帝寵姬張倢伃男淮陽憲王好政事通法律上竒其材有意欲以為嗣然用太子起於細微又早失母故不忍也久之上欲感風憲王輔以禮譲之臣乃召拜元成為淮陽中尉是時王未就國元成受詔與太子太傅蕭望之及五經諸儒雜論同異於石渠閣條奏其對及元帝即位以元成為少府遷太子太傅至御史大夫永光中代于定國為丞相貶黜十年之間遂繼父相位封侯故國榮當世焉元成復作詩自著復玷缺之囏難因以戒示子孫其自責詩及是詩辭㫖皆有足稱者元成為相七年守正持重不及父賢而文采過之建昭三年薨諡曰共侯初賢以昭帝時徙平陵元成别徙杜陵病且死因使者自白曰不勝父子恩願乞骸骨歸葬父墓上許焉子頃侯寛嗣薨子僖侯育嗣薨子節侯沈嗣自賢傳國至元孫乃絶元成兄高寢令方山子安世歴郡守大鴻臚長樂衞尉朝廷稱有宰相之器㑹其病終而東海太守𢎞子賞亦明詩哀帝為定陶王時賞為太傅哀帝即位賞以舊恩為大司馬車騎將軍列位三公賜爵闗内侯食邑千户亦年八十餘以夀終宗族至吏二千石者十餘人初高祖時令諸侯王都皆立太上皇廟至惠帝尊高帝廟為太祖廟景帝尊孝文廟為太宗廟行所嘗幸郡國各立太祖太宗廟至宣帝本始三年復尊孝武廟為世宗廟行所廵狩亦立焉凡祖宗廟在郡國六十八合百六十七所而京師自高祖下至宣帝與太上皇悼皇考各自居陵旁立廟并為百七十六又園中各有寢便殿日祭於寢月祭於廟時祭於便殿寢日四上食廟歲二十五祠便殿歲四祠又月一游衣冠而昭靈后武哀王昭哀后孝文太后孝昭太后衞思后戾太子戾后各有寝園與諸帝合凡三十所一歲祠上食二萬四千四百五十五用衞士四萬五千一百二十九人祝宰樂人萬二千一百四十七人養犧牲卒不在數中至元帝時貢禹奏言古者天子七廟今孝惠孝景廟皆親盡宜毁及郡國廟不應古禮宜正定天子是其議未及施行而禹卒永光四年乃下詔先議罷郡國廟曰朕聞明王之御世也遭時為法因事制宜往者天下初定逺方未賔因嘗所親以立宗廟盖建威銷萌壹民之至權也今頼天地之靈宗廟之福四方同軌蠻貊貢職久遵而不定令疏逺卑賤共承尊祀殆非皇天祖宗之意朕甚懼焉傳不云乎吾不與祭如不祭其與將軍列侯中二千石二千石諸大夫博士議郎議丞相元成御史大夫鄭𢎞太子太傅嚴彭祖少府歐陽地餘諫大夫尹更始等七十人皆曰臣聞祭非自外至者也繇中出生於心也故唯聖人為能饗帝孝子為能饗親立廟京師之居躬親承事四海之内各以其職來助祭尊親之大義五帝三王所共不易之道也詩云有來雍雍至止肅肅相維辟公天子穆穆春秋之義父不祭於支庶之宅君不祭於臣僕之家王不祭於下土諸侯臣等愚以為宗廟在郡國宜無脩臣請勿復脩奏可因罷昭靈后武哀王昭哀后衞思后戾太子戾后園皆不奉祠裁置吏卒守焉罷郡國廟後月餘復下詔曰蓋聞明王制禮立親廟四祖宗之廟萬世不毁所以明尊祖敬宗著親親也朕獲承祖宗之重惟大禮未備戰栗恐懼不敢自顓其與將軍列侯中二千石二千石諸大夫博士議元成等四十四人奏議曰禮王者始受命諸侯始封之君皆為太祖以下五廟而迭毁毁廟之主臧乎太祖五年而再殷祭言壹禘壹祫也祫祭者毁廟與未毁廟之主皆合食於太祖父為昭子為穆孫復為昭古之正禮也祭義曰王者禘其祖自出以其祖配之而立四廟言始受命而王祭天以其祖配之而不為立廟親盡也立親廟四親親也親盡而迭毁親疏之殺示有終也周之所以七廟者以后稷始封文王武王受命而王是以三廟不毁與親廟四而七非有后稷始封文武受命之功者皆當親盡而毁成王成二聖之業制禮作樂功徳茂盛廟猶不世以行為諡而已禮廟在大門之内不敢逺親也臣愚以為高帝受命定天下宜為帝者太祖之廟世世不毁承後屬盡者宜毁今宗廟異處昭穆不序宜入就太祖廟而序昭穆如禮太上皇孝惠孝文孝景廟皆親盡宜毁皇考廟親未盡如故大司馬車騎將軍許嘉等二十九人以為孝文皇帝除誹謗去肉刑躬節儉不受獻罪人不孥不私其利出美人重絶人類賔賜長老矜恤孤獨徳厚侔天地利澤施四海宜為帝者太宗之廟廷尉忠以為孝武皇帝改正朔易服色攘四夷宜為世宗之廟諫大夫更始等十八人以為皇考廟上序於昭穆非正禮宜毁於是上重其事依違者一年乃下詔曰蓋聞王者祖有功而宗有徳尊尊之大義也存親廟四親親之至恩也高皇帝為天下誅暴除亂受命而帝功莫大焉孝文皇帝國為代王諸吕作亂海内摇動然羣臣黎庶靡不壹意北面而歸心猶謙辭固譲而後即位削亂秦之迹興三代之風是以百姓晏然咸獲嘉福徳莫盛焉高皇帝為漢太祖孝文皇帝為太宗世世承祀傳之無窮朕甚樂之孝宣皇帝為孝昭皇帝後於義壹體孝景皇帝廟及皇考廟皆親盡其正禮儀元成等奏曰祖宗之廟世世不毁繼祖以下五廟而迭毁今高皇帝為太祖孝文皇帝為太宗孝景皇帝為昭孝武皇帝為穆孝昭皇帝與孝宣皇帝俱為昭皇考廟親未盡太上孝惠廟皆親盡宜毁太上廟主宜瘞園孝惠皇帝為穆主遷於太祖廟寝園皆無復修奏可議者又以為清廟之詩言交神之禮無不清静今衣冠出游有車騎之衆風雨之氣非所謂清静也祭不欲數數則凟凟則不敬宜復古禮四時祭於廟諸寝園日月間祀皆可勿復修上亦不改也明年元成復言古者制禮别尊卑貴賤國君之母非適不得配食則薦於寝身沒而已陛下躬至孝承天心建祖宗定迭毁序昭穆大禮既定孝文太后孝昭太后寝祠園宜如禮勿復修奏可後歲餘元成薨匡衡為丞相上寝疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上詔問衡議欲復之衡深言不可上疾久不平衡惶恐禱高祖孝文孝武廟曰嗣曽孫皇帝恭承洪業夙夜不敢康寧思育休烈以章祖宗之盛功故動作接神必因古聖之經往者有司以為前因所幸而立廟將以繫海内之心非為尊祖嚴親也今頼宗廟之靈六合之内莫不附親廟宜一居京師天子親奉郡國廟可止毋修皇帝祗肅舊禮尊重神明即告于祖宗而不敢失今皇帝有疾不豫廼夢祖宗見戒以廟楚王夢亦有其序皇帝悼懼即詔臣衡復修立謹案上世帝王承祖禰之大禮皆不敢不自親郡國吏卑賤不可使獨承又祭祀之義以民為本間者歲數不豋百姓困乏郡國廟無以修立禮凶年則歲事不舉以祖禰之意為不樂是以不敢復如誠非禮義之中違祖宗之心咎盡在臣衡當受其殃大被其疾隊在溝瀆之中皇帝至孝肅愼宜蒙祐福唯高皇帝孝文皇帝孝武皇帝省察右饗皇帝之孝開賜皇帝眉夀亡疆令所疾日瘳平復反常永保宗廟天下幸甚又告謝毁廟曰往者大臣以為在昔帝王承祖宗之休典取象於天地天序五行人親五屬天子奉天故率其意而尊其制是以禘嘗之序靡有過五受命之君躬接于天萬世不墮繼烈以下五廟而遷上陳太祖閒嵗而祫其道應天故福禄永終太上皇非受命而屬盡義則當遷又以為孝莫大於嚴父故父之所尊子不敢不承父之所異子不敢同禮公子不得為母信為後則於子祭於孫止尊祖嚴父之義也寝日四上食園廟閒祠皆可亡修皇帝思慕悼懼未敢盡從惟念高皇帝聖徳茂盛受命溥將欽若稽古承順天心子孫本支陳錫亡疆誠以為遷廟合祭久長之䇿高皇帝之意廼敢不聼即以令日遷太上孝惠廟孝文太后孝昭太后寝將以昭祖宗之德順天人之序定亡窮之業今皇帝未受兹福乃有不能共職之疾皇帝願復修立承祀臣衡等咸以為禮不得如不合高皇帝孝惠皇帝孝文皇帝孝武皇帝孝昭皇帝孝宣皇帝太上皇孝文太后孝昭太后之意罪盡在臣衡等當受其咎今皇帝尚未平詔中朝臣具復毁廟之文臣衡中朝臣咸復以為天子之祀義有所斷禮有所承違統背制不可以奉先祖皇天不祐鬼神不饗六蓺所載皆言不當無所依縁以作其文事如失指罪廼在臣衡當深受其殃皇帝宜厚蒙祉福嘉氣日興疾病平復永保宗廟與天亡極羣生百神有所歸息諸廟皆同文久之上疾連年遂盡復諸所罷寝廟園皆修祀如故初上定迭毁禮獨尊孝文廟為太宗而孝武廟親未盡故未毁上於是廼復申明之曰孝宣皇帝尊孝武廟曰世宗損益之禮不敢有與焉他皆如舊制唯郡國廟遂廢云元帝崩衡奏言前以上體不平故復諸所罷祠卒不䝉福案衞思后戾太子戾后園親未盡孝惠孝景廟親盡宜毁及太上皇孝文孝昭太后昭靈后昭哀后武哀王祠請悉罷勿奉奏可初高后時患臣下妄非議先帝宗廟寝園官故定著令敢有擅議者棄市至元帝改制蠲除此令成帝時以無繼嗣河平元年復復太上皇寝廟園世世奉祠昭靈后武哀王昭哀后并食於太上寝廟如故又復擅議宗廟之命成帝崩哀帝即位丞相孔光大司空何武奏言永光五年制書高皇帝為漢太祖孝文皇帝為太宗建昭五年制書孝武皇帝為世宗損益之禮不敢有與臣愚以為迭毁之次當以時定非令所謂擅議宗廟之意也臣請與羣臣雜議奏可於是光禄勲彭宣詹事滿昌博士左咸等五十三人皆以為繼祖宗以下五廟而迭毁後雖有賢君猶不得與祖宗並列子孫雖欲褒大顯揚而立之鬼神不饗也孝武皇帝雖有功烈親盡宜毁太僕王舜中壘校尉劉歆議曰臣聞周室既衰四夷並侵獫狁最彊於今匈奴是也至宣王而伐之詩人美而頌之曰薄伐獫狁至于太原又曰嘽嘽推推如霆如雷顯允方叔征伐獫狁荆蠻來威故稱中興及至幽王犬戎來伐殺幽王取宗器自是之後南夷與北夷交侵中國不絶如綫春秋紀齊桓南伐楚北伐山戎孔子曰微管仲吾其被髮左衽矣是故棄桓之過而録其功以為伯首及漢興冒頓始彊破東胡禽月氏并其土地地廣兵彊為中國害南越尉佗總百粤自稱帝故中國雖平猶有四夷之患且無寧歲一方有急三面救之是天下皆動而被其害也孝文皇帝厚以貨賂與給和親猶侵暴無已甚者興師十餘萬衆近屯京師及四邊歲發屯備虜其為患久矣非一世之漸也諸侯郡守連匈奴及百粤以為逆者非一人也匈奴所殺郡守都尉略取人民不可勝數孝武皇帝愍中國罷勞無安寧之時乃遣大將軍驃騎伏波樓舩之屬南滅百粤起七郡北攘匈奴降昆邪十萬之衆置五屬國起朔方以奪其肥饒之地東伐朝鮮起元莵樂浪以斷匈奴之左臂西伐大宛并三十六國結烏孫起敦煌酒泉張掖以鬲婼羌裂匈奴之右肩單于孤特逺遁于幕北四埀無事斥地逺境起十餘郡功業既定廼封丞相為富民侯以大安天下富實百姓其規橅可見又招集天下賢俊與協心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸侯之制永無逆争之心至今累世頼之單于守藩百蠻服從萬世之基也中興之功未有高焉者也高帝建大業為太祖孝文皇帝德至厚也為文太宗孝武皇帝功至著也為武世宗此孝宣帝所以𤼵徳音也禮記王制及春秋穀梁傳天子七廟諸侯五大夫三士二天子七日而殯七月而𦵏諸侯五日而殯五月而𦵏此喪事尊卑之序也與廟數相應其文曰天子三昭三穆與太祖之廟而七諸侯二昭二穆與太祖之廟而五故徳厚者流光徳薄者流卑春秋左氏傳曰名位不同禮亦異數自上以下降殺以兩禮也七者其正法數可常數者也宗不在此數中宗變也茍有功德則宗之不可豫為設數故於殷太甲為太宗太戊曰中宗武丁曰高宗周公為毋逸之戒舉殷三宗以勸成王繇是言之宗無數也然則所以勸帝者之功德博矣以七廟言之孝武皇帝未宜毁以所宗言之則不可謂無功德禮記祀典曰夫聖王之制祀也功施於民則祀之以勞定國則祀之能救大災則祀之竊觀孝武皇帝功德皆兼而有焉凡在於異姓猶將特祀之况于先祖或説天子五廟無見文又説中宗高宗者宗其道而毁其廟名與實異非尊德貴功之意也詩云蔽芾甘棠勿剪勿伐召伯所茇思其人猶愛其樹况宗其道而毁其廟乎迭毁之禮自有常法無殊功異德固以親疏相推及至祖宗之序多少之數經傳無明文至尊至重難以疑文虚説定也孝宣皇帝舉公卿之議用衆儒之謀既以為世宗之廟建之萬世宣布天下臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毁上覽其議而從之制曰大僕舜中壘校尉歆議可歆又以為禮去事有殺故春秋外傳曰日祭月祀時享歲貢終王祖禰則日祭曽高則月祀二祧則時享壇墠則歲貢大禘則終王徳盛而游廣親親之殺也彌逺則彌尊故禘為重矣孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也聖人於其祖出於情矣禮無所不順故無毁廟自貢禹建迭毁之議惠景及太上寝園廢而為虚失禮意矣至平帝元始中大司馬王莽奏本始元年丞相義等議諡孝宣皇帝親曰悼園置邑三百家至元康元年丞相相等奏父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟益故奉園民滿千六百家以為縣臣愚以為皇考廟本不當立累世奉之非是又孝文太后南陵孝昭太后雲陵園雖前以禮不復修陵名未正謹與大司徒晏等百四十七人議皆曰孝宣皇帝以兄孫繼統為孝昭皇帝後以數故孝元世以孝景皇帝及皇考廟親未盡不毁此兩統貳父違於禮制案義奏親諡曰悼裁置奉邑皆應經義相奏悼園稱皇考立廟益民為縣違離祖統乖繆本義父為士子為天子祭以天子者乃謂若虞舜夏禹殷湯周文漢之高祖受命而王者也非謂繼祖統為後者也臣請皇高祖考廟奉明園毁勿修罷南陵雲陵為縣奏可魏相字弱翁濟陰定陶人也徙平陵少學易為郡卒史舉賢良以對䇿高第為茂陵令頃之御史大夫桑𢎞羊客詐稱御史止傳丞不以時謁客怒縛丞相疑其有姦收捕案致其罪論棄客市茂陵大治後遷河南太守禁止姦邪豪彊畏服㑹丞相車千秋死先是千秋子為雒陽武庫令自見失父而相治郡嚴恐久獲罪乃自免去相使掾追呼之遂不肯還相獨恨曰大將軍聞此令去官必以為我用丞相死不能遇其子使當世貴人非我殆矣武庫令西至長安大將軍霍光果以責過相曰㓜主新立以為函谷京師之固武庫精兵所聚故以丞相弟為闗都尉子為武庫令今河南太守不深惟國家大䇿茍見丞相不在而斥逐其子何淺薄也後人有告相賊殺不辜事下有司河南卒戍中都官者二三千人遮大將軍自言願復留作一年以贖太守罪河南老弱萬餘人守闗欲入上書闗吏以聞大將軍用武庫令事遂下相廷尉獄久繫踰冬㑹赦出復有詔守茂陵令遷揚州刺史考按郡國守相多所貶退相與丙吉相善時吉為光禄大夫予相書曰朝廷已深知弱翁治行方且大用矣願少愼事自重臧器于身相心善其言為霽威嚴居部二嵗徵為諫大夫復為河南太守數年宣帝即位徵相入為大司農遷御史大夫四歳大將軍霍光薨上思其功徳以其子禹為右將軍兄子樂平侯山復領尚書事相因平恩侯許伯奏封事言春秋譏世卿惡宋三世為大夫及魯季孫之專權皆危亂國家自後元以來禄去王室政繇冢宰今光死子復為大將軍兄子秉樞機昆弟諸壻據權埶在兵官光夫人顯及諸女皆通籍長信宫或夜詔門出入驕奢放縱恐寖不制宜有以損奪其權破散陰謀以固萬世之基全功臣之世又故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因許伯白去副封以防壅蔽宣帝善之詔相給事中皆從其議霍氏殺許后之謀始得上聞乃罷其三侯令就第親屬皆出補吏於是韋賢以老病免相遂代為丞相封高平侯食邑八百户及霍氏怨相又憚之謀矯太后詔先召斬丞相然後廢天子事發覺伏誅宣帝始親萬機厲精為治練羣臣核名實而相總領衆職甚稱上意元康中匈奴遣兵擊漢屯田車師者不能下上與後將軍趙充國等議欲因匈奴衰弱出兵擊其右地使不敢復擾西域相上書諫曰臣聞之救亂誅暴謂之義兵兵義者王敵加於己不得已而起者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅此五者非但人事乃天道也間者匈奴嘗有善意所得漢民輙奉歸之未有犯於邊境雖争屯田車師不足致意中今聞諸將軍欲興兵入其地臣愚不知此兵何名者也今邊郡困乏父子共犬羊之裘食草萊之實常恐不能自存難以動兵軍旅之後必有凶年言民以其愁苦之氣傷陰陽之和也出兵雖勝猶有後憂恐災害之變因此以生今郡國守相多不實選風俗尤薄水旱不時案今年計子弟殺父兄妻殺夫者凡二百一十二人臣愚以為此非小變也今左右不憂此乃欲發兵報纎介之忿於逺夷殆孔子所謂吾恐季孫之憂不在顓臾而在蕭牆之内也願陛下與平昌侯樂昌侯平恩侯及有識者詳議乃可上從相言而止相明易經有師法好觀漢故事及便宜章奏以為古今異制方今務在奉行故事而已數條漢興己來國家便宜行事及賢臣賈誼晁錯董仲舒等所言奏請施行之曰臣聞明主在上賢輔在下則君安虞而民和睦臣相幸得備位不能奉明法廣教化理四方以宣聖德民多背本趨末或有饑寒之色為陛下之憂臣相罪當萬死臣相知能淺薄不明國家大體時用之宜惟民終始未得所繇竊伏觀先帝聖徳仁恩之厚勤勞天下垂意黎庶憂水旱之災為民貧窮發倉廪振乏餧遣諫大夫博士廵行天下察風俗舉賢良平寃獄冠蓋交通省諸用寛租賦弛山澤陂池禁􅐕馬酤酒貯積所以周急繼困慰安元元便利百姓之道甚備臣相不能悉陳昧死奏故事詔書凡二十三事臣謹按王法必本於農而務積聚量入制用以備凶災故亡六年之畜尚謂之急元鼎三年平原勃海太山東郡溥被災害民餓死於道路二千石不豫慮其難使至於此頼明詔振救乃得蒙更生今歲不登穀暴騰踴臨秋收歛猶有乏者至春恐甚亡以相恤西羌未平師旅在外兵革相乘臣竊寒心宜蚤圖其備唯陛下留神元元帥繇先帝盛德以撫海内上施行其䇿又數表采易陰陽及明堂月令奏之曰臣相幸得備員奉職不修不能宣廣教化隂陽未和災害未息咎在臣等臣聞易曰天地以順動故日月不過四時不忒聖王以順動故刑罰清而民服天地變化必繇陰陽陰陽之分以日為紀日冬夏至則八風之序立萬物之性成各有常職不得相干東方之神太昊乘震執規司春南方之神炎帝乘離執衡司夏西方之神少昊乘兌執矩司秋北方之神顓頊乘坎執權司冬中方之神黄帝乘坤艮執繩司下土兹五帝所司各有時也東方之卦不可以治西方南方之卦不可以治北方春興兌治則饑秋興震治則華冬興離治則泄夏興坎治則雹明王謹于尊天愼于養人故立羲和之官以乘四時節授民事君動靜以道奉順陰陽則日月光明風雨時節寒暑調和三者得叙則災害不生五穀熟絲麻遂草木茂鳥獸蕃民不夭疾衣食有餘若是則君尊民説上下亡怨政教不違禮讓可興夫風雨不時則傷農桑農桑傷則民饑寒饑寒在身則亡亷恥宼賊姦宄所繇生也臣愚以為陰陽者王事之本羣生之命自古賢聖未有不繇者也天子之義必純取法天地而觀於先聖高皇帝所述書天子所服第八曰大謁者臣章受詔長樂宫曰今羣臣議天子所服以安治天下相國臣何御史大夫臣昌謹與將軍臣陵太子太傅臣通等議春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身亡禍殃年夀永䆒是奉宗廟安天下之大禮也臣請法之中謁者趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬四人各職一時大謁者襄章奏制曰可孝文皇帝時以二月施恩惠於天下賜孝弟力田及罷軍卒祠死事者頗非時節御史大夫晁錯時為太子家令奏言其狀臣相伏念陛下恩澤甚厚然而災氣未息竊恐詔令有未合當時者也願陛下選明經通知陰陽者四人各主一時時至明言所職以和陰陽天下幸甚相數陳便宜上納用焉相敕掾史案事郡國及休告從家還至府輙白四方異聞或有逆賊風雨災變郡不上相輙奏言之時丙吉為御史大夫同心輔政上皆重之相為人嚴毅不如吉寛視事九歲神爵三年薨諡憲侯子𢎞嗣甘露中有罪削爵為闗内侯丙吉字少卿魯國人也治律令為魯獄吏積功勞稍遷至廷尉右監坐法失官歸為州從事武帝末巫蠱事起吉以故廷尉監徵詔治巫蠱郡邸獄時宣帝生數月以皇曽孫坐衞太子事繫吉見而憐之又心知太子無事實重哀曽孫無辜吉擇謹厚女徒令保養曽孫置閒燥處吉治巫蠱事連歲不决後元二年武帝疾往來長楊五柞宫望氣者言長安獄中有天子氣於是上遣使者分條中都官詔獄繫者亡輕重一切皆殺之内謁者令郭穰夜到郡邸獄吉閉門拒使者不納曰皇曽孫在他人亡辜死者猶不可况親曽孫乎相守至天明不得入穰還以聞因劾奏吉武帝亦寤曰天使之也因赦天下郡邸獄繫者獨頼吉得生恩及四海矣曽孫病幾不全者數焉吉數勑保養乳母加致醫藥親遇甚有恩惠以私財物給其衣食後吉為車騎將軍軍市令遷大將軍長史霍光甚重之入為光禄大夫給事中昭帝崩亡嗣大將軍光遣吉迎昌邑王賀賀即位以行滛亂廢光與大臣議所立未定吉奏記於光曰將軍事孝武皇帝受襁褓之屬任天下之寄孝昭皇帝早崩亡嗣海内憂懼欲亟聞嗣主𤼵喪之日以大誼立後所立非其人復以大誼廢之天下莫不服焉方今社稷宗廟羣生之命在將軍之一舉竊伏聼於衆庶察其所言諸侯宗室在位列者未有所聞於民間也而遺詔所養武帝曽孫名病已在掖庭外家者吉前使居郡邸時見其㓜少至今十八九矣通經術有美材行安而節和願將軍詳大議參以蓍龜直宜褒顯先使入侍令天下昭然知之然後决定大䇿天下幸甚光覽其議遂尊立皇曽孫遣宗正劉德與吉迎曽孫於掖庭宣帝初立賜吉爵闗内侯吉為人深厚不伐善自曽孫遭遇吉絶口不道前恩故朝廷莫能明其功也地節三年立皇太子吉為太子太傅數月遷御史大夫及霍氏誅上躬親政省尚書事是時掖庭宫婢則令民夫上書自陳嘗有阿保之功章下掖庭令考問則辭引使者丙吉知狀掖庭令將則詣御史府以視吉吉識謂則曰汝嘗坐養皇曽孫不謹督笞汝安得有功獨渭城胡組淮陽郭徵卿有恩耳分别奏組等共養勞苦狀詔吉求組徵卿已死有子孫皆受厚賞詔免則為庶人賜錢十萬上親見問然後知吉有舊恩而終不言上大賢之制詔丞相朕微眇時御史大夫吉與朕有舊恩厥德茂焉詩不云乎亡德不報其封吉為博陽侯邑千三百户臨當封吉疾病上將使人加紼而封之及其生存也上憂吉疾不起太子太傅夏侯勝曰此未死也臣聞有陰德者必饗其樂以及子孫今吉未獲報而疾甚非其死疾也後病果瘉吉上書固辭侯印不許五歲代魏相為丞相吉本起獄法小吏後學詩禮皆通大義及居相位上寛大好禮讓掾史有罪臧不稱職輙予長休告終無所按驗客或謂吉曰君侯為漢相姦吏成其私然無所懲艾吉曰夫以三公之府有按吏之名吾竊陋焉後人代吉因以為故事公府不按吏自吉始於官屬掾史務掩過揚善吉馭吏耆酒數逋蕩嘗從吉出醉歐丞相車上西曹主吏白欲斥之吉曰以醉飽之失去士使此人將復何所容西曹地忍之地由第也此不過汚丞相車茵耳遂不去也此馭吏邊郡人習知邊塞𤼵犇命警備事嘗出適見驛騎持赤白囊邊郡發奔命書馳來至馭吏因隨驛騎至公車刺取知虜入雲中代郡遽歸府見吉白狀因曰恐虜所入邊郡二千石長吏有老病不任兵馬者宜可豫視吉善其言召東曹按邊郡長吏𤨏科條其人𤨏録未巳詔召丞相御史問以虜所入郡吏吉具對御史大夫卒遽不能詳知以得譴讓而吉見謂憂邊思職馭吏力也吉乃歎曰士無不可容能各有所長嚮使丞相不先聞馭吏言何見勞勉之有掾史繇是益賢吉吉又嘗出逢清道羣鬬者死傷横道吉過之不問掾史獨怪之前行逢人逐牛牛喘吐舌吉止駐使騎吏問逐牛行幾里矣掾史謂丞相前後失問或以譏吉吉曰民鬬相殺傷長安令京兆尹職所當禁備逐捕歲竟丞相課其殿最奏行賞罰而已宰相不親小事非所當於道路問也方春少陽用事未可大熱恐牛近行用暑故喘此時氣失節恐有所傷害也三公典調和陰陽職所當憂是以問之掾史悉服以吉知大體五鳳三年春吉病篤上自臨問吉曰即君有所不諱誰可以自代者吉辭謝曰羣臣行能明主所知愚臣無所能識上固問吉頓首曰西河太守杜延年明於法度曉國家故事前為九卿十餘年今在郡治有能名廷尉于定國執憲詳平天下自以不寃太僕陳萬年事後母孝惇厚備於行止此三人能皆在臣右唯上察之上以吉言皆是而許焉及吉薨御史大夫黄霸為丞相徵西河太守杜延年為御史大夫㑹其年老乞骸骨病免以廷尉于定國代為御史大夫黄霸薨而定國為丞相太僕陳萬年代定國為御史大夫居位皆稱職上稱吉為知人吉薨諡曰定侯子顯嗣甘露中有罪削爵為闗内侯官至衞尉太僕始顯少為諸曹嘗從事高廟至夕牲日乃使出取齋衣丞相吉大怒謂其夫人曰宗廟至重而顯不敬愼亡吾爵者必顯也夫人為言然後乃已吉中子禹為水衡都尉少子高為中壘校尉元帝時長安士伍尊上書言臣少時為郡邸小吏竊見孝宣皇帝以皇曽孫在郡邸獄是時治獄使者丙吉見皇曽孫遭離無辜吉仁心感動涕泣悽惻選擇復作胡組養視皇孫吉常從臣尊日再侍卧庭上後遭條獄之詔吉扞拒大難不避嚴刑峻法既遭大赦吉謂守丞誰如皇孫不當在官使誰如移書京兆尹遣與胡組俱送京兆尹不受復還及組日滿當去皇孫思慕吉以私錢顧組令留與郭徵卿並養數月乃遣組去後少内嗇夫白吉曰食皇孫亡詔令時吉得食米肉月月以給皇孫吉即時病輙使臣尊朝夕請問皇孫視省蓆蓐燥濕候伺組徵卿不得令晨夜去皇孫敖盪數奏甘毳食物所以擁全神靈成育聖躬功徳已亡量矣皇帝時臣上書言狀幸得下吉吉謙讓不敢自伐刪去臣辭專歸美於組徵卿皆以受田宅金錢吉封為博陽侯臣尊不得比組徵卿臣年老居貧死在旦暮欲終不言恐使有功不著吉子顯坐㣲文奪爵為闗内侯臣愚以為宜復其爵邑以報先人功德先是顯為太僕十餘年與官屬大為姦利臧千餘萬司𨽻案劾罪至不道奏請逮捕上以吉有舊恩不忍絶但免顯官奪邑四百户後復以為城門校尉顯卒子昌嗣爵闗内侯成帝時修廢功以吉舊恩尤重鴻嘉元年制詔丞相御史盖聞褒功德繼絶統所以重宗廟廣賢聖之路也故博陽侯吉以舊恩有功而封今其祀絶朕甚憐之夫善善及子孫古今之通誼也其封吉孫中郎將闗内侯昌為博陽侯奉吉後國絶三十二歲復續云昌傳子至孫王莽時乃絶趙廣漢字子都涿郡蠡吾人也故屬河間少為郡吏州從事以亷絜通敏下士為名舉茂材平凖令察亷為陽翟令以治行尤異遷京輔都尉守京兆尹㑹昭帝崩而新豐杜建為京兆掾䕶作平陵方上建素豪侠賔客為姦利廣漢聞之先風告建不改於是收案致法中貴人豪長者為請無不至終無所聼宗族賔客謀欲簒取廣漢盡知其計議主名起居使吏告曰若計如此且并滅家令數吏將建棄市莫敢近者京師稱之是時昌邑王徵即位行滛亂大將軍霍光與羣臣共廢王尊立宣帝廣漢以與議定䇿賜爵闗内侯遷潁川太守郡大姓原褚宗族横恣賔客犯為盜賊前二千石莫能禽制廣漢既至數月誅原褚首惡郡中震栗先是潁川豪傑大姓相與為婚姻吏俗朋黨廣漢患之厲使其中可用者受記出有案問既得罪名行法罰之廣漢故漏泄其語令相怨咎又教吏為缿筩及得投書削其主名而託以為豪傑大姓子弟所言其後彊宗大族家家為仇讎姦黨散落風俗大改吏民相告訐廣漢得以為耳目盜賊以故不𤼵𤼵又輙得一切治理威名流聞及匈奴降者言匈奴中皆聞廣漢本始二年漢𤼵五將軍擊匈奴徵廣漢以太守將兵屬蒲類將軍趙充國從軍還復用守京兆尹滿歲為眞廣漢為二千石以和顏接士其尉薦待遇吏殷勤甚備事推功善歸之於下曰某掾卿所為非二千石所及行之𤼵於至誠吏見者皆輸冩心腹無所隠匿咸願為用僵仆無所避廣漢聰明皆知其能之所宜盡力與否其或負者輙先聞知風諭不改乃收捕之無所逃案之辠立具即時伏辜廣漢為人彊力天性精於吏職見吏民或夜不寢至旦尤善為鉤距以得事情鉤距者設欲知馬賈則先問狗已問羊又問牛然後及馬參伍其賈以類相凖則知馬之貴賤不失實矣唯廣漢至精能行之他人效者莫能及也郡中盜賊閭里輕俠其根株窟宂所在及吏受取請求銖兩之姦皆知之長安少年數人㑹窮里空舍謀共刼人坐語未訖廣漢使吏捕治具服富人蘇回為郎二人刼之有頃廣漢將吏到家自立庭下使長安丞龔奢叩堂户曉賊曰京兆尹趙君謝兩卿無得殺質此宿衞臣也釋質束手得善相遇幸逢赦令或時解脫二人驚愕又素聞廣漢名即開户出下堂叩頭廣漢跪謝曰幸全活郎甚厚送獄勑吏謹遇給酒肉至冬當出死豫為調棺給歛葬具告語之皆曰死無所恨廣漢嘗記召湖都亭長湖都亭長西至界上界上亭長戲曰至府為我多謝問趙君亭長既至廣漢與語問事畢謂曰界上亭長寄聲謝我何以不為致問亭長叩頭服實有之廣漢因曰還為吾謝界上亭長勉思職事有以自效京兆不忘卿厚意其𤼵姦擿伏如神皆此類也廣漢奏請令長安游徼獄吏秩百石其後百石吏皆差自重不敢枉法妄繫留人京兆政清吏民稱之不容口長老傳以為自漢興治京兆者莫能及左馮翊右扶風皆治長安中犯法者從迹喜過京兆界廣漢歎曰亂吾治者常二輔也誠令廣漢得兼治之直差易耳初大將軍霍光秉政廣漢事光及光薨後廣漢心知微指發長安吏自將與俱至光子博陸侯禹第直突入其門廋索私屠酤推破盧罌斧斬其門闗而去時光女為皇后聞之對帝涕泣帝心善之以召問廣漢廣漢由是侵犯貴戚大臣所居好用世吏子孫新進年少者專厲彊壯蠭氣見事風生無所廻避率多果敢之計莫為持難廣漢終以此敗初廣漢客私酤酒長安市丞相史逐去客客疑男子蘇賢言之以語廣漢廣漢使長安丞案賢尉吏禹故劾賢為騎士屯霸上不詣屯所乏軍興賢父上書訟罪告廣漢事下有司覆治禹坐要斬請逮捕廣漢有詔即訊辭服㑹赦貶秩一等廣漢疑其邑子榮畜教令後以他法論殺畜人上書言之事下丞相御史案騐甚急廣漢使所親信長安人為丞相府門卒令微司丞相門内不法事地節三年七月中丞相傅婢有過自絞死廣漢聞之疑丞相夫人妬殺之府舍而丞相奉齋酎入廟祠廣漢得此使中郎趙奉夀風曉丞相欲以脅之毋令窮正已事丞相不聽案驗愈急廣漢欲告之先問太史知星氣者言今年當有戮死大臣廣漢即上書告丞相罪制曰下京兆尹治廣漢知事迫切遂自將吏卒突入丞相府召其夫人跪庭下受辭收奴婢十餘人去責以殺婢事丞相魏相上書自陳妻實不殺婢廣漢數犯罪法不伏辜以詐巧迫脅臣相幸臣相寛不奏願下明使者治廣漢所驗臣相家事事下廷尉治實丞相自以過譴笞傅婢出至外第乃死不如廣漢言司直蕭望之劾奏廣漢摧辱大臣欲以刼持奉公逆節傷化不道宣帝惡之下廣漢廷尉獄又坐賊殺不辜鞫獄故不以實擅斥除騎士乏軍興數罪天子可其奏吏民守闕號泣者數萬人或言臣生無益縣官願代趙京兆死使牧養小民廣漢竟坐要斬廣漢為京兆尹亷明威制豪彊小民得職百姓追思歌之至今尹翁歸字子兄河東平陽人也徙杜陵翁歸少孤與季父居為獄小吏曉習文法喜擊劒人莫能當是時大將軍霍光秉政諸霍在平陽奴客持刀兵入市鬬變吏不能禁及翁歸為市吏莫敢犯者公亷不受餽百賈畏之後去吏居家㑹田延年為河東太守行縣至平陽悉召故吏五六十人延年親臨見令有文者東有武者西閱數十人次到翁歸獨伏不肯起對曰翁歸文武兼備唯所施設功曹以為此吏倨敖不遜延年曰何傷遂召上辭問甚竒其對除補卒史便從歸府案事𤼵姦窮竟事情延年大重之自以能不及翁歸徙署督郵河東二十八縣分為兩部閎孺部汾北翁歸部汾南所舉應法得其罪辜屬縣長吏雖中傷莫有怨者舉亷為緱氏尉歴守郡中所居治理遷補都内令舉廉為𢎞農都尉徵拜東海太守過辭廷尉于定國定國家在東海欲屬託邑子兩人令坐後堂待見定國與翁歸語終日不敢見其邑子既去定國乃謂邑子曰此賢將汝不任事也又不可干以私翁歸治東海明察郡中吏民賢不肖及姦邪罪名盡知之縣縣各有記籍自聽其政有急名則少緩之吏民小解輙披籍縣縣收取黠吏豪民案致其罪高至於死取人必於秋冬課吏大㑹中及出行縣不以無事時其有所取也以一警百吏民皆服恐懼改行自新東海大豪郯許仲孫為姦猾亂吏治郡中苦之二千石欲捕者輙以力埶變詐自解終莫能制翁歸至論棄仲孫市一郡怖栗莫敢犯禁東洋大治以高第入守右扶風滿歲為眞選用亷平疾姦吏以為右職接待以禮好惡與同之其負翁歸罰亦必行治如在東海故迹姦邪罪名亦縣縣有名籍盜賊發其比伍中翁歸輙召其縣長吏曉告以姦黠主名敎使用類推迹盜賊所過抵類常如翁歸言無有遺脱緩於小弱急於豪彊豪彊有論罪輸掌畜官使斫莝責以員程不得取代不中程輙笞督極者至以鈇自剄而死京師畏其威嚴扶風大治盜賊課常為三輔最翁歸為政雖任刑其在公卿之間清絜自守語不及私然温良嗛退不以行能驕人甚得名譽於朝廷視事數歲元康四年病卒家無餘財天子賢之制詔御史朕夙興夜寐以求賢為右不異親疏近逺務在安民而已扶風翁歸亷平鄉正治民異等早夭不遂不得終其功業朕甚憐之其賜翁歸子黄金百斤以奉其祭祠翁歸三子皆為郡守少子岑歴位九卿至後將軍而閎孺亦至廣陵相有治名由是世稱田延年為知人韓延夀字長公燕人也徙杜陵少為郡文學父義為燕即中刺王之謀逆也義諫而死燕人閔之是時昭帝富於春秋大將軍霍光持政徵郡國賢良文學問以得失時魏相以文學對䇿以為賞罰所以勸善禁惡政之本也日者燕王為無道韓義出身彊諫為王所殺義無比干之親而蹈比干之節宜顯賞其子以示天下明為人臣之義光納其言因擢延夀為諫大夫遷淮陽太守治甚有名徙潁川潁川多豪彊難治國家常為選良二千石先是趙廣漢為太守患其俗多朋黨故構㑹吏民令相告訐一切以為聰明潁川由是以為俗民多怨讎延夀欲改更之教以禮讓恐百姓不從乃歴召郡中長老為鄉里所信向者數十人設酒具食親與相對接以禮意人人問以謡俗民所疾苦為陳和睦親愛銷除怨咎之路長老皆以為便可施行因與議定嫁娶喪祭儀品略依古禮不得過法延夀於是令文學校官諸生皮弁執爼豆為吏民行喪嫁娶禮百姓遵用其教賣偶車馬下里偽物者棄之市道數年徙為東郡太守黄霸代延夀居潁川霸因其迹而大治延夀為吏上禮義好古教化所至必聘其賢士以禮待用廣謀議納諫爭舉行喪讓財表孝弟有行修治學官春秋郷射陳鐘鼓管絃盛升降揖讓及都試講武設斧鉞旌旗習射御之事治城郭收賦租先明布告其日以期㑹為大事吏民敬畏趨郷之又置正五長相率以孝弟不得舍姦人閭里阡陌有非常吏輙聞知姦人莫敢入界其始若煩後吏無追捕之苦民無箠楚之憂皆便安之接待下吏恩施甚厚而約誓明或欺負之者延夀痛自刻責豈其負之何以至此吏聞者自傷悔其縣尉至自刺死及門下掾自剄人救不殊因瘖不能言延夀聞之對掾史涕泣遣吏毉治視厚復其家延夀嘗出臨上車騎吏一人後至勑功曹議罰白還至府門門卒當車願有所言延夀止車問之卒曰孝經曰資於事父以事君而敬同故母取其愛而君取其敬兼之者父也今旦明府早駕久駐未出騎吏父來至府門不敢入騎吏聞之趨走出謁適㑹明府登車以敬父而見罰得毋虧大化乎延夀舉手輿中曰微子太守不自知過歸舍召見門卒卒本諸生聞延夀賢無因自逹故代卒延夀遂待用之其納善聽諫皆此類也在東郡三歲令行禁止斷獄大减為天下最入守左馮翊滿歲稱職為眞歲餘不肯出行縣丞掾數白宜循行郡中覽觀民俗考長吏治迹延夀曰縣皆有賢令長督郵分明善惡於外行縣恐無所益重為煩擾丞掾皆以為方春月可一出勸耕桑延夀不得已行縣至高陵民有昆弟相與訟田自言延夀大傷之曰幸得備位為郡表率不能宣明教化至令民有骨肉爭訟既傷風化重使賢長吏嗇夫三老孝弟受其耻咎在馮翊當先退是日移病不聽事因入卧傳舍閉閤思過一縣莫知所為令丞嗇夫三老亦皆自繫待罪於是訟者宗族傳相責讓此兩昆弟深自悔皆自髠肉袒謝願以田相移終死不敢復爭延夀大喜開閤延見内酒肉與相對飲食厲勉以意告郷部有以表勸悔過從善之民延夀乃起聽事勞謝令丞以下引見尉薦郡中歙然莫不傳相勑厲不敢犯延夀恩信周徧二十四縣莫復以辭訟自言者推其至誠吏民不忍欺紿延夀代蕭望之為左馮翊而望之遷御史大夫侍謁者福為望之道延夀在東郡時放散官錢千餘萬望之與丞相丙吉議吉以為更大赦不須考㑹御史當問事東郡望之因令并問之延夀聞知即部吏案校望之在馮翊時廪犧官錢放散百餘萬廪犧吏掠治急自引與望之為姦延夀劾奏移殿門禁止望之望之自奏職在總領天下聞事不敢不問而為延夀所拘持上由是不直延夀各令窮竟所考望之卒無事實而望之遣御史案東郡具得其事延夀在東郡時試騎士治飾兵車畫龍虎朱爵延夀衣黄紈方領駕四馬傅總建幢棨植羽葆鼓車歌車功曹引車皆駕四馬載棨㦸五騎為伍分左右部軍假司馬千人持幢旁轂歌者先居射室望見延夀車噭咷楚歌延夀坐射室騎吏持㦸夾陛列立騎士從者帶弓鞬羅後令騎士兵車四面營陳被甲鞮鞪居馬上抱弩負籣又使騎士戲車弄馬盜驂延夀又取官銅物候月蝕鑄作刀劒鉤鐔放效尚方事及取官錢帛私假繇使吏及治飾車甲三百萬以上於是望之劾奏延夀上僭不道又自陳前為延夀所奏今復舉延夀罪衆庶皆以臣懐不正之心侵寃延夀願下丞相中二千石博士議其罪事下公卿皆以延夀前既無狀後復誣愬典法大臣欲以解罪狡猾不道天子惡之延夀竟坐棄市吏民數千人送至渭城老小扶持車轂爭奏酒炙延夀不忍距逆人人為飲計飲酒石餘使掾史分謝送者逺苦吏民延夀死無所恨百姓莫不流涕延夀三子皆為郎吏且死屬其子勿為吏以己為戒子皆以父言去官不仕至孫威乃復為吏至將軍威亦多恩信能拊衆得士死力威又坐奢僭誅延夀之風類也張敞字子高本河東平陽人也祖父孺為上谷太守徙茂陵敞父福事孝武帝官至光禄大夫敞後隨宣帝徙杜陵敞本以郷有秩補太守卒史察亷為甘泉倉長稍遷太僕丞杜延年甚竒之㑹昌邑王徵即位動作不由法度敞上書諫曰孝昭皇帝蚤崩無嗣大臣憂懼選賢聖承宗廟東迎之日惟恐屬車之行遲今天子以盛年初即位天下莫不拭目傾耳觀化聽風國輔大臣未褒而昌邑小輦先遷此過之大者也後十餘日王賀廢敞以切諫顯名擢為豫州刺史以數上事有忠言宣帝徵敞為太中大夫與于定國並平尚書事以正違忤大將軍霍光而使主兵車出軍省减用度復出為函谷闗都尉宣帝初即位廢王賀在昌邑上心憚之徙敞為山陽太守久之大將軍霍光薨宣帝始親政事封光兄孫山雲皆為列侯以光子禹為大司馬頃之山雲以過歸第霍氏諸壻親屬頗出補吏敞聞之上封事曰臣聞公子季犮有功於魯大夫趙衰有功於晉大夫田完有功於齊皆疇其庸延及子孫終後田氏簒齊趙氏分晉季氏顓魯故仲尼作春秋迹盛衰譏世卿最甚廼者大將軍决大計安宗廟定天下功亦不細矣夫周公七年耳而大將軍二十歲海内之命斷於掌握方其隆時感動天地侵迫陰陽月朓日蝕晝㝠宵光地大震烈火生地中天文失度祅祥變怪不可勝記皆陰類盛長臣下顓制之所生也朝臣宜有明言曰陛下褒寵故大將軍以報功德足矣間者輔臣顓政貴戚大盛君臣之分不明請罷霍氏三侯皆就第及衞將軍張安世宜賜几杖歸休時存問召見以列侯為天子師明詔以恩不聽羣臣以義固爭而後許天下必以陛下為不忘功德而朝臣為知禮霍氏世世無所患苦今朝廷不聞直聲而令明詔自親其文非䇿之得者也今兩侯以出人情不相逺以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也臣敞願於廣朝白發其端直守逺郡其路無由夫心之精微口不能言也言之㣲眇書不能文也故伊尹五就桀五就湯蕭相國薦淮陰累歲乃得通况乎千里之外因書文諭事指哉唯陛下省察上甚善其計然不徵也久之勃海膠東盜賊並起敞上書自請治之曰臣聞忠孝之道退家則盡心於親進官則竭力於君夫小國中君猶有奮不顧身之臣况於明天子乎今陛下遊意於太平勞精於政事亹亹不舍晝夜羣臣有司宜各竭力致身山陽郡户九萬三千口五十萬以上訖計盜賊未得者七十七人他課諸事亦略如此臣敞愚駑既無以佐思慮久處閒郡身逸樂而忘國事非忠孝之節也伏聞膠東勃海左右郡歲數不登盜賊並起至攻官寺簒囚徒搜市朝刼列侯吏失綱紀姦軌不禁臣敞不敢愛身避死唯明詔之所處願盡力摧挫其暴虐存撫其孤弱事即有業所至郡條奏其所由廢及所以興之状書奏天子徵敞拜膠東相賜黄金三十斤敞辭之官自請治劇郡非賞罰無以勸善懲惡吏追捕有功效願得一切比三輔尤異天子許之敞到膠東明設購賞開羣盜令相捕斬除罪吏追捕有功上名尚書調補縣令者數十人由是盜賊解散傳相捕斬吏民歙然國中遂平居頃之王太后數出游獵敞奏書諫曰臣聞秦王好滛聲葉陽后為不聽鄭衞之樂楚嚴好田獵樊姬為之不食鳥獸之肉口非惡㫖甘耳非憎絲竹也所以抑心意絶耆欲者将以率二君而全宗祀也禮君母出門則乘輜軿下堂則從傅母進退則鳴玉佩内飾則結綢繆此言尊貴所以自歛制不從恣之義也今太后資質淑美慈愛寛仁諸侯莫不聞而少以田獵縱欲為名於以上聞亦未宜也唯觀覽於往古全行乎來今令后姬得有所法則下臣有所稱誦臣敞幸甚書奏太后止不復出是時潁川太守黄霸以治行第一入守京兆尹霸視事數月不稱罷歸潁川於是制詔御史其以膠東相敞守京兆尹自趙廣漢誅後比更守尹如霸等數人皆不稱職京師寖廢長安市偷盜尤多百賈苦之上以問敞敞以為可禁敞既視事求問長安父老偷盜酋長數人居皆温厚出從童騎閭里以為長者敞皆召見責問因貰其罪把其宿負令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願一切受署敞皆以為吏遣歸休置酒小偷悉來賀且飲醉偷長以赭汙其衣裾吏坐里閭閱出者汙赭輙收縛之一日捕得數百人窮治所犯或一人百餘發盡行法罰由是枹鼔稀鳴市無偷盜天子嘉之敞為人敏疾賞罰分明見惡輙取時時越法縱舍有足大者其治京兆略循趙廣漢之迹方略耳目𤼵伏禁姦不如廣漢然敞本治春秋以經術自輔其政頗雜儒雅往往表賢顯善不醇用誅罰以此能自全竟免於刑戮京兆典京師長安中浩穰於三輔尤為劇郡國二千石以高第入守及為眞久者不過三二年近者數月一歲輙毁傷失名以罪過罷唯廣漢及敞為久任職敞為京兆朝廷每有大議引古今處便宜公卿皆服天子數從之然敞無威儀時罷朝㑹過走馬章臺街使御吏驅自以便面拊馬又為婦畫眉長安中傳張京兆眉憮有司以奏敞上問之對曰臣聞閨房之内夫婦之私有過於畫眉者上愛其能弗備責也然終不得大位敞與蕭望之于定國相善始敞與定國俱以諫昌邑王起遷定國為大夫平尚書事敞出為刺史時望之為大行丞後望之先至御史大夫定國後至丞相敞終不過郡守為京兆九歲坐與光禄勲楊惲厚善後憚坐大逆誅公卿奏憚黨犮不宜處位等比皆免而敞奏獨寢不下敞使賊捕掾絮舜有所案驗舜以敞劾奏當免不肯為敞竟事私歸其家人或諫舜舜曰吾為是公盡力多矣今五日京兆耳安能復案事敞聞舜語即部吏收舜繫獄是時冬月未盡數日案事吏晝夜驗治舜竟致其死事舜當出死敞使主簿持教告舜曰五日京兆竟何如冬月已盡延命乎乃棄舜市㑹立春行寃獄使者出舜家載尸并編敞教自言使者使者奏敞賊殺不辜天子薄其罪欲令敞得自便利即先下敞前坐楊惲不宜處位奏免為庶人敞免奏既下詣闕上印綬便從闕下亡命數月京師吏民解弛枹鼓數起而冀州部中有大賊天子思敞功效使使者即家在所召敞敞身被重劾及使者至妻子家室皆泣惶懼而敞獨笑曰吾身亡命為民郡吏當就捕今使者來此天子欲用我也即裝隨使者詣公車上書曰臣前幸得備位列卿待罪京兆坐殺賊捕掾絮舜舜本臣敞素所厚吏數䝉恩貸以臣有章劾當免受記考事便歸卧家謂臣五日京兆背恩忘義傷化薄俗臣竊以舜無狀枉法以誅之臣敞賊殺無辜鞫獄故不直雖伏明法死無所恨天子引見敞拜為冀州刺史敞起亡命復奉使典州既到部而廣川王國羣輩不道賊連發不得敞以耳目發起賊主名區處誅其渠帥廣川王姬昆弟及王同族宗室劉調等通行為之囊橐吏逐捕窮窘蹤迹皆入王宫敞自将郡國吏車數百兩圍守王宫搜索調等果得之殿屋重轑中敞傅吏皆捕格斷頭縣其頭王宫門外因劾奏廣川王天子不忍致法削其户敞居部歲餘冀州盜賊禁止守太原太守滿歲為眞太原郡清頃之宣帝崩元帝初即位待詔鄭朋薦敞先帝名臣宜傅輔皇太子上以問前将軍蕭望之望之以為敞能吏任治煩亂材輕非師傅之器天子使使者徵敞欲以為左馮翊㑹病卒敞所誅殺太原吏吏家怨敞隨至杜陵刺殺敞中子璜敞三子官皆至都尉初敞為京兆尹而敞弟武拜為梁相是時梁王驕貴民多豪彊號為難治敞問武欲何以治梁武敬憚兄謙不肯言敞使吏送至闗戒吏自問武武應曰馭黠馬者利其衘䇿梁國大都吏民凋敝且當以柱後惠文彈治之耳秦時獄法吏冠柱後惠文武意欲以刑法治梁吏還道之敞笑曰審如掾言武必辨治梁矣武既到官其治有迹亦能吏也敞孫竦王莽時至郡守封侯博學文雅過於敞然政事不及也竦死敞無後王尊字子贛涿郡高陽人也少孤歸諸父使牧羊澤中尊竊學問能史書年十三求為獄小吏數歲給事太守府問詔書行事尊無不對太守竒之除補書佐署守屬監獄久之尊稱病去事師郡文學官治尚書論語略通大義復召署守屬治獄為郡决曹史數歲以令舉幽州刺史從事而太守察尊廉補遼西鹽官長尊數上書言便宜事事下丞相御史初元中舉直言遷號令轉守槐里兼行美陽令事春正月美陽女子告假子不孝曰兒常以我為妻妬笞我尊聞之遣吏收捕驗問辭服章曰律無妻母之法聖人所不忍書此經所謂造獄者也尊於是出坐廷上取不孝子縣磔著樹使騎吏五人張弓射殺之吏民驚駭後上幸雍過號尊供張如法而辦以高第擢為安定太守到官出教告屬縣曰令長丞尉奉法守城為民父母抑彊持弱宣恩廣澤甚勞苦矣太守以今日至府願諸君卿勉力正身以率下故行貪鄙能變更者與為治明愼所職毋以身試法又出教勑掾功曹各自底厲助太守為治其不中用趣自避退毋久妨賢夫羽翮不修則不可以致千里闑内不理無以整外府丞悉署吏行能分别白之賢為上母以富賈人百萬不足與計事昔孔子治魯七日誅少正卯今太守視事已一月矣五官掾張輔懐虎狼之心貪汙不軌一郡之錢盡入輔家然適足以𦵏矣今将輔送獄直符史詣閤下從太守受其事丞戒之戒之相隨入獄矣輔繫獄數日死盡得其狡猾不道百萬姦臧威震郡中盜賊分散入傍郡界豪彊多誅傷伏辜者坐殘賊免起家復為䕶羌將軍轉校尉䕶送軍糧委輸而羌人反絶轉道兵數萬圍尊尊以千餘騎奔突羌賊功未列上坐擅離部署㑹赦免歸家涿郡太守徐明薦尊不宜久在閭巷上以尊為郿令遷益州刺史先是琅邪王陽為益州刺史行部至卭勑九折阪歎曰奉先人遺體奈何數乘此險後以病去及尊為刺史至其阪問吏曰此非王陽所畏道邪吏對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣尊居部二歲懐來徼外蠻夷歸附其威信博士鄭寛中使行風俗舉奏尊治状遷為東平相是時東平王以至親驕奢不奉法度傅相連坐及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舍食已乃還致詔後謁見王太傅在前説相䑕之詩尊曰毋持布鼓過雷門王怒起入後宫尊亦直趨出就舍先是王數私出入驅馳國中與后姬家交通尊到官召勑廐長大王當從官屬鳴和鸞乃出自今有令駕小車叩頭爭之言相教不得後尊朝王王復延請登堂尊謂王曰尊來為相人皆弔尊也以尊不容朝廷故見使相王耳天下皆言王勇顧但負貴安能勇如尊乃勇耳王變色視尊意欲格殺之即好謂尊曰願觀相君佩刀尊舉掖顧謂傍侍郎前引佩刀視王王欲誣相拔刀向王邪王情得又雅聞尊高名大為尊屈酌酒具食相對極歡太后徵史奏尊為相倨慢不臣王血氣未定不能忍愚誠恐母子俱死今妾不得使王復見尊陛下不留意妾願先自殺不忍見王之失義也尊竟坐免為庶人大將軍王鳯奏請尊補軍中司馬擢為司𨽻校尉初中書謁者令石顯貴幸專權為姦邪丞相匡衡御史大夫張譚皆阿附畏事顯不敢言久之元帝崩成帝初即位顯徙為中太僕不復典權衡譚乃奏顯舊惡請免顯等尊於是劾奏丞相衡御史大夫譚位三公典五常九徳以總方畧壹統類廣教化美風俗為職知中書謁者令顯等專權擅埶大作威福縱恣不制無所畏忌為海内患害不以時白奏行罰而阿䛕曲從附上罔下懐邪迷國無大臣輔政之義也皆不道在赦令前赦後衡譚舉奏顯不自陳不忠之罪而反揚著先帝任用傾覆之徒妄言百官畏之甚於主上卑君尊臣非所宜稱失大臣體又正月行幸曲臺臨饗罷衞士衡與中二千石大鴻臚賞等㑹坐殿門下衡南鄉賞等西鄉衡更為賞布東鄉席起立延賞坐私語如食頃衡知行臨百官共職萬衆㑹聚而設不正之席使下坐上相比為小惠於公門之下動不中禮亂朝廷爵秩之位衡又使官大奴入殿中問行起居還言漏上十四刻行臨到衡安坐不變色改容無􅇶惕肅敬之心驕慢不謹皆不敬有詔勿治於是衡慙懼免冠謝罪上丞相侯印綬天子以新即位重傷大臣乃下御史丞問状劾奏尊妄詆欺非謗赦前事猥歴奏大臣無正法飾成小過以塗汙宰相摧辱公卿輕薄國家奉使不敬有詔左遷尊為高陵令數月以病免㑹南山郡盗傰宗等數百人為吏民害拜故𢎞農太守傅剛為校尉将迹射士千人逐捕歲餘不能禽或說大将軍鳳賊數百人在轂下𤼵軍擊之不能得難以視四夷獨選賢京兆尹乃可於是鳳薦尊徵為諫大夫守京輔都尉行京兆尹事旬月間盗賊清遷光禄大夫守京兆尹後為眞凡三歲坐遇使者無禮司𨽻遣假佐放奉詔書白尊𤼵吏捕人放謂尊詔書所捕宜密尊曰治所公正京兆善漏泄人事放曰所捕宜今𤼵吏尊又曰詔書無京兆文不當𤼵吏及長安繫者三月間千人以上尊出行縣男子郭賜自言尊許仲家十餘人共殺賜兄賞公歸舍吏不敢捕尊行縣還上奏曰彊不陵弱各得其所寛大之政行和平之氣通御史大夫中奏尊暴虐不改外為大言倨嫚姍上威信日廢不宜備位九卿尊坐免吏民多稱惜之湖三老公乘興等上書訟尊治京兆功效日著往者南山盗賊阻山横行剽刼良民殺奉法吏道路不通城門至以警戒步兵校尉使逐捕暴師露衆曠日煩費不能禽制二卿坐黜羣盜寖彊吏氣傷沮流聞四方為國家憂當此之時有能捕斬不愛金爵重賞闗内侯寛中使問所徵故司𨽻校尉王尊捕羣盜方畧拜為諫大夫守京輔都尉行京兆尹事尊盡節勞心夙夜思職卑體下士厲奔北之吏起沮傷之氣二旬之間大黨震壊渠率效首賊亂蠲除民反農業拊循貧弱鉏耘豪彊長安宿豪大猾東市賈萬城西萭章剪張禁酒趙放杜陵楊章等皆通邪結黨挾養姦軌上干王法下亂吏治并兼役使侵漁小民為百姓豺狼更數二千石二十年莫能擒討尊以正法案誅皆伏其辜姦邪銷釋吏民説服尊撥劇整亂誅暴禁邪皆前所稀有名将所不及雖拜為眞未有殊絶褒賞加於尊身今御史大夫奏尊傷害陰陽為國家憂無承用詔書之意靖言庸違象龔滔天原其所以出御史丞楊輔故為尊書佐素行隂賊惡口不信好以刀筆䧟人於法輔常醉過尊大奴利家利家捽搏其頰兄子閎拔刀欲剄之輔以故深怨疾毒欲傷害尊疑輔内懐怨恨外依公事建畫為此議傅致奏文浸潤加誣以復私怨昔白起為秦将東破韓魏南拔郢都應侯譖之賜死杜郵吳起為魏守西河而秦韓不敢犯䜛人間焉斥逐奔楚秦聽浸潤以誅良將魏信䜛言以逐賢守此皆偏聽不聰失人之患也臣等竊痛傷尊修身絜已砥節首公刺譏不憚将相誅惡不避豪彊誅不制之賊解國家之憂功著職修威信不廢誠國家𤓰牙之吏折衝之臣今一旦無辜制於仇人之手傷於詆欺之文上不得以功除罪下不得䝉棘木之聽獨掩怨讐之偏奏被共工之大惡無所陳怨愬罪尊以京師廢亂羣盜並興選賢徵用起家為卿賊亂既除豪猾伏辜即以佞巧廢黜一尊之身三期之間乍賢乍佞豈不甚哉孔子曰愛之欲其生惡之欲其死是惑也浸潤之譖不行焉可謂明矣願下公卿大夫博士議郎定尊素行夫人臣而傷害隂陽死誅之罪也靖言庸違放殛之刑也審如御史章尊乃當伏觀闕之誅放於無人之域不得茍免及任舉尊者當獲選舉之辜不可但已即不如章飾文深詆以愬無罪亦宜有誅以懲䜛賊之口絶詐欺之路唯明主參詳使白黒分别書奏天子復以尊為徐州刺史遷東郡太守久之河水盛溢泛浸瓠子金隄老弱奔走恐水大决為害尊躬率吏民投沈白馬祀水神河伯尊親執圭璧使巫䇿祝請以身塡金隄因止宿廬居隄上吏民數千萬人爭叩頭救止尊終不肯去及水盛隄壊吏民皆奔走唯一主簿泣在尊旁尊立不動而水波稍却廻還吏民嘉壮尊之勇節白馬三老朱英等奏其状下有司考皆如言於是制詔御史東郡河水盛長毁壊金隄未决三尺百姓惶恐奔走太守身當水衝履咫尺之難不避危殆以安衆心吏民復還就作水不為災朕甚嘉之秩尊中二千石加賜黄金二十斤數歲卒官吏民紀之尊子伯亦為京兆尹坐懦弱不勝任免王章字仲卿泰山鉅平人也少以文學為官稍遷至諫大夫在朝廷名敢直言元帝初擢為左曹中郎將與御史中丞陳咸相善共毁中書令石顯為顯所䧟咸减死髠章免官成帝立徵章為諫大夫遷司𨽻校尉大臣貴戚敬憚之王尊免後代者不稱職章以選為京兆尹時帝舅大将軍王鳳輔政章雖為鳯所舉非鳯專權不親附鳳㑹日有蝕之章奏封事召見言鳳不可任用宜更選忠賢上初受章言後不忍退鳳章由是見疑遂為鳯所䧟罪至大逆語在元后傳初章為諸生學長安獨與妻居章疾病無被卧牛衣中與妻决涕泣其妻呵怒之曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困戹不自激卬乃反涕泣何鄙也後章仕官歴位及為京兆欲上封事妻又止之曰人當知足獨不念牛衣中涕泣時邪章曰非女子所知也書遂上果下廷尉獄妻子皆收繫章小女年可十二夜起號哭曰平生獄上呼囚數常至九今八而止我君素剛先死者必君明日問之章果死妻子皆徙合浦大將軍鳳薨後弟成都侯商復為大将軍輔政白上還章妻子故郡其家屬皆完具采珠致産數百萬時蕭育為泰山太守皆令贖還故田宅章為京兆二歲死不以其罪衆庶寃紀之號為三王王駿自有傳駿即王陽子也蓋寛饒字次公魏郡人也明經為郡文學以孝亷為郎舉方正對䇿高第遷諫大夫行郎中户将事劾奏衞将軍張安世子侍中陽都侯彭祖不下殿門并連及安世居位無補彭祖時實下門寛饒坐舉奏大臣非是左遷為衞司馬先是時衞司馬在部見衞尉拜謁常為衞官繇使市買寛饒視事案舊令遂揖官屬以下行衞者衞尉私使寛饒出寛饒以令詣官府門上謁辭尚書責問衞尉由是衞官不復私使候司馬候司馬不拜出先置衞輙上奏辭自此正焉寛饒初拜為司馬未出殿門斷其禪衣令短離地冠大冠帶長劍躬案行士卒廬室視其飲食居處有疾病者身自撫循臨問加致醫藥遇之甚有恩及歲盡交代上臨饗罷衞卒數千人皆叩頭自請願復留共更一年以報寛饒厚德宣帝嘉之以寛饒為太中大夫使行風俗多所稱舉貶黜奉使稱意擢為司𨽻校尉刺舉無所囘避小大輙舉所劾奏衆多廷尉處其法半用半不用公卿貴戚及郡國吏繇使至長安皆恐懼莫敢犯禁京師為清平恩侯許伯入第丞相御史将軍中二千石皆賀寛饒不行許伯請之廼往從西階上東郷特坐許伯自酌曰盖君後至寛饒曰無多酌我我廼酒狂丞相魏侯笑曰次公醒而狂何必酒也坐者皆屬目卑下之酒酣樂作長信少府檀長卿起舞為沭猴與狗鬭坐皆大笑寛饒不説卬視屋而歎曰美哉然富貴無常忽則易人此如傳舍所閱多矣唯謹愼為得久君侯可不戒哉因起趨出劾奏長信少府以列卿而沭猴舞失禮不敬上欲罪少府許伯為謝良久上廼解寛饒為人剛直高節志在奉公家貧奉錢月數千半以給吏民為耳目言事者身為司𨽻子常步行自戍北邊公廉如此然深刻喜䧟害人在位及貴戚人與為怨又好言事刺譏奸犯上意上以其儒者優容之然亦不得遷同列後進或至九卿寛饒自以行清能高有益於國而為凡庸所越愈失意不快數上疏諫爭太子庶子王生高寛饒節而非其如此予書曰明主知君絜白公正不畏彊禦故命君以司察之位擅君以奉使之權尊官厚禄已施於君矣君宜夙夜惟思當世之務奉法宣化憂勞天下雖日有益月有功猶未足以稱職而報恩也自古之治三王之術各有制度今君不務循職而已廼欲以太古久逺之事匡拂天子數進不用難聽之語以摩切左右非所以揚令名全夀命者也方今用事之人皆明習法令言足以飾君之辭文足以成君之過君不惟蘧氏之高蹤而慕子胥之末行用不訾之軀臨不測之險竊為君痛之夫君子直而不挺曲而不詘大雅云既明且哲以保其身狂夫之言聖人擇焉唯裁省覽寛饒不納其言是時上方用刑法信任中尚書宦官寛饒奏封事曰方今聖道寖廢儒術不行以刑餘為周召以法律為詩書又引韓氏易傳言五帝官天下三王家天下家以傳子官以傳賢若四時之運功成者去不得其人則不居其位書奏上以寛饒怨謗終不改下其書中二千石時執金吾議以為寛饒指意欲求䄠大逆不道諫大夫鄭昌愍傷寛饒忠直憂國以言事不當意而為文吏所詆挫上書頌寛饒曰臣聞山有猛獸藜藿為之不采國有忠臣姦邪為之不起司𨽻校尉寛饒居不求安食不求飽進有憂國之心退有死節之義上無許史之屬下無金張之託職在司察直道而行多仇少與上書陳國事有司劾以大辟臣幸得從大夫之後官以諫為名不敢不言上不聽遂下寛饒吏寛饒引佩刀自剄北闕下衆莫不憐之諸葛豐字少季琅邪人也以明經為郡文學名特立剛直貢禹為御史大夫除豐為屬舉侍御史元帝擢為司𨽻校尉刺舉無所避京師為之語曰閒何濶逢諸葛上嘉其節加豐秩光禄大夫時侍中許章以外屬貴幸奢滛不奉法度賓客犯事與章相連豐案劾章欲奏其事適逢許侍中私出豐駐車舉節詔章曰下欲收之章迫窘馳車去豐追之許侍中因得入宮門自歸上豐亦上奏於是收豐節司𨽻去節自豐始豐上書謝曰臣豐駑怯文不足以勸善武不足以執邪陛下不量臣能否拜為司𨽻校尉未有以自效復秩臣為光禄大夫官尊責重非臣所當處也又迫年歲衰暮常恐卒塡溝渠無以報厚德使論議士譏臣無補長獲素餐之名故常願捐一旦之命不待時而斷姦臣之首縣於都市編書其罪使四方明知為惡之罰然後却就斧鉞之誅誠臣所甘心也夫以布衣之士尚猶有刎剄之交今以四海之大曽無伏節死誼之臣率盡茍合取容阿黨相為念私門之利忘國家之政邪穢濁溷之氣上感于天是以災變數見百姓困乏比臣下不忠之效也臣誠恥之亡已凡人情莫不欲安存而惡危亡然忠臣直士不避患害者誠為君也今陛下天覆地載物無不容使尚書令堯賜臣豐書曰夫司𨽻者刺舉不法善善惡惡非得顓之也免處中和順經術意恩深德厚臣豐頓首幸甚臣竊不勝憤懣願賜清宴唯陛下裁幸上不許是後所言益不用豐復上書言臣聞伯竒孝而棄於親子胥忠而誅於君隠公慈而殺於弟叔武弟而殺於兄夫以四子之行屈平之材然猶不能自顯而被刑戮豈不足以觀哉使臣殺身以安國䝉誅以顯君臣誠願之獨恐未有云補而為衆邪所排令讒夫得遂正直之路壅塞忠臣沮心智士杜口此愚臣之所懼也豐以春夏繫治人在位多言其短上徙豐為城門校尉豐上書告光禄勲周堪光禄大夫張猛上不直豐廼制詔御史城門校尉豐前與光禄勲堪光禄大夫猛在朝之時數稱言堪猛之美豐前為司𨽻校尉不順四時修法度專作苛暴以獲虚威朕不忍下吏以為城門校尉不内省諸已而反怨堪猛以求報舉告案無證之辭暴揚難驗之罪毁譽恣意不顧前言不信之大者也朕憐豐之耆老不忍加刑其免為庶人終於家劉輔河間宗室也舉孝亷為襄賁令上書言得失召見上美其材擢為諫大夫㑹成帝欲立趙偼伃為皇后先下詔封偼伃父臨為列侯輔上書言臣聞天之所與必先賜以符瑞天之所違必先降以災變此神明之徵應自然之占驗也昔武王周公承順天地以饗魚烏之瑞然猶君臣祗懼動色相戒況於季世不䝉繼嗣之福屢受威怒之異者乎雖夙夜自責改過易行畏天命念祖業妙選有德之世考卜窈窕之女以承宗廟順神祗心塞天下望子孫之祥猶恐晚暮今廼觸情縱欲傾於卑賤之女欲以母天下不畏于天不媿于人惑莫大焉里語曰腐木不可以為柱卑人不可以為主天人之所不予必有禍而無福市道皆共知之朝廷莫肯一言臣竊傷心自念得以同姓拔擢尸禄不忠汚辱諫爭之官不敢不盡死唯陛下深察書奏上使侍御史收縛輔繫掖庭祕獄羣臣莫知其故於是中朝左將軍辛慶忌右將軍廉褒光禄勲師丹太中大夫谷永俱上書曰臣聞明王埀寛容之聽崇諫爭之官廣開忠直之路不罪狂狷之言然後百僚在位竭忠盡謀不懼後患朝廷無讇諛之士元首無失道之諐竊見諫大夫劉輔前以縣令求見擢為諫大夫此其言必有卓詭切至當聖心者故得拔至於此旬日之間收下祕獄臣等愚以為輔幸得託公族之親在諫臣之列新從下土來未知朝廷體獨觸忌諱不足深過小罪宜隠忍而已如有大惡宜暴治理官與衆共之昔趙簡子殺其大夫鳴犢孔子臨河而還今天心未豫災異屢降水旱迭臻方當隆寛廣問褒直盡下之時也而行慘急之誅於諫爭之臣震驚羣下失忠直心假令輔不坐直言所坐不著天下不可户曉同姓近臣本以言顯其於治親養忠之義誠不宜幽囚于掖庭獄公卿以下見陛下進用輔亟而折傷之暴人有懼心精鋭銷耎莫敢盡節正言非所以昭有虞之聽廣德美之風也臣等竊深傷之唯陛下留神省察上廼徙繫輔共工獄减死罪一等論為鬼薪終於家鄭崇字子游本高密大族世與王家相嫁娶祖父以訾徙平陵父賓明法律為御史事貢公名公直崇少為郡文學史至丞相大車屬弟立與高武侯傅喜同門學相友善喜為大司馬薦崇哀帝擢為尚書僕射數求見諌爭上初納用之每見曵革履上笑曰我識鄭尚書履聲久之上欲封祖母傅太后從弟商崇諫曰孝成皇帝封親舅五侯天為赤黄晝昏日中有黒氣今祖母從昆弟二人已侯孔郷侯皇后父高武侯以三公封尚有因縁今無故欲復封商壊亂制度逆天人心非傅氏之福也臣聞師曰逆陽者厥極弱逆隂者厥極凶短折犯人者有亂亡之患犯神者有疾夭之禍故周公著戒曰惟王不知艱難唯耽樂是從時亦罔有克夀故衰世之君夭折蚤沒此皆犯隂之害也臣願以身命當國咎崇因持詔書案起傳太后大怒曰何有為天子乃反為一臣所顓制邪上遂下詔曰朕㓜而孤皇太太后躬自養育免于襁褓教道以禮至於成人惠澤茂焉欲報之德皥天罔極前追號皇太太后父為崇祖侯惟念德報未殊朕甚恧焉侍中光禄大夫商皇太太后父同産子小自保大恩義最親其封商為汝昌侯為崇祖侯後更號崇祖侯為汝昌哀侯崇又以董賢貴寵過度諫由是重得罪數以職事見責𤼵疾頸癰欲乞骸骨不敢尚書令趙昌佞讇素害崇知其見疏因奏崇與宗族通疑有姦請治上責崇曰君門如市人何以欲禁切主上崇對曰臣門如市臣心如水願得考覆上怒下崇獄窮治死獄中孫寶字子嚴潁川鄢陵人也以明經為郡吏御史大夫張忠辟寶為屬欲令授子經更為除舍設儲偫寶自劾去忠固還之心内不平後署寶主簿寶徙入舍祭竈請比鄰忠隂察怪之使所親問寶前大夫為君設除大舍子自劾去者欲為高節也令兩府高士俗不為主簿子既為之徙舍甚説何前後不相副也寶曰高士不為主簿而大夫君以寶為可一府莫言非士安得獨自高前日君男欲學文而移寶自近禮有來學義無往教道不可詘身詘何傷且不遭者可無不為况主簿乎忠聞之甚慙上書薦寶經明質直宜備近臣為議郎遷諫大夫鴻嘉中廣漢羣盜起選為益州刺史廣漢太守扈商者大司馬車騎将軍王音姊子軟弱不任職寶到部親入山谷諭告羣盜非本造意渠率皆得悔過自出遣歸田里自劾矯制奏商為亂首春秋之義誅首惡而已商亦奏寶所縱或有渠率當坐者商徵下獄寶坐失死罪免益州吏民多陳寶功效言為車騎將軍所排上復拜寶為冀州刺史遷丞相司直時帝舅紅陽侯立使客因南郡太守李尚占懇草田數百頃頗有民所假少府陂澤畧皆開𤼵上書願以入縣官有詔郡平田予直錢有貴一萬萬以上寶聞之遣丞相史按驗𤼵其姦劾奏立尚懐姦罔上狡猾不道尚下獄死立雖不坐後兄大司馬衞将軍商薨次當代商上度立而用其弟曲陽侯根為大司馬驃騎将軍㑹益州蠻夷犯法巴蜀頗不安上以寶著名西州拜為廣漢太守秩中二千石賜黄金三十斤蠻夷安輯吏民稱之徵為京兆尹故吏侯文以剛直不茍合常稱疾不肯仕寶以恩禮請文欲為布衣友日設酒食妻子相對文求受署為掾進見如賓禮數月以立秋日署文東部督郵入見勑曰今日鷹隼始擊當順天氣取姦惡以成嚴霜之誅掾部渠有其人乎文卬曰無其人不敢空受職寶曰誰也文曰霸陵杜穉季寶曰其次文曰豺狼横道不宜復問狐狸寶黙然穉季者大俠與衞尉淳于長大鴻臚蕭育等皆厚善寶前失車騎将軍與紅陽侯有郤自恐見危時淳于長方貴幸友寶寶亦欲附之始視事而長以穉季託寶故寶窮無以復應文文怪寶氣索知其有故因曰明府素著威名今不敢取穉季當且闔閤勿有所問如此竟歲吏民未敢誣明府也即度穉季而譴他事衆口讙譁終身自堕寶曰受教穉季耳目長聞知之杜門不通水火穿舍後牆為小户但持鉏自治園因文所厚自陳如此文曰我與穉季幸同土壤素無睚眥顧受将命分當相直誠能自改嚴将不治前事即不更心但更門户適趣禍耳穉季遂不敢犯法寶亦竟歲無所譴明年穉季病死寶為京兆尹三歲京師稱之㑹淳于長敗寶與蕭育等皆坐免官文復去吏死於家穉季子杜蒼字君敖名出穉季右在游俠中哀帝即位徵寶為諫大夫遷司𨽻初傅太后與中山孝王母馮太后俱事元帝有郤傅太后使有司考馮太后令自殺衆庶寃之寶奏請覆治傅太后大怒曰帝置司𨽻主使察我馮氏反事明白故欲擿觖以揚我惡我當坐之上廼順㫖下寶獄尚書僕射唐林爭之上以林朋黨比周左遷敦煌魚澤障候大司馬傅喜光禄大夫龔勝固爭上為言太后出寶復官頃之鄭崇下獄寶上書曰臣聞䟽不圖親外不慮内臣幸得銜命奉使職在刺舉不敢避貴幸之埶以塞視聽之明按尚書令昌奏僕射崇下獄覆治榜掠将死卒無一辭道路稱寃疑昌與崇内有纎介浸潤相陷自禁門内樞機近臣蒙受寃譖虧損國家為謗不小臣請治昌以解衆心書奏天子不説以寶名臣不忍誅廼制詔丞相大司空司𨽻寶奏故尚書僕射崇寃請獄治尚書令昌案崇近臣罪惡暴著而寶懐邪附下罔上以春月作詆欺遂其姦心蓋國之賊也傳不云乎惡利口之覆國家其免寶為庶人哀帝崩王莽白王太后徵寶以為光禄大夫與王舜等俱迎中山王平帝立寶為大司農㑹越嶲郡上黄龍游江中太師孔光大司徒馬宮等咸稱莽功德比周公宜告祠宗廟寶曰周公上聖召公大賢尚猶有不相説著於經典兩不相損今風雨未時百姓不足每有一事羣臣同聲得無非其美者時大臣皆失色侍中奉車都尉甄邯即時承制罷議者㑹寶遣吏迎母母道病留弟家獨遣妻子司直陳崇以奏寶事下三公即訊寶對曰年七十誖眊恩衰共養營妻子如章寶坐免終於家建武中録舊德臣以寶孫伉為諸長母将隆字君房東海蘭陵人也大司馬車騎将軍王音内領尚書外典兵馬踵故選置從事中即與參謀議奏請隆為從事中郎遷諫大夫成帝末隆奏封事言古者選諸侯入為公卿以褒功德宜徵定陶王使在國邸以塡萬方其後上竟立定陶王為太子隆遷冀州牧潁川太守哀帝即位以高第入為京兆尹遷執金吾時侍中董賢方貴上使中黄門𤼵武庫兵前後十輩送董賢及上乳母王阿舍隆奏言武庫兵器天下公用國家武備繕治造作皆度大司農錢大司農錢自乘輿不以給共養共養勞賜一出少府盖不以本臧給末用不以民力共浮費别公私示正路也古者諸侯方伯得顓征伐廼賜斧鉞漢家邊吏職在距宼亦賜武庫兵皆任其事然後蒙之春秋之誼家不臧甲所以抑臣威損私力也今賢等便僻弄臣私恩微妾而以天下公用給其私門契國威器共其家備民力分於弄臣武兵設於微妾建立非宜以廣驕僭非所以示四方也孔子曰奚取於三家之堂臣請收還武庫上不説頃之傅太后使謁者買諸官婢賤取之復取執金吾官婢八人隆奏言賈賤請更平直上於是制詔丞相御史大夫交讓之禮興則虞芮之訟息隆位九卿既無以匡朝廷之不逮而反奏請與永信宮爭貴賤之賈程奏顯言衆莫不聞舉錯不由誼理爭求之名自此始無以示百僚傷化失俗以隆前有安國之言左遷為沛郡都尉遷南郡太守王莽少時慕與隆交隆不甚附哀帝崩莽秉政使大司徒孔光奏隆前為冀州牧治中山馮太后獄寃陷無辜不宜處位在中土本中謁者令史立侍御史丁元自典考之但與隆連名奏事史立時為中太僕丁元泰山太守及尚書令趙昌譖鄭崇者為河内太守皆免官徙合浦何並字子亷祖父以吏二千石自平輿徙平陵並為郡吏至大司空掾事何武武高其志節舉能治劇為長陵令道不拾遺初卭成太后外家王氏貴而侍中王林卿通輕俠傾京師後坐法免賔客愈盛歸長陵上冡因留飲連日並恐其犯法自造門上謁謂林卿曰冡閒單外君宜以時歸林卿曰諾先是林卿殺婢壻埋冡舍並具知之以非已時又見其新免故不發舉欲無令留界中而已即且遣吏奉謁傳送林卿素驕慙於賔客並度其為變儲兵馬以待之林卿既去北度涇橋令騎奴還至寺門拔刀剥其建皷並自從吏兵追林卿行數十里林卿迫窘廼令奴冠其冠被其襜褕自代乘車從童騎身變服從間徑馳去㑹日暮追及收縛冠奴奴曰我非侍中奴耳並心自知已失林卿廼曰王君困自稱奴得脱死邪叱吏斷頭持還縣所剥皷置都亭下署曰故侍中王林卿坐殺人埋冢舍使奴剥寺門皷吏民驚駭林卿因亡命衆庶讙譁以為實死成帝太后以卭成太后愛林卿故聞之涕泣為言哀帝哀帝問状而善之遷並隴西太守徙潁川太守代陵陽嚴詡詡本以孝行為官謂掾史為師友有過輙閉閤自責終不大言郡中亂王莽遣使徵詡官屬數百人為設祖道詡據地哭掾史曰明府吉徵不宜若此詡曰吾哀潁川士身豈有憂哉我以柔弱徵必選剛猛代代到将有僵仆者故相弔耳詡至拜為美俗使者是時潁川鍾元為尚書令領廷尉用事有權弟威為郡掾臧千金並為太守過辭鍾廷尉廷尉免冠為弟請一等之罪願蚤就髠鉗並曰罪在弟身與君律不在於太守元懼馳遣人呼弟陽翟輕俠趙季李款多畜賔客以氣力漁食閭里至姦人婦女持吏長短從横郡中聞並且至皆亡去並下車求勇猛曉文法吏且十人使文吏治三人獄武吏往捕之各有所部勑曰三人非負太守廼負王法不得不治鍾威所犯多在赦前驅使入凾谷闗勿令汙民間不入闗廼收之趙李桀惡雖逺去當得其頭以謝百姓鍾威負其兄止雒陽吏格殺之亦得趙李他郡持頭還並皆縣頭及其具獄於市郡中清靜表善好士見紀潁川名次黄霸性清廉妻子不至官舍數年卒疾病召丞掾作先令書曰告子恢吾生素餐日久死雖當得法賻勿受葬為小椁亶容下棺恢如父言王莽擢恢為闗都尉建武中以並孫為郎眭𢎞字孟魯國蕃人也少時好俠鬬雞走馬長乃變節從嬴公受春秋以明經為議郎至符節令孝昭元鳳三年正月泰山萊蕪山南匈匈有數千人聲民視之有大石自立高丈五尺大四十八圍入地深八尺三石為足石立後有白烏數千下集其旁是時昌邑有枯社木卧復生又上林苑中大桞樹斷枯卧地亦自立生有蟲食樹葉成文字曰公孫病已立孟推春秋之意以為石桞皆隂類下民之象泰山者岱宗之嶽王者易姓告代之處今大石自立僵柳復起非人力所為此當有從匹夫為天子者枯社木復生故廢之家公孫氏當復興者也孟意亦不知其所在即説曰先師董仲舒有言雖有繼體守文之君不害聖人之受命漢家堯後有傳國之運漢帝宜誰差天下求索賢人䄠以帝位而退自封百里如殷周二王後以承順天命孟使友人内官長賜上此書時昭帝㓜大将軍霍光秉政惡之下其書廷尉奏賜孟妄設祅言惑衆大逆不道皆伏誅後五年孝宣帝興於民間即位徵孟子為郎夏侯始昌魯人也通五經以齊詩尚書教授自董仲舒韓嬰死後武帝得始昌甚重之始昌明於陰陽先言柏梁臺災日至期日果災時昌邑王以少子愛上為選師始昌為大傅年老以夀終族子勝亦以儒顯名夏侯勝字長公初魯共王分魯西寧郷以封子節侯别屬大河大河後更名東平故勝為東平人勝少孤好學從始昌受尚書及洪範五行傳説災異後事簡卿又從歐陽氏問為學精孰所問非一師也善説禮服徵為博士光禄大夫㑹昭帝崩昌邑王嗣立數出勝當乘輿前諫曰天久陰而不雨臣下有謀上者陛下出欲何之王怒謂勝為祅言縛以屬吏吏白大将軍霍光光不舉法是時光與車騎将軍張安世謀欲廢昌邑王光讓安世以為泄語安世實不言廼召問勝勝對言在洪範傳曰皇之不極厥罸常隂時則下人有伐上者惡察察言故云臣下有謀光安世大驚以此益重經術士後十餘日光卒與安世白太后廢昌邑王尊立宣帝光以為羣臣奏事東宮太后省政宜知經術白令勝用尚書授太后遷長信少府賜爵闗内侯以與謀廢立定䇿安宗廟益千户宣帝初即位欲褒先帝詔丞相御史曰朕以眇身䝉遺德承聖業奉宗廟夙夜惟念孝武皇帝躬仁誼厲威武北征匈奴單于逺遁南平氐𦍑昆明甌駱兩越東定薉貉朝鮮廓地斥境立郡縣百蠻率服款塞自至珍貢陳於宗廟協音律造樂歌薦上帝封泰山立明堂改正朔易服色明開聖緒尊賢顯功興滅繼絶褒周之後備天地之禮廣道術之路上天報况符瑞並應寶鼎出白麟獲海效鉅魚神人並見山稱萬歲功德茂盛不能盡宣而廟樂未稱朕甚悼焉其與列侯二千石博士議於是羣臣大議廷中皆曰宜如詔書長信少府勝獨曰武帝雖有攘四夷廣土斥境之功然多殺士衆竭民財力奢泰亡度天下虚耗百姓流離物故者半蝗蟲大起赤地數千里或人民相食畜積至今未復亡德澤於民不宜為立廟樂公卿共難勝曰此詔書也勝曰詔書不可用也人臣之誼宜直言正論非茍阿意順指議已出口雖死不悔於是丞相義御史大夫廣明劾奏勝非議詔書毁先帝不道及丞相長史黄霸阿縱勝不舉劾俱下獄有司遂請尊孝武帝廟為世宗廟奏盛德文始五行之舞天下世世獻納以明盛德武帝廵狩所幸郡國凡四十九皆立廟如高祖太宗焉勝霸既久繫霸欲從勝受經勝辭以罪死霸曰朝聞道夕死可矣勝賢其言遂授之繫再更冬講論不怠至四年夏闗東四十九郡同日地動或山崩壊城郭室屋殺六千餘人上乃素服避正殿遣使者弔問吏民賜死者棺錢下詔曰蓋災異者天地之戒也朕承洪業託士民之上未能和羣生曩者地震北海琅邪壊祖宗廟朕甚懼焉其與列侯中二千石博問術士有以應變補朕之闕毋有所諱因大赦勝出為諫大夫給事中霸為揚州刺史勝為人質樸守正簡易亡威儀見時謂上為君誤相字於前上亦以是親信之嘗見出道上語上聞而讓勝勝曰陛下所言善臣故揚之堯言布於天下至今見誦臣以為可傳故傳耳朝廷每有大議上知勝素直謂曰先生通正言無懲前事勝復為長信少府遷太子太傅受詔撰尚書論語説賜黄金百斤年九十卒官賜冢塋葬平陵太后賜錢二百萬為勝素服五日以報師傅之恩儒者以為榮始勝每講授常謂諸生曰士病不明經術經術茍明其取青紫如俛拾地芥耳學經不明不如歸耕勝從父子建字長卿自師事勝及歐陽高左右采獲又從五經諸儒問與尚書相出入者牽引以次章句具文飾説勝非之曰建所謂章句小儒破碎大道建亦非勝為學䟽畧難以應敵建卒自顓門名經為議郎博士至太子少傅勝子兼為左曹太中大夫孫堯至長信少府司農鴻臚曽孫蕃郡守州牧長樂少府勝同産弟子賞為梁内史子定國為豫章太守而建子千秋亦為少府太子少傅京房字君明東郡頓邱人也治易事梁人焦延夀延夀字贛贛貧賤以好學得幸梁王王共其資用令極意學既成為郡史察舉補小黄令以候司先知姦邪盜賊不得𤼵愛養吏民化行縣中舉最當遷三老官屬上書願留贛有詔許増秩留卒於小黄贛常曰得我道以亡身者京生也其説長於災變分六十卦更直日用事以風雨寒温為候各有占驗房用之尤精好鍾律知音聲初元四年以孝廉為郎永光建昭間西𦍑反日蝕又久青亡光隂霧不精房數上䟽先言其将然近數月逺一嵗所言屢中天子説之數召見問房對曰古帝王以功舉賢則萬化成瑞應著末世以毁譽取人故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏法上令公卿朝臣與房㑹議温室皆以房言煩碎令上下相司不可許上意郷之時部刺史奏事京師上召見諸刺史令房曉以課事刺史復以為不可行唯御史大夫鄭𢎞光禄大夫周堪初言不可後善之是時中書令石顯專權顯友人五鹿充宗為尚書令與房同經論議相非二人用事房嘗宴見問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而用之邪将以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也幽厲何不覺寤而更求賢曷為卒任不肖以至於是上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公秦二世亦嘗聞此君而非笑之然則任竪刁趙高政治日亂盜賊滿山何不以幽厲卜之而覺寤乎上曰唯有道者能以往知來耳房因免冠頓首曰春秋紀二百四十二年災異以視萬世之君今陛下即位已來日月失明星辰逆行山崩泉涌地震石隕夏霜冬靁春凋秋榮隕霜不殺水旱螟蟲民人饑疫盜賊不禁刑人滿市春秋所記災異盡備陛下視今為治邪亂邪上曰亦極亂耳尚何道房曰今所任用者誰與上曰然幸其瘉於彼又以為不在此人也房曰夫前世之君亦皆然矣臣恐後之視今猶今之視前也上良久廼曰今為亂者誰哉房曰明主宜自知之上曰不知也如知何故用之房曰上最所信任與圖事帷幄之中進退天下之士者是矣房指謂石顯上亦知之謂房曰已諭房罷出後上令房上弟子曉知考功課吏事者欲試用之房上中郎任良姚平願以為刺史試考功法臣得通籍殿中為奏事以防壅塞石顯五鹿充宗皆疾房欲逺之建言宜試以房為郡守元帝於是以房為魏郡太守秩八百石居得以考功法治郡房自請願無屬刺史得除用他郡人自第吏千石以下歲竟乘傳奏事天子許焉房自知數以論議為大臣所非内與石顯五鹿充宗有隙不欲逺離左右及為太守憂懼以建昭二年二月朔拜上封事曰辛酉已來蒙氣衰去太陽精明臣獨欣然以為陛下有所定也然少隂倍力而乘消息臣疑陛下雖行此道猶不得如意臣竊悼懼守陽平侯鳳欲見未得至己卯臣拜為太守此言上雖明下猶勝之效也臣出之後恐必為用事所蔽身死而功不成故願歲盡乘傳奏事蒙哀見許廼辛巳蒙氣復乘卦太陽侵色此上大夫覆陽而上意疑也己卯庚辰之間必有欲隔絶臣令不得乘傳奏事者房未𤼵上令陽平侯鳳承制詔房止無乘傳奏事房意愈恐去至新豐因郵上封事曰臣前以六月中言遯卦不效法曰道人始去寒涌水為災至其七月涌水出臣弟子姚平謂臣曰房可謂知道未可謂信道也房言災異未嘗不中涌水已出道人當遂死尚復何言臣曰陛下至仁於臣尤厚雖言而死臣猶言也平又曰房可謂小忠未可謂大忠也昔秦時趙高用事有正先者非刺高而死高威自此成故秦之亂正先趣之今臣得出守郡自詭效功恐未效而死惟陛下毋使臣塞涌水之異當正先之死為姚平所笑房至陜復上封事曰乃丙戍小雨丁亥蒙氣去然少隂并力而乘消息戊子益甚到五十分蒙氣復起此陛下欲正消息雜卦之黨并力而爭消息之氣不勝彊弱安危之機不可不察己丑夜有還風盡辛卯太陽復侵色至癸巳日月相薄此邪隂同力而太陽為之疑也臣前白九年不改必有星亡之異臣願出任良試考功臣得居内星亡之異可去議者知如此於身不利臣不可蔽故云使弟子不若試師臣為刺史又當奏事故復云為刺史恐太守不與同心不若以為太守此其所以隔絶臣也陛下不違其言而遂聽之此廼蒙氣所以不解太陽亡色者也臣去稍逺太陽侵色益甚唯陛下毋難還臣而易逆天意邪説雖安于人天氣必變故人可欺天不可欺也願陛下察焉房去月餘竟徵下獄初淮陽憲王舅張博從房受學以女妻房房與相親每朝見輙為博道其語以為上意欲用房議而羣臣惡其害己故為衆所排博曰淮陽王上親弟敏達好政欲為國忠今欲令主上書求入朝得任助房房曰得無不可博曰前楚王朝薦士何為不可房曰中書令石顯尚書令五鹿君相與合同巧佞之人也事縣官十餘年及丞相韋侯皆久亡補於民可謂亡功矣此尤不欲行考功者也淮陽王即朝見勸上行考功事善不然但言丞相中書令任事久而不治可休丞相以御史大夫鄭𢎞代之遷中書令置他官以鉤盾令徐立代之如此房考功事得施行矣博具從房記諸所説災異事因令房為淮陽王作求朝奏草皆持東與淮陽王石顯微司具知之以房親近未敢言及房出守郡顯告房與張博通謀非謗政治歸惡天子詿誤諸侯王語在憲王傳初房見道幽厲事出為御史大夫鄭𢎞言之房博皆棄市𢎞坐免為庶人房本姓李推律自定為京氏死時年四十一翼奉字少君東海下邳人也治齊詩與蕭望之匡衡同師三人經術皆明衡為後進望之施之政事而奉惇學不仕好律厯隂陽之占元帝初即位諸儒薦之徵待詔宦者署數言事宴見天子敬焉時平昌侯王臨以宣帝外屬侍中稱詔欲從奉學其術奉不肯與言而上封事曰臣聞之於師治道要務在知下之邪正人誠郷正雖愚為用若廼懐邪知益為害知下之術在於六情十二律而已北方之情好也好行貪狼申子主之東方之情怒也怒行隂賊亥卯主之貪狼必待隂賊而後動隂賊必待貪狼而後用二隂並行是以王者忌子卯也禮經避之春秋諱焉南方之情惡也惡行廉貞寅午主之西方之情喜也喜行寛大己酉主之二陽並行是以王者吉午酉也詩曰吉日庚午上方之情樂也樂行姦邪辰未主之下方之情哀也哀行公正戍丑主之辰未屬隂戌丑屬陽萬物各以其類應今陛下明聖虚静以待物至萬事雖衆何聞而不諭豈况乎執十二律而御六情於以知下參實亦甚優矣萬不失一自然之道也廼正月癸未日加申有暴風從西南來未主姦邪申主貪狼風以太隂下抵建前是人主左右邪臣之氣平昌侯比三來見臣皆以正辰加邪時辰為客時為主人以律知人情王者之秘道也愚臣誠不敢以語邪人上以奉為中郎召問奉來者以善日邪時孰與邪日善時奉對曰師法用辰不用日辰為客時為主人見於明王侍者為主人辰正時邪見者正侍者邪辰邪時正見者邪侍者正忠正之見侍者雖邪辰時俱正大邪之見侍者雖正辰時俱邪即以自知侍者之邪而時邪辰正見者反邪即以自知侍者之正而時正辰邪見者反正辰為常事時為一行辰䟽而時精其效同功必三五觀之然後可知故曰察其所繇省其進退參之六合五行則可以見人性知人情難用外察從中甚明故詩之為學情性而已五性不相害六情更興廢觀性以歴觀情以律明主所宜獨用難與二人共也故曰顯諸仁藏諸用露之則不神獨行則自然矣唯奉能用之學者莫能行是歲闗東大水郡國十一饑疫尤甚上廼下詔江海陂湖園池屬少府者以假貧民勿租税損太官膳减樂府員省苑馬諸宮館稀御幸者勿繕治太僕少府减食糓馬水衡省食肉獸明年二月戊午地震其夏齊地人相食七月己酉地復震上曰蓋聞賢聖在位隂陽和風雨時日月光星辰静黎庶康寧考終厥命今朕共承天地託于公侯之上明不能燭德不能綏災異並臻連年不息乃二月戊午地大震于隴西郡毁落太上廟殿壁木飾壊敗豲道縣城郭官寺及民室屋厭殺人衆山崩地裂水泉涌出一年地再動天惟降災震驚朕躬治有大虧咎至於此夙夜兢兢不通大變深懐鬱悼未知其序比年不登元元困乏不勝饑寒以陷刑辟朕甚憫焉憯怛於心已詔吏虚倉廪開府臧振捄貧民羣司其茂思天地之戒有可蠲除减省以便萬姓者各條奏悉意陳朕過失靡有所諱因赦天下舉直言極諫之士奉奏封事曰臣聞之於師曰天地設法懸日月布星辰分隂陽定四時列五行以視聖人名之曰道聖人見道然後知王治之象故畫州土建君臣立律厯陳成敗以視賢者名之曰經賢者見經然後知人道之務則詩書易春秋禮樂是也易有隂陽詩有五際春秋有災異皆列終始推得失考天心以言王道之安危至秦乃不説傷之以法是以大道不通至於滅亡今陛下明聖深懐要道燭臨萬方布徳流惠靡有闕遺罷省不急之用振救困貧賦醫藥賜棺錢恩澤甚厚又舉直言求過失盛德純備天下幸甚臣奉竊學齊詩聞五際之要十月之交篇知日蝕地震之效昭然可明猶巢居知風穴處知雨亦不足多適所習耳臣聞人氣内逆則感動天地天變見於星氣日蝕地變見於竒物震動所以然者陽用其精隂用其形猶人之有五臧六體五臧象天六體象地故臧病則氣色𤼵於面體病則欠申動於貎今年太隂建於甲戍律以庚寅初用事厯以甲午從春厯中甲庚律得參陽性中仁義情得公正貞廉百年之精歲也正以精歲本首王位日臨中時接律而地大震其後連月乆隂雖有大令猶不能復隂氣盛矣古者朝廷必有同姓以明親親必有異姓以明賢賢此聖王之所以大通天下也同姓親而易進異姓䟽而難通故同姓一異姓五廼為平均今左右亡同姓獨以舅后之家為親異姓之臣又䟽二后之黨滿朝非特處位埶尤奢僭過度呂霍上官足以卜之甚非愛人之道又非後嗣之長䇿也隂氣之盛不亦宜乎臣又聞未央建章甘泉宮才人各以百數皆不得天性若杜陵園其已御見者臣子不敢有言雖然太皇太后之事也及諸侯王國與其後宮宜為設員出其過制者此損隂氣應天救邪之道也今異至不應災将隨之其法大水極隂生陽反為大旱甚則有水災春秋宋伯姬是矣唯陛下財察明年夏四月乙未孝武園白鶴館災奉自以為中上䟽曰臣前上五際地震之效曰極隂生陽恐有火災不合明聽未見省答臣竊内不自信今白鶴館以四月乙未時加於卯月宿亢災與前地震同法臣奉乃深知道之可信也不勝拳拳願復賜閒卒其終始上復延問以得失奉以為祭天地於雲陽汾隂極諸寝廟不以親䟽迭毁皆煩費違古制又宮室苑囿奢泰難供以故民困國虚亡累年之畜所繇來久不改其本難以末正廼上䟽曰臣聞昔者盤庚改邑以興殷道聖人美之切聞漢德隆盛在於孝文皇帝躬行節儉外省繇役其時未有甘泉建章及上林中諸離宮館也未央宮又無高門武臺麒麟鳯皇白虎玉堂金華之殿獨有前殿曲臺漸臺宣室温室承明耳孝文欲作一臺度用百金重民之財廢而不為其積土基至今猶存又下遺詔不起山墳故其時天下大和百姓洽足德流後嗣如令處於當今因此制度必不能成功名天道有常王道亡常亡常者所以應有常也必有非常之主然後能立非常之功臣願陛下徙都於成周左據成臯右阻黽池前郷崧高後介大河建滎陽扶河東南北千里以為闗而入敖倉地方百里者八九足以自娛東厭諸侯之權西逺羌胡之難陛下共已亡為按成周之居兼盤庚之德萬歲之後長為高宗漢家郊兆寝廟祭祀之禮多不應古臣奉誠難亶居而改作故願陛下遷都正本衆制皆定亡復繕治宮館不急之費歲可餘一年之畜臣聞三代之祖積德以王然皆不過數百年而絶周至成王有上賢之材因文武之業以周召為輔有司各敬其事在位莫非其人天下甫二世耳然周公猶作詩書深戒成王以恐失天下書則曰王毋若殷王紂其詩則曰殷之未喪師克配上帝宜監于殷駿命不易今漢初取天下起於豐沛以兵征伐德化未洽後世奢侈國家之費當數代之用非直費財又乃費士孝武之世暴骨四夷不可勝數有天下雖未久至於陛下八世九主矣雖有成王之明然亡周召之佐今東方連年饑饉加之以疾疫百姓菜色或至相食地比震動天氣溷濁日光侵奪繇此言之執國政者豈可以不懐怵􅅥而戒萬分之一乎故臣願陛下因天變而徙都所謂與天下更始者也天道終而復始窮則反本故能延長而亡窮也今漢道未終陛下本而始之於以永世延祚不亦優乎如因丙子之孟夏順太隂以東行到後七年之明歲必有五年之餘畜然後大行考室之禮雖周之隆盛亡以加此唯陛下留神詳察萬世之䇿書奏天子異其意答曰問奉今園廟有七云東徙状何如奉對曰昔成王徙洛盤庚遷殷其所避就皆陛下所明知也非有聖明不能一變天下之道臣奉愚贛狂惑唯陛下裁赦其後貢禹亦言當定迭毁禮上遂從之及匡衡為丞相奏徙南北郊其議皆自奉𤼵之奉以中郎為博士諫大夫年老以夀終子及孫皆以學在儒官李㝷字子長平陵人也治尚書與張儒鄭寛中同師寛中等守師法教授㝷獨好洪範災異又學天文月令隂陽事丞相翟方進方進亦善為星厯除㝷為吏數為翟侯言事帝舅曲陽侯王根為大司馬驃騎将軍厚遇㝷是時多災異根輔政數虚己問㝷㝷見漢家有中衰阸㑹之象其意以為且有洪水為災乃説根曰書云天聰明蓋言紫宮極樞通位帝紀太㣲四門廣開大道五經六緯尊術顯士翼張舒布燭臨四海少㣲處士為比為輔故次帝廷女宮在後聖人承天賢賢易色取法於此天官上相上将皆顓面正朝憂責甚重要在得人得人之效成敗之機不可不勉也昔秦穆公説諓諓之言任仡仡之勇身受大辱社稷幾亡悔過自責思惟黄髮任用百里奚卒伯西域德列王道二者福禍如此可不愼哉夫士者國家之大寶功名之本也将軍一門九侯二十朱輪漢興以來臣子貴盛未嘗至此物盛必衰自然之理唯有賢友彊輔庶幾可以保身命全子孫安國家書曰歴象日月星辰此言仰視天文俯察地理觀日月消息候星辰行伍揆山川變動參人民繇俗以制法度考禍福舉錯誖逆咎敗将至徵兆為之先見明君恐懼修正側身博問轉禍為福不可救者即蓄備以待之故社稷亡憂竊見徃者赤黄四塞地氣大𤼵動土竭民天下擾亂之徵也彗心爭明庶雄為桀大寇之引也此二者已頗效矣城中訛言大水奔走上城朝廷驚駭女孽入宮此獨未效間者重以水泉涌溢旁宮闕仍出月太白入東井犯積水缺天淵日數湛於極陽之色羽氣乘宮起風積雲又錯以山崩地動河不用其道盛冬靁電潛龍為孽繼以隕星流彗維塡上見日蝕有背郷此亦高下易居洪水之徵也不憂不改洪水廼欲盪滌流彗廼欲掃除改之則有年亡期故屬者頗有變改小貶邪猾日月光精時雨氣應此皇天右漢亡己也何况致大改之宜急博求幽隠㧞擢天士任以天職諸闒茸佞讇抱虚求進及用殘賊酷虐聞者若此之徒皆嫉善憎忠壊天文敗地理涌趯邪隂湛溺太陽為主結怨於民宜以時廢退不當得居位誠必行之凶災銷滅子孫之福不旋日而至政治感隂陽猶鐵炭之低卬見效可信者也及諸蓄水連泉務通利之修舊隄防省池澤税以助損邪隂之盛案行事考變易訛言之效未嘗不至請徵韓放掾周敞王望可與圖之根於是薦㝷哀帝初即位召㝷待詔黄門使侍中衞尉傅喜問㝷曰間者水出地動日月失度星辰亂行災異仍重極言毋有所諱㝷對曰陛下聖德尊天敬地畏命重民悼懼變異不忘䟽賤之臣幸使重臣臨問愚臣不足以奉明詔竊見陛下新即位開大明除忌諱博延名士靡不並進臣㝷位卑術淺過隨衆賢待詔食太官衣御府久汙玉堂之署比得召見亡以自效復特見延問至誠自以逢不世出之命願竭愚心不敢有所避庶幾萬分有一可采唯棄須臾之間宿留瞽言考法文理稽之五經揆之聖意以參天心夫變異之來各應象而至臣謹條陳所聞易曰縣象著明莫大乎日月夫日者衆陽之長煇光所燭萬里同晷人君之表也故日将旦清風𤼵羣隂伏君以臨朝不牽於色日初出炎以陽君登朝佞不行忠直進不蔽障日中煇光君德盛明大臣奉公日将入專以壹君就房有常節君不修道則日失其度晻昧亡光各有云為其於東方作日初出時隂雲邪氣起者法為牽於女謁有所畏難日出後為近臣亂政日中為大臣欺誣日且入為妻妾役使所營間者日尤不精光明侵奪失色邪氣珥蜺數作本起於晨相連至昏其日出後至日中間差瘉小臣不知内事竊以日視陛下志操衰於始初多矣其咎恐有以守正直言而得罪者傷嗣害世不可不愼也唯陛下執乾剛之德彊志守度毋聽女謁邪臣之態諸保阿乳母甘言悲辭之託斷而勿聽勉彊大誼絶小不忍良有不得已可賜以貨財不可私以官位誠皇天之禁也日失其光則星辰放流陽不能制隂隂桀得作間者太白正晝經天宜隆德克躬以執不軌臣聞月者衆隂之長銷息見伏百里為品千里立表萬里連紀妃后大臣諸侯之象也朔晦正終始弦為繩墨望成君徳春夏南秋冬北間者月數以春夏與日同道過軒轅上后受氣入太㣲帝廷揚光煇犯上将近臣列星皆失色厭厭如滅此為母后與政亂朝隂陽俱傷兩不相便外臣不知朝事竊信天文即如此近臣已不足杖矣屋大柱小可為寒心唯陛下親求賢士無彊所惡以崇社稷尊彊本朝臣聞五星者五行之精五帝司命應王者號令為之節度歲星主歲事為統首號令所紀今失度而盛此君指意欲有所為未得其節也又塡星不避歲星者后帝共政相留於奎婁當以義斷之熒惑徃來亡常周歴兩宮作態低卬入天門上明堂貫尾亂宮太白發越犯庫兵寇之應也貫黄龍入帝庭當門而出隨熒惑入天門至房而分欲與熒惑為患不敢當明堂之精此陛下神靈故禍亂不成也熒惑厥弛佞巧依埶㣲言毁譽進類蔽善太白出端門臣有不臣者火入室金上堂不以時解其憂凶塡歲相守又主内亂宜察蕭牆之内毋忽親䟽之㣲誅放佞人防絶萌芽以盪滌濁穢消散積惡毋使得成禍亂辰星主正四時當效於四仲四時失序則辰星作異今出於歲首之孟天所以譴告陛下也政急則出蚤政緩則出晚政絶不行則伏不見而為彗茀四孟皆出為易王命四季皆出星家所諱今幸獨出寅孟之月蓋皇天所以篤右陛下宜深自改治國故不可以戚戚欲速則不逹經曰三載考績三考黜陟加以號令不順四時既往不咎來事之師也間者春三月治大獄時賊隂立逆恐歲小收季夏舉兵法時寒氣應恐後有霜雹之災秋月行封爵其月土溼奥恐後有雷雹之變夫以喜怒賞罰而不顧時禁雖有堯舜之心猶不能致和善言天者必有效於人設上農夫而欲冬田肉袒深耕汗出種之然猶不生者非人心不至天時不得也易曰時止則止時行則行動静不失其時其道光明書曰敬授民時故古之王者尊天地重隂陽敬四時嚴月令順之以善政則和氣可立致猶枹鼓之相應也今朝廷忽於時月之令諸侍中尚書近臣宜皆令通知月令之意設羣下請事若陛下出令有謬於時者當知争之以順時氣臣聞五行以水為本其星元武婺女天地所紀終始所生水為準平王道公正修明則百川理落脉通偏黨失綱則踊溢為敗書云水曰潤下隂動而卑不失其道天下有道則河出圖洛出書故河洛决溢所為最大今汝潁畎澮皆川水漂踊與雨水並為民害此詩所謂曄曄震電不寧不令百川沸騰者也其咎在於皇甫卿士之屬唯陛下留意詩人之言少抑外親大臣臣聞地道柔静隂之常義也地有上中下其上位震應妃后不順中位應大臣作亂下位庶民離畔震或於其國國君之咎也四方中央連國歴州俱動者其異最大間者闗東地數震五星作異亦未大逆宜務崇陽抑隂以救其咎固志建威閉絶私路㧞進英雋退不任職以彊本朝夫本彊則精神折衝本弱則招殃致凶為邪謀所陵聞往者淮南王作謀之時其所難者獨有汲黯以為公孫𢎞等不足言也𢎞漢之名相於今亡比而尚見輕何况亡𢎞之屬乎故曰朝廷亡人則為賊亂所輕其道自然也天下未聞陛下竒䇿固守之臣也語曰何以知朝廷之衰人人自賢不務於通人故世陵夷馬不伏歴不可以趨道士不素養不可以重國詩曰濟濟多士文王以寧孔子曰十室之邑必有忠信非虚言也陛下秉四海之衆曽亡柱幹之固守聞於四境殆開之不廣取之不明勸之不篤傳曰土之美者善養禾君之明者善養士人皆可使為君子詔書進賢良赦小過無求備以博聚英雋如近世貢禹以言事忠切蒙尊榮當此之時士厲身立名者多禹死之後日日以衰及京兆尹王章坐言事誅滅智者結舌邪偽並興外戚顓命君臣隔塞至絶繼嗣女宮作亂此行事之敗誠可畏而悲也本在積任母后之家非一日之漸往者不可及來者猶可追也先帝大聖深見天意昭然使陛下奉承天統欲矯正之也宜少抑外親選練左右舉有德行道術通明之士充備天官然後可以輔聖德保帝位承大宗下至郎吏從官行能亡以異又不通一蓺及博士無文雅者宜皆使就南畝以視天下明朝廷皆賢材君子於以重朝尊君滅凶致安此其本也臣自知所言害身不辟死亡之誅唯財留神反覆愚臣之言是時哀帝初立成帝外家王氏未甚抑黜而帝外家丁傅新貴祖母傅太后尤驕恣欲稱尊號丞相孔光大司空師丹執政諫争久之上不得已遂免光丹而尊傅太后語在丹傳上雖不從㝷言然采其語每有非常輙問㝷㝷對屢中遷黄門侍郎以㝷言且有水災故拜㝷為騎都尉使䕶河隄初成帝時齊人甘忠可詐造天官厯包元太平經十二卷以言漢家逢天地之大終當更受命於天天帝使眞人赤精子下教我此道忠可以教重平夏賀良容邱丁廣世東郡郭昌等中壘校尉劉向奏忠可假鬼神罔上惑衆下獄治服未斷病死賀良等坐挾學忠可書以不敬論後賀良等復私以相教哀帝初立司隸校尉解光亦以明經通災異得幸白賀良等所挾忠可書事下奉車都尉劉歆歆以為不合五經不可施行而李㝷亦好之光曰前歆父向奏忠可下獄歆安肯通此道時郭昌為長安令勸㝷宜助賀良等㝷遂白賀良等皆待詔黄門數召見陳説漢厯中衰當更受命成帝不應天命故絶嗣今陛下久疾變異屢數天所以譴告人也宜急改元易號乃得延年益夀皇子生災異息矣得道不得行咎殃且亡不有洪水將出災火且起滌盪民人哀帝久寝疾幾其有益遂從賀良等議於是詔制丞相御史盖聞尚書五曰考終命言大運一終更紀天元人元考文正理推厯定紀數如甲子也朕以𦕈身入繼太祖承皇天總百僚子元元未有應天心之效即位出入三年災變數降日月失度星辰錯繆高下貿易大異連仍盗賊並起朕甚懼焉戰戰兢兢唯恐陵夷惟漢至今二百載厯紀開元皇天降非材之右漢國再獲受命之符朕之不德曷敢不通夫受天之元命必與天下自新其大赦天下以建平二年為太初元年號曰陳聖劉太平皇帝漏刻以百二十為度布告天下使明知之後月餘上疾自若賀良等復欲妄變政事大臣争以為不可許賀良等奏言大臣皆不知天命宜退丞相御史以解光李㝷輔政上以其言亡驗遂下賀良等吏而下詔曰朕獲保宗廟為政不得變異屢仍恐懼戰慄未知所繇待詔賀良等建言改元易號増益漏刻可以永安國家朕信道不篤過聽其言幾為百姓獲福卒無嘉應久旱為災以問賀良等對當復改制度皆背經誼違聖制不合時宜夫過而不改是為過矣六月甲子詔書非赦令也皆蠲除之賀良等反道惑衆姦態當窮竟皆下獄光禄勲平當光禄大夫毛莫如與御史中丞廷尉雜治當賀良等執左道亂朝政傾覆國家誣罔主上不道賀良等皆伏誅尋及解光减死一等徙敦煌郡通志卷一百一
