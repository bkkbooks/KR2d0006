body:
  text: 通志卷一宋右廸功郎鄭樵漁仲撰三皇紀第一太昊炎帝黃帝臣謹按三皇伏羲但稱氏神農始稱帝堯舜始稱國自上古至夏商皆稱名至周始稱諡而稱氏者三皇以來未嘗廢也年代則稱紀自開闢至獲麟凡二百七十六萬歲分爲十紀厥初生民穴居野處聖人教之結巢以避蟲豸之害而食草木之實故號有巢氏亦曰大巢氏亦謂之始君言君臣之道於是乎始也有天下百餘代民知巢居未知熟食燧人氏出焉觀星辰而察五木知空有火麗木則明故鑽木取火敎民以烹飪之利號燧人氏以夫燧者火之所生也時無文字未有甲歴紀年始作結繩之政而立傳敎之臺始爲日中之市而興交易之道亦謂之遂皇或言遂皇持斗機運轉之法以施政敎此亦欽若昊天以授民時之義也三皇者天皇地皇人皇是也其說不經無所取證當取伏羲爲天皇神農爲人皇黃帝爲地皇之說爲正其說出三皇太古書然太昊以明天事故曰太昊炎帝以明民事故曰神農黃帝以明地事故曰黃帝此理甚明伏羲作連山神農作歸藏黃帝作坤乾易之始自伏羲三易之本自三皇夏人因連山而作連山商人因歸藏而作歸藏周人因坤乾而作周易八卦具而六十四卦成世言伏羲畫卦文王重之皆沿襲之言也傳曰法始乎伏羲言圖象書契於此乎始三皇五帝三王之事蓋已乆矣臣之所志在於傳信其有傳疑者則降而書之以備記載云太昊伏羲氏亦曰庖犧氏亦曰皇雄氏亦曰天皇伏亦作虙犧亦作戲亦作羲或言象日月之明故曰太昊伏制犧牛故曰伏犧因取犧牲以充庖厨故號庖犧然去古已遠古人名號難以今義求也伏犧者燧人氏之子母曰華胥履大人之迹於雷澤而孕因風而生故爲風姓伏羲生於成紀作都于陳故陳爲太昊之墟樂日立基或云扶來繼天而王爲百王先人生之始也與禽獸無異知有母而不知有父知有愛而不知有禮卧則呿呿起則盱盱飢則求食飽則棄餘茹毛飲血而衣皮革伏羲徳合上下天應以鳥獸文章地應以河圖洛書仰則觀象於天俯則觀法於地中則觀萬物之宜始作書契以代結繩之政始畫八卦卦有二爻重而爲六十四名曰連山象法乾坤以正君臣父子夫婦之義始作罔罟以佃以漁以贍民用制嫁娶以儷皮爲禮作二十五絃之瑟服牛乘馬冶金成器本陽氣之始而爲律法本五材之用而定五行因龍馬負圖而出于河之瑞故官以龍紀而爲龍師乃命子襄爲飛龍氏造六書一曰象形二曰指事三曰會意四曰轉注五曰諧聲六曰假借使天下義理必歸文字天下文字必由六書命子英爲潛龍氏造甲歴起於甲寅日月歲時自此而生又命五官春官爲青龍夏官爲赤龍秋官爲白龍冬官爲黒龍中官爲黃龍乃升傳敎之臺而以甲歴示民命栗陸爲水龍氏繁滋草木疏導泉源毋怠於時命混沌爲降龍氏驅除民害民安則安民危則危毋怠於民命大庭氏主屋廬爲民居處命陰康氏主水土爲民田里於是共工爲上相柏皇爲下相朱襄昊英常居左右朱襄卽子襄昊英卽子英也栗陸居北赫胥居南昆連居西葛天居東陰康居下分九州之牧而天下化洽在位百十六年左氏曰任宿須句顓臾風姓也實司太昊與有濟之祀四國伏羲之後歴夏商至周不泯所謂盛徳必百世祀者臣謹按言伏羲氏者爲以木德王天下帝出乎震之義伏羲氏没女媧氏作是爲女皇春秋世譜云華胥生男子爲伏羲女子爲女媧故世言女媧伏羲之妺風姓人首蛇身乘伏羲制度作笙簧張雲幕枚占神明能變化萬物徃古之時四極廢九州裂天不兼覆地不周載火爁炎而不滅水浩洋而不息猛獸食精民鷙鳥攫老弱女媧鍊五色石以補蒼天斷鼇足以立四極殺黒龍以濟冀川積蘆灰以止淫水天不足西北故日月移焉地不足東南故百川注焉蒼天神四極正淫水涸冀川平狡蟲死精民生女媧之後有大庭氏有柏皇氏有中央氏有栗陸氏有驪連氏有赫胥氏有尊盧氏有混沌氏有昊英氏有朱襄氏有葛天氏有陰康氏有無懷氏據女媧氏天子也自大庭之後十三氏皆臣於伏羲諸家以爲天子臣每疑此在伏羲時爲諸侯如夏商周在唐虞之世是也不然當伏羲之世分九牧而理天下各君一方以効其治後世之訛以爲相繼爲天子也或言朱襄之時多風而陽氣蓄積萬物解散果實不實士逹作五絃瑟以來陰氣以定羣生葛天之時民俗熙熙其作樂也三人摻牛尾投足以歌八闋一曰載民二曰元鳥三曰遂草木四曰奮五榖五曰謹天常六曰逹帝功七曰依地德八曰總萬物之極或言自伏羲至無懷千二百六十年自女媧至無懷凡十五君襲庖羲之號千一百五十年或云自伏羲至無懷五萬七千七百八十二年自女媧至無懷一萬七千七百八十七年臣又按太史公作五帝紀擇其雅言而書臣今紀採諸家之言而以雅馴者爲經其不典之言則列於篇後以備記載非傳信也其誕而野如盤古者則亦不書炎帝神農氏起於烈山亦曰烈山氏亦曰連山氏亦曰伊耆氏亦曰大庭氏亦曰魁隗氏亦曰人皇少典之元子其母曰女登有蟜氏之女也女登有神龍之感而生神農焉長於姜水故爲姜姓以火德王天下故爲炎帝民不粒食未知耕稼於是因天時相地宜始作耒耜敎民蓺五穀故謂之神農民有疾病未知藥石乃味草木之滋察寒溫之性而知君臣佐使之義皆口甞而身試之一日之間而遇七十毒或云神農甞百藥之時一日百死百生其所得三百六十物以應周天之數後世承傳爲書謂之神農本草又作方書以救時疾復演八卦而爲六十四卦名之曰歸藏作都于陳後徙魯以火紀官春官爲大火夏官爲鶉火秋官爲西火冬官爲北火中官爲中火樂曰下謀或曰扶持其俗樸重端慤不忿爭而財足無制令而民從威厲而不殺法省而不煩列㕓於國日中爲市始作五絃削桐爲琴糾絲爲絃以通天地之德以合神人之和郊特牲曰伊耆氏始作蜡明堂位曰土鼓蕢桴葦籥伊耆氏之樂也夙沙氏爲諸侯不用命箕文諫而殺之神農退而修德夙沙之民自攻其君而來歸南交趾北幽都東暘谷西三危是其封域也在位百二十年或云百四十年臣謹按炎帝之女溺死東海化爲精衛每銜西山木石以塡東海無雄偶海燕而生今東海畔有衛誓水以精衛溺於此川故誓不飲其水一名鳥誓一名寃禽一名志鳥俗呼帝女雀又按神農人身牛首納莽水氏之女曰聼詙生臨魁嗣神農曰帝臨魁在位八十年或云六十年帝承嗣位六十年或云六年一本承在臨魁前帝明嗣位四十九年帝直嗣位四十五年帝釐嗣位四十八年帝哀嗣位四十三年帝榆罔嗣位五十五年諸侯相侵帝不能正黃帝征之天下尊爲天子炎帝遂絶自神農至榆罔五百年自臨魁至榆罔凡七帝襲神農之號三百八十年吕氏春秋曰神農有天下七世宋均曰女媧至神農七十二姓譙周曰伏羲次有三姓至女媧女媧五十姓至神農神農相氶八代共五百二十年黃帝軒轅氏亦曰地皇亦曰有熊氏亦曰帝鴻氏亦曰歸藏氏或言有土德之瑞故曰黄帝有軒冕之服故曰軒轅作都于有熊故曰有熊少典娶于有蟜氏孕二十四月而生帝于壽丘本姓公孫以長于姬水故改姓姬帝生而神靈弱而能言年逾十五聰明無不徇通神農氏世衰諸侯相侵暴帝乃習用干戈以征不享諸侯咸來賔從於是修德振兵治五氣蓺五種撫萬民度四方敎熊羆貔貅貙虎與炎帝戰於阪泉之野三戰然後得志蚩尤爲亂獨伯天下莫與之爭衡帝乃徵師諸侯以中黃直爲將與戰於涿鹿之野遂禽蚩尤戮於中冀名其地曰絶轡之野或云榆罔之時有庶人曰蚩尤逐榆罔榆罔與軒轅殺蚩尤于中冀軒轅復與榆罔五戰于阪泉爲軒轅所滅諸侯咸尊之代神農氏爲天子是爲黄帝始制法度正名百物萬世不能易也爲營陣之法設五旗五麾有不率化者從而征之凡五十二戰而天下服披山通道未嘗寜居東至于海登丸山及岱宗西至于空桐登雞頭南至于江登熊湘北逐葷粥合符釡山而邑于涿鹿之阿遷徙徃來無常處以師兵爲營衛受命之日有景雲之瑞故官以雲紀師以雲命春官爲青雲夏官爲縉雲秋官爲白雲冬官爲黒雲中官爲黃雲置左右大監監于萬國萬國和而鬼神山川封禪與爲多焉獲寳鼎神策是歲己酉朔旦冬至得天之紀迎日推策終而復始演八卦爲六十四卦名之曰坤乾帝受河圗見日月星辰之象始有星官之書察五運六氣乃著岐伯之問是爲内經或言内經後人所作而本於黃帝舉風后力牧㤗山稽常先大鴻以治民封鉅鬼臾區皆臣佐也或云黃帝得六相而天地治神明至風后明乎天道故爲當時太常察乎地利故爲禀者奢龍辨乎東方故爲土師祝融辨乎南方故爲司徒大封辨乎西方故爲司馬后土辨乎北方故爲理官又造書契調鍾律紀歴數命蒼頡爲史官制文字大撓爲帝師作甲子容成造歴𨽻首作數伶倫制十二律自大夏之西阮隃之陰取竹於嶰谿之谷其竅厚鈞者斷兩節間而吹之長三寸九分以爲黃鍾之宫制十二筒聽鳳凰之鳴而别十二律其雄鳴六雌鳴亦六叶黃鍾之宫是生六律六吕候氣之應以正五聲實歴數權衡度量所由生也又命榮猨與伶倫鑄十二鍾以和五音仲春之月辰在乙卯日在奎始奏之命曰咸池亦曰大咸始制衣服作冕旒充纊元衣黃裳析翬翟之華漬草木之英變爲五色文章而著於器服以表貴賤服牛乘馬作舟車以通道上棟下宇作宫室以居安重門擊柝以待暴客作杵臼以利用作弧矢以振威旁行海内方制萬里畫野分州得百里之國萬區以分星次經土設井以塞爭端立歩制畝以均不足使八家爲井井開四道而分八宅同井而飲存亡更守男女交姻有無相貸疾病相扶風俗可同生産可一性情可親井一爲鄰鄰三爲朋朋三爲里里五爲邑邑十爲都都十爲師師十爲州分於井而計於州則地著而數詳民不習僞官不懷私城郭不閉見利不爭風雨時若五穀豐登人無天枉物無疵厲鷙鳥不妄搏猛獸不妄噬裔夷之人罔不來享有草生于庭佞人入則指之名曰屈軼鳳凰巢于阿閣麒麟游于苑囿帝二十五子爲二十五宗其四母之子得姓者十四人别爲十二姓姬酉祁已滕箴任荀僖姞儇依二人爲姬二子爲己帝娶西陵之女曰嫘祖亦曰女節生二子其後皆有天下一曰元囂是爲青陽降居江水爲帝少昊二曰昌意降居若水爲諸侯昌意娶蜀山女曰昌僕亦曰女極生高陽爲帝顓頊黃帝崩在橋山在位百年年百十歳或云在位百十年年三百歲子孫相承共一千五百二十年皇覽曰橋山在上郡今綏州也臣謹按晉語黃帝之子二十五宗其得姓者十四人爲十二姓姬酉祁已滕箴任荀僖姞儇依是也二人爲姬二人爲已自神農至榆㒺凡七世襲炎帝之號皆神農之裔也黃帝在位百年五帝三王皆黃帝之裔也據晉語少典娶于有蟜氏生黃帝然炎帝至榆罔更八世五百年何由有同父兄弟故知國語之言不可盡信先儒本之今不遽易也臣又按方士之言曰黃帝採首山之銅鑄鼎於荆山之下鼎旣成有龍垂胡髯下迎黃帝帝上騎羣臣後宫從上者七十餘人龍乃升天餘小臣不得上悉持龍髯髯拔墮黃帝之弓百姓仰望乃抱其弓與胡髯而號故後世名其地曰鼎湖弓曰烏號又曰黃帝迎日推策後率二十歲復朔旦冬至凡二十推三百八十年黃帝仙登於天又按外紀黃帝與蚩尤戰於涿鹿之野蚩尤爲大霧軍士昏迷軒轅作指南車以示四方山海大荒北經曰蚩尤伐黃帝帝命應龍攻於冀州之野應龍蓄水蚩尤請風伯雨師作大風雨黃帝下天女曰􅔨止雨河圖曰蚩尤兄弟八十一人並獸身人語食沙石作兵仗刀㦸大弩威振天下誅殺無度天授軒轅神符伏蚩尤蚩尤沒後亂未定軒轅畫蚩尤象以威海内管仲曰葛盧山交而出水金從之出蚩尤受之以作劍㦸任昉述異記蚩尤兄弟七十二人銅頭鐵額食鐵石能作雲霧軒轅誅之於涿鹿今冀州也有蚩尤神俗云人身牛蹄四目六手冀州人掘地得髑髏如銅鐵者卽蚩尤骨齒長二寸堅不可碎秦漢間說蚩尤者耳鬢如劍㦸頭有角與軒轅鬬以角抵人人不能向今冀州有樂名蚩尤戲其民三三兩兩頭戴牛角而相觝漢造角觝戲蓋其遺制也皇覽曰蚩尤冢在東平壽張闞鄉高七尺居民常以十月食之有赤氣如匹絳而出鄉人呼爲蚩尤旗又按崔實月令曰祖者道祭也黃帝之子好遠遊死爲道路神故後人出行有祖餞之事述異記蒼頡墓在北海俗呼爲藏書室有碑文周時莫識遂藏故府逮秦時李斯始識八字云上天作命皇辟迭王漢叔孫通識十二字又云南海中有軒轅丘鸞自歌鳳自舞古云天帝樂也臣又按伏羲有河圗之應矣而黃帝復受河圖伏羲命子襄作六書矣而黃帝復命蒼頡制文字伏羲已造律歴矣而黃帝復有律歴之作伏羲作易矣而神農黃帝復作易學者不能無疑於古帝王受命之符皆有其應所以伏羲黃帝各受河圖者也古者書契未一用字亦希故隨時而作務在應用所以周有史籀秦有李斯皆一時制字之人也乃若律歴之所更易象之所作亦在適時所以三代之前律歴不同而易亦異右天皇自伏羲至無懷十五世千二百六十年人皇自神農至榆罔八世五百年地皇黃帝一世百年三皇凡二十四世共千八百六十年通志卷一
