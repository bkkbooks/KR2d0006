body:
  text: 通志卷一百八十五宋右廸功郎鄭樵漁仲撰列女傳第一後漢渤海鮑宣妻太原王霸妻廣漢姜詩妻沛國周郁妻扶風曹世叔妻河南樂羊子妻漢中陳文矩妻孝女曹娥吳許升妻汝南袁隗妻酒泉龎淯母沛劉長鄉妻安定皇甫規妻南陽隂瑜妻犍為盛道妻孝女叔先雄陳留董祀妻晉羊耽妻辛氏杜有道妻嚴氏王渾妻鍾氏鄭袤妻曹氏愍懷太子妃王氏鄭休妻石氏陶侃母湛氏賈渾妻宗氏梁緯妻辛氏許延妻杜氏虞潭母孫氏周顗母李氏張茂妻陸氏尹虞二女荀崧小女灌王凝之妻謝氏劉臻妻陳氏皮京妻龍氏孟昶妻周氏何無忌母劉氏劉聰妻劉氏王廣女陜婦人靳康女韋逞母宋氏張天錫二妾閻氏薛氏苻堅妾張氏竇滔妻蘇氏苻登妻毛氏慕容垂妻段氏段豐妻慕容氏呂纂妻楊氏呂紹妻張氏李暠妻尹氏後魏崔覽妻封氏封卓妻劉氏魏溥妻房氏胡長命妻張氏平原女子孫氏房愛親妻崔氏涇州貞女兒氏姚氏婦楊氏張洪祁妻劉氏董景起妻張氏陽尼妻高氏史映周妻耿氏任城國太妃孟氏茍金龍妻劉氏貞孝女宗河東姚氏女刁思遵妻魯氏西魏孫道温妻趙氏孫神妻陳氏隋蘭陵公主南陽公主襄城王恪妃華陽王楷妃譙國夫人洗氏鄭善果母崔氏孝女王舜韓覬妻于氏陸讓母馮氏劉昶女鍾士雄母蔣氏孝婦覃氏元務光母盧氏裴倫妻桞氏趙元楷妻崔氏後漢渤海鮑宣妻者桓氏之女也字少君宣嘗就少君父學父奇其清苦故以女妻之装送資賄甚盛宣不悦謂妻曰少君生富驕習美飾而吾實貧賤不敢當禮妻曰大人以先生修徳守約故使賤妾侍執巾櫛既奉承君子唯命是從宣笑曰能如是是吾志也妻乃悉歸侍御服飾更着短布裳與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道鄉邦稱之宣哀帝時官至司𨽻校尉子永中興初為魯郡太守永子昱從容問少君曰太夫人寧復識挽鹿車時不對曰先姑有言存不忘亡安不忘危吾焉敢忘乎永昱各有傳太原王霸妻者不知何氏之女也霸少立高節光武時連徴不仕霸已見隱逸傳妻亦美志行初霸與同郡令狐子伯為友子伯為楚相而其子為郡功曹子伯乃令子奉書於霸車馬服從雍容如也霸子時方耕於野聞賔至投耒而歸見令狐子沮怍不能仰視霸目之有愧容客去而久卧不起妻怪問其故始不肯告妻請罪而後言曰吾與子伯素不相若向見其子容服甚光舉措有道而我兒曹蓬髪歴齒未知禮節見客而有慙色父子恩深不覺自失耳妻曰吾少修清節不顧榮祿今子伯之貴孰與君之高奈何忘宿志而慚兒女子乎霸崛起而笑曰有是哉遂共終身隱遯廣漢姜詩妻者同郡龎盛之女也詩事母至孝妻奉順尤篤母好飲江水水去舍六七里妻常泝流而汲後值風不時得還母渇詩責而遣之妻乃寄止隣舍晝夜紡績常市珍羞使隣母以意自遺其姑如是者久之姑怪問隣母隣母具對姑感慙呼還恩養愈謹其子後因逺汲溺死妻恐姑哀傷不敢言而託以行學不在姑嗜魚膾又不能獨食夫婦常力作供膾呼隣母共之舎側忽有湧泉味如江水每旦輙出雙鯉魚常以供二母之膳赤眉散賊經詩里弛兵而過曰驚大孝必觸鬼神時歳荒賊乃遺詩米肉受而埋之比落䝉其安全永平三年察孝廉顯宗詔曰大孝入朝凡諸舉者一聽平之由是皆拜郎中詩尋除江陽令卒于官所居治鄉人為立祀沛郡周郁妻者同郡趙孝之女也字阿少習儀訓閑於婦道而郁驕滛輕躁多行無禮郁父謂阿曰新婦賢者當以道匡其夫郁之不改新婦過也阿拜而受命退謂左右曰我無樊衛二姬之行故君以責我我言而不用君必謂我不奉教令則罪在我矣若言而見用是為子違父而從婦則罪在彼矣人生如此亦何聊哉乃自殺莫不傷之扶風曹世叔妻者同郡班彪之女也名昭字惠班一名姬博學高才世叔早卒有節行法度兄固著漢書其八表天文志未及竟而卒和帝詔昭就東觀踵而成之帝數召入宫令皇后諸貴人師事焉號曰大家每有貢獻異物輙詔大家作賦頌及鄧太后臨朝與聞政事以出入之勤封其子成關内侯官至齊相時漢書始出多未能通者同郡馬融伏於閤下從昭受讀後又詔融兄續繼昭成之永初中太后兄大將軍鄧騭以母憂上書乞身太后不許昭因上疏言其能以禮讓宜見矜允太后從之故騭等各得還里第焉昭作女誡七篇有助内訓馬融善之令妻女習焉昭女妹曹豐生亦有才慧為書以難之辭有可觀昭年七十餘卒皇太后素食舉哀使者監䕶喪事所著賦頌銘誄問注哀辭書論上疏遺令凡十六篇子婦丁氏為撰集之又作大家讚焉河南樂羊子之妻者不知何氏之女也羊子常行路得遺金一餅還以與妻妻曰妾聞志士不飲盜泉之水廉者不受嗟來之食况拾遺求利以汙其行乎羊子大慙乃捐金於野而逺尋師學一年來歸妻跪問其故羊子曰久行懷思無它異也妻乃引刀趨機而言曰此織生自蠶繭成於機杼一絲而累以至於寸累寸不已遂成丈匹今若斷斯織也則損失成功稽廢時月夫子積學當日知其所亡以就懿徳若中道而歸何異斷斯織乎羊子感其言復還終業遂七年不返妻常躬懃養姑又逺饋羊子嘗有他舎雞謬入園中姑盜殺而食之妻對雞不餐而泣姑怪問其故妻曰自傷居貧使食有他肉姑竟棄之後盜欲有犯妻者乃先劫其姑妻聞操刀而出盜人曰釋汝刀從我者可全不從我者則殺汝姑妻仰天而嘆舉刀刎頸而死盜亦不殺其姑太守聞之即捕殺賊盜而賜妻縑帛以禮葬之號曰貞義漢中程文矩妻者同郡李法之姊也字穆姜有二男而前妻四子文矩為安衆令喪於官四子以母非所生憎毀日積而穆姜慈愛温仁撫字益隆衣食資供皆兼倍所生或謂母曰四子不孝至矣何不别居以逺之對曰吾方以義相導使其自遷善也及前妻長子興遇疾困篤母惻隱自然親調藥膳恩情篤密興疾久乃瘳於是呼三弟謂曰繼母慈仁出自天愛吾兄弟不識恩養禽獸其心雖母道益隆我曹過惡亦已深矣遂將三弟詣南鄭獄陳母之徳狀已之過乞就刑辟縣言之於郡郡守表異其母蠲除家繇遣散四子許以修革自後訓導愈明並為良士穆姜年八十餘卒臨終勑諸子曰吾弟伯度智逹士也所論薄葬其義至矣又臨亡遺令聖賢法也令汝曹遵承勿與俗同增吾之累諸子奉行焉孝女曹娥者會稽上虞人也父盱能絃歌為巫祝漢安二年五月五日於縣江泝濤迎婆娑神溺死不得尸娥年十四乃沿江號哭晝夜不絶聲旬有七日遂投江而死項原列女傳云娥投衣於水祝曰父屍所在衣當沈衣隨流至一處而沈娥遂隨衣而没至元嘉元年縣長度尚改葬娥於江南道旁為立碑焉吳許升妻者呂氏之女也字榮升少為博徒不理操行榮常躬勤家業以奉養其姑數勸升修學每有不善輙流涕進規榮父積忿疾升乃呼榮欲改嫁之榮歎曰命之所遭義無離貳終不肯歸升感激自厲乃尋師逺學遂以成名尋被本州辟命行至夀春道為盜所害刺史尹耀捕盜得之榮迎喪於路聞而詣州請甘心讎人耀聽之榮乃手斷其頭以祭升靈後郡遭寇賊賊欲犯之榮踰垣走賊拔刀追之賊曰從我則生不從我則死榮曰義不以身受辱寇虜也遂殺之是日疾風暴雨雷電晦㝠賊惶懼叩頭謝罪乃殯葬之汝南袁隗妻者扶風馬融之女也字倫隗自有傳倫少有才辯融家世豐豪装遣甚盛及初成禮隗問之曰婦奉箕箒而已何乃過珍麗乎對曰慈親垂愛不敢逆命君若慕鮑宣梁鴻之高者妾亦請從少君孟光之事矣隗又曰弟先兄舉世以為笑今處姊未適先行可乎對曰妾姊高行殊邈未遭良匹不似鄙薄茍然而已又問曰南郡君學窮道奥文為辭宗而所在之職輙以財貨為損何邪對曰孔子大聖不免武叔之毀子路至賢猶有伯寮之愬家君獲此固其宜耳隗黙然不能屈帳外聽者為慙隗旣寵貴當時倫亦有名於世年六十餘卒倫妹芝亦有才義少喪親長而追感乃作申情賦云酒泉龎淯母者趙氏之女也字娥父為同縣人所殺而娥弟兄三人時俱病物故讎乃喜而自賀以為莫已報也娥隂懷感憤乃潛備刀兵常帷車以候讎家十餘年不能得後遇於都亭刺殺之因詣縣自首曰父仇已報請就刑戮福祿長尹嘉義之觧印綬欲與俱亡娥不肯去曰怨塞身死妾之名分結罪理獄君之常理何敢茍生以枉公法後遇赦得免州郡表其閭太常張奐嘉歎以束帛禮之沛劉長卿妻者同郡桓鸞之女也鸞已見前傳生一男五嵗而長卿卒妻防逺嫌疑不肯歸寧兒年十五晚又夭歿妻慮不免乃豫刑其耳以自誓宗婦相與愍之共謂曰若家殊無它意假令有之猶可因姑姊妹以表其誠何貴義輕身之甚哉對曰昔我先君五更學為儒宗尊為帝師五更以來歴代不替男以忠孝顯女以貞順稱詩云無忝爾祖聿修厥徳是以豫自刑翦以明我情沛相王吉上奏高行顯其門閭號曰行義桓嫠縣邑有祀必膰焉安定皇甫規妻者不知何氏女也規初喪室家後更娶之妻善屬文能草書時為規答書記衆人怪其工及規卒時妻年猶盛而容色美後董卓為相國娉以輜軿百乗馬二十匹奴婢錢帛充路妻乃輕服詣卓門跪自陳請辭甚酸愴卓使傅奴侍者悉拔刀圍之而謂曰孤之威教欲令四海風靡何有不行於一婦人乎妻知不免乃立罵卓曰君羌胡之種毒害天下猶未足邪妾之先人清徳弈世皇甫氏文武上才為漢忠臣君親非其趣使走吏乎敢欲行非禮於爾君夫人邪卓乃引車庭中以其頭懸軶鞭撲交下妻謂持杖者曰何不重乎速盡為惠遂死車下後人圖畫號曰禮宗云南陽陰瑜妻者潁川荀爽之女也名采字女荀聰敏有才藝年十七適陰氏十九産一女而瑜卒采時尚豐少常慮為家所逼自防禦甚固後同郡郭弈喪妻爽以采許之因詐稱病篤召采既不得已而歸采懷刃自誓爽令傅婢執奪其刃扶抱載之猶憂致憤激勑衛甚嚴女既到郭氏乃偽為懽悦之色謂左右曰我本立志與陰氏同穴而不免逼迫遂至於此素情不遂奈何乃命使建四燈盛装飾請弈入相見共談言辭不輟弈敬憚之遂不敢逼至曙而出采因勑左右辦浴既入室而掩戸權令侍人避之以粉書戸上曰尸還陰陰字未及成懼有來者遂以衣帶自縊左右翫之不為意比時已絶時人傷焉犍為盛道妻者同郡趙氏之女也字媛姜建安五年益部亂道聚衆起兵事敗夫妻執繋當死媛姜夜中告道曰法有常刑必無生望君可速潛逃建立門戸妾自留獄代君塞咎道依違未從媛姜便觧道桎梏為齎糧貨子翔時年五歳使道攜持而走媛姜代道持夜應對不失法度道亡逺乃以實告吏應時見殺道父子㑹赦得歸道感其義終身不娶焉孝女叔先雄者犍為人也父泥和永建初為縣功曹縣長遣泥和拜檄謁巴郡太守乘船墮湍水物故尸喪不歸雄感念怨痛號泣晝夜心不圖存常有自沈之計所生男女二人並數歳雄乃各作囊盛珠環以繋兒數為訣别之辭家人每防閑之經百餘日稍懈雄因乗小船於父墮處慟哭遂自投水死弟賢其夕夢雄告之曰後六日當共父同出至期伺之果與父相持浮於水上郡縣表言為立碑圖象其形焉陳留董祀妻者同郡蔡邕之女也名琰字文姬博學有才辯又妙於音律適河東衛仲道夫亡無子歸寧于家興平中天下喪亂文姬為胡騎所獲没於南匃奴左賢王在胡中十二年生子二人曹操素與邕善痛其無嗣乃遣使者以金璧贖之而重嫁於祀祀為屯田都尉犯法當死文姬詣曹操請之時公卿名士及逺方使驛坐者滿堂操謂賓客曰蔡伯喈女在外今為諸君見之及文姬進蓬首徒行叩頭請罪音辭清辯㫖甚酸哀衆皆為改容操曰誠實相矜然文狀已去奈何文姬曰明公廐馬萬疋虎士成林何惜疾足一騎而不濟垂死之命乎操感其言乃追原祀罪時且寒賜以頭巾履襪操因問曰聞夫人家先多墳籍猶能憶識之不文姬曰昔亡父賜書四千許卷流離塗炭罔有存者今所誦憶裁四百餘篇耳操曰今當使十吏就夫人寫之文姬曰妾聞男女之别禮不親授乞給紙筆真草唯命於是繕書送之文無遺誤後感傷亂離追懷悲憤作詩二章其辭憂惋云晉羊躭妻辛氏字憲英隴西人魏侍中毗之女也聰慧有才鑒初魏文帝得立為太子抱毗項謂之曰辛君知我喜不毗以告憲英憲英歎曰太子代君主宗廟社稷者也代君不可以不戚主國不可以不懼宜戚而喜何以能久魏其不昌乎弟敞為大將軍曹爽參軍宣帝將誅爽因其從魏帝出而閉城門爽司馬魯芝率府兵斬關赴爽呼敞同去敞懼問憲英曰天子在外太傳閉城人云將不利國家於事可得爾乎憲英曰事不可知然以吾度之太傅殆不得不爾明皇帝臨崩把太傅臂屬以後事此言猶在朝士之耳且曹爽與太傅俱受寄託之任而獨專權勢於王室不忠於人道不直此舉不過以誅爽耳敞曰然則敞無出乎憲英曰安可以不出職守人之大義也凡人在難猶或䘏之為人執鞭而棄其事不祥也且為人任為人死親昵之職也汝從衆而已敞遂出宣帝果誅爽事定後敞歎曰吾不謀於姊幾不獲於義其後鍾㑹為鎮西將軍憲英謂躭從子祜曰鍾士季何故西出祜曰將為滅蜀也憲英曰㑹在事縱恣非持久處下之道吾畏其有他志也及㑹將行請其子琇為參軍憲英憂曰他日吾為國憂今日難至吾家耳琇固請於文帝帝不聽憲英謂琇曰行矣戒之古之君子入則致孝於親出則致節於國在職思其所司在義思其所立不遺父母憂患而已軍旅之間可以濟者其唯仁恕乎㑹至蜀果反琇竟以全歸祜嘗送錦被憲英嫌其華反而覆之其明鑒儉約如此泰始五年卒年七十九杜有道妻嚴氏字憲京兆人也貞淑有識量年十三適于杜氏十八而嫠居子植女韡並孤藐憲雖少誓不改節撫育二子教以禮度植遂顯名於時韡亦有淑徳傅元求為繼室憲便許之時元與何晏鄧颺不穆晏等毎欲害之時人莫肯共婚及憲許元内外以為憂懼或曰何鄧執權必為元害亦由排山壓卵以湯沃雪耳奈何與之為親憲曰爾知其一不知其他晏等驕侈必當自敗司馬太傅虎睡耳吾恐卵破雪消行自有在遂與元為婚晏等尋亦為宣帝所誅植後為南安太守植從兄預為秦州刺史被誣徴還憲與預書戒之曰諺云忍辱至三公卿今可謂辱矣能忍之公是卿座預後果為儀同三司元前妻子咸年六歳嘗隨其繼母省憲謂咸曰汝千里駒也必當逺至以其妹之女妻之咸後有名於海内其知人之鑒如此年六十六卒王渾妻鍾氏字琰潁川人魏太傅繇曽孫也父徽黄門郎琰數歳能屬文及長聰慧𢎞雅博覽記籍美容止善嘯詠禮儀法度為中表所則既適渾生濟渾嘗共琰坐濟趨庭而過渾欣然曰生子如此足慰人心琰笑曰若使新婦得配參軍生子故不啻如此參軍謂渾中弟淪也琰女亦有才淑為求賢夫時有兵家子甚俊濟欲妻之白琰琰曰要須我見之濟令此兵子與羣小雜處琰自幃中察之既而謂濟曰緋衣者非汝所拔乎濟曰是琰曰此人才足拔萃然地寒夀促不足展其噐用不可與婚遂止其人數年果亡琰明鑒逺識皆此類也渾弟湛妻郝氏亦有徳行琰雖貴門與郝雅相親重郝不以賤下琰琰不以貴陵郝時人稱鍾夫人之禮郝夫人之法云鄭袤妻曹氏魯國薛人也袤先娶孫氏早亡娉之為繼室事舅姑甚孝躬紡績之勤以充供養至於叔妹羣姊之間盡其禮節咸得懽心及袤為司空其子黙等又顯朝列時人稱其榮貴曹氏深懼盛滿每黙等升進輙憂之形於聲色然食無重味服浣濯之衣袤等所獲禄秩曹氏必班散親姻務令周給家無餘貲初孫氏瘞于黎陽及袤薨議者以久喪難舉欲不合葬曹氏曰孫氏是元妃理從葬豈可使孤魂無所依邪于是遂備吉凶導從之儀以迎之具衣衾几筵親執鴈行之禮聞者莫不歎息以為趙姬之下叔隗不足稱也太康元年卒年八十二愍懷太子妃王氏太尉衍之女也字惠風貞婉有志節太子既廢居于金墉衍請絶婚惠風號哭而歸行路為之流涕及劉曜陥洛陽以惠風賜其將喬屬屬將妻之惠風拔劍距屬曰吾太尉女皇太子妃義不為逆胡所辱屬遂害之鄭休妻石氏不知何許人也少有徳操年十餘歳鄉邑稱之既歸鄭氏為九族所重休前妻女既㓜又休父布臨終有庻子沉生命棄之石氏曰奈何使舅之允不存乎遂養沉及前妻女力不兼舉九年之中三不舉子陶侃母湛氏豫章新淦人也初侃父丹娉為妾生侃而陶氏貧賤湛氏每紡績資給之使交結勝已侃少為潯陽縣吏嘗監魚梁以一蚶鮓遺母湛氏封鮓及書責侃曰爾為吏以官物遺我非唯不能益吾乃以増吾憂矣鄱陽孝廉范逵寓宿於侃時大雪湛氏乃徹所卧新薦自剉給其馬又密截髪賣與鄰人以供肴饌逵後聞之歎息曰非此母不生此子侃終以功名顯賈渾妻宗氏不知何許人也渾為介休令被劉淵將喬晞攻破死之宗氏有姿色晞欲納之宗氏罵曰屠各奴豈有害人之夫而欲加無禮其妻於爾安乎何不促殺我因仰天大哭晞遂害之時年二十餘梁緯妻辛氏隴西狄道人也緯為散騎常侍西都陷没為劉曜所害辛氏有殊色曜將妻之辛氏據地大哭仰謂曜曰妾聞男以義烈女不再醮妾夫已死理無獨全且婦人再辱明公亦安用哉乞即就死下事舅姑遂號哭不止曜曰貞婦也任之乃自縊而死曜以禮葬之許延妻杜氏不知何許人也延為益州别駕為李驤所害驤欲納杜氏為妻杜氏號哭守夫尸罵驤曰汝輩逆賊無道死有先後寧當久活我杜家女豈為賊妻也驤怒遂害之虞潭母孫氏吳郡富春人孫權族孫女也初適潭父忠恭順貞和甚有婦道及忠亡遺孤藐爾孫氏雖少誓不改節躬自撫養劬勞備至性聰敏識鑒過人潭始自童㓜便訓以忠義故得聲望允洽為朝廷所稱永嘉末潭為南康太守值杜弢構逆孫氏勉潭以必死之義傾其資産以餽戰士潭遂尅捷及蘇峻作亂潭時守吳興又假節征峻孫氏誡之曰吾聞忠臣出於孝子之門汝當舎生取義勿以吾老為累也仍盡發其家僮令赴潭助戰貿其所服環佩以為軍資于時㑹稽内史王舒遣子允之為督護孫氏又謂潭曰王府君遣兒征汝何為獨不潭即以子楚為督護與允之合勢其憂國之誠若此拜武昌侯太夫人加金章紫綬潭立養堂於家王導以下皆就拜謁咸和末卒年九十五成帝遣使弔祭諡曰定夫人周顗母李氏字絡秀汝南人也少時在室顗父浚為安東將軍時嘗出獵遇雨過止絡秀之家㑹其父兄不在絡秀聞浚至與一婢於内宰猪羊具數十人之饌甚精辦而不聞人聲浚怪使覘之獨見一女甚美浚因求為妾其父兄不許絡秀曰門戸殄悴何惜一女若連姻貴族將來庻有大益矣父兄許之遂生顗及嵩謨而顗等既長絡秀謂之曰我屈節為汝家作妾門戸計耳汝等不與我家為親親者吾亦何惜餘年顗等從命由此李氏遂得為方雅之族中興時顗等並列顯位嘗冬至置酒絡秀舉觴賜三子曰吾本渡江託足無所不謂爾等並貴列吾目前吾復何憂嵩起曰恐不如尊旨伯仁志大而才短名重而識闇好乗人之弊此非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母目下耳阿奴謨小字也後果如其言張茂妻陸氏吳郡人也茂為吳郡太守被沈充所害陸氏傾家産率茂部曲為先登以討充充敗陸詣闕上書為茂謝不尅之責詔曰茂夫妻忠誠舉門義烈宜追贈茂太僕尹虞二女長沙人也虞前任始興太守起兵討杜弢戰敗二女為弢所獲並有國色弢將妻之二女曰我父二千石終不能為賊婦有死而已弢並害之荀崧小女灌㓜有竒節崧為襄城太守為杜曽所圍力弱食盡欲求救於故吏平南將軍石覽計無從出灌時年十三乃率勇士數十人踰城突圍夜出賊追甚急灌督厲將士且戰且前得入魯陽山獲免自詣覽乞師又為崧書與南中郎將周訪請援仍結為兄弟訪即遣子撫率兵三千㑹石覽俱救崧賊聞兵至散走灌之力也王凝之妻謝氏字道韞安西將軍弈之女也聰識有才辯叔父安嘗問毛詩何句最佳道韞稱吉甫作頌穆如清風仲山甫永懷以慰其心安謂有雅人深致又嘗内集俄而雪驟下安曰何所似也安兄子朗曰散鹽空中差可擬道韞曰未若桞絮因風起安大悦道韞初適凝之還甚不樂安曰王郎逸少子不惡汝何恨也答曰一門叔父則有阿大中郎羣從兄弟復有封胡羯末不意天壤之中乃有王郎封謂謝歆胡謂謝朗羯謂謝元末謂謝川皆其小字也又嘗譏元學植不進曰為塵霧經心為天分有限邪凝之弟獻之嘗與賓客談議詞理將屈道韞遣婢白獻之曰欲為小郎觧圍乃施青綾歩障自蔽申獻之前議客不能屈及遭孫恩之難舉措自若既聞夫及諸子為賊所害方命婢肩輿抽刃出門亂兵稍至手殺數人乃被虜其外孫劉濤時年數歳賊又欲害之道韞曰事在王門何關他族必其如此寧先見殺恩雖毒害為之改容乃不害濤自爾嫠居㑹稽家中莫不嚴肅太守劉桞聞其名請與談議道韞素知桞名亦不自阻乃簪髻素褥坐於帳中桞束脩整帶造于别榻道韞風韻高邁叙致清雅先及家事慷慨流漣徐酬問㫖詞理無滯桞退而歎曰實所未見瞻察言氣使人心形俱服道韞亦云親從凋亡始遇此士聽其所問殊開人胷府初同郡張元妹亦有才質適於顧氏元每稱之以敵道韞有濟尼者遊於二家或問之濟尼答曰王夫人神情散朗故有林下風氣顧家婦清心玉映自是閨房之秀道韞所著詩賦誄頌並傳於世劉臻妻陳氏者亦聰辯能屬文嘗正旦獻椒花頌其詞曰旋穹周廻三朝肇建青陽散輝澄景載煥標美靈葩爰採爰獻聖容映之永夀於萬又撰元日及冬至進見之儀行於世皮京妻龍氏字憐西道縣人也年十三適京未逾年而京卒京二弟亦相次而隕既無允嗣又無朞功之親憐貨其嫁時資装躬自紡績數年間三喪俱舉葬歛既畢每時享祭無闕州里聞其賢屢有娉者憐誓不改守節居窮五十餘載而卒孟昶妻周氏昶弟顗妻又其從妹也二家並豐財産初桓元雅重昶而劉邁毀之昶知深自惋失及劉裕將建義與昶定謀昶欲盡散財物以供軍糧其妻非常婦人可語以大事乃謂之曰劉邁毀我於桓公便是一生淪䧟決當作賊卿幸可早爾離絶脱得富貴相迎未晚也周氏曰君父母在堂欲建非常之謀豈婦人所諫事之不成當於奚官中奉養大家義無歸志昶愴然久之而起周氏追昶坐云觀君舉厝非謀及婦人者不過欲得財物耳時其所生女在抱推而示之曰此兒可賣亦當不惜況資財乎遂傾資産以給之而託以他用及事之將舉周氏謂顗妻云昨一夢殊不好門内宜浣濯沭浴以除之且不宜赤色我當悉取作七日藏厭顗妻信之所有絳色者悉斂以付焉乃置帳中潛自剔緜以絳與昶遂得數十人被服赫然悉孟氏所出而家人不之知也何無忌母劉氏征虜將軍建之女也少有志節弟牢之為桓元所害劉氏每銜之常思報復及無忌與劉裕定謀而劉氏察其舉厝有異喜而不言㑹無忌夜於屏風裏制檄文劉氏潛以噐覆燭徐登梯於屏風上窺之既知泣而撫之曰我不如東海吕母明矣既孤其誠常恐夀促汝能如是吾讎恥雪矣因問其同謀知事在裕彌喜乃說桓元必敗義師必成之理以勸勉之後果如其言劉聰妻劉氏名娥字麗華偽太保殷之女也㓜而聰慧晝夜誦書籍傅母恒止之娥敦習彌篤每營女工與諸兄論經義理趣超逺諸兄深以歎伏性孝友善風儀進止聰既僭號召為右貴嬪甚寵之俄拜為后將起䳨儀殿以居之其廷尉陳元達切諫聰大怒將斬之娥時在後堂私勑左右停刑手疏啓曰伏聞將為妾營殿今昭徳足居䳨儀非急四海未一禍難猶繁動須人力資財尤宜慎之廷尉之言國家大政夫忠臣之諌豈為身哉帝王距之亦非顧身也妾仰謂陛下上尋明君諫納之昌下忿闇主距諌之禍宜賞廷尉以美爵酬廷尉以列土如何不惟不納而反欲誅之陛下此怒由妾而起廷尉之禍由妾而招人怨國疲咎歸於妾距諌害忠亦妾之由自古敗國喪家未始不由婦人者也妾每覽古事忿之忘食何意今日妾自為之後人之觀妾亦由妾之視前人也復何面目仰侍巾櫛請歸死此堂以塞陛下誤惑之過聰覽之色變謂羣下曰朕比得風疾喜怒過常元達忠臣也朕甚愧之以娥表示元達曰外輔如公内輔如此后朕無憂矣及娥死偽諡武宣皇后其姊英字麗芳亦聰敏渉學而文詞機辯暁達政事過於娥初與娥同召拜左貴嬪尋卒偽諡武徳皇后王廣女者不知何許人也容質甚美慷慨有丈夫之節廣仕劉聰為西揚州刺史蠻帥梅芳攻䧟揚州而廣被害王時年十五芳納之俄於闇室擊芳不中芳驚起曰何故反邪王罵曰蠻畜我欲誅反賊何謂反乎吾聞父仇不同天母仇不同地汝反逆無狀害人父母而復以無禮陵人吾所以不死者欲誅汝耳今死自吾分不待汝殺但恨不得梟汝首於通逵以塞大恥辭氣猛厲言終乃自殺芳止之不可陜婦人不知姓氏年十九劉曜時嫠居陜縣事叔姑甚謹其家欲嫁之此婦毀面自誓後叔姑病死其叔姑有女在夫家先從此婦乞假不得因而誣殺其母有司不能察而誅之時有羣鳥集尸上其聲甚哀盛夏暴尸十日不腐尸亦不為蟲獸所敗其境乃經歳不雨曜遣呼延謨為太守訪知其寃乃斬此女設太牢以祭其墓諡曰孝烈貞婦其日大雨靳康女者不知何許人也美姿容有志操劉曜之誅靳氏將納靳為妾靳曰陛下既滅其父母兄弟復何用妾為妾聞逆人之誅也尚汚宫伐樹而況其女子乎因號泣請死曜哀之免康一子韋逞母宋氏不知何郡人也家世以儒學稱宋氏㓜喪母其父躬自養之及長授以周官音義謂之曰吾家世學周官傳業相繼此又周公所制經紀典誥百官品物備於此矣吾今無男可傳汝可受之勿令絶世屬天下喪亂宋氏諷誦不輟其後為石虎徙之于山東宋氏與夫在徙中推鹿車背負父所授書到冀州依膠東富人程安夀夀養護之逞時年小宋氏晝則樵採夜則教逞然紡績無廢夀每歎曰學家多士大夫得無是乎逞遂學成名立仕苻堅為太常堅嘗幸其太學問博士經典乃憫禮樂遺闕時博士盧壼對曰廢學既久書傳零落比年綴撰正經粗集惟周官禮注未有其師竊見太常韋逞母宋氏世學家女傳其父業得周官音義今年八十視聽無闕自非此母無可以傳授後生於是就宋氏家立講堂置生員百二十人隔絳紗幔而受業號宋氏為宣文君賜侍婢十人周官學復行於世時稱韋氏宋母焉張天錫妾閻氏薛氏並不知何許人咸有寵於天錫天錫寢疾謂之曰汝二人將何以報我吾死後豈可為人妻邪皆曰尊若不諱妾請効死供灑埽於地下誓無他志及其疾篤二姬皆自刎天錫疾瘳追悼之以夫人禮葬焉苻堅妾張氏不知何許人明辯有才識堅將入寇江左羣臣切諫不從張氏進曰妾聞天地之生萬物聖王之馭天下莫不順其性而暢之故黄帝服牛乗馬因其性也禹鑿龍門決洪河因水勢也后稷之播百榖因地之氣也湯武之滅夏商因人之欲也是以有因成無因敗今朝臣上下皆言不可陛下復何所因乎書曰天聰明自我民聰明天猶若此況于人主乎妾聞人君有伐國之志者必上觀乾象下採衆祥天道崇逺非妾所知以人事言之未見其可諺言雞夜鳴者不利行師大羣嘷者宫室必空兵動馬驚軍敗不歸秋冬已來每夜羣犬大嘷衆雞夜鳴復聞廐馬驚逸武庫兵噐有聲吉凶之理誠非微妾所論願陛下詳而思之堅曰軍旅之事非婦人所豫也遂興兵張氏請從堅果大敗於夀春張氏乃自殺竇滔妻蘇氏始平人也名蕙字若蘭善屬文滔苻堅時為秦州刺史被徙流沙蘇氏思之織錦為廻文旋圖詩以贈滔宛轉循環以讀之詞甚悽惋凡八百四十字文多不錄苻登妻毛氏不知何許人壯勇善騎射登為姚萇所襲營壘既陷毛氏猶彎弓跨馬率壯士數百人與萇交戰殺傷甚多衆寡不敵為萇所執萇欲納之毛氏罵曰吾天子后豈為賊羌所辱何不速殺我因仰天大哭曰姚萇無道前殺天子今辱皇后皇天后土寧不鑒照萇怒而殺之慕容垂妻段氏字元妃偽右光祿大夫儀之女也少而婉慧有志操常謂妹季妃曰我終不作凡人妻季妃亦曰妹亦不為庸夫婦隣人聞而笑之垂之稱燕王納元妃為繼室遂有殊寵偽范陽王徳亦娉季妃焉姊妹俱為垂徳之妻卒如其志垂既僭位拜為皇后垂立其子寶為太子也元妃謂垂曰太子資質雍容柔而無斷承平則為仁明之主處難則非濟世之雄陛下託之大業妾未見克昌之美遼西高陽二王陛下兒之賢者宜擇一以樹之趙王麟奸詐負氣常有輕太子之心陛下一旦不諱必有難作此陛下家事宜深圖之垂不納寶及麟聞之深以為恨其後元妃又言之垂曰汝欲使我為晉獻公乎元妃泣而退告季妃曰太子不令羣下所知而主上比吾驪戎之女何其苦哉主上百年之後太子必亡社稷范陽王有非常噐度若燕祚未終其在此王乎垂死寶嗣偽位遣麟逼元妃曰后常謂主上不能嗣守大統今竟何如宜早自裁以全段氏元妃怒曰汝兄弟尚逼殺母安能保守社稷吾豈惜死念國滅不久耳遂自殺寶議以元妃謀廢嫡統無母后之道不宜成喪偽中書令畦邃大言於朝曰子無廢母之義漢之安思閻后親廢順帝猶配享安皇先后言虚實尚未可知宜依閻后故事寶從之其後麟果作亂寶亦被殺徳復僭稱尊號終如元妃之言段豐妻慕容氏徳之女也有才慧善書史能鼓琴徳既僭位署為平原公主年十四適于豐豐為人所譖被殺慕容氏寡歸將改適偽夀光公餘熾慕容氏謂侍婢曰我聞忠臣不事二君貞女不事二夫段氏既遭無辜已不能同死豈復有心於重行哉今主上不顧禮義嫁我若不從則違嚴君之命矣於是尅日交禮慕容氏姿容婉麗服飾光華熾覩之甚喜經再宿慕容氏偽辭以疾熾亦不之逼三日還第沐浴置酒言笑自若至夕密書其裙帶云死後當埋我於段氏墓側若魂魄有知當歸彼矣遂於浴室自縊而死及葬男女觀者數萬人莫不歎息曰貞哉公主路經餘熾宅前熾聞挽歌之聲慟絶良久呂纂妻楊氏𢎞農人也美豔有義烈纂被吕超所殺楊氏與侍婢十數人殯纂于城西將出宫超慮齎珍寶出外使搜之楊氏厲聲責超曰爾兄弟不能相和睦手刃相屠我旦夕死人何用金寶為超慚而退又問楊氏玉璽所在楊氏怒曰盡毀之矣超將妻之謂其父桓曰后若自殺禍及卿宗桓以告楊氏楊氏曰大人本賣女與氐以圖富貴一之以甚其可再乎乃自殺吕紹妻張氏亦有操行年十四紹死便請為尼吕隆見而悦之欲穢其行張氏曰欽樂至道誓不受辱遂升樓自投於地二脛俱折口誦佛經俄然而死李暠妻尹氏天水冀人也㓜好學清辯有志節初適扶風馬元正元正卒為暠繼室以再醮之故三年不言撫前妻子踰於已生暠之創業也謀謨經略多所毗贊故西州諺曰李尹王敦煌及暠卒子歆嗣位尊為太后歆將攻沮渠䝉遜尹氏謂曰汝新造之國地狹人稀靖以守之猶懼其失云何輕舉闚冀非望䝉遜驍武善用兵汝非其敵吾觀其數年以來有兼并之志且天時人事似欲歸之今國雖小足以為政知足不辱道家明誡也且先王臨薨遺令殷勤志令汝曹深慎兵戰俟時而動言猶在耳奈何忘之不如勉修徳政蓄力以觀之彼若滛暴人將歸汝汝茍徳之不建事之無日矣汝之此行不唯師敗國亦將亡歆不從果為䝉遜所滅尹氏至姑臧䝉遜引見勞之對曰李氏為胡所滅知復何言或諫之曰母子命懸人手奈何倨傲且國敗子孫屠戮何獨無悲尹氏曰興滅死生理之大分何為同凡人之事起兒女之悲吾一婦人不能死亡豈憚斧鉞之禍求為臣妾乎若殺我者吾之願也䝉遜嘉之不誅為子茂䖍娉其女為妻及魏氏以武威公主妻茂䖍尹氏及女遷居酒泉既而女卒撫之不哭曰汝死晚矣沮渠無諱時鎮酒泉每謂尹氏曰后諸孫在伊吾后能去不尹氏未測其言答曰子孫漂流託身醜虜老年餘命當死於此不能作氊裘鬼也俄而潛奔伊吾無諱遣騎追及之尹氏謂使者曰沮渠酒泉許我歸北何故來追汝可斬吾首歸終不廻矣使者不敢逼而還年七十五卒於伊吾後魏中書侍郎清河崔覽妻封氏者渤海人散騎常侍愷女也有才識聰辯彊記多所究知時李敷公孫文叔雖已貴重近世故事有所不達者皆就而諮請焉渤海封卓妻劉氏者彭城人也成婚一夕卓官於京師後以事伏法劉氏在家忽然夢想知卓已死哀泣不輟經旬凶問果至遂憤歎而死時人比之秦嘉妻中書令高允念其義高而名不著為詩八章以悼之而劉氏之節遂著於世鉅鹿魏溥妻房氏者慕容垂貴鄉太守常山房湛女也婉順高明而有烈操年十六而溥遇病且卒顧謂之曰人生如過隙死不足恨但母老家貧供奉無寄赤子矇眇血祀孤危所抱怨於黄壚耳房垂泣而對曰幸承先人餘訓出事君子義在偕老有志不從蓋其命也今夫人在堂稚子襁褓顧當以身少相感永深長徃之恨俄而溥卒及將大斂房氏操刀割左耳投之棺中仍曰鬼神有知相期泉壤流血滂然助喪者咸哀懼姑劉氏輟哭而謂曰新婦何至於此房氏曰新婦少年不幸早寡實慮父母未量至情覬持此自誓耳聞知者莫不感愴於時子緝生未十旬鞠育於後房之内未曽出門遂終身不聽絲竹不預坐席緝年十二房父母仍存於是歸寧父兄尚有異議緝竊聞之以啓其母房命駕始云他行因而遂歸其家弗之知也行數十里方覺兄弟來追房哀歎而不反其執意如此訓導一子有母儀法度緝所交游有名勝者則身具酒饌有不及已者輙屏卧不飱須其悔謝乃食善誘嚴訓類皆如此年六十五而終緝子悦後為濟陰太守吏民立碑頌徳金紫光祿大夫高閭為其文曰爰及處士遘疾夙凋伉儷秉志識茂行高殘形顯操誓敦久要溥未仕而卒故稱處士云樂部郎胡長命妻張氏者不知何許人也事姑王氏甚謹太安中京師禁酒張氏以姑老且患私為醖之為有司所紏王氏詣曹自首由已私釀張氏曰姑老抱患張主家事姑不知釀主司不知所處平原王陸麗以狀奏文成義而赦之平原鄃縣女子孫氏男玉者夫為零陵縣人所殺男玉追執讎人欲自殺之其弟止而不聽男玉曰女人出適以夫為天當親自復雪云何假人之手遂以杖毆殺之有司處死以聞獻文詔曰男玉重節輕身以義犯法緣情定辠理在可原其特恕之清河房愛親妻崔氏者同郡崔元孫之女也性嚴明有高節歴覽書傳多所聞知親授子景伯景光崔氏九經義學行修明並為當世名士景伯為清河太守每有疑獄常先請焉貝邱人列子不孝吏欲案之景伯為之悲傷入白其母母曰吾聞聞名不如見面小民未見禮教何足責之但呼其母來吾與之同居其子置汝左右令其見汝事吾或應自改景伯遂召其母崔氏處之於榻與之共食景伯為之温凊其子侍立堂下未及旬日悔過求還崔氏曰此雖顔慙未知心媿且可置之凡經二十餘日其子叩頭流血其母涕泣乞還然後聽之終以孝聞其識度勵物如此竟以夀終涇州貞女兒氏者許嫁彭老生為妻幣娉既畢未及成禮兒氏率行貞淑居貧常自谷汲以養父母老生輙徃逼之女曰與君娉命雖畢二門多故未及相見何由不禀父母擅見凌辱若茍行非禮正可身死耳遂不肯從老生怒而刺殺之取其衣服珠纓女尚能言臨死謂老生曰生身何辜與君相遇我所以執節自固者寧更有所邀正欲奉給君耳今反為君所殺若魂靈有知自當相報言終而絶老生持女衣服珠纓至其叔宅以告叔曰此是汝婦奈何殺之天不祐汝遂執送官太和七年有司劾老生以死辠尋有詔標女墓號曰貞女姚氏婦楊氏者閹人苻承祖姨也家貧及承祖為文明太后所寵貴親姻皆求利潤唯楊獨不欲常謂其姊曰姊雖有一時之榮不若妺有無憂之樂姊雖遺其衣服多不受彊與之則云我夫家世貧好衣美服則使人不安與之奴婢云我家無食不能供給終不肯受常著破衣自執勞事時受其衣服多不着密埋之設有著者汚之而後服承祖每見其寒悴深恨其家謂不供給之乃啓其母曰今承祖一身何所乏少而使姨如是母具以語之承祖乃遣人乗車徃迎之則厲志不起遣人彊輿於車上則大哭言爾欲殺我也由是苻家内外皆號為癡姨及承祖敗有司執其二姨至殿庭致法以姚氏婦衣裳弊陋特免其辠其識機雖呂􅎐亦不如也滎陽京縣人張洪祁妻劉氏者年十七夫亡遺腹生一子三歳又没其舅姑年老朝夕奉養率禮無違兄矜其少寡欲奪嫁之劉自誓不許以終其身陳留董景起妻張氏者景起早亡張時年十六痛夫少喪哀傷過禮蔬食長齋又無兒息獨守貞操期以闔棺鄉曲高之終見標異漁陽太守陽尼妻高氏者渤海人也學識有文翰孝文勑令入侍後宫幽后表啓悉其辭也滎陽史映周妻耿氏者同郡耿氏女也年十七適於映周太和二十三年映周卒耿氏恐父母奪其志因葬映周哀哭而殞見者莫不悲嘆屬大使觀風以狀具上詔標門閭任城國太妃孟氏者鉅鹿人尚書任城王澄之母也澄為揚州之日率衆出討於後賊帥姜慶真陰結逆黨襲䧟羅城長史韋纘倉卒失圖計無所出孟乃勒兵登陴先守要便激厲文武諭之逆順於是咸有奮志賊不能克卒以全城靈太后後詔有司樹碑旌美梓潼太守茍金龍妻劉氏者平原人廷尉少卿劉叔宗之姊也宣武時金龍為郡帶關城戍主梁人攻圍㑹金龍病不堪部分劉遂率勵城人修理戰具夜悉登城拒戰百有餘日兵士死傷過半戍副高景陰圖叛逆劉與城人斬之及其黨與數十人自餘將士分衣減食勞逸必同莫不畏而懷之井在城外尋為賊䧟城中絶水渇死者多劉乃集諸長㓜喻以忠節遂相率告訴於天俱時號呌俄而澍雨劉命出公私布絹及致衣服懸之城内絞而取水所有雜噐悉令儲之於是人心益固㑹益州刺史傅豎眼率救兵至梁人乃退豎眼歎異之具狀奏聞宣武嘉之正光中賞其子慶珍平昌縣子又得二子出身貞孝女宗者趙郡柏人人趙郡太守李叔允之女范陽盧元禮之妻也性至孝父卒號慟幾絶者數四頼母崔氏慰勉之得全三年之中形骸銷瘠非人不起及歸夫氏與母分隔便飲食日損涕泣不絶日就羸篤盧氏合家慰喻不觧因遣歸寧還家乃復故如此者八九焉及元禮卒李追亡撫遺事姑以孝謹著母崔終於洛陽凶問初到舉聲慟絶一宿乃蘇水漿不入口者六日其姑慮其不濟親送奔喪而氣力危殆自范陽向都八旬方達攀櫬號慟遂卒有司以狀聞詔追號貞孝女宗易其里為孝徳里樹李盧二門以惇風俗河東姚氏女者字女勝少喪父無兄弟母憐而守養年六七歳便有孝性人言其父者聞輙垂泣隣伍異之正光中母死女勝年十五哭不絶聲水漿不入口數日不勝哀遂死太守崔遊申請為營墓立碑自為製文表其門閭比之曹娥改其里曰上虞里墓在郡城東六里大道北至今名曰孝女冢也滎陽刁思遵妻者魯氏女也始笄為思遵所娉未踰月而思遵亡其家矜其少寡許嫁已定魯聞之以死自誓父母不達其志遂經郡訴稱刁氏恡護寡女不使歸寧魯乃與老姑徒歩詣司徒府自告情狀普泰初有司聞奏節閔詔本司依式標牓武功縣孫道温妻趙氏者安平人也万俟醜奴之反圍岐州久之無援趙乃謂城中婦女曰今州城方䧟義在同憂遂相率負土晝夜培城城竟免賊大統六年贈夫岐州刺史贈趙安平縣君河北孫神妻陳氏者河北郡人也神當逺戍主吏配在夏州意難其逺有孤兄子欲以自代陳曰為國征戍道路遼逺何容身不肯行以孤姪自代天下物議誰其相許神感其言乃自行在戍未幾便喪亡及槥柩至陳望而哀慟一哭而卒文帝詔表其閭隋蘭陵公主字阿五高祖第五女也美姿容好讀書性婉順上於諸女中特所鍾愛初嫁儀同王奉孝奉孝卒適河東桞述時年十八諸姊並驕踞主獨折節遵於婦道事舅姑甚謹遇疾必親奉湯藥高祖聞之大悦由是述漸見寵遇初晉王廣欲以主配其妃弟蕭瑒高祖將許之後遂適述晉王因不悦及述用事彌惡之高祖崩述徙嶺表煬帝遂令主與述離絶將改嫁之主以死自誓不復朝謁上表請免公主之號與述同徙帝大怒曰天下豈無男子而欲與述同徙邪主曰先帝以妾適桞家今其有罪妾當從坐不願陛下屈法申恩帝不從主憂憤而卒年三十二臨終上表曰昔恭姜自誓著美前詩息媯不言傳芳往誥妾雖負罪竊慕古人生既不得從夫死乞葬於桞氏帝覽表愈怒不哭葬主於洪瀆川資送甚薄朝野傷之南陽公主者煬帝長女也美風儀有志節年十四嫁於許國公宇文述之子士及以謹厚聞述病且卒主親調飲食手自奉上世以此稱之及宇文化及弑逆公主隨至聊城而化及為竇建徳所敗士及乃自濟北西歸于唐時隋世衣冠並在其所建徳引見之皆惶懼失常唯主神色自若建徳與語復自陳國破家亡不能報怨雪恥淚下盈襟聲辭不輟情理至切建徳及觀聽者莫不為之動容隕涕咸敬異焉及建徳誅化及時主有一子名禪師年且十歳建徳遣虎賁郎將於士徵謂主曰宇文化及躬行弑逆今將族滅其家公主之子法當從坐若不能割愛亦聽留之主泣曰虎賁既是隋室貴臣此事何須見問建徳竟殺之主尋請建徳削髮為尼及建徳敗將歸西京復與士及遇於東都主不與相見士及就之立於戸外請復為夫妻主拒之曰我與君讎家今恨不能手刃君者但以謀逆之際君不預知耳固與告絶訶令速去士及固請主怒曰必欲就死方可相見也士及知不可屈乃拜辭而去襄城王恪妃者循州刺史桞旦女也妃姿貌端麗年十餘以良家子合相見娉為妃未幾而恪被廢妃修婦道事之愈敬煬帝嗣位復徙邊帝令使者殺之於道恪與辭決妃曰若王死妾誓不獨生於是相對慟哭恪死棺歛訖妃謂使者曰妾誓與楊氏同穴若身死得不别埋君之惠也遂撫棺號慟自經而卒見者莫不流涕華陽王楷妃者黄門侍郎龍涸縣公河南元巖女也巖明敏有噐幹煬帝嗣位坐與栁述連事除名徙南海後會赦還長安有人譖巖逃歸收殺之妃有姿色性婉順初以選為妃未幾而楷被幽廢妃事楷愈謹每見楷有憂懼色輙陳義理以慰諭之楷甚敬焉及江都之亂楷遇害宇文化及以妃賜其黨元武達武達初以宗族禮之置之别舎後因醉而逼之妃自誓不屈武達怒而撻之百餘詞色彌厲乃自毀其面血淚俱下武達釋之妃謂其徒曰我不能早死致命將見侵辱我之罪也因不食而卒譙國夫人洗氏者高涼人也累葉為南越首領跨據山洞部落十餘萬家夫人㓜賢明多籌略在父母家撫循部衆能行軍用師壓服諸越每勸親族為善由是信義結於本鄉越人俗好相攻撃夫人兄南梁州刺史挺恃其富彊侵掠旁郡嶺表苦之夫人多所規諌由是怨隙止息海南儋耳歸附者千餘洞梁大同初羅州刺史馮融聞夫人有志節為其子高涼太守寶娉以為妻融本北燕苖裔也初馮𢎞之南投高麗也遣融大父業以三百人浮海歸宋因留于新會自業及融三世為守牧以他鄉覊旅號令不行至是夫人誡約本宗使從民間之禮每共夫寶參決詞訟首領有犯法者雖親族無所縱捨自此政令有序人莫敢違後遇侯景反廣州都督蕭勃徵兵援臺高州刺史李遷仕據大臯口遣召寶寶欲往夫人止之曰此欲共君為反耳欲質君以追君之兵衆願且無行既而遷仕果反遣主帥杜平虜率兵入灨石寶以告夫人夫人曰平虜驍將也領兵入灨口即與官兵相拒勢未得還遷仕在州無能為也若君自往必有鬬戰宜遣使詐之卑辭厚禮云身未敢出欲遣婦往參彼聞之喜必無防慮於是我將千餘人歩擔雜物唱言輸賧得至柵下必可圖也寶從之遷仕果大喜遣使覘夫人衆皆擔物不設備夫人至因撃之大捷遷仕走保于寧都夫人總兵與長城侯陳霸先會于灨石還謂寶曰陳都督大可畏也極得衆心必能平賊君宜厚資給之及寶卒嶺表大亂夫人懷集百越數州晏然陳永定二年其子僕年九歳遣率諸首嶺朝于丹陽拜陽春郡守後廣州刺史歐陽紇謀反召僕至高要誘與為亂僕遣使歸告夫人夫人曰我為忠貞經今兩代不能惜汝輙負國家遂發兵拒境率百越酋長章昭達等内外逼之紇徒潰散僕以夫人功封信都侯加平越中郎將轉石龍太守詔使持節冊夫人為高涼郡中郎將石龍太夫人賚繡幰油絡駟馬安車一乗給鼓吹一部并麾幢旌節其鹵簿一如刺史之儀至徳中僕卒後遇陳亡嶺南未有所附數郡共奉夫人號為聖母保境安民高祖遣總管韋洸安撫嶺外陳將徐澄以南康拒守洸不敢進初夫人以扶南犀杖獻于陳主至此晉王廣遺夫人書喻以國亡令夫人歸化并以犀杖及兵符為信夫人見杖驗知陳亡集首領數千人盡日慟哭遣其孫魂率衆迎洸洸入至廣州嶺南悉定乃表魂為儀同三司冊夫人為宋康郡夫人未幾番禺人王仲宣反首領皆應之圍洸於州城進兵屯衡嶺夫人遣其孫暄出兵救洸時暄與逆黨陳佛智素相友故遲留不進夫人大怒遣使執暄繋於州獄又遣孫盎討佛智斬之進兵至南海與鹿愿兵會共敗仲宣夫人親被甲乗介馬張錦傘領彀騎衞詔使裴矩巡撫諸州其蒼梧首領陳坦岡州馮岑翁梁化鄧馬頭藤州李光略羅州龎靖等皆來參謁還令統其部落嶺表遂定高祖異之拜盎為高州刺史仍赦出暄拜羅州刺史追贈寶為廣州總管譙國公冊夫人為譙國夫人仍開譙國夫人幕府署長史以下官屬給印章聽發部落并六州兵馬若有機急便宜行事降勅書襃美賜物五千段皇后以首飾及宴服一襲賜之夫人並盛於金篋并梁陳賜物各藏于一庫每歳時大會皆陳於庭以示子孫曰汝等宜盡赤心向天子我事三世主唯用一好心今賜物具存此忠孝之報願汝等思念之時番州總管趙訥貪虐諸俚獠多叛亡夫人遣長史張融上封事論安撫之宜并言訥罪狀上遣推訥得其贓竟致于法勅委夫人招慰亡叛夫人親載詔書自稱使者歴十餘州宣述上意諭諸俚獠所至皆降高祖賜夫人臨振縣湯沐邑一千五百戸贈僕為崖州總管平原郡公仁夀初卒諡為誠敬夫人鄭善果母崔氏者清河人也年十三適滎陽鄭誠生善果周末誠討尉遲迥力戰而死母年二十而寡父彦睦欲奪其志母抱善果曰婦人無再適人之義且鄭君雖死幸有此兒棄兒為不慈背死夫為無禮寧當割耳截髮以明素心違禮滅慈非敢聞命善果以父死王事數歳拜使持節大將軍襲爵開封縣公開皇初進封武徳郡公年十四授沂州刺史轉景州刺史尋為魯郡太守母性賢明有節操博渉書史通達政事每善果出聽事母輙坐胡牀於鄣後察之聞其剖斷合理歸則大悦即賜之坐相對談笑若行事不允或妄嗔怒乃還堂中䝉袂而泣終日不食善果伏於牀前不敢起母方起謂之曰吾非怒汝乃愧汝家耳吾為汝家婦獲奉灑埽知汝先君忠勤之士也守官清恪未嘗問及私事以身徇國繼之以死吾亦望汝副其此心汝既年小而孤吾寡婦耳有慈無威使汝不知禮訓何可負荷忠臣之業乎汝自童子襲茅土汝今位至方岳豈汝身致之邪不思此事而妄加嗔怒心緣驕樂墯於公政内則墜爾家風或失亡官爵外則虧天下法以取罪戾吾死日何面目見汝先人於地下乎母常自勤紡績每至夜分而寢善果曰兒封侯開國位居三品秩俸幸足母何自勤苦如此答曰吁汝年已長吾謂汝知天下理今聞此言公事何由濟乎今此秩俸乃是天子報汝先人之殉命也當須散贍六姻為先君之惠妻子奈何獨擅其利以為富貴哉又絲枲紡織婦人之務上自王后下至大夫士妻各有所製若墯業者是為驕逸吾雖不知禮其可自敗名乎初寡便不御脂粉常服大練性又節儉非祭祀賓客之事酒肉不妄陳其前靜室端居未嘗輙出門閤内外姻戚有吉凶事但厚加贈遺皆不詣其家非自手作及莊園祿賜所得雖親族禮遺悉不許入門善果歴任州郡内自出饌於衙中食之公􅇬所供皆不許受悉用修理公宇及分僚佐善果亦由此克己號為清吏煬帝遣御史大夫張衡勞之考為天下最徵授光祿卿其母卒後善果為大理卿漸驕恣公清平允遂不如疇昔焉孝女王舜者趙郡王子春之女也子春與從兄長忻不協齊亡之際長忻與其妻同謀殺子春舜時年七歳有二妹粲年五歳璠年二歳並孤苦寄食親戚舜撫育二妹恩義甚篤而舜陰有復讎之心長忻殊不意焉及姊妹俱長親戚欲嫁之輙拒不從乃密謂二妹曰我無兄弟致使父讎不復吾輩雖女子何用生為欲共汝報復汝竟何如二妹皆垂泣曰唯姊所命乃於夜中與姊妹各持刀踰牆入手殺長忻夫妻以告父墓因詣縣請罪姊妹爭為謀首州縣不能決高祖聞而嘉歎特原其罪韓覬妻于氏河南人也字茂徳父寔周大左輔于氏年十四適於覬雖生長膏腴家門鼎盛而動遵禮度躬自儉約宗黨敬之年十八覬從軍没于氏哀毀骨立慟感行路每朝夕奠祭皆手自捧持及免喪其父以其㓜少無子欲更嫁之女誓無異志截髮自明養夫之孽子世隆為嗣身自撫育愛同已生訓導有方卒能成立自孀居以後唯時或歸寧至於親族之家絶不來徃有尊屬就省謁者送迎皆不出戸庭蔬食布衣不聽聲樂以終身焉高祖聞而嘉歎下詔襃美表其門閭長安中號為節婦門年七十二卒陸讓母馮氏者上黨人也性仁愛有母儀讓即其孽子也開皇末為番州刺史數有聚斂贓貨狼籍為司馬所奏案覆得實將就刑馮氏蓬首垢面詣朝堂數讓罪於是流涕嗚咽親持盃粥勸讓食既而上表求哀詞情甚切上愍然為之改容獻皇后甚竒其意致請於上書侍御史栁彧進曰馮氏母徳之至有感行路如或戮之何以為勸上於是集京城士庻於朱雀門遣舎人宣詔曰馮氏以嫡母之徳足為世範慈愛之道義感人神特宜矜免用奬風俗讓可減死除名復下詔襃美之賜物五百段集命婦與馮相識以旌寵異劉昶女者河南長孫氏婦昶在周尚公主為上柱國彭國公位望甚顯與高祖有舊及受禪甚見親禮歴左武衛大將軍慶州總管其子居士為千牛備身不遵法度數得罪上以昶故每原之居士轉恣每大言曰男兒要當辮頭反縛籧篨上作獠舞取公卿子弟膂力雄健者輙將歸家以車輪括其頸而棒之殆死能不屈者稱為壯士釋而與之交黨與三百人其趫捷者號為餓鶻隊武力者號為蓬轉隊韝鷹紲犬連騎道中毆撃路人多所侵奪長安市里無貴賤見者辟易至於公卿妃主亦莫敢與校其女則居士姊也每垂泣誨之居士不改至破家産昶年高奉養甚薄其女時寡居哀昶如此每歸寧于家躬勤紡績以致其肥鮮有人吿居士與其徒游長安城登故未央殿基向南坐前後列隊意有不遜每相約曰當作一死耳又時有人言居士遣使引突厥令南寇當於京師應之上謂昶曰今日事當如何昶猶恃舊恩不自引咎直前曰黒白在于至尊上大怒下昶獄捕居士黨與憲司又奏昶事母不孝其女知昶必不免不食者數日每親調飲食手自捧持詣大理餉父見獄卒跪以進之歔欷嗚咽見者傷之居士被斬昶賜死于家詔百寮臨視時其女絶而復蘇者數矣公卿慰喻之其女言父無辠坐子及禍詞情哀切人皆不忍聞見遂布衣蔬食以終其身上聞歎曰吾聞衰門之女興門之男固不虚也鍾士雄母蔣氏者臨賀人也士雄仕陳為伏波將軍陳主以士雄為嶺南酋帥慮其反覆留蒋氏於都下及晉王廣平江南以士雄在嶺表欲以恩義致之遣蔣氏歸臨賀既而同郡虞子茂鍾文華等作亂攻城遣召士雄士雄將應之蔣氏謂曰汝既背徳忘義我當自殺於汝前士雄遂止蔣氏復為書與子茂等諭以禍福子茂不從尋為官軍所敗上聞蔣氏甚異之封安樂縣君時伊川寡婦胡氏者不知何許人妻甚有志節為邦族所重江南之亂諷諭宗黨守節不從叛逆封為密陵郡君孝婦覃氏者上郡鍾氏婦也與夫相見未幾而夫死時年十八事後姑以孝聞數年間姑及伯叔皆相繼死覃氏家貧無以葬躬自儉約晝夜紡績十年而葬八喪為州里所敬高祖聞而賜米百石表其門閭元務光母盧氏者范陽人也少好讀書造次必以禮盛年寡居諸子㓜弱家貧不能就學盧氏每親自教授勗以義方漢王諒反遣將綦良徃山東略地良以務光為記室及良敗慈州刺史上官政簿籍務光家見盧氏逼之盧氏以死自誓政凶悍怒甚以燭燒其面盧氏執志彌固竟不屈節裴倫妻栁氏者河東人也少有風訓大業末倫為渭源令為賊薛舉所䧟倫遇害栁氏時年四十有二女及兒婦三人皆有美色栁氏謂曰我輩遭逢禍亂汝父已死我自念不能全汝我門風有素義不受辱於羣賊我將與汝等同死如何女等垂泣曰唯母所命栁氏遂自投於井其女及婦相繼而下皆死井中趙元楷妻崔氏者清河人也甚有禮度隋末宇文化及之反元楷隨至河北將歸長安至􅇭口遇盜僅以身免崔氏為賊所拘請以為妻崔氏曰我士大夫女為僕射子妻今日破亡自可即死終不為賊婦羣賊裂其衣縛於牀簀之上將陵之崔氏懼為所辱詐之曰今力已屈當受處分賊遂釋之妻因取賊刀倚樹而立曰欲殺我任加刀鋸若覓死可來相逼賊大怒亂射殺之元楷後得殺妻者支觧以祭崔氏之墓通志卷一百八十五
