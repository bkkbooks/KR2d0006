body:
  text: 通志卷一百五十六宋右廸功郎鄭樵漁仲撰列傳第六十九後周賀拔勝弟岳寇洛趙貴從祖兄善李賢弟逺植逺子植弟基梁禦李弼子暉弟􅋆于謹子寔翼寔子顗翼寔弟翼子璽弟義宇文貴侯莫陳崇兄順王雄子謙主盟子勱懋勱弟獨孤信竇熾兄子毅賀蘭祥叱列伏龜閻慶史寧子雄權景宣王羆孫述王思政尉遲迥弟網運網子王軌樂運賀㧞勝字破胡神武尖山人也祖爾頭徙家武川父度㧞武川軍主正光末為懐朔統軍卒贈肆州刺史兄允太尉侍中燕郡王允自有傳勝少有志操善左右馳射北邉莫不服其膽畧衛可瓌之圍懐朔勝時亦為軍主從父度㧞鎮守既被圍經年而外援不至勝乃慷慨白鎮将楊鈞請告急於大軍鈞許之乃募勇敢少年得十餘騎夜潰圍而出賊追及之勝曰我賀㧞破胡也賊不敢逼至朔州告急於臨淮王元彧辭氣壮烈彧義之許為出師勝還報命復突圍而入賊追之射殺數人至城下大呼曰賀㧞破胡與官軍至矣城中納之既而大兵不至鈞復遣勝出覘武川武川已陷勝乃馳還報懐朔懐朔亦潰勝父子俱被虜尋度㧞與德皇帝合謀襲殺可瓌衆令勝馳告朔州未反而度㧞與鐵勒戰没刺史費穆竒勝才畧厚禮留之委以兵事時廣陽王深在五原為破六韓賊所圍召勝為軍主以軍功拜統軍又𨽻僕射元纂鎮恒州時有鮮于河胡擁朔州流民南下為寇恒州城人應之勝與兄允弟岳相失南投肆州允岳投爾朱榮榮與肆州刺史尉慶賔構隙引岳攻肆州城䧟得勝大悅曰吾得卿兄弟天下不足平也勝兄弟三人遂委質事榮時杜洛周阻衆幽定葛榮據有冀瀛榮謂勝曰井陘險要我之東門意欲屈君鎮之何如勝曰少逢兵亂險阻備嘗每思効力以報知己今䝉驅䇿實所願也榮乃表勝為鎮逺将軍領歩騎五千鎮井陘以所乗馬并銀鞍遺之孝昌末從榮入洛以預定䇿立魏孝荘帝功封易陽縣伯累遷撫軍将軍後元天穆北征葛榮大破之時杜洛周餘燼韓樓在薊城結聚以勝為大都督鎮中山樓讋勝威名竟不敢南冦元顥入洛陽孝荘出居河南榮徴勝為前軍大都督與爾朱兆自硤石度大破顥軍禽其子冠受遂前驅入洛陽遷武衞将軍進爵真定縣公及榮死勝乃與田怡等奔赴榮第時宫殿之門未加嚴防怡等議即攻門勝止之曰天子既行大事必當更有竒謀吾衆旅不多何可䡖爾怡乃止及世隆夜走勝随至河橋勝以為臣無讐君之義遂勒所部還都荘帝大恱仲逺逼東郡詔以夲官假驃騎大将軍東征都督率騎一千㑹鄭先䕶討之為先䕶所疑置之營外人馬未得休息俄而仲逺至與戰不利降之復與爾朱氏同謀立節閔帝以功拜右衞将軍及爾朱氏将討齊神武度律自洛陽兆自并州仲逺自滑臺三帥㑹鄴時勝從度律度律與兆不平勝以臨敵構隙取敗之道與斛斯椿詣兆營和解之反為兆所執度律大懼引軍還兆将斬勝數之曰爾殺可瓌罪一也天柱薨後不與世隆等俱来而東征仲逺罪二也我欲殺爾久矣勝曰可瓌作逆勝父子殺之其功不小反以為罪天柱被戮以君誅臣勝寧負王不負朝廷今日之事死生在王但去賊宻邇内構嫌隙自古迄今未有不破亡者勝不憚死恐王失䇿兆乃捨之勝既免行百餘里方追及度律齊神武既克相州兵威漸盛爾朱兆及天光仲逺度律等衆十餘萬陣於韓陵兆率鐵騎陷陣出齊神武後将乗其背而擊之度律惡兆之驍悍懼其陵已勒兵不進勝以其兄弟携貳遂率麾下降齊神武度律軍以此恐退遂大敗太昌初以勝為領軍将軍尋除侍中魏孝武帝将圗齊神武以勝弟岳擁衆關西欲廣其勢援乃拜勝為都督三荆三郢南襄南雍等七州諸軍事進位驃騎大将軍荆州刺史開府儀同三司南道大行臺尚書左僕射勝攻㧞梁下溠戍禽其戍主又使人誘動諸蠻皆率其種落歸欵漢南大駭又禽梁将荘思延攻馮翊安定沔陽並平之梁武帝𠡠其子雍州刺史續曰賀㧞勝北間驍将爾宜慎之勿與爭鋒續還城守不敢出尋進位尚書令進爵琅邪郡公及齊神武與魏孝武帝有隙詔勝引兵赴洛至廣州猶豫未進而帝已率所領西赴關中勝還軍南陽遣右丞陽休之奉表入關又令府長史元頴行州事勝自率所部将西赴関中進至淅陽詔授勝太保録尚書事聞齊神武已平潼関禽毛鴻賔勝乃還荆州州人鄧誕執元頴引齊師時神武已遣行臺侯景大都督髙敖曹赴之勝敗中流矢以百騎南奔梁在江表三年梁武帝遇之甚厚勝乞師北討齊神武既不果乃求還梁武帝許之親餞於南苑勝自是之後每執弓矢見鳥獸南向者皆不射之以申懐徳之意既至長安詣闕謝罪孝武握勝手歔欷久之曰初平西徙永嘉南度漢晉皆爾事乃關天非公之咎也乃授太師從文帝禽竇㤗於小関又從攻𢎞農下河北禽郡守孫晏又從破東魏軍於沙苑追奔至河上乃與李弼别攻河東畧定汾絳河橋之役勝大破東魏軍文帝令勝收其降卒而還及齊神武攻玉壁勝以前軍大都督從文帝見齊神武旗鼓識之乃募敢勇三千人配勝以犯其軍勝與神武相遇連叱而字之曰賀六渾賀拔破胡必殺汝也時募士皆用短兵接戰勝持矟追神武數里刃垂及之神武汗流氣殆盡㑹勝馬為流矢所中死叱副騎至神武已逸去勝嘆曰今日之事吾不執弓矢者天也是嵗勝諸子在東者皆為神武所害勝憤恨因動氣疾大統十年薨于位臨終手書與文帝曰勝萬里杖䇿歸身闕庭冀望與公埽除逋寇不幸殞斃微志不申願公内先協和順時而動若死而有知猶望魂飛賊庭以報恩遇矣文帝覽書流涕久之勝長於䘮亂之中尤工武藝走馬射飛鳥十中五六文帝每云諸将對敵神色皆動唯賀拔公臨陣如平常真大勇也自居重任始愛墳籍乃招引文儒討論義理性又通率重義輕財身死之日唯有随身兵仗及書千卷而已初勝至関中自以年位素重見文帝不拜尋而自悔文帝亦有望焉後從文帝宴于昆眀池時有雙鳬㳺池上文帝授弓矢於勝曰不見公射久矣請以為歡勝一發俱中因拜文帝曰使勝得奉神武以討不庭皆如此也文帝大恱自是恩禮日重勝亦盡誠推奉焉贈太宰録尚書事諡曰貞獻眀帝二年以勝配享文帝廟庭勝無子以弟岳子仲華嗣位開府儀同三司襲爵琅邪公大象末位江陵縂管勝弟岳字阿斗泥少有大志愛施好士初為太學生及長能左右馳射驍果絶人不讀兵書而闇與之合識者咸異之與父兄赴援懐朔賊王衞可瓌在城西三百餘歩岳乗城射之箭中瓌臂賊大駭後廣陽王深以為帳内軍主與兄勝俱鎮恒州州陷後投爾朱榮待之甚厚以為都督每居帳下與計事多與榮意合榮與元天穆謀入匡朝廷問計於岳曰今女主臨朝政歸近習盗賊蜂起海内沸騰吾累世受恩義同休戚今欲内除君側外清逆亂取勝之道計将安出對曰夫立非常之事必俟非常之人将軍士馬精彊位任隆重若首舉義旗伐叛匡救何徃不克何向不摧古人云朝謀不及夕言發不俟駕此之謂矣榮與天穆相顧良久曰卿此言真丈夫之論也未㡬而魏孝眀帝暴崩榮疑有故乃舉兵赴洛配岳甲卒二千為先驅至河隂榮既殺害朝士時齊神武為營軍都督勸榮稱帝左右欲同之榮未決岳進而言曰将軍首舉義兵共除姦逆功勤未立遽有此謀祗以速禍榮尋亦自悟乃尊立孝荘岳又勸榮誅齊神武以謝天下榮不從以定䇿功賜爵樊城鄉男授前将軍從榮破葛榮平元顥累遷左光禄大夫武衛将軍時万俟醜奴僣稱大號關中騷動朝廷深以為憂榮将遣岳討之岳私謂其兄勝曰醜奴擁秦隴之衆足為勍敵若岳徃無功罪責立至假令克定恐讒愬生焉勝曰汝欲何計自安岳曰請爾朱氏一人為元帥岳副貳之則可矣勝然之乃請於榮榮大恱遂以天光為使持節都督雍州刺史以岳為衞将軍左廂大都督又以征西将軍侯莫陳恱為右廂大都督並為天光之副以討之時赤水蜀賊阻兵㫁路天光之衆不滿二千及軍次潼關天光頗有難色岳曰蜀賊草竊而公遲疑遇大敵将如之何遂進軍戰於渭北破之軍威大振時醜奴自圍岐州遣其大行臺尉遲菩薩僕射万俟行醜同向武功南渡渭水攻圍趨柵天光遣岳率千騎赴援菩薩攻柵已克率歩騎二萬至渭北岳以輕騎數十與菩薩隔水交言岳稱揚國威菩薩乃自驕令省事傳語省事恃水應答不遜岳怒舉弓射之應弦而倒時已逼暮於是各還岳於渭南傍水分精兵數十為一處随地形勢置之眀日将百餘騎隔水與賊相見且並東行岳漸進前先所置騎随岳而集騎既漸増賊不復測其多少行二十許里至水淺可濟處岳便騎馬東出似欲奔遁賊為岳走乃棄歩兵南度渭水輕騎追岳岳東行十餘里依横岡設伏兵以待之身先士卒急擊之賊便退走岳號令所部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲三千人馬亦無遺遂禽菩薩仍度渭北降歩卒萬餘醜奴尋棄岐州北走安定置柵於平亭天光方自雍至岐與岳合勢軍於汧渭之間宣言曰今氣候漸熱非征討之時待秋涼更圗進取醜奴聞之遂以為實分遣諸軍散農於岐州之北百里網川使其太尉侯伏侯元進據險立柵岳知其勢分宻與天光嚴備昧旦攻圍元進柵拔之即禽元進自餘諸柵悉降醜奴棄平亭而走欲向髙平岳輕騎急追眀日及醜奴於平涼之長阬一戰禽之髙平城中又執蕭寳夤以歸賊行臺万俟道洛退保牽屯岳攻之道洛敗入隴投畧陽賊帥王慶雲慶雲以道洛驍果絶倫得之甚喜以為将天光又與岳度隴至慶雲所居永洛城慶雲道洛俱出城拒戰並禽之餘衆悉阬之死者萬七千人三秦河渭瓜涼鄯州咸来歸欵賊帥夏州人宿勤眀達降復叛岳又討禽之天光雖為元帥而岳功居多加車騎将軍進爵為伯尋詔岳都督涇州刺史進爵為公天光入洛使岳行雍州事普㤗初除都督岐州刺史進封清水郡公尋加侍中給後部鼓吹進位開府儀同三司兼尚書左僕射隴右行臺仍停髙平後以隴中猶有土人不順岳助侯莫陳恱所在討平之二年加都督雍州刺史天光将率衆拒齊神武遣問計於岳岳報曰王家跨據三方士馬繁盛髙歡烏合之衆豈能為敵然師克在和但願同心勠力耳若骨肉離阻自相猜貳則圗存不暇安能制人如下官所見莫若且鎮關中以固根夲分遣銳師與衆軍合勢進可以克敵退可以自全天光不從後果敗岳率軍下隴赴雍禽天光弟顯夀以應齊神武及孝武帝即位加關中大行臺永熙二年孝武密令岳圗神武遂刺心血持以寄岳詔岳都督二十州諸軍事齊神武既忌岳兄弟功名岳懼乃與文帝協契自詣北境安置邉防率衆趣平涼西界布營數十里託以牧馬於原州為自安之計先是費也頭万俟受洛干鐵勒斛律沙門解拔彌俄突紇豆陵伊利等部各擁衆自守至是皆欵附秦南秦河渭四州刺史又㑹平涼受岳節度唯靈州刺史曹泥不應召通使於齊神武神武乃遣左丞翟嵩使至關中間岳及侯莫陳恱三年岳召侯莫陳恱㑹於髙平将討曹泥令恱前驅而恱受神武密旨圗岳岳弗之知而又先䡖恱恱乃誘岳入營共論兵事恱詐云腹痛起而徐行令其婿元洪景斬岳於幕中朝野莫不痛惜之贈侍中太傅録尚書事都督關中二十州諸軍事大将軍雍州刺史諡曰武壮翟嵩復命于神武神武下牀鳴其頰曰除吾病者卿也何日忘之後岳部下收岳尸葬於雍州北石安原葬以王禮子緯嗣拜開府儀同三司保定中録岳舊德進爵霍國公尚文帝女寇洛上谷昌平人也累世為将吏父延夀和平中以良家子鎮武州因家焉洛性明辨不拘小節正光末以北邉賊起遂從爾朱榮征討及賀拔岳西征洛與岳鄉里乃募從入關禽万俟醜奴於長阬每力戰有功以功封安鄉縣子及岳為大行臺以洛為右都督侯莫陳恱既害岳欲并其衆時初䘮元帥軍中惶擾洛於諸将之中最為舊齒素為衆信乃收集将士志在復讐既至原州衆咸推洛為盟主統岳之衆洛自以非才乃固辭至平涼與趙貴等迎文帝帝以洛為右都督從討侯莫陳恱平之拜涇州刺史魏天統初詔加開府進爵京兆郡公加侍中封洛母宋為襄城郡君與獨孤信復洛陽從文帝與東魏戰於河橋軍還洛率所部鎮東雍州五年卒於鎮贈驃騎大将軍太尉尚書令諡曰武子和嗣眀帝二年録舊勲以洛配饗文帝廟庭賜和姓若引氏改封松陽郡公趙貴字元寳天水南安人也祖仁魏時以良家子鎮武州因家焉貴少頴悟有節概魏孝昌中天下兵起貴率鄉里避難南遷爾朱榮以為别将討元顥有功賜爵燕樂縣子從賀拔岳平關中累遷大都督及岳為侯莫陳恱所害将吏奔散莫有守者貴謂其黨曰吾聞仁義豈有常哉行之則為君子違之則為小人朱伯厚王脩感意氣微恩尚䏻蹈履名節况吾䓁荷賀拔公國士之遇寧可自同衆人乎因涕泣歔欷於是從之者五十人乃詣恱詐降恱信之因請收葬岳言辭慷慨恱壮而許之貴乃收岳屍還營與寇洛等紏合餘衆奔平涼共圗拒悅貴乃首迎文帝文帝至以貴為大都督領府司馬悅平行秦州事魏孝武西遷拜車騎大将軍後以預立魏文帝勲進爵為公梁企定稱亂河右以貴為隴西行臺討破之從復𢎞農戰沙苑拜侍中驃騎大将軍開府進爵中山郡公河橋之戰貴與怡峯為左軍戰不利先還及髙仲密以北豫州降周文迎之與東魏人戰於邙山貴為左軍失律諸軍因此並却坐免官爵尋拜柱國大将軍賜姓乙弗氏六官建為太保大宗伯改封南陽郡公茹茹寇廣武貴擊之斬首數千級收其輜重振旅而還孝閔踐阼遷太傅大冢宰進封楚國公邑萬户初貴與獨孤信等皆與文帝等夷及孝閔即位晉公䕶攝政貴自以元勲每懐怏怏與信謀殺䕶為開府宇文盛告被誅貴從祖兄善字僧慶少好學美容儀沉毅有逺量爾朱天光討邢杲万俟醜奴以為長史普㤗初為大行臺尚書封山北縣伯天光拒齊神武於韓陵敗見殺善請收葬其屍齊神武義而許之賀拔岳縂關中迎善復以為長史岳為侯莫陳恱所殺善共諸将翊戴文帝魏孝武西遷改封襄城縣伯歴位尚書左右僕射進爵為公善性温恭有器局雖位居端右而愈自謙退其職務克舉則曰某官之力有罪責則曰善之咎也時人稱其有公輔量大統九年從戰芒山屬大軍不利善為敵所獲卒於東魏建徳初周齊通好齊人乃歸其柩其子詢表請贈諡詔贈大将軍大都督四州諸軍事岐州刺史諡曰敬李賢字賢和自云隴西成紀人漢騎都尉陵之後也陵没匈奴子孫因居北狄後随魏南遷復歸汧隴曾祖富魏太武時以子都督討兩山屠各殁於陣贈寧西将軍隴西郡守大統末以賢兄弟著勲追贈司空公祖斌以都督鎮髙平因家焉賢㓜有志節不妄舉動嘗出逰逢一老人鬚眉皓白謂曰我年八十觀士多矣未有如卿卿必為台牧努力勉之九嵗從師受業畧觀大指而已或譏其不精答曰賢豈䏻領徒授業耶惟當粗聞教義備已不足至於忠孝之道寔銘於心問者慙服十四遭父憂撫訓諸弟友愛甚篤魏永安中万俟醜奴據岐涇䓁州反孝荘遣爾朱天光擊破之天光令都督長孫邪利行原州事以賢為主簿累遷髙平令賀拔岳為侯莫陳悅所害文帝西征賢與其弟逺穆等宻應侯莫陳崇以功授都督仍守原州及大軍至秦州恱棄城走文帝命兄子導追之以賢為先鋒至牽屯山及之以功授假節撫軍将軍大都督魏孝武西遷文帝令賢率騎迎衞封上邽縣公俄授左大都督還鎮原州大統二年州人豆盧狼害都督大野樹兒等據州城反賢率敢死士一戰敗之狼斬關遁走賢追斬之大統八年授原州刺史文帝之奉魏太子西廵至原州遂幸賢第讓齒而坐行鄉飲酒禮後文帝復至原州令賢乗輅車備儀服以諸侯㑹遇禮相見然後至賢第歡宴終日凡是親族頒賜有差恭帝元年進爵西河郡公後以弟子植被誅賢坐除名保定二年詔復賢官爵仍授瓜州刺史初武帝及齊王憲之在襁褓不利居宫中文帝令賢家處之六載乃還宫因賜賢妻吴姓宇文氏飬為宗女賜與甚厚及武帝西廵原州幸賢第詔曰朕昔冲幼爰寓此州使持節驃騎大将軍開府儀同三司大都督瓜州諸軍事瓜州刺史賢斯土良家勲德兼著受委居朕導輔積年念其規弼功勞甚茂今廵撫届此不殊代邑舉目依然益増舊想賢雖無屬籍朕處之若親凡厥昆季至于子姪可並預宴乃命中侍上士尉遲愷徃瓜州降璽書勞賢賜衣一襲及被褥并御所服十三環金帶一要中廐馬一匹金装鞍勒雜綵五百段銀錢一萬賜賢弟申國公穆亦如之子姪男女諸孫三十四人各賜衣一襲拜賢甥庫狄樂為儀同賢門生昔經侍奉者二人授大都督四人授帥都督六人别将奴已免賤者五人授軍主未免賤者十二人酬替放之四年王師東討西道空虚慮𦍑渾侵擾乃授賢河州縂管河州舊非縂管至是創置賢乃大營屯田以省運漕多設斥候以備寇戎於是𦍑渾斂迹五年宕昌寇邉乃於洮州置縂管府以鎮遏之遂廢河州縂管改授賢洮州縂管屬𦍑寇侵擾賢頻破之虜遂震懾不敢犯塞俄廢洮州縂管還於河州置縂管府復以賢為之武帝思賢舊恩徴拜大将軍於京師薨帝親臨哀動左右贈使持節柱國大将軍大都督十州諸軍事原州刺史諡曰桓子端嗣端位開府儀同三司從平齊戰没贈上大将軍進封襄陽公諡曰果端弟吉儀同三司吉弟孝軌開府儀同大将軍升遷縣伯後封竒章公孝軌弟詢詢弟崇俱列在隋史賢弟穆傳中賢弟逺字萬嵗幼有器局嘗與羣兒為戰闘戯指麾便有軍陣之法郡守見而異之召使更戯羣兒散走逺持杖叱之復為向陣意氣雄壮殆甚於前郡守曰此小兒必為将帥非常人也及長渉獵書傳魏正光末天下鼎沸敕勒賊胡琮侵逼原州逺昆季率勵鄉人欲圗拒守而衆情頗有異同逺乃按劒喻以節義因曰有異同逺議者請斬之衆懼乃聽命相與盟㰱深壁自守無援城䧟其徒多被害唯逺兄弟並為人所匿得免逺乃使賢晦迹和光潜身間行入朝求援魏朝嘉之授武騎常侍俄轉别将及爾朱天光西伐配逺精兵為鄉導天光欽逺才望除為長城郡守後以應侯莫陳崇功遷髙平郡守文帝見而恱之令居麾下及魏孝武西遷封安定縣伯魏文帝嗣位之始思享遐年以逺字可嘉令扶帝升殿進爵為公仍領左右從征竇奉復𢎞農並有殊勲授都督原州刺史文帝謂逺曰孤之有卿若身之有臂夲州之榮乃私事耳遂令逺兄賢代行州事沙苑之役逺功居最進爵陽平郡公尋除大丞相府司馬參軍國機務時河東初復人情未安文帝以河東為國之要領乃授河東郡守逺敦奨風俗勸課農桑肅遏姦非兼脩守禦之備曾未朞年百姓懐之文帝降書勞問徴為侍中遷太子少師東魏北豫州刺史髙仲密請舉州来附文帝以仲密所據遼逺難為應接諸将皆憚此行逺曰北豫逺在賊境髙歡又屯兵河陽常理而論寔難救援但不入虎穴不得虎子若以竒兵出其不意事或可濟脫有利鈍故是兵家之常如其顧望不行便無克定之日文帝喜曰李萬嵗所言差彊人意乃授行臺尚書前驅東出文帝率大軍繼至逺乃潜師而徃拔仲密以歸仍從文帝戰於芒山時大軍不利逺獨整所部為殿尋授都督義州𢎞農等二十一郡諸軍事逺善撫馭有幹畧戰守之備無不精鋭每厚撫境外之人使為間諜敵中動靜必先知之至有事泄被誅亦不以為悔嘗獵於莎柵見石於叢薄中以為伏兎射之鏃入寸餘視之乃石文帝聞而異之賜書曰昔李将軍廣親有此事公今復爾可謂世載其徳東魏将叚孝先趣宜陽以送糧為名實有窺窬之意逺密知其計遣兵襲破之孝先遁走文帝賜所乗馬及金帶牀帳衣被等并綵二千疋拜大将軍頃之除尚書左僕射固辭文帝不許逺不得已方拜職文帝又以第十一子代王達令逺子之其見親待如此時文帝嫡嗣未建眀帝居長已有成徳孝閔處嫡年尚幼冲乃謂羣公曰孤欲立子以嫡恐大司馬有疑大司馬即獨孤信眀帝敬后父也衆未有答逺曰立子以嫡不以長畧陽公為嗣公何疑焉若以信為嫌請即斬信便起拔劒文帝亦起曰何事至此信又自陳說逺乃止於是羣公並從逺議逺出外拜謝信曰臨大事不得不爾信亦謝逺曰今日頼公决此大議六官建授小司寇孝閔踐阼進位柱國大将軍復鎮𢎞農逺子植文帝時已為相府司録參掌朝政及晉公䕶執權密欲誅䕶頗泄䕶乃出植為梁州刺史尋而廢帝召逺及植還朝逺恐有變沈吟良久乃曰大丈夫寧為忠鬼安䏻作叛臣乎遂就徴至京師䕶以逺功名素重猶欲全宥之謂曰公兒遂有異謀可早為之所乃以植付逺逺素愛植植又有口辨云初無此謀逺信之詰朝将植謁䕶䕶謂植已死乃曰陽平公何意自来左右云植亦在門外䕶大怒曰陽平公不信我矣召入命逺同坐令帝與植相質於逺前植辭窮謂帝曰夲為此謀欲安社稷利至尊耳今日至此何事云云逺聞之自投於牀曰若爾誠合萬死於是䕶乃害植并逼逺自殺建徳元年晉公䕶誅贈夲官加太保諡曰忠隋開皇初追贈上柱國改諡曰懐植及諸弟並加贈諡植弟基字幼和幼有聲譽美容儀善談論渉獵羣書尤工騎射文帝令尚義歸公主以父勲封建安縣公累遷大都督進爵清河郡公及魏廢帝即位之後猜隙彌深時文帝諸子年皆幼冲章武公導中山公䕶復東西作鎮唯託意諸壻以為心膂基與義城公李暉常山公于翼等俱為武衞将軍分掌禁旅魏帝深憚之故密謀遂泄魏恭帝即位進爵敦煌郡公尋進位驃騎大将軍開府儀同三司拜陽平國世子六官建授御正中大夫孝閔帝踐阼出為淅州刺史尋為兄植合坐死以主壻又為季父穆所請得免武成二年除江州刺史既被譴謫常憂憤不得志保定元年卒於位穆尤所鍾愛每哭輙悲慟謂所親曰好兒捨我去門戸豈是欲興宣政元年追贈使持節上開府儀同大将軍曹徐譙三州刺史敦煌郡公諡曰孝子威嗣威字安人又改襲逺爵陽平郡公加上開府大象末進至柱國封公梁禦字善通其先安定人也後因官北邉遂家於武川改姓為紇豆陵氏髙祖俟力提從魏太武征討位揚武将軍定陽侯禦少好學進趨詳雅及長更好弓馬爾朱天光西討知禦有志畧引為左右共平關隴除鎮西将軍東益州刺史第一領人酋長封白水縣侯從賀拔岳鎮長安及岳遇害禦與諸将同謀翊戴文帝從征侯莫陳恱文帝既平秦隴方欲引軍東下雍州刺史賈顯持兩端通使於齊神武文帝知其意以禦為大都督雍州刺史領前軍先行既與顯相見因說之曰魏室陵遲天下鼎沸髙歡志在凶逆梟夷非逺宇文夏州英姿不世算畧無方方欲持危定傾興復京洛公不於此時建立功効乃懐猶豫恐禍不旋踵矣顯即出迎文帝禦遂入鎮雍州大統元年進爵信都縣公尋授尚書右僕射從文帝復𢎞農破沙苑加侍中開府儀同三司進爵廣平郡公出為東雍州刺史為政舉大綱而已民庶稱之四年薨於州臨終唯以國歩未康為恨言不及家贈太尉尚書令雍州刺史諡曰武昭子睿列在隋史李弼字景和隴西成紀人六世祖振慕容垂黄門郎父永魏太中大夫贈凉州刺史弼少有大志膂力過人屬魏亂謂所親曰大丈夫生世㑹須履鋒刃平寇難以取功名安䏻碌碌依階資以求榮位乎爾朱天光辟為别将天光西討破赤水蜀以功封石門縣伯又與賀㧞岳討万俟醜奴万俟道洛王慶雲弼常先鋒䧟陣所向披靡賊咸畏之皆曰莫當李将軍前也及天光赴洛弼𨽻侯莫陳恱為大都督征討屢有克㨗及恱害賀拔岳停軍隴上文帝自平凉進軍討恱弼諫恱令解兵謝之恱惶惑計無所出弼知恱必敗乃謂所親曰宇文夏州才畧冠世徳義可宗侯莫陳公智小謀大豈能自保吾等若不為計恐與同族滅及文帝至恱乃棄秦州南出據險以自固是日弼密通使於文帝許背恱至夜弼乃勒所部云恱欲向秦州命皆装束弼妻恱之姨也時為恱所親委衆咸信之人皆散走弼慰輯之遂擁衆走秦州降文帝恱由此遂敗文帝謂弼曰公與吾同心天下不足平也破恱得金寶奴婢遂以好者賜之大統初進位驃騎大将軍開府儀同三司拜雍州刺史從文帝平竇㤗先鋒䧟敵斬獲居多文帝以所乗騅馬及竇㤗所著牟甲賜之又從平𢎞農與齊神武戰於沙苑弼率軍居右而左軍為敵所乗弼将其麾下九十騎身先士卒横截之敵分為二因大破之以功進爵趙郡公四年又從文帝東討洛陽弼為前驅東魏将莫多婁貸文率衆至榖城弼倍道而前進遣軍士鼓譟曵柴揚塵貸文以為大軍至遂走弼追斬貸文虜其衆傳首大軍翌日又從文帝與齊神武戰於河橋弼深入陷陣身被七創遂為所獲弼陽殞絶於地守者稍懈弼睨其旁有馬因躍上馳免歴位司空太保加柱國大将軍魏廢帝元年賜姓徒何氏文帝西廵留弼居守後事皆諮禀焉六官建拜太傅大司徒及晉公䕶執政朝之大事皆與于謹及弼等參議孝閔帝踐阼除太師進封趙國公邑萬戸前後賞賜鉅萬弼每率軍征討朝受命夕便引路畧不問私事亦未曽宿於家其憂國忘身類皆如此性沉雄有深識故䏻以功名終始頃之薨於位年六十四眀帝即日舉哀比葬三臨其䘮發卒穿冢給大輅龍旂陳軍至於墓所諡曰武尋追封魏國公配食文帝廟庭子曜居長以次子暉尚文帝女義安長公主遂以為嗣暉初賜爵義城郡公嘗卧疾朞年文帝憂之賜錢一千萬供其藥石之費魏恭帝二年加驃騎大将軍儀同三司出為岐州刺史後文帝西廵率公卿子弟别為一軍後襲趙國公改襲魏國公天和六年進位柱國建徳初出為梁州縂管時隣州生獠積年侵暴暉至州綏撫並来歸附璽書勞之暉弟衍字拔立少專武藝慷慨有志畧為義州刺史封真鄉公王謙作亂以行軍縂管從梁睿擊平之進上大将軍隋開皇元年以行軍縂管討平叛蠻進位柱國後拜安州總管以疾還京卒子仲威嗣衍弟綸最知名有文武才用以功臣子少居顯職位至司㑹中大夫開府儀同三司封河陽郡公為聘齊使主卒子長雅嗣尚隋文帝女襄國公主位内史侍郎河州刺史檢校秦州總管綸弟晏開府儀同三司趙郡公從平齊殁并州子憬以晏死王事即襲其官爵曜既不得嗣朝廷以弼功重封曜邢國公位開府子寛幹畧過人自周及隋數經将領位柱國蒲山郡公號為名将弼弟􅋆字雲傑長不盈五尺性果决有膽氣魏永安元年以統别将從爾朱榮破元顥榮誅随爾朱兆入洛及魏孝武西遷􅋆從都督元斌之與齊神武戰敗遂與斌之奔梁後得逃歸進封晉陽縣子尋為文帝帳内都督從復𢎞農破沙苑􅋆時跨馬運矛衝堅陷陣隐身鞍甲之中敵人見之皆曰避此小兒不知􅋆之形貎正自如此文帝初亦聞􅋆驍悍未見其䏻至是方嗟歎之謂曰但問膽决如何何必要須八尺之軀也以功進爵為公武成初從豆盧寧征稽胡進爵汝南郡公出為總管延綏丹三州諸軍事延州刺史卒官無子以弼子椿嗣位開府儀同大将軍右宫伯改封河東郡公寛子密列在隋史于謹字思敬小名巨彌其先代人魏贈太尉新安公栗磾之六世孫也祖安定平原太守髙平郡都将父子提隴西郡守茂平縣伯後以謹著勲贈太保建平郡公謹沈深有識量畧窺經史尤好孫子兵書屏居閭里未有仕進之志或有勸之者謹曰州郡之職昔人所鄙台鼎之位須待時来吾所以優㳺鄉邑聊以卒嵗耳太宰元天穆見之歎曰王佐材也及破六韓拔陵首亂北境引蠕蠕為援遣大行臺僕射元纂討之纂宿聞謹名辟為鎧曹參軍事從軍北伐蠕蠕聞大軍之逼遂逃出塞纂令謹率二千騎追之至郁對原前後十七戰盡降其衆後率䡖騎出塞覘賊屬鐵勒數千騎奄至謹以衆寡不敵乃散其騎使匿叢薄間又遣人升山指麾若分部軍衆賊望見雖疑有伏恃衆不以為慮乃進軍逼謹謹以常乗駿馬一紫一騧賊先所識乃使二人各乗一馬突陣而出賊以為謹也皆爭逐之謹乃率餘軍擊其追騎賊走因得入塞正光四年行臺廣陽王元深治兵北伐引謹為長流參軍謀議皆與謹參之特相禮接使其世子佛陁拜焉時魏末䘮亂賊主斛律野榖禄等羣盗蜂起謹說廣陽王曰醜類蟻聚難以力勝願禀大王之威畧馳徃喻之必得要領王然之謹兼解諸國語乃單騎入賊示以恩信於是西部鐵勒酋長也列河等三萬餘户並款附相率南遷廣陽與謹至析郭嶺迎接之謹曰拔陵兵衆不少聞也列河等款附必来要擊彼若先據險則難與爭鋒今以也列河等餌之當競来抄掠然後設伏而待必指掌破之廣陽然其計拔陵果来要擊破也列河於嶺上部衆皆没謹伏兵發賊大敗悉收也列河之衆魏帝嘉之除積射将軍孝昌元年謹又随廣陽王征鮮于修禮軍次白斗牛邏㑹章武王為修禮所害遂停軍中山侍中元晏宣言於靈太后曰廣陽王以宗室之重受律專征今乃盤桓不進坐圖非望又有于謹者智畧過人為其謀主風塵之際恐非陛下純臣矣靈太后詔於尚書省門外立牓募能獲于謹者許以重賞謹聞之乃謂廣陽王曰今女主臨朝取信讒佞脫不眀白殿下素心便恐禍至謹請身詣闕下歸罪有司披露腹心廣陽王許之謹遂到榜下曰吾知此人衆共詰之謹曰我即是也有司以聞靈太后見之大怒謹備說廣陽忠款兼陳停軍之状靈太后意解遂捨之孝荘即位以從元天穆討葛榮平邢杲拜征虜将軍從爾朱天光破万俟醜奴封石城縣伯後從爾朱天光與齊神武戰於韓陵山天光敗謹遂入關文帝臨夏州以謹為防城大都督兼夏州長史及賀拔岳被害文帝赴平凉謹乃說文帝曰魏祚陵遲權臣擅命羣盗蜂起黔首嗷然眀公仗超世之姿懐濟時之畧四方逺近咸所歸心願早建良圗以副衆望文帝曰何以言之對曰關中秦漢舊都古稱天府将士驍勇厥壤膏腴西有巴蜀之饒北有羊馬之利今若據其要害招集英雄飬卒勸農觀時適變且天子在洛逼迫羣兇請都關右然後挟天子而令諸侯千載一時也文帝大恱㑹有勑追謹為闗内大都督謹因進都關中之䇿魏帝納之尋而齊神武逼洛陽謹從魏帝西遷仍從文帝征潼闗破回洛城授北雍州刺史進爵藍田縣公大統元年拜驃騎大将軍三年大軍東伐為前鋒進拔𢎞農禽東魏陕州刺史李徽伯神武至沙苑謹力戰進爵恒山郡公又從戰河橋拜大丞相府長史兼大行臺尚書再遷太子太保邙山之役大軍不利謹率其麾下偽降立於路左齊神武乗勝逐北不以為虞追騎過盡謹乃自後擊之敵人大駭獨孤信又集兵士於後奮擊齊軍亂以此大軍得全十二年拜尚書左僕射領司農卿及侯景款附請兵為援謹諫以為景情難測文帝不聽尋兼大行臺尚書大丞相長史率兵鎮潼闗十五年加授華州刺史進位柱國大将軍賜秬鬯一卣珪瓉副焉俄拜司空魏恭帝元年除雍州刺史初梁元帝平侯景之後於江陵嗣位密與齊氏通使将謀侵軼其兄子岳陽王詧時為雍州刺史以梁元帝殺其兄譽遂結讐隙據襄陽来附仍請王師乃令謹率衆出討文帝餞於青泥谷長孫儉問謹曰為蕭繹之計将欲何如謹曰耀兵漢沔席卷渡江直據丹陽是其上䇿移郭内居民退保子城峻其雉堞以待援至是其中䇿若難於移動據守羅郭是其下䇿儉曰揣繹定出何䇿謹曰必用下䇿儉曰彼棄上而用下何也對曰蕭氏保據江南綿厯數紀屬中原多故未遑外畧又以我有齊之患必謂力不能分且繹懦而無謀多疑少㫁愚人難與慮始皆戀邑居既惡遷移當保羅郭所以用下䇿謹乃令中山公䕶及大将軍楊忠等率精騎先據江津㫁其走路梁人豎木柵於外城廣輪六十里尋而謹至悉衆圍之旬有六日外城遂陷梁主退保子城翌日率其太子以下面縳出降尋殺之虜其男女十萬餘人收其府庫珍寳得宋渾天儀梁日晷銅表魏相風烏銅蟠螭趺大玉徑四尺圍丈二尺及諸輿輦法物以獻軍無私焉立蕭詧為梁主振旅而旋文帝親至其第宴語極歡賞謹奴婢千口及梁之寳物并金石絲竹樂一部别封新野郡公謹固辭不許又令司樂作恒山公平梁歌十首使工人歌之謹以久當權軸位望隆重功名既立願保優閑乃上先所乗驄馬及所着甲鎧等文帝識其意乃曰今巨猾未平公豈得獨善遂不受六官建拜大司冦及文帝崩孝閔帝尚幼中山公䕶雖受顧命而名位素下羣公各圗執政莫相率服䕶深憂之密訪於謹謹曰夙䝉丞相殊睠情深骨肉今日之事必以死爭之若對衆定䇿公必不得讓眀日羣公㑹議謹曰昔帝室傾危人圗問鼎丞相志在匡救投袂荷戈故得國祚中興羣生遂性今上天降禍奄棄百僚嗣子稚幼而中山公親則猶子兼受顧託今日軍國之事理須歸之辭色抗厲衆皆悚動䕶曰此是䕶家事䕶雖庸昧何敢有辭謹既與文帝等夷䕶每申禮敬至是謹乃起而言曰公若統理軍國謹等便有所依遂再拜羣公迫於謹亦再拜因是衆議始定孝閔踐阼進封燕國公邑萬户遷太傅大宗伯與李弼侯莫陳崇等參議朝政及賀蘭祥討吐谷渾明帝令謹遥統其軍授以方畧保定二年謹以年老表乞骸骨優詔不許有司宜㫁表啓三年四月詔謹為三老固辭又不許有司具禮擇日又賜延年杖武帝幸太學以食之三老入門皇帝迎拜屏間三老答拜有司設三老席於中楹南向太師晉公䕶升階設席施几三老升席南面馮几而坐以師道自居大司寇楚國公寧升階正舄皇帝升立於斧扆之前西面有司進饌皇帝跪設醤豆親自袒割三老食訖皇帝又親跪授爵以酳有司徹訖皇帝北面立訪道三老乃起立於席皇帝曰猥當天下重任自惟不才不知治術之要公其誨之三老答曰木從繩則正君從諫則聖自古眀王聖主皆虚心納諫以知得失天下乃安惟陛下念之又曰為國之夲在乎忠信古人去食去兵信不可失國家興廢莫不由之願陛下存而勿失又曰為國之道必須有法法者國之綱紀不可不正所正在於賞罰若有功必賞有罪必罰則為善者日益為惡者日止若有功不賞有罪不罰則天下善惡不分下民無所措其手足又曰言行者立身之基言出行随誠願陛下慎之三老言畢皇帝再拜受之三老答拜禮成而出及晉公䕶東伐謹時有病䕶以其宿将舊臣猶請與同行詢訪戎畧軍還賜鐘磬一部天和二年又賜安車一乗尋授雍州牧三年薨年七十六武帝親臨詔譙王儉監䕶䘮事賜綵千叚粟麥千斛贈夲官加使持節太師都督雍恒等二十州諸軍事雍州刺史諡曰文及葬王公以下咸送出郊外配享於太祖廟庭謹有智謀善於事上名位雖重猶存謙挹每朝參徃来不過兩三騎而已朝廷凡有軍國之務多與謹决之謹亦竭其智能弼諧帝室故功臣之中特見委信始終若一人無間言每教訓諸子務在靜退加以年齒遐長禮遇隆厚子孫繁衍皆至顯達當代莫比子寔嗣寔字賔實少和厚年未弱冠入文帝幕府從征累功封萬年縣子大統十四年累遷尚書是嵗文帝與魏太子西廵寔時從行文帝刻石隴山之上叙録功臣名位以次鐫勒預以寔為開府儀同三司至十五年方授之尋除渭州刺史特給鼓吹一部進爵為公魏恭帝二年𦍑東念姐率部落反西連吐谷渾大将軍豆盧寧討之踰時不克又令寔往遂破之文帝手書勞問賜奴婢百口馬百匹孝閔帝踐阼授户部中大夫進爵延夀郡公天和二年延州蒲川賊郝三郎反攻丹州遣寔討平之仍除延州刺史五年襲燕國公進位柱國以罪免尋復夲官除凉州總管大象二年加上柱國拜大左輔隋開皇元年薨贈司空諡曰安子顗字元武身長八尺美鬚眉大冢宰宇文䕶見而器之以女妻之以父勲賜爵新野郡公歴左右宫伯郢州刺史大象中以水軍總管從韋孝寛經畧淮南尉遲迥之反時縂管趙文表與顗素不協顗将圗之因卧閤内詐疾文表獨至顗殺之文表與迥通謀其麾下無敢動者時隋文帝以迥未平慮顗復生邉患因宥免之即拜吴州總管以頻敗陳師賜綵數百叚及隋受禪文表弟詣闕稱兄無罪上令按其事太傅竇熾等議顗當死上以其門著勲績特原之貶為開府後襲爵燕國公尋拜澤州刺史免卒于家子世䖍顗弟仲文列在隋史寔弟翼字文若美風儀有識度年十一尚文帝女平原公主拜員外散騎常侍封安平縣公大統十六年進爵郡公加大都督領文帝帳下左右禁中宿衛謹平江陵所賜得軍實分諸子翼一無所取唯簡實口内名望子弟有士風者别待遇之文帝聞之特賜奴婢二百口翼固辭不受尋授車騎大将軍開府儀同三司六官建除左宫伯孝閔踐阼出為渭州刺史翼兄寔先涖此州頗有惠政翼又推誠布信事存寛簡夷夏感恱比之大小馮君時吐谷渾入寇河右凉鄯河三州咸被攻圍使来告急秦州都督遣翼赴援翼不從寮屬咸以為言翼曰攻取之術非夷俗所長此来不過抄掠邉牧耳安能頓兵城下久事攻圍掠而無獲勢将自走勞師以往必無所及翼揣之已了幸勿復言數日問至果如翼所䇿賀蘭祥討吐谷渾翼率州兵先鋒深入以功増邑尋徴拜右宫伯眀帝雅好文史立麟趾學在朝有藝業者不限貴賤皆聽預焉乃至蕭撝王襃等與卑鄙之徒同為學士翼言於帝曰蕭撝梁之宗子王褒梁之公卿今與趨走同儕恐非尚賢貴爵之義帝納之詔翼定其班次於是有等差矣眀帝崩翼與晉公䕶同受遺詔立武帝保定元年徙軍司馬三年改封恒山郡公天和初遷司會中大夫三年皇后阿史那氏至自突厥武帝行親迎之禮命翼總司儀制狄人雖蹲踞無節然咸憚翼之禮法莫敢違犯遭父憂去職居䘮過禮為時軰所稱尋有詔起令視事武帝又以翼有人倫之鑒皇太子及諸王等傳相以下並委翼選置其所擢用皆民譽也時論僉謂得人遷大将軍總中外宿衛兵事晉公䕶以帝委翼腹心内懐猜忌轉為小司徒加拜柱國雖外示崇重實疎斥之及䕶誅帝召翼遣往河東取䕶子中山公訓仍代鎮蒲州翼曰冢宰無君陵上自取誅夷元惡既除餘孽宜殄然皆陛下骨肉猶謂疎不間親陛下不使諸王而使臣異姓非直物有横議愚臣亦未安帝然之乃遣越王盛代翼先是齊陳二境各脩邉防雖通聘好而每嵗交兵然一彼一此不䏻有所克獲武帝既親萬機将圗東討詔邉城並益儲峙加戍卒二國聞之亦增脩守禦翼諫曰疆埸相侵互有勝敗徒損兵儲非䇿之上者不若解邉嚴減兵防繼好息民敬待来者彼必喜於通和懈而無備然後出其不意一舉而山東可圗帝納之建徳二年出為安州總管時大旱溳水絶流舊俗每逢亢旱禱白兆山祈雨帝先禁羣祀山廟已除翼遣主簿祭之即日澍雨嵗遂有年百姓感徳聚會歌舞頌之四年武帝将東伐朝臣未有知者遣納言盧韞前後三乗馹詣翼問䇿翼賛成之及軍出詔翼率兵二萬自宛葉趨襄城旬日下齊一十九城所過秋毫無犯所部都督輙入民村即斬以殉百姓欣恱赴者如歸屬帝有疾班師翼亦旋鎮五年轉陕熊等七州十六防諸軍事宜陽總管翼以宜陽地非襟帶請移鎮於陕詔從之仍除陕州刺史總管如舊其年大軍東討翼自陕入九曲攻㧞造澗等諸城徑到洛陽齊洛州刺史獨孤永業開門出降河南九州三十鎮一時俱下襄城民庶等喜於見翼壺漿道左除河陽總管仍徙豫州勑給兵馬并配開府及儀同等二十人仍勑有武幹者任翼補牒不限多少儀同已下官爵承制先授後聞陳将魯天念久圍光州聞翼到汝南望風退散大象初徴拜大司徒詔翼廵長城立亭障西自鴈門東至碣石創新改舊咸得其要害云仍除幽州總管先是突厥屢為抄掠居民失業翼素有威聲兼眀斥候自是不敢犯塞百姓安之及尉遲迥據相州舉兵以書招翼翼執其使并書送之時隋文帝執政賜翼雜繒一千五百叚及粟麥甚多并珍寳服玩等進位上柱國封任國公増邑通前五千户别食任城縣一千户收其租賦翼又遣子讓通表勸進并請入朝隋文帝許之開皇初翼入朝上降榻握手極歡數日拜太尉或有告翼往在幽州欲同尉遲迥按騐以無實見原三年薨於夲位加贈六州諸軍事蒲州刺史諡曰穆翼性恭儉與物無競常以滿盈自戒故能以功名終子璽嗣璽字伯符少有器幹仕周位職方中大夫封黎陽縣公宣帝嗣位轉右勲曹中大夫尋領右忠義隋文帝受禪加上大将軍進爵郡公歴汴邵二州刺史所歴並有威惠後檢校江陵總管邵州人張願等數十人詣闕上表請留璽上嘉歎良久令還邵州父老相賀歴洛熊二州刺史亦粗有惠政以疾還京師卒於家諡曰靜有子志夲璽弟詮位上儀同三司吏部下大夫恒山公詮弟讓儀同三司翼弟義字慈恭少矜嚴有操尚篤志好學魏大統末以父功賜爵平昌縣伯後改封廣都縣公孝閔帝踐阼累遷安武太守專崇教徳不尚威刑郡人張善安王叔兒爭財相訟義曰太守徳薄之所致於是以家財分與二人喻而遣去善安等各懐愧耻移貫他州於是風教大洽進封建平郡公眀武世歴西兗瓜邵三州刺史數從征伐進位開府宣帝即位政刑日亂義上疏諫帝時鄭譯劉昉以恩倖當權謂義不利於己先惡之於帝帝覽表色動謂侍臣曰于義謗訕朝廷也御正大夫顔之儀進曰古先哲王立謗訕之木置敢諫之鼓猶懼不聞過于義之言不可罪也帝乃解及王謙構逆隋文帝謀将於髙熲熲言義可為元帥文帝将任之劉昉曰梁睿位望素重不可居義下乃以睿為元帥義為行軍總管将左軍破謙将達奚惎於開逺尋拜漳州總管賜奴婢五百口雜綵三千叚超拜上柱國時義兄翼為太尉弟智兄子仲文並上柱國大将軍已上十餘人稱為貴戚後以疾免卒於京師贈豫州刺史諡曰剛子宣道宣敏皆知名列在隋史義弟禮上将軍趙州刺史安平郡公禮弟智初為開府以受宣帝宻旨告齊王憲反遂封齊國公尋拜柱國大司空智弟紹上開府綏州刺史華陽郡公紹弟弼上儀同平恩縣公弼弟蘭上儀同襄陽縣開國公蘭弟曠上儀同贈恒州刺史宇文貴字永貴其先昌黎大棘人也徙居夏州父莫豆干保定中以貴勲追贈柱國大将軍少傅夏州刺史安平郡公貴母初孕貴夢老人抱一子授之曰賜爾是子俾夀且貴及生形類所夢故以永貴字之貴少從師受學嘗輟書歎曰男兒當提劍汗馬以取公侯何䏻為博士也魏正光末破六韓㧞陵圍夏州刺史源子邕嬰城固守以貴為統軍後從爾朱榮禽葛榮於滏口加别将又從元天穆平邢杲轉都督元顥入洛貴率鄉兵從爾朱榮有功封革融縣侯除郢州刺史入為武衛将軍關内大都督從魏孝武西遷進爵化政郡公貴善騎射有将帥才文帝又以宗室故甚親委之大統初與獨孤信入洛陽東魏潁川長史賀若統據潁川来降東魏遣将堯雄趙育是云寳率衆二萬攻潁川貴自洛陽率歩騎二千救之軍次陽翟雄等去潁川四十里東魏行臺任祥又率衆四萬将與雄合諸将咸以彼衆我寡不可爭鋒貴曰若賀若一陷吾軰坐此何為遂入潁川雄等稍進貴率千人背城為陣與雄合戰貴馬中流矢乃短兵歩闘雄大敗䡖走趙育於是降任祥聞雄敗遂不敢進貴乗勝逼祥敗之是云寳亦降師還魏文帝在天㳺園以金巵置侯上令公卿射中者即賜之貴一發而中帝笑曰由基之妙正當爾耳進侍中驃騎大将軍開府儀同三司十六年遷中外府左長史進位大将軍宕昌王梁彌定為宗人獠甘所逐来奔又有𦍑酋傍乞鐵怱因梁企定反後據有渠株川擁𨽻數千家與渭州人鄭五醜同反文帝令貴與豆盧寧討之貴等禽斬鐵怱及五醜寧又别擊獠甘破之乃納彌定并於渠株川置岷州朝廷重功遂於粟坂立碑以紀其績廢帝三年詔貴代尉遲迥鎮蜀時隆州人開府李光易反於鹽亭攻圍隆州而隆州人李拓亦聚衆反開府張道應之貴乃命開府叱奴興攻隆州又令開府成亞擊拓及道降之並送京師除益州刺史未就拜小司徒先是蜀人多刼盗貴乃召任侠傑健者置為㳺軍二十四部令其督捕由是頗息孝閔帝踐阼進位柱國拜御正中大夫武成初與賀蘭祥討吐谷渾軍還進封許國公邑萬户舊爵回封一子遷大司空行小冢宰歴大司徒遷太保貴好音樂耽奕碁留連不倦然好施愛士時人以此稱之保定末使突厥迎皇后天和二年還至張掖薨贈太傅諡曰穆子善嗣善𢎞厚有武藝大象末位上柱國封許國公隋文帝受禪遇之甚厚拜其子頴上儀同及善弟愷誅並廢于家善未㡬卒頴大業中位司農少卿後没李密善弟忻愷列在隋史侯莫陳崇字尚樂代郡武川人也其先魏之别部居庫斛真水祖元以良家子鎮武川因家焉父興殿中将軍羽林監後以崇著勲追贈柱國太保清河郡公崇少驍勇善騎射謹慤少言年十五随賀㧞岳與爾朱榮征葛榮以功除建威将軍後從岳入關討赤水蜀又從岳力戰破万俟醜奴崇與輕騎逐北至涇州長阬及之賊未成列崇單騎入賊中於馬上生擒醜奴衆悉披靡遂大破之封臨涇縣侯岳以醜奴所乗馬及寳劒金帶賞之及岳為侯莫陳恱所害崇與諸将同謀迎文帝至原州刺史史歸猶為恱守城文帝遣崇襲歸直到城下即據城門時李逺兄弟在城内先知崇来中外鼓譟伏兵悉起遂禽歸斬之以崇行原州事仍從平恱别封廣武縣伯累遷車騎大将軍開府儀同三司改封彭城郡公大統三年從禽竇㤗復𢎞農破沙苑四年從戰河橋崇功居多又别討平稽胡累戰皆有功進位柱國大将軍六官建拜大司空孝閔踐阼進封梁國公邑萬户加太保歴大宗伯大司徒保定三年武帝幸原州夜還京師崇竊怪其故崇謂所親人常昇曰吾比聞卜筮者言晉公今年不利車駕今忽夜還不過是晉公死耳於是皆傳之或有發其事者帝集諸公卿於大徳殿責崇崇惶懼謝罪其夜䕶遣使将兵就崇宅逼令自殺葬禮如常儀諡曰躁䕶誅改諡曰荘閔子芮嗣位柱國從武帝東伐率衆守太行道并州平授上柱國仍從平鄴拜大司馬隋文大業初以譴詔流配嶺南芮弟潁列在隋史崇兄順少豪侠有志度初事爾朱榮為統軍普㤗元年封夲縣子後從魏孝武入關順與文帝同里閈素相友善且崇先在關中文帝見之甚歡進爵彭城郡公及梁企定圍逼河州以順為大都督與趙貴討破之即行河州事大統四年魏文帝東討順與太尉王盟僕射周惠達等留鎮長安時趙青雀反盟及惠達奉魏太子出次渭北順於渭橋與賊戰頻破之魏文帝還執順手曰渭橋之戰卿有殊力便解所服金鏤玉梁帶賜之南岐州氐苻安夀遂率部落一千家款附時順弟崇又封彭城郡公遂改封順河間郡公六年加驃騎大将軍開府儀同三司行夏州事改封平原郡公孝閔帝踐阼拜少師進位柱國其年薨崇弟瓊歴位荆州總管上柱國封脩武郡公瓊弟凱以軍功賜爵下蔡縣男崇以平原州功賜爵靈武縣侯詔聼轉授凱孝閔踐阼進位開府儀同三司進爵為公天和中為司㑹中大夫建徳二年為聘齊使主王雄字雄胡布頭太原人也父崘以雄著勲追贈柱國大将軍少傅安康郡公雄儀貎魁梧少有謀畧魏末従賀㧞岳入關除金紫光禄大夫孝武西遷封臨晉縣伯大統中進爵武威郡公累遷大将軍行同州事魏恭帝元年賜姓可頻氏孝閔帝踐阼授少傅進位柱國大将軍武成初進封庸國公邑萬户出為涇州總管保定四年從晉公䕶東征至芒山與齊将斛律明月戰退走左右皆散矢又盡唯餘一奴一矢在焉雄案矟不及明月者丈餘曰惜爾不得殺但生将爾見天子眀月反射雄中額抱馬走至營薨贈使持節太保同華等二十州諸軍事同州刺史諡曰忠子謙字敕萬性恭謹無他才䏻以父功封安樂縣伯保定二年父雄封庸國公以武威郡公回封謙安樂伯回封第三弟震雄死朝議以謙父殞於行陣特加殊寵授柱國大将軍襲爵庸國公建徳五年武帝東征謙力戰進位上柱國六年授益州總管十八州諸軍事及宣帝崩隋文帝輔政以梁睿為益州總管時謙使司録賀若昂奉表詣闕昂還具陳京師事謙以父子受國恩将圖匡復遂舉兵署置官司總管長史乙弗䖍益州刺史達奚惎勸謙憑險觀變隆州刺史髙阿那肱為謙畫三䇿曰公親率精銳直指散關蜀人知有勤王之節必當各思効命此上䇿也出兵梁漢以顧望天下此中䇿也坐守劒南發兵自衛此下䇿也謙參用其中下之䇿梁睿未至大劒謙先遣兵鎮始州隋文帝即以睿為行軍元帥便發利鳯文秦成諸州兵討之謙所署柱國達奚惎髙阿那肱大将軍乙弗䖍楊安任峻侯翕景孱等衆號十萬盡銳攻利州總管楚國公豆盧勣拒戰将四旬惎等諸軍聞睿将至衆遂潰謙所署大将軍苻子英攻巴州又為刺史吕珍所破睿承其弊縦兵深入惎䖍密遣使詣睿請為内應以贖罪謙不知惎䖍之反已也並令守成都謙先無籌畧且所任用多非其才及聞睿兵奄至惶懼計無所出乃自率衆逆戰又以惎䖍之子為左右軍行數十里左右軍皆叛謙奔新都縣令王寳執而斬之傳首京師惎䖍以成都降隋文帝以惎䖍首謀令殺之於蜀市餘衆並散阿那肱尋亦被誅初魏孝荘帝以爾朱榮有翊戴之功拜榮為柱國大将軍位在丞相上榮敗後此官遂廢大統三年魏文帝復以文帝建中興之業始命為之其後功叅佐命望實俱重者亦居此職自大統十六年以前居是任者凡有八人文帝位總百揆都督中外軍事魏廣陵王欣元氏懿戚従容禁闥而已此外六人各督二大将軍分掌禁旅當爪牙禦侮之寄當時榮盛莫與為比故一時稱門閥者咸推八柱國家云今并十二大将軍録之於左使持節太尉柱國大将軍大都督尚書左僕射隴右行臺少師隴西郡開國公李虎使持節太傅柱國大将軍大宗師大司徒廣陵王元欣使持節太保柱國大将軍大都督大宗伯趙郡開國公李弼使持節柱國大将軍大都督大司馬河内郡開國公獨孤信使持節柱國大将軍大都督大司寇南陽郡開國公趙貴使持節柱國大将軍大都督大司空恒山郡開國公于謹使持節柱國大将軍大都督少傅彭城郡開國公侯莫陳崇右與文帝為八柱國後並改封此並文帝時爵使持節大将軍大都督少保廣平王元賛使持節大将軍大都督淮安王元育使持節大将軍大都督齊王元廓使持節大将軍大都督平原郡開國公侯莫陳順使持節大将軍大都督七州諸軍事秦州刺史章武郡開國公宇文遵使持節大将軍大都督雍州刺史髙陽郡開國公達奚武使持節大将軍大都督陽平郡開國公李逺使持節大将軍大都督范陽郡開國公豆盧寧使持節大将軍大都督化政郡開國公宇文貴使持節大将軍大都督荆州刺史博陵郡開國公賀蘭祥使持節大将軍大都督陳留郡開國公楊忠使持節大将軍大都督岐州諸軍事岐州刺史武威郡開國公王雄右十二大将軍每大将軍督二開府凡為二十四員分團統領是為二十四軍每一團儀同二人自相統率不編户貫都十二大将軍十五日上則門闌陛㦸警晝廵夜十五日下則教旗習戰無他賦役每兵惟辦弓刀一具月簡閲之甲槊戈弩並資官給自大統十六年以前十二大将軍外念賢及王思政亦拜大将軍然賢作牧隴右思政出鎮河南並不在領兵之限此後功臣位至柱國及大将軍者衆矣不限此秩無所統御八柱國十二大将軍之後有以位次嗣掌其事者而徳望素在諸公之下並不得預於此例王盟字仵眀徳皇后之兄也其先樂浪人六世祖波前燕太宰祖珍魏黄門侍郎贈并州刺史樂浪公父羆伏波将軍以良家子鎮武川因家焉魏正光中破六韓㧞陵攻䧟諸鎮盟亦為其所擁㧞陵平後流寓中山復以積射将軍從蕭寳夤西征寳夤僣逆盟遂逃匿民間及爾朱天光入關盟從之随賀㧞岳禽万俟醜奴平秦隴常先登力戰及文帝平侯莫陳恱除盟原州刺史孝武至長安封魏昌縣公大統三年徴拜司空轉司徒迎文帝悼后於蠕蠕加侍中遷太尉魏文帝東征以留後大都督行雍州節度關中諸軍趙青雀為亂盟與開府李虎輔太子出頓渭北事平進爵蔡郡公賜姓拓王氏遷太保九年進位太傅加開府儀同三司盟姿度𢎞雅仁而汎愛雖居師傅禮冠羣后而謙恭自處未嘗以勢位驕人魏文帝甚尊重之及疾數幸其第親問所欲十一年薨贈夲官諡曰孝定子勱字醜興性忠果有才幹年十七從文帝入關及平秦隴定關中文帝嘗謂曰為将坐見成效者上也被堅執鋭者次也勱曰意欲兼備之文帝大笑尋拜散騎常侍賜爵梁甫縣公大統初為千牛備身直長領左右出入卧内小心謹厚魏文帝嘗曰王勱可謂不二心臣也沙苑之役勱以都督領禁兵居左翼當其前者死傷甚衆勱亦被傷重遂卒於行間文帝深悼焉贈使持節太尉尚書令十州諸軍事雍州刺史追封咸陽郡公諡曰忠武子弼襲爵尚魏安樂公主位大都督通直散騎常侍勱弟懋字小興盟之西征也以懋留在山東永安中始入關與盟相見遂従征伐大統初賜爵安平縣子後進爵為公累遷右衞将軍于時疆塲交兵未申䘮紀服齊斬者並墨縗從事及盟薨懋上表辭位乞終䘮制魏文帝不許累遷開府儀同三司侍中左衛将軍領軍将軍懋温和小心敬慎宿衛宫禁十有餘年勤恪當官未嘗有過廢帝二年除南岐州刺史賜爵安寧郡公後拜小司寇卒於官子恱嗣位大将軍同州刺史改封濟南郡公盟兄子顯幼而敏悟沈靜少言初為文帝帳内都督累遷驃騎大将軍開府儀同三司光禄卿鳯州刺史賜爵洛陽縣公進位大将軍子誼列在隋史獨孤信雲中人也夲名如願魏氏之初有四十六部其先伏留屯者為部落大人與魏俱起祖俟尼和平中以良家子自雲中鎮武川因家焉父庫者為領人酋長少雄豪有節義北州咸敬服之信美容儀善騎射以北邉䘮亂避地中山正光末與賀㧞度等同斬衞可瓌由是知名後為葛榮所獲信既少年好自脩餙服章有殊於衆軍中號為獨孤郎及爾朱氏破葛榮以信為别将從征韓樓信匹馬挑戰禽賊漁陽王袁肆周後以破元顥黨賜爵受徳縣侯遷武衛将軍賀拔勝出鎮荆州乃表信為大都督及勝弟岳為侯莫陳恱所害勝乃令信入關撫岳餘衆屬文帝已統岳兵信與文帝鄉里少相友善相見甚歡因令信入洛請事至雍州大使元毗又遣信還荆州尋徴入朝魏孝武雅相委任及孝武西遷事起倉卒信單騎及之於瀍澗孝武歎曰武衛遂能辭父母捐妻子逺来從我世亂識忠良豈虚言哉即賜御馬一匹進爵浮陽郡公時荆州雖䧟東魏民心猶戀夲朝乃以信為衞大将軍都督三荆州諸軍事兼尚書右僕射東南道大行臺大都督荆州刺史以招懐之既至東魏刺史辛纂出戰信縱兵擊纂大敗之都督楊忠等前驅斬纂又破諸蠻於是三荆遂定就拜車騎大将軍東魏遣其将髙敖曹侯景等率衆奄至信以衆寡不敵遂率麾下奔梁居三載梁武帝方許還北信父母既在山東梁武問信所往信答以事君無二梁武深義之禮送甚厚大統三年秋至長安自以虧損國威上書謝罪魏文帝付尚書議之七兵尚書陳郡王元等議以為既經恩降請赦罪復職詔轉驃騎大将軍加侍中開府尋拜領軍将軍仍從文帝復𢎞農破沙苑改封河内郡公俘虜中有信親屬始得父凶問乃發䘮行服尋起為大都督與馮翊王元季海入洛陽潁豫襄廣陳留之地並相繼款附四年東魏将侯景等圍洛陽信據金墉城随方拒守旬有餘日及文帝至瀍東景退走信與李逺為右軍戰不利東魏遂有洛陽六年侯景寇荆州文帝令信與李弼出武關景退即以信為大使慰撫二荆尋除隴右十一州大都督秦州刺史先是守宰闇弱政令乖方人有寃訟歴年不能决及信在州事無擁滯示以禮教勸以耕桑數年之中公私富實流人願附者數萬家文帝以其信著遐邇故賜名為信七年岷州刺史赤水蕃王梁企定舉兵反詔信討之企定尋為其部下所殺而企定子弟仍收其餘衆信乃勒兵向萬年頓三交谷口賊併力拒守信因詭道趣稠松嶺賊不虞信兵之至望風奔潰乗勝追北徑至城下賊並出降加授太子太保芒山之戰大軍不利信與于謹帥散卒自後擊之齊神武追騎驚擾諸軍因此得全及凉州刺史宇文仲和據州不受代文帝令信率開府怡峯討之仲和嬰城固守信夜令諸将以衝梯攻其東北信親率壮士襲其西南遲眀克之禽仲和虜其六千户送于長安拜大司馬十三年大軍南討時以蠕蠕為寇令信移鎮河陽十四年進位柱國大将軍録前後功増封聽回授諸子於是第二子善封魏寧縣公第三子穆必要縣侯第四子藏義寧縣侯邑各一千戸第五子順武城縣侯第六子陁建忠縣伯邑各五百戸信在隴右嵗久啓求還朝文帝不許或有自東魏来者又告其母凶問乃發䘮行服信陳哀苦請終禮制又不許於是追贈信父庫者司空公追封信母費連氏恒山郡君十六年遷尚書令六官建拜大司馬孝閔帝踐阼遷大宗伯進封衞國公邑萬户趙貴誅後信以同謀坐免居無㡬晉公䕶又欲殺之以其名望素重不欲顯其罪過逼令自盡於家時年五十五信美風度雅有竒謀大畧文帝初啓覇業唯有闗中之地以隴右形勝故委信鎮之既為百姓所懐聲震隣國東魏将侯景之南奔梁也魏收為檄梁文矯稱信據隴右不從宇文氏乃云無關西之憂欲以委梁人也又信在秦州嘗因獵日暮馳馬入城其帽㣲側詰旦而吏民有戴帽者咸慕信而側帽焉其為隣境及士庶所重如此子羅先在東魏乃以次子善為嗣及齊平羅至而善卒又以羅主嗣信長女周眀帝敬后其季女隋文帝獻后獨孤氏自周隋及唐三代皆為外戚自古以来未之有也隋文帝踐極乃下詔褒贈太師上柱國十州諸軍事冀州刺史封趙國公邑一萬户諡曰景追贈信父庫者使持節太尉上柱國六州諸軍事定州刺史封越國公邑一萬户諡曰恭信母費連氏贈太尉趙恭公夫人羅善等俱列在隋外戚傳竇熾字光成扶風平陵人漢大鴻臚章十一世孫也章子統靈帝時為雁門太守避竇武之難亡奔匈奴遂為部落大人後魏南徙子孫因家於代賜姓紇豆陵氏累世仕魏皆至大官父畧平逺将軍以熾著勲贈少保柱國大将軍建昌公熾性嚴眀有謀畧美鬚髯身長八尺二寸少從范陽祁忻授毛詩左氏春秋畧通大義善騎射膂力過人魏正光末北鎮擾亂熾隨父畧避地定州没於葛榮榮欲宫畧畧不受榮疑其有異志遂留畧於冀州将熾及熾兄善随軍及爾朱榮破葛榮熾乃将家随榮於并州時葛榮别将韓樓等數萬人據薊城不下以熾為都督從驃騎将軍侯深討之熾手斬樓以功拜揚烈将軍魏孝武即位蠕蠕等諸蕃並遣使朝貢帝臨軒宴之有鴟飛鳴於殿前帝素知熾善射因欲矜逺人乃給熾御箭兩隻命射之鴟乃應弦而落諸蕃人咸歎異之帝大恱賜帛五十疋尋随東南道行臺樊子鵠追爾朱仲逺奔梁時梁主又遣元樹入寇據譙城子鵠令熾擊破之封行唐縣子尋進爵上洛縣伯時帝與齊神武構隙以熾有威重堪處爪牙之任拜閤内大都督遷朱衣直閤遂従帝西遷仍與其兄善重至城下與武衞将軍髙金龍戰於千秋門敗之因入宫城取御馬四十匹并鞍勒進之行所帝大恱賜熾及善駿馬各二匹駑馬十匹大統元年以從駕功除東豫州刺史别封真定縣公從文帝禽竇㤗復𢎞農破沙苑皆有功河橋之戰諸将退走熾時獨從兩騎為敵人所追至邙山熾乃下馬背邙山抗之俄而敵衆漸多三面攻圍矢下如雨熾騎士所執弓並為敵人所射破熾乃總收其箭以射之所中人馬皆應弦而倒敵乃相謂曰得此三人未足為功乃稍引退熾因其怠遂突圍得出又從太保李弼討白額稽胡破之髙仲密以北豫州来赴熾從文帝援之至洛陽㑹東魏人據邙山為陣文帝命留輜重於瀍曲率輕騎奮擊中軍與右軍大破之悉虜其歩卒熾獨追至石濟而還大統十三年進使持節驃騎大将軍開府儀同三司加侍中出為涇州刺史涖職數年政號清靜改封武安縣公魏廢帝元年除大都督原州刺史熾抑挫豪右申理幽滯每親廵壟畆勸人耕桑在州十載甚有政績州城之北屬有泉水熾屢經逰踐嘗與僚吏宴於泉側因酌水飲曰吾在此州唯當飲水而已及去職之後吏民感其遺惠每至此泉者莫不懐之魏恭帝元年進爵廣武郡公屬蠕蠕寇廣武熾與柱國趙貴分路討之蠕蠕引退熾度河追討至麴伏川追及大破之斬其酋帥郁久閭是發獲生口數千孝閔踐阼拜柱國大将軍明帝時以熾前朝舊臣勲望兼重欲獨為造第熾辭以天下未平干戈未偃不宜趣發徒役眀帝不許尋而帝崩事方得寝保定元年進封鄧國公邑一萬户别食資陽縣一千户收其租賦四年授大宗伯天和五年出為宜州刺史先是文帝田於渭北令熾與晉公䕶分射走兎熾一日獲十七頭䕶獲十一頭恥其不及因以為嫌至是熾又以武帝年長勸䕶歸政䕶惡之故左遷焉及䕶誅徴拜太傅熾既朝之元老名望素隆至於軍國大謀常與參議嘗有疾武帝幸其第而問之因賜金石之樂其見禮如此帝於大徳殿将謀伐齊熾時年已衰老乃扼腕曰臣雖朽邁請躬執干櫓首啓戎行得一覩誅翦鯨鯢廓清宇宙省方觀俗登嶽告成然後歸魂泉壤無復餘恨帝壮其志節遂以熾第二子武當公恭為左二軍總管齊平之後帝乃召熾歴觀相州宫殿熾拜賀曰陛下真不負先帝矣帝大恱進位上柱國宣政元年兼雍州牧及宣帝營建東京以熾為洛京營作大監宫苑制度皆取决焉大象初改食樂陵縣邑户如舊隋文帝入輔政停洛陽宫作熾請入朝屬尉遲迥舉兵熾乃移入金墉與洛州刺史平凉公元享同心固守仍權行洛陽鎮事相州平熾方入朝隋文帝初為相國百官勸進熾自以累代受恩遂不肯署牋時人髙其節及隋文踐極拜太傅加殊禮賛拜不名開皇四年八月薨時年七十八贈八州諸軍事冀州刺史諡曰恭熾事親以孝聞奉諸兄以悌聞及其位望隆重而子孫皆處列位遂為當時盛族子茂嗣茂有弟十三人恭威最知名恭位至大将軍從武帝平齊封賛國公除西兖州總管以罪賜死熾兄善以中軍大都督南城公從魏孝武西遷仕至太僕衞尉卿汾北華瀛三州刺史驃騎大将軍開府儀同三司永富縣公諡曰忠子榮定嗣榮定列在隋史熾兄子毅字天武父岳早卒及毅著勲追贈大将軍冀州刺史毅深沈有器度事親以孝聞魏孝武初起家員外散騎侍郎時齊神武擅朝毅慨然有徇主之志從孝武西遷封奉髙縣子從禽竇㤗復𢎞農戰沙苑皆有功進爵安武縣公恭帝元帝進授驃騎大将軍開府儀同三司大都督改封永安縣公出為幽州刺史孝閔帝踐阼進爵神武郡公保定三年拜大将軍時與齊人爭衡戎車嵗動並交結突厥以為外援突厥已許納女於周齊人亦甘言重幣遣使求昬狄人便欲有悔朝廷乃令楊荐等累使結之徃返十餘方復前好至是雖期徃逆猶懼改圖以毅地兼勲戚素有威重乃令為使及毅至齊使亦在焉突厥君臣猶有異志毅抗言正色以大義責之累旬乃定卒以皇后歸朝廷嘉之别封成都縣公進位柱國歴同州刺史蒲金二州總管加上柱國入為大司馬隋開皇初拜定州總管累居藩鎮咸得人和二年薨於州贈襄郢等六州刺史諡曰肅毅性温和每以謹慎自守又尚文帝第五女襄陽公主特為朝廷所委信雖任兼外内未嘗有矜惰之容時人以此稱焉子賢嗣賢字託賢志業通敏少知名宣政元年授使持節儀同大将軍開皇中襲爵神武郡公除遷州刺史毅第二女即唐太穆皇后武徳元年詔贈毅司空使持節總管荆郢等十州諸軍事荆州刺史杞國公又追贈賢子紹宣秦州刺史并襲賢爵紹宣無子仍以紹宣兄子徳藏嗣賀蘭祥字盛樂其先與魏俱起有乞伏者為賀蘭莫何弗因以為氏後有以良家子鎮武川者遂家焉父初真少知名為鄉里所重尚文帝姊建安長公主保定二年追贈太傅柱國恒山郡公祥年十一而孤居䘮合禮長於舅氏時為文帝所愛雖在戎旅常博延儒生教以書傳文帝初入關祥與晉公䕶俱在晉陽後乃遣使迎致之解褐奉朝請祥少有膽氣志在立功尋擢都督常居帳下從平侯莫陳恱又迎魏孝武以前後功封撫夷縣伯仍從擊潼關獲東魏将薛長儒又攻回洛㧞之還拜左右直長進爵為公大統九年從文帝與東魏戰於芒山進位驃騎大将軍開府儀同三司加侍中十四年除都督荆州刺史進爵博陵郡公先是祥嘗行荆州事雖未朞月頗有惠政至是重徃百姓安之由是漢南流人襁負至者日有千數逺近蠻夷莫不欵附随機撫納咸得其歡心時盛夏亢陽祥親廵境内觀政得失見有發掘古冢暴露骸骨乃謂守令曰此豈仁者為政邪命所在收葬之即日澍雨是嵗大有年境内多古墓其俗好行發掘至是遂息祥雖文帝密親性甚清素州境南接襄陽西通岷蜀物産所出多諸珍異既與梁通好行李往来公私贈遺一無所受梁雍州刺史岳陽王蕭詧欽其風素乃以竹屏風絺綌之屬及經史贈之祥難違其意取而付諸所司文帝後聞之並以賜祥十六年拜大将軍文帝以涇渭溉灌之處渠堰廢毁乃令祥脩造富平堰開渠引水東注於洛功用既畢人獲其利魏廢帝二年行華州事後改華州為同州仍以祥為刺史尋拜尚書左僕射六官建授小司馬孝閔帝踐阼進位柱國大司馬時晉公䕶執政祥與䕶中表少相親愛軍國之事䕶皆與祥參謀及誅趙貴廢閔帝祥有力焉武成初吐谷渾侵掠州郡詔祥與宇文貴總兵討之祥乃遣其軍司檄吐谷渾與吐谷渾廣定王鍾留王等戰破之因拔其洮陽洪和二城以其地為洮州撫安西土振旅而還進封凉國公薨贈太師同岐等十二州諸軍事同州刺史諡曰景有七子敬讓璨師寛知名敬少歴顯職封化隆縣侯後襲凉國公位柱國華州刺史讓大将軍鄭州刺史河東郡公璨開府儀同三司宣陽郡公建徳五年從平并州遷幽州刺史博陵郡公寛開府儀同大将軍戰殁贈上儀同大将軍追封清都公師尚眀帝女位上儀同大将軍武始公入隋歴汴鄭二州刺史並著政績祥弟隆大将軍襄樂縣公隋文帝與祥有舊開皇初追贈上柱國叱列伏龜字摩頭陀代郡西部人也其先為部落大人魏初入附遂世為第一領人酋長至龜五世龜容貎瓌偉腰帶十圍進止詳雅兼有武藝嗣父業復為領人酋長魏孝昌三年以别将從長孫承業西征累遷金紫光禄大夫從還洛授都督遂為齊神武所寵任加大都督沙苑之敗随例来降文帝以其豪門解縛禮之仍以邵惠公女妻之大統四年封長樂縣公自此常從征討亟有戰功歴侍中驃騎大将軍開府儀同三司恒州刺史卒子椿嗣椿字千年眀帝時位驃騎大将軍開府儀同三司改封永世縣公天和初除左宫伯進位大将軍閻慶字仁度河隂人也曽祖善仕魏歴龍驤将軍雲州鎮将因家雲州之盛樂郡祖提使持節車騎大将軍敦煌鎮都大将父進有謀畧勇冠當世正光中拜龍驤将軍屬衛可瓌作亂攻圍盛樂進率衆拒守以功拜盛樂郡守慶幼聰敏重然諾風儀端肅望之儼然随父固守盛樂頗有力焉拜别将後以軍功拜歩兵校尉中堅将軍既而齊神武舉兵入洛魏孝武西遷慶謂所親曰髙歡跋扈将有篡逆之謀豈可茍安目前受其控制也遂以大統三年自宜陽歸闕即拜奉車都尉稍遷後将軍封安次縣子以功進爵為伯慶善於綏撫士卒未休未嘗先舎故能盡其死力屢展勲勞累遷散騎常侍驃騎大将軍開府儀同三司雲州大中正加侍中賜姓大野氏孝閔帝踐阼出為河州刺史進爵石保縣公州居河外地接戎夷慶留心撫納頗稱簡惠就拜大将軍進爵太安郡公入為小司空歴雲寧二州刺史慶性寛和不苛察百姓恱之天和五年進位柱國晉公䕶母慶之姑也䕶雖擅朝而慶未嘗阿附及䕶誅武帝以此重之乃詔慶第十二子毗尚帝女清都公主慶雖望位隆重婚連帝室常以謙慎自守時人以此稱之建德二年抗表致事優詔許焉慶既衰老恒嬰沉痼宣帝以其先朝耆舊特異常倫乃詔靜帝至第問疾賜布千叚醫藥所須令有司供給大象二年拜上柱國隋文帝踐極又令皇太子就第問疾仍供醫藥之費開皇二年薨年七十七贈司空七州諸軍事荆州刺史諡曰成長子常先慶卒次子毗嗣毗隋史有傳史寧字永和建康表氏人也曾祖豫仕沮渠氏為臨松令魏平凉州祖灌随例遷於撫寧鎮因家焉父遵初為征虜府鎧曹參軍杜洛周構逆六鎮自相屠陷遵遂率鄉里奔恒州其後恒州為賊所敗遵後歸洛陽拜樓煩郡守及寧著勲贈散騎常侍征西大将軍凉州刺史諡曰貞寧少以軍功累加持節征東将軍金紫光禄大夫賀拔勝為荆州刺史寧以夲官為勝軍司随勝之部㑹荆州蠻騷動三鵶路絶寧先驅平之因撫慰蠻左翕然降附尋除南郢州刺史及勝為大行臺表寧為大都督攻梁下溠戍破之封武平縣伯及攻拔齊梁興鎮等九城未及論功屬孝武西遷東魏遣侯景寇荆州寧随勝奔梁梁武帝引寧至香蹬前謂之曰觀卿風表終是富貴我當使卿衣錦還鄉寧答曰臣世荷魏恩位為列将天長䘮亂夲朝傾覆不能北面事逆賊幸得息肩有道儻如眀詔欣幸實多因涕泣横流梁武為之動容在梁二年勝乃與寧宻圗歸計寧曰朱异既為梁主所信任請往見之勝然其言寧乃見异申以投分之言微託思歸之意辭氣雅至异亦嗟挹為奏梁主果許勝等歸大統二年自梁歸進爵為侯久之遷車騎将軍行涇州事時賊帥莫折後熾寇掠居人寧率州兵與行原州事李賢討破之轉東義州刺史東魏亦以胡梨茍為東義州刺史寧僅得入州梨茍亦至寧逆擊破之斬其洛安郡守馮善道州既隣接彊敵百姓流移寧留心撫慰咸来復業轉凉州刺史寧未至而前刺史宇文仲和據州作亂詔獨孤信與寧討之寧先至凉州為陳禍福城中吏民皆相率降附仲和仍據城不下尋亦克之後遷驃騎大将軍開府儀同三司加侍中進爵為公十六年宕昌叛𦍑獠甘作亂逐其王彌定而自立并連結傍乞鐵怱及鄭五醜等詔寧率軍與宇文貴豆盧寧討之寧别擊獠甘而山路險阻纔通單騎獠甘已分其黨立柵守險寧進兵攻之遂破其柵獠甘将百騎走投生羌鞏亷玉彌定遂得復位寧以未獲獠甘遂進軍大破之生獲獠甘徇而斬之并執亷玉送闕所得軍實悉分賞将士寧無私焉師還召寧率所部鎮河陽寧先在凉州戎夷服其威惠遷鎮之後邉人並思慕之魏廢帝元年復除凉甘瓜三州諸軍事凉州刺史初蠕蠕與魏和親後更離叛尋為突厥所破殺其主阿那瓌部落逃逸者仍奉瓌之子孫鈔掠河右寧率兵要擊獲瓌子孫二人并其種落酋長自是每戰破之前後降數萬人進爵安政郡公二年吐谷渾通使於齊寧擊獲之就拜大将軍寧後遣使詣文帝請事文帝即以所服冠履衣被及弓箭甲矟等賜寧謂其使人曰為我謝涼州孤觧衣以衣公推心以委公公其善始令終無損功名也時突厥木汗可汗假道涼州将襲吐谷渾文帝命寧率騎随之軍至番禾吐谷渾已覺奔於南山木汗将分兵追之令俱㑹於青海寧謂木汗曰樹敦賀真二城是吐谷渾巢穴若拔其夲根餘種自然離散木汗從之乃分為二軍木汗從北道向賀真寧趣樹敦吐谷渾娑周王率衆逆戰寧擊斬之踰山履險遂至樹敦樹敦吐谷渾舊都多諸珍藏而吐谷渾主已先奔賀真留其征南王及數千人固守樹敦寧進兵攻之偽退吐谷渾人果開門逐之因回兵奮擊門未及闔寧兵遂得入生獲其征南王俘虜男女財寳悉歸突厥吐谷渾賀羅拔王依險為柵欲塞寧路寧攻破之而木汗亦克賀真虜吐谷渾主妻子大獲珍物寧還軍青海與木汗㑹木汗握寧手嘆其勇决遺所乗馬令寧於帳前乗之木汗親自歩送突厥以寧所圗必破皆畏憚之咸曰此中國神智人也及将班師木汗又遺寧奴婢百口馬五百匹羊一萬口寧乃還州尋被徴入朝屬文帝崩寧悲慟不已乃請赴陵所盡哀并告行師克㨗孝閔踐阼拜小司徒出為荆州刺史荆襄浙郢等五十二州及江陵鎮防諸軍事寧有謀畧識兵權臨敵指揮皆如其䇿甚得當時之譽及在荆州頗自奢縱貪濁不脩法度嘗出有人訴州佐屈法寧還付被訟者治之自是有事者不敢復言聲名大損於西州保定三年卒於州諡曰烈子雄嗣雄字世武少勇敢膂力過人便弓馬有算畧年十四從寧於牽屯山奉迎文帝仍從校獵弓無虚發文帝歎異之尋尚文帝女永富公主除使持節驃騎大将軍開府儀同三司累遷駕部中大夫司馭中大夫從柱國枹罕公辛威鎮金城遂卒於軍時年二十四雄弟祥列在隋史權景宣字暉逺天水顯親人也父曇騰魏隴西郡守贈秦州刺史景宣少聰悟有氣侠宗黨皆歎異之年十七魏行臺蕭寳夤見而竒之表為輕騎将軍及寳夤敗景宣歸鄉里文帝平隴右擢為行臺郎中孝武西遷授鎮逺将軍歩兵校尉加平西将軍秦州大中正大統初轉祠部郎中景宣曉兵權有智畧從文帝拔𢎞農破沙苑皆先登陷陣轉外兵郎中從開府于謹援洛陽景宣督課糧儲軍以周濟時初復洛陽将脩繕宫室景宣率徒三千先出採運㑹東魏兵至司州牧元季海等以衆少拔還屬城悉叛道路壅塞景宣将二十騎且戰且走從騎畧盡景宣輕馬突圍手斬數級馳而獲免因投人家自匿景宣以久藏非計乃偽作文帝書招募得五百餘人保據宜陽聲言大軍續至東魏将叚琛等率衆至九曲憚景宣不敢進景宣恐琛審其虚實乃将腹心自随詐云迎軍因得西遁與儀同李延孫相㑹攻拔孔城洛陽以南尋亦来附文帝即留景宣守張白塢節度東南義軍東魏将王元軌入洛景宣與延孫等擊走之以功授行臺左丞進屯宜陽攻襄城拔之獲郡守王洪顯文帝嘉之徴入朝録前後功封顯親縣男除南陽郡守郡隣敵境舊制發人守防三十五處多廢農桑而姦宄猶作景宣至並除之唯脩起城樓多備器械寇盗斂迹人得𨽻業焉百姓稱之立碑頌徳文帝特賞粟帛以旌其䏻遷廣州刺史侯景舉河南来附景宣從僕射王思政經畧應接既而侯景南叛恐東魏復有其地以景宣一為大都督豫州刺史鎮樂口東魏亦遣張伯徳為刺史伯徳令其将劉貴平率其戍卒及山蠻屢来攻逼景宣兵不滿千人随機奮擊貴平乃退走進授使持節車騎大将軍儀同三司潁川陷後文帝以樂口等諸城道路阻絶悉令拔還襄州刺史杞秀以狼狽獲罪景宣號令嚴眀戎旅整肅所部全濟獨被優賞仍留鎮荆州委以鵶南之事初梁岳陽王蕭詧将以襄陽歸朝仍勒兵攻梁元帝於江陵詧叛将杜岸乗虚襲之景宣乃率騎三千助詧因是乃送其妻王氏及子嶚入質景宣又與開府楊忠取梁将桞仲禮拔安陸随郡久之随州城人吴士英殺刺史黄道生因聚為寇景宣以英小賊可以計取若聲其罪恐同惡者衆與士英書偽稱道生凶暴歸功士英士英等信之遂相率而至景宣執而戮之獲其黨與進攻應城拔之獲夏侯珍於是應禮安随並平朝議以景宣威行南服乃授并安肆郢新應六州諸軍事并州刺史尋進驃騎大将軍開府儀同三司加侍中兼督江北司二州諸軍事進爵為伯唐州蠻田魯嘉自號豫州伯引致齊兵大為民害景宣又破之獲魯嘉以其地為郡轉安州刺史梁定州刺史李洪逺初欵後叛景宣惡其懐貳宻襲破之虜其家口及部衆洪逺脱身走免自是酋帥懾服無敢叛者燕公于謹征江陵景宣别破梁司空陸法和司馬羊亮於溳水又遣别将攻拔魯山多造舟艦益張旗幟臨江欲度以懼梁人梁将王琳在湘州景宣遺書喻以禍福琳遂遣長史席壑因景宣請舉州欵附孝閔帝踐阼徴為司憲中大夫尋除基鄀硤平四州五防諸軍事江陵防主加大将軍保定四年晉公䕶東討景宣别畧河南齊豫州刺史王士良永州刺史蕭世怡並以城降景宣以開府謝徹守永州開府郭彦守豫州以士良世怡及降卒一千歸諸京師尋而洛陽不守乃棄二州拔其将士而還至昌州而羅陽蠻反景宣回軍破之還次覇上晉公䕶親迎勞之天和初授荆州刺史總管十七州諸軍事進爵千金郡公陳湘州刺史華皎舉州欵附表請援兵𠡠景宣統水軍與皎俱下景宣到夏口陳人已至而景宣以任遇隆重遂驕慠縱恣多自矜伐兼納賄賂指麾節度朝出夕改将士憤怒莫肯用命及水軍始交一時奔北船艦器仗畧無孑遺時衞公直總督諸軍以景宣負敗欲䋲以軍法朝廷不忍加罪遣使就軍赦之尋遇疾卒贈河渭鄯三州刺史諡曰恭子如璋嗣位至開府膠州刺史如璋弟仕玠儀同大将軍廣川縣侯王羆字熊羆京兆霸城人漢河南尹遵之後也世為州郡著姓羆剛直木彊處物平當州閭重之魏天和中除殿中将軍稍遷雍州别駕清亷疾惡勵精公事刺史崔亮有知人之鑒見羆雅相欽挹亮後轉定州啓羆為長史執政者恐羆不稱不許及梁人寇硖石亮為都督南討復啓羆為長史帶銳軍朝廷以亮頻舉羆故當可用及克硖石羆功居多先是南岐東益氐𦍑反叛王師戰不利乃拜羆冠軍将軍領羽林五千鎮梁州討平諸賊授西河内史辭不拜時人謂曰西河大邦俸禄優厚何為致辭羆曰京洛材木盡出西河朝貴營第宅者皆有求假如其私辦則力所不堪若科發民間又犯違憲法以此致辭爾梁将曹景宗圍荆州𠡠羆與别将裴衍率兵赴救遂與梁人戰大破之時諸方鼎沸所在凋殘荆州新經寇難尤藉慰撫以羆為荆州刺史進號撫軍将軍封定陽子梁復遣曹義宗帥衆數萬圍荆州堰水灌城不没者數版時既内外多虞未遑救援乃遺羆鐵劵云城全當授夲州刺史城中糧盡羆乃煮粥與将士均分而食之每出戰常不擐甲胄大呼告天曰荆州城孝文皇帝所置天若不佑國家使賊箭中王羆額不爾王羆須破賊屢經戰陣亦不被傷彌歴三年義宗方退進封霸城縣公元顥入洛以羆為左軍大都督顥敗荘帝以羆授顥官故不得夲州更除岐州刺史時南秦數叛以羆行南秦州事羆至州召其魁帥為腹心擊捕反者畧盡乃謂魁帥等曰汝黨皆死盡何用活為乃以次斬之自是南秦無復反者又詔羆行秦州事尋遷車騎大将軍涇州刺史未及之部屬文帝徴兵為勤王之舉羆請前驅効命遂為大都督鎮華州魏孝武西遷拜車騎大将軍儀同三司别封萬年縣伯乃除華州刺史齊神武率軍進潼關人懐危懼羆勸勵将士衆心乃安神武退拜驃騎大将軍加侍中開府嘗脩州城未畢梯在城外齊神武遣韓軌司馬子如從河東宵濟襲羆羆不覺比曉軌衆已乗梯入城羆尚卧未起聞閤外洶洶有聲便袒身露髻徒跣持一白挺大呼而出謂曰老羆當道卧貉子那得過敵見之驚退逐至東門左右稍集合戰破之軌衆遂投城遁走文帝聞而壮之時関中大饑徴稅民間榖食以供軍實或有隱匿者令逓相告多被篣捶以是人有逃散唯羆信著於人莫有隱者得粟不少諸州而無怨讟沙苑之役齊神武士馬甚盛文帝以華州要衝遣使勞羆令加守備及齊神武至城下謂羆曰何不早降羆乃大呼曰此城是王羆冢生死在此欲死者来神武遂不敢攻後移鎮河東以前後功進爵扶風郡公河橋之戰王師不利趙青雀據長安城所在莫有固志羆乃大開州門召城中戰士謂曰如聞天子敗績不知吉凶諸人相驚咸有異望王羆受委於此以死報恩諸人若有異圖可来見殺必恐城陷没者亦任出城如有忠誠能與王羆同心可共固守軍人見其誠信皆無異心及軍還徴拜雍州刺史時蠕蠕渡河南寇候騎已至豳州朝廷慮其深入乃徴發士馬屯守京城塹諸街巷以備侵軼右僕射周惠達召羆議之羆不應命卧而不起謂其使曰若蠕蠕至渭北者王羆率鄉里自破之不煩國家兵馬何為天子城中遂作如此驚動由周家小兒恇怯致此羆䡖侮權勢守正不回皆此類也未㡬還鎮河東羆性儉率不事邉幅嘗有臺使至羆為設食使乃裂去薄餅縁羆曰耕種收穫其功已深舂爨造成用力不少爾乃選擇當是未饑命左右撤去之使者愕然大慙又有客與羆食瓜客削瓜皮侵肉稍厚羆意嫌之及瓜皮落地乃引手就地取而食之客甚有愧色性又嚴急有吏挟私陳事者羆不暇命捶撲乃手自取鞾履持以擊之每至享會親自枰量酒肉分給将士時人尚其均平嗤其鄙碎羆舉動率情不為巧訐凡所經處雖無當時功迹咸去乃見思大統七年卒于官贈太尉都督相冀等十州刺史諡曰忠羆安於貧素不營産業後雖貴顯鄉里舊宅不改衡門身死之日家甚貧罄當時服其清潔子慶逺弱冠以功臣子拜直閤将軍先羆卒孫述字長述少孤為祖羆所飬聰敏有識度文帝見而竒曰王公有此孫足為不朽觧褐員外散騎侍郎封長安縣伯後為鎮逺将軍拜太子舎人祖憂去職述初䘮父為羆所鞠飬及居䘮深合法度于時東西交爭金革方始羣官遭䘮者卒哭之後皆令起視事述請終禮制辭理懇切文帝令中使就視知其哀毁乃特許之免䘮襲爵扶風郡公除中書舎人脩起居注改封龍門郡公周受禪拜賔部下大夫累遷廣州刺史甚有威惠朝議嘉之就拜大将軍後歴襄仁二州總管並有能名隋文帝為丞相授信州總管位上将軍王謙作亂遣使致書於述述因執其使上書又陳取謙䇿文帝大恱前後賜金五百兩授行軍總管討謙以功進位柱國開皇初獻平陳計脩營戰艦為上流之師上善其能頻加賞勞後數嵗以行軍總管擊南寧未至而卒上甚傷惜之贈上柱國冀州刺史諡曰荘子謨嗣謨弟軌大業末郡守少子文楷起部郎王思政字思政太原祁人漢司徒允之後也自魏太尉淩誅後冠冕遂絶父祐州主簿思政容貎魁偉有籌䇿魏正光中觧褐員外散騎侍郎屬万俟醜奴宿勤眀達等擾亂関右北海王顥率兵討之聞思政壮健啓思政随軍事所有謀議並與思政參詳時魏孝武在藩素聞其名顥軍還乃引為賔客遇之甚厚及登大位委以心膂遷安東将軍預定䇿功封祁縣侯為武衛将軍俄而齊神武潜有異圗帝以思政可任大事拜使持節中軍大将軍大都督總宿衞兵思政乃言於帝曰髙歡之心行路所知洛陽四面受敵非用武之地闗中有崤函之固一人可禦萬夫且士馬精彊糧儲委積進可以討除逆命退可以保據關河宇文夏州紏合同盟願立功効若聞車駕西幸必當奔走奉迎藉天府之資因已成之業一二年間習戰陣勸耕桑然後脩復舊京何慮不克帝深然之及齊神武兵至河北帝乃西遷進爵太原郡公拜光禄卿并州刺史加散騎常侍大都督大統之後思政雖被任委自以非相府之舊每不自安文帝曽在同州與羣公宴集出錦罽及雜綾絹數千叚命諸将摴蒱取之物既盡文帝又觧所服金帶令諸人徧擲曰先得盧者即與之羣公擲将徧莫有得者次至思政乃斂容危坐而自誓曰王思政覊旅歸朝䝉宰相國士之遇方願盡心効命上報知已若此誠有實令宰相賜知者願擲即為盧若内懐不盡神靈亦當明之使不作也便當殺身以謝所奉辭氣慷慨占對雄辨一坐盡驚即拔所佩刀横於膝上攬摴蒱拊髀擲之比文帝止之已為盧矣徐乃拜而受帶自此之後文帝委寄更深轉驃騎将軍募精兵從獨孤信取洛陽仍共信鎮之河橋之戰思政下馬以長矟左右横擊一擊輙踣數人時陷陣既深從者死盡思政被重創悶絶㑹日暮敵亦收軍思政久經軍旅每戰唯著破弊之甲敵人疑非将帥故得免有帳下督雷五安於戰處哭求思政㑹其已蘓遂相得乃割衣裹創扶思政上馬夜久方得還軍仍鎮𢎞農除侍中東道行臺思政以玉壁地在險要請築城即自營度移鎮之遷汾晉并三州諸軍事并州刺史行臺如故仍鎮玉壁八年東魏復来寇思政守禦有備敵人晝夜攻圍卒不能克乃收軍還以全城功授驃騎大将軍開府儀同三司髙仲宻以北豫州来附文帝親接援之乃驛召思政将鎮成臯未至而班師復命思政鎮𢎞農思政入𢎞農令開城門觧衣而卧慰勉将士示不足畏數日後東魏将劉豐生率數千騎至城下憚之不敢進乃引軍還於是脩城郭起樓櫓營田農積芻秣凡可以守禦者皆備焉𢎞農之有備自思政始也十二年加特進兼尚書左僕射行臺都督荆州刺史境内卑濕城塹多壊思政乃命都督藺小歡督工匠繕修之掘得黄金三十斤夜中宻送之至旦思政召佐史以金示之曰人臣不宜有私悉封金送上文帝嘉之賜錢二十萬思政之去玉壁也文帝命舉代人思政乃進所部都督韋孝寛其後東魏来寇孝寛卒能全城時論稱其知人十三年侯景叛東魏擁兵梁鄭為東魏所敗景乃請援乞師當時未即應接思政以為若不因機進取後悔何及即率荆州歩騎萬餘従魯關向陽翟文帝聞思政已發乃遣太尉李弼赴潁川東魏将髙嶽等聞大兵至收軍而遁思政入守潁川景引兵向豫州外稱畧地乃宻遣送欵於梁先是文帝遣帥都督賀蘭願徳助景扞禦景既有異圗因厚撫願徳等冀為己用思政知景詭詐乃宻遣追願徳思政分布諸軍據景七州十二鎮文帝乃以所授景使持節太傅大将軍兼尚書令河南大行臺河南諸軍事回授思政思政並讓不受頻使敦喻唯受河南諸軍事十四年拜大将軍九月東魏太尉髙嶽行臺慕容紹宗儀同劉豐生等率歩騎十萬来攻潁川思政令城内卧鼓偃旗若無人者嶽恃其衆謂一戰可圗乃四面鼓譟而上思政選城中驍勇開門出戰嶽衆不能當引軍亂退嶽知不可卒攻乃多脩營壘又随地勢髙處築土山以臨城中飛梯火車晝夜攻之思政亦作火􅗋因迅風便投之土山又射以火箭燒其攻具賊乃退仍募勇士縋而出戰嶽衆披靡據其兩土山置樓堞以助防守齊文襄更益兵堰洧水以灌城時雖有恠獸每衝壊其堰然城被灌已久多亦崩頽嶽悉衆苦攻思政身當矢石與士卒同勞苦嶽乃更脩堰作鐵龍雜獸用厭水神堰成水大至城中泉湧溢不可防止懸釡而炊糧力俱竭慕容紹宗劉豐生及其将慕容永珍意以為閑共乗樓船以望城内令善射人俯射城中俄而大風暴起船乃飄至城下城上以長鈎牽船弓弩亂發紹宗窮急透水而死豐生浮向土山中矢而斃生禽永珍獲船中器械思政謂永珍曰僕之破亡在於晷漏誠知殺卿無益然人臣之節守之以死乃流涕斬之并收紹宗等尸以禮埋瘞嶽既失紹宗等心氣沮䘮不敢逼城齊文襄聞之率歩騎十萬来攻自至堰下督勵士卒水壮城北面遂崩溢滿城中無措足之地思政知事不濟率左右據土山謂之曰吾受國重任夲望平難立功精誠無感遂辱王命今力屈道窮計無所出唯當効死以謝朝恩耳因仰天大哭左右皆號慟思政西向再拜便欲自刎先是齊文襄告城中人曰有能生致王大将軍者封侯重賞若大将軍身有損傷親近左右皆從大戮都督駱訓謂思政曰公常語訓等但将我頭降非但得富貴亦活得一城人今髙相既有此言豈不哀城中士卒也因共止之不得引决齊文襄遣其通直散騎常侍趙彦深就土山遺以白羽扇而說之牽手以下及引見文襄辭氣慷慨涕淚交流無撓屈之容文襄以其忠於所事起而禮之接遇甚厚其督将分禁諸州地牢數年盡死思政初入潁川士卒八千人被圍既久城中無鹽腫死者十六七及城陷之日存者􅅻三千人既外無救援亦無叛者思政常以勤王為務不營貲産嘗被賜園地思政出征家人以種桑果雜樹及還見而怒曰匈奴未滅去病辭家况大賊未平何事産業豈所謂憂公忘私邪命左右拔而棄之故身陷之後家無畜積及齊文宣受東魏禪以思政為都官尚書儀同三司卒贈以夲官加兖州刺史初思政在荆州自武関以南延袤一千五百里置三十餘城並當衝要之地凡所舉薦咸得其才子康沉毅有度量後為文帝親信思政陷後詔以因水城陷非戰之罪增邑三千五百户以康襲爵太原公除驃騎大将軍侍中開府儀同三司康弟揆先封中都縣侯增邑通前一千五百户進爵為公揆弟邗封西安縣侯邗弟恭忠信縣伯恭弟幼顯親縣伯康姊封齊郡君康兄元遜亦陷於潁川封其子景晉陽縣侯康抗表固讓不許十六年王師東討加康使持節大都督以思政所部兵皆配之魏廢帝二年随尉遲迥征蜀鎮天水郡尋賜姓拓王氏為鄜州刺史武成末除匠師中大夫轉載師保定二年歴安襄二州總管位柱國入隋終於汴州刺史尉遲迥字薄居羅代人也其先魏之别種號尉遲部因而氏焉父俟兠性𢎞裕有鑒識尚文帝姊昌樂大長公主生迥及綱迥年七嵗綱年六嵗俟兠病且卒呼二子撫其首曰汝等並有貴相但恨吾不見耳各宜勉之武成初追贈柱國大将軍太傅長樂郡公諡曰定迥少聰敏美容儀及長有大志好施愛士稍遷大丞相帳内都督尚魏文帝女金明公主拜駙馬都尉封西都侯大統十一年拜侍中驃騎大将軍開府儀同三司進爵魏安郡公十五年遷尚書左僕射兼領軍将軍迥通敏有幹能雖任兼文武頗允時望文帝以此深委仗焉十六年拜大将軍侯景之渡江也梁元帝時鎮江陵既以内難方盛請修隣好其弟武陵王紀在蜀稱帝率衆東下将攻之梁元帝大懼乃移書請救文帝曰蜀可圖矣取蜀制梁在兹一舉乃與羣公㑹議諸将多有異同唯迥以為紀既盡銳東下蜀必虚空王師臨之必有征無戰文帝深以為然謂迥曰伐蜀之事一以委汝於是乃令迥督開府元珍乙弗亞侯吕陵始叱奴興綦連雄宇文昇等六軍甲士一萬二千騎萬匹伐蜀以魏廢帝二年春自散関由固道出白馬趣晉夀開平林舊道迥前軍臨劒閣紀安州刺史樂廣以州先降紀梁州刺史楊乾運時鎮潼州先已遣使詣闕宻送誠款然恐其下不従猶據潼水别營拒守迥遣元珍侯吕陵始等襲之乾運還保潼州珍等遂圍之乾運降迥至潼州大饗将士渡涪江至青溪登南原勒兵講武修繕約束閲器械自開府以下賞金帛各有差時夏中連雨山路險峻将士疲病者十二三迥親自勞問加以湯藥引之而西紀益州刺史蕭撝嬰城自守進軍圍之初紀至巴郡遣前南梁州刺史史欣景幽州刺史趙跋扈等為撝外援迥分遣元珍乙弗亞等擊破之跋扈等遁走欣景遂降撝被圍五旬頻戰為迥所破遣使乞降許之撝乃與紀子宜都王圎肅率其文武官屬詣軍門請見迥以禮接之其吏民等各令復業唯收僮𨽻及儲積以賞将士號令嚴肅軍無私焉詔以迥為大都督益潼等十二州諸軍事益州刺史三年加督六州通前十八州諸軍事以平蜀功封一子為安固郡公自劔閣以南得承制封拜及黜陟迥乃明賞罰布恩威綏緝新邦經畧未附民夷懐而歸之迥性至孝色飬不怠身雖在外所得四時甘脆必先薦奉然後敢嘗大長公主年髙多病迥往在京師每退朝參候起居憂悴形於容色大長公主每為之和顔進食以寧迥心文帝知其至性徴迥入朝以慰其母意遣大鴻臚郊勞仍賜迥衮冕之服蜀人思之為立碑頌徳六官初建拜小宗伯孝閔踐阼進位柱國大将軍又以迥有平蜀之功同霍去病冠軍之義改封寧蜀公遷大司馬尋以夲官鎮隴右武成元年進封蜀國公邑萬户除秦州總管秦渭等十四州諸軍事隴右大都督保定二年拜大司馬及晉公䕶東伐迥帥師攻洛陽齊王憲等軍於芒山齊衆渡河諸軍驚散迥率麾下反行却敵於是諸将遂得全師而還遷太保太傅建徳初拜太師尋加上柱國宣帝即位以迥為大右弼轉大前疑出為相州總管宣帝崩隋文帝輔政以迥位望夙重懼為異圖乃令迥子魏安郡公惇齎詔書以㑹葬徴迥尋以鄖公韋孝寛代迥為總管迥以隋文帝當權将圗篡奪遂謀舉兵留惇而不受代隋文帝又令候正破六韓裒詣迥喻旨宻與總管府長史晉昶等書令為之備迥聞之殺昶乃集文武士庶登城北樓而令之於是衆咸從命莫不感激乃自稱大總管承制署官司于時趙王招已入朝留少子在國迥又奉以號令迥弟子大将軍成平郡公勤時為青州總管初得迥書表送之尋亦従迥迥所管相衛黎毛洛貝趙冀瀛滄勤所統青齊膠光莒諸州皆從之衆數十萬榮州刺史邵國公宇文胄申州刺史李惠東楚州刺史費也頭利進國東潼州刺史曹孝達各據州以應迥徐州總管司録席毗與前東平郡守畢義緒據兖州及徐州之蘭陵郡亦以應迥永橋鎮将紇豆陵惠以城降迥迥又北結髙寳寧以通突厥南連陳人許割江淮之地隋文帝於是徴兵討迥即以韋孝寛為元帥隂羅雲監諸軍郕國公梁士彦樂安公元諧化政公宇文忻濮陽公宇文述武鄉公崔𢎞度清河公楊素隴西公李詢延夀公于仲文等皆為行軍總管迥遣所署大将軍石愻攻建州刺史宇文弁以州降愻迥又遣西道行臺韓長業攻陷潞州執刺史趙威署城人郭子勝為刺史上儀同赫連士猷攻晉州即據小鄉城紇豆陵惠襲陷定州之鉅鹿郡遂圍恒州上大将軍宇文威攻汴州上開府莒州刺史烏尼丸開府尉遲儁率光膠青齊莒兖之衆圍沂州大将軍檀讓攻陷曹亳二州屯兵梁郡大将軍東南道行臺席毗衆號八萬軍於蕃城攻陷昌慮下邑豐縣李惠自申州攻陷永州焚之而還宇文胄軍於洛口開府梁子康攻懐州魏安公惇率衆十萬人入武徳軍於沁東孝寛等諸軍隔水相持不進隋文帝又遣髙熲馳驛督戰惇布兵二十餘里麾軍少却欲待孝寛軍半度而撃之孝寛因其却而鳴鼓齊進惇遂大敗孝寛乗勝進至鄴迥與其子惇祐等又率其卒十三萬陣於城南迥别統萬人皆緑巾錦襖號曰黄龍兵勤率衆五萬自青州赴迥以三千騎先到迥舊習軍旅雖老猶被甲臨陣其麾下兵皆關中人為之力戰孝寛等軍失利而却鄴中士女觀者如堵髙熲與李詢乃整陣先犯觀者因其擾而乗之迥衆大敗遂入鄴城迥走保北城孝寛縦兵圍之李詢賀樓子幹以其屬先登迥上樓射殺數人乃自殺勤惇祐等東走青州未至開府郭衍追及之並為衍所獲隋文帝以勤初有誠欵釋之李惠先是自縛歸罪隋文帝復其官爵迥末年衰耄惑於後妻王氏而諸子多不睦及起兵以開府小御正崔達拏為長史自餘委任亦多用齊人達拏文士無籌畧舉止多失綱紀不能匡救迥自起兵至于敗凡經六十八日焉子寛大将軍長樂郡公先迥卒寛兄誼開府資中郡公寛弟順以迥平蜀功授開府安固郡公後以女為宣帝皇后拜上柱國封胙國公順弟惇軍正下大夫魏安郡公惇弟祐西都郡公皆被誅而誼等諸子以年幼並獲全唐武徳中迥従孫庫部員外郎耆福上表請改葬朝議以迥忠于周室有詔許焉仍贈絹百疋迥弟綱字婆羅少孤與迥依託舅氏文帝西討關隴迥綱與母昌樂大長公主留于晉陽後方入關從文帝征伐常陪侍帷幄出入卧内以軍功封廣宗縣伯綱驍果有膂力善騎射文帝甚寵之委以心膂河橋之戰文帝馬中流矢因而驚奔綱與李穆等左右力戰衆皆披靡文帝方得乗馬大統十四年進爵平昌郡公廢帝二年拜大将軍兼領軍及魏帝有異謀言頗漏泄文帝以綱職典禁旅使宻為之備俄而廢帝立齊王仍以綱為中領軍總宿衛綱兄迥伐蜀従文帝送之於城西見一走兎文帝命綱射之誓曰若獲此兎必當滅蜀俄而綱獲兎而返文帝喜曰事平當賞汝佳口及克蜀賜綱侍婢二人又嘗從文帝北狩雲陽見五鹿俱走綱獲其三每從逰宴文帝以珍異之物令諸功臣射而取之綱所獲輙多孝閔帝踐阼綱以親戚掌禁兵除小司馬又與晉公䕶廢帝眀帝即位進位柱國大将軍武成元年進封吴國公邑萬户除涇州總管歴位少傅大司空陕州總管晉公䕶東討乃配綱甲士留鎮京師大軍還綱復歸天和二年以綱政績可紀賜帛及錢榖等増邑以褒賞之陳公純等以皇后阿史那氏自突厥将入塞詔徴綱與大将軍王傑率衆迎衞於境首三年追論河橋功封一子縣公四年薨于京師贈太保諡曰武第二子安以嫡嗣大象末位柱國入隋歴鴻臚卿左衞大将軍安兄運運少彊濟志在立功魏大統十六年以父勲封安喜縣侯明帝立以預定䇿勲進爵周城縣公歴位隴州刺史再遷武伯中大夫尋加軍司馬運既職兼文武甚見委任進爵廣業郡公轉右司衞時宣帝在東宫親狎諂佞數有罪失武帝於朝臣内選忠諒鯁正者以匡弼之於是以運為右宫正建徳三年帝幸雲陽宫又令運以夲官兼司武與長孫覽輔皇太子居守俄而衞刺王直作亂率其黨襲肅章門覽懼走行在所運時偶在門中直兵奄至不暇命左右乃手自闔門直黨與運爭門斫傷運指僅而得閉直既不得入乃縱火運恐火盡直黨得進乃取宫中材木及牀等以益火更以膏油灌之火轉熾久之直不得進乃退運率留守兵因其退以擊之直大敗而走是夜微運宫中已不守矣武帝嘉之授大将軍賜以直田宅妓樂金帛車馬什物等不可勝數四年出為同州刺史同州蒲津潼關等六防諸軍事帝将伐齊召運參議東夏底定頗有力焉五年拜柱國進爵盧國公轉司武上大夫總宿衛軍事帝崩於雲陽宫祕未發䘮運總侍衞兵還京師宣帝即位授上柱國運之為宫正也數進諫於帝帝不納反疎忌之時運又與王軌宇文孝伯等皆為武帝親待軌屢言帝失於武帝帝謂運預其事愈更銜之及軌誅運懼及於禍尋而得出為秦州總管至州猶懼不免遂以憂薨於州贈大後丞七州諸軍事秦州刺史諡曰忠子靖嗣運弟勤大象末青州總管起兵應伯父迥勤弟敬尚眀帝女河南公主位儀同三司王軌太原祁人也小名沙門漢司徒允之後世為州郡冠族累葉仕魏賜姓烏丸氏父光少雄武有将帥材畧頻有戰功文帝遇之甚厚位至驃騎大将軍開府儀同三司平原縣公軌性質直慷慨有逺量臨事彊正人不敢干起家事輔城公及武帝即位頗被識顧累遷内史下大夫自此遂處腹心之任晉公䕶専政武帝宻圗之以軌沈毅有識度堪屬大事遂問以可否軌賛成之建德初轉内史中大夫加授開府儀同三司又拜上開府儀同大将軍封上黄縣公軍國之政皆參預焉五年武帝親戎東伐軌從克晉州平并鄴以功進位上大夫将軍進爵郯國公及陳将吴明徹入冦吕梁徐州總管梁士彦頻與戰不利乃退保州城眀徹遂堰清水以灌之列船艦於城下以圗攻取詔以軌為行軍縂管率諸軍赴救軌潜於清水入淮口多䜿大木以鐵鎖貫車輪横截水流以㫁其船路方欲宻决其堰以斃之眀徹知之大懼乃破堰遽退冀乗决水之勢以得入淮比至清口川流已濶水勢亦衰船艦並礙車輪不復得過軌因率兵圍而蹙之唯有騎将蕭摩訶以十一騎先走得免眀徹及将士三萬餘人并器械輜重並就俘獲陳之銳卒於是殱焉武帝嘉之進位柱國仍拜徐州縂管七州十五鎮諸軍事軌性嚴重善謀畧兼有吕梁之㨗威振敵境陳人甚憚之宣帝之征吐谷渾也武帝令軌與宇文孝伯並從軍中進趣皆委軌等宣帝仰成而已時宫尹鄭譯王端等並得幸於宣帝宣帝在軍中頗有失徳譯等皆預焉軍還軌等言之於武帝武帝大怒乃撻宣帝除譯等名仍加捶楚宣帝因此大銜之軌又嘗與小内史賀若弼言及此事且言皇太子必不克負荷弼深以為然勸軌陳之軌後因侍坐乃白武帝曰皇太子仁孝無聞又多凉徳恐不了陛下家事愚臣暗短不足以論是非陛下常以賀若弼有文武竒才識度𢎞逺而弼比再對臣深以此事為慮武帝召弼問之弼乃跪對曰皇太子飬徳春宫未聞有過未審陛下何從得聞此言既退軌誚弼曰平生言論無所不道今者乃爾翻覆弼曰此公之過也皇太子國之儲嗣豈易發言事有差跌便至滅門之禍夲謂公宻陳臧否何得遂至昌言軌黙然久之乃曰吾専心國家遂不存私計向者對衆良實非宜其後軌因内宴上夀又捋武帝鬚曰可愛好老公但恨後嗣弱耳武帝深以為然但漢王次長又不才此外諸子並幼故不能用其說及宣帝即位追鄭譯等復為近侍乃出軌為徐州刺史軌自知必及於禍謂所親曰吾昔在先朝實申社稷至計今日之事㫁可知矣此州控帶淮南隣接彊寇欲為身計易同反掌但忠義之節不可虧違况荷先帝厚恩每思以死自効豈以獲罪於嗣主便欲背徳於先朝止可於此待死義不為他計冀千載之後知吾此心大象元年帝令内史杜䖍信就徐州殺軌御正中大夫顔之儀切諫帝不納遂誅之軌立朝忠恕兼有大功忽以無罪被戮天下知與不知莫不傷惜時京兆郡丞樂運亦以直言數諫於帝樂運字承業南陽淯陽人晉尚書令廣之八世孫也祖文素齊南郡守父均梁義陽郡守運少好學渉獵經史年十五而江陵滅随例遷長安其親屬等多被籍没運積年為人傭保皆贖免之事母及寡嫂甚謹由是以孝聞梁故都官琅邪王澄美之次其行事為孝義傳性方直未嘗求媚於人臨淄公唐瑾薦之自柱國府記室為露門學士前後犯顔屢諫武帝多被納用建徳二年除萬年縣丞抑挫豪右號稱彊直武帝嘉之特許通籍事有不便於時者令巨細奏聞武帝嘗幸同州召運赴行在所既至謂曰卿言太子如何人運曰中人也時齊王憲以下並在帝側帝顧謂憲等曰百官佞我皆云太子聪眀睿智唯運云中人方騐運之忠直耳於是因問中人之状運對曰班固以齊桓公為中人管仲相之則霸豎刁輔之則亂可與為善亦可與為惡也帝曰我知之矣遂妙選宫官以匡弼之乃超拜運京兆郡丞太子聞之意甚不恱及武帝崩宣帝嗣位葬訖詔天下公除帝及六宫便議即吉運上疏曰三年之䘮自天子達於庶人先王制禮安可誣之禮天子七月而葬以候天下畢至今葬期既促事訖便除文軌之内奔赴未盡隣境逺聞使猶未至若以䘮服受弔不可既吉更凶如以元冠對使未知此出何禮進退無據愚臣竊所未安書奏帝不納自是徳政不修數行赦宥運又上疏曰臣謹按周官曰國君過市則刑人赦此謂市者交利之所君子無故不逰觀焉則施惠以恱之也尚書曰眚災肆赦此謂過誤為害罪雖大當緩赦之謹尋經典未有罪無輕重溥天大赦之文故管仲曰有赦者奔馬之委轡不赦者痤疽之礪石又曰惠者人之仇讐法者人之父母吴漢遺言猶云唯願無赦王符著論亦云赦者非明世之所宜有大尊豈可數施非常之惠以肆姦宄之惡乎帝亦不納而昬暴滋甚運乃輿櫬詣朝堂陳帝八失一曰内史御正職在弼諧皆須參議共理天下大尊比来小大之事多獨㫁之堯舜至聖尚資輔弼况大尊未為聖主而可専恣己心凡諸刑罸爵賞爰及軍國大事請參諸宰輔與衆共之二曰内作色荒古人重誡大尊初臨四海徳惠未洽先捜天下美女用實後宫又詔儀同以上女不許輙嫁貴賤同怨聲溢朝野請姬媵非幸御者放還夲族欲嫁之女勿更禁之三曰天子未明求衣日旰忘食猶恐萬㡬不理天下壅滯大尊比来一入後宫數日不出所須聞奏多附内豎傳言失實是非可懼事由宦者亡國之徴請凖髙祖居外聽政四曰變故易常乃為政之大忌淫刑酷罰非致安之𢎞規若罰無定刑則天下皆懼政無常法則義無適從豈有削嚴刑之詔未及半祀便即追改更嚴前制政令不定乃至於此今宿衞之官有一夜不直者罪至削除因而逃亡者遂便籍没此則大逆之罪與杖十同科雖為法愈嚴恐人情愈散一人心散尚或不可止若天下皆散将若之何請遵輕典並依大律則億兆之民手足有所措矣五曰髙祖斵雕為朴夲欲傳之萬世大尊朝夕趨庭親承聖旨豈有崩未踰年而處躬奢麗成父之志義豈然乎請興造之制務從卑儉雕文刻鏤一切勿營六曰都下之人徭賦稍重必是軍國之要不敢憚勞豈容朝夕徴求唯供魚龍爛漫士庶従役秪為俳優角抵紛紛不已財力俱竭業業相顧無復聊生凡無益之事請並停罷七曰近見有詔上書字誤者即科其罪假有忠讜之人欲陳時事尺有所短文字非工不宻失身義無假手脫有舛謬便廹嚴科嬰徑尺之鱗其事非易下不諱之詔猶懼未来更加刑戮䏻無鉗口大尊縦不䏻採誹謗之言無宜杜獻替之路請停此詔則天下幸甚八曰昔桑榖生朝殷王因之獲福今元象垂戒此亦興周之祥大尊雖減膳徹懸未盡消譴之理誠願諮諏善道修布徳政觧兆庶之愠引萬方之罪則天變可除鼎業方固大尊若不革兹八事臣見周廟不血食矣帝大怒将戮之内史元巖諫而獲免翌日帝頗感悟召運謂之曰朕昨夜思卿所奏實是忠臣先皇聖眀卿數有規諫朕既昬暗卿復能如此乃賜御食以賞之朝之公卿初見帝甚怒莫不為運寒心後見賞獲又皆相賀以為幸免虎口内史鄭譯常以私事請託運不之許因此銜之及隋文帝為丞相譯為長史遂左遷運為廣州滍陽令開皇五年轉毛州髙唐令頻歴二縣並有聲績運嘗願處一諫官從容諷議而性訐直為人所排抵遂不被任用乃發憤録夏殷以来諫諍事集而部之凡六百三十九條合四十一卷名曰諫苑奏上之隋文帝覽而嘉焉通志卷一百五十六
