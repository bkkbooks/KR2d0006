body:
  text: 通志卷一百五十五宋右廸功郎鄭樵漁仲撰列傳第六十八北齊邢邵魏收魏長賢魏蘭根族子愷刁柔王松年陸乂叔父杳張宴之羊烈鄭述祖兄子元禮子族雛袁聿修盧叔彪源彪許惇宋世軌李庶弟蔚若李公緒弟槩裴澤邢邵字子才小字吉河間鄚人也祖敏魏著作郎父蚪光禄少卿邵少時有避遂不行名年五歳清河崔亮見而竒之曰此子後當大成位望通顯十歳便能屬文雅有才思聰明彊記日誦萬餘言族兄巒有人倫鑒識甚異之謂子弟曰宗室中有此兒非常人也少在洛陽㑹天下無事與時名勝專以山水游宴為娛不暇勤業嘗因霖雨乃讀漢書五日略能徧記之後因飲謔倦方廣尋經史五行俱下一覽便無所遺文章典麗既贍且速年未二十名動衣冠嘗與右北平陽固河東裴伯茂從兄罘河南陸道暉等至北海王昕舎宿飲相與賦詩凡數十首皆在主人奴處旦日奴行諸人求詩不得邵皆為之誦諸人有不認詩者奴還得本不誤一字諸人方之王粲焉年未弱冠聲動京洛吏部尚書隴西李神儁大相欽重引為忘年之交釋巾為魏宣武挽郎除奉朝請遷著作佐郎深為領軍元义所禮义新除尚書令神儁與陳郡袁翻在席义令邵作謝表須㬰便就以示諸賔神儁曰邢邵此表足使袁公變色孝昌初與黄門侍郎李琰之對典朝儀自孝明之後文雅大盛邵雕蟲之美獨歩當時每一文初出京師為之紙貴讀誦俄徧逺近於時陳郡袁翻與范陽祖瑩位望通顯而有才名以邵藻思華贍共嫉之毎洛中貴人拜職多憑邵為謝章表嘗一貴人初授官大事賔餗翻與邵俱在坐翻意謂主人託其為譲表既而令邵為之翻甚不悦毎吿人云邢家小兒當客作章表自買黄紙寫而送之邵恐為翻所害乃辭以疾屬尚書令元羅出鎮青州啓為府司馬遂在青土終日酣賞盡山泉之致永安初累遷中書侍郎所作詔誥文體宏麗冠絶當時及爾朱兆入洛京師擾亂邵與𢎞農楊愔避地嵩髙山普泰中兼給事黄門侍郎尋為散騎常侍太昌初𠡠令常直内省給御食令覆按尚書門下事凡除大官先問其可否然後施行除衛將軍領國子祭酒以親老還郷詔所在特給兵力五人並令歳一入朝以備顧問丁母憂哀毁過禮後楊愔與魏元义及邵請置學及修立明堂靈太后令曰配饗大禮為國之本比以戎馬在郊未遑修繕今四表晏寧當𠡠有司别議經始累遷尚書令加侍中於時與梁和妙簡聘使邵與魏收及從子子明被徴入朝當時文人皆在邵之下但以邵不持威儀名髙難副朝廷不令出境南人曽問賔司邢子才故應是北間第一才士何為不作聘使荅曰子才文辭實無所媿但官位已髙恐非復行限南人曰鄭伯猷䕶軍猶得將命國子祭酒何為不可邵既不行請復還故郡文宣在京輔政徵之在第為賔客除給事黄門侍郎與温子昇對為侍讀文宣富於春秋初總朝政崔暹每勸禮接名賢詢訪得失以邵宿有名望故請徵焉文宣甚親重之多别引見邵舊鄙崔暹無學術言論之際遂云暹無所知解文宣還以邵言吿暹并道此漢不可親近暹頗銜之邵奏魏帝發𠡠用妻兄李伯倫為司徒祭酒詔書已出崔暹即啓文宣執其專擅伯倫官事便寢邵由是被疎其後除驃騎西兖州刺史在州有善政桴鼓不鳴吏民奸狀守令長短無不知之定陶縣去州五十里縣令妻日暮取人斗酒束脯邵逼夜攝令未明而去責其取受舉州不識其所以在任都不營生産唯南兖糴粟就濟陽食之邵繕治觀宇頗為壯麗皆為之名題有清風觀明月樓而不擾公私唯使兵力吏民為立生祠并勒碑頌徳及替下吏民父老爰及媪嫗皆逺相攀追號泣不絶至都除中書令舊格制生兩男者當賞羊五口不然則絹十匹僕射崔暹奏絶之邵云此格不宜輙斷勾踐以區區之越賞法生三男者給乳母況以天下之大而絶此條舜藏金於山不以為乏今藏之於民復何所損又准舊皆訊囚取占然後送付廷尉邵以為不可乃立議云設官分職各有司存丞相不問鬬人虞官弓招不進豈使尸祝兼刀匕之役家長侵雞犬之功詔並從之後除太常卿兼中書監攝國子祭酒是時朝臣多守一職帶領二官甚少邵頓居三職並是文學之首當世榮之文宣幸晉陽路中頻有甘露之瑞朝臣皆作甘露頌尚書符令邵為之序及文宣崩㓙禮多見訊訪𠡠撰哀䇿後授特進卒邵率情簡素内行修謹兄弟親姻之間稱為雍睦博覽墳籍無不通曉晚年尤以五經章句為意窮其指要吉㓙禮儀公私諮禀質疑去惑為世指南每公卿㑹議事闗典故邵援筆立成證引該洽帝命朝章取定俄頃詞致宏逺獨歩當時與濟隂温子昇為文士之冠世論謂之温邢鉅鹿魏收雖天才豔發而年事在二人之後故子昇死後方稱邢魏焉邵雖望實兼重不以才位慠物脱略簡易不修威儀車服器用充事而已有齋不居坐卧常在一小屋果餌之屬或置梁上賔至下而共噉天姿質素特安異同士無賢愚皆能顧接對客或解衣覔虱且與劇談有書甚多而不甚讎校見人校書笑曰何愚之甚天下書至死讀不可徧焉能始復校此且思誤書更是一適妻弟李季節才學之士謂邵曰世間人多不聰明思誤書何由能得邵曰若思不能得便不勞讀書與婦甚疎未嘗内宿自云嘗晝入内閤為狗所吠言畢撫掌大笑性好談賞又不能閑獨公事歸休嘗須賔客自伴事寡嫂甚謹飬孤子恕慈愛特深在兖州有都信云恕疾便為之廢寢食顔色貶損及卒人士為之傷心邵痛悼雖甚竟不再哭賔客弔慰􅋞淚而已其髙情達識開遣滯累自東門吳以還所未有也有集三十卷見行於世邵世息大寳有文情孽子大徳大道略不識字焉魏收字伯起小字佛助鉅鹿下曲陽人也父子建魏世多歴藩牧位驃騎大將軍自有傳收少機警不持細行年十五頗已屬文及隨父赴邊好習騎射欲以武藝自進滎陽鄭伯調之曰魏郎弄㦸多少收慙遂折節讀書夏月坐版牀隨樹隂誦讀積年牀版為之鋭減而精力不輟以文華顯初除太學博士及爾朱榮於河隂濫害朝士收亦在圍中以日晏獲免吏部尚書李神儁重收材學奏授司徒記室參軍永安二年除北主客郎中節閔帝立妙簡近侍詔試收為封禪書收下筆便就不立藁草文將千言所改無㡬時黄門郎賈思同侍立深竒之白帝曰雖七歩之才無以過此遷散騎侍郎尋勑典起居注并脩國史俄兼中書侍郎時年二十六孝武初又詔收攝本職文誥填積事咸稱㫖黄門郎崔㥄從神武入朝熏灼於世收初不詣門㥄為帝登阼敇云朕託體孝文收嗤其率直正員郎李慎以吿之㥄深忿忌節閔帝殂令收為詔㥄乃宣言收普泰世出入幃幄一日造詔優為詞㫖然則義旗之士盡為逆人又收父老合解官歸侍南臺將加彈劾頼尚書辛雄為言於中尉綦儁乃解收有賤生弟仲同先未齒録因此怖懼上籍遣還郷扶侍孝武嘗大發士卒狩於嵩少之南旬有六日時大寒朝野嗟怨帝與從官及諸妃主竒技異飾多非禮度收欲言則懼欲黙而不能已乃上南狩賦以諷焉收賦雖寓言浮麗而終歸雅正帝手詔報焉甚見襃美鄭伯謂曰卿不遇老夫猶應逐兎初神武固譲天柱大將軍帝𠡠收為詔令遂所請欲加相國問收相國品秩收以實對帝遂止收既未測主相之意以前事不安求改詔許焉久之除廣平王贊開府從事中郎贊帝之兄子也時以親貴髙選僚屬收不敢致辭乃為庭竹賦以致己意尋兼中書舎人與濟隂温子昇河間邢子才齊譽世號三才時孝武與神武内有間隙收遂以父疾固辭而免其舅崔孝芬怪而問之收曰懼有晉陽之甲尋而神武理兵南上帝西入闗天平初與邢邵等同召赴鄴詔收以通直散騎常侍副王昕聘梁昕風流文辯收辭藻富逸梁主及其羣臣咸加敬異先是南北初和李諧盧元明首通使命二人才器並髙為鄰國所重至此梁主稱曰盧李命世王魏中興未知後来何如耳收在館遂買吳婢入館其部下有買婢者收亦喚取徧行奸穢館司皆為之獲罪梁人稱其才而鄙其行在途作聘㳺賦辭甚美盛使還尚書右僕射髙隆之求南貨於昕收不能如志遂諷御史中尉髙仲宻禁止昕收於其臺久之得釋及孫搴死司馬子如薦收召赴晉陽以為中外府主簿以受㫖乖忤頻被嫌責加以箠楚久不得志㑹司馬子如奉使霸朝收假其餘光子如因宴戲言於神武曰魏收天子中書郎一國大才願大王借與顔色由此轉府屬然未甚優禮收叔季景有才學歴官著名並在收前然收常所欺忽季景收初赴并頓邱李庶者故大司農諧之子也以華辯見稱曽謂收曰霸朝便有二魏收率爾曰以從叔見比便是邪輸之比卿邪輸者故尚書令陳留公繼伯之子愚癡有名好自入市肆髙價買物商賈共所嗤翫收忽以季景方之其不遜多如此收本以文才必望頴脱見知位既不遂求脩國史崔暹為言於文㐮曰國史事重公家父子霸王功業皆須具載非收不可文襄乃啓收兼散騎常侍脩國史武定二年除正常侍領兼中書侍郎仍脩史魏帝宴百僚問何故名人日皆莫能知收對曰晉議郎董勛荅問禮俗云正月一日為雞二日為狗三日為猪四日為羊五日為牛六日為馬七日為人時邢邵亦在側甚恧焉自魏梁通和好書下紙毎云想彼境内寧静此率土安和梁後使其書乃去彼字自稱猶著此欲示無外之意收定報書云想境内清晏今萬國安和梁人復書依以為體後神武入朝静帝授相國固譲令收為啓啓成呈上文襄時侍側神武指收曰此人當復為崔光四年神武於西門豹祠宴集謂司馬子如曰魏收既為史官書吾等善惡聞北伐時諸貴常餉史官飲食司馬僕射頗曽餉否因共大笑仍謂收曰卿勿見元康等在吾目下趨走謂吾以為勤勞我後世身名在卿手勿謂我不知尋加兼著作郎收昔在京洛輕薄尤甚人號云魏收驚蛺蝶文襄在鄴嘗出游東山攜諸朝彦宴集文㐮曰魏收恃才使氣卿等須出其短徃復數番收忽大唱曰楊遵彦理屈己倒愔從容曰我綽有餘暇山立不動若遇當塗恐翩翩逐逝當塗者魏翩翩者蝶也文襄先知之大笑稱善文襄又曰向語猶微宜更指斥愔應聲曰魏收在并作一篇詩對衆讀訖云打從叔季景出六百斗番亦不辦此逺近所知非敢妄説文襄喜曰我亦先聞衆人皆笑收雖自申雪不復抗拒終身病之侯景叛入梁㓂南境文襄時在晉陽令收為檄書五十餘帋不日而就又移梁朝令送侯景初夜執筆三更便了文過七紙文襄善之魏帝曽季秋大射於後園燕射普令賦詩收詩末云尺書徵建業折簡召長安文襄甚壯之顧謂諸人曰在朝今有魏收便是國之光采雅俗文墨通達縱横我亦使子才子昇時有所作至於辭氣並不及之吾或意有所懐忘而不語或語而不盡及魏收呈草皆以周悉此亦難有又𠡠兼主客郎接梁使謝珽徐陵侯景陷梁梁鄱陽王範時為合州刺史文襄勑收以書喻之範得書仍率部伍西上州刺史崔聖念入據其城文襄謂收曰今定一州卿之力也猶恨尺書徵建業未效耳文襄崩文宣如晉陽令與黄門郎崔季舒髙徳正吏部郎中尉瑾於北第參掌機宻十月轉秘書監仍兼著作郎又除大中正時齊將受禪宻旨召收置之别舘令撰禪代詔冊諸文遣徐之才守門不聽出天保元年除中書令仍兼著作郎封富平縣子二年受詔撰魏史四年除魏尹故優以禄秩專在史閣不治郡事初帝令羣臣各言志收曰臣願得直筆東觀早出魏書故帝使收專其任又詔平原王髙隆之總監之署名而已帝𠡠收曰好直筆我終不作魏太武誅史官始魏初鄧淵撰代記十餘卷其後崔浩典史游允程駿李彪崔光李琰之郎知世脩其業浩為編年體彪始分作紀表志傳書猶未出宣武時命邢巒追撰孝文起居注正光初又命崔鴻王遵業等補續其書下訖孝明事甚委悉濟隂王暉業撰辯宗室録三十卷收於是與通直常侍房延祐司空司馬辛元植國子愽士刁柔裴昻之尚書郎髙孝幹等平心斟酌以成魏書辯定名稱隨條甄舉又捜採亡遺綴續後事備一代史籍表而上聞之勒成一代大典凡十一紀九十二列傳合一百一十卷五年三月奏上之秋除梁州刺史收以史志未成請終業許之十一月復奏十志天象四卷地形三卷律厯二卷禮樂四卷食貨一卷刑罰一卷靈徵二卷官氏二卷釋老一卷凡二十卷續於紀傳合一百三十卷分為十二袠其史三十五例二十五序九十四論前後二表一啓皆獨出於收收所引史官恐其陵逼惟取學流先相依附者其房延祐辛元植眭仲譲雖夙渉朝位並非史才刁柔裴昻之以儒業見知全不堪編緝髙孝幹以左道求進修史諸人宗祖姻戚多被書録飾以美言收性頗急不甚能平夙有怨者多沒其善每言何物小子敢共魏收作色舉之則使上天按之當使入地初收在神武時為太常少卿修國史時得陽休之之助因謝休之曰無以謝徳當為卿作佳傳休之父固魏世為北平太守以貪虐為中尉李平所彈獲罪載在魏起居注收書云固為北平甚有恵政坐公事免官又云李平深相敬重爾朱榮於魏為賊收以髙氏出於爾朱氏收既觀望復納爾朱榮子金故為榮減其惡而増其善論云若脩徳義之風則韓彭伊霍夫何足數時論既言收著史不平文宣詔收於尚書省與諸家子孫共加討論前後投訴百有餘人或云遺其家世職位或云其家不見記録或云妄有非毁收皆隨狀答之范陽盧斐父同附出族祖元傳下頓邱李庶家傳稱其本是梁國家人斐庶譏議云史書不直收性急不勝其憤啓誣其罪欲加屠害帝大怒親自詰責斐曰臣父仕魏位至儀同功業顯著名聞天下與收無親遂不立傳博陵崔綽位至本郡功曹更無事迹是收外親乃為傳首收曰綽雖無位道義可嘉所以合傳帝曰卿何由知其好人收曰髙允曽為綽讚稱有道徳帝曰司空才士為人作讚正應稱揚亦如卿為人作文章道其好者豈能皆實收無以對戰慄而已但帝先重收才不欲加罪時太原王松年亦謗史及斐庶並獲罪各被鞭配甲坊或因以致死盧思道亦抵罪然猶以羣口沸騰𠡠魏史且勿施行令羣官博議聽有家事者入署不實者陳牒於是衆口嚻然號為穢史投牒者相次收無以抗之時左僕射楊愔右僕射髙徳正二人勢傾朝野與收皆親收遂為其家並作傳二人不欲言史不實抑塞訴辭終文宣世更不重論尚書陸操嘗謂楊愔云觀魏收之書可謂博物宏才有大功於魏室愔又嘗語收云此可謂不刋之書傳之萬古但恨論及諸家枝葉親姻過為繁碎與舊史體例不同耳收答曰徃因中原喪亂人士譜牒遺逸略盡是以具書其枝𣲖望公觀過知仁以免尤責收為楊愔家傳甚美是以深被黨助故松年等獲罪而愔迎合收意故有是言八年除太子少傅監脩國史復參議律令三臺成文宣曰臺成須有賦愔先以吿收收上皇居新殿臺賦其文甚壯麗時所作者自邢邵以下咸不逮焉收上賦前數日乃吿邢邵邵謂人曰收忌人居前故不早言之帝曽游東山勑收作詔宣揚威徳譬喻闗西俄頃而訖辭理宏壯帝對百寮大嗟賞之仍兼太子詹事收娶其舅女崔氏産一女無子後魏太常劉芳孫女中書郎崔肇師女夫家坐事帝並賜收為妻時人比之賈充置左右夫人然終以無子後病甚恐身後嫡媵不平乃放二姬及疾瘳追憶作懐離賦以申其意文宣毎以酣宴之次云太子性懦社稷事重終當傳大位於常山收謂尚書令楊愔曰古人有言太子國之根本不可動揺至尊三爵之後每言傳位於常山令臣下疑貳豈社稷之福若實便須決行若戲此言魏收既備太子師傅正當守之以死但恐國家不安楊愔以收言奏聞帝自此便止帝數宴喜收每預侍從皇太子之納鄭良娣也有司備設牢饌帝既酣飲起而自毁覆之仍詔收曰知我意不收曰臣愚謂良娣既東宫之妾理不須牢仰惟聖懐縁此毁去帝大笑握收手曰卿知我意安徳王延宗納趙郡李祖收女為妃後帝幸李宅宴而妃母李氏薦二石榴於帝前問諸人莫知其意帝投之收曰石榴房中多子王新㛰妃母欲子孫衆多帝大喜詔收卿還將来仍賜收美錦二疋十年除儀同三司帝在宴席口𠡠以為中書監命中書郎李愔於樹下造詔愔以收一代盛才難於率爾久而未訖比成帝已醉醒遂不重言愔仍不奏事竟寢及帝崩於晉陽驛召收及中山太守陽休之參議吉凶之禮兼掌詔誥仍除侍中遷太常卿文宣諡及廟號陵名皆收議也及孝昭居中宰事命收禁中為諸詔文積日不出轉中書監皇建元年除兼侍中右光禄大夫仍儀同監史收先副王昕使梁不相協睦時昕弟晞親宻而孝昭别令休之兼中書在晉陽典詔誥收留在鄴盖晞所為收大不平謂太子舎人盧詢祖曰若使卿作文誥我亦不言又除祖珽為著作郎欲以代收司空主簿李䬡文詞士也聞而吿人曰詔誥悉歸陽子列著作復遣祖孝徵文史頓失恐魏公發背於時詔議二王三恪收執王肅杜預議以元氏司馬氏為二王通曹氏備三恪詔諸禮學之官皆執鄭元五代之議孝昭后姓元議恪不欲廣及故議從收又除兼太子少傅解侍中帝以魏史未行詔收更加研審收奉詔頗有改正及詔行魏史收以為直置秘閣外人無由得見於是命送一本付并省一本付鄴下任人寫之大寧元年加開府河清二年兼右僕射時武成酣飲終日朝事專委侍中髙元海元海凡庸不堪大任以收名振俗都官尚書畢義雲長於斷割乃虛心倚仗收畏避不能匡救為議者所譏帝於華林别起元洲苑備山水臺觀之麗詔於閣上畫收容像其見重如此始收比温子昇邢邵稍為後進邵既被踈出子昇又以罪死收遂被任用獨歩一時議論更相訾毁各有朋黨收每譏陋邢文邵又云江南任昉文體本踈魏收非直模擬亦大偷竊收聞之乃言曰伊嘗於沈約集中作賊何意道我偷任昉任沈俱有重名於江左邢魏各有所好尚武平中黄門郎顔之推以二公之意問左僕射祖珽珽答云見邢魏之臧否即是任沈之優劣收以温子昇全不作賦邢雖有一兩首又非所長常云㑹須能作賦始成大才士唯以章表碑誌自許此外更同兒戲自武定二年已後國家大事詔命軍國文詞皆收所作每有警急受詔立成或時中使催促收下筆有同宿構敏速之工邢温所不逮也其參議典禮與邢相埓既而趙郡公増年獲免收知而過之事發除名其年又以託附陳使封孝琰牒令其門客與行遇崐崘舶至得竒貨果然褥表美玉盈尺等數十件罪當流以贖論三年起除清都尹尋遣黄門郎元文遥𠡠收曰卿舊人事我家最久前者之罪情在可恕比令卿為尹非謂美授但初起卿斟酌如此朕豈可用卿之才而忘卿身待至十月當還卿開府天統元年除左光禄大夫二年行齊州刺史尋為真收以子姪年少著枕中篇以申戒厲文多不録其後羣臣多言魏史不實武成復勑更審收又回換遂為盧同立傳崔綽反更附出楊愔家傳本無有魏以来一門而已八字至是加之又先云𢎞農華隂人乃改為自云𢎞農人以配王慧龍自云太原人此其失也尋除開府中書監武成崩未發喪在内諸公以後主即位有年疑於赦令諸公引收訪焉收固執宜有恩澤乃從之掌詔誥除尚書右僕射總議監五禮事位特進收奏請趙彦深和士開徐之才共監先以吿士開士開驚辭以不學收曰天下事皆由五禮非王不決士開謝而許之多引文士令執筆儒者馬敬徳熊安生權㑹實主之武平三年薨贈司空尚書左僕射諡曰文貞有集七十卷收碩學文才然性褊不能達命體道見當塗貴游每以言色相悦然提奬後軰以名行為先浮華輕險之徒雖有才能弗重也初河間邢子才子明及季景與收並以文章顯世稱大邢小魏言尤俊也收少子才十歳子才每曰佛助寮人之偉後收稍與子才争名文宣貶子才曰爾才不及魏收收益得志自序云先稱温邢後曰邢魏然收内陋邢心不許也收既輕疾好聲樂善胡舞文宣末數於東山與諸優為獮猴與狗鬬帝寵狎之收外兄愽陵崔巖嘗以雙聲嘲收曰遇魏收衰曰愚魏魏答曰顔巖腥痩是誰所生羊頥狗頬頭團鼻平飯房笭籠著孔嘲玎其辯㨗不拘若是既縁史筆多憾於人齊亡之歳收冢被發棄其骨於外先飬弟子仁表為嗣位至尚書膳部郎中隋開皇中卒於温縣令魏長賢收之族叔也祖釗魏義陽太守父彦光州長史釗自有傳彦嘗欲刪改衆家晉書為一家之典不就而卒長賢博渉經史詞藻精華舉秀才除汝南王悦參軍事入齊平陽王淹辟為法曹參軍轉著作佐郎更撰晉書欲還成先志河清中上書譏刺時政大忤權幸為上黨屯留令親故以長賢不相時而動或為書以相規責長賢復書曰日者恵書義髙旨逺誨僕以自求諸己思不出位國之大事君與執政所圗又謂僕禄不足以代耕位不登於執㦸干非其議自貽悔咎勤勤懇懇誠見故人之心静言再思無忘寤寐僕雖固陋亦嘗奉教於君子矣以為士之立身其略不一故有負鼎俎以趨世隱漁釣以待時操築傅巖之下取履圯橋之上者矣或有釋賃車以匡霸業委挽輅以定王基由斬袪以見禮因射鈎而受相者矣或有三黜不移屈身以直道九死不悔甘心於苦節者矣皆奮於泥滓自致於青雲雖事有萬殊而理終一致權其大要歸乎忠孝而已夫孝則竭力所生忠則致身所事未有孝而遺其親忠而後其君者也僕自射䇿金馬記言麟閣寒暑迭運五稔於兹不能勒成一家潤色鴻業善述人事功既闕如顯親揚名邈焉無冀每一念之曷云其已自頃王室板蕩彛倫攸斁大臣持禄而莫諫小臣畏罪而不言虛痛朝危空哀主辱匪躬之故徒聞其語有犯無隐未見其人此梅福所以獻書朱雲所以請劔者也抑又聞之嫠不恤緯而憂宗周之亡女不懐歸而悲太子之少況僕之先人世傳儒業訓僕以為子之道厲僕以事君之節今僕之委質有年世矣安可自同於匹庶取笑於兒女子哉是以腸一夕而九回心終朝而百慮懼當年之不立耻沒世而無聞慷慨懐古自彊不息庶㡬伯夷之風以立懦夫之志吾子以謂僕干進務入不畏友朋居下訕上欲益反損僕誠不敏以貽吾子之羞黙然茍容又非平生之意故願得鋤彼草茅逐兹鳥雀去一惡樹一善不違先㫖不沒九泉求仁得仁其誰敢怨但言與不言在我用與不用在時若國道方屯時不我與以忠獲罪以信見疑貝錦成章青蠅變色良田敗於邪徑黄金鑠於衆口窮達運也其如命何吾子忠告之言敢不敬承嘉恵然則僕之所懐未可一二為俗人道也投筆而已夫復何言是出也人皆為之怏怏而長賢處之怡然不屑懐抱識者以此多焉武平中辭疾去職終於齊代不復出仕周武平齊捜揚才俊辟書屢降固以疾辭卒年七十四貞觀中贈定州刺史子徵知名魏蘭根字蘭根收之族叔也父伯成魏中山太守蘭根身長八尺儀貌竒偉汎覽羣書誦左氏傳周易機警有識悟起家北海王國侍郎母憂居喪有孝稱將葬常山郡境先有董卓祠祠有栢樹蘭根以卓凶逆不應遺祠至今乃啓刺史請伐為椁左右人言有靈蘭根了無疑懼父喪廬於墓側負土成墳憂毁殆於滅性正光末尚書令李崇為大都督討蠕蠕以蘭根為長史因説崇曰縁邊諸鎮控攝長逺昔時初置地廣人稀或徵發中原彊宗子弟或國之肺腑寄以爪牙中年以来有司乖實號曰府戶役同厮飬官㛰班齒致失清流而本宗舊類各各榮顯顧瞻彼此理當憤怨更張琴瑟今也其時静境寧邊事之大者宜改鎮立州分置郡縣凡是府户悉免為平民入仕次第一准其舊文武兼用威恩並施此計若行國家庶無北顧之慮崇以奏聞事寢不報孝昌初為岐州刺史從行臺蕭寳夤討破宛川俘其民為奴婢以美女十人賞蘭根蘭根辭曰此縣介於彊虜皇威未接故成背叛今當恤其饑寒柰何將充僕𨽻乎於是盡以歸其父兄部内麥多五穂隣州田䑕為灾犬牙不入岐境屬蕭寳夤敗於涇州岐州人囚蘭根降賊及寳夤兵威復振城人復斬賊刺史侯莫陳仲和推蘭根復任朝廷以蘭根得西土人心加都督涇岐東秦南岐四州諸軍事兼四州行臺尚書孝昌末河北流人南度以蘭根兼尚書使齊濟二兖四州安撫并置郡縣蘭根甥邢杲反於青光間復詔蘭根慰勞杲不下仍隨元天穆討之還拜中書令孝莊帝將誅爾朱榮蘭根泄之於兄子周達周達告爾朱世隆及榮死蘭根憂不知所出時應詔王道習見信於孝莊蘭根乃託附之求出立功乃以為兼尚書右僕射河北行臺於定州率募郷曲欲防井陘為爾朱榮將侯深所敗走依渤海髙乾屬乾兄弟舉義因在其中神武至以蘭根宿望深禮遇之中興初除尚書右僕射神武將入洛陽遣蘭根先至京師時廢立未決令蘭根觀察節閔帝帝神采髙明蘭根恐於後難測遂與髙乾兄弟及黄門崔㥄同心固請於神武神武不得已遂立孝武帝大昌初加侍中開府儀同三司封鉅鹿侯啓授兄子周達蘭根既預勲業位居端副始叙復岐州勲封永興侯髙乾之死蘭根憂怖乃移病解僕射後以疾篤上表求還郷里魏帝遣使勞問猶以開府儀同三司歸本郷門施行馬武定三年薨贈司徒公諡曰文宣長子相如襲爵相如性亢直有文藻與族兄愷齊名雅為當時所重早卒孝昭時佐命功臣配饗不及蘭根次子敬仲表訴竟不允敬仲以才器稱卒於章武太守子餉字孝衡幼孤學渉有時譽居喪以孝聞隋饒州司倉參軍事子景義景禮並有才行郷人呼為雙鳳早卒敬仲弟少政位至洛州刺史子孝該孝幾愷自散騎常侍遷青州長史固辭文宣大怒曰何物漢子與官不就時帝已失徳朝廷為之懼愷容色坦然帝曰死與長史任卿所擇答曰能殺臣者陛下不受長史者愚臣帝謂楊愔曰何慮無人苦用此漢放還永不須收由是積年沈廢後遇愔於路微自陳愔云咸由中㫖愷應聲曰雖復零雨自天終待雲興四岳公豈得言不知楊愔欣然曰此言極為簡要數日除霍州刺史在職有政理後卒於膠州刺史刁柔字子温勃海饒安人也父整魏贈司空柔少好學留心儀禮性彊記至於氏族内外皆所諳悉居母喪以孝聞初為魏宣武挽歌郎解巾司空行參軍天保初累遷國子愽士中書令魏收撰魏史啓柔等同其事柔性專固自是所聞收常嫌憚又參議律令時議者以為五等爵邑承襲無嫡子立嫡孫無嫡孫立嫡子弟無嫡子弟立嫡孫弟柔以為無嫡孫應立嫡曽孫不應立嫡子弟議曰案禮立嫡以長故謂長子為嫡子嫡子死以嫡子之子為嫡孫死則曽元亦然然則嫡子之名本為傳重故喪服曰庶子不為長子三年不繼祖與禰也禮公儀仲子之喪檀弓曰未之前聞也仲子舎其孫而立其子何也子服伯子曰仲子亦猶行古之道也昔者文王舎伯邑考而立武王微子舎其孫腯而立其弟衍鄭注曰仲子為親者諱耳立子非也文王之立武王權也微子嫡子死立弟衍殷禮也子游問諸孔子孔子曰否立孫注殷以嫡子死立嫡子之母弟周以嫡子死立嫡子之子為嫡孫故春秋公羊之義嫡子有孫而死質家親親先立弟文家尊尊先立孫喪服云為父後者為出母無服小記云祖父卒而後為祖母後者三年為母無服喪者不祭故也為祖母三年者大宗傳重故也今議以嫡孫死而立嫡子母弟嫡子母弟者則為父後矣嫡子母弟本非承嫡以無嫡故得為父後則嫡孫之弟理亦應得為父後則是父卒然後為祖後者服斬既得為袓服斬而不得傳重未之聞也若用殷家親親之義本不應舎嫡子而立嫡孫若從周家尊尊之文豈宜舎其孫而立其弟或文或質愚用惑焉小記云嫡婦為舅姑後者則舅姑為之小功注云謂夫有廢疾他故若死無子不受重者小功庶婦之服凡父母於子舅姑於婦將不傳重於嫡及將所傳重者非嫡服之皆如衆子庶婦也言死無子者謂絶世無子非謂無嫡子如其有子焉得為無後夫雖廢疾無子婦猶以嫡為名嫡名既在而欲廢其子者於禮何有損益革代相㳂如謂宗嫡可得而變者則為後服斬亦宜有因而改七年卒柔在史館未久勒成之際志在偏黨魏書中與其内外通親者並虛美過實為時論所譏王松年太原晉陽人魏寧南將軍慧龍之元孫也父遵業司徒左長史黄門郎松年少知名文襄臨并州辟為主簿累遷通直散騎常侍副李緯使梁使還歴位尚書郎中魏收撰魏書成松年有謗言文宣怒禁止之仍加杖罰歳餘得免除臨漳令遷司馬别駕本州大中正孝昭擢拜給事黄門侍郎帝每賜坐與論政事甚喜之孝昭崩松年馳驛至鄴都宣遺詔發言涕泗迄於宣罷容色無改辭吐諧韻宣訖號慟自絶於地百官莫不感慟還晉陽兼侍中䕶梓宫還鄴諸舊臣避形迹無敢盡哀唯松年哭必流涕朝士咸恐武成雖忿松年然以戀舊情切亦雅重之以本官加散騎常侍食髙邑縣幹參定律令前後大獄多委焉兼御史中丞發晉陽之鄴在道遇疾卒贈吏部尚書并州刺史諡曰平第二子劭最知名隋史有傳陸乂字旦代人也祖子彰魏中書監教訓六子雅有法度皆知名當世乂父卬天保初授給事黄門侍郎遷吏部郎中有至性列在孝友傳中乂聰敏博學有文才年十九舉司州秀才歴祕書郎南陽王文學通直散騎侍郎待詔文林館兼散騎侍郎迎陳使還兼中書舎人加通直散騎常侍乂於五經最精熟館中謂之石經人為之語曰五經無對有陸乂乂叔父駿字雲驤自中書舎人歴黄門侍郎散騎常侍卒於東廣州刺史駿弟杳字雲邁亦歴中書舎人黄門常侍假儀同三司秦州刺史武平中為㓂所圍經百餘日就加開府儀同三司城中多疫癘死者過半人無異心遇疾卒及城䧟陳將吳明徹以杳有善政吏民所懐啓陳主還其屍家累貲物無所犯贈開府儀同三司尚書僕射子元卿位尚書膳部郎杳弟騫字雲儀亦歴中書舎人黄門常侍武平末吏部郎中騫弟摶字雲征好學有行檢卒於著作佐郎搏弟彦師字雲房列在隋史張晏之字熙徳清河東武城人也祖彛魏征西將軍冀州大中正父始均行臺郎中父子俱為羽林所害事在彛傳晏之幼孤有至性為母鄭氏教誨動依禮典從爾朱榮平元顥賜爵武城子累遷尚書二千石郎中髙岳征潁川復以為都督中兵參軍兼記室宴之文士兼有武幹每與岳帷帳之謀又嘗以短兵接刃親獲首級深為岳所嗟賞天保初文宣為髙陽王納晏之女為妃令赴晉陽成禮晏之後園陪讌坐客皆賦詩晏之詩云天下有道主明臣直雖休勿休承貽世則文宣嘆曰得卿箴諷深以慰懐後行北徐州事尋即真為吏民所愛御史崔子武督察州郡至北徐無所案劾唯得百姓所制清德頌數篇乃歎曰本求罪狀遂聞頌聲遷兖州刺史太常卿子乾威列在隋史羊烈字信卿太山鉅平人晉太僕卿琇之七世孫伯父祉魏贈安東將軍兖州刺史父瑩字􅂕珍魏兖州别駕烈少通敏頗自脩立有成人之風好讀書能言名理以元學知名魏孝昌末烈從兄偘為太山太守據郡起兵外叛烈潛知其謀深懼家禍與從兄廣平太守敦馳赴洛陽告難朝廷將加厚賞烈告人云譬如斬首全軀所存者大故爾豈有幸從兄之敗以為己利乎卒無所受天保中累遷尚書祠部左右户郎中在官咸為稱職除陽平太守治有能名是時頻有灾蝗犬牙不入陽平境勅書襃美焉武平初為義州刺史尋以老病還鄊卒于家烈家傳素業閨門脩餙為世所稱一門女不再醮魏太和中於兖州造一尼寺女寡居無子者並出家為尼咸存誡行烈天統中嘗與尚書畢義雲爭兖州大中正義雲盛稱門閥云我累世本州刺史卿世為我家故吏烈云卿自畢軌被誅以還寂無人物近日刺史皆疆場之上彼此而得何足為言豈若我之漢河南尹晋朝太傅名德學行百世傳美且男清女貞足以相冠自外多可稱也盖譏義雲之帷薄焉烈弟脩有才幹卒於尚書左丞子元正武平末將作丞隋開皇中户部侍郎卒於隴西郡賛務鄭述祖字恭文滎陽開封人祖羲父道昭俱為魏秘書監羲自有傳述祖少而聰敏有風檢好屬文為先逹所稱釋褐司空行参軍歴司徒左長史尚書侍中太常卿丞相右長史天保初累遷太子少保左光禄大夫儀同三司兖州刺史時穆子容為廵省使歎曰古人有言聞伯夷之風貪夫亷懦夫有立志今於鄭兖州見之矣遷光州刺史初述祖父為兖州於城南小山起齋亭刻石為記述祖時年九嵗及為刺史往尋舊跡得一破石有銘云中岳先生鄭道昭之白雲堂述祖對之嗚咽悲動羣僚有人入市盗布其父怒曰何忍欺吾君執之以歸首述祖特原之自是境内無盗人歌之曰大鄭公小鄭公相去五十載風教猶相同述祖能鼓琴自造龍吟十弄云嘗夢異人彈琴寤而寫得當時以為絶妙所在好為山池松竹交植盛餚饌以待賓客將迎不倦未貴時在鄉单馬出行忽有騎者數百見述祖皆下馬曰公在此行列而拜述祖顧問從人皆不見心甚異之未㡬被徵終歴顯位及疾篤乃自言之且曰吾今老矣一生富貴足矣以清白之名遺子孫死無所恨前後行瀛殷冀滄趙定六州事正除懐兖光三州刺史又重行殷懷趙三州刺史所在有惠政天統元年卒於州年八十一贈開府儀同三司中書監北豫州刺史諡平簡公述祖女為趙郡王叡妃述祖常坐受王拜命坐王乃坐妃薨後王更娶鄭道䕃女王坐受道䕃拜王命坐乃敢坐王謂道䕃曰鄭尚書風德如此又貴重宿舊君不得並之述祖子元德多藝術官至琅琊太守述祖兄敬祖起家著作郎宗人鄭儼之敗也為鄉人所害敬祖子元禮字文規少好學愛文藻有名望文襄引為館客歴兼中書舎人南主客郎中太尉諮議参軍長廣樂陵二郡太守待詔文林館太子中舍人崔昻後妻元禮姊也魏收又昻之妺夫昻常持元禮數篇詩示盧思道乃曰㸔元禮比来詩詠亦當不減魏收思道答云未覺元禮賢於魏收且知妺夫踈於婦弟元禮齊亡入周大象中卒於始州别駕述祖弟遵祖秘書郎贈光州刺史遵祖弟順祖卒於太常丞述祖族子雛有識尚操行清整仕至膠州刺史初文宣為皇太子納其女為良娣雛時為尚書郎趙郡李祖昇兄弟㣲相敬憚楊愔奏授雛趙郡太守祖昇兄弟具服至雛門投刺拜謁文宣聞之喜笑曰足得殺李家兒矣袁聿脩字叔德陳郡陽夏人也父翻魏度支尚書撫軍將軍叔父躍車騎将軍太傅清河王懌文學聿脩出繼躍後七嵗遭喪居處禮若成人九嵗州辟主簿性深沈有識鑒清淨寡欲與物無競姨丈人尚書崔休深所知賞釋褐太保開府祭酒年十八領本州中正兼尚書度支郎中天保初除太子庶子以本官行博陵太守大有聲績逺近稱之累遷司徒左長史領兼御史中丞司徒録事参軍盧思道私貸庫錢三十萬聘太原王乂女為妻而王氏以先納陸孔文禮聘為定聿脩為首僚又國之司憲知而不劾免中丞尋遷祕書監天統中詔與趙郡王叡等議定五禮出為信州刺史即其本鄉也時久無例莫不榮之為政清靖不言而化自長吏以下爰逮鰥寡孤㓜皆得其歡心武平初御史普出過諸州梁鄭兖豫疆境連接州之四面悉有舉劾惟不到信州其見知如此及解代還京民庶道俗追列滿道或将酒脯涕泣流連競欲逺送時既盛暑恐其勞勩徃徃為之駐馬隨舉一酌示領其意辭謝令還後州民鄭播宗等七百餘人請為立碑歛縑布數百疋託中書侍郎李德林為文以紀功德府省為奏勑報許之尋除都官尚書儀同三司聿脩少年和平温潤素流之中最有規檢以名家子歴任清華時望多相器待許其風鑒在郎署之日時趙彦深為水部郎中同在一院因成交友彦深後重被沙汰停私門生藜藿聿脩猶以故情音問來往彦深任用銘戢甚深雖人才無愧盖亦由彦深接引為吏部尚書以後自以物望得之初馮子琮以僕射攝選㛰姻相尋聿脩常非笑之語人云馮公營㛰日不暇給及自居選曹亦不能免時論以為地勢然也素品孤官頗有怨響然在官亷慎當時少匹魏齊世臺郎多不免交通餉饋聿脩為尚書郎十年未曾受斗酒之饋尚書邢邵與聿脩舊欵每於省中語戲常呼聿脩為清郎太寧初聿脩以太常少卿出使廵省仍令考校官人得失經兖州時邢邵為刺史别後遣送白紬為信聿脩不受與邵書云今日仰遇有異嘗行瓜田李下古人所慎多言譬之防川願得此心不貽厚責邵亦忻然領解報書云一日之贈率爾不思老夫忽忽竟不及此謹承來㫖吾無間然弟昔為清郎今日復作清卿矣及在吏部屬政衰道喪恐違忤要勢禍不旋踵雖以清白自守猶不免請謁之累齊亡入周授儀同大将軍吏部下大夫東京司宗中大夫隋開皇初加上儀同遷東京都官尚書東京廢入朝除都官尚書二年出為熊州刺史卒子知禮大業初卒於太子内舍人盧叔彪范陽涿人也父光宗魏尚書儀曹郎中有志尚兄觀及仲宣並以文章顯於世列在文苑傳叔彪少機悟豪率輕俠好竒䇿慕諸葛亮之為人為賀㧞勝荆州開府長史勝不用其計棄城奔梁叔彪歸本縣築室臨陂優游自適文襄降辟書辭疾不到天保初復徵不得已衣布裙乗露車至鄴楊愔徃候之以為司徒諮議稱疾不受孝昭即位召為中庶子問以世事叔彪勸討闗西畫地陳兵勢請立重鎮於平陽與彼蒲州相對深􅗂髙壘運糧積甲築城戍以相屬彼若閉闗不出則取其黄河以東長安窮䠞自然困死如彼出兵非十萬以上不為我敵所供糧食皆出闗内我兵士相代年别一番穀食豐饒運送不絶彼來求我我不應之彼退即乗其弊自長安以西民䟽城逺敵兵来往實難與我相持農作且廢不過二年彼自破矣帝深納之又願自居平陽成此謀畧帝命元文遥與叔彪参謀撰平西策一卷未㡬帝崩事遂寝武成踐阼遷太子詹事叔彪在鄉時有粟千石每至春夏鄉人無食者令自載取至秋任還其償都不計校然而嵗常得倍餘既在朝通貴自以年老兒子又多遂營一大屋曰歌於斯哭於斯魏收曾来詣之訪以京洛舊事不待食而起云難為子費叔彪留之良久食至但有粟飱葵菜木椀盛之片脯而已所將僕從亦盡設食一與此同齊滅歸范陽遭亂城陷與族弟士䆳皆以寒餒斃周将宇文神舉以二人有名德収而葬之源彪字文宗西平樂都人也祖懷魏贈司徒公父子恭贈司空公並有傳彪學渉機警少有名譽魏永安中以功賜爵臨頴縣伯天平四年為凉州大中正及文襄攝選沙汰諸臺郎以彪為尚書祠部郎中皇建二年累遷涇州刺史彪至以恩信待物甚得邉境之和為隣人所敬服前政遭抄掠者多被放遣累遷秦州刺史乗傳之府特給後部鼓吹時李貞聘陳陳主云齊朝還遣源涇州来在瓜歩真可謂通和矣武平三年授秘書監陳将吴明徹寇淮南歴陽瓜歩相尋失守趙彦深於起居省密訪彪以討捍之計彪答曰國家待遇淮南失之同於蒿箭以為宜以淮南委之王琳琳於曇頊不肯北面事之明矣彦深曰此誠良圗但以口舌争来十日已是不見從時事如此安可盡言因相顧流涕及齊平與陽休之等十八人入長安授儀同大将軍司成下大夫隋開皇中拜莒州刺史遇病去官卒彪以貴族子弟入升朝列才識敏贍以幹局見知然好游貴要之間時論以為善附㑹許惇字季良髙陽新城人也父䕶仕魏州主簿兄恂司徒諮議参軍惇清識敏速逹於從政位司徒主簿以明㫁見知時人號為入鐡主簿稍遷陽平太守時魏遷都於鄴陽平為畿郡軍國責辦賦歛無凖又勲貴屬請朝夕徵求惇並御之以道咸以無怨政為天下第一特加賞異圗形於闕詔頒天下歴魏尹齊梁二州刺史政並有治聲遷大司農㑹王思政入據頴城王師出討惇常督運無乏絶引洧水灌城惇之䇿也天保初遷殿中尚書惇美鬚髯下垂至帶省中號長鬛公文宣嘗因酒酣握惇鬚稱美遂以刀截之唯留一握惇懼因不復敢長人又號齊鬚公歴御史中丞膠州刺史司農大理二卿再為度支尚書太子少保少師光禄大夫開府儀同三司尚書右僕射特進賜爵萬年縣子食邑下邳郡幹惇年老致仕於家三年卒惇少純直晚更浮動齊朝體式本州大中正以京官為之乾明中邢邵為中書監徳望甚髙惇與邵競中正遂憑附宋欽道出邵為刺史朝議甚鄙薄之雖久處朝行歴官清顯與邢邵魏収陽休之崔劼徐之才比肩同立諸人或談説經史或吟詠詩賦更相嘲戲欣笑滿堂惇不好劇談又無學術或坐杜口或隠几而睡不為勝流所重子文紀武平末度支郎中文紀弟文經勤學方雅身無擇行口無戲言武平末殿中侍御史隋開皇初侍御史兼通直散騎常侍聘陳使副主爵侍郎卒於相州長史惇兄遜字仲譲有幹局乾明中平原太守卒贈信州刺史遜子文髙司徒掾宋世軌西河介休人也世為著姓父毓魏大中大夫世軌㓜自脩整好法律天保初歴三尚書三公二千石都官郎中兼并州長史執獄寛平多所全濟為都官郎中有囚事枉将送垂致法世軌遣騎追止之切奏其狀遂免稍遷廷尉少卿洛州人聚結欲劫河橋吏捕案之連諸元徒黨千七百人崔昻為廷尉以為反數年不斷及卋軌為少卿判其事為劫唯殺魁首餘從坐悉舎焉大理正蘇珍之以平幹知名寺中語曰决定嫌疑蘇珍之視表見裏宋世軌時人以為寺中二絶南臺囚到廷尉世軌多雪之仍移攝御史将問其濫状中尉畢義雲不送移往復不止世軌復上書極言義雲酷擅文宣引見二人親勅世軌曰我知臺欺寺久卿能執理抗衡但守此心勿慮不富貴勑義雲曰卿比所為誠合死以志在疾惡故且一恕仍顧謂朝臣曰此二人並我骨鯁臣也及卒廷尉御史諸繫囚皆哭曰宋廷尉死我等豈有生路贈光州刺史諡曰平無子兄世良以第五子朝基嗣李庻頓邱人也祖平魏尚書右僕射父諧大司農各有傳庻方雅好學甚有家風歴位尚書郎司徒掾以清辯知名常攝賔司接對梁客梁客徐陵深歎美焉庶生而天閹崔諶調之曰教弟種鬚以錐徧刺作孔挿以馬尾庶曰先以此方囘施貴族蓺眉有効然後樹鬚世傳諶門有惡疾以呼沲為墓田故庶言及之邢子才在旁大笑除臨漳令魏書之出庶與盧斐王松年等訟其不平魏收書王慧龍自云太原人又書王瓊不善事以盧同附盧元傳李平為陳留人云其家貧賤故斐等讙訟語楊愔云魏收合誅愔黨助魏故遂白文宣庶等並髠頭鞭杖二百庶死於臨漳獄中庶兄岳痛之終身不歴臨漳縣門庶妻元羅女也庶亡後岳使妻伴之寝宿積五年元氏更適趙起嘗夢庶謂己曰我薄福託劉氏為女明旦當出彼家甚貧恐不能見養夫妻舊恩故來相見告君乞取我劉家在七帝坊十字街南東入窮巷是也元氏不應庶曰君似懼趙公意我自説之於是起亦夢焉起寤問妻言之符合遂持錢帛躬往求劉氏如所夢得之養女長而嫁焉庶弟蔚少清秀有襟期倫理渉觀史傳兼屬文詞昆季並尚風流長裾廣䄂從容甚美然頗渉踈放唯蔚能自持公幹理甚有時譽坐兄庶事徙平州後還位尚書左中兵郎中仍聘陳使副江南以其父曽經将命甚重焉還坐将人度江私市除名後卒於祕書丞士友悼惜之蔚弟若聰敏頗傳家業風采詞令有聲鄴下坐兄庶事徙臨海乾明初追還後兼散騎常侍大被親狎加儀同三司若性滑稽善諷誦數奉㫖詠詩并使説外間世事可笑樂者凡所話談每多㑹㫖嘗在省中趨而前却對答學奏事之象和士開聞而奏之帝每狎弄之武成以斛律金舊老每朝賜羊車上殿金曽使人奉啟若為舍人誤奏云在闕下詔命出羊車若重思知金不至竊言羊車鹿車何所迎帝聞亦笑而不責又帝於後園􅊰武令若為吴将皇后皆出引若當前觀其進止俯仰事罷遣使謝之厚加賞賜韓長鸞等忌惡之密構其短坐免官未㡬詔復本官隋開皇中卒於秦王府諮議李公緒字穆叔趙郡平棘人也父藉之魏司徒諮議参軍大中大夫公緒性聰敏博通經傳魏末為兾州司馬屬疾去官絶迹賛皇山天保初以侍御史徵不就公緒沈𡨕樂道又不閑時務故誓心不仕尤明天文善圖緯之學嘗謂子弟曰吾觀齊之分野福德不多國家祚終四七及齊亡嵗距天保之元二十八年矣公緒雅好著書撰典言十卷禮質疑五卷喪服章句一卷古今畧記二十卷元子五卷趙記八卷趙語十二卷並行於世公緒既善陰陽之術有祕記傳之子孫而不好焉臨終取以投火子少通有學行公緒弟槩字季莭少好學然性倨傲每對諸兄弟露髪披服畧無少長之禮為文襄大将軍府行参軍進側集題云富春公主撰閑緩不任事每被譏訶除殿中侍御史脩國史後為太子舎人為副使聘於江南江南多以僧寺停客出入常袒露還坐事解後卒於并州功曹参軍撰戰國春秋及音譜並行於世又自簡詩賦二十四首謂之逹生丈人集其序曰逹生丈人者生於戰國之世爵里姓名無聞焉爾時人揆其行已彊為之號頗好屬文成輙棄藁常持論文云古人有言性情生於慾又曰人之性靜慾實汨之然則性也者所受於天神識是也故為形骸之主情也者所受於性嗜慾是也故為形骸之役由此言之性情之辯斷焉殊異故其身㤗則均齊死生塵垢名利縱酒恣色所以養情否則屏除愛著擯落肢體収視反聽所以養識是以遇榮樂而無染遭厄窮而不悶或出人間或栖物表逍遥寄托莫知所終裴澤河東聞喜人祖夙魏河東太守父鑒廷尉卿澤頗有文學孝昭初為齋師奏舎人孝昭崩魏收議諡為恭烈皇帝澤正色抗論曰魏收死後亦不肯為恭烈之諡何容以擬大行且比皇太后不豫先帝飱寝失常聖躬貶損今者易名必湏加孝遂改為孝昭因此忤㫖出為廣州司馬尋歴位中書侍郎兼給事黄門侍郎以漏泄免後為散騎侍郎尋為誹謗大臣趙彦深等兼詠石榴詩微以託意有人以奏武成武成决杖六十髠頭除名後主即位為清河郡守與祖珽有舊珽奏除尚書左丞又引為兼黄門執政疾其祖珽之黨與崔季舒等同見誅澤本勁直無所回避及被出追還折莭和光然好戲笑無規檢故頻敗妻鉅鹿魏氏恩好甚隆不能暫相離澤每從駕其妻不宿亦至性彊立時人以為健婦通志卷一百五十五
