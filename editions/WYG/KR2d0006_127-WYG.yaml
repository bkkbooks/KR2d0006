body:
  text: 通志卷一百十一上宋右廸功郎鄭樵漁仲撰列傳第二十四上後漢杜根成翊世欒巴劉陶李雲劉瑜尹勲謝弼虞詡傅􅝂蓋勲臧洪陳容張衡馬融蔡邕左雄周舉子勰黃瓊孫琬荀淑子爽孫悅韓韶鍾皓陳寔子紀杜根字伯堅潁川定陵人也父安字伯夷少有志節年十三入太學號竒童京師貴戚慕其名或遺之書安不𤼵悉壁藏之及後捕案貴戚賓客安開壁出書印封如故竟不離其患時人貴之位至巴郡太守政甚有聲根性方實好絞直永初元年舉孝廉為郎中時和熹鄧后臨朝權在外戚根以安帝年長宜親政事乃與同時郎上書直諫太后大怒收執根等令盛以縑囊於殿上撲殺之執法者以根知名私語行事人使不加力既而載出城外根得蘇太后使人檢視根遂詐死三日目中生蛆因得逃竄為宜城山中酒家保積十五年酒家知其賢厚敬待之及鄧氏誅左右皆言根等之忠帝謂根已死乃下詔布告天下録其子孫根方歸鄉里徵詣公車拜侍御史初平原郡吏成翊世亦諫太后歸政坐抵罪與根俱徵擢為尚書郎並見納用或問根曰往者遇禍天下同義知故不少何至自苦如此根曰周旋人間非絶跡之處邂逅𤼵露禍及知親故不為也順帝時稍遷濟隂太守去官還家年七十八卒翊世字季明少好學深明道術延光中中常侍樊豐帝乳母王聖共譖皇太子廢為濟隂王翊世連上書訟之又言樊豐王聖誣罔之狀帝既不從而豐等陷以重罪下獄當死有詔免官歸本郡及濟隂王立是為順帝司空張皓辟之皓以翊世前訟太子之廢薦為議郎翊世自以其功不顯恥於受位自劾歸三公比辟不應尚書僕射虞詡雅重之欲引與共參朝政乃上書薦之徵拜議郎後尚書令左雄僕射郭䖍復舉為尚書在朝正色百僚敬之欒巴字叔元魏郡内黄人也好道順帝時以宦者給事掖庭補黄門令非其好也性質直學覽經典雖在中官不與諸常侍交接後陽氣通暢白上乞退擢拜郎中四遷桂陽太守以郡處南垂不嫻典訓為吏民定㛰姻喪紀之禮立學校以奬進之雖幹吏卑末皆課令習讀程試殿最隨能升授政事明察視事七年以病乞骸骨荆州刺史李固薦巴治迹徵拜議郎守光禄大夫與杜喬周舉等八人徇行州郡巴使徐州還再遷豫章太守郡土多山川鬼怪小民常破貲産以祈禱巴素有道術能役鬼神乃悉毁壞房祀翦理姦巫於是妖異自消百姓始頗為懼終皆安之遷沛相所在有績徵拜尚書會帝崩營起憲陵陵左右有小民墳冡主者欲有所侵毁巴連上書苦諫時梁太后臨朝詔詰巴曰大行皇帝晏駕有日卜擇陵園務從省約塋域所極裁二十頃而巴虛言主者壞人冡墓事既非實寢不報下巴猶固遂其愚復上誹謗茍肆狂瞽益不可長巴坐下獄抵罪禁錮還家一十餘年靈帝即位大將軍竇武太傅陳蕃輔政徵拜議郎蕃武被誅巴以其黨復謫為永昌太守以功自劾辭病不行上書極諫理陳竇之寃帝怒下詔切責收付廷尉巴自殺子賀官至雲中太守劉陶字子竒一名偉潁川潁隂人濟北貞王勃之後陶為人居間不修小節所與交友必也同志好尚或殊富貴不求合情趣茍同貧賤不易意同宗劉愷以雅徳知名獨深器陶時大將軍梁冀專朝而桓帝無子連嵗荒饑災異數見陶時遊太學乃上疏陳事曰臣聞人非天地無以為生天地非人無以為靈是故帝非人不立人非帝不寧天之與帝帝之與人猶頭之與足相須而行也伏惟陛下中天稱號襲常存之慶目不視鳴條之事耳不聞檀車之聲天災不有痛於肌膚震食不即損於聖體故蔑三光之謬輕上天之怒伏念高祖起自布衣合散扶傷克成帝業功亦勤矣流福遺祚至於陛下而陛下忽高祖之勤妄假利器委授國柄使羣醜刑𨽻芟刈小民彫弊諸夏虐流逺近故天降衆異以戒陛下陛下不悟而競令虎豹窟於麑場豺狼乳於春囿斯豈唐咨禹稷益典朕虞議物賦土蒸民之意哉又令牧守長吏上下交競封豕長蛇蠶食天下貨殖者為窮寃之䰟貧餒者作饑寒之鬼高門獲東觀之辜豐室罹妖叛之罪死者悲於窀穸生者戚於朝野是愚臣所為咨嗟長懷歎息者也且秦之將亡正諫者誅諛進者賞嘉言結於忠舌國命出於䜛口擅閻樂於咸陽授趙高以車府權去已而不知威離身而不顧古今一揆成敗同軌願陛下逺覽彊秦之傾近察哀平之變得失昭然禍福可見臣又聞危非仁不扶亂非智不救故武丁得傅說以消鼎雉之災周宣用申甫以濟夷厲之荒竊見故冀州刺史南陽朱穆前烏桓校尉臣同郡李膺皆履正清平貞高絶俗穆前在冀州奉憲操平摧破姦黨掃清萬里膺歴典牧守正身率下及掌戎馬威揚朔北斯實中興之良佐國家之柱臣也宜還本朝挾輔王室上齊七曜下鎮萬國臣敢吐不時之議於諱言之朝猶冰霜見日必至消㓕臣始悲天下之可悲今天下亦悲臣之愚惑也書奏不省時有上書言人以貨輕錢薄故致貧困宜改鑄大錢事下四府羣僚及太學能言之士陶上議曰聖王承天制物與人行止建功則衆悦其事興戎而師樂其旅是故靈臺有子來之人武旅有鳬藻之士皆舉合時宜動順人道也臣伏讀鑄錢之詔平輕重之議訪覃幽微不遺窮賤是以藿食之人謬延逮及蓋以為當今之憂不在於貨在乎民饑夫生養之道先食後民是以先王觀象育物敬授民時使男不逋畝女不下機故君臣之道行王路之教通由是言之食者乃有國之所寳生民之至貴也竊見比年以來良田盡於蝗螟之口杼柚空於公私之求所急朝夕之餐所患靡盬之事豈謂錢貨之厚薄銖兩之輕重哉就使當今沙礫化為南金瓦石變為和玉使百姓渴無所飲饑無所食雖皇羲之純德唐虞之文明猶不能保蕭墻之内也蓋民可百年無貨不可一朝有饑故食為至急也議者不逹農殖之本多言鑄冶之便或欲因縁行詐以賈國利國利將盡取者爭競造鑄之端於是乎生蓋萬人鑄之一人奪之猶不能給况一人鑄之則萬人奪之乎雖隂陽為炭萬物為銅役不食之民使不饑之士猶不能足無厭之求也夫欲民殷財阜要在止役禁奪則百姓不勞而足陛下聖德愍海内之憂戚傷天下之艱難欲鑄錢齊貨以救其弊此猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必至焦爛願陛下寛鍥薄之禁後鑄冶之議聽民庶之謡吟問路叟之所憂瞰三光之文曜視山河之分流天下之心國家大事粲然可見無有遺惑者矣臣甞誦詩至於鴻鴈于野之勞哀勤百堵之事每喟然長懷中篇而嘆近聽征夫饑勞之聲甚於斯歌是以追悟匹夫吟魯之憂始於此乎見白駒之意屏營傍偟不能監寐伏念當今地廣而不得耕民衆而無所食羣小競起秉國之位鷹揚天下鳥鈔求飽吞肌及骨並噬無厭誠恐卒有役夫窮匠起於板築之間投斤攘臂登高逺呼使愁怨之民響應雲合八方分崩中夏魚潰雖方尺之錢何能有救其危猶舉函牛之鼎絓纖枯之木詩人所以眷然顧之澘焉出涕者也臣東野狂闇不逹大義縁廣及之時對過所問知必以身脂鼎鑊為天下笑帝竟不鑄錢後陶舉孝廉除順陽長縣多姦猾陶到官宣募吏民有氣力猛勇能以死易生者不拘亡命姦臧於是剽輕劒客之徒過晏等十餘人皆來應募陶責其先過要以後効使各結所厚少年得數百人皆嚴兵待命於是覆案姦軌所發若神以病免吏民思而歌之曰邑然不樂思我劉君何時復來安此下民陶明尚書春秋為之訓詁推三家尚書及古文是正文字七百餘事名曰中文尚書頃之拜侍御史靈帝宿聞其名數引納之時鉅鹿張角偽託大道妖惑小民陶與奉車都尉樂松議郎袁貢連名上疏言之曰聖王以天下耳目為視聽故能無不聞見今張角支黨不可勝計前司徒楊賜奏下詔書切勑州郡䕶送流民㑹賜去位不復捕録雖㑹赦令而謀不解散四方私言云角等竊入京師覘視朝政鳥聲獸心私共鳴呼州郡忌諱不欲聞之但更相告語莫敢公文宜下明詔重募角等賞以國土有敢回避與之同罪帝殊不悟方詔陶次第春秋條例明年張角反亂海内鼎沸帝思陶言封中陵鄉侯三遷尚書令以所舉將為尚書難為齊列乞從冗散拜侍中以數切諫為權臣所憚徙為京兆尹到職當出修宮錢直千萬陶既清平而恥以錢買職稱疾不聽政帝宿重陶才原其罪徵拜諫議大夫是時天下日危㓂賊方熾陶憂亂復上疏曰臣聞事之急者不能安言心之痛者不能緩聲竊見天下前遇張角之亂後遭邊章之㓂每聞羽書告急之聲心灼内熱四體驚悚今西羌逆類多私署將帥皆多段熲時吏曉習戰陳識知山川變詐萬端臣常懼其輕出河東馮翊鈔西軍之後東之函谷據阸高望今果已攻河東恐遂轉更豕突上京如是則南道斷絶車騎之軍孤立關東破膽四方動摇威之不來呌之不應雖有田單陳平之䇿計無所用臣前驛馬上便宜急絶諸郡賦調冀尚可安事付主者留連至今莫肯求問今上郡之民皆以奔亡南出武關北徙壺谷冰駭風散唯恐在後今其存者尚十三四軍吏士民悲愁相守民有百走退死之心而無一前鬬生之計西冦浸前去營咫尺胡騎分布已至諸陵將軍張温天性精勇而主者旦夕迫促軍無後殿假令失利其敗不救臣自知言數見厭而言不自裁者以為國安則臣蒙其慶國危則臣亦先亡也謹復陳當今要急八事乞須臾之間深垂省納其八事大較言天下大亂皆由宦官宦官事急共䜛陶曰前張角事發詔書示以威恩自此以來各各改悔今者四方安静而陶疾害聖政專言妖孽州郡不上陶何由知疑陶與賊通情於是收陶下黄門北寺獄掠治日急陶自知必死對使者曰朝廷前封臣云何今反受邪譖恨不與伊呂同疇而以三仁為軰遂閉氣而死天下莫不痛之陶著書數十萬言又作七曜論匡老子反韓非復孟軻又上書言當世便事條教賦奏書記疑辯凡百餘篇時司徒陳耽亦以非罪與陶俱繫耽以忠正稱歴位三司光和五年詔公卿採謠言舉刺史二千石為民蠧害者時太尉許戫司空張濟承望内官受取貨賂其宦官子弟賓客雖貪汙穢濁皆不敢問而虛糺邊逺小郡清修有惠化者二十六人吏人詣闕陳訴耽與議郎曹操上言公卿所舉率黨其私所謂放鴟梟而囚鸞鳳其言忠切帝以讓戫濟由是諸坐謠言徵者悉拜議郎宦官怨之遂誣陷耽死獄中李雲字行祖甘陵人也性好學善隂陽初舉孝廉再遷白馬令桓帝延熹二年誅大將軍梁冀而中常侍單超等五人皆以誅梁冀功並封列侯專權選舉又立掖庭民女亳氏為皇后數月間后家封者四人賞賜巨萬是時地數震裂衆災頻降雲素剛直憂國將危心不能忍乃露布上書移副三府曰臣聞皇后天下母德配坤靈得其人則五氏來備不得其人地動摇宫比年災異可謂多矣皇天之戒可謂至矣高祖受命至今三百六十四歲君期一周當有黄精代見姓陳項虞田許氏不可令此人居太尉太傅典兵之官舉厝至重不可不慎班功行賞宜應其實梁冀雖持權專擅虐流天下今以罪行誅猶召家臣搤殺之耳而猥封謀臣萬戸以上高祖聞之得無見非西北列將得無解體孔子曰帝者諦也今官位錯亂小人諂進財貨公行政化日損尺一拜用不經御省是帝欲不諦乎帝得奏震怒下有司逮雲詔尚書都䕶劒㦸送黄門北寺獄使中常侍管霸與御史廷尉雜考之時𢎞農五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死帝愈怒遂并下廷尉大鴻臚陳蕃上疏救雲曰李雲所言雖不識禁忌干上逆㫖其意歸於忠國而已昔高祖忍周昌不諱之諫成帝赦朱雲腰領之誅今日殺雲臣恐剖心之譏復議於世矣故敢觸龍鱗冒昧以請太常楊秉洛陽市長沐茂郎中上官資並上疏請雲帝恚甚有司奏以為大不敬詔切責蕃秉免歸田里茂資貶秩二等時帝在濯龍池管霸奏雲等事霸跪言曰李雲野澤愚民杜衆郡中小吏出於狂戅不足加罪帝謂霸曰帝欲不諦是何等語而常侍欲原之邪顧使小黄門可其奏雲衆皆死獄中後冀州刺史賈琮使行部過祠雲墓刻石表之劉瑜字季節廣陵人也高祖父廣陵靖王父辯清河太守瑜少好經學尤善圖讖天文歴算之術州郡禮請不就延熹八年太尉楊秉舉賢良方正及到京師上書陳事曰臣瑜自念東國鄙陋得以豐沛枝允被䝉復除不給卒伍故太尉楊秉知臣竊闚典籍猥見顯舉誠冀臣愚直有補萬一而秉忠謨不遂命先朝露臣在下土聽聞歌謡驕臣虐政之事逺近呼嗟之音竊為辛楚泣血漣如幸得引録備答聖問泄寫至情不敢庸囘誠願陛下且以須臾之慮覽今往之事人何為咨嗟天曷為變動蓋諸侯之位上法四七垂文炳耀關之盛衰者也今中官邪孽比肩裂土皆競立允嗣繼體傳爵或乞子疎屬或買兒市道殆乖開國承家之義古者天子一娶九女娣姪有序河圖授嗣正在九房今女嬖令色充積閨帷皆當盛其玩飾冗食空宮勞散精神生長六疾此國之費也生之傷也且天地之性隂陽正紀隔絶其道則水旱為并詩云五日為期六日不詹怨曠作歌仲尼所録况從幼至長幽藏殁身又常侍黄門亦廣妻娶怨毒之氣結成妖眚行路之言官𤼵畧人女取而復置轉相驚懼孰不悉然無縁空生此謗鄒衍匹夫把氏匹婦尚有城崩霜隕之異况乃羣軰咨怨能無感乎昔秦作阿房國多刑人今第舍増多窮極竒巧掘山攻石不避時令促以嚴刑威以正法民無罪而覆入之民有田而覆奪之州郡官府各自考事姦情賕賂皆為吏餌民愁鬱結起入賊黨官輙興兵誅討其罪貧困之民或有賣其首級以要酬賞父兄相代殘身妻孥相視分裂窮之如彼伐之如此豈不痛哉又陛下以北辰之尊神器之寳而㣲行近習之家私幸宦官之舍賓客市買熏灼道路因此暴縱無所不容今三公在位皆博逹道藝而各正諸己莫或匡益者非不智也畏死罰也惟陛下設置七臣以廣諫道及開東序金縢史官之書從堯舜禹湯文武致興之道逺侫邪之人放鄭衛之聲則正致和平德感祥風矣臣悾悾推情言不足採懼以觸忤征營慴悸於是特詔召瑜問災咎之徵指事案經讖以對執政者欲令瑜依違其辭而更䇿以他事瑜復悉心以對八千餘言有切於前帝竟不能用拜為議郎及帝崩大將軍竇武欲大誅宦官乃引瑜為侍中又以侍中尹勲為尚書令共同謀畫及武敗瑜勲並被誅事在武傳勲字伯元河南人從祖睦為太尉睦孫頌為司徒勲為人剛毅直方少時每讀書得忠臣義士之事未甞不投書而仰歎自以行不合於當時不應州郡公府禮命桓帝時以有道徵四遷尚書令延熹中誅大將軍梁冀帝召勲部分衆職甚有方畧封宜陽鄉侯僕射霍諝尚書張敬歐陽參李偉虞放周永並封亭侯勲後再遷至九卿以病免拜為侍中八年中常侍具瑗左悺等有罪免奪封邑因黜勲等爵瑜誅後宦官悉焚其上書以為訛言子琬傳瑜學明占候能著災異舉方正不行謝弼字輔宣東郡武陽人也中直方正為鄉邑所宗師建寧二年詔舉有道之士弼與東海陳敦元菟公孫度俱對䇿皆除郎中時青蛇見前殿大風拔木詔公卿以下陳得失弼上封事曰臣聞和氣應於有德災異生乎失政上天告譴則王者思其愆政道或虧則姦臣當其罰夫蛇者隂氣所生鱗者甲兵之符也鴻範傳曰厥極弱時則有蛇龍之孽又熒惑守亢裴囘不去有近臣謀亂𤼵於左右不知陛下所與從容帷幄之内親信者為誰宜急斥黜以消天戒臣又聞惟虺惟蛇女子之祥伏惟皇太后定䇿宮闥援立聖明書云父子兄弟罪不相及竇氏之誅豈宜咎延太后幽隔空宫愁感天心如有霧露之疾陛下當何面目以見天下昔周襄王不能敬事其母戎狄遂至交侵孝和皇帝不絶竇氏之恩前世以為美談禮為人後者為之子今以桓帝為父豈得不以太后為母哉援神契曰天子行孝四夷和平方今邊境日蹙兵革蜂起自非孝道何以濟之願陛下仰慕有虞蒸蒸之孝俯思凱風慰母之念臣又聞爵賞之設必酬庸勲開國承家小人勿用今功臣久外未䝉爵秩阿母寵私乃享大封大風雨雹亦由於兹又故太傅陳蕃輔相陛下勤身王室夙夜匪懈而見陷羣邪一旦誅滅其為酷濫駭動天下而門生故吏並離徙錮蕃身已往人百何贖宜還其家屬解除禁錮夫台宰重器國命所繼今之四公唯司空劉寵斷斷首善餘皆素餐致冦之人必有折足覆餗之凶可因災異並皆罷黜徵故司空王暢長樂少府李膺並居政事庶災變可消國祚惟永臣山藪頑闇未達國典䇿曰無有所隠敢不盡愚用忘諱忌伏惟陛下裁其誅罰左右惡其言出為廣陵府丞去官歸家中常侍曹節從子紹為東郡太守忿疾於弼遂以他罪收考掠案死獄中時人悼傷焉初平二年司𨽻校尉趙謙上書訟弼忠節求報其怨魂乃收紹斬之虞詡字升卿陳國武平人也祖父經為郡縣獄吏案法平允務存寛恕每冬月上其狀恒流涕隨之常稱曰東海于公高為里門而子定國卒至丞相吾治獄六十年雖不及于公其庶幾乎子孫何必不為九卿邪故字曰升卿詡年十二能通尚書早孤孝養祖母縣舉順孫國相竒之欲以為吏詡辭曰祖母九十非詡不養相乃止後祖母終服闋辟太尉李修府拜郎中永初四年羌胡反亂殘破并凉大將軍鄧騭以軍役方費事不相贍欲棄凉州并力北邊乃㑹公卿集議騭曰譬若衣敗壞一以相補猶有所完若不如此將兩無所保識者咸同詡聞之乃説李修曰竊聞公卿定䇿當棄凉州求之愚心未見其便先帝開拓土宇劬勞後定而今憚小費舉而棄之凉州既棄即以三輔為塞則園陵單外此不可之甚也諺曰關西出將關東出相觀其習兵壯勇實過餘州今羌胡所以不敢入據三輔為腹心之患者以凉州在後故也其土人所以推鋒執銳無反顧之心者為臣屬於漢故也若棄其境域徙其人庶安土重遷必生異志如使豪雄相聚席卷而東雖賁育為卒太公為將猶恐不及當禦議者喻以補衣猶有所完詡恐其疽食侵滛而無限極棄之非計修曰吾意不及此㣲子之言幾敗國事然則計當安出詡曰今凉土擾動人情不安竊憂卒然有非常之變誠宜令四府九卿各辟彼州數人其牧守令長子弟皆除為冗官外以勸厲答其功勤内以拘致防其邪計修善其言更集四府皆從詡議於是辟西州豪傑為掾屬拜牧守長吏子弟為郎以安慰之鄧騭兄弟以詡異其議因此不平欲以吏法中傷詡後朝歌賊寗季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長故舊皆弔曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇槃根錯節何以别利器乎始到謁河南太守馬稜稜勉之曰君儒者當謀謨廟堂反在朝歌邪詡曰初除之日士大夫皆弔勉以詡籌之知其無能為也朝歌者韓魏之郊背太行臨黄河去敖倉百里而青冀之民流亡萬數賊不知開倉招衆刼庫兵守城臯斷天下右臂此不足憂也今其衆新盛難與爭鋒兵不厭權願寛假轡䇿勿有所拘閡而已及到官設令三科以募求壯士自掾史以下各舉所知其攻刼者為上傷人偷盗者次之帯喪服而不事家業為下收得百餘人詡為饗㑹悉貰其罪使入賊中誘令刼掠乃伏兵以待之遂殺賊數百人又潛遣貧民能縫者傭作賊衣以采綖縫其裾為幟有出市里者吏輙禽之賊由是駭散咸稱神明遷懷令後羌冦武都鄧太后以詡有將帥之畧遷武都太守引見嘉德殿厚加賞賜羌乃率衆數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日増倍之羌不敢逼或問曰孫臏減竈而君増之兵法日行不過三十里以戒不虞而今日行且二百餘里何也詡曰虜衆多吾兵少徐行則易為所及速進則彼不測虜見竈日増必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示彊勢有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日詡乃令軍中使彊弩勿𤼵而潛𤼵小弩羌以為矢力弱不能至并力急攻詡於是使二十彊弩共射一人𤼵無不中羌大震退詡因出城奮擊多所傷殺明日悉陳其衆令從東郭門出北郭門入貿易衣服廻轉數周羌不知其數更相恐動詡計賊當退乃遣五百人於淺水設伏候其走路虜果大奔因掩擊大破之斬獲甚衆賊由是敗散南入益州詡乃占相地勢築營壁二百八十所招還流亡假振貧民郡遂以安先是運道艱險舟車不通驢馬負載僦五致一詡乃自將吏士案行川谷自沮至下辯數十里中皆燒石翦木開漕船道以人僦直雇借傭者於是水運通利歲省四千餘萬詡始到郡戸裁盈萬及綏聚荒餘招還流散二三年間遂至増四萬餘戸鹽米豐賤十倍於前坐法免永建元年代陳禪為司𨽻校尉數月間奏太傅馮石太尉劉熹中常侍程璜陳秉孟生李閏等百官側目號為苛刻三公劾奏詡盛夏多拘繫無辜為吏人患詡上書曰法禁者俗之隄防刑罰者人之衘轡今州曰任郡郡曰任縣更相委逺百姓怨窮以茍容為賢盡節為愚臣所𤼵舉贓罪非一二府恐為臣所奏遂加誣罪臣將從史魚死即以屍諫耳順帝省其章乃為免司空陶敦時中常侍張防特用權勢每請託受取詡輙案之而屢寢不報詡不勝其憤乃自繫廷尉奏言曰昔孝安皇帝任用樊豐遂交構嫡統幾亡社稷今者張防復弄威柄國家之禍將重至矣臣不忍與防同朝謹自繫以聞無令臣襲楊震之迹書奏防涕泣訴帝詡坐論輸左校防必欲害之二日之中傳考四獄獄吏勸詡自引詡曰寧伏歐刀以示逺近宦者孫程張賢等知詡以忠獲罪乃相率奏乞陛見程曰陛下始與臣等造事之時常疾姦臣知其傾國今者即位而復自為何以非先帝乎司𨽻校尉虞詡為陛下盡忠而更被拘繫常侍張防贓罪明正反構忠良今客星守羽林其占宫中有姦臣宜急收防送獄以塞天變下詔出詡還假印綬時防立在帝後程乃叱防曰姦臣張防何不下殿防不得已趨就東廂程曰陛下急收防無令從阿母求請帝問諸尚書尚書賈朗素與防善證詡之罪帝疑焉謂程曰且出吾方思之於是詡子顗與門生百餘人舉幡候中常侍高梵車叩頭流血訴言枉狀梵乃入言之防坐徙邊賈朗等六人或徙或黜即日赦出詡程復上書陳詡有大功語甚激切帝感悟復徵拜議郎數日遷尚書僕射是時長吏二千石聽百姓讁罰者輸贖號為義錢託為貧人儲而守令因以聚歛詡上疏曰元年以來貧百姓章言長吏受取百萬以上者匈匈不絶讁罰吏人至數千萬而三公刺史少所舉奏尋永平章和中州郡以走卒錢給貸貧人司空劾案州及郡縣皆坐免黜今宜遵前典蠲除權制於是詔書下詡章切責州郡讁罰輸贖自此而止先是寧陽主簿詣闕訴其縣令之枉積六七歲不省主簿乃上書曰臣為陛下子陛下為臣父臣章百上終不見省臣豈可北詣單于以告怨乎帝大怒持章示尚書尚書遂劾以大逆詡駮之曰主簿所訟乃君父之怨百上不逹是有司之過愚蠢之人不足多誅帝納詡言笞之而已詡因謂諸尚書曰小民有怨不逺千里斷髮刻肌詣闕告訴而不為理豈臣下之義君與濁長吏何親而與怨民何仇乎聞者皆慙詡又上言臺郎顯職仕之通階今或一郡七八或一州無人宜令均平以厭天下之望及諸奏議多見從用詡好刺舉無所囘容數以此忤權戚遂九見譴考三遭刑罰而剛正之性終老不屈永和初遷尚書令以公事去官朝廷思其忠復徵之㑹卒臨終謂其子恭曰吾事君直道行已無愧所悔者為朝歌長時殺賊數百人其中何能不有寃者自此二十餘年家門不増一口斯獲罪於天恭有俊才官至上黨太守傅燮字南容北地靈州人也本字幼起慕南容之三復白圭乃易字焉身長八尺有威容少師事太尉劉寛再舉孝廉聞所舉郡將喪乃棄官行服後為䕶軍司馬與左中郎皇甫嵩俱討賊張角燮素疾中官既行因上疏曰臣聞天下之禍不由於外皆興於内是故虞舜升朝先除四凶然後用十六相明惡人不去善人無由進也今張角起於趙魏黄巾亂於六州此皆釁𤼵蕭墻而禍延四海也臣受戎任奉辭伐罪始到潁川戰無不尅黄巾雖甚不足為廟堂憂也臣之所懼在於治水不自其源末流彌増其廣耳陛下仁德寛容多所不忍故閹䜿弄權忠臣不進誠使張角梟夷黄巾變服臣之所憂甫益深耳何者夫邪正之人不宜共國亦猶冰岸不可同器彼知正人之功顯而危亡之兆見皆巧辭飾説共長虛偽夫孝子疑於屢至市虎成於三夫若不詳察真偽忠臣將復有杜郵之戮矣陛下宜思虞舜四罪之舉速行䜛侫放殛之誅則善人思進姦凶自息臣聞忠臣之事君猶孝子之事父也子之事父焉得不盡其情使臣身備鈇鉞之誅陛下少用其言國之福也書奏宦者趙忠見而忿惡及破張角燮功多當封忠訴譖之靈帝猶識爕言得不加罪竟亦不封以為安定都尉以疾免後拜議郎㑹西羌反邊章韓遂作亂隴右徵𤼵天下役賦無已司徒崔烈以為宜棄涼州詔㑹公卿百官烈堅執先議燮厲言曰斬司徒天下乃安尚書郎楊贊奏燮廷辱大臣帝以問燮燮對曰昔冒頓至逆也樊噲為上將願得十萬衆横行匈奴中憤激思奮未失人臣之節顧計當從與不耳季布猶曰噲可斬矣夫凉州天下要衝國家藩衛高祖初興使酈商别定隴右世宗拓境列置四郡議者以為斷匈奴右臂今牧御失和使一州叛逆海内為之騷動陛下卧不安寢烈為宰相不念為國思所以弭之之䇿乃欲割棄一方萬里之土臣竊惑之若使左衽之虜得居此地士勁甲堅因以為亂此天下之至慮社稷之深憂也若烈不知是極蔽也知而故言是不忠也帝從燮議由是朝廷重其方格每公卿有缺為衆議所歸頃之趙忠為車騎將軍詔忠討論黄巾之功執金吾甄舉等謂忠曰傅南容前在東軍有功不侯故天下失望今將軍親當重任宜進賢理屈以副衆心忠納其言遣弟城門校尉延致殷勤延謂燮曰南容少答我常侍萬戸侯不足得也燮正色拒之曰遇與不遇命也有功不論時也傅燮豈求私賞哉忠愈懷恨然憚其名不敢害權貴亦多疾之是以不得留出為漢陽太守初郡將范津明知人舉燮孝廉及津為漢陽與燮交代合符而去鄉邦榮之津字文淵南陽人燮善䘏人叛羌懷其恩化並來降附乃廣開屯田列置四十餘營時刺史耿鄙委任治中程球球為通姦利士人怨之中平四年鄙率六郡兵討金城賊王國韓遂等燮知耿失衆必敗諫曰使君統政日淺人未知教孔子曰不教人戰是謂棄之今率不習之人越大隴之阻將十舉十危而賊聞大軍將至必萬人一心邊兵多勇其鋒難當而新合之衆上下未和萬一内變雖悔無及不若息軍養德明賞必罰賊得寛挺必謂我怯羣惡爭勢其離可必然後率已教之人討成擒之賊其功可坐而待也今不為萬全之福而就必危之禍竊為使君不取鄙不從行至狄道果有反者先殺程球次害鄙賊遂圍漢陽城中兵少糧盡燮猶固守時北胡騎數千隨賊攻郡皆夙懷燮恩共於城外叩頭求送燮歸鄉里子幹年十三從在官舍知燮性剛有髙義恐不能屈志以免進諫曰國家昬亂遂令大人不容於朝今天下已叛兵不足自守鄉里羌胡先被恩德欲令棄郡而歸願必許之徐至鄉里率厲義徒見有道而輔之以濟天下言未終燮慨然而歎呼幹小字曰别成汝知吾必死邪蓋聖達節次守節且殷紂之暴伯夷不食周粟而死仲尼稱其賢今朝廷不甚殷紂吾德亦豈絶伯夷世亂不能養浩然之志食禄又避其難吾行何之必死於此汝有才智勉之勉之主簿楊㑹吾之程嬰也幹咽哽不能復言左右皆泣下王國使故酒泉太守黄衍説燮曰成敗之事已可知矣先起上有霸王之業下成伊吕之勲天下非復漢有府君豈有意為吾屬師乎燮按劒叱衍曰若剖符之臣反為賊說邪遂麾左右進兵臨陣戰殁諡曰壯節侯幹知名位至扶風太守蓋勲字元固敦煌廣至人也家世二千石初舉孝廉為漢陽長史時武威太守倚恃權勢恣行貪横從事武都蘇正和案致其罪涼州刺史梁鵠畏懼貴戚欲殺正和以免其負乃訪之於勲勲素與正和有仇或勸勲可因此報隙勲曰不可謀事殺良非忠也乗人之危非仁也乃諫鵠曰夫紲食鷹鳶欲求其鷙鷙而亨之將何用哉鵠從其言正和喜於得免而詣勲求謝勲不見曰吾為梁使君謀不為蘇正和也怨之如初中平元年北地羌胡與邊章等寇隴右刺史左昌因軍興斷盗數千萬勲固諫昌怒乃使勲别屯河陽以拒賊鋒欲因軍事罪之而勲數有戰功邊章等遂攻金城殺郡守陳懿勲勸昌救之不從邊章等進圍昌於冀昌懼而召勲勲初與從事辛曽孔常俱屯阿陽及昌檄到曽等疑不肯赴勲怒曰昔莊賈後期穰苴奮劒今之從事豈重於古之監軍哉曽等懼而從之勲即率兵救昌到乃誚讓章等責以背叛之罪皆曰左使君若早從君言以兵臨我度可自改今罪已重不得降也乃解圍而去昌坐斷盗徵以扶風宋梟代之梟患多冦叛謂勲曰凉州寡於學術故屢致反暴今欲多寫孝經令家家習之庶或使民知義勲諫曰昔太公封齊崔杼殺君伯禽侯魯慶父簒位此二國豈乏學者今不急靜難之術遽為非常之事既足結怨一州又當取笑朝廷勲不知其可也梟不從遂奏行之果被詔書詰責坐以虛慢徵時叛羌圍䕶羌校尉夏育於畜官勲與州郡合兵救育至孤槃為羌所破勲收餘衆百餘人為魚麗之陳羌精騎夾攻之急士卒多死勲被三創堅不動乃指木表曰必屍我於此句就種羌滇吾素為勲所厚乃以兵扞衆曰蓋長史賢人汝曹殺之者為負天勲罵曰死反虜汝何知促來殺我衆相視而驚滇吾下馬與勲勲不肯上遂為賊所執羌戎服其義勇不敢加害送還漢陽後刺史楊雍即表勲領漢陽太守時人饑相漁食勲調穀廪之先出家糧以率衆存活者千餘人後去官徵拜討虜校尉靈帝召見問天下何苦而反亂如此勲曰倖臣子弟擾之時宦者上軍校尉蹇碩在坐帝顧問碩碩懼不知所對而以此恨勲帝又謂勲曰吾已陳師於平樂觀多出中藏財物以餌士何如勲曰臣聞先王耀徳不觀兵今冦在逺而設近陳不足昭果毅祇黷武耳帝曰善恨見君晚羣臣初無是言也勲時與宗正劉虞佐軍校尉袁紹同典禁兵勲謂虞紹曰吾仍見上上甚聰明但擁蔽於左右耳若共併力誅嬖倖然後徵㧞英俊以興漢室功遂身退豈不快乎虞紹亦素有謀因相連結未及𤼵而司𨽻校尉張温舉勲為京兆以帝方欲延接勲而蹇碩等心憚之並勸從温奏遂拜京兆尹時長安令楊黨父為中常侍恃勢貪放勲案得其贓千餘萬貴戚咸謂之請勲不聼具以事聞并連黨父有詔窮案威震京師時小黄門京兆高望為尚藥監倖於皇太子太子因蹇碩屬望子進為孝廉勲不肯用或曰皇太子副主望其所愛碩帝之寵臣而子違之所謂三怨成府者也勲曰選賢所以報國也非賢不舉死亦何悔勲雖在外每軍國密事帝常手詔問之數加賞賜甚見親信在朝臣右及帝崩董卓廢少帝殺何太后勲與卓書曰昔伊尹霍光權以立功猶可寒心足下小醜何以終此賀者在門弔者在廬可不慎哉卓得書意甚憚之徵為議郎時左將軍皇甫嵩精兵三萬屯扶風勲密相要結將以討卓㑹嵩亦被徵勲以衆弱不能獨立遂並還京師自公卿以下莫不卑下於卓唯勲長揖爭禮見者皆為失色卓問司徒王允曰欲得快司𨽻校尉誰可作者允曰唯有蓋京兆耳卓曰此人明智有餘然不可假以雄職乃以為越騎校尉卓又欲不令久典禁兵復出為潁川太守未及至郡徵還京師時河南尹朱儁為卓陳軍事卓折儁曰我百戰百勝決之於心卿勿妄説且汚我刀勲曰昔武丁之明猶求箴諫况如卿者而欲杜人之口乎卓曰戲之耳勲曰不聞怒言可以為戲卓乃謝儁勲雖彊直不屈而内厭於卓不得意疽發背卒時年五十一遺令勿受卓賻贈卓欲外示寛容表賜東園秘器賵襚送之如禮葬于安陵子順官至永陽太守臧洪字子源廣陵射陽人也父旻有幹才熹平元年㑹稽妖賊許昭起兵句章自稱大將軍立其父生為越王攻破城邑衆以萬數拜旻揚州刺史旻率丹陽太守陳夤擊破之昭遂復更屯結旻等進兵連戰三年平之獲昭父子斬首數千級遷旻為使匈奴中郎將洪年十五以父功拜童子郎知名太學洪體貌魁梧有異姿舉孝廉補即丘長中平末棄官還家太守張超請為功曹董卓弑帝圖危社稷洪説超曰明府歴世受恩兄弟並據大郡今王室將危賊臣未梟此誠天下義烈報恩効命之秋也今郡境尚完吏民殷富若動枹鼓可得二萬人以此誅除國賊為天下倡先義之大者也超然其言與洪西至陳留見兄邈計事邈亦素有心㑹于酸棗邈謂超曰聞弟為郡守政教恩威不由已出動任臧洪洪者何人超曰洪才畧智數優超甚海内竒士也邈即引見洪與語大異之致之於劉兖州公山孔豫州公緒皆與洪善乃設壇場方共盟誓諸州郡更相讓莫敢當咸共推洪洪乃升壇操槃㰱血而盟曰漢室不幸皇綱失統賊臣董卓乗釁縱害禍加至尊虐流百姓大懼淪喪社稷翦覆四海兖州刺史岱豫州刺史伷陳留太守邈東郡太守瑁廣陵太守超等糾合義兵並赴國難凡我同盟齊心勠力以致臣節殞身喪元必無二志有渝此盟俾墜其命無克遺育皇天后土祖宗明靈實皆鑒之洪辭氣慷慨涕泣横下聞其言者雖卒伍厮養莫不激揚人思致節頃之諸軍莫適先進而食盡衆散超遣洪詣大司馬劉虞謀值公孫瓚之難至河間遇幽冀州交兵使命不逹而袁紹見洪又竒重之與結分合好㑹青州刺史焦和卒紹使洪領青州以撫其衆洪在州二年羣盗奔走紹歎其能徙為東郡太守治東武陽曹操圍張超於雍邱超言唯恃臧洪當來救我衆人以為袁曹方睦而洪為紹所表用必不敗好招禍逺來赴此超曰子源天下義士終不背本但恐見禁制不相及逮耳洪聞之果徒跣號泣從紹請兵將赴其難紹不與請自率所領以行亦不許雍邱遂潰超被種族洪由是怨紹絶不與通紹興兵圍之歴年不下令洪邑人陳琳以書與洪喻以禍福責以恩義洪答曰隔濶相思𤼵於寤寐相去歩武之閒耳而以趣舍異規不得相見其為愴恨可為心哉前日不遺比辱雅貺述叙禍福公私切至所以不即奉答者既學薄才鈍不足塞詰亦以吾子􅂝負側室息肩主人家在東州僕為仇敵以是事人雖披中情墮肝膽猶身疏有罪言皆見怪方首尾不救何能恤人且以子之才窮該典籍豈將闇於大道不達余趣哉然猶復云云者僕是知足下之言信不由𠂻將以救禍也必欲算計長短辯諮是非是非之論言滿天下陳之更不明不言無所損又言傷告絶之義非吾所忍行也是以捐棄紙筆一無所答亦冀遥忖其心知其計定不復渝變也重獲來命援引古今紛紜六紙雖欲不言焉得已哉僕小人也本因行役特䝉傾蓋恩深分厚遂竊大州寧樂今日自還接刃乎每登城勒兵望主人之旗鼓感故友之周旋撫弦搦矢不覺流涕之覆面也何者自以輔佐主人無以為悔主人相接過絶等倫當受任之初自謂䆒竟大事共尊王室豈悟天子不悅本州見侵郡將遘牖里之厄陳留克創兵之謀謀計棲遲喪忠孝之名杖䇿􅂝背虧交友之分揆此二者與其不得已喪忠孝之名與虧交友之道輕重殊塗親疏異畫故便收淚告絶若使主人少垂故人住者側席去者克已不汲汲於離友信刑罰以自輔則僕抗季札之志不為今日之戰矣何以效之昔張景明親登壇㰱血奉辭奔走卒使韓牧讓印主人得地然後但以拜章朝主賜爵獲傳之故旋時之間不䝉觀過之貸而受夷滅之禍呂奉先討卓來奔請兵不獲告去何罪復見斫刺濵于死亡劉子璜奉使踰時辭不獲命畏威懷親以詐求歸可謂有志忠孝無損霸道者也然輙僵斃麾下不䝉虧除僕雖不敏原始見終覩微知著竊度主人之心豈謂三子宜死罰當刑中哉實欲一統山東増兵討讎懼戰士狐疑無以沮勸故抑廢王命以崇承制慕義者䝉榮待放者被戮此乃主人之利非游士之願也故僕鑒戒前人困窮死戰僕雖下愚亦嘗聞君子之言矣此實非吾心也乃主人招焉凡吾所以背棄國民用命此城者正以君子之違不適敵國故也是以獲罪主人見攻踰時而足下更引此義以為吾規無乃辭同趣異非吾子所為休戚者哉吾聞之也義不背親忠不違君故東宗本州以為親援中扶郡將以安社稷一舉二得以徼忠孝何以為非而足下欲使吾輕本破家均君主人主人之於我也年為吾兄分為篤友道乖告去以安君親可謂順矣若子之言則包胥宜致命於伍員不當號哭於秦庭矣茍區區於攘患不知言乖乎道理矣足下或者見城圍不解救兵未至感㛰姻之義惟平生之好以屈節而茍生勝守義而傾覆也昔晏嬰不降志於白刃南史不曲筆以求生故身著圖象名垂後世况僕據金城之固驅士民之力散三年之畜以為一年之資匡困補乏以悅天下何圖築室反耕哉但懼秋風揚塵伯珪馬首南向張楊飛燕膂力作難北鄙將告倒縣之急股肱奏乞歸之誠耳主人當鑒我曹軰反旌退師治兵鄴垣何宜久辱盛怒暴威於吾城下哉足下譏吾恃黒山以為救獨不念黄巾之合從邪如飛燕之屬悉以受王命矣昔高祖取彭越於鉅野光武創基兆於緑林卒能龍飛中興以成帝業茍可輔主興化夫何嫌哉况僕親奉承璽書與之從事行矣孔璋足下徼利於境外臧洪受命於君親吾子託身於盟主臧洪策名於長安子謂余身死而名滅僕亦笑子身死而無聞焉悲哉本同而末離努力努力夫復何言紹見洪書知無降意增兵急攻城中糧盡外無援救洪自度不免呼将吏謂曰袁紹無道所圖不軌且不救洪郡将洪於大義不得不死諸君無事空與此禍可先城未破将妻子出将吏皆埀泣曰明府與袁氏本無怨隙今為本朝郡将之故自致殘困吏民何忍當舎明府去也初尚掘䑕煮筯角後無所復食主簿啓内厨米三斗請稍為饘粥洪曰何能獨甘此邪使為薄糜徧班士衆又殺其愛妾以食兵将兵将咸流涕無能仰視男女七八千人相枕而死莫有離叛者城陷生執洪紹素親洪盛施帷幔大會諸将見洪謂曰臧洪何相負若此今日服未洪據地瞋目曰諸袁事漢四世五公可謂受恩今王室衰弱無扶翼之意欲因際會希冀非望多殺忠良以立姦威洪親見呼張陳留為兄則洪府君亦宜為弟同共勠力為國除害何為擁衆觀人屠滅惜洪力劣不能推刃為天下報仇何謂服乎紹本意愛洪意欲令屈服原之見洪辭切知終不為己用乃殺之洪邑人陳容少為書生親慕洪隨洪為東郡丞城未敗洪遣出紹令在坐見洪當死起謂紹曰将軍舉大事欲為天下除暴而專先誅忠義豈合天意臧洪發舉為郡将奈何殺之紹慙左右使人牽出謂曰汝非臧洪儔空復爾為容顧曰夫仁義豈有常蹈之則君子背之則小人今日寧與臧洪同日而死不與将軍同日而生復見殺在紹坐者莫不歎息竊相謂曰如何一日殺二烈士先是洪遣司馬二人出求救吕布比還城已陷皆赴敵死張衡字平子南陽西鄂人也世為著姓祖父堪蜀郡太守衡少善屬文游於三輔因入京師觀太學遂通五經貫六藝雖才高於世而無驕尚之情也常從容淡靜不好交接俗人永元中舉孝廉不行連辟公府不就時天下承平日久自王侯以下莫不踰侈衡乃擬班固兩都作二京賦因以諷諫精思傅會十年乃成文多不載大将軍鄧隲竒其才累召不應衡善機巧尤致思於天文隂陽厯算耽好元經謂崔瑗曰吾觀太元方知子雲妙極道數乃與五經相擬非徒傳記之屬使人難論隂陽之事漢家得天下二百嵗之書也復二百嵗殆将終乎所以作者之數必顯一世常然之符也漢四百年元其興矣安帝雅聞衡善術學公車特徴拜郎中再遷太史令遂乃研覈隂陽妙盡璇璣之正作渾天儀著靈憲算罔論言甚明順帝初再轉復為太史令衡不慕當世所居之官輙積年不徙自去史職五載復還乃設客問作應間以見其志云有間余者曰葢聞前哲首務務於下學上逹佐國理民有云為也朝有所聞則夕行之立功立事式昭徳音是故伊尹思使君為堯舜而民處唐虞彼豈虛言而已哉必旌厥素爾咎單巫咸實守王家申伯樊仲實幹周邦服衮而朝介圭作瑞厥跡不朽垂烈後昆不亦丕歟且學非以要利而富貴萃之貴以行令富以施惠惠施令行故易稱以大業質以文美實由華興器頼雕飾為好人以輿服為榮吾子性徳體道篤信安仁約己博藝無堅不鑽以思世路斯何逺矣曩滯日官今又原之必也學非所用術有所仰故臨川将濟而舟檝不存焉徒經思天衢内昭獨智固合理民之式也故甞見謗于鄙儒深厲淺掲隨時為義曾何貪於支離而習其孤技邪參輪可使自轉木雕猶能獨飛已垂翅而還故棲盍亦調其機而銛諸昔有文王自求多福人生在勤不索何獲曷若卑體屈己美言以相尅鳴于喬木乃金聲而玉振之用後勲雪前吝婞佷不柔以意誰靳也應之曰是何觀同而見異也君子不患位之不尊而患徳之不崇不耻祿之不夥而耻智之不博是故蓻可學而行可力也天爵髙縣得之在命或不速而自懐或羡旃而不臻求之無益故智者靣而不思阽身以徼幸固貪夫之所為未得而豫喪也枉尺直尋議者譏之盈欲虧志孰云非羞於心有猜則簋飱饌餔猶不屑餐旌瞀以之意之無疑則兼金盈百而不嫌辭孟軻以之士或解裋褐而襲黼黻或委鍤築而據文軒者度徳拜爵量績受祿也輸力致庸受必有階渾元初基靈軌未紀吉凶分錯人用朣朦黄帝為斯深慘有風后者是焉亮之察三辰于上跡禍福乎下經緯歴數然後天歩有常則風后之為也當少昊青陽之末實或亂徳人神雜擾不可方物重黎又相顓頊而申理之日月即次重黎之為也人各有能因蓺受任鳥師别名四叔三正官無二業事不並濟晝長則宵短日南則景北天且不堪兼况以人該之夫元龍迎夏則陵雲而奮鱗樂時也渉冬則淈泥而潛蟠避害也公旦道行故制典禮以尹天下懼教誨之不從有人之不理仲尼不遇故論六經以俟來辟耻一物之不知有事之無範所考不齊如何可一夫戰國交爭戎車競驅君若綴旒人無所麗燭武縣縋而秦伯退師魯連係箭而聊城弛柝從往則合横來則離安危無常要在說夫咸以得人為梟失士為尤故樊噲披帷入見高祖髙祖踞洗以對酈生當此之會乃黿鳴而鼈應也故能同心戮力勤恤人隐奄受區夏遂定帝位皆謀臣之由也故一介之䇿各有攸建子長諜之爛然有第夫女魃北而應龍翔洪鼎聲而軍容息溽暑至而鶉火棲寒冰沍而黿鼉蟄今也皇澤宣洽海外混同萬方億醜并質共劑若修成之不暇尚何功之可立立事有三言為下列下列且不可庶矣奚冀其二哉于兹縉紳如雲儒士成林及津者風攄失塗者幽僻遭遇難要趨偶為幸世易俗異事勢舛殊不能通其變而一度以揆之斯契船而求劒守株而伺兎也冒愧逞願必無仁以繼之有道者所不履也越王勾踐事此故厥緒不永㨗徑邪至我不忍以投歩干進茍容我不忍以歙肩雖有犀舟勁檝猶人渉卬否有湏者也姑亦奉順敦篤守以忠信得之不休不獲不吝不見是而不惛居下位而不憂允上徳之常服焉方将師天老而友地典與之乎髙睨而大談孔甲且不足慕焉稱殷彭及周聃與世殊技固孤是求子憂朱泙曼之無所用吾恨輪扁之無所教也子規木雕獨飛愍我埀翅故棲吾感去鼃附鴟悲爾先笑而後號也斐豹以斃督燔書禮至以掖國作銘弦高以牛餼退敵墨翟以縈帶全城貫髙以端辭顯義蘇武以禿節效貞蒲且以飛矰逞巧詹何以沈鉤致精弈秋以棊局取譽王豹以清謳流聲僕進以不能參名於二立退又不能羣比數子愍三墳之既頽惜八索之不理庶前訓之可鑽聊朝隐乎柱史且韞櫝以待價踵顔氏以行止曾不慊夫晉楚敢告誠於知已陽嘉元年復造候風地動儀以精銅鑄成員徑八尺合蓋隆起形似酒樽飾以篆文山龜鳥獸之形中有都柱傍行八道施關發機外有八龍首衘銅丸下有蟾蜍張口承之其牙機巧制皆隐在尊中覆蓋周密無際如有地動尊則振龍機發吐丸而蟾蜍衘之振聲激揚伺者因此覺知雖一龍發機而七首不動尋其方回乃知震之所在驗之以事合契若神自書典所記未之有也甞一龍機發而地不覺動京師學者咸怪其無驗後數日驛至果地震隴西於是皆服其妙自此以後乃令史官記地動所從方起時政事漸損權移於下衡因上疏陳事曰伏惟陛下宣哲克明繼體承天中遭傾覆龍徳泥蟠今乘雲高躋磐桓天位誠所謂将隆大位必先倥偬之也親履艱難者知下情備經險易者達物偽故能一貫萬機靡所疑惑百揆允當庶績咸熙宜獲福祉神祗受譽黎庶而隂陽未和災眚屢見神明幽逺宜鍳在兹福仁禍淫景響而應因徳降休乘失致咎天道雖逺吉凶可見近世鄭蔡江樊周廣王聖皆為效矣故恭儉畏忌必䝉祚祉奢淫諂慢鮮不夷戮前事不忘後事之師也夫情勝其性流遯忘反豈唯不肖中才皆然茍非大賢不能見得思義故積惡成釁罪不可解也向使能瞻前顧後援鏡自戒則何陷於凶患乎貴寵之臣衆所屬仰其有愆尤上下知之襃美譏惡有心皆同故怨讟溢乎四海神明降其禍辟也頃年雨常不足思求所失則洪範所謂僭恒暘若者也懼羣臣奢侈昬踰典式自下逼上用速咎徵又前年京師地震土裂裂者威分震者人擾也君以靜唱臣以動和威自上出不趣於下禮之政也竊懼聖思厭倦制不專已恩不忍割與衆共威威不可分德不可共洪範曰臣有作福作威玉食害于而家凶于而國天鍳孔明雖疎不失災異示人前後數矣而未見所革以復往悔自非聖人不能無過願陛下思惟所以稽古率舊勿令刑徳八柄不由天子若恩從上下事依禮制禮制修則奢僭息事合宜則無凶咎然後神望允塞灾消不至矣初光武善䜟及顯宗肅宗因祖述焉自中興之後儒者爭學圖緯兼復附以妖言衡以圖緯虛妄非聖人之法乃上疏曰臣聞聖人明審律厯以定吉凶重之以卜筮雜之以九宫經天驗道本盡於此或觀星辰逆順寒燠所由或察龜䇿之占巫覡之言其所因者非一術也立言於前有徴於後故智者貴焉謂之䜟書䜟書始出蓋知之者寡自漢取秦用力兵戰功成業遂可謂大事當此之時莫或稱䜟若夏侯勝眭孟之徒以道術立名其所述著無䜟一言劉向父子領校祕書閱定九流亦無䜟錄成哀之後乃始聞之尚書堯使鯀理洪水九年績用不成鯀則殛死禹乃嗣興而春秋䜟云共工理水凡䜟皆云黄帝伐蚩尤而詩䜟獨以為蚩尤敗然後堯受命春秋元命苞中有公輸班與墨翟事見戰國非春秋時也又言别有益州之置在於漢世其名三輔諸陵世數可知至於圖中訖于成帝一卷之書互異數事聖人之言勢無若是殆必虛偽之徒以要世取資往者侍中賈逵摘䜟互異三十餘事諸言䜟者皆不能說至於王莽簒位漢世大禍八十篇何為不載則知圖䜟成於哀平之世也且河洛六蓺篇錄已定後人皮傅無所容簒永元中清河宋景遂以厯紀推言水災而偽稱洞視玉版或者至於棄家業入山林後皆無效而復采前世成事以為證驗至於永建復統則不能知此皆欺世罔俗以昧勢位情偽較然莫之糾禁且律厯卦候九宫風角數有徴效世莫肯學而競稱不占之書譬猶畫工惡圖犬馬而好作鬼魅誠以實事難形而虛偽不窮也宜収蔵圖䜟一禁絶之則朱紫無所眩典籍無瑕玷矣後遷侍中帝引在帷幄諷議左右嘗問衡天下所疾惡者宦官懼其毁己皆共目之衡乃詭對而出閹豎恐終為其患遂共讒之衡常思圖身之事以為吉凶倚伏幽微難明乃作思元賦以宣寄情志其辭曰仰先哲之元訓兮雖彌髙而弗違匪仁里其焉宅兮匪義迹其焉追潛服膺以永靚兮綿日月而不衰伊中情之信修兮慕古人之貞節竦余身而順止兮遵繩墨而不跌志團團以應懸兮誠心固其如結旌性行以制佩兮佩夜光與瓊枝幽蘭之秋華兮又綴之以江蘺既姱麗而鮮雙兮非是時之攸珍奮余榮而莫見兮播余香而莫聞幽獨守此仄陋兮敢怠皇而舍勤幸二八之虞兮喜傅說之生殷尚前良之遺風兮恫後辰而無及何孤行之焭焭兮孑不羣而介立感鸞鷖之特棲兮悲淑人之稀合彼無合其何傷兮患衆偽之冒真旦獲讟于羣弟兮啟金縢而乃信覧蒸民之多僻兮畏立辟以危身曾煩毒以迷惑兮羌孰可與言己私湛憂而深懐兮思繽紛而不理願竭力以守義兮雖貧窮而不改執雕虎而試象兮阽焦原而跟止庶斯奉以周旋兮要既死而後已俗遷渝而事化兮泯規矩之圜方珍蕭艾於重笥兮謂蕙芷之不香斥西施而弗御兮羈要裊以服箱行陂僻而獲志兮循法度而離殃惟天地之無窮兮何遭遇之無常不抑操而茍容兮譬臨河而無航欲巧笑以干媚兮非余心之所常襲温恭之黻衣兮披禮義之繡裳辮貞亮以為鞶兮雜技蓺以為珩昭綵藻與雕琢兮璜聲逺而彌長淹棲遲以恣欲兮燿靈忽其西藏恃已知而華予兮鶗鴂鳴而不芳冀一年之三秀兮遒白露之為霜時亹亹而伐序兮疇可與乎比伉咨妒嫮之難並兮想依韓以流亡恐漸冉而無成兮留則蔽而不章心猶豫而狐疑兮即岐阯而攄情文君為我端蓍兮利飛遁以保名歴衆山以周流兮翼迅風以揚聲二女感於崇岳兮或冰折而不營天葢高而為澤兮誰云路之不平勔自彊而不息兮蹈玉階之嶢崢懼筮氏之長短兮鑽東龜以觀禎遇九臯之介鳥兮怨素意之不逞遊塵外而瞥天兮據㝠翳而哀鳴鵰鶚競於貪婪兮我修潔以益榮子有故於元鳥兮歸母氏而後寧占既吉而無悔兮簡元辰而俶装旦余沐於清源兮晞余髪於朝陽潄飛泉之瀝液兮咀石菌之流英翾鳥舉而魚躍兮将往走乎八荒過少皥之窮野兮問三邱乎句芒何道真之淳粹兮去穢累而票輕登蓬萊而容與兮鼇雖抃而不傾留瀛洲而採芝兮聊且以乎長生憑歸雲而遐逝兮夕余宿乎扶桑噏青岑之玉醴兮餐沆瀣以為糧發昔夣於木禾兮榖崑崙之高岡朝吾行於𤾉谷兮從伯禹於稽山集羣臣之執玉兮疾防風之食言指長沙以邪徑兮存重華乎南鄰哀二妃之未從兮翩擯處彼湘瀕流目頫夫衡阿兮覩有黎之圯墳痛火正之無懐兮託山陂以孤魂愁蔚蔚以慕逺兮越卭州而愉敖躋日中于昆吾兮憇炎天之所陶揚芒熛而絳天兮水泫沄而涌濤温風翕其增熱兮惄鬱邑其難聊顝覊旅而無友兮余安能乎留茲顧金天而歎息兮吾欲往乎西嬉前祝融使舉麾兮纚朱鳥以承旗躔建木於廣都兮拓若華而躊躇超軒轅於西海兮跨汪氏之龍魚聞此國之千嵗兮曾焉足以娱余思九土之殊風兮從蓐收而遂徂歘神化而蟬蛻兮朋精粹而為徒蹶白門而東馳兮云台行乎中野亂弱水之潺湲兮逗華陰之湍渚號馮夷俾清津兮櫂龍舟以濟予會帝軒之未歸兮悵相佯而延佇呬河林之蓁蓁兮偉關雎之戒女黄靈詹而訪命兮摎天道其焉如曰近信而逺疑兮六籍闕而不書神逵昧其難覆兮疇克謨而從諸牛哀病而成虎兮雖逢昆其必噬鼈令殪而尸亡兮取蜀禪而引世死生錯而不齊兮雖司命其不晣竇號行於代路兮後膺祚而繁廡王肆侈於漢庭兮卒御恤而絶緒尉龎眉而郎潛兮逮三葉而遘武董弱冠而司衮兮設王隧而弗取夫吉凶之相仍兮恒反側而靡所穆負天以悦牛兮豎亂叔而幽主文斷祛而忌伯兮閹謁賊而寧后通人闇於好惡兮豈愛惑之能剖嬴擿䜟而戒胡兮備諸外而發内或輦賄而違車兮孕行産而為對慎竈顯於言天兮占水火而妄誶梁叟患夫黎邱兮丁厥子而事刃親所睇而弗識兮矧幽冥之可信無綿攣以涬已兮思百憂以自疢彼天鍳之孔明兮用棐忱而佑仁湯蠲體以禱祈兮䝉龎禠以振人景三慮以營國兮熒惑次於他辰魏顆亮以從理兮鬼亢回以敝秦咎陶邁而種徳兮徳樹茂乎英六桑末寄夫根生兮卉既彫而已毓有無言而不讐兮又何往而不復盍遠迹以飛聲兮孰謂時之可蓄仰矯首以遥望兮魂􅐞惘而無疇偪區中之隘陋兮将北度而宣遊行積冰之磑磑兮清泉沍而不流寒風凄而永至兮拂穹岫之騷騷元武縮於殻中兮螣蛇蜿而自糾魚矜鱗而并凌兮鳥登木而失條坐太陰之屏室兮慨含欷而增愁怨高陽之相寓兮㑋顓頊之宅幽庸織絡於四商兮斯與彼其何瘳望寒門之絶垠兮縱余緤乎不周迅飈潚其媵我兮鶩翩飄而不禁趨谽㗿之洞穴兮標通淵之碄碄經重隂乎寂寞兮愍墳羊之潛深追慌忽於地底兮軼無形而上浮出右密之闇野兮不識蹊之所由速燭龍令執炬兮過鍾山而中休瞰瑶谿之赤岸兮吊祖江之見劉聘王母於銀臺兮羞玉芝以療饑戴勝憗其既歡兮又誚余之行遲載太華之玉女兮召洛浦之宓妃咸姣麗以蠱媚兮增嫮眼而娥眉舒妙婧之纎腰兮揚雜錯之袿徽離朱脣而微笑兮顔的礰以遺光獻環琨與璵縭兮申厥好以元黄雖色豔而賂美兮志浩盪而不嘉䨇材悲於不納兮並詠詩而清歌歌曰天地烟煴百卉含蘤鳴鶴交頸雎鳩相和處子懐春精魂回移如何淑明忘我實多将答賦而不暇兮爰整駕而亟行瞻崑崙之巍巍兮臨榮河之洋洋伏靈龜以負坻兮亘螭龍之飛梁登閬風之曾城兮搆不死而為牀屑瑶蘂以為糇兮㪺白水以為漿抨巫咸以占夣兮廼貞吉之元符滋令徳於正中兮含嘉秀以為敷既埀潁而顧本兮爾要思乎故居安和靜而隨時兮姑純懿之所廬戒庶僚以夙會兮僉恭職而並迓豐隆軯其震霆兮列缺􅁮其照夜雲師􅞝以交集兮凍雨沛其灑塗轙琱輿而樹葩兮擾應龍以服輅百神森其備從兮屯騎羅而星布振余袂而就車兮修劒揭以低昻冠咢咢其映葢兮佩綝纚以煇煌僕夫儼其正策兮八乘攄而超驤氛旄溶以天旋兮蜺旌飄而飛揚撫軨軹而還睨兮心灼藥其如湯羡上都之赫戲兮何迷故而不忘左青琱以揵芝兮右素威以司鉦前長離使拂羽兮委水衡乎元冥屬箕伯以函風兮澂淟涊而為清曵雲旗之離離兮鳴玉鸞之譻譻涉青霄而升遐兮浮蔑䝉而上征紛翼翼以徐戾兮焱回囘其揚靈呌帝閽使闢扉兮覿天皇于瓊宫聆廣樂之九奏兮展洩洩以肜肜考理亂於律鈞兮意建始而思終惟盤逸之無斁兮懼樂往而哀來素撫弦而餘音兮大容吟曰念哉既防溢而静志兮迨我暇以翺翔出紫宫之肅肅兮集太微之閬閬命王良掌策駟兮踰髙閣之鏘鏘建罔車之幕幕兮獵青林之芒芒彎威弧之撥剌兮射嶓冢之封狼觀壁壘於北落兮伐河鼓之磅硠乘天潢之汎汎兮浮雲漢之湯湯倚招摇攝提以低回剹流兮察二紀五緯之綢繆遹皇偃蹇夭矯㛯以連卷兮雜㳫叢顇颯以方驤􅖢汨飂戾沛以罔象兮爛漫麗靡藐以迭逿凌驚雷之砊礚兮弄狂電之淫裔踰厖澒於宕冥兮貫倒景而髙厲廓盪盪其無涯兮乃今窮乎天外據開陽而頫盼兮臨舊鄉之暗藹悲離居之勞心兮情悁悁而思歸魂眷眷而屢顧兮馬倚輈而徘徊雖遨遊以媮樂兮豈愁慕之可懐出閶闔兮降天塗乘飈忽兮馳虛無雲霏霏兮繞余輪風眇眇兮振余旟繽聨翩兮紛暗曖倐眩眩兮反常閭收疇昔之逸豫兮卷淫放之遐心修初服之娑娑兮長余佩之參參文章煥以粲爛兮美紛紜以從風御六藝之珍駕兮游道徳之平林結典籍而為罟兮歐儒墨而為禽玩隂陽之變化兮詠雅頌之徽音嘉曾氏之歸耕兮慕歴陵之欽崟共夙昔而不貳兮固終始之所服也夕惕若厲以省諐兮懼余身之未勅也茍中情之端直兮莫吾知而不恧墨無為以疑志兮與仁義乎消摇不出户而知天下兮何必歴逺以劬勞系曰天長地久嵗不留俟河之清秪懐憂願得逺度以自娱上下無常窮六區超踰騰躍絶世俗飄颻神舉逞所欲天不可階仙夫希栢舟悄悄吝不飛松喬髙跱孰能離結精逺遊使心攜回志朅來從元謀獲我所求夫何思永和初出為河間相時國王驕奢不遵典憲又多豪右共為不軌衡下車治威嚴整法度陰知姦黨名姓一時收禽上下肅然稱為政理視事三年上書乞骸骨徵拜尚書年六十二永和四年卒著周官訓詁崔瑗以為不能有異於諸儒也又欲繼孔子易說彖象殘缺者竟不能就所著詩賦銘七言靈憲應間七辯廵誥懸圖凡三十二篇永初中謁者僕射劉珍校書郎劉騊駼等著作東觀撰集漢記因定漢家禮儀上言請衡參論其事會並卒而衡甞歎息欲終成之及為侍中上疏請得專事東觀收檢遺文畢力補綴又條上司馬遷班固所叙與典籍不合者十餘事又以為王莽本傳但應載簒事而已至於編年月紀灾祥宜為元后本紀又更始居位人無異望光武初為其将然後即真宜以更始之號建於光武之初書數十上竟不聽及後之著述多不詳典時人追恨之馬融字季長扶風茂陵人也将作大匠嚴之子為人美辭貌有俊才初京兆摯恂以儒術教授隐于南山不應徴聘名重關西融從其游學博通經籍恂竒融才以女妻之永初二年大将軍鄧騭聞融名召為舍人非其好也遂不應命客於涼州武都漢陽界中會羌虜飈起邉方擾亂米榖踴貴自關以西道殣相望融既饑困乃悔而歎息謂其友人曰古人有言左手據天下之圖右手刎其喉愚夫不為所以然者生貴於天下也今以曲俗咫尺之羞滅無貲之軀殆非老荘所謂也故往應騭召四年拜為校書郎中詣東觀典校祕書是時鄧太后臨朝騭兄弟輔政而俗儒世士以為文徳可興武功可廢遂寝蒐狩之禮息戰陣之法故猾賊從横乘此無備融乃感激以為文武之道聖賢不墜五才之用無或可廢元初二年上廣成頌以諷諫其辭曰臣聞孔子曰奢則不遜儉則固奢儉之中以禮為界是以蟋蟀山樞之人並刺國君諷以太康馳驅之莭夫樂而不荒憂而不困先王所以平和府藏頤養精神致之無疆故戞撃鳴球載於虞謨吉日車攻序於周詩聖主賢君以增盛美豈徒為奢淫而已哉伏見元年以來遭值厄運陛下戒懼灾異躬自菲薄荒棄禁苑廢弛樂懸勤憂潛思十有餘年以過禮數重以皇太后體唐虞親九族篤睦之徳陛下履有虞烝烝之孝外舍諸家每有憂疾聖恩普勞遣使交錯稀有曠絶時或寧息又無以自娱樂殆非所以逢迎太和裨助萬福也臣愚以為雖尚頗有蝗蟲今年五月以來雨露時㴻祥應方至方渉冬節農事間隙宜幸廣成覧原隰觀宿麥收蔵因講武校獵使僚庶百姓復覩羽旄之美聞鐘鼓之音歡嬉喜樂鼓舞疆畔以迎和氣招致休慶小臣螻蟻不勝區區職在書籍謹依舊文重述蒐狩之義作頌一篇并封上淺漏鄙薄不足觀省臣聞昔命師於鞬櫜偃伯於靈臺或人嘉而稱焉彼固未識夫雷霆之為天常金革之作昬明也自炎黄之前傳道罔記三五以來越可畧聞且區區之酆郊猶廓七十里之囿盛春秋之苖詩詠囿草樂奏騶虞是以大漢之初基也宅兹天邑總風雨之會交隂陽之和揆厥靈囿營于南郊徒觀其坰場區宇恢胎曠蕩􅀢敻勿罔寥豁鬱泱騁望千里天與地莽於是周阹環瀆右矕三塗左概嵩嶽面據衡隂箕背王屋浸以波溠夤以滎洛金山石林殷起乎其中峨峨磑磑鏘鏘􅞐􅞐隆穹槃回嵎峗錯崔神泉側出丹水湼池怪石浮罄燿焜于其陂其土毛則㩁牧薦草芳茹甘荼茈萁芸蒩昌本深蒲芝荋堇荁蘘荷芋渠桂荏鳬葵格韮菹于其植物則元林包竹藩陵蔽京珍林嘉樹建木叢生椿梧栝栢柜栁楓楊豐彤對蔚崟頟槮爽翕習春風含津吐榮鋪于布濩蓶扈蘳熒惡可殫形至于陽月隂慝害作百草畢落林衡戒田焚萊柞木然後舉天綱頓八紘揫歛九藪之動物繯橐四野之飛征鳩之乎兹囿之中山敦雲移羣鳴膠膠鄙騃譟讙子野聽聳離朱目眩𨽻首策亂陳子籌昬於時營圍恢廓充斥川谷罦罝羅羉彌綸阬澤臯牢陵山校隊案部前後有屯甲乙相伍戊巳為堅乘輿乃以吉月之陽朔登于疏鏤之金路六驌騻之元龍建雄虹之旌夏掲鳴鳶之修橦曵長庚之飛髾載日月之太常棲招摇與元戈注枉矢於天狼羽毛紛其髟鼬揚金㚇而扡玉瓖屯田車於平原播同徒於髙岡旃旝摻其如林錯五色以摛光清氛埃掃野塲誓六師搜儁良司徒勒卒司馬平行車攻馬同教達戒通伐咎鼓撞華鐘獵徒縱赴榛叢徽嫿霍奕别騖分奔騷擾聿皇往來交舛紛紛回囘南北東西風行雲轉匈礚隐訇黄塵勃滃闇若霧昏日月為之籠光列宿為之翳昧僄狡課才勁勇程氣狗馬角逐鷹鸇競鷙驍騎旁佐輕車横厲相與陸梁聿皇于中原絹猑蹏鏦特肩脰完羝撝介鮮散毛族梏羽羣然後飛鋋電激流矢雨墜各指所質不期俱殪竄伏扔輪發作梧轊祋殳狂擊頭陷顱碎獸不得猭禽不得瞥或夷由未殊顛狽頓躓蝡蝡蟫蟫充衢塞隧葩華䓑布不可勝計若夫鷙獸毅蟲倨牙黔口大匈哨後緼廵􅇌紆負隅依阻莫敢嬰禦乃使鄭叔晉婦之徒聧孤刲刺裸裎袒裼冒􅞢柘槎棘枳窮浚谷底幽嶰暴斥虎搏狂兕獄􅀢熊抾封狶或輕訬趬悍廋疏㟺領犯歴嵩巒陵喬松履修樠踔攳枝杪摽端尾蒼蜼掎元猨木産盡寓屬單罕罔合部罾弋同曲類行並驅星布麗屬曹伍相保各有分局矰碆飛流纎羅絡縸遊雉羣驚晨鳬輩作翬然雲起霅爾雹落爾乃􅀢觀髙蹈改乘回轅泝恢方撫馮夷䇿句芒超荒忽出重陽厲雲漢横天潢導鬼區徑神場詔靈保召方相驅厲疫走蜮祥捎罔兩拂游光枷天狗緤墳羊然後緩節舒容裴回安歩降集波籞川衡澤虞矢魚陳罟兹飛宿沙田開古蠱音冶翬終葵揚關斧刋重冰撥蟄戸測潛鱗踵介旅逆獵湍瀬渀薄汾橈淪滅潭淵左挈䕫龍右提蛟鼉春獻王鮪夏薦鼈黿於是流覧徧照殫變極態上下究竟山谷蕭條原野嵺愀上無飛鳥下無走獸虞人植旍獵者効具車弊田罷旋入禁囿棲遲乎昭明之觀休息乎髙光之榭以臨乎宏池鎮以瑶臺純以金堤樹以蒲栁被以綠莎瀇瀁沆漭錯紾槃委天地虹洞固無端涯大明生東月滅西陂乃命壺涿驅水蠱逐罔螭滅短狐簎鯨鯢然後方餘皇連舼舟張雲㠶施蜺幬靡颸風陵迅流發櫂歌縱水謳滛魚出蓍蔡浮湘靈下漢女游水禽鴻鵠鴛鴦鷗鷖鶬鴰鸕鷁鷺鴈鷿鷉乃安斯寝戢翮其涯魴鱮鱏鯿鰋鯉鱨魦樂我純徳騰踊相隨雖靈沼之白鳥孟津之躍魚方斯蔑矣然猶詠歌於伶簫載陳於方䇿豈不哀哉於是宗廟既享庖厨既充車徒既簡器械既攻然後擺牲班禽淤賜犒功羣師疊伍伯校千重山罍常滿房爼無空酒正案隊膳夫廵行清醪車湊燔炙騎将鼓駭舉爵鐘鳴既觴若乃陽阿衰裴之晉制闡鼃華羽之南音所以洞蕩匈臆發明耳目疏越藴蓄駭洞底伏鍠鍠鎗鎗奏于農郊大路之衢與百姓樂之是以明徳耀乎中夏威靈暢乎四荒東鄰浮巨海而入享西旅越葱嶺而來王南徼因九譯而致貢朔狄屬象胥而來同蓋安不忘危治不忘亂道在乎兹斯固帝王之所以曜神武而折遐衝者也方今大漢收功於道徳之林致平於仁義之淵忽蒐狩之禮闕槃虞之佃闇昧不睹日月之光聾昬不聞雷霆之震于今十二年為日久矣方将刋禁臺之祕藏發天府之官常由質要之故業率典刑之舊章采清原嘉岐陽登俊桀命賢良舉淹滯㧞幽荒察滛侈之華譽顧介特之實功聘畎畝之羣雅宗重淵之潛龍乃儲精山藪歴思河澤目矖鼎爼耳聽康衢營傅說於胥靡求伊尹於庖厨索膠鬲於魚鹽聽寗戚於牛車俾之昌言而宏議軼越三家馳騁五帝悉覽休祥總括羣瑞遂棲鳯凰於髙梧宿麒麟於西園納焦僥之珍羽受王母之白環永逍遥乎宇内與二儀乎無疆貳造化於厚土參神施於昊乾超特達而無儔煥巍巍而無原豐千億之子孫歴萬載而永延禮樂既闋北轅反斾至自新城背伊闕反洛京頌奏忤鄧氏滯於東觀十年不得調因兄子喪自劾歸太后聞之怒謂融羞薄詔除欲仕州郡遂令禁錮之太后崩安帝親政召還郎署復在講部出為河間王廏長史延光三年車駕東廵岱宗融上東廵頌帝竒其文召拜郎中及北鄉侯即位融移病去為郡功曹陽嘉二年詔舉敦樸城門校尉岑起舉融徴詣公車對䇿拜議郎大将軍梁商表為從事中郎轉武都太守時西羌反叛征西将軍馬賢與護羌校尉胡疇征之而稽久不進融知其将敗上疏乞自効曰今雜種諸羌轉相鈔盗宜及其未并亟遣深入破其支黨而馬賢等處處留滯羌胡百里望塵千里聽聲今逃匿避回漏出其後則必侵宼三輔為民大害臣願請賢所不可用關東兵五千裁假部隊之號盡力率勵埋根行道以先吏士三旬之中必克破之臣少習學蓺不更武職猥陳此言必受誣罔之辜昔毛遂厮養為衆所嗤終以一言克定從要臣懼賢等專守一城言攻於西而羌出於東且其将士必有高克潰叛之變朝廷不能用又陳星孛參畢參西方之宿畢為邉兵至於分野并州是也西戎北狄殆将起乎宜備二方尋而隴西羌反烏桓宼上郡皆卒如融言三遷桓帝時為南郡太守先是融有事忤大将軍梁冀㫖冀諷有司奏融在郡貪濁免官髠徙朔方自刺不死得赦還復拜議郎重在東觀著述以病去官融才高博洽為世通儒教養諸生常有千數涿郡盧植北海鄭元皆其徒也善鼓琴好吹笛達生任俠不拘儒者之節居宇器服多存侈飾常坐髙堂施絳紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者嘗欲訓左氏春秋及見賈逵鄭衆注乃曰賈君精而不博鄭君博而不精既精既博吾何加焉但著三傳異同說注孝經論語詩易三禮尚書列女傳老子淮南子離騷所著賦頌碑誄書記表奏七言琴歌對䇿遺令凡二十一篇初融懲於鄧氏不敢復違忤勢家遂為梁冀草奏李固又作大将軍西第頌以此頗為正直所羞年八十八延熹九年卒于家遺令薄葬族孫日磾獻帝時位至太傅通志卷一百十一上
