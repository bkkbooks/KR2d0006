body:
  text: 通志卷八宋右廸功郎鄭樵漁仲撰蜀紀第八先主後主先主姓劉諱備字元徳涿郡涿縣人漢景帝子中山靖王勝之後也勝子貞元狩六年封涿縣陸城亭侯坐酎金失侯因家焉先主祖雄父𢎞世仕州郡雄舉孝㢘官至東郡范令先主少孤與母販履織席為業舍東南角籬上有桑樹生髙五丈餘遥望見童童如小車蓋徃來者皆怪此樹非凡或謂當出貴人先主少時與宗中諸小兒於樹下戲言吾必當乗此羽葆蓋車叔父子敬謂曰汝勿妄語滅吾門也年十五母使行學與同宗劉徳然遼西公孫瓚俱事故九江太守同郡盧植徳然父元起常資給先主與徳然等元起妻曰各自一家何能常爾邪起曰吾宗中有此兒非常人也而瓚深與先主相友瓚年長先主以兄事之先主不甚樂讀書喜狗馬音樂羙衣服身長七尺五寸垂手下膝顧自見其耳少語言善下人喜怒不形於色好交結豪俠年少争附之中山大商張世平蘇雙等貲累千金販馬周旋於涿郡見而異之乃多與之金財先主由是得用合徒衆靈帝末黄巾起州郡各舉義兵先主率其屬從校尉鄒靖討黄巾賊有功除安喜尉督郵以公事到縣先主求謁不通直入縛督郵杖二百解綬繫其頸著馬枊棄官亡命頃之大將軍何進遣都尉毋邱毅詣丹陽募兵先主與俱行至下邳遇賊力戰有功除為下宻丞復去官後為髙唐尉遷為令為賊所破徃奔中郎將公孫瓚瓚表為别部司馬使為青州刺史田楷以拒冀州牧袁紹數有戰功試守平原令後領平原相郡民劉平素輕先主耻為之下使客刺之客不忍刺語之而去其得人心如此袁紹攻公孫瓚先主與田楷東屯齊曹公征徐州徐州牧陶謙遣使告急於田楷楷與先主俱救之時先主自有兵千餘人及幽州烏丸雜胡騎又略得飢民數千人既到謙以丹陽兵四千益先主先主遂去楷歸謙謙表先主為豫州刺史屯小沛謙病篤謂别駕麋竺曰非劉備不能安此州也謙死竺率州人迎先主先主未敢當下邳陳登謂先主曰今漢室陵遲海内傾覆立功立事在於今日鄙州殷富户口百萬欲屈使君撫臨州事先主曰袁公路近在夀春此君四世五公海内所歸君可以州與之登曰公路驕豪非治亂之主今欲為使君合歩騎十萬上可以匡主濟民成五霸之業下可以割地守境書功於竹帛若使君不見聽許登亦未敢聽使君也北海相孔融謂先主曰袁公路豈憂國忘家者邪冢中枯骨何足介意今日之事百姓與能天與不取悔不可追先主遂領徐州袁術來攻先主先主拒之於盱眙淮陰曹公表先主為鎮東將軍封宜城亭侯是嵗建安元年也先主與術相持經月吕布乗虛襲下邳守將曹豹反間迎布布虜先主妻子先主轉軍海西楊奉韓暹寇徐揚間先主邀擊盡斬之先主求和於吕布布還其妻子先主遣關羽守下邳先主還小沛復合兵得萬餘人吕布惡之自出兵攻先主先主敗走歸曹公曹公厚遇之以為豫州牧將至沛收散卒給其軍糧益與兵使東擊布布遣髙順攻之曹公遣夏侯惇徃不能救為順所敗復虜先主妻子送布曹公自出東征助先主圍布於下邳生禽布先主復得妻子從曹公還許表先主為左將軍禮之愈重出則同輿坐則同席袁術欲經徐州北就袁紹曹公遣先主督朱靈路招要擊術未至術病死先主未出時獻帝舅車騎將軍董承辭受帝衣帶中宻詔當誅曹公先主未發是時曹公從容謂先主曰今天下英雄使君與操耳本初之徒不足數也先主方食失匕箸遂與承及長水校尉种輯將軍吳子蘭王子服等同謀㑹見使未發事覺承等皆伏誅先主據下邳靈等還先主乃殺徐州刺史車胄留關羽守下邳而身還小沛東海昌霸反郡縣多叛曹公為先主衆數萬人遣孫乾與袁紹連和曹公遣劉岱王忠擊之不克五年曹公東征先主先主敗績曹公盡收其衆虜先主妻子并禽關羽以歸先主走青州青州刺史袁譚先主故茂才也將歩騎迎先主先主隨譚到平原譚馳使白紹紹遣將道路奉迎身去鄴二百里與先主相見駐月餘日所失亡士卒稍稍來集曹公與袁紹相拒於官渡汝南黄巾劉辟等叛曹公應紹紹遣先主將兵與辟等略許下關羽亡歸先主曹公遣曹仁將兵擊先主先主還紹軍隂欲離紹乃說紹南連荆州牧劉表紹遣先主將本兵復至汝南與賊龔都等合衆數千人曹公遣蔡楊擊之為先主所殺曹公既破紹自南擊先主先主遣麋竺孫乾與劉表相聞表自郊迎以上賔禮待之益其兵使屯新野荆州豪傑歸先主者日益多表疑其心隂禦之使拒夏侯惇于禁等於博望久之先主設伏兵一旦自燒屯偽遁惇等追之為伏兵所破十二年曹公北征烏丸先主說表襲許表不能用曹公南征表㑹表卒子琮代立遣使請降先主屯樊不知曹公卒至至宛乃聞之遂將其衆去過襄陽諸葛亮說先主攻琮荆州可有先主曰吾不忍也乃駐馬呼琮琮懼不能起琮左右及荆州人多歸先主比到當陽衆十餘萬輜重數千兩日行十餘里别遣關羽乗船數百艘使㑹江陵或謂先主曰宜速行保江陵今雖擁大衆被甲者少若曹公兵至何以拒之先主曰夫濟大事必以人為本今人歸吾吾何忍棄去曹公以江陵有軍實恐先主據之乃釋輜重輕軍到襄陽聞先主已過曹公將精騎五千急追之一日一夜行三百餘里及於當陽之長坂先主棄妻子與諸葛亮張飛趙雲等數十騎走曹公大獲其人衆輜重先主斜趣漢津適與羽船㑹得濟沔遇表長子江夏太守琦衆萬餘人與俱到夏口先主遣諸葛亮自結於孫權權遣周瑜程普等水軍數萬與先主并力與曹公戰于赤壁大破之焚其舟船先主與吳軍水陸并進追到南郡時又疾疫北軍多死曹公引歸先主表琦為荆州刺史又南征四郡武陵太守金旋長沙太守韓元桂陽太守趙範零陵太守劉度皆降廬江雷緒率部曲數萬口稽顙琦病死羣下推先主為荆州牧治公安權稍畏之進妹固好先主至京見權綢繆恩紀權遣使云欲共取蜀或以為宜報聽許吳終不能越荆有蜀蜀地可為己有荆州主簿殷觀進曰若為吳先驅進未能克蜀退為吳所乗即事去矣今但可然贊其伐蜀而自說新據諸郡未可與動吳必不敢越我而獨取蜀如此進退之計可以收吳蜀之利先主從之權果輟計遷觀為别駕從事十六年益州牧劉璋遥聞曹公將遣鍾繇等向漢中討張魯内懐恐懼别駕從事蜀郡張松說璋曰曹公兵彊無敵於天下若因張魯之資以取蜀土誰能禦之者乎璋曰吾固憂之而未有計松曰劉豫州使君之宗室而曹公之深讐也善用兵若使之討魯魯必破魯破則益州彊曹公雖來無能為也璋然之遣法正將四千人迎先主前後賂遺以巨億計正因陳益州可取之䇿先主留諸葛亮關羽等據荆州將歩卒數萬人入益州至涪璋自出迎相見甚歡張松令法正白先主及謀臣龎統進說便可於㑹所襲璋先主曰此大事也不可倉卒璋推先主行大司馬領司隸校尉先主亦推璋行鎮西大將軍領益州牧璋増先主兵使擊張魯又令督白水軍先主并軍三萬餘人車甲器械資貨甚盛是嵗璋還成都先主北到葭萌未即討魯厚樹恩徳以收衆心明年曹公征孫權權呼先主自救先主遣使告璋曰曹公征吳吳憂危急孫氏與孤本為脣齒又樂進在青泥與關羽相拒今不徃救羽進必大克轉侵州界其憂有甚於魯魯自守之賊不足慮也乃從璋求萬兵及資寶欲以東行璋但許兵四千其餘皆給半張松書與先主及法正曰今大事垂可立如何釋此去乎松兄廣漢太守肅懼禍逮己白璋發其謀於是璋收斬松嫌隙始構矣璋勅關戍諸將文書勿復關通先主先主大怒召璋白水軍督楊懐責以無禮斬之乃使黄忠卓膺勒兵向璋先主徑至關中質諸將并士卒妻子引兵與忠膺等進到涪據其城璋遣劉璝冷苞張任鄧賢等拒先主於涪皆破敗退保緜竹璋復遣李嚴督緜竹諸軍嚴率衆降先主先主軍益彊分遣諸將平下屬縣諸葛亮張飛趙雲等將兵泝流定白帝江州江陽惟關羽留鎮荆州先主進軍圍雒時璋子循守城被攻一年十九年夏雒城破進圍成都數十日璋出降蜀中殷盛豐樂先主置酒大饗士卒取蜀城中金銀分賜將士還其穀帛先主復領益州牧諸葛亮為股肱法正為謀主關羽張飛馬超為爪牙許靖麋竺簡雍為賔友及董和黄權李嚴等本璋之所授用也吳壹費觀等又璋之㛰親也彭羡又璋之所排擯也劉巴者宿昔之所忌恨也皆處之顯任盡其器能有志之士無不競勸二十年孫權以先主已得益州使使報欲得荆州先主言須得凉州當以荆州相與權忿之乃遣吕䝉襲奪長沙零陵桂陽三郡先主引兵五萬下公安令關羽入益陽是嵗曹公定漢中張魯遁走巴西先主聞之與權連和分荆州江夏長沙桂陽東屬南郡零陵武陵西屬引軍還江州遣黄權將兵迎張魯張魯已降曹公曹公使夏侯淵張郃屯漢中數數犯暴巴郡先主令張飛進兵宕渠與郃等戰於瓦口破郃等收兵還南鄭先主亦還成都二十三年先主率諸將進兵漢中分遣將軍吳蘭雷銅等入武都皆為曹公軍所沒先主次于陽平關與淵郃等相拒二十四年春自陽平南渡沔水縁山稍前於定軍山勢作營淵將兵來争其地先主命黄忠乗髙鼓譟攻之大破淵軍斬淵郃及曹公所署益州刺史趙顒等曹公自長安舉衆南征先主遥策之曰曹公雖來無能為也我必有漢川矣及曹公至先主歛衆拒險終不交鋒積月不拔亡者日多夏曹公引軍還先主遂有漢中遣劉封孟達李平等攻申耽於上庸秋羣下上先主為漢中王表於漢帝曰平西將軍都亭侯臣馬超左將軍領長史鎮軍將軍臣許靖營司馬龎羲議曹從事中郎軍議中郎將臣射援軍師將軍臣諸葛亮盪宼將軍漢夀亭侯臣關羽征虜將軍新亭侯臣張飛征西將軍臣黄忠鎮逺將軍臣頼恭揚武將軍臣法正興業將軍臣李嚴等一百二十人上言曰昔唐堯至聖而四凶在朝周成仁賢而四國作難髙后稱制而諸吕竊命孝昭㓜冲而上官逆謀皆馮世寵藉履國權窮凶極亂社稷幾危非大舜周公朱虛博陸則不能流放禽討安危定傾伏惟陛下誕資聖徳統理萬邦而遭厄運不造之艱董卓首難蕩覆京畿曹操階禍竊執天衡皇后太子鴆殺見害剝亂天下殘毁民物久令陛下䝉塵憂厄幽處虛邑人神無主遏絶王命厭昧皇極欲盗神器左將軍領司隸校尉豫荆益三州牧宜城亭侯備受朝爵秩念在輸力以殉國難覩其機兆赫然憤發與車騎將軍董承同謀誅操將安國家克寧舊都㑹承機事不宻令操游䰟得遂長惡殘冺海内臣等每懼王室大有閻樂之禍小有定安之變夙夜惴惴戰慄累息昔在虞書敦序九族周監二代封建同姓書著其義歴載長久漢興之初割裂疆土尊王子弟是以卒折諸吕之難而成太宗之基臣等以備肺腑枝葉宗子藩翰心存國家念在弭亂自操破於漢中海内英雄望風蟻附而爵號不顯九錫未加非所以鎮衛社稷光昭萬世也奉辭在外禮命斷絶昔河西太守梁統等值漢中興限於山河位同權均不能相率咸推竇融以為元帥卒立效績摧破隗囂今社稷之難急於隴蜀操外吞天下内殘羣寮朝廷有蕭牆之危而禦侮未建可為寒心臣等輒依舊典封備漢中王拜大司馬董齊六軍糾合同盟埽滅凶逆以漢中巴蜀廣漢犍為為國所署置依漢初諸侯王故典夫權宜之制茍利社稷專之可也然後功成事立臣等退伏矯罪雖死無恨遂於沔陽設壇場陳兵列衆羣臣陪位讀奏訖御王冠于先主先主於是列羣臣之言因驛上還所假左將軍宜城亭侯印綬於是還治成都拔魏延為都督鎮漢中時關羽攻曹公將曹仁禽于禁於樊俄而孫權襲殺羽取荆州二十五年魏文帝稱尊號改年曰黄初或𫝊聞漢帝見害先主乃發喪制服追諡曰孝愍皇帝是後在所並言衆瑞日月相屬故議郎陽泉侯劉豹青衣侯向舉偏將軍張裔黄權大司馬屬殷純益州别駕從事趙莋治中從事楊洪從事祭酒何宗議曹從事杜瓊勸學從事張爽尹黙譙周等上言曰臣等謹按河圖洛書五經䜟緯衆說並有大王名字又參諸星氣之論法當有聖人起於此州以致中興願大王應天順民速即洪業以寧海内於是太傅許靖安漢將軍麋竺軍師將軍諸葛亮太常頼恭光禄勲黄權少府王謀等復上言曹丕簒弑湮滅漢室竊據神器劫迫忠良酷烈無道人鬼忿毒咸思劉氏今上無天子海内惶惶靡所式仰羣下前後上書者八百餘人咸稱述符瑞圖䜟明徵間黄龍見武陽赤水九日乃去孝經援神契曰徳至淵泉則黄龍見龍者君之象也易乾九五飛龍在天大王當龍升登帝位也又前關羽圍樊襄陽襄陽男子張嘉王休獻玉璽璽潛漢水伏於淵泉暉景燭燿靈光徹天夫漢者髙祖本所起定天下之國號也大王襲先帝軌跡亦興於漢中也今天子玉璽神光先見璽出襄陽漢水之末明大王承其下流授與大王以天子之位瑞命符應非人力所致昔周有烏魚之瑞咸曰休哉二祖受命圖書先著以為徵驗今上天告祥羣儒英俊並進河洛孔子䜟記咸悉具至伏惟大王出自孝景皇帝中山靖王之胄本枝百世乾祗降祚聖姿碩茂神武在躬仁覆積徳愛人好士是以四方歸心焉考省靈圖啓發䜟緯神眀之表名諱昭著宜即帝位以纂二祖紹嗣昭穆天下幸甚臣等謹與博士許慈議郎孟光建立禮儀擇令辰上尊號即皇帝位於成都武擔之南為文曰惟建安二十六年四月丙午皇帝備敢用元牡昭告皇天上帝后土神祗漢有天下歴數無疆曩者王莽簒盗光武皇帝震怒致誅社稷復存今曹操阻兵安忍戮殺主后滔天冺夏罔顧天顯操子丕載其凶逆竊居神器羣臣將士以為社稷隳廢備宜脩之嗣武二祖恭行天罰備雖否徳懼忝帝位詢于庶民外及蠻夷君長僉曰天命不可以不答祖業不可以久替四海不可以無主率土式望在備一人備畏天明命又懼漢邦將湮于地謹擇元日與百寮登壇受皇帝璽綬脩燔瘞告類于天神惟神饗祚于漢家永綏四海章武元年夏四月大赦改年以諸葛亮為丞相許靖為司徒置百官立宗廟祫祭髙皇帝以下五月立皇后吳氏子禪為皇太子六月以子永為魯王理為梁王車騎將軍張飛為其左右所害初先主忿孫權之􅊞關羽將東征秋七月遂帥諸軍伐吳孫權遣書請和先主盛怒不許吳將陸議李異劉阿等屯巫秭歸將軍吳班馮習自巫攻破異等軍次秭歸武陵五谿蠻夷遣使請兵二年春正月先主軍還秭歸將軍吳班陳式水軍屯夷陵夾江東西岸二月先主自秭歸率諸將進軍縁山截嶺於夷道猇亭駐營自佷山通武陵遣侍中馬良安慰五谿蠻夷咸相率響應鎮北將軍黄權督江北諸軍與吳軍相拒於夷陵道夏六月黄氣見自秭歸十餘里中廣數十丈後十餘日陸議大破先主軍於猇亭將軍馮習張南等皆沒先主自猇亭還秭歸收合離散兵遂棄船舫由歩道還魚復改魚復縣曰永安吳遣將軍李異劉阿等踵躡先主軍屯駐南山秋八月收兵還巫司徒許靖卒冬十月詔丞相亮營南北郊於成都孫權聞先主住白帝甚懼遣使請和先主許之遣太中大夫宗瑋報命冬十二月漢嘉太守黄元聞先主疾不豫舉兵拒守三年春二月丞相亮自成都到永安三月黄元進兵攻臨卭縣遣將軍陳曶討元元軍敗順流下江為其親兵所縛生致成都斬之先主病篤託孤於丞相亮尚書令李嚴為副夏四月癸巳先主殂于永安宫時年六十三亮上言於後主曰伏惟大行皇帝邁仁樹徳覆燾無疆昊天不弔寢疾彌留今月二十四日奄忽升遐臣妾號咷若喪考妣乃顧遺詔事惟太宗動容損益百寮發哀滿三日除服到𦵏期復如禮其郡國太守相都尉縣令長三日便除服臣亮親受勅戒不敢有違請宣下奉行五月梓宫自永安還成都諡曰昭烈皇帝秋八月𦵏恵陵陳夀評曰先主之𢎞毅寛厚知人待士蓋有髙祖之風英雄之器焉及其舉國託孤於諸葛亮而心神無貳誠君臣之至公古今之盛軌也機權幹畧不逮魏武是以基宇亦狹然折而不挫終不為下者抑揆彼之量必不容己非惟競利且以避害云爾先主章武三年後主諱禪字公嗣先主子也建安二十四年先主為漢中王立為王太子及即尊號冊曰惟章武元年五月辛巳皇帝若曰太子禪朕遭漢運艱難賊臣簒盗社稷無主格人羣正以天眀命朕繼大統今以禪為皇太子以承宗廟祗肅社稷使使持節丞相亮授印綬敬聽師傅行一物而三善皆得焉可不勉與三年夏四月先主殂于永安宫五月後主襲位於成都時年十七尊皇后曰皇太后大赦改元是嵗魏黄初四年也建興元年夏䍧柯太守朱褒擁郡反先是益州郡有大姓雍闓反流太守張裔於吳據郡不賔越嶲夷王髙定亦背叛是嵗立皇后張氏遣尚書郎鄧芝固好於吳吳王孫權與蜀和親使聘是嵗通好二年春務農殖穀閉關息民三年春三月丞相亮南征四郡四郡皆平改益州郡為建寧郡分建寧永昌郡為雲南郡又分建寧牂柯為興古郡十二月亮還成都四年春都䕶李嚴自永安還住江州築大城五年春丞相出屯漢中營沔北陽平石馬六年春亮出攻祁山不克冬復出散關圍陳倉糧盡退魏將王雙率軍追亮亮與戰破之斬雙還漢中七年春亮遣陳式攻武都隂平遂克定二郡冬亮徙府營於南山下原上築漢樂二城是嵗孫權稱帝與蜀約盟共交分天下八年秋魏使司馬懿由西城張郃由子午曹真由斜谷欲攻漢中丞相亮待之於城固赤阪大雨道絶真等皆還是嵗魏延破魏雍州刺史郭淮于陽谿徙魯王永為甘陵王梁王理為安平王皆以魯梁在吳分界故也九年春二月亮復出軍圍祁山始以木牛運魏司馬懿張郃救祁山夏六月亮糧盡退軍郃追至青封與亮交戰被箭死秋八月都䕶李平廢徙梓潼郡十年亮休士勸農於黄沙作流馬木牛畢教兵講武十一年冬亮使諸軍運米集於斜谷口治斜谷邸閣是嵗南夷劉胄反將軍馬忠破平之十二年春二月亮由斜谷出始以流馬運秋八月亮卒于渭濵征西大將軍魏延與丞相長史楊儀争權不和舉兵相攻延敗走斬延首儀率諸軍還成都大赦以左將軍吳壹為車騎將軍假節都督漢中以丞相留府長史蔣琬為尚書令總統國事十三年春正月中軍師楊儀廢徙漢嘉郡夏四月進蔣琬位為大將軍十四年夏四月後主至湔登觀阪看汶水之流旬日還成都徙武都氐王苻健及氐民四百餘户於廣都十五年夏六月皇后張氏薨延熙元年春正月立皇后張氏大赦改元立子璿為太子子瑶為安定王冬十一月大將軍蔣琬出屯漢中二年春三月進蔣琬位為大司馬三年春使越嶲太守張嶷平定越嶲郡四年冬十月尚書令費褘至漢中與蔣琬諮論事計嵗盡還五年春正月監軍姜維督偏軍自漢中還屯涪縣六年冬十月大司馬蔣琬自漢中還住涪十一月大赦以尚書令費褘為大將軍七年閏月魏大將軍曹爽夏侯元等向漢中鎮北大將軍王平拒興勢圍大將軍費褘督諸軍徃赴救魏軍退夏四月安平王理卒秋九月褘還成都八年秋八月皇太后薨十二月大將軍費褘至漢中行圍守九年夏六月費褘還成都秋大赦冬十一月大司馬蔣琬卒十年涼州胡王白虎文治無戴等率衆降衛將軍姜維迎逆安撫居之于繁縣是嵗汶山平康夷反維徃討破平之十一年夏五月大將軍費褘出屯漢中秋涪陵屬國民夷反車騎將軍鄧芝徃討皆破平之十二年春正月魏誅大將軍曹爽等右將軍夏侯霸來降夏四月大赦秋衛將軍姜維出攻雍州不克而還將軍句安李韶降魏十三年姜維復出西平不克而還十四年夏大將軍費褘還成都冬復北駐漢夀大赦十五年吳王孫權薨立子琮為西河王十六年春正月大將軍費褘為魏降人郭循所殺于漢夀夏四月衛將軍姜維復率衆圍南安不克而還十七年春正月姜維還成都大赦夏六月維復率衆出隴西冬拔狄道河間臨洮三縣民居于綿竹繁縣十八年春姜維還成都夏復率諸軍出狄道與魏雍州刺史王經戰于洮西大破之經退保狄道城維却住鍾題十九年春進姜維位為大將軍督戎馬與鎮西將軍胡濟期㑹上邽濟失誓不至秋八月維為魏大將軍鄧艾所破于上邽維退軍還成都是嵗立子瓚為新平王大赦二十年聞魏大將軍諸葛誕據夀春以叛姜維復率衆出駱谷至芒水是嵗大赦景耀元年姜維還成都史官言景星見於是大赦改年宦人黄皓始專政吳大將軍孫綝廢其主亮立琅邪王休二年夏六月立子諶為北地王恂為新興王䖍為上黨王三年秋九月追諡故將軍關羽張飛馬超龐統黄忠四年春三月追諡故將軍趙雲冬十月大赦五年春正月西河王琮卒是嵗姜維復率衆出侯和為鄧艾所破還住沓中六年夏魏大興徒衆命征西將軍鄧艾鎮西將軍鍾㑹雍州刺史諸葛緒數道並攻於是遣左右車騎將軍張翼廖化輔國大將軍董厥等拒之大赦改元為炎興冬鄧艾破衛將軍諸葛瞻於綿竹用光禄大夫譙周䇿使侍中張紹駙馬都尉鄧良及周奉降書于艾是日北地王諶傷國之亡先殺妻子次以自殺紹良與艾相遇於雒縣艾得書大喜即報書遣紹良先還艾至城北後主輿櫬自縳詣軍壘門艾解縳焚櫬延請相見因承制拜後主為驃騎將軍諸圍守悉被後主勅然後降下艾使後主止其故宫身徃造焉資嚴未發明年春正月艾見收鍾㑹自涪至成都作亂㑹既死蜀中軍衆鈔略死喪狼籍數日乃安集後主舉家東遷既至洛陽魏䇿命後主為安樂縣公食邑萬户賜絹萬匹奴婢百人他物稱是子孫為三都尉封侯者五十餘人尚書令樊建侍中張紹光禄大夫譙周祕書令郤正殿中督張通並封列侯後主以太始七年薨於洛陽陳夀評曰後主任賢相則為循理之君惑閹豎則為昬闇之后𫝊曰素絲無常唯所染之信矣哉禮國君繼體踰年改元而章武之三年則革稱建興考之古義體理為違又國不置史注記無官是以行事多遺災異靡書諸葛亮雖達於為政凡此之類猶有未周焉然經載十二而年名不易軍旅屢興而赦不妄下不亦卓乎自亮沒後兹制漸虧優劣著矣後主建興十五年延熙二十年景耀六年即位四十一年右蜀二主四十三年為魏所滅通志卷八
