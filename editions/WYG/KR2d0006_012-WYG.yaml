body:
  text: 通志卷七宋右廸功郎鄭樵漁仲撰魏紀第七武帝文帝眀帝齊王髙貴鄉公陳留王太祖武皇帝沛國譙人也姓曹諱操字孟徳漢相國參之後桓帝世曹騰為中常侍太長秋封費亭侯養子嵩嗣官至太尉莫能審其生出本末嵩生太祖太祖少機警有權數而任俠放蕩不治行業故世人未之竒也唯梁國橋元南陽何顒異焉元謂太祖曰天下將亂非命世之才不能濟也能安之者其在君乎年二十舉孝廉為郎除洛陽北部尉遷頓邱令徴拜議郎光和末黄巾起拜騎都尉討潁川賊遷為濟南相國有十餘縣長吏多阿附貴戚贓汚狼籍於是奏免其八禁斷滛祀姦宄逃竄郡國肅然乆之徴還為東郡太守不就稱疾歸鄉里頃之冀州刺史王芬南陽許攸沛國周旌等連結豪傑謀廢靈帝立合肥侯以告太祖太祖拒之芬等遂敗金城邉章韓遂殺刺史郡守以叛衆十餘萬天下騷動徴太祖為典軍校尉㑹靈帝崩太子即位太后臨朝大將軍何進與袁紹謀誅宦官太后不聽進乃召董卓欲以脅太后卓未至而進見殺卓到廢帝為𢎞農王而立獻帝京都大亂卓表太祖為驍騎校尉欲與計事太祖乃變易姓名間行東歸出關過中牟為亭長所疑執詣縣邑中或竊識之為請得觧卓遂殺太后及𢎞農王太祖至陳留散家財合義兵將以誅卓冬十二月始起兵於已吾是嵗中平六年也初平元年春正月後將軍袁術冀州牧韓馥豫州刺史孔伷兖州刺史劉岱河内太守王匡渤海太守袁紹陳留太守張邈東郡太守橋瑁山陽太守袁遺濟北相鮑信同時俱起兵衆各數萬推紹為盟主太祖行奮武將軍二月卓聞兵起乃徙天子都長安卓留屯洛陽遂焚宫室是時紹屯河内邈岱瑁遺屯酸棗術屯南陽伷屯潁川馥在鄴卓兵彊紹等莫敢先進太祖曰舉義兵以誅暴亂大衆已合諸君何疑向使董卓聞山東兵起倚王室之重據二周之險東向以臨天下雖以無道行之猶足為患今焚燒宫室刼遷天子海内震動不知所歸此天亡之時也一戰而天下定矣不可失也遂引兵西將據成臯邈遣將衛兹分兵隨太祖到滎陽汴水遇卓將徐榮與戰不利士卒死傷甚多太祖為流矢所中所乗馬被創從弟洪以馬與太祖得夜遁去榮見太祖所將兵少力戰盡日謂酸棗未易攻也亦引兵還太祖到酸棗諸軍兵十餘萬日置酒髙㑹不圖進取太祖責讓之因為謀曰諸君聽吾計使渤海引河内之衆臨孟津酸棗諸將守成臯據敖倉塞轘轅太谷全制其險使袁將軍率南陽之軍軍丹析入武關以震三輔皆髙壘深壁勿與戰益為疑兵示天下形勢以順誅逆可立定也今兵以義動持疑而不進失天下之望竊為諸君耻之邈等不能用太祖兵少乃與夏侯惇等詣揚州募兵刺史陳温丹陽太守周昕與兵四千餘人還到龍亢士卒多叛至銍建平復收兵得千餘人進屯河内劉岱與橋瑁相惡岱殺瑁以王肱領東郡太守袁紹與韓馥謀立幽州牧劉虞為帝太祖拒之紹又嘗得一玉印於太祖坐中舉向其肘太祖由是笑而惡焉二年春紹馥遂立虞為帝虞終不敢當夏四月卓還長安秋七月袁紹脅韓馥取冀州黑山賊于毒白繞眭固等十餘萬衆畧魏郡東郡王肱不能禦太祖引兵入東郡撃白繞於濮陽破之袁紹因表太祖為東郡太守治東武陽三年春太祖軍頓邱毒等攻東武陽太祖乃引兵西入山攻毒等本屯毒聞之棄武陽還太祖要撃眭固又撃匈奴扵夫羅於内黄皆大破之夏四月司徒王允與吕布共殺卓卓將李傕郭汜等殺允攻布布敗東出武關傕等擅朝政青州黄巾衆百萬入兖州殺任城相鄭遂轉入東平劉岱欲撃之鮑信諫曰今賊衆百萬百姓皆震恐士卒無鬭志不可敵也觀賊衆羣輩相隨軍無輜重唯以鈔畧為資今不若畜士衆之力先為固守彼欲戰不得攻又不能其勢必離散後選精銳據其要害撃之可破也岱不從遂與戰果為所殺信乃與州吏萬潛等至東郡迎太祖領兖州牧遂進兵撃黄巾於夀張東信力戰鬭死僅而破之購求信喪不得衆乃刻木如信形狀祭而哭焉追黄巾至濟北乞降冬受降卒三十餘萬男女百餘萬口收其精銳者號為青州兵袁術與紹有隙術求援於公孫瓚瓚使劉備屯髙唐單經屯平原陶謙屯發干以逼紹太祖與紹會撃皆破之四年春軍鄄城荆州牧劉表斷術糧道術引軍入陳留屯封邱黒山餘賊及於夫羅等佐之術使將劉詳屯匡亭太祖撃詳術救之與戰大破之術退保封邱遂圍之未合術走襄邑追到太夀决渠水灌城走寜陵又追之走九江夏太祖還軍定陶下邳闕宣聚衆數千人自稱天子徐州牧陶謙與共舉兵取泰山華費畧任城秋太祖征陶謙下十餘城謙守城不敢出是嵗孫策受袁術使渡江數年間遂有江東興平元年春太祖自徐州還初太祖父嵩去官復還譙董卓之亂避難琅邪為陶謙所害故太祖志在復讐東伐夏使荀彧程昱守鄄城復征陶謙㧞五城遂畧地至東海還過郯謙將曹豹與劉備屯郯東要太祖太祖撃破之遂攻拔襄賁所過多所殘戮㑹張邈與陳宫叛迎呂布郡縣皆應荀彧程昱保鄄城范東阿二縣固守太祖乃引軍還布到攻鄄城不能下西屯濮陽太祖曰布一旦得一州不能據東平斷亢父泰山之道乗險要我而乃屯濮陽吾知其無能為也遂進軍攻之布出兵戰先以騎犯青州兵青州兵奔太祖陣亂馳突火出墜馬燒左手掌司馬樓異扶太祖上馬遂引去未至營止諸將未與太祖相見皆怖太祖乃自力勞軍令軍中促為攻具進復攻之與布相守百餘日蝗蟲起百姓大餓布糧食亦盡各引去秋九月太祖還鄄城布到乘氏為其縣人李進所破東屯山陽於是紹使人說太祖欲連和太祖新失兖州軍食盡將許之程昱止太祖太祖從之冬十月太祖至東阿是嵗榖一斛五十餘萬錢人相食乃罷吏兵新募者陶謙死劉備代之二年春襲定陶濟隂太守吳資保南城未拔㑹吕布至又撃破之夏布將薛蘭李封屯鉅野太祖攻之布救蘭蘭敗布走遂斬蘭等布復從東緡與陳宫將萬餘人来戰時太祖兵少設伏縱竒兵撃大破之布夜走太祖復攻㧞定陶分兵平諸縣布東奔劉備張邈從布使其弟超將家屬保雍邱秋八月圍雍邱冬十月天子拜太祖兖州牧十二月雍邱潰超自殺夷邈三族邈詣袁術請救為其衆所殺兖州平遂東畧陳地是嵗長安亂天子東遷敗于曹陽渡河幸安邑建安元年春正月太祖軍臨武平袁術所置陳相袁嗣降太祖將迎天子諸將或疑荀彧程昱勸之乃遣曹洪將兵西迎衛將軍董承與袁術將萇奴拒險洪不得進汝南潁川黄巾何儀劉辟黄邵何曼等衆各數萬初應袁術又附孫堅二月太祖進軍討破之斬辟邵等儀及其衆皆降天子拜太祖建徳將軍夏六月遷鎮東將軍封費亭侯秋七月楊奉韓暹以天子還洛陽奉别屯梁太祖遂至洛陽衛京都暹遁走天子假太祖節鉞録尚書事洛陽殘破董昭等勸太祖都許九月車駕出轘轅而東以太祖為大將軍封武平侯自天子西遷朝廷日亂至是宗廟社稷制度始立天子之東也奉自梁欲要之不及冬十月太祖征奉奉南奔袁術遂攻其梁屯拔之於是以袁紹為太尉紹耻班在太祖下不肯受太祖乃固辭以大將軍讓紹天子拜太祖司空行車騎將軍是嵗用棗祗韓浩等議始興屯田吕布襲劉備取下邳備来奔程昱説太祖曰觀備有雄才而甚得衆心終不為人下不如早圖之太祖曰方今收英雄時也殺一人而失天下之心不可張濟自關中走南陽濟死從子繡領其衆二年春正月太祖到宛張繡降旣而悔之復反太祖與戰軍敗為流矢所中長子昻弟子安民遇害太祖乃引兵還舞隂繡將騎来鈔太祖撃破之繡奔穰與劉表合太祖謂諸將曰吾降張繡等失不便取其質以至于此吾知所以敗諸卿觀之自今已後不復敗矣遂還許袁術欲稱帝於淮南使人告吕布布收其使上其書術怒攻布為布所破秋九月術侵陳太祖東征之術聞太祖自来棄軍走留其將橋蕤李豐梁綱樂就太祖到撃破蕤等皆斬之術走渡淮太祖還許太祖之自舞隂還也南陽章陵諸縣復叛為繡太祖遣曹洪撃之不利還屯葉數為繡表所侵冬十一月太祖自南征至宛表將鄧濟據湖陽攻拔之生禽濟湖陽降攻舞隂下之三年春正月太祖還許初置軍師祭酒三月太祖圍張繡於穰夏五月劉表遣兵救繡以絶軍後太祖將引還繡兵來太祖軍不得進連營稍前太祖與荀彧書曰賊來追吾雖日行數里吾策之到安衆破繡必矣到安衆繡與表兵合守險太祖軍前後受敵太祖乃夜鑿險為地道悉過輜重設竒兵㑹明賊謂太祖為遁也悉軍來追乃縱竒兵歩騎夾攻大破之秋七月太祖還許荀彧問太祖前所以策賊必破何也太祖曰虜遏吾歸師而與吾死地戰吾是以知勝矣吕布復為袁術使髙順攻劉備太祖遣夏侯惇救之不利備為順所敗九月太祖東征布冬十月屠彭城獲其相侯諧進至下邳布自將騎逆撃大破之獲其驍將成廉追至城下布恐欲降陳宫等沮其計求救於術勸布出戰戰又敗乃還固守攻之不下時太祖連戰士卒罷欲還用荀攸郭嘉計遂決泗沂水以灌城月餘布將宋憲魏續等執陳宫舉城降生禽布宫皆殺之太山臧覇孫觀吳敦尹禮昌豨各率衆布之破劉備也覇等悉從布布敗獲霸等太祖厚納待遂割青徐二州附于海以委焉分琅邪東海北海為城陽利城昌慮郡初太祖為兖州以東平畢諶為别駕張邈之叛也邈刼諶母弟妻子太祖謝遣之曰卿老母在彼可去諶頓首無二心太祖嘉之為之流涕旣出遂亡歸及布破諶生得衆為諶懼太祖曰夫人孝於其親者豈不亦忠於君乎吾所求也以為魯相四年春二月太祖還至昌邑張楊將張醜殺楊眭固又殺醜以其衆屬袁紹屯射犬夏四月進軍臨河使史渙曹仁渡河撃之固使楊故長史薛洪河内太守繆尚留守自將兵北迎紹求救與渙仁相遇犬城交戰大破之斬固太祖遂濟河圍射犬洪尚率衆降封為列侯還軍敖倉以魏种為河内太守屬以河北事初太祖舉种孝廉兖州叛太祖曰唯魏种且不棄孤也及聞种走太祖怒曰种不南走越北走胡不置汝也旣下射犬生禽种太祖曰唯其才也釋其縛而用之是時袁紹旣并公孫瓚兼四州之地衆十餘萬將進軍攻許諸將以為不可敵太祖曰吾知紹之為人志大而智小色厲而膽薄忌克而少威兵多而分畫不明將驕而政令不一土地雖廣糧食雖豐適足以為吾奉也秋八月太祖進軍黎陽使臧霸等入青州破齊北海東安留于禁屯河上九月太祖還許分兵守官渡冬十一月張繡率衆降封列侯十二月太祖軍官渡袁術自敗於陳稍困袁譚自青州遣迎之術欲從下邳北過太祖遣劉備朱靈要之㑹術病死程昱郭嘉聞太祖遣備言於公曰劉備不可縱太祖悔追之不及備之未東也隂與董承等謀反至下邳遂殺徐州刺史車胄舉兵屯沛遣劉岱王忠撃之不克廬江太守劉勲率衆降封為列侯五年春正月董承等謀泄皆伏誅太祖將自東征備諸將皆曰與公爭天下者袁紹也今紹方來而棄之東紹乘人後若何太祖曰夫劉備人傑也今不擊必為後患袁紹雖有大志而見事遲必不動也郭嘉亦勸太祖遂東撃僃破之生禽其將夏侯愽備走奔紹獲其妻子備將關羽屯下邳復進攻之羽降昌豨叛為備又攻破之太祖還官渡紹卒不出二月紹遣郭圖淳于瓊顔良攻東郡太守劉延於白馬紹引兵至黎陽將渡河夏四月太祖北救延荀攸説太祖曰今兵少不敵分其勢乃可太祖到延津若將渡兵向其後者紹必西應之然後輕兵襲白馬掩其不備顔良可禽也太祖從之紹聞兵渡即分兵西應之太祖乃引軍兼行趣白馬未至十餘里良大驚來逆戰使張遼關羽前登擊破斬良遂解白馬圍徙其民循河而西紹於是渡河追太祖軍至延津南太祖勒兵駐營南阪下使登壘望之曰可五六百騎有頃復白騎稍多歩兵不可勝數太祖曰勿復白乃令騎解鞍放馬是時白馬輜重就道諸將以為敵騎多不如還保營荀攸曰此所以餌敵如何去之紹騎將文醜與劉備將五六千騎前後至諸將復白可上馬太祖曰未也有頃騎至稍多或分趣輜重太祖曰可矣乃皆上馬時騎不滿六百遂縱兵擊大破之斬醜良醜皆紹名將也再戰而禽紹軍大震太祖還軍官渡紹進保陽武關羽亡歸劉備八月紹連營稍前依沙塠為屯東西數十里太祖亦分營與相當合戰不利時太祖兵不滿萬傷者十二三紹復進臨官渡起土山地道太祖亦於内作之以相應紹射營中矢如雨下行者皆䝉楯衆大懼時太祖糧少與荀彧書議欲還許彧以為紹悉衆聚官渡欲與公決勝敗公以至弱當至彊若不能制必為所乘是天下之大機也且紹布衣之雄耳能聚人而不能用夫以公之神武明哲而輔以大順何向而不濟太祖從之孫筞聞太祖與紹相持乃謀襲許未發為刺客所殺汝南降賊劉辟等叛應紹畧許下紹使劉備助辟太祖使曹仁撃破之備走遂破辟屯袁紹運榖車數千乗至太祖用荀攸計遣徐晃史渙邀撃大破之盡燒其車太祖與紹相拒連月雖比戰斬將然衆少糧盡士卒疲乏太祖謂運者曰却十五日為汝破紹不復勞汝矣冬十月紹遣車運榖使淳于瓊等五人將兵萬餘人送之宿紹營北四十里紹謀臣許攸貪財紹不能足來奔因説太祖撃瓊等左右疑之荀攸賈詡勸太祖太祖乃留曹洪守自將歩騎五千人夜往㑹明至瓊等望見太祖兵少出陣門外太祖急撃之瓊退保營遂攻之紹遣騎救瓊左右或言賊騎稍近請分兵拒之太祖怒曰賊在背後乃白士卒皆殊死戰大破瓊等皆斬之紹初聞太祖之撃瓊謂長子譚曰就彼攻瓊等吾攻抜其營彼固無所歸矣乃使髙郃髙覽攻曹洪郃等聞瓊破遂來降紹衆大潰紹及譚棄車走渡河追之不及盡收其輜重圖書珍寳虜其衆太祖收紹書中得許下及軍中人書皆焚之冀州諸郡多舉城邑降者初桓帝時有黄星見於楚宋之分遼東殷馗善天文言後五十嵗當有真人起於梁沛之間其鋒不可當至是凡五十年而太祖破紹天下莫敵矣六年夏四月揚兵河上撃紹倉亭軍破之紹歸復收散卒攻定諸叛郡縣九月太祖還許紹之未破也使劉備畧汝南賊共都等應之遣蔡揚擊都不利為都所破太祖南征備備聞太祖自行走奔劉表都等皆散七年春正月太祖軍譙令曰吾起義兵為天下誅暴亂舊土人民死䘮畧盡國中終日行不見所識使吾悽愴傷懐其舉義兵已來將士絶無後者求其親戚以後之授土田官給耕牛置學師以教之為存者立廟使祀其先人魂而有靈吾百年之後何恨哉遂至浚儀治睢陽渠遣使以太牢祀橋元進軍官渡紹自軍破後發病嘔血夏五月死小子尚代譚自號車騎將軍屯黎陽秋九月太祖征之連戰譚尚數敗退固守八年春三月攻其郭乃出戰撃大破之譚尚夜遁夏四月進軍鄴五月還許留賈信屯黎陽己酉令曰司馬法將軍死綏故趙括之母乞不坐括是古之將者軍破於外而家受罪於内也自命將征行但賞功而不罰罪非國典也其令諸將出征敗軍者抵罪失利者免官爵秋七月令曰䘮亂已來十有五年後生者不見仁義禮讓之風吾甚傷之其令郡國各修文學縣滿五百户置校官選其鄉之俊造而敎學之庻㡬先王之道不廢而有益於天下八月太祖征劉表軍西平太祖之去鄴而南也譚尚爭冀州譚為尚所敗走保平原尚攻之急譚遣辛毗乞降請救諸將皆疑荀攸勸太祖許之乃引軍還冬十月到黎陽為子整與譚結㛰尚聞太祖北乃釋平原還鄴東平吕曠吕詳叛尚屯陽平率其衆降封為列侯九年春正月濟河遏淇水入白溝以通糧道二月尚復攻譚留蘇由審配守鄴太祖進軍到洹水由降既至攻鄴為土山地道武安長尹楷屯毛城通上黨糧道夏四月留曹洪攻鄴太祖自將撃楷破之而還尚將沮鵠守邯鄲又撃拔之易陽令韓範渉長梁岐舉縣降賜爵關内侯五月毁土山地道作圍塹決漳水灌城城中餓死者過半秋七月尚還救鄴諸將皆以為此歸師人自為戰不如避之太祖曰尚從大道來當避之若循西山來者此成禽耳尚果從西山來臨滏水為營夜遣兵犯圍太祖逆撃破走之遂圍其營未合尚懼故豫州刺史隂䕫及陳琳乞降太祖不許為圍益急尚夜遁保祁山追撃之其將馬延張顗等臨陣降衆大潰尚走中山盡獲其輜重得尚印綬節鉞使尚降人示其家城中崩沮八月審配兄子榮夜開所守城東門内兵配逆戰敗生禽配斬之鄴定太祖臨祀紹墓哭之流涕慰勞紹妻還其家人寳物賜雜繒絮廪食之初紹與太祖共起兵紹問太祖曰若事不輯則方面何所可據太祖曰足下意以為何如紹曰吾南據河北阻燕代兼戎狄之衆南向以爭天下庻可以濟乎太祖曰吾任天下之智力以道御之無所不可九月令曰河北罹袁氏之難其令無出今年租賦重豪彊兼并之法百姓喜恱天子以太祖領冀州牧太祖讓還兖州太祖之圍鄴也譚畧取甘陵安平渤海河間尚敗還中山譚攻之尚奔故安遂并其衆太祖遺譚書責以負約與之絶㛰女還然後進軍譚懼拔平原走保南皮十二月太祖入平原畧定諸縣十年春正月攻譚破之斬譚誅其妻子冀州平下令曰其與袁氏同惡者與之更始令民不得復私讎禁厚𦵏皆一之於法是月袁熈大將焦觸張南等叛攻熈尚熈尚奔三郡烏丸觸等舉其縣降封為列侯初討譚時民亡椎冰令不得降頃之亡民有詣門首者太祖曰聴汝則違令殺汝則誅首歸深自藏無為吏所獲民垂泣而去後竟捕得夏四月黒山賊張燕率其衆十餘萬降封為列侯故安趙犢霍奴等殺幽州刺史涿郡太守三郡烏丸攻鮮于輔於獷平秋八月太祖征之斬犢等乃渡潞河救獷平烏丸奔走出塞九月令曰阿黨比周先聖所疾也聞冀州俗父子異部更相毁譽昔直不疑無兄人謂之盗嫂第五伯魚三娶孤女人謂之撾婦翁王鳯擅權谷永比之申伯王商忠議張匡謂之左道此皆以白為黒欺天罔君者也吾欲整齊風俗四者不除吾以為羞冬十月太祖還鄴初袁紹以甥髙幹領并州牧太祖之拔鄴幹降以為刺史聞太祖討烏桓以州叛執上黨太守舉兵守壺關口遣樂進李典撃之幹還守壺關十一年春正月太祖征幹幹聞之乃留其别將守城走入匈奴求救於單于單于不受太祖圍壺關三月㧞之幹遂走荆州上洛都尉王琰捕斬之秋八月太祖東征海賊管承至淳于遣樂進李典撃破之承走入海島割東海之襄賁郯戚以益琅邪省昌慮郡三郡烏丸承天下亂破幽州畧有漢民合十餘萬户袁紹皆立其酋豪為單于以家人子為己女妻焉遼西單于蹋頓尤彊為紹所厚故尚兄弟歸之數入塞為害太祖將征之鑿渠自呼沲入𣲖水名平虜渠又從泃河口鑿入潞河名泉州渠以通海十二年春正月太祖自淳于還鄴丁酉令曰吾起義兵誅暴亂於今十九年所征必克豈吾功哉乃賢士大夫之力也天下雖未悉定吾當要與賢士大夫共定之而專饗其勞吾何以安焉其促定功行封於是大封功臣二十餘人皆為列侯其餘各以次受封及復死事之孤輕重各有差將北征三郡烏丸諸將皆曰袁尚亡虜耳夷狄貪而無親豈能為尚用今深入征之劉備必說劉表以襲許萬一為變事不可悔惟郭嘉策表必不能任備勸太祖行夏五月至無終秋七月大水傍海道不通田疇請為鄉導太祖從之引軍出盧龍塞塞外道絶不通乃塹山堙谷五百餘里經白檀歴平剛渉鮮卑庭東指栁城未至二百里虜乃知之尚熈與蹋頓遼西單于樓班右北平單于能臣抵之等將數萬騎逆軍八月登白狼山卒與虜遇衆甚盛太祖車重在後被甲者少左右皆懼太祖登髙望虜陣不整乃縱兵撃之使張遼為先鋒虜衆大崩斬蹋頓及名王已下胡漢降者二十餘萬口遼東單于速僕丸及遼西北平諸豪棄其種人與尚熈奔遼東衆尚有數千騎初遼東太守公孫康恃逺不服及太祖破烏丸或説太祖遂征之尚兄弟可禽也太祖曰吾方使康斬送尚熙首不煩兵矣九月太祖引兵自栁城還康即斬尚熈及速僕丸等𫝊其首諸將或問太祖還而康斬送尚熙何也太祖曰彼素畏尚等吾急之則并力緩之則自相圖其勢然也十一月至易水代郡烏丸行單于普富盧上郡烏丸行單于那樓將其名王来賀十三年春正月太祖還鄴作元武池以肄舟師漢罷三公官置丞相御史大夫夏六月以太祖為丞相秋七月太祖南征劉表八月表卒其子琮代屯襄陽劉備屯樊九月太祖到新野琮遂降備走夏口太祖進軍江陵下令荆州吏民與之更始乃論荆州服從之功侯者十五人以劉表大將文聘為江夏太守使統本兵引用荆州名士韓嵩鄧義等益州牧劉璋始受徴役遣兵給軍十二月孫權為備攻合肥太祖自江陵征備至巴邱遣張憙救合肥權聞憙至乃走太祖至赤壁與備戰不利於是大疫吏士多死者乃引軍還備遂有荆州江南諸郡十四年春三月軍至譙作輕舟治水軍秋七月自渦入淮出肥水軍合肥辛未令曰自頃已来軍數征行或遇疫氣吏士死亡不歸家室怨曠百姓流離而仁者豈樂之哉不得已也其令死者家無基業不能自存者縣官勿絶廩長吏存䘏撫循以稱吾意置揚州郡縣長吏開芍陂屯田十二月軍還譙十五年春下令曰自古受命及中興之君曷嘗不得賢人君子與之共治天下者乎及其得賢也曾不出閭巷豈幸相遇哉上之人不求之耳今天下尚未定此特求賢之急時也孟公綽為趙魏老則優不可以為滕薛大夫若必廉士而後可用則齊桓其何以霸世今天下得無有被褐懐玉而釣於渭濵者乎又得無盗嫂受金而未遇無知者乎二三子其佐我眀揚側陋唯才是舉吾得而用之冬作銅爵臺十六年春正月天子命太祖世子丕為五官中郎將置官屬為丞相副太原商曜等以大陵叛遣夏侯淵徐晃圍破之張魯據漢中三月遣鍾繇討之太祖使淵等出河東與繇㑹是時關中諸將疑繇欲自襲馬超遂與韓遂楊秋李堪成宜等叛遣曹仁討之超等屯潼關太祖勑諸將關西兵精悍堅壁勿與戰秋七月太祖西征與超等夹關而軍太祖急持之而濳遣徐晃朱靈等夜渡蒲阪津據河西為營太祖自潼關北渡未濟超赴船急戰校尉丁斐因放牛馬以餌賊賊亂取牛馬太祖乃得渡循河為甬道而南賊退拒渭口太祖乃多設疑兵潜以舟載兵入渭為浮橋夜分兵結營於渭南賊夜攻營伏兵撃破之超等屯渭南遣信求割河以西請和太祖不許九月進軍渡渭超等數挑戰又不許固請割地求送任子太祖用賈詡計偽許之韓遂請與太祖相見太祖與遂父同嵗孝㢘又與遂同時儕輩於是交馬語移時不及軍事但説京都舊故拊手歡笑既罷超等問遂公何言遂曰無所言也超等疑之他日太祖又與遂書多所㸃竄如遂改定者超等愈疑遂太祖乃與克日㑹戰先以輕兵挑之戰良乆乃縱虎騎夹撃大破之斬成宜李堪等遂超等走涼州楊秋奔安定關中平諸將或問太祖曰初賊守潼關渭北道闕不從河東撃馮翊而反守潼關引日而後北渡何也太祖曰賊守潼關若吾入河東賊必引守諸津則西河未可渡吾故盛兵向潼關賊悉衆南守西河之備虚故二將得擅取西河然後引軍北渡賊不能與吾争西河者以有二將之軍也連車樹柵為甬道而南既為不可勝且以示弱渡渭為堅壘虜至而出所以驕之也故賊不為營壘而求割地吾順言許之所以從其意使自安而不為備因畜士卒之力一旦撃之所謂疾雷不及掩耳兵之變化固非一道也始賊每一部到太祖輙有喜色賊破之後諸將問其故太祖荅曰關中長逺若賊各依險阻征之不一二年不可定也今皆来集其衆雖多莫相歸服軍無適主一舉可滅為功差易吾是以喜冬十月太祖自長安北征楊秋圍安定秋降復其爵位使留撫其民人十二月自安定還留夏侯淵屯長安十七年春正月太祖還鄴天子命太祖賛拜不名入朝不趨劒履上殿如蕭何故事馬超餘衆梁興等屯藍田使夏侯淵撃平之割河内之蕩隂朝歌林慮東郡之衛國頓邱東武陽發干鉅鹿之癭陶曲周南和廣平之任城趙之襄國邯鄲易陽以益魏郡冬十月太祖征孫權十八年春正月進軍濡須口攻破權江西營獲權都督公孫陽乃引軍還詔書并二十四州復為九州夏四月至鄴五月丙申天子使御史大夫郗慮持節策命太祖為魏公曰朕以不徳少遭愍凶越在西土遷于唐衛當此之時若綴旒然宗廟乏祀社稷無位羣凶覬覦分裂諸夏率土之民朕無獲焉即我髙祖之命將墜于地朕用夙興假寐震悼于厥心曰惟祖惟父股肱先正其孰能恤朕躬乃誘天衷誕育丞相保乂我皇家𢎞濟于艱難朕實頼之今將授君典禮其敬聴朕命昔者董卓初興國難羣后釋位以謀王室君則攝進首啓戎行此君之忠于本朝也後及黄巾反易天常侵我三州延及平民君又翦之以寧東夏此又君之功也韓暹楊奉専用威命君則致討克黜其難遂遷許都造我京畿設官兆祀不失舊物天地鬼神於是獲乂此又君之功也袁術僣逆肆於淮南懾憚君靈用丕顯謀蘄陽之役橋蕤授首稜威南邁術以隕潰此又君之功也廻戈東征吕布就戮乗轅將返張楊殂斃眭固伏罪張繡稽服此又君之功也袁紹逆亂天常謀危社稷憑恃其衆稱兵内侮當此之時王師寡弱天下寒心莫有固志君執大節精貫白日奮其武怒運其神䇿致届官渡大殱醜類俾我國家拯於危墜此又君之功也濟師洪河拓定四州袁譚髙幹咸梟其首海盗奔逆黒山順軌此又君之功也烏丸三種崇亂二世袁尚因之逼據塞北束馬縣車一征而滅此又君之功也劉表背誕不供貢職王師首路威風先逝百城八郡交臂屈膝此又君之功也馬超成宜同惡相濟濵據河潼求逞所欲殄之渭南獻馘萬計遂定邉境撫和戎狄此又君之功也鮮卑丁零重譯而至單于白屋請吏率職此又君之功也君有定天下之功重之以眀徳班叙海内宣羙風俗旁施勤教恤慎刑獄吏無苛政民無懐慝敦崇帝族表繼絶世舊徳前功罔不咸秩雖伊尹格于皇天周公光于四海方之蔑如也朕聞先王並建眀徳胙之以土分之以民崇其寵章備其禮物所以藩衛王室左右厥世也其在周成管蔡不静懲難念功乃使召康公賜齊太公履東至于海西至于河南至于穆陵北至于無棣五侯九伯實得征之世祚太師以表東海爰及襄王亦有楚人不供王職又命晋文登為侯伯錫以二輅虎賁鈇鉞秬鬯弓矢大啓南陽世作盟主故周室之不壊繄二國是頼今君稱丕顯徳眀保朕躬奉答天命導揚𢎞烈綏爰九域莫不率俾功髙于伊周而賞卑於齊晋朕甚恧焉朕以眇眇之身託於兆民之上永思厥艱若渉淵氷非君攸濟朕無任焉今以冀州之河東河内魏郡趙國中山常山鉅鹿安平甘陵平原凡十郡封君為魏公錫君元土苴以白茅爰契爾龜用建冢社昔在周室畢公毛公入為卿士周召師保出為二伯外内之任君實宜之其以丞相領冀州牧如故又加君九錫其敬聴朕命君經緯禮律為民軌儀使安職業無或遷志是用錫君大輅戎輅各一元牡二駟君勸分務本穡人昬作粟帛滯積大業惟興是用錫君衮冕之服赤舄副焉君敦尚謙讓俾民興行少長有禮上下咸和是用錫君軒縣之樂及六佾之舞君翼宣風化爰發四方逺人革面華夏充實是用錫君朱户以居君研其眀哲思帝所難官才任賢羣善必舉是用錫君納陛以登君秉國之鈞正色處中纎毫之惡莫不抑退是用錫君虎賁之士三百人君紏䖍天刑章厥有罪犯闗干紀莫不誅殛是用錫君鈇鉞各一君龍驤虎視旁眺八維掩討逆節折衝四海是用錫君彤弓一彤矢百玈弓十玈矢千君以温㳟為基孝友為徳眀允篤誠感于朕思是用錫君秬鬯一卣圭瓚副焉魏國置丞相已下羣卿百寮皆如漢初諸侯王之制往欽哉敬服朕命簡恤爾衆時亮庻功用終爾顯徳對揚我髙祖之休命秋七月始建魏社稷宗廟天子聘太祖三女為貴人少者待年於國九月作金虎臺鑿渠引漳水入白溝以通河冬十月分魏郡為東西部置都尉十一月初置尚書侍中六卿馬超在漢陽復因羌胡為害氐王千萬叛應超屯興國使夏侯淵討之十九年春正月始耕籍田南安趙衢漢陽尹奉等討超梟其妻子超奔漢中韓遂徙金城入氐王千萬部率羌胡萬餘騎與夏侯淵戰撃大破之遂走西平淵與諸將攻興國屠之省安東永陽郡安定太守毋邱興將之官太祖戒之曰羌胡欲與中國通自當遣人來慎勿遣人往善人難得必將教羌胡妄有所請求因欲以自利不從便為失異俗意從之則無益事興至遣校尉范陵至羌中陵果教羌使自請為屬國都尉太祖曰吾豫知當爾非聖也但更事多耳三月天子使魏公位在諸侯王上改授金璽赤紱逺游冠秋七月太祖征孫權初隴西宋建自稱河首平漢王聚衆枹罕改元置百官三十餘年遣夏侯淵自興國討之冬十月屠枹罕斬建涼州平太祖自合肥還十一月漢皇后伏氏坐昔與父故屯騎校尉完書云帝以董承被誅怨恨太祖辭甚醜惡發聞皇后廢黜死兄弟皆伏法十二月太祖至孟津天子命太祖置旄頭宫殿設鍾虡乙未令曰夫有行之士未必能進取進取之士未必能有行也陳平豈篤行蘇秦豈守信邪而陳平定漢業蘇秦濟弱燕由此言之士有偏短庸可廢乎有司眀思此義則士無遺滯官無廢業矣又曰夫刑百姓之命也而軍中典獄者或非其人而任以三軍死生之事吾甚懼之其選眀達法理者使持典刑於是置理曹掾屬二十年春正月天子立太祖中女為皇后省雲中定襄五原朔方郡郡置一縣領其民合以為新興郡三月太祖西征張魯至陳倉將自武都入氐氐人塞道先遣張郃朱靈等攻破之夏四月太祖自陳倉以出􅄆關至河池氐王竇茂衆萬餘人恃險不服五月太祖攻屠之西平金城諸將麴演蔣石等共斬送韓遂首秋七月太祖至陽平張魯使弟衛與將楊昂等據陽平關横山築城十餘里攻之不能拔乃引軍還賊見大軍退其守備解散太祖乃宻遣解􅀈髙祚等乗險夜襲大破之斬其將楊任進攻衛衛等夜遁魯奔巴中太祖軍入南鄭盡得魯府庫珍寳巴漢皆降復漢寧郡為漢中分漢中之安陽西城為西城郡置太守分錫上庸郡置都尉八月孫權圍合肥張遼李典撃破之九月巴七姓夷王朴胡賨邑侯杜濩舉邑夷賨民來附於是分巴郡以胡為巴東太守濩為巴西太守皆封列侯天子命太祖承制封拜諸侯守相冬十月始置名號侯至五大夫與舊列侯關内侯凡六等以賞軍功十一月魯自巴中將其餘衆降封魯及五子皆為列侯劉備襲劉璋取益州遂據巴中遣張郃撃之十二月太祖自南鄭還留夏侯淵屯漢中二十一年春二月太祖還鄴三月壬寅太祖親耕籍田夏五月天子進太祖爵為魏王代郡烏桓行單于普富盧與其侯王來朝天子命太祖女為公主食湯沐邑秋七月匈奴南單于呼厨泉將其名王來朝待以客禮遂留魏使右賢王去卑監其國八月以大理鍾繇為相國冬十月治兵遂征孫權十一月至譙二十二年春正月太祖軍居巢二月進軍屯江西郝谿權在濡須口築城拒守遂逼攻之權退走三月太祖引軍還留夏侯惇曹仁張遼等屯居巢夏四月天子命太祖設天子旌旗出入稱警蹕五月作泮宫六月以軍師華歆為御史大夫冬十月天子命太祖冕十有二旒乗金根車駕六馬設五時副車以五官中郎將丕為魏太子劉備遣張飛馬超吳蘭等屯下辯遣曹洪拒之二十三年春正月漢太醫令吉本與少府耿紀司直韋晃等反攻許燒丞相長史王必營必與潁川典農中郎將嚴匡討斬之曹洪破吳蘭斬其將任䕫等三月張飛馬超走漢中隂平氐彊端斬吳蘭𫝊其首夏四月代郡上谷烏丸無臣氐等叛遣鄢陵侯彰討破之六月令曰古之𦵏者必居瘠薄之地其規西門豹祠西原上為夀陵因髙為基不封不樹周禮冢人掌公墓之地凡諸侯居左右以前卿大夫居後漢制亦謂之陪陵其公卿大臣列將有功者宜陪夀陵其廣為兆域使足相容秋七月治兵遂西征劉備九月至長安冬十月宛守將侯音等反執南陽太守刼略吏民保宛初曹仁討闗羽屯樊城是月使仁圍宛二十四年春正月仁屠宛斬音夏侯淵與劉備戰於陽平為備所殺三月太祖自長安出斜谷軍遮要以臨漢中遂至陽平備因險拒守夏五月引軍還長安秋七月以夫人卞氏為王后遣于禁助曹仁撃闗羽八月漢水溢灌禁軍軍没羽獲禁遂圍仁使徐晃救之九月相國鍾繇坐西曹掾魏諷反免冬十月軍還洛陽孫權遣使上書以討闗羽自效太祖自洛陽南征羽未至晃攻羽破之羽走仁圍觧太祖軍摩陂二十五年春正月至洛陽權撃斬羽傳其首庚子太祖崩于洛陽年六十六遺令曰天下尚未安定未得遵古也𦵏畢皆除服其將兵屯戌者皆不得離屯部有司各率乃職歛以時服無藏金玉珍寳諡曰武王二月丁卯𦵏髙陵文皇帝諱丕字子桓武帝太子也中平四年冬生于譙建安十六年為五官中郎將副丞相二十二年立為魏太子太祖崩嗣位為丞相魏王尊王后曰王太后改建安二十五年為延康元年元年二月壬戍以太中大夫賈詡為太尉御史大夫華歆為相國大理王朗為御史大夫置散騎常侍侍郎各四人其宦人為官者不得過諸署令為金策著令藏之石室初漢熹平五年黄龍見譙光禄大夫橋元問太史令單颺此何祥也颺曰其國後當有王者興不及五十年亦當復見天事恒象此其應也内黄殷登黙而記之至四十五年登尚在三月黄龍見譙登聞之曰單颺之言其驗兹乎己卯以前將軍夏侯惇為大將軍濊貊扶餘單于焉耆于闐王皆各遣使奉獻夏四月丁巳饒安縣言白雉見庚午大將軍夏侯惇薨五月戊寅天子命帝追尊皇祖太尉曰太王夫人丁氏曰太王后封王子叡為武徳侯是月馮翊山賊鄭甘王照率衆降皆封列侯酒泉黄華張掖張進等各執太守以叛金城太守蘇則討進斬之華降六月辛亥治兵于東郊庚午遂南征秋七月庚辰令曰軒轅有眀臺之議放勛有衢室之問皆所以廣詢于下也百官有司其務以職盡規諌將率陳軍法朝士眀制度牧守申政事搢紳考六蓺吾將兼覽焉孫權遣使奉獻蜀將孟逹率衆降武都氐王楊僕率種人内附居漢陽郡甲午軍次于譙大饗六軍及譙父老百姓于邑東八月石邑縣言鳳皇集冬十一月癸卯令曰諸將征伐士卒死亡者或未收歛吾甚哀之其告郡國給槥櫝殯歛送致其家官為設祭丙午行至曲蠡漢帝以衆望在魏乃召羣公卿士告祠髙廟使兼御史大夫張音持節奉璽綬禪位冊曰咨爾魏王昔者帝堯禪位于虞舜舜亦以命禹天命不于常惟歸有徳漢道陵遲世失其序降及朕躬大亂兹昬羣凶肆逆宇内顛覆頼武王神武拯兹難于四方惟清區夏以保綏我宗廟豈予一人獲乂俾服實受其賜今王欽承前緒光于乃徳恢文武之大業昭爾考之昭烈皇靈降瑞人神告徴誕惟亮采師錫朕命僉曰爾度克協于虞舜用率我唐典敬遜爾位於戲天之歴數在爾躬允執其中天禄永終君其祇順大禮饗兹萬國以肅承天命乃為壇於繁陽庚午帝升壇即阼百官陪位事訖降壇視燎成禮而反改延康為黄初大赦黄初元年十一月癸酉以河内之山陽邑萬户奉漢帝為山陽公行漢正朔以天子之禮郊祭上書不稱臣京都有事于太廟致胙封公之四子為列侯追尊皇祖太王曰太皇帝考武王曰武皇帝尊王太后曰皇太后賜男子爵人一級為父後及孝悌力田人二級以漢諸侯王為崇徳侯列侯為闗中侯以潁隂之繁陽亭為繁昌縣封爵増位各有差改相國為司徒御史大夫為司空奉常為太常郎中令為光禄勲大理為廷尉大農為大司農郡國縣邑多所改易更封匈奴南單于呼厨泉魏璽綬賜青盖車乗輿寳劒玉玦十二月初營洛陽宫戊午幸洛陽是嵗長水校尉戴陵諌不宜數行弋獵帝大怒陵減死罪一等二年春正月郊祀天地眀堂甲戍校獵至原陵遣使者以太牢祠漢世祖乙亥朝日于東郊初令郡國口滿十萬者嵗察孝廉一人其有秀異無拘户口辛巳分三公户邑封子弟各一人為列侯壬午復潁川郡一年田租改許縣為許昌縣以魏郡東部為陽平郡西部為廣平郡詔以議郎孔羡為宗聖侯邑百户奉孔子祀令魯郡修起舊廟置百吏卒以守衛之又於其外廣為室屋以居學者春三月加遼東太守公孫恭為車騎將軍初復五銖錢夏四月以車騎將軍曹仁為大將軍五月鄭甘復叛遣曹仁討斬之六月庚子初祀五嶽四瀆咸秩羣祀丁卯夫人甄氏卒戊辰晦日有食之有司奏免太尉詔曰災異之作以譴元首而歸過股肱豈禹湯罪已之義乎其令百官各䖍厥職後有天地之眚勿復劾三公秋八月孫權遣使奉章并遣于禁等還丁巳使太常邢貞持節拜權為大將軍封吳王加九錫冬十月授楊彪光禄大夫以榖貴罷五銖錢己卯以大將軍曹仁為大司馬十二月行東廵是嵗築凌雲臺三年春正月丙寅朔日有食之庚午行幸許昌宫詔令郡國選士勿拘老幼儒通經術吏達文法到皆試用有司紏故不以實者二月鄯善龜兹于闐王各遣使奉獻詔曰西戎即叙氐羌來王詩書羙之頃者西域外夷並欵塞内附其遣使者撫勞之是後西域遂通置戊己校尉三月乙丑立齊公叡為平原王帝弟鄢陵公彰等十一人皆為王初制封王之庻子為鄉公嗣王之庶子為亭侯公之庶子為亭伯甲戌立皇子霖為河東王甲午行幸襄邑夏四月戊申立鄄城侯植為鄄城王癸亥行還許昌宫五月以荆揚江表八郡為荆州孫權領牧故也荆州江北諸郡為郢州閏月孫權破劉備於夷陵初帝聞備兵東下與權交戰樹柵連營七百餘里謂羣臣曰備不曉兵豈有七百里營可以拒敵者乎苞原隰險阻而為軍者為敵所禽此兵忌也孫權上事今至矣後七日破備書到秋七月冀州太蝗民饑使尚書杜畿持節開倉廪以振之八月蜀大將黄權率衆降九月甲午詔曰夫婦人與政亂之本也自今以後羣臣不得奏事太后后族之家不得當輔政之任又不得横受茅土之爵以此詔傳後世若有背違天下共誅之庚子立皇后郭氏賜天下男子爵人一級鰥寡篤癃及貧不能自存者賜榖冬十月甲子表首陽山東為夀陵作終制曰禮國君即位為椑存不忘亡也昔堯𦵏榖林通樹之禹𦵏㑹稽農不易畝故𦵏於山林則合乎山林封樹之制非上古也吾無取焉夀陵因山為體無為封樹無立寢殿造園邑通神道夫𦵏也者藏也欲人之不得見也骨無痛痒之知冢非棲神之宅禮不墓祭欲存亡之不黷也為棺槨足以朽骨衣衾足以朽肉而已故吾營此邱墟不食之地欲使易代之後不知其處無施葦炭無藏金銀銅鐡一以瓦器合古塗車芻靈之義棺但漆際㑹三過飯含無以珠玉無施珠襦玉匣諸愚俗所為也季孫以璵璠歛孔子歴級而救之譬之暴骸中原宋公厚𦵏君子謂華元樂莒不臣以為棄君於惡漢文帝之不發霸陵無求也光武之掘原陵封樹也霸陵之完功在釋之原陵之掘罪在眀帝是釋之忠以利君眀帝愛以害親也忠臣孝子宜思仲尼邱眀釋之之言鑒華元樂莒眀帝之戒存於所以安君定親使魂靈萬載無危斯則賢聖之忠孝矣自古及今未有不亡之國亦無不掘之墓也䘮亂以來漢氏諸陵無不發掘至乃燒取玉匣金縷骸骨并盡是焚如之刑也豈不重痛哉禍由乎厚𦵏封樹桑霍為我戒不亦眀乎其皇后及貴人以下不随王之國者有終沒皆𦵏澗西前又以表其處矣盖舜𦵏蒼梧二妃不從延陵𦵏子逺在嬴博魂而有靈無不之也一澗之間不足為逺若違今詔妄有所變改造施吾為戮尸地下戮而重戮死而重死臣子為蔑死君父不忠不孝使死者有知將不福汝其以此詔藏之宗廟副在尚書祕書三府是月孫權復叛復郢州為荆州帝自許昌南征諸軍兵並進權臨江拒守十一月辛丑行幸宛庚申晦日有食之是嵗穿靈芝池四年春正月詔曰䘮亂以來兵革未戢天下之人互相殘殺今海内初定敢有私復讎者皆族之築南廵臺于宛三月丙申行自宛還洛陽宫癸卯月犯心中央大星丁未大司馬曹仁薨是月大疫夏五月有鵜鴣鳥集靈芝池詔曰此詩人所謂汚澤也曹詩刺共公逺君子而近小人今豈有賢智之士處于下位乎否則斯鳥何為而至其博舉天下儁徳茂才獨行君子以答曹人之刺六月甲戌任城王彰薨于京都甲申太尉賈詡薨太白晝見是月大雨伊洛溢流殺人民壊廬宅秋八月丁卯以廷尉鍾繇為太尉辛未校獵于榮陽遂東廵論征孫權功諸將已下進爵増户各有差九月甲辰行幸許昌宫五年春正月初令謀反大逆乃得相告其餘皆勿聴治敢妄相告以其罪罪之三月行自許昌還洛陽宫夏四月立太學制五經課試之法置春秋榖梁博士五月有司以公卿朝朔望日因奏疑事聴斷大政論辨得失秋七月行東廵幸許昌宫八月為水軍親御龍舟循蔡潁浮淮幸夀春揚州界將吏死民犯五嵗刑已下皆原除之九月遂至廣陵赦青徐二州改易諸將守冬十月乙卯太白晝見行還許昌宫十一月庚寅以冀州饑遣使者開倉廪振之戊申晦日有食之十二月詔曰先王制禮所以昭孝事祖大則郊社其次宗廟三神五行名山大川非此族也不在祀典叔世衰亂崇信巫史至乃宫殿之内户牖之間無不沃酹甚矣其惑也自今其敢設非祀之祭巫祝之言皆以執左道論著于令典是嵗穿天淵池六年春二月遣使者循行許昌以東盡沛郡問民所疾苦貧者振貸之三月行幸召陵通討虜渠乙巳還許昌宫并州刺史梁習討鮮卑軻比能大破之辛卯帝為舟師東征五月戊申幸譙壬戌熒惑入太微六月利成郡兵蔡方等以郡反殺太守徐質遣屯騎校尉任福歩兵校尉叚昭與青州刺史討平之其見脅略及亡命者皆赦其罪秋七月立皇子鑒為東武陽王八月帝遂以舟師自譙循渦入淮從陸道幸徐九月築東廵臺冬十月行幸廣陵故城臨江觀兵戎卒十餘萬旌旗數百里是嵗大寒水道氷舟不得入江乃引還十一月東武陽王鑒薨十二月行自譙過梁遣使以太牢祀故漢太尉橋元七年春正月將幸許昌許昌城南門無故自崩帝心惡之遂不入壬子行還洛陽宫三月築九華臺夏五月丙辰帝疾篤召中軍大將軍曹真鎮軍大將軍陳羣征東大將軍曹休撫軍大將軍司馬懿並受遺詔輔嗣主遣後宫淑媛昭儀已下歸其家丁巳帝崩于嘉福殿時年四十六月戊寅𦵏首陽陵自殯及𦵏皆以終制從事初帝好文學以著述為務自所勒成垂百篇又使諸儒撰集經傳隨類相從凡千餘篇號曰皇覽陳夀曰文帝天資文藻下筆成章博聞彊識才蓺兼該若加之曠大之度勵之公平之誠邁志存道克廣徳心則古之賢主何逺之有哉文帝黄初七年眀皇帝諱叡字元仲文帝太子也生而太祖愛之常令在左右年十五封武徳侯黄初二年為齊公三年為平原王以其母誅故未建為嗣七年夏五月帝病篤乃立為皇太子丁巳即皇帝位大赦尊皇太后曰太皇太后皇后曰皇太后諸臣封爵各有差癸未追謚母甄夫人曰文昭皇后壬辰立皇弟㽔為陽平王八月孫權攻江夏郡太守文聘堅守朝議欲發兵救之帝曰權習水戰所以敢下船陸攻者㡬掩不備也今已與聘相持夫攻守勢倍終不敢乆也先時遣治書侍御史荀禹慰勞邉方禹到於江夏發所經縣兵及所從歩騎千人乗山舉火權退走辛巳立皇子冏為清河王吳將諸葛瑾張霸等寇襄陽撫軍大將軍司馬懿討破之斬霸征東大將軍曹休又破其别將於尋陽論功行賞各有差冬十月清河王冏薨十二月以太尉鍾繇為太傅征東大將軍曹休為大司馬中軍大將軍曹真為大將軍司徒華歆為太尉司空王朗為司徒鎮軍大將軍陳羣為司空撫軍大將軍司馬懿為驃騎大將軍太和元年春正月郊祀武皇帝以配天宗祀文皇帝於眀堂以配上帝分江夏南郡置江夏南郡都尉西平麴英反殺臨羌令西都長遣將軍郝昭鹿磐討斬之二月辛未帝耕于籍田辛巳立文昭皇后寢廟於鄴丁亥朝日于東郊夏四月乙亥行五銖錢甲申初營宗廟秋八月夕月于西郊冬十月丙寅治兵于東郊焉耆王遣子入侍十一月立皇后毛氏賜天下男子爵人二級鰥寡孤獨不能自存者賜榖十二月封后父毛嘉為列侯新城太守孟逹反詔驃騎將軍司馬懿討之二年春正月懿攻破新城斬逹傳其首分新城之上庸武陵巫縣為上庸郡錫縣為錫郡蜀大將諸葛亮宼邉天水南安安定三郡吏民叛應亮遣大將軍曹真都督闗右並進兵右將軍張郃撃亮於街亭大破之亮敗走三郡平丁未行幸長安夏四月丁酉還洛陽宫赦繋囚非殊死以下乙巳論討亮功封爵増邑各有差五月大旱六月詔曰尊儒貴學王教之本也自頃儒官或非其人將何以宣眀聖道其髙選博士才任侍中常侍者申勑郡國貢士以經學為先秋七月曹休率諸軍至皖與吴將陸議戰於石亭敗績乙酉立皇子穆為繁陽王庚子大司馬曹休薨冬十月詔公卿近臣舉良將各一人十一月司徒王朗薨十二月諸葛亮圍陳倉曹真遣將軍費曜等拒之遼東太守公孫㳟兄子淵刼奪恭位遂以淵領遼東太守三年夏四月元城王禮薨六月癸卯繁陽王穆薨戊申追尊大長秋曰髙皇帝夫人吳氏曰髙皇后秋七月詔曰禮王后無嗣擇建支子以繼大宗則當纂正統而奉公義何得復顧私親哉漢宣繼昭帝後加悼考以皇號哀帝以外藩援立而董宏等稱引亡秦惑誤時朝既尊㳟皇立廟京都又寵藩妾以比長信叙昭穆於前殿並四位於東宫僣差無度人神弗祐而非罪師丹忠正之諌用致丁傅焚如之禍自是之後相踵行之昔魯文逆祀罪由夏父宋國非度譏在華元其令公卿有司深以前世行事為戒後嗣萬一有由諸侯入奉大統則當眀為人後之義敢為佞邪導諛時君妄建非正之號以干正統謂考為皇謂妣為后則股肱大臣誅之無赦其書之金䇿藏之宗廟著于令典冬十月改平望觀曰聴訟觀帝常言獄者天下之性命也每斷大獄常幸觀臨聴之初洛陽宗廟未成神主在鄴廟十一月廟始成使太常韓暨持節迎髙皇帝太皇帝武帝文帝神主于鄴十二月己丑至奉安神主于廟癸卯大月氏王波調遣使奉獻以調為親魏大月氏王四年春二月壬午詔郎吏學通一經才任牧民博士課試擢其髙第者亟用其浮華不務道本者皆罷退之戊子詔太傅三公以文帝典論刻石立于廟門之外癸巳以大將軍曹真為大司馬驃騎大將軍司馬懿為大將軍遼東太守公孫淵為車騎將軍夏四月太傅鍾繇薨六月戊子太皇太后崩丙申省上庸郡秋七月武宣卞后祔𦵏于髙陵詔大司馬曹真大將軍司馬懿伐蜀八月辛巳行東廵遣使者以特牛祠中嶽乙未幸許昌宫九月大雨伊洛河漢水溢詔真等班師冬十月乙夘行還洛陽宫庚申令罪非殊死聴贖各有差十一月太白犯嵗星十二月辛未改𦵏文昭甄后于朝陽陵丙寅詔公卿舉賢良五年春正月帝耕于籍田三月大司馬曹真薨諸葛亮宼天水詔大將軍司馬懿拒之自去冬十月至此月不雨辛巳大雩夏四月鮮卑附義王軻比能率其種人及丁零大人兒禪詣幽州貢名馬復置䕶匈奴中郎將秋七月丙子以亮退走封爵增位各有差乙酉皇子殷生大赦八月詔曰古者諸侯朝聘所以敦睦親親協和萬國也先帝著令不欲使諸王在京都者謂幼主在位母后攝政防㣲以漸闗諸盛衰也朕惟不見諸王十有二載悠悠之懐能不興思其令諸王及宗室公侯各將適子一人朝後有少主母后在宫者自如先帝令眀著于令冬十一月乙酉月犯軒轅大星戊戌晦日有食之十二月甲辰月犯鎮星戊午太尉華歆薨六年春二月詔改封諸侯王皆以郡為國三月癸酉行東廵所過存問髙年鰥寡孤獨賜榖帛乙亥月犯軒轅大星夏四月壬寅行幸許昌宫甲子初進新果于廟五月皇子殷薨追封謚安平哀王秋七月以衛尉董昭為司徒九月行幸摩陂治許昌宫起景福承光殿冬十月殄夷將軍田豫帥衆討吳將周賀於成山殺賀十一月丙寅太白晝見有星孛于翼近太微上將星庚寅陳思王植薨十二月行還許昌宫青龍元年春正月甲申青龍見郏之摩陂井中二月丁酉幸摩陂觀龍於是改年改摩陂為龍陂賜男子爵人二級鰥寡孤獨無出今年租賦三月甲子詔公卿舉賢良篤行之士各一人夏五月壬申詔祀故大將軍夏侯惇大司馬曹仁車騎將軍程昱於太祖廟庭戊寅北海王蕤薨閏月庚寅朔日有食之丁酉改封宗室女非諸王女皆為邑主詔諸郡國山川不在祀典者勿祠六月洛陽宫鞠室災保塞鮮卑大人歩度根與叛鮮卑大人軻比能私通并州刺史畢軌表輙出軍以外威比能内鎮歩度根帝省表曰歩度根以為比能所誘有自疑心今軌出軍適使二部驚合為一何所威鎮乎促敕軌以出軍者慎勿越塞過句注也比詔書到軌以進軍屯隂館遣將軍蘇尚董弼追鮮卑比能遣子將千餘騎迎歩度根部落與尚弼相遇戰於樓煩二將没歩度根部落皆叛出塞與比能合宼邉遣驍騎將軍秦朗將中軍討之虜乃走漠北秋九月安定保塞匈奴大人胡薄居姿職等叛司馬懿遣將軍胡遵等追討破降之冬十月歩度根大人戴胡阿狼泥等詣并州降朗引軍還十二月公孫淵斬送孫權所遣使張彌許宴首以淵為大司馬樂浪公二年春二月乙未太白犯熒惑癸酉詔曰鞭作官刑所以紏慢怠也而頃多以無辜死其減鞭杖之制著于令三月庚寅山陽公薨帝素服發哀遣使持節典䕶䘮事己酉大赦夏四月大疫崇華殿災丙寅詔有司以太牢告祠文帝廟追謚山陽公為漢孝獻皇帝𦵏以漢禮是月諸葛亮出斜谷屯渭南司馬懿率諸軍拒之詔懿但堅壁拒守以挫其鋒彼進不得志退無與戰乆停則糧盡虜略無所獲則必走矣走而追之以逸待勞全勝之道也五月太白晝見孫權入居巢湖口向合肥新城又遣將陸議孫韶各將萬餘人入淮沔六月征東將軍滿寵進軍拒之寵欲㧞新城守致賊夀春帝不聴曰昔漢光武遣兵縣據略陽終以破隗囂先帝東置合肥南守襄陽西固祁山賊來輙破於三城之下者地有所必爭也縱權攻新城必不能破敕諸將堅守吾將自往征之比至恐權走也秋七月壬寅帝親御龍舟東征權攻新城將軍張潁等拒守力戰帝軍未至數百里權遁走議韶等亦退羣臣以為大將軍方與諸葛亮相持未解車駕可西幸長安帝曰權走亮膽破大將軍足以制之吾無憂矣遂進軍幸夀春録諸將功封賞各有差八月己未大曜兵饗六軍遣使者持節犒勞合肥夀春諸軍辛巳行還許昌宫司馬懿與亮相持連圍積日亮數挑戰懿堅壘不應㑹亮卒其軍退還冬十月乙丑月犯鎮星及軒轅戊寅月犯太白十一月京都地震從東南來隠隠有聲揺動屋瓦十二月詔有司刪定大辟減死罪三年春正月戊子以大將軍司馬懿為太尉己亥復置朔方郡京都大疫丁巳皇太后崩乙亥隕石于夀光縣三月庚寅𦵏文徳郭后營陵于首陽陵澗西如終制焉是時大治洛陽宫起昭陽太極殿築總章觀百姓失農時直臣楊阜髙堂隆等各數切諫雖不能聴常優容之秋七月洛陽崇華殿災八月庚午立皇子芳為齊王詢為秦王丁巳行還洛陽宫命有司復崇華改名九龍殿冬十月己酉中山王衮薨壬申太白晝見十一月丁酉行幸許昌宫四年春二月太白復晝見月犯太白又犯軒轅一星入太微而出夏四月置崇文觀徴善屬文者以充之五月乙夘司徒董昭薨丁巳肅慎氏獻楛矢六月壬申詔曰朕往者按大辟之條多所蠲除思濟生民之命今郡國蔽獄一嵗之中尚有數百何邪有司其議獄緩死務從寛簡其令廷尉及天下獄官諸有死罪具獄以定非謀反及手殺人亟語其親治有乞恩者使與奏當文書俱上朕將思所以全之其布告天下使明知朕意秋七月髙句驪王宫斬送孫權使胡衛等首詣幽州甲寅太白犯軒轅大星冬十月己夘行還洛陽宫甲申有星孛于大辰乙酉又孛于東方十一月己亥彗星見犯宦者天紀星十二月癸巳司空陳羣薨乙未行幸許昌宫景初元年春正月壬辰山茌縣言黄龍見於是有司奏以為魏得地統宜以建丑之月為正三月定歴改年為孟夏四月服色尚黄犧牲用白戎事乗黒首白馬建太白之旂改大和歴為景初歴其春夏秋冬孟仲季月雖與正嵗不同至於郊祀迎氣礿祠蒸嘗廵狩蒐田分至啓閉班宣時令中氣早晚敬授民事皆以正嵗斗建為歴數之序五月己巳行還洛陽宫己丑大赦六月戊申京師地震己亥以尚書令陳矯為司徒尚書左僕射衛臻為司空丁未分魏興之魏陽錫郡之安富上庸為上庸郡省錫郡以錫縣屬魏興郡有司奏武皇帝撥亂反正為魏太祖樂用武始之舞文皇帝應天受命為魏髙祖樂用咸熙之舞帝制作興治為魏烈祖樂用章武之舞三祖之廟萬世不毁其餘四廟親盡迭毁如周后稷文武廟祧之制秋七月丁夘司徒陳矯薨孫權遣將朱然等二萬人圍江夏郡荆州刺史胡質等撃之然退走初權遣使浮海與髙句驪通欲襲遼東遣幽州刺史毋邱儉率諸軍及鮮卑烏丸屯遼東南界璽書徴公孫淵淵發兵反儉進軍討之會連雨十日遼水大漲昭儉引軍還右北平烏丸單于宼婁敦遼西烏丸都督王護留等居遼東率部衆随儉内附己夘詔遼東將吏士民為淵所脅畧不得降者一切赦之辛夘太白晝見淵自儉還遂自立為燕王置百官稱紹漢元年詔青兖幽冀四州大作海船九月冀兖徐豫四州民遇水遣侍御史循行沒溺死亡及失財産者所在開倉振救之庚辰皇后毛氏崩冬十月丁未月犯熒惑癸丑𦵏悼毛后于愍陵乙夘營洛陽南委粟山為圜丘十二月壬子冬至始祀丁巳分襄陽臨沮宜城旍陽邔四縣置襄陽南部都尉己未有司奏文昭皇后立廟京都分襄陽郡之鄀葉縣屬義陽郡二年春正月詔太尉司馬懿帥衆討遼東二月癸夘以大中大夫韓暨為司徒癸丑月犯心距星又犯心中央大星夏四月庚子司徒韓暨薨壬寅分沛國蕭相竹邑符離蘄銍龍亢山桑洨虹十縣為汝隂郡宋縣陳郡苦縣皆屬譙郡以沛杼秋公邱彭城豐國廣戚并五縣為沛王國庚戌大赦五月乙亥月犯心距星又犯中央大星六月省漁陽郡之狐奴縣復致安樂縣秋八月燒當羌王芒中注詣等叛凉州刺史率諸郡攻討斬注詣首癸丑有彗星見張宿丙寅司馬懿圍公孫淵於襄平大破之𫝊淵首于京都海東諸郡平冬十一月録討淵功太尉懿以下增邑封爵各有差初帝議遣懿討淵發卒四萬人議臣皆以為四萬兵多役費難供帝曰四千里征伐雖云用竒亦當任力不當稍計役費遂以四萬人行及懿至遼東霖雨不得時攻羣臣或以為淵未可卒破宜詔懿還帝曰司馬懿臨危制變禽淵可計日待也卒皆如所䇿壬午以司空衛臻為司徒司𨽻校尉崔林為司空閏月月犯心中央大星十二月乙丑帝不豫辛巳立皇后郭氏賜天下男子爵人二級鰥寡孤獨榖以燕王宇為大將軍甲申免以武衛將軍曹爽代之初青龍三年中夀春農民妻自言為天神所下命為登女當營衛帝室蠲邪納福飲人以水及以洗創或多愈者於是立館後宫下詔稱揚甚見優寵及帝疾飲水無驗於是殺焉三年春正月丁亥太尉懿還至河内帝驛馬召到引入卧内執其手謂曰吾疾甚以後事屬君君其與爽輔少子吾得見君無所恨懿頓首流涕即日帝崩于嘉福殿時年三十六癸丑𦵏髙平陵帝天姿秀出望之儼然立髪垂地口吃少言而沉毅好斷在東宫不交朝臣不問政事惟潜思書籍而己即位之後褒禮大臣料簡功能真偽不得相貿務絶浮華譛毁之端行師動衆决大事謀臣將相咸服帝之大略性特彊識雖左右小臣官簿性行名跡所履及其父兄子弟一經耳目終不遺忘含垢藏疾容受直言吏民上書一月之中至數百封雖文辭陋鄙亦覽省無獻初諸公受遺輔導帝皆以方任處之政自已出而優禮大臣開容善直雖犯顔極諌無所摧戮其君人之量如此然不思建徳垂風不固維城之基至使大權偏據社稷無衛悲夫眀帝太和六年青龍四年景初三年即位十三年齊王諱芳字蘭卿明帝無子養王及秦王詢宫省事祕莫有知其所由来者青龍三年立為齊王景初三年正月丁亥朔帝病甚乃立為皇太子是日即皇帝位大赦尊皇后曰皇太后大將軍曹爽太尉司馬懿輔政詔諸所興作宫室之役皆以遺詔罷之官奴婢六十已上免為良人二月西域重譯獻火浣布詔大將軍太尉臨試以示百寮丁丑詔以太尉司馬懿為太傅持節統兵都督諸軍事如故三月以征東將軍滿寵為太尉夏六月以遼東東㳫縣吏民渡海居齊郡界以故縱城為新㳫縣以居徙民秋七月上始親臨朝聴公卿奏事八月大赦冬十月以鎮南將軍黄權為車騎將軍十二月詔復用夏正其以建寅之月為正始元年正月以建丑月為後十二月正始元年春二月乙丑加侍中中書監劉放侍中中書令孫資為左右光禄大夫丙戌以遼東汶北豐縣民流徙渡海規齊郡之西安臨菑昌國縣界為新汶南豐縣以居流民自去冬十二月至此月不雨丙寅詔令獄官亟平寃枉理出輕微羣公卿士讜言嘉謀各悉乃心夏四月車騎將軍黄權薨秋七月詔曰易稱損上益下節以制度不傷財害民方今百姓不足而御府多作金銀雜物奚以為今出黄金銀物百五十種千八百餘觔銷冶以供軍用八月車駕廵省洛陽界秋稼賜髙年力田各有差二年春二月帝初通論語使太常以太牢祭孔子於辟雍以顔淵配夏五月吳將朱然等圍襄陽之樊城太傅司馬懿率衆拒之六月辛丑退己夘以征東將軍王淩為車騎將軍冬十二月南安郡地震三年春正月東平王徽薨三月太尉滿寵薨秋七月甲申南安郡地震乙酉以領軍將軍蔣濟為太尉冬十二月魏郡地震四年春正月帝加元服賜羣臣各有差夏四月乙夘立皇后甄氏大赦五月朔日有食之既秋七月詔祀故大司馬曹真曹休征南大將軍夏侯尚太常桓階司空陳羣太傅鍾繇車騎將軍張郃左將軍徐晃前將軍張遼右將軍樂進太尉華歆司徒王朗驃騎將軍曹洪征西將軍夏侯淵後將軍朱靈文聘執金吾臧霸破虜將軍李典立義將軍龎悳武猛校尉典韋於太祖廟庭冬十二月倭國女王卑彌呼遣使奉獻五年春二月詔大將軍曹爽率衆征蜀夏四月朔日有蝕之五月癸巳講尚書經通使太常以太牢祠孔子於辟雍以顔淵配賜太傅大將軍及侍講者各有差丙午大將軍曹爽引軍還秋八月秦王詢薨九月鮮卑内附置遼東屬國立昌黎縣以居之冬十一月癸夘詔祀故尚書令荀攸於太祖廟庭己酉復秦國為京兆郡十二月司空崔林薨六年春二月丁夘南安郡地震丙子以驃騎將軍趙儼為司空夏六月儼薨八月丁夘以太常髙柔為司空癸巳以左光禄大夫劉放為驃騎將軍右光禄大夫孫資為衛將軍冬十一月祫祭太祖廟始祀前所論佐命臣二十一人十二月辛亥詔故司徒王朗所作易𫝊令學者得以課試乙亥詔曰眀日大㑹羣臣其令太𫝊乗輿上殿七年春二月幽州刺史毋邱儉討髙句驪夏五月討濊貊皆破之韓那奚等數十國各率種落降秋八月戊申詔曰屬到市觀見所斥賣官奴婢年皆七十或癃疾殘病所謂天民之窮者也且官以力竭而復鬻之進退無謂其悉遣為良民若有不能自存者郡縣振給之己酉詔曰吾乃當以十九日親祠而昨出已見治道得雨當復更治徒棄功夫每念百姓力少役多夙夜存心道路但當期於通利聞乃撾捶老小務崇脩餙疲困流離以至哀歎吾豈安乗此而行致馨徳於宗廟邪自今以後眀申敕之冬十二月講禮記通使太常以太牢祀孔子於辟雍以顔淵配八年春二月朔日有食之夏五月分河東之汾北十縣為平陽郡秋七月尚書何晏奏曰古之為人君者所與㳺必擇正人所觀必察正象放鄭聲而弗聴逺佞人而弗近請自今以後御幸式乾殿及㳺豫後園皆以大臣侍從因從容戲晏兼省文書詢謀政事講論經義為萬世法冬十二月散騎常侍諌議大夫孔晏乂奏乞絶後園習騎乗馬出必御輦乗車是時帝好逸豫及䙝狎羣小故晏乂因闕而進規焉九年春二月衛將軍中書令孫資癸巳驃騎將軍中書監劉放三月甲午司徒衛臻各遜位以侯就第位特進四月以司空髙柔為司徒光禄大夫徐邈為司空固辭不受秋九月以車騎將軍王淩為司空冬十月大風發屋折樹嘉平元年春正月甲午車駕謁髙平陵太傅司馬懿奏免大將軍曹爽爽弟中領軍羲武衛將軍訓散騎常侍彦官以侯就第戊戌有司奏收黄門張當付廷尉考實其辭爽與謀不軌又尚書丁謐鄧颺何晏司𨽻校尉畢軌荆州刺史李勝大司農桓範皆與爽通姦謀夷三族語在爽𫝊丙午大赦丁未以太傅司馬懿為丞相固讓乃止夏四月乙丑改年丙子太尉蔣濟薨冬十二月辛夘以司空王淩為太尉庚子以司𨽻校尉孫禮為司空二年夏五月以征西將軍郭淮為車騎將軍冬十月以特進孫資為驃騎將軍十一月司空孫禮薨十二月甲辰東海王霖薨乙未征南將軍王昶渡江掩攻吳破之三年春正月荆州刺史王基新城太守陳泰攻吳破之降者數千口二月置南郡之夷陵縣以居降附三月以尚書令司馬孚為司空四月甲申以征南將軍王昶為征南大將軍壬辰大赦丙午聞太尉王淩謀廢帝立楚王彪太傅司馬懿東征淩五月甲寅淩自殺六月彪賜死秋七月壬戌皇后甄氏崩辛未以司空司馬孚為太尉戊寅太傅司馬懿薨以衛將軍司馬師為撫軍大將軍録尚書事乙未𦵏懐甄后于太清陵庚子驃騎將軍孫資薨十一月有司奏諸功臣應饗食於大廟者更以官為次太傅司馬懿功髙爵尊最在上十二月以光禄勲鄭冲為司空四年春正月癸夘以撫軍大將軍司馬師為大將軍二月立皇后張氏大赦夏五月魚二見于武庫屋上冬十一月詔征南大將軍王昶征東將軍胡遵鎮南將軍毋邱儉等征吳十二月吳大將軍諸葛恪拒戰大破衆軍於東闗不利而還五年夏四月大赦五月吳太傅諸葛恪圍合肥新城詔太尉司馬孚拒之秋七月恪退還八月詔曰故中郎西平郭修砥節厲行秉心不回乃者蜀將姜維宼鈔脩郡為所執畧往嵗偽大將軍費禕驅率羣衆隂圖闚􅎿道經漢夀請㑹衆賔脩於廣坐之中手刃撃褘勇過聶政功逾介子可謂殺身成仁釋生取義者矣夫追加褒寵所以表揚忠義祚及後允所以奬勸將來其追封脩為長樂鄉侯食邑千户諡曰威侯子襲爵加拜奉車都尉賜銀千鉼絹千匹以光寵存亡永垂來世焉自帝即位至于是嵗郡國縣道多所置省俄或還復不可勝紀六年春二月己丑鎮東將軍毋邱儉上言昔諸葛恪圍合肥新城城中遣士劉整出圍𫝊消息為賊所得考問所傳語整曰諸葛公欲活汝汝可具服整罵曰死狗此何言也我當必死為魏國鬼不茍求活逐汝去也欲殺我者便速殺之終無他辭又遣士鄭像出城𫝊消息或以語恪恪遣馬騎尋圍跡索得像還四五人科頭面縛將繞城表敕語像使大呼言大軍已還洛不如早降像不從其言更大呼城中曰大軍近在圍外壯士努力賊以刀築其口使不得言像遂大呼令城中聞知整像為士能守義執節子弟宜有差異詔追賜整像爵闗中侯各除士名使子襲爵如部曲將死事科庚戌中書令李豐與皇后父光禄大夫張緝等謀廢易大臣以太常夏侯元為大將軍事覺諸所連及者皆伏誅辛亥大赦三月廢皇后張氏夏四月立皇后王氏大赦五月封后父奉車都尉王䕫為廣眀鄉侯光禄大夫位特進妻田氏為宣陽鄉君秋九月大將軍司馬師將謀廢帝以聞皇太后師弟安東將軍昭鎮許昌徴還撃維至京師帝於平樂觀以臨軍過中領軍許允及左右小臣與帝謀因昭辭殺之勒其衆以退師軍已書詔於前昭入帝懼不敢發既而謀泄昭因引兵入城與師謀廢帝九月師召羣臣莫敢違乃奏永寧宫請收帝璽綬歸藩于齊遣太鴻臚郭芝入白皇太后太后方與帝對坐芝謂帝曰大將軍欲廢陛下立彭城王據帝乃起去太后不恱芝曰太后有子不能教今大將軍意已成又勒兵于外以備非常但當順㫖夫復何言太后曰我欲見大將軍口有所說芝曰何可見邪但當速取璽綬太后意乃折乃遣傍侍御取璽綬著坐側芝出報師師甚喜甲戌太后詔曰皇帝芳春秋已長不親萬機耽滛内寵沈漫女徳日延倡優縱其醜謔迎六宫家人留止内房毁人倫之叙亂男女之節㳟孝日虧悖傲滋甚不可以承天緒奉宗廟使司徒臣柔奉䇿以一元大武告于宗廟遣芳歸藩于齊以避皇位師於是遣使者授帝齊王璽綬出就西宫帝與太后垂泣而别遂乗王車從太極殿南出羣臣送者數十人太傅司馬孚悲不自勝餘多流涕帝時年二十三師復遣使者持節送衛營齊王宫於河内重門制度皆如藩國之禮帝之出宫也師使請璽綬於太后太后曰彭城王我之季叔也今來立我當何之且明皇帝當絶嗣乎吾以為髙貴鄉公者文皇帝之長孫眀帝之弟子於禮小宗有後大宗之義其詳議之師乃更召羣臣議乃定迎髙貴鄉公丁丑令曰東海王霖髙祖文皇帝之子霖之諸子與國至親髙貴鄉公髦有大成之量其以為眀皇帝嗣齊王正始九年嘉平六年即位十五年髙貴鄉公諱髦字彦士文帝孫東海定王霖子也正始五年封郯縣髙貴鄉公少好學夙成齊王廢公卿議迎立公十月己丑公至于元武館羣臣奏請舍前殿公以先帝舊處避止西廂羣臣又請以法駕迎公不聴庚寅公入于洛陽羣臣迎拜西掖門南公下輿將答拜擯者曰儀不拜公曰吾人臣也遂答拜至止車門下輿左右曰舊乗輿入公曰吾被皇太后徴未知所為遂歩至太極東堂見于太后初羣臣之奉迎也太常請璽綬以往太后曰我識髙貴鄉公少時欲手授之是日太后親授公璽綬遂即皇帝位於太極前殿百寮陪位者欣欣焉詔大赦改減乗輿服御後宫用度及罷尚方御府百工技巧靡麗無益之物正元元年冬十月壬辰遣侍中持節分適四方觀風俗勞士民察寃枉失職者癸巳假大將軍司馬師黄鉞入朝不趨奏事不名劍履上殿戊戌黄龍見于鄴井中甲辰命有司論廢立定䇿之功封爵增邑進位班賜各有差二年春正月乙丑鎮東將軍毋邱儉揚州刺史文欽反戊戌大將軍司馬師征之癸未車騎將軍郭淮薨閏月己亥破欽於樂嘉欽遁走遂奔吴甲辰安風淮津都尉斬儉𫝊首京都壬子復特赦淮南士民諸為儉欽所詿誤者以鎮南將軍諸葛誕為鎮東大將軍司馬師薨于許昌二月丁巳以衛將軍司馬昭為大將軍録尚書事甲子吳大將孫峻等衆號十萬至夀春諸葛誕拒撃破之斬吴左將軍留賛獻㨗于京都三月立皇后卞氏大赦夏四月甲寅封后父卞隆為列侯甲戌以征南大將軍王昶為驃騎將軍秋七月以征東大將軍胡遵為衛將軍鎮東大將軍諸葛誕為征東大將軍八月辛亥蜀大將軍姜維宼狄道雍州刺史王經與戰洮西經大敗還保狄道城辛未以長水校尉鄧艾行安西將軍與征西將軍陳泰并力拒維戊辰復遣大尉司馬孚為後繼九月庚子講尚書業終賜執經親授者司空鄭冲侍中鄭小同等各有差甲辰姜維退還冬十月詔洮西戰士被虜者令所在郡典農及安西撫夷二䕶軍各部大吏慰䘏其門户無差賦役一年其力戰死事者皆如舊科勿有所漏十一月甲午以隴右四郡及金城連年受敵或亡叛投賊其親戚留在本土者不安皆特赦之癸丑詔曰往者洮西之戰將吏士民或臨陣戰亡或沈溺洮水骸骨不收棄於原野吾常痛之其告征西安西將軍各令部人於戰處及水次鉤求屍䘮收斂藏埋以慰存亡甘露元年春正月辛丑青龍見軹縣井中乙巳沛王林薨夏四月庚戌賜大將軍司馬昭衮冕之服赤舄副焉丙辰帝幸太學與博士淳于俊等論難周易尚書及三皇五帝之事諸儒恱服五月鄴及上谷並言甘露降夏六月丙午改元為甘露乙丑青龍見元城縣界井中秋七月己夘衛將軍胡遵薨癸未安西將軍鄧艾大破蜀大將姜維於上邽詔曰兵未極武醜虜摧破斬首獲生動以萬計自頃戰克無如此者今遣使者犒賜將士大㑹臨饗飲宴終日稱朕意焉八月庚午命大將軍司馬昭加􅃅大都督奏事不名假黄鉞癸酉以大尉司馬孚為太傅九月以司徒髙柔為太尉冬十月以司空鄭冲為司徒尚書左僕射盧毓為司空二年春正月青龍見温縣井中三月司空盧毓薨夏四月癸夘詔曰元菟郡髙顯縣吏民反叛長鄭熙為賊所殺民王簡負擔熙䘮晨夜星行逺致本州忠節可嘉其特拜簡為忠義都尉以旌殊行甲子以征東大將軍諸葛誕為司空五月辛未帝幸辟雍㑹命羣臣賦詩侍中和逌尚書陳騫等作詩稽留有司奏免官詔曰吾以暗昧愛好文雅廣延詩賦以知得失而乃爾紛紜良用反仄其原逌等主者宜敕自今以後羣臣皆當玩習古義脩眀經典稱朕意焉乙亥諸葛誕不就徴發兵反殺揚州刺史樂綝丙子赦淮南將吏士民為誕所詿誤者丁丑詔以諸葛誕稱亂揚州朕宜奉皇太后暫共臨戎以寜東夏己夘詔以平宼將軍臨渭亭侯龎㑹騎督偏將路蕃不從諸葛誕逆亂各將左右斬門突出忠壯勇烈宜有加異其進㑹爵鄉侯蕃封亭侯六月吳使持節都督夏口諸軍事鎮軍將軍沙羡侯孫壹舉衆歸國乙巳詔以壹為侍中車騎將軍假節交州牧吳侯開府辟召儀同三司依古侯伯八命之禮衮冕赤舄事從豐厚甲子詔曰今車駕駐項大將軍㳟行天罰前臨淮浦昔相國大司馬征討皆與尚書俱行今宜如舊乃令散騎常侍裴秀給事黄門侍郎鍾㑹咸與大將軍俱行秋八月詔以諸葛誕主簿宣隆部曲督秦絜皆以諫誕為誕所殺宜録其後以殊忠義其以隆絜子為騎都尉九月大赦冬十二月吳大將全端全懌等率衆降三年春二月大將軍司馬昭䧟夀春城斬諸葛誕三月詔以大將軍所營據之地邱頭改為武邱以旌武功夏五月命大將軍司馬昭為相國封晉公食邑八郡加之九錫昭前後九讓乃止六月丙子詔曰昔南陽郡山賊擾攘欲刼質故太守東里衮功曹應余獨身捍衮遂免於難余顛沛隕斃殺身濟君其下司徒署余孫倫吏使䝉伏節之報辛夘大論淮南之功封爵行賞各有差秋八月甲戌以驃騎將軍王昶為司空丙寅詔以闗内侯王祥為三老關内侯鄭小同為五更朕將親率羣司行禮乞言焉是嵗青龍黄龍仍見頓邱冠軍陽夏縣界井中四年春正月黄龍二見寧陵縣界井中夏六月司空王昶薨秋七月陳留王峻薨冬十月丙寅分新城郡復置上庸郡十一月癸夘車騎將軍孫壹為婢所殺五年春正月朔日有蝕之夏四月詔有司率遵前命復進大將軍司馬昭位為相國封晉公加九錫帝見威權日去不勝其忿五月己丑召侍中王沈尚書王經常侍王業謂曰司馬昭之心路人所知也吾不能坐受廢辱今日當與卿共出討之王經曰昔魯昭公不忍季氏敗走失國為天下笑今權在其門乆矣朝廷四方皆為致死不顧逆順之理非一日也且宿衛宫闕兵甲寡弱陛下何所資用而一旦如此無乃欲除疾而更深之邪禍殆不測宜見重詳帝乃出懐中版詔投地曰行之决矣正使死亦何恨况不必死邪於是入白太后沈業奔走告昭昭為之備帝乃拔劍升輦帥殿中宿衛及蒼頭數百鼓譟出雲龍門昭弟屯騎校尉伷遇帝於東止車門左右呵之伷衆奔走䕶軍賈充自外入逆與帝戰於南闕下帝自用劍衆欲退騎督成倅弟太子舎人濟問充曰事急矣當云何充曰司馬公畜養汝等正為今日今日之事若司馬家事敗汝等豈復有種乎濟顧曰當殺也執也充曰殺之及兵交成濟抽戈前刺帝刃出於背倒車而崩時年二十昭聞之大驚自投於地曰天下其謂我何太傅司馬孚奔往枕帝而哭哀甚曰殺陛下者臣之罪也昭入殿中召羣臣㑹議尚書左僕射陳泰不至昭使其舅尚書荀顗召泰泰曰世之論者以舅方泰今舅不如泰也子弟内外咸共迫之乃入見昭悲慟昭亦對之泣曰元伯卿何以處我泰曰獨有斬賈充少可以謝天下耳昭乆之曰卿可更思其次泰曰泰言唯有此耳不知其次昭乃不更復言昭白太后下令罪狀帝廢為庶人𦵏以民禮收王經及其家屬付廷尉庚寅太傅孚大司馬昭太尉柔司徒冲奏太后請以王禮𦵏帝太后從之使使持節行中䕶軍中壘將軍司馬炎北迎常道鄉公璜嗣眀帝後辛夘羣公奏太后自今下令書宜稱制詔如先代故事癸夘大將軍昭固請讓相國晉公九錫之寵太后詔聴所執以章謙羙戊申大將軍昭上言騎督成倅弟濟横入兵陣迫近輦輿遂致大變按律大逆無道父母妻子同産皆斬臣輙敕侍御史收濟家屬付廷尉結正其罪詔從之六月癸丑詔曰古者人君之為名字難犯而易諱今常道鄉公諱字甚難避其朝臣博議改易列奏髙貴鄉公正元二年甘露五年即位七年陳留王諱奐字景眀武帝孫燕王宇子也甘露三年封安次縣常道鄉公髙貴鄉公卒公卿議迎立公六月甲寅入于洛陽見皇太后是日即皇帝位於太極前殿大赦改元賜民爵及榖帛各有差景元元年夏六月丙辰進大將軍司馬昭位為相國封晉公増封二郡并前滿十加九錫之禮一如前奏諸羣從子弟其未有侯者皆封亭侯賜錢千萬帛萬匹昭固讓乃止己未故漢獻帝夫人節薨帝臨于華林園使使持節追謚夫人為獻穆皇后及𦵏車服制度皆如漢氏故事癸亥以尚書右僕射王觀為司空冬十月觀薨十一月燕王上表賀冬至稱臣詔曰古之王者或有所不稱臣王將宜依此義表不稱臣乎又當為報夫後大宗者降其私親况所繼者重邪若便同之臣妾亦情所未安其皆依禮典處當務盡其宜有司奏以為禮莫崇於尊祖制莫大於正典陛下稽徳期運撫臨萬國紹大宗之重隆三祖之基伏惟燕王體尊戚屬正位藩服躬秉䖍肅率蹈㳟德以先萬國其於正典闡濟大順所不得制聖朝誠宜崇以非常之制奉以不臣之禮臣等平議以為燕王章表可聴如舊式中詔所施或存好問凖之義類則宴覿之禮也可少順聖敬加崇儀稱示不敢斥宜曰皇帝敬問大王侍御至於制書國之正典朝廷所以辨章公制宣昭軌儀於天下者也宜循法故曰制詔燕王凡詔命制書奏事上書諸稱燕王者可皆曰上其非宗廟助祭之事皆不得稱王名奏事上書文書及吏民皆不得觸王諱以彰殊禮加于羣后上遵王典尊祖之制俯順聖敬烝烝之心二者不愆禮實宜之可普告施行十二月甲申黄龍見華隂縣井中甲午以司𨽻校尉王祥為司空二年夏五月朔日有食之秋七月樂浪外夷韓濊貊各率其屬來朝貢八月戊寅趙王幹薨甲寅復命大將軍昭進爵晉公加位相國備禮崇錫一如前詔又固辭乃止三年春二月青龍見於軹縣井中夏四月遼東郡言肅慎國遣使重譯入貢獻其國弓三十張長三尺五寸楛矢長一尺八寸石砮三百枚皮骨鐡雜鎧二十領貂皮四百枚冬十月蜀大將姜維宼洮陽鎮西將軍鄧艾拒之破維於侯和維遁走是嵗詔祀故軍師祭酒郭嘉於太祖廟庭四年春二月復命大將軍昭進位爵賜一如前詔又固辭乃止夏五月詔曰蜀蕞爾小國土狭民寡而姜維虐用其衆曽無廢志往嵗破敗之後猶復耕種㳫中刻剝衆羌勞役無已民不堪命今使征西將軍鄧艾督帥諸軍趣甘松㳫中以羅取維雍州刺史諸葛緒督諸軍趣武都髙樓首尾踧討若禽維便當東西並進埽滅巴蜀也又命鎮西將軍鍾㑹由駱谷伐蜀秋九月太尉髙柔薨冬十月甲寅復命大將軍進位爵賜一如前詔癸夘立皇后卞氏十一月大赦自鄧艾鍾㑹率衆伐蜀所至輒克是月蜀主劉禪詣艾降巴蜀皆平十二月庚戌以司徒鄭冲為太保壬子分益州為梁州癸丑特赦益州士民復除租賦之半乙夘詔褒平蜀功以征西將軍鄧艾為太尉鎮西將軍鍾㑹為司徒是月皇太后郭氏崩咸熙元年春正月壬辰檻車徴艾甲子行幸長安壬申使使者以璧幣祀華山是月鍾㑹反於蜀為衆所討鄧艾亦見殺二月辛夘特赦諸在益土者庚申𦵏眀元郭皇后三月丁丑以司空王祥為太尉征北將軍何曾為司徒尚書左僕射荀顗為司空己夘進晉公昭爵為王封十郡并前二十丁亥封劉禪為安樂公夏五月庚申相國晉王昭奏復五等爵甲戌改元癸未追命舞陽宣文侯懿為晉宣王舞陽忠武侯師為晉景王六月鎮西將軍衛瓘上雍州兵於成都縣獲璧玉印各一文似成信字依周成王歸禾之義宣示百官藏于相國府初自平蜀之後吳宼屯逼永安遣荆豫諸軍犄角赴救七月賊皆遁退八月庚寅命中撫軍司馬炎副貳相國事以同魯公拜後之義癸巳詔逆臣鍾㑹搆造反亂逼脅將士相國左司馬夏侯和騎士曹屬朱撫時使在成都中領軍司馬賈輔郎中羊琇各參㑹軍事和琇撫皆抗節不撓臨危不顧輔語􅄆將王起說會姦逆凶暴欲盡殺將士又云相國已率三十萬衆西行討㑹欲以稱張形勢感激衆心起出以輔言宣語諸軍遂使將士益懐奮勵宜加顯寵以彰忠義其進和輔爵為鄉侯琇撫爵闗内侯起宣傳輔言告令將士所宜賞異其以起為部曲將癸夘以衛將軍司馬望為驃騎將軍九月戊午以中撫軍司馬炎為撫軍大將軍辛未詔以吳將吕興為使持節都督交州諸軍事南中大將軍封安定縣侯初孫休時遣使鄧句敕交趾太守鎖送其民發以為兵興因民心憤怒殺句據郡九真日南皆響應之至是因南中都督䕶軍霍弋上表歸順故有是命䇿命未至興為下人所殺冬十月丁亥詔遣散騎常侍加奉車都尉都亭侯徐紹給事黄門侍郎闗内侯孫彧還南告諭吴人順附紹本吴南陵督彧孫氏支屬並於夀春被獲紹仕中國為相國參軍彧水曹掾特超遷使宣揚國命也丙午命撫軍大將軍新昌鄉侯炎為晉世子是嵗罷屯田官以均政役諸典農皆為太守都尉皆為令長勸募蜀人能内移者給廩二年復除二十嵗安彌福禄縣各言嘉禾生二年春二月甲辰胊䏰縣獲靈龜以獻歸之于相國府庚戌以虎賁張修昔於成都馳馬至諸營言鍾㑹反逆以至没身賜修弟倚爵闗内侯夏四月南深澤縣言甘露降吳遣使紀陟𢎞璆請和五月詔以孫皓諸所獻致其皆還送歸于晉王昭固辭乃止又命晉王昭冕十有二旒建天子旌旗出警入蹕乗金根車六馬備五時副車置旄頭雲䍐樂舞八佾設鐘虡宫縣進王妃為王后世子為太子王子王女王孫爵命之號如舊儀癸未大赦秋八月辛夘相國晉王昭薨壬辰晉太子炎紹封襲位總攝百揆備物典冊一皆如前是月襄武縣言有大人見三丈餘迹長三尺二寸白髪著黄單衣黄巾拄杖呼民王始語云今當太平九月乙未大赦戊午以司徒何曾為晉丞相癸亥以驃騎將軍司馬望為司徒征東大將軍石苞為驃騎將軍征南大將軍陳騫為車騎將軍乙亥𦵏晉王昭閏月庚辰康居大宛獻名馬歸于相國以顯懐萬國致逺人之勲十二月壬戌天禄永終歴數在晉詔羣公卿士具儀設壇于南郊使使者奉皇帝璽綬冊禪位于晉嗣王炎如漢魏故事甲子使使者奉䇿遂改次于金墉城而終館于鄴時年二十晉受命奉帝為陳留王太安元年薨自遜位至薨三十有八年年五十八晉人𦵏之謚曰魏元皇帝陳留王景元四年咸熙二年即位六年右魏自文帝受禪至陳留王禪晉合四十六年通志卷七
