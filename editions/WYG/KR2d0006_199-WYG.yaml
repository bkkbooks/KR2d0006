body:
  text: 通志卷一百七十五宋右廸功郎鄭樵漁仲撰文苑傳第一范史始立文苑傳而南齊梁陳隋皆曰文學今總曰文苑後漢杜篤王隆史岑夏恭子牙傅毅黄香劉毅李尤李勝蘇順曹衆曹朔劉珍葛龔王逸子延夀崔𤦺邊韶張升趙壹劉梁邊讓酈炎侯瑾髙彪張超禰衡魏魏不立此傳今取王粲一人為編仍列徐幹等十三人于其下王粲徐幹路陳琳丁阮瑀丁劉楨荀邯鄲淳璩繁欽粹儀廙緯應桓威吳質晉應貞成公綏左思趙至鄒湛棗據褚陶王沈蔡洪張翰庾闡曹毗李充袁宏伏淊羅含顧愷之郭澄之後漢杜篤字季雅京兆杜陵人也髙祖延年宣帝時為御史大夫篤少博學不修小節不為鄉人所禮居美陽與美陽令遊數從請託不諧頗相恨令怒收篤送亰師㑹大司馬吳漢薨光武詔諸儒誄之篤於獄中為誄辭最髙帝美之賜帛免刑篤以闗中表裏山河先帝舊京不宜改營洛邑乃效司馬相如楊子雲作論都賦一萹上奏之文甚典麗後仕郡文學掾以目疾二十餘年不闚亰師篤之外髙祖破羌將軍辛武賢以武略稱篤常歎曰杜氏文眀善政而篤不任為吏辛氏秉義經武而篤怯於事外内五世至篤衰矣女弟適扶風馬氏建初三年車騎將軍馬防擊西羌請篤為從事中郎戰没於射姑山所著賦誄弔書讚七言女誡及雜文凡十八萹又著眀世論十五萹子碩豪侠以貨殖聞王隆字文山馮翊雲陽人也王莽時以父任為郎後避難河西為竇融左䕶軍建武中為新汲令能文章所著詩賦銘詩凡二十六萹初王莽末沛國史岑子孝亦以文章顯莽以為謁者著頌誄復神説疾凡四萹夏恭字敬公梁國䝉人也習韓詩孟氏易講授門徒常千餘人王莽末盜賊縱横攻没郡縣恭以恩信為衆所附擁兵固守獨得安全光武即位嘉其忠果召拜郎中再遷太山都尉和集百姓甚得其歡心恭善為文著賦頌詩勵學凡二十萹年四十九卒官諸儒共諡曰宣眀君子牙少習家業著賦頌讃誄凡四十萹舉孝㢘早卒鄉人號曰文徳先生傅毅字武仲扶風茂陵人也少博學永平中於平陵習章句因作廸志詩一首以自朂毅又以顯宗求賢不篤士多隠處故作七激以為諷建初中肅宗召文學之士以毅為蘭臺令史拜郎中與班固賈逵共典校書毅追美孝眀皇帝功徳最盛而廟頌未立乃依清廟作顯宗頌十萹奏之由是文雅顯於朝廷車騎將軍馬防外戚尊重請毅為軍司馬待以師友之禮及馬氏敗免官歸永元元年車騎將軍竇憲復請毅為主記室崔駰為主簿及憲遷大將軍復以毅為司馬班固為中䕶軍憲府文章之盛冠於當世毅早卒著詩賦誄頌祝文七激連珠凡二十八萹黄香字文彊江夏安陸人也年九嵗失母思慕憔悴殆不免喪鄉人稱其至孝年十二太守劉䕶聞而召之署門下孝子甚見愛敬香家貧内無僕妾躬執苦勤盡心奉養遂博學經典究精道術能文章亰師號曰天下無雙江夏黄童初除郎中元和元年肅宗詔香詣東觀讀所未嘗見書後香告休及歸京師時千乗王冠帝㑹中山邸乃詔香殿下顧謂諸王曰此天下無雙江夏黄童者也左右莫不改觀後召詣安福殿言政事拜尚書郎數陳得失賞賚増加嘗獨止宿臺上晝夜不離省闥帝聞善之永元四年拜左丞秩滿當遷和帝留増秩六年累遷尚書令後以為東郡太守香上疏辭郡乞留備冗官賜以督責小職任之官臺煩事以畢志願帝亦惜香幹用久習舊事復留為尚書令増秩二千石賜錢三十萬是後遂管樞機甚見親重而香亦祇勤物務憂公如家十二年東平清河奏訞言卿仲遼等所連及且千人香科别據奏全活甚衆每郡國疑罪輙務求輕科愛惜人命每存憂濟又曉習邊事均量軍政皆得事宜帝知其精勤數加恩賞疾病存問賜醫藥在位多所薦達寵遇甚盛議者譏其過倖延光元年遷魏郡太守郡舊有内外園田常與人分種嵗收數千斛香曰田令商者不農王制仕者不耕伐冰食禄之人不與百姓爭利乃悉以賦民課令耕種時被水年饑乃分俸禄及所得賞賜班贍貧者於是豐富之家各出義穀助官禀貸荒民獲全後坐水潦事免數月卒於家所著賦牋奏書令凡五萹子瓊自有傳劉毅北海敬王子也初封平望侯永元中坐事奪爵毅少有文辯稱元初元年上漢徳論并憲論十二萹時劉珍鄧耽尹兌馬融共上書稱其美安帝嘉之賜錢三萬拜議郎李尤字伯仁廣漢雒人也少以文章顯和帝時侍中賈逵薦尤有相如楊䧺之風召詣東觀拜蘭臺令史稍遷安帝時為諫議大夫受詔與謁者僕射劉珍等俱撰漢記後帝廢太子為濟隂王尤上書諫諍順帝立遷樂安相年八十三卒所著詩賦銘誄頌七歎哀典凡二十八萹尤同郡李勝亦有文才為東觀郎著賦誄頌論數十萹蘇順字孝山京兆霸陵人也和安間以才學見稱好養生術隠處求道晚乃仕拜郎中卒於官所著賦論誄哀辭雜文凡十六萹時三輔多士扶風曹衆伯師亦有才學著誄書論四萹又有曹朔不知何許人作漢頌四萹劉珍字秋孫一名寳南陽蔡陽人也少好學永初中為謁者僕射鄧太后詔使與校書劉騊駼馬融及五經博士校定東觀五經諸子傳記百家藝術整齊脱誤是正文字永寧元年太后又詔珍與騊駼作建武以来名臣傳遷侍中越騎校尉延光四年拜宗正眀年轉衛尉卒官著誄頌連珠凡七萹又撰釋名三十萹以辯萬物之稱號云葛龔字元甫梁國寧陵人也和帝時以善文記知名性慷慨壯烈勇力過人安帝永初中舉孝㢘為太官丞上便宜四事拜蕩隂令辟太尉府病不就州舉茂材為臨汾令居二縣皆有稱績著文賦碑誄書記凡二十萹王逸字叔師南郡宜城人也元初中舉上計吏為校書郎順帝時為侍中著楚辭章句行於世其賦誄書論及雜文凡二十一萹又作漢詩百二十三萹子延夀字文考有雋才少遊魯國作靈光殿賦後蔡邕亦造此賦未成及見延夀所為甚竒之遂輟翰而已曽有異夢意惡之乃作夢賦以自厲後溺水死時年二十餘崔𤦺字子瑋涿郡安平人濟北相瑗之宗也少游學亰師以文章博通稱初舉孝㢘為郎河南尹梁冀聞其才請與交冀行多不軌𤦺數引古今成敗以戒之冀不能受乃作外戚箴一首語尤切直琦以言不從失意復作白鵠賦以為諷梁冀見之呼𤦺問曰百官内外各有司存天下云云豈獨吾人之尤君何激刺之過乎琦對曰昔管仲相齊樂聞譏諫之言蕭何佐漢乃設書過之吏今將軍累世台輔任齊伊公而徳政未聞黎元塗炭不能結納貞良以救禍敗反復欲鉗塞士口杜蔽主聴將使元黄改色馬鹿異形乎冀無以對因遣琦歸後除為臨濟長不敢之職解印綬去冀遂令刺客隂求殺之客見琦耕於陌上懐書一卷息輙偃而詠之客哀其志以實告𤦺曰將軍令吾要子今見君賢者情懐忍忍可亟自逃吾亦於此亡矣琦得脱走冀後竟捕殺之所著賦頌銘誄箴弔論九咨七言凡十五萹邊韶字孝先陳留浚儀人也以文學知名教授數百人韶口辯曽晝日假卧弟子私嘲之曰邊孝先腹便便懶讀書但欲眠韶潜聞之應時對曰邊為姓孝為字腹便便五經笥但欲眠思經事寐與周公通夢靜與孔子同意師而可嘲出何典記嘲者大慙韶之才㨗皆此類也桓帝時為臨潁侯相徴拜太中大夫著作東觀再遷北地太守入拜尚書令後為陳相卒官著詩頌碑銘書䇿凡十五萹張升字彦真陳留尉氏人富平侯放之孫也升少好學多闗覽而任情不覊其意相合者則傾身交結不問窮賤如乖其志好者雖王公大人終不屈從常歎曰死生有命富貴在天其有知我雖胡越可親茍不相識從物何益仕郡為綱紀以能出守外黄令吏有受賕者即論殺之或譏升守領一時何足趨音促眀威戮乎升對曰昔仲尼暫相誅齊之侏儒手足異門而出故能威震彊國反其侵地君子仕不為已職思其憂豈以久近而異其度哉遇黨錮去官後竟見誅年四十九著賦誄頌碑書凡六十萹趙壹字元叔漢陽西縣人也體貎魁梧身長九尺美鬚豪眉望之甚偉而恃才倨傲為鄉黨所擯乃作解擯後屢抵罪㡬至死友人救得免壹乃貽書謝恩為窮鳥賦一萹言情又作刺世疾邪賦以舒其怨憤光和元年舉郡上計到亰師是時司徒袁逢受計計吏數百人皆拜伏庭中莫敢仰視壹獨長揖而已逢望而異之令左右往讓之曰下郡計吏而揖三公何也對曰昔酈食其長揖漢王今揖三公何遽怪哉逢即斂衽下堂執其手延置上坐因問西方事大悦顧謂坐中曰此人漢陽趙元叔也朝臣莫有過之者吾請為諸君分坐别坐也坐者皆屬觀既出往造河南尹羊陟不得見壹以公卿中非陟無足以託名者乃日往到門陟自彊許通尚卧未起壹逕入上堂遂前臨之曰竊伏西州承髙風舊矣乃今方遇而忽然謂死也奈何命也因舉聲哭門下驚皆奔入滿側陟知其非常人乃起延與語大竒之謂曰子出矣陟眀旦大從車騎奉謁造壹時諸計吏多盛飾車馬帷幕而壹獨柴車草屏露宿其傍延陟前坐於車下左右莫不歎愕陟遂與言談至熏夕極歡而去執其手曰良璞不剖必有泣血以相眀者矣陟乃與袁逢共薦之名動亰師士大夫想望其風采及西還道經𢎞農候太守皇甫規門者不即通壹遂遁去門吏懼以白之規聞壹名大驚乃追書謝過遣主簿迎還壹報書略曰昔人或歴説而不遇或思士而無從皆歸之於天不尤於物今壹自譴而已豈敢有猜仁君忽一匹夫於徳何損而逺辱手筆追路相尋誠足媿也其嗟可去謝也可食但以闗節疢動膝灸壊潰請俟他日乃奉其情輙誦来貺永以自慰遂去不顧州郡爭致禮命十辟公府並不就終於家初袁逢使善相者相壹云仕不過郡吏竟如其言著賦頌箴誄書論及雜文十六萹劉梁字曼山一名岑東平寧陽人也梁宗室子孫而少孤貧賣書於市以自資常疾世多利交以邪曲相黨乃著破羣論時之覽者以為仲尼作春秋亂臣知懼今此論之作俗士豈不愧心乎梁又著辨和同之論亦為世所稱桓帝時舉孝㢘除北新城長告縣人曰昔文翁在蜀道著巴漢庚桑瑣隸風移碨磥碨音猥磥音盧罪反吾雖小宰猶有社稷茍赴期㑹理文墨豈本志乎乃更大作講舍延聚生徒數百人朝夕自往勸誡身執經卷試䇿殿最儒化大行此邑至後猶稱其教焉特召入拜尚書郎累遷後為野王令未行光和中病卒孫楨字公幹亦以文才知名附載魏王粲傳邊讓字文禮陳留浚儀人也少辯博能屬文作章華賦雖多淫麗之辭而終之以正亦司馬相如之諷也其辭甚麗大將軍何進聞其才名欲辟命之恐不至詭以軍事徴之既到署令史進以禮見之讓善占射能辭對時賓客滿堂莫不羨其風府掾孔融王朗並脩刺候焉議郎蔡邕深敬之以讓宜處髙任乃薦於何進曰竊見令史邊讓天授逸才聰眀賢智初渉諸經見本知義授者不能對其問章句不能逮其意心通性達口辯辭長若處狐疑之論定嫌審之分經典交至檢括參合衆夫寂焉莫之能奪也使讓生在唐虞則元凱之次運值仲尼則顔冉之亞豈徒俗之凡偶近器而已者哉階級名位亦宜超然若復隨輩而進非所以章瓌瑋之髙價昭知人之絶眀也傳曰函牛之鼎不可以烹雞多汁則淡而不可食少汁則熬而不可熟此言大器之於小用故有所不宜也邕竊悁邑怪此寳鼎未受犧牛大羮之和久在煎熬臠割之間願眀將軍囘謀垂慮裁加少納貢之機宻展之力用若以年齒為嫌則顔囘不得貫徳行之首子竒終無理阿之功茍堪其事古今一也讓後以髙才擢進屢遷出為九江太守不以為能也初平中王室大亂讓去官還家恃才氣不屈曹操多輕侮之言建安中其鄉人有搆讓於操操告郡就殺之文多遺失酈炎字文勝范陽人酈食其之後也炎有文才解音律言論給㨗多服其能理靈帝時州郡辟命皆不就作詩二萹以自見其卒曰抱玉乗龍驥不逢樂與和安得孔仲尼為世陳四科其意氣如此炎後患風病慌忽性至孝遭母憂病甚發動妻始産而驚死妻家訟之收繫獄炎病不能理對熹平六年遂死獄中時年二十八尚書盧植為之誄讚以昭其懿徳侯瑾字子瑜敦煌人也少孤貧依宗人居性篤學恒傭作為資暮還輙㸐古然字柴以讀書恒以禮自牧獨處一房如對嚴賓焉州郡累召公車有道徴並稱疾不到作矯世論以譏刺當時而徙入山中覃思著述以莫知於世作應賓難以自寄又案漢記撰中興以後行事為皇徳傳三十萹行於世餘所作雜文數十萹多亡失西河人重其才皆不敢名之稱為侯君云髙彪字義方吳郡無錫人也家本單寒至彪為諸生遊太學有雅才而訥於言常從馬融欲訪大義融疾不獲見乃覆刺遺融書曰承服風問從来有年故不待介者而謁大君子之門冀一見龍光以叙腹心之願不圖遭疾幽閉莫啟昔周公旦父文兄武九命作伯以尹華夏猶揮沐吐餐垂接白屋故周道以隆天下歸徳公今養痾傲士故其宜也融省書慙追還之彪逝而不顧後郡舉孝㢘試經第一除郎中校書東觀數奏賦頌竒文因事諷諫靈帝異之時京兆第五永為督軍御史使督幽州百官大㑹祖餞於長樂觀議郎蔡邕等皆賦詩彪乃獨作箴以誡厲永邕等甚美其文以為莫尚也後遷内黄令帝敕同僚臨送祖於上東門詔東觀畫彪像以勸學者彪到官有徳政上書薦縣人申屠蟠等病卒於官文章多亡子岱亦知名張超字子並河間鄚人留侯良之後也有文才靈帝時從車騎將軍朱雋征黄巾為别部司馬著賦頌碑文薦檄牋書謁文嘲凡十九萹超又善於草書妙絶時人世共傳之禰衡字正平平原般人也般卜滿反少有才辯而尚氣剛傲好矯時慢物興平中避難荆州建安初来遊許下始達潁川乃隂懐一刺既而無所之適至於刺字漫滅是時許都新建賢士大夫四方来集或問衡曰盍從陳長文司馬伯達乎對曰吾焉能從屠沽児邪又問荀文若趙稚長云何衡曰文若可借面弔喪稚長可使監厨請客惟善魯國孔融及𢎞農楊脩常稱曰大児孔文舉小児楊徳祖餘子碌碌莫足數也融亦深愛其才衡始弱冠而融年四十遂與為交友上疏薦之於朝復數稱其才於曹操操欲見之而衡素相輕疾自稱狂病不肯往而數有恣言操頗懐忿而以其才名不欲殺之聞衡善擊鼓乃召為鼓吏因大㑹賓客閲試音節諸吏過者皆令脱其故衣更著岑牟單絞之服岑牟鼓角士胄也絞蒼黄之色次至衡衡方為漁陽參撾蹀􅗿而前容態有異聲節悲壯聽者莫不慷慨衡進至操前而止吏訶之曰鼓吏何不改裝而敢輕進乎衡曰諾於是先解衵衣次釋餘服裸身而立徐取岑牟單絞而著之畢復參撾而去顔色不怍操笑曰本欲辱衡衡反辱孤孔融退而數之曰正平大雅固當爾邪因宣操區區之意衡許往融復見操説衡狂疾今求得自謝操喜敕門者有客便通待之極晏衡乃著布單衣疎巾手持三尺棁杖棁大杖也他活反坐大營門以杖箠地大罵吏白外有狂生坐於營門言語悖逆請收案罪操怒謂融曰禰衡豎子乃敢爾孤殺之猶雀䑕耳顧此人素有虚名逺近將謂孤不能容之今送與劉表視當何如於是遣人騎送之臨發衆人為之祖道先供設於城南乃更相戒曰禰衡勃虐無禮今因其後到咸當以不起折之也及衡至衆人莫肯興衡坐而大號衆問其故衡曰坐者為冢卧者為屍屍冢之間能不悲乎及到荆州士大夫先服其才名甚賓禮之文章言議非衡不定表嘗與諸文人共草章奏並極其才思時衡出還見之開省未周因毁以抵地表憮然為駭衡乃從求筆札湏臾立成辭義可觀表大悦益重之後復侮慢於表表耻不能容以江夏太守黄祖性急故送衡與之祖亦善待焉衡為作書記輕重踈宻各得體宜祖持其手曰處士正得祖意如祖腹中之所欲言也祖長子射音亦為章陵太守尤善於衡嘗與衡俱遊共讀蔡邕所作碑文射愛其辭還恨不繕寫衡曰吾雖一覽猶能識之唯其中石缺二字為不眀耳因書出之射馳使寫碑還校如衡所書莫不歎伏射時大㑹賓客人有獻鸚鵡者射舉巵於衡曰願先生賦之以娛嘉賓衡攬筆而作文無加㸃辭采甚麗後黄祖在䝉衝船上大㑹賓客而衡言不遜順祖慙乃訶之衡更熟視曰死公云等道云等道猶今言何勿語也祖大怒令五百將出欲加箠衡方大罵祖恚遂令殺之祖主簿素疾衡即時殺焉射徒跣来救不及祖亦悔之乃厚加棺殮衡時年二十六其文章多亡云魏魏不立此傳今取王粲一人以為編而附載徐幹陳琳等數人于後王粲字仲宣山陽髙平人也曽祖父龔祖父暢皆為漢三公父謙為大將軍何進長史進以謙名公之胄欲與為婚見其二子使擇焉謙弗許以疾免於家獻帝西遷粲徙長安左中郎將蔡邕見而竒之時邕才學顯著貴重朝廷常車騎填巷賓客盈坐聞粲在門倒屣迎之粲至年既㓜弱容狀短小一坐盡驚邕曰此王公孫也有異才吾不如也吾家書籍文章盡當與之年十七司徒辟詔除黄門侍郎以西亰擾亂皆不就乃之荆州依劉表表以粲貎寢而體弱通侻不甚重也表卒粲勸表子琮令降太祖太祖辟為丞相掾賜爵闗内侯太祖置酒漢濱粲奉觴賀曰方今袁紹起河北仗大衆志兼天下然好賢而不能用故竒士去之劉表雍容荆楚坐觀時變自以為西伯可規士之避亂荆州者皆海内之儁傑也表不知所任故國危而無輔眀公定冀州之日下車即繕其甲卒收其豪傑而用之以横行於天下及平江漢引其賢俊而置之列位使海内廻心望風而願治文武並用英䧺畢力此三王之舉也後遷軍謀祭酒魏國既建拜侍中粲博物多識問無不對漢末喪亂舊儀廢弛興造制度粲恒典之時絶無玉佩粲識舊佩始復作之今之玉佩受法於粲也初粲與人共行讀道邉碑人問曰卿能闇誦乎曰能因使背而誦之不失一字觀人圍碁局壊粲為覆之碁者不信以帊盖局使更以他局為之用相比較不誤一道其彊記黙識如此性善算作算術略盡其理善屬文舉筆便成無所改定時人常以為宿搆然正復精意覃思亦不能加也粲才既髙辯論應機鍾繇王朗等雖各為魏卿相至於朝廷奏議皆閣筆不敢措手必咨於粲粲所著詩賦論議垂六十萹建安二十一年從征吳二十二年春道病卒年四十一粲二子為魏諷所引誅後絶太祖時征漢中聞粲子死歎曰孤若在不使仲宣無後始文帝為五官將及平原侯植皆好文學粲與北海徐幹偉長廣陵陳琳孔璋陳留阮瑀元瑜汝南應瑒徳璉東平劉楨公幹並見友善幹聰識洽聞操翰成章為司空軍謀祭酒掾屬五官將文學琳前為何進主簿初進欲誅諸宦官太后不聽進乃召四方猛將並使引兵向京城欲以刧恐太后琳入諫進以為委兵授人必無成功祇為亂階而已進不納其言竟以禍敗語在何進傳中琳後避難冀州袁紹使典文章袁氏敗琳歸太祖太祖謂曰卿昔為本初移書但可罪狀孤而已惡惡止其身何乃上及父祖邪琳謝罪太祖愛其才而不咎也瑀少受學於蔡邕建安中都䕶曹洪欲使掌書記瑀終不為屈太祖並以琳瑀為司空軍謀祭酒管記室軍國書檄多琳瑀所作也琳嘗作檄草成呈太祖太祖先苦頭風是時疾發卧讀琳所作翕然而起曰此可愈我病數加厚賜太祖又使瑀作書與韓遂時太祖適近出瑀隨從因於馬上具草書成呈之太祖攬筆欲有所定而竟不能増損琳徙門下督瑀為倉曹掾屬瑒楨各被太祖辟為丞相掾屬瑒祖奉伯父邵皆博學有著述漢史有傳瑒轉為平原侯庶子後為五官將文學楨文辭巧妙文帝嘗賜楨廓落帶其後工死欲借取以為像因書嘲楨云夫物因人為貴故在賤者之手不御至尊之側今雖取之勿嫌其不反也楨答曰楨聞荆山之璞曜元后之寳隋侯之珠燭衆士之好南垠之金登窈窕之首鼲貂之尾綴侍臣之幘此四寳者伏朽石之下潛汚泥之中而揚光千載之上發彩疇昔之外亦皆未能初自接於至尊夫尊者所服卑者所脩也貴者所御賤者所先也故夏屋初成而大匠先立其下嘉禾始熟而農夫先嘗其粒恨楨所帶無他妙飾若實殊異尚可納也楨所作類如是故特為諸公子所親愛其後太子嘗請諸文學酒酣坐歡命夫人甄氏出拜坐中衆人咸伏而楨獨平視太祖聞之乃收楨減死輸作刑竟暑吏是時琳等咸著文賦數十萹瑀以十七年卒幹琳瑒楨二十二年卒文帝與元城令吳質書曰昔年疾疫親故多離其災徐陳應劉一時俱逝觀古今文人類不䕶細行鮮能以名節自立而偉長獨懐文抱質恬淡寡欲有箕山之志可謂彬彬君子矣著中論二十餘萹辭義典雅足傳於後徳璉常斐然有述作意其才學足以著書美志不遂良可痛惜孔璋章表殊徤微為繁富公幹有逸氣但未遒耳元瑜書記翩翩致足樂也仲宣獨自善於辭賦惜其體弱不起其文至於所善古人無以逺過也昔伯牙絶絃於鍾期仲尼覆醢於子路痛知音之難遇傷門人之莫逮也諸子但為未及古人自亦一時之儁也自潁川邯鄲淳繁欽陳留路粹沛國丁儀丁廙𢎞農楊修河内荀緯等亦有文采而不在此七人之例其後瑒弟璩璩子貞瑀子籍又譙郡嵇康下邳桓威咸以文章顯名淳一名竺字子叔博學有文章善蒼雅蟲篆許氏字指初平中從三輔客荆州荆州内附太祖素聞其名召與相見甚敬異之時五官將博延英儒亦宿聞淳名因啓淳欲使在文學官屬中㑹臨菑侯植亦求淳太祖遣淳詣植植初得淳甚喜延入坐不先與談時天暑熱植因呼常從取水自澡訖傅粉遂科頭拍袒胡舞五椎鍜跳丸擊劍誦俳優小説數千言訖謂淳曰邯鄲生何如邪於是乃更著衣幘整儀容與淳評説混元造化之端品物區别之意然後論皇羲以来賢聖名臣烈士優劣之差次頌古今文章賦誄及當官政事宜所先後又論用武行兵倚伏之勢乃命厨宰酒炙交至坐席黙然無與伉者及暮淳歸對其所知歎植之材謂之天人于時世子未立太祖俄有意於植而淳屢稱植材由是五官將頗不悦及黄初初以淳為博士給事中淳作投壺賦千餘言奏之文帝以為工賜帛千疋欽字休伯以文章機辯少得名於汝潁欽既長於書記又善為詩賦其所與太子書記喉轉意率皆巧麗為丞相主簿建安二十三年卒粹字文蔚少學於蔡邕初平中隨車駕至三輔建安初以髙才與京兆嚴像擢拜尚書郎像以才兼文武出為揚州刺史粹後為軍謀祭酒與陳琳阮瑀等典記室及孔融有過太祖使粹為奏承指致融罪語在融傳中後人覩粹所作無不嘉其材而畏其筆也後為祕書令坐法伏誅太子素與粹善聞其死為之歎惜及即帝位特用其子為長史儀字正禮父沖宿與太祖親善時隨乗輿見國家未定乃與太祖書曰足下平生常喟然有匡佐之志今其時矣是時張楊適還河内太祖得其書乃引軍迎天子東詣許以沖為司隸校尉後數来過諸將飲酒美不能止醉爛腸死太祖以沖前見開導常徳之聞儀為令士雖未見欲以愛女妻之以問五官將五官將曰女人觀貎而正禮目不便誠恐愛女未必悦也不如與伏波子楙太祖從之尋辟儀為掾到與論議嘉其才朗曰丁掾好士也即使其兩目盲尚當與女何况但眇視吾兒誤我時儀亦恨不得尚公主而與臨菑侯親善數稱其才太祖有意欲立植而儀又共贊之及太子立欲理儀罪轉儀為右刺姦掾欲令自裁而儀不能乃對中領軍夏侯尚叩頭求哀尚為泣涕而不能救後遂因職事收付獄殺之廙字敬禮儀之弟也少有才姿博學洽聞初辟公府建安中為黄門侍郎廙嘗從容謂太祖曰臨菑侯天性仁孝發於自然而聰眀智達其殆庶㡬至於博學淵識文章絶倫當今天下之賢才君子不問少長皆願從其游而為之死實天所以鍾福於大魏而永授無窮之祚也欲以勸動太祖太祖答曰植吾愛之安能若卿言吾欲立之為嗣何如廙曰此國家之所以興衰天下之所以存亡非愚劣瑣賤者所敢與及廙聞知臣莫若君知子莫若父至於君不論眀闇父不問賢愚而能常知其臣子者何盖猶相知非一事一物相處非一旦一夕况眀公加之以聖哲習之以人子今發眀達之命吐永安之言可謂上應天命下合人心得之於湏臾垂之於萬世者也廙不避斧鉞之誅敢不盡言太祖深納之文帝即王位遂與兄儀並誅修字徳祖太尉彪之子也脩事附載其髙祖太尉震傳中脩頗為太祖所器自太子以下並争與交好而臨菑侯植尤降意投脩脩亦傾心於植每當就植慮事有闕忖度太祖意豫作答教十餘條勅門下教出以次答教裁出答已入太祖怪其速推問始泄太祖遣太子及植各出鄴城一門宻勅門不得出以觀其所為太子至門不得出而還脩先戒植若門不出侯侯受王命可斬守者植從之太祖後知其交構又深慮始終之變遂因事誅脩脩所著賦頌碑讃詩哀辭表記書凡十五萹傳於世緯字公髙少喜文學建安中召署軍謀掾魏太子庶子稍遷至散騎常侍越騎校尉年四十二黄初四年卒璩字休璉博學好屬文善為書記文眀帝世歴官散騎常侍齊王即位稍遷侍中大將軍長史曹爽秉政多違法度璩為詩以諷焉其言雖頗諧合然多切時要世共傳之復為侍中典著作嘉平四年卒貞籍及康晉史各有傳威景初中出自孤微年十八著渾輿經依道以見意從齊國門下書佐司徒署吏為安成令先是文帝所與善者吳質濟隂人字季重才學通博帝為世子時甚禮愛之出為朝歌長遷元城令臨菑侯屢有奪嫡意而楊脩與丁儀兄弟為之地世子患之以車載廢簏内質與謀脩以白太祖未及推驗太子懼告質質曰何患眀日復以簏受絹車内以惑之脩必復重白重白必推推而無驗則罪在彼矣世子從之脩果復白而推驗無人太祖由是疑焉其後太祖嘗出征世子及臨菑侯並送路側禃稱述功徳發言有章左右屬目太祖亦悦焉世子悵然自失質耳語世子曰王當行流涕可也及辭世子泣而拜太祖及左右咸歔欷於是皆以植辭多華而誠心不及也質之權數多此類始質為單家少遊遨貴戚間盖不與鄉里相浮沉故雖已出官本國猶不與之士名及文帝踐阼深惟舊事徴質與車駕㑹洛陽到拜北中郎將封列侯使持節都督幽并諸軍事治信都太和四年入為侍中質自以不為本郡所饒謂司徒董昭曰我欲溺鄉里耳昭曰君且止我行年八十不能老為君溺欑也其年夏卒質先以怙威肆行諡曰醜侯質子應上書論枉至正元中改諡威侯應晉尚書應子康亦至大位晉應貞字吉甫汝南南頓人魏侍中璩之子也自漢至魏世以文章顯軒冕相襲為郡盛族貞善談論以才學稱夏侯元有盛名貞詣元元甚重之舉髙第頻歴顯位武帝為撫軍大將軍以為參軍及踐阼遷給事中帝於華林園宴射貞賦詩最美帝稱賞之時初置太子中庶子官貞與䕶軍長史孔恂俱為之後遷散騎常侍以儒學與太尉荀顗撰定新禮未施行泰始五年卒文集行於世弟純純子紹永嘉中至黄門郎為東海王越所害純弟秀秀子詹自有傳成公綏字子安東郡白馬人也㓜而聰敏博渉經傳性寡欲不營資産家貧嵗饑常晏如也少有俊才詞賦甚麗閑黙自安不求聞達時有孝烏每集其廬舍綏謂有反哺之徳以為祥禽作賦美之又以賦者貴能分賦物理敷演無方天地之盛可以致思矣歴觀古人未之有賦豈獨以至麗無文難以辭贊不然何其闕哉遂為天地賦綏又雅好音律嘗當暑承風而嘯冷然成曲因為嘯賦二賦世皆稱之張華雅重綏每見其文歎伏以為絶倫薦之太常徴為博士歴祕書郎轉丞遷中書郎每與華受詔並為詩賦又與賈充等參定法律泰始九年卒年四十三所著詩賦雜筆十餘卷行於世左思字太沖齊國臨淄人也其先齊之公族有左右公子因為氏焉家世儒學父雍起小吏以才能擢授殿中侍御史思少學鍾胡書及鼓琴並不成雍謂友人曰思所曉解不及我少時思遂感激勤學兼善隂陽之術貎寢口訥而辭藻壯麗不好交遊惟以閑居為事造齊都賦一年乃成復欲賦三都㑹妹芬入宫移家京師乃詣著作郎安平張載訪岷卭之事遂構思十年門庭藩溷皆著紙筆遇得一句即便疏之自以所見不博求為祕書郎及賦成時人未之重思自以其作不謝班張恐以人廢言安定皇甫謐有髙譽思造而示之謐稱善為其賦序張載為注魏都濟南劉逵注吳蜀而序之陳留衛瓘又為思賦作略解自是之後盛重於時司空張華見而歎曰班張之流也使讀之者盡而有餘久而更新於是豪富之家競相傳寫洛陽為之紙貴初陸機入洛欲為此賦聞思作之撫掌而笑與弟雲書曰此間有傖父欲作三都賦湏其成當以覆酒甕耳及思賦出機絶歎服以為不能加也遂輟筆焉祕書監賈謐請講漢書謐誅退居宜春里専意典籍齊王冏命為記室辭疾不就及張方縦暴都邑舉家適冀州數嵗以疾終趙至字景真代郡人也寓居洛陽緱氏令初到官至年十三與母觀母曰汝先世本非㣲賤世亂流離遂為士伍耳爾後能如此不至感母言詣師受業聞父耕叱牛聲投書而泣師怪問之至曰我小未能榮養使老父不免勤苦師甚異之年十四詣洛陽游太學遇嵇康於學寫石經徘徊視之不能去而請問姓名康曰年少何以問邪曰觀君風器非常所以問耳康異而告之後乃亡到山陽求康不得而還又將逺學母禁之至遂陽狂走三五里輙追得之年十六游鄴復與康相遇隨康還山陽改名浚字允元康每曰卿頭小而鋭瞳子白黒分眀有白起之風矣及康卒至詣魏興見太守張嗣宗甚被優遇嗣宗遷江夏相隨到溳川欲因入吳而嗣宗卒乃向遼西而占户焉初至與康兄子蕃友善及將逺適乃與蕃書叙離并陳其志辭義慷慨為世所傳至身長七尺四寸議論精辯有從横才氣遼西舉郡計吏到洛與父相遇時母已亡父欲令其宦立弗之告仍戒以不歸至乃還遼西幽州三辟部從事斷九獄見稱精審太康中以良吏赴洛方知母亡初至自耻士伍欲以宦學立名期於榮養既而其志不就號憤慟哭嘔血而卒時年三十七鄒湛字潤甫南陽新野人也父軌魏左將軍湛少以才學知名仕魏歴通事郎太學博士泰始初轉尚書郎廷尉平征南從事中郎深為羊祜所器重入為太子中庶子太康中拜散騎常侍出補勃海太守轉太傅楊駿長史遷侍中駿誅以僚佐免官尋起為散騎常侍國子祭酒轉少府元康末卒所著詩及論事議二十五首為時所重初湛嘗夢見一人自稱甄舒仲餘無所言如此非一久之乃悟曰吾宅西有積土敗瓦其中必有死人甄舒仲者予舍西土瓦中人也檢之果然遂厚加斂𦵏𦵏畢遂夢此人来謝子㨗字太應亦有文才永康中為散騎侍郎及趙王倫簒逆㨗與陸機等俱作禪文倫誅坐下廷尉遇赦免後為太傅參軍永嘉末卒棗據字道彦潁川長社人也本姓棘其父避仇改焉父叔偉魏鉅鹿太守據美容貎善文辭弱冠辟大將軍府出為山陽令有政績遷尚書郎轉右丞賈充伐吳請為從事中郎軍還徙黄門侍郎冀州刺史太子中庶子太康中卒時年五十餘所著詩賦論四十五首遇亂多亡失子腆字元方亦以文章顯永嘉中為襄城太守弟嵩字臺産才藝尤美為太子中庶子散騎常侍為石勒所殺褚陶字季雅吳郡錢塘人也弱不好弄少而聰慧清淡閑黙以墳典自娛年十三作鷗鳥水磑二賦見者竒之陶嘗謂所親曰聖賢備在黄卷中捨此何求州郡辟不就吳平召補尚書郎張華見之謂陸機曰君兄弟龍躍雲津顧彦先鳯鳴朝陽謂東南之寳已盡不意復見褚生機曰公但未覩不鳴不躍者耳華曰故知延州之徳不孤川嶽之寳不匱矣遷九真太守轉中尉年五十五卒王沈字彦伯髙平人也少有俊才出於寒素不能隨俗沉浮為時豪所抑仕郡文學掾鬱鬱不得志乃作釋時論以自譬其文甚佳是時王政陵遲官才失實君子多退而窮處遂終於里閭元康初松滋令吳郡蔡洪字叔開有才名作孤奮論與釋時意同讀之者莫不歎息焉張翰字季鷹吳郡吳人也父儼吳大鴻臚翰有清才善屬文而縱任不拘時人號為江東歩兵㑹稽賀循赴命入洛經吳閶門於船中彈琴翰初不相識乃就循言譚便大相欽悦問循知其入洛翰曰吾亦有事北亰便同載即去而不吿家人齊王冏辟為大司馬東曹掾冏時執權翰謂同郡顧榮曰天下紛紛禍難未巳夫有四海之名者求退良難吾本山林間人無望於時子善以眀防前以智慮後榮執其手愴然曰吾亦與子採南山蕨飲三江水耳翰因見秋風起乃思吳中菰菜蓴羮鱸魚鱠曰人生貴得適志何能覊宦數千里之外以要名爵乎遂命駕而歸著首邱賦以見志俄而冏敗人皆謂之見機然府以其輙去除吏名翰任心自適不求當世㦯謂之曰卿乃可縱適一時獨不為身後名邪答曰使我有身後名不如即時一杯酒時人貴其曠達性至孝遭母憂哀毁過禮年五十七卒其文筆數十萹行於世庾闡字仲初潁川鄢陵人也祖輝安北長史父柬以勇力聞武帝時有西域徤胡趫㨗無敵晉人莫敢與校帝募勇士惟柬應選遂撲殺之名震殊俗闡好學九嵗能屬文少隨舅孫氏過江母隨兄肇為樂安長史在項城永嘉末為石勒所陷闡母亦没闡不櫛沐不婚宦絶酒肉垂二十年鄉親稱之州舉秀才元帝為晉王辟之皆不行後為太宰西陽王羕掾累遷尚書郎蘇峻之難闡出奔郗鑒為司空參軍峻平以功賜爵吉陽縣男拜彭城内史鑒復請為從事中郎尋召為散騎侍郎領大著作頃之出補零陵太守入湘川為文以弔賈誼文士稱之後以疾徴拜給事中復領著作吳國内史虞潭為太伯立碑闡製其文又作揚都賦皆為世所重年五十四卒所著詩賦銘頌十卷行於世子肅之亦有文藻著稱歴給事中相府記至湘東太守太元中卒曹毗字輔佐譙國人也髙祖休魏大司馬父識右軍將軍毗少好文籍善屬詞賦郡察孝㢘除郎中蔡謨舉為佐著作郎父憂去職服闋遷句章令徴拜太學博士時桂陽張碩為神女杜蘭香所降毗因作二萹詩嘲之并續蘭香歌詩十萹甚有文彩又著揚都賦亞於庾闡累遷尚書郎鎮軍大將軍從事中郎下邳太守以名位不至著對儒一萹以自釋後累遷至光禄勲卒凡所著文筆十五卷傳於世李充字宏度江夏人也父矩江州刺史充少孤其父墓中栢樹嘗為盜賊所斫充手刃之由是知名善楷書妙參鍾索世咸重之辟丞相王導掾轉記室參軍㓜好刑名之學深抑虚浮之士嘗著學箴以為學者之誡征北將軍褚襃引為參軍充以家貧苦求外出襃將許之為縣試問之充曰窮猿投林豈暇擇木乃除剡縣令遭母憂服闋為大著作郎于時典籍混亂充刪除煩重以類相從分作四部甚有條貫祕閣以為永制累遷中書侍郎卒官充注尚書及周易㫖六萹釋莊論上下二萹詩賦表頌等雜文二百四十首行於世子顒亦有文義多所述作郡舉孝㢘充從兄式以平隠著稱善楷隸中興初仕至侍中袁宏字彦伯侍中猷之孫也父朂臨汝令宏有逸才文章絶美曽為詠史詩是其風情所寄少孤貧以運租自業謝尚時鎮牛渚秋夜乗月率爾與左右㣲服泛江㑹宏在舫中諷詠聲既清㑹詞又藻拔遂駐聽久之遣問焉答云是袁臨汝郎誦詩即其詠史之作也尚傾率有勝致即迎升舟與之談論申旦不寐自此名譽日茂尚為安西將軍豫州刺史引宏參其軍事累遷大司馬桓温府記室温重其文筆専綜書記後為東征賦賦末列稱過江諸名徳而獨不載桓彛時伏淊先在温府又與宏善苦諫之宏笑而不答温知之甚忿而憚宏一時文宗不欲令人顯問之後遊青山飲歸命宏同載衆為之懼行數里問宏云聞君作東征賦多稱先賢何故不及家君宏答云尊公稱謂非下官敢専既未遑啟不敢顯之耳温疑其不實乃曰君欲為何辭宏即答曰風鑒散朗㦯搜􅂉引身雖可亡道不可隕宣城之節信義為允也温泫然而止宏賦又不及陶侃侃子胡奴常於曲室抽刃問宏曰家公勲績如此君賦云何相忽宏窘急答曰我已盛述尊公何乃言無因曰精金百汰在割能斷功以濟時職思靖亂長沙之勲為史所贊胡奴乃止後為三國名臣頌及從桓温北伐又作北征賦皆其文之髙者嘗與王珣伏滔同在温坐温令滔讀其北征賦至聞所傳於相傳云獲麟於此野誕靈物以瑞徳奚授體於虞者疚尼父之洞泣似實慟而非假豈一性之足傷乃致傷於天下其本至此便改韻珣云此賦方傳千載無容率爾今於天下之後移韻徙事然於寫送之致似為未盡滔云得益寫韻一句或為小勝温曰卿思益之宏應聲答曰感不絶於余心愬流風而獨寫珣誦味久之謂滔曰當今文章之美固當共推此生性彊正亮直雖被温禮遇至於辯論每不阿屈故榮任不至與伏滔同在温府府中呼為袁伏宏心耻之每歎曰公之厚徳未優國士而與滔比肩何辱之甚謝安嘗賞其機對辯速後安為揚州刺史宏自吏部郎出為東陽郡乃祖道於冶亭時賢皆集安欲以卒廹試之臨别執其手顧就左右取一扇而授之曰聊以贈行宏應聲答曰輙當奉揚仁風慰彼黎庶時人歎其率而能要焉宏見漢時傅毅作顯宗頌辭甚典雅乃作頌九章頌簡文之徳上之於孝武太元初卒於東陽時年四十九又撰後漢紀三十卷及竹林名士傳三卷詩賦誄表等雜文凡三百首傳於世三子長超子次成子次眀子眀子有父風最知名官至臨賀太守伏滔字元度平昌安邱人也有才學少知名州舉秀才辟别駕皆不就大司馬桓温引為參軍深加禮接每宴集之所必命滔同遊從温伐袁真至夀陽以淮南屢叛著論二萹名曰正淮温稱賞之夀陽平以功封聞喜縣侯除永世令温薨征西將軍桓豁引為參軍領華容令太元中拜著作郎専掌國史領本州大中正孝武帝嘗㑹於西堂滔預坐還下車先呼子系之謂曰百人髙會天子先問伏滔在坐不此故未易得為人作父如此定何如也遷游擊將軍著作如故卒官子系之亦有文才歴黄門侍郎侍中尚書光禄大夫羅含字君章桂陽耒陽人也曽祖彦臨海太守父綏滎陽太守含幼孤為叔母朱氏所養少有志尚嘗晝卧夢一鳥文彩異常飛入口中因驚起説之朱氏曰鳥有文彩汝後必有文章自此後藻思日新弱冠州三辟不就含父嘗宰新淦新淦人楊羨後為含州將引含為主簿含傲然不顧羨招致不已辭不獲而就焉及羨去職含送之到縣新淦人以為舊宰之子咸致賂遺含難違而受之及歸悉封置而去由是逺近推服焉後為郡功曹庾亮以為部江夏從事太守謝尚與含為方外之好乃稱曰羅君章可謂湘中之琳瑯尋轉州主簿後桓温臨州又補征西參軍温嘗使含詣尚有所檢劾含至不問郡事與尚累日酣飲而還温問所劾事含曰公謂尚何如人温曰勝我也含曰豈有勝公而行非邪故一無所問温竒其意而不責焉轉州别駕以廨舍諠擾於城西池小洲上立茅屋伐木為牀織葦為席而居布衣蔬食晏如也温嘗與僚屬讌㑹含後至温問衆坐曰此何如人或曰可謂荆楚之材温曰此自江左之秀豈惟荆楚而已徴為尚書郎温雅重其才又表轉征西户曹參軍俄遷宜都太守及温封南郡公引為郎中令尋徴正員郎累遷散騎常侍侍中仍轉廷尉長沙相年老致仕加中散大夫門施行馬初含在官舍有一白雀棲集堂宇及致仕還家階庭忽蘭菊叢生以為徳行之感焉年七十七卒所著文章行於世顧愷之字長康晉陵無錫人也父悦之尚書左丞愷之博學有才氣嘗為筝賦成謂人曰吾賦之比嵇康琴不賞者必以後出相遺深識者亦當以髙竒見貴桓温引為大司馬參軍甚見親眤温薨後愷之拜温墓賦詩云山崩溟海竭魚鳥將何依或問之曰卿憑重桓公乃爾哭狀其可見乎答曰聲如震雷破山淚似傾河注海愷之好諧謔人多愛狎之後為殷仲堪參軍亦深被眷接仲堪在荆州愷之嘗因假還仲堪特以布㠶借之至破冢遭風大敗愷之與仲堪牋曰地名破冢真破冢而出行人安稳布㠶無恙還至荆州人問以㑹稽山川之狀愷之云千巖競秀萬壑爭流草木蒙籠若雲興霞蔚桓元時與愷之同在仲堪坐共作了語愷之先曰火燒平原無遺燎元曰白布纒根樹旒旐仲堪曰投魚深泉放飛鳥復作危語元曰矛頭淅米劍頭炊仲堪曰百嵗老翁攀枯枝有一參軍云肓人騎瞎馬臨深池仲堪眇目驚曰此太逼人因罷愷之每食甘蔗常自尾至本人或怪之云漸入佳境尤善丹青圖寫特妙謝安深重之以為有蒼生以来未之有也愷之每畫人成或數年不㸃目精人問其故愷之曰四體妍蚩本無闕少於妙處傳神寫照正在阿堵中嘗悦一隣女挑之弗從愷之乃圖其形於壁以棘針釘其心女遂患心痛愷之因致其情女從之遂宻去針而愈愷之每重嵇康四言詩因為之圖常云手揮五弦易目送歸鴻難每寫起人形妙絶於時嘗圖裴楷像頬上加三毛觀者覺神眀殊勝又為謝鯤像在石巖裏云此子宜置邱壑中欲圖殷仲堪仲堪有目疾固辭愷之曰眀府正為眼耳若眀㸃瞳子飛白拂上使如輕雲之蔽月豈不美乎仲堪乃從之愷之嘗以一厨畫糊題其前寄桓元皆其深所珍惜者元乃發其厨後竊取畫而緘閉如舊以還之紿云未開愷之見封題如初但失其畫直云妙畫通靈變化而去亦猶人之登仙了無怪色愷之矜伐過實少年因相稱譽以為戲弄又好吟詠自謂得先賢風制或請愷之作洛生詠答曰何至作老婢聲義熙初為散騎常侍與謝瞻連省夜於月下長詠瞻每遥贊之愷之彌自力忘倦瞻將眠令人代已愷之不覺有異遂申旦而止尤信小術以為求之必得桓元嘗以一栁葉紿之曰此蟬所翳葉也取以自蔽人不見已愷之喜引葉自蔽元就溺焉愷之信其不見已也甚以珍之初愷之在桓温府常云愷之體中癡黠各半合而論之正得平耳故俗傳愷之有三絶才絶畫絶癡絶年六十二卒於官所著文集及啟矇記行於世郭澄之字仲静太原陽曲人也少有才思機敏兼人調補尚書郎出為南康相值盧循作逆流離僅得還都劉裕引為相國參軍從裕北伐既克長安裕意更欲西伐集寮屬議之多不同次問澄之澄之不答西向誦王粲詩曰南登霸陵岸囘首望長安裕意便定謂澄之曰當與卿共登霸陵岸耳因還澄之位至裕相國從事中郎封南豐侯卒於官所著文集行於世通志卷一百七十五
