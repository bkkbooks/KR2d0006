body:
  text: 通志卷一百九十八宋右廸功郎鄭樵漁仲撰四夷傳第五南蠻下嶺南序畧南粤海南序畧黄支哥羅林邑扶南頓遜毗騫干陀利狼牙修婆利槃槃赤土真臘羅刹投和丹丹邊斗杜薄薄剌㪍焚火山無論嶺南序畧五嶺之南漲海之北三代以前是為荒服當周成王時周公居攝六年制禮作樂天下和平南荒有越裳國以三象重譯而獻白雉曰道路悠逺山川阻深音使不通故重譯而朝成王以歸周公公曰徳不加焉則君子不饗其質政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黄耉曰久矣天之無烈風雷雨意者中國有聖人乎有則曷徃朝之周公乃歸之於王稱先王之神致以薦于宗廟周徳既衰於是稍絶及楚子稱霸朝貢百粤秦幷天下威服蠻夷始開嶺外置南海桂林象郡漢興尉佗自立為南粤王傳國五世至武帝元鼎五年遂滅之以其地為儋耳珠崖南海蒼梧鬱林合浦交趾九真日南九郡置刺史治交趾郡領焉交趾者禮稱南方曰蠻雕題交趾是也題額也雕題謂刻其額以丹青湼之交趾之西有噉人國生首子輙解而食之謂之宜弟味旨則以遺其君君喜而賞其父取妻美則讓其兄今烏滸人實然萬震南州異物志曰烏滸在廣州之南交趾之北其土人恒出道間伺候行旅輙出擊之利得人食之不貪其財貨並以其肉為肴爼又取其髑髏破之以飲酒以人掌趾為珍異以食老也其珠崖儋耳二郡在海洲上東西千里南北五百里其渠帥貴長耳皆穿而縋之垂肩三寸武帝末珠崖太守會稽孫幸調廣幅布獻之蠻不堪役遂攻郡殺幸幸子豹合率善人還復破之自領郡事討擊餘黨連年乃平制詔即以豹為珠崖太守威政大行獻命嵗至然中國貪其珍賂漸相侵侮故率嵗一反元帝初元三年遂罷之凡立郡六十五嵗逮王莽輔政元始二年日南之南黄支國来獻犀牛凡交趾所統雖置郡縣而言語重譯乃通人如禽獸長幼無别項䯻徒跣為䯻於項上也以布貫耳而著之後頗徙中國罪人使雜居其間乃稍知言語漸見禮化光武中興錫光為交趾任延守九真於是教其耕稼制為冠履初設媒聘始知姻娶建立學校導之禮義建武十二年九真徼外蠻里張游里蠻之别號今呼為俚人率種人募化内屬封為歸漢里君明年南粤徼外蠻夷獻白雉白兔至十六年交趾女子徵側及其妹徵貳反攻郡徵側者麊泠縣雒將之女也麊音莫支反泠音零嫁為朱鳶音焉人詩索妻甚雄勇交趾太守蘇定以法繩之側忿故反於是九真日南合浦蠻里皆應之凡畧六十五城自立為王交趾刺史及諸太守僅得自守光武乃詔長沙合浦交趾具車船修道橋通障谿儲糧榖十八年遣伏波將軍馬援樓船將軍段志發長沙桂陽零陵蒼梧兵萬餘人討之明年夏四月援破交趾斬徵側徵貳等餘皆降散進擊九真賊都陽等破降之徙其渠帥三百餘口於零陵於是嶺表悉平肅宗元和元年日南徼外蠻夷究不事人究不事人蠻夷别號也邑豪獻生犀白雉和帝永元十二年夏四月日南象林蠻夷二千餘人宼掠百姓燔燒官寺郡縣發兵討擊斬其渠帥餘衆乃降於是置象林將兵長史以防其患安帝永初元年九真徼外夜郎蠻夷舉土内屬開境千八百四十里元初二年蒼梧蠻夷反叛明年遂招誘鬱林合浦蠻漢數千人攻蒼梧郡鄧太后遣侍御史任逴逴音卓奉詔赦之賊皆降散延光元年九真徼外蠻貢獻内屬三年日南徼外蠻復来内屬順帝永建六年日南徼外葉調王便遣使貢獻帝賜調便金印紫綬永和三年日南象林徼外蠻夷區憐等數千人攻象林縣燒城寺殺長史交趾刺史樊演發交趾九真二郡兵萬餘人救之兵士憚逺役遂反攻其府二郡雖擊破反者而賊勢轉盛會侍御史賈昌使在日南即與州郡并力討之不利遂為所攻圍嵗餘而兵穀不繼帝以為憂眀年召公卿百官及四府掾屬問其方畧皆議遣大將發荆揚兖豫四萬人赴之大將軍從事中郎李固駮曰若荆揚無事發之可也今二州盗賊槃結不散武陵南郡蠻夷未輯長沙桂陽數被徵發如復擾動必更生患其不可一也又兖豫之人卒被徵發逺赴萬里無有還期詔書廹促必致叛亡其不可二也南州水土温暑加有瘴氣致死亡者十必四五其不可三也逺渉萬里士卒疲勞比至嶺南不復堪鬬其不可四也軍行三十里為程而去日南九千餘里三百日乃到計人禀五升古升小故曰五升也用米六十萬斛不計將吏驢馬之食但負甲自致費便若此其不可五也設軍到所在死亡必衆既不足禦敵當復更發此為刻割心腹以補四支其不可六也九真日南相去千里發其吏民猶尚不堪况乃苦四州之卒以赴萬里之艱哉其不可七也前中郎將尹就討益州叛羗益州諺曰虜来尚可尹来殺我後就徴還以兵付刺史張喬喬因其將吏旬月之間破殄㓂虜此發将無益之效州郡可任之騐也宜更選有勇畧仁恵任將帥者以為刺史太守悉使共住交趾今日南兵單無榖守既不可戰又不能可一切徙其吏民北依交趾事静之後乃命歸本還募蠻夷使自相攻轉輸金帛以為其資有能反間致頭首者許以封侯列土之賞故并州刺史長沙祝良性多勇决又南陽張喬前在益州有破虜之功皆可任用昔太宗就加魏尚為雲中守哀帝即拜龔舎為太山太守宜即拜良等便道之官四府悉從固議即拜祝良為九真太守張喬為交趾刺史喬至開示慰誘並皆降散良到九真單車入賊中施設方畧招以威信降者數萬人皆為良築起府寺由是嶺外復平建康元年日南蠻夷千餘人復攻燒縣邑遂扇動九真與相連結交趾刺史九江夏方開恩招誘賊皆降服時梁太后臨朝美方之功遷為桂陽太守桓帝永夀三年居風令貪暴無度縣人朱達等及蠻夷相聚攻殺縣令衆至四五千人進攻九真九真太守􅅜式戰死􅅜音五奚反詔賜錢六十萬拜子二人為郎遣九真都尉魏朗討破之斬首二千級渠帥屯據日南衆轉彊盛延熹三年詔復拜夏方為交趾刺史方威恵素著日南宿賊聞之二萬餘人相率詣方降靈帝建寜三年鬱林太守谷永以恩信招降烏滸人十餘萬内屬皆受冠帶開置七縣熹平二年冬十二月日南徼外國重譯貢獻光和元年交趾合浦烏滸蠻反叛招誘九真日南合數萬人攻没郡縣四年刺史朱儁擊破之六年日南徼外國復来貢獻自是以後或臣或畔壤地廣逺竟難馴服焉南粤南粤王趙佗真定人也佗音徒何反秦并天下畧定揚粤置桂林南海象郡以適徙民與粤雜處十三載至二世時南海尉任囂病且死召龍川令趙佗語曰聞陳勝等作亂豪傑叛秦相立南海辟逺恐盜兵侵此吾欲興兵絶新道自備待諸侯變㑹疾甚且番禺負山險阻南北東西數千里頗有中國人相輔此亦一州之主可為國郡中長吏無足與謀者故召公告之即被佗書行南海尉事囂死佗即移檄告横浦陽山湟谿闗曰盜兵且至急絶道聚兵自守因稍以法誅秦所置吏以其黨為守假秦已滅佗即擊并桂林象郡自立為南粤武王髙帝已定天下為中國勞苦故釋佗不誅十一年遣陸賈立佗為南粤王與剖符通使使和輯百粤毋為南邉害與長沙接境髙后時有司請禁粤闗市鐡器佗曰髙皇帝立我通使物今髙后聴䜛臣别異蠻夷隔絶器物此必長沙王計欲倚中國擊滅南海并王之自為功也於是佗乃自尊號為南武帝發兵攻長沙邉敗數縣焉髙后遣將軍隆慮侯竈擊之周竈也慮音廬㑹暑濕士卒大疫兵不能踰嶺嵗餘髙后崩即罷兵佗因此以兵威財物賂遺閩粤西甌駱役屬焉東西萬餘里廼乗黄屋左纛稱制與中國侔文帝元年初鎮撫天下使告諸侯四夷從代來即位意諭盛徳焉廼為佗親冡在真定置守邑嵗時奉祀召其從昆弟尊官厚賜寵之詔丞相平舉可使粤者平言陸賈先帝時使粤上召賈為太中大夫謁者一人為副使賜佗書曰皇帝謹問南粤王甚苦心勞意朕高皇帝側室之子棄外奉北藩於代道里遼逺壅蔽樸愚未嘗致書髙皇帝棄羣臣孝恵皇帝即世髙后自臨事不幸有疾日進不衰以故誖暴乎治諸吕為變故亂法不能獨制廼取他姓子為孝恵皇帝嗣頼宗廟之靈功臣之力誅之已畢朕以王侯吏不釋之故不得不立今即位乃者聞王遺將軍隆慮侯書求親昆弟請罷長沙兩將軍朕以王書罷將軍愽陽侯親昆弟在真定者已遣人存問修治先人冡前者聞王發兵於邉為㓂災不止當其時長沙苦之南郡尤甚雖王之國庸獨利乎必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕欲定地犬牙相入者以問吏吏曰髙皇帝所以介長沙土也朕不得擅變焉吏曰得王之地不足以為大得王之財不足以為富服嶺以南王自治之雖然王之號為帝兩帝並立無一乘之使以通其道是争也争而不讓仁者不為也願與王分棄前患終今以來通使如故故使賈馳諭告王朕意王亦受之毋為㓂災矣上褚五十衣中褚三十衣下褚二十衣遺王以緜装衣曰褚願王聴樂娱憂存問鄰國陸賈至佗恐頓首謝願奉眀詔長為藩臣奉貢職於是下令國中曰吾聞兩雄不俱立兩賢不並世漢皇帝賢天子自今以來去帝制黄屋左纛因為書稱蠻夷大長老夫臣佗昧死再拜上書皇帝陛下老夫故粤吏也髙皇帝幸賜臣佗璽以為南粤王使為外臣時内貢職孝恵皇帝即位義不忍絶所以賜老夫者甚厚髙后自臨用事近細士信䜛臣别異蠻夷出令曰毋予蠻夷外粤金鐡田器馬牛羊即予予牡毋予牝老夫處辟馬牛羊齒已長自以祭祀不修有死罪使内史藩中尉髙御史平凡三軰上書謝過皆不反又風聞老夫父母墳墓已壊削兄弟宗族已誅論吏相與議曰今内不得振於漢外又亡以自髙異故更號為帝自帝其國非敢有害於天下也髙皇后聞之大怒削去南粤之籍使使不通老夫竊疑長沙王䜛臣故敢發兵以伐其邉且南方卑濕蠻夷中西有西甌其衆半羸南面稱王東有閩粤其衆數千人亦稱王西北有長沙其半蠻夷亦稱王老夫故敢妄竊帝號聊以自娱老夫身定百邑之地東西南北盖數千里帶甲百萬有餘然北面而臣事漢何也不敢背先人之故老夫處粤四十九年於今抱孫焉然夙興夜寐寝不安席食不甘味目不視靡曼之色耳不聴鐘鼓之音者以不得事漢也今陛下幸哀憐復故號通使漢如故老夫死骨不腐改號不敢為帝矣謹北面因使者獻白璧一雙翠鳥犀角十紫貝五百桂蠧一器桂蠧桂樹中蝎蟲也漢舊常以薦陵廟生翠四十雙孔雀二雙昧死再拜以聞皇帝陛下陸賈還報文帝大恱遂至孝景時稱臣遣使入朝請請才性反然其居國輙如故號其使天子稱王朝命如諸侯至武帝建元四年佗孫胡為南粤王立三年閩粤王郢興兵南擊其邉邑粤使人上書曰兩粤俱為藩臣毋擅興兵相攻擊今東粤擅興兵侵臣臣不敢興兵惟天子詔之於是天子多南粤義守職約為興師遣兩將軍徃討閩粤兵未踰嶺粤王弟餘善殺郢以降於是罷兵天子使嚴助徃諭意南粤王胡頓首曰天子乃興兵誅閩粤死亡以報徳遣太子嬰齊入宿衞謂助曰國新被㓂使者行矣胡方日夜裝入見天子助去後其大臣諫胡曰漢興兵誅郢亦行以驚動南粤且先王言事天子期毋失禮要之不可以怵好語入見入見則不得復歸亡國之勢也於是胡稱病竟不入見後十餘載胡實病甚太子嬰齊請歸胡薨諡曰文王嬰齊嗣立即蔵其先武帝文帝璽嬰齊在長安時取邯鄲摎氏女摎音居蚪反生子興及即位上書請立摎氏女為后興為嗣漢數使使者風諭嬰齊猶尚樂擅殺生自恣懼入見要以用漢法比内諸侯固稱病遂不入見遣子次公入宿衛嬰齊薨諡為眀王太子興嗣立其母為太后太后自未為嬰齊妻時常與霸陵人安國少季通姓安國字少季及嬰齊薨後元鼎四年漢使安國少季諭王王太后入朝令辯士諫大夫終軍等宣其辭勇士魏臣等輔其决衛尉路􅀶徳將兵屯桂陽待使者王年少太后中國人安國少季徃復與私通國人頗知之多不附太后太后恐亂起亦欲倚漢威勸王及幸臣求内屬即因使者上書請比内諸侯三嵗壹朝除邉闗於是天子許之賜其丞相吕嘉銀印及内史中尉太傅印餘得自置除其故黥劓刑用漢法諸使者留鎮撫之王王太后飭治行裝重資為入朝具相吕嘉年長矣相三王宗族官貴為長吏七十餘人男盡尚王女女盡嫁王子弟宗室及蒼梧秦王有連其居國中甚重粤人信之多為耳目者得衆心愈於王王之上書數諫止王王不聴有畔心數稱病不見漢使者使者注意嘉勢未能誅王王太后亦恐嘉等先事發欲介使者權謀誅嘉等置酒請使者大臣皆侍坐飲嘉弟為將將卒居宫外酒行太后謂嘉南粤内屬國之利而相君苦不便者何也以激怒使者使者狐疑相杖遂不敢發嘉見耳目非是即趨出太后怒欲鏦嘉以矛鏦音䆫王止太后嘉遂出介弟兵就舎稱病不肯見王及使者乃隂謀作亂王素亡意誅嘉嘉知之以故數月不發太后獨欲誅嘉等力又不能天子聞之罪使者怯亡决又以為王王太后已附漢獨吕嘉為亂不足以興兵欲使莊参以二千人徃参曰以好徃數人足矣以武徃二千人亡足以為也辭不可天子罷参兵郏壮士故濟北相韓千秋奮曰以區區粤又有王應獨吕嘉為害願得勇士三百人必斬嘉以報於是天子遣千秋與王太后弟摎樂将二千人徃入粤境吕嘉乃遂反下令國中曰王年少太后中國人又與使者亂專欲内屬又持先王寶入獻天子以自媚多從人行至長安虜賣以為僮奴自脫一時利亡顧趙氏社稷為萬世慮之意乃與其弟将卒攻殺太后王盡殺漢使者遣人告蒼梧秦王及其諸郡縣立眀王長男粤妻子術陽侯建徳為王而韓千秋兵之入也破數小邑其後粤直開道給食未至番禺四十里粤以兵擊千秋等滅之使人函封漢使節至塞上好為謾辭謝罪謾音莫連反發兵守要害處於是天子曰韓千秋雖亡成功亦軍鋒之冠封其子延年為成安侯摎樂其姊為王太后首願屬漢封其子廣徳為龒侯龒古龍字乃赦天下曰天子微弱諸侯力政譏臣不討賊吕嘉建徳等反自立晏如令粤人及江淮以南樓船十萬師徃討之元鼎五年秋衞尉路博徳為伏波将軍出桂陽下湟水主爵都尉楊僕為樓船將軍出豫章下横浦故歸義粤侯二人為戈船下瀬將軍出零陵或下灕水或抵蒼梧使馳義侯因巴蜀罪人發夜郎兵下䍧柯江咸會番禺六年冬樓船將軍將精卒先陷尋陿破石門得粤船粟因推而前挫粤鋒以數萬人待伏波将軍伏波将軍将罪人道逺後期與樓船㑹乃有千餘人遂俱進樓船居前至番禺建徳嘉皆城守樓船自擇便處居東南面伏波居西北面㑹暮樓船攻敗粤人縱火燒城粤素聞伏波莫不知其兵多少伏波乃為營遣使招降者賜印綬復縱令相招樓船力攻燒敵反􅇌而入伏波營中􅇌與驅同遲旦遲音治城中皆降伏波吕嘉建徳以夜與其屬數百人亡入海伏波又問降者知嘉所之遣人追故其校司馬蘇宏得建徳為海常侯粤郎都稽得嘉為臨蔡侯蒼梧王趙光與粤王同姓聞漢兵至降為隨桃侯及粤揭陽令史定降漢為安道侯掲音羯南海縣粤將畢取以軍降為膫侯粤将姓畢名取也膫屬南陽音来彫反粤桂林監居翁桂林部監也姓居名翁諭告甌駱四十餘萬口降為湘城侯戈船下瀬将軍兵及馳義侯所發夜郎兵未下南粤已平遂以其地為儋耳珠崖南海蒼梧鬱林合浦交趾九真日南九郡伏波将軍益封樓船將軍以摧鋒陷堅為将梁侯自尉佗王凡五世九十三嵗而亡海南序略海南諸國漢時通焉大抵在交州南及西南居大海中洲上相去或五三百里五三千里逺者二三萬里乗船舉帆道里不可詳知外國諸書雖言里數又非定實也其西與諸胡國接元鼎中遣伏波將軍路博徳開百粤置日南郡其徼外諸國自武帝以来皆獻見後漢桓帝時大秦天竺皆由此道遣使貢獻及吳孫權遣宣化從事朱應中郎康泰使諸國其所經及傳聞則有百數十國因立記傳晉代通中國者盖尠及宋齊至者有十餘國自梁武隋煬諸國使至踰於前代唐貞觀以後聲教逺被舊時所未通者重譯而至又多於梁隋焉其無異聞亦不復更記黄支黄支漢時通焉在合浦日南之南三萬里其俗畧與珠崖相類自武帝以来常獻見有眀珠玉璧琉璃竒石異物大珠至圍二寸以下而最圓者置之平地終日不停哥羅哥羅漢時聞焉在槃槃東南亦曰哥羅富沙羅國云其王姓矢利婆羅名米失鉢羅其所治城累石為之城有樓闕門有禁衞宫室覆之以草國有州二十四而無縣庭列儀仗有纛以孔雀羽飾焉兵器有弓箭刀矟皮甲征伐皆乗象一隊有象百頭每象有百人衞之象鞍有鉤攔之中有四人一人執矟一人執弓矢一人執殳一人執刀賦稅人出銀一銖國無蠶絲麻紵惟出吉貝布畜有牛少馬其俗非有官者不得上髪裹頭又嫁娶初問婚惟以㯽榔為禮多者至二百盤成婚之時惟以黄金為財多者至三百兩婦人嫁訖則從夫姓音樂有琵琶横笛銅鈸鐵鼓鼓簧吹蠡擊鼓死亡則焚尸盛以金罌沈之大海林邑林邑本漢日南郡象林縣古越裳界也伏波將軍馬援開南境置此縣其地從廣可六百里城去海百二十里去日南界四百餘里北接九徳郡其南界水歩道二百餘里有西圖夷亦稱王馬援所植二銅柱表漢家界處也馬援北還留十餘户於銅柱處至隋有三百餘户悉姓馬土人以為流寓號曰馬流人銅柱尋没馬流人常識其處林邑國記馬援樹兩銅柱於象林南界與西屠國分漢之南境又云銅柱山周十里形如倚盖西跨重巖東臨大海屈璆道里記又云林邑大浦口有五銅柱焉其國有金山石皆赤色其中生金金夜則出飛狀如螢火又出玳瑁貝齒吉貝沈木香吉貝者樹名也其華成時如鵞毳抽其緒紡之以作布與紵布不殊亦染成五色織為班布沈木香者土人斫斷積以嵗年朽爛而心節獨在置水中則沈故名曰沈香次浮者棧香也又出猩猩獸多琥珀松脂淪入地千嵗為茯苓又千嵗為琥珀又云楓脂謂之琥珀在地其上及傍不生草木深者或八九尺大如斛削去皮焉初如桃膠凝成乃堅其金寶物産大抵與交趾同以塼為城蜃灰塗之居處為閣名曰干蘭皆開北户以向日或東西無定尊官有二其一曰西那婆帝其二曰薩婆地歌其屬官三等其一曰倫多姓次歌論致帝次乙地伽蘭外官分為二百餘部其長官曰弗羅次曰阿倫如牧宰之差也書樹葉為紙施椰葉為席男女皆以横幅吉貝繞腰以下謂之干漫亦曰都漫穿耳貫小鐶貴者著革履賤者跣行自林邑扶南諸國皆然也其王戴金花冠形如章甫加纓絡如佛象之飾出則乗象吹螺擊鼓罩吉貝繖以吉貝為旛旗國不設刑法有罪者則使象蹋殺之林邑浦外有不勞山罪人亦送此山令其自死其大姓號婆羅門嫁娶必用八月女先求男由貴男而賤女也同姓還相婚姻使婆羅門引壻見婦握手相付呪曰吉利吉利然後成禮人性凶悍果於戰鬬有弓箭刀槊以竹為弩傅毒於矢樂有琴笛琵琶五絃頗與中國同每擊鼓以警衆吹蠡以莭戎其人深目髙鼻髪拳色黒以幅巾纒身冬月衣袍婦女椎髻四時暄暖無霜雪王死七日而𦵏有官者三日庶人一日皆以函盛屍鼓舞導從轝至水次積薪焚之收其餘骨王則内金罌中沈之於海有官者以銅沈之海口庶人以瓦送之於江男女截髪随䘮至水次盡哀而止其寡婦孤居散髪至老人皆奉釋法文字同於天竺王事竺乾道鑄金銀人像大十圍後漢末大亂象林縣功曹姓區有子曰連殺縣令自號為王子孫相承數世其後王無嗣外甥范熊代立熊死子逸代立晉武帝太康中始来貢獻咸康二年范逸死奴文簒立文本日南西卷縣夷帥范椎奴也嘗牧牛澗中獲二鯉魚化而為鐡因以鑄刀刀成文對大石嶂而呪之曰鯉魚變化冶成雙刀石嶂破者當王此國進斫石嶂如斷芻藁文心異之范椎嘗使之商估徃来見上國制度至林邑遂教范逸作宫室城邑及兵車器械逸甚愛信之使為将文乃譛逸諸子或徙或奔及逸死無嗣文偽於隣國迓逸子置毒於漿中殺之遂脅國人自立以逸妻妾置之髙樓從已者納之不從者絶其食於是乃攻大岐界小岐界式僕徐狼屈都乾魯扶單等諸國并之有衆四五萬人遣使通表建業其書皆胡字時交州刺史姜荘使所親韓戢謝擢前後監日南郡戢擢並貪殘諸夷患之穆帝永和三年臺遣夏侯覽為太守侵刻尤甚林邑素無土田貪日南地肥沃常欲畧有之至是因人之怨襲殺覽以其屍祭天留日南三年乃還林邑交州刺史朱蕃後遣督䕶劉雄戍日南文復滅之進㓂九徳郡殺害吏民遣使告蕃願以日南北境横山為界蕃不許文歸林邑尋復屯日南文死子佛立猶屯日南征西將軍桓温遣督䕶滕畯九真太守灌䆳討之追至林邑佛乃請降孝武帝寜康中遣使貢獻至義熈中每嵗来㓂日南九真九徳等諸郡殺傷甚衆交州遂致虛弱而林邑亦用疲弊佛死子胡達立上疏貢金盤椀及金鉦等物胡達死子須達立須達死子敵真立其弟敵鎧擕其母出奔敵真追恨不能容其母與弟捨國而之天竺禪位於其甥國相蔵驎固諫不從其甥立而殺蔵驎蔵驎子又攻殺之而立敵鎧同母異父弟曰文敵文敵復為扶南王子當根純所殺大臣范諸農平其亂自立為王諸農死子陽邁立陽邁初在孕其母夢生兒有人以金席藉之其色光麗夷人謂金之精者為陽邁若中國云紫磨者因以為名宋永初二年遣使貢方物武帝以陽邁為林邑王陽邁死子咄立纂其父復曰陽邁元嘉初陽邁侵暴日南九徳諸郡交州刺史杜宏文建牙欲討之聞有代乃止八年又宼九徳郡入四會浦口交州刺史阮彌之遣隊主桓道生率兵赴討攻區粟城不克乃引還十二年十五年十六年十八年每遣使入獻獻既陋薄而㓂盜不已文帝忿其違慠二十三年使交州刺史檀和之振武將軍宗慤伐之和之遣司馬蕭景憲為前鋒陽邁聞之懼欲輸金一萬斤銀十萬斤銅三十萬斤還所畧日南户口其大臣䓯僧達諫止之乃遣大帥范扶龍戍其北界區粟城景憲攻城克之乗勝即克林邑陽邁父子並挺身逃奔獲其珍異皆是未名之寶又銷其金人得黄金數十萬斤和之後坐事免官病卒見胡神為祟云孝武孝建二年林邑又遣長史范龍䟦奉使貢獻除龍䟦揚武將軍大眀二年林邑王范神成又遣長史范流奉表獻金銀器香布諸物眀帝泰豫元年又遣使獻方物齊永眀中范文賛累遣使貢獻梁天監九年文賛死子天凱奉獻白獮猴詔加持莭都督縁海諸軍事威南將軍林邑王天凱死子弼毳䟦摩立奉表貢獻普通七年王髙戍勝凱遣使獻方物詔以為持節都督縁海諸軍事綏南將軍林邑王大通元年又遣使貢獻二年行林邑王髙戍律陁羅䟦摩遣使貢獻詔以為持莭都督縁海諸軍綏南將軍林邑王六年又遣使貢方物自是迄于陳氏使命弗絶隋文帝平陳後遣人通表中國既而職貢不至時天下無事朝臣多言林邑多竒寶者仁夀末上遣大將軍劉方為驩州道行軍總管率欽州刺史寗長真驩州刺史李暈開府秦雄歩騎萬餘及犯罪者數千人擊之其王梵志乗巨象而戰方軍不利方乃多掘土坑草覆其上因以兵挑之方與戰偽北梵志逐之其象多陷轉相驚駭軍遂亂方縱兵擊大破之遂棄城而走方入其都獲其廟主十八枚皆鑄金為之盖其有國十八葉矣方既平其國班師而歸故地遂空梵志收合遺民别建國邑遣使謝罪唐貞觀中其王范頭利死國人立頭利之女為王女王獨任國中不寜大臣可倫翁定乃立頭利之姑子諸葛地者為王以女王妻之其國乃定諸葛地既立遣其使可倫因地盤獻火珠狀如水精日正午以珠承影取艾衣之而火輙見云得之於羅刹國焉扶南扶南在日南郡之南海西大灣中去日南可七千里在林邑西南三千餘里城去海五百里有大江廣十里從西流東入海其國廣輪三千餘里土地洿下而平愽氣候風俗大較與林邑同地出金銀銅鍚沈木香象犀孔翠五色鸚鵡又有金鋼可以刻玉狀似紫石英其所生乃在百丈水底磐石上如鍾乳人没水取之竟日乃出以鐵椎鎚之而不傷鐵反自損然以羚羊角扣之漼然冰泮又有老鵰入海化為玳可以截作馬勒謂之珂國有城邑宫室王居重閣以木柵為城海邉生大若葉長八九尺編其葉以覆屋國人亦為閣居為船長八九丈廣纔六七尺頭尾似魚人皆醜黑拳髪文身裸體徒跣以耕種為務一嵗種三嵗獲又好雕文刻鏤食器多以銀為之所居不穿井數十家共一池汲引之俗事天神以銅為像二面者四手四面者八手手各有所持或小􅅜或鳥獸或日月其王出入乗象嬪侍亦然王坐則偏踞翹膝垂左膝至地以白疉敷前設金盆香爐於其上國俗居䘮則剃除鬚髪死者有四葬水葬則投之江流火葬則焚為灰燼土𦵏則瘞埋之鳥葬則棄之山野人性貪吝男女恣其奔隨國法無牢獄有訟者先齋三日乃燒斧令極赤訟者捧行七歩又以金鐶或雞子投沸湯中令探取之若無實者手即爛有理者則否又於城溝養鰐魚門外圈猛獸有罪者輟以餧猛獸及鰐魚魚獸不食為無罪三日乃放之鰐魚大者長三丈餘狀如鼉有四足喙長六七尺兩邉有齒利如刀劒常食魚或得麞鹿及人亦皆噉之蒼梧以南及外國皆有之其先世以女子為王有女王字栁葉年少壮健有似男子其南有激國人名混潰者善事鬼神夢神賜之弓乗賈人舶入海混潰晨起詣神廟果得弓遂依夢乗舶入海入扶南外邑栁葉人衆見外國舶至欲刼取之混潰引弓射其船穿度一面矢及侍者栁葉大懼舉衆降於混潰混潰納以為妻惡其祼露乃令栁葉穿疉布貫其首焉混潰據扶南生七子分王七邑其後王混盤况以詐力間諸邑令相疑阻因舉兵攻并之混盤况年九十餘死立中子盤盤以國事委其大將范蔓盤盤立三年死國人共舉蔓為王蔓勇健有權略復以兵威攻伐旁國咸服屬之自號扶南大王乃作大船窮漲海開國十餘闢地五六千里次當伐金鄰國蔓遇疾遣太子金生代行蔓姊子旃因簒蔓自立遣人詐金生而殺之蔓死時有乳下􅅜名長逃在民間至年二十乃結國中壯士襲殺旃旃大將范尋又攻殺長而代立吳時遣中郎康泰宣化從事朱應使於尋國國人猶裸惟婦人著貫頭衫泰應謂曰國中實嘉但人䙝露可怪耳尋始令國中男子著横幅横幅今干漫也大家乃截錦為之貧者用布晉武帝太康中尋始遣使貢獻穆帝升平元年有竺旃檀稱王奉表獻馴象詔以勞費停之其後王憍陳如本天竺婆羅門也有神語曰應王扶南憍陳如心恱南至盤盤扶南人聞之舉國欣戴迎而立焉復改制度用天竺法憍陳如死後王持黎陀䟦摩宋元嘉中頻遣使貢方物齊永眀中王憍陳如闍邪跋摩遣使入獻梁天監初跋摩復表送珊瑚佛像并珍異物詔授安南將軍扶南王自是累遣使入貢十二年䟦摩死庶子留陁䟦摩殺其嫡弟自立十六年遣使竺當抱老奉表貢獻十八年復表送天竺旃檀瑞象婆羅樹葉并火齊珠鬱金蘇合等香普通元年中大通二年大同九年累遣獻方物三年復獻生犀又言其國有佛髪長一丈二尺詔遣沙門釋曇寶随使徃迎之隋時其國王姓古籠遣使至長安唐武徳後亦頻入貢貞觀中又獻白頭國二人於洛陽云白頭國在扶南之西参半之西南男女生皆素首身又凝白居山洞之中四面巖險故人莫至與参半國相接頓遜頓遜梁時聞焉一曰典遜在海﨑山上地方千里城去海十里有五王並覊屬扶南北去扶南可三千餘里其國之東界通交州其西界接天竺安息徼外諸國賈人多至其國交易焉所以然者頓遜廻入海中千餘里漲海無涯岸賈舶未嘗得逕過也其市東西交會日有萬餘人珍物寶貨無所不有又有酒樹似安石榴採其花汁停甕中數日成酒地出藿香插枝便生葉如都梁以裛衣國有區撥等花十餘種冬夏不衰日載數十車貨之其花燥更芬馥亦末為粉以傅身焉其俗特多鳥𦵏人將死者親賔歌舞送於郭外有鳥口如鵝似鸚鵡而紅色飛来萬許家人避之鳥食肉盡乃去燒其骨沈於海中以為上行人也云必生天鳥若廻翔不食其人乃自悲傷自以為已有穢乃更就火葬以為次行人也若不能生入火又不被鳥食以為下行人也毗騫毗騫梁時聞焉在頓遜之外大海洲中去扶南八千里傳其王身長丈二尺頭長三尺自古不死莫知其年王神聖國中人善惡及將来事王皆知之是以無敢欺者南方號曰長頭王國俗有室屋衣服噉秔米其人言語小異扶南有山出金金露生石上無央限也國法刑人並於王前噉其肉國内不受估客有徃者亦殺而噉之是以商旅不敢至王常樓居不血食不事鬼神其子孫生死如常人惟王不死扶南王數使與書相報答贈遺人食器如圓盤又如瓦塸名為多羅受五升又如椀者受一升王亦能作天竺書書可三千言說其宿命所出與佛經相似並論善事又傳扶南東界即大漲海海中有大洲洲上有諸薄國國中有馬五洲復東行漲海千餘里至自然火洲其上有樹生火中洲左近人剥取其皮紡織作布極得數尺以為手巾與蕉麻無異而色微青黑若小垢洿則投火中復更精潔或作燈炷用之不盡干陀利干陀利宋時通焉在南海洲上其俗與林邑扶南畧同出班布吉貝㯽榔㯽榔特精好為諸國之最宋孝武世王釋婆羅那隣陁遣長史竺留陀獻金銀寶器梁天監元年其王瞿曇䟦陁羅夢一僧謂曰江表有聖人汝當遣使奉禮則土地豐樂不然則境内不得自安陁羅未之信也既而又夢此僧云汝既不信我當與汝徃觀乃於夢中至建鄴拜覲天子既覺心異之陁羅本工畫乃冩夢中所見武帝容質仍遣使并畫工奉表獻玉盤等物使人摹寫帝形回校本畫無少異焉後陁羅死子毗針邪跋摩立十七年遣長史毗員䟦摩貢金芙蓉雜香藥等普通初復獻方物自後無聞狼牙脩狼牙脩梁時通焉在南海中其界東西三十日行南北二十日行北去廣州二萬四千里土氣物産與扶南畧同偏多棧沈婆律等香其俗男女皆袒而被髪以吉貝為干澷其王及貴臣乃加雲霞布以覆髀以金繩為絡帶金環貫耳女子則披布以纓絡繞身其國累磚為城重門樓閣王出乗象有幡毦旗鼓罩白盖兵衛甚設國人說立國以来四百餘年後嗣衰弱王族有賢者國人歸向之王聞乃加囚執其鎖無故自脫王以為神不敢加害但逐出境遂奔天竺天竺以為賢妻以長女俄而狼牙脩王死大臣迎還為王二十餘年死子婆伽達多立天監十四年遣使阿撤多奉表婆利婆利梁時通焉在廣州東南海中洲上自交趾浮海南過赤土丹丹國乃至其國去廣州二月日行國界東西五十日行南北二十日行有百二十六聚土氣暑熱如中國之盛夏穀一嵗再熟草木常榮海出文螺紫貝有石名蚶貝羅初採之柔軟刻削為物暴乾之遂大硬海出珊瑚有鳥名舎利解人語其國人皆黑色穿耳附璫披吉貝如帊及為都漫王乃用班絲者以纓絡繞身頭著金長冠高尺餘形如弁綴以七寶之飾帶金装劍偏坐金髙座以銀鐙支足侍女皆為金花雜寶之飾或持白毦拂及孔雀扇王出以象駕輿輿以雜香為之施羽盖珠簾其導從吹螺擊鼓國人善投輪刃其大如鏡中有竅外鋒如鋸逺以投人無不中者其餘兵器與中國畧同俗類真臘物産同於林邑其殺人及盗截其手姦者鎖其足期年而止祭祀必以月晦用盤貯酒肴浮之流水每十一月必設大祭王姓憍陳如自古未通中國問其先及年數不能記自言白浄王夫人是其國女梁天監十六年遣使奉表獻金席等普通三年其王頻伽復遣使珠智獻白鸚鵡青蟲兠鍪琉璃器吉貝羅杯雜香藥等數十種隋大業中又遣使入貢其王姓刹利邪伽名䕶濫郍婆官曰獨訶耶拏次曰獨訶氏拏唐貞觀中亦遣使朝獻云槃槃槃槃宋時通焉在南海大洲中北與林邑隔小海自交州船行四十日至其國其王曰楊栗翨音翅栗翨以上曰楊徳武連以上無得而紀百姓多縁水而居國無城皆豎木為柵王坐金龍牀每坐諸大人皆兩手交抱肩而跽暨九反又其國多有婆羅門自天竺来就王乞財物王甚重之其大臣曰㪍郎索濫次曰崑崙帝也次曰崑崙㪍和胡卧反次曰崑崙㪍帝索甘旦其言崑崙與古龍聲相近故或有謂為古龍者其在外城曰那延猶中夏刺史縣令其矢多以石為鏃矟則以鐵為刃有僧尼寺十所僧尼讀佛經皆肉食而不飲酒亦有道士寺一所道士不食酒肉讀阿修羅王經其國不甚重之俗皆呼僧為比邱呼道士為貪宋元嘉孝建大眀中並遣使貢獻梁中大通元年其王奉表送佛牙及畫塔并獻沈檀等香數十種六年復遣使送菩提國舎利及畫塔菩提樹葉詹糖等香隋大業中亦朝貢於長安赤土赤土隋時通焉扶南之别種也在南海中直崖州之南水行百餘日而達所都土色多赤因以為號東波羅刺國西婆羅娑國南訶羅旦國北拒大海地方數千里其王姓瞿曇氏名利富多塞不知有國近逺稱其父釋王位出家為道傳位於利富多塞在位十六年矣有三妻並鄰國女也居僧祗城有門三重相去各百歩許每門圖畫菩薩飛仙之像懸金花鈴毦婦人數十人或奏樂或捧金花又飾四婦人容飾如佛塔邉金剛力士之狀夹門而立門外者持兵仗門内者執白紼夹道垂素網綴花王宫諸屋悉是重閣北户北面而坐三重之榻衣朝霞布冠金花冠垂雜寶纓絡四女子立侍左右兵衞百餘人王榻後作一木龕以金銀五香木雜鈿之龕後懸一金光熖夹榻又樹二金鏡鏡前並陳金甕甕前各有金香爐當前置一金伏牛前樹一寶盖盖左右皆有寶扇婆羅門等數百人東西重行相向而坐其官薩陁迦羅一人陁挐女除反達义二人迦利宻迦三人共掌政事俱羅末帝一人掌刑法每城置郍邪迦一人鉢帝十人其俗皆穿耳翦髪無跪拜之禮以香油塗身敬佛尤甚婆羅門婦人作髻於項後男女通以朝霞朝雲雜色布為衣豪富之家恣意華靡惟金鎖非王賜不得服用每婚嫁擇吉日女家先期五日作樂飲酒父執女手以授壻七日乃配既娶即分財别居惟少子與父居父母兄弟死則剃髪素服就水上構竹為棚棚内積薪以屍置上燒香建旛吹蠡擊鼓以送火焚薪遂落於水貴賤皆同惟國王燒訖收灰貯以金瓶蔵於廟屋氣候冬夏常温雨多霽少種植無時特宜稻穄白豆黑麻自餘物産多同於交趾以甘蔗作酒雜以紫𤓰根酒色黄赤味頗香美復以椰漿為酒亦皆適口又有雙六雞卜之戱隋煬帝時募能通絶域者大業三年屯田主事常駿虞部主事王君政等請使赤土帝大恱遣齎物五千叚以賜赤土王其年十月駿等自南海郡乗舟晝夜二旬每日遇便風至焦石山而過東南泊陵迦鉢㧞多洲西與林邑相對上有神祠焉又南行至師子石自是島嶼連接又行二三日西望見狼牙脩國之山於是南達雞籠島至於赤土之界其王遣婆羅門鳩摩羅以舶三十艘来迎吹蠡擊鼓以樂隋使進金鎖纜船月餘至其都王遣其子郍邪迦請與駿等禮見先遣人送金盤貯香花并鏡鑷金合二枚貯香油金瓶八枚貯香水白疉布四條以供使者盥洗其日郍邪迦又將象二頭持孔雀盖以迎使人并致金盤金花以藉詔函男女百人奏蠡鼓婆羅門二人導路至王宫駿等奉詔書上閣王以下皆坐宣詔訖引駿等坐奏天竺樂事畢駿等還館又遣婆羅門就館送食以草葉為盤其大方丈因謂駿曰今是大國臣非復赤土國王矣後數日請駿等入宴儀衞導從如初見之禮王前設兩牀牀上並設草葉盤方一丈五尺上有黄白紫赤四色之餅牛羊魚鼈猪瑇瑁之肉百餘品延駿升牀從者於地布席各以金鍾置酒女樂迭奏禮遺甚厚尋遣郍邪迦隨駿等貢方物并獻金芙蓉冠龍腦香以鑄金為多羅葉隐起成文以為表金函封之令婆羅門以香花奏蠡鼓而送之既入海見緑魚羣飛水上浮海十餘日至林邑東南並步浪反山而行其海水色黄氣腥舟行一日不絶舟人云大魚糞也循海北岸達於交趾駿以六年春與郍邪迦於宏農謁帝帝大恱授駿等執㦸都尉郍邪迦等官賞各有差真臘真臘隋時通焉在林邑西南本扶南之屬國也去日南郡舟行六十日而至南接車渠國西有朱江國其王姓刹利名質多斯郍自其祖漸以彊盛至質多斯郍遂兼扶南而有之質多斯郍死子伊奢郍先代立居伊奢郍城郭下二萬餘家城中有一大堂是其王聴政之所總大城三十所城有數千家各有部帥官名與林邑同其王三日一聴朝坐五香七寶牀上施寶帳以文木為竿象牙金鈿為壁狀如小屋懸金光焰有同於赤土前有金香案命二人侍側王著朝霞吉貝縵絡腰腹下垂至頸頭戴金寶花冠被真珠纓絡足履革屣耳懸金璫常服白疉以象牙為屩若露髪則不加纓絡臣下服制大抵相類有五大臣一曰孤落支二曰相髙憑三曰婆何多陵四曰舎摩陵五曰髯羅婁及諸小臣朝於王者輒於階下三稽首王呼上階則跪以兩手抱膊遶王環坐議政事訖跪伏而去階庭門閤侍衞有千餘人被甲持仗其國與参半朱江二國和親數與林邑陁桓二國争戰其人行止皆持兵仗若有攻伐因而用之其俗非王正妻子不得為嗣王初立日所有兄弟並刑殘之或去其一指或劓其鼻皆别處供給不得仕進人形小而色黑婦人亦有白者悉拳髪垂耳性氣㨗勁居處器物頗類赤土以右手為浄左手為穢每旦澡洗以楊枝浄齒讀誦經呪又澡洒乃食食罷還用楊枝浄齒又讀經呪飲食多酥酪沙糖秔粟米餅飲食之時先取雜肉羮與飯相和手摶而食之婚嫁者男女二家各八日不出書夜燃燈不息男婚禮畢即與父母分財别居父母死小􅅜未婚者以餘財與之若婚畢財物入官䘮葬􅅜女皆十日不食剔髪而喪僧尼道士親故皆来聚㑹作音樂送之以五香木燒屍收灰以金銀瓶盛送大水之内貧者或用瓦而以五采畫之亦有不焚屍送之山中任野獸食之其國北多山阜南有水澤地氣尤熱無霜雪饒瘴癘毒蠚宜粱稻少黍粟果菜與日南九真相類異者有婆羅郍娑樹無花葉似柹實似冬𤓰菴羅花葉似棗實似李毗野樹花似木𤓰葉似杏實似楮婆田羅樹花葉實並似棗而小異歌畢佗樹花似林禽葉似榆而厚大實似李其大如升自餘多同九真海中有魚名建同四足無鱗鼻如象吸水上噴髙五六十尺有浮胡魚形似䱉觜如鸚鵡有八足多大魚半身出覩之如山每五六月中毒氣流行即以白猪白牛羊於城西門外祠之不然五榖不登畜多死人疾疫近都有陵迦鉢婆山上有神祠每以兵二千人守衛之城東有神名婆利多祭用人肉其王年别殺人以夜祠禱亦有守衛者千人其敬鬼如此多奉佛法尤信道士佛及道士並立像於館隋大業中遣使貢獻煬帝禮之甚厚唐武徳六年亦奉表貢方物羅刹羅刹隋時通焉在婆利之東其人極陋朱髪黑身獸牙鷹爪時與林邑人作市輙以夜晝日則掩其面煬帝大業三年遣使常駿等使赤土經其國焉投和投和隋時聞焉在南海大洲中真臘之南自廣州西南水行百日至其國王姓投和羅名脯邪迄遥治數城覆屋以瓦並為閣而居屋壁皆彩畫之城内皆王宫室城外人居可萬餘家王宿衞百餘人每臨朝則衣朝霞冠金冠耳掛金鐶頸挂金涎衣足履寶裝皮履官屬有朝請将軍總知國政又有参軍功曹主簿城局金威将軍賛治賛府等官分治文武又有州及郡縣州有参軍郡有金威将軍縣有城局其為長官初至各選官僚助治政事刑法盗賊重者死輕者穿耳及鼻并鑚鬢私鑄銀錢者截腕國無賦稅俱隨意貢奉無多少之限多以農商為業國人乗象及馬一國之中馬不過千匹又無鞍轡惟以繩穿頬為之莭制音樂則吹蠡擊鼓死䘮則祠祀哭泣又焚屍以甖盛之沈於水中若父母之䘮則截髪為孝其國市六所貿易皆用銀錢小如榆英有佛道有學校文字與中夏不同訊其耆老云王無始名齊杖摩其屋以草覆之王所坐榻圓如佛塔以金飾之門皆東開坐亦東向唐貞觀中遣使奉表以金函盛之又獻金榼金釘寶帶犀象海物數十品丹丹丹丹隋時聞焉在羅摩羅國西北振州東南振州與珠崖同島上王姓刹利名尸陵迦治所可二萬餘家亦置州縣以相統領王每晨夕二時臨朝其大臣八人號曰八座並以婆羅門為之王每以香粉塗身冠通天冠挂雜寶纓絡身衣朝霞足履皮履近則乗輿逺則馭象其攻伐則吹蠡擊鼓兼有旛旗其刑法盜賊無多少皆殺之土出金銀白檀蘇方木㯽榔其榖惟稻畜有沙牛羖羊猪雞鵝鴨麞鹿鳥有越鳥孔雀果蓏有蒲萄石榴𤓰瓠菱蓮菜有葱蒜蔓菁邊斗邊斗一云班斗都昆一云都軍拘利一云九雉比嵩皆隋時聞焉自扶南渡金隣大灣南行三千里有此四國其農作與金隣同其人多白色都昆出好棧香藿香及流黄其藿香樹生千嵗根本甚大伐之四五年木皆朽敗惟中節堅固芬香獨存取以為香杜薄杜薄隋時聞焉在扶南東漲海中直渡海數十日而至其國人貌白晳皆有衣服國有稻田女子作白疉華布地出金銀鐵以金為錢出雞舌香可含不入衣服雞舌之為木也氣辛而厲人與禽獸不能近故未有識其樹者華熟自零隨水而出人方得之杜薄洲有十餘國城皆稱王薄剌薄剌隋時聞焉在拘利南海灣中其人色黑而齒白眼赤男女並無衣服㪍焚㪍焚抱朴子云㪍焚洲在南海中薰緑水膠所出膠如楓脂不可多得所以然者正患狤􅠝上音詰下音屈獸害人不敢到其地狤􅠝大者重十斤狀如水獺其頭身及他處了無毛惟從鼻上以竟脊至尾上有毛廣一寸許青毛長三四分其無毛處則如韋囊人張捕得之斬刺不傷積薪烈火束縳之投諸火中薪盡而此獸不焦須以大杖打之皮不傷而骨碎都盡乃死耳火山火山隋時聞焉去諸薄東五千里國中山有火雖雨不息火中有白䑕扶南土俗傳云火洲在馬五洲之東可千餘里春月霖雨雨止則火然洲上林木得雨則皮黑得火則皮白諸左右洲人以春月取其木皮績以為布或作燈炷布若小穢投之火中使潔又有加營國在諸薄國西有山周三百里從四月火生正月火滅火然則草木葉落如中國寒時人以三月至此山取木皮績為浣火布無論無論隋時聞焉在扶南西二千餘里其國有大道左右夹種枇杷樹及諸華果人行其下常有元隂十里一亭亭皆有井俗食麥飯飲蒲萄酒酒如膠若飲即以水和之味甚甘美通志卷一百九十八
