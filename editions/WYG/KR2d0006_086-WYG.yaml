body:
  text: 通志卷七十九上宋右廸功郎鄭樵漁仲撰宗室傳第二後漢四王三侯齊武王縯北海靜王興敬王睦趙孝王良城陽㳟王祉泗水王歙安成孝侯賜成武孝侯順順陽懷侯嘉光武十王東海恭王彊沛獻王輔楚王英濟南安王康東平憲王蒼任城孝王尚阜陵質王延廣陵王荆臨淮懷公衡中山簡王焉琅邪孝王京明帝八王千乘哀王建陳敬王羡彭城靖王恭樂成靖王黨下邳惠王衍梁節王暢淮陽頃王昞濟陰悼王長章和八子千乘貞王伉平春悼王全清河孝王慶濟北惠王夀河間孝王開蠡吾侯翼淑解瀆亭侯城陽懷王淑廣宗殤王萬歲平原懷王勝後漢四王三侯齊武王縯字伯升光武之長兄也性剛毅慷慨有大節自王莽簒漢常憤憤懷復社稷之慮不事家人居業傾身破産交結天下雄俊莽末盜賊羣起南方尤甚伯升召諸豪傑計議曰王莽暴虐百姓分崩今枯旱連年兵革並起此亦天亡之時復髙祖之業定萬世之秋也衆皆然之於是分遣親客使鄧晨起新野光武與李通李軼起於宛伯升自發舂陵子弟合七八千人部署賔客自稱柱天都部使宗室劉嘉往誘新市平林兵王匡陳牧等合軍而進屠長聚及唐子郷殺湖陽尉進拔棘陽因欲攻宛至小長安與王莽前隊大夫甄阜屬正梁邱賜戰時天密霧漢軍大敗姊元弟仲皆遇害宗從死者數十人伯升復收會兵衆還保棘陽阜賜乘勝留輜重於藍鄉引精兵十萬南渡潢淳臨泚水阻兩川間為營絶浮橋示無還心新市平林見漢兵數敗阜賜軍大至各欲解去伯升患之㑹下江兵五千餘人至宜秋乃往為説合從之埶下江從之語在王常傳伯升於是大饗軍士設盟約休卒三日分為六部潛師夜起襲取藍鄉盡獲其輜重明旦漢軍自西南攻甄阜下江兵自東南攻梁邱賜至食時賜陳潰阜軍望見散走漢兵急追之却廹潢淳水斬首溺死者二萬餘人遂斬阜賜王莽納言嚴尤秩宗將軍陳茂聞阜賜敗引欲據宛伯升乃陳兵誓衆焚積聚破釡甑鼓行而前與尤茂遇育陽下戰大破之斬首三千餘級尤茂棄軍走遂進圍宛自號柱天大將軍王莽素聞其名大震懼購伯升邑五萬戶黄金十萬斤位上公使長安中官署及天下鄉亭皆畫伯升像於塾旦起射之百姓自阜賜死後日有降者衆至十萬餘諸將㑹議立劉氏以從人望豪傑咸歸於伯升而新市平林將帥樂放縱憚伯升威明而貪聖公懦弱先共定策立之然後使驛召伯升示其議伯升曰諸將軍幸欲尊立宗室其德甚厚然愚鄙之見竊有未同今赤眉起青徐衆數十萬聞南陽立宗室恐赤眉復有所立如此必將内爭非所以破莽也且首兵倡號鮮有能遂陳勝項籍即其事也舂陵去宛二百里耳未足為功遽自尊立為天下凖的使後人得承吾敝非計之善者也今且稱王以號令若赤眉所立者賢相率而往從之若無所立破莽降赤眉然後舉尊號亦未晩也願各詳思之諸將多曰善將軍張卬拔劍擊地曰疑事無功今日之議不得有二衆皆從之聖公既即位拜伯升為大司徒封漢信侯由是豪傑失望多不服平林後部攻新野不能下新野宰登城言曰得司徒劉公一信願先下及伯升兵至即開城門䧏五月伯升拔宛六月光武破王尋王邑自是兄弟威名益甚更始君臣不自安遂共謀誅伯升乃大會諸將以成其計更始取伯升寳劍視之繡衣御史申屠建隨獻玉玦更始竟不能發及罷㑹伯升舅樊宏謂曰昔鴻門之㑹范增舉玦以示項羽今建此意得無不善乎伯升笑而不應初李軼諂事更始貴將光武深疑之常以戒伯升曰此人不可復信又不受伯升部將宗人劉稷數陷陳潰圍勇冠三軍時將兵擊魯陽聞更始立怒曰本起兵圖大事者伯升兄弟也今更始何為者邪更始君臣聞而心忌之以稷為抗威將軍稷不肯拜更始乃與諸將陳兵數千人先收稷將誅之伯升固爭李軼朱鮪因勸更始并執伯升即日害之伯升有二子章興建武二年立章為太原王興為魯王十一年徙章為齊王十五年追諡伯升為齊武王章少孤光武感伯升功業不就撫育恩愛甚篤以其少貴欲令親吏事故使試守平陰令遷梁郡太守立二十一年薨諡曰哀王子殤王石嗣建武二十七年石始就國三十年封石弟張為下博侯永平十四年封石二子為鄉侯石立二十四年薨子晃嗣下博侯張以善議論十六年與奉車都尉竇固等並出擊匈奴後進者多害其能數被譖愬建初中卒肅宗下詔襃揚之復封張子他人奉其祀晃及弟利侯剛與母太姬宗更相誣告章和元年有司奏請免晃剛爵為庶人徙丹陽帝不忍詔貶晃爵為蕪湖侯削剛户三千遣謁者收晃及太姬璽綬晃立十七年而降爵晃卒子無忌嗣帝以伯升創大業而後嗣罪廢心常愍之時北海亦絶無後及崩遺詔復二國永元二年乃復封無忌為齊王是為惠王立五十二年薨子頃王喜嗣五年薨子承嗣建安十一年國除北海靖王興建武二年封為魯王嗣光武兄仲初南頓君娶同郡樊重女字㛠都性婉順自為童女不正容服不出於房宗族敬焉生三男三女長男伯升次仲次光武長女黄次元次伯姬皇妣以初起兵時病卒宗人樊巨公收歛焉建武二年封黄為湖陽長公主伯姬為寧平長公主元與仲俱殁於小長安追爵元為新野長公主十五年追諡仲為魯哀王興是歲試守緱氏令為人有明略善聽訟甚得名稱遷𢎞農太守亦有善政視事四歲上疏乞骸骨徵還奉朝請二十七年始就國明年以魯國益東海故徙興為北海王三十年封興子復為臨邑侯中元二年又封興二子為縣侯顯宗器重興每有異政輒乘驛問焉二十九年薨子敬王睦嗣睦少好學博通書傳光武愛之數被延納顯宗之在東宫尤見幸待入侍諷誦出則執轡中興初禁網尚濶而睦性謙恭好士千里交結自名儒宿德莫不造門由是聲價益廣永平中法憲頗峻睦乃謝絶賓客放心音樂然性好讀書常為愛翫歲終遣中大夫奉璧朝賀召而謂之曰朝廷設問寡人大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不以實睦曰吁子危我哉此乃孤幼時進趣之行也大夫其對以孤襲爵以來志意衰墯聲色是娛犬馬是好使者受命而行其能屈申若此初靖王薨悉推財産與諸弟車服珍寳皆以為分然後隨以金帛贖之睦能屬文作春秋㫖義終始論及賦頌數十篇又善史書當代以為楷則及寢病帝使驛馬令作草書尺牘十首立十年薨子哀王基嗣永平十八年封基二弟為縣侯二弟為鄉侯建初二年又封基弟毅為平望侯基立十四年薨無子肅宗憐之不除其國永元二年和帝封睦庻子斟鄉侯威為北海王奉睦後立七年威以非睦子又坐誹謗檻車徴詣廷尉道自殺永初元年鄧太后復封睦孫壽光侯普為北海王是為頃王延光二年復封睦少子為亭侯普立七年薨子恭王翼嗣立十四年薨子康王嗣無後建安十一年國除初臨邑侯復好學能文章永平中每有講學事輒令復典掌焉與班固賈逵共述漢史傅毅等皆宗事之復子騊駼及從兄平望侯毅並有才學永寧中鄧太后召毅及騊駼入東觀與謁者僕射劉珍著中興以下名臣列士傳騊駼又自造賦頌書論凡四篇趙孝王良字次伯光武之叔父也平帝時舉孝廉為蕭令光武兄弟早孤良撫循甚篤及光武起兵以事告良良大怒曰汝與伯升志操不同今家欲危亡而反共謀如是既而不得已從軍至小長安漢兵大敗良妻及二子皆被害更始立以良為國三老從入關更始敗良聞光武即位乃亡奔洛陽建武二年封良為廣陽王五年徙為趙王始就國十三年降為趙公頻歲來朝十七年薨于京師凡立十六年子節王栩嗣建武三十年封栩二子為鄉侯建初二年復封栩十子為亭侯栩立四十年薨子頃王商嗣永元三年封商三弟為亭侯元年封商四子為亭侯商立二十三年薨子靖王宏立十二年薨子惠王乾嗣元初五年封乾二弟為亭侯是歲趙相奏乾居父䘮私聘小妻又白衣出司馬門坐削中邱縣時郎中南陽程堅素有志行拜為乾傳輔以禮義乾改悔前過堅列上復所削縣本初元年封乾一子為亭侯乾立四十八年薨子懷王豫嗣豫薨子獻王赦嗣赦薨子珪嗣建安十八年徙封博陵立九年魏初為崇德侯城陽恭王祉字巨伯光武族兄舂陵康侯敞之子也敞曾祖父節侯買以長沙定王子封於零道之舂陵郷為舂陵侯買卒子戴侯熊渠嗣熊渠卒子考侯仁嗣仁以舂陵地埶卑溼山林毒氣上書求減邑内徙元帝初元四年徙封南陽之白水鄉猶以舂陵為國名遂與從弟鉅鹿都尉回及宗族往家焉仁卒子敞嗣敞謙儉好義盡推父時金寳財産與昆弟荆州刺史上其義行拜廬江都尉歲餘㑹族兄安衆侯劉崇起兵王莽畏惡劉氏徴敞至長安免歸國先是平帝時敞與崇俱朝京師助祭明堂崇見莽將危漢室私謂敞曰安漢公擅國權羣臣莫不回從社稷傾覆至矣太后春秋髙天子幼弱髙皇帝所以分封子弟蓋為此也敞心然之及崇事敗敞懼欲結援樹黨乃為祉娶髙陵侯翟宣女為妻㑹宣弟義起兵欲攻莽南陽捕殺宣女祉坐繫獄敞因上書謝罪願率子弟宗族為士卒先莽新居攝欲慰安宗室故不被刑誅及莽簒立劉氏為侯者皆降稱子食孤卿禄後皆奪爵及敞卒祉遂特見廢又不得官為吏社以故侯嫡子行淳厚宗室皆敬之及光武起兵祉兄弟相率從軍王莽前隊大夫甄阜盡收其宗屬繫宛獄及漢兵敗小長安祉挺身還保棘陽甄阜盡殺其母弟妻子更始立以祉為太常將軍紹封舂陵侯從西入關封為定陶王别將擊破劉嬰於臨涇及更始降於赤眉祉乃間行亡奔洛陽是時宗室唯祉先至光武見之歡甚建武二年封為城陽王賜乘輿御物車馬衣服追諡敞為康侯十一年祉疾病上城陽王璽綬願以列侯奉先人祭祀帝自臨其疾祉薨年四十三諡曰恭王竟不之國葬於洛陽之北芒十三年封祉嫡子平為蔡陽侯以奉祉祀平弟堅為髙陽侯初建武二年以皇祖皇考墓為昌陵置陵令守視後改為章陵因以舂陵為章陵縣十八年立考侯康侯廟比園陵置嗇夫詔零陵郡奉祠節侯戴侯廟以四時及臘歲五祠焉置嗇夫佐吏各一人平後坐與諸王交通國除永平五年顯宗更封平為竟陵侯平卒子真嗣真卒子禹嗣禹卒子嘉嗣泗水王歙字經孫光武族父也歙子終與光武少相親愛漢兵起始及唐子終誘殺湖陽尉更始立歙從入關封為元氏王終為侍中及更始敗歙終東奔洛陽建武二年立歙為泗水王終為淄川王十年歙薨封小子燀為堂谿侯奉歙後終居喪哭泣思慕二十餘日亦薨封長子柱為邔侯以奉終嗣又封終子鳯曲陽侯歙從父弟茂年十八漢兵起茂自號劉失職亦聚衆京密間稱厭新將軍攻下潁川汝南衆十餘萬人光武既至河内茂率衆䧏封為中山王十三年宗室為王者皆䧏為侯更封茂為穣侯茂弟匡亦與漢兵俱起建武二年封宜春侯為人謙遜永平中為宗正子浮嗣封朝陽侯浮弟尚永元中為征西將軍浮傳國至孫䕶無子封絶延光中䕶從兄瓌與安帝乳母王聖女伯榮私通遂娶焉因得紹䕶封為朝陽侯位侍中及王聖敗貶爵為亭侯安成孝侯賜字子琴光武族兄也祖父利蒼梧太守賜少孤兄顯報怨殺人吏捕顯殺之賜與顯子信賣田宅同抛財産結客報吏皆亡命逃伏遭赦歸㑹伯升起兵乃隨從攻擊諸縣更始既立以賜為光祿勲封廣漢侯及伯升被害代為大司徒將兵討汝南未及平更始又以信為奮威大將軍代賜擊汝南賜與更始到洛陽更始欲令親近大將徇河北未知所使賜言諸家子獨有文叔可用大司馬朱鮪等以為不可更始狐疑賜深勸之乃拜光武行大司馬持節過河是日以賜為丞相令先入關脩宗廟宫室還迎更始都長安封賜為宛王拜前大司馬使持節鎮撫關東二年春賜就國於宛典將六部兵後赤眉破更始賜所領六部亦稍散畔乃去宛保育陽聞光武即位乃西之武關迎更始妻子將詣洛陽帝嘉賜忠建武二年封為慎侯十三年更增户邑定封為安成侯奉朝請以賜有恩信故親厚之數讌私時幸其第恩賞特異賜輒賑與故舊無有遺積二十八年卒帝為治冡堂起祠置廟吏卒如舂陵孝侯子閔嗣三十年帝復封閔弟嵩為白牛侯坐楚事辭語相連國除閔卒子商嗣徙為白牛侯商卒子昌嗣初信為更始討平汝南因封為汝陰王信遂將兵平定江南據豫章光武即位桂陽太守張隆擊破之信乃詣洛陽降以為汝陰侯永平十三年亦坐楚事國除成武孝侯順字平仲光武族兄也父慶舂陵侯敞同産弟順與光武同里閈少相厚更始即位以慶為燕王順為虎牙將軍更始降赤眉慶為亂兵所殺順乃間行詣光武拜為南陽太守建武二年封成武侯邑戸最大租入倍宗室諸家八年使擊破六安賊因拜為六安太守數年帝欲徴之吏民上書請留十一年卒帝使使者迎䘮親自臨弔子遵嗣遵坐與諸王交通䧏為端氏侯遵卒子弇嗣弇卒無嗣國除永平十年顯宗幸章陵追念舊恩封順弟子三人為鄉侯初順叔父𢎞娶樊氏皇妣之從妹也生二子敏國與母隨更始在長安建武二年詣洛陽光武封敏為甘里侯國為弋陽侯敏通經有行永平初官至越騎校尉𢎞弟梁以俠氣聞更始元年起兵豫章欲徇江東自號就漢大將軍暴病卒順陽懐侯嘉字孝孫光武族兄也父憲舂陵侯敞同産弟嘉少孤性仁厚南頓君養視如子後與伯升俱學長安習尚書春秋及義兵起嘉随更始征伐漢軍之敗小長安也嘉妻子遇害更始即位以為偏將軍及攻破宛封興德侯遷大將軍擊延岑於冠軍降之更始既都長安以嘉為漢中王扶威大將軍持節就國都於南鄭衆數十萬建武二年延岑復反攻漢中圍南鄭嘉兵敗走延岑遂定漢中進兵武都為更始柱功侯李寳所破岑走天水公孫述遣將侯丹取南鄭嘉收散卒得數萬人以寶為相從武都南擊侯丹不利還軍河池下辨復與延岑連戰岑引北入散關至陳倉嘉進擊破之更始鄧王廖湛將赤眉十八萬攻嘉嘉與戰於谷口大破之嘉手殺湛遂到雲陽就榖李寳等聞鄧禹西征擁兵自守勸嘉且觀成敗光武聞之告禹曰孝孫素謹善且少見親愛當是長安輕薄兒誤之耳禹即宣帝㫖嘉乃因來歙詣禹於雲陽三年到洛陽從征伐拜為千乘太守六年病上書乞骸骨徴詣京師十三年封為順陽侯秋復封嘉子廧為黄李侯十五年卒子參嗣有罪削為南鄉侯永平中參為城門校尉參卒子循嗣循卒子章嗣光武十王光武皇帝十一子郭皇后生東海恭王彊沛獻王輔濟南安王康阜陵質王延中山簡王焉許美人生楚王英光烈皇后生顯宗東平憲王蒼廣陵思王荆臨淮懐公衡琅邪孝王京東海恭王彊建武二年立母郭氏為后彊為皇太子十七年而郭后廢彊慼慼不自安數因左右及諸王陳其懇誠願備蕃國光武不忍遲回數歲乃許焉十九年封為東海王二十八年就國帝以彊廢不以過去就有禮故優以大封兼食魯郡合二十九縣賜虎賁旄頭宫殿設鍾虡之縣擬於乘輿彊臨之國數上書譲還東海又因皇太子固辭帝不許深嘉嘆之以彊章宣示公卿初魯恭王好治宫室起靈光殿甚壯麗是時猶存故詔彊都魯中元元年入朝從封岱山因留京師明年春帝崩冬歸國永平元年彊病顯宗遣中常侍鉤盾令將太醫乘驛視疾詔沛王輔濟南王康阜陵王延詣魯及薨臨命上疏謝曰臣䝉恩得備蕃輔特受二國宫室禮樂事事殊異巍巍無量訖無報稱而自修不謹連年被疾為朝廷憂念皇太后陛下哀憐臣彊感動發中數遣使者太醫令丞方伎道術絡繹不絶臣伏惟厚恩不知所言臣内自省視氣力羸劣日夜浸困終不復望見闕庭奉承帷幄孤負重恩銜恨黄泉身既夭命孤弱復為皇太后陛下憂慮誠悲誠慚息政小人也猥當襲臣後必非所以全利之也誠願還東海郡天恩愍哀以臣無男之故處臣三女小國侯此臣宿昔常計今天下新罹大憂惟陛下加供養皇太后數進御餐臣彊困劣言不能盡意願並謝諸王不意永不復相見也帝覽書悲慟從太后出幸津門亭發哀使大司空持節䕶喪事大鴻臚副宗正將作大匠視䘮事贈以殊禮升龍旄頭鸞輅龍旂虎賁百人詔楚王英趙王栩北海王興館陶公主比陽公主及京師親戚四姓夫人小侯皆會葬帝追惟彊深執謙儉不欲厚葬以違其意於是特詔中常侍杜岑及東海傅相曰王謙恭好禮以德自終遣送之物務從約省衣足歛形茅車瓦器物減於制以彰王卓爾獨行之志留將作大匠起陵廟彊立十八年年三十四子靖王政嗣政淫欲薄行後中山簡王薨政詣中山㑹葬私取簡王姬徐妃又盜迎掖庭出女坐削薛縣立四十四年薨子頃王肅嗣永元十六年封肅弟二十一人皆為列侯肅性謙儉循恭王法度永初中以西羌未平上錢二千萬元初中復上縑萬匹以助國費鄧太后下詔襃納焉立二十三年薨子孝王臻嗣永建二年封臻二弟敏儉為鄉侯臻及弟蒸鄉侯儉並有䔍行母卒皆吐血毁眥至服練紅兄弟追念初䘮父幼小哀禮有闕因復重行䘮制臻性敦厚有恩常分租秩賑給諸父昆弟順帝嘉之制詔增臻封五千戸儉五百戸臻立三十一年薨子懿王祗嗣初平中遣子琬至長安奉章獻帝封琬為汶陽侯拜為平原相祗立四十四年薨子羡嗣二十年魏受禪以為崇德侯沛獻王輔建武十五年封右馮翊公十七年郭后廢為中山太后故徙輔為中山王并食常山郡二十年復徙封沛王時禁網尚疏諸王皆在京師競修名譽爭禮四方賓客夀光侯劉鯉更始子也得幸於輔鯉怨劉盆子害其父因輔結客殺盆子兄故式侯恭輔坐繫詔獄三日乃得出自是後諸王賔客多坐刑罰各循法度二十八年就國中元二年封輔子寶為沛侯永平元年封寶弟嘉為僮侯輔矜嚴有法度好經書善説京氏易孝經論語傳及圖䜟作五經論時號之曰沛王通論在國謹節終始如一稱為賢王顯宗敬重數加賞賜立四十六年薨子釐王定嗣元和二年封定弟十二人為鄉侯定立十一年薨子節王正嗣元興元年封正弟二人為縣侯正立十四年薨子孝王廣嗣有固疾安帝詔廣祖母周領王家事周明正有禮法漢安中薨順帝下詔使光祿大夫贈以妃印綬廣立三十五年薨子幽王榮嗣立二十年薨子孝王琮嗣薨子㳟王曜嗣薨子契嗣魏受禪以為崇德侯楚王英以建武十五年封為楚公十七年進爵為王二十八年就國母許氏無寵故英國最貧小三十年以臨淮之取慮須昌二縣益楚國自顯宗為太子時英常獨歸附太子太子特親愛之及即位後數加賞賜永平元年特封英舅子許昌為龍舒侯英少時好游俠交通賔客晩節更喜黄老學為浮屠齋戒祭祀八年詔令天下死罪皆入縑贖英遣郎中令奉黄縑白紈三十匹詣國相曰託在蕃輔過惡累積歡喜天恩奉送縑帛以贖愆罪國相以聞詔報曰王誦黄老之微言尚浮屠之仁祠潔齋三月與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌因以班示諸國中傳英後遂大交通方士作金龜玉鶴刻文字以為符瑞十三年男子燕廣告英與漁陽王平顔忠等造作圗書有逆謀事下案驗有司奏英招聚姦猾造作圖䜟擅相官秩置諸侯王公將軍二千石大逆不道請誅之帝以親親不忍乃廢英徙丹陽涇縣賜湯沭邑五百户遣大鴻臚持節䕶送使伎人奴婢妓士鼓吹悉從得乘輜軿持兵弩行道射獵極意自娛男女為侯主者食邑如故楚太后勿上璽綬留住楚宫明年英至丹陽自殺立三十三年國除詔遣光祿大夫持節弔祠贈賵如法加賜列侯印綬以諸侯禮葬於涇遣中黄門占䕶其妻子悉出楚官屬無辭語者制詔慰譬許太后於是封燕廣為折姦侯楚獄遂至累年其辭語相連自京師親戚諸侯州郡豪傑及考案吏阿附相陷坐死徙者以千數十五年帝幸彭城見許太后及英妻子於内殿悲泣感動左右建初二年肅宗封英子楚侯种五弟皆為列侯並不得置相臣吏民元和三年許太后薨復遣光禄大夫持節弔祠因留䕶䘮事賻錢五百萬又遣謁者備王官屬迎英䘮改葬彭城加王赤綬羽盖華藻如嗣王儀追諡曰楚厲侯章和元年帝幸彭城見英夫人及六子厚加贈賜种後徙封六侯卒子度嗣度卒子拘嗣傳國於後濟南安王康建武十五年封濟南公十七年進爵為王二十八年就國三十年以平原之祝阿安德朝陽平昌隰隂重邱六縣益濟南國中元二年封康子德為東武城侯康在國不循法度交通賓客其後人上書告康招徠州郡姦猾漁陽顔忠劉子産等又多遺其繒帛案圖書謀議不軌事下考有司舉奏之顯宗以親親故不忍窮竟其事但削祝阿隰隂東朝陽安德西平昌五縣建初八年肅宗復還所削地康遂多殖貨財大治宫室奴婢至千四百人廐馬千二百疋私田八百頃奢侈恣欲游觀無節永元初國傅何敞上疏諫康曰盖聞諸侯之義制節謹度然後能保其社稷和其民人大王以骨肉之親享食茅土當施張政令明其典法出入進止宜有期度輿馬臺隸應為科品而今奴婢廐馬皆有千餘增無用之口以自蠶食宫婢閉隔失其天性感亂和氣又多起内第觸犯防禁費以巨萬而功猶未半夫文繁者質荒木勝者人亡皆非所以奉禮承上傳福無窮者也故楚作章華以凶吳興姑蘓而滅景公千駟民無稱今數㳺諸第晨夜無節又非所以逺防未然臨深履薄之法也願大王脩恭儉遵古制省奴婢之口減乘馬之數斥私田之富節游觀之宴以禮起居則敞乃敢安心自保惟大王深慮愚言康素敬重敞雖無所嫌牾然不能改立五十九年薨子簡王錯嗣錯為太子時愛康鼓吹妓女宋閏使醫張尊招之不得錯怒自以劍刺殺尊國相舉奏有詔勿案永元十一年封錯弟七人為列侯錯立六年薨子孝王香嗣永初二年封香弟四人為列侯香篤行好經書初香叔父篤有罪不得封西平昌侯昱坐法失侯香乃上書分爵土封篤子丸昱子嵩皆為列侯香立二十年薨無子國絶永建元年順帝立錯子阜陽侯顯為嗣是為釐王立三年薨子悼王廣嗣永建五年封廣弟文為樂城亭侯廣立二十五年永興元年薨無子國除東平憲王蒼建武十五年封東平公十七年進爵為王蒼少好經書雅有智思為人美須􅛂要帶十圍顯宗甚愛重之及即位拜為驃騎將軍置長史掾史員四十人位在三公上永平元年封蒼子二人為縣侯二年以東郡之夀張須昌山陽之南平陽槀湖陵五縣益東平國是時中興三十餘年四方無虞蒼以天下化平宜脩禮樂乃與公卿議定南北郊冠冕車服制度及光武廟登歌八佾舞數帝每巡狩蒼常留鎮侍衛皇太后四年春車駕近出觀覽城第尋聞當遂校獵河内蒼上書諫止之帝覽奏即還宫蒼在朝數載多所隆益而自以至親輔政聲望日重意不自安乃上疏歸職且言自漢興以來宗室子弟無得在公卿位者願乞上驃騎將軍印綬退就蕃國帝優詔不聽其後數陳乞辭甚懇切五年乃許還國而不聽上將軍印綬以驃騎長史為東平太傅掾為中大夫令史為家郎加賜錢五千萬布十萬疋六年冬帝幸魯徴蒼從還京師明年皇太后崩既葬蒼乃歸國特賜宫人奴婢五百人布二十五萬疋及珍寶服御器物十一年蒼與諸王朝京師月餘還國帝臨送歸宫悽然懐思乃遣使手詔國中傳曰辭别之後獨坐不樂因就車歸伏軾而吟瞻望永依實勞我心誦及采菽以增嘆息日者問東平王處家何等最樂王言為善最樂其言甚大副是要腹矣令送列侯印十九枚諸王子年五歲以上能趨拜者皆令帶之十五年春行幸東平賜蒼錢千五百萬布四萬疋帝以所作光武本紀示之蒼因上光武受命中興頌帝甚喜之以其文典雅特令校書郎賈逵為之訓詁肅宗即位尊重恩禮踰於前世諸王莫與為比建初元年地震蒼上便宜其事留中帝報書嘉之特賜錢五百萬後帝欲為原陵顯節陵起縣邑蒼上䟽言光武皇帝躬履節儉之行深覩始終之分勤勤懇懇以葬制為言故營建陵地具稱古典詔曰無為山陵陂池裁令流水而已孝明皇帝大孝無違奉承貫行至於自所營創尤為儉省謙德之美於斯為盛臣愚以園邑之興始自彊秦古者邱隴且不欲其著明豈况築郭邑建都郛哉上違先帝聖心下造無益之功虛費國用搖動百姓非所以致和氣祈豐年也又以吉凶俗數言之亦不欲無故繕脩邱墓有所興起考之古法則不合稽之時宜則違人求之吉㓙復未見其福陛下履有虞之至性追祖禰之深思然懼左右過議以累聖心臣蒼誠傷二帝純德之美不暢於無窮也帝從而止自是朝廷每有疑政輒驛使諮問蒼悉心以對皆見納用三年帝饗衛士於南宫因從皇太后周行掖庭池閣於是閲隂太后舊時器服愴然動容乃命留五時衣各一襲及常所御衣合五十箧餘悉分布諸王主及子孫在京師者各有差特賜蒼及琅琊王京書曰間饗衞士於南宫因閲隂太后舊時衣服聞於師曰其物存其人亡不言哀而哀自至惟王孝友之德亦豈不然今送光烈皇后假紒帛巾各一及衣一箧可時奉瞻以慰凱風寒泉之思又令後生子孫得見先后衣服之製今魯國孔氏尚有仲尼車輿冠履明德盛者光靈逺也其光武器服中元二年已賦諸國故不復送并遺宛馬一疋血從前􅀈上小孔中出常聞武帝歌天馬霑赤汗今親見其然也頃反虜尚屯將帥在外憂念遑遑未有間寧願王寶精神加供養苦言至戒望之如渇六年冬蒼上疏求朝明年正月帝許之特賜裝錢千五百萬其餘諸王各千萬帝以蒼冐渉寒露遣謁者賜貂裘及太官食服珍果使大鴻臚竇固持節郊迎帝乃親自循行邸第豫設帷牀其錢帛器物無不充備下詔曰禮伯父歸寧乃國詩云叔父建爾元子敬之至也昔蕭相國加以不名優忠賢也况兼親尊者乎其沛濟南東平中山四王讚皆勿名蒼既至升殿乃拜天子親答之其後諸王入宫輒以輦迎至省閣乃下蒼以受恩過禮情不自寧上䟽辭謝帝愈襃貴焉舊典諸王女皆封鄉主乃特封蒼五女為縣公主三月大鴻臚奏遣諸王歸國帝特㽞蒼賜以秘書列僊圖道術祕方至八月飲酎畢有司復奏遣蒼乃許之手詔賜蒼曰骨肉天性誠不以逺近為親踈然數見顔色情重昔時念王乆勞思得還休欲署大鴻臚奏不忍下筆顧受小黄門中心戀戀惻然不能言於是車駕祖送流涕而訣復賜乘輿服御珍寳輿馬錢布以億萬計蒼還國疾病帝馳遣名醫小黄門侍病使者冠蓋不絶於道又置驛馬千里傳問起居明年正月薨詔告中傅封上蒼自建武以來章奏及所作書記賦頌七言别字歌詩並集覽焉遣大鴻臚持節五官中郎將副監䘮及將作使者凡六人令四姓小侯諸國王主悉會詣東平奔䘮賜錢前後一億布九萬疋及葬帝賜策命加錫鑾輅乘馬龍旂九旒虎賁百人以為寵榮蒼立四十五年薨子懐王忠嗣明年帝乃分東平國封忠弟尚為任城王餘五人為列侯忠立十一年薨子孝王敞嗣元和三年行東巡狩幸東平宫帝追念蒼謂其諸子曰思其人至其鄉其處在其人亡因泣下霑襟遂幸蒼陵為陳虎賁鸞輅龍旂以章顯之祠以太牢親拜祠坐哭泣盡哀賜御劍於陵前初蒼歸國驃騎時吏丁牧周栩以蒼敬賢下士不忍去之遂為王家大夫數十年事祖及孫帝聞皆引見於前愍其淹滯且欲揚蒼德美即皆擢拜議郎牧至齊相栩上蔡令永元十年封蒼孫梁為矜陽亭侯敞弟六人為列侯敞䘮母至孝國相陳珍上其行狀永寧元年鄧太后增邑五千戸又封蒼孫二人為亭侯敞立四十八年薨子頃王端嗣立四十七年薨子凱嗣立二十一年至魏受禪以為崇德侯任城孝王尚元和元年封食任城亢父樊三縣立十八年薨子貞王安嗣永元十四年封母弟福為桃鄉侯永初四年封福弟亢為當塗鄉侯安性輕易貪吝數微服出入游觀國中取官屬車馬刀劍下至衛士米肉皆不與直元初六年國相行𢎞奏請廢之安帝不忍以一歲租五分之一贖罪安立十九年薨子節王崇嗣順帝時羌虜數反崇輒上錢帛佐邉費及帝崩復上錢三百萬助山陵用度朝廷嘉而不受立三十一年薨無子國絶延熹四年桓帝立河間孝王子恭為參戸亭侯博為任城王以奉其祀博有孝行䘮母服制如禮增封三千戸立十三年薨無子國絶熹平四年靈帝復立河間貞王孫新昌侯子佗為任城王奉孝王後立四十六年魏受禪以為崇德侯阜陵質王延建武十五年封淮陽公十七年進爵為王二十八年就國三十年以汝南之長平西華新陽扶樂四縣益淮陽國延性驕奢而遇下嚴烈永平中有上書告延與姬兄謝弇及姊館陶主壻駙馬都尉韓光招姦猾作圗䜟祠祭祝詛事下案驗光弇被誅辭所連及死徙者甚衆有司奏請誅延顯宗特加恩徙為阜陵王食二縣延既徙封數懐怨望建初中復有告延與子男魴造逆謀者有司奏請檻車詣廷尉詔獄肅宗不忍致法詔貶爵為阜陵侯食一縣赦魴等罪勿驗使謁者一人監䕶延國不得與吏民通章和元年行幸九江賜延書與車駕㑹夀春帝見延志意衰落形體非故愍然傷之乃下詔復封為阜陵王增封四縣以阜陵下溼徙都夀春加賜錢千萬布萬疋安車一乘夫人諸子賞賜各有差明年入朝立五十一年薨子殤王沖嗣永元二年下詔盡削除前班下延事沖立二年薨無嗣和帝復封沖兄魴是為頃王永元八年封魴弟十二人為鄉亭侯魴立三十年薨子懐王恢嗣延光三年封恢兄弟五人為鄉亭侯恢立十年薨子節王代嗣陽嘉二年封代兄便親為勃遒亭侯代立十四年薨無子國絶建和元年桓帝立勃遒亭侯便親為恢嗣是為恭王立十三年薨子孝王統嗣立八年薨子王赦嗣建安中薨無子國除廣陵思王荆建武十五年封山陽公十七年進爵為王荆性刻急隱害有才能而喜文法光武崩大行在前殿荆哭不哀而作飛書封以方底令蒼頭詐稱東海王彊舅大鴻臚郭況書與彊曰君王無罪猥被斥廢而兄弟至有束縛入牢獄者太后失職别守北宫及至年老逺斥居邊海内深痛觀者鼻酸及太后尸柩在堂洛陽吏以次捕斬賔客至有一家三尸伏堂者痛莫甚矣今天下有䘮弓弩張設甚備間梁松勑虎賁史曰吏以便宜見非勿有所拘封侯難再得也郎官竊悲之為王寒心累息今天下爭欲思刻賊王以求功寧有量邪若歸并二國之衆可聚百萬君王為之主鼓行而前易於太山破雞子輕於四馬載鴻毛此湯武兵也今年軒轅星有白氣星家及喜事者皆云白氣者䘮軒轅女主之位又太白前出西方至午兵當起又太子星色黑至辰日輒變赤夫黑為病赤為兵王努力卒事髙祖起亭長陛下興白水何況於王陛下長子故副主哉上以求天下事必舉下以雪除沈沒之耻報死母之讐精神所加金石為開當為秋霜無為檻羊雖欲無檻羊又可得乎竊見諸相工言王貴天子法也人主崩亡閭閻之伍尚為盜賊欲有所望何况王邪夫受命之君天之所立不可謀也今新帝人之所置彊者為右願君王為髙祖陛下所志無為扶蘇將閭呌呼天也彊得書惶怖即執其使封書上之顯宗以荆母弟祕其事送荆出止河南宫時西羌反荆不得志冀天下因羌驚動有變私迎能為星者與謀議帝聞之乃徙封荆廣陵遣之國其後荆復呼相工謂曰我貌類先帝先帝三十得天下我今亦三十可起兵未相者詣吏告之荆惶恐自繫獄帝復加恩不考極其事下詔不得臣屬吏民唯食租如故使相中尉謹宿衛之荆猶不改其後使巫祭祀祝詛有司奏請誅之荆自殺立二十九年薨帝憐傷之賜諡曰思王十四年封荆子元夀為廣陵侯服王璽綬食荆故國六縣又封元夀弟三人為鄉侯明年帝東廵狩徴元夀兄弟㑹東平宫班賜御服器物又取皇子輿馬悉以與之建初七年肅宗詔元夀兄弟與諸王俱朝京師元夀卒子商嗣商卒子條嗣傳國于後臨淮懐公衡建武十五年立未及進王爵而薨無子國除中山簡王焉建武十五年封左馮翊公十七年進爵為王焉以郭太后少子故獨留京師三十年徙封中山王永平二年冬諸王來㑹辟雍事畢歸蕃詔焉與俱就國從以虎賁官騎焉上䟽辭譲顯宗詔勿辭帝以焉郭太后偏愛特加恩寵獨得往來京師十五年焉姬韓序有過焉縊殺之國相舉奏坐削安險縣元和中肅宗復以安險還中山立五十二年永元二年薨自中興至和帝時皇子始封薨者皆賻錢三千萬布萬疋嗣王薨賻錢千萬布三萬疋是時竇太后臨朝竇憲兄弟擅權太后及憲等東海出也故睦於焉而重於禮加賻錢一億詔濟南東海二王皆會大為脩冡塋開神道平夷吏民冡墓以千數作者萬餘人發恒山鉅鹿涿郡柏黄腸雜木三郡不能備復調餘州郡工徒及送致者數千人凡徴發揺動六州十八郡制度餘國莫及子夷王憲嗣永元四年封憲弟十一人為列侯憲立二十二年薨子孝王𢎞嗣永寧元年封𢎞二弟為亭侯𢎞立二十八年薨子穆王暢嗣永和六年封暢弟荆為南鄉侯暢立三十四年薨子節王稚嗣無子國除琅邪孝王京建武十五年封琅邪公十七年進爵為王京性恭孝好經學顯宗尤愛幸恩寵殊異永平二年以太山之蓋南武陽華東萊之昌陽盧鄉東牟六縣益琅邪五年乃就國光烈皇后崩帝悉以太后遺金寶賜京京都莒好脩宫室窮極伎巧殿館壁帶皆飾以金銀數上詩賦頌德帝嘉美之下之史官京國中有城陽景王祠吏民奉祠神數下言宫中多不便利京上書願徙宫開陽以華蓋南武陽厚邱贛榆五縣易東海之開陽臨沂肅宗許之立三十一年薨葬東海即邱廣平亭有詔割亭屬開陽子夷王宇嗣建初七年封宇弟十三人為列侯元和元年封孝王孫二人為列侯宇立二十年薨子恭王夀嗣永初元年封夀弟八人為列侯立十七年薨子貞王尊嗣延光二年封尊弟四人為鄉亭侯尊立十八年薨子安王㨿嗣永和五年封據弟三人為鄉亭侯據立四十七年薨子順王容嗣初平元年遣弟邈至長安奉章貢獻帝以邈為九江太守封陽都侯容立八年薨國絶初邈至長安盛稱東郡太守曹操忠誠於帝操以此德邈建安十二年復立容子熙為王在位十一年坐謀欲過江被誅國除明帝八王孝明皇帝九子賈貴人生章帝陰貴人生梁節王暢餘七王不載母氏千乘哀王建永平三年封明年薨年少無子國除陳敬王羡永平三年封廣平王建初三年有司奏請羡與鉅鹿王恭樂成王黨俱就國肅宗性篤愛不忍與諸王乖離遂皆留京師明年案輿地圖令諸國戸口皆等租入歲各八千萬羡博渉經書有威嚴與諸儒講論於白虎殿七年帝以廣平在北多有邊費乃徙羡為西平王分汝南八縣為國及帝崩遺詔徙封為陳王食淮陽郡其年就國立三十七年薨子思王鈞嗣鈞立多不法遂行天子大射禮性隱賊喜文法國相二千石不與相得者輒陰中之憎怨敬王夫人李儀等永元十一年遂使客隗久殺儀家屬吏捕得久繫長平獄鈞欲斷絶辭語復使結客簒殺久事發覺有司舉奏鈞坐削西華項新陽三縣十二年封鈞六弟為列侯後鈞取掖庭出女李嬈為小妻復坐削圉宜祿扶溝三縣永初七年封敬王孫安國為耕亭侯鈞立二十一年薨子懐王竦嗣立二年薨無子國絶永寧元年立敬王子安夀亭侯崇為陳王是為頃王立五年薨子孝王承嗣承薨子愍王寵嗣熹平二年國相師遷追奏前相魏愔與寵共祭天神希幸非冀罪至不道有司奏遣使者案驗是時新誅勃海王悝靈帝不忍復加法詔檻車傳送愔遷詣北寺詔獄使中常侍王酺與尚書令侍御史雜考愔辭與王共祭黄老君求長生福而已無他冀幸酺等奏愔職在匡正而所為不端遷誣告其王罔以不道皆誅死有詔赦寵不案寵善弩射十發十中中皆同處中平中黄巾賊起郡縣皆棄城走寵有彊弩數千張出軍都亭國人素聞王善射不敢反叛故陳獨得完百姓歸之者衆十餘萬及獻帝初義兵起寵率衆屯陽夏自稱輔漢大將軍國相駱俊素有威㤙時天下飢荒鄰郡人多歸就之俊傾財賑贍並得全活袁術求糧於陳而俊拒絶之術忿恚遣客詐殺俊及寵陳由是破敗是時諸國無復租祿而數見虜奪并日而食轉死溝壑者甚衆夫人姬妾多為丹陵兵烏桓所掠云彭城靖王恭永平九年賜號靈夀王十五年封為鉅鹿王建初三年徙封江陵王改南郡為國元和二年三公上言江陵在京師正南不可以封乃徙為六安王以廬江郡為國肅宗崩遺詔徙封彭城王食楚郡其年就國恭敦厚威重吏民敬愛之永初六年封恭子阿奴為竹邑侯元初三年恭以事怒子酺酺自殺國相趙牧以狀上因誣奏恭祠祀惡言大逆不道有司奏請誅之恭上書自訟朝廷以其素著行義令考實無徴收坐下獄㑹赦免死恭立四十六年薨子考王道嗣元初五年封道弟三人為鄉侯恭孫順為東安亭侯道立二十八年薨子頃王定嗣本初元年封定兄弟九人皆為亭侯定立四年薨子孝王和嗣和性至孝又敬賢樂施國中愛之初平中天下大亂和為賊昌務所攻避奔東阿後得還國立六十四年薨孫祗嗣立七年魏受禪以為崇德侯樂成靖王黨永平九年賜號重熹王十五年封樂成王黨性聰慧善史書喜正文字與肅宗同年尤相親愛建初四年以清河之游觀津勃海之東光成平涿郡之中水饒陽安平南深澤八縣益樂成國及帝崩其年就國黨急刻不遵法度舊禁宫人出嫁不得適諸國有故掖庭技人哀置嫁為男子章初妻黨召哀置入宫與通初欲上書告之黨恐懼乃密賂哀置姊焦使殺初事發覺黨乃縊殺内侍三人以絶口語又取中山簡王傅婢李羽生為小妻永元七年國相舉奏之和帝詔削東光鄡二縣立二十五年薨子哀王崇嗣立二月薨無子國絶明年和帝立崇兄修侯廵為樂成王是為釐王立十五年薨子隱王賓嗣立八年薨無子國絶明年復立濟北惠王子萇為樂成王後萇到國數月驕淫不法愆過累積冀州刺史與國相舉奏萇罪至不道安帝詔貶萇爵為臨湖侯延光元年以河間孝王子得嗣靖王後以樂成比廢絶故改國曰安平是為安平孝王立三十年薨子續立中平元年黄巾賊起為所刦質囚于廣宗賊平復國其年秋坐不道被誅立三十四年國除下邳惠王衍永平十五年封衍有容貌肅宗即位常在左右建初初冠詔賜衍師傅以下官屬金帛各有差四年以臨淮郡及九江之鍾離當塗東城歴陽全椒合十七縣益下邳國帝崩其年就國衍後病荒忽而太子卬有罪廢諸姬爭欲立子為嗣連上書相告言和帝憐之使彭城靖王恭至下邳正其嫡庶立子成為太子衍立五十四年薨子貞王成嗣永建元年封成兄二人及惠王孫二人皆為列侯成立二年薨子愍王意嗣陽嘉元年封意弟八人為鄉亭侯中平元年意遭黄巾棄國走賊平復國數月薨立五十七年年九十子哀王宜嗣數月薨無子建安十一年國除梁節王暢永平十五年封為汝南王母隂貴人有寵暢尤被愛幸國土租入倍於諸國肅宗立緣先帝之意賞賜恩寵甚篤建初二年封暢舅陰棠為西陵侯四年徙為梁王以陳留之郾寧陵濟陰之薄單父巳氏成武凡六縣益梁國帝崩其年就國暢性聰慧然少貴驕頗不遵法度歸國後數有惡夢從官卞忌自言能使六丁善占夢暢數使卜筮又暢乳母王禮等因此自言能見鬼神遂共占氣祠祭求福忌等諂媚云神言王當為天子暢心喜與相應答永元五年豫州刺史梁相舉奏暢不道考訊辭不服有司請徴暢詣廷尉詔獄和帝不許有司重奏除暢國徙九真帝不忍但削成武單父二縣暢慙懼上䟽謝罪乞裁食睢陽榖熟虞䝉寧陵五縣還餘所食四縣放遣姬妾節量僮僕其所受虎賁官騎及諸工技鼓吹蒼頭奴婢兵弩廐馬皆上還本署請得自新詔報不許暢固譲章數上卒不聽立二十七年薨子恭王堅嗣永元十六年封堅弟二人為鄉亭侯堅立二十六年薨子懐王匡嗣永建二年封匡兄弟七人為鄉亭侯匡立十一年薨無子順帝封匡弟孝陽亭侯成為梁王是為夷王立二十九年薨子敬王元嗣立十六年薨子彌嗣立四十年魏受禪以為崇德侯淮陽頃王昞永平五年封常山王建初四年徙為淮陽王以汝南之新安西華益淮陽國立十六年薨未及立嗣永元二年和帝立昞小子側復為恒山王奉昞後是為殤王立十三年薨父子皆未之國並葬京師側無子其月立兄防子侯章為恒山王和帝憐章早孤數加賞賜延平元年就國立二十五年薨是為靖王子頃王儀嗣永建二年封儀兄二人為亭侯儀立十七年薨子節王豹嗣永嘉元年封豹兄四人為亭侯豹立八年薨子暠嗣三十二年遭黄巾賊棄國走建安十一年國除濟隂悼王長永平十五年封建初四年以東郡之離狐陳留之長垣益濟隂國立十三年薨于京師無子國除高峻曰明帝慈仁親親篤睦凡諸王驕貴多不遵法度反逆不道皆不忍加刑但削國而已由以輔車義重骨肉恩深者矣中興已後犯法未有誅者章和八子孝章皇帝八子宋貴人生清河孝王慶梁貴人生和帝申貴人生濟北惠王夀河間孝王開餘不載母氏平原懐王勝和帝子也亦不載母氏千乘貞王伉建初四年封和帝即位以伉長兄甚見尊禮立十五年薨子寵嗣一名伏胡永元七年改國名樂安立二十八年薨是為夷王父子皆薨于京師子鴻嗣安帝崩始就國鴻生質帝質帝立梁太后下詔以樂安國土卑溼租委鮮薄改鴻封勃海王立二十六年薨是為孝王無子太后立桓帝弟蠡吾侯悝為勃海王奉鴻嗣延熹八年悝謀為不道有司請廢之帝不忍乃貶為廮陶王食一縣悝後因中常侍王甫求復國許謝錢五千萬帝臨崩遺詔復為勃海王悝知非甫功不肯還謝錢甫怒陰求其過初迎立靈帝道路流言悝恨不得立欲鈔徴書而中常侍鄭颯中黄門董騰並任俠通剽輕數與悝交通王甫司察以為有姦密告司𨽻校尉叚熲熹平元年遂收颯送北寺獄使尚書令廉忠誣奏颯等謀迎立悝大逆不道遂詔冀州刺史收悝考實又遣大鴻臚持節與宗正廷尉之勃海迫責悝悝自殺妃妾十一人子女七十人伎女二十四人皆死獄中傅相以下以輔導王不忠悉伏誅悝立二十五年國除衆庻莫不憐之平春悼王全以建初四年封其年薨葬于京師無子國除清河孝王慶母宋貴人貴人宋昌八世孫扶風平陵人也父楊以恭孝稱於鄉閭不應州郡之命楊姑即明德馬后之外祖母也馬后聞楊二女皆有才色迎而訓之永平末選入太子宫甚有寵肅宗即位並為貴人建初三年大貴人生慶明年立為皇太子徴楊為議郎襃賜甚渥貴人長於人事供奉長樂宫身執饋饌太后憐之太后崩後竇皇后寵盛以貴人姊妹並幸慶為太子心内惡之與母比陽主謀䧟宋氏外令兄弟求其纖過内使宧者偵伺得失後於掖庭門邀遮得貴人書云病思生莵令家求之因誣言欲作蠱道祝詛以莵為厭勝之術日夜毁譖貴人母子遂漸見䟽慶出居承禄觀數月竇后諷掖庭令誣奏前事請加驗實七年帝遂下詔廢慶而立梁貴人子肇為皇太子遂出貴人姊妹置丙舍使小黄門蔡倫考實之皆承諷旨傅致其事乃載送暴室二貴人同時飲藥自殺帝猶傷之敕掖庭令葬於樊濯聚於是免楊歸本郡郡縣因事復捕繫之楊友人前懐令山陽張峻左馮翊沛國劉均等奔走解釋得以免罪楊失志憔悴卒於家慶時雖幼而知避嫌畏禍言不敢及宋氏帝更憐之勅皇后令衣服與太子齊等太子特親愛慶入則共室出則同輿及太子即位是為和帝待慶尤渥諸王莫得為比常共議私事後慶以長别居丙舍永元四年帝移幸北宫章德殿講白虎觀慶得入省宿止帝將誅竇氏欲得外戚傳懼左右不敢使乃令慶私從千乘王求夜獨内之又令慶傳語中常侍鄭衆求索故事及大將軍竇憲誅慶出居邸賜奴婢三百人輿馬錢帛帷帳珍寶玩好充仞其第又賜中傅以下至左右錢帛各有差慶多被病或時不安帝朝夕問訊進膳藥所以垂意甚備慶小心恭孝自以廢黜尤畏事慎法每朝謁陵廟常夜分嚴裝衣冠待明約敕官屬不得與諸王車騎競驅常以貴人葬禮有闕每竊感恨至四節伏臘輒祭於私室竇氏誅後始使乳母於城北遥祠及竇太后崩慶求上冢致哀帝許之詔太官四時給祭具慶垂涕曰生雖不獲供養終得奉祭祀私願足矣欲求作祠堂恐有自同恭懐梁后之嫌遂不敢言常泣向左右以為没齒之恨後上言外祖母王年老遭憂病下土無醫藥願乞詣洛陽療疾於是詔宋氏悉歸京師除慶舅衍俊蓋暹等皆為郎十五年有司以日食陰盛奏遣諸王侯就國詔曰甲子之異責由一人諸王幼穉早離顧復弱冠相育常有蓼莪凱風之哀選懦之恩知非國典且復須留至冬從祠章陵詔假諸王羽林騎各四十人後中尉衛訢私為臧盗千餘萬詔使案理之并責慶不舉之狀慶曰訢以師傅之尊選自聖朝臣愚唯知言從事聼不甚有所糾察帝嘉其對悉以訢臧財賜慶及帝崩慶號泣前殿嘔血數升因以發病明年諸王就國鄧太后特聽清河王置中尉内史賜什物皆取乘輿上御以宋衍等並為清河中大夫鄧太后以殤帝襁抱逺慮不虞留慶長子祐與嫡母耿姬居清河邸至秋帝崩立祐為嗣是為安帝太后使中黄門送耿姬歸國帝所生母左姬字小娥小娥姊字大娥犍為人初伯父聖坐妖言伏誅家屬沒官二娥數歲入掖庭及長並有才色小娥善史書喜辭賦和帝賜諸王宫人因入清河第慶初聞其美賞傅母以求之又後幸愛極盛姬妾莫比姊妹皆卒葬於京師慶立凡二十五年乃歸國其年病篤謂宋衍等曰清河埤薄欲乞骸骨於貴人冡傍下棺而已朝廷大恩猶當應有祠室庶母子并食魂靈有所依庇死復何恨乃上書太后曰臣國土下溼乞骸骨下從貴人於樊濯雖歿且不朽今口目尚能言視冒昧干請命在呼吸願䝉哀憐遂薨年二十九遣司空持節與宗正奉弔祭又使長樂謁者僕射中謁者二人副䕶喪事賜龍旗九旒虎賁百人儀比東海恭王太后使掖庭丞送左姬䘮與王合葬廣邱子愍王虎威嗣永初元年太后封宋衍為盛鄉侯分清河為二國封慶少子常保為廣川王子女十一人皆為鄉公主食邑奉明年常保薨無子國除虎威立三年薨亦無子鄧太后復立樂安王寵子延平為清河王是為恭王太后崩有司上言清河孝王至德淳懿載育聖明承天奉祚為郊廟主漢興髙皇帝尊父為太上皇宣帝號父為皇考序昭穆置園邑太宗之義舊章不忘宜上尊號曰孝德皇皇妣左氏曰孝德后孝德皇母宋貴人追諡曰敬隠后乃告祠高廟使司徒持節與大鴻臚奉策書璽綬清河追上尊號又遣中常侍奉太牢祠典護禮儀侍中劉珍等及宗室列侯皆往㑹事尊陵曰甘陵廟曰昭廟置令丞設兵車周衛比章陵復以廣川益清河國尊耿姬為甘陵大貴人又封女弟侍男為湼陽長公主别得為舞陰長公主餘七主並早卒故不及進爵追贈敬隠后女弟小貴人印綬追封諡宋楊為當陽穆侯楊四子皆為列侯食邑各五千戸宋氏為卿校侍中大夫謁者郎吏十餘人孝德后異母弟次及達生二人諸子九人皆為清河國郎中耿貴人者牟平侯舒之孫也貴人兄寶襲封牟平侯帝以寶嫡舅寵遇甚渥位至大將軍事以見耿舒傳立三十五年薨子蒜嗣沖帝崩徴蒜詣京師將議為嗣㑹大將軍梁冀與梁太后立質帝罷歸國蒜為人嚴重動止有度朝臣太尉李固等莫不歸心焉初中常侍曹騰謁蒜蒜不為禮宧者由此惡之及帝崩公卿皆正議立蒜而曹騰説梁冀不聽遂立桓帝語在李固傳蒜由此得罪建和元年甘陵人劉文與南郡妖賊劉鮪交通訛言清河王當統天下欲共立蒜事發覺文等遂劫清河相謝暠將至王宫司馬門曰當立王為天子暠為公暠不聽罵之文因刺殺暠於是捕文鮪等誅之有司因劾奏蒜坐貶爵為尉氏侯徙桂陽自殺立三年國絶梁冀惡清河名乃改為甘陵梁太后立安平孝王子經侯理為甘陵王奉孝德皇祀是為威王理立二十五年薨子貞王定嗣定立四年薨子獻王忠嗣黄巾起忠為國人所執既而釋之靈帝詔復忠國忠立十三年薨嗣子為黄巾所害建安十一年以無子國除濟北惠王夀母申貴人潁川人也世吏二千石貴人年十三入掖庭夀以永元二年封分太山郡為國和帝遵肅宗故事兄弟皆留京師恩寵篤密有司請遣諸王歸藩不忍許之及帝崩乃就國永初元年鄧太后封夀舅申轉為新亭侯夀立三十一年薨自永初以後戎狄叛亂國用不足始封王薨減賻錢為千萬布萬疋嗣王薨五百萬布五千疋時惟夀最尊親特賻錢三千萬布三萬匹子節王登嗣永寧元年封登弟五人為鄉侯皆别食太山邑登立十五年薨子哀王多嗣多立三年薨無子永和四年立戰鄉侯安國為濟北王是為釐王安國立十年薨子孝王次嗣本初元年封次弟猛為亭侯次九歲䘮父至孝建和元年梁太后下詔襃稱之增封五千戸次立七年薨子鸞嗣鸞薨子政嗣政薨無子建安十一年國除河間孝王開以永元二年封分樂成勃海涿郡為國延平元年就國開遵奉法度吏民敬之永寧元年鄧太后封開子翼為平原王奉懐王勝祀子德為安平王奉樂成王黨祀開立四十二年薨子惠王政嗣政慠佷不奉法憲順帝以侍御史吳郡沈景有彊能稱故擢為河間相景到國謁王王不正服箕踞殿上侍郎贊拜景峙不為禮問王所在虎賁曰是非王邪景曰王不服與常人何别今相謁王豈謁無禮者邪王慙而更服景然後拜出住宫門外請王傅責之曰前發京師陛下見受詔以王不恭使相檢督諸君空受爵禄而無訓導之義因奏治罪詔書譲政而詰責傅景因捕諸姦人上案其罪殺戮尤惡者數十人出寃獄者百餘人政為改節悔過自修陽嘉元年封政弟十三人皆為亭侯政立十年薨子貞王建嗣建立十年薨子安王利嗣利立二十八年薨子陔嗣陔立四十一年薨魏受禪以為崇德侯蠡吾侯翼元初六年鄧太后召濟北河間王諸子詣京師竒翼美儀容故以為平原懐王後焉留在京師歳餘太后崩安帝乳母王聖與中常侍江京等譖鄧隲兄弟及翼云與中大夫趙王謀圖不軌闚覦神器懐大逆心貶為都鄉侯遣歸河間翼於是謝絶賓客閉門自處永建五年父開上書願分蠡吾縣以封翼順帝從之翼卒子志嗣為大將軍梁冀所立是為桓帝梁太后詔追尊河間孝王為孝穆皇夫人趙氏曰孝穆后廟曰清廟陵曰樂成陵蠡吾先侯曰孝崇皇廟曰烈廟陵曰博陵皆置令丞使司徒持節奉䇿書璽綬祠以太牢建和二年更封帝兄都鄉侯碩為平原王留博陵奉翼後尊翼夫人馬氏為孝崇博園貴人以涿郡之良鄉故安河間之蠡吾三縣為湯沐邑碩嗜酒多過失帝令馬貴人領王家事建安十一年國除解瀆亭侯淑以河間孝王子封淑卒子長嗣長卒子宏嗣為大將軍竇武所立是為靈帝建寧元年竇太后詔追尊皇祖淑為孝元皇夫人夏氏曰孝元后陵曰敦陵廟曰靖廟皇考長為孝仁皇夫人董氏為慎園貴人陵曰慎陵廟曰奐廟皆置令丞使司徒持節之河間奉䇿書璽綬祠以太牢常以歲時遣中常侍持節之河間奉祠熹平三年使使拜河間安王利子康為濟南王奉孝仁皇祀康薨子贇嗣建安十二年為黄巾所害子開嗣立十三年魏受禪以為崇德侯城陽懐王淑以永元三年封分濟隂為國立五年薨葬於京師無子國除還并濟陰廣宗殤王萬歲以永元二年封分鉅鹿為國其年薨葬於京師無子國除還并鉅鹿平原懐王勝和帝長子也少有痼疾延平元年封立八年薨葬於京師無子鄧太后立樂安夷王寵子得為平原王奉勝後是為哀王六年薨無子永寧元年太后又立河間孝王開子都鄉侯翼為平原王嗣安帝廢之國除通志卷七十九上
