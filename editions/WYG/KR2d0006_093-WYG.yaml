body:
  text: 通志卷八十三下宋右廸功郎鄭樵漁仲撰宗室傳第六下梁武帝八男昭明太子統子歡子棟歡譽豫章王綜南康簡王績子會理理通理義廬陵威王續子應邵陵􅂝王綸子堅確武陵王紀子圓照肅圓正圓簡文諸子哀太子大器尋陽王大心臨川王大欵南海王大臨南郡王大連安陸王大春桂陽王大成汝南王大封瀏陽公大雅新興王大莊西陽王大鈞武寧王大威皇子大訓建平王大球義安王大昕綏建王大摯樂良王大圜元帝諸子忠烈世子方等貞惠世子方諸愍懷太子方矩始安王方略陳永修侯擬遂興侯詳宜黃侯慧紀衡陽獻王昌子伯信南康愍王曇朗子方泰萬方慶鄭頃文帝諸子始興王伯茂鄱陽王伯山新安王伯固晉安王伯恭廬陵王伯仁江夏王伯義武陵王伯禮永陽王伯智桂陽王伯謀宣帝諸子始興王叔陵豫章王叔英長沙王叔堅建安王叔卿宜都王叔明河東王叔獻新蔡王叔齊晉熙王叔文淮南王叔彪始興王叔重尋陽王叔儼岳陽王叔慎義陽王叔達巴山王叔雄武昌王叔虞湘東王叔平臨賀王叔敖陽山王叔宣西陽王叔穆南安王叔儉南郡王叔澄沅陵王叔興岳山王叔韶新興王叔純巴東王叔謨臨海王叔顯新會王叔坦新寧王叔隆新昌王叔榮太原王叔匡後主諸子太子深吳興王允南平王嶷永嘉王彦南海王䖍信義王祗邵陵王兢會稽王莊東陽王恮吳郡王藩錢唐王恬梁武帝八男武帝八男丁貴嬪生昭明太子統簡文皇帝廬陵威王續阮修容生孝元皇帝吳淑媛生豫章王綜董昭儀生南康簡王績丁充華生邵陵擕王綸葛修容生武陵王紀昭明太子統字徳施小字維摩武帝長子也以齊中興元年九月生于襄陽武帝既年垂彊仕方有冢嗣時徐元瑜降又荆州使至云蕭頴胄暴卒時人謂之三慶少日而建業平識者知天命所集天監元年十一月立為皇太子時年幼依舊居於内拜東宫官屬文武皆入直永福省五年五月庚戌出居東宫太子生而聰叡三歲授孝經論語五歲徧讀五經悉通諷誦性仁孝自出宫常思戀不樂帝知之每五日一朝多使留永福省或五日三日乃還宫八年九月於壽安殿講孝經盡通大義講畢親臨釋奠于國學年十二於内省見獄官將讞事問左右曰是皂衣何為者曰廷尉官屬召視其書曰是皆可念我得判否有司以統幼紿之曰得其獄皆刑罪以上統皆署杖五十有司抱具獄不知所為具言於帝帝笑而從之自是數使聽訟每有欲寛縱者即使太子决之建康縣讞誣人誘口獄翻縣以太子仁愛故輕當杖四十令曰彼若得罪便合家孥戮今縱不以其罪罪之豈可輕罰而已可付治十四年正月朔旦帝臨軒冠太子於太極殿舊制太子著遠游冠金蟬翠緌纓至是詔加金博山太子美姿容善舉止讀書數行並下過目皆憶每遊宴祖道賦詩至十數韻或作劇韻皆屬思便成無所㸃易帝大𢎞佛教親自講說太子亦素信三寶徧覽衆經乃於宫内别立慧義殿專為法集之所招引名僧自立三諦法義普通元年四月甘露降于慧義殿咸以為至徳所感時俗稍奢太子欲以己率物服御朴素身衣浣衣膳不兼肉三年十一月始興王憺薨舊事以東宫禮絶傍親書翰並依常儀太子以為疑命僕射劉孝綽議其事孝綽議曰按張鏡東宫儀記稱三朝發哀者踰月不舉樂鼓吹寢奏服限亦然尋傍絶之義義在去服服雖可奪情豈無悲鐃歌輙奏良亦為此既有悲情宜稱兼慕卒哭之後依常舉樂稱悲竟此理例相符謂猶應兼慕請至卒哭僕射徐勉左率周捨家令陸襄並同孝綽議太子令曰張鏡儀記云依士禮終服月稱慕悼又云凡三朝發哀者踰月不舉劉僕議云傍絶之義義在去服服雖可奪情豈無悲卒哭之後依常舉樂稱悲竟此理例相符尋情悲之說非止卒哭之後緣情為論此自難一也用張鏡之舉樂棄張鏡之稱悲一鏡之言取捨有異此自難二也陸家令止云多歴年所恐非事證雖復累稔所用意常未安近亦嘗以此問外由來立意謂猶應有慕悼之言張豈不以舉樂為大稱悲事小所以用小而忽大良亦有以至如元正六佾事為國章雖情或未安而禮不可廢鐃吹軍樂比之亦然書疏方之事則成小差可緣心聲樂自外書疏自内樂自他書自己劉僕之議即情未安可令諸賢更共詳衷司農卿明山賔歩兵校尉朱异議稱慕悼之辭宜終服月於是付典書遵用以為永凖七年十一月貴嬪有疾太子還永福省朝夕侍疾衣不解帶及薨歩從喪還宫至殯漿水不入口每哭輒慟絶武帝勑中書舍人顧協宣㫖曰毁不滅性聖人之制不勝喪比於不孝有我在那得自毁如此可即强進飲粥太子奉勑乃進數合自是至葬日進麥粥一升武帝又勑曰聞汝所進過少轉就羸瘦我比更無餘病政為汝如此胸中亦填塞成疾故應彊加饘粥不使我恒爾懸心雖屢奉勑勸逼終喪日止一溢不嘗菜果之味體素壯腰帶十圍至是減削過半每入朝士庶見者莫不下泣太子自加元服帝便使省萬機内外百司奏事者填塞於前太子明於庶事每所奏謬誤巧妄皆即辯析示以可否徐令改正未嘗彈糾一人平斷法獄多所全宥天下皆稱仁性寛和容衆喜愠不形於色引納才學之士賞愛無倦恒自討論墳籍或與學士商𣙜古今繼以文章著述率以為常于時東宫有書幾三萬卷名才並集文學之盛晉宋以來未之有也性愛山水於元圃穿築更立亭館與朝士名素者遊其中嘗泛舟後池番禺侯軌盛稱此中宜奏女樂太子不答詠左思招隱詩云何必絲與竹山水有清音軌慙而止出宫二十餘年不畜音聲未薨少時勑賜太樂女伎一部畧無所好普通中大軍北侵都下米貴太子因命菲衣減膳每霖雨積雪遣腹心左右周行閭巷視貧困家及有流離道路以米密加振賜人十石又出主衣絹帛每年常多作襦袴各三千領冬月以施寒者不令人知若死亡無可歛則為備棺槨每聞遠近百姓賦役勤苦輒斂容變色常以戸口未實重於勞擾吳郡屢以水災不熟有上言當漕大瀆以瀉浙江中大通二年春詔遣前交州刺史王奕假節發吳吳興信義三郡人丁就役太子上疏曰伏聞當遣王奕等上東三郡人丁開漕溝渠導洩震澤使吳興一境無復水災暫勞永逸必獲後利未萌難覩竊有愚懷如聞吳興累年失收民頗流移吳郡十城亦不全熟唯信義去秋有稔復非恒役之民即日東境榖價猶貴劫盗屢起在所有司皆不聞奏今征戍未歸彊丁踈少此雖小舉竊恐難合吏一登門動為民蠧又出丁之處遠近不一比得齊集已妨蠶農去年粗為豐歲公私未能足食如復今兹失業慮恐為弊更深且草竊多伺候民間虚實若善人從役則抄盗彌增吳興未受其益内地已離其弊不審可得權停此功待優實以不武帝優詔以喻焉太子孝謹天至每入朝未五鼓便守城門開東宫雖燕居内殿一坐一起恒向西南面臺宿被召當入危坐達旦三年三月游後池乗彫文舸摘芙蓉姬人蕩舟没溺而得出因動股恐貽帝憂深誡不言以寢疾聞武帝勑看問輒自力手書啓及稍篤左右欲啓聞猶不許曰云何令至尊知我如此惡因便嗚咽四月乙已暴惡馳啓武帝比至已薨時年三十一帝臨哭盡哀詔斂以衮冕諡曰昭明五月庚寅葬安寧陵詔司徒左長史王筠為哀册文朝野惋愕都下男女奔走宫門號泣滿路四方甿庶及疆徼之人聞喪者哀慟太子性仁恕見在宫禁防捉荆子者問之云以荆子驅人太子恐復致痛使捉手版代之頻食中得蠅蟲之屬密置柈邊恐厨人獲罪不令人知又見後閤小兒攤戲後屬有獄牒攤者法士人結流徙庶人結徒太子曰私錢自戲不犯公物此科太重令注刑止三歲士人免官獄牒應死者必降長徒自此以下莫不減半所著文集二十卷又撰古今典誥文言為正序十卷五言詩之善者為英華集二十卷文選三十卷薨後長子東中郎將南徐州刺史華容公歡封豫章郡王次子枝江公譽封河東郡王曲江公詧封岳陽郡王􅩼封武昌郡王鑒封義陽郡王各三千戸女悉同正主蔡妃供待一同常儀唯别立金華宫為異帝既廢嫡立庶海内噂􅊱故各封諸子大郡以慰其心岳陽王詧流涕受拜累日不食初丁貴嬪薨太子遣人求得善墓地將斬草有賣地者因閹人俞三副求市若得三百萬許以百萬與之三副密啓武帝言太子所得地不如臣所得地於帝吉帝末年多忌便命市之葬果有道士善圖墓云地不利長子若厭伏或可申延乃為蠟鵝及諸物埋墓側長子位有宫監鮑邈之魏雅者二人初並為太子所愛邈之晚見踈於雅密啓武帝云雅為太子厭禱帝密遣檢掘果得鵝等物大驚將窮其事徐勉固諫得止於是唯誅道士由是太子迄終以此慙媿故其嗣不立後邵陵王臨丹陽郡因邈之與鄉人爭婢議以為誘畧之罪牒宫簡文追感太子寃揮淚誅之邈之兄子僧隆為宫直前未知為邈之姪即日驅出先是人間謡曰鹿子開城門城門鹿子開當開復未開使我心徘徊城中諸少年逐歡歸去來鹿子開反語為來子哭云帝哭也歡前為南徐州太子果薨遣中書舎人臧厥追歡於崇正殿解髮臨哭歡既嫡孫次應嗣立而遲疑未决帝既新有天下恐不可以少主主大業又以心䘖故意在晉安王猶豫自四月上旬至五月二十一日方决歡止封豫章王還任往謡言心徘徊者未定也城中諸少年逐歡歸去來復還徐方之象也歡字孟孫位雲麾將軍江州刺史薨諡安王子棟嗣棟字元吉及簡文見廢侯景奉以為主棟方與妃張氏鋤葵而法駕奄至棟驚不知所為泣而升輦及即位升武徳殿歘有迴風從地涌起飜飛華蓋徑出端門時人知其不終於是年號天正追尊昭明太子曰昭明皇帝安王為安皇帝金華敬妃蔡氏為敬皇后太妃王氏為皇太后妃為皇后未幾行禪讓禮棟封淮隂王及二弟橋樛並鎖於密室景敗走兄弟相扶出逢杜崱於道崱去其鎖弟曰今日免橫死矣棟曰倚伏難知吾猶有懼初王僧辯之為都督將發諮元帝曰平賊之後嗣君萬福未審有何儀注帝曰六門之内自極兵威僧辯曰平賊之謀臣為已任成濟之事請别舉人由是帝别勑宣猛將軍朱買臣使行忍酷會簡文已被害棟等與買臣遇見呼往船共飲未竟並沉于水河東王譽字重孫普通二年封枝江縣公中大通三年改封河東郡王累遷南中郎將湘州刺史未幾侯景冦建業譽入援至青草湖臺城没有詔班師譽還湘鎮時元帝軍于武城新除雍州刺史張纘密報元帝曰河東起兵岳陽聚米將來襲江陵元帝甚懼沉米斷纜而歸因遣諮議周𢎞直至譽所督其糧衆譽曰各自軍府何忽疑人使三反譽並不從元帝大怒遣世子方等征之反為譽敗死又令信州刺史鮑泉討譽並陳示禍福譽謂曰欲前即前無所多說泉軍于石槨寺譽逆擊不利而還泉進軍橘洲譽攻之又見敗於是遂圍之譽幼而有驍勇馬上用弩兼有膽氣能撫士卒甚得衆心元帝又遣領軍王僧辯代鮑泉攻譽譽將潰圍而出會其麾下將慕容華引僧辯入城遂被執謂守者曰勿殺我得一見七官申此讒賊死無恨主者曰奉令不許遂斬首送荆鎮元帝返其首以葬焉初譽之將敗引鏡照面不見其頭又見長人蓋屋兩手據地噉其臍又見白狗大如驢從城出不知所在譽甚惡之俄而城陷岳陽王詧别有傳列在載記豫章王綜字世謙武帝第二子也天監三年封豫章郡王累遷北中郎將南徐州刺史入為侍中鎮右將軍初綜母吳淑媛在齊東昏宫寵在潘余之亞及得幸於武帝七月而生綜宫中多疑之及綜年十四五常夢一年少肥壯自挈其首對綜如此非一綜轉成長心驚不已頻密問淑媛淑媛問夢中形色頗類東昏因密報之曰汝七月生兒安得比諸皇子汝今太子次弟幸保富貴勿􅂥綜與淑媛相抱哭每日夜恒泫泣又每靖室閉戸籍地被髮席藁輕財好士分施不輟唯留身上故衣厨庫恒致罄乏常於内齋布沙於地終日跣行足下生胝日能行三百里嘗有人士姓王以屯躓告綜于時大乏唯有眠牀故皁複帳即付之其降意下士以伺風雲之會諸侯王妃主及外人並知此懷唯武帝不疑及長有才學善屬文武帝御諸子以禮朝見不甚數綜恒怨不見知每出蕃淑媛恒隨之至鎮時年十五尚裸袒戲嬉於前晝夜無别妃袁氏尚書令昻之女也淑媛恒節其宿止遇袁妃尤不以道内外咸有穢聲綜後在徐州政刑酷虐又有勇力制及奔馬㩧殺駒犢常隂服微行著烏絲布帽夜出無有期度招引道士探求術數性聰敏多通每武帝有勑疏至輒忿恚形於顔色帝性嚴羣臣不敢輕言得失凡綜所為莫之知也於徐州還頻表陳便宜求經畧邊境帝並優勑答之徐州所有練樹並令斬殺以帝小名練故也累致意尚書僕射徐勉求出鎮襄陽勉未敢言因是怒勉餉以白團扇圖伐檀之詩言其賄也在西州於别室歲時設席祠齊氏七廟又累微行至曲阿拜齊明帝陵然猶無以自信聞俗說以生者血瀝死者骨血滲即為父子綜乃私發齊東昏墓出其骨瀝血試之既有徴矣後生次男月餘日潛殺之既瘞夜遣人發取其骨更試之其酷忍如此每對東宫及諸王辭色不恭遜嘗改歲後問訊臨川王宏出至中閤登宏羊車次遺糞而出居都下所為多如此者普通四年為都督南兖州刺史頗勤於事而不見賔客其辭訟則隔簾理之方幅出行垂帷於輿每云惡人識其面也初齊故建安王蕭寶夤在魏綜求得北來道人釋法鸞使入北通問於寶夤謂為叔父襄陽人梁話母死法鸞說綜厚賜之言終可任使綜遺話錢五萬及葬畢引在左右法鸞在廣陵往來通魏尤數每舍淮隂苖文寵家言文寵於綜綜引為國常侍六年魏將元法僧以彭城降帝使綜都督衆軍權鎮彭城并攝徐州府事武帝曉别元象知當更有敗軍失將恐綜為北所禽手勅綜令拔軍每使居前勿在人後綜恐帝覺與魏安豐王元延明相持夜潛與梁話苖文寵三騎開北門渉汴河遂奔蕭城自稱隊主見延明而拜延明坐之問其名氏不答曰殿下問人有見識者延明召使視之曰豫章王也延明喜下地執其手答其拜送于洛陽及旦齋内諸閤猶閉不開衆莫知所以唯見城外魏軍呌曰汝豫章王昨夜已來在我軍中城中既失王所在衆軍乃退不得還者甚衆湘州益陽人任煥常有騅馬乗之退走煥脚為抄所傷人馬俱弊煥於橋下歇抄復至煥脚痛不復得上馬於是向馬泣曰騅子我於此死矣馬因跪其前脚煥乃得上馬遂免難綜長史江革大舟卿祖暅並為魏軍所擒武帝聞之驚駭綜至魏位侍中司空高平公丹陽王梁話苖文寵並為光祿大夫綜改名纘字徳文追服齊東昏斬縗魏太后及羣臣並弔八月有司奏削爵土絶其屬籍改子直姓悖氏未及旬日有詔復屬籍封直永新侯策免吳淑媛俄遇鴆而卒有詔復其品秩諡曰敬使直主其喪及蕭寶夤據長安反綜復去洛陽欲奔之魏法度河橋不得乗馬綜乗馬而行橋吏執之送洛陽魏孝莊初歴位司徒太尉尚帝姊壽陽公主拜駙馬都尉陳慶之之至洛也送綜啓求還時吳淑媛尚在勑使以綜小時衣寄之信未達而慶之敗綜後出為都督齊州刺史驃騎大將軍開府儀同三司寶夤見禽綜拜表為之請命爾朱兆入洛綜為城人趙洛周所逐公主被錄送京爾朱世隆欲相陵逼公主守操被害綜既棄州為沙門潛詣長白山未幾至陽平病卒初綜在魏不得志嘗作聽鐘鳴悲落葉以申其志聞者悲之魏節閔立迎綜喪以王禮與公主合葬於嵩山後梁人盗其柩來奔武帝猶以子禮祔葬陵次直字思方位晉陵太守沙州刺史南康簡王績字世謹小字四果武帝第四子也天監七年封南康郡王十年為南徐州刺史時年七歲主者有受貨洗改解書長史王僧孺弗之覺績見而詰之即便首服衆咸歎其聰警十七年為都督南兖州刺史在州以善政稱尋有詔徴還百姓曹樂等二百七十人詣闕上表稱績尤異一十五條乞留為州任優詔許之普通四年徴為侍中雲麾將軍領石頭戍軍事五年出為江州刺史丁董淑媛憂居喪過禮固求解職乃徴授安右將軍領石頭戍軍事尋加䕶軍羸瘠不親視事大通三年因感疾薨于任贈開府儀同三司諡曰簡績寡玩好少嗜欲居無僕妾躬事儉約所有租秩悉寄天府及薨後少府有南康國無名錢數千萬子會理嗣會理字長才少聰慧好文史年十一而孤特為武帝所愛衣服禮秩與正王不殊十五為湘州長史多信左右行事劉納每禁之會理心不平證以贓貨收送建業納歎曰我一見天子使汝等知會理厚送資糧數遣慰喻令心腹於青草湖為盗殺納百口俱盡累遷都督南兖州刺史太清元年督衆軍北侵至彭城為魏師所侵退歸本鎮二年侯景圍城會理入援會北徐州刺史封山侯正表將應其兄正徳外託赴援實謀襲廣陵會理擊破之方得進路臺城陷會理歸鎮侯景遣前臨江太守董紹先以武帝手詔召會理其僚佐曰紹先書豈天子本意咸勸拒之會理用其典籖范子鸞計曰天子年尊受制賊虜今有手勑召我入朝臣子之心豈得違背且處江北功業難成不若身赴京都圖之肘腋遂納紹先紹先入以烏幡麾衆單馬遣之至都景以為司空兼尚書令雖在冦手每思匡復與西鄉侯歡等潛布腹心要結壯士時范陽祖皓斬董紹先據廣陵起義期以會理為内應皓敗辭相連及侯景矯詔免會理官猶以白衣領尚書令是冬景往晉熙都下虚弱會理復與柳敬禮及北兖州司馬成欽謀之敬禮曰舉大事必有所資今無寸兵安可以動會理曰湖熟有吾故舊三千餘人昨來相知剋期響集計賊守兵不過千人若大兵外攻吾等内應直取王偉事必有成縱景後歸無能為也敬禮曰善于時百姓厭賊咸思用命建安侯賁以謀告王偉偉遂收會理及其弟通理時有錢唐褚冕會理之舊亦囚於省問事之所被考掠千計終無所言會理隔壁聞之遥曰褚郎豈不為吾致此邪然勿言王偉害會理褚冕竟以不服赦之會理弟通理字仲宣位太子洗馬封祈陽侯至是亦遇害通理弟乂理字季英生十旬而簡王薨至三歲能言見内人分散涕泣相送問其故或曰此簡王宫人喪畢去耳乂理便號泣悲不自勝諸宫人見之莫不哀感為之停者三人服闋見武帝升殿又悲不自勝帝為之收涕謂左右曰此兒大必為奇士大同八年封安樂縣侯乂理慷慨慕功名每讀書見忠臣烈士未嘗不廢卷歎曰一生之内當無愧古人博覽多識有文才嘗祭孔文舉墓并為立碑製文甚美及侯景内冦乂理聚客赴南兖州隨兄會理入援及城陷又隨會理還廣陵因入齊為質乞師行二日會理被遣董紹先據廣陵遂追獲之防嚴不得與兄相見乃偽請還都入辭母謂其姊固安主曰兄若至願使善為計自勉勿顧以為念前途亦思立功但未知天命如何耳至都以魏降人元貞忠正可以託孤乃以玉柄扇贈之貞辭不受乂理曰後當見憶會祖皓起兵乂理奔長蘆為景所害元貞始悟其前言往收葬焉廬陵威王續字世訢武帝第五子也天監八年封廬陵王少英果旅力絶人馳射應發命中武帝歎曰此我之任城也中大通二年為都督雍州刺史寧蠻校尉大同元年遷江州刺史又為驃騎將軍開府儀同三司又為都督荆州刺史薨贈司空諡曰威始元帝母阮修容得幸由丁貴嬪之力故元帝與簡文相得而與廬陵王少相狎長相謗元帝之臨荆州有宫人李桃兒者以才慧得進及還以李氏行時得營戸禁重續具狀以聞元帝泣對使訴於簡文簡文和之不得元帝猶懼送李氏還荆州世所謂西歸内人者自是二王書問不通及續薨元帝時為江州聞問入閣而躍屧為之破尋自江州復為荆州荆州人迎于州境帝數而遣之吏民失望續多聚馬仗蓄養矯雄耽色愛財極意收斂倉儲庫藏盈溢臨終有啓遣中兵錄事參軍謝宣融送所上金銀器千餘件武帝始知其富以為財多徳寡因問宣融曰王金盡於此乎宣融曰此之謂多安可加也夫王之過如日月之蝕欲令陛下知之故終而不隱帝意乃解世子憑以罪前誅死次子應嗣應不慧王薨至内庫閱珍物見金鋌問左右曰此可食不答曰不可應曰既不可食並特乞汝他皆此類邵陵攜王綸字世調小字六真武帝第六子也少聰頴博學善屬文猶工尺牘天監十三年封邵陵郡王普通五年以西中郎將權攝南徐州事在州輕險躁虐喜怒不恒車服僭擬肆行非法遨遊市里雜於厮𨽻嘗問賣䱉者曰刺史何如對者言其躁虐綸怒令吞䱉以死自是百姓惶駭道路以目嘗逢喪車奪孝子服而著之匍匐號呌籖帥懼罪密以聞帝始嚴責綸不能改於是遣代綸悖慢逾甚乃取一老公短瘦類帝者加以衮冕置之高坐朝以為君自陳無罪使就坐剔褫捶之於庭忽作新棺木貯司馬崔會意以轜車挽歌為送葬之法使嫗乗車悲號會意不堪輕騎還都以聞帝恐其奔逸以禁兵取之將於獄賜盡昭明太子流涕固諫得免官削爵土還第大通元年復封爵中大通四年為揚州刺史綸素驕縱欲盛器服遣人就市賒買錦采絲布數百疋擬與左右職局防閤為綘衫内人帳幔百姓並關閉邸店不出臺續使少府市采經時不能得勑責府府丞何智通具以聞因被責還第恒遣心腹馬容戴子高戴爪李撤趙智英等於路尋目智通於白馬巷逢之以槊刺之刃出於背智通以血書歴作邵陵字乃絶遂知之帝懸錢百萬購賊有西州遊軍將宋鸛子條姓名以啓勑遣舎人褚曇粲領齋仗五百人圍綸第於内人堆中禽爪撤智英子高驍勇踰牆突圍遂免智通子敞之割炙食之即載出新亭四面火炙之焦熟敞之車載錢設鹽蒜雇百姓食撤一臠賞錢一千徒黨并母肉遂盡綸鎖在第舎人褚曇粲并主帥領仗身守視免為庶人經三旬乃脫鎖頃之復封爵後豫餞衡州刺史元慶和於坐賦詩十二韻末云方同廣川國寂寞久無聲大為武帝賞曰汝人才如此何慮無聲旬日間拜郢州刺史太清二年位中衛將軍開府儀同三司侯景構逆加征討大都督率衆討景將發帝誡曰侯景小豎頗習行陣未可以一戰即殄當以歲月圖之綸發白下中江而浪起有物蕩舟將覆識者尤異之及次鍾離景已度采石綸乃晝夜兼道旋軍入赴濟江中流風起人馬溺者十一二遂率西豐公大春新塗公大成等歩騎三萬發京口將軍趙伯超請從徑路直指鍾山出其不意綸從之衆軍奄至賊徒大駭分為三道攻綸綸大破之翊日賊又來攻日晚賊稍退南安侯駿以數十騎馳之賊回拒駿駿部亂賊因逼大軍大軍潰綸至鍾山戰敗奔還京口軍主霍儁見獲賊送于城下逼使云已禽邵陵王儁偽許之乃曰王小失利政為糧盡還京口儁為託邏所獲非軍敗也賊以刀背毆其髀儁色不變賊義而捨之儁中書舎人靈超子也三年正月綸與東揚州刺史大連等入援至驃騎洲進位司空臺城陷綸奔禹穴東土皆附臨城公大連懼將害已乃圖之綸覺乃去至尋陽尋陽王大心欲以州讓之不受大寶元年綸至郢州刺史南平王恪讓州於綸綸復不受乃上綸為假黃鉞都督中外諸軍事綸於是置百官改聽事為正陽殿内外齋省悉題署焉而數有變怪祭城隍神將烹牛有赤蛇繞牛口出南浦施安幄帳無何風起飄没于江于時元帝圍河東王譽於長沙既久譽請救於綸綸欲往救之為軍糧不繼遂止乃與元帝書言大敵猶彊天讐未雪豈可手足肱支自相屠害元帝復書陳譽有罪不可解圍之狀綸省書流涕曰天下之事一至於斯左右聞之莫不掩泣於是大修器甲將討侯景元帝聞其盛乃遣王僧辯率舟師一萬以逼綸綸將劉龍武等降僧辯綸遂與子躓等十餘人輕舟走武昌沙門法罄與綸有舊藏之巖石之下時綸長史韋質司馬姜偉先在外聞綸敗馳往迎之元帝復遣將徐文盛追攻之綸復收散卒屯于齊昌郡將引魏兵共攻南陽侯景將任約襲綸綸敗走定州刺史田龍祖迎綸綸懼為所執復歸齊昌行收兵至汝南魏所署汝南城主李素孝者綸之故吏開城納之綸乃復修城池收集士卒將攻竟陵魏聞之遣大將楊忠儀同侯幾通攻破城執綸綸不為屈通乃卧大鼓使綸坐上殺之投于江岸經日色不變鳥獸莫敢近時飛雪飄零屍橫道路周回數歩獨不沾灑舊主帥安陸人郝破敵歛之於襄陽葬之日黃雪紛糅惟冡壙所獨不下雪楊忠知而悔之使以太牢往祭殯焉百姓憐之為立祠廟岳陽王詧遣迎喪葬於襄陽望楚山南贈太宰諡曰安後元帝議追加諡尚書左丞劉榖議諡法怠政交外曰􅂝從之綸任情卓越輕財愛士不競人利府無儲積聞有輒求既得即散士亦以此歸之初鎮京口大造器甲既渉聲問投之于江及後出征戎備頗闕乃歎曰吾昔造仗本備非常無事渉疑遂使零散今日事難卒無所資初昭明之薨簡文入居監撫綸不謂徳舉而云時無豫章故以次立及廬陵之没綸觖望滋甚於是伏兵于莽用伺車駕而臺舎人張僧允知之其謀頗泄又獻曲阿酒百器上以賜寺人飲之而斃上乃不自安頗加衛士以警宫内於是傳者諸相疑阻而綸亦不懼武帝終不能有所廢黜卒至宗室爭競而敗國基為天下笑綸長子堅字長白大同元年以例封汝南侯亦善草𨽻性頗庸短嘗與所親書題云嗣王其人得書大駭執以諫堅堅曰前言戲耳人曰不願以此為戲也侯景圍城堅屯太陽門終日蒱飲不撫軍政吏士有功未嘗申理疫癘所加亦不存䘏士咸憤怨太清三年堅書佐董勛華白曇朗等以堅私室醖釀亟有烹宰不相霑及忿恨夜遣賊登樓城遂陷堅遇害弟確字仲正少驍勇有文才尤工楷𨽻公家碑碣皆使書之除祕書丞武帝謂曰為汝能文所以特有此授大同二年封為正階侯復徙封永安常在第中習騎射學兵法時人以為狂左右或進諫確曰聽吾為國家破賊使汝知之鍾山之役確所向披靡羣賊憚之確每臨陣對敵意甚詳贍帶甲據鞍自朝及夕馳驟往返不以為勞諸將服其壯勇軍敗賊使負袍不之知也確因隙自拔得達朱方及後侯景乞盟憚確及趙威方在外慮為後患啓求召確入城詔乃召確為南中郎將廣州刺史確知此盟多貳城必淪没欲先遣趙威方入確因南奔綸聞之逼確使入確猶不肯綸流涕謂曰汝欲反邪時臺使周石珍在坐確曰侯景雖云欲去而不解長圍以意而推其事可見今召我入未見益也石珍曰勑㫖如此侯豈得辭確執意猶堅綸大怒謂趙伯超曰譙州卿為我斬之當齎首赴闕伯超揮刃眄曰我識君耳刀豈識君確流涕而出遂入城及景背盟復圍城城陷時武帝方寢確排闥入啓曰城已陷矣帝曰猶可一戰不對曰人心不可臣向格戰不禁縋下僅得至此武帝歎曰自我得之自我失之亦復何恨幸不累子孫乃使確為慰勞文謂曰爾速去謂爾父無以二宫為念及出見景景愛其膂力恒令在左右後從景仰見飛䳒羣賊爭射不中確射之應弦即落賊徒忌確咸勸景除之先是綸遣典籖密導確確謂使者曰侯景政可一夫力致確不惜死欲手刃之卿還啓家王勿以一子為念後與景獵鍾山同逐禽引弓將射景弦斷不得發賊覺殺之武陵王紀字世詢武帝第八子也少而寛和喜怒不形於色勤學有文才天監十三年封武陵王尋授揚州刺史中書詔成武帝加四句曰貞白儉素是其清也臨財能讓是其廉也知法不犯是其慎也度事無留是其勤也紀特為帝愛故先作牧揚州大同三年為都督益州刺史以路遠固辭武帝素識乾象謂曰天下方亂唯益州可免故以處汝汝其勉之紀歔欷既出復入帝曰汝嘗言我老我猶再見汝還益州也紀在蜀開建寧越嶲貢獻方物十倍前人朝廷嘉其績加開府儀同三司初天監中震大陽城門字曰紹宗梁位唯武王解者以武陵王當之於是朝野屬意焉及侯景陷臺城上甲侯蕭韶西上至硤出武帝密勑加紀侍中假黃鉞都督益州諸軍事驃騎大將軍太尉承制大寶元年六月辛酉紀乃移告諸州征鎮遣世子圓照領二蜀精兵三萬受湘東王繹節度繹命圓照且頓白帝未許東下十月甲辰湘東王繹遣鮑檢報紀以武帝崩問十一月壬寅紀總戎將發益鎮繹使胡智監至蜀以書止之曰蜀中斗絶易動難安弟可鎮之吾自當滅賊又别紙云地擬孫劉各安境界情深魯衛書信恒通二年四月乙丑紀乃僭號於蜀改年曰天正暗與蕭棟同名識者尤之以為於文天為二人正為一止言各一年而止也紀又立子圓照為皇太子圓正為西陽王圓滿竟陵王圓普譙王圓肅宜都王以巴西梓潼二郡太守永豐侯撝為征西大將軍益州刺史封秦郡王司馬王僧畧直兵參軍徐怦並固諌皆殺之僧畧僧辯弟怦勉從子也永豐侯撝歎曰王不克矣夫善人國之基也今乃誅之不亡何待又謂所親曰昔桓元年號大亨識者謂為二月了而元之敗實在仲春今年曰天正在文為一止其能久乎丁卯元帝遣萬州刺史宋簉襲圓照於白帝圓照弟圓正時為西陽太守召至鎖于省内初楊乾運求為黎州刺史不得紀以為潼州刺史楊法深求為黎州刺史亦不從以為沙州刺史二人皆憾不獲所請各遣使通西魏及聞魏軍伐蜀紀遣其將譙淹回軍赴援魏將尉遲迥逼涪水楊乾運以州降之迥即趨成都五月乙已紀次於陵軍容甚盛元帝命䕶軍將軍陸法和立二城於硤口名七勝城鎖江以斷峽時陸納未平蜀軍復逼元帝甚憂法和告急旬日相繼元帝乃拔任約於獄以為晉安王司馬撤禁兵以配之并遣宣猛將軍劉棻共約西赴六月紀築連城攻絶鐵鏁元帝復於獄拔謝答仁為歩兵校尉配衆一旅上赴紀之將發也江水可揭前部不得行及登舟無雨而水長六尺劉孝勝喜曰殆天贊也將至峽有黑龍負舟其將帥咸謂天助及頓兵日久頻戰不利師老糧盡智力俱殫又魏人入劒閣成都虚弱憂懣不知所為先是元帝已平侯景執所俘馘頻遣報紀世子圓照鎮巴東留執不遣啓紀云侯景未平宜急征討已聞荆鎮為景所滅可疾下大軍紀謂為實於是仍率衆沿江急進於路方知侯景已平便有悔意召圓照責之圓照曰侯景雖誅江陵未服宜速平蕩紀亦以既居尊位宣言於衆敢諫者死蜀中將卒日夜思歸所署江州刺史王開業進曰宜還救根本更思後圖諸將僉以為然圓照劉孝勝獨言不可紀乃止既而聞王琳將至潛遣將軍侯叡傍險出法和後臨水築壘禦琳及法和元帝遣書使光州刺史鄭安中往喻意於紀許其還蜀專制㟭方紀不從命報書如家人禮既而侯叡為任約謝答仁所破又陸納平諸軍並西赴元帝乃與紀書曰甚苦大智季月煩暑流金爍石聚蚊成雷封狐千里以兹玉體辛苦行陣乃睠西顧我勞如何自獯醜憑陵羯胡叛渙吾年為一日之長屬有平亂之功膺此樂推事歸當璧儻遣使乎良所希也如曰不然於此投筆友于兄弟分形共氣兄肥弟瘦無復相代之期讓棗推梨長罷懽愉之日上林靜拱聞四鳥之哀鳴宣室披圖嗟萬世之長逝心乎愛矣書不盡言大智紀别字也帝又為詩曰回首望荆門驚浪且雷奔四鳥嗟長别三聲悲夜猿圓正在獄中連句曰水長二江急雲生三峽昏願赦淮南罪思報阜陵恩帝看詩而泣紀頻敗知不振遣所署度支尚書樂奉業往江陵論和緝之計元帝知紀必敗遂拒而不許於是兩岸十餘城俱降遊擊將軍樊猛率所領至紀所紀在船中繞牀而走以金擲猛等曰此顧卿送我一見七官卿必當富貴猛曰天子何由可見殺足下此金何之猶不敢逼圍而守之陸法和馳啓上密勑樊猛曰生還不成功也猛率甲士祝文簡張天成拔刃升舟猶左右奔擲第三子圓滿馳來就父紀首既落圓滿軀亦分法和收太子圓照兄弟三人問圓照曰阿郎何以至此圓照曰失計願為公作奴法和叱遣之圓照字明同中大通初為益州東齋郎宋寧宋興二郡太守遠鎮諸王世子皆在建業質守帝特愛紀故遣以副紀紀之構釁悉其謀也次弟圓正先見鎖在江陵及紀既以兵終元帝使謂曰西軍已敗汝父不知存亡意欲使其自裁而圓正既奉此問便號哭盡哀以禍難之興皆由圓照於是唯哭世子言不絶聲上謂圓正聞問悲感必應自殺頻看不能死乃付廷尉獄及見圓照曰阿兄何乃亂人骨肉使酷痛如此圓照更無所言唯云計誤並命絶食於獄齧臂啖之十三日死天下聞而悲之圓正字明允紀第二子也美風儀善談論寛和好施愛接士人本封江安侯歴西陽太守有惠政既居上流人附之者甚衆及侯景作逆圓正收兵衆且一萬後遂跋扈中流不順王命及累破後復謀入蜀元帝將圖之署為平南將軍及至弗見使南平嗣王恪等與飲醉而囚之時紀稱梁王及紀敗死有司奏請絶屬籍元帝許之賜姓饕餮氏紀最為武帝所愛武帝諸子罕登公位唯紀以功業顯著先啓黃扉時邵陵王綸屢以罪黜心每不平及聞紀為征西乃撫枕歎曰武陵有何功業而位乃前我朝廷憒憒似不知人武帝聞之大怒曰武陵有恤民拓境之勲汝有何績敢擬之邪太清初帝思之使善畫者張僧繇至蜀圖其形以歸紀在蜀十七年南開寧州越嶲西通資陵吐谷渾内修耕桑鹽鐵之功外通商賈遠方之利故能殖其財用器甲殷積馬八千疋上足者置之内廐開寢殿以通之日落輙出歩馬便騎射尤工舞矟九日講武躬領幢隊及聞國難謂僚佐曰七官文士豈能匡濟既東下黃金一斤為餅百餅為簉至有百簉銀五倍之其他錦罽繒采稱是每戰則懸金帛以示將士終不賞賜寧州刺史陳知祖請散金銀募勇士不聽慟哭而去自是人各離心莫肯為用紀頗學觀古善風角亦知不復能濟瞻望氣色歎吒天道推牀聲聞于下有請事者以疾辭不見既死堙于沙洲不封無襯元帝以劉孝勝付廷尉尋免之初紀將僭號祅怪不一内寢栢殿柱繞節生花其莖四十有六靃靡可愛狀似荷花識者曰王敦祅花非佳事也時蜀知星人說紀曰官若東下當用申年太白出西從之為利申歲發蜀酉年入荆不可失也發蜀之歲太白在西北及明年則已東出矣紀第五子圓肅字明恭風度淹雅敏而好學紀僭號封宜都王除侍中自率兵下峽令蕭撝守成都以圓肅為之副及尉遲迥至圓肅與撝俱降魏授圓肅開府儀同三司侍中封安化縣公周明帝初進棘城郡公以歸欵勲别賜食思君縣五百戸後拜咸陽郡守甚有政績尋改授太子少傅復出為豐州刺史尋進位上開府儀同大將軍歴司宗中大夫洛州刺史進位大將軍隋開皇初授貝州刺史以母老請歸養詔許之卒於家年四十六有文集十卷又撰時人詩筆為文海四十卷廣堪十卷淮海亂離志四卷行於世簡文諸子簡文二十子王宣后生哀太子大器南郡王大連陳淑容生尋陽王大心左夫人生南海王大臨安陸王大春謝夫人生瀏陽公大雅張夫人生新興王大莊包昭華生西陽王大鈞范夫人生武寧王大威褚修華生建平王大球陳夫人生義安王大昕朱夫人生綏建王大摯其臨川王大欵桂陽王大成汝南王大封樂良王大圜並不知母氏潘美人生皇子大訓早亡無封其餘不知不載哀太子大器字仁宗簡文嫡長子也中大通三年封宣城郡王太清二年十月侯景冦建業勑太子為臺内大都督三年五月簡文即位六月癸酉立為皇太子大寶二年八月侯景廢簡文將害太子時景黨稱景命召之太子方講老子將下牀而刑人奄至太子顔色不變徐曰久知此事嗟其晚耳刑者將以衣帶絞之太子曰此不能見殺乃指繫帳竿下繩命取絞之而絶時年二十八太子性寛和兼神用端嶷在賊中每不屈意左右竊問其故答曰賊若未須見殺雖復陵傲呵叱終不敢言若見害時至雖一日百拜無益於死又曰官今憂廹而神貌怡然未喻此意答曰吾自度死必在賊前若諸叔外來平夷羯冦必前見殺然後就死若其遂開拓上流必先見殺後取富貴何能以無益之愁橫憂必死之命乎景之西上擕太子同行及敗歸船往往相失太子所乗船入樅陽浦舟中腹心並勸因此入北太子曰自國家喪敗志不圖生主上䝉塵寧忍違離吾今若去乃是叛父非謂避賊天下豈有無父之國便涕泗嗚咽命即前進賊以太子有器度憚之恐為後患故先及禍承聖元年四月追諡哀太子祔太廟隂室尋陽王大心字仁恕簡文第二子也幼而聰明善屬文中大通四年以皇孫封當陽縣公大同元年為都督郢州刺史時年十三州事悉付行事大心雖不親州務發言每合於理衆皆敬服太清元年為雲麾將軍江州刺史貪冒財賄不能綏接百姓二年侯景冦都城大心招集士卒與上流諸軍赴援宫闕三年臺城陷上甲侯蕭韶南奔宣密詔加散騎常侍進號平南將軍大寶元年封尋陽王初歴陽太守莊鐵以城降侯景既而又奉其母來奔大心以為鐵舊將厚為其禮軍旅之事悉以委之以為豫章内史景數遣軍西上冦抄大心輒令鐵擊破之禽其將趙加婁賊不能進時鄱陽王範率衆棄合肥屯于柵口待援兵總集欲俱進大心聞之遣要範西上以湓城處之廪饋甚厚欲與戮力共除禍難會鐵據豫章反大心令中兵參軍韋約討之鐵敗乞降鄱陽世子嗣先與鐵善乃謂範曰昔與鐵遊處其人才畧從横若降江州必不全其首領請援之乃遣將侯瑱救鐵夜破韋約等營大心大懼於是二蕃釁起景將任約畧地至盆城大心遣司馬韋質拒戰敗績時帳下猶有勇士千餘人咸說曰既無糧儲難以守固若輕騎往建州以圖後舉策之上也其母陳淑容不從撫膺慟哭大心乃止遂與約和二年將遇害繞牀謂賊廂公王僧貴曰我以全州歸命何忍相苦乃見射而殞臨川王大欵字仁師簡文第三子也初封石城縣公位中書侍郎太清三年簡文即位封江夏郡王大寶元年奔江陵湘東王承制改封臨川王魏克江陵遇害南海王大臨字仁宣簡文第四子也大同二年封寧國縣公少而敏慧年十一遭左夫人憂哭泣毁瘠以孝聞後入國學明經射策甲科拜中書侍郎遷給事黃門侍郎十一年長兼侍中出為琅邪彭城二郡太守侯景亂屯端門都督城南諸軍事大寶元年封南海郡王出為都督東揚州刺史又除吳郡太守時張彪起義於會稽吳人陸令公潁川庾孟卿等勸大臨投之大臨曰彪若成功不籍我力如其撓敗以我說焉不可往也二年遇害南郡王大連字仁靖簡文第五子也少俊爽能屬文舉止風流雅有巧思妙達音樂兼善丹青大同二年封臨城縣公七年與南海王俱入國學並射策甲科皆拜中書侍郎遷給事黃門侍郎轉侍中太清元年出為東揚州刺史侯景入冦建業大連率衆四萬來赴及臺城没援軍散還東揚州會稽豐沃糧仗山積東人懲景苛虐咸樂為用而大連恒沉湎于酒宋子仙攻之大連棄城走追及於信安縣大連猶醉弗之覺於是三吳悉為賊有大寶元年封南郡王賊遣將趙伯超劉神茂來攻大連專委部將留異異以城應賊大連棄走為賊所獲侯景以為江州刺史二年遇害安陸王大春字仁經簡文第六子也少博渉書記善吹笙天性孝謹體貌瓌偉腰帶十圍大同六年封西豐縣侯拜中書侍郎後為寧遠將軍知右頭戍軍事侯景内冦大春奔京口隨邵陵王入援戰于鍾山軍敗肥大不能行為賊所獲大寶元年封安陸郡王出為東揚州刺史二年遇害桂陽王大成字仁和簡文第八子也初封新塗公太清三年簡文即位封山陽郡王大寶元年奔江陵湘東王承制改封桂陽王大成性甚兇麤兼便弓馬至江陵被甲夜出人謂為劫砍之遂失左髻魏克江陵遇害汝南王大封字仁叡簡文第九子也初封臨汝公太清三年簡文即位封宜都郡王大寶元年奔江陵湘東王承制封汝南王魏克江陵入長安周封為晉陵縣公入隋位開府儀同三司陳州刺史瀏陽公大雅字仁風簡文第十二子也大同九年封瀏陽縣公少聰警美姿儀特為武帝所愛臺城陷大雅猶命左右格戰賊至漸衆乃自縋而下發憤感疾薨新興王大莊字仁禮簡文第十三子也性躁動大同元年封高唐縣公大寶元年封新興郡王位南徐州刺史二年遇害西陽王大鈞字仁博簡文第十四子也性厚重不妄戲弄年七歲武帝嘗問讀何書對曰學詩因令諷誦即誦周南音韻清雅帝重之大寶元年封西陽郡王位丹陽尹二年監揚州遇害武寧王大威字仁容簡文第十五子也美風儀眉目如畫大寶元年封武寧郡王二年為丹陽尹遇害皇子大訓字仁徳簡文第十六子也少而脚疾不能躡履太清三年未封而亡年十歲建平王大球字仁玉簡文第十七子也大寶元年封建平郡王性明慧夙成初侯景圍臺城武帝素歸心釋教每發誓願恒云若有衆生應受諸苦請身代當時大球年甫七歲聞而驚謂母曰官家尚爾兒安敢辭乃六時禮佛亦云凡有衆生應獲苦報悉大球代受其早慧如此二年遇害義安王大昕字仁朗簡文第十八子也年四歲母陳夫人卒便哀毁有若成人晨夕涕泣眼為之傷及武帝崩大昕奉慰簡文嗚噎不自勝左右莫不掩泣大寶元年封義安郡王二年遇害綏建王大摯字仁琰簡文第十九子也幼雄壯有膽氣及臺城陷乃歎曰大丈夫會當滅賊屬奶媪驚掩其口曰勿妄言禍將及大摯笑曰禍至非由此大寶元年封二年遇害樂良王大圜字仁顯簡文第二十子也幼而聰敏神情俊悟年四歲能誦三都賦及孝經論語七歲居母喪便有成人性大寶元年封樂良郡王丹陽尹簡文遇弑大圜潛遁獲免侯景平歸建業時喪亂之後無所依乃寓居善覺佛寺人有以告王僧辯僧辯乃給船餼得往江陵元帝見之甚悅賜以越衫胡帶改封晉熙郡王除琅琊彭城二郡太守時大圜兄汝南王大封等猶未通謁元帝性忌刻甚恨望之乃使大圜召之大圜即日曉諭兩兄相繼出謁元帝乃安之大圜以世方多故恐讒愬生焉乃屏絶人事門客左右不過三兩人不妄遊狎兄姊之間止牋疏而已嘗以讀詩禮書易為事元帝嘗自問五經要事數十條大圜辭約指明應答無滯元帝甚歎美之因謂曰昔河間好學爾既有之臨淄好文爾又兼之然有東平為善彌高前載吾重之愛之爾當效焉及于謹軍至元帝乃遣大封充使請和大圜副焉其實質也出至軍所信宿元帝遂降魏恭帝二年大圜至長安相國宇文泰以客禮待之周保定二年大圜受封始寧縣公尋加車騎大將軍儀同三司賜田宅奴婢俄而開麟趾殿召集學士大圜豫焉初梁武帝集四十卷簡文集九十卷各止一本江陵平後並藏祕閣至是大圜於麟趾見之乃手寫二集一年並畢識者稱歎之建徳四年除滕王逌友逌嘗問大圜曰吾聞湘東王作梁史有之乎餘傳乃可抑揚帝紀奚若隱則非實記則攘羊對曰言者之妄也如使有之亦不足怪昔漢明為世祖紀章帝為顯宗紀殷鑒不遠足為成例且君子之過如日月之蝕彰於四海安得而隱之如有不彰亦安得而不隱蓋子為父隱直在其中諱國之惡抑又禮也逌乃大服其後大軍東討攻拔晉州或問大圜曰師遂克否對曰高歡昔以晉州肇基偽迹今本既拔矣能無亡乎所謂君以此始者必以此終居數月齊氏果滅聞者以為知言隋開皇初拜内史侍郎出為西河郡守卒大圜好學務於著述撰梁舊事三十卷寓記三卷士喪儀注五卷要訣二卷并文集二十卷元帝諸子元帝諸子徐妃生忠烈世子方等王貴嬪生貞惠世子方諸始安王方略袁貴人生愍懷太子方矩夏貴妃生敬皇帝自餘不顯忠烈世子方等字實相元帝長子也少聰敏有俊才善騎射尤長巧思性愛林泉特好散逸嘗著論曰人生處世如白駒過隙耳一壺之酒足以養性一簞之食足以怡形生在蓬蒿死葬溝壑瓦棺石椁何以異兹吾嘗夢為魚因化為鳥方其夢也何樂如之及其覺也何憂類斯良由吾之不及魚鳥者遠矣故魚鳥飛浮任其志性吾之進退常在掌握舉手懼觸揺足恐墜若使吾終得與魚鳥同遊則去人間如脫屣耳初徐妃以嫉妬失寵方諸母王氏以冶容倖嬖及王夫人終元帝歸咎徐妃方等意不自安元帝聞之又惡方等方等益懼故述此論以申其志時武帝年高欲見諸王長子元帝遣方等方等欣然升舟冀免憂辱行至繇水遇侯景亂元帝召之方等啓曰昔申生不愛其死方等豈顧其生元帝省書歎息知無還意乃配歩騎一萬使援臺城賊每來攻方等必身當矢石城陷方等歸荆州收集士馬甚得衆和元帝始歎其能方等又勸修築城柵以備不虞既成樓雉相望周回七十餘里元帝觀之甚悅入謂徐妃曰若更有一子如此吾復何憂徐妃不答垂泣而退元帝忿之因疏其穢行牓于大閤方等入見益以自危時河東王為湘州刺史不受令方等求征之元帝謂曰汝有水厄深宜慎之拜為都督令南討方等臨行謂所親曰吾此叚出征必死無二死而獲所吾豈愛生及至麻溪軍敗溺死求屍不得元帝聞之心喜不以為戚後追思其才贈侍中中軍將軍揚州刺史諡忠壯世子命招魂以葬之方等注范􅁮後漢書未就所撰三十國春秋及篤靜子行於世元帝即位改諡武烈世子封子莊為永嘉王及魏克江陵莊年甫七歲為人家所匿後王琳迎送建業及敬帝立出質于齊敬帝太平二年陳武帝將受禪王琳請莊于齊以主梁嗣自湓城濟江二月即帝位于郢州年號天啓置百官王琳總其軍國明年莊為陳人所敗其御史中丞劉仲威奉以奔壽陽遂入齊齊武平元年授特進開府儀同三司封梁王齊朝許以興復未果而齊亡莊在鄴飲氣而卒貞惠世子方諸字明智元帝第二子也幼聰警博學明老易善談元風采清越特為元帝所愛母王氏又有寵及方等敗後元帝謂曰不有所廢其何以興勿以汝兄為念因拜中撫軍將軍以自副又出為郢州刺史鎮江夏以鮑泉為行事時元帝遣徐文盛與侯景將任約相持方諸年十五童心未革恃文盛在近不恤軍政日與鮑泉蒱酒為樂侯景知之乃遣其將宋子仙從間道襲之百姓奔告方諸與鮑泉皆不信曰文盛大軍在下敵安得來始命閉門賊已入城方諸方踞泉腹以五色眊辮其鬚子仙執方諸以歸王僧辯軍至蔡洲景遂害之元帝追諡貞惠世子愍懷太子方矩字徳規元帝第四子也少勤學美容止初封南安侯太清初累遷侍中中衞將軍元帝承制拜王太子改名元良承聖元年十一月丙子立為皇太子及升儲位眤狎羣小多有過失元帝有廢立計未及行而江陵喪亡遇害太子聰頴凶暴猜忍俱有元帝風敬帝承制追諡愍懷太子始安王方略元帝第十子貞惠世子母弟也母王氏王琳之次姊元帝即位拜貴嬪次妹又為良人並䝉寵幸方略益鍾愛侯景亂元帝結好西魏方略年數歲遣入關至長安即得還贈遺甚厚江陵喪亡遇害貴嬪良人並更誕子未出閤無封失名陳永修侯擬字公正高祖之踈屬也少孤貧性質直彊記高祖南征交趾擬從焉梁紹泰二年除員外散騎常侍明威將軍以雍州刺史資監南徐州事高祖踐阼廣封宗室詔曰維城宗子實固有周磐石懿親用隆大漢故會盟則異姓為後啓土則非劉勿王所以糾合枝幹廣殖藩屏前王懋典列代常規從子持節員外散騎常侍明威將軍雍州刺史監南徐州擬持節通直散騎侍郎正威將軍北徐州刺史襃從子晃炅從孫假節員外郎散騎常侍明威將軍訬假節信威將軍北徐州刺史吉陽縣開國侯諠假節通直散騎侍郎信武將軍祏假節散騎侍郎雄信將軍青州刺史詳正威將軍通直散騎侍郎慧紀從孫敬雅敬泰並枝戚密近劬勞王室宜裂河山以光利建擬可永修縣開國侯襃鍾陵縣開國侯晃建城縣開國侯炅上饒縣開國侯訬慶化縣開國侯諠仍前封祏豫章縣開國侯詳遂興縣開國侯慧紀宜黃縣開國侯敬雅寧都縣開國侯敬泰平固縣開國侯各五百户文帝嗣位擬除丹陽尹常侍如故坐事又以白衣知郡尋復本職天嘉元年卒時年五十八贈領軍將軍諡曰定二年配享高祖廟庭子黨嗣遂興侯詳字文幾少出家為沙門善書記談論清雅高祖討侯景召令還俗配以兵馬從定建業永定二年封遂興縣侯天嘉三年累遷吳州刺史五年討周廸戰敗死之以所統失律無贈諡子正理嗣宜黃侯慧紀字元方高祖之從孫也渉獵書史負材任氣從高祖平侯景及帝踐阼封宜黃縣侯除黃門侍郎大建十年吳明徹北侵敗績以慧紀為緣江都督兖州刺史至徳二年為都督荆州刺史及梁安平王蕭巖晉熙王蕭瓛等詣慧紀請降慧紀以兵迎之以應接功位開府儀同三司禎明三年隋師濟江慧紀率將士三萬人船艦千餘乗沿江而下欲趣臺城遣南康太守吕肅將兵據巫峽以五條鐵鎖橫江肅竭其私財以充軍用隋將楊素奮兵擊之四十餘戰爭馬鞍山及磨刀澗守險隋軍士死者五千餘人陳人盡取其鼻以求功賞既而隋軍屢㨗獲陳之士三縱之肅乃遁保延洲别帥廖世寵領大舫詐降欲燒隋艦更決死一戰於是有五黃龍備衆色各長十餘丈驤首連接順流而東風浪大起雲霧晦㝠陳人震駭不覺火自焚隋軍乗高艦張大弩以射之陳軍大敗風浪應時頓息肅收餘衆東走慧紀時至漢口為隋秦王俊所拒不得進聞肅敗盡燒公安之儲引兵東下因推湘州刺史晉熙王叔文為盟主水軍都督周羅㬋與郢州刺史荀法尚守江夏及建業平隋晉王廣遣一使以慧紀子正業來喻又使樊毅喻羅㬋其上流城戍悉解甲於是慧紀及巴州刺史畢寶並慟哭俱降慧紀入隋依例授儀同三司卒子正平頗有文學衡陽獻王昌字敬業高祖第六子也梁太清末高祖南征李賁命昌與宣后隨沈恪還吳興及高祖東討侯景昌與宣后文帝在吳興並為景所囚景平拜長城國世子吳興太守時年十六昌容貌偉麗神情秀朗雅性聰辨明習政事高祖遣陳郡謝哲濟陽蔡景歴輔昌臨郡又遣吳郡杜之偉授昌以經書昌讀書一覽便誦明於經義剖析如流尋與宣帝俱往荆州梁元帝除員外散騎常侍荆州陷又與宣帝俱遷關右西魏以高祖故甚禮之高祖即位頻遣使請周人許之而未遣及高祖崩乃遣之是時王琳梗於中流昌未得還居于安陸王琳平後天嘉元年二月昌發自安陸由魯山濟江而巴陵王蕭沇等率百僚上表請以昌為湘州牧封衡陽郡王詔曰可三月甲戍入境詔令主書舎人緣道迎接丙子濟江於中流殞之使以溺告四月庚寅喪柩至都上親臨哭乃下詔贈假黃鉞都督中外諸軍事太宰揚州牧葬送之儀一依漢東平憲王齊豫章文獻王故事諡曰獻無子文帝以第七皇子伯信嗣伯信字孚之位西衡州刺史及隋師濟江與臨汝侯方慶並為東衡州刺史王勇所害南康愍王曇朗高祖母弟忠壯王休先之子也休先少倜儻有大志梁簡文之在東宫深被知遇為文徳主帥頃之卒敬帝即位追贈南徐州刺史封武康縣公高祖受禪贈司徒封南康郡王諡曰忠壯曇朗少孤尤為高祖所愛有膽力善綏御侯景平後起家著作郎高祖誅王僧辯留曇朗鎮京口知留府事紹泰元年除中書侍郎監南徐州二年齊兵攻逼建業時根本孤危高祖請和遣曇朗質於齊既而齊人背約遣蕭軌等隨徐嗣徽度江高祖大破之虜蕭軌東方老等誅之齊人亦害曇朗于晉陽時陳與齊絶弗之知高祖踐阼猶以曇朗襲封南康郡王奉忠壯王祀天嘉二年齊人結好始知其亡文帝詔贈開府儀同三司南徐州刺史諡曰愍乃遣兼中郎令隨聘使江徳藻迎曇朗喪柩三年春至都初曇朗未質於齊生子方泰方慶及將適齊以二妾自隨在北亦生二子方華方廣亦同得還方泰少麤獷與諸惡少年羣聚游逸無度文帝以南康王故特寛宥之天嘉二年以為南康王世子及聞曇朗薨於是襲爵南康王大建四年為都督廣州刺史為政殘暴為有司奏免六年授豫章内史在郡不修政事秩滿之際屢放部曲為劫又縱火延燒邑居因行暴掠驅錄富民徴求財賄代至又淹留不還至都以為宗正卿未拜為御史中丞宗元饒所劾免官以王還第十一年起為寧遠將軍直殿省尋加散騎常侍其年八月宣帝幸大壯觀因大閱武命都督任忠領歩騎十萬陣於元武湖都督陳景領樓艦五百出於𤓰歩江上登元武門宴羣臣以觀之因幸樂游苑設絲竹會仍重幸大壯觀集衆軍振旅而還時方泰當從啓稱所生母疾不行因與亡命楊鍾期等二十人微行往人間淫淳于岑妻為州長流所錄又率人仗抗拒傷損禁司為有司所奏上大怒下方泰獄於是兼御史中丞徐君整奏請解方泰所居官下宗正削爵土上可其奏禎明初為侍中陳亡與後主俱入長安隋大業中為掖縣令方慶少清警渉獵書傳及長有幹略天嘉中封臨汝縣侯至徳二年累遷智武將軍武州刺史初廣州刺史馬靖久居嶺表大得人心士馬殷盛朝廷疑之以方慶為廣州刺史以兵襲靖靖誅進號宣毅將軍方慶性清謹甚得人和禎明三年隋師濟江都督東衡州刺史王勇徴兵於方慶欲與赴援臺城時隋行軍總管韋洸帥兵度嶺宣隋文帝勅云若嶺南平定留勇與豐州刺史鄭萬頃且依舊職方慶聞之恐勇賣已且欲觀變乃不從勇使高州刺史戴智烈斬方慶於廣州而收其兵鄭萬頃滎陽人梁司州刺史紹叔之始族子也父旻梁末入魏萬頃通達有材幹周武帝時為司城大夫出為温州刺史至徳中與司馬消難奔陳拜散騎常侍昭武將軍豐州刺史在州甚有惠政吏民表請立碑詔許焉初萬頃在周甚被隋文帝知遇及隋文帝踐阼常思還北及王勇殺方慶萬頃乃率州兵拒勇降隋隋授上儀同尋卒文帝諸子文帝十三男沈皇后生廢帝始興王伯茂嚴淑媛生鄱陽王伯山晉安王伯恭潘容華生新安王伯固劉昭華生衡陽王伯信王充華生廬陵王伯仁張修容生江夏王伯義韓修華生武陵王伯禮江貴妃生永陽王伯智孔貴妃生桂陽王伯謀二男早卒無名伯信出繼衡陽王昌始興王伯茂字鬱之文帝第二子也初高祖兄始興昭烈王道談仕梁為直閤將軍侯景之亂領弩手二千援臺城中流矢卒紹泰二年贈南兖州刺史封義興郡公諡曰昭烈高祖受禪重贈太傅改封始興郡王道談生文帝及宣帝宣帝以梁承聖末遷于關中至是高祖遥以宣帝襲封始興嗣王以奉昭烈王祀及高祖崩文帝入纂帝位時宣帝在周未還文帝以本宗乏饗徙封宣帝為安成王伯茂為始興王以奉昭烈王祀賜天下為父後者爵一級舊制諸王受封未加戎號者不置佐史於是尚書八座奏加伯茂寧遠將軍置佐史除揚州刺史伯茂性聰敏好學謙恭下士又以太子母弟故文帝深愛重之是時征北軍人於丹徒盗發晉郗曇墓大獲晉右將軍王羲之書及諸名賢遺跡事覺其書並没縣官藏于秘府文帝以伯茂好古多以賜之由是伯茂大工草隸甚得右軍法遷東揚州刺史鎮東將軍開府儀同三司廢帝時伯茂在都劉師知等矯詔出宣帝伯茂勸成之師知等誅後宣帝恐伯茂扇動朝廷乃進號中衞將軍令入居禁中專與廢帝游處時四海之望咸歸宣帝伯茂深不平日加憤怨肆出惡言宣帝以其無能不以為意及建安人蔣裕與韓子高等謀反伯茂隂豫其事光大二年皇太后令黜廢帝為臨海王其日又下令降伯茂為温麻侯時六門之外有别館以為諸王冠昏之所名為昏第至是命伯茂出居之宣帝遣盗殞之于車中時年十八鄱陽王伯山字靜之文帝第三子也偉容儀舉止閑雅喜愠不形於色高祖時天下草創諸王受封儀注多闕及伯山受封文帝欲重其事天嘉元年七月丙辰尚書八座奏封鄱陽郡王乃遣度支尚書蕭睿持節兼太宰告于太廟又遣五兵尚書王質持節兼太宰告于太社其年十月上臨軒策命策訖令王公以下並宴於王第六年為緣江都督平北將軍南徐州刺史宣帝輔政不欲令伯山處邊光大元年徙為東揚州刺史累遷征南將軍䕶軍將軍加開府儀同三司給鼓吹并扶伯山於諸王最長後主深敬重之每朝廷有冠昏饗宴恒使為主及遭所生母憂居喪以孝聞起為鎮衞將軍將遷太尉既有命矣未及發詔禎明三年薨尋屬陳亡遂無贈諡長子君範未襲爵而隋師至時宗室諸王侯在都者百餘人後主恐其為變乃並召入屯朝堂使豫章王叔英總督之又隂為之備六軍敗績相率出降因從後主入長安隋文帝並配隴右及河西諸州各給田業以處之大業二年隋煬帝以後主第六女婤為貴人絶愛幸因召陳氏子弟盡還京師隨才敘用由是並為守宰徧於天下君範位温令新安王伯固字牢之文帝第五子也生而龜胸目通精揚白形狀眇小而俊辯善言論天嘉六年立為新安郡王大建七年累遷都督南徐州刺史伯固性嗜酒不好積聚所得俸祿用度無節酣醉以後多所乞丐於諸王中最為貧窶宣帝每矜之特加賞賜性輕率好行鞭捶在州不知政事日出田獵或乗眠輿至於草間輙呼人從游動至旬日所捕麞鹿多使生致宣帝頗知之遣使者責讓者數矣十年為國子祭酒頗知元理而墯業無所通至於摘句問難往往有奇意為政苛嚴國學有墯游不修習者必重加檟楚生徒懼焉由是學業頗進十三年為都督揚州刺史後主初在東宫與伯固甚親狎伯固又善謿謔宣帝每宴集多引之叔陵在江州心害其寵隂求瑕疵將中以法及叔陵入朝伯固懼罪謟求其意乃共訕毁朝賢歴詆文武雖耆年高位皆面折無所畏懼伯固性好射雉叔陵又好開發冡墓出游田野必與偕行於是情好大協遂謀不軌伯固侍禁中每有密語必報叔陵及叔陵奔東府遣使告之伯固單馬馳赴及事不捷便欲走會四門已閉不得出因趣白楊道臺遣馬容等至為亂兵所殺尸於昌館門時年二十八詔特許以庶人禮葬子及所生王氏並特宥為庶人國除晉安王伯恭字肅之文帝第六子天嘉六年封尋為吳郡太守時年十餘歲便留心政事官曹緝理歴位尚書左僕射後為中衞將軍右光祿大夫陳亡入長安大業初為成州刺史太常少卿廬陵王伯仁字壽之文帝第八子天嘉六年立為侍中國子祭酒領太子左庶子陳亡卒于長安江夏王伯義字堅之文帝第九子也天嘉六年封位金紫光祿大夫陳亡遷于𤓰州道卒武陵王伯禮字用之文帝第十子天嘉六年立大建初為吳興太守在郡恣行暴掠後為有司所劾十一年被代徴還遂遷延不發為御史中丞徐君整所劾免陳亡入長安大業中為臨洮太守永陽王伯智字策之文帝第十二子少敦厚有器局博渉經史大建初立累遷尚書左僕射後為特進陳亡入長安大業中為國子司業桂陽王伯謀字深之文帝第十三子大建中立位散騎常侍薨子部大業中為番禾令宣帝諸子宣帝四十二男柳皇后生後主彭貴人生始興王叔陵曹淑華生豫章王叔英何淑儀生長沙王叔堅宜都王叔明魏昭華生建安王叔卿錢貴妃生河東王叔獻劉昭儀生新蔡王叔齊袁昭容生晉熙王叔文義陽王叔達新會王叔坦王姬生淮南王叔彪巴山王叔雄吳姬生始興王叔重徐姬生尋陽王叔儼淳于姬生岳陽王叔慎王修華生武昌王叔虞韋修容生湘東王叔平施姬生臨賀王叔敖沅陵王叔興曾姬生陽山王叔宣楊姬生西陽王叔穆申媫妤生南安王叔儉南郡王叔澄岳山王叔韶太原王叔匡袁姬生新興王叔純吳姬生巴東王叔謨劉姬生臨海王叔顯秦姬生新寧王叔隆新昌王叔榮其皇子叔叡叔忠叔泓叔毅叔訓叔武叔處叔封八人並未及封三子早卒無名始興王叔陵字子嵩宣帝第二子也梁承聖中生於江陵魏克江陵宣帝遷關右叔陵留穰城宣帝之還以後主及叔陵為質天嘉三年隨後主還朝封康樂縣侯叔陵少機辯徇聲名彊梁無所摧屈大建元年封始興王奉昭烈王祀位都督江州刺史時年十六政自己出僚佐莫豫焉性嚴刻部下懾憚諸公子姪及罷縣令長皆逼令事已豫章内史錢法成詣府進謁即配其子季卿將領馬仗季卿慙恥不時至叔陵大怒侵辱法成法成憤怨自縊而死州縣非其部内亦徴攝案之朝貴及下吏有乖忤者輙誣奏其罪陷以重辟四年遷都督湘州刺史諸州鎮聞其至皆震怖股慄叔陵日益横征伐夷獠所得皆入已絲毫不以賞賜徴求役使無有紀極夜常不卧執燭達曉呼召賓客說人間細事戲謔無所不為性不飲酒唯多置餚胾晝夜食噉而已自旦至中方始寢寐曹局文案非呼不得輙白笞罪者皆繫獄動數年不省視瀟湘以南皆通為左右㕓里殆無遺者其中脫有逃竄輙殺其妻子州縣無敢上言宣帝弗之知九年除都督揚州刺史十年至都加扶給油幢車叔陵居東府事務多關渉省閤執事之司承意順㫖即諷上進用之微致違忤必致大罪重者至殊死道路籍籍皆言其有非常志叔陵修飾虛名每入朝常於車中馬上執卷讀書高聲長誦陽陽自若歸坐齋中或自執斧斤為沐猴百戲又好游冡墓間遇有塋表姓名可知者輙命左右發掘取其石誌古器并骸骨肘脛持為翫弄藏之府庫人間少妻處女微有色貌者並即逼納十一年丁所生母彭氏憂去職頃之起為本職晉世王公貴人多葬梅嶺及彭氏卒叔陵啓求梅嶺葬之乃發故太傅謝安舊墓棄去安柩以葬其母初喪日偽為哀毁自稱刺血寫湼槃經未及十旬乃日進甘膳又私召左右妻女與之姦合所作尤不軌浸淫上聞宣帝責御史中丞王政以不舉奏免政官又黜其典籖親事仍加鞭箠宣帝素愛叔陵不繩以法但責讓而已服闋又為侍中中軍大將軍及宣帝不豫後主諸王並入侍疾叔陵隂有異志命典藥吏礪切藥刀及倉卒之際又命左右取劍左右不悟乃取朝服所佩木劍以進叔陵怒及翌日小斂後主哀頓俯伏叔陵以剉藥刀砍後主中項太后馳來救焉叔陵又砍太后數下後主乳媪樂安君吳氏時在太后側自後掣肘後主因得起叔陵仍持後主衣後主自奮得免長沙王叔堅以手搤叔陵奪去其刀仍牽就柱以其褶袖縳之棄池水中將殺之問後主曰即盡之為待也時吳媪已扶後主避賊叔堅求後主所在將受命叔陵多力因奮得脫突出雲龍門馳車還東府呼其甲士斷青溪橋道放東城囚以充戰士又遣人往新林追所部兵馬仍自披甲著白帽登城西門招募百姓散金銀以賞賜外召諸王將帥莫有應者唯新安王伯固聞而赴之叔陵聚兵僅得千人欲據城保守時衆軍並緣江防守臺内空虚叔堅白太后使太子舎人司馬申急召右衞將軍蕭摩訶將兵至西府西門叔陵事急遣記室韋諒送鼓吹與摩訶謂曰事㨗以公為台鼎摩訶紿報曰須王心膂節將自來方敢從命叔陵即遣戴洫譚騏驎二人詣摩訶摩訶執以送臺斬於閣道下持其首徇東城仍懸於朱雀門叔陵自知不濟遂入沉其妃張氏及寵妾七人于井中叔陵有部下兵先在新林於是率人馬數百自小航度欲趣新林以舟艦入北行至白楊路為臺軍所邀伯固見兵至旋避入巷叔陵拔刀追之伯固復還叔陵部下多棄甲潰散摩訶馬容陳智深迎刺叔陵閹豎王飛擒砍之數十下馬容陳仲華就斬首送臺自寅至已乃定尚書八座奏請依宋世故事流尸江中汚瀦其室并毁其所生彭氏墳廟還謝氏之塋後主從所奏叔陵諸子即日並賜死豫章王叔英字子烈宣帝第三子也寛厚仁愛大建元年封後位司空隋大業中位涪陵太守卒長沙王叔堅字子成宣帝第四子也母本吳中酒家婢相者言當生貴子宣帝微時因飲通焉生叔堅及貴召拜淑儀叔堅少而嚴整又頗使酒兄弟憚之好術數卜筮風角鎔金琢玉並究其妙初封豐城侯大建元年封長沙郡王累遷丹陽尹初叔堅與始興王叔陵並招聚賓客各爭權寵甚不平每朝會鹵簿不肯為先後必分道而趣左右或爭道而鬬至有死者及宣帝不豫叔堅與叔陵並從後主侍疾叔陵隂有異志叔堅疑之微伺其所為及行逆賴叔堅以免以功進驃騎將軍開府儀同三司揚州刺史尋遷司空將軍刺史如故時後主患創不能視事政無大小悉決于叔堅權傾朝廷後主由是踈忌之孔範管斌施文慶等並東宫舊臣日夕隂持其短至徳元年乃詔令即本號同三司之儀出為江州刺史未發尋以為司空實欲奪其權又隂令人造其厭魅刻木為偶人衣以道士服施機關能跪拜晝夜於星月下醮之祝詛於上又令人上書告其事案驗令實後主召叔堅囚于西曹將黜之令近侍宣敕數之叔堅自陳為佞人所構死日慙見叔陵後主感其前功乃赦之但免所居官以王還第後位中軍大將軍開府儀同三司荆州刺史秩滿還都陳亡入隋遷于𤓰州叔堅素貴不知家人生産至是與妃沈氏酣酒不以耕種為事大業中為遂寧郡守卒建安王叔卿字子弼宣帝第五子也性質直有材氣容貌甚偉大建四年立位中書監陳亡入隋大業中為都官郎上黨通守宜都王叔明字子昭宣帝第六子也儀容美麗舉止和柔狀似婦人大建五年立位侍中陳亡入隋大業中為鴻臚少卿河東王叔獻字子恭宣帝第九子也性恭謹聰敏好學大建五年立位南徐州刺史薨贈司空諡康簡子孝寛嗣大業中為汶城令新蔡王叔齊字子肅宣帝第十一子也風采明贍博渉經史善屬文大建七年立位侍中陳亡入隋大業中為尚書主客郎晉熙王叔文字子才宣帝第十二子也性輕險好虚譽頗渉書史大建七年立位都督湘州刺史徴為侍中未還而隋軍濟江隋秦王至漢口時叔文自湘州還朝至巴州乃率巴州刺史畢寶等請降致書於秦王王遣使往巴州迎勞叔文叔文與畢寶荆州刺史陳慧紀及文武將吏赴漢口秦王并厚待之及至京隋文帝坐于廣陽門觀叔文從後主至朝堂文帝使内史令李徳林宣㫖責其君臣不能相弼以致喪亡後主與其羣臣並愧懼拜伏莫能仰視叔文獨欣然有自得志後上表陳在巴州先送欵望異常例文帝嫌其不忠而方懷來江表遂授開府宜州刺史淮南王叔彪字子華宣帝第十三子也少聰慧善屬文大建八年立位侍中入隋卒于長安始興王叔重字子厚宣帝第十四子也性質朴無伎藝宣帝崩始興王叔陵為逆誅其年立叔重為始興王以奉昭烈王後位江州刺史隋大業中為太府少卿尋陽王叔儼字子思宣帝第十五子也性凝重舉止方正後主即位立位侍中入隋卒岳陽王叔慎字子敬宣帝第十六子也少聰敏十歲能屬文大建十四年立至徳中為丹陽尹時後主尤愛文章叔慎與衡陽王伯信新蔡王叔齊等日夕陪侍賦詩恒被嗟賞禎明元年出為湘州刺史加都督及隋師濟江清河公楊素兵下荆州遣將龎暉略地至湘州州内將士剋日請降叔慎置酒會文武酒酣歎曰君臣之義盡於此乎長史謝基伏而流涕湘州助防遂興侯正理在坐起曰主辱臣死諸君獨非陳國臣乎縱其無成猶見臣節青門之外有死不能今日後應者斬衆咸許諾乃刑牲結盟遣人詐奉降書於龎暉叔慎伏甲待之暉入伏兵發縳暉等以徇皆斬之叔慎招士衆數日中兵至五千人隋遣内陽公薛胄為湘州刺史聞龎暉死乃益請兵隋又遣行軍總管劉仁恩救之未至薛胄禽叔慎秦王斬之漢口義陽王叔達字子聽宣帝第十七子也大建十四年立位丹陽尹入隋大業中為内史舎人綘郡通守武徳中位侍中封江國公歴禮部尚書卒巴山王叔雄字子猛宣帝第十八子也大建十四年立入隋卒于長安武昌王叔虞字子安宣帝第十九子也大建十四年立入隋大業中為高苑令湘東王叔平字子康宣帝第二十子也至徳元年立入隋大業中為胡蘇令臨賀王叔敖字子仁宣帝第二十一子也至徳元年立入隋大業中位儀同三司陽山王叔宣字子通宣帝第二十二子也至徳元年立入隋大業中為涇城令西陽王叔穆字子和宣帝第二十三子也至徳元年立入隋卒于長安南安王叔儉字子約宣帝第二十四子也至徳元年立入隋卒于長安南郡王叔澄字子泉宣帝第二十五子也至徳元年立入隋大業中為靈武令沅陵王叔興字子推宣帝第二十六子也至徳元年立入隋大業中為給事郎岳山王叔韶字子欽宣帝第二十七子也至徳元年立位丹陽尹入隋卒于長安新興王叔純字子洪宣帝第二十八子也至徳元年立入隋大業中為河北令巴東王叔謨字子軌宣帝第二十九子也至徳四年立入隋大業中為汧陽令臨海王叔顯字子亮宣帝第三十子也至徳四年立入隋大業中為鶉觚令新會王叔坦字子開宣帝第三十一子也至徳四年立入隋大業中為渉縣令新寧王叔隆字子遠宣帝第三十二子也至徳四年立入隋卒于長安新昌王叔榮字子徹宣帝第三十三子也禎明三年立入隋大業中為内黃令太原王叔匡字子佐宣帝第三十四子也禎明三年立入隋大業中為壽光令後主諸子後主二十二男張貴妃生皇太子深會稽王莊孫姬生吳興王允高昭儀生南平王嶷吕淑媛生永嘉王彦邵陵王兢龔貴嬪生南海王䖍錢塘王恬張淑華生信義王祗徐淑儀生東陽王恮孔貴人生吳郡王藩其皇子總觀明綱統沖洽縚綽威辨十一人並未及封皇太子深字承源後主第四子也少聰慧有志操容止儼然雖左右近侍未嘗見其喜愠以母張貴妃故特為後主所愛至徳元年封始安王位揚州刺史禎明二年皇太子允廢後主乃立深為皇太子及隋師濟江隋將韓擒虎自南掖門入百僚逃散深時年十餘歲閉閤而坐舎人孔伯魚侍焉隋師排閤而入深使宣令勞之曰軍旅在道不乃勞也軍人咸致敬焉隋大業中為枹罕太守武徳初為祕書丞卒官吳興王允字承業後主長子也大建五年二月生於東宫母孫姬因産卒沈皇后哀而養之以為己子後主年長未有嗣宣帝命以為嫡孫詔為父後者賜爵一級十年封永康公後主即位立為皇太子允性聰敏好學執經肄業終日不倦博通大義兼善屬文時張貴妃孔貴嬪並愛幸沈皇后無寵日夜構成后及太子之短孔範之徒又於外合成其事禎明二年廢為吳興王加侍中衞將軍入隋卒于長安南平王嶷字承岳後主第二子也方正有器局年數歲風采舉動有若成人至徳元年立位揚州刺史遷都督郢州刺史入隋卒于長安永嘉王彦字承懿後主第三子也至徳元年立位都督江州刺史入隋大業中為襄武令南海王䖍字承恪後主第五子也至徳元年立位南徐州刺史入隋大業中為涿令信義王祗字承敬後主第六子也至徳元年立位瑯琊彭城二郡太守入隋大業中為通議郎邵陵王兢字承檢後主第七子也禎明元年立入隋大業中為國子監丞會稽王莊字承肅後主第八子也容貌蕞陋性嚴酷數歲時左右有不如意輙剟刺其面或加燒爇性嗜酒愛博以母張貴妃寵後主甚愛之至徳元年立位揚州刺史入隋大業中為昌隆令東陽王恮字承厚後主第九子也禎明二年立入隋大業中為通議郎吳郡王藩字承廣後主第十子也禎明二年封入隋大業中為任城令錢塘王恬字承惔後主第十一子也禎明二年封入隋卒于長安江左自西晉相承諸王開國並以户數相差為大小三品大國置上中下三將軍又置司馬一人次國置中下二將軍小國置將軍一人餘官亦准此為差武帝受命自永定迄于禎明唯衡陽王昌特加殊寵至五千户自餘大國不過二千小國則千户云通志卷八十三下
