body:
  text: 通志卷四十三宋右廸功即鄭樵漁仲撰禮略第二吉禮下宗廟時享薦新附祫禘功臣配享天子七祀諸侯附上陵拜掃及諸節上食附釋奠祀先代帝王名臣附老君祠先賢附孔子祠先儒附太公廟廵狩封禪厯代所尚享司寒藏氷開氷附禜葦茭桃梗禳祠髙禖祓禊諸雜祠宗廟唐虞立五廟其祭尚氣先迎牲殺於庭取血吿於室以降神然後奏樂尸入王祼以鬱鬯夏氏因之商制七廟周制小宗伯掌建國之神位宗廟在左王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼天子遷廟之主以昭穆合藏於二祧之中漢髙帝令諸侯都皆立上皇廟髙帝崩孝惠即位令奉常叔孫通定宗廟儀法帝東朝太后長樂宮及間往以數蹕煩民乃作複道武庫南通奏曰陛下何自築複道髙帝寢衣冠月出㳺髙廟子孫奈何乘宗廟道上行哉帝懼曰急壊之通曰人主無過舉今已作百姓皆知之矣願陛下為原廟渭北衣冠月出游之益廣宗廟大孝之本帝乃立原廟又尊髙帝廟為太祖廟景帝尊孝文廟為太宗廟所常幸郡國令各立太祖廟至宣帝太始二年復尊孝武廟為世宗廟凡所廵狩亦立焉凡祖宗廟在郡國者六十八合百六十七所而京師自髙祖下至宣帝與太上皇悼皇考各於陵旁立廟並為百七十六又園中各有寢便殿寢日四上食廟嵗二十五祠便殿嵗四祠元帝時丞相韋元成等言春秋之義父不祭於支庶之宅元帝罷郡國廟以髙皇帝為太祖孝文皇帝為太宗孝景皇帝為昭孝武皇帝為穆孝昭與孝宣俱為昭皇考廟親未盡太上孝惠廟皆親盡冝毁太上廟主冝瘞園孝惠帝為穆主遷於太廟寢園皆罷修後漢光武皇帝建武二年立髙廟於雒陽四時祫祀髙帝為太祖文帝為太宗武帝為世宗如舊三年正月立親廟雒陽祀父南頓君以上至舂陵節侯時冦賊未平祀儀未設至十九年中郎將張純等議禮人子事大宗降其私親故孝宣帝以孫後祖為父立廟於奉眀曰皇考廟於是議立平哀成元帝廟代今親廟兄弟以下使有司祠冝為南頓君立皇考廟祭上至舂陵節侯羣臣奉祠詔以宗廟處所未定且祫祭髙廟其成哀平且祠祭長安故髙廟其南陽舂陵嵗時各且因故園廟祭祀園廟去太守治所逺者在所令長行太守事侍祠惟孝宣帝有功徳其上尊號曰中宗於是雒陽髙廟四時加祭孝宣孝元凡五帝其西廟成哀平三帝主四時祭於故髙廟東廟京兆尹侍祠冠衣車服如太常祠陵廟之禮皇考南頓君以上至節侯皆􅈬園廟所在郡縣侍祠眀帝以光武中興更為起廟尊號曰世祖廟以元帝於光武為穆故雖非宗不毁也後遂為常眀帝遺詔遵儉無起寝廟藏主於世祖廟更衣孝章初不敢違以更衣有小别上尊號曰顯宗廟間祠於更衣四時合祭於世祖廟章帝遺詔無起寢廟如先帝故事和帝初不敢違上尊號曰肅宗後帝承遵皆藏主於世祖廟積多無别是後顯宗但為陵寢之號靈帝時京都四時所祭髙廟五主世祖廟七主少帝三陵追尊后三陵凡牲用十八太牢皆有副倅故髙廟三主親毁之後亦但殷祭之嵗奉祠獻帝初平中董卓與蔡邕等以和帝以下功徳無殊而有過差不應為宗及餘非宗者追尊三后皆奏毁之四時所祭髙廟一祖二宗及近帝四凡七帝魏文帝受禪追尊大父曰大皇帝考曰武皇帝以洛亰宗廟未成乃祠武帝於建始殿親執饋奠如家人禮明帝太和三年又追尊髙祖大長秋曰髙皇夫人呉氏曰髙皇后並在鄴廟之所祠則文帝之髙祖處士會祖髙皇祖太皇帝共一廟考太祖武皇帝特一廟百代不毁然則所祠止於親廟四室也其年十一月洛京廟成則以親盡遷處士主置園邑使宗正曹恪持節迎髙祖以下神主共一廟猶為四室而已景初元年六月羣公更奏定七廟之制曰武皇帝肇建洪基為魏太祖文帝繼天革命為魏髙祖上集成大命冝為魏烈祖於太祖廟北為二祧其左為文帝廟號曰髙祖昭祧其右擬眀帝號曰烈祖穆祧三祖之廟萬世不毁其餘四廟親盡迭遷一如周后稷文武廟祧之禮晉武帝即位追尊皇祖宣王為宣皇帝伯考景王為景皇帝考文王為文皇帝權立一廟後用魏廟追祭征西將軍豫章府君潁川府君亰兆府君與宣帝景帝文帝為三昭三穆是時宣皇未升太祖虚位所以祠六代與景帝為七廟六年因廟陷當改脩創羣臣議奏曰古者七廟異所自冝如禮又曰古雖七廟自近代以来皆廟七室於禮無廢於情為叙亦随時冝也東晉元帝上繼武帝於禮為禰如漢光武上繼元帝故事時西亰神主陷於虜庭江左建廟皆更新造尋以登懷帝之主又遷潁川府君位雖七室其實五世盖以兄弟為世數故也於時百度草創毁主權居别室太興三年将祭愍帝之主乃更定制還復豫章潁川於昭穆之位及元帝崩則豫章復遷至眀帝崩而潁川又遷猶十室也於時續廣太廟故三遷主並還西儲名之曰祧以准逺廟成帝咸康五年始作武悼皇后神主祔廟配饗世祖成帝崩而康帝承統以兄弟一代故不遷京兆始十一室也康帝崩穆帝立京兆遷入西儲同謂之祧如前三祖遷主之禮故正室猶十一也穆帝崩而哀帝海西並為兄弟無所登除咸安之初簡文皇帝上繼元皇帝於是潁川京兆二主復還昭穆之位簡文崩潁川又遷孝武帝太元十六年始改作太廟殿正室十四間東西儲各一間合十六間棟髙八丈四尺備法駕遷神主於行廟及孝武崩亰兆又遷如穆帝之世四祧故事宋武帝即尊位祠七代為七廟永初初追尊皇考為孝皇帝皇妣趙氏為穆皇后三年孝懿蕭皇后崩又祔廟髙祖崩神主升廟猶昭穆之序始魏晉之制虛太祖之位文帝元嘉初追尊所生胡媫妤為章皇太后立廟於太廟西其後孝武昭太后眀帝宣太后並祔章太后廟齊髙帝追尊父為宣皇帝母為昭皇后七廟梁武帝受禪遷神主於太廟為三昭三穆凡六廟追尊皇考為文皇帝皇妣為徳皇后廟號太祖皇祖特進以上皆不追尊擬祖遷於上而太祖之廟不毁與六親廟為七皆同一堂共庭而別室陳依梁制七廟如禮初文帝入嗣而皇考始興昭烈王廟在始興國謂之東廟天嘉中徙神主祔於梁之小廟改曰國廟祭用天子儀後魏之先居於漠北鑿石為祖宗之廟於烏洛侯國西北眀元帝永興四年立太祖道武帝廟於白登山嵗一祭具太牢帝親奉無常月又於白登西太祖舊逰之處立昭成獻明太祖廟常以九月十月之交帝親祭牲用馬牛羊又親行貙劉之禮孝文太和三年六月親謁七廟十五年四月改營太廟詔曰祖有功宗有徳後者不得擅祖宗之名居二祧之廟令述尊先志冝制祖宗之號烈祖有創業之功世祖有開拓之徳冝為祖宗百代不遷而逺祖平文功未多於昭成然廟號為太祖道武建業之勲髙於平文廟號為烈祖比校似為未允朕今奉尊道武為太祖而立二祧餘皆以次而遷十九年遷都洛邑二月詔曰太和廟已就神儀靈主冝時奉寧可尅五月奉遷於廟其出金墉之儀一准出代都太和之式入新廟之典可依近至金墉之軌其威儀鹵簿如出代廟百官奉遷冝可省之但令朝官四品以上侍官五品以上宗室奉迎北齊文宣帝受禪置六廟獻武以下不毁以上則遞毁並同廟而別室既而遷神主於太廟文襄文宣並太祖之子文宣初疑其昭穆之次欲别立廟衆議不同至二年秋始祔太廟四時並臘凡五祭禘祫如梁制後周之制思復古之道乃右宗廟而左社稷閔帝受禪追尊皇祖為徳皇帝父文王為文皇帝廟號太祖擬祖以上三廟遞遷至太祖不毁其下相承置二昭二穆為五焉眀帝崩廟號世宗武帝崩廟號髙祖並為祧廟不毁隋文帝受命遣兼太保宇文善等奉䇿詣同州吿皇考桓王廟兼用女巫同家人之禮追尊桓王為武元皇帝皇妣為元眀皇后奉迎神主歸於京師改周制左宗廟而右社稷宗廟未言始祖又無受命之祧自髙祖以下置四親廟同殿異室一皇髙祖太原府君廟二皇曾祖康王廟三皇祖獻王廟四皇考太祖武元皇帝廟擬祖遷於上而太祖之廟不毁至煬帝立七廟太祖各一殿准周文武二祧與始祖而三餘並分室而祭唐武徳元年追尊號髙祖曰宣簡公會祖曰懿王祖曰景皇帝考曰元皇帝法駕迎神主祔於太廟始享四室貞觀九年髙祖崩詔增脩太廟中書侍郎岑文本議曰祖鄭元者則陳四廟之制述王肅者則引七廟之文貴賤混而莫辯是非紛而不定春秋糓梁𫝊及禮記王制祭法禮噐孔子家語並云天子七廟諸侯五廟大夫三廟士一廟尚書咸有一徳曰七世之廟可以觀徳至於孫卿孔安國劉歆班彪父子孔昆虞憙干寳之徒商較今古咸以為然故其文曰天子三昭三穆與太祖之廟而七是以晉宋齊梁皆依斯義立親廟六若使違羣經之正説從累代之疑議背子雍之篤論遵康成之舊學則天子之禮下逼於人臣諸侯之制上僭於王者非所謂尊卑有序名位不同者也臣等参詳請依晉宋故事立親廟六其祖宗之制式遵舊典制從之於是增修太廟始崇𢎞農府君及髙祖神主并舊四室為六室開元十年加置九廟移中宗神主就正廟仍創立九室其後制獻祖懿祖太祖世祖髙祖太宗髙宗中宗睿宗太廟九室也時享薦新附有虞氏四時之制春曰禴夏曰禘秋曰嘗冬曰烝其祭尚氣郊特牲云血腥爓祭用氣也法先迎牲殺之取血吿於室以降其神然後用樂而行祭事其祭貴首夏氏時祭之名因有虞其祭貴心商人禴禘嘗烝亦因虞夏之制王制云春禴夏禘秋嘗冬烝其祭尚聲郊特牲云臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以昭吿於天地之間也其祭貴肝周祭春曰祠夏曰禴秋曰嘗冬曰烝以禘為殷祭之名其祭尚臭郊特牲云周人尚臭灌用鬯臭鬱合鬯臭隂達於淵泉既灌然後迎牲致隂氣也其祭貴肺行九獻之禮其四時新物皆先薦寢廟而後食二月獻羔開氷四月以彘嘗麥七月登糓八月嘗麻九月嘗稻十二月嘗魚漢惠帝時叔孫通曰古者有春嘗果方今櫻桃熟可獻宗廟諸果之獻由此興後漢光武帝建武二年正月立髙廟於雒陽四時祫祀髙帝為太祖文帝為太宗武帝為世宗如舊餘帝不祀四時春以正月夏以四月秋以七月冬以十月及臘一嵗五祀靈帝時京都四時所祭髙廟五主世祖廟七主少帝三陵追尊后三陵凡牲用十八太牢古不墓祭漢諸陵皆有園寢承秦所為也説者以為古宗廟前廟後寢以象人君之居前有朝後有寢月令有先薦寢廟詩稱寢廟奕奕言相通也廟以藏主以四時祭寢有衣冠几杖象生之具以薦新物秦始出寢起於墓側漢因而弗改故陵上稱寢殿起居衣服象生人之具建武以来闗西諸陵以𫝊乆逺但四時特牲祀天子每幸長安謁諸陵乃太牢祠自雒陽諸陵至靈帝皆以晦望二十四氣伏臘及四時祀廟日上飯太官送用物園令食監典省其親陵所宫人随鼓漏理被枕具盥水陳嚴具魏初髙堂隆云按舊典天子諸侯月有祭祀其孟則四時之祭也三牲黍稷時物咸備其仲月季月皆薦新之祭也大夫以上將之以羔或加以犬不備三牲也士以豚庶人則唯其時冝魚鴈可也皆有黍稷禮噐曰羔豚而祭百官皆足太牢而祭不必有餘羔豚則薦新之禮也太牢則時祭之禮也詩云四月其蚤獻羔祭韭周之四月則夏之二月也月令仲春天子乃獻羔開氷季春之月天子始乘舟薦鮪仲夏之月天子乃以雛嘗黍咸薦之寢廟此則仲季月薦新之禮也宋四時祭祀將祭必先夕牲皇帝散齋七日致齋三日百官掌事者亦如之致齋之日御太極殿幄坐著絳紗袍黒介幘通天金博山冠祠之日車駕出百官應齋從駕上水一刻皇帝著平冕龍袞服升金根車到廟北門治禮謁者各引太樂令太常光禄勲三公等皆入在位皇帝降車入廟脱舄盥及洗爵訖升殿初獻奠爵樂奏太祝令跪讀祝文訖進奠神座前皇帝還本位愽士引太尉亞獻訖謁者又引光禄勲終獻皇帝不親祠則三公行事而太尉初獻太常亞獻光禄勲終獻齊永眀元年正月詔太廟四時祭薦宣皇帝麫起餅鴨􅌜孝皇后筍鴨卵脯醤炙白肉髙皇帝薦肉膾葅羮昭皇后炙魚皆所嗜也梁武帝宗廟四時及臘一嵗五享天監十六年詔曰夫神無常饗饗於克誠所以西鄰禴祭實受其福宗廟祭祀猶有牲牢無益至誠有累㝠道自今四時烝嘗外可量代八座議以大脯代一元大武八座又奏既停宰殺無復省牲之事請立省饌儀其衆官陪列並同省牲帝從之又詔今雖無復用腥猶有脯脩之類即之幽眀義為未盡更可詳定悉薦時蔬左丞司馬筠等参議大餅代脯餘悉用蔬菜從之於是至敬殿景陽臺立七廟座月中再設浄饌自是訖於臺城破諸廟遂不血食陳制一嵗五祠謂春夏秋冬臘也每祭共以一太牢始祖以三牲首餘唯骨體而已後魏孝文皇帝太和六年十一月将親祀七廟有司依禮具儀於是羣官議曰昔有虞親䖍祖考来格商宗躬謁介福攸降大魏七廟之祭依先廟舊事多不親謁今陛下孝誠發中思親執祀稽今古義禮之常典臣等謹按舊章并採漢魏故事撰􅀕服冠屨牲牢之具罍洗簠簋爼豆之器百官助祭位次樂官節奏之引升降進退之法別集為親拜之儀制可於是帝乃親祭其後四時常祀皆親之北齊制春祀夏禴秋嘗冬烝皆以孟月凡四祭每祭室一太牢武成帝始以皇后亞獻河清中定令四時祭廟及元日廟庭並設庭燎二所後周之制其四時祭各於其廟亦以皇后亞獻其儀與北齊同所異者皇后亞獻訖后又薦加豆之籩其實菱芡芹葅兎醢冢宰終獻訖皇后親徹豆降還版位然後太祝徹焉隋四時之祭各以太牢四時薦新於太廟有司行事而不出神主祔祭之禮並准時享唐四時各以其孟月享太廟室各用一太牢若品物時新堪進御者有司先送太常仍以滋味與新物相冝者配之太常卿及少卿一人奉薦太廟有司行事不出神主祫禘古者天子諸侯三年喪畢皆合先祖之神而享之以生有慶集之懽死亦備合食之禮因天道之成而設禘祫之享皆合先祖之神而享之虞夏先王崩新王元年二年喪畢而祫三年春特禴夏特禘秋特嘗冬特烝四年春特禴夏祫禘秋祫嘗冬祫烝每間嵗皆然以終其世商人先王崩新王二年喪畢而祫三年春特禘夏特禴秋特嘗冬特烝四年春特禘夏祫禴秋祫嘗冬祫烝周制天子諸侯三年喪畢禫祭之後乃祫於太祖来年春禘於羣廟爾後五年再殷祭一禘一祫禘以夏祫以秋祫祭之禮大宗伯出髙祖以下木主守祧出先王先公祧主皆入太祖后稷廟中於室中之奥西壁下東面布太祖后稷位尸在東北面太祖之子於席前之北南面為昭次昭之子在南方北面相對為穆以次而東孫與王父並列直至禰其尸各居木主之左凡七尸用九獻禘祭之禮一如祫祭所異者但祭毁廟以上不及親廟其神主按鄭康成禘祫志云大王王季以上遷主祭於后稷之廟其坐位與祫祭同文武以下遷主若穆之遷主祭於文王之廟文王居室之奥東面文王孫成王居文王之東而北面以下穆主直至親盡之祖以次繼而東皆北面無昭主若昭之遷主祭於武王之廟武王亦居室之奥東面其昭孫康王亦居武王之東而南面以次亦繼而東直至親盡之祖無穆主也其尸位后稷廟中后稷尸一昭穆尸各一文王廟中文王尸一穆尸共一武王廟中武王尸一昭尸共一後漢光武建武二十六年詔問張純禘祫之禮不行㡬年純奏舊制三年一祫毁廟之主合食髙廟存廟主未嘗合元始五年始行禘禮父為昭南向子為穆北向父子不並坐而孫從王父禘以夏四月陽氣在上隂氣在下故以正尊卑祫以冬十月五糓成熟物備禮成故骨肉合飲食今祖宗廟未定且合祭髙廟遂以為常後以三年冬祫五年夏禘之時但就陳祭毁廟主而已謂之殷祭太祖東而惠文武元四帝為昭景宣二帝為穆惠景昭三帝非殷祭時不祭也魏眀帝太和四年六月武宣皇后崩至六年三月有司以今年四月禘吿王肅議曰按春秋魯閔公二年夏禘於莊公是時縗絰之中至二十五月大祥便禘不復禫故譏其速也去四年六月武宣皇后崩二十六日晚葬除服即吉四時之祭皆親行事今當計始除服日數當如禮湏至禫月乃禘東晉昇平五年五月穆帝崩十月殷祭興寧三年二月哀皇帝崩眀年太和元年五月皇后庾氏崩十月殷祭太元二十一年十月應殷祭其九月孝武崩至隆安三年國家大吉乃殷祭元興三年夏應殷祭太常博士徐乾等議應用孟秋進用孟冬時安帝義熙三年當殷祭御史中烝范㤗議以章后喪未一周不應殷祠時從太常劉瑾議小君之喪不以廢大禮往元興三年四月不得殷祀進用十月若計常限今當用冬若更起端則應四月時尚書奏從領司徒王謐議反初四月為殷祠之始徐邈議祫三時皆可者盖喪終則吉而祫服終無常故祫随所遇唯春不祫故曰特礿非殷祀常也宋制殷祭皆即吉乃行文帝元嘉六年祠部定十月三日殷祀十三烝禮孝武大眀七年二月有司奏四月應殷祠若事中未得用孟秋詔從之梁武帝初用謝廣議三年一禘五年一祫謂之殷祭禘以夏祫以冬後魏孝文帝太和十三年詔曰鄭康成云天子祭圓丘曰禘祭宗廟大祭亦曰禘三年一祫五年一禘祫則毁廟羣廟之主於太祖廟合而祭之禘則増及百官配食者審諦而祭之魯禮三年喪畢而祫明年而禘圓丘宗廟大祭俱稱禘祭有兩禘明也王肅又云天子諸侯皆禘於宗廟非祭天之祭郊祀后稷不稱禘宗廟稱禘禘祫一名也合祭故稱祫禘而審諦之故稱禘非兩祭之名三年一祫五年一禘總而互舉故稱五年再殷祭不言一禘一祫斷可知矣然以祫為一祭王義為長以圓丘為禘與宗廟大祭同名鄭義亦為當今互取鄭王二義禘祫並為一名從王禘是祭圓丘大祭之名上下同用從鄭永為定式北齊延昌四年正月宣武帝崩孝明即位三月時議来秋七月應祫祭于太祖太常卿崔亮上言曰今宣武皇帝主雖入廟然烝嘗時祭猶別寢室至於祫祭冝存古典按禮三年喪畢祫於太祖明年春禘於羣廟又按杜元凱云卒哭而除三年喪畢而禘愚謂来秋七月祫祭應停宜待年終乃後祫禘從之唐前上元三年有司祫享于太祖廟時議者以禮緯三年一祫五年一禘公羊𫝊云五年而再殷祭兩義互文莫能斷太學愽士史元璨議曰按禮記正義列鄭康成禘祫志云春秋僖公三十三年十二月薨文公二年八月丁卯大事于太廟公羊𫝊云大事者何祫也是三年喪畢新君二年當祫明年春禘于羣廟僖公宣公八年皆有禘則後禘去前禘五年以此定之則新君二年祫三年禘自爾之後五年而再殷祭則六年當祫八年當禘又昭公十年齊歸薨至十三年喪畢當祫為平邱之會冬公如齊至十四年祫十五年禘𫝊云有事武宫是也至十八年祫二十年禘二十三年祫二十五年禘昭公二十五年有事于襄宫是也如上所云則禘後隔三年祫以後隔二年禘此則有合禮經不違傳義自此禘祫之祭依璨議臣謹按杜佑議曰聖人制禮合諸天道使不數不怠故有四時之制焉而又設殷祭者因天道之成以申孝順之心用盡事終之理禘祫二禮俱是大祭先賢所釋義各有殊馬融王肅皆云禘大祫小鄭康成注二禮以祫大禘小賈逵劉歆則云一祭二名禮無差降數家之説非無典據至於宣通經訓鄭義為長誠以禮經及春秋所書皆祫大於禘按春秋公羊傳云大事于太廟大事者祫也祫者毁廟之主陳於太祖未毁廟之主皆升合食於太祖至於禘則云禘于莊公禘于禧公既不於太祖則小於祫也又逸禮記禘于太廟之禮云毁廟之主皆升合食而立二尸又按韓詩内傳云禘取毁廟之主皆升合食於太祖則禘小於祫也祫則羣廟之主悉升於太祖廟禘者各於其廟而行祭禮二祭俱及毁主禘之時文王以上毁主自在后稷廟而祭文王以下毁主自在二祧之廟而祭禘則小於祫而大於四時也曽子問主夫子云自非祫祭七廟五廟無虛主而不言禘小於祫眀矣其祫備五齊三酒禘唯四齊三酒祫則備六代之樂禘則四代而下又無降神之樂以示其闕也功臣配享盤庚云兹子大享于先王爾祖其從與享之周制凡有功者銘書於王之太常祭于大烝司勲詔之漢制祭功臣於庭生時侍燕於堂死則降在庭位與士庶為例魏髙堂隆議曰按先典祭祀之禮皆依生前尊卑之序以為位次功臣配食於先王像生時侍讌燕禮大夫以上皆升堂以下則位於庭其餘則與君同牢至於俎豆薦羞唯君備公降於君卿大夫降於公士降於大夫使功臣配食於烝祭所以尊崇其徳明其勲以勸嗣臣也議者欲從漢氏祭之於庭此為貶損非寵異之位也貴者取貴骨賤者取賤骨今使配食者因君之牢以貴賤為俎庶合事冝周志曰勇則害上不登於明堂共用謂之勇言有勇而無義死不登堂而配食此則配食之義位在堂之明審也下為北面三公朝立之位耳燕則脱屨升堂不在庭也晉散騎常侍任茂議按魏功臣配食禮叙六功之勲祭陳五祀之品或祀之於一代或傳之於百代盖社稷五祀所謂傳之於百代者古之王臣有明徳大功若勾龍之能平水土柱之能樹百糓則祀社稷異代不廢也昔湯既勝夏欲遷其社不可乃遷稷周棄徳可代柱而勾龍莫廢也若四叙之屬分主五方則祀為貴神傳之異代載之春秋非此之類則雖明如咎繇勲如伊尹功如吕尚各於當代祀之不祭於異代也然則伊尹於商雖有王功之茂不配食於周之清廟以今之功臣論其勲績比咎繇伊尹呂尚猶或未及凡云配食各配食於主也今主遷廟臣冝從饗大司馬石苞等議魏代功臣冝歸之陳留國使脩常祀允合事理唐貞觀十六年有司言禮功臣配享於廟庭禘享則不配依令禘祫之日功臣並得配享請集禮官學士等議太常卿韋挺等議曰古者臣有大功享禄其後子孫率禮潔粢豐盛礿祠烝嘗四時不輟國家大祫又得配享焉所以昭明其勲尊崇其徳以勸嗣臣也其禘及時享功臣皆不應享故周禮六功之官皆配大烝而已先儒皆以大烝為祫祭梁初誤禘功臣左丞何佟之駮議武帝允而依行降暨周齊俱遵此義禮禘無配功臣理不可易從之其儀具開元禮天子七祀諸侯附商制天子祭五祀戶一竈二中霤三門四行五也嵗徧凡祭五祀於廟門戶主出入竈主飲食中霤主堂室居處行主道路諸侯大夫與天子同周制王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰戶曰竈諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲大夫立三祀曰族厲曰門曰行嫡士立二祀曰門曰行庶人立一祀或立霤竈或立戶漢立五祀白虎通云戶一祀春祭竈二祀夏祭門三祀秋祭井四祀冬祭中霤五祀六月祭嵗一徧有司行事禮頗輕於社稷祭祀天子諸侯以牛因四時祭物也祀戶以牛竈以雞中霤以牛門以犬井以豕或曰中霤用牛不得用牛者用豕井用魚也後漢建武初有五祀之祭門戶井竈中霤也有司掌之其祀簡於社稷矣人家祀山神門戶山即厲也鬼有歸所乃不為厲魏武王始定天下興復舊祀而造祭五祀門戶井竈中霤也晉傅元云帝之都城冝祭一門正宫亦祭一門正室祭一戶井竈及中霤各擇其正者祭之以後諸祀無聞唯司命配享于南郊壇隋制其司命戶以春竈以夏門以秋行以冬各於享廟日中霤則以季夏祀黄郊日各命有司祭於廟西門道南牲以少牢唐初廢七祀唯季夏祀祭中霤開元中制禮祭七祀各因時享祭之於廟庭司命戶以春竈以夏門厲以秋行以冬中霤以季夏其儀具開元禮上陵拜掃及諸節上食附三代以前無墓祭至秦始出寢起於墓側漢因秦上陵皆有園寢故稱寢殿起居衣服象生人之具古寢之意也後漢都雒陽以闗西諸陵乆逺但四時特牲祀每帝西幸即親謁其雒陽陵毎正月上丁郊廟畢以次上陵百官四姓親家婦女公主諸王大夫袁宏漢紀曰明帝永平元年為外戚樊氏郭氏隂氏馬氏諸子弟立學號曰四姓小侯獨㫁曰凡與先后有𤓰葛者外國朝者侍子郡國計吏㑹陵晝漏上水大鴻臚設九賔随立寢殿前薛琮曰九賔謂王侯公卿二千石六百石下及即吏匈奴侍子共九等也鐘鳴謁者引客羣臣就位如儀乘輿自東廂下太常導出西向拜止旋升于階拜神座退後公卿羣臣謁神座太官上食太常樂奏食舉舞文始五行之舞文始舞者本舜韶舞也髙祖更名文始以示不相襲也五行舞者本周舞也秦始皇更名五行之舞也禮樂闋羣臣受賜食畢郡國上計吏以次前當神軒吿其郡糓價民所疾苦欲神知其動静孝子事親盡敬愛之心也最後親陵遣計吏賜之帶珮八月飲酎上陵禮亦如之靈帝以晦朔二十四氣伏臘及四時祠廟日於陵所上飯宫人随鼓漏理被枕盥水陳嚴具魏文帝詔曰先帝躬履節儉遺詔省約子以述父為孝臣以繫事為忠古不墓祭皆設於廟先帝髙平陵上殿皆毁壞車馬還廐衣服藏府以從先帝儉徳之志遂革上陵之禮文帝自作終制又曰夀陵無立寢殿造園邑自後園邑寢殿遂絶及齊王在位九載始一謁髙平陵晉宣王遺令子弟羣官皆不得謁陵景文遵㫖至武帝猶再謁崇陽陵景帝陵一謁峻平陵文帝陵然遂不敢謁髙原陵宣帝陵至恵帝復止也東晉元帝崩後諸公始有謁陵之事盖由眷同友執率情而舉也成帝時中宫亦年年拜陵議者以為非禮遂止以為定制穆帝㓜冲禇太后臨朝又拜陵至孝武崩驃騎将軍㑹稽王道子曰今雖權制釋服至於朔望諸節自應展情陵所以一周為斷於是至陵變服單衣煩凟無准非禮也及安帝元興元年左僕射桓謙奏百僚拜陵起於中興非晉舊典積習生常遂為近法尋武帝詔乃不使人主諸王拜陵及義熙初又復江左之舊宋文帝每嵗正月謁初寧陵武帝陵孝武明帝亦每嵗拜初寧長寧陵文武陵後魏太和十六年九月辛未孝文帝哭於文明太后陵左終日不絶聲素幕越音活席為次侍臣侍哭壬申孝文又哭如昨帝二日不御食癸酉朝中夕三時哭拜於陵前夜宿鑒元殿甲戍帝拜哭辭陵還永樂宫唐貞觀十三年太宗朝于獻陵先設黄麾仗周衞陵寢至質明七廟子孫及諸侯百僚蕃夷君長皆陪列于司馬門内太宗至小次降輿納屨哭入闗門西再拜慟絶不能興禮畢改服入于寢躬親執饌閲視髙祖先后服御之物悲慟左右侍御者莫不歔欷禮畢太宗出自寢宫歩過司馬門泥行二百餘步上入寢哭踊絶於地進至東階西面再拜號慟乆之乃進太牢之饌加珍羞具品引太尉無忌司空績越王貞趙王福曹王明及左屯衛將軍程知節並入執爵進爼上至神座前拜哭奠饌閲先帝先后衣服拜辭訖行哭出寢北門乃御小輦還宫髙宗永徽二年有司言謹按獻陵三年之後每朔及月半上食其冬夏至伏臘清明社等節日亦上食其昭陵請依獻陵故事上從之六年正月謁于昭陵有司先設儀衞於陵寢質明七廟子孫二王後百僚州鎮蕃牧四夷君長等並陪列于位皇帝降輦入次易服出次行哭就位再拜僻踊慟絶禮畢又改服奉謁寢宫其妃嬪公主先於神座左右侍列如平生帝入寢門即哭瞻視幄座踊絶于地進至東階西面再拜號哭乃進牢饌珍羞引三公諸王並入執爵進爼帝至神座前再拜哭自奠饌閲先帝先后衣服更増感絶拜辭訖行哭出寢北門中宗景龍中毎日奠祭太常博士彭景直上疏曰謹按三禮無諸陵日祭之事又按禮論譙周祭志云天子之廟始祖及髙祖祖考皆毎月朔加薦新以象平生朔食也謂之月祭二祧之廟時祭無日祭之文又鄭氏注儀禮云月朔月半猶平常之朝夕也大祥之後即四時焉此則古者祭皆在廟近代以来始分月朔月半及諸節日祭於陵寢至後漢陵寢致祭無明文自魏三祖以下不於陵寢致祭並附於古禮至江左亦不崇園寢及齊梁陳其祭無聞今参詳以為三禮者不刋之書外傳所記不與經合不可依憑其諸陵請准禮停日祭不從詔乾陵冝依舊朝晡進奠昭獻二陵毎日一進以為常式舊制毎年四季之月常遣使往諸陵起居太常博士唐紹上疏曰自安宅兆禮不祭墓當謂送形而往山陵為幽静之宫迎精而返宗廟為享薦之室但以仲月命使廵陵鹵簿衣冠禮容必備自天授以後時有起居因循至今乃為常事起者以起動為稱居者以居止為名敢辭命使勞煩但恐不安靈域又降誕之日穿針之辰皆以續命為名時人多有進奉今聖靈日逺仙駕難攀進止起居恐乖先典請停四季及降誕并節日起居陵使但准式二時廵陵庶合禮經不從開元二十年四月制曰寒食上墓禮經無文近代相傳浸以成俗士庶有不合廟享何以用展孝思冝許上墓同拜掃禮不得作樂仍編入五禮永為定式二十三年四月勅獻昭乾定橋恭六陵朔望上食嵗冬至寒食日各設一祭如節祭共朔望日相逢依節祭料橋陵除此日外仍每日進半口羊食天寶二年七月勅詩著授衣令存休澣在於臣子猶及恩私㳟事園陵未標令式自今以後每至九月一日薦衣于陵寢貽範千載庶展孝思臣謹按上陵之禮謝承漢書曰靈帝建寧五年正月車駕上原陵蔡邕為司徒掾從上行到陵見其儀慨然謂同座者曰聞古不墓祭朝廷有上陵之禮始為可損今見其儀察其本意乃知孝明帝至孝惻隐不可易舊或曰本意云何昔京師在長安時其禮不可盡得聞也光武即世始𦵏于此明帝嗣位踰年羣臣朝正感先帝不復聞見此禮乃率公卿百僚就園陵而創焉尚書階西設神座天子事亡如事存之意也茍先帝有𤓰葛之屬男女畢會王侯大夫郡國計吏各向神座而言庶幾先帝神魂聞之以明帝聖孝之心親服三年乆在園陵初興此儀仰察几筵下顧羣臣悲切之心必不可堪邕見太傅胡廣曰國家禮有煩而不省者不知先帝之用心周宻之至於此也廣曰然子冝載之以示學者邕退而記焉又按飲酎之禮丁孚漢儀曰酌金律文帝所加以正月旦作酒八月成名曰酎酒因令諸侯助祭貢金漢律金布令諸侯列侯各以民口數率千口奉金四兩竒不滿千口至五百口亦四兩皆會酎少府受又九真交趾日南者用犀角二長九寸以上若玳瑁甲一鬱林用象牙長三尺以上若翡翠各二十准以當金漢舊儀曰皇帝於八月酎車駕夕視牲以鑑燧取水於月取火於日為明水火左袒以水沃牛右肩手執鸞刀以切牛毛薦之而即更衣侍中上熟乃祀釋奠周制凡始立學必釋奠于先聖先師及行事必以幣凡學春官釋奠于先師秋冬亦如之官謂禮樂詩書之官也周禮凡有道者有徳者使教焉死則以為樂祖祭於瞽宗此謂先師之類不言夏從春可知釋奠者設薦饌酌奠而已無迎尸以下之事始立學者既釁器用幣禮樂之器成則釁之又用幣吿先聖先師以器成也然後釋莱祭莱示敬道也鄭康成曰禮先聖先師也莱芹藻之屬也天子視學大昕鼓以警衆也衆至然後天子至乃命有司行事祭先師先聖焉有司卒事反命天子乃命將出征受命於祖吿祖也受成於學定兵謀也出征執有罪反釋奠于學以訊馘吿釋莱奠幣禮先師也詩云在頖獻馘魏齊王正始中有講經徧輙使太常釋奠於辟雍以太牢祠孔子以顔囘配晉武帝泰始七年恵帝元康三年二釋奠皆於太學㤗始六年元康五年二行鄉事皆於辟雍郷事郷飲酒禮也恵帝愍懷之為太子皆講經竟並親釋奠於太學東晉明帝之為太子亦行釋奠禮成穆孝武三帝皆親釋奠唯成帝在辟雍自是一時制也孝武以太學在水南懸逺有司議依穆帝升平元年於中堂權立行太學釋奠禮畢㑹百官六品以上有司奏應須二學生百二十人太學生取見人六十而無國子生權銓大臣子孫六十人事訖罷之宋文帝元嘉二十二年太子釋奠採晉故事裴松之議應舞六佾冝設軒懸之樂牲牢器用悉依上公祭畢臨學宴會太子以下悉在齊武帝永明三年有司奏宋元嘉舊事學生到先釋奠先聖先師禮又有釋莱未詳今當行何禮用何樂及禮器時從喻希議用元嘉故事設軒懸之樂六佾之舞牲牢器用悉依上公梁武帝天監八年皇太子釋奠周捨議既唯大禮請依東宫元會太子著絳紗襮音博衣領也樂用軒懸合升殿坐者皆服朱衣帝從之又有司以為禮云凡為人子者升降不由阼階吏部郎中徐勉議鄭元云由命士以上父子異宫宫室既異無不由阼階之禮請釋奠及宴㑹太子升堂並冝由東階若輿駕幸學自然中階其會賔客依舊西階大同七年皇太子表其子寧國臨城公入學時議者以與太子有齒胄之議疑之臣纘等以為参㸃囘路並事宣父鄒魯稱盛洙汶無譏制可北齊將講於天子先定經於孔子廟講畢以一太牢釋奠孔宣父配以顔囘列軒懸樂六佾舞皇太子毎通一經及新立學必釋奠禮先聖先師毎嵗春秋二仲常行其禮毎月朔祭酒領博士以下及國子諸學生以上太學四門博士升堂助教以下太學諸生階下拜孔子揖顔囘日出行事其郡學則於坊内立孔顔廟博士以下亦每月朝隋制國子寺毎嵗四仲月上丁釋奠於先聖先師年别一行郷飲酒禮州縣學則以春秋仲月釋奠亦毎年於學一行郷飲酒禮唐武徳二年於國子學立周公孔子廟各一所四時致祭貞觀二十一年制左邱明以下二十二人同享初以儒官自為祭主直云博士姓名昭吿於先聖又州縣釋奠亦博士為主許敬宗奏曰秦漢釋奠無文魏氏則太常行事自晉宋以降時有親行而學官為主全無典實在於臣下理不合專令請國學釋奠令國子祭酒為初獻詞稱皇帝謹遣仍令司業為亞獻博士為終獻其州學刺史為初獻上佐為亞獻博士為終獻縣學令為初獻丞為亞獻主簿及尉通為終獻循附禮令以為永制景龍二年七月皇太子將親釋奠於國學有司草儀注令從臣皆乘馬著衣冠太子左庶子劉知㡬進議曰古者自大夫以上皆乘車而以馬為騑服魏晉以降迄于隋氏朝士又駕牛車至如李廣北征解鞍憇息馬援南征據鞍顧盻斯則鞍馬之設行於軍旅戎服所乘貴於便習者也按江左官至尚書郎而輙輕乘馬則為御史所彈又顔延年罷官後好騎馬出入閭里當時稱其放誕此則專車憑軾可擐朝衣單馬御鞍冝從䙝服求之近古灼然之明騐也褎衣博帶方履髙冠本非馬上所施自是車中之服且長裙廣袖襜如翼如鳴佩紆組鏘鏘奕奕馳驟於風塵之内出入於旌棨之間倘馬有驚逸人從顛墜遂使屬車之右遺屨不收清道之傍絓驂相續因以受􅅓行路有損威儀其乘馬衣冠竊謂冝從廢改皇太子令付外宣行仍編入令以為常式開元十一年詔春秋釋奠用牲牢其屬縣用酒脯而已二十七年八月因釋奠文宣王始用宫懸之樂二十八年二月􅃯文宣王廟春秋釋奠宜令攝三公行禮著之常式國子祭酒劉瑗奏准故事釋奠之日羣官道俗等皆合赴監觀禮請依故事著之常式制可其儀具開元禮祀先代帝王名臣附漢武帝時有人言古者天子以春解祠祠黄帝用一梟破鏡方士云以嵗始祓除凶災令神仙之帝食惡逆之物使天下為逆者破滅梟名食母破鏡名食父如貙而虎眼黄帝欲絶其類使百吏祠皆用焉漢使東郡送梟五月五日作羮以賜百官解祠者解罪求福也後漢章帝元和春東廵狩使使者奉一太牢祠帝尭於濟隂魏武帝少時漢太尉橋元獨先禮異焉故建安中遣使祠以太牢東晉孝武帝寧康三年七月故事祀臯陶於廷尉寺新禮移祀於律署以同祭先聖於太學舊祀以社日新改用孟秋以應秋政後魏文成帝東廵厯橋山祀黄帝孝文太和十六年詔曰法施於人祀有明典立功埀恵祭有常式其孟春應祀者頃以事殷遂及今日可令以仲月而饗祀焉凡在祀令者有五帝尭樹則天之功興巍巍之治可祀於平陽舜播太平之風致無為之化可祀於廣寗禹禦洪水之災建天下之利可祀於安邑周文公制禮作樂垂範萬葉可祀於洛陽其宣尼廟已於中省別􅃯有司行事自文公以上可令當界牧守各随所近攝行祀事皆用清酌尹祭也曲禮曰脯曰尹祭隋制使祀先代王公帝尭於平陽以契配帝舜於河東咎繇配夏禹於安邑伯益配商湯於汾隂伊尹配文王武王於豐渭之郊周公召公配漢帝於長陵蕭何配各以一太牢而無樂配者享於廟庭唐前脩禮令無祭先代帝王之文禮部尚書許敬宗等奏謹按禮記祭法云聖王之制祭祀也法施於人以死勤事以勞定國能禦大災能捍大患則祀之始皇無道所以棄之漢祖典章法垂於後自隋以上亦在祠列今請聿遵故實三年一祭以仲春之月天寶六載正月制三皇置一廟五帝置一廟有司以時祭享至七載五月詔三皇以前帝王宜於京城内共置一廟仍與三皇五帝廟相近以時致祭天皇氏地皇氏人皇氏有巢氏燧人氏其祭料及樂請准三皇五帝廟以春秋二時享祭厯代帝王肇跡之處未有祠宇者所由郡置一廟享祭仍取當時將相德業可稱者二人配享老君祠先賢附後漢延熹八年使中常侍之陳國苦縣祠老子九年親祠老子於濯龍中文罽為壇飾純金釦器設華盖座用郊天樂唐乾封元年追號老君為太上元元皇帝文明元年九月冊老君妻為先天太后立尊像於老君廟所開元二年三月親祠元元皇帝廟追尊元元皇帝父周上御史大夫敬為先天太皇仍於譙郡置廟嵗餘一祀以上准先天太后廟例二十九年兩京及諸州各置廟一所并置崇元舘天寶元年親祠元元廟又於古今人表升元元皇帝為上聖時同制荘子號南華真人文子號通元真人列子號冲虛真人庚桑子號洞靈真人又以其所著之書並為經其年九月改兩京元元廟為太上元元皇帝宫二載西京改為太清宫東京改為太微宫天下諸郡為紫極宫祝版改為清詞於紙上十三載正月令有司毎至孟月則脩薦獻上香之禮仍為常式七載五月詔修漢張天師冊贈太師梁貞白陶先生冊贈太保貞元元年正月勅薦享太清宫亞獻太常卿充終獻光禄卿充仍永為常式孔子祠先儒附漢元帝時孔霸以帝師賜爵號襃成君奉孔子後平帝元始初追諡孔子曰褒城宣尼公追封孔均為褒城侯後漢光武建武十三年封均子志為褒城侯章帝元和二年二月東廵狩因幸魯祠孔子七十二弟子漢晉春秋曰闕里者仲尼之故宅也在魯城中帝升廟西面羣臣中庭北面皆再拜帝進爵而後坐東觀書曰祀禮畢命儒者論難也和帝永元四年徙封為褒尊侯相𫝊至獻帝初國絶魏文帝黄初二年以孔子二十一代孫議郎羡為宗聖侯邑百戶奉孔于祠令魯郡修舊廟置百戶吏卒守衛晉武帝㤗始三年改封孔子二十三代孫宗聖侯震為奉聖亭侯又詔大學及魯國四時備三牲以祀孔子明帝太寧三年詔給奉聖亭侯四時祀孔子祭冝如㤗始故事宋文帝元嘉八年奉聖侯有罪奪爵至十九年又授孔隐之隐之兄子熙先謀逆又失爵二十八年更以孔恵雲為奉聖侯後有重疾失爵孝武大明二年以孔邁為奉聖侯邁卒子􅀢詡俱反嗣有罪失爵後魏封孔子二十七葉孫乗為崇聖大夫孝文帝太和十九年改封二十八葉孫珍為崇聖侯文成帝詔其宣尼之廟當别勅有司行薦饗之禮北齊改封三十一葉孫為恭聖侯後周武帝平齊改封鄒國公隋文帝仍舊封鄒國公煬帝改為紹聖侯唐貞觀十一年封孔子裔徳倫為褒聖侯二十一年制曰左邱明卜子夏公羊髙糓梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭康成服䖍何休王肅王弼杜預范寗賈逵總二十二人並為先師永徽中制令改周公為先聖黜夫子為先師顔囘左邱明從祀顯慶二年禮部尚書許敬宗等奏曰准貞觀二十一年詔以孔子為先聖更添左邱明等二十二人與顔子俱配宣父於太學並為先師今據永徽令改周公為先聖黜孔子為先師顔囘左邱明並為從祀按禮記凡學官春釋奠于先師鄭康成注曰官謂詩書禮樂之官也先師者若禮有髙堂生樂有制氏詩有毛公書有伏生可以為之又曰始立學釋奠于先聖鄭注曰若周公孔子也聖則非周即孔師則偏善一經漢魏以来取捨各異顔囘夫子互作先師宣父周公更為先聖求其節文互有得失所以貞觀之制正夫子為先聖加衆儒為先師而今新令輙事刋改但周公攝政制禮作樂功比王者祀之儒館實貶其功仲尼生衰周之末拯文喪之弊祖述尭舜憲章文武宏聖教於六經闡儒風於千載故孟軻稱生民以来一人而已自漢以降奕葉繼侯崇奉其聖迄于今日胡可降兹先􅈒俯入先師且又邱明之徒見行其學貶為從祀亦無故事今請改令從詔於義為允其周公仍依舊禮配享武王也髙宗乾封元年正月東廵次兗州鄒縣頓祭宣父廟贈太師總章元年二月皇太子詣學贈顔囘太子少師曽参太子少保神龍初詔以鄒魯百戶封崇道公宣尼采邑用供薦享又授裔孫襃聖侯崇階朝散大夫仍許子孫以相傳襲開元八年􅃯改顔子等十􅈒為坐像悉應從祀曽参大孝徳冠同列特為塑像坐於十哲之次圗畵七十子及二十二賢於廟壁上以顔子亞聖親為之贊以書於后閔損以下令當朝文士分為之贊時國子司業李元瓘奏稱先聖孔宣父廟先師顔子配坐今其像立侍配享合坐十􅈒弟子雖復列像廟堂不應享祀謹檢祠令何休范寗等二十二賢猶霑從祀其十􅈒請春秋釋奠列享在二十二賢之上七十子請圖形於壁兼為立贊又曽参孝道可崇獨受經於夫子請准二十二賢應饗二十七年八月制夫子追贈諡為文宣王宜令三公持節冊命並撰儀注昔縁周公南面夫子西坐今位既有别坐豈仍舊冝補其墜典永作常式自今以後夫子南面而坐内出王者袞冕之服以衣之十哲等東西列侍顔淵既云亞聖湏優其秩顔子淵贈兗國公閔子騫贈費侯冉伯牛贈鄆侯冉仲弓贈薛侯宰子我贈齊侯端木子貢贈黎侯冉子有贈徐侯仲子路贈衛侯言子游贈呉侯卜子夏贈魏侯又夫子格言参也稱魯雖居七十之數不載四科之目頃雖参於十􅈒終未殊於等倫乆稽先㫖俾修舊位庶乎禮得其序人焉式瞻命尚書右丞相裴耀卿攝太尉持節就國子廟冊冊畢所司奠祭亦如釋奠之禮又遣太子少保崔琳往東都就廟行冊禮又勅兩京及兗州舊宅廟像冝改服袞冕其諸郡及縣廟宇既小但移南面不湏改衣服兩京樂用宫懸春秋二仲上丁令三公攝行事七十子並冝追贈曾参贈郕伯顓孫師贈陳伯澹臺滅明贈江伯宓子賤贈單伯原憲贈原伯公冶長贈莒伯南宫子容贈郯伯公晳哀贈郳伯曽㸃贈宿伯顔路贈把伯商瞿贈䝉伯髙柴贈共伯漆雕開贈滕伯公伯寮贈任伯司馬牛贈向伯樊遲贈樊伯有若贈卞伯公西赤贈郜伯巫馬期贈鄫伯梁鱣贈梁伯顔桞贈蕭伯冉孺贈紀伯曹䘏贈曹伯伯䖍贈聊伯公孫龍贈黄伯冉季贈東平伯秦子南贈少梁伯漆雕子歛贈武城伯顔子驕贈瑯邪伯漆雕徒父贈須句伯壤駟赤贈北徴伯商澤贈睢陽伯石作蜀贈石邑伯任不齊贈任城伯公夏首贈亢父伯公良孺贈東牟伯后處贈營邱伯秦子開贈彭衙伯奚容箴贈下邳伯公肩定贈新田伯顔襄贈臨沂伯鄡單贈銅鞮伯句井疆贈淇陽伯罕父黒贈乘邱伯秦商贈上洛伯申黨贈邵陵伯公祖子之贈期思伯榮子祺贈雩婁伯縣成贈鉅野伯左人郢贈臨淄伯燕伋贈漁陽伯鄭子徒贈滎陽伯顔之僕贈東武伯原亢籍贈莱蕪伯樂欬贈昌平伯廉絜贈莒父伯顔何贈開陽伯叔仲會贈瑕邱伯狄黒贈臨濟伯邽巽贈平陸伯公西輿如贈重邱伯公西葴贈祝阿伯孔忠贈汶陽伯蘧瑗贈衛伯施恒贈乘氏伯林放贈清河伯秦非贈汧陽伯陳亢贈潁伯申棖贈魯伯琴牢贈南陵伯顔噲贈朱虛伯琴張贈南陵伯今考琴牢即琴張疑重出歩叔乘贈淳于伯太公廟唐開元十九年四月兩京及天下諸州各置太公廟一所以張良配享春秋取仲月上戊日祭毎出師命將就廟引辭仍簡取自古名將功成業著宏濟生人者十人准十哲例霑享至乾元元年九月十二日太常少卿于休烈奏臣昨因秋享漢髙祖廟見旁無侍臣享太公廟有張良在側良實漢佐命請移配享於漢祖廟從之上元元年追封太公望為武成王依文宣王置廟仍擇古今名將准文宣王置亞聖及十哲等享祭之奠一同文宣王廵狩唐虞五載一廵狩嵗二月東廵狩至于岱宗柴望秩于山川羣后四朝肆覲東后協時月正日同律度量衡脩五禮五玉三帛二生一死贄五月南廵狩至于南嶽八月西廵狩至于西嶽十有一月北廵狩至于北嶽皆如岱宗之禮歸格于藝祖用特夏后氏因之周制十二年一廵狩天子將廵狩類於上帝冝乎社造乎禰乗金輅建大旂嵗二月東廵狩至于岱宗柴望祀于山川而覲諸侯其方之諸侯先於境首待之所過山川則使祀宗先以三等璋瓚皆以黄金為勺酌鬱鬯以禮神次乃校人殺黄駒以祭之既至方嶽先問百年就見之若八十九十者路經其門則見之不然則不天子乃令太師採民之歌謡以樂播而陳之以觀風俗以審善惡令典市之官陳百物之貴賤以觀民之好惡又命典禮之官考校四時節氣月之晦朔甲乙等日及候氣之律吕所用禮樂宫室車旗等制度君臣上下之衣服皆以王者所頒制度考校之諸侯封内有名山大川不舉而祭之者為不敬削其地有祭宗廟不順昭穆者為不孝絀其爵變禮易樂者為不從其君流革制度衣服者為畔其君討有功徳於民者加地進律其諸侯待王之牢禮以一犢既黜陟諸侯乃與之相見方嶽之下築壇與覲禮壇制同其壇外為土埒方三百歩謂之宫開四門壇方九丈六尺髙四尺上為堂下為三等謂之三成成毎等髙一尺其堂上置司盟之神位謂之方明諸侯之上介各以其君之旂置於宫内以表立位之處詔王升壇訖諸侯皆就其旂而立其位鄭氏按明堂位云諸公中階之前北面東上諸侯阼階之東西面北上諸伯西階之西東面北上諸子門東北面西上諸男門西北面東上王乃於壇上揖之以定其位諸侯乃進升壇奠玉公於上等奠桓圭侯伯於中等奠信圭躬圭子男於下等奠糓璧蒲璧諸侯各奠玉訖降拜又升成拜訖擯者乃延諸侯升堂授王玉訖乃以璧琮行享禮謂之將幣玉人云璧琮九寸諸侯以享天子是也諸侯既朝見王訖乃退而自相與盟王宫之伯臨之其五月南廵狩至于南嶽如東廵狩之禮八月西廵狩至于西嶽如南廵狩之禮十有一月北廵狩至于北嶽如西廵狩之禮廵狩訖却歸毎廟用一牛以吿至謂之歸格于祖禰用特秦始皇三年東廵狩郡縣祠鄒嶧山頌功業其年復逰海上三年逰碣石從上郡歸五年始南至湘山遂登㑹稽並海到沙邱崩此求神仙奇藥之術無復觀民風問百年也並歩浪反下同二世元年東廵碣石並海南厯泰山至會稽皆禮祠之而勒始皇所立石書旁以彰始皇之功徳漢武帝元狩四年始廵郡縣􅐛尋於㤗山元封初復至海上又北至碣石又自遼西厯北邉至九原五月乃至甘泉周萬八千里武帝亦如秦始皇之事後漢光武建武三十年三月幸魯漢祀令曰天子行有所之至河沈白馬珪璧各一衣以繒緹五尺祠用脯二東酒六升鹽一升渉渭灞涇洛他名水如此者沉圭璧各一律在所給祠具及行沉祠他川水先驅投石少府給璧珪不滿百里者不沉過㤗山祭㤗山及梁父章帝元和二年二月東廵狩使使者奉一太牢祠帝堯於濟隂成陽靈臺至泰山辛未柴􅀕天地羣神如故事壬申宗祀五帝於孝武所作汶上明堂光武配卒事遂覲東后饗賜王侯羣臣因行郡國幸魯祠東海㳟王孔子七十二弟子四月還京師庚申吿至祠髙祖光武廟各一特牛安帝延光三年東廵狩至泰山柴祭及祠汶上明堂如元和中故事魏明帝凡三東廵狩所過存問髙年恤疾苦或賜糓帛有古廵幸之風焉齊王正始中廵洛陽縣賜髙年力田各有等差晉初新禮廵狩方嶽柴望吿至設壝宫如禮諸侯之覲者儐及執贄皆如朝儀而不建旂摯虞以覲禮諸侯各建其旂章所以殊爵命示等威詩稱君子至止言觀其旂宜定新禮建旂如舊禮詔可其議然終晉代其禮不行武帝㤗始四年詔使使持節侍中黄門侍即衘命四出周行天下其萬民之利害為一書禮俗政事教理刑禁逆順為一書悖逆暴亂作慝犯令為一書札喪荒凶厄貧為一書康樂和親安平為一書毎國辨異之以反命于王宋文帝元嘉四年二月東廵狩至于丹徒吿覲園陵三月饗㑹父老勲舊于行宫加賜衣裳幣帛蠲租原刑戰亡之家及單孤随冝隐䘏二十六年二月東廵幸至京城并謁二陵㑹舊京故老萬餘人饗勞賚發赦蠲徭役後魏文成帝和平元年正月東廵狩厯橋山祀黄帝遼西遥祀醫無閭山遂縁海幸冀州北至中山過恒嶽禮其神而返明年南廵過石門遣使者用玉璧牲牢禮恒嶽隋煬帝自文帝山陵纔畢即事廵逰乃慕始皇漢武之事西征東幸無時暫息六宫與文武吏士常十餘萬人然非省方展義之行也唐皇帝將廵狩所司承制先頒吿于東方諸州曰皇帝二月東廵狩各修平乃守考乃職事駕將發吿圜丘宗廟社稷皆如開元禮髙宗調露元年九月幸并州令度支郎中狄仁傑為知頓使并州長使李知元以道出妬女祠俗云盛衣服過者必致風雷之變遂發數萬人别開御道仁傑曰天子之行千乘萬騎風伯清塵兩師灑道何妬女之害遽令罷之上聞之歎曰真大丈夫也封禪古者帝王之興毎易姓而起以致太平必封乎泰山所以告成功也禮云因名山升中于天封禪必於㤗山者萬物交代之處封増其髙順其類也升上也中成也刻石紀號著功績封訖而禪梁父亦以吿太平也封禪者髙厚之道也封土於山而禪祭於地天以髙為尊地以厚為徳増㤗山之髙以報天厚梁父之階以報地梁父者泰山之支山卑下者也能以其道配成髙徳故禪梁父亦以吿太平也無懷氏封泰山禪云云管仲對齊桓公曰古者封㤗山禪梁父者七十二家而夷吾所記者十有二焉韓詩外傳曰孔子升泰山觀易姓而王可得而數者七十餘氏不可得而數者萬數袁准正論曰惟周官有王大封之文按成王封禪而文武皆不在七十二君而無一言見于經傳學者疑焉晉灼曰云云山在䝉隂縣故城北東下有云云亭伏羲神農並因之黄帝禪亭亭晉灼曰漢地理志鉅平有亭亭山顓帝帝嚳尭舜復禪云云禹禪㑹稽湯依禪云云其所封皆於泰山也周成王封泰山禪社首社首山晉灼曰在鉅平十二里其儀不存襄王時齊桓公既霸㑹諸侯於葵邱而欲封禪謂管仲曰寡人兵車之㑹三而乘車之㑹六九合諸侯一匡天下諸侯莫違我昔三代受命亦何以異於是管仲覩桓公不可窮以辭因説之以事曰古之封禪必鄗上之黍北里之禾所以為盛江淮之間一茅三脊所以為籍也東海致比目之魚西海致比翼之鳥然後物有不召而自至者十有五焉今鳳凰麒麟不至嘉禾不生而欲封禪無乃不可乎於是桓公乃止秦始皇平天下二年東廵郡縣祠鄒嶧山紀秦功業於是召齊魯儒生七十人至于泰山下諸儒或議曰古者封禪為蒲車惡傷山之土石草木掃地祭席用葅稭音戞禾藁也去其皮以為席言其易遵也始皇聞此議各乖異難施用由此黜儒生而遂除車道上自泰山陽至巔立石頌徳文曰事天以禮立身以義事父以孝成人以仁四守之内莫不郡縣四屬八蠻咸来貢職民庶蕃息天禄永得刻石改號文出晉太康郡國志有金冊石函金泥玉檢之事焉從隂道下禪梁父其禮頗采泰祝之祀雍上帝所用封藏而皆祕之固不得而記之封禪之後十一嵗秦亡諸生疾秦焚詩書戮文學皆偽曰始皇上太山為風雨所擊不得封禪漢武帝立二十八年元鼎中汾得寶鼎遂議封禪而羣儒不能知其儀又牽拘於詩書古文於是帝盡罷諸儒用方士言以三月東上泰山立石泰山之巔石髙三丈一尺方博皆三尺壇及墠皆廣長十二丈増髙三尺帝因東至海上四月還至奉髙晉太康郡國志曰奉髙戶千五百六戶此為奉髙者以祀東嶽帝王禪代之處是以殊之也故有明堂在縣西南四里又有奉髙宫又至梁父禮祠地主乙卯令侍中儒者皮弁薦紳射牛行事封泰山下東方如郊祀太一之禮封廣丈二尺髙九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車子侯霍去病子也上㤗山亦有封其事皆禁明日下隂道丙辰禪㤗山下趾東北肅然山晉太康郡國志曰漢武封泰山禪梁父参諸家所說冝肅然為定也如祭后土禮天子皆親拜見衣尚黄而盡用樂焉江淮間一茅三脊為神籍五色土益雜封縱逺方竒獸蜚禽及白雉諸物頗以加禮兕牛犀象之屬不用皆至泰山然後去封禪祠其夜若有光晝有白雲起封中天子從禪還坐明堂羣臣更上夀改元為元封時作明堂汶上太史公曰其封禪之禮則有司存而漢史不得其制後漢光武建武三十年羣臣上言冝封禪泰山詔書曰即位三十年百姓怨氣滿腹吾誰欺欺天乎三月帝幸魯祭泰山及梁父三十二年詔梁松按索河雒䜟文言九世封禪事者松等列奏乃許焉東觀書曰羣臣奏言登封告成為民報徳百王所同陛下輙拒絶不許臣下不敢頌功述徳業求元封時故事議封禪所施用有司奏當用方石再累置壇中皆方五尺厚一尺用玉牒書藏方石牒厚五寸長尺三寸廣五寸有玉檢又用石檢十枚列於石傍東西各三南北各二皆長三尺廣一尺厚七寸檢中刻三處深四寸方五寸有盖檢用金縷五周以水銀和金以為泥玉璽二其一方一寸二分其一方三寸方石四角又有距石皆再累枚長一丈厚一尺廣二尺皆在圓壇上其下用距石十八枚皆髙三尺厚一尺廣二尺如小碑環壇立之去壇三歩距石下皆有石跗入地四尺又用石碑髙九尺廣三尺五寸厚尺二寸立壇之丙地去壇三丈以上以刻書帝以用石功難又欲及二月封禪故詔梁松欲因故封石空檢更加封而已欲及二月者書嵗二月東廵狩至于岱宗柴祭山曰燔柴積柴加牲於其上而燔之也松上疏争之以為登封之禮告功皇天垂後無窮以為萬民也承天之敬猶冝章明奉圖書之瑞尤冝顯著今因舊封竄寄玉牒故石下恐非重命之義受命中興宜當特異以明天意遂使泰山郡及魯趣音促石工冝取完青石無必五色令印工刻玉牒書書祕刻方石中命容玉牒二月帝至奉髙遣侍御史與蘭臺令史將工先上山刻石二十二日辛卯晨燎祭天於泰山下南方羣神皆從祀用樂如南郊諸王王者後二公孔子後襃成君皆助祭位事也事畢將升封或曰泰山雖已從食於柴祭今親升告功冝有禮祭於是使謁者以一特牲於常祠㤗山處告祠㤗山如親耕貙劉先祠先農先虞故事至食時帝御輦升山日中後到山上更衣早晡時即位于壇北面羣臣以次陳後西上畢位升壇尚書令奉玉牒檢皇帝以寸二分璽親封之訖太常命人發壇上石尚書令藏玉牒已復石覆訖尚書令以五寸印封石檢封禪儀曰以金為繩以石為檢東方西方各三檢檢中石泥及壇土各如其方色也事畢皇帝再拜羣臣稱萬嵗命人立所刻石碑乃復道下二十五日甲午禪祭地于梁父隂以髙后配山川羣神從祀如元始中北郊故事項威曰除地曰墠後改墠曰禪神之也四月己卯大赦天下以建武三十二年為建武中元元年復博奉髙嬴勿出元年租芻槀以吉日刻玉牒書函藏金匱璽印封之乙酉使太尉行事以特牲告至髙廟太尉奉匱以告髙廟藏于廟室西壁石室髙主室之下崔靈恩曰自周以前封者皆封土為壇至秦始皇漢武帝始用石檢魏明帝時中䕶軍蔣濟請封禪帝雖拒濟議而實使髙堂隆草封禪儀以天下未一不欲便行大禮㑹髙堂隆卒不行晉武帝平吳太康元年九月衛瓘議封禪帝曰此盛徳事所未議也瓘等又奏至于再三詔報絶之宋文帝在位長乆有意封禪詔學士山謙之草其儀注屬後魏師南逼其意乃息孝武大明元年十一月戊申太宰江夏王義㳟表三請帝以文軌未一不從北齊有廵狩之禮并登封之儀終不行隋開皇十四年羣臣請封禪文帝命牛𢎞等創定其禮帝曰此事體大朕何徳以堪之但當東廵因拜岱山耳十五年春行幸兗州遂次岱嶽為壇如南郊又壝外為柴壇飾神廟展宫懸之樂於庭為埋埳二於南門外又陳樂設位於青帝壇如南郊帝服袞冕乘金輅備法駕而行禮畢遂詣青帝壇而祭焉唐貞觀十一年左僕射房元齡等議封禪儀注至髙宗麟徳三年正月戊辰朔有事于泰山皇帝親祀昊天上帝於封祀之壇己巳登于泰山行封禪之禮庚午降禪于社首山壬申大赦天下改元為乾封武后天冊萬嵗二年臘月甲申登封于嵩山大赦天下改元為萬嵗登封丁亥禪于少室山明皇開元十三年十月封祀于泰山去山趾五里西去社首山十里丁亥服袞冕於行宫致齋於供帳前殿己丑大備法駕至山下乃御馬而登侍臣從帝以靈山清潔不欲多人上乃召禮官學士賀知章等入講儀注以三獻悉於山上而在一處行其事五方帝及諸神座於山下壇行事儀注之祥具開元禮歴代所尚髙陽氏尚赤以十一月為正薦玉以赤繒髙辛氏尚黒以十月為正薦玉以黒繒陶唐氏尚白以十二月為正薦玉以白繒有虞氏尚赤以十一月為正並出尚書中候夏后氏尚黒以建寅月為正大事歛用昬戎事乘驪馬黒色曰驪牲用元以黒為徽號徽謂旌旗斿也朝燕服收冠而黒衣宫室之制屋十寸為尺商人尚白以建丑月為正大事歛用日中戎事乘翰白馬也牲用白以白為徽號朝燕服哻冠而縞衣宫室之制屋十二寸為尺周人用赤以建子月為正大事歛用日出戎事乘騵音元馬腹赤牲用騂以赤為徽號朝燕服冕冠而元衣宫室之制屋八寸為尺秦水徳漢書律厯志秦自以水徳故十月為嵗首漢火徳初亦以十月為嵗首及文帝立公孫臣言漢當土徳其應黄龍見丞相張蒼以為漢乃水徳河決金堤是其符也年始冬十月以外黒内赤十月隂氣在外故黑陽氣尚伏在内故赤明年黄龍果見於成紀帝於是令博士諸生申明土徳草改厯服色事至武帝元封七年用倪寛等議改用夏正以建寅月為嵗首劉向以為赤帝斬蛇之符為火徳後漢並同前漢魏土徳文帝以建寅月為正服尚黄臘以丑牲以白節毛當赤節幡當黄郊祀朝㑹四時之服如漢制宗廟所服如周禮明帝青龍五年三月用博士秦静等議改為景初元年以建丑月為正三年正月帝崩齊王立以明帝建丑月崩若以其月正朝㑹設樂不合於禮於是改以建寅之月為嵗首袁准正論曰自非繼亂不冝改正也晉金徳武帝泰始二年散騎常侍傅元上議帝王受命應厯禪代則不改正朔遭變征伐則改之舜正月上日受終于文祖無改正之文唐虞正朔皆同明矣至商周革命乃改魏受漢禪亦已不改至於服色皆從其本唯節幡用黄大晉以金徳王天下順五行三統之序矣詔從之由是正朔服色並依前代東晉並同西晉宋水徳亦如魏晉故事齊木徳餘一依前代梁火徳餘一依前代陳木徳餘一依前代後魏初為土徳言繼黄帝之後也故數用五服尚黄犧牲用白至孝文太和十四年用祕書丞李彪等議承晉後改為水徳祖辰臘申北齊木徳正朔服色皆如後魏後周承西魏用水徳以文帝誕有元氣之祥又有黒水䜟故也建寅月為正服色尚黒隋火徳以赤雀降祥之故衣服旗幟犧牲尚赤戎服以黄七月帝始服黄唐土徳建寅月為嵗首武太后永昌元年十一月一日依周制以建子之月為正改元為載初元年改十一月為正月十二月為臘月来年正月為一月十月建亥為年終載初元年九月九日改元天授稱周改皇帝為皇嗣二年正月旗幟尚赤色天寶九年制應縁隊仗所用緋色幡等並改為赤黄色天下皆然納崔昌議以土徳承漢火徳享司寒藏氷開氷附周制凌人掌氷正嵗十有二月令斬氷三其凌正嵗季冬火星中大寒氷方盛之時也凌氷室也三其凌三倍其氷備消釋也春始治鑑鑑如甀大口以盛氷置食物于中以禦温氣春而始治之為二月將獻羔而開氷鑑胡暫反甀音直偽反祭祀供氷鑑賔客供氷大喪供夷槃氷尸之槃曰夷槃夏頒氷掌事暑氣盛王以氷頒賜則主為之秋刷月令仲春天子乃獻羔開氷先薦寢廟謂立春藏氷至春分方温故獻羔以祭司寒而後開氷先薦寢廟而後食之左傳魯大夫申豐曰古者日在北陸而藏氷陸道也夏十二月日在虛危氷堅而藏之西陸朝覲而出之夏三月日在昴畢蟄虫出而用氷春分之中奎婁在東方其藏氷也深山窮谷固隂沍寒用黒牡秬黍以享司寒於是取而藏之也周其出之也桃弧棘矢以除其灾於是以風出而用之順春風而散用之朝之禄位賔客喪祭自命夫命婦至于老疾氷皆與焉宋孝武帝大明六年立凌室藏氷有司奏季冬之月氷壯之時凌室長率山虞及輿隷取氷於深山窮谷固隂沍寒之處以納于凌隂務令周密無洩其氣先以黒牡秬黍祭司寒于凌室之北仲春之月春分之日以黒羔秬黍祭司寒啓氷室先薦寢廟凌室在樂逰苑内置長一人吏一人保舉吏二人隋以季冬藏氷仲春開氷並因用黒牡秬黍於氷室祭司寒神開氷依以桃弧棘矢唐制先立春三日因用黒牡秬黍祭司寒之神於氷室祭訖鑿氷千段方三尺厚尺五寸而藏之仲春開氷祭如藏禮依以桃弧棘矢設於氷室戶内之右禮畢遂留之餘具開元禮禜周制春官大祝掌六祈其四曰禜祭法云幽禜祭星也雩禜祭水旱也漢制謂禜為請晴服赤幘朱衣晉武帝咸寧及太康中時雨多則禜祭赤幘朱衣閉諸隂朱絲禜社伐朱鼔焉梁制霖雨祈晴亦如雩禮隋制霖雨則禜京城諸門三禜不止則祈山川嶽鎭海瀆社稷又不止則祈宗廟神州報以太牢州郡縣苦雨亦各禜其城門不止則祈界山川社稷報用羊豕唐因之禜門不止乃祈山川嶽鎮海瀆三日不止祈社稷宗廟並用酒脯國城門用火牢葦茭桃梗禳祠夏后氏金行初作葦茭言氣所交也吕氏春秋曰始得伊尹祓之於廟薰以萑葦茭者交易隂陽代興之義也商人水徳以螺首慎其閉塞使如螺也周人木徳以桃為梗漢制厲殃祀天地日月星辰四時隂陽之神以師曠配之其壇常祀以禳灾兼用三代之儀以葦茭桃梗五月五日朱索五色印為門戶飾以儺止惡氣後漢仲夏之月萬物方盛日夏至隂氣萌作恐物不楙其禮以朱索連葷莱彌牟朴蠱鍾以桃印長六寸方三寸五色書文如法以施門戶魏明帝大脩禳禮故何晏禳祭儀雞特牲供禳釁之事磔雞起於魏未詳改仲夏在嵗旦之所起耳晉依魏制毎嵗朝設葦茭桃梗磔雞於宫及百寺之門以辟惡氣㤗始二年有司奏春分祀厲殃及禳祠詔曰不在祀典除之宋皆省其禮而郡縣往往猶存髙禖周制月令仲春元鳥至之日以太牢祠于髙禖髙辛氏之世元鳥遺卵娀簡吞之生契後王以為禖官嘉祥而立其祠天子親往后妃帥九嬪御乃禮天子所御帶弓韣授以弓矢于髙禖之前天子所御謂今有娠者禮謂酌飲於髙禖之庭帶以弓韣求男之祥漢武帝年二十九乃得太子甚喜始立為髙禖之祠於城南祭以特牲晉博士束晳云漢武帝晚得太子始為立髙禖之祠立石為主祀以太牢也後漢因之祀于仲春之月晉以仲春之月髙禖祀于城南祀以特牲恵帝元康六年髙禖壇上石中破博士議禮無髙禖置石之文未知設造所由既已毁破可無改造束晳議以為石在壇上盖主道也禮制器弊則埋而置新今冝埋而更造不冝遂廢後得髙堂隆故事詔更䥴石令如舊置髙禖壇上埋破石入地一丈按江東太廟北門内道西有石文如竹葉小屋覆之宋文帝元嘉中脩廟所得石陸澄以為晉孝武時郊禖石然則江左亦有此禮矣或曰百姓祀其旁或謂之落星也北齊制髙禖壇於南郊旁廣輪二十六尺髙九尺四陛三壝每嵗元鳥至之日皇帝親帥六宫祀青帝於壇以太昊配而祀髙禖之神以祈子其儀青帝北方南向配帝東方西向禖神壇下東陛之南西向禮用青珪束帛牲共以一太牢祀日皇帝袞冕乘玉輅皇后褘衣乗重翟皇帝初獻降自東陛皇后亞獻降自西陛並詣便座夫人終獻上嬪獻于禖神訖帝及后並詣攢位乃送神皇帝皇后及羣臣皆拜乃撤就燎禮畢而還隋亦以元鳥至日祀髙禖於南郊壇牲用一太牢唐月令亦以仲春元鳥至之日以太牢祀于髙禖天子親往月令經文及注不言有壇廟也祓禊周制春官女巫掌嵗時祓除釁浴漢髙后八月祓於灞上後漢三月上巳官民皆絜於東流水上日洗濯祓除去宿垢疢為大絜魏氏以来但用三月三日不用上巳也晉公卿以下至于庶人皆禊洛水之側趙王倫篡位三日㑹天泉池誅張林懷帝亦㑹天泉池賦詩陸機云天泉池南石溝引御溝水池西積石為禊堂跨水流杯飲酒不言曲水韓詩曰鄭國之俗三月上巳之日溱洧水上招魂續魄秉蘭草祓除不祥蔡邕曰今三月上巳祓於水濵盖出此也一説三月三日清明之節將修事於水側以祈豐年也一説郭虞三月上辰日上巳日二日産三女並不育俗以為大忌至此月巳日諱止家皆於東流水上為祈禳自潔濯謂之禊祠引流行觴遂成曲水梁劉昭曰郭虞之説良為虛誕假有庶人旬内夭其三女何足警彼風俗乎杜篤賦乃稱王侯公主暨于冨商用事伊洛帷幔元黄本傳大將軍梁商亦歌泣於洛禊也劉禎魯都賦曰素秋二七天漢指隅人胥祓禳國子水嬉此用七月十四日也東晉元帝詔罷三日弄具海西公於鍾山立流杯曲水延百僚皆其事也齊以三月三日曲水㑹古禊祭也今相承為百戯之具雕弄巧飾増損無常諸雜祠周立夀星祠於下杜亳徐廣云京兆杜縣有亳亭也時奉焉又立杜主祠因宣王殺右將軍杜伯不以罪後宣王田於圃田見杜伯執弓矢射王王伏弓而死故周人尊其鬼而以嵗時奉祠秦立陳寶祠因文公獲若石于陳倉北阪城祠之蘓林曰質如石如肝其神或嵗不至或嵗數来其来常以夜光輝若流星色赤黄長五丈從東方来集于祠城若雄野雞其聲殷殷云野雞夜鳴以應之祠以一牢名曰陳寶臣瓚曰陳倉縣有寶夫人祠或一嵗二嵗與葉君合葉君神来時天為之雷鳴二世時若陳寶節来一祠春夏用騂秋冬用駵徳公立卜居雍雍之諸祠自此興用三百牢於鄜畤作伏祠孟康曰六月伏日也周時無至此乃有之師古曰立秋之後以金代火金畏於火故至庚日必伏庚金也磔狗邑四門以禦蠱災始皇東游海上祠八神求仙人其祀莫知起時八神一曰天主祠天齊天齊淵水居臨菑南郊山下者二曰地主祠㤗山梁父盖天好隂祠之必於髙山之下小山之上命曰畤地貴陽祭之必於澤中圜丘三曰邱主祠蚩尤蚩尤在東平陸藍郷齊之西境也四月隂主祠三山三山即蓬莱方丈瀛州三神山五曰陽主祠之罘山在東莱六曰月主祠莱山山在東莱長廣皆在齊北並勃海七曰日主祠成山山在東莱不夜縣斗入海最居齊東北隅以迎日出八曰四時主祠琅邪琅邪在齊東北盖嵗之所始也皆用一牢具祀而巫祝所損益珪幣雜異焉漢髙帝天下已定令祝立蚩尤之祠於長安又置祠祀官女巫其梁巫祀天地天社天水房中堂上之屬晉巫祠五帝東君雲中君巫社巫祠族人炊之屬師古曰東君日也雲中君謂雲神也族人炊古主炊母之神也秦巫祠杜主巫保族纍之屬杜主即周之杜伯也巫保族纍二神名纍音力追反荆巫祠堂下巫先司命施糜之屬堂下在堂之下巫先巫之最先者也司命説者云文昌第四星也施糜其先常施設糜鬻者也九天巫祀九天師古曰九天者謂中央四方四維也皆以嵗時祠宫中武帝即位厚禮置祠神君於内中聞其言不見其人神君者長陵女子産乳而死見神於先後宛若宛若祠於其室人多往祠平原君往祠其後子孫尊崇按平原君武帝外祖母也先後妯娌也宛若字也又帝師少君求仙始親祠竈少翁言於帝曰祠竈皆可致物物鬼也致物而丹沙可化為金又立粤祠雞卜自此用持雞而卜如䑕卜也是時既滅兩粤粤人勇之乃言粤人俗鬼師古曰勇之言其俗尚鬼神之事而其祠皆見鬼數有效昔東甌王敬鬼夀百六十嵗後世怠慢故衰耗廼命粤巫立粤祠祝文安臺無壇亦祠天神帝百鬼宣帝時南郡獲白虎獻其皮牙爪帝為立祠又方士言隋侯劔寶玉寶璧周康寶鼎立四祠於未央宫又祠天封苑火井於鴻門西河鴻門有天封苑火井祠火從地中出也又立嵗星辰星太白熒惑南斗祠於長安城旁又祠三山八神於曲成東莱縣也蓬山石社石鼓於臨朐又有月祠蚩尤勞谷五牀山五帝仙人玉女金馬碧雞等神遣諌議大夫王襃使持節而求焉後魏道武帝初有兩彗星見劉后使日者占曰祈之則掃定天下后從之故立其祠又立嵗神十二嵗一祭以十月用牛一雞三又立土神四嵗二祭常八月十月用羊又立獻明以上天神四十所嵗祭其神尊以馬次以牛小以羊使女巫行事通志卷四十三
