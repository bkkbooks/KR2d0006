body:
  text: 通志卷十三宋右廸功郎鄭樵漁仲撰梁紀第十三武帝簡文帝元帝敬帝髙祖武皇帝諱衍字叔逹小字練兒南蘭陵中都里人姓蕭氏與齊同承淮隂令整整生皇髙祖鎋位濟隂太守鎋生皇曾祖副子位州治中從事副子生皇祖道賜位南臺治書侍御史道賜生皇考諱順之字文緯於齊髙帝為始族弟皇考外甚清和而内懐英氣與齊髙帝少而欵狎嘗共登金牛山路側有枯骨縱横齊髙帝謂皇考曰周文王以來幾年當復有掩此枯骨者乎言之懔然動色皇考由此知齊髙帝有大志常相随逐齊髙帝每外討皇考常為軍副及北討薛索兒夜遣人入營提刀徑至齊髙帝卧榻皇考手刃之頻為齊髙帝鎮軍司馬長史時宋帝昬虐齊髙帝謀出外皇考以為一旦奔亡則危幾不測不如因人之欲行伊霍之事齊髙帝深然之歴黄門郎安西長史吳郡内史所歴皆著名吳郡張緒常稱文武兼資有徳有行吾敬蕭順之袁粲之據石頭黄回與之通謀皇考聞難作率家兵據朱雀橋回覘人還告曰朱雀橋南一長者英威毅然坐胡牀南向囘曰蕭順之也遂不敢出時㣲皇考石頭幾不據矣及齊髙帝創造皇業推鋒決勝莫不垂拱仰成焉齊建元末齊髙帝從容謂皇考曰當令阿玉解揚州相授玉豫章王嶷小名也齊武帝在東宫皇考嘗問訊及退齊武帝指皇考謂嶷曰非此翁吾徒無以致今日及即位深相忌憚故不署台輔以參豫佐命封臨湘縣侯歴位侍中衞尉太子詹事領鎭軍將軍丹陽尹贈鎮北將軍諡曰懿帝以宋孝武大明元年嵗次甲辰生于秣陵縣同夏里三橋宅初皇妣張氏嘗夢抱日已而有娠遂産帝帝生而有異光狀貎殊特日角龍顔重岳虎顧舌文八字頂有浮光身映日無影兩骻駢骨頂上隆起有文在右手曰武帝為兒時能蹈空而行及長博學多通好籌略有文武材略所居室中常若雲氣人或遇者體輙肅然初為衞軍王儉東閤祭酒儉一見深相器異請為戸曹屬謂廬江何憲曰此蕭郎三十内當作侍中出此則貴不可言竟陵王子良開西邸招文學帝與沈約謝眺王融蕭琛范雲任昉陸倕等並游焉號曰八友融俊爽識鑒過人尤敬異帝每謂所親曰宰制天下必在此人累遷随王鎭西諮議參軍行經牛渚逢風入泊龍瀆有一老人謂帝曰君龍行虎歩貴不可言天下方亂安之者其在君乎問其名氏忽然不見尋以皇考艱去職歸建業及齊武帝不豫竟陵王子良以帝及兄懿王融劉繪王思逺顧暠之范雲等為帳内軍主融欲因帝晏駕立子良帝曰夫立非常之事必有非常之人融才非負圖視其敗也范雲曰憂國家者惟有王中書帝曰憂國欲為周召欲為豎刁邪懿曰直哉史魚何其水彊也初皇考之薨不得志事見齊魚復侯傳至是鬱林失徳齊明帝作輔將為廢立計帝欲助齊明帝傾齊武帝之嗣以雪心恥齊明帝亦知之每與帝謀時齊明帝將追随王恐不從又以王敬則在會稽恐為變以問帝帝曰随王雖有美名其實庸劣既無智謀之士爪牙惟仗司馬垣歴生武陵太守卞白龍耳此並唯利是與若㗖以顯職無不載馳随王止湏折簡耳敬則志安江東窮其富貴宜選美女以娛其心齊明帝曰亦吾意也即徴歴生為太子左衞率白龍游擊將軍並至續召随王至都賜自盡豫州刺史崔慧景既齊武帝舊臣不自安齊明帝憂之乃起帝鎮夀陽外云備魏實防慧景師次長瀬慧景懼罪白服來迎帝撫而宥之將軍房伯玉徐元慶並曰慧景反跡既彰實是見賊我曹武將譬如鞲上鷹將軍一言見命便即制之帝笑曰此如掌中嬰兒殺之不武於是曲意和釋之慧景遂安隆昌元年拜中書侍郎遷黄門侍郎建武二年魏將王肅劉昶攻司州刺史蕭誕甚急齊明帝遣左衞將軍王廣之赴救帝為偏帥𨽻廣之行次尉斗洲有人長八尺餘容貎衣冠皓然皆白緣江呼曰蕭王大貴帝既屢有徴祥心益自負時去誕百里衆軍以魏軍盛莫敢前帝欲大振威略謂諸將曰今屯下梁之城塞鑿峴之險守雉脚之路據賢首之山以通西闗以臨賊壘三方犄角出其不備破賊必矣廣之等不從後遣徐元慶進據賢首山魏絶其糧道衆懼莫敢援之惟帝獨奮請先進於是廣之益帝精甲銜枚夜行失道望見如持兩炬者随之果得道徑上賢首山廣之軍因得前魏軍來脅帝堅壁不進時王肅自攻城一鼓而退劉昶有疑心帝因與書間成其隙一旦有風從西北起陣雲随之來當肅營尋而風囘雲轉還向西北帝曰此所謂歸氣魏師遁矣令軍中曰望麾而進聼鼓而動肅乃傾壁十萬陣于水北帝揚麾鼓譟響振山谷敢死之士執短兵先登長㦸翼之城中見援至因出軍攻魏柵魏軍表裏受敵因大崩肅昶單馬走斬獲千計流血絳野得肅昶巾箱中魏帝􅃯曰聞蕭衍善用兵勿與爭鋒待吾至若能禽此人則江東吾有也以功封建陽縣男尋為司州刺史有沙門自稱僧惲謂帝曰君項有伏龍非人臣也復求莫知所之帝在州甚有威名嘗有人餉馬帝不受餉者宻以馬繫齋柱而去帝出見馬答書殷勤縛之馬首令人驅出城外馬遂自還帝還都為太子中庻子領四廂直出鎮石頭齊明性猜忌帝避時嫌解遣部曲常乗折角小牛車齊明每稱帝清儉朂勵朝臣四年魏孝文帝自率大衆逼雍州刺史曹武度沔守樊城武舊齊武帝腹心齊明帝忌之欲使后弟劉暄為雍州暄不願出外因江祏得留齊明帝擬帝雍州受宻㫖出頓聲為軍事發遣又命五兵尚書崔慧景征南將軍陳顯逹相續援襄陽慧景與帝進次鄧城魏孝文帥十餘萬騎奄至慧景引退帝止之不從於是大敗帝帥衆拒戰獨得全軍及魏軍退以帝為輔國將軍監雍州事先是雍州相傳樊城有王氣至是謡言更甚及齊明帝崩遺詔以帝為都督雍州刺史時揚州刺史始安王遥光尚書令徐孝嗣右僕射江祏右將軍蕭坦之侍中江祀衞尉劉暄更直内省分日帖􅃯世所謂六貴又有御刀茹法珍梅蟲兒豐勇之等八人號為八要及舍人王咺之等四十餘人皆口擅王言權行國憲帝謂張𢎞䇿曰政出多門亂其階矣當今避禍唯有此地勤行仁義可坐作西伯但諸弟在都恐離時患湏與益州圖之耳時上長兄懿罷益州還仍行郢州事乃使𢎞䇿詣郢陳計於懿語在懿傳言既不從𢎞䇿還帝乃召弟偉及憺是嵗至襄陽乃潛造器械多伐竹木沈於檀溪宻為舟裝之備時帝所住齋常有氣五色囘轉狀若蟠龍季秋出九日臺忽暴風起烟塵四合帝所居獨白日清朗其上紫雲騰起形如繖蓋望者莫不異焉尋而大臣相次屠戮永元二年冬懿又被害信至帝宻召長史王茂中兵吕僧珍别駕栁慶逺功曹史吉士贍等謀之既定以十一月乙巳召僚佐集於聽事告以舉兵是日建牙出檀溪竹木裝舸艦旬日大辦百姓願從者得鐵馬五千匹甲士三萬人初南康王寳融為荆州刺史長史蕭頴胄行府州事至是東昬遣輔國將軍劉山陽就頴胄兵襲襄陽帝知其謀遣參軍王天虎龐慶國詣江陵徧與州府書聲云山陽西上幷襲荆雍天虎既發帝謂參軍張𢎞䇿曰今日天虎坐收天下矣荆州得天虎至必囘遑無計若不見同取之如拾地芥耳斷三峽據巴蜀分兵定湘州便全有上流以此威聲臨九𣲖斷彭蠡檄江南風之靡草不足比也政小引日月耳江陵本憚襄陽人加脣亡齒寒必不孤立寧得不闇見同邪挾荆雍之兵掃定東夏韓白重出不能為計况以無算之昬主役御刀應􅃯之徒哉及山陽至巴陵帝復令天虎齎書與穎胄兄弟去後帝謂張𢎞䇿曰用兵之道攻心為上攻城次之心戰為上兵戰次之今日是也近遣天虎往州府人皆有書今叚止有兩封與行事兄弟云一二天虎口具彼間人問天虎而無所説必謂行事與天虎具隠其情則行事進退無以自明必入吾謀内是馳兩空函定一州矣山陽至江安聞之果遲疑不上穎胄大懼參軍席闡文栁忱謂穎胄曰蕭雍州蓄飬士馬非復一日必不可制就能制之嵗寒必不為朝廷所容今若殺山陽與雍州立天子以令諸侯則霸業成矣山陽既不信我如斬天虎則彼疑可釋至而圖之蔑不濟矣穎胄從之詰旦乃謂天虎曰天下之事縣之在卿今就卿借頭以詐山陽昔樊於期亦以頭借荆軻於是斬之送首山陽山陽信之馳入城將踰閾縣門發折其車轅投車而走中兵參軍陳秀拔㦸逐之斬於門外傳首于帝仍以南康王尊號之議來告且曰時有未利當須來年二月遽便進兵恐非廟算帝答曰今坐甲十萬糧用自竭若頓兵十旬必生悔吝且太白出西方杖義而動天時人謀有何不利昔武王伐紂行逆太嵗復湏待年月乎竟陵太守曹景宗遣杜思沖勸帝迎南康王都襄陽時正尊號帝不從王茂又私于張𢎞䇿曰今以南康置人手中彼挾天子以令諸侯節下前去為人所使此豈嵗寒之計𢎞䇿言之於帝曰若前途大事不捷故自蘭艾同焚若功業克建誰敢不從豈是碌碌受人處分哉乃於沔南立新野郡以集新附中興元年二月南康王為相國以帝為征東將軍戊申帝發襄陽自冬積霰至是開霽士卒咸悦帝遂留弟偉守襄陽城謂曰當置心於襄陽人腹中推誠信之勿有疑也天下一家乃當相見遂移檄建業闡揚威武及至竟陵命長史王茂與太守曹景宗為前軍中兵參軍張法安守竟陵城茂景宗帥衆濟岸進頓九里其日郢州刺史張沖迎戰茂等大破之荆州遣冠軍將軍鄧元起軍主王世興田安等會大軍於夏口帝築漢口城以守魯山命水軍主張惠紹朱思逺等遊遏中江絶郢魯二城信使時張沖死其衆推軍主薛元嗣及沖長史程茂為主三月乙巳南康王即帝位於江陵遥廢東昬為涪陵王以帝為尚書左僕射加征東將軍都督征討諸軍事假黄鉞西臺又遣冠軍將軍蕭頴逹領兵來會四月帝出沔命王茂蕭穎逹等逼郢城五月己酉帝移屯漢南是日有紫雲如蓋䕃於壘幕甲寅東昬遣寧朔將軍吳子陽光子衿等十三軍救郢州進據巴口七月帝命王茂帥軍主曹仲宗康絢武會超等潛師襲加湖將逼子陽水涸不通艦子衿喜其夜流星墜其城四更中無雨而水暴長衆軍乗流齊進鼓譟攻之俄而大潰子陽等竄走衆盡溺于江王茂虜其餘而旋郢魯二城相視奪氣先是東昬遣冠軍將軍陳伯之鎮江州為子陽等聲援帝謂諸將曰夫征討未必湏實力所聼威聲耳今加湖之敗誰不讋服陳虎牙即伯之之子狼狽奔歸彼閒人情理當兇懼我謂九江可傳檄定也因命捜所獲俘囚得伯之幢主蘇隆之厚加賞賜使致命焉戊午魯山城主孫樂祖降己未夜郢城有數百毛人踰堞且泣因投黄鵠磯蓋城之精也及旦城主程茂薛元嗣遣參軍朱曉求降帝謂曰城中自可不識天命何意恒罵曉曰明公未之思耳桀犬何嘗不吠堯初郢城之閉將佐文武男女口十餘萬人疾疫流腫死者十七八及城開帝並加隠䘏其死者命給棺槥東昬聞郢城没乃為城守計簡二尚方二冶囚徒以配軍其不可活者於朱雀門内日斬百餘人尚書令王亮苦諫不從陳伯之遣蘇隆之反命求未便進軍帝曰伯之此言意懐首䑕可及其猶豫逼之乃命鄧元起即日沿流而下八月天子遣兼黄門郎蘇回勞軍帝登舟命諸軍進路留上庸太守韋叡守郢城行州事鄧元起將至尋陽陳伯之猶懼乃收兵退保湖口留其子虎牙守盆城及帝至乃束甲請罪九月天子詔帝平定東夏以便宜從事前軍之次蕪湖南豫州刺史申胄棄姑熟走至是大軍進據之自發雍州帝所乗艦恒有兩龍導引左右莫不見者緣道奉迎百姓皆如挾纊仍遣曹景宗蕭穎逹領馬歩進頓江寧東昬遣征虜將軍李居士迎戰景宗擊走之於是王茂鄧元起吕僧珍進據赤鼻邏曹景宗陳伯之為游兵是日新亭城主江道林率兵出戰衆軍擒之於陣大軍次新林建康士庻傾都而至道欵者或以血為書命王茂進據越城曹景宗據皂莢橋鄧元起據道士墩陳伯之據籬門道林餘衆退屯航南諸軍廹之因復散走退保朱雀航馮淮自固時李居士猶據新亭壘請東昬燒南崖邑屋以開戰塲自大航以西新亭以北蕩然矣十月東昬石頭軍主朱僧勇率水軍二千人來降東昬又遣征虜將軍王珍國率軍主胡虎牙等列陣於航南大路悉配精甲利器尚十餘萬人閽人王倀子持白虎幡督諸軍又開航背水以絶歸路王茂曹景宗等犄角奔之珍國之衆一時土崩衆軍退至宣陽門李居士以新亭壘徐元瑜以東府城降石頭白下諸軍並宵潰壬午帝鎮石頭命衆軍圍六門東昬悉焚門内驅逼營署官府並入城有衆二十萬青州刺史桓和紿東昬出戰因降先是俗語謂宻相欺變者為和欺於是蟲兒法珍等曰今日敗於桓和可謂和欺矣帝命諸軍築長圍初衆軍既逼東昬遣軍主左僧慶鎮京口常僧景鎮廣陵李叔獻屯𤓰歩及申胄自姑熟奔歸又使屯破墩以為東北聲援至是帝遣曉諭並降帝乃遣弟輔國將軍秀鎮京口輔國將軍恢屯破墩從弟寧武將軍景鎮廣陵吳郡太守蔡寅棄郡赴降十二月丙寅兼衞尉張稷北徐州刺史王珍國斬東昬其夜以黄油裹首送軍帝命吕僧珍張彌勒兵封府庫及圖籍帝乃入收東昬嬖妾潘妃誅之及兇黨王坦之以下四十八人屬吏以宫女二千人分賚將士宣徳皇后令追廢涪陵王為東昬侯授帝中書監大司馬錄尚書驃騎大將軍都督揚州刺史封建安郡公食邑萬戸給班劍四十人黄鉞侍中征討諸軍事並如故依晉武陵王遵承制故事百僚致敬己卯帝入屯閲武堂下令大赦丙戌入鎮殿内是日鳯皇集建業又下令凡昬制謬賦滛刑濫役外可詳檢前源悉皆除蕩其主守散失諸所損耗精立科條咸從原例丁亥遣豫州刺史李元履以兵五千慰勞東方十二郡二年正月辛卯下令通檢尚書衆曹東昬時諸諍訟失理及主者淹停不時施行者精加訊辯依事議奏其義師臨陣致命疾病死亡者並加𦵏歛収恤遺孤甲午天子遣兼侍中席闡文兼黄門侍郎樂法才慰勞都下追贈皇祖散騎常侍左光祿大夫皇考侍中丞相乙未下令朱雀之捷逆徒送死者特許家人殯葬若無親屬或有貧苦二縣長尉即為埋掩建康城内不逹天命自取淪滅亦同此科又下令減損浮費自非奉粢盛修紱冕習禮樂之容繕甲兵之備此外一皆禁絶御府中署量宜罷省命外詳為條格戊戌宣徳皇后臨朝入居内殿拜帝大司馬解承制百僚致敬如前丁亥詔進帝都督中外諸軍事劍履上殿入朝不趨贊拜不名加前後部羽葆鼓吹置左右長史司馬從事中郎掾屬各四人幷依舊辟士餘並如故甲寅齊帝進帝位相國總百揆以豫州之梁郡歴陽南徐州之義興揚州之淮南宣城吳吳興會稽新安東陽十郡封帝為梁公偹九錫之禮加逺游冠綠綟綬位在諸侯王上梁國置丞相以下䇿書襃贊功徳帝固辭府僚勸進不已於是始受相國梁公之命命焚東昬滛奢異服六十二種於都街齊帝追贈梁公夫人為梁國妃乙丑南豫州隊主陳文興於宣武城内鑿井得玉鏤騏驎金鏤玉璧水精環各二又鳳凰見建康縣桐下里宣徳皇后稱美符瑞歸於相國府丙寅詔梁國依舊選諸要職悉依天朝之制帝上表以前代選官皆立選簿請自今選曹精加隐括依舊立簿使冠履無爽名實不違庻人識涯涘造請自息且聞中間立格甲族以二十登仕後門以過立試吏豈所以𢎞奬風流希向後進此實巨蠧尤宜刋革詔依表施行丙戌詔進梁公爵為王以豫州之南譙廬江江州之尋陽郢州之武昌西陽南徐州之南琅邪南東海晉陵揚州之臨海永嘉十郡益梁國并前為二十郡其相國揚州牧驃騎大將軍如故帝固辭有詔斷表相國左長史王瑩等率百僚敦請三月癸巳受梁王之命下令赦國内殊死以下鰥寡孤獨不能自存者賜穀五斛府州所統亦同蠲蕩丙午齊帝命帝冕十有二旒建天子旌旗出警入蹕乗金根車駕六馬備五時副車置旄頭雲䍐樂舞八佾設鍾虡宫縣王妃王子王女爵命之號一依舊儀丙辰齊帝下詔禪位即安姑熟四月辛酉宣徳皇后令曰西詔至帝憲章前代敬禪神器於梁明可臨軒遣使恭授璽紱未亡人便歸於别宫壬戌策書禪位于梁遣兼太保中書監兼尚書令王亮兼太尉中書令王志奉皇帝璽紱受終之禮一依唐虞故事帝抗表陳讓表不獲通於是齊百官豫章王元琳等八百一十九人及梁臺侍中范雲等一百一十七人並上表勸進帝讓不受是日太史令蔣道秀陳天文符䜟六十四條事並明著羣臣重表固請乃從之天監元年夏四月丙寅皇帝即位于南郊設壇柴燎告天禮畢備法駕還建康宫臨太極前殿大赦改元賜民爵二級文武位二等鰥寡孤獨不能自存者人穀五斛逋布口錢宿責勿復收其犯鄉論清議贓汚滛盗一皆蕩滌洗除前注與之更始封齊帝為巴陵王全食一郡載天子旌旗乗五時副車行齊正朔郊祀天地禮樂制度皆用齊典以齊宣徳皇后為齊文帝妃齊帝后王氏為巴陵王妃齊代王侯封爵悉皆降省其効著艱難者别有後命惟宋汝隂王不在除例刼賊餘口没在臺府者悉皆蠲放諸流徙之家並聼還本以兼尚書令王亮為尚書令兼尚書右僕射沈約為尚書僕射封皇弟中䕶軍宏為臨川王南徐州刺史秀為安成王雍州刺史偉為建安王右衛將軍恢為鄱陽王荆州刺史憺為始興王自郡王以下列爵為縣六等皇弟皇子封郡王二千戸王之庻子為縣侯五百戸謂之諸侯功臣爵邑無定科鳯凰集南蘭陵丁夘詔凡後宫樂府西解暴室諸如此例被幽逼者一皆放遣若衰老不能存者官給廪食戊辰遺巴陵王錢二百萬絹布各千疋綿二千觔車騎將軍髙麗王髙雲進號車騎大將軍鎮東大將軍百濟王餘太進號征東大將軍鎮東大將軍倭王武進號征東將軍己巳巴陵王殂于姑熟追諡為齊和帝終禮一依故事庚午詔分遣内侍廵省四方觀政聼謡訪賢舉滯其有田野不開獄訟無章忘公徇私侵漁是務者悉随事以聞若懐寳迷邦藴竒待價蓄響藏真不求聞逹各依名騰奏罔或遺隐又詔曰金作贖刑有聞自昔入縑以免施於中葉永言叔季偷薄成風嬰愆入罪厥塗匪一死者不可復生刑者無因自反由此而望滋實庸可致乎可依周漢舊典有罪入贖外詳為條格以時聞奏辛未詔以謝公蕭寳義為巴陵王以奉齊祀復南蘭陵武進縣依前代之科徴新除相國軍諮祭酒謝朏為侍中左光祿大夫開府儀同三司改南東海為蘭陵郡土斷南徐州諸僑郡縣癸酉詔於公車府謗木肺石傍各置一函若肉食莫言山阿欲有横議投謗木函若從我江漢功在簡䇿犀兕徒弊龍蛇方縣次身才髙妙擯壓莫通懐傅呂之術抱屈賈之歎其理有皦然受困包匭夫大政侵小豪門陵賤百姓已窮九重莫逹若欲自申並可投肺石函甲戌詔斷逺近上慶禮閏月丁酉以行宕昌王梁彌邕為安西將軍河凉二州刺史正封宕昌王壬寅詔以憲綱日弛漸以為俗令端右以風聞奏事依元熙舊制有司奏追尊皇考為文皇帝廟號太祖皇妣張氏為獻皇后陵曰建陵郗氏為徳皇后陵曰修陵五月乙亥夜盗入南北掖燒神虎門總章觀害衞尉卿張𢎞䇿戊子江州刺史陳伯之舉兵反以領軍將軍王茂為征南將軍江州刺史率衆討之六月庚戌封北秦州刺史楊紹為武都王是月陳伯之奔魏江州平前益州刺史劉季連據成都反秋七月丁巳朔日有食之八月戊戌置建康三官癸卯鸞鳥見樂游苑乙巳平北將軍西凉州刺史象舒彭進號安西將軍封鄧至王丁未命中書監王瑩等八人參定律令詔尚書郎依昔奏事交州獻能歌鸚鵡詔不納林邑干陁利國各遣使朝貢冬十一月己未立小廟甲子立皇子統為皇太子賜天下為父後者爵一級十二月大雪深三尺是嵗大旱米斗五千人多餓死二年春正月乙卯以尚書僕射沈約為左僕射吏部尚書范雲為右僕射辛酉祀南郊降死罪以下囚庚辰以仇池公楊靈珍為北梁州刺史封仇池王夏四月癸卯尚書刪定郎蔡法度上梁律二十卷令三十卷科四十卷五月尚書右僕射范雲卒乙巳益州刺史鄧元起尅成都曲赦益州六月丁亥以新除左光祿大夫謝朏為司徒尚書令甲午以中書監王瑩為尚書右僕射是夏多癘疫秋七月扶南龜兹中天竺一國各遣使朝貢冬十月皇子綱生降都下死罪以下囚十一月乙卯雷電大雨晦三年春正月癸丑以尚書右僕射王瑩為左僕射太子詹事柳惔為右僕射二月魏尅梁州三月隕霜殺草夏五月丁巳以扶南王憍陳如闍耶䟦摩為安南將軍六月丙子詔分遣使廵察州部視民寃酷癸未大赦秋七月甲子立皇子綜為豫章王八月魏剋司州九月壬子以河南王世子伏連夀為鎮西將軍西秦河二州刺史封河南王北天竺國遣使朝貢冬十一月甲子詔除贖罪科是嵗魏正始元年四年春正月癸卯詔自今九流常選年未三十不通一經不得解褐若有才同甘顔勿限年次置五經博士各一人有司奏吳令唐傭鑄盤龍火爐翔鳯硯蓋詔禁錮終身丙午省鳯凰銜書伎戊申詔往代多命宫人侍宫觀禋郊之禮非所以仰䖍蒼昊自合停止辛亥祀南郊大赦二月初置胄子律􅀶士壬午遣衞尉卿楊公則率宿衛兵塞洛口壬辰交州刺史李予據州反長史李畟討平之曲赦交州是月立建興苑於秣陵建興里夏四月丁巳以行宕昌王梁彌博為安西將軍河涼二州刺史正封宕昌王六月庚戌立孔子廟冬十月使中軍將軍揚州刺史臨川王宏都督北討諸軍事侵魏以興師費用王公以下各上國租及田穀以助軍資是嵗大穰米斛三十五年春正月丁卯朔詔凡諸郡國舊族邦内無在朝位者選官搜括使郡有一人乙亥起前司徒謝朏為中書監司徒甲申立皇子綱為晉安王三月丙寅朔日有食之夏四月甲寅初立詔獄詔建康縣置三官與廷尉三官分掌獄事號建康為南獄廷尉為北獄五月置集雅館以招逺學秋七月乙丑鄧至國遣使朝貢八月辛酉作東宫九月臨川王宏軍至洛口大潰所亡萬計宏單騎而歸冬十一月甲子都下地震生白毛乙丑以師出淹時大赦魏人乗勝攻鍾離十二月癸卯司徒謝朏薨六年春三月庚申隕霜殺草是月有三象入建鄴夏四月壬辰置左右驍騎左右游擊將軍官癸巳曹景宗韋叡等破魏師於邵陽洲斬獲萬計己酉以江州刺史王茂為尚書右僕射丁巳以揚州刺史臨川王宏為驃騎大將軍開府儀同三司以右光祿大夫沈約為尚書左僕射五月乙巳置中衞中權將軍改驍騎為雲騎游擊為游騎秋八月戊子赦戊戌都下大水九月乙亥改閲武堂為徳陽堂聼訟堂為儀賢堂冬閏十月乙丑以開府臨川王宏為司徒以行太子太傅尚書左僕射沈約為尚書令以行太子少傅吏部尚書袁昻為兼尚書右僕射甲申以左光祿大夫夏侯詳為左僕射十二月丙辰左僕射夏侯詳卒七年春正月戊子以元樹為恒朔二州都督封魏郡王戊戌詔作神龍仁虎闕於端門大司馬門外二月乙卯新作國門于越城南乙丑增置鎮衞將軍以下為十品以法日數凡二十四班以法氣序不登十品别有八班以象八風又置施外國將軍二十四班合一百九號庚午詔於州郡縣置州望郡宗鄉豪各一人專掌捜薦乙亥以車騎大將軍髙麗王髙雲為鎮東大將軍開府儀同三司夏四月乙卯以皇太子納妃放赦大罪以下頒賜朝臣及近侍各有差五月都下大水戊子詔蘭陵縣修建二陵周回五里内居人賜復終身己亥詔復置宗正太僕大匠鴻臚又增太府大舟仍先為十二卿及置朱衣直閤將軍官十月辛酉改陵監為令秋八月丁巳皇子繹生赦大辟以下未結正者九月壬辰置童子奉車郎癸巳立皇子績為南康王冬十月丙寅以吳興太守張稷為尚書左僕射丙子詔大舉北侵丁丑魏縣瓠鎮主白皂生豫州刺史胡遜以城内屬是嵗魏永平元年八年春正月辛巳祀南郊大赦壬辰魏鎭東參軍成景儁以宿豫城内屬夏四月戊申以司徒臨川王宏為司空揚州刺史以車騎將軍領太子詹事王茂即本號開府儀同三司秋七月癸巳巴陵王蕭寳義薨冬十一月壬寅立皇子續為廬陵王九年春正月乙亥以左光禄大夫王瑩為尚書令庚寅新作縁淮塘三月己丑幸國子學親臨講肄賜祭酒以下各有差乙未詔皇太子及王侯之子年在從師者皆入學夏四月丁巳選尚書五都令史革用士流六月癸丑盗殺宣城太守朱僧勇閏六月己丑宣城盗轉宼吳興太守蔡撙討平之冬十二月癸未幸國子學䇿試胄子賜訓授之司各有差是嵗于闐林邑國並遺使朝貢十年春正月辛丑祀南郊大赦戊子荆州言騶虞見三月盗殺東莞琅邪二郡太守劉晰以朐山引魏徐州刺史盧昶夏六月以國子祭酒張充為尚書右僕射冬十二月山車見臨城縣振逺將軍馬仙琕大破魏軍斬馘十餘萬復朐山城是嵗初作宫城門三重樓及開二道宕昌國遣使朝貢婆利國貢金席十一年春正月壬辰詔自今捕讁之家及罪應質作若年有老少可停將送加鎭南將軍江州刺史建安王偉開府儀同三司司空揚州刺史臨川王宏進位太尉以驃騎將軍王茂為司空二月戊辰新昌濟陽二郡野蠶成繭三月丁巳為旱故曲赦揚徐二州庚申髙麗國遣使朝貢夏四月百濟扶南林邑等國各遣使朝貢秋九月宕昌國遣使朝貢冬十月乙未以吳郡太守袁昻為兼尚書右僕射己丑降太尉揚州刺史臨川王宏為驃騎將軍開府同三司之儀癸丑齊宣徳太妃王氏薨是嵗魏延昌元年十二年春正月辛卯祀南郊赦大辟罪以下辛酉兼尚書右僕射袁昻即正丙寅詔明下逺近若委骸不葬或衣衾莫致量給棺具收歛辛巳新作太極殿改為十三間以從閏數閏三月乙丑特進中軍將軍沈約卒夏四月都下大水六月癸巳新作太廟增基九尺秋九月加揚州刺史臨川王宏位司空以司空王茂為驃騎將軍開府同三司之儀位江州刺史冬十月丁亥詔曰明堂地居卑濕可量就埤起以盡誠敬十三年春二月庚辰朔震于西南天如裂丁亥耕籍田大赦賜孝悌力田爵一級夏六月都下訛言有棖棖取人肝肺及血以飴天狗百姓大懼二旬而止秋七月乙亥立皇子綸為邵陵王繹為湘東王紀為武陵王是嵗林邑扶南于闐國各遣使朝貢作浮山堰十四年春正月乙巳朔皇太子冠大赦賜為父後者爵一級王公以下班賚各有差停逺近上慶禮辛亥祀南郊詔班下逺近博採英異又前以墨刑用代重辟者除其條丙寅汝隂王劉允薨丁巳魏宣武帝殂夏四月丁丑驃騎將軍開府同三司之儀江州刺史王茂薨冬十月浮山堰壊是嵗蠕蠕狼牙修國各遣使來朝貢十五年春三月戊辰朔日有蝕之既夏四月髙麗國遣使朝貢六月庚子以尚書令王瑩為左光祿大夫開府儀同三司尚書右僕射袁昻為左僕射吏部尚書王暕為右僕射八月蠕蠕河南國各遣使朝貢九月辛巳左光祿大夫開府儀同三司王瑩薨壬辰大赦冬十一月交州刺史李畟斬反者阮宗孝傳首建鄴曲赦交州是嵗魏孝明帝熙平元年十六年春正月辛未祀南郊詔凡貧家勿收今年三調無田業者所在量宜賦給及優蠲産子之家恤理寃獄幷振孤老鰥寡不能自存者二月辛亥耕籍田赦罪人三月丙子勅太醫不得以生類為藥公家織宫紋錦飾並斷仙人鳥獸之形以為䙝衣裁翦有乖仁恕於是祈告天地宗廟以去殺之理欲被之含識郊廟牲牷皆代以麫其山川諸祀則否時以宗廟去牲則為不復血食雖公卿異議朝野喧囂竟不從冬十月宗廟薦羞始用蔬果是嵗河南扶南婆利等國各遣使朝貢十七年春二月癸巳雍州刺史安成王秀薨甲辰大赦三月丙申改封建安王偉為南平王夏六月乙酉中軍將軍中書監臨川王宏以本號行司徒秋八月壬寅詔兵騶奴婢男年六十六女年六十免為編戸閏八月于陁利國遣使朝貢冬十月乙亥以行司徒臨川王宏即正十一月辛亥以南平王偉為左光祿大夫開府儀同三司是嵗魏神龜元年十八年春正月甲申以鎭軍將軍鄱陽王恢為征西將軍荆州刺史以荆州刺史始興王憺為中撫軍將軍並開府儀同三司以尚書左僕射袁昻為尚書令以右僕射王暕為左僕射以太子詹事徐勉為右僕射辛卯祀南郊孝悌力田賜爵一級夏四月丁巳帝於無碍殿受佛戒赦罪人秋七月于闐扶南國各遣使朝貢普通元年春正月乙亥朔大赦改元丙子日有蝕之己卯以司徒臨川王宏為大尉揚州刺史以紫金光祿大夫王份為尚書左僕射庚子扶南髙麗等國並遣使朝貢二月癸丑以髙麗王嗣子安為寧東將軍髙麗王三月滑國遣使朝貢夏四月河南國遣使朝貢秋七月己卯江淮海並溢九月乙亥有星晨見東方光爛如火是嵗魏正光元年二年春正月辛巳祀南郊詔置孤獨園以恤孤㓜戊子大赦二月辛巳祀明堂三月庚寅大雪平地三尺夏四月乙卯改作南北郊丙辰詔曰平秩東作義不在南前代因襲有乖禮制可於震方具兹千畝於是徙籍田於東郊外十五里五月癸卯琬琰殿火延燒後宫屋三千間閏月丁巳詔自今可停賀瑞六月丁卯義州刺史文僧明以州歸魏秋七月丁酉假大匠卿裴邃節督衆軍侵魏甲寅魏荆州刺史桓叔興帥衆降八月丁亥始平郡石鼓村地自開成井方六尺六寸深三十二丈冬十一月百濟新羅國各遣使朝貢十二月戊辰以鎭東大將軍百濟王餘隆為寧東大將軍三年春正月庚子以吳郡太守王暕為尚書左僕射庚戌都下地震三月乙卯巴陵王蕭屏薨夏四月丁卯汝隂王劉端薨五月壬辰朔日有食之既癸巳大赦詔公卿百僚各上封事連率郡國舉賢良方正直言之士秋八月甲子婆利白題國各遣使朝貢冬十一月甲申開府儀同三司始興王憺薨四年春正月辛卯祀南郊大赦辛亥祀明堂二月丁亥耕籍田孝悌力田賜爵一級豫耕之司剋日勞酒冬十月庚午以中衞將軍袁昻為尚書令即本號開府儀同三司十一月癸未朔日有蝕之甲辰尚書左僕射王暕卒十二月戊午用給事中王子雲議始鑄鐵錢狼牙修國遣使朝貢五年夏六月乙酉龍鬬于曲阿王陂因西行至建陵城所經樹木倒折開數十丈庚子以員外散騎常侍元樹為平北將軍北青兖二州刺史率衆侵魏六年春正月辛亥祀南郊大赦庚申魏徐州刺史元法僧以彭城來降自去嵗以來北侵諸軍所在剋獲甲戌以元法僧為司空封始安郡王二月辛巳改封法僧為宋王三月丙午賜新附人長復除詿誤罪失一無所問夏五月乙酉修宿豫堰又修曹公堰於濟隂壬子遣中䕶軍夏侯亶督夀陽諸軍侵魏六月庚辰豫章王綜奔魏魏復據彭城秋七月壬戌大赦冬十二月壬辰都下地震是嵗魏孝昌元年七年春正月辛丑朔赦死罪以下夏四月乙酉太尉臨川王宏薨南州津改置校尉增加奉秩詔在位羣臣各舉所知凡是清吏咸使薦聞秋九月己酉荆州刺史鄱陽王恢薨冬十一月庚辰丁貴嬪薨大赦是嵗河南髙麗林邑滑國並遣使朝貢大通元年春正月乙丑以尚書右僕射徐勉為尚書左僕射詔百官奉祿自今可長給見錢辛未祀南郊詔流亡者聽復宅業蠲役五年尤貧家勿收今年三調孝悌力田賜爵一級是月司州刺史夏侯䕫進軍三闗所至皆尅初帝創同泰寺至是開大通門以對寺之南門取反語以協同㤗自是晨夕講義多由此門三月辛未幸寺捨身甲戌還宫大赦改元大通以符寺及門名夏五月丙寅成景儁剋魏臨潼竹邑冬十月庚戌魏東豫州刺史元慶和以渦陽内屬甲寅曲赦東豫州十一月丁卯以中䕶軍蕭藻為都督侵魏鎮于渦陽是嵗林邑師子髙麗等國各遣使朝貢二年春正月乙酉蠕蠕國遣使朝貢二月築寒山堰癸丑魏孝明皇帝崩夏四月戊戌魏爾朱榮推奉孝莊帝庚子榮殺㓜主及太后胡氏辛丑魏郢州刺史元顯逹以義陽降封顯逹為樂平王是時魏大亂其北海王顥臨淮王彧汝南王悦並來奔北青州刺史元儁南荆州刺史李志皆以地降冬十月丁亥以魏北海王顥主魏遣東宫直閤將軍陳慶之衞送還北魏豫州刺史鄧獻以地降是嵗魏武泰元年尋改為建義又改曰永安中大通元年春正月辛酉祀南郊大赦賜孝悌力田爵一級辛巳祀明堂夏四月癸巳陳慶之攻㧞魏梁城進屠考城禽魏濟隂王暉業五月癸酉進剋虎牢魏孝莊帝出居河北乙亥元顥入京師僭號建武六月壬午以永興公主疾篤故大赦公主志也是月都下疫甚帝於重雲殿為百姓設救苦齋以身為禱閏月護軍將軍南康王績薨己卯魏將爾朱榮攻殺元顥京師反正秋九月辛巳朱雀航華表災癸巳幸同泰寺設四部無遮大會上釋御服披法衣行清淨大捨以便省為房素牀瓦器乗小車私人執役甲午升講堂法坐為四部大衆開湼槃經題癸卯羣臣以錢一億萬奉贖皇帝菩薩大捨僧衆黙許乙巳百辟詣寺東門奏表請還臨宸極三請乃許帝三答書前後並稱頓首冬十月己酉又設四部無遮大㑹道俗三萬餘人會畢帝御金輅還宫御太極殿大赦改元十一月戊子魏巴州刺史嚴始忻以城降是嵗盤盤蠕蠕國並遣使朝貢二年夏四月癸丑幸同泰寺設平等會庚申大雨雹六月丁巳遣魏汝南王悅還北主魏庚申以魏尚書左僕射元遵為司州牧隨悅北侵是月林邑扶南國遣使朝貢秋八月庚戌幸徳陽堂祖魏主元悦山賊冦會稽郡縣九月壬午假超武將軍湛海珍節以討之是嵗魏莊帝殺其權臣爾朱榮其黨奉魏長廣王曄為主而殺孝莊帝年號建明三年春正月辛巳祀南郊大赦丙申以魏尚書僕射鄭元䕶為征北大將軍二月辛丑祀明堂夏四月己巳皇太子統薨六月癸丑立昭明太子子華容公歡為豫章郡王枝江公譽為河東郡王曲江公詧為岳陽郡王是月丹丹國遣使朝貢秋七月乙亥立晉安王綱為皇太子大赦賜為父後者及出處忠孝文武清勤並爵一級庚寅詔宗室有服屬者並賜湯沐食鄉亭侯各隨逺近以為差次壬辰以吏部尚書何敬容為尚書右僕射九月狼牙修國遣使朝貢是秋吳興生野稻飢者頼焉冬十月己酉上幸同泰寺升法坐為四部衆説湼槃經迄于乙卯前樂山縣侯蕭正則有罪流徙至是招誘亡命欲㓂廣州在所討平之十一月乙未上幸同泰寺升法坐為四部衆説般若經迄于十二月辛丑是嵗魏爾朱兆又廢其主曄而奉節閔皇帝改建明二年為普泰元年又魏勃海王髙歡舉兵信都别奉勃海太守朗為主改普泰元年為中興四年春正月丙寅以開府儀同三司南平王偉為大司馬以司空宋王元法僧為太尉尚書令以開府儀同三司袁昻為司空立臨川靖惠王宏子正徳為臨賀郡王庚午立嫡皇孫大器為宣城郡王位列諸侯上癸未魏南兖州刺史劉世明以城降二月壬寅以太尉元法僧還北主魏以侍中元景隆為徐州刺史封彭城郡王通直常侍元景宗為青州刺史封平昌郡王隨法僧北侵庚戌新除揚州刺史邵陵王綸有罪免為庻人三月庚午侍中領國子博士蕭子顯表置制㫖孝經助教一人生十人專通帝所釋孝經義夏四月盤盤國遣使朝貢秋七月甲辰星隕如雨九月乙巳加司空袁昻為尚書令冬十一月髙麗國遣使朝貢十二月丙子魏彭城王爾朱仲逺來奔以為定洛將軍封河南王北侵隨所剋土使自封建庚辰以太尉元法僧為郢州刺史驃騎大將軍開府同三司之儀是嵗魏相勃海王髙歡平爾朱氏廢節閔皇帝及自所奉勃海故王朗而奉平陽王修是為孝武皇帝改中興二年為太昌尋又改為永熙元年五年春正月辛卯祀南郊大赦賜孝悌力田爵一級先是一日丙夜南郊令解滌之等到郊所履行忽聞異香三隨風至及將行事奏樂迎神畢有神光圓滿壇上朱紫黄白雜色食頃乃滅戊申都下地震己酉長星見辛亥祀明堂二月癸未幸同泰寺設四部大會升法坐發金字般若經題訖于己丑三月丙辰大司馬南平王偉薨夏五月戊子都下大水御道通船六月己卯魏建義城主蘭保殺東徐州刺史崔祥以下邳降冬十月庚申以尚書右僕射王敬容為左僕射以吏部尚書謝舉為右僕射是嵗河南波斯盤盤等國並遣使朝貢六年春二月癸亥耕籍田大赦賜孝悌力田爵一級三月己亥以行河南王可㳫振為西秦河二州刺史正封河南王甲辰百濟國遣使朝貢夏四月丁卯熒惑在南斗秋七月甲辰林邑國遣使朝貢冬十月丁卯以信武將軍元慶和為鎭北將軍封魏王率衆北侵閏十二月丙午西南有雷聲二是嵗魏孝武帝廹于其相髙歡出居闗中歡又别奉清河王世子善見為主是為孝静帝改永熙三年為天平元年魏於是始分為兩孝武既至闗中又與丞相宇文泰不平未幾遇鴆而崩大同元年春正月戊申朔大赦改元二月辛巳祀明堂丁亥耕籍田辛丑髙麗丹丹國並遣使朝貢三月丙寅幸同泰寺設無遮大會辛未滑國遣使朝貢夏四月庚子波斯國遣使朝貢壬戌幸同泰寺鑄十方銀像幷設無碍會秋七月辛卯扶南國遣使朝貢冬十月雨黄塵如雪十一月壬戌北梁州刺史蘭欽攻漢中魏梁州刺史元羅降癸亥復梁州是嵗西魏文皇帝大統元年二年春二月乙亥耕籍田三月庚申詔求讜言及令文武在位舉士戊寅帝幸同泰寺設平等法會夏四月乙未以開府同三司之儀元法僧為太尉五月癸卯以魏梁州刺史元羅為青冀二州刺史封東郡王六月丁亥詔郊明堂陵廟等令改視散騎侍郎秋九月辛亥幸同泰寺設四部無碍法會冬十月乙亥詔大舉北侵壬午幸同泰寺設無碍大會十一月雨黄塵如雪攬之盈掬己亥詔北侵衆軍班師辛亥都下地震生白毛長二尺十二月壬申與東魏通和三年春正月辛丑祀南郊大赦賜孝悌力田爵一級是夜朱雀門災壬寅雨灰黄色二月丁亥耕籍田癸巳以護軍將軍蕭藻為尚書左僕射三月戊戌立昭明太子子􅩼為武昌郡王譼為義陽郡王夏五月癸未幸同泰寺鑄十方金銅像設無碍法會六月青州朐山隕霜秋七月青州雪害苗稼癸卯東魏人來聘己酉義陽王譼薨八月辛卯幸阿育王寺設無碍法喜食大赦九月使兼散騎常侍張臯聘于東魏閏九月甲子侍中太尉元法僧薨冬月丙辰都下地震是嵗飢四年春二月己亥耕籍田三月河南蠕蠕國並遣使朝貢夏五月甲戌東魏人來聘六月辛丑日有蝕之秋七月癸亥詔以東冶徒李齊家降象牙如來真形大赦戊辰使兼散騎常侍劉孝儀聘于東魏八月甲辰詔南兖等十二州既經饑饉曲赦逋租宿責勿收今年三調九月閲武于樂游苑五年春三月乙卯以護軍將軍廬陵王續為驃騎將軍安右將軍尚書左僕射蕭藻為中衛將軍並開府儀同三司中權將軍丹陽尹何敬容以本號為尚書令吏部尚書張纘為尚書左僕射丁巳御史中丞參禮儀事賀琛奏今南北二郊及籍田往還並宜御輦不復乘路三郊請用素輦籍田往還乘常輦皆以侍中陪侍停大將軍及太僕詔付尚書博議施行改素輦名大同輦郊祀宗廟乘佩輦辛未祀南郊詔孝悌力田及州閭鄉黨稱為善人者各賜爵一級秋八月乙酉扶南國獻生犀冬十一月乙亥東魏人來聘十二月使兼散騎常侍柳豹聘于東魏是嵗都下訛言天子取人肝以飴天狗大小相警日晚便閉門持杖數月乃止六年春正月庚戌朔曲赦司豫徐兖四州二月己亥耕籍田夏四月癸未詔晉宋齊三代諸陵有職司者勤加守護五月乙卯河南王遣使朝獻馬及方物求釋迦像并經論十四條勅付像并制㫖湼槃般若金光明講疏一百三卷秋七月丁亥東魏人來聘遣散騎常侍陸晏子報聘八月戊午大赦辛未盤盤國遣使朝貢九月戊戌司空袁昻薨冬十一月己卯曲赦都下十二月壬子江州刺史豫章王歡薨七年春正月辛巳祀南郊大赦辛丑祀明堂二月乙巳以行宕昌王梁彌泰為平西將軍河梁二州刺史正封宕昌王辛亥耕籍田乙卯都下地震夏四月戊申東魏人來聘遣兼散騎常侍明少遐報聘冬十一月丙子詔停所在使役女丁十二月壬寅東魏人來聘遣兼散騎常侍袁狎報聘丙辰於宫城西立士林館延集學者是嵗宕昌蠕蠕髙麗百濟滑國各遣使朝貢百濟求湼槃等經疏及醫工畫師毛詩博士并許之交州人李賁攻刺史蕭諮八年春正月安成郡人劉敬躬挾左道以反二月戊戌江州刺史湘東王繹遣中兵曹子郢討禽之送于都斬之建康市三月於江州新蔡高塘立頌平屯墾作蠻田九年春閏正月丙申地震生毛三月以太子詹事謝舉為尚書僕射夏四月林邑王破徳州攻李賁賁將范修又破林邑王於九徳敗走之冬十一月益州刺史武陵王紀進號征西將軍開府儀同三司十年春正月李賁竊號於交趾年號天徳三月甲午幸蘭陵庚子謁建陵有紫雲䕃陵上食頃乃散帝望陵流涕所霑草皆變色陵傍有枯泉至是而流水香潔辛丑哭于修陵壬寅於皇基寺設法會詔賜蘭陵老少位一階并加頒賚所經縣邑無出今年租賦因賦還舊鄉詩癸卯詔園陵職司恭事勤勞並賜位一階并加賜賚己酉幸京口城北固樓因改名北顧庚申幸囘賔亭宴帝鄉故老及所經近縣奉迎候者少長數千人各賚錢二千夏四月乙卯至自蘭陵詔鰥寡孤獨尤貧者贍恤各有差五月廣州人盧子略反刺史新渝侯映討平之詔曲赦廣州秋九月己丑赦冬十一月大雪平地三尺十一年春正月震華林園光嚴殿重雲閣帝自貶拜謝上天累刻乃止夏四月東魏人來聘冬十月己未詔復開贖罪典中大同元年春正月丁未曲阿縣建陵隧口石辟邪起舞有大蛇鬭隧中其一被傷奔走青蟲食陵樹葉略盡癸酉交州刺史楊㬓剋交阯嘉寧城李賁竄入屈獠洞交州平三月乙巳大赦庚戌幸同泰寺講金字三慧經仍施身夏四月丙戌皇太子以下奉贖仍於同泰寺解設法會大赦改元是夜同泰寺災六月辛巳竟天有聲如風水相薄秋七月甲子詔自今有犯罪者非大逆父母祖父母勿坐丙寅詔曰朝四暮三衆狙皆喜名實未虧而喜怒為用頃聞外間多用九陌錢陌减則物貴陌足則物賤非物有貴賤是心有顚倒至於遠方日更滋甚自今可通用足陌錢八月丁丑東揚州刺史武昌王􅩼薨甲午渴槃陁國遣使獻方物冬十一月癸酉汝隂王劉哲薨太清元年春正月己亥朔日有蝕之壬寅荆州刺史廬陵王續薨辛酉祀南郊大赦甲子祀明堂是日東魏相勃海王髙歡薨二月己卯白虹貫日庚辰東魏司徒侯景求以河南十三州内屬壬午以景為大將軍封河南王大行臺承制如鄧禹故事丁亥耕籍田三月庚子幸同泰寺設無遮大會上釋法服服法衣行清淨大捨名曰羯磨以五明殿為房設素木牀葛帳土瓦器乘小輿私人執役乘輿法服一皆屏除甲辰遣司州刺史羊鴉仁率青冀二州刺史桓和仁州刺史湛海珍等應接侯景兵未至而東魏遣兵攻景景又割地求救於西魏方解圍乙巳帝陞光嚴殿講堂坐師子講金字三慧經捨身夏四月庚寅羣臣以錢一億萬奉贖皇帝菩薩僧衆黙許戊寅百辟詣鳯莊門奉表三請三答頓首並如中大通元年故事丁亥服袞冕御輦還宫幸太極殿如即位禮大赦改元是月神馬出皇太子獻寳馬頌六月戊辰以前雍州刺史鄱陽王範為征北將軍總督漢北征討諸軍事秋七月庚申羊鴉仁入縣瓠城八月乙丑諸軍北征以南豫州刺史蕭淵明為大都督赦緣邊初附諸州戊子以大將軍侯景錄行臺尚書事九月癸卯王游苑成輿駕幸苑冬十一月東魏將慕容紹宗大敗蕭淵明于寒山淵明被俘執紹宗進圍潼州十二月戊辰命太子舍人元貞還北為東魏主二年春正月癸巳朔兩月相承如鉤見于西方戊戌詔在位各舉所知己亥東魏克渦陽辛丑以尚書僕射謝舉為尚書令以守吏部尚書王克為尚書僕射甲辰東魏剋殷豫二州三月甲辰撫軍將軍髙麗王髙延卒以其子成為寧東將軍髙麗王樂浪公己未屈獠洞斬李賁傳首建鄴夏四月丙子詔在朝及州郡各舉士五月辛丑以新除中書令邵陵王綸為安南將軍開府儀同三司辛亥曲赦交愛徳三州六月天裂于西北長十丈濶二丈光出如電其聲如雷秋七月使兼散騎常侍謝班聘于東魏結和八月戊戌侯景舉兵反甲辰使開府儀同三司邵陵王綸都督衆軍討景曲赦南豫州九月戊辰地震江右尤甚壊屋殺人地生白毛長二尺益州市有飛蠭萬羣螫人死冬十月侯景襲譙州進攻䧟歴陽戊申以臨賀王正徳為平北將軍都督諸軍屯丹陽郡己酉景自横江濟採石辛亥至建鄴臨賀王正徳率衆附賊十一月戊午朔設壇刑白馬祀蚩尤於太極殿前己未景立蕭正徳為天子於南闕前辛酉賊攻陷東府城庚辰邵陵王綸帥武州刺史蕭弄璋前譙州刺史趙伯起等入援乙酉進軍湖頭與賊戰賊敗績丙戌安北將軍鄱陽王範遣世子嗣雄信將軍裴之髙等率衆入援次張公洲十二月戊申天西北裂有光如火尚書令謝舉卒丙辰司州刺史柳仲禮前衡州刺史韋粲髙州刺史李遷仕前司州刺史羊鴉仁等率軍入援三年春正月丁巳大都督柳仲禮率衆軍分據南岸賊濟軍於青塘襲破韋粲營粲拒戰而死庚申白虹貫日三重邵陵王綸臨城公大連等率兵集南岸戊辰有流星長三十丈墮武庫李遷仕及天門太守樊文皎進軍青溪東為賊所破文皎死之壬午熒惑守心二月侯景遣使求和皇太子固請帝乃許之盟于西華門下景既運東城米歸于石頭亦不解圍啓求遣諸軍退乃解丁未皇太子又命南兖州刺史南康王會理前青冀二州刺史湘潭侯退率江北之衆頓于蘭亭苑甲子以開府儀同三司丹陽尹邵陵王綸為司空以合州刺史鄱陽王範為征北大將軍開府儀同三司以司州刺史柳仲禮為侍中尚書僕射時景姦計既成乃表陳帝失復舉兵向闕三月城内以景違盟設壇告天地神祇戊午前司州刺史羊鴉仁等進軍東府北與賊戰大敗時四方征鎮入援者三十餘萬皆莫有鬭志自相抄奪而已丁卯賊攻陷宫城縱兵大掠己巳賊矯詔遣石城公大款解外援軍庚午侯景自為都督中外諸軍事大丞相錄尚書事辛未援軍各退散丙子熒惑守心夏四月己丑都下地震丙申又震己酉帝以所求不供憂憤寢疾是月青冀二州刺史明少遐東徐州刺史湛海珍北青州刺史王奉伯各舉州附于東魏五月丙辰帝崩于淨居殿時年八十六辛亥遷大行皇帝梓宫于太極前殿十二月乙卯葬于修陵追尊為武皇帝廟號髙祖帝生知純孝六嵗獻皇太后崩水漿不入口三日哭泣有過成人内外親黨咸加欽異及丁文皇帝憂時為齊隨王諮議隨府在荆鎮髣髴奉問便投劾星馳不復寢食倍道就路憤風驚浪不暫停止帝形容本壯及至都銷毁骨立親表士友不復識焉望宅奉諱氣絶久之每哭輙歐血數升服内不服常米惟資大麥日止二溢拜埽山陵涕淚所灑松草皆為變色及居帝位即於鍾山造大愛敬寺青溪邊造智度寺又於臺内立至敬等殿又立七廟堂月中再過設淨饌每至展拜涕泗滂沱哀動左右少而篤學能事畢究雖萬機多務猶卷不綴手然燭繼明常至戊夜撰通史六百卷金海三十卷制㫖孝經義周易講疏及六十四卦二繫文言序卦等義樂社義毛詩春秋答問尚書大義中庸講疏孔子正言老子講疏凡二百餘卷並正先儒之迷開古聖之㫖王侯朝臣皆奉表質疑帝皆為解釋修飾國學增學生員立五館置五經博士天監初何佟之賀瑒嚴植之明山賔等覆述制㫖并撰吉凶賔軍嘉五禮凡一千餘卷帝稱制斷疑焉大同中於臺西立士林館領軍朱异太府卿賀琛舍人孔子袪等遞互講述皇太子宣城王亦於東宫宣猷堂及揚州廨開講於是四方郡國趍學嚮風雲集於京師矣帝爰自在田及登寳位躬制贊序詔誥銘誄箴頌牋奏諸文又百二十卷六藝備閑棊登逸品隂陽緯候卜筮占決草隸尺牘騎射莫不精妙晚乃溺信佛道日止一食膳無鮮腴惟豆羮糲飯而已或遇事繁擁日儻移中便𠻳口以過制湼槃大品淨名三慧諸經義記數百卷臨覽餘閒即於重雲殿及同泰寺講説名僧碩學四部聼衆常萬餘人身衣布衣木綿皂帳一冠三載一被二年自五十外便斷房室後宫職司貴妃以下六宫褘褕三翟之外皆衣不曳地傍無錦綺不飲酒不聼音聲非宗廟祭祀大會饗宴及諸法事未嘗作樂勤於政務孜孜無怠每冬月四更竟即勅把燭看事執筆觸寒手為皴裂然仁愛不斷親親及所愛愆犯多有縱捨故政刑㢮紊每決死罪常有哀矜涕泣然後可奏性方正雖居小殿暗室恒理衣冠而坐暑月未嘗褰袒雖見内竪小臣亦如遇大賔也歴觀古昔帝王仁聖恭儉矜莊藝能博學罕有及焉初齊髙帝夢屐而登殿顧見明武二帝後一人手張天地圖而不識問之答曰順子及崔慧景之逼臺城宣武王入援至越城夢乘馬飛半天而墜帝所馭馬化為赤龍騰虛獨上時臺内有宿衞士為覡常見太極殿有六龍各守一柱末忽失其二後見在宣武王宅時宣武為益州覡乃往蜀奉事及宣武在郢此覡還都乃見六龍俱在帝所寢齋遂去郢之雍中途遇疾且死謂同侣曰蕭雍州必作天子具以前事語之推此而言蓋天命也雖在幽逼齋戒不廢及疾不能進膳盥潄如初皇太子日中再朝每問安否涕泗交面賊臣侍者莫不掩泣疾乆口苦索蜜不得再曰荷荷遂崩賊祕之太子問起居不得見慟于閤下始天監中沙門釋寳誌為詩曰昔年三十八今年八十三四中復有四城北火酣酣帝使周捨封記之及中大同元年同泰寺災帝啓封見捨手迹為之流涕帝生於甲辰三十八剋建鄴之年也遇災嵗實丙寅八十三矣四月十四日而火火起之始自浮屠第三層三者帝之昆季次也帝惡之召太史令虞履筮之遇巛履曰無害其繇云西南得朋東北喪朋安貞吉文言云東北喪朋乃終有慶帝曰斯魔鬼也酉應見卯金來剋木卯為隂賊鬼而帯賊非魔何也孰為致之酉為口舌當乎說位說言乎兌故知善言之口宜前為法事於是人人讚善莫不從風或刺血灑地或刺血書經穿心然燈坐禪不食及太清元年帝捨身光嚴重雲殿游仙化生皆震動三日乃止當時謂之祥瑞識者以非動而動在洪範為祅以比石虎之敗殿壁畫人頸皆縮入頭之類時海中浮鵠山去餘姚岸可千餘里上有女人年三百嵗有女官道士四五百人年並出百但在山學道遣使獻紅席帝方捨身時其使適至云此草常有紅鳥居其下故以為名觀其圖狀則鸞鳥也時有男子不知何許人於大衆中自割身肉以飼飢鳥血流徧體而顔色不變又沙門智泉者用鐵鉤挂體以燃千燈一日一夜端坐不動開講之日有三足鳥集于殿之東戸又自戸適於西南縣楣三飛三集又有白雀一見于重雲閣前連理樹復有五色雲浮於華林園昆明池上其為徴應不一而足帝既酷事浮屠末年流溺滋甚境内化之因以成俗遂至於喪亡而不可救云臣謹按侯景陷城之夕武帝不知永安侯蕭確排闥入啓曰城已陷矣帝曰猶可一戰否對曰人心崩潰不可復戰武帝歎曰自我得之自我失之不累後人亦復何恨自古未有身取天下而身失之也又按姚思亷云武帝御歴握圖功成治定征賦所及之州文軌旁通之地南亘萬里西拒五千三四十年之間統内殷富禮興樂作斯為盛矣晉宋以降或未有焉及乎耄年委事羣倖朱异之徒作福作威挾朋植黨政以賄成服冕乘軒由其掌握是以朝綱混雜黜陟無章易曰開國承家小人勿用此之謂也武帝天監十八年普通七年大通二年中大通六年大同十一年中大同元年太清三年即位四十八年太宗簡文皇帝諱綱字世讚小字六通武帝第三子昭明太子母弟也天監二年十月丁未生于顯陽殿五年封晉安王八年為雲麾將軍領石頭戌軍事量置佐史普通四年累遷都督雍州刺史中大通三年被徴入朝未至而昭明太子謂左右曰我夢與晉安王對奕據道我以班劍授之王還當有此加乎四月昭明太子薨五月丙申立晉安王為皇太子七月乙亥臨軒䇿拜于時以修繕東宮令權居東府四年九月移還東宫太清三年臺城陷太子坐永福省見侯景神色自若了無懼容五月丙辰帝崩辛巳太子即皇帝位大赦癸未追尊穆貴嬪為皇太后追尊妃王氏為簡皇后六月丙戌以南康王會理為司空丁亥立宣城王大器為皇太子壬辰立當陽公大心為尋陽郡王石城公大款為江夏郡王寧國公大臨為南海郡王臨城公大連為南郡王西豐公大春為安陸郡王新淦公大成為山陽郡王臨湘公大封為宜都郡王髙唐公大莊為新興郡王秋七月甲寅廣州刺史元景仲謀應侯景西江督䕶陳霸先攻之景仲自殺霸先迎定州刺史蕭勃為刺史庚午以司空南康王會理為兼尚書令是月九江大饑人相食者十四五八月癸卯征東大將軍開府儀同三司南徐州刺史蕭藻薨丙午侯景矯詔儀同三司位比王公自今悉不加將軍以為定準冬十月丁未地震是月百濟國遣使朝貢見城寺荒蕪哭于闕下大寳元年春正月辛亥朔大赦改元丁巳天雨黄沙己未西魏剋安陸執司州刺史柳仲禮盡有漢東地丙寅月晝見于東方癸酉前江都令祖皓起義兵于廣陵二月癸未侯景攻下廣陵皓見害乙巳以尚書僕射王剋為左僕射丙午侯景逼帝幸西州夏五月丙辰東魏静帝遜位于齊庚午開府儀同三司鄱陽王範薨自春迄夏大旱人相食都下尤甚六月庚子前司州刺史羊鴉仁自尚書省出奔江陵秋七月戊辰賊行臺任約㓂江州刺史尋陽王大心以州降之八月甲午湘東王繹遣領軍將軍王僧辯逼郢州邵陵王綸棄郢州走九月乙亥侯景自進位相國封二十郡為漢王冬十月乙未景又逼帝幸西州曲宴自加宇宙大將軍都督六合諸軍事立皇子大鈞為西陽郡王大威為武寧郡王大球為建安郡王大昕為義安郡王大贄為綏建郡王大圜為樂梁郡王壬寅侯景害司空南康王會理十一月任約進據西陽分兵冦齊昌執衡陽王獻送都下害之湘東王繹遣前寧州刺史徐文盛拒約南郡王前中兵參軍張彪起義於會稽若邪山攻破浙東諸縣二年春二月邵陵王綸走至安陸董城為魏所攻見殺三月庚戌魏文帝崩夏閏四月侯景圍巴陵六月乙巳解圍宵遁秋七月景還至建鄴八月戊午景遣偽衞尉卿彭儁廂公王僧貴入殿廢帝為晉安王害皇太子大器尋陽王大心西陽王大鈞武陽王大威建安王大球義安王大昕及尋陽王諸子二十餘人矯為帝詔以為次當支庶宜歸正嫡禪位于豫章王棟使吕季略送詔令帝寫之帝書至先皇念神器之重思社稷之固越升非次遂主震方嗚咽不能自止賊衆皆為掩泣乃幽帝于永福省棟即位改元天正使害南海王大臨於吳郡南郡王大連於姑熟安陸王大春於會稽新興王大莊於京口冬十月壬寅帝崩于永福省時年四十九賊偽諡曰明皇帝廟稱髙宗明年三月己丑王僧辯平侯景率百官奉梓宫陞朝堂元帝追崇為簡文皇帝廟號太宗四月乙丑葬莊陵帝㓜而聰睿六嵗便能屬文武帝弗之信於前靣試帝攬筆立成文武帝歎曰常以東阿為虛今則信矣及長器宇寛宏未嘗見喜慍色尊嚴若神方頤豐下須鬢如畫垂髮委地雙眉翠色項毛左旋連錢入背手執玉如意不相分辨盼睞則目光燭人讀書十行俱下辭藻豔發博綜羣言善談元理自十一便能親庶務歴試蕃政所在稱美性恭孝居穆貴嬪憂哀毁骨立所坐席霑濕盡爛在襄陽拜表侵魏遣長史柳建司馬董當門壯武將軍杜懐寳振逺將軍曹義宗等進軍剋南陽新野等郡拓地千餘里及居監撫多所𢎞宥文案簿領纎豪必察𢎞納文學之士賞接無倦嘗於元圃述武帝所製五經講疏聼者傾朝野雅好賦詩其自序云七嵗有詩癖長而不倦然帝文傷於輕靡時號宫體所著昭明太子傳五卷諸王傳三十卷禮大義二十卷長春義記一百卷法寳連璧三百卷謝客文涇渭三卷玉簡五十卷光明符十二卷易林十七卷竈經二卷沐浴經三卷馬槊譜一卷棊品五卷彈棊譜一卷新增白澤圖五巻如意方十卷文集一百巻並行於世初即位制年號將曰文明以外制彊臣取周易内文明而外柔順之義恐賊覺乃改為大寳雖在蒙塵尚引諸儒論道説義披尋墳史未嘗暫釋及見南康王會理誅知不久指所居殿謂舍人殷不害曰龎涓死此下又曰吾昨夢吞土試思之不害曰晉重耳饋塊卒反晉國陛下所夢將符是乎帝曰儻幽明有徵冀斯言不妄初景納帝女溧陽公主公主有美色景惑之妨於政事王偉每以為言景以告主主出惡言偉知之懼見䜛乃謀廢帝而後間主因勸行殺以絶衆心帝既廢偉乃與彭儁王修纂進觴於帝曰丞相以陛下幽憂既久使臣上壽帝笑曰已禪帝位何得言陛下此壽酒將不盡此乎於是儁等并齎酒餚曲項琵琶與帝極飲帝知將見殺乃盡酣謂曰不圖為樂一至於斯既醉而寢偉乃出儁進土囊王修纂坐上乃崩竟恊於夢偉撤戸扉為棺遷殯于城北酒庫中帝自幽縶之後賊乃撤内外侍衞使突騎圍守牆垣悉有枳棘無復紙乃書壁及版彰為文自序云有梁貞士蘭陵蕭世讚立身行道終始若一風雨若晦雞鳴不已弗欺暗室豈况三光數至於此命也如何又為文數百篇崩後王偉觀之惡其辭切即使刮去有隨偉入者誦其連珠三首詩四篇絶句五篇文並悽愴云簡文帝大寳二年世祖孝元皇帝諱繹字世誠小字七符武帝第七子也初武帝夢眇目僧執香爐稱託生王宫既而帝母在采女次侍始褰戸幔有風回裾武帝意感幸之采女夢月墮懐中遂孕天監十年八月丁巳生帝舉室中非常香有紫胞之異武帝竒之因賜采女姓阮進為修容十三年封湘東王太清元年累遷為鎭西將軍都督荆州刺史三年三月侯景陷建鄴四月世子方等至自建鄴知臺城不守帝命栅江陵城周回七十里鎭西長史王沖等拜牋請為太尉都督中外諸軍事承制主盟帝不許曰吾於天下不賤寧俟都督之名帝子之尊何藉上台之位議者可斬投筆流涕沖等重請不從又請為司空以主諸侯亦不聼乃開鎭西府辟天下士是月帝徵兵於湘州刺史河東王譽譽拒命尋上甲侯韶自建鄴至宣三月十五日密詔授帝位假黄鉞大都督中外諸軍事司徒承制於是立行臺於南郡而置官司焉七月遣世子方等討河東王譽軍敗死之又遣鎭兵將軍鮑泉討譽九月乙卯雍州刺史岳陽王詧舉兵冦江陵其將杜崱兄弟來降詧遁走鮑泉攻湘州未剋又遣左衞將軍王僧辯代將及簡文帝即位改元為大寳元年帝以簡文制于賊臣卒不遵用正月使少子方晷質于魏魏不受質而結為兄弟四月尅湘州斬譽湘州平雍州刺史岳陽王詧自稱梁王稱藩于魏魏遣兵助伐襄陽先是邵陵王綸書已言凶事祕之以待湘州之捷是月壬寅始命陳瑩報武帝崩問帝哭于正寢六月江夏王大款山陽王大成宜都王大封自信安來奔九月辛酉以前郢州刺史南平王恪為中衞將軍尚書令開府儀同三司改封大款為臨川郡王大成為桂陽郡王大封為汝南郡王十一月甲子南平王恪等奉牋進位相國總百揆帝不從二年三月侯景悉兵西上閏四月景遣其將朱子仙任約襲郢州執刺史方諸庚戌領軍王僧辯屯師巴陵五月癸未帝遣將胡僧祐陸法和援巴陵六月僧祐等擊破景將任約軍禽約景解圍宵遁以王僧辯為征東將軍開府儀同三司尚書令帥衆追景所至皆㨗進圍郢州獲賊將朱子仙等九月盤盤國獻馴象十月辛丑朔紫雲如蓋臨江陵城是月簡文帝崩開府儀同三司王僧辯等奉表勸進帝奉諱大臨三日百官縞素答表不許司空南平王恪率宗室領軍將軍胡僧祐率羣僚江州别駕張佚率吏人並奉牋勸進帝固讓十一月乙亥僧辯又奉表勸進又不從時巨冦尚存帝未欲即位而四方表勸前後相屬乃下令斷表承聖元年二月王僧辯衆軍發自尋陽帝馳檄四方賜獲景及逆者封萬戸開國公絹布五萬匹三月僧辯等平景傳首江陵戊子以賊平告明堂太社己丑僧辯等又表勸進帝尚未從辛卯宣武將軍朱買臣奉帝密㫖害豫章王棟及其二弟橋樛四月乙巳益州刺史新除假黄鉞太尉武陵王紀僭位於蜀年號天正帝遣司空蕭泰祠部尚書樂子雲拜謁塋陵修復社廟丁巳下令解嚴五月庚午司空南平王恪及宗室王侯大都督王僧辯等復拜表上尊號帝猶固讓甲申以開府儀同三司江州刺史王僧辯為司徒乙酉斬賊左僕射王偉尚書呂季略少府卿周石珍舍人嚴亶於江陵市乃下令赦境内齊將潘樂辛術等攻秦郡王僧辯遣將杜崱帥衆拒之以陳霸先為征北大將軍開府儀同三司徐州刺史齊人賀平侯景八月武陵王紀率巴蜀之衆東下遣䕶軍將軍陸法和屯巴峽以拒之九月甲戌司空南平王恪薨十月乙未前梁州刺史蕭循自魏至江陵以為平北將軍開府儀同三司戊申執湘州刺史王琳於殿内庚戌琳長史陸納及其將潘烏累等舉兵反攻陷湘州是月四方征鎮王公卿士復勸進表三上乃許之冬十一月丙子皇帝即位於江陵改太清六年為承聖元年逋租宿責並許𢎞宥孝子順孫悉皆賜爵長徒鎻士特加原宥禁錮奪勞一皆曠蕩是日帝不升正殿公卿陪列而已時有兩日俱見己卯立王子方矩為皇太子改名元良立皇子方智為晉安郡王方略為始安郡王追所生阮修容為文宣太后改謚忠壯世子為武烈世子封其子莊為永嘉王是月陸納遣將軍潘烏累等破衡州刺史丁道貴於淥口道貴走零陵十二月陸納分兵龔巴陵湘州刺史蕭循擊走之天門山獲野人出山三日而死星隕吳郡淮南有野象數百壊人室廬宣城郡猛虎暴食人是嵗魏廢帝元年二年春正月乙丑詔王僧辯討陸納戊寅以吏部尚書王襃為尚書僕射己卯江夏宫南門籥牡飛三月庚寅有兩龍見湘州西江夏五月甲申魏大將尉遲迥進兵逼巴西潼州刺史楊乾進以城納迥己丑武陵王紀軍至西陵六月乙卯王僧辯平湘州秋七月武陵王紀衆大潰見殺八月戊戌尉遲迥平蜀九月齊遣郭元建及將邢景逺歩大汗薩東方老帥衆頓合肥冬十一月辛酉僧辯留鎭姑熟豫州刺史侯瑱據東闗壘徵吳興太守裴之横帥衆繼之戊戌以尚書僕射王襃為左僕射湘東太守張綰為右僕射十二月宿豫土人東方光據城歸北齊江西州郡皆起兵應之三年春正月魏帝為相安定公所廢而立齊王廓是為恭帝元年二月主衣庫見黑蛇長丈許數十小蛇隨之舉頭高丈餘南望俄失所在帝又與宫人幸元洲苑復見大蛇盤屈於前羣小蛇遶之並黑色帝惡之宫人曰此非怪也恐是錢龍帝勅所司即日取數千萬錢鎮於蛇處以厭之因設法會赦囚徒振窮乏退居栖心省又有蛇從屋墜落帝㡌上忽然便大又龍光殿上所御肩輿復見小蛇縈屈輿中以頭駕夾膝前金龍頭上見人走去逐之不及城濠中龍騰出煥爛五色竦躍入雲六七小龍相隨飛去羣魚騰躍墜死於陸道龍騰處為窟若數百斛圌舊大城上常有紫氣至是稍復消歇甲辰以司徒王僧辯為太尉車騎大將軍戊申以護軍將軍郢州刺史陸法和為司徒夏四月癸酉以征北大將軍開府儀同三司陳霸先為司空六月癸未有黑氣如龍見于殿内秋九月辛卯帝於龍光殿述老子義先是魏使宇文仁恕來聘齊使又至江陵帝接仁恕有闕魏相安定公憾焉乙巳使柱國萬紐于謹來攻冬十月丙寅魏軍至襄陽梁王蕭詧率衆會之丁卯停講内外戒嚴輿駕出行城栅大風㧞木丙子續講百寮戎服以聼詔徴王僧辯十一月甲申幸津陽門講武置南北兩城主帝親觀閱風雨總集部分未交旗幟飄亂帝趨駕而回無復次序風雨隨息衆竊驚焉乙酉以領軍胡僧祐為都督城東城北諸軍事右僕射張綰為副左僕射王襃都督城西城南諸軍事直殿省元景亮為副丁亥魏軍至栅下丙申徴廣州刺史王琳入援丁酉大風城内火燒居人數千家以為失在婦人斬首尸之是日帝猶賦詩無廢以胡僧祐為開府儀同三司庚子信州刺史徐世譜晉安王司馬任約軍次馬頭岸是夜有流星墜城中帝援蓍筮之卦成取龜式驗之因抵於地曰吾若死此下豈非命乎因裂帛為書催僧辯曰吾忍死待公可以至矣戊申胡僧祐朱買臣等出戰買臣敗績辛亥魏軍大攻帝出枇杷門親臨陣督戰僧祐中流矢薨軍敗反者斬西門守卒以納魏軍帝見執如梁王蕭詧營甚見詰辱他日乃見魏僕射長孫儉譎儉云埋金千斤於城内欲以相贈儉乃將帝入城帝因述詧相辱狀謂儉曰向聊相譎欲言耳豈有天子自埋金乎儉乃留帝於主衣庫十二月丙辰徐世譜任約退戌巴陵辛未魏人戕帝明年四月梁王方智承制追尊為元皇帝廟號世祖帝聰悟俊朗天才英發出言為論音響若鐘年五六嵗武帝嘗問所讀書對曰能誦曲禮武帝使誦之即誦上篇左右莫不驚歎初生患眼醫療必增武帝自下意療之遂盲一目乃憶先夢彌加愍愛及長好學博極羣書武帝問曰孫䇿在江東于時年幾答曰十七武帝曰正是汝年帝性不好聲色頗慕髙名為荆州刺史起州學宣尼廟嘗置儒林參軍一人勸學從事二人生三十人加稟餼帝工書善畫自圖宣尼像為之贊而書之時人謂之三絶與裴子野劉顯蕭子雲張纘及當時才秀為布衣交常自比諸葛亮桓温惟纘許焉性好矯飾多猜忌於名無所假人微有勝己者必加毁害帝姑義興昭長公主子王銓兄弟八九人有盛名帝妬害其美遂改寵姬王氏兄王珩名琳以同其父名忌劉之遴學使人鴆之如此者甚衆雖骨肉亦徧被其禍始居文宣太后憂依丁蘭作木母及武帝崩秘喪踰年乃發凶問方刻檀為像置于百福殿内事之甚謹朝夕進蔬食動静必啓聞迹其虛矯如此性愛書籍既患目多不自執巻置讀書左右番次上直晝夜為常略無休己雖睡卷猶不釋五人各伺一更恒致逹曉常眠熟大鼾左右有睡讀失次第或偷卷度紙帝必驚覺更令追讀加以檟楚雖戎略殷湊機務繁多軍書羽檄文章詔誥㸃毫便就殆不停手常曰我韜於文士愧於武夫論者以為得言始在尋陽夢人曰天下將亂王必維之又背生黑子巫媼見曰此大貴不可言初武帝􅃯賀革為帝府諮議使講三禮革西上意甚不悅過别御史中丞江革江革告之曰吾嘗夢主上徧見諸子至湘東王脫㡌授之此人後必當璧卿其行乎革頷之及太清之禍遂膺歸運自侯景之難州郡大半入魏自巴陵以下至建康率以長江為限荆州界北盡武寧西拒硤口自嶺以南復為蕭勃所據文軌所同千里而近人戸著籍不盈三萬中興之盛盡於是矣武陵之平議者欲因其舟艦遷都建鄴宗懔黄羅漢皆楚人不願移帝及胡僧祐亦俱未欲動僕射王褒左戸尚書周𢎞正驟言即楚非便宗懔及御史大夫劉懿以為建鄴王氣已盡且渚宫洲已滿百於是乃留尋而嵗星在井熒惑守心帝觀之慨然而謂朝臣文武曰吾觀亥象將恐有賊但吉凶在我運數由天避之何益及魏軍逼閽人朱買臣按劍進曰惟有斬宗懔黄羅漢可以謝天下帝曰曩實吾意宗黄何罪及魏軍燒柵買臣謝答仁勸帝乘暗潰圍出就任約帝素不便馳馬曰事必無成徒增辱耳答仁又求自扶帝以問僕射王褒褒曰答仁侯景之黨豈是可信成彼之勲不如降也乃聚圖書十餘萬卷盡燒之答仁又請守子城收兵可得五千人帝然之即授城内大都督以帝鼓吹給之配以公主既而又召王褒謀之荅仁請入不得嘔血而去遂使皇太子王褒出質請降有頃黄門郎裴政犯門而出帝乘白馬素衣出東門抽劔擊闔曰蕭世誠一至此乎魏師至凡二十八日徴兵四方未至而城見尅帝在幽逼求酒飲之製詩四絶其一曰南風且莫唱西陵最可悲今日還蒿里終非封禪時其二曰人世逢百六天道異貞恒何言異螻蟻一旦損鵾鵬其三曰松風侵晚哀霜雰當夜來寂寥千載後誰畏軒轅臺其四曰夜長無嵗月安知秋與春原陵五樹杏空得動耕人梁王詧遣尚書傅凖監行刑帝謂之曰卿幸為我宣行凖捧詩流淚不能禁進土囊而殞之梁王詧使以布把纒屍歛以蒲席束以白茅以車一乘𦵏于津陽門外愍懐太子元良及始安王方略等皆見害徐世譜任約自馬頭走巴陵約後降于齊將軍裴畿畿弟機並被害謝答仁三人相抱俱見屠汝南王大封尚書左僕射王褒以下並為俘以歸長安乃選百姓男女數萬口分為奴婢小弱者皆殺之帝於伎術無所不該嘗不得南信筮之遇剝之艮曰南信已至今當遣左右季心往㸔果如所説賔客咸驚其妙凡所占決皆然初從劉景受相術因訊以年答曰未至五十當有小厄禳之可免帝自勉曰茍有期會禳之何益及是四十七年特多禁忌牆壁崩倒屋宇傾頽年月不便終不脩改庭草蕪没令鞭去之其慎䕶如此著孝徳傳忠臣傳各三十卷丹陽尹傳十卷注漢書一百十五卷周易講疏十卷内典傳要百卷連山三十卷詞林三卷玉韜金樓子補闕子各十卷老子講疏四卷懐舊傳二卷古今全徳志荆南地記貢職圖古今同姓名錄一卷筮經十二卷式贊三卷文集五十卷初承聖二年三月有二龍自南郡城西升天百姓聚觀五采分明江陵父老竊相泣曰昔年龍出建康淮西天下大亂今復有焉禍至無日矣帝聞而惡之踰年而遘禍又江陵先有九十九洲古老相承云洲滿百當出天子桓元之為荆州刺史内懐簒逆之心乃遣鑿破一洲以應百數隨而崩散竟無所成宋文帝為宜都王在藩一洲自立俄而文帝簒統後遇元凶之禍此洲還没太清末枝江楊子閣浦復生一洲羣公上疏稱慶明年而帝即位承聖末其洲與大岸相通惟九十九云元帝承聖三年敬皇帝諱方智字慧相小字法貞元帝第九子也太清三年封興梁侯承聖元年封晉安郡王二年出為江州刺史三年十一月魏尅江陵太尉王僧辯司空陳霸先定議以帝為梁王太宰承制四年二月癸丑於江州奉迎至建鄴入居朝堂以太尉王僧辯為中書監錄尚書驃騎大將軍都督中外諸軍事加司空陳霸先班劔二十人以湘州刺史蕭循為太尉廣州刺史蕭勃為司徒三月齊遣其上黨王高渙送貞陽侯蕭淵明來主梁嗣至東闗遣吳興太守裴之横拒之與戰敗績死之四月司徒陸法和以郢州附齊遣江州刺史侯瑱討之七月辛丑僧辯納貞陽侯蕭淵明自採石濟江甲辰入建鄴丙午即偽位年號天成以帝為皇太子司空陳霸先襲殺王僧辯出淵明而奉帝焉紹泰元年秋九月丙午皇帝即位冬十月己巳大赦改元以貞陽侯蕭淵明為司徒封建安郡公壬子加司空陳霸先尚書令都督中外諸軍事震州刺史杜龕舉兵攻信武將軍陳蒨於長城義興太守韋載應之癸丑以太尉蕭循為太保以司徒蕭淵明為太傅司徒蕭勃為太尉以鎭南將軍王琳為車騎將軍開府儀同三司戊午尊所生夏貴妃為皇太后立妃王氏為皇后辛未司空陳霸先東討韋載降之丙子南豫州刺史任約譙秦二州刺史徐嗣徽舉兵據石頭反十一月庚辰齊安州刺史翟子崇楚州刺史柳逹摩率衆赴任約入石頭十二月庚戌任約徐嗣徽等至採石迎齊援丙辰遣猛烈將軍侯安都於江寧邀擊敗之約嗣徽等奔江西庚申翟子崇等降並放還北太平元年春正月戊寅大赦追贈諡簡文帝諸子封故永安侯確子後為邵陵王奉攜王後癸未震州刺史杜龕降詔賜死赦吳興郡己亥以太保宜豐侯蕭循襲封鄱陽王東揚州刺史張彪圍臨海太守王懐振於剡巖二月庚戌遣周文育陳蒨襲會稽討彪彪敗走以中衞將軍臨川王大欵即本號開府儀同三司丙辰若邪村人斬張彪傳首建鄴赦東揚州甲子以東土經杜龕張彪之亂遣大使廵省是月齊人來聘使侍中王廓報聘二月壬午班下遠近並雜用今古錢戌戌齊將蕭軌出柵口向梁山陳霸先大敗之夏四月壬申侯安都輕兵襲齊行臺司馬恭於瑟陽大破之五月癸未太傅建安公蕭淵明薨庚寅齊軍水歩入丹陽縣内外纂嚴六月壬子齊軍至元武湖西北乙卯陳霸先大破齊軍戊午大赦辛酉解嚴秋七月丙子司空陳霸先進位司徒丁亥以開府儀同三司侯瑱為司空八月己酉太保鄱陽王循薨九月壬寅大赦改元司徒陳霸先進位丞相錄尚書事改封義興郡公加中權將軍王沖開府儀同三司以吏部尚書王通為尚書右僕射冬十月乙亥魏相安定公薨十一月起雲龍神武門十二月壬申進太尉蕭勃為太保甲午封前夀昌令劉叡為汝隂王前鎭西法曹行參軍蕭沇為巴陵王奉宋齊二代後庚子魏恭帝遜位于周二年春正月壬寅詔求魯郡孔氏族為奉聖侯并繕廟堂供備祀典又詔諸州各置中正舊放舉選不得輙求單狀序官皆須中正押上然後量授其選中正每求耆徳該悉以他官領之以開府儀同三司王琳為司空以尚書右僕射王通為左僕射二月庚午遣領軍將軍徐度入東闗大保廣州刺史蕭勃舉兵反詔平西將軍周文育平南將軍侯安都等南討戊子徐度至合肥燒齊船艫三千艘癸巳周文育軍於己山獲蕭勃偽帥歐陽頠三月甲寅徳州刺史陳法武前衡州刺史譚述於始興攻殺蕭勃夏四月癸酉曲赦江廣衡三州并督内為賊所拘逼者己卯鑄四柱錢一當二十齊遣使通和壬辰改四柱錢一當十丙申復用細錢五月乙巳平西將軍周文育進號鎮南將軍平南將軍侯安都進號鎮北將軍並開府儀同三司戊辰余孝頃遣使詣丞相府求降秋八月加丞相陳霸先殊禮九月周冢宰宇文䕶弑閔帝丞相陳霸先改授相國封陳國公冬十月戊辰進陳國公爵為王辛未帝遜位于陳陳受命奉帝為江隂王薨于外邸時年十六追諡敬皇帝敬帝紹泰元年太平元年即位二年右梁四主五十六年為陳所滅通志卷十三
