body:
  text: 通志卷八十一宋右廸功郎鄭樵漁仲撰宗室傳第四宋長沙景王道憐孫韞还秉臨川烈武王道規子義慶鮑昭營浦侯遵考從父弟子季連武帝七男廬陵孝獻王義真彭城王義康江夏文獻王義恭南郡王義宣衡陽文王義季文帝十九男元凶劭始興王濬南平穆王鑠竟陵王誕建平宣簡王宏子景素廬陵王禕晉熈王昶孫暉武昌王渾始安王休仁晉平刺王休祐海陵王休茂鄱陽哀王休業臨慶冲王休倩新野懐王夷父桂陽王休範巴陵哀王休若孝武十四王豫章王子尚晉安王子勛松滋侯子房臨海王子頊始平孝敬王子鸞永嘉王子仁始安王子真邵陵王子元齊敬王子羽淮南王子孟晉陵孝王子雲南海哀王子師淮陽思王子霄東平王子嗣武陵王贊眀帝子眀帝四王邵陵殤王友隨陽王翽新興王嵩始建王憘長沙景王道憐武帝中弟也初為國子學生謝琰為徐州命為從事史武帝克京城及平建業道憐常留侍太后後以軍功封新渝縣男累遷建威將軍南彭城内史青州刺史劉該反引魏兵為援諸郡應之魏圍彭城道憐率衆救之大破魏軍斬劉該從武帝征廣固慕容超突圍走道憐所部獲之以功改封竟陵縣公進位左將軍北徐州刺史鎮彭城武帝伐劉毅召為都督鎮京口及討司馬休之道憐監太尉留府事江陵平為驃騎將軍開府儀同三司荆州刺史䕶南蠻校尉加都督北府文武悉配之道憐素無才能言音甚楚舉止施為多諸鄙拙而貪縱過甚畜財聚貨常若不足去鎮之日府庫為之一空徴拜司空徐兖二州刺史加都督出鎮京口武帝受命進位太尉封長沙王先是廬陵王義真為揚州刺史太后謂上曰道憐是汝布衣兄弟宜用為揚州刺史上曰寄奴於道憐豈有所惜但以揚州根夲所寄事務至重非道憐所了耳太后曰道憐年已五十豈不如十嵗兒邪上曰車士雖為刺史事無大小皆由寄奴道憐年長不親其事於聽望不足太后乃無言竟不授永初三年薨時年五十五贈太傅𦵏禮依晉太宰安平王孚故事鑾輅九旒黄屋左纛輼輬車挽歌二部前後羽葆鼔吹虎賁班劒百人文帝元嘉九年詔故太傅長沙景王故大司馬臨川烈武王故司徒南康文宣公劉穆之開府儀同三司華容縣公王𢎞開府儀同三司永脩縣公檀道濟故青州刺史龍陽縣公王鎮惡並勒功天府配祭廟庭道憐子義欣嗣位豫州刺史鎮夀陽境内畏服道不拾遺為盛藩彊鎮薨贈開府儀同三司謚曰成王子悼王瑾嗣傳爵至于齊受禪國除瑾弟韞字彦文位雍州刺史侍中領右衛將軍領軍將軍昇眀二年為齊髙帝所誅韞人才凡鄙特為眀帝所寵在湘州雍州使善畫者圗其出行鹵簿羽儀常自披翫嘗以圗示征西將軍蔡興宗興宗戯之陽若不觧畫者指韞形問之曰此何人而在輿韞曰政是我其庸底類如此韞弟述字彦思亦甚庸劣從子俁疾危篤父秉母蕭對之哭泣述嘗候之便命左右取酒肉令俁進之皆莫知其意或問焉答曰禮云有疾飲酒食肉述又嘗新有緦慘或詣之問其母安否述曰唯有愁惽次訪其子對曰所謂父子聚麀蓋謂麀為憂也義欣弟義融封桂陽縣侯邑千戸凡王子為侯食邑皆千戸義融位五兵尚書領軍有質幹善於用短卒謚恭侯子孝侯覬嗣無子弟襲以子晃繼襲字茂徳性庸鄙為郢州刺史暑月露褌上聴事時綱紀政伏閤怪之訪問乃知是襲義融弟義宗㓜為武帝所愛字曰伯奴封新渝縣侯位太子左衛率坐門生杜徳靈放横傷人入義宗第隐蔽免官徳靈以姿色故義宗愛寵之義宗卒於南兖州刺史謚曰恵侯子懐珍嗣無子弟秉以子承繼秉字彦節少以宗室清謹見知孝武時其弟遐坐通嫡母殷氏飬女雲敷殷每禁之及殷亡口血出衆疑遐行毒害孝武使秉從弟祗諷秉啓證其事秉曰行路之人尚不應爾今日乃可一門同盡無容奉勅衆以此稱之後廢帝即位累遷尚書左僕射參選元徽元年領吏部加兵五百人桂陽王休範為逆中領軍劉勔出守石頭秉權兼領軍將軍所給加兵自随入殿封當陽侯與齊髙帝袁粲禇淵分日入直平决機事遷中書令加撫軍將軍及帝廢為蒼梧王秉出集議於路逢從弟韞韞問曰今日之事故當歸兄邪秉曰吾等已讓領軍矣韞搥胷曰兄肉中詎有血邪今年族矣齊髙帝聞而惡之順帝即位轉尚書令時齊髙帝輔政秉知鼎命將遷乃宻懐異圗及沈攸之舉兵齊髙帝入屯朝堂袁粲鎮石頭潜與秉及諸大將黄囬等謀夜㑹石頭詰旦乃舉兵秉素怯騷擾不自安日晡後便自丹陽郡以車載婦女盡室奔石頭臨去婦蕭氏彊勸令食秉歠羮寫胷中手振不自禁其主簿丁靈衛聞難即入語左右曰今日之事難以取濟但我受劉公厚恩義無二情及至見粲粲驚曰何遽便来事今敗矣秉曰今得見公萬死亦何恨從弟韞直省内與直閤將軍卜伯興謀其夜共攻齊髙帝㑹秉事覺秣陵令劉實建康令劉遐宻告齊髙帝髙帝夜使驍騎將軍王敬則收殺之伯興亦遇害粲敗秉踰城走於額檐湖見禽被殺秉子俁與弟陔剃髮被法服向京口於客舍為人識執於建康獄盡殺之秉既貴士子自非三署不得上方榻時人以此少之其妻蕭思話女也常懼禍敗毎謂曰君富貴已足故應為兒作計秉不從故及禍秉弟遐字彦道為嫡母殷暴亡有司糾之徙始安郡後得還位吳郡太守至是亦見誅遐人才甚凡自諱名有同至諱常對客曰孝武無道見枉殺母其頑騃若此及秉當權遐累求方伯秉曰我在事而用汝作州於聽望不足遐曰富貴則言不可相闗從坐之日得免不至是果死義宗弟義賔封興安侯位徐州刺史卒謚肅侯義賔弟義綦封營道縣侯凡鄙無識始興王濬嘗謂曰陸士衡詩云營道無烈心其何意苦阿父如此義綦曰下官初不識士衡何忽見苦其庸塞皆然位湘州刺史謚僖侯臨川烈武王道規字道則武帝少弟也倜儻有大志武帝竒之與謀誅桓元時桓𢎞鎮廣陵以為征冦中兵參軍武帝克京城道規亦以其日與劉毅孟昶共斬𢎞收衆濟江元敗走武陵王遵承志以道規為振武將軍與劉毅何無忌追破之元西走留何澹之等固守湓口列艦拒戰澹之空設羽儀旗幟於一舫而别在他船無忌欲攻羽儀衆不同道規曰此亦計也往攻之遂禽其船因鼔唱曰已斬何澹之賊衆及義軍並以為然賊徒大敗即克湓口連進大破元軍無忌篤欲乗勝追元直造江陵道規曰諸桓世居西楚羣小皆為竭力桓振勇冠三軍且可頓兵以計䇿縻之無忌不從果為振敗乃退還尋陽繕舟甲復進遂平巴陵無忌翼衛天子還京師道規留屯夏口江陵平道規推毅為元功無忌為次自居其末時荆湘江豫猶多桓氏餘燼往往屯結復進道規都督九郡隨宜翦撲以起義勲封華容縣公累遷鎮䕶南蠻校尉荆州刺史加都督善於刑政士庶畏而愛之盧循㓂逼建業道規遣司馬王鎮之及揚武將軍檀道濟廣武將軍到彦之等赴援朝廷至尋陽為循黨荀林所破林乗勝伐江陵聲言徐道覆已克京邑而桓謙自長安入蜀譙縱以謙為荆州刺史與其大將譙道福俱㓂江陵二㓂交逼乆絶都邑之間荆楚既桓氏義舊並懐異心道規乃㑹將士告之曰桓謙今在近畿聞論者頗蓄去就之計吾東来文武足以濟事若欲去者不相禁因夜開城門達曉不閉衆咸股栗莫有去者雍州刺史魯宗之自襄陽来赴或謂宗之意未可測道規乃單車出迎衆咸感悦衆議欲使檀道濟到彦之共撃荀林等道規曰非吾自行不决乃使宗之居守委以心腹率諸將大敗謙斬之諮議劉遵追荀林斬之巴陵初謙至枝江江陵士庶皆與謙書言城内虛實或欲謀為應至是曹仲宗檢得之道規一皆燒焚不視衆於是大安徐道覆率衆二萬奄至破冡魯宗之已還襄陽人情大震或傳循已克京師遣道覆上為刺史江漢士庶感其焚書之恩無復二志道規使劉遵為游軍自拒道覆前驅失利道規壯氣愈厲遵自外横撃大破之斬首數千級赴水死者殆盡道覆單船而走初道規使遵為游軍衆咸言不宜割見力置無用之地及破道覆果得游軍之力衆乃服焉遵字慧眀淮南海西人道規從母兄也位淮南太守追封監利縣侯道規進號征西大將軍開府儀同三司改授豫州以疾不拜義熈八年薨於京師贈司徒謚曰烈武進封南郡公武帝受命贈大司馬追封臨川王道規無子以長沙景王第二子義慶嗣文帝少時為道規所飬故武帝復命文帝紹焉羣官執事咸以禮無二繼之文故文帝還夲而定義慶為後義慶為荆州廟主當随往江陵文帝下詔褒羙勲徳及慈䕃之重追崇丞相加殊禮鸞路九旒黄屋左纛給節鉞前後部羽葆鼓吹虎賁班劔百人及長沙太妃檀氏臨川太妃曹氏後祭𦵏皆凖給義慶㓜為武帝所知年十三襲封南郡公永初元年襲封臨川王元嘉中為丹陽尹有百姓黄初妻趙殺子婦遇赦應避孫讐義慶議以為周禮父母之仇避之海外蓋以莫大之寃理不可奪至於骨肉相殘當求之法外禮有過失之宥律無讐祖之文况趙之縱暴夲由於酒論心即實事盡荒耄豈得以荒耄之王母等行路之深讐宜共天同域無虧孝道六年加尚書左僕射八年太白犯左執法義慶懼有灾禍乞求外鎮文帝詔諭之曰乾象茫昧難可知測且史家諸占各有異同鄭僕射亡後左執法嘗有變王光禄至今平安日蝕三朝天下之至忌者孝武初有此異終亦無他設此天必降灾寜可千里逃避邪義慶固求觧僕射乃許之九年出為平西將軍荆州刺史加都督荆州居上流之重資實兵甲居朝廷之半故武帝使諸子徧居之義慶以宗室令羙故特有此授性謙虛始至及去鎮迎送物並不受十二年普使内外羣臣舉士義慶表舉前臨汝令新野庾實前徴奉朝請武陵龔祈處士南郡師覺授義慶留心撫物州統内官長親老不随在官舍者一年聴三吏餉家先是王𢎞為江州亦有此制在州八年為西土所安撰徐州先賢傳十卷奏上之又擬班固典引為典叙以述皇代之羙改授江州又遷南兖州刺史並帯都督尋即夲號加開府儀同三司性簡素寡嗜慾愛好文義文辭雖不多然足為宗室之表厯任無浮滛之過唯晚節奉沙門頗致費損少善騎乗及長以世路艱難不復跨馬招聚才學之士逺近必至太尉袁淑文冠當時義慶在江州請為衛軍諮議其餘呉郡陸展東海何長瑜鮑昭等並有辭章之羙引為佐吏國臣所著世説十卷集林二百卷並行於世文帝每與義慶書常加意斟酌鮑昭字眀逺東海人文辭贍逸嘗為古樂府文甚遒麗元嘉中河濟俱清當時以為羙瑞昭為河清頌其序甚工昭始嘗謁義慶未見知賞欲貢詩言志人止之曰卿位尚卑不可輕忤大王昭勃然曰千載上有英才異士沈沒而不聞者安可數哉大丈夫豈可遂藴智能使蘭艾不辨終日碌碌與燕雀相隨乎於是奏詩義慶竒之賜帛二十匹尋擢為國侍郎甚見知賞遷秣陵令文帝以為中書舍人上好文章自謂人莫能及昭悟其㫖為文章多鄙言累句咸謂昭才盡實不然也臨海王子頊為荆州昭為前軍參軍掌書記之任子頊敗為亂兵所殺義慶在廣陵有疾而白虹貫城野麕入府心甚惡之因陳求還文帝許觧州以夲號還朝二十一年薨於都下追贈司空謚曰康王子哀王曅嗣為元凶所誅曅子綽嗣昇眀三年見殺國除營浦侯遵考武帝族弟也曾祖淳皇曾祖武原令混之弟位正員郎祖巖海西令父涓子彭城内史始武帝諸子並弱宗室唯有遵考及北伐平定以為并州刺史領河東太守鎮蒲坂闗中失守南還再遷冠軍將軍晉帝遜位居秣陵宫遵考領兵防衛武帝初即位封營浦縣侯元嘉中累遷寜蠻校尉雍州刺史加都督為政嚴暴聚歛無節為有司所糾上寢不問孝武大眀中位尚書左僕射領崇憲太僕後老疾失眀元徽元年卒贈左光禄大夫開府儀同三司諡曰元公子澄之昇眀末貴達澄之弟琨之為竟陵王誕司空主簿誕有寳琴左右犯其徽誕罰焉琨之諫以為非是誕曰此余寳也琨之曰前哲以善人為寳不以珠玉為寳王孫圉稱觀射父為楚國之寳未聞以琴瑟為寳誕忸然不悦誕之叛也以琨之為中兵參軍辭曰忠孝不得並琨之老父在將安之乎誕殺之後贈黄門郎詔謝莊為誄遵考從父弟思考亦官歴清顯卒於􅄆騎常侍金紫光禄大夫子季連字恵續早歴清官齊髙帝受禪將及誅太宰禇淵素善之固請乃免建武中為平西蕭遥欣長史南郡太守遥欣多招賔客眀帝甚惡之季連有憾於遥欣乃宻表眀帝言其有異迹眀帝乃以遥欣為雍州刺史而心徳季連以為益州刺史令據遥欣上流季連父思考宋時為益州雖無政績州人猶以義故故喜得之季連存問故老見父時人吏皆泣對之遂寜人龔惬累世有學行辟為府主簿士多歸心及聞東昬失徳稍自驕矜性忌􅄶遂嚴愎酷恨士人始怨永元元年九月因聲講武遂遣中兵參軍宋買以兵襲中水穰人李託買戰不利退還州郡遂多叛亂眀年十月巴西人趙續伯反奉其鄉人季𢎞為聖主𢎞乗佛輿以五綵裹青石誑百姓云天與己玉印當王蜀季連遣中軍參軍李奉伯大破獲之將刑謂刑人曰我須臾飛去復曰汝空殺我我三月三日會更出遂斬之梁武帝平建業遣使送季連二子及弟通直郎子深喻㫖季連受命修還裝武帝以西䑓將鄧元起為益州刺史元起南郡人季連為南郡時待之素薄元起典籖朱道琛者嘗為季連府都録無頼季連欲殺之逃免至是説元起請先使檢校縁路奉迎及至言語不㳟又歴造府州人士見器物輙奪之曰㑹屬人何須苦惜軍府大懼言於季連季連以為然又惡昔之不禮元起益憤懣司馬朱士略説季連求為巴西郡守以三子為質季連許之既而召兵算之精甲十萬臨軍歎曰據天險之地握此盛兵進可以匡社稷退不失作劉備欲以此安歸乎遂矯稱齊宣徳皇后令復反收朱道琛殺之書報朱士略兼召涪令李膺並不受命天監元年六月元起至巴西季連遣其將李奉伯拒戰見敗季連固守元起圍之城中人相食二年乃肉袒請罪元起誅李奉伯送季連還都季連既至詣闕謝罪自東掖門入數歩一稽首以至帝前帝笑謂曰卿欲慕劉備而曾不及公孫述豈無卧龍之臣乎赦為庶人四年出建陽門為蜀人藺相如所殺季連在蜀殺其父變名走建業至是報焉乃靣縛歸罪帝壯而赦之武帝七男武帝七男張夫人生少帝孫脩華生廬陵孝獻王義真胡倢伃生文帝王脩容生彭城王義康桓羙人生江夏文獻王義恭孫羙人生南郡王義宣吕羙人生衡陽文王義季廬陵孝獻王義真羙儀貌神情秀徹初封桂陽縣公年十二從北征及闗中平定武帝議欲東還而諸將行役既乆咸有歸心欲留偏將恐不足固人心乃以義真行都督雍涼秦三州安西將軍領䕶西戎校尉雍州刺史太尉諮議參軍以京兆王脩為長史委以闗中之任帝將還三秦父老泣訴曰殘民不霑王化於今百年始覩衣冠方仰聖澤長安十陵是公家墳墓咸陽宫殿是公家屋宅捨此何之武帝為之惻然慰譬曰受命朝廷不得擅留今留第二兒令文武才賢共鎮此境臨還自執義真手以授王脩令脩執其子孝孫手授武帝義真又進都督并東秦二州領東秦州刺史時隴上流户多在闗中望得歸夲及置東秦州父老知無復經畧隴右固闗中之意咸共歎息而赫連勃勃宼逼交至沈田子既殺王鎮惡王脩又殺田子義真年少賜與左右不節脩裁減之左右怨脩因白義真曰鎮惡欲反故田子殺之脩今殺田子豈又欲反也義真乃使左右劉乞殺脩脩既死人情離異無相統一武帝遣右將軍朱齡石代義真鎮闗中使義真輕兵疾歸諸將競歛財貨多載子女方軌徐行建威將軍傅𢎞之曰追騎若至何以待之賊追兵果至青泥義真大敗義真日暮與左右相失獨逃草中中兵參軍段宏單騎追尋縁道呌喚義真識其聲曰非叚中兵邪身在此行矣必不兩全可刎身頭以南使家公望絶宏泣曰死生共之下官不忍乃束義真於背單馬而歸義真謂宏曰今日之事誠無算略然丈夫不經此何以知艱難初武帝聞青泥敗未得義真審問怒甚尅日北伐謝晦諫不從及得宏啓事知義真免乃止義真尋為司州刺史加都督以段宏為義真諮議參軍宏鮮卑人為慕容超尚書左僕射武帝伐廣固歸降時河洛蕭條未及脩理義真改揚州刺史鎮石頭永初元年封廬陵王移鎮東城武帝始踐阼義真色不悦侍讀博士蔡茂之問其故義真曰安不忘危何可恃也眀年遷司徒武帝不豫以為車騎將軍開府儀同三司南豫州刺史加都督鎮厯陽未之任而武帝崩義真聪敏愛文義而輕動無徳業與陳郡謝靈運琅邪顔延之慧琳道人並周旋異常云得志之日以靈運延之為宰相慧琳道人為西豫州刺史徐羡之等嫌義真與靈運延之暱狎過甚故吏范晏從容戒之義真曰靈運空踈延之隘薄魏文云鮮能以名節自立者但性情所得未能忘言於悟賞故與游耳將之鎮列部伍於東府前既有國哀義真與靈運延之慧琳等坐視部伍因宴舫裏使左右剔每舫函道施己船而取其勝者及至厯陽多所求索羡之等每裁量不盡與深怨執政表求還都初少帝之居東宫多狎羣小謝晦常言於武帝恐其不克負荷帝曰廬陵何如晦曰臣請觀焉晦造義真義真盛欲與談晦不甚答還曰徳輕於才非人主也由是出居于外及羡之等専政義真愈不悦時少帝失徳羡之等宻謀廢立則次第應在義真以義真輕訬不任主社稷因其與少帝不協乃奏廢為庶人徙新安郡前吉陽令張約之上疏諫徙為梁州府軍參軍尋殺之景平二年羡之等遣吏殺義真於徙所時年十八元嘉元年八月詔追復先封迎靈柩并孫脩華謝妃一時俱還三年正月誅徐羡之傅亮等是日詔追崇侍中大將軍王如故贈張約以郡義眞無子文帝以第五子紹字休允嗣襲廬陵王紹少寛雅位揚州刺史薨無子以南平王鑠子敬先嗣彭城王義康年十四武帝自夀陽被徴入輔留義康代鎮夀陽永初元年封彭城王厯南豫南徐二州刺史並加都督文帝即位為驃騎將軍開府儀同三司元嘉三年改授都督荆州刺史給班劒三十人義康少而聪察及居方任職事修理六年司徒王𢎞表義康宜還入輔徴為侍中司徒録尚書事領平北將軍都督南徐州刺史二府置佐領兵與王𢎞共輔朝政𢎞既多疾且每事推讓自是内外事務一斷之於義康太子詹事劉湛有經國才用義康昔任豫州湛為長史既素情欵至是待遇特隆動皆諮訪故前後在藩多有善政九年王𢎞薨又領揚州刺史十二年又領太子太傅義康性好吏職鋭意文案糾剔是非莫不精盡既専縂朝權事决自己生殺大事皆以録命斷之凡所陳奏入無不可方伯以下並委義康授用由是朝野輻湊勢傾天下義康亦自彊不息無有懈倦府門每旦嘗有數百乗車雖復位卑人㣲皆被引接加之聪識過人一聞必記嘗所蹔遇終身不忘稠人廣坐毎標題所憶以示聪眀人益以此推服之愛惜官爵未嘗以階級私人凡朝士有才用者皆引入己府自下樂為竭力不敢欺負文帝有虛勞疾寢頓積年毎意有所想便覺心中痛裂屬纊者相繼義康入侍醫藥盡心衛奉湯藥飲食非口所嘗不進或連夕不寐彌日不觧衣内外衆事皆専决施行十六年進位大將軍領司徒義康素無學術待文義者甚薄袁淑常詣義康義康問其年答曰鄧仲華拜衮之嵗義康曰身不識也淑又曰陸機入洛之年義康曰身不讀書君無為作才語見向其淺陋若此既闇於大體自謂兄弟至親不須復存君臣形迹率心而行會無猜防私置僮六千餘人不以言䑓時四方獻饋皆以上品薦義康而以次者供御上嘗冬月噉甘歎其形味並劣義康在坐曰今年甘殊有佳者遣人還東府取丼大供御者三寸僕射殷景仁為帝所寵與劉湛素善而意好晚乖湛常欲因宰輔之權以傾景仁景仁為帝所保持義康屢言不見用湛愈憤南陽劉斌湛之宗也有渉俗才用為義康所知自司徒右長史擢為左長史從事中郎琅邪王履主簿沛郡劉敬文祭酒魯郡孔允秀並以傾側自入見帝疾篤皆謂宜立長君上嘗危殆使義康具顧命詔義康還省流涕以告湛及景仁曰天下艱難詎是㓜主所御湛景仁不答而允秀等輙就尚書儀曹索晉咸康末立康帝舊事義康不知也及帝疾瘳㣲聞之而斌等既為義康所寵又見威權盡在宰相遂結為朋黨若有盡忠奉國不同己者必構以罪黜毎採拾景仁短長或虛造同異以告湛自是主相之勢分内外之難結矣義康欲以斌為丹陽尹啓陳其家貧上覺其㫖義康言未卒上曰以為吳郡後會稽太守羊元保求還義康又啓欲以斌代之上時未有所擬倉卒曰我已用王鴻上以嫌隙既成將致大禍十七年乃收劉湛又誅斌及大將軍録事參軍劉敬文并賊曹孔劭秀中兵邢懐眀主簿孔允秀丹陽丞孔文秀司空從事中郎司馬亮烏程令盛雲泰徙尚書庫部郎何黙子餘姚令韓景之永興令顔遥之湛弟黄門郎素斌弟給事中温於廣州王履廢於家青州刺史杜驥勒兵殿内以備非常時義康入宿留止中書省遣人宣㫖告以湛等罪釁義康上表遜位改授江州刺史出鎮豫章實幽之也停省十餘日桂陽侯義融新渝侯義宗祕書監徐湛之往来慰視於省奉辭便下渚上唯對之慟哭餘無所言上遣沙門慧琳視之義康曰弟子有還理不慧琳曰恨公不讀數百卷書征㓂司馬蕭斌為義康所昵劉斌等䜛之被斥乃以斌為諮議領豫章太守事無大小皆委之司空主簿謝綜素為義康所狎以為記室左右愛念者並聴随從至豫章辭州見許資奉優厚朝廷大事皆報示之義康未敗時東府聴事前井水忽涌溢野雉江鷗並入所住齋前龍驤參軍巴東令扶育上表申眀義康奏入即收付建康賜死會稽長公主於兄弟為長帝所親敬上嘗就主宴集甚懽主起再拜頓首悲不自勝上不曉其意起自扶之主曰車子嵗暮必不見容特乞其命因慟哭上亦流涕舉手指蔣山曰必無此慮若違今誓便是負初寧陵即封所飲酒賜義康曰會稽姊飲憶弟所飲餘令封送車子義康小字也二十二年太子詹事范􅁮等謀反事連義康有司奏收付法罪詔特宥大辟并子女並免為庶人絶屬籍徙安成郡義康在安成讀漢史見淮南厲王長事廢書歎曰前代乃有此我得罪為宜也二十四年豫章胡誕世前吳平令袁惲等謀反欲奉戴義康太尉江夏王義恭奏徙義康廣州奏可未發會魏軍至𤓰歩天下騷動上慮有異志者或奉義康為亂孝武時鎮彭城累啓宜早為之所尚書左僕射何尚之並以為言二十八年正月遣中書舍人嚴麝齎藥賜死義康不肯服曰佛教自殺不復得為人身乃以被掩殺之時年四十三以侯禮𦵏安成郡子允元凶殺之孝武大眀四年義康女玉秀等乞反𦵏舊塋詔聽之江夏文獻王義恭㓜而眀嶷姿顔端麗武帝特所鍾愛諸子莫及也帝性儉諸子飲食不過五醆盤義恭求須果食日中無算得未嘗噉悉以與旁人諸王未嘗敢求求亦不得元嘉元年封江夏王六年授都督荆州刺史義㳟渉獵文義而驕奢不節既出藩文帝與書誡之曰禮賢下士聖人垂訓驕侈矜尚先哲所去豁達大度漢祖之徳猜忌褊急魏武之累漢書稱衛青云大將軍遇士大夫以禮與小人有恩西門安于矯性齊善闗羽張飛任偏同弊行已舉事深宜鑒此汝一月日自用不可過三十萬若能省此益羙西楚殷曠常宜早起接對賔客園池堂觀計無須改作凡訊獄前一二日可取訊簿宻使劉湛輩粗共詳論慎無以喜怒加人能擇善者從之羙自歸己不可専志自决以矜獨燭之眀也刑獄不可壅滯一月可更訊凡事皆應慎宻名器深宜慎惜不可妄以假人聲樂嬉游不宜令過宜數引見佐史非唯臣主自應相見不數則彼我不親不親無因得盡人人不盡何由具知衆事九年為南兖州刺史加都督鎮廣陵十六年進位司空眀年彭城王義康有罪出藩徴義恭為侍中都督揚南徐兖三州司徒録尚書事領太子太傅給班劒二十人置佐領兵二十一年進太尉領司徒義恭小心且戒義康之失雖為縂録奉行文書而已文帝安之年給相府錢二千萬他物稱此而義恭性奢用常不足文帝又别給錢年至千萬時有獻五百里馬者以賜義恭二十七年文帝欲有事河洛義恭縂統羣帥出鎮彭城及魏軍至𤓰歩義恭與孝武閉城自守初魏軍深入上慮義恭不能固彭城備加誡勅義恭答曰臣雖未能臨瀚海濟居延庶免劉仲奔逃之恥及魏軍至義恭果欲走頼衆議得停降號驃騎將軍開府儀同三司魯郡孔子舊廟有栢樹二十四株厯漢晉其大連抱有二株先倒折土人崇敬莫之敢犯義恭悉遣伐取父老莫不歎息又以夲官領南兖州刺史加都督移鎮旴眙修館宇擬東城二十九年冬還朝上以御所乗蒼鷹船上迎之遭太妃憂改授大將軍南徐州刺史還鎮東府元凶肆逆其日劭急召義恭先是詔召太子及諸王慮有詐妄致害者召皆有人至是義恭求常所遣傳詔劭遣之而後入義恭凡府内兵仗並送還䑓進位太保孝武入討劭疑義恭異志使入尚書下省分諸子住神虎門外侍中下省孝武前鋒至新亭劭挾義恭出戰故不得自㧞戰敗義恭單馬南奔劭大怒遣始興王濬殺義恭十二子義恭既至勸孝武即位授太尉録尚書六條事假黄鉞事寜進位太傅領大司馬增班劒為三十人以在藩所服玉環大綬賜之上不欲致禮太傅諷有司奏天子不應加拜從之及立太子東宫文案使先經義恭及南郡王義宣等反又加黄鉞白直百人入六門事平以臧質七百里馬賜義恭孝武以義宣亂逆由於彊盛欲削王侯義恭希㫖請省録尚書上從之又與驃騎大將軍竟陵王誕奏陳貶損之格九條詔外詳議於是有司奏九條之格猶有未盡更加附益凡二十四條大抵聴事不得南向坐施帳國官正冬不得跣登國殿公主妃傳令不得朱服輿不得重掆鄣扇不得雉尾劒不得鹿盧形槊眊不得孔雀白􅌁夾轂隊不得絳襖平乗誕馬不得過二疋歌伎不得綵衣舞伎正冬著袿衣不得粧面諸妃主不得著緄帯信幡非䑓省官悉用絳郡縣内史相及封内長官於其封君罷官則不復追敬不稱臣諸鎮常行車前不過六隊刀不得過銀銅餙諸王女封縣主諸王子孫襲封王之妃及封侯者夫人行並不得鹵簿諸王子繼體為王者婚𦵏吉凶悉依諸國公侯之禮不得同皇弟皇子車輿非軺車不得油幢平乗船皆下兩頭作露平形不得擬象龍舟詔可孝建二年為揚州刺史加入朝不趨贊拜不名劒履上殿固辭殊禮義恭撰要記五卷起前漢訖晉太元表上之詔付祕閣時西陽王子尚有盛寵義㳟觧揚州以避之乃進位太宰領司徒義㳟常慮為孝武所疑及海陵王休茂於襄陽為亂乃上表稱諸王貴重不應居邉有州不須置府其餘制度又多所減省時孝武嚴暴義㳟慮不見容乃卑辭曲意阿會皆有容儀每有祥瑞輙上賦頌大眀元年有三脊茅生石頭西岸又勸上封禪帝甚悦及孝武崩遺詔義㳟觧尚書令加中書監栁元景領尚書令入住城内事無巨細悉闗二公大事與沈慶之參决若有軍旅可為縂統尚書中事委顔師伯外監所統委王元謨前廢帝即位復録尚書夲官如故尚書令栁元景即夲號開府儀同三司領兵置佐又增義㳟班劒為四十人更申殊禮之命固辭殊禮義㳟性嗜不常與時移變自始至終屢遷第宅與人游欵意好亦多不終而奢侈無度不愛財寳左右親幸者一日乞與或至一二百萬小有忤意輙追奪之大眀時資供豐厚而用常不足賖市百姓物無錢可還民有通辭求錢者輙題後作原字善騎馬觧音律遊行或二三百里孝武恣其所之東至吳郡登虎邱山又登無錫縣烏山以望太湖大眀中撰國史孝武自為義㳟作傳及永光中雖任居宰輔而承事近臣戴法興等常若不及前廢帝狂悖無道義㳟元景等謀欲廢立廢帝親率羽林兵於第害之并其四子斷析義㳟支體分裂腹胃挑取眼睛以蜜漬之以為鬼目粽眀帝定亂令書追崇侍中都督中外諸軍丞相領太尉中書監録尚書事王如故給九旒鸞輅虎賁班劒百人前後部羽葆鼓吹輼輬車㤗始三年又詔陪祭廟庭南郡王義宣生而舌短澁於言論元嘉元年年十二封竟陵王都督南兖州刺史遷中書監中軍將軍時竟陵羣蠻充斥役刻民􅄆改封南譙王十三年出為江州刺史加都督初武帝以荆州上流形勝地廣兵彊遺詔諸子次第居之謝晦平後以授彭城王義康義康入相次江夏王義㳟又以臨川王義慶宗室令望且臨川烈武王有大功於社稷義慶又居之其後應在義宣上以義宣人才素短不堪居上流十六年以衡陽王義秀代義慶而以義宣為南徐州刺史而會稽公主每以為言上遲囬乆之二十一年乃以義宣都督七州諸軍事車騎將軍荆州刺史義宣至鎮勤自課厲政事修理白晳羙須眉身長七尺五寸腰帯十圍多畜嬪媵後房千餘尼媪數百男女三十人皆崇餙綺麗費用殷廣進位司空改侍中二十七年魏軍南侵義宣慮㓂至謀欲奔上眀及魏軍退文帝詔之曰善修民務不須營潜逃計也遷司徒揚州刺史侍中如故元凶弑立以義宣為中書監領司徒義宣聞之即時起兵徴聚甲卒傳檄逺近會孝武入討義宣遣參軍徐遺寳率衆三千助為前鋒及孝武即位以義宣為中書監都督揚豫二州丞相録尚書六條事揚州刺史加羽葆鼔吹給班劒四十人改封南郡王追謚義宣所生為獻太妃封次子宜陽侯愷為南譙王義宣固辭内任及愷王爵於是改授都督八州諸軍事荆湘二州刺史持節侍中丞相如故降愷為宜陽縣王將佐已下並加賞秩義宣在鎮十年兵彊財富既首創大義威名著天下凡所求欲無不畢從朝廷所下制度意所不同者一不遵奉嘗獻孝武帝酒先自酌飲封送所餘其不識大體如此初臧質隂有異志以義宣凡弱易可傾移欲假手為亂以成其奸自襄陽往江陵見義宣便盡禮乃至江州每宻信説義宣以為有大才負大功挾震主之威自古尠有全者宜在人前早有處分不爾一旦受禍悔無所及義宣隂納其言而孝武閨庭無禮與義宣諸女滛亂義宣因此發怒宻治舟甲尅孝建元年秋冬舉兵報豫州刺史魯爽兖州刺史徐遺寳使同爽狂酒失㫖其年正月便反遣府户曹送版以義宣補天子并送天子羽儀遺寳亦勒兵向彭城義宣及臧質狼狽起兵二月加都督中外諸軍事置左右長史司馬使僚佐悉稱名遣使奉表以姦臣交亂圗傾宗社輙徴召甲卒戮此凶醜詔答之太傅江夏王義㳟又與義宣書諭以禍福義宣移檄諸州郡遣參軍劉諶之尹周之等率軍下就臧質雍州刺史朱修之起兵奉順義宣率衆十萬發自江陵舳艦數百里是日大風船垂覆沒僅得入中夏口以第八子慆為輔國將軍荆州刺史以司馬竺超民輔之留鎮江陵遣魯爽弟秀及朱曇韶萬餘人北討朱修之秀初至江陵見義宣既出拊膺曰阿兄誤人事乃與癡人共作賊今年敗矣義宣至尋陽與質俱下質為前鋒至鵲頭聞徐遺寳敗魯爽於小峴授首相視失色孝武使鎮北大將軍沈慶之送爽首示義宣并書與義宣質等上先遣豫州刺史王元謨舟師頓梁山洲内東西兩岸為却月城營柵甚固撫軍栁元景據姑熟為大統偏師鄭琨武念戍南浦質徑入梁山去元謨一里許結營義宣屯蕪湖五月十九日西南風猛質乗風順流攻元謨西壘冗從僕射胡子友等戰失利棄壘度就元謨質又遣將龐法起率數千兵趣南浦仍使自後掩元謨與琨念相遇法起戰大敗赴水死略盡義宣至梁山質上出軍東岸攻元謨元謨分遣游撃將軍桓䕶之竟陵太守薛安都出壘奮撃大敗質軍軍人一時投水䕶之等因風縱火焚其舟乗風勢猛盛烟熖覆江義宣時屯西岸火延燒其營殆盡諸將乗風火之勢縱兵攻之衆一時奔潰義宣與質相失各單舸迸走東人士庶並歸順西人與義宣相随者船舸猶有百餘義宣女先適臧質子比過尋陽入城取女載以西奔至江夏聞巴陵有軍被抄斷囬入涇口歩向江陵衆􅄆且盡左右唯有十許人脚痛不能復行就民間僦露車自載無復食縁道求告至江陵郭外竺超民具羽儀兵衆迎之時帯甲尚萬餘人義宣既入城仍出聴事見客左右翟靈寳誡使撫慰衆賔以臧質違㫖授之宜用致失利今治兵繕甲更為後圗昔漢髙祖敗終成大業而義宣誤云項羽千敗衆咸掩口而笑魯秀竺超民等猶為之爪牙欲收合餘燼更圗一决而義宣昏墊無復神守入内不得出左右腹心相率奔叛魯秀北走義宣不復自立欲随秀去乃於内戎服盛糧糗帯佩刀擕其息慆及所愛妾五人皆著男子服相随城内擾亂白刃交横義宣大懼落馬仍便歩地超民送至城外更以馬與之超民還守城義宣冀及秀望諸將送北入魏既失秀所在未出郭將士逃盡唯餘慆及五妾兩黄門而已夜還向城入南郡空廨無牀蓆地至旦遣黄門報超民超民遣故車一乗載送刺姦義宣止獄户外坐地歎曰臧質老奴誤我始與五妾俱入獄五妾尋被遣出義宣號泣語獄吏曰常日非苦今日分别始是苦大司馬江夏王義㳟諸公王八座與荆州刺史朱修之書言義宣反叛便宜専戮書未達修之已至江陵於獄盡之孝武聴還𦵏舊墓長子恢年十一拜南譙王世子晉氏過江不置城門校尉及衛尉官孝武欲重城禁故復置衛尉卿以恢為侍中領衛尉衛尉之置自恢始也義宣反録付廷尉自殺恢弟愷字景穆生而飬於宫中寵均王子十嵗封宜陽侯孝武時進爵為王義宣反問至愷於尚書寺内着婦人衣乗問訊車投臨汝公孟詡詡於妻室内為地窟藏之事覺并詡誅其餘並為修之所殺衡陽文王義季㓜而夷簡無鄙近之累文帝為荆州武帝使随往由是特為文帝所愛元嘉元年封衡陽王十六年代臨川王義慶為都督荆州刺史先是義慶在任遇巴蜀擾亂師旅應接府庫空虛義季畜財節用數年還復充實隊主續豐母老家貧無以為飬遂不食肉義季哀其志給豐母月米二斛錢一千并制豐噉肉義季素拙書上聴使人書啓事唯自署名而已嘗大蒐於郢有老父帯苫而耕命左右斥之老人擁耒而對曰昔楚子盤游受譏令尹今陽和扇氣播厥之始一日不作民失其時大王馳騁為樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食老人曰吁願大王均其賜也茍不奪民時則一州皆享王賜老人不偏受其私也斯飯也不敢當問其名不言而退義季素嗜酒自彭城王義康廢後遂為長夜之飲略少醒日文帝詰責曰此非唯廢傷事業亦自損性皆汝所諳近長沙兄弟皆縁此致故將軍蘇徴耽酒成疾旦夕待盡一門無此酣法汝於何得之義季雖奉㫖酣縱如初遂以成疾二十一年徴為征北大將軍開府儀同三司南兖州刺史加都督發州之日帷帳器服諸應随刺史者悉留之荆楚以為羙談二十二年遷徐州刺史眀年魏攻邉北州擾動義季慮禍不欲以功勤自業無他經略唯飲酒而已文帝又詔責之二十四年薨於彭城時年三十二太尉江夏王義㳟表觧職迎喪不許上遣東海王禕迎喪追贈司空傳國至孫齊受禪國除文帝十九男文帝十九男元皇后生元凶劭潘淑妃生始興王濬路淑媛生孝武帝吳淑儀生南平穆王鑠髙脩儀生廬陵昭王紹殷修華生竟陵王誕曹偼伃生建平宣簡王宏陳脩容生東海王禕謝容華生晉熙王昶江脩容生武昌王渾沈媫伃生眀帝楊羙人生始安王休仁邢羙人生山陽王休祐蔡羙人生海陵王休茂董羙人生鄱陽哀王休業顔羙人生臨慶冲王休倩陳羙人生新野懐王夷父荀羙人生桂陽王休範羅羙人生巴陵哀王休若紹出繼廬陵王義真元凶劭字休逺文帝長子也帝即位生劭時上猶在諒闇故祕之元嘉三年閏正月方云劭生自上代以来未有人君即位後皇后生太子唯殷帝乙既踐阼正妃生紂至是又有劭焉始生三日帝往視之簮㡌甚堅無風而墜于劭側上不悦初命之曰劭在文為召刀後惡焉改刀為力年六嵗拜為皇太子中庶子二率入直永福省為更築宫制度嚴厲年十二出居東宫納黄門侍郎殷淳女為妃十三加元服好讀史傳尤愛弓馬及長羙鬚眉大眼方口身長七尺四寸親覽宫事延接賔客意之所欲上必從之東宫置兵與羽林等十七年拜劭京陵大將軍彭城王義康竟陵王誕桂陽侯義融並從二十七年上將北伐劭與蕭思話固諫不從魏太武至𤓰歩京邑震駭劭出鎮石頭縂統水軍善於撫御上登石頭城有憂色劭曰不斬江湛徐湛之無以謝天下上曰北伐自我意不闗二人但湛等不異耳由是與江徐不平上時務夲業勸課耕桑使宫内皆􅅙欲以諷勵天下有女巫嚴道育夫為劫坐沒入奚官劭姊東陽公主應閤婢王鸚鵡白公主言道育通靈能役使鬼物主乃白上託云善蠶求召入道育既入乃言所奉天神當賜符應時主夕卧見流光相随狀若螢火遂入巾箱化為雙珠圎青可愛於是主及劭並信惑之始興王濬素佞事劭並多過失慮上知使道育祈請欲令過不上聞歌儛咒詛不捨晝夜道育輙云自上天陳請必不泄露劭等敬事號曰天師後遂為巫蠱刻玉為上形像埋於含章殿前初東陽公主有奴陳天興鸚鵡飬以為子而與之滛通鸚鵡天興及寜州所獻黄門慶國並與巫蠱事劭以天興補墜主後東陽公主薨鸚鵡應出嫁劭慮言語泄與濬謀之時吳興沈懐逺為濬府佐見待異常乃嫁鸚鵡與懐逺為妾不啓上慮事泄因臨賀公主㣲言之上後知天興領隊遣閹人奚承祖讓劭曰汝間用隊主副盡是奴邪欲嫁者又嫁何處劭答南第昔屬天興求將吏驅使視形容粗健便兼隊副下人欲嫁者猶未有處時鸚鵡已嫁懐逺矣劭懼以書告濬并使報臨賀主上若問嫁處當言未定濬答書曰啓此事多日今始見問當是有感發之者計臨賀故不應翻覆言語自生寒熱也此姥由来挾兩端難可孤保正爾自問臨賀冀得審實也其若見問當作依違答之天興先署佞人府位不審監上當無此簿領可急宜撻之殿下已見王未宜依此具令嚴自躬上啓聞彼人若為不己政可促其餘命或是大慶之漸凡劭濬相與書類如此所言皆為名號謂上為彼人或以為其謂太尉江夏王義恭為佞人東陽主第在西掖門外故云南第王即鸚鵡姓躬上啓聞者令道育上天白天神也鸚鵡既適懐逺慮與天興私通事泄請劭殺之劭宻使人害天興既而慶國謂宣傳往来唯有二人天興既死慮將見及乃具以其事白上上驚惋即遣收鸚鵡封籍其家得劭濬手書數百紙皆咒詛巫蠱之言又得所埋上形像於宫内道育叛亡捕求不得上詰責劭濬劭濬惶懼無辭唯陳謝而己道育變服為尼逃匿東宫濬往京口又以自随或出止民張旿家上謂江夏王義恭曰常見典籍有此謂之傳空言不意親覩若劭南面之日非復我及汝事汝兒子多將来遇此不幸耳先是二十八年彗星起畢昻入太㣲掃帝座端門滅翼軫二十九年螢惑逆行守氐自十一月霖雨連雪陽光罕曜時道士范材修練形術是嵗自言死期如期而死既殯江夏王義恭疑其仙也使開棺視之首如新刎血流于背上聞而惡焉三十年正月大風飛霰且雷上憂有竊發輙加劭兵東宫實甲萬人其年二月濬自京口入朝當鎮江陵復載道育還東宫欲將西上有告上云京口人張旿家有一尼服食出入征北内似是嚴道育上使掩得二婢云道育随征北還都上謂劭濬已當斥遣道育而猶與往来惆悵駭惋乃欲廢劭賜濬死初濬母卒命潘淑妃飬以為子淑妃愛濬濬心不附妃被寵上以謀告之妃具以告濬濬報劭劭因是有異謀毎夜輙饗將士或親自行酒宻與腹心隊主陳叔兒齋帥張超之任建之謀之其月二十一日夜詐作上詔云魯秀謀反汝可平眀率衆入因使超之等集素所飬士二千餘人皆被甲云有所討宿召前中庶子右軍長史蕭斌及左衛率袁淑中舍人殷仲素左積弩將軍王正見並入告以大事自起拜斌等因流涕衆並驚愕眀旦劭以朱衣加戎服上乗畫輪車與蕭斌同載衛從如常入朝儀從萬春門入舊制東閣隊不得入城劭語門衛士云受勅有所收討令後隊速来張超之等數十人馳入雲龍東中華門及齋閤拔刀徑上合殿上其夜與尚書僕射徐湛之屏人語至旦燭猶未滅直衛兵尚寢門階户席並無侍衛上以几自鄣超之手行弑上五指俱落并殺湛之劭進至合殿中閤文帝已崩出坐東堂蕭斌執刀侍直呼中書舍人顧瑕瑕懼不時出及至問曰欲共見廢何不早啟未及答斬之遣人於崇禮闥殺吏部尚書江湛文帝左細仗主卜天與攻劭於東堂見殺又使人入殺潘淑妃剖其心觀其邪正使者阿㫖答曰心邪劭曰邪佞之心故宜邪也又殺文帝親信左右數十人急召始興王濬率衆屯中堂劭即偽位百僚至者裁數十人乃為書曰徐湛之弑逆吾勒兵入殿已無所及今罪人斯得元凶克殄可大赦天下改元嘉三十年為太初元年素與道育所定也初使蕭斌作詔斌辭以不文乃使侍中王僧綽為之舊制踰年改元劭問僧綽僧綽曰晉恵帝即位便改元劭喜而從之始文帝未崩前一日甲夜太史奏東方有急兵其禍不測宜列萬人兵於太極前殿可以消灾上不從及劭弑逆聞而歎曰㡬誤我事乃問太史令曰我得㡬年對曰得十年退而語人曰十旬耳劭聞而怒歐殺之即位訖便稱疾還入永福省然後遷大行皇帝升太極殿以蕭斌為尚書僕射何尚之為司空大行大歛劭辭疾不敢出先給諸處兵仗悉收還武庫遣人謂魯秀曰徐湛之常欲相危我以為卿除之使秀與屯騎校尉龎秀之對掌軍隊以侍中王僧達為吏部尚書司徒左長史何偃為侍中成服日劭登殿臨靈號慟不自持博訪公卿詢求政道遣使分行四方分浙江以東五郡為㑹州省揚州立司𨽻校尉以殷仲素補之以大將軍江夏王義恭為太保司徒南譙王義宣為太尉荆州刺史始興王濬進號驃騎將軍王僧綽以先豫廢立見誅長沙王瑾弟楷臨川王煜桂陽候覬新渝候玠並以宿恨死禮官希㫖謚文帝不敢盡羙稱謚曰中宗景皇帝及聞孝武及南譙王義宣随王誕等諸方鎮並舉義悉取諸王於城内移江夏王義恭住尚書下舍分義恭諸子住侍中下省四月立妻殷為皇后孝武檄至數劭罪惡劭自謂素習武事語朝士曰卿等助我理文書勿措意戎陣若有㓂難吾當自出唯恐賊人不敢動耳中外戒嚴防孝武世子於侍中省南譙王義宣諸子於太倉空屋劭使濬與孝武書言上親御六師太保執鉞臨統吾與烏羊相尋即道上聖恩毎厚法師令在殿内住想弟欲知消息故及烏羊者南平王鑠法師孝武世子小名也劭欲殺三鎮士庶家口江夏王義恭何尚之説曰凡舉大事不顧家口且多是驅廹今欲誅其餘累政足堅彼意耳劭乃下書一無所問濬及蕭斌勸劭勒水軍自上决戰不爾則保據梁山江夏王義恭慮義兵倉卒船舫陋小不宜水戰乃進䇿以為宜以逸待之若逺出梁山則京都空弱東軍乗虛容能為患若分力兩赴則兵􅄆勢離不若飬鋭待期劭善其議蕭斌厲色曰南中郎二十年少能建如此大事豈復可量沈慶之甚諳軍事栁元景宗慤屢嘗立功形勢如此實非小敵唯及人情未離尚可决力一戰端坐䑓城何由得乆今主相咸無戰意豈非天也劭不納劭疑朝廷舊臣不為己用厚撫王羅漢魯秀悉以兵事委之多賜珍玩羙色以悦其志羅漢先為南平王鑠右軍參軍劭以其有將略故委以心膂焉或勸劭保石頭城者劭曰昔人所以固石頭俟諸侯勤王耳我若守此誰當見救唯應力戰决之日日自出行軍慰勞將士使有司奏立子偉之為皇太子二十一日義軍至新亭劭使蕭斌率魯秀王羅漢等精兵萬人攻新亭壘劭登朱雀門躬自督戰將士懐劭重賞皆為之力戰將克而魯秀鳴退鼓軍乃止為栁元景所乗故大敗劭又率腹心同惡自来攻壘元景復破之禇湛之擕二子與檀和之同歸順劭懼走還䑓城其夜魯秀又南奔二十五日江夏王義恭又單馬南奔劭遣濬殺義恭諸子以輦迎蔣侯神像於宫内稽顙乞恩拜為大司馬封鍾山郡王蘇侯為驃騎將軍使南平王鑠為祝文罪狀孝武二十七日臨軒拜其子偉之為皇太子百官皆戎服劭獨衮衣下書大赦天下唯孝武劉義恭義宣誕不在原例五月三日魯秀等募勇士五百人攻大舫鉤得一舶王羅漢昏酣作妓聞官軍已度驚惶放仗歸降是夜劭閉守六門於門内鑿塹立柵以露車為樓城内沸亂將吏並踰城出奔劭使詹叔兒燒輦及衮冕服蕭斌聞大舫不守惶窘不知所為宣令所統皆使觧甲尋戴白幡来降即於軍門伏誅四日劭腹心白直諸同逆先屯閶闔門外並走還入殿程天祚與薛安都副譚金因而乗之即得俱入臧質將大軍從廣莫門入同㑹太極殿前即斬太子左衛率王正見建平東海等七王並號哭俱出劭穿西垣入武庫井中隊副髙禽執之濬率左右數十人與南平王鑠於西眀門出俱南奔於越城遇江夏王義恭濬下馬曰南中郎今何在義恭曰己君臨萬國又稱字曰虎頭来得無晚乎義恭曰恨晚又曰故當不死義恭曰可詣行闕請罪又曰未審猶能得一職自効不義恭又曰此未可量勒與俱自歸命於馬上斬首濬字休眀將産之夕有鵩鳥鳴於屋上聞者莫不惡之元嘉十三年年八嵗封始興王二十六年出為征北將軍南徐兗二州刺史濬少好文籍資質端妍母潘淑妃有盛寵時六宫無主潘専縂内政濬人才既羙母又至愛文帝甚所留心與建平王宏侍中王僧綽中書郎蔡興宗等並以文義往復初元皇后性忌以潘氏見幸恚恨致崩故劭深疾潘氏及濬濬慮將来受禍乃曲意事劭劭與之遂善又多有過失屢為上所讓憂懼乃與劭共為巫蠱後出鎮京口乃因員外􅄆騎侍郎徐爰求鎮江陵又求助於尚書僕射徐湛之而尚書令何尚之等咸謂濬太子次弟不應逺出上以上流之重宜有至親故以濬為衛將軍開府儀同三司荆州刺史加都督領䕶南蠻校尉濬入朝遣還京口為行留處分至京口數日而巫蠱事發時二十九年七月也上惋歎彌日謂潘淑妃曰太子圗富貴更是一理虎頭復如此非復思慮所及汝母子豈可一日無我邪眀年荆州事方行二月濬還朝十四日臨軒受拜其日藏嚴道育事發眀旦濬入謝上容色非常其夕即加詰問濬唯謝罪潘淑妃抱濬泣曰汝始咒詛事發猶冀刻己思愆何意忽藏嚴道育今日用活何為可送藥来吾當先自取盡不忍見汝禍敗濬奮衣去曰天下事尋自判必不上累劭入弑之旦濬在西州府舍人朱法瑜曰䑓内呌喚宫門皆閉道上傳太子反未測禍變所至濬陽驚曰今當奈何濬未得劭信不知事之濟否搔擾不知所為將軍王慶曰今宫内有變未知主上安危預在臣子當投􅃑赴難濬不聴俄而劭遣張超之馳馬召濬濬問狀訖即戎服乗馬而去朱法瑜固止濬濬不從至中門王慶又諫不宜從逆濬曰皇太子有令敢復言者斬及入見劭勸劭殺荀赤松等劭謂濬曰潘淑妃為亂兵所害濬曰此是下情由来所願其悖逆如此劭將敗勸劭入海輦珍寳繒帛下船及劭入井髙禽於井出之劭問天子何在禽曰至尊近在新亭將劭至殿前臧質見之慟哭劭曰天地所不覆載丈人何為見哭質因辯其逆狀答曰先朝當見枉廢不能作獄中囚問計於蕭斌斌見勸如此又語質曰可得為乞逺徙不質曰主上近在航南自當有處分縛劭馬上防送軍門及至牙下據鞍顧望太尉江夏王義恭與諸王共臨視之義恭曰我背逆歸順有何大罪頓殺吾十二兒劭曰殺諸弟此一事負阿父江湛妻庾氏乗車罵之龎秀之亦加誚讓劭厲聲曰汝背復何煩耳先殺其四子劭語南平王鑠曰此何有哉乃斬於牙下臨刑歎曰不圗宋室一至於此劭濬及其子並梟首大航暴尸於市劭妻殷氏賜死於廷尉臨刑謂獄丞江恪曰汝家骨肉相殘何以枉殺天下無罪人恪曰受拜皇后非罪而何殷氏曰此權時耳當以鸚鵡為后也濬妻禇氏丹陽尹湛之之女湛之南奔之始即見離絶故免於誅其餘子女妾媵並於獄賜死投劭濬首於江其餘同逆及王羅漢等皆伏誅張超之聞兵入遂至合殿故基正於御床之所為亂兵所殺剖腹刳心臠割其肉諸將生噉之焚其頭骨時不見傳國璽問劭云在嚴道育處就取得之道育鸚鵡並都街鞭殺於石頭四望山焚其尸揚灰于江毁劭東宫所住齋汚瀦其處封髙禽為新陽縣男追贈潘淑妃為長寜國夫人置守冡偽司𨽻校尉殷冲丹陽尹殷𢎞並賜死冲為劭草立符文又妃叔父𢎞為劭簡配兵士盡其心力故也南平穆王鑠字休元文帝第四子也元嘉十六年年九嵗封南平王少好學頗有文才未弱冠擬古三十餘首時人以為亞迹陸機二十二年為南豫州刺史加都督時文帝方事外略罷南豫州併夀陽以鑠為豫州刺史領安蠻校尉二十六年魏太武圍汝南懸瓠城行汝南太守陳憲保城自固魏人作髙樓施弩射城内城内負户以汲又毁佛圗取金像以為大鉤施之衝車端以牽樓堞城内有一沙門頗有機思輙設竒以應之魏人以蝦蟇車填塹肉薄攻城死者與城等遂登尸以陵城憲鋭氣愈奮戰士無不一當百殺傷萬計汝水為之不流相拒四十餘日鑠遣安蠻司馬劉康祖與寜朔將軍臧質救之魏人燒攻具而退元凶弑立以鑠為侍中録尚書事劭迎蔣侯神於宫内疏孝武年諱厭呪祈請假授位號使鑠造䇿文及義軍入宫鑠與濬俱歸孝武濬即伏法上迎鑠入宫當時倉卒失國璽事寜更鑄給之進侍中司空領兵置佐以國哀未闋讓侍中鑠既歸義最晚常懐憂懼毎於眠中蹶起坐與人語亦多謬僻語家人云我自覺無復魂守鑠為人負才狡競毎與兄弟計度藝能與帝又不能和食中遇毒尋薨贈司徒加以楚穆之謚三子敬猷敬深敬先敬深封南安縣侯敬先繼廬陵王紹前廢帝景和末召鑠妃江氏入宫命左右於前逼之江氏不受命謂曰若不從當殺汝三子江氏猶不從於是遣使於第殺敬猷敬深敬先等鞭江氏一百其夕廢帝亦殞眀帝即位追贈敬猷侍中謚曰懐改封孝武等十八子臨賀王子産字孝仁為南平王繼鑠後未拜被殺㤗始五年立晉安王休祐第七子宣曜為南平王未㡬休祐死宣曜被廢還夲後廢帝元徽元年立衡陽恭王嶷第二子伯玉為南平王繼鑠後昇眀三年被誅竟陵王誕字休文文帝第六子也元嘉二十年年十一封廣陵王二十六年為雍州刺史加都督以廣陵凋敝改封随郡王上欲大舉侵魏以襄陽外接闗河欲廣其資力乃罷江州軍府文武悉配雍州湘州入䑓租税雜物悉給襄陽及大舉北侵命諸藩並出師莫不奔敗唯誕遣中兵栁元景克𢎞農闗陜多獲首級元凶弑立以揚州浙江西屬司𨽻校尉浙江東五郡立會州以誕為刺史孝武入討遣寜朔將軍顧彬之受誕節度誕遣參軍劉季之舉兵與彬之并遇劭將華欽庾遵於曲阿之奔牛塘大敗之事平以誕為荆州刺史加都督衛將軍開府儀同三司誕以位號與濬同惡之請求回改乃進號驃騎將軍加班劒二十人南譙王義宣不肯就徴以誕為侍中驃騎大將軍揚州刺史開府如故改封竟陵王誕性恭和得士庻之心頗有勇略眀年義宣舉兵反有荆江兗豫四州之力勢震天下孝武即位日淺朝野大懼上欲奉乗輿法駕以迎義宣誕固執不可曰奈何持此座與人帝乃加誕節仗士五十人出入六門上流平定誕之力也帝初討元凶誕在雍州豫同舉兵有奔牛之㨗至是又有殊勲上性多猜頗相疑憚而誕造立第舍窮極工巧園池之羙冠於一時多聚材力之士實之第内精甲利器莫非上品上意愈不平孝建二年以司空太子太傅出為都督南徐州刺史上以京口去都宻邇猶疑之大眀元年秋又出為南兗州刺史加都督誕既知見猜亦潜為之備至廣陵因魏深入邉修城隍聚糧練甲嫌隙既著道路常云誕反自是屢有人告誕圗逆及巫覡咒詛之事誕輙賊殺告者事皆聞上三年四月上使有司奏誕罪惡宜絶屬籍削爵土收付法獄上不許有司又固請乃貶爵為侯遣令之國上將謀誕以義興太守桓閬為兗州刺史配以羽林禁兵遣給事中戴眀寳随閬襲誕使閬以之鎮為名閬至廣陵誕未悟也眀寳夜報誕典籖蔣成使為内應成以告府舍人許宗之宗之告誕誕驚起召録事參軍王璵之曰我何罪於天以至此斬蔣成勒兵自衛遣腹心率壯士撃眀寳等破之閬即遇害眀寳逃自海陵界還上遣車騎大將軍沈慶之討誕誕焚燒郭邑驅居民百姓悉使入城分遣書檄要結逺近誕奉表投之城外自理於國無負并言帝宫闈之醜帝忿誕深切凡誕左右腹心同籍朞親並誅之死者千數車駕出頓宣武堂内外纂嚴誕將前後出戰者多降誕見衆軍大集欲棄城北走行十餘里衆並不欲去請誕誕乃還城五月十九日有流星大如斗尾長十餘丈從西北来墜城内是謂天狗占曰天狗所下有伏尸流血誕又遣兵出戰皆敗廣陵舊城不開南門云開者不利其主至誕乃開焉彭城邵領宗在城内隂結死士欲襲誕先欲布誠於慶之乃説誕求為間諜見許領宗既出致誠畢復還城内事泄誕鞭二百考問不伏遂支觧之上遣送章二紐其一曰竟陵縣開國侯食邑千户募賞禽誕其二曰建興縣男食邑三百户募賞先登若克外城舉一鋒克内城舉兩烽禽誕舉三烽值夏雨不得攻城及晴攻又不克上怒將自濟江七月二日慶之進軍克其外城乗勝又克小城誕聞軍入趣後園墜水引出斬之傳首建業時年二十七因𦵏廣陵貶姓留氏帝命城中無大小悉斬之慶之執諫自五尺以下全之於是同黨悉伏誅城内女口為軍賞男丁殺為京觀死者尚數千人毎風晨雨夜有號哭之聲誕母殷妻徐並自殺追贈殷長寜國淑妃初誕為南徐州刺史在京口夜大風飛落屋瓦城門鹿牀倒覆誕心惡之及遷鎮廣陵將入城衝風暴起揚塵晝晦又嘗中夜閑坐有赤光照室見者駭愕誕左右侍直眠中夢人告之曰官須頭髪為矟眊既覺則已失髻如此者數十人誕甚怪懼大眀二年發人築廣陵城誕循行有人于輿揚聲大罵曰大兵尋至何以辛苦百姓誕使執之問其本末答曰姓夷名孫家在海陵天公與道佛先議欲燒除此間人道佛苦諫彊得至今大禍將至何不立六慎門誕問六慎門云何答曰古有言禍不過六慎門誕以其言狂悖殺之又五音士忽狂易見鬼驚怖啼哭曰外軍圍城城上張白布帆誕執録二十餘日乃殺城䧟之日雲霧晦𡨕白虹臨北門亘屬城内八年前廢帝即位義陽王昶為徐州刺史道經廣陵至墓盡哀表請改𦵏誕詔𦵏誕及妻子並以庶人禮眀帝泰始四年又改𦵏祭以少牢王璵之者琅邪人有才局其五子悉在建業璵之嘗乗城慶之縳其五子示而招之許以富貴璵之曰吾受主王厚恩不可以二心三十之年未獲死所耳安可以私親誘之五子號呌於外呼其父及城平慶之悉撲殺之建平宣簡王宏字休度文帝第七子也早喪母元嘉二十一年年十一封建平王宏少而閑素篤好文籍文帝寵愛殊常為立第於雞籠山盡山水之羙建平國職髙他國一階厯位中䕶軍中書令元凶弑立以宏為丹陽尹孝武入討劭録宏殿内自㧞莫由孝武先嘗以一手版與宏宏遣親信周法道齎手版詣孝武事平以為尚書左僕射使奉迎太后還加中軍將軍中書監宏為人謙儉周慎禮賢接土眀曉事機上甚信仗之轉尚書令宏少多病求觧尚書令尋即夲號開府儀同三司未拜薨時年二十五贈司徒上痛悼甚至每朔望出臨靈自為墓誌銘及誄五年益諸弟國各千户薨者不在其例唯宏追益子景素嗣景素少愛文義有父風累遷領軍南徐州刺史加都督時文帝諸子並盡衆孫唯景素為良桂陽王休範為逆景素雖纂嚴集衆以赴朝廷為名而隂懐兩端及事平進號鎮北將軍景素好文章書籍招集才義之士傾身禮接以收名譽由是朝野翕然莫不屬意焉後廢帝狂凶失道内外皆謂景素宜當神器唯廢帝所生陳氏親戚疾忌之而楊運長阮佃夫並眀帝舊𨽻貪㓜主以乆其權慮景素立不見容於長主深相忌憚元徽三年景素防閤將軍王季符恨景素單騎奔京師告楊運長阮佃夫云景素欲反運長便欲遣軍討之而齊髙帝及衛將軍袁粲以下並保持之謂為不然景素亦馳遣世子延齡還都具自申理運長等乃徙季符於梁州又奪景素征北將軍開府儀同三司自是廢帝狂悖日甚朝野甚屬心景素陳氏及運長等彌相猜疑景素因此稍為自防之計多以金帛結才力之士時大臣誅夷孝武諸子孫或殺或廢無在朝者於是冠軍黄回等並加響附其餘文武失職不得志者莫不歸之時廢帝單馬獨出遊走郊野輔國將軍曹欣之等謀候廢帝出行因聚衆作難事克奉景素景素每禁止之未欲忽遽舉動運長宻遣傖人周天賜偽投景素勸其異計景素知即斬之送首還䑓四年七月羽林監垣祗祖奔景素言䑓城已潰景素信之即舉兵運長等嘗疑景素有異志即纂嚴景素夲乏威略不知所為竟為䑓軍破斬之即𦵏京口景素性甚仁孝事獻太妃朝夕不違侍飬太妃有不安景素傍行蓬髪與人言呴呴常恐傷其情又甚儉素為荆州時有髙齋刻楹栢構景素竟不處朝廷欲賜以甲第辭而不當兩宫所遺珍玩塵於篋笥食常不過一肉器用瓦素時有獻鏤玉器景素顧主簿何昌㝢曰我持此安所用哉乃謝而反之及敗後昌㝢與故記室王摛等上書訟其寃齊受禪景素故秀才劉璡又上書述其徳羙陳寃並不見省至齊武帝即位乃下詔曰宋建平王劉景素名父之子雖末路失圗而原心有夲可聽以禮𦵏舊塋廬陵王禕字休秀文帝第八子也元嘉二十二年年十嵗封東海王大眀七年進位司空眀帝踐阼進太傅改封廬陵王初廢帝目禕似驢上以廢帝之言類故改封焉文帝諸子禕尤凡劣諸兄弟並嗤鄙之南平王鑠薨子敬深婚禕視之白孝武借伎孝武答曰婚禮既不舉樂且敬深孤苦倍非宜也至是眀帝與建安王休仁詔曰人既不比數西方公汝便為諸王之長時禕住西故謂之西方公泰始五年河東栁欣慰謀反欲立禕禕與相酬和欣慰結征北諮議參軍杜㓜文㓜文具奏其事上暴其罪惡黜為南豫州刺史車騎將軍開府儀同三司上遣腹心楊運長領兵防衛眀年又令有司奏禕怨懟逼令自殺𦵏宣城晉熙王昶字休道文帝第九子也元嘉二十二年年十嵗封義陽王大眀中位中書令中軍將軍開府儀同三司廢帝即位為徐州刺史加都督昶輕訬褊急不能事孝武大眀中常被嫌責人間常言昶當有異志廢帝既誅羣公彌縱狂惑常語左右曰我即大位以来遂未戒嚴使人邑邑江夏王義恭誅後昶表求入朝遣典籖蘧法生䘖使帝謂法生義陽與太宰謀反我政欲討之今知求還甚善又問法生義陽謀反何不啓法生懼走還彭城帝因此北討法生至昶即起兵統内諸郡並不受命昶知事不㨗乃夜開門奔魏棄母妻獨擕妾呉氏作丈夫服騎馬自随在道慷慨為絶句曰白雲滿鄣来黄塵半天起闗山四面絶故郷㡬千里因把姬手南望慟哭左右莫不哀哽每節悲慟遥拜其母昶家還建業二妾各生一子眀帝即位名長者曰思逺少者曰懐逺尋並亡帝以千金購昶于魏不獲乃以第六皇子燮字仲綏繼昶封為晉熙王眀帝既以燮繼昶乃詔曰晉熈國太妃謝氏沈刻無親物理罕比骨肉至親尚相棄蔑况以義合免患為難可還其夲削絶蕃秩仍令改謝氏為射氏元徽元年燮年四嵗以為郢州刺史眀年復昶所生射氏為晉熈國太妃齊受禪燮降封安隂縣公謀反賜死昶之入魏也魏人嘉重之妻以武邑公主拜侍中征南將軍駙馬都尉封丹陽王嵗餘公主薨更尚建興公主眀帝遣使至魏魏獻文詔昶與書為兄弟式眀帝不答責昶以母為其國妾宜如春秋荀罃對楚稱外臣之禮獻文尋勅昶更為書昶辭曰臣若改書事為二敬猶修往文彼所不納請停今答獻文從之拜外都坐大官公主復薨更尚平陽長公主昶好犬馬愛武事入魏歴紀猶布衣皂冠同凶素之服然訶罵僮僕音雜楚夏雖在公座諸王每戯侮之或戾手齒臂至於痛傷笑呼之聲聞于御聽孝文每優假之不以怪問至於陳奏夲國事故語及征役則斂容涕泗悲動左右而天性褊躁喜怒不恒每至威忿楚扑特苦引待南士禮多不足人以此少之魏太和初轉内都坐大官及齊髙帝革命孝文遣諸將南伐詔昶曰卿識機體運先覺而来今卿宗廟不復血食令卿與諸將同行昶路經徐州哭拜其母寢堂哀感從者乃徧循故居處處隕涕左右亦莫不酸鼻及至軍所將欲臨陣四靣拜諸將士自陳家國滅亡䝉朝廷慈覆辭理切至聲氣激揚涕泗横流三軍咸為歎息後昶恐水雨方降表請還師從之又加開府儀同三司領儀曹尚書於是改革朝儀詔昶與蔣少游専主其事昶條上舊式略不遺忘孝文臨宣武堂引武興王楊集始八宴詔昶曰集始邉方之酋不足以當諸侯之禮但王者不遺小國之臣故勞公卿於此又以昶為中書監開建五等封昶齊郡公加宋王之號孝武嘗臨經武殿大議南伐語及劉蕭篡奪之事昶悲泣不已頓首拜請行孝文亦為之流涕禮之彌崇旋遷使持節都督吳越楚彭城諸軍事大將軍開府鎮徐州昶頻表辭大將軍不許及發帝親餞之命百僚賦詩贈昶又以其文集一部賜昶帝因以所製文筆示之曰時契勝殘事鍾文業雖則不學欲罷不能脱思一見故以相示雖無足味聊為一笑耳其見重如此自昶之違彭城至是乆矣其昔時齋宇山池並尚存立昶更修繕還處其中然不能綏邉懐物撫接義故而閨門喧猥内外奸雜前民舊吏莫不惋歎豫營墓於彭城西南與三公主同塋而異穴發石累之墳崩壓殺十餘人後復移改頗為公私費害後昶朝洛陽孝文臨光極堂大選與羣臣甄别人品及論大將軍帝曰劉昶即其人也其後給班劍二十人太和二十一年薨於彭城孝文為之舉哀給温眀祕器贈假黄鉞太傅領揚州刺史加以殊禮備九錫給前後部羽葆彭吹依晉琅邪王伷故事謚曰眀昶嫡子承緒武邑主所生也少而尫疾尚孝文妹彭城長公主為駙馬都尉先昶卒承緒子暉字重昌為世子襲封尚宣武第二妹蘭陵長公主主嚴妬暉嘗私幸主侍婢有身主笞殺婢剖其孕子節觧以草裝實婢腹祼以示暉暉遂忿憾疏薄公主公主姊因入聽講言其故於靈太后太后𠡠暉離婚削除封位公主在宫内周嵗髙陽王雍等屢請聽復舊義太后從之後暉又私滛張陳二氏女公主與暉復致忿諍暉推主墜牀傷胎因而致薨暉懼罪逃逸後於河内温縣被執幽于司州將加死刑會赦免後復其官爵遷征冦將軍中􅄆大夫卒家遂頓廢武昌王渾字休深文帝第十子也元嘉二十四年年九嵗封汝隂王後徙武昌渾少而凶戾嘗忿左右㧞防身刀斫之元凶弑立以為中書令山陵夕祼身露頭往􅄆騎省戯因彎弓射通直郎周朗中枕以為笑樂孝建元年為雍州刺史監雍梁南北秦四州荆州之竟陵随二郡諸軍事寜蠻校尉至鎮與左右人作文檄自稱楚王號年為元光備置百官以為戯笑長史王翼之得其手迹封呈孝武上使有司奏免為庶人下太常絶屬籍使付始安郡逼令自殺即𦵏襄陽大眀四年聴還𦵏母江太妃墓次眀帝即位追封武昌縣侯建安王休仁文帝第十二子也元嘉二十九年年十嵗立為建安王前廢帝景和元年累遷䕶軍將軍特進時帝狂悖無道誅害羣公忌憚諸父並聚之殿内歐捶陵曵無復人理休仁及眀帝山陽王休祐形體並肥壯帝乃以竹籠盛而稱之以眀帝尤肥號為猪王號休仁為殺王休祐為賊王以三王年長尤所畏憚故常録以自近不離左右東海王禕凡劣號為驢王桂陽王休範巴陵王休若年少並得從容嘗以木槽盛飯内諸雜食攪令和合掘地為阬穽實之以泥水祼眀帝内阬中以槽食置前令以口就槽中食之用為歡笑欲害眀帝及休仁休祐前後以十數休仁多計數每以笑調倿諛酬悦之故得推遷常於休仁前使左右滛逼休仁所生楊太妃左右並不得已順命至右衛將軍劉道隆道隆歡以奉㫖盡諸醜狀時廷尉劉䝉妾孕臨月帝迎入後宫冀其生男欲立為太子眀帝嘗忤㫖帝怒乃祼之縛其手脚以杖貫手脚内使人擔付太官曰即日屠猪休仁笑謂帝曰猪今日未應死帝問其故休仁曰待皇太子生殺猪取肝肺帝意觧乃曰且付廷尉一宿出之帝將南遊荆湘二州眀旦欲殺諸父便發其夕眀帝克定禍難殞帝於華林園休仁即日推崇眀帝便執臣禮時南平王敬猷廬陵王敬先兄弟被害猶未殯斂休仁休祐同載臨之開帷歡笑鼓吹往反時人咸非焉眀帝以休仁為侍中司徒尚書令揚州刺史給三望車時劉道隆為䕶軍休仁求觧職曰臣不得與此人同朝上乃賜道隆死尋諸方逆命休仁都督征討諸軍事增班劒為三十人出據虎檻進赭圻尋領太子太傅總統諸軍随宜應接中流平定休仁之力也眀帝初與蘇侯神結為兄弟以祈神助及事平眀帝與休仁書曰此段殊得蘇兄神力休仁年與眀帝相亞俱好文籍素相友愛及廢帝世同經艱危眀帝又資其權譎之力泰始初四方逆命兵至近畿休仁親當矢石大勲克建任總百揆親寄甚隆四方輻湊上意漸不悦休仁悟其㫖表觧揚州見許進位太尉領司徒固讓又加漆輪車劒履升殿受漆輪車固辭劒履眀帝末年多忌休仁轉不自安及殺晉平王休祐其年上疾篤與楊運長等為身後計運長等又慮帝晏駕後休仁一旦居周公之地其軰不得秉權彌贊成上使害諸王上嘗疾暴甚内外莫不屬意於休仁主書以下皆往東府詣休仁帝所親信豫自結内其或直不得出者皆懼上與運長等定謀召休仁入宿尚書下省其夜遣人齎藥賜休仁死休仁對使者罵曰上有天下誰之力也孝武以誅子孫而至于滅今復遵覆車枉殺兄弟奈何使忠臣抱此寃濫我大宋之業其能乆乎時年二十九上疾乆慮人情同異自力乗輿出端門休仁死後乃入下詔稱其自殺宥其二子并全封爵有司奏請降休仁為庶人絶屬籍兒息悉徙逺郡詔休仁特降為始安縣王并停子伯融等流徙聴襲封爵及帝疾甚見休仁為祟呌曰司徒小寛我尋崩伯融妃殷氏所生殷氏呉興太守仲女也范陽祖翻有醫術姿貌又羙殷有疾翻入視脉悦之遂與姦事泄遣還家尋賜死晉平刺王休祐文帝第十三子也孝建二年年十一封山陽王眀帝即位以山陽荒敝改封晉平王位驃騎大將軍開府儀同三司荆州刺史休祐素無才能彊果自用大眀之世未得自専至是貪滛放縱在荆州横營財貨百姓嗷然不復堪命徴為南徐州刺史加都督上以休祐貪虐不可莅民留之都下遣上佐行府州事前後忤上非一在荆州時左右范景達善彈碁上召之休祐留不遣上怒詰責之且慮休祐將来難制方便除之七年二月車駕於巖山射雉有一雉不肯入埸日暮將反留休祐射之令不得雉勿歸休祐時從在黄麾内左右從者並在部伍後休祐便馳去上遣左右數人随之上既還前驅清道休祐人從悉􅄆不復相得上遣夀寂之等諸壯士追之日已欲闇與休祐相及蹴令墜馬休祐素勇壯有氣力奮拳左右排撃莫得近者有一人自後引隂因頓地即共拉殺之遣人馳白上行唱驃騎落馬上聞陽驚曰驃騎體大落馬殊不易即遣御醫上藥相係至頃之休祐左右人至乆已絶矣輿以還第贈司空時巴陵王休若在江陵其日即馳信報休若曰吾與驃騎南山射雉驃騎馬驚與直閤夏文秀馬相蹋文秀堕地驃騎失控馬重驚觸松樹墜地落硎中即時頓悶故馳報弟其年五月追免休祐為庶人十三子並徙晉平眀帝尋病見休祐為祟使使至晉平撫其諸子帝尋崩廢帝元徽元年聴諸子還都順帝昇眀三年稱謀反並賜死海陵王休茂文帝第十四子也孝建二年年十一封海陵王大眀二年為雍州刺史加都督北中郎將寜蠻校尉司馬庾深之行府州事休茂性急欲自専深之及主帥每禁之常懐忿怒因左右張伯超至所親愛多罪過主帥屢加訶責伯超懼罪謂休茂曰主帥宻疏官罪欲以啓聞休茂曰今為何計伯超曰唯殺行事及主帥舉兵自衛縱事不成不失入虜中為王休茂從之夜使伯超等殺司馬庾深之等集兵建牙馳檄休茂出城行營諮議參軍沈暢之等閉門拒之城䧟斬暢之其日參軍尹元度起兵攻休茂禽之斬首母妻皆自殺同黨悉伏誅有司奏絶休茂屬籍貶姓為留不許即𦵏襄陽鄱陽哀王休業文帝第十五子也孝建二年年十一封鄱陽王三年薨以山陽王休祐次子士𢎞嗣被廢國除臨慶沖王休倩文帝第十六子也孝建元年年九嵗疾篤封東平王未拜薨大眀七年立第二十七皇子子嗣為東平王紹休倩泰始三年還夲遂絶六年以第五皇子智并為東平王繼休倩未拜薨其年追改休倩為臨慶王休倩為文帝所愛故前後屢加紹嗣新野懐王夷父文帝第十七子也元嘉二十九年薨眀帝泰始五年追加封謚桂陽王休範文帝第十八子也孝建三年年九嵗封順陽王大眀元年改封桂陽泰始六年累遷驃騎大將軍江州刺史加都督遺詔進位司空侍中加班劒三十人休範素凡訥少知觧不為諸兄齒遇眀帝嘗指左右人謂王景文曰休範人才不及此以我故生便富貴釋氏願生王家良有以也及眀帝晚年晉平王休祐以狼戾致禍建安王休仁以權逼不容巴陵王休若素得人情以此見害唯休範謹澁無才不為物情所向故得自保而常懐憂懼及眀帝晏駕主㓜時艱休範自謂宗戚莫二應居宰輔事既不至怨憤彌結招引勇士繕修器械行人經過尋陽者莫不降意折節於是至者如歸朝廷知之宻相防御母荀太妃薨即𦵏廬山以示不還之志時夏口闕鎮朝議以夏口居尋陽上流欲樹置腹心重其兵力元徽元年乃以第五皇弟晉熙王燮為郢州刺史長史王奐行府州事配以實力出鎮夏口慮為休範所撥留自太子洑去不過尋陽休範怒欲舉兵乃上表修城堞其年進位太尉眀年五月遂反發自尋陽晝夜取道大雷戍主杜道欣馳下告變道欣至一宿休範已至新林朝廷震動齊髙帝出次新亭壘時事起倉卒朝廷兵立甚弱乃開武庫随將士意取仗休範於新林歩上攻新亭壘屯騎校尉黄回乃偽往降并宣齊髙帝意休範大悦置之左右休範將士李恒鍾爽進諫不宜親之休範曰不欺人以信時休範日飲醇酒以二子徳宣徳嗣付與齊髙帝為質至即斬之回與越騎校尉張茍兒直前斬休範首持還左右並􅄆初休範自新林分遣同黨杜墨蠡丁文豪等直向朱雀門休範雖死墨蠡等不知王道隆率羽林兵在朱雀門内聞賊至急召劉勔勔自石頭馳赴戰死之墨蠡等乗勝直入朱雀門王道隆為亂兵所殺墨蠡等唱云太尉至休範之死也齊髙帝遣隊主陳靈寳齎首還䑓逢賊埋首道側挺身得達靈寳雖唱云已平而無以為據衆愈疑惑墨蠡徑至杜姥宅朝士多出降者宫省恇擾無復固志撫軍長史禇澄以東府納賊賊擁安成王據東府稱休範教曰安成王吾子也勿得侵賊勢方逼衆莫能拒而丁文豪之衆知休範已死稍欲退􅄆文豪勇氣殊壯厲聲謂其衆曰我獨不能定天下邪休範首既至而羽林監陳顯達又率所領於杜姥宅破墨蠡等諸賊一時奔􅄆斬墨蠡文豪等晉熙王燮自夏口遣軍平尋陽巴陵哀王休若文帝第十九子也孝建三年年九嵗封巴陵王眀帝即位出為㑹稽太守加都督二年遷都督雍州刺史寜蠻校尉前在會稽録事參軍陳郡謝沈以謟側事休若多受財賂時内外戒嚴並袴褶沈居母喪被起聲樂酣飲不異吉人衣冠既無殊異並不知沈為居喪沈嘗自稱孤子衆乃駭愕休若坐與沈䙝黷降號鎮西將軍典籖夏寳期事休若無禮休若啓眀帝殺之慮不許啓未報遂於獄行刑及信反但令鎖送而寳期已死上怒勅之曰孝建之世汝何敢爾使其母羅加杖三百四年改行湘州刺史六年為荆州刺史加都督征西大將軍開府儀同三司七年晉平王休祐被殺建安王休仁見疑都下訛言休若有至貴之表眀帝以此言報之休若甚憂嘗衆賔滿坐有一異鳥集席隅哀鳴墜地死又聴事前有二大白蛇長丈餘唅唅有聲休若甚惡之會被徴為南徐州刺史加都督征北大將軍開府如故休若腹心將佐咸謂還朝必有大禍中兵參軍京兆王敬先勸割據荆楚休若執録馳使白眀帝敬先坐誅休若至京口上以休若善能諧緝物情慮將来傾㓜主欲遣使殺之慮不奉詔徴入朝又恐猜駭乃偽授為江州刺史至即於第賜死贈侍中司空子沖始襲封孝武十四王孝武二十八男文穆皇后生廢帝子業豫章王子尚陳淑媛生晉安王子勛阮容華生安陸王子綏徐昭容生皇子子深何淑儀生松滋侯子房史昭華生臨海王子頊殷貴妃生始平孝敬王子鸞次永嘉王子仁與皇子子深同生何偼伃生皇子子鳯謝昭容生始安王子真江偼伃生皇子子元史昭儀生邵陵王子元次齊敬王子羽與始平孝敬王子鸞同生江羙人生皇子子衡楊偼伃生淮南王子孟次皇子子况與皇子子元同生次南平王子産與永嘉王子仁同生次晉陵孝王子雲次皇子子文並與始平孝敬王子鸞同生次廬陵王子輿與淮南王子孟同生次南海哀王子師與始平孝敬王子鸞同生次淮陽思王子霄與皇子子元同生次皇子子雍與始安王子真同生次皇子子趨與皇子子鳯同生次皇子子期與皇子子衡同生次東平王子嗣與始安王子真同生張容華生皇子子悦安陸王子綏南平王子産廬陵王子輿並出繼皇子子深子鳯子元子衡子況子文子雍未封早夭子趨子期子悦未封為眀帝所殺豫章王子尚字孝師孝武第二子也孝建三年年六嵗封西陽王大眀三年分浙江西立王畿以浙江東為揚州以子尚為刺史加都督六年改封豫章王領會稽太守七年進號車騎大將軍開府儀同三司時東土大旱鄞縣多疁田孝武使子尚表至鄞縣勸農又立左學召生徒置儒林祭酒一人學生師敬位比州從中從事文學祭酒一人比州西曹勸學從事二人此祭酒從事前廢帝即位罷王畿復舊徴子尚都督揚南徐二州諸軍事領尚書令初孝建中孝武以子尚太子母弟甚留心後新安王子鸞以母幸見愛子尚寵衰及長凶慝有廢帝之風眀帝既殞廢帝乃稱太皇太后令曰子尚頑凶楚玉滛亂並於第賜盡楚玉廢帝姊山隂公主也廢帝改封會稽郡長公主給鼓吹一部加班劒二十人未拜授而廢敗晉安王子勛字孝徳孝武第三子也眼患風不為孝武所愛大眀四年年五嵗封晉安王七年為江州刺史加都督八年改授雍州未拜而孝武崩還為江州時廢帝狂凶多所誅害撫軍資議參軍何邁先尚文帝女新蔡公主廢帝詐云主薨殺宫人代之顯加殯𦵏而納主於後宫深忌邁邁慮禍及謀因帝出行為變迎立子勛事泄帝自率宿衛兵誅邁手詔子勛曰何邁欲廢我立汝自計孰若孝武邪即使左右朱景送藥賜子勛死景至湓口遣報長史鄧琬琬等奉子勛起兵以廢立為名眀帝定亂進子勛車騎將軍開府儀同三司琬等不受命乃稱符瑞云松滋縣生豹自来柴桑縣送竹有来奉天子字令顧昭之撰瑞命記立宗廟設壇場矯作崇憲太后璽書令羣僚上偽號於子勛以㤗始二年正月七日即位於尋陽年號義嘉其日雲雨晦合行禮忘稱萬嵗其夕有鳩棲於輦上而鴞集其幰拜安陸王子綏為司徒有鴟棲其帳上以鄧琬為左將軍尚書僕射備置百官諸州四方響應是嵗四方貢計並詣尋陽子勛遣兵下盡敗沈攸之諸軍至尋陽誅子勛及同逆時年十一即𦵏尋陽廬山松滋侯子房字孝良孝武第六子也大眀四年年五嵗封尋陽王前廢帝景和元年為會稽太守加都督眀帝即位徴為撫軍領太常長史孔覬不受命舉兵應接晉安王子勛上虞令王晏殺覬送子房還建業上宥之貶為松滋縣侯司徒建安王休仁以子房兄弟終為禍難勸上除之廢徙逺郡見殺年十一臨海王子頊字孝烈孝武第七子也初封歴陽王後改封臨海位荆州刺史眀帝即位進督雍州長史孔道存不受命應晉安王子勛事敗賜死年十一始平孝敬王子鸞字孝羽孝武帝第八子也大眀四年封襄陽王尋改封新安五年為北中郎將南徐州刺史領南琅邪太守母殷淑儀寵冠後宫子鸞愛冠諸子凡為上所􅀈遇者莫不入子鸞府國為南徐州又割吳郡屬之六年丁母憂進位司徒加都督前廢帝素疾子鸞有寵及即位既誅羣臣乃遣使賜子鸞死時年十嵗子鸞臨死謂左右曰願後生不復生帝王家同生弟妹並死眀帝即位改封始平王以建平王景素子延年嗣永嘉王子仁字孝龢孝武第九子也大眀五年封永嘉王眀帝即位以為湘州刺史帝尋從建安王休仁計未拜賜死時年十嵗始安王子真字孝貞孝武第十一子也邵陵王子元字孝善孝武第十三子也並被眀帝賜死齊敬王子羽字孝英孝武第十四子也生二嵗薨追加封謚淮南王子孟字孝光孝武第十六子也初封淮南王眀帝改封安成王未拜賜死晉陵孝王子雲字孝舉孝武第十九子也大眀六年封未拜而亡南海哀王子師字孝友孝武第二十二子也大眀七年封未拜為前廢帝所害眀帝即位追謚淮陽思王子霄字孝雲孝武第二十三子也早薨追加封謚東平孝王子嗣字孝叔孝武第二十七子也眀帝賜死武陵王贊字仲敷小字智随眀帝第九子也眀帝既誅滅孝武諸子詔以智随奉孝武為子封武陵郡王順帝昇眀二年薨國除眀帝四王眀帝十二男陳貴妃生後廢帝謝修儀生皇子法良陳昭華生順帝徐偼伃生第四皇子鄭修容生皇子智并次晉熙王燮與皇子法良同生泉羙人生邵陵殤王友次江夏王躋與第四皇子同生徐良人生武陵王贊杜修華生随陽王翽次新興王嵩與武陵王贊同生又泉羙人生始建王禧智并燮躋贊並出繼法良未封第四皇子未有名早夭邵陵殤王友字仲賢眀帝第七子也年五嵗出為南中郎將江州刺史封邵陵王後廢帝元徽二年桂陽王休範誅後王室㣲弱友府州文案及臣吏不諱有無君之心順帝昇眀二年徙南豫州刺史薨無子國除隨陽王翽字仲儀眀帝第十子也初封南陽王昇眀二年改封随陽齊受禪降封舞隂縣公新興王嵩字仲岳眀帝第十一子也齊受禪降封定襄縣公始建王禧字仲安眀帝第十二子也齊受禪降封荔浦縣公尋並云謀反賜死通志卷八十一
