body:
  text: 通志卷十九宋右廸功郎鄭樵漁仲撰后妃𫝊第一前漢髙祖吕皇后戚夫人孝惠張皇后髙祖薄姬孝文竇皇后兄長君弟少君孝景薄皇后孝景王皇后孝武陳皇后孝武衛皇后孝武尹倢伃邢夫人孝武鉤弋趙倢伃孝武李夫人孝昭上官皇后桀安衛太子史良娣史皇孫王夫人孝宣許皇后孝宣霍皇后孝宣王皇后孝元王皇后孝成許皇后孝成班倢伃孝成趙皇后孝元傅昭儀定陶丁姬孝哀傅皇后孝元馮昭儀中山衛姬孝平王皇后後漢公主附光武郭皇后光烈隂皇后明德馬皇后賈貴人章德竇皇后梁貴人和帝隂皇后和熹鄧皇后安思閻皇后順烈梁皇后虞美人陳夫人孝崇匽皇后桓懿獻梁皇后桓鄧皇后桓思竇皇后孝仁董皇后靈帝宋皇后靈思何皇后王美人𢎞農王唐姬獻帝伏皇后獻穆曹皇后魏武宣卞皇后文昭甄皇后文德郭皇后明悼毛皇后明元郭皇后蜀先主甘皇后先主穆皇后後主敬哀皇后後主張皇后吳孫破虜吳夫人吳景吳主權謝夫人謝承吳主權徐夫人徐琨吳主權歩夫人吳主權王夫人吳主權王夫人吳主權潘夫人孫亮全夫人孫休朱夫人孫和何姬孫皓滕夫人前漢班固曰自古受命帝王及繼體守文之君非獨内德茂也蓋亦有外戚之助焉夏之興也以塗山而桀之放也用末喜殷之興也以有娀及有㜪而紂之滅也嬖妲己周之興也以姜嫄及大任大姒而幽王之禽也淫襃姒故易基乾坤詩首闗雎書美釐降春秋譏不親迎夫婦之際人道之大倫也禮之用唯婚姻為兢兢夫樂調而四時和隂陽之變萬物之統也可不愼與人能𢎞道末如命何甚哉妃匹之愛君不能得之臣父不能得之子况卑下乎既驩合矣或不能成子姓成子姓矣而不能要其終豈非命也哉孔子罕言命蓋難言之非通幽眀之變惡能識乎性命漢興因秦之稱號帝母稱皇太后祖母稱太皇太后適稱皇后妾皆稱夫人又有美人良人八子七子長使少使之號焉至武帝制倢伃娙娥傛華充依各有爵位而元帝加昭儀之號凡十四等云昭儀位視丞相爵比諸侯王倢伃視上卿比列侯娙娥視中二千石比關内侯傛華視真二千石比大上造美人視二千石比少上造八子視千石比中更充依視千石比左更七子視八百石比右庶長良人視八百石比左庶長長使視六百石比五大夫少使視四百石比公乗五官視三百石順常視二百石無涓共和娛靈保林良使夜者皆視百石上家人子中家人子視有秩斗食云五官以下葬司馬門外髙祖吕皇后父吕公單父人也好相人髙祖㣲時吕公見而異之乃以女妻髙祖生惠帝魯元公主髙祖為漢王元年封吕公為臨泗侯二年立孝惠為太子後漢王得定陶戚姬愛幸生趙隠王如意太子為人仁弱髙祖以為不類已常欲廢之而立如意言如意類我戚姬常從上之關東日夜啼泣欲立其子吕后年長常留守希見益踈如意且立為趙王留長安幾代太子者數頼公卿大臣争之及叔孫通諫用留侯之䇿得無易吕后為人剛毅佐髙帝定天下兄二人皆為列将從征伐長兄澤為周吕侯次兄釋之為建城侯逮髙祖而侯者三人髙祖四年臨泗侯吕公薨髙祖崩惠帝立吕后為皇太后廼令永巷囚戚夫人髠鉗衣赭衣令舂戚夫人舂且歌曰子為王母為虜終日舂薄暮常與死為伍相離三千里當誰使告女太后聞之大怒曰乃欲倚女子邪乃召趙王誅之使者三反趙相周昌不遣太后召趙相相徴至長安使人復召趙王王来惠帝慈仁知太后怒自迎趙王霸上入宫挾與起居飲食數月帝晨出射趙王不能早起太后伺其獨居使人持鴆飲之遲帝還趙王死太后遂斷戚夫人手足去眼熏耳飲瘖藥使居鞠域中名曰人彘居數月乃召惠帝視人彘帝視而問知其戚夫人乃大哭因病歳餘不能起使人請太后曰此非人所為臣為太后子終不能復治天下以此日飲為淫樂不聽政七年而崩太后發䘮哭而泣不下留侯子張辟疆為侍中年十五謂丞相陳平曰太后獨有帝今哭而不悲君知其解未陳平曰何觧辟疆曰帝無壮子太后畏君等今請拜吕台吕産為將將兵居南北軍及諸吕皆官居中用事如此則太后心安君等幸脱禍矣丞相如辟疆計請之太后説其哭甚哀吕氏權由此起乃立孝惠後宫子為帝太后臨朝稱制復殺髙祖子趙幽王友共王恢及燕靈王建遂立周吕侯子台為吕王台弟産為梁王建城侯釋之子禄為趙王台子通為燕王又封諸吕凡六人皆為列侯追尊父吕公為吕宣王兄周吕侯為悼武王太后八年春祓還道見物如犬據其掖卜云趙王如意為祟遂病掖傷病困以趙王禄為上將軍居北軍梁王産為相國居南軍戒産禄曰髙祖與大臣約非劉氏王者天下共撃之今王吕氏大臣不平我即崩恐其為變必據兵衛宫愼母送䘮為人所制太后崩太尉周勃丞相陳平朱虛侯劉章等共誅産禄悉捕諸吕男女無少長皆斬之迎立代王是為孝文皇帝孝惠張皇后宣平侯敖女也敖尚帝姊魯元公主生后惠帝即位吕太后欲為重親以公主女配帝為皇后欲其生子萬方終無子乃使陽為有身取後宫美人子名之殺其母立所名子為太子惠帝崩太子立為帝四年乃自知非皇后子出言曰太后安能殺吾母而名我我壯即為所為太后聞而患之恐其作亂乃幽之永巷帝病甚左右莫得見太后下詔廢之語在髙后紀遂幽死更立恒山王𢎞為皇帝而以吕禄女為皇后欲連根固本牢甚然而無益也吕太后崩大臣正之卒滅吕氏少帝恒山淮南濟川王皆以非孝惠子誅獨置孝惠皇后廢處北宫孝文後元年薨葬安陵不起墳髙祖薄姬文帝母也父吳人秦時與故魏王宗家女魏媪通生薄姬而薄姬父死山隂因葬焉及諸侯叛秦魏豹立為魏王而魏媪内其女於魏宫許負相薄姬當生天子是時項羽方與漢王相距滎陽天下未有所定豹初與漢撃楚及聞許負言心獨喜因背漢而中立與楚連和漢使曹參等虜魏王豹以其國為郡而薄姬輸織室漢王入織室見薄姬有色詔内後宫歳餘不得幸始姬少時與管夫人趙子兒相愛約曰先貴無相忘已而管夫人趙子兒先幸漢王漢王四年王坐河南宫成臯靈臺此二美人侍相與笑薄姬初時約漢王問其故俱以實告漢王心悽然憐薄姬是日召欲幸之對曰昨暮夜夢蒼龍據妾胸上曰此貴徴也吾為汝遂成之一幸生男是為代王其後希見髙祖崩諸御幸姬戚夫人之屬吕后皆幽之不得出宫而薄姬以希見故得出從子之代為代王太后其弟薄昭從如代代王立十七年髙皇后崩太臣議立後疾外家吕氏彊暴皆稱薄氏仁善故立代王為皇帝尊太后為皇太后封弟薄昭為軹侯太后母亦前死葬櫟陽北乃追尊太后父為靈文侯㑹稽郡置園邑三百家長丞已下使奉守寢廟上食祠如法而櫟陽亦置靈文夫人園令如靈文侯園儀太后早失父其奉太后外家魏氏有力乃召復魏氏賞賜各以親疏受之薄氏侯者一人太后後文帝二歲孝景前二年崩葬南陵用吕后不合葬長陵故特自起陵近孝文霸陵孝文竇皇后景帝母也趙之清河觀津人吕后時以良家子選入宫侍太后太后出宫人以賜諸王各五人竇姬與在行中家在清河願如趙近家請其主遣宦者吏必置我籍趙之伍中宦者忘之誤置籍代伍中籍奏詔可當行竇姬泣涕怨其宦者不欲往相彊乃肯行至代代王獨幸竇姬生女嫖孝惠七年生景帝代王王后生四男先代王未入立為帝而王后卒及代王為帝後王后所生四男更病死文帝立數月公卿請立太子而竇姬男最長立為太子竇姬為皇后嫖為館陶長公主明年封少子武為代王後徙梁是為梁孝王竇皇后親早卒葬觀津於是薄太后詔追封竇皇后父為安成侯母曰安成夫人令清河置園邑二百家長丞奉守比靈文園法竇后兄長君弟曰廣國字少君年四五歳家貧為人所畧賣其家不知其處傳十餘家至宜陽為其主人入山作炭暮臥岸下百餘人岸崩盡壓殺臥者少君獨脱不死自卜數日當為侯從其家之長安聞皇后新立家在觀津姓竇氏廣國去時雖少識其縣名及姓又甞與其姊採桑墮用為符信上書自陳竇皇后言之於文帝召見問之具言其故果是又復問他以何為驗對曰姊去我西時與我决於𫝊舎中匄沭沐我請食飯我乃去於是竇后持之而涕泣交横下侍御左右皆伏地泣助皇后悲哀乃厚賜金錢田宅家於長安絳侯灌将軍等曰吾屬不死命乃且縣此兩人兩人所出㣲不可不為擇師傅賓客又復效吕氏大事也於是乃選士之有節行者與居竇長君少君用此為退讓君子不敢以尊貴驕人竇皇后疾失明文帝所幸邯鄲愼夫人尹姬皆無子文帝崩景帝立皇后為皇太后封廣國為章武侯長君前死封其子彭祖為南皮侯吳楚反太后從昆弟子竇嬰俠喜士為大将軍破吳楚封魏其侯竇氏凡三人侯竇太后好黄帝老子言景帝及諸竇不得不讀黄帝老子而尊其術太后後景帝六歳凡立五十一年建元六年崩合葬霸陵遺詔盡以東宫金錢財物賜長公主嫖至孝武帝時魏其侯竇嬰為丞相後誅孝景薄皇后孝文薄太后家女也景帝為太子時薄太后取以為太子妃景帝立立薄妃為皇后無子無寵立六年薄太后崩皇后廢廢後四年薨葬長安城東平望亭南孝景王皇后武帝母也槐里人母曰臧兒故燕王臧荼孫也嫁為槐里王仲妻生男信與兩女而仲死臧兒更嫁長陵田氏生男蚡勝臧兒長女嫁為金王孫婦生一女矣而臧兒卜筮之曰兩女皆當貴因欲倚兩女乃奪金氏金氏怒不肯與决乃内之太子宫太子幸愛之生三女一男男方在身時王夫人夢日入其懷以告太子太子曰此貴徴也未生而文帝崩景帝即位王夫人生男是時薄皇后無子後數歲景帝立齊栗姬男為太子而王夫人男為膠東王長公主嫖有女欲與太子為妃栗姬妬而景帝諸美人皆因長公主見得貴幸栗姬日怨怒謝長主不許長主欲與王夫人王夫人許之㑹薄皇后廢長公主日譖栗姬短景帝甞屬諸姬子曰吾百歳後善視之栗姬怒不肯應言不遜景帝心銜之而未發也長公主日譽王夫人男之美帝亦自賢之又耳曩者所夢日符計未有所定王夫人又隂使人趣大臣立栗姬為皇后大行奏事文曰子以母貴母以子貴今太子母號宜為皇后帝怒曰是乃所當言邪遂案誅大行而廢太子為臨江王栗姬愈恚不得見以憂死卒立王夫人為皇后男為太子封皇后兄信為蓋侯初皇后始入太子家後女弟兒姁亦復入生四男兒姁早卒四子皆為王皇后長女為平陽公主次南宫公主次隆慮公主皇后立九年景帝崩武帝即位為皇太后尊太后母臧兒為平原君封田蚡為武安侯勝為周陽侯王氏田氏侯者凡三人蓋侯信好酒田蚡勝貪巧於文辭蚡至丞相追尊王仲為共侯槐里起園邑二百家長丞奉守及平原君薨從田氏葬長陵亦置園邑如共侯法初皇太后㣲時所為金王孫生女俗在民間蓋諱之也武帝始立韓嫣白之帝曰何為不早言乃車駕自往迎其家在長陵小市直至其門使左右入求之家人驚恐女逃匿扶將出拜帝下車立曰大姊何藏之深也載至長樂宫與俱謁太后太后垂涕女亦悲泣帝奉酒前為壽錢千萬奴婢三百人公田百頃甲第以賜姊太后謝曰為帝費因賜湯沐邑號修成君男女各一人女嫁諸侯男號修成子仲以太后故横於亰師太后凡立二十五年後景帝十五歳元朔三年崩合葬陽陵孝武陳皇后長公主嫖女也曽祖父陳嬰與項羽俱起後歸漢為堂邑侯傳子至孫午午尚長公主生女初武帝得立為太子長主有力取主女為妃及帝即位立為皇后擅寵驕貴十餘年而無子聞衛子夫得幸幾死者數焉上愈怒后又挾婦人媚道頗覺元光五年上遂窮治之女子楚服等坐為皇后巫蠱祠祭祝詛大逆無道相連及誅者三百餘人楚服梟首於市使有司賜皇后策曰皇后失序惑於巫祝不可以承天命其上璽綬罷退居長門宫明年堂邑侯午薨主男湏嗣侯主寡居私近董偃十餘年主薨須坐淫亂兄弟爭財當死自殺國除後數年廢后廼薨葬霸陵郎官亭東孝武衛皇后字子夫生㣲也其家號曰衛氏出平陽侯邑子夫為平陽主謳者武帝即位數年無子平陽主求良家女十餘人飾置家帝祓霸上還過平陽主主見所偫美人帝不説既飲謳者進帝獨説子夫帝起更衣子夫侍尚衣軒中得幸還坐歡甚賜平陽主金千斤主因奏子夫送入宫子夫上車主拊其背曰行矣彊飯勉之即貴願無相忘入宫歳餘不復幸武帝擇宫人不中用者斥出之子夫得見涕泣請出上憐之復幸遂有身尊寵召其兄衛長君弟青侍中而子夫生三女元朔元年生男據遂立為皇后先是衛長君死乃以青為將軍擊匈奴有功封長平侯青三子在襁褓中皆為列侯及皇后姊子霍去病亦以軍功為冠軍侯至大司馬驃騎將軍青為大司馬大將軍衛氏支屬侯者五人青還尚平陽主皇后立七年而男立為太子後色衰趙之王夫人中山李夫人有寵皆早卒後有尹倢伃鉤弋夫人更幸衛后立三十八年遭巫蠱事起江充為姦太子懼不能自明遂與皇后共誅充發兵兵敗太子亡走詔遣宗正劉長樂執金吾劉敢奉策収皇后璽綬自殺黄門蘇文姚定漢輿置公車令空舎盛以小棺瘞之城南桐柏衛氏悉滅宣帝立乃改葬衛后追諡曰思后置園邑三百家長丞周衛奉守焉孝武尹夫人號倢伃邢夫人號娙娥俱為武帝所幸有詔不得相見尹夫人自請於帝曰願見邢夫人帝許之即令他夫人餙從御者數十人來前尹夫人望見之曰此非邢夫人身也帝曰何以言之對曰視其形狀不足以當人主矣於是帝乃使邢夫人衣故衣獨身来前尹夫人望見之曰此真是矣於是乃低頭俛而泣自痛其不如也諺曰美女入室惡女之仇褚先生曰浴不必江海要之去垢馬不必騏驎要之善走士不必賢世要之知道女不必貴種要之貞好傳曰女無美惡入宫見妬士無賢不肖入朝見嫉美女者惡女之仇豈不然哉孝武鉤弋夫人趙倢伃昭帝母也河間人武帝廵狩過河間望氣者言此有竒女天子亟使使召之既至女兩手皆拳上自披之手即時伸由是得幸號曰拳夫人先是其父坐法宫刑為中黄門死長安葬雍門拳夫人進為倢伃居鉤弋宫大有寵本始三年生昭帝號鉤弋子任身十四月乃生上曰聞昔堯十四月而生今鉤弋亦然乃命其所生門曰堯母門及衛太子敗而燕王旦廣陵王胥多過失寵姬王夫人男齊懷王李夫人男昌邑哀王皆早薨鉤弋之子年五六歳壮大多知上常言類我又感其生與衆異甚竒愛之心欲立焉上居甘泉宫召畫工圖畫周公負成王於是左右羣臣知武帝欲立少子也後數日上幸甘泉以㣲過譴責鉤弋倢伃倢伃脱簪珥叩頭帝曰引持去送掖廷獄倢伃還顧帝曰趣行汝不得活倢伃死雲陽宫時暴風揚塵百姓傷感使者夜持棺徃葬之封識其處其後帝閑居問左右曰人言云何對曰人言且立其子何去其母乎帝曰然非兒曹愚人所知也往古國家所以亂者由主少母壮也女主獨居驕蹇婬亂自恣莫能禁也汝不聞吕后邪故諸為武帝生子者無男女其母無不譴死未幾帝疾病乃立鉤弋子為皇太子拜奉車都尉霍光為大司馬大將軍輔少主以所畫周公負成王像賜之既而帝崩昭帝即位追尊鉤弋倢伃為皇太后發卒二萬人起雲陵邑三千户追尊外祖趙父為順成侯詔右扶風置園邑二百家長丞奉守如法順成侯有姊君姁賜錢二百萬奴婢第宅以充實焉諸昆弟各以親疏受賞賜趙氏無在位者唯趙父得封孝武李夫人本以倡進初夫人兄延年性知音律善歌舞武帝愛之每為新聲變曲聞者莫不感動延年侍上起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寕不知傾城與傾國佳人難再得上歎息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞由是得幸生一男是為昌邑哀王李夫人少而早卒上憐憫焉圖畫其形於甘泉宫及衛思后廢後四年武帝崩大將軍霍光縁上雅意以李夫人配食追上尊號曰孝武皇后初李夫人病篤上自臨候之夫人䝉被謝曰妾乆寢病形貌毁壞不可以見帝願以王及兄弟為託上曰夫人病甚殆將不起一見我屬託王及兄弟豈不快哉夫人曰婦人貌不修餙不見君父妾不敢以燕媠見帝上曰夫人但一見我將加賜千金而與兄弟尊官夫人曰尊官在帝不在一見上復言欲必見之夫人遂轉鄉欷歔而不復言於是上不悦而起夫人姊妹皆譲之曰貴人獨不可一見上屬託兄弟邪何為恨上如此夫人曰所以不欲見帝者乃欲以深託兄弟也我以容貌之好得從㣲賤愛幸於上夫以色事人者色衰則愛弛愛弛則恩絶上所以攣攣顧念我者攣力全反又讀作戀乃以平生容貌也今見我毁壞顔色非故必且畏惡吐弃我意尚肯復追思閔録其兄弟哉及夫人卒上以后禮葬之其後上以夫人兄廣利為貳師將軍封海西侯延年為協律郎都尉上思念夫人不巳有方士齊人李少翁言能致其神乃夜張燈燭設帷帳陳酒肉而令上居他帳遥望見好女如李夫人之貌還幄坐而歩又不得就視上愈益相思悲感為作詩曰是邪非邪立而望之偏何姍姍其來遲姍先安反令樂府諸音家絃歌之上又自作賦以悼之其後李延年弟季坐姦亂後宫廣利降匈奴家族滅矣孝昭上官皇后祖父桀隴西上邽人也少時為羽林期門郎從武帝上甘泉天大風車不得行觧蓋授桀桀奉蓋雖風常屬車雨下蓋輒御上竒其材力遷未央廐令上嘗體不安及愈見馬馬多瘦上大怒令曰以我不復見馬邪欲下吏桀頓首曰臣聞聖體不安日夜憂懼意誠不在馬言未卒泣數行下上以為忠由是親近為侍中稍遷至太僕武帝疾病以霍光為大将軍桀為左將軍皆受遺詔輔少主昭帝始立年八歳帝長姊鄂邑盖公主居禁中共養帝盖主私近子客河間丁外人上與大將軍聞之不絶主驩有詔外人侍長主長主内周陽氏女令配耦帝時上官安有女即藿光外孫安欲因光内之光以為尚幼不聽安素與丁外人善説外人曰聞長主内女安子容貌端正誠因長主得入為皇后以臣父子在朝而有椒房之重成之在於足下漢家故事常以列侯尚主足下何憂不封侯乎外人喜言於長主長主以為然詔召安女入為倢伃安為騎都尉月餘遂立為皇后年甫六歳安以后父封桑樂侯遷車騎將軍日以驕淫受賜殿中出對賓客言與我壻飲夫樂見其服飾使人歸自欲燒物安醉則裸行内與後母及父諸良人侍御皆亂其子病死仰而罵天數守守謂求請也大將軍光為丁外人求侯及桀欲妄官禄外人光執正皆不聽又桀妻父所幸充國為太醫監䦨入殿中下獄當死冬月且盡蓋主為充國入馬二十疋贖罪廼得減死論由是桀安父子深怨光而重德盖主知燕王旦帝兄不得立怨望桀安即記光過失予燕王令上書告之又為丁外人求侯燕王大喜上書稱子路䘮姊期而不除孔子非之子路曰由不幸寡兄弟不忍除之故曰觀過知仁今臣與陛下獨有長公主為姊陛下幸使丁外人侍之外人宜䝉爵號書奏上以問光光執不許又告光罪過上又疑之愈親光而疏桀安桀安寖恚遂結黨與謀殺光誘徴燕王至而誅之因廢帝而立桀或曰當如皇后何安曰逐麋之狗當顧莬邪且用皇后為尊一旦人主意有所移雖欲為家人亦不可得此百世之一時也事發覺燕王盖主皆自殺桀安宗族皆滅皇后以年少不與謀復光外孫故得不廢皇后母前死葬茂陵郭東追尊曰敬夫人置園邑二百家長丞奉守如法皇后自使私奴婢守桀安冢光欲皇后擅寵有子帝時體不安左右及醫皆阿意言宜禁内雖宫人使令皆為窮絝多其帶故後宫莫有進者皇后立十歳而昭帝崩后年十四五云昌邑王賀徴即位尊為皇太后光與皇太后共廢王賀立孝宣帝宣帝即位為太皇太后凡立四十七年年五十二建昭二年崩合葬平陵衛太子史良娣宣帝祖母也太子有妃有良娣有孺子妻妾凡三等子皆稱皇孫史良娣家本魯國有母貞君兄㳟以元鼎四年入為良娣生男進號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害史皇孫有一男號皇曽孫時生數月猶坐太子繋獄積五歳乃遭赦治獄使者邴吉憐皇曽孫無所歸載以付史恭恭母貞君年老見孫孤甚哀之自養視焉後曽孫収養掖庭遂登至尊位是為宣帝而貞君及恭已死恭三子皆以舊恩封長子髙為樂陵侯曽為將陵侯元為平臺侯及髙子丹以功德封武陽侯史氏侯者凡四人髙至大司馬車騎將軍丹大將軍自有𫝊史皇孫王夫人宣帝母也名翁須太始中得幸於史皇孫皇孫妻妾無號位皆稱家人子征和二年生宣帝帝生數月衛太子皇孫敗家人子皆坐誅莫有収葬者唯宣帝得全宣帝即位追尊母王夫人諡曰悼后祖母史良娣曰戾后皆改葬起園陵長丞奉守地節三年求得外祖母王媪媪男無故無故弟武皆隨使者詣闕時乗黄牛車故百姓謂之黄牛媪初上即位數遣使者求外家久逺多似類而非是既得王媪令太中大夫任宣與丞相御史屬雜考問鄉里知識者皆曰王媪媪言名妄人家本􅃰郡蠡吾平郷年十四嫁為同郷王更得妻更得死嫁為廣望王廼始婦産子男無故武女翁須翁湏年八九歳時寄居廣望節侯子劉仲卿宅仲卿謂廼始曰予我翁須自養長之媪為翁須作縑單衣送仲卿家仲卿教翁須歌舞往来歸取冬夏衣居四五歳翁須來言邯鄲賈長兒求歌舞者仲卿欲以我予之媪即與翁須逃走之平郷仲卿載廼始共求媪媪惶急将翁須歸曰兒居君家非受一錢也奈何欲予他人仲卿詐曰不也後數日翁須乗長兒車馬過門呼曰我果見行當之栁宿媪與廼始之栁宿見翁須相對涕泣謂曰欲為女自言翁須曰母置之何家不可以居自言無益也媪與廼始還求錢用隨逐至中山盧奴見翁須與歌舞等比五人同處媪與翁須共宿明日廼始留視翁須媪還求錢欲隨至邯鄲媪糶買未具廼始來歸曰翁須已去我無錢用隨也因絶至今不聞其問賈長兒妻貞及從者師遂辭往二十歳太子舍人侯明起從長安来求歌舞者請翁須等五人長兒使遂送至長安皆入太子家及廣望三老更始劉仲卿妻其等四十五人辭皆驗宣奏王媪悼后母明白上皆召見賜無故武爵闗内侯旬月間賞賜以鉅萬計頃之制詔御史賜外祖母號為博平君以博平蠡吾両縣户萬一千為湯沐邑封舅無故為平昌侯武為樂昌侯食邑各六千户初廼始以本始四年病死後三歳家廼富貴追賜諡曰思成侯詔涿郡治冢室置園邑四百家長丞奉守如法歳餘博平君薨謚曰昭成夫人詔徙思成侯合葬奉明顧成廟南置園邑長丞罷涿郡思成園王氏侯者二人無故子接為大司馬車騎将軍而武子商至丞相自有傳孝宣許皇后元帝母也父廣漢昌邑人少時為昌邑王郎從武帝上甘泉誤取他郎鞍以被其馬發覺吏劾從行而盜當死有詔募下蠶室若死罪囚欲就宫者聽之後為宦者丞上官桀謀反時廣漢部索其殿中廬有索長數尺可以縛人者數千枚滿一篋緘封廣漢索不得他吏往得之廣漢坐論為鬼薪輸掖庭後為暴室嗇夫時宣帝養於掖庭號皇曽孫與廣漢同寺居時掖庭令張賀本衛太子家吏及太子敗賀坐下刑以舊恩養視皇曽孫甚厚及曽孫壮大賀欲以女妻之是時昭帝始冠長八尺二寸賀弟安世為右將軍與霍將軍同心輔政聞賀稱譽皇曽孫欲妻以女安世怒曰曽孫乃衛太子後也幸得以庶人衣食縣官足矣勿復言子女事賀廼止時許廣漢有女平君年十四五當為内者令歐侯氏子婦臨當入歐侯氏子死其母将行卜相言當大貴母獨喜賀聞許嗇夫有女廼置酒請之酒酣為言曽孫體近下人乃闗内侯可妻也廣漢許諾明日嫗聞之怒廣漢重令為介遂與曽孫一歳生元帝數月曽孫立為帝平君為倢伃是時霍将軍有小女與皇太后有親公卿議更立皇后皆心儀霍将軍女亦未有言上乃詔求㣲時故劒大臣知指白立許倢伃為皇后既立霍光以后父廣漢刑人不宜君國歳餘乃封為昌成君霍光夫人顯欲貴其小女道無從明年許皇后當娠病女醫淳于衍者霍氏所愛甞入宫侍皇后疾衍夫賞為掖庭户衛謂衍可過辭霍夫人行為我求安池監衍如言報顯顯因生心辟左右字謂衍稱衍字曰少夫少夫幸報我以事我亦欲報少夫可乎衍曰夫人所言何等不可者顯曰大將軍素愛小女成君欲竒貴之願以累少夫衍曰何謂邪顯曰婦人免乳大故十死一生今皇后當免身可因投毒藥去也成君即得為皇后矣如䝉力事成富貴與少夫共之衍曰藥雜治當先嘗安可顯曰在少夫為之耳將軍領天下誰敢言者緩急相䕶但恐少夫無意耳衍良久曰願盡力即擣附子齎入長定宫皇后免身後衍取附子并合大醫大丸以飲皇后有頃曰我頭岑岑也藥得無有毒對曰無有遂加煩懣崩衍出過見顯相勞問亦未敢重謝衍後有人上書告諸醫侍疾無狀者皆収繫詔獄劾不道顯恐事急即以状具語光因曰既失計為之無令吏急衍光驚愕黙然不應其後奏上署衍勿論許后立三年而崩諡曰恭哀皇后葬杜南是為杜陵南園後五年立皇太子廼封太子外祖父昌成君廣漢為平恩侯位特進後四年復封廣漢兩弟舜為博望侯延壽為樂成侯許氏侯者凡三人廣漢薨諡曰戴侯無子絶葬南園旁置邑三百家長丞奉守如法宣帝以延壽為大司馬車騎將軍輔政元帝即位復封延壽中子嘉為平恩侯亦為大司馬車騎將軍奉戴侯後孝宣霍皇后大司馬大将軍博陸侯光女也母顯既使淳于衍隂殺許后顯因為成君衣被治入宫具勸光内之果立為皇后初許后起㣲賤登至尊日淺從官車服甚節儉五日一朝皇太后於長樂宫親奉案上食以婦道共養及霍后立亦修許后故事而皇太后親霍后之姊子故常竦體敬而禮之皇后輿駕侍從甚盛賞賜官屬以千萬計與許后時縣絶矣上亦寵之顓房燕立三歳而光薨後一歳上立許后男為太子昌成君者為平恩侯顯怒恚不食歐血曰此乃民間時子安得立即后有子反為王邪復教皇后令毒太子皇后數召太子賜食阿保輙先嘗之后挾毒不得行既而殺許后事頗泄顯遂與諸壻昆弟謀反發覺皆誅滅使有司賜皇后策廢處昭臺宫霍后立五年廢後十二年徙雲林舘乃自殺葬昆吾亭東初霍光及兄驃騎將軍去病皆自以功伐封侯居位宣帝以光故封去病孫山山弟雲皆為列侯侯者前後四人孝宣王皇后其先髙祖時有功賜爵闗内侯自沛徙長陵傳爵至后父奉光奉光少時好鬬雞宣帝在民間數與奉光㑹相識奉光有女年十餘歳每當適人所當適輙死故久不行及宣帝即位召入後宫稍進為倢伃是時館陶主母華偼伃及淮陽憲王母張倢伃楚孝王母衛倢伃皆愛幸霍皇后廢後上憐許太子早失母幾為霍氏所害於是乃選後宫素謹慎而無子者遂立王倢伃為皇后令母養太子自為后後希見無寵封父奉光為卭成侯立十六年宣帝崩元帝即位為皇太后封太后兄舜為安平侯後二年奉光薨諡曰共侯葬長門南置園邑二百家長丞奉守如法元帝崩成帝即位為太皇太后復爵太皇太后弟駿為闗内侯食邑千户王氏列侯二人闗内侯一人舜子章章從弟咸皆至左右將軍時成帝母亦姓王氏故世號太皇太后為卭成太后卭成太后凡立四十九年年七十餘永始元年崩合葬杜陵稱東園奉光孫勲坐法免元始中成帝太后詔封共侯曽孫堅固為卭成侯至王莽乃絶孝元王皇后王莽之姑也莽自謂黄帝之後其自本曰黄帝姓姚氏八世生虞舜舜起媯汭以媯為姓至周武王封舜後媯滿於陳是為胡公十三世生完完字敬仲奔齊齊桓公以為卿姓田氏十一世田和有齊國二世稱王至王建為秦所滅項羽起封建孫安為濟北王至漢興安失國齊人謂之王家因以為氏文景間安孫遂字伯紀處東平陵生賀字翁孺為武帝繡衣御史逐捕魏郡羣盜堅盧等黨與及吏畏懦逗遛當坐者翁孺皆縱不誅他部御史暴勝之等奏殺二千石誅千石以下及通行飲食坐連及者大部至斬萬餘人翁孺以奉使不稱免歎曰吾聞活千人有封子孫吾所活者萬餘人後世其興乎翁孺既免而與東平陵終氏為怨廼徙魏郡元城委栗里為三老魏郡人德之元城建公曰昔春秋沙鹿崩晉史卜之曰隂為陽雄土火相乗故有沙鹿崩後六百四十五年宜有聖女興其齊田乎今王翁孺徙正直其地日月當之元城郭東有五鹿之虛即沙鹿也後八十年當有貴女興天下云翁孺生禁字稚君少學法律長安為廷尉史本始三年生女政君即元后也禁有大志不修亷隅好酒色多取傍妻凡有四女八男長女君俠次即元后政君次君力次君弟長男鳯孝卿次曼元卿次譚子元崇少子商子夏立子叔根雉卿逢時季卿唯鳯崇與元后政君同母母適妻魏郡李氏女也後以妬去更嫁為河内茍賓妻初李親任政君在身夢月入其懷及壯大婉順得婦人道嘗許嫁未行所許者死後東平王聘政君為姬未入王又薨禁獨怪之使卜數者相政君當大貴不可言禁心以為然乃教書學鼓琴五鳯中獻政君年十八矣入掖庭為家人子歳餘㑹皇太子所愛幸司馬良娣病且死謂太子曰妾死非天命乃諸娣妾良人更祝詛殺我太子憐之且以為然及司馬良娣死太子悲恚發病忽忽不樂因以過怒諸娣妾莫得進見者久之宣帝聞太子恨過諸娣妾欲順適其意廼令皇后擇後宫家人子可以虞侍太子者五人政君與在其中及太子朝皇后廼見政君等五人㣲令旁長御問知太子所欲太子殊無意於五人者不得已於皇后彊應曰此中一人可是時政君坐近太子又獨衣絳縁諸于長御即以為是皇后使侍中杜輔掖庭令濁賢交送政君太子宫見丙殿得御幸有身先是者太子後宫娣妾以十數御幸久者七八年莫有子及王妃壹幸而有身甘露三年生成帝於甲館畫堂為世適皇孫宣帝愛之自名曰驁字太孫常置左右後三年宣帝崩太子即位是為孝元皇帝立太孫為皇太子以母王妃為倢伃封父禁為陽平侯後三日倢伃立為皇后禁位特進禁弟𢎞至長樂衛尉永光二年禁薨諡曰頃侯長子鳯嗣侯為衛尉侍中皇后自有子後希復進見太子壯大寛博恭慎其後幸酒樂燕樂元帝不以為能而傅昭儀有寵於上生定陶共王王多材蓺上甚愛之常有意欲廢太子而立共王時鳯在位與皇后太子同心憂懼頼侍中史丹擁右太子語在丹傳上亦以皇后素謹慎而太子先帝所常留意故得不廢元帝崩太子立是為孝成帝尊皇后為皇太后以鳯為大司馬大將軍領尚書事益封五千户王氏之興自鳯始也又封太后同母弟崇為安成侯食邑萬户鳯庻弟譚等皆賜爵闗内侯食邑其夏黄霧四塞終日天子以問諫大夫楊興博士駟勝等對皆以為隂盛侵陽之氣也髙祖之約也非功臣不侯今太后諸弟皆以無功為侯非髙祖之約外戚未曽有也故天為見異言事者多以為然鳯懼上書乞骸骨辭職上詔報勉令就位後五年諸吏散騎安成侯崇薨諡曰共侯有遺腹子奉世嗣侯太后哀之眀年河平二年上悉封舅譚為平阿侯商成都侯立紅陽侯根曲陽侯逄時髙平侯五侯同日封故世謂之五侯太后同産唯曼早卒餘畢侯矣太后母李親苟氏妻生一男名參寡居頃侯禁在時太后令禁還李親太后憐參欲以田蚡為此而封之上曰封田氏非正也以參為侍中水衡都尉王氏子弟皆卿大夫侍中諸曹分據埶官滿朝廷大將軍鳯用事上遂謙遜無所顓左右常薦光祿大夫劉向少子歆通逹有異材上召見歆誦讀詩賦甚說之欲以為中常侍召取衣冠臨當拜左右皆曰未曉大將軍上曰此小事何須關大將軍左右叩頭爭之上於是語鳯鳯以為不可廼止其見憚如此上即位數年無繼嗣體常不平定陶共王来朝太后與上承先帝意遇之甚厚賞賜十倍於他王不以往事為纎介共王之來朝也天子留不遣歸國上謂共王我未有子人命不諱一朝有他且不復相見爾長留侍我矣其後天子疾益有瘳共王於是留國邸旦夕侍上上甚見親重大將軍鳯心不便共王在亰師㑹日蝕鳯因言日蝕隂盛之象為非常異定陶王雖親於禮當奉藩在國今留侍京師詭正非常故天見戒宜遣歸國上不得已於鳯而許之共王辭去上與相對涕泣而訣京兆尹王章素剛直敢言以為鳯建遣共王之國非是乃奏封事言災異之發為大臣顓政者也今聞大將軍猥歸日蝕之咎於定陶王建遣之國茍欲使天子孤立於上顓擅朝權以便其私非忠臣也且日食隂侵陽臣顓君之咎今政事無大小皆自鳯出天子曽不壹舉手鳯不内省自責反歸咎善人推逺定陶王且鳯誣㒺不忠非一事也前丞相樂昌侯王商本以先帝外屬内行篤有威重位歴將相國家柱石臣也其人守正不肯詘節隨鳯委曲卒用閨門之事為鳯所罷身以憂死衆庶愍之又鳯知其小婦弟張美人已嘗適人於禮不冝配至尊託以為宜子内之後宫茍以私其妻弟聞張美人未嘗任身就館也且羌胡尚殺首子以盪腸正世況於天子而近已出之女也此三者皆大事陛下所自見足以知其餘及他所不見者鳯不可久典事宜退使就第選忠賢以代之自鳯之白罷商後遣定陶王也上不能平及聞章言天子感悟納之謂章曰㣲京兆直言吾不聞社禝計且惟賢知賢君試為朕求可以自輔者於是章奏封事薦中山孝王舅琅邪太守馮野王忠信質直知謀有餘宜筦朝政上自為太子時數聞野王先帝名卿聲譽出鳯逺甚方欲倚以代鳯初章每召見上輙辟左右時鳯從弟長樂衛尉𢎞子侍中音獨側聽具知章言以語鳯鳯因稱病出就第上疏乞骸骨辭旨甚哀太后為之垂涕不御食上少而親鳯弗忍廢廼報鳯令起視事上使尚書劾奏章知野王前以王舅出補吏而私薦之欲令在朝阿附諸侯又知張美人體御至尊而妄稱引羌胡殺子盪腸非所宜言遂下章吏廷尉致其大逆罪以為比上夷狄欲絶繼嗣之端背畔天子私為定陶王章死獄中妻子徙合浦自是公卿見鳯側目而視郡國守相刺史皆出其門又以侍中太僕音為御史大夫列於三公而五侯羣弟爭為奢侈賂遺珍寳四面而至後庭姬妾各數十人僮奴以千百數羅鐘磬舞鄭女作倡優狗馬馳逐大治第室起土山漸臺洞門髙廊閣道連屬彌望百姓歌之曰五侯初起曲陽最怒壞決髙都連竟外杜土山漸臺西象白虎其奢僭如此然皆通敏人事好士養賢傾財施予以相髙尚鳯輔政凡十一年陽朔三年秋鳯病天子數自臨問親執其手涕泣曰將軍病如有不可言平阿侯譚次将軍矣鳯頓首泣曰譚等雖與臣至親行皆奢僭無以率導百姓不如御史大夫音謹勅臣敢以死保之及鳯且死上疏謝上復固薦音自代言譚等五人必不可用天子然之初譚倨不肯事鳯而音敬奉卑恭如子故薦之鳯薨天子臨弔贈寵送以輕車介士軍陳自長安至渭陵諡曰敬成侯子襄嗣侯為衛尉御史大夫音竟代鳯為大司馬車騎將軍而平阿侯譚位特進領城門兵谷永説譚令讓不受城門職由是與音不平語在永傳音既以從舅越親用事小心親職歲餘詔封音為安陽侯食邑與五侯等俱三千户初成都侯商嘗病欲避暑從上借明光宫後又穿長安城引内灃水注第中大陂以行船立羽蓋張周帷輯濯越歌上幸商第見穿城引水意恨内御之未言後㣲行出過曲陽侯第又見園中土山漸臺似類白虎殿於是上怒以讓車騎將軍音商根兄弟欲自黥劓謝太后上聞之大怒廼使尚書責問司隸校尉京兆尹知成都侯商擅穿帝城决引灃水曲陽侯根驕奢僭上赤墀青瑣紅陽侯立父子臧匿犴猾亡命賔客為羣盜司隸京兆皆阿縱不舉奏正法二人頓首省户下又賜車騎將軍音策書曰外家何甘樂禍敗而欲自黥劓相戮辱於太后前傷慈母之心以危亂國外家宗族彊上一身寖弱日久今將一施之君其召諸侯令待府舎是日詔尚書奏文帝時誅將軍薄昭故事車騎将軍音藉藁請罪商立根皆負斧質謝上不忍誅然後得已久之平阿侯譚薨謚曰安侯子仁嗣侯太后憐弟曼早死獨不得封寡婦渠供養東宫曼子莽㓜孤不及等比常以為語平阿侯譚成都侯商及在位多稱莽者久之上復下詔追封曼為新都哀侯而子莽嗣爵為新都侯後又封太后姊子淳于長為定陵侯王氏親屬侯者十人上悔廢平阿侯譚不輔政而薨也廼復進成都侯商以特進領城門兵置幕府得舉吏如將軍王氏爵位日盛惟音為修整數諫正有忠節輔政八年薨弔贈如大將軍諡曰敬侯子舜嗣侯為太僕侍中特進成都侯商代音為大司馬衛將軍而紅陽侯立位特進領城門兵啇輔政四歳病乞骸骨天子閔之更以為大將軍益封二千户商薨弔贈如大將軍故事諡曰景成侯子況嗣侯紅陽侯立次當輔政有罪過上乃廢立而用光禄勲曲陽侯根為大司馬驃騎將軍歳餘益封千七百户髙平侯逄時無材能名稱是歲薨諡曰戴侯子買之嗣侯綏和元年上即位二十餘年無繼嗣而定陶共王已薨子嗣立為王王祖母傅太后重賂遺根為王求漢嗣根為言上亦欲立之遂徴定陶王為太子時根輔政五歳矣乞骸骨上乃益封根五千户賜安車駟馬黄金五百斤罷就第先是定陵侯淳于長以外屬能謀議為衛尉侍中在輔政之次是歲新都侯莽告長伏罪與紅陽侯立相連長下獄死立就國語在長𫝊故曲陽侯根薦莽以自代亦以為莽有忠直節上遂擢莽從侍中騎都尉光禄大夫為大司馬歳餘成帝崩哀帝即位太后詔莽就第避帝外家哀帝初優莽不聽莽上書固乞骸骨而退上乃下詔益封根二千户舜五百户莽三百五十户以莽為特進朝朔望又還紅陽侯立京師哀帝少而聞知王氏驕盛心不能喜以初立故優之後月餘司隸校尉觧光奏曲陽侯根宗重身尊三世據權五將秉政天下輻湊自效根行貪邪臧累鉅萬縱横恣意大治室第第中起土山立兩市殿上赤墀户青瑣游觀射獵使奴從者被甲持弓弩陳為歩兵止宿離宫水衡共張發民治道百姓苦之推親近吏主簿張業以為尚書蔽上壅下壞亂制度先帝棄天下根不悲哀思慕山陵未成公聘取故掖庭女樂五官殷嚴王飛君等置酒歌舞捐忘先帝厚恩及根兄子成都侯况亦聘故掖庭貴人為妻皆無人臣禮大不敬不道於是天子遣根就國免况為庶人歸故郡根及况父商所薦舉為官者皆罷後二歲傅太后帝母丁姬皆稱尊號有司奏新都侯莽前為大司馬貶抑尊號之儀虧損孝道及平阿侯仁臧匿趙昭儀親屬皆就國天下多寃王氏諫大夫楊宣上書言太皇太后春秋七十數更憂傷勅令親屬引領以避丁𫝊甚非先帝託陛下奉承東宫之意帝感其言復封商中子邑為成都侯元夀元年日蝕賢良對策多訟新都侯莽者上於是徴莽及平阿侯仁還京師侍太后曲陽侯根薨國除明年哀帝崩無子太皇太后以莽為大司馬與共徴立中山王奉哀帝後是為平帝平帝九歳常年被疾太后臨朝委政於莽莽顓威福紅陽侯立莽諸父平阿侯仁素剛直莽内憚之令大臣以罪過奏遣立仁就國莽日誑耀太后言輔政致太平羣臣奏請尊莽為安漢公後遂遣使者迫守立仁令自殺賜立諡曰荒侯子柱嗣仁諡曰刺侯子術嗣是歳元始三年也明年莽風羣臣奏立莽女為皇后又奏尊莽為宰衡莽既外壹羣臣令稱已功德又内媚事旁側長御以下賂遺以千萬數白尊太后姊妹君俠為廣恩君君力為廣惠君君弟為廣施君皆食湯沐邑日夜共譽莽莽又知太后婦人厭居深宫中莽欲虞樂以市其權乃令太后四時車駕廵狩四郊存見孤寡貞婦春幸繭館率皇后列侯夫人桑遵霸水而祓除夏遊篽宿鄠杜之間秋歴東館望昆明集黄山宫冬饗飲飛羽殿名校獵上蘭登長平館臨涇水而覽焉篽宿苑在長安城南黄山宫在槐里飛羽殿在未央宫上蘭觀名在上林中太后所至屬縣輙施恩惠賜民錢帛牛酒歳以為常太后從容言曰我始入太子家時見於丙殿至今五六十歳尚頗識之莽遂導太后幸太子宫甚說太后旁弄兒病在外舎莽自親候之其欲得太后意如此平帝崩無子莽徴宣帝𤣥孫選最少者廣戚侯子劉嬰年二歳託以卜相為最吉乃風公卿奏請立嬰為孺子令宰衡安漢公莽踐阼居攝如周公傅成王故事太后不以為可力不能禁於是莽遂為攝皇帝改元稱制焉俄而宗室安衆侯劉崇及東郡太守翟義等惡之更舉兵欲誅莽太后聞之曰人心不相逺也我雖婦人亦知莽必以是自危不可其後莽遂以符命自立為真皇帝先奉諸符瑞以白太后太后大驚初漢髙祖入咸陽至霸上秦王子嬰降於軹道奉上始皇璽及髙祖誅項籍即天子位因御服其璽世世傳受號曰漢傳國璽以孺子未立璽臧長樂宫及莽即位請璽太后不肯授莽莽使安陽侯舜諭指舜素謹勅太后雅愛信之舜既見太后知其為莽求璽怒罵之曰而屬父子宗族蒙漢家力富貴累世既無以報受人孤寄乗便利時奪取其國不復顧恩義人如此者狗猪不食其餘天下豈有而兄弟邪且若自以金匱符命為新皇帝變更正朔服制亦當自更作璽傳之萬世何以用此亡國不祥璽為而欲求之我漢家老寡婦旦暮且死欲與此璽俱葬終不可得太后因涕泣而言旁側長御以下皆垂涕舜亦悲不能自止良久乃仰謂太后臣等已無可言者莽必欲得傳國璽太后寕能終不與邪太后聞舜語切恐莽欲脅之廼出漢傳國璽投之地以授舜曰我老已死如而兄弟今族滅也舜既得傳國璽奏之莽大説迺為太后置酒未央宫漸臺大縱衆樂莽又欲改太后漢家舊號恐不見聽而莽疎屬王諫欲謟莽上書言太皇太后不冝稱尊號當隨漢廢於是莽親以其書白太后太后曰此言是也莽因曰此誖德之臣也罪當誅時冠軍張永遂獻符命銅璧有新室文母太皇太后之文迺上言太皇太后宜更命為新室文母太皇太后莽遂下詔以璧文視羣公親率王侯卿士奉上皇太后璽綬太后聽許莽於是鴆殺王諫而封張永為貢符子初莽謟太后奏尊元帝廟為髙宗太后晏駕後當以禮配食及是改號故絶之於漢不令得體元帝墮壞孝元廟更為文母太后起廟獨置孝元廟故殿以為文母篹食堂既成名曰長夀宫以太后在故未謂之廟莽以太后好出游觀迺車駕置酒長壽宫請太后既至見孝元廟廢撤塗地太后驚泣曰此漢家宗廟皆有神靈與何治而壞之且使鬼神無知又何用廟為如令有知我迺人之妃妾豈宜辱帝之堂以陳饋食哉私謂左右曰此人嫚神多矣能得久祐乎飲酒不樂而罷自莽簒位後知太后怨恨求所以媚太后者無所不為然愈不説莽更漢家黑貂著黄貂又改漢正朔伏臘日太后令其官屬黑貂至漢家正臘日獨與其左右相對飲酒食太后年八十四建國五年二月癸丑崩合葬渭陵莽詔大夫揚雄作誄曰太隂之精沙鹿之靈作合於漢配元生成著其協於元城沙鹿太隂精者謂夢月也王氏當成帝之世十侯五大司馬外戚之盛自漢以来莫及焉太后崩後十年為地皇三年漢兵起明年三輔豪桀誅莽初紅陽侯立就國南陽與諸劉結恩立少子丹為中山太守世祖初起時丹降為将軍戰死世祖閔之封丹子泓為武桓侯傳爵於後司徒掾班彪曰自三代以来春秋所記王公國君與其失世稀不以女寵漢興后妃之家吕霍上官幾危國者數矣及王莽之興由孝元后歴漢四世為天下母饗國六十餘載羣弟世權更持國柄五將十侯卒成新都位號已移於天下而元后卷卷猶握一璽不欲以授莽婦人之仁悲夫孝成許皇后大司馬車騎將軍平恩侯嘉女也元帝悼傷母恭哀皇后居位日淺而遭霍氏之禍故選嘉女以配皇太子初入太子家上令中常侍黄門親迎者侍送還白太子懽悦狀元帝喜謂左右酌酒賀我左右皆稱萬歳久之有一男失之及成帝即位立許妃為皇后復生一女又失之初后父嘉自元帝時為大司馬車騎將軍輔政已八九年矣及成帝立復以元舅陽平侯王鳯為大司馬大將軍與嘉並杜欽以為故事后父重於帝舅乃説鳯曰車騎將軍至貴將軍宜尊之敬之無失其意蓋輕細㣲眇之漸必生乖忤之患不可不愼衛將軍之日盛於蓋侯近世之事語在長老耳中唯將軍察焉久之上欲專委任鳯廼策嘉曰將軍家重身尊不冝以吏職自絫賜黄金二百斤以特進侯就朝位後歳餘薨諡曰恭侯后聰慧善史書自為妃至即位常寵於上後宫希得進見皇太后及帝諸舅憂上無繼嗣時又數有灾異劉向谷永皆陳其咎在於後宫上然其言於是省減椒房掖庭用度皇后素驕貴意不能平乃上疏言頃者大長秋受詔椒房儀法御服輿駕所發宫署及所造作遺賜外家羣臣妾皆如竟寧以前故事竟寧元帝時也妾自念入椒房以来凡車輿服御及遺賜外家未嘗有所踰越毎輙決上可覆問也自餘宫中小有發取於誼未害而家吏動相約制繩以詔書使妾不得揺手柰何妾薄命端遇竟寧前書奏上於是採劉向谷永所言以報大要誡其謙約焉而后終以為恨是時大將軍鳯用事威權尤盛其後比三年日蝕言事者頗歸咎於鳯矣而谷永等遂著之許氏許氏自知為鳯所不佑久之皇后寵亦益衰而後宫多新愛后姊平安剛侯夫人謁等為媚道祝謯後宫有身者王美人及鳯等事發覺太后大怒下吏考問謁等誅死后坐廢處昭臺宫親屬皆歸故郡山陽后弟子平恩侯旦就國后立十四年而廢在昭臺歳餘還徙長定宫後九年上憐許氏詔還平恩侯且及親屬在山陽郡者是歳廢后敗先是廢后姊孊寡居與定陵侯淳于長私通因為之小妻長紿之曰我能白東宫復立許皇后為左皇后廢后因孊私賂遺長數通書記相報謝長書有誖謾發覺天子使廷尉孔光持節賜廢后藥自殺葬延陵交道廐西孝成班偼伃帝初即位選入後宫始為少使蛾而大幸為偼伃居増成舎再就館有男數月失之成帝游於後庭嘗欲與偼伃同輦偼伃辭曰觀古圖畫聖賢之君皆有名臣在側三代末主乃有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班偼伃偼伃誦詩及窈窕德象女師之篇每進見上疏依則古禮自鴻嘉後上稍隆於内寵偼伃進侍者李平平得幸立為偼伃上曰始衞皇后亦從㣲起乃賜平姓曰衞所謂衛偼伃也其後趙飛燕姊弟亦從自㣲賤興踰越禮制寖盛於前班偼伃及許皇后皆失寵稀復進見鴻嘉三年趙飛燕譛告許皇后班偼伃挾媚道祝詛後宫詈及主上許后坐廢考問班偼伃偼伃對曰妾聞死生有命富貴在天修正尚未䝉福為邪欲以何望假使鬼神有知不受不臣之愬如其無知愬之何益故不為也上善其對而閔之賜黄金百斤趙氏姊弟驕妬偼伃恐久見危遂求共養太后於長信宫上許焉偼伃退處東宫作賦以自傷悼其辭曰承祖考之遺德兮何性命之淑靈登薄軀於宫闕兮充下陳於後庭䝉聖皇之渥惠兮當日月之盛明揚光烈之翕赫兮奉隆寵於増成既過幸於非位兮竊庶幾乎嘉時每寤寐而絫息兮申佩離以自思陳女圖以鏡監兮顧女史而問詩悲晨婦之作戒兮哀襃閻之為郵美皇英之女虞兮榮任姒之母周雖愚陋其靡及兮敢舎心而忘兹歴年歳而悼懼兮閔蕃華之不滋痛陽禄與柘館兮仍襁褓而離災豈妾人之殃咎兮將天命之不可求白日忽已移光兮遂䁆莫而昧幽猶被覆載之厚德兮不廢捐於罪郵奉共養于東宫兮託長信之末流共洒掃於帷幄兮永終死以為期願歸骨於山足兮依松栢之餘休重曰濳元宫兮幽以清應門閉兮禁闥扄華殿塵兮玉階菭中庭萋兮緑草生廣室隂兮帷幄暗房櫳虛兮風泠泠感帷裳兮發紅羅紛綷縩兮紈素聲神眇眇兮密靚處君不御兮誰為榮俯視兮丹墀思君兮履綦仰視兮雲屋䨇涕兮横流顧左右兮和顔酌羽觴兮銷憂惟人生兮一世忽一過兮若浮已獨享兮髙明處生民兮極休勉虞精兮極樂與福禄兮無期緑衣兮白華自古兮有之至成帝崩偼伃充奉園陵薨因葬園中孝成趙皇后本長安宫人本宫人以賜陽阿主家也宫人者省中侍使宫婢名曰宫人非天子掖庭中也事見漢舊儀言長安者以别甘泉等諸宫省也初生時父母不舉二日不死乃収養之及壯屬陽阿主家學歌舞號曰飛燕成帝嘗㣲行過陽阿主家作樂上見飛燕而説之召入宫大幸有女弟復召入俱為偼伃貴傾後宫許后之廢也上欲立趙偼伃為皇后嫌其所出㣲甚難之太后姊子淳于長為侍中數往來傳語得太后指上立封趙偼伃父臨為成陽侯後月餘乃立偼伃為皇后追以長前白罷昌陵功封為定陵侯皇后既立寵少衰而弟絶幸為昭儀居昭陽舎其中庭彤朱而殿上髤漆髤許求反一再漆也切皆銅㳫冒黄金塗切干結切門限也㳫冒其頭也塗以金塗銅上也㳫他合反白玉階壁帯往往為黄金釭函藍田璧明珠翠羽飾之壁帶壁之横木露出如帶壁帯之中以金為釭若車釭之形釭中著珠璧翠羽釭音工自後宫未甞有焉姊弟專寵十年餘卒皆無子末年定陶王来朝王祖母傅太后私賂遺趙皇后昭儀遂立定陶王為太子明年春成帝崩帝素彊無疾病是時楚思王衍梁王立來朝明旦當辭去上宿供帳白虎殿又欲拜左將軍孔光為丞相已刻侯印書贊昬夜平善鄉晨傅絝韤欲起因失衣不能言晝漏上十刻而崩民間歸罪趙昭儀皇太后詔大司馬莽曰皇帝暴崩羣衆讙譁怪之掖庭令輔等在後庭左右侍燕逼近雜與御史丞相廷尉治問皇帝起居發病狀趙昭儀自殺哀帝既立尊趙皇后為皇太后封太后弟侍中駙馬都尉欽為新成侯趙氏侯者二人後數月司隸解光奏言臣聞許美人及故中宫史曹官皆御幸孝成皇帝産子子隠不見臣遣從事掾業史望驗問知狀者掖庭獄丞籍武故中黄門王舜吳恭靳嚴官婢曹曉道房張棄故趙昭儀御者于客子王偏臧兼等皆曰宫即曉子女前屬中宫為學事史通詩授皇后房與宫對食元延元年中宫語房曰陛下幸宫後數月曉入殿中見宫腹大問宫宫曰御幸有身其十月中宫乳掖庭牛官令舍有婢六人中黄門田客持詔記盛緑綈方底封御史中丞印予武曰取牛官令舍婦人新産兒婢六人盡置暴室獄母問兒男女誰兒也武迎置獄宫曰善藏我兒胞丞知是何等兒也後三日客持詔記與武問兒死未手書對牘背武即書對兒見在未死有頃客出曰上與昭儀大怒柰何不殺武叩頭啼曰不殺兒自知當死殺之亦死即因客奏封事曰陛下未有繼嗣子無貴賤唯留意奏入客復持詔記予武曰今夜漏上五刻持兒與舜㑹東交掖門武因問客陛下得武書意何如曰憆也武以兒付舜舜受詔内兒殿中為擇乳母告善養兒且有賞母令漏泄舜擇棄為乳母時兒生八九日後三日客復持詔記封如前予武中有封小緑篋記曰告武以篋中物書予獄中婦人武自臨飲之武發篋中有裹藥二枚赫蹏書曰告偉能努力飲此藥不可復入女自知之偉能即宫宫讀書已曰果也欲姊弟擅天下我兒男也頟上有壮髮類孝元皇帝今兒安在危殺之矣柰何令長信聞之宫飲藥死後宫婢六人召入出語武曰昭儀言女無過寧自殺邪若外家也我曹言願自殺即自繆死武皆表奏狀棄所養兒十一日宫長李南以詔書取兒去不知所置許美人前在上林涿沐館數召入飾室中若舎一歳再三召留數月或半歳御幸元延二年懷子其十一月乳詔使嚴持乳醫及五種和藥丸三送美人所後客子偏兼聞昭儀謂成帝曰常紿我言從中宫來即從中宫來許美人兒何從生中許氏竟當復立邪懟以手自擣以頭擊壁户柱從牀上自投地啼泣不肯食曰今當安置我欲歸耳帝曰今故告之反怒為殊不可曉也帝亦不食昭儀曰陛下自知是不食為何陛下常自言不負女今美人有子竟負約謂何帝曰約以趙氏故不立許氏使天下無出趙氏上者母憂也後詔使嚴持緑囊書予許美人告嚴曰美人當有以予女受來置飾室中簾南美人以葦篋一合盛所生兒緘封及緑囊報書予嚴嚴持篋書置飾室簾南去帝與昭儀坐使客子解篋緘未已帝使客子偏兼皆出自閉户獨與昭儀坐須臾開户嘑客子偏兼使緘封篋及緑綈方底推置屏風東恭受詔持篋方底予武皆封以御史中丞印曰告武篋中有死兒埋屏處勿令人知武穿獄樓垣下為坎埋其中故長定許貴人及故成都平阿侯家婢王業任孋公孫習前免為庶人詔召入屬昭儀為私婢成帝崩未幸梓宫倉卒悲哀之時昭儀自知罪惡大知業等故許氏王氏婢恐事泄而以大婢羊子等賜予業等各且十人以慰其意屬無道我家過失元延二年五月故掖庭令吾邱遵謂武曰掖庭丞吏以下皆與昭儀合通無可與語者獨欲與武有所言我無子武有子是家輕族人得無不敢乎掖庭中御幸生子者輙死又飲藥傷墯者無數欲與武共言之大臣驃騎將軍貪耆錢不足計事柰何令長信得聞之遵後病困謂武今我已死前所語事武不能獨為也愼語臣謹案趙昭儀傾亂聖朝親滅繼嗣當伏族誅今同産親屬尚在尊貴之位逼近帷幄非所以懲惡崇誼示四方也請事窮竟丞相以下議正法哀帝於是免新成侯趙欽及欽兄子成陽侯訢皆為庶人將家屬逺徙遼西郡時議郎耿育上疏言不冝暴露先帝私燕流𫝊後世逺聞百蠻近布海内甚非先帝託後之意也先是哀帝為太子亦頗得趙太后力遂不窮竟其事傅太后德趙太后趙太后亦歸心焉故成帝母及王氏皆怨之及哀帝崩王莽乃白太后詔有司曰前皇太后與弟昭儀俱侍帷幄姊弟專寵殘滅繼嗣以危宗廟悖天犯祖無為天下母之義貶皇太后為孝成皇后徙居北宫後月餘復有詔廢為庶人令就其園是日自殺凡立十六年而誅先是有童謡曰燕燕尾涏涏張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢成帝毎㣲行常與張放俱而稱富平侯家故曰張公子倉琅根宫門銅鍰也孝元傅昭儀哀帝祖母也父河内温人蚤卒母更嫁為魏郡鄭翁妻生男惲昭儀少為上官太后才人自元帝為太子得進幸元帝即位立為偼伃甚有寵為人有才畧善事人下至宫人左右飲酒酹地皆祝延之産一男一女女為平都公主男為定陶恭王王有才蓺尤愛於上元帝既重傅昭儀及馮偼伃亦幸生中山孝王上欲殊之於後宫以二人皆有子為王上尚在未得稱太后乃更號曰昭儀賜以印綬在偼伃上昭其儀尊之也至成哀時趙昭儀董昭儀皆無子猶稱焉元帝崩傅昭儀隨王歸國稱定陶太后後十年恭王薨子代為王王母曰丁姬傅太后躬自養視既壯大成帝無繼嗣時中山孝王在元延四年中山孝王及定陶王皆入朝傅太后多以珍寳賂遺趙昭儀及帝舅驃騎將軍王根隂為王求漢嗣皆見上無子欲豫自結為久長計更稱譽定陶王上亦自器之明年遂徴定陶王立為太子月餘天子立楚孝王孫景為定陶王奉恭王後詔傅太后與太子母丁姬自居定陶國邸頃之成帝母王太后以太子小而傅太后抱養之令十日一至太子家丁姬以不養太子獨不得成帝崩哀帝即位王太后詔令傅太后丁姬十日一至未央宫髙昌侯董宏希指上書言宜立丁姬為帝太后師丹劾奏宏懷邪誤朝不道上初即位謙讓從師丹言止後廼白令王太后下詔尊定陶恭王為恭皇哀帝因是曰春秋母以子貴尊傅太后為恭皇太后丁姬為恭皇后各置左右詹事食邑如長信宫中宫追尊恭皇太后父為崇祖侯恭皇后父為襃徳侯後歳餘遂下詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶其尊恭皇太后為帝太太后丁后為帝太后後又更號帝太太后為皇太太后稱永信宫帝太后稱中安宫而成帝母太皇太后本稱長信宫成帝趙后為皇太后並四太后各置少府太僕秩皆中二千石為恭皇立寢廟於京師比宣帝父悼皇考制度序昭穆於前殿傅太后父同産弟四人曰子孟中叔子元㓜君子孟子喜至大司馬封髙武侯中叔子晏亦大司馬封孔郷侯㓜君子啇封汝昌侯為太后父崇祖侯後更號崇祖曰汝昌哀侯太后同母弟鄭惲前死以惲子業為陽信侯追尊惲為陽信節侯鄭氏傅氏侯者凡六人大司馬二人九卿二千石六人侍中諸曹十餘人傅太后既尊後尤驕與成帝母語至謂之嫗與中山孝王母馮太后並事元帝追怨之䧟以祝詛令自殺元壽元年崩合葬渭陵稱孝元傅皇后云定陶丁姬哀帝母也易祖師丁將軍之元孫家在山陽瑕邱父至廬江太守始定陶恭王先為山陽王而丁氏内其女為姬王后張氏無子唯丁姬河平四年生哀帝丁姬為帝太后兩兄忠明明以帝舅封陽安侯忠早卒封其子滿為平周侯太后叔父憲望望為左將軍憲為太僕明為大司馬驃騎將軍輔政丁氏侯者凡二人大司馬一人將軍九卿二千石六人侍中諸曹亦十餘人丁傅以一二年間暴興尤盛建平二年丁太后崩哀帝詔起陵恭皇之園遣大司馬驃騎將軍明東送葬于定陶貴震山東哀帝崩王莽秉政使有司舉奏丁傅罪惡莽以太皇太后詔皆免官爵丁氏徙歸故郡莽奏貶傅太后號為定陶恭王母丁太后號曰丁姬元始五年莽復言恭王母丁姬前懷帝太后皇太太后璽綬以葬不應禮請發恭王母及丁姬冡取其璽綬消滅徙恭王母歸定陶葬恭王冡次而葬丁姬復其故太后以為既已之事不須復發莽固争之太后詔曰因故棺為致椁作冡祠以太牢謁者䕶既發傅太后冡崩壓殺數百人開丁姬椁户火出炎四五丈吏卒以水沃滅乃得入燒燔槨中器物莽復奏言共王母及丁姬棺皆名梓宫及有珠玉之服請更以木棺代去珠玉衣奏可既開傅太后棺臭聞數里公卿在位皆阿莽指入錢帛遣子弟及諸生四夷十餘萬人操持作具助將作掘平恭王母丁姬故冡二旬間皆平莽又周棘其處以為世戒時有羣燕數千衘土投丁姬穿中丁傅既敗孔郷侯晏將家屬徙合浦宗族皆歸故郡唯髙武侯喜得全自有傳孝哀傅皇后定陶太后從弟子也哀帝為定陶王時傅太后欲重親取以配王王入為漢太子傅氏女為妃哀帝即位成帝大行尚在前殿而傅太后封傅妃父晏為孔鄉侯與帝舅陽安侯丁明同日俱封時師丹諌以為天下自王者所有親戚何患不富貴而倉卒若是其不長久矣晏封後月餘傅妃立為皇后傅氏既盛晏最尊重哀帝崩王莽白太皇太后下詔曰定陶共王太后與孔鄉侯晏同心合謀背恩忘本專恣不軌與至尊同稱號終没至廼配食於左坐誖逆無道今令孝哀皇后退處桂宫後月餘復與孝成趙皇后俱廢為庶人就其園自殺孝元馮昭儀平帝祖母也元帝即位二年以選入後宫時父奉世為執金吾昭儀始為長使數月至美人後五年就館生男拜偼伃時父奉世為右將軍光禄勲奉世長男野王為左馮翊父子並居朝廷議者以為器能當其位非用女寵故也而馮偼伃内寵與傅昭儀等建昭中上幸虎圈鬭獸後宫皆坐熊佚出圈攀檻欲上殿左右貴人傅昭儀等皆驚走馮偼伃直前當熊而立左右格殺熊上問人情驚懼何故前當熊偼伃對曰猛獸得人則止妾恐熊至御座故以身當之元帝嗟歎以此倍加禮重傅昭儀等皆慙明年夏馮偼伃男立為信都王尊偼伃為昭儀元帝崩為信都太后與王俱居儲元宫河平中隨王之國後徙中山是為孝王後徴定陶王為太子封中山王舅參為宜鄉侯參馮太后少弟也是歳孝王薨有一男嗣為王時未滿歳有眚病太后自養視數禱祠觧哀帝即位遣中郎謁者張由將醫治中山小王由素有狂易病病發怒去西歸長安尚書簿責擅去狀由恐因誣言中山太后祝詛上及太后太后即傅昭儀也素常怨馮太后因是遣御史丁元案驗盡収御者官吏凡馮氏昆弟在國者百餘人分繫洛陽魏郡鉅鹿數十日無所得更使中謁者令史立與丞相長史大鴻臚丞雜治立受傅太后指幾得封侯治馮太后女弟習及寡弟婦君之死者數十人巫劉吾服祝詛醫徐遂成言習君之曰武帝時醫修氏刺治武帝得二千萬耳今愈上不得封侯不如殺上令中山王代可得封立等劾奏祝詛謀反大逆責問馮太后無服辭立曰熊之上殿何其勇今何怯也太后還謂左右曰此乃中語前世事吏何用知之是欲䧟殺我也乃飲藥自殺先未死有司請誅之上不忍致法廢為庶人徙雲陽宫既死有司復奏太后死在未廢前有詔以諸侯王太后儀葬之宜郷侯參君之習夫及子當相坐者或自殺或伏法參女弁為孝王后有兩女有司奏免為庶人與馮氏宗族徙歸故郡張由以先告賜爵關内侯史立遷中太僕哀帝崩大司徒孔光奏由前誣告骨肉立䧟人入大辟為國家結怨於天下以取秩遷獲爵邑幸蒙赦令請免為庶人徙合浦云中山衛姬平帝母也父子豪中山盧奴人官至衛尉子豪女弟為宣帝偼伃生楚孝王長女又為元帝偼伃生平陽公主成帝時中山孝王無子上以衛氏吉祥以子豪少女配孝王元延四年生平帝平帝年二歳孝王薨代為王哀帝崩無嗣太皇太后與王莽迎中山王立為帝莽欲顓國權懲丁傅行事以帝為成帝後母衛姬及外家不當得至京師乃更立宗室桃郷侯子成都為中山王奉孝王後遣少傅左将軍甄豐賜衛姬璽綬即拜為中山孝王后以苦陘縣為湯沭邑又賜帝舅衛寳寶弟元爵關内侯賜帝三妹皆為封君食邑各二千户莽長子宇非莽隔絶衛氏恐久後受禍即私與衛寶通書記教衛后上書謝恩因陳丁傅舊惡幾得至京師莽白太皇太后下詔襃稱之復以中山故安户七千益中山后湯沐邑加賜及中山王黄金各百斤増傅相以下秩衛后日夜啼泣思見帝而但益户邑宇復教令上書求至京師㑹事發覺莽殺宇盡誅衛氏支屬衛寳女為中山王后免后徙合浦唯衛太后在王莽簒國廢為家人後歳餘卒葬孝王旁孝平王皇后安漢公太傅大司馬莽女也平帝即位年九歳成帝母太皇太后稱制而莽秉政莽欲依霍光故事以女配帝太后意不欲也莽設變詐令女必入因以自重太后不得已而許之詔遣納采用太牢祠宗廟明年春遣三公以下奉乘輿法駕迎皇后於安漢公第宫入未央宫前殿羣臣就位行禮大赦天下益封父安漢公地滿百里諸迎皇后及行禮者皆増秩賜金帛有差皇后立三月以禮見髙廟尊父安漢公號曰宰衡位在諸侯王上賜公夫人號曰功顯君食邑封公子安為襃新侯臨為賞都侯后立嵗餘平帝崩莽立孝宣元孫嬰為孺子莽攝帝位尊皇后為皇太后三年莽即真以嬰為定安公改皇太后號為定安公太后時年十八為人婉瘱有節操自劉氏廢常稱疾不朝㑹莽敬憚傷哀欲嫁之乃更號為黄皇室主令立國將軍成新公孫建世子襐飾將醫往問疾后大怒笞鞭其旁侍御因發病不肯起莽遂不復彊也及漢兵誅莽燒燔未央宫后曰何面目以見漢家自投火中而死後漢范􅁮曰夏殷以上后妃之制其文畧矣周禮王者立后三夫人九嬪二十七世婦八十一女御以備内職焉后正位宫闈同體天王夫人坐論婦禮九嬪掌教四德世婦主喪祭賔客女御序于王之燕寢頒官分務各有典司女史彤管記功書過居有保阿之訓動有環佩之響進賢才以輔佐君子衷窈窕而不淫其色所以能述宣隂化修成内則閨房肅雍險謁不行㐌故康王晩朝闗雎作諷宣后晏起姜氏請愆及周室東遷禮序凋缺諸侯僣縱軌制無章齊桓有如夫人者六人晋獻升戎女為元妃終於五子作亂冡嗣遘屯爰逮戰國風憲逾薄適情任欲顛倒衣裳以至破國亡家不可勝數斯固輕禮弛防先色後徳者也秦并天下多自驕大宫備七國爵列八品漢興因循其號而婦制莫釐髙祖帷薄不修孝文衽席無辯然而選納尚簡飾翫少華自武元之後世増淫費至乃掖庭三千増級十四妖幸毁政之符外姻亂邦之迹前史載之詳矣及光武中興斵彫為朴六宫稱號唯皇后貴人貴人金印紫綬奉不過粟數十斛又置美人宫人采女三等並無爵秩歳時賞賜充給而已漢法常因八月算人遣中大夫與掖庭丞及相工於洛陽鄉中閲視良家童女年十三以上二十以下姿色端麗合法相者載還後宫擇視可否乃用登御所以明愼聘納詳求淑哲明帝聿遵先㫖宫教頗修登建嬪后必先令德内無出閫之言權無私溺之授可謂矯其敝矣向使因設外戚之禁編著甲令改正后妃之制貽厥方来豈不休哉雖御巳有度而防閑未篤故孝章以下漸用色授恩隆好合遂忘淄蠧自古雖主㓜時艱王家多釁必委成冢宰簡求忠賢未有專任婦人斷割重器唯秦芈太后始攝政事故穰侯權重於昭王家富於嬴國漢仍其謬知患莫改東京皇統屡絶權歸女主外立者四帝安質桓靈臨朝者六后章帝竇太后和熹鄧太后安思閻太后順烈梁太后桓思竇太后靈思何太后莫不定策帷帟委事父兄貪孩童以久其政抑明賢以專其威任重道悠利深禍速身犯霧露於雲臺之上家嬰縲絏於圄犴之下湮滅連踵傾輈繼路而赴蹈不息燋爛為期終陵夷大運淪亡神寶詩書所歎畧同一揆故考列行跡以為皇后本紀雖成敗事異而同居正號者並列于編其以私恩追尊非當時所奉者則隨他事附出親屬别事各依列傳其餘無所見則係之此紀以纉西京外戚云爾光武郭皇后諱聖通真定稾人也為郡著姓父昌讓田宅財産數百萬與異母弟國人義之仕郡功曹娶真定恭王女號郭主生后及子況昌早卒郭主雖王家女好禮節儉有母儀之德更始二年春光武擊王郎至真定因納后有寵及即位以為貴人建武元年生皇子彊帝善況小心謹慎況年始十六拜黄門侍郎二年貴人立為皇后彊為皇太子封況緜蠻侯況雖以后弟貴重而謙恭下士頗有聲譽十四年遷城門校尉其後后以寵稍衰數懐怨懟十七年廢為中山王太后進后中子右翊公輔為中山王徙封況大國為陽安侯后從兄竟以騎都尉從征伐有功封為新郪侯官至東海相竟弟匡為發干侯官至太中大夫后叔父梁早終無子其壻南陽陳茂以恩澤封南䜌侯二十年中山王輔復徙封沛王后為沛太后況遷大鴻臚帝數幸其第㑹公卿諸侯親家飲燕賞賜金錢縑帛豐盛莫比京師號況家為金穴二十六年后母郭主薨帝臨喪送葬遣使迎昌喪柩與主合葬追贈昌陽安侯諡曰思二十八年后薨葬北芒帝憐郭氏詔況子璜尚淯陽公主除璜為郎顯宗即位況與帝舅隂識隂就並為特進俱被恩寵永平二年況卒帝親自臨喪諡曰節侯子璜嗣元和三年肅宗北巡過真定㑹諸郭以太牢上郭主冢賞賜甚多永元初璜為長樂少府子舉為侍中兼射聲校尉及大將軍憲被誅舉以憲子壻謀逆故父子俱下獄死家屬徙合浦宗族為即吏者悉免官新郪侯竟初為騎將從征伐有功拜東海相永平中卒子嵩嗣嵩卒追坐染楚王英事國廢建初二年章帝紹封嵩子勤為伊亭侯勤無子國除發干侯匡官至太中大夫建武三十年卒子勲嗣勲卒子駿嗣永平十三年亦坐楚王英事失國建初三年復封駿為觀都侯卒無子國除郭氏侯者凡三人皆絶國光烈隂皇后諱麗華南陽新野人初光武適新野聞后羙心悦之後至長安見執金吾車騎甚盛歎曰仕宦當作執金吾娶妻當得隂麗華更始元年六月遂納后於宛當成里時年十九及光武為司隸校尉方西之洛陽令后歸新野及鄧奉起兵后兄識為之將后隨家屬徙淯陽止於奉舍光武即位令侍中傅俊迎后與胡陽寕平主諸宫人俱到洛陽以后為貴人帝以后雅性寛仁欲崇以尊位后固辭以郭氏有子終不肯當故遂立郭氏為后建武四年從征彭寵生顯宗於元氏九年有盗刼殺后母鄧氏及弟訢帝甚傷之詔追爵諡貴人父陸為宣恩哀侯弟訢為宣義恭侯以弟就嗣哀侯後十七年廢皇后郭氏而立貴人為皇后后在位恭儉少嗜玩不喜笑謔性仁孝多矜慈七嵗失父雖已數十年言及未曽不流涕帝見嘗歎息顯宗即位尊后為皇太后永平三年帝從太后幸章陵置酒舊宅㑹隂鄧故人諸家子孫並受賞賜七年崩在位二十四年年六十合葬原陵明帝性孝追慕無已十七年正月當謁原陵夜夢先帝太后如平生懽既寤悲不能寐即按歴明旦日吉遂率百官及故客上陵其日甘露降於陵樹帝令百官採取以薦㑹畢帝從席前伏御牀視太后鏡奩中物感動悲涕令易脂澤裝具左右皆泣莫能仰視焉明徳馬皇后諱某伏波將軍援之小女也少喪父母兄客卿敏惠早夭母藺夫人悲傷發疾恍惚后時年十嵗幹治家事勑制僮僕内外諮禀事同成人諸家異之后常久疾太夫人令筮之筮者曰此女雖有患狀而當大貴兆不可言也後又呼相者使占諸女相者見后大驚曰我必為此女稱臣然貴而少子若養他子者得力乃當踰於所生初援征五溪蠻卒於師虎賁中郎將梁松黄門侍郎竇固等因譛之由是家益失勢又數為權貴所侵侮后從兄嚴不勝憂憤白太夫人絶竇氏㛰求進女掖庭乃上書曰臣叔父援孤恩不報而妻子特獲恩全人情既得不死便欲求福竊聞太子諸王妃匹未備援有三女大者十五次者十四小者十三儀狀膚髮上中以下皆孝順小心婉静有禮願下相工簡其可否如有萬一援不朽於黄泉矣又援姑姊妹並為成帝偼伃冀因縁先姑當充後宫由是選入太子宮時年十三奉承隂后傍接同列禮則修備上下安之遂見寵異常居後堂顯宗即位以后為貴人時后前母姊女賈氏亦以選入生肅宗帝以后無子命令養之謂曰人未必當自生子但患愛養不至耳后於是撫育盡悴過於所生肅宗亦孝性淳篤恩性天至母子慈愛始終無纎介之間永平三年春有司奏立長秋宫帝未有所言皇太后曰馬貴人徳冠後宫即其人也遂立為皇后先是數日夢有小飛蟲無數赴着身又入皮膚中而後飛出既正位宮闈愈自謙肅后身長七尺二寸方口美髮能誦易好讀春秋楚辭尤善周官董仲舒書仲舒書玉杯蕃露清明竹林之屬常衣大練裙不加縁朔望諸姬主朝請望見后袍衣疎麤反以為綺縠就視乃笑后辭曰此繒特宜染色故用之耳六宫莫不歎息帝嘗幸苑囿離宫后趣以風邪霧露為戒辭意款備多見詳擇帝幸濯龍中並召諸才人濯龍園名下邳王以下皆在側請呼皇后帝笑曰是家志不好樂雖來無歡是以游娛之事希常從焉十五年帝案地圖將封皇子悉半諸國后見而言曰諸子食數縣於制不已儉乎帝曰我子豈宜與先帝子等乎歳給二千萬足矣時楚獄連年不斷囚相證引坐繋者甚衆后慮其多濫乘閒言及惻然帝感悟之夜起仿偟為思所納卒多降宥時諸將奏事及公卿較議難平者帝數以試后后輙分觧理趣各得其情每於侍執之際輙言及政事多所毗補而未嘗以家私干欲寵敬日隆始終無衰及帝崩肅宗即位尊為皇太后諸貴人當徙居南宫太后感析别之懐各加厚賜自撰顯宗起居注削去兄防參醫藥事帝請之曰黄門舅旦夕共養且一年既無襃異又不録勤勞無乃過乎太后曰吾不欲令後世聞先帝數親後宫之家故不著也建初元年欲封爵諸舅太后不聽明年夏大旱言事者以為不封外戚之故有司因此上奏宜因舊典太后詔曰凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封其時黄霧四塞不聞澍雨之應又田蚡竇嬰寵貴横恣終至傾覆故先帝防慎舅氏不令在樞機之任諸子之封裁令半楚淮陽諸國常謂我子不當與先帝子等今有司柰何欲以馬氏比隂氏乎吾為天下母而身服大練食不求甘左右但著帛布無香熏之飾者欲身率下也以為外親見之當傷心自勑但笑言大后素好儉前過濯龍門上見外家問起居車如流水馬如游龍倉頭衣緑褠領袖正白顧侍御者不及逺矣故不加譴怒但絶歳用而已冀以黙愧其心而猶懈怠無憂國忘家之慮吾豈可上負先帝之㫖下虧先人之德重襲西京敗亡之禍哉固不許帝省詔悲歎復重請曰漢興舅氏之封侯猶皇子之為王也太后誠存謙虛奈何令臣獨不加恩於三舅乎且衛尉年尊兩校尉有大病如令不諱使臣長抱刻骨之恨冝及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙謙之名而使帝受不外施之嫌哉昔竇太后欲封王皇后之兄丞相條侯言受髙帝約無軍功非劉氏不侯今馬氏無功於國豈得與隂郭中興之后等邪常觀富貴之家禄位重疊猶再實之木其根必傷且人所以願封侯者欲上奉祭祀下求温飽耳今祭祀則受四方之珍衣食則蒙御府餘資斯豈不足而必當得一縣乎吾計之熟矣勿有疑也夫至孝之行安親為上今數遭變異糓價數倍憂惶晝夜不安坐卧而欲先營外封違慈母之拳拳乎吾素剛急有胷中氣不可不順也若隂陽調和邊境清靜然後行子之志吾但含飴弄孫不能復闗政矣時新平主家御者失火延及北閣後殿太后以為已過起居不歡時當謁原陵太后自引守備不慎慙見陵園遂不行太后常見外戚有謙素義行者輙假借温言賞以財位其有車服不軌法度者便絶屬籍於是内外從化被服如一諸家惶恐倍於永平時乃置織室蠶於濯龍中數往觀視以為娛樂常與帝旦夕言道政事及教授諸小王論語經書述叙平生雍和終日四年天下豐稔方垂無事帝遂封三舅廖防光為列侯並辭讓願就闗内侯太后聞之曰聖人設教各有其方知人情性莫能齊也吾少壯時但慕竹帛志不顧命今雖已老而復戒之在得故日夜惕厲思自降損居不求安食不念飽冀乗此道不負先帝所以化導兄弟共同斯志欲令瞑目之後無所復恨何意老志復不從哉萬年之日長恨矣廖等不得已受封爵而退位歸第焉太后其年寢疾不信巫祝卜醫數勑絶禱祠至六月崩在位二十三年年四十餘合葬顯節陵賈貴人南陽人建武末選入太子宫中元二年生肅宗而顯宗以為貴人帝既為太后所養專以馬氏為外家故貴人不登極位賈氏親族無受寵榮者及太后崩乃䇿書加貴人王赤綬安車一駟永巷宫人二百御府雜帛二萬匹大司農黄金千斤錢二千萬章德竇皇后諱某扶風平陵人大司徒融之曽孫也祖穆父勲坐事死事在竇融傳勲尚東海恭王彊女泚陽公主后其長女也家既廢壞數呼相工問息耗見后者皆言當大尊貴非臣妾容貌年六歳能書親家皆奇之建初二年后與女弟俱以選例入見長樂宫進止有序風容甚盛肅宗先聞后有才色數以訊諸姬傅及見雅以為美馬太后亦異焉因入掖庭見於北宫章德殿后性敏給傾心承接稱譽日聞明年遂立為皇后妹為貴人七年追爵諡父勲為安成思侯后寵幸特殊專固後宫初宋貴人生皇太子慶梁貴人生和帝后既無子並忌疾之數間於帝漸致疎嫌因誣宋貴人挾邪媚道遂自殺廢慶為清河王語在慶傳梁貴人者梁竦之女也少失母為伯母舞隂長公主所養年十六建初二年亦與中姊俱選入掖庭為貴人四年生和帝后養以為己子欲專名外家而忌梁氏八年乃作飛書以䧟竦竦坐誅貴人姊妹以憂死自是宫房惵息后愛日隆及帝崩和帝即位尊后為皇太后皇太后臨朝尊母泚陽公主為長公主兄憲弟篤景皆貴顯擅威權後遂密謀不軌永元四年發覺被誅九年太后崩未及葬而梁貴人姊嬺上書陳貴人枉殁之狀太尉張酺司徒劉方司空張奮上奏依光武黜呂太后故事貶太后尊號不宜合葬先帝百官亦多上言者帝手詔曰竇氏雖不遵法度而太后常自減損朕奉事十年深惟大義禮臣子無貶尊上之文恩不忍離義不忍虧案前世上官太后亦無降黜其勿復議於是合葬敬陵在位十八年帝以貴人酷殁歛葬禮闕乃改殯梁貴人於承光宫諡曰恭懷皇后追服喪制百官縞素與姊大貴人俱葬西陵儀比敬園敬園安帝祖母宋貴人之園也和帝隂皇后諱某光烈皇后兄執金吾識之曽孫也后少聰慧善書蓺永元四年選入掖庭以先后近屬故得為貴人有殊寵八年遂立為皇后自和熹鄧后入宫愛寵稍衰數有恚恨后外祖母鄧朱出入宫掖十四年夏有言后與朱共挾巫蠱道事發覺帝遂使中常侍張慎與尚書陳襃於掖庭獄雜考案之朱及二子奉毅與后弟軼輔敞辭語相連及以為祠祭祝詛大逆無道奉毅輔考死獄中帝使司徒魯恭持節賜后䇿上璽綬遷于桐宫以憂死立七年葬臨平亭部父特進綱自殺軼敞及朱家屬徙日南比景縣宗親外内昆弟皆免官還田里永初四年鄧太后詔赦隂氏徙者歸故郡還其貲財五百餘萬和熹鄧皇后諱綏太傅禹之孫也父訓護羌校尉母隂氏光烈皇后從弟女也后年五嵗太傅夫人愛之自為翦髮夫人年髙目冥誤傷后額忍痛不言左右見者怪而問之后曰非不痛也難傷老人意故忍之耳六歳能史書十二通詩論語諸兄每讀經傳輙下意問難志在典籍不問居家之事母常非之曰汝不習女工以供衣服乃更務學寧當舉愽士邪后重違母言晝修婦業暮誦經典家人號為諸生父訓異之事無大小輙與詳議永元四年當以選入㑹訓卒后晝夜號泣終三年不食鹽菜憔悴毁容后嘗夢捫天蕩蕩正青若有鐘乳状乃仰漱飲之以訊諸占夢言堯夢攀天而上湯夢及天而咶之斯皆聖王之前占吉不可言又相者見后驚曰此成湯之法也家人竊喜而不敢宣后叔父陔言常聞活千人者子孫有封兄訓為謁者使修石臼河歳活數千人天道可信家必蒙福初太傅禹嘗歎曰吾將百萬之衆未嘗妄殺一人後世必有興者七年后復與諸家子俱選入宫后長七尺二寸姿顔姝麗絶異於衆左右皆驚八年冬入掖庭時年十六遂為貴人恭肅小心事隂后盡禮接撫同列常克己以下之雖宫人隷役皆加恩借帝深嘉焉后嘗有疾帝令后母兄入視醫藥不限以日數后言於帝曰宫禁至重而使外舎久在内省上令陛下有幸私之議下使賤妾獲不知足之謗上下交損誠不願也帝曰人皆以數入為榮貴人反以為憂深自抑損誠難及也每有讌㑹諸姬貴人競自修整簮珥光采袿裳鮮明而后獨著素装服無飾其衣有與隂后同色者即時觧易若並時進見則不敢正坐離立行則僂身自卑帝每有所問常逡廵後對不敢先隂后言帝知后勞心曲體歎曰修德之勞廼如是乎後隂后漸疎每常御見輙辭以疾時帝數失皇子后憂繼嗣不廣數選進才人以愽帝意隂后見后德稱日盛不知所為遂造祝詛欲以為害帝嘗寢病危甚隂后宻言我得意不令鄧氏復有遺類后聞乃對左右涕泣曰我竭誠盡心以事皇后竟不為所祐而當獲罪於天婦人雖無從死之義然周公身請武王之命越姬心誓必死之分上以報帝之恩中以觧宗族之禍下不令隂氏有人豕之譏即欲飲藥宫人趙玉者固禁之因詐言屬有使來上疾已愈后信以為然乃止明日帝果瘳十四年夏隂后以巫蠱事發后請救不能得帝便屬意焉后愈稱疾篤深自閉絶㑹有司奏建長秋宫詔立后焉后辭讓者三然後即位手書表謝是時方國貢獻競求珍麗之物自后即位悉令禁絶歳時但供紙墨而已帝毎欲官爵鄧氏后輙哀請謙讓故兄騭終帝世不過虎賁中郎元興元年帝崩長子平原王有疾而諸皇子夭殁前後十數後生者輙隠祕養於人間殤帝生始百日后乃迎立之尊后為皇太后太后臨朝和帝既葬宫人並令歸園太后贈賜甚厚是時新遭大憂法禁未設宫中亡大珠一篋太后念欲考問必有不辜乃親閲宫人觀察顔色即時首服又和帝幸人吉成為御者誣告以巫蠱事下掖庭考訊辭證明白太后疑之呼見實覈果御者所為莫不歎服以為聖明太后以滛祀無福詔罷諸祠官不合典禮者又詔赦除建武以來諸犯妖惡及馬竇家屬所被禁錮者皆復之為平人減太官導官尚方内者服御珍羞靡麗難成之物自非供陵廟稻梁米不得導擇朝夕一肉飯而已舊太官湯官歳用二萬萬自是裁數千萬郡國所貢皆減其過半悉斥賣上林鷹犬其蜀漢釦器九帶佩刀並不復調止畫工三十九種又御府尚方織室錦繡冰紈綺縠金銀珠玉犀象瑇瑁雕鏤玩弄之物皆絶不作離宫别舘儲峙米糒薪炭悉令省之又自御北宫増喜觀閲問諸園貴人聽其去留即日免遣者五六百人及殤帝崩太后定䇿禁中立安帝后猶臨朝聽政以連遭大憂百姓苦役殤帝康陵方中祕藏及諸工作事事減約十分居一詔告司隸校尉河南尹南陽太守令明加檢察外家親屬其有犯罪無得假貸永初元年爵號太夫人為新野君萬户供湯沐邑二年夏京師大旱親幸洛陽寺録寃獄有囚實不殺人被考自誣羸困輿見畏吏不敢言將去舉頭若欲自訴太后察視覺之即呼還問狀具得枉實即収洛陽令下獄扺罪行未還宫澍雨大降三年秋太后體不安左右禱請祝辭願得代命太后聞之即加譴怒舊事歳終當饗遣衛士大儺逐疫太后以隂陽不和軍旅數興詔饗㑹勿設戲作樂減逐疫侲子之半悉罷象橐駝之屬豐年復故太后自入宫掖從曹大家受經書兼天文算數晝省王政夜則誦讀而患其謬誤懼乖典章乃博選諸儒劉珍等及博士議郎四府掾史五十餘人詣東觀讎校傳記事畢奏御班賜有差又詔中官近臣於東觀受讀經傳以教授宫人左右習誦朝夕濟濟及新野君薨太后憂哀毁損贈送甚厚使司空持節䕶喪事諡曰敬君太后諒闇既終七年正月初入太廟齋七日庚戌謁宗廟率命婦群妾相禮儀與皇帝交獻親薦成禮而退因下詔自今凡供薦新味奉祠陵廟及給御者皆須時乃上凡所省二十三種自太后臨朝水旱十歳四夷外侵盜賊内起每聞人饑或逹旦不寐而躬自減徹以救災阸故天下復平歳還豐稔元初五年平望侯劉毅以太后多德政欲令早有注記上書安帝述太后之美宜令史官著長樂宫注聖德頌帝從之六年太后詔徴和帝弟濟北河間王子男女年五歳以上四十餘人又鄧氏近親子孫三十餘人並為開邸第教學經書躬自監試時太后從兄越騎校尉康以后久臨朝政内懷憂懼託病不朝太后使宫婢問之宫婢失禮於康康詬之婢還言康詐疾而語不遜太后遂免康官遣歸國絶屬籍永寜二年二月太后寢疾漸篤乃乗輦於前殿見侍中尚書因北至太子新所繕宫還大赦天下賜諸園貴人王主群僚錢布各有差詔曰朕以無德託母天下而薄祐不天早離大憂延平之際海内無主元元戹運危於累卵勤勤苦心不敢以萬乗為樂上欲不欺天愧先帝下不違人負宿心誠在濟度百姓以安劉氏自謂感徹天地當䝉福祚而喪禍内外傷痛不絶頃以廢病沉滯久不侍祠自力上原陵加咳逆唾血遂至不觧存亡大分無可柰何公卿百官其勉盡忠恪以輔朝廷三月崩在位二十年年四十一合葬順陵安思閻皇后諱姬河南滎陽人也祖父章永平中為尚書以二妹為貴人章有精力曉舊典久次當遷以重職顯宗為後宫親屬竟不用出為歩兵校尉章生暢暢生后后有才色元初元年以選入掖庭甚見寵愛為貴人二年立為皇后后專房妬忌帝幸宫人李氏生皇子保遂鴆殺李氏三年以后父侍中暢為長水校尉封北宜春侯四年暢卒諡曰文侯子顯嗣建光元年鄧太后崩帝始親政三年以顯及弟景耀晏並為卿校典禁兵延光元年更封顯長社縣侯追尊后母宗為滎陽君顯景諸子弟年皆童齔並為黄門侍郎后寵既盛而兄弟頗預朝權后遂與大長秋江京中常侍樊豐等共譛皇太子保廢為濟隂王四年春后從帝幸章陵帝道疾崩於葉縣后顯兄弟及江京樊豐等謀曰今晏駕道次濟隂王在内邂逅公卿立之還為大害乃偽云帝疾甚徙御卧車行四日驅馳還宫明日詐遣司徒劉喜詣郊廟社稷告天請命其夕乃發喪尊后曰皇太后皇太后臨朝以顯為車騎將軍儀同三司太后欲久專國政貪立幼年與顯等定策禁中迎濟北惠王子北鄉侯懿立為皇帝顯忌大將軍耿寳位尊權重威行前朝乃風有司奏寶及其黨與中常侍樊豐虎賁中郎將謝惲惲弟侍中篤篤弟大將軍長史宓侍中周廣阿母野王君王聖聖女永永婿黄門侍郎樊嚴等更相阿黨互作威福探刺禁省更為唱和皆大不道豐惲廣皆下獄死家屬徙比景宓嚴減死髠鉗貶寳為則亭侯遣就國自殺王聖母子徙鴈門於是景為衛尉耀城門校尉晏執金吾兄弟權要威福自由少帝立二百餘日而疾篤顯兄弟及江京等皆在左右京引顯屏語曰北郷侯病不解國嗣宜時有定前不用濟隂王今若立之後必當怨又何不早徴諸王子簡所置乎顯以為然及少帝薨京白太后徴濟北河間王子未至而中黄門孫程合謀殺江京等立濟隂王是為順帝顯景晏及黨與皆伏誅遷太后於離宫家屬徙比景明年太后崩在位十二年合葬恭陵帝母李氏瘞在洛陽城北帝初不知莫敢以聞及太后崩左右白之帝感悟發哀親到瘞所更以禮殯上尊諡曰恭愍皇后葬恭北陵為䇿書金匱藏于世祖廟順烈梁皇后諱妠大将軍商之女恭懐皇后弟之孫也后生有光景之祥少善女工好史書九嵗能誦論語治韓詩大義略舉常以列女圖畫置於左右以自監戒父商深異之竊謂諸弟曰我先人全濟河西所活者不可勝數雖大位不究而積德必報若慶流子孫者儻興此女乎永建三年與姑俱選入掖庭時年十三相工茅通見后驚再拜賀曰此所謂日角偃月相之極貴臣所未嘗見也太史卜兆得夀房又筮得坤之比遂以為貴人常特被引御從容辭於帝曰夫陽以博施為德隂以不專為義螽斯則百福之所由興也願陛下思雲雨之均澤識貫魚之次序使小妾得免罪謗之累由是帝加敬焉陽嘉元年春有司奏立長秋宫帝遂立貴人為皇后后既少聰慧深覽前世得失雖以德進不敢有驕專之心每日月見謫輙降服求愆建康元年帝崩后無子美人虞氏子炳立是為沖帝尊后為皇太后太后臨朝沖帝尋崩復立質帝猶秉朝政時揚徐劇賊宼擾州郡西羌鮮卑及日南蠻夷攻城暴掠賦歛煩數官民困竭太后夙夜勤勞推心仗賢委任太尉李固等㧞用忠良務崇節儉其貪叨罪慝多見誅廢分兵討伐群宼消夷故海内肅然宗廟以寜而兄大將軍冀鴆殺質帝專權暴濫忌害忠良數以邪説疑誤太后遂立桓帝而誅李固太后又溺於宦官多所封寵以此天下失望和平元年春歸政於帝太后寢疾遂篤乃御輦幸宣德殿見宫省官屬及諸梁兄弟各勉以盡忠於國後二日而崩在位十九年年四十五合葬憲陵虞美人者以良家子年十三選入掖庭又生女舞陽長公主自漢興母氏莫不尊寵順帝既未加美人爵號而沖帝早夭大將軍梁冀秉政忌惡他族故虞氏抑而不登但稱大家而已陳夫人者家本魏郡少以聲伎入孝王宫得幸生質帝亦以梁氏故榮寵不及焉熹平四年小黄門趙祐議郎卑整以為言帝乃拜虞大家為憲陵貴人陳夫人為渤海孝王妃使中常侍持節授印綬遣太常以三牲告憲陵懷陵静陵焉孝崇匽皇后諱明為蠡吾侯翼媵妾生桓帝桓帝即位明年追尊翼為孝崇皇陵曰博陵以后為博園貴人和平元年梁太后崩乃就博陵追尊后為孝崇皇后遣司徒持節奉策授璽綬齎乗輿器服備法物宫曰永樂置太僕少府以下皆如長樂宫故事又置虎賁羽林衛士起宫室分鉅鹿九縣為后湯沐邑在位三年元嘉二年崩以帝弟平原王石為喪主歛以東園畫梓夀器玉匣飯含之具禮儀制度比恭懷皇后使司徒持節大長秋奉弔祠賻錢四千萬布四萬匹中謁者僕射典䕶喪事侍御史䕶大駕鹵薄詔安平王豹河間王建渤海王悝長社益陽二長公主與諸國侯在三百里内者及中二千石二千石令長相皆㑹葬將作大匠復土繕廟合葬博陵桓帝懿獻梁皇后諱女瑩順烈皇后之女弟也帝初為蠡吾侯梁太后徴欲與后為婚未及嘉禮㑹質帝崩因以立帝明年太后詔納后故事一依舊典時建和六年六月始入掖庭八月立為皇后時太后秉政而梁冀專朝故后獨得寵幸自下莫得進見后藉姊兄廕埶恣極奢侈服御制度兼倍前世及皇太后崩恩愛稍衰后既無子潜懷怨忌毎宫人孕育鮮得全者帝雖逼畏梁冀不敢譴怒然見御轉稀至延熹三年后以憂恚崩在位十三年葬懿陵其嵗誅梁冀廢懿陵為貴人冡焉桓帝鄧皇后諱猛女和熹皇后從兄子鄧香之女也母宣初適香生后改嫁梁紀紀者大將軍梁冀妻孫夀之舅也后少孤隨母為居因姓梁氏冀妻見后貌美永興中進入掖庭為采女絶幸明年封兄鄧演為南頓侯位特進演卒子康嗣及懿獻后崩梁冀誅立后為皇后帝惡梁氏改姓為薄封后母宣為長安君四年有司奏后本郎中鄧香之女不冝改易他姓於是復為鄧氏追封贈香車騎將軍安陽侯印綬更封宣康大縣宣為昆陽君康為泚陽侯賞賜巨萬計宣卒􅈖贈葬禮皆依后母舊儀以康弟統襲封昆陽侯位侍中統從兄㑹襲安陽侯為虎賁中郎將又封統弟秉為淯陽侯宗族皆列校郎將帝多内幸博採宫女至五六千人及驅役從使復兼倍於此而后恃尊驕忌與帝所幸郭貴人更相譛訴八年詔廢后送暴室以憂死立七年葬在北邙從父河南尹萬世及㑹皆下獄死統等亦繫暴室免官爵歸本郡財物没入縣官桓思竇皇后諱妙華章徳皇后從祖弟之孫女也延熹八年鄧皇后廢后以選入掖庭為貴人其冬立為皇后而御見甚稀帝所寵唯采女田聖等永康元年冬帝寢疾遂以聖等九女皆為貴人及崩無嗣后為皇太后太后臨朝定策立觧瀆侯宏是為靈帝太后素忌忍積怒田聖等桓帝梓宫尚在前殿遂殺田聖又欲盡誅諸貴人中常侍管霸蘇康苦諫乃止時太后父大將軍武謀誅宦官而中常侍曹節等矯詔殺武遷太后於南宫雲臺家屬徙比景竇氏雖誅帝猶以太后有援立之功建寜四年十月朔率群臣朝於南宫親饋上夀黄門令董萌因此數為太后訴怨帝深納之供養資奉有加於前中常侍曹節王甫疾萌附助太后誣以謗訕永樂宫萌坐下獄死熹平元年太后母卒於比景后感疾而崩立七年合葬于宣陵孝仁董皇后諱某河間人為觧瀆侯萇夫人生靈帝建寜元年帝即位追尊萇為孝仁皇陵曰慎陵以后為慎園貴人及竇氏誅明年帝使中常侍迎貴人并徴貴人兄寵到京師上尊號曰孝仁皇后居南宫嘉德殿宫稱永樂拜寵執金吾後坐矯稱永樂后屬請下獄死及竇太后崩始與朝政使帝賣官求貨自納金錢盈滿堂室中平五年以后兄子衛尉脩侯重為驃騎將軍領兵千餘人初后自養皇子協數勸帝立為太子而何皇后恨議未及定而帝崩何太后臨朝重與太后兄大將軍進權埶相害后每欲參干政事太后輙相禁塞后忿恚詈言曰汝今輈張怙汝兄邪當勑驃騎斷何進頭來何太后聞以告進進與三公及弟車騎將軍苖等奏孝仁皇后使故中常侍夏惲永樂太僕封諝等交通州郡辜較在所珍寶貨賂悉入西省蕃后故事不得留京師輿服有章膳羞有品請永樂后遷宫本國奏可何進遂舉兵圍驃騎府収重免官自殺后憂怖疾病暴崩在位二十二年民間歸咎何氏喪還河間合葬慎陵靈帝宋皇后諱某扶風平陵人也肅宗宋貴人之從曽孫也建寧三年選入掖庭為貴人明年立為皇后父酆執金吾封不其鄉侯后無寵而居正位後宫幸姬衆共讒毁初中常侍王甫枉誅渤海王悝及妃宋氏妃即后之姑也甫恐后怨之乃與太中大夫程阿共構言皇后挾左道祝詛帝信之光和元年遂策收璽綬后自致暴室以憂死在位八年父及兄弟並被誅諸常侍小黄門在省闥者皆憐宋氏無辜共合錢物収葬廢后及酆父子歸宋氏舊塋臯門亭帝後夢見桓帝怒曰宋皇后有何罪而聽用邪孽使絶其命渤海王悝既已自貶又受誅斃今宋氏及悝自訴於天上帝震怒罪在難赦夢殊明察帝既覺而恐以事問於羽林左監許永曰此何祥其可禳乎對曰宋皇后親與陛下共承宗廟母臨萬國歴年已久海内䝉化過惡無聞而虛被讒誣身嬰極誅禍及家族天下臣妾咸為痛怨渤海王悝桓帝母弟也處國奉藩未甞有過陛下曾不證審遂伏其辜昔晋侯失刑亦夢大厲被髮屬地天道明察鬼神難誣宜並改葬以安寃魂反宋后之徙家復渤海之先封以消厥咎帝不能用尋亦崩焉靈思何皇后諱某南陽宛人家夲屠者以選入掖庭長七尺一寸生皇子辯養於史道人家號曰史侯拜后為貴人甚有寵幸性彊忌後宫莫不震懾光和三年立為皇后明年追號后父真為車騎將軍舞陽宣德侯因封后母興為舞陽君時王美人任娠畏后乃服藥欲除之而胎安不動又數夢負日而行四年生皇子協后遂鴆殺美人帝大怒欲廢后諸宦官固請得止董太后自養協號曰董侯王美人趙國人也祖父苞五官中郎將美人豐姿色聰敏有才明能書會計以良家子應法相選入掖庭帝愍協早失母又思羙人作追徳賦令儀頌中平六年帝崩皇子辯即位尊后為皇太后太后臨朝后兄大將軍進欲誅宦官反為所害舞陽君亦為亂兵所殺并州牧董卓被徴將兵入洛陽陵虐朝廷遂廢少帝為𢎞農王而立協是為獻帝扶𢎞農王下殿北面稱臣太后鯁涕群臣含悲莫敢言卓又議太后踧逼永樂宫至令憂死逆婦姑之禮乃遷於永安宫因進鴆崩在位十年董卓令帝出奉常亭舉哀公卿皆白衣㑹不成喪也合葬文昭陵初太后新立當謁二祖廟欲齋輙有變故如此者數竟不克時有識之士心獨怪之後遂因何氏傾没漢祚焉明年山東義兵大起討董卓卓乃置𢎞農王於閣上使郎中令李儒進鴆曰服此藥可以辟惡王曰我無疾是殺我耳不肯飲彊飲之不得已乃與妻唐姬及宫人飲宴為别酒行王悲歌曰天道易兮我何艱棄萬乗兮退守蕃逆臣見逼兮命不延逝將去汝兮適幽元因令唐姬起舞姬抗䄂而歌曰皇天崩兮后土頽身為帝兮命夭摧死生路異兮從此乖柰我焭獨兮心中哀因泣下嗚咽坐者皆歔欷王謂姬曰卿王者妃埶不復為吏民妻自愛從此長辭遂飲藥而死時年十八唐姬潁川人也王薨歸鄉里父會稽太守瑁欲嫁之誓不許及李傕音覺破長安遣兵鈔闗東略得姬傕因欲妻之固不聽而終不自名尚書賈詡知之以狀白獻帝帝聞感愴乃下詔迎姬置園中使侍中持節拜為𢎞農王妃初平元年二月葬𢎞農王於故中常侍趙忠成壙中諡曰懷王帝求母王美人兄斌斌將妻子詣長安賜第宅田業拜奉車都尉興平元年追尊王美人為靈懷皇后改葬文昭陵儀比敬恭二陵使光禄大夫持節行司空事奉璽綬斌與河南尹駱業復土斌還遷執金吾封都亭侯食邑五百户病卒贈前將軍印綬長子端襲爵獻帝伏皇后諱壽琅邪東武人大司徒湛之八世孫也父完沈深有大度襲爵不其侯尚桓帝女陽安公主為侍中初平元年從駕入長安后時選入掖庭為貴人興平二年立為皇后完遷執金吾帝尋而東歸李傕郭汜等追敗乗輿於曹陽帝潜夜度河走六宫皆歩行出營后手持縑數匹董承使符節令孫徽以刃脅奪之殺旁侍者血濺后衣既至安邑御服穿弊唯以棗栗為糧建安元年拜完輔國將軍儀比三司完以政在曹操自嫌尊戚乃上印綬拜中散大夫尋遷屯騎校尉十四年卒子典嗣自帝都許守位而已宿衛兵侍莫非曹氏黨舊姻戚議郎趙彦嘗為帝陳言時策曹操惡而殺之其餘内外多見誅戮操後以事入見殿中帝不任其憤因曰君若能相輔則厚不爾幸垂恩相捨操失色俛仰求出舊儀三公領兵朝見令虎賁執刃挾之操出顧左右汗流浹背自後不敢復朝時將軍董承女為貴人操誅承而求貴人殺之帝以貴人有娠累為請不能得后自是懷懼遂與父完書言曹操殘逼之狀令密圖之完不敢發至十九年事乃露洩操追仇大怒遂逼帝廢后假為策文令御史大夫郗慮持節策廢后又以尚書令華歆為郗慮副勒兵入宫収后后聞之閉户藏夾壁中歆就牽后出時帝在外殿引慮於坐后被髮徒跣行泣過謂帝曰不能復相活邪帝曰我亦不知命在何時顧謂慮曰郗公天下寧有是邪遂將后下暴室以幽崩所生二皇子皆鴆殺之后在位二十年兄弟及宗族死者百餘人母盈等十九人徙涿郡獻穆曹皇后諱節魏公曹操之中女也建安十八年操進三女憲節華為夫人聘以束帛元纁五萬匹小者待年於國十九年並拜為貴人及伏皇后被弑明年立節為皇后魏受禪遣使求璽綬后怒不與如此數輩后乃呼使者入親數讓之以璽抵軒下因涕泣横流曰天不祚爾左右皆莫能仰視后在位七年延康元年魏文帝代漢以后為山陽公夫人自後四十一年為魏景初元年是嵗后薨合葬於獻帝禪陵車服禮儀皆依漢制范􅁮論曰西漢世皇后無諡皆因帝諡以為稱雖吕氏專政上官臨制亦無殊號中興明帝始建光烈之稱其後並以徳為配至於賢愚優劣混同一貫故馬竇二后俱稱德焉其餘皇帝之庻母及蕃王承統以追尊之重特為其號如懷孝崇之比是也初平中蔡邕始追正和熹之諡其安思順烈以下皆依而加焉漢制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同蕃王諸王女皆封鄉亭公主儀服同鄉亭侯肅宗惟特封東平憲王蒼琅邪孝王京女為縣公主其後安帝桓帝妹亦封長公主同之皇女其皇女封公主者所生之子襲母封為列侯皆𫝊國於後鄉亭之封則不𫝊襲其職僚品秩各有等差以不足别載故附于后紀末世祖五女皇女義王建武十五年封武陽長公主適延陵郷侯太僕梁松松坐誹謗誅皇女中禮十五年封湼陽公主適顯親侯大鴻臚竇固肅宗尊為長公主皇女紅夫十五年封館陶公主適駙馬都尉韓光光坐與淮陽王延謀反誅皇女禮劉十七年封淯陽公主適陽安侯長樂少府郭璜璜坐與竇憲謀反伏誅皇女綬二十一年封酈邑公主適新陽侯世子隂豐豐害主誅死顯宗十一女皇女姬永平二年封獲嘉長公主適陽邑侯將作大匠馮柱皇女奴三年封平陽公主適大鴻臚馮順皇女迎三年封隆慮公主適牟平侯耿襲皇女次二年封平氏公主皇女致三年封沁水公主適髙密侯鄧乾皇女小姬十二年封平臯公主適昌安侯侍中鄧蕃皇女仲十七年封浚儀公主適軮侯黄門侍郎王度皇女惠十七年封武安公主適征羗侯世子黄門侍郎來棱安帝尊為長公主皇女臣建初元年封魯陽公主皇女小迎元年封樂平公主皇女小民元年封成安公主肅宗三女皇女男建初四年封武德長公主皇女王四年封平邑公主適黄門侍郎馮由皇女吉永元五年封隂安公主和帝四女皇女保延平元年封脩武長公主皇女成元年封共邑公主皇女利元年封臨潁公主適即墨侯侍中賈建皇女興元年封聞喜公主順帝三女皇女生永和三年封舞陽長公主皇女成男三年封冠軍長公主皇女廣永和六年封汝陽長公主桓帝三女皇女華延熹元年封陽安長公主適不其侯輔國將軍伏完皇女堅七年封潁隂長公主皇女脩九年封陽翟長公主靈帝一女皇女某光和三年封萬年公主右皇女三十人雖無可書之事史家存之亦足以見一代之制云魏陳壽曰易稱男正位乎外女正位乎内男女正天地之大義也古先哲王莫不明后妃之制順天地之徳故二妃嬪媯虞道克隆任姒配姬周室用熙廢興存亡恒此之由春秋説云天子十二女諸侯九女考之情理不易之典也而末世奢縱肆其侈欲至使男女怨曠感動和氣惟色是崇不本淑懿故風教陵遲而大綱毁泯豈不惜哉嗚呼有國有家者其可以永鑒矣漢制帝祖母曰太皇太后帝母曰皇太后帝妃曰皇后其餘内官十有四等魏因漢法母后之號皆如舊制自夫人以下世有増損太祖建國始命王后其下五等有夫人有昭儀有偼伃有容華有美人文帝增貴嬪淑媛脩容順成良人明帝増淑妃昭華脩儀除順成官太和中始復命夫人登其位於淑妃之上自夫人以下爵凡十二等貴嬪夫人位次皇后爵無所視淑妃位視相國爵比諸侯王淑媛位視御史大夫爵比縣公昭儀比縣侯昭華比郷侯脩容比亭侯脩儀此闗内侯偼伃視中二千石容華視真二千石美人視比二千石良人視千石武宣卞皇后琅邪開陽人文帝母也本倡家后初生於齊郡白亭有黄氣滿室移日其父怪之以問卜者王旦旦曰此吉祥也年二十太祖於譙納之為妾後隨至洛太祖㣲服東避董卓亂袁術傳太祖凶問時太祖左右皆欲歸后止之曰曹君吉凶未可知今日還家明日若在何面目復相見也正使禍至共死何苦遂從后言太祖聞而善之建安初丁夫人廢遂以后為繼室諸子無母者太祖皆令后養之文帝為太子左右長御賀后曰將軍拜太子天下莫不懽喜后當傾府藏賞賜后曰王自以丕年長故用為嗣我但當以免無教導之過為幸耳亦何為當重賜遺乎長御還以告太祖太祖説曰怒不變容喜不失節故是最為難二十四年拜為王后明年太祖崩文帝即王位尊后曰王太后及踐阼尊后曰皇太后稱永壽宫后性儉約又以國用不足減損御食諸金銀器物皆去之東阿王植太后少子最愛之後植犯法為有司所奏文帝令太后弟子奉車都尉蘭持公卿議白太后太后曰不意此兒所作如是汝還語帝不可以我故壞國法及自見帝不以為言裴松之案文帝夢磨錢欲使文滅而更愈明以問周宣宣荅曰此陛下家事雖意欲爾而太后不聽則太后用意不得如此書所言也明帝即位尊太后曰太皇太后黄初中文帝欲追封太后父母尚書陳羣奏曰案典籍之文無婦人分土命爵之制在禮婦因夫爵秦違古法漢氏因之非先王之令典也帝曰此議是也其勿施行以作著詔下藏之臺閣永為後式至太和四年春明帝乃追諡太后祖父廣曰開陽恭侯父逺曰敬侯祖母周封陽都君及恭侯夫人皆贈印綬其年五月后崩合葬髙陵初太后弟秉以功封都郷侯為昭烈將軍秉薨子蘭嗣少有才學為奉車都尉游擊將軍加散騎常侍蘭薨子暉嗣又分秉爵封蘭弟琳為列侯官至歩兵校尉蘭子隆女為髙貴郷公皇后隆以后父為光禄大夫位特進封雎陽郷侯妻王為顯陽鄉君追封隆前妻劉為順陽鄉君后親母故也琳女又為陳留王皇后時琳已没封琳妻劉為廣陽鄉君文昭甄皇后中山無極人明帝母漢太保甄邯後也世吏二千石父逸上蔡令后生三歳失父后以漢光和五年十二月丁酉生每寢寐家中髣髴見如有人持玉衣覆其上者常共怪之后自少至長不好戲弄年八嵗外有立騎馬戲者家人諸姊皆上閣觀之后獨不行諸姊問之后曰此豈女人之所觀邪年九歳喜書視字輙識數用諸兄筆硯兄謂后曰汝當習女工用書為學當作女博士邪后答言聞古者賢女未有不學前世成敗以為己誡不知書何由見之後天下兵亂加以饑饉百姓皆賣金銀珠玉寳物時后家大有儲榖頗以買之后年十餘歳白母曰今世亂而多買寳物匹夫無罪懷璧為罪又左右皆饑乏不如以榖振給親族隣里廣為恩惠也舉家稱善即從后言建安中袁紹為中子熙納之熙出為幽州后留養姑及鄴城破紹妻劉及后共坐皇堂上文帝入紹舎見紹妻及后后怖以頭伏姑膝上紹妻兩手自搏文帝謂曰劉夫人云何如此令新婦舉頭姑乃捧后令仰文帝就視見其顔色非凡稱歎之又説文帝初入有婦人被髮垢面垂涕立紹妻劉後帝問之劉荅是熙妻顧覽髮髻以䄂拭面其貌絶倫遂見納焉姑謂后曰不憂死矣文帝遂迎納之甚有寵生明帝及東郷公主延康元年正月文帝即王位六月南征后留鄴黄初元年十月帝踐阼之後山陽公奉二女以嬪于魏郭后李隂貴人並愛幸后愈失意有怨言帝大怒二年六月遣使賜死葬于鄴及明帝即位有司奏請追諡於是上尊諡曰文昭皇后使司空王朗持節奉策以太牢告祠于陵又别立寢廟太和元年三月以中山魏昌之安城郷千戸追封逸諡曰敬侯適孫像襲爵四月初營宗廟掘地得玉璽方一寸九分其文曰天子羡思慈親明帝為之改容以太牢告廟又嘗夢見后於是差次舅氏親疎髙下叙用各有差賞賜累鉅萬以像為虎賁中郎將是月后母薨帝制緦服臨喪四年十二月帝以后陵庳下使像兼太尉持節詣鄴昭告后土改葬朝陽陵像還遷散騎常侍青龍二年春追諡后兄儼曰安成鄉穆侯夏吳人宼揚州以像為伏波將軍持節監諸將東征還復為射聲校尉三年薨追贈衛将軍改封魏昌縣諡曰貞侯子暢嗣又封暢弟温􅀈豔皆為列侯四年改逸儼本封皆曰魏昌侯諡因故封儼世婦劉為東郷君又追封逸世婦張為安喜君景初元年有司議定七廟以文昭皇后特廟宜與祖廟同著不毁之典帝思念舅氏不已暢尚㓜景初末以暢為射聲校尉加散騎常侍名暢所居里曰渭陽里以追思母氏也嘉平三年暢薨贈車騎將軍諡曰恭侯子紹嗣太和六年明帝愛女淑薨追封諡淑為平原懿公主為之立廟取后亡從孫黄與合葬追封黄列侯以夫人郭氏從弟悳為之後承甄氏姓封悳為平原侯襲主爵青龍中又封后從兄子毅及像弟三人皆為列侯毅官至越騎校尉嘉平中復封暢子二人為列侯后兄儼孫女為齊王皇后后父已殁封后母為廣樂郡君文德郭皇后安平廣宗人祖世長吏父永官至南郡太守后少而永奇之曰此乃吾女中王也遂以女王為字早失二親喪亂流離没在銅鞮侯家太祖為魏公時得入東宫后有智數時時有所獻納文帝定為嗣后有謀焉文帝即王位后為夫人及踐阼為貴嬪黄初三年將登后位文帝欲立郭后中郎棧潛上疏言因愛登后使賤人暴貴不可為後世法文帝不從遂立為皇后后蚤喪兄弟以從兄表繼永後拜奉車都尉五年帝東征后留許昌永始臺時霖雨百餘日城樓多壞有司奏請移止后曰昔楚昭王出遊貞姜留漸臺江水至使者迎而無符不去卒没今帝在逺吾幸未有是患而便移止柰何群臣莫敢復言六年帝東征吳至廣陵后留譙宫時表留宿衛欲遏水取魚后曰水當通運漕又少材木奴客不在目前當復私取官竹木作梁遏今奉車所不足者豈魚乎后性節儉常慕漢明德馬后之為人明帝即位尊后為皇太后稱永安宫太和四年詔封表安陽亭侯又進爵鄉侯遷中壘将軍以表子詳為騎都尉其年帝追諡太后父永為安陽鄉敬侯母董為都鄉君遷表昭德將軍加金紫位特進表第二子訓為騎都尉青龍三年春后崩于許昌初甄后之誅由郭后之譛及殯令被髮覆面以糠塞口文帝遂立郭后使養明帝甄后臨没以帝屬李夫人帝立李夫人密啟甄后見譛之禍不獲大歛被髮之事帝哀恨流涕心常懷忿數問甄后死狀於郭后后曰先帝自殺何以責問我且汝為人子可追讎死父為前母枉殺後母邪明帝怒遂逼殺之勑殯者使如甄后故事葬首陽陵西其後帝復進表爵為觀津侯增其邑戸遷詳為駙馬都尉四年追改封永為觀津敬侯世婦董為堂陽君追封諡后兄浮為梁里亭戴侯都為武城亭孝侯成為新樂亭定侯皆使使者奉策祠以太牢表薨子詳嗣又分表爵封詳弟述為列侯詳薨子釗嗣明悼毛皇后河内人也黄初中以選入東宫明帝時為平原王進御有寵出入與同輿輦及即帝位以為貴嬪太和元年立為皇后后父嘉拜騎都尉后弟曽郎中初明帝為王始納河内虞氏為妃帝即位虞氏不得立為后太皇卞太后慰勉焉虞氏曰曹氏自好立賤未有能以義舉者也然后職内事君聽外政其道相由而成茍不能以善始未有能令終者也殆必由此亡國喪祀矣虞氏遂黜還鄴宫進嘉為奉車都尉曽騎都尉寵賜隆渥頃之封嘉博平郷侯遷光禄大夫曽駙馬都尉嘉本典虞車工卒暴富貴明帝令朝臣㑹其家飲宴其容止舉動甚蚩騃語輙自謂侯身時人以為笑後又加嘉位特進曽遷散騎侍郎青龍三年嘉薨追贈光禄大夫改封安國侯增邑五百并前千戸諡曰節侯四年追封后母夏為野王君帝之幸郭元后也后愛寵日弛景初元年帝遊後園召才人以上曲宴極樂元后曰宜延皇后帝弗許乃禁左右使不得宣后知之明日帝見后后曰昨日遊宴北園樂乎帝以左右泄之所殺十餘人賜后死然猶加諡葬愍陵遷曾散騎常侍後徙為羽林虎賁中郎將原武典農明元郭皇后西平人也世河右大族黄初中本郡反叛遂没入宫明帝即位甚見愛幸拜為夫人叔父立為騎都尉從父芝為虎賁中郎將帝疾困遂立為皇后齊王即位尊后為皇太后稱永寧宫追封謚太后父滿為西都定侯以立子建紹其爵封太后母杜為郃陽君芝遷散騎常侍長水校尉立宣德將軍皆封列侯建兄悳出養甄氏悳及建俱為鎮䕶將軍皆封列侯並掌宿衛值三主㓜弱宰輔統政與奪大事皆先咨於太后而後施行母邱儉鍾㑹等作亂咸假其命而以為辭焉景元四年十二月崩五年二月葬髙平陵西蜀先主甘皇后沛人也先主臨豫州住小沛納以為妾先主數喪嫡室常攝内事隨先主於荆州產後主値曹公軍至追及先主於當陽長阪于時困逼棄后及後主頼趙雲保䕶得免於難后卒葬于南郡章武二年追諡皇思夫人遷葬於蜀未至而先主殂隕丞相亮與太常臣頼恭等議上尊諡曰昭烈皇后與先主合葬惠陵先主穆皇后陳留人也兄吳壹少孤壹父素與劉焉有舊是以舉家隨焉入蜀焉有異志而聞善相者相后當大貴焉時將子􅈘自隨遂為瑁納后瑁死后寡居先主既定益州而孫夫人還吳群下勸先主聘后先主疑與瑁同族法正進曰論其親疎何與晉文之於子圉乎於是納后為夫人建安二十四年立為漢中王后章武九年立為皇后建興元年五月後主即位尊后為皇太后稱長樂宫壹官至車騎將軍封縣侯延熙八年后薨合葬惠陵後主敬哀皇后車騎將軍張飛長女也章武元年納為太子妃建興元年立為皇后十五年薨葬南陵後主張皇后前后敬哀之妹也建興十五年入為貴人延熙元年春立為皇后咸熙元年隨後主遷于洛陽吳孫破虜吳夫人吳主權母也本吳人徙錢塘早失父母與弟景居孫堅聞其才貌欲娶之吳氏親戚嫌堅輕狡將拒焉堅甚以慚恨夫人謂親戚曰何愛一女以取禍乎如有不遇命也於是遂許為㛰初夫人孕而夢月入其懷既而生策及權在孕又夢日入其懷以告堅曰昔姙策夢月入我懷今也又夢日入我懷何也堅曰日月者隂陽之精極貴之象吾子孫其興乎生四男一女景常隨堅征伐有功拜騎都尉袁術上景領丹陽太守討故太守周昕遂據其郡孫策與孫河吕範依景合衆共討涇縣山賊祖郎郎敗走㑹景為劉繇所逼復北依術術以為督軍中郎將與孫賁共討樊能于麇於横江又撃笮融薛禮於秣陵時策被創牛渚降賊復反景攻討盡禽之從討劉繇繇奔豫章策遣景賁到壽春報術術方與劉備爭徐州以景為廣陵太守術後僣號策以書喻術術不納便絶江津不與通使人告景景即委郡東歸策復以景為丹陽太守漢遣議郎王誧衘命南行表景為揚武將軍領軍如故及權少年統業夫人助治軍國甚有補益初策功曹魏騰以迕意見譴將殺之士大夫憂恐計無所出夫人乃倚大井而謂策曰汝新造江南其事未集方當優賢禮士捨過録功魏功曹在公盡規汝今日殺之則明日人皆叛汝吾不忍見禍之及當先投此井中耳策大驚遂釋騰夫人智略權譎類皆如此建安七年臨薨引見張昭等屬以後事合葬髙陵八年景卒官子􅁬授兵為將封新亭侯卒子安嗣安坐黨魯王霸死􅁬弟祺封都亭侯卒子纂嗣纂妻即滕允女也允被誅并遇害吳主權謝夫人會稽山隂人也父煚漢尚書郎徐令權母吳為權聘以為妃愛幸有寵後權納姑孫徐氏欲令謝下之謝不肯由是失志早卒後十餘年弟承拜五官郎中稍遷長沙東部都尉武陵太守撰後漢書百餘卷吳主權徐夫人吳郡富春人也祖父眞與權父堅相親堅以妹妻眞生琨琨少仕州郡漢末擾亂去吏隨堅征伐有功拜偏將軍堅薨隨孫策討樊能于麇等於横江撃張英於當利口而船少欲駐軍更求琨母時左軍中謂琨曰恐州家多發水軍來逆人則不利矣如何可駐邪宜伐蘆葦以為泭佐船渡軍琨具啟策策即行之衆悉俱濟遂破英撃走笮融劉繇事業尅定策表琨領丹陽太守會吳景委廣陵來東復為丹陽守琨以督軍中郎將領兵從破廬江太守李術封廣德侯遷平虜将軍後從討黄祖中流矢卒琨生夫人初適同郡陸尚尚卒權為討虜將軍在吳聘以為妃使母養子登後權遷移以夫人妬忌廢處吳積十餘年權為吳王及即尊號登為太子羣臣請立夫人為后權意在歩氏卒不許後以疾卒兄矯嗣父琨侯討平山越拜偏將軍先夫人卒無子弟祚襲封亦以戰功至于蕪湖督平魏將軍吳主權歩夫人臨淮淮隂人也與丞相騭同族漢末其母擕將徙廬江廬江為孫策所破皆東渡江以美麗得幸於權寵冠後庭生二女長曰魯班字大虎前配周瑜子循後配全琮少曰魯育字小虎前配朱據後配劉纂夫人性不妬忌多所推進故久見愛待權為王及帝意欲以為后而羣臣議在徐氏權依違者十餘年然宫内皆稱皇后親戚上疏稱中宫及薨臣下縁權指請追正名號乃贈印綬策為皇后葬蒋陵吳主權王夫人琅邪人也夫人以選入宫黄武中得幸生孫和寵次歩氏歩氏薨後和立為太子權將立夫人為后而全公主素憎夫人稍稍譛毁及權寢疾言有喜色由是權深責怒以憂死和子皓立追贈夫人曰大懿皇后封三弟皆為列侯吳主權王夫人南陽人也以選入宫嘉禾中得幸生孫休及和為太子和母貴重諸姬有寵者皆出居外夫人出公安卒因葬焉休即位遣使追尊曰敬懷皇后改葬敬陵王氏無後封同母弟文雍為亭侯吳主權潘夫人㑹稽句章人也父為吏坐法死夫人與姊俱輸織室權見而異之召充後宫得幸有娠夢有以龍頭授己者己以蔽膝受之遂生孫亮赤烏十三年亮立為太子請出嫁夫人之姊權聽許之明年立夫人為皇后性險妬容媚自始至卒譛害袁夫人等甚衆權不豫夫人使問中書令孫𢎞吕后專制故事侍疾疲勞因以羸疾諸宫人伺其昬卧共縊殺之託言中惡後事泄坐死者六七人權尋薨合葬蔣陵孫亮即位以夫人姊壻譚紹為散騎都尉授兵亮廢紹與家屬送本郡廬陵孫亮全夫人全尚女也尚從祖母公主愛之毎進見輙與俱及潘夫人母子有寵全主自以與孫和母有隙乃勸權為潘氏男亮納夫人亮遂為嗣夫人立為皇后以尚為城門校尉封都亭侯代滕允為太常衛將軍進封永平侯録尚書事時全氏侯有五人並典兵馬其餘為侍郎騎都尉宿衛左右自吳興外戚貴盛莫及及魏大將諸葛誕以壽春來附而全懌全端全煒全儀等並因此際降魏全熙謀泄見殺由是諸全衰弱㑹孫綝廢亮為㑹稽王後又黜為候官侯夫人隨之國居候官尚將家屬徙零陵追見殺孫休朱夫人朱據女休姊公主所生也赤烏末權為休納以為妃休為琅邪王隨居丹陽建興中孫峻專政公族皆患之全尚妻即峻姊故惟全主祐焉初孫和為太子時全主譛害王夫人欲廢太子立魯王朱主不聽由是有隙五鳳中孫儀謀殺峻事覺被誅全主因言朱主與儀同謀峻枉殺朱主休懼遣夫人還建業執手泣别既至峻遣還休太平中孫亮知朱主為全主所害問朱主死意全主懼曰我實不知皆據二子熊損所白亮殺熊損損妻是峻妹也孫綝益忌亮遂廢亮立休永安五年立夫人為皇后休卒群臣尊夫人為皇太后孫皓即位月餘貶為景皇后稱安定宫甘露元年七月見逼薨合葬定陵孫和何姬丹陽句容人也父遂本騎士孫權嘗遊幸諸營而姬觀於道中權望見而異之命宦者召入以賜子和生男權喜名之曰彭祖即皓也太子和既廢後為南陽王居長沙孫亮即位孫峻輔政峻素媚事全主全主與和母有隙遂勸峻徙和居新都遣使賜死嫡妃張氏亦自殺何姬曰若皆從死誰當養孤遂拊育皓及其三弟皓即位尊和為昭獻皇帝何姬為昭獻皇后稱升平宫月餘進為皇太后封弟洪永平侯蔣溧陽侯植宣城侯洪卒子邈嗣為武陵監軍為晉所殺植官至大司徒皓末昏亂何氏驕譛子弟横放百姓患之故民譌言皓久死立者何氏子云孫皓滕夫人故太常允之族女也允夷滅夫人父牧以疎逺徙邊郡孫休即位大赦得還以牧為五官中郎皓既封烏程侯聘牧女為妃皓即位立為皇后封牧髙密侯拜衞將軍録尚書事後朝士以牧尊戚頗推令諫諍而夫人寵漸衰皓滋不悦皓母何恒左右之又太史言於運歴后不可易皓信巫覡故得不廢常供養升平宫牧見遣居蒼梧郡雖爵位不奪其實謫也遂道路憂死長秋宫僚備員而已受朝賀表疏如故而皓内諸寵姬佩皇后璽綬者多矣天紀四年隨皓遷于洛陽通志卷十九
