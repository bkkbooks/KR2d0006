body:
  text: 通志卷一百七十一宋右廸功郎鄭樵漁仲撰酷吏傳第一前漢郅都寗成周陽由趙禹義縱王溫舒尹齊楊僕咸宣田廣明田延年嚴延年尹賞後漢董宣樊煜李章周䊸黄昌陽球王吉後魏于洛侯胡泥李洪之子神髙遵張赦提趙霸羊祉崔暹酈道元谷楷北齊邸珍宋游道子士素盧斐畢義雲隋庫狄士文田式燕榮趙仲卿崔𢎞度弟昇元𢎞嗣王文同前漢郅都河東揚人也以即事孝文帝景帝時為中郎将敢直諌靣折大臣於朝嘗從入上林賈姬如厠野彘卒来入厠上目都都不行上欲自持兵救姬都伏上前曰亡一姬復一姬進天下所少寕賈姬等乎陛下縱自輕柰宗廟太后何上還彘亦去太后聞之賜都金百斤由此重郅都濟南瞷氏音癎宗人三百餘家豪猾二千石莫能制于是景帝乃拜都為濟南太守至則誅瞷氏首惡餘皆股栗居嵗餘郡中不拾遺旁十餘郡守畏都如大府都為人勇而有氣公亷不發私書問遺無所受請寄無所聽常自稱曰已背親而出身固當奉職死節官下終不顧妻子矣都遷為中尉丞相條侯至貴倨也而都揖丞相是時民樸畏罪自重而都獨先嚴酷致行法不避貴戚列侯宗室見都側目而視號曰蒼鷹臨江王徵詣中尉府對簿臨江王欲得刀筆為書謝上而都禁吏不與魏其侯使人以間予臨江王臨江王既得為書謝上因自殺竇太后聞之怒以危法中都都免歸家孝景帝乃使使持節拜都為鴈門太守便道之官得以便宜從事匈奴素聞郅都節舉邉為引兵去竟郅都死不敢近鴈門匈奴至為偶人象都令騎馳射莫能中其見惮如此匈奴患之竇太后乃竟中都以漢法景帝曰都忠臣欲釋之竇太后曰臨江王獨非忠臣邪于是遂斬郅都寗成南陽穰人也以郎謁者事景帝好氣為人小吏必陵其長吏為人上操下如束濕薪猾賊任威稍遷至濟南都尉而郅都為守始前數都尉皆歩入府因吏謁守如縣令其畏郅都如此及成徃直陵都出其上都素聞其聲于是善遇與結驩乆之郅都死後長安左右宗室多暴犯法于是上召寗成為中尉其治效郅都其㢘弗如然宗室豪傑皆人人惴恐武帝即位徙為内史外戚多毁成之短抵罪髠鉗是時九卿罪死即死少被刑而成極刑自以為不復收于是觧脱詐刻傳出闗歸家稱曰仕不至二千石賈不至千萬安可比人乎乃貰貸買陂田千餘頃假貧民役使數千家數年㑹赦致産數千金為任侠持吏長短出從數十騎其使民威重于郡守周陽由其父趙兼以淮南王舅父侯周陽故因氏焉由以宗家任為郎事孝文及景帝景帝時由為郡守武帝即位吏治尚循謹然由居二千石中最為暴酷驕恣所愛者撓法活之所憎者曲法誅㓕之所居郡必夷其豪為守視都尉如令為都尉必陵太守奪之治與汲黯俱為忮司馬安之文惡俱在二千石列同車未嘗敢均茵馮後由為河東都尉與其守勝屠公争權相告言勝屠公當抵罪義不受刑自殺而由棄市自寗成周陽由之後事益多民巧法大抵吏之治類多成由等矣趙禹扶風斄人也以佐史補中都官用㢘為令史事太尉周亞夫亞夫為丞相禹為丞相史府中皆稱為廉平然亞父弗任曰極知禹無害然文深不可以居大府武帝時禹以刀筆吏積勞遷為御史上以為能至大中大夫與張湯定律令作見知吏傳相監司以法盖自此始禹為人廉倨為吏以来舍無食客公卿相造請禹終不行報謝務在絶知友賔客之請孤立行一意而已見法輙取亦不覆案求官属隂罪嘗中廢已為廷尉始條侯以禹賊深及禹為少府九卿酷急至晚節事益多吏務為嚴峻而禹治加緩名為平王温舒等後起治峻于禹禹先以老徙為燕相數嵗悖亂有罪免歸後十餘年以夀卒于家義縱河東人也少年時常與張次公俱攻剽為羣盗縱有姊姁姁音吁以醫幸王太后太后問有子兄弟為官者乎姊曰有弟無行不可太后乃告上上拜義姁弟縱為中郎補上黨郡中令治敢徃少溫籍縣無逋事舉第一遷為長陵及長安令直法行治不避貴戚以捕按太后外孫脩成君子中上以為能遷為河内都尉至則族㓕其豪穰氏之属河内道不拾遺而張次公亦為郎以勇悍從軍敢深入有功封為岸頭侯寗成家居上欲以為郡守御史大夫𢎞曰臣居山東為小吏時寗成為濟南都尉其治如狼牧羊成不可使治民上乃拜成為闗都尉嵗餘闗東吏𨽻郡國出入闗者號曰寕見乳虎無值寗成之怒其暴如此義縱自河内遷為南陽太守聞寗成家居南陽及縱至闗寗成側行送迎然縱氣盛弗為禮至郡遂案寗氏盡破碎其家成坐有罪及孔暴之属皆奔亡南陽吏民重足一迹而平氏朱彊杜衍杜周為縱爪牙之吏任用遷為廷尉史軍數出定襄定襄吏民亂敗于是徙縱為定襄太守縱至掩定襄獄中重罪輕繋二百餘人及賔客昆弟私入相視者亦二百餘人縱壹切捕鞫曰為死罪觧脱是日皆報殺四百餘人郡中不寒而栗猾民佐吏為治是時趙禹張湯以深刻為九卿矣然其治尚寛輔法而行縱以鷹撃毛摯為治後㑹更五銖錢白金起民為奸京師尤甚乃以縱為右内史王温舒為中尉温舒至惡其所為弗先言縱縱必以氣陵之敗壊其功其治所誅殺甚多然取為小治姦益不勝直指始出矣吏之治以斬殺縳束為務閻奉以惡用矣縱亷其治效郅都上幸鼎湖病乆已而卒起幸甘泉道多不治上怒曰縱以我為不復行此道乎嗛之音衘至冬楊可方受告緡縱以為此亂民部吏捕其為可使者天子聞使杜式治以為廢格沮事縱棄市後一嵗張湯亦死王溫舒馮翊陽陵人也少時椎埋為姦已而試補縣亭長数廢数為吏以治獄至廷尉史事張湯遷為御史督盗賊殺傷甚多稍遷至廣平都尉擇郡中豪傑敢徃吏十餘人為爪牙皆把其隂重罪而縱使督盗賊快其意所欲得此人雖有百罪弗法即有避回夷之亦㓕宗以故齊趙之郊盗不敢近廣平廣平聲為道不拾遺上聞遷為河内太守素居廣平時皆知河内豪姦之家及徃以九月至令郡具私馬五十匹為驛自河内至長安部吏如居廣平時方畧捕郡中豪猾相連坐千餘家上書請大者至族小者乃死家盡没入償臧奏行不過二三日得可事論報至流血十餘里河内皆怪其奏以為神速盡十二月郡中無敢夜行野無犬吠之盗其頗不得失之旁郡追求㑹春溫舒頓足歎曰嗟乎令冬月益展一月足吾事矣其好殺行威不愛人如此上聞之以為能遷為中尉其治復放河内徒請召猜禍吏與從事河内則楊皆麻戊闗中楊贛成信等義縱為内史惮之未敢恣治及縱死張湯敗後徙為廷尉而尹齊為中尉坐法抵罪溫舒復為中尉為人少文居他惛惛不辯至於中尉則心開素習闗中俗知豪惡吏豪惡吏盡復為用吏苛察淫惡少年投缿購告言姦置伯落長以収司姦溫舒多謟善事有埶者即無埶視之如奴有埶家雖有姦如山弗犯無埶雖貴戚必侵辱舞文巧請下户之猾以動大豪其治中尉如此姦猾窮治大氐盡靡爛獄中行論無出者其爪牙吏虎而冠于是中尉部中中猾以下皆伏有埶者為游聲譽稱治数嵗其吏多以權貴富溫舒撃東越還議有不中意坐小法免是時上方欲作通天䑓而未有人溫舒請覆中尉脫卒得数萬人作上説拜為少府徙右内史治如其故姦邪少禁坐法失官復為右輔行中尉如故操嵗餘㑹宛軍發詔徴豪吏溫舒匿其吏華成及人有變告溫舒受員騎錢他姦利事罪至族自殺其時兩弟及兩婚家亦各自坐他罪而族光禄勲徐自為曰悲夫夫古有三族而王溫舒罪至同時而五族乎溫舒死家累千金尹齊東郡茌平人也以刀筆吏稍遷至御史事張湯湯數稱以為㢘武帝使督盗賊斬伐不避貴埶遷闗都尉聲甚于寗成上以為能拜為中尉吏民益彫敝䡖齊木彊少文豪惡吏伏匿而善吏不能為治以故事多廢抵罪後復為淮陽都尉王溫舒敗後数年病死家直不滿五十金所誅滅淮陽甚多及死仇家欲焼其屍妻亡去歸葬楊僕宜陽人也以千夫為吏河南守舉為御史使督盗賊闗東治放尹齊以敢撃行稍遷至主爵都尉列為九卿天子以為能南越反拜為樓船将軍有功封将梁侯東越反上欲復使将為其伐前勞以書勅責之曰将軍之功獨有先破石門尋陿非有斬将騫旗之實也烏足以驕人哉前破番禺捕降者以為虜掘死人以為獲是一過也建徳呂嘉逆罪不容于天下将軍擁精兵不窮追超然以東越為援是二過也士卒暴露連嵗為朝㑹不置酒将軍不念其勤勞而造佞巧請乗傳行塞因用歸家懐銀黄垂三組夸鄉里是三過也失期内顧以道惡為觧失尊尊之序是四過也欲請蜀刀問君賈㡬何對曰率数百武庫日出兵而陽不知挟偽干君是五過也受詔不至蘭池宫明日又不對假令将軍之吏問之不對令之不從其罪何如推此心以在外江海之間可得信乎今東越深入将軍能率衆以掩過不僕惶恐對曰願盡死贖罪與王溫舒俱破東越後復與左将軍荀彘俱撃朝鮮為彘所縳語在朝鮮傳還免為庶人病死咸宣楊人也咸音减以佐史給事河東守衞将軍青使買馬河東見宣無害言上徴為廐丞官事辦稍遷至御史及丞使治主父偃及淮南反獄所以微文深詆殺者甚衆稱為敢决疑数廢数起為御史及中丞者㡬二十嵗王溫舒為中尉而宣為左内史其治米鹽事小大皆闗其手自部署縣名曺寳物官吏令丞弗得擅揺痛以重法繩之居官数年一切為小治辦然獨宣以小至大能自行之難以為經中廢為右扶風坐怒其吏成信信亡藏上林中宣使郿令将吏卒䦨入上林中蠶室門攻亭格殺信射中苑門宣下吏為大逆當族自殺而杜周任用是時郡守尉諸侯相二千石欲為治者大抵盡效王溫舒䓁而吏民益輕犯法盗賊滋起南陽有梅免百政楚有叚中杜少齊有徐勃燕趙之間有堅盧范主之属大羣至数千人擅自號攻城邑取庫兵釋死罪縳辱郡守都尉殺二千石為檄告縣趨具食小羣以百数掠鹵鄉里者不可稱数于是上始使御史中丞丞相長史使督之猶弗能禁乃使光禄大夫范昆諸部都尉及故九卿張徳䓁衣繡衣持莭虎符𤼵兵以興撃斬首大部或至萬餘級及以法誅通行飲食坐相連郡甚者数千人数嵗乃頗得其渠率散卒失亡復聚黨阻山川徃徃而羣無可奈何于是作沈命法曰羣盗起不發覺發覺而捕弗滿品者二千石以下至小吏主者皆死其後小吏畏誅雖有盗弗敢發恐不能得坐課累府府亦使不言故盗賊寖多上下相為匿以避文法焉田廣明字子公鄭人也以即為天水司馬功次遷河南都尉以殺伐為治郡國盗賊並起遷廣明為淮陽太守故城父令公孫勇與客胡倩䓁謀反倩詐稱光禄大夫從車騎数十言使督盗賊止陳留傳舍太守謁見欲收取之廣明覺知發兵皆斬捕焉而公孫勇衣繡衣乗駟馬車至圉圉使小史侍之亦知其非是守尉魏不害與廐嗇夫江徳尉史蘓昌共收捕之上封不害為當塗侯徳轑陽侯昌蒲侯初四人俱拜于前小史竊言武帝謂言何對曰為侯者得東歸不上曰汝欲不貴矣言汝竞欲歸不吾今貴汝謂賜之爵也女鄉名為何對曰名遺鄉上曰用遺女矣于是賜小史爵闗内侯食遺鄉六百户上以廣明連禽大姦徴入為大鴻臚擢廣明兄雲中代為淮陽太守昭帝時廣明将兵撃益州還賜爵闗内侯徙衞尉後出為左馮翊治有能名宣帝初立代蔡義為御史大夫以前為馮翊與議定策封昌水侯嵗餘以祁連将軍将兵撃匈奴出塞至受降城受降都尉前死䘮柩在堂廣明召其寡妻與姦既出不至質質所期處也引軍空還下太僕杜延年簿責廣明自殺闕下國除兄雲中為淮陽守亦敢誅殺吏民守闕告之竟坐棄市田延年字子賔其先齊諸田也徙陽陵延年以材畧給事大将軍莫府霍光重之遷為長史出為河東太守選拔尹翁歸䓁以為爪牙誅鋤豪彊姦邪不敢發以選入為大司農㑹昭帝崩昌邑王嗣位淫亂霍将軍憂懼與公卿議廢之莫敢發言延年按劍廷叱羣臣即日議决語在光傳宣帝即位延年以决疑定策封陽成侯先是茂陵富人焦氏賈氏以数千萬隂積貯炭葦諸下里物死者歸蒿里葬地下故曰下里昭帝大行時方上事暴起用度未辦延年奏言商賈或豫收方上不祥器物兾其疾用欲以求利非民臣所當為請没入縣官奏可富人亡財者皆怨出錢求延年罪初大司農取民牛車三萬兩為僦載沙便橋下送致方上車直千錢延年上簿詐増僦直車二千凡六千萬盗取其半焦賈兩家告其事下丞相府丞相議奏延年主守盗三十萬不道霍将軍召問延年欲為道地延年抵曰本出将軍之門䝉此爵位無有是事光曰即無事當窮竟御史大夫田廣明謂太僕杜延年曰春秋之義以功覆過當廢昌邑王時非田子賔之言大事不成今縣官出三十萬自乞音氣之何哉願以愚言白大将軍延年言之大将軍大将軍曰誠然寔勇士也當發大議時震動朝廷光因舉手自拊心曰使我至今病悸謝田大夫曉大司農通徃就獄得公議之田大夫使人語延年延年曰幸縣官寛我耳何靣目入牢獄使衆人指笑我卒徒唾吾背乎即閉閤獨居齋舍偏袒持刀東西歩數日使者召延年詣廷尉聞鼓聲自刎死國除嚴延年字次卿東海下邳人也其父為丞相椽延年少學法律丞相府歸為郡吏以選除補御史掾舉侍御史是時大将軍霍光廢昌邑王尊立宣帝宣帝初立延年劾奏光擅廢立亡人臣禮不道奏雖寝然朝廷肅焉敬惮延年後復劾大司農田延年持兵干属車大司農自訟不干属車事下御史中丞譴責延年何以不移書宫殿門禁止大司農而令得出入宫于是覆劾延年䦨内罪人法至死延年亡命㑹赦出丞相御史府徴書同日到延年以御史書先至詣御史府復為椽宣帝識之拜為平陵令坐殺不辜去官後為丞相椽復擢為好畤令神爵中西羗反彊弩将軍許延夀請延年為長史從軍敗西𦍑還遷為涿郡太守時郡比得不能太守􅃰人畢野白䓁由是廢亂大姓西髙氏東髙氏自郡吏以下皆畏避之莫敢與啎咸曰寕負二千石無負豪大家賔客放為盗賊發輙入髙氏吏不敢追浸浸日乆道路張弓㧞刅然後敢行其亂如此延年至遣掾蠡吾趙繡按髙氏得其死罪繡見延年新将心内懼即為兩劾欲先白其䡖者觀延年意怒乃出其重劾延年已知其如此矣趙椽至果白其䡖者延年索懐中得重劾即收送獄夜入晨将至市論殺之先所按者死吏皆股弁更遣吏分考兩髙窮竟其姦誅殺各数十人郡中震恐道不拾遺三嵗遷河南太守賜黄金二十斤豪彊脅息野無行盗威震旁郡其治務在摧折豪彊扶助貧弱貧弱雖䧟法曲文以出之其豪傑侵小民者以文内之衆人所謂當死者一朝出之所謂當生者詭殺之吏民莫測其意深淺戰慄不敢犯禁按其獄皆文致不可得反延年為人短小精悍敏㨗于事雖子貢冉有通蓺于政事不能絶也吏忠盡節者厚遇之如骨肉皆親鄉之出身不頋以是治下無隐情然疾惡泰甚中傷者多尤巧為獄文善史書所欲誅殺奏成於手中主簿親近史不得聞知奏可論死奄忽如神冬月傳属縣囚㑹論府上流血数里河内號曰屠伯令行禁止郡中正清是時張敞為京兆尹素與延年善敞治雖嚴然尚頗有縱舍聞延年用刑刻急乃以書喻之曰昔韓盧之取也上觀下獲言良大之取免仰觀人主之意而獲之喻不妄殺不甚多殺願次卿少緩誅罰思行此術延年報曰河南天下喉咽二周餘斃莠盛苖穢何可不鋤也自矜伐其能終不衰止時黄霸在潁川以寛恕為治郡中亦平屢䝉豊年鳳凰下上賢焉下詔稱揚其行加金爵之賞延年素輕霸為人及比郡為守襃賞反在已前心内不服河南界中又有蝗蟲府丞狐義出行蝗還見延年延年曰此蝗豈鳳凰食邪義又道司農中丞耿夀昌為常平倉利百姓延年曰丞相御史不知為也當避位去夀昌安得權此後左馮翊缺上欲徴延年符已發為其名酷復止延年疑少府梁邱賀毁之心恨會琅邪太守以視事乆病滿三月免延年自知見廢謂丞曰此人尚能去官我反不能去邪又延年察獄史廉有臧不入身延年坐選舉不寔貶秩笑曰後敢復有舉人者矣丞義年老頗悖素畏延年恐見中傷延年本嘗與丞俱為丞相史寔親厚之無意毁傷也饋遺之甚厚義愈益恐自筮得死卦忽忽不樂取告至長安上書言延年罪名十事已拜奏因飲藥自殺以明不欺事下御史丞按騐有此数事以結延年坐怨望誹謗政治不道棄市初延年母從東海来欲從延年臘到雒陽適見報囚母大驚便止都亭不肯入延年出至都亭謁母母閉閤不見延年免冠頓首閤下良乆母乃見之因数責延年幸得備郡守専治千里不聞仁愛教化有以全安愚民頋乗刑罰多刑殺人欲以立威豈為民父母意哉延年服罪重頓首謝因自為母御歸府舍母畢正臘謂延年天道神明人不可獨殺我不意當老見壮子被刑戮也行矣去女東歸埽除墓地耳遂去歸郡見昆弟宗人復為言之後嵗餘果敗東海莫不賢知其母延年兄弟五人皆有吏材至大官東海號曰萬石嚴媼次弟彭祖至太子太傅在儒林傳尹賞字子心鉅鹿楊氏人也以郡吏察亷為楼煩長舉茂材粟邑令左馮翊薛宣奏賞能治劇徙為頻陽令坐殘賊免後以御史舉為鄭令永始元延間上怠於政貴戚驕恣紅陽長仲兄弟交通輕侠臧匿亡命而北地大豪浩商䓁報怨殺義渠長妻子六人徃来長安中丞相御史遣掾求逐黨與詔書召捕乆之乃得長安中姦猾浸多閭里少年羣軰殺吏受賕報仇相與探丸為弹得赤丸者斫武吏得黒者斫文吏白者主治䘮城中薄暮塵起剽劫行者死傷横道枹鼓不絶賞以三輔髙第選守長安令得一切便宜從事賞至修治長安獄穿地方深各数丈致令辟為郭以大石覆其口名為虎穴乃部户曺掾史與鄉吏亭長里正父老伍人雜舉長安中輕薄少年惡子無市籍商販作務而鮮衣凶服被鎧扞持刀兵者悉籍記之得數百人賞一朝㑹長安吏車數百兩分行收捕皆劾以為通行飲食羣盗賞親閲見十置一其餘盡以次内虎穴中百人為軰覆以大石数日壹發視皆相枕藉死便輿出瘞寺門桓東桓華表也揭著其姓名揭􅍻也音竭百日後乃令死者家各自發取其尸親属號哭道路皆歔欷長安中歌之曰安所求子死桓東少年場生時諒不謹枯骨後何葬子即反賞所置皆其魁宿或故吏善家子失計隨輕黥願自改者財數十百人皆貰其罪詭令立功以自贖盡力有効者因親用之為爪牙追捕甚精甘嗜姦惡甚于凡吏賞視事数月盗賊止郡國亡命散走各歸其處不敢闚長安江湖中多盗賊以賞為江夏太守捕格江賊及所誅吏民甚多坐殘賊免南山羣盗起以賞為右輔都尉遷執金吾督大姦猾三輔吏民甚畏之数年卒官疾病且死戒其諸子曰丈夫為吏正坐殘賊免追思其功效則復進用矣一坐軟弱不勝任免終身廢棄無有赦時其羞辱甚于貪汚坐臧慎毋然賞四子皆至郡守長子立為京兆尹皆尚威嚴有治辦名後漢董宣字少平陳留圉人也初為司徒侯霸所辟舉高第累遷北海相到官以大姓公孫丹為五官椽丹新造居宅而卜工以為當有死者丹乃令其子殺道行人置屍舍内以塞其咎宣知即收丹父子殺之丹宗族親黨三十餘人操兵詣府稱寃呌號宣以丹前附王莽慮交通海賊乃悉收繋劇獄使門下書佐水邱岑盡殺之青州以其多濫奏宣考岑宣坐徴詣廷尉在獄晨夜諷誦無憂色及當出刑官属具饌送之宣乃厲聲曰董宣生平未曽食人之食况死乎升車而去時同刑九人次應及宣光武馳騶騎特原宣刑且令還獄遣使者詰宣多殺無辜宣具以状對言水邱岑受臣旨意罪不由之願殺臣活岑使者以聞有詔左轉宣懐令令青州勿案岑罪岑官至司𨽻校尉後江夏有劇賊夏喜等寇亂郡境以宣為江夏太守到界移書曰朝廷以太守能禽姦賊故辱斯任今勒兵界首檄到幸思自安之宜喜䓁聞懼即時降散外戚隂氏為郡都尉宣輕慢之坐免後特徴為洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乗宣于夏門亭候之乃駐車叩馬以刀畫地大言数主之失叱奴下車因格殺之主即還宫訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖徳中興而縱奴殺人将何以理天下乎臣不湏箠請淂自殺即以頭撃楹流血被靣帝令小黄門持之使宣叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因敇彊項令出賜錢三十萬宣悉以班諸吏由是搏撃豪彊莫不震慄京師號為卧虎歌之曰枹鼓不鳴董少平在縣五年年七十四卒于官詔遣使者臨視惟有布被覆屍妻子對泣有大麥数斛敝車一乗帝傷之曰董宣㢘潔死乃知之以宣嘗為二千石賜艾綬葬以大夫禮拜子並為即中後官至齊相樊煜字仲華南陽新野人也與光武少遊舊建武初徴為侍御史遷河東都尉引見雲臺初光武微時嘗以事拘于新野煜為市吏餽餌一笥帝徳之不㤀仍賜煜御食及乗輿服物因戯之曰一笥餌得都尉何如煜頓首辭謝及至郡誅討大姓馬適匡等盗賊清吏民畏之数年遷揚州牧敎民耕田種樹理家之術視事十餘年坐法左轉軹長隗囂㓕後隴右不安乃拜煜為天水太守政嚴猛好申韓法善惡立斷人有犯其禁者卒不生出獄吏民及羗胡畏之道不拾遺行旅至夜聚衣装道傍曰以付樊公凉州為之歌曰㳺子常苦貧力子天所富寕見乳虎穴不見冀府寺大笑期必死忿怒或見置嗟我樊府君安可再遭值視事十四年卒官永平中顯宗追思煜在天水時政能以為後人莫之及詔賜錢百萬子融有俊才好黄老不肯為吏李章字第公河内懐人也五世二千石章習嚴氏春秋經明教授歴州郡吏光武為大司馬平定河北召章置東曺属数從征伐光武即位拜陽平令時趙魏豪右徃徃屯聚清河大姓趙綱遂于縣界起塢壁繕甲兵為在所害章到乃設饗㑹而延謁綱綱帶文劍被羽衣從士百餘人来到章與對讌飲有頃手劔斬綱伏兵亦悉殺其從者因馳詣塢壁掩撃㓕之吏民遂安遷千乘太守坐誅斬盗賊過濫徴下獄免嵗餘拜侍御史出為琅邪太守時北海安邱大姓夏長思䓁反遂囚太守處興而據營陵城章聞即發兵千人馳徃撃之椽吏止章曰二千石行不得出界兵不得擅發章按劍怒曰逆虜無状囚刦郡守此何可忍若坐討賊而死吾不恨也遂引兵至安邱城下募勇敢焼城門與長思戰斬之獲三百餘級得牛馬五百餘頭而還興歸郡以状上帝悉以所得班勞吏士後坐度人田不實徴以章有功但司冦論月餘免刑歸復徴㑹病卒周䊸字文通下邳徐人也為人刻削少恩好韓非之術少為廷尉史永平中補南行唐長到官曉吏人曰朝廷不以長不肖使牧黎民而性讐猾吏志除豪賊且勿相試遂殺縣中尤無状者数十人吏人大震遷博平令收考姦臧無出獄者以威名遷齊相亦頗嚴酷専任刑法而善為辭案條教為州内所則後坐殺無辜復左轉博平令建初中為勃海太守每赦令到郡輒隠閉不出先遣使属縣盡决刑罪乃出詔書坐徴詣廷尉免歸䊸㢘潔無資常築􅜘以自給肅宗聞而憐之復以為即再遷召陵侯相廷掾憚䊸嚴明欲損其威乃晨取死人断手足立寺門䊸聞便徃死人邉若與死人共語状隂察視口眼有稻芒乃宻問守門人曰悉誰載藁入城者門者對惟有廷掾耳又問鈴下外頗有疑令與死人語者不對曰廷掾疑君乃收廷椽考問具服不殺人取道邉死人後人莫敢欺者徴拜洛陽令下車先問大姓主名吏數閭里豪彊以對䊸厲聲怒曰本問貴戚若馬竇䓁軰豈能知此賣菜傭乎于是部吏望風旨争以激切為事貴戚跼蹐京師肅清皇后弟黄門即竇篤從宫中歸夜至止姦亭亭長霍延遮止篤篤蒼頭與争延遂㧞劍擬篤而肆詈恣口篤以表聞詔召司𨽻校尉河南尹詣尚書譴問遣劍㦸士收䊸送廷尉詔獄数日貰出帝知䊸奉法疾姦不事貴戚然苛􅆭失中数為有司所奏八年遂免官後為御史中丞和帝即位太傅鄧彪奏䊸在任過酷不宜典司京輦免歸田里後竇氏貴盛篤兄弟秉權睚眦宿怨無不僵仆䊸自謂無全乃柴門自守以待其禍然篤等以䊸公正而怨隙有素遂不敢害永元五年復徵為御史中丞諸竇雖誅而夏陽侯􅉞猶尚在朝䊸疾之乃上疏曰臣聞臧文仲之事君也見有禮於君者事之如孝子之養父母見無禮於君者誅之如鷹鸇之逐鳥雀按夏陽侯􅉞本出輕薄志在邪辟學無經術而妄構講舍外招儒徒實㑹姦桀輕忽天威侮慢王室又造作廵狩封禪之書惑衆不道當伏誅戮而主者營私不為國計夫涓流雖寡浸成江河爝火雖㣲卒能燎野履霜有漸不可懲革宜尋吕産専竊之亂永惟王莽簒逆之禍上安社稷之計下解萬人之惑㑹􅉞歸國䊸遷司𨽻校尉六年夏旱車駕自幸洛陽録囚徒二人被掠生蟲坐左轉騎都尉七年遷將作大匠九年卒於官黄昌字聖真㑹稽餘姚人也本出孤微居近學宫數見書生修庠序之禮因好之遂就經學又曉習文法仕郡為決曺刺史行部見昌甚竒之辟從事後拜宛令政尚嚴猛好發姦伏人有盗其車盖者昌初無所言後乃宻遣親客至門下賊曺家掩取得之遂収其家一時殺戮大姓戰懼皆稱神明朝廷舉能遷蜀郡太守先太守李根年老多悖政百姓侵寃及昌到吏人訟者七百餘人悉為斷理莫不得所宻捕盗帥一人脅使條諸縣彊暴之人姓名居處乃分遣掩捕無有遺脱宿惡大姦皆奔走他境初昌為州書佐其婦歸寕於家遇賊被獲遂流轉入蜀為人妻其子犯事乃詣昌自訟昌疑母不類蜀人因問所由對曰妾夲餘姚戴次公女州書佐黄昌婦也妾嘗歸家為賊所畧遂至於此昌驚呼前謂曰何以識黄昌邪對曰昌左足心有黑子常自言當為二千石昌乃出足示之因相持悲泣還為夫婦視事四年徵再遷陳相縣人彭氏舊家豪縦造起大舍髙樓臨道昌毎出行縣彭氏婦人輙升樓而觀昌不喜遂敕收付獄按殺之又遷為河内太守又再遷頴川太守永和五年徵拜將作大匠漢安元年進補大司農左轉太中大夫卒於官陽球字方正漁陽泉州人也家世大姓冠盖球能撃劒習弓馬性嚴厲好申韓之學郡吏有辱其母者球結少年數十人殺吏滅其家由是知名初舉孝亷補尚書侍郎閑達故事其章奏處義處斷也常為䑓閣所崇信出為髙唐令以嚴苛過理郡守收舉㑹赦見原辟司徒劉寵府舉髙第九江山賊起連月不觧三府上球有理姦才拜九江太守球到設方畧凶賊殄破收郡内姦吏盡殺之遷平原相出教曰相前涖髙唐志埽姦鄙遂為貴郡所見枉舉昔桓公釋管仲射鉤之讐髙祖赦季布逃亡之罪雖以不徳敢忘前義况君臣分定而可懐宿昔乎令一蠲往愆期諸来効若受教之後而不改姦状者不得復有所容矣郡中咸畏服焉時天下大旱司空張顥條奏長吏苛酷貪汚者皆罷免之球坐嚴苦徵詣廷尉當免官靈帝以球九江時有功拜議郎遷将作大匠坐事論頃之拜尚書令奏罷鴻都文學曰伏承有敕中尚方為鴻都文學樂松江覽等三十二人圖象立贊以勸學者臣聞傳曰君舉必書書而不法後嗣何觀案松覽等皆出於微蔑斗筲小人依慿世戚附託權豪俛眉承睫徼進明時或獻賦一篇或鳥篆盈簡而位升郎中形圗丹青亦有筆不㸃牘辭不辯心假手請字妖偽百品莫不被䝉殊恩蟬蜕滓濁是以有識掩口天下嗟歎臣聞圖象之設以昭勸戒欲令人君動鑒得失未聞豎子小人詐作文頌而可妄竊天官垂象圗素者也今大學東觀足以宣明聖化願罷鴻都之選以消天下之謗書奏不省時中常侍王甫曺節等姦虐弄權扇動内外球嘗拊髀發憤曰若陽球作司𨽻此曺子安得容乎光和二年遷為司𨽻校尉王甫休沐里舎球詣闕謝恩奏收甫及中常侍淳于登袁赦尉􅛑中黄門劉毅小黄門龎訓朱禹齊盛等及子弟為守令者姦猾縦恣罪合滅族太尉段熲謟附佞倖宜並誅戮於是悉收甫熲等送洛陽獄及甫子永樂少府萌沛相吉球自臨考甫等五毒備極萌謂球曰父子既當伏誅少以椘毒假借老父球曰若罪惡無状死不滅責乃欲球假借邪萌乃罵曰爾前事吾父子如奴奴敢反汝主乎今日困吾行自及也球使以土塞口箠朴交至父子悉死杖下熲亦自殺乃僵磔甫屍於夏城門大署榜曰賊臣王甫盡沒入財産妻子皆徙比景球既誅甫復欲以次表曺節等乃敕中都官從事曰且先去大猾當次案豪右權門聞之莫不屏氣諸奢飾之物皆各緘縢不敢陳設京師畏震時順帝虞貴人葬百官會䘮還曺節見磔甫屍道次慨然抆淚曰我曺自可相食何宜使犬䑛其汁乎語諸常侍今且俱入勿過里舍也節直入省白帝曰陽球故酷暴吏前三府奏當免官以九江微功復見擢用愆過之人好為妄作不宜使在司𨽻以騁毒虐帝乃徙球為衛尉時球出謁陵節敕尚書令召拜不得稽留尺一球被召急因求見帝叩頭曰臣無清髙之行横䝉鷹犬之任前雖糾誅王甫段熲盖簡落狐狸未足宣示天下願假臣一月必令豺狼鴟梟各服其辜叩頭流血殿上呵叱曰衛尉扞詔邪至於再三乃受拜其冬司徒劉郃與球議收案張譲曺節節等知之共誣白郃等語已見陳球傳遂收球送洛陽獄誅死妻子徙邊王吉者陳留浚儀人中常侍甫之養子也甫在宦者傳吉少好誦讀書傳喜名聲而性殘忍以父秉權寵年二十餘為沛相曉達政事能斷察疑獄發起姦伏多出衆議課使郡内各舉姦吏豪人諸常有微過酒肉為臧者雖數十年猶加貶棄注其名籍専選剽悍吏撃斷非法若有生子不養即斬其父母合土棘埋之凡殺人皆磔屍車上随其罪目宣示屬縣夏月腐爛則以繩連其骨周徧一郡乃止見者駭懼視事五年凡殺萬餘人其餘􅃤毒刺刻不可勝數郡中惴怨莫敢自保及陽球奏甫乃就收執死於洛陽獄後魏于洛侯代人也為秦州刺史貪酷殘忍部人富熾奪鄊人吕勝脛纒一具洛侯鞭富熾一百截其右腕百姓王隴客刺殺人王差奴王愈二人依律罪死而洛侯生拔隴客舌刺其夲并刺胸腹二十餘瘡隴客不堪苦痛随刀戰動乃立四柱磔其手足命将絶始斬其首支體四觧分懸道路見者無不傷椘歎愕百姓王元夀等一時反叛有司糾劾孝文詔使者於州常刑人處宣告兵人然後斬洛侯以謝百姓胡泥代人也歴官至司衛監賜爵永安侯泥率勒禁中不憚豪貴殿中尚書叔孫侯頭應内直而闕於一時泥以法繩之侯頭恃寵遂與口諍孝文聞而嘉焉賜泥衣服一襲出為幽州刺史假范陽侯以北平陽尼碩學遂表薦之轉為定州刺史以暴虐刑罰酷濫受納貨賄徵還戮之將就法孝文臨太華殿引見遣侍臣宣詔責之遂就家賜盡李洪之本名文通恒農人也少為沙門晚乃還俗太平真君中為狄道護軍賜爵安陽男會永昌王仁随太武南征得元后姊妺二人洪之潛相餉遺結為兄弟遂便如親頗得元后在南兄弟名字乃改名洪之及仁坐事誅元后入宫得􅄑於文成生獻文元后臨崩太后問其親因言洪之為兄與相訣經日具條列南方諸兄珍之等手以付洪之遂號為獻文親舅太安中珍之等兄弟至都與洪之相見叙元后平生故事計長㓜為昆弟以外戚為河内太守進爵任成侯威儀一同刺史河内北連上黨南接虎牢地險人悍數為劫害長吏不能禁洪之至都嚴設科防募斬賊首便加重賞勤諭務本盗賊止息誅鋤姦黨過為酷虐後為懷州刺史封汲郡公徵拜内都大官河西羌胡領部落反叛獻文親征命洪之與侍中東郡王陸定總統諸軍輿駕至并州詔洪之為河西都将討山胡山胡皆保險拒戰洪之築壘於石樓南白鷄原以對之時諸將悉欲進攻洪之乃開以大信聼其復業胡人遂降獻文嘉之還拜尚書外都大官後為使持節安南將軍秦益二州刺史至任設姦禁之制有帶刃行者罪與劫同輕重品格各有條章於是大饗州中豪傑長老示之法制乃夜密遣騎分部覆諸要路有犯禁者輙捉至州宣告斬決其中枉見殺害者至有百數赤葩渴郎羌深居山谷雖相羈維王人罕到洪之芟山為道廣十餘歩示以軍行之勢乃興軍臨其境山人驚駭洪之将數十騎至其里閭撫其妻子問所疾苦因資遺之衆羌喜悦求編課調所入十倍於常洪之善御戎夷頗有威惠而刻害之聲聞於朝野初洪之微時妻張氏亦聰彊婦人自貧賤至富貴多所補益有男女幾十人洪之後得劉芳從姊重之疎張氏亦多所産育為兩宅别居偏厚劉室由是二妻妬競兩宅母子徃來如讐及涖西州以劉自隨洪之素非廉清每有受納時孝文始建禄制法禁嚴峻遂鎖洪之赴京親臨太華庭集羣臣數之以其大臣聼在家自裁洪之志慷慨多所堪忍疾病灸療艾炷圍將二寸首足十餘處一時俱下言笑自若接賔不輟及臨盡沐浴衣幍防卒扶持出入遍廵家庭如是再三泣歎良久乃臥而引藥始洪之託為元后兄公私自同貴戚至此罪後孝文乃稍對百官辯其誣假而諸李猶善相視恩紀如親洪之始見元后計年為兄及珍之等至洪之以元后集定長㓜其呼拜坐皆如家人暮年數延携之宴飲醉酣之後時或言及本末洪之則起而加敬笑語自若初洪之富貴赫奕以舅戚之家自居遂棄宗專附珍之等後頗存振本屬而猶不顯然劉氏四子長子神少有膽畧以氣尚為名以軍功封長樂縣男累遷平東將軍太中大夫孝昌中行相州事尋正加撫軍葛榮盡鋭攻之久不能尅會葛榮見禽以功進爵為公元顥入洛莊帝北廵以神為侍中又除殿中尚書仍行相州事車駕還宫改封安康郡公普泰元年進驃騎大將軍儀同三司相州大中正薨贈司徒公冀州刺史子士豹齊受禪例降髙遵字世禮勃海蓨人也父濟滄水太守封浮陽子遵賤出也其兄矯等常欺侮之及父亡不令在䘮位遵遂馳赴平城歸其族兄允允時大有譽望為作計策乃為遵父舉哀以遵為喪主京邑無不弔集朝貴咸識之徐歸奔赴免喪後為營宦路遵感成益之恩事允如諸父渉歴文史頗有筆札隨都將長廣公侯窮奇等平定三齊以功賜爵髙昌男補安定王相撰太和安昌二殿畫圖後與中書令髙閭增改律令進中書侍郎假中書令詣長安刋燕宣王廟碑進爵安昌子使濟兖徐三州觀風理訟進中都令及新製衣冠孝文恭薦宗廟遵形貌莊潔音氣雄暢常兼太祝令跪賛禮事為俯仰之節粗合儀矩由是帝頗識待之後與游明根高閭李沖等入議律令親對御坐時有陳奏出為齊州刺史建節歴本州宗鄉改觀而矯等彌妬毁之遵性不廉清在中書時每假歸山東必借備騾馬將從百餘屯逼人家不得絲縑滿意則詬詈不去旬月之間縑布千數郡邑苦之既莅方岳本意未弭選召僚吏多所取納又其妻明氏家在齊州母弟舅甥共相慿屬争取貨利嚴暴非理殺害甚多貪酷之響帝頗聞之及車駕幸鄴遵自州來朝會有赦宥遵臨還州請辭帝於行宫引見誚讓之遵自陳無負帝厲聲曰若無遷都赦必無高遵矣又卿非唯貪惏又虐於刑法卿謂何如濟陰王濟陰王猶不免於法卿何人而為此行自今宜自謹約還州仍不悛革齊州人孟僧振至洛訟遵詔廷尉少卿鄧述窮鞫皆如所訴先是沙門道登過遵遵以道登荷眷於孝文多奉以貨深託仗之道登因言次申咨救遵帝不省納遂詔賜遵死時遵子元榮詣洛訟寃猶恃道登不時還赴道登知事決方乃遣之遵恨其妻不與訣别處沭浴引椒而死元榮學尚有文才長於几案位兼尚書右丞出為西道行臺至髙平鎮遇城翻被害遵弟次文雖無位宦而資産巨萬遵每責其財又結憾於遵吉凶不相徃返時論責之張赦提中山安喜人也性雄武有規畫初為虎賁中郎將京畿盗魁首稱豹子彪子並善弓馬於靈邱應門間聚為劫害至乃斬人首射其口刺人臍引腸遶樹而共射之以為戲笑其暴酷如此軍騎掩捕久弗能獲行者患焉赦提為逐賊軍將未㡬而獲彪子豹子及其黨與盡送京師斬於闕下自是清静其靈邱羅思祖宗門豪溢家處隘險多止亡命與之為劫獻文怒之孥戮其家而思祖家黨復相率寇盗赦提募求捕逐以赦提為游徹軍將前後禽獲殺之略盡因此濫有屠害尤為忍酷既資前稱又藉此功除幽州刺史假安喜侯赦提克已厲約遂有清稱後頗縱妻叚氏多有受納命僧尼因事通請貪虐流聞中散李眞香出使幽州採訪牧守政績眞香驗案其罪赦提懼死欲逃其妻姑為太尉東陽王丕妻恃丕親貴自許詣丕申訴求助謂赦提曰當為訴理幸得申雪願寛憂不為異計赦提以此差自觧慰叚乃陳列真香昔嘗因假而過幽州知赦提有好牛從索不果令臺使止挾前事故威逼部下拷楚過極横以無辜證成誣罪於是執事恐有不盡使駕部令趙秦州重往究訊事狀如前處赦提大辟孝文詔賜死於第將就盡召妻而責之曰貪濁穢吾者卿也又安吾而不能免禍九泉之下當為仇讐矣又有華山太守趙霸酷暴非理大使崔光奏霸云不遵憲度威虐任情至乃手撃吏人僚屬奔走不可以君人字下納之軌物輙禁止在州詔免所居官羊祉字靈祐太山鉅平人晉太僕卿琇之六世孫也父規之宋任城令太武南討至鄒山規之與魯郡太守崔邪利及其屬縣徐遜愛猛之等俱降賜爵鉅平子拜鴈門太守祉性剛愎好刑名為司空令輔國長史襲爵鉅平子侵盗公資私營居宅有司按之抵死孝文特恕逺徙後還景明初為將作都將加左軍將軍四年持節為梁州軍司討叛氐正始二年王師伐蜀以祉假節龍驤將軍益州刺史出劒閣而還又以本將軍為秦梁二州刺史加征虜將軍天性酷忍又不清潔坐掠人為奴婢為御史中尉王顯所彈免髙肇執政祉復被起為光禄大夫假平南將軍持節領歩騎三萬先驅趣陪未至宣武崩班師夜中引軍山有二徑軍人迷而失路祉便斬隊副楊明逹梟首路側為中尉元昭所劾會赦免後加平北將軍未拜而卒贈安東將軍兖州刺史諡曰景祉自當官不憚彊禦朝廷以為剛斷時有撿覆每令出使然好慕刑名頗為深文所經之處人號天狗下及出將臨州並無恩潤兵人患其嚴酷子深自有傳崔暹字元欽本云清河東武城人也世家于滎陽潁川之間性猛酷少仁恕姦猾好利能事勢家初以秀才累遷南兖州刺史盗用官瓦贓汚狼籍為御史中丞李平所糾免官後行豫州事尋即真坐遣子析户分𨽻三縣廣占田宅藏匿官奴障恡陂葦侵盗公私為御史中尉王顯所彈免官後累遷瀛州刺史貪暴安忍人庶患之嘗出獵州北單騎至人村有汲水婦人暹令飲馬因問曰崔瀛州何如婦人不知是暹答曰百姓何罪得如此癩兒刺史暹黙然而去以不稱職被解還京武川鎮反詔暹與都督李崇討之違崇節度為賊所敗單騎潛還禁於廷尉以女妓田園貨元义獲免建義初遇害於河隂贈司徒公冀州刺史追封武津縣公子瓚字結珍位兼尚書左丞卒瓚妻荘帝妹也後封襄城長公主故特贈瓚冀州刺史子茂字祖昂襲祖爵酈道元字善長范陽涿鹿人也父範青州刺史自有傳道元初襲爵永寧侯例降為伯御史中尉李彪以道元執法清刻自太傅掾引為書侍御史彪為僕射李沖所奏道元以屬官坐免景明中為冀州鎮東府長史刺史于勁順皇后父也西討關中亦不至州道元行事三年為政嚴酷吏民畏之姦盜逃於他境後試守魯陽郡道元表立黌序崇勸學教詔曰魯陽本以蠻人不立大學今可聽之以成良守文翁之化道元在郡山蠻伏其威名不敢為宼延昌中為東荆州刺史威猛為政如在冀州蠻人詣闕訟其刻峻請前刺史宼祖禮及以遣戍兵七十人送道元還京二人並坐免官後為河南尹明帝以沃野懐朔薄骨律武川撫冥柔元懐荒禦夷諸鎮並改為州其郡縣戍名今凖古城邑詔道元持節兼黄門侍郎馳驛與大都督李崇籌宜等立裁減去留㑹諸鎮叛不果而還孝昌初梁遣將攻揚州刺史元法僧又於彭城反叛詔道元持節兼侍中攝行臺尚書節度諸軍依僕射李平故事梁軍至渦陽敗退道元追討多有斬獲後除御史中尉道元素有嚴猛之稱權豪始頗憚之而不能有所糾正聲望更損司州牧汝南王悅嬖近左右邱念常與卧起及選州官多由於念念常匿悅第時還其家道元密訪知收念付獄悅啓靈太后請全念身有敕赦之道元遂盡其命因以劾悅時雍州刺史蕭寳夤反狀稍露侍中城陽王徽素忌道元因諷朝廷遣為關右大使寳夤慮道元圖已遣其行臺郎中郭子帙圍道元於隂盤驛亭亭在岡上常食岡下之井既被圍穿井十餘丈不得水水盡力屈賊遂踰牆而入道元與其弟及二子同時被害道元瞋目叱賊厲聲而死寳夤猶遣斂其父子殯於長安城東事平喪還贈吏部尚書冀州刺史安定縣男道元好學歴覽竒書撰注水經四十卷夲志十三篇又為七聘及諸文皆行於世然兄弟不能篤睦又多嫌忌時論薄之子孝友襲谷楷昌黎人也曽祖渾侍中儀曺尚書自有傳楷有局幹稍遷至奉車都尉眇一目性甚嚴急前後奉使皆以酷暴為名時人號曰瞎虎累遷城門校尉卒北齊邸珍字安寳夲中山上曲陽人也魏太和中徙居武川鎮孝昌中六鎮兵起珍遂從杜洛周賊洛周為葛榮所吞珍入榮軍榮為爾朱榮所破珍與其餘黨俱徙并州從神武出山東神武起義信都拜珍長史上曲陽縣侯除殷州刺史珍求取無厭大為州人所疾苦徴兼尚書右僕射大行臺節度諸軍事撃梁州將成㬌儁等解東行圍回軍彭城珍御下殘酷士衆離心至於土人豪族遇之無禮遂為州人所害後贈定州刺史司徒公宋游道敦煌人也髙祖繇從沮渠牧犍歸魏賜爵清水公繇子巖襲爵改為西平侯巖子蔭中書議郎樂安王範從事中郎蔭子季預渤海太守游道季預之子也随父在郡父亡吏民贈遺一無所受事母以孝聞與叔父别居叔父為奴誣以構逆游道誘令返雪而殺之魏廣陽王深北伐請為鎧曺及為定州刺史又以為府佐廣陽為葛榮所殺元徽誣其降賊收錄妻子游道為訴得釋與廣陽子迎喪返葬中尉酈善長嘉其氣節引為殿中侍御史臺中語曰見惡能討宋游道孝莊即位除左兵中軍為尚書令臨淮王彧譴責游道乃執版長揖曰下官謝王瞋不謝王理即日詣闕上書曰徐州刺史元孚頻有表云偽梁廣發士卒圍彭城乞増羽林二千以孚宗室重臣告請應實所以量奏給武官千人孚今代下以路阻自防遂納在防羽林八百人辭云疆境無事乞將還家臣忝局司深知不可尚書令臨淮王彧即孚之兄子遣省事謝逺三日之中八度逼迫云宜依判許臣不敢附下罔上孤負聖明但孚身在任乞師相繼及其代下便請放還進退為身無憂國之意所請不合其罪宜下科彧乃召臣於尚書都堂云卿一小郎憂國之心豈厚於我醜罵溢口不顧朝章右僕射臣世隆吏部郎中臣薛琡已下百餘人並皆聞見臣實獻直言云忠臣奉國事在其心亦復何簡貴賤比自北海入洛王不能致身死難方清宫以迎簒賊鄭先䕶立義廣州王復建旗徃討趣惡如流伐善何速今得冠冕百僚乃欲為私害政為臣此言彧賜怒更甚臣既不佞干犯貴臣乞解郎中帝召見游道嘉勞之彧亦奏言臣忝冠百僚遂使一郎攘袂髙聲肆言頓挫乞解尚書令帝乃下敕聽解臺郎後除司州中從事時將還鄴㑹霖雨行旅擁於河橋游道於幕下朝夕宴歌行者曰何時節作此聲也固大癡游道應曰何時節而不作此聲也亦大癡後神武自太原來朝見之曰此人是宋游道邪嘗聞其名今日始見其面遷游道别駕後日神武之司州饗朝士舉觴屬游道曰飲髙歡手中酒者大丈夫卿之為人合飲此酒及還晉陽百官辭於紫陌神武執游道手曰甚知朝貴中有憎忌卿者卿但用心莫懐畏慮當使卿位與之相似於是唘以游道為中尉文襄執請乃以吏部郎中崔暹為御史中尉以游道為尚書左丞文襄謂暹游道曰卿一人處南臺一人處北省當使天下肅然游道入省劾太師咸陽王坦太保孫騰司徒髙隆之司空侯景錄尚書元弼尚書令司馬子如等官貸金銀催徴酬價雖非指事贓賄終是不避權豪又奏駮尚書違失數百條省中豪吏王儒之徒並鞭斥之始依故事於尚書省立問名以記出入早晚令僕以下皆側目魏安平王坐事亡章武二王及諸王妃太妃是其近親者皆被徴責都官郎中畢義雲主其事有奏而禁有不奏而輙禁者游道判下廷尉科罪髙隆之不同於是反誣游道厲色挫辱己遂枉拷群令史證成之與左僕射襄城王旭尚書鄭述祖等上言曰飾偽亂真國法所必去附下罔上王政所不容謹案尚書左丞宋游道名望本闕功績何紀屬永安之始朝士亡散乏人之際叨竊臺郎躁行謟言肆其姦詐罕識名義不顧典文人鄙其心衆畏其口出州入省歴忝清資而長惡不悛曽無忌諱毁譽由已憎惡任情比因安平王事遂肆其褊心因公報隙與郎中畢義雲遞相糾舉又左外兵郎中魏叔道牒云局内降人左澤等為京畿送省令取保放出大將軍在省日判聽游道發怒曰徃日官府成何物官府將此為例又云乗前㫖格成何物㫖格依事請問游道並皆承引案律對捍詔使無人臣之禮大不敬者死對捍使者尚得死坐况游道吐不臣之言犯慢上之罪口稱夷齊心懐盜跖欺公買法受納苞苴産随官厚財與位積雖贓汚未露而姦詐如是舉此一隅餘詐可騐今依禮據律處游道死罪是時朝士皆忿為游道不濟而文襄聞其與隆之相抗之言謂楊遵彦曰此真是鯁直大剛惡人遵彦曰譬之畜狗本取其吠今以數吠殺之恐將來無復吠狗詔付廷尉游道坐除名文襄使元景康謂之曰卿且逐我向并州他經略不忍殺卿游道從至晉陽以為大行臺吏部又以為太原公開府諮議及平陽公為中尉游道以諮議領書侍御史尋以本官兼司徒左長史及文襄疑黄門郎温子昇知元瑾之謀繋諸獄而餓之食弊襦而死棄屍路隅游道收而葬之文襄謂曰吾近書與京師諸貴論及朝士云卿僻於朋黨將為一病今卿真是重舊節義人此懐不可奪子昇吾本不殺之卿葬之何以憚天下人代卿怖者是不知吾心也尋除御史中尉東萊王道習參御史選限外投狀道習常與游道有舊使令史受之文襄怒收游道辯而判之曰游道禀性獷悍是非肆己吹毛洗垢創疵人物徃與郎中蘭景雲忿競列事十條及加推窮便是虚妄方共道習阿黨雜穢陵侮朝典法官而犯特是難原宜付省下科罪游道被禁獄掾欲為之脫枷游道不肯曰此令公命所着不可輙脫文襄聞而捨之游道抗直不改天保元年以游道兼太府卿乃於少府覆檢主司盜贓得鉅萬計姦吏反誣奏之下獄尋得出不歸家徑之府理事未㡬卒遺令薄葬不立碑表不求贈諡已而贈𤓰州刺史武平中以子士素久典機密重贈三司諡曰貞惠游道剛直疾惡如讎見人犯罪欲皆致之極法糾彈見事又好察陰私問獄察情捶撻嚴酷兖州刺史李子貞在州貪暴游道按之文襄以子貞豫建義勲意將含忍游道疑陳元康為其内助密啓云子貞與元康交游恐其别有請屬文襄怒於尚書都堂集百僚撲殺子貞又兖州人為游道生立祠堂像題曰忠清君游道又别劾吉寧等五人同死有欣悅色朝士甚鄙之然重交游存然諾之分歴官嚴整而時有納賄必分及親故之艱匱者其男女孤弱為嫁娶之臨喪必哀躬親營視為司州綱紀與牧樂昌西河二王乖忤及二王薨每事經恤之與頓邱李奨一面便定死交奨曰我年位已髙㑹用弟為佐史令弟北面於我足矣游道曰不能既而奨為河南尹辟游道為中正使者相屬以衣帢待之握手歡謔元顥入洛奬受其命出使徐州都督元孚與城人趙紹共殺之游道為奬訟寃得雪又表為請贈回已考一汎階以益之又與劉廞結交託廞弟粹於徐州殺趙紹後劉廞伏法於洛陽粹以徐州叛官軍討平之梟粹首於鄴市孫騰使客告市司得五百疋後聽收游道時為司州中從事令家人作劉粹所親於州陳訴依律判許而奏之敕至市司猶不許游道杖市司勒使速付騰聞大怒游道立理以抗之既收粹屍厚加贈遺李奬二子構訓居貧游道後令其求三富人死事判免之凡得錢百五十萬盡以入構訓其使氣黨俠如此時人語曰游道獼猴面陸操科斗形意識不關見切謂醜者必無情構嘗因游道㑹客因戲之曰賢從在内外大好人宜自迎接為通名稱族弟游山游道出見之乃獼猴而衣㡌也將與構絶構謝之豁然如舊游道死後構為定州長史游道第三子士遜為博陵王墨曺管記與典籖共誣奏構構於禁所祭游道而訴焉士遜晝臥如夢者見游道怒己曰我與構恩義汝豈不知何共小人謀陷清直之士士遜驚跪曰不敢不敢旬日而卒游道每戒其子士素士約士慎等曰吾執法太剛數遭屯蹇性自如此子孫不足以師之諸子奉父言柔和謙遜士素沈密少言有才識稍遷中書舎人趙彦深引入内省參典機密歴中書黄門侍郎遷儀同三司散騎常侍恒領黄門侍郎自處機要近二十年周慎温恭甚為彦深所重初祖珽知朝政出彦深為刺史珽奏以士素為東郡太守中書侍郎李徳林白珽留之由是還除黄門侍郎共典機密士約亦為善士官尚書左丞盧斐字子章范陽涿人也父同魏殿中尚書自有傳斐性殘忍以彊斷知名文襄引為大將軍府刑獄參軍謂云狂簡斐然成章非嘉名字也天保中稍遷尚書左丞别典京畿詔獄斐酷濫非人情所為無問事之大小拷掠過度於大棒車輻下死者非一或嚴冬至寒置囚於冰雪之上或盛夏酷熱暴之日下枉陷人致死者前後百數又伺察官人罪失動即奏聞朝士見之莫不重跡屏氣皆目之為盧校事斐揚揚得志言必自矜後以謗史事與李庶俱被鞭杖死獄中畢義雲小字陁兒東平須昌人也曽祖衆敬魏兖州刺史自有傳父祖暉豳州刺史義雲少麤俠家在兖州北境常劫掠行旅州里患之晚方折節從宦累遷尚書都官郎中性嚴酷事多幹了文襄作相以為稱職令普勾偽官專以車輻考掠所獲甚多然大起怨謗曽為司州吏所訟云其有所减截并改換文書文襄以其推偽衆人怨望並無所問乃拘吏數而斬之因此銳情訊鞫威名日盛文宣受禪除書侍御史彈射不避勲親累遷御史中丞繩劾更切然豪横不平頻被怨訟前為汲郡太守翟嵩啓列義雲從父兄僧明負官債先任京畿長史不受其屬立限切徴由此挾嫌數遣御史過郡訪察欲相推繩又坐私藏工匠家有十餘機織錦并造金銀噐物乃被禁止尋見釋以為司徒左長史尚書左丞司馬子瑞奏彈義雲稱天保元年四月竇氏皇姨祖載日内外百官赴第弔省義雲唯遣御史投名身遂不赴又義雲啓云喪婦孤貧後娶李世安女為妻世安身雖父服未終其女為祖已就平吉特乞闇迎不敢備禮及義雲成婚之夕衆禮備設尅日拜閤鳴騶清路盛列羽儀兼差臺吏二十人責其鮮服侍從車後直是茍求成昏誣罔干上義雲資産宅宇足稱豪室忽稱孤貧亦為矯詐又駕幸晉陽都坐判拜起居表四品以下五品以上令預前一日赴南都署表三品以上臨日署訖義雲乃乖例署表之日索表就家先署臨日遂稱私忌不來於是詔付廷尉科罪尋敇免推子瑞又奏彈義雲事十餘條多煩碎罪止罰金不至除免子瑞從兄消難為北豫州刺史義雲遣御史張子階詣州採風聞先禁其典籖家客等消難危懼遂叛入周時論歸罪義雲云其規報子瑞事亦上聞爾前讌賞義雲常預從此後集見稍疎聲望大損乾明初子瑞遷御史中丞鄭子黙正被任用義雲之姑即子黙祖母遂除度支尚書攝左丞子黙誅後左丞便解孝昭赴晉陽髙元海留鄴義雲深相依附知其信向釋氏常隨之聼講為此欵密無所不至及孝昭大漸顧命武成髙歸彦至都武成猶致疑惑元海遣犢車迎義雲入北宫參審遂與元海等勸進仍從幸晉陽參預朝政尋除兖州刺史給後部鼓吹即本州也軒昻自得意望銓衡之舉見諸人自陳逆許引接又言離别暫時非乆在州先有鐃吹至於按部行游兩部並用猶作書與元海論叙時事元海入内不覺遺落給事中李孝貞得而奏之為此元海漸踈孝貞因事兼中書舎人又髙歸彦起逆義雲入州私集人馬并聚甲仗將以自防實無他意為人密啓及歸彦被擒又列其朋黨専擅為此追還武成猶録其往誠竟不加罪除兼七兵尚書義雲性豪縱頗以施惠為心累世本州刺史家富於財士之匱乏者多有拯濟及貴恣情驕侈營造第宅宏壯未幾而成閨門穢雜聲徧朝野為郎時與左丞宋游道因公事忿競游道廷辱之云雄狐之詩千載為汝義雲一無所答然暴酷殘忍非人理所及為家尤甚子姓僕𨽻恒瘡痍徧體有孽子善昭性至凶頑與義雲侍婢姦通搒掠無數為其著籠頭繋之庭樹十餘日乃釋之夜中義雲被賊害即善昭所佩刀也遺之於義雲庭中善昭聞難奔哭家人得佩刀善昭怖便走出投平恩墅舎旦日武成令舎人是蘭子暢就宅推之爾前義雲新納少室范陽盧氏有色貌子暢疑盧姦人所為將加拷掠盧具列善昭云爾乃收捕繋臨漳獄將斬之邢邵上言此乃大逆義雲又是朝貴不可發乃斬之於獄棄屍漳水隋庫狄士文善無人也祖干齊太宰自有傳父伏敬泗州刺史士文性孤直雖鄰里至親莫與通狎少讀書傳在齊襲封章武郡王官至領軍將軍周武帝平齊山東衣冠多來迎周師惟士文閉門自守帝竒之授開府儀同三司隨州刺史髙祖受禪加上開府封湖陂縣子尋拜貝州刺史性清苦不受公料家無餘財其子嘗噉官厨餅士文枷之於獄累日杖之二百步送還京僮𨽻無敢出門所置鹽菜必於外境凡有出入皆封署其門親舊絶迹慶弔不通法令嚴肅吏民股慄道不拾遺有細過必深文陷害嘗入朝遇上置酒髙㑹賜公卿入左藏任取多少人皆極重士文獨口衘絹一疋兩手各持一匹上問其故士文曰臣口手俱滿餘無所須上異之别加賞賜物勞而遣之士文至州發摘奸隐長吏尺布斗粟之贓無所寛貸得千餘人而奏之上悉配防嶺南親戚相送哭泣之聲遍於州境至嶺南遇瘴癘死者十八九於是父母妻子惟哭士文士文聞之令人捕搦捶楚盈前而哭者彌甚有京兆韋焜為貝州司馬河東趙達為清河令二人並苛刻惟長史有惠政時人為之語曰刺史羅刹政司馬蝮蛇瞋長史含笑判清河生喫人上聞之歎曰士文之暴過於猛虎竟坐免未幾以為雍州長史士文謂人曰我向法深不能窺候貴要無乃必死此官矣及下車執法嚴正不避貴戚賓客莫敢至門人多怨望士文從父妹為齊氏嬪有色齊滅之後賜薛國公長孫覽為妾覽妻鄭氏性妬譖之於文獻后后令覽離絶士文恥之不與相見後應州刺史唐君明居毋憂聘以為妻由是士文君明並為御史所劾士文性剛在獄數日憤恚而死家無餘財有子三人朝夕不繼親友無贍之者田式字顯標馮翊下邽人也祖安興父長樂仕魏俱為本郡太守式性剛果多武藝拳勇絶人仕周位渭南太守政尚嚴猛吏民重足而立無敢違法遷本郡太守親故屏跡託請不行周武帝聞而嘉之進位儀同三司賜爵信都縣公擢拜延州刺史從平齊以功授開府徙為建州刺史改封梁泉縣公後從韋孝寛討尉遲迴以功拜大將軍進爵武山郡公髙祖受禪拜襄州總管専以立威為務每視事于外必盛氣以待其下官屬股慄無敢仰視有犯禁者雖至親昵無所容貸其女壻京兆杜寜自長安省之式誡寜無出外寜乆之不得還竊上北樓以暢羈思式知之笞寜五十其所愛奴嘗詣式白事有蟲上其衣衿揮袖拂去之式以為慢已立棒殺之或寮吏奸贓部内劫盜者無問輕重悉禁地穽中寢處糞穢令其苦毒自非身死終不得出每赦書到州式未暇省讀先召獄卒殺重囚然後宣示百姓其刻暴如此由是為上所譴除名式慙恚不食妻子至其所輙怒唯侍僮二人給使左右從家中索椒欲自殺家人不與隂遣侍僮詣市買毒藥妻子又奪棄之式恚臥其子信時為儀同至式前流涕曰大人既是朝廷重臣又無大過比見公卿放辱者多矣旋復升用大人何能乆廢乎乃至於此式歘起抽刀斫信信避之刃中於門上知之以式為罪已之深復其官爵尋拜廣州總管卒官燕榮字貴公華隂𢎞農人也父侃周大將軍榮性剛嚴有武藝仕周為内侍上士從武帝伐齊以功授開府儀同三司封髙邑縣公髙祖受禪進位大將軍進封落叢郡公拜晉州刺史尋從河間王𢎞擊突厥以功拜上柱國遷青州總管在州選絶有力者為伍伯吏人有過者必加詰問輙楚撻之創多見骨姦盜屏跡境内肅然他州縣人經其界者畏若冦讐不敢休息後因入朝覲特加恩遇榮以母老請每歳入朝上許之伐陳之役以為行軍總管率水軍自東萊傍海入太湖取呉郡既破丹陽呉人共立蕭瓛為主阻兵於晉陵為宇文述所敗退保包山榮乃率精甲五千躡之瓛敗走為榮所執晉陵會稽悉平以功檢校楊州總管尋徵為武候將軍突厥寇邊以為幽州總管榮性嚴酷有威容長吏見者莫不惶懼自失范陽盧氏世為著姓榮皆署為吏卒以屈辱之鞭笞在左右動至千數流血盈前飲噉自若嘗按部道次見叢荆堪為笞箠命取之輙以試人人或自陳無咎榮曰後有罪當免及後犯細過將撾之人曰前日被杖許有罪宥之榮曰無過尚爾況有過乎搒捶如舊榮每廵省管内問人吏妻有美色者輙舎其室而淫之貪暴放縱日甚時元𢎞嗣除幽州刺史懼辱固辭上知之敕榮曰𢎞嗣杖十已上罪皆奏聞榮忿曰豎子何敢弄我及遣𢎞嗣監納倉粟颺得一糠一粃輙罰之每笞不滿十然一日中或至三數如是歴年怨隙日構榮遂收付獄禁絶其糧𢎞嗣饑抽衣絮雜水咽之其妻詣闕稱寃上遣考功侍郎劉士龍馳驛鞫問士龍奏榮毒虐又贓穢狼藉遂徵還京賜死先是榮家寢室無故有蛆數斛從地墳出未幾榮死於所出之處有子詢趙仲卿河南洛陽人也父剛周利州總管周史有傳仲卿性麤暴有膂力周齊王憲甚禮之以軍功位上儀同為畿伯中大夫後以平王謙功進位大將軍封長垣縣公髙祖受禪進河北郡公尋拜石州刺史法令嚴猛纎介之失無所寛捨鞭笞輙至二百吏民戰慄無所違犯盜賊屏息皆稱其能遷朔州總管時塞北盛興屯田仲卿總統之㣲有不理者仲卿輙召主掌撻其胸背或解衣倒曵於荆棘中時人謂之於莵然事多克濟由是收穫歳廣邊戍無餽運之憂會突厥啓民可汗求婚上許之仲卿因是間其骨肉遂相攻撃十七年啓民窘迫與隋使長孫晟投通漢鎮仲卿率騎千餘援之達頭不敢逼潛遣人誘致啟民所部至者二萬餘家其年從髙熲指白道以撃達頭仲卿為前鋒至族蠡山與虜遇交戰七日大破之追奔至乞伏泊復啓民突厥悉衆而至仲卿為方陣四面拒戰經五日會髙熲大兵至合擊之虜乃敗走追度白道踰秦山七百餘里時突厥降者萬餘家上令仲卿處之恒安以功進上柱國朝廷慮達頭掩襲啓民令仲卿屯兵二萬人以備之代州總管韓洪永康公李藥王蔚州刺史劉隆等將歩騎一萬鎮恒安達頭來冦韓洪軍大敗仲卿自樂寜鎮邀撃斬千餘級明年督役築金河定襄二城以居啓民時有上表言仲卿酷暴上命御史王偉按之並實惜其功不罪因勞之曰知公清正為下所惡賜物五百叚仲卿益恣由是免官仁壽初檢校司農卿蜀王秀之得罪奉詔往益州按之秀賓客經過處仲卿必深文致法州縣長吏坐者大半上以為能賞奴婢五十口黄金二百兩米粟五千石奇寳雜物稱是煬帝嗣位判兵部工部二尚書事卒官謚曰肅子世𢎞嗣崔𢎞度字摩訶衍博陵安平人也祖楷魏司空父說周大将軍安平縣公𢎞度膂力絶人儀貌魁岸鬚面甚偉性嚴酷年十七周大冢宰宇文䕶引為親信累轉大都督時䕶子中山公訓為蒲州刺史令𢎞度從焉常與訓登樓至上層去地四五丈俯臨之訓曰可畏也𢎞度曰此何足畏歘然擲下至地無損傷訓大竒之後以戰功授儀同從武帝平齊進位上開府鄴縣公賜物三千叚粟三千石奴婢百口雜畜千計尋從汝南公宇文神舉破盧昌期于范陽復從鄖國公韋孝寛經畧淮南𢎞度進攻夀陽降陳守将吴文立以前後勲進位上大将軍襲父爵安平縣公及尉遲迥作亂以𢎞度為行臺總管從韋孝寛討之𢎞度募長安驍雄數百人為别隊所當無不披靡𢎞度妹先適迥子為妻及破鄴城迥窘廹升樓𢎞度直上龍尾追之迥彎弓将射𢎞度𢎞度脫兠鍪謂迥曰相識不今日各圖國事不得顧私事以親戚之情謹遏亂兵不使侵辱幸早為身計何所待也迥擲弓于地罵大丞相極口而自殺𢎞度顧其弟𢎞昇曰汝可取迥頭𢎞昇遂斬之進位上柱國時行軍總管例封國公以𢎞度不時殺迥致縱惡言由是降爵一等為武鄉郡公開皇初以行軍總管拒突厥於原州還拜華州刺史納妺為秦孝王妃尋遷襄州總管𢎞度素貴御下嚴急所在令行禁止盗賊屛跡梁主蕭琮来朝被止以𢎞度為江陵總管鎮荆州陳人惮之不敢窺境以行軍總管從秦孝王平陳賜物五千叚髙智慧等作亂復以行軍總管𨽻楊素出討𢎞度與素品同而年長于素素每屈下之一旦𨽻素意甚不平素亦優容之及還以行軍總管檢校原州事以備胡無虜而退上甚禮之復以其弟𢎞昇女為河南王妃仁夀中檢校太府卿自以一門二妃無所降下每誡其寮吏曰人當誠慤毋得欺誑皆曰諾後嘗食鼈侍者八九人𢎞度一一問之曰鼈羙乎人懼之皆云鼈羙𢎞度大罵曰傭奴何敢誑我汝初未食鼈安知其羙俱杖之八十官属百工見之者莫不流汗無敢欺隐時有屈突盖者為武候車騎亦嚴刻長安為之語曰寕飲三斗醋不見崔𢎞度寕炙三年艾不逢屈突盖然𢎞度理家如官子孫班白動行捶楚閨門整肅為當世所稱未㡬秦王妃以罪誅河南王妃復被廢𢎞度憂恚謝病于家諸弟乃與之别居彌不得志煬帝即位河南王為太子帝将復立崔妃遣中使就第宣旨使者詣𢎞昇家𢎞度不之知使者反帝曰𢎞度有何言使者曰𢎞度稱疾不起帝黙然其事竟寝𢎞度憂憤未㡬卒𢎞昇字上客在周為右侍上士從平尉遲迥以功拜上儀同尋加開府封黄䑓縣侯髙祖受禅進爵為公授驃騎将軍歴慈鄭二州刺史襄州總管以戚属故待遇隆重及河南王妃罪廢𢎞昇亦免官煬帝即位歴冀州刺史信都太守位金紫光禄大夫轉涿郡太守遼東之役檢校左武衞大将軍事詣平壤與宇文述等同敗奔還發病卒元𢎞嗣河南雒陽人也祖剛魏漁陽王父經周漁陽郡公𢎞嗣少襲爵年十八為左親衞開皇九年從晉王平陳以功授上儀同後除觀州長史以嚴峻任事吏民怨之轉幽州長史于時燕榮為總管以酷虐聞榮毎肆虐於𢎞嗣嘗笞辱之𢎞嗣心不伏遂被禁語在榮傳及榮誅𢎞嗣為政酷又甚之每推鞫囚徒多以酢灌鼻或椓弋其下竅無敢隐情奸偽屏息仁夀末授木工監修營東都大業初煬帝潛有取遼東之意遣𢎞嗣徃東莱海口監造船諸州役丁苦其箠楚官人督役晝夜立于水中畧不敢息自腰以下無不生蛆死者十三四尋遷黄門侍郎轉殿中少監遼東之役進位金紫光禄大夫明年帝復征遼東㑹奴賊冦隴右詔𢎞嗣撃之及楊元感作亂逼東都𢎞嗣屯兵安定或告之謀應元感者代王侑遣使執詣行在所以無反状得釋帝疑之除名徙日南道死時年四十九有子仁觀王文同京兆頴陽人也性明辯有幹用開皇中以軍功拜儀同尋授桂州司馬煬帝嗣位徵為光禄少卿以忤旨出為恒山郡賛務有一人豪猾毎持長吏長短前後守令咸憚之文同下車聞其名而數之因剡木為大橛埋之於庭出尺餘四靣各埋小橛令其人踣心於橛上縳四肢於小橛以棒打其背應時潰爛郡中大駭吏民懾氣及帝征遼東令文同廵察河北諸郡文同見沙門齋戒菜食者以為妖妄皆收繋獄北至河間召諸郡官人小有遲違者輙皆覆靣于地而箠殺之求沙門相聚講論及長老共為佛㑹者數百人文同以為結聚惑衆盡斬之又悉祼僧尼驗有淫状非童男女數千人復将殺之郡中士女號哭于路諸郡驚駭各奏其事上聞之大怒遣使者逹奚善意馳鎖之斬于河間以謝百姓讐人剖其棺臠其肉而噉之斯須咸盡通志卷一百七十一
