body:
  text: 通志卷六十一宋右廸功郎鄭樵漁仲撰食貨略第一田制陂渠屯田賦税歴代户口丁中田制禹别九州制田九等雍州第一等徐州第二等青州第三等豫州第四等冀州第五等兖州第六等梁州第七等荆州第八等揚州第九等九州之地墾田九百一十萬八千二十頃周文王在岐用平土之法以為治民之道地著為本故建司馬法六尺為歩歩百為畝畝百為夫夫三為屋屋三為井井十為通通十為成成十為終終十為同同方百里同十為封封十為畿畿方千里故邱有戎馬一疋牛三頭甸有戎馬四疋兵車一乘牛十二頭甲士三人歩卒七十二人一同百里提封萬井戎馬四百疋車百乘此卿大夫采地之大者是謂百乘之家一封三百六十六里提封十萬井定出賦六萬四千井戎馬四千疋車千乘此諸侯之大者謂之千乘之國天子之畿内方千里提封百萬井定出賦六十四萬井戎馬四萬疋兵車萬乘戎卒七十二萬人故曰萬乘之主小司徒之職乃經土地而井牧其田野九夫為井四井為邑四邑為邱四邱為甸四甸為縣四縣為都以任地事而令貢賦民受田上田夫百畝中田夫二百畝下田夫三百畝嵗耕種者為不易上田休一嵗者為一易中田休二嵗者為再易下田三嵗更耕之農民户人已受田其家衆男為餘夫亦以口受田士工商家受田五口乃當農夫一人凡一口受田二十畝此謂平土可以為法者也若山林藪澤原陵淳鹵之地各以肥磽多少為差民年二十受田六十歸田七十以上上所養也十嵗以下上所長也十一以上上所彊也商鞅相秦孝公以三晉地狹民貧秦地廣民寡於是誘三晉之民而廢井田開阡陌任其所耕不限多少數年之間國富兵彊無敵於天下及漢孝武外事四夷内興功利役費並興而民去本董仲舒説上曰秦用商鞅之法改帝王之制除井田民得賣買富者田連阡陌貧者亡立錐之地漢興循而未改古井田法雖難卒行宜少近古限民名田以贍不足塞兼井之路然後可善治也終不能用及末年悔征伐之事乃封丞相田千秋為富民侯以趙過為搜粟都尉過能為代田一畝三􅎌嵗代處故曰代田代田者耕田之法耳而非受田之制也哀帝時師丹輔政建限田之制以裁抑兼并天子下其議丞相孔光大司空何武奏請諸侯列侯皆得名田國中列侯在長安公主名田縣道及闗内侯吏民名田皆無過三十頃諸侯王奴婢二百人列侯公主百人闗内侯吏民三十人期盡三年犯者沒入官時田宅奴婢賈為減賤丁傅用事董賢隆貴皆不便也詔書且湏後遂寢不行晉武帝平呉之後有司奏王公以國為家京城不宜復有田宅未暇作邸當使城中有徃來之處近郊有芻藁之田今可限之國王公侯京城得有宅一處近郊田大國十五頃次國十頃小國七頃城内無宅城外有者皆聼留之男子一人占田七十畝女子三十畝其丁男課田五十畝丁女二十畝次丁男半之女則不課其官第一品五十頃每品減五頃以為差第九品十頃而又各以品之髙卑䕃其親屬多者及九族少者三代宗室國賔先賢之後士人子孫亦如之而又得䕃人為衣食客及佃客量其官品以為差䧏後魏文帝時李安世上疏曰臣聞量民畫野經國大式邑地相參致理之本井稅之興其來日久田萊之數制之以限蓋欲使土不曠功人罔遊力雄擅之家不獨膏腴之美單陋之夫亦有頃畝之分竊見州郡之民或因年儉流移棄賣田宅漂居異鄉事渉數代三長既立始返舊墟廬井荒涼桑榆改植事已歴逺易生假冒彊宗豪族肆其侵凌逺認魏晉之家近引親舊之驗年載稍久鄉老所惑羣證雖多莫可取據爭訟遷延連紀不判良疇委而不開柔桑枯而不採欲令家豐人給其可得乎愚謂今雖桑井難復宜更均量審其徑術令分藝有准力業相稱細民獲資生之利豪右靡餘地之盈又所爭之田宜限年斷事久難明悉屬今主帝深納之均田之制起於此矣太和九年下詔均給天下民田諸男夫十五以上受露田四十畝不栽樹者謂之露田婦人二十畝奴婢依良丁牛一頭受田三十畝限四牛所授之田率倍之三易之田再倍之以供耕休及還受之盈縮人年及課則受田老免及身沒則還田奴婢牛随有無以還受諸桑田不在還受之限但通人倍田分於分雖盈不得以充露田之數不足者以露田充倍諸初受田者男夫一人給二十畝課蒔餘果種桑五十樹棗五株榆三根非桑之土夫給一畝依法課蒔餘果及多種桑榆者不禁諸應還之田不得種桑榆棗果種者以違令論地入還分諸桑田皆為世業身終不還恒從見口有盈者無受無還不足者受種如法盈者得賣其盈不足者得買所不足不得賣其分亦不得買過所足諸麻布之之土男夫及課别給麻田十畝婦人五畝奴婢依良皆從還受之法諸有舉戸老小殘疾無受田者年十一已上及疾者各授以半夫田年踰七十者不還所受寡婦守志者雖免課亦授婦田諸還受人田恒以正月若始受田而身亡及賣買奴婢牛者皆至明年正月乃得還受諸土廣人稀之處隨力所及官借人種蒔後有來居者依法封授諸地狹之處有進丁受田而不樂遷者則以其家桑為正田分又不足不給倍田又不足家内人别減分無桑之鄉凖此為法樂遷者聼逐空荒不限異州他郡唯不聼避勞就逸其地足之處不得無故而移諸人有新居者三口給地一畝以為居室奴婢五口給一畝男女十五以上因其地分口課種菜五分畝之一諸一人之分正從正倍從倍不得隔越他畔進丁受田者恒從所近若同時俱受先貧後富再倍之田放此為法諸逺配流謪無子孫及户絶者墟宅桑榆盡為公田以供授受授受之次給其所親未給之間亦借其所親諸宰人之官各隨近給公田刺史十五頃太守十頃治中别駕各八頃縣令郡丞六頃更代相付賣者坐如律職分田起於此北齊給授田令仍依魏朝每年十月普令轉授成丁而授丁老而退不聼賣易文宣帝天保八年議徙冀瀛定無田之人謂之樂遷於幽州寛鄉以處之武成帝河清三年令男子率以十八受田輸租調二十充兵六十免力役六十六退田免租調京城四面諸方之外三十里内為公田受公田者三縣代遷户執事官一品以下逮於羽林虎賁各有差其外畿郡華人官第一品以下羽林虎賁以上各有差職事及百姓請墾田者名為永業田奴婢受田者親王止三百人嗣王二百人第二品嗣王以下及庶姓王百五十人正三品以上及皇宗百人七品以上八十人八品以上至庶人六十人奴婢限外不給田者皆不輸其方百里外及州人一夫受露田八十畝婦人四十畝奴婢依良人限數與者在京百官同丁牛一頭受田六十畝限止四牛毎丁給永業二十畝為桑田其田中種桑五十根榆三根棗五根不在還受之限非此田者悉入還受之分土不宜桑者給麻田如桑田之法闗東風俗傳曰其時彊弱相凌恃勢侵奪富有連畛亘陌貧無立錐之地昔漢氏募民徙田恐遺墾課令就良美而齊氏全無斟酌雖有當年權格時暫施行爭地文案有三十年不了者此由授受無法者也後周文帝霸政之初創置六官司均掌田里之政令凡人口十以上宅五畝口七隋志作九以上宅四畝口五以下宅三畝有室者田百四十畝丁者田百畝隋文帝令自諸王以下至於都督皆給永業田各有差多者至百頃少者至三十頃其丁男中男永業露田皆遵後齊之制並課樹以桑榆及棗其田宅率三口給一畝京官又給職分田一品者給田五頃至五品則為田三頃其下每品以五十畝為差至九品為一頃外官亦各有職分田又給公廨田以供用開皇九年任墾田千九百四十萬四千二百六十七頃開皇中總八百九十萬七千五百三十六户按定墾之數每户合墾田二頃餘開皇十二年文帝以天下戸口嵗增京輔及三河地少而人衆衣食不給議者咸欲徙就寛鄉帝乃發使四出均天下之田其狹鄉每丁纔至二十畝老小又少焉至大業中天下墾田五千五百八十五萬四千四十頃按其時有户八百九十萬七千五百三十六則每户合得墾田五頃餘恐本史之非實唐開元二十五年令田廣一歩長二百四十歩為畝百畝為頃此秦漢以來頃畝之制也丁男給永業田二十畝口分田八十畝其中男年十八以上亦依丁男給老男篤疾廢疾各給口分田四千畝寡妻妾各給口分田三十畝先永業者通充口分之數黄小中丁男女及老男篤疾廢疾寡妻妾當户者各給永業田二十畝口分田二十畝應給寛鄉並依所定數若狹鄉新受者減寛鄉口分之半其給口分田者易田則倍給其永業田親王百頃職事官正一品六十頃郡王及職事官從一品各五十頃國公若職事官正二品各四十頃郡公若職事官從二品各三十五頃縣公若職事官正三品各二十五頃職事官從三品二十頃侯若職事官正四品各十四頃伯若職事官從四品各十頃子若職事官正五品各八頃男若職事官從五品各五頃上柱國三十頃柱國二十五頃上䕶軍二十頃䕶軍十五頃上輕車都尉十頃輕車都尉七頃上騎都尉六頃騎都尉四頃驍騎尉飛騎尉各八十畝雲騎尉武騎尉各六十畝其散官五品以上同職事給諸永業田皆傳子孫不在收授之限襲爵之人唯得承父祖永業不合别請其縣界内所有部受田悉足者為寛鄉不足者爲狹鄉諸狹鄉田不足者聼於寛鄉遥受應給園宅地者良口三口以下給一畝每三口加一畝賤口五口給一畝每五口加一畝並不入永業口分之限其京城及州郡縣郭下園宅不在此例諸京官文武職事職分田一品十二頃二品十頃三品九頃四品七頃五品六頃六品四頃七品三頃五十畝八品二頃五十畝九品二頃並去京城百里内給其京兆河南府及京縣官人職分田亦凖此即百里外給者亦聼諸州及都䕶府親王府官人職分田二品十二頃三品十頃四品八頃五品七頃六品五頃七品四頃八品三頃九品二頃五十畝鎮戌闗津嶽瀆及在外監官五品五頃六品三頃五十畝七品三頃八品二頃九品一頃五十畝三衞中郎將上府折衝都尉各六頃中府五頃五十畝下府及郎將各五頃上府果毅都尉四頃中府三頃五十畝下府三頃上府長史别將各三頃中府下府各二頃五十畝親王府典軍五頃三十畝副典軍四頃千牛備身左右太子千牛備身各三頃親王府文武官隨府出藩者於所在處給諸軍上折衝府兵曹二頃中府下府各一頃五十畝其外軍校尉一頃二十畝旅師一頃隊正副各八十畝皆於領側州縣界内給其校尉以下在本縣及去家百里内領者不給諸驛封田皆隨近給每馬一匹給地四十畝若驛側有牧田之處匹各減五畝其傳送馬每匹給田二十畝諸庶人有身死家貧無以供𦵏者聼賣永業田諸以工商為業者永業口分田各減半給之在狹鄉者並不給又田令在京諸司及天下州府縣監折衝府鎮戌闗津嶽瀆等公廨田職分田各有差職分陸田限三月三十日稻田限四月三十日以前上者並入後人以後上者入前人其麥田以九月三十日爲限若前人自耕未種後人酬其功直已自種者准租分法其價六斗以下者依舊定以土者不得過六斗並取情願不得抑配親王出藩者給地一頃作園若城内無可開拓者於近城便給如無官田取百姓地充其地給好地替天寳中應受田一千四百三十萬三千八百六十二頃十三畝按十四年有户八百九十萬餘計定墾之數每户合一頃六十餘畝至建中初分遣黜陟使按比墾田田數都得百十餘萬頃陂渠魏襄王以史起為鄴令起進曰魏氏之行田也以百畝鄴獨二百畝是田惡也漳水在其旁西門豹為鄴令不知用於是以史起為鄴令遂引漳水溉鄴以富魏之河内民歌曰鄴有賢令兮為史公決漳水兮灌鄴旁終古潟鹵兮生稻梁其後韓聞秦之好興事欲疲之無令東伐乃使水工鄭國間説秦令鑿涇水自仲山西抵瓠口為渠並北山東注洛三百餘里欲以溉田中作而覺秦欲殺國國曰始臣為間然渠成亦秦之利也秦以為然卒使就渠注填閼之水溉澤鹵之地四萬餘頃收皆畝一鍾於是闗中為沃野無凶年命曰鄭國渠秦平天下以李冰為蜀守冰壅江水作堋穿二江成都中䨇過郡下以通舟船因以溉灌諸郡於是蜀沃野千里號為陸海漢文帝以文翁為蜀郡太守穿煎㳛口溉灌繁田千七百頃人獲其饒武帝元光中大司農鄭當時言引渭穿渠起長安並南山下至河三百餘里渠下民田萬餘頃又可得以溉田益肥闗中之地得榖天子以為然令齊水工徐伯表悉發卒數萬人穿漕渠三嵗而通渠下民頗得以溉田矣其後河東守番係請穿渠引汾漑皮氏汾隂下引河溉汾陰蒲坂下皮氏今龍門縣地屬綘郡汾隂今寳鼎縣地蒲坂今河東縣地並屬河東郡度可得五千頃五千頃故盡河壖棄地民茭牧其中耳今溉田之度可得榖二百萬石以上天子以為然發卒數萬人作渠田數嵗河移徙渠不利則田者不能償種久之河東渠田廢與越人令少府以為稍入時越人有徙者以田與之其租税入少府也其後嚴熊言臨晉民願穿洛以溉重泉以東萬餘頃重泉在今馮翊郡界今有乾阬即荘熊之所穿渠故惡地誠得水可令畝十石於是為發卒萬餘人穿渠自徴引洛水至商顔下徴在馮翊即今郡之澄城縣商顔今馮翊縣界岸善崩乃鑿井深者四十餘丈徃徃為井井下相通行水水頽以絶商顔東至山嶺十餘里間井渠之開自此始穿渠得龍骨故名曰龍首渠作之十餘嵗渠頗通猶未得其饒是時用事者爭言水利朔方西河河西酒泉皆引河及川谷以溉田而闗中靈軹成國津渠引諸川汝南九江引淮東海引鉅定泰山下引汶水皆穿渠為溉田各萬餘頃他小渠陂山通道不可勝言自鄭國渠起至元鼎六年百三十六嵗而兒寛為左内史奏請穿鑿六輔渠在鄭國渠之裏今尚謂之輔渠亦曰六渠以益溉鄭國傍髙仰之田後十六嵗趙中大夫白公復奏穿渠引涇水首起谷口尾入櫟陽注渭中袤二百里溉田四千五百餘頃因名曰白渠民得其饒歌之曰田於何所池陽谷口鄭國在前白渠起後舉鍤為雲决渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口言此兩渠饒也元帝建昭中邵信臣為南陽太守於穰縣之南六十里造鉗盧陂壘石為堤傍開六石門以節水勢澤中有鉗盧王池因以為名用廣溉灌嵗嵗増多至三萬頃人得其利及後漢杜詩為太守復修其業時歌之曰前有邵父後有杜母後漢章帝建初中王景為廬江太守郡部安豐縣有楚孫叔敖所起芍陂先是荒廢景重修之境内豐給其陂徑百里灌田萬頃芍音鵲今壽春郡安豐縣界順帝永和五年馬臻為會稽太守始立鑑湖築塘周廽三百十里灌田九千餘頃東晉張闓為晉陵内史時所部四縣並以旱失田闓乃立曲阿新豐塘丹陽郡丹陽界溉田八百餘頃每嵗豐稔葛洪為其頌宋文帝元嘉七年劉義欣為荆河刺史鎮壽陽於時土荒民散義欣乃經理芍陂為之堤堰引渒匹詣反水入陂開榛伐木水得通涇嵗獲豐稔後魏刁雍為薄骨律鎮將至鎮上表曰富平西三十里薄骨律鎮今靈武郡富平今廽樂縣有艾山南北二十六里東西四十五里鑿以通河似禹舊迹其兩岸作溉田大渠廣十餘歩山南引水入此渠中水則充足溉官私田四萬餘頃旬日之間則水一徧水凡四溉榖得成實從之公私獲其利裴延儁為幽州刺史范陽郡有舊沉渠徑五十里漁陽燕郡有故戾諸堰廣袤三十里皆廢毁多時莫能修復水旱不調人多飢餒延儁自度水形營造未幾而就溉田萬餘頃為十倍利屯田漢昭帝始元二年詔發習戰射士詣朔方調故吏將屯田張掖郡孝宣帝神爵元年遣後將軍趙充國將兵擊先零羗充國以擊羌殄􅀈為期乃欲罷騎兵屯田以待其敝上從之於是留歩士萬人屯田大獲其利明年遂破先零屯田之詳見充國傳魏武帝破黄巾欲經略四方而苦軍食不足羽林監潁川棗祇建置屯田於是以任峻為典農中郎將募百姓屯田於許下得榖百萬斛郡國例置田官數年之中所在積粟倉廩皆滿廢帝齊王芳正始四年司馬懿督諸軍伐呉時欲廣田蓄榖為滅賊資乃使鄧艾行陳項以東至壽春艾以為田良水少不足以盡地利宜開河渠可以大積軍糧又通運漕之道乃著濟河論以喻其指又以為昔破黄巾因為屯田積榖於許都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費巨億以為大役陳蔡之間土下田良可省許昌左右諸稻田並水東下令淮北屯二萬人淮南三萬人十二分休常有四萬人且田且守水豐常收三倍於西計除衆費嵗得五百萬斛以為軍資六七年間可積三千萬斛於淮上此則十萬之衆五年食也以此乘吳無徃而不克懿善之如艾計遂北臨淮水自鍾離西南横石以西盡沘水四百餘里五里置一營營六十人且佃且守兼脩廣淮陽百尺二渠上引河流下通淮潁大治諸陂於潁南北穿渠三百餘里溉田二萬頃淮南淮北皆相連接自壽春到京師農官兵田鷄犬之聲阡陌相屬每東南有事大軍興衆汎舟而下逹於江淮資食有儲而無水害艾所建也晉羊祜為征南大將軍鎮襄陽吳石城守去襄陽七百餘里每為邊害祜患之以詭計令吳罷守於是戌邏減半分以墾田八百餘頃大獲其利祜之始至也軍無百日之糧及至季年有十年之積太康元年平吳之後杜預在荆州修邵信臣遺跡激用滍淯諸水以浸原田萬餘頃分疆刋石使有定分公私同利衆庶賴之號曰杜父舊水道唯沔漢逹江陵千數百里北無通路又巴邱湖沅湘之㑹表裏山川實為險固荆蠻之所恃預乃開楊口起夏水逹巴陵千餘里内瀉長江之險外通零桂之漕南土歌之曰後世無叛由杜翁孰識智名與勇功東晉元帝督課農功二千石長吏以入榖多少為殿最其宿衞要任皆令赴農使軍各自佃即以為廪穆帝昇平初荀羡為北部都尉鎮下邳屯田於東陽之石鼈臨淮郡界公私利之後魏文帝大統十一年大旱十二年秘書丞李彪上表請别立農官取州郡户千分之一為屯田人相水陸之宜料頃畝之數以贓贖雜物市牛科給令其肆力一夫之田嵗責六十斛蠲其正課并征戌雜役行此二事數年之中則榖積人足矣帝覽而善之尋施行焉自此公私豐贍雖有水旱不為之害也北齊廢帝乾明中尚書左丞蘇珍芝又議修石鼈等屯嵗收數十萬石自是淮南軍防糧足孝昭帝皇建中平州刺史嵇曄建議開幽州督亢舊陂長城左右營屯嵗收稻粟數十萬石北境得以周贍又於河内置懐義等屯以給河南之費自是稍止轉輸之勞武成帝河清三年詔沿邉城守堪墾食者營屯田置都子使以統之一子使當田五十頃嵗終課其所入以論褒貶隋文帝開皇三年突厥犯塞吐谷渾寇邉轉輸勞敝乃令朔方總管趙仲卿於長城以北大興屯田唐開元二十五年令諸屯𨽻司農寺者每三十頃以下二十頃以上為一屯𨽻州鎮諸軍者每五十頃為一屯應置者皆從尚書省處分其舊屯重置者一依承前封疆為定新置者並取荒閑無籍廣占之地天寳八年天下屯收百九十一萬三千九百六十石闗内五十六萬三千八百一十石河北四十萬三千二百八十石河東二十四萬五千八百八十石河西二十六萬八十八石隴右四十四萬九百二石後上元中於楚州置洪澤屯夀州置芍陂屯厥田沃壤大獲其利賦税古之有天下者必有賦税之用計口而入謂之賦公田什一及工商衡虞之入謂之税稅以供郊廟社稷天子奉養百官禄食賦以給車馬兵甲士徒之役充實府庫賜予之用禹定九州量其貢賦三代因之而什一之法未甞廢秦孝公十二年初為賦蓋納商鞅之説而易其制也自時厥後内興功作外攘四國收大半之賦而猶為不足漢髙帝懲其弊於是約法省禁輕田租什五而稅一量吏禄度官用以賦於民而山川園池市肆租稅之入自天子以至封君湯沐邑皆各為私奉養不領於天子之經費又令賈人不得衣絲乘車重租稅以困辱之四年八月初為算賦漢儀注人年十五以上至五十六出賦錢人百二十為一算為給庫兵車馬孝惠六年令女子年十五以上至二十不嫁五算漢律人出一算算百二十錢唯賈人與奴婢倍算今使五算罪謪之也孝文人賦四十丁男三年而一事常賦嵗百二十嵗一事時天下之人多故出賦四十三嵗而一事鼂錯説上令民入粟得以拜爵邉食足支五嵗可令入粟郡縣足支一嵗以上可時赦勿收農人租如此徳澤加於萬民帝從其言後天下充實乃下詔賜民十一年租税之半十三年詔曰農天下之本務莫大焉今勤身從事而有租稅之賦是謂本末者無以異也其於勸農之道未備其除田之租稅孝景帝二年令民半出田租三十而稅一時上溢而下有餘又禮髙年九十者一子不事八十者二算不事令天下男子年二十始傅孝武即位董仲舒説上曰古者稅民不過什一其求易供使民不過三日其力易足至秦則不然用商鞅之法又加月為更卒巳復為正一嵗屯戌一嵗力役三十倍於古田租口賦鹽鐵之利二十倍於古或耕豪民之田見稅什五故貧民常衣牛馬之衣而食犬彘之食矣建元元年制八十復二算九十復甲卒孝昭始元六年七月罷㩁酤官令民得以律占租武帝時賦歛繁多律外而取今始復舊元鳯二年三輔太常郡得以菽粟當賦三年以前逋更賦未入者皆勿收四年出口賦漢儀注民年七嵗至十四出口賦錢人二十三二十錢以食天子其三錢者武帝加口錢以補車騎馬六年詔曰夫榖賤傷農今三輔減賤其令以菽粟當今年賦元平元年詔減口賦錢有司奏請減什三上許之孝宣帝甘露二年減民算三十孝成建始二年減天下賦錢算四十本算百二十今減四十為八十孝平元始元年詔天下女徒已論歸家顧出錢月三百後漢光武建武六年詔田租三十稅一如舊制有産子者復以三年之算也明帝即位人無横徭天下安寧時榖貴尚書張林上言榖所以貴由錢賤故也可盡封錢一取布帛為租以通天下之用從之魏武初平袁紹鄴都令收田租畝粟四升戸絹二疋綿二觔餘不得擅興晉武帝平吳之後制户調之式丁男之户嵗輸絹三疋綿三觔女及次丁男為户者半輸其諸邉郡或三分之二逺者三分之一夷人輸賨布戸一疋逺者或一丈不課田者輸義米戸三斛逺者五斗極逺者輸算錢人二十八文成帝咸和五年始度百姓田取十分之一率畝稅米三升是後頻年水旱田稅不至咸康初算田稅米空懸五十餘萬斛尚書諸曹以下免官哀帝即位乃減田租畝收二升孝武帝大元二年除度定田收租之制公王以下口稅三斛唯蠲在役之身八年又增稅米口五石宋孝武大明五年制天下人戸嵗輸布四疋齊髙帝初竟陵王子良上表曰宋文帝元嘉中皆責成郡縣孝武徴求急速以郡縣遲緩始遣臺使百姓駭迫不以其命恣意贓賄人無敢言守宰務在裒刻圍桑品屋以准貲課致令斬樹發瓦以充重賦又臺符既切畏失嚴期乃有自殘軀命斬絶手足以避徭役守長不務富民惟言益國豈有民貧於下而國富於上邪子良之言雖切而終不見用自東晉寓居江左百姓南奔者並謂之僑人其無貫之人不樂州縣編者謂之浮浪人惟其所輸終優於正課至齊武帝時都下人多為諸王公貴人左右佃客典計衣食客之類皆無課役官品第一第二佃客無過四十戸每品減五户至第九品五戸其佃榖皆與大家量分其典計官品第一第二置三人第三第四置二人第五第六及公府參軍殿中監監軍長史司馬部曲督闗外侯材官議郎以上一人皆通在佃客數中官品第六以上幷得衣食客三人第七第八二人第九品舉輦迹禽前驅彊弩司馬羽林郎殿中虎賁持椎斧武騎虎賁持鈒冗從虎賁命中武騎一人其客皆注家籍其課丁男調布絹各二丈絲三兩綿八兩綠絹八尺緑綿三兩二分粗米五石丁女並半之男年十六亦半課年十八正課六十六免課其男丁毎嵗役不過二十日田畝稅米二升蓋大率如此也其量三升當今一升秤則三兩當今一兩尺則一尺二寸當今一尺自梁武帝末侯景之亂國用常褊京官文武月例唯得廩食多遥帯一郡縣官而取其禄秩焉揚徐等大州比令僕班寧桂等小州比參軍班丹陽郡吳郡㑹稽等郡同太子詹事尚書班髙梁晉康等小郡三班而已大郡六班小縣兩轉方至一班品第既殊不可委載後魏令每調一夫一婦帛一疋粟二石人年十五以上未娶者四人出一夫一婦之調奴任耕婢任績者八口當未娶者四耕牛十頭當奴婢八其麻布之鄉一夫一婦布一疋下至半以此為䧏大率十疋中五疋為公調二疋為調外費三疋為内外百官俸人年八十以上者聼一子不從役孤獨病老篤貧不能自存者亦一人不從役舊制民間所織絹布皆幅廣二尺二寸長四十尺為一疋六十尺為一端後乃漸至濫惡不依尺度孝文帝延興三年秋更立嚴制令一准前式違者罪各有差四年詔州郡人十丁取一以充行户收租五十石以備年糧太和八年始准古班百官之禄以品第各有差先是天下户以九品混通户調帛二疋絮二斤絲一斤粟二十石又入帛一疋二丈委之州庫以供調外之費至是户增帛三疋粟二石九斗以為官司之禄復増調外帛滿二疋所調各隨土所出其司冀雍華定相秦洛荆河懷兖陜徐青齊濟南河東東徐等州貢綿絹及絲其餘郡縣少桑蠶處皆以麻布充正光後國用不足乃先折天下六年租調而徴之百姓怨苦有司奏斷百官常給之酒計一嵗所省米五萬三千五十四斛九斗糵榖六千九百六十斛麯三千萬五百九十九斤有司又奏内外百官及諸蕃客廪食及肉悉三分減一計嵗終省肉百五十九萬九千八百五十六斤米五萬三千九百三十三石北齊文宣受禪多所草創六坊内從者更加簡練每一人必當百人任其臨陣必死然後取之謂之百保鮮卑又簡華人之勇力絶倫者謂之勇士以備邊要始立九等之户富者稅其錢貧者役其力後南征頻嵗䧟沒士馬死者以數十萬計武成以修創臺殿所役甚廣兼幷戸口益多隠漏舊制未娶者輸半牀租調陽翟一郡户至數萬籍多無妻有司劾之帝以為生事不許由是姦欺尤甚户口租調十亡六七是時用度轉廣賜予無節府藏之積不足以供乃減百官之禄徹軍人之常廪幷省州郡縣鎮戌之職又制刺史守宰行兼者並不給幹以節國用之費焉河清三年定令乃率以十八受田輸租調二十充兵六十免力役六十六退田免租調率人一牀調絹一疋綿八兩凡十斤綿中折一斤作絲墾租二石義租五斗奴婢各准良人之半牛調二丈墾租一斗義租五升墾租送臺義租納郡以備水旱後周文帝霸府初開制司賦掌均賦之政令凡人自十八至六十四與輕癃者皆賦之其賦之法有室者嵗不過絹一疋綿八兩粟五斗丁者半之其非桑土有室者布一疋麻十斤丁者又半之豐年則全賦中年半之下年一之皆以時徵焉若艱凶札則不徵其賦司役掌力役之政令凡人自十八至五十九皆任於役豐年不過三旬中年則二旬下年則一旬起徒役無過家一人有年八十者一子不從役百年者家不從役廢疾非人不養者一人不從役若凶札又無力征武帝保定元年改八丁兵為十二丁兵率嵗一月役建徳二年改軍士為侍官募百姓充之除其縣籍是後夏人半為兵矣隋文帝霸府初開尉遲迥王謙司馬消難相次阻兵興師誅討賞費鉅萬及受禪又遷都發山東丁毁造宫室仍依周制役丁為十二畨匠則六畨丁男一牀租粟三石桑土調以絹絁麻土調以布絹絁以疋加綿三兩布以端加麻三斤單丁及僕𨽻各半之有品爵及孝子順孫義夫節婦並免課役開皇三年減十二畨每嵗為三十日役減調絹一疋為二丈時蘇威為納言遵父綽之遺訓減寛賦徭務從輕典帝又躬行節儉海内繁富以江表初定給復十年餘州並免當年租賦十二年有司上言庫藏皆滿帝曰朕既薄賦於民又大經賜用何得爾也對曰用處常出納處常入略計每年賜用至數百萬叚曾無減損乃更開左藏之院構屋以受之詔曰既富而教方知㢘耻寧積於人無藏府庫河北河東今年田租三分減一兵減半功調全免先是京官及諸州並給公廨錢廻易生利以給公用六月工部尚書蘇孝慈等以為所在官司因循徃昔皆以公廨錢物出舉興生唯利是求煩擾百姓奏皆給地以營農廽易取利皆禁止十一月詔内外諸司公廨在市廽易及諸處興生並聼之唯禁出舉收利煬帝即位户口益多府庫盈溢乃除婦人及奴婢部曲之課其後將事遼碣增置軍府掃地為兵租賦之入益減矣唐武徳七年始定律令以度田制五尺為歩歩二百四十為畝畝百為頃丁男中男給一頃篤疾廢疾給四十畝寡妻妾給三十畝若為户者加二十畝所授之田十分之二為世業八為口分世業之田身死則承戸者便授之口分則收入官更以給人賦役之法每丁嵗入租粟二石調則随鄉土所産綾絹絁各二丈布加五分之一輸綾絹絁者兼調綿三兩輸布者麻三斤其絹絁為匹布為端綿為屯麻為綟濶尺八長四丈者謂之匹若當户不成匹端屯綟者皆随近合成凡丁嵗役二旬若不役則收其資每日絹三尺有事而加役者旬有五日免其調三旬則稅調俱免通正役並不過五十日若嶺南諸州則稅米上户一石二斗次户八斗下户六斗若夷獠之户皆從半輸蕃人内附者上户丁稅錢十文次户五文下户免之附經二年者上户丁輸羊二口次户一口下户三口共一口凡水旱蟲霜為災十分損四以上免租損六以上免租調損七以上課役俱免凡天下之户量其資産定為九等每三年縣司注定州司覆之百户為里五里為鄉四家為隣五家為保在邑居者為坊在田野者為村村坊隣里遞相督察士農工商四民各業食禄之家不得與下人爭利工商雜類不得預於士伍租庸調之法以人丁為本自開元以後天下户籍久不更造丁口轉死田畝賣易貧富升䧏不實其後國家侈費無節而大盗起兵興財用益困而租庸調法弊壊自代宗時始以畝定稅而歛以夏秋至徳宗時相楊炎遂作兩稅法夏輸無過六月秋輸無過十一月置兩稅使以總之量出制入户無主客以居者為簿人無丁中以貧富為差商賈稅三十之一度與所居者均役其田稅視大歴十四年墾田之數為定遣黜陟使按比諸道丁産等級免鰥寡煢獨不濟者敢有加歛以枉法論議者以租庸調髙祖太宗之法也不可輕改而徳宗方信用楊炎不疑也按天寳中天下計帳户約有八百九十餘萬其稅錢約得二百餘萬貫大約髙等少下等多今一例為八等以下户計之其八等户所稅四百五十二九等户則二百二十二今通以二百五十為率自七載至十四載六七年間與此大數或多少加減不同所以言約他皆類此其地稅約得千二百四十餘萬石兩漢每户所墾田不過七十畝今亦准此計約課丁八百二十餘萬其庸調租等約出絲綿郡縣計三百七十餘萬丁庸調輸絹約七百四十餘萬疋毎丁計兩疋綿則百八十五萬餘屯兩丁三兩六兩為屯則兩丁合一屯租粟則七百四十餘萬石每丁兩石約出布郡縣計四百五十餘萬丁庸調輸布約千三十五餘萬端每丁兩端一丈五尺十丁則二十三端也其租約百九十餘萬丁江南郡縣折納布約五百七十餘萬端大約八等以下户計之八等折租毎丁三端一丈九等則二端二丈今通以三端為率二百六十餘萬丁江北郡縣納粟約五百二十餘萬石大凡都計租稅庸調每嵗錢粟絹綿布約得五千二百二十餘萬端疋屯貫石諸色資課及勾剥所獲不在其中據天寳中度支毎嵗所入端屯疋貫石都五千七百餘萬計稅錢地稅庸調折租得五千三百四十餘萬端疋屯其資課及勾剝等當合得四百七十餘萬其度支嵗計粟則二千五百餘萬石三百萬折充絹布添入兩京庫三百萬廽充米豆供尚食及諸司官厨等料幷入京倉四百萬江淮廽造米轉入京充官禄及諸司糧料五百萬留當州官禄及遞糧一千萬諸道節度軍糧及貯備當州倉布絹綿則二千七百餘萬端屯疋千三百萬入西京一百萬入東京千三百萬諸道兵賜及和糴幷逺小州便充官料郵驛等費錢則二百餘萬貫百四十萬諸道州官課料及市驛馬六十餘萬添充諸州軍和糴軍糧自開元中及於天寳開拓邊境多立功勲每嵗軍用日增其費糴米粟則三百六十萬疋段朔方河西各八十萬隴右百萬伊西北庭八萬安西十二萬河東節度及羣牧使各四十萬給衣則五百二十萬朔方百二十萬隴右百五十萬河西百萬伊西北庭四十萬安西五十萬河東節度四十萬羣牧二十萬别支計則二百一十萬河東五十萬幽州劒南各八十萬餽軍食則百九十萬石河東五十萬幽州劔南各七十萬凡一千二百八十萬開元以前每嵗邊夷戎所用不過二百萬貫自後經費日廣以至於此而錫賚之費此不與焉其時錢榖之司唯務割剝廻殘䞉利名目萬端府藏雖豐閭閻困矣尚書省度支總天下經費自安禄山反至徳乾元之際置度支使永泰之後度支置副使以掌其外度支以掌其内建中初又置轉運使復歸度支分命出職使徃諸道收户口錢穀名數毎嵗天下共歛三千餘萬貫其二千五十餘萬貫以供外費九百五十餘萬貫供京師外稅米麥共千六百餘萬石其二百餘萬石供京師千四百萬石給充外費臣謹按井田之法所以為良者以田與賦不相離雖暴君不能違田而取賦汚吏不能什一而加多至秦孝公開阡陌之法田賦始相離故所取者不多乎什一則少乎什一也其弊至於收太半焉漢髙帝欲革秦之弊什五而稅一孝景二年始令民半出田租三十而稅一至後漢以三十而稅一為通用之法荀悦曰今漢人田或百一而稅則知漢法之優民可謂至矣然豪彊占田踰多浮客輸太半之賦官家之惠優於三代富室之暴酷於亡秦皆縁無授田之法所以惠不及齊民偉哉後魏孝文帝之為人君也真英斷之主乎井田廢七百年一旦納李安世之言而行均田之法國則有民民則有田周齊不能易其法隋唐不能改其貫故天下無無田之夫無不耕之民口分世業雖非井田之法而得三代之遺意始者則田租户調以為賦稅至唐祖開基乃為定令曰租曰調曰庸有田則有租有家則有調有身則有庸租者什一之稅也調者調發兵車井田之賦也庸者嵗役二旬不役則收其資役多則免調過役則租調俱免無傷於民矣舍租調之外而求則無名雖無道之世亦不為自太和至開元三百年之民抑何幸也天寳之季師旅既興誅求無藝生齒流移版圖焚蕩然是時賦役雖壊而法制可尋不幸建中天子用楊炎為相遂作兩稅之法自兩稅之法行則賦與田不相系也况又取大歴中一年科率多者為兩稅定法此總無名之暴賦立為常規也且言利之臣無代無之有恨少無恨多有言加無言減自兩稅以來賦不系於田故名色之求罔民百出或以方圓取或以羡餘取或言獻奉或言假貸初雖暫時久為成法建中以來將五百年世不乏楊炎不知所以加於大歴中一年之多數目復幾倍乎嗚呼後世之為民也其難為民矣且開元之前户口至衆而民皆有田至於癃老童穉寡妻女子亦皆有田一丁授田百畝百畝之田嵗輸粟二石絹二丈無絹則布二丈五尺嶺南諸州則以户計上户一斛二斗下户六斗夷獠半之内附之家上户十文下户無出當是時也民之所以為民也如此官之所以取諸民也如此後魏去三代為逺今去開元不逺是非難行之道也後之言治道者當使一民有百畝之田然後可以議魏齊周隋唐之事若有無田之民不耕之夫則於魏齊周隋唐之事未可輕議也言利之臣則亦當量開元之前所以為重賦者百畝之田不過二石粟二丈絹耳所以為輕賦者上户之家不過十文耳今百畝之田賦歛如此上户之家出錢如此吾於如此之中復何容心哉歴代户口禹平水土為九州有民千三百五十五萬三千九百二十三口塗山之㑹執玉帛者萬國夏之衰也逮成湯受命其能存者三千餘國商徳之衰也逮周武王受命定五等之封有千七百七十三國及周公相成王致治刑措有民千三百七十萬四千九百二十三口此周之極盛也東遷之後莊王之十三年自太子公侯下至庶人凡千一百八十四萬一千九百二十三人其後戰國相併摧殘民命伊闕之敗斬首二十四萬長平之戰血流漂鹵然考蘇張之説計秦及山東六國戎卒尚踰五百餘萬推人口數尚當千餘萬秦兼諸侯所殺三分居一猶以餘力北築長城四十餘萬南戌五嶺五十餘萬阿房驪山七十萬三十年間百姓死沒相踵于路陳項又肆其酷烈新安之坑二十餘萬彭城之戰睢水不流漢高帝定天下人之死傷亦數百萬是以平城之卒不過三十萬方之六國十分無三至孝平元始二年人户千二百二十三萬三千口五千九百五十九萬四千九百七十八此漢之極盛也及王莽簒位續以更始赤眉之亂率土遺黎十纔有二三後漢光武建武中兵革漸息至中元二年户四百二十七萬六百三十四口二千一百萬七千八百二十明章之後天下無事務在養民至孝和人户滋殖桓帝永壽三年户千六十七萬七千九百六十口五千六百四十八萬六千八百五十六建安之際海内荒殘人户所存十無一二魏武據中原劉備割巴蜀孫權盡有江東之地三國鼎立戰爭不息及平蜀得户二十八萬口九十四萬帶甲將士十萬二千吏四萬通計户九十四萬三千四百二十三口五百三十七萬二千八百八十一除平蜀所得當時魏氏唯有户六十六萬三千四百二十三口有四百四十三萬二千八百八十一晉武帝太康元年平吳收其圗籍户五十三萬吏三萬二千兵二十三萬男女口二百三十萬後宫五千餘人九州攸同大抵編户二百四十五萬九千八百四口千六百一十六萬三千八百六十三此晉之極盛也蜀劉禪炎興元年則魏常道鄉公景元四年嵗次癸未是嵗魏滅蜀至晉武太康元年嵗次庚子凡一十八年户增九十八萬六千三百八十一口增八百四十九萬九百八十二則當三國鼎峙之時天下通計户百四十七萬三千四百三十三口七百六十七萬二千八百八十一以奉三主斯以勤矣後趙石勒據有河北初文武官上疏請依劉備在蜀魏王在鄴故事魏王即曹公以河内魏汲等十一郡并前趙國合二十四户二十九萬為趙國前秦苻堅滅前燕慕容暐入鄴閲其名籍户二百四十五萬八千九百六十九口九千九百九十八萬七千九百三十五徙闗東豪傑及諸雜夷十萬口于闗中平燕定蜀盖為偽代之盛也時闗隴清晏百姓豐樂自長安至于諸州二十里一亭四十里一驛旅行者取給於途工商資販於道宋武帝北取南燕平廣固西滅後秦平闗洛長河以南盡為宋有孝武大明八年户九十萬六千八百七十口四百六十八萬五千五百一齊既短祚梁則喪亂宏多逮陳之末年隋家所收五十萬户二百萬口而已後魏起自隂山盡有中夏孝文遷都河洛定禮崇儒明帝正光以前時為全盛户口之數比夫晉太康倍而餘矣可謂盛哉及經爾朱之亂東西流移猶不下三百三十七萬五千三百六十八户焉北齊承魏末喪亂與周人抗衡雖開拓淮南而郡縣􅄶小文宣受禪性多殘虐武成後主俱為僻王至隆化二年為周所滅有户三百三萬二千五百二十八口二千萬六千八百八十後周大象中有户三百五十九萬口九百萬九千六百四隋以外戚代周無干戈之患文帝克己無誅斂之求至大業二年戸八百九十萬七千五百三十六口四千六百一萬九千九百五十六此隋之極盛也後周靜帝末授隋禪有户三百九十九萬九千六百四至開皇九年平陳得户五十萬及是纔二十六七年直増四百八十萬七千九百三十二煬帝承富庶之資恣荒滛之行登極之初即建洛邑毎月役丁二百萬人𨗳洛至淮及河又引沁水逹河北通涿郡築長城東西千餘里皆徵百萬餘人丁男不充以婦人兼役而死者大半及親征吐谷渾駐軍青海遇雨雪士卒死者十二三又三駕東征遼澤皆興百餘萬衆餽軍者倍之又逆徵數年之賦窮侈極奢舉天下之人十九為盗賊至唐貞觀間而户猶不滿三百萬三年户部奏中國人因塞外來歸及突厥前後䧏附開四夷為州縣獲男女一百二十餘萬口十四年侯君集破髙昌得三郡五縣二十二城户八千四十六口萬七千三十一馬千三百疋永徽元年户部尚書髙履行奏去年進户一十五萬高宗以天下進户既多謂長孫無忌曰比來國家無事户口稍多三二十年足為充實因問隋有幾户今有幾户履行奏隋大業中户八百七十萬今户三百八十萬顯慶二年十月上幸許汝州問中書令杜正倫曰此間田地極寛百姓太少因又問隋有㡬户正倫奏大業初有八百餘萬户末年離亂至武徳有二百餘萬户總章元年十月司空李勣破高麗國虜其王下城百七十户六十九萬七千二百配江淮以南山南京西天寳十四載管户總八百九十一萬四千七百九應不課户三百五十六萬五千五百一應課户五百三十四萬九千二百八管口總五千二百九十一萬九千三百九不課口四千四百七十萬九百八十八課口八百二十萬八千三百二十一此唐家之極盛也自天寳十四年至乾元三年損户總五百九十八萬二千五百八十四不課户損二百三十九萬一千九百九課户損三百五十九萬六百七十五損口總三千五百九十二萬八千七百二十三不課口損三千七十一萬三百一課口損五百二十一萬八千四百三十二户至大歴中唯有百三十萬户建中初命黜陟使徃諸道按比户口約都得主户百八十餘萬客户百有三十餘萬丁中漢孝景二年令天下男子年二十而始傅音附晉武帝平吳後有司奏男子年十六以上至六十為正丁十五以下至十三六十以上至六十五為次丁十二以下六十六以上為老小不事宋孝武帝大明中從王敬𢎞之言以十五至十六為半丁十七為全丁北齊武成清河三年乃令男子十八以上六十五以下為丁十六以上十七以下為中六十六以上為老十五以下為小隋文帝頒新令男女三嵗以下為黄十嵗以下為小十七以下為中十八以上為丁丁從課役六十為老乃免開皇三年令軍人以二十一成丁煬帝即位户口益多男子以二十二成丁高熲奏以民間課稅雖有定分年常徵納除注恒多長吏肆情文帳出沒既無定簿難以推校乃為輸籍之様請遍下諸州毎年正月五日縣令廵人各隨便近五黨三黨各為一團依様定户上下帝從之自是姦無所容矣唐武徳七年定令男女始生為黄四嵗為小十六為中二十一為丁六十為老神龍元年韋皇后求媚於人上表請天下百姓年二十二成丁五十八免役制從之天寳三年十二月制自今以後百姓宜以十八以上為中男二十三以上成丁按開元二十五年户令云諸户主皆以家長為之户内有課口者為課户無課口者為不課户諸視流内九品以上官及男年二十以上老男廢疾妻妾部曲客女奴婢皆為不課户善乎杜佑之論也家足不在於逃稅國足不在於重歛若逃稅則不土著而人貧重歛則多養羸而國貧三王以前井田定賦秦革周制漢因秦法魏晉已䧏名數雖繁亦有良規不救時弊昔東晉之宅江南也慕容苻姚迭居中土人無定本傷理為深遂有庚戍土斷之令財豐俗阜實由於兹其後法制廢弛舊弊復起義熈之際重舉而行已然之效著在前志隋受周禪得户三百六十萬開皇九年平陳又收户五十萬洎于大業二年干戈不用唯十八載有户八百九十萬矣自平陳後又加四百八十餘萬其時承西魏喪亂周齊分據暴君慢吏賦重役勤人不堪命多依豪室禁網隳紊姦偽尤滋髙熲覩流冗之病建輸籍之法於是定其名輕其數使人知為浮客被彊家收大半之賦為編甿奉公上䝉輕減之征先敷其信後行其令烝庶懐惠姦無所容隋氏資儲遍於天下民俗康阜熲之力焉功規蕭葛道亞伊呂近代以來未之有也唐家貞觀中有户三百萬至天寳末百三十餘年纔如隋氏之數唐氏之盛邁於西漢約計天下編户合踰元始之間而名籍所少三百餘萬直以選賢授任多在藝文才與職乖法因事弊隳循名責實之義闕考言詢事之道崇秩之所至美價之所歸不無輕薄之曹浮華之伍習程典親簿領謂之淺俗務根本去枝葉目以迂濶風流相尚奔競相驅職事委於郡胥貨賄行於公府而至此也通志卷六十一
