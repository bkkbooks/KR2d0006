body:
  text: 通志卷八十六宋右廸功郎鄭樵漁仲撰周異姓世家第一齊陳杞宋楚齊太公望吕尚者東海上人其先祖嘗為四嶽佐禹平水王甚有功虞夏之際封於吕或封於申姓姜氏夏商之時申吕或封枝庶子孫或為庶人尚其後苗裔也本姓姜氏從其封姓故曰吕尚吕尚蓋嘗窮困年老矣以漁釣奸周西伯西伯將出獵卜之曰所獲非龍非酈非虎非羆所獲霸王之輔於是周西伯獵果遇太公於渭之陽與語大説曰自吾先君太公曰當有聖人適周周以興子真是邪吾太公望子乆矣故號之曰太公望載與俱歸立為師或曰太公博聞嘗事紂紂無道去之游説諸侯無所遇而卒西歸周西伯或曰吕尚處士隐海濵周西伯拘羑里散宜生閎夭素知而招吕尚吕尚亦曰吾聞西伯賢又善養老盍往焉三人者為西伯求美女竒物獻之於紂以贖西伯西伯得以出反國言吕尚所以事周雖異然要之為文武師周西伯昌之脱羑里歸與吕尚隂謀修德以傾商政其事多兵權與竒計故後世之言兵及周之隂權皆宗太公為本謀周西伯政平及斷虞芮之訟而詩人稱西伯受命曰文王伐崇宻須犬夷大作豐邑天下三分其二歸周者太公之謀計居多文王崩武王即位九年欲修文王業東伐以觀諸侯集否師行尚父左杖黄鉞右把白旄以誓曰蒼兕蒼兕總爾衆庶與爾舟楫後至者斬遂至盟津諸侯不期而㑹者八百諸侯諸侯皆曰紂可伐也武王曰未可還師與太公作此泰誓居二年紂殺王子比干囚箕子武王將伐紂卜龜兆不吉風雨暴至羣公盡懼唯太公彊之勸武王武王於是遂行十一年正月甲子誓於牧野伐商紂紂師敗績紂反走登鹿臺遂追斬紂明日武王立于社羣公奉明水衛康叔封布采席師尚父牽牲史佚策祝以告神討紂之罪散鹿臺之錢發鉅橋之粟以振貧民封比干墓釋箕子囚遷九鼎修周政與天下更始師尚父謀居多於是武王已平商而王天下封師尚父於齊營邱東就國道宿行遲逆旅之人曰吾聞時難得而易失客寢甚安殆非就國者也太公聞之夜衣而行犂明至國萊侯來伐與之爭營邱營邱邊萊萊人夷也㑹紂之亂而周初定未能集遠方是以與太公爭國太公至國修政因其俗簡其禮通商工之業便魚鹽之利而人民多歸齊齊為大國及周成王少時管蔡作亂淮夷畔周乃使召康公命太公曰東至海西至河南至穆陵北至無棣五侯九伯實得征之齊由此得征伐為大國都營邱蓋太公之卒百有餘年子丁公吕伋立丁公卒子乙公得立乙公卒子癸公慈母立癸公卒子哀公不辰立哀公時紀侯譖之周周烹哀公而立其弟静是為胡公胡公徙都薄姑而當周夷王之時哀公之同母少弟山怨胡公乃與其黨率營邱人襲攻殺胡公而自立是為獻公獻公元年盡逐胡公子因徙薄姑都治臨菑九年獻公卒子武公夀立武公九年周厲王出奔居彘十年王室亂大臣行政號曰共和二十四年周宣王初立二十六年武公卒子厲公無忌立厲公暴虐故胡公子復入齊齊人欲立之乃與攻殺厲公胡公子亦戰死齊人乃立厲公子赤為君是為文公而誅殺厲公者七十人文公十二年卒子成公脱立成公九年卒子荘公購立荘公二十四年犬戎殺幽王周東徙雒秦始列為諸侯五十六年晉弑其君昭侯六十四年荘公卒子釐公禄甫立釐公九年魯隐公初立十九年魯桓公弑其兄隐公而自立為君二十五年北戎伐齊鄭使太子忽來救齊齊欲妻之忽曰鄭小齊大非我敵遂辭之三十二年釐公同母弟夷仲年死其子曰公孫無知釐公愛之令其秩服奉養比太子三十三年釐公卒太子諸兒立是為㐮公㐮公元年始為太子時嘗與無知闘及立絀無知秩服無知怨四年魯桓公與夫人如齊齊㐮公故嘗私通魯夫人魯夫人者㐮公女弟也自釐公時嫁為魯桓公婦及桓公來而㐮公復通焉魯桓公知之怒夫人夫人以告齊㐮公齊㐮公與魯君飲醉之使力士彭生抱上魯君車因拉殺魯桓公桓公下車則死矣魯人以為譲而齊㐮公殺彭生以謝魯八年伐紀紀遷去其邑十二年初㐮公使連稱管至父戍葵邱𤓰時而往及𤓰而代往戍一嵗卒𤓰時而公弗為發代或為請代公弗許故此二人怒因公孫無知謀作亂連稱有從妹在公宫無寵使之間㐮公曰事成以女為無知夫人冬十二月㐮公游姑棼遂獵沛邱見彘從者曰彭生公怒射之彘人立而啼公懼墜車傷足失屨反而鞭主屨者茀三百茀出宫而無知連稱管至父等聞公傷乃遂率其衆襲宫逢主屨茀茀曰且無入驚宫驚宫未易入也無知弗信茀示之創乃信之待宫外令茀先入茀先入即匿㐮公户間良久無知等恐遂入宫茀反與宫中及公之幸臣攻無知等不勝皆死無知入宫求公不得或見人足於戸間發視乃㐮公遂弑之而無知自立為齊公桓公元年春齊君無知游於雍林雍林人嘗有怨無知及其往游雍林人襲殺無知告齊大夫曰無知弑㐮公自立臣請行誅唯大夫更立公子之當立者唯命是聽初㐮公之醉殺魯桓公通其夫人殺誅數不當淫於婦人數欺大臣羣弟恐禍及故次弟糾奔魯其母魯女也管仲召忽傅之次弟小白之莒鮑叔傅之小白母衛女也有寵於釐公小白自少好善大夫高傒及雍林人殺無知議立君高國先隂召小白於莒魯聞無知死亦發兵送公子糾而使管仲别将兵遮莒道射中小白帶鉤小白詳死管仲使人馳報魯魯送糾者行益遲六日至齊則小白已入高傒立之是為桓公桓公之中鉤詳死以誤管仲已而載溫車中馳行亦有高國内應故得先入立發兵距魯秋與魯戰于乾時魯兵敗走齊兵掩絶魯歸道齊遺魯書曰子糾兄弟弗忍誅請魯自殺之召忽管仲讎也請得而甘心醢之不然将圍魯魯人患之遂殺子糾于笙瀆召忽自殺管仲請囚桓公之立發兵攻魯心欲殺管仲鮑叔牙曰臣幸得從君君竟以立君之尊臣無以増君君将治齊即高傒與叔牙足也君且欲霸王非管夷吾不可夷吾所居國國重不可失也於是桓公從之乃詳為召管仲欲甘心實欲用之管仲知之故請往鮑叔牙迎受管仲及堂阜而脱桎梏齋祓而見桓公桓公厚禮以為大夫任政桓公既得管仲與鮑叔隰朋高傒修齊國政連五家之兵設輕重魚鹽之利以贍貧窮禄賢能齊人皆説二年伐滅郯郯子奔莒初桓公亡時過郯郯無禮故伐之五年伐魯魯将師敗魯莊公請獻遂邑以平桓公許與魯㑹柯而盟魯將盟曹沫以匕首劫桓公於壇上曰反魯之侵地桓公許之已而曹沫去匕首北面就臣位桓公後悔欲無與魯地而殺曹沫管仲曰夫劫許之而倍信殺之愈一小快耳而棄信於諸侯失天下之援不可於是遂與曹沫三敗所亡地於魯諸侯聞之皆信齊而欲附焉七年諸侯㑹桓公於鄄而桓公於是始霸焉十四年陳厲公子完號敬仲來奔齊齊桓公欲以為卿譲於是以為工正田成子常之祖也二十三年山戎伐燕燕告急於齊齊桓公救燕遂伐山戎至于孤竹而還燕莊公遂送桓公入齊境桓公曰非天子諸侯相送不出境吾不可以無禮於是分溝割燕君所至與燕命燕君復修召公之政納貢于周如成康之時諸侯聞之皆從齊二十七年魯湣公母曰哀姜桓公女弟也哀姜淫於魯公子慶父慶父殺湣公哀姜欲立慶父魯人更立釐公桓公召哀姜殺之二十八年衛文公有狄亂告急於齊齊率諸侯城楚邱而立衛君二十九年桓公與夫人蔡姬戲船中蔡姬習水蕩公公懼止之不止出船怒歸蔡姬弗絶蔡亦怒嫁其女桓公聞而怒興師征伐三十年春齊桓公率諸侯伐蔡蔡潰遂伐楚楚成王興師問曰何故渉吾地管仲對曰昔召康公命我先君太公曰五侯九伯若實征之以夾輔周室賜我先君履東至海西至河南至穆陵北至無棣楚貢包茅不入王祭不具是以來責昭王南征不復是以來問楚王曰貢之不入寡人罪也敢不共乎昭王之出不復君其問之水濵齊師進次于陘夏楚王使屈完将兵扞齊齊師退次召陵桓公矜屈完以其衆屈完曰君以道則可若不則楚方城以為城江漢以為溝君安能進乎乃與屈完盟而去過陳陳轅濤塗詐齊令出東方覺秋齊伐陳是嵗晉殺太子申生三十五年夏㑹諸侯于葵邱周㐮王使宰孔賜桓公文武胙彤弓矢大路命無拜桓公欲許之管仲曰不可乃下拜受賜秋復㑹諸侯於葵邱益有驕色周使宰孔㑹諸侯頗有叛者晉侯病後遇宰孔宰孔曰齊侯驕矣弟無行從之是嵗晉獻公卒里克殺奚齊卓子秦穆公以夫人入公子夷吾為晉君桓公於是討晉亂至高梁使隰朋立晉君還是時周室㣲唯齊楚秦晉為彊晉初與㑹獻公死國内亂秦穆公辟遠不與中國㑹盟楚成王初收荆蠻有之夷狄自置唯齊為中國㑹盟而桓公能宣其德故諸侯賔㑹於是桓公稱曰寡人南伐至召陵望熊山北伐山戎離枝孤竹西伐大夏渉流沙束馬懸車登太行至卑耳山而還諸侯莫違寡人寡人兵車之㑹三乘車之㑹六九合諸侯一匡天下昔三代受命者何以異於此乎吾欲封泰山禪梁父管仲固諌不聽乃説桓公以遠方珍怪物至乃得封桓公乃止三十八年周㐮王弟帶與戎翟合謀伐周齊使管仲平戎於周周欲以上卿禮管仲管仲頓首曰臣陪臣安敢三譲乃受下卿禮以見三十九年周㐮王弟帶來奔齊齊使仲孫請王為帶謝㐮王怒弗聽四十一年秦穆公虜晉惠公復歸之是嵗管仲隰朋皆卒管仲病桓公問曰羣臣誰可相者管仲曰知臣莫如君公曰易牙何如對曰殺子以適君非人情不可公曰開方何如對曰倍親以適君非人情難近公曰豎刁如何對曰自宫以適君非人情難親管仲死而桓公不用管仲言卒近用三子三子專權四十二年戎伐周周告急齊齊令諸侯各發卒戍周是嵗晉公子重耳來桓公妻之四十三年初齊桓公之夫人三曰王姬徐姬蔡姬皆無子桓公好内多内寵如夫人者六人長衛姬生無詭少衛姬生惠公元鄭姬生孝公昭葛嬴生昭公潘密姬生懿公商人宋華子生公子雍桓公與管仲屬孝公於宋㐮公以為太子雍巫有寵於衛共姬因宦者豎刁以厚獻於桓公亦有寵桓公許之立無詭管仲卒五公子皆求立冬十月乙亥齊桓公卒易牙入與豎刁因内寵殺羣吏而立公子無詭為君太子昭奔宋桓公病五公子各樹黨争立及桓公卒遂相攻以故宫中空莫敢棺桓公尸在牀上六十七日尸蟲出于戸十二月乙亥無詭立乃棺赴辛巳夜歛殯桓公十有餘子要其後立者五人無詭立三月死無諡次孝公次昭公次懿公次惠公孝公元年三月宋㐮公率諸侯兵送齊太子昭而伐齊齊人恐殺其君無詭齊人將立太子昭四公子之徒攻太子太子走宋宋遂與齊人四公子戰五月宋敗齊四公子師而立太子昭是為齊孝公宋以桓公與管仲屬之太子故來征之以亂故八月乃葬齊桓公六年春齊伐宋以其不同盟于齊也夏宋㐮公卒七年晉文公立十年孝公卒孝公弟潘因衛公子開方殺孝公子而立潘是為昭公昭公桓公子也其母曰葛嬴昭公元年晉文公敗楚於城濮而㑹諸侯踐土朝周天子使晉稱伯六年翟侵齊晉文公卒秦兵敗於殽十二年秦穆公卒十九年五月昭公卒子舎立為齊君舍之母無寵於昭公國人莫畏昭公之弟商人以桓公死争立而不得隂交賢士附愛百姓百姓説及昭公卒子舍立孤弱即與衆十月即墓上弑齊君舍而商人自立是為懿公懿公桓公子也其母曰密姬懿公四年春初懿公為公子時與丙戎之父獵争獲不勝及即位斷丙戎父足而使丙戎僕庸職之妻好公内之宫使庸職驂乘五月懿公游於申池二人浴戲職曰斷足子戎曰奪妻者二人俱病此言乃怨謀與公游竹中二人弑懿公車上棄竹中而亡去懿公之立驕民不附齊人廢其子而迎公子元於衛立之是為惠公惠公桓公子也其母衛女曰少衛姬避齊亂故在衛惠公二年長翟來王子城父攻殺之埋之於北門晉趙穿弑其君靈公十年惠公卒子頃公無野立初崔杼有寵於惠公惠公卒高國畏其偪也逐之崔杼奔衛頃公元年楚莊王彊伐陳二年圍鄭鄭伯降已復國鄭伯六年春晉使郤克於齊齊使夫人帷中而觀之郤克上夫人笑之郤克曰不是報不復渉河歸請伐齊晉侯弗許齊使至晉郤克執齊使者四人河内殺之八年晉伐齊齊以公子彊質晉晉兵去十年春齊伐魯衛魯衛大夫如晉請師皆因郤克晉使郤克以車八百乘為中軍將士燮將上軍欒書將下軍以救魯衛伐齊六月壬申與齊侯兵合靡笄下癸酉陳于鞍逢丑父為齊頃公右頃公曰馳之破晉軍㑹食射傷郤克流血至履克欲還入璧其御曰我始入再傷不敢言疾恐懼士卒願子忍之遂復戰戰齊急丑父恐齊侯得乃易處頃公為右車絓於木而止晉小將韓厥伏齊侯車前曰寡君使臣救魯衛戲之丑父使頃公下取飲因得亡脱去入其軍晉郤克欲殺丑父丑父曰代君死而見僇後人臣無忠其君者矣克舍之丑父遂得亡歸齊於是晉軍追齊至馬陵齊侯請以寳器謝不聽必得笑克蕭桐叔子對曰叔子齊君母齊君母亦猶晉君母子安置之且子以義伐而以暴為後其可乎於是乃許令反魯衛之侵地十一年晉初置六卿賞鞍之功齊頃公朝晉欲尊王晉景公晉景公不敢受乃歸歸而頃公弛苑囿薄賦斂振孤問疾虛積聚以救民民亦大説厚禮諸侯竟頃公卒百姓附諸侯不犯十七年頃公卒子靈公環立靈公九年晉欒書弑其君厲公十年晉悼公伐齊齊令公子光質晉十九年立子光為太子高厚傅之令㑹諸侯盟於鍾離二十七年晉使中行獻子伐齊齊師敗靈公走入臨菑晏嬰止靈公靈公弗從曰君亦無勇矣晉兵遂圍臨菑臨菑城守不敢出晉焚郭中而去二十八年初靈公取魯女生子光以為太子仲姬戎姬戎姬嬖仲姬生子牙屬之戎姬戎姬請以為太子公許之仲姬曰不可光之立列於諸侯矣今無故廢之君必悔之公曰在我耳遂東太子光使高厚傅牙為太子靈公疾崔杼迎故太子光而立之是為莊公莊公殺戎姬五月壬辰靈公卒荘公即位執太子牙於句竇之邱殺之八月崔杼殺高厚晉聞齊亂伐齊至高唐荘公三年晉大夫欒盈奔齊荘公厚客待之晏嬰田文子諌公弗聽四年齊莊公使欒盈間入晉曲沃為内應以兵随之上太行入孟門欒盈敗齊兵還取朝歌六年初棠公妻好棠公死崔杼取之莊公通之數如崔氏以崔杼之冠賜人侍者曰不可崔杼怒因其伐晉欲與晉合謀襲齊而不得間莊公嘗笞宦者賈舉賈舉復侍為崔杼間公以報怨五月莒子朝齊齊以甲戌饗之崔杼稱病不視事乙亥公問崔杼病遂從崔杼妻崔杼妻入室與崔杼自閉戸不出公擁柱而歌宦者賈舉遮公從宫而入閉門崔杼之徒持兵從中起公登臺而請解不許請盟不許請自殺於廟不許皆曰君之臣杼疾病不能聽命近於公宫陪臣干掫有淫者不知二命公踰牆射中公股公反墜遂弑之晏嬰立崔杼門外曰君為社稷死則死之為社稷亡則亡之若為已死已亡非其私䁥誰敢任之門開而入枕公尸而哭三踊而出人謂崔杼必殺之崔杼曰民之望也舍之得民丁丑崔杼立莊公異母弟杵臼是為景公景公母魯叔孫宣伯女也景公立以崔杼為右相慶封為左相二相恐亂起乃與國人盟曰不與崔慶者死晏子仰天曰嬰所不獲唯忠於君利社稷者是從不肯盟慶封欲殺晏子崔杼曰忠臣也舍之齊太史書曰崔杼弑莊公崔杼殺之其弟復書崔杼復殺之少弟復書崔杼乃舍之景公元年初崔杼生子成及彊其母死取東郭女生明東郭女使其前夫子無咎與其弟偃相崔氏成有罪二相急治之立明為太子成請老於崔杼崔杼許之二相弗聽曰崔宗邑不可成彊怒告慶封慶封與崔杼有郤欲其敗也成彊殺無咎偃於崔杼家家皆奔亡崔杼怒無人使一宦者御見慶封慶封曰請為子誅之使崔杼仇盧蒲嫳攻崔氏殺成彊盡滅崔氏崔氏婦自殺崔杼無歸亦自殺慶封為相國專權三年十月慶封出獵初慶封已殺崔杼益驕嗜酒好獵不聽政令慶舍用政已有内郤田文子謂桓子曰亂將作田鮑高欒氏相與謀慶舍發甲圍慶封宫四家徒共擊破之慶封還不得入奔魯齊人讓魯封奔吳吳與之朱方聚其族而居之富於在齊其秋齊人徙葬莊公僇崔杼尸於市以説衆九年景公使晏嬰之晉與叔向私語曰齊政卒歸田氏田氏雖無大德以公權私有德於民民愛之十二年景公如晉見平公欲與伐燕十八年公復如晉見昭公二十六年獵魯郊因入魯與晏嬰俱問魯禮三十一年魯昭公辟季氏難奔齊齊欲以干社封之子家止昭公昭公乃請齊伐魯取鄆以居昭公三十二年彗星見景公坐柏寢歎曰堂堂誰有此乎羣臣皆泣晏子笑公怒晏子曰臣笑羣臣諛甚景公曰彗星出東北當齊分野寡人以為憂晏子曰君高臺深池賦歛如弗得刑罰恐弗勝茀星將出彗星何懼乎公曰可禳否晏子曰使神可祝而來亦可禳而去也百姓苦怨以萬數而君令一人禳之安能勝衆口乎是時景公好治宫室聚狗馬奢侈厚賦重刑故晏子以此諌之四十二年吳王闔閭伐楚入郢四十七年魯陽虎攻其君不勝奔齊請齊伐魯鮑子諫景公乃囚陽虎陽虎得亡奔晉四十八年與魯定公好㑹夾谷犁鉏曰孔丘知禮而怯請令萊人為樂因執魯君可得志景公喜孔丘相魯懼其霸故從犁鉏之計方㑹進萊樂孔子歴階上使有司執萊人斬之以禮譲景公景公慙乃歸魯侵地以謝而罷去是嵗晏嬰卒五十五年范中行反其君於晉晉攻之急來請粟田乞欲為亂樹黨於逆臣説景公曰范中行數有德於齊不可不救乃使乞救而輸之粟五十八年夏景公夫人燕姬適子死景公寵妾芮姬生子荼荼少其母賤無行諸大夫恐其為嗣乃言願擇諸子長賢者為太子景公老惡言嗣事又愛荼母欲立之憚發之口乃謂諸大夫曰為樂耳國何患無君乎秋景公病命國惠子高昭子立少子荼為太子逐羣公子遷之萊景公卒太子荼立是為晏孺子冬未葬而羣公子畏誅皆出亡荼諸異母兄公子夀駒黔奔衛公子駔陽生奔魯萊人歌之曰景公死乎弗與埋三軍事乎弗與謀師乎師乎胡黨之乎晏孺子元年春田乞偽事高國者每朝乞参乘言曰子得君大夫皆自危欲謀作亂又謂諸大夫曰高昭子可畏及未發先之大夫從之六月田乞鮑牧乃與大夫以兵入公宫攻高昭子昭子聞之與國惠子救公公師敗田乞之徒追之國惠子奔莒遂反殺高昭子晏圉奔魯八月齊秉意兹田乞敗二相乃使人之魯召公子陽生陽生至齊私匿田乞家十月戊子田乞請諸大夫曰常之母有魚菽之祭幸來㑹飲㑹飲田乞盛陽生橐中置坐中央發橐出陽生曰此乃齊君矣大夫皆伏謁將與大夫盟而立之鮑牧醉乞誣大夫曰吾與鮑牧謀共立陽生鮑牧怒曰子忘景公之命乎諸大夫相視欲悔陽生前頓首曰可則立之否則已鮑牧恐禍起乃復曰皆景公子也何為不可乃與盟立陽生是為悼公悼公入宫使人遷晏孺子於駘殺之幕下而逐孺子母芮子芮子故賤而孺子少故無權國人輕之悼公元年齊伐魯取讙闡初陽生亡在魯季康子以其妹妻之及歸即位使迎之季姬與季魴侯通言其情魯弗敢與故齊伐魯竟迎季姬季姬嬖齊復歸魯侵地鮑子與悼公有郤不善四年吳魯伐齊南方鮑子弑悼公赴于吳吳王夫差哭於軍門外三日將從海入討齊齊人敗之吳師乃去晉趙鞅伐齊至賴而去齊人共立悼公子壬是為簡公簡公四年春初簡公與父陽生俱在魯也闞止有寵焉及即位使為政田成子憚之驟顧於朝御鞅言簡公曰田闞不可並也君其擇焉弗聽子我夕田逆殺人逢之遂捕以入田氏方睦使囚病而遺守囚者酒醉而殺守者得亡子我盟諸田於陳宗初田豹欲為子我臣使公孫言豹豹有喪而止後卒以為臣幸於子我子我謂曰吾盡逐田氏而立女可乎對曰我遠田氏矣且其違者不過數人何盡逐焉遂告田氏子行曰彼得君弗先必禍子子行舍於公宫夏五月壬申成子兄弟四乘如公子我在幄出迎之遂入閉門宦者禦之子行殺宦者公與婦人飲酒于檀臺成子遷諸寢公執戈將擊之太史子餘曰非不利也將除害也成子出舍于庫聞公猶怒將出曰何所無君子行拔劍曰需事之賊也誰非田宗所不殺子者有如田宗乃止子我歸屬徒攻闈與大門皆弗勝乃出田氏追之豐邱人執子我以告殺之郭關成子將殺大陸子方田逆請而免之以公命取車於道田豹與之車弗受曰逆為余請豹與余車余有私焉事子我而有私於其讐何以見魯衛之士庚辰田常執簡公于徐州公曰余蚤從御鞅言不及此甲午田常弑簡公于徐州田常乃立簡公弟驁是為平公平公即位田常相之專齊之政割齊安平以東為田氏封邑平公八年越滅吳二十五年卒子宣公積立宣公五十一年卒子康公貸立田㑹反廪邱康公二年韓魏趙始列為諸侯十九年田常曾孫田和始為諸侯遷康公海濵二十六年康公卒吕氏遂絶其祀田氏卒有齊國為齊威王彊於天下陳杞陳胡公滿者虞帝舜之後也昔舜為庶人時堯妻之二女居于媯汭其後因為氏姓姓媯氏舜已崩傳禹天下而舜子商均為封國夏后之時或失或續至于周武王克殷紂乃復求舜後得媯滿封之於陳以奉帝舜祀是為胡公胡公卒子申公犀侯立申公卒弟相公臯羊立相公卒立申公子突是為孝公孝公卒子慎公圉戎立慎公當周厲王時慎公卒子幽公寧立幽公十二年周厲王奔于彘二十三年幽公卒子釐公孝立釐公六年周宣王即位三十六年釐公卒子武公靈立武公十五年卒子夷公説立是歲周幽王即位夷公三年卒弟平公燮立平公七年周幽王為犬戎所殺周東徙秦始列為諸侯二十三年平公卒子文公圉立文公元年取蔡女生子佗十年文公卒長子桓公鮑立桓公二十三年魯隐公初立二十六年衛殺其君州吁三十三年魯弑其君隐公三十八年正月甲戍己丑陳桓公鮑卒桓公弟佗其母蔡女故蔡人為佗殺五父及桓公太子免而立佗是為厲公桓公病而亂作國人分散故再赴厲公二年生子敬仲完周太史過陳陳厲公使以周易筮之得觀之否曰是為觀國之光利用賔于王此其伐陳有國乎不在此其在異國必姜姓姜姓太嶽之後物莫能兩大陳衰此其昌乎厲公取蔡女蔡女與蔡人亂厲公數如蔡淫七年厲公所殺桓公太子免之三弟長曰躍中曰林少曰杵臼共令蔡人誘厲公以好女與蔡人共殺厲公而立躍是為利公利公者桓公子也利公立五月卒立中弟林是為莊公莊公七年卒少弟杵臼立是為宣公宣公三年楚武王卒楚始彊十七年周惠王娶陳女為后二十一年宣公後有嬖姬生子欵欲立之乃殺其太子禦㓂禦㓂素愛厲公子完完懼禍及已奔齊齊桓公欲使陳完為卿完曰羈旅之臣幸得免負擔君之惠也不敢當高位桓公使為工正齊懿仲欲妻陳敬仲卜之占曰是謂鳯皇于飛和鳴鏘鏘有媯之後將育于姜五世其昌並于正卿八世之後莫之與京三十七年齊桓公伐蔡蔡東道惡桓公怒執陳轅濤塗是歲晉獻公殺其太子申生四十五年宣公卒子欵立是為穆公穆公五年齊桓公卒十六年晉文公敗楚師于城濮是歲穆公卒子共公朔立共公六年楚太子商臣弑其父成王代立是為穆王十一年秦穆公卒十八年共公卒子靈公平國立靈公元年楚莊王即位六年楚伐陳十年陳及楚平十四年靈公與其大夫孔寧儀行父皆通於夏姬衷其衣以戲於朝泄冶諌曰君臣淫亂民何效焉靈公以告二子二子請殺泄冶公弗禁遂殺泄冶十五年靈公與二子飲於夏氏公戲二子曰徴舒似汝二子曰亦似公徴舒怒靈公罷酒出徴舒伏弩廐門射殺靈公孔寧儀行父皆奔楚靈公太子午奔晉徴舒自立為陳侯徴舒故陳大夫也夏姬御叔之妻舒之母也成公元年冬楚莊王為夏徴舒殺靈公率諸侯伐陳謂陳曰無驚吾誅徴舒而己已誅徴舒因縣陳而有之羣臣畢賀申叔時使於齊來還獨不賀莊王問其故對曰鄙語有之牽牛徑人田田主奪之牛徑則有罪矣奪之牛不亦甚乎今王以徴舒為賊弑君故徴兵諸侯以義伐之已而取之以利其地則後何以令於天下是以不賀莊王曰善乃迎陳靈公太子午於晉而立之復君陳如故是為成公孔子讀史記至楚復陳曰賢哉楚莊王輕千乘之國而重一言二十八年楚莊王卒二十九年陳倍楚盟三十年楚共王伐陳是歲成公卒子哀公弱立楚以陳喪罷兵去哀公三年楚圍陳復釋之二十八年楚公子圍弑其君郟敖自立為靈王三十四年初哀公娶鄭長姬生悼太子師少姬生偃二嬖妾長妾生留少妾生勝留有寵哀公哀公屬之其弟司徒招哀公病三月招殺悼太子立留為太子哀公怒欲誅招招發兵圍守哀公哀公自經殺招卒立留為陳君四月陳使使赴楚楚靈王聞陳亂乃殺陳使者使公子弃疾發兵伐陳陳君留奔鄭九月楚圍陳十一月滅陳使弃疾為陳君招之殺悼太子也太子之子名吳出奔晉晉平公問太史趙曰陳遂亡乎對曰陳顓頊之族陳氏得政於齊乃卒亡自幕至于瞽叟無違命舜重之以明德至於遂世世守之及胡公周賜之姓使祀虞帝且盛德之後必百世祀虞之世未也其在齊乎楚靈王滅陳五歲楚公子弃疾弑靈王代立是為平王平王初立欲得和諸侯乃求故陳悼太子師之子吳立為陳侯是為惠公惠公立探續哀公卒時年而為元空籍五歲矣十年陳火十五年吳王僚使公子光伐陳取胡沈而去二十八年吳王闔閭與子胥敗楚入郢是年惠公卒子懷公柳立懷公元年吳破楚在郢召陳侯陳侯欲往大夫曰吳新得意楚王雖亡與陳有故不可倍懷公乃以疾謝吳四年吳復召懷公懷公恐如吳吳怒其前不往留之因卒吳陳乃立懷公之子越是為湣公湣公六年孔子適陳吳王夫差伐陳取三邑而去十三年吳復來伐陳陳告急楚楚昭王來救軍於城父吳師去是年楚昭王卒於城父時孔子在陳十五年宋滅曹十六年吳王夫差伐齊敗之艾陵使人召陳侯陳侯恐如吳楚伐陳二十一年齊田常弑其君簡公二十三年楚之白公勝殺令尹子西子綦襲惠王葉公攻敗白公白公自殺二十四年楚惠王復國以兵北伐殺陳湣公遂滅陳而有之是歲孔子卒杞東樓公者夏后禹之後苖裔也殷時或封或絶周武王克殷紂求禹之後得東樓公封之於杞以奉夏后氏祀東樓公生西樓公西樓公生題公題公生謀娶公謀娶公當周厲王時謀娶公生武公武公立四十七年卒子靖公立靖公二十三年卒子共公立共公八年卒子德公立德公十八年卒弟桓公姑客立桓公十七年卒子孝公丐立孝公十七年卒弟文公益姑立文公十四年卒弟平公鬱立平公十八年卒子悼公成立悼公十二年卒子隐公乞立七月隐公弟遂弑隐公自立是為釐公釐公十九年卒子湣公維立湣公十五年楚惠王滅陳湣公弟閟路弑湣公代立是為哀公哀公立十年卒湣公子欶立是為出公十二年卒子簡公春立立一年楚惠王之四十四年滅杞杞後陳亡三十四年杞小㣲其事不足稱述宋㣲子開者殷帝乙之首子而紂之庶兄也紂既立不明淫亂於政㣲子數諌紂不聽及祖伊以周西伯昌之修德滅􅢿􅢿國懼禍至以告紂紂曰我生不有命在天乎是何能為於是㣲子度紂終不可諌欲死之及去未能自決乃問於太師少師曰殷不有治政不治四方我祖遂陳於上紂沉湎於酒婦人是用亂敗湯德於下殷既小大好草竊姦軌卿士師師非度皆有罪辜乃無維獲小民乃並興相為敵讐今殷其淪喪若渉水無津涯殷遂喪越至於今曰太師少師我其發出狂吾家保於喪今女無故告予顛隮如之何其太師若曰王子天篤下菑亡殷國乃毋畏畏不用耇長今殷民乃陋淫神祇之祀今誠得治國國治身死不恨為死終不得治不如去遂亡箕子者紂親戚也紂始為象箸箕子歎曰彼為象箸必為玉杯為杯則必思遠方珍怪之物而御之矣輿馬宫室之漸自此始不可振也紂為淫泆箕子諌不聽人或曰可以去矣箕子曰為人臣諌不聽而去是彰君之惡而自説於民吾不忍為也乃被髮佯狂而為奴遂隐而鼓琴以自悲故傳之曰箕子操王子比干者亦紂之親戚也見箕子諌不聽而為奴則曰君有過而不以死爭則百姓何辜乃直言諫紂紂怒曰吾聞聖人之心有七竅信有諸乎乃遂殺王子比干刳視其心㣲子曰父子有骨月而臣主以義屬故父有過子三諫不聽則随而號之人臣三諫不聽則其義可以去矣於是太師少師乃勸㣲子去遂行周武王伐紂克殷㣲子乃持其祭器造於軍門肉􅃝面縳左牽羊右把茅膝行而前以告於是武王乃釋㣲子復其位如故武王封紂子武庚祿父以續殷祀使管叔蔡叔傅相之武王既克殷訪問箕子武王曰於乎維天隂定下民相和其居我不知其常倫所序箕子對曰在昔鯀陻洪水汨陳其五行帝乃震怒不從洪範九等常倫所斁鯀則殛死禹乃嗣興天乃錫禹洪範九等常倫所序初一曰五行二曰五事三曰八政四曰五紀五曰皇極六曰三德七曰稽疑八曰庶徴九曰嚮用五福畏用六極五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土曰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作治明作智聰作謀睿作聖八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司宼七曰賔八曰師五紀一曰歲二曰月三曰日四曰星辰五曰歴數皇極皇建其有極斂時五福用傅錫其庶民維時其庶民于女極