成宋人擊之宋師大敗襄公傷股國人皆怨公公曰君子不困人於阨不鼓不成列子魚曰兵以勝為功何常言與必如公言即奴事之耳又何戰為楚成王已救鄭鄭享之去而取鄭二姬以歸叔瞻曰成王無禮其不没乎為禮卒於無别有以知其不遂霸也是年晉公子重耳過宋襄公以傷於楚欲得晉援厚禮重耳以馬二十乘十四年夏襄公病傷於泓而竟卒子成公壬臣立成公元年晉文公即位三年倍楚盟親晉以有德於文公也四年楚成王伐宋宋告急於晉五年晉文公救宋楚兵去九年晉文公卒十一年楚太子商臣弑其父成王代立十六年秦穆公卒十七年成公卒成公弟禦殺太子及大司馬公孫固而自立為君宋人共殺君禦而立成公少子杵臼是為昭公昭公四年宋敗長翟縁斯於長邱七年楚莊王即位九年昭公無道國人不附昭公弟鮑革賢而下士先襄公夫人欲通於公子鮑不可乃助之施於國因大夫華元為右師昭公出獵夫人王姬使衛伯攻殺昭公杵臼弟鮑革立是為文公文公元年晉率諸侯伐宋責以弑君聞文公定立乃去二年昭公子因文公母弟須與武繆戴莊桓之族為亂文公盡誅之出武繆之族四年春鄭命楚伐宋宋使華元將鄭敗宋囚華元華元之將戰殺羊以食士其御羊羮不及故怨馳入鄭軍故宋師敗得囚華元宋以兵車百乘文馬四百疋贖華元未盡入華元亡歸宋十四年楚莊王圍鄭鄭伯降楚楚復釋之十六年楚使過宋宋有前仇執楚使九月楚莊王圍宋十七年楚以圍宋五月不解宋城中急無食華元乃夜私見楚將子反子反告莊王王問城中何如曰析骨而炊易子而食莊王曰誠哉言我軍亦有七日糧以信故遂罷兵去二十二年文公卒子共公瑕立始厚葬君子譏華元不臣矣共公元年華元善楚將子重又善晉將欒書兩盟晉楚十三年共公卒華元為右師魚石為左師司馬唐山攻殺太子肥欲殺華元華元犇晉魚石止之至河乃還誅唐山乃立共公少子成是為平公平公三年楚共王伐宋之彭城以封宋左師魚石四年諸侯共誅魚石而歸彭城於宋三十五年楚公子圍弑其君自立為靈王四十四年平公卒子元公佐立元公三年楚公子棄疾弑靈王自立為平王八年宋火十年元公毋信詐殺諸公子大夫華向氏作亂楚平王太子建來犇見諸華氏相攻亂建去如鄭十五年元公為魯昭公避季氏居外為之求入魯行道卒子景公頭曼立景公十六年魯陽虎來犇已復去二十五年孔子過宋宋司馬桓魋惡之欲殺孔子孔子㣲服去三十年曹倍宋又倍晉宋伐曹晉不救遂滅曹有之三十六年齊田常弑簡公三十七年楚惠王滅陳熒惑守心心宋之分野也景公憂之司星子韋曰可移於相景公曰相吾之股肱曰可移於民景公曰君者待民曰可移於歲景公曰歲饑民困吾誰為君子韋曰天高聽卑君有君人之言三熒惑宜有動於是候之果徙三度六十四年景公卒宋公子特攻殺太子而自立是為昭公昭公者元公之曾庶孫也昭公父公孫糾糾父公子褍秦褍秦即元公少子也景公殺昭父糾故昭公怨殺太子而自立昭公四十七年卒子悼公購由立悼公八年卒子休公田立休公田二十三年卒子辟公辟兵立辟公三年卒子剔成立剔成四十一年剔成弟偃攻襲剔成剔成敗犇齊偃自立為宋君君偃十一年自立為王東敗齊取五城南敗楚取地三百里西敗魏軍乃與齊魏為敵國盛血以韋嚢縣而射之命曰射天淫於酒婦人羣臣諫者輙射之於是諸侯皆曰桀宋宋其復為紂所為不可不誅告齊伐宋王偃立四十七年齊湣王與魏楚伐宋殺王偃遂滅宋而三分其地楚楚之先祖出自帝顓頊高陽高陽者黄帝之孫昌意之子也高陽生稱稱生卷章卷章生重黎重黎為帝嚳高辛居火正甚有功能光融天下帝嚳命曰祝融共工氏作亂帝嚳使重黎誅之而不盡帝乃以庚寅日誅重黎而以其弟吳回為重黎後復居火正為祝融吳回生陸終陸終生子六人坼剖而産焉其長一曰昆吾二曰参胡三曰彭祖四曰㑹人五曰曹姓六曰季連芈姓楚其後也昆吾氏夏之時嘗為侯伯桀之時湯滅之彭祖氏殷之時嘗為侯伯殷之末世滅彭祖氏季連生附沮附沮生穴熊其後中㣲或在中國或在蠻夷弗能紀其世周文王之時季連之苖裔曰鬻熊鬻熊子事文王蚤卒鬻熊子曰熊麗熊麗生熊繹熊繹當周成王之時舉文武勤勞之後嗣而封熊繹於楚蠻封以子男之田姓芈氏居丹陽楚子熊繹與魯公伯禽衛康叔子牟晉侯燮齊太公子吕伋俱事成王熊繹生熊艾熊艾生熊􅲂熊􅲂生熊勝熊勝以弟熊楊為後熊楊生熊渠熊渠生子三人當周夷王之時王室㣲諸侯或不朝相伐熊渠甚得江漢間民和乃興兵伐庸楊粤至于鄂熊渠曰我蠻夷也不與中國之號諡乃立其長子康為句亶王中子紅為鄂王少子執疵為越章王皆在江上楚蠻之地及周厲王之時暴虐熊渠畏其伐楚亦去其王後為熊母康母康早死熊渠卒子熊摯紅立摯紅卒其弟弑而代立曰熊延熊延生熊勇熊勇六年而周人作亂攻厲王厲王出奔彘熊勇十年卒弟熊嚴十年卒有子四人長子伯霜中子仲雪次子叔堪少子季徇熊嚴卒長子伯霜代立是為熊霜熊霜元年周宣王初立熊霜六年卒三弟爭立仲雪死叔堪亡避難於濮而少弟季徇立是為熊徇熊徇十六年鄭桓公初封於鄭二十二年熊徇卒子熊咢立熊咢九年卒子熊儀立是為若敖若敖二十年周幽王為犬戎所弑周東徙而秦襄公始列為諸侯二十七年若敖卒子熊坎立是為霄敖霄敖六年卒子熊眴立是為蚡冒蚡冒十三年晉始亂以曲沃之故蚡冒十七年卒蚡冒弟熊通弑蚡冒子而代立是為楚武王武王十七年晉之曲沃莊伯弑主國晉孝侯十九年鄭伯弟段作亂二十一年鄭侵天子之田二十三年衞弑其君桓公二十九年魯弑其君隐公三十一年宋太宰華督弑其君殤公三十五年楚伐随随曰我無罪楚曰我蠻夷也今諸侯皆為叛相侵或相殺我有敝甲欲以觀中國之政請王室尊吾號随人為之周請尊楚王室不聽還報楚三十七年楚熊通怒曰吾先鬻熊文王之師也早終成王舉我先公乃以子男田令居楚蠻夷皆率服而王不加位我自尊耳乃自立為武王與随人盟而去於是始開濮地而有之五十一年周召随侯數以立楚為王楚怒以随背已伐随武王卒師中而兵罷子文王熊貲立始都郢文王二年伐申過鄧鄧人曰楚王易取鄧侯不許也六年伐蔡虜蔡哀侯以歸已而釋之楚彊陵江漢間小國小國皆畏之十一年齊桓公始霸楚亦始大十二年伐鄧滅之十五年卒子熊囏立是為杜敖杜敖五年欲殺其弟熊惲惲奔隨與隨襲弑杜敖代立是為成王成王惲元年初即位布德施惠結舊好於諸侯使人獻天子天子賜胙曰鎮爾南方夷越之亂無侵中國於是楚地千里十六年齊桓公以兵侵楚至陘山楚成王使將軍屈完以兵禦之與桓公盟桓公數以周之賦不入王室楚許之乃去十八年成王以兵北伐許許君肉袒謝乃釋之二十二年伐黄二十六年滅英三十三年宋襄公欲為盟㑹召楚楚王怒曰召我我將好往襲辱之遂行至盂遂執辱宋公已而歸之三十四年鄭文公南朝楚楚成王北伐宋敗之泓射傷宋襄公襄公遂病創死三十五年晉公子重耳過成王以諸侯客禮饗而厚送之於秦三十九年魯僖公來請兵以伐齊楚使申侯將兵伐齊取榖置齊桓公子雍焉齊桓公七子皆奔楚楚盡以為上大夫滅䕫䕫不祀祝融鬻熊故也夏伐宋宋告急於晉晉救宋成王罷歸將軍子玉請戰成王曰重耳亡居外乆卒得反國天之所開不可當子玉固請乃與之少師而去晉果敗子玉於城濮成王怒誅子玉四十六年初成王將以商臣為太子語令尹子上子上曰君之齒未也而又多内寵絀乃亂也楚國之舉常在少者且商臣蠭目而豺聲忍人也不可立之王不聽立之後又欲立子職而絀太子商臣商臣聞而未審也告其傅潘崇曰何以得其實崇曰饗王之寵姬江芈而勿敬也商臣從之江芈怒曰宜乎王之欲殺若而立職也商臣告潘崇曰信矣崇曰能事之乎曰不能能亡去乎曰不能能行大事乎曰能冬十月商臣以宫衞兵圍成王成王請食熊蹯而死不聽丁未成王自絞殺商臣代立是為穆王穆王立以其太子宫予潘崇使為太師掌國事穆王三年滅江四年滅六蓼臯陶之後八年伐陳十二年卒子莊王侣立莊王即位三年不出號令日夜為樂令國中曰有敢諫者死無赦伍舉入諫莊王左抱鄭姬右抱越女坐鐘鼓之間伍舉曰願有進隐曰有鳥在於阜三年不蜚不鳴是何鳥也莊王曰三年不蜚蜚將冲天三年不鳴鳴將驚人舉退矣吾知之矣居數月淫益甚大夫蘇從乃入諫王曰若不聞令乎對曰殺身以明君臣之願也於是乃罷淫樂聽政所誅者數百人所進者數百人任伍舉蘇從以政國人大説是歲滅庸六年伐宋獲五百乘八年伐陸渾戎遂至洛觀兵於周郊周定王使王孫滿勞楚王楚王問鼎小大輕重對曰在德不在鼎莊王曰子無阻九鼎楚國折鉤之喙足以為九鼎王孫滿曰嗚呼君王其忘之乎昔虞夏之盛遠方皆至貢金九牧鑄鼎象物百物而為之備使民知神姦桀有亂德鼎遷於殷載祀六百殷紂暴虐鼎遷於周德之休明雖小必重其姦回昬亂雖大必輕昔成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也楚王乃歸九年相若敖氏人或讒之王恐誅反攻王王擊滅若敖氏之族十三年滅舒十六年伐陳殺夏徴舒徴舒弑其君故誅之也已破陳即縣之羣臣皆賀申叔時使齊來不賀王問對曰鄙語曰牽牛徑人田田主取其牛徑者則不直矣取之牛不亦甚乎且王以陳之亂而率諸侯伐之以義伐之而貪其縣亦何以復令於天下莊王乃復國陳後十七年春楚莊王圍鄭三月克之入自皇門鄭伯肉􅃝牽羊以逆曰孤不天不能事君君用懷怒以及敝邑孤之罪也敢不唯命是聽賔之南海若以臣妾賜諸侯亦唯命是聽若君不忘厲宣桓武不絶其社稷使改事君孤之願也非所敢望也敢布腹心楚羣臣曰王勿許莊王曰其君能下人必能信用其民庸可絶乎莊王自手旗左右麾軍引兵去三十里而舍遂許之平潘尫入盟子良出質夏六月晉救鄭與楚戰大敗晉師河上遂至衡雍而歸二十年圍宋以殺楚使也圍宋五月城中食盡易子而食析骨而炊宋華元出告以請莊王曰君子哉遂罷兵去二十三年莊王卒子共王審立共王十六年晉伐鄭鄭告急共王救鄭與晉兵戰鄢陵晉敗楚射中共王目共王召將軍子反子反嗜酒從者豎陽榖進酒醉王怒射殺子反遂罷兵歸三十一年共王卒子康王招立康王立十五年卒子員立是為郟敖康王寵弟公子圍子比子晳棄疾郟敖三年以其季父康王弟公子圍為令尹主兵事四年圍使鄭道聞王疾而還十二月己酉圍入問王疾絞而弑之遂殺其子莫及平夏使使赴於鄭伍舉問曰誰為後對曰寡大夫圍伍舉更曰共王之子圍為長子比奔晉而圍立是為靈王靈王三年六月楚使使告晉欲㑹諸侯諸侯皆㑹楚于申用齊桓召陵之禮靈王已盟有驕色伍舉諫之語在伍舉傳七月楚以諸侯兵伐吳圍朱方八月克之囚慶封滅其族以封徇曰無效齊慶封弑其君而弱其孤以盟諸大夫封反曰莫如楚共王庶子圍弑其君兄之子員而代之立於是靈王使棄疾殺之七年就章華臺下令内亡人實之八年使公子棄疾將兵滅陳十年召蔡侯醉而殺之使棄疾定蔡因為陳蔡公十一年伐徐以恐吴靈王次於乾谿以待之王謂祈父曰予将使人求周鼎及齊晉魯衛分器周與四國其予我乎祈父對曰其予君王哉王又曰余將求鄭人許田其予我乎對曰周不愛鼎鄭敢愛田其予君王哉靈王大説或云王與右尹子革言祈父在焉王既入祈父以責子革曰吾子楚國之望也與王言如響國其若之何語具子革傳中十二年春楚靈王樂乾谿不能去也國人苦役初靈王㑹兵於申僇越大夫常夀過殺蔡大夫觀起起子從亡在吳乃勸吳王伐楚為間越大夫常夀過而作亂為吳間使矯公子棄疾命召公子比於晉至蔡與吳越兵欲襲蔡令公子比見棄疾與盟於鄧遂入殺靈王太子祿立子比為王公子子晳為令尹棄疾為司馬先除王宫觀從從師于乾谿令楚衆曰國有王矣先歸復爵邑田室後者遷之楚衆皆潰去靈王而歸靈王聞太子祿之死也自投車下而曰人之愛子亦如是乎侍者曰甚是王曰余殺人之子多矣能無及此乎右尹曰請待於郊以聽國人王曰衆怒不可犯曰且入大縣而乞師於諸侯王曰皆叛矣又曰且奔諸侯以聽大國之慮王曰大福不再秪取辱耳於是王乘舟將欲入鄢右尹度王不用其計懼俱死亦去王亡靈王於是獨傍徨山中野人莫敢入王王行遇其故鋗人謂曰為我求食我已不食三日矣鋗人曰新王下法有敢饟王從王者罪及三族且又無所得食王因枕其股而卧鋗人又以土自代逃去王覺而弗見遂饑不能起芈尹申無宇之子申亥曰吾父再犯王命王弗誅恩孰大焉乃求王遇王饑於釐澤奉之以歸夏五月癸丑王死申亥家申亥以二女從死并葬之是時楚國雖已立比為王畏靈王復來又不聞靈王死故觀從謂初王比曰不殺棄疾必敗比不聽國人每夜驚曰靈王入矣乙卯夜棄疾使船人從江上走呼曰靈王至矣國人愈驚又使曼成然告初王比及令尹子晳曰王至矣國人將殺君司馬將至矣君蚤自圖無取辱焉衆怒如水火不可救也初王及子晳遂自殺丙辰棄疾即位為王改名熊居是為平王平王以詐弑兩王而自立恐國人及諸侯叛之乃施惠百姓復陳蔡之地而立其後如故歸鄭之侵地存恤國中修政教吳以楚亂故獲五率以歸平王謂觀從恣爾所欲欲為卜尹王許之初共王有寵子五人無適立乃望祭羣神請神決之使主社稷而隂與巴姬埋璧於室内召五子齋而入康王跨之靈王肘加之子比子晳皆遠之平王幼抱而入再拜壓紐故康王以長立至其子失之圍為靈王及身而弑子比為王十餘日子晳不得立又俱誅四子皆絶無後唯獨棄疾後立為平王竟續楚祀如其神焉初子比自晉歸韓宣子問叔向曰子比其濟乎對曰不就宣子曰同惡相求如市賈焉何為不就對曰子比之取國也有五難有寵無人一也有人無主二也有主無謀三也有謀而無民四也有民而無德五也有楚國者其棄疾乎棄疾有五利獲神一也有民二也令德三也寵貴四也居常五也以五利去五難誰能害之子比果不終卒立者棄疾如其言焉語具叔向傳中平王二年使費無忌如秦為太子建娶婦婦好來未至無忌先歸説平王曰秦女好可自娶為太子更求平王聽之卒自娶秦女生熊珍更為太子娶是時伍奢為太子太傅無忌為少傅無忌以秦女故常讒惡太子建建母蔡女復無寵於王王用是愈益疎建六年使建居城父守邊無忌又讒太子建擅兵外交諸侯將以為亂平王召其太傅伍奢囚之奢有二子尚胥皆賢無忌教王質奢召其二子欲併誅之於是尚歸就死胥奔吳平王遂殺奢及尚事具伍奢傳中十年楚太子建母在居巢開吳吳使公子光伐楚遂敗陳蔡取太子建母而去楚恐城郢初吳之邊邑卑梁與楚邊邑鍾離小童争桑兩家交怒相攻滅卑梁人卑梁大夫怒發邑兵攻鍾離楚王聞之怒發國兵滅卑梁吳王聞之大怒亦發兵使公子光因建母家攻楚遂滅鍾離居巢楚乃恐而城郢十三年平王卒將軍子常曰太子珍少且其母乃前太子建所當娶也欲立令尹子西子西平王之庶弟也有義子西曰國有常法更立則亂言之則致誅乃立太子珍是為昭王昭王元年楚衆不説費無忌以其讒亡太子建殺伍奢子父與郤宛宛之宗姓伯氏子噽及子胥皆奔吳吳兵數侵楚楚人怨無忌甚楚令尹子常誅無忌以説衆衆乃喜四年吳三公子奔楚楚封之以扞吳五年吳伐取楚之六灊七年楚使子常伐吳吳大敗楚於豫章十年冬吳王闔閭伍子胥伯噽與唐蔡俱伐楚楚大敗吳兵遂入郢辱平王之墓以伍子胥故也吳兵之來楚使子常以兵迎之夾漢水陣吳伐敗子常子常亡奔鄭楚兵走吳乘勝逐之五戰入郢乙卯昭王出奔庚辰吳人入郢昭王亡也至雲夢雲夢不知其王也射傷王王走鄖鄖公之弟懷曰平王殺吾父今我殺其子不亦可乎鄖公止之然恐其弑昭王乃與王出奔随吳王聞昭王往即進擊随謂随人曰周之子孫封於江漢之間者楚盡滅之欲殺昭王王從臣子綦乃深匿王自以為王謂随人曰以我予吳随人卜予吳不吉乃謝吳王曰昭王亡不在随吳請入自索之随不聽吳亦罷去昭王之出郢也使申包胥請救於秦秦以車五百乘救楚楚亦收餘散兵與秦擊吳十一年六月敗吳於稷㑹吳王弟夫概見吳王兵傷敗乃亡歸自立為王闔閭聞之引兵去楚歸擊夫概夫概敗奔楚楚封之堂谿號為堂谿氏楚昭王滅唐九月歸入郢十二年吳復伐楚取番楚恐去郢北徙都鄀十六年孔子相魯二十年楚滅頓滅胡二十一年吳王闔閭伐越越王句踐射傷吳王遂死吳由此怨越而不西伐楚二十七年春吳伐陳楚昭王救之軍城父十月昭王病於軍中有赤雲如鳥夾日而蜚昭王問周太史太史曰是害於楚王然可移於將相將相聞是言乃請自以身禱於神昭王曰將相孤之股肱也今移禍庸去是身乎弗聽卜而河為祟大夫請禱河昭王曰自吾先王受封望不過江漢而河非所獲罪也止不許孔子在陳聞是言曰楚昭王通大道矣其不失國宜哉昭王病甚乃召諸公子大夫曰孤不佞再辱楚國之師今乃得以天夀終孤之幸也讓其弟公子申為王不可又讓次弟公子結亦不可乃又譲次弟公子閭五譲乃後許為王將戰庚寅昭王卒於軍中子閭曰王病甚舍其子讓羣臣臣所以許王以廣王意也今君王卒臣豈敢忘君王之意乎乃與子西子綦謀伏師閉塗迎越女之子章立之是為惠王然後罷兵歸葬昭王惠王二年子西召故平王太子建之子勝於吳以為巢大夫號曰白公白公好兵而下士欲報仇六年白公請兵令尹子西伐鄭初白公父建亡在鄭鄭殺之白公亡走吳子西復召之故以此怨鄭欲伐之子西許而未為發兵八年晉伐鄭鄭告急楚楚使子西救鄭受賂而去白公勝怒乃遂與勇力死士石乞等襲殺令尹子西子綦於朝因劫惠王置之高府欲弑之惠王從者屈固負王亡走昭王夫人宫白公自立為王月餘㑹葉公來救楚楚惠王之徒與共攻白公殺之惠王乃復位是歲也滅陳而縣之十三年吳王夫差彊陵齊晉來伐楚十六年越滅吳四十二年楚滅蔡四十四年楚滅杞與秦平是時越已滅吳而不能正江淮北楚東侵廣地至泗上五十七年惠王卒子簡王中立簡王元年北伐滅莒八年魏文侯韓武子趙桓子始列為諸侯二十四年簡王卒子聲王當立聲王六年盗殺聲王子悼王熊疑立悼王二年三晉來伐楚至乘邱而還四年楚伐周鄭殺子陽九年伐韓取負黍十一年三晉伐楚敗我大梁榆闗楚厚賂秦與之平二十一年悼王卒子肅王臧立肅王四年蜀伐楚取兹方於是楚為扞闗以距之十年魏取我魯陽十一年肅王卒無子立其弟熊良夫是為宣王宣王六年周天子賀秦獻公秦始復彊而三晉益大魏惠王齊威王尤彊三十年秦封衛鞅於商南侵楚是年宣王卒子威王熊商立威王六年周顯王致文武胙於秦惠王七年齊孟嘗君父田嬰欺楚楚威王伐齊敗之於徐州而令齊必逐田嬰田嬰恐張丑偽謂楚王曰王所以戰勝於徐州者田盼子不用也盼子者有功於國而百姓為之用嬰子弗善而用申紀申紀者大臣不附百姓不為用故王勝之也今王逐嬰子嬰子逐盼子必用矣復摶其士卒以與王遇必不便於王矣楚王因弗逐也十一年威王卒子懷王熊槐立魏聞楚喪伐楚取我陘山懷王元年張儀始相秦惠王四年秦惠王初稱王六年楚使柱國昭陽將兵而攻魏破之於襄陵得八邑又移兵而攻齊齊王患之陳軫適為秦使齊齊王曰為之奈何陳軫曰王勿憂請令罷之即往見昭陽軍中曰願聞楚國之法破軍殺將者何以貴之昭陽曰其官為上柱國封上爵執珪陳軫曰其有貴於此者乎昭陽曰令尹陳軫曰今君已為令尹矣此國冠之上臣請得譬之人有遺其舍人一巵酒者舍人相謂曰數人飲此不足以徧請遂畫地為蛇蛇先成者獨飲之一人曰吾蛇先成舉酒而起曰吾能為之足及其為之足而後成人奪之酒而飲之曰蛇固無足今為之足是非蛇也今君相楚而攻魏破軍殺將功莫大焉冠之上不可以加矣今又移兵而攻齊攻齊勝之官爵不加於此攻之不勝身死爵奪有毁於楚此為足之説也不若引兵而去以德齊此持滿之術也昭陽曰善引兵而去燕韓君初稱王秦使張儀與楚齊魏相㑹盟齧桑十一年蘓秦約從山東六國共攻秦楚懷王為從長至函谷闗秦出兵擊六國六國兵皆引而歸齊獨後十二年齊湣王伐敗趙魏軍秦亦伐敗韓與齊争長十六年秦欲伐齊而楚與齊從親秦惠王患之乃宣言張儀免相使張儀南見楚王謂楚王曰敝邑之王所甚説者無先大王雖儀之所甚願為門䦨之厮者亦無先大王敝邑之王所甚憎者無先齊王雖儀之所甚憎者亦無先齊王而大王和之是以敝邑之王不得事王而令儀亦不得為門闌之厮也王為儀閉闗而絶齊令使使者從儀西取故秦所分楚商於之地方六百里如是則齊弱矣是北弱齊西德於秦私商於以為富此一計而三利俱至也懷王大悦乃置相璽於張儀日與置酒宣言吾復得吾商於之地羣臣皆賀而陳軫獨弔懷王曰何故陳軫對曰秦之所為重王者以王之有齊也今地未可得而齊交先絶是楚孤也夫秦又何重孤國哉必輕楚矣且先出地而後絶齊則秦計不為先絶齊而後責地則必見欺於張儀見欺於張儀則王必怨之怨之是西起秦患北絶齊交西起秦患北絶齊交則兩國之兵必至臣故弔楚王弗聽因使一將軍西受封地張儀至秦詳醉墜車稱病不出三月地不可得楚王曰儀以吾絶齊為尚薄邪乃使勇士宋遺北辱齊王齊王大怒折楚符而合於秦秦齊交合張儀乃起朝謂楚將軍曰子何不受地從某至某廣袤六里楚將軍曰臣之所以見命者六百里不聞六里即以歸報懷王懷王大怒興師將伐秦陳軫又曰伐秦非計也不如因賂之一名都與之伐齊是我亡於秦取償於齊也吾國尚可全今王已絶於齊而責欺於秦是吾合秦齊之交而來天下之兵也國必大傷矣楚王不聽遂絶和於秦發兵西攻秦秦亦發兵擊之十七年春與秦戰丹陽秦大敗我軍斬甲士八萬虜我大將軍屈匄禆將軍逢侯丑等七十餘人遂取漢中之郡楚懷王大怒乃悉國兵復襲秦戰於藍田大敗楚軍韓魏聞楚之困乃南襲楚至於鄧楚聞乃引兵歸十八年秦使使約復與楚親分漢中之半以和楚楚王曰願得張儀不願得地張儀聞之請之楚秦王曰楚且甘心於子奈何張儀曰臣善其左右靳尚靳尚又能得事於楚王幸姬鄭䄂䄂所言無不從者且儀以前使負楚以商於之約今秦楚大戰有惡臣非面自謝楚不解且大王在楚不宜敢取儀誠殺儀以便國臣之願也儀遂使楚至懷王不見因而囚張儀欲殺之儀私於靳尚為請懷王曰拘張儀秦王必怒天下見楚無秦必輕王矣又謂夫人靳袖曰秦王甚愛張儀而王欲殺之今將以上庸之地六縣賂楚以美人聘楚王以宫中善歌者為之媵楚王重地秦女必貴而夫人必斥矣夫人不若言而出之鄭袖卒言張儀於王而出之儀出懷王因善遇儀儀因説楚王以叛從約而與秦合親約婚姻張儀已去屈原使從齊來諫王曰何不誅張儀懷王悔使人追張儀弗及是歲秦惠王卒二十年齊湣王欲為從長惡楚之與秦合乃使使遺楚王書云寡人患楚之不察於尊名也今秦惠王死武王立張儀走魏樗里疾公孫衍用而楚事秦夫樗里疾善乎韓而公孫衍善乎魏楚必事秦韓魏恐必因二人求合於秦則燕趙亦宜事秦則楚為郡縣矣王何不與寡人并力收韓魏燕趙與為從而尊周室以按兵息民令於天下莫敢不樂聽則王名成矣王率諸侯並伐破秦必矣王取武闗蜀漢之地私吳越之富而擅江海之利韓魏割上黨西薄函谷則楚之彊百萬也且王前見欺於張儀亡地漢中兵銼藍田天下莫不代王懷怒今乃欲先事秦故願大王孰計其便楚王業已欲和於秦見齊王書猶豫不決下其議羣臣羣臣或言和秦或言聽齊昭雎曰王雖東取地於越不足以刷耻必且取地於秦而后足以刷耻於諸侯王不如深善齊韓以重樗里疾如是則王得齊韓之重以求地矣秦破韓宜陽而韓猶復事秦者以先王墓在平陽而秦之武遂去之七十里以故尤畏秦不然秦攻三川趙攻上黨楚攻河外韓必亡楚之救韓不能使韓不亡然有韓者楚也韓已得武遂於秦以河山為塞所報德莫如楚厚臣以為其事王必疾齊之所信於韓者以韓公子昧為齊相也韓已得武遂於秦王甚善之使之以齊韓重樗里疾疾得齊韓之重其王弗敢棄疾也今又益之以楚之重樗里子必言秦復與楚之侵地矣於是懷王許之竟不合秦而合齊以善韓二十四年倍齊而合秦秦昭王初立乃厚賂於楚楚往迎婦二十五年懷王入與秦昭王盟約於黄棘秦復與楚上庸二十六年齊韓魏為楚負其從親而合於秦三國共伐楚楚使太子入質於秦而請救秦乃遣客卿通將兵救楚三國引兵去二十七年秦大夫有私與楚太子鬭楚太子殺之而亡歸二十八年秦乃與齊韓魏共攻楚殺楚將唐昧取我重邱而去二十九年秦復攻楚大破楚楚軍死者二萬殺我將軍景缺懷王恐乃使太子為質於齊以求平三十年奏伐楚取八城秦昭王遺楚王書曰始寡人與王約為弟兄盟于黄棘太子為質至驩也太子陵殺寡人之重臣不謝而亡去寡人誠不勝怒使兵侵君王之邊今聞君王乃令太子質於齊以求平寡人與楚接境壤界故為婚姻所從相親乆矣而今秦楚不驩則無以令諸侯寡人願與君王㑹武闗面相約結盟而去寡人之願也敢以聞下執事楚懷王見秦王書患之欲往恐見欺無往恐秦怒昭雎曰王毋行而發兵自守耳秦虎狼不可信有并諸侯之心懷王子子蘭勸王行曰奈何絶秦之驩心也於是往㑹秦昭王昭王詐令一將軍伏兵武闗號為秦王楚王至則閉武闗遂與西至咸陽朝章臺如蕃臣不與亢禮楚懷王大怒悔不用昭子言秦因留楚王要以割巫黔中之郡楚王欲盟秦欲先得地楚王怒曰秦詐我而又彊要我以地不復許秦秦因留之楚大臣患之乃相與謀曰吾王在秦不得還要以割地而太子為質於齊齊秦合謀則楚無國矣乃欲立懷王子在國者昭雎曰王與太子俱困於諸侯而今又倍王命而立其庶子不宜乃詐赴於齊齊湣王謂其相曰不若留太子以求楚之淮北相曰不可郢中立王是吾抱空質而行不義於天下也或曰不然郢中立王因與其新王市曰予我下東國吾為王殺太子不然將與三國共立之然則東國必可得矣齊王卒用其相計而歸楚太子太子横至立為王是為頃襄王乃告于秦曰賴社稷神靈國有王矣頃襄王横元年秦要懷王不可得地楚立王以應秦秦昭王怒發兵出武闗攻楚大敗楚軍斬首五萬取析十五城而去二年楚懷王亡逃歸秦覺之遮楚道懷王恐乃從間道走趙以求歸趙主父在代其子惠王初立行王事恐不敢入楚王楚王欲走魏秦追至遂與秦使復之秦懷王遂發病頃襄王三年懷王卒于秦秦歸其喪於楚楚人皆憐之如悲親戚諸侯由是不直秦秦楚絶六年秦使白起將伐韓於伊闕大勝斬首二十四萬秦乃遺楚王書曰楚倍秦秦且率諸侯伐楚争一旦之命願王之飭士卒得一禦戰楚頃襄王患之乃謀復與秦平七年楚迎婦於秦秦楚復平十一年齊秦各自稱為帝月餘復歸帝為王十四年楚頃襄王與秦昭王好㑹于宛結和親十五年楚王與秦三晉燕共伐齊取淮北十六年與秦昭王好㑹於鄢其秋復與秦昭王㑹穰十八年楚人有好以弱弓㣲繳加歸鴈之上者頃襄王聞召而問之對曰小臣之好射鶀鴈羅鸗小矢之發也何足為大王道也且稱楚之大因大王之賢所弋非直此也昔者三王以弋道德五霸以弋戰國故秦魏燕趙者鶀鴈也齊魯韓衞者青首也鄒費郯邳者羅鸗也外其餘則不足射者見鳥六雙以王何取何不以聖人為弓以勇士為繳時張而射之此六雙者可得而嚢載也其樂非特朝夕之樂也其獲非特鳬鴈之實也王朝張弓而射魏之大梁之南加其右臂而徑屬之於韓則中國之路絶而上蔡之郡壞矣還射圉之東解魏左肘而外擊定陶則魏之東外棄而大宋方與二郡者舉矣且魏斷二臂顛越矣膺擊郯國大梁可得而有也王綪繳蘭臺飲馬西河定魏大梁此一發之樂也若王之於弋誠好而不厭則出寳弓碆新繳射噣鳥於東海還蓋長城以為防朝射東莒夕發􅀈邱夜加即墨顧據午道則長城之東收而太山之北舉矣西結境於趙而北達於燕三國布􅖬則從不待約而可成也北游目於燕之遼東而南登望於越之㑹稽此再發之樂也若夫泗上十二諸侯左縈而右拂之可一旦而盡也今秦破韓以為長憂得列城而不敢守也伐魏而無功擊趙顧病則秦魏之勇力屈矣楚之故地漢中析酈可得而復有也王出寳弓碆新繳渉鄳塞而待秦之倦也山東河内可得而一也勞民休衆南面稱王矣故曰秦為大鳥負海内而處東面而立左臂據趙之西南右臂傅楚鄢郢膺擊韓魏垂頭中國處既形便勢有地利􅁬翼鼓􅖬方三千里則秦未可得獨招而夜射也欲以激怒襄王故對以此言襄王因召與語遂言曰夫先王為秦所欺而客死於外怨莫大焉今以匹夫有怨尚有報萬乘白公子胥是也今楚之地方五千里帶甲百萬猶足以踊躍中野也而坐受困臣竊為大王弗取也於是頃襄王遣使於諸侯復為從欲以伐秦秦聞之發兵來伐楚楚欲與齊韓連和伐秦因欲圖周周赧王使武公謂楚相昭子曰三國以兵割周郊地以便輸而南器以尊楚臣以為不然夫弑共主臣世君大國不親以衆脅寡小國不附大國不親小國不附不可以致名實名實不得不足以傷民夫有圖周之聲非所以為號也昭子曰乃圖周則無之雖然周何故不可圖也對曰軍不五不攻城不十不圍夫一周為二十晉公之所知也韓嘗以二十萬之衆辱於晉之城下鋭士死中士傷而晉不拔公之無百韓以圖周此天下之所知也夫怨結於兩周以塞鄒魯之心交絶於齊聲失天下其為事危矣夫危兩周以厚三川方城之外必為韓弱矣何以知其然也西周之地絶長補短不過百里名為天下共主裂其地不足以肥國得其衆不足以勁兵雖無攻之名為弑君然而好事之君喜攻之臣發號用兵未嘗不以周為終始是何也見祭器在焉欲器在焉欲器之至而忘弑君之亂今韓以器之在楚臣恐天下以器讐楚也臣請譬之夫虎肉臊其兵利身人猶攻之也若使澤中之麋䝉虎之皮人之攻之必萬之於虎裂楚之地足以肥國詘楚之名足以尊主今子將以欲誅殘天下之共主居三代之傳器吞三翮六翼以高世主非貪而何書曰欲起無先故器南則兵至矣於是楚計輟不行十九年秦伐楚楚軍敗割上庸漢北地予秦二十年秦將白起拔我西陵二十一年秦將白起遂拔我郢燒先王墓夷陵楚襄王兵散遂不復戰東北保於陳城二十二年秦復拔我巫黔中郡二十三年襄王乃收東地兵得十餘萬復西取秦所拔我江旁十五邑以為郡距秦二十七年使三萬人助三晉伐燕復與秦平而入太子質於秦使左徒侍太子於秦三十六年頃襄王病太子亡歸秋頃襄王卒太子熊元立是為考烈王考烈王以左徒為令尹封以吳號春申君考烈王元年納州于秦以平是時楚益弱六年秦圍邯鄲趙告急楚楚遣將軍景陽救趙七年至新中秦兵去十二年秦昭王卒楚王使春申君弔祠于秦十六年秦莊襄王卒秦王趙政立二十二年與諸侯共伐秦不利而去楚東徙都夀春命曰郢二十五年考烈王卒子幽王悍立李園殺春申君幽王三年秦魏伐楚秦相吕不韋卒九年秦滅韓十年幽王卒同母弟猶代立是為哀王哀王立二月餘哀王庶兄負芻之徒襲殺哀王而立負芻為王是歲秦虜趙王遷王負芻元年燕太子丹使荆軻刺秦王二年秦使將軍伐楚大破楚軍亡十餘城三年秦滅魏四年秦將王翦破我軍於蘄而殺將軍項燕五年秦將王翦䝉武遂破楚國虜楚王負芻滅楚名為楚郡云通志卷八十六
