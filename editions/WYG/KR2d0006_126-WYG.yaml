body:
  text: 通志卷一百十宋右廸功郎鄭樵漁仲撰列傳第二十三後漢楊終李法翟酺應奉子劭霍諝爰延徐璆王充王符仲長統李恂陳禪龎參陳龜橋元崔駰子瑗孫寔周爕馮良黄憲徐穉姜肱申屠蟠楊震子秉元孫賜彪孫修曾孫張皓子綱王龔子暢种暠子岱拂拂子劭陳球李咸楊終字子山蜀郡成都人也年十三為郡小吏太守竒其才遣詣京師受業習春秋顯宗時徵詣蘭臺拜校書郎建初五年大旱穀貴終以為廣陵楚淮陽濟南之獄徙者萬數又逺屯絶域吏民怨曠乃上疏曰臣聞善善及子孫惡惡止其身百王常典不易之道也秦政酷烈違牾天心一人有罪延及三族高祖平亂約法三章太宗至仁除去收孥萬姓廓然䝉被更生澤及昆蟲功垂萬世陛下聖明徳被四表今以比年久旱灾疫未息躬自菲薄廣訪失徳三代之隆無以加焉臣竊按春秋水旱之變皆應暴急惠不下流自永平以來仍連大獄有司窮考轉相牽引掠拷寃濫家屬徙邊加以北征匈奴西開三十六國頻年服役轉輸煩費及逺屯伊吾樓蘭車師戊巳民懐土思怨結邊域傳曰安土重居謂之衆庶昔殷民近遷洛邑且猶怨望何况去中土之肥饒寄不毛之荒極乎且南方暑濕障毒互生愁困之民足以感動天地移變隂陽矣陛下留念省察以濟元元書奏肅宗下其章司空第五倫亦同終議太尉牟融司徒鮑昱校書郎班固等難倫以施行既久孝子無改父之道先帝所建不宜回異終復上書曰秦築長城功役繁興胡亥不革卒亡四海故孝元棄珠崖之郡光武絶西域之國不以介鱗易我衣裳魯文公毁泉臺春秋譏之曰先祖為之而已毁之不如勿居而已以其無妨害於民也襄公作三軍昭公舍之君子大其復古以為不舍則有害於民也今伊吾之役樓蘭之屯久而未還非天意也帝從之聴還徙者悉罷邊屯終又言宣帝博徵羣儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壊大體宜如石渠故事永為後世則於是詔諸儒於白虎觀論考同異焉㑹終坐事繫獄博士趙博校書郎班固賈逵等以終深曉春秋學多異聞表請之終又上書自訟即日貰出乃得與於白虎觀焉後受詔刪太史公書為十餘萬言時太后兄衞尉馬廖謹篤自守不訓諸子終與廖交善以書戒之曰終聞堯舜之民可比屋而封桀紂之民可比屋而誅何者堯舜為之隄防桀紂示之驕奢故也詩曰皎皎練絲在所染之上智下愚謂之不移中庸之流要在教化春秋殺太子母弟直稱君甚惡之者坐失教也禮制人君之子年八嵗為置少傅敎之書計以開其明十五置太傅敎之經典以道其志漢興諸侯王不力敎誨多觸禁忌故有亡國之禍而乏嘉善之稱今君位地尊重海内所望豈可不臨深履薄以為至戒黄門郎年幼血氣方盛既無長君退譲之風而要結輕狡無行之客縱而莫誨視成任性鑒念前徃可為寒心君侯誠宜以臨深履薄為戒廖不納子豫後坐縣書誹謗廖以就國終兄鳯為郡吏太守亷范為州所考遣鳯候終終為范游説坐徙北地帝東廵狩鳯皇黄龍並集終贊頌嘉瑞上述祖宗鴻業凡十五章奏上詔貰還故郡著春秋外傳十二篇改定章句十五萬言永元十二年徵拜郎中以病卒李法字伯度漢中南鄭人也博通羣書性剛而有節和帝永元九年應賢良方正對䇿除博士遷侍中光祿大夫嵗餘上疏以為朝政苛碎違永平建初故事宦官權重椒房寵盛又譏史官記事不實後世有識尋功計徳必不明信坐失㫖下有司免為庶人還鄉里杜門自守故人儒生時有候之者言談之次問其不合上意之由法未嘗應對友人因問之法曰鄙夫可與事君乎哉茍患失之無所不至孟子有言夫仁者如射正己而後𤼵𤼵而不中不怨勝己者反諸身而已矣在家八年徵拜議郎諫議大夫正言極辭無改於舊出為汝南太守政有聲跡後歸鄉里卒於家翟酺字子超廣漢雒人也四世傳詩酺好老子尤善圖緯天文歴算以報舅讎當徙日南亡於長安為卜相工後牧羊涼州遇赦還仕郡徵拜議郎遷侍中時尚書有缺詔將大夫六百石以上試對政事天文道術以高第者補之酺自恃能高而忌故太史令孫懿恐其先用乃往候懿既坐言無所及唯涕泣流連懿怪而問之酺曰圖書有漢賊孫登將以才智為中官所害觀君表相似當應之酺受恩接悽愴君之禍耳懿憂懼移病不試由是酺對第一拜尚書時安帝始親政事追感祖母宋貴人悉封其家又元舅耿寳及皇后兄弟閻顯等並用威權酺上疏諫曰陛下應天履祚厯値中興當建太平之功而未聞致化之道蓋逺者難明請以近事徵之昔竇鄧之寵傾動四方兼官重紱盈金積貨至使議弄神噐改更社禝豈不以埶尊威廣以致斯患乎及其破壊頭顙墮地願為孤豚豈可得哉夫致貴無漸失必暴受爵非道殃必疾今外戚寵幸功均造化漢元以來未有等比陛下誠仁恩周洽以親九族然祿去公室政移私門覆車重尋寧無摧折而朝臣在位莫肯正議翕翕訾訾更相佐附臣恐威權外假歸之良難虎翼一奮卒不可制故孔子曰吐珠於澤誰能不含老子稱國之利噐不可以示人此最安危之極戒社稷之深計也書奏不省而外戚寵臣咸畏惡之延光三年出為酒泉太守叛羌千餘騎徙敦煌來鈔郡界酺赴擊斬首九百級羌衆幾盡威名大震遷京兆尹順帝即位拜光祿大夫遷將作大匠損省經用嵗息四五千萬屢因灾異多所匡正由是權貴共誣酺及尚書令高堂芝等交通屬託坐減死歸家復被章云酺前與河南張揩等謀反逮詣廷尉及杜眞等上言訟之事得明釋卒於家著援神鉤命解詁十二篇初酺之為大匠上言孝文皇帝始置一經博士武帝大合天下之書而孝宣論六經於石渠學者滋盛弟子萬數光武初興愍其荒廢起太學博士舍内外講堂諸生横卷為海内所集明帝辟雍始成欲毁太學太尉趙熹以為太學辟雍皆宜兼有故並傳至今而頃者頽廢至為園採芻牧之處宜更修繕誘進後學帝從之酺免後遂起太學更開拓房室學者為酺立碑銘於學云應奉字世叔汝南南頓人也曾祖父順字華仲和帝時河南尹將作大匠公亷約己明逹政事生十子皆有才學中子疊江夏太守疊生彬武陵太守彬生奉奉少聰明自為童兒及長凡所經履莫不暗記讀書五行並下為郡決曹史行部四十二縣錄囚徒數百千人及還太守備問之奉口説罪繫姓名坐狀輕重無所遺脱時人竒之著漢書後序多所述載大將軍梁冀舉荗才先是武陵蠻詹山等四千餘人反叛執縣令屯結連年詔下公卿議四府舉奉才堪將帥永建元年拜武陵太守到官慰納山等皆悉降散於是興學校舉仄陋政稱變俗坐公事免延熹中武陵蠻復寇亂荆州車騎將軍馮緄以奉有威恩為蠻夷所服上請與俱征拜從事中郎奉勤設方畧賊破軍罷緄推功於奉薦為司𨽻校尉紏舉姦違不避豪戚以嚴厲為名及鄧皇后敗而田貴人見幸桓帝有建立之議奉以田氏微賤不宜超登后位上書諫曰臣聞周納狄女襄王出居於鄭漢立飛燕成帝𦙍嗣泯絶母后之重興廢所因宜思闗雎之所求遠五禁之所忌帝納其言竟立竇皇后及黨事起奉乃慨然以疾自退追愍屈原因以自傷著感騷三十篇數萬言諸公多薦舉㑹卒子劭劭字仲逺少篤學博覽多聞靈帝時舉孝亷辟車騎將軍何苖掾中平二年漢陽賊邊章韓遂與羌胡為冦東侵三輔時遣車騎將軍皇甫嵩西討之嵩請𤼵烏桓三千人北軍中候鄒靖上言烏桓衆弱宜開募鮮卑事下四府大將軍掾韓卓議以為烏桓兵寡而與鮮卑世為仇敵若烏桓被發則鮮卑必襲其家烏桓聞之當復棄軍還救非為無益於實乃更沮三軍之情鄒靖居近邊塞究其態詐若令靖募鮮卑輕騎五千必有破敵之效劭駮之曰鮮卑隔在漠北犬羊為羣無君長之帥廬落之居而天性貪暴不拘信義故數犯障塞且無寧嵗唯至互市乃來靡服茍欲中國珍貨非為畏威懐徳計獲事足旋踵為害是以朝家外而不内蓋為此也往者匈奴反叛度遼將軍馬續烏桓校尉王元𤼵鮮卑五千餘騎又武威太守趙冲亦率鮮卑征討叛羌斬獲醜虜既不足言而鮮卑越溢多為不法裁以軍令則忿戾作亂制御小緩則陸掠殘害劫居人鈔商旅噉人牛羊畧人兵馬得賞既多不肯去復欲以物買鐵邊將不聴便取縑帛聚欲燒之邊將恐怖畏其反叛辭謝撫順無敢拒違今狡冦未殄而羌為巨害如或致侮其可追乎臣愚以為可募隴西羌胡守善不叛者簡其精勇多其牢賞太守李參沉静有謀必能奬厲得其死力當思漸消之畧不可倉卒望也韓卓復與劭相難反覆於是詔百官大㑹朝堂皆從劭議三年舉高第再遷六年拜太山太守初平二年黄巾三十萬衆入郡界劭糾率文武連與賊戰前後斬首數千級獲生口老弱萬餘人輜重二千兩賊皆退却郡内以安興平元年前太尉曹嵩及子徳從琅邪入太山劭遣兵迎之未到而徐州牧陶謙素怨嵩子操數擊之乃使輕騎追嵩徳並殺之於郡界劭畏操誅棄郡奔冀州牧袁紹初安帝時河間人尹次潁川人史玉皆坐殺人當死次兄初及玉母軍並詣官曹求代其命因縊而物故尚書陳忠以罪疑從輕議活次玉劭後追駮之據正典刑有可存者其議曰尚書稱天秩有禮五服五章哉天討有罪五刑五用哉而孫卿亦云凡制刑之本將以禁暴惡且懲其末也凡爵列官秩賞慶刑威皆以類相從使當其實也若徳不副位能不稱官賞不酬功刑不應罪不祥莫大焉殺人者死傷人者刑此百王之定制有法之成科高祖入闗雖尚約法然殺人者死亦無寛降夫時化則刑重時亂則刑輕書曰刑罰時輕時重此之謂也今次玉公以清時釋其私憾阻兵安忍僵屍道路朝恩在寛幸至冬獄而初軍愚狷妄自投斃昔召忽親死子糾之難而孔子曰經於溝瀆人莫之知鼂氏之父非錯刻峻遂能自殞其命班固亦云不如趙母指括以全其宗傳曰僕妾感慨而致死者非能義勇顧無慮耳夫刑罰威獄以類天之震燿殺戮也温慈和惠以放天之生殖長育也是故春一草枯則為災秋一木華亦為異今殺無罪之初軍而活當死之次玊其為枯華不亦然乎陳忠不詳制刑之本而信一時之仁遂廣引八議求生之端夫親故賢能功貴勤賓豈有次玊當罪之科哉若乃小大以情原心定罪此為求生非謂代死可以生也敗法亂政悔其可追劭凡為駮議三十篇皆此類也又刪定律令為漢儀建安元年乃奏之曰夫國之大事莫尚載籍也籍也者決嫌疑明是非賞刑之宜允獲厥中俾後之人亦為監焉故膠東相董仲舒老病致仕朝廷每有政議數遣廷尉張湯親至陋巷問其得失於是作春秋决獄二百三十二事動以經對言之詳矣逆臣董卓蕩覆王室典憲焚燎靡有孑遺開闢以來莫或滋酷今大駕東邁廵省許都拔出險難其命惟新臣累世受恩榮祚豐衍竊不自揆貪少云補輙具律本章句尚書舊事廷尉板令決事比例司徒都目五曹詔書及春秋斷獄凡二百五十篇蠲去復重為之節文又集駮議三十篇以類相從凡八十二事其見漢書二十五漢記四皆刪叙潤色以全本體其二十六博採古今瓌瑋之士文章煥炳徳義可觀其二十七臣所創造豈繄自謂必合道𠂻心焉憤邑聊以藉手昔鄭人以乾䑕為璞鬻之於周宋愚夫亦寳燕石緹䌌十重夫覩之者掩口盧胡而笑斯文之族無乃類旃左氏實云雖有姬姜絲麻不棄憔悴菅蒯蓋所以代匱也是用敢露頑才厠於明哲之末雖未足綱紀國體宣洽時雍庶幾觀察増闡聖聴惟因萬機之餘暇游意省覽獻帝善之二年詔拜劭為袁紹軍謀校尉時始遷都於許舊章堙没書記罕存劭慨然歎息乃綴集所聞著漢官禮儀故事凡朝廷制度百官典式多劭所立初父奉為司𨽻時並下諸官府郡國各上前人像贊劭乃連綴其名錄為狀人紀又論當時行事著中漢輯序撰風俗通以辯物類名號釋時俗嫌疑文雖不典後世服其洽聞凡所著述百三十六篇又集解漢書皆傳乎時後卒於鄴弟子瑒璩並以文才稱中興初有應嫗者生四子而寡見神光照社試探之乃得黄金自是諸子官學並有才名至瑒七世通顯霍諝字叔智魏郡鄴人也少為諸生明經有人誣諝舅宋光於大將軍梁商者以為妄刋章文坐繫洛陽詔獄掠考困極諝時年十五奏記於商曰諝聞春秋之義原情定過赦事誅意故許止雖弑君而不罪趙盾以縱賊而見書此仲尼所以垂王法漢世所宜遵前修也傳曰人心不同譬若其面斯蓋謂大小窳隆醜羙之形至於鼻目衆竅毛髪之狀未有不然者也情之異者剛柔舒急倨敬之間至於趨利避害畏死樂生亦復均也諝與光骨肉義有相隠言其寃濫未必可諒且以人情平論其理光衣冠子孫徑路平易位極州郡日望徵辟亦無瑕穢纎介之累無故刋定詔書欲以何名就有所疑當求其便安豈有觸冒死禍以解細微譬猶療飢於附子止渴於酖毒未入腸胃已絶咽喉豈可為哉昔東海孝婦見枉不辜幽靈感革天應枯旱光之所坐情既可原守闕連年而終不見理呼嗟紫宫之門泣血兩觀之下傷和致災為害滋甚凡事更赦令不應復案夫以罪刑明白尚䝉天恩豈有寃謗無徵所不得理是為刑宥正罪戮加誣侵也不偏不黨其若是乎明將軍徳盛位尊人臣無二言行動天地舉厝移隂陽誠能留神沛然曉察必有于公高門之福和氣下應天下幸甚商高諝才志即為奏原光罪由是顯名仕郡舉孝亷稍遷金城太守性明逹篤厚能以恩信化誘殊俗甚為羌胡所敬服遭母憂自上歸行喪服闋公車徵再遷北海相入為尚書僕射是時大將軍梁冀貴戚秉權自公卿以下莫敢違牾諝與尚書令尹勲數奏其事又因陛見陳聞罪失及冀誅後桓帝嘉其忠節封鄴都亭侯前後固讓不許出為河南尹遷司𨽻校尉轉少府廷尉卒官子儁安定太守爰延字季平陳留外黄人也清苦好學能通經教授性質慤少言辭縣令隴西牛述好士知人乃禮請延為廷掾范丹為功曹濮陽潛為主簿常共言談而已後令史昭以為鄉嗇夫仁化大行人但聞嗇夫不知郡縣在事二年州府禮請不就桓帝時徵博士太尉楊秉等舉賢良方正再遷為侍中帝游上林苑從容問延曰朕何如主也對曰陛下為漢中主帝曰何以言之對曰尚書令陳蕃任事則化中常侍黄門豫政則亂是以知陛下可與為善可與為非帝曰昔朱雲廷折欄檻今侍中面稱朕違敬聞闕矣拜五官中郎將轉長水校尉遷魏郡太守徵拜大鴻臚帝以延儒生常特宴見時太史令上言客星經帝坐帝宻以問延延因上封事曰臣聞天子尊無為上故天以為子位臨臣庶威重四海動静以禮則星辰順序意有邪僻則晷度錯違陛下以河南尹鄧萬有龍潛之舊封為通侯恩重公卿惠豐宗室加頃引見與之對博上下媟黷有虧尊嚴臣聞之帝左右者所以咨政徳也故周公戒成王曰其朋其朋言慎所與也昔宋閔公與彊臣共博列婦人於側積此無禮以致大災武帝與倖臣李延年韓嫣同卧起尊爵重賜情欲無厭遂生驕淫之心行不義之事卒延年被戮嫣伏其辜夫愛之則不覺其過惡之則不知其善所以事多放濫物情生怨故王者賞人必酬其功爵人以甄其徳善人同處則日聞嘉訓惡人從游則日生邪情孔子曰益者三友損者三友邪臣惑君亂妾危主以非所言則悦於耳以非所行則翫於目故令人君不能逺之仲尼曰唯女子與小人為難飬近之則不遜逺之則怨蓋聖人之明戒也昔光武皇帝與嚴光俱寢上天之異其夕即見夫以光武之聖徳嚴光之高賢君臣合道尚降此變豈况陛下今所親幸以賤為貴以卑為尊哉惟陛下逺讒諛之人納謇謇之士除左右之權寤宦官之敝使積善日熙佞惡消殄則乾災可除帝省其奏因以病自上乞骸骨還家靈帝復特徵不行病卒子驥白馬令亦稱善士徐璆字孟玉廣陵海西人也父淑度遼將軍有名於邊璆少博學辟公府舉高第稍遷荆州刺史時董太后姊子張忠為南陽太守因埶放濫贓罪數億璆臨當之部太后遣中常侍以忠屬璆璆對曰臣身為國不敢聞命太后怒遽徵忠為司𨽻校尉以相威臨璆到州舉奏忠贓餘一億使冠軍縣上簿詣大司農以彰暴其事又奏五郡太守及屬縣有贓汙者悉徵案罪威風大行中平元年與中郎將朱儁擊黄巾賊於宛破之張忠怨璆與諸閹官搆造無端璆遂以罪徵有破賊功得免官歸家後再徵遷汝南太守轉東海相所在化行獻帝遷許以廷尉徵當詣京師道為袁術所刼授璆以上公之位璆乃歎曰龔勝鮑宣獨何人哉守之必死術不敢逼術死軍破璆得其盗國璽及還許上之并送前所假汝南東海二郡印綬司徒趙温謂璆曰君遭大難猶存此邪璆曰昔蘇武困於匈奴不墜七尺之節况此方寸印乎後拜太常使持節拜曹操為丞相操以相印讓璆璆不敢當卒於官王充字仲壬㑹稽上虞人也其先自魏郡元城徙焉充少孤鄉里稱孝後到京師受業太學師事扶風班彪性好博覽而不守章句家貧無書常游洛陽市肆閲所賣書一見輙能誦憶遂博通衆流百家之言後歸鄉里屏居教授仕郡為功曹以數諫爭不合去充好論說始若詭異終有理實以為俗儒守文多失其眞乃閉門潛思絶慶弔之禮户牖牆壁各置刀筆著論衡八十五篇二十餘萬言釋物類同異正時俗嫌疑刺史董勤辟為從事轉治中自免還家友人同郡謝夷吾上書薦充才學肅宗時詔公車徵病不行年漸七十志力衰耗乃造飬性書十六篇裁節嗜欲頤神自守永元中病卒於家王符字節信安定臨涇人也少好學有志操與馬融竇章張衡崔瑗等友善安定俗鄙庶孽而符無外家為鄉人所賤自和安之後世務游宦當塗者更相薦引而符獨耿介不同於俗以此遂不得升進志意藴憤乃隱居著書三十餘篇以譏當時失得不欲章顯其名故號曰潛夫論其指訐時短討讁物情足以觀見當時風政著其五篇云爾貴忠篇曰夫帝王之所尊敬者天也皇天之所愛育者人也今人臣受君之重位牧天之所愛焉可以不安而利之飬而濟之哉是以君子任職則思利人逹上則思進賢故居上而下不怨在前而後不恨也書稱天工人其代之王者法天而建官故明主不敢以私授忠臣不敢以虛受竊人之財猶謂之盗况偷天官以私己乎以罪犯人必加誅罰况乃犯天得無咎乎夫五世之臣以道事君澤及草木仁被率土是以福祚流行本支百世季世之臣以謟媚主不思順天專杖殺伐白起䝉恬秦以為功天以為賊息夫董賢主以為忠天以為盗易曰徳薄而位尊智小而謀大鮮不及矣是故徳不稱其禍必酷能不稱其殃必大夫竊位之人天奪其鑒雖有明察之資仁義之志一旦富貴則背親捐舊喪其本心疎骨肉而親便辟薄知友而厚犬馬寧見朽貫千萬而不忍貸人一錢情知積粟腐倉而不忍貸人一斗骨肉怨望於家細人謗讟於道前人以敗後爭襲之誠可傷也歴觀前政貴人之用心也與嬰兒子何其異哉嬰兒有常病貴臣有常禍父母有常失人君有常過嬰兒常病傷於飽也貴臣常禍傷於寵也哺乳多則生癎病富貴盛而致驕疾愛子而賊之驕臣而滅之者非一也極其罰者乃有仆死深牢衘刀都市豈非無功於天有害於人者乎夫鳥以山為埤而增巢其上魚以泉為淺而穿穴其中卒所以得者餌也貴戚願其宅吉而制為令名欲其門堅而造作鐵樞卒其所以敗者非苦禁忌少而門樞朽也常苦崇財貨而行驕僭耳不上順天心下育人物而欲任其私智竊㺯君威反戾天地欺誣神明居累卵之危而圖太山之安為朝露之行而思傳世之功豈不惑哉浮侈篇曰王者以四海為家兆人為子一夫不耕天下受其饑一婦不織天下受其寒今舉俗舍本農趨商賈牛馬車輿塡塞道路游手為巧充盈都邑務本者少游食者衆啇邑翼翼四方是極今察洛陽資末業者什於農夫虛偽游手什於末業是則一夫耕百人食之一婦桑百人衣之以一奉百孰能供之天下百郡千縣市邑萬數類皆如此本末不足相供則民安得不飢寒飢寒並至則民安得無姦軌姦軌繁多則吏安能無嚴酷嚴酷數加則下安能無愁怨愁怨者多則咎徵並臻下民無聊而上天降災則國危矣夫貧生於富弱生於彊亂生於化危生於安是故明主之飬民憂之勞之教之誨之愼微防萌以斷其邪故易羙節以制度不傷財不害民七月之詩大小教之終而復始由此觀之人固不可恣也今人奢衣服侈飲食事口舌而習調欺或以謀姦合任為業或以游博持掩為事丁夫不扶犁鋤而懐丸挾彈攜手上山遨遊或好取土作丸賣之外不足以禦冦盗内不足以禁䑕雀或作泥車瓦狗諸戱弄之具以詐小兒此皆無益也詩刺不績其麻市也婆娑又婦人不修中饋休其蠶織而起學巫祝鼓舞事神以欺誣細民熒惑百姓妻女羸弱疾病之家懐憂憤憒易為恐懼至使奔走便時去離正宅﨑嶇路側風寒所傷姦人所利盗賊所中或增禍重祟至於死亡而不知巫所欺誤反恨事神之晚此妖妄之甚者也或刻畫好繒以書祝辭或虛飾巧言希致福祚或縻折金綵令廣分寸或斷截衆縷繞帶手腕或裁切綺縠縫紩成幡皆單費百縑用功千倍破牢為偽以易就難坐食嘉殽消損白日夫山林不能給野火江海不能實漏巵皆所宜禁昔孝文皇帝躬衣弋綈革舄韋帶而今京師貴戚衣服飲食車輿廬第奢過王制固亦甚矣且其徒御僕妾皆服文組綵牒錦繡綺紈葛子升越筩中女布犀象珠玊虎兕瑇瑁石山隱飾金銀錯鏤窮極麗羙轉相誇咤其嫁娶者車軿數里緹帷竟道騎奴侍童夾轂並引富者競欲相過貧者耻其不逮一饗之所費破終身之業古者必有命然後乃得衣繒絲而乘車馬今雖不能復古宜令細民畧用孝文之制古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺椁桐木為棺葛采為緘下不及泉上不泄臭中世以後轉用楸梓槐栢杶樗之屬各因方土裁用膠漆使其堅足恃其用足任如此而已今者京師貴戚必欲江南檽梓豫章之木邊逺下土亦競相放夫檽梓豫章所出殊逺伐之高山引之窮谷入海乘淮逆河泝洛工匠雕刻連累日月㑹衆而後動多牛而後致重且千斤功將萬夫而東至樂浪西逹敦煌費力傷農於萬里之地古者墓而不墳中世墳而不崇仲尼喪母冡高四尺遇雨而崩弟子請修之夫子泣曰古不修墓及鯉死有棺無椁文帝葬芷陽明帝葬洛陽皆不藏珠寳不起山陵墓雖卑而徳最高今京師貴戚郡縣豪家生不極飬死乃崇喪或至金鏤玉匣檽梓梗柟多埋珍寳偶人車馬造起大冢廣種松栢廬舍祠堂務崇華侈案鄗畢之陵南城之冡周公非不忠曾子非不孝以為襃君愛父不在於聚財揚名顯親無取於車馬昔晉靈公多賦以雕牆春秋以為非君華元樂舉厚葬文公君子以為不臣况於羣司士庶乃可僭侈主上過天道乎實貢篇曰國以賢興以謟衰君以忠安以佞危此古今之常論而時所共知也然衰國危君繼踵不絶者豈時無忠信正直之士哉誠苦其道不得行耳夫十歩之間必有茂草十室之邑必有忠信是故亂殷有三仁小衛多君子今以大漢之廣土士民之繁庶朝廷之清明上下之修正而官無善吏位無良臣此豈時之無賢諒由取之乖實夫志道者少與逐俗者多疇是以朋黨用私背實趨華其貢士者不復依其質幹凖其才行但虛造聲譽妄生羽毛畧計所舉歲且二百覽察其狀則徳侔顔冉詳覈厥能則鮮及中人皆總務升官自相推逹夫士者貴其用也不必求備故四友雖羙能不相兼三仁齊致事不一節高祖佐命出自亡秦光武得士亦資暴莾况太平之時而云無士乎夫明君之詔也若聲忠良之和也如響長短大小清濁疾徐必相應也且攻玉以石洗金以鹽濯錦以魚浣布以灰夫物固有以賤理貴以醜化好者矣智者棄短取長以致其功今使貢士必覈以實其有小疵勿彊衣飾出處黙語各因其方則蕭曹周韓之倫何足不致吳鄧梁竇之屬企踵可待孔子曰未之思也夫何逺之有愛日篇曰國之所以為國者以有民也民之所以為民者以有榖也榖之所以豐殖者以有民功也功之所以能建者以日力也化國之日舒以長故其民閑暇而力有餘亂國之日促以短故其民困務而力不足舒長者非謂羲和安行乃君明民静而力有餘也促短者非謂分度損減乃上闇下亂力不足也孔子稱既庶則富之既富乃教之是故禮義生於富足盗竊起於貧窮富足生於寛暇貧窮起於無日聖人深知力者民之本國之基也故務省徭役使之愛日是以堯勅羲和欽若昊天敬授民時明帝時公車以反支日不受章奏帝聞而怪曰民廢農桑逺來詣闕而復拘以禁忌豈為政之意乎於是遂蠲其制今寃民仰希申訴而令長以神自畜百姓廢農桑而趨府廷者相續道路非朝餔不得通非意氣不得見或連日累月更相瞻視或轉請鄰里饋糧應對嵗功既虧天下豈無受其飢者乎孔子曰聴訟吾猶人也從此言之中才以上足議曲直鄉亭部吏亦有任決斷者而類多枉曲蓋有故焉夫理直則恃正而不撓事曲則諂意以行賕不撓故無恩於吏行賕故見私於法若事有反覆吏應坐之吏以應坐之故不得不枉之於廷以羸民之少黨而與豪吏對訟其埶得無屈乎縣承吏言故與之同若事有反覆縣亦應坐之縣以應坐之故而排之於郡以一民之輕而與一縣為訟其理豈得申乎事有反覆郡亦坐之郡以共坐之故而排之於州以一民之輕與一郡為訟其事豈獲勝乎既不肯理故乃逺詣公府公府復不能察而當延以日月貧弱者無以曠旬彊富者可延千日理訟若此何枉之能理乎正士懐怨結而不見信猾吏崇姦軌而不被坐此小民所以易侵苦而天下所以多困窮也且除上天感痛致災但以人功見事言之自三府州郡至於鄉縣典司之吏辭訟之民官事相連更相檢對者日可有十萬人一人有事二人經營是為日三十萬人廢其業也以中農率之則是嵗三百萬人受其飢者也然則盗賊何從而銷太平何由而作乎詩云莫肯念亂誰無父母百姓不足君誰與足可無思哉可無思哉述赦篇曰凡療病者必知脈之虛實氣之所結然後為之方故疾可愈而夀可長也為國者必先知民之所苦禍之所起然後為之禁故姦可塞而國可安也今日賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣何以明之哉夫謹勅之人身不蹈非又有為吏正直不避彊禦而姦猾之黨横加誣言者皆知赦之不久故也善人君子被侵怨而能至闕庭自明者萬無數人數人之中得省問者百不過一既對尚書而空遣去者復什六七矣其輕薄姦軌既陷罪法怨毒之家冀其辜戮以解畜憤而反一槩悉䝉赦釋令惡人高㑹而誇咤老盗服贓而過門孝子見讎而不得討遭盗者覩物而不敢取痛莫甚焉夫飬稂莠者傷禾稼惠姦軌者賊良民書曰文王作罸刑兹無赦先王之制刑法也非好傷人肌膚斷人夀命也貴威姦懲惡除人害也故經稱天命有徳五服五章哉天討有罪五刑五用哉詩刺彼宜有罪汝反脫之古者唯始受命之君承大亂之極冦賊姦軌難為法禁故不得不有一赦與之更新頤育萬物以成大化非以飬姦活罪放縱天賊也夫性惡之民民之豺狼雖得放宥之澤終無改悔之心旦脫重梏夕還囹圄嚴明令尹不能使斷絶何也凡敢為大姦者才必有過於衆而能自媚於上者也多散誕得之財奉以謟諛之辭以轉相驅非有第五公之亷直孰不為顧哉論者多曰久不赦則姦軌熾而吏不制宜數肆眚以解散之此未昭政亂之本源不察禍福之所生也後度遼將軍皇甫規解官歸安定鄉人有以貨得鴈門太守者亦去職還家書刺謁規規卧不迎既入而問卿前在郡食鴈羙乎有頃又白王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如一縫掖言書生道義之為貴也符竟不仕終於家仲長統字公理山陽高平人也少好學博渉書記贍於文辭年三十餘游學青徐并冀之間與交友者多異之幷州刺史高幹袁紹甥也素貴有名招致四方遊士士多歸附統過幹幹善待遇訪以當時之事統謂幹曰君有雄志而無雄才好士而不能擇人所以為君深戒也幹雅自多不納其言統遂去之無幾幹以幷州叛卒至於敗幷冀之士皆以是異統統性俶儻敢直言不矜小節黙語無常時人或謂之狂生每州郡命召輙稱疾不就常以為凡遊帝王者欲以立身揚名耳而名不常存人生易滅優游偃仰可以自娛欲卜居清曠以樂其志論之曰使居有良田廣宅背山臨池溝池環帀竹木周布場圃築前果園樹後舟車足以代歩渉之難使令足以息四體之役飬親有兼珍之膳妻孥無苦身之勞良朋萃止則陳酒肴以娛之嘉時吉日則烹羔豚以奉之蹰躇畦苑遊戱平林濯清水追涼風釣遊鯉弋高鴻風於舞雩之下詠歸高堂之上安神閨房思老氏之元虛呼吸精和求至人之仿佛與逹者數子論道講書俯仰二儀錯綜人物彈南風之雅操𤼵清商之妙曲消遥一世之上睥睨天地之間不受當時之貴永保性命之期如是則可以凌霄漢出宇宙之外矣豈羡夫入帝王之門哉又作詩二篇以見其志辭曰飛鳥遺跡蟬蜕亡殻騰蛇棄鱗神龍喪角至人能變逹士拔俗乘雲無轡騁風無足垂露成幃張霄成幄沆瀣當餐九陽代燭恒星􅃩珠朝霞潤玉六合之内恣心所欲人事可遺何為局促大道雖夷見幾者寡任意無非適物無可古來繞繞委曲如𤨏百慮何為至要在我寄愁天上埋憂地下叛散五經滅棄風雅百家雜碎請用從火抗志山西游心海左元氣為舟微風為柂敖翔大清縱意容冶尚書令荀彧聞統名竒之舉為尚書郎後參丞相曹操軍事每論說古今及時俗行事恒𤼵憤歎息因著論名曰昌言凡三十四篇十餘萬言獻帝遜位之嵗統卒時年四十一友人東海繆襲嘗稱統才章足繼西京董賈劉揚其書有益於政者有理亂損益法誡等篇辭多不載云李恂字叔英安定臨涇人也少習韓詩教授諸生常數百人太守潁川李鴻請署功曹未及到而州辟為從事㑹鴻卒恂不應州命而送鴻喪還鄉里既葬留起冢墳持喪三年辟司徒桓虞府後拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖寫山川屯田聚落百餘卷悉封奏上肅宗嘉之拜兖州刺史以清約率下常席羊皮服布被遷張掖太守有威重名時大將軍竇憲將兵屯武威天下州郡逺近莫不修禮遺恂奉公不阿為憲所奏免後復徵拜謁者使持節領西域副校尉西域殷富多珍寳諸國侍子及督使賈胡數遺恂奴婢宛馬金銀香􅄢之屬一無所受北匈奴數斷西域車師伊吾隴沙以西使命不得通恂設購賞遂斬虜帥縣首軍門自是道路夷清威恩並行遷武陵太守後坐事免歩歸鄉里潛居山澤結草為廬獨與諸生織席自給㑹西羌反畔恂到田舍為所執獲羌素聞其名放遣之恂因詣洛陽謝時嵗荒司空張敏司徒魯恭等各遣子饋糧悉無所受徙居新安闗下拾橡實以自資年九十六卒陳禪字紀山巴郡安漢人也仕郡功曹舉善黜惡為邦内所畏察孝亷州辟治中從事時刺史為人所上受納贓賂禪當傳考無他所齎但持喪歛之具而已及至笞掠無算五毒畢加禪神意自若辭對無變事遂散釋車騎將軍鄧騭聞其名而辟焉舉茂才時漢中蠻夷反畔以禪為漢中太守夷賊素聞其名聲即時降服遷左馮翊入拜諫議大夫永寧元年西南夷撣國王獻樂及幻人能吐火自支解易牛馬頭明年元會作之於庭安帝與羣臣共觀大竒之禪獨離席舉手大言曰昔齊魯為夾谷之㑹齊作侏儒之樂仲尼誅之又曰放鄭聲遠佞人帝王之庭不宜設夷狄之技尚書陳忠劾奏禪曰古者合歡之樂舞於堂四夷之樂陳於門故詩云以雅以南韎任朱離今撣國越流沙踰縣度萬里貢獻非鄭衞之聲佞人之比而禪廷訕朝政請劾禪下獄有詔勿收左轉為元菟候城障尉詔敢不之官上妻子從者名禪既行朝廷多訟之㑹北匈奴入遼東追拜禪為遼東太守胡憚其威彊退還數百里禪不加兵但使吏卒往曉慰之單于隨使還郡禪於學行禮為說道義以感化之單于懐服遺以胡中珍貨而去及鄧騭誅廢禪以故吏免復為車騎將軍閻顯長史順帝即位遷司𨽻校尉明年卒於官子澄有清名官至漢中太守禪曾孫寳亦剛壯有禪風為州别駕從事顯名州里龎參字仲逹河南緱氏人也初仕郡未知名河南龎奮見而竒之舉為孝亷拜左校令坐法輸作若盧永初元年涼州先零種羌反畔遣車騎將軍鄧騭討之參於徒中使其子俊上書曰方今西州流民擾動而徴發不絶水潦不休地力不復重之以大軍疲之以遠戍農功消於轉運資財竭於徵𤼵田疇不得墾闢禾稼不得收入摶手困窮無望來秋百姓力屈不復堪命臣愚以為萬里運糧遠就羌戎不若總兵飬衆以待其疲車騎將軍騭宜西振旅留征西校尉任尚使督涼州士民轉居三輔休徭役以助其時止煩賦以益其財令男得耕種女得織絍然後畜精鋭乘懈沮出其不意攻其不備則邊人之仇報奔北之恥雪矣書奏㑹御史中丞樊準上疏薦參曰臣聞鷙鳥累百不如一鶚昔孝文皇帝悟馮唐之言而赦魏尚之罪使為邊守匈奴不敢南向夫以一臣之身折方面之難者選用得也臣伏見故左校令河南龎參勇謀不測卓爾竒偉高才武畧有魏尚之風前坐微法輸作經時今羌戎為患大軍西屯臣以為如參之人宜在行伍惟明詔採前世之舉觀魏尚之功免赦參刑以為軍鋒必有成效宣助國威鄧太后納其言即擢參於徒中召拜謁者使西督三輔諸軍屯而徵鄧騭還四年羌冦轉盛兵費日廣且連年不登榖石萬餘參奏記於鄧騭曰比年羌冦特困隴右供徭賦役為損日滋官負人責數十億萬今復募𤼵百姓調取榖帛􅃷賣什物以應吏求外傷羌虜内困徵賦遂乃千里轉糧遠給武都西郡塗路傾阻難勞百端疾行則鈔暴為害遲進則榖食稍損運糧散於曠野牛馬死於山澤縣官不足輙貸於民民已窮矣將從誰求名救金城而實困三輔三輔既困還復為金城之禍矣參前數言宜棄西域乃為西州士大夫所笑今茍貪不毛之地營恤不使之民暴軍伊吾之野以慮三族之外果破涼州禍亂至今夫拓境不寧無益於彊多田不耕何救飢敝故善為國者務懐其内不求外利務富其民不貪廣土三輔山原曠遠民庶稀疎故縣邱城可居者多今宜徙邊郡不能自存者入居諸陵田戍故縣孤城絶郡以權徙之轉運逺費聚而近之徭役煩數休而息之此善之善者也騭及公卿以國用不足欲從參議衆多不同乃止拜參為漢陽太守郡人任棠者有竒節隱居教授參到先候之棠不與言但以薤一大本水一盂置户屏前自抱孫兒伏於户下主簿白以為倨參思其微意良久曰棠是欲曉太守也水者欲吾清也拔大本薤者欲吾擊彊宗也抱兒當户欲吾開門恤孤也於是歎息而還參在職果能抑彊助弱以惠政得民元初元年遷䕶羌校尉畔羌懐其恩信明年燒當羌種號多等皆降始復得還都令居通河西路時先零羌豪僭號北地詔參將降羌及湟中義從胡七千人與行征西將軍司馬鈞期㑹北地擊之參於道為羌所敗既已失期乃稱病引兵還坐以詐疾徵下獄校書郎中馬融上書請之曰伏見西戎反畔冦鈔五州昔周宣得南仲逐玁狁而立中興之功孝文用亞夫伐匈奴而建太宗之號竊見前䕶羌校尉龎參文武昭備智畧𢎞遠既有義勇果毅之節兼以博雅深謀之姿又度遼將軍梁慬前統西域勤苦數年還留三輔功効克立間在北邊單于降服今皆幽囚䧟於法綱昔荀林父敗績於邲晉侯使復其位孟明視喪師於崤秦伯不替其官故晉景并赤狄之土秦穆遂覇西戎宜逺覽二君使參慬得在寛宥之科誠有益於折衝毗佐於聖化書奏赦參等後以參為遼東太守永建元年遷度遼將軍四年入為大鴻臚尚書僕射虞詡薦參有宰相噐能順帝時以為太尉錄尚書事是時三公之中參名忠直數為左右所陷毁以所舉用忤帝㫖司𨽻承風案之時當㑹茂才孝亷參以被奏稱疾不得㑹上計掾廣漢段恭因㑹上疏言昔者白起賜死諸侯酌酒相賀季子來歸魯人喜其紓難伏見太尉龎參竭忠盡節徒以直道不能曲心孤立羣邪之間復為讒佞傷毁願陛下卒於寵任以安社稷書奏詔即遣小黄門視參疾太醫致羊酒後參夫人疾前妻子投於井而殺之參素與洛陽令祝良不平良聞之率吏卒入太尉府案實其事乃上參罪遂因災異䇿免有司以良不先聞奏輙折辱宰相坐繫詔獄良能得百姓心洛陽吏人守闕請代其罪者日有數千萬人詔乃原刑陽嘉四年復以參為太尉永和元年以久病罷卒於家陳龜字叔珍上黨泫氏人也家世邉將便習弓馬雄於北州龜少有志氣永建中舉孝亷五遷五原太守永和五年拜使匈奴中郎將時南匈奴左部反亂龜以單于不能制下外順内畔促令自殺坐徵下獄免後再遷拜京兆尹時三輔彊豪之族多侵枉小民龜到厲威嚴悉平理其怨屈者郡内大悦㑹羌胡冦邊殺長吏驅畧百姓桓帝以龜世諳邊俗拜為度遼將軍龜臨行上疏言西州邊鄙土地塉埆鞍馬為居射獵為業男寡耕稼之利女乏機杼之饒守塞候望懸命鋒鏑聞急長驅去不圖反自頃年以來匈奴數攻營郡殘殺長吏傷畧良細戰夫身膏沙漠居人首係馬鞍或舉國掩户盡種灰滅孤兒寡婦號哭空城野無青草室如懸磬雖含生氣實同枯朽往嵗并州水雨災螟互生稼穡荒耗租更空闕老者慮不終年少壯慮於困戹且牧守不良或出中官懼逆上㫖取過目前呼嗟之聲招致災害胡虜凶悍因衰緣隙而令倉庫殫於豺狼之口功業無銖兩之効皆由將帥不忠聚姦所致前涼州刺史祝良初除到州多所紏罰太守令長貶黜將半政未踰時功效卓然實應賞異以勸功能改任牧守去斥姦殘又宜更選匈奴烏桓䕶羌中郎將校尉簡練文武授之法令除幷涼二州今年租更寛赦罪𨽻埽除更始則善吏知奉公之祐惡者覺營私之禍胡馬可不窺長城塞下無候望之患矣帝覺悟乃更選幽幷刺史自營郡太守都尉以下多所革易下詔為陳將軍除幷涼一年租賦以賜吏民龜既到職州郡重足震慄鮮卑不敢近塞省息經用嵗以億計大將軍梁冀與龜素有隙譖其沮毁國威挑取功譽不為胡虜所畏坐徵還遂乞骸骨歸田里復徵為尚書冀暴虐日甚龜上疏言其罪狀請誅之帝不省自知必為其所害不食七日死西域胡夷幷涼民庶咸為舉哀弔祭其墓橋元字公祖梁國睢陽人也七世祖仁從同郡戴徳學著禮記章句四十九篇號曰橋君學成帝時為大鴻臚祖父基廣陵太守父肅東萊太守元少為縣功曹時豫州刺史周景行部到梁國元謁景因伏地言陳相羊昌罪惡乞為部陳從事窮案其姦景壯元意署而遣之元到悉收昌賓客具考贓罪昌素為大將軍梁冀所厚冀為馳檄救之景承㫖召元元還檄不發案之益急昌坐檻車徵元由是著名舉孝亷補洛陽左尉時梁不疑為河南尹元以公事當詣府受對耻為所辱棄官還鄉里後四遷為齊相坐事為城旦刑竟徵再遷上谷太守又為漢陽太守時上邽令皇甫禎有贓罪元收考髠笞死於冀市一境皆震郡人上邽姜岐守道隱居名聞西州元召以為吏稱疾不就元怒勅督郵尹益逼致曰岐若不至趨嫁其母益固爭不能得遽曉譬岐岐堅卧不起郡内士大夫亦競往諫元乃止時頗以為譏後謝病免復公車徵為司徒長史拜將作大匠桓帝末鮮卑南匈奴及高句麗嗣子伯固並畔為冦鈔四府舉元為度遼將軍假黄鉞元至鎭休兵飬士然後督諸將守討擊胡虜及伯固等皆破散退走在職三年邉境安靜靈帝初徵入為河南尹轉少府大鴻臚建寧三年遷司空轉司徒素與南陽太守陳球有隙及在公位而薦球為廷尉元以國家方弱自度力無所用乃稱疾上疏引衆灾以自劾遂䇿罷嵗餘拜尚書令時太中大夫蓋升與帝有舊恩前為南陽太守贓數億以上元奏免升禁錮没入財賄帝不從而遷升侍中元託病免拜光祿大夫光和元年遷太尉數月復以病罷拜太中大夫就醫里舍元少子十嵗獨游門次卒有三人持杖刼執之入舍登樓就元求貨元不與有頃司𨽻校尉陽球率河南尹洛陽令圍守元家球等恐幷殺其子未欲廹之元瞑目呼曰姦人無狀元豈以一子之命而縱國賊乎促令兵進於是攻之元子亦死元乃詣闕謝罪乞下天下凡有刼質皆幷殺之不得贖以財寳開張姦路詔書下其章初自安帝以後法禁稍弛京師刼質不避豪貴自是遂絶元以光和六年卒時年七十五元性剛急無大體然謙儉下士子弟親宗無在大官者及卒家無居業喪無所殯當時稱之初曹操微時人莫知者嘗往候元元見而異焉謂曰今天下將亂安生民者其在君乎操常感其知己及後經過元墓輙悽愴致祭奠自為其文曰故太尉橋公懿徳高軌汎愛博容國念明訓士思令謨幽靈潛翳邈哉緬矣操以㓜年逮升堂室特以頑質見納君子增榮益觀皆由奬朂猶仲尼稱不如顔淵李生厚歎賈復士死知己懐此無忘又承從容約誓之言徂没之後路有經由不以斗酒隻雞過相沃酹車過三歩腹痛勿怨雖臨時戱笑之言非至親之篤好胡肯為此辭哉懐舊惟顧念之悽愴奉命東征屯次鄉里北望貴土乃心陵墓裁致薄奠公其享之元子羽官至任城相崔駰字亭伯涿郡安平人也高祖父朝昭帝時為幽州從事諫刺史無與燕刺王通及刺王敗擢為侍御史生子舒歴四郡太守所在有能名舒小子篆王莽時為郡文學以明經徴詣公車太保甄豐舉為歩兵校尉篆辭曰吾聞伐國不問仁人戰陳不訪儒士此舉奚為至哉遂投劾歸莽嫌諸不附己者多以法中傷之時篆兄發以佞巧幸於莽位至大司空母師氏能通經學百家之言莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯於新世後以篆為建新大尹篆不得已乃歎曰吾生無妄之世値澆羿之君上有老母下有兄弟安得獨潔己而危所生哉乃遂單車到官稱疾不視事三年不行縣門下掾倪敞諫篆乃彊起班春所至之縣獄犴塡滿篆垂涕曰嗟乎刑罰不中乃䧟人於穽此皆何罪而至於是遂平理所出二千餘人掾吏叩頭諫曰朝廷初政州牧峻刻宥過申枉誠仁者之心然獨為君子將有悔乎篆曰邾文公不以一人易其身君子謂之知命如殺一大尹贖二千人蓋所願也遂稱疾去建武初朝廷多薦言之者幽州刺史又舉篆賢良篆自以宗門受莽偽寵慚愧漢朝遂辭歸不仕客居滎陽閉門潛思著周易林六十四篇用決吉凶多所占驗臨終作賦自悼名曰慰志篆生毅以疾隱身不仕毅生駰年十三能通詩易春秋博學有偉才盡通古今訓詁百家之言善屬文少游太學與班固傅毅同時齊名常以典籍為業未遑仕進之事時人或譏其太元静將以後名失實駰擬揚雄解嘲作逹㫖以答焉其辭曰或説己曰易稱備物致用可觀而有所合故能扶陽以出順隂而入春發其華秋收其實有始有極爰登其質今子韞櫝六經服膺道術歴世而游高談有日俯鉤深於重淵仰探遠乎九乾窮至賾於幽微測潛隱之無源然下不歩卿相之廷上不登王公之門進不黨以讚己退不黷於庸人獨師友道徳合符曩眞抱景特立與士不羣蓋高樹靡隂獨木不林隨時之宜道貴從凡於時太上運天徳以君世憲王僚而布官臨雍泮以恢儒疏軒冕以崇賢率惇徳以厲忠孝揚茂化以砥仁義選利噐於良材求鏌鋣於明智不以此時攀台階闚紫闥據高軒望朱闕夫欲千里而咫尺未𤼵䝉竊惑焉故英人乘斯時也猶逸禽之赴深林蝱蚋之趣大沛胡為嘿嘿而久沈滯也答曰有是言乎子茍欲勉我以世路不知其跌而失吾之度也古者隂陽始分天地初制皇綱云緒帝紀乃設傳序厯數三代興滅昔大庭尚矣赫胥罔識淳樸散離人物錯乖高辛攸降厥趣各違道無常稽與時張㢮失仁為非得義為是君子通變各審所履故士或掩目而淵潛或盥耳而山棲或草耕而僅飽或木茹而長飢或重聘而不來或屢黜而不去或冒訽以干進或望色而斯舉或以役夫𤼵夢於王公或以魚父見兆於元龜若夫紛繷塞路凶虐播流人有昏墊之戹主有疇咨之憂條垂藟蔓上下相求於是乎賢人授手援世之災跋渉赴俗急斯時也昔堯含慼而臯陶謨高祖歎而子房慮禍不散而曹絳奮結不解而陳平權及其䇿合道從克亂弭衝乃將鏤元珪冊顯功銘昆吾之冶勒景襄之鐘與其有事則褰裳濡足冠挂不顧人溺不拯則非仁也當其無事則躐纓整襟規矩其歩徳譲不修則非忠也是以險則救俗平則守禮舉以公心不私其體今聖上之育斯人也樸以皇質雕以唐文六合怡怡比屋為仁壹天下之衆異齊品類之萬殊參差同量坏冶一陶羣生得理庶績其凝家家有以樂和人人有以自優威械藏而爼豆布六典陳而九刑厝濟兹兆庶出於平易之路雖有力牧之畧尚父之厲伊臯不論奚事范蔡夫廣厦成而茂木暢遠求存而良馬縶隂事終而水宿藏場功畢而大火入方斯之際處士山積學者川流衣裳被宇冠蓋雲浮譬猶衡陽之林岱隂之麓伐尋抱不為之稀蓺拱把不為之數悠悠罔極亦各有得彼採其華我收其實舍之則藏己所學也故進動以道則不辭執珪而秉柱國復靜以理則甘糟糠而安藜藿夫君子非不欲仕也耻夸毗以求舉非不欲室也惡登牆而摟處呌呼􅃷鬻縣旌自表非隨和之寳也暴智燿世因以干祿非仲尼之道也游不倫黨茍以徇己汙血競時利合而友子笑我之沈滯吾亦病子㞕㞕而不已也先人有則而我弗虧行有枉徑而我非隨臧否在予唯世所議固將因天質之自然誦上哲之高訓詠太平之清風行天下之至順懼吾躬之穢徳勤百畆之不耘縶余馬以安行俟性命之所存昔孔子起威於夾谷晏嬰𤼵勇於崔杼曹劌舉節於柯盟卞嚴克敵於彊禦范蠡錯埶於㑹稽伍員樹功於柏舉魯連辯言以退燕包胥單辭而存楚唐且華顚以悟秦甘羅童牙而報趙原衰見亷於壼飱宣孟收徳於束脯吳札結信於邱木展季効貞於門女顔回明仁於度轂程嬰顯義於趙武僕誠不能編徳於數者竊慕古人之所序元和中肅宗始脩古禮廵狩方嶽駰上四廵頌以稱漢徳辭甚典羙文多故不載帝雅好文章自見駰頌後帝嗟歎之謂侍中竇憲曰卿寧知崔駰乎對曰班固數為臣說之然未見也帝曰公愛班固而忽崔駰此葉公之好龍也試請見之駰由此候憲憲屣履迎門笑謂駰曰亭伯吾受詔交公公何得薄哉遂揖入為上客居無幾何帝幸憲第時駰適在憲所帝聞而欲召見之憲諫以為不宜與白衣㑹帝悟曰吾能令駰朝夕在傍何必於此適欲官之㑹帝崩竇太后臨朝憲以重戚出内詔命駰獻書誡之曰駰聞之傳曰生而富者驕生而貴者傲生富貴而能不驕傲者未之有也今寵祿初隆百僚觀行當堯舜之盛世處光華之顯時豈可不庶幾夙夜以永衆譽𢎞申伯之羙致周邵之事乎語曰不患無位患所以立昔馮野王以外戚居位稱為賢臣近隂衞尉克己復禮終受多福郯氏之宗非不尊也陽侯之族非不盛也重侯累將建天樞執斗柄其所以獲譏於時垂愆於後者何也蓋在滿而不挹位有餘而仁不足也漢興以後迄於哀平外家二十保族全身四人而已書曰鑒於有殷可不愼哉竇氏之興肇自孝文二君以淳淑守道成名先日安豐以佐命著徳顯自中興内以忠誠自固外以法度自守卒享祚國垂祉於今夫謙徳之光周易所羙滿溢之位道家所戒故君子福大而愈懼爵隆而益恭遠察近鑒俯仰有則銘諸几杖刻諸盤杅矜矜業業無殆無荒如此則百福是荷慶流無窮矣及憲為車騎將軍辟駰為掾憲府貴重掾屬二十人皆故刺史二千石唯駰以處士年少擢在其間憲擅權驕恣駰數諫之及出擊匈奴道路愈多不法駰為主簿前後奏記數十指切長短憲不能容稍疎之因察駰高第出為長岑長駰自以逺去不得意遂不之官而歸永元四年卒於家所著詩賦銘頌書記表七依㛰禮結言逹㫖酒警合二十一篇中子瑗瑗字子玉早孤銳志好學盡能傳其父業年十八至京師從侍中賈逵質正大義逵善待之瑗因留游學遂明天官歴數京房易傳六日七分諸儒宗之與扶風馬融南陽張衡特相友好初瑗兄章為人所殺瑗手刃報仇因亡命㑹赦歸家家貧兄弟同居數十年鄉邑化之年四十餘始為郡吏以事繫東郡𤼵干獄獄掾善為禮瑗閒考訊時輙問以禮說其專心好學雖顚沛必於是後事釋歸家為度遼將軍鄧遵所辟居無何遵被誅瑗免歸後復辟車騎將軍閻顯府時太后稱制顯入參政事先是安帝廢太子為濟隂王而以北鄉侯為嗣瑗以侯立不以正知顯將敗欲說令廢立而顯日沉醉不能得見乃謂長史陳禪曰中常侍江京陳逹等得以嬖寵惑蠱先帝遂使廢黜正統扶立疎孽少帝即位𤼵病廟中周勃之徵於斯得見今欲與長史君共求見說將軍白太后收京等廢少帝引立濟隂王必上當天心下合人望伊霍之功不下席而立則將軍兄弟傳祚於無窮若拒違天意久曠神噐則將以無罪幷辜元惡此所謂禍福之㑹分功之時禪猶豫未敢從㑹北鄉侯薨孫程立濟隂王是為順帝閻顯兄弟悉伏誅瑗坐被斥門生蘇祗具知瑗謀欲上書言狀瑗聞而遽止之時陳禪為司𨽻校尉召瑗謂曰弟聴祇上書禪請為之證瑗曰此譬猶兒妾屏語耳願使君勿復出口遂辭歸不復應州郡命久之大將軍梁商初開莫府復首辟瑗自以再為貴戚吏不遇被斥遂以疾固辭嵗中舉茂才遷汲令在事數言便宜為人開稻田數百頃視事七年百姓歌之漢安初大司農胡廣少府竇章共薦瑗宿徳大儒從政有迹不宜久在下位由此遷濟北相時李固為太山太守羙瑗文雅奉書禮致殷勤歲餘光祿大夫杜喬為八使徇行郡國以贓罪奏瑗徵詣廷尉瑗上書自訟得理出㑹病卒年六十六臨終顧命子寔曰夫人禀天地之氣以生及其終也歸精於天還骨於地何地不可藏形骸勿歸鄉里其賵贈之物羊豕之奠一不得受寔奉遺令遂留葬洛陽瑗高於文辭尤善為書記箴銘所著賦碑銘箴頌七蘇南陽文學官志歎辭移社文悔祈草書執七言凡五十七篇其南陽文學官志稱於後世諸能為文者皆自以弗及瑗爱士好賔客盛脩肴膳單極滋味不問餘産居常蔬食菜羮而已家無儋石儲當世清之寔字子眞一名台字元始少沈静好典籍父卒隱居墓側服竟三公並辟皆不就桓帝初詔公卿郡國舉至孝獨行之士寔以郡舉徵詣公車病不對䇿除為即明於政體吏才有餘論當世便事數十條名曰政論指切時要言辯而确當世稱之仲長統曰凡為人主宜冩一通置之坐側其辭曰自堯舜之帝湯武之王皆頼明哲之佐博物之臣故臯陶陳謨而唐虞以興伊箕作訓而殷周用隆及繼體之君欲立中興之功者曷嘗不頼賢哲之謀乎凡天下所不理者常由人主承平日久俗漸敝而不悟政寖衰而不改習亂安危怢不自覩或荒耽嗜欲不恤萬機或耳蔽箴誨厭偽忽眞或猶豫岐路莫適所從或見信之佐括嚢守祿或疎逺之臣言以賤廢是以王綱縱㢮於上智士欝伊於下悲夫自漢興以來三百五十餘嵗矣政令垢翫上下怠懈風俗彫敝人庶巧偽百姓囂然咸復思中興之救矣且濟時拯世之術豈必體堯蹈舜然後乃理哉期於補䘺決壊枝柱邪傾隨形裁割要措斯世於安寧之域而已故聖人執權遭時定制歩驟之差各有云設不疆人以不能背急切而慕所聞也蓋孔子對葉公以來逺哀公以臨人景公以節禮非其不同所急異務也是以受命之君每輙創制中興之主亦匡時失昔盤庚愍殷遷都易民周穆有闕甫侯正刑俗人拘文牽古不達權制竒偉所聞簡忽所見烏可與論國家之大事哉故言事者雖合聖徳輙見掎奪何者其頑士闇於時權安習所見不知樂成況可慮始茍云率由舊章而已其達者或矜名妒能恥䇿非已舞筆奮辭以破其義寡不勝衆遂見擯棄雖稷契復存猶將困焉斯賈生之所以排於絳灌屈子之所以攄其幽憤者也夫以文帝之明賈生之賢絳灌之忠而有此患況其餘哉故宜量力度徳春秋之義今既不能純法八世故宜參以覇政覇政則宜重賞深罰以御之明著法術以檢之自非上徳嚴之則理寛之則亂何以明其然也近孝宣皇帝明於君人之道審於為政之理故嚴刑峻法破姦軌之膽海内清肅天下密如薦勲祖廟享號中宗算計見效優於孝文及元帝即位多行寛政卒以墮損威權始奪遂為漢室基禍之主政道得失於斯可監昔孔子作春秋襃齊桓懿晉文歎管仲之功夫豈不羙文武之道哉誠達權救敝之理也故聖人能與世推移而俗士苦不知變以為結繩之約可復理亂秦之緒干戚之舞足以解平城之圍夫熊經鳥伸雖延厯之術非傷寒之理呼吸吐納雖度紀之道非續骨之膏蓋為國之法有似理身平則致飬疾則攻焉夫刑罸者治亂之藥石也徳教者興平之梁肉也夫以徳教除殘是以梁肉理疾也以刑罰理平是以藥石供飬也方今承百王之敝値戹運之㑹自數世以來政多恩貸馭委其轡馬駘其銜四牡横奔皇路險傾方將拑勒鞬輈以救之豈暇鳴和鑾請節奏哉昔高祖令蕭何作九章之律有夷三族之令黥劓斬趾斷舌梟首故謂之具五刑文帝雖除肉刑當劓者笞二百當斬左趾者笞五百當斬右趾者棄市右趾者既殞其命笞撻者往往至死雖有輕刑之名其實殺也當此之時民皆思復肉刑至景帝元年乃下詔曰笞與重罪無異幸而不死不可為民乃定律減笞輕捶自是之後笞者得全以此言之文帝乃重刑非輕之也以嚴致平非以寛致平也必欲行若言當大定其本使人主師五帝而式三王盪亡秦之俗遵先聖之風棄茍全之政蹈稽古之踪復五等之爵立井田之制然後選稷契為佐伊呂為輔樂作而鳯凰儀擊石則百獸舞若不然則多為累而已其後辟太尉袁湯大將軍梁冀府並不應大司農羊傅少府何豹上書薦寔才羙能高宜在朝廷召拜議郎遷大將軍冀司馬與邊韶延篤等著作東觀出為五原太守五原土宜麻枲而俗不知織績民冬月無衣積細草而卧其中見吏則衣草而出寔至官斥賣儲峙為作紡績織絍綀緼之具以教之民得以免寒苦是時胡虜連入雲中朔方殺畧吏民一嵗至九奔命寔整厲士馬嚴烽候虜不敢犯常為邊最以病徵拜議郎復與諸儒博士共雜定五經㑹梁冀誅寔以故吏免官禁錮數年時鮮卑數犯邊詔三公舉威武謀畧之事司空黄瓊薦寔拜遼東太守行道母劉氏病卒上疏求歸葬行喪母有母儀淑徳博覽書傳初寔在五原常訓以臨民之政寔之善績母有其助焉服竟召拜尚書寔以世方阻亂稱疾不視事數月免歸初寔父卒摽賣田宅起冢塋立碑頌葬訖資産竭盡因窮困以酤釀販鬻為業時人多以譏之寔終不改亦取足而已不致盈餘及仕官歴位邊郡而愈貧薄建寧中病卒家徒四壁立無以殯歛光祿勲楊賜太僕袁逄少府段熲為備棺槨葬具大鴻臚袁隗樹碑頌徳所著碑論箴銘荅七言祠文表記書凡十五篇寔從兄烈有重名於北州歴位郡守九卿靈帝時開鴻都門榜賣官爵公卿州郡下至黄綬各有差其富者則先入錢貧者到官而後倍輸或因常侍阿保别自通逹是時叚熲樊陵張温等雖有功勤名譽然皆先輸貨物而後登公位烈時因傅母入錢五百萬得為司徒及拜日天子臨軒百僚畢㑹帝顧謂親倖者曰悔不小靳可至千萬程夫人於傍應曰崔公冀州名士豈肯買官賴我得是反不知姝邪烈於是聲譽衰減久之不自安從容問其子鈞曰吾居三公於議者何如鈞曰大人少有英稱歴位卿守論者不謂當為三公而今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭烈怒舉杖擊之鈞時為虎賁中郎將服武弁戴鶡尾狼狽而走烈罵曰死卒父撾而走孝乎鈞曰舜之事父小杖則受大杖則走非不孝也烈慙而止烈後拜太尉鈞少交結英豪有名稱為西河太守獻帝初鈞與袁紹俱起兵山東董卓以是收烈付郿獄錮之銀鐺鐵鎻卓既誅拜烈城門校尉及李傕入長安為亂兵所殺烈有文才所著詩書教頌等凡四篇周燮字彦祖汝南安城人決曹掾燕之後也燮生而欽頤折頞醜狀駭人其母欲棄之其父不聴曰吾聞賢聖多有異貎興我宗者乃此兒也於是飬之始在髫鬌而知亷讓十嵗就學能通詩論及長專精禮易不讀非聖之書不修賀問之好有先人草廬結於岡畔下有陂田常肆勤以自給非身所耕漁則不食也鄉黨宗族希得見者舉孝亷賢良方正特徵皆以疾辭延光二年安帝以元纁羔幣聘燮及南陽馮良二郡各遣丞掾致禮宗族更勸之曰夫修徳立行以為國自先世以來勲寵相承君獨何為守東岡之陂乎燮曰吾既不能隱處巢穴追綺季之跡而猶顯然不遠父母之國斯固以滑泥揚波同其流矣夫修道者度其時而動動而不時焉得亨乎因自載到潁川陽城遣生送敬遂辭疾而歸良亦載病到近縣送禮而還詔書告二郡嵗以羊酒飬病良字君郎出於孤㣲少作縣吏年三十為尉從佐奉檄迎督郵即路慨然耻在厮役因壊車殺馬毁裂衣冠乃遁至犍為從杜撫學妻子求索蹤跡斷絶後乃見草中有敗車死馬衣裳腐朽謂為虎狼盜賊所害發喪制服積十許年乃還鄉里志行高整非禮不動遇妻子如君臣鄉黨以為儀表燮良年皆七十餘終黄憲字叔度汝南愼陽人也世貧賤父為牛醫潁川荀淑至愼陽遇憲於逆旅時年十四淑竦然異之揖與語移日不能去謂憲曰子吾之師表也既而前至袁閎所未及勞問逆曰子國有顔子寧識之乎閎曰見吾叔度邪是時同郡戴良才高倨傲而見憲未嘗不正容及歸罔然若有失也其母問曰汝復從牛醫兒來邪對曰良不見叔度自以為不及既覩其人則瞻之在前忽然在後固難得而測矣同郡陳蕃周舉常相謂曰時月之間不見黄生則鄙吝之萌復存乎心及蕃為三公臨朝歎曰叔度若在吾不敢先佩印綬矣太守王龔在郡禮進賢達多所降致卒不能屈憲郭林宗少游汝南先過袁閎不宿而退進徃從憲累日方還或以問林宗林宗曰奉高之噐譬諸汎濫雖清而易挹叔度汪汪若千頃陂澄之不清淆之不濁不可量也憲初舉孝亷又辟公府友人勸其仕憲亦不拒之暫到京師而還竟無所就年四十八終天下號曰徵君徐穉字孺子豫章南昌人也家貧常自耕稼非其力不食恭儉義讓所居服其徳屢辟公府不起時陳蕃為太守以禮請署功曹穉不免之既謁而退蕃在郡不接賔客唯穉來特設一榻去則縣之後舉有道家拜太原太守皆不就延熹二年尚書令陳蕃僕射胡廣等上疏薦穉等曰臣聞善人天地之紀政之所由也詩云思皇多士生此王國天挺俊乂為陛下出當輔弼明時左右大業者也伏見處士豫章徐穉彭城姜肱汝南袁閎京兆韋著潁川李曇徳行純備著於人聴若使擢登三事協亮天工必能翼宣盛羙增光日月矣桓帝乃以安車元纁備禮徵之並不至帝因問蕃曰徐穉袁閎韋著孰為先後蕃對曰閎生出公族聞道漸訓著長於三輔禮義之俗所謂不扶自直不鏤自雕至於穉者爰自江南卑薄之域而角立傑出宜當為先穉嘗為太尉黄瓊所辟不就及瓊卒歸葬穉乃負糧徒歩到江夏赴之設雞酒薄祭哭畢而去不告姓名時㑹者四方名士郭林宗等數十人聞之疑其穉也乃選能言語生茅容輕騎追之及於塗容為設飯共言稼穡之事臨訣去謂容曰為我謝郭林宗大樹將顚非一繩所維何為栖栖不遑寧處及林宗有母憂穉往弔之置生芻一束於廬前而去衆怪不知其故林宗曰此必南州高士徐孺子也詩不云乎生芻一束其人如玉吾無徳以堪之靈帝初欲蒲輪聘穉會卒時年七十二子允字季登篤行孝悌亦隱居不仕太守華歆禮請相見固病不詣漢末冦賊縱横皆敬允禮行轉相約勅不犯其閭建安中卒李曇字雲少孤繼母嚴酷曇事之愈謹為鄉里所稱法飬親行道終身不仕姜肱字伯淮彭城廣戚人也家世名族肱與二弟仲海季江俱以孝行著聞其友愛天至常共卧起及各娶妻兄弟相戀不能别寢以係嗣當立乃遞往就室肱博通五經兼明星緯士之逺來就學者三千餘人諸公爭加辟命皆不就二弟名聲相次亦不應徵聘時人慕之肱嘗與季江謁郡夜於道遇盜欲殺之肱兄弟更相爭死賊遂兩釋焉但掠奪衣資而已既至郡中見肱無衣服怪問其故肱託以他辭終不言盜盜聞而感悔後乃就精廬求見徵君肱與相見皆叩頭謝罪而還所畧物肱不受勞以酒食而遣之後與徐穉俱徵不至桓帝乃下彭城使畫工圖其形狀肱卧於幽闇以被韜面言惑眩疾不欲出風工竟不得見之中常侍曹節等專執朝事新誅太傅陳蕃大將軍竇武欲借寵賢徳以釋衆望乃白徵肱為太守肱得詔乃私告其友曰吾以虚獲實遂藉聲價明明在上猶當固其本志況今政在閹豎夫何為哉乃隱身遯命逺浮海濵再以元纁聘不就即拜太中大夫詔書至門肱使家人對云久病就醫遂羸服間行竄伏青州界中賣卜給食召命得斷家亦不知其處歴年乃還年七十七熹平二年終於家弟子陳留劉操追慕肱徳共刋石頌之申屠蟠字子龍陳留外黄人也九嵗喪父哀毁過禮服除不進酒肉十餘年每忌日輙三日不食同郡緱氏女玉為父報讐殺夫氏之黨吏執玉以告外黄令梁配配欲論殺玉蟠時年十五為諸生進諫曰玉之節義足以感無恥之孫激忍辱之子不遭明時尚當表旌廬墓況在清聴而不加哀矜配善其言乃為讞得減死論鄉人稱羙之家貧傭為漆工郭林宗見而竒之同郡蔡邕深重蟠及被州辟乃辭讓之曰申屠蟠禀氣元妙性敏心通喪親盡禮幾於毁滅至行羙義人所鮮能安貧樂潛味道守眞不為燥濕輕重不為窮達易節方之於邕以齒則長以徳則賢後郡召為主簿不行遂隱居精學博貫五經兼明圖緯始與濟隂王子居同在太學子居臨殁以身託蟠蟠乃躬推輦車送喪歸鄉里遇司𨽻從事於河鞏之間從事義之為封傳護送蟠不肯受投傳於地而去事畢還學太尉黄瓊辟不就及瓊卒歸葬江夏四方名豪㑹帳下者六七千人互相談論莫有及蟠者唯南郡一生與相酬對既别執蟠手曰君非聘則徵如是相見於上京矣蟠勃然作色曰始吾以子為可與言也何意乃相拘教樂貴之徒邪因振手而去不復與言再舉有道不就先是京師游士汝南范滂等非訐朝政自公卿以下皆折節下之太學生爭慕其風以為文學將興處士復用蟠獨歎曰昔戰國之世處士横議列國之王至為擁篲先驅卒有阬儒燒書之禍今之謂矣乃絶跡於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮或死或刑者數百人蟠礭然免於疑論後蟠友人陳郡馮雍坐事繫獄豫州牧黄琬欲殺之或勸蟠救雍蟠不肻行曰黄子琰為吾故邪未必合罪如不用吾言雖往何益琬聞之遂免雍罪大將軍何進連徵不詣進必欲致之使蟠同郡黄忠書勸曰前莫府初開至如先生特加殊禮優而不名申以手筆設几杖之坐經過二載而先生抗志彌高所尚益固竊論先生高節有餘於時則未也潁川荀爽載病在道北海鄭元北面受署彼豈樂覊牽哉知時不可逸豫也昔人之隱遭時則放聲滅迹巢棲茹薇其不遇也則祼身大笑被髪狂歌今先生處平壤游人間吟典籍襲衣裳事異昔人而欲速蹈其迹不亦難乎孔子可師何必首陽蟠不答中平五年復與爽元及潁川韓融陳紀等十四人並博士徵不至明年董卓廢立蟠及爽融紀等復俱公車徵唯蟠不到衆人咸勸之蟠笑而不應居無幾爽等為卓所脅廹西都長安京師擾亂及大駕西遷公卿多遇兵饑室家流散融等僅以身脫唯蟠處亂末終全高志年七十四終於家范氏曰易曰君子之道或出或處或黙或語孔子稱蘧伯玉邦有道則仕邦無道則可卷而懐也然用舍之端君子之所以存其誠也故其行也則濡足䝉垢出身以效時及其止也則窮棲茹菽藏寳以迷國太原閔仲叔者世稱節士雖周黨之潔清自以弗及也黨見其含菽飲水遺以生蒜受而不食建武中應司徒侯霸之辟既至霸不及政事徒勞苦而已仲叔恨曰始䝉嘉命且喜且懼今見明公喜懼皆去以仲叔為不足問邪不當辟也辟而不問是失人也遂辭出投劾而去復以博士徵不至客居安邑老病家貧不能得肉日買猪肝一片屠者或不肯與安邑令聞勅吏常給焉仲叔怪而問之知乃歎曰閔仲叔豈以口腹累安邑邪遂去客沛以夀終仲叔同郡荀恁字君大少亦修清節貲財千萬父越卒悉散與九族隱居山澤以求厥志王莽末匈奴冦其本縣廣武聞恁名節約不入荀氏閭光武徵以病不至永平初東平王蒼為驃騎將軍開東閤延賢俊辟而應焉及後朝㑹顯宗戱之曰先帝徵君不至驃騎辟君而來何也對曰先帝秉徳以惠下故臣可得不來驃騎執法以檢下故臣不敢不至後月餘罷歸卒於家桓帝時安陽人魏桓字仲英亦數被徵其鄉人勸之行桓曰夫干祿求進所以行其志也今後宫千數其可損乎廐馬萬匹其可減乎左右悉權豪其可去乎皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉遂隱身不出若二三子可謂識去就之槩候時而處夫然豈其枯槁茍而已哉蓋詭時審己以成其道焉余故列其風流區而載之楊震字伯起𢎞農華隂人也八世祖喜高帝時有功封赤泉侯高祖敞昭帝時為丞相封安平侯父寳習歐陽尚書哀平之世隱居教授居攝二年與兩龔蔣詡俱徵遂遁逃不知所處光武高其節建武中公車特徵老病不到卒於家震少好學受歐陽尚書於太常桓郁明經博覽無不窮究諸儒謂之語曰闗西孔子楊伯起常客居於湖不答州郡禮命數十年衆人謂之晚暮而震志愈篤後有冠雀銜三鱣魚飛集講堂前都講取魚進曰蛇鱣者卿大夫服之象也數三者法三台也先生自此升矣年五十乃始仕州郡大將軍鄧隲聞其賢而辟之舉茂才四遷荆州刺史東萊太守當之郡道經昌邑故所舉荆州茂才王密為昌邑令謁見至夜懐金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知神知我知子知何謂無知密愧而出轉涿郡太守性公亷不受私謁子孫常蔬食歩行故舊長者或欲令為産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎元初四年徵入為太僕遷太常先是博士選舉多不以實震舉薦明經名士陳留楊倫等顯傳學業諸儒稱之永寧元年代劉愷為司徒明年鄧太后崩内寵始横安帝乳母王聖因保飬之勤緣恩放恣聖子女伯榮出入宫掖傳通姦賂震上疏曰臣聞政以得賢為本理以去穢為務是以唐虞俊乂在官四凶流放天下咸服以致雍熙方今九徳未事嬖倖充庭阿母王聖出自賤微得遭千載奉飬聖躬雖有推燥居濕之勤前後賞惠過報勞苦而無厭之心不知紀極外交屬託擾亂天下損辱清朝塵㸃日月書誡牝雞牡鳴詩刺哲婦喪國昔鄭莊公從母氏之欲恣驕弟之情幾至危國然後加討春秋貶之以為失敎夫女子小人近之喜逺之怨實為難飬易曰無由遂在中饋言婦人不得與於政事也宜速出阿母令居外舍斷絶伯榮莫使往來令恩徳兩隆上下俱羙惟陛下絶婉孌之私割不忍之心留神萬機誡愼拜爵減省獻御損節徵發令野無鶴鳴之歎朝無小明之悔大東不興於今勞止不怨於下擬蹤往古比徳哲王豈不休哉奏御帝以示阿母等内倖皆懐忿恚而伯榮驕淫尤甚與故朝陽侯劉䕶從兄瓌交通瓌遂以為妻得襲䕶爵位至侍中震深疾之復詣闕上疏曰臣聞高祖與羣臣約非功臣不得封故經制父死子繼兄亡弟及以防篡也伏見詔書封故朝陽侯劉䕶再從兄瓌襲䕶爵為侯䕶同産弟威今猶見在臣聞天子專封封有功諸侯專爵爵有徳今瓌無他功行但以配阿母女一時之間既位侍中又至封侯不稽舊制不合經義行人諠譁百姓不安陛下宜覽鏡既往順帝之則書奏不省延光二年代劉愷為太尉帝舅大鴻臚耿寳薦中常侍李閏兄於震震不從寳乃自往候震曰李常侍國家所重欲令公辟其兄寳唯傳上意耳震曰如朝廷欲令三府辟召故宜有尚書勅遂拒不許寳大恨而去皇后兄執金吾閻顯亦薦所親厚於震震又不從司空劉授聞之即辟此二人旬日中皆見拔擢由是震益見怨時詔遣使者大為阿母修第中常侍樊豐及侍中周廣謝惲等更相扇動傾摇朝廷震復上疏曰臣伏見詔書為阿母興起津城門内第舍合兩為一連里竟街雕修繕飾窮極巧伎今盛夏土王而攻山採石其大匠左校别部將作合數十處轉相迫促為費巨億周廣謝惲兄弟與國無肺腑枝葉之屬依倚近倖姦佞之人與樊豐王永等分威共權屬託州郡傾動大臣宰司辟召承望㫖意招來海内貪汙之人受其貨賂至有贓錮棄世之徒復得顯用白黑溷淆清濁同源天下讙譁咸曰財貨上流為朝結譏惟陛下度之豐惲等見震連切諫不從無所顧忌遂詐作詔書調發司農錢穀大匠見徒材木各起家舍園池廬觀役費無數震因地震復上疏曰臣䝉恩備台輔不能奉宣敎化調和隂陽去年十一月四日京師地動臣聞師言地者隂精當安静承陽而今動摇者隂道盛也其日戊辰三者皆土位在中宫此中臣近宫盛於持權用事之象也臣伏惟陛下以邊境未寧躬自菲薄宫殿垣屋傾倚枝柱而已無所興造欲令逺近咸知政化之清流商邑之翼翼也而親近倖臣未崇斷金驕溢踰法多請徒士盛修第舍賣弄威福道路讙譁衆所聞見地動之變近在城郭殆為此𤼵又冬無宿雪春節未雨百僚燋心而繕修不止誠致旱之徵也書曰僭恒陽若臣無作威作福玉食唯陛下奮乾剛之徳棄驕奢之臣以掩訞言之口奉承皇天之戒無令威福久移於下震前後所上轉有切至帝既不平之而樊豐等皆側目憤怨俱以其名儒未敢加害尋有河間男子趙騰詣闕上書指陳得失帝𤼵怒遂收考詔獄結以罔上不道震復上疏救之曰臣聞堯舜之世諫鼓謗木立之於朝殷周哲王小人怨詈則還自敬徳所以達聰明開不諱博採負薪盡極下情也今趙騰所坐激訐謗語為罪與手刃犯法有差乞為虧除全騰之命以誘芻蕘輿人之言帝不省騰竟伏尸都市㑹三年春東廵岱宗樊豐等因乘輿在外競修第宅震部掾高舒召大匠令史考校之得豐等所詐下詔書具奏須行還上之豐等聞惶怖㑹太史言星變逆行遂共譖震云自趙騰死後深用怨懟且鄧氏故吏有恚恨之心及車駕行還便時太學夜遣使者䇿收震太尉印綬於是柴門絶賔客豐等復惡之乃遣大將軍耿寳奏震大臣不服罪懐恚望有詔遣歸本郡震行至城西夕陽亭乃慷慨謂其諸子門人曰死者士之常分吾䝉恩居上司疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁何面目復見日月身死之日以雜木為棺布單被裁足蓋形勿歸冢次勿設祭祠因飲酖而卒時年七十餘𢎞農太守移良承樊豐等㫖遣吏於陜縣留停震喪露棺道側謫震諸子代郵行書道路皆為隕涕嵗餘順帝即位樊豐周廣等誅死震門生虞放陳翼詣闕追訟震事朝廷咸稱其忠乃下詔除二子為郎贈錢百萬以禮改葬於華隂潼亭逺近畢至先葬十餘日有大鳥高丈餘集震䘮前俯仰悲鳴淚下霑地葬畢乃飛去郡以狀上時連有災異帝感震之枉乃下詔䇿曰故太尉震正直是與俾匡時政而青蠅㸃素同兹在藩上天降威災眚屢作爾卜爾筮惟震之故朕之不徳用彰厥咎山崩棟折我其危哉今使太守丞以中牢具祠魂而有靈儻其歆享於是時人立石鳥象於其墓所震之被譖也高舒亦得罪以減死論及震事顯舒拜侍御史至荆州刺史震五子長子牧富波相牧孫竒靈帝時為侍中帝從容問竒曰朕何如桓帝對曰陛下之於桓帝亦猶虞舜比徳唐堯帝不悅曰卿彊項眞楊震子孫死後必復致大鳥矣出為汝南太守帝崩後復入為侍中衞尉從獻帝西遷有功勤及李傕脅帝歸其營竒與黄門侍郎鍾繇誘傕部曲將宋􅁮楊昂令反傕傕由此孤弱帝乃得東後徙都許追封竒子亮為陽成亭侯震少子奉奉子敷篤志博聞議者以為能世其家敷早卒子衆亦傳先業以謁者僕射從獻帝入關累遷御史中丞及帝東還夜走渡河衆率諸官屬歩從至太陽拜侍中建安二年追前功封蓩亭侯震中子秉秉字叔節少傳父業兼明京氏易博通書傳常隱居教授年四十餘乃應司空辟拜侍御史頻出為豫荆徐兖四州刺史遷任城相自為刺史二千石計日受奉餘祿不入私門故吏齎錢百萬遺之閉門不受以亷潔稱桓帝即位以明尚書徵入勸講拜太中太夫左中郎將遷侍中尚書帝時微行私過幸河南尹梁允府舍是日大風拔樹晝昏秉因上疏諫曰臣聞孔子迅雷風烈必有變動詩云敬天之威不敢驅馳王者至尊出入有常警蹕而行静室而止自非郊廟之事則鑾旂不駕故詩稱自郊徂宫易曰王假有廟致孝享也諸侯如臣之家春秋尚列其誡況以先王法服而私出槃游降亂尊卑等威無序侍衞守空宫紱璽委女妾設有非常之變任章之謀上負先帝下悔靡及臣奕世受恩得備納言又以薄學充在講勸特䝉哀識見照日月恩重命輕義使士死敢憚摧折畧陳其愚帝不納秉以病乞退出為右扶風太尉黄瓊惜其去朝廷上秉勸講帷幄不宜外遷留拜光祿大夫是時大將軍梁冀用權秉稱病六年冀誅後乃拜太僕遷太常延熙三年白馬令李雲以諫受罪秉爭之不能得坐免官歸田里其年冬復徵拜河南尹先是中常侍單超弟匡為濟隂太守以贓罪為刺史第五種所劾窘急乃賂客任方刺兖州從事衞羽事已見種傳及捕得方囚繋洛陽匡慮秉當窮竟其事密令方等得突獄亡走尚書召秉詰責秉對曰春秋不誅黎比而魯多盜方等無狀釁由單匡刺執法之吏害奉公之臣復命令得逃竄寛縱罪身元惡大憝終為國害乞檻車徵匡考覈其事則姦慝蹤緒必可立得而秉竟坐論輸作左校以久旱赦出會日食太山太守皇甫規等訟秉忠正不宜久抑不用有詔公車徵秉及處士韋著二人各稱疾不至有司並劾秉著大不敬請下所屬正其罪尚書令周景與尚書邊韶議奏秉儒學侍講常在謙虛著隱居行義以退讓為節俱徵不至誠違側席之望然逶迤退食足抑茍進之風夫明王之世必有不召之臣聖朝𢎞飬宜用優游之禮可告在所屬喻以朝廷恩意如遂不至詳議其罰於是重徵乃到拜太常五年冬代劉矩為太尉是時宦官方熾任人及子弟為官布滿天下競為貪淫朝野嗟怨秉與司空周景上言内外吏職多非其人自頃所徵皆特拜不試致盜竊縱恣怨訟紛錯舊典中臣子弟不得居位秉埶而今枝葉賔客布列職署或年少庸人典據守宰上下忿患四方愁毒可遵用舊章退貪殘塞災謗請下司𨽻校尉中二千石城門五營校尉北軍中候各實覈所部應當斥罷自以狀言三府亷察有遺漏續上帝從之於是秉條奏牧守以下匈奴中郎將燕瑗青州刺史羊亮遼東太守孫諠等五十餘人或死或免天下莫不肅然時郡國計吏多留拜為郎秉上言三署見郎七百餘人帑藏空虚浮食者衆而不良守相欲因國為池澆濯釁穢宜絶横拜以塞覬覦之端自此終桓帝世計吏無復留拜者七年南廵園陵特詔秉從南陽太守張彪與帝微時有舊恩以車駕當至因傍發調多以入私秉聞之下書責讓荆州刺史以狀副言公府及行至南陽左右並通姦利詔書多所除拜秉復上疏諫曰臣聞先王建國順天制官太微積星名為郎位入奉宿衞出牧百姓臯陶誡虞在於官人頃者道路拜除恩加豎𨽻爵以貨成化由此敗所以俗夫巷議白駒逺逝穆穆清朝逺近莫觀宜割不忍之恩以斷求欲之路於是詔除乃止時中常侍侯覽弟參為益州刺史累有贓罪暴虐一州明年秉劾奏參檻車徵詣廷尉參惶恐道自殺秉因奏覽及中常侍具瑗曰臣案國舊典宦豎之官本在給使省闥司昏守夜而今猥受過寵執政操權其阿諛取容者則因公襃舉以報私惠有忤逆於心者必求事中傷肆其凶忿居法王公富擬國家飲食極肴饍僕妾盈紈素雖季氏專魯穰侯擅秦何以尚兹案中常侍侯覽弟參貪殘元惡自取禍滅覽固知釁重必有自疑之意臣愚以為不宜復見親近昔懿公刑邴歜之父奪閻職之妻而使二人參乘卒有竹中之難春秋書之以為至戒蓋鄭詹來而國亂四佞放而衆服以此觀之容可近乎覽宜急屏斥投畀有虎若斯之人非恩所宥請免官送歸本郡書奏尚書召對秉掾屬曰公府外職而奏劾近官經典漢制有故事乎秉使對曰春秋趙鞅以晉陽之甲逐君側之惡傳曰除君之惡唯力是視鄧通懈慢申屠嘉召通詰責文帝從而請之漢世故事三公之職無所不統尚書不能詰帝不得已竟免覽官而削瑗國每朝廷有得失輙盡忠規諫多見納用秉性不飲酒又早䘮夫人遂不復娶所在以淳白稱嘗從容言曰我有三不惑酒色財也八年薨時年七十四賜塋陪陵秉子賜字伯獻少傳家學篤志博聞常退居隱約敎授門徒不答州郡禮命後辟大將軍梁冀府非其好也出除陳倉令因病不行公車徵不至連辭三公之命後以司空高第再遷侍中越騎校尉建寧初靈帝當受學詔太𫝊三公選通尚書桓君章句宿有重名者三公舉賜乃侍講於華光殿中遷少府光祿勲熹平元年青虵見御坐帝以問賜賜上封事曰臣聞皇極不建則有蛇龍之孽詩云惟虺惟蛇女子之祥故春秋兩蛇鬬於鄭門昭公殆以女敗康王一朝晏起關雎見幾而作夫女謁行則䜛夫昌䜛夫昌則苞苴通故殷湯以之自戒終濟亢旱之災惟陛下思乾剛之道别内外之宜崇帝乙之制受元吉之祉抑皇甫之權割艷妻之愛則蛇變可消禎祥立應殷戊宋景其事甚明二年代唐珍為司空以災異免復拜光祿大夫秩中二千石五年代袁隗為司徒是時朝廷爵授多不以次而帝好微行遊幸外苑賜復上疏曰臣聞陛下數微行出幸苑囿觀鷹犬之埶極槃遊之荒政事日墮大化陵遲陛下不顧二祖之勤止追慕五宗之羙蹤而欲以望太平是由曲表而欲直景郤行而求及前人也宜絶慢慠之戱念官人之重割用板之恩愼貫魚之次無令醜女有四殆之歎遐邇有憤怨之聲臣受恩偏特忝任師傅不敢自同凡臣括囊避咎謹自手書密上後坐辟黨人免復拜光祿大夫光和元年有虹蜺晝降於嘉德殿前帝惡之引賜及議郎蔡邕等入金商門止崇徳署使中常侍曹節王甫問以祥異禍福所在賜仰天而歎謂節等曰吾每讀張禹傳未嘗不憤恚歎息既不能竭忠盡情極言其要而反留意少子乞遷女壻朱游欲得尚方斬馬劒以理之固其宜也吾以微薄之學充先師之末累世見寵無以報國猥當大問死而後已乃書對曰臣聞之經傳或得神以昌或得神以亡國家休明則鑒其德邪辟昬亂則視其禍今殿前之氣應為虹蜺皆妖邪所生不正之象詩人所謂蝃蝀者也於中孚經曰蜺之比無徳以色親方今内多嬖倖外任小臣上下並怨諠譁盈路是以災異屢見前後丁寧今復投蜺可謂孰矣案春秋䜟曰天投蜺天下怨海内亂加四百之期亦復垂及昔虹貫牛山管仲諫桓公無近妃宫易曰天垂象見吉凶聖人則之今妾媵嬖人閹尹之徒共專國朝欺罔日月又鴻都門下招㑹羣小造作賦說以蟲篆小技見寵於時如驩兠共工更相薦說旬月之間並各拔擢樂松處常伯任芝居納言郄儉梁鵠俱以便辟之性佞辯之心各受豐爵不次之寵而令搢紳之徒委伏畎畝口誦堯舜之言身蹈絶俗之行棄捐溝壑不見逮及冠履倒易陵谷代處從小人之邪意順無知之私欲不念板蕩之作虺蜴之誡殆哉之危莫過於今幸頼皇天垂象譴告周書曰天子見怪則修德諸侯見怪則修政卿大夫見怪則修職士庶人見怪則修身唯陛下愼經典之誡圖變復之道斥遠佞巧之臣速徵鶴鳴之士内親張仲外任山甫斷絶尺一抑止槃游留思庶政無敢怠遑冀上天還威衆變可弭老臣過受師傅之任數䝉寵異之恩豈敢愛惜垂没之年而不盡其慺慺之心哉書奏甚忤曹節等蔡邕坐直對抵罪徙朔方賜以師傅之恩故得免咎其冬行辟雍禮引賜為三老復拜少府光祿勲代劉郃為司徒帝欲造畢圭靈琨苑賜復上疏諫書奏帝欲止以問侍中任芝中常侍樂松松等曰昔文王之囿百里人以為小齊宣五里人以為大今與百姓共之無害於政也帝愧遂令築苑四年賜以病罷居無何拜太常詔賜御府衣一襲自所服冠幘綬玉壺革帶金錯鉤佩五年冬復拜太尉中平元年黄巾賊起賜被召會議詣省閤切諫忤㫖因以冦賊免先是黄巾帥張角等執左道稱大賢以誑燿百姓天下襁負歸之賜時在司徒召掾劉陶告曰張角等遭赦不悔而稍益滋蔓今若下州郡捕討恐更掻擾速成其患且欲切勅刺史二千石簡别流人各䕶歸本郡以孤弱其黨然後誅其渠帥可不勞而定何如陶對曰此孫子所謂不戰而屈人之兵廟勝之術也賜遂上書言之㑹去位事留中後帝徙南宫閱錄故事得賜所上張角奏及前侍講注籍乃感悟下詔封賜臨晉侯邑千五百户初賜與太尉劉寛司空張濟並入侍講自以不宜獨受封賞上書願分户邑於寛濟帝嘉歎復封寛及濟子拜賜尚書令數日出為廷尉賜自以代非法家言曰三后成功惟殷於民臯陶不與焉蓋吝之也遂固辭以特進就第二年九月復代張温為司空其月薨天子素服三日不臨朝贈東園秘噐襚服賜錢三百萬布五百疋䇿書哀愍遣左中郎將郭儀持節追位特進贈司空驃騎將軍印綬及葬又使侍御史持節送喪蘭臺令史十人發羽林騎輕車介士前後部鼓吹又勅驃騎將軍官屬司空法駕送至舊塋公卿以下㑹葬諡文烈侯及小祥又㑹焉子彪嗣彪字文先少傳家學初舉孝廉州舉茂才辟公府皆不應熹平中以博學舊聞公車徵拜議郎遷侍中京兆尹光和中黄門令王甫使門生於郡界辜㩁官財物七十餘萬彪發其姦言之司𨽻司𨽻校尉楊球因奏誅甫天下莫不愜心徵還為侍中五官中郎將遷潁川南陽太守復拜侍中三遷永樂少府太僕衛尉中平六年代董卓為司空其冬代黄琬為司徒明年關東兵起董卓懼欲遷都以違其難乃大㑹公卿議曰高祖都關中十有一世光武宫洛陽於今亦十世矣案石包䜟宜徙都長安以應天人之意百官無敢言者彪曰移都改制天下大事故般庚五遷殷民胥怨昔關中遭王莽變亂宫室焚燒民庶塗炭百不一在光武受命更都洛陽今天下無虞百姓樂安明公建立聖主光隆漢祚無故捐宗廟棄園陵恐百姓驚動必有麋沸之亂石包室䜟妖邪之書豈可信用卓曰關中肥饒故秦得幷吞六國且隴右材木自出致之甚易又杜陵南山下有武帝故瓦陶竈數千所幷功營之可使一朝而辦百姓何足與議若有前却我以大兵驅之可令詣滄海彪曰天下動之至易安之甚難惟明公慮焉卓作色曰公欲沮國計邪太尉黄琬曰此國之大事楊公之言得無可思卓不答司空荀爽見卓意壯恐害彪等因從容言曰相國豈樂此邪山東兵起非一日可禁故當遷以圖之此秦漢之埶也卓意小解爽私謂彪曰諸君堅争不止禍必有歸故吾不為也議罷卓使司𨽻校尉宣播以災異奏免琬彪等詣闕謝即拜光祿大夫十餘日遷大鴻臚從入闗轉少府太常以病免復為京兆尹光祿勲再遷光祿大夫三年秋代淳于嘉為司空以地震免復拜太常興平元年代朱儁為太尉錄尚書事及李傕郭汜之亂彪盡節衞主﨑嶇危難之間幾不免於害語在董卓傳及車駕還雒陽復守尚書令建安元年從東都許時天子新遷大㑹公卿兖州刺史曹操上殿見彪色不悅恐於此圖之未得讌設託疾如厠因出還營彪以疾罷時袁術僭亂操託彪與術㛰姻誣以欲圖廢置奏收下獄劾以大逆將作大匠孔融聞之不及朝服往見操曰楊公四世清徳海内所瞻周書父子兄弟罪不相及況以袁氏歸罪楊公易稱積善餘慶徒欺人耳操曰此國家之意融曰假使成王殺召公周公可得言不知邪今天下纓緌搢紳所以瞻仰明公者以公聰明仁智輔相漢朝舉直厝枉致之雍熙也今横殺無辜則海内觀聴誰不解體孔融魯國男子明日便當拂衣而去不復朝矣操不得已遂理出彪四年復拜太常十年免十一年諸以恩澤為侯者皆奪封彪見漢祚將終遂稱脚攣不復行積十年後子修為曹操所殺操見彪問曰公何瘦之甚對曰愧無日殫先見之明猶懐老牛舐犢之愛操為之改容修字德祖好學有俊才為丞相曹操主簿用事曹氏及操自平漢中欲因討劉備而不得進欲守之又難為功䕶軍不知進止何依操於是出敎唯曰雞肋而已外曹莫能曉修獨曰夫雞肋食之則無所得棄之則如可惜公歸計決矣乃命外白稍嚴操於此廻師修之幾決多有此類修又常出行籌操有問外事乃逆為答記勅守舍兒若有令出依次通之既而果然如是者三操怪其速使廉之知狀於此忌修且以袁術之甥慮為後患遂因事殺之修所著賦頌碑讚詩哀辭表記書凡十五篇及魏文帝受禪欲以彪為太尉先遣吏示㫖彪辭曰彪備漢三公遭世傾亂不能有所補益耄年被病豈可贊惟新之朝遂固辭乃受光祿大夫賜几杖衣袍因朝㑹引見令彪著布單衣鹿皮冠杖而入待以賔客之禮年八十四黄初六年卒於家自震至彪四世太尉德業相繼與袁氏俱為東京名族云張皓字叔明犍為武陽人也六世祖良高帝時為太子少傅封留侯皓少游學京師初永元中歸仕州郡辟大將軍鄧隲府五遷尚書僕射職事八年出為彭城相永寧元年徵拜廷尉皓雖非法家而留心刑斷數與尚書辯正疑獄多以詳當見從時安帝廢皇太子為濟隂王皓與太常桓焉太僕來歴廷爭之不能得事已具來歴傳退而上疏曰昔賊臣江充造構䜛逆至令戾園興兵終及禍難後壺關三老一言上乃覺悟雖追前失悔之何逮今皇太子春秋方始十嵗未見保傅九徳之義宜簡賢輔就成聖質書奏不省及順帝即位拜皓司空在事多所薦逹天子稱其推士時清河趙騰上言災變譏刺朝政章下有司收騰繫考所引黨輩八十餘人皆以誹謗當伏重法皓上疏諫曰臣聞堯舜立敢諫之鼓三王樹誹謗之木春秋採善書惡聖主不罪芻蕘騰等雖干上犯法所言本欲盡忠正諫如當誅戮天下杜口塞諫爭之源非所以昭徳示後也帝乃悟減騰死罪一等餘皆司㓂四年以隂陽不和䇿免陽嘉元年復為廷尉其年卒官時年八十三遣使者弔祭賜葬地於河西縣子綱綱字文紀少明經學雖為公子而厲布衣之節舉孝亷不就司徒辟高第為御史時順帝委縱宦官有識危心綱常感激慨然歎曰穢惡滿朝不能奮身出命埽國家之難雖生吾不願也退而上書曰詩云不愆不忘率由舊章尋大漢初隆及中興之世文眀二帝德化尤盛觀其理為易循易見但恭儉守節約身尚徳而已中官常侍不過兩人近倖賞賜裁滿數金惜費重人故家給人足夷狄聞中國優富任信道徳所以姦謀自消而和氣感應而頃者以來不遵舊典無功小人皆有官爵富之驕之而復害之非愛人重噐承天順道者也伏願陛下少留聖思割損左右以奉天心書奏不省漢安元年選遣八使狥行風俗皆耆儒知名多歴顯位唯綱年少官次最微餘人受命之部而綱獨埋其車輪於洛陽郡亭曰豺狼當路安問狐狸遂奏曰大將軍冀河南尹不疑䝉外戚之援荷國厚恩以芻蕘之資居阿衡之任不能敷揚五敎翼讚日月而專為封豕長蛇肆其貪叨甘心好貨縱恣無底多樹諂諛以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者也書御京師震竦時冀妹為皇后内寵方盛諸梁姻族滿朝帝雖知綱言直終不忍用時廣陵賊張嬰等衆數萬人殺刺史二千石㓂亂揚徐間積十餘年朝廷不得討冀乃諷尚書以綱為廣陵太守因欲以事中之前遣郡守率多求兵馬綱獨請單車之職既到乃將吏卒十餘人徑造嬰壘以慰安之求得與長老相見申示國恩嬰初大驚既見綱誠信乃出拜謁綱延置上坐問所疾苦乃譬之曰前後二千石多肆貪暴故致公等懐憤相聚二千石信有罪矣然為之者又非義也今主上仁聖欲以文徳服叛故遣太守思以爵祿相榮不願以刑罰相加今誠轉禍為福之時也若聞義不服天子赫然震怒荆揚兖豫大兵雲合豈不危乎若不料彊弱非明也棄善取惡非智也去順效逆非忠也身絶血嗣非孝也背正從邪非直也見義不為非勇也六者成敗之幾利害所從公其深計之嬰聞泣下曰荒裔愚人不能自通朝廷不堪侵枉遂復相聚偷生若魚遊釡中喘息須臾間耳今聞明府之言乃嬰等更生之晨也既陷不義實恐投兵之日不免孥戮綱約之以天地誓之以日月嬰深感悟乃辭還營明日將所部萬餘人與妻子面縛歸降綱乃單車入嬰壘大㑹置酒為樂散遣其部衆任從所之親為卜居宅相田疇子弟欲為吏者皆引召之人情悅服南州晏然朝廷論功當封梁冀遏絶乃止天子嘉羙擬欲擢用綱而嬰等上書乞留乃許之綱在郡一年年三十六卒百姓老幼相擕詣府赴哀者不可勝數綱自被疾吏人咸為祠祀祈福皆言千秋萬嵗何時復見此君張嬰等五百餘人制服行䘮送到犍為負土成墳詔書痛悼拜其子續為郎中賜錢百萬王龔字伯宗山陽高平人也世為豪族初舉孝亷稍遷青州刺史劾奏貪濁二千石數人安帝嘉之徵拜尚書建光元年擢為司𨽻校尉明年遷汝南太守政崇温和好才愛士引進郡人黄憲陳蕃等憲雖不屈蕃遂就吏蕃性氣高初到龔不即召見之乃留記謝病去龔怒使除其錄功曹袁閬請見言曰聞之傳曰人臣不見察於君不敢立於朝蕃既以賢見引不宜退以非禮龔改容謝曰是吾過也乃復厚遇待之由是後進知名之士莫不歸心焉閬字奉高數辭公府之命不修異操而致名當時永建二年徵龔為太僕轉太常四年遷司空以地震䇿免永和元年拜太尉在位恭愼自非公事不通州郡書記其所辟命皆海内長者龔深疾宦官專權志在匡正乃上書極言其狀請加放斥諸黄門恐懼各使賔客誣奏龔罪順帝命亟自實前掾李固時為大將軍梁商從事中郎乃奏記於商求為龔表救商感其義即言之於帝事乃得釋龔在位五年以老病乞骸骨卒於家子暢字叔茂少以清實為稱無所交黨初舉孝廉辭病不就大將軍梁商特辟舉茂才四遷尚書令出為齊相徵拜司𨽻校尉轉漁陽太守所在嚴明為稱坐事免官是時政事多歸尚書桓帝特詔三公令高選庸能太尉陳蕃薦暢清方公正有不可犯之色由是復為尚書尋拜南陽太守前後二千石逼懼帝鄉貴戚多不稱職暢深疾之下車奮厲威猛其豪黨有釁穢者莫不糾發㑹赦事得散暢追恨之更為設法諸受贓二千萬以上不自首實者盡入財物若其隱伏使吏發屋伐樹堙井夷竈豪右大震功曹張敞奏記諫暢以為五教在寛著在經典化人在徳不在用刑暢深納敞諫更崇寛政愼刑簡罰教化遂行郡中豪族多以奢靡相尚暢常布衣皮褥車馬羸敗以矯其敝同郡劉表時年十七從暢受學諫曰夫奢不僭上儉不逼下循道行禮貴處可否之間蘧伯玉恥獨為君子府君不希孔聖之明訓而慕夷齊之末操無乃皎然自貴於世乎暢曰昔公儀休在魯拔園葵去織婦孫叔敖相楚其子被裘刈薪夫以約失之鮮矣聞伯夷之風者貪夫亷懦夫有立志雖以不徳敢慕遺烈後徵為長樂衞尉建寧元年遷司空數月以水災䇿免明年卒於家子謙為大將軍何進長史謙子粲以文才知名种暠字景伯河南洛陽人仲山甫之後也父為定陶令有財三千萬父卒暠悉以賑䘏宗族及邑里之貧者其有進趣名利皆不與交通始為縣門下吏河南尹田歆外甥王諶名知人歆謂之曰今當舉六孝亷多貴戚書命不宜相違欲自用一名士以報國家爾助我求之明日諶送客於大陽郭遥見暠異之還白歆曰為尹得孝廉矣近洛陽門下吏也歆笑曰當得山澤隱滯迺洛陽吏邪諶曰山澤不必有異士異士不必在山澤歆即召暠於庭辯詰職事暠辭對有序歆甚知之召署主簿遂舉孝廉辟太尉府舉高第順帝末為侍御史時所遣八使光祿大夫杜喬周舉等多所糾奏而大將軍梁冀及諸宦官互為請救事皆被寢遏暠自以職主刺舉志案姦違乃復劾諸為八使所舉蜀郡太守劉宣等罪惡章露宜伏歐刀又奏請勅四府條舉近臣父兄及知親為刺史二千石尤殘穢不勝任者免遣案罪帝乃從之擢暠監太子於承光宫中常侍高梵從中單駕出迎太子時太傅杜喬等疑不欲從惶惑不知所為暠乃手劒當車曰太子國之儲副人命所繫今常侍來無詔信何以知非姦邪今日有死而已梵辭屈不敢對馳命奏之詔報太子乃得去喬退而歎息愧暠臨事不惑帝亦嘉其持重稱善者良久出為益州刺史暠素慷慨好立功立事在職三年宣恩逺夷開曉殊俗岷山雜落皆懐服漢徳其白狼槃木唐菆卭僰諸國自前刺史朱輔卒後遂絶暠至乃復舉種向化時永昌太守冶鑄黄金為文蛇以獻梁冀暠糾發逮捕馳傳上言而二府畏懦不敢案之冀由是衘怒於暠㑹巴郡人服直聚黨百餘人自稱天王暠與太守應承討捕不克吏人多被傷害冀因此䧟之傳逮暠承太尉李固上疏救曰臣伏聞討捕所傷本非暠承之意實由縣吏懼法畏罪迫逐深苦致此不詳比盜賊羣起處處未絶暠承以首舉大姦而相隨受罪臣恐沮傷州縣糾發之意更共飾匿莫復盡心梁太后省奏乃赦暠承罪免官而已後梁州羌動以暠為梁州刺史甚得百姓歡心被徵當遷吏人詣闕請留之太后歎曰未聞刺史得人心若是乃許之暠復留一年遷漢陽太守戎夷男女送至漢陽界暠與相揖謝千里不得乘車及到郡化行羌胡禁止侵掠遷使匈奴中郎將時遼東烏桓反叛復轉遼東太守烏桓望風率服迎拜於界上坐事免歸後司𨽻校尉舉暠賢良方正不應徵拜議郎遷南郡太守入為尚書㑹匈奴㓂幷涼二州桓帝擢暠為度遼將軍暠到營所先宣恩信誘降諸胡其有不服然後加討羌虜先時有生見獲質於郡縣者悉遣還之誠心懐撫信賞分明由是羌胡龜兹莎車烏孫等皆來順服暠乃去􅇏燧除候望邊方晏然無警入為大司農延熹四年遷司徒推達名臣橋元皇甫規等為稱職相在位三年年六十一薨幷涼邊人咸為發哀匈奴聞暠卒舉國傷惜單于每入朝賀望見墳墓輙哭泣祭祀二子岱拂岱字公祖好學飬志舉孝廉茂才辟公府皆不就公車特徵病卒初岱與李固子爕同徵議郎爕聞岱卒痛惜甚乃上書為岱求加贈典朝廷竟不能從拂字頴伯初為司𨽻從事拜宛令時南陽郡吏好因休沐游戲市里為百姓所患拂出逢之必下車公謁以愧其心自是莫敢出者政有能名累遷光祿大夫初平元年代荀爽為司空明年以地震䇿免復為太常李傕郭氾之亂長安城潰百官多避兵衝拂揮劒而出曰為國大臣不能止戈除暴致使凶賊兵刃向宫去欲何之遂戰而死子劭劭字申甫少知名中平末為諫議大夫大將軍何進將誅宦官召幷州牧董卓至澠池而進意更狐疑遣劭宣詔止之卓不受遂前至河南劭迎勞之因譬令還軍卓疑有變使其軍士以兵脅劭劭怒稱詔大呼叱之軍士皆披遂前質責卓卓辭屈乃還軍夕陽亭及進敗獻帝即位拜劭為侍中卓既擅權而惡劭彊力遂左轉議郎出為益凉二州刺史會父拂戰死竟不之職服終徵為少府大鴻臚皆辭不受曰昔我先父以身狥國吾為臣子不能除殘復怨何面目朝覲明主哉遂與馬騰韓遂左中郎劉範諫議大夫馬宇共攻李傕郭氾以報其仇與氾戰於長平觀下軍敗劭等皆死騰遂還凉州陳球字伯眞下邳淮浦人也歴世著名父亹廣漢太守球少渉儒學善律令陽嘉中舉孝廉稍遷繁陽令時魏郡太守諷縣求納貨賄球不與之太守怒而撾督郵欲令逐球督郵不肯曰魏郡十五城獨繁陽有異政今受命逐之將致議於天下矣太守乃止復辟公府舉高第拜侍御史是時桂陽黠賊李硏等羣聚冦鈔陸梁荆部州郡懦弱不能禁太尉楊秉表球為零陵太守球到設方略朞月間賊虜消散而州兵朱蓋等反與桂陽賊胡蘭數萬人轉攻零陵零陵下溼編木為城不可守備郡中惶恐掾史白遣家避難球怒曰太守分國虎符受任一邦豈顧妻孥而沮國威重乎復言者斬乃悉内吏人老弱與共城守弦大木為弓羽矛為矢引機發之逺射千餘歩多所殺傷賊復激流灌城球輙於内因地勢反決水淹賊相拒十餘日不能下㑹中郎將度尚將救兵至球募士卒與尚共破斬朱蓋等賜錢五十萬拜子一人為郎遷魏郡太守徵拜將作大匠作桓帝陵園所省巨萬以上遷南陽太守以糾舉豪右為勢家所謗徵詣廷尉抵罪㑹赦歸家復拜廷尉熹平元年竇太后本遷南宫雲臺宦者積怨竇氏遂以衣車載后尸置城南市數日中常侍曹節王甫欲用貴人禮殯帝曰太后親立朕躬統承大業詩云無徳不報無言不酬豈宜以貴人終乎於是發喪成禮及將葬節等復欲别葬太后而以馮貴人配祔詔公卿大㑹朝堂令中常侍趙忠監議太尉李咸時病乃扶輿而起𢷬椒自隨謂妻子曰若皇太后不得配食桓帝吾不生還矣既議坐者數百人各瞻望中宫良久莫肯先言趙忠曰議當時定怪公卿以下各相顧望球曰皇太后以盛徳良家母臨天下宜配先帝是無所疑忠笑而言曰陳廷尉宜便操筆球即下議曰皇太后自在椒房有聰明母儀之徳遭時不造援立聖明承繼宗廟功烈至重先帝晏駕因遇大獄遷居空宫不幸早世家雖獲罪事非太后今若别葬誠失天下之望且馮貴人冢墓被發骸骨暴露與賊併尸魂靈汙染且無功於國何宜上配至尊忠省球議作色俛仰蚩球曰陳廷尉建此議甚健球曰陳竇既寃皇太后無故幽閉臣常痛心天下憤歎今日言之退而受罪宿昔之願公卿以下皆從球議李咸始不敢先發見球辭正然後大言曰臣本謂宜爾誠與臣意合㑹者皆為之愧曹節王甫復爭以為梁后家犯惡逆别葬懿陵武帝黜廢衞后而以李夫人配食今竇氏罪深豈得合葬先帝乎李咸乃詣闕上疏曰臣伏惟章徳竇后虐害恭懐安思閻后家犯惡逆而和帝無異葬之議順帝無貶降之文至於衞后孝武皇帝身所廢棄不可以為比今長樂太后尊號在身親嘗稱制坤育天下且援立聖明光隆皇祚太后以陛下為子陛下豈得不以太后為母子無黜母臣無貶君宜合葬宣陵一如舊制帝省奏謂曹節等曰竇氏雖為不道而太后有徳於朕不宜降黜節等無復言於是議者乃定咸字元貞汝南人累經州郡以廉幹知名在朝清忠權倖憚之六年遷球司空以地震免拜光祿大夫復為廷尉太常光和二年遷太尉數月以日食免復拜光祿大夫明年為永樂少府乃潛與司徒河間劉郃謀誅宦官初郃兄侍中儵與大將軍竇氏同謀俱死故郃與球相結事未及發球復以書勸郃曰公出自宗室位登台鼎天下瞻望社稷鎭衞豈得雷同容容無違而已今曹節等放縱為害而久在左右又公兄侍中受害節等永樂太后所親知也今可表徙衞尉陽球為司𨽻校尉以次收節等誅之政出聖主天下太平可翹足而待也又尚書劉納以正直忤宦官出為歩兵校尉亦深勸於郃郃曰凶豎多耳目恐事未㑹先受其禍納曰公為國棟梁傾危不持焉用彼相邪郃許諾亦結謀陽球球小妻程璜之女璜用事宫中所謂程大人也節等頗得聞知乃重賂於璜且脅之璜懼迫以球謀告節節因共白帝曰郃等常與藩國交通有惡意數稱永樂聲勢受取狼籍歩兵校尉劉納及永樂少府陳球衞尉陽球交通書疏謀議不軌帝大怒䇿免郃郃與球及劉納陽球皆下獄死球時年六十二子瑀吳郡太守弟琮汝隂太守弟子珪沛相珪子登廣陵太守並知名通志卷一百十
