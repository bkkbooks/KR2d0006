  text: 通志卷六十五宋右廸功郎鄭樵漁仲撰藝文略第三史類第五正史事編年官霸史法雜史記起居注故職刑傳地理譜系食貨目錄正史史記陳漢後後漢北三國後晉梁魏齊周宋隋齊唐通史史記一百三十卷目録一卷漢太史公司馬遷撰史記八十卷宋南中郎外兵參軍裴駰注史記一百三十卷許子儒注史記一百三十卷王元感注史記一百三十卷陳伯宣注今存八十七卷史記一百三十卷徐堅注史記一百三十卷李鎮注續史記一百三十卷唐韓琬撰史記音義十二卷宋中散大夫徐廣史記音三卷梁輕車録事參軍鄒誕注史記音三卷許子儒注史記鈔十四卷葛洪撰史記義林二十卷李鎮史記索隐三十卷司馬貞史記纂訓二十卷裴安時史記地名二十卷劉伯荘史記正義三十卷唐張守節史記名臣疏三十四卷竇羣史要十卷衛颯撰約史記要言以類相從史記正傳九卷張瑩右史記二十部一千一百九十五卷漢書一百五十卷漢䕶軍班固撰泰山太守應劭集解御銓定漢書八十七卷漢書一百二十卷顔師古注漢書集解音義二十四卷應劭撰漢書音訓一卷服䖍漢書音義七卷韋昭漢書音二卷梁尋陽太守劉顯漢書音二卷夏侯泳漢書音義十二卷國子博士蕭該漢書音十二卷廢太子勇命包愷等漢書音義九卷孟康漢書音一卷諸葛亮漢書音義十七卷晉灼漢書音義二卷崔浩孔氏漢書音義鈔二卷孔文祥漢書音義二十六卷劉嗣等漢書音十二卷蕭該漢書律歴志音義一卷隂景倫撰漢書音義十二卷㳟播撰漢書集注十三卷晉灼撰漢書注一卷齊金紫光祿大夫陸澄撰漢書注四十卷㳟播撰漢書續訓三卷梁北平諮議參軍韋稜撰漢書訓纂三十卷陳吏部尚書姚察撰漢書集解一卷姚察撰漢書議苑元懐景撰漢書紹訓四十卷姚挺撰論前漢事一卷諸葛亮撰漢書駁議二卷晉安北將軍劉寳撰定漢書疑二卷姚察撰漢書決疑十二卷顔游秦撰漢書辨惑三十卷李喜撰漢書問答五卷沈遵撰漢書叙傳五卷項岱撰漢疏四卷漢書舊隐義一卷舉三使者禮部問科目百餘條漢書正義三十卷唐僧務靜撰漢書正名氏義十二卷漢書英華八卷漢書古今集義二十卷顧允前漢考異一卷漢書鈔三十卷葛洪撰漢尚書一十卷孔衍撰右漢書四十三部八百二卷東觀漢記一百四十三卷起光武記注至靈帝長水校尉劉珍等撰後漢書一百三十卷無帝紀吳武陵太守謝承撰後漢記一百卷晉散騎常侍薛瑩撰續漢書八十三卷晉祕書監司馬彪撰後漢書九十七卷隋得十七卷唐得三十一卷晉少卿華嶠撰後漢南記五十八卷晉江州從事張瑩撰後漢書一百一卷晉祕書監袁山松撰後漢書九十七卷宋太子詹事范曄撰後漢書五十八卷梁剡令劉昭補注後漢書一百二十二卷范曄本劉熙撰後漢書一百卷章懐太子賢注後漢書音義二十七卷韋機撰後漢書音一卷後魏太常劉芳撰後漢音訓三卷陳宗道先生臧兢撰後漢外傳十卷謝沈撰後漢音三卷蕭該撰後漢書纘十八卷范􅁮撰後漢書鈔三十卷葛洪撰後漢書論贊五卷范􅁮撰後漢尚書六卷孔衍撰前後漢著明論二十卷三史刋誤四十五卷宋朝余靖等撰三史要略三十卷張溫撰三史菁英三十卷右後漢二十四部一千三百一十六卷魏書四十八卷晉司空王沈撰魏尚書八卷孔衍撰吳書五十五卷韋昭撰吳書實録三卷魏國志三十卷晉太子庶子陳壽撰蜀國志十五卷陳壽撰刪補蜀記七卷王隐撰吳國志二十一卷陳壽撰魏志音義一卷盧宗道撰吳志抄一卷論三國志九卷何常侍撰三國志評三卷徐爰撰三國志序評三卷晉王濤撰右三國志十三部二百四卷晉書九十三卷晉著作郎王隐撰晉書五十八卷晉散騎常侍虞預撰晉書十四卷未成晉中書郎朱鳳撰訖元帝晉書三十六卷宋臨川内史謝靈運撰晉中興書七十八卷宋湘東太守何法盛撰起東晉晉書一百十卷齊徐州主簿臧榮緒撰晉書九卷本百二卷殘缺蕭子雲撰晉書二十二卷殘缺干寳撰晉史草三十卷梁蕭子顯撰晉書一百三十卷唐太宗命羣臣撰晉書一百一十卷徐堅撰注晉書百三十卷高希嶠注晉書鴻烈六卷張氏撰晉書音義三卷唐處士何超撰晉書鈔三十卷張緬撰晉諸公讚二十二卷傅暢撰右晉書十六部八百八十一卷宋書六十五卷宋中散大夫徐爰撰宋書六十五卷齊孫嚴撰宋書一百卷梁尚書僕射沈約撰宋書三十卷梁王智深撰舊六十一卷殘缺右宋書四部二百六十卷齊書六十卷梁吏部尚書蕭子顯撰齊紀十三卷劉陟撰齊紀二十卷沈約撰齊史十卷吳兢撰右齊書四部一百三卷梁書四十九卷梁中書郎林吳撰梁史五十三卷陳領軍大著作郎許亨撰梁書帝紀七卷姚察撰梁書五十六卷姚思㢘撰梁史十卷吳兢撰右梁書五部一百七十五卷陳書三卷顧野王撰陳書三卷傅縡撰陳書四十二卷訖宣帝陳吏部尚書陸瓊撰陳書三十六卷唐姚思㢘撰陳史五卷吳兢撰右陳書五部八十九卷後魏書一百三十卷後齊僕射魏收撰後魏書一百卷隋著作郎魏彦深撰後魏書一百卷張太素撰今惟存有天文志二卷元魏書三十卷裴安時撰右魏書四部三百六十卷北齊書二十四卷脩未成書李徳林撰北齊書二十卷張太素撰北齊書五十卷李百藥撰右北齊書三部九十四卷後周書五十卷令狐徳棻撰周史十卷吳兢等撰右後周書二部六十卷隋書三十二卷張太素撰隋書八十五卷隋志三十卷唐貞觀中詔諸臣分修五代史顔師古孔頴達撰次隋事起文帝作三紀五十列傳惟十志未奏又詔于志寧李淳風韋安化李延壽令狐徳棻共加裒綴高宗時上之志寧乃上包梁陳齊周屬之隋事析為三十篇號五代志與書合八十五篇臣按隋志極有倫類而本末兼明惟晉志可以無憾遷固以來皆不及也正為班馬只事虚言不求典故實迹所以三代紀綱至遷八書固十志㡬於絶緒雖其文彩灑然可喜求其實用則無有也觀隋志所以該五代南北兩朝紛然殽亂豈易貫穿而讀其書則了然如在目良由當時區處各當其才顔孔通古今而不明天文地理之序故只令修紀傳而以十志付之志寧淳風輩所以粲然具舉隋史二十卷吳兢等撰隋書六十卷未成祕書監王劭撰右隋書五部二百二十七卷唐書一百卷吳兢撰唐書一百三十卷韋述等撰國史一百六卷國史一百十三卷舊唐書二百卷劉昫張昭達等撰唐書直筆新例一卷吕夏卿撰唐書釋音二十五卷董氏撰新唐書二百二十五卷歐陽修宋祁等撰新唐書紏繆二十卷吳縝撰史系二十卷自會昌至光啓時事有禮樂刑法食貨五行地理志孝行忠節儒林隐逸傳右唐書十部九百四十卷通史六百二卷梁武帝撰起三皇訖梁古史考二十五卷晉義陽亭侯譙周撰南史八十卷李延壽撰北史一百卷李延壽撰高氏小史一百二十卷高峻撰劉氏洞史二十卷劉權乃晏曾孫史雋十卷唐鄭暐撰紀南北朝事統史三百卷姚康復撰令史二十卷蕭肅撰古史六十卷宋朝蘇轍撰五代史一百五十卷宋朝薛居正等撰五代史記七十五卷歐陽脩撰五代史纂誤五卷吳縝撰五代志三十卷十三代史選五十卷叙史記前後漢三國志晉宋齊梁陳後魏北齊後周隋十三家史正史削繁十四卷阮孝緒撰史要二十八卷王延秀撰續史雋二十卷張伯玉撰史通二十卷唐劉知㡬撰史通析微十卷唐李璨撰正史雜論十卷偽蜀陽九齡撰史列三卷唐劉餗撰右通史二十二部一千七百五十二卷凡正史九種一百八十二部八千四百六十卷編年古魏史梁陳兩漢後魏魏齊吳隋晉唐宋五齊北代運歴紀錄紀年十四卷汲冢書并竹書同異一卷隋志作十二卷右古魏史一部十四卷漢紀三十卷漢獻帝以班史文繁難省故令祕書監荀悅約二百四十三年之行事起高祖迨王莽准左傳為漢紀三十篇辭約而事詳本末先後不失條理當世偉之學者循習班馬之日久故此書不行自唐以前猶不能忘焉今或㡬乎泯矣漢紀三十卷應劭等撰漢紀音義三卷崔浩撰漢表十卷袁希之撰漢皇徳紀三十卷侯瑾撰後漢紀三十卷袁宏撰後漢紀三十卷張璠撰後漢略二十五卷張緬撰後漢靈獻二帝紀六卷劉文撰漢獻帝春秋十卷袁􅁮撰山陽公載紀十卷樂資撰漢春秋十卷孔衍撰漢春秋一百卷宋朝胡旦撰漢春秋問答一卷胡旦與門人郄羽問答後漢春秋六卷孔衍撰右兩漢十五部三百三十一卷漢魏春秋九卷孔舒元撰魏氏春秋二十卷孫盛撰魏陽秋異同八卷孫壽撰魏武本紀年歴五卷魏紀十二卷左將軍魏澹撰魏略五十卷魚豢撰吳紀十卷晉太學博士環濟撰吳歴六卷胡冲撰吳録三十卷張勃撰吳書實録三卷右魏吳十部一百五十三卷漢晉陽秋五十四卷訖愍帝晉滎陽太守習鑿齒撰晉紀四卷陸機撰晉紀二十三卷干寳撰訖愍帝晉紀十卷晉前軍諮議曹嘉之撰晉紀十一卷晉荆州别駕王粲撰訖明帝晉陽秋三十二卷訖哀帝孫盛撰晉紀二十五卷宋中散大夫劉謙之撰晉紀十卷宋吳興太守王韶之撰晉紀四十五卷宋中散大夫徐廣撰續晉紀五卷宋新興太守郭季産撰續晉陽秋二十卷宋永嘉太守檀道鸞撰晉録五卷晉史草三十卷蕭景暢撰隋志作蕭子顯晉春秋略二十卷唐杜延業撰晉後略五卷荀綽撰晉歴二卷漢魏晉帝要紀三卷賈匪之撰右晉十七部三百四卷建康實録二十卷唐許嵩撰記江左六朝事作編年體宋略二十卷梁通直郎裴子野撰宋春秋二十卷梁吳興令王琰撰宋春秋二十卷鮑衡卿撰宋紀三十卷王智深撰右宋六朝附五部一百十卷齊春秋三十卷梁奉朝請吳均撰齊典五卷王逸撰右齊二部三十五卷梁典三十卷劉璠撰梁典三十卷陳始興王諮議何之元撰梁撮要三十卷陳征南諮議隂僧仁撰梁後略十卷姚最撰梁太淸紀十卷梁長沙藩王蕭韶撰梁典三十九卷謝昊撰梁末代紀一卷皇帝紀七卷栖鳳春秋五卷臧嚴撰梁帝紀七卷梁承聖中興略十卷劉仲威撰後梁春秋十卷蔡允㳟撰右梁十二部一百八十九卷陳王業歴二卷陳中書郎趙齊旦撰右陳一部二卷後魏紀三十三卷盧彦卿撰魏國紀十卷梁祚撰魏典三十卷唐元行冲撰三國典略二十卷唐邱悅撰以闗中鄴都江南為三國記南北朝事右後魏四部九十三卷北齊紀三十卷崔子發撰北齊志十卷王劭撰周史十八卷未成隋牛𢎞撰右北齊周附三部五十八卷隋後略十卷張太素撰隋記二十卷吕才撰隋記十卷邱啓期撰右隋三部四十卷唐歴四十卷唐栁芳撰起隋義寧元年訖建中三年續唐歴二十二卷韋澳等撰唐歴目録一卷唐崔令欽撰據栁芳歴鈔其事目唐春秋三十卷吳兢撰唐春秋二十卷韋述撰唐春秋六十卷陸長源撰唐統紀一百卷陳嶽撰唐朝年代記十卷唐焦潞撰唐紀四十卷宋朝陳彭年撰唐年歴一卷唐劉軻撰唐年補録六十五卷晉賈緯撰唐歴帝紀一卷唐餘録六十卷王皥撰唐年統略十一卷郭傪撰續唐録一百卷宋敏求撰唐典七十卷王彦威撰唐録政要十二卷凌璠撰自獻祖訖僖宗唐鑑十二卷范祖禹撰唐鑑五卷石介撰右唐十九部六百六十卷五代通録六十五卷宋朝范質撰起梁開平元年盡周顯徳六年開皇紀三十卷鄭向撰五代春秋二卷尹洙撰周㳟帝日歴三卷扈䝉撰右五代四部一百卷王氏五位圖十卷唐王起撰廣五運圖五運録十二卷唐曹珪撰正閏位歴三卷唐栁璨撰歴代帝王正閏五運圖一卷五運歴一卷運歴圖六卷宋朝龔穎撰至雍熙五運紀年志一卷五運甲子編年歴三卷劉䝉叟撰三五歴紀二卷徐整撰渾天帝王五運歴年紀一卷通歴二卷徐整撰雜歴五卷長歴十四卷千年