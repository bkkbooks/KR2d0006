body:
  text: 通志卷一百六十七宋右廸功郎鄭樵漁仲撰孝友傳第一晉史始立孝友傳宋齊周隋曰孝義梁陳曰孝行後魏曰孝感今總曰孝友東漢雖不標名然毛義一卷而其事已具其中故取之以冠此篇之首又自宋以下離其義行者為一宗以附各代孝友之後庶有别云後漢孝友毛義薛包劉平王望王扶趙孝王琳兒萌魏譚車成淳于恭江革劉般子愷茂愷子周磐蔡順趙咨晉孝友李密盛彦夏方王裒許孜子生庾衮孫晷顔含劉殷王延王談桑虞何𤦺吳逵宋孝友劉瑜董陽賈恩郭世道子原平潘綜陳遺秦綿張楚邱傑師覺授王彭蒋恭孫法宗許昭先余齊人孫棘徐元妻許錢延慶何子平崔懐順宋義行嚴世期吳慶之徐耕嚴成盖王道范叔孫吳國夫齊孝友王虚之顧昌衍江江柔之軻蕭叡明鮮于文宗英文宗姊文蕭矯妻羊羊緝女佩任丁吳康之妻趙氏王蔣儁之妻黄氏吳翼母氏丁長子婦氏陳氏三女妻王氏女范屠氏女褚乗公濟姚氏法恂妻氏公孫僧逺吳欣之童超之孫淡華寳薛天生弟劉懷允懷允懷則解叔謙宗元卿昕庾震祚朱文濟㝢匡魯康謝昌韓靈敏劉渢弟溓夜栁叔吳達之蔡曇智何伯璵王文殊樂頤弟預之沈昇江泌杜栖剡縣小兒庾道愍齊義行韓係伯聞人夐封延伯陳元子徐生之邵榮興范安祖文獻叔李聖伯陽范道根王譚𢎞寳郝何𢎞黑頭續祖道福梁孝友滕曇恭徐普濟張悌庾黔婁劉霽劉曇浄何炯陶季直沈崇傃荀匠吉翂甄恬趙㧞扈韓懐明褚脩張景仁宛陵女子劉王整之姊景昕陶子鏘成景儁李慶緒謝藺庾沙彌江紑陳孝友殷不害弟不佞謝貞司馬暠子延義張昭弟乾元王知後魏孝友趙琰長孫慮乞伏保孫益徳董洛生楊引閻元明令狐仕吐皇甫奴董渾吳悉達崔承宗王續生李顯達倉䟦張昇王崇郭文恭後魏義行石文徳趙令安孟蘭彊馬八龍門文愛石祖興邵洪哲李几王閭北齊孝友北齊不立此傳今取陸卭附此陸卭周孝友杜叔毗荆可秦族弟榮先皇甫遐張元隋孝友田徳懋薛濬王頒田翼楊慶紐因子士雄劉仕儁翟普林李徳饒華秋徐孝肅隋義行郎方貴郭世儁後漢毛義字少節廬江人也家貧以孝行稱南陽人張奉慕其名往候之坐定而府檄適至以義守令義奉檄而入喜動顔色奉者志尚士也心賤之自恨來固辭而去及義母死去官行服後數辟公府為縣令進退必以禮舉賢良公車徴遂不至張奉歎曰賢者固不可測往日之喜乃為親屈也斯盖所謂家貧親老不擇官而仕者也建初中章帝下詔襃寵義賜榖千斛常以八月長吏問起居加賜羊酒夀終于家薛包字孟嘗汝南人也好學篤行喪母以至孝聞及父娶後妻而憎包分出之包日夜號泣不能去至被毆杖不得已廬於舎外旦而入灑埽父怒又逐之乃廬於里門昏晨不廢積嵗餘父母慙而還之後行六年服喪過乎哀既而弟子求分財異居包不能止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓者曰吾少時所理意所戀也器物取朽敗者曰我素所服食身口所安也弟子數破其産輙復賑給建光中公車特徴至拜侍中包性恬虚稱疾不起以死自乞有詔賜吿歸加禮如毛義年八十餘以夀終劉平字公子楚郡彭城人也本名曠顯宗時改為平王莽時為郡吏守菑邱長政教大行其後每屬縣有劇賊輙令平守之所至皆理由是一郡稱其能更始時天下亂平弟仲為賊所殺其後賊復忽然而至平扶侍其母奔走逃難仲遺腹女始一嵗平抱仲女而棄其子母欲還取之平不聽曰力不能兩活仲不可以絶類遂去不顧與母俱匿野澤中平朝出求食逢餓賊將烹之平叩頭曰今旦為老母求菜老母待曠為命願得先歸食母畢還就死因涕泣賊見其至誠哀而遣之平還既食母訖因白母曰屬與賊期義不可欺遂還詣賊衆皆大驚相謂曰嘗聞烈士乃今見之子去矣吾不忍食子於是得全建武初平狄將軍龎萌反於彭城攻敗郡守孫萌平時復為郡吏冒白刃伏萌身上被十創困頓不知所為號泣請曰願以身代府君賊乃斂兵止曰此義士也勿殺遂解去萌傷甚氣絶有頃蘇渇求飲平傾其創血以飲之後數日萌竟死平乃裹創扶送萌喪至其本縣後舉孝亷拜濟隂郡丞太守劉育甚重之任以郡職上書薦平㑹平遭父喪去官服闋拜全椒長政有恩恵百姓懐感人或增貲就賦或減年從役刺史太守行部獄無繫囚人自以得所不知所問唯班詔書而去後以病免顯宗初尚書僕射鍾離意上書薦平及瑯琊王望東萊王扶皆脩身行義應在朝次有詔徴平等特賜辦装錢至皆拜議郎並數引見平再遷侍中永平三年拜宗正數薦達名士承宫郇恁等在位八年以老病上疏乞骸骨卒於家王望字慈卿客授㑹稽自議郎遷青州刺史甚有威名是時州郡災旱百姓窮荒望行部道見饑者裸行草食五百餘人愍然哀之因以便宜出所在布粟給其廩糧為作褐衣事畢上言帝以望不先表請章示百官詳議其罪時公卿皆以為望之專命法有常條鍾離意獨曰昔華元子反楚宋之良臣不禀君命擅平二國春秋之義以為美談今望懐義忘罪當仁不讓若繩之以法忽其本情將乖聖朝愛育之㫖矣帝嘉意議赦而不罪王扶字子元掖人也少脩節行客居琅邪不其縣所止聚落化其徳國相張宗謁請不應欲彊致之遂杖䇿歸鄉里連請固病不起太傅鄧禹辟不至後拜議郎㑹見恂恂似不能言然性忱正不可干以非義當世髙之永平中臨邑侯劉復著漢徳頌盛稱扶為名臣云趙孝字長平沛國蘄人也父普王莽時為田禾將軍任孝為郎每告歸常白衣歩擔從長安還欲止郵亭亭長先時聞孝當過以有長者客掃洒待之孝既至不自名亭長不肯納因問曰聞田禾將軍子從長安來何時至乎孝曰尋到矣於是遂去及天下亂人相食孝弟禮為餓賊所得孝聞之即自縛詣賊曰禮久餓羸瘦不如孝肥飽賊大驚並放之謂曰可且歸更持米糒來孝求不能得復報賊願就烹衆異之遂不害鄉黨服其義州郡辟召進退必以禮舉孝亷不應永平中辟太尉府顯宗聞其行詔拜諫議大夫遷侍中又遷長樂衛尉復徴禮為御史中丞禮亦恭謙行已類於孝帝嘉其兄弟篤行欲寵異之詔禮十日一就衛尉府大官送供具令共相對盡歡數年禮卒帝令孝從官屬送喪歸葬後嵗餘復以衛尉賜告歸卒于家孝無子拜禮兩子為郎時汝南有王琳巨尉者年十餘嵗喪父因遭大亂百姓奔逃唯琳兄弟獨守冡廬號泣不絶弟季出遇赤眉將為所捕琳自縛請先季死賊矜而放遣由是顯名鄉邑後辟司徒府薦士而退琅琊魏譚少間者時亦為饑冦所獲等輩數十人皆束縳以次當烹賊見譚似謹厚獨令主爨暮輙就縛賊有夷長公特哀念譚密解其縳語曰汝曹皆應就食急從此去對曰譚為諸君爨恒得遺餘餘人皆茹草菜不如食我長公義之相曉赦遣並得俱免譚永平中為主家令又齊國兒萌子明梁郡車成子威二人兄弟並見執於赤眉將食之萌成叩頭乞以身代賊亦哀而兩釋焉淳于恭字孟孫北海淳于人也善説老子清静不慕榮名家有山田果樹人或侵盜輙助為收採又見偷刈禾者恭念其愧恥因伏草中盜去乃起里落化之王莽末嵗饑兵起恭兄崇将為賊所烹恭請代得俱免後崇卒恭養孤幼教誨學問有不如法輙反用杖自箠以感悟之兒慙而改過初遭賊冦百姓莫事農桑恭常獨力田耕鄉人止之曰時方淆亂死生未分何空自苦為恭曰縱我不得他人何傷墾耨不輟後州郡連召不應遂幽居養志潛於山澤舉動周旋必由禮度建武中郡舉孝亷司空辟皆不應客隠琅邪黔陬山遂數十年建初元年肅宗下詔美恭素行告郡賜帛二十疋遣詣公車除為議郎引見極日訪以政事遷侍中騎都尉禮待甚優其所薦名賢無不徴用進對陳政皆本道徳帝與之言未嘗不稱善五年病篤使者存問卒於官詔書襃歎賜榖千斛刻石表閭除子孝為太子舎人江革字次翁齊國臨淄人也少失父獨與母居遭天下亂盜賊並起革負母逃難備經阻險常採拾以為養數遇賊或刦欲将去革輙涕泣求哀言有老母辭氣愿欵有足感動人者賊以是不忍犯之或乃指避兵之方遂得俱全於難革轉客下邳窮貧裸跣行傭以供母便身之物莫不畢給建武末年與母歸鄉里每至嵗時縣當案比革以母老不欲摇動自在轅中輓車不用牛馬鄉里稱之曰江巨孝太守常備禮召革以母老不應及母終至性殆滅常寢伏冢廬服竟不忍除郡守遣丞掾釋服因請以為吏永平初舉孝亷為郎補楚太僕月餘自劾去楚王英馳遣官屬追之遂不肯還復使中傅贈送辭不受後數應三公命輙去建初初太尉牟融舉賢良方正再遷司空長史肅宗甚崇禮之遷五官中郎將每朝㑹帝常使虎賁扶侍及進拜恒目禮焉時有疾不㑹輙太官送醪膳恩寵有殊於是京師貴戚衛尉馬廖侍中竇憲慕其行各奉書致禮革無所報受帝聞而益善之後上書乞骸骨轉拜諫議大夫賜告歸因謝病稱篤元和中天子思革至行制詔齊相以縣見榖千斛賜巨孝常以八月長吏存問致羊酒以終厥身如有不幸祠以中牢由是巨孝之稱行於天下及卒詔復賜榖千斛劉般字伯興宣帝之元孫也宣帝封子囂於楚是為孝王孝王生思王衍衍生王紆紆生般自囂至般積累仁義世有名節而紆尤慈篤早失母同産弟原鄉侯平尚幼紆親自鞠養常與共卧起飲食及成人未嘗離左右平病卒紆哭泣嘔血數月亦歿初紆襲王封因值王莽篡位廢為庶人因家於彭城般數嵗而孤獨與母居王莽敗天下亂太夫人聞更始即位乃將般俱奔長安㑹更始敗復與般轉側兵革中西行上隴遂流離至武威般雖尚少而篤志脩行講誦不怠其母及諸舅以為身寄絶域死生未必不宜苦精神若此數以曉般猶不改其業建武八年隗囂敗河西始通般即将家屬東至洛陽脩經學於師門明年光武下詔封般為菑邱侯奉孝王祀使就國後以國屬楚王徙封杼秋侯十九年行幸沛詔問郡中諸侯行能太守薦言般束脩至行為諸侯師帝聞而嘉之乃賜般緡錢百萬繒二百疋二十年復與車駕㑹沛因從還洛陽賜榖什物留為侍祠侯永平元年以國屬沛徙封居巢侯復随諸侯就國數年揚州刺史觀恂薦般在國口無擇言行無怨惡宜䝉旌顯顯宗嘉之十年徴般行執金吾事從至南陽還為朝侯明年兼屯騎校尉時五校官顯職閑而府寺寛敞輿服光麗伎巧畢給故多以宗室肺腑居之每行幸郡國般常將長水胡騎從帝曽欲置常平倉公卿議者多以為便般對以常平倉外有利民之名而内實侵刻百姓豪右因緣為姦小民不能得其平置之不便帝乃止先是時下令禁民二業又以郡國牛疫通使區種増耕而吏下檢括多失其實百姓患之般上言郡國以官禁二業至有田者不得漁捕今濵江湖郡率少􅁞桑民資漁採以助口實且以冬春閑月不妨農事夫漁獵之利為田除害有助榖食無闗二業也又郡國以牛疫水旱墾田多減故詔𠡠區種増進頃畝以為民也而吏舉度田欲令多前至於不種之處亦通為租可申𠡠刺史二千石務令實覈其有増加皆使與奪田同罪帝悉從之肅宗即位以為長樂少府建初二年遷宗正般妻卒厚加賻贈及賜冢塋地於顯節陵下般在位數言政事其收恤九族行義尤著時人稱之年六十建初三年卒子憲嗣憲卒子重嗣憲兄愷字伯豫以當襲般爵讓與弟憲遁逃避封久之章和中有司奏請絶愷國肅宗美其義特優假之愷猶不出積十餘嵗至永元十年有司復奏之侍中賈逵上書引前世扶陽侯韋元成及近代陵陽侯丁鴻鄳侯鄧彪事乞䝉矜宥全其先功以増聖朝尚徳之美和帝納之詔聽憲嗣爵乃徴愷拜為郎稍遷侍中愷之入朝在位者莫不仰其風行遷歩兵校尉十三年遷宗正免復拜侍中遷長水校尉永初元年代周章為太常愷性篤古貴處士每有徴舉必先巖穴論議𢎞正辭氣髙雅永初六年代張敏為司空元初三年代夏勤為司徒舊制公卿二千石刺史不得行三年喪由是内外衆職並廢喪禮元初中鄧太后詔長吏以下不為親行服者不得典城選舉時有上言牧守宜同此制詔下公卿議者以為不便愷獨議曰詔書所以為制服之科者盖崇化厲俗以𢎞孝道也今刺史一州之表二千石千里之師職在辯章百姓宣美風俗尤宜尊重典禮以身先之而議者不尋其端至於牧守則云不宜是猶濁其源而望流清曲其形而望景直不可得也太后從之時征西校尉任尚以姦利被徴抵罪尚曽副大將軍鄧騭騭黨䕶之而太尉馬英司空李郃承望騭㫖不復先請即獨解尚贓錮愷不肯與議後尚書案其事二府並受譴咎朝廷以此稱之視事五嵗永寧元年稱病上書致仕有詔優許焉加賜錢三十萬以千石祿歸養河南尹常以嵗八月致羊酒時安帝始親政事朝廷多稱愷之徳帝乃遣問起居厚加賞賜㑹馬英䇿罷尚書陳忠上疏薦愷沈重淵懿道徳博備宜復序上司以厭衆望詔引愷拜太尉安帝初清河相叔孫光坐贓抵罪遂増錮二世釁及其子是時居延都尉范邠復犯贓罪詔下三公廷尉議司徒楊震司空陳襃廷尉張皓議依光比愷獨以為春秋之義善善及子孫惡惡止其身所以進人於善也尚書曰上刑挾輕下刑挾重如今使贓吏禁錮子孫以輕從重懼及善人非先王詳刑之意也有詔太尉議是視事三年以疾乞骸骨久乃許之下河南禮秩如前嵗餘卒于家詔使者䕶喪事賜東園祕器錢五十萬布千疋少子茂字叔盛亦好禮讓歴位出納桓帝時為司空㑹司隸校尉李膺等抵罪而南陽太守成瑨太原太守劉瓆下獄當死茂與太尉陳蕃司徒劉矩上書訟之帝不悦有司承㫖劾奏三公茂遂坐免建寧中復為太中大夫卒於官周磐字堅伯汝南安城人徴士爕之宗也祖父業建武初為天水太守磐少逰京師學古文尚書洪範五行左氏傳好禮有行非典謨不言諸儒宗之居貧養母儉薄不充常誦詩至汝墳之卒章慨然而歎乃解韋帶就孝亷之舉和帝初拜謁者除任城長遷陽夏重合令頻歴三城皆有恵政後思母棄官還鄉里及母歿哀至㡬於毁滅服終遂廬於冢側教授門徒常千人公府三辟皆以有道特徴磐語友人曰昔方回支父嗇神養和不以榮利滑其生術吾親已歿矣從物何為遂不應建光元年年七十三嵗朝㑹集諸生講論因令其二子曰吾日者夣見先師東里先生與我講於隂堂之奥既而長歎豈吾齒之盡乎若命終之日桐棺足以周身外椁足以周棺斂形懸封濯衣幅巾編二尺四寸簡寫堯典一篇并刀筆各一以置棺前示不忘聖道其月望日無病忽終學者以為知命焉磐同郡蔡順字君仲亦以至孝稱少孤養母嘗出求薪有客卒至母望順不還乃噬其指順即心動棄薪馳歸跪問其故母曰有急客來吾噬指以悟汝耳母年九十以夀終未及得葬里中災火將逼其舎順抱伏棺柩號哭呌天火遂越燒他室順獨得免太守韓崇召為東閤祭酒母平生畏雷自亡後每有雷輙圍冢泣曰順在此崇聞之輙為差車馬到墓所後太守鮑衆舉孝亷順不能逺離墳墓遂不就年八十卒于家趙咨字文楚東郡燕人也父暢為博士咨少孤有孝行州郡召舉孝亷並不就延熹元年大司農陳豨舉咨至孝有道仍遷博士靈帝初太傅陳蕃大將軍竇武為宦者所誅咨乃謝病去太尉楊賜特辟使飾巾出入請與講論舉髙第累遷敦煌太守以病免還躬率子孫耕農為養盜嘗夜往刦之咨恐母驚懼乃先至門迎盜因請為設食謝曰老母八十疾病湏養居貧朝夕無儲乞少置衣糧妻子物餘一無所請盜皆慙歎跪而辭曰所犯無状干暴賢者言畢奔出咨追以物與之不及由此益知名徴拜議郎辭疾不到詔書切讓州郡以禮發遣前後再三不得已應召復拜東海相之官道經滎陽滎陽令敦煌曹暠咨之故孝亷也迎路候謁咨不為留暠送至亭次望塵不及謂主簿曰趙君名重今過界不見必為天下笑即棄邙綬追至東海謁咨畢辭歸家其為時人所貴如此咨在官清簡計日受奉豪黨畏其儉節視事三年以疾自乞徴拜議郎抗疾京師将終告其故吏朱秪蕭建等使薄殮素棺藉以黄壤欲令速朽早歸后土不聽子孫改之乃遺書𠡠其子允令制坎但足容棺椁棺歸即葬平地無墳勿卜時日葬無設奠勿留墓側無起封樹不必有改有乖吾志朱秖蕭建送喪到家允不忍父體與土并合欲更改殯秖建譬以顧命於是奉行時稱咨明達晉李密字令伯犍為武陽人也一名䖍父早亡母何氏改醮密時年數嵗感念彌至烝烝之性遂以成疾祖母劉氏躬自撫養密奉事以孝謹聞劉氏有疾則涕泣側息未嘗解衣飲膳湯藥必先嘗後進有暇則講學忘疲而師事譙周周門人方之游夏少仕蜀為郎數使吳有才辯吳人稱之蜀平泰始初詔徴為太子洗馬密以祖母年髙無人奉養遂不應命乃上疏曰臣以險釁夙遭閔凶生孩六月慈父見背行年四嵗舅奪母志祖母劉愍臣孤弱躬見撫養臣少多疾病九嵗不行零丁辛苦至于成立既無伯叔終鮮兄弟門衰祚薄晚有兒息外無期功彊近之親内無應門五尺之童㷀㷀孑立形影相弔而劉早嬰疾病常在牀蓐臣侍湯藥未嘗廢離自奉聖朝浴沐清化前太守臣逵察臣孝亷後刺史臣榮舉臣秀才臣以供養無主辭不赴命明詔特下拜臣郎中尋䝉國恩除臣洗馬猥以微賤當侍東宫非臣隕首所能上報臣具以表聞辭不就職詔書切峻責臣逋慢郡縣逼廹催臣上道州司臨門急於星火臣欲奉詔奔馳則劉病日篤茍徇私情則告訴不許臣之進退實為狼狽伏惟聖朝以孝治天下凡在故老猶䝉矜恤况臣孤苦尫羸之極且臣少仕偽朝歴職郎署本圖宦達不矜名節今臣亡國賤俘至微至陋猥䝉㧞擢寵命殊私豈敢盤桓有所希冀但以劉日薄西山氣息奄奄人命危淺朝不慮夕臣無祖母無以至今日祖母無臣無以終餘年母孫二人更相為命是以私情區區不敢棄逺臣密今年四十有四祖母劉今年九十有六是臣盡節於陛下之日長而報養劉之日短也烏鳥私情願乞終養臣之辛苦非但蜀之人士及二州牧伯之所明知皇天后土實所覽見伏願陛下矜愍愚誠聽臣微志庶劉僥倖保卒餘年臣生當隕身死當結草帝覽之曰士之有名不虛然哉乃停召後劉終服闋復以洗馬徴至洛陽司空張華問之曰安樂公何如密曰可次齊桓華問其故對曰齊桓得管仲而覇用豎刁而蟲流安樂公得諸葛亮而抗魏任黄皓而喪國是知成敗一也次問孔明言教何碎密曰昔舜禹臯陶相與語故得簡大雅誥與凡人言宜碎孔明與言者無已敵言教是以碎耳華善之出為温令而憎疾從事嘗與人書曰慶父不死魯難未已從事白其書司隸司隸以密在縣清愼弗之劾也密有才能常望内轉而朝廷無援乃遷漢中太守自以失分懐怨及賜餞東堂詔普令賦詩密詩末章曰人亦有言有因有緣官無中人不如歸田明明在上斯語豈然武帝忿之於是都官從事奏免密官後卒於家二子賜興賜字宗石少能屬文嘗為元鳥賦詞甚美州辟别駕舉秀才未行而終興字儁石亦有文才刺史羅尚辟别駕尚為李雄所攻使興詣鎭南將軍劉𢎞求救興因願留為𢎞參軍而不還尚白𢎞𢎞即奪其手版而遣之興之在𢎞府𢎞立諸葛孔明羊叔子碣使興俱為之文甚有辭理盛彦字翁子廣陵人也少有異才年八嵗詣吳太尉戴昌昌贈詩以觀之彦於坐答之辭甚慷慨母王氏因疾失明彦每言未嘗不流涕遂不應辟召躬自侍養母食必自哺之母既病久至於婢使數見捶撻婢忿恨伺彦暫行取蠐螬灸飴之母食以為美然疑是異物密藏以示彦彦見之抱母慟哭絶而復蘇母目豁然即開從此遂愈彦仕吳至中書侍郎吳平陸雲薦之於刺史周浚本邑大中正劉頌又舉彦為小中正太康中卒夏方字文正㑹稽永興人也家遭疫癘父母伯叔羣從死者十三人方年十四夜則號哭晝則負土十有七載葬送得畢因廬于墓側種植松栢烏鳥猛獸馴擾于旁吳時拜仁義都尉累遷五官中郎將朝㑹未嘗乗車行必讓路吳平除髙山令百姓有罪應加捶撻者方向之涕泣而不加罪大小莫敢犯焉在官三年州舉秀才還家卒年八十七王裒字偉元城陽營陵人也祖脩有名魏世父儀髙亮雅直為文帝司馬東關之役帝問於衆曰近日之事誰任其咎儀對曰責在元帥帝怒曰司馬欲委罪於孤邪遂引出斬之裒少立操尚行已以禮身長八尺四寸容貌絶異音聲清亮辭氣雅正博學多能痛父非命未嘗西向而坐示不臣朝廷也於是隠居教授三徴七辟皆不就廬於墓側旦夕常至墓所拜跪攀栢悲號涕淚著樹樹為之枯母性畏雷母沒每雷輙到墓側曰裒在此及讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇家貧躬耕計口而田度身而蠶或有助之者不聽諸生密為刈麥裒遂棄之知舊有致遺者皆不受門人為本縣所役告裒求屬令裒曰卿學不足以庇身吾徳薄不足以䕃卿屬之何益且吾不執筆已四十年矣乃歩擔乾飯兒負鹽豉草屩送所役生到縣門徒随從者千餘人安邱令以為詣已整衣出迎之裒乃下道至土牛旁磬折而立云門生為縣所役故來送别因執手涕泣而去令即放之一縣以為恥鄉人管彦少有才而未知名裒獨以為必當自達㧞而友之男女各始生便共許為婚彦後為西夷校尉卒而葬於洛陽裒後更嫁其女彦弟馥問裒裒曰吾薄志畢願山藪昔嫁姊妹皆逺吉凶斷絶每以此自誓今賢兄子葬父於洛陽此則京邑之人也豈吾結好之本意哉馥曰嫂齊人也當還臨淄裒曰安有葬父河南而随母還齊用意如此何婚之有北海邴春少立志操寒苦自居負笈游學鄉邑僉以為邴原復出裒以春性險狹慕名終必不成其後春果無行學業不終有識以此歸之裒常以為人之所行期於當歸善道何必以所能而責人所不能及洛京傾覆冦盜蜂起親族悉欲移渡江東裒戀墳壟不去賊大盛方行猶思慕不能進遂為賊所害許孜字季義東陽吳寧人也孝友恭讓敏而好學年二十師事豫章太守㑹稽孔沖受詩書禮易及孝經論語學竟還鄉里沖在郡喪亡孜聞問盡哀負擔奔赴送喪還㑹稽蔬食執役制服三年俄而二親沒柴毁骨立杖而能起建墓於縣之東山躬自負土不受鄉人之助或愍孜羸憊苦求來助孜晝則不逆夜便除之每一悲號鳥獸翔集孜以方營大功乃棄其妻鎭宿墓所列植松栢五六里時有鹿犯其松栽孜悲歎曰鹿獨不念我乎明日忽見鹿為猛獸所殺置於所犯栽下孜悵惋不已乃為作冢埋於隧側猛獸即於孜前自撲而死孜益歎息又取埋之自後樹木滋茂而無犯者積二十年孜乃更娶妻立宅墓次烝烝朝夕奉亡如存鷹雉栖其梁檐鹿與猛獸擾其庭圃交頸同逰不相搏噬元康中郡察孝亷不起巾褐終身年八十餘卒于家邑人號其居為孝順里咸康中太守張虞上疏言孜孝行世所希逮宜標其令跡甄其後嗣以酬既往以奨方來尋有詔旌表門閭蠲復子孫其子生亦有孝行圖孜像於堂朝夕拜焉庾衮字叔襃明穆皇后伯父也少履勤儉篤學好問事親以孝稱咸寧中大疫二兄俱亡次兄毗復殆癘氣方熾衮父母諸弟皆出次於外衮獨留不去諸父兄彊之乃曰袞性不畏病遂親自扶持晝夜不眠其間復撫柩哀臨不輟如此十有餘旬疫勢既歇家人乃反毗病得瘥袞亦無恙父老咸曰異哉此子守人所不能守行人所不能行嵗寒然後知松栢之後彫始疑疫癘之不相染也初衮諸父並貴盛惟父獨守貧約衮躬親稼穡以給供養而執事勤恪與弟子樹籬跪以授條或曰今在隠屏先生何恭之過衮曰幽顯易操非君子之志也父亡作筥賣以養母母見其勤曰我無所食對曰母食不甘衮將何居母感而安之衮前妻荀氏繼室樂氏皆官族富室及適衮棄華麗散資財與衮共安貧苦相敬如賔母終服喪居于墓側嵗大饑藜藿不糝門人欲進其飯者而衮每曰已食莫敢為設及麥熟穫者已畢而採捃尚多衮乃引其羣子以退曰待其閒及其捃也不曲行不旁掇跪而把之則亦大獲又與邑人入山拾橡分夷險序長幼推易居難禮無違者或有斬其墓栢莫知其誰乃召鄰人集之于墓而自責焉因叩頭泣涕謝祖禰曰徳之不脩不能庇先人之樹衮之罪也父老咸亦為之垂涕自後人莫之犯撫諸孤以慈奉諸寡以仁事加於厚而教之義方使長者體其行幼者忘其孤孤甥郭秀比諸子姪衣食而每先之孤兄女曰芳將嫁美服既具衮乃刈荆苕為箕箒召諸子集之于堂男女以班命芳曰芳乎汝少孤汝豫汝逸不汝疵瑕今汝適人將事舅姑灑埽庭内婦之道也故賜汝以此匪器之為美欲汝之温恭朝夕雖休勿休也而以舊宅與其長兄子賡翕及翕卒衮哀其早孤痛其成人而未娶乃撫柩長號哀感行路聞者莫不垂涕初衮父誡衮以酒每醉輙自責曰予廢先父之誡其何以訓人乃於父墓前自杖三十鄰人褚徳逸者善事其親老而不倦衮每拜之嘗與諸兄過邑人陳準兄弟諸兄友之皆拜其母衮獨不拜準弟徽曰子不拜吾親何衮曰未知所以拜也夫拜人之親者將自同於人之子也其義至重衮敢輕之乎遂不拜凖徽歎曰古有亮直之士君近之矣君若當朝則社稷之臣與君若握兵臨大節孰能奪之方今徴聘君實宜之於是鄉黨薦之州郡交命察孝亷舉秀才清白異行皆不降志世遂號之為異行元康末潁川太守召為功曹衮服造役之衣杖鍤荷斧不俟駕而行曰請受下夫之役太守飾車而迎衮逡廵辭退請徒行入郡將命者遂逼扶升車納於功曹舎既而衮自取己車而寢處焉形雖恭而神有不可動之色太守知其不可屈乃歎曰非常士也吾何以降之厚為之禮而遣焉齊王冏之唱義也張泓等肆掠于陽翟衮乃率其同族及庶姓保于禹山是時百姓安寧未知戰守之事衮曰孔子云不教而戰是謂棄之乃集諸羣士而謀曰二三君子相與處於險將以安保親尊全妻孥也古人有言千人聚而不以一人為主不散則亂矣将若之何衆曰善今日之主非君而誰衮嘿然有閒乃言曰古人急病讓夷不敢逃難然人之立主貴從其命也乃誓之曰無恃險無怙亂無暴鄰無抽屋無樵採人所植無謀非徳無犯非義勠力一心同䘏危難衆咸從之於是峻險阨杜蹊徑脩壁塢樹藩障考功庸計丈尺均勞逸通有無繕完器備量力任能物應其宜使邑推其長里推其賢而身率之分數既明號令不二上下有禮少長有儀将順其美匡救其惡及賊至衮乃勒部曲整行陣皆持滿而勿發賊挑戰晏然不動且辭焉賊服其慎而畏其整是以皆退如是者三時人語曰所謂臨事而懼好謀而成者其庾異行乎及冏歸于京師踰年不朝衮曰晉室卑矣冦難將興乃擕其妻子適林慮山事其新鄉如其故鄉言忠信行篤敬比及期年而林慮之人歸之咸曰庾賢及石勒攻林慮父老謀曰此有大頭山九州之絶險也上有古人遺跡可共保之惠帝還于長安衮乃相與登大頭山而田於其下榖未熟食木實餌石蘂同保安之有終焉之志及將收穫命子怞與之下山中塗目眩瞀墜崖而卒同保赴哭曰天乎獨不可舎我賢乎衮學通詩書非法不言非道不行尊事耆老恵訓䝉幼臨人之喪必盡哀㑹人之葬必躬築勞則先之逸則後之言必行之行必安之是以宗族鄉黨莫不崇仰門人感慕為之樹碑焉有四子怞蔑澤捃在澤生故名澤因捃生故曰捃蔑後南渡江中興初為侍中蔑生願安成太守孫晷字文度吳國富春人吳伏波將軍秀之曽孫也晷為兒童未嘗被呵怒顧榮見而稱之謂其外祖薛兼曰此兒神用清審志氣貞立非常童也及長恭孝清約學識有理義每獨處幽闇之中容止瞻仰未嘗傾邪雖侯家豐厚而晷常布衣蔬食躬親壟畝誦詠不廢欣然獨得父母愍其如此欲加優饒而夙興夜寐無暫懈也父母起居嘗饌雖諸兄親饋而晷不離左右富春車道既少動經江川父難於風波每行乗籃輿晷躬自扶侍所詣之處則於門外樹下藩屏之間隠息初不令主人知之兄嘗篤疾經年晷躬自扶侍藥石甘苦必經心目䟦渉山水祈求懇至而聞人之善欣若有得聞人之惡慘若有失見人饑寒並周贍之鄉里贈遺一無所受親故有窮老者數人恒往來告索人多厭慢之而晷見之欣敬逾甚寒則與同衾食則與同器或解衣推被以䘏之時年饑榖貴人有生刈其稻者晷見而避之湏去而出既而自刈送與之鄉鄰感愧莫復侵犯㑹稽虞喜隠居海隅有髙世之風晷欽其徳聘喜弟預女為妻喜戒女棄華尚素與晷同志時人號為梁鴻夫婦濟陽王惇少有髙操聞晷學行過人自東陽往候之始面便終日譚宴結歡而别司空何充為揚州牧檄晷為主簿司徒蔡謨辟為掾屬並不就尚書張國明州士之望表薦晷公車特徴㑹卒時年三十八朝野嗟痛之晷未及大斂有一老父緼袍草屨不通姓字徑入撫柩而哭哀聲慷慨感于左右哭止便出容貌甚清眼瞳又方門者告之喪主怪而追焉直去不顧同郡顧和等百餘人歎其神貌有異而莫之測也顔含字𢎞都琅邪莘人也祖欽給事中父黙汝隂太守含少有操行以孝聞兄畿咸寧中得疾就醫自療遂死於醫家家人迎喪旐每繞樹而不可解引喪者顛仆稱畿言曰我夀命未死但服藥太多傷我五臓耳今當復活慎無葬也其父祝之曰若爾有命復生豈非骨肉所願今但欲還家不爾葬也旐乃解及還其婦夣之曰吾當復生可急開棺婦頗説之其夕母及家人又夣之即欲開棺而父不聽含時尚少乃慨然曰非常之事古則有之今靈異至此開棺之痛孰與不開相負父母從之乃共發棺果有生驗以手刮棺指爪盡傷然氣息甚微存亡不分矣飲哺將䕶累月猶不能語飲食所湏託之以夣闔家營視頓廢生業雖在母妻不能無倦矣含乃絶棄人事躬親侍養足不出户者十有三年石崇重含淳行贈以甘㫖含謝而不受或問其故答曰病者綿昧生理未全既不能進噉又未識人惠若當繆留豈施者之意也畿竟不起含二親既終兩兄既沒次嫂樊氏因病失明含課勵家人盡心奉養每日自嘗省藥饌察問息耗必簪屨束帶醫人疏方應湏髯蛇膽而尋求備至無由得之含憂歎累時當晝獨坐忽有青衣童子年可十三四持一青囊授含含開視乃蛇膽也童子逡廵出户化成青鳥飛去得膽藥成嫂病即愈由是著名本州辟不就東海王越以為太傅參軍出補闓陽令元帝初鎮下邳復命為參軍過江以含為上虞令轉王國郎中丞相東閤祭酒出為東陽太守東宫初建含以儒素篤行補太子中庶子遷黄門侍郎本州大中正歴散騎常侍大司農預討蘇峻功封西平縣侯拜侍中除吳郡太守王導問含曰卿今涖名郡政將何先答曰王師嵗動編户虚耗南北權豪競招游食國弊家豐執事之憂且當懲之勢門使反田桑數年之間欲令户給人足如其禮樂俟之明宰含所歴簡而有恩明而能斷然以威御下導歎曰顔公在事吳人斂手矣未之官復為侍中尋除國子祭酒加散騎常侍遷光禄勲以年老遜位成帝美其素行就加光禄大夫門施行馬賜牀帳被褥𠡠太官四時致膳固辭不受于時論者以王導帝之師傅名位隆重百僚宜為降禮太常馮懷以問於含含曰王公雖重理無偏敬降禮之言或是諸君事宜鄙人老矣不識時務既而告人曰吾聞伐國不問仁人向馮祖思問佞於我我有邪徳乎人嘗論少正卯盜跖其惡孰深或曰正夘雖姦不至剖人充膳盜跖為甚含曰為惡彰露人思加戮隠伏之姦非聖不誅由此言之正卯為甚衆咸服焉郭璞常遇含欲為之筮含曰年在天位在人脩已而天不與者命也守道而人不知者性也自有性命無勞蓍龜桓温求婚於含含以其盛滿不許惟與鄧攸深交或問江左羣士優劣答曰周伯仁之正鄧伯道之清卞望之之節餘則吾不知也其雅重行實抑絶浮偽如此致仕二十餘年年九十三卒遺命素棺薄斂諡曰靖喪在殯而鄰家失火移棺紼斷火將至而滅僉以為淳誠所感也三子髦謙約髦歴黄門侍郎光禄勲謙至安成太守約零陵太守並有聲譽劉殷字長盛新興人也髙祖陵漢光禄大夫殷七嵗喪父哀毁過禮服喪三年未曽見齒曽祖母王氏盛冬思堇而不言食不飽者一旬矣殷怪而問之王言其故殷時年九嵗乃於澤中慟哭曰殷罪釁深重幼丁艱罰王母在堂無旬月之養殷為人子孫而所思無獲皇天后土願垂哀愍聲不絶者半日於是忽若有人云止止聲殷垂淚視地便有堇生焉因得斛餘而歸食而不減至時堇生乃盡又嘗夜夣人謂之曰西籬下有粟寤而掘之得粟十五鍾銘曰七年粟百石以賜孝子劉殷自是食之七載方盡時人嘉其至性通感競以榖帛遺之殷受而不謝直云待後貴當相酬耳弱冠博通經史綜核羣言文章詩賦靡不該覽性倜儻有濟世之志儉而不陋清而不介望之頺然而不可侵也鄉黨親族莫不稱之郡命主簿州辟從事皆以供養無主辭不赴命司空齊王攸辟為掾征南將軍羊祜召參軍事皆以疾辭同郡張宣子識達之士也勸殷就徴殷曰當今二公有晉之棟楹也吾方希達如榱椽耳不慿之豈能立乎吾今王母在堂既應他命無容不竭盡臣禮便不得就養子輿所以辭齊大夫良以色養無主故耳宣子曰如子所言豈庸人所識哉而今而後吾子當為吾師矣遂以女妻之宣子者并州豪族也家富於財其妻怒曰我女年始十四姿識如此何慮不得為公侯妃而遽以妻劉殷乎宣子曰非爾所及也誡其女曰劉殷至孝㝠感兼才識超世此人終當逺達為世名公汝其謹事之張氏性亦婉順事王母以孝聞奉殷如君父焉及王氏卒殷夫婦毁瘠㡬至滅性時王氏柩在殯而西鄰失火風勢甚盛殷夫婦叩殯號哭火遂越燒東家後有二白鳩巢其庭樹自是名譽彌顯太傅楊駿輔政備禮聘殷殷以母老固辭駿於是表之優詔遂其髙志聽終色養𠡠所在供其衣食蠲其徭賦賜帛二百疋榖五百斛趙王倫篡位孫秀夙重殷名以散騎常侍徴之殷逃奔鴈門及齊王冏輔政辟為大司馬軍諮祭酒既至謂殷曰先王虚心召君不至今孤辟君君何能屈也對曰世祖以大聖應期先王以至徳輔世既堯舜為君稷契為佐故殷希以一夫而距千乗為不可廻之圖幸邀唐虞之世是以不懼斧鉞之戮耳今殿下以神武睿姿除殘反政然聖迹稍麄嚴威滋肅殷若復爾恐招華士之誅故不敢不至也冏竒之轉拜新興太守明刑旌善甚有政能屬永嘉之亂沒於劉聰聰竒其才而擢任之累至侍中太保録尚書事殷恒戒子孫曰事君之法當務㡬諫凡人尚不可面斥其過而況萬乗乎夫犯顔之禍将彰君過宜上思召公咨商之義下念鮑勛觸鱗之誅也在聰之朝與公卿恂恂然常有後已之色士不脩操行者無得入其門然滯理不申藉殷而濟者亦已百數有七子五子各授一經一子授太史公一子授漢書一門之内七業俱興北州之學殷門為盛竟以夀終王延字延元西河人也九嵗喪母泣血三年㡬至滅性每至忌月則悲啼三旬繼母卜氏遇之無道恒以蒲穰及敗麻頭與延貯衣其姑聞而問之延知而不言事母彌謹卜氏嘗盛冬思生魚𠡠延求而不獲杖之流血延尋汾叩淩而哭忽有一魚長五尺踊出氷上延取以進母卜氏食之積日不盡於是心悟撫延如已生延事親色養夏則扇枕席冬則以身温被隆冬盛寒體無全衣而親極滋味晝則傭賃夜則誦書遂究覽經史皆通大義州郡禮辟貪供養不起父母終廬於墓側非其蠶不衣非其耕不食屬天下喪亂随劉元海遷于平陽農蠶之暇訓誘宗族侃侃不勌家牛生一犢他人認之延牽而授與初無吝色其人後自知妄認送犢還延叩頭謝罪延仍以與之不復取也年六十方仕於劉聰稍遷尚書左丞至金紫光禄大夫聰死後靳準將作亂謀之于延延不從準既誅劉氏自號漢天王以延為左光禄大夫延又大罵不受準遂殺之王談吳興烏程人也年十嵗父為鄰人竇度所殺談隂有復讎志而懼為度所疑寸刄不畜日夜伺度未得至年十八乃密市利鍤陽若耕鉏者度常乗船出入經一橋下談伺度行還伏草中度既過談於橋上以鍤殺之應手而死既而歸罪有司太守孔巖義其孝勇列上宥之巖諸子為孫恩所害無嗣談乃移居㑹稽脩理巖父子墳墓盡其心力後太守孔廞究其義行元興三年舉談為孝亷時稱其得人談不應召終于家桑虞字子深魏郡黎陽人也父沖有深識逺量恵帝時為黄門郎河間王顒執權引為司馬沖知顒必敗就職一旬便稱疾求退虞仁孝自天至年十四喪父毁瘠過禮日以米百粒用糝藜藿其姊諭之曰汝毁瘠如此必至滅性滅性不孝宜自抑割虞曰藜藿雜米足以勝哀虞有園在宅北數里𤓰果初熟有人踰垣盜之虞以園援多棘刺恐偷見人驚走而致傷損乃使奴為之開道及偷負𤓰將出見道通利知虞使除之乃送所盜𤓰叩頭請罪虞乃懽然盡以與之常行寄宿逆旅同宿客失脯疑虞為盜虞黙然無言便解衣償之主人曰此舎數失魚肉鷄鴨多是狐狸偷去君何以疑人乃將脯主至山冢間尋求果得之客求還衣虞投之不顧虞諸兄仕於石勒之世咸登顯位惟虞恥臣非類隂欲避地海東㑹丁母憂遂止哀毁骨立廬于墓側五年後石勒以為武城令虞以密邇黄河去海微近將申前志欣然就職石虎太守劉徴甚器重之徴遷青州刺史請虞為長史帶祝阿郡徴遇疾還鄴令虞監行州府屬虎死國中大亂朝廷以虞名父之子必能立功海岱潛遣東莞人華挺授虞寧朔將軍青州刺史虞曰功名非吾志也乃附使者啟讓刺史靖居海右不交境外雖歴偽朝而不豫亂世以此髙之卒於官虞五世同居閨門邕穆苻堅青州刺史苻朗甚重之常詣虞家升堂拜其母時人以為榮何𤦺字萬倫司空充之從兄也祖父龕後將軍父阜淮南内史琦年十四喪父哀毁過禮性沈敏有識度好古博學居于宣城陽榖縣事母孜孜朝夕色養常患甘鮮不贍乃為郡主簿察孝亷除郎中以選補宣城涇縣令司徒王導引為參軍不就及丁母憂居喪泣血杖而後起停柩在殯為鄰火所逼煙熖已交家乏僮僕計無從出乃匍匐撫棺號哭俄而風止火息堂屋一間免燒其精誠所感如此服闋乃慨然歎曰所以出身仕者非謂有尺寸之能以効智力實利微禄私展供養一旦㷀然無復恃怙豈可復以朽鈍之質塵黷清朝哉於是養志衡門不交人事躭玩典籍以琴書自娛不營産業節儉寡欲豐約與鄉鄰共之鄉里遭亂姊沒人家琦惟有一婢便為購贖然不為少謙凡有贈遺亦不苟辭但於已有餘輙復散之任心而行率意而動不占卜無所事司空陸玩太尉桓温並辟命皆不就詔徴博士又不起簡文帝時為撫軍欽其名行召為參軍固辭以疾公車再徵通直散騎侍郎散騎常侍不行由是君子仰徳莫能屈也桓温常登琦縣界山喟然歎曰此山南有人焉何公真止足者也琦善養性老而不衰布褐蔬食恒以述作為事著三國評論凡所撰録百許篇皆行於世年八十二卒吳逵吳興人也經荒饑疾病合門死者十有三人逵時亦病篤其喪皆鄰里以葦席裹而埋之逵夫妻既存家極貧窮冬無衣被晝則傭賃夜燒磚甓書夜在山未嘗休止遇毒蟲猛虎輙為之下道期年成七墓十三棺時有賻贈一無所受太守張崇義之以羔鴈之禮禮焉卒於家宋劉瑜歴陽歴陽人也七嵗喪父事母至孝年五十二又喪母三年不進鹽酪號泣晝夜不絶聲勤身力以營葬事服除二十餘年布衣蔬食言輙流涕嘗居墓側未嘗暫違文帝元嘉初卒又元嘉七年南豫州舉所統西陽縣人董陽三世同居外無異門内無異煙詔榜門曰篤行董氏之閭蠲一門租布賈恩㑹稽諸暨人也少有志行元嘉三年母亡居喪過禮未葬為鄰火所逼恩及妻柏氏號哭奔救隣近赴助棺櫬得免恩及柏俱燒死有司奏改其里為孝義里蠲租布三世追贈恩天水郡顯親左尉郭世道㑹稽永興人也年十四喪父居喪殆不勝哀家貧傭力以養繼母婦生一男夫婦共議曰勤身侍養力猶不足若養此兒所費者大乃垂泣瘞之母亡負土成墳親戚咸共賻助微有所受葬畢傭賃還先直服除後哀慼思慕終身如喪者未嘗釋衣幍仁孝之風行於鄉黨鄰村大小莫有呼其名者嘗與人共於山隂市貨物誤得一千錢當時不覺分背方悟乃請其伴求以此錢追還之錢主驚歎以半與世道世道委之而去元嘉初大使廵行天下散騎常侍袁愉表其淳行文帝嘉之敕榜表門閭蠲其税調改所居獨楓里為孝行焉太守孟顗察孝亷不就子原平字長恭又禀至行養親必以己力傭賃以給供養性甚巧每為人作工取散夫價主人設食原平自以家貧父母不辦有殽味唯餐鹽豉而已若家或無食則虚中竟日義不獨飽湏日暮作畢受直歸家於里糴買然後舉爨父篤疾彌年原平衣不解帶口不嘗鹽菜者跨積寒暑又未嘗睡卧父亡哭踊慟絶數日方蘇以為奉終之義情禮自畢塋壙凶功不欲假人本雖巧而不解作墓乃訪邑中有營墓者助人運力經時展勤久乃閑練又自賣為十夫客以供衆費窀穸之事儉而當禮性無術學因心自然葬畢詣所賣主執役與諸奴分務讓逸取勞主人不忍使每遣之原平服勤未嘗暫替傭賃養母有餘聚以自贖既學構冢尤善其事每至吉嵗求者盈門原平所赴必自貧始既取錢價又以夫日助之及父喪終自起兩間小屋以為祠堂每至節嵗常於此數日中哀思絶飲粥父服除後不復食肉髙陽許瑶之罷建安郡丞還家以綿一斤遺之不受瑶之乃自往曰今嵗過寒而建安綿好以此奉尊上耳原平乃拜而受之及母終毁瘠彌甚僅乃免喪墓前有數十畝田不屬原平每至農月耕者恒裸袒原平不欲使人慢其墳乃貿家資貴買此田三農之月輙束帶垂涕躬自耕墾每出賣物裁求半價邑人皆共識悉輙加本價與之彼此相讓要使微賤然後取直宅上種竹夜有盜其筍者原平遇見之盜者奔走墜溝原平乃於所植竹處溝上立小橋以通又採筍置於籬外鄰里慙愧無復取者文帝崩原平號哭致慟日食麥餅一枚如此五日或問之曰誰非王民何獨如此原平泣而答曰吾家見異先朝䝉襃賛之賞不能報恩私心感動耳又以種𤓰為業大明七年大旱𤓰瀆不復通船縣令劉僧秀愍其窮老下瀆水與之原平曰普天大旱百姓俱困豈可減溉田之水以通運𤓰之船乃歩從他道往錢唐貨賣每行來見人牽埭未過輙迅檝助之已自引船不假旁人若自船已度後人未及常停住湏待以此為常嘗於縣南郭鳳埭助人引船遇有鬬者為吏所録鬬者逃散唯原平獨住吏執以送縣縣令新到未相諳識將加嚴罰原平解衣就罪一無所言左右大小咸共稽顙請救然後得免由來不謁官長自此乃始脩敬太守蔡興宗臨郡深加貴異以私米饋原平及山隂朱百年妻各百斛原平誓死不受百年妻亦固辭㑹稽郡貴重望計及望孝盛族出身不減祕著明帝泰始七年興宗欲舉山隂孔仲智子為望計原平次息為望孝仲智㑹土髙門原平一邦至行欲以相敵㑹明帝别𠡠用人故二選並寢興宗徵還都表其殊行舉為太學博士㑹興宗薨事不行卒於家三子一弟並有門行潘綜吳興烏程人也孫恩之亂妖黨攻破村邑綜與父驃共走避賊驃年老行遲賊轉逼驃驃語綜我不能去汝走可脱幸勿俱死驃困乏坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請賊曰兒年少自能走今為老子不去老子不惜死乞活此兒賊因斫驃綜抱父於腹下賊斫綜頭面凡四創綜當時悶絶有一賊從傍來相謂曰卿欲舉大事此兒以死救父云何可殺殺孝子不祥賊乃止父子並得免鄉人祕書監邱系祖廷尉沈赤黔以綜異行薦補左户令史除遂昌長嵗滿還家太守王韶之臨郡發教列上州臺陳其行跡及將行設祖道贈以四言詩元嘉四年有司奏改其里為純孝里蠲租布三世又宋初吳郡人陳遺少為郡吏母好食鍋底飯遺在役恒帶一囊每煮食輙録其焦以貽母後孫恩亂聚得數升恒帶自随及敗逃竄多有餓死遺以此得活母晝夜涕泣目為失明耳無所聞遺還入户再拜號咽母豁然即明後又有河南孝亷秦綿遭母喪送葬不忍復還鄉人為作茅庵乃止其中若遇有米則食粥無米食菜而已哀號之聲行者為之澘淚服訖猶不還家遇疾不療卒臨亡告人曰若死者無知固不宜獨存有知則大獲吾志張楚者益州梓潼人也母疾命在屬纊楚祈禱苦至截指自是精神感悟疾應時得愈元嘉中詔榜門曰孝行張氏之閭易其里為孝行聽蠲租布三世身加旌命邱傑字偉跱吳興烏程人也年十四遭母喪以熟菜有味不嘗常食生菜因而遇毒忽夣母謂曰死止是分别耳何事乃爾荼苦汝噉生菜遇蝦蟆毒靈牀前有三丸藥可取服之傑驚起果得甌甌中有藥服之下科斗子數升邱氏世保此甌大明七年災火焚失之師覺授字覺授南陽涅陽人也與外兄宗少文並有素業以琴書自娱於路忽見一人持書一函題曰至孝師君苫前俄而不見捨車奔歸聞家哭聲一呌而絶良久乃蘇後撰孝子傳八卷臨川王義慶辟為州祭酒主簿並不就乃表薦之㑹卒王彭盱台直瀆人也少喪母元嘉初父又喪亡家貧力弱無以營葬兄弟二人晝則傭力夜則號感鄉里並哀之户各出夫力助作塼塼湏水而天旱穿井數十丈泉不出墓處去淮五里荷擔逺汲困而不周彭號天自訴如此七日一旦大霧霧歇塼竈前忽生泉水鄉鄰助之者並嗟神異縣邑近逺悉往觀之葬竟水便自竭元嘉九年太守劉伯龍依事表言改其里為通靈里蠲租布三世蔣恭義興臨津人也元嘉中晉陵蔣崇平為劫見禽云與恭妻弟吳晞張為侣晞張先行不在本村遇水妻息避水移寄恭家時録晞張不獲禽收恭及兄協付獄科罪恭協並欵舎住晞張家口而不知劫情恭列晞張妻息是婦之親親今有罪恭身甘分求免兄協恊列是户主求免弟恭兄弟二人爭求受罪郡縣不能制依事上詳州義以為並不合罪後除恭義成令協義招令孫法宗一名宗之吳興人也父随孫恩入海被害屍骸不收母兄並餓死法宗年小流迸至十六方得還單身勤苦霜行草宿營辦棺槨造立冢墓葬送母兄儉而有禮以父屍不測入海尋求聞世間論是至親以血瀝骨當悉凝浸乃操刀沿海見枯骸則刻肉灌血如此十餘年臂脛無完皮血脉枯竭終不能逢遂縗絰終身常居墓所山禽野獸皆悉馴附每􅍪鹿觸網必解放之償以錢物後忽苦頭創夜有女人至曰我是天使來相謝行創本不關善人使者逺相及取牛糞煮傅之即騐一傅便差一境賴之終身不娶饋遺無所受孝武初揚州辟為文學從事不就卒許昭先義興人也叔父肇之坐事繫獄七年不判子姪二十許人昭先家最貧薄專獨申訴無日在家餉饋肇之莫非珍新資産既盡賣宅以充之肇之諸子倦怠唯昭先無有懈息如是七載尚書沈演之嘉其操行肇之事由此得釋昭先舅夫妻並疫病死亡家貧無以殯送昭先賣衣服以營殯葬舅子三人皆幼贍䕶並得成長昭先父母皆老病家無僮役竭力致養甘㫖必從宗族嘉其孝行雍州刺史劉真道版為征虜參軍昭先以親老不就補縣主簿昭先以叔未仕又固辭余齊人晉陵晉陵人也少有孝行為邑書吏大明二年父殖在家病亡信未至齊人謂人曰比者肉痛心煩有如割截居常惶駭必有異故信尋至以父病報之四百餘里一日而至至門方知父死號踊慟絶良久乃蘇問父所遺言母曰汝父臨終恨不見汝齊人即曰相見何難於是號哭殯所湏臾便絶州縣上言有司奏改其里為孝義里蠲租布賜其母榖百斛孫棘彭城人也大明五年發三五丁棘弟薩應充行坐違期依制軍法獄未及結棘詣郡辭列棘為家長令弟不行罪應百死弟幼小亡母遺言所屬不忍令當一門之苦乞以身代薩薩又辭列狂愚犯法實是薩身自依法受戮薩三嵗失父一生恃賴兄兄雖垂愍薩何心處世太守張岱疑其不實以棘薩各置一處報云聽其相代棘薩皆欣然赴死棘妻許又寄語屬棘曰君當門户豈可委罪小郎且大家臨亡以小郎屬君竟未娶妻家道不立君已有二兒死復何恨岱依事表上孝武詔特原罪州加辟命並賜帛二十疋先是新蔡徐元妻許年二十一喪夫子甄年三嵗父攬愍其年少以更適同縣張買許自誓不行父逼載送買許自經氣絶家人奔赴良久乃蘇買夜送還攬許歸徐氏養元父季以孝聞元嘉中年八十餘卒又明帝泰始二年長城吳慶恩殺周郡錢仲期仲期子延慶屬役在都聞父死馳還於庾浦埭逢慶恩手刃殺之自繫烏程獄吳興太守郗顒表不加罪許之何子平廬江灊人也曽祖揩晉侍中祖友㑹稽王道子驃騎諮議參軍父子先建安太守子平世居㑹稽少有至行事母至孝揚州辟從事史月奉得白米輙貨市粟麥人或問曰所利無㡬何足為煩子平曰尊老在東不辦得米何心獨饗白粲每有贈鮮殽者若不可寄致其家則不肯受母本側庶籍注失實實未及養而籍年已滿便去職歸家時鎮軍將軍顧覬之為州上綱謂曰尊上年實未八十親故所知州中差有微禄當啓相留子平曰公家正取信黄籍籍年既至便應扶侍何容茍冒榮禄乃歸家竭力供養元嘉三十年元凶弑逆随王誕入討以為行參軍子平以凶逆滅理故廢已受職事寧自解後除吳郡海虞令縣禄唯供養母一身不以及妻子人或疑其儉薄子平曰希禄本在養親不在為已問者慙而退母喪去官哀毁踰禮每至哭踊頓絶方蘇屬大明末東土饑荒繼以師旅八年不得營葬晝夜號哭呌慕常如袒括之日冬不衣絮暑不避清涼一日以數合米為粥不進鹽菜所居屋敗不蔽風日兄子伯興欲為葺理子平不肯曰我情事未申天地間一罪人耳屋何宜覆蔡興宗為㑹稽太守甚加矜賞為營冢壙子平居喪毁甚及免喪殆至不立幼持操檢敦厲名行雖處闇室如接大賔學義堅明處之以黙安貧守善不求榮進好退之士彌以此貴之昇明中卒年六十崔懐順清河東武城人也父邪利魯郡太守元嘉中為魏所獲懐順與妻房氏篤愛聞父見虜即日遣妻布衣蔬食如居喪禮嵗時北向流涕邪利後仕魏以書戒懐順不許如此懐順得書更號泣懐順從叔模為滎陽太守亦入魏模子雖居處改節而不廢婚宦大明中懐順宗人冀州刺史元孫北使魏魏人問之曰崔邪利崔模並力屈歸命二家子姪出處不同義将安在元孫曰王尊驅驥王陽回車欲令忠孝並𢎞臣子兩遂泰始初淮北入魏懐順因此歸北至代都而邪利已卒懐順絶而復蘇載喪還青州徒跣氷雪土氣寒酷而手足不傷時人以為孝感所致喪畢以弟在南齊建元初又逃歸而弟復亡懐順孤貧宗黨哀之日斂給其升斗永明中卒義行嚴世期㑹稽山隂人也性好施同里張邁等三人妻各産子嵗饑欲棄而不舉世期分食解衣而贍其乏三子並得成長同縣俞陽妻莊年九十莊女蘭七十並老無所依世期飴之二十年死並為之殯葬宗親嚴𢎞鄉人潘伯等十五人荒年並餓死露骸不收世期買棺殯埋存育孩㓜元嘉四年有司奏榜其門曰義行嚴氏之門復其身徭役蠲租税十年吳慶之字文悦濮陽人也寓居吳興江夏王義恭為揚州刺史召為西曹書佐及義恭誅慶之自傷為吏無状不復肯仕終身蔬食後王琨為吳興太守欲召為功曹答曰走素無人世情直以明府見接有禮所以奔走嵗時若欲見吏則是蓄魚於樹栖鳥於淵耳不辭而退琨追謝之望塵不及矣徐耕晉陵延陵人也元嘉二十二年大旱人饑耕詣縣陳辭以米千斛助官賑貸縣為言上當時議者方之卜式詔書襃美酬以縣令大明八年東土饑旱東海嚴成東莞王道盖各以私榖五百餘斛助公賑䘏范叔孫吳郡錢唐人也少而仁厚周窮濟急同里范法先父母兄弟七人同時疫死唯餘法先病亦危篤喪尸經日不收叔孫聞之悉備棺器親為殯埋又同里施夫疾病父死不殯范苖父子並亡范敬宗家口六人俱得病二人喪沒親鄰畏逺莫敢營視叔孫並為殯瘞躬恤病者皆得生全鄉曲貴其義行莫有呼其名者孝武孝建初除竟陵王國中軍參軍不就義興吳國夫亦有義讓之美人有竊其稻者乃引還為設酒食以米送之齊王虚之字文静廬江石陽人也年十三喪母三十三喪父二十五年鹽酢不入口疾病著牀忽有一人來問疾謂之曰君病尋差俄而不見病果尋差庭中楊梅樹隆冬生實又每夜所居有光如燭墓上橘樹一冬再實時人咸以為孝感所致永明中詔榜門閭蠲其三世時又有顧昌衍江柔之江軻並以篤行知名昌衍吳人居喪㡬至滅性王儉言之天子曰昌衍既有至行且張永之甥宜居禮闈以光郎署乃以為尚書庫部郎柔之軻並濟陽人柔之字叔逺孝悌通亮亦至臺郎軻字伯倫貞嚴有行宗人江概位至侍中性豪侈唯見軻則敬挹焉蕭叡明字景濟南蘭陵人也母病風積年沈卧叡明晝夜祈禱時寒叡明下淚為之氷如筯額上叩頭血亦氷不溜忽有一人以小石函授之曰此療夫人病叡明跪受之忽不見以函奉母函中唯有三寸絹丹書為日月字母服之即平復于時秣陵朱緒無行母病積年忽思菰羮緒妻到市買菰為羮欲奉母緒曰母病復安能食先嘗之遂併食盡母怒曰我病欲此汝何心併啖盡天若有知當令汝哽死緒便聞心中介介然即利血明日而死叡明聞之大悲慟不食積日問緒尸在何處欲手自戮之既而曰洿吾刀乃止永明五年居母喪不勝喪卒詔贈中書侍郎又有鮮于文宗漁陽人年七嵗喪父父以種芋時亡至明年芋時對芋鳴咽如此終身姊文英適荀氏七日而夫亡執節不嫁及母卒晝夜哭泣遂喪明蕭矯妻羊字淑褘性至孝居父喪哭輙吐血母嘗有疾淑褘於中夜祈禱忽有一人在樹下自稱枯桑君曰若母無患今泄氣在亥西南求白石鎮之言訖不見明日如言而疾愈又時有羊緝之女佩任者烏程人随母還舅氏母亡晝夜號哭不飲食三日而亡鄉里號曰女表又有晉陵吳康之妻趙氏父亡弟㓜遇嵗饑母老病篤随從鄉里告乞言辭哀苦鄉里憐之各分升斗遂得免及嫁康之少時夫亡家欲更嫁誓死不貳焉又義興蒋儁之妻黄氏夫亡不重嫁家逼之欲自殺乃止建元三年詔蠲表門閭又㑹稽永興吳翼之母丁氏少喪夫性仁愛遭年荒分衣食以給里中饑餓者隣里求借未嘗違同里陳攘父母死孤單無親戚丁收養之及長為營婚娶又同里王禮妻徐荒年客死丁隂為買棺器自往斂葬宋元徽末大雪商旅斷行村里比室饑餓丁自出鹽米計口分賦同里左僑家露四喪無以葬丁為辦冢椁有三調不登者代為送丁長子婦王氏守寡執志不再醮州郡上言詔表門閭蠲租税又㑹稽寒人陳氏有三女無男祖父母年八九十老無所知父篤癃病母不安其室遇嵗饑三女相率於西湖採菱蓴更日至市貨賣未嘗虧怠鄉里稱為義門多欲娶為婦長女自傷㷀獨誓不肯行祖父母尋相繼卒三女自營殯葬為菴舎居墓側又永興概中里王氏女年五嵗得毒病兩目皆盲性至孝年二十父死臨尸一呌眼皆血出小妹娥䑛其血左目即開時人稱為孝感又諸暨東洿里屠氏女父失明母痼疾親戚相棄隣里不容女移父母逺住紵舎晝採樵夜紡績以供養父母俱卒親營殯葬負土成墳忽空中有聲云汝至性可重山神欲相驅使汝可為人療病必得大富女謂是􅔨魅弗敢從遂得病積年隣舎人有溪蜮毒者女試療之自覺病便差遂以巫道為人療疾無不愈家産日益鄉里多欲娶之女以無兄弟誓死守墳墓不嫁為山劫所殺又吳興乗公濟妻姚氏生二男而公濟及兄公願乾伯並卒各有一子姚養育之賣田宅為娶婦自與二男寄止隣家明帝詔為其二子婚表門閭復徭役又吳興范法恂妻褚氏亦勤苦執婦業宋昇明中孫曇瓘謀反亡命褚謂其子僧簡曰孫越州先姑之姊子與汝父親則從母兄弟交則義重古人逃竄脱不得免汝宜收之曇瓘尋伏法褚氏令僧簡往斂葬年七十餘永明中卒僧簡在都聞病馳歸未至褚已卒將殯舉尸不起尋而僧簡至焉公孫僧逺㑹稽剡人也居父喪至孝事母及伯父甚謹年饑僧逺省餐減食以養母及伯父兄弟亡貧無以葬身自販貼與隣里供斂送終之費躬負土手種松柏兄姊未婚嫁乃自賣為之成禮名聞郡縣髙帝即位遣散騎常侍虞炎等十二部使行天下建元三年炎等表列僧逺等二十三人詔並表門閭蠲租税吳欣之晉陵利城人也宋元嘉末弟慰之為武進縣吏随王誕起義元凶遣軍主華欽討之吏人皆散慰之獨留見之將死欣之詣欽乞代弟命辭淚哀切兄弟皆見原建武三年有詔蠲表之永明初廣陵人童超之二息犯罪争死太守劉悛表以聞詔皆原其罪孫淡太原人也世居長沙事母至孝母疾不眠食以差為期母哀之後有疾不使知也建元三年蠲表門閭卒於家華寳晉陵無錫人也父豪晉義熙末戍長安時寳年八嵗父臨别謂寳曰湏我還當為汝上頭及長安陷虜寳年至七十不婚冠或問之者輙號慟彌日不忍答也同郡薛天生母遭艱菜食天生亦菜食母未免喪而死天生終身不食魚肉又同郡劉懐允與弟懐則年十嵗遭父喪不衣絮帛不食鹽菜建元三年詔並表其門閭解叔謙字楚梁鴈門人也母有疾叔謙夜於庭中稽顙祈福聞空中語云此病得丁公藤為酒便差即訪醫及本草注皆無識者乃求訪至宜都郡遥見山中一老公伐木問其所用答云此丁公藤療風尤驗叔謙便拜伏流涕具言來意此公愴然以四叚與之并示以漬酒法叔謙受之顧視此人不復知處依法為酒母病即差建武初以奉朝請徴不至時又有宗元卿庾震朱文濟匡昕魯康祚謝昌㝢皆有素履而叔謙尤髙元卿字希蔣南陽人有至行早孤為祖母所養祖母病元卿在逺輙心痛大病則大痛小病則小痛以此為常鄉里宗事之號曰宗曽子震字彦文新野人喪父母居貧無以葬賃書以營事至于掌穿然後葬事獲濟南陽劉虬因此為撰孝子傳文濟字敬達吳興人自賣以葬母太守謝􅊪徴為儒林祭酒不就昕字令先廬陵人有至性隠金華山服食不與俗人交母病亡已經日昕奔還號呌母即蘇皆以為孝感所致康祚扶風人亦有至行母患乳癰諸醫療不愈康祚乃跪兩手捧癰大悲泣母即覺少寛因此漸差時人以其有㝠應康祚位至屯騎校尉昌㝢陳郡人也為劉悛廣州參軍孝性甚重嘗養一鵠昌㝢病二旬而鵠二旬不食昌㝢亡而鵠遂飛去韓靈敏㑹稽剡人也早孤與兄靈珍並有孝性尋又母亡家貧無以營凶兄弟共種𤓰半畝朝采𤓰子暮生已復以此遂辦葬事靈珍亡無子妻卓氏守節不嫁慮家人奪其志未嘗告歸靈敏事如母劉渢字處和南陽人也父紹仕宋位中書郎渢母早亡紹被𠡠納路太后兄女為繼室渢年數嵗路氏不以為子奴婢輩捶打之無期度渢母亡日輙悲號不食彌為婢輩所苦路氏生溓渢憐愛之不忍捨恒在牀帳側輙被驅捶終不肯去路氏病經年渢晝夜不離左右每有増加輙流涕不食路氏病差感其意慈愛遂隆路氏富盛一旦為渢立齋宇筵席不減侯王溓有識事渢過於同産事無大小必諮兄而後行渢妹適江祏弟禧與祏兄弟異常自尚書比部郎後為始安王遥光諮議専知腹心任時遥光任當顧託朝野向渢如雲渢忌之求出為丹陽丞雖在外遷而意任無改及遥光舉事且方召渢渢以為宜悉召佐史渢之徙丹陽丞也遥光以蕭懿第四弟晉安王之文學暢為諮議領録事及召入遥光謂曰劉暄欲有異志今夕當取之遥光去嵗暴風性理乖錯多時方愈暢曰公去嵗違和今欲發動顧左右急呼師視脉遥光厲聲曰諮議欲作異邪因訶令出湏臾渢入暢謂曰公昔年風疾今復發渢曰卿視今夕處分云何而作此語及迎垣歴生至與渢俱勸夜攻臺既不見納渢歴生並撫膺曰今欲作賊而坐守此城今年坐公滅族矣及遥光敗渢静坐府舎溓為度支郎亦奔亡遇渢仍不復肯去渢曰吾為人作吏自不避死汝可去無相守同盡答曰向若不逢兄亦草間茍死今既相逢何忍獨生因以衣帶結兄衣遂俱見殺何允聞之歎曰兄死君難弟死兄禍美哉又栁叔夜河東人父宗宋黄門郎叔夜年十六為新野太守甚有名績補遥光諮議參軍及事敗左右扶上馬欲與俱亡答曰吾已許始安以死豈可負之邪遂自殺吳達之義興人也嫂亡無以葬自賣為十夫客以營冢椁從祖弟敬伯夫妻荒年被略江北達之有田十畝貨以贖之與同財共宅郡命為主簿固以讓兄又讓先世舊田與族弟弟亦不受田遂閑廢建元三年詔表門閭先是有蔡曇智鄉里號蔡曽子廬江何伯璵兄弟鄉里號為何展禽並為髙士沈顗所重常云聞蔡曇智之風怯夫勇鄙夫有立志聞何伯璵之風偽夫貞薄夫厚云伯璵與弟㓜璵俱厲節撫養孤兄子及長為婚推家業盡與之安貧枯槁誨人不倦郡守下車莫不修謁伯璵卒㓜璵末好佛法剪髪長齋持行精苦梁初卒兄弟年八十餘王文殊字令章吳郡故鄣人也父沒魏文殊思慕泣血終身蔬食不衣帛服麻緼而已不婚不交人物吳興太守謝􅊪聘為功曹不就立小屋於縣西端拱其中嵗時伏臘月朝十五未嘗不望北長悲如此三十餘年太守孔琇之表其行鬰林詔榜門閭改所居為孝行里樂頤字文徳南陽湼陽人世居南郡少而言行和謹仕為京府參軍父在郢病亡頤忽悲戀涕泣因請假還中路果得父凶問便徒跣號咷出陶家後渚遇商人附載西上水漿不入口數日嘗遇病與母隔壁忍痛不言嚙被至碎恐母之哀已也湘州刺史王僧䖍引為主簿以同僚非人棄官去吏部郎庾杲之嘗往候頤為設食唯枯魚菜葅杲之曰我不能食此母聞之自出常膳魚羮數種杲之曰卿過於茅季偉我非郭林宗仕至郢州中從事弟預字文介亦至孝父臨亡執手以託郢州行事王英預悲感悶絶吐血數升遂𤼵病官至驃騎録事參軍隆昌末預謂丹陽尹徐孝嗣曰外傳籍籍似有伊周之事君䝉武帝殊常之恩荷託付之重恐不得同此人事人笑褚公至今齒冷無為效尤孝嗣故吏吳興沈昇之亦説之曰昇之與君皆有項領之功今一言而二功俱解豈願聞之乎君受恩二祖而更參惟新之政以君為反覆人事成則無處逃咎矣昇之草萊言出禍已随之孰與超然謝病髙枕家園則與松栢比操風霜等烈豈不美邪孝嗣並改容謝之預建武中為永世令人懐其徳卒官時有一媪年可六七十擔槲蔌葉造市貨之聞預亡大泣棄溪中曰失樂令我輩孤獨老姥政應就死耳市人亦皆泣其恵化如此江泌字士清濟陽考城人也父亮之員外郎泌少貧晝日斫屧為業夜讀書随月光光斜則握卷升屋睡極堕地則更登性行仁義衣弊多蝨以綿裹置壁上恐蝨饑死乃復取置衣中數日間終身無復蝨母亡後以生闕供養遇鮭不忍食菜不食心以其有生意唯食老葉而已母墓為野火所燒依新宫災三日哭淚盡繼之以血歴仕南中郎行參軍所給募吏去役得時病莫有舎之者吏扶杖投泌泌親自隠䘏吏死泌為買棺無僮役兄弟共輿埋之後領國子助教乗牽車至染塢頭見一老公步行下車載之躬自歩去武帝以為南康王子琳侍讀建武中明帝害諸王後泌憂念子琳詣誌公道人問其禍福誌公覆香爐灰示之曰都盡無餘及子琳被害泌往哭之淚盡出血躬視殯葬畢乃去泌尋卒族人兖州中從事泌黄門郎悆子也與泌同名世謂泌為孝泌以别之杜栖字孟山吳郡錢唐人隠士京産之子也京産自髙祖子恭以來世傳五斗米道不替栖善清言能彈琴刺史豫章王嶷聞其名辟議曹從事仍轉西曹書佐竟陵王子良數致禮接國子祭酒何允掌禮又重栖以為學士掌昬冠儀以父老歸養栖肥白長壮及京産病旬日間便皮骨自支京産亡水漿不入口七日晨夜不罷哭不食鹽菜每營買祭奠身自看視號泣不自持朔望節嵗絶而復蘇嘔血數升時何允謝朏並隠東山遺書敦譬誡以毁滅至祥禫暮夣見其父慟哭而絶初何允兄㸃見栖歎曰卿風韻如此雖獲嘉譽不永年矣卒時年三十六當時咸嗟惜焉建武二年剡縣有小兒年八嵗與母俱得赤班病母死家人以小兒猶惡不令其知小兒疑之問云母嘗數問我病昨來覺聲羸今不復問何也因自投下牀扶匐至母尸側頓絶而死鄉鄰告之縣令宗善才求表廬事竟不行庾道愍潁川􅋣陵人晉司空氷之元孫也有孝行頗能屬文少出孤悴時人莫知之者其所生母流漂交州道愍尚在襁褓及長知之求為廣州綏寧府佐至南而去交州尚逺乃自負擔冐險僅得自達及至交州尋求母雖經年常日夜悲泣嘗入村日暮雨驟乃寄止一家見有一嫗負薪外還而道愍心動因訪之乃其母也於是行伏號泣逺近赴之莫不揮淚道愍尤精相板宋明帝時山陽王休祐屢以言語忤顔見道愍託以己板為他物令道愍占之道愍曰此乃甚貴然使人多愆忤休祐以褚淵詳密求換其板他日淵侍明帝自稱下官帝多忌甚不悦休祐具以状言帝意乃解道愍仕齊位射聲校尉族孫沙彌亦以孝行著列在梁史義行韓係伯襄陽人也事父母謹孝襄陽人鄰居種桑樹於界上為誌係伯以桑枝䕃妨他地遷界上開數尺鄰畔随復侵之係伯輙更改種久之隣人慙愧還所侵地躬往謝之建元三年蠲表門閭以夀終時有吳興人聞人夐年十七結客報父仇為髙帝所賞位至長水校尉封延伯字仲連勃海人也世為州郡著姓寓居東海三世同財為北州所宗附延伯好學退讓事寡嫂甚謹垣崇祖為兖州請為長史不就崇祖軾其門不肯相見後為豫州上表薦之詔書優禮起家平西長史梁郡太守為政清靜有髙士風俄以疾免還東海于時四州入魏士子皆依海曲争往宗之如遼東之仰邴原也建元三年大使廵行天下義興陳元子四世同居一百七口武陵邵榮興文獻叔並八世同居東海徐生之武陵范安祖李聖伯范道根並五世同居零陵譚𢎞寳衡陽何𢎞華陽陽黒頭疎從四世同居詔俱表門閭蠲租税又蜀郡王續祖華陽郝道福並累世同爨建武三年明帝詔表門閭蠲調役梁滕曇恭豫章南昌人也年五嵗母楊氏患熱思食寒𤓰土俗所不生曇恭歴訪不能得銜悲哀切俄遇一桑門問其故曇恭具以告桑門曰我有兩𤓰分一相遺還以與母舉室驚異尋訪桑門莫知所在及父母卒曇恭並水漿不入口者旬日哀慟嘔血絶而復蘇隆冬不著繭絮蔬食終身每至忌日思慕不自堪晝夜悲號其門外有冬生樹二株時忽有神光自樹而起俄見佛像及夾侍之儀容光顯著自門而入曇恭家人大小咸共禮拜久之乃滅逺近道俗咸傳之太守王僧䖍引曇恭為功曹固辭不就王儉時随僧䖍在郡號為滕曽子天監元年陸璉奉使廵行風俗表言其状曇恭有子三人皆有行業時有徐普濟者長沙臨湘人居喪未葬而鄰火起延及其舎普濟號慟伏棺上以身蔽火隣人往救之焚灸已悶絶累日方蘇又有建康人張悌家貧無以供養以情告隣富人富人不與不勝忿遂結四人作劫所得衣物三劫持去實無一錢入已縣抵悌死罪悌兄松訴稱與弟景是前母子後母惟生悌松長不能教誨乞代悌死景又曰松是嫡長後母惟生悌悌若從法母亦不全亦請代死母又云悌應死豈以弟罪枉及諸兄悌亦引分乞全兩兄供養縣以上讞帝以為孝義特降死後不得為例庾黔婁字子貞新野人也父易髙尚不應徴辟列在隠逸傳黔婁少好學多所講誦性至孝未嘗失色於人南陽髙士劉虬宗測並歎異之初補編令政有異績先是縣境多虎暴人黔婁至官虎皆度往臨沮界時以為仁化所感永元初徒孱陵令到縣未旬父易在家遘疾黔婁忽然心驚舉身流汗即日棄官歸家人悉驚其忽至時易疾始二日醫云欲知差劇但嘗糞甜苦易洩痢黔婁輙取嘗之味轉甜滑心愈憂苦至夕每稽顙北辰求以身代俄聞空中有聲曰徵君夀命盡不復可延汝誠禱既至故得至月末及晦而易亡黔婁居喪過禮廬于冢側梁臺建黔婁自西臺尚書儀曹郎為益州刺史鄧元起表為府長史巴西梓潼二郡太守及成都平城中珍寳山積元起悉分與僚佐唯黔婁一無所取元起惡其異衆厲聲謂曰長史何獨為髙黔婁示不違之意請書數箧而已尋除蜀郡太守在職清素百姓便之元起死于蜀郡部曲皆散黔婁身營殯斂攜持喪柩歸鄉里東宫建以中軍記室參軍侍皇太子讀甚見知重詔與太子中庶子殷鈞中書舎人到洽國子博士明山賔等遞日為太子講五經義遷散騎侍郎黔婁弟於陵肩吾自有傳劉霽字士湮平原人齊齊郡太守懐慰之子也霽九嵗能誦左氏傳十四居父憂有至性每哭輙嘔血家貧與弟杳歊勵志勤學及長博渉多通天監中歴位西昌相尚書主客侍郎海鹽令霽前後宰二邑並以和理稱後除建康令不拜母明氏寢疾霽年已五十衣不解帶者七旬誦觀世音經數萬遍夜中感夣見一僧謂曰夫人算盡君精誠篤至當相為申延後六十餘日乃亡霽廬于墓哀慟過禮常有雙白鶴循翔廬側處士阮孝緒致書抑譬焉霽思慕不已未終喪而卒著釋俗語八卷文集十卷杳附載從祖峻傳歊髙蹈不仕列在隱逸目中劉曇净字元光彭城人也祖父元直淮南太守父慧鏡安成内史初元直居郡得罪慧鏡歴詣朝士乞哀懇惻甚至遂以孝聞曇浄篤行有父風解褐安成王國左常侍父卒於郡曇淨奔喪不食飲者累日絶而又蘇每哭輙嘔血服闋因毁成疾㑹有詔士姓各舉四科曇淨叔父隠士慧斐舉以應孝行武帝用為海寧令曇淨又以兄未為縣因以讓兄乃除安西行參軍父亡後事母尤淳至身營餐粥不以委人母疾衣不解帶及母亡水漿不入口者殆一旬母䘮權瘞藥王寺時天寒曇淨身衣單布衣廬于墓所晝夜哭臨不絶聲哀感行路未朞而卒何炯字士光廬江灊人隠士允從弟也父撙太中大夫炯年十五從允受業一期並通五經章句白晳美容貌從兄求㸃每曰衛叔寳神清杜乂膚清今觀此子復見衛杜在目從兄戢謂人曰此子非止吾門之寳亦為一代偉人炯常慕恬退不樂進仕從叔昌㝢謂曰求㸃皆已髙蹈汝無宜復爾且君子出處亦各一途年十九解褐揚州主簿舉秀才累遷仁威南康王限内記室書侍御史以父疾陳解炯侍疾踰旬衣不解帶頭不櫛沐信宿之間容貌頓改及父卒號慟不絶聲寢苫藉地腰脚虚腫醫云湏服猪蹄湯炯以有肉味不肯服親友請譬終於不回遂以毁卒先是謂家人曰王孫元晏所尚不同長魚慶緒於事為得必湏儉而中禮無取茍異月朝十五日可置一甌麤粥如常日所進又傷兩兄並淡仕進故祿所不及恐而今而後温飽無資乃漼然下泣自外無所言陶季直丹陽秣陵人也祖愍祖宋廣州刺史父景仁中散大夫季直早慧愍祖甚愛異之嘗以四函銀列置於前令諸孫各取其一季直時年四嵗獨不取曰若有賜當先父伯不應度及諸孫故不取愍祖甚竒之五嵗喪母哀若成人初母未病令於外染衣卒後家人始贖季直抱之號慟聞者莫不酸感及長好學澹於榮利徵召不起時人號曰聘君後為望蔡令以病免時劉秉袁粲以齊髙帝權盛將圖之秉素重季直欲與謀季直以袁劉儒者必致顛殞固辭不赴俄而秉等敗齊初為尚書比部郎時褚淵為尚書令素與季直善頻以為司空司徒主簿委以府事淵卒尚書令王儉以淵有至行欲諡文孝公季直曰文孝是司馬道子諡恐其人非具美不如文簡儉從之季直又請為淵立碑始終營䕶甚有吏節再遷東莞太守在郡號為清和後為鎮西諮議參軍齊武帝崩明帝作相誅鋤異已季直不能阿意取容明帝頗忌之出為輔國長史北海太守邊職上佐素士罕為之者或勸季直造門致謝明帝留以為驃騎諮議參軍兼尚書左丞遷建安太守為政清靜百姓便之梁臺建為給事黄門侍郎常稱仕至二千石始願畢矣無為久預人間事乃辭疾還鄉里天監中初就拜太中大夫武帝曰梁有天下遂不見此人十年卒於家季直素清苦絶倫又屏居十餘載及死家徒四壁子孫無以殯斂聞者莫不傷其志事云沈崇傃字思整吳興武康人也父懐明宋兖州刺史崇傃六嵗丁父憂哭踊過禮及長事所生母至孝家貧常傭書以養天監二年太守栁惲辟為主簿崇傃從惲到郡還迎其母未至而母卒崇傃以不及侍疾将欲致死水漿不入口晝夜號哭旬日殆將絶氣兄弟謂曰殯葬未申遽自毁滅非全孝道也崇傃心悟乃稍進食母權瘞去家數里哀至輙之瘞所不避雨雪每倚墳哀慟飛鳥翔集夜恒有猛虎來望之有聲狀如歎息者家貧無以遷厝乃行乞經年始獲葬焉既而廬于墓側自以初行喪禮不備復以葬後更治服三年久食麥屑不噉鹽酢坐卧於單薦因虚腫不能起郡縣舉至孝武帝聞即遣中書舎人慰勉之乃詔令釋服擢補太子洗馬旌其門閭崇傃奉詔釋服而涕泣如居喪固辭不受官乃除永寧令自以禄不及養哀思不自堪未至縣卒荀匠字文師潁隂人晉太保朂九世孫也祖瓊年十五復兄仇於成都市以孝聞宋元嘉末度淮逢武陵王舉義為元凶追兵所殺贈員外郎散騎侍郎父法起仕齊安復令卒官匠號慟氣絶身體皆冷至夜乃蘇既而奔喪每宿江渚商旅不忍聞其哭聲天監元年其兄斐為鬱林太守征俚賊為流矢所中死於陣喪還匠迎于豫章望舟投水傍人赴救僅而得存及至家貧不時葬居父憂并兄服歴四年不出廬户自括髪不復櫛沐髪皆禿落哭無時聲盡則繼之以泣目眥皆爛形骸枯顇皮骨裁連雖家人不復識郡縣以状言武帝詔遣中書舎人為其除服擢為豫章王國左常侍匠雖即吉而毁顇逾甚外祖孫謙誡之曰主上以孝臨天下汝行過古人故擢汝此職非惟君父之命難拒故亦揚名後世所顯豈獨汝身哉匠乃拜竟以毁卒吉翂字彦霄馮翊蓮勺人也家居襄陽翂㓜有孝性年十一遭所生母憂水漿不入口殆將滅性親黨異之天監初父為吳興原鄉令為吏所誣逮詣廷尉翂年十五號泣衢路祈請公卿行人見者皆為隕涕其父理雖清白而恥為吏訊乃虛自引咎罪當大辟翂乃撾登聞鼓乞代父命武帝異之尚以其童幼疑受教於人𠡠廷尉蔡法度嚴加脅誘取其款實法度乃還寺盛陳徽纆厲色問曰爾求代父死𠡠已相許便應伏法然刀鋸至劇審能死不且爾童孺志不及此必為人所教姓名是誰若有悔異亦相聽許對曰囚雖䝉弱豈不知死可畏憚顧諸弟㓜藐唯囚為長不忍見父極刑自延視息所以内斷胷臆上千萬乗今欲殉身不測委骨泉壤此非細故奈何受人教邪法度知不可屈撓乃更和顔誘語之曰主上知尊侯無罪行當釋亮觀君神儀明秀足稱佳童今若轉辭􅄑父子同濟奚以此妙年苦求湯鑊翂曰凡鯤鮞螻蟻尚惜其生况在人斯豈願虀粉但父挂深劾必正刑書故忍殞仆冀延父命翂初見囚獄掾依法備加桎梏法度矜之命脱其二械更令著一小者翂弗聽曰翂求代父死死囚豈可減乎竟不脱械法度以聞帝乃宥其父丹陽尹王志求其在廷尉故事并諸鄉居欲以嵗首舉充純孝翂曰異哉王尹何量翂之薄夫父辱子死斯道固然若翂有靦面目當其此舉則是因父買名一何甚辱拒之而止年十七應辟為本州主簿出監萬年縣攝官期月風化大行自雍還郢湘州刺史栁忱復召為主簿後秣陵鄉人裴儉丹陽郡守臧盾揚州中正張仄連名薦翂以為孝行純至明通易老𠡠付太常旌舉初翂以父陷罪因成悸疾後因發而卒甄恬字彦納中山無極人也世居江陵數嵗喪父哀感有若成人家人矜其小以肉汁和飯飼之恬不肯食年八嵗常問其母恨生不識父遂悲泣累日忽若有見言其形貌則其父也時以為孝感家貧養母常得珍羞及母亡居喪廬於墓側有鳥元黄雜色集於廬樹恬哭則鳴哭止則止又有白鳩白雀栖宿其廬州將始興王憺表其行状詔旌門閭加以爵位恬官至安南行參軍趙㧞扈新城人也兄震動富於財太守樊文茂求之不已震動怒曰無厭将及我文茂聞其語聚其族誅之㧞扈走免亡命聚黨至社樹呪曰文茂殺㧞扈兄今欲報之若事克斫樹處更生不克即死三宿三枿生十丈餘人間傳以為神附者十餘萬既殺文茂轉攻旁邑将至成都十餘日戰敗退保新城求降文茂黎州刺史文熾弟襄陽人也韓懐明上黨人也客居荆州十嵗母患尸疰每發輙危殆懐明夜於星下稽顙祈禱時寒甚切忽聞香氣空中有人曰童子母湏臾即差無勞自苦未曉而母平復鄉里以此異之十五喪父㡬至滅性負土成墳賻助無所受免喪與鄉人郭麻俱師南陽劉虬虬嘗一日廢講獨居涕泣懐明竊問虬家人答云是外祖亡日時虬母亦已亡矣懐明聞之即日罷學還家就養虬歎曰韓生無邱吾之恨矣家貧肆力以供甘脆嬉怡膝下朝夕不離母側母年九十以壽終懐明水漿不入口一旬號哭不絶聲有雙白鳩巢其廬上字乳馴狎若家禽焉服釋乃去及除喪蔬食終身衣衾無所改天監初刺史始興王憺表言之州累辟不就卒于家褚修吳郡錢唐人也父仲都善周易為當時之冠天監中歴位五經博士修少傳父業武陵王紀為揚州引為宣惠參軍兼限内記室修性至孝父喪毁瘠過禮因患冷氣及丁母憂水漿不入口二十三日每號慟輙嘔血遂以毁卒張景仁廣平人也父天監初為同縣韋法所殺景仁時年八嵗及長志在復讎普通七年遇法於公田渚手斬其首以祭父墓事竟詣郡自縳乞依刑法太守蔡天起上言於州時簡文在鎮乃下教襃美之原其罪下屬長蠲其一戸租調以旌孝行又天監中宣城宛陵女子與母同牀眠母為猛虎所取女啼號随拏猛虎行數十里獸毛落盡虎乃置其母而去女抱母猶有氣息經時乃絶鄉里言於郡縣太守蕭琮表上詔表門閭又霸城王整之姊嫁為衛敬瑜妻年十六而敬瑜亡父母舅姑咸欲嫁之誓而不許乃截耳置盤中為誓乃止遂手為亡壻種樹數百株墓前栢樹忽成連理一年許還復分散女乃為詩曰墓前一株栢根連復並枝妾心能感木頽城何足竒所住戸有燕巢常雙飛來去後忽孤飛女感其偏栖乃以縷繫脚為誌後嵗此燕果復更來猶帶前縷女復為詩曰昔年無偶去今春猶獨歸故人恩既重不忍復雙飛雍州刺史西昌侯藻嘉其美節乃起樓於門題曰貞義衛婦之閭又表於臺後有河東劉景昕事母孝謹母常病癖三十餘年一朝而瘳鄉里以為景昕誠感荆州刺史湘東王繹辟為主簿陶子鏘字海育丹陽秣陵人也父延尚書比部郎兄尚宋末為倖臣所怨被繫子鏘公私緣訴流血稽顙行路嗟傷逢謝超宗下車相訪回入縣詣建康令勞彦逺曰豈忍見人昆季如此而不留心勞感之兄得釋母終居喪盡禮與范雲鄰雲每聞其哭聲必動容改色欲相申薦㑹雲卒初子鏘母嗜蓴母沒後恒以供奠武帝義師初至此年冬營蓴不得子鏘痛恨慟哭而絶久之乃蘇遂長斷蓴味成景儁字超范陽人也祖興仕魏為五兵尚書父安樂淮陽太守天監六年常邕和殺安樂以城内附景儁謀復讎因殺魏宿預城主以地南入普通六年邕和為鄱陽内史景儁購人刺殺之未久重購邕和家人鴆殺其子弟噍類俱盡武帝義之每為屈法景儁家讎既雪每思報効後除北豫州刺史侵魏所向必摧其智勇時以比馬先琕兼有政績見懐北豫州吏民樹碑紀徳卒諡曰忠烈云李慶緒字孝緒廣漢郪人也父為人所害慶緒九嵗而孤為兄所養日夜號泣志在復讎投州將陳顯達仍於部伍白日手刃其仇自縳歸罪州將義而釋之天監中為東莞太守丁母憂去職廬于墓側每慟哭嘔血數升後為巴郡太守號良吏累遷衛尉封安陸縣侯益州一二百年無復貴仕慶緒承恩至此便欲西歸尋徙太子右衛率未拜而卒謝藺字希如陳郡陽夏人晉太傅安之八世孫也父經魏北中郎諮議參軍藺五嵗時父未食乳媪欲令先飯藺終不進舅阮孝緒聞之歎曰此兒在家則曽子之流事君則藺生之匹因名曰藺稍授以經史過目便能諷誦孝緒每曰吾家陽元也及丁父憂晝夜號慟毁瘠骨立母阮氏常自守視譬抑之服闋吏部尚書蕭子顯嘉其至行擢為王府法曹行參軍累遷外兵記室參軍時甘露降士林館藺獻頌武帝嘉之有詔使製北兖州刺史蕭楷徳政碑又奉詔令製宣城王奉述中庸頌後為兼散騎常侍使魏㑹侯景入附境上交兵藺母既慮不得還感氣而卒及藺還入境夜夣不祥旦便投列馳歸及至號慟嘔血氣絶久之水漿不入口每哭眼耳口鼻皆血流經月餘日因夜臨而卒所製詩賦碑頌數十篇行於世子貞亦有至行陳史有傳庾沙彌潁川􅋣陵人晉司空氷之六世孫也父佩玉仕宋位長沙内史昇明中坐沈攸之事誅時沙彌始生及年五嵗所生母為製采服輙不肯服母問其故流涕對曰家門禍酷用是何為及長終身布衣蔬食為中軍田曹行參軍嫡母劉氏寢疾晨昬侍側衣不解帶或應針炙輙以身先試及母亡水漿不入口累日初進大麥薄飲經十旬方為薄粥終喪不食鹽酢冬日不衣綿纊夏日不解縗絰不出廬户晝夜號慟隣人不忍聞所坐薦淚霑為爛墓在新林忽生旅松百許株枝葉鬱茂有異常松劉好噉甘蔗沙彌遂不食焉宗人都官尚書詠表言其状應純孝之舉武帝召見嘉之以補歙令還除邵陵王參軍事随府㑹稽復丁所生母憂喪還都濟浙江中流遇風舫将覆沒沙彌抱柩號哭俄而風定咸以孝感所致後卒於長城令子持亦有孝行列在陳史江紑字含絜考城人也父蒨光禄大夫紑性至孝年十三父蒨患眼紑侍疾将期月衣不解帶夜夢一僧云患眼者飲慧眼水必差及覺説之人莫能解者紑第三叔禄與草堂寺智者法師善往訪之智者曰無量壽經云慧眼見真能度彼岸蒨乃因智者啟捨同夏縣界牛屯里舎為寺乞賜嘉名𠡠答云純臣孝子往往感應晉世顔含遂見㝠中送藥又近見智者知卿第二息夣云飲慧眼水然慧眼則是五眼之一號若欲造寺可以慧眼為名及就創造泄故井井水清洌異於常泉取之洗眼及煮藥稍覺有瘳因此遂差時人謂之孝感南康王為徐州召為迎主簿紑性沈靜好荘老元言尤善佛義不樂仕進及父卒紑廬于墓側終日號慟不絶聲月餘竟卒子總自有傳陳殷不害字長卿陳郡長平人也祖汪齊豫章王行參軍父髙明梁尚書兵部郎不害性至孝居父憂過禮由是少知名家世儉約居甚貧窶有弟五人皆㓜弱不害事老母養少弟勤劇無所不至士大夫以篤行稱之年十七仕梁為廷尉平長於政事兼飾以儒術名法有輕重不便者輙上書言之多見納用大同五年兼東宫通事舎人時朝政多委東宫不害與舎人庾肩吾直日奏事梁武帝嘗謂肩吾曰卿是文學之士吏事非卿所長何不使殷不害來邪其見知如此簡文以不害善事親賜其母蔡氏錦裙襦氊席被褥畢備侯景之亂不害從簡文入臺及臺城陷簡文在中書省景帶甲將兵入朝陛見過謁簡文景兵皆羌胡雜種衝突左右侍衛者莫不驚恐辟易唯不害與中庶子徐摛侍側不動及簡文帝為景所幽遣人請不害與居處景許之不害供侍益謹元帝立以不害為中書郎兼廷尉卿因將家屬西上江陵之陷不害失母所在時甚寒氷雪交下凍死者填滿溝壑不害行哭尋求聲不暫輟遇見死人溝中即投身捧視舉體凍僵水漿不入口者七日始得母屍憑屍而哭每輙氣絶行路皆為涕泣於江陵權殯與王襃庾信俱入長安自是蔬食布衣枯槁骨立見者莫不哀之大建七年自周還陳除司農卿遷晉陵太守在郡感疾詔以光禄大夫徵還養疾後主即位加給事中初不害之還也周留其長子僧首因居關中禎明三年陳亡僧首來迎不害道卒年八十五不害弟不佞字季卿少立名節居父喪以至孝稱好讀書尤長吏術梁承聖初為武康令時兵荒饑饉百姓流移不佞撫循招集襁負至者以千數㑹江陵陷而母卒道路隔絶不得奔赴四載之中晝夜號泣居處飲食常為居喪之禮武帝受禪除婁令至是第四兄不齊始於江陵迎喪柩歸葬不佞居處之節如始聞問若此者又三年身自負土手植松栢每嵗時伏臘必三日不食文帝時兼尚書左丞遷東宫通事舎人及廢帝嗣位宣帝為太傅録尚書輔政甚為朝望所歸不佞素以名節自立又受委東宫乃與僕射到仲舉中書舎人劉師知尚書左丞王暹等謀矯詔出宣帝衆人猶豫未敢先發不佞乃馳詣相府面宣詔㫖令相王還第及事發仲舉等皆伏誅宣帝雅重不佞特赦之免其官而已及即位以為軍師始興王諮議參軍後兼尚書左丞加通直散騎常侍卒官不佞兄不疑不占不齊並早亡事第二寡嫂張氏甚謹所得奉禄不入私室長子梵童位尚書金部郎謝貞字元正陳郡人梁兼散騎常侍藺之子也貞㓜聰敏有至性祖母阮氏先苦風眩每發便一二日不能飲食貞時年七嵗祖母不食貞亦不食往往如此親族竒之母王氏授以孝經論語讀訖便誦八嵗嘗為春日閑居五言詩從舅尚書王筠竒其有佳致謂所親曰此兒方可大成至如風定花猶落乃追步恵連矣年十三通五經尤善左氏春秋工草𨽻蟲篆十四丁父艱號頓於地絶而復蘇者數矣初貞父藺居阮氏憂不食泣血而卒家人懼貞復然從父洽族兄暠將往華嚴寺請長爪禪師為貞説法仍謂貞曰孝子既無兄弟湏極自愛若毁至滅性誰當養母自後少進饘粥及魏克江陵入長安暠逃難番禺貞母出家于宣明寺及武帝受禪暠還鄉里供養貞母將二十年初貞在周嘗侍周武帝愛弟趙王招讀招厚禮之聞其獨處必晝夜涕泣私問知母在鄉乃謂曰寡人若出居藩當遣侍讀還家後數年招果出鎮因辭面奏請放貞還帝竒招仁愛遣随聘使杜子暉歸國是嵗大建五年也始自周還時始興王叔陵為揚州刺史引祠部侍郎阮卓為記室辟貞為主簿尋遷府録事參軍領丹陽丞貞知叔陵有異志因與卓自疎每有游宴輙以疾辭未嘗參預叔陵雅重之弗之罪也及叔陵肆逆唯貞與卓不坐再遷南平王友掌記室事府長史汝南周確新除都官尚書請貞為讓表後主覽而竒之及問知貞所作因𠡠舎人施文慶曰謝貞在王家未有禄秩可賜米百石以憂去職頃之𠡠起還府累啟固辭𠡠不許貞哀毁羸瘠終不能之官時尚書右丞徐祚左丞沈客卿來候貞見其形體骨立祚等愴然徐喻之貞因更感慟氣絶良久二人涕泣不能自勝憫黙而出祚謂客卿曰信哉孝門有子客卿曰謝公家傳至孝士大夫誰不仰此止恐不能起如何吏部尚書姚察與貞友善及貞病篤察往省之問以後事貞曰孤子釁禍所集將随灰壤族子凱等粗自成立已有疏付之此固不足仰塵厚徳弱兒年甫六嵗名靖字依仁情累所不能忘敢以為託耳是夜卒後主問察曰謝貞有何親屬察以靖啟即勑長給衣糧初貞之病有遺疏告族子凱氣絶之後若依僧家尸陁林法是吾所願正恐過為獨異可用薄板周身載以露車覆以草席坎山次而埋之又靖年尚小未閲人事但可三月施小牀設香水盡卿兄弟相厚之情即除之無益之事勿為也司馬暠字子昇河内温人也髙祖柔之晉侍中以南頓王孫紹晉齊文獻王攸後父子産即梁武帝之外兄也位岳陽太守暠㓜聰警有至性年十二丁内艱孺慕過禮水漿不入口殆經一旬每號慟必至悶絶父母喻之令進粥然猶毁瘠骨立服闋以姻戚子弟預入問訊梁武帝見之歎息良久字其小字謂其父曰昨見羅兒顔面顦顇使人惻然便是不墜家風為有子矣釋褐太學博士累遷正員郎丁父艱哀毁愈甚廬于墓側日進薄麥粥一升墓在新林連接山阜舊多猛虎暠結廬數載豺狼絶迹常有兩鳩栖宿廬所馴狎異常承聖中除太子右庶子魏克江陵随例入周而梁宗屠滅太子殯瘞失所及周受禪暠以宫臣乃抗表求還江陵改葬辭甚酸切周朝優詔答之即𠡠荆州以禮安厝大業八年暠自周還宣帝特降殊禮歴位通直散騎常侍太中大夫卒有集十卷子延義字希忠以沈敏好學初随父入闗丁母憂居喪過禮及暠還都延義乃躬負靈櫬晝伏宵行冐履氷雪手足皸瘃至郡遂致攣廢數年乃愈位司徒從事中郎張昭字徳明吳郡吳人也幼有孝性父虞常患消渇嗜鮮魚昭乃身自結網捕魚以供朝夕弟乾字元明聰敏好學亦有至性及父卒兄弟並不衣綿帛不食鹽酢日唯食一升麥屑粥每一感慟必致嘔血鄰里聞之皆為涕泣父服未終母陸氏又卒兄弟遂六年哀毁形容骨立家貧未得大葬遂布衣蔬食十有餘年杜門不出屏絶人事時衡陽王伯信臨郡舉乾孝亷固辭不就兄弟並因毁成疾昭一眼失明乾亦中冷苦癖年並未五十終于家子允俱絶宣帝時有太原王知元者僑居㑹稽剡縣居家以孝聞及丁憂哀毁而卒帝嘉之詔改所居清苦里為孝家里後魏趙琰字叔起天水人也父温字思恭博學有髙名為姚泓天水太守劉裕滅泓遂歿於氐氐王楊難當稱藩太武以温為難當府司馬卒于仇池令初苻氏亂琰為乳母攜奔壽春年十四乃歸孝心色養餁熟之際必親調之皇興中京師儉婢簡粟糶之琰遇見切責𠡠留輕粃嘗送子應冀州聘室從者於路遇得一羊行三十里而琰知之令送於本處又過路旁主人設羊羮琰訪知盗殺卒辭不食遣人買耜刃得剰六耜即命送還刃主刃主髙之義而不受琰命委之而去初為兖州司馬轉團城鎭副將還京為淮南王他府長史時禁制甚嚴不聽越關葬於舊兆琰積四十餘年不得葬二親及蒸嘗拜獻未嘗不嬰慕卒事每於時節不受子孫慶賀年餘耳順而孝思彌篤慨嵗月推移遷􅉎無冀乃絶鹽菜斷諸餚味食麥而已年八十卒遷都洛陽子應等乃還鄉葬焉應弟煦字賔育好音律以善歌聞於世位秦州刺史長孫慮代人也母因飲酒其父真呵叱之誤以杖擊便即致死真為縣囚執處以重坐慮列辭尚書云父母忿爭本無餘惡直以謬誤一朝横禍今母喪未殯父命旦夕慮兄弟五人並沖幼慮身居長今年十五有一女弟尚始四嵗更相鞠養不能保全父若就刑交墜溝壑乞以身代老父命使嬰弱衆孤得䝉存立尚書奏云慮於父為孝子於弟為仁兄尋情究状特可矜感孝文帝詔特恕其父罪以從逺流乞伏保髙車部人也父居獻文時為散騎常侍領牧曹尚書賜爵寧國侯以忠謹慎密常在左右出納詔命賜宫人河南宗氏生伏保宗氏亡後賜以宫人申氏宋太子左率申坦兄女也嵗餘居卒申撫養伏保性嚴肅捶罵切至而伏保奉事孝謹初無恨色襲父侯爵例降為伯稍遷左中郎将每請禄賜在外公私尺丈所用無不白知出為善無鎮將申年踰八十伏保手製馬轝親自扶接申欣然随之申亡伏保解官奉喪還洛復為長兼南中郎将卒孫益徳樂安人也其母為人所害益徳童幼為母復仇還家哭於殯以待縣官孝文文明太后以其幼而孝又不逃罪特免之董洛生代人也居父喪過禮詔遣秘書中散温紹伯奉璽書慰之令自抑割以全孝道又詔其宗親使相喻奨勿令有滅性之譏楊引上黨郡襄垣人也三嵗喪父為叔所養母年九十二終引年七十五哀毁過禮三年服畢恨不識父追服斬衰食粥麤服誓終身命經十三年哀慕不改為郡縣鄉閭三百餘人上状稱美有司奏宜旌賞復其一門樹其純孝詔别𠡠集書標楊引至行又可假以散員之名閻元明河東安邑人也少而至孝行著鄉閭太和五年除北随郡太守元明以違離親養興言悲慕母亦慈念泣淚喪明悲號上訴許歸奉養一見其母母目便開刺史吕壽恩列状上聞詔下州郡表為孝門復其租調兵役令終母年母亡服終心喪積載每忌日悲慟傍鄰昆弟雍和尊卑諧穆安貧樂道白首同歸又猗氏縣人令狐仕兄弟四人早喪父泣慕十載奉養其母孝著鄉邑而力田積粟博施不已又河東郡人楊風等七百五十人列稱樂户皇甫奴兄弟雖沈屈兵伍而操尚彌髙奉養繼親世著恭孝之稱又東郡小黄縣人董吐渾與兄養事親至孝三世同居閨門有禮景明初畿内大使王凝奏請表異詔從之吳悉達河東聞喜人也兄弟三人年並幼小父母為人所殺四時號慕悲感鄉鄰及長報仇避地永安昆弟同居四十餘載閨門和睦讓逸競勞雖於儉年糊饘不繼賔客經過必傾所有每守宰殯喪私辦車牛送終葬所鄰人孤貧窘困者莫不解衣輟糧以相賑恤鄉閭五百餘人詣州稱頌焉刺史以悉達兄弟行著鄉里版贈悉達父勃海太守悉達後欲改葬亡失墳墓推尋弗獲號哭之聲晝夜不止呌訴神祗忽於悉達足下地陷得父銘記因遷葬曽祖已下三世九喪傾盡資業不假於人哀感毁悴有過初喪有司奏聞標閭復役以彰孝義時有齊州人崔承宗其父於宋世仕漢中母喪因殯彼後青徐歸魏遂為隔絶承宗性至孝萬里投險偷路負喪還京師黄門侍郎孫惠蔚聞之曰吾於斯人見亷范之情矣於是弔贈盡禮如舊相識王續生滎陽京縣人也遭繼母憂居喪杖而後起及終禮制鬢髪盡落有司奏聞宣武詔標旌門閭甄其徭役李顯達潁川陽翟人也父喪水漿不入口七日鬢髪堕落形體枯悴六年廬於墓側哭不絶聲殆於滅性州牧髙陽王雍以状奏靈太后詔表其門閭倉䟦滎陽京縣人也喪母水漿不入口五日吐血數升居憂毁瘠見稱鄉里有司奏聞孝武帝詔標門閭張昇滎陽京縣人也喪父飲水絶鹽哀毁過度形骸枯悴骨立而已髪落殆盡聲聞鄉里盗賊不侵其境州表以聞標其門閭王崇字乾邕陽夏雍邱人也兄弟並以孝稱身勤稼穡以養二親仕梁州鎮南府主簿母亡杖而後能起鬢髪堕落未及葬權殯宅西崇廬於殯所晝夜哭泣鳩鴿羣至有一小鳥素質黒眸形大於雀栖於崇廬朝夕不去母喪始闋復丁父憂哀毁過禮是年陽夏風雹其所經過之處禽獸暴死草木摧折至崇田畔風雹便止禾麥十頃無所損落及過崇地風雹如初咸稱孝行所感崇雖服除仍居墓側於其室前生草一根莖葉甚茂人莫能識至冬中復有烏巢於崇屋乳養三子毛羽成長馴而不驚守令聞之親自臨視州以聞奏標其門閭郭文恭太原平遥人也仕為太平縣令年踰七十父母喪亡文恭孝慕罔極乃居祖父墓次晨夕拜跪跣足負土培祖父二墓寒暑竭力積年不已見者莫不哀歎尚書聞奏標其門閭義行石文徳中山蒲隂人也家著義行太平真君初縣令黄宣在任喪亡宣單貧無期親文徳祖父苖以家財殯葬持服三年奉養宣妻二十餘載及亡又衰絰斂附率禮無闕自苖逮文徳凡刺史守令卒官者皆制服送之五世同居閨門雍睦又梁州上言天水白石縣趙令安孟蘭彊等四世同居行著州里詔並標榜門閭馬八龍武邑武强人也輕財重義友人武遂縣尹靈哲在軍喪亡八龍聞即奔赴負尸而歸以家財殯葬為制緦麻撫其孤遺恩如所生州郡表列詔表門閭門文愛汲郡山陽人也早孤供養伯父母以孝謹聞伯父亡服未終伯母又亡文愛居喪持服六年哀毁骨立鄉人魏仲賢等相與標其孝義石祖興常山九門人也太守田文彪縣令和真等喪亡祖興自出家絹二百餘疋營䕶喪事州郡表列孝文嘉之賜爵二級為上造後拜寧陵令卒吏部尚書李韶奏其節義請加贈諡以奨來者靈太后令如所奏有司諡曰恭邵洪哲上谷沮陽人也縣令范道榮先自㫬城歸款以除縣令道榮鄉人徐孔明妄經公府訟道榮非勲道榮坐除名羈旅孤貧不能自理洪哲不勝義憤遂代道榮詣京師明申曲直經歴寒暑不憚劬勞道榮卒得復雪又北鎮反亂道榮孤單無所歸附洪哲兄伯川復率鄉人來相迎接送達幽州道榮感其誠節訴省申聞詔下州郡標其里閭李几博陵安平人也七世共居同財家有二十二房一百九十八口長幼濟濟風禮著聞至於作役卑幼競集鄉里嗟美標其門閭王閭北海密人也數世同居有百口又泰山劉業興四世同居魯郡蓋儁六世同居並共財産家門雍睦鄉里敬異有司申奏皆表門閭北齊陸卭字雲駒代人也祖昕之魏安北將軍相州刺史父子彰中書監家世有傳卭少機悟美風神好學不倦博覽羣書五經多通大義善屬文甚為河間邢邵所賞邵又與子彰交游嘗謂子彰曰吾以卿老蚌遂出明珠意欲為羣拜紀可乎由是名譽日髙雅為搢紳所推許起家員外散騎侍郎歴文襄大將軍主簿中書舎人兼中書侍郎以本職兼太子洗馬自梁魏通和嵗有交聘卭每兼官讌接在席賦詩卭必先成雖未能盡工以敏速見美除中書侍郎修國史以父憂去職居喪盡禮哀毁骨立詔以本官起文襄時鎭鄴嘉其至行親詣門以慰勉之卭母魏上庸公主初封藍田髙明婦人也甚有志操卭昆季六人並主所出故邢邵嘗謂人云藍田生玉固不虚矣主教訓諸子皆以義方雖創巨痛深出於天性然動依禮度亦母氏之訓焉卭兄弟相率廬於墓側負土成墳朝廷所嗟尚發詔襃揚改其所居里為孝終里服竟當襲不忍嗣侯使迄未應受天保初常山王薦卭器幹文宣面授給事黄門侍郎遷吏部郎中上洛王思宗為清都尹辟為邑中正食貝邱縣幹遭母喪哀慕毁悴殆不勝喪遂至沈篤頓伏牀枕又成風疾第五弟摶遇疾臨終謂其兄弟曰大兄尫病如此性至慈愛摶之死日必不得使大兄知之號泣聲必不可聞徹致有感動家人至於祖載方始告之卭聞而悲痛一慟便絶年四十八卭自在朝行篤慎周密不説人短不伐已長言論清逺有人倫鑒裁朝野甚悲惜之贈衛將軍青州刺史諡曰文所著文章十四卷行於世齊之郊廟諸歌多卭所制子乂字旦襲爵始平侯别有傳周杜叔毗字子弼其先京兆杜陵人也徙居襄陽父漸梁邊城太守叔毗早嵗而孤事母以孝聞勵精好學仕梁為宜豐侯蕭修府中直兵參軍大統十七年文帝令大将軍達奚武圍修於南鄭修令叔毗詣闕請和文帝見而禮之使未及還而修中直兵曹䇿參軍劉曉謀以城降時叔毗兄君錫為修中記室參軍從子映録事參軍映弟晣中直兵參軍各領部曲䇿等忌之懼其不同已遂誣以謀叛擅加害焉及修降䇿至長安叔毗朝夕號泣具申寃状朝廷以事在歸附之前不可追罪叔毗内懐憤惋志在復讎然恐違朝憲坐及其母遂沈吟積時母知其意謂叔毗曰汝兄横罹禍酷痛切骨髄若能報之曹䇿朝死吾以夕沒亦所甘心汝何疑焉叔毗拜受母言遂白日手刃䇿於京城斷首刳腹解其肢體然後面縛請就戮文帝嘉其志氣特命舎之遭母憂哀毁骨立殆不勝喪服闋晉公䕶辟為中外府樂曹參軍累遷陜州刺史後從衛國公南討軍敗為陳人所禽陳人將降之辭色不撓遂被害子亷卿荆可河東猗氏人也性質朴容止有異於人能苦身勤力供養其母随時甘㫖終無匱乏母喪水漿不入口三日悲號擗踊絶而復蘇者數四葬母之後廬於墓側晝夜悲哭負土成墳蓬髪不櫛沐菜食飲水而已可家舊墓塋域極大榛蕪至深去家十餘里而可獨宿其中與禽獸雜處哀感逺近邑里稱之大統中可鄉人以可孝行足以勉勵風俗乃上言焉文帝令州縣表異之及服終之後猶若居喪大冢宰晉公䕶聞其孝行特引見焉與可言論時有㑹於䕶意䕶亦至孝其母閻沒於敵境不測存亡每見可自傷久乖膝下而重可至性及可卒後䕶猶思其純孝遂收可妻子於京城常給其衣食秦族上郡洛川人也祖白父雚並有至性聞於閭里魏太和中版白潁州刺史大統中版雚鄜城郡守族性至孝事親竭力為鄉里所稱及其父喪哀毁過禮每一慟哭酸感行路既以母在常抑割哀情以慰其母意四時珍羞未嘗匱乏與弟榮先復相友愛閨門之中怡怡如也尋而其母又沒哭泣無時唯飲水食菜而已終喪之後猶蔬食不入房室二十許年鄉里咸歎異之其邑人王逵等七十餘人上其状有詔表其門閭榮先亦至孝遭父喪哀慕不已遂以毁卒邑里化其孝行文帝嘉之乃下詔襃美其行贈滄州刺史以旌厥異皇甫遐字永賢河東汾隂人也累世寒微而鄉里稱其和睦遐性純至少喪父事母以孝聞保定末遭母䘮乃廬於墓側負土為墳復於墓南作一禪窟隂雨則穿窟晴霽則營墓曉夕勤力未嘗暫停積以年嵗墳髙數丈周廻五十餘步禪窟重臺兩匝而成十有二室中間行道容百人遐食粥枕土櫛風沐雨形容枯悴家人不識當其營墓之初乃有鴟鳥各一徘徊悲鳴若助哀者經月餘乃去逺近聞其至孝競以米麵遺之遐皆受而不食悉以營佛齋焉郡縣表上其状有詔旌異之張元字孝始河北芮城人也祖成假平陽郡守父延儁仕州郡累為功曹主簿並以純至為鄉里所推元性謙謹有孝行微渉經史然精釋典年六嵗其祖以其夏中熱欲將元就井浴元固不肯從祖謂其貪戱以杖擊其頭曰汝何為不肯對曰衣以盖形為覆其䙝元不能䙝露其體於白日之下祖異而捨之南鄰有二杏樹杏熟多落元園中諸小兒競取而食之元所得者送還其主村陌有狗子為人所棄者元即收而養之其叔父怒曰何用此為將欲更棄之對曰有生之類莫不重其性命若天生天殺自然之理今為人所棄而死非其道也若見而不收養無仁心也是以收而養之叔父感其言遂許焉未㡬乃有狗母銜一死兎置元前而去及元年十六其祖喪明三年元甞憂泣晝夜讀經禮佛以祈福祐後讀藥師經見盲者得視之言遂請七僧燃七燈七日七夜轉藥師經行道每言天人師乎元為孫不孝使祖喪明今以燈光普施法界願祖目見明元求代闇如此經七日其夜夣見一老翁以金鎞療其祖目謂元曰勿憂悲也三日後汝祖必自差元於夣中喜躍遂即驚覺乃遍告家人居三日祖目果明其後祖卧疾再周兀恒随祖所食多少衣冠不解旦夕扶持及祖沒號慟絶而復蘇随其父水漿不入口三日鄉里咸歎異之縣博士楊軌等二百餘人上其状有詔表其門閭隋田徳懋髙平人也祖𢎞周大司空少保襄州總管父仁恭仕周歴隋位左武衛大將軍𢎞自有傳徳懋少以孝友知名開皇初以父軍功賜爵平原郡公授太子千牛備身丁父艱哀毁骨立廬於墓側負土成墳髙祖聞而嘉之遣員外散騎侍郎元志就弔焉復降璽書存問賜帛及米下詔表其閭大業初位尚書駕部郎卒官薛濬字道賾河東汾隂人也父琰周渭南太守濬少孤養母以孝聞幼好學有至行周天和中襲爵虞城侯位新豐令開皇中歴尚書虞部考功侍郎髙祖聞濬事母孝以其母老賜輿服几杖四時珍味當世榮之後其母疾病濬貌甚憂顇親故弗之識暨丁母艱詔鴻臚監䕶喪事歸葬夏陽時隆冬極寒濬衰絰徒跣冐犯霜雪自京及鄉五百餘里足凍堕指創血流離朝野為之傷痛州里賵助一無所受尋起令視事上見其毁瘠過甚為之改容顧羣臣曰吾見薛濬哀毁不覺悲感傷懐嗟異久之濬竟不勝喪病且卒其弟謨時為晉王府兵曹參軍事在揚州濬遺書於謨曰吾以不造幼丁艱酷窮游約處屢絶簞瓢晚生早孤不聞詩禮賴奉先人厥貽之訓獲禀母氏聖善之規負笈裹糧不憚艱逺從師受業欲罷不能砥行厲心困而彌篤服膺教義爰至長成自釋耒登朝于茲二十三年矣雖官非聞達而禄喜逮親庶保期頤得終色養何圖精誠無感禍酷薦臻兄弟俱被奪情苫廬靡申哀訴是用叩心泣血霣氣摧魂者也既而創巨釁承不勝荼毒啟手啟足􅄑及全歸使夫死而有知得從先人於地下矣豈非至願哉但念爾伶俜孤宦逺在邊服顧此悢悢如何可言適已有書冀得與汝面訣忍死待汝已歴一旬汝既未來便成今古􅃡然永别為恨何言勉之哉勉之哉書成而絶髙祖為之屑涕降使齎册書弔祭濬性清儉死日家無遺財濬初為童兒時與族中兒戱澗濵見一黄蛇有角及足召羣童共視了無見者以為不祥歸大憂悴母問之以實對時有胡僧詣宅乞食母以告之僧曰此蛇之吉應且此兒早有名位然壽不過六七耳言終而出忽然不見後終四十二六七之言驗矣子乾福武安郡司倉書佐王頒字景彦太原祁人也父僧辯梁太尉梁史有傳頒少俶儻有文武幹局其父平侯景留頒質於荆州荆州陷頒亦入闗聞其父為陳武帝所殺號慟而絶食頃乃蘇哭不絶聲毁瘠骨立至服闋日常布衣蔬食藉藁而卧周明帝嘉之召授左侍上士累遷漢中太守尋拜儀同三司開皇初以平蠻功加開府封蛇邱縣公獻取陳之䇿上覽而異之召見言畢歔欷上為之改容及大舉伐陳頒自請行率兵數百人從韓擒虎先鋒夜濟力戰被傷恐不堪復鬭悲感嗚咽夜中睡夢有人授藥比寤而瘡不痛時人以為孝感及陳滅頒密召父在時士卒得千餘人對之涕泣不止其間壮士或問曰郎君讎恥已雪而悲哀不止者將不為覇先早死不得手刃之邪請發其邱壠斵櫬焚骨亦可以申孝心矣頒頓顙陳謝額盡出血答曰此自夙心然其為墳塋甚大恐一宵發掘不及其屍更至明朝事乃彰露必至不濟諸人乃請具鍬鍤於是夜發其陵剖棺見武帝鬚並不落其本皆出自骨中頒遂焚骨取灰投水中而飲之既而自縛歸罪於晉王王表其狀髙祖曰朕以義平陳王頒所為亦孝義之道何忍罪之舎而不問有司録其戰功將加柱國賜物五千叚頒固辭曰臣緣國威靈得雪怨恥本心徇私非是為國所加官賞終不敢當髙祖從之拜代州刺史甚有恵政後轉齊州刺史卒官弟頍見文苑傳田翼不知何許人也養母以孝聞其後母卧疾嵗餘翼親易燥濕母食則食母不食則不食開皇中母患暴痢翼謂中毒藥遂親嘗穢惡母終翼一慟而絶妻亦不勝哀而死鄉人共厚葬之楊慶字伯悦河間人也祖元父剛並以至孝知名慶美容止性辯慧年十六齊國子博士徐遵明見而異之及長頗渉書記年二十五郡察孝亷以侍養不赴母有疾不解襟帶者七旬及居母憂哀毁骨立負土成墳齊文宣表其門閭賜帛及綿粟各有差髙祖受禪屢加襃賞擢授儀同三司版平陽太守卒於家紐因字孝政河東安邑人也性至孝周武成中父母喪廬於墓側負土成墳廬前生麻一株髙丈許圍之合拱枝葉鬱茂冬夏恒青有鳥棲上因舉聲哭鳥即悲鳴時人異之周武帝表其閭擢授甘棠令開皇初卒子士雄少質直孝友喪父復廬於墓側負土成墳其庭前有一槐樹先甚鬱茂及士雄居喪樹遂枯死服闋還宅死槐復榮髙祖聞之歎其父子至孝下詔襃揚號其居為累徳里劉仕儁彭城人也性至孝丁母喪絶而復蘇者數矣勺飲不入口者七日廬於墓側負土成墳列植松柏虎狼馴擾為之取食髙祖受禪表其門閭翟普林楚邱人也事親以孝聞躬耕色養不應州郡辟命鄉里謂為楚邱先生後父母疾親易燥濕不解衣者七旬大業初父母俱終哀毁殆將滅性廬於墓側負土成墳盛冬不衣繒絮唯著單縗而已家有烏犬随其在墓若普林哀臨犬亦悲號見者嗟異有二鵲巢其廬前柏樹馴狎無所驚懼司𨽻廵察奏其孝感擢為孝陽令李徳饒字世文趙郡平棘人魏贈司徒元忠之後也祖徹齊尚書左丞父純開皇中為介州長史徳饒少聰敏好學有至性弱冠為校書郎仍直内史省參掌文翰轉監察御史糾正不避權貴大業三年遷司𨽻從事每廵四方理􅁈枉襃孝悌雖位秩未通而徳行為當世所重凡與交結皆海内髦彦性至孝父母寢疾輙終日不食十旬不解衣及丁憂水漿不入口七日哀慟嘔血數升及送葬㑹仲冬積雪行四十餘里單縗徒跣號踊㡬絶㑹葬者千餘人莫不為之流涕後甘露降於庭樹有鳩巢其廬納言楊達廵省河北詣廬弔慰之因改所居村名曰孝敬村里為和順里徳饒後為金河縣長未之官屬羣盗蠭起賊帥格謙孫宣雅等十餘頭聚衆於勃海有勑許其歸首謙等懼不敢降以徳饒性行有聞遣奏曰若徳饒來者即相率歸首帝遣徳饒往勃海慰諸賊至冠氏㑹他賊攻陷縣城見害徳饒弟徳佋性重然諾大業末為離石郡司法書佐太守楊子崇特禮之及唐兵起子崇遇害棄尸城下徳佋赴哭盡哀收瘞之至介休詣唐師請葬子崇見許因贈子崇官令徳佋為使者往離石禮葬之華秋汲郡臨河人幼喪父事母以孝聞家貧傭賃為養其母遇患秋容貌毁瘁鬢髪盡改母終遂絶櫛沐髪盡禿落廬於墓側負土成墳有人欲助之者秋輙拜而止之大業初調狐皮郡縣大獵有一兎被逐奔入秋廬中匿秋膝下獵人至廬所異而免之自爾此兎常宿廬中馴其左右郡縣嘉其孝感具以状聞降使勞問表其門閭後羣盗起常往來廬之左右咸相誡曰勿犯孝子鄉里頼秋全者甚衆徐孝肅汲郡人也宗族數十家多以豪侈相尚唯孝肅儉約事親以孝聞雖在幼小宗黨間每有争訟皆至孝肅所平論理短者無不引咎而退孝肅早孤不識父及長問其母父状因畫工圖其形構廟置之而定省焉朔望饗祭養母至孝數十年母老疾孝肅親易燥濕憂悴歴嵗見者愍焉母終孝肅茹蔬飲水盛冬單縗毁瘠骨立祖父母父母墓皆負土成墳廬于墓所垂二紀被髪徒跣以終其身弟備徳卒其子處黙亦廬于墓世稱孝焉義行郎方貴淮南人也少有志尚與從父弟雙貴同居開皇中方貴常於淮水津所寄渡舟人怒之撾方貴臂折至家雙貴問知之恚恨遂向津毆殺船人津者執送之縣以方貴為首當死雙貴從坐當流兄弟爭為首坐縣司不能斷送詣州兄弟各引死州不能定二人爭欲赴水死州以状聞上聞異之特原其罪表其門廬賜物百叚後為州主簿郭世儁字𢎞文太原文水人也家門雍睦七世同居犬豕同乳烏鵲同巢時人以為義感之應州縣上其事髙祖遣平昌公宇文弼詣其家勞問書侍御史栁彧廵省河北表其門閭漢王諒為并州總管聞而嘉歎賜其兄弟二十餘人衣各一襲通志卷一百六十七
