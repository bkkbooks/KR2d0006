body:
  text: 通志卷八十二宋右廸功郎鄭樵漁仲撰宗室傳第五南齊衡陽元王道度鈞始安貞王道生始安王遙光曲江公遙欣子幾安陸昭王􅒺新吳侯景先南豐伯赤斧子穎胄頴逹衡陽公諶臨汝侯坦之髙帝諸子豫章文獻王嶷子子廉乾子恪範子操顯子範雲子範子子弟子子臨川獻王映長沙威王晃武陵昭王煜安成恭王暠鄱陽王鏘桂陽王鑠始興簡王鑑江夏王鋒南平王鋭宜都王鏗晉熙王銶河東王鉉武帝諸子文恵皇太子竟陵文宣王子良子昭胄孫賁廬陵王子卿魚復侯子響安陸王子敬晉安王子懋董僧慧陸超之隨郡王子隆建安王子真西陽王子明南海王子罕巴陵王子倫邵陵王子貞臨賀王子岳西陽王子文衡陽王子峻南康王子琳湘東王子建南郡王子夏文恵諸子巴陵王昭秀桂陽王昭粲明帝諸子巴陵隠王寳義江夏王寳元廬陵王寳源鄱陽王寳夤邵陵王寳修晉熙王寳嵩桂陽王寳貞衡陽元王道度髙帝長兄也始與髙帝俱受學于雷次宗宣帝問次宗二兒學業次宗曰其兄外明其弟内潤皆良璞也仕宋位安定太守卒建元元年髙帝追加封諡無子髙帝以第十一子鈞繼鈞字宣禮年五嵗所生區貴人病便加慘悴左右依常以五色䬳飴之不肯食曰須待姨差年七嵗出繼衡陽元王見髙帝未拜涕泗横流髙帝執其手曰伯叔父猶父勿怨所以令汝出繼以汝有意堪奉蒸嘗故耳即敕外如先給通幰車雉尾扇等事事依正王區貴人卒居喪盡禮服闋當問訊武帝尫羸骨立登車三上不能升乃止典籖曹道人具以聞武帝即幸鈞邸見之愴然還謂褚蓁曰昨見衡陽猶爾毁損卿可數相撫悦先是貴人以華釵冠子并翦刻錦繡中倒炬鳯凰蓮芰星月之屬賜鈞以為玩弄貴人亡後每嵗時及朔望輙開視再拜哽咽見者皆為之悲性好學善屬文與琅邪王智深以文章相㑹濟陽江淹亦游焉武帝謂王儉曰衡陽王須文學當使華實相稱不得止取貴游子弟而已乃以太子舍人蕭敷為文學鈞常手自細書寫五經部為一卷置於巾箱中以備遺忘侍讀賀玠問之曰殿下家自有墳索復何須蠅頭細書别藏巾箱中答曰巾箱中有五經於檢閲既易且一更手寫則永不㤀諸王聞之爭効為巾箱五經巾箱五經自此始也居身清率言未嘗及時事會稽孔珪家起園列植桐柳多構山泉殆窮真趣鈞往游之珪曰殿下處朱門游紫闥詎得與山人交邪答曰身處朱門而情游江海形入紫闥而意在青雲珪大羙之吳郡張融清抗絶俗雖王公貴人視之慠如也惟雅重鈞謂從兄緒曰衡陽王飄飄有陵雲氣其風情素韻彌足可懐融與之游不知老之将至歴位秘書監延興元年為明帝所殺明帝立以永陽王子珉仍本國繼元王為孫子珉字雲璵武帝第二十子也初封義安郡王後改永陽永泰元年見害復以武陵昭王子子坦奉元王後始安貞王道生字孝伯髙帝次兄也宋世位奉朝請卒髙帝即位追加封諡三子長鳯次鸞是為明帝次􅒺是為安陸昭王鳯字景慈仕宋位正員郎卒髙帝即位諡靖世子建武元年追尊為景皇帝妃江氏為后立寝廟於御道西陵曰脩安追封諡鳯曰始安靖王改華林鳯荘門為望賢門太極東堂畫鳯鳥題為神鳥而改鸞鳥為神雀子遙光嗣始安王遙光字元暉生而躄疾髙帝謂不堪奉拜祭祀欲封其弟武帝諫乃以遙光襲爵遷中書侍郎明帝輔政誅賞諸事唯與遙光共謀議勸明帝併殺髙武諸子弟帝以為然建武元年以為前将軍揚州刺史三年進號撫軍将軍遙光好吏事稱為分明頗多慘害足疾不得同朝列常乗轝自望賢門入每與明帝久請間言畢帝索香火明日必有所誅太子不悦學唯曼游是好建康令蔡仲熊為太子講禮未半遙光從容曰文義之事此是士大夫以為伎藝欲求官耳皇太子何用講為上以為然乃停講永泰元年即本號為大将軍給油絡車帝不豫遙光數入侍疾上以親近单少惮忌髙武諸子欲并誅之遙光畫計參議當以次日施行會帝疾甚河東王鉉等七王一夕見殺遙光意也帝崩遺詔加遙光侍中中書令給扶永元元年給班劒二十人即本號開府儀同三司遙光多忌人有餉履者以為戯已大見嫌責劉繪嘗為牋云智不如葵亦以忤㫖遙光輔政見少主淫昬潛結江袥兄弟謀自樹立弟遙欣在荆楚擁兵居上流密相影響遙光常據東府號令使遙欣急下潛謀将發而遙欣病死江袥被誅東昬召遙光入殿告以袥罪遙光懼還省便陽狂號哭自此稱疾不復入臺先是遙光出行還入城風飄儀繖出城外遙光弟遥昌先卒夀春豫州部曲皆歸遙光及遙欣喪還葬武進停東府前渚荆州衆力送者甚盛東昬誅江袥後慮遙光不自安欲轉為司徒還第召入喻㫖遙光慮見殺以八月十二日晡時收集荆豫二州部曲於府東門衆頗怪其異莫知㫖趣也遙光召親人丹陽丞劉渢及城局參軍劉晏中兵參軍曹樹生等并諸傖楚欲以討劉暄為名夜遣數百人破東冶出囚於尚方取仗又召驍騎将軍垣歴生歴生隨信至便勸遙光令率城内兵夜攻䑓輦荻燒城門曰公但乗輿隨後反掌可得遙光意疑不敢出天稍曉遙光戎服至聽事停輿處分上仗登城行賞賜歴生復勸出軍遙光不肯望䑓内自變及日出䑓軍稍至遙光於是戒嚴赦都下東昬詔尚書令徐孝嗣屯衞宫城右将軍蕭坦之屯湘官寺鎮軍司馬曹虎屯青溪大橋太子右率左興盛屯東府東籬門衆軍圍東城遙光遣垣歴生從西門出戰䑓軍屢北殺軍主桑天愛初遙光問諮議參軍蕭暢暢正色拒不從既而暢與撫軍長史沈昭畧奔臺人情大沮十六日歴生從南門出戰因棄矟降為曹虎所禽謂虎曰卿以主上為聖明執政為賢相者則我當死且我今死卿明日亦死遂殺之遙光聞歴生見獲大怒於牀上自竦踊使殺歴生兒其晩臺軍射火箭燒東北角樓至夜城潰遙光還小齋令人反拒左右並踰屋出臺軍主劉國寳時當伯等先入遙光聞外兵至吹滅火扶匐下牀軍人排閤入斬之時年三十二遙光舉事四日而卒舉事之夕月蝕既識者以月為大臣之象蝕而既必滅之道未敗之前夕城内皆夢羣蛇縁城四出各共説之咸以為異及臺軍入城燒屋宇且盡遙光㓜時甚貞正故明帝傾意待之東昬為兒童時明帝使與遙光共齋居止呼遙光為安兄恩情甚至及遙光誅後東昬登舊宫土山望東府愴然呼曰安兄乃嗚咽左右不忍視其見思如此其黨天下知名之士劉渢渢弟謙陸閑閑子絳司馬端崔慶逺皆坐誅曲江公遙欣字重暉始安王遙光弟也宣帝兄西平太守奉之無後以遙欣繼為曽孫遙欣髫齔中便嶷然明帝甚賞識之年十五六便博覽經史弱冠拜中書郎明帝入輔遙欣與兄遙光等參預政事凡所談薦皆得其人延興元年明帝以遙欣為兖州刺史建武元年進號西中郎将封聞喜縣公遷荆州刺史都督改封曲江公明帝子弟弱小晉安王寳義有廢疾故以遙光為揚州居中遙欣居陜西内外威權並出其門遙欣好勇多聚畜武士以為形援永泰元年有魏師詔遙欣以本官領雍州刺史寜蠻校尉移州鎮襄陽魏軍退不行卒贈司空諡康公子幾字德元年十嵗便能屬文早孤有弟九人並㓜幾恩愛篤睦聞於朝野性温和與物無競清貧自立好學善草𨽻書位中書侍郎尚書左丞末年溺釋教為新安太守郡多山水特其所愛適性游履遂為之記卒于官子清亦有文才位永康令遙欣弟遙昌字季暉建武元年封豐城縣公位豫州刺史卒諡憲公安陸昭王􅒺字景業善容止仕宋位中書郎建元元年封安陸侯為五兵尚書出為吳郡太守少時大著風績景陵王子良與之書曰竊承下風數十年來姑蘓未有此政武帝嘉其能累遷左将軍寜蠻校尉雍州刺史加都督􅒺留心辭訟人人呼至案前親自研問有不得理者勉喻之退皆無所恨盜賊竊抄獲者皆赦遣許以自新再犯乃加誅為百姓所畏愛九年卒喪還百姓縁沔水悲泣設祭於峴山為立祠及碑諡曰昭侯明帝少相友愛時為僕射領衛尉表求解職私第展哀詔不許每臨􅒺靈輙痛絶哭不成聲建武元年贈司徒安陸王子寳眰嗣永元元年改封㐮東王東昬廢寳眰望物情歸已坐待法駕既而城内送欵于梁武帝宣徳太后臨朝拜大常寳眰不自安謀反及弟江陵王寳賢霄城公寳宏皆伏誅新吳侯景先髙帝從子也祖爰之員外郎父敬宗始興王國中軍景先少孤有至性隨母孔氏為舅氏鞠飬髙帝嘉之常相提攜及鎮淮隂以景先領軍王自隨防衞城内委以心腹武帝為廣興郡啟髙帝求景先同行除武帝寜朔府司馬自此長相隨逐建元元年為太子左衛率封新吳縣伯甚見委任勢傾天下景先本名道先乃改為景先以避上諱初武帝少年與景先共車行泥路車久故壊至領軍府西門車轅折俱狼狽景先謂帝曰两人脫作領軍亦不得忘今日艱辛及武帝踐阼詔以景先為兼領軍将軍拜日羽儀甚盛傾朝觀曯拜還未至府門中詔相間領軍今日故當無折轅事邪景先奉謝未㡬轉中領軍尋進爵為侯始昇明中沈攸之於荆州起兵武帝時鎮江州盆城景先夜乗城忽聞塹中有小兒呼蕭丹陽未測何人聲聲不絶試問為誰空中應云賊尋當平何事嚴防語訖不復言即窮討之了不見明旦以白帝帝曰攸之自無所至焉知汝後不作丹陽尹也景先曰寜有作理尋而攸之首至及永明三年詔以景先為丹陽尹謂曰此授欲驗往年盆城塹空中言耳後假節司州諸軍事卒諡曰忠侯子毅位北中郎司馬性奢豪好弓馬為明帝所疑忌王晏事敗并䧟誅之南豐伯赤斧髙帝從祖弟也祖隆子衞軍録事參軍父始之冠軍中兵參軍赤斧以和謹為髙帝所知髙帝輔政為黄門侍郎淮陵太守順帝遜位於丹陽故所立宫上令赤斧輔送至宫因留防衞至薨乃還後為雍州刺史在州不營産利勤於奉公遷散騎常侍左衞将軍武帝親遇與蕭景先相比封南豐縣伯遷給事中太子詹事卒於家貧無絹為衾武帝聞之愈加惋惜諡懿伯子頴胄襲爵頴胄字雲長宏厚有父風起家秘書郎髙帝謂赤斧曰頴胄輕朱被身覺其趨進轉羙足慰人意遷太子舍人遭父喪感脚疾數年然後能行武帝有詔慰勉之賜以醫藥除竟陵王司徒外兵參軍晉熙王文學頴胄好文義弟頴基好武勇武帝登烽火樓詔羣臣賦詩頴胄詩合㫖上謂頴胄曰卿文弟武宗室便不乏才上以頴胄勲戚子弟自中書郎除左軍将軍知殿内文武事得入便殿出為新安太守吏民懐之後除黄門郎領四廂直遷衛尉明帝廢立頴胄從容不為同異乃引頴胄預功建武二年進爵為候明帝每存儉約欲鑄壊太官元日上夀銀酒鎗尚書令王晏等咸稱盛徳頴胄曰朝廷盛禮莫過三元此一器既是舊物不足為侈帝不悦後預曲宴銀器滿席頴胄曰陛下前欲壊酒鎗恐宜移在此器也帝甚慙後為廬陵王後軍長史廣陵太守行兖州府事是年魏揚聲當飲馬長江帝懼敕頴胄移居民入城百姓驚恐席卷欲南度頴胄以魏軍尚逺不即施行魏軍亦尋退仍為南兖州刺史加都督和帝為荆州以頴胄為冠軍将軍西中郎長史南郡太守行荆州府事時江祏執朝權此行由祏頴胄不平曰江祏盪我輩出東昬侯誅戮羣公委任厮小崔陳敗後方鎮各懐異計永元二年十月尚書令臨湘侯蕭懿及弟衛尉暢見害先遣輔國将軍巴西太守劉山陽領三千兵受㫖之官就頴胄兵襲梁武帝帝時為雍州刺史已有偹将起兵慮頴胄不識機變遣頴胄親人王天虎詣江陵聲云山陽西上并襲荆雍書與穎胄勸同舉兵頴胄意猶未決初山陽出南州謂人曰朝廷以白虎幡追我亦不復還矣席卷妓妾盡室西行至巴陵遲回十餘日不進梁武帝復遣天虎齎書與頴胄設竒畧以疑之是時或云山陽謀殺頴胄以荆州同舉山陽至果不敢入城頴胄計無所出夜遣錢塘人朱景思呼西中郎城局參軍席闡文諮議參軍柳忱閉齋定議闡文曰蕭雍州畜飬士馬非復一日江陵素畏㐮陽人人衆又不敵取之不可必将制之嵗寒復不為朝廷所容今若殺山陽與雍州舉事立天子以令諸侯覇業成矣山陽持疑不進是不信我今斬送天虎則彼疑可釋至而圖之㒺不濟矣忱亦勸焉頴胄曰善及天明頴胄謂天虎曰卿與劉輔國相識今不得不借卿頭乃斬天虎以示山陽山陽大喜輕将歩騎數百詣州頴胄使前汶陽太守劉孝慶伏兵斬之驛送山陽首於梁武東昬聞山陽死發詔討荆雍頴胄有器局既唱大事衆情歸之長沙寺僧鑄黄金為龍數千两埋土中歴相傳付稱為下方黄鐡頴胄因取此龍以充軍實乃嘆曰往年江祏斥我至今始知禍福之無門也十二月秋檄京邑百姓諸州郡牧守進克巴陵頴胄遣人謂梁武曰時月未利當須來年二月梁武曰今年太白出西方仗義而動天時人謀有何不利昔武王伐紂行逆太嵗豈復待年月邪頴胄乃從遣西中郎參軍鄧元起率衆向夏口三年正月和帝為相國頴胄為左長史進號鎮軍将軍於是始選用方伯梁武屢表勸和帝即尊號頴胄乃令别駕宗史撰定禮儀上尊號改元於江陵立宗廟南北郊州府城門悉依建康宫置尚書五省以城南射堂為蘭臺南郡太守為尹建武中荆州大風雨龍入柏齋中柱壁上有爪足處刺史蕭遙欣恐畏不敢居之至是以為嘉福殿中興元年三月頴胄為侍中尚書令領吏部尚書監八州軍事行荆州刺史留衛西朝以弟頴逹為冠軍将軍及楊公則等率師隨梁武圍郢城頴逹㑹軍於漢口與王茂曹景宗等攻䧟郢城梁武進漂州使與曹景宗破東昬将李居士又從下東城初梁武之起也巴東太守蕭恵詶子璝巴西太守魯休列不從舉兵侵荆州敗輔國将軍任漾之於峡口遂至上明江陵大震頴胄遣軍主蔡道恭屯上明以拒之梁武已平郢江二鎮圍建康時頴胄輔帝出居上流有安重之勢素能飲酒噉白肉膾至三斗自以職居上将不能拒制璝等憂愧發病而卒遺表陳情時年四十州中祕之使似其書者假為教命時梁武圍建康城住石頭和帝密詔報頴胄凶問亦祕不發喪及建康平蕭璝亦衆懼而潰和帝乃始發喪詔贈頴胄丞相前後部羽葆鼓吹班劒三十人輼輬車黄屋左纛梁天監元年追封巴東郡公喪還武帝車駕臨哭渚次詔葬依晉王導齊豫章王嶷故事諡曰獻武弟頴逹少好勇使氣頴胄建武末行荆州事頴逹亦為西中郎外兵參軍俱在西府齊季多難頗不自安因與兄頴胄舉兵頴逹弟頴孚自建鄴為廬陵人修景智潛引南歸頴孚縁山踰障僅免道中絶糧後因食過飽而卒建康平梁武以頴逹為前将軍丹陽尹及受禅贈頴孚右衛将軍封頴逹作唐侯位侍中衛尉卿出為豫章内史意甚憒憒未發前預華林宴酒後於座辭氣不悦沈約因勸酒欲以釋之頴逹大罵約曰我今日形容正是汝老䑕所為何忽復勸我酒舉座驚愕帝謂之曰汝是我家阿五沈公宿望何意輕脱若以法繩汝汝復何理頴逹竟無一言唯大涕泣帝心愧之未㡬遷江州刺史少時懸瓠歸化頴逹長史沈瑀等苛刻為盜所害衆頗疑頴逹或傳謀反帝遣直閤将軍張豹子稱江中討盜實使防之頴逹知朝廷之意唯飲酒不知州事後卒於左衛将軍諡康侯子敏嗣位新安太守好射雉未嘗在郡辭訟者遷於畎焉後張弩損腰而卒第七子斆太清初為魏興太守梁州刺史宜豐侯修以為府長史梁州有古墓名曰尖冢或云張騫墳欲有發者輙聞鼓角與外相拒椎埋者懼而退斆謂必無此理求自監督及開唯有銀鏤銅鏡方尺斆時居母服為清談所貶衡陽公諶字彦孚髙帝絶服族子也祖道清員外郎父仙伯桂陽國叅軍宋元徽末武帝在郢欲知都下消息髙帝遣諶就武帝宣傳謀計留為腹心昇明中為武帝中軍刑獄參軍南東莞太守以勞封安復縣男建元初武帝在東宫諶領宿衛及即位除歩兵校尉南蘭陵太守領御仗主齋内兵仗悉以付之心膂密事皆使參掌為左中郎将後軍将軍太守如故武帝臥疾延昌殿諶在左右宿直上崩遺詔諶領殿内事如舊鬱林即位深委信諶諶每請急出宿帝通夕不能寐諶還乃安轉衛軍司馬兼衛尉丁母憂敕還本位守衛尉明帝輔政諶回附明帝勸行廢立密召諸王典籖約語之不與諸王外接人物諶親要日久衆皆惮而從之鬱林被廢日初聞外有變猶密為手敕呼諶其見信如此諶性險無䕶身計及廢帝日領兵先入後宫齋内仗身素𨽻服諶莫有動者海陵立轉中領軍進爵為公甲仗五十人直殿内月十日還府建武元年轉領軍将軍左将軍南徐州刺史給扶進爵衡陽郡公明帝初許事克用諶為揚州及有此授諶恚曰見炊飯熟推以與人王晏聞之曰誰復為蕭諶作甌筯者諶持勲重干預朝政明帝新即位遣左右要人於外聽察具知諶言深相疑阻二年六月上華林園宴諶及尚書令晏等數人盡歡坐罷留諶晩出至華林閤仗身執還入省上遣左右莫智明數諶曰隆昌之際非卿無有今日今一門二州兄弟三封朝廷相報政可如此卿恒懐怨望乃云炊飯已熟合甑與人邪今賜卿死諶謂智明曰天去人亦復不逺我與至尊殺髙武諸王是卿傳語來去我今死還取卿矣於省殺之至秋而智明死見諶為􅑂詔乃顯其過惡收付廷尉諶好左道吳興沈文猷相諶云相不减髙帝諶喜曰感卿意無為人言也至是文猷伏誅諶兄誕字彦偉永明中為建康令延興元年歴徐司二州刺史明帝立封安復侯徴為左衛将軍上欲殺諶以誕在邉鎮拒魏故未及行魏軍退六旬諶誅遣梁武帝為司州别使誅誕誕子稜妻江淹女字才君聞誕死曰蕭氏皆盡妾用生何為慟哭而絶諶弟誄字彦文與諶同豫廢立封西昌侯位太子左衛率誅湛之日輔國将軍蕭季敞啟求收誄深加排苦乃至手相摧辱誄徐曰已死之人何足至此君不憶相提拔時邪幽冥有知定當相報季敞麤猛無行善於彌縫髙帝時為諶所奨悦故累為郡守在政貪穢諶輙掩之後為廣州刺史白日見誄将兵入城收之少日果為西江都䕶周世雄所襲軍敗奔山中為蛭所嚙肉都盡而死慘楚備至後為村人所斬論者以為有天道焉臨汝侯坦之字君平髙帝絶服族子也祖道濟太中大夫父欣祖武進令坦之與蕭諶同族為東宫直閤以勤直為文恵所知除給事中蘭陵令武帝崩坦之率太孫文武度上䑓除射聲校尉令如故未拜除正員郎南魯郡太守少帝以坦之文恵舊人親信之得入内見皇后帝於宫中及出後常雜狡獪坦之皆得在側或遇醉後裸袒坦之輙扶持諫喻見帝不可奉乃改附明帝密為耳目隆昌元年追録坦之父勲封臨汝縣男少帝㣲聞外有異謀憚明帝在䑓内敕移西州後在華林園華光殿露著黄縠禈跂牀垂脚謂坦之曰人言鎮軍與王晏蕭諶欲共廢我似非虛傳蘭陵所聞云何坦之嘗作蘭陵令故稱之坦之曰天下寧當有此誰樂無事廢天子邪昔元徽獨在路上走三年人不敢近政坐枉殺孫超杜幼文等故敗耳言有何事一旦便欲廢立朝貴不容造此論政當是諸尼師母言耳豈可以尼姥言為信官若無事除此三人誰敢自保安陸諸王在外寜肯復還道剛之徒何能抗此帝曰蘭陵可好聽察作事莫在人後帝以為除諸執政應須當事人意在沈文季夜遣内左右密賂文季文季不受帝大怒謂坦之曰我賜文季不受豈有人臣拒天子賜坦之曰官遣誰送帝曰内左右坦之曰官若詔敕出賜令舍人主書送往文季寜敢不受政以事不方幅故仰遣耳帝又夜醉乗馬從西廊向北馳走如此兩三将倒坦之諌不從執馬控帝運拳撃坦之不著倒地坦之與曹道剛扶抱還夀昌殿瑇瑁牀上臥又欲起走坦之不能制坦之馳信報皇后至請譬良久乃眠時明帝謀廢殺既與蕭諶及坦之定謀少帝腹心直閤将軍曹道剛疑外間有異密有處分諶未能決始興内史蕭季敞南陽太守蕭頴基並應還都諶欲待二蕭至藉其威力以舉事明帝慮事變以告坦之坦之馳謂諶曰廢天子古來大事比聞曹道剛朱隆之轉已猜疑衛尉明日若不就事無所復及弟有百嵗母豈能坐聽禍敗政應作餘計耳諶惶遽明日遂廢帝坦之力也海陵即位除黄門郎兼衛尉建武元年遷左衛将軍進爵為侯東昬立為侍中領軍将軍永元元年母憂起復職加将軍置府江祏兄弟欲立始安王遙光密告坦之坦之曰明帝取天下已非次第天下人至今不服今若復作此事恐四海瓦解我其不敢言及遙光起事遣人夜掩取坦之坦之科頭著禈踰墻走逢䑓遊邏主顔端執之坦之謂曰始安作賊遣人見取向於宅奔走欲還䑓耳君何見録端不答而守防愈嚴坦之謂曰身是大臣夜半奔走君理見疑以為得罪朝廷若不信自可歩往東府參視亦不答端至小街審知遙光舉事乃走還未至三十餘歩下馬再拜曰今日乞垂将接坦之曰向與君何道豈欲相欺端以馬與坦之相隨去比至新亭道中收遙光所虜之餘得二百許人并有麤仗乃進西掖門開殿後得入殿内其夕四更主書馮元嗣叩北掖門告遙光反殿内為之備向曉召徐孝嗣入左将軍沈約五更初聞難馳車走趨西掖門或勸戎服約慮外軍已至若戎衣者謂同遙光無以自明乃朱服而入䑓内部分既立坦之假節督衆軍討遙光事平遷尚書左僕射丹陽尹右軍如故進爵為公坦之肥黒無須語聲嘶時人號為蕭瘂剛佷專執羣小畏而憎之遙光事平二十餘日帝遣延明主帥黄文濟圍坦之宅誅之坦之從兄翼宗為海陵郡将發坦之謂文濟曰從兄海陵宅故應無他文濟曰海陵宅在何處坦之告之文濟曰政應得罪仍遣取之檢家赤貧唯有質錢帖子數百還以啟帝原其死和帝中興元年追贈坦之中軍将軍開府儀同三司髙帝十四王髙帝十九男昭皇后生武帝豫章文獻王嶷謝貴嬪生臨川獻王映長沙威王晃羅太妃生武陵昭王煜任太妃生安成恭王暠陸修儀生鄱陽王鏘晉熙王銶袁修容生桂陽王鑠何太妃生始興簡王鑑宜都王鏗區貴人生衡陽王鈞張淑妃生江夏王鋒河東王鉉李羙人生南平王鋭第九第十三第十四第十七皇子早亡衡陽王鈞出繼高帝兄元王後豫章文獻王嶷字宣儼髙帝第二子也寛仁𢎞雅有大成之量髙帝特鍾愛焉仕宋為尚書左戸郎錢塘令髙帝破薛索兒改封西陽以先爵賜嶷為晉夀縣侯後為武陵内史時沈攸之在荆州責賧於界内諸蠻禁斷五溪魚鹽羣蠻怨怒酉溪蠻王田頭擬殺攸之使攸之責賧千萬駒三百萬頭擬發氣死其弟婁侯篡立頭擬子田都走入獠中於是蠻部大亂抄掠至郡城下嶷遣隊主張英兒撃破之田都自獠中請立而婁侯亦歸附嶷誅婁侯於郡獄命田都繼其父蠻衆乃安入為順帝驃騎從事中郎詣司徒袁粲粲謂人曰後來佳器也髙帝在領軍府嶷居清溪宅蒼梧王夜中㣲行欲掩襲宅内嶷令左右儛刀㦸於中庭蒼梧從牆間窺見已有備乃去髙帝憂危既切腹心荀伯玉勸帝渡江北起兵嶷諫曰主上狂凶人不自保单行道路易以立功外州起兵鮮有克勝物情疑惑今於此立計萬不可失及蒼梧王殞髙帝報嶷曰大事已判汝明可早入順帝即位轉侍中總宫内直衛沈攸之之難髙帝入朝堂嶷出鎮東府加冠軍将軍及袁粲舉兵夕丹陽丞王遜告變先至東府嶷遣軍主戴元孫領二千人隨薛道深等俱至石頭焚門之功元孫預焉先是王藴部曲六十人助為城防實以為内應也嶷知藴懐貳不給其仗散處外省及難作搜檢皆已亡去上流平後武帝自尋陽還嶷出為都督江州刺史以定䇿功改封永安縣公徙鎮西将軍都督荆州刺史時髙帝輔政嶷務存約省停府州儀迎物及至州坦懐納善側席思政王儉與嶷書曰舊楚蕭條政荒人散公臨莅甫爾英風惟穆江漢來蘓八荒慕義庾亮以來荆州無復此政古人云朞月有成而公旬日成化豈不休哉初沈攸之欲聚衆開人相告士庻坐執役者甚衆嶷至鎭一日遣三千餘人見囚五嵗刑以下不連䑓者皆原遣又以市税重多所寛假百姓甚恱禅譲之間武帝欲速定大業嶷依違其事黙無所言建元元年高帝即位赦詔未至嶷先下令蠲除部内昇明二年以前一切逋負遷侍中尚書令都督揚州刺史驃騎大将軍開府儀同三司封豫章郡王㑹魏軍動詔以嶷為南蠻校尉荆湘二州刺史都督八州尋給油絡俠望車二年給班劒一十人晉宋之際刺史多不領南蠻校尉别以重人居之至是有二府二州其夏於南蠻園東南開舘立學上表言状置生員三十人取舊族父祖清顯者年二十五以下十五以上補之置儒林參軍一人文學祭酒一人勸學從事二人行釋菜禮以榖過賤聽人以米當口錢優評斛一百義陽刼師張羣亡命積年鼓行為盜義陽武陵天門南平四郡界被其殘破沈攸之連討不禽末乃首用之攸之起事羣從下郢於路先叛結砦於三溪依據深險嶷遣中兵參軍虞欣祖為義陽太守使降意誘納之厚為禮遺於是乃各詣郡欣祖於坐斬首其黨皆散四郡獲安入為中書監司空揚州刺史都督二州侍中如故加兵置佐以前軍臨川王映府文武配司空嶷以将還都修治廨宇及路陌東歸部曲不得齎府州物出城發江津士女觀送數千人皆垂泣嶷發江陵感疾至京師未瘳髙帝深憂慮為之大赦三年六月壬子赦令是也疾愈上幸東府設金石樂使得乗輿至宫六門武帝即位進位太尉増置兵佐解侍中増班劒三十人建元中武帝以事失㫖髙帝頗有代嫡之意而嶷事武帝恭悌盡禮未嘗違忤顔色故武帝友愛亦深性至孝髙帝崩哭泣過度眼耳皆出血永明元年領太子太傅解中書監宋武以來州郡秩俸及雜供給多隨土所出無有定準嶷上表請明立定格班下四方永為恒制從之嶷不參朝務而言事宻謀多見信納服闋加侍中宋元嘉制諸王入齋閤得白服裙帽見人主唯出太極四廂乃備朝衣自爾以來此事一㫁上與嶷同生相友睦宮内曲宴許依元嘉故事嶷固辭不奉敕唯車駕幸第乃白服烏紗㡌以侍宴焉至於衣服制度動皆陳啟事無専制務從減省並不見許三年文恵太子講孝經畢嶷求解太傅不許嶷常慮盛滿又因侍宴求解揚州授竟陵王子良上終不許曰畢汝一世無所多言武帝即位後頻發詔拜陵不果行遣嶷拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛推問嶷不許取絹一疋横繋牛角放歸其家政在寛厚故得朝野歡心四年富陽民唐㝢之作亂初髙祖使虞玩之等檢定黄籍至是上命别立校籍官置令史限日得數巧外監呂文度啟上籍被却者謫戍縁淮十年民多逃亡避罪㝢之因以妖術惑衆三呉却籍者奔之衆至三萬嶷言宜遂解檢籍之禁不爾便致紛紜後乃詔聼復籍注是時武帝奢侈後宮萬人宮内不容太樂署及暴室皆滿猶以為未足嶷後房亦千餘人潁川荀丕獻書於嶷極言其失嶷咨嗟良久為書答之又為之減遣丕字令哲後為荆州西曹書佐長史王秀與其書題之云西曹荀君丕報書曰第五之位不減驃騎亦不知西曹何殊長史且人之處世當以徳行稱著何遽以一爵髙人邪相如不見屈於澠池毛遂安受辱於郢都造敵臨事僕必先於二子未知足下之貴足下之威孰若秦楚兩王僕以徳為寳足下以位為寳各寳其寳於此敬宜於是直題云長史王君時尚書令王儉當朝丕又與儉書曰足下建髙人之名而不顯髙人之迹将何以書於齊史哉及南郡剛紀啟荆州刺史隨王子降請罪丕丕自申乃免又上書極諌武帝言甚直帝不悦丕竟於荆州獄賜死徐孝嗣聞其死曰丕縦有罪亦不應殺數千年後其如竹帛何五年嶷進位大司馬八年給皁輪車尋加中書監固譲嶷身長七尺八寸善持容範文物衛從禮冠百僚每出入殿省皆瞻望嚴肅自以地位隆重深懐退素北宅舊有園田之羙乃盛修理之武帝嘗問臨川王映居家何事樂映曰政使劉瓛講禮顧􅀢講易朱廣之講荘老臣與二三諸彦兄弟友生時復撃賛以此為樂上大賞之他日謂嶷曰臨川為善遂至於斯嶷曰此大司馬公之次弟安得不顯上仍以玉如意指嶷曰未若皇帝之次弟為善最多也嶷常戒諸子曰凡富貴少不驕奢以約失之者鮮矣漢氏以來侯王子弟以驕恣之故大者滅身䘮族小者削奪邑地可不戒哉稱疾不利住東城累求還第令世子子亷代鎮東府上數幸嶷第宋長寜陵隧道出第前路上曰我便是入他家墓内尋人乃徙其表闕騏驎於東岡騏驎及闕形勢甚巧宋孝武於㐮陽致之後諸帝王陵皆範模而莫及也永明末車駕數遊幸唯嶷陪從上甞出新林苑同輦夜歸至宮門嶷下輦辭出上曰今夜行無使為尉司所呵也嶷對曰京輦之内皆屬臣州願陛下不垂過慮上大笑賜以魏所送氊車每幸第不復屏人敕外監曰我徃大司馬第是還家耳嶷妃庾氏嘗有疾瘳上幸嶷邸後堂設金石樂宮人畢至登相䑓使嶷著烏紗㡌極日盡歡敕嶷備家人之禮嶷謂上曰古來言願陛下夀比南山或稱萬嵗此殆近貎言如臣所懐實願陛下極夀百年亦足上曰百年復何可得止得東西一百於事亦濟因相執流涕十年上封嶷諸子舊例皇子封千户嶷欲五子俱封啟減人五百户其年疾篤表解職不許賜錢五百萬營功徳薨年四十九其日上視疾至薨乃還宮詔歛以衮冕之服温明祕噐大鴻臚持節䕶䘮事太官朝夕送祭奠大司馬太傅二府文武悉停過葬詔贈假黄鉞都督中外諸軍事丞相揚州牧緑綟綬具九服鍚命之禮侍中大司馬太傅王如故給九旒鸞輅黄屋左纛虎賁班劒百人輼輬車前後部羽葆鼔吹䘮葬送儀並依漢東平王蒼故事嶷臨終召子子亷子恪曰吾沒後當共相勉勵篤睦為先才有優劣位有通塞運有富貧此自然理無足以相陵務勤學行守基業修閨庭尚閑素如此足無憂患聖主儲皇及諸親賢亦當不以吾沒易情也三日施靈帷香火盤水干飯酒脯檳榔而已朔望菜食一盤加以甘果此外悉省葬後除靈可施吾常所乗輿扇繖朔望時節席地香火盤水酒脯干飯檳榔便足棺器及墓中勿用餘物為後患也朝服之外唯下鐡環刀一口作冡務令深一一依格莫過度也後堂樓可安佛供飬外國二僧餘皆如舊與汝遊戯後堂船乗吾所乗牛馬送二宫及司徒服飾衣裘悉為功徳子㢘等號泣奉行武帝哀痛特至蔬食積旬大官朝送祭奠敕王融為銘云半岳摧峰中河墜月帝流涕曰此正吾所以欲言也至其年十二月乃舉樂宴朝臣樂始舉上便歔欷流涕嶷薨後第庫無見錢武帝敕貨雜物服飾數百萬起集善寺月給第見錢百萬至上崩乃省嶷性汎愛不樂聞人過失左右投書相告置靴中竟不視取火焚之齋庫失火燒荆州還資評直三千餘萬主局各杖數十而已嶷薨後忽見形於沈文季曰我未應便死皇太子加膏中十一種藥使我癰不差湯中復加藥一種使利不斷吾已訴先帝先帝許還東邸當判此事因胸中出青紙文書示文季曰與卿少舊因卿呈上俄失所在文季祕而不傳甚懼此事少時太子薨又嘗見形於第後園乗腰輿指麾處分呼直兵直兵無手版左右授一玉手版與之謂曰橘樹一株死可覓補之因出後園閤直兵到地仍失手版羣吏中南陽樂藹彭城劉繪呉郡張稷最被親禮藹與竟陵王子良牋欲率荆江湘三州僚吏建碑託中書侍郎劉繪營辦藹又與右率沈約書請為文約答曰郭有道漢末之匹夫非蔡伯喈不足以偶三絶謝安石素族之台輔時無麗藻迄乃有碑無文況文獻王冠冕彛倫儀刑㝢内自非一代辭宗難或與此約閭閈鄙人名不入第歘酬今㫖便是以禮許人聞命慙顔已不覺汗之霑背也建武中第二子子恪始託約及太子詹事孔珪為文妃庾氏有女功婦徳嶷甚重之宋時武帝及嶷位官尚輕家又貧薄庾氏常徹已損身以相營奉兄弟每行來公事晩還飢疲躬營飲食未嘗不迎時先辦雖豊儉隨事而香淨適口穆皇后不自營又不整潔上亦以此貴之又不妬忌嶷倍加敬重嶷薨後少時亦亡子亷字景藹初嶷飬魚復侯子響為嗣子子亷封永新侯子響還本子亷為世子位淮陵太守太子中舍人前将軍善撫諸弟十一年卒贈侍中諡哀世子子元琳嗣梁武受禅詔曰豫章王元琳故竟陵王昭胄子同齊氏宗國髙武嫡允宜祚井邑以傳于後降封新淦侯子亷弟子恪字景沖永明中以王子封南康縣侯年十二和從兄司徒竟陵王子良髙松賦衛軍王儉見而竒之建武中為呉郡太守及大司馬王敬則於㑹稽舉兵反奉子恪為名而子恪奔走未知所在始安王遥光勸上併誅髙武諸子孫於是並敕竟陵王昭胄等六十餘人入永福省令太醫煮椒二斛并命辦數十具棺材謂舍人沈徽孚曰椒熟則一時賜死期三更當殺之㑹上暫臥主書單景雋啟依㫖斃之徽孚堅執曰事須更審爾夕三更子恪徒跣奔至建陽門上聞驚覺曰故當未賜諸侯命邪徽孚以答上撫床曰遥光㡬誤人事及見子恪顧問流涕其諸侯悉賜供饌以子恪為太子中庻子東昬即位為侍中中興二年為相國諮議參軍梁天監元年降爵為子位司徒左長史子恪與弟子範等甞因事入謝梁武帝在文徳殿引見謂曰我欲與卿兄弟有言夫天下之寳本是公噐茍無期運雖有頃籍之力亦不能得所以班彪王命論云餓饉流隸飢寒道路思有裋褐之襲儋石之蓄所願不過一金然竟轉死溝壑況乎天子之貴四海之富神明之祚可得而妄干之哉宋孝武為性猜忌兄弟粗有令名者無不因事鴆毒唯景和至朝臣之中疑有天命而致害者枉濫相繼然而或有不應天命而被疑者或不知有天命而不疑者于時雖疑卿祖無如之何如宋明帝本為庸常被免豈疑得全又復我于時已年二嵗彼豈知我應有今日當知有天命者非人所害害之亦不能得我初平建康城朝廷内外皆勸我云時代革異物心須一宜行處分我于時依此而行誰謂不可政言江左以來代謝必相誅戮此是傷於和氣所以國祚例不靈長所謂商鍳不逺在夏后之世此是一義二者齊梁雖曰革代義異往時我與卿兄弟雖復絶服二世宗屬未逺卿勿言兄弟是親人家兄弟自有周旋者不周旋者況五服之屬邪齊業之初亦是甘苦共常腹心在我卿兄弟年少理當不悉我與卿兄弟便是情同一家豈當都不念此作行路事此是二義我有今日是豈本意且建武屠滅卿門致卿兄弟塗炭我起義兵非唯自雪門耻亦是為卿兄弟報仇卿若能在建武永元之時撥亂反正我雖起樊鄧豈得不釋戈推奉我今為卿報仇卿兄弟當盡節報我耳且我自籍䘮亂代明帝家天下不取卿家天下昔劉子輿自稱成帝子光武言假使成帝更生天下亦不可復得況子輿乎梁初人勸我相誅滅者我答之猶如向言孝武時事彼若有天命非我所能殺若無期運何忽行此正是示無度量曹志親是魏武帝孫陳思王之子入事晉武能為晉室忠臣此即卿事例卿是宗室情義異他方坦然相期卿無復懐自外之意又文獻王時内齋直帳閹人趙叔祖天監初入臺為齋帥在夀光省武帝呼問曰我本識汝在北第以汝舊人故每驅使汝比見北第諸郎否若見道我此意我今日雖是革代情同一家但今磐石未立所以未得用諸郎者非唯在我未宜亦是欲使諸郎得安耳但閉門髙枕後自當見我心叔祖即出外具宣敕意子恪普通三年累遷都官尚書四年轉吏部尚書大通二年出為呉郡太守卒諡曰恭子子恪兄弟十六人並入梁有文學者子恪子質子顯子雲子暉五人子恪嘗謂所親曰文史之事諸弟偹之矣不煩吾復牽率但退食自公無過足矣子恪少亦渉學頗屬文隨棄其本故不傳其文集子恪次弟子操封泉陵侯王侯出身官無定準素姓三公長子一人為員外郎建武中子操解褐為給事中自此齊末皆以為例永泰元年兄南康侯子恪為呉郡太守避王敬則難歸以子操為呉郡太守永元中為黄門郎子操弟子範字景則永明中封祁陽縣侯拜太子洗馬梁天監初降爵為子位司徒主簿丁所生母憂去職子範有孝性居䘮以毁聞服闋累遷大司馬南平王從事中郎王愛文學士子範偏被恩遇常曰此宗室竒才也使製千字文其辭甚羙王命記室蔡薳注釋之自是府中文茟皆使具草後為臨賀王正徳長史正徳遷丹陽尹復為正徳信威長史領尹丞歴官十餘年不出蕃府而諸弟並登顯列意不能平及是為到府牋曰上蕃首僚於茲再忝河南雌伏自此重叨老少異時盛衰殊日雖佩恩寵還羞年鬢子範少與弟子顯子雲才名畧相比而風采容止不逮故宦途有優劣每讀漢書杜緩傳云六弟五人至大官唯中弟欽官不至最知名常吟諷之以況已也後為祕書監簡文即位召為光禄大夫加金章紫綬以逼賊不拜故也其年葬簡文皇后使製哀策文理哀切帝謂武林侯蕭諮曰此叚莊陵萬事零落唯哀冊尚有典刑敕賫米千石子範無居宅尋卒於招提寺僧房賊平元帝追贈金紫光禄大夫諡曰文前後文集三十卷子滂確並少有文章簡文在東宫時嘗與邵陵王數諸蕭文士滂確並預焉滂位中軍宣城王記室先子範卒確位司徒右長史魏平江陵入長安滂弟乾字思愓容止雅正性恬簡善𨽻書得叔父子雲之法九嵗補國子周易生祭酒袁昻深敬重之仕梁為宣城王諮議參軍陳武帝鎮南徐州引為司空從事中郎及受命永定元年除給事黄門侍郎時熊曇朗在豫章周廸在臨川留異在東陽陳寳應在建安共相連結閩中豪帥立砦自保武帝患之令乾往諭曇朗等乾至示以逆順皆各欵附其年就除建安太守天嘉二年留異反陳寳應助之又資周廸兵糧出宼臨川因逼建安乾单使臨郡不能守乃棄郡以避寳應時閩中守宰並受寳應署置乾獨不屈徙居郊野及寳應平都督章昭逹以聞文帝甚嘉之超授五兵尚書卒諡静子子範弟子顯字景陽幼聰恵文獻王異之愛過諸子七嵗封寜都縣侯梁天監初降爵為子位太尉録事參事子顯偉容貎身長八尺好學工屬文嘗著鴻序賦尚書令沈約見而稱之曰可謂得明道之髙致蓋幽通之流也又採衆家後漢考正同異為一家之書仍啟撰齊史書成表奏詔付祕閤累遷邵陵王友後除黄門郎中大通二年遷長兼侍中梁武帝愛其才嘉其容止吐納每御筵侍坐偏顧訪焉嘗從容謂之曰我造通史此書若成衆史可廢子顯對曰仲尼讃易道黜八索述職方除九邱聖製符同復在茲日時以為名對三年以本官兼領國子博士帝所製孝經義未列學官子顯在職表置助教一人生十人又啟撰武帝集并普通北伐記遷國子祭酒加侍中於學遞述武帝五經義遷吏部尚書侍中如故子顯風神灑落雍容閑雅簡通賓客不畏鬼神性愛山水為伐社文以見其志飲酒數斗頗負才氣及掌選見九流賓客不與交言但舉扇一撝而已衣冠竊恨之然簡文素重其為人在東宫時每引與促宴子顯嘗起更衣簡文謂坐客曰嘗聞異人間出今日始見知是蕭尚書其見重如此大同三年出為仁威将軍呉興太守卒時年四十九詔贈侍中中書令及請諡手敕曰恃才傲物宜諡曰驕子顯常自序其文謂可比屈宋嚴鄒賈傅崔馬邯郸繆路之徒其自稱道如此所著後漢書一百卷齊書六十卷普通北伐記五卷貴儉傳三卷文集二十卷二子序愷並少知名序太清中位中庻子卒愷太子家令愷才學譽望時論以方其父簡文在東宫早引接之時中庻子謝嘏出守建安於宣猷堂餞飲並召時才賦詩同用十五劇韻愷詩先就其辭又羙簡文與湘東王令曰王筠本自舊手後進有蕭愷可稱信為才子先是太學博士顧野王奉令撰玉篇簡文嫌其書詳畧未當以愷博學於文字尤善使更與學士刪改太清中卒於侍中子顯弟子雲字景喬年十二建武四年封新浦縣侯自製拜章便有文采梁天監初降爵為子既長勤學有文藻以晉代無全書弱冠便留心撰著至年二十六書成百餘卷表奉之詔付秘閣子雲性沉静不樂仕進風神閑曠任性不羣夏月對賓客常自祼袒而兄弟不睦乃至吉凶不相弔問時論以此少之年三十方起家為祕書郎遷太子舍人撰東宫新記奏之敕賜束帛累遷丹陽郡丞湘東王繹為丹陽尹深相賞好如布衣之交中大通三年為臨川内史在郡以和理稱民吏悦之還除散騎常侍歴侍中國子祭酒梁初郊廟未革牲牷樂辭皆沈約撰至是承用子雲啟宜改之敕答曰此是主者守株宜急改也仍使子雲撰定敕曰郊廟歌辭應須典誥大語不得雜用子史文章淺言而沈約所撰亦多舛謬子雲作成敕並施用子雲善草隸書為世楷法自云吾效鍾元常王逸少而㣲變字體嘗答敕云臣昔不能扳賞隨時所貴規摹子敬多歴年所年二十六著晉史至二王列傳欲作論草隸法言不盡意遂不能成止畧指論飛白一事而已十許年來始見敕㫖論書一卷商畧筆勢洞徹字體又以逸少之不及元常猶子敬之不及逸少因此研思方悟隸式始變子敬全範元常逮爾以來自覺功進其書迹雅為武帝所重帝甞評子雲書曰筆力勁駿心手相應巧踰杜度羙過崔實當與元常並驅爭先其見賞如此出為東陽太守百濟國使人至建鄴求書逄子雲為郡維舟将發使人於渚次候之望船三十許歩行拜行前子雲遣問之答曰侍中尺牘之羙逺流海外今日所求惟在名迹子雲乃為停船三日書三十紙與之獲金貨數百萬性吝自外答餉不書好紙好事者重加賂遺以要其答太清初復為侍中國子祭酒二年侯景寇逼子雲逃民間三年宫城失守東奔晉陵餒卒于顯雲寺僧房年六十三所著晉書一百一十卷東宫新記二十卷子特字世逹早知名亦善草隸時人比之衛恒衛瓘武帝嘗使特書及奏帝曰子敬之迹不及逸少蕭特之書遂逼於父位太子舍人海鹽令坐事免先子雲卒子雲弟子暉字景光少渉學亦有文才性恬靜寡嗜慾嘗預重雲殿聽制講三慧經退為講賦奏之甚見賞卒於驃騎長史臨川獻王映字宣光高帝第三子也少而警悟羙言笑善容止宋元徽四年解褐著作佐郎累遷給事黄門侍郎南兗州刺史齊臺建宋帝詔封映及弟晃暠鏘鑠鑑並為開國縣公各一千五百户未及定土宇而高帝踐阼為雍州刺史加都督封臨川王改授前将軍都督揚州刺史國家初創映年少臨神州莅事聰敏府州曹局皆重足以奉禁令自宋彭城王義康以後未之有也永明元年為侍中驃騎将軍五年即本號開府儀同二司七年薨映善騎射解聲律工左右書左右射應接賔客風韻超詣及薨朝野莫不惋惜焉時年三十二贈司空九子皆封侯長子子晉永元初為侍中入梁為高平太守第二子子游州陵侯為黄門侍郎以謀反兄弟並伏誅長沙威王晃字宣明高帝第四子也少有武力為高帝所愛宋世解褐祕書郎昇明二年代兄映為淮南宣城二郡太守初沈攸之事起晃便弓馬多從武容燻赫都街時人為之語曰煥煥蕭四繖其年遷西中郎将豫州刺史監二州諸軍事高祖踐阼晃每陳政事輙為典籖所裁晃殺之上大怒手詔賜杖遷南徐州刺史加都督武帝為皇太子拜武進陵於曲阿後湖鬭隊使晃御馬軍上聞之又不悦臨崩以晃屬武帝處以輦轂近蕃勿令逺出永明元年以晃為都督南徐州刺史入為侍中中書監時禁諸王蓄仗在都下者唯置捉刀左右四十人晃愛武飾罷徐州還私載數百人仗還都為禁司所覺投之江水帝聞之大怒将紏以法豫章王嶷於御前稽首流涕曰晃罪誠不足宥陛下當憶先朝念白象白象晃小字也上亦垂泣高帝大漸時戒武帝曰宋氏若不骨肉相圖他族豈得乗其弊汝深戒之故武帝終無異意然晃亦不見親寵當時論者以武帝優於魏文減於漢明尋進號車騎将軍侍中薨贈開府儀同三司武帝常幸鍾山晃從駕以馬矟刺道邉枯蘖上令左右數人引之銀纒皆卷聚而矟不出乃令晃復馳馬拔之應手便去每逺州獻駿馬上輙令晃於華林中調試之高帝常曰此我家任城也武帝縁此意故諡曰威武陵昭王煜字宣昭小字三昧高帝第五子也母羅氏從髙帝在淮隂以罪誅煜年四嵗思慕不異成人每慟輙吐血故高帝憫而愛之髙帝雖為方伯而居處甚貧諸子學書無紙筆煜嘗以指畫空中及畫掌學字遂工篆法少時又無棊局乃破荻為片縱横以為棊局指㸃行勢遂至名品性剛頴儁出與諸王共作短句詩學謝靈運體以呈上上報曰見汝二十字諸兒作中最為優者但康樂放蕩作體不辯有首尾安仁士衡深可宗尚顔延之抑其次也建元三年為㑹稽太守加都督上遣儒士劉瓛住郡為煜講五經武帝即位歴中書令祠部尚書巫覡或言煜有非常之相以此自負武帝聞之故無寵未嘗處方岳嘗於御坐曲宴醉伏地貂抄肉柈帝笑曰汚貂對曰陛下愛羽毛而踈其骨肉帝不悅性輕財重義有古人風罷㑹稽還郡齋中錢不滿萬俸禄所入皆與參佐賓僚共之常曰兄作天子何畏弟無錢居上附身所須而已名後堂山為首陽蓋怨貧薄也嘗於武帝前與竟陵王子良圍棊子良大北及退豫章王嶷謂煜曰汝與司徒手談故當小相推讓答曰煜立身以來未嘗一口妄語執心疎婞偏不知悔好文善射為當時獨絶武帝幸豫章王嶷東田宴諸長王獨不召煜嶷曰風景殊羙今日甚憶武陵上乃呼之仍使射屢發命中顧謂四座曰手何如上神色甚怪嶷曰阿五常日不耳今可謂仰藉天威帝意乃釋後於華林園射賭凡六箭五破一皮賜錢五萬上舉酒勸煜煜曰陛下常不以此處許臣上回面不答豫章王於邸起土山列種桐竹號為桐山武帝幸之置酒為樂顧謂臨川王映曰王邸亦有嘉名不映曰臣好棲静因以為稱又問煜煜曰臣山卑不曾棲靈昭景唯有薇蕨直號首陽山帝曰此直勞者之歌也久之出為江州刺史上以煜方出鎮求其宅給諸皇子煜曰先帝賜臣此宅使臣歌哭有所陛下欲以州易宅臣請以宅易州帝恨之至鎮百餘日典籖趙渥之啟煜得失於是徴還為左户尚書遷太常卿累不得志冬節問訊諸王皆出煜獨後來上已還便殿聞煜至引見問之煜稱牛羸不能取路上敕車府給副御牛一頭敕主客自今諸王來不隨例者不復為通後以公事還過竟陵王子良宅冬月道逢乞人脫襦與之子良見煜衣單進襦於煜煜曰我與向人亦復何異尚書令王儉詣煜煜留儉設食柈中菘菜鮑魚而已儉重其真率為飽食盡歡而去尋為丹陽尹始不復置行事自得親政轉侍中䕶軍将軍給油絡車又給扶二人武帝臨崩遺詔為衛将軍開府儀同三司大行在殯竟陵王子良在殿中太孫未至衆論喧疑煜衆中言曰若立長則應在我立嫡則應立太孫欎林既立甚見馮頼隆昌元年薨時年二十八贈司空班劔二十人安成㳟王暠字宣曜髙帝第六子也性清和多疾厯位南中郎将江州刺史侍中領歩兵校尉中書令永明元年為散騎常侍祕書監領石頭戌事及夏薨鄱陽王鏘字宣韶髙帝第七子也建元末武帝即位為雍州刺史加都督武帝服除鏘方還始入覲拜便流涕武帝愕然問其故鏘收淚曰臣違奉彌年今奉聖顔微見瘦損所以泣耳武帝歎曰我復是有此一弟累遷丹陽尹永明十年為領軍将軍鏘和悌美令性謙慎好文章有寵於武帝領軍之授齊室諸王所未為鏘在官理事無壅當時稱之車駕游幸常甲仗衛從恩待次豫章王嶷其年給油絡車隆昌元年轉尚書左僕射遷侍中驃騎将軍開府儀同三司領兵置佐鏘雍容得物情為欎林依信欎林心疑明帝諸王問訊獨留鏘曰聞鸞於法身何如鏘曰臣鸞於宗戚最長且受寄先帝臣等年皆尚少朝廷之幹唯鸞一人願陛下無以為慮欎林退謂徐龍駒曰我欲與公共計取鸞公既不同我不能獨辦且復小聼及欎林廢鏘竟不知延興元年進位司徒侍中如故明帝鎮東府權威稍異鏘每往明帝屣履至車迎鏘語及家國言淚俱下鏘以此推信之而宫䑓内皆屬意於鏘勸令入宫發兵輔政制局監謝粲説鏘及隨王子隆曰殿下但乗油壁車入宫出天子置朝堂二王夾輔號令粲等閉城門上仗誰敢不同宣城公政當投井求活豈有一歩動哉東城人政共縳送耳子隆欲定計鏘以上䑓兵力既悉度東府且慮難㨗意甚猶豫馬隊主劉巨武帝時舊人詣鏘請間叩頭勸鏘立事鏘命駕将入復回還内與母陸太妃别日暮不成行典籖知謀告之數日明帝遣二千人圍鏘宅害鏘謝粲等皆見殺凡諸王被害皆以夜遣兵圍宅或斧砍闗挑牆呌噪而入家財皆見封籍焉桂陽王鑠字宣朗髙帝第八子也永明七年為中書令加散騎常侍時鄱陽王鏘好文章鑠好名理人稱為鄱桂鑠清羸有冷疾常枕卧武帝臨視賜牀帳衾褥性理偏詖遇其賞興則詩酒連日情有所廢則兄弟不通隆昌元年加前将軍給油絡車并給扶二人鄱陽王見害鑠遷中軍将軍開府儀同三司不自安至東府見明帝及出處分存亡之計謂侍讀山悰曰吾前日覲王王流涕嗚咽而鄱陽隨即見誅今日見王王又流涕而有媿色其在吾邪其夜三更中兵至見害始興簡王鑑字宣徹髙帝第十子也性聰警年八嵗喪所生母號慕過人數日中便至骨立豫章王嶷見而撫其首鳴咽以告髙帝帝亦悲不自勝初封廣興郡王祕書丞袁彖早有令譽髙帝盛重鑑乃命彖為廣興王友後改封始興自晉以來益州刺史皆以良将為之宋泰始中益州市橋忽生小洲道士邵碩見之曰當有貴王臨州劉亮為刺史齋前石榴樹陵冬生華亮以問碩碩曰此謂狂華宋諸劉滅亡之象後二年君當終後九載宋當滅滅後有王勝憙來作此州冀爾時蜀土平碩始康人元徽二年忽告人云吾命終因卧而死後人見碩在荆州上明以一隻故履縳左脚而行甚疾遂不知所之永明二年武帝不復用諸将為益州始以鑑為益州刺史督益寕二州軍事加鼓吹一部勝憙反語為始興碩言於此乃驗先是刼帥韓武方常聚黨千餘人斷流為暴郡縣不能禁行旅斷絶鑑行至上明武方乃出降鑑長史虞悰等咸請殺之鑑曰武方為暴積年所在不能制今降而被殺失信且無以勸善於是啟䑓果被宥自是巴西蠻夷凶惡皆望風降附行次新城道路籍籍云陳顯逹大選士馬不肯就徴巴西太守隂智伯亦以為然乃停新城十許日遣典籖張曇晳往觀形勢俄而顯逹遣使人郭安明朱公恩奉書貢遺衆咸勸鑑執之鑑曰顯逹立節本朝必自無此曇晳還若有同異執安明等未晩居二日曇晳還言顯逹已遣家出城日夕望殿下至於是乃前時年十四好學善屬文不重華飾器服清素有髙士風與記室參軍蔡仲熊登張儀樓啇略先言往行及蜀土人物鑑言辭和辯仲熊應對無滯當時以為盛事州城北門常閉不開鑑問其故於虞悰悰答曰蜀中多夷暴有時抄掠至城下故相承閉之鑑曰古人云善閉無闗楗且在徳不在門即令開之戎夷慕義由是清謐鑑於州園地得古冡無復棺但有石槨銅器十餘種并古形玉璧三枚珍寳甚多不可皆識金銀為蠶蛇形者數斗又以朱砂為阜水銀為池左右咸勸取之鑑曰皇太子昔在雍有發古冢者得玉鏡玉屏風玉匣之類皆将還都吾意常不周乃遣功曹何佇為之起墳諸寳物一不得犯性甚清在蜀積年未嘗有所營造資用一嵗不滿三萬王儉常歎云始興王雖尊貴而行履都是素士時有廣漢什邡人叚祖以錞于獻鑑古禮器也髙三尺六寸六分圍三尺四寸圓如筩銅色黒如漆甚薄上有銅馬以繩縣馬令去地尺餘灌之以水又以器盛水於下以芒莖當心跪注錞于以手振芒則其聲如雷清響良久乃絶古所以節樂也五年鑑獻龍角一枚長九尺三寸色紅有文理九年為散騎常侍祕書監領石頭戌事尋遷左衛将軍未拜遇疾薨時年二十一江夏王鋒字宣頴髙帝第十二子也母張氏有容徳宋蒼梧王逼取之又欲害鋒髙帝甚懼不敢使居舊宅匿於張氏舍時年四嵗性方整好學書張家無紙札乃倚井欄為書書滿則洗之已復更書如此者累月又晨興不肯拂牕塵而先畫塵上學為書字五嵗髙帝使學鳯尾詔一學即工髙帝大悦以玉麒麟賜之曰騏驎賞鳯尾矣至十嵗便能屬文武帝時藩邸嚴急諸王不得讀異書五經之外唯得看孝子圖而已鋒乃宻遣人於市里街巷買圖籍朞月之間殆将備矣好琴書盖亦天性嘗覲武帝賜以寳装琴仍於御前鼔之大見稱賞帝謂鄱陽王鏘曰闍梨琴亦是桞令之流亞其既事事有意吾欲試以臨人鏘曰昔鄒忌鼔琴威王委以國政乃出為南徐州刺史善與人交行事王文和别駕江祏等皆相友善後文和被徴為益州置酒告别文和垂淚曰下官少來未嘗作詩今日違戀不覺文生於性王儉聞之曰江夏可謂善變素絲也工書為當時蕃王所推南郡王昭業亦稱工謂武帝曰臣書固應勝江夏王武帝答闍梨第一法身第二法身昭業小名闍梨鋒小名也隆昌元年為侍中領驃騎将軍尋加祕書監及明帝執權蕃邸危懼江祏甞謂王晏曰江夏王有才行亦善能匿迹以琴道授羊景之景之著名而江夏掩能於世非唯七絃而已百氏亦如之鋒聞歎曰江祏遂復為混沌畫眉欲益反弊耳寡人聲酒是耽狗馬是好豈復一豪於平生哉當時以為話言常忽忽不樂著修栢賦以見志曰既殊羣而抗立亦含貞而挺正豈春日之自芳在霜下而為盛衝風不能摧其枝積雪不能改其性雖坎􅇄於當年庶後彫之可詠時鼎業潛移鋒獨慨然有匡復之志逼於行事典籖故不遂也甞見明帝言次及遥光才力可委之意鋒答曰遥光之於殿下猶殿下之於髙皇衛宗廟安社稷實有攸寄明帝失色鋒有武力明帝殺諸王鋒與書詰責左右不為通明帝深憚之不敢於第收鋒使兼祠官於太廟夜遣兵廟中收之鋒出登車兵人欲上車防勒鋒以手撃却數人皆應時倒地遂逼害之時年二十江斆聞其死流涕曰芳蘭當門不得不鋤其修栢之賦乎南平王鋭字宣毅髙帝第十五子也位左户尚書朝直勤謹未嘗屬疾永明七年出為南中郎将湘州刺史延興元年明帝作輔害諸王遣裴叔業平尋陽仍進湘州鋭防閤周伯玉大言於衆曰此非天子意今斬叔業舉兵匡社稷誰敢不同鋭典籖叱左右斬之鋭見害伯玉下獄誅宜都王鏗字宣儼髙帝第十六子也生三嵗喪母及有識問母所在左右告以早亡便思慕蔬食自悲不識母常祈請幽㝠求一夢見至六嵗遂夢見一女云是其母鏗悲泣向舊左右説容貎衣服事皆如平生聞者莫不歔欷清恬有學行永明十一年為南豫州刺史加都督二州軍事雖未經庶務而雅得人心舉動毎為籖師所制立意多不得行州鎮姑熟于時人有發桓温女冢得金巾箱織金篾為嚴器又有金蠶銀蠒等物甚多條以啟聞欎林𠡠以物賜之鏗曰今取往物後取今物如此循環豈可熟念使長史蔡約自往修復纖毫不犯年十嵗時與吉景曜商略先言往行左右誤排柟瘤屏風倒壓其背顔色不異言談無輟亦不顧視彌善射常以堋的太濶曰終日射侯何難之有乃取丼蔗挿地百歩射之十發十中永明中制諸王年未三十不得畜妾及武帝崩後有勸取左右者鏗曰在内不無使役既先朝遺㫖何忍而違及延興初明帝誅髙武文惠諸子鏗聞之馮左右從容雅歩詠陸機弔魏武云昔以四海為己任死則以愛子託人如此者三左右皆泣後果遣吕文顯賚藥往夜進聽事正逄八闗齋鏗上髙坐謂文顯曰髙皇昔寵任君何事乃有今日之行答云出不獲已於是仰藥時年十八鏗身長七尺状似兄嶷咸以國器許之及死有識者莫不痛惜初鏗出閤時年七嵗陶𢎞景為侍讀八九年中甚相接遇後𢎞景隠山忽夢鏗來慘然言别云某日命過身無罪後三年當生某家𢎞景訪以幽㝠之事多祕不出覺後即遣信出都參訪果與事符同𢎞景因著夢記云晉熈王銶字宣攸髙帝第十八子也隆昌元年位郢州刺史延興元年見害河東王鉉字宣允髙帝第十九子也母張氏有寵於髙帝鉉又最幼尤所留心髙帝臨崩以屬武帝武帝甚加意焉為納桞世隆女為妃武帝與羣臣看新婚流涕不自勝豫章王嶷亦哽咽及明帝誅髙帝諸子以鉉髙帝所愛亦以才弱年幼故得全初鉉年三四嵗髙帝常晝卧纒髪鉉上髙帝腹上弄繩髙帝因以繩賜鉉及崩後鉉以寳函盛繩嵗時輒開視流涕嗚咽鉉人才甚凡而有此一至性建武中髙武子孫憂疑鉉朝見常鞠躬俯僂不敢正行直視尋遷侍中衛将軍鉉年稍長四年誅王晏以謀立鉉為名鉉免官以王還第禁不得與外人交通永泰元年明帝暴疾甚乃見害聞收至欣然曰死生命也終不斆建安乞為奴而不得仰藥而卒鉉二子在孩抱亦見殺武帝諸子武帝二十三男穆皇后生文惠太子竟陵文宣王子良張淑妃生廬陵王子卿魚復侯子響周淑儀生安陸王子敬建安王子真阮淑媛生晉安王子懋衡陽王子峻王淑儀生隨郡王子隆蔡媫妤生西陽王子明樂容華生南海王子罕傅充華生巴陵王子倫謝昭儀生邵陵王子貞江淑儀生臨賀王子岳庾昭容生西陽王子文荀昭華生南康王子琳顔媫妤生永陽王子珉宫人謝氏生湘東王子建何充華生南郡王子夏第六第十二第十五第二十二皇子早亡子珉繼衡陽元王後文惠太子長懋字雲喬小字白澤武帝長子也武帝年未弱冠而生太子姿容豐美為髙帝所愛宋元徽末除祕書郎不拜授輔國将軍遷晉熙王撫軍主簿武帝在郢遣太子還都髙帝方創覇業心存嫡嗣謂太子曰汝還吾事辦矣處之府東齋令通文武賔客髙帝謂荀伯玉曰我出行日城中軍悉受長懋節度我雖不行内外直防及諸門甲兵悉令長懋時時履行轉祕書丞以與宣帝諱同不就厯中書黄門侍郎昇明三年髙帝将受禪武帝已還京師以襄陽兵馬重鎮不欲處他族出太子為都督雍梁二州北中郎将寕蠻校尉雍州刺史建元元年封南郡王江左嫡皇孫封王自此始也先是梁州刺史范栢年頗著威名沈攸之事起候望形勢事平朝廷遣王元邈代之元邈已至栢年遲回魏興不肯下太子慮其為變乃遣人説之許啟為府長史及至襄陽因執誅之時襄陽有盜發古冢者相傳云楚王冢大獲寳物有玉鏡玉屐玉屏風之屬有簡書青絲編簡廣數分長二尺依前如新盜以把火自照後人有得十餘簡以示王僧䖍僧䖍云是科斗書考工記周官所闕也二年徴為侍中中軍将軍置府鎮石頭穆妃薨成服日車駕出臨喪朝議疑太子應出門迎左僕射王儉曰尋禮記服問君所主夫人妻太子嫡婦言國君為此三人為主喪也今鑾輿臨降自以主喪而至雖因事撫慰義不在弔南郡以下不應出門奉迎但尊極所臨禮有變革權去杖絰移立户外足表情敬無煩止哭皇太子既一宫之主自應以車駕幸宫依常奉候既當成服之日吉凶不相干宜以衰絰行事望拜止哭率由舊章尊駕不以臨弔奉迎則惟常體求之情禮如為可安又其年九月有閏小祥疑應計閏儉又議以為三百六旬尚書明義文公納幣春秋致譏故先儒朞喪嵗數沒閏大功以下月數數閏所以呉啇云舍閏以正朞允協情理沒閏之理固在言先並從之武帝即位立為皇太子初髙帝好左氏春秋太子承㫖諷誦以為口實及正位東儲善立名尚解聲律工射飲酒至數斗而未甞舉杯從容有風儀引接朝士人人自以為得意文武士多所招集㑹稽虞炎濟陽范岫汝南周顒陳郡袁廓並以學行才能應對左右而武人略陽垣厯生襄陽蔡道貴拳勇秀出當時以比闗羽張飛其餘安定梁天惠平原劉孝慶河東王世興趙郡李居士襄陽黄嗣祖魚文康絢之徒並為後來名将永明三年於崇正殿講孝經少傅王儉令太子僕周顒撰為義䟽五年冬太子臨國學親䇿試諸生與王儉等論五經疑滯酬答甚有條貫明年上将訊丹陽所領囚為南北二百里内獄詔太子於元圃園宣猷堂録三署囚原宥各有差上晩年好遊宴尚書曹事亦分送太子省視太子與竟陵王子良俱好釋氏立六疾館以飬窮人太子風韻甚和而性頗奢麗宫内殿堂皆雕飾精綺過於上宫開拓元圃園與䑓城北塹等其中起出土山池閣樓觀塔宇窮竒極麗費以千萬多聚異石妙極山水慮上宫中望見乃旁列修竹外施髙鄣造游觀數百間施諸機巧宜須鄣蔽須臾成立若應毁撒應手遷徙製珍玩之物織孔雀毛為裘光采金翠過於雉頭逺矣以晉明帝為太子時立西池乃啟武帝引前例求於東田起小苑上許之永明中二宫兵力全實太子使宫中将吏更蕃築役營城包巷制度之盛觀者傾都上性雖嚴太子所為無敢啟者後上幸豫章王宅還過東田見其彌亘華逺壮麗極目於是大怒收監作主帥太子懼皆蔵之由是見責太子素疾體又過壮常在宫内簡於遨遊玩㺯羽儀多所僭擬雖咫尺宫禁而上終不知又使徐文景造輦及乗輿御物虎賁雲罕之屬上甞幸東宫怱怱不暇蔵輦文景乃以佛像内輦中故上不疑文景父陶仁時為給事中謂文景曰終當滅門政當掃墓以待喪耳仍移家避之其後文景竟賜死陶仁遂不哭時人以為有古人風十一年正月太子有疾上自臨視有憂色疾篤上表告辭薨於東宫宗明殿時年三十六朝野驚惋上幸東宫臨哭盡哀詔歛以衮冕之服諡曰文惠𦵏崇安陵有司奏御服朞朝臣齊衰三月南郡國臣齊衰朞臨汝曲江國臣并不服六宫不從服武帝履行東宫見太子服玩過制大怒勑有司隨事毁除以東田殿堂處為崇虛館欎林立追尊為文帝廟稱世宗初太子内惡明帝宻謂竟陵王子良曰我意思中殊不悦此人當由其福徳薄所致子良每苦救解後明帝立果大相誅害竟陵文宣王子良字雲英武帝第二子也幼聰敏武帝為贑縣時與裴后不諧遣人船送后還都已登路子良時年小在庭前不悦帝謂曰汝何不讀書子良曰孃今何處何用讀書帝異之即召后還縣仕宋為邵陵王友昇明三年為㑹稽太守都督五郡封聞喜公宋元喜中皆責成郡縣孝武後徴求急速以郡縣遲緩始遣䑓使自此公役勞擾髙帝踐阼子良陳之請息其弊子良敦義愛古郡人朱百年有至行先卒賜其妻米百斛蠲一人給其薪蘇郡閤下有虞翻舊牀罷任還乃致以歸後於西邸起古齋多聚古人器服以充之夏禹廟盛有禱祀子良曰禹泣辜表仁菲食飲約服玩果粽足以致誠使嵗獻扇簟而已時有山隂人孔平詣子良訟嫂市米負錢不還子良歎曰昔髙文通與寡嫂訟田義異於此乃賜米錢以償平建元二年穆妃薨去官仍為丹陽尹開私倉振屬縣貧民先是太妃以七月薨子良以八月奉凶問及小祥疑南郡王應相待尚書左僕射王儉議以為禮有倫序義無徒設如令逺則不待近必相須禮例既乖即心無取若疑兄弟同居吉凶舛雜則逺還之子自應開立别門以終喪事靈筵祭奠隨在家之人再朞而毁庶子在家亦不待嫡況儲妃王體王室中軍長奠之重天朝又行權制進退彌復非疑謂應不相待中軍縓縞之日聞喜致哀而已不受弔慰至聞喜變除昆弟亦宜相就寫情不對客從之武帝即位封竟陵郡王鎮南将軍南徐州刺史加都督永明二年為䕶軍将軍兼司徒四年進號車騎将軍子良少有清尚禮才好士居不疑之地傾意賔客天下才學之士皆游集焉善立勝事夏月客至為設𤓰飲及甘果著之文敎士子文章及朝貴辭翰者皆發敎撰録是時武帝新視政水旱不時子良宻啟請原除逋租又陳寛刑息役輕賦省徭并陳泉鑄嵗逺類多翦鑿江東大錢十不一在公家所受必須輪郭完全遂買本一千加子七百求請無地捶革相驅尋完者為用既不兼兩回復遷貿㑹非委積徒令小人毎嬰困苦且錢布相半為制永久或聞長宰須令輸直進違舊科退容姦利又言三呉奥區地惟河輔百度所資罕不自出而守宰相繼務在裒刻圍桑品屋以凖貲課致令斬植發瓦以避重賦破民敗産要利一時乃有恐失嚴期自殘軀命亦有斬絶手足以避徭役守長不務先富民而唯言益國豈有民貧於下而國富於上邪五年正位司徒給班劔二十人侍中如故移居雞籠山西邸集學士抄五經百家依皇覽例為四部要略千卷招致名僧講論佛法造經唄新聲道俗之盛江左未有也武帝好射雉子良啟諫先是左衛殿中将軍邯鄲超上書諫射雉武帝為止久之超竟被誅永明末上将復射雉子良復諫前後所陳上雖不甚納而深見寵愛又與文惠太子同好釋氏甚相友悌子良敬信尤篤數於邸園營齋戒大集朝臣衆僧至於賦食行水或躬親其事世頗以為失宰相體然勸人為善未甞厭倦以此終致盛名八年給三望車九年京邑大水呉興偏劇子良開倉賑救病貧不能立者於第北立解収飬給衣及藥十年領尚書令揚州刺史本官如故尋解尚書令加中書監文惠太子薨武帝檢行東宫見太子服御羽儀多過制度上大怒以子良與太子善不啟聞頗加嫌責武帝不豫詔子良甲仗入延昌殿侍醫藥子良啟進沙門於殿户前誦經武帝為感夢見優鉢曇花子良按佛經宣㫖使御府以銅為花挿御牀四角日夜在殿内太孫間日入參武帝暴漸内外惶懼百官皆已變服物議疑立子良俄頃而帝蘓問太孫所在因召東宫器甲皆入遺詔使子良輔政明帝知尚書事子良素仁厚不樂時務乃推明帝於是詔云事無大小悉與鸞參懐子良所志也太孫少飬於子良妃袁氏甚著慈愛既懼前不得立自此深忌子良大行出太極殿子良居中書省帝使虎賁中郎将潘敞二百人仗屯太極西階之下成服後諸王皆出子良乞停至山陵不許進位太傅増班劔為三十人本官如故解侍中隆昌元年加殊禮劔履上殿入朝不趨贊拜不名進督南徐州其年疾篤謂左右曰門外應有異遣人視見淮中魚無筭皆浮出水上向城門尋薨時年三十五帝常慮子良有異志及薨甚悦詔給東園温明祕器歛以衮冕之服東府施喪位大鴻臚持節監䕶太官朝夕送祭又詔追崇假黄鉞侍中都督中外諸軍事太宰領大将軍豫州牧緑綟綬備九服錫命之禮使持節中書監王如故給九旒鸞輅黄屋左纛輼輬車前後部羽葆鼓吹挽歌二部虎賁班劒百人𦵏禮依晉安平王孚故事初豫章王嶷葬金牛山文惠太子𦵏夾石子良臨祖送望硎山悲感歎曰北瞻吾叔前望吾兄死而有知請葬兹地及薨遂𦵏焉所著内外文筆數十卷雖無文采多寓勸戒子良既亡故人皆來奔赴陸慧曉於邸門逄袁彖問之曰近者云云定復何謂王融見殺而魏凖破膽道路藉藉又謂竟陵不永天年寕有之乎彖曰齊氏微弱已數年矣爪牙柱石之臣都盡命之所餘政風流名士耳若不立長君無以鎮安四海王融雖為身計實安社稷恨其不能斷事以至於此道路之談自為虛説耳蒼生方塗炭矣政當瀝耳聼之建武中故吏范雲上表為子良立碑事不行子昭胄嗣昭胄字景允汎渉書史有父風位太常以封境邊魏永元元年改封巴陵先是王敬則事起南康侯子恪在呉郡明帝慮有同異召諸王公入宫晉安王寳義及江陵公寳覽等住中書省髙武諸孫住西省𠡠人各兩左右自隨過此依軍法孩抱者乳母隨入其夜太醫煮藥都水辦數十具棺材須三更當悉殺之頼子恪至乃免自建武以來髙武王侯居常震怖朝不保夕至是尤甚及陳顯逹起事王侯復入宫昭胄懲往時之懼與弟永新侯昭頴逃奔江西變形為道人崔慧景舉兵昭胄兄弟出投之慧景事敗昭胄兄弟首出投臺軍主胡松各以王侯還第不自安謀為身計子良故防閤桑偃為梅蟲兒軍副結前巴西太守蕭寅謀立昭胄同黨皆伏誅梁受禪降昭胄子同為監利侯同弟賁字文奐形不滿六尺神識耿介幼好學有文才能書善畫於扇上圖山水咫尺之内便覺萬里為遥矜慎不傳自娯而已好著述嘗著西京新記六十卷起家湘東王法曹參軍得一府歡心及亂王為檄賁讀至偃師南望無復儲胥露寒河陽北臨或有穹廬氊帳乃曰聖製此句非為過似如體自朝廷非闗序賊王聞之大怒収付獄遂以餓終又追戮賁尸乃著懐舊傳以謗之極言誣毁廬陵王子卿字雲長武帝第三子也建元元年封臨汝郡公武帝即位為郢州刺史加都督子卿諸子中無徳又與魚復侯子響同生故無寵徙都督荆州刺史始興王為益州子卿解督子卿在鎮營造服飾多違制度作瑇瑁乘具詔責之令速送都又作銀鐙金薄褁箭腳亦便速壊去凡諸服章自今不啟專輙作者當得痛杖又曰汝比令讀書今年轉成長學既勿就得𠡠如風過耳使吾失氣永明十年為都督南豫州刺史之鎮道中戱部伍為水軍上聞大怒殺其典籖遣宜都王鏗代之子卿還第至帝崩不與相見隆昌元年為衛将軍開府儀同三司置兵佐鄱陽王鏘見害以子卿代為司徒所居屋梁柱際出血溜于地旬日而見殺魚復侯子響字雲音武帝第四子也豫章王嶷無子飬子響後嶷有子表留為嫡武帝即位為南彭城臨淮二郡太守子響勇力絶人開弓四斛力數在園池中帖騎馳走竹樹下身無虧傷既出繼車服異諸王每入朝輙忿拳打車壁武帝知之令車服與皇子同永明六年有司奏子響宜還本乃封巴東郡王七年為都督荆州刺史直閤将軍董蠻粗有氣力子響要與同行蠻曰殿下癲如雷敢相隨邪子響笑曰君敢出此語亦復竒癲上聞而不悦曰人名蠻復何容得藴藉乃為改名為仲舒謂曰今日仲舒何如昔日仲舒答曰昔日仲舒出自私庭今日仲舒降自天帝以此言之勝昔逺矣上稱善子響少好武帶仗左右六十人皆有膽幹至鎮數在内齋殺牛置酒與之聚樂令私作錦袍絳襖欲餉蠻交易器仗長史劉寅等連名宻啟上𠡠精檢寅等懼欲祕之子響聞有䑓使不見勑乃召寅及司馬席恭穆諮議參軍江悆殷曇粲中兵參軍周彦典籖呉修之王賢宗魏景深等俱入於琴䑓下併斬之上聞之怒遣衛尉胡諧之㳺撃将軍尹略中書舍人茹法亮領羽林三千人檢捕羣小𠡠子響若來首自歸可全其性命諧之等至江津築城燕尾洲子響白服登城頻遣信與相聞曰天下豈有兒反父身不作賊直是麄疎今便單舸還闕何築城見捉邪尹略獨答曰誰将汝反父人共語子響聞之唯灑泣又送牛酒果饌餉臺軍略棄之江流子響膽力之士王衡天不勝忿乃率黨度洲攻壘斬略而諧之法亮單艇奔逸上又遣丹陽尹蕭順之領兵繼之子響即日将白衣左右三十人乘舴艋中流下都初順之将發文惠太子素忌子響宻屬不許還令便為之所子響及見順之欲自申明順之不許於射堂縊之有司奏絶子響屬籍賜為蛸氏子響宻作啟數紙藏妃王氏裙腰中具自申明云輕舫還闕不得此苦之深唯願矜憐無使竹帛齊有反父之子父有害子之名及順之還上心甚怪恨百日於華林為子響作齋上自行香對諸朝士嚬蹙及見順之嗚咽移時左右莫不掩涕他日出景陽山見一猨透擲悲鳴問後堂丞此猨何意答曰猨子前日墮崖致死其母求之不見故爾上因憶子響歔欷不自勝順之慙懼感病遂以憂卒於是豫章王嶷為子響表請還葬上不許貶為魚復侯安陸王子敬字雲端武帝第五子也初封應城縣公先是子敬所生早亡帝命貴妃范氏母飬之及范氏薨而子及婦服制禮無明文永明中尚書令王儉議孫為慈孫婦為慈婦姑為慈姑宜制朞年服從之十年位散騎常侍撫軍将軍丹陽尹十一年加車騎将軍隆昌元年遷都督南衮州刺史延興元年加侍中明帝除諸蕃王遣中䕶軍王元邈征九江王廣之襲殺子敬初子敬為武帝所留心帝不豫有意立子敬為太子代太孫子敬與太孫俱入參畢同出武帝目送子敬良久曰阿五鈍由此代換之意乃息晉安王子懋字雲昌武帝第七子也諸子中最為清恬有意思亷讓好學年七嵗時母阮淑媛嘗病危篤請僧行道有獻蓮華供佛者衆僧以銅甖盛水漬其莖欲華不萎子懋流涕禮佛曰若使阿姨因此和勝願諸佛令華竟齋不萎七日齋畢華更鮮紅視甖中稍有根鬚當世稱其孝感永明五年為南衮州刺史監五州軍事六年徙監湘州刺史八年撰春秋例苑三十卷奏之武帝勑付祕閣十一年為都督雍州刺史給鼓吹一部時豫章王喪服未畢上以邊州須威望許得奏之子懋啟求所好書武帝曰知汝常以讀書在心足為深欣賜以杜預手所定左傳及古今善言隆昌元年為征南大将軍江州刺史𠡠留西楚部曲助鎮襄陽單将白直俠轂自隨陳顯逹時屯襄陽入辭子懋謂之曰朝廷命身單身而反身是王者豈可過爾輕率今欲将二三千人自隨於公意何如顯逹曰殿下若不留部曲便是大違𠡠㫖顯逹因辭出便發去子懋計未立還鎮尋陽延興元年加侍中聞鄱陽隨郡二王見殺欲起兵赴難與參軍周英防閤陸超之議傳檄荆郢入討君側事成則宗廟獲安不成猶為義鬼防閤董僧慧攘􅃑曰此州雖小孝武亦嘗用之今以勤王之師横長江指北闕以請欎林之過誰能對之於是部分兵将入匡社稷母阮在都遣書欲宻迎上阮報同産弟于瑶之為計瑶之馳告明帝於是纂嚴遣中䕶軍王元邈平西将軍王廣之南北討使軍主裴叔業與瑶之先襲尋陽聲云為郢府司馬子懋知之遣三百人守湓城叔業泝流直上襲湓城子懋先已具船於稽亭渚聞叔業得湓城乃據州自衛子懋部曲多雍土人皆踊躍願奮叔業畏之遣于瑶之説子懋曰今還都必無過憂政當作散官不失富貴也子懋既不出兵攻叔業衆情稍沮中兵參軍于琳之瑶之兄也説子懋重賂叔業子懋使琳之往琳之因説叔業請取子懋叔業遣軍主徐元慶将四百人隨琳之入城僚佐皆奔散唯周英及外兵參軍王皎更移入城内子懋聞之歎曰不意吾府有義士二人琳之從二百人仗自入齋子懋笑謂之曰不意渭陽翻成梟獍琳之以䄂障靣使人害之故人懼罪無敢至者唯英皎僧慧號哭盡哀為喪殯董僧慧丹陽姑熟人出自寒微而慷慨有節義好讀書甚驍果能反手於背彎五斛弓當世莫有能者元邈知其豫子懋之謀執之僧慧曰晉安舉義兵僕實豫議古人云非死之難得死之難僕得為主人死不恨耳願至主人大歛畢退就湯鑊雖死猶生元邈義而許之還具白明帝乃貸死配東冶毎言及九江時事輙悲不自勝子懋子昭基九嵗以方二寸絹為書參其消息并遺錢五百以金假人﨑嶇得至僧慧覩書對錢曰此郎君書也悲慟而卒陸超之呉人以清静雅為子懋所知子懋既敗于琳之勸其逃亡答曰人皆有死此不足懼吾若逃亡非唯孤晉安之眷亦恐田横客笑人元邈等以其義欲囚将還都而超之亦端坐侍命超之門生姓周者謂殺超之當得賞乃伺超之坐自後斬之頭墜而身不僵元邈嘉其節厚為殯歛周又助舉棺未出户棺墜政壓其頭折頸而死聞之者莫不以為有天道焉隨郡王子隆字雲興武帝第八子也性和美有文才娶尚書令王儉女為妃武帝以子隆能屬文謂儉曰我家東阿也永明八年為都督荆州刺史隆昌元年為侍中撫軍将軍領兵置佐延興元年轉中軍大将軍侍中如故子隆年二十一而體過充壮常使徐嗣伯合蘆茹丸以服冀自銷損然猶無益明帝輔政謀害諸王武帝諸子中子隆最以才貎見憚故與鄱陽王鏘同夜先見殺文集行於世建安王子真字雲仙武帝第九子也永明七年累遷郢州刺史加都督隆昌元年為散騎常侍䕶軍将軍延興元年明帝遣裴叔業就典籖柯令孫殺之子真走入牀下令孫手牽出之叩頭乞為奴贖死不從見害年十九西陽王子明字雲光武帝第十子也永明元年封武昌王三年失國璽改封西陽十年為㑹稽太守督五郡軍事子明風姿明浄士女觀者咸嗟歎之建武元年為撫軍将軍領兵置佐二年誅蕭諶子明及弟子罕子貞同諶謀見害年十七南海王子罕字雲華武帝第十一子也頗有學母樂容華有寵故武帝留心母嘗寝疾子罕晝夜祈禱于時以竹為燈纘照夜此纘宿昔枝葉大茂母病亦愈咸以為孝感所致主簿劉鬷及侍讀賀子喬皆為賦頌焉建武元年位䕶軍将軍一年見殺時年十七巴陵王子倫字雲宗武帝第十三子也永明十年為北中郎将南琅邪彭城二郡太守鬱林即位以南彭城禄力優厚奪子倫與中書舍人綦母珍之更以南蘭陵代之延興元年明帝遣中書舍人茹法亮殺子倫子倫時鎭瑯邪城有守兵子倫英果明帝恐不即罪以問典籖華伯茂伯茂曰公若遣兵取之恐不即可辦若委伯茂一小吏力耳旣而伯茂手自執鴆逼之左右莫敢動者子倫正衣冠出受詔謂法亮曰積不善之家必有餘殃昔髙皇帝殘滅劉氏今日之事理數固然舉酒謂法亮曰君是身家舊人今衘此命當由事不獲已此酒差非勸酬之爵因仰之而死時年十六法亮及左右皆流涕先是髙帝武帝為諸王置典籖帥一方之事悉以委之每至覲接輙留心顧問刺史行事之羙惡繋於典籖之口莫不折節推奉恒慮弗及於是威行州郡權重蕃君武陵王􅁮為江州性烈直不可忤典籖趙澤之曰今出郡易刺史及見武帝相誣􅁮遂免還南海王子罕戍琅邪欲暫游東堂典籖姜秀不許而止還泣謂母曰兒欲移五歩亦不得與囚何異秀後輙取子罕屐繖飲器等供其兒昏武帝知之鞭二百繋尚方然而擅命不改邵陵王子貞嘗求熊白厨人答典籖不在不敢與西陽王子明欲送書參侍讀鮑僎病典籖呉修之不許曰應諮行事乃止言行舉動不得自專徵求衣食必須諮訪永明中巴東王子響殺行事劉寅等武帝聞之謂羣臣曰子響遂反戴僧静大言曰諸王都自應反豈唯巴東武帝問其故答曰諸王無罪而一時被囚取一挺藕一杯漿皆諮籖帥不在則竟日飢渇諸州唯聞有籖帥不聞有刺史竟陵王子良嘗問衆曰士大夫何意詣典籖參軍范雲答曰詣長史以下皆無益詣籖帥便有倍本之價不詣謂何子良有愧色及明帝誅異己者諸王見害悉典籖所殺竟無一人相抗孔珪聞之流涕曰齊之衡陽江夏最有意而復害之若不立籖帥故當不至於此邵陵王子貞字雲松武帝第十四子也建武二年見誅時年十五臨賀王子岳字雲嶠武帝第十六子也明帝誅武帝諸子唯子岳及弟六人在後時呼為七王朔望入朝上還後宫輙嘆息曰我及司徒諸兒子皆不長高武子孫日長大永泰元年上疾甚絶而復蘇於是誅子岳等延興建武中凡三誅諸王每一行事明帝輙先燒香嗚咽涕泣衆以此輙知其夜當殺戮也子岳死時年十四西陽王子文字雲儒武帝第十七子也永明七年封蜀郡王建武中改封西陽永泰元年見殺年十四衡陽王子峻字雲嵩武帝第十八子也永明七年封廣漢郡王建武中改封衡陽永泰元年見殺年十四南康王子琳字雲璋武帝第十九子也母荀昭華有盛寵後宫才人位登采女者依例賜玉鳯凰荀時始為采女得玉鳯凰投地曰我不能例受此武帝乃拜為昭華子琳以母寵故最見愛太尉王儉因請昏武帝悦而許之羣臣奉賀物各好盡直數百金武帝為之報答亦如此及應封而好郡已盡乃以宣城封之既而宣城屬揚州不欲為王國改封南康公禇蓁為巴東公以南康為王國封子琳永泰元年見殺年十四湘東王子建字雲立武帝第二十一子也母謝無寵武帝度為尼明帝即位使還母子建永泰元年見殺年十三南郡王子夏字雲廣武帝第二十三子也上春秋髙子夏最㓜寵愛過諸子初武帝夢金翅鳥下殿庭搏食小龍無數乃飛上天及明帝初其夢始驗永泰元年子夏誅年七嵗文恵諸子文恵太子四男安皇后生廢帝鬱林王昭業宫人許氏生廢帝海陵恭王昭文陳氏生巴陵王昭秀禇氏生桂陽王昭粲巴陵王昭秀字懐尚太子第三子也鬱林即位封臨海郡王隆昌元年為都督荆州刺史延興元年徵為車騎将軍明帝建武二年改封巴陵王永泰元年見殺年十六桂陽王昭粲太子第四子也鬱林立封永嘉郡王延興元年出為荆州刺史加都督建武三年改封桂陽王四年為太常永泰元年見殺年八嵗明帝諸子明帝十一男敬皇后生廢帝東昏侯寳卷江夏王寳元鄱陽王寳夤和帝殷貴妃生巴陵隠王寳義晉熈王寳嵩袁貴妃生廬陵王寳源管淑妃生邵陵王寳修許淑媛生桂陽王寳貞餘皆早夭巴陵隠王寳義字智勇明帝長子也本名明基建武元年封晉安郡王寳義少有廢疾不堪出人間止加除授為都督揚州刺史仍以始安王遥光代之轉為右将軍領兵置佐鎮石頭二年為南徐州刺史加都督東昏即位進征北将軍開府儀同三司給扶永泰元年為都督揚州刺史三年進位司徒和帝西䑓建以為侍中司空梁武平建鄴宣徳太后令以寳義為太尉領司徒詔曰不言之化形于自逺時人皆云此實録也梁受禪封謝沐公尋封巴陵郡王奉齊後天監中薨江夏王寳元字智深明帝第三子也建武元年封江夏郡王東昏即位為都督南徐兖二州刺史寳元娶尚書令徐孝嗣女為妃孝嗣被誅離絶東昏送少姫二人與之寳元恨望有異計明年崔慧景舉兵還至廣陵遣使奉寳元為主寳元斬其使因是發将吏防城慧景将渡江寳元密與相應開門納慧景乗八掆輿手執絳摩幡隨慧景至都百姓多徃投集慧景敗收得朝野投寳元及慧景軍名東昏令燒之曰江夏尚爾豈復可罪餘人寳元逃奔數日乃出帝召入後堂以歩鄣褁之令羣小數十人鳴鼔角馳繞其外遣人謂曰汝近圍我亦如此少日乃殺之廬陵王寳源字智泉明帝第五子也建武元年封和帝即位為車騎将軍開府儀同三司中興二年薨鄱陽王寳夤字智亮明帝第六子也建武初封建安郡王東昏即位為都督郢州刺史永元三年為車騎将軍開府儀同三司鎮石頭其秋雍州刺史張欣泰等謀起事於新亭殺䑓内諸主帥難作之日并前南譙太守王靈秀奔往石頭帥城内将吏去車腳載寳夤向䑓城百姓數千人皆空手隨後至杜姥宅日己欲暗城門閉城上人射之衆棄寳夤走寳夤逃亡三日戎服詣草市尉尉馳啟帝帝迎入宫問之寳夤涕泣稱制不自由帝笑乃復爵位宣徳太后臨朝改封寳夤鄱陽王中興二年梁武剋建鄴以兵守之将加害焉其家閹人顔文智與左右麻拱黄神宻計穿牆夜出寳夤具小船於江岸變服潛赴江畔躡屩徒歩腳無完膚防守者至明追之寳夤假為釣者隨流上下十餘里追者不疑待散乃度西岸遂委命投華文榮文榮與其從天龍恵逹等三人棄家将寳夤遁匿山澗賃驢乗之晝伏宵行逹魏夀春東城戍戍主杜元倫推檢知實蕭氏子以禮延待馳告揚州刺史任城王澄澄以車馬侍衛迎之時年十六徒歩憔悴見者以為掠賣生口也澄待以客禮乃請䘮君斬衰之服澄遣人曉示情禮以䘮兄之制給其齊衰寳夤從命澄率官僚赴弔寳夤居處有禮不飲酒食肉輟笑簡言一同極哀之節夀春多其故義皆受慰唁唯不見夏侯一族以其同梁故也改日造澄澄深器重之及至洛陽宣武禮之甚重伏訴闕下請兵南伐雖遇暴風大雨終不暫移是年梁江州刺史陳伯之與其長史禇胄等自夀春歸降請軍立効宣武謂伯之所陳時不可失以寳夤懇誠除使持節都督東揚南徐兖三州刺史鎮東将軍丹陽郡公齊王配兵一萬令據東城待秋冬大舉寳夤明當拜命其夜慟哭至晨宣武備禮䇿授賜車馬什物事從豐厚又任其募天下壮勇得數千人以文智等三人為積弩将軍文榮等三人為彊弩将軍並為軍主寳夤雖少覊寓而志性雅重過朞猶絶酒肉慘悴形色蔬食麤衣未嘗嬉笑及被命當南伐貴要多相慿託門庭賔客若市而書記相尋寳夤接對報復不失其理正始元年寳夤行逹汝隂東城已陷遂停夀春逢梁将姜慶真内侵圍逼夀春寳夤率衆大戰破走之寳夤勇冠諸軍見者莫不壮之還改封梁郡公及中山王英南伐寳夤又表求行與英頻破梁軍乗勝攻鍾離淮水汎溢寳夤與英狼狽引退士卒死没者十四五有司奏處以極法詔恕死免官削爵還第尋尚南陽長公主公主有婦徳事寳夤盡禮相遇如賔永平四年盧昶克梁胊山戍以琅邪戍主傅文驥守之梁師攻文驥昶督衆軍救之詔寳夤為使持節假安南将軍别将長驅往赴受昶節度寳夤受詔泣涕横流哽咽良久後昶軍敗唯寳夤全師而還延昌初除瀛州刺史復其齊王遷兾州刺史及大乗賊起寳夤遣軍討之頻為賊破臺軍至乃滅之靈太后臨朝還都梁将康絢於浮山堰淮以灌揚徐除寳夤使持節都督東討軍事鎮東将軍以討之復封梁郡公熙平初梁堰旣成淮水将為揚徐之患寳夤乃於堰上流更鑿新渠水乃小減乃遣壮士千餘人夜度淮燒其竹木營聚破其三壘火數日不滅又分遣将破梁将垣孟孫張僧副等於淮北仍度淮南焚梁徐州刺史張豹子等十一營及還為殿中尚書寳夤之在淮堰梁武寓書招誘之寳夤表送其書陳其忿毒之意志存雪復屢請居邉神龜中為都督徐州刺史車騎大将軍乃起學館於郡東朔望引見士姓子弟接以恩顔與論經義勤於聽理吏民愛之正光二年徵為尚書左僕射善於吏職甚有能名四年上表曰竊惟文武之名在人之極地徳行之稱為生之最首忠貞之羙立朝之譽仁義之號處身之端自非職惟九官任當四嶽授曰爾諧譲稱俞往将何以克厭大名允兹令問自比以來官㒺髙卑人無貴賤皆飾辭假説用相襃舉求者不能量其多少與者不能覈其是非遂使冠履相貿名實皆爽謂之考功事同汎陟紛紛漫漫焉可勝言又在京之官積年十考其中或所事之主遷移數四或所奉之君身亡廢絶雖當時文簿記其殿最日久月遥散落都盡累年之後方求追訪無不茍相悦附共為脣齒飾垢掩疵妄加丹素趣令得階而已無所顧惜賢逹君子未免斯患中庸已降夫復何論官以求成身以請立上下相䝉莫斯為甚又勤恤民隱咸歸守令厥任非輕所責實重然及其考課悉以六載為約既而限滿代還復經六年而叙是則嵗周十二始得一階於東南兩省文武閑職公府散佐無事冗官或數旬方應一直或朔望止於暫朝及其考日更得四年為限是則一紀之中便登三級彼以實勞劇任而遷貴之路至難此以散位虚名而升陟之方甚易何内外之相縣令厚薄之若此孟子曰仁義忠信天爵也公卿大夫人爵也古之人修其天爵而人爵從之故雖文質異時洿隆殊世莫不寳茲名器不以假人是以賞罰之科恒自持也乃至周之藹藹五叔無官漢之察察館陶徒請誠以賞罰一差則無以懲勸至公暫替則覬覦相欺故至慎至惜殷勤若此况乎親非肺腑才乖秀逸或充单介之使始無汗馬之勞或説興利之規終縣十一之潤皆虚張無功妄指贏益坐獲數階之官籍成通顯之貴於是巧詐萌生偽辯鋒出役萬慮以求榮開百方而逐利抑之則其流已往引之則有何紀極夫琴瑟在於必和更張求其適調去者既不可追來者猶或宜改案周官太宰之職嵗終則令官府各正所司受其㑹計聽其事致而詔於王三嵗則大計羣吏之政而誅賞之愚謂今可粗依其凖見居官者每嵗終本曹皆明辯在官日月具覈才行能否審其實用而注其上下游辭宕説一無取焉列上尚書覆其合否如有紕繆即正而罰之不得方復推詰委下容其進退既定其優劣善惡交分經奏之後考功曹别書於黄紙油帛一通則本曹尚書與令僕印署留於門下一通則以侍中黄門印署掌在尚書嚴加緘密不得開視考績之日然後對共裁量其外内考格裁非庸管乞求博議以為畫一若殊謀異䇿事闗廢興遐邇所談物無異議者自可臨時斟酌匪拘常例至如援流引比之訴貪榮求級之請如不限以關鍵肆其旁通則蔓草難除涓流遂積穢我彛章撓茲大典謂宜明加禁斷以全至化詔付外博議以為永式竟無所改時梁武第四子西豐侯正徳降魏寳夤表曰正徳既不親親安能親人脫包此凶醜寘之列位百官是象其何誅焉臣釁結禍深痛纏骨髓日暮途遥報復無日豈區區於一竪哉但才雖庸近職居獻替愚𠂻寸抱敢不申陳正徳既至洛陽朝廷待之尤薄嵗餘還叛初秦州城人薛伯珍劉慶杜遷等反執刺史李彦推莫折大提為首自稱秦王大提尋死其第四子念生竊號天子年曰天建置官僚以息阿胡為太子其兄阿倪為西河王弟天生為髙陽王伯珍為東郡王安保為平陽王天生率衆出隴東遂㓂雍州屯於黒水朝廷甚憂之除寳夤開府西道行臺為大都督西征明帝幸明堂以餞之寳夤與大都督崔延伯撃天生大破之追奔至小隴進討髙平賊帥万俟醜奴於安定更有負㨗時有天水人呂伯度兄弟始共念生同逆後與兄衆保於顯親聚衆討念生戰敗奔於胡琛琛以伯度為大都督秦王資其士馬還征秦州大破念生将杜粲於成紀又破其金城王莫折普賢於永洛城遂至顯親念生率衆身自拒戰又大敗伯度乃背胡琛遣其兄子忻和率騎東引大軍念生事廹乃詐降於寳夤朝廷嘉伯度立義之功授涇州刺史平秦郡公而大都督元修義髙聿停軍隴口久不西進念生復反伯度為醜奴所殺故賊勢更甚寳夤不能制孝昌二年除寳夤侍中驃騎大将軍儀同三司假大将軍尚書令給前後部鼓吹寳夤初自黒水終至平涼與賊相對年年攻撃賊亦惮之闗中保全寳夤之力三年正月除司空公出師既久兵将疲弊是月大敗還雍州有司處寳夤死罪詔恕為編户四月除征西将軍雍州刺史開府西討大都督自闗以西皆受節度九月念生為其常山王杜粲所殺合門皆盡粲降寳夤十月除尚書令復其舊封時山東闗西㓂賊充斥王師屢北人情沮䘮寳夤自以出師累年麋費尤廣一旦覆敗慮見猜責内不自安朝廷頗亦疑沮及遣御史中尉酈道元為闗中大使寳夤謂密取己将有異圖以問河東桞楷楷曰大王齊明帝子天下所屬今日之舉實允人望且謡言鸞生十子九子􅀈一子不􅀈闗中亂武王有亂臣十人亂者理也大王當理闗中何所疑慮道元行逹隂盤驛寳夤密遣其将郭子恢等攻殺之而詐收道元尸表言白賊所害遂反僭舉大號大赦其部内稱隆緒元年立百官詔尚書僕射行臺長孫承業討之時北地毛鴻賔與其兄遐紀率鄉義将討寳夤寳夤遣其将侯終徳往攻遐終徳還圖寳夤軍至白門寳夤始覺與終徳戰敗􅂝公主及其少子與部下百餘騎從後門出遂奔万俟醜奴醜奴以寳夤為太傅爾朱天光遣賀拔岳等破醜奴於安定追禽醜奴及寳夤並送京師詔置閶闔門外都街中京師士女聚觀凡經三日吏部尚書李神雋黄門侍郎髙道穆並與寳夤素舊二人相與左右言於荘帝云其逆迹事在前朝冀将救免㑹應詔王道習時自外至荘帝問道習在外所聞道習曰唯聞陛下欲不殺寳夤人云李尚書髙黄門與寳夤同欵並居得言之地必能全之道習因曰若謂寳夤逆在前朝便将恕之敗在長安為醜奴太傅豈非陛下御歴之日賊臣不翦法欲安施帝然其言乃於太僕駞牛署賜死将刑神雋持酒就之叙故舊因對之下泣寳夤夷然自持了不憂懼唯稱推天委命恨不終臣節公主􅂝男女就寳夤訣别慟哭極哀寳夤亦色貎不改寳夤三子皆公主所生並凡劣長子烈復尚明帝妹建徳公主拜駙馬都尉坐寳夤反伏法次子權與小子凱射戯凱激矢中之死凱妻長孫承業女也輕薄無禮公主數加罪責凱竊衘恨妻復惑說之天平中凱遣奴害公主乃轘凱於東市妻梟首家遂滅邵陵王寳修字智宣明帝第九子也建武元年封南平郡王二年改封中興三年謀反宣徳太后令賜死晉熙王寳嵩字智靖明帝第十子也中興元年和帝以為中書令二年誅桂陽王寳貞明帝第十一子也中興二年誅通志巻八十二
