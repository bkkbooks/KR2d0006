body:
  text: 通志卷一百二十三宋右廸功郎鄭樵漁仲撰列傳第三十六晉劉毅子暾程衛和嶠武陔任愷崔洪郭奕侯史光何攀劉頌李重傅元子咸弟咸從父祗向雄段灼閻纘阮籍兄子咸瞻弟孚咸子瞻從子脩族弟放族弟裕嵇康向秀劉伶謝鯤胡母輔之子謙之畢卓王尼羊曼弟聃光逸庾峻子珉敳珉弟郭象庾純子旉秦秀劉毅字仲雄東萊掖人漢城陽景王章之後父喈丞相屬毅幼有孝行少厲清節然好臧否人物王公貴人望風憚之僑居平陽太守杜恕請為功曹沙汰郡吏百餘人三郡稱焉為之語曰但聞劉功曹不聞杜府君魏末本郡察孝亷辟司𨽻都官從事京邑肅然毅將彈河南尹司𨽻不許曰攫獸之犬鼷䑕蹈其背毅曰既能攫獸又能殺䑕何損於犬投傳而去同郡王基薦毅於公府曰毅方正亮直介然不羣言不茍合行不茍容徃日僑仕平陽為郡股肱正色立朝舉綱引墨朱紫有分鄭衛不雜孝悌著於邦族忠貞効於三魏昔孫陽取騏驥於吳坂秦穆㧞百里於商旅毅未遇知己無所自呈前已口白今復申請太常鄭袤舉博士文帝辟為相國掾辭疾積年不就時人謂毅忠於魏氏而帝怒其顧望將加重辟毅懼應命轉主簿武帝受禪為尚書郎駙馬都尉遷散騎常侍國子祭酒帝以毅忠謇正直使掌諫官轉城門校尉遷太僕拜尚書坐事免官咸寧初復為散騎常侍博士祭酒轉司𨽻校尉糾正豪右京師肅然司部守令望風投印綬者甚衆時人以毅方之諸葛豐蓋寛饒皇太子朝鼓吹將入東掖門毅以為不敬止之於門外奏劾保傅以下詔赦之然後得入帝嘗南郊禮畢喟然謂毅曰卿以朕方漢何帝也對曰可方桓靈帝曰吾雖徳不及古人猶克已為政又平吳會混一天下方之桓靈不亦甚乎對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之殆不如也帝大笑曰桓靈之世不聞此言今有直臣故不同也散騎常侍鄒湛進曰世談以陛下比漢文帝人心猶不多同昔馮唐答文帝云不能用頗牧而文帝大怒今劉毅言犯順而陛下歡然以此相校聖徳乃過之矣帝曰我平天下而不封禪焚雉頭裘行布衣禮卿初無言今於小事何見襃之甚湛曰臣聞猛獸在田荷戈而出凡人能之蜂蠆坐於懷䄂勇夫為之驚駭出於意外故也夫君臣有自然之尊卑言語有自然之逆順向劉毅始言臣等莫不變色陛下發不世之詔出思慮之表臣之善慶不亦宜乎在職六年遷尚書左僕射時龍見五庫井中帝親觀之有喜色百官將賀毅獨表曰昔龍降鄭時門之外子産不賀龍降夏庭沫流不禁卜藏其漦至周幽王禍釁乃發易稱潛龍勿用陽在下也證據舊典無賀龍之禮詔報曰正徳未脩誠未有以膺受嘉祥省來示以為瞿然賀慶之事宜詳依典義動静數示尚書郎劉漢等議以為龍體旣蒼雜以素文白者大晉之行戢武興文之應也而毅乃引衰世妖異以疑今之吉祥又以龍在井為潛皆失其意潛之為言隱而不見今龍彩質眀煥示人以物非潛之謂也毅應推處詔不聼後隂氣解而復合毅上言必有阿黨之臣姦以事君者當誅而不誅故也毅以魏立中正九品之制姦弊日滋因上書言其害曰中正之設損政者八高下逐彊弱是非隨興衰一人之身旬日異狀上品無寒門下品無世族一也置州都者本取州里清議所服將以鎭異同一言議也今重其任而輕其人使駁論横於州里嫌隙結於大臣二也本立格為九品者謂才徳有優劣倫輩有首尾也今乃優劣異地首尾倒錯三也陛下賞善罰惡無不裁之以法獨中正無賞罰之防又禁人訴訟使受枉者不獲上聞四也一國之士多者千數或流徙異邦靣猶不識不過采譽於臺府納毁於流言任已則有不識之蔽聽受則有彼此之偏五也凡求人才以治民也今當官著效者或附卑品在官無績者更獲高叙抑功實而隆虛名長浮華而廢考績六也凡官不同事人不同能今不狀其才之所宜而但第其九品以品取人或非才能之所長以狀取人則為本品之所限徒結白論品狀相妨七也所下不彰其罪所上不列其善各任愛憎以植其私天下之人焉得不懈德行而鋭人事八也由此論之職名中正實為姦府事名九品而有八損宜罷中正棄魏氏之弊法更立一代之美制優詔答之後司空衛瓘等亦共表宜省九品復古鄉議里選帝竟不施行毅夙夜在公坐而待旦言議切直無所曲撓為朝野所式瞻嘗散齋而疾其妻省之毅便奏加妻罪而請解齋妻子有過立加杖捶其公正如此然以峭直故不至公輔帝以毅清貧賜錢三十萬日給米肉年七十告老乆之見許以光禄大夫歸第門施行馬復賜錢百萬後司徒舉毅為青州大中正尚書以毅懸車致仕不宜勞以碎務陳留相樂安孫尹表曰禮凡卑者執勞尊者居逸是順叙之宜也司徒魏舒司𨽻校尉嚴詢與毅年齒相近徃者同為散騎常侍後分授外内之職資塗所經出處一致今詢管四十萬户州兼董司百寮總攝機要舒所統殷廣兼執九品銓十六州論議主者不以為劇毅但以知一州便謂不宜累以碎事於毅太優詢舒太劣若以前聽致仕不宜復與遷授位者故光祿大夫鄭袤為司空是也夫知人則哲惟帝難之尚可復委以宰輔之任不可諮以人倫之論臣竊所未安昔鄭武公年過八十入為周司徒雖過懸車之年必有可用毅前為司𨽻直法不撓當朝之臣多所按劾諺曰受堯之誅不能稱堯直臣無黨古今所悉是以汲黯死於淮陽董仲舒裁為諸侯之相而毅獨遭聖明不離輦轂當世之士咸以為榮毅雖身偏有風疾而志氣聰明一州品第不足勞其思慮毅疾惡之心小過主者必疑其論議傷物故高其優禮合去事實此為机閣毅使絶人倫之路也臣州茂德惟毅越毅不用則清談倒錯矣於是青州自三品已上光禄勲石鑒共奏尹表宜䝉評議由是毅遂為州都銓正人流清濁區别其所彈貶自親貴者始太康六年卒武帝撫机驚曰失吾名臣不得生作三公即贈儀同三司使者監䕶䘮事時承漢魏舊制爵非列侯雖有髙行而不加諡羽林左監北海王宫上疏言毅忠允匪躬宜䝉諡號帝出其表使八坐議之多同宫議奏寢不報二子暾總暾字長升正直有父風太康時為博士會議齊王攸之國加崇典禮暾與諸博士坐議迕㫖武帝大怒收暾等付廷尉會赦出免官初暾父毅疾馮紞姦佞欲奏其罪未果而卒至是紞位宦日隆暾慨然曰使先人在不令紞得無患後為酸棗令轉侍御史會司徒王渾主簿劉輿獄辭連暾將収付廷尉渾不欲使府有過欲拒劾自舉之與暾更相曲直渾怒便遜位還第暾乃奏渾曰謹案司徒王渾䝉國厚恩備位鼎司不能上佐天日調和隂陽下遂萬物之宜使卿大夫各得其所敢因劉輿拒扞詔使私欲大府興長獄訟昔陳平不答漢文之問邴吉不問死人之變誠得宰相之體也既興刑獄怨懟而退舉動輕速無大臣之節請免渾官右長史楊邱亭侯劉肇便辟善柔茍於阿順請大鴻臚削爵土諸聞暾此奏者皆歎美之其後武庫火尚書郭彰率百人自衞而不救火暾正色詰之彰怒曰我能截君角也暾勃然謂彰曰君何敢恃寵作威作福天子法冠而欲截角乎求紙筆奏之彰伏不敢言衆人解釋乃止彰乆貴豪侈每出輙從百餘人自此之後務從簡素暾遷太原内史趙王倫簒位假征虜將軍不受與三王共舉義惠帝復阼暾為左丞正色立朝三臺清肅尋兼御史中丞奏免尚書僕射東安公繇及王粹董艾等十餘人朝廷嘉之遂即眞遷中庻子左衞將軍司𨽻校尉奏免武陵王澹及何綏劉坦温畿李暅等長沙王乂討齊王冏暾豫謀封朱虛縣公千八百户乂死坐免頃之復為司𨽻及惠帝之幸長安也留暾守洛陽河間王顒遣使鴆羊皇后暾乃與留臺僕射荀藩河南尹周馥等上表理后無罪顒見表大怒遣陳顔吕朗率騎五千收暾暾東奔髙宻王略㑹劉根作逆略以暾為大都督加鎮東将軍討根暾戰失利還洛至酸棗値東海王越奉迎大駕及帝還洛羊后反宫后遣使謝暾曰頼劉司𨽻忠誠之志得有今日以舊勲復封爵加光禄大夫暾妻前卒先陪陵葬子更生初婚家法婦當拜墓携賔客親屬數十乗載酒食而行先是洛陽王稜為越所信而輕暾暾每欲繩之稜以為怨時劉聰王彌屯河北京邑危懼稜告越云暾與彌鄉親而欲投之越嚴騎將追暾右長史傅宣明暾不然暾聞之未至墓而反以正義責越越甚慙及劉曜寇京都以暾為撫軍將軍假節都督城守諸軍事曜退遷尚書僕射越憚暾久居監司又為衆情所歸乃以為右光禄大夫領太子少傅加散騎常侍外示崇進實奪其權懷帝又詔暾領衞尉加特進後復以暾為司𨽻加侍中暾五為司𨽻允恊物情故也王彌入洛百官殱焉彌以暾鄉里宿望故免於難暾因説彌曰今英雄競起九州幅裂有不世之功者宇内不容將軍自興兵以来何攻不克何戰不勝而復與劉曜不恊宜思文種之禍以范蠡為師且将軍可無帝王之意東王本州以觀事勢上可以混一天下下可以成鼎峙之事豈失孫劉乎蒯通有言將軍宜圗之彌以為然使暾於青州與曹嶷謀且徴之暾至東阿為石勒遊騎所獲見彌與嶷書而大怒乃殺之暾有二子祐白祐為太傅屬白太子舍人白果烈有才用東海王越忌之竊遣上軍何倫率百餘人入暾第為刼取財物殺白而去暾弟總字𢎞紀好學直亮後叔父彪位至北軍中候程衞者字長元廣平曲周人也少立操行彊正方嚴劉毅聞其名辟為都官從事毅奏中䕶軍羊琇犯憲應死武帝與琇有舊乃遣齊王攸喻毅毅許之衞正色以為不可徑自馳車入䕶軍營收琇屬吏考問隂私先奏琇所犯狼籍然後言之於毅由是名振遐邇百官厲行遂辟公府掾遷尚書郎侍御史在職皆以事幹顯補洛陽令歴安定頓邱太守所歴著績卒於官和嶠字長輿汝南西平人也祖洽魏尚書令父逌魏吏部尚書嶠少有風格慕舅夏侯元之為人厚自崇重有盛名於世朝野許其能整風俗理人倫襲父爵上蔡伯起家太子舍人累遷潁川太守為政清簡甚得百姓懽心太傅從事中郎庾敳見而歎曰和嶠森森如千丈松雖磥砢多節目施之大厦有棟梁之用賈充亦重之稱於武帝入為給事黄門侍郎遷中書令帝器遇之舊監令共車入朝時荀勗為監嶠鄙勗為人以意氣加之每同乗髙抗專車而坐乃使監令異車自嶠始也吳平以參謀議功賜弟郁爵汝南亭侯嶠轉侍中愈被親禮與任愷張華相善嶠見太子不令因侍坐曰皇太子有淳古之風而季世多偽恐不了陛下家事帝黙然不答後與荀顗荀勗同侍帝曰太子近入朝差長進卿可俱詣之粗及世事既奉詔而還顗勗並稱太子明識𢎞雅誠如明詔嶠曰聖質如初耳帝不悦而起嶠退居恒懐慷慨太息知不見用猶不能已在御坐言及社稷未嘗不以儲君為憂帝知其言忠每不酬和後與嶠語不及來事或以告賈妃妃銜之太康末為尚書以母憂去職及惠帝即位拜太子少傅加散騎常侍光禄大夫太子朝西宫嶠從入賈后使帝問嶠曰卿昔謂我不了家事今日定云何嶠曰臣昔事先帝曽有斯言言之不效國之福也臣敢逃其罪乎元康二年卒贈金紫光禄大夫加金章紫綬本位如前永平初策諡曰簡嶠家産豐富擬於王者然性至吝以是獲譏於世杜預以為嶠有錢癖以弟郁子濟嗣位至中書郎郁字仲輿才望不及嶠而以清幹稱歴尚書左右僕射中書令尚書令洛陽傾沒奔於茍晞疾卒武陔字元夏沛國竹邑人也父周魏衞尉陔沉敏有器量早獲時譽與二弟韶叔夏茂季夏並總角知名雖諸父兄弟及鄉閭宿望莫能覺其優劣同郡劉公榮有知人之鑒嘗造周周見其三子焉公榮曰皆國士也元夏最優有輔佐之才陳力就列可為亞公叔夏季夏不減常伯納言也陔少好人倫與潁川陳㤗友善魏明帝世累遷下邳太守㬌帝為大將軍引為從事中郎累遷司𨽻校尉轉太僕卿初封亭侯五等建改封薛縣侯文帝甚親重之數與銓論時人嘗問陳㤗孰若其父羣陔各稱其所長以為羣㤗略無優劣帝然之㤗始初拜尚書掌吏部遷左僕射左光禄大夫開府儀同三司陔以宿齒舊臣名望隆重自以無佐命之功又在魏已為大臣不得已而居位深懐遜讓終始全潔當世以為美談卒於位諡曰定子鋪嗣韶歴位吏部郎太子右衞率散騎常侍荗以徳素稱名亞於陔為上洛太守散騎常侍侍中尚書潁川荀愷年少於茂即武帝姑子自負貴戚欲與茂交距而不答由是致怨楊駿誅愷時為僕射以茂駿之姨弟䧟為逆黨遂見害茂清正方直聞於朝野一旦枉酷天下傷焉侍中傅祇上表申明之後追贈光禄勲任愷字元襃樂安博昌人也父昊魏太常愷少有識量尚魏明帝女累遷中書侍郎員外散騎常侍晉國建為侍中封昌國縣侯愷有經國之幹萬機小大多管綜之性忠正以社稷為己任帝器而昵之政事多諮焉㤗始初鄭沖王祥何曽荀愷裴秀等各以老疾歸第帝優寵大臣不欲勞以筋力數遣愷喻㫖於諸公諮以當世大政參議得失愷惡賈充之為人也不欲令充久執朝政每裁抑焉充病之不知所為後承間言愷忠貞局正宜在東宫使䕶太子帝從之以為太子少傅而侍中如故充計畫不行會秦雍寇擾天子以為憂愷因曰秦涼覆敗闗右騷動此誠國家之所深慮宜速鎭撫使人心有庇自非威望重臣有計略者無以康西土也帝曰誰可任者愷曰賈充其人也中書令庾純亦言之於是詔充西鎭長安充用荀勗計得留充既為帝所遇欲專名勢而庾純張華温顒向秀和嶠之徒皆與愷善楊珧王恂華廙等充所親敬於是朋黨紛然帝知之召充愷宴於式乾殿而謂充等曰朝廷宜一大臣當和充愷各拜謝而罷旣而充愷等以帝知之而不責故結怨愈深外相崇重内實不平或為充謀曰愷總門下樞要得與上親接宜啓令典選便得漸踈此一都令史事耳且九流難精閒隙易乗充因稱愷才能宜在官人之職帝不之疑謂充舉得其才即日以愷為吏部尚書加奉車都尉愷既在尚書選舉公平盡心所職然侍覲轉希充與荀勗馮紞承間浸潤謂愷豪侈用御食器充遣尚書右僕射髙陽王珪奏愷遂免官有司收太官宰人檢覈是愷妻齊長公主得賜魏時御器也愷既免而毁謗益至帝漸薄之然山濤明愷為人通敏有智局舉為河南尹坐賊發不獲又免官復遷光禄勲愷素有識鑒加以在公勤恪甚得朝野稱譽而賈充朋黨又諷有司奏愷與立進令劉友交闗事下尚書愷對不伏尚書杜友廷尉劉良並忠公士也知愷為充所抑欲申理之故遲留而未斷以是愷及友良皆免官愷既失職乃縱酒耽樂極滋味以自奉養初何劭以公子奢侈每食必盡四方珍饌愷乃踰之一食萬錢猶云無可下筯處愷時因朝請帝或慰諭之愷初無言唯泣而已後起為太僕轉太常初魏舒雖歴位郡守而未被任遇愷為侍中薦舒為散騎常侍至是舒為右光禄大夫開府領司徒帝臨軒使愷拜授舒雖以𢎞量寛雅為稱時以愷有佐世器局而舒登三公愷止守散卿莫不為之憤嘆也愷不得志竟以憂卒年六十一諡曰元子罕嗣罕字子倫幼有父風才望不及愷以淑行致稱為清平佳士歴黄門侍郎散騎常侍兖州刺史大鴻臚崔洪字良伯博陵安平人也高祖崔實著名漢代父讚魏吏部尚書左僕射以雅量見稱洪少以清厲顯名骨鯁不同於物人之有過輙面折之而退無後言武帝世為御史治書時長樂馮恢父為𢎞農太守愛少子淑欲以爵傳之恢父終服闋乃還鄉里結草為廬陽瘖不能言淑得襲爵恢始仕為博士祭酒散騎常侍翟嬰薦恢髙行邁俗侔繼古烈洪奏恢不敦儒業令學生番直左右雖有讓侯㣲善不得稱無倫輩嬰為浮華之目遂免嬰官朝廷憚之尋為尚書左丞時人為之語曰叢生棘荆來自博陵在南為鷂在北為鷹遷吏部尚書舉用甄明門無私謁薦雍州刺史郤詵代已為左丞詵後糾洪洪謂人曰我舉郤丞而還奏我是挽弩自射也詵聞曰昔趙宣子任韓厥為司馬以軍法戮宣子之僕宣子謂諸大夫曰可賀我矣吾選厥也任其事崔侯為國舉才我以才見舉惟官是視各明至公斯言何乃至此洪聞而重之洪口不言貨財手不執珠玉汝南王亮常宴公卿以琉璃鐘行酒酒及洪洪不執亮問其故曰慮有執玉不趨之義故爾然實乖其常性故為詭說楊駿誅洪與都水使者王佑親坐見黜後為大司農卒官子廓散騎常侍亦以正直稱郭奕字大業太原陽曲人也少有重名山濤稱其髙簡有雅量初為野王令羊祜常過之弈嘆曰羊叔子何必減郭大業少選復徃又嘆曰羊叔子去人遠矣遂送祜出界數百里坐此免官咸熙末為文帝相國主簿時鍾會反於蜀荀朂即㑹之從甥少長㑹家勗為文帝掾弈啓出之帝雖不用然知其雅正武帝踐祚初建東宫以奕及鄭黙並為中庻子遷右衞率驍騎將軍封平陵男咸寧初遷雍州刺史鷹揚将軍尋假赤幢曲蓋鼓吹弈有寡姊随其之官姊下僮僕多有姦犯而為人所糾奕省按畢曰大丈夫豈當以老姊求名遂遣而不問時亭長李含有俊才而門寒為豪族所排弈用為别駕含後果有名位時以弈為知人太康中徴為尚書奕有重名當時朝臣皆出其下時帝委任楊駿奕表駿小器不可任以社稷帝不聽駿後果誅及奕疾病詔賜錢二十萬日給酒米太康八年卒太常上諡為景有司議以貴賤不同號諡與景皇同不可請諡曰穆詔曰諡所以旌徳表行按諡法一德不懈為簡弈忠毅清直立徳不渝於是遂賜諡曰簡侯史光字孝明東萊掖人也幼有才悟受學於同縣劉夏舉孝廉州辟别駕咸熙初為洛陽典農中郎将封闗中侯㤗始初拜散騎常侍尋兼侍中與皇甫陶荀廙持節循省風俗及還奏事稱㫖轉城門校尉進爵臨海侯其年詔曰光忠亮篤素有居正執義之心歴職内外勤恪在公其以光為御史中丞雖屈其列校之位亦所以申其司直之才光在職寛而不縱太保王祥乆疾廢朝光奏請免之詔優祥而寢光奏後遷少府卒官詔賜朝服一具衣一襲錢三十萬布百匹及葬又詔曰光厲志守約有清忠之節家極貧儉其賜錢五十萬光儒學博古歴官著績文筆奏議皆有條理長子元嗣官至元莵太守卒子施嗣東莞太守何攀字恵興蜀郡郫人也仕州為主簿屬刺史皇甫晏為牙門張𢎞所害誣以大逆時攀適丁母䘮遂詣梁州拜表證晏不反考晏寃理得申王濬為益州辟為别駕濬謀伐吳遣攀奉表詣臺口陳事機詔再引見乃令張華與攀籌量進討之宜濬兼遣攀過羊祜靣陳伐吳之策攀善於將命帝善之詔攀參濬軍事及孫皓降於濬而王渾恚於後機将攻濬攀勸濬送皓與渾由是事解以攀為濬輔國司馬封關内侯轉滎陽令上便宜十事甚得名稱除廷尉平時廷尉卿諸葛冲以攀蜀士輕之及共斷疑獄冲始嘆服遷宣城太守不行轉散騎侍郎楊駿執政多樹親屬大開封賞欲以恩澤自衞攀以為非乃與石崇共立議奏之語在崇傳帝不納以豫討駿功封西城侯邑萬戸賜絹萬匹弟逄平鄉侯兄子逵關中侯攀固讓所封户及絹之半餘所受者分給中外宗親略不入已遷翊軍校尉頃之出為東羗校尉徴為揚州刺史在任三年遷大司農轉兖州刺史加鷹揚将軍固讓不就太常成粲左将軍卞粹勸攀蒞職中詔又加切厲攀竟稱疾不起及趙王倫簒位遣使召攀更稱疾篤倫怒將誅之攀不得已扶疾赴召卒於洛陽時年五十八攀居心平允蒞官整肅愛樂人物敦儒貴才為梁益二州中正引致遺滯巴西陳夀閻乂犍為費立皆西州名士並被鄉閭所謗清議十餘年攀申明曲直咸免寃濫攀雖顯職家甚貧素無妾媵伎樂惟以周窮濟乏為事子璋嗣亦有父風劉頌字子雅廣陵人漢廣陵厲王胥之後也世為名族同郡有雷蔣穀魯四姓皆出其下時人為之語曰雷蔣穀魯劉最為祖父觀平陽太守頌少能辨物理為時人所稱察孝廉舉秀才皆不就文帝辟為相府掾奉使于蜀時蜀新平人饑土荒頌表求振貸不待報而行由是除名武帝踐阼拜尚書三公郎典科律申寃訟累遷中書侍郎咸寧中詔頌與散騎侍郎白襃廵撫荆揚以奉使稱㫖轉黄門郎遷議郎守廷尉時尚書令史扈寅非罪下獄詔使考竟頌執據無罪寅遂得免時人以頌比張釋之在職六年號為詳平㑹滅吳諸將爭功遣頌校其事以王渾為上功王濬為中功帝以頌折法失理左遷京兆太守不行轉任河内臨發上便宜多所納用郡界多公王水碓遏塞流水轉為浸害頌表罷之百姓獲其便利尋以母憂去職服闋除淮南相在官嚴整甚有政績舊修芍陂年用數萬人豪彊兼并孤貧失業頌使大小戮力計功受分百姓歌其平惠頌在郡上疏曰吳越剽輕庸蜀險絶此故變釁之所出易生風塵之地且自吳平以來東南六州將士更守江表此時之至患也又外兵内守吴人有不自信之心宜得壯王以鎭撫之使内外各安其舊又孫氏為國文武衆職數擬天朝一旦堙替同於編户不識所䝉更生之恩而災困逼身自謂失地用懷不靖今得長王以臨其國隨才授任文武並叙士卒百役不出其鄉求富貴者取之於國内内兵得散新邦又安兩獲其所於事為宜宜取同姓諸王年二十以上人才高者分王吳蜀以其去近就遠割裂土宇令倍於舊以徙封故地用王幼稚須皇子長乃遣君之於事無晚也又曰自魏世法禁寛弛積之在素陛下欲更張之未可遽革然矯時救弊亦宜以漸譬猶行舟雖不横截迅流當漸靡而徃稍向所趨然後得濟也臣聞為社稷計莫如封建親賢然宜審量事勢使諸侯率義而動者其力足以維帶京邑包藏禍心者其勢不足獨以有為其齊此甚難陛下宜與逹古今之士深共籌之周之詣侯有罪身誅而國存漢之諸侯有罪或無子者國隨以亡今宜反漢循周則下固而上安矣又曰天下至大萬事至衆是以聖王執要於已委務於下非憚勞而好逸誠以政體宜然也夫居事始以别能否甚難也因成敗以分功罪甚易也今陛下精於造始而畧於考終此政功所以未善人主誠能居易執要考功罪於成敗之後則羣下無所逃其誅賞矣又曰古者六卿分職冡宰為師秦漢以來九列執事丞相都總今尚書制斷諸卿奉成於古制為太重可出衆事付外寺使得專之尚書統領大綱歳終課功校簿而行賞罰斯亦可矣今動皆受成於上故上之所失不得復以罪下嵗終事功不建不知所責也夫細故謬妄人情之所必有而悉糾以法則朝野無立人矣近世為監司者類大綱不振而微過必舉蓋由畏避豪彊而又懼職事之曠則謹密網以羅微罪使奏劾相接状似盡公實則撓法是以聖王不善碎密之案必責凶猾之奏則害政之姦自然禽矣又曰昔魏武帝分離天下使人役居戸各在一方此為權假一時以赴所務非正典也自吳㑹蕩平天下懐静而東南二方六州郡兵将士武吏戌守江表或給京城運漕父南子北室家分離咸更不寕又不習水土運役勤瘁並有死亡之患勢不可乆此宜大見處分以副人望魏氏錯役皆應改舊使受百役者不出其國則天下所䝉已不訾矣又曰政務多端世事之未盡理者難徧以疏舉振領總綱要在三條凡政欲靜静在息役息役在無為倉廪欲實實在利農利農在平糴為政欲著信著信在簡賢簡賢在官乆官乆不難也連其班級自非才宜不得傍轉以終其課則事善矣平糴已有成制其未備者可就周足則榖積矣無為匪他却功作之勤抑似益而損之利如斯而已則天下靜矣書奏優詔答之頌又奏宜復肉刑卒不見省元康初從淮南王允入朝㑹誅楊駿頌屯衛殿中其夜詔以頌為三公尚書又上疏論律令事為時論所美乆之轉吏部尚書建九班之制欲令百官居職希遷考課能否明其賞罰賈郭専朝仕者欲速竟不施行及趙王倫之害張華也頌哭之甚慟聞華子得逃喜曰荗先卿尚有種也倫黨張林聞之大怒憚頌持正而不能害也孫秀等推崇倫功宜加九錫百寮莫敢異議頌獨曰昔漢之錫魏魏之錫晉皆一時之用非可通行今宗廟乂安雖嬖后被退勢臣受誅周勃誅諸呂而尊孝文霍光廢昌邑而奉孝宣並無九錫之命違舊典而習權變非先王之制九錫之議請無所施張林積忿不已以頌為張華之黨将害之孫秀曰誅張裴已傷時望不可復誅頌林乃止於是以頌為光禄大夫門施行馬尋病卒使使者弔祭賜錢二十萬朝服一具諡曰貞中書侍郎劉沉議頌當時少軰應贈開府孫秀素恨之不聴頌無子養弟和子雍早卒更以雍弟詡子􅋣為適孫襲封永康元年詔以頌誅賈謐督攝衆事有功追封梁鄒縣侯食邑千五百戸頌弟彪字仲雅参安東軍事伐吳獲張悌累官積弩将軍及武庫火彪建計斷屋得出諸寳器歴荆州刺史次弟仲字世混歴黄門郎榮陽太守未之官卒初頌嫁女臨淮陳矯矯本劉氏子與頌近親出養於姑改姓陳氏中正劉友議之頌曰舜後姚虞陳田本同根系而世皆為婚禮律不禁今與此同義為婚可也友方欲列上為陳騫所止故得不劾頌問明法掾陳黙蔡畿曰鄉里誰最屈二人俱云劉友屈頌作色呵之畿曰友以私議冐犯明府為非然鄉里公論稱屈友辟公府掾尚書郎黄沙御史李重字茂曾江夏鍾武人也父景秦州刺史都亭定侯重少好學有文辭早孤與羣弟居以友愛著稱弱冠為本國中正遜讓不行後為始平王文學上書陳九品曰先王議制以時因革因革之理唯變所適九品始於䘮亂軍中之政誠非經國不刋之法也且其檢防轉碎徵刑失實故朝野之論僉謂驅動風俗為弊已甚而至於議改又以為疑臣以革法創制當先盡開塞利害之理舉而措之使體例大通而無否滯亦末易故也古者諸侯之治分土有常國有定主人無異望卿大夫世禄仕無出位之思臣無越境之交上下體固民德歸厚秦反斯道罷侯置守風俗淺薄自此來矣漢革其弊斟酌周秦並建侯守亦使分土有定而牧司必各舉賢貢士任之鄉議事合聖典比蹤三代方今聖德之隆光被四表兆庶顒顒欣覩太平然承魏氏凋敝之習人物播越仕無常朝人無定處郎吏畜於軍府豪右聚於都邑事體駁錯與古不同謂九品既除宜先開移徙聽相并就且明貢舉之法不濫於境外則冠帶之倫將不分而自均即土斷之實行矣又建樹官司功在簡乆階級少則人心定乆其事則政化成而能否著此三代所以直道而行也以為選例九等當今之要所宜施用也聖王知天下之難常從事於其易故寄隠括於閭伍則邑屋皆為有司若任非所由事非所覈則雖竭聖智猶不足以贍其事由此而觀誠令二者既行即人思反本脩之於鄉華競自息而禮讓日隆矣遷太子舍人轉尚書郎時太中大夫恬和表陳便宜稱漢孔光魏徐幹等議使王公已下制奴婢限數及禁百姓買田宅中書啟可屬主者為條制重奏曰先王之制士農工商有分不遷其業所以利用厚生各肆其力也周官以土均之法經其土地井田之制而辨其五物九等貢賦之序然後公私制定率土均齊自秦立阡陌建郡縣而斯制以沒降及漢魏因循舊跡王法所峻者唯服物車器有貴賤之差令不僣擬以亂尊卑耳至於奴婢私産不曲為立限也去八年己巳詔書申明律令諸士卒百工以上所服乗皆不得違制若一縣一嵗之中有違犯者三家洛陽縣十家已上官長免如詔書之㫖法制已嚴今如和所陳而稱光幹之議此皆衰世踰侈當時之患然盛漢之初不議其制光等作而不行非漏而不及能而不用也蓋以諸侯之軌既減而井田之制未復則王者之法不得制人之私也人之田宅既無定限則奴婢不宜偏制其數懼徒為之法則碎而難檢方今聖明垂制每尚簡易法禁已具和表無施又司𨽻校尉石鑒奏鬱林太守介登役使所監求召還尚書荀愷以為逺郡非人情所樂奏登貶秩居官重駁曰臣聞立法無制所以齊衆檢邪非必曲尋事情而理無所遺也故所滯者寡而所濟者衆今如登郡比者多若聽其貶秩居官動為凖例懼庸才負逺必有黷貨之累非所以肅清王化輯寜殊域也臣愚以為宜聽鑒所上先召登還且使體例有常不為逺近異制詔從之太熈初遷廷尉平駁廷尉奏邯鄲辭等文多不載再遷中書郎每大事及疑議輙參以經典處决多皆施行遷尚書吏部郎務抑華競不通私謁特留心隱逸由是羣才畢舉㧞用北海西郭湯琅邪劉珩燕國霍原馮翊吉謀等為祕書郎及諸王文學故海内莫不歸心時燕國中正劉沈舉霍原為寒素司徒府不從沈又抗詣中書奏原而中書復下司徒參論司徒左長史荀組以為寒素者當謂門寒身素無世祚之資原為列侯顯佩金紫先為人間流通之事晚而務學少長異業年踰始立草野之譽未洽德禮無聞不應寒素之目重奏原隱居求志篤古好學絶迹窮山藴韣道藝前後數公皆以名聞今沈所列又如此則州黨之議旣舉矣而組猶謂草野之譽未洽德禮無聞恐負幽邦之望傷敦德之教也謂宜如詔書所求之㫖應為二品詔從之重與李毅同為吏部郎時王戎為尚書重以清尚見稱毅淹通有智識雖二人操異然俱處要職戎以識㑹待之各得其所毅字茂彦舊史闕其行事於時内官重外官輕兼階級繁多重復議其非是重又上䟽曰凡山林避寵之士雖違世背時出處殊軌而先王許之者嘉其服膺高義也昔先帝患風流之弊而思反純朴乃諮詢朝衆搜求隱逸咸寧二年始以太子中庻子徴安定皇甫謐四年又以博士徴南安朱冲太康二年復以太子庻子徴冲雖皆稱病不至而朝野悅服陛下追先帝禮賢之㫖臣訪冲州邑言冲雖耋耄而志氣克壯耽道窮藪老而彌新操尚貞純所居成化誠山栖耆德可表世篤俗者也臣以為宜垂聖恩及其未没顯加優命時朝廷政亂竟不能從出為行討虜䕶軍平陽太守崇德化脩學校表篤行㧞賢能清簡無欲正身率下在職二年彈黜四縣弟嶷亡表去官永康初趙王倫用為相國左司馬以憂逼成疾而卒時年四十八家貧宅宇狹小無殯斂之地詔於典客署營䘮追贈散騎常侍諡曰成子式有名官至侍中咸和初卒傅元字休弈北地泥陽人也祖燮漢漢陽太守父幹魏扶風太守元少孤貧博學善屬文解鐘律性剛勁亮直不能容人之短郡上計吏再舉孝廉太尉辟皆不就州舉秀才除郎中與東海繆施俱以時譽選入著作撰集魏書後參安東衞軍軍事轉温令再遷𢎞農太守領典農校尉所居稱績數上書陳便宜多所匡正五等建封鶉觚男武帝為晉王以元為散騎常侍及受禪進爵為子加駙馬都尉帝初卽位廣納直言開不諱之路元及散騎常侍皇甫陶共掌諫職元上疏曰臣聞先王之臨天下也明其大教長其義節道化隆於上清議行於下上下相奉人懐義心亡秦蕩滅先王之制以法術相御而義心亡矣近者魏武好法術而天下貴刑名魏文慕通遠而天下賤守節其後綱維不攝而虛無放誕之論盈於朝野使天下無復清議而亡秦之病復發於今陛下聖德龍興受禪𢎞堯舜之化開正直之路體夏禹之至儉綜殷周之典文臣嘆詠而已將又奚言惟未舉清遠有禮之臣以敦風節未退虛鄙以懲不恪臣是以猶敢有言詔報曰舉清遠有禮之臣者此尤今之要也乃使元草詔書進之元復上疏曰臣聞舜舉五臣無為而化用人得其要也天下羣司猥多不可不審得其人也不得其人一日則損不貲况積日乎典謨曰無曠庻官言職之不可乆廢也諸有疾病滿百日不差宜令去職優其禮秩而寵存之旣差而後更用臣不廢職於朝國無曠官之累此王政之急也臣聞先王分士農工商以經國制事各一其業而知其務自士已上子弟為之立太學以教之選明師以訓之各隨其才優劣而授用之農以豐其食工以足其器商賈以通其貨故雖天下之大兆庻之衆無一人游手分數之法周偹如此漢魏不定其分百官子弟不脩經藝而務交游未知蒞事而坐享天祿農工之業多廢或逐淫利而離其事徒繫名於太學然不聞先王之風今聖明之政資始而漢魏之失未改散官衆而學校未設游手多而親農者少工器不盡其宜臣以為亟定其制通計天下若干人為士足以副在官之吏若干人為農三年足有一年之儲若干人為工足其器用若干人為商賈足以通貨而已尊儒尚學貴農賤商此皆事業之要務也前皇甫陶上事欲令賜拜散官皆課使親耕天下享足食之利禹稷躬稼祚流後世是以明堂月令著帝籍之制伊尹古之名臣耕於有莘晏嬰齊之大夫避莊公之難亦耕於海濱昔者聖帝明王賢佐俊士皆當從事於農矣王人賜官冗散無事者不督使學則當使耕無緣放之使坐食百姓也今文武之官旣衆而拜賜不在職者又多加以服役為兵不得耕稼當農者之半南面食祿者參倍於前使冗散之官農而收其租稅家得其實而天下之穀可以無乏矣夫家足為子則孝為父則慈為兄則友為弟則悌天下足食則仁義之教可不令而行也為政之要計人而置官分人而授事士農工商之分不可斯須廢也若未能精其防制計天下文武之官足為副貳者使學其餘皆歸之於農若百工商賈有長者亦皆歸之於農務農若此何有不贍乎虞書曰三載考績三考黜陟幽明是為九年之後乃有遷叙也故居官乆則念立愼終之化居不見乆則競為一切之政六年之限日月淺近不周黜陟陶之所上義合古制夫儒學者王教之首也尊其道貴其業重其選猶恐化之不崇忽而不以為急臣懼日有陵遲而不覺也仲尼有言人能𢎞道非道𢎞人然則尊其道者非惟尊其書而已尊其人之謂也貴其業者不妄教非其人也重其選者不妄用非其人也若此而學校之綱舉矣書奏詔嘉之俄遷侍中初先進皇甫陶及入而扺元以事與陶爭言諠譁為有司所奏二人竟坐免官泰始四年以為御史中丞時頗有水旱之災元上疏陳便宜五事其一曰耕夫務多種而耕暵不熟徒䘮功力而無收又舊兵持官牛者官得六分士得四分自持私牛者與官中分施行來乆衆心安之今一朝減持官牛者官得八分士得二分持私牛及無牛者官得七分士得三分人失其所必不懽樂臣愚以為宜佃兵持官牛者與四分持私牛與官中分則天下兵作懽然悅樂愛惜成榖無有損棄之憂其二曰以二千石雖奉務農之詔猶不勤心以盡地利昔漢氏以墾田不實徴殺二千石以十數臣愚以為宜申漢氏舊法以警戒天下郡縣皆以死刑督之其三曰以魏初未留意於水事先帝統百揆分河隄為四部并本凡五謁者以水功至大與農事並興非一人所周故也今謁者一人之力行天下諸水無時得徧伏見河隄謁者車誼不知水勢轉為他職更選知水者代之可分為五部使各精其方宜其四曰古以歩百為畆今以二百四十歩為畆所覺過倍近魏初課田不務多其頃畆但務脩其功力故白田收至十餘斛水田收數十斛自頃以來日増田頃畆之課而田兵益甚功不能脩理至畆數斛已還或不足以償種非與曩時異天地横遇災害也其病正在於務多頃畆而功不脩耳竊見河隄謁者石恢甚精練水事及田事知其利害乞中書召恢委曲問其得失必有所補益其五曰臣以為胡夷獸心不與華同鮮卑最甚本鄧艾茍欲取一時之利不慮後患使鮮卑數萬散居人間此必為害之勢也秦州刺史胡烈素有恩信於西方今烈徃諸胡雖已無惡必且消弭然獸心難保不必其可乆安也若後有動釁烈計能制之惟恐胡虜適困於討擊便能東入安定西赴武威外名為降可動復動此二郡非烈所制則惡胡東西有窟穴浮游之地故復為患無以禁之也宜更置一郡於高平川因安定西州都尉募樂徙民重其復除以充之以通北道漸以實邊詳議此二郡及新置郡皆使并屬秦州令烈得專御邊之宜優詔答之五年遷太僕時比年不登羌胡擾邊詔公卿㑹議元應對所問陳事切直雖不盡施行而常見優容轉司𨽻校尉獻皇后崩於𢎞訓宫設䘮位舊制司𨽻於端門外坐在諸卿上絶席其入殿按本品秩在諸卿下以次坐不絶席而謁者以𢎞訓宫為殿内制立位在卿下元恚怒厲聲色而責謁者謁者妄稱尚書所處元對百寮而罵尚書以下御史中丞庾純奏元不敬元又自表不以實坐免官然元天性峻急不能有所容每有奏劾或値日暮捧白簡整簪帶竦踊不寐坐而待旦於是貴游懾伏臺閣生風尋卒於家年六十二諡曰剛元少時避難於河内專心誦學後雖貴顯而著述不廢撰論經國九流及三史故事評斷得失各為區例名曰傅子為内外中篇凡有四部六錄合百四十首數十萬言并文集百餘卷行於世元初作内篇成子咸以示司空王沉沉與元書曰省所著書言富理濟經綸政體存重儒教足以塞楊墨之流遁齊孫孟於徃代每開卷未嘗不嘆息也不見賈生自以過之乃今不及信矣其後追封清泉侯子咸嗣咸字長虞剛簡有大節風格峻整識性眀悟疾惡如仇推賢樂善嘗慕季文子仲山甫之志好屬文論雖綺麗不足而言成規鑒潁川庾純常嘆曰長虞之文近乎詩人之作矣咸寧初襲父爵拜太子洗馬累遷尚書右丞出為冀州刺史繼母杜氏不肯隨咸之官自表解職三旬之間遷司徒左長史時帝留心庻政詔訪朝臣政之損益咸上言曰臣竊惟自泰始開元以曁於今十有五年矣而軍國未豐百姓不贍一歳不登便有菜色者誠由官衆事殷復除猥濫蠶食者多而親農者少也舊都督有四今并監軍乃盈於十夏禹敷土分為九州今之刺史幾向一倍戸口比漢十分之一而置郡縣更多空校牙門無益宿衞而虛立軍府動有百數五等諸侯復坐置官屬諸所寵給皆生於百姓一夫不農有受其饑今之不農不可勝計縱使五稼普收僅足相接暫有災患便不繼贍以為當今之急先并官省事静事息役上下用心惟農是務也咸在位多所執正豫州大中正夏侯俊上言魯國小中正司空司馬孔毓四移病所不能接賓求以尚書郞曹馥代毓旬日復上毓為中正司徒三却俊故據正咸以俊與奪惟意乃奏免俊大中正司徒魏舒俊之姻屬屢却不署咸據正甚苦舒終不從咸遂獨上舒奏咸激訕不直轉咸為車騎司馬咸以世俗奢侈又上書曰臣以為穀帛難生而用之不節無緣不匱故先王之化天下食肉衣帛皆有其制竊謂奢侈之費甚於天災古者堯有茅茨今之百姓競豐其屋古者臣無玉食今之賈豎皆厭梁肉古者后妃乃有殊餙今之婢妾被服綾羅古者大夫乃不徒行今之賤𨽻乘輕驅肥古者人稠地狹而有儲蓄由於節也今者土曠人稀而患不足由於奢也欲時之儉當詰其奢奢不見詰轉相高尚昔毛玠為吏部尚書時無敢好衣美食者魏武帝嘆之曰孤之法不如毛尚書令使諸部用心各如毛玠風俗之移在不難矣又議移縣獄於郡及二社應立朝廷從之遷尚書左丞惠帝卽位楊駿輔政咸言於駿曰事與世變禮隨時宜諒闇之不行尚矣竊謂山陵之事旣畢明公當思隆替之宜昔周公聖人猶不免謗况聖上春秋非成王之年乎得意忘言言未易盡茍明公有以察其悾款言豈在多時司𨽻荀愷從兄䘮自表赴哀詔聽之而未下愷乃造駿咸因奏曰死䘮之威兄弟孔懷同堂亡隕方在信宿聖恩矜閔聽使臨䘮詔未下而便以行造急諂媚之敬無友于之情宜加顯貶以隆風教帝以駿管朝政有詔不問駿甚憚之咸復與駿箋諷切之駿意稍折漸以不平由是欲出為京兆𢎞農太守駿甥李斌說駿不宜斥出正人乃止駿弟濟素與咸善與咸書曰江海之流混混故能成其深廣也天下大器非可稍了而相觀每事欲了生子癡了官事官事未易了也了事正作癡復為快耳左丞總司天臺維正八坐此未易居以君盡性而處未易居之任益不易也想慮破頭故具有白咸答曰衞公云酒色之殺人此甚於作直坐酒色死人不為悔逆畏以直致禍此由心不直正欲以茍且為明哲耳自古以直致禍者當由矯枉過正或不忠允欲以亢厲為聲故致忿耳安有悾悾為忠益而當見疾乎居無何駿誅咸轉為太子中庻子遷御史中丞時太宰汝南王亮輔政咸致書曰咸以為太甲成王年在䝉幼故有伊周之事聖人且猶不免疑况臣旣不聖王非孺子而可以行伊周之事乎上在諒闇聽於冡宰而楊駿無狀便作伊周自為天下之安所以至死其罪旣不可勝亦是殿下所具駿之見討發自天聰孟觀李肇與知密謀耳至於論功當歸美於上觀等已數千戸縣侯聖上以駿死莫不欣悅故論功寧厚以叙其懽心此羣下所宜以實裁量而遂扇動東安封王孟李郡公餘侯伯子男旣妄有加復又三等超遷此之熏赫震動天地自古以來封賞未有若此者也無功而厚賞莫不樂國有禍禍起當復有大功也人而樂禍其可極乎作此者皆由東安公謂殿下至正當有以正之正之以道衆亦何所怒乎衆之所怒在於不平耳而今皆更倍論莫不失望咸之愚冗不惟失望而已竊以為憂又討駿之時殿下在外實所不綜今欲委重故令殿下論功論功之事實未易可處莫若坐觀得失有居正之事宜也咸復以亮輔政專權又諫曰楊駿有震主之威委任親戚此天下所以諠譁今之處重宜反此失謂宜静黙頤神有大得失乃維持之自非大事一皆抑遣比四造詣及經過尊門冠蓋車馬塡塞街衢此之翕習旣宜弭息又夏侯長容奉使為先帝請命祈禱無感先帝崩背宜自咎責而自求請命之勞而公以為少府私竊之論云長容則公之姻故至於此一犬吠形百犬吠聲懼於羣吠遂至叵聽也咸之為人不能面從而有後言嘗觸楊駿幾為身禍况於殿下而當有惜往從駕殿下見語卿不識韓非逆鱗之言邪而歘摩天子逆鱗自知所陳誠頟頟觸猛虎之鬚耳所以敢言庻殿下當識其不勝區區前摩天子逆鱗欲以盡忠今觸猛虎之鬚非欲為惡必將以此見恕亮不納長容者夏侯駿也㑹詔羣僚舉郡縣之職以補内官咸上書以為用人無拘内外之任自頃重内薄外遂成風俗此弊誠宜革之當内外通塞無所偏耳旣使通塞無偏若選用不平有以深責責之茍深無憂不平也且膠柱不可以調瑟况乎官人而可以限伏思所限者以防選用不能出入不能出入當隨事而制無須限法法之有限其於致遠無乃泥乎或謂不制其法以何為責臣聞刑懲小人義責君子君子之責在心不在限也正始中任何晏以選舉内外之衆職各得其才粲然之美於斯可觀如此非徒御之以限法之所致乃委任之由也委任之懼甚於限法是法之失非已之尤尤不在已責之無懼所謂齊之以刑民免而無耻者也茍委任之一則慮罪之及二則懼致怨謗已快則朝野稱詠不善則衆惡見歸此之戰戰孰與倚限法以茍免乎咸再為本郡中正遭繼母憂去官頃之起以議郞長兼司𨽻校尉咸前後固辭不聽勅使者就拜咸復送還印綬公車不通催使攝職咸以身無兄弟䘮祭無主重自陳乞乃使於官舍設靈坐咸不得已視事時朝廷寛弛豪右放恣交私請託朝野溷淆咸奏免河南尹澹左將軍倩廷尉高光兼河南尹何攀等京都肅然貴戚懾伏僕射王戎時兼吏部咸奏戎備位台輔兼掌選舉不能謐靜風俗以凝庻績至令人心傾動開張浮競中郞李重李義不相匡正請免戎等官有詔宥戎解其禁止御史中丞解結以咸劾戎為違典制越局侵官干非其分奏免咸官詔亦不許咸上事以為按令御史中丞督司百僚皇太子以下其在行馬内有違法憲者皆糾彈之雖在行馬外而監司不糾亦得奏之如令之文行馬之内有違法憲謂禁防之事耳宫内禁防外司不得而行故專施中丞今道路橋梁不脩鬭訟屠沽不絶如此之比中丞推責州坐卽今所謂行馬内語施於禁防旣云中丞督司百僚矣何復說行馬之内乎旣云百僚而不得復說行馬之内者内外衆官謂之百僚則通内外矣司𨽻之所以不復說行馬内外者禁防之事已於中丞說之故也中丞司𨽻俱糾皇太子以下則共對司内外矣不為中丞專司内百僚司𨽻專司外百僚自有中丞司𨽻以來更互奏内外衆官惟所糾得無内外之限也而結一旦横挫臣臣前所以不羅縷者冀因結奏得從私願也今旣所願不從而勑云但為過耳非所不及也以此見原臣忝司直之任宜當正已率人若其有過不敢受原是以申陳其愚司𨽻與中丞俱共糾皇太子以下則從皇太子以下無所不糾也得糾皇太子而不得糾尚書臣之闇塞旣所未譬皇太子為在行馬之内邪皇太子在行馬之内而得糾之尚書在行馬之内而不得糾無有此理此理灼然而結以此挫臣臣可無恨耳其於觀聽毋乃有怪邪臣識石公前在殿上脫衣為司𨽻荀愷所奏先帝不以為非于時莫謂侵官今臣裁糾尚書而當有罪乎咸累自上稱引故事條理灼然朝廷無以易之吳郡顧榮嘗與親故書曰傅長虞為司𨽻勁直忠果劾按驚人雖非周才偏亮可貴也元康四年卒官時年五十六詔贈司𨽻校尉朝服一具衣一襲錢二十萬諡曰貞有三子敷晞纂長子敷嗣敷字穎根清靜有道素解屬文除太子舍人轉尚書郞太傅參軍皆不起永嘉之亂避地㑹稽元帝引為鎭東從事中郞素有羸疾頻見敦喻辭不獲免輿病到職數月卒時年四十六晞亦有才思為上虞令甚有政績卒於司徒西曹屬咸從父弟祇字子莊父嘏魏太常祇性至孝早知名以才識明練稱武帝始建東宫起家太子舍人累遷散騎黄門郞賜爵闗内侯食邑三百戸母憂去職及葬母詔給太常五等吉凶導從其後諸卿夫人葬給導從自此始也服終為滎陽太守自魏黄初大水之後河濟汎溢鄧艾常著濟河論開石門而通之至是復浸壞祇乃造沈萊堰至今兗豫無水患百姓為立碑頌焉尋表兼廷尉遷常侍左軍將軍及帝崩梓宫在殯而太傅楊駿輔政欲悅衆心議普進封爵祇與駿書曰未有帝王始崩臣下論功者也駿不從入為侍中時將誅駿而駿不之知祇侍駿坐而雲龍門閉内外不通祇請與尚書武茂聽國家消息揖而下階茂猶坐祇顧曰君非天子臣邪今内外隔絶不知國家所在何得安坐茂乃驚起駿旣伏誅裴楷息瓚駿之壻也為亂兵所害尚書左僕射荀愷與楷不平因奏楷是駿親收付廷尉祇證楷無罪有詔赦之時又收駿官屬祇復啓曰昔魯芝為曹爽司馬斬闗出赴爽宣帝義之尚遷青州刺史駿之僚佐不可加罰詔又赦之祇多所維正皆如此除河南尹未拜遷司𨽻校尉以討楊駿勲當封郡公八千戸固讓減半降封靈川縣公千八百戸餘二千二百戸封少子暢為武鄉亭侯又以本封賜兄子雋為東明亭侯楚王瑋之矯詔也祇以聞奏稽留免官期年遷光祿勲復以公事免氐人齊萬年舉兵反以祇為行安西軍司加常侍率安西將軍夏侯駿討平之遷衞尉以風疾遜位就拜常侍食卿祿秩賜錢及牀帳等尋加光祿大夫門施行馬及趙王倫輔政以為中書監常侍如故以鎭衆心祇辭以疾倫遣御史輿祇就職王戎陳凖等相與言曰傅公在事吾屬無憂矣其為物所倚信如此倫簒又為右光祿開府加侍中惠帝還宫祇以經受偽職請退不許初倫之簒也孫秀與義陽王威等十餘人預撰儀式禪文及倫敗齊王冏收侍中劉逵常侍騶捷杜育黄門郞陸機右丞周導王尊等付廷尉以禪文出中書復議處祇罪㑹赦得原後以禪文草本非祇所撰於是詔復光祿大夫子宣尚𢎞農公主尋遷太子少傅上章遜位還第及成都王頴為太傅復以祇為少傅加侍中懷帝卽位遷光祿大夫未拜加右僕射中書監時太傅東海王越輔政祇旣居端右每宣君臣謙光之道由此上下雍睦祇明達國體朝廷制度多所經綜歴左光祿開府行太子太傅侍中如故疾篤遜位不許遷司徒以足疾詔版輿上殿不拜大將軍茍晞表請遷都使祇出詣河陰脩理舟楫為水行之備及洛陽陷没遂共建行臺推祇為盟主以司徒持節大都督諸軍事傳檄四方遣子宣將公主與尚書令和郁赴告方伯徴義兵祇自屯盟津小城宣弟暢行河陰令以待宣祇以暴疾薨時年六十九祇自以義誠不終力疾手筆勑厲其二子宣暢辭㫖深切覽者莫不感激慷慨祇著文章駮論十餘萬言宣字世𢎞年六歲䘮繼母哭泣如成人中表異之及長好學趙王倫以為相國掾尚書郞太子中舍人遷司徒西曹掾去職累遷為祕書丞驃騎從事中郞惠帝至自長安以宣為左丞不就遷黄門郞懷帝卽位轉吏部郞又為御史中丞卒年四十九無子以暢子冲為嗣暢字世道年五歲父友見而戲之解暢衣取其金環與侍者暢不之惜以此責之年未弱冠甚有重名以選入侍講東宫為祕書丞没於石勒勒以為大將軍右司馬諳識朝儀常居機密勒甚重之作晉諸公叙讚二十二卷又為公卿故事九卷咸和五年卒子詠過江為交州刺史太子右率向雄字茂伯河内山陽人也父韶彭城太守雄初仕郡為主簿事太守王經及經之死也雄哭之盡哀市人咸為之悲後太守劉毅嘗以非罪笞雄及吳奮代毅為太守又以少譴繫雄於獄司𨽻鍾㑹於獄中辟雄為都官從事㑹死無人殯斂雄迎䘮而葬之文帝召雄責之曰往者王經之死卿哭於東市我不問也今鍾㑹躬為叛逆又輙收葬若復相容其如王法何雄曰先王掩骼埋胔豈先卜其功罪而後葬之哉今王誅旣加於法已備雄感義收葬教亦無闕法立於上教宏於下何必使雄違生背死以立於時殿下讎枯骨而捐之中野為將來仁賢之資不亦惜乎帝甚悅與談宴而遣之累遷黄門侍郞時吳奮劉毅俱為侍中同在門下雄初不交言武帝聞之勑雄令復君臣之好雄不得已乃詣毅再拜曰向被詔命君臣義絶如何於是卽去帝聞而大怒問雄曰我令君復君臣之好何以故絶雄曰古之君子進人以禮退人以禮今之進人若加諸􅂰退人若墜諸川劉河内於臣不為戎首亦已幸甚安得復為君臣之好帝從之泰始中累遷秦州刺史假赤幢曲蓋皷吹賜錢二十萬咸寧初入為御史中丞遷侍中又出為征虜將軍太康初為河南尹賜爵闗内侯齊王攸將歸藩雄諫曰陛下子弟雖多然有名望者少齊王卧在京邑所益實深不可不思帝不納雄固諫忤㫖起而徑出遂以憤卒弟匡惠帝時為䕶軍將軍段灼字休然敦煌人也世為西土著姓果直有才辯少仕州郡稍遷鄧艾鎭西司馬從艾破蜀有功封闗内侯累遷議郞武帝卽位灼上疏追理艾曰艾本屯田掌犢人寵位已極功名已成七十老公復何所求正以劉禪初降遠郡未附矯令承制權安社稷鍾㑹有悖逆之心畏艾威名因其疑似構成其事艾被詔書卽束身就縛誠知奉見先帝必無當死之理也及㑹受誅之後艾將吏愚戅自共追艾解其囚執艾在困地未嘗與謀而獨受腹背之誅豈不哀哉臣謂宜聽艾還葬歸其田宅繼封定諡則艾死無所恨而天下徇名之士思立功之臣必投湯火樂為陛下死矣帝省表甚嘉其意灼後復陳時宜言唐堯以親睦九族為先周文以刑于寡妻為急明王聖主莫不先親後疎自近及遠臣以為太宰司徒衞將軍三王宜留洛中鎭守其餘諸王自州征足任者年十五以上悉遣之國為選中郞傅相才兼文武以輔佐之聽於其國繕修兵馬廣布恩信連城開池為晉魯衞所謂磐石之宗天下服其彊矣雖云割地譬猶囊漏貯中亦一家之有耳若慮後世彊大自可豫為制度使得推恩以分子弟如此則枝分葉布稍自削小漸使轉至萬國亦後世之利非所患也昔在漢世諸吕自疑内有朱虛東牟之親外有諸侯九國之彊故不敢動摇於今之宜諸侯彊大是為泰山之固非我族類其心必異而魏法禁錮諸王親戚隔絶不祥莫大矣間者無故又𤓰分天下立五等諸侯上不象賢下不議功而是非雜糅例受茅土似權時之宜非經乆之制將遂不改此亦煩擾之人漸亂之階也又陳曰昔伐蜀募取涼州兵馬羌胡健兒許以重報五千餘人隨艾討賊功皆第一而乙亥詔書州郡将督不與中外軍同雖在上功無應封者唯金城太守楊欣所領兵以逼江由之勢得封者三十人自金城以西非在欣部無一人封者茍在中軍之例雖下功必侯如州郡雖功高不封非所謂近不重施遠不遺恩之謂也夫功名重賞士之所競不平致怨由來乆矣臣以為此等宜䝉爵封灼前後陳事輙見省覽然身微官孤不見進序乃取長假還鄉里臨去遣息頴表陳五事其一曰任忠賢去不肖其二曰廣貢士之路其三曰開養老之制其四曰申明信誓其五曰封樹同姓書奏帝覽而異焉擢為明威將軍魏興太守卒於官閻纘字續伯巴西安漢人也祖圃為張魯功曹勸魯降魏封平樂鄉侯父璞嗣爵仕吳至䍧牱太守纘僑居河南新安少游英豪多所交結博覽墳典該通物理父卒繼母不慈纘㳟事彌謹而母疾之愈甚乃誣纘盗父時金寳訟于有司遂被清議十餘年纘無怨色孝謹不怠母後意解更移中正乃得復品為太傅楊駿舍人轉安復令駿之誅也纘棄官歸要駿故主簿潘岳掾崔基等共葬之基岳畏罪推纘為主墓成當葬駿從弟模告武陵王澹將表殺造意者衆咸懼塡冡而逃纘獨以家財成墓葬駿而去國子祭酒鄒湛以纘才堪佐著薦於祕書監華嶠嶠曰此職閑廪重貴勢多爭之不暇求其才遂不能用河間王顒引為西戎校尉司馬有功封平樂鄉侯愍懷太子之廢也纘輿棺詣闕上書理太子之寃曰臣伏念遹生長深宫沈淪富貴受饒先帝父母驕之每見選師傅下至羣吏率取膏梁擊鐘鼎食之家希有寒門儒素如衞綰周文石奮疏廣洗馬舍人亦無鄭莊汲黯之比遂使不見事父事君之道臣按古典太子居以士禮與國人齒以此明先王欲令知先賤然後乃貴自頃東宫亦微太盛所以致敗也昔戾太子無狀稱兵距命而壺闗三老上書有田千秋之言猶曰子弄父兵罪應笞耳漢武感悟之築思子之臺今遹無狀言語悖逆受罪之日不敢失道猶為輕於戾太子尚可禁持重選保傅如司空張華道德深遠乃心忠誠以為之師光祿大夫劉寔寒苦自立終始不衰年同吕望經籍不廢以為之保尚書僕射裴頠明允恭肅體道居正以為之友置游談文學皆選寒門孤官以學行自立者及取服勤吏事渉履艱難事君事親名行素聞者使與共處使嚴御史監䕶其家絶貴戚子弟輕薄賓客如此左右前後莫非正人師傅文學可令十日一講使共論議於前勑使但道古今孝子慈親忠臣事君及思愆改過之義皆聞善道庻幾可全昔太甲有罪放之三年思庸克復為殷明王又魏文帝懼於見廢夙夜自祇竟能自全及至明帝因母得罪廢為平原侯為置家臣庻子師友文學皆取正人共相匡矯兢兢愼罰事父以孝父殁事母以謹聞於天下于今稱之漢高皇帝數置酒於庭欲廢太子後四皓為師子房為傅竟復成就前事不忘後事之戒也方今天下多虞儲副大事不宜空虛宜為大計小復停留先加嚴誨依平原侯故事若不悛改棄之未晚也臣素寒門無力仕宦不經東宫情不私遹念昔楚國處女諫其王曰有龍無尾言年四十未有太子臣嘗備近職雖未能自結天日情同閽寺悾悾之誠皆為國計臣老母見臣為表乃為臣卜卦云書御卽死妻子守臣涕泣見止臣獨以為頻見㧞擢嘗為近職此恩難忘何以報德唯當陳誠以死獻忠輙具棺絮伏須刑誅書御不省及張華遇害賈謐被誅朝野震悚纘獨撫華尸慟哭曰早語君遜位而不肯今果不免命也夫過叱賈謐尸曰小兒亂國之由誅其晚矣皇太孫立纘復上疏曰昔漢武旣信姧讒危害太子復用望氣之言欲盡誅詔獄中囚邴吉以皇孫在焉閉門距命後遂擁䕶皇孫督罰乳母卒至成人立為孝宣皇帝茍志於忠無往不可歴觀古人雖不避死亦由世教寛以成節吉雖距詔書事在於忠故宥而不責自晉興已來用法太嚴遲速之間輙加誅斬一身伏法猶可彊為今世之誅動輙滅門昔吕后臨朝肆意無道周昌相趙三召其王而昌不遣先徴昌入乃後召王此由漢制本寛得使為快假令如今吕后必謂昌已反夷其三族則誰敢復為殺身成義者哉此法宜改可使經遠又漢初廢趙王張敖其臣貫高謀殺高祖高祖不誅以明臣道田叔孟舒十人為奴髠鉗隨王隱親侍養故令平安向使晉法得容為義東宫之臣得如周昌固䕶太子得如邴吉距詔不坐伏死諫爭則聖意必變太子以安也臣每責東宫故臣無侍從者後聞頗有於道路望車拜辭而有司收付洛陽獄奏科其罪然臣故莫從良有以也又本置三率盛其兵馬所以宿衞防虞而使者卒至莫有警嚴覆請審者此由恐畏滅族今皇孫冲幼去事多故若有不虞彊臣專制姦邪矯詐雖有相國保訓東宫擁祐之恩同於邴吉適可使王體安全宜開來防可著于令自今已後諸有廢興倉卒羣臣得輙嚴須錄詣殿前靣受口詔然後為信得同周昌不遣王節下聽臣子隐親得如田叔孟舒不加罪責則永固儲副以安後嗣之遠慮也來事難知往事可改臣前每見詹事裴權用心懇惻舍人秦戢數上疏啓諫而爰倩贈以九列權有忠意獨不䝉賞謂宜依倩為比以寵其魂推尋表疏如秦戢輩及司𨽻所奏諸敢拜辭於道路者明詔稱揚使微異於衆以勸為善以奬將來也纘又陳今相國雖已保傅東宫保其安危至於旦夕訓誨輔導出入動靜劬勞宜選寒苦之士忠貞清正老而不衰如城門校尉梁栁白衣南安朱冲比者以為師傅其侍臣以下文武將吏且勿復取盛戚豪門子弟若吳太妃家室及賈郭之黨如此之輩生而富溢無念修已率多輕薄浮華相驅放縱皆非所補益少主者也皆可擇寒門篤行學問素士更履險易節義足稱者以備羣臣可輕其禮儀使與古同於相切磋為益昔魏文帝之在東宫徐幹劉楨為友文學相接之道並如氣類吳太子登顧譚為友諸葛恪為賓卧同牀帳行則驂乗交如布衣相呼以字此則近代之明比也纘又陳今迎太子神柩孤魂獨行太孫幼冲不可渉道謂可遣妃奉迎遠路令其父衍隨行衞䕶皇太子初見誣陷臣家門無祜三世假親具嘗辛苦以家觀國固知太子有變臣故求副監國欲依邴吉故事距違來使供養擁䕶身親飮食醫藥冀足救危主者以臣名資輕淺不肯見與世人見笑謂為此職進退難居有必死憂臣獨以為茍全儲君賈氏所誅甘心所願今監國御史直副皆當三族侍衞無狀實自宜然臣謂其小人不足具責故曾子曰可以託六尺之孤臨大節而不可奪是以聖王愼選故河南尹向雄昔能犯難葬故將鍾㑹文帝嘉之始拔顯用至於先帝以為右率如間之事若得向雄之比則豈可觸哉此二使者但為愚怯亦非與謀但可誅身自全三族如郭俶郭斌則於刑為當又東宫亦宜妙選忠直亮正如向雄比陛下千秋萬嵗之後太孫冲幼選置兵衞宜得柱石之士如周昌者世俗淺薄士無亷節賈謐小兒恃寵恣睢而淺中弱植之徒更相翕習故世號魯公二十四友又謐前見臣表理太子曰閻兒作此為健然觀其意欲與諸司馬家同皆為臣寒心伏見詔書稱明滿奮樂廣侍郞賈允與謐親理而亦疏遠往免父䘮之後停家五年雖為小屈有識貴之潘岳繆徽等皆謐父黨共相沉浮人士羞之聞其晏然莫不為怪今詔書暴揚其罪並皆遣出百姓咸云清當臣獨謂非但岳徽二十四人宜皆齊黜以肅風教朝廷善其忠烈擢為漢中太守趙王倫死旣葬纘以車轢其冡時張華兄子景後徙漢中纘又表宜還纘不䕶細行而慷慨好大節卒於官時年五十九纘五子皆開朗有才力長子亨為遼西太守屬王浚自用其人亨不得之官依青州刺史茍晞晞刑政苛虐亨數切諫為晞所害阮籍字嗣宗陳留尉氏人也父瑀魏丞相掾知名於世籍容貎瓌傑志氣宏放慠然獨得任性不覊而喜怒不形於色或閉戸視書累月不出或登山臨水經日忘歸愽覽羣籍尤好莊老嗜酒能嘯善彈琴當其得意忽忘形骸時人多謂之癡惟族兄文業每嘆服之以為勝已由是咸共稱異籍嘗隨叔父至東郡兖州刺史王昶請與相見終日不闗一言自以不能測太尉蔣濟聞其有雋才而辟之籍詣都亭奏記曰伏惟明公以含一之德據上台之位英豪翹首俊賢抗足開府之日人人自以為掾屬辟書始下而下走為首昔子夏在於西河之上而文侯擁篲鄒子處於黍谷之陰而昭王陪乗夫布衣韋帶之士孤居特立王公大人所以禮下之者為道存也今籍無鄒卜之道而有其陋猥見採擢無以稱當方將耕於東臯之陽輸黍稷之餘稅負薪疲病足力不彊補吏之召非所克堪乞廽謬恩以光淸舉初濟恐籍不至得記欣然遣卒迎之而籍已去濟大怒於是鄉親共喻之乃就吏後謝病歸復為尚書郞少時又以疾免及曹爽輔政召為參軍籍因以疾辭屏於田野歳餘而爽誅時人服其遠識宣帝為太傅命籍為從事中郞及帝崩復為景帝大司馬從事中郞高貴鄉公卽位封闗内侯徙散騎常侍籍本有濟世志屬魏晉之際天下多故名士少有全者籍由是不與世事遂酣飮為常文帝初欲為武帝求婚於籍籍醉六十日不得言而止鍾㑹數以時事問之欲因其可否而致之罪皆以酣醉獲免及文武輔政籍常從容言於帝曰籍平生曽遊東平樂其風土帝大悅卽拜東平相籍乗驢到郡壞府舍屏鄣使内外相望法令淸簡旬日而還帝引為大將軍從事中郞有司言有子殺母者籍曰嘻殺父乃可至殺母乎坐者怪其失言帝曰殺父天下之極惡而以為可乎籍曰禽獸知母而不知父殺父禽獸之類也殺母禽獸之不若衆乃悅服籍聞歩兵厨營人善釀有貯酒三百斛乃求為歩兵校尉遺落世事雖去佐職恒遊府内朝宴必與焉㑹帝讓九錫公卿將勸進使籍為其辭籍沉醉忘作臨詣府使取之見籍方據按醉眠使者以告籍便書案使寫之無所改竄辭甚淸壯為時所重籍雖不拘禮教然發言元遠口不臧否人物性至孝母終正與人圍碁對者求止籍留與決賭旣而飮酒二斗舉聲一號吐血數升及將葬食一蒸肫飮二斗酒然後臨訣直言窮矣舉聲一號因又吐血數升毁瘠骨立殆致滅性裴楷往弔之籍散髮箕踞醉而直視楷弔喭畢便去或問楷凡弔者主哭客乃為禮籍旣不哭君何為哭楷曰阮籍旣方外之士故不崇禮典我俗中之士故以軌儀自居時人歎為兩得籍又能為青白眼見禮俗之士以白眼對之及嵇喜來弔籍作白眼喜不懌而退喜弟康聞之乃齎酒挾琴造焉籍大悅乃見靑眼由是禮法之士疾之若讎而帝每保䕶之籍嫂嘗歸寧籍相見與别或譏之籍曰禮豈為我設邪鄰家少婦有美色當壚沽酒籍常詣婦飮醉便卧其側籍旣不自嫌其夫察之亦不疑也兵家女有才色未嫁而死籍不識其父兄徑往哭之盡哀而還其外坦蕩而内淳至皆此類也時率意獨駕不由徑路車迹所窮輙慟哭而反常登廣武觀楚漢戰處歎曰時無英雄使豎子成名登虎牢山望京邑而嘆於是賦豪傑詩景元四年冬卒時年五十四籍能屬文初不留意作詠懷詩八十餘篇為世所重著達莊論叙無為之貴文多不錄籍嘗於蘇門山遇孫登與商畧終古及栖神導氣之術登皆不應籍因長嘯而退至半嶺聞有聲若鸞鳳之音響乎巖谷乃登之嘯也遂歸著大人先王傳其略曰世之所謂君子惟法是修惟禮是克手執圭璧足履繩墨行欲為目前檢言欲為無窮則少稱鄉黨長聞鄰國上欲圖三公下不失九州牧獨不見羣蝨之處褌中逃乎深縫匿乎壞絮自以為吉宅行不敢離縫際動不敢出褌襠自以為得繩墨也然炎邱火流焦邑滅都羣蝨處於褌中而不能出也君子之處域内何異夫蝨之處褌中乎此亦籍之胷懷本趣也子渾字長成有父風少慕通達不餘小節籍謂曰仲容已豫吾此流汝不得復爾太康中為太子中庻子籍兄子咸字仲容父熙武都太守咸任達不拘與籍為竹林之遊當世禮法者譏其所為咸與籍居道南諸阮居道北北阮富而南阮貧七月七日北阮盛曬衣服皆錦綺粲目咸以竿挂大布犢鼻於庭人或怪之答曰未能免俗聊復爾耳歴任散騎侍郞山濤舉咸典選曰阮咸貞素寡欲深識清濁萬物不能移若在官人之職必絶於時武帝以咸耽酒浮虛遂不用太原郭弈高爽有識量知名於時少所推先見咸心醉不覺歎焉而居母喪縱情越禮素幸姑之婢姑當歸于夫家初云留婢旣而自從去時方有客咸聞之遽借客馬追婢旣及與婢累騎而還論者甚非之咸妙解音律善彈琵琶雖處世不交人事惟共親知絃歌酣宴而已與從子修特相善每以得意為歡諸阮皆能飮酒咸至宗人間共集不復用杯觴斟酌以大盆盛酒圓坐相向大酌更飮時有羣豕來飮其酒咸直接去其上便共飮之羣從昆弟莫不以放達為行籍弗之許荀朂每與咸論音律自以為遠不及也疾之出補始平太守以壽終二子瞻孚瞻字千里性清虛寡欲自得於懷讀書不甚研求而黙識其要遇理而辯辭不足而㫖有餘善彈琴人聞其能多往求聽不問貴賤長幼皆為彈之神氣沖和而不知向人所在内兄潘岳每令皷琴終日達夜無忤色由是識者嘆其恬澹不可榮辱矣舉止灼然見司徒王戎戎問曰聖人貴名教老莊明自然其㫖同異瞻曰將無同戎咨嗟良乆卽命辟之時人號為三語掾大尉王衍亦雅重之瞻嘗羣行冒熱渴甚逆旅有井衆人競趨之瞻獨逡廵在後須飮者畢乃進其夷退無競如此東海王越鎭許昌以瞻為記室參軍與王承謝鯤鄧攸俱在越府越與瞻等書曰禮年八歳出就外傅明始可以加師訓之則十年曰幼學明可漸先王之教也然學之所入淺體之所安深是以閑習禮容不如式瞻儀度諷誦遺言不若親承音㫖小兒毗旣無令淑之質不聞道德之風望諸君時以閑豫周旋誨接永嘉中為太子舍人瞻素執無鬼論物莫能難每自謂此理足可以辯正幽明忽有一客通名詣瞻寒溫畢聊譚名理客甚有才辯瞻與之言良乆及鬼神之事反覆甚苦客遂屈乃作色曰鬼神古今賢聖所共傳君何獨言無邪僕便是鬼於是變為異形須臾消滅瞻黙然意色大惡後歲餘病卒於倉垣時年三十孚字遥集其母卽胡婢也孚之初生其姑取王延壽魯靈光殿賦曰胡人遥集於上楹而以字焉初辟太傅府遷騎兵避亂渡江元帝以為安東參軍蓬髪飮酒不以王務嬰心時帝旣用申韓以救世而孚之徒未能棄也雖然不以事任處之轉丞相從事中郞終日酣縱恒為有司所按帝每優容之琅邪王裒為車騎將軍鎭廣陵高選綱佐以孚為長史帝謂曰卿旣統軍府郊壘多事宜節飮也孚答曰陛下不以臣不才委之以戎旅之重臣僶俛從事不敢有言者竊以今王莅鎭威風赫然皇澤遐被冦賊斂跡氛祲旣澄日月自朗臣亦何可爝火不息正應端拱嘯詠以樂當年耳遷黄門侍郞散騎常侍嘗以金貂換酒復為所司彈劾帝宥之轉太子中庻子左衞率領屯騎校尉明帝卽位遷侍中從平王敦賜爵南安縣侯轉吏部尚書領東海王師稱疾不拜詔就家用之尚書令郗鑒以為非禮帝曰就用之誠不快不爾便廢才及帝疾大漸溫嶠入受顧命過孚要與同行升車乃告之曰主上遂大漸江左危弱實資羣賢共康世務卿時望所歸今欲屈卿同受顧託孚不答固求下車嶠不許垂至臺門告嶠内逼求暫下便徒歩還家初祖約性好財孚性好屐同是累而未判其得失有詣約見正料財物客至屏當不盡餘兩小簏以著背後傾身障之意未能平或有詣孚正見自蠟屐因自嘆曰未知一生當著幾量屐神色甚閑暢於是勝負始分咸和初拜丹陽尹時太后臨朝政出舅族孚謂所親曰今江東雖累世而年數實淺主幼時艱運終百六而庾亮年少德信未孚以吾觀之將兆亂矣㑹廣州刺史劉顗卒遂苦求出王導等以孚疎放非京尹才乃除都督交廣寧三州軍事鎭南將軍領平越中郞將廣州刺史假節未至鎭卒年四十九尋而蘇峻作逆識者以為知機無子從孫廣嗣修字宣子咸從子也好易老善清言嘗有論鬼神有無者皆以人死者有鬼修獨以為無曰今見鬼者云著生時衣服若人死有鬼衣服亦有鬼邪論者服焉後遂伐社樹或止之修曰若社而為樹伐樹則社移樹而為社伐樹則社亡矣性簡任不修人事絶不喜見俗人遇便舍去意有所思率爾褰裳不避晨夕至或無言但欣然相對常歩行以百錢挂杖頭至酒店便獨酣暢雖當世富貴而不肯顧家無儋石之儲晏如也與兄弟同志常自得於林阜之間王衍當時談宗自以論易畧盡然有所未了研之終莫悟每云不知此没當見能通之者不衍族子敦謂衍曰阮宣子可與言衍曰吾亦聞之但未知其亹亹之處定何如耳及與修談言寡而㫖暢衍乃歎服焉梁國張偉志趣不常自隱於屠釣修愛其才美而知其不眞偉後為黄門郞陳留内史果以世事受累修居貧年四十餘未有室王敦等斂錢為婚皆名士也時慕之者求入錢而不得修所著述甚寡嘗作大鵬贊曰蒼蒼大鵬誕自北溟假精靈鱗神化以生如雲之翼如山之形海運水擊扶摇上征翕然增舉背負太清志存天地不屑唐庭鷽鳩仰笑尺鴳所輕超世高逝莫知其情王敦時為鴻臚卿謂修曰卿常無食鴻臚丞差有祿能作不修曰亦復可爾耳遂為之轉太傅行參軍太子洗馬避亂南行至西陽期思縣為賊所害時年四十二孚族弟放字思度祖畧齊郡太守父顗淮南内史放少與孚並知名中興除太學博士太子中舍人庶子時雖戎車屢駕而放侍太子常說老莊不及軍國明帝甚友愛之轉黄門侍郞遷吏部郞在銓管之任甚有稱績時成帝幼冲庾氏執政放求為交州乃除監交州軍事揚威將軍交州刺史行達寧浦逢陶侃將高寳平梁碩自交州還放設饌請寶伏兵殺之寶衆擊放敗走保簡陽城得免到州少時暴發渴見寶為祟遂卒朝廷甚悼惜之年四十四追贈廷尉放素知名而性清約不營産業為吏部郞不免饑寒王導庾亮以其名士常供給衣食子晞之南頓太守放弟裕字思曠宏達不及放而以德業知名弱冠辟太宰掾大將軍王敦為主簿甚被知遇裕以敦有不臣之心乃終日酣觴以酒廢職敦謂裕非當世實才徒有虛譽而已出為溧陽令復以公事免官由是得違敦難論者以此貴之咸和初除尚書郞時事故之後公私廢弛裕遂去職還家居㑹稽剡縣司徒王導引為從事中郞固辭不就朝廷將欲徵之裕知不得已乃求為王舒撫軍長史舒薨除吏部郞不就卽家拜臨海太守少時去職司空郗鑒請為長史詔徵祕書監皆以疾辭復除東陽太守尋徵侍中不就還剡山有肥遁之志有以問王羲之羲之曰此公近不驚寵辱雖古之沉冥何以過此人云裕骨氣不及逸少簡秀不如眞長韶潤不如仲祖思致不如殷皓而兼有諸人之美成帝崩裕赴山陵事畢便還諸人相與追之裕亦審時流必當逐已而疾去至方山不相及劉惔歎曰我入東正當泊安石渚下耳不敢近思曠傍裕雖不博學論難甚精嘗問謝万云未見四本論君試為言之万叙說旣畢裕以傅嘏為長於是構辭數百言精義入微聞者皆嗟咏之裕嘗以人不須廣學正應以禮讓為先故終日静黙無所修綜而物自宗焉在剡曾有好車借無不給有人葬母欲借而不敢言後裕聞之乃歎曰吾有車而使人不敢借何以車為遂焚之在東山乆之復徵為散騎常侍領國子祭酒俄而復以為金紫光祿大夫領琅邪王師雖屢經敦逼並無所就御史中丞周閔奏裕及謝安違詔累載並應有罪禁錮終身詔書貰之或問裕曰子辭徵聘而宰二郡何邪裕曰雖屢辭王命非敢為高也吾少無宦情兼拙於人間旣不躬耕自活必有所資故曲躬二郡豈以騁能私計故耳年六十一卒三子傭寧普傭早卒寧鄱陽太守普驃騎參軍傭子歆之中領軍寧子腆祕書監腆弟萬齡及歆之子彌之元熙中並列顯位嵇康字叔夜譙國銍人也其先姓奚㑹稽上虞人以避怨徙焉銍有嵇山家于其側因而命氏兄喜有當世才歴太僕宗正康早孤有竒才遠邁不羣身長七尺八寸美詞氣有風儀而土木形骸不自藻飾人以為龍章鳳姿天質自然恬情寡慾含垢匿瑕寛簡有大量學不師受博覧無不該通尤好老莊與魏宗室婚拜中散大夫常修養性服食之事彈琴詠詩自足於懷以為神仙禀之自然非積學所得至於導養得理則安期彭祖之倫可及乃著養生論又以為君子無私其論曰夫稱君子者心不措乎是非而行不違乎道者也何以言之夫氣靜神虛者心不存於矜尚體亮心達者情不係於所欲矜尚不存乎心故能越名教而任自然情不係於所欲故能審貴賤而通物情物情順通故大道無違越名任心故是非無措也是故言君子則以無措為主以通物為美言小人則以匿情為非以違道為闕何者匿情矜吝小人之至惡虛心無措君子之篤行也是以大道言及吾無身吾又何患無以生為貴者是賢於貴生也由斯而言夫至人之用心固不存有措矣故曰君子行道忘其為身斯言是矣君子之行賢也不察於有度而後行也任心無邪不議於善而後正也顯情無措不論於是而後為也是故慠然忘賢而賢與度㑹忽然任心而心與善遇儻然無措而事與是俱也其畧如此蓋其胷懷所寄以高契難期每思郢質所與神交者惟陳留阮籍河内山濤豫其流者河内向秀沛國劉伶籍兄子咸琅邪王戎遂為竹林之遊世所謂竹林七賢也戎自言與康居山陽二十年未嘗見其喜愠之色康常採藥遊山澤㑹其得意忽焉忘反時有樵蘇者遇之咸謂為神至汲郡山中見孫登康遂從之遊登沉黙自守無所言說康臨去登曰君性烈而才雋其能免乎又遇王烈共入山烈常得石髓如飴卽自服半餘半與康皆凝而為石又於石室中見一卷素書遽呼康往取輙不復見烈乃歎曰叔夜志趣非常而輙不遇命也其神心所感每遇幽逸如此山濤將去選官舉康自代康乃與濤書告絶曰聞足下欲以吾自代雖事不行知足下故不知之也恐足下羞庖人之獨割引尸祝以自助故為足下陳其可否老子莊周吾之師也親居賤職栁下惠東方朔達人也安乎卑位吾豈敢短之哉又仲尼兼愛不羞執鞭子文無欲卿相而三為令尹是乃君子思濟物之意也所謂達能兼善而不渝窮則自得而無悶以此觀之故知堯舜之居世許由之巖棲子房之佐漢接輿之行歌其揆一也仰瞻數君可謂能遂其志者也故君子百行殊塗同致循性而動各附所安故有處朝廷而不出入山林而不反之論且延陵高子臧之風長卿慕相如之節意氣所託亦不可奪也吾每讀尚子平臺孝威傳慨然慕之想其為人加少孤露母兄驕恣不渉經學又讀老莊重増其放故使榮進之心日頺任逸之情轉篤阮嗣宗口不論人過吾每師之而未能及至性過人與物無傷惟飮酒過差耳至為禮法之士所繩疾之如仇讎幸頼大將軍保持之耳吾以不如嗣宗之資而有慢弛之闕又不識物情闇於機宜無萬石之愼而有好盡之累乆與事接疵釁日興雖欲無患其可得乎又聞道士遺言餌术黄精令人乆壽意甚信之遊山澤觀魚鳥心甚樂之一行作吏此事便廢安能舍其所樂而從其所懼哉夫人之相知貴識其天性因而濟之禹不逼成子高全其長也仲尼不假蓋於子夏䕶其短也近諸葛孔明不逼元直以入蜀華子魚不彊幼安以卿相此可謂能終始眞相知者也自卜已審若道盡塗殫則已耳足下無事寃之令轉於溝壑也吾新失母兄之歡意常悽切女年十三男年八歳未及成人况復多疾顧此悢悢如何可言今但欲守陋巷敎養子孫時時與親舊叙離闊陳說平生濁酒一杯彈琴一曲志意畢矣豈可見黄門而稱貞哉若趣欲共登王塗期於相致時為懽益一旦逼之必發狂疾自非重讎不至此也旣以解足下并以為别此書旣行知其不可羈屈也性絶巧而好鍜宅中有一栁樹甚荗乃激水圜之每夏月居其下以鍜東平吕安服康高致每一相思輙千里命駕康友而善之後安為兄所枉訴以事繫獄辭相證引遂復收康康性愼言行一旦縲紲乃作幽憤詩曰嗟余薄祐少遭不造哀煢靡識越在襁褓母兄鞠育有慈無威恃愛肆狙不訓不師爰及冠帶慿寵自放抗心希古任其所尚託好莊老賤物貴身志在守樸養素全眞曰予不敏好善闇人子玉之敗屢增惟塵大人含𢎞藏垢懷耻人之多僻政不由已惟此褊心顯明臧否感悟思愆怛若創痏欲寡其過謗議沸騰性不傷物頻致怨憎昔慙栁惠今媿孫登内負宿心外恧良朋仰慕嚴鄭樂道閑居與世無營神意晏如咨予不淑嬰累多虞匪降自天寔由頑疎理弊患結卒致囹圄對答鄙訊縶此幽阻實耻訟寃時不我與雖曰義直神辱志沮澡身滄浪曷云能補雍雍鳴鴈厲翼北游順時而動得意忘憂嗟我憤歎曾莫能疇事與願違遘兹淹留寵達有命亦又何求古人有言善莫近名奉時恭黙咎悔不生萬石周愼安親保榮世務紛紜祗攪余情安樂必誡乃終利貞煌煌靈芝三年一秀予獨何為有志不就懲難思復心焉内疚庶朂將來無馨無臰採薇山阿散髮巖岫永嘯長吟頤神養壽初康居貧嘗與向秀共鍜於大樹之下以自贍給潁川鍾㑹貴公子也精練有才辯故往造焉康不為之禮而鍜不輟良乆㑹去康謂曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去㑹以此憾之及是言於文帝曰嵇康卧龍也不可起公無憂天下顧以康為慮耳因譖康欲助毋邱儉頼山濤不聽昔齊戮華士魯誅少正卯誠以害時亂敎故聖賢去之康安等言論放蕩非毁典謨帝王者所不宜容宜因釁除之以淳風俗帝旣昵聽信㑹遂并害之康將刑東市太學生三千人請以為師弗許顧視日影索琴彈之曰昔袁孝尼嘗從吾學廣陵散吾每靳固之廣陵散於今絶矣時年四十海内之士莫不痛之帝尋悟而恨焉初康遊乎洛西暮宿華陽亭引琴而彈夜分忽有客詣之稱是古人與康共談音律詞致清辯因索琴彈之而為廣陵散聲調絶倫遂以授康仍誓不傳人亦不言其姓字康善談理又能屬文其高情遠趣率然元遠撰上古以來高士為之傳贊欲友其人於千載也又作太師箴亦足以明帝王之道焉復作聲無哀樂論甚有條理子紹别有傳向秀字子期河内懷人也清悟有達識少為山濤所知雅好老莊之學莊周著内外數十篇歴世才士雖有觀者莫適論其㫖統也秀乃為之隱解發明竒趣振發元風讀之者超然心悟莫不自足一時也惠帝之世郭象又述而廣之儒墨之迹見鄙道家之言遂盛焉始秀欲注嵇康曰此書詎復須注正是妨人作樂耳及成示康曰殊復勝不又與康論養生辭難往復蓋欲發康高致也康善鍜秀為之佐相對欣然傍若無人又共吕安灌園於山陽康旣被誅秀應本郡計入洛文帝問曰聞有箕山之志何以在此秀曰以為巢許狷介之士未達堯心豈足多慕帝甚悅秀乃自此役作思舊賦云余與嵇康吕安居止接近其人並有不羈之才嵇意遠而疎吕心曠而放其後並以事見法嵇博綜伎藝於絲竹特妙臨當就命顧視日影索琴而彈之逝將西邁經其舊廬于時日薄虞泉寒冰凄然鄰人有吹笛者發聲廖亮追想曩昔遊晏之好感音而歎故作賦曰將命適於遠京兮遂旋反以北徂濟黄河以汎舟兮經山陽之舊居瞻曠野之蕭條兮息余駕乎城隅踐二子之遺迹兮歴窮巷之空廬歎黍稷之愍周兮悲麥秀於殷墟惟古昔以懷今兮心徘徊以躊躇棟宇在而弗毁兮形神逝其焉如昔李斯之受罪兮歎黄犬而長吟悼嵇生之永辭兮顧日影而彈琴託運遇於領㑹兮寄餘命於寸隂聽鳴笛之慷慨兮妙聲絶而復尋佇駕言其將邁兮故援翰以寫心後為散騎侍郎轉黄門侍郞散騎常侍在朝不任職容迹而已卒於位二子純悌劉伶字伯倫沛國人也身長六尺容貎甚陋然放情肆志常以細宇宙齊萬物為心澹黙少言不妄交遊與阮籍嵇康相遇欣然神解攜手入林初不以家産有無介意常乗鹿車攜一壺酒使人荷鍤而隨之謂曰死便埋我其遺形骸如此嘗渴甚求酒於其妻妻捐酒毁器涕泣諫曰君酒太過非攝生之道必宜斷之伶曰善吾不能自禁惟當祝鬼神自誓耳便可具酒肉妻從之伶跪祝曰天生劉伶以酒為名一飮一斛五斗解酲婦兒之言愼不可聽仍引酒御肉塊然復醉嘗醉與俗人相忤其人攘袂奮拳而往伶徐曰雞肋不足以安尊拳其人笑而止伶雖陶兀昬放而機應不差未嘗厝意文翰惟著酒德頌一篇其辭曰有大人先生以天地為一朝萬期為須臾日月為扃牖八荒為庭衢行無轍迹居無室廬幕天席地縱意所如止則操巵執瓢動則挈榼提壺惟酒是務焉知其餘有貴介公子搢紳處士聞吾風聲議其所以乃奮袂攘襟怒目切齒陳說禮法是非鋒起先生於是方捧甖承槽衘杯潄醪奮髯箕踞枕麯藉糟無思無慮其樂陶陶兀然而醉怳爾而酲靜聽不聞雷霆之聲熟視不覩泰山之形不覺寒暑之切肌利欲之感情俯觀萬物擾擾焉若江海之載浮萍二豪侍側焉如蜾蠃之與螟蛉嘗為建威參軍泰始初對䇿盛言無為之化時輩皆以高第得調伶獨以無用罷竟以壽終謝鯤字幼輿陳國陽夏人也祖纘典農中郎將父衡以儒素顯仕至國子祭酒鯤少知名通簡有高識不修威儀好老易能歌善鼓琴王衍嵇紹並竒之永興中長沙王乂入輔政時有疾鯤者言其將出奔乂欲鞭之鯤解衣就罰曾無忤容旣捨之又無喜色太傅東海王越聞其名辟為掾任達不拘尋坐家僮取官稾除名于時名士王元阮修之徒並以鯤初登宰府便至黜辱為之歎恨鯤聞之方清歌鼓琴不以屑意莫不服其遠暢而恬於榮辱鄰家高氏女有美色鯤嘗挑之女投梭折其兩齒時人為之語曰任達不已幼輿折齒鯤聞之慠然長嘯曰猶不廢我嘯歌越尋更辟之轉參軍事鯤以時多故乃謝病去職避地於豫章嘗行經空亭中夜宿此亭舊每殺人將曉有黄衣人呼鯤字令開戸鯤憺然無懼色便於窻中度手牽之胛斷視之鹿也尋血獲焉爾後此亭無復妖怪左將軍王敦引為長史以討杜弢功封咸亭侯母憂去職服闋遷敦大將軍長史時王澄在敦坐見鯤談話無勌唯歎謝長史可與言都不盻敦其為人所慕如此鯤不尚功名無砥礪行居身於可否之間雖自處若穢而動不累高敦有不臣之迹顯於朝野鯤知不可以道匡弼乃優游寄通不屑政事從容諷議卒歳而已每與畢卓王尼阮放羊曼桓彜阮孚等縱酒敦以其名高雅相賔禮嘗使至都明帝在東宫見之甚相親重問曰論者以君方庾亮自謂何如答曰端委廟堂使百寮凖則鯤不如亮一邱一壑自謂過之温嶠嘗謂鯤子尚曰尊大君豈惟識量淹遠至於神鑒沉深雖諸葛瑾之喻孫權不過也及敦將為逆謂鯤曰劉隗姦邪將危社稷吾欲除君側之惡匡王濟時何如對曰隗誠始禍然城狐社䑕也敦怒曰君庸才豈達大理出鯤為豫章太守又留不遣藉其才望逼與俱下敦至石頭歎曰吾不復得為盛德事矣鯤曰何為其然但使自今以往日忘日去爾初敦謂鯤曰吾當以周伯仁為尚書令戴若思為僕射及至都復曰近來人情何如鯤對曰明公之舉雖欲大存社稷然悠悠之言未達高義周顗戴若思南北人士之望明公舉而用之羣情帖然矣是日敦遣兵收周戴而鯤弗知敦怒曰君麤疎邪二子不相當吾已收之矣鯤與顗素相親重聞之愕然若喪諸已參軍王嶠以敦誅顗諫之甚切敦大怒命斬嶠時人士畏懼莫敢言者鯤曰明公舉大事不戮一人嶠以獻替忤㫖便以釁鼓不亦過乎敦乃止敦旣誅害朝賢而稱疾不朝將還武昌鯤喻敦曰公大存社稷建不世之勲然天下之心實有未達若能朝天子使君臣釋然萬物之心於是乃服仗衆望以順羣情盡冲退以奉主上如斯則勲侔一匡名垂千載矣敦曰君能保無變乎對曰鯤近日入覲主上側席遲得見公宫省穆然必無虞矣公若入朝鯤請侍從敦勃然曰正復殺君等數百人亦復何損於時竟不朝而去是時朝望被害皆為其憂而鯤推理安常時進正言敦旣不能用内亦不悅軍還使之郡蒞政清肅百姓愛之尋卒官時年四十三敦死後追贈太常諡曰康子尚嗣别有傳胡母輔之字彦國泰山奉高人也高祖班漢執金吾父原練習兵馬山濤稱其才堪邊任舉為太尉長史終河南令輔之少擅高名有知人之鑒性嗜酒任縱不拘小節與王澄王敦庾敳俱為太尉王衍所昵號曰四友澄嘗與人書曰彦國吐佳言如鋸木屑霏霏不絶誠為後進領袖也辟别駕太尉掾並不就以家貧求試守繁昌令始節酒自厲甚有能名遷尚書郞豫討齊王冏賜爵陰平男累轉司徒左長史復求外出為建武將軍樂安太守與郡人光逸晝夜酣飮不視郡事成都王穎為太弟召為中庶子遂與謝鯤王澄阮修王尼畢卓俱為放達嘗過河南門下飮河南騶王子博箕坐其傍輔之叱使取火子博曰我卒也惟不乏吾事則已安復為人使輔之因就與語嘆曰吾不及也薦之河南尹樂廣廣召見甚悅之擢為功曹其甄拔人物若此東海王越聞輔之名引為從事中郎復補振威將軍陳留太守王彌經其郡輔之不能討坐免官尋除寧遠將軍揚州刺史不之職越復以為右司馬本州大中正越薨避亂渡江元帝以為安東將軍諮議祭酒遷揚武將軍湘州刺史假節到州未幾卒時年四十九子謙之字子光才學不及父而慠縱過之至酣醉常呼其父字輔之亦不以介意談者以為狂輔之正酣飮謙之闚而厲聲曰彦國年老不得為爾將令我凥背東璧輔之歡笑呼入與共飮其所為如此年未三十卒畢卓字茂世新蔡鮦陽人也父諶中書郞卓少希放達為胡母輔之所知太興末為吏部郞常飮酒廢職比舍郞釀熟卓因醉夜至其甕間盗飮之為掌酒者所縛明旦視之乃畢吏部也遽釋其縛卓遂引主人宴於甕側致醉而去卓嘗謂人曰得酒滿數百斛船四時甘味置兩頭右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣及過江為溫嶠平南長史卒官王尼字孝孫城陽人也或云河内人本兵家子寓居洛陽卓犖不羈初為䕶軍府軍士胡母輔之與琅邪王澄北地傅暢中山劉輿潁川荀邃河東裴遐迭屬河南功曹甄述及洛陽令曹攄請解之攄等以制㫖所及不敢輔之等齎羊酒詣䕶軍門門吏疏名呈䕶軍䕶軍嘆曰諸名士持羊酒來將有以也尼時以給府養馬輔之等入遂坐馬廐下與尼炙羊飮酒醉飽而去竟不見䕶軍䕶軍大驚卽與尼長假因免為兵東嬴公騰辟為車騎府舍人不就時尚書何綏奢侈過度尼謂人曰綏居亂世矜豪乃爾將死不乆人曰伯蔚聞言必相危害尼曰伯蔚比聞我語已死矣未幾綏果為東海王越所殺越初入洛尼詣越不拜越問其故尼曰公無宰相之能是以不拜因數之言甚切又云公負尼物越大驚曰寧有是也尼曰昔楚人忘布謂令尹盗之今尼屋舍資財悉為公軍人所略尼今飢凍是亦明公之負也越大笑卽賜絹五十匹諸貴人聞競往餉之洛陽陷避亂江夏時王澄為荆州刺史遇之甚厚尼早喪婦止有一子無居宅惟畜露車有牛一頭每行輙使子御之暮則共宿車上常嘆曰滄海横流處處不安也俄而澄卒荆土饑荒尼不得食乃殺牛壞車煮肉噉之旣盡父子俱餓死羊曼字祖延太傅祜兄孫也父曁陽平太守曼少知名本州禮命太傅辟皆不就避難渡江元帝以為鎭東參軍轉丞相主簿委以機密歴黄門侍郞尚書吏部郞晉陵太守以公事免曼任達頺縱好飮酒溫嶠庾亮阮放桓彜同志友善並為中興名士時州里稱陳留阮放為宏伯高平郄鑒為方伯泰山胡母輔之為達伯濟陰卞壺為裁伯陳留蔡謨為朗伯阮孚為誕伯高平劉綏為委伯而曼為䵬伯凡八人號兖州八伯蓋擬古之八儁也王敦旣與朝廷乖貳羈錄朝士曼為右長史曼知敦不臣終日酣醉諷議而已敦以其士望厚加禮遇不委以事故得不涉其難敦敗代阮孚為丹陽尹時朝士過江初拜官相飾供饌曼拜丹陽客來早者得佳設日晏則漸罄不復及精隨客早晚而不問貴賤有羊固拜臨海太守竟日皆美雖晚至者猶獲盛饌論者以固之豐腆乃不如曼之眞率蘇峻作亂加前將軍率文武守雲龍門王師不振或勸曼避峻曼曰朝廷破敗吾安所求生勒衆不動為峻所害年五十五峻平追贈太常子賁嗣少知名尚明帝女南郡悼公主除祕書郞早卒曼弟聃字彭祖少不經學時論皆鄙其凡庸先是兖州有八伯之號其後更有四伯大鴻臚陳留江泉以能食為榖伯豫章太守史疇以大肥為笨伯散騎郞高平張嶷以狡妄為猾伯而聃以狠戾為瑣伯蓋擬古之四凶聃初辟元帝丞相府累遷廬陵太守剛克麤暴恃國戚縱恣尤甚睚眦之嫌輙加刑殺疑郡人簡良等為賊殺二百餘人誅及嬰孩所髠鏁復百餘庾亮執之歸於京都有司奏聃罪當死以景獻皇后是其祖姑應八議成帝詔曰此事古今所無何八議之有猶未忍肆之市朝其賜命獄所兄子賁尚公主自表求解婚詔曰罪不相及古今之令典也聃雖極法於賁何有其特不聽離婚琅邪太妃山氏聃之甥也入殿叩頭請命王導又啓聃罪不容恕宜極重法山太妃憂戚成疾陛下罔極之恩宜䝉生全之宥於是詔下曰太妃唯此一舅發言摧咽乃至吐血情慮深重朕往丁荼毒受太妃撫育之恩同於慈親若不堪難忍之痛以致頓弊朕亦何顔以寄今便原聃生命以慰太妃渭陽之思於是除名頃之遇疾恒見簡良等為祟旬日而死光逸字孟祖樂安人也初為博昌小吏縣令使逸送客冒寒舉體涷濕還遇令不在逸解衣炙之入令被中卧令還大怒將加嚴罰逸曰家貧衣單沾濕無可代若不暫温勢必凍死柰何惜一被而殺一人乎君子仁愛必不爾也故寢而不疑令竒而釋之後為門亭長迎新令至京師胡母輔之與荀䆳共詣令家望見逸謂䆳曰彼似竒才便呼上車與談良乆果俊器令怪客不入吏白與光逸語令大怒除逸名斥遣之後舉孝亷為州從事棄官投輔之輔之時為太傅越從事中郞薦逸於越越以門寒而不召越後因閑宴責輔之無所舉薦輔之曰前舉光逸公以非世家不召非不舉也越卽辟焉書到郡縣皆以為誤審知是逸乃備禮遣之尋以世亂避難渡江復依輔之初至屬輔之與謝鯤阮放畢卓羊曼桓彜阮孚散髮裸袒閉室酣飮已累日逸將排户入守者不聽逸便於戸外脱衣露頭於狗竇中窺之而大呌輔之驚曰他人決不能爾必我孟祖也遽呼入遂與飮不捨晝夜時人謂之八達元帝以逸補軍諮祭酒中興建為給事中卒官庾峻字山甫潁川􅋣陵人也祖乘才學洽聞漢司徒辟有道徵皆不就伯父嶷中正簡素仕魏為太僕父道亷退貞固養志不仕牛馬有踶嚙者恐傷人不貨於市及諸子貴賜拜太中大夫峻少好學有才思常遊京師聞魏散騎常侍蘇林老疾在家往候之林嘗就乘學見峻流涕良乆曰尊祖高才而性退讓慈和汎愛清靜寡欲不營當世唯修德行而已􅋣陵舊五六萬户聞今裁有數百君二父孩抱經亂獨至今日尊伯為當世令器君兄弟復俊茂此尊祖積德之所由也歴郡功曹舉計掾州辟從事太常鄭袤見峻大竒之舉為博士時重老莊而輕經史峻懼雅道陵遲乃潛心儒典屬高貴鄉公幸太學問尚書義於峻峻援引師說發明經㫖申暢凝滯對答詳悉遷秘書丞長安有大獄乆不決拜峻侍御史往斷之朝野稱允武帝踐阼賜爵闗内侯遷司空長史轉祕書監御史中丞拜侍中加諫議大夫常侍帝講詩中庶子何劭論風雅正變之義峻起難往反四坐莫能屈之是時風俗趣競禮讓陵遲峻上疏言之大要欲旌擢山林之士及辭寵之臣以厲其亷隅耳峻又疾世浮華不修名實著論以非之文繁不載九年卒詔賜朝服一具衣一襲錢三十萬臨終勅子珉朝卒夕殯幅巾布衣葬勿擇日珉奉遵遺命歛以時服二子珉敳珉字子琚性淳和好學行已忠恕少歴散騎常侍本國中正侍中封長岑男懷帝之没劉淵也珉從在平陽淵大㑹因使帝行酒珉不勝悲憤再拜上酒因大號哭賊惡之㑹有告珉及王儁等謀應劉琨者淵因圖弑逆珉等並遇害初洛陽之未陷也珉為侍中直于省内謂同僚許遐曰世路如此禍難將及吾當死乎此屋耳及是竟不免焉大元末追諡曰貞敳字子嵩長不滿七尺而腰帶十圍雅有遠韻為陳留相未嘗以事嬰心從容酣暢寄通而已處衆人中居然獨坐嘗讀老莊曰正與人意闇同太尉王衍雅重之敳見王室多難終知嬰禍及著意賦以豁情猶賈生之鵩鳥也從子亮見賦問曰若有意也非賦所盡若無意也復何所賦答曰在有無之間耳遷吏部郞是時天下多故機變屢起敳常静黙無為參東海王越太傅軍事轉軍諮祭酒時越府多儁異敳在其中常自神王豫州長史河南郭象時人以為王弼之亞敳甚知之每曰郭子元何必減庾子嵩象後為太傅主簿任事專勢敳謂象曰卿自是當世大才我疇昔之意都已盡矣敳有重名為縉紳所推而聚斂積實談者譏之都官從事温嶠奏之敳更器嶠目嶠森森如千丈松雖礧砢多節施之大厦有棟梁之用時劉輿見任於越人士多為所構唯敳縱心事外無迹可間後以其性儉家富說越令就换錢千萬冀其有吝因此可乘越於衆坐中問敳敳頽然已醉幘墜几上以頭就穿取徐答云下官家故有兩千萬隨公所取矣輿於是乃服越甚悦因曰不可以小人之慮度君子之心王衍不與敳交敳卿之不置衍曰君不得為耳敳曰卿自君我我自卿卿我自用我家法卿自用卿家法衍甚竒之石勒之亂與衍俱被害年五十郭象字子元少有才理好老莊能清言太尉王衍每云聽象語如懸河瀉水注而不竭州郡辟召不就常閑居以文論自娛後辟司徒掾稍遷至黄門侍郞東海王越引為太傅主簿甚見親委遂任職當權熏灼内外由是素論去之永嘉末病卒著碑論十二篇先是注莊子者數十家莫能䆒其㫖統向秀於舊注外而為觧義妙演竒致大暢元風唯秋水至樂二篇未竟而秀卒子幼其義零落然頗有别本遷流象為人行薄以秀義不傳于世遂竊以為已注乃自注秋水至樂二篇又易馬蹄一篇其餘衆篇或㸃定文句而已其後秀義别本出故今有向郭二莊其義一也庾純字謀甫博學有才義為世儒宗郡補主簿任參征南府累遷黄門侍郞封闗内侯歴中書令河南尹初純以賈充姦佞與任愷共舉充西鎭闗中充由是不平之充嘗宴朝士而純後至充謂曰君行常居人前今何以在後純曰且有小市井事不了是以來後世言純之先嘗有伍伯者充之先有市魁者充純以此相譏焉充自以位隆望重意殊不平及純行酒充不時飮純曰長者為壽何敢爾乎充曰父老不歸供養將何言也純發怒曰賈充天下兇兇由爾一人充曰輔佐二世蕩平吳蜀有何罪而天下為之兇兇純曰高貴鄉公何在衆坐因罷充左右欲執純中䕶軍羊琇侍中王濟佑之因得出充慙怒上表解職純懼上河南尹闗内侯印綬上表自劾求入重罪御史中丞孔恂亦劾之遂詔免純官又以純父老不求供養使據典禮正其臧否太傅何曾大尉荀顗驃騎將軍齊王攸議曰凡斷正臧否宜先稽之禮律八十者一子不從政九十者其家不從政新令亦如之按純父年八十一純兄弟六人三人在家不廢侍養純不求供養其於禮律未有違也司空公以純備位卿尹望其有加於人而純荒醉肆其忿怒臣以為純不遠布至孝之行而近惜常人之失應在譏貶司徒石苞議純榮官忘親惡聞格言不忠不孝宜除名削爵土司徒西曹掾劉斌議以為敦叙風俗以人倫為先人倫之教以忠孝為主忠故不忘其君孝故不遺其親若孝必專心於色養則明君不得而臣忠必不顧其親則父母不得而子也是以為臣者必以義斷其恩為子者必以情割其義在朝則從君之命在家則隨父之制然後君父兩濟忠孝各序純兄峻以父老求歸峻若得歸純無不歸之勢峻不得歸純無得歸之理純雖自聞同不見聽近遼東太守孫和廣漢太守鄧良皆有老母良無兄弟授之遠郡辛苦自歸皆不見聽且純近為京尹父在界内時得自啓定省獨於禮法外處其貶黜斌愚以為非也禮年八十一子不從政純有二弟在家不為違禮又令年九十乃聽悉歸今純父實未九十不為犯令罵辱宰相宜加放斥以明國典聖恩愷悌示加貶退臣愚無所清議河南功曹史龎札亦表言臣郡前尹闗内侯純醉酒失常戊申詔書既免尹官後以其父篤老不求供養下五府依典禮正其臧否而羣公有過於責備者遂律尹以為不孝謂宜削除爵土臣按令父母年過八十聽令其子不給限外職誠以得有歸來之緣今尹居在郡内前每表屢䝉定省尹昆弟六人三人在家孝養不廢兄侍中峻家之嫡長往比自表求歸供養詔喻不聽國體法同兄弟無異豈得徒責尹不求供養邪若此議遂行臣等懼長假飾之名而損忠誠之實也於是帝復下詔曰自中世以來多為貴重順意賤者生情故令釋之定國得掦名於前世今議責純不惟温克醉酒沈湎此責人以齊聖也疑賈公亦醉若其不醉終不於百客之中責以不去官供養也大晉依聖人典禮制臣子出處之宜若有八十之親皆當歸養亦不獨純也古人云由醉之言俾出童羖明不責醉恐失度也所以免純者當為將來之醉戒耳齊王劉掾議當矣復以純為國子祭酒加散騎常侍後將軍荀眅於朝㑹中奏純以前坐不孝免黜不宜升進侍中甄德進曰孝以顯親為大祿養為榮詔赦純前愆擢為近侍兼掌教官此純召不俟駕之日而後將軍眅敢以私議貶奪公論抗言矯情誣罔朝廷宜加貶黜眅坐免官初眅與純俱為大將軍所辟眅整麗車服純率素而已眅以為愧恨至是毁純眅既免黜純更以此媿之亟往慰勉之時人稱純通恕遷侍中以父憂去官起為御史中丞轉尚書魏郡太守不之官拜少府年六十四卒子旉字允臧少有清節歴位博士齊王攸之就國也下禮官議崇錫之物旉與博士太叔廣劉暾繆蔚秦秀傅珍等上表諫曰書稱帝堯克明俊德以親九族武王光有天下兄弟之國十有六人同姓之國四十人元勲睦親顯以殊禮而魯衞齊晉大啓土宇並受分器所謂惟善所在親疎一也大晉龍興隆唐周之遠迹王室親屬佐命功臣咸受爵土而四海乂安今吳㑹已平詔大司馬齊王出統方岳當遂撫其國家將凖古典以垂永制昔周之選建明德以左右王室也則周公為太宰康叔為司冦聃季為司空又召芮畢毛諸國皆入居公卿大夫之位明股肱之任重守地之位輕也未聞古典以三事之重出之國者漢氏諸侯王位尊勢重在丞相三公上其入讚朝政者乃有兼官其出之國亦不復假台司虛名為隆寵也昔申無宇曰五大不在邊先儒以為貴寵公子公孫累世正卿也又曰五細不在庭先儒以為賤妨貴少陵長遠間親新間舊小加大也不在庭不在朝庭為政也又曰親不在外羈不在内今棄疾在外鄭丹在内君其少戒之叔向有言公室將卑其枝葉先落公族公室之本而去之諺所謂芘焉而縱尋斧柯者也今使齊王賢邪則不宜以母弟之親尊居魯衞之常職不賢邪不宜大啓土宇表建東海也古禮三公無職坐而論道不聞以方任嬰之惟周室大壞宣王中興四夷交侵救急朝夕然後命召穆公征淮夷故其詩曰徐方不囘王曰旋歸宰相不得乆在外也今天下已定六合為家將數延三事與論太平之基而更出之去王城二千里違舊章矣旉草議先以呈父純純不禁太常鄭黙博士祭酒曹志並過其事武帝以博士不答所問答所不問大怒事下有司尚書朱整褚䂮等奏旉等侵官離局迷罔朝廷崇飾惡言假託無諱請收旉等八人付廷尉科罪旉父純詣廷尉自首旉以議草見示愚淺聽之詔免純罪廷尉劉頌又奏旉等大不敬棄市論求平議尚書又奏請報聽廷尉行刑尚書夏侯駿謂朱整曰國家乃欲誅諫臣官立八座正為此時卿可共駮正之整不從駿怒起曰非所望也乃獨為駁議左僕射魏舒右僕射下邳王晃等從駿議奏留中七日乃詔曰旉等備為儒官不念奉憲制不指答所問敢肆其誣罔之言以干亂視聽而旉是議主應為戮首但旉及家人並自首大信不可奪秦秀傅珍前者虛妄幸而得免復不以為懼當加罪戮以彰凶慝猶復不忍皆丐其死命秀珍旉等並除名後數歳復起為散騎常侍􅀈於國子祭酒秦秀字元良新興雲中人也父朗魏驍騎將軍秀少敦學行以忠直知名咸寧中為博士何曾卒下禮官議諡秀議曰故太宰何曾雖階世族之允而少以高亮嚴肅顯登王朝事親有色養之名在官奏科尹模此二者實得臣子事上之槩然資性驕奢不循軌則詩云節彼南山維石巖巖赫赫師尹民具爾瞻言其德行高峻動必以禮耳邱明有言儉德之恭侈惡之大也大晉受命勞謙隱約曾受寵二代顯赫累世曁乎耳順之年身兼三公之位食大國之租荷保傅之貴執司徒之均二子皆金貂卿校列於帝側方之古人責深負重雖舉門盡死猶不稱位而乃驕奢過度名被九域行不履道而享位非常以古義言之非惟失輔相之宜違斷金之利也穢皇代之美壞人倫之敎生天下之醜示後世之慠莫大於此自近世以來宰相輔臣未有受垢辱之聲被有司之劾父子塵累而䝉恩貸若曾者也周公弔二季之陵遲哀大敎之不行於是作諡以紀其終曾參奉之啓手歸全易簀而没蓋明愼終死而後已齊之史氏亂世陪臣耳猶書君賊累死不懲况於皇代守典之官敢畏彊盛而不盡禮管子有言禮義亷耻是謂四維四維不張國乃滅亡宰相大臣人之表儀若生極其情死又無貶是則帝室無正刑也王公貴人復何所畏哉所謂四維復何寄乎謹按諡法名與實爽曰繆怙亂肆行曰醜曾之行已皆與此同宜諡繆醜公時雖不同秀議而聞者懼焉秀性忌讒佞疾之如讐素輕鄙賈充及伐吳之役聞其為大都督謂所親曰充文案小才乃居伐國大任吾將哭以送師或止秀曰蹇叔知秦軍必敗故哭送其子耳今吳君無道國有自亡之形羣率踐境將不戰而潰子之哭也旣為不智乃不赦之罪於是遂止及孫皓降於王濬充未之知方以吳未可平抗表請班師充表與告㨗同至朝野以充位居人上智出人下僉以秀為知言及充薨秀議曰充舍宗族弗授而以異姓為後悖禮溺情以亂大倫昔鄫養外孫莒公子為後春秋書莒人滅鄫聖人豈不知外孫親邪但以義推之則無父子耳又按詔書自非功如太宰始封後如太宰所取必已自出如太宰不得以為比然則以外孫為後自非元功顯德不之得也天子之禮蓋可然乎絶父祖之血食開朝廷之禍門諡法昬亂紀度曰荒請諡荒公不從王濬有平吳之勲而為王渾所譖毁帝雖不從無明賞罰以濬為輔國大將軍天下咸為之怨秀乃上言曰自大晉啓祚輔國之號率以舊恩此為王濬無功之時受九列之顯位立功之後更得寵人之辱號也四海視之孰不失望蜀小吳大平蜀之後二將皆就加三事今濬還而降等天下安得不惑乎吳之未亡也雖以三祖之神武
