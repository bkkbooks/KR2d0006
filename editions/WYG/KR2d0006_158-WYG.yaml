body:
  text: 通志卷一百三十五宋右迪功郎鄭樵漁仲撰列傳第四十八宋顔延之子竣族竣弟測竣兄師伯沈懷文弟懷逺慶從父兄曇周朗劉湛庾悦庾登之子仲逺弟炳之顧琛顧覬之羊欣羊元保子戎希兄子沈演之江夷子湛智弟子深江秉之顔延之字延年琅邪臨沂人也曽祖含晉左光祿大夫祖約零陵太守父顒䕶軍司馬延之少孤貧居負郭室巷甚陋好讀書無所不覽文章之美冠絶當時好飲酒不䕶細行年三十猶未婚妹適東莞劉憲之穆之子也穆之聞其美才將仕之先欲相見延之不往也後為武帝豫章公世子中軍行參軍及武帝北征有宋公之授府遣一使慶殊命一使參迎起居延之與同府王參軍俱奉表至洛陽周視故宫室盡為禾黍悽然詠黍離篇道中作詩二首文辭藻麗為謝晦傅亮所賞武帝受命補太子舎人鴈門周續之隠廬山儒學著稱永初中徴詣都下開館以居之武帝親幸朝彦畢至延之宫官列卑引升上席上使問續之三義續之雅仗辭辯延之每以簡要連挫續之上又使還自敷釋言約理暢莫不稱善再遷太子中舎人時尚書令傅亮自以文義之美一時莫及延之負其才不為之下亮甚疾焉廬陵王義真待之甚厚徐羡之等疑延之為同義意甚不悦少帝即位累遷始安太守領軍將軍謝晦謂延之曰昔荀曰助忌阮咸斥為始平郡今卿又為始安可謂二始黄門郎殷景仁亦謂之曰所謂人惡俊異世疵文雅延之之郡道經汨潭為湘州刺史張邵祭屈原文以致其意其文甚遒麗元嘉三年徐羡之等誅徴為中書侍郎轉太子中庶子領步兵校尉賞遇甚厚延之既以才學見遇當時多相推服唯袁淑年倍小延之不相推重延之忿於衆中折之曰昔陳元方與孔元駿齊年文學元駿拜元方於牀下今君何得不見拜淑無以對延之踈誕不能取容當世見劉湛殷景仁專當要任意有不平常言天下之務當與天下共之豈一人之智所能獨了辭意激揚每犯權要又少經為湛父栁後軍主簿至是謂湛曰吾名器不升當由作卿家吏耳湛深恨焉言於彭城王義康出為永嘉太守延之甚怨憤乃作五君詠以述竹林七賢山濤王戎以貴顯被黜詠嵇康云鸞翮有時鎩龍性誰能馴詠阮籍云物故不可論途窮能無慟詠阮咸云屢薦不入官一麾乃出守詠劉伶云韜精日沈飲誰知非荒宴此四句蓋自序也湛及義康以其辭㫖不遜大怒時延之已拜欲黜為逺郡文帝與義康詔曰宜令思愆里閭猶復不悛當驅往東土乃至難恕者自可随事錄之於是延之屏居里巷不豫人間者七載中書令王球名公之子遺務事外與延之雅相愛好每賑其罄匱晉恭思皇后𦵏應須百官皆取義熙元年除身以延之兼持邑史送札延之醉投札於地曰顔延之未能事生焉能事死文帝常召延之傳詔頻不見常日但酒店裸袒挽歌了不應對他日醉醒乃見帝嘗問以諸子才能延之曰竣得臣筆測得臣文㚟得臣義躍得臣酒何尚之嘲曰誰得卿狂答曰其狂不可及尚之為侍中在直延之以醉詣焉尚之望見便陽眠延之發簾熟視曰朽木難雕尚之謂左右曰此人醉甚可畏閑居無事為庭誥之文以訓子弟劉湛誅後起延之為始興王濬後軍諮議參軍御史中丞在任從容無所舉奏遷國子祭酒司徒左長史何尚之素與延之狎書與王球曰延之有後命教府無復光輝坐啓買人田不肯還直為尚書左丞荀赤松劾奏免官後為祕書監光祿勲太常時沙門釋慧琳以才學為文帝所賞朝廷政事多與之謀遂為士庶所仰上每引見常升獨榻延之甚疾焉因醉白上曰昔同子參乗袁絲正色此三台之坐豈可以刑餘居之上變色延之性既褊激兼有酒過肆意直言曽無回隱故論者多不與之謂之顔彪居身儉約不營財利布衣蔬食獨酌郊野當其為適傍若無人二十九年上表自陳乞解所職随就藥養不許三十年致仕元凶弑立以為光祿大夫長子竣為孝武南中郎諮議參軍及義師入討竣參定宻謀兼造書檄劭召延之示以檄文問曰此筆誰造延之曰竣之筆也又問何以知之延之曰竣筆體臣不容不識劭又曰言辭何至乃爾延之曰竣尚不顧老臣何能為陛下劭意乃釋由是得免孝武登阼以為金紫光祿大夫領湘東王師嘗與何偃同從上南郊偃於路中遥呼延之曰顔公延之以其輕脱怪之答曰身非三公之公又非田舎之公又非君家阿公何以見呼為公偃羞而退竣既貴重權傾一朝凡所資供延之一無所受器服不改宅宇如舊嘗乗羸牛車逢竣鹵簿即屏住道側又好騎馬遨逰里巷遇知舊輙踞鞍索酒得必傾盡欣然自得嘗語竣曰平生不喜見要人今不幸見汝見竣起宅謂曰善為之無令後人笑汝拙也表解師職加給親信二十人嘗早候竣遇賔客盈門竣方卧不起延之怒曰恭敬撙節福之基也驕佷傲慢禍之始也况出糞土之中而升雲霞之上傲不可長其能久乎延之有愛姬非姬食不飽寢不安姬憑寵嘗盪延之墜牀致損竣殺之延之痛惜甚至常坐靈牀上哭曰貴人殺汝非我殺汝以冬日臨哭忽見妾排屏風以壓延之延之懼墜地因病孝建三年卒時年七十三贈特進諡曰憲子延之與陳郡謝靈運俱以辭采齊名而遲速縣絶文帝嘗各勅擬樂府北上篇延之受詔便成靈運久之乃就延之嘗問鮑昭已與靈運孰優劣昭曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡亦雕鏤滿眼延之每薄湯惠休詩謂人曰惠休制作如委巷中歌謡耳方當誤後生事是時議者以延之靈運自潘岳陸機之後文士莫及江右稱潘陸江左稱顔謝焉竣字士遜延之長子也早有文義為孝武帝撫軍主簿甚被嘉遇竣亦盡心補益時上不欲諸王各立朋黨將召竣補尚書郎江湛以為竣在府有美稱不宜回改乃止随府轉安北領軍北中郎將主簿元嘉二十八年魏太武自彭城北歸復求互市竣議以互市之利在於得馬今棄此所重得彼下駟千匹以上尚不足信况所得裁十百邪雖云互市實覘國情必生邊釁初沙門釋僧含精有學義謂竣曰貧道見䜟記當有真人應符名稱次第屬在殿下後竣在彭城嘗於親人叙之言遂宣布聞於文帝時元凶巫蠱事已發故上不加推案孝武鎮尋陽遷南中郎記室三十年春以父延之致仕固求解職賜假未發而文帝崩問至孝武舉兵入討轉諮議參軍領軍錄事任總内外并造檄書孝武發尋陽便有疾自沈慶之以下並不堪相見唯竣出入卧内斷決軍機時孝武屢經危篤不任諮禀凡厥衆務竣皆專斷施行孝武踐阼以為侍中左衞將軍封建成縣侯孝建元年轉吏部尚書領驍騎將軍留心選舉自彊不息任遇既隆奏無不可其後謝莊代竣領選意多不行竣容貌嚴毅莊風姿甚美賔客喧訴常懽笑答之時人為之語曰顔竣瞋而與人官謝莊笑而不與人官南郡王義宣臧質等反以竣兼領右軍將軍義宣質諸子藏匿建康秣陵湖熟江陵縣界孝武大怒免丹陽尹褚湛之官収四縣官長以竣為丹陽尹加散騎常侍先是竣未有子而大司馬江夏王義恭諸王並為元凶所殺至是各産男上自為制名名義恭子為伯禽以比魯周公旦之子也名竣子為辟彊比漢侍中張良之子也先是元嘉中鑄四銖錢輪郭形制與五銖同用費無利故百姓不盜鑄及孝武即位又鑄孝建四銖所鑄錢形式薄小輪郭不成於是人間盜鑄者雜以鉛錫並不牢固又翦鑿古錢以取其銅錢轉薄小稍違官式雖重制嚴刑人吏官長坐死免者相繫而盜鑄彌甚百物踊貴人患苦之乃立品格薄小無輪郭者悉加禁斷始興公沈慶之議宜聴人鑄錢置署樂鑄之家皆居署内去春所禁新品一時施用今鑄悉依此格萬稅三千嚴檢盜鑄并禁翦鑿數年之間公私豐贍銅盡事息姦偽自止禁鑄則銅轉成器開鑄則器化為財上下其事於公卿竣議曰今云開署放鑄誠所欲同但慮采山事絶器用日耗銅既轉少器亦彌貴設器直一千則鑄之減半為之無利雖令不行時議者又以銅難得欲鑄二銖錢竣又議曰今鑄二銖恣行新細於官無解於乏而人大興天下之貨將糜碎至盡空曰嚴禁而利深難絶不過一二年間其弊不可復救此其甚不可一也使姦人意騁而貽厥愆謀此又甚不可二也富商得志貧人困窘此又甚不可三也若使交益深重尚不可行况又未見利而衆弊如此失算當時取誚百代乎前廢帝即位鑄二銖形式轉細官錢每出人間即模效之而大小厚薄皆不及也無輪郭不磨鑢如今之翦鑿者謂之耒子錢景和元年沈慶之啓通私鑄由是錢貨亂敗一千錢長不盈三寸大小稱此謂之鵞眼錢劣於此者謂之綖環錢貫之以縷入水不沈随手破碎市井不復料數十萬錢不盈一掬斗米一萬商貨不行明帝初唯禁鵞眼綖環其他錢皆通用復禁人鑄官署亦廢尋復普斷唯用古錢竣自散騎常侍丹陽尹加中書令表讓中書令見許時嵗旱人饑竣上言禁糃一月息米近萬斛復代謝莊為吏部尚書領太子右衞率未拜丁父憂裁踰月起為右將軍丹陽尹如故竣固辭表十上不許遣中書舎人戴明寳抱竣登車載之郡舎賜以布衣一襲絮以綵綸遣主衣就衣諸體竣藉藩朝之舊臣每極陳得失上自即吉之後宫内頗有醜論又多所興造竣諫爭懇切並無所回避上意甚不悦多不見從竣自謂才足幹時恩舊莫比當務居中永執朝政而所陳多不被納疑上欲疎之乃求出以卜時㫖大明元年以為東揚州刺史所求既許便憂懼無計至州又丁母艱不許去職聴送䘮還都恩待猶厚竣彌不自安每對親故頗懐怨憤又言朝廷違謬人主得失及王僧達被誅謂為所䜛構臨死陳竣前後忿懟恨言不見從僧達所言頗相符㑹上乃使御史中丞庾徽之奏竣窺覘國柄潛圖久執受任選曹驅扇滋甚出尹京輦形勢彌放傳詔犯憲舊須啓聞而竣以通訴忤已輙加鞭辱罔顧威靈莫此為甚懐挟姦數包藏隠匿豫聞中㫖罔不宣露罰則委上善必歸己脅懼上宰激動閭閻未懼上聞内懐猜懼偽請東牧以卜天㫖既獲出藩怨詈方肆反脣腹腓方之已輕前冬母亡詔賜還𦵏事畢不去盤桓經時方構間勲貴造立同異遂以已被斥外國道將顛兼行闕於家早負世議天倫怨毒親交震駭街談道説非復風聲宜加顯戮以昭盛化請以見事免竣所居官下太常削爵土上未欲便加大戮且止免官竣頻啓謝罪并乞性命上愈怒詔答曰憲司所奏非宿昔所以相期卿受榮遇政當極此訕訐怨憤己孤本望乃復過煩思慮懼不全亡豈為下事上誠節之至邪及竟陵王誕為逆因此陷之言通於誕召御史中丞庾徽之於前立奏奏成詔先打折足然後於獄賜死妻息宥之以逺子辟彊徙交州又於宫亭湖沈殺之竣文集行於世竣弟測亦以文章見知官至江夏王義恭大司馬錄事參軍以兄貴為憂先竣卒明帝即位詔曰延之昔師訓朕躬情契兼重前記室參軍濟陽太守㚟伏事藩朝綢繆恩舊可擢為中書侍郎㚟延之第三子也竣族兄師伯字長深父邵剛正有局力為謝晦後軍司馬晦鎮江陵請為諮議參軍領錄事軍府之務悉委焉邵慮晦有禍求為竟陵太守未及之郡㑹晦見討邵飲藥死師伯少孤貧涉獵書傳頗解聲樂弟師仲妻臧質女也質為徐州辟師伯為主簿孝武為徐州師伯仍為輔國安北行參軍王景文時為諮議參軍愛其諧敏進之孝武以為徐州主簿善於附㑹大被知遇及去鎮師伯以主簿送故孝武鎮尋陽啓文帝請為南中郎府主簿文帝不許謂典籖曰中郎府主簿那得用顔師伯孝武啓為長流正佐帝又曰朝廷不能除之卿可自版然亦不宜署長流乃版為參軍刑獄及討元凶轉主簿孝武踐阼以為黄門侍郎累遷侍中大明元年封平都縣子親幸隆宻羣臣莫二多納貨賄家累千金孝武嘗與師伯摴蒱帝擲得雉大悦謂必勝師伯後得盧帝失色師伯遽歛子曰㡬作盧爾日師伯一輸百萬仍遷吏部尚書右軍將軍上不欲威權在下前後領選者唯奉行文書師伯專精獨斷奏無不可七年為尚書右僕射時分置二選陳郡謝莊琅邪王曇生並為吏部尚書師伯子舉周旋寒人張竒為公車令上以竒資品不當使兼市買丞以蔡道惠代之令史潘道栖譖道惠顔禕之元從夫任澹之石道兒黄難周公選等抑道惠勅使竒先到公車不施行竒兼市買丞事師伯坐以子預職與莊曇生免官道栖道惠棄市禕之等六人鞭杖一百師伯尋領太子中庶子雖被黜挫受任如初孝武臨崩師伯受遺詔輔幼主尚書侍中事悉以委之廢帝即位復還即真加領衞尉師伯居權日久天下輻湊㳺其門者爵位莫不踰分多納貨賄家産豐積妓妾聲樂盡天下之選園池第宅冠絶當時驕奢淫恣為衣冠所疾又遷尚書僕射領丹陽尹廢帝欲親朝政轉師伯為左僕射以吏部尚書王景文為右僕射奪其京尹又分臺任師伯至是始懼與栁元景謀廢立初師伯專斷朝事不與沈慶之參懐謂令史曰沈公爪牙者耳安得預政事慶之聞而切齒乃泄其謀尋與太宰江夏王義恭同誅六子皆見殺明帝即位諡曰荒沈懷文字思明吳興武康人也祖寂晉光祿勲父宣新安太守懷文少好元理善為文章為楚昭王二妃詩見稱於世為江夏王義恭東閣祭酒丁父憂新安郡送故豐厚奉終禮畢餘悉班之親戚一無所留文帝聞而嘉之賜奴婢六人服闋除尚書殿中郎隠士雷次宗被徴居鍾山後南還廬江何尚之為設祖道文義之士畢集為聯句詩懐文所作尤美辭髙一坐随王誕鎮襄陽出為後軍主簿與諮議參軍謝莊共掌辭令領義成太守元嘉二十八年誕當為廣州欲以懐文為安南府記室先除通直郎懐文固辭南行上不悦弟懐逺納東陽公主養女王鸚鵡為妾元凶行巫蠱事鸚鵡豫之事洩懐文因此失調為治書侍御史元凶弑立以為中書侍郎孝武入討呼之使作符檄固辭劭大怒㑹殷冲救得免託疾落馬間行奔新亭孝武踐阼以為竟陵王誕驃騎錄事參軍淮陵太守時國哀未釋誕欲起内齋懐文以為不可乃止尋轉揚州中從事史時議省錄尚書懐文以為非宜上議不從遷别駕從事史及江夏王義恭遷西陽王子尚為揚州居職如故時孝武帝以熒惑守南斗欲廢西州舊館使子尚移居東城以厭之懐文曰天道示變宜應之以徳今雖空西州恐無益也不從西州竟廢大明二年遷尚書吏部郎時朝議欲依古制置立王畿揚州移居㑹稽猶以星變故也懐文曰周制封畿漢置司𨽻各因時宜非在相反安人定國其揆一也茍人心所安天亦從之必改今追古乃致平一神州舊壤歴代相承異於邊州或置或罷既物情不悦容虧化本又不從三年子尚移鎮㑹稽遷撫軍長史行府事時囚繫甚多動經年月懐文到任訊五郡九百三十六獄衆咸稱平入為侍中寵待隆宻竟陵王誕據廣陵反及城陷士庶皆裸身鞭面然後加刑聚所殺人首於石頭南岸謂之髑髏山懐文陳其不可上不納孝武嘗有事圜丘未至期而雨晦竟夜明旦風霽雲色甚美帝升壇大悦懐文稱慶曰昔漢后郊祀太一白日重輪神光四燭今陛下有事茲禮而膏雨迎夜清景麗朝斯實聖明幽感所致臣願與侍臣賦之上笑而稱善揚州移㑹稽分浙江東人情不和上欲貶其勞祿唯西州不改懐文曰揚州徙居既乖人情一州兩格尤失大體懐文與顔竣周朗素善竣以失㫖見誅朗亦以忤意得罪上謂懐文曰竣若知我殺之亦當不敢如此懐文嘿然又嘗以嵗夕與謝莊王景文顔師伯被勅入省未及進景文因言談次稱竣朗人才之美懐文與相酬和師伯後因語次白上叙景文等此言懐文屢經忤㫖至此上倍不悦上又壊諸郡士族以充將吏並不服役至悉逃亡加以嚴制不能禁乃改用軍法得便斬之莫不奔竄山湖聚為盜賊懐文又以為言齋庫上絹年調鉅萬匹綿亦稱此限期嚴峻人間買絹一疋至二三千綿一兩三四百貧人賣妻子甚者或自縊死懐文又具陳人困由是綿絹薄有所減俄復依舊子尚等諸皇子皆置邸舎逐什一之利為患徧天下懐文又曰列肆販賣古人所非卜式明不雨之由桑𢎞羊受致旱之責若以用度不充故宜量加減省不聴孝建以來抑黜諸弟廣陵平後復欲更峻其科懐文曰漢明不使其子比光武之子前史以為美談陛下既明管蔡之誅願從唐衞之寄及海陵王休茂等誅欲遂前議太宰江夏王義恭探得宻㫖先發議端懐文固請不可由是得息時㳺幸無度太后六宫常乗副車在後懐文與王景文每諫以不宜亟出後因從坐松樹下風雨甚驟景文曰卿可以言矣懐文曰獨言無繼宜相與陳之江智深卧草側亦謂之善俄而被召俱入雉場懐文曰風雨如此非聖躬所宜景文又曰懐文所啓宜從智深未及有言上方注弩作色曰卿欲效顔竣邪何以常知人事又曰顔竣小子恨不得先鞭其面上每宴集在坐者咸令沈醉懐文素不飲酒又不好戲上謂其故欲異己謝莊嘗戒之曰卿每與人異亦何可久懐文曰吾少來如此豈可一朝而變非欲異物性之所不能耳五年出為晉安王子勛征虜長史廣陵太守明年坐朝正事畢被遣還北以女病求申臨辭又乞停三日停訖猶不去為有司所糾免官禁錮十年既被免賣宅欲還東上大怒収付廷尉賜死弟懐逺為始興王濬征北長流參軍深見親待坐納王鸚鵡為妾孝武徙之廣州刺史宗慤欲殺之㑹南郡王義宣反懐逺頗閑文筆慤起義使造檄書并銜命至始興與始興相沈法系論起義事事平慤具為陳請由此見原然終孝武世不得還前廢帝世歸位武康令撰南越志及懐文文集並𫝊於世懐文三子淡深冲冲列在齊史懐文從父兄曇慶父發員外散騎侍郎曇慶仕宋位尚書左丞時嵗有水旱曇慶議立常平倉以救人急文帝納其言而事不行大明元年為徐州刺史時殿中員外將軍裴景仁助戍彭城景仁本北人多悉關中事曇慶使撰秦中記十卷叙苻氏事其書𫝊於世曇慶謹實清正所莅有稱績常謂子弟曰吾處世無材能圖作大老子耳世以長者稱之卒於祠部尚書周朗字義和汝南安成人也父淳宋初歴位侍中太常兄嶠尚武帝第四女宣城徳公主二女適建平王宏廬江王禕以貴戚顯官朗少而愛竒雅有風氣與嶠志趨不同嶠甚疾之為江夏王義恭太尉參軍元嘉二十七年春朝議北侵魏當遣義恭出鎮彭城為諸軍大統朗聞之解職及義恭出鎮府主簿羊希從行與朗書戲之勸令獻竒進策朗報書援引古義辭意倜儻孝武即位除建平王宏中軍錄事參軍時普責百官讜言朗上書陳述得失多所矜誇書奏忤㫖自解去職後為廬陵内史郡界荒蕪頗有野獸母薛氏欲見獵朗乃合圍縱火令母觀之火逸燒郡解朗悉以秩米起屋償所燒之限稱疾去官為州司所糾還都謝孝武曰州司舉臣愆失多不允臣在郡猛獸三食人蟲䑕犯稼以此二事上負陛下上變色曰州司不允或可有之蟲獸之災寧關卿小物朗尋丁母憂每哭必慟其餘頗不依居䘮常節大明四年上使有司奏其居䘮無禮詔曰朗悖禮利口宜合翦戮微物不足亂典刑特鎖付邊郡於是𫝊送寧州於道殺之朗族孫顒齊史有𫝊劉湛字𢎞仁南陽湼陽人也祖躭父栁並晉左光祿大夫開府儀同三司湛出繼伯父淡襲封安衆縣五等男少有勇力不尚浮華博涉史𫝊前諸代舊典弱年便有宰物情常自比管夷吾諸葛亮不為文章不喜談議本州辟主簿不就除著作佐郎皆不拜武帝請為太尉行參軍賞遇甚厚父栁亡於江州府州送故甚豐一無所受時論稱之服闋為相國參軍謝晦王𢎞並稱其器幹武帝入受晉命以第四子義康為冠軍將軍豫州刺史留鎮夀陽以湛為長史梁郡太守義康弱年未親政府州事悉委湛進號右將軍仍随府轉義康以本號徙南豫州湛改領歴陽太守湛為人剛嚴姦吏犯贓百錢以上並殺之自下莫不震肅廬陵王義真出為車騎將軍南豫州刺史湛又為長史太守如故義真時居武帝憂使帳下備膳湛禁之義真乃使左右人買魚肉珍羞於齋内别立厨帳㑹湛入因命臑酒炙車螯湛正色曰公當今不宜有此設義真曰旦甚寒一盌酒亦何傷長史事同一家望不為異酒既至湛起曰既不能以禮自處又不能以禮處人後為廣州刺史以嫡母憂去職服闋為侍中時王華王曇首殷景仁亦為侍中文帝於合殿與四人宴飲甚悦華等出帝目送良久歎曰此四賢一時之秀同管喉脣恐後世難繼及撫軍將軍江夏王義恭鎮江陵以湛為使持節南蠻校尉領撫軍長史行府州事時王𢎞輔政而王華王曇首任事居中湛自謂才能不復下之不欲外出是行也謂為𢎞等所斥意甚不平常曰二王若非代邸之舊無以至此可謂遭遇風雲湛負其志氣常慕汲黯崔琰為人故名長子曰黯字長孺第二子曰琰字季珪母於江陵病卒湛求自送䘮還都義恭亦為之請文帝答義恭曰吾亦得湛啓事為之酸鼻乃不欲茍違所請但汝弱年新涉軍務八州殷曠專斷事重疇咨委仗不可不得其人量算二三未獲便相順許今答湛啓權停彼𦵏頃朝臣零落相繼寄懐轉寡湛實國器吾乃欲引其令還直以西夏任要且停此事耳汝慶賞黜罰預得失者必宜悉相委寄義恭性甚狷隘年又漸大欲專政事每為湛所裁主佐之間嫌隙遂構文帝聞之宻遣詰讓義恭義恭陳湛無居下之禮又自以年長未得行意雖奉詔㫖每出怨言上友于素篤欲加酬順乃詔之曰當今乏才委授已爾宜盡相彌縫取其可取棄其可棄先是王華既亡曇首又卒領軍將軍殷景仁以時賢零落白文帝召湛八年徴為太子詹事加給事中與景仁並被任遇湛常云今世宰相何難此政可當我南陽郡漢世功曹耳明年景仁轉尚書僕射領選䕶軍將軍湛代為領軍將軍十二年又領詹事湛與景仁情素欵洽又以其建議徴之甚相感悦及俱被時遇猜隙遂生以景仁專管内任謂為間已時彭城王義康專秉朝權而湛昔為上佐遂以舊情委心自結欲因宰相之力以回主心傾黜景仁獨當時務義康屢言之於帝其事不行義康官屬及湛諸附𨽻潛相約勒無敢歴殷氏門者湛黨劉敬文父成未悟其機詣景仁求郡敬文遽往謝湛曰老父悖耄遂就殷鐵干祿由敬文闇淺上負生成合門慙懼無地自處敬文之姦諂如此義康擅埶專朝威傾内外湛愈推崇之無復人臣之禮上稍不能平湛初入朝委任甚重日夕引接恩禮綢繆善論治道并諸前世故事叙致銓理聴者忘疲每入雲龍門御者便解駕左右及羽儀随意分散不夕不出以此為常及至晚節驅扇義康陵轢朝廷上意雖内離而接遇不改上嘗謂所親曰劉斑初自西還吾與語常看日早晚慮其當去比入吾亦看日早晚慮其不去湛小字斑虎故云斑也遷丹陽尹金紫光祿大夫詹事如故十七年所生母亡時上與義康形迹既乖釁難將結湛亦知無復全地及至丁艱謂所親曰今年必敗常日賴口舌爭之故得推遷耳今既窮毒無復此望禍至其能久乎伏甲於室以待上臨弔謀泄上竟弗之幸後十日詔収付廷尉誅之時年四十九子黯等從誅弟素黄門郎徙廣州湛初被収歎曰便是亂邪又曰不言無我應亂殺我日自是亂法耳入獄見素曰乃復及汝邪相勸為惡惡不可為相勸為善正見今日如何湛生女輙殺之為時流所怪庾悦字仲豫潁川􅋣陵人也曽祖亮晉太傅祖義吳國内史父淮西中郎將豫州刺史悦仕晉為司徒右長史桓元簒位為中書侍郎武帝平建鄴累遷中軍司馬從征廣固極其誠力盧循逼京師以悦督江豫司三州之六郡軍事建威將軍江州刺史悦敗循兵於五畝橋進據豫章斷循糧援初劉毅家在京口貧約過甚嘗與鄉曲士大夫往東堂共射悦時為司徒右長史暫至京口要府州僚佐共出東堂毅已先至遣與悦相聞求以東堂見讓悦不答語在劉毅傳中盧循平後毅求都督江州以江州内地不宜置軍府遂表陳之於是解悦都督將軍官以刺史移鎮豫章以親將趙恢領千兵守尋陽建威府文武三千人悉入毅府深相挫辱悦不得志疽發背到豫章少日卒庾登之字元龍悦族弟也曽祖冰晉司空祖藴廣州刺史父廓東陽太守登之少以彊濟自立初為武帝鎮軍參軍豫討桓元功封曲江縣五等男累遷新安太守謝晦為荆州刺史請為長史南郡太守仍為衞軍長史登之與晦俱曹氏壻名位本同一旦為之佐意甚不愜到㕔牋唯言即日恭到初無感謝之言每入覲見備持箱囊几席之屬一物不具則不肯坐嘗於晦坐誦西征賦云生有脩短之命位有通塞之遇晦雖恨而常優答之晦拒王師欲令登之留守登之不許晦敗登之以無任免官禁錮還家何承天戲之曰因禍為福未必可知登之曰我亦㡬與三豎同滅承天為晦作表云當舟東下戮此三豎故登之以為嘲後為司徒長史南東海太守府公彭城王義康専覽政事不欲自下厝意而登之性剛每陳己志義康不悦出為吳郡太守以贓貨免官後拜豫章太守徴為中䕶軍未拜卒子仲逺初為明帝府佐廢帝景和中疑防明帝賔客故人無到門者唯仲逺朝謁不替明帝即位謂曰卿所謂疾風知勁草自軍錄事參軍擢拜太子中庶子卒於豫章太守贈侍中登之弟炳之字仲文位廣平太守登之為謝晦長史炳之往省之時晦權重朝士並加敬重炳之獨與晦抗禮後為彭城王義康驃騎主簿未就徙為丹陽郡丞炳之既未到府疑於府公禮敬遂下禮官博士議之中書侍郎裴松之議曰案春秋桓公八年祭公逆王后于紀公羊傳曰女在國稱女此其稱王后何王者無外其辭成矣推此而言則炳之為吏之道定於受勅之日矣名器既正則禮亦從之安可未到廢其節乎宜執吏禮從之後始興王濬當鎮湘州以炳之為司馬濬不之任仍除南梁太守司馬如故於時領軍劉湛協附大將軍彭城王義康而與僕射殷景仁有隙凡朝士㳺殷氏者不得入劉氏之門獨炳之㳺二人間宻盡忠於朝廷景仁稱疾不朝見者歴年文帝嘗令炳之銜命去來湛不疑也義康劉湛伏誅以炳之為尚書吏部郎與右衞將軍沈演之俱參機宻歴侍中吏部尚書領義陽王師内外歸附埶傾朝野炳之為人彊急不耐煩賔客訴非理者忿罵形於辭色素無學術不為衆望所推性好潔士大夫造之者未出户輙令人拭席洗牀時陳郡殷沖亦好淨小史非淨浴新衣不得近左右士大夫小不整潔每容接之時炳之好潔反是每以此見譏領選既不輯衆論又頗通貨賄用少府卿劉道錫為廣州刺史道錫至鎮餉白檀牽車常自乗焉或以白文帝帝見問曰道錫餉卿小車装飾甚麗有之乎炳之懼起謝又炳之請急還家吏部令史錢泰主客令史周伯齊出炳之宅諮事泰能彈琵琶伯齊善歌炳之因留停宿尚書制令史諮事不得宿停外雖八座命亦不許為有司所奏上於炳之素厚將恕之召問尚書右僕射何尚之尚之具陳炳之得失奏言炳之事如邱山若縱而不糾何以為政晉武不為明主斷鬲令史遂能奮發華廙見待不輕廢痼累年後起政作城門校尉耳若言炳之有誠於國未知的是何事政當與殷景仁不失其舊與劉湛亦復不踈且景仁當時意事豈復可蔑縱有微誠復何足掩其惡邪賈充勲烈晉之重臣雖事業不稱不聞有大罪諸臣進説便即逺出陛下聖叡反更遲遲於此炳之身上之釁既自過於范曄所少作賊一事耳伏願深加三思試以諸聲傳普訪諸可顧問者羣下見陛下顧遇既重恐不敢苦侵傷顧問之日宜布嫌責之㫖若不如此亦當不辨有所得失時炳之自理不諳臺制令史並言停外非嫌帝以小事不足傷大臣尚之又陳令史具向炳之説不得停之意炳之了不聴納非為不解直是茍相留耳雖是令史出乃逺虧朝典又不得謂之小事謝晦望實非今者之疇一事錯誤免侍中官王珣時賢小失桓允春蒐之謬皆白衣領職况公犯憲制邪孔萬祀居左局言炳之貴要異他尚書令又云不癡不聾不成姑公敢作此言亦為異也文帝猶優游使尚之更陳其意尚之備言炳之愆曰臣畏張遼之言關侯雖兄弟曹公父子豈得不言觀今人臣憂國甚寡臣復結舌日月之明或有所蔽然不知臣者豈不謂臣有爭競之心亦追以悵悵臣與炳之周旋俱被恩接不宜復生厚薄太尉昨與臣言説炳之有諸不可非唯一條逺近相崇畏震動四海炳之先與劉徳願殊惡徳願自持琵琶甚精麗遺之便復欵然市令盛馥進數百口材助營宅恐人知作虚買券劉道錫驟有所輸傾南奉之半劉雍自謂其力助事之如父夏中送甘蔗若新發於州國吏運樵蘇無輟於道諸見人有物鮮或不求聞劉遵考有材便乞材見好燭槃便復乞之選用不平不可一二太尉又言炳之都無共事之體凡所選舉悉是其意政令太尉知耳論虞秀黄門太尉不正答和故得停太尉近與炳之疏欲用徳願兒作州西曹炳之乃啓用為主簿即語徳願以謝太尉前後漏泄賣恩亦復何極今縱不罪故宜出之自從裴劉刑罰以來諸將陳力百倍今日事實好惡可問若赫然發憤顯明法憲陛下便可閑卧紫闥無復一事也帝欲出炳之為丹陽尹又以問尚之尚之答言炳之陷罪負恩陛下遲遲舊恩未忍窮法方復有京尹赫赫之授恐悉心奉國之人於此而息貪狠恣意嵗月滋甚如臣所聞天下議論炳之恒塵累日月未見一毫増輝乃更成形勢是老王雅也古人言無賞罰雖堯舜不能為政陛下豈可坐損皇家之重迷一凡人令賈誼劉向更生豈不慷慨流涕於聖世邪臣昔啓范曄當時亦懼犯觸之尤茍是愚懐所挹政自不能不舒達所謂雖九死而不悔也臣謂炳之且宜外出若能修改在職著稱還亦不難而得少明國典粗酬四海之誚今愆釁如山榮任不損炳之若復有彰大之罪誰敢以聞亦知陛下不能採臣之言故是臣不能以己之意耳又曰臣見劉伯龍大慷慨炳之所行言有人送張幼緒幼緒語人曰吾雖得一縣負錢三十萬庾仲逺仍嘗送至新林見縛束猶未得解手荀萬秋嘗詣炳之逢一客姓夏侯主人問有好牛不言無問有好馬不又言無政有佳驢耳炳之便答甚是所欲客出門遂相聞索之劉道錫言為炳之所舉就道錫索嫁女具及銅器乃當百萬數猶謂不然選令史韋龍向臣説亦歎其受納之過言實得嫁女銅鑪四人舉乃勝細葛斗帳等物不可勝數在尚書中令奴酤酃酒利其百十亦是立臺閣以來所無不審少簡聖聴不帝乃可有司之奏免炳之官卒於家帝錄其宿誠追贈本官子𢎞逺事在齊史陳顯達傳中顧琛字𢎞偉吳郡吳人晉司空和之曽孫也祖履之父惔並為司徒左西曹掾琛謹確不尚浮華起家州從事駙馬都尉累遷尚書庫部郎元嘉七年文帝遣到彦之經畧河南大敗悉委棄兵甲武庫為之空虚文帝宴㑹有歸化人在座上問琛庫中仗猶有㡬許琛詭辭答有千萬人仗舊庫仗祕不言多少上既發問追悔失言及琛詭對上甚善之尚書侍門有制八座以下門生随入者各有差不得雜以人士琛以宗人顧碩寄尚書張茂度門名而與顧碩同席坐明年坐譴出免中正凡尚書官大罪則免小罪譴出譴出者百日無代人聴還本職琛仍為彭城王義康所請再補司徒錄事參軍十五年出為義興太守初義康請琛入府欲委以心腹琛不能承事劉湛故尋見斥外十九年徙東陽太守欲使琛防守彭城王義康固辭忤㫖廢黜還家積年及元凶弑立分㑹稽五郡置州以随王誕為刺史即以琛為㑹稽太守誕起義加冠軍將軍事平遷吳興太守孝建元年為吳郡太守以起義功封永新縣五等侯大明元年吳縣令張闓坐居母䘮無禮下廷尉錢塘令沈文秀判劾違謬應坐被彈琛宣言於衆闓被劾之始屢相申明又云當啓文秀留縣孝武聞之大怒謂琛賣惡歸上免官琛母老仍停家琛及前西陽太守張牧並事司空竟陵王誕誕反遣客陸延稔齎書版琛及子弟官時孝武以琛素結事誕恐有異志遣信就吳郡太守王曇生誅琛父子㑹延稔先至琛等即執斬之遣二子送延稔首啓聞孝武所遣誅琛使其日亦至而獲免琛母孔氏時年百嵗餘晉安帝隆安初琅邪王廞於吳中作亂以為貞烈將軍悉以女人為官屬以孔氏為司馬及孫恩亂後東土饑荒人相食孔氏散家糧以賑邑里得活者甚衆生子皆以孔為名焉琛仍為吳興太守明年坐郡人多翦錢及盜鑄免官歴位都官尚書廢帝即位為吳郡太守初琛景平中為朝請假還東日晚至方山於時商旅數十船悉泊岸側有一人元衣介幘執鞭屏諸船云顧吳郡部伍尋至應泊此岸於是諸船各東西俄有一假装至事力甚寡仍泊向處人問顧吳郡早晚至船人答無顧吳郡又問何船曰顧朝請耳莫不驚怪琛意竊知為善徴因誓之曰若得郡當於此立廟至是果為吳郡乃立廟方山號白馬廟云明帝泰始初與四方同反兵敗奉母奔㑹稽臺軍既至歸降後為員外常侍中散大夫卒次子寳先大明中為尚書水部郎先是琛為尚書左丞荀萬秋所劾及寳先為郎萬秋猶在職自陳不拜孝武詔曰勅違糾慢憲司之職若有不公自當更有釐改而自頃劾無輕重輙致私絶此風難長主者嚴為其科先是宋世江東貴達㑹稽孔季恭子靈符吳興邱深之及琛吳音不變深之字思元吳郡烏程人位侍中都官尚書卒於太常顧覬之字偉仁吳郡吳人也髙祖謙字公讓晉平原内史陸機姊夫祖崇大司農父黄老司徒左西曹掾覬之為謝晦衞軍參軍晦愛其雅素深相知待歴位尚書都官郎殷劉隙著覬之不欲與殷景仁久接乃辭脚疾免歸每夜常於牀上行脚家人竊異之而莫曉其意及義康徙廢朝士多受禍覬之竟免後為山隂令山隂劇邑民户三萬前後官長晝夜不得休事猶不舉覬之御繁以約縣用無事晝日垂簾門階閑寂自宋世為山隂務簡而事理莫能尚也後為尚書吏部郎嘗於文帝坐論江東人物言及顧榮袁淑謂覬之曰卿南人怯懦豈辦作賊覬之正色曰卿乃復以忠義笑人淑有愧色孝建中為湘州刺史以政績稱大明元年徴守度支尚書轉吏部尚書時沛郡相縣唐賜往北村彭家飲酒還因得病吐蠱二十餘物語妻張氏以死後刳腹出病張如其言自剖視五臟悉縻碎郡縣以張忍行刳剖賜子副又不禁止時事起赦前法不能決律傷死人四嵗刑妻傷夫五嵗刑子不孝父母棄市並非科例三公郎劉思議賜妻痛往遵言兒識謝及理考事原心非存忍害謂宜哀矜覬之議曰法移路尸猶為不宜况在妻子而行忍酷不宜曲通小情當以大理為斷謂副為不孝張同不道詔如覬之議後為吳興太守幸臣戴法興權傾人主而覬之未嘗低意左光祿大夫蔡興宗與覬之善嫌其風節過峻覬之曰辛毗有云孫劉不過使吾不為三公耳孝武晏駕法興死覬之為光祿大夫泰始初四方同叛覬之在家尋陽王子房加以位號覬之不受曰禮年六十不服戎以其筋力衰謝非復軍旅之日况年將八十殘生無㡬守盡家門不敢聞命明帝甚嘉之東土既平以為左將軍吳郡太守遷湘州刺史卒諡曰簡子覬之家門雍穆為州郡所重五子約緝綽縝緄而綽私財甚豐鄉里士庶多負其債覬之每禁之不止及覬之為吳郡誘綽曰民間與汝交關有㡬許不盡及我在郡為汝督之將來豈可復得也凡諸券書皆何在綽大喜悉出諸文券一大厨覬之悉焚之宣語逺近負三郎債皆不須還凡券書悉已燒之矣綽懊歎彌日覬之常執命有定分非智力所移惟應恭己守道信天任運而闇者不達妄意僥倖徒虧雅道無關得䘮乃以其意命弟子愿著定命論愿字子恭父深之散騎侍郎愿好學有文辭卒於太子舎人覬之孫憲之列在齊史羊欣字敬元泰山南城人也曽祖忱晉徐州刺史祖權黄門郎父不疑桂陽太守欣少靖黙無競於人美言笑善容止泛覽經籍尤善𨽻書父不疑為烏程令欣年十二時王獻之為吳興太守甚知愛之獻之嘗夏月入縣欣著新絹裠晝寢獻之書裠數幅而去欣書本工因此彌善起家輔國參軍府解還家隆安中朝廷漸亂欣優㳺私門不復進仕㑹稽王世子元顯每使欣書扇常不奉命元顯怒乃以為其後軍府舎人此職本用寒人欣意貌恬然不以髙卑見色論者稱焉嘗詣領軍謝混混拂席改服然後見之時混族子靈運在坐退告族兄瞻曰望蔡見羊欣遂易衣改席欣由此益知名桓元輔政以欣為平西主簿參豫機要欣欲自疎時漏宻事元覺其此意愈更重之以為楚臺殿中郎謂曰尚書政事之本殿中禮樂所出卿昔處股肱方此為輕也欣就職少日稱病自免屏居里巷十餘年不出義熙中弟徽被遇於武帝帝謂諮議參軍鄭鮮之曰羊徽一時美器世論猶在兄後恨不識之即版欣為右將軍劉藩司馬累遷新安太守在郡四年簡惠著稱除臨川王義慶輔國長史廬陵王義真車騎諮議參軍並不就文帝重以為新安太守在郡十三年㳺翫山水甚得性適嘗謂子弟曰人生仕宦至二千石斯可矣及是便懐止足轉義興太守非其好也頃之稱病篤自免歸除中散大夫素好黄老常手自書章有病不服藥飲符水而已兼善醫術撰藥方數十卷欣以不堪拜伏辭不朝覲自非尋省近親不妄行詣行必由城外未嘗入六門武帝文帝並恨不識之元嘉十九年卒弟徽字敬猷時譽多欣位河東太守卒羊元保太山南城人也祖揩晉尚書都官郎父綏中書侍郎元保初為武帝鎮軍參軍少帝景平中累遷司徒右長史府公王𢎞甚知重之謂左長史庾登之吏部尚書王准之曰卿二賢明美爽詣㑹悟多通然𢎞懿之望故當共推羊也頃之入為黄門侍郎善奕碁品第三文帝亦好奕與賭郡元保戲勝以補宣城太守先是劉式之為宣城立吏人亡叛制一人不禽符伍里吏送州作部能禽者賞位二階元保以為非宜陳之曰臣伏尋亡叛之由皆出於窮逼今立殊制於事為苦又尋此制止施之一邦而已若其是邪則應與天下為一若其非邪亦不宜獨行於一郡由是此制得遂停歴丹陽尹㑹稽太守太常吳郡太守文帝以元保亷素寡欲故頻授名郡為政雖無殊績而去後必常見思不營財利産業儉薄文帝嘗曰人仕宦非唯須才亦須命運每有好官缺我未嘗不先憶羊元保元凶弑立以為吏部尚書領國子祭酒及孝武入伐朝士多南奔劭集羣僚横刀怒曰卿等便可去矣衆並懼莫敢言元保容色不異徐曰臣當以死奉朝劭為解孝武即位為金紫光祿大夫以謹敬見知大明五年加散騎常侍特進元保自少至老謹於祭奠四時珍新未得祠薦者口不妄嘗卒諡曰定子子戎少有才氣而輕薄無行檢好為雙聲江夏王義恭嘗設齋使戎布牀須臾王出以牀狹乃自開牀戎曰官家恨狹更廣八分王笑曰卿豈唯善雙聲乃辯士也文帝好與元保碁嘗中使至元保曰今日上何召我邪戎曰金溝清泚銅池摇颺既佳光景當得劇碁元保常嫌其輕脱云此兒必亡我家位通直郎坐與王僧達謗時政賜死死後孝武引見元保元保謝曰臣無日磾之明以此上負上美其言戎二弟文帝並賜名曰咸曰粲謂元保曰欲令卿二子有林下正始餘風元保既善碁而何尚之亦雅好其事吳郡褚允年七嵗便入髙品及長冠絶當時允父榮期與臧質同逆允應從誅何尚之固請曰允奕碁之妙超古冠今且魏犨犯令以材獲免父戮子宥其例甚多特乞與其微命使異術不絶帝不許時人痛惜之元保兄子希字㤗聞少有才氣為尚書左丞時揚州刺史西陽王子尚上言山湖之禁雖有舊科人俗相因替而不奉熂山封水保為家利自頃以來頽弛日甚富彊者兼嶺而占貧弱者薪蘇無託至漁採之地亦又如茲斯實害人之深弊為政所宜去絶損益舊條更申恒制有司檢壬辰詔書占山䕶宅以彊盜律論贓一文以上皆棄市希以壬辰之制其禁嚴刻事既難遵理與時弛而占山封水漸染復滋更相因仍便成先業一朝頓去易致嗟怨今更刋革立制五條凡是山澤先恒熂爈養種竹木雜果為林芿及陂湖江海魚梁鰌鮆場恒加功脩作者聴不追奪官品第一第二聴占山三頃第三第四品二頃五十畝第五第六品二頃第七第八品一頃五十畝第九品及百姓一頃皆依定格條上貲簿若先已占山不得更占先占闕少依限占足若非前條舊業一不得禁有犯者水土一尺以上並計贓依常盜律論停除咸康二年壬辰之科從之時益州刺史劉瑀先為右衞將軍與府司馬何季穆共事不平季穆為尚書令建平王宏所親待屢毁瑀於宏㑹瑀出為益州奪士人妻為妾宏使希舉察之瑀坐免官瑀恨希切齒有門生謝元伯往來希間瑀宻令訪訊被免之由希曰此奏非我意瑀即日到宏門奉牋陳謝云聞之羊希希坐漏泄免官泰始三年為寧朔將軍廣州刺史四年希以沛郡劉思道行晉康太守領軍伐俚思道違節失利希遣収之思道不受命率所領襲州希踰城走思道獲而殺之希子崇字伯逺尚書主客郎丁母憂哀毁過禮及聞廣州亂即日便徒跣出新亭不能步涉頓伏江渚門義以小船致之父𦵏畢乃不勝哀而卒沈演之字臺真吳興武康人也髙祖充晉車騎將軍吳國内史曽祖勁冠軍陳祐長史戍金墉為燕將慕容恪所陷不屈見殺贈東陽太守祖赤黔廷尉卿父叔任少有幹質朱齡石伐蜀為齡石建威府司馬平蜀之功亞於元帥以功封寧新縣男後拜益州刺史卒演之年十一尚書僕射劉柳見而知之曰此童終為令器沈氏家世為將而演之折節好學讀老子百徧以義理業尚知名襲父封爵吉陽縣五等侯舉秀才為嘉興令有能名元嘉中累遷尚書吏部郎先是劉湛劉斌等結黨欲排廢尚書僕射殷景仁演之雅仗正義與景仁素善盡心朝廷文帝甚嘉之及彭城王義康出藩誅劉湛等以演之為右衞將軍景仁尋卒乃以後軍長史范曄為左衞將軍與演之對掌禁旅同參機宻尋加侍中文帝謂之曰侍中領衞望實優顯此蓋宰相便坐卿其勉之上欲伐林邑朝臣多不同唯廣州刺史陸徽與演之賛成上意及林邑平賜羣臣黄金生口銅器等物演之所得偏多上謂曰廟堂之謀卿參其力平此逺夷未足多建茅土俟廓清舊都鳴鸞東岱不憂河山之不開也二十一年詔以演之為中領軍太子詹事范曄懐逆謀演之覺其有異言之文帝曄尋伏誅歴位吏部尚書領太子右衞率素有心氣寢病歴年上使卧疾理事性好舉才申濟屈滯而謙約自持上賜女伎不受暴卒文帝痛惜贈金紫光祿大夫諡曰貞子睦位黄門侍郎與弟西陽王文學勃忿䦧坐徙始興郡勃輕薄好利位太子右衞率加給事中坐贓賄徙梁州後還結事阮田夫王道隆等位司徒左長史為後廢帝所誅演之兄子坦之仕齊位都官郎坦之子顗髙尚不仕列在隠逸傳中江夷字茂逺濟陽考城人也祖某晉䕶軍將軍父敳驃騎諮議參軍夷少自澡厲為後進之美武帝版為鎮軍行參軍豫討桓元功封南郡州陵縣五等侯累遷大司馬武帝命大司馬府琅邪國事一以委焉武帝受命歴位吏部尚書吳郡太守營陽王於吳郡見害夷臨哭盡禮以兄疾去官後為右僕射夷美風儀善舉止歴位以和簡著稱出為湘州刺史加散騎常侍未之官卒遺令薄歛蔬奠務存儉約子湛字徽深居䘮以孝聞愛文義善彈碁鼓琴兼明算術為彭城王義康司徒主簿太子中舎人司空檀道濟為子求湛妹婚不許義康有命又不從時人重其立志義康之盛人競求自昵唯湛自疎固求外出乃以為武陵内史随王誕為北中郎將南徐州刺史以湛為長史南東海太守委以政事元嘉二十五年徴為侍中任以機宻領本州大中正遷左衞將軍時改選學職以太尉江夏王義恭領國子祭酒湛領博士轉吏部尚書家甚貧約不營財利餉饋盈門一無所受無兼衣餘食嘗為上所召值澣衣稱疾經日衣成然後起牛餓御人求草湛良久曰可與飲在選職頗有刻覈之譏而公平無私不受請謁論者以此稱焉初上大舉北伐舉朝以為不可唯湛賛成之魏太武至於𤓰步上以湛兼領軍軍事處分一以委焉魏遣使求婚上召太子劭以下集議衆並謂宜許湛曰戎狄無信許之無益劭怒曰今三王在阨詎宜茍執異議聲色甚厲坐散俱出劭使班劍及左右推排之殆於傾倒劭後謂上曰北伐敗辱數州淪敗獨斬江湛可以謝天下上曰北伐自我意江湛但不異耳劭後宴集未嘗命湛上乃為劭長子偉之聘湛第三女欲以和之上將廢劭使湛具詔草劭之入弑也湛直上省聞呌噪之聲乃匿傍小屋中劭遣求之舎吏紿云不在此兵即殺舎吏乃得見湛湛據忩受害意色不撓年四十六湛五子恁恕憼愻法夀皆見殺初湛室數見異未敗少日所眠牀忽有數斗血孝武即位追贈左光祿大夫開府儀同三司諡曰忠簡公恁位著作郎恁子斆齊史有𫝊夷弟僧安位太子中庶子僧安子智深一曰智淵夷有盛名夷子湛又有清譽父子並貴達智深父少無名問湛禮敬甚簡智深常以為恨自非節嵗不入湛門及為随王誕後軍參軍在襄陽誕待之甚厚時諮議參軍謝莊主簿沈懐文與智深友善懐文每稱曰人所應有盡有所應無盡無者其江智深乎元嘉末除尚書庫部郎時髙流官序不為臺郎智深門孤援寡獨有此選意甚不悦固辭不拜後為竟陵王誕司空主簿記室參軍領南濮陽太守遷從事中郎誕將為逆智深悟其機請假先返誕事發即除中書侍郎智深愛好文雅辭采清贍孝武深相知待恩禮冠朝上宴私甚數多命羣臣五三人逰集智深常為其首同侣未及前輙獨䝉引進每以越衆為慙未嘗為喜色時與羣僚相随見傳詔馳來知當呼己聳動愧恧形於容貌論者以此多之遷驍騎將軍尚書吏部郎上每酣宴輙詆羣臣並使自相嘲訐以為歡笑智深性素方退漸不㑹㫖上嘗使王僧朗戲其子景文智深正色曰恐不宜有此戲上怒曰卿江僧安兒何敢如此又曰江僧安癡人癡人自相惜智深伏席流涕不堪其恥由此恩寵大衰出為新安王子鸞北中郎長史南東海太守行南徐州事初上寵姬宣貴妃殷氏卒使羣臣議諡智深上議曰懐上以未盡嘉號甚銜之後車駕幸南山乗馬至殷氏墓羣臣皆騎從上以馬鞭指墓石柱謂智深曰此柱上不容有懐字智深益惶懼以憂卒子筠太子洗馬早卒後廢帝皇后筠之女也廢帝即位以后父追贈金紫光祿大夫筠妻王平望鄉君智深兄子槩早孤智深養之如子槩歴黄門吏部郎侍中武陵王賛北中郎長史江秉之字元叔濟陽考城人也祖道晉太常父纂給事中秉之少孤弟妹七人並幼撫育姻娶盡其心力少帝時為永世烏程令以善政著名東土徴為建康令為政嚴察部下肅然後為山隂令山隂人户三萬政事繁擾訟訴殷積階庭常數百人秉之御繁以簡常得無事宋世唯顧覬之亦以省務著績其餘雖復刑政脩理而未能簡事以在縣有能出補新安太守元嘉十二年轉任臨海並以簡約見稱卒於官所得祿悉散之親故妻子常饑寒人有勸其營田秉之正色答曰食祿之家豈可與農人競利在郡作書案一枚去官留以付庫秉之宗人䆳之字元逺頗有文義撰文釋行於世位司徒記室行參軍秉之子徽尚書都官郎吳令元凶殺徐湛之子徽以黨與見誅子謐齊史有傳通志卷一百三十五
