body:
  text: 通志卷九十六宋右廸功郎鄭樵漁仲撰列傳第九前漢蕭何曹參張良陳平王陵周勃子亞夫樊噲酈商子寄夏侯嬰灌嬰傅寛靳歙周緤張蒼周昌從兄苛趙堯任敖申屠嘉酈食其陸賈朱建婁敬叔孫通蕭何沛豐人也以文無害為沛主吏掾髙祖為布衣時何數以吏事護髙祖髙祖為亭長常左右之髙祖以吏繇咸陽吏皆送奉錢三何獨以五秦御史監郡者與從事常辯之何乃給泗水卒史事第一秦御史欲入言徵何何固請得毋行及髙祖起為沛公何常為丞督事沛公至咸陽諸将皆争走金帛財物之府分之何獨先入收秦丞相御史律令圗書藏之沛公具知天下阨塞户口多少彊弱處民所疾苦者以何得秦圗書也初諸侯相與約先入闗破秦者王其地沛公既先定秦項羽後至欲攻沛公沛公謝之得解羽遂屠焼咸陽與范增謀曰巴蜀道險秦之遷民皆居蜀廼曰蜀漢亦闗中地也故立沛公為漢王而三分闗中地王秦降将以距漢王漢王怒欲謀攻項羽周勃灌嬰樊噲皆勸之何諌之曰雖王漢中之惡不猶愈扵死乎漢王曰何為乃死也何曰今衆弗如百戰百敗不死何為周書曰天予不取反受其咎語曰天漢其稱甚美夫能詘扵一人之下而信扵萬乗之上者湯武是也臣􅂅大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圗也漢王曰善乃遂就國以何為丞相何進韓信漢王以信為大将軍説漢王令引兵東定三秦語在信傳何以丞相留收巴蜀填撫諭告使給軍食漢二年漢王與諸侯擊楚何守闗中侍太子治櫟陽為法令約束立宗廟社稷宫室縣邑輙奏上可許以從事即不及奏上輙以便宜施行上來以聞計戸口轉漕給軍漢王數失軍遯去何常興闗中卒輙補缺上以此剸屬任何闗中事漢三年與項羽相距京索間上數使使勞苦丞相鮑生謂何曰今王暴衣露葢數使使勞苦君者有疑君心也為君計莫若遣君子孫昆弟能勝兵者悉詣軍所上必益信君扵是何從其計漢王大説漢五年既殺項羽即皇帝位論功行封羣臣争功嵗餘不决上以何功最盛先封為鄼侯食邑八千户功臣皆曰臣等身被堅執鋭多者百餘戰少者數十合攻城畧地大小各有差今蕭何未嘗有汗馬之勞徒持文墨議論不戰顧反居臣等上何也上曰諸君知獵乎曰知之知獵狗乎曰知之上曰夫獵追殺獸兎者狗也而𤼵縱指示獸處者人也今諸君徒能走得獸耳功狗也至如蕭何發縱指示功人也且諸君獨以身隨我多者兩三人今蕭何舉宗數十人皆隨我功不可忘也後羣臣莫敢言列侯畢已受封及奏位次皆曰平陽侯曹參身被七十創攻城畧地功最多宜第一上已撓功臣多封蕭何至位次未有以復難之然心欲何第一闗内侯鄂千秋時為謁者進曰羣臣議皆誤夫曹參雖有野戰畧地之功此特一時之事夫上與楚相距五嵗失軍亡衆跳身遯者數矣然蕭何常從闗中遣軍補其處非上所詔令召而數萬衆㑹上之乏絶者數矣夫漢與楚相守滎陽數年軍無見糧蕭何轉漕闗中給食不乏陛下雖數亡山東蕭何常全闗中以待陛下此萬世之功也今雖亡曹參百數何缺扵漢漢得之不必待以全奈何欲以一旦之功而加萬世之功哉蕭何當第一曹參次之上曰善扵是乃令何賜帯劒履上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖髙待鄂君乃得眀扵是因鄂千秋故所食闗内侯邑二千户封為安平侯是日悉封何父母兄弟十餘人皆有食邑上以繇咸陽時何所送獨贏奉錢二乃益封何二千戸十一年陳豨反上自将至邯郸淮陰侯謀反闗中呂后用何計誅信語在信傳上已聞信誅乃使使拜丞相為相國益封五千户令卒五百人一都尉為相國衛諸君皆賀召平獨弔召平者故秦東陵侯秦破為布衣貧種瓜長安城東瓜美故世謂東陵瓜從召平名也平謂何曰禍自此始矣上暴露扵外而君守扵内非被矢石之難而益君封置衛者以今者淮陰新反扵中有疑君心夫置衛衛君非以寵君也􅂅君譲封勿受悉以家私財佐軍則上心説何從其計上乃大喜十二年秋黥布反上自擊之數使使問相國何為曰相國為上在軍乃拊循勉力百姓悉以所有佐軍如陳豨時客又説何曰君㓕族不久矣夫君位為相國功第一不可復加然君初入闗得百姓心十餘年矣皆附君尚復孳孳得民和上所為數問君者畏君傾動闗中今君胡不多買田宅賤貰貣以自汙上心乃安何從其計上乃大説上罷布軍歸民道遮行上書言相國彊賤買民田宅數千萬上至何謁上笑曰夫相國乃利民民所上書皆以與何曰君自謝民何因為民請曰長安地陿上林中多空地棄􅂅令民得入田毋收藁為禽獸食上大怒曰相國多受賈人財物乃為請吾苑乃下何廷尉械繫之數日王衛尉侍前問曰相國何大罪陛下繫之暴也上曰吾聞李斯相秦皇帝有善歸主有惡自予今相國多受賈豎金而為民請吾苑以自媚扵民故繫治之王衛尉曰夫職事茍有便扵民而請之真宰相事也陛下奈何乃疑相國受賈人錢乎且陛下距楚數嵗陳豨黥布反時陛下自将而往當是時相國守闗中摇足則闗以西非陛下有也相國不以此時為利乃利賈人之金乎且秦以不聞其過亡天下李斯之分過又何足法哉陛下何疑宰相之淺也上不懌是日使使持節赦出何何年老素恭謹徒跣入謝上曰相國休矣相國為民請吾苑不許我不過為桀紂主而相國為賢相吾故繫相國欲令百姓聞吾過髙祖崩何事惠帝何病上親自臨視何疾因問曰君即百嵗後誰可代君對曰知臣莫若主帝曰曹參何如何頓首曰帝得之矣何死不恨矣何買田宅必居窮僻處為家不治垣屋曰令後世賢師吾儉不賢毋為勢家所奪孝惠二年何薨諡曰文終侯子禄嗣薨無子髙帝乃封何夫人同為鄼侯小子延為筑陽侯孝文元年罷同更封延為鄼侯薨子遺嗣薨無子文帝復以遺弟則嗣坐事免景帝二年制詔御史故相國蕭何髙皇帝大功臣所與為天下也今其祀絶朕甚憐之其以武陽縣户二千封何孫嘉為列侯嘉則弟也薨子勝嗣後有罪免武帝元狩中復下詔御史以鄼户二千四百封何曽孫慶為鄼侯布告天下令眀知朕報蕭相國徳也慶則子也薨子壽成立坐為大常犧牲瘦免宣帝時詔丞相御史求問蕭相國後在者得元孫建世等十二人復下詔以鄼户二千封世為鄼侯傳子至孫獲坐使奴殺人减死論成帝時復封何元孫之子南䜌長喜為鄼侯傳子至曾孫王莽敗國乃絶曹參沛人也秦時為沛獄掾而蕭何為主吏居縣為豪吏矣髙祖之為沛公也參以中涓從擊胡陵方與攻秦監公軍大破之東下薛擊泗水守軍薛郭西復攻胡陵取之徙守方與方與反為魏擊之豐反為魏攻之賜爵七大夫擊秦司馬􅊂軍碭東破之取碭狐父祈善置置譯也善名也又攻下邑以西至虞擊章邯車騎攻爰戚及亢父先登遷為五大夫北救東阿擊章邯軍陷陳追至濮陽攻定陶取臨濟南救雍邱擊李由軍破之殺李由虜秦候一人章邯破殺項梁也沛公與項羽引兵而東楚懐王以沛公為碭郡長将碭郡兵封參為執帛號曰建成君遷為戚公屬碭郡其後從攻秦東郡尉軍破之成武南擊王離軍成陽南復攻之杠里大破之追北西至開封擊趙賁軍破之圍趙賁開封城中西擊秦将楊熊軍扵曲遇破之虜秦司馬及御史各一人遷為執珪從西次陽武下轘轅緱氏絶河津還擊趙賁軍尸北破之從南攻犨與南陽守齮戰陽城郭東䧟陳取宛虜齮盡定南陽郡從西攻武闗嶢闗取之前攻秦軍藍田南又夜擊其北秦軍大破遂從至咸陽㓕秦項羽至以沛公為漢王漢王封參為建成侯從至漢中遷為将軍從還定三秦初攻下辯故道雍斄擊章平軍扵好畤南破之圍好畤取壌鄉擊三秦軍壌東及髙櫟破之復圍章平平出好畤走因擊趙賁内史保軍破之東取咸陽更命曰新城參将兵守景陵二十日三秦使章平等攻參參出擊大破之賜食邑扵寕秦參以将軍引兵圍章邯扵廢邱以中尉從漢王出臨晉闗至河内下修武度圍津東擊龍且項佗扵定陶破之東取碭蕭彭城擊項籍軍漢軍大敗走參以中尉圍取雍邱王武反扵外黄程處反扵燕往擊盡破之柱天侯反扵衍氏又進破取衍氏擊羽嬰扵昆陽追至葉還攻武彊因至滎陽參自漢中為将軍中尉從擊諸侯及項羽敗還至滎陽凡二嵗漢王乃拜為假左丞相入屯兵闗中月餘魏王豹反與韓信東攻魏将軍孫遫軍東張大破之因攻安邑得魏将王㐮擊魏王扵曲陽追至武垣生得魏王豹取平陽得魏王母妻子盡定魏地凡五十二城賜食邑平陽因從韓信擊趙相國夏説軍扵鄔東大破之斬夏説韓信與故常山王張耳引兵下井陘擊成安君而令參還圍趙别将戚将軍扵鄔城中戚将軍出走追斬之乃引兵詣敖倉漢王之所韓信已破趙為相國東擊齊參以左丞相屬韓信攻破齊歴下軍遂取臨淄還定濟北郡收著漯陰平原鬲盧已而與韓信擊龍且軍扵上假密大破之斬龍且虜亞将周蘭定齊郡凡得七十餘縣得故齊王田廣相田光其守相許章及故齊膠東将軍田既韓信為齊王引兵東詣陳與漢王共破項羽而參留平齊未服者項籍已死漢王為皇帝韓信徙為楚王參歸漢相印髙祖以長子肥為齊王而以參為齊相國髙祖六年與諸侯剖符賜參爵列侯食邑平陽萬六百三十户世世勿絶號平陽侯除前所食邑參以齊相國從擊陳豨将張春軍破之黥布反參從齊悼惠王将車騎十二萬人與髙祖㑹擊黥布軍大破之南至蘄還定竹邑相蕭留參功凡下二國縣百二十二得王二人相三人将軍六人大莫敖郡守司馬候御史各一人孝惠元年除諸侯相國法更以參為齊丞相參之相齊齊七十城天下初定悼惠王富扵春秋參盡召長老諸先生問所以安集百姓而齊故諸儒以百數言人人殊參未知所定聞膠西有盖公善治黄老言使人厚幣請之既見葢公葢公為言治道貴清静而民自定推此類具言之參扵是避正堂舍葢公焉其治要用黄老術故相齊九年齊國安輯大稱賢相惠帝二年蕭何薨參聞之告舍人趣治行吾且入相居無何使者果召參參去屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大扵此者乎參曰不然夫獄市者所以并容也今君擾之姦人安所容乎吾是以先之始參微時與蕭何善及為将相有郤至何且死所推賢唯參參代何為相國舉事無所變更壹遵何約束擇郡國吏木訥扵文辭謹厚長者即召除為丞相吏吏之言文刻深欲務聲名者輙斥去之日夜飲醇酒卿大夫以下吏及賔客見參不事事來者皆欲有言至者參輙飲以醇酒間之欲有所言復飲之醉而後去終莫得開説以為常相舎後園近吏舎吏舎日飲歌呼從吏患之無如之何乃請參逰後園聞吏醉歌呼從吏幸相國召按之乃反取酒張坐飲亦歌呼與相應和參見人有細過掩匿覆葢之府中無事參子窋為中大夫惠帝怪相國不治事以為豈少朕與乃謂窋曰若歸試從容私問而父曰髙帝新棄羣臣帝富扵春秋君為相國日飲無所請事何以憂天下乎然毋言吾告若也窋既洗沐歸閒侍自從其所諫參參怒而笞窋二百曰趣入侍天下事非若所當言也至朝時惠帝譲參曰與窋胡治乎乃者我使諫君也參免冠謝曰陛下自察聖武孰與髙皇帝上曰朕乃安敢望先帝乎參曰陛下觀臣能孰與蕭何賢上曰君似不及也參曰陛下言之是也且髙皇帝與蕭何定天下法令既眀今陛下垂拱參等守職遵而勿失不亦可乎惠帝曰善君休矣參為相國出入三年薨諡曰懿侯百姓歌之曰蕭何為法顜古項反一音較若畫一曹參代之守而勿失載其清静民以寧壹窋嗣侯髙后時至御史大夫傳國至曾孫㐮武帝時為将軍擊匈奴薨子宗嗣有罪髠為城旦國除哀帝時封參元孫之孫本始為平陽侯二千户王莽時薨子宏嗣建武中先降河北封平陽侯張良字子房其先韓人也大父開地相韓昭侯宣惠王㐮哀王父平相釐王悼惠王悼惠王二十三年平卒卒二十嵗秦㓕韓良年少才宦事韓韓破良家僮三百人弟死不𦵏悉以家財求客刺秦王為韓報讐以大父父相韓五世主故良嘗學禮淮陽東見倉海君得力士為鐵椎重百二十斤秦皇帝東㳺至博浪沙中良與客狙擊秦皇帝誤中副車秦皇帝大怒大索天下求賊甚急良乃更名姓亡匿下邳良嘗閒從容歩㳺下邳圯上有一老父衣褐至良所直墮其履圯下顧謂良曰孺子下取履良愕然欲歐之為其老彊忍下取履父曰履我良業為取履因長跪履之父以足受笑而去良殊大驚隨目之父去里所復還曰孺子可教矣後五日平眀與我㑹此良因怪之跪曰諾五日平眀良往父已先在怒曰與老人期後何也去曰後五日早㑹五日雞鳴良往父又先在復怒曰後何也去曰後五日復蚤來五日良夜未半往有頃父亦來喜曰當如是出一編書曰讀是則為王者師矣後十年興十三年孺子見我濟北榖城山下黄石即我已遂去無他言不復見旦日視其書乃太公兵法也良異之常習誦讀之居下邳為任俠項伯嘗殺人從良匿後十年陳渉等起良亦聚少年百餘人景駒自立為楚假王在留良欲往從之道遇沛公将數千人略地下邳遂屬焉沛公拜良為廐将良數以太公兵法説沛公沛公善之常用其策良為他人言皆不省良曰沛公殆天授故遂從之不去見景駒沛公之薛見項梁共立楚懐王良乃説項梁曰君已立楚後而韓諸公子横陽君成賢可立為王益樹黨項梁使良求成立為韓王以良為韓申徒與韓王将千餘人西畧韓地得數城秦輙復取之往來為㳺兵潁川沛公自雒陽西南出轘轅良引兵從沛公下韓十餘城擊破楊熊軍沛公乃令韓王成留守陽翟與良俱南攻下宛西入武闗沛公欲以二萬人擊秦嶢下軍良説曰秦兵尚彊未可輕臣聞其将屠者子賈豎易動以利􅂅沛公且留壁使人先行為五萬人具食益為張旗幟諸山上為疑兵令酈食其持重寳㗖秦将秦将果畔欲連和俱西襲咸陽沛公欲聼之良曰此獨其将欲叛耳恐士卒不從不從必危不如因其解而擊之沛公乃引兵擊秦軍大破之逐北至藍田再戰秦兵竟敗遂至咸陽秦王子嬰降沛公入秦宮宮室帷帳狗馬重寳婦女以千數意欲留居之樊噲諌不聼良曰夫秦為無道故沛公得至此夫為天下除殘去賊宜縞素為資今始入秦即安其樂此所謂助桀為虐且忠言逆耳利扵行毒藥苦口利扵病􅂅沛公聼樊噲言沛公乃還軍霸上項羽至鴻門欲擊沛公項伯夜馳至沛公軍私見良欲與俱去良曰臣為韓王送沛公今事有急亡去不義廼具語沛公沛公大驚曰為之奈何良曰沛公誠欲背項王邪沛公曰鯫生説我距闗毋内諸侯秦地可王也故聼之良曰沛公自度能郤項王乎沛公黙然曰今為奈何良因要項伯見沛公沛公與伯飲為壽結婚令伯具言沛公不敢背項王所以距闗者備他盗也項羽後解語在羽傳漢元年沛公為漢王王巴蜀賜良金百鎰珠二斗良具以獻項伯漢王因令良厚遺項伯使請漢中地項王乃許之漢王之國良送至褒中遣良歸韓良因説漢王焼絶棧道示天下無還心以固項王意乃使良還行焼絶棧道良歸至韓項羽以良從漢王故不遣韓王成之國從與俱東良説項王曰漢王焼絶棧道無還心矣乃以齊王田榮反書告項王項王以此無西憂漢心而發兵北擊齊項王竟不肯遣韓王乃以為侯又殺之彭城良亡間行歸漢王漢王亦已還定三秦矣復以良為成信侯從東擊楚至彭城漢王兵敗而還至下邑漢王下馬踞鞍而問曰吾欲捐闗以東等棄之誰可與共功者良進曰九江王黥布楚之梟将與項羽有郄彭越與齊王田榮反梁地此兩人可急使而王之将獨韓信可屬大事當一面即欲捐之捐之此三人則楚可破也漢王乃遣隨何説九江王布而使人連彭越及魏王豹反使韓信将兵擊之因舉燕代齊趙然卒破楚者此三人力也良多病未嘗特将兵常為畫䇿臣時時從漢王漢三年項羽急圍漢王扵滎陽漢王恐與酈食其謀撓楚權酈生曰昔湯伐桀封其後扵把武王誅紂封其後扵宋今秦失徳棄義伐㓕六國使其後無立錐之地陛下誠能復立六國後此其君臣百姓皆争戴陛下徳義􅂅為臣妾徳義已行陛下南面稱伯楚必斂衽而朝漢王曰善趣刻印先生因行佩之良從外來謁漢王漢王方食曰子房前客有為我計撓楚權者具以酈生語告扵子房曰何如良曰誰為陛下畫此計者陛下事去矣漢王曰何哉良對曰臣請借前箸為大王籌之曰昔者湯伐桀而封其後扵把者度能制桀之死命也今陛下能制項籍之死命乎曰未能也其不可一矣武王伐紂封其後扵宋者度能得紂之頭也今陛下能得項籍之頭乎曰未能也其不可二矣武王入殷表商容之閭釋箕子之拘封比干之墓今陛下能封聖人之墓表賢者之閭式智者之門乎曰未能也其不可三矣發鉅橋之粟散鹿臺之錢以賜貧乏今陛下能散府庫以賜貧窮乎曰未能也其不可四矣殷事已畢偃革為軒倒載干戈覆以虎皮示天下不復用今陛下能偃武修文不復用兵乎曰未能也其不可五矣休馬華山之陽示以無所為今陛下能休馬無所用乎曰未能也其不可六矣放牛桃林之陰以示天下不復輸積今陛下能放牛不復輸積乎曰未能也其不可七矣且夫天下㳺士離親戚棄墳墓去故舊從陛下逰者徒欲日夜望咫尺之地今乃立六國後㳺士各歸事其主從其親戚反其故舊墳墓陛下誰與取天下乎其不可八矣且夫楚唯毋彊六國立者復撓而從之陛下焉得而臣之誠用客之謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗乃公事今趣銷印漢四年韓信破齊而欲自立為齊王漢王怒良與陳平説漢王漢王使良授齊王信印語在信傳中其秋漢王追楚至陽夏南戰不利而壁固陵諸侯期不至良説漢王漢王用其計諸侯皆至語在髙紀漢六年正月封功臣良未嘗有戰鬭功髙帝曰運籌策帷幄之中决勝千里之外子房功也自擇齊三萬户良曰始臣起下邳與上㑹留此天以臣授陛下陛下用臣計幸而時中臣願封留足矣不敢當三萬户乃封良為留侯與蕭何等俱封上已封大功臣二十餘人其餘日夜争功不决未得行封上居雒陽南宮從復音複上下有道故曰復道也道望見諸将往往相與坐沙中偶語上曰此何語良曰陛下不知乎此謀反耳上曰天下屬安定何故反乎良曰陛下起布衣與此屬取天下今陛下已為天子而所封皆蕭曹故人所親愛而所誅者皆平生所讐怨今軍吏計功以天下不足徧封此屬畏陛下不能盡封又恐見疑平生過失及誅故相聚謀反耳上乃憂曰為之奈何良曰上平生所憎羣臣所共知誰最甚者上曰雍齒與我有故怨未起之時有故怨也數嘗窘辱我我欲殺之為其功多故不忍良曰今急先封雍齒以示羣臣羣臣見雍齒封則人人自堅矣扵是上乃置酒封雍齒為什方侯而急趣丞相御史定功行封羣臣罷酒皆喜曰雍齒且侯我屬無患矣劉敬説髙帝都闗中上疑之左右大臣皆山東人多勸上都雒陽雒陽東有成臯西有殽黽背河鄉伊雒其固亦足恃良曰雒陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國夫闗中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而固守獨以一面東制諸侯諸侯安定河渭漕輓天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國劉敬説是也上即日駕西都闗中良從入闗良性多病即道引不食榖杜門不出嵗餘上欲廢太子立戚夫人子趙王如意大臣多諫争未能得堅决者也呂后恐不知所為人或謂呂后曰留侯善畫計策上信用之呂后乃使建成侯呂澤劫良曰君常為上謀臣今上日欲易太子君安得髙枕而卧良曰始上數在急困之中幸用臣策天下安定以愛欲易太子骨肉之間雖臣等百餘人何益呂澤彊要曰為我畫計良曰此難以口舌争也顧上有所不能致者四人四人者年老矣皆以上嫚侮士故逃匿山中義不為漢臣然上髙此四人今公誠能毋愛金玉璧帛令太子為書卑辭安車使辯士固請宜來來以為客時時從入朝令上見之則必異而問之問之知此四人賢則一助也扵是呂后令呂澤使人奉太子書卑辭厚禮迎此四人四人至客建成侯所漢十一年黥布反上疾欲使太子将往擊四人相謂曰凡來者将以存太子太子将兵事危矣乃説建成侯曰太子将兵有功則位不益無功還則從此受禍矣且太子所與俱諸将皆嘗與上定天下梟将也今使太子将之此無異使羊将狼也皆不肯為盡力其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王如意常抱居前上曰終不使不肖子居愛子之上眀乎其代太子位必矣君何不急請呂后承間為上泣言黥布天下猛将也善用兵今諸将皆陛下故等夷乃使太子将此屬無異使羊将狼也莫肯為用且使布聞之則鼓行而西耳上雖病彊載輜車卧而䕶之諸将不敢不盡力上雖苦為妻子自彊扵是呂澤夜立見呂后呂后承間為上泣涕而言如四人意上曰吾惟豎子固不足遣而公自行耳扵是上自将兵而東羣臣居守皆送至霸上良病自彊起至曲郵見上曰臣宜從病甚楚人剽疾􅂅上慎毋與楚人争鋒因説上曰令太子為将軍監闗中兵上曰子房雖病彊卧而傅太子是時叔孫通為太傅良行少傅事漢十二年上從擊破布歸疾益甚愈欲易太子良諫不聼因疾不視事叔孫太傅稱説引古今以死争太子上佯許之猶欲易之及宴置酒太子侍四人者從太子年皆八十有餘鬢眉皓白衣冠甚偉上怪之問曰彼何為者四人前對各言名姓曰東園公甪里先生綺里季夏黄公上乃大驚曰吾求公數嵗公避逃我今公何自從吾兒逰乎四人皆曰陛下輕士善罵臣等義不受辱故恐而亡匿竊聞太子仁孝恭敬愛士天下莫不延頸􅂅為太子死者故臣等來耳上曰煩公幸卒調䕶太子四人為壽已畢趨去上目送之召戚夫人指視四人者曰我欲易之彼四人為之輔羽翼已成難動矣呂后真而主矣戚夫人泣涕上曰為我楚舞吾為若楚歌歌曰鴻鵠髙飛一舉千里羽翮已就横絶四海横絶四海當可奈何雖有矰繳尚安所施歌數闋戚夫人歔欷流涕上起去罷酒竟不易太子者良本招此四人之力也良從上擊代出竒計下馬邑及立蕭何相國所與從容言天下事甚衆非天下所以存亡故不著良廼稱曰家世相韓及韓㓕不愛萬金之貲為韓報讐彊秦天下振動今以三寸舌為帝者師封萬户位列侯此布衣之極扵良足矣願棄人間事欲從赤松子逰耳乃學辟穀道引輕身髙帝崩呂后徳良乃彊食之曰人生一世間如駒之過隙何至自苦如此良不得已彊聼而食後八年薨諡文成侯良始所見下邳圯上老父與太公書者後十三年從髙帝過濟北果得榖城山下黄石取而葆祠之及良死并葬黄石冢每上冢伏臘祠黄石太史公曰予以為留侯其人計魁梧奇偉至見其圗状貎如婦人好女云子不疑嗣侯孝文五年坐不敬國除陳平陽武户牖鄉人也少時家貧好讀書治黄老之術有田三十畆獨與兄伯居伯常耕田縱平使㳺學平為人長大美色人或謂平貧何食而肥若是其嫂疾平之不視家生產曰亦食糠覈耳有叔如此不如無有伯聞之逐其婦而棄之及平長可取婦富人莫肯與者貧者平亦恥之户牖富人張負有女孫五嫁夫輙死人莫敢娶平欲得之邑中有䘮平家貧侍䘮以先往後罷為助張負既見之䘮所獨視偉平平亦以故後去負隨平至其家家乃負郭窮巷以弊席為門然門外多有長者車轍張負歸謂其子仲曰吾欲以女孫與陳平仲曰平貧不事事一縣盡笑其所為獨奈何予女乎負曰人固有好美如陳平而長貧賤者乎卒與女為平貧乃假貸幣以聘予酒肉之資以内婦負誡其孫曰毋以貧故事人不謹事兄伯如事父事嫂如事母平既娶張氏女齎用益饒㳺道日廣里中社平為宰分肉食甚均里父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如是肉矣陳渉起而王陳使周市略定魏地立魏咎為魏王與秦軍相攻扵臨濟陳平固已前謝其兄伯從少年往事魏王咎扵臨濟魏王以為太僕説魏王不聼人或讒之平亡去久之項羽略地至河上平往歸之從入破秦賜平爵卿項羽之東王彭城也漢王還定三秦而東殷王反楚項羽乃以平為信武君将魏王咎客在楚者以往擊降殷王而還項王使項悍拜平為都尉賜金二十鎰居無何漢王攻下殷王項王怒将誅定殷者将吏平懼誅乃封其金與印使使歸項王而平身閒行仗劒亡渡河舩人見其美丈夫獨行疑其亡将要中當有金玉寳器目之欲殺平平恐乃解衣臝而佐刺舩舩人知其無有乃止平遂至修武降漢因魏無知求見漢王漢王召入是時萬石君奮為漢王中涓受平謁入見平平等七人俱進賜食王曰罷就舍矣平曰臣為事來所言不可以過今日扵是漢王與語而説之問曰子之居楚何官平曰都尉是日乃拜平為都尉使為參乗典䕶軍諸将盡讙曰大王一日得楚之亡卒未知其髙下而即與同載反使監䕶軍長者漢王聞之愈益幸平遂與東伐項王至彭城為楚所敗引而還收散兵至滎陽以平為亞将屬扵韓王信軍廣武絳灌等咸讒平曰平雖美丈夫如冠玉耳其中未必有也臣聞平居家時盗其嫂事魏王不容亡而歸楚歸楚不中又亡歸漢今大王尊官之令䕶軍臣聞平受諸将金金多者居善處金少者得惡處平反覆亂臣也􅂅王察之漢王疑之召譲魏無知無知對曰臣之所言者能也陛下所問者行也今有尾生孝己之行而無益扵勝負之數陛下何暇用之乎今楚漢相距臣進奇謀之士顧其計誠足以利國家不耳且盗嫂受金又安足疑乎漢王召譲平曰先生事魏不中遂事楚而去今又從吾㳺信者固多心乎平曰臣事魏王魏王不能用臣説故去事項王項王不能信人其所任愛非諸項即妻之昆弟臣居楚聞漢王之能用人故歸大王臣臝身來不受金無以為資誠臣計畫有可采者􅂅大王用之使無可用者金具在請封輸官得請骸骨漢王謝之拜為䕶軍中尉盡䕶諸将諸将乃不敢復言其後楚急攻絶漢甬道圍漢王扵滎陽城久之漢王患之請割滎陽以西以和項王不聼漢王謂平曰天下紛紛何時定乎平曰項王為人恭謹愛人士之㢘節好禮者多歸之至扵行功賞爵邑重之士亦以此不附今大王嫚而少禮士之㢘節者不來然大王能饒人以爵邑士之頑頓嗜利無恥者亦多歸漢誠各去其兩短集其兩長天下指麾則定矣然大王恣侮人不能得㢘節之士顧楚有可亂者彼項王骨鯁之臣亞父鍾離昧龍且周殷之屬不過數人耳大王誠能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信讒必内相誅漢因舉兵而攻之破楚必矣漢王以為然乃出黄金四萬斤與平恣所為不問其出入平既多以金縱反間扵楚軍宣言諸将鍾離昧等為項王将功多矣然而終不得裂地而王欲與漢為一以㓕項氏而分王其地項王果意不信鍾離昧等項王既疑之使使至漢漢王為太牢具舉進見楚使即佯驚曰吾以為亞父使乃項王使復持去更以惡草具進楚使楚使歸具以報項王項王果大疑亞父亞父欲急攻下滎陽城項王不信不肯聼亞父聞項王疑之乃怒曰天下事大定矣君王自為之􅂅請骸骨歸歸未至彭城疽發背而死平乃夜出女子二千人滎陽城東門楚因擊之平得與漢王從城西門出去遂入闗收散兵而復東其眀年淮陰侯信破齊自立為假齊王使使言之漢王漢王大怒而罵平躡漢王漢王亦悟乃厚遇齊使使張子房卒立信為齊王封平以户牖侯用其奇計策卒㓕楚常以䕶軍中尉從定燕王臧荼漢六年人有上書告楚王韓信反髙帝問諸将諸将曰亟發兵坑豎子耳髙帝黙然以問平平固辭謝曰諸将云何上具告之平曰人之上書言信反有知之者乎曰未有曰信知之乎曰不知平曰陛下精兵孰與楚上曰不能過也平曰陛下将用兵有能過韓信者乎上曰莫及也平曰今兵不如楚精而将不能及而舉兵攻之是趣之戰也竊為陛下危之上曰為之奈何平曰古者天子巡狩㑹諸侯南方有雲夢陛下第出偽㳺雲夢㑹諸侯扵陳陳楚之西界信聞天子以好出㳺其埶必無事而郊迎謁謁而陛下因禽之特一力士之事耳髙帝以為然乃發使告諸侯㑹陳吾将南㳺雲夢上因隨以行行未至陳楚王信果郊迎道中髙帝豫具武士見信至即執縛之載後車信呼曰天下已定我固當烹髙帝謂信曰若毋聲而反眀矣武士反接之遂㑹諸侯于陳盡定楚地還至雒陽赦信以為淮陰侯而與功臣剖符定封封平為户牖侯世世勿絶平辭曰此非臣之功也上曰吾用先生謀計戰勝尅敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知其眀年平從擊韓王信扵代卒至平城為匈奴所圍七日不得食髙帝用平奇計使單于閼氏圍以得開髙帝既出其計秘世莫得聞髙帝南過曲逆上其城望見其屋室甚大曰壮哉縣吾行天下獨見雒陽與是耳顧問御史曰曲逆户口幾何對曰始秦時三萬餘户間者兵數起多亡匿今見五千餘户扵是詔御史更封平為曲逆侯盡食之除前所食户牖平自初從至天下定後常以䕶軍中尉從擊臧荼陳豨黥布凡六出奇計輙益户凡六益封奇計或頗秘世莫得聞也髙帝從破布軍還病創徐行至長安燕王盧綰反上使樊噲以相國将兵擊之既行人有短惡噲者帝大怒曰噲見吾病乃幾音冀我死也用平謀召絳侯周勃受詔牀下曰陳平亟馳傳載勃代噲将平至軍中即斬噲頭二人既受詔行計之曰樊噲帝之故人功多且又呂后弟呂嬃之夫有親且貴帝以忿怒故欲斬之即恐後悔寧囚而致上令上自誅之未至軍為壇以節召噲噲受詔即反接載檻車傳詣長安而令周勃代将将兵定燕反縣平行聞髙帝崩恐呂后及呂嬃讒怒廼馳傳先去逢使者詔平與灌嬰屯扵滎陽平受詔立復馳至宮哭甚哀因奏事䘮前呂后哀之曰君勞出休矣平畏讒之就因固請得宿衛中太后乃以為郎中令日傳教惠帝是後呂􅎐讒乃不得行樊噲至即赦復爵邑惠帝六年相國曹參薨以安國侯王陵為右丞相平為左丞相王陵故沛人始為縣豪髙祖微時兄事陵及起沛入咸陽陵亦自聚黨數千人居南陽不肯從沛公及漢王之還攻項籍陵乃以兵屬漢項羽取陵母置軍中陵使至則東鄉坐陵母欲以招陵陵母既私送使者泣曰􅂅為老妾語陵善事漢王漢王長者毋以老妾故持二心妾以死送使者遂伏劒而死項王怒烹陵母陵卒從漢王定天下以善雍齒雍齒髙祖之讐而陵本無意從髙帝以故晚封為安國侯陵為人少文任氣好直言為右丞相二嵗孝惠帝崩髙后欲立諸呂為王問陵陵曰髙皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王呂氏非約也太后不説問左丞相平及絳侯周勃等皆曰髙帝定天下王子弟今太后稱制欲王昆弟諸呂無所不可太后喜罷朝陵咎平勃曰始與髙帝唼血而盟諸君不在邪諸君縱欲阿意背約何面目見髙帝扵地下乎平曰扵今面折廷争臣不如君全社稷安劉氏後君亦不如臣陵無以應之扵是呂太后欲廢陵乃佯遷陵為帝太傅實奪之相權陵怒謝病免杜門竟不朝請七年而薨陵之免丞相呂太后乃徙平為右丞相以辟陽侯審食其為左丞相左丞相不治常給事扵中食其亦沛人也漢王之敗彭城西楚取太上皇呂后為質食其以舍人侍呂后其後從破項籍為侯幸扵呂太后及為相居中如郎中令公卿百官皆因决事呂􅎐常以平前為髙帝謀執樊噲數讒曰平為丞相非治事日飲醇酒戲婦女平聞日益甚呂太后聞之私獨喜面質呂嬃扵平曰鄙語云兒婦人口不可用顧君與我何如耳無畏呂嬃之讒也呂太后立諸呂為王平偽聼之及呂太后崩平與太尉勃合謀卒誅諸呂立孝文皇帝平本謀也審食其免相三嵗為淮南王所殺文帝初立以為太尉勃親以兵誅呂氏功多平欲譲勃尊位乃謝病文帝怪而問之曰髙帝時勃功不如臣平及誅諸呂臣功亦不如勃􅂅以右丞相譲勃扵是上以太尉為右丞相位次第一平徙為左丞相位次第二賜平金千斤益封三千户居頃之上益眀習國家事因而問右丞相勃曰天下一嵗决獄幾何勃謝曰不知問天下嵗錢穀出入幾何勃又謝不知汗出洽背愧不能對扵是上亦問左丞相平平曰有主者上曰主者為誰平曰陛下即問决獄責廷尉問錢穀責治粟内史上曰苟各有主者而君所主何事也平謝曰主臣陛下不知其駑下使待罪宰相宰相者上佐天子理陰陽順四時下育萬物之宜外鎮撫四夷諸侯内親附百姓使卿大夫各得任其職焉上稱善勃大慙出而譲平曰君獨不素教我對平笑曰君居其位獨不知其任邪且陛下即問長安中盗賊數君欲彊對邪扵是絳侯自知其能弗如平逺矣居頃之勃謝病請免相而平顓為一丞相孝文二年平薨諡獻侯子買嗣傳至曾孫何坐畧人妻棄市國除始平曰我多陰謀道家所禁吾世即廢亦已矣終不復起以吾多陰禍也然其後曾孫陳掌以衛氏親貴戚􅂅得續封陳氏然終不得周勃沛人也其先卷人徙沛勃以織薄曲為生常為人吹簫給䘮事材官引彊髙祖之為沛公初起勃以中涓從攻胡陵下方與反與戰却適攻豐擊秦軍扵碭東還軍留及蕭復攻碭破之下下邑先登賜爵五大夫攻藺虞取之擊章邯車騎殿定魏地攻爰戚東緡音昏以往至栗取之攻齧桑先登擊秦軍阿下破之追至濮陽下鄄城攻都闗定陶襲取宛朐得單父令夜襲取臨濟攻張以前至卷破之擊李由軍雍邱下攻開封先至城下為多後章邯破殺項梁沛公與項羽引兵東如碭自初起沛還至碭一嵗二月楚懐王封沛公號安武侯為碭郡長沛公拜勃為㐮賁音肥令以令從沛公定魏地攻東郡尉扵成武破之擊王離軍破之攻長社先登攻潁陽緱氏絶河津擊趙賁軍尸北南攻南陽守齮破武闗嶢闗破秦軍扵藍田至咸陽㓕秦項羽至以沛公為漢王漢王賜勃爵威武侯從入漢中拜為将軍還定三秦至秦賜食邑懐徳攻槐里好畤最擊趙賁内史保扵咸陽最北救漆擊章平姚卬軍西定汧還下郿頻陽圍章邯廢邱破西丞擊盗巴軍破之攻上邽東守嶢闗轉擊項籍攻曲遇最還守敖倉追項籍籍已死因東定楚地泗川東海郡凡得二十二縣還守雒陽櫟陽賜與潁陽侯共食鍾離以将軍從髙祖擊燕王臧荼破之易下所将卒當馳道為多賜爵列侯剖符世世勿絶食綘八千二百八十户號絳侯以将軍從髙帝擊韓王信扵代䧏下霍人以前至武泉擊胡騎破之武泉北轉攻韓信軍銅鞮破之還降太原六城擊韓信胡騎晉陽下破之下晉陽復擊韓信軍扵硰石破之追北八十里還攻樓煩三城因擊胡騎平城下所将卒當馳道為多勃遷為太尉擊陳豨屠馬邑所将卒斬豨将軍乗馬豨擊韓信陳豨趙利軍扵樓煩破之得豨将宋最鴈門守圂因轉攻得雲中守遫丞相箕肆将勲定鴈門郡十七縣雲中郡十二縣因復擊豨靈邱破之斬豨得豨丞相程縱将軍陳武都尉髙肆定代郡九縣燕王盧綰反勃以相國代樊噲将擊下薊得綰大将抵丞相偃守陘太尉弱御史大夫施屠渾都破綰軍上藺復擊綰軍沮陽追至長城定上谷十二縣右北平十六縣遼東二十九縣漁陽二十二縣最從髙帝得相國一人丞相二人将軍二千石各三人别破軍二下城三定郡五縣七十九得丞相大将各一人勃為人木彊敦厚髙帝以為可屬大事勃不好文學每召諸生説事東鄉坐責之趣為我語其椎魯少文如此勃既定燕而歸髙帝已崩矣以列侯事惠帝惠帝六年置太尉官以勃為太尉十年髙后崩呂禄以趙王為漢上将軍呂產以呂王為相國秉權欲危劉氏勃與丞相平朱虛侯章共誅諸呂語在髙后紀扵是陰謀以為少帝及濟川淮陽恒山王非皆惠帝子呂太后以計詐名他人子殺其母養之後宮令孝惠子之立以為後用彊呂氏今已㓕諸呂少帝即長用事吾屬無類矣不如視諸侯賢者立之遂迎立代王是為孝文皇帝東牟侯興居朱虛侯章弟也曰誅諸呂臣無功請得除宮廼與太僕汝陰侯滕公入宮滕公前謂少帝曰足下非劉氏不當立廼顧麾左右執㦸皆仆兵罷有數人不肯去宦者令張釋諭告亦去滕公召乗輿車載少帝出少帝曰欲持我安之乎滕公曰就舎少府廼奉天子法駕迎皇帝代邸報曰宮謹除皇帝入未央宮有謁者十人持㦸衛端門曰天子在也足下何為者不得入太尉往喻廼引兵去皇帝遂入是夜有司分部誅濟川淮陽恒山王及少帝扵邸文帝即位以勃為右丞相賜金五千斤邑萬户居月餘人或説勃曰君既誅諸呂立代王威震天下而君受厚賞處尊位以寵久之即禍及身矣勃懼亦自危乃謝請歸相印上許之嵗餘陳丞相平卒上復用勃為丞相十餘月上曰前日吾詔列侯就國或頗未能行丞相朕所重其為朕率列侯之國乃免相就國嵗餘每河東守尉行縣至絳絳侯勃自畏恐誅常被甲令家人持兵以見之其後人有上書告勃欲反下廷尉廷尉下其事長安逮捕勃治之勃恐不知置辭吏稍侵辱之勃以千金與獄吏獄吏乃書牘背示之曰以公主為證公主者孝文帝女也勃太子勝之尚之故獄吏教引為證初勃之益封受賜盡以予薄昭及繫急薄昭為言薄太后太后亦以為無反事文帝朝太后以冐絮提文帝陌額絮也老人所以覆其頭提擲也徒計反曰絳侯綰皇帝璽将兵扵北軍不以此時反今居一小縣顧欲反邪文帝既見勃獄辭乃謝曰吏事方驗而出之扵是使使持節赦勃復爵邑勃既出曰吾嘗将百萬軍然安知獄吏之貴乎勃復就國孝文十一年薨諡武侯子勝之代侯六嵗尚公主不相中坐殺人國除絶一年弟亞夫復為侯亞夫自未侯為河内守時許負相之曰君後三嵗而侯侯八嵗為将相持國秉政貴重矣扵人臣無兩其後九年而餓死亞夫笑曰臣之兄已代父侯矣有如卒子當代亞夫何説侯乎然既已貴如負言又何説餓死指視我許負指其口曰有從理入口此餓死法也居三嵗其兄絳侯勝之有罪文帝擇勃子賢者皆推亞夫乃封亞夫為條侯續絳氏後文帝之後六年匈奴大入邉乃以宗正劉禮為将軍軍霸上祝兹侯徐厲為将軍軍棘門以河内守亞夫為将軍軍細柳以備胡上自勞軍至霸上及棘門軍直馳入将以下騎送迎已而之細柳軍軍士吏被甲鋭兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰将軍令曰軍中聞将軍令不聞天子之詔居無何上至又不得入扵是乃使使持節詔将軍曰吾欲勞軍亞夫乃傳言開壁門壁門士吏謂從屬車騎曰将軍約軍中不得驅馳扵是天子乃按轡徐行至中營将軍亞夫持兵揖曰介胄之士不拜請以軍禮見天子為動改容式車使人稱謝皇帝敬勞将軍成禮而去既出軍門羣臣皆驚文帝曰嗟乎此真将軍也曩者霸上棘門若兒戲耳其将固可襲而虜也至扵亞夫可得而犯邪稱善者久之月餘三軍皆罷乃拜亞夫為中尉文帝且崩時戒太子曰即有緩急周亞夫真可任将兵文帝崩拜亞夫為車騎将軍景帝三年吳楚反亞夫以中尉為太尉東擊吳楚因自請上曰楚兵剽輕難與争鋒願以梁委之絶其糧道乃可制也上許之亞夫既𤼵至霸上趙渉遮説亞夫曰将軍東誅吳楚勝則宗廟安不勝則天下危能用臣之言乎亞夫下車禮而問之渉曰吳王素富懐輯死士久矣此知将軍且行必置間人扵殽黽阸陿之間且兵事尚神密将軍何不從此右去走藍田出武闗抵雒陽間不過差一二日直入武庫擊鳴鼓諸侯聞之以為将軍從天而下也太尉如其計至雒陽使吏搜殽黽間果得吳伏兵乃請渉為䕶軍亞夫既㑹兵滎陽吳方攻梁梁急請救亞夫引兵東北走昌邑深壁而守梁日使使請亞夫亞夫守便宜不肯往梁上書言景帝景帝使使詔救梁亞夫不奉詔堅壁不出而使輕騎兵弓髙侯等絶吳楚兵後食道吳楚兵飢欲退數挑戰終不出夜軍中驚内相攻擊擾亂至扵太尉帳下亞夫堅卧不起頃之復定吳奔壁東南陬亞夫使備西北已而其精兵果奔西北不得入吳楚既餓乃引去亞夫出精兵追擊大破之吳王濞棄其軍而與壮士數千人亡走保扵江南丹徒漢兵因乗勝遂盡虜之降其兵購吳王千金月餘越人斬吳王頭以告凡相攻守三月而吳楚破平扵是諸将乃以太尉計謀為是由此梁孝王與亞夫有隙歸復置太尉官五嵗遷為丞相景帝甚重之上廢栗太子亞夫固争之不得上由此踈之而梁孝王每朝常與竇太后言亞夫之短太后曰皇后兄王信可侯也上譲曰始南皮章武侯先帝不侯及臣即位乃侯之信未得封也竇太后曰人主各以時行耳自竇長君在時竟不得侯死後乃封其子彭祖顧得侯吾甚恨之帝趣侯信也上曰請得與丞相議之亞夫曰髙皇帝約非劉氏不得王非有功不得侯不如約天下共擊之今信雖皇后兄無功侯之非約也上黙然而止後匈奴王徐盧等五人降上欲侯之以勸後亞夫曰彼背其主降陛下陛下若侯之則何以責人臣不守節者乎上曰丞相議不可用乃悉侯之亞夫因謝病免相頃之上居禁中召亞夫賜食獨置大胾無切肉又不置􅀈亞夫心不平顧謂尚席取􅀈上視而笑曰此非不足君所乎亞夫免冠謝上起亞夫因趨出上目送之曰此怏怏者非少主臣也居無何亞夫子為父買工官尚方甲楯五百被可以𦵏者取庸苦之不與錢庸知其盗買縣官器怒而上變告子事連汙亞夫書既聞上下吏吏簿責亞夫亞夫不對上罵之曰吾不用也召詣廷尉廷尉責問曰君侯欲反邪亞夫曰臣所買器乃𦵏器也何謂反邪吏曰君侯縱不欲反地上即欲反地下耳吏侵之益急初吏捕亞夫亞夫欲自殺夫人止之以故不得死遂入廷尉因不食五日歐血而死死後上乃封王信為葢侯國絶一嵗上乃更封勃他子堅為平曲侯續絳氏後傳子建徳有罪國除至平帝元始二年繼絶世復封勃元孫之子恭為絳侯千户樊噲沛人以屠狗為事後與髙祖俱隐扵芒碭山澤間陳勝初起蕭何曹參使噲求迎髙祖立為沛公噲以舎人從攻胡陵方與還守豐擊泗水監豐下破之東定沛破泗水守扵薛西與司馬􅊂戰碭東郤敵斬首十五級賜爵國大夫常從沛公擊章邯軍扵濮陽攻城先登斬首二十三級賜爵列大夫從攻陽城先登下户牖破李由軍斬首十六級賜上聞爵後攻圉尉東郡守尉扵成武郤敵斬首十四級捕虜十六人賜爵五大夫從攻秦軍出亳南河間守軍扵杠里破之擊破趙賁軍開封北以郤敵先登斬侯一人首六十八級捕虜二十六人賜爵卿從攻破揚熊扵曲遇攻宛陵先登斬首八級捕虜四十四人賜爵封號賢成君從攻長社轘轅絶河津東攻秦軍尸鄉南攻秦軍扵犨破南陽守齮扵陽城東攻宛城先登西至酈以郤敵斬首十四級捕虜四十人賜重封攻武闗至霸上斬都尉一人首十級捕虜百四十六降卒二千九百人項羽在麾下欲攻沛公沛公從百餘騎因項伯面見項羽謝無有閉闗事項羽既饗軍士中酒亞父謀欲殺沛公令項荘㧞劍舞坐中欲擊沛公項伯常屏蔽之時獨沛公與張良得入坐樊噲居營外聞事急乃持盾入初入營營衛止噲噲直撞入立帳下瞋目視羽頭髪上指目眦盡裂項羽目之問為誰良曰沛公參乗樊噲也羽曰壮士賜之巵酒彘肩噲既飲酒覆其盾扵地上抜劍切肉食之羽曰能復飲乎噲曰臣死且不辭豈特巵酒乎且沛公先入定咸陽暴師霸上以待大王大王今日至聼小人之言與沛公有隙臣恐天下解心疑大王也羽未有以應之曰坐噲坐有頃沛公如厠麾噲出沛公留車騎獨騎一馬噲與夏侯嬰等四人歩從從山下走歸霸上軍而使張良謝羽羽亦因遂已無誅沛公之心是日微噲奔入營譙譲項羽沛公幾殆後數日羽入屠咸陽立沛公為漢王漢王賜噲爵為列侯號臨武侯遷為郎中從入漢中還定三秦别擊西丞白水北擁輕車騎雍南破之從攻雍漦城先登擊章平軍好畤攻城先登陷陣斬縣令丞各一人首十一級虜二十人遷為郎中騎将從擊秦車騎壌東郤敵遷為将軍攻趙賁下郿槐里柳中咸陽灌廢邱最至櫟陽賜食邑杜之樊鄉從攻項籍屠煮棗擊破王武程處軍扵外黄攻鄒魯瑕邱薛項羽敗漢王扵彭城盡復取魯梁地噲還至滎陽益食平陰二千户以将軍守廣武一嵗項羽引東從髙祖擊項籍下陽夏虜楚周将軍卒四千人圍項籍扵陳大破之屠胡陵項籍死漢王即皇帝位以噲有功益食邑八百户其秋燕王臧荼反噲從攻虜荼定燕地楚王韓信反噲從至陳取信定楚更賜爵列侯與諸侯剖符世世勿絶食舞陽號為舞陽侯除前所食以将軍從攻韓王信扵代自霍人以往至雲中與絳侯等共定之益食千五百户因擊陳豨與曼邱臣軍戰㐮國破柏人先登降之定清河常山凡二十七縣殘東垣遷為左丞相破得綦毋卬尹潘軍扵無終廣昌破豨别将胡人王黄軍代南因擊韓信軍參合軍所将卒斬韓信擊豨胡騎横谷斬将軍趙既虜代丞相馮梁守孫奮大将王黄将軍大将一人太僕解福等十人與諸将共定代鄉邑七十三後燕王盧綰反噲以相國擊綰破其丞相抵抵丞相之名也薊南定燕縣十八鄉邑五十一益食千三百户定食舞陽五千四百户從斬首百七十六級虜二百八十七人别破軍七下城五定郡六縣五十二得丞相一人将軍十三人二千石以下至三百石十二人噲以呂后弟呂􅎐為婦生子伉故其比諸将最親先黥布反時髙帝嘗病惡見人卧禁中詔户者無得入羣臣羣臣絳灌等莫敢入十餘日噲乃排闥直入大臣隨之上獨枕一宦者卧噲等見上流涕曰始陛下與臣等起豐沛定天下何其壮也今天下已定又何憊也且陛下病甚大臣震恐不見臣等計事顧獨與一宦者絶乎且陛下獨不見趙髙之事乎髙帝笑而起其後盧綰反髙帝使噲以相國擊燕是時髙帝病甚人有惡噲黨扵呂氏即上一日宮車晏駕則噲欲以兵誅戚氏趙王如意之屬髙帝大怒乃使陳平載絳侯代将而即軍中斬噲陳平畏呂后執噲詣長安至則髙帝已崩呂后釋噲得復爵邑孝惠六年噲薨諡武侯子伉嗣而伉母呂嬃亦為臨光侯髙后時用事專權大臣盡畏之髙后崩大臣誅呂􅎐等因誅伉舞陽侯中絶數月孝文帝立乃復封噲庶子市人為侯復故邑薨諡荒侯子佗廣嗣六嵗其舍人上書言荒侯市人病不能為人不能為人言無人道也令其夫人與其弟亂而生佗廣佗廣實非荒侯子下吏免平帝元始二年繼絶世封噲元孫之子章為陽武侯邑千户酈商髙陽人也陳勝起商聚少年得數千人沛公略地至陳留六月餘商以将卒四千人屬沛公扵岐從攻長社先登賜爵信成君從攻緱氏絶河津破秦軍雒陽東從下宛穣定十七縣别将攻旬闗西定漢中沛公為漢王賜爵信成君以将軍為隴西都尉别定北地上郡破章邯别将扵烏氏栒邑泥陽賜食邑武城六千户從擊項籍軍與鍾離昧戰受梁相國印益食四千户從擊項羽二嵗攻胡陵漢王即帝位燕王臧荼反商以将軍從擊荼戰龍脱先登陷陣破荼軍易下郤敵遷為右丞相賜爵列侯與諸侯剖符世世勿絶食邑涿郡五千户别定上谷因攻代受趙相國印與絳侯等定代郡鴈門得代丞相程縱守相郭同将軍以下至六百石十九人還以将軍為太上皇衛一嵗十月以右丞相擊陳豨殘東垣又從擊黥布攻其前垣陷兩陳得以破布軍更封為曲周侯食邑五千一百户除前所食凡别破軍三降定郡六縣七十三得丞相守相大将軍各一人小将軍一人二千石以下至六百石十九人商事孝惠帝呂后呂后崩商疾不治事其子寄字况與呂禄善及髙后崩大臣欲誅諸呂呂禄為将軍軍扵北軍太尉勃不得入北軍扵是乃使人刧商令其子寄紿呂禄呂禄信之與出㳺而太尉勃乃得入據北軍遂以誅諸呂商是嵗薨諡景侯子寄嗣天下稱酈况賣友景帝時吳楚齊趙反上以寄為将軍圍趙城七月不能下欒布自平齊來乃㓕趙孝景中二年寄欲取平原君為夫人平原君景帝王皇后母臧兒也景帝怒下寄吏免上乃封商他子堅為繆侯奉商後傳至元孫終根武帝時為太常坐巫蠱誅國除元始中賜髙祖時功臣自酈商以下子孫爵皆闗内侯食邑凡百餘人夏侯嬰沛人也為沛廐司御每送使客還過泗水亭與髙祖語未嘗不移日也嬰已而試補縣吏與髙祖相愛髙祖戲而傷嬰人有告髙祖髙祖時為亭長重坐傷人為吏傷人其罪重告故不傷嬰嬰證之移獄覆嬰坐髙祖繫嵗餘掠笞數百終脱髙祖髙祖之初與徒屬欲攻沛也嬰時以縣令史為髙祖使上降沛一日髙祖為沛公賜爵七大夫以嬰為太僕常奉車從攻胡陵平嬰與蕭何降泗水監平平以胡陵降賜嬰爵五大夫從擊秦軍碭東攻濟陽下户牖破李由軍雍邱以兵車趣攻戰疾破之賜爵執帛從擊章邯軍東阿濮陽下以兵車趣攻戰疾破之賜爵執珪從擊趙賁軍開封楊熊軍曲遇嬰從捕虜六十八人降卒八百五十人得印一匱又擊秦軍雒陽東以兵車趣攻戰疾賜爵封轉為滕令因奉車從攻定南陽戰扵藍田芷陽至霸上沛公為漢王賜嬰爵列侯號昭平侯復為太僕從入蜀漢還定三秦從擊項籍至彭城項羽大破漢軍漢王不利馳去見孝惠魯元載之漢王急馬罷虜在後常蹳兩兒棄之嬰常收載行面雍樹馳蘇林曰南方人謂抱小兒為擁樹面者以面首向臨之也漢王怒欲斬嬰者十餘卒得脱而致孝惠魯元扵豐漢王既至滎陽收散兵復振賜嬰食邑沂陽擊項籍下邑追至陳卒定楚至魯益食兹氏漢王即帝位燕王臧荼反嬰從擊荼眀年從至陳取楚王信更食汝陰剖符世世勿絶從擊代至武泉雲中益食千户因從擊韓王信軍胡騎晉陽旁大破之追北至平城為胡所圍七日不得通髙祖使使厚遺閼氏冐頓乃開其圍一角髙帝出欲馳嬰固徐行弩皆持滿外鄉卒以得脱益食嬰細陽千户從擊胡騎句注北大破之擊胡騎平城南三陷陳功為多賜所奪邑五百户從擊陳豨黥布軍陷陣郤敵益千户定食汝陰六千九百户除前所食嬰自上初起沛常為太僕竟髙祖崩以太僕事惠帝及髙后髙后徳嬰之脱孝惠魯元扵下邑間也乃賜嬰縣北第第一曰近我以尊異之惠帝崩以太僕事髙后髙后崩代王之來嬰以太僕與東牟侯入清宮廢少帝以天子法駕迎代王代邸與大臣共立文帝復為太僕八年薨諡文侯傳至曾孫頗尚平陽公主坐與父御婢姦自殺國除初嬰為滕令奉車故號滕公及曾孫頗尚主主隨外家姓號孫公主故滕公子孫為孫氏灌嬰睢陽販繒者也髙祖為沛公畧地至雍邱章邯殺項梁而沛公還軍扵碭嬰以中涓從擊破東郡尉扵成武及秦軍扵杠里疾鬭賜爵七大夫又從攻秦軍亳南開封曲遇戰疾力賜爵執帛號宣陵君從攻陽武以西至雒陽破秦軍尸北北絶河津南破南陽守齮陽城東遂定南陽郡西入武闗戰扵藍田力疾至霸上賜爵執圭號昌文君沛公為漢王拜嬰為郎中從入漢中十月拜為中謁者從還定三秦下櫟陽降塞王還圍章邯廢邱未拔從東出臨晉闗擊降殷王定其地擊項羽将龍且魏相項佗軍扵定陶南疾戰破之賜嬰爵列侯號昌文侯食杜平鄉復以中謁者從降下碭以至彭城項羽擊破漢王漢王遁而西嬰從還軍扵雍邱王武魏公申徒反從擊破之攻下外黄西收軍扵滎陽楚騎來衆漢王乃擇軍中可以為騎将者皆推故秦騎士重泉人李必駱甲習騎兵今為校尉可為騎将漢王欲拜之必甲曰臣故秦民恐軍不信臣臣􅂅得大王左右善騎者傅之嬰雖少然數力戰乃拜嬰為中大夫令李必駱甲為左右校尉将郎中騎兵擊楚騎扵滎陽東大破之受詔别擊楚軍後絶其饟道起陽武至襄邑擊項羽之将項冠扵魯下破之所将卒斬左右馬騎将各一人擊破柘公王武軍扵燕西所将卒斬樓煩将五人連尹一人擊王武别将桓嬰白馬下破之所将卒斬都尉一人以騎渡河南送漢王到雒陽從北迎相國韓信軍扵邯郸還至敖倉嬰遷為御史大夫三年以列侯食邑杜平鄉受詔将郎中騎兵東屬相國韓信擊破齊軍扵歴下所将卒虜車騎将華毋傷及将吏四十六人降下臨淄得相田光追齊相田横至嬴博擊破其騎所将卒斬騎将一人生得騎将四人攻下嬴博破齊将軍田吸扵千乗斬之東從韓信攻龍且留縣名公扵假密卒斬龍且生得右司馬連尹各一人樓煩将十人身生得亞将周蘭齊地已定韓信自立為齊王使嬰别将擊楚将公杲扵魯北破之轉南破薛郡長身虜騎将入攻博陽前至下相以東南僮取慮取音趨又音秋慮音廬徐度淮盡降其城邑至廣陵項羽使項聲薛公郯公復定淮北嬰渡淮擊破項聲郯公下邳斬薛公下下邳壽春擊破楚騎平陽遂降彭城虜柱國項佗降留薛沛鄼蕭相攻苦譙復得亞将與漢王㑹頤鄉從擊項籍軍陳下破之所将卒斬樓煩将二人虜将八人賜益食邑二千五百户項籍敗垓下去也嬰以御史大夫将車騎别追項籍至東城破之所将卒五人共斬項籍皆賜爵列侯降左右司馬各一人卒萬二千盡得其軍将吏下東城歴陽渡江破吳郡長吳下得吳守遂定吳豫章㑹稽郡還定淮北凡五十二縣漢王即帝位賜益嬰邑三千户以車騎将軍從擊燕王臧荼眀年從至陳取楚王信還剖符世世勿絶食潁陰二千五百户號曰潁陰侯從擊韓王信扵代至馬邑别降樓煩以北六縣斬代左将破胡騎将扵武泉北復從擊信胡騎晉陽下所将卒斬胡白題将一人又受詔并将燕趙齊梁楚車騎擊破胡騎扵硰石至平城為胡所困從擊陳豨别攻豨丞相侯敞軍曲逆下破之卒斬敞及特将五人降曲逆盧奴上曲陽安國安平攻下東垣黥布反以車騎将軍先出攻布别将扵相破之斬亞将樓煩将三人又進擊破布上柱國及大司馬軍又進破布别将肥銖嬰身生得左司馬一人所将卒斬其小将十人追北至淮上益食邑二千五百户布已破髙帝歸定令嬰食潁陰五千户除前所食邑凡從所得二千石二人别破軍十六降城四十六定國一郡二縣五十二得将軍二人柱國相各一人二千石十人嬰自破布歸髙帝崩以列侯事惠帝及呂后呂后崩呂禄等欲為亂齊哀王聞之舉兵而西呂禄等以嬰為大将軍往擊之嬰至滎陽乃與絳侯等謀因屯兵滎陽風齊王以誅諸呂事齊兵止不前絳侯等既誅諸呂齊王罷兵歸嬰自滎陽還與絳侯共立文帝扵是益封嬰三千户賜金千斤為太尉三嵗絳侯勃免相嬰為丞相罷太尉官是嵗匈奴大入北地上令丞相嬰将騎八萬五千擊匈奴匈奴去濟北王反詔罷嬰兵後嵗餘以丞相薨諡曰懿侯傳至孫彊有罪絶武帝復封嬰孫賢為臨汝侯奉嬰後後有罪國除傅寛以魏五大夫騎将從沛公為舎人起横陽從攻安陽杠里趙賁軍扵開封及擊楊熊曲遇武陽斬首十二級賜爵卿從至霸上沛公為漢王賜寛封號共徳君從入漢中為右騎将定三秦賜食邑雕陰從擊項籍待懐賜爵通徳侯從擊項冠周蘭龍且所将卒斬騎将一人敖下益食邑屬淮陰擊破齊歴下軍擊田解屬相國參殘博益食邑因定齊地剖符世世勿絶封陽陵侯二千六百户除前所食為齊右丞相備齊五嵗為齊相國四月擊陳豨屬太尉勃以相國代丞相噲擊豨一月徙為代相國将屯二嵗為丞相将屯孝惠五年薨諡景侯傳至曾孫偃謀反誅國除靳歙以中涓從起宛朐攻濟陽破李由軍擊秦軍開封東斬騎千人将二人首五十七級捕虜七十三人賜爵封臨平君又戰藍田北斬車司馬二人騎長一人首二十八級捕虜五十七人至霸上沛公為漢王賜歙爵建武侯遷騎都尉從定三秦别西擊章平軍扵隴西破之定隴西六縣所将卒斬車司馬候各四人騎長十二人從東擊楚至彭城漢軍敗還保雍邱擊反者王武等畧梁地别西擊邢説軍菑南破之身得説都尉二人司馬候十二人降吏卒四千六百八十人破楚軍滎陽東食邑四千二百户别之河内擊趙賁軍朝歌破之所将卒得騎将二人車馬二百五十匹從攻安陽以東至棘蒲下十縣别攻破趙軍得其将司馬二人侯四人降吏卒二千四百人從降下邯郸别下平陽身斬守相所将卒斬兵守郡一人降鄴從攻朝歌邯郸及别擊破趙軍降邯郸六縣還軍敖倉破項籍軍成臯南擊絶楚饟道起滎陽至襄邑破項冠魯下畧地東至鄫郯下邳南至蘄竹邑擊項悍濟陽下還擊項籍軍陳下破之别定江陵降柱國大司馬以下八人身得江陵王致雒陽因定南郡從至陳取楚王信剖符世世勿絶定食四千六百户為信武侯以騎都尉從擊代攻韓信平城下還軍東垣有功遷為車騎将軍并将梁趙齊燕楚車騎别擊陳豨丞相敞破之因降曲逆從擊黥布有功益封定食邑五千三百户凡斬首九十級虜百四十二人别破軍十四降城五十九定郡國各一縣二十三得王柱國各一人二千石以下至五百石三十九人髙后五年薨諡肅侯子亭嗣有罪國除周緤息列反沛人也以舎人從髙祖起沛至霸上西入蜀漢還定三秦常為參乗賜食邑池陽從東擊項羽滎陽絶甬道從出度平陰遇韓信軍襄國戰有利有不利終亡離上心上以緤為信武侯食邑三千三百户上欲自擊陳豨緤泣曰始秦攻破天下未曾自行今上常自行是亡人可使者乎上以為愛我賜入殿門不趨十二年更封緤為䣙城侯䣙音薄催反又音普肯反屬長沙孝文五年薨諡貞侯子昌嗣有罪國除景帝復封緤子應為鄲侯鄲音多寒反屬沛國薨諡康侯子仲居嗣坐為太常有罪國除張蒼陽武人也好書律歴秦時為御史主柱下方書方版也有罪亡歸及沛公畧地過陽武蒼以客從攻南陽蒼坐法當斬解衣伏質身長大肥白如瓠王陵見而怪其美士乃言沛公赦勿斬遂西入武闗至咸陽沛公立為漢王入漢中還定三秦陳餘擊走常山王張耳耳歸漢漢以蒼為常山守從韓信擊趙蒼得陳餘趙地已平漢王以蒼為代相備邉㓂已而徙為趙相相趙王耳及耳卒相其子敖復徙相代燕王臧荼反蒼以代相從攻荼有功封為北平侯食邑千二百户遷為計相專主計籍故號計相一月更以列侯為主計四嵗去計相之名更號主計是時蕭何為相國而蒼乃自秦時為柱下御史眀習天下圖書計籍又善用算律歴故令蒼以列侯居相府領主郡國上計者黥布反漢立皇子長為淮南王而蒼相之十四年遷為御史大夫與絳侯等尊立文帝四年代灌嬰為丞相漢興二十餘年天下初定将相公卿皆軍吏蒼為計相時緒正律歴以髙祖十月始至霸上故因秦時本十月為嵗首不革推五徳之運以為漢當水徳之時尚黒如故吹律調樂入之聲音及以比定律令若百工天下作程品至扵為丞相卒就之故漢家言律歴者本張蒼蒼尤好書無所不觀無所不通而尢邃律歴蒼徳安國侯王陵及貴父事陵陵死後蒼為丞相洗沐常先朝陵夫人上食然後敢歸家蒼為丞相十餘年魯人公孫臣上書陳終始五徳傳言漢土徳時其符黄龍見當改正朔易服色事下蒼蒼以為非是罷之其後黄龍見成紀扵是文帝召公孫臣以為博士草立土徳時歴制度更元年蒼由此自絀謝病稱老蒼任人為中候大為姦利上以為讓蒼遂病免孝景五年薨諡文侯傳子至孫類有罪國除初蒼父長不滿五尺蒼長八尺餘蒼子復長八尺及孫類長六尺餘蒼免相後口中無齒食乳女子為乳母妻妾以百數嘗孕者不復幸年百餘嵗乃卒著書十八篇言陰陽律歴事周昌沛人也其從兄苛音何秦時皆為泗水卒吏髙祖起沛擊破泗水守監扵是苛昌以卒吏從沛公沛公以昌為職志志與幟同式異反職志主旗志也苛為客從入闗破秦沛公立為漢王以苛為御史大夫昌為中尉漢三年楚圍漢王滎陽急漢王出去而使苛守滎陽城楚破滎陽城欲令苛将苛罵曰若趣降漢王不然今為虜矣項羽怒亨苛漢王扵是拜昌為御史大夫常從擊項籍六年與蕭曹等俱封為汾陰侯苛子成以父死事封為髙景侯昌為人彊力敢直言自蕭曹等皆卑下之昌嘗燕入奏事髙帝方擁戚姬昌還走髙帝逐得騎昌項問曰我何如主也昌仰曰陛下即桀紂之主也扵是上笑之然尤憚昌及髙帝欲廢太子而立戚姬子如意為太子大臣固争莫能得上以留侯策止而昌廷争之彊上問其説昌為人吃又盛怒曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔上欣然而笑即罷呂后側耳扵東廂聼見昌為跪謝曰微君太子幾廢是後戚姬子如意為趙王年十嵗髙祖憂萬嵗之後不全也趙尭時為符璽御史趙人方與公謂昌曰君之史趙尭年雖少然奇士君必異之是且代君之位昌笑曰尭年少刀筆吏耳何至是乎居頃之尭侍髙祖髙祖獨心不樂悲歌羣臣不知上所以然尭進請間曰陛下所為不樂非以趙王年少而戚夫人與呂后有隙備萬嵗之後而趙王不能自全乎髙祖曰我私憂之不知所出尭曰陛下獨為趙王置貴彊相及呂后太子羣臣素所敬憚者乃可髙祖曰然吾念之欲如是而羣臣誰可者尭曰御史大夫昌其人堅忍伉直自呂后太子及大臣皆素嚴憚之獨昌可髙祖曰善扵是召昌謂曰吾固欲煩公公彊為我相趙昌泣曰臣初起從陛下陛下獨奈何中道而棄之扵諸侯乎髙祖曰吾極知其左遷然吾私憂趙王念非公無可者公不得不彊行扵是徙昌為趙相既行久之髙祖持御史大夫印㺯之曰誰可以為御史大夫者熟視尭曰無以易尭遂拜尭為御史大夫尭亦前有軍功食邑及以御史大夫從擊陳豨有功封為江邑侯髙祖崩太后使使召趙王其相昌令王稱疾不行使者三反昌曰髙帝屬臣趙王王年少竊聞太后怒戚夫人欲召趙王并誅之臣不敢遣王且亦疾不能奉詔太后怒乃使使召趙相相至謁太后太后罵昌曰爾不知我之怨戚氏乎而不遣趙王何也昌既被徵髙后使使召趙王王果來至長安月餘見鴆殺昌謝病不朝見三嵗而薨諡悼侯傳子至孫意有罪國除景帝復封昌孫左車為安陽侯有罪國除初趙尭既代周昌為御史大夫髙祖崩事惠帝終世髙后元年怨尭前定趙王如意之畫乃抵堯罪以廣阿侯任敖為御史大夫任敖沛人也少為獄吏髙祖嘗避吏吏繫呂后遇之不謹任敖素善髙祖怒擊傷主呂后吏及髙祖初起敖以客從為御史守豐二嵗髙祖立為漢王東擊項籍敖遷為上黨守陳豨反時敖堅守封為廣阿侯食邑千八百户髙后時為御史大夫三嵗免孝文元年薨諡懿侯傳子至曾孫越人坐為太常廟酒酸不敬國除申屠嘉梁人也以材官蹶張從髙帝擊項籍遷為隊率從擊黥布為都尉孝惠時為淮陽守孝文元年舉故以二千石從髙祖者悉以為闗内侯食邑三十四人而嘉食邑五百户十六年遷為御史大夫張蒼免相文帝以皇后弟竇廣國賢有行欲相之曰恐天下以吾私廣國久念不可而髙帝時大臣餘見無可者乃以嘉為丞相因故邑封為故安侯嘉為人廉直門不受私謁是時太中大夫鄧通方愛幸賞賜累鉅萬文帝常燕飲通家其見寵如是是時嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下愛幸羣臣則富貴之至扵朝廷之禮不可以不肅上曰君勿言吾私之罷朝坐府中嘉為檄召通詣丞相府不來且斬通通恐入言上上曰汝第往吾今使人召若通至府免冠徒跣頓首謝嘉嘉坐自如弗為禮責曰夫朝廷者髙皇帝之朝廷也通小臣戲殿上大不敬當斬史今行斬之通頓首首盡出血不解上度丞相已困通使使持節召通而謝丞相曰此吾弄臣君其釋之鄧通既至為上泣曰丞相幾殺臣嘉為丞相五嵗文帝崩孝景即位二年鼂錯為内史貴幸用事諸法令多所請變更議以適罰侵削諸侯而丞相嘉自絀所言不用疾錯錯為内史門東出不便更穿一門南出南出者太上皇廟堧垣也嘉聞錯穿宗廟垣為奏請誅錯客有語錯錯恐夜入宮上謁自歸上至朝嘉奏請誅錯上曰錯所穿非真廟垣故冗官居其中且又我使為之錯無罪罷朝嘉謂長史曰吾悔不先斬錯乃請之為錯所賣至舍因歐血而死諡節侯傳子至孫臾有罪國除自嘉死後開封侯陶青桃侯劉舎及武帝時柏至侯許昌平棘侯薛澤武彊侯荘青翟商陵侯趙周皆以列侯繼踵􅐅􅐅初角反持忍之貎廉謹為丞相備員而已無所能發眀功名著扵世者酈食其陳留髙陽人也好讀書家貧落魄無衣食業為里監門然吏縣中賢豪不敢役皆謂之狂生及陳勝項梁等起諸将徇地過髙陽者數十人食其聞其将皆握齱好荷禮自用齱初角反握齱急促之貎荷與苛同細也不能聽大度之言食其乃自匿後聞沛公畧地陳留郊沛公麾下騎士適食其里中子也沛公時時問邑中賢豪騎士歸食其見謂曰吾聞沛公嫚易人有大畧此真吾所􅂅從㳺莫為我先若見沛公謂曰臣里中有酈生年六十餘身長八尺人皆謂之狂生自謂我非狂騎士曰沛公不喜儒諸客冠儒冠來者沛公輙解其冠溺其中與人言常大罵未可以儒生説也食其曰第言之騎士從容言食其所戒者沛公至髙陽傳舎使人召食其食其至入謁沛公方踞牀令兩女子洗而見食其食其入即長揖不拜曰足下欲助秦攻諸侯乎欲率諸侯破秦乎沛公罵曰竪儒夫天下同苦秦久矣故諸侯相率攻秦何謂助秦食其曰必欲聚徒合義兵誅無道秦不宜踞見長者扵是沛公輟洗起衣延食其上坐謝之食其因言六國縱衡時沛公喜賜食其食問曰計安出食其曰足下起瓦合之卒收散亂之兵不滿萬人欲以徑入彊秦此所謂探虎口者也夫陳留天下之衝四通五達之郊今其城中又多積粟臣知其令今請使令下足下即不聽足下舉兵攻之臣為内應扵是遣食其往沛公引兵隨之遂下陳留號食其為廣野君食其言弟商使将數千人從沛公西南畧地食其常為説客馳使諸侯漢二年秋項羽擊漢拔滎陽漢兵遁保鞏楚人聞韓信破趙彭越數反梁地則分兵救之韓信方東擊齊漢王數困滎陽成臯計欲捐成臯以東屯鞏雒以距楚食其因言曰臣聞之知天之天者王事可成其不知天之天者王事不可成王者以民為天而民以食為天夫敖倉天下轉輸久矣臣聞其下乃有藏粟甚多楚人拔滎陽不堅守敖倉乃引而東令適卒分守成臯此乃天所以資漢方令楚易取而漢反郤自奪便臣竊以為過矣且兩雄不俱立楚漢久相持不决百姓騷動海内摇蕩農夫釋耒紅讀工女下機天下之心未有所定也􅂅足下急復進兵收取滎陽據敖庾之粟塞成臯之險杜太行之道距飛狐之口守白馬之津以示諸侯形制之埶則天下知所歸矣方今燕趙以定惟齊未下今田廣據千里之齊田間将二十萬之衆軍扵歴城諸田宗彊負海岱阻河濟南近楚齊人多變詐足下雖遣數十萬師未可以嵗月破也臣請得奉眀詔説齊王使為漢稱東藩上曰善乃從其畫復守敖倉而使食其説齊王曰王知天下之所歸乎曰不知也曰知天下之所歸則齊國可得而有也若不知天下之所歸即齊國未可保也齊王曰天下何歸食其曰天下歸漢齊王曰先生何以言之曰漢王與項王戮力西面擊秦約先入咸陽者王之項王背約王之漢中而遷殺義帝漢王起蜀漢之兵擊三秦出闗而責義帝之負處收天下之兵立諸侯之後降城即以侯其将得賂則以分其士與天下同其利豪英賢材皆樂為之用諸侯之兵四面而至蜀漢之粟方舡而下項王有背約之名殺義帝之負扵人之功無所記扵人之罪無所忘戰勝而不得其賞拔城而不得其封非項氏莫得用事為人刻印玩而不能授攻城得賂積財而不能賞天下畔之賢才怨之而莫為之用故天下之士歸扵漢王可坐而策也夫漢王發蜀漢定三秦渉西河之外援上黨之兵下井陘誅成安君破北魏舉三十二城此黄帝之兵非人之力天之福也今已據敖庾之粟塞成臯之險守白馬之津杜太行之阸距飛狐之口天下後服者先亡矣王疾下漢王齊國社稷可得而保也不下漢王危亡可立而待也田廣以為然乃聽食其罷歴下兵守戰備與食其日縱酒韓信聞食其馮軾下齊七十餘城乃夜度兵平原襲齊齊王田廣聞漢兵至以為食其賣己乃亨食其引兵走漢十二年曲周侯酈商以丞相将兵擊黥布有功髙祖舉功臣思食其食其子疥數将兵上以其父故封疥為髙梁侯後更食武陽卒子遂嗣三世侯平有罪國除太史公重敘酈生之事曰初沛公引兵過陳留酈生踵軍門上謁曰髙陽賤民酈食其竊聞沛公将兵助楚誅不義敬勞從者􅂅得望見口畫天下便事使者入通沛公方洗問使者曰何如人也使者對曰状貎類大儒衣儒衣冠側注沛公曰為我謝之言我方以天下為事未暇見儒人也使者出謝曰沛公敬謝先生方以天下為事未暇見儒人也酈生嗔目按劍叱使者曰走復入言沛公吾髙陽酒徒也非而人也使者懼而失謁跪拾謁還走復入報曰客天下壮士也叱臣臣恐至失謁曰走復入言而公髙陽酒徒也沛公據雪足杖矛曰延客入酈生入揖沛公曰足下甚苦暴衣露冠将兵助楚討不義足下何不自喜也臣願以事見而曰吾方以天下為事未暇見儒人也夫足下欲興天下之大事而成天下之大功而以目皮相恐失天下之能士且吾度足下之智不如吾勇又不如吾若欲就天下而不相見竊為足下失之沛公謝曰鄉者聞先生之容今見先生之意矣乃延而坐之問所以取天下者酈生曰夫足下欲成大功不如止陳留陳留者天下之據衝也兵之㑹地也積粟數千萬石城守甚堅臣素善其令􅂅為足下説之不聽臣臣請為足下殺之而下陳留足下将陳留之衆據陳留之城而食其積粟招天下之從兵從兵已成足下横行天下莫能有害足下矣沛公曰敬聞命矣扵是酈生乃夜見陳留令説之曰夫秦為無道而天下畔之今足下與天下從則可以成大功今獨為亡秦嬰城而堅守臣竊為足下危之陳留令曰秦法至重也不可以妄言妄言者無類吾不可以應先生所以教臣者非臣之意也􅂅勿復道酈生留宿卧夜半時斬陳留令首踰城而下報沛公沛公引兵攻城縣令首扵長竿以示城上人曰趣下而令頭已斷矣今後下者必先斬之扵是陳留人見令已死遂相率而下沛公沛公舎陳留南城門上因其庫兵食積粟留出入三月從兵以萬數遂入破秦陸賈楚人也以客從髙祖定天下名有口辯居左右常使諸侯時中國初定尉佗下南越因王之髙祖使賈賜佗印為南粤王賈至尉佗魋結箕踞見賈賈因説佗曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帯欲以區區之越與天子抗衡為敵國禍且及身矣夫秦失其正諸侯豪傑並起唯漢王先入闗據咸陽項籍背約自立為西楚霸王諸侯皆屬可謂至彊矣然漢王起巴蜀鞭笞天下劫畧諸侯遂誅項羽五年之間海内平定此非人力天之所建也天子聞君王王南越而不助誅暴逆将相欲移兵而誅王天子憐百姓新勞苦且休之遣臣授君王印剖符通使君王宜郊迎北面稱臣乃欲以新造未集之越屈彊扵此漢誠聞之掘焼君王先人冢墓夷種宗族使一偏将将十萬衆臨越即越殺王降漢如反覆手耳扵是佗蹶然起坐謝賈曰居蠻夷中久殊失禮義因問賈曰我孰與蕭何曹參韓信賢賈曰王似賢也復問曰我孰與皇帝賢賈曰皇帝起豐沛討暴秦誅彊楚為天下興利除害繼五帝三皇之業統天下理中國中國之人以億計地方萬里居天下之膏腴人衆車輿萬物殷富政由一家自天地剖判未始有也今王衆不過數萬皆蠻夷﨑嶇山海間譬若漢一郡王何乃比扵漢佗大笑曰吾不起中國故王此使我居中國何遽不若漢乃大説賈留與飲數月曰越中無足與語至生來令我日聞所不聞賜賈槖中装直千金他送亦千金賈卒拜佗為南越王令稱臣奉漢約歸報髙帝大説拜賈為太中大夫賈時時前説稱詩書髙帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且湯武逆取而以順守之文武並用長久之術也昔者吳王夫差智伯極武而亡秦任刑法不變卒㓕趙氏秦之先造父封扵趙城故亦冐趙氏鄉使秦已并天下行仁義法先聖陛下安得而有之髙帝不懌有慙色謂賈曰試為我著秦所以失天下吾所以得之者及古成敗之國賈乃粗述存亡之徵凡著十二篇每奏一篇髙帝未嘗不稱善左右呼萬嵗稱其書曰新語孝惠時呂太后用事欲王諸呂畏大臣及有口者賈自度不能争之乃病免以好畤田地善住家焉有五男乃出所使越得槖中装賣千金分其子子二百金令為生產賈常乗安車駟馬從歌鼓瑟侍者十餘人寳劍直百金謂其子曰與女約過女女給人馬酒食極欲十日而更所死家得寳劍車騎侍從者一嵗中以往來過他客率不過再過數擊鮮毋久溷女為也呂太后時王諸呂諸呂擅權欲劫少主危劉氏右丞相平患之力不能争恐禍及己平嘗宴居深念賈往不請直入坐平方念不見賈賈曰何念深也平曰生揣我何念賈曰足下位為上相食三萬户侯可謂極富貴無欲矣然有憂念不過患諸呂少主耳平曰然為之奈何賈曰天下安注意相天下危注意将将相和則士豫附士豫附天下雖有變則權不分權不分為社稷計在兩君掌握耳臣常欲語太尉絳侯絳侯與我戲易吾言君何不交驩太尉深相結為陳平畫呂氏數事平用其計乃以五百金為絳侯壽厚具樂飲太尉太尉亦報如之兩人深相結呂氏謀益壞陳平乃以奴婢百人車馬五十乗錢五十萬遺賈為飲食費賈以此逰漢廷公卿間名聲籍甚及誅諸呂立孝文賈頗有力孝文即位欲使人之南越丞相平乃言賈為太中大夫使尉佗去黄屋稱制令比諸侯皆如意指語在南越𫝊陸生竟以壽終朱建楚人也故嘗為淮南王黥布相有罪去後復事布布欲反時問建建諌止之布不聽聽梁父侯遂反漢既誅布聞建諫之即賜建號平原君家徙長安為人辯有口刻㢘剛直行不苟合義不取容辟陽侯行不正得幸呂太后欲知建建不肯見及建母死貧未有以發䘮方假貣服具陸賈素與建善乃見辟陽侯賀曰平原君母死辟陽侯曰平原君母死何乃賀我陸生曰前日君侯欲知平原君平原君義不知君以其母故今其母死君誠厚送䘮則彼為君死矣辟陽侯乃奉百金裞式芮反贈終者衣被曰裞列侯貴人以辟陽侯故往賻凡五百金久之人或毁辟陽侯惠帝大怒下吏欲誅之太后慙不可言大臣多害辟陽侯行欲遂誅之辟陽侯困急使人欲見建建辭曰獄急不敢見君建乃求見惠帝幸臣閎籍孺説曰君所以得幸帝天下莫不聞今辟陽侯幸太后而下吏道路皆言君讒欲殺之今日辟陽侯誅旦日太后含怒亦誅君君何不肉袒為辟陽侯言帝帝聽君出辟陽侯太后大驩兩主俱幸君君富貴益倍矣扵是閎籍孺大恐從其計言帝帝果出辟陽侯初辟陽侯之囚欲見建建不見辟陽侯以為背之大怒及其成功出之大驚呂太后崩大臣誅諸呂辟陽侯扵諸呂至深卒不誅計畫所以全者皆陸生平原君之力也孝文時淮南厲王殺辟陽侯以黨諸呂故孝文聞其客朱建為其䇿使吏捕欲治聞吏至門建欲自殺諸子及吏皆曰事未可知何自殺為建曰我死禍絶不及乃身矣遂自剄文帝聞而惜之曰吾無殺建意也乃召其子拜為中大夫使匈奴單于無禮罵單于遂死匈奴中婁敬齊人也漢五年戍隴西過雒陽髙祖在焉敬脱輓輅衣羊裘見齊人虞将軍曰臣􅂅見上言便宜虞将軍欲與鮮衣敬曰臣衣帛衣帛見衣褐衣褐見不敢易衣虞将軍入言上上召見賜食已而問敬敬説曰陛下都雒陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周異周之先自后稷尭封之邰積徳累善十餘世公劉避桀居􅃎太王以狄伐故去􅃎杖馬箠居岐國人争歸之及文王為西伯斷虞芮訟始受命呂望伯夷自海濵來歸之武王伐紂不期而會孟津上八百諸侯遂㓕殷成王即位周公之屬傅相焉乃營成周都雒以為此天下中諸侯四方納貢職道里鈞矣有徳則易以王無徳則易以亡凡居此者欲令務以徳致人不欲依險阻令後世奢驕以虐民也及周之盛時天下和洽四夷鄉風慕義懷徳附離而並事天子不屯一卒不戰一士八夷大國之民莫不賔服効其職貢及周之衰也分而為兩天下莫朝周不能制非其徳薄也而形埶弱也今陛下起豐沛收卒三千人以之徑往卷蜀漢定三秦與項籍戰滎陽爭成臯之口大戰七十小戰四十使天下之民肝腦塗地父子暴骸中野不可勝數哭泣之聲不絶傷夷者未起而欲比隆扵成康之時臣竊以為不侔矣且夫秦地被山帯河四塞以為固卒然有急百萬之衆可具因秦之故資甚美膏腴之地此所謂天府者也陛下入闗而都之山東雖亂秦之故地可全而有也夫與人闘不搤其亢拊其背未能全勝今陛下入闗而都按秦之故地此亦搤天下之亢而拊其背也髙帝問羣臣羣臣皆山東人爭言周王數百年秦二世則亡不如都周上未能决及留侯眀言入闗便即日車駕西都闗中扵是上曰本言都秦地者婁敬婁者劉也賜姓劉氏拜為郎中號曰奉春君漢七年韓王信反上自擊之至晉陽聞信與匈奴欲共擊漢上大怒使人使匈奴匈奴匿其壮士肥牛馬徒見其老弱及羸畜使者十軰來皆言匈奴易擊上使劉敬復往使匈奴還報曰兩國相擊此宜夸矜見所長今臣往徒見羸瘠老弱此必欲見短伏竒兵以爭利愚以為匈奴不可擊也是時漢兵已踰句注三十餘萬衆兵已業行上怒罵敬曰齊虜以舌得官乃今妄言沮吾軍械繫敬廣武遂往至平城匈奴果出竒兵圍帝白登七日然後得解髙帝至廣武赦敬曰吾不用公言以困平城吾已斬先使十軰言可擊者矣乃封敬二千户為闗内侯號建信侯髙帝罷平城歸韓王信亡入胡當是時冐頓單于兵彊控弦四十萬騎數苦北邉上患之問敬敬曰天下初定士卒罷扵兵革未可以武服也冐頓殺父代立妻羣母以力為威未可以仁義説也獨可以計久逺子孫為臣耳然陛下恐不能為上曰誠可何為不能敬曰陛下誠能以適長公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代單于何者貪漢重幣陛下以漢所餘彼所鮮數問遺使辯士風諭以禮節冐頓在固為子壻死則外孫為單于豈嘗聞外孫敢與大父抗禮哉可毋戰以漸臣也若陛下不能遣長公主而令宗室及後宮詐稱公主彼亦知不肯貴近無益也髙帝曰善欲遣長公主呂后泣曰妾唯以一太子一女奈何棄之匈奴上終不能遣長公主而取家人子為公主妻單于使敬往結和親約敬從匈奴來因言匈奴河南白羊樓煩王去長安近者七百里輕騎一日一夕可以至秦中新破少民地肥饒可益實夫諸侯初起時非齊諸田楚昭屈景莫與今陛下雖都闗中實少人北近胡㓂東有六國彊族一日有變陛下亦未得安枕而卧也臣願陛下徙齊諸田楚昭屈景燕趙韓魏後及豪桀名家且實闗中無事可以備胡有變亦足率以東伐此彊本弱末之術也上曰善乃使劉敬徙所言闗中十萬餘口叔孫通薛人也秦時以文學徵待詔博士數嵗陳勝起二世召博士諸儒生問曰楚戍卒攻蘄入陳扵公何如博士諸儒生三十餘人前曰人臣無将将則反罪死無赦􅂅陛下急𤼵兵擊之二世怒作色通前曰諸生言皆非夫天下為一家毁郡縣城鑠其兵示天下弗復用且眀主在上法令具扵下吏人人奉職四方輻輳安敢有反者此特羣盗䑕竊狗盗何足置齒牙間哉郡守尉今捕誅何足憂二世喜盡問諸生或言反或言盗扵是令御史按諸生言反者下吏非所宜言諸生言盗者皆罷之乃賜通帛二十疋衣一襲拜為博士通已出反舎諸生曰生何言之諛也通曰公不知我幾不免虎口乃亡去之薛薛已降楚矣及項梁之薛通從之梁敗從懐王懷王為義帝徙長沙通留事項王漢二年漢王從五諸侯入彭城通降漢王通儒服漢王憎之乃變服服短衣楚製漢王喜通之降漢從弟子百餘人然無所進專言諸故羣盗壮士進之弟子皆曰事先生數年幸得從降漢今不進臣等専言大猾何也通乃謂曰漢王方䝉矢石爭天下諸生寧能闘乎故先言斬将搴旗之士諸生且待我我不忘矣漢王拜通為博士號稷嗣君漢王已并天下諸侯共尊為皇帝扵定陶通就其儀號髙帝悉去秦儀法為簡易羣臣飲酒爭功醉或妄呼拔劍擊柱上患之通知上益饜之説上曰夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀髙帝曰得無難乎通曰五帝異樂三王不同禮禮者因時世人情為之節文者也故夏殷周禮所因損益可知者謂不相復也臣􅂅頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之扵是通使徵魯諸生三十餘人魯有兩生不肯行曰公所事者且十主皆面諛以得親貴今天下初定死者未𦵏傷者未起又欲起禮樂禮樂所由起百年積徳而後可興也吾不忍為公所為公所為不合古吾不行公往矣毋汚我通笑曰若真鄙儒不知時變遂與所徵三十人西及上左右為學者與其弟子百餘人為綿蕞野外習之月餘通曰上可試觀上使行禮曰吾能為此乃令羣臣習肄㑹十月漢七年長樂宮成諸侯羣臣朝十月儀先平眀謁者治禮引以次入殿門廷中陳車騎戍卒衛官設兵張旗志傳曰趨殿下郎中俠陛陛數百人功臣列侯諸将軍軍吏以次陳西方東鄉文官丞相以下陳東方西鄉大行設九賔臚句傳扵是皇帝輦出房百官執㦸傳警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不震恐肅敬至禮畢盡伏置法酒諸侍坐殿上皆伏抑首以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝置酒無敢驩譁失禮者扵是髙帝曰吾乃今日知為皇帝之貴也拜通為奉常賜金五百斤通因進曰諸弟子儒生隨臣久矣與共為儀􅂅陛下官之髙帝悉以為郎通出皆以五百金賜諸生諸生乃喜曰叔孫生聖人知當世務九年徙通為太子太傅十二年髙帝欲以趙王如意易太子通諌曰昔者晉獻公以驪姬故廢太子立奚齊晉國亂者數十年秦以不早定扶蘇胡亥詐立自使㓕祀此陛下所親見今太子仁孝天下皆聞之呂后與陛下攻苦食啖其可背哉陛下必欲廢嫡而立少臣願先伏誅以頸血汙地髙帝曰公罷矣吾特戲耳通曰太子天下本本壹摇天下震動奈何以天下戲髙帝曰吾聽公及上置酒見留侯所招客從太子入見上遂無易太子志矣髙帝崩孝惠即位乃謂通曰先帝園陵寝廟羣臣莫習徙通為奉常定宗廟儀法及稍定漢諸儀法皆通所論著也惠帝為東朝長樂宮及問往數蹕煩民作複道方築武庫南通奏事因請間曰陛下何自築複道髙帝寝衣冠月出㳺髙廟子孫奈何乗宗廟道上行哉惠帝懼曰急壊之通曰人主無過舉今已作百姓皆知之矣􅂅陛下為原廟渭北衣冠月出㳺之益廣宗廟大孝之本上乃詔有司立原廟惠帝常出㳺離宮通曰古者有春嘗果方今櫻桃熟可獻􅂅陛下出因取櫻桃獻宗廟上許之諸果獻由此興通志卷九十六
