body:
  text: 通志卷八十五上宋右廸功郎鄭樵漁仲撰宗室傳第八上北齊趙郡王琛子叡信叡子整清河王岳子勱廣平公盛子子瑗陽州公永樂繼子孝緒弼永樂弟長㐮樂王顯國上洛王思宗子元海好思宗弟思平秦王歸彦武興王普長樂太守靈山子懿伏繼子伏䕶䕶孫乂神武諸子永安簡平王浚平陽靖翼王淹子徳彭城景思王浟子寳徳上黨剛肅王渙子寳嚴㐮城景王清繼子亮任城王湝髙陽康穆王湜博陵文簡王濟華山王凝馮翊王潤漢陽敬懐王洽文襄諸子河南康獻王孝瑜子𢎞節廣寕王孝珩河間王孝琬子正禮蘭陵武王長恭安徳王延宗漁陽王紹信文宣諸子太原王紹徳范陽王紹義西河王紹仁隴西王紹㢘孝昭諸子樂陵王百年汝南王彦理弟彦徳彦彦基彦康忠武成諸子南陽王綽琅琊王儼齊安王廓北平王貞髙平王仁英淮南王仁光弟仁機仁仁邕仁仁儉雅直謙仁後主諸子東平王恪善徳質買徳錢北齊趙郡王琛字元寳神武皇帝之弟也少便弓馬有志氣神武既定天下中興初授琛常侍鎮西将軍既居禁衛㳟勤慎宻率先左右封南趙郡公累遷定州刺史六州大都督甚有聲譽及斛斯椿等釁結神武将謀内討以晋陽根本召琛留掌後事天平中除御史中尉正色紏彈無所廻避逺近肅然尋亂神武後庭因杖而薨時年二十三贈太尉尚書令謚曰貞天平三年又贈假黄鉞左丞相太師録尚書事天統初進爵為王配饗髙祖廟庭子叡嗣小名須㧞生三旬而孤聰慧夙成特為神武所愛飬於宫中令游嬢母之恩同諸子魏興和中襲爵南趙郡公年至四嵗未嘗識母其母魏華陽公主也其徔母姊鄭氏戲謂曰汝是我姨兒何反親游氏叡因訪問遂失精神神武疑其感疾叡對曰兒無患但聞有所生欲得暫見神武驚命元夫人至就宫見之叡前跪拜因抱頸大哭神武甚悲傷謂平秦王曰此兒天性至孝我兒無及者遂為休務一日叡初讀孝經至資於事父輙流涕歔欷十嵗喪母神武親送至領軍府為發哀舉聲殞絶三日水漿不入口神武與武明太后慇懃敦譬方漸承㫖居喪長齋骨立杖而後起神武令恒山王與同卧起日夜譬之并勅左右不許進水雖絶清漱午輙不肯食由是神武食必呼與同案神武崩復哭泣歐血及壯将婚娶而貌有戚容文㐮謂曰我為爾娶鄭述祖女門閥甚髙當無可憾而反不樂何邪叡對曰自痛孤遺方徔㛰冠彌用感切言未卒嗚咽不自勝文㐮為之憫然勵之勤學常夜分方罷文宣受禪進爵為王叡身長七尺容儀甚偉閑習吏職有知人之鍳天保二年為定州刺史六州大都督時年十七叡留心庶事紏擿奸邪稱為良牧六年詔領山東兵數萬監築長城于時盛夏叡屏除盖扇親與軍人同勞苦長史永欽道以叡冒暑遣倍道送氷叡對之歎息云三軍之人皆飲温水吾何心獨進寒氷遂至銷液竟不一嘗兵人感悦先是役罷任其自歸丁壮先返羸弱多致僵殞叡於是親率營伍彊弱相持賴全者十三四焉八年除北朔州刺史都督長城諸鎮事叡慰撫新遷量置烽戍内外防禦備有條法大為兵民所安有乏水處叡禱而得泉州人至今號曰趙郡王井九年濟南以太子監國因立大都督府與尚書省分理衆事仍開府置佐史文宣特崇其選乃除叡侍中攝大都督府長史叡後因侍宴帝徔容頋謂恒山王演曰由来亦有如此長史不皇建初兼并州事孝昭崩預受頋託奉迎武成於鄴以功拜尚書令天統中追贈父琛假黄鉞母元氏贈趙郡王妃諡曰貞昭華陽長公主如故有司備禮儀就墓拜受時隆冬盛寒叡徒歩號哭面皆破裂歐血數升及還不堪参謝帝親就第省問拜司空攝録尚書事河清三年周師及突厥至并州武成戎服将以宫人出避叡叩馬諫乃止帝親御戎六軍進止並令取叡節度而使叚孝先總焉帝與宫人被緋甲登故北城以望軍營甚整突厥咎周人曰爾言齊亂故請我共来伐之今齊人眼中亦有鐡何可當邪乃還至涇嶺凍滑乃鋪氊以度胡馬寒瘦膝已下皆無毛比至長城死且盡乃截矟杖之以歸是役也叚孝先持重不與賊戰自晋陽東道為虜所屠無遺類焉斛律光自三堆還帝以遭大㓂抱其頸哭任城王湝進曰何至此乃止光面折孝先於帝前曰叚婆善為送女客於是以叡為能加尚書令封宣城郡公拜太尉監五禮晚節頗為和士開所構叡久典朝政清正自守譽望日隆漸被疏忌乃撰古之忠臣義士號曰要言以致其意武成崩𦵏後數日叡與馮翊王潤安徳王延宗及元文遙等奏後主云和士開不宜仍居内任并入奏太后因出士開為兖州刺史太后曰士開舊經驅使欲㽞過百日叡正色不許太后令酌酒賜叡叡正色曰今論國家大事非為巵酒言訖便出其夜叡方寝見一人可長丈四五尺臂長丈餘當門向牀以臂壓叡良久遂失所在叡意甚惡之起坐歎曰大丈夫運命一朝至此至旦欲入朝妻子咸諫止之叡曰自古忠臣皆不頋身命社稷事重吾寜死事先皇不忍見朝廷顛沛至殿門又有人曰願勿入叡曰吾上不負天死亦無恨入見太后太后復以為言叡執之彌固出至永巷被執送華林園於崔離佛院令劉桃枝拉而殺之時年三十六大霧三日朝野寃惜之期年後詔聽以王禮𦵏竟無贈諡子整信嗣好學有行檢位儀同三司後終於長安清河王岳字洪畧神武徔父弟也父翻字飛雀以器度知名卒於侍御中散元象中贈假黄鉞大将軍太傅太尉録尚書事諡孝宣公岳幼孤貧人未知之長而敦直姿貌嶷然深沈有器量初岳家于洛邑神武每奉使入洛必止于岳宅岳母山氏嘗夜起見神武室中有赤光心異之詣卜者為之筮遇乾之大有占者曰飛龍在天之象也貴不可言山氏以語神武神武益自負及神武起兵信都山氏聞之喜謂岳曰赤光之瑞驗矣汝可間行徔之岳遂徃信都神武見之大悦中興初除金紫光禄大夫領武衛神武與四胡戰扵韓陵神武将中軍髙昂将左軍岳将右軍中軍敗績賊乗之岳舉麾大呼横衝賊陣神武方得囘師因大破賊以功除衛将軍左光禄大夫封清河郡公母山氏封郡君授女侍中入侍皇后天平二年除侍中六州軍事都督尋加開府岳辟引時賢以為僚屬論者美之尋授使持節六州大都督冀州大中正俄拜京畿大都督其六州事悉隸京畿神武統務晋陽岳與侍中孫騰等在京師輔政岳性至孝母疾衣不觧帯及遭喪去軄哀毁骨立神武憂之每日遣人勞勉尋起復本位厯冀晋二州刺史西南道都督有綏邉之稱及神武崩侯景叛梁武帝遣其貞陽侯淵眀於寒山擁泗水灌彭城與景相為掎角岳總帥諸軍南討與行臺慕容紹宗擊淵眀破禽之俘馘數萬景仍擁衆於渦陽與左衛将軍劉豐䓁相持岳廻軍又破之景單騎逃竄以功除侍中太尉又拜河南總管統慕容紹宗劉豐䓁討西魏将王思政於長社岳引洧水灌其城紹宗劉豐為思政所獲西魏援兵復至岳内外防禦城不沒者三版㑹文㐮親臨數日城䧟獲思政䓁以功别封真定縣男是役也文㐮以為已功故賞典不𢎞文㐮崩文宣出撫晋陽令岳以本官兼尚書左僕射留鎮京師天保初進封清河郡王尋除司州牧五年加太保梁元帝為西魏所逼遣使告急詔岳為西南道大行臺統司徒潘相樂䓁救江陵師次義陽西魏尅荆州岳因畧地南至梁郢州尅之獲刺史司徒陸法和送鄴朝廷知江陵䧟詔岳班師岳自討寒山長社及出随陸並有功績威名彌重而性華侈尤悦酒色歌姬舞女陳鼎擊鐘諸王不及也初髙歸彦少孤神武令岳撫飬岳輕其年幼情禮甚薄歸彦内銜之及歸彦為領軍大被寵遇岳謂其徳已更倚仗之歸彦宻構其短奏岳於城南起宅聴事後僭擬為永巷但無闕耳帝後夜行見宅壮麗意不能平屬帝時召鄴下婦人薛氏入宫而岳先嘗迎之至宅由其姊也帝怒縣薛氏姊而支觧之譲岳以為姦人之女岳曰臣始聞其美欲納以為婦見其輕佻故出之非奸也帝益怒六年冬使髙歸彦就宅賜以鴆岳曰臣無罪歸彦逼飲之遂薨時年三十四詔大鴻臚監䕶喪事贈使持節都督冀䓁七州太宰太傅定州刺史假黄鉞給輼輬車諡曰昭武勅以城南宅為荘嚴寺初岳與神武經綸天下家有私兵戎器儲甲千餘領文㐮之末岳以四方無事表請納之文㐮敦至親之重推心相任云叔屬居肺腑職在維城所有之甲夲資國用叔何疑而納之文宣之世亦頻請納又不許及将薨遺表謝恩并請上甲于武庫至是方納焉皇建中配享文㐮廟庭後歸彦反武成知其前譖曰清河忠烈盡力皇家而歸彦毁之間吾骨肉籍沒歸彦以歸彦良賤百口賜岳家又思岳功重贈太師太保餘如故子勱字敬徳幼聰敏美風儀以仁孝聞年七嵗襲爵清河王十四為青州刺史拜日文宣戒之曰叔父前牧青州甚有遺恵故遣汝慰彼黎庶無墜家聲勱流涕對曰臣以蒙幼濫叨㧞擢雖竭庸愚懼忝先正文宣曰汝既能如此言吾不慮也尋追授領軍大将軍開府儀同三司以清河地在畿内改封樂安王性剛直有才幹斛律光雅敬之每征伐則引為副轉侍中尚書右僕射後主於晋州敗太后徔土門道還京師勅勱統領兵馬侍衛時佞幸閹寺猶行暴虐民間雞豕悉縦鷹犬搏噬取之勱収儀同苟子溢将斬以徇太后有令然後釋之劉文殊謂勱曰子溢之徒言成禍福豈不慮後邪勱攘􅃑曰自獻武皇帝以来撫飬士卒委政親賢用武行師未有折䘐今西宼已次并州逹官委叛正坐此輩専政㺯權所以内外離心衣冠觧體若得今日斬此輩明日受誅亦無所恨文殊甚媿之太后還至鄴周軍續至人皆兇懼無有闘心朝士出降相屬勱因奏後主曰今所翻叛多是貴人至於卒伍猶未離貳請追五品已上家屬置之三臺因脅之曰若戰不㨗即焚此臺此曹頋惜妻子必當死戰且王師頻北賊徒輕我今背城一決理必破之後主不從遂棄鄴東遷勱恒後殿為周軍所得武帝與語大悦因問齊亡所由勱發言流涕悲不自勝帝為改容授開府儀同三司隋文帝為丞相深器之再遷椘州刺史城北有伍子胥廟其俗尚鬼祈者必以牛酒至破産業勱嘆曰子胥賢者豈宜損百姓乎告諭所部自是遂止百姓賴之開皇七年轉光州刺史表請伐陳并平陳五䇿帝嘉之荅以優詔及大舉伐陳以勱為行軍總管從宜陽公王世積下陳江州以功拜上開府賜物三千叚時隴右諸羌數為宼亂朝廷以勱有威名拜洮州刺史下車大崇威恵民夷悦附後吐谷渾来宼勱時遇疾不能拒戰賊遂大掠而去憲司奏勱失亡戶口坐免卒於家唐褎顯前代名臣追贈都督四州諸軍事定州刺史子士廉冣知名廣平公盛神武徔叔祖也寛厚有長者風神武起兵於信都盛来赴以為中軍大都督封廣平郡公厯位司徒太尉天平三年薨於位贈假黄鉞太尉太師録尚書事無子以兄子子瑗嗣天保初改封平昌王卒於魏尹陽州公永樂神武徔祖兄子也太昌初封陽州縣伯進爵為公累遷北豫州刺史河橋之戰司徒髙昂失利奔退永樂守洛陽南城昻走趣城南西軍追者将至永樂不開門昻遂為西軍所禽神武大怒杖之二百後罷豫州家産不立神武問其故對曰裴監為長史辛公正為别駕受王委寄斗酒隻雞不敢入神武乃以永樂為濟州仍以監公正為長史别駕謂永樂曰爾勿大貪小小義取莫復畏永樂至州遽有受納監公正諫不見聴以状啟聞神武封以示永樂永樂由是知二人清直並擢用之後卒於州贈太師太尉録尚書事謚曰武昭無子徔兄思宗以第二子孝緒為後襲爵天保初改封修城郡王永樂弟長弼小名阿伽性麤武出入城市好歐擊行路時人呼為阿伽郎君以宗室封廣武王時有天恩道人至凶暴横行閭肆後入長弼黨専以鬪歐為事文宣並收掩付獄天恩䓁十餘人皆棄市長弼鞭一百尋為營州刺史在州無故自驚亡入突厥竟不知死所㐮樂王顯國神武徔祖弟也無才技直以宗室謹厚天保元年封㐮樂郡王位右衛将軍卒上洛王思宗神武徔子也性寛和頗有武幹天保初封上洛郡王厯位司空太傅薨於官子元海累遷散騎常侍自陳願處山林修行釋典文宣許之乃入林慮山經二年絶棄人事志不能固自啟求歸徵復本任乃更縦酒肆情廣納姬侍尋除領軍将軍元海器小志大頗以智謀自許皇建末孝昭幸晋陽元海以散騎常侍㽞典機宻初孝昭之誅楊愔也謂武成云事成以汝為皇太弟及踐位立其子百年為皇太子留濟南於鄴使武成居守以兵衛之武成意不平既而除領軍庫狄伏連為幽州刺史以斛律豐樂為領軍盖以分武成之權也武成㽞伏連而不聴豐樂視事乃與河南王孝瑜偽獵謀之於野際夜乃歸先是童謡云中興寺裏白鳬翁四方側聴聲雍雍道人聞之夜打鐘時丞相府在北城中即舊中興寺也鳬翁謂雄雞武成小字歩落稽也道人濟南小名也打鐘言将被擊也未㡬太史奏言北城有天子氣孝昭以為濟南之祥使平秦王歸彦之鄴迎濟南赴幷州将除之武成以告元海并問自安之計元海曰皇太后萬福主上至性非常殿下不須别慮武成曰此豈我推誠之意邪元海乞遷省思之時既夜武成㽞不聼去元海繞牀萬匝逹旦不寐夜漏未盡武成遽出曰神算如何曰夜中有三䇿恐不適用耳因引梁孝王懼誅入闗事請乗數騎入晉陽先見太后求哀後見主上請去兵權不干朝政以死為限此上䇿也若不見許當更表請青齊二州刺史委政綱紀沉靖自居此中䇿也更問下䇿曰發言即恐族誅因逼之曰濟南世嫡主上假太后令而奪之今集文武示以此勅執豐樂斬歸彦尊濟南號令天下以順討逆此萬世一時也武成大悦狐疑竟未能用乃使鄭道謙卜之道謙云不利舉事静則吉又召曹魏祖訊以國事魏祖云當有大凶又時有林慮令姓藩者頗知占候宻謂武成曰宫車非久晏駕殿下當為天下主武成拘之内庭以候之又令巫覡雜卜皆云不湏舉兵自有大慶武成乃奉詔送濟南於晋陽至即見殺及孝昭崩武成即位除元海侍中開府儀同三司太子詹事河清二年元海為和士開所譖武成鞭之六十責之曰爾在鄴時教我以弟反兄幾許不義以鄴城兵馬抗并州㡬許無智不義無智若為可使出為兖州刺史元海後妻陸太姬甥也以故尋被任使武平中與祖珽共執朝政元海多以太姬宻語告珽珽求領軍元海不可珽乃以其所告報太姬姬怒出元海為鄭州刺史鄴城将敗徴為尚書令周建徳七年於鄴城謀逆伏誅元海好亂樂禍詐行仁慈不飲酒噉肉文宣天保末年敬信内法乃至宗廟不血食皆元海之為及為右僕射又説後主禁斷屠宰原其本心非靖故終致覆敗思宗弟思好本浩氏子也思宗飬以為弟遇之甚薄少以騎射事文㐮文宣受命為左衛大将軍本名思孝天保五年討蠕蠕文宣悦其驍勇謂曰爾擊賊如鶻入鵶羣宜思好事故改名焉累遷尚書令朔州道行臺朔州刺史開府南安王甚得邉朔人心後主時斫骨光弁奉使至州思好迎之甚謹光弁倨傲思好銜之武平五年遂舉兵反與幷州諸貴書曰主上少長深宫未辨人之情偽昵近凶狡踈逺忠良遂使刀鋸刑餘貴溢軒階商人醜類擅權帷幄剝削生靈刼掠朝市闇扵聴受専行忍害幽母深宫無復人子之禮二弟殘戮頓絶孔懐之義仍縦子立奪馬於東門光弁掣鷹於西市駁龍得儀同之號逍遥受郡君之名犬馬班位榮冠軒冕人不堪役思長亂階趙郡王叡實曰宗英社稷是寄左丞相斛律明月世為元輔威著隣國並非有辜奄見誅殄孤既忝預皇枝實蒙殊奨今便擁率義兵指除君側之惡幸悉此懐無致疑惑行臺郎王行思之辭也思好至陽曲自號大丞相置百官以行䑓左丞王尚之為長史武衛趙海在晋陽時倉卒不暇奏矯詔發兵拒之軍士皆曰南安王来我輩唯有奉迎耳帝聞變使唐邕莫多婁敬顯劉桃枝中領軍庫狄士文馳之晋陽帝勒兵續進思好軍敗與行思投水而死其麾下二千人桃枝圍之且殺且招終不肯降以至於盡時帝在道叱奴世安自晋陽送露布於城平都遇斛斯孝卿孝卿誘使食因馳詣行宫大呌云已了帝大驩左右呼萬嵗良久世安乃以狀自陳帝曰爾告何物事乃得坐食於是賞孝卿而免世安罪暴思好屍七日然後屠剥焚之烹尚之於鄴市令内参射其妃於宫内仍焚殺之思好前反三旬有人告其謀反韓長鸞女適思好子故奏言有人誣告諸貴事相擾動不殺無以息後乃斬之思好既誅死者弟伏闕為兄訴寃且求贈典長鸞抑而不通平秦王歸彦字仁英神武族弟也父徽魏末坐事當徙凉州行至河渭間遇賊以軍功得免流因居於河州積年以觧胡言為西域大使以功行河州事遂死焉徽於神武舊恩甚篤及神武平京洛迎徽喪為之營𦵏贈司徒諡曰文宣初徽嘗過長安市與婦人王氏私通而生歸彦至是年九嵗神武追見之對之悲喜稍遷徐州刺史歸彦少質朴後更改節放縦好聲色妻魏上黨王元天穆女也醜而妒數與忿争宻唘文宣求離不報天保初封平秦王嫡妃康及所生母王氏並為太妃善事二母以孝聞徴為兼侍郎稍被親寵以討侯景功别封長樂郡公除領軍大将軍領軍加大自歸彦始文宣誅髙徳正金寳財貨悉以賜之乾明初拜司徒仍總知禁衛濟南自晋陽之鄴楊愔宣勅㽞徔駕兵五千於西中隂備非常至鄴數日歸彦乃知之由是隂怨楊燕䓁楊燕䓁欲去二王問計於歸彦歸彦詐喜請與髙元海謀之元海亦口許心違馳告長廣楊燕之戮歸彦有力焉孝昭将入雲龍門都督成休寜列仗拒而不内歸彦諭之然後得入進向栢閣永巷亦如之孝昭踐阼以此彌見優重每入常坐平原王叚韶上尋除司空兼尚書令齊制宫内唯天子紗㡌臣下皆戎㡌特賜歸彦紗帽以寵之孝昭崩歸彦徔晋陽迎武成于鄴及武成即位進位太傅領司徒常聴将私部曲三人帯刀入仗徔武成還都諸貴戚䓁競要之其所徃處一坐盡傾歸彦既地居將相志意盈滿發言陵侮傍若無人議者以威權震主必為禍亂上亦尋其前後翻覆之迹漸忌之髙元海畢義雲髙乾和䓁咸數言其短遂出歸彦為冀州刺史上幸歸彦第召魏收對御作詔欲加右丞相收曰至尊以右丞相登極今為歸彦威名大盛故出之豈可復加此號乃拜太宰冀州刺史即命乾和繕寫畫日仍勅門司不聴輙内時歸彦在家縦酒經宿不知至明欲参至門知之大驚而退及通名謝勅令早發又勅武軄督将悉送至清陽宫送者再拜而退莫敢共語唯趙郡王叡與語久之時無聞者至州不自安遂謀逆置私驛於南境上偵伺朝廷動息時車駕将幸晋陽歸彦謀乗虗入鄴又以時未受調欲班賜軍士訖然後發郎中令吕思禮知其謀以状告詔遣平原王叚韶襲之歸彦聞有王師乃嬰城距守先是冀州刺史宇文仲鸞司馬李祖挹别駕陳季璩中徔事房子弼長樂郡守尉普興䓁疑歸彦有異亦連名宻啟歸彦追而獲之遂収禁仲鸞等五人脅之徔逆仲鸞䓁不徔皆殺之軍已逼城歸彦登陴大呌云孝昭皇帝初崩六軍百萬衆悉由臣手此時投身向鄴迎陛下今日豈有異心正恨髙元海畢義雲髙乾和誑惑聖上疾忌忠良但為殺此三人即臨城自刎其後城破單騎北走至交津見獲鎖送鄴帝令趙郡王叡私問其故歸彦曰使黄頷小兒牽挽我何得不反曰誰邪歸彦曰元海乾和豈是朝廷老宿如趙家老公時又詎懐怨於是帝又使譲焉對曰髙元海受畢義雲宅用作本州刺史給後部鼓吹臣為藩王太宰反無正欲殺元海義雲而已上令都督劉桃枝牽入歸彦猶作前語望活帝命群臣議其罪皆云不可赦乃載以露車銜枚面縛使桃枝臨之以刄擊鼓随之并子孫十五人皆棄市贈仁州刺史初魏時山崩得二石角藏在武庫文宣嘗賜徔臣兵器特以二石角與歸彦謂曰爾事恒山不得反事長廣得反反時将此角嚇漢歸彦額角三道著幘不安文宣見之怒使以馬鞭擊其額流血被面曰爾反時當以此骨嚇漢其言反竟驗云武興王普字徳廣歸彦兄歸義之子也性寛和有度量年九嵗與歸彦自河州俱入洛神武使與諸子同游處天保初封武興郡王武平二年累遷司空六年為豫州道行臺尚書令後主奔鄴就加太宰周師逼乃降卒於長安贈上開府豫州刺史長樂太守靈山字景嵩神武族弟也徔神武起兵信都終長樂太守贈大将軍司空諡曰文宣一子懿卒於武平鎮将無子文宣以靈山徔父兄齊州刺史建明子伏䕶為靈山後伏䕶字臣援粗有刀茟天統初累遷黄門侍郎伏䕶厯事數朝恒叅機要而性嗜酒每多醉失末路逾劇乃至連日不食神識慌惚遂以卒贈兖州刺史建國侯孫乂襲乂少謹厚武平末給事黄門侍郎隋開皇中為太府少卿坐事死神武諸子神武十五男武明婁皇后生文㐮皇帝文宣皇帝孝昭皇帝㐮城景王清武成皇帝博陵文簡王濟王氏生永安簡平王浚穆氏生平陽靖翼王淹大爾朱氏生彭城景思王浟華山王凝韓氏生上黨剛肅王渙小爾朱氏生任城王湝游氏生髙陽康穆王湜鄭氏生馮翊王潤馬氏生漢陽敬懐王洽永安簡平王浚字定樂神武第三子也初神武納浚母當月而有孕及産後疑非已類不甚愛之而浚早慧後更被寵年八嵗時問博士盧景裕曰祭神如神在此為有神邪無神邪裕曰有神浚曰有神當云祭神神在何煩云如景裕不能荅及長嬉戲不節嘗以屬請受納大見杖罰遂折節讀書元象中封永安郡公豪爽有氣力善騎射為文㐮所愛文宣性雌懦每参文襄有時洟出浚恒責帝左右何不為二兄拭鼻由是見銜累遷中書監兼侍中出為青州刺史雖頗好游畋而聰明矜恕上下畏悦之保定初進爵為王文宣末年多酒失浚謂親近曰二兄舊不甚了了自為帝識觧頓進今沈湎敗徳朝臣無敢諫者大敵未滅吾殊以為憂欲乗驛至鄴面陳不知吾言見用不或者以告帝愈銜之八年来朝徔幸東山帝祼䄇為樂雜以婦女又自作狐掉尾戲曲盡醜態浚進言此非人主所宜帝甚不悦時楊遵彦侍側浚引於屏處責其不諫帝雅不欲大臣與諸王交語遵彦懼以聞帝大怒曰小人由来難忍遂罷酒還宫浚尋還州又上書切諫詔令徴浚浚懼禍稱疾不朝上令馳驛收浚老幼泣送者數千人及至盛以鐡籠與上黨王渙俱寘北城地牢下飲食溲穢共在一所明年帝親将左右臨穴歌謳令浚䓁和之浚䓁惶怖聲戰帝為愴然泣下将赦之長廣王湛先與浚不睦進曰猛虎出押寜無噬人帝嘿然浚䓁聞之呼湛小名曰歩落稽皇天見汝左右聞者莫不悲傷浚渙皆有䧺畧為諸王所傾服帝恐為害乃先自刺浚渙使劉桃枝䓁繼之槊每下浚渙輙以手拉折於是投炬於籠中燒殺之加石土其上後出其屍皮髪皆盡天下寃之帝以浚妃陸氏配儀同劉郁㨗郁㨗帝蒼頭也以軍功見寵當刺浚時郁㨗實中其要害故以配焉後數日帝以陸氏先無寵於浚勅與離絶乾明元年贈太尉無子詔以彭城王浟第二子凖字茂則嗣平陽靖翼王淹字子邃神武第四子也元象中封平陽郡公累遷尚書左僕射天保初進爵為王厯位尚書令開府儀同三司司空太尉皇建初為太傅與彭城河間王並給仗身羽林百人太寜元年遷太宰性沉謹以寛厚稱河清三年薨於晋陽或云以酖終還𦵏鄴贈假黄鉞太宰録尚書事子徳素嗣彭城景思王浟字子深神武第五子也元象二年拜通直散騎常侍長樂郡公博士韓毅教浟書見浟茟迹未工因戲浟曰五郎書畫如此忽為常侍開國今日後宜更用心浟正色荅曰昔甘羅幼為秦相未聞能書凡人唯論才具何如豈必勤勤於筆迹博士當今能書者何為不作三公時年盖八嵗矣毅甚慙除驃騎大将軍開府武定六年出為滄州刺史為治嚴察部内肅然守令参佐下及胥吏行游徃来皆自齎糧食浟多伺察民間之事纎介皆知有隰沷縣主簿張逹嘗詣州夜投民家民為設雞臛浟詗知之逹至廷参浟謂之曰昨食雞羮其自獻之邪抑邀之使辦也逹皇恐伏罪又有士人自幽州騎驢至滄州界逢一少年求與為伴行數里許其人疲極息於道上少年遂驅其驢由支徑以去不知所如徃士人以告州浟曰驢上當無他負載乎曰無唯有鹿脯一肋耳浟乃宻令人分市鹿脯城中而得鹿肋於肆推所徔求竟獲盗驢者境内號為神眀轉都督定州刺史民有訴失牛者浟訪之曰所失㣲有别識否民言驪牛而自領以下逹於尻其毛皆白他無類者長史韋道建謂中徔事魏道勝曰史君在滄州禽姦如神今若得此賊定神矣浟乃詐為臺符市牛皮而髙其直盗利其估也果持皮出售浟案其毛色而執之道建䓁驚服又有老嫗自列云孤貧唯仰種蔬自給每被竊取而不得其主名浟夜令左右徃書菜葉為字明旦於市中物色皆得之自是州境無復盗賊治為當時第一天保初封彭城王四年徴為侍中民吏送别悲號滿道有老父數百人相率具饌餞浟於野曰自殿下来至今五載唯飲此鄉水未食百姓食今當逺别聊獻疏薄用表至誠浟重違其意為食一口而去七年轉司州牧選徔事皆取文才之士詳練法律明於剖斷者當時稱為美選州舊桉五百餘浟未期悉斷盡别駕羊脩䓁恐犯權戚乃詣閤諮陳浟使告曰吾直道而行何憚權戚卿䓁當成人之美反以權戚為言脩䓁慙悚而退後加特進兼司空太尉州牧如故太妃薨觧任尋復本官俄拜司空兼尚書令濟南嗣位除開府儀同三司尚書令領大宗正卿皇建初拜大司馬兼尚書令轉太保武成入承大業遷太師録尚書事浟明練世務果於决斷事無大小咸悉以情趙郡李公統預髙歸彦之逆其母崔氏即御史中丞崔昻之徔父姊兼右僕射魏收之内妹也依令年出六十例免入官崔増年陳訴所司以昂收故崔遂獲免浟擿發其事昂䓁以罪除名自後車駕廵幸常㽞守鄴河清三年三月羣盗白子禮䓁數十人刼浟為主詐稱使者至浟第入内室稱勅牽浟上馬臨以白刄欲引向南殿浟大呼不徔遂殺之時年三十二朝野痛惜焉初浟之未遇刼也其妃鄭氏夢人斷浟首持去惡之數日而浟被害贈假黄鉞太師太尉録尚書事給輼輬車子寳徳嗣位開府兼尚書左僕射上黨剛肅王渙字敬夀神武第七子也天姿䧺桀俶儻不羣雖在童幼恒以将畧自許神武壮而愛之曰此兒似我及長力能扛鼎材武絶倫每謂左右曰人不可無學但要不為博士耳故讀書頗知梗槩而不甚耽習元象中封平原郡公文㐮之遇賊渙年尚幼在西學聞宫中讙驚曰大兄必遭難矣彎弓而出武定末除冀州刺史在州有美政天保初封上黨王厯中書令尚書左僕射與恒山王演等築伐惡諸城遂聚鄴下輕薄陵犯郡縣為法司所紏文宣戮其左右數人渙亦被譴六年率衆送梁王蕭淵明還江南仍破東闗斬梁侍進裴之横䓁威名甚盛八年録尚書事初術士言亡齊者黒衣由是自神武後每出行不欲見桑門為黒衣故也是時文宣幸晋陽以所忌問左右曰何物最黒對曰莫過漆帝以渙第七為當之乃使庫真都督破六韓伯昇之鄴徴渙渙至紫陌橋殺伯昇而逃憑河而度土人執以送官帝用鐡籠盛之與永安王浚同置地牢下嵗餘與浚同見殺時年二十六以其妃李氏配馮文洛文洛乃帝家舊奴積勞位至刺史帝令文洛䓁殺渙故以其妻妻焉乾明元年始收二王餘骨𦵏之贈司空諡曰剛肅有勅李氏還第而文洛尚以故意脩飾詣李李盛列左右引文洛立於階下數之曰遭難流離以至大辱志操寡薄不能自盡幸䝉恩詔得返蕃闈汝是誰家奴猶欲見侮於是杖之一百流血灑地渙無嫡子庶長子寳嚴以河清二年襲爵位終金紫光禄大夫開府儀同三司襄城景王清神武第八子也美容貌弱年有器望元象中封章武郡公天保初封㐮城郡王二年春薨齊氏諸王選國臣府佐多取富商羣小鷹犬少年唯襄城廣寜蘭陵王䓁頗引文藝清識之士當時以此稱之乾明元年二月薨贈假黄鉞太師太尉録尚書事無子詔以恒山王演第二子亮嗣亮字彦道性恭孝美風儀好文學為徐州刺史坐奪商人財物免官後主敗奔鄴亮徔焉遷兼太尉太傅周師入鄴亮於啟夏門拒守諸軍皆不戰而敗周軍既入城亮方退走亮入太廟行馬内痛哭拜辭然後為周軍所執入闗依例授儀同分配逺邉卒於龍州任城王湝神武第十子也少眀慧天保初封自孝昭武成時車駕還鄴常令湝鎮晋陽總并省事厯司徒太尉并省録尚書事天統三年拜太保并州刺史别封正平郡公時有婦人臨汾水浣衣有乗馬人換其新靴馳而去者婦人持故靴詣州言之湝召居城諸嫗以靴示之紿曰有乗馬人於路為賊所害遺此靴焉得無親屬乎一嫗撫膺哭曰兒昨著此向妻家如其語捕獲之時稱神明武平初遷太師司州牧出為冀州刺史加太宰遷右丞相都督青州刺史湝頻牧大蕃雖不潔已然寛恕為吏民所懐五年青州人崔蔚波䓁夜襲州城湝倉卒部分號令齊整擊賊大破之拜左丞相轉瀛州刺史後主奔鄴加湝大丞相及安徳王稱尊號於晋陽使劉子昂脩啟於湝云至尊出奔宗廟既重羣公勸逼權主號令事寕終歸叔父湝曰我人臣何容受此執子昂送鄴帝至濟州禪位於湝竟不逹湝與廣寕王孝珩於冀州召募得四萬餘人拒周軍周齊王憲来伐先遣送書并赦詔湝並沉諸井戰敗湝孝珩俱被禽憲曰任城王何苦至此湝曰下官神武皇帝子兄弟十五人不幸而獨存逢宗社傾覆今日得死無媿墳陵憲壯之歸其妻子将至鄴城湝馬上大哭自投于地流血滿面至長安尋與後主同死妃盧氏賜斛斯徴盧蓬首垢面長齋不言笑徴放之乃為尼隋開皇三年表請文帝𦵏湝及五子於長安北原髙陽康穆王湜神武第十一子也天保元年封十年稍遷尚書令以滑稽便辟有寵於文宣常在左右行杖以撻諸王太后深銜之其妃父䕶軍長史張晏之嘗要道拜湜湜不禮焉帝問其故對曰無官軄漢何禮之有帝於是擢拜晏之為徐州刺史文宣崩湜兼司徒導引梓宫於馬上吹笛云至尊頗知臣不又擊邊鼓為樂太后杖湜百餘未㡬薨太后哭之哀曰我恐其不成就與杖何期帯創死也乾明初贈假黄鉞太師司徒録尚書事子士義襲爵博陵文簡王濟神武第十二子也天保元年封濟嘗徔文宣廵幸於路忽憶太后遂逃歸帝怒臨以白刄因此驚恍歴位太尉河清初出為定州刺史天統五年在州語人云計次第亦應到我後主聞之隂使人殺之贈假黄鉞太尉録尚書事子智襲爵華山王凝神武第十三子也天保元年封新平郡王九年改封安定十五年封華山厯位中書令齊州刺史就加太傅薨於州贈左丞相太師録尚書凝諸王中冣為孱弱妃王氏太子洗馬王洽女也與蒼頭姦凝知而不能限禁後事發王氏賜死詔杖凝一百其愚如此馮翊王潤字子澤神武第十四子也幼時神武稱曰此吾家千里駒也天保初封歴位東北道行臺右僕射都督定州刺史潤美姿儀年十四五母鄭妃與之同寝有穢雜之聲及長廉慎方雅習於吏軄至於擿發隐偽姦吏無所匿其情開府王囘洛與六州大都督獨孤枝侵竊官田受納賄賂潤案舉其事二人表言王出送臺使登魏孝文舊壇南望嘆息不測其意武成使元文遥就州宣勅曰馮翊王少小謹慎在州不為非法朕信之熟矣登髙望逺人之常情鼠輩欲輕相間構曲生眉目於是囘洛決鞭二百獨孤枝決杖一百尋為尚書令領太子少師厯司徒太尉大司馬司州牧太保河南道行臺録尚書事别封文成郡公太師太宰復為定州刺史薨贈假黄鉞左丞相子茂徳嗣漢陽敬懐王洽字敬延神武第十五子也天保元年封五年薨年十三乾明元年贈太保司空無子以任城王第二子建徳為後文㐮諸子文㐮六男文敬元皇后生河間王孝琬宋氏生河南王孝瑜王氏生廣寜王孝珩蘭陵王長恭不得母氏姓陳氏生安徳王延宗燕氏生漁陽王紹信河南康獻王孝瑜字正徳文襄長子也初封河南郡公齊受禅進爵為王厯位中書令司州牧初孝瑜飬於神武宫中與武成同年相愛将誅楊愔䓁孝瑜預其謀及武成即位禮遇特隆孝瑜容貌魁偉精彩䧺毅謙慎寛厚兼愛文學讀書敏速十行俱下覆碁不失一道初文㐮於鄴東起小池游觀時俗眩之孝瑜遂扵第作水堂龍舟植幡矟於舟上數集諸弟宴射其間遂為諸王所慕尚武成幸其第見而悦之故盛興後園之役武成嘗使和士開與胡后對坐握槊孝瑜諫曰皇后天下之母不可與臣下接手帝深納之後又言趙郡王父死非命不可親近由是叡及士開皆側目士開既宻告其奢僭叡又言山東唯聞有河南王不聞有陛下帝由是忌之有爾朱御女者本事太后孝瑜先與之通後因太子㛰夜孝瑜竊與之言武成大怒頓飲其酒三十七盃使婁子彦載以出鴆之於車孝瑜體素肥大腰帯十圍至西華門藥發煩熱躁悶投水而絶贈太尉録尚書事子𢎞節嗣孝瑜母魏吏部尚書宋弁孫也本魏頴川王斌之妃為文襄所納生孝瑜孝瑜還第為太妃孝瑜妃盧正山女武成胡后之内姊也孝瑜薨後宋太妃為盧妃所譖武成殺之廣寧王孝珩文襄第二子也歴位司州牧尚書令司空司徒録尚書事大将軍大司馬孝珩愛賞人物學渉經史好綴文有技藝嘗於聼事畫一蒼龍見者疑以為真又作朝士圗當時稱為妙絶後主自晉州敗奔鄴詔王公朝士議於含光殿孝珩曰大敵既深事藉機變宜使任城王領幽州道兵入土門揚聲趣并州獨孤永業領洛州道兵趣潼闗揚聲取長安臣請領京畿兵出自滏口鼓行逆戰賊軍逺来日増疲老聞南北有兵自然潰散又請出宫人寳物賞賜将士帝不能用承光即位以孝珩為太宰孝珩與呼延族莫多婁敬顯尉相願同謀期以正月五日自於千秋門斬髙阿那肱令相願以禁兵應之於内族與敬顯自游豫園勒兵出盡誅韓長鸞等既而阿那肱從别宅取便路入宫事不果孝珩乃求領兵出拒西軍謂髙阿那肱韓長鸞陳徳信䓁曰聞朝廷遲疑不賜遣領兵擊賊豈畏孝珩反邪孝珩破宇文邕遂至長安反時何與國家事以今日之急猶作如此相猜疑他日從可知也髙韓恐其有變出孝珩為滄州刺史孝珩至州以五千人㑹任城王於信都共為匡復之計周齊王憲来伐孝珩與周軍力戰兵弱不能敵瞋怒曰由髙阿那肱小人吾道窮矣齊叛臣乞伏令和以矟刺孝珩墜馬奴白澤以身扞之孝珩猶傷數處遂為周所虜齊王憲問孝珩齊亡之由孝珩自陳國難辭淚俱下俯仰有節憲為之改容親為灑創傅藥禮遇甚厚孝珩歎曰李穆叔有言齊氏二十八年今果然矣自神武皇帝以外吾諸父兄弟無有一人得至四十者命也奈何嗣君無獨見之眀宰相非柱石之寄恨不得握兵符受廟筭身先士卒展我心力耳周人以孝珩歸長安依例授開府縣侯後周武帝在雲陽宫宴齊之君臣自彈胡琵琶命孝珩吹笛孝珩辭曰亡國之音不足聼也固命之舉笛裁至口而淚下嗚咽周武乃止其年十月疾甚啟周武帝乞歸𦵏山東曰臣聞狐死首邱示不忘舊念臣先人墳柏在鄴武帝覧啟而哀之尋卒令𦵏於鄴河間王孝琬文襄第三子也天保元年封天統中累遷尚書令初突厥與周師入太原武成将避之而東孝琬叩馬諫請委趙郡王部分軍馬必能尅敵帝徔其言孝琬免胄将出帝使追還之周軍退拜并州刺史孝琬以文襄世嫡驕矜自負河南王之死諸王在宫内莫敢舉聲唯孝琬大哭而出又怨執政為草人擬而射之和士開與祖珽譖之云草人擬聖躬也又前突厥至州孝琬脱兠鍪抵地云豈是老嫗須著此此言屬大家也初魏世謠言河南種糓河北生白楊樹頭金鷄鳴珽以謠説帝曰河南河北河間也金鷄鳴孝琬将有建金鷄之事也帝頗惑之時孝琬得佛牙置於第内夜有神光不以進御帝聞使捜之得填庫矟幡數百帝以為反状訊其諸姬有陳氏者無寵誣對曰王嘗畫陛下像哭之為􅌅勝其反固宜孝琬性孝每追慕文襄輙出其像對之悲泣至是陳氏以為言而不能辯帝怒令武衛赫連輔元倒鞭撾之孝琬大呼曰徔阿叔乞命帝曰爾叔為誰敢喚天子作叔邪孝琬曰臣神武皇帝嫡孫文襄皇帝嫡子魏孝静皇帝外甥何為不得喚陛下作叔也帝愈怒折其兩脛而死瘞諸西山及帝崩乃得改𦵏子正禮嗣幼聰頴能誦左氏春秋齊亡遷綿州卒蘭陵武王長㳟一名孝瓘文襄第四子也累遷中領軍開府并州刺史突厥入晉陽長恭盡力擊破之芒山之役長恭為中軍以五百騎再入周軍遂破其圍至金墉下被圍甚急城上人不知其為蘭陵王也長㳟免胄示其面競下弩手救之於是大㨗武士為蘭陵王入陣曲以歌謠之進位尚書令司州牧厯青瀛二州刺史頗有受納後為太尉與叚韶共討柏谷又攻定陽親自督戰大破之俘其衆以前後功别封鉅鹿長樂樂平髙陽䓁郡公遷大司馬領宗正芒山之㨗後主謂長恭曰王入陣太深萬一失利悔無所及長恭對曰家事親切不覺遂然帝嫌其稱家事遂忌之定陽之役稍酷虐其屬尉相願謂長㳟曰王受朝寄何得如此貪殘長恭未及荅相願曰豈不由芒山大㨗恐以威武見忌故自穢乎長恭曰然相願曰朝廷若忌王於此犯便當行罰本欲求福反以速禍也長㳟遽前執其手求自安術相願因勸長恭杜門屬疾謝絶時事長恭然其言而未能即退及江淮有事恐復為将領憂懼成疾因而不治武平四年帝使徐之範齎鴆賜死長㳟謂妃鄭氏曰我以忠見誅天道殆不可曉邪妃曰何不求見自列長恭曰此爵既頒何由可見飲之而薨贈太尉長恭貌柔心壯音容兼美其為将也躬勤細事每得甘美乃至一𤓰數果必與将士共之初在瀛州行参軍陽士深表列其贓免官及討定陽士深在軍恐禍及長恭聞之曰何待我之淺也乃求小失杖二十以安之嘗朝退僕徔盡散長恭獨還無所譴罰武成賞其功命賈䕶為買妾二十人長恭唯受其一有千金責劵臨死燔之安徳王延宗文襄第五子母陳氏魏廣陽王妓也延宗幼為文宣所養甚愛之年十二猶騎置腹上令溺已臍中抱之曰可憐止有此一箇問欲作何王對曰欲作衝天王文宣問楊愔愔曰天下安得此郡名今取其義願使安於徳於是封安徳焉為定州刺史於樓上大便使人在下張口承之以烝猪糁和人糞以飼左右有難色者鞭之孝昭帝聞之使趙道徳就州杖之一百道徳以延宗受杖不謹又加三十未幾又以囚試刀驗其利鈍驕縦多不法武成使撻之殺其昵近九人自是深自改悔蘭陵王芒山凱旋自言兵勢諸兄弟咸壯之延宗獨曰四兄非大丈夫何意不乗勝徑入使延宗當此勢闗西豈得復存及蘭陵死妃鄭氏以頸珠施佛廣寜王使贖之延宗手書諫之而滴淚滿紙河間死延宗哭之出血又結草為武成像鞭而訊之曰我兄無罪何故殺之奴以状告武成覆卧延宗於地鞭之二百㡬死後厯司徒太尉及平陽之役後主自晉陽禦之命延宗率右軍先進戰於城下禽周開府宇文挺䓁十數人及大戰延宗以麾下再入周軍氣壮兵鋭敵人莫不披靡俄而諸軍敗延宗一軍獨全後主将奔晋陽延宗奏言大家但在營莫動以兵馬付臣臣必能破之帝不納及至幷州不守周軍入􅔨䑕谷乃下詔以延宗為相國并州刺史總山西兵事謂曰并州阿兄自取兒今去也延宗曰陛下為社稷自重臣為陛下出力死戰駱提婆曰至尊計已定王不得輙沮後主竟奔鄴在幷州将卒固請延宗即尊位皆云王若不作天子諸人實不能與王出死力延宗不得已即皇帝位下詔曰武平孱弱政由宦豎釁結蕭牆盗起疆場斬闗夜遁莫知所之則我髙祖之業将墜於地王公卿士猥見推逼今便祗承寳位可大赦天下改武平七年為徳昌元年以晋昌王唐邕為宰輔齊昌王莫多婁敬顯沭陽王和阿于子右衛大将軍叚暢武衛将軍相里僧伽開府韓骨胡侯莫陳洛州䓁為爪牙衆聞之不召而至者前後相屬延宗容貌充壮坐則仰偃則伏人皆笑之及是赫然奮發氣力絶異馳騁行陣勁㨗若飛傾府蔵及後宫美女以賜将士又籍沒内參千餘家後主謂近臣曰我寜使周得并州不欲使安徳得之左右曰理然延宗見士卒皆親執手陳辭自稱名流涕嗚咽衆皆争為死童兒女子亦乗屋攘􅃑投甎石以撃周軍特進開府那盧安生守太谷以萬兵叛周軍圍晋陽望之如黒雲四合延宗有衆四萬命莫多婁敬顯韓骨胡拒城南和阿于子叚暢拒城東延宗親當周齊王於城北奮大矟徃来督戰所向無前尚書令史沮山亦肥大多力捉長刀歩徔殺傷甚多武衛蘭芙蓉綦連延長皆死于陣和阿于子叚暢以千騎投周軍周軍盡銳攻東門際昬遂入進兵焚佛寺門屋飛熖照天地延宗與敬顯率壮士自西門入夾擊周軍周軍大亂争門相填壓塞路不得進齊人從後斫刺死者二千餘人多禁衛諸公子周武帝左右畧盡自㧞無路承御上士張夀輒牽馬頭賀㧞佛恩以鞭拂其後﨑嶇僅得出齊人奮擊㡬中焉至城東阸曲佛恩及降者皮子信為之導僅免時四更也延宗謂周武帝死於亂兵使於積屍中求長鬛不得時齊人既勝入坊飲酒盡醉卧延宗不能復整周武帝出城饑甚欲為遁計齊王憲及柱國王誼諫以為去必不免叚暢又盛言城内空虛無繼援周武帝乃駐馬鳴角收兵俄頃復振詰旦還攻東門克之又入南門延宗戰力屈走至城北於民家見禽周武帝自投下馬執其手延宗辭曰死人手何敢逼至尊帝曰兩國天子有何怨惡直為百姓来耳勿怖終不相害使復衣帽而禮之先是髙都郡有山焉絶壁臨水忽有墨書云齊亡延宗洗視愈眀帝使人就寫使者改亡為上至是應焉延宗以十二月十三日晡時受勅守并州明日建尊號不間日而被圍經宿至食時而敗年號徳昌好事者言其得二日云既而周武帝問鄴城若為取延宗辭曰亡國大夫不可與圖存此非臣所及彊問之乃曰若任城王援鄴臣不能知若今主自守陛下兵不血刃及至長安周武與齊之君臣飲酒令後主起舞延宗悲不自持屢欲仰藥自裁傅婢苦執諫而止未幾周武誣後主及延宗䓁云遙應穆提婆謀反賜死皆自陳無之延宗攘􅃑泣而不言以椒塞口而死明年李妃收殯之後主之傳位於太子也孫正言竊謂人曰我昔武定中為廣州士曹聞襄城人曹普演有言髙王諸兒阿保當為天子至髙徳之承之當滅阿保謂天保徳之謂徳昌也承之謂幼主年號承光其言竟信云漁陽王紹信文襄第六子也歴特進開府中領軍䕶軍青州刺史行經漁陽郡有鉅富人鍾長命紹信引與同坐太守鄭道盖来謁長命欲起紹信不聴曰何物小人乃煩主人公為起乃與長命結為弟兄使其妃行家人禮責長命贈賄百萬鍾氏因此貧乏齊滅死於長安文宣諸子文宣五男李后生廢帝及太原王紹徳馮世婦生范陽王紹義裴嬪生西河王紹仁顔嬪生隴西王紹㢘太原王紹徳文宣第二子也天保末為開府儀同三司武成因怒李后詬紹徳曰爾父擊我時竟不来救以刀鐶築殺之親以土埋之游豫園武平元年詔以范陽王子辨才為後襲太原王范陽王紹義文宣第三子也初封廣陽徙封范陽歴位侍中清都尹好與羣小同飲擅使内參歐殺博士任方榮武成杖之二百送付昭信后后又杖一百及後主奔鄴以紹義為尚書令定州刺史周武帝克并州以封輔相為北朔州總管此州齊之重鎮諸勇士多聚焉前長史趙穆司馬王當萬等謀執輔相迎任城王於瀛州事不果遂迎紹義紹義至馬邑先是輔相及其屬韓阿各奴䓁數十人皆齊叛臣自肆州以北城戍二百八十餘盡從輔相及紹義至皆反馬紹義與靈州刺史袁洪猛引兵南出欲取并州至新興而肆州已為周守前隊二儀同以所部降周周兵擊顯州執刺史陸瓊又攻䧟諸城紹義還保北朔周将宇文神舉軍逼馬邑紹義遣杜眀逹拒之兵大敗紹義曰有死而已不能降人遂奔突厥衆三千家徔之紹義令之曰欲還者任意於是哭拜别者太半突厥他鉢可汗謂文宣為英雄天子以紹義重踝似之甚見愛重凡齊人在北者悉𨽻紹義髙寳寕在營州表上尊號紹義遂即皇帝位稱武平元年以趙穆為天水王他鉢聞寳寕得平州亦招諸部各舉兵南向云共立范陽王作齊帝為其報讐周武帝大集兵於雲陽将親北伐遇疾暴崩紹義聞之以為天賛已也盧昌期據范陽亦表迎紹義俄而周将宇文神舉攻滅昌期其日紹義適至幽州聞周守将出兵于外欲乗虛取薊城列天子旌旗登故昭王冡乗髙望逺部分兵衆神舉遣大将軍宇文恩将四千人馳救幽州半為齊軍所殺紹義聞范陽城䧟素服舉哀囬軍入突厥周人購之於他鉢又使賀若誼徃説之他鉢猶不忍遂偽與紹義獵於南境使誼執之以歸流於蜀紹義妃勃海封孝琬女自突厥逃歸紹義在蜀遺妃書云夷狄無信使吾至此竟死蜀中西河王紹仁文宣第四子也天保末為開府儀同三司尋薨隴西王紹廉文宣第五子也初封長樂後改焉性麤暴嘗㧞刀逐范陽王紹義紹義走入廐閉門拒之乃免紹義初為清都尹未及理事紹廉先徃喚囚悉出率意決遣之能飲酒一舉數升終以此薨孝昭諸子孝昭七男元皇后生樂陵王百年桑氐生襄城王亮出後襄城景王諸姬生汝南王彦理始平王彦徳城陽王彦基定陽王彦康汝陽王彦忠樂陵王百年孝昭第二子也孝昭即位立百年為皇太子納斛律光長女為妃帝臨崩遺詔傳位於武成并有手書其末曰百年無罪汝可以樂處置之勿學前人大寜中封樂陵王河清三年五月白虹圍日再重又横貫而不逹赤星見帝以盆承星影而盖之一夜盆自破欲以百年厭之㑹博陵人賈徳胄教百年書百年嘗作數勑字徳胄封之以奏帝又發怒使召百年百年被召自知不免割帯玦留與妃斛律氏見帝於元都苑凉風堂使百年書𠡠字驗與徳胄所奏相類遣左右亂捶擊之又令人拽百年走遶堂下且走且擊所厯處血皆徧地氣息将盡曰願與阿叔作奴遂斬之弃池中池水盡赤帝於後園親臨瘞之妃把玦哀號不食月餘亦死玦猶在手拳不可開時年十四其父光自擘之乃開後主時改九院為二十七院掘地得小屍緋袍金帶一髻一觧一足有靴諸内參竊言百年太子也或以為太原王紹徳詔以襄城王子白澤襲爵樂陵王齊亡入闗徙蜀死汝南王彦理武平初封王位開府清都尹齊亡入闗随例授儀同大将軍封縣子女入太子宫故得不死隋開皇初卒於并州刺史始平王彦徳城陽王彦基定陽王彦康汝南王彦忠與汝南王同受封並加儀同後事闕武成諸子武成十三男胡皇后生後主及琅琊王儼李夫人生南陽王綽後宫生齊安王廓北平王貞髙平王仁英淮南王仁光西河王仁機樂平王仁邕頴川王仁儉安樂王仁雅丹陽王仁直東海王仁謙南陽王綽字仁通武成長子也以五月五日丙時生至午時後主乃生武成以綽母李夫人非正嫡故貶為弟初名融字君明出後漢陽王河清三年改封南陽别為漢陽置後綽始十餘嵗留守晉陽愛波斯狗尉破胡諫之綽歘然斫殺數狗狼籍在地破胡驚走不敢復言後為司徒冀州刺史好祼人畫為獸状縦犬噬而食之左轉定州汲井水為後池在樓上彈人好㣲行游獵無度恣情彊暴云學文宣伯為人有婦人抱兒路中逢之走避入草綽奪其兒飼波斯狗婦人號哭綽怒又縦狗使食婦人狗不食塗以兒血乃食焉後主聞之詔鎖綽赴行在所至而宥之問在州何者冣樂對曰多取蝎混蛆中觀之極樂後主即夜索蝎一斗比曉得二三升置諸浴斛使人祼卧其中號呌宛轉帝與綽臨觀喜噱不已謂綽曰有如此樂事何不早馳驛奏聞綽由是大為後主所寵拜大将軍朝夕同戲韓長鸞惡之綽尋除齊州刺史将發長鸞令綽親信誣告其反有司奏處大辟後主不忍顯戮使寵胡何猥薩於後園與綽角戲因搤殺之瘞於興聖佛寺經四百餘日乃歛顔色毛髪皆如生俗云五月五日生者腦不壊故也綽兄弟皆呼父為兄兄嫡母為家家乳母為姊姊婦為妹妹齊亡妃鄭氏為周武帝所幸請𦵏綽勑所司𦵏於永平陵北琅邪王儼字仁威武成第三子也初封東平王拜開府侍中中書監京畿大都督領軍大将軍領御史中丞遷大司徒尚書令大将軍録尚書事大司馬魏氏舊制中丞出千歩清道與皇太子分路行王公皆遥住車去牛頓軛於地以待中丞過其或遲違則赤棒棒之自都鄴後此儀浸絶武成欲雄寵儼乃使一依舊制儼初徔北宫出将上中丞凡京畿歩騎領軍之官屬中丞之威司徒之鹵簿莫不畢備帝與胡后在華林園東門外張幕隔青紗歩障觀之遣中尉驟馬趣仗不得入自言奉勅赤棒應聲碎其鞍馬驚人墜帝大笑以為善更勅令駐車傳語良乆觀者傾京邑儼恒居宫中坐含香殿視事諸父皆拜焉帝幸并州儼恒居守每送駕或中道或至晋陽乃還王師羅嘗從駕後至武成欲罪之辭曰臣與東平王别留連不覺晚武成憶儼為之下泣舍師羅不問儼器服翫飾皆與後主同所須悉官給於南宫嘗見新氷緑李還怒曰尊兄已有我何意無從是後主先得新竒屬官及工匠必獲罪太上胡后猶以為不足儼嘗患喉使醫下針張目不瞬又言於帝曰阿兄愞何能率左右帝每稱曰此黠兒也當有所成以後主為劣有廢立之意武成崩改封琅邪儼以和士開駱提婆䓁奢恣意甚不平嘗衆詰之二人相謂曰琅邪眼光奕奕數歩射人每奉對不覺汗出天威尚不爾也由是忌之武平二年出儼居北宫五日一朝不復得時見太后四月詔除太保餘官悉觧猶帯中丞且以京畿北城有武庫欲移儼於外然後奪其兵權書侍御史王子宜與儼左右開府髙舍洛中常侍劉辟彊説儼曰殿下被踈正由士開間構何可出北宫入百姓叢中也儼謂侍中馮子琮曰士開罪重兒欲殺之子琮心欲廢帝而立儼因賛成其事儼乃令子宜表彈士開罪請付禁推子琮雜以他文書奏之後主不審省而可之儼誑領軍庫狄伏連曰奉𠡠令領軍収士開伏連以諮子琮且請覆奏子琮曰琅邪王受勅何湏重奏伏連信之伏五十人於神虎門外詰旦執士開送御史儼使馮永洛就䑓斬之儼徒本意唯殺士開及是因逼儼曰事既然不可中止儼遂率京畿軍士三千餘人屯千秋門外帝使劉桃枝将禁兵八十人召儼桃枝遥拜儼命反縛将斬之禁兵散走帝又使馮子琮召儼儼辭曰士開謀廢至尊欲剃家家頭為尼罪合萬死臣為是矯詔誅之尊兄若欲殺臣不敢逃罪若放臣願遣姊姊来迎臣臣即入見姊姊即陸令萱也儼欲誘出殺之令萱執刀帝後聞之戰慄又使韓長鸞召儼儼将入劉辟彊牽衣諫曰若不斬提婆母子殿下無由得入廣寜安徳二王適從西来欲助成其事曰何不入辟彊曰人少安徳王顧衆而言曰孝昭誅楊遵彦只八十人今乃數千何言人少後主泣啟太后當與家家永别乃急召斛律光儼時亦召之光聞儼殺士開撫掌大笑曰龍子作事固自不似凡人入見後主於永巷帝率宿衛者歩騎四百授甲将出光曰小兒輩㺯兵與交手即亂鄙諺曰奴見大家心死至尊宜自至千秋門琅邪必不敢動皮景和亦以為然後主從之光歩道使人走出曰大家来儼徒駭散帝駐馬橋上遥呼之儼猶立不進光就謂曰天子弟殺一漢何苦執其手彊引以前請帝曰琅邪王年少輕為舉措長大自不復然願寛其罪帝㧞儼帶刀鐶亂築辯頭良久乃釋之收伏連及髙舍洛王子宜劉辟彊都督翟顯貴於後園帝親射之而後斬皆支觧暴之都街下文武職吏盡欲殺之光以皆勲貴子弟恐人心不安趙彦深亦云春秋責帥於是罪之各有差儼之未獲罪也鄴城北有白馬佛塔石虎時為佛圗澄作也儼將修之巫云浮屠不可動動之北城當失主不徔破至第二級得白虵長數丈囬旋失之數旬而儼敗自是太后處儼於宫内食必自嘗之陸令萱説帝曰琅邪王聰明雄勇觀其相表殆非人臣自専殺已来常懐恐懼宜早為計何洪珍與和士開素善亦請殺之未決帝以食輿宻迎祖珽問之珽稱周公殺管蔡季友酖慶父以對帝納其言以儼之晋陽使右衛大将軍趙元侃誘執儼元侃曰臣昔事先帝日見先帝愛王今寜就死不能行此帝出元侃為豫州刺史九月帝啟太后曰眀旦欲與仁威出獵湏早出早還是夜四鼓帝召儼儼疑之陸令萱曰兄兄喚児何不去儼出至永巷劉桃枝反接其手儼呼曰乞見家家尊兄桃枝以䄂塞其口反􅂁䝉頭負出至大眀宫鼻血滿面遂拉殺之時年十四裹之以席埋於室内帝使啟太后臨哭十餘聲即擁入殿眀年三月𦵏於鄴西贈謚曰椘㳟哀帝以慰太后有遺腹四男生數月皆幽死以平陽王淹孫世俊嗣儼妃李祖欽女也進為椘帝后居宣則宫齊亡乃嫁焉齊安王廓字仁𢎞武成第四子也性長者無過行位特進開府儀同三司定州刺史北平王貞字仁堅武成第五子也沈審寛厚帝常曰此兒得我鳯毛位司州牧京畿大都督兼尚書令録尚書事帝行幸總留䑓事積年後主以貞長大漸忌之阿那肱承㫖令馮士幹劾繫貞於獄奪其留後權髙平王仁英武成第六子也舉止軒昂精神無檢格位定州刺史淮南王仁光武成第七子也性躁暴位清都尹次西河王仁機生而無骨不自支持次樂平王仁邕次頴川王仁儉次安樂王仁雅從小有瘖疾次丹陽王仁直次東海王仁謙皆飬於北宫琅邪王死後諸王守禁彌切武平末仁邕已下始得出外供給儉薄取充而已尋後主窮蹙以廓為光州刺史貞為青州仁英為冀州仁儉為膠州仁直為濟州自廓已下多與后主死於長安仁英以清狂仁雅以瘖疾獲免俱徙蜀隋開皇中追還仁英詔與蕭琛陳叔寳修其本宗祭祀未㡬而卒後主諸子後主五男穆皇后生幼主諸姬生東平王恪次善徳次賈徳次質錢胡太后以恪嗣琅邪王尋夭折齊滅周武帝以任城王以下大小二十一王歸于長安皆有封爵其後不從戮者散配西土皆死於邉通志卷八十五上
