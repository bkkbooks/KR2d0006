body:
  text: 通志卷十下宋右廸功郎鄭樵漁仲撰晉紀第十下元帝明帝成帝康帝穆帝哀帝廢帝簡文帝孝武帝安帝恭帝元皇帝諱睿字景文宣帝曾孫琅邪恭王覲之子也咸寧二年生於洛陽有柛光之異一室盡明所藉藁如始刈及長白毫生於日角之左隆凖龍顔目有精曜顧眄煒如也年十五嗣位琅邪王幼有令聞及惠皇之際王室多故帝每恭儉退讓以免于禍沉敏有度量不顯灼然之迹故時人未之識焉惟侍中嵇紹異之謂人曰琅邪王毛骨非常殆非人臣之相也元康三年拜員外散騎常侍累遷左將軍從討成都王穎蕩隂之敗也叔父東安王繇為穎所害帝懼禍及將出奔其夜月正明而禁衞嚴警無由得去甚窘廹有頃雲霧晦㝠雷雨暴至徼者皆弛因得潛出穎先令諸關無得出貴人帝既至河陽為津吏所止從者宋典後來以䇿鞭帝馬而笑曰舍長官禁貴人汝亦被拘邪吏乃聽過至洛陽迎太妃俱歸國東海王越之收兵下邳也假帝輔國將軍尋加平東將軍監徐州諸軍事鎮下邳俄遷安東將軍都督揚州諸軍事越西迎大駕留帝居守永嘉初用王導計始鎮建鄴以顧榮為軍司馬賀循為參佐王敦王導周顗刁協等為腹心股肱賔禮名賢存問風俗江東歸心焉屬太妃薨於國自表奔喪葬畢還鎮増封宣城郡二萬戸加鎮東大將軍開府儀同三司受越命討征東將軍周馥走之及懷帝䝉塵於平陽司空荀藩等移檄天下推帝為盟主江州刺史華軼不從使豫章内史周廣前江州刺史衛展討禽之愍帝即位加左丞相嵗餘進位丞相大都督中外諸軍事遣諸將分定江東斬叛者孫弼於宣城平杜弢於湘州承制赦荆揚及西都不守帝出師露次躬擐甲胄移檄四方徴天下之兵尅日進討于時有玉冊見於臨安白玉麒麟神璽出於江寧其文曰長壽萬年日有重暈皆以為中興之象焉建武元年春正月辛巳平東將軍宋哲至宣愍帝詔曰遭運迍否皇綱不振朕以寡徳奉承洪緒不能祈天永命紹隆中興至使凶人敢帥族類逼迫京輦朕今幽塞窮城憂慮萬端恐一旦崩潰卿徃詣丞相具宣朕意使攝萬機時據舊都修復陵廟以雪大耻三月帝素服出次舉哀三日西陽王羕及羣僚參佐州征牧守等上尊號帝不許羕等以死固請至於再三帝慨然流涕曰孤罪人也惟有蹈節死義以雪天下之耻庶贖鈇鉞之誅吾本琅邪王諸賢見逼不已乃呼私奴命駕將反國羣臣乃不敢逼請依魏晉故事為晉王許之辛卯即王位大赦改元其殺祖父母父母及劉聰石勒不從此令諸參軍拜奉車都尉掾屬駙馬都尉辟掾屬百餘人時人謂之百六掾乃備百官立宗廟社稷于建康時四方競上符瑞帝曰孤負四海之責未能思􅄽何徴祥之有丙辰立世子紹為晉王太子以撫軍大將軍西陽王羕為太保征南大將軍漢安侯王敦為大將軍右將軍王導都督中外諸軍事驃騎將軍左長史刁恊為尚書左僕射封王子宣成公裒為琅邪王六月丙寅司空并州刺史廣武侯劉琨幽州刺史左賢王渤海公段匹磾領護烏丸校尉鎮北將軍劉翰單于廣寗公段辰遼西公段眷冀州刺史祝阿子邵續青州刺史廣饒侯曹嶷兗州刺史定襄侯劉演東夷校尉崔毖鮮卑大都督慕容廆等一百八十人上書勸進帝優令答之石勒將石虎圍譙城平西將軍祖逖擊走之已而帝傳檄天下曰逆賊石勒肆虐河朔逋誅歴載游魂縱逸復遣凶黨石虎犬羊之衆越河南渡縱其鴆毒平西將軍祖逖帥衆討擊應時潰散今遣車騎將軍琅邪王裒等九軍銳卒三萬水陸四道徑造賊埸受逖節度有能梟虎首者賞絹三千匹金五十斤封縣侯食邑二千戸又賊黨能梟送虎首封賞亦同之七月散騎侍郎朱嵩尚書郎顧球卒帝痛之將為舉哀有司奏舊尚書郎不在舉哀之例帝曰衰亂之弊特相痛悼於是遂舉哀哭之甚慟丁未梁王悝薨以太尉荀組為司徒弛山澤之禁八月甲午封梁王世子翹為梁王荆州刺史第五猗為賊帥杜曽所推遂與曽同反九月戊寅王敦使武昌太守趙誘襄陽太守朱軌陵江將軍黄峻討猗為其將杜曽所敗誘等皆死之石勒害京兆太守華輯梁州刺史周訪討杜曽大破之十月丁未琅邪王裒薨十一月甲子封汝南王子弼為新蔡王丁卯以司空劉琨為太尉置史官立太學是歲揚州大旱太興元年春正月戊申朔臨朝懸而不樂三月癸丑愍帝崩問至帝斬縗居廬丙辰百寮上尊號令曰孤以不徳當厄運之極臣節未立匡救未舉夙夜所以忘寝食也今宗廟廢絶億兆無繫羣官庶尹咸勉之以大政亦何敢辭輙敬從所請是日即皇帝位大赦改元文武増位二等庚午立王太子紹為皇太子壬申詔在事之人其有政績可述刑獄得中者及當官軟弱茹柔吐剛行身穢濁脩飾時譽者各以名聞又詔逺近贄禮一切斷之夏四月丁丑朔日有蝕之加大將軍王敦江州牧進驃騎將軍王導開府儀同三司戊寅初禁招魂葬乙酉西平地震五月癸丑使持節侍中都督太尉并州刺史廣武侯劉琨為段匹磾所害六月旱帝親雩改丹陽内史為丹陽尹甲申以尚書左僕射刁協為尚書令平南將軍曲陵公荀崧為尚書左僕射庚寅以滎陽太守李矩為都督司州諸軍事司州刺史戊戍封皇子晞為武陵王初置諫鼓謗木秋七月戊申詔二千石令長當祗奉舊憲正身明法抑齊豪彊存恤孤獨隐實戸口勸課農桑州牧刺史當互相檢察不得顧私虧公長吏有志在奉公而不見進用者有貪惏穢濁而以財勢自安者若有不舉當受故縱蔽善之罪有而不知當受闇塞之責各明慎奉行劉聰死其子粲嗣偽位八月冀徐青三州蝗靳凖弑劉粲自號漢王冬十月癸未加廣州刺史陶侃平南將軍劉曜僭即皇帝位于赤壁十一月乙卯日夜出髙三丈中有赤青珥新野王弼薨加大將軍王敦荆州牧庚申詔羣公卿士其各上封事具陳災異所由興無有所諱新作聽訟觀故歸命侯孫皓子璠謀反伏誅十二月劉聰故將王騰馬忠等誅靳凖送傳國璽於劉曜武昌地震丁丑封顯義亭侯渙為琅邪王己卯琅邪王渙薨癸巳詔求吴之髙徳名賢或未旌錄者具條列以聞江東三郡饑遣使振給之彭城内史周撫殺沛國内史周黙以反二年春正月丁卯崇陽陵毁帝素服哭三日使冠軍將軍梁堪守太常馬龜等修復山陵迎梓宮于平陽不尅而還二月太山太守徐龕斬周撫傳首京師夏四月龍驤將軍陳川以浚儀叛降於石勒太山太守徐龕以郡叛自號兖州刺史冦濟岱秦州刺史陳安叛降于劉曜五月癸丑太陽陵毁帝素服哭三日徐揚及江西諸郡蝗吴郡大饑平北將軍祖逖及石勒將石虎戰于浚儀王師敗績壬戍詔以百姓凋弊國用並匱自今非軍事所須者皆省之甲子梁州刺史周訪及杜曽戰於武當斬之禽第五猗六月丙子加周訪安南將軍罷御府及諸郡丞置慱士員五人己亥加太常賀循開府儀同三司秋七月乙丑太常賀循卒八月肅慎獻楛矢石砮徐龕冦東莞遣太子左衞率羊鑒行征虜將軍統徐州刺史蔡豹討之冬十月平北將軍祖逖使督䕶陳超襲石勒將桃豹超敗没於陣十一月戊寅石勒僭即王位國號趙十二月乙亥大赦詔百官各上封事并省衆卑慕容廆襲遼東東夷校尉平州刺史崔毖奔髙句驪是歲南陽王保稱晉王於祁山三吴大饑三年春正月丁酉朔晉王保為劉曜所逼遷于桑城二月辛未石勒將石虎冦猒次平北將軍冀州刺史邵續擊之續敗没於陣三月慕容廆奉送玉璽三紐閏月以尚書周顗為尚書僕射夏四月壬辰枉矢流于翼軫五月丙寅孝懷帝太子詮遇害于平陽帝三日哭庚寅地震是月晉王保為其將張春所害劉曜使陳安攻春滅之安因叛曜石勒將徐龕率衆来降六月大水丁酉盗殺西中郎將䕶羌校尉涼州刺史西平公張實實弟茂嗣領平西將軍涼州刺史秋七月丁亥詔以琅邪國人在江表者近有千戸今立為懷徳縣統丹陽郡可依漢髙祖沛光武南頓故事復其縣人祖逖部將衛策大破石勒别軍於汴水加逖為鎮西將軍八月戊午尊敬王后虞氏為敬皇后辛酉遷神主于太廟辛未梁州刺史安南將軍周訪卒皇太子釋奠于太學以湘州刺史甘卓為安南將軍梁州刺史九月徐龕反叛降于石勒冬十月丙辰徐州刺史蔡豹以畏懦伏誅王敦殺武陵内史向碩四年春二月徐龕又帥衆來降鮮卑末波奉送皇帝信璽庚戌告于太廟乃受之癸亥日鬬三月置周易儀禮公羊博士癸酉以平東將軍曹嶷為安東將軍夏四月辛亥帝親覽庶獄石勒攻猒次䧟之撫軍將軍幽州刺史段匹磾没于勒五月旱庚申詔曰昔漢二祖及魏武皆免良人武帝時涼州覆敗諸為奴婢亦皆復籍此累代成規也其免中州良人遭難為揚州諸郡僮客者以備征役秋七月大水甲戍以尚書戴若思為征西將軍都督司兖豫并冀雍六州諸軍事司州刺史鎮合肥丹陽尹劉隗為鎮北將軍都督青徐幽平四州諸軍事青州刺史鎮淮隂壬午以驃騎將軍王導為司空八月常山崩九月壬寅鎮西將軍豫州刺史祖逖卒冬十月壬午以逖弟侍中約為平西將軍豫州刺史十二月以慕容廆為持節都督幽平二州東夷諸軍事平州牧封遼東郡公永昌元年春正月乙卯大赦改元戊辰大將軍王敦舉兵於武昌以誅劉隗為名龍驤將軍沈充帥衆應之三月徵征西將軍戴若思鎮北將軍劉隗還衞京都以司空王導為前鋒大都督以戴若思為驃騎將軍丹陽諸郡皆加軍號加僕射周顗尚書左僕射領軍王䆳尚書右僕射以太子右衞率周莚行冠軍將軍統兵三千討沈充甲子封皇子昱為琅邪王劉隗軍于金城右將軍周札守石頭帝親被甲徇六師於郊外遣平南將軍陶侃領江州安南將軍甘卓領荆州各帥所統以躡敦後四月敦前鋒攻石頭周札開城門應之奮威將軍侯禮死之敦據石頭戴若思劉隗帥衆攻之王導周顗郭逸虞潭等三道出戰六軍敗績尚書令刁恊奔于江乘為賊所害鎮北將軍劉隗奔於石勒遣使謂敦曰公若不忘本朝於此息兵則天下尚可共安也如其不然朕當歸於琅邪以避賢路辛未大赦敦乃自為丞相都督中外諸軍錄尚書事封武昌郡公邑萬戸丙子驃騎將軍秣陵侯戴若思尚書左僕射䕶軍將軍武城侯周顗為敦所害敦將沈充䧟吴國魏䧟湘州吴國内史張茂湘州刺史譙王承並遇害五月壬申敦以太保西陽王羕為太宰加司空王導尚書令乙亥鎮南大將軍甘卓為襄陽太守周慮所害蜀賊張龍冦巴東建平太守柳純擊走之石勒遣騎㓂河南六月旱秋七月王敦自加兖州刺史郗鑒為安北將軍石勒將石虎攻䧟太山執守將徐龕兖州刺史郗鑒自鄒山退守合肥八月敦以其兄含為衛將軍自領寧益二州都督琅邪太守孫黙叛降于石勒冬十月大疫死者十二三己丑都督荆梁二州諸軍事平南將軍荆州刺史武陵侯王廙卒辛卯以下邳内史王䆳為征北將軍都督青徐幽平四州諸軍事鎮淮隂新昌太守梁碩起兵反京師大霧黑氣蔽天日月無光石勒攻䧟襄城城父遂圍譙破祖約别軍約退據壽春十一月以司徒荀組為太尉己酉太尉荀組薨罷司徒并丞相閏月己丑帝崩于内殿時年四十七葬建平陵廟號中宗帝性簡儉冲素容納直言虛已待物初鎮江東頗以酒色廢事王導深以為言帝命酌引觴覆之於此遂絶有司嘗奏太極殿廣室施絳帳帝曰漢文集上書皂囊為帷遂令冬施青布夏施青練帷帳將拜貴人有司請市雀釵帝以煩費不許所幸鄭夫人衣無文綵從母弟王廙為母立屋過制流涕止之然晉室遘紛皇輿播越天命未改人謀叶賛元戎屢動不出江畿經畧區區僅全吴楚終於下陵上辱憂憤告謝恭儉之德雖充雄武之量不足始秦時望氣者云五百年後金陵有天子氣故始皇東游以厭之改其地曰秣陵壍北山以絶其勢及孫權之稱號自謂當之孫盛以為始皇逮于孫氏四百三十七載考其歴數猶為未及元帝之渡江也乃五百二十六年真人之應在於此矣咸寧初風吹太社樹折社中有青氣占者以為東莞有天子之祥由是徙封東莞王於琅邪即武王也及吳之亡王濬實先至建鄴而皓之降欵遠歸璽於琅邪天意人事又符中興之兆太安之際童謡云五馬浮渡江一馬化為龍及永嘉中歲鎮熒惑太白聚牛女之間識者以為吴越之地當興王者是歲王室淪覆帝與西陽汝南南頓彭城五王獲濟而帝竟登大位焉初元石圖有牛繼馬後故宣帝深忌牛氏遂為二榼共一口以貯酒焉帝先飲佳者而以毒酒鴆其將牛金而㳟王妃夏侯氏竟通小吏牛氏而生元帝亦有符云元帝建武元年太興四年永昌元年即位六年明皇帝諱紹字道畿元皇帝長子也幼而聰哲為元帝所寵異年數歲嘗坐置膝前屬長安使來因問帝曰汝謂日與長安孰逺對曰長安近不聞人從日邊來居然可知也元帝異之明日宴羣僚又問之對曰日近元帝失色曰何乃異間者之言乎對曰舉目則見日不見長安由是益竒之建興初拜東中郎將鎮廣陵元帝為晉王立為王太子及帝即尊號立為皇太子性至孝有文武才畧欽賢愛客雅好文辭當時名臣自王導庾亮温嶠桓彛阮放等咸見親待嘗論聖人真假之意導等不能屈又習武藝善撫將士于時東朝濟濟逺近屬心焉及王敦之亂六軍敗績帝欲帥將士決戰升車將出中庶子温嶠固諫抽劒斬鞅乃止敦素以帝神武明畧朝野之所欽信欲誣以不孝而廢焉大㑹百官而問温嶠曰皇太子以何德稱聲色俱厲必欲使有言嶠對曰鉤深致逺蓋非淺局所量以禮觀之可稱為孝矣衆皆以為信然敦謀遂止永昌元年閏月己丑元帝崩庚寅太子即皇帝位大赦尊所生荀氏為建安郡君太寧元年春正月癸巳黄霧四塞京師火李雄使其將李驤任囬冦臺登將軍司馬玫死之越嶲太守李釗漢嘉太守王載以郡叛降于驤二月葬元帝于建平陵帝徒跣至于陵所以特進華恒為驃騎將軍都督石頭水陸軍事乙丑黄霧四塞丙寅隕霜壬申又隕霜殺榖三月戊寅朔改元臨軒停饗宴之禮懸而不樂丙戍隕霜殺草饒安東光安陵三縣災燒七千餘家死者萬五千人石勒攻䧟下邳徐州刺史卞敦退保盱眙王敦獻皇帝信璽一紐敦將謀簒逆諷朝廷徵已帝乃手詔徵之夏四月敦下屯于湖轉司空王導為司徒自領揚州牧巴東監軍柳純為敦所害以尚書陳眕為都督幽平二州諸軍事幽州刺史五月京師大水李驤等寇寧州刺史王遜遣將姚岳距戰於堂狼大破之梁碩攻䧟交州刺史王諒死之六月壬子立皇后庾氏平南將軍陶侃遣參軍髙寳攻梁碩斬之傳首京師進侃位征南大將軍開府儀同三司秋七月丙子朔震太極殿柱是月劉曜攻陳安於隴城滅之八月以安北將軍郗鑒為尚書令石勒將石虎攻䧟青州刺史曹嶷遇害冬十一月王敦以其兄征南大將軍含為征東將軍都督揚州江西諸軍事以軍國饑乏調刺史以下米各有差二年春正月丁丑帝臨朝停饗宴之禮懸而不樂庚辰赦五歳刑以下術人李脫造妖書惑衆斬于建康市石勒將石虎冦兖州刺史劉遐自彭城退保泗口三月劉曜將康平冦魏興及南陽夏五月王敦矯詔拜其子應為武衞將軍兄含為驃騎大將軍帝所親信常從督公乗雄冉曽並為敦所害六月敦將舉兵内向帝密知之乃乘巴滇駿馬微行至于湖隂察敦營壘而出有軍士疑帝非常人又敦正晝寝夢日環其城驚起曰此必黄鬚鮮卑奴來也帝母荀氏燕代人帝狀類外氏髯黄敦故謂帝云於是使五騎物色追帝帝亦馳去馬有遺糞輙以水灌之見逆旅賣食嫗以七寳鞭與之曰後有騎來可以此示也俄而追者至問嫗嫗曰去已逺矣因以鞭示之五騎傳玩稽留遂久又見馬糞冷以為信逺而止不追帝僅而獲免丁卯加司徒王導大都督假節領揚州刺史以丹陽尹温嶠為中壘將軍與右將軍卞敦守石頭以光禄勲應詹為䕶軍將軍假節督朱雀橋南諸軍事以尚書令郗鑒行衛将軍都督從駕諸軍事以中書監庾亮領左衞將軍以尚書卞壼行中軍將軍徵平北將軍徐州刺史王䆳平西將軍豫州刺史祖約北中郎將兖州刺史劉遐奮武將軍臨淮太守蘇峻奮威將軍廣陵太守陶瞻等還衞京師帝次于中堂秋七月壬申朔敦遣其兄含及錢鳳周撫鄧岳等水陸五萬至于南岸温嶠移屯水北燒朱雀桁以挫其鋒帝躬率六軍出次南皇堂至癸酉夜募壯士遣將軍叚秀中軍司馬曹渾左衛參軍陳嵩鍾寅等甲卒千人渡水掩其未備平旦戰於越城大破之斬其前鋒將何康王敦憤惋而死前宗正虞潭起義師於㑹稽沈充帥萬餘人來㑹含等庚辰築壘于陵口丁亥劉遐蘇峻等帥精卒萬人以至帝夜見勞之賜將士各有差義興人周蹇殺敦所署太守劉芳平西將軍祖約逐敦所署淮南太守任台于壽春乙未賊衆濟水䕶軍將軍應詹帥建威將軍趙允等距戰不利賊至宣陽門北中郎將劉遐蘇峻等自南塘横擊大破之劉遐又破沈充于青溪丙申賊燒營宵遁丁酉帝還宮大赦惟敦黨不原於是分遣諸將追其黨與悉平之封司徒王導為始興郡公邑三千戸賜絹九千匹丹陽尹温嶠建寧縣公尚書下壼建興縣公中書監庾亮永昌縣公北中郎將劉遐泉陵縣公奮武將軍蘇峻邵陵縣公邑各一千八百戸絹各五千四百疋尚書令郗鑒髙平縣侯䕶軍將軍應詹觀陽縣侯邑各千六百戸絹各四千八百匹建威將軍趙允湘南縣侯右將軍卞敦益陽縣侯邑各千六百戸絹各三千二百匹其餘封賞各有差冬十月以司徒王導為太保領司徒太宰西陽王羕領太尉䕶軍將軍應詹為平南將軍都督江州諸軍事江州刺史劉遐為監淮北諸軍事徐州刺史庾亮為䕶軍將軍詔王敦羣從一無所問是時石勒將石生屯洛陽豫州刺史祖約退保壽陽十二月壬子帝謁建平陵從大祥之禮梁水太守爨亮益州太守李逷以興古叛降于李雄沈充故將顧颺反於武康攻燒城邑州縣討斬之三年春二月戊辰復三族刑惟不及婦人三月幽州刺史段末波卒以弟牙嗣戊辰立皇子衍為皇太子大赦増文武位二等大酺三日賜鰥寡孤獨帛人二匹癸巳徵處士臨海任旭㑹稽虞喜並為博士夏四月詔太宰司徒已下詣都坐參議政道諸所因革務盡事中又詔令羣臣直言毋有所隠己亥雨雹石勒將石良㓂兖州刺史檀贇力戰死之將軍李矩等並衆潰而歸石勒盡䧟司兖豫三州之地五月以征南大將軍陶侃為征西大將軍都督荆湘雍梁四州諸軍事荆州刺史王舒為安南將軍都督廣州諸軍事廣州刺史六月石勒將石虎攻劉曜將劉岳於新安䧟之以廣州刺史王舒為都督湘中諸軍事湘州刺史湘州刺史劉顗為平越中郎將都督廣州諸軍事廣州刺史大旱自正月不雨至于是月秋七月辛未以尚書令郄鑒為車騎將軍都督青兖二州諸軍事假節鎮廣陵領軍將軍卞壼為尚書令詔求三恪及國初宗室哲王佐命功臣有禋祀廢絶者主者其詳議諸應立後者以聞又詔曰郊祀天地帝王之重事自中興以來惟南郊未曽北郊四時五郊之禮都不復設五嶽四瀆名山大川載在祀典應望秩者悉廢而未舉主者其依舊詳處八月詔求吴時將相名賢之胄有能纂脩家訓又忠孝仁義静已守貞不聞於時者州郡中正亟以名聞勿有所遺閏月以尚書左僕射荀崧為光禄大夫錄尚書事尚書鄧攸為尚書左僕射壬午帝不悆召太宰西陽王羕司徒王導尚書令卞壼車騎將軍郄鑒䕶軍將軍庾亮領軍將軍陸􅁮丹陽尹温嶠並受遺詔輔太子戊子帝崩于東堂年二十七葬武平陵廟號肅宗帝聰明有機斷尤精物理于時兵凶歳饑死疫過半虛弊既甚事極艱虞屬王敦挾震主之威將移神器帝﨑嶇遵養以弱制彊潛謀獨斷廓清大祲改授荆湘等四州以分上流之勢撥亂反正彊本弱枝雖饗國日淺而規模𢎞逺矣明帝太寧三年成皇帝諱衍字世根明帝長子也太寧三年三月戊辰立為皇太子閏月戊子明帝崩己丑太子即皇帝位大赦増文武位二等賜鰥寡孤老帛人二匹尊皇后庾氏為皇太后秋九月癸卯皇太后臨朝稱制司徒王導錄尚書事與中書令庾亮參輔朝政以撫軍將軍南頓王宗為驃騎將軍領軍將軍汝南王祐為衞將軍辛丑葬明帝于武平陵冬十一月癸巳朔日有食之廣陵相曹渾有罪下獄死咸和元年春二月丁亥大赦改元大酺五日賜鰥寡孤老米人二斛京師百里内復一年夏四月石勒遣其將石生㓂汝南汝南人執内史祖濟以叛甲子尚書左僕射鄧攸卒五月大水六月癸亥使持節散騎常侍監淮北諸軍事北中即將徐州刺史泉陵公劉遐卒癸酉以車騎將軍郄鑒領徐州刺史征虜將軍郭黙為北中郎將假節監淮北諸軍劉遐部曲將李龍史迭奉遐子肇代遐位以距黙臨淮太守劉矯擊破之斬龍傳首京師秋七月癸丑使持節都督江州諸軍事江州刺史平南將軍觀陽伯應詹卒八月以給事中前將軍丹陽尹温嶠為平南將軍假節都督江州刺史九月旱李雄將張龍㓂涪陵執太守謝俊冬十月封魏武帝元孫曹勱為陳留王以紹魏丙寅衞將軍汝南王祐薨己巳封皇弟岳為吳王車騎將軍南頓王宗有罪伏誅貶其族為馬氏免太宰西陽王羕降為弋陽縣王庚辰赦百里内五嵗以下刑是月劉曜將黄秀帛成冦鄼平北將軍魏該帥衆奔襄陽十一月壬子大閱於南郊改定王侯國秩九分食一石勒將石聰攻壽陽不尅遂侵逡遒阜陵加司徒王導大司馬假黄鉞都督中外征討諸軍事以禦之歴陽太守蘇峻遣其將韓晃討石聰走之時大旱自六月不雨至于是月十二月濟㟭太守劉闓殺下邳内史夏侯嘉叛降石勒梁王翹薨二年春正月寧州秀才龎遺起義兵攻李雄將任囬李謙等雄遣其將羅恒費黒救之寧州刺史尹奉遣禆將姚岳朱提太守楊術援遺戰于臺登岳等敗績術死之三月益州地震夏四月旱己未豫章地震五月甲申朔日有食之丙戍加豫州内史祖約為鎮西將軍戌子京師大水冬十月劉曜使其子允侵枹罕遂畧河南地十一月豫州刺史祖約歴陽太守蘇峻等反十二月辛亥蘇峻使其將韓晃入姑就屠于湖壬子彭城王雄章武王休叛奔峻庚申京師戒嚴假䕶軍將軍庾亮節為征討都督以右衛將軍趙允為冠軍將軍歴陽太守使與左將軍司馬流帥師距峻戰于慈湖流敗死之假驃騎將軍鍾雅節帥舟軍與趙允為前鋒以距峻丙寅徙封琅邪王昱為㑹稽王吳王岳為琅邪王辛未宣城内史桓彛及峻戰于蕪湖彛軍敗績車騎將軍郄鑒遣廣陵相劉矩帥師赴京師三年春正月平南將軍温嶠帥師赴京師次于尋陽遣督䕶王愆期西陽太守鄧嶽鄱陽太守紀睦為前鋒征西大將軍陶侃遣督䕶龔登受嶠節度鍾雅趙允等次慈湖王愆期鄧嶽等次直瀆丁未峻濟自横江登牛渚二月庚戌峻至于蔣山假領軍將軍卞壼節帥六軍及峻戰于西陵王師敗績丙辰峻攻青溪柵因風縱火王師又大敗尚書令領軍將軍卞壼丹陽尹羊曼黄門侍郎周導廬江太守陶瞻並遇害死者數千人庾亮又敗于宣陽門内遂攜其諸弟與郭黙趙允奔尋陽於是司徒王導右光禄大夫陸曄荀崧等衞帝於太極殿太常孔愉守宗廟賊乗勝麾戈接於帝座突入太后後宮左右侍人皆見掠奪是時太官唯有燒餘米數石以供御膳百姓號泣響震都邑丁巳峻矯詔大赦又以祖約為侍中太尉尚書令自為驃騎將軍錄尚書事吴郡太守庾冰奔于㑹稽三月丙子皇太后庾氏崩夏四月石勒攻宛南陽太守王國叛降于勒壬申葬明穆皇后于武平陵五月乙未峻逼遷天子于石頭帝哀泣升車宮中慟哭峻以倉屋為宮遣管商張瑾𢎞徽㓂晉陵韓晃㓂義興吴興太守虞潭與庾冰王舒等起義兵於三吴丙午征西大將軍陶侃平南將軍温嶠䕶軍將軍庾亮平北將軍魏該舟軍四萬次于蔡洲六月韓晃攻宣城内史桓彛力戰死之壬辰平北將軍雍州刺史魏該卒于師廬江太守毛寶攻賊合肥戍㧞之秋七月祖約為石勒將石聰所攻衆潰奔于歴陽石勒將石虎攻劉曜於蒲坂八月曜及石虎戰于髙侯虎敗績曜遂圍石生於洛陽九月戊申司徒王導奔于白石庚午陶侃使督䕶楊謙攻峻于石頭温嶠庾亮陣于白石竟陵太守李陽距賊南偏峻輕騎出戰墜馬斬之衆遂大潰賊黨復立峻弟逸為帥前交州刺史張璉據始興反進攻廣州鎮南司馬曽勰等擊破之冬十月李雄將張龍㓂涪陵太守趙弼没於賊十二月乙未石勒敗劉曜於洛陽獲之是歳石勒將石虎攻氐帥蒲洪於隴山降之四年春正月帝在石頭賊將匡術以苑城歸順百官赴焉侍中鍾雅右衛將軍劉超謀奉帝出為賊所害戊辰冠軍將軍趙允遣將甘苖討祖約于歴陽敗之約奔于石勒其將牽騰帥衆降峻子碩攻臺城又焚太極東堂秘閣皆盡城中大飢米斗萬錢二月大雨霖丙戌諸軍攻石頭李陽與蘇逸戰於柤浦陽軍敗建威内史滕含以銳卒擊之逸等大敗含奉帝御于温嶠舟羣臣頓首號泣請罪弋陽王羕有罪伏誅丁亥大赦時兵火之後宮闕灰燼以建平園為宮甲午蘇逸以萬餘人自延陵湖將入吴興乙未將軍王允之及逸戰于溧陽獲之壬寅以湘州并荆州劉曜太子毗與其大司馬劉允帥百官奔于上邽關中大亂三月壬子以征西大將軍陶侃為太尉封長沙郡公車騎將軍郗鑒為司空封南昌縣公平南將軍温嶠為驃騎將軍開府儀同三司封始安郡公其餘封拜各有差庚午以右光祿大夫陸曄為衛將軍開府儀同三司復封髙密王紘為彭城王以䕶軍將軍庾亮為平西將軍都督揚州之宣城江西諸軍事假節領豫州刺史鎮蕪湖夏四月乙未驃騎將軍始安公温嶠卒秋七月有星孛于西北㑹稽吴興宣城丹陽大水詔復遭賊郡縣租稅三年八月劉曜將劉允等帥衆侵石生次于雍九月石勒將石虎擊允斬之進屠上邽盡滅劉氏坑其黨三千餘人冬十月廬山崩十二月壬辰右將軍郭黙害平南將軍江州刺史劉允太尉陶侃帥師討黙是歳天裂西北五年春正月己亥大赦癸亥詔除諸將任子二月以尚書陸玩為尚書左僕射孔愉為右僕射夏五月旱且飢疫乙卯太尉陶侃擒郭黙于尋陽斬之石勒將劉徵㓂南沙都尉許儒遇害進入海虞六月癸巳初稅田畝二升秋八月石勒僭即皇帝位使其將郭敬㓂襄陽南中郎將周撫退歸武昌中州流人悉降于勒郭敬遂㓂襄陽屯于樊城九月造新宮始繕苑城甲辰徙樂成王欽為河間王封彭城王紘子浚為髙密王冬十月丁丑幸司徒王導第置酒大㑹李雄將李壽㓂巴東建平監軍毋邱奥太守陽謙退歸宜都十二月張駿稱臣於石勒六年春正月癸巳劉徵復㓂婁縣遂掠武進乙未進司空郗鑒都督吴國諸軍事戊午以運漕不繼發王公已下千餘丁各運米六斛二月己丑以幽州刺史大單于段遼為驃騎將軍三月壬戌朔日有食之癸未詔舉賢良直言之士夏四月旱六月丙申復故河間王顒爵位封彭城王植子融為樂成王章武王混子珍為章武王秋七月李雄將李壽侵隂平武都氐帥楊難敵降之八月庚子以左僕射陸玩為尚書令七年春正月辛未大赦三月西中郎將趙允司徒中郎匡術攻石勒馬頭塢剋之勒將韓雍㓂南沙及海虞夏四月勒將郭敬䧟襄陽五月大水秋七月丙辰詔諸養獸之屬損費者多一切除之太尉陶侃遣子平西參軍斌與南中郎將桓宣攻石勒將郭敬破之剋樊城竟陵太守李陽㧞新野襄陽因而戍之冬十一月壬子朔進太尉陶侃為大將軍詔舉賢良十二月庚戍帝遷于新宮八年春正月辛亥朔詔以新宮成其赦五歳刑以下令諸郡舉力人能舉千五百觔以上者丙寅李雄將李壽䧟寧州刺史尹奉及建寧太守霍彪並降之癸酉以張駿為鎮西大將軍丙子石勒遣使致賂詔焚之夏四月詔封故新蔡王弼弟邈為新蔡王以束帛徵處士尋陽翟湯㑹稽虞喜五月有星隕于肥鄉麒麟騶虞見于遼東乙未車騎將軍遼東公慕容廆卒子皝嗣位六月甲辰撫軍將軍王舒卒秋七月戊辰石勒死子𢎞嗣偽位其將石聰以譙來降冬十月石𢎞將石生起兵於關中稱秦州刺史遣使來降冬十月石虎攻石朗於洛陽因進擊石生俱滅之十二月石生故部將郭權遣使請降九年春正月隕石于涼州二以郭權為鎮西將軍雍州刺史二月丁卯加鎮西大將軍張駿為大將軍三月丁酉㑹稽地震夏四月石𢎞將石虎使石斌攻郭權於郿䧟之六月李雄死其兄子班嗣偽位乙卯太尉長沙公陶侃薨大旱詔太官徹膳省刑恤孤寡貶費節用辛未加平西將軍庾亮都督江荆豫益梁雍六州諸軍事秋八月大雩自五月不雨至于是月九月戊寅散騎常侍衞將軍江陵公陸􅁮卒冬十月李雄子期殺李班而自立班弟玝與其將焦㑹羅凱等並來降十一月石虎弑石𢎞自立為天王十二月丁卯以東海王冲為車騎將軍琅邪王岳為驃騎將軍蘭陵人朱縱斬石虎將郭祥以彭城來降咸康元年春正月庚午朔帝加元服大赦改元増文武位一等大酺三日賜鰥寡孤獨不能自存者粟人五斛二月甲子帝親釋奠揚州諸郡饑遣使振給三月乙酉幸司徒府夏四月癸卯石虎冦歴陽加司徒王導大司馬假黄鉞都督征討諸軍事以禦之癸丑帝觀兵于廣莫門分命諸將遣將軍劉仕救歴陽平西將軍趙允屯慈湖龍驤將軍路永戍牛渚建武將軍王允之屯蕪湖司空郗鑒使廣陵相陳光帥衆衛京師賊退向襄陽戊午解嚴石虎將石遇冦中廬南中郎將王國退保襄陽秋八月長沙武陵大水束帛徴處士翟湯郭翻冬十月乙未朔日有蝕之是嵗大旱㑹稽餘姚尤甚米斗五百價人相賣二年春正月辛巳慧星見於奎以吴國内史虞潭為衛將軍二月筭軍用稅米空懸五十餘萬石尚書謝褒已下免官辛亥立皇后杜氏大赦増文武位一等庚申髙句驪遣使貢方物三月旱詔太官減膳免所旱郡縣繇役戊寅大雩夏四月丁巳皇后見于太廟雨雹秋七月揚州㑹稽饑開倉振給冬十月廣州刺史鄧嶽遣督䕶王随擊夜郎新昌太守陶協擊興古並剋之詔求衛公山陽公近屬以紹周漢之祀新作朱雀浮桁十一月遣建威將軍司馬勲安集漢中為李期將李夀所敗三年春正月辛夘立太學夏六月旱冬十月丁夘慕容皝自立為燕王四年春二月石虎帥衆七萬擊段遼于遼西遼奔于平崗夏四月李夀弑李期僭即偽位國號漢石虎為慕容皝所敗癸丑加皝征北大將軍五月乙未以司徒王導為太傅都督中外諸軍事司空郗鑒為太尉征西將軍庾亮為司空六月改司徒為丞相以太傅王導為之秋八月丙午分寧州置安州五年春正月辛丑大赦三月乙丑廣州刺史鄧嶽伐蜀建寜人孟彥執李夀將霍彪以降夏四月辛未征西將軍庾亮遣參軍趙松擊巴郡江陽獲石虎將李閎黄桓等秋七月庚申使持節侍中丞相領揚州刺史始興公王導薨辛酉以䕶軍將軍何充録尚書事八月壬午復改丞相為司徒辛酉太尉南昌公郗鑒薨九月石虎將䕫安李農䧟沔南張貉䧟邾城因㓂江夏義陽征虜將軍毛寳西陽太守樊俊義陽太守鄭進並死之䕫安等進圍石城竟陵太守李陽距戰破之斬首五千餘級安乃退遂畧漢東擁七千餘家遷于幽冀冬十二月丙戍以驃騎將軍琅邪王岳為司徒李夀將李奕㓂巴東守將勞揚戰敗死之六年春正月庚子使持節都督江豫益梁雍交廣七州諸軍事司空都亭侯庾亮薨辛亥以左光禄大夫陸玩為司空二月慕容皝及石虎將石成戰于遼西敗之獻㨗于京師庚辰有星孛于太微三月丁夘大赦以車騎將軍東海王冲為驃騎將軍李夀䧟丹川守將孟彥劉齊李秋皆死之秋七月乙夘初依中興故事朔望聴政於東堂冬十月林邑獻馴象十一月癸卯復琅邪比漢豐沛七年春二月甲午朔日有食之己卯慕容皝遣使求假燕王章璽許之三月戊戌杜皇后崩夏四月丁卯葬恭皇后于興平陵實編户王公已下皆正土斷白籍秋八月辛酉驃騎將軍東海王冲薨九月罷太僕官冬十二月癸酉司空興平伯陸玩薨除樂府雜伎罷安州八年春正月己未朔日有食之乙丑大赦三月初以武悼楊皇后配饗武帝廟夏六月庚寅帝不悆詔曰朕承洪緒于兹十有八年今遘疾不興是用震悼于厥躬千齡眇眇未堪多難司徒琅邪王岳親則母弟體則仁長君人之風允塞時望肆爾王公卿士其輔之以祗奉祖宗明祀毋墜我祖宗之顯命壬辰引武陵王晞㑹稽王昱中書監庾氷中書令何充尚書令諸葛恢並受顧命癸巳帝崩于西堂時年二十二葬興平陵廟號顯宗帝少而聰敏有成人之量南頓王宗之誅也帝不之知及蘇峻平問庾亮曰常日白頭公何在亮對曰以謀反伏誅帝泣謂亮曰舅言人作賊便殺之人言舅作賊復若何亮懼變色庾懌嘗送酒於江州刺史王允之允之與犬犬斃懼而表之帝怒曰大舅已亂天下小舅復欲爾邪懌聞飲藥而死然少為舅氏所制不親庶政及長頗留心萬機務在簡約常欲於後園作射堂計用四十金以勞費乃止雄武之度雖有媿於前王恭儉之徳足追蹤於往烈矣成帝咸和九年咸康八年卽位十七年康皇帝諱岳字世同成帝母弟也咸和元年封吳王二年徙封琅邪王九年拜散騎常侍加驃騎將軍咸康五年遷侍中司徒八年六月庚寅成帝不悆詔以琅邪王為嗣癸巳成帝崩甲午即皇帝位大赦諸屯戍文武及二千石官長不得輙離所局而来奔赴己亥封成帝子丕為琅邪王奕為東海王時帝諒隂不言委政于庾冰何充秋七月丙辰葬成皇帝于興平陵帝親奉奠於西階旣發引徒行至閶闔門升素輿於陵所己未以中書令何充為驃騎將軍八月辛丑彭城王紘薨以江州刺史王允之為衛將軍九月詔琅邪國及府吏進位各有差冬十月甲午衛將軍王允之卒十二月增文武位二等壬子立皇后褚氏建元元年春正月改元振恤鰥寡孤獨三月以中書監庾冰為車騎將軍夏四月益州刺史周撫西陽太守曹據伐李夀敗其將李恒于江陽五月旱六月壬午又以束帛徵處士南陽翟湯會稽虞喜有司奏成帝崩一周請改素服御進膳如舊壬寅詔不許石虎帥衆伐慕容皝皝大敗之秋七月石虎將戴開帥衆来降丁巳詔曰慕容皝摧殄羯冦乃云死没八萬餘人將是其天亡之始也中原之事宜加籌量且戴開已帥部黨歸順宜見慰勞其遣使詣安西驃騎諮謀諸軍事以輔國將軍琅邪内史桓温為前鋒都督假節帥衆入臨淮安西將軍庾翼為征討大都督遷鎮襄陽庚申晉陵吳郡災八月李夀死子勢嗣偽位石虎使其將劉寧攻䧟狄道冬十月辛巳以車騎將軍庾冰都督荆江司雍益梁六州諸軍事江州刺史以驃騎將軍何充為中書監都督揚豫二州諸軍事揚州刺史錄尚書事輔政以琅邪内史桓温都督青徐兖三州諸軍事徐州刺史禇裒為衛将軍領中書令十一月己巳大赦十二月石虎侵張駿駿使其將軍謝艾拒之大戰於河西虎敗績十二月髙句驪遣使朝獻二年春正月張駿遣其將和驎謝艾討南羗於闐和大破之二月慕容皝及鮮卑帥宇文歸戰於昌黎歸衆大敗奔於漠北四月張駿將張瓘敗石虎將王擢于三交城秋八月丙子進安西將軍庾翼為征西將軍庚辰持節都督司雍梁三州諸軍事梁州刺史平北將軍竟陵公桓宣卒丁巳以衛將軍褚裒為特進都督徐兖二州諸軍事兖州刺史鎮金城九月巴東太守楊謙擊李勢將申陽陽敗走獲其將樂髙丙申立皇子聃為皇太子戊戍帝崩于式乾殿時年二十三葬崇平陵初成帝有疾中書令庾冰自以舅氏當朝權侔人主恐異世之後戚屬將踈乃言國有彊敵宜立長君遂以帝為嗣制度年號再興中朝因改元曰建元或謂氷曰郭璞䜟云立始之際邱山傾立者建也始者元也邱山諱也冰瞿然旣而嘆曰如有吉凶豈改易所能救乎至是果驗云康帝建元二年穆皇帝諱聃字彭子康帝子也建元二年九月丙申立為皇太子戊戌康帝崩己亥太子即皇帝位時年二嵗大赦尊皇后為皇太后壬寅皇太后臨朝攝政冬十月乙丑葬康皇帝於崇平陵十一月庚辰車騎将軍庾冰卒永和元年春正月甲戍朔皇太后設白紗帷於太極殿抱帝臨軒改元甲申進鎮軍將軍武陵王晞為鎮軍大將軍開府儀同三司以鎮軍將軍顧衆為尚書右僕射夏四月壬戌詔㑹稽王昱録尚書六條事五月戊寅大雩尚書令金紫光禄大夫建安伯諸葛恢卒六月癸亥地震秋七月庚午持莭都督江荆司梁雍益寜七州諸軍事江州刺史征西將軍都亭侯庾翼卒翼部將于瓚戴羲等殺冠軍將軍曹據舉兵反安西司馬朱燾討平之八月豫州刺史路永叛奔于石虎庚寅以輔國將軍徐州刺史桓温為安西將軍持節都督荆司雍益梁寜六州諸軍事領䕶南蠻校尉荆州刺史石虎將路永屯于夀春九月丙申皇太后詔曰今百姓勞弊其共思詳所以振䘏之宜及歲常調非軍國要急者並宜停之冬十二月李勢將爨頠来奔涼州牧張駿伐焉耆降之二年春正月丙寅大赦己卯使持節侍中都督揚州諸軍事揚州刺史驃騎將軍錄尚書事都鄉侯何充卒二月癸丑以左光祿大夫蔡謨領尚書錄尚書六條事撫軍大將軍會稽王昱及謨並輔政三月丙子以前司徒左長史殷浩為建武將軍揚州刺史夏四月己酉朔日有蝕之五月丙戌涼州牧張駿卒子重華嗣六月石虎將王擢襲武街執張重華䕶軍胡宣又使麻秋孫伏都伐金城太守張冲降之重華將謝艾擊秋敗之秋七月以兖州刺史褚裒為征北大將軍開府儀同三司冬十月地震十一月辛未安西將軍桓温帥征虜將軍周撫輔國將軍譙王無忌建武將軍袁喬伐蜀拜表輙行十二月枉矢自東南流于西北其長半天三年春三月乙卯桓温攻成都剋之丁亥李勢降益州平林邑范文攻䧟日南害太守夏侯覧以尸祭天夏四月地震蜀人鄧定隗文舉兵反桓温又擊破之使益州刺史周撫鎮彭模丁巳鄧定隗文等入據成都征虜將軍楊謙棄涪城退保徳陽五月戊申進慕容皝為安北將軍石虎又使其將石寧麻秋等伐凉州次于曲柳張重華使將軍牛旋禦之退守枹罕六月辛酉大赦秋七月范文復䧟日南害督䕶劉雄隗文立范賁為帝八月戊午張重華將謝艾進擊麻秋大敗之九月地震冬十月乙丑假凉州刺史張重華大都督隴右關中諸軍事䕶𦍑校尉大將軍武都氐王楊初為征南將軍雍州刺史平羌校尉仇池公並假節十二月振威䕶軍蕭敬文害征虜將軍楊謙攻涪城䧟之遂取巴西通于漢中四年夏四月范文㓂九徳多所殺害五月大水秋八月進安西將軍桓温為征西大將軍開府儀同三司封臨賀公西中郎將謝尚為安西將軍九月丙申慕容皝死子雋嗣偽位冬十月己未地震石虎使其將苻徤㓂竟陵十二月豫章人黄韜自號孝神皇帝聚衆數千㓂臨川太守庾條討平之五年春正月辛巳朔大赦庚寅地震石虎僭即皇帝位於鄴二月征北大將軍褚裒使部將王龕北伐獲石虎將支重夏四月益州刺史周撫龍驤將軍朱燾擊范賁獲之益州平封周撫為建城公假慕容雋大將軍幽平二州牧大單于燕王征西大將軍桓温遣督䕶滕畯討范文為文所敗石虎死子世嗣偽位五月石遵廢世而自立六月桓温屯安陸遣諸將討河北石遵揚州刺史王浹以壽陽来降秋七月褚裒進次彭城遣部將王龕李邁及石遵將李農戰于代陂王師敗績王龕為農所執李邁死之八月褚裒退屯廣陵西中郎將陳逵焚壽春而遁梁州刺史司馬勲攻石遵長城戍仇池公楊初襲西城皆破之冬十月石遵將石遇攻宛䧟之執南陽太守郭啓司馬勲進次懸鉤石虎故將麻秋拒之勲退還梁州十一月丙辰石鑒弑石遵而自立十二月己酉使持節都督徐兖二州諸軍事徐州刺史征北大將軍開府儀同三司都鄉侯褚裒卒以建武將軍吳國内史荀羡為使持節監徐兖二州諸軍事北中郎將徐州刺史六年春正月帝臨朝以褚裒喪故懸而不樂閏月冉閔弑石鑒僭稱天王國號魏鑒弟祗僭帝號于襄國丁丑彗星見于亢己丑加中軍將軍殷浩督揚豫徐兖青五州諸軍事假節氐帥苻洪遣使来降以為氐王封廣川郡公假洪子健節監河北諸軍事右將軍封襄國縣公三月石虎故將麻秋鴆殺苻洪于枋頭夏五月大水廬江太守袁真攻合肥尅之六月石祗遣其弟琨攻冉閔將王泰於邯鄲琨師敗績秋八月輔國將軍譙王無忌薨苻健帥衆入闗冬十一月冉閔圍襄國十二月免司徒蔡謨為庶人是歲大疫七年春正月丁酉日有蝕之辛丑鮮卑段龕以青州来降苻徤僭稱王國號秦二月戊寅以段龕為鎮北將軍封齊公石祗大敗冉閔于襄國夏四月梁州刺史司馬勲出步騎三萬自漢中入秦川與苻健戰于五丈原王師敗績加尚書令顧和開府儀同三司劉顯弑石祗五月祗兖州刺史劉啓自鄄城来奔秋七月尚書令左光祿大夫開府儀同三司顧和卒甲辰濤水入石頭溺死者數百人八月冉閔豫州刺史張遇以許昌来降拜鎮西將軍九月峻陽太陽二陵崩甲辰帝素服臨於太極殿三日遣兼太常趙㧞脩復山陵冬十月雷雨震電十一月石祗將姚弋仲冉閔將魏脫各遣使来降以弋仲為車騎將軍大單于封高陵郡公弋仲子襄為平北將軍都督并州諸軍事并州刺史平鄉縣公脫為安北將軍監冀州諸軍事冀州刺史十二月辛未征西大將軍桓温帥衆北伐次于武昌而止時石虎故將周成屯廪邱髙昌屯野王樂立屯許昌李歴屯衛國皆相次来降八年春正月辛卯日有蝕之劉顯僭帝號於襄國冉閔擊破殺之苻健僭帝號於長安二月峻平崇陽二陵崩戊辰帝臨三日遣殿中都尉王惠如洛陽以衛五陵鎮西將軍張遇反於許昌使其黨上官恩據洛陽樂𢎞攻督䕶戴施於倉垣三月使北中郎將荀羡鎮淮隂苻健别帥侵順陽太守薛珍擊破之夏四月冉閔為慕容雋所滅雋僭帝號於中山稱燕安西將軍謝尚帥姚襄與張遇戰於許昌之誡橋王師敗績苻健使其弟雄襲遇虜之秋八月大雩石虎故將王擢遣使請降拜鎮西將軍秦州刺史丁酉以鎮軍大將軍武陵王晞為太宰撫軍大將軍㑹稽王昱為司徒征西大將軍桓温為太尉八月平西將軍周撫討蕭敬文於涪城斬之冉閔子智以鄴降督䕶戴施獲其傳國璽送之文曰受天之命皇帝壽昌百僚畢賀九月冉智為其將馬願所執降于慕容恪中軍將軍殷浩帥衆北伐次泗口遣河南太守戴施據石門滎陽太守劉􅋟戍倉垣冬十月秦州刺史王擢為苻健所逼奔于涼州九年春正月乙卯朔大赦張重華使王擢與苻健將苻雄戰擢師敗績丙寅皇太后與帝同拜建平陵三月旱交州刺史阮敷討林邑范佛於日南破其五十餘壘夏四月以安西將軍謝尚為尚書僕射五月大疫張重華復使王擢襲秦州取之仇池公楊初為苻雄所敗秋七月丁酉地震有聲如雷八月遣兼太尉河間王欽脩復五陵冬十月中軍將軍殷浩進次山桑使平北將軍姚襄為前鋒襄叛反擊浩浩棄輜重退保譙城丁未涼州牧張重華卒子耀靈嗣是月張祚弑耀靈而自稱涼州牧十一月殷浩使部將劉啓王彬之討姚襄復為襄所敗襄遂進據芍陂十二月加尚書僕射謝尚為都督豫揚江西諸軍事領豫州刺史鎮歴陽十年春正月己酉朔帝臨朝以五陵未復懸而不樂涼州牧張祚僭帝位冉閔降將周成舉兵反自宛陵襲洛陽辛酉河南太守戴施奔鮪渚丁卯地震有聲如雷二月己丑太尉征西將軍桓温帥師伐闗中廢揚州刺史殷浩為庶人以前會稽内史王述為揚州刺史夏四月己亥温及苻健子萇戰于藍田大敗之五月江西乞活郭敞等執陳留内史劉仕而叛京師震駭以吏部尚書周閔為中軍將軍屯于中堂豫州刺史謝尚自歴陽還衛京師六月苻健將苻雄悉衆及桓温戰于白鹿原王師敗績秋九月辛酉桓温糧盡引還十一年春正月甲辰侍中汝南王統薨平羌校尉仇池公楊初為其部將梁式所害初子國嗣位因拜鎮北將軍秦州刺史齊公段龕襲慕容雋將榮國於郎山敗之夏四月壬申隕霜乙酉地震姚襄率衆冦外黄冠軍將軍髙季大破之五月丁未地又震六月苻健死其子生嗣偽位秋七月宋混張瓘弑張祚而自立耀靈弟元靚為大將軍涼州牧遣使来降以吏部尚書周閔為尚書左僕射領軍將軍王彪之為尚書右僕射冬十月進豫州刺史謝尚督并冀幽三州諸軍事鎮西將軍鎮馬頭十一月慕容恪帥衆冦廣固壬戍上黨人馮鴦自稱太守背苻生遣使来降十二年春正月丁卯帝臨朝以皇太后母喪懸而不樂鎮北將軍段龕及慕容恪戰於廣固大敗之恪退據安平二月辛丑帝講孝經三月姚襄入于許昌以太尉桓温為征討大都督以討之秋八月己亥桓温及姚襄戰于伊水大敗之襄走平陽徙其餘衆三千餘家於江漢之間執周成而歸使揚武將軍毛穆之督䕶陳午輔國將軍河南太守戴施鎮洛陽冬十月癸巳朔日有食之慕容恪攻段龕於廣固使北中郎將荀羡帥師次于琅邪以救之十一月遣兼司空散騎常侍車灌龍驤將軍袁真等持節如洛陽脩五陵十二月庚戌以有事于五陵告于太廟帝及羣臣皆服緦于太極殿臨三日是歲仇池公楊國為其從父俊所殺俊自立升平元年春正月壬戌朔帝加元服告于太廟始親萬機大赦改元増文武位一等皇太后居崇徳宮丁丑隕石於槐里一是月鎮北將軍齊公叚龕為慕容恪所䧟遇害扶南天竺旃檀獻馴象詔曰昔先帝以殊方異獸或為人患禁之今及其未至可令還本土三月帝講孝經壬申親釋奠于堂中夏五月庚午鎮西將軍謝尚卒苻生將苻眉苻堅擊姚㐮戰于三原斬之六月苻堅殺苻生而自立以軍司謝奕為使持節都督安西將軍豫州刺史秋七月苻堅將張平以并州降遂以為并州刺史八月丁未立皇后何氏大赦賜孝悌鰥寡米人五斛逋租宿債皆勿收大酺三日冬十月皇后見于太廟十一月雷十二月以太常王彪之為尚書左僕射二年春正月司徒㑹稽王昱稽首歸政帝不許二月慕容雋䧟冀州諸郡詔安西將軍謝奕北中郎將荀羡北伐三月佽飛督王饒獻鴆鳥帝怒鞭之二百使殿中御史焚其鳥於四達之衢夏五月大水有星孛于天船六月并州刺史張平為苻堅所逼帥衆三千奔于平陽堅追敗之慕容恪進據上黨冠軍將軍馮鴦以衆叛歸慕容雋雋盡䧟河北之地秋八月安西將軍謝奕卒壬申以吳興太守謝萬為西中郎將持節監司豫冀并四州諸軍事豫州刺史以􅄆騎常侍郗曇為北中郎將持節都督徐兖青冀幽五州諸軍事徐兖二州刺史鎮下邳冬十月乙丑陳留王曹勵薨十一月庚子雷辛酉地震十二月北中郎將荀羡及慕容雋戰于山茌王師敗績三年春三月甲辰詔以比年出軍糧運不繼王公已下十三戸借一人一年助運秋七月平北將軍髙昌為慕容雋所逼自白馬奔于滎陽冬十月慕容雋㓂河東遣西中郎將謝萬次下蔡北中郎將郗曇次髙平以擊之王師敗績十一月戊子進揚州刺史王述為衞將軍十二月又以中軍將軍琅邪王丕為驃騎將軍東海王奕為車騎將軍封武陵王晞子㻱為梁王交州刺史温放之帥兵討林邑參黎耽潦並降之四年春正月仇池公楊俊卒子世嗣丙戌慕容雋死子暐嗣偽位二月鳯皇將九鶵見于豐城秋七月以軍役繁興省用徹膳八月辛丑朔日有食之既冬十月天狗流于西南十一月封太尉桓温為南郡公温弟沖為豐城縣公子濟為臨賀郡公鳯皇復見豐城衆鳥随之五年春正月戊戌大赦賜鰥寡孤獨不能自存者人米五斛北中郎將都督徐兖青冀幽五州諸軍事徐兖三州刺史郗曇卒二月以鎮軍將軍范汪為都督徐兖青冀幽五州諸軍事安北將軍徐兖二州刺史平南將軍廣州刺史陽夏侯滕含卒夏四月大水太尉桓温鎮宛使其弟豁將兵取許昌鳯皇見于沔北五月丁巳帝崩于顯陽殿時年十九葬永平陵廟號孝宗穆帝永和十二年升平五年即位十七年哀皇帝諱丕字千齡成帝長子也咸康八年封為琅邪王永和元年拜􅄆騎常侍十二年加中軍將軍升平三年除驃騎將軍五年五月丁巳穆帝崩皇太后令曰帝奄不救疾允嗣未建琅邪王丕中興正統明徳懋親昔在咸康屬當儲貳以年在㓜冲未堪國難故顯宗髙讓今義望情地莫與為比其以王奉大統於是百官備法駕迎于琅邪王第庚申即皇帝位大赦壬戌詔以東海王奕為琅邪王奉承大統秋七月戊午葬穆帝于永平陵慕容恪攻䧟野王守將呂護退保滎陽八月己卯夜天裂廣數丈有聲如雷九月戊申立皇后王氏穆帝皇后何氏居永安宫呂䕶叛奔于慕容暐冬十月安北將軍范汪有罪廢為庶人十二月加涼州刺史張元靚為大都督隴右諸軍事䕶羌校尉西平公隆和元年春正月壬子大赦改元甲寅減田稅畝收二升是月慕容暐將呂䕶傅末波攻䧟小壘以逼洛陽二月辛未以輔國將軍吳國内史庾希為北中郎將徐兖二州刺史鎮下邳前鋒監軍龍驤將軍袁真為西中郎將監䕶豫司并冀四州諸軍事豫州刺史鎮汝南並假節丙子尊所生周氏為皇太妃三月甲寅朔日有蝕之夏四月旱詔出輕繫振困乏丁丑梁州地震浩舋山崩呂䕶復冦洛陽乙酉輔國將軍河南太守戴施奔于宛五月丁巳遣北中郎將庾希竟陵太守鄧遐以舟師救洛陽秋七月呂䕶等退守小平津進琅邪王奕為侍中驃騎大將軍開府鄧遐進屯新城庾希部將何謙及慕容暐將劉則戰于檀邱破之八月西中郎將袁真進次汝南運米五萬斛以饋洛陽冬十月賜貧乏者米人五斛章武王珍薨十二月戊午朔日有食之詔捜揚隠逸蠲除苛碎詳議法令咸從損要庾希自下邳退鎮山陽袁真自汝南退鎮壽陽興寜元年春二月己亥大赦改元三月壬寅皇太妃薨于琅邪第癸卯帝奔喪詔司徒會稽王昱總内外衆務夏四月慕容暐寇滎陽太守劉逺奔魯陽甲戍揚州地震湖瀆溢五月加征西大將軍桓温侍中大司馬都督中外諸軍事録尚書事假黄鉞復以西中郎將袁真都督司冀并三州諸軍事北中郎將庾希都督青州諸軍事癸卯慕容暐䧟宻城滎陽太守劉逺奔于江陵秋七月張天錫殺涼州刺史西平公張元靚自稱大將軍䕶羌校尉涼州牧西平公丁酉葬章皇太妃秋八月有星孛于角亢入天市九月壬戍大司馬桓温帥衆北伐癸亥以皇太子生大赦冬十月甲申立陳留王世子恢為王十一月姚㐮故將張駿殺江州督䕶趙毘焚武昌畧府藏以叛江州刺史桓冲討斬之是歲慕容暐將慕容塵攻陳留太守袁披于長平汝南太守朱斌承虛襲許昌尅之二年春二月庚寅江陵地震慕容暐將慕容評襲許昌潁川太守李福死之評遂侵汝南太守朱斌遁于壽陽又進圍陳郡太守朱輔嬰城固守桓温遣江夏相劉岵擊退之改左軍將軍為游擊將軍罷右軍前軍後軍將軍五校三將官癸卯帝親耕籍田三月庚戍朔大閱戸人嚴法禁稱為庚戌制辛未帝不悆帝雅好黄老㫁榖餌長生藥服食過多遂中毒不親萬機崇徳太后復臨朝攝政夏四月甲辰慕容暐遣其將李洪侵許昌王師敗績于懸瓠朱斌奔于淮南朱輔退保彭城桓温遣西中郎將袁真江夏相劉岵等鑿陽儀道以通運温帥舟師次于合肥慕容塵復屯許昌五月遷陳人于陸以避之戊辰以揚州刺史王述為尚書令衞將軍以桓温為揚州牧録尚書事壬申遣使喻温入相温不從秋七月丁卯復徵温入朝八月温至赭圻遂城而居之苻堅别帥侵河南慕容暐冦洛陽九月冠軍將軍陳祐留長史沈勁守洛陽帥衆奔新城三年春正月庚申皇后王氏崩二月乙未以右將軍桓豁監荆州揚州之義城雍州之京兆諸軍事領南蠻校尉荆州刺史桓冲監江州荆州之江夏随郡豫州之汝南西陽新蔡潁川六郡諸軍事南中郎將江州刺史領南蠻校尉並假節丙申帝崩于西堂時年二十五葬安平陵哀帝隆安元年興平三年即位四年廢帝諱奕字延齡哀帝之母弟也咸康八年封為東海王永和八年拜􅄆騎常侍尋加鎮軍將軍升平四年拜車騎將軍五年改封琅邪王隆和初轉侍中驃騎大將軍開府儀同三司興寜三年二月丙申哀帝崩無嗣丁酉皇太后詔曰琅邪王奕明徳茂親屬當儲嗣宜奉祖宗纂承大統便速正大禮以寜人神於是百官奉迎于琅邪第是日即皇帝位大赦三月壬申葬哀皇帝于安平陵癸酉􅄆騎常侍河間王欽薨丙子慕容暐將慕容恪䧟洛陽寜朔將軍竺瑶奔于㐮陽冠軍長史揚武將軍沈勁死之夏六月戊子使持節都督益寕二州諸軍事鎮西將軍益州刺史建城公周撫卒秋七月匈奴左賢王衞辰右賢王曹榖帥衆二萬侵杏城己酉改封會稽王昱為琅邪王壬子立皇后庾氏封琅邪王昱子昌明為會稽王冬十月梁州刺史司馬勲反自稱琅邪王十一月帥衆入劒閣攻涪西夷校尉毋邱暐棄城而遁乙卯圍益州刺史周楚于成都桓温遣江夏相朱序救之十二月戊戍以㑹稽内史王彪之為尚書僕射太和元年春二月己丑以涼州刺史張天錫為大將軍都督隴右關中諸軍事西平郡公丙申以宣城内史桓祕為持節監梁益二州征討諸軍事三月辛亥新蔡王邈薨荆州刺史桓豁遣督䕶桓羆攻南鄭魏興人畢欽舉兵以應羆夏四月旱五月戊寅皇后庾氏崩朱序攻司馬勲於成都衆潰執勲斬之秋七月癸酉葬孝皇后于敬平陵九月甲午曲赦梁益二州冬十月辛丑苻堅將王猛楊安攻南鄉荆州刺史桓豁救之師次新野而猛安退以㑹稽王昱為丞相十二月南陽人趙𢎞趙憶等據宛城反太守桓澹走保新野慕容暐將慕容厲䧟魯郡髙平二年春正月北中郎將庾希有罪走入于海夏四月慕容暐將慕容塵寇竟陵太守羅崇擊破之苻堅將王猛寇涼州張天錫拒之猛師敗績五月右將軍桓豁擊趙憶走之進獲慕容暐將趙槃送于京師秋九月以㑹稽内史郗愔為都督徐兖青幽四州諸軍事平北將軍徐州刺史冬十月乙巳彭城王元薨三年春三月丁巳朔日有蝕之癸亥大赦夏四月癸巳雨雹大風折木秋八月壬寅尚書令衛將軍藍田侯王述卒四年夏四月庚戍大司馬桓温帥衆伐慕容暐秋七月辛卯暐將慕容垂帥衆拒温温擊敗之九月戊寅桓温禆將鄧遐朱序遇暐將𫝊末波於林渚又大破之戊子温至枋頭丙申以糧運不繼焚舟而歸辛丑慕容垂追敗温後軍於襄邑冬十月大星西流有聲如雷己巳温收散卒屯于山陽豫州刺史袁真以壽陽叛十一月辛丑桓温自山陽及㑹稽王昱㑹于涂中將謀後舉十二月遂城廣陵而居之五年春正月己亥袁真子䨇之愛之害梁國内史朱憲汝南内史朱斌二月癸酉袁真死陳郡太守朱輔立真子瑾嗣事求救於慕容暐夏四月辛未桓温部將竺瑶破瑾於武邱秋七月癸酉朔日有食之八月癸丑桓温擊袁瑾於壽陽敗之九月苻堅將王猛伐慕容暐䧟其上黨廣漢妖賊李𢎞與益州妖賊李金根聚衆反𢎞自稱聖王衆萬餘人梓潼太守周虓討平之冬十月王猛大破慕容暐將慕容評於潞川十一月猛尅鄴獲慕容暐盡有其地六年春正月苻堅遣將王鑒來援袁瑾將軍桓伊逆擊大破之丁亥桓温尅壽陽斬袁瑾三月壬辰監益寧二州諸軍事冠軍將軍益州刺史建城公周楚卒夏四月戊午大赦賜窮獨米人五斛苻堅將苻雅伐仇池公楊纂降之六月京都及丹陽晉陵呉郡呉興臨海並大水秋八月以前寧州刺史周仲孫為假節監益梁二州諸軍事益州刺史冬十月壬子髙密王俊薨十一月癸卯桓温自廣陵屯于白石丁未詣闕因圗廢立誣帝在藩夙有痿疾嬖人相龍計好朱靈寳等參侍内寢而内美人田氏孟氏生三男長欲封樹時人惑之温因諷太后以伊霍之舉己酉集百官于朝堂宣崇徳太后令曰王室艱難穆哀短祚國嗣不育儲宫靡立琅邪王奕親則母弟故以入纂大位不圖徳之不建乃至於斯昏濁潰亂動違禮度有此三孽莫知誰子人倫道喪醜聲遐布既不可以奉守社稷敬承宗廟且昏孽並大便欲建樹儲藩誣㒺祖宗傾移皇基是而可忍孰不可忍今廢奕為東海王以王還第供衛之儀皆如漢朝昌邑故事但未亡人不幸罹此百憂感念存沒心焉如割社稷大計義不獲已臨紙悲塞如何可言於是百官入太極前殿即日桓温使散騎常侍劉享收帝璽綬帝著白帢單衣歩下西堂乗犢車出神虎門羣臣拜辭莫不歔欷侍御史殿中監將兵百人衞送東海第初桓温有不臣之志欲先立功河朔以收時望及枋頭之敗威名頓挫遂潛謀廢立以長威權然憚帝守道恐招時議以宫闈重秘牀笫易誣乃誣帝為閹遂行廢辱初帝平生每以為慮嘗召術人扈謙筮之卦成答曰晋室有磐石之固陛下有出宫之象竟如其言咸安二年正月降封帝為海西縣公四月徙居吳縣勑吳國内史刁彛防衞又遣御史顧允監察之十一月妖賊盧悚遣弟子殿中監許龍晨到其門稱太后宻詔奉迎興復帝初欲從之納保毋諫乃止龍曰大事將㨗焉用兒女子言乎帝曰我得罪於此幸䝉寛宥豈敢妄動哉且太后有詔便應官屬來何獨使汝也汝必為亂因叱左右縛之龍懼而走帝知天命不可再深慮横禍乃杜塞聰明無思無慮終日酣暢耽于内寵有子不育庶保天年時人憐之為作歌焉朝廷以帝安於屈辱不復為虞太元十一年十月甲申薨于吳時年四十五廢帝太和六年簡文皇帝諱昱字道萬元帝之少子也幼而岐嶷為元帝所愛郭璞見而謂人曰興晋祚者必此人也及長清虚寡欲尤善元言永昌元年元帝詔封帝為琅邪王奉恭王祀食會稽宣城如舊咸和元年所生鄭夫人薨帝時年七歲號慕泣血固請服重元帝哀而許之故徙封會稽王拜散騎常侍九年遷右將軍加侍中咸康六年進撫軍將軍領秘書監建元元年夏五月癸丑康帝詔帝兼領太常本官如故永和元年崇徳太后臨朝進位撫軍大將軍録尚書六條事二年驃騎何充卒康帝崩崇徳太后詔帝專總萬機八年進位司徒固譲不拜穆帝始冠帝稽首歸政不許廢帝即位以琅邪絶嗣復徙封琅邪而封王子昌明為會稽王帝固譲故雖封琅邪而不去會稽之號大和元年進位丞相録尚書事入朝不趨讚拜不名劒履上殿給羽葆鼓吹班劒六十人又固譲及廢帝廢皇太后詔曰丞相録尚書會稽王體自中宗明徳劭令阿衡三世人望攸歸可入統皇極主者明依舊典以時施行於是大司馬桓温率百官進太極前殿具乘輿法駕奉迎帝於會稽邸於朝堂變服著平巾幘單衣東向拜受璽綬咸安元年冬十一月己酉即皇帝位桓温出次中堂分兵屯衞乙卯温奏廢太宰武陵王晞及子總詔魏郡太守毛安之帥所領宿衞殿内改元咸安庚戌使兼太尉周頤告于太廟辛亥桓温遣弟秘逼新蔡王晃詣西堂自列與太宰武陵王晞等謀反帝對之流涕温皆收付廷尉癸丑殺東海王二子及其母初帝以冲虛簡貴歴宰三世温素所敬憚及初即位温乃撰辭欲自陳述帝引見對之悲泣温懼不能言至是有司承其㫖奏誅武陵王晞帝不許温固執至于再三帝手詔報曰若晋祚靈長公便宜奉行前詔如其天運去矣請避賢路温覧之流汗變色不復敢言乙卯廢晞及其三子徙于新安丙辰放新蔡王晃于衡陽戊午詔大赦天下大酺五日増文武位二等孝順忠貞鰥寡孤獨米人五斛己未賜温軍三萬人布一匹米一斛庚申加大司馬桓温為丞相不受辛酉温旋自白石因鎮姑孰以冠軍將軍毛武生都督荆州之沔中揚州之義城諸軍事十二月戊子詔以京都有經年之儲權停一年之運庚寅廢東海王奕為海西公食邑四千戸辛卯初薦酃淥酒於太廟二年春正月辛丑百濟林邑王各遣使貢方物二月苻堅伐慕容桓於遼東滅之三月丁酉詔内外百官各勤所司以副朕意癸丑詔遣大使詣大司馬并問方伯逮于邊戌宣詔大饗求其所安且籌量賜給悉令周普乙卯又詔徃事故之後百度未充羣僚常俸並皆寡約蓋隨時之義可籌量増給騶虞見豫章夏四月徙海西公於吳縣西柴里追貶庾后曰夫人六月遣使拜百濟王餘句為鎮軍將軍領樂浪太守戊子前䕶軍將軍庾希舉兵反自海陵入京口晋陵太守卞耽奔于曲阿秋七月壬辰桓温遣東海内史周少孫討希擒之斬于建康市乙未立會稽王昌明為皇太子皇子道子為琅邪王領會稽内史是日帝崩于東堂時年五十三葬髙平陵廟號太宗遺詔以桓温輔政依諸葛亮王導故事帝少有風儀善容止留心典籍不以居處為意凝塵滿席湛如也嘗與桓温及武陵王晞同載遊版橋温遽令鳴鼓吹角車馳卒奔欲觀其所為晞大恐求下車而帝安然無懼色温由此憚服温既仗文武之任屢建大功加以廢立威振内外帝雖處尊位拱黙守道而已常恐廢黜先是熒惑入太微尋而海西廢及帝立熒惑又入太微帝甚惡焉時中書郎郗超在直帝乃引入謂曰命之脩短本所不計故當無復近日事邪超曰大司馬臣温方内固社稷外恢經略非常之事臣以百口保之及超請急省其父帝謂之曰致意尊公家國之事遂至於此由吾不能以道匡衞愧歎之深言何能喻因詠庾闡詩云志士痛朝危忠臣哀主辱遂泣下霑襟帝雖神識恬暢而無濟世大略故謝安稱為恵帝之流清談差勝耳沙門支道林嘗言會稽有逺體而無逺神謝靈運述其行事亦以為赧獻之輩云簡文帝咸安三年孝武皇帝諱曜字昌明簡文帝第三子也興寜三年七月甲申初封會稽王咸安二年秋七月己未立為皇太子是日簡文帝崩太子即皇帝位詔大赦天下與民更始九月甲寅追尊皇妣會稽王妃曰順皇后冬十月丁卯葬簡文皇帝于髙平陵十一月甲午妖賊盧悚晨入殿庭遊擊將軍毛安之等討擒之是歲三吳大旱人多餓死詔所在振給苻堅䧟仇池執秦州刺史楊世寜康元年春正月己丑朔改元二月大司馬桓温來朝三月癸丑詔除丹陽竹格等四桁税夏五月旱秋七月己亥使持節侍中都督中外諸軍事丞相錄尚書大司馬揚州牧平北將軍徐兖二州刺史南郡公桓温薨庚戍進右將軍桓豁為征西將軍以江州刺史桓冲為中軍將軍都督揚豫江三州諸軍事揚州刺史鎮姑孰八月壬子崇徳太后臨朝攝政九月苻堅將楊安寇成都丙申以尚書僕射王彪之為尚書令吏部尚書謝安為尚書僕射吳國内史刁彛為北中郎將徐兖二州刺史鎮廣陵復置光祿勲大司馬少府官冬十月西平公張天錫貢方物十一月苻堅將楊安䧟梓潼及梁益二州刺史周仲孫帥騎五千南遁二年春正月癸未朔大赦追封謚故會稽世子郁為臨川獻王己酉北中郎將徐兖二州刺史刁彛卒二月癸丑以丹陽尹王坦之為北中郎將徐兖二州刺史丁巳有星孛于女虛三月丙戌彗星見於氐夏四月壬戍皇太后詔以水旱併臻百姓失業其三吳義興晋陵及會稽遭水之縣尤甚者全除一年租布其次聽除半年受振貸者即以賜之五月蜀人張育自號蜀王帥衆圍成都遣使稱藩秋七月凉州地震山崩苻堅將鄧羌攻張育滅之八月以長秋將建權停婚姻九月丁丑有星孛于天市冬十一月己酉天門蜑賊攻郡太守王匪死之征西將軍桓豁遣師討平之長城人錢歩射錢𢎞等作亂吳興大守朱序討平之癸酉威逺將軍桓石䖍破苻堅將姚萇於墊江三大春正月辛亥大赦夏五月丙午北中郎將徐兖二州刺史藍田侯王坦之卒甲寅以中軍將軍揚州刺史桓冲為鎮北將軍徐州刺史鎮丹徒尚書僕射謝安領揚州刺史秋八月癸巳立皇后王氏大赦加文武位一等九月帝講孝經冬十月癸酉朔日有蝕之十二月甲申神虎門災癸未皇太后詔以日蝕告變水旱不適其賜百姓窮者米人五斛癸巳帝釋奠于中堂祠孔子以顔囘配太元元年春正月壬寅帝加元服見于太廟皇太后歸政甲辰大赦改元丙午帝始臨朝以征西將軍桓豁為征西大將軍領軍將軍郗愔為鎮軍大將軍中軍將軍桓冲為車騎將軍加尚書僕射謝安中書監録尚書事甲子謁建平等四陵夏四月癸丑地震甲寅詔大赦與民更始其文武位各増一等六月封河間王欽子範之為章武王秋九月苻堅將茍萇䧟涼州虜刺史張天錫盡有其地乙巳除度田收租之制公王以下口税米三斛蠲在役之身冬十月移淮北流人於淮南十一月已巳朔日有蝕之詔太官徹膳十二月苻堅使其將苻洛攻代執代王什翼犍二年春正月繼絶世紹功臣三月以兖州刺史朱序為南中郎將梁州刺史監沔中諸軍鎮㐮陽閏月壬午地震甲申暴風折木發屋夏四月己酉雨雹五月丁丑地震六月己巳暴風掦沙石林邑貢方物秋七月己卯老人星見八月壬辰車騎將軍桓冲來朝丁未以尚書僕射謝安為司徒丙辰使持節都督荆梁寜益交廣六州諸軍事荆州刺史征西大將軍桓豁卒冬十月辛丑以車騎將軍桓冲都督荆江梁益寜交廣七州諸軍事領䕶南蠻校尉荆州刺史尚書王蘊為徐州刺史督江南晋陵諸軍征西司馬謝元為兖州刺史廣陵相監江北諸軍壬寅散騎常侍左光禄大夫尚書令王彪之卒十二月庚寅以尚書王劭為尚書僕射三年春二月乙巳作新宫帝移居會稽王邸三月乙丑雷雨暴風發屋折木夏五月庚午陳留王曹恢薨六月大水秋七月辛巳帝入新宮乙酉老人星見南方四年春正月辛酉大赦郡縣遭水旱者減租稅丙子謁建平等七陵二月戊午苻堅使其子丕攻䧟㐮陽執南中郎將朱序又䧟順陽三月大疫壬戍詔以疆埸多虞事兼平日又年穀不登百姓匱乏其詔御所供事從儉約九親供給衆官廪俸權可減半凡諸役費自非軍國事要皆宜停省以周時務癸未使右將軍毛武生帥衆伐蜀夏四月苻堅將韋鍾䧟魏興太守吉挹死之五月苻堅將句難彭超䧟盱􅇇髙宻内史毛璪之為賊所執六月大旱戊子征虜將軍謝元及超難戰于君川大破之秋八月丁亥以左將軍王藴為尚書僕射乙未暴風掦砂石九月盜殺建安太守傅湛冬十二月己酉朔日有食之五年春正月乙巳謁崇平陵夏四月大旱癸酉大赦五嵗刑以下五月大水以司徒謝安為衞將軍儀同三司六月甲寅震含章殿四柱并殺内侍二人甲子以比嵗荒儉大赦自太元三年以前逋租宿債皆蠲除之其鰥寡窮獨孤老不能自存者人賜米五斛丁卯以驃騎將軍琅邪王道子為司徒秋九月癸未皇后王氏崩冬十月九真太守李遜據交州反十一月乙酉葬定皇后于隆平陵六年春正月帝初奉佛法立精舍於殿内引諸沙門以居之丁酉以尚書謝石為尚書僕射初置督運御史官夏六月庚子朔日有食之揚荆江三州大水己巳改制度減煩費損吏士員七百人秋七月丙子大赦五嵗刑已下甲午交阯太守杜瑗斬李遜交州平大饑冬十一月己亥以鎮軍大將軍郗愔為司空會稽人檀元之反自號安東將軍鎮軍參軍謝藹之討平之十二月甲辰苻堅遣其㐮陽太守閻震寇竟陵㐮陽太守桓石䖍討擒之七年春三月林邑范熊遣使貢方物秋八月癸卯大赦九月東夷五國遣使來貢方物苻堅將都貴焚燒沔北舊榖略襄陽百姓而去冬十月丙子雷八年春二月癸未黄霧四塞三月始興南康廬陵大水平地五丈丁巳大赦夏五月輔國將軍楊亮伐蜀㧞五城擒苻堅將魏光秋七月鷹揚將軍郭洽及苻堅將張崇戰于武當大敗之八月苻堅帥衆渡淮遣征討都督謝石冠軍將軍謝元輔國將軍謝琰西中郎將桓伊等距之九月詔司徒琅邪王道子錄尚書六條事冬十月苻堅弟融䧟夀春乙亥諸將及苻堅戰於肥水大破之俘斬數萬計獲堅輿輦及雲母車十一月庚申詔衞將軍謝安勞旋師于金城壬子立陳留王世子靈誕為陳留王十二月庚午以寇難初平大赦以中軍將軍謝石為尚書令開酒禁始增百姓稅米口五石前句町王翟遼背苻堅舉兵於淮南慕容垂自鄴與遼合遂攻堅子暉於洛陽仇池公楊世奔還隴右遣使稱藩九年春正月庚子封武陵王孫寶為臨川王戊午立新寧王晞子遵為新寧王辛亥謁建平等四陵龍驤將軍劉牢之克譙城車騎將軍桓冲部將郭寳伐新城魏興上庸三郡降之二月辛巳使持節都督荆江梁寜益交廣七州諸軍事車騎將軍荆州刺史桓冲卒慕容埀自洛陽與翟遼攻苻堅子丕於鄴三月以衞將軍謝安為太保苻堅北地長史慕容泓平陽太守慕容超並起兵背堅夏四月己卯増置太學生百人封張天錫為西平公使竟陵太守趙統伐㐮陽克之苻堅將姚萇背堅起兵於北地自立為王國號秦六月癸丑朔崇徳皇太后褚氏崩慕容泓為其叔父冲所殺冲自稱皇太弟秋七月戊戍遣兼司空髙宻王純之脩謁洛陽五陵己酉葬康獻皇后于崇平陵百濟遣使來貢方物苻堅及慕容冲戰于鄭西堅師敗績八月戊寅司空郗愔薨九月辛卯前鋒都督謝元攻苻堅將兖州刺史張崇于鄄城克之甲午加太保謝安大都督揚江荆司豫徐兖青冀幽并梁益雍凉十五州諸軍事冬十月辛亥朔日有蝕之丁巳河間王曇之薨乙丑以元象乖度大赦庚午立前新蔡王晃弟崇為新蔡王苻堅青州刺史苻朗率衆來降十二月苻堅將呂光稱制于河右自號酒泉公慕容冲僭即皇帝位于阿房十年春正月甲午謁諸陵二月立國學蜀郡太守任權斬苻堅益州刺史李平益州平三月滎陽人鄭爕以郡來降苻堅國亂使使奉表請迎龍驤將軍劉牢之及慕容埀戰于黎陽王師敗績夏四月丙辰劉牢之與沛郡太守周次及埀戰于五橋澤王師又敗績壬戍太保謝安帥衆救苻堅五月大水苻堅留太子宏守長安奔于五將山六月宏來奔慕容冲入長安秋七月苻丕自枋頭西走龍驤將軍檀元追之為丕所敗旱饑丁巳老人星見八月甲午大赦丁酉使持節侍中中書監大都督十五州諸軍事衞將軍太保謝安薨庚子以琅邪王道子為都督中外諸軍事是月姚萇殺苻堅而僭即皇帝位九月呂光據姑臧自稱凉州刺史苻丕僭即皇帝位于晋陽冬十月丁亥論淮肥之功追封謝安廬陵郡公封謝石南康公謝元康樂公謝琰望蔡公桓伊永脩公自餘封拜各有差是歲乞伏國仁自稱大單于秦河二州牧十一年春正月辛未慕容垂僭即皇帝位於中山壬午翟遼襲黎陽執太守滕恬之乙酉謁諸陵慕容冲將許木末殺慕容冲於長安三月大赦太山太守張願以郡叛降于翟遼夏四月以百濟王世子餘暉為使持節都督鎮東將軍百濟王代王拓拔珪始改稱魏癸巳以尚書僕射陸納為尚書左僕射譙王恬為尚書右僕射六月己卯地震庚寅以前輔國將軍楊亮為西戎校尉雍州刺史鎮衛山陵秋八月庚午封孔靖之為奉聖亭侯奉宣尼祀丁亥安平王邃之薨翟遼㓂譙龍驤將軍朱序撃走之冬十月慕容垂破苻丕于河東丕走東垣揚威將軍馮該撃斬之揚首京都甲申海西公奕薨十一月苻丕將苻登僭即皇帝位於隴東十二年春正月乙巳以豫州刺史朱序為青兖二州刺史鎮淮隂丁未大赦壬子暴風發屋折木戊午慕容埀寇河東濟北太守温詳奔彭城翟遼遣子釗寇陳潁朱序撃走之夏四月戊辰尊夫人李氏為皇太妃己丑雨雹髙平人翟暢執太守徐含逺以郡降于翟遼六月癸卯束帛聘處士戴逵龔元之秋八月辛巳立皇子徳宗為皇太子大赦増文武位二等大酺五日賜百官布帛各有差九月戊午復新寜王遵為武陵王立梁王㻱子龢為梁王冬十一月松滋太守王遐之討翟遼于洛口敗之十三年夏四月戊午以青兖二州刺史朱序為持節都督雍梁沔中九郡諸軍事雍州刺史譙王恬之為鎮北將軍青兖二州刺史夏六月旱乞伏國仁死弟乾歸嗣偽位僭號河南王秋九月翟遼將翟發寇洛陽河南太守郭給距破之冬十二月戊子濤水入石頭毁大桁殺人乙未大風晝晦延賢堂災丙申螽斯百堂客舘驃騎庫皆災己亥加尚書令謝石衞將軍開府儀同三司庚子尚書令衞將軍開府儀同三司謝石薨十四年春正月癸亥詔淮南所獲俘虜付諸作部者一皆遣散男女自相匹配賜百日廪其沒為軍賞者悉贖出之以襄陽淮南饒沃地各立一縣以居之彭城妖賊劉黎僭稱皇帝於皇邱龍驤將軍劉牢之討平之二月扶南獻方物吕光僭號三河王夏四月甲辰彭城王𢎞之薨翟遼冦滎陽執太守張卓六月壬寅使持節都督荆益寧三州諸軍事荆州刺史桓石䖍卒秋七月甲寅宣陽門四柱災八月姚萇襲破苻登獲其偽后毛氏丁亥汝南王羲薨九月庚午以尚書左僕射陸納為尚書令冬十二月乙巳雨木冰十五年春正月乙亥鎮北將軍譙王恬之薨龍驤將軍劉牢之及翟遼張願戰于太山王師敗績征虜將軍朱序破慕容永於太行二月辛巳以中書令王恭為都督青兖幽并冀五州諸軍事前將軍青兖二州刺史三月己酉朔地震戊辰大赦秋七月丁巳有星孛于北河八月永嘉人李耽舉兵反太守劉懐之討平之己丑京師地震有星孛于北斗犯紫微沔中諸郡及兖州大水龍驤將軍朱序攻翟遼于滑臺大敗之張願來降九月丁未以吳郡太守王珣為尚書僕射冬十二月己未地震十六年春正月庚申改築太廟夏六月慕容永冦河南太守楊佺期撃破之己未章武王範之薨秋九月癸未以尚書右僕射王珣為尚書左僕射以太子詹事謝琰為尚書右僕射新廟成冬十一月姚萇敗苻登于安定十七年春正月己巳朔大赦除逋租宿債夏四月齊國内史蔣喆殺樂安太守辟閭濬據青州反北平原太守辟閭渾討平之五月丁卯朔日有食之六月癸卯京師地震甲寅濤水入石頭毁大桁永嘉郡潮水涌起近海四縣人多死者乙卯大風折木戊午梁王龢薨慕容埀襲翟釗于黎陽敗之釗奔于慕容永秋七月丁丑太白晝見八月新作東宫冬十月丁酉太白晝見辛亥都督荆益寜三州諸軍事荆州刺史王忱卒十一月癸酉以黄門郎殷仲堪為都督荆益梁三州諸軍事荆州刺史庚寅徙封瑯邪王道子為會稽王封皇子徳文為瑯邪王十二月己未地震是嵗自秋不雨至于冬十八年春正月癸卯朔地震二月乙未地又震三月翟釗冦河南夏六月己亥始興南康廬陵大水深五丈秋七月旱閏月妖賊司馬徽聚黨於馬頭山劉牢之遣部將討平之九月丙戌龍驤將軍楊佺期撃氐帥楊佛嵩于潼谷敗之冬十月姚萇死子興嗣偽位十九年夏六月壬子追尊會稽王太妃鄭氏為簡文宣太后秋七月荆徐二州大水傷秋稼遣使振䘏之八月己巳尊皇太妃李氏為皇太后宫曰崇訓慕容垂撃慕容永於長子斬之冬十月慕容垂遣其子惡奴冦廪邱東平太守韋簡及垂將尹國戰于平陸簡死之是嵗苻登為姚興所殺登太子崇奔于湟中僭稱皇帝二十年春正月作宣太后廟甲寅􅄆騎常侍光禄大夫開府儀同三司尚書令陸納卒三月庚辰朔日有蝕之夏六月荆徐二州大水十一月魏王拓拔珪撃慕容垂子寳于黍谷敗之二十一年春正月造清暑殿三月慕容垂攻平城㧞之夏四月新作永安宫丁卯雨雹慕容垂死子寳嗣偽位五月甲子以望蔡公謝琰為尚書左僕射大水六月呂光僭即天王位秋九月庚申帝崩于清暑殿時年二十五葬隆平陵帝幼稱聰悟簡文之崩也時年十歲至晡不臨左右進諌答曰哀至則哭何常之有謝安嘗歎以為精理不減先帝既威權已出雅有人主之量既而溺於酒色殆為長夜之飲末年長星見帝心甚惡之於華林園舉酒祝之曰長星勸汝一杯酒自古何有萬歲天子邪太白連年晝見地震水旱為變者相屬醒日既少而傍無正人竟不能改焉時張貴人有寵年㡬三十帝戯之曰汝以年當廢矣貴人潛怒向夕帝醉遂暴崩時道子昏惑元顯専權竟不推其罪人初簡文帝見䜟云晋祚盡昌明及帝之在孕也李太后夢神人謂之曰汝生男以昌明為字及産東方始明因以為名焉簡文帝後悟乃流涕及為清暑殿有識者以為清暑反為楚聲哀楚之徴也俄而帝崩晋祚自此傾矣孝武帝寜康三年太元二十一年即位二十四年安皇帝諱徳宗字徳宗孝武帝長子也太元十二年八月辛巳立為皇太子二十一年九月庚申孝武帝崩辛酉太子即皇帝位大赦癸亥以司徒㑹稽王道子為太傅攝政冬十月甲申葬孝武皇帝于隆平陵大雪隆安元年春正月己亥朔帝加元服改元増文武位一等太傅㑹稽王道子稽首歸政以尚書左僕射王珣為尚書令領軍將軍王國寳為尚書左僕射二月呂光將禿髮烏孤自稱大都督大單于國號南涼撃光將竇荀于金昌大破之甲寅尊皇太后李氏為太皇太后戊午立皇后王氏三月呂光子纂為乞伏乾歸所敗光建康太守叚業自號涼州牧慕容寳敗魏師于薊夏四月甲戍兖州刺史王恭豫州刺史庾楷舉兵以討尚書左僕射王國寳建威將軍王緒為名甲申殺國寳及緒以悦于㳟恭乃罷兵戊子大赦五月前司徒長史王廞以吳郡反王恭討平之慕容寳將慕容詳僭即皇帝位于中山寳奔黄龍秋八月呂光為其僕射楊軌􅄆騎常侍郭黁所攻光子纂撃走之九月慕容寳將慕容麟斬慕容詳于中山因僭即皇帝位冬十月慕容麟為魏師所敗二年春三月龍丹二災夏五月蘭汙弑慕容寳而自稱大將軍昌黎王秋七月慕容寳子盛斬蘭汙僭稱長樂王攝天子位兖州刺史王㳟豫州刺史庾楷荆州刺史殷仲堪廣州刺史桓元南蠻校尉楊佺期等舉兵反八月江州刺史王渝奔于臨川丙子寜朔將軍鄧啓及慕容徳將慕容法戰于管城王師敗績丙子慕容盛僭即皇帝位於黄龍桓元大敗王師于白石九月辛卯加太傅會稽王道子黄鉞遣征虜將軍㑹稽王世子元顯前將軍王珣右將軍謝琰討桓元等己亥破庾楷于牛渚丙午會稽王道子屯中堂元顯守石頭己酉前將軍王珣守北郊右將軍謝琰備宣陽門輔國將軍劉牢之次新亭使子敬宣撃敗恭恭奔曲阿長塘湖湖尉收送京師斬之於是太常殷茂喻仲堪及桓元等走于尋陽冬十月新野言騶虞見丙子大赦壬午仲堪等盟于尋陽推桓元為盟主十一月以瑯邪王徳文為衞將軍開府儀同三司領軍將軍王雅為尚書左僕射十二月己丑魏王珪僭即尊位年號天興京兆人韋禮帥㐮陽流人叛降于姚興己酉前新安太守杜炯反于京口會稽王世子元顯討斬之禿髮烏孤自稱武威王三年春正月辛酉封宗室藴為淮陵王二月甲辰河間王國鎮薨林邑范達䧟日南九真遂寇交阯太守杜瑗討破之叚業自稱涼王仇池公楊盛遣使稱藩獻方物三月己卯追尊所生陳夫人為徳皇太后夏四月乙未加尚書令王珣衞將軍以㑹稽王世子元顯為揚州刺史六月戊子以瑯邪王徳文為司徒慕容徳䧟青州害龍驤將軍辟閭渾遂僭即皇帝位于廣固秋八月禿髮烏孤死其弟利鹿孤嗣偽位冬十月姚興䧟洛陽執河南太守辛㳟靖十一月甲寅妖賊孫㤙䧟㑹稽内史王凝之死之吳國内史桓謙臨海太守新蔡王崇義興太守魏隠並棄官而遁吳興太守謝邈永嘉太守司馬逸皆遇害遣衞將軍謝琰輔國將軍劉牢之逆撃走之十二月桓元襲江陵荆州刺史殷仲堪南蠻校尉楊佺期並遇害呂光立其太子紹為天王自號太上皇是日光死呂纂弑紹而自立是歲荆州大水平地三丈四年春正月乙亥大赦二月己丑有星孛于奎婁進至紫微三月彗星見于太微夏四月地震孫恩寇浹口五月丙寅􅄆騎常侍衞將軍東亭侯王珣卒己卯㑹稽内史謝琰為孫恩所敗死之㤙轉寇臨海六月庚辰朔日有食之旱輔國司馬劉裕破恩于南山恩將盧循䧟廣陵死者三千餘人以瑯琊王師何澄為尚書左僕射秋七月壬子太皇太后李氏崩丁卯大赦是月姚興伐乞伏乾歸降之八月丁亥尚書右僕射王雅卒壬寅葬文太后于脩平陵九月癸丑地震冬十一月寧朔將軍髙雅之及孫恩戰於餘姚王師敗績以揚州刺史元顯為後將軍開府儀同三司都督揚豫徐兖青幽冀并荆江司雍梁益交廣十六州諸軍事前將軍劉牢之為鎮北將軍封元顯子彦璋為東海王十二月戊寅有星孛于天市是歳北涼叚業敦煌大守李暠自為秦涼二州牧涼公年號庚子五年春二月丙子孫恩復冦浹口吕超弑吕纂以其兄隆僭即偽位三月甲寅衆星西流歴太㣲夏五月孫恩寇呉國内史袁山松死之沮渠䝉遜殺叚業自號大都督北涼州牧六月甲戍孫恩至丹徒乙亥内外戒嚴百官入居于省冠軍將軍髙素右衞將軍張崇之守石頭輔國將軍劉襲栅斷淮右丹陽尹司馬恢之戍南岸冠軍将軍桓謙輔國将軍司馬允之游擊将軍毛邃備白石左衞将軍王嘏領軍将軍孔安國屯中皇堂徴豫州刺史譙王尚之衞京師寧朔将軍髙雅之擊孫恩於廣陵之郁洲為賊所執秋七月叚興弑慕容盛盛叔父熙盡誅叚氏因僭稱尊號九月呂隆之降于姚興冬十月姚興帥師侵魏大敗而旋是歲饑禁酒元興元年春正月庚午朔大赦改元以後將軍元顯為驃騎大將軍征討大都督鎮北將軍劉牢之為元顯前鋒前將軍譙王尚之為後部以討桓元二月丙午帝戎服餞元顯于西池丁巳遣兼侍中齊王柔之以騶虞幡宣告荆江二州丁卯桓元敗王師于姑孰譙王尚之齊王柔之並死之以右將軍吳隠之為都督交廣二州諸軍事廣州刺史三月己巳劉牢之叛降于桓元辛未王師敗績于新亭驃騎大將軍㑹稽王世子元顯東海王彦璋冠軍將軍毛泰游撃將軍毛邃並遇害壬申桓元自為侍中丞相録尚書事以桓謙為尚書僕射遷太傅㑹稽王道子于安城元俄又自稱太尉揚州牧總百揆以瑯琊王徳文為太宰臨海太守辛景撃孫恩斬之是月禿髪利鹿孤死弟傉檀嗣偽位秋七月乙亥新蔡王崇為其奴所害八月庚子尚書下舍災冬十月冀州刺史劉軌叛奔于慕容徳十二月庚申㑹稽王道子為桓元所害曲赦廣陵彭城大逆以下二年春二月辛丑建威將軍劉裕破徐道覆于東陽乙卯桓元自稱大將軍丁巳冀州刺史孫無終為桓元所害夏四月癸巳朔日有食之秋八月元又自號相國楚王九月南陽太守庾仄起義兵為元所敗冬十一月壬午元遷帝于永安宫癸未移太廟神主于瑯琊國十二月壬辰元簒位以帝為平固王辛亥帝䝉塵于尋陽三年春二月帝在尋陽庚寅夜濤水入石頭漂殺人戸乙卯建武將軍劉裕帥沛國劉毅東海何無忌等舉義兵丙辰斬桓元所署徐州刺史桓脩于京口青州刺史桓𢎞于廣陵丁巳義兵濟江三月戊午劉裕斬元將吳甫之于江乗斬皇甫敷於羅落己未元衆潰而逃庚申劉裕置留臺具百官壬戍桓元司徒王謐推劉裕鎮軍將軍徐州刺史都督揚徐兖豫青冀幽并八州諸軍事假節劉裕以謐領揚州刺史録尚書事辛酉劉裕誅尚書左僕射王愉愉子荆州刺史緩司州刺史温詳辛未桓元逼帝西上丙戌宻詔以幽逼於元萬機虚曠令武陵王遵依舊典承制總百官行事加侍中餘如故并大赦謀反大逆已下惟桓元一祖之後不宥夏四月己丑大將軍武陵王遵稱制總萬機庚寅帝至江陵庚戍輔國將軍何無忌振武將軍劉道規及桓元將庾稚何澹之戰于湓口大破之元復逼帝東下五月癸酉冠軍將軍劉毅及桓元戰于崢嶸洲又破之己卯帝復幸江陵辛巳荆州别駕王康産南郡太守王騰之奉帝居于南郡壬午督䕶馮遷斬桓元於貊盤洲乗輿反正于江陵甲申詔曰姦凶簒逆自古有之朕不能式遏杜漸以致播越頼鎮軍將軍裕英畧奮發忠勇絶世冠軍將軍毅等誠心宿著協同嘉謀義聲既振士庻效節社稷載安四海齊慶其大赦天下凡諸畏逼事屈逆命者一無所問戊寅奉神主入于太廟閏月己丑桓元故將揚武將軍桓振䧟江陵劉毅何無忌退守尋陽帝復䝉塵于賊營六月益州刺史毛璩討偽梁州刺史桓希斬之秋七月戊申永安皇后何氏崩八月癸酉祔葬穆帝章皇后于永平陵九月前給事中刁騁秘書丞王邁之謀反伏誅冬十月盧循冦廣州刺史呉隱之為循所敗執始興相阮腆之而還慕容徳死兄子超嗣偽位義熙元年春正月帝在江陵南陽太守魯宗之起義兵襲破襄陽己丑劉毅次于馬頭桓振以帝屯于江津辛卯宗之破振將温楷于柞溪進次紀南為振所敗振武将軍劉道規擊桓謙走之乗輿反正帝與瑯琊王幸道規舟戊戍詔大赦改元唯元振一祖及同黨不在原例賜百姓爵人二級鰥寡孤獨榖人五斛大酺五日二月丁巳留臺備乗輿法駕迎帝於江陵𢎞農太守戴寧之建威主簿徐惠子等謀反伏誅平西參軍譙縱害平西将軍益州刺史毛璩以蜀叛三月桓振復襲江陵荆州刺史司馬休之奔于襄陽建威将軍劉懐肅討振斬之帝至自江陵乙未百官詣闕請罪詔曰此非諸卿之過其還率職戊戍舉章皇后哀三日臨于西堂劉裕及何無忌等抗表遜位不許庚子以瑯琊王徳文為大司馬武陵王遵為太保加鎮軍將軍劉裕為侍中車騎將軍都督中外諸軍事甲辰詔常所供奉可籌量減省夏四月劉裕旋鎮京口戊辰餞于東堂夏五月癸未禁絹扇及摴蒲游撃將軍章武王秀益州刺史司馬軌之謀反伏誅桓元故將桓亮苻宏刁預寇湘州守將撃走之秋八月甲子封臨川王子脩之為㑹稽王冬十一月乞伏乾歸伐仇池仇池公楊盛大破之是嵗西涼李暠遣使奉表稱藩二年春正月益州刺史司馬榮期撃譙縱將譙子明于白帝破之夏五月封髙宻王子法蓮為髙陽王秋七月梁州刺史楊孜敬有罪伏誅冬十月論匡復之功封車騎將軍劉裕為豫章郡公撫軍將軍劉毅南平郡公右將軍何無忌安成郡公自餘封賞各有差乙亥以左將軍孔安國為尚書左僕射十二月盜殺零陵太守阮野三年春三月己酉車騎將軍劉裕來朝誅東陽太守殷仲文南蠻校尉殷叔文晋陵太守殷道叔永嘉太守駱球己丑大赦除酒禁夏五月大水六月姚興將赫連勃勃僭稱天王于朔方國號夏秋七月戊戌晦日有食之汝南王遵之有罪伏誅八月遣冠軍將軍劉敬宣持節監征蜀諸軍事冬十一月赫連勃勃大敗禿髪傉檀傉檀奔于南山是嵗髙雲馮跋殺慕容熙雲僭即帝位四年春正月甲辰以瑯琊王徳文領司徒車騎將軍劉裕為揚州刺史録尚書事庚申侍中太保武陵王遵薨夏四月􅄆騎常侍尚書左僕射孔安國卒甲午加吏部尚書孟昶尚書左僕射冬十一月癸丑雷梁州刺史楊思平有罪棄市辛卯大風㧞樹是月禿髪傉檀僭即涼王位十二月陳留王曹靈誕薨五年春正月辛卯大赦庚戍以撫軍將軍劉毅為衞將軍開府儀同三司加輔國將軍何無忌鎮南將軍戊戍尋陽地震二月慕容超將慕容興宗㓂宿豫陽平太守劉千載南陽太守趙元並為賊所執三月乙亥大雪平地數尺車騎將軍劉裕帥師伐慕容超夏六月丙寅震于太廟劉裕大破慕容超于臨朐秋七月姚興将乞伏乾歸僣稱西秦王於苑川九月戊辰離班弑高雲雲将馮跋攻班殺之跋僭即王位仍號燕冬十月魏清河王紹弑其主珪六年春二月丁亥劉裕攻慕容超尅之齊地悉平是月廣州刺史盧循反宼江州三月禿髪傉檀及沮渠蒙遜戰于窮泉傉檀敗績壬申鎮南將軍江州刺史何無忌及循戰于豫章王師敗績無忌死之夏四月青州刺史諸葛長民兖州刺史劉藩并州刺史劉道憐並入衞京師五月丙子大風拔木戊子衞将軍劉毅及盧循戰于桑落洲王師敗績尚書左僕射孟昶懼自殺己未大赦乙丑循至淮口内外戒嚴大司馬瑯琊王徳文都督宫城諸軍事次中皇堂太尉劉裕次石頭梁王珍之屯南掖門冠軍將軍劉敬宣屯北郊輔國將軍孟懐玉屯南岸建武將軍王仲徳屯越城廣武將軍劉懐默屯建陽門淮口築柤浦藥園廷尉三壘以距之丙寅震太廟鴟尾秋七月庚申盧循遁走甲子使輔國將軍王仲徳廣川太守劉鍾河間内史蒯㤙等帥衆追之是月盧循宼荆州刺史劉道規雍州刺史魯宗之等敗之又破徐道覆于華容賊復走尋陽八月姚興將桓謙宼江陵劉道規敗之冬十一月蜀賊譙縱䧟巴東守將温祚時延祖死之十二月壬辰劉裕破盧循于豫章七年春二月壬午右将軍劉藩斬徐道覆于始興𫝊首京師夏四月盧循走交州刺史杜慧度斬之秋七月丁夘以荆州刺史劉道規為征西大將軍開府儀同三司冬十月沮渠䝉遜伐西凉李暠暠與戰敗之八年春二月丙子以呉興太守孔靖為尚書右僕射三月甲寅山隂地䧟四尺有聲如雷夏五月乞伏公府弑乞伏乾歸乾歸子熾盤誅公府僭即偽位六月以平北將軍魯宗之為鎮北將軍秋七月甲午武陵王季度薨庚子征西大將軍劉道規卒八月皇后王氏崩辛亥髙密王純之薨九月癸酉葬僖皇后于休平陵己卯太尉劉裕害右將軍兖州刺史劉藩尚書左僕射謝混庚辰裕矯詔以克殄凶黨大赦天下唯劉毅不在其例普増文武位一等其有孝順忠義隐滯遺逸必令聞達己丑劉裕帥師討毅裕參軍王鎭惡䧟江陵城毅自殺冬十一月沮渠䝉遜僭號西河王十二月以西陵太守朱齡石為建威將軍益州刺史帥師伐蜀分荆州十郡置湘州是嵗廬陵南康地四震九年春三月丙寅劉裕害前將軍諸葛長民及其弟輔國大將軍黎民從弟寜朔將軍秀之三月戊寅加劉裕鎭西將軍豫州刺史林邑范胡達㓂九眞交州刺史杜慧度斬之夏四月壬戌罷臨沂湖塾皇后脂澤田四十頃以賜貧人弛湖池之禁封鎮北將軍魯宗之為南陽郡公秋七月朱齡石克成都斬譙縱益州平九月封劉裕次子義真為桂陽公冬十二月安平王球之薨是嵗髙句麗倭國及西南夷銅頭大帥並獻方物十年春三月戊寅地震夏六月乞伏熾盤帥師伐秃髪傉檀滅之秋七月淮北大風壊廬舍九月丁巳朔日有蝕之林邑遣使獻方物是嵗城東府十一年春正月荆州刺史司馬休之雍州刺史魯宗之並舉兵貳於劉裕裕帥師討之庚午大赦丁丑以吏部尚書謝裕為尚書左僕射二月丁未姚興死子泓嗣偽位三月辛巳淮陵王藴薨壬午劉裕及休之戰於江津休之敗奔襄陽夏四月乙卯青冀二州刺史劉敬宣為其參軍司馬道賜所害五月甲申彗星二見甲午休之宗之出奔于姚泓論平蜀功封劉裕子義隆彭城公朱齡石豐城公己酉霍山崩出銅鐘六枚秋七月丙戌京師大水壊太廟辛亥晦日有蝕之八月丁未尚書左僕射謝裕卒以尚書右僕射劉穆之為尚書左僕射九月己亥大赦十二年春正月姚泓使其將魯軌㓂襄陽雍州刺史趙倫之撃走之二月加劉裕中外大都督夏六月赫連勃勃攻姚泓秦州䧟之己酉新除尚書令都郷亭侯劉柳卒秋八月劉裕及瑯琊王徳文帥衆伐姚泓丙午大赦冬十月丙寅姚泓將姚光以洛陽降己丑遣兼司空髙宻王恢之修謁五陵十三年春正月甲戌朔日有蝕之二月李暠死其子歆嗣偽位為凉州牧涼公三月龍驤將軍王鎮惡大破姚泓將姚紹于潼闗夏劉裕敗魏將鵝青于河曲斬青禆將阿薄于是月李歆大敗沮渠䝉遜于鮮支澗夏五月劉裕克潼闗丁亥㑹稽王修之薨六月癸亥林邑獻馴象白鸚鵡秋七月劉裕克長安執姚泓收其彞器歸諸京師南海賊徐道期䧟廣州始興相劉謙之討平之冬十二月辛未左僕射前將軍劉穆之卒十四年春正月辛巳大赦青州刺史沈田子害龍驤將軍王鎮惡于長安夏六月劉裕為相國進封宋公冬十月以李歆為鎮西將軍封酒泉公十一月赫連勃勃大敗王師于青泥北雍州刺史朱齡石焚長安宫殿奔于潼闗尋又大潰齡石死之十二月戊寅帝崩于東堂時年三十七葬休平陵帝不慧自少及長口不能言雖寒暑之變無以辨也凡所動止皆非己出故桓元之簒因此獲全初䜟云昌明之後有二帝劉裕將為禪代故密使王韶之縊帝而立恭帝以應二帝云安帝隆安五年元興三年義熙十四年即位二十二年恭帝諱徳文字徳文安帝母弟也初封琅邪王歴中軍將軍散騎常侍衛將軍開府儀同三司加侍中領司徒録尚書六條事元興初遷車騎大將軍桓元執政進位太宰加衮冕之服緑綟綬元簒位以帝為石陽縣公與安帝俱居尋陽及元敗随至江陵元死桓振奄至躍馬奮戈直至階下瞋目謂安帝曰臣門戸何負國家而屠滅若是帝乃下牀謂振曰此豈我兄弟意邪振乃下馬致拜振平復為琅邪王又領徐州刺史尋拜大司馬領司徒加殊禮義熙五年置左右長史司馬從事中郎四人加羽葆鼓吹十二年詔帝與太尉裕並得辟召掾屬時太尉裕都督中外諸軍事詔曰大司馬地隆任重親賢莫二雖府受節度可身無致敬劉裕之北征也帝上疏請帥所蒞啟行戎路修敬山陵朝廷從之乃與裕俱發及有司以即戎不得奉辭陵廟帝復上疏乞展情埏􅎬許之及姚泓滅歸于京都十四年十二月戊寅安帝崩劉裕矯稱遺詔以帝入纂大統是日即皇帝位大赦元熙元年春正月壬辰朔改元以山陵未厝不朝㑹立皇后禇氏甲午徴劉裕還朝戊戌有星孛于太微西藩庚申葬安皇帝于休平陵帝受朝懸而不樂以驃騎將軍劉道憐為司空秋八月劉裕移鎭夀陽以劉懐慎為前將軍北徐州刺史鎮彭城九月劉裕自觧揚州冬十月乙酉裕以其子桂陽公義真為揚州刺史十一月丁亥朔日有蝕之十二月辛卯裕加殊禮己卯太史奏黑龍四見于東方二年夏六月壬戌劉裕至于京師傅亮承裕密㫖諷帝禪位草詔請帝書之帝欣然謂左右曰晉氏乆已失之今復何恨乃書赤紙為詔甲子遂遜于琅邪第劉裕以帝為零陵王居于秣陵行晉正朔車旗服色一如其舊有其文而不備其禮帝自是之後深慮禍機禇后常在帝側飲食所資皆出禇后故宋人莫得伺其隙宋永初二年九月丁丑裕使禇后兄叔度請后有間兵人踰垣而入弑帝于内房時年三十六諡恭皇帝葬冲平陵帝㓜時性頗忍急及在藩國曾令善射者射馬為戲既而有人云馬者國姓而自殺之不祥之甚帝亦悟甚悔之其後復深信浮屠道鑄貨千萬造丈六金像親於瓦官寺迎之歩從十許里安帝既不慧帝每侍左右消息温涼寢食之節以恭謹聞時人稱焉始元帝以丁丑歳稱晉王置宗廟使郭璞筮之云享二百年自丁丑至禪代是嵗年在庚申為一百四歳然丁丑始係西晉庚申終入宋年所餘惟一百有二嵗耳璞盖以百二之期促故婉而倒之為二百也恭帝元熙二年右自元帝中興至恭帝遜位于宋凡十一帝一百四年是為東晉通西晉共十八帝合一百五十六年而禪于宋通志卷十下
