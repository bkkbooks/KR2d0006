body:
  text: 通志卷一百八十三宋右廸功郎鄭樵漁仲撰藝術傳後魏鼂崇弟懿張淵徐路孫高崇祖僧化殷紹王早耿元劉靈助沙門靈逺李順興檀師顔惡頭周澹李脩父亮徐謇從孫之才玉顯崔彧子景哲冏景哲子蒋少游北齊由吾道禜王春信都芳宋景業許遵麴紹呉遵世趙輔和皇甫玉觧法選魏寧綦母懐文張子信陸法和馬嗣明後周蒋昇强練姚僧坦褚該隋庾季才子質盧太翼耿詢來和蕭吉楊伯醜臨孝恭劉祐張胄元許智藏萬寳常何稠後魏鼂崇字子業遼東襄平人也善天文術數為慕容垂太史郎從慕容寳敗於參合為道武所獲從平中原拜太史令詔崇造渾儀遷中書侍郎令如故天興五年月暈左角崇奏占為角蟲将死帝既克姚平於柴壁以崇言之徴遂命諸軍焚車而反牛果大疫輿駕所乗巨犗數百頭亦同日斃於路側自餘首尾相繼是歳天下牛死者十七八麋鹿亦多死崇弟懿明辯而才不及崇以善北人語為黄門侍郎懿好矜容儀被服僭度言音類帝左右每聞其聲莫不驚悚帝知而惡之後其家奴告崇懿叛招引姚興及興寇平陽帝以奴言為實執崇兄弟並賜死張淵不知何許人也明占候自云嘗事苻堅堅欲征晉淵勸不行堅不從果敗又仕姚興為靈臺令姚泓滅入赫連昌昌復以淵及徐辯對為太史令統萬平淵辯俱見獲以淵為太史令神䴥二年将討蠕蠕淵辯皆謂不宜行與崔浩爭於太武前淵專守常占而不能鉤深致遠故不及浩後為驃騎軍謀祭酒著觀象賦其言星文甚備文多不載又明元時有容城令徐路善占候坐繫冀州獄别駕崔隆宗就禁慰問之路曰昨夜驛馬星流計赦須臾應至隆宗先信之遂遣人出城候焉俄而赦至又道武明元時太史令王亮蘇垣太武時破和龍得馮𢎞太史令閔盛孝文時太史趙樊生並知天文後太史令趙勝趙翼趙洪慶胡世榮胡法通等二族世業天文又永安中詔以恒州人高崇祖善天文每占吉凶有驗特除中散大夫永熈中詔通直散騎常侍孫僧化與太史胡世榮太史令張寵趙洪慶及中書舍人孫子良等在門下外省校比天文書集甘石二家星經及漢魏以來二十三家經占集五十五卷後集諸家撮要前後所上雜占以類相從日月五星二十八宿中外宫及圖合為七十五卷僧化東莞人也識星分案文占以言災異時有所中普泰中爾朱兆惡其多言遂繫於廷尉免官永熈中孝武帝召僧化與中散大夫孫安都共撰兵法未就而帝入闗遂罷元象中死於晉陽殷紹長樂人也逹九章七曜太武時為算生博士給事東宫西曹太安四年上四序堪輿表言以姚氏之時行學伊川遇遊遁大儒成公興從求九章要術興字廣明自云膠東人也山居隠跡希在人間興将臣到陽翟九崖巖沙門釋曇景間興即北還臣獨留住依止景所求請九章景復将臣向長廣東山就道人法穆法穆時共景為臣開述九章數家雜要復以先師和公所注黄帝四序經文三十六卷合有三百二十四章專説天地隂陽之本其第一孟序九卷八十一章説隂陽配合之原第二仲序九卷八十一章觧四時氣王休殺吉凶第三叔序九卷八十一章明日月辰宿交㑹相生為表裏第四季序九卷八十一章具釋六甲刑禍福徳以此經文傳授於臣山神禁嚴不得賫出尋究經年粗舉綱要山居嶮難無以自供不堪窘迫心生懈怠以甲寅之年日維鶉火感物懷歸自爾至今二十五載臣前在東宫以状奏聞奉被景穆皇帝聖詔敕臣撰録集其要最仰奉明㫖謹審先所見四序經文抄撮要略當世所湏吉凶舉動集成一卷上至天子下及庶人貴賤等級尊卑差别吉凶所用罔不畢備未及内呈先帝晏駕依先撰録謹以上聞其四序堪輿遂大行於世其從子玖亦以學術著名王早勃海南皮人也明隂陽九宫及兵法善風角明元時䘮亂之後有人詣早求問勝術早為設法令各無咎由是州里稱之時有東莞鄭氏執得讐人趙氏尅明晨㑹宗族當就墓所刑之趙氏求救於早早為占候并授以一符曰君今且還選取七人令一人為行主者佩此符於鷄鳴時伏在仇家宅東南二里平旦當有十人相隨向西北行中有七人乗黑牛一黑牛最在前一黑牛應第七但捉取第七者將還事必無他趙氏從之果如其言乃是鄭氏男五父也諸子並為其族所宗敬故和觧二家趙氏竟免後早與客清晨立於門内遇有卒風振樹早語客曰依法當有千里外急使日中時有兩匹馬一白一赤從西南來至即取我逼我不聽與妻子别語訖便入召家人隣里辭别仍沐浴帶書囊日中出門候使如期果有馬一白一赤從州而至即促早上馬遂詣行宫時太武圍凉州未㧞故許彦薦之早彦師也及至詔問何時當克此城早對曰陛下但移據西北角三日内必克帝從之如期而克輿駕還都久不雨帝問早早曰今日申時必大雨比至未猶無片雲帝召早詰之早曰願更少時至申時雲四合遂大雨滂沲早苦以疾辭乞歸鄉里詔許之遂終於家或言許彦以其術勝恐終妨已譎令歸之耳耿元鉅鹿宋子人也善卜占有客叩門元在室已知其姓字并所齎持及來問之意其所卜筮十中八九别有林占時或傳之而性不和俗時有王公欲求其筮者元則拒而不許每云今既貴矣何所求而復卜也欲望意外乎代京法禁嚴切王公聞之莫不驚悚而退故元多見憎忿不為貴勝所親官止鉅鹿太守劉靈助燕郡人也師事范陽劉弁而麤踈無頼或時負販或復刼盗賣術於市後事爾朱榮榮信卜筮靈助所占屢中遂被親待為榮府功曹參軍建義初榮於河隂害王公卿士時奉車都尉盧道䖍兄弟亦相率朝行宫靈助以其州里衛䕶之由是朝士與諸盧相随免害者數十人榮入京師超拜光禄大夫封長子縣公從上黨王元天穆討邢杲元顥入洛天穆度河會爾朱榮於太行及将攻河内令靈助筮之靈助曰未時必克時已向中士衆疲怠靈助曰時将至矣榮鼓之即便克䧟及至北中榮攻城不獲以時盛暑議欲且還以待秋凉荘帝詔靈助筮之靈助曰必破十八九問果如言車駕還宫進爵燕郡公贈其父僧安為幽州刺史尋兼尚書左僕射慰勞幽州流人北還與都督侯深等討葛榮餘黨韓婁滅之於薊仍釐州務又為幽并營安四州行臺及爾朱榮死荘帝幽崩靈助本寒微一朝至此自謂方術堪能動衆又以爾朱有誅滅之兆遂自號燕王大行臺為荘帝舉義兵馴養大鳥稱為已瑞妄説圖䜟言劉氏當王又云欲知避世入鳥村遂刻氊為人象書桃木為符書作詭道厭祝法人多信之時西河人紇豆陵步藩舉兵逼晉陽爾朱兆頻戰不利故靈助唱言爾朱自然當滅不湏我兵由是幽瀛滄冀人悉從之從之者夜舉火為號不舉火者諸村共屠之普泰元年率衆至博陵之安國城與叱列延慶侯深爾朱羽生等戰戰敗被禽斬於定州傳首洛陽支分其體初靈助每云三月末我必入定州爾朱亦必滅及将戰靈助自筮卦不吉以手折蓍棄之地云此何知尋見禽果以三月入定州而齊神武以明年閏三月滅兆等於韓陵山永熈二年贈尚書左僕射開府儀同三司幽州刺史諡曰恭時又有沙門靈逺者不知何許人有道術嘗言爾朱榮成敗預知其時又言代魏者齊葛榮聞之故自號齊及齊神武至信都靈逺與勃海李嵩來謁神武待靈逺以殊禮問其天文人事對曰齊當興東海出天子今王據勃海是齊地又太白與月並宜速用兵遲則不吉靈逺後罷道姓荆字次徳求之不知所在李順興京兆杜陵人也年十餘乍愚乍智時莫識之其言未來事時有中者盛冬單布衣跣行氷上及入洗浴略不患寒家嘗為齋方食器用不周順興言昆明池中有大荷葉可取盛餅食其所居去池十數里日不移影順興負荷葉而歸脚猶泥舉坐驚異後稍出城市常冠道士冠人有憶者不過數日輙至其家號為李練好飲酒但不至醉貴賤並敬之得人所施輙散乞貧人蕭寳夤反召順興問曰朕王可幾年對曰為天子自有百年者十年者一年者百日者事由可知及寳夤敗裁百日也有侯終徳者寳夤之黨寳夤敗後收集反者順興稱其必敗徳乃棒殺順興置城隍中頃之起活如初後賀㧞岳北征順興與魏收書上為毛鴻賓等九人姓名者悉放責還順興從後提一河東酒􅀈以繩繫之於城巷牽行俄而蒲坂降又無何至太傅梁覽家庭中卧以布衫倒覆身上後覽於趙崔反通使東魏事泄被誅覽以衣倒覆果如順興之形周文嘗至温泉順興求乞温泉東間驪山下二畝地周文曰李練用此何為對曰有用未幾至温湯遇患卒於其地初大統十三年順興謂周文曰可於沙苑北作一老君象靣向北作笑状周文訝曰何為答曰令笑破蠕蠕時甚惑未觧其意及蠕蠕國滅周文憶語遂作順興象於老君側檀特師者名惠豐身為比邱不知何處人飲酒啖肉語嘿無常逆論來事後皆如言居於凉州宇文仲和為刺史請之至州内歴觀廐庫乃云何意畜他官馬官物仲和怒不聽住凉州未幾仲和拒不受代朝廷令獨孤信禽之仲和身死資財没官周文遣書召之檀特發至岐州會齊神武來冦玉壁檀特曰狗豈能至龍門也神武果不至龍門而還侯景未叛東魏之前忽捉一杖杖頭刻為獼猴令其靣常向西日夜弄之又索一角弓牽挽之俄而景啟降尋復背叛人皆以為驗至大統十七年春初忽著一布㡌周文左右驚問之檀特曰汝亦著王亦著也至三月而文帝崩復取一白絹㡌著之左右復問之檀特云汝亦著王亦著也未幾丞相夫人薨後又著白絹㡌左右復問之云汝亦著王亦著也尋而丞相第二兒武邑公薨其事驗多如此也俄而疾死顔惡頭章武郡人也妙於易筮遊州市觀卜有婦人負囊粟來卜歴七人皆不中而彊索其粟惡頭尤之卜者曰君若能中何不為卜惡頭因筮之曰登高臨下水泂泂唯聞人聲不見形婦人曰姙身已七月矣向井上汲水忽聞胎聲故卜惡頭曰吉十月三十日有一男子諸卜者乃驚服曰是顔生邪相與具羊酒謝焉有人以三月十三日詣惡頭求卜遇兌之履惡頭占之曰君卜父父已亡當上天聞哭聲忽復蘇而有言其人曰父卧疾三年矣昨日雞鳴時氣盡舉家大哭父忽驚寤云我死有三天人來迎欲升天聞哭聲遂墜地惡頭曰更三日當永去果如言人問其故惡頭曰兌上天下土是今日庚辛本宫火故知卜父今三月土入墓又見宗廟爻發故知死變見生氣故知蘇兌為口主音聲故知哭兌變為乾乾天也兌為言故知有言未化入戍為土三月土墓戍又是本宫鬼基末後三日至戍故知三日復死惡頭又語人曰長樂王某年某月某日當為天子有人姓張聞其言數以寳物獻之豫乞東益州刺史及期果為天子擢張用之惡頭自言厄在彭城後遊東都逢彭城王爾朱仲逺将伐齊神武於鄴召惡頭令筮惡頭野生不知避忌高聲言大惡仲逺怒其沮衆斬之周澹京兆鄠人也多方術尤善醫藥遂為太醫令明元嘗苦風頭眩澹療得愈由此位特進賜爵成徳侯神瑞二年京師饑朝議遷都於鄴澹與博士祭酒崔浩進計言不可明元曰唯此二人與朕意同詔賜澹浩妾各一人卒諡曰恭李脩字思祖本陽平館陶人也父亮少學醫術未能精究太武時奔宋又就沙門僧坦略盡其術針灸授藥罔不有效徐兖間多所救恤亮大為聽事以舍病人死者則就而棺殯親徃弔視其仁厚若此累遷府參軍督䕶本郡士門宿宦咸相交昵車馬金帛酬賚無貲脩兄元孫隨畢衆敬赴平陽亦遵父業而不及以功拜奉朝請脩略與兄同晚入代京歴位中散令以功賜爵下蔡子遷給事中太和中常在禁内文明太后時有不豫脩侍針藥多效賞賜累加車服第宅號為鮮麗集諸學士及工書者百餘人在東宫撰諸藥方百卷皆行於世先是咸陽公高允雖年且百歳而氣力尚康孝文文明太后時令脩診視之一旦奏言允脉竭氣微大命無逮未幾果亡後卒於太醫令贈青州刺史徐謇字成伯丹陽人也家本東莞與兄文伯等皆善醫藥謇因至青州慕容白矅平東陽獲之送京師獻文欲驗其能置病人於幕中使謇隔而脉之深得病形兼知色候遂被寵遇為中散稍遷内行長文明太后時問經方而不及李脩之見任用謇合和藥劑攻療之驗精妙於脩而性祕忌承奉不得其意雖貴為王公不為措療也孝文還洛稍加眷待體小不平及所寵馮昭儀有病皆令處療又除中散大夫轉侍御師謇欲為孝文合金丹致延年法乃入居嵩高採營其物歴歳無所成遂罷二年上幸縣瓠有疾大漸乃馳驛召謇令水路赴行所一日一夜行數百里至診省有大驗九月車駕次于汝濱乃大為謇設太官珍膳因集百官特坐謇于上席遍陳餚觴于前命左右宣謇救攝危篤振濟之功宜加酬賚乃下詔襃美以謇為大鴻臚卿金鄉縣伯又賜錢絹雜物奴婢牛馬事出豐厚皆經内呈諸親王咸陽王禧等各有别賚並至千匹從行至鄴上猶自發動謇日夕左右明年從詣馬圈上疾勢遂甚蹙蹙不怡每加切誚又欲加之鞭捶幸而獲免帝崩後謇随梓宫還洛謇常有将餌及吞服道年垂八十而鬚髮不白力未多衰正始元年以老為光禄大夫卒贈安東将軍齊州刺史諡曰靖子踐字景昇襲爵位建興太守文伯仕南齊位東莞泰山蘭陵三郡太守子雄員外散騎侍郎醫術為江左所稱事並見南史雄子之才㓜而儁發五嵗誦孝經八嵗略通義㫖曾與從兄康造梁太子詹事汝南周捨宅聽老子捨為設食乃戲之曰徐郎不用心思義而但事食乎之才答曰葢聞聖人虛其心而實其腹捨嗟賞之年十三召為太學生粗通禮易彭城劉孝綽河東裴子野呉郡張嵊等每共論周易及喪服儀酬應如響咸共歎曰此神童也孝綽又云徐郎鷰頷有班定逺之相陳郡袁昻領丹陽尹辟為主簿人務事宜皆被顧訪郡廨遭火之才起望夜中不著衣披紅眠帕出房映光為昂所見功曹白請免職昂重其才術仍特原之豫章王綜出鎮江都復除豫章王國左常侍又轉綜鎮北主簿及綜入魏三軍散走之才退至吕梁橋斷路絶遂為統軍石茂孫所止綜入魏旬月位至司空聽綜收斂僚屬乃訪知之才在彭泗啟孝文帝云之才大善醫術兼有機辯詔徴之才孝昌二年至洛敕居南館禮遇甚優謇子踐啟求之才還宅之才藥石多效又闚渉經史發言辯㨗朝賢競相要引為之延譽武帝時封昌安縣侯天平中齊神武徴赴晉陽常在内館禮遇稍厚武定四年自散騎常侍轉祕書監文宣作相普加黜陟楊愔以其南士不堪典掌功程且多陪從全廢曹務轉授金紫光禄大夫以魏收代之才甚怏怏不平之才少觧天文兼圖䜟之學共館客宋景業參校吉凶知午年必有革易因高徳正啟之文宣聞而大悅時婁太后及勲貴臣咸云闗西既是勍敵恐其有挾天子令諸侯之辭不可先行禪代事之才獨云千人逐兔一人得之諸人咸息湏定大業何容翻欲學人又援引證據備有條目文宣從之登阼後彌見親密之才非唯醫術自進亦為首唱禅代又戲謔滑稽言無不至於是大被狎昵尋除侍中封池陽縣伯見文宣政令轉嚴求出除趙州刺史竟不獲述職猶為弄臣皇建二年除西兖州刺史未之官武明皇太后不豫之才療之應手便愈孝昭賜綵帛千叚錦四百疋之才既善醫術雖有外授頃即徴還既博識多聞由是於方術尤妙大寧二年春武明太后又病之才弟之範為尚藥典御敕令診候内史皆令呼太后為石婆葢有俗忌故改名以厭制之之範出告之才曰童謡云周里跂求伽豹祠嫁石婆斬冢作媒人唯得一量紫綖靴今太后忽改名私所致怪之才曰跂求伽胡言去已豹祠嫁石婆豈有好事斬冢作媒人但令合葬自斬冢唯得紫綖靴者得至四月何者紫之為字此下系綖者熟當在四月之中之範問靴是何義之才曰靴者革旁化寧是久物至四月一日后果崩有人患脚跟痛諸醫莫能識之才曰蛤精疾也由乗船入海垂脚水中疾者曰實曾如此之才為剖得蛤子二大如榆莢又有以骨為刀子把者五色班蘭之才曰此人瘤也問得處云於古冢見髑髏額骨長數寸試削視有文理故用之其明悟多通如此天統四年累遷尚書左僕射俄除兖州刺史特給鐃吹一部之才醫術最高偏被命召武成酒色過度怳忽不恒曾病發自云初見空中有五色物稍近變成一羙婦人去地數丈亭亭而立食頃變為觀世音之才云此色欲多太虚所致即處湯方服一劑便覺稍逺又服還變成五色物數劑湯疾竟愈帝每發動暫遣騎追之針藥所加應時必效故頻有端執之舉入秋武成小定更不發動和士開欲依次轉進以之才附籍兖州即是本屬遂奏附除刺史以胡長仁為左僕射士開為右僕射及十月帝又病動語士開云浪用之才外任使我辛苦其月八日敕驛追之才帝以十日崩之才十一日方到既無所及復還赴州在職無所侵暴但不甚閑法理頗亦踈慢用捨自由五年冬後主徴之才尋左僕射闕之才曰自可復禹之績武平元年重除尚書左僕射之才於和士開陸令萱母子曲盡卑狎二家若疾救䕶百端由是遷尚書令封西陽郡王祖珽執政除之才侍中太子太師之才恨曰子野沙汰我珽目疾故以師曠比之之才聰辯彊識有兼人之敏尤好劇談體語公私言聚多相嘲戲鄭道育常戲之才為師公之才曰既為汝師又為汝公在三之義頓居其兩又嘲王昕姓云有言則􅀈近犬便狂加頸足而為馬施角尾而成羊盧元明因戲之才云卿姓是未入人名是字之誤之當為乏也即答云卿姓在上為虐在邱為虛生男則為虜配馬則為驢又常與朝士出游遥望羣犬競走諸人試令目之之才即應聲云為是宋鵲為是韓盧為逐李斯東走為負帝女南徂李諧於廣坐因稱其父名曰卿嗜熊白生不之才曰平平耳又曰卿此言於理平不諧遽出避之道逢其甥高徳正徳正曰舅顔色何不悦諧告之故徳正徑造坐席連索熊白之才謂坐者曰箇人諱底衆莫之應之才曰生不為人所知死不為人所諱此何足問唐邕白建方貴時人言云并州赫赫唐與白之才蔑之元日對邕為諸令史祝曰卿等位當作唐白又以小史好嚼筆故常執管就元文遥口曰借君齒其不遜如此歴事諸帝以戲狎得寵武成生齻牙問諸醫尚藥典御鄧宣文以實對武成怒而撻之後以問之才拜賀曰此是智牙生智牙者聰明長壽武成悅而賞之為僕射時語人曰我在江東見徐勉作僕射朝士莫不佞之今我亦是徐僕射無一人佞我何由可活之才妻魏廣陽王妹之才從文襄求得為妻和士開知之乃滛其妻之才遇見而避之退曰妨少年戲笑其縱之如此年八十卒贈司徒公録尚書事諡曰文明長子林字少卿太尉司馬次子同卿太子庶子之才以其無學術每歎曰終恐同廣陵散矣弟之範醫術見知位太常卿特聽襲之才爵西陽王入周授儀同大将軍隋開皇中卒王顯字世榮陽平樂平人也自言本東海郯人王朗之後裔也父安上少與李亮同師俱受醫藥而不及亮顯少歴本州從事雖以醫術自通而明敏有决斷才用初文昭太后之懐宣武夢為日所逐化而為龍繞后后寤而驚悸遂成心疾文明太后敕徐謇及顯等為后診脉謇云是微風入藏宜進湯加針顯言案三部脉非有心疾将是懷孕生男之象果如顯言久之補侍御師宣武自幼有微疾顯攝療有效因稍䝉眄識又罷六輔之初顯為領軍于烈間通規䇿頗有宻功累遷廷尉卿仍在侍御營進御藥出入禁内累遷御史中尉顯前後居職所在著稱糾折庶獄究其姦回出内惜慎憂國如家及領憲臺多所彈劾百寮肅然又以中尉屬官不悉稱職諷求改革詔委改選務盡才能而顯所舉或有請屬未皆得人於是衆議喧譁聲望致損後宣武詔顯撰藥方三十五卷班布天下以療諸疾東宫建以為太子詹事委任甚厚上每幸東宫顯常近侍出入禁中仍奉醫藥賞賜累加為立館宇寵振當時以善療功封衛國縣伯及宣武崩明帝踐阼顯參奉璽䇿隨從臨哭微為憂懼顯既䝉任遇兼為法官恃勢使威為時所疾朝宰託以侍療無效執之禁中詔削爵位徙朔州臨執呼寃直閤伊盆生以刀鐶撞其腋下傷中吐血至右衛府一宿死子曄尚書儀曹郎中懼走後被獲拷掠百餘宅没於官初顯構會元景就刑南臺及顯之死在右衛府唯隔一巷相去數十歩世以為有報應之驗始顯布衣為諸生有沙門相顯後當富貴誡其勿為吏為吏必敗由是宣武時或欲令其兼攝吏部每殷勤辭避及宣武崩帝夜即位受璽䇿於儀須兼太尉及吏部倉卒百官不具以顯兼吏部行事又顯未敗之前有嫗卜相於市言人吉凶頗驗時子曄已為郎聞之微服就嫗問已終至何官嫗言君今既有位矣不復更進當受父寃並如其語崔彧字文若清河東武城人也曾祖逞御史中丞祖禕父勲之大司馬外兵郎贈通直郎彧與兄相如俱自宋入魏相如以才學知名早卒彧少逢隠沙門教以素問甲乙遂善醫術中山王英子略嘗病王顯等不能療彧針之抽針即愈後位冀州别駕性仁恕見疹者喜與療之廣教門生令多救療其弟子清河趙約勃海郝文法之徒咸亦有名彧子景哲豪率亦以醫術知名仕魏太中大夫司徒長史景哲子冏字法峻幼好學汎覽經傳多伎藝尤工相術為司空參軍齊天保初為尚藥典御歴高陽太守太子家令武平中為散騎常侍假儀同三司從幸晉陽嘗謂中書侍郎李徳林曰比日看高相王以下文武官人相表俱盡其事口不忍言唯弟一人更應富貴當為他國不在本朝吾不及見也其精如此冏性㢘謹恭儉自修所得俸秩必分親故終鴻臚卿臨終誡其二子曰夫恭儉福之輿傲侈禍之機乗福輿者浸以康休蹈禍機者忽而傾覆汝其誡歟吾没後斂以時服祭無牢餼棺足周屍瘞不泄靈而已及卒長子修遵父命景哲弟景鳯字鸞叔位尚藥典御蒋少游樂安博昌人也慕容白曜之平東陽見俘入於平城充平齊户後配雲中為兵性機巧頗能畫刻有文思吟咏之際時有短篇遂留寄平城以傭寫書為業而名猶在鎮後被召為中書寫書生與高聰俱依高允允並薦之與聰俱補中書博士自在中書恒庇於李冲兄弟子姪之門始北方不悉青州蒋族或謂少游本非人士又少游微因工藝自逹是以公私人望不至相重唯高允李冲曲為體練孝文文明太后嘗因密宴謂百官曰本謂少游作師耳高允老公乃言其人士然猶驟被引命以規矩刻繢為務因此大䝉恩賜而位亦不遷陟也及詔尚書李冲與馬誕游明根高閭等議定衣冠於禁中少游巧思令主其事亦訪於劉昶二意相乖時致諍競積六載乃成班賜百官冠服之成少游有効焉後於平城将營太廟太極殿遣少游乗傳詣洛量凖魏晉基趾後為散騎侍郎副李彪使江南孝文修船乗以其多有思力除都水使者遷兼将作大匠仍領都水池湖泛戲舟檝之具及華林殿詔修舊增新改作金墉金樓皆所措意號為妍美雖有文藻而不得申其才用恒以剞劂繩尺碎劇怱怱徙倚園河城殿之側識者為之歎慨而乃坦爾為己任不告疲恥又兼太常少卿都水如故卒贈龍驤将軍青州刺史諡曰質有文集十卷餘少游又為太極模範與董爾王遇等參建之皆未成而卒初文成時郭善明甚機巧北京宫殿多其製作孝文時青州刺史侯文和亦以巧聞為要舟水中立射滑稽多智辭說無端尤善淺俗委巷之語至可翫笑位樂陵濟南二郡太守宣武孝明時豫州人柳儉殿中将軍關文備郭安興並機巧洛中製永寧寺九層佛圖安興為匠也始孝文時有范寗兒者善圍碁曾與李彪使齊齊令江南上品王抗與寗兒制勝而還又有浮陽高光宗善摴蒱趙國李幼序洛陽邱何奴並工握槊此葢胡戲近入中國云胡王有弟一人遇罪将殺之弟從獄中為此戲以上之意言孤則易死也宣武以後大盛於時北齊由吾道榮琅邪沭陽人也少為道士入長白山泰山又遊燕趙間聞晉陽有人大明法術乃尋之是人為人家傭力無名者久求訪始得其人道家符水禁呪隂陽歴數天文藥性無不通觧以道榮好尚乃悉授之歳餘是人謂道榮云我本恒岳仙人有少罪過為天官所謫今限滿将歸卿宜送吾至汾水及至汾河遇水暴長橋壞船渡艱難是人乃臨水禹歩以一符投水中流便絶俄頃水積将至天是人徐自沙石上渡唯道榮見其如是傍人咸云水如此長此人遂能浮過共驚異之如此法道榮所不得也道榮仍歸本郡隠於琅邪山中辟榖餌松术茯苓求長生之祕又善洞視蕭軌等之敗於江南其日道榮言之如目見其後鄉人從役得歸者勘問敗時形勢與道榮所說符同尋為文宣追往晉陽道榮恒野宿不入逆旅至遼陽山中夜初馬驚有猛獸去馬止十餘歩所追人及防援者並驚怖将走道榮徐以杖畫地成火坑猛獸遽走道榮至晉陽文宣見之甚悅後歸鄉里隋開皇初備禮徴辟授上儀同三司諫議大夫沭陽縣公從晉王平陳還苦辭歸至鄉卒年八十五又有張逺遊者文宣時令與諸術士合九轉金丹及成帝置之玉匣云我貪人間作樂不能飛上天待臨死時取服王春河東安邑人也少精易占明隂陽風角神武引為館客韓陵之戰四靣受敵從寅至午三合三離将士皆懼神武将退軍春叩馬諫曰比至未時必當大㨗遽縳其子詣軍門為質若不勝請斬之賊果大敗後從征討恒令占卜其言多中位東徐州刺史賜爵安夷縣公卒贈秦州刺史信都芳字玉琳河間人也少學算術兼有巧思每精心研究或墜坑坎常語人云算歴元妙機巧精微我每一沉思不聞雷霆之聲也其用心如此後為安豐王延明召入賓館有江南人祖暅者先於邊境被獲在延明家舊明厯算而不為王所待芳諫王禮遇之暅後還留諸法授芳由是彌復精密延明家有羣書欲抄集五經算事為五經宗及古今樂事為樂書又聚渾天欹器地動銅烏漏刻候風諸巧事并圖畫為器凖並令芳算之會延明南奔芳乃自撰注後隠於并州樂平之東山太守慕容保樂聞而召之芳不得已而見焉於是保樂弟紹宗薦之於神武為館客授中外府田曹參軍芳性清儉質樸不與物和紹宗給其羸馬不肯乗騎夜遣婢侍以試之芳忿呼毆擊不聽近已狷介自守無求於物後亦注重差勾股復撰史宗芳精專不已又多所闚渉丞相倉曹祖班謂芳曰律管吹灰術甚微妙絶來既久吾思所不至卿試思之芳留意十數日便報班云吾得之矣然終須河内葭莩灰祖對試之無驗後得河内灰用術應節使飛餘灰即不動也為時所重竟不行用故此法遂絶又著樂書遁甲經四術周髀宗其序曰漢成帝時學者問葢天揚雄曰葢哉未幾也問渾天曰洛下閎為之鮮于妄人度之耿中丞象之幾乎莫之息矣此言葢差而渾密也葢器測景而造用之日久不同於祖故云未幾也渾器量天而作乾坤大象隠見難變故云幾乎是時太史令尹咸窮研晷葢易古周法雄乃見之以為難也自昔周公定景王城至漢朝葢器一改焉渾天覆觀以靈憲為文葢天仰觀以周髀為法覆仰雖殊大歸是一古之人制者所表天效元象芳以渾算精微術機萬首故約本為之省要凡述二篇合六法名四術周髀宗又上黨李業興撰新厯自以為長於起故何承天祖冲之三家芳難業興五十事又私撰厯書名曰靈憲厯算月頻大頻小食必以朔證據甚甄明每云何承天亦為此法而不能精靈憲若成必當百代無異議者書未成而卒宋景業廣宗人也明周易為隂陽緯候之學兼明厯數魏武定初任北平太守文宣作相在晉陽景業因高徳政上言易稽覽圖曰鼎五月聖人君天與延年齒東北水中庶人王高得之謹案東北水謂勃海也高得之明高氏得天下也時魏武定八年三月也高徳政徐之才並勸文宣應天受禪乃之鄴至平城都諸大臣沮計将還賀拔仁等又云宋景業誤王宜斬之以謝天下帝曰宋景業當為帝王師何可殺也還至并州文宣令景業筮遇乾之鼎景業曰乾君也天也易曰時乗六龍以御天鼎五月卦也宜以仲夏吉辰順天受禪或曰隂陽書五月不可入官犯之卒於其位景業曰此乃大吉王為天子無復下期豈得不終於其位帝大悅天保初封長城縣子受詔撰天保歴李廣為之序許遵高陽新城人也明易善筮兼曉天文風角占相逆刺其驗若神神武引為館客自言禄命不富貴不横死是以任性踈誕多所犯忤神武常容借之芒隂之役遵謂李業興曰賊為水陳我為火陳水勝火我必敗果如其言清河王岳以遵為開府記室岳後将救江陵遵曰此行必致後凶宜辭疾勿去岳曰勢不免去正當與君同行遵曰遵好與生人相隨不欲與死人同路岳彊給其馬以行至都尋䘮三臺初成文宣宴會尚書以上三日不出許惇妻李氏憂之以問遵遵曰明日當得三百疋絹李氏曰若然當奉三束遵曰不滿十疋既而皆如言文宣無道日甚遵語人曰多折算來吾筮此狂夫何時得死於是布算滿牀大言曰不出冬初我乃不見文宣以十月崩遵果以九月死子暉亦學術數遵謂曰汝聰明不及我不勞多學唯授以婦人産法豫言男女及産日無不中武成時以此數獲賞焉又有滎陽麴紹者亦善占候景欲試之使與郭生俱卜二伏牛何者先起卜得火兆郭生曰赤牛先起紹曰青牛先起景問其故郭生曰火色赤故知赤牛先起紹曰火将然烟先起烟上色青故知青牛起既而如紹言呉遵世字季緒勃海人也少學易入恒山忽見一老翁授之開心符遵世跪而吞之遂明占卜後出遊京洛以卜筮知名魏孝武帝之将即位使之筮遇否之萃曰先否後喜帝曰喜在何時遵世曰剛决柔剛春末夏初也又筮遇明夷之賁曰初登于天後入于地若能敬始慎終不失法度無憂入地矣終如其言後文襄引為大将軍府墨曹参軍從遊東山有雲起恐雨廢射戲使筮遇剥李業興云坤上艮下剥艮為山山出雲故知有雨遵世云坤為地土制水故知無雨文襄使崔暹書之云遵世若著賞絹十疋不著罰杖十業興若著無賞不著罰杖十業興曰同是著何獨無賞文襄曰遵世著會我意故賞也須臾雲散二人各受賞罰皇建中武成以丞相在鄴下居守自致猜疑甚懷憂懼謀起兵每宿輙令遵世筮遵世云自有大慶由是不决俄而趙郡王等奉太后令以遺詔追武成更令筮之遵世云比已作十餘卦其占自然有天下之徴及即位除中書舍人固辭老疾授中散大夫和士開封王妻元氏無子以側室長孫為妃令遵世筮遵世云此卦偶與占同乃出其占書云元氏無子長孫為妃士開喜於妙中於是起呌而舞遵世著易林雜占百餘卷後預尉遲迥亂死焉趙輔和清都臨漳人也少以明易善筮為神武館客神武崩於晉陽葬有日矣文襄令文宣與呉遵世等擇地頻卜不吉又至一所筮遇革咸云凶輔和少年最在衆人後進云革卦於天下人皆凶唯王家用之大吉革彖辭云湯武革命應天順人文宣遽登車顧云以此地為定即義平陵也有人父為刺史得書云疾是人詣館别託相知者筮遇泰筮者云此卦甚吉是人出後輔和謂筮者云泰乾下坤上則父入土矣豈得言吉果凶問至有人父疾託輔和筮遇乾之晉慰諭令去後告人云乾之遊魂乾為天為父父變為魂而升於天能無死乎亦如其言太寧武平中筮後宫誕男女及時日多中遂至通直常侍入周亦為儀同隋開皇中卒皇甫玉不知何許人也善相人文襄之自潁川歸文宣從後玉於傍縱觀謂人曰大将軍不作物指文宣曰會道北垂鼻漢者及文宣即位試玉相術故以帛巾祙其眼使歴摸諸人至文宣曰此最大逹官於任城王曰當至丞相於常山長廣二王並曰亦貴至石動桶曰此弄癡久至二供膳曰正得好飲食而已玉嘗為高歸彦相曰位極人臣但莫反歸彦曰我何為反玉曰公有反骨孝昭賜趙郡王十死不問王喜曰皇甫玉相臣云當惡死今復何慮帝以玉輙為諸王相心不平之玉謂其妻曰殿上者不過二年妻以告舍人斛斯洪慶妻洪慶以啟帝怒曰向婦女小兒評論萬乗主敕召玉玉每照鏡自言兵死及被召謂妻曰我今去不廻若過日午時當得活既至正中遂斬之文襄時有呉士雙盲妙於聲文襄歴試之聞劉桃枝聲曰有所繫屬然當大富貴王侯将相多死其手譬如鷹犬為人所使聞趙道徳聲曰亦繫屬人富貴翕赫不及前人聞侯吕芬聲與道徳相似聞太原公聲曰當為人主聞文襄聲不動崔暹私掐之乃謬言亦國主也文襄以為我家羣奴猶極貴况吾身也又時有御史賈子儒能相人崔暹嘗将子儒私視文襄子儒曰人有七尺之形不如一尺之靣一尺之靣不如一寸之眼大将軍臉薄眄速非帝王相也竟如言齊代善相者有館客趙瓊其婦叔寄弓弓已轉在人處盡知之時人疑其别有假託不然則姑布子卿不如也初魏正始前有沙門學相遊懷朔舉目見人皆有富貴之表以為必無此理燔其書而後皆如言乃知相法不虛也觧法選河内人也少明相術又受易於權會筮亦頗工陳郡袁叔徳時以太子庶子出行博陵太守不願之官以親老言於執政楊愔愔語云既非正除尋當遣代叔徳意欲留尊累在京令法選占云不踰三年得代終不還也勸其盡家而行又為叔徳相云公邑邑終為吏部尚書鍳照人物後皆如言又頻為和士開相中士開牒為開府行參軍魏寧鉅鹿人也以善推禄命徴為館客武成以已生年月託為異人問之寧曰極富貴今年入墓武成驚曰是我寧變辭曰若帝王自有法又有陽子術語人曰謡言盧十六雉十四犍子相頭三十二且四八天之大數太上之祚恐不過此既而武成崩年三十二綦毋懷文不知何許人也以道術事神武武定初神武與西師戰於芒山時軍中旗幟盡赤西軍盡黑懷文曰赤火色黑水色水能滅火不宜以赤對黑土勝水宜改為黄神武遂改為赭黄所謂河陽幡者也懷文造宿鐵刀其法燒生鐵精以重柔鋌數宿則成剛以柔鐵為刀脊浴以五牲之溺淬以五牲之脂斬甲過三十札今襄國冶家所鑄宿柔鋌是其遺法作刀猶甚快利但不能頓截三十札也懷文又云廣平郡南幹子城是干将鑄劔處其土可瑩刀每云昔在晉陽為監館館中有一蠕蠕客同館胡沙門指語懷文云此人别有異算術仍指庭中一棗樹云令其布算子即知其實數乃試之并辯若干純赤若干赤白相半於是剥數之唯少一子算者曰必不少但更撼之果落一實懷文位信州刺史又有孫正言謂人曰我昔聞曹普演有言高王諸兒阿保當為天子至高徳之承之當滅阿保謂天保也徳之謂徳昌也滅年號承光即承之矣張子信河内人也頗渉文學少以醫術知名恒隠白鹿山時出游京邑甚為魏收崔季舒所重大寧中徴為尚藥典御武平初又以太中大夫徴之聽其所志還山又善易筮及風角之術武衛奚永洛與子信對坐有鵲鳴庭樹鬭而墮焉子信曰不善向夕當有風從西南來歴此樹拂堂角則有口舌事今夜有人喚必不可徃雖勑亦以病辭子信去後果有風如其言是夜琅邪王五使切召永洛且云勑喚永洛欲起其妻苦留之稱墜馬腰折不堪動詰朝而難作子信齊亡卒陸法和不知何許人也隠於江陵百里洲衣食居處一與戒行沙門同耆老自幼見之容色常定人莫能測也或謂出自嵩高遍游遐邇既入荆州汶陽郡高要縣之紫石山無故捨所居山俄有蠻賊文道期之亂時人以為豫見萌兆及侯景始告降於梁法和謂南郡朱元英曰貧道共檀越擊侯景去元英曰侯景為國立効師云擊之何也法和曰正自如此及景度江法和時在青谿山元英往問曰景今圍城其事云何法和曰凡人取果宜待熟時固問之曰亦克亦不克景遣将任約擊梁湘東王於江陵法和乃詣湘東乞征約召諸蠻弟子八百人在江津二日便發湘東遣胡僧祐領千餘人與同行法和登艦大笑曰無量兵馬江陵多神祠人俗恒所祈禱自法和軍出無復一驗人以為神皆從行故也至赤沙湖與約相對法和乗輕船不介胄沿流而下去約軍一里乃還謂将士曰聊觀彼龍睡不動吾軍之龍甚自踊躍即攻之若得彼明日當不損客主一人而破賊然有惡處遂縱火船而逆風不便法和執白羽扇麾風風即返約衆皆見梁兵步於水上於是大潰皆投水約逃竄不知所之法和曰明日午時當得及期而未得人問之法和曰吾前於此洲水乾時建一刹語檀越等此雖為刹實是賊標今何不向標下求賊也如其言果於水中見約抱刹仰頭裁出鼻遂禽之約言求就師目前死法和曰檀越有相必不兵死且於王有縁决無他慮王於後當得檀越力耳湘東果釋用為郡守及魏圍江陵約以兵赴救力戰焉法和既平約徃進見王僧辯於巴陵謂曰貧道已却侯景一臂其更何能為檀越宜即逐取乃還謂湘東王曰侯景自然平矣無足可慮蜀賊将至法和請守巫峽待之乃總諸軍而往親運石以填江三日水遂不流横之以鐵鎻武陵王紀果遣蜀兵來至峽口勢蹙進退不可王琳與法和經略一戰而殄之軍次白帝謂人曰諸葛孔明可謂為名将吾自見之此城旁有其埋弩箭鏃一斛許因挿表令掘之如其言又嘗至襄陽城北大樹下畫地方二尺令弟子掘之得一龜長尺半以杖叩之曰汝欲出不能得已數百歳不逢我者豈見天日乎為授三歸龜乃入草初八疊山多惡疾人法和為采藥療之不過三服皆差即求為弟子山中多毒蟲猛獸法和授其禁戒不復噬螫所泊江湖必於峯側結表云此處放生漁者皆無所得才或少獲輙有大風雷船人懼而放之風雨乃定晚雖将兵猶禁諸軍漁捕有竊違者中夜猛獸必來欲噬之或亡其船䌫有小弟子戲截蛇頭來詣法和法和曰汝何意殺因指以示之弟子乃見蛇頭齚袴襠而不落法和使懴悔為蛇作功徳又有人以牛試刀一下而頭斷來詣法和法和曰有一斷頭牛就卿徴命殊急若不為作功徳一月内報至其人弗信少日果死法和又為人置宅圖墓以避禍求福嘗謂人曰勿繫馬於碓其人行過鄉曲門側有碓因繫馬於其柱入門中憶法和戒走出将觧之馬已斃矣梁元帝以法和為都督郢州刺史封江乗縣公法和不稱臣其啓文朱印名上自稱居士後稱司徒梁元帝謂其僕射王襃曰我未嘗有意用陸為三公而自稱何也襃曰彼既以道術自命容是先知梁元以法和功業稍重遂就加司徒都督刺史如故部曲數千人通呼為弟子唯以道術為化不以法獄加人又列肆之所不立市丞牧佐之法無人領受但以空檻籥在道間上開一孔以受錢賈客店人隨貨多少計其估限自委檻中所掌之司夕方開取條其孔目輸之於庫又法和平常言若不出口時有所論則雄辯無敵然猶帯蠻音善為攻戰具在江夏大聚兵艦欲襲襄陽而入武關梁元帝使止之法和曰法和是求佛之人尚不希釋梵天王坐處豈規王位但於空王佛所與主上有香火因縁見主上應有報至故救援耳今既被疑是業定不可改也於是設供食具大䭔薄餅及魏舉兵法和自郢入漢口将赴江陵梁元帝使人逆之曰此自能破賊師但鎮郢州不湏動也法和乃還州堊其城門著麤白布衫袴布邪巾大繩束腰坐葦席終日乃脱之及聞梁元敗滅復取前凶服著之哭泣受弔梁人入魏果見䭔餅焉法和始於百里洲造壽王寺既架佛殿更截梁柱曰後四十許年佛法當遭雷雹此寺幽僻可以免難及魏平荆州宫室焚盡總管欲發取壽王佛殿嫌其材短乃停後周氏滅佛法此寺隔在陳境故不及難天保六年春清河王岳進軍臨江法和舉州來附文宣以法和為大都督十州諸軍事太尉公西南大都督五州諸軍事荆州刺史安湘郡公宋莅為郢州刺史官爵如故莅弟簉為散騎常侍儀同三司湘州刺史義興縣公梁将侯瑱來逼江夏諸軍棄城而退法和與宋莅兄弟入朝文宣聞其有竒術虛心想見之備三公鹵簿於城南十二里供帳以待之法和遥見鄴城下馬禹步辛術謂曰公既萬里歸誠主上虛心相待何作此術法和手持香鑪步從路車至於館明日引見給通幰油絡網車仗身百人詣闕通名不稱官爵不稱臣但云荆山居士文宣宴法和及其徒屬於昭陽殿賜法和錢百萬物萬叚甲第一區田一百頃奴婢二百人生資什物稱是宋莅千叚其餘儀同刺史以下各有差法和所得奴婢盡免之曰各隨縁去錢帛散施一日便盡以官所賜宅營佛寺自居一房與凡人無異三年間再為太尉世猶謂之居士無疾而告弟子死期至時燒香禮佛坐繩牀而終浴訖将殮屍小縮止三尺許文宣令開棺而視之空棺而已法和書其所居屋壁而塗之及剥落有文曰十年天子為尚可百日天子急如火周年天子遞代坐又曰一母生三天兩天共五年説者以為婁太后生三天子自孝昭即位至武成傳位後主共五年焉法和在荆郢有少姬年可二十餘自稱越姥身披法服不肯嫁娶恒隨法和東西或與其私通十有餘年今者賜棄别更他淫有司考驗並實越姥因爾改適生子數人馬嗣明河内野王人也少博綜經方為人診脉一年前知其生死邢邵唯一子大寳甚聰慧年十七八患傷寒嗣明為其診脉退告楊愔云邢公子傷寒不療自差然脉候不出一年便死覺之少晚不可復療數日後楊邢並侍宴内殿文宣云邢子才兒大不惡我欲乞其隨近一郡楊以年少未合剖符宴罷奏云馬嗣明稱大寳脉惡一年内恐死若其出郡醫藥難求遂寢大寶未期而卒楊愔患背腫嗣明以練石塗之便差因此大為楊愔所重作練石法以麤黄色石如鵝鴨卵大猛火燒令赤内淳醋中自有石屑落醋裏頻燒至石盡取石屑曝乾搗下簁和醋以塗腫上無不愈武平中為通直散騎常侍針灸孔穴往往與明堂不同嘗有一家二奴俱患身體遍青漸虛羸不能食訪諸醫無識者嗣明為灸兩足趺上各三七壮便愈武平末從駕往晉陽至遼陽山中數處見牓云有人家女病若能差之者購錢十萬又諸名醫多尋牓至是人家問疾状俱不下手唯嗣明為之療問其病由云曾以手持一麥穗即見一赤物長二尺許似蛇入其手指中因驚倒地即覺手臂疼腫月餘日漸及半身胑節俱腫痛不可忍呻吟晝夜不絶嗣明即為處方令馳馬徃都市藥示其節度前後服十劑湯一劑散比嗣明明年從駕還此女平復如故嗣明藝術精妙多如是隋開皇中卒於太子藥藏監然性自矜大輕諸醫人自徐之才崔叔鸞以還俱為其所輕後周蒋昇字鳳起楚國平河人也少好天文元象之學文帝雅信待之魏大統三年東魏竇泰頓軍潼關文帝出師馬牧澤時西南有黄紫氣抱日從未至酉文帝謂昇曰此何祥也昇曰西南未地主土土王四季秦分今大軍既出喜氣下臨必有大慶於是與泰戰禽之自後遂降河東克𢎞農破沙苑由此愈被親禮九年高仲密以北豫州來附文帝欲遣兵援之昇曰春王在東熒惑又在井鬼分行軍非便文帝不從軍至芒山不利而還太師賀拔勝怒曰蒋昇罪合萬死文帝曰蒋昇固諫曰師出不利此敗也孤自取之魏㳟帝元年以前後功授車騎大将軍儀同三司封高城縣子後除太中大夫以年老請致事詔許之加定州刺史卒於家强練不知何許人也亦不知其名字先是李順興語黙不恒好言未然之事當時號為李練世人以强類之故亦呼為練焉容貌長壮有異於人神情敞怳莫之能測意欲有所説逢人輙言若值其不欲言縱苦加祈請不相酬答初聞其言畧不可觧事過後往往有驗恒寄住諸佛寺好行人家兼歴造王公邸第所至人皆敬信之晉公䕶未誅前練曾手持一瓠到䕶第門外抵破曰瓠破子苦時柱國平高公侯伏龍恩深被任委强練至龍恩宅呼其妻元氏及其妾媵并婢僕等並令連席而坐諸人以逼夫人苦辭不肯强練曰汝等一例人耳何有貴賤遂逼就坐未幾而䕶誅諸子並死龍恩亦伏法仍籍没其家建徳中每夜上街衢邊樹大哭釋迦牟尼佛或至申旦如此者累月聲甚哀苦俄而廢佛道二教大象末又以一無底囊歴長安市肆告乞市人爭以米麥遺之强練張囊受之隨即漏之於地人或問之强練曰但欲使諸人見盛空耳至隋開皇初果移都於龍首山城遂空廢後莫知其所終又有蜀郡衞元嵩者亦好言将來事葢江左寳誌之流天和中遂著詩預論周隋廢興及唐家受命並有徴驗尤不信釋教嘗上疏極論之姚僧垣字法衞呉興武康人呉太常信之八世孫也父菩提梁高平令嘗嬰疾􅐄歴年乃留心醫藥梁武帝召與討論方術言多㑹意由是頗禮之僧垣幼通洽居喪盡禮年二十四即傳家業仕梁為太醫正加文徳主帥梁武帝嘗因發熱服大黄僧垣曰大黄快藥至尊年高不宜輕用帝弗從遂至危篤太清元年轉鎮西湘東王府中記室參軍僧垣少好文史為學者所稱及梁簡文嗣位僧垣兼中書舍人梁元帝平侯景召僧垣赴荆州改授晉安王府諮議梁元帝嘗有心腹病諸醫皆請用平藥僧垣曰脉洪實宜用大黄元帝從之進湯訖果下宿食因而疾愈時初鑄錢一當十乃賜十萬貫實百萬也及魏軍克荆州僧垣猶侍梁元不離左右為軍人所止方泣涕而去尋而文帝遣使馳驛徴僧垣燕公于謹固留不遣謂使人曰吾年衰暮疾病嬰沈今得此人望與之偕老文帝以謹勲徳隆重乃止明年隨謹至長安武成元年授小畿伯下大夫金州刺史伊婁穆以疾還京請僧垣省疾乃云自腰至臍似有三縛兩脚緩縱不復自持僧垣即為處湯三劑穆初服一劑上縛即觧次服一劑中縛復觧又服一劑三縛即除而兩脚疼痺猶自攣弱更為合散一劑稍得屈申僧垣曰終待霜降此患當愈及至九月遂能起行大将軍襄樂公賀蘭隆先有氣疾加以小腫喘息奔急坐卧不安或有勸其服决命大散者其家疑未能决乃問僧垣僧垣曰意謂此患不與大散相當即為處方勸急使服便即氣通更服一劑諸患悉愈大将軍樂平公竇集暴感風疾精神瞀亂無所覺知醫先視者皆云已不可救僧垣後至曰困矣終當不死為合湯散所患即療大将軍永世公叱伏列椿苦痢積時而不損廢朝謁燕公謹嘗問僧垣曰樂平永世俱有痼疾意永世差輕對曰夫患有深淺時有危殺樂平雖困終當保全永世雖輕必不免死謹曰當在何時對曰不出四月果如其言謹歎異之天和六年遷遂伯中大夫建徳三年文宣太后寝疾醫巫雜説各有同異武帝引僧垣坐問之對曰臣準之常人竊以憂懼帝泣曰公既决之矣知復何言尋而太后崩其後復因召見乃授驃騎大将軍開府儀同三司勑停朝謁若非别勑不勞入見四年帝親戎東討至河隂遇疾口不能言瞼垂覆目不得視一足短縮又不得行僧垣以為諸藏俱病不可並療軍中之要莫過於語乃處方進藥帝遂得言次又療目目疾便愈末及足足疾亦瘳比至華州帝已痊復即除華州刺史仍詔隨駕入京不令在鎮宣政元年表請致仕優詔許之是歳帝幸雲陽遂寝疾乃召僧垣赴行在所内史柳昻私問曰至尊脉候何如對曰天子上應天心或當非愚所及若凡庶如此萬無一全尋而帝崩宣帝初在東宫常苦心痛乃令僧垣療之其疾即愈及即位恩禮彌隆謂曰嘗聞先帝呼公為姚公有之乎對曰臣曲荷殊私實如聖㫖帝曰此是尚齒之辭非為貴爵之號朕當為公建國開家為子孫永業乃封長壽縣公册命之日又賜以金帶及衣服等大象二年除太醫下大夫帝尋有疾至于大漸僧垣宿直侍疾帝謂隋公曰今日性命唯委此人僧垣知帝必不全濟乃對曰臣但恐庸短不逮敢不盡心帝頷之及静帝嗣位遷上開府儀同大将軍隋開皇初進爵北絳郡公三年卒年八十五遺誡衣帢入棺朝服勿斂靈上唯置香奩每日設清水而已贈本官加荆湖二州刺史僧垣醫術高妙為當時所推前後效驗不可勝紀聲譽既盛逺聞邊服至於諸蕃外域咸請託之僧垣乃參校徴效者為集驗方十二卷又撰行記二卷行於世長子察南史有傳次子最字士㑹博通經史尤好著述年十九隨僧垣入關明帝盛聚學徒校書於麟趾殿最亦豫為學士俄授齊王憲府水曹參軍記室事特為憲所禮接最幼在江左迄于入關未習醫術天和中齊王憲奏遣最習之憲又謂最曰博學高才何如王襃庾信王庾名重兩國吾覩之蔑如接待資給非爾家比也勿不存心且天子有勑彌湏勉勵最於是始受家業十許年中畧盡其妙每有人告請效驗甚多隋文帝踐極除太子門大夫以父憂去官哀毁骨立既免䘮襲爵北絳郡公復為太子門大夫俄轉蜀王秀友秀鎮益州遷秀府司馬及平陳察至最自以非嫡讓封於察隋文帝許之秀後隂有異謀隋文帝令公卿窮其事開府慶整郝隆等並推過於秀最獨曰凡有不法皆最所為王實不知也榜訊數百卒無異辭竟坐誅論者義之撰梁後畧十卷行於世褚該字孝通河南陽翟人也父義昌梁鄱陽王中記室該幼而謹厚尤善醫術仕梁歴武陵王府參軍隨府西上後與蕭撝同歸周自許奭死後該稍為時人所重賓客迎候亞於姚僧垣天和初位縣伯下大夫進授車騎大将軍儀同三司該性淹和不自矜尚但有請之者皆為盡其藝術時論稱其長者後以疾卒子則亦傳其家業隋庾季才字叔弈新野人也八世祖滔隨晉元帝過江官至散騎常侍封遂昌侯因家于南郡江陵縣祖詵南史有傳父曼倩光禄卿季才幼頴悟八歳誦尚書十二通易好占天象居喪以孝聞梁湘東王繹引授外兵參軍西臺建累遷中書郎領太史封宜昌縣伯季才固辭太史梁元帝曰漢司馬遷厯世居掌魏高堂隆猶領此職卿何憚焉帝亦頗明星厯謂曰朕猶慮禍起蕭牆季才曰秦将入郢陛下宜留重臣作鎮荆陜還都以避其患帝初然之後與吏部尚書宗懔等議乃止俄而江陵覆滅周文一見深加優禮令參掌太史曰卿宜盡誠事孤當以富貴相答初荆土覆亡衣冠士人多沒為賤季才散所賜物購求親故周文問何能若此季才曰郢都覆敗君信有罪搢紳何咎皆為賤𨽻誠竊哀之故贖購耳周文乃悟曰微君遂失天下之望因出令免梁俘為奴婢者數千口武成二年與王襃庾信同補麟趾學士累遷稍伯大夫後宇文䕶執政問以天道徴祥對曰頃上台有變不利宰輔公宜歸政天子請老私門䕶沉吟久之曰吾本意如此但辭未獲免自是漸踈及䕶夷滅閱其書記有假託符命妄造異端者皆誅唯得季才兩紙盛言緯候宜免政歸權帝謂少宗伯斛斯徴曰季才甚得人臣之禮因賜粟帛遷太史中大夫詔撰靈臺祕苑封臨潁縣伯宣帝嗣位加驃騎大将軍開府儀同三司及高祖為丞相嘗夜召問天時人事季才曰天道精微難可悉察竊以人事卜之符兆已定季才縱言不可公得為箕潁事乎高祖黙然久之曰吾今譬騎虎誠不得下矣因賜以綵帛曰愧公此意大定元年正月季才上言今月戊戌平旦青氣如樓闕見國城上俄而變紫逆風西行氣經云天不能無雲而雨皇王不能無氣而立今王氣已見須即應之二月日出卯入酉居天之正位謂之二八之門日者人君之象人君正位宜用二月其月十三日甲子甲為六甲之始子為十二辰之初甲數九子數又九九為天數其日即是驚蟄陽氣壮發之時昔周武王以二月甲子定天下享年八百漢高帝以二月甲午即帝位享年四百故知甲子甲午為得天數今月甲子宜應天受命上從之開皇元年授通直散騎常侍帝将遷都夜與高熲蘇威二人定議季才旦奏臣仰觀元象俯察圖記龜兆允襲必有遷都且漢營此城經今将八百歳水皆鹹鹵不甚宜人願為遷徙計高祖愕然謂熲等曰是何神也遂發詔施行賜季才絹布及進爵為公謂曰朕自今已後信有天道於是令季才與其子質撰垂象地形等志謂曰天道祕奥推測多途執見不同不欲令外人干豫此事故令公父子共為之及書成奏之賜米帛甚優九年出為均州刺史時議以季才術藝相通有詔還委舊任以年老頻求去職優㫖每不許會張胄元厯行及袁充言日景長上以問季才因言充謬上大怒由是免職給半禄歸第所有祥異常令人就家訪焉仁壽三年卒季才局量寛𢎞術業優博篤於信義志好賓游常吉日良辰與琅邪王襃彭城劉榖河東裴政及宗人信等為文酒之㑹次有劉臻明克讓柳􅈯之徒雖後進亦從遊款撰靈臺祕苑一百二十卷垂象志一百四十二卷地形志八十七卷並行於世子質字行修早有志尚八歳誦梁元帝元覽言志等十賦拜童子郎累遷隴州司馬大業初授太史令操履貞懿立言忠鯁每有災異必指事靣陳煬帝多忌刻齊王暕亦被猜嫌質子儉時為齊王屬帝謂質曰汝不能一心事我乃使兒事齊王由是出為合水令八年帝親伐遼東徴至臨渝問東伐克不對曰伐之可克不願陛下親行帝作色曰朕今總兵至此豈可未見賊而自退質曰願安駕住此命将授規事宜在速緩必無功帝不悦曰汝既難行可住此也及師還授太史令九年復征高麗又問今叚何如對猶執前見帝怒曰我自行尚不能克遣人豈有成功帝遂行既而楊元感反斛斯政奔高麗帝大懼遂歸謂質曰卿前不許我行當為此耳今元感成乎質曰今天下一家未易可動帝曰熒惑入斗如何對曰斗楚分元感之封今火色衰謝終必無成十年帝自西京将徃東都質諌宜鎮撫關内使百姓歸農三五年令四海少豐然後廵省帝不悅質辭疾不從帝聞之怒遣馳傳鎻質詣行在所至東都下獄竟死獄中子儉亦傳父業兼有學識仕歴襄武令元徳太子學士齊王屬義寧初為太史令盧太翼字協昭河間人也本姓章仇氏七歳詣學日誦數千言州里號曰神童及長博綜羣書尤善占候算歴之術隠於白鹿山徙居林慮山茱萸澗受業者自逺而至初無所拒後憚其煩逃於五臺山地多藥物與弟子數人廬於巖下以為神仙可致太子勇聞而召之太翼知太子必不為嗣謂所親曰吾拘逼而來不知所稅駕也及太子廢坐法當死高祖惜其才配為官奴久乃釋其後目盲以手摸書而知其字仁壽末帝将避暑仁壽宫太翼固諫曰恐是行鑾輿不反帝大怒繫之長安獄期還斬之帝至宮寝疾臨崩命皇太子釋之及煬帝即位漢王諒反帝問之答曰何所能為未幾諒果敗帝從容言天下氏族謂太翼曰卿姓章仇四岳之胄與盧同源於是賜姓盧氏大業九年從駕至遼東太翼言黎陽有兵氣後數日而楊元感反書聞帝甚異之數加賞賜太翼所言天文之事不可稱數關諸祕密時莫能聞後數歳卒於雒陽耿詢字敦信丹陽人也滑稽辯給伎巧絶人陳後主時以客從東衡州刺史王勇於嶺南勇卒詢不歸會羣俚反叛推詢為主柱國王世積討禽之罪當誅自言有巧思世積釋之以為家奴久之見其故人高智寳以元象直太史詢從之受天文算術詢創意造渾天儀不假人力以水轉之施於闇室中使智寳外候天時動合符契世積知而奏之高祖配詢為官奴給太史局後賜蜀王秀從徃益州秀甚信之及秀廢復當誅何稠言耿詢之巧思若有神上於是特原其罪詢作馬上刻漏世稱其妙煬帝即位進欹器帝善之免其奴歳餘授右尚方署監事七年車駕東征詢上言曰遼東不可討師必無功帝大怒命左右斬之何稠苦諫得免及平壤之敗帝以詢言為中以詢守太史丞宇文化及弑逆之後從至黎陽謂其妻曰近觀人事逺察天文宇文必敗李氏當王吾知所歸矣謀欲去之為化及所殺著鳥情占一卷行於世來和字𢎞順京兆長安人也少好相術所言多驗周大冢宰宇文䕶引之左右累遷畿伯下大夫封洹水縣男高祖微時詣和曰公當王有四海及為丞相拜儀同既受禪進爵為子開皇末和上表自陳龍潛所言曰昔陛下在周與永富公竇榮定語臣曰我聞有行聲即識其人臣當時即言公眼如曙星無所不照當王有天下願忍誅殺建徳四年五月周武帝在雲陽宫謂臣曰諸公皆汝所識隋公相禄何如臣報武帝曰隋公止是守節人可鎮一方若為将領陣無不破臣即於宫東南奏聞陛下謂臣此語不忘明年烏丸軌言於武帝曰隋公非人臣帝尋以問臣臣知帝有疑臣詭報曰是節臣更無異相于時王誼梁彦光等知臣此語大象二年五月至尊從永巷東門入臣在永巷門東北靣立陛下問臣曰我得無災鄣不臣奏陛下曰公骨法氣色相應天命已有付屬未幾遂總百揆上覽之大悅進位開府和同郡韓則嘗詣和相和謂之後四五當得大官人初不知所謂則至開皇十五年五月終人問其故和曰十五年為三五加以五月為四五大官椁也和言多此類著相經三十卷道士張賔焦子順鴈門人董子華等此三人當文帝龍潛時並私謂帝曰公當為天子善自愛及踐位以賔為華州刺史子順為開府子華為上儀同蕭吉字文休梁武帝兄長沙宣武王懿之孫也博學多通尤精隂陽算術江陵覆亡歸于魏為儀同周宣帝時吉以朝政日亂上書切諫帝不納高祖受禪進上儀同以本官太常考定古今隂陽書吉性孤峭不與公卿相浮沉又與楊素不恊由是擯落鬱鬱不得志見上好徴祥之說欲乾没自進遂矯其迹為悦媚焉開皇十四年上書曰今年歳在甲寅十一月朔旦以辛酉為冬至來年乙卯正月朔旦以庚申為元日冬至之日即在朔旦樂汁圖徴云天元十一月朔旦冬至聖王受享祚今聖主在位居天元之首而朔旦冬至此慶一也辛酉之日即至尊本命辛徳在丙此十一月建丙子酉徳在寅正月建寅為本命與月合徳而居元朔之首此慶二也庚申之日即是行年乙徳在庚卯徳在申來年乙卯是行年與歳徳合而在元旦之朝此慶三也隂陽書云年命與歳月合徳者必有福慶洪範傳云歳之朝月之朝日之朝主王者經書並謂三長應之者延年福吉况乃甲寅蔀首十一月陽之始朔旦冬至是聖王上元正月是正陽之月歳之首月之先朔旦是歳之元月之朝日之先嘉辰之會而本命為九元之先行年為三長之首並與歳月合徳所以靈寳經云角音龍精其祚曰彊來歳年命納音俱角厯之與經合符契又甲寅乙卯天地合也甲寅之年以辛酉冬至來年乙卯以甲子夏至冬至陽始郊天之日即是至尊本命此慶四也夏至隂始祀地之辰即是皇后本命此慶五也至尊徳並乾之覆育皇后仁同地之載養所以二儀元氣並會本辰上覽之悅賜物五百叚房陵王時為太子言東宫多鬼魅䑕妖數見上令吉詣東宫禳邪氣於宣慈殿設神坐有回風從艮地鬼門來埽太子坐吉以桃湯葦火驅逐之風出宫門而止謝土於未地設壇為四門置五帝坐于時寒有蝦蟆從西門來入人門升赤帝坐還從人門而出行數步忽然不見上大異之賞賜優洽又上言太子當不安位時上隂欲廢立得其言是之由此每被顧問及獻皇后崩上令吉卜擇葬所吉歴筮山原至一處云卜年二千卜世二百具圖而奏之上曰吉凶由人不在於地高緯父𦵏豈不卜乎國尋滅亡正如我家墓田若云不吉朕不當為天子若云不凶我弟不當戰没然竟從吉言表曰去月十六日皇后山陵西北鷄未鳴前有黑雲方圓五六百步從地屬天東南又有旌旗車馬帳幕布滿七八里并有人徃來檢校部伍甚整日出乃滅同見者十餘人謹案𦵏書云氣王與姓相生大吉今黑氣當冬王與姓相生是大吉利子孫無疆之候也上大悅其後上将親臨發殯吉復奏曰至尊本命辛酉今歳斗魁及天罡臨卯酉謹案隂陽書不得臨喪上不納退而告族人蕭平仲曰皇太子遣宇文左率深謝余云公前稱我當為太子竟有驗終不忘也今卜山陵務令我早立我立之後當以富貴相報吾記之曰後四載太子御天下今山陵氣應上又臨䘮兆益見矣且太子得政隋其亡乎當有真人出矣吾前紿云卜年二千者是三十字也卜世二百者取世二運也吾言信矣汝其誌之及煬帝嗣位拜太府少卿加位開府嘗行經華隂見楊素冢上有白氣屬天密言於帝帝問其故吉曰其候素家當有兵禍滅門之象改𦵏者庶可免乎帝後從容謂楊元感曰公宜早改𦵏元感亦微知其故以為吉祥託以遼東未滅不遑私門之事未幾而元感以反族滅帝彌信之後歳餘卒官著金海三十卷相經要録一卷宅經八卷𦵏經六卷樂譜二十卷及帝王養生方二卷相手版要訣一卷太一立成一卷並行於時楊伯醜馮翊武鄉人也好讀易隠於華山開皇初徴入朝見公卿不為禮無貴賤皆汝之人不能測也高祖召與語竟無所答賜衣服至朝堂捨之而去於是被髮陽狂游行市里形體垢穢未嘗櫛沐時有張永樂者賣卜京師伯醜每從之游永樂為卦有不能决者伯醜輙為分析爻象尋幽入微永樂嗟服自以為非所及也伯醜亦開肆賣卜有人嘗失子就伯醜筮者卦成伯醜曰汝子在懷逺坊南門東道北壁上有青裙女子抱之可徃取也如言果得或有金數兩夫妻共藏之於後失金其夫意妻有異志将逐之其妻稱寃以詣伯醜伯醜為筮之曰金在矣悉呼其家人指一人曰可就取果得之又将軍許知常問吉凶伯醜曰汝勿東北行必不得已當速還不然者楊素斬汝頭未幾上令知常事漢王諒俄而上崩諒舉兵反知常逃歸京師知常先與楊素有隙及素平并州先訪知常将斬之頼此獲免又有人失馬來詣伯醜卜者時伯醜為皇太子所召在途遇之立為作卦卦成曰我不遑為卿説且向西市東壁門南第三店為我買魚作鱠當得馬矣其人如教湏臾有一人牽所失馬而至遂禽之崖州嘗獻徑寸珠其使者隂易之上心疑焉召伯醜令筮伯醜曰有物出自水中質圓而色光是大珠也今為人所隠具言隠者姓名容状上如言薄責之果得本珠上竒之賜帛二十疋國子祭酒何妥嘗詣之論易聞妥之言倐爾而笑曰何用鄭元王弼之言乎久之微有辭答所説辭義皆異先儒之㫖而思理元妙故論者以為天然獨得非常人所及也竟以壽終臨孝恭京兆人也明天文算術高祖甚親遇之每言災祥之事未嘗不中上因令考定隂陽書官至上儀同著欹器圖三卷地動銅儀經一卷九宫五墓一卷遁甲録十卷元辰經十卷元辰厄百九卷百怪書十八卷禄命書二十卷九宫龜經一百一十卷太一式經三十卷孔子馬頭易卜書一卷並行於世劉祐滎陽人也開皇初為大都督封索盧縣公其所占候合如符契文帝甚親之初與張賓劉輝馬顯定歴後奉詔撰兵書十卷名曰金韜上善之復著隂策二十卷觀臺飛候六卷元象要記五卷律厯術文一卷婚姻志三卷産乳志二卷式經四卷四時立成法一卷安厯志十二卷歸正易十卷並行於世張胄元渤海蓨人也博學多通尤精術數冀州刺史趙煚薦之高祖徴授雲騎尉直太史令參議律厯事時軰多出其下由是太史令劉暉等甚忌之然暉言多不中冑元所推步甚精密上異之令楊素與術士數人立議六十一事皆舊法久難通者令暉與胄元等辯析之暉杜口一無所答胄元通者五十四焉由是擢拜員外散騎侍郎兼太史令賜物千叚暉及黨與八人皆斥逐之改定新厯言前厯差一日内史通事顔慜楚上言曰漢時洛下閎改顓頊厯作太初厯云後當差一日八百年當有聖者定之計今相去七百一十年術者舉其成數聖者之謂其在今乎上大悅漸見親用胄元所謂厯法與古不同者三事其一宋祖冲之於歳周之末創設差分冬至漸移不循舊軌每四十六年却差一度至梁虞􅒠厯法嫌冲之所差太多因以一百八十六年冬至移一度胄元以此二術年限縣隔追檢古注所失極多遂折中兩家以為度法冬至所宿歳别漸移八十三年却行一度則上合堯時日永星火次符漢厯宿起牛初明其前後並皆密當其二周馬顯造丙寅元厯有隂陽轉法加减章分進退蝕餘乃推定日創開此數當時術者多不能曉張賓因而用之莫能考正胄元以為加時先後逐氣參差就月為斷於理未可乃因二十四氣列其盈縮所出實由日行遲則月逐日易及令合朔加時早日行速則月逐日少遲令合朔加時晚檢前代加時早晚以為損益之率日行自秋分已後至春分其勢速計一百八十二日而行一百八十度自春分已後至秋分日行遲計一百八十二日而行一百七十六度每氣之下即其率也其三自古諸厯朔望逢交不問内外入限便蝕張賓立法創有外限應蝕不蝕猶未能明胄元以日行黄道歳一周天月行月道二十七日有餘一周天月道交絡黄道每行黄道内十三日有竒而出又行道外十三日有竒而入終而復始月經黄道謂之交朔望去交前後各五度以下即為當蝕若月行内道則在黄道之北蝕多有驗月行外道在黄道之南也雖遇正交無由掩映蝕多不驗遂因前法别立定限隨交逺近逐氣求差損益蝕分事皆明著其超古獨異者有七事其一古厯五星行度皆守恒率見伏盈縮悉無格凖胄元候之各得真率合見之數與古不同其差多者至加减三十許日即如熒惑平晨見在雨水氣即均加二十九日見在小雪氣則均减二十五日加减平見以為定見諸星各有盈縮之數皆如此例但差數不同特其積候所知時人不能原其㫖其二辰星舊率一終再見凡諸古厯皆以為然應見不見人未能測胄元積候知辰星一終之中有時一見及同類感召相隨而出即如辰星平晨見在雨水者應見即不見若平晨見在啓蟄者去日十八度外三十六度内晨有木火土金一星者亦相隨見其三古厯步術行有定限自見已後依率而推進退之期莫知多少胄元積候知五星遲速留退真數皆與古法不同多者差八十餘日留回所在亦差八十餘度即如熒惑前疾初見在立冬初則二百五十日行一百七十七度定見夏至初則一百七十日行九十二度追步天驗今古皆密其四古厯食分依平即用推驗多少實數罕符胄元積候知月從木火土金四星行有向背月向四星即速背之則遲皆十五度外及循本率遂於交分限其多少其五古歴加時朔望同術胄元積候知日蝕所在隨方改變傍正高下每處不同交有淺深遲速亦異約時立差皆㑹天象其六古厯交分即為蝕數去交十四度者食一分去交十三度食二分去交十度食三分每近一度食益一分當交即蝕既其應多少自古諸厯未悉其原胄元積候知當交之中月掩日不能畢盡故其蝕反少去交五六時月在日内掩日便盡故其蝕乃既自此以後更逺者其蝕又少交之前後在冬至皆爾若近夏至其率又差胄元所立蝕分最為詳密其七古厯二分晝夜皆等胄元積候知其有差春秋二分畫多夜漏半刻皆由日行遲疾盈縮使其然也凡此胄元獨得於心論者服其精術大業中卒于官許智藏高陽人也祖道幼常以母疾遂覽醫方因而究極時號名醫誡諸子曰為人子者嘗膳視藥不知方術豈謂孝乎由是遂世相傳授仕梁位員外散騎侍郎父景武陵王諮議參軍智藏少以醫術自逹仕陳為散騎常侍陳滅高祖以為員外散騎侍郎使詣揚州會秦王俊有疾上馳召之俊夜夣其亡妃崔氏泣曰本來相迎如聞許智藏将至其人若到當必相苦為之柰何明夜俊又夢崔氏曰妾得計矣當入靈府中以避之及智藏至為俊診脉曰疾已入心即當發癎不可救也果如言俊數月而薨上竒其妙賚物百叚煬帝即位智藏時致仕帝每有苦輙令中使就宅詢訪或以轝迎入殿扶登御牀智藏為方奏之用無不效卒於家年八十宗人許澄亦以醫術顯澄父奭仕梁為中軍長史随柳仲禮入長安與姚僧垣齊名拜上儀同三司澄有學識傳父業尤盡其妙歴位尚藥典御諫議大夫封賀川縣伯父子俱以藝術名重於周隋二代史失其事故附云萬寳常不知何許人也父大通從梁将王琳歸齊後謀還江南事泄伏誅由是寶常被配為樂户因妙逹鍾律遍工八音與人方食論及聲調時無樂器寶常因取前食器及雜物以箸扣之品其高下宫商畢備諧於絲竹大為時人所賞然歴周隋俱不得調開皇初沛國公鄭譯等定樂初為黄鍾調寳常雖為伶人譯等每召與議然言多不用後譯樂成奏之上召寶常問其可不寳常曰此亡國之音豈陛下所冝聞上不悅寶常因極言樂聲哀怨淫放非雅正之音請以水尺為律以調樂器其聲率下鄭譯調二律并撰樂譜六十四卷且論八音旋相為宫法改絃移柱之變為八十四調一百四十律變化終於一千八百聲時以周禮有旋宫之義自漢已來知音不能通見寶常特創其事皆哂之至是試令為之應手成曲無所疑滯見者莫不嗟異於是損益樂器不可勝紀其聲雅淡不為時人所好太常善聲者多排毁之又太子洗馬蘇䕫以鍾律自命尤忌寳常䕫父威方用事凡言樂者附之而短寳常數詣公卿怨望蘇威因詰寳常所為何所傳受有一沙門謂寳常曰上雅好符瑞有言徴祥者上皆悅之先生當言從胡僧受學云是佛家菩薩所傳音律則上必悅先生當言所為可以行矣寳常遂如其言以答威威怒曰胡僧所傳乃四夷之樂非中國宜行其事竟寝寶常聽太常所奏樂泫然泣曰樂聲淫厲而哀天下不久将盡時四海全盛聞言者皆謂不然大業之末其言卒騐寳常貧而無子其妻因其卧疾遂竊其資物而逃寳常竟餓死将死取其所著書焚之曰何用此為見者於火中探得數卷見行於世開皇中鄭譯何妥盧賁蘇䕫蕭吉並討論墳籍撰著樂書皆為當時所用至於天然識樂不及寳常逺矣安馬駒曹妙逹王長通郭令樂等能造曲為一時之妙又習鄭聲而寳常所為皆歸於雅此軰雖公議不附寳常然皆心服謂以為神時樂人王令言亦妙逹音律大業末煬帝将幸江都令言之子嘗於户外彈胡琵琶作翻調安公子曲令言時卧室中聞之驚起曰變變急呼其子曰此曲興自早晚其子曰頃來有之令言遂歔欷流涕謂其子曰汝慎無從行帝必不反子問其故令言曰此曲宫聲往而不反宫君也吾所以知之帝竟被弑於江都何稠字桂林西域人國子祭酒妥之從子也父通善琢玉稠年十餘遇江陵平隨妥入長安仕周御飾下士及高祖為丞相召補參軍兼掌細作署開皇中累遷太府丞稠博覽古圖多識舊物波斯嘗獻金線錦袍組織殊麗上命稠為之稠錦成踰所獻者上甚悅時中國久絶琉璃作匠人無敢措意稠以緑瓷為之與真不異尋加員外散騎侍郎開皇末桂州俚李光仕為亂詔稠募討之師次衡嶺遣使招其渠帥洞主莫崇觧兵降款桂州長史王文同鎻崇詣稠所稠詐宣言曰州縣不能綏養非崇之罪命釋之引共坐并從者四人為設酒食遣之大悅歸洞不設備稠至五更掩及其洞悉發俚兵以臨餘賊象州逆帥杜條遼羅州逆帥龐靖等相繼降款分遣建州開府梁昵討叛夷羅壽羅州刺史馮暄討賊帥李大檀並平之承制署首領為州縣官而還衆皆悅服有欽州刺史寗猛力帥衆迎軍初猛力欲圖為逆至是惶懼請身入朝稠以其疾篤示無猜貳放還州與約八九月詣京師相見稠還奏状上意不懌其年十月猛力卒上謂稠曰汝前不将猛力來今竟死矣稠曰猛力共臣約假令身死當遣子入侍越人性直其子必來初猛力臨終誡其子長真曰我與大使期不可失信於國士汝𦵏我訖即宜上路長真如言入朝上大悅曰何稠著信蠻夷乃至於此以勲授開府仁壽初文獻皇后崩稠與宇文愷參典山陵制度稠性少言善候上㫖由是漸見親昵上疾篤謂稠曰汝既曾𦵏皇后今我方死亦宜好安置囑此何益但不能忘懷耳魂而有知當相見於地下上因攬太子頸曰何稠用心我後事動静當共平章大業初煬帝将幸揚州勅稠討閲圖籍造輿服羽儀送至江都其日拜太府少卿稠於是營黄麾三萬六千人仗及車輿輦輅皇后鹵簿百官儀服依期而就送于江都所役工十萬餘人用金銀錢物巨億計帝使兵部侍郎胡雅選部郎薛邁等勾覆數年方竟毫釐無舛稠參㑹今古多所改創魏晉已來皮弁有纓而無笄導稠曰此古田獵服也今服以入朝宜變其制故弁施象牙簪導自稠始也又從省之服初無佩綬稠曰此乃晦朔小朝之服安有人臣謁帝而除去印綬兼無佩玉之節乎乃加獸頭小綬及佩一隻舊制五輅於轅上起箱天子與參乗同在箱内稠曰君臣同所過為相逼乃廣為盤輿别構欄楯侍臣立於其中於内復起湏彌平坐天子獨居其上自餘麾幢文物增損極多帝復令稠造戎車萬乗鈎陳八百連帝善之以稠守太府卿後兼領少府監遼東之役攝右屯衛将軍領御營弩手三萬人時工部尚書宇文愷造遼水橋不成師未得濟左屯衛大将軍麥鐵杖因而遇害帝遣稠造橋二日而就初稠制行殿及六合城至是帝於遼左與賊相對夜中施之其城周廻八里城及女垣合高十仭上布甲士立仗建旗四隅置闕靣列一觀觀下三門比明而畢高麗望見謂若神功稍加至右光禄大夫從幸江都遇宇文化及亂以為工部尚書及敗陷于竇建徳復為工部尚書舒國公建徳敗歸于唐授少府監卒又齊時有河間劉龍者性彊明有巧思齊後主令脩銅雀臺稱㫖因而歴職通顯及隋文帝踐阼大見親委位右衛将軍兼将作大匠遷都之始與高熲參掌制度世號為能大業中有南郡公黄亘及弟衮俱巧思絶人煬帝每令其兄弟直少府将作于時改創多務亘衮每參典其事凡有所為何稠先令亘衮立様當時工人莫有所損益亘位朝散大夫衮散騎侍郎通志卷一百八十三
