body:
  text: 通志卷二十宋右廸功郎鄭樵漁仲撰后妃傳第二晉宣穆張皇后景懐夏侯皇后景獻羊皇后文眀王皇后武元楊皇后武悼楊皇后左貴嬪胡貴嬪諸葛夫人恵賈皇后恵羊皇后謝夫人懐王皇太后元夏侯太妃元敬虞皇后荀豫章君眀穆庾皇后成恭杜皇后周太妃康獻禇皇后穆章何皇后哀靖王皇后廢帝孝庾皇后簡文宣鄭太后簡文順王皇后孝武文李太后孝武定王皇后安徳陳太后安僖王皇后恭思禇皇后宋孝穆趙皇后孝懿蕭皇后武敬臧皇后武帝張夫人文章胡太后少帝司馬皇后文元袁皇后潘淑妃孝武昭路太后眀宣沈太后孝武文穆王皇后宣貴妃前廢帝何皇后眀恭王皇后後廢帝陳太妃後廢帝江皇后順陳太妃順謝皇后齊宣孝陳皇后髙昭劉皇后武穆裴皇后韓蘭英文安王皇后鬰林王何妃海陵王王妃眀敬劉皇后東昬禇皇后和王皇后梁文獻張皇后武徳郗皇后武丁貴嬪文宣阮太后簡文王皇后元帝徐妃敬夏太后敬王皇后陳武宣章皇后文沈皇后廢帝王皇后宣柳皇后後主沈皇后張貴妃後魏神元竇皇后文帝封皇后桓惟皇后平文王皇后昭成慕容皇后獻眀賀皇后道武慕容皇后道武宣穆劉皇后眀元昭哀姚皇后眀元密杜皇后太武赫連皇后太武敬哀賀皇后景穆恭郁久閭皇后文成文眀馮皇后文成元李皇后獻文思李皇后孝文貞林皇后孝文廢馮皇后孝文幽馮皇后孝文昭髙皇后宣武順于皇后宣武髙皇后宣武靈胡皇后孝眀胡皇后孝武髙皇后文帝文乙弗皇后文帝悼郁久閭皇后廢帝宇文皇后恭帝若干皇后孝靜髙皇后北齊神武眀婁皇后蠕蠕公主郁久閭氏彭城爾朱太妃小爾朱氏上黨韓太妃馮翊鄭太妃髙陽游太妃馮娘李娘文襄敬元皇后琅邪公主文宣李皇后段昭儀王嬪薛嬪孝昭元皇后武成胡皇后𢎞徳李夫人後主斛律皇后後主胡皇后後主穆皇后馮淑妃後周文元皇后文宣叱奴皇后孝閔元皇后眀敬獨孤皇后武成阿史那皇后武李皇后宣楊皇后宣朱皇后宣陳皇后宣元皇后宣尉遲皇后靜司馬皇后隋文獻獨孤皇后宣華陳夫人容華蔡夫人煬愍蕭皇后晉六宫位號沿革尚矣惟帝祖母號太皇太后帝母號皇太后嫡妃號皇后秦以降不能易焉自夫人以下其稱謂之名與夫增損之數歴二漢及曹氏莫之或一晉武帝受禪採漢魏之制置貴嬪夫人貴人是為三夫人位視三公淑妃淑媛淑儀脩華脩容脩儀倢伃容華充華是為九嬪位視九卿其餘有美人才人中才人爵視千石以下南遷而後庶事倥􅘓有司庶府率從減省後宫内職未必皆仍其舊焉宋武代晉省二才人其餘悉用晉制案貴嬪魏文帝所制夫人魏武初建魏國所制貴人漢光武所制淑妃魏眀帝所制淑媛魏文帝所制淑儀脩華晉武帝所制脩容魏文帝所制脩儀魏眀帝所制倢伃容華前漢舊號充華晉武帝所制美人漢光武所制及孝武孝建三年省夫人置貴妃位比相國進貴嬪比丞相貴人比三司以為三夫人又置昭儀昭容昭華以代脩華脩儀脩容又置中才人充衣以為散位案昭儀漢元帝所制昭容孝武所制昭華魏眀帝所制中才人晉武帝所制充衣前漢舊制及眀帝泰始二年省淑妃昭華中才人充衣復置脩華脩儀脩容才人良人三年又省貴人置貴姬以備三夫人之數又置昭華增淑容承徽列榮以淑媛淑儀淑容昭華昭儀昭容脩華脩儀脩容為九嬪倢伃容華充華承徽列榮凡五職亞九嬪羙人才人良人三職為散役其後帝留心後房擬百官備置内職焉及齊髙帝建元元年有司奏置貴嬪夫人貴人為三夫人脩華脩儀脩容淑妃淑媛淑儀倢伃容華充華為九嬪羙人中才人才人為散職三年太子宫置三内職良娣比開國侯保林比五等侯才人比駙馬都尉及永眀元年有司奏貴妃淑妃並加金章紫綬佩于闐玉淑媛舊擬九棘以淑為温恭之稱妃為亞后之名進同貴妃以比三司夫人之號不殊蕃國降淑媛以比九卿七年復置昭容位在九嬪焉梁武撥亂反正深鑒奢逸配徳早終長秋曠位定令制貴妃貴嬪貴姬為三夫人淑媛淑儀淑容昭華昭儀昭容脩華脩儀脩容為九嬪倢伃容華充華承徽列榮為五職美人才人良人為三職東宫置良娣保林為二職及簡文元帝出自儲蕃或廹在拘縶或逼於冦亂且妃並先殂不建椒閫陳武光膺天歴以樸素自居故後宫貟位其數多闕文帝天嘉之後詔宫職備員其所制立無改梁舊編之令文以為後法然帝性恭儉嬪嬙不備宣帝後主無所改作焉今總綴緝起晉訖陳立此篇云宣穆張皇后諱春華河内平臯人也父汪魏粟邑令母河内山氏司徒濤之從祖姑也后少有徳行智識過人生景帝文帝平原王幹南陽公主宣帝初辭魏武之命託以風痺不能動止常暴書遇暴雨不覺自起收之家惟有一婢見之后恐事泄致禍遂手殺此婢以滅口而親自執爨帝由是大敬重之其後柏夫人有寵后罕得進見帝嘗卧疾后往省病帝曰老物可憎何煩出也后慙恚不食將自殺諸子見后不食亦皆不食帝驚而致謝后乃止帝退謂人曰老物不足惜誠慮困我好兒耳魏正始八年崩時年五十九𦵏洛陽髙原陵追贈廣平縣君咸熙元年追號宣穆妃及武帝受禪追贈為皇后景懐夏侯皇后諱徽字媛容沛國譙人也父尚魏征南大將軍母曹氏魏徳陽鄉主后雅有識度帝每有所為必豫籌畫魏眀帝世宣帝居上將之重諸子並有雄才大略后知帝非魏之純臣而后既魏氏之甥帝深忌之青龍二年遂以鴆崩時年二十四𦵏峻平陵武帝登阼初未及追崇𢎞訓太后每以為言泰始二年始加號諡后無男生五女景獻羊皇后諱徽瑜泰山南城人父衟上黨太守后母陳留蔡氏漢左中郎將邕之女也后聰敏有才行景懐皇后崩景帝更娶鎮北將軍濮陽吳質女見黜復納后無子武帝受禪居𢎞訓宫號𢎞訓太后泰始九年追贈蔡氏濟陽縣君諡曰穆咸寧四年太后崩時年六十五祔𦵏峻平陵文眀王皇后諱元姬東海郯人也父肅魏中領軍蘭陵侯后性聰慧年八歲誦詩論尤善喪服茍有文義目所一見必貫於心年九歲遇母疾扶侍不捨左右衣不解帯者久之每先意候指動中所適由是父母令攝家事每盡其理祖司徒朗甚愛異之曰興吾家者必此女也惜不為男矣年十二朗薨后哀戚哭泣發於自然其父益加敬異既笄歸於文帝生武帝及遼東悼王定國齊獻王攸城陽哀王兆廣漢殤王廣德京兆公主后事宣帝及穆后曲盡婦道謙冲接下嬪御有序及居父喪身不勝衣言與淚俱時鍾會以才能見任於文帝后每言於帝曰會見利忘義好為事端寵過必亂不可大任其後會果反后之眀見類如此武帝受禪尊為皇太后宫曰崇化初置宫卿重選其職以太常諸葛緒為衛尉太僕劉原為太僕宗正曹楷為少府后雖受尊位不忘素業躬執紡績器服無文御浣濯之衣食不參味而敦睦九族垂心萬物言必典禮浸潤不行帝以后母羊氏未崇號諡泰始三年下詔褒稱徳美使使持節謁者何融追諡為平陽靖君四年后崩時年五十二合𦵏崇陽陵將遷祔帝手疏太后徳行命史官為哀策以叙述焉其後帝追慕不已復下詔曰外曾祖故司徒王朗夫人楊氏舅氏尊屬鄭劉二從母先后至愛每惟聖善敦睦遺㫖渭陽之感永懐靡及其封楊夫人及從母為鄉君邑各五百户太康七年復追贈繼祖母夏侯氏為滎陽縣君武元楊皇后諱艶字瓊芝𢎞農華隂人父文宗見外戚傳母天水趙氏早卒后依舅家舅妻仁愛親乳養后遣他人乳其子及長又隨後母叚依其家后少聰慧善書姿質美麗閑於女工有善相者嘗相后當極貴文帝聞而為世子聘焉甚被寵遇生毗陵悼王軌恵帝秦獻王柬平陽新豐陽平公主武帝即位立為皇后有司奏依漢故事皇后太子各食湯沐邑四十縣帝以非古典不許帝以皇太子不堪奉大統密以語后后曰立嫡以長不以賢豈可動乎初賈充妻郭氏使賂后求以女為太子妃及議大子㛰帝欲娶衛瓘女然后盛言賈后有淑徳又密使太子太傅荀顗進言上乃聽之后追懐舅氏之恩故顯官趙俊而納俊兄虞女粲於後宫為夫人泰始中常博採良家以充後宫先下書禁天下嫁娶使中官乗使車給騶騎馳𫝊州郡召充選者使后簡擇后性妬惟取㓗白長大其端正羙麗並不見留時卞藩女有羙色帝欲納之掩扇謂后曰卞氏女佳后曰藩三世后族其女不宜枉以卑位帝乃止司徒李允鎮軍大將軍胡􅁬廷尉諸葛冲太僕臧權侍中馮蓀祕書郎左思及世族子女並充三夫人九嬪之列司冀兖豫四州二千石將吏家補良人以下名家盛族子女多敗衣瘁貎以避之及后有疾見帝素愛胡夫人恐後立之慮太子不安臨終枕帝膝曰叔父駿女男允有徳色願陛下以備六宫因悲泣帝流涕許之后泰始十年崩於眀光殿絶於帝膝時年三十七詔賜諡后母趙氏為縣君以繼母段氏為鄉君命史臣作后哀冊以叙其懐𦵏於峻陽陵武悼楊皇后諱芷字季蘭小字男允元后從妺父駿别有𫝊咸寧二年立為皇后婉嫕有婦徳羙映椒房甚有寵生渤海殤王早薨遂無子太康九年后率内外夫人命婦躬桑於西郊賜帛各有差太子妃賈氏妬忌帝將廢之后言於帝曰賈公閭有勲社稷猶當數世宥之賈妃親是其女正復妬忌之間不足以一眚掩其大徳后又數誡厲妃妃不知后之助已因以致恨謂后構之於帝忿怨彌深及帝崩尊為皇太后賈后凶悖忌后父駿執權遂誣駿為亂使楚王瑋與東安王繇稱詔誅駿内外隔塞后題帛為書射之城外曰救太傅者有賞賈后因宣言太后同逆駿既死詔使將軍荀悝送后於永寧宫特全后母髙都君龐氏之命聽就后居止賈后諷羣公有司奏曰皇太后隂漸奸謀圖危社稷飛箭繫書要募將士同惡相濟自絶於天魯侯絶文姜春秋所許陛下雖懐無已之情臣下不敢奉詔可宣勑王公於朝堂㑹議詔曰此大事更詳之有司又奏駿藉外戚之資陰圖凶送而皇太后内為脣齒協同其謀禍釁既彰背捍詔命阻兵負衆血刃宫省上背祖宗之靈下絶億兆之望昔文姜與亂春秋所貶吕宗叛戾髙后降配宜廢皇太后為峻陽庶人中書監張華等以為太后非得罪於先帝者也今黨惡所親為不母於聖世宜依孝成趙皇后故事曰武帝皇后處之離宫以全貴終之恩尚書令下邳王晃等議以皇太后與駿謀危社稷不可復奉承宗廟配合先帝宜貶尊號廢詣金墉城於是有司奏請從晃等議廢太后為庶人詔不許有司又固請乃可之又奏楊駿造亂家屬應誅詔原其妻龐氏以慰太后之心今太后廢為庶人請以龐付廷尉行刑詔曰聽龎與庶人相隨有司希賈后㫖固請乃從之龐臨刑太后抱持嘷呌截髪稽顙上表詣賈后稱妾請全母命不見省初太后尚有侍御十人賈后奪之絶膳而崩時年三十四在位十五年賈后又信妖巫謂太后必訴寃先帝乃覆而殯之施諸厭劾符書藥物永嘉元年追復尊號諡曰悼后别立廟神主不配武帝至成帝成康七年下詔使内外詳議衛將軍虞潭議以為悼后既已復位則應配食世祖未有位號居正而偏祠别室者也此於國典有虧於是王公卿士等咸從潭議太后始得配食武帝左貴嬪名芬臨淄人兄思别有𫝊芬少好學善綴文名亞於思武帝聞而納之泰始八年拜脩儀受詔作愁思之文因為離思賦以進後策為貴嬪姿陋無寵以才徳見禮體羸多患常居薄室帝每遊華林輙廻輦過之言及文義辭對清華左右侍聽莫不稱羙及元楊皇后崩芬獻誄於帝咸寧二年納悼后芬於坐受詔作頌及帝女萬年公主薨帝痛悼不已詔芬作誄其文甚麗帝重芬詞藻每有方物異寳必詔為賦頌以是屢獲恩賜焉答兄思詩書及雜賦頌數十篇並行於世胡貴嬪名芳臨涇人父奮别有𫝊泰始中帝多簡良家子女以充内職自擇其羙者以絳紗繫臂而芳既入選下殿號泣左右止之曰陛下聞聲芳曰死且不畏何畏陛下遂冊拜為貴嬪帝每有顧問不飾言辭率爾而對進退方雅時帝多内寵平吳之後復納孫皓宫人數千自此掖庭殆將萬人而並寵者甚衆帝莫知所適常乗羊車恣其所之至便宴寢宫人乃取竹葉挿户以鹽汁灑地而引帝車然芳最䝉愛幸殆有專房之寵焉侍御服飾亞於皇后帝嘗與之摴蒱争矢遂傷上指帝怒曰此固將種也芳對曰北伐公孫西距諸葛非將種而何帝甚有慙色芳生武安公主諸葛夫人名婉琅邪陽都人父沖字茂長廷尉卿婉以泰始九年春入宫拜為夫人兄銓字徳林散騎常侍銓弟玫字仁林侍中御史中丞玫婦弟周穆清河王覃之舅也永嘉初穆與玫勸東海王越廢懐帝立覃越不許重言之越怒遂斬玫及穆臨刑玫謂穆曰我語卿何道穆曰今日復何所説時人方知謀出於穆非玫之意惠賈皇后諱南風平陽人小名峕父充别有傳初武帝欲為太子取衛瓘女元后納賈郭親黨之説欲㛰賈氏帝曰衛公女有五可賈公女有五不可衛家種賢而多子美而長白賈家種妬而少子醜而短黑元后固請荀顗荀朂並稱充女之美乃定㛰始欲聘后妹午午年十二小太子一歲短小未勝衣更娶南風年十五大太子二歲泰始八年二月辛卯冊拜為太子妃妬忌多權詐太子畏而惑之嬪御罕有進幸者帝常疑太子不慧且朝臣和嶠等多以為言故欲試之盡召東宫大小官屬為設讌㑹而密封疑事使太子決之停信待反妃大懼倩外人作答答者多引古義給使張泓曰太子不學而答詔引義必責作草主更益譴負不如直以意對妃大喜語泓便為我好答富貴與汝共之泓素有小才具草令太子自寫帝省之甚悦先示太子少傅衛瓘瓘大踧踖衆人乃知瓘先有毁言殿上皆稱萬歲充宻遣語妃云衛瓘老奴㡬破汝家妃性酷虐嘗手殺數人或以㦸擲孕妾子隨刃墮地帝聞之大怒已修金墉城將廢之充華趙粲從容言曰賈妃年少妬是婦人之情耳長自當差願陛下察之楊珧亦為之言曰陛下忘賈公閭邪荀朂復深救之故得不廢惠帝即位立為皇后生河東臨海始平公主哀獻皇女后暴戾日甚侍中賈模后之族兄右衛郭彰后之從舅並以才望居位與楚王瑋東安公繇分掌朝政后母廣城君養孫賈謐干預國事權侔人主繇密欲廢后賈氏憚之及太宰亮衛瓘等表繇徙帶方奪楚王中候后知瑋怨之乃使帝作宻詔令瑋誅亮以報宿憾模知后凶暴恐禍及己乃與裴頠王衍謀廢之衍悔而謀寢后遂荒滛放恣與太醫令程據等亂彰於内外洛南有盗尉部小吏端麗羙容止既給厮役忽有非常衣服衆咸疑其竊盗尉嫌而辯之賈后疎親欲求盗物徃聽對辭小吏云先行逄一老嫗説家有疾病師卜云宜得城南少年厭之欲暫相煩必有重報於是隨去上車下帷内簏箱中行可十餘里過六七門限開簏箱忽見樓闕好屋問此是何處云是天上即以香湯見浴好衣羙食將入見一婦人年可三十五六短形青黑色眉後有疵見留數夕共寢歡讌臨出贈此衆物聽者聞其形狀知是賈后慙笑而去尉亦解意時他人入者多死唯此小吏以后愛之得全而出初后詐有身内藁物為産具遂取妹夫韓壽子慰祖養之託諒闇所生故不顯遂謀廢太子以所養代立時洛中謠曰南風烈烈吹黄沙遥望魯國鬱嵯峨前至三月滅汝家后母廣城君以后無子甚敬重愍懐每勸厲后使加慈愛賈謐恃貴驕縱不能推崇太子廣城君恒切責之廣城後改封宜城宜城病篤后出侍疾太子常徃宜城第將醫出入恂恂盡禮宜城臨終執后手令盡意於太子言甚切至又曰趙粲及午必亂汝事我死後勿復聽入深憶吾言后不能遵之遂專制天下威服内外更與粲午專為奸謀誣害太子衆惡彰著初誅楊駿及汝南王亮太保衛瓘楚王瑋等皆臨機專斷宦人董猛參預其事猛武帝時為寺人監侍東宫得親信於后預誅楊駿封武安侯猛三兄皆為亭侯天下咸怨及太子廢黜趙王倫孫秀等因衆怒謀欲廢后后數遣宫婢微服於人間視聽其謀頗洩后甚懼遂害太子以絶衆望趙王倫乃率兵入宫使翊軍校尉齊王囧入殿廢后后與囧母有隙故倫使之后驚曰卿何為來囧曰有詔收后后曰詔當從我出何詔也后至上閤遥呼帝曰陛下有婦使人廢之亦行自廢又問囧曰起事者誰曰梁趙后曰繫狗當繫頸今反繫其尾何得不然至宫西見謐尸再舉聲而哭遽止倫乃矯詔遣尚書劉𢎞等持節齎金屑酒賜后死后在位十一年趙粲賈午韓夀董猛等皆伏誅臨海公主先封清河洛陽之亂為人所畧𫝊賣吳興錢温温以送女女遇主甚酷元帝鎮建業主詣縣自言元帝誅温及女改封臨海宗正曹統尚之惠羊皇后諱獻容泰山南城人祖瑾父元之並見外戚傳賈后既廢孫秀議立后后外祖孫旂與秀合族又諸子自結於秀故以太安元年立為皇后將入宫衣中有火成都王頴伐長沙王乂以討元之為名乂敗頴奏廢后為庶人處金墉城陳􅀈等唱伐成都王大赦復后位張方入洛又廢后方逼遷大駕幸長安留臺復后位永興初張方又廢后河間王顒矯詔以后屢為姦人所立遣尚書田淑勑留臺賜后死詔書累至司隷校尉劉暾與尚書僕射荀藩河南尹周馥不奉詔馳上奏申救之顒見表大怒乃遣陳顔吕朗東收暾暾奔青州后遂得免帝還洛迎后復位後洛陽令何喬入廢后及張方首至其日復后位㑹帝崩后慮太弟立為嫂叔不得稱太后催前太子清河王覃入將立之不果懐帝即位尊后為惠帝皇后居𢎞訓宫洛陽敗沒於劉曜曜僭位以為皇后因問曰吾何如司馬家兒后曰胡可並言陛下開基之聖主彼亡國之暗夫有一婦一子及身三耳不能庇之貴為帝王而妻子辱於凡庶之手遣妾爾時實不思生何圖復有今日妾生於髙門常謂世間男子皆然自奉巾櫛以來始知天下有丈夫耳曜甚寵愛之生曜二子而死偽諡獻文皇后謝夫人名玖家本貧賤父以屠羊為業玖清惠貞正而有淑姿選入後庭為才人惠帝在東宫將納妃武帝慮太子尚幼未知帷房之事乃遣在東宫侍寢由是得幸有身賈后忌之玖求還西宫遂生愍懐太子年三四歳惠帝不知也入朝見愍懐與諸皇子共戲執其手武帝曰是汝兒也及立為太子拜玖為淑媛賈后不聽太子與玖相見處之一室及愍懐遇酷玖亦被害焉永康初詔改𦵏太子因贈玖夫人印綬𦵏顯平陵懐王皇太后諱媛姬不知所出初入武帝宫拜中才人早卒懐帝即位追尊曰皇太后元夏侯太妃名光姬沛國譙人也祖威兖州刺史父莊字仲容淮南太守清眀亭侯妃生自華宗幼而眀慧琅邪武王為世子覲納焉生元帝及恭王薨元帝嗣立稱王太妃永嘉元年薨於江左𦵏琅邪國初有䜟云銅馬入海建業期太妃小字銅環而元帝中興於江左焉元敬虞皇后諱孟母濟陽外黄人也父豫見外戚傳帝為琅邪王納后為妃無子永嘉六年薨時年三十五帝為晉王追尊為王后太興三年帝踐阼遣使持節兼太尉萬勝奉冊追贈皇后璽綬祀以太牢祔於太廟𦵏建平陵太寧中眀帝追懐母養之恩贈豫妻王氏為䢵陽縣君從母散騎常侍新野王罕妻為平陽縣君豫章君荀氏元帝宫人也初有寵生眀帝及琅邪王裒由是為虞后所忌自以位卑每懐怨望為帝所譴漸見疎薄及眀帝即位封建安君别立第宅太寧元年帝迎還臺内供奉隆厚及成帝立尊重同於太后咸寧元年薨贈豫章郡君别立廟於京師臣謹按豫章君生眀帝眀帝為天子而處之别宅閲兩朝但為封君不正太后之號當時朝臣無有非議之者有以知晉朝之不綱也然史氏載之亦無譏論何邪眀穆庾皇后諱文君潁川鄢陵人也父琛見外戚傳后性仁惠羙姿儀元帝聘為太子妃以徳行見重眀帝即位立為皇后及成帝立尊后曰皇太后羣臣奏天子幼冲宜依漢和熹皇后故事后辭讓數四不得已而臨朝攝萬機后兄中書令亮管詔命公卿奏事稱皇太后陛下有司奏贈后父琛及夫人母邱氏后固不聽及蘇峻作逆京都傾覆后見逼辱遂以憂崩年三十二后即位凡六年其後帝孝思㒺極贈琛驃騎大將軍儀同三司母邱氏安陵縣君從母荀氏永寧縣君何氏建安縣君亮表陳先志讓而不受成恭杜皇后諱陵陽京兆人鎮南將軍預之曾孫也父又見外戚傳成帝以后奕世名徳咸康二年備禮拜為皇后即日入宫帝御太極前殿羣臣畢賀晝漏盡懸籥百官乃罷后少有姿色然長猶無齒有來求㛰者輙中止及帝納采之日一夜齒盡生改宣城陵陽縣為廣陽縣七年三月后崩年二十一外官五日一臨内官旦一入𦵏訖止后在位六年無子先是三吳子女相與簪白花望之如素柰傳言天公織女死為之着服至是而后崩帝下詔山陵之事一從節儉陵中唯潔埽而已不得施塗車芻靈有司奏造凶門栢歴及調挽郎皆不許又禁逺近遣使眀年元會有司奏廢樂詔廢管絃奏金石如故孝武帝寧康二年以后母裴氏為廣徳縣君裴氏名穆長水校尉綽孫太傅主簿遐女太尉王夷甫外孫中表之羙髙於當世遐隨東海王越遇害無子唯穆渡江遂享榮慶立第南掖門外世所謂杜姥宅云章太妃周氏以選入成帝宫有寵生哀帝及海西公始拜為貴人哀帝即位詔崇為皇太妃儀服與太后同興寧元年薨帝欲服重尚書僕射江虨啓應服緦麻三月謂厭屈私情所以上嚴祖考帝從之康獻禇皇后諱蒜子河南陽翟人父裒見外戚傳后聰朗有器識少以名家入為琅邪王妃及康帝即位立為皇后封母謝氏為尋陽鄉君穆帝即位尊后曰皇太后時帝幼冲未親國政領司徒蔡謨等上奏引漢和熹順烈及近世眀穆故事請太后親攝萬機太后於是臨朝稱制朝臣皆致敬於裒後帝既冠加元服太后乃歸事反政一依舊典退於崇徳宫手詔羣公曰昔以皇帝幼冲從羣后之議既以闇弱又頻丁極艱衘恤歴祀沈憂在疚司徒親尊徳重訓救其弊王室之不壊實公是憑帝既備茲冠禮而四海未一五胡叛逆豺狼當路費役日興百姓困窮願諸君子戮力一心輔翼幼主匡救不逮未亡人永歸别宫以終餘齒仰惟家國故以一言託懐及哀帝海西公之世太后復臨朝稱制桓温之廢海西公也太后方在佛屋燒香内侍啓云外有急奏太后乃出尚倚户前視奏數行乃曰我本自疑此至半便止索筆答奏云未亡人罹此百憂感念存沒心焉如割温始呈詔草慮太后意異悚動流汗見於顔色及詔出温大喜簡文帝即位尊后為崇徳太后及帝崩孝武帝幼冲桓温又薨羣臣又啓太后攝政太后於是復臨朝至帝冠㛰禮備復歸政稱崇徳太后太元九年崩於顯陽殿年六十一在位凡四十年太后於帝為從嫂朝議疑其服太學愽士徐藻議曰資父事君而敬同又禮云其夫屬父道者妻則母道也則夫屬君道妻亦后道矣服后以齊母之義也魯譏逆祀以眀尊卑今上躬奉康穆哀皇及靖后之祀致敬同於所天豈可敬之以君道而服廢於本親謂應齊衰朞從之穆章何皇后諱法倪廬江灊人也父凖見外戚傳以名家膺選升平元年八月下璽書曰皇帝咨爾前太尉參軍何琦混元資始肇經人倫爰及夫婦以奉天地宗廟社稷謀於公卿咸以宜率由舊典今使使持節太常彪之宗正綜以禮納采琦答曰前太尉參軍都鄉侯糞土臣何琦稽首頓首再拜皇帝嘉命訪㛰陋族備數採擇臣從祖弟故散騎侍郎凖之遺女未閑教訓衣履若如人欽承舊章肅奉典制又使兼太保武陵王睎兼太尉中領軍洽持節奉策立為皇后后無子哀帝即位稱穆皇后居永安宫及桓元簒位移后入司徒府路經太廟后停輿慟哭哀感路人元聞而怒曰天下禪代常理何預何氏女子事邪乃降后為零陵縣君與安帝俱西至巴陵㑹劉裕建義殷仲文奉后還京都后以逺還欲奉拜陵廟有司以冦難未平奏停永興二年崩年六十六在位凡四十八年哀靖王皇后諱穆之太原晉陽人也司徒左長史濛之女后初為琅邪王妃哀帝即位立為皇后追贈母爰氏為安國鄊君后在位三年無子興寧二年崩廢帝孝庾皇后諱道憐潁川鄢陵人也父冰自有傳初為東海王妃及帝即位立為皇后太和六年崩𦵏於敬平陵帝廢為海西公追貶后曰海西公夫人太元九年海西公薨於吳又以后合𦵏於吳陵簡文宣鄭太后諱阿春河南滎陽人也世為冠族祖合臨濟令父愷字祖元安豐太守后少孤無兄弟唯姊妹四人后最長先適渤海田氏生一男而寡依於舅濮陽吳氏元帝為丞相敬后先崩將納吳氏女為夫人后及吳氏女並游後園或見之言於帝曰鄭氏女雖嫠賢於吳氏逺矣建武元年納為琅邪王夫人甚有寵后雖貴幸而恒有憂色帝問其故對曰妾有妹中者已適長沙王褒餘二妹未有所適恐姊為人妾無復求者帝因從容謂劉隗曰鄭氏二妹卿可為求佳對使不失舊隗舉其從子傭娶第三者以小者適漢中李氏皆得舊門帝召王褒為尚書郎以悦后意后生琅邪悼王簡文帝尋陽公主帝稱尊號后雖為夫人詔太子及東海武陵王皆母事之帝崩后稱建平國夫人咸和元年薨簡文帝時為琅邪王後自琅邪徙封會稽追號后曰㑹稽太妃及簡文帝即位未及追尊臨崩封皇子道子為琅邪王領㑹稽國奉太妃祀太元十九年孝武帝述遵先志上太妃尊號曰簡文太后立廟於太廟路西陵曰嘉平簡文順王皇后諱簡姬太原晉陽人也父遐見外戚傳后以冠族初為㑹稽王妃生子道生為世子永和四年母子並失帝意俱被幽廢后遂以憂薨咸安二年孝武帝即位追尊曰順皇后合𦵏髙平陵追贈后父遐特進光禄大夫加散騎常侍孝武文李太后諱陵容本出微賤始簡文帝為㑹稽王有三子俱夭自道生廢黜獻王早世其後諸姬絶孕將十年帝令卜者扈謙筮之曰後房中有一女當育二貴男其一終盛晉室時徐貴人生新安公王以徳羙見寵帝常冀其有娠而彌年無子㑹有道士許邁者朝臣時望多稱其得道帝嘗從容問焉答曰邁是好山水人本無道術斯事豈所能判但陛下徳厚慶深宜隆奕代之緒當從扈謙之言以存廣接之道帝然之更加採納又數年無子乃令善相者召諸愛妾而示之皆云非其人又悉以諸婢媵示焉時后為宫人在織坊中形長而色黑宫人皆謂之崑崙既至相者驚云此其人也帝以大計召之以侍寢后數夢兩龍枕膝日月入懐意以為吉祥向儕類説之帝聞而異焉遂生孝武帝及㑹稽文孝王鄱陽長公主及孝武帝初即位尊為淑妃太元三年進為貴人九年又進為夫人十二年加為皇太妃十九年八月辛巳帝臨軒遣兼太保劉耽尊為皇太后稱崇訓宫安帝立尊為太皇太后隆安四年崩於含章殿帝及太后百官皆服齊衰期𦵏修平陵神主祔宣太后廟孝武定王皇后諱法慧哀靖皇后之姪也父蘊見外戚傳初帝將納后訪於公卿時蘊子㳟以弱冠見僕射謝安安深重之既而謂人曰昔毛嘉見耻魏朝楊駿㡬傾晉室若帝納后有父者唯廕望如王蘊乃可既而稱蘊女容徳淑令乃舉以應選寧康三年中軍將軍桓沖等奏稱蘊女天性柔順四年允備且盛徳之胄羙善先積臣等參議可以配徳乾元㳟承宗廟徽音六宫母儀天下於是帝始納焉封蘊妻劉氏為樂平鄉君后嗜酒驕妬帝患之乃召蘊於東堂具説后過令加訓誡蘊免冠謝焉后乃少自改飭太元五年崩年二十一𦵏隆平陵安徳陳太后諱歸女松滋尋陽人也父廣以倡進仕至平昌太守后以羙色能歌彈入宫為淑媛生安恭二帝太元十五年薨贈夫人追崇曰皇太后神主祔於宣太后廟陵曰熙平安僖王皇后諱神愛琅邪臨沂人也父獻之見别傳母新安愍公主后以太元末納為太子妃安帝立冊為皇后無子義熙八年崩於徽音殿時年二十九𦵏休平陵恭思禇皇后諱靈媛河南陽翟人義興太守爽之女也后初為琅邪王妃元熙元年立為皇后生海鹽富陽公主及帝禪位於宋降為零陵王妃宋元嘉十三年崩年五十三祔𦵏沖平陵宋孝穆趙皇后諱安宗下邳僮人也父裔平原太守后以晉穆帝升平四年嬪於孝皇帝以産武帝殂於丹徒官舍𦵏晉陵丹徒縣東鄉諫壁里雩山宋受禪追崇號諡陵曰興寧永初三年有司奏追贈裔光禄大夫加金章紫綬裔命婦孫氏封豫章郡建昌縣君其年又追封裔臨賀縣侯裔子倫之自有傳孝懿蕭皇后諱文夀蘭陵人也父卓字子略洮陽令后為孝皇帝繼室生長沙景王道憐臨川烈武王道規義熙七年拜豫章公太夫人武帝為宋公宋公又加太妃太后之號帝踐阼尊曰皇太后居宣訓宫上以恭孝為行奉太后素謹及即大位春秋已髙每旦朝太后未嘗失時刻少帝即位加崇曰太皇太后景平元年崩於顯陽殿年八十一遺令漢世帝后陵皆異處今可於塋域之内别為一壙一遵往式乃開别壙與興寧合墳初武帝微時貧約過甚孝皇之殂𦵏禮多闕帝遺㫖太后百嵗後不須祔𦵏至是故稱后遺令云卓初與趙裔俱贈金紫光祿大夫又追封封陽縣侯妻下邳趙氏封吳郡夀昌縣君卓子源之襲爵源之見子思話傳武敬臧皇后諱愛親東莞人祖汪尚書郎父儁郡功曹后配武帝生㑹稽宣長公主興弟武帝以儉正率下后恭謹不違及武帝興復晉室居上相之重而后器服麤素不為親屬請謁義熙四年正月甲子殂於東城年四十八追贈豫章公夫人還𦵏丹徒武帝臨崩遺詔留𦵏建業於是備法駕迎梓宫祔𦵏初寧陵宋初追贈儁金紫光祿大夫妻髙宻叔孫氏遷陵永平鄉君㒞子燾熹熹子質並自有傳武帝張夫人諱闕不知何許人也生少帝及義興泰長公主惠媛永初元年拜夫人少帝即位有司奏上尊號為皇太后宫曰永樂少帝廢太后還璽綬隨居吳縣文帝元嘉元年拜營陽國太妃二年薨文章胡太后諱道女淮南人也義熙初武帝所納文帝生五年被譴賜死𦵏丹徒武帝踐阼追贈倢伃文帝即位有司奏上尊號曰章皇太后陵曰熙寧立廟建業少帝司馬皇后諱茂英晉恭帝女也初封海鹽公主少帝以公子尚焉宋初拜太子妃少帝即位為皇后元嘉元年降為營陽王妃又為南豐王太妃十六年薨文元袁皇后諱齊嬀陳郡陽夏人光祿大夫湛之庶女也母本卑賤后年五六歲方見舉後適文帝拜宜都王妃生子邵東陽獻公主英娥上待后恩禮甚篤袁氏貧薄后每就上求錢帛以贍之上性節儉所得不過三五萬三五十匹後潘淑妃有寵愛傾後宫咸言所求無不得后聞之未知信否乃因潘求三十萬錢與家以觀上意宿昔便得因此恚恨稱疾不復見上遂恚恨成疾元嘉十七年疾篤上執手流涕問所欲言后視之良久乃引被覆面崩於顯陽殿年三十六上甚悼痛之詔前永嘉太守顔延之為哀策文甚麗及奏上自益撫存悼亡感今懐昔八字以致意焉有司奏諡宣皇后上特詔諡曰元初后生劭自詳視之使馳白帝曰此兒形貎異常必破國亡家不可舉便欲殺之文帝狼狽至后殿户外手掇幔禁之乃止后亡後常有小小靈應沈羙人者眀帝所生也常以非罪見責應賜死從后昔所住徽音殿前度此殿有五間自后崩後常閉羙人至殿前流涕大言曰今日無罪就死先后若有靈當知之殿諸窓户應聲豁然開職掌者遽白文帝帝驚往視之羙人乃得釋大眀五年孝武乃詔追后之所生外祖親王夫人為豫章郡新淦平樂鄉君又詔趙蕭臧家及光祿袁敬公平樂鄉君墓先未給塋尸各給蠻户三以供灑埽后父湛之自有傳潘淑妃者本以貎進始未見賞文帝好乗羊車經諸房淑妃每莊飾褰帷以候并宻令左右以鹹水灑地帝每至户羊輙䑛地不去帝曰羊乃為汝徘徊况於人乎於此愛傾後宫孝武昭路太后諱惠男丹陽建康人也以色貎選入後宫生孝武帝拜為淑媛及年長無寵常隨孝武出蕃孝武即位有司奏奉尊號曰太后宫曰崇憲太后居顯陽殿上於閨門之内禮敬甚寡有所御幸或留止太后房内故人間咸有醜聲宫掖事祕亦莫能辨也孝建二年追贈太后父興之散騎常侍興之妻餘杭縣廣昌鄉君大眀四年太后弟子撫軍將軍瓊之上表自陳有司承㫖奏贈瓊之父道慶給事中瓊之及弟休之茂之並居顯職太后頗與政事賜與瓊之等財物家累千金居處器服與帝子相侔大眀五年太后隨上廵南豫州妃主以下並從廢帝立號太皇太后眀帝踐阼號崇徳太后初眀帝失所生為太后所攝養撫愛甚篤及即位供奉禮儀不異舊日有司奏宜别居外宫詔欲親奉晨昬盡懽閨禁不如所奏及聞義嘉難作太后心幸之延上飲酒置毒以進侍者引上衣上寤起以其巵上夀是日太后崩祕之䘮事如禮遷殯東宫題曰崇憲宫又詔述太后恩慈特齊衰三月以申追逺諡曰昭皇太后𦵏孝武陵東號曰修寧陵先是晉安王子勛未平巫者謂宜開昭太后陵毁去梓宫以厭勝修復倉卒不得如禮上性忌慮將來致災泰始四年夏詔有司曰崇憲昭太后修寧陵地大眀之世久所考卜前歲遭諸蕃之難禮從權宜未暇營改而塋隧之所山原卑陋可式遵舊典以禮改創奏請修寧陵元宫補葺毁壊權施油殿蹔出梓宫事畢即定詔可廢帝景和中又追贈興之侍中金紫光祿大夫諡曰孝侯道慶光祿大夫開府儀同三司諡曰敬侯道慶女為皇后以休之為侍中眀宣沈太后諱容姬不知何許人也為文帝羙人生眀帝拜倢伃元嘉三十年卒𦵏建康之莫府山孝武即位追贈湘東國太妃眀帝即位有司奏上尊號為皇太后諡曰宣陵號崇寧孝武文穆王皇后諱憲嫄琅邪臨沂人也元嘉二十年拜武陵王妃生廢帝豫章王子尚山隂公主楚玉臨淮康哀公主楚佩皇女楚琇康樂公主修眀孝武在蕃后甚寵異及即位為皇后焉大眀四年后率六宫躬桑於西郊皇太后觀禮妃主以下並加班錫廢帝即位尊曰皇太后宫曰永訓其年崩於含章殿祔𦵏景寧陵父偃别有傳殷淑儀者南郡王義宣女也麗色巧笑義宣敗後帝宻取之寵冠後宫假姓殷氏左右宣泄者多死故當時莫知所出及薨帝常思見之遂為通替棺欲見輙引替覩屍如此積日形色不異追贈貴妃諡曰宣及𦵏給輼輬車虎賁班劒鑾輅九旒黄屋左纛前後部羽葆鼔吹上自南掖門臨過䘮車悲不自勝左右莫不掩泣上痛愛不已精神罔罔頗廢政事每寢先於靈牀酌奠酒飲之既而慟哭不能自反又諷有司奏曰據春秋仲子非魯惠公元嫡尚得考别宫今貴妃盖天秩之崇班理應創廟乃立别廟於都下時有巫者能見鬼説帝言貴妃可致帝大喜令召之有少頃果於帷中見形如平生帝欲與之言黙然不對將執手奄然便歇帝尤哽恨於是擬李夫人賦以寄意焉謝莊作哀策文奏之帝卧覽讀起坐流涕曰不謂當今復有此才都下傳寫紙墨為之貴或云貴妃是殷琰家人入義宣家義宣敗入宫云前廢帝何皇后諱令婉廬江灊人也孝建三年納為皇太子妃大眀五年薨於東宫徽光殿諡曰獻妃廢帝即位追崇曰獻皇后眀帝踐阼遷后與廢帝合𦵏龍山北后父瑀字幼玉晉尚書左僕射澄曾孫也瑀尚武帝少女豫康長公主諱次男公主先適徐喬羙容色聰敏有智數文帝世禮待特隆瑀豪競於時與平昌孟靈休東海何朂等並以輿馬相尚公主與瑀情愛隆宻何氏踈戚莫不霑被恩禮瑀位右衛將軍主薨瑀墓開孝武追贈金紫光祿大夫子邁尚文帝第十六女新蔡公主諱英媚邁少以貴戚居顯官好犬馬馳逐多聚才力士位南濟隂太守廢帝納公主於後宫偽言薨殞殺一婢送出邁第殯𦵏行䘮禮常疑邁有異圖邁亦招聚同志欲因行廢立事覺見誅眀帝即位追封建寧縣侯瑀兄子衍性躁動位黄門郎拜竟求司徒司馬得司馬復求太子右率拜一二日復求侍中旬月之間求進無已不得侍中以怨罵賜死眀恭王皇后諱貞風琅邪臨沂人也初拜淮陽王妃眀帝改封又為湘東王妃生晉陵長公主伯姒建安長公主伯媛眀帝即位立為皇后上嘗宫内大集而裸婦人觀之以為歡笑后以扇障面獨無所言帝怒曰外舍家寒乞今共作笑樂何獨不視后曰為樂之事其方自多豈有姑姊妹集聚而祼婦人形體以此為樂外舍之為歡適與此不同帝大怒令后起后兄揚州刺史景文以此事語從舅陳郡謝綽曰后在家為儜弱婦人不知今段遂能剛正如此廢帝即位尊為皇太后宫曰𢎞訓廢帝失徳太后每加朂譬始猶見順後狂慝稍甚太后嘗賜帝玉柄毛扇帝嫌毛扇不華因此欲加酖害令太醫煑藥左右止之曰若行此事官便作孝子豈得出入狡獪帝曰汝語大有理乃止順帝即位齊髙帝執權宗室劉晃劉綽卜伯興等有異志太后頗與相關順帝禪位太后與帝遜於東邸因遷居丹陽官拜汝隂王太妃順帝殂於丹陽更立第都下建元元年薨於第追加諡𦵏以宋禮后父僧朗别有傳後廢帝陳太妃諱妙登丹陽建康屠家女也孝武嘗使尉司采訪人間子女有姿色太妃家在建康縣居有草屋兩三間上出行問尉曰御道那得此屋當由家貧賜錢三萬令起瓦屋尉自送錢與之家人並行唯太妃在家時年十二三尉見其羙即以白孝武於是迎入宫在路太后房内經二年再呼不見幸太后因言於上以賜眀帝始有寵一年衰歇以賜李道兒尋又迎還生廢帝先是人間言眀帝不男故皆呼廢帝為李氏子廢帝後每微行自稱李將軍或自謂李統眀帝即位拜貴妃秩同皇太妃廢帝踐阼有司奏上尊號曰皇太妃輿服一如晉孝武李太妃故事宫曰𢎞化置家令一人改諸國太妃曰太姬昇眀初降為蒼梧王太妃後廢帝江皇后諱簡珪濟陽考城人也太始五年眀帝訪太子妃而雅信卜數名家女多不合江氏雖為華族而后父祖並已亡弟又弱小以卜筮吉故為太子納之六年拜皇太子妃諷朝士州郡皆令獻物多者將直百金始興太守孫奉伯止獻琴書其外無餘物上大怒封藥賜死既而原之太子即帝位立為皇后帝既廢降后為蒼梧王妃祖智深自有𫝊順陳太妃諱法容丹陽建康人也眀帝素肥晩年痿疾不能内御諸弟姬人有懐孕者輙取以入宫及生男皆殺其母而與六宫所愛者養之順帝桂陽王休範子也以陳昭華為母眀帝崩昭華拜安成王太妃順帝即位進為皇太妃順帝禪位去皇存太妃之號順謝皇后諱梵境陳郡陽夏人右光祿大夫莊之孫也父颺車騎功曹昇眀二年立為皇后順帝禪位降為汝隂王妃祖莊自有傳南齊宣孝陳皇后諱道止臨淮東陽人魏司徒矯之後也后家貧少勤織作家人矜其勞或止之后終不改嫁於宣帝宣帝庶生子衡陽元王道度始安貞王道生后生髙帝年二歲乳人乏乳后夢人以兩甌麻粥與之覺而乳驚因此豐足宣帝從任在外后常留家有相者謂后曰夫人有貴子而不之見后歎曰我三子誰當應之呼髙帝小字曰政應是汝耳宣帝殂後后親執勤婢使有過皆恕而不問髙帝雖從宦而家業本貧為建康令時眀帝等冬月猶無縑纊而奉膳甚厚后每撤去兼肉曰於我過足矣殂於縣舍昇眀二年追贈竟陵公國太夫人齊國建為齊國太妃並宻印書青綬祠以太牢建元元年追尊孝皇后贈外祖父肇之金紫光祿大夫諡敬侯后母胡氏為永昌縣靖君永眀九年詔太廟四時祭宣皇帝薦起麵餅鴨􅌜孝皇后薦笋鴨卵脯醤炙白肉髙皇帝薦肉膾葅羮昭皇后薦茗粣炙魚並平生所嗜也髙昭劉皇后諱智容廣陵人也祖元之父夀之並員外郎后母桓氏夢吞玉勝生后時有紫光滿室以告夀之夀之曰恨非是男桓笑曰是女亦足興家矣后寢卧見有羽盖䕃其上家人試察之常見其上掩藹如似雲氣年十七裴方眀為子求昬酬許已定后夢見先有迎車至猶如常家迎法后不肯去次有迎至龍旗豹尾有異於常后喜而從之既而與裴氏不成㛰竟嬪於上嚴毅有軌度造次必依禮法生太子及豫章王嶷太子初在孕后嘗歸寧遇家奉祠爾日隂晦失曉舉家狼狽共營祭食后助炒胡麻始復内薪未及索火火便自然宋泰豫元年殂歸𦵏宣帝墓側則泰安陵也門生王清與墓工始下挿有白兎跳起尋之不得及墳成兎還栖其上昇眀二年贈竟陵公國夫人三年贈齊國妃印綬齊建元元年尊諡昭皇后二年贈后父夀之金紫光祿大夫母桓氏上虞都鄉君武穆裴皇后諱惠昭河東聞喜人也祖封之給事中父璣之左軍參軍后少與豫章王妃庾氏為娣姒庾氏勤女工奉事髙昭后恭謹不倦后不能及故不為舅姑所重武帝亦薄焉性剛嚴竟陵王子良妃袁氏布衣時有過后每加訓罰昇眀三年為齊世子妃建元元年為皇太子妃二年后薨諡穆妃𦵏休安陵時議欲立石誌王儉曰石誌不出禮起宋元嘉中顔延之為王球石誌素族無銘策故以紀行自爾以來共相祖習儲妃之重禮絶恒例既有哀䇿不煩石誌從之武帝即位追尊皇后贈父璣之金紫光祿大夫后母檀氏餘杭廣昌鄉元君舊顯陽昭陽二殿太后皇后所居也永眀中無太后皇后羊貴嬪居昭陽殿西范貴妃居昭陽殿東寵姬荀昭華居鳳華柏殿宫内御所居夀昌畫殿南閣置白鷺鼔吹二部乾光殿東西頭置鍾磬兩箱皆宴處也上數遊幸諸苑囿載宫人從從車置内深隠不聞端門鼓漏聲置鍾於景陽樓上應五鼓及三鼓宫人聞鍾聲早起莊飾車駕數幸琅邪城宫人常從早發至湖北埭雞始鳴故呼為雞鳴埭婦人吳郡韓蘭英有文辭宋孝武時獻中興賦被賞入宫宋眀帝時用為宫中職僚及武帝以為博士敎六宫書學以其年老多識呼為韓公云文安王皇后諱寳眀琅邪臨沂人也祖紹之吳興太守父􅁮之太常祭酒宋世髙帝為文惠太子納后建元元年為南郡王妃四年為皇太子妃無寵太子宫人製新麗衣裳及首飾而后牀帷陳故古舊釵鑷十餘枚永眀十一年為皇太孫太妃鬱林即位尊為皇太后稱宣徳宫置男左右三十人前代所未有也贈后父􅁮之金紫光祿大夫母桓氏豐安縣君其年十二月備法駕謁太廟眀帝即位出居鄱陽王故第以第為宣徳宫永元三年梁武帝定建業迎入宫后稱制至禪位遜居外宫梁天監十一年薨𦵏崇安陵諡曰安后祖韶之自有傳鬱林王何妃諱婧英廬江灊人撫軍將軍戢女也初將納為南郡王妃文惠太子嫌戢無男門孤不欲與昬王儉以南郡王妃便為將來外戚唯須髙胄不須彊門今何氏䕃華族弱實允外戚之義永眀三年乃成昬妃禀性滛亂南郡王所與無頼人遊妃擇其羙者皆與交歡南郡王侍書人馬澄年少色羙甚為后悦常與鬬腕較力南郡王以為歡笑澄者本剡縣寒人嘗於南岸逼略人家女為秣陵縣所録南郡王語縣散遣之澄又逼求姨女為妾姨不與澄詣建康令沈徽孚訟之徽孚曰姨女可為婦不可為妾澄曰僕父為給事中門户既成姨家猶是寒賤政可為妾耳徽孚訶而遣之十一年為皇太孫妃又有女巫子楊珉之亦有羙貎妃尤愛悦之與同寢處如伉儷及太孫即帝位為皇后封后嫡母劉為髙昌縣都鄉君所生母宋為餘杭廣昌鄉君后將拜鏡在牀無因墮地其冬與太后同日謁太廟楊珉之為帝所幸常居中侍眀帝為輔與王晏徐孝嗣王廣之並面請不聽又令蕭諶坦之固請皇后與帝同席坐流涕覆面謂坦之曰楊郎好年少無罪過何可枉殺坦之耳語於帝曰此事别有一意不可令人聞帝謂皇后為阿奴曰阿奴蹔去坦之乃曰外間並云楊珉之與皇后有異情彰聞邇遐帝不得已乃為勑坦之馳報眀帝即令建康行刑既而果有勑原之而珉之已死后既滛亂又與帝相愛䙝故帝恣之又迎后親戚入宫賞賜人百數十萬以武帝曜靈殿處后家屬帝廢后貶為王妃父戢自有傳海陵王王妃諱韶眀琅邪臨沂人太常慈之女也永眀八年納為臨沂公夫人鬱林王即位為新安王妃延興元年為皇后其年降為海陵王妃妃父慈自有傳眀敬劉皇后諱惠端彭城人光祿大夫道𢎞孫也髙帝為眀帝納之建元三年除西昌侯夫人永眀七年卒𦵏江乗縣張山延興元年贈宣城王妃眀帝即位追尊敬皇后贈父通直郎景猷為金紫光祿大夫母王氏平陽鄉君眀帝崩改𦵏祔於興安陵東昬禇皇后諱令璩河南陽翟人太常澄之女也建武二年納為皇太子妃而無寵帝謂左右曰若得如山隂主無恨矣山陰主眀帝長女也後遂與之為亂眀年妃謁敬后廟東昬即位為皇后帝寵潘妃后不被遇黄淑儀生太子誦而卒東昬廢后及誦並為庶人后父澄自有傳和王皇后諱蕣華琅邪臨沂人太尉儉之孫也初為隨王妃中興元年為皇后帝禪位后降為妃妃祖儉自有傳梁文獻張皇后諱尚柔范陽方城人也父穆之娶文帝從姑而生后后以元嘉中嬪於文帝生長沙宣武王懿永陽昭王敷次生武帝方孕忽見庭前菖蒲花光采非常驚報侍者侍者皆云不見后曰嘗聞見菖蒲花者當富貴因取吞之是月生武帝將産之夕后見庭内若有衣冠陪列焉次生衡陽宣王暢義興昭長公主令嫕后以宋泰始七年殂於秣陵縣同夏里舎𦵏晉陵武進縣東城里山天監元年五月甲辰追上尊號為皇后諡曰文獻穆之字思靜晉司空華六世孫也少方雅有識鑒初為員外散騎侍郎深被始興王濬引納穆之鑒其禍萌求為交阯太守政有異績宋文帝將以為交州刺史會病卒子𢎞籍字眞藝齊初為鎮西參軍卒於官梁武踐阼追贈穆之光祿大夫加金章紫綬贈𢎞籍廷尉卿𢎞籍無子從父弟𢎞䇿以子纘嗣别有傳武徳郗皇后諱徽髙平金鄉人也祖紹宋國祭酒領東海王師父煜太子舎人早卒后母宋文帝女尋陽公主也方娠夢當生貴子及后生有赤光照室器物甚眀家人怪之巫言此女光髙將有所妨乃於水濱袚除之后㓜眀慧善𨽻書讀史傳女工之事無不閑習宋後廢帝將納為后齊初安陸王緬又欲結㛰郗氏並辭以女疾乃止齊建元末嬪於武帝生永興公主玉姚永世公主玉婉永康公主玉環及武帝為雍州刺史殂於襄陽宫舎年三十二其年歸𦵏南徐州南東海武進縣東城里山中興二年武帝為梁公齊帝贈后為梁公妃及武帝踐阼追崇為皇后諡曰徳陵曰修陵后父煜贈金紫光祿大夫后酷妬忌及終化為龍入於後宫通夢於帝或見形光彩照灼帝體將不安龍輙激水騰涌於露井上為殿衣服委積常置銀鹿盧金瓶灌百味以祀之故帝卒不置后武丁貴嬪諱令光譙國人也祖父從官襄陽因居沔北五女村寓於劉惠眀廡下貴嬪生於樊城初産有神光之異紫氣滿室故以光為名相者云當大貴少時與鄰女月下紡績諸女並患蚊蚋而貴嬪不之覺也鄉人魏益徳將聘之未及成而武帝鎮樊城嘗登樓以望見漢濱五采如龍下有女子擘絖則貴嬪也又丁氏因人以相者言聞之於帝帝贈以金環納之時年十四貴嬪生而有赤誌在左臂療之不滅又體多疣子至是無何並失所在徳后酷忌遇貴嬪無道使日舂五斛舂每中程若有助者被遇雖嚴益小心祇敬嘗於供養經案側髣髴若見神人心獨異之武帝起兵之日昭眀太子始誕天監元年五月有司奏為貴人未拜其年八月又奏為貴嬪位在三夫人之上居顯陽殿及太子定位有司奏曰禮母以子貴皇儲所生不容無敬於是以皇太子之禮禮貴嬪言則稱令貴嬪性仁恕及居宫接馭自下皆得其歡心不好華飾器服無珍麗未嘗為親戚私謁及武帝大𢎞佛敎貴嬪奉而行之屏絶滋腴長進蔬膳受戒日甘露降於殿前方一丈五尺帝所立經義皆得其指歸尤精淨名經所受供施悉以充法事普通七年十一月庚辰薨移殯於東宫臨雲殿時年四十二詔吏部郎張纘為哀冊文有司奏諡曰穆𦵏寧陵祔於小廟簡文即位追崇曰太后貴嬪父道遷天監初為歴陽太守廬陵威王之生武帝謂之曰賢女復育一男答曰莫道䐗狗子世人以為笑後位兖州刺史宣城太守文宣阮太后諱令嬴會稽餘姚人也本姓石初齊始安王遙光納焉遙光敗入東昬宫建康城平為武帝采女在孕夢龍罩其牀天監六年八月生元帝於後宫是日大赦尋拜為修容賜姓阮氏常隨元帝出蕃大同六年六月薨於江州正寢時年六十七其年十一月歸𦵏江寧縣通望山諡曰宣元帝即位有司奏追崇為文宣太后還祔小廟承聖二年追贈太后父齊故奉朝請石靈寳散騎常侍左衛將軍封武康縣侯母陳氏武康侯夫人簡文王皇后諱靈寳琅邪臨沂人也祖儉齊太尉南昌文憲公父騫金紫光祿大夫南昌安侯后幼而柔眀叔父暕見之曰吾家女師也天監十一年拜晉安王妃生哀太子大器南郡王大連長山公主妙碧大通三年十月拜皇太子妃太清三年三月薨於永福省時年四十五其年簡文即位追崇為皇后諡曰簡大寳元年九月𦵏莊陵元帝徐妃諱昭佩東海郯人也祖孝嗣齊太尉枝江文忠公父緄侍中信武將軍妃以天監十六年十二月拜湘東王妃生世子方等益昌公主含貞妃無容質不見禮帝三二年一入房妃以帝眇一目每知帝將至必為半面粧以俟帝見則大怒而出妃性嗜酒多湛醉帝還房必吐衣中與荆州後堂瑤光寺智逺道人私通酷妬忌見無寵之妾便交杯接坐纔覺有娠者即手加刀刃帝左右暨季江有姿容又與滛通季江每歎曰栢直狗雖老猶能獵蕭溧陽馬雖老猶駿徐娘雖老猶尚多情時有賀徽者羙色妃要之於普賢尼寺書白角枕為詩相贈答既而貞惠太子方諸母王氏寵愛未㡬而終元帝歸咎於妃及方等死愈見疾太清三年遂逼令自殺妃知不免乃投井死帝以屍還徐氏謂之出妻𦵏金陵瓦官寺帝制金樓子述其滛行初妃嫁夕車至西州而疾風大起發屋折木無何雪霰交下帷簾皆白及長還之日又大雷震西州聽事兩柱俱碎帝以為不祥後果不終婦道敬夏太后會稽人也普通中納於湘東王宫生敬帝承聖元年冬拜晉安王國太妃紹泰元年尊為太后眀年冬降為江隂國太妃敬王皇后琅邪臨沂人也承聖元年十一月拜晉安王妃紹泰元年十月拜皇后眀年降為江隂王妃父儉自有傳陳武宣章皇后諱要兒吳興烏程人本姓鈕父景眀為章氏所養因改姓焉后母蘇嘗遇道士以小龜遺已光彩五色曰三年有徵及期后生紫光照室因失龜所在后少聰慧羙容儀手爪長五寸色並紅白每有朞功之服則一爪先折武帝先娶同郡錢仲方女早卒後乃聘后后善書計能誦詩及楚辭武帝為長城縣公后拜夫人帝自廣州南征交阯命后與衡陽王隨文帝由海道歸於長城侯景之亂為景所囚及景平武帝踐阼立為皇后追贈后父梁散騎侍郎景眀特進金紫光祿大夫加金章紫綬拜后母蘇安吉縣君二年安吉君卒與后父𦵏吳興眀年追封后父為廣徳縣侯諡曰溫武帝崩后與中書舍人蔡景歴定計祕不發喪時衡陽王昌未至乃召文帝及即位尊后為皇太后宫曰慈訓廢帝即位后為太皇太后光大二年后下令黜廢帝為臨海王命宣帝嗣立大建元年復為皇太后二年三月丙申崩於紫極殿時年六十五其年四月羣臣上諡曰宣祔𦵏萬安陵后親屬無在朝者唯本族兄鈕洽官至中散大夫文沈皇后諱妙容吳興武康人也父法深梁安南中録事參軍后年十歲餘以梁大同中歸於文帝武帝之討侯景文帝時在武興及后並被收景平乃獲免武帝踐阼后為臨川王妃文帝即位為皇后追贈后父法深光祿大夫加金章紫綬封建城縣侯諡曰恭追贈后母髙為綏安縣君諡曰定廢帝即位尊后為皇太后宫曰安徳時宣帝與僕射到仲舉舎人劉師知等並受遺輔政師知與仲舉恒居禁中參決衆事而宣帝為揚州刺史與左右三百人入居尚書省師知忌宣帝權重矯勑令還東府理州務宣帝將出毛喜止之曰今若出外便受制於人如曹爽願作富家公不可得也宣帝乃稱疾召師知留與語使毛喜先入言之於后后曰今伯宗年幼政事並委二郎此非我意又言於廢帝廢帝曰此自師知等為非朕意也喜出報宣帝帝因囚師知自入見后及帝極陳師知之短仍自草敕請畫以師知付廷尉其夜於獄賜死自是政歸宣帝后憂悶計無所出乃密賂宦者蔣裕令誘建安人張安國使據郡反冀因此圖帝安國事發被誅時后左右近侍頗知其事后恐連逮黨與並殺之宣帝即位以后為文皇后陳亡入隋大業初自長安歸於江南頃之卒后兄欽襲爵建城侯位尚書左僕射欽素無伎能奉已而已卒諡曰成子觀嗣頗有學識官至御史中丞廢帝王皇后琅邪臨沂人天嘉元年為皇太子妃廢帝即位立為皇后廢帝為臨海王后廢為妃至徳中薨后生臨海嗣王至澤至澤光大元年為皇太子大建元年襲封臨海嗣王陳亡入長安后父固自有傳宣栁皇后諱敬言河東解縣人也曾祖世隆祖惲父偃並有傳后九歲幹理家事有若成人侯景之亂后與弟盼在江陵依梁元帝帝以長城公主故待遇甚厚以配宣帝承聖二年后生後主於江陵及魏尅江陵宣帝遷於關右后與後主俱留穰城天嘉二年與後主還朝后為安城王妃宣帝即位立為皇后后羙姿容身長七尺二寸手垂過膝初宣帝居鄉里先娶吳興錢氏及即位拜為貴妃甚有寵后傾心下之每尚方供奉物其上者皆進於貴妃而已御其次焉宣帝崩始興王叔陵為亂後主賴后與吳媪救而獲免後主即位尊后為皇太后宫曰𢎞範是時新失淮南地隋師臨江又國遭大喪後主患創不能聽政其誅叔陵供大行喪事邊境防守及百司衆務雖假後主之敇實皆決之於后後主創愈乃歸政焉后性謙謹未嘗以宗族為請雖衣食亦無所分遺陳亡入長安隋大業十二年薨於東都年八十三𦵏於洛陽之芒山後主沈皇后諱婺華吳興武康人儀同三司蔡侯君理之女也君理自有傳母即武帝女會稽穆公主早亡后尚幼而毁瘠過甚及服畢每歲時常獨坐涕泣哀動左右内外敬異焉太建三年拜為皇太子妃後主即位立為皇后后性端靜有識量寡嗜慾聰敏彊記涉獵經史工書翰後主在東宫而后父君理卒居憂處别殿哀毁逾禮後主遇后既薄而張貴妃有寵總後宫之政后澹然未嘗有所忌怨而居處儉約無錦繡之飾左右近侍纔百許人唯尋閲圖史及釋典為事嘗遇歲旱自暴而誦佛經應時雨降無子養孫姬子允為己子數上書諫爭後主將廢之而立張貴妃會國亡不果乃與後主俱入長安及後主薨后自為哀辭文甚酸切隋煬帝每廵幸常令從駕及煬帝為宇文化及所害后自廣陵過江還鄉里不知所終或言過江於毗陵天靜寺為尼名觀音貞觀初卒張貴妃名麗華兵家女也家貧父兄以織席為業後主為太子以選入宫時龔貴嬪為良娣貴妃年十歲為之給使後主見而悦之因得幸遂有娠生太子深後主即位拜為貴妃甚被寵遇後主與賓客游宴貴妃薦諸宫女預焉後宫咸徳之競言其善由是愛傾後宫又工厭魅之術假鬼道以惑後主置滛祀於宫中聚諸女巫使之鼔舞因參訪外事人間有一言一事妃必先知之以白後主後主由此益重之故内外宗族多被引用大臣報政亦從風而靡及隋師克臺城妃與後主俱入於井隋軍出之晉王廣命斬妃於青溪中橋史臣侍中鄭國公魏徵考覽記書參詳故老云後主初即位以始興王叔陵之亂被傷臥於承香閣下時諸姬並不得進唯張貴妃侍焉而栁太后猶居柏梁殿即皇后之正殿也沈皇后素無寵不得侍疾别居求賢殿至徳二年乃於光昭殿前起臨春結綺望仙三閣閣髙數十丈並數十間其牕牖璧帶懸楣欄檻之類並以沈檀香木為之又飾以金玉間以珠翠外施珠簾内有寳牀寳帳其服玩之屬瑰竒珍麗皆近古未有每㣲風暫至香聞數里朝日初照光映後庭其下積石為山引水為池植以竒樹雜以花蘂後主自居臨春閣張貴妃居結綺閣龔孔二貴嬪居望僊閣並複道交相往來又有王季二美人張薛二淑媛袁昭儀何倢伃江脩容等七人並有寵遞代以遊其上以宫人有文學者袁大捨等為女學士後主每引賓客對貴妃等遊宴則使諸貴人及女學士與狎客共賦新詩互相贈答採其尤豔麗者以為曲調被以新聲選宫女有容色者以千百數令習而歌之分部迭進持以相樂其曲有玉樹後庭花臨春樂等其略曰璧月夜夜滿瓊枝朝朝新大指所歸皆羙張貴妃孔貴嬪之容色張貴妃髪長七尺鬒黑如漆其光可鑒特聰慧有神彩進止閑雅容色端麗每瞻視眄睞光彩溢目照映左右嘗於閣上靚粧臨於軒檻宫中遥望飄若神仙又才辯彊記善候人主顔色是時後主怠於政事百司啟奏並因宦者蔡臨兒李善度進請後主倚𨼆囊置張貴妃於膝上共決之李蔡所不能記者貴妃並為疏條無所遺脱由是益加寵異後庭之家不遵法度有絓於理者但求恩於貴妃貴妃則令李蔡先啟其事而後從容為言之大臣有不從者因而譖之言無不聽於是張孔之權薰灼四方閹宦便佞之徒内外交結轉相引進賄賂公行賞罸無常綱紀瞀亂矣後魏自典午氏南遷下逮宋齊梁陳六宫制度前史言之審矣魏氏王業之兆雖基於神元而其時朝章國典百不一具故自昭成以前未有及内職之事章平思昭穆惠煬烈傳禪八君妃后無聞焉及道武建國始追尊祖妣皆從帝諡為皇后爰立中宫以配宸極中宫而下或稱夫人其員數多寡悉無凖限然粗有品秩可以詮次太武統㝢國家殷盛稍增左右昭儀及貴人椒房等自是後庭漸已充實矣又魏世故事將立皇后必令手鑄金人以成者為吉不則不得立也又太武文成保母劬勞之恩並極尊崇之義雖事乖典禮而觀過知仁孝文改定内官左右昭儀位視大司馬三夫人視三公三嬪視三卿六嬪視六卿世婦視中大夫御女視元士後置女職以典内司視尚書令僕作司大監女侍中三官視二品監女尚書羙人女史女賢人女書史書女小書女五官視三品中才人供人中使女生才人恭信宫人視四品青衣女酒女饗女食奚宫女奴視五品及齊神武文襄俱未踐尊極神武嫡妻稱妃其所聘茹茹女稱為茹茹公主文襄既尚魏朝公主故無别號兩宫自餘姬侍並稱娘而已文宣後庭雖有夫人嬪御之稱然未具員數孝昭内職甚少唯楊嬪才貎兼羙復是貴家襄城王母桑氏有徳行並䝉恩禮其餘無所述河清新令内命婦依古制有三夫人九嬪二十七世婦八十一御女又凖漢制置昭儀有左右二人比丞相其𢎞徳正徳崇徳為三夫人此三公光猷昭訓隆徽為上嬪比三卿宣徽凝暉宣眀順華凝華光訓為下嬪比六卿正華令則脩訓曜儀眀淑芳華敬婉昭華光正昭寧貞範𢎞徽和徳𢎞猷茂光眀信静訓曜徳廣訓暉範敬訓芳猷婉華眀範豔儀暉則敬信為二十七世婦比從三品穆光茂徳貞懿曜光貞凝光範令儀内範穆閨婉徳眀婉豔婉妙範徳暉章敬茂静肅章穆華愼儀妙儀眀懿崇眀麗則婉儀彭脩閑修静𢎞眀愼豔光猗容徽淑秀儀芳婉貞愼眀豔穆容修範肅容茂儀英淑𢎞豔正信凝婉英範懐順脩媛良則瑶章訓成潤儀寧訓淑懿柔則穆儀修禮昭愼貞媛肅閨敬順柔華昭順敬寧眀訓𢎞儀崇敬修敬承閑昭容麗儀閑華思柔媛光懐徳良媛淑猗茂範良信豔華徽娥肅儀妙則為八十一御女比正四品武成好内並具其員自外又置才人采女以為散號後主既立二后昭儀以下皆倍其數又置左右娥英比左右丞相降昭儀比二大夫尋又置淑妃一人比相國周氏率由姬制内職有序文帝創基修袵席以儉約武皇嗣歴節情欲於矯枉宫闈有貫魚之羙戚里無私溺之尤可謂得君人之體也宣皇外行其志内逞其欲溪壑難滿采擇無厭恩之所加莫限厮皁榮之所及無隔險詖於是升蘭殿以正位踐椒庭而齊體者非一人焉階房帷而拖青紫縁恩幸而擁玉帛非一族焉雖辛癸之荒滛趙李之傾惑曾未足比其髣髴也人厭苛政弊事實多文帝之祀忽諸特由於此隋文思革前弊大矯其違唯后當室傍無私寵婦官位號未詳備焉開皇二年著内官之式略依周禮省減其數嬪三員掌敎四徳視正三品世婦九員掌賓客祭祀視正五品女御三十八員掌女功絲枲視正七品又采漢晉舊儀置六尚六司六典遞相統攝以掌宫掖之政一曰尚宫掌導引皇后及閨閤禀賜管司令三人掌圖籍法式糾察宣奏典琮三人掌琮璽器玩二曰尚儀掌禮儀敎學管司樂三人掌音律之事典贊三人掌導引内外命婦朝見三曰尚服掌服章寳藏管司飾三人掌簪珥花嚴典櫛三人掌巾櫛膏沐四曰尚食掌進膳先嘗管司醫三人掌方藥卜筮典器三人掌罇彜器皿五曰尚寢掌帷帳牀祳管司筵三人掌鋪設灑埽典執三人掌扇傘燈燭六曰尚工掌營造百役管司製三人掌衣服裁縫典會三人掌財帛出入六尚各三員視從九品六司視勲品六典視流外二品初文獻皇后功參歴試外預朝政内擅宫闈懐嫉妬之心虚嬪妾之位不設三妃防其上逼自嬪以下置六十員加又抑損服章降其品秩至文獻崩後始置貴人三員增嬪至九員世婦二十七員御女八十一員貴人等關掌宫闈之務六尚以下皆分𨽻焉煬帝時后妃嬪御無釐婦職唯端容麗飾陪從宴遊而已帝又參詳典故自製嘉名著之於令貴妃淑妃徳妃是為三夫人品正第一順儀順容順華修儀修容修華充儀充容充華是為九嬪品正第二倢伃一十二員品正第三羙人才人一十五員品正第四是為世婦寳林二十四員品正第五御女二十四員品正第六采女三十七員品正第七是為女御總一百二十以叙於宴寢又有承衣刀人皆趨侍左右並無員數視六品以下時又增置女宫凖尚書省以六局管二十四司一曰尚宫局管司言掌宣𫝊奏啟司簿掌名録計度司正掌格式推罸司闈掌門閤管籥二曰尚儀局管司籍掌經史敎學紙筆几案司樂掌音律司賓掌賓客司贊掌禮儀贊相導引三曰尚服局管司璽掌琮璽符節司衣掌衣服司飾掌湯沭巾櫛玩弄司仗掌仗衛戎器四曰尚食局管司膳掌膳羞司醞掌酒醴醯醢司藥掌醫巫藥劑司饎掌廪餼柴炭五曰尚寢局管司設掌牀席帷帳鋪設灑埽司輿掌輿輦傘扇執持羽儀司苑掌園籞種植蔬菜𤓰果司燈掌火燭六曰尚工局管司製掌營造裁縱司寳掌金玉珠璣錢貨司綵掌繒帛司織掌織染六尚二十二司員各二人唯司樂司膳員各四人每司又置典及掌以貳其職六尚十人品從第五司二十八人品從第六典二十八人品從第七掌二十八人品從第九女史流外量局閑劇多者十人以下無定員數聨事分職各有司存焉神元皇后竇氏沒鹿回部大人賓之女也賓臨終誡其二子速候回題令善事帝及賓卒速候等欲因帝會䘮為變語泄帝聞之晨起以佩刀殺后馳使告速候等言后暴崩速候等來赴因執殺之文帝皇后封氏生桓穆二帝早崩桓帝立乃𦵏焉文成初穿天泉池獲一石銘稱桓帝𦵏母氏逺近赴會二十餘萬有司以聞命藏之太廟次妃蘭氏是生思帝桓皇后惟氏生三子長曰普根次惠帝次煬帝平文崩后攝國事時人謂之曰女國后性猛忌平文之崩后所為也平文皇后王氏廣寗人也年十三因事入宫得幸於平文生昭成帝平文崩昭成在襁褓時國有内難將害帝子后匿帝於袴中咒曰若天祚未終者汝無聲遂良久不啼得免於難昭成初欲定都於灅源川築城郭起宫室議不決后聞之曰國自上世遷徙為業今事難之後基業未固若郭而居一旦寇來難卒遷動乃止烈帝之崩國祚殆危興復大業后之力也崩𦵏雲中金陵道武即位配饗太廟昭成皇后慕容氏慕容皝之女也初帝納皝妹為妃未㡬而崩皝復請繼好遣大人長孫秩逆后皝送於境上后至有寵生獻眀帝及秦眀王后性聰敏多智專夕理内每事多從初昭成遣衛辰兄悉勿祈還部落也后誡之曰汝還必深防衛辰辰姦猾終當滅汝悉勿祈死其子果為衛辰所殺卒如后言建國二十三年崩道武即位配饗太廟獻眀皇后賀氏東部大人野干女也少以容儀選入東宫生道武苻洛之内侮也后與道武及故臣吏避難北徙俄而髙車來抄掠后乗車避賊而南中路失道乃仰天曰國家允胄豈正爾絶滅也惟神靈扶助遂馳輪正不傾行百餘里至七个山南而免難後劉顯使人將害帝帝姑為顯弟亢埿妻知之密以告后梁眷亦來告難后乃令帝去之后夜飲顯醉向晨故驚廐中羣馬使起視馬后泣謂曰吾諸子始皆在此今盡亡矣汝等誰殺之故顯使不急追道武得至賀蘭部羣情未甚歸附后從弟外朝大人悦舉部隨從供奉盡禮顯怒將害后后奔亢埿家匿神車三日亢埿舉室請救乃得免會劉顯部亂始得亡歸後后弟染干忌道武之得人心舉兵圍逼行宫后出謂染干曰汝等今安所置我而欲殺吾子也染干慙而去後后少子秦王觚使於燕慕容垂止之后以觚不反憂念寢疾皇始元年崩祔𦵏於盛樂金陵後追加尊諡配饗焉道武皇后慕容氏寳之季女也中山平入充掖庭得幸左丞相衛王儀等奏請立皇后帝從儀令后鑄金人成乃立之封后母孟為溧陽君後崩道武宣穆皇后劉氏劉眷女也登國初納為夫人生華隂公主後生眀元后專理内事寵待有加以鑄金人不成故不登后位魏故事後宫産子將為儲貳其母皆賜死道武末年后以舊法薨眀元即位追尊諡位配饗太廟自此後宫人為帝母皆正配饗焉眀元昭哀皇后姚氏姚興女西平長公主也眀元以后納之後為夫人后以鑄金人不成未升尊位然帝寵禮如后是後猶欲正位后謙不當泰恒五年薨帝追恨之贈皇后璽綬而加諡焉𦵏雲中金陵眀元宻皇后杜氏魏郡鄴人陽平王超之妹也初以良家子選入太子宫有寵生太武及眀元即位拜貴嬪泰恒五年薨贈貴嬪𦵏雲中金陵太武即位追尊號諡配饗太廟又立廟於鄴刺史四時薦祀以魏郡太后所生之邑復其調役後甘露降於廟庭文成時相州刺史髙閭表修后廟詔曰婦人外成理無獨祀陰必配陽以成天地未聞有莘之國立太姒之饗此乃先皇所立一時之至感非經世之逺制便可罷祀先是太武保母竇氏初以夫家坐事誅與二女俱入宫操行純備進退以禮眀元命為太武保母性仁慈帝感其恩訓奉飬不異所生及即位尊為皇太后封其弟漏頭為遼東王太后訓釐内外甚有聲稱性恬素寡欲喜怒不形於色好揚人之善隠人之過帝征涼州蠕蠕入寇太后命諸將擊走之太平眞君元年崩詔天下大臨三日太保盧魯元監䕶䘮事諡曰惠𦵏崞山從后意也初后嘗登崞山顧謂左右曰吾母飬帝躬敬神而愛人若死而不滅必不為賤鬼然於先朝本無位次不可違禮以從園陵此山之上可以終託吾𦵏焉别立后寢廟於崞山建碑頌徳太武皇后赫連氏屈丐女也太武平統萬納后及二妹俱為貴人後立為皇后文成初崩祔𦵏金陵太武敬哀皇后賀氏代人也初為夫人生景穆皇帝神䴥元年薨追贈貴嬪𦵏雲中金陵後追號尊諡配饗太廟景穆恭皇后郁久閭氏河東王毗妹也少以才選入東宫有寵生文成皇帝而薨文成即位追尊號諡𦵏雲中金陵配饗太廟又文成乳母本遼西人因事入宫乳帝有劬勞保䕶之功文成即位尊為保太后尋為皇太后告於郊廟和平元年崩詔天下大臨三日諡曰昭𦵏於廣寗磨笄山俗謂之雞鳴山太后遺志也依惠太后故事别立寢廟置守陵二百家樹碑頌徳臣謹按以乳母而為皇太后行郊廟禮神其聽之乎稱崩而使天下臨之人其哀之乎文成文眀馮皇后長樂信都人也父朗秦雍二州刺史西城郡公母樂浪王氏后生於長安有神光之異朗坐事誅后遂入宫太武左昭儀后之姑也雅有母徳撫養敎訓年十四文成踐極以選為貴人後立為皇后文成崩故事國有大䘮三日之後御服器物一以燒焚百官及中宫皆號泣而臨之后悲呌自投火中左右救之良久乃蘇獻文即位尊為皇太后丞相乙渾謀逆獻文年十三居於諒闇太后宻定大計誅渾遂臨朝聽政及孝文生太后躬親撫養是後罷令不聽政事太后行不正内寵李奕獻文因事誅之太后不得意獻文暴崩時言太后為之也承眀元年尊曰太皇太后復臨朝聽政后性聰達自入宫掖粗學書計及登尊極省決萬機孝文詔諸鷙鳥傷生之類宜放之山林乃罷鷹師曹以其地為太后立報徳佛寺太后與孝文遊於方山顧瞻川阜有終焉之志因謂羣臣曰舜𦵏蒼梧二妃不從豈必逺祔山陵然後為貴哉吾百歲之後神其安此孝文乃詔有司營建夀陵於方山又起永固石室將為清廟焉太和五年起作八年而成刋石立碑頌太后功徳太后以帝富於春秋乃作勸戒歌三百餘章又作皇誥十八篇太后性儉素不好華飾躬御縵繒而已宰人上膳案裁徑尺羞餚滋味十分減八太后嘗以體不安服菴閭子宰人昬而進粥有蝘蜓在焉后舉匕得之帝時侍側將加殛罰太后笑而釋之自太后臨朝專政帝雅性孝謹不欲參決事無巨細一禀於太后太后多智猜忌能行大事生殺賞罰決於俄頃多有不關帝者是以威福兼作震動内外故把道徳王遇張祐苻承祖等㧞自微閹歲中而至王公王叡出入臥内數年之間便為宰輔賞賚千萬億計金書鐵劵許以不死之詔李沖以器能受任亦由見寵帷幄宻加賞賚不可勝數太后性嚴眀假有寵侍亦無所縱左右纖介之愆動加捶楚然性不宿憾尋亦待之如初或因此更加富貴是以人人懐於利欲至死而不思退太后曾與孝文幸靈泉池宴羣臣及蕃國使人諸方渠帥各令為其方舞帝上夀太后忻然作歌帝亦和歌遂命羣臣各言其志於是和歌者凡九十人太后外禮人望元丕游眀根等頒賜金帛輿馬每至襃羙叡等皆引丕參之以示無私又自以過失懼人議已小有疑忌便見誅戮迄后之崩孝文不知所生至如李訢李惠之徒猜嫌覆滅者十餘家死者數百人率多枉濫天下寃之十四年崩於太和殿時年四十九其日有雄雉集於太華殿帝勺飲不入口五日諡曰文眀太皇太后𦵏於永固陵帝毁瘠絶酒肉不内御者三年乃於永固陵東北里餘營夀宫遂有終焉瞻望之志及遷洛邑乃自表瀍西以為山園之所而方山虚宫號曰萬年堂云文成元皇后李氏梁國䝉縣人母頓邱王峻之妹也后之生也有異於常父方叔恒言此女當大貴及長資質羙麗太武南征命永昌王仁出夀春軍至后宅因得后及仁鎮長安遇事誅后與其家人送平城宫髙祖登白樓望見羙之乃下臺后得幸於齊庫中遂有娠常太后後問后知之時守庫者亦私書於壁記之别加驗問皆符同及生獻文拜貴人太安二年太后令依故事令后具條記在南兄弟及引所結宗兄洪之悉以付託臨決每一稱兄弟拊胷慟哭遂薨後諡曰元皇后𦵏金陵配饗太廟獻文思皇后李氏中山安喜人南郡王惠之女也姿徳婉淑年十八以選入東宫獻文即位為夫人生孝文帝皇興三年薨𦵏金陵承眀元年追崇號諡配饗太廟孝文貞皇后林氏平涼人也父勝位平涼大守叔父金閭起自閹宦獻文初為定州刺史為乙弗渾所誅及勝兄弟皆死勝無子有二女入掖庭后容色羙麗得幸於孝文生皇子恂以恂將為儲貳太和七年后依舊制薨帝仁恕不欲襲前事而禀文眀太后意故不果行諡曰貞皇后𦵏金陵及恂以罪賜死有司奏追廢后為庶人孝文廢皇后馮氏太師熙之女也太和十七年孝文既終䘮太尉元丕等表以長秋未建六宫無主請正内位孝文從之立后為皇后恩遇甚厚孝文後重引后姊昭儀至洛稍有寵后禮愛漸衰昭儀自以年長且前入宫掖素見待念輕后而不率妾禮后雖性不妬忌時有愧恨之色昭儀規為内主譖構百端尋廢后為庶人后貞謹有徳操遂為練行尼後終於瑤光佛寺孝文幽皇后亦馮熙女母曰常氏本微賤得幸於熙熙元妃公主薨後遂主家事生后與北平公夙文眀太皇太后欲家世貴寵乃簡熙二女俱入掖庭時年十四其一早卒后有姿媚偏見愛幸未㡬疾病太后乃遣還家為尼帝猶留意焉歲餘而太后崩帝服終頗存訪之又聞后素疹痊除遣閹宦䨇三念璽書勞問之遂迎赴洛陽宫及至寵愛過本初當夕宫人稀復進見拜為左昭儀後立為皇后帝頻歲南征后遂與中官髙菩薩私亂及帝在汝南不豫后便公然醜恣中常侍䨇䝉等為其心腹是時彭城公主宋王劉昶子婦也年少嫠居北平公馮夙后之同母弟也后求㛰於孝文孝文許之公主志不願后欲彊之㛰有日矣公主密與侍婢及僮從十餘人乘輕車冐霖雨赴懸瓠奉謁孝文自陳本意因言后與菩薩亂狀帝聞因駭愕未之信而祕匿之此後后漸憂懼與母常氏求託女巫禱厭孝文疾不起一旦得如文眀太后輔少主稱命者賞報不貲又取三牲宫中祅祠假言祈福專為左道母常或自詣宫中或遣侍婢與相報答帝至洛執問菩薩䨇䝉等具得情狀帝以疾卧含溫室夜引后並列菩薩䓁於户外后臨入令搜衣中稱有寸刃便斬后頓首泣謝乃賜坐東楹去御筵二丈餘孝文令菩薩等陳狀又讓后曰汝有祅術可具言之后乞屏左右有所宻狀孝文勑中常侍悉出唯令長秋卿白整在側取衛直刀拄之后猶不言孝文乃以綿堅塞整耳自小語再三呼整無所應乃令后言事隠人莫知之孝文乃喚彭城北海二王令入坐言昔是汝嫂今便他人但入勿避又曰此老嫗欲白刃挿我肋上可窮問本末勿有所難又云馮家女不能復相廢逐且使在宫中空坐有心乃能自死汝等勿謂吾猶有情也帝素至孝猶以文眀太后故未行廢二王出乃賜后辭死訣再拜稽首涕泣及入宫後帝命中官有問於后后罵曰我天子婦當面對豈令汝傳也帝怒􅃯后母常入示與后狀常撻之百餘乃止帝尋南伐后留京師雖以罪失寵而夫人嬪妾奉之如法唯令太子在東宫無朝謁之事帝疾甚謂彭城王勰曰後宫久乖陰徳自絶於天吾死後可賜自盡别宫𦵏以后禮庶掩馮門之大過帝崩梓宫達魯陽乃行遺詔命北海王詳奉宣遺旨長秋卿白整等入授后藥后走呼不肯引決曰官豈有此也此是諸王輩殺我耳整等執持彊之乃含椒而盡梓宫次洛南咸陽王禧等知審死相視曰若無遺詔我兄弟亦當作計去之豈可令失行婦人宰制天下殺我輩也諡曰幽皇后𦵏長陵塋内孝文文昭皇后髙氏司徒公肇之妹也父颺母盖氏凡四男三女皆生於東裔孝文初乃舉室西歸近龍城鎮鎮表后徳色婉豔及至文眀太后親幸北部曹見后竒之入掖庭時年十三初后㓜曽夢在堂内立而日光自窻中照之灼灼而熱后東西避之光猶斜照不已如是數夕怪之以白其父颺颺以問遼東人閔宗宗曰此竒徵也昔有夢日入懐猶生天子况日照之徵此女將被帝命誕育人君之象也後生宣武及廣平王懐樂安公主馮昭儀寵盛宻有母養帝心后自代如洛陽暴薨於汲郡之共縣或云昭儀所賊也宣武之為皇太子二日一朝幽后后拊念慈愛有加孝文出征宣武入朝必久留后宫親視櫛沐母道隆備其後有司請加尊諡曰文昭貴人孝文從之宣武踐阼追尊配饗后先𦵏在長陵東南陵制卑狹乃改營山陵號終寧陵置邑户五百家眀帝時更上尊號太后以同漢晉之典正姑婦之禮廟號如舊文昭遷靈襯於長陵兆内西北六十步初開終寧陵數丈於梓宫上獲大蛇長丈餘黑色頭有王字蟄而不動靈襯既遷還置蛇舊處宣武順皇后于氏大尉烈弟勁之女也宣武始親政事烈時為領軍總心膂之任以嬪御未備左右諷諭稱后有容徳帝乃迎入為貴人時年十四甚見寵愛立為皇后后静黙寛容性不妬忌生皇子三歲夭沒其後暴崩宫禁事祕莫能知悉者世議歸咎於髙夫人𦵏永泰陵諡曰順皇后宣武皇后髙氏文昭皇后弟優之女也宣武納為貴嬪生皇子早夭又生建徳公主後拜為皇后甚見禮重性妬忌宫人希得進御及眀帝即位上尊號曰皇太后尋為尼居瑶光寺非大節慶不入宫中建徳公主始五六歲靈太后出覲母武邑君時天文有變靈太后欲以當禍是夜暴崩天下寃之䘮還瑤光佛寺殯皆以尼禮初孝文幽后之寵也欲專其愛後宫接御多見阻遏孝文時言於近臣稱婦人妬防雖王者亦不能免况士庶乎宣武髙后悍忌嬪御有至帝崩不䝉待接者由是在洛二十餘年皇子全者唯眀帝而已宣武靈皇后胡氏安定臨涇人司徒國珍女也母皇甫氏産后之日赤光四照京兆山北縣有趙胡者善於卜相國珍問之胡云賢女有大貴之表當為天下母生勿過三人知也后姑為尼頗能講道宣武初入講禁中諷左右言后有姿行帝聞之乃召入掖庭為充華世婦而椒庭之中以國舊制相與祈祝皆願生諸王公主不願生太子唯后獨曰豈畏一身之死而令皇家不育冡嫡也及眀帝在孕同列猶以故事相恐勸為他計后故意確然幽夜獨誓云但使所生是男次第當長子子生身死所不辭也既誕眀帝進為充華嬪先是宣武頻䘮皇子自以春秋長矣深加愼謹為擇乳保皆取良家宜子者養於别宫皇后及充華皆不得撫視焉及眀帝踐阼尊為皇太妃尋尊為皇后臨朝聽政猶曰殿下下令施事後改令稱詔羣臣上書曰陛下自稱曰朕太后以眀帝沖㓜未堪親祭欲依周禮夫人與君交獻之義代行祭祀禮官博議以為不可而太后欲以幃幔自鄣觀三公行事重問侍中崔光光便據漢和熹鄧太后薦祭故事太后大恱遂攝行初祀太后性聰悟多才藝略通佛經大義親覽萬機手筆斷決幸西林園法流堂命侍臣射不能者罰之又自射針孔中之大恱賜左右布帛有差先是太后勑造申訟車時御焉出自雲龍大司馬門從宫西北入自千秋門以納寃訟又親䇿孝秀州郡計吏於朝堂太后與眀帝幸華林園宴羣臣於都亭曲水令王公以下賦四言詩太后詩曰化光造物含氣貞眀帝詩曰恭已無為上頼慈英王公以下賜帛有差太后父薨百寮表請公除太后不許尋幸永寧寺觀建刹於九級之基僧尼士女赴者數萬人及改𦵏文昭髙后太后不欲令眀帝主事乃自為䘮主出至終寧陵親奠遣事還哭於太極殿至於訖事皆自主焉後幸左藏王公嬪主從者百餘人皆令任力負布絹即以賜之陳留公李崇章武王融並以所負過多顚仆於地語在李崇傳又幸嵩髙山夫人九嬪公主以下從者數百人升於頂中廢諸滛祀特敬天神不在其例尋幸闕口溫水登雞頭山自射象牙簪一𤼵中之勅示文武時太后得志逼幸清河王懌滛亂肆情為天下所惡領軍元义長秋卿劉騰等奉眀帝於顯陽殿幽太后於北宫於禁中殺懌其後太后從子都統僧敬與備身左右張車渠等數十人謀殺义復奉太后臨朝事不克僧敬坐徙邊車渠等死胡氏多免黜後明帝朝太后於西林園宴文武侍臣飲至日夕义乃起至太后前自陳外云太后欲害己及騰太后答云無此語遂至於極昏太后欲􅂝帝宿宣光殿言母子不相聚久今暮欲共一宿羣臣不可左衛將軍奚康生曰至尊陛下之兒隨陛下可也太后自起援帝下堂去帝前入閤左右競相排閤不得閉康生奪千牛刀斫之乃得定帝既升宣光殿康生乗酒勢將出處分殺义為义所執光禄勲賈粲紿太后曰侍官懐恐不安陛下宜親安慰太后適下殿粲即扶帝出東序前御顯陽殿還閉太后於宣光殿义遂殺康生後劉騰死义又寛怠太后與眀帝及髙陽王雍為計解义領軍太后復臨朝大赦改元自是朝政疏緩威恩不立天下牧守所在貪惏鄭儼汙亂宫掖勢傾海内李神軌徐紀等並見親侍一二年中位總禁要手握王爵輕重在心宣滛於朝為天下所穢文武解體所在亂逆土崩魚爛由於此矣太后自以失徳懼為宗室所嫌僧敬又因聚集宗族遂泣涕諫曰陛下母儀海内豈宜輕脱如此太后大怒自是不召僧敬内為朋黨防蔽耳目眀帝所親幸者太后多以事害焉有宻多道人能胡語帝置於左右太后慮其傳致消息三月三日於城南大巷中殺之方懸賞募賊又於禁中殺領左右鴻臚少卿谷會紹達並帝所親也母子之間嫌隙屢起鄭儼慮禍乃與太后計因潘充華生女太后乃詐以為男使大赦為武泰元年復隂行鴆毒其年二月眀帝暴崩乃奉潘嬪女言太子即位經數日見人心已安始言潘嬪本實生女今宜更擇嗣君遂立臨洮王子釗為帝年始二三歲於是朝野憤歎及爾朱榮稱兵渡河太后盡召眀帝六宫皆令入道太后亦自落髮榮遣騎拘送太后及㓜主於河隂太后對榮多所陳説榮拂衣而起太后及㓜主並沈於河太后妹馮翊君收瘞於䨇靈寺孝武時始𦵏以后禮而追諡曰靈孝眀皇后胡氏靈太后從兄冀州刺史盛之女靈太后欲榮重門族故立為皇后眀帝頗狂酒徳專嬖充華潘氏后及嬪御並無過寵太后為帝選納抑屈人流時博陵崔孝芬范陽盧道約隴西李瓚等女俱為世婦人有訴訟咸見忿責武泰初后既入道遂居於瑤光寺孝武皇后髙氏齊神武之長女也帝見立乃納為后及帝西幸關中降為彭城王韶妃文帝文皇后乙弗氏洛陽人也其先世為吐谷渾渠帥居青海號青海王涼州平后之髙祖莫瓌擁部落入附拜定州刺史封西平公自莫瓌後三世尚公主女乃多為王妃父瑗儀同三司兖州刺史母淮陽長公主孝文之第四女也后羙容儀少言笑年十六文帝納為妃及帝即位以大統元年冊為皇后后性好節儉蔬食故衣珠玉羅綺絶於服玩又仁恕不為嫉妬之心帝益重之生男女十二人多夭折唯太子及武都王戊存焉時新都關中務欲東討蠕蠕宼邊未遑北伐故帝結婚以撫之於是更納悼后命后遜居别宫出家為尼悼后猶懐猜忌復徙后居秦州依子秦州刺史武都王帝雖限大計恩好不忘後宻令養髪有追還之意然事祕禁外無知者六年春蠕蠕舉國度河頗有言虜為悼后之故興此役帝曰豈有百萬之衆為一女子舉也雖然致此勿論朕亦何顔以見將帥邪乃遣中常侍曹寵賫手􅃯令后自盡后奉􅃯揮淚謂寵曰願至尊享千萬歲天下康寧死無恨也因命武都王前與之決遺詔皇太子辭皆悽愴因慟哭久之侍御莫能仰視召僧設供令侍婢數十人出家手為落髮事畢乃入室引被自覆而崩年三十一鑿麥積崖為龕而𦵏神柩將入有二叢雲先入龕中頃之一滅一出後號寂陵及文帝山陵畢手書云萬歲後欲令后配饗公卿乃議追諡曰文帝后祔於太廟廢帝時合𦵏於永陵文帝悼皇后郁久閭氏蠕蠕主阿那瓌之長女也容貎嚴肅有神智大統初蠕蠕屢犯北邊文帝乃與約通好結婚扶風王孚受使奉迎蠕蠕俗以東為貴后之來營幕戶席一皆東向車七百乗馬萬匹駞千頭到黑鹽池魏朝鹵簿文物始至孚奏請正南面后曰我未見魏主故蠕蠕女也魏仗向南我自東面孚無以辭四年正月至京師立為皇后時年十四六年后懐孕將産居於瑤華殿聞上有狗吠聲心甚惡之又見婦人盛飾來至后所后謂左右此為何人醫巫傍侍悉無見者時以為文后之靈産訖而崩年十六𦵏於少陵原十七年合𦵏永陵當會横橋北后梓宫先至鹿苑帝輼輬後來將就次所軸折不進廢帝皇后宇文氏周文帝女也后初産之日有雲氣滿室芬氲久之㓜有風神好陳列女圖置之左右周文曰每見此女良慰人意廢帝之為太子納為妃及即位立為皇后志操眀秀帝深重之專寵後宫不置嬪御帝既廢崩后亦以忠於魏室罹禍恭帝皇后若千氏司空長樂正公惠之女也有容色恭帝納之為妃及即位立為皇后後出家為尼在佛寺薨竟無諡孝静皇后髙氏齊神武之第二女也天平四年詔聘以為皇后神武前後固辭帝不許興和初詔司徒孫騰司空襄城王昶等奉詔致禮以后駕迎於晉陽之丞相第五月立為皇后大赦齊受禪降為中山王妃後降於尚書左僕射楊遵彦北齊武眀皇后婁氏諱昭君贈司徒内于之女也少明悟疆族多聘之並不肯行及見神武城上執役驚曰此眞吾夫也乃使婢通意又數致私財使以聘己父母不得已而許焉神武既有澄清之志傾産以結英豪宻謀祕䇿后嘗參預之及拜勃海王妃閫闈之事悉決焉后髙眀嚴斷雅遵儉約往來外舎侍從不過十人性寛厚不妬忌神武姬侍咸加恩待神武嘗將西討出師后夜㝈生一男一女左右以危急請追告神武后弗聽曰王出統大兵何得以我故輕離軍幕死生命也來復何為神武聞之嗟嘆良乆沙苑敗後侯景屢言請精騎二萬必能取黑獺神武悦以告后后曰若如其言豈有還理得獺失景亦有何利乃止神武逼於蠕蠕欲娶其女而未決后曰國家大計願不疑也及蠕蠕公主至后避正室處之神武愧而拜謝焉曰彼將有覺願絶勿顧慈愛諸子不異已出躬自紡績人賜一袍一袴手縫戎服以帥左右弟昭以功名自達其餘親屬未嘗為請爵位每言有材當用義不以私亂公文襄嗣位進為太妃文宣將受魏禪后責之云汝父如龍汝兄如虎皆以帝王之重不敢妄據云何一朝欲輙行舜禹之事彼是何人汝欲擬之帝所以中止天保初尊為皇太后宫曰宣訓濟南即位尊為太皇太后尚書楊愔等受遺詔輔政疎忌諸王太皇太后宻與孝昭及諸大將定策誅之下令廢立孝昭即位復為皇太后孝昭崩太后又下詔立武成帝大寧二年春太后寢疾衣忽自舉用巫媪言改姓石氏四月辛丑崩於北宫時年六十二五月甲申合𦵏義平陵太后凡孕六男二女皆感夢孕文襄則夢一斷龍孕文宣則夢大龍首尾屬天地張口動目勢狀驚人孕孝昭則夢蠕龍於地孕成武則夢龍浴於海孕魏二后並夢月入懐孕襄城博陵二王夢䑕入衣下后未崩有童謠曰九龍母死不作孝及后崩武成不改服緋袍如故未㡬登三臺置酒作樂宫女進白袍帝怒投諸臺下和士開請止樂帝大怒撾之帝於昆季次實九盖其徵驗也蠕蠕公主者蠕蠕主郁乆閭阿那瓌女也蠕蠕彊盛與西魏通和欲連兵東伐神武病之令杜弼使蠕蠕為世子求婚阿那瓌曰髙王自娶則可神武猶豫尉景與武眀皇后及文襄並勸請乃從之武定三年使慕容儼往聘之號曰蠕蠕公主八月神武迎於下館阿那瓌使其弟秃突佳來送女且報聘仍戒曰待見外孫然後返國公主性嚴毅一生不肯華言神武嘗有病不得徃公主所秃突佳怨恚神武自射堂輿疾就公主其見將䕶如此神武崩文襄從蠕蠕國法蒸公主産一女焉彭城太妃爾朱氏榮之女魏孝莊后也神武納為别室敬重逾於婁妃見必束帶自稱下官神武迎蠕蠕公主還爾朱氏迎於木井北與蠕蠕公主前後别行不相見公主引魚弓仰射翔鴟應弦而落妃引長弓斜射飛鳥亦一飛而中神武喜曰我此二婦並堪擊賊後為尼神武為起佛寺天保初為太妃及文宣狂酒將無禮於太妃太妃不從遂遇禍小爾朱氏兆之女也初為建眀皇后神武納之生任城王未㡬與趙郡公琛私通徙於靈州後適范陽盧景卒上黨太妃韓氏軌之妹也神武微時欲聘之軌母不許及神武貴韓氏夫已死乃納之馮翊太妃鄭氏名大車嚴祖妹也初為魏廣平王妃遷鄴後神武納之寵冠後庭生馮翊王潤神武之征劉蠡升也文襄蒸焉神武還一婢告之二婢為證神武杖文襄一百而幽之武眀后亦見隔絶時彭城爾朱太妃有寵生王子浟神武將有廢立意文襄求救於司馬子如子如來朝偽為不知者請武眀后神武告其故子如曰消難亦姦子如妾如此事正可覆盖妃是王結髮婦常以父母家財奉王王在懐朔被杖背無完膚妃晝夜供給視瘡後避葛榮同走并州貧困然馬屎自作靴恩義何可㤀夫婦相宜女配至尊男承大業又婁領軍勲何宜搖動一女子如草芥况婢言可必信乎神武因使子如鞫之子如見文襄尤之曰男兒何意畏威自誣因敎二婢反辭脅告者自縊乃啟神武曰果虚言神武大悦召后及文襄武眀后遙見神武一步一叩頭文襄且拜且進父子夫妻相泣乃如初神武乃置酒曰全我父子者司馬子如賜之黄金百三十斤文襄贈良馬五十疋髙陽太妃游氏父京之為相州刺史神武尅鄴欲納之京之不許遂牽曵取之京之尋死游氏於諸太妃中最有徳訓諸王公主婚嫁常令主之馮娘者子昂妹也初為魏任城王妃適爾朱世隆神武納之生浮陽公主李娘者延實從妹也初為魏城陽王妃又王娘生永安王浚穆娘生陽平王淹並早卒不為太妃文襄敬皇后元氏魏孝靜帝之姊也孝武帝時封馮翊公主而歸於文襄容徳兼羙曲盡和敬初生河間王孝琬時文襄為世子三日而孝靜幸世子第贈錦繡及布帛萬匹世子辭求通受諸貴禮遺於是十屋皆滿次生兩公主文宣受禪尊為文襄皇后居靜徳宫及天保六年文宣漸致昏狂乃移居於髙陽之宅而取其府庫曰吾兄昔姦我婦我今須報乃滛於后其髙氏女婦無親疏皆使左右亂交之於前以葛為絙令魏安徳主騎上使人推引之又命胡人苦辱之帝又自呈露以示羣下武平中后崩祔𦵏義平陵琅邪公主名玉儀魏髙陽王斌庶生妹也初不見齒為孫騰妓騰又放棄文襄遇諸塗悦而納之遂被殊寵奏魏帝封焉文襄謂崔季舒曰爾由來為我求色不如我自得一絶異者崔暹必當造直諫我亦有以待之及暹諮事文襄不假以顔色居三日暹懐刺墜之於前文襄問何用此為暹悚然曰未得通公主文襄大悦把暹臂入見焉季舒語人曰崔暹常忿吾佞在大將軍前每言叔父合殺及其自作體佞乃體過於吾玉儀同産姊靜儀先適黄門郎崔括文襄亦幸之皆封公主括父子由是超授賞賜甚厚焉文宣皇后李氏諱祖娥趙郡李希宗女也容徳甚羙初為太原公夫人及帝將建中宫髙隆之髙徳正言漢婦人不可為天下母宜更擇羙配楊愔固請依漢魏故事不改元妃而徳正猶固請廢后而立段昭儀欲以結勲貴之援帝竟不從而立后焉帝好捶撻嬪御乃至有殺戮者唯后獨䝉禮敬天保十年改為可賀敦皇后孝昭即位降居昭信宫號昭信皇后武成踐阼逼后滛亂曰若不許我當殺爾兒后懼從之後有娠太原王紹徳至閤下不得見慍曰兒豈不知邪姊姊腹大故不見兒后聞之大慙由是生女不舉帝横刀詬曰爾殺我女我何不殺爾兒對后前築殺紹徳后大哭帝愈怒祼后亂撾撻之后號天不已盛以絹囊流血淋漓投諸渠水良久乃蘓以犢車載送妙勝尼寺后性愛佛法因此為尼齊亡入關隋時得還趙郡段昭儀韶妹也婚夕韶妻元氏為俗弄女壻法戲文宣文宣銜之後因發怒謂韶曰我會殺爾婦元氏懼匿婁太后家終文宣世不敢出昭儀才色兼羙禮遇殆同正嫡後主時改適録尚書唐邕王嬪者琅邪人也嬪姊先適崔修文宣並幸之數數降其夫家超用修為尚書郎薛嬪者本倡家女也年十四五時為清河王岳所好其父求内宫中大被寵嬖其姊亦俱進御文宣後知先與岳通又為其父乞司徒公帝大怒先鋸殺其姊嬪時有娠過産亦從戮孝昭皇后元氏開府元蠻女也初為常山王妃天保末賜姓步六孤孝昭即位立為皇后帝崩從梓宫之鄴始度汾橋武成聞后有竒藥追索之不得使閹人就車頓辱降居順成宫武成既殺樂陵王元后被閟隔不得與家相知宫闈内忽有飛語帝令檢推得后父兄書信元蠻由是坐免官后以齊亡入周氏宫中隋文帝作相放還山東武成皇后胡氏安定胡廷之女其母范陽盧道約女初懐孕有胡僧詣門曰此宅瓠蘆中有月既而生后天保初選為長廣王妃産後主日有鴞鳴於産帳上武成崩尊為皇太后陸媼及和士開宻謀殺趙郡王叡出婁定逺髙文遙為刺史和陸諂事太后無所不至初武成時后與諸閹人䙝狎武成寵幸和士開每與后握槊因此與后姦通自武成崩後數出詣佛寺又與沙門曇獻通布金錢於獻席下又掛寳裝胡牀於獻屋壁武成平生之所御也乃置百僧於内殿託以聽講日夜與曇獻寢處以獻為昭元統僧徒遙指太后以弄曇獻乃至謂之為太上者帝聞太后不謹而未之信後朝太后見二少尼悦而召之乃男子也於是曇獻事亦發皆伏法并殺元山王三郡君皆太后之所昵也帝自晉陽奉太后還鄴至紫陌卒遇大風兼舍人魏僧伽眀風角奏言即時當有暴逆事帝詐云鄴中有急彎弓纒弰馳入南城令鄧長顒幽太后北宫仍有勅内外諸親一不得與太后相見乆之帝迎復太后太后初聞使者至大驚慮有不測每太后設食帝亦不敢嘗周使元偉來聘作述行賦敘鄭莊公克段而遷姜氏文雖不工當時深以為愧齊亡入周恣行姦穢開皇中殂𢎞徳夫人李氏趙郡李叔讓女也初為魏靜帝嬪武成納焉生南陽王仁盛為太妃姊為南安王思好妃坐夫反以燒死太妃聞之發狂而薨文宣五嬪及中人盧勒义妹武成並以為嬪武成崩後胡后令二嬪自殺二嬪悲哭後主為之惻愴私遺衣物令出外避焉盧生淮南王後為太妃又有馬嬪亦得幸為后所妬自縊死彭藥任祥並有女因坐父兄事皆入宫為文宣所幸武成以彭為夫人生齊安王任生丹陽王並為太妃後主皇后斛律氏左丞相光之女也初為皇太子妃後主受禪立為皇后武平三年正月生女帝欲悦光詐稱生男為之大赦光誅后廢在别宫後令為尼齊滅嫁為開府元仁妻後主皇后胡氏隴東王長仁女也胡太后失母儀之道深以為愧欲求悦後主故飾后於東宫令帝見之帝果悦立為𢎞徳夫人進左昭儀大被寵愛斛律后廢陸媪欲以穆夫人代之太后不許祖孝徵請立胡昭儀遂登為皇后陸媪既非勸立又意在穆夫人後忽於太后前作色言曰何物親侄女作如此語言太后問其言為何曰不可道固問之乃曰語大家云太后行多非法不可以訓太后大怒喚后出立剃其髮送令還家帝思見之每致詩以通意後與斛律廢后俱召入内數日而鄴不守後亦改嫁云後主皇后穆氏名邪利本斛律后從婢也母名輕霄本穆子倫婢也轉入侍中宋欽道家姦私而生后莫知氏族或云后即欽道女也小字黄花後字舍利欽道婦妬以輕霄面黥為宋字欽道伏誅黄花因沒入宫有幸於後主宫内稱為舎利大監女侍中陸大姬知其寵養以為女薦為𢎞徳夫人武平元年六月生皇子恒於時後主未有儲嗣陸隂結符以監撫之任不可無主時皇后斛律氏丞相光之女也慮其懐恨先令母養之立為皇太子陸以國姓之重穆陸相對又奏賜姓穆氏胡庶人之廢也陸有助焉故遂立為皇后大赦初有折衝將軍元正烈於鄴城東水中得璽以獻文曰天皇后璽盖石氏所作詔書頒告以為穆氏之瑞焉武成為胡后造真珠裙袴所費不可稱計被火所燒後主既立穆皇后復為營之屬周武遭太后䘮詔侍中薛孤康買等為弔使又遣商胡齎錦綵三萬疋與弔使同徃欲市真珠為皇后造七寳車周人不與交易然而竟造焉先是童謠曰黄花勢欲落清觴滿盃酌言黄花不乆也後主自立穆后以後昏飲無度故云清觴滿盃酌陸息駱提婆詔改姓為穆陸大姬皆以皇后故也后既以陸為母提婆為家不復顧念輕霄輕霄後自療面欲求見為大姬陸媪使禁掌之竟不得見馮淑妃名小憐大穆后從婢也穆后愛衰以五月五日進之號曰續命性慧黠能彈琵琶工歌舞後主惑之坐則同席出則並馬願得生死一處命淑妃處隆基堂淑妃惡曹昭儀所嘗居也悉令反換其地周師之取平陽帝獵於三堆晉州亟告急帝將還淑妃更請殺一圍帝從其言識者以為後主名緯殺圍言非吉徵及帝至晉州城已欲沒矣作地道攻之城䧟十餘步將士乗勢欲入帝勅且止召淑妃共觀之淑妃糚㸃不獲時至周人以木拒塞城遂不下舊俗相傳晉州城西石上有聖人跡淑妃欲往觀之帝恐弩矢及橋故抽攻城木造逺橋監作舎人以不速成受罰帝與妃度橋橋壊至夜乃還稱妃有功勲將立為左皇后即令使馳取禕翟等皇后服御仍與之並騎觀戰東偏少却淑妃怖曰軍敗矣帝遂以淑妃奔還至洪洞戌妃方以粉鏡自玩後聲亂唱賊至於是復走内參自晉陽以皇后衣至帝為按轡命妃著之然後去帝奔鄴太后後至帝不出迎淑妃將至鑿城北門出十里迎之復以淑妃奔青州後主至長安請周武帝乞淑妃帝曰朕視天下如脱屣一老嫗豈與公惜也仍以賜之及帝遇害以淑妃賜代王達甚嬖之淑妃彈琵琶因弦斷作詩曰雖䝉今日寵猶憶昔時憐欲知心斷絶應看膝上絃達妃為淑妃所譖㡬置於死達薨隋文帝將賜達妃兄李詢令着布裙配舂詢母逼令自殺後主以李祖欽女為左昭儀進為左娥英裴氏為右娥英娥英兼取舜妃娥皇女英為名陽休之所制樂人曹僧奴進二女大者嘗忤㫖剥面皮小者以善彈琵琶為昭儀以僧奴為日南王僧奴死又貴其兄弟妙達等數人同日皆為郡王為昭儀别起隆基堂極為綺麗陸媪誣以左道遂殺之又有董昭儀毛夫人彭夫人王夫人小王夫人二李夫人皆嬖寵之毛能彈筝本和士開薦入帝所幸彭夫人亦以音伎進死於晉陽造佛寺與總持相捋大李本𨽻户女以五弦進小李即李貞之女也小王嘗生一男毛兄思安驟升武衛董父賢義由軍主超登開府自餘姻屬多至大官後周文皇后元氏魏孝武之妹也初封平原公主適開府張歡歡姓貪殘遇后無禮孝武殺歡改封后為馮翊公主以配文帝生孝閔帝魏大統十七年薨恭帝三年十二月合𦵏成陵孝閔踐阼追尊為王后武成初又追尊為皇后文宣皇后叱奴氏代人也文帝為丞相納為姬生武帝天和二年六月尊為皇太后建徳三年三月崩五月𦵏永固陵孝閔皇后元氏名胡摩魏文帝第五女也初封晉陽公主帝之為略陽公也尚焉及踐阼立為皇后帝被廢后出俗為尼建徳初武帝誅晉公䕶上帝尊號以后為孝閔皇后居崇義宫周滅后出居里第隋大業十二年殂眀敬皇后獨孤氏太保衛公信之長女也帝之在藩納為夫人二年正月立為皇后四月崩𦵏昭陵武成初追崇為皇后眀帝崩與后合𦵏焉武成皇后阿史那氏突厥木杆可汗俟斤之女也突厥既滅蠕蠕盡有塞表之地志陵中夏文帝方與齊人争衡結以為援俟斤初欲以女配帝既而悔之武帝即位前後累遣使焉保定五年二月詔陳公純許公宇文貴神武公竇毅南安公楊符等備皇后文物及行殿并六宫以下一百二十人至俟斤牙所迎后俟斤忽改圖將以后許齊純等累請不得反命會雷風大起飄壊其穹廬俟斤大懼以為天譴乃禮送后純等奉之以歸天和三年三月至武帝接以親迎之禮后有姿貎善容止帝深敬禮焉宣帝即位尊為皇太后大象元年二月改為天元皇太后隋開皇二年殂年三十二隋文詔有司備禮祔𦵏后於孝陵武皇后李氏名娥姿楚人也于謹平江陵后家被籍沒至長安文帝以后賜武帝後得親幸生宣帝宣政元年七月尊為帝太后大象元年二月改為天元帝太后七月又尊為天皇太后二年二月尊為天元聖皇太后宣帝崩靜帝尊為大帝太后隋開皇初出俗為尼名常悲八年殂以尼禮𦵏於京城南宣皇后楊氏名麗華隋文帝之長女也帝在東宫武帝為帝納后為皇太子妃宣政元年閏六月立為皇后帝後自稱天元皇帝號后為天元皇后尋又立天皇后及左右皇后與后為四皇后二年二月詔以后取象四星於是后及三皇后並加大焉冊授后為天元大皇后又立天中大皇后與后為五皇后焉后性柔婉不妬忌四皇后及嬪御等咸愛而仰之帝後昏暴滋甚喜怒乖度嘗譴后欲加之罪后進止詳閑辭色不撓帝大怒賜后死逼令引決后母獨孤氏詣閤陳謝叩頭流血然後得免帝崩静帝尊后為皇太后居𢎞聖宫初宣帝不豫詔隋文帝入禁中侍疾及大漸劉昉鄭譯等因矯詔以隋文帝受遺輔政后初雖不預謀然以嗣主㓜沖恐權在他族不利於己聞昉譯已行此詔心甚悦後知隋文有異圖意頗不平及行禪代憤怨愈甚隋文内甚愧之開皇初封后為樂平公主後又議奪其志后誓不許乃止太業五年從煬帝幸張掖殂於河西詔還京所司備禮祔𦵏后於定陵宣帝后朱氏名滿月吳人也其家坐事沒入東宫宣帝之為太子后被選掌衣服帝召幸之遂生靜帝大象元年四月立為天元帝后七月改為天皇后二年二月又改為天大皇后后本非良家子又年長於帝十餘歲疎賤無寵以静帝故特尊崇之班亞於楊皇后焉宣帝崩靜帝尊后為帝太后隋開皇初出俗為尼名法静六年殂以尼禮𦵏於京城西宣帝后陳氏名月儀自云潁川人大將軍山提之第八女也大象元年六月以選入宫拜為徳妃月餘立為天左皇后二年二月改為天左大皇后頃之又詔以坤儀比徳土數惟五四大皇后外增置天中大皇后一人於是以后為天中大皇后帝崩出俗為尼名華光永徽初終山提本爾朱兆之隸仕齊位特進開府東兖州刺史謝陽王武帝平齊拜大將軍封淅陽公大象元年以后父超授上柱國進鄅國公除大宗伯宣帝皇后元氏名樂尚河南洛陽人開府晟之第二女也年十五被選入宫拜貴妃大象元年七月立為天右皇后二年二月改為天右大皇后帝崩出俗為尼名華勝初后與陳皇后同時被選入宫俱拜貴妃及升后又同日受冊帝寵遇二后禮數均等年齒復同特相親愛及為尼後李朱及尉遲后並相繼殞沒而二后貞觀中尚存晟少以元氏宗室拜開府大象初以后父進位上柱國封翼國公宣帝皇后尉遲氏名繁熾蜀公逈之孫女也有羙色初適把公亮子西陽公温以宗婦例入朝帝逼幸之及亮謀逆帝誅温追后入宫拜長貴妃大象二年三月立為天右大皇后帝崩出俗為尼名華道隋開皇十五年殂靜帝司馬皇后名令姬柱國滎陽公消難之女也大象元年二月宣帝傳位於帝七月為帝納后為皇后二年九月隋文帝以后父奔陳廢為庶人後嫁為隋司州刺史李丹妻貞觀初猶存隋文獻皇后獨孤氏諱伽羅河南洛陽人周大司馬衛公信之女也信見文帝有竒表故以后妻焉時年十四帝與后相得誓無異生之子后姊為周眀帝后長女為周宣帝后貴戚之盛莫與為比而后每謙卑自守及周宣帝崩隋文居禁中總百揆后使李圓通謂文帝曰騎虎之勢必不得下勉之及帝受禪立為皇后突厥嘗與中國交市有眀珠一篋價直八百萬幽州總管隂夀白后市之后曰當今戎狄屢寇將士罷勞未若以八百萬分賞有功者百寮聞之畢賀文帝甚寵憚之帝每臨朝后輙與上方輦而進至閤乃止使宫官伺帝政有所失隨時匡諫多所𢎞益候帝退朝而同反宴寢相顧欣然后早失二親常懐感慕見公卿有父母者每為致禮焉有司奏曰周禮百官之妻命於王后憲章具在請依古制后曰以婦人與政或從此漸不可開其源也不許后母謂諸公主曰周家公主類無婦徳失禮於舅姑離薄人骨肉此不順事爾等當誡之后姑子都督崔長仁犯法當斬文帝以后故免之后曰國家之事焉可顧私長仁竟坐死異母弟陁以猫鬼巫蠱祝詛於后坐當死后三日不食為之請命曰陁若蠧政害民者不敢言今坐為妾身請其命陁於是減一等后雅性儉約帝常合止利藥須胡粉一兩宫内不用求之竟不得又欲賜柱國劉嵩妻織成衣領宫中亦無上以后不好華麗有齊時七寳車及鏡臺絶巧麗帝使毁車而以鏡臺賜后后雅好讀書識達今古凡言事皆與上意合宫中稱為二聖嘗夢周阿史那后言受罪辛苦求營功徳明日言之上為立寺追福焉后兄女夫死於并州后嫂以女有娠請不赴𦵏后曰婦人事夫何容不徃其姑在宜自諮之姑不許女遂行后頗仁愛每聞大理決囚未嘗不流涕然性尤妬忌後宫莫敢進御尉遲囘女孫有羙色先在宫中帝於仁夀宫見而悦之因得幸后伺帝聽朝隂殺之上大怒單騎從苑中出不由徑路入山谷間三十餘里髙熲楊素等追及扣馬諫帝太息曰吾貴為天子不得自由髙熲曰陛下豈以一婦人而輕天下帝意少解駐馬良久夜方還宫后候上於閤内及帝至流涕拜謝熲素等和解之上置酒極歡后自此意頗折初后以髙熲是父之家客甚見親禮至是聞熲謂已為一婦人銜之又以熲夫人死其妾生男益不喜之漸加譖毁帝亦毎事唯后言是用后見諸王及朝士有妾孕者必勸帝斥之時皇太子多内寵妃元氏暴薨后意太子愛妾雲氏害之由是諷帝黜髙熲竟廢太子立晉王廣皆后之謀也仁夀二年八月甲子日暈四重己巳太白犯軒轅其夜后崩於永安宫時年五十九𦵏於太陵其後宣華夫人陳氏容華夫人蔡氏俱有寵帝頗惑之由是發疾及危篤謂侍者曰使皇后在吾不及此云宣華夫人陳氏陳武帝女也性聰慧姿貎絶好及陳滅配掖庭後選入宫為嬪時獨孤皇后性妬忌後宫罕得進御唯陳氏有寵煬帝之在藩也隂有奪宗之計規為内助每致禮焉進金蛇金駞等物以取媚於陳氏皇太子廢立之際頗有力焉及文獻皇后崩進位為貴人專房擅寵主斷内事六宫莫與為比及帝大漸遺詔拜為宣華夫人初帝寢疾於仁夀宫夫人與皇太子同侍疾平旦更衣為太子所逼夫人距之得免歸於上所上怪其神色有異問之夫人泣以實對帝恚曰畜生何堪付大事獨孤誠誤我意謂獻皇后也因呼兵部尚書柳述黄門侍郎元巖曰呼我兒述等呼太子帝曰勇也述巖出閤為勑書訖示左僕射楊素素以白太子太子遣張衡入寢遂令夫人及後宫同侍疾者並就别室俄而上崩夫人與諸後官相顧曰事變矣皆色動股慄晡後太子遣使者齎金合帖紙於際親署封字以賜夫人夫人見惶懼以為鴆毒不敢發使者促之乃發見合中有同心結數枚諸宫人相謂曰得免死矣陳氏恚而却坐不肯致謝諸宫人共逼之乃拜使者其夜太子蒸焉煬帝即位出居僊都宫尋召入歲餘而終時年二十九帝深悼之為製神傷賦容華夫人蔡氏丹陽人也陳滅以選入宫為世婦容儀婉嫕帝甚悦之以文獻后故希得進幸后崩漸見寵遇拜為貴人參斷宫掖亞於陳氏帝寢疾加號容華夫人帝崩後亦為煬帝所蒸煬帝愍皇后蕭氏後梁眀帝巋之女也荆揚間以二月生子者不舉后以二月生由是季父岌收養之未㡬岌夫妻俱死轉養舅張軻家軻甚貧窶后躬親勞苦煬帝為晉王文帝選妃於梁卜諸女皆不吉巋乃迎后於舅氏令使者占之曰吉遂冊為妃后性婉順有智識好學解屬文頗知占候文帝大善之煬帝甚寵敬焉及帝嗣位立為皇后帝每遊幸未嘗不隨從時后見帝失徳心知不可不敢措言因為述志賦以自寄其意及帝幸江都臣下離貳有宫人白后曰外間人人欲反后曰任汝奏之宫人言於帝帝大怒曰非汝宜言乃斬之宫人復白后曰宿衛者往往耦語謀反后曰天下事一朝至此大勢已然無可救者何用言徒令帝憂煩耳自是無復言者及宇文化及之亂隨軍至聊城化及敗沒於竇建徳建徳妻曹氏妬悍煬帝妃嬪羙人並使出家并后置於武彊縣是時突厥處羅可汗方盛其可賀敦即隋義城公主也遣使迎后建徳不敢留遂􅂝其孫正道及諸女入於虜庭唐貞觀四年破突厥皆以禮致之歸於京師賜宅於興道里二十一年殂詔以皇后禮於揚州合𦵏於煬帝陵諡曰愍通志卷二十
