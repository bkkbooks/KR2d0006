body:
  text: 通志卷第一百十二宋右廸功郎鄭樵漁仲撰列傳第二十五後漢李固子夑杜喬吳祐延篤史弼盧植趙歧皇甫規張奐段熲陳蕃朱震王允王宏士孫瑞趙戩黨錮劉淑李膺杜密劉祐魏朗夏馥宗慈巴肅范滂尹勲蔡衍羊陟張儉岑晊陳翔孔昱范康檀􅀈劉儒賈彪何顒李固字子堅漢中南鄭人司徒郃之子也郃在藝術𫝊固貌狀有竒表鼎角匿犀足履龜文少好學常歩行尋師不遠千里遂究覽墳籍結交英賢四方有志之士多慕其風而來學京師咸歎曰是復爲李公矣司𨽻益州並命郡舉孝廉辟司空掾皆不就陽嘉二年有地動山崩火災之異公卿舉固對策詔又特問當世之敝爲政所宜固對曰臣聞王道得則隂陽和穆政化乖則崩震爲災斯皆關之天心效於成事者也夫化以職成官由能理古之進者有德有命今之進者唯財與力伏聞詔書務求寛博疾惡嚴暴而今長吏多殺伐致聲名者必加遷賞其存寛和無黨援者輙見斥逐是以淳厚之風不宣彫薄之俗未革也前孝安皇帝變亂舊章封爵阿母因造妖孽改亂嫡嗣至令聖躬狼狽親遇其艱今陛下龍興誠當沛然思惟善道而論者猶云方今之事復同於前臣竊惟漢興以來三百餘年聖賢相繼十有八主豈無阿乳之恩豈忘爵賞之寵然上畏天威俯察經典知義不可故不封也今宋阿母雖有功勤但加賞賜足以酬勞何至使裂土開國以乖舊典也夫妃后之家所以少完全者實由爵尊權重天道惡盈不知自損故至顚仆先帝寵遇閻氏位號太疾故其受禍曾不旋踵今梁氏子弟羣從榮顯兼加永平建初故事殆不如此宜令歩兵校尉冀及諸侍中還居黄門之官使權去外戚政歸國家豈不休乎又詔書所以禁侍中尚書中臣子弟不得爲吏察孝亷者以其秉威權容請託故也而中常侍在日月之側聲埶振天下子弟禄任曾無限極雖外託謙黙不干州郡而諂偽之徒望風進舉今可爲設常禁同之中臣可也竊聞長水司馬武宣開陽城門候羊廸等無他功德初拜便眞此雖小失而漸壞舊章先聖法度所宜堅守政敎一跌百年不復陛下之有尚書猶天之有北斗也斗爲天喉舌尚書亦為陛下喉舌斗斟酌元氣運平四時尚書出納王命賦政四海權尊埶重責之所歸宜審擇其人以毗聖政今與陛下共理天下者外則公卿尚書内則常侍黄門譬猶一門之内一家之事安則共其福慶危則通其禍敗刺史二千石外統職事内受法則夫表曲者景必邪源清者流必㓗猶叩樹本百枝皆動也陛下宜開石室陳圖書招㑹羣儒引問得失指擿變象以求天意其言有中理卽時施行顯拔其人以表能者則聖聽日有所聞忠臣盡其所知又宜罷退宦官去其權重裁置常侍二人方直有德者省事左右小黄門五人才智閑雅者給事殿中如此則論者厭塞升平可致也順帝覽其對多所納用卽時出阿母還舎諸常侍悉叩頭謝罪朝廷肅然以固為議郎而阿母宦者疾固言直因詐飛章以陷其罪事從中下大司農黄向等請之於大將軍梁商又僕射黄瓊救明固事久乃得拜議郎出爲廣漢雒令至白水關解印綬還漢中杜門不交人事歳中梁商請為從事中郎商以后父輔政而柔和自守不能有所整裁災異數見下權日重固乃奏記於商欲令商先正風化退辭髙滿而商不能用永和中荆州盗賊起彌年不定乃以固為荆州刺史固到遣吏勞問境内赦冦盗前釁與之更始於是賊帥夏密等斂其魁黨六百餘人自縛歸首固皆原之遣還使自相招集開示威法半歳間餘類悉降州内清平上奏南陽太守髙賜等贓穢賜等懼罪遂共重賂大將軍梁冀冀爲千里移檄而固持之愈急冀遂令徙固爲太山太守時太山盗賊屯聚歷年郡兵常千人追討不能制固到悉罷遣歸農但選留任戰者百餘人以恩信招誘之未滿歳賊皆弭散遷將作大匠上疏陳事曰自陛下撥亂初登大位聘南陽樊英江夏黄瓊廣陵楊厚㑹稽賀純䇿書嗟嘆待以大夫之位是以巖穴幽人智術之士彈冠振衣樂欲爲用厚等在職雖無竒卓然夕惕孳孳志在憂國臣前在荆州聞厚純等以病免歸誠以悵然爲時惜之一日朝㑹見諸侍中並皆年少無一宿儒犬人可顧問者誠可歎息宜徵還厚等以副衆望瓊久處議郎已且十年衆人皆怪始隆崇今更滯也光禄大夫周舉才謨髙正宜在常伯訪以言議侍中杜喬學深行直當世良臣久託疾病可勑令起又薦陳留楊倫河南尹存東平王惲陳國何臨清河房植等是日有詔徵用倫厚等而遷瓊舉以固爲大司農先是周舉等八使案察天下多所劾奏其中並是宦者親屬輙爲請乞詔遂令勿考又舊任三府選令史光禄試尚書郎時皆特拜不復選試固乃與廷尉吳雄上疏以爲八使所紏宜急誅罰選舉署置可歸有司帝感其言乃更下免八使所舉刺史二千石自是稀復特拜切責三公明加考察朝廷稱善乃復與光禄勲劉宣上言曰頃選舉牧守多非其人至行無道侵害百姓又宜止盤遊專心庶政帝納其言於是下詔諸州劾奏守令以下政有乖枉遇人無惠者免所居官其姦穢重罪收付詔獄及冲帝卽位以固為太尉與梁冀參録尚書事明年帝崩梁太后以揚徐盗賊盛彊恐驚擾致亂使中常侍詔固等欲須所徵諸侯王到乃發䘮固對曰帝雖幼小猶天下之父今日崩亡人神感動豈有臣子反共掩匿乎昔秦皇亡於沙邱胡亥趙髙隱而不發卒害扶蘇以至亡國近北鄉侯薨閻后兄弟及江京等亦共掩祕遂有孫程手刄之事此天下大忌不可之甚者也太后從之卽暮發䘮固以清河王蒜年長有德欲立之謂梁冀曰今當立帝宜擇長年髙明有德任親政事者願將軍審詳大計察周霍之立文宣戒鄧閻之利幼弱冀不從乃立樂安王子纘年八歳是爲質帝時冲帝將北卜山陵固乃議曰今處䖏寇賊軍興用費加倍新創憲陵賦發非一帝尚幼小可起陵於憲陵塋内依康陵制度其於役費三分減一乃從固議時太后以比遭不造委任宰輔固所匡立毎輙從用其黄門宦者一皆斥遣天下咸望遂平而梁冀專猜每相忌疾初順帝時諸所除官多不以次及固在事奏免百餘人此等既怨又希望冀㫖遂共作飛章誣固罪言固因公行私自隆支黨至於表舉薦逹例皆門徒及所辟召靡非先舊或富室財賂或子壻婚屬其列在宦牒者凡二十九人又廣選賈豎以補令史慕求好馬臨窓呈試出入踰侈輜軿曜目大行在殯路人掩涕固獨胡粉飾貌掻頭弄姿槃旋偃仰從容冶歩曾無慘怛傷悼之心山陵未成違矯舊政善則稱已過則歸君斥逐近臣不得侍送作福作威莫固之甚自固以受任三公之後東南跋扈兩州數郡千里蕭條兆人傷損固不自咎責而乃詆疵先帝茍肆狂狷固之過釁事合誅辟書奏冀以白太后使下其事太后不聽得免冀忌帝聰慧恐為後患遂令左右進鴆帝苦煩甚使促召固固入前問陛下得患所由帝尚能言曰食煮餅今腹中悶得水尚可活時冀亦在側曰恐吐不可飲水語未絶而崩固伏尸號哭推舉侍醫冀慮其事泄大惡之固議立嗣固引司徒胡廣司空趙戒先與冀書曰天下不幸仍遭大憂皇太后聖德當朝攝統萬機明將軍體履忠孝憂存社稷而頻年之間國祚三絶今當立帝天下重器誠知太后埀心將軍勞慮詳擇其人務存聖明然愚情眷眷竊獨有懷遠尋先世廢立舊儀近見國家踐阼前事未嘗不詢訪公卿廣求羣議令上應天心下合衆望且永初以來政事多謬地震宫廟彗星竟天誠是將軍用情之日傳曰以天下與人易爲天下得人難昔昌邑之立昬亂日滋霍光憂愧發憤悔之折骨自非博陸忠勇延年奮發大漢之祀幾將傾矣至憂至重可不熟慮悠悠萬事唯此爲大國之興衰在此一舉冀得書乃召三公中二千石列侯大議所立固廣戒及大鴻臚杜喬皆以爲清河王蒜明德著聞又屬最尊親宜立為嗣先是蠡吾侯志當取冀妹時在京師冀欲立之衆論既異憤憤不得意而未有以相奪中常侍曹騰等聞而夜往說冀曰將軍累世有椒房之親秉攝萬機賓客縱横多有過差清河王嚴明若果立則將軍受禍不久矣不如立蠡吾侯富貴可長保也冀然其言明日重㑹公卿冀意氣凶凶而言辭激切自胡廣趙戒以下莫不憚懾之皆曰唯大將軍令而固獨與杜喬堅守本議冀厲聲曰罷㑹固意旣不從猶望衆心可立復以書勸冀冀愈激怒乃說太后先䇿免固竟立蠡吾侯是為桓帝後歳餘甘陵劉文魏郡劉鮪各謀立蒜為天子冀因此誣固與文鮪共爲妖言下獄門生渤海王調貫械上書證固之枉河内趙承等數十人亦要鈇鑕詣闕通訴太后明之乃赦焉及出獄京師市里皆呼萬歳冀聞之大驚畏固名德終爲己害乃更據奏前事誅之時年五十四臨終與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉爲凶成事為敗乎漢家衰微從此始矣公等受主厚禄顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慙皆長歎流涕州郡收固二子基滋於偃城皆死獄中小子爕得脱亡命冀乃封廣戒而露固尸於四衢令有敢臨者加其罪固弟子汝南郭亮年始成童游學洛陽乃左提章鉞右秉鈇鑕詣闕上書乞收固尸不許因往臨哭陳辭於前遂守䘮不去夏門亭長呵之曰李杜二公爲大臣不能安上納忠而興造無端卿曹何等腐生公犯詔書干試有司乎亮曰亮含隂陽以生戴乾履坤義之所動豈知性命何爲以此相懼亭長歎曰居非命之世天髙不敢不跼地厚不敢不蹐耳目適宜視聽口不可以妄言也太后聞而不誅南陽人董班亦往哭固而殉尸不肯去太后憐之乃聽得襚歛歸𦵏二人由此顯名三公並辟班遂隱身莫知所歸固所著章表奏議敎令對策記銘凡十一篇弟子趙承等悲歎不已乃共論固言迹以爲德行一篇燮字德公初固既策罷知不免禍乃遣三子歸鄉里時燮年十三姊文姫爲同郡趙伯英妻賢而有智見二兄歸具知事本黙然獨悲曰李氏滅矣自太公以來積德累仁何以遇此太公謂祖父郃也密與二兄謀豫藏匿燮託言還京師人咸信之有頃難作下郡收固三子二兄受害文姫乃告父門生王成曰君執義先公有古人之節今委君以六尺之孤李氏存滅其在君矣成感其義乃將燮乘江東下入徐州界内令變姓名爲酒家傭而成賣卜於市各為異人隂相往來燮從受學酒家異之意非常人以女妻燮燮遂得專精經學十餘年間梁冀旣誅而災𤯝屢見史官上言宜有赦令又當存錄大臣寃死者子孫於是大赦天下并求固後嗣燮乃以本末吿酒家酒家具車重厚遣之皆不受遂還鄉里追服姊弟相見悲感傍人既而戒燮曰先公正直爲漢忠臣而遇朝廷傾亂梁冀肆虐令吾宗祀血食將絶今弟幸而得濟豈非天邪宜杜絶衆人勿妄往來慎無一言加於梁氏加梁氏則連主上禍重至矣惟引咎而已燮謹從其誨後王成卒燮以禮𦵏之感傷舊恩每四節爲設上賓之位而祠焉州郡禮命四府並辟皆無所就徵拜議郎及其在位廉方自守所交皆舍短取長好成人之美時潁川荀爽賈彪雖俱知名而不相能燮並交二子情無適莫世稱其平正靈帝時拜安平相先是安平王續爲張角賊所略國家贖王得還朝廷議復其國燮上奏曰續在國無政爲妖賊所虜守藩不稱損辱聖朝不宜復國時議者不同而續竟歸藩燮以謗毁宗室輸作左校未滿嵗王果坐不道被誅乃拜燮爲議郎京師語曰父不肯立帝子不肯立王擢遷河南尹時旣以貨賂爲官詔書復横發錢三億以實西園燮上書陳諫辭義深切帝乃止先是潁川甄邵諂附梁冀爲鄴令有同嵗生得罪於冀亡奔邵邵僞納而隂以告冀冀即捕殺之邵當遷爲郡守㑹母亡邵且埋屍於馬屋先受封然後發䘮邵還至洛陽燮行途遇之使卒投車於溝中笞箠亂下大署帛於其背曰諂貴賣友貪官埋母乃具表其狀邵遂廢錮終身燮在職二年卒時人感其世忠正咸傷惜焉杜喬字叔榮河内林慮人也少爲諸生舉孝亷辟司徒楊震府稍遷爲南郡太守轉東海相入拜侍中漢安元年以喬守光禄大夫使徇察兖州表奏太山太守李固政爲天下第一陳留太守梁讓濟隂太守汜宫濟北相崔瑗等贓罪千萬以上讓卽大將軍梁冀季父宫瑗皆冀所善還拜太子太傅遷大司農時梁冀子弟五人及中常侍等以無功並封喬上書諌曰陛下越從藩臣龍飛卽位天人屬心萬邦攸頼不急忠賢之禮而先左右之封傷善害德興長佞諛臣聞古之明君褒罰必以功過末世闇主誅賞各緣其私今梁氏一門宦者微孽並帶無功之紱裂勞臣之土其爲乖濫胡可勝言夫有功不賞爲善失其望姦回不詰爲惡肆其凶故陳資斧而人靡畏班爵位而物無勸茍遂斯道豈伊傷政爲亂而已䘮身亡國可不慎哉書奏不省益州刺史种暠舉劾永昌太守劉君世以金蛇遺梁冀事發覺以蛇輸司農冀從喬借觀之喬不肯與冀始爲恨累遷大鴻臚時冀小女死令公卿㑹䘮喬獨不往冀又銜之遷光禄勲建和元年代胡廣爲太尉桓帝將納冀妹冀欲令以厚禮迎之喬據執舊典不聽又冀屬喬舉氾宫爲尚書喬以宫贓罪明著遂不肯用因此日忤於冀先是李固見廢内外羣臣䘮氣側足而立惟喬正色無所回撓由是海内歎息朝野瞻望焉在位數月以地震免宦者唐衡左悺等因共譖於帝曰陛下前當卽位喬與李固抗議言上不堪奉漢宗祀帝亦怨之及清河王蒜事起梁冀遂諷有司劾喬及李固與劉鮪交通請逮案罪而梁太后素知喬忠但策免而已冀愈怒使人脅喬曰早從宜妻子可得全喬不肯明日冀遣騎至其門不聞哭者遂白執繫之死獄中妻子歸故郡與李固俱暴尸於城北家屬故人莫敢視者喬故掾陳留楊匡聞之號泣星行到洛陽乃著故赤幘託為夏門亭吏守衛尸䘮驅䕶蠅蟲積十二日都官從事執之以聞梁太后義而不罪匡於是帶鈇鑕詣闕上書并乞李杜二公骸骨太后許之成禮殯殮送喬䘮還家葬送行服隱匿不仕匡初好學常在外黄大澤敎授門徒補蘄長政有異績遷平原令時國相徐曾中常侍璜之兄也匡恥與接事託疾牧豕云吳祐字季英陳留長垣人也父恢爲南海太守祐年十二隨從到官恢欲殺青簡以寫經書殺青者以火炙簡令汗取其青易書復不蠧謂之殺青亦曰汗簡見劉向别錄祐諫曰大人踰越五嶺逺在海濱其俗誠陋然舊多珍怪上爲國家所疑下爲權戚所望此書若成則載之兼兩車有兩輪故稱兩也昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間誠先賢所慎也恢乃止撫其首曰吳氏世不乏季子矣及年二十䘮父居無儋石而不受贍遺常牧豕於長垣澤中行吟經書遇父故人謂曰卿二千石子而自業賤事縱子無耻奈先君何祐辭謝而已守志如初後舉孝廉將行郡中爲祖道祐越壇共小吏雍邱黄眞歡語移時與結友而别功曹以祐倨請黜之太守曰吳季英有知人之明卿且勿言眞後亦舉孝亷除新蔡長世稱其清節時公沙穆來遊太學無資糧乃變服客傭爲祐賃舂祐與語大驚遂共定交於杵臼之間祐以光禄四行遷膠東侯相時濟北戴宏父爲縣丞宏年十六從在丞舍祐每行園常聞諷讀之音竒而厚之亦與爲友卒成儒宗知名東夏官至酒泉太守祐政惟仁簡以身率物民有爭訴者輙閉閤自責然後斷其訟以道譬之或身到閭里重相和解自是之後爭隙省息吏民懷而不欺嗇夫孫性私賦民錢市衣以進其父父得而怒曰有君如是何忍欺之促歸伏罪性慙懼詣閤持衣自首祐屛左右問其故性具談父言祐曰掾以親故受汚穢之名所謂觀過斯知仁矣使歸謝其父還以衣遺之又安邱男子母邱長與母俱行市道遇醉客辱其母長殺之而亡安邱追蹤於膠東得之祐呼長謂曰子母見辱人情所耻然孝子忿必慮難動不累親今若背親逞怒白日殺人赦若非義刑若不忍將如之何長以械自繋曰國家刑法囚身犯之明府雖加哀矜恩無所存祐問長有妻子乎對曰有妻未有子也卽移安邱送長妻到解其桎梏使同宿獄中妻遂懷孕至冬盡行刑長泣謂母曰負母應死何以報吳君乎乃齧指而吞之含血言曰妻若生子名之吴生言我臨死吞指爲誓屬兒以報吳君因投繯而死祐在膠東九年遷齊相大將軍梁冀表爲長史及冀誣奏太尉李固祐聞而請見與冀爭之不聽時扶風馬融在坐爲冀章草祐因謂融曰李公之罪成於卿手李公卽誅卿何面目見天下之人乎冀怒起而入室祐亦徑去冀遂出祐爲河間相因自免歸家不復仕躬灌園蔬以經書敎授年九十八卒長子鳯官至樂浪太守少子愷新息令鳯子馮鮦陽侯相皆有名於世延篤字叔堅南陽犨人也少從潁川唐溪典受左氏傳旬日能諷之典深敬焉又從馬融受業博通經傳及百家之言能著文章有名京師舉孝廉爲平陽侯相到官表龔遂之墓立銘祭祠擢用其後於畎畆之間以師䘮棄官奔赴五府並辟不就桓帝以博士徵拜議郎與朱穆邊韶共著作東觀稍遷侍中帝數問政事篤詭辭宻對動依典義遷左馮翊桓帝徵拜京兆尹其政用寛仁憂恤民黎擢用長者與參政事郡中歡愛三輔咨嗟焉先是陳留邊鳯爲京兆尹亦有能名郡人爲之語曰前有趙張三王後有邊延二君時皇子有疾下郡縣出珍藥而大將軍梁冀遣客齎書詣京兆并貨牛黄篤發書收客曰大將軍椒房外家而皇子有疾必應陳進醫方豈當使客千里求利乎遂殺之冀慙而不得言有司承㫖欲求其事篤以病免歸敎授家巷時人或疑仁孝前後之證篤乃著論而爲之辯有足稱者前越嶲太守李文德素善於篤時在京師謂公卿曰延叔堅有王佐之才奈何屈千里之足乎欲令引進之篤聞乃為書止文德曰夫道之將廢所謂命也流聞乃欲相爲求還東觀來命雖篤所未敢當吾嘗昧爽櫛梳坐於客堂朝則誦羲文之易虞夏之書歷公旦之典禮覽仲尼之春秋夕則消搖内階詠詩南軒百家衆氏投閒而作洋洋乎其盈耳也煥爛兮其溢目也紛紛欣欣兮其獨樂也當此之時不知天之爲蓋地之爲輿不知世之有人己之有軀也雖漸離擊筑傍若無人髙鳯讀書不知暴雨方之於吾未足况也且吾自束修已來爲人臣不䧟於不忠爲人子不䧟於不孝上交不諂下交不黷從此而殁下見先君逺祖可不慚赧如此而不以善止者恐如敎羿習射者也慎勿迷其本棄其生也後遭黨事禁錮永康元年卒於家鄉里圖其形於屈原之廟篤論解經傳多所駮正後儒服䖍等以爲折中所著詩論銘書應訊表敎令凡二十篇云史弼字公謙陳留考城人也父敞順帝時以佞辯至尚書郡守弼少篤學聚徒數百仕州郡辟公府遷北軍中候是時桓帝弟渤海王悝素行險辟僭傲多不法弼懼其驕悖爲亂乃上封事言其僭慢無狀宜詔公卿平處其法帝以至親不忍下其事後悝竟坐逆誅貶爲癭陶王弼遷尚書出爲平原相時詔書下舉鉤黨郡國所奏相連及者或至數百惟弼獨無所上詔書前後切却州郡髠笞掾史從事坐傳責曰詔書疾惡黨人㫖意懇惻青州六郡其五有黨近國甘陵亦考南北部平原何理而得獨無弼曰先王疆理天下畫界分境水土異齊風俗不同他郡自有平原自無胡可相比若承望上司誣陷良善滛刑濫罰以逞非理則平原之人户可爲黨相有死而已所不能也從事大怒即收郡僚職送獄遂舉奏弼㑹黨禁中解弼以俸贖罪得免濟活者千餘人弼爲政特挫抑彊豪其小民有罪多所容貸遷河東太守被一切詔書當舉孝廉弼知多權貴請託乃豫勑斷絶書屬中常侍侯覽果遣諸生齎書請之并求假鹽稅積日不得通生乃説以他事謁弼而因逹覽書弼大怒曰太守忝荷重任當選士報國爾何人而偽詐無狀命左右引出楚捶數百府丞掾史十餘人皆諌於廷弼不對遂付安邑獄卽日考殺之侯覽大怨遂詐作飛章下司隸誣弼謗誹檻車徵吏民莫敢近者惟前孝亷裴瑜送至崤澠之間大言於道傍曰明府摧折虐臣選德報國如其獲罪足以垂名竹帛願不憂不懼弼曰誰謂荼苦其甘如薺昔人刎頸九死不恨及下廷尉詔獄平原吏人奔走詣闕訟之又前孝廉魏邵毁變形服詐爲家僮贍䕶於弼弼遂受誣事當棄市邵與同郡人賣郡邸行賂於侯覽得減死罪一等論輸左校時人或譏曰平原行貨以免君無乃蚩乎陶邱洪曰昔文王牖里閎散懷金史弼遭患義夫獻寶亦何疑焉於是議者乃息刑竟歸田里稱病閉門不出數爲公卿所薦議郎何休又訟弼有幹國之器宜登台相徵拜議郎侯覽等惡之光和中出爲彭城相㑹病卒裴瑜位至尚書盧植字子幹涿郡涿人也身長八尺二寸音聲如鐘少與鄭元俱事馬融能通古今學好研精不守章句融外戚豪家多列女娼歌舞於前植侍講積年未嘗轉盻融以是敬之學終辭歸闔門敎授性剛毅有大節常懷濟世志不好辭賦能飲酒一石時皇后父大將軍竇武援立靈帝初秉機政朝議欲加封爵植雖布衣以武素有名譽乃獻書於武深寓䂓諫而武不能用州郡數命植皆不就建寧中徵爲博士乃始起焉熹平四年九江蠻反四府選植才兼文武拜九江大守蠻冦賓服以疾去官作尚書章句三禮解詁時始立太學石經以正五經文字植乃上書曰臣少從通儒故南郡太守馬融受古學頗知今之禮記特多回冗臣前以周禮諸經發起粃謬敢率愚淺爲之解詁而家乏無力供繕寫上願得將能書生二人共詣東觀就官財糧專心研精合尚書章句考禮記失得庻裁定聖典刋正碑文古文科斗近於爲實而厭抑流俗降在小學中興以來通儒逹士班固賈逵鄭興父子並敦悅之今毛詩左氏周禮各有傳記其與春秋共相表裏宜置博士爲立學官以助後來以廣聖意會南夷反叛以植嘗在九江有恩信拜爲廬江太守植深達政宜務存清靜𢎞大體而已歳餘復徵拜議郎與諫議大夫馬日磾議郎蔡邕楊彪韓説等並在東觀校中書五經記傳補續漢記帝以非急務轉爲侍中遷尚書光和元年有日食之異植上封事陳消禦之道凡有八事其一曰用良謂宜使州郡覈舉賢良隨方委用責求選舉其二曰原禁謂凡諸黨錮多非其罪可加赦恕其三曰禦癘謂宋后家屬並以無辜委骸横尸不得改𦵏疫癘之來皆由於此宜勑收拾以安遊魂其四曰備寇謂侯王之家賦稅減削愁窮思亂必致非常宜使給足以防未然其五曰修禮謂應徵有道之人若鄭元之徒陳明洪範禳服災咎其六曰遵堯謂今郡守刺史一月數遷宜依黜陟以章能否縱不九載可滿三嵗其七曰御下謂請謁希爵一宜禁塞遷舉之事責成主者其八曰散利謂天子之體理無私積宜𢎞大務蠲畧細微帝不省中平元年黄巾賊起四府舉植拜北中郎將持節以䕶烏桓中郎將宗資副將北軍五校士發諸郡兵征之連戰破賊帥張角斬獲萬餘人角等走保廣宗植築圍鑿塹造作雲梯垂當拔之帝遣小黄門左豐詣軍觀賊形勢或勸植以賂送豐植不肯豐還言於帝曰廣宗賊易破耳盧中郎固壘息軍以待天誅帝怒遂檻車徵植減死罪一等及車騎將軍皇甫嵩討平黄巾盛稱植行師方畧嵩皆資用䂓謀濟成其功以其年復爲尚書帝崩大將軍何進謀誅中官乃召并州牧董卓以懼太后植知卓凶悍難制必生後患固止之進不從及卓至果陵虐朝廷乃大會百官於朝堂議欲廢立羣僚無敢言植獨抗議不同卓怒罷㑹將誅植語在卓傳植素善蔡邕邕前徙朔方植獨上書請之邕時見親於卓故往請植事又議郎韓伯諫卓曰盧尚書海内大儒人之望也今先害之天下震怖卓乃止但免植官而已植以老病求歸懼不免禍乃詭道從轘轅出卓果使人追之到懷不及遂隱於上谷不交人事冀州牧袁紹請爲軍師初平三年卒臨困勑其子儉葬於土穴不用棺椁附體單帛而已所著碑誄表記凡六篇建安中曹操北討柳城過涿郡告守令曰故北中郎將盧植名著海内學爲儒宗士之楷模國之楨幹也昔武王入殷封商容之閭鄭䘮子産仲尼隕涕孤到此州嘉其餘風春秋之義賢者之後宜有殊禮亟遣丞掾除其墳墓存其子孫并致薄醊以彰厥德子毓知名魏史有傳趙歧字邠卿京兆長陵人也初名嘉生於御史臺因字臺卿後避難故自改名字示不忘本土也歧少明經有才藝娶扶風馬融兄女融外戚豪家歧常鄙之不與融相見仕州郡以廉直疾惡見憚年三十餘有重疾卧蓐七年自慮奄忽以爲遺令勑兄子曰大丈夫生世遯無箕山之操仕無伊吕之勲天不我與復何言哉可立一員石於吾墓前刻之曰漢有逸人姓趙名嘉有志無時命也奈何其後疾瘳永興二年辟司空掾議二千石得去官爲親行服朝廷從之其後爲大將軍梁冀所辟為陳損益求賢之策冀不納舉理劇爲皮氏長㑹河東太守劉祐去郡而中常侍左琯兄勝代之歧耻疾宦官即日西歸京兆延篤復以爲功曹先是中常侍唐衡兄玹爲京兆虎牙都尉郡人以玹進不由德皆輕侮之歧又數爲貶議玹深毒恨延熹元年玹為京兆尹歧懼禍及與從子戩逃避之玹果收歧家屬宗親陷以重法盡殺之歧遂逃難四方江淮海岱靡所不歴自匿姓名賣餅北海市中時安邱孫嵩年二十餘遊市見歧察非常人停車呼與共載歧懼失色嵩乃下帷令騎屏行人密問歧曰視子非賣餅者又相問而色動不有重怨即亡命乎我北海孫賓石闔門百口埶能相濟歧素聞嵩名即以實告之遂以俱歸嵩先入白母曰出行從乃得死友迎入上堂饗之極歡藏歧複壁中數年歧作戹屯歌二十三章後諸唐死滅因赦乃出三府聞之同時並辟九年乃應司徒胡廣之命㑹南匈奴鮮卑反叛公卿舉歧擢拜并州刺史歧欲奏守邊之策未及上㑹坐黨事免因撰次以爲禦寇論靈帝初復遭黨錮十餘載中平元年四方兵起詔選故刺史二千石有文武才用者徵歧拜議郎車騎將軍張溫西征關中請補長史别屯安定大將軍何進舉為敦煌太守行至襄武歧與新除諸郡太守數人俱爲賊邊章等所執賊欲脅以爲帥歧詭辭得免展轉長安及獻帝西都復拜議郎稍遷太僕及李傕專政使太傅馬日磾撫慰天下以歧爲副日磾行至洛陽表别遣歧宣揚國命所到郡縣百姓皆喜曰今日乃復見使者車騎是時袁紹曹操與公孫瓚爭冀州紹及操聞歧至皆自將兵數百里奉迎歧深陳天子恩德宜罷兵安人之道又移書公孫瓚爲言利害紹等各引兵去皆與歧期㑹洛陽奉迎車駕歧南到陳留得篤疾經渉二年期者遂不至興平元年詔書徵歧㑹帝當還洛陽先遣衞將軍董承修理宫室歧謂承曰今海内分崩唯有荆州境廣地勝西通巴蜀南當交趾年榖獨登兵人差全歧雖廹大命猶志報國家欲自乘牛車南說劉表可使其身自將兵來衛朝廷與將軍并心同力共奨王室此安上救人之策也承卽表遣歧使荆州督租糧歧至劉表即遣兵詣洛陽助修宫室軍資委輸前後不絶時孫嵩亦寓於表表不爲禮歧乃盛稱嵩素行篤烈因共上爲青州刺史歧以老病遂留荆州曹操時為司空舉以自代光禄勲桓典少府孔融上書薦之於是就拜歧爲太常年九十餘建安六年卒先自為夀藏圖季札子産晏嬰叔向四像居賓位又自畫其像居主位皆為讚頌勑其子曰我死之日墓中聚沙為牀布簟白衣散髮其上覆以單被即日便下下訖便掩歧多所述作著孟子章句三輔決錄傳於時皇甫規字威明安定朝那人也祖父棱度遼將軍父旗扶風都尉永和六年西羌大寇三輔圍安定征西將軍馬賢將諸郡兵擊之不能克規雖在布衣見賢不䘏軍事審其必敗乃上書言狀尋而賢果為羌所没郡將知規有兵畧乃命為功曹使率甲士八百與羌交戰斬首數級賊遂退郡舉規上計掾其後羌衆大合攻燒隴西朝廷患之規乃上疏求乞自効曰臣比年以來數陳便宜羌戎未動策其將反馬賢始出頗知必敗誤中之言在可考校臣每惟賢等擁衆數年未有成功縣師之費且百億計出於平人回入姦吏故江湖之人羣為盗賊青徐荒饑襁負流散夫羌戎潰叛不由承平皆由邊將失於綏御乘常守安則加侵暴茍競小利則致大害微勝則虚張首級軍敗則隱匿不言軍士勞怨困於猾吏進不得决戰以徼功退不得溫飽以全命餓死溝渠暴骨中原徒見王師之出不聞振旅之聲酋豪泣血驚懼生變是以安不能久敗則經年臣所以搏手叩心而增歎者也願假臣兩營二部屯列坐食之兵五千出其不意與䕶羌校尉趙冲共相首尾土地山谷臣所暁習兵埶巧便臣以更之可不煩方寸之印尺帛之賜髙可以滌患下可以納降若謂臣年少官輕不足用者凡諸敗將非官爵之不髙年齒之不邁臣不勝至誠没死自陳朝廷不能用冲質之間梁太后臨朝規舉賢良方正對䇿曰伏惟孝順皇帝初勤王政紀綱四方㡬以獲安後遭姦偽威分近習畜貨聚馬受賂賣爵天下擾擾從亂如歸自陛下攝政之初拔用忠貞其餘綱維多所改正遠近翕然望見太平而間者災異不息寇賊縱横者殆以姦臣權重之所致也臣愚以為常侍尤無狀者亟便黜遣披掃凶黨以答天誡又大將軍梁冀河南尹不疑處周召之任為社稷之塡實宜増修謙節輔以儒術省去遊娛不急之務割減廬第無益之飾夫君者舟也民者水也羣臣乘舟者也將軍兄弟操檝者也若能平志畢力以度元元所謂福也如其怠弛將淪波濤可不慎乎夫德不稱禄猶鑿垣之址以益其髙豈安固之道哉凡諸宿猾酒徒戲客皆宜貶斥以懲不軌令冀等深思得賢之福失人之累又在位素餐尚書怠職有司依違莫肯紏察故使陛下專受諛諂之言不聞户牖之外臣誠知阿諛有福深言近禍然豈敢隱心以避誅責乎既對梁冀忿其刺己也以規爲下第拜郎中託疾免歸州郡承冀㫖㡬陷死者再三遂以詩易敎授門徒三百餘人積十四年後梁冀被誅旬月之間禮命五至皆不就時太山賊叔孫無忌侵亂郡縣中郎將宗資討之未服公車特徵拜規太山太守規到官廣設方畧寇虜悉平延熹四年秋叛羌零吾等與先零别種寇鈔關中䕶羌校尉叚熲坐徵後先零諸種陸梁覆没營塢規素悉羌事志自奮効乃上疏曰自臣受任志竭愚鈍實頼兖州刺史牽顥之清猛中郎將宗資之信義得承節度幸無咎譽今猾賊就滅太山畧平復聞羣羌並皆反逆臣生長邠岐年五十有九昔為郡吏再更叛羌豫籌其事有誤中之言臣素有痼疾恐犬馬齒窮不報大恩願乞冗官備單車一介之使勞來三輔宣國威澤以所習地形兵埶佐助諸軍臣窮居孤危之中坐觀郡將已數十年矣自鳥䑕至于東岱其病一也力求猛敵不如清平勤明吳孫未若奉法前變未遠臣誠戚之是以越職盡其區區至冬羌遂大合朝廷以為憂三公舉規爲中郎將持節監關西兵討零吾等破之斬首八百級先零諸種羌慕規威信相勸降者十餘萬明年規因發其騎兵討隴右而道路隔絶軍中大疫死者十三四規親入菴廬巡視將士三軍感悅東羌遂遣使出降涼州復通先是安定太守孫儁受取狼籍屬國都尉李翕督軍御史張稟多殺降羌涼州刺史郭閎漢陽太守趙熹並老弱不堪任職而皆倚恃權貴不遵法度規到州界悉條奏其罪或免或誅羌人聞之翕然反善沈氏大豪滇昌飢恬等十餘萬口復詣規降規出身數年持節爲將擁衆立功還督鄉里旣無他私惠而多所舉奏又惡絶宦官不與交通於是中外並怨遂共誣規貨賂羣羌令其文降天子璽書誚讓相屬規懼不免上疏自訟曰爰自戎醜蠢戾朝廷西顧明詔不以臣愚駑急使軍就道幸䝉威靈遂振國命羌戎諸種大小稽首輙移書營郡以訪誅納所省之費一億以上以為忠臣之義不敢告勞故耻以片言自及微効然比方此事庻免罪悔前踐州界先奏郡守孫儁次及屬國都尉李翕督軍御史張禀旋師南征又上涼州刺史郭閎漢陽太守趙熹陳其過惡執據大辟凡此五官支黨半國其餘墨綬下至小吏所連及者復有百餘吏託報將之怨子思復父之耻載贄馳車懷糧歩走交搆豪門競流謗讟云臣私報諸羌謝其錢貨若臣以私財則家無儋石如物出於官則文簿易考就臣愚惑信如言者前世尚遺匈奴以宫姬鎮烏孫以公主今臣但費千萬以懐叛羌則良臣之才略兵家之所貴將有何罪負義違理乎自永初以來將出不少覆軍有五動資巨億有旋車完封寫之權門而名成功立厚加賞封今臣還督本土糺舉諸郡絶交離親戮辱舊故衆謗隂害固其宜也臣雖汙穢廉㓗無聞今見覆没耻痛實深傳稱鹿死不擇音謹冒昧畧上其年冬徵還拜議郎論功當封而中常侍徐璜左悺欲從求貨數遣賓客就問功狀規終不答璜等忿怒陷以前事下之於吏官屬欲賦斂請謝規誓而不聽遂以餘寇不絶坐繫廷尉論輸左校諸公及太學生張鳯等三百餘人詣闕訟之㑹赦歸家徵拜度遼將軍至營數月上書薦中郎將張奐以自代曰臣聞人無常俗而政有治亂兵無彊弱而將有能否伏見中郎將張奐才畧兼優宜正元帥以從衆望若猶謂愚臣宜充軍事者願乞冗官以為奐副朝廷從之以奐代為度遼將軍規為使匈奴中郎將及奐遷大司農規復代奐為度遼將軍規爲人多意算自以連在大位欲退身避第數上病不見聽㑹友人上郡太守王旻䘮還規縞素越界到亭下迎之因令客密告并州刺史胡芳言規擅逺軍營公違禁憲當急舉奏芳曰威明欲避第仕塗故激發我耳吾當為朝廷愛才何能申此子計邪遂無所問及黨事大起天下名賢多見染逮規雖為名將素譽不髙自以西州豪傑耻不得豫乃先自上言臣前薦故司農張奐是附黨也又臣昔論輸左校時太學生張鳯等上書訟臣是為黨人所附也臣宜坐之朝廷知而不問時人以為規賢在事數嵗北邊威服永康元年徵為尚書其夏日食詔公卿舉賢良方正下問得失規對曰天之於王者猶君之於臣父之於子也誡以災妖使從福祥陛下八年之中三斷大獄一除内嬖再誅外臣而災異猶見人情未安者殆賢愚進退威刑所加有非其理也前太尉陳蕃劉矩忠謀髙世廢在里巷劉祐馮緄趙典尹勲正直多怨流於家門李膺王暢孔翊㓗身守禮終無宰相之階至於鉤黨之釁事起無端虐賢傷善哀及無辜今興改善政易於覆手而羣臣杜口鍳畏前害互相瞻顧莫肯正言伏願陛下暫留聖明容受謇直則前責可弭後福必降對奏不省遷規𢎞農太守封夀成亭侯邑二百户讓封不受再轉為䕶羌校尉熹平三年以疾召還未至卒於榖城年七十一所著賦銘碑讚禱文弔章表敎令書檄牋記凡二十七篇張奐字然明敦煌酒泉人也父惇為漢陽太守奐少遊三輔師事太尉朱寵學歐陽尚書初牟氏章句浮辭繁多有四十五萬餘言奐減為九萬言後辟大將軍梁冀府乃上書桓帝奏其章句詔下東觀以疾去官復舉賢良對策第一擢拜議郎永夀元年遷安定屬國都尉初到職而南匈奴左薁鞬臺耆且渠伯德等七千餘人寇美稷東羌復舉種應之而奐壁唯有二百許人聞卽勒兵而出軍吏以為力不敵叩頭諫止之奐不聽遂進屯長城收集兵士遣將王衛招誘東羌因據龜兹使南匈奴不得交通東羌諸豪遂相率與奐和親共擊薁鞬等連戰破之伯德惶恐將其衆降郡界以寧羌豪帥感奐恩德上馬二十匹先零酋長又遺金鐻八枚奐並受之而召主簿於諸羌前以酒酹地曰使馬如羊不以入廐使金如粟不以入懷悉以金馬還之羌性貪而貴清吏前有八都尉率好財貨為所患苦及奐正身潔己威化大行遷使匈奴中郎將休屠各及朔方烏桓並同反叛燒度遼將軍門引屯赤阬烟火相望兵衆大恐各欲亡去奐安坐帷中與弟子講誦自若軍士稍安乃潛誘烏桓隂與和通遂使斬屠各渠帥襲破其衆諸胡悉降延熹元年鮮卑寇邊奐率南單于擊之斬首數百級明年梁冀被誅奐以故吏免官禁錮奐與皇甫規友善奐既被錮凡諸交舊莫敢為言惟規薦舉前後七上在家四嵗復拜武威太守平均徭賦率厲散敗常為諸郡最河西由是而全其俗多妖忌凡二月五月産子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂改百姓生為立祠舉尤異遷度遼將軍數載間幽并清静九年春徵拜大司農鮮卑聞奐去其夏遂招納南匈奴烏桓數道入塞或五六千騎或三四千騎寇略緣邊諸郡殺畧百姓秋鮮卑復率八九千騎入塞誘引東羌與共盟詛於是上郡沈氐安定先零諸種共寇武威張掖縁邊大被其毒朝廷以為憂復拜奐為䕶匈奴中郎將以九卿秩督幽并涼三州及度遼烏桓三營兼察刺史二千石能否賞賜甚厚匈奴烏桓聞奐至因相率還降凡二十萬口奐但誅其首惡餘皆慰納之唯鮮卑出塞去永康元年春東羌先零五六千騎寇關中圍祋祤掠雲陽夏復攻没兩營殺千餘人冬羌岸尾摩蟞等脅同種復鈔三輔奐遣司馬尹端董卓並擊大破之斬其酋豪首虜萬餘人三州清定論功當封奐不事宦官故賞遂不行惟賜錢二十萬除家一人為郎並辭不受而願徙屬𢎞農華隂舊制邊人不得内移唯奐因功特聽故始為𢎞農人焉建寧元年振旅而還時竇太后臨朝大將軍竇武與太傅陳蕃謀誅宦官事泄中常侍曹節等於中作亂以奐新徵不知本謀矯制使奐與少府周靖率五營士圍武武自殺蕃因見害奐遷少府又拜大司農以功封侯奐深病為節所賣上書固讓封還印綬卒不肯當明年夏青蛇見於御座軒前又大風雨雹霹靂拔樹詔使百僚各言災應奐上疏曰臣聞風為號令動物通氣木生於火相須乃明蛇能屈申配龍騰蟄順至為休徵逆來為殃咎隂氣專用則凝精為雹故大將軍竇武太傅陳蕃或志寧社稷或方直不回前以讒勝並伏誅戮海内黙黙人懷震憤昔周公葬不如禮天乃動威今武蕃忠貞未被明宥妖眚之來皆為此也宜急為改葬徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宫而恩禮不接朝臣莫言逺近失望宜思大義顧復之報天子深納奐言以問諸黄門常侍左右皆惡之帝不得自從轉奐太常與尚書劉猛刁韙衞良同薦王暢李膺可三公之選而曹節等彌疾其言遂下詔切責之奐等皆自囚廷尉數日乃得出並以三月俸贖罪司𨽻校尉王寓出於宦官欲借寵公卿以求薦舉百僚畏憚莫不許諾唯奐獨距之寓怒因此遂陷以黨罪禁錮歸田里奐前為度遼將軍與叚熲爭擊羌不相平及熲為司𨽻校尉欲逐奐歸敦煌將害之奐憂懼奏記謝熲辭㫖哀苦熲雖剛猛省書憐之卒不忍也時禁錮者多不能守靜或死或徙奐閉門不出養徒千人著尚書記難三十餘萬言奐少立志節嘗與士友言曰大丈夫處世當為國家立功邊境及為將帥果有勲名董卓慕之使其兄遺縑百疋奐惡卓為人絶而不受光和四年卒年七十八遺命曰吾前後仕進十要銀艾不能和光同塵為讒邪所忌通塞命也始終常也但地底𡨕𡨕長無曉期而復纒以纊綿牢以釘密為不喜耳幸有前窀朝殞夕下措屍靈牀幅巾而已奢非晉文儉非王孫推情從意庻無咎吝諸子從之武威多為立祠世世不絶所著銘頌書敎誡述志對策章表二十四篇長子芝字伯英最知名芝及弟昶字文舒並善草書至今稱傳之初奐為武威太守其妻懐孕夢帶奐印綬登樓而歌訊之占者曰必將生男復臨兹邦命終此樓旣而生子猛以建安中為武威太守殺刺史邯鄲商州兵圍之急猛恥見擒乃登樓自燒而死卒如占云叚熲字紀明武威姑臧人也其先出鄭共叔叚西域都䕶㑹宗之從曾孫也熲少便習弓馬尚遊俠輕財賄長乃折節好古學初舉孝廉為憲陵園丞陽陵令所在能政遷遼東屬國都尉時鮮卑犯塞熲即率所領馳赴之旣而恐賊驚去乃使驛騎詐齎璽書詔熲於道偽退潛於還路設伏虜以為信然乃入追熲熲因大縱兵悉斬獲之坐詐璽書伏重刑以有功論司寇刑竟拜議郎時太山琅邪賊東郭竇公孫舉等聚衆三萬人破壊郡縣遣兵討之連年不克永夀二年桓帝詔公卿選將有文武者司徒尹訟薦熲乃拜為中郎將擊竇舉等大破斬之獲首萬餘級餘黨降散封熲為列侯賜錢五十萬除一子為郎中延熹二年遷䕶羌校尉㑹燒當燒何當煎勒姐等八種羌寇隴西金城塞熲將兵及湟中義從羌萬二千騎出湟谷擊破之追討南度河使軍吏田晏夏育慕先登懸索相引復戰於羅亭大破之斬其酋豪以下二千級獲生口萬餘人虜皆降走明年春餘羌復與燒何大豪寇張掖攻没鉅鹿塢殺屬國吏民又招同種千餘落并兵晨奔熲軍熲下馬大戰至日中刀折矢盡虜亦引退熲追之且鬭且行晝夜相攻割肉食雪四十餘日遂至河首積石山出塞二千餘里斬燒何大帥首虜五十餘人又分兵擊石城羌斬首溺死者千六百人燒當種九十餘口詣熲降又雜種羌屯聚白石熲復進擊首虜三千餘人冬勒姐零吾種圍允街殺畧吏民熲排營救之斬獲數百人四年冬上郡沈氐隴西牢姐烏吾諸種羌共寇并涼二州熲將湟中義從討之涼州刺史郭閎貪共其功稽固熲軍使不得進義從役久戀鄉舊皆悉反叛郭閎歸罪於熲熲坐徵下獄輸作左校羌遂陸梁覆没營塢轉相招結唐突諸郡於是吏人守闕訟熲以千數朝廷知熲為郭閎所誣詔問其狀熲但謝罪不敢言枉京師稱為長者起於徒中復拜議郎遷并州刺史時滇那等諸種羌五六千人寇武威張掖酒泉燒人廬舎六年寇埶轉盛涼州幾亡冬復以熲為䕶羌校尉乘驛之職明年春羌封僇良多滇那等酋豪三百五十五人率三千落詣熲降當煎勒姐種猶自屯結冬熲將萬餘人擊破之斬其酋豪首虜四千餘人八年春熲復擊勒姐種斬首四百餘級降者二千餘人夏進軍擊當煎種於湟中熲兵敗被圍三日用隱士樊志張策潛師夜出鳴鼔還戰大破之獲首虜數千人熲遂窮追展轉山谷間自春及秋無日不戰虜遂饑困敗散北畧武威間熲凡破西羌斬首二萬三千級獲生口數萬人馬牛羊八百萬頭降者萬餘落封熲都鄉侯邑五百户永康元年當煎諸種復反合四千餘人欲攻武威熲復進擊於鸞鳥大破之殺其渠帥斬首三千餘級西羌於此弭定而東羌先零等自覆没征西將軍馬賢後朝廷不能討遂數寇擾三輔其後度遼將軍皇甫規中郎將張奐招之連年既降又叛桓帝詔問熲曰先零東羌造惡反逆而皇甫規張奐各擁彊衆不時輯定欲熲移兵東討未識其宜可三思術畧熲因上言曰臣伏見先零東羌雖數反逆而降於皇甫規者已二萬許落善惡既分餘寇無幾今張奐躊躇久不進者當慮外離内合兵往必驚且自冬踐春屯結不散人畜疲羸自亡之埶徒更招降坐制彊敵耳臣以為狼子野心難以恩納埶窮雖服兵去復動唯當長矛挾脅白刄加頸耳計東種三萬餘落居近塞内路無險折非有燕齊秦趙從横之埶而久亂并涼累侵三輔西河上郡已各内徙安定北地復至單危自雲中五原西至漢陽二千餘里匈奴種羌竝擅其地是為癰疽伏疾留滯脅下如不加誅轉就滋大今若以騎五千歩萬人車三千兩三冬二夏足以破定無慮用費為錢五十四億如此可令羣羌破盡匈奴長服内徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起於兹作害今不暫疲人則永寧無期臣庻竭駑劣伏待節度帝許之悉聽如所上建寧元年春熲將兵萬餘人齎十五日糧從彭陽直指髙平與先零諸種戰於逢義山虜兵盛熲衆恐熲乃令軍中張鏃利刃長矛三重挾以彊弩列輕騎為左右翼激怒兵將曰今去家數千里進則事成退必盡死努力共功名因大呼衆皆應聲騰赴熲馳騎於傍突而擊之虜衆大潰斬首八千餘級獲牛馬羊二十八萬頭時竇太后臨朝下詔曰先零東羌歴載為患熲前陳狀欲必掃滅渉履霜雪兼行晨夜身當矢石感厲吏士曾未浹日凶醜奔破連尸積俘掠獲無算洗雪百年之逋負以慰忠將之亡魂功用顯著朕甚嘉之須東羌盡定當并錄功勤今且賜熲錢二十萬以家一人為郎中勑中藏府調金錢綵物增助軍費拜熲破羌將軍夏熲復追羌出橋門至走馬水上尋聞虜在奢延澤乃將輕兵兼行一日一夜二百餘里晨及賊擊破之餘虜走向落川復相屯結熲乃分遣騎司馬田晏將五千人出其東假司馬夏育將二千人繞其西羌分六千人攻圍晏等晏等與戰羌潰走熲急進與晏等共追之於令鮮水上熲士卒饑渴乃勒衆推方奪其水虜復散走熲遂與相連綴且鬭且引及於靈武谷熲乃被甲先登士卒無敢後者羌遂大敗棄兵而走追之三日三夜士皆重繭既到涇陽餘寇四千落悉散入漢陽山谷間時張奐上言東羌雖破餘種難盡熲性果慮負敗難常宜且以恩降可無後悔詔書下熲熲復上言臣本知東羌雖衆而輭弱易制所以比陳愚慮思為永寧之算而中郎將張奐說虜彊難破宜用招降聖朝明監信納瞽言故臣謀得行奐計不用事埶相反遂懷猜恨信叛羌之計飾潤辭意云臣兵累見折衂又言羌一氣所生不可誅盡山谷廣大不可空靜血流汙野傷和致災臣伏念周秦之際戎狄為害中興已來羌寇最盛誅之不盡雖降復叛今先零雜種累以反覆攻没縣邑剽略人物發冢露尸禍及生死上天震怒假手行誅昔邢為無道衞國伐之師興而雨臣動兵渉夏連獲甘澍嵗時豐稔人無疵疫上占天心不為災傷下察人事衆和師克自橋門已西落川已東故官縣邑更相通屬非為深險絶域之地車騎安行無慮折衂案奐為漢吏身當武職駐軍二年不能平寇虚欲修文戢戈招降獷敵誕辭空説僭而無徵何以言之昔先零作宼趙充國徙令居内煎當亂邊馬援遷之三輔始服終叛至今為鯁故遠識之士以為深憂今傍郡户口單少數為羌所創毒而欲令降徒與之雜居是猶種枳棘於良田養虺蛇於室内也故臣奉大漢之威建長久之策欲絶其本根不使能殖本規三嵗之費用五十四億今適期年所耗未半而餘寇殘燼將向殄滅臣每奉詔書軍不内御願卒斯言一以任臣臨時量宜不失權便二年詔遣謁者馮禪說降漢陽散羌熲以春農百姓布野羌雖暫降而縣官無廪必當復為盗賊不如乘虚放兵埶必殄滅夏熲自進營去羌所屯凡亭山四五十里遣田晏夏育將五千人據其土山羌悉衆攻之厲聲問曰田晏夏育在此不湟中義從羌悉在何面今日欲决死生軍中恐晏等勸激兵士殊死大戰遂破之羌衆潰東奔復聚射虎谷分兵守諸谷上下門熲規一舉滅之不欲復令散走乃遣千人於西縣結木為柵廣二十歩長四十里遮之分遣晏育等將七千人銜枚夜出西山結營穿塹去虜一里許又遣司馬張愷等將三千人上東山虜乃覺之遂攻晏等分遮汲水道熲自率歩騎進擊水上羌却走因與愷等挾東西山縱兵擊破之羌復敗散熲追至谷上下門窮山深谷之中處處破之斬其渠帥以下萬九千級獲牛馬驢騾氊裘廬帳什物不可勝數馮禪等所招降四千人分置安定漢陽隴西三郡於是東羌悉平凡百八十戰斬三萬八千六百餘級獲牛馬羊騾驢駱駝四十二萬七千五百餘頭費用四十四億軍士死者四百餘人更封新豐縣侯邑萬户熲行軍仁愛士卒病者親自瞻省手為裹創在邊十餘年未嘗一日蓐寢與將士同苦故皆樂為死戰三年春徵還京師將秦胡歩騎五萬餘人及汗血千里馬生口萬餘人詔遣大鴻臚持節慰勞於鎬軍至拜侍中轉執金吾河南尹盗發馮貴人冢坐左轉諫議大夫再遷司𨽻校尉熲曲意宦官故得保其富貴遂黨中常侍王甫枉誅中常侍鄭颯董騰等增封四千戸并前萬四千户明年代李咸為太尉其冬病罷復為司𨽻校尉數嵗轉潁川太守徵拜太中大夫光和二年復代橋元為太尉在位月餘㑹日食自劾有司舉奏詔收印綬詣廷尉時司𨽻校尉陽球奏誅王甫并及熲就獄中詰責之遂飲鴆死家屬徙邊後中常侍吕彊上疏追訟熲功靈帝詔熲妻子還本郡初熲與皇甫威明張然明並知名顯逹京師稱為涼州三明云陳蕃字仲舉汝南平輿人也祖河東太守蕃年十五嘗閑處一室而庭宇蕪穢父友同郡薛勤來候之謂蕃曰孺子何不灑掃以待賓客蕃曰大丈夫處世當掃除天下安事一室乎勤知其有清世志甚竒之初仕郡舉孝廉除郎中遭母憂棄官行䘮服闋刺史周景辟别駕從事以諫爭不合投傳而去後公府辟舉方正皆不就太尉李固表薦徵拜議郎再遷為樂安太守時李膺為靑州刺史名有威政屬城望風皆自引去蕃獨以清績留郡人周璆高潔之士前後郡守招命莫肯至惟蕃能致焉字而不名特為置一榻去則縣之璆字孟玊臨濟人有美名民有趙宣葬親而不閉埏隧因居其中行服二十餘年鄉邑稱孝州郡數禮請之郡内以薦蕃蕃與相見問及妻子而宣五子皆服中所生蕃大怒曰聖人制禮賢者俯就不肖企及且祭不欲數以其易黷故也况乃寢宿冢藏而孕育其中誑時惑衆誣汙鬼神乎遂致其罪大將軍梁冀威震天下時遣書詣蕃有所請託不得通使者詐求謁蕃怒笞殺之坐左轉修武令稍遷拜尚書時零陵桂陽山賊為害公卿議遣討之又詔下州郡一切皆得舉孝廉茂才蕃上疏駮之曰昔髙祖創業萬邦息肩撫養百姓同之赤子今二郡之民亦陛下之赤子也致令赤子為害豈非所在貪虐使其然乎宜嚴勅三府隱覈牧守令長其有在政失和侵暴百姓者卽便舉奏更選清廉奉公之人能班宣法令情在愛惠者可不勞王師而羣賊弭息矣又三署郎吏二千餘人三府掾屬過限未除但當擇善而授之簡惡而去之豈煩一切之詔以長請屬之路乎以此忤左右故出為豫章太守性方峻不接賓客士民亦畏其髙徵為尚書令送者不出郭門遷大鴻臚㑹白馬令李雲抗疏諫桓帝怒當伏重誅蕃上書救雲坐免歸田里復徵拜議郎數日遷光禄勲時封賞踰制内寵猥盛蕃乃上疏諫曰臣聞有事社稷者社稷是為有事人君者容悅是為今臣䝉恩聖朝備位九列見非不諫則容悅也夫諸侯上象四七垂耀在天下應分土蕃屏上國髙祖之約非功臣不侯而聞追録河南尹鄧萬世父遵之微功更爵尚書令黄儁先人之絶封近習以非義授邑左右以無功傳賞授位不料其任裂土莫紀其功至乃一門之内侯者數人故緯象失度隂陽謬序稼用不成民用不康臣知封事已行言之無及誠欲陛下從是而止又比年收斂十傷五六萬人饑寒不聊生活而采女數千食肉衣綺脂油粉黛不可貲計鄙諺言盗不過五女門以女貧家也今後宫之女豈不貧國乎是以傾宫嫁而天下化楚女悲而西宫災且聚而不御必生憂悲之感以致并隔水旱之困夫獄以禁止姦違官以稱才理物若法虧於平官失其人則王道有缺而令天下之論皆謂獄由怨起爵以賄成夫不有臭穢則蒼蠅不飛陛下宜採求得失擇從忠善尺一選舉委尚書三公使褒責誅賞各有所歸豈不幸甚帝頗納其言為出宫女五百餘人但賜儁爵關内侯而萬世南鄉侯延熹六年車駕幸廣城校獵蕃上疏諫曰臣聞人君有事於苑囿唯仲秋西郊順時講武殺禽助祭以敦孝敬如或違此則為肆縱故臯陶戒舜無敎逸遊周公戒成王無槃於遊田虞舜成王猶有此戒况德不及二主者乎夫安平之時尚宜有節况當今之世有三空之戹哉田野空朝廷空倉庫空是謂三空加兵戎未戢四方離散是陛下焦心毀顔坐以待旦之時也豈宜揚旗曜武騁心輿馬之觀乎又前秋多雨民始種麥今失其勸種之時而令給驅禽除路之役非賢聖恤民之意也齊景公欲觀於海放乎琅邪晏子為陳百姓惡聞旌旗輿馬之音舉首嚬眉之感景公為之不行周穆王欲肆車轍馬跡祭公謀父為誦祈招之詩以止其心誠惡逸遊之害人也書奏不納自蕃為光禄勲與五官中郎將黄琬共典選舉不偏權富而為埶家郎所譖訴坐免歸頃之徵為尚書僕射轉太中大夫八年代楊秉為太尉蕃讓曰不愆不忘率由舊章臣不如太常胡廣齊七政訓五典臣不如議郎王暢聰明亮逹文武兼資臣不如弛刑徒李膺帝不許中常侍蘇康管霸等復被任用遂排䧟忠良共相阿媚大司農劉祐廷尉馮緄河南尹李膺皆以忤㫖為之抵罪蕃因朝㑹固理膺等請加原宥升之爵任言及反覆誠辭懇切帝不聽因流涕而起時小黄門趙津南陽大猾張氾等奉事中官乘埶犯法二郡太守劉瓆成瑨考案其罪雖經赦令而並竟考殺之宦官怨恚有司承㫖遂奏瓆瑨罪當棄市又山陽太守翟超没入中常侍侯覽財産東海相黄浮誅殺下邳令徐宣超浮並坐髠鉗輸作左校蕃與司徒劉矩司空劉茂共諫請瓆瑨超浮等帝不悅有司奏劾之矩茂不敢復言蕃乃獨上疏曰臣聞齊桓修霸務為内政春秋於魯小惡必書宜先自整飭後以及人今寇賊在外四支之疾内政不理心腹之患臣寢不能寐食不能飽實憂左右日親忠言以疎内患漸積外難方深陛下超從列侯繼承天位小家畜産百萬之資子孫尚耻媿失其先業况乃産兼天下受之先帝而欲懈怠以自輕忽乎誠不愛已不當念先帝得之勤苦邪前梁氏五侯毒徧海内天啓聖意收而戮之天下之議冀當小平明鑑未逺覆舟如昨而近習之權復相扇結小黄門趙津大猾張汜等肆行貪虐姦媚左右前太原太守劉瓆南陽太守成瑨糾而戮之雖言赦後不當誅殺原其誠心在乎去惡至于陛下有何悁悁悁悁忿恚貌而小人道長熒惑聖聽遂使天威為之發怒如加刑讁已為過甚况乃重罰令伏歐刀乎又前山陽太守翟超東海相黄浮奉公不撓疾惡如讐超沒侯覽財物浮誅徐宣之罪並䝉刑坐不逢赦恕覽之從横沒財已幸宣犯釁過死有餘辜昔丞相申屠嘉召責鄧通洛陽令折辱公主而文帝從而請之光武加以重賞未聞二臣有專命之誅而今左右羣豎惡傷黨類妄相交搆致此刑譴聞臣是言當復嗁訴陛下深宜割塞近習豫政之源引納尚書朝省之事公卿大臣五日一朝簡練清髙斥黜佞邪如是則天和於上地洽於下休禎符瑞豈逺乎哉陛下雖厭毒臣言凡人主有自勉彊敢以死陳帝得奏愈怒竟無所納朝廷衆庻莫不怨之宦官由此疾蕃彌甚凡選舉奏議輙以中詔譴郤長史以下多至抵罪猶以蕃名臣不敢加害瓆字文理髙唐人瑨字幼平陜人並有經術稱處位敢直言多所搏擊知名當時皆死於獄中九年李膺等以黨事下獄考實蕃因上疏極諫曰臣聞賢明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊吕桀紂迷惑亡在失人由此言之君為元首臣為股肱同體相須共成美惡者也伏見前司𨽻校尉李膺太僕杜密太尉掾范滂等正身無㸃死心社稷以忠忤㫖横加考案或禁錮閉隔或徙非所杜塞天下之口聾盲一世之人與秦焚書阬儒何以為異昔武王克殷表閭封墓今陛下臨政先誅忠賢遇善何薄待惡何優夫讒人似實巧言如簧使聽之者惑視之者昬夫吉凶之効存乎識善成敗之機在於察言人君者攝天地之政秉四海之維舉動不可以違聖典進退不可以離道規謬言出口則亂及八方何况髠無罪於獄殺無辜於市乎昔禹廵狩蒼梧見市殺人下車而哭之曰萬方有罪在予一人故其興也勃焉又青徐災旱五榖損傷民物流遷茹菽不足而宫女積於房掖國用盡於羅紈外戚私門貪財受賂所謂禄去公室政在大夫昔春秋之末周德衰微數十年間無復災眚者天所棄也天之於漢悢悢無已故殷勤示變以悟陛下除袄去孽實在修德臣位列台司憂深責重不敢尸禄惜生坐觀成敗如䝉採録使身首分裂異門而出所不恨也帝諱其言切託以蕃辟召非人遂策免之永康元年帝崩竇后臨朝詔以蕃為太傅録尚書事時新遭大䘮國嗣未立諸尚書畏懼權官託病不朝蕃以書責之曰古人立節事亡如存今帝祚未立政事日蹙諸君柰何委荼蓼之苦息偃在牀於義不足焉得仁乎諸尚書惶怖皆起視事靈帝即位竇太后復優詔封蕃髙陽侯食邑三百户蕃上疏辭讓太后不許蕃復固讓章前後十上竟不受封初桓帝欲立所幸田貴人為皇后蕃以田氏卑微竇族良家爭之甚固帝不得已乃立竇后及后臨朝故委用於蕃蕃與后父大將軍竇武同心盡力徵用名賢共參政事天下之士莫不延頸想望太平而帝乳母趙嬈旦夕在太后側中常侍曹節王甫等與共交搆諂事太后太后信之數出詔命有所封拜及其支類多行貪虐蕃常疾之志誅中官會竇武亦有謀蕃自以旣從人望而德於太后必謂其志可申乃先上疏曰臣聞言不直而行不正則為欺乎天而負乎人危言極意則羣凶側目禍不旋踵鈞此二者臣寧得禍不敢欺天也今京師囂囂道路諠譁言侯覽曹節公乘昕王甫鄭颯等與趙夫人諸女尚書並亂天下附從者升進忤逆者中傷方今一朝羣臣如河中木耳汎汎東西耽禄畏害陛下前始攝位順天行誅蘇康管霸並伏其辜是時天地清明人鬼歡喜柰何數月復縱左右元惡大姦莫此之甚今不急誅必生變亂傾危社稷其禍難量願出臣章宣示左右并令天下諸姦知臣疾之太后不納朝廷聞者莫不震恐蕃因竇武謀之語在武傳及事泄曹節等矯詔誅武等蕃時年七十餘聞難作將官屬諸生八十餘人並拔刃突入承明門攘臂呼曰大將軍忠以衛國黄門反逆何云竇氏不道邪王甫時出與蕃相迕適聞其言而讓蕃曰先帝新棄天下山陵未成竇武何功兄弟父子一門三侯又多取掖庭宫人作樂飲讌旬月之間貲財億計大臣若此是為道邪公為棟梁枉橈阿黨復焉求賊遂令收蕃蕃拔劍叱甫甫兵不敢進乃益人圍之數十重遂執蕃送黄門北寺獄黄門從官騶蹋踧蕃曰死老魅復能損我曹員數奪我曹稟假不即日害之徙其家屬於比景宗族門生故吏皆斥免禁錮蕃友人陳留朱震時為銍令聞而棄官哭之收𦵏蕃尸匿其子逸於甘陵界中事覺繫獄合門桎梏震受考掠誓死不言故逸得免後黄巾賊起大赦黨人乃追還逸官至魯相震字伯厚初為州從事奏濟隂太守單匡贓罪并連匡兄中常侍車騎將軍超桓帝收匡下廷尉以譴超超詣獄謝三府諺曰車如雞棲馬如狗疾惡如風朱伯厚王允字子師太原祁人也世仕州郡為冠蓋同郡郭林宗見而竒之曰王生一日千里王佐才也遂與定交年十九為郡吏時小黄門晉陽趙津貪横放恣為一縣巨患允討捕殺之而津兄弟諂事宦官因緣譖訴桓帝帝震怒徵太守劉瓆遂下獄死允送喪還平原終畢三年然後歸家復還仕郡人有路佛者少無名行而太守王球召以補吏允犯顔固爭球怒收允欲殺之刺史鄧盛聞而馳傳辟為别駕從事允由是知名而路佛以之廢棄允少好大節有志於立功常誦習經傳朝夕試馳射三公並辟以司徒髙第為侍御史中平元年黄巾賊起特選拜豫州刺史辟荀爽孔融等為從事上除禁黨討擊黄巾别帥大破之與左中郎將皇甫嵩右中郎將朱儁等受降數十萬於賊中得中常侍張讓賓客書疏與黄巾交通允具發其姦以狀聞靈帝責怒讓讓叩頭陳謝竟不能罪之而讓懷挾忿怒以事中允明年遂傳下獄㑹赦還復刺史旬日間復以他罪被捕司徒楊賜以允素髙不欲使更楚辱乃遣客謝之曰君以張讓之事故一月再徵凶慝難量幸為深計又諸從事好氣決者共流涕奉藥而進之允厲聲曰吾為人臣獲罪於君當服大辟以謝天下豈有乳藥求死乎投柸而起出就檻車既至廷尉左右皆促其事朝臣莫不歎息大將軍何進太尉袁隗司徒楊賜共上疏請之曰夫内視反聽則忠臣竭誠寛賢務能則義士厲節是以孝文裁馮唐之說晉悼宥魏綘之罪允以特選受命誅逆撫順曾未期月州境澄清方欲列其庸勲請加爵賞而以奉事不當當肆大戮責輕罰重有虧衆望臣等備位宰相不敢寢黙誠以允宜䝉三槐之聽以昭忠貞之心書奏得以減死論是冬大赦而允獨不在宥三公咸復為言至明年乃得解釋是時宦者横暴睚眦觸死允懼不免乃變易名姓轉側河内陳留間及帝崩乃奔䘮京師時大將軍何進欲誅宦官召允與謀事請為從事中郎轉河南尹獻帝即位拜太僕再遷守尚書令初平元年代楊彪為司徒守尚書令如故及董卓遷都關中允悉收斂蘭臺石室圖書秘緯要者以從既至長安皆分别條上及集漢朝舊事所當施用者一皆奏之經籍具存允有力焉時董卓尚留洛陽朝政大小悉委之於允允矯性屈意每相承附卓亦推心不生乖疑故得扶持王室於危亂之中臣主内外莫不倚恃允見卓禍毒方深簒逆已兆密與司𨽻校尉黄琬尚書鄭公業等謀共誅之乃上䕶羌校尉楊瓚行左將軍事執金吾士孫瑞為南陽太守並將兵出武關道以討袁術為名實欲分路征卓而後拔天子還洛陽卓疑而留之允乃引内瑞為僕射瓚為尚書二年卓還長安錄入關之功封允為温侯食邑五千戸固讓不受士孫瑞説允曰夫執謙守約存乎其時公與董太師並位俱封而獨崇髙節豈和光之道邪允納其言乃受二千户三年春連雨六十餘日允與士孫瑞楊瓚登臺請霽復結前謀瑞曰自歳末以來太陽不照霖雨積時月犯執法彗孛仍見晝隂夜陽霧氣交侵此期應促盡内發者勝機不可後公其圖之允然其言乃潛結卓將吕布使為内應會卓入賀吕布因刺殺之語在卓傳允初議赦卓部曲吕布亦數勸之既而疑曰此輩無罪從其主耳今若名為惡逆而特赦之適足使其自疑非所以安之之道也吕布又欲以卓財物班賜公卿將校允又不從而素輕布以劍客遇之布亦負其功勞多自誇伐既失意望漸不相平允性剛稜疾惡初懼董卓豺狼故折節圖之卓既殱滅自謂無復患難及在際會每乏溫潤之色杖正持重不循權宜之計是以羣下不甚附之董卓將校及在位者多涼州人允議罷其軍或説允曰涼州人素憚袁氏而畏關東今若一旦解兵關東則必人人自危可以皇甫義真為將軍就領其衆因使留陜以安撫之而徐與關東通謀以觀其變允曰不然關東舉義兵者皆吾徒耳今若距險屯陜雖安涼州而疑關東之心甚不可也時百姓訛言當悉誅涼州人遂轉相恐動其在關中者皆擁兵自守更相謂曰丁彦思蔡伯喈俱以董公親厚並尚從坐今既不赦我曹而欲解兵今日解兵明日當復為魚肉矣卓部曲將李傕郭汜等先將兵在關東因不自安遂合謀為亂攻圍長安城陷吕布奔走布駐馬青瑣門外招允曰公可以去乎允曰若䝉社稷之靈上安國家吾之願也如其不獲則奉身以死之朝廷幼少恃我而已臨難茍免吾不忍也努力謝關東諸公勤以國家為念初允以同郡宋翼為左馮翊王宏為右扶風是時三輔民庻熾盛兵榖富實李傕等欲即殺允懼二郡為患乃先徵翼宏宏遣使謂翼曰郭汜李傕以我二人在外故未危王公今日就徵明日俱族計將安出翼曰雖禍福難量然王命所不得避也宏曰義兵鼎沸在於董卓况其黨與乎若舉兵共討君側惡人山東必應之此轉禍為福之計也翼不從宏不能獨立遂俱就徵下廷尉傕乃收允及翼宏并殺之允時年五十六長子侍中蓋次子景定及宗族十餘人皆見誅害唯兄子晨陵得脫歸鄉里天子感慟百姓䘮氣莫敢收允尸者唯故吏平陵令趙戩棄官營䘮王宏字長文少有氣力不拘細行初為𢎞農太守考案郡中有事宦官買爵位者雖位至二千石皆考掠收捕遂殺數十人威動鄰界素與司𨽻校尉胡种有隙及宏下獄种遂迫促殺之宏臨命詬曰宋翼豎儒不足議大計胡种樂人之禍禍將及之种後眠輙見宏以杖擊之因發病數日死後遷都於許帝思允忠節使改殯葬之遣虎賁中郎將奉策弔祭賜東園祕器贈以本官印綬送還本郡封其孫黑為安樂亭侯食邑三百户士孫瑞字君策扶風人頗有才謀瑞以允自專討董卓之勞故歸功不侯所以獲免於難後為國三老光禄大夫每三公缺楊彪皇甫嵩皆讓位於瑞興平二年從駕東歸為亂兵所殺趙戩字叔茂長陵人性質直多謀初平中為尚書典選舉董卓數欲有所私受戩輙堅拒不聽言色彊厲卓怒召將殺之衆人悚悚而戩辭貌自若卓悔謝釋之長安之亂客於荆州劉表厚禮焉及曹操平荆州乃辟之執戩手曰恨相見晚卒相國鍾繇長史黨錮范氏曰孔子云性相近也習相遠也言嗜惡之本同而遷染之塗異也夫刻意則行不肆牽物則其志流是以聖人導人理性裁抑宕佚愼其所與節其所偏雖情品萬區質文異數至於陶物振俗其道一也叔末澆訛王道陵缺而猶假仁以効已憑義以濟功舉中於理則彊梁禠氣片言違正則厮臺解情蓋前哲之遺塵有足求者霸德既衰狙詐萌起彊者以决勝為雄弱者以詐力受屈至有畫半策而綰萬金開一説而錫琛瑞或起徒步而仕執珪解草衣以升卿相士之飾巧馳辯以要能釣利者不期而景從矣自是愛尚相奪與時回變其風不可留其敝不能反及漢祖仗劍武夫勃興憲令寛賖文禮簡濶緒餘四豪之烈人懷陵上之心輕死重義怨惠必讐令行私庭權移匹庻任俠之方成其俗矣自武帝以後崇尚儒學懐經挾術所在霧㑹至有石渠分爭之論黨同伐異之説守文之徒盛於時矣至王莽專偽終於簒國忠義之流耻見纓紼遂乃榮華邱壑甘足枯槁雖中興在運漢德重開而保身懷方彌相慕襲去就之節重於時矣逮桓靈之間主荒政謬國命委於閹寺士子羞與為伍故匹夫抗憤處士横議遂乃激揚聲名互相題拂品覈公卿裁量執政婞直之風於斯行矣夫上好則下必甚矯枉故直必過其理然矣若范滂張儉之徒清心忌惡終陷黨議不其然乎初桓帝為蠡吾侯受學於甘陵周福及即帝位擢福為尚書時同郡河南尹房植有名當朝鄉人為之謡曰天下規矩房伯武因師獲印周仲進二家賓客互相譏揣遂各樹朋徒漸成尤隙由是甘陵有南北部黨人之議自此始矣後汝南太守宗資任功曹范滂南陽太守成瑨亦委功曹岑晊二郡又為謠曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝𢎞農成瑨但坐嘯因此流言轉入太學諸生三萬餘人郭林宗賈偉節為其冠並與李膺陳蕃王暢更相襃重學中語曰天下模楷李元禮不畏彊禦陳仲舉天下俊秀王叔茂又勃海公族進階扶風魏齊卿並危言深論不隐豪彊自公卿以下莫不畏其貶議屣履到門時河内張成善説風角推占當赦遂敎子殺人李膺為河南尹督促收捕既而逢宥獲免膺愈懐憤疾竟按殺之初成以方伎交通宦官帝亦頗誶其占成弟子牢修因上書誣告膺等多養太學游士交結諸郡生徒更相驅馳共為部黨誹訕朝政疑亂風俗於是天子震怒班下郡國逮捕黨人布告天下使同忿疾遂執膺等其辭所連及陳寔之徒二百餘人或有逃遁不獲皆懸金構募使者四出相望於道明年尚書霍諝城門校尉竇武並表為請帝意稍解乃皆赦歸田里禁錮終身而黨人之名猶書王府自是正直廢放邪枉熾結海内希風之流共相標榜指天下名士為之稱號上曰三君次曰八俊次曰八顧次曰八及次曰八厨猶古之八元八凱也竇武劉淑陳蕃為三君君者言一世之所宗也李膺荀昱杜密王暢劉祐魏朗趙典朱寓為八俊俊者言人之英也郭林宗宗慈巴肅夏馥范滂尹勲蔡衍羊陟為八顧顧者言能以德行引人者也張儉岑晊劉表陳翔孔昱范康檀敷翟超為八及及者言其能導人追宗者也度尚張邈王考劉儒胡母班秦周蕃嚮王章為八厨厨者言能以財救人者也又張儉鄉人朱並承望中常侍侯覽意㫖上書告儉與同鄉二十四人別相署號共為部黨圗危社稷以儉及檀彬禇鳯張肅薛蘭馮禧魏元徐乾為八俊田林張隱劉表薛郁王訪劉祗宣靖公緒恭為八顧宋揩田槃疎耽薛敦宋布唐龍嬴咨宣裦為八及刻石立墠共為部黨而儉為之魁靈帝詔刋章捕儉等大長秋曹節因此諷有司奏捕前黨故司空虞放太僕杜密長樂少府李膺司𨽻校尉朱寓潁川太守巴肅沛相荀昱河内太守魏朗山陽太守翟超任城相劉儒太尉掾范滂等百餘人皆死獄中餘或先殁不及或亡命獲免自此諸為怨隙者因相陷害睚眦之忿濫入黨中又州郡承㫖或有未嘗交關亦離禍毒其死徙者廢禁者六七百人熹平五年永昌太守曹鸞上書大訟黨人言甚方切帝省奏大怒卽詔司𨽻益州檻車收鸞送槐里掠殺之於是又詔州郡更考黨人門生故吏父子兄弟其在位者免官禁錮爰及五屬光和二年上禄長和海上言禮從祖兄弟別居異財恩義已輕服屬疎末而今黨人錮及五族既乖典訓之文有繆經常之法帝覽而悟之黨錮自從祖以下皆得解釋中平元年黄巾賊起中常侍吕彊言於帝曰黨錮久積人多怨苦若不赦宥恐與張角合謀為患滋大帝懼其言乃大赦黨人誅徙之家皆歸故郡其後黄巾遂盛朝野崩離綱紀文章蕩然矣凡黨事始自甘陵汝南成於李膺張儉海内塗炭二十餘年諸所蔓衍皆天下善士三君八俊等三十五人其名迹存者並載于篇陳蕃竇武王暢劉表度尚郭林宗別有傳荀昱附祖淑傳張邈附吕布傳胡母班見袁紹傳王考字文祖東平夀張人冀州刺史秦周字平王陳留平邱人北海相蕃嚮字嘉景魯國人郎中王璋字伯義東萊曲城人少府卿位行並不顯翟超山陽太守事在陳蕃傳字及郡縣未詳朱寓沛人與杜密等俱死獄中唯趙典名見而已劉淑字仲承河間樂成人也祖父稱司隸校尉淑少學明五經遂隱居立精舍講授諸生常數百人州郡禮請五府連辟並不就永興二年司徒种暠舉淑賢良方正辭以疾桓帝聞淑髙名切責州郡使輿病詣京師淑不得已而赴洛陽對策為天下第一拜議郎又陳時政得失災異之占事皆效騐再遷尚書納忠建議多所禆益又再遷侍中虎賁中郎將上疏以為宜罷宦官辭甚切直帝雖不能用亦不罪焉以淑宗室之賢特加敬異每有疑事常密諮問之靈帝即位宦官譖淑與竇武等通謀下獄自殺李膺字元禮潁川襄城人也祖父脩安帝時為太尉父益趙國相膺性簡亢無所交接唯以同郡荀淑陳寔為師友初舉孝廉為司徒胡廣所辟舉髙第再遷青州刺史守令畏其威明多望風棄官復徵再遷漁陽太守尋轉蜀郡太守以母老乞不之官轉烏桓校尉鮮卑數犯塞膺常䝉矢石每破走之虜甚憚懾以公事免官還居綸氏敎授常千人南陽樊陵求為門徒膺謝不受陵後以阿附宦官致位太守為名節者所羞荀爽常謁膺因為其御既還喜曰今日乃得御李君矣其見慕如此永夀二年鮮卑寇雲中桓帝聞膺能乃復徵為度遼將軍先是羌虜及疏勒龜兹數出攻鈔張掖酒泉雲中諸郡百姓屢被其害自膺到邊皆望風懼服先所掠男女悉送還塞下自是之後聲振逺域延熹二年徵再遷河南尹時宛陵大姓羊元羣罷北海郡贓罪狼籍郡舍溷軒有竒巧乃載之以歸膺表欲按其罪元羣行賂宦豎膺反坐輸作左校初膺與廷尉馮緄大司農劉祐等共同心志紏罰姦倖緄祐時亦得罪輸作司隸校尉應奉上疏理膺等遂悉得免刑膺再遷復拜司隸校尉時中常侍張讓弟朔為野王令貪殘無道至乃殺孕婦聞膺威嚴逃還京師因匿兄讓第舍藏於合柱中膺知其狀率將吏卒破柱取朔付洛陽獄受辭畢即殺之讓訴寃於帝詔膺入殿御親臨軒詰以不先請便加誅辟之意膺對曰昔晉文公執衞成公歸于京師春秋是焉禮云公族有罪雖曰宥之有司執憲不從昔仲尼為魯司寇七日而誅少正卯今臣到官已積一旬私懼以稽留為愆不意獲速疾之罪誠自知釁責死不旋踵特乞留五日尅殄元惡退就鼎􅀈始生之願也帝無復言顧謂讓曰此汝弟之罪司隸何愆乃遣出之自此諸黄門常侍皆鞠躬屏氣休沐不敢出宫省帝怪問其故並叩頭泣曰畏李校尉是時朝廷日亂綱紀頽弛膺獨持風裁以聲名自髙士有被其容接者名為登龍門及遭黨事當考實膺等案經三府太尉陳蕃郤之曰今所考按皆海内人譽憂國忠公之臣此等猶將十世宥之豈有罪名不彰而致收掠者乎不肯平署帝愈怒遂下膺等於黄門北寺獄膺等頗引宦官子弟宦官多懼請帝以天時宜赦於是大赦天下膺免歸鄉里居陽城山中天下士大夫皆髙尚其道而汚穢朝廷及陳蕃免太尉朝野屬意於膺荀爽恐其名髙致禍乃為書貽膺欲令屈節以全亂世頃之帝崩陳蕃為太傅與大將軍竇武等共秉朝政連謀誅宦官故引用天下名士乃以膺為長樂少府及陳竇之敗膺等復廢後張儉事起收捕鉤黨鄉人謂膺曰可以去矣膺曰事不辭難罪不逃刑臣之節也吾年六十死生有命去將安之乃詣詔獄考死妻子徙邊門生故吏及其父兄並被禁錮時侍御史蜀郡景毅子顧為膺門徒而未有錄牒故不及於譴毅乃慨然曰本謂膺賢遣子師之豈可以漏奪名籍茍安而已遂自表免歸時人義之膺子瓚位至東平相曹操㣲時瓚異其才將殁謂子宣等曰時將亂矣天下英雄無過曹操張孟卓與吾善袁本初汝外親雖爾勿依必歸曹氏諸子從之並免於亂世杜密字周甫潁川陽城人也為人沈質少有厲俗志為司徒胡廣所辟稍遷代郡太守徵三遷太山太守北海相其宦官子弟為令長有姦惡者輙捕案之行春到髙密縣見鄭元為鄉佐知其異器即召署郡職遂遣就學後密去官還家每謁守令多所陳託同郡劉勝亦自蜀郡告歸鄉里閉門埽軌無所干及太守王昱謂密曰劉季陵清髙士公卿多舉之者密知昱言激己對曰劉勝位為大夫見禮上賓而知善不薦聞惡無言隱情惜己自同寒蟬此罪人也今志義力行之賢而密逹之違道失節之士而密紏之使明府賞刑得中令聞休揚不亦萬分之一乎昱慙服待之彌厚後桓帝徵拜尚書令遷河南尹轉太僕黨事既起免歸本郡與李膺俱坐而名行相次故時人亦稱李杜焉後太傅陳蕃輔政復為太僕明年坐黨事被徵自殺劉祐字伯祖中山安國人也安國後别屬愽陵祐初察孝廉補尚書侍郎閑練故事文札彊辯每有奏議應對無滯為僚類所歸除任城令兖州舉為尤異遷揚州刺史是時㑹稽太守梁旻大將軍冀之從弟也祐舉奏其罪旻坐徵復遷祐河東太守時屬縣令長率多中官子弟百姓患之祐到黜其權豪平理寃結政為三河表再遷延熹四年拜尚書令又出為河南尹轉司隸校尉時權貴子弟罷州郡還入京師者每至界首輙改易輿服隱匿財寶威行朝廷拜宗正三轉大司農時中常侍蘇康管霸用事於内遂固天下良田美業山林湖澤民庻窮困州郡累氣祐貽書所在依科品没入之桓帝大怒論祐輸左校後得赦出復歴三卿輙以辭疾乞骸骨歸田里詔拜中散大夫遂杜門絶跡每三公缺朝廷皆屬意於祐以譖毀不用延篤為書貽之美其冲退靈帝初陳蕃輔政以祐為河南尹及蕃敗黜歸卒于家明年大誅黨人幸不及禍魏朗字少英會稽上虞人也少為縣吏兄為鄉人所殺朗白日操刃報讎於縣中遂亡命到陳國從博士郤仲言學春秋圖緯孔子作春秋緯十二篇又詣太學受五經京師長者李膺之徒爭從之初辟司徒府再遷彭城令時中官子弟為國相多行非法朗與更相章奏幸臣忿疾欲中之會九真賊起乃共薦朗為九真都尉到官奬厲吏兵討破羣賊斬首二千級桓帝美其功徵拜議郎頃之遷尚書屢陳便宜有所補益出為河内太守政稱三河表尚書令陳蕃薦朗公忠亮直宜在機密復徵為尚書會被黨議免歸家朗性矜嚴閉門整法度家人不見墮容後竇武等誅朗以黨被急徵行至牛渚自殺著書數篇號魏子云夏馥字子治陳留圉人也少為書生言行質直同縣髙氏蔡氏並皆富植郡人畏而事之惟馥比門不與交通由是為豪姓所仇桓帝初舉直言不就馥雖不交時宦然以聲名為中官所憚遂與范滂張儉等俱被誣陷詔下州郡捕為黨魁及儉等亡命經歴之處皆被收考辭所連引布徧天下馥乃頓足而歎曰孽自己作空汙良善一人逃死禍及萬家何以生為乃自翦須變形入林慮山中隱匿姓名為冶家傭親突煙炭形貌毀瘁積二三年人無知者後馥弟靜乘車馬載縑帛追之於湼陽市中遇馥不識聞其言聲乃覺而拜之馥避不與語靜追隨至客舎共宿夜中密呼靜曰吾以守道疾惡故為權宦所陷且念營茍全以庇性命弟奈何載物相求是以禍見追也明旦別去黨禁未解而卒宗慈字孝幼南陽人也舉孝㢘九辟公府有道徵不就後為修武令時太守出自權豪多取貨賂慈遂棄官去徵拜議郎未到道疾卒南陽羣士皆重其義行巴肅字恭祖渤海髙城人也初察孝廉歴慎令貝邱長皆以郡守非其人辭病去辟公府稍遷拜議郎與竇武陳蕃等謀誅閹宦武等遇害肅亦坐黨禁錮中常侍曹節後聞其謀收之肅自載詣縣縣令見肅入閤解印綬欲與俱去肅曰為人臣者有謀不敢隱有罪不逃刑既不隱其謀矣又敢逃其刑乎遂遇害刺史賈琮刋立石銘以記之范滂字孟博汝南征羌人也少厲清節為州里所服舉孝廉光禄四行時冀州饑荒盗賊羣起乃以滂為清詔使案察之滂登車攬轡慨然有澄清天下之志及至州境守令自知贓汚望風解印綬去其所舉奏莫不厭塞衆議遷光禄勲主事時陳蕃為光禄勲滂執公儀詣蕃蕃不止之滂懐恨投版棄官而去郭林宗聞而讓蕃曰若范孟博者豈宜以公禮格之令成其去就之名得無自取不優之議也蕃乃謝焉復為太尉黄瓊所辟後詔三府掾屬舉謠言滂奏刺史二千石權豪之黨二十餘人尚書責滂所劾猥多疑有私故滂對曰臣之所舉自非叨穢姦暴深為民害豈以汙簡札哉間以會日迫促故先舉所急其未審者方更參實臣聞農夫去草嘉榖必茂忠臣除姦王道以清若臣有貳甘受顯戮吏不能詰滂覩時方艱知意不行因投劾去太守宗資先聞其名請署功曹委任政事滂在職嚴整疾惡其有行違孝悌不軌仁義者皆埽迹斥逐不與共朝顯薦異節抽拔幽陋滂外甥西平李頌公族子孫而為鄉曲所棄中常侍唐衡以頌請資資用為吏滂以非其人寢而不召資遷怒捶書佐朱零零仰曰范滂清裁猶以利刃齒腐朽今日寧受笞死而滂不可違資乃止郡中中人以下莫不歸怨乃指滂之所用以為范黨後牢修誣言鉤黨滂坐繫黄門北寺獄吏謂曰凡坐繫者皆祭臯陶滂曰臯陶賢者古之直臣知滂無罪將理之於帝如其有罪祭之何益衆人由此而止獄吏將加掠考滂以同囚多嬰病乃請先就格遂與同郡袁忠爭受楚毒桓帝使中常侍王甫以次辨詰滂等皆三木囊頭暴於階下餘人在前或對或否滂忠於後越次而進王甫詰曰君為人臣不惟忠國而共造部黨自相襃舉評論朝廷虚構無端諸所謀結並欲何為皆以情對不得隱飾滂對曰臣聞仲尼之言見善如不及見惡如探湯欲使善善同其清惡惡同其汙謂王政之所願聞不悟更以為黨甫曰卿更相拔舉迭為唇齒有不合者見則排斥其意如何滂乃慷慨仰天曰古之循善自求多福今之循善身陷大戮身死之日願埋滂於首陽山側上不負皇天下不媿夷齊甫愍然為之改容乃得並解桎梏滂後事釋南歸始發京師汝南南陽士大夫迎之有數千兩同囚鄉人殷陶黄穆亦免俱歸衛侍於滂應對賓客滂顧謂陶等曰今子相隨是重吾禍也遂遁還鄉里初滂等繫獄尚書霍諝理之及得逸到京師往候諝而不為謝或有讓滂者對曰昔叔向嬰罪祁奚救之未聞羊舌有謝恩之辭祁老有自伐之色竟無所言建寧二年遂大誅黨人詔下急捕滂等督郵吴導至縣抱詔書閉傳舍伏牀而泣滂聞之曰必為我也即自詣縣獄縣令郭揖大驚出解印綬引與俱亡曰天下大矣子何為在此滂曰滂死則禍塞何敢以罪累君又令老母流離乎其母就與之訣滂白母曰仲博孝敬足以供養滂從龍舒君歸黄泉存亡各得其所惟大人割不可忍之恩勿增感戚母曰汝今得與李杜齊名死亦何恨旣有令名復求夀考可兼得乎滂跪受敎再拜而辭顧謂其子曰吾欲使汝為惡則惡不可為使汝為善則我不為惡行路聞之莫不流涕時年三十三尹勲字伯元河南鞏人也家世衣冠伯父睦為司徒兄頌為太尉宗族多居貴位者而勲獨持清操不以地埶尚人州郡連辟察孝廉三遷邯鄲令政有異迹後舉髙第五遷尚書令及桓帝誅大將軍梁冀勲參建大謀封都鄉侯遷汝南太守上書解釋范滂袁忠等黨議禁錮尋徵拜將作大匠轉大司農坐竇武等事下獄自殺蔡衍字孟喜汝南項人也少明經講授以禮讓化鄉里鄉里有爭訟者輙詣衍決之其所平處皆曰無怨舉孝廉稍遷冀州刺史中常侍具瑗託其弟恭舉茂才衍不受乃收齎書者案之又劾奏河間相曹鼎贓罪千萬鼎者中常侍騰之弟也騰使大將軍梁冀為書請之衍不答鼎竟坐輸作左校乃徵拜議郎符節令梁冀聞衍賢請欲相見衍稱疾不往冀恨之時南陽太守成瑨等以收紏宦官考廷尉衍與議即劉瑜表救之言甚切厲坐免官還家杜門不出靈帝即位徵拜議郎會病卒羊陟字嗣祖太山梁父人也家世冠族陟少清直有學行舉孝廉辟太尉李固舉髙第拜侍御史會固被誅陟以故吏禁錮歴年復舉髙第再遷冀州刺史奏案貪濁所在肅然又再遷虎賁中郎將城門校尉三遷尚書令時太尉張顯司徒樊陵太鴻臚郭防太僕曹陵大司農馮方並與宦豎相姻私公行貨賂並奏罷黜之不納以前太尉劉寵司隸校尉許冰幽州刺史楊熙凉州刺史劉恭益州刺史龎艾清亮在公薦舉升進帝嘉之拜陟河南尹計日受奉常食乾飯茹菜禁制豪右京師憚之㑹黨事起免官禁錮卒於家張儉字元節山陽髙平人趙王張耳之後也父成江夏太守儉初舉茂才以刺史非其人謝病不起延熹八年太守翟超請為東部督郵時中常侍侯覽家在防東殘暴百姓所為不軌儉舉劾覽及其母罪惡請誅之覽遏絶章表並不得通由是結仇覽等鄉人朱並素性佞邪為儉所棄並懐怨恚遂上書告儉與同郡二十四人為黨於是刋章討捕儉得亡命困迫遁走望門投止莫不重其名行破家相容復流轉東萊止李篤家外黄令毛欽操兵到門篤引欽謂曰張儉知名天下而亡非其罪縱儉可得寧忍執之乎欽因起撫篤曰伯玉耻獨為君子足下如何自專仁義篤曰篤雖好義明廷今日載其半矣欽歎息而去篤因緣送儉出塞以故得免其所經歴伏重誅者以十數宗親並殄滅郡縣為之殘破中平元年黨事解乃還鄉里大將軍三公並辟又舉敦朴公車特徵起家拜少府皆不就獻帝初百姓饑荒而儉貲計差溫乃傾竭財産與邑里共之頼其存者以百數建安初徵為衛尉不得已而起儉見曹氏世德已萌乃闔門懸車不豫政事嵗餘卒於許下年八十四岑晊字公孝南陽棘音力陽人父豫為南郡太守以貪叨誅死晊年少未知名往候同郡宗慈慈方以有道見徵賓客滿門以晊非良家子不肯見晊留門下數日晚乃延入慈與語大竒之遂將俱至洛陽因詣太學受業晊有髙才郭林宗朱公叔等皆為友李膺王暢稱其有幹國器雖在閭里慨然有董正天下之志太守𢎞農成瑨下車欲振威嚴聞晊髙名請為功曹又以張牧為中賊曹吏瑨委心晊牧襃善紏違肅清朝府宛有富賈張汎者桓帝美人之外親善巧雕鏤玩好之物頗以賂遺中官以此並得顯位恃其伎巧用埶縱横晊與牧勸瑨收捕汎等既而遇赦并收其宗族賓客殺二百餘人後乃奏聞於是中常侍侯覽使其妻上書訟寃帝大震怒徵瑨下獄賜死晊與牧遁逃亡匿齊魯之間㑹赦出後州郡察舉三府交辟並不就及李杜之誅因復逃竄終于江夏山中云陳翔字子麟汝南邵陵人也祖父珍司隸校尉翔少知名善交結察孝廉太尉周景辟舉髙第拜侍御史時正旦朝賀大將軍梁冀威儀不整奏冀恃貴不敬請收按罪時人竒之遷定襄太守徵拜議郎遷揚州刺史舉奏豫章太守王永奏事中宫吳郡太守徐參在職貪穢並徵議廷尉參中常侍璜之弟也由此威名大振又徵拜議郎補御史中丞坐黨事考黄門北寺獄以無騐見原卒于家孔昱字元世魯國魯人也七世祖覇成帝時歴九卿封襃成侯自霸至昱爵位相係其卿相牧守五十三人列侯七人昱少習家學大將軍梁冀辟不應太尉舉方正對策不合乃辭病去後遭黨禁錮靈帝即位公車徵拜議郎補洛陽令以師䘮棄官卒于家范康字仲真勃海重合人也少受業太學與郭林宗親善舉孝廉再遷潁隂令有能迹遷太山太守郡内豪姓多不法康至奮威怒施嚴令莫有干犯者先所請奪人田宅皆遽還之是時山陽張儉殺常侍侯覽母禁其宗黨賓客或有迸匿太山界者康既常疾閹宦因此皆窮相收掩無得遺脱覽大怨之誣康與兖州刺史第五種及都尉壺嘉詐上賊降徵康詣廷尉減死罪一等徙日南潁隂人及太山羊陟等詣闕為訟乃原還本郡卒於家檀敷字文有山陽瑕邱人也少為諸生家貧而志清不受鄉里施惠舉孝廉連辟公府皆不就立精舎敎授逺方至者常數百人桓帝時博士徵不就靈帝即位太尉黄瓊舉方正對策合時再遷議郎補䝉令以郡守非其人棄官去家無産業子孫同衣而出年八十卒於家劉儒字叔林東郡陽平人也郭林宗常謂儒口訥心辯有珪璋之質察孝廉舉髙第三遷侍中桓帝時數有災異下策博求直言儒上封事十條極言得失辭甚忠切帝不能納出為任城相頃之徵拜議郎會竇武事下獄自殺賈彪字偉節潁川定陵人也少遊京師志節慷慨與同郡荀爽齊名初仕州郡舉孝廉新息長小民貧困多不養子彪乃嚴為其制與殺人同罪時城南有盗劫害人者北有婦人殺子者彪出案發而掾吏欲引南彪怒曰賊寇害人此則常理母子相殘逆天違道遂驅車北行案騐其罪城南賊聞之亦面縛自首數年間人養子者千數僉曰賈父所長生男名為賈子女名為賈女延熹元年黨事起太尉陳蕃爭之不能得朝廷寒心莫敢復言彪謂同志曰吾不西行大禍不解乃入洛陽説城門校尉竇武尚書霍諝武等訟之桓帝以此大赦黨人李膺出曰吾得免此賈生之謀也先是岑晊以黨事逃亡親友多匿焉彪獨閉門不納時人望之彪曰傳言相時而動無累後人公孝以要君致釁自遺其咎吾以不能奮刀相待反可容隱之乎於是咸服其裁正以黨禁錮卒於家初彪兄弟三人並有髙名而彪最優故天下稱曰賈氏三虎偉節最怒何顒字伯求南陽襄鄉人也少游學洛陽顒雖後進而郭林宗賈偉節等與之相好顯名太學友人虞偉髙有父讐未報而篤病將終顒往候之偉髙泣而訴顒感其義為復讎以頭醊其墓及陳蕃李膺之敗顒以與蕃膺善遂為宦官所陷乃變姓名匿汝南間所至皆親其豪傑有聲荆楚之域袁紹慕之私與往來結為奔走之友是時黨事起天下多離其難顒常私入洛陽從紹計議其窮困閉戹者為求援救以濟其患有被掩捕者則廣設權計使得逃隱全免者甚衆及黨錮解顒辟司空府每三府會議莫不推顒之長累遷及董卓秉政逼顒以為長史託疾不就乃與司空荀爽司徒王允等共謀卓㑹爽薨顒以他事為卓所繫憂憤而卒初顒見曹操歎曰漢家將亡安天下者必此人也操以是嘉之嘗稱潁川荀彧王佐之器及彧為尚書令遣人西迎叔父爽并致顒屍而葬之爽之冢傍通志卷第一百十二
