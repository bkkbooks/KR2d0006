body:
  text: 通志卷一百九十六宋右廸功郎鄭樵漁仲撰四夷傳第三西戎下西域序畧婼羌鄯善且末小宛精絶戎盧扜彌渠勒于闐皮山烏秅西夜蒲犂依耐無雷難兠罽賓烏弋山離條支安息大月氏大夏附小月氏康居米國史國曹國何國烏那遏穆國大宛桃槐休循天竺莎車疏勒尉頭烏孫姑墨温宿龜兹烏壘渠犂附尉犂危須焉耆烏貪訾離卑陸卑陸後國郁立師單桓蒲類蒲類後國移支西且彌東且彌劫國狐胡山國車師滑國阿跋檀胡宻丹周古柯白題附車離高附大秦奄蔡小人軒渠三童澤散驢分堅昆呼得丁令短人師子嚈噠波斯伏盧尼悦般朱俱波渴槃陁鉢和波知賖彌烏萇乾陀阿鈎羌副貨疊伏羅抜豆者至抜迷宻悉萬斤忸宻石國女國撥汗吐火羅劫國陁羅伊羅越底延大食西域序畧西域以漢孝武時始通本三十六國其後稍分至五十餘皆在匈奴之西烏孫之南南北有大山中央有河東西六千餘里南北千餘里東則接漢阸以玉門陽闗西則限以葱嶺其南山東出金城與漢南山屬焉其河有兩源一出葱嶺一出于闐于闐在南山下其河北流與葱嶺河合東注蒲昌海蒲昌海一名鹽澤者也去玉門陽關三百餘里廣袤三百里其水亭居冬夏不增減皆以為潛行地下南出於積石為中國河云自玉門陽闗出西域有兩道從鄯善傍南山北陂河西行至莎車為南道陂河循河也陂音彼義反南道西踰葱嶺則出大月氏安息自車師前王庭隨北山陂河西行至疏勒為北道北道西踰葱嶺則出大宛康居奄蔡焉耆西域諸國大率土著有城郭田畜與匃奴烏孫異俗故皆役屬匈奴匈奴西邊日逐王置僮僕都尉使領西域常居焉耆危須尉犂間賦税諸國取富給焉自周衰戎狄錯居涇渭之北及秦始皇攘郤戎狄築長城界中國然西不過臨洮漢興至于孝武征四夷廣威徳而張騫始開西域之迹其後驃騎將軍撃破匈奴右地降渾邪休屠王遂空其地始築令居以西初置酒泉郡後稍發徙民充實之分置武威張掖敦煌列四郡據兩闗焉自貳師將軍伐大宛之後西域震懼多遣使來貢獻漢使西域者益得職於是自敦煌西至鹽澤往往起亭而輪臺渠犂皆有田卒數百人置使者校尉領䕶以給使外國者至宣帝時遣衛司馬使䕶鄯善以西數國及破姑師未盡殄分以為車師前後王及山北六國時漢獨䕶南道未能盡并北道也然匈奴不自安矣其後日逐王畔單于將衆來降䕶鄯善以西使者鄭吉迎之既至漢封日逐王為歸徳侯吉為安逺侯是嵗神爵三年也乃因使吉并䕶北道故號曰都䕶都䕶之起自吉置矣僮僕都尉由此罷匈奴益弱不得近西域於是徙屯田於北胥鞬披莎車之地屯田校尉始屬都䕶都䕶督察烏孫康居諸外國動静有變以聞可安輯安輯之可擊擊之都䕶治烏壘城去陽闗二千七百三十八里與渠犂田官相近土地肥饒於西域為中故都䕶治焉至元帝時復置戊巳校尉屯田車師前王庭是時匈奴東蒲類王兹力支將人衆千七百餘人降都䕶都䕶乃分車師後王之地為烏貪訾離地以處之自宣元後單于稱蕃臣西域服從其土地山川户數道里無不翔實凡國自譯長城長君監吏大禄百長千長都尉且渠當户將相至侯王皆佩漢印綬凡三百七十六人而康居大月氏安息罽賓烏弋之屬皆以絶逺不在數中其來貢獻則與相報不督錄總領也初漢通西域有二道自元始以後有三道焉自玉門闗出西經婼羌轉西越葱嶺經縣度入大月氏為南道自玉門闗西出發都䕶井廻三隴沙北頭經居盧倉從沙西北過龍堆到故樓蘭轉西詣龜兹至葱嶺為中道自玉門闗西北出經横阬辟三隴沙及龍堆出五船皆到車師界戊巳校尉所治髙昌轉西與中道合龜兹新道與初道異矣王莽簒位貶易侯王由是西域怨叛與中國遂絶並後役屬匈奴匈奴斂税重刻諸國不堪命建武中皆遣使求内屬願請都䕶光武以天下初定未遑外事竟不許之會匈奴衰弱莎車王賢誅滅諸國賢死之後遂更相攻伐小宛精絶戎盧且末為鄯善所并渠勒皮山為于闐所統悉有其地郁立單桓狐胡烏貪訾離為車師所滅後其國並復立永平中北匈奴乃脅諸國共寇河西郡縣城門晝閉十六年明帝乃命將北征匈奴取伊吾盧地置宜禾都尉以屯田遂通西域于闐諸國皆遣子入侍西域自絶六十五載乃復通焉明年始置都䕶戊巳校尉及明帝崩焉耆龜兹攻沒都䕶陳睦悉覆其衆匈奴車師圍戊巳校尉建初元年春酒泉太守叚彭大破車師於交河城章帝不欲疲弊中國以事夷狄乃迎還戊巳校尉不復遣都䕶二年復罷屯田伊吾匈奴因遣兵守伊吾地時軍司馬班超留于闐綏集諸國和帝永元元年大將軍竇憲大破匈奴二年憲因遣副校尉閻槃將二千餘騎掩擊伊吾破之三年班超遂定西域因以超為都䕶居龜兹復置戊巳校尉領兵五百人居車師前部髙昌壁又置戊部候居車師後部候城相去五百里自敦煌西出玉門陽闗渉鄯善北通伊吾千餘里自伊吾北通車師前部髙昌壁千二百里自髙昌壁北通後部金蒲城五百里此其西域之門户也故戊巳校尉更互屯焉伊吾地宜五榖桑麻蒲萄其北又有桞中皆膏腴之地故漢常與匈奴争車師伊吾以控制西域焉六年班超復擊破焉耆於是五十餘國悉納質内屬其條支安息諸國至于海瀕四萬里外皆重譯貢獻九年班超遣椽甘英窮臨西海而還皆前世所不至山經所未詳莫不備其風土傳其珍怪焉於是逺國䝉竒兠勒皆來歸服遣使貢獻及孝和晏駕西域背畔安帝永初元年頻攻圍都䕶任尚叚禧等朝廷以其逺險難相應赴詔罷都䕶自此遂棄西域北匈奴即復收屬諸國共為邊寇十餘嵗敦煌大守曹宗患其暴害元初六年乃上遣行長史索班將千餘人屯伊吾以招撫之於是車師前王及鄯善王來降數月北匈奴復率車師後部王共攻沒班等遂擊走其前王鄯善逼急求救於曹宗因此請出兵撃匈奴報索班之恥復欲進取西域鄧太后不許但令置䕶西域副校尉居敦煌復部營兵三百人覊縻而已其後北匈奴連與車師入寇河西朝廷不能禁議者曰欲閉玉門陽闗以絶其患延光二年敦煌太守張璫上書陳三䇿以為北匈奴呼衍王常展轉蒲類秦海之間專制西域共為寇掠今以酒泉屬國吏士二千餘人集昆侖塞先擊呼衍王絶其根本因發鄯善兵五千人脅車師後部此上計也若不能出兵可置軍司馬將士五百人四郡供其犂牛榖食出據桞中此中計也如又不能則宜棄交河城收鄯善等悉使入塞此下計也朝廷下其議尚書陳忠上疏曰臣聞八蠻之寇莫甚北狄漢興髙祖窘平城之圍太宗屈供奉之恥故孝武憤怒深惟久長之計命遣虎臣浮河絶漠窮破北庭當斯之役黔首隕於狼望之北財幣糜於盧山之壑府庫單竭杼柚空虚算至舟車貲及六畜夫豈不懐慮久故也遂開河西四郡以隔絶南羌收三十六國斷匈奴右臂是以單于孤特䑕竄逺蔵至於宣元之世遂備蕃臣闗徼不通羽檄不行由此察之戎狄可以威服難以化狎西域内附日久區區東望扣闗者數矣此其不樂匈奴慕漢之效也今北匈奴已破車師勢必南攻鄯善棄而不救則諸國從矣若然則匈奴財賄益增膽勢益殖威臨南羌與之交連如此河西四郡危矣河西之危不救則百倍之役興不訾之費發矣議者但念西域絶逺䘏之煩費不見先世苦心勤勞之意也方今邉境守禦之具不精内郡武衛之備不修敦煌孤危逺來告急復不輔助内無以慰勞吏民外無以威示百蠻蹙國減土經有明誡臣以為敦煌宜置校尉案舊增四郡屯兵以西撫諸國庶足折衝萬里震怖匈奴帝納之乃以班勇為西域長史將弛刑士五百人西屯桞中勇遂破平車師自建武至于延光西域三絶三通順帝永建二年勇復撃降焉耆於是龜兹疏勒于闐沙車等七國皆來服從而烏孫葱嶺已西遂絶六年帝以伊吾舊膏腴之地傍近西域匈奴資之以為鈔暴復令開設屯田如永元時事置伊吾司馬一人自陽嘉以後朝威稍損諸國驕放轉相陵伐元嘉二年長史王敬為于闐所沒永興元年車師後王復反攻屯營雖有降首曽莫懲革自此寖以疎慢矣自魏及晉中原多故西域朝貢不過三數國焉後魏道武初有司以西戎貢賦不至奏依漢氏故事請通西域帝曰漢氏不保境安民逺開西域使中國疲弊今若通之前弊復加於百姓矣不從歴明元世竟不招致太延中西域龜兹疏勒烏孫悦般渇槃陀鄯善焉耆車師粟特諸國始遣使來獻太武以西域漢世雖通有求則卑辭而來無欲則驕慢王命此其自知絶逺大兵不可加故也若報使往來終無所益欲不遣使羣臣以九國不憚險逺來貢方物當與其進不可豫抑後來乃從之於是始遣行人王恩生等西使恩生出流沙為蠕蠕所執不果達又遣散騎侍郎董琬等多齎錦帛出鄯善招撫九國厚賜之初琬等受詔便道之國可往赴之琬過九國北行至烏孫其王得魏賜拜受甚悦謂琬等曰傳聞破落郍者舌皆思魏徳欲稱臣致貢伹患其路無由耳今使君等既到此可往二國副其夙誠琬於是自向破落郍遣使者舌烏孫王為發導譯達二國琬等宣詔慰賜之琬等東還烏孫破落郍之屬遣使與琬俱來貢獻者十有六國自後繼至不間于嵗國使亦數十輩矣琬等至京師具言凡所經見及傳聞傍國云自漢武時五十餘國後稍相并至太延中為十六國分其地為四域自葱嶺以東流沙以西為一域葱嶺以西海曲以東為一域者舌以南月氏以北為一域兩海之間水澤以南為一域内諸小渠長蓋以百數其出西域本有二道後更為四道出自玉門渡流沙北行二千里至鄯善為一道自玉門渡流沙北行二千二百里至車師為一道從莎車西行一百里至葱嶺葱嶺西一千三百里至伽倍為一道自莎車西南五百里葱嶺西南一千三百里至波路為一道焉自琬所不傳而更有朝貢者紀其名不能具國俗也東西魏時中國方擾及於齊周不聞有事西域故二代書並不立記錄隋開皇仁壽之間尚未云經畧煬帝時乃遣侍御史韋節司𨽻從事杜行滿使於西國至罽賓得馬瑙盃王舍城得佛經史國得十舞女師子皮火䑕毛而還帝復令聞喜公裴矩於武威張掖間往來以引致之其有君長者四十四國矩因其使者入朝啗以厚利令其轉相諷諭大業中相率來朝者四十餘國帝因置西戎校尉以應接之尋屬中國大亂朝貢遂絶時事失書所可存錄者二十國又魏世有來者隋時或不至焉隋時又有商胡雜居伊吾地勝兵千餘人附於鐵勒人甚驕悍土地良沃大業末内屬置伊吾郡隋室不綱臣於突厥唐貞觀四年以頡利破滅遂舉其屬七城來降因列其地為西伊州同於編户至武太后時武威總管王孝傑大破吐蕃復龜兹于闐疏勒碎葉四鎮自是諸國朝貢侔於前代矣神龍以後黑衣大食彊盛漸并諸國至于西海分兵鎮守焉今總輯西域諸戎起漢孝武訖于隋凡百餘國列為此編云婼羌婼音而遮反婼羌漢時通焉出陽闗至近者曰婼羌其王號去胡來王言去胡戎來附漢也去陽闗千八百里去長安六千三百里辟在西南不當孔道西與且末接隨畜牧逐水草不田作仰鄯善且末榖山有鐵自作兵兵有矛服刀劒甲西北至鄯善乃當道云鄯善鄯善本名樓蘭王治扜泥城扜一胡反去陽闗千六百里去長安六千一百里西北去都䕶治所千七百八十五里至山國千三百六十五里西北至車師千八百九十里地沙鹵少田寄田仰榖旁國寄於他國種田又旁糴旁國之榖也仰音牛向反國出玉多葭葦檉桞胡桐白草民隨畜牧逐水草有驢馬多橐它能作兵與婼羌同初武帝感張騫之言甘心欲通大宛諸國使者相望於道一嵗中多至十餘輩樓蘭姑師當道苦之攻劫漢使王恢等又數為匈奴耳目令其兵遮漢使漢使多言其國有城邑兵弱易撃於是武帝遣從票侯趙破奴將屬國騎及郡兵數萬擊姑師王恢數為樓蘭所苦上令恢佐破奴將兵破奴與輕騎七百人先至虜樓蘭王遂破姑師因暴兵威以動烏孫大宛之屬還封破奴為浞野侯恢為浩侯浩音昊於是漢列亭障至玉門矣樓蘭既降服貢獻匈奴聞發兵擊之於是樓蘭遣一子質匈奴一子質漢後貳師軍擊大宛匈奴欲遮之貳師兵盛不敢當即遣騎因樓蘭候漢使後過者欲絶勿通時漢軍正任文將兵屯玉門闗為貳師後距捕得生口知狀以聞上詔文便道引兵捕樓蘭王將詣闕簿責王對曰小國在大國間不兩屬無以自安願徙國入居漢地上直其言遣歸國亦因使候伺匈奴匈奴自是不甚親信樓蘭征和兀年樓蘭王死國人來請質子在漢者欲立之質子常坐漢法下蠶室宫刑故不遣報曰侍子天子愛之不能遣其更立其次當立者樓蘭更立王漢復責其質子亦遣一子質匈奴後王又死匈奴先聞之遣質子歸得立為王漢遣使詔新王令入朝天子將加厚賞樓蘭王後妻故繼母也謂王曰先王遣兩子質漢皆不還奈何欲往朝乎王用其計謝使曰新立國未定願待後年入見天子然樓蘭國最在東垂近漢當白龍堆乏水草常主發導負水擔糧送迎漢使又數為吏卒所寇懲艾不便與漢通後復為匈奴反間數遮殺漢使其弟尉屠耆降漢具言狀元鳯四年大將軍霍光白遣平樂監傅介子往刺其王介子輕率勇敢士齎金幣揚言以賜外國為名既至樓蘭詐其王欲賜之王喜與介子飲醉將其王屏語壯士二人從後刺殺之貴人左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉屠耆在漢者漢兵方至毋敢動自令滅國矣介子遂斬王嘗歸首馳傳詣闕縣首北闕下封介子為義陽侯乃立尉屠耆為王更名其國為鄯善為刻印章賜以宫女為夫人備車騎輜重丞相將軍百官送至横門外横音光祖而遣之王自請天子曰身在漢久今歸單弱而前王有子在恐為所殺國中有伊循城其地肥美願漢遣一將屯田積榖令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以鎮撫之其後更置都尉伊循官置始此矣鄯善當漢道衝西通且末七百二十里自且末以往皆種五榖土地草木畜産作兵畧與漢同自後少通中國後魏太延初鄯善王遣其弟素延者入侍及太武平凉州沮渠牧犍弟無諱走保敦煌無諱謀渡流沙遣其弟安周擊鄯善鄯善王比龍西奔且末而且末役屬之鄯善人别立王其後魏遣使使西域道出其國國人頗剽劫之令不得通太武怒詔散騎常侍成周公萬度歸乘傳發涼州兵討之度歸到敦煌留輜重率輕騎五千渡流沙至其境其王真達面縛出降度歸釋縛留軍屯守與真達詣京師太武拜交趾公韓杖為假節征西將軍領䕶西戎校尉鄯善王以鎮撫之賦役其民比之郡縣且末且末國漢時通焉王治且末城去長安六千八百二十里西北至都䕶治所二千二百五十八里北接尉犂丁零東與白提西與波斯精絶接南至小宛可三日行地有蒲萄諸果人皆翦髮著氊㡌小袖衣為衫則開頸而縫前多牛羊騾驢後魏太武太平真君三年鄯善王比龍避沮渠無諱之難率國人之半奔且末為且末所役屬梁武帝普通五年其王安末染盤遣使貢獻江左謂之末國梁史云即且末西魏大統八年王兄鄯善米率衆内附自後無聞其國西北有流沙數百里夏月有熱風為行旅之患風之欲至老駞先知即鳴而聚立埋口鼻於沙人每以為候即將氈擁蔽其鼻口其風迅駛斯須過盡若不防者必至危弊小宛小宛漢時通焉王治扜零城去長安七千二百一十里西北至都䕶治所二千五百五十八里東與婼羌接辟南不當道精絶精絶漢時通焉王治精絶城去長安八千八百二十里北至都䕶治所二千七百二十三里南至戎盧國四日行地阸陿西通扜彌四百六十里戎盧戎盧漢時通焉王治卑品城去長安八千三百里東北至都䕶治所二千八百五十八里東與小宛南與婼羌西與渠勒接辟南不當道扜彌扜彌漢時通焉其王治扜彌城去長安九千二百八十里東北至都䕶治所三千五百五十三里南與渠勒東北與龜兹西北與姑墨接西通于闐三百九十里後漢改其國曰拘彌居寕彌城亦曰寧彌城國順帝永建四年于闐王放前殺拘彌王興自立其子為拘彌王而遣使者貢獻於漢敦煌太守徐由上求討之帝赦于闐罪令歸拘彌國放前不肯陽嘉元年徐由遣疏勒王臣槃發二萬人擊于闐破之斬首數百級放兵大掠更立興宗人成周為拘彌王而還靈帝熹平四年于闐王安國攻拘彌大破之殺其王死者甚衆戊巳校尉西域長史各發兵輔立拘彌侍子定興為王時人衆纔有千口渠勒渠勒漢時通焉王治鞬都城鞬居言反去長安九千九百五十里東北至都䕶治所三千八百五十二里東與戎盧西與婼羌北與扜彌接于闐于闐漢時通焉王治西城去長安九千六百七十里東北至都䕶治所三千九百四十七里南與婼羌接北與姑墨接西通皮山三百八十里于闐之西水皆西流注西海其東水東流注鹽澤即蒲昌海國有阿耨達山據漢書河源出焉名首拔河亦名樹拔河或云即黄河也北流七百里入計戍水一名計式水即葱嶺南河同入鹽澤或云阿耨達即崑崙山地多水潦沙石氣候温土良沃宜五榖桑麻多蒲萄有水名玉河出玉石山亦多美玉焉大率物産與龜兹同其俗無禮義多盜賊淫縱偏信佛道寺塔僧尼甚衆後漢建武末莎車王賢彊盛攻并于闐徙其王俞林為驪歸王明帝永平中于闐將休莫霸反莎車自立為于闐王休莫霸死兄子廣徳立後遂滅莎車其國轉盛從精絶西北至疏勒十三國皆服從而鄯善王亦始彊盛自是南道自葱嶺以東唯此三國為大順帝永建六年于闐王放前遣子詣闕貢獻元嘉元年長史趙評在于闐病癰死評子迎喪道經拘彌拘彌王成國與于闐王建素有隙乃語評子云于闐王令胡醫持毒藥著創中故致死耳評子信之還入塞以告敦煌太守馬達明年以王敬代為長史達令敬隐覈其事敬先過拘彌成國復説云于闐國人欲以我為王今可因此罪誅建于闐必服矣敬貪立功名且受成國之説前到于闐設供具請建而隂圖之或以敬謀告建建不信曰我無罪王長史何為欲殺我旦日建從官屬數十人詣敬坐定建起行酒敬叱左右執之吏士並無殺建意官屬悉得突走時成國主簿秦牧隨敬在會持刀出曰大事已定何為復疑即前斬建于闐侯將輸僰等遂會兵攻敬敬持建頭上樓宣告曰天子使我誅建耳于闐侯將遂焚營舍燒殺吏士上樓斬敬懸首於市輸僰欲自立為王國人殺之而立建子安國焉馬達聞之欲將諸郡兵出塞擊于闐桓帝不聼徴達還而以宋亮為敦煌太守亮到開募于闐令自斬輸僰時輸僰死已經月乃斷死人頭送敦煌而不言其狀亮後知其詐而竟不能出兵于闐恃此遂驕後魏世于闐國使來云其國見在且末西北葱嶺之北二百餘里東去鄯善千五百里南去女國三千里去朱俱波千里北去龜兹千四百里去代九千八百里疑即漢時舊治也云其國西五百里有比摩寺俗傳老子化胡成佛之所也老子西行至此地白日升天與羣胡辭訣言我暫游天上尋當下生其後出天竺國化為胡王太子自稱曰佛其王戴錦㡌金䑕冠妻戴金花王髪不令人見俗言若見王髪其年即儉王所居加以朱畫其人相見必跪跪則一膝至地書則以木為筆札以玉為印國人得書先戴於首而後開封自髙車以西諸國人多深目髙鼻唯此國貌不甚胡頗類華夏太武太平真君中詔髙涼王郍擊吐谷渾慕利延慕利延懼驅其部落渡流沙郍進軍急追之慕利延遂西入于于闐殺其王死者甚衆獻文末蠕蠕寇于闐于闐患之遣其臣素目伽上表求援帝以為逺不及事慰勞遣之許為後舉先是魏使者韓羊皮使波斯波斯王嘗遣使獻馴象道經于闐為其王秋仁所留託有寇鈔故不遣羊皮言狀帝怒遣羊皮奉詔責讓之自後每使朝獻梁天監九年輸誠江左致其方物十三年十八年與夫大同初各有獻納周建徳三年入貢名馬隋煬帝世表章不絶唐貞觀中仍遣使朝焉于闐在唐時其王姓尉遲蕃内并有漢戎盧扜彌渠勒皮山精絶五國之地其國自漢孝武以來中國詔令書冊符節悉得傳以相付敬而存之皮山皮山漢時通焉王治皮山城去長安萬五千里東北至都䕶治所四千二百九十二里西南至烏秅國上一加反十直加反千三百四十里南與天篤接北至姑墨千四百五十里西南當罽賓烏弋山離西北通莎車三百八十里烏秅烏秅漢時通焉王治烏秅城去長安九千九百五十里東北至都䕶治所四千八百九十二里北與子合蒲犂西與難兠接山居田石間有白草累石為室民接手飲自髙山下谿澗中飲水故接連其手如猿之為出小歩馬小細也細歩言其能蹀足即今所謂百歩千跡者也有驢無牛其西則有縣度山石谿谷不通以繩相引而度去陽闗五千八百八十八里去都䕶治所五千二百里其國至後魏時又謂之權於摩國云西夜西夜漢時通焉亦號子合王治呼犍谷去長安萬二百五十里東北至都䕶治所五千四十六里東與皮山西南與烏秅北與莎車西與蒲犂接蒲犂及依耐無雷國皆西夜類也西夜與胡異其種類羌氐行國言不土著也隨畜牧逐水草往來而子合土地出玉石按後漢史云西夜國一名漂沙去洛陽萬四千四百里地生白草有毒人煎以為藥傅箭鏃所中即死漢書中誤云西夜子合是一國今各有主子合國居呼鞬谷去疏勒千里蒲犂蒲犂漢時通焉王治蒲犂谷去長安九千五百五十里東北至都䕶治所五千三百九十六里東至莎車五百四十里北至疏勒五百五十里南與西夜子合接西至無雷五百四十里寄田莎車種俗與子合同依耐依耐漢時通焉王治去長安萬一百五十里東北至都䕶治所二千七百三十里至莎車五百四十里至無雷五百四十里北至疏勒六百五十里南與子合接俗相與同少榖寄田疏勒莎車無雷無雷漢時通焉王治盧城去長安九千九百五十里東北至都䕶治所二千四百六十五里南至蒲犂五百四十里南與烏秅北與捐毒西與大月氏接衣服類烏孫俗與子合同難兠難兠漢時通焉王治去長安萬一百五十里東北至都䕶治所二千八百五十里西至無雷三百四十里西南至罽賓三百三十里南與婼羌北與休循西與大月氏接按婼羌小國最近陽關去長安六千里耳在都䕶之東而此渠勒于闐難兠之類去長安且萬里東北行數千里乃至都䕶安得與婼羌接必誤種五榖蒲萄諸果有銀銅鐵作兵與諸國同屬罽賔罽賔罽賔漢時通焉其王治循鮮城去長安萬二千二百里不屬都䕶户口勝兵多大國也東北至都䕶治所六千八百四十里東至烏秅國二千二百五十里東北至難兠國九日行西北與大月氏西南與烏弋山離接昔匈奴破大月氏大月氏西君大夏而塞王南君罽賔君謂為之君也塞先得反塞種分散往往為數國自疏勒以西北休循捐毒之屬皆故塞種也罽賔地平温和有目宿雜草竒木檀櫰梓竹漆種五榖蒲萄諸果糞治園田地下涇生稻冬食生菜其民巧雕文刻鏤治宫室織罽刺文繡好治食有金銀銅錫以為器市列市有列肆亦如中國也以金銀為錢文為騎馬幕為人面錢文面作騎馬形漫面作人面目也出封牛水牛象大狗沐猴孔爵封牛項上隆起者也郭儀恭廣志云罽賔大狗大如驢赤色數里摇鞉以呼之沐猴即彌猴也珠璣珊瑚虎魄璧流離魏略云大秦國出赤白黑黄青緑縹紺紅紫十種流離此蓋自然之物采澤光潤踰於衆玉其色不恒今俗所用皆銷治石汁加以衆藥灌而為之尤虚脆不貞實非真物他畜與諸國同自武帝始通罽賔自以絶逺漢兵不能至其王烏頭勞數剽殺漢使烏頭勞死子代立遣使奉獻漢使關都尉文忠送其使王復欲害忠忠覺之廼與容屈王子隂末赴共合謀攻罽賔殺其王立隂末赴為罽賔王授印綬後軍候趙徳使罽賔與隂末赴相失隂末赴鎻琅當徳琅當長鎻也若今之禁繫人鎻矣琅音郎殺副已下七十餘人遣使者上書謝孝元帝以絶域不録放其使者於縣度絶而不通成帝時復遣使獻謝罪漢欲遣使者報送其使杜欽説大將軍王鳯曰前罽賔王隂末赴本漢所立後卒畔逆夫徳莫大於育國子民罪莫大於執殺使者所以不報恩不懼誅者自知絶逺兵不至也有求則卑辭無欲則嬌嫚終不可懷服凡中國所以為通厚蠻夷㥦快其求者為壤比而為寇也今懸度之阸非罽賔所能越也其鄉慕不足以安西域雖不附不能危城郭前親逆節惡暴西域故絶而不通今悔過來而無親屬貴人奉獻者皆行賈賤人欲通貨市買以獻為名故煩使者送至縣度恐失實見欺凡遣使送客者欲為防䕶寇害也起皮山南更不屬漢之國四五斥候七百餘人五夜分擊刁斗自守尚時為所侵盗驢畜負糧須諸國禀食得以自贍國或貧小不能食或桀黠不肯給擁彊漢之節餒山谷之間乞匄無所得離一二旬則人畜棄捐曠野而不反又歴大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然又有三池盤石阪道陿者尺六七寸長者徑三十里臨峥嶸不測之深行者騎歩相持䋲索相引二千餘里乃到縣度畜隊阬谷未半盡靡碎人墮埶不得相收視險阻危害不可勝言聖王分九州制五服務盛内不求外今遣使者承至尊之命送蠻夷之賈勞吏士之衆渉危難之路罷弊所恃以事無用非久長計也使者業已受節可至皮山而還於是鳯白從欽言罽賔實利賞賜賈市其使卒數年而壹至自後無聞至後魏始通之其使人云其國今都善見城在波路西南去代一萬四千二百里居在四山中其地東西八百里南北三百里其風土物産皆如前史所云至隋時謂之漕國在葱嶺之西南隋史曰即漢時罽賔國其王姓昭武康國之族屬也勝兵萬餘人國法嚴整殺人及盗賊皆死其俗淫祀葱嶺山有順天神者儀制極華以金鍱為屋以銀為地祠前有一魚脊骨其孔中通馬騎出入國王戴金牛頭冠坐金馬座土多稻粟豆麥饒象馬封牛金銀鑌鐵氍毹朱砂青黛安息青木等香石宻黑鹽阿魏沒藥白附子北去㠶延七百里東去劫國六百里東去𤓰州六千六百里大業中遣使貢方物唐貞觀十年其國遣使又稱罽賔獻俱物頭花丹紫相間其香逺聞烏弋山離烏弋山離漢時通焉去長安萬二千二百里不屬都䕶户口勝兵多大國也東北至都䕶治所六十日行東與罽賔北與撲挑挑或作桃西與犂靬條支接行可百餘日乃到烏弋地暑熱莽平其草木畜産五榖果菜飲食宮室市列錢貨兵器金珠之屬皆與罽賔同而有桃拔師子犀牛桃㧞一名符拔似鹿長毛一角者或為天鹿兩角者或為辟邪師子似虎正黄有􅏋耏尾端茸毛大如斗爾雅亦謂之狻㹸狻音酸㹸音倪􅏋而占反耏音而俗重妄殺其錢獨文為人頭幕為騎馬以金銀飾杖杖謂所持兵器也絶逺漢使希至自玉門陽闗出南道歴鄯善而南行至烏弋山離南道極矣轉北而東復馬行六十日餘至安息烏戈東漢時改稱為排持條支條支漢時通焉去陽闗二萬二千一百里在葱嶺之西城在山之上周廽四十餘里臨西海水曲環其南及東北三面路絶唯西北隅通陸道土地暑溼田宜稻出封牛孔雀有大鳥卵如甕人衆甚多往往有小君長安息役屬之以為外國外國如言外蕃也善眩安息長老傳聞條支有弱水西王母亦未嘗見也自條支乘水西行可百餘日近日所入云安息安息漢時通焉王治番兠城去長安萬一千六百里在葱嶺之西大宛之西可數千里不屬都䕶北與康居東與烏弋山離西與條支接土地風氣物類民俗與烏弋罽賔同亦以銀為錢文獨面為王面幕為夫人面王死輒更鑄錢有大鳥爵大爵頸及膺身蹄似槖駝色蒼舉頭髙八九尺張翅丈餘食大麥其屬小大數百城地方數千里最大國也臨媯水商賈車船行旁國書革旁行為書記今西方胡國及南方林邑之徒書皆横行不直下也革謂皮之不柔者武帝始遣使至安息王令將將二萬騎迎於東界去王都數千里行比至過數十城人民相屬因發使隨漢使者來觀漢地以大鳥卵及犂靬眩人獻於漢天子大説後漢章帝章和元年遣使獻師子符拔符拔形似麟而無角和帝永元九年都䕶班超遣掾甘英使大秦抵條支臨大海欲度而安息西界船人謂英曰海水廣大往來者逢善風三月乃得度若遇遲風亦有二嵗者故入海人皆齎三嵗糧海中善使人悲懷思土故數有死亡者若漢使不戀父母妻子者可入英聞之乃止十二年安息王滿屈復獻師子及條支大鳥時謂之安息雀自安息西行三千四百里至阿蠻國從阿蠻西行三千六百里至斯賔國從斯賔南行度河又西南至于羅國九百六十里安息西界極矣自此南乘海乃通大秦其土多海西珍竒異物後魏時安息嘗通焉使人云其國見都蔚搜城去代二萬一千五百里周武帝天和二年遣使貢獻隋時稱為安國隋史云即漢時安息國也王姓昭武與康國同族字設力妻康國王女也煬帝即位遣司𨽻從事杜行滿使西域至其國得五色鹽而返云其國見都在那宻水南城有五重環以流水宫殿皆平頭王坐金駞座髙七八尺每聼政與妻相對大臣三人評理國事風俗同於康居唯妻其姊妹及母子遞相禽獸此為異也國西百餘里有畢國可千餘家無君長安國統之大業五年遣使入貢大月氏大夏附大月氏漢時通焉治監氏城東漢作藍氏城去長安萬一千六百里不屬都䕶東至都䕶治所四千七百四十里西至安息四十九日行南與罽賔接土地風氣物類所有民俗鐵貨與安息同出一封橐駞􅆃上有一封也封言其隆髙若封土也今俗呼為封牛大月氏本行國也隨畜移徙與匈奴同俗控弦十餘萬故彊輕匈奴本居敦煌祈連間至冒頓單于攻破月氏而老上單于殺月氏以其頭為飲器月氏乃逺去過大宛西擊大夏而臣之都媯水北為王庭其餘小衆不能去者保南山羌號小月氏大夏本無大君長城邑往往置小長民弱畏戰故月氏徙來皆臣畜之共禀漢使者大夏之俗土著有城屋與大宛同人衆多可萬餘有市列販賈諸物月氏之遷於大夏也分其地為五翖侯翖即翕字一曰休宻翖侯治和墨城去都䕶二千八百四十一里去陽闗七千八百二里二曰雙靡翖侯治雙靡城去都䕶三千七百四十一里去陽闗七千八百八十二里三曰貴霜翖侯治䕶澡城去都䕶五千九百四十里去陽闗七千九百八十二里四曰肸頓翖侯治薄茅城去都䕶五千九百六十二里去陽闗八千二百二里五曰髙附翖侯治髙附城去都䕶六千四十一里去陽闗九千二百八十里凡五翖侯皆屬大月氏後百餘嵗貴霜翖侯邱就郤攻滅四翖侯自立為王國號貴霜王侵安息取髙附地又滅濮達罽賔悉有其國邱就郤年八十餘死子閻膏珍代為王復滅天竺置將一人監領之自此之後最為富盛諸國稱之皆曰貴霜王漢本其故號言大月氏云自後無聞至後魏時其國數為蠕蠕所侵遂西徙都薄羅城去弗敵沙二千一百里弗敵沙在籃氏城東後其王寄多羅勇武遂興師越大山南侵北天竺自乾陁羅以北五國盡役屬之國人乘四輪車或四牛六牛八牛輓之在車大小而已太武時其國人商販至代都自云能鑄石為五色瑠璃於是採礦於山中鑄之既成光澤乃美於西方來者乃詔為行殿容百餘人光色映徹觀者見之莫不驚駭以為神眀所作自此國中瑠璃遂賤人不復珍之元中記曰馬碯出大月氏又有牛名為日及今日取其肉眀日瘡愈宋膺異物志云月氏國有羊尾重十斤割之供食尋生如故小月氏小月氏治富樓沙城其王本大月氏寄多羅子也寄多羅為蠕蠕所逐西徙後令其子守此城因號小月氏焉在波路西南後魏史云去代萬六千六百里先居西平張掖之間並今郡被服頗與羌同其俗以金銀錢為貨隨畜牧移徙亦類匈奴康居康居漢時通焉其王冬治樂越匿地到卑闐城去長安萬二千三百里不屬都䕶至越匿地馬行七日至王夏所居蕃内九千一百四里東至都䕶治所五千五百五十里與大月氏同俗東羈事匈奴宣帝時匈奴乖亂五單于並争漢擁立呼韓邪單于而郅支單于怨望殺漢使者西阻康居其後都䕶甘延夀副校尉陳湯發戊巳校尉西域諸國兵至康居誅滅郅支單于語在甘延夀陳湯傳是嵗元帝建昭三年也至成帝時康居遣子侍漢貢獻然自以絶逺獨驕慢不肯與諸國相望都䕶郭舜數上言本匈奴盛時非以兼有烏孫康居故也及其稱臣妾非以失二國也漢雖皆受其質子然三國内相輸遺交通如故亦相候伺見便則發合不能相親信離不能相臣役以今言之結配烏孫竟未有益反為中國生事然烏孫既結在前今與匈奴俱稱臣義不可距而康居驕黠訖不肯拜使者都䕶吏至其國坐之烏孫諸使下王及貴人先飲食已乃飲啗都䕶吏故為無所省以夸旁國以此度之何故遣子入侍其欲賈市為好辭之詐也匈奴百蠻大國今事漢甚備聞康居不拜且使單于有自下之意宜歸其侍子絶勿復使以章漢家不通無禮之國敦煌酒泉小郡及南道八國給使者往來人馬驢橐駝食皆苦之空罷耗所過送迎驕黠絶逺之國非至計也漢為其新通重致逺人終羈縻而未絶其康居西北可二千里有奄蔡國控弦者十餘萬大與康居同俗臨大澤無崖蓋北海云康居有小王五一曰蘇䪥王治蘇䪥城去都䕶五千七百七十六里去陽關八千二十五里二曰附墨王治附墨城去都䕶五千七百六十七里去陽關八千二十五里三曰窳音庾匿王治窳匿城去都䕶五千二百六十六里去陽關七千五百二十五里四曰罽王治罽城去都䕶六千二百九十六里去陽關八千五百五十五里五曰薁音郁鞬王治薁鞬城去都䕶六千九百六里去陽闗八千三百五十五里凡五王屬康居漢以後無聞或名號改易或遷徙吞并非所詳也至晉武帝太始中其王那鼻遣使獻善馬使人云其國在大宛西北可二千里與粟弋伊列鄰接王所居號蘇䪥城則前史所稱康居五小王之一者所居也云其人貌衣服畧同大宛地和暖饒桐柳蒲萄多牛羊出好馬後魏太武大延中遣使朝貢其國稱為者舌後魏史云即漢康居國也隋大業中遣使入獻又稱為康國使人云其國遷徙不恒居故地自漢以來相承不絶其王本姓温月氏人也舊居祈連山北連昭武因被匈奴所破西踰葱嶺遂有國支庶各分王故康國左右所謂米國史國曹國何國安國小安國那色波國烏那遏國穆國凡九國皆其種類並以昭武為姓示不忘本也王字世夫畢為人寛厚甚得衆心其妻突厥達頭可汗女也都於薩寳水上阿禄廸城有大臣三人共掌國事有胡律置於妖祠將決罰則取而斷之重者族次罪者死賊盗截其足國立祖廟以六月祭之諸國皆來助祭王索髪冠七寳金花冠衣綾羅錦繡白疊其妻有髻幪以帛巾丈夫翦髪錦袍名為彊國西域諸國皆歸之人皆深目髙鼻多鬚髯善於商賈諸夷交易多湊其國有大小鼓琵琶五絃箜篌笛婚姻喪制與突厥同俗奉佛為胡書氣候温宜五榖勤治園蔬樹木滋茂出馬駞騾封牛黄金碙砂甘松香阿薩那香瑟瑟麖皮氍毹錦疊多蒲萄酒富家或致千石連年不敗韋節西蕃記云康居人並善賈男年五嵗則令學書少解則遣學賈以得利多為善其人好音聲以六月為嵗首至此日王及人庶並服新衣翦髪鬢在國城東林下七日馬射至欲罷日置一金錢於帖上射中者則得一日為王俗事天神崇敬甚重云神兒七月死失骸骨事神之人每至其月俱著黒疊衣徒跣撫胷號哭涕淚交流丈夫婦女三五百人散在草野求天兒骸骨七日便止國城外别有二百餘户專知喪事别築一院院内養狗每有人死即往取屍令狗食之肉盡收骸骨埋殯無棺槨唐貞觀二十一年其國獻黄桃大如鵞卵其色如金亦呼為金桃杜還經行記云康國在米國西南二百餘里一名薩末建土沃人富國小有神祠名拔諸國事者本出此米國米國隋時都那宻水西舊康居之地王姓昭武康國王之支庶字閉拙都城方二里勝兵數百人西北去蘇對沙那國五百里西南去史國二百里東去𤓰州六千四百里大業中頻貢方物史國史國隋時都獨莫水南十里舊康居之地王姓昭武字狄遮亦康國王之支庶也都城方二里勝兵千餘人俗同康國北去康國二百四十里南去吐火羅五百里西去那色波國二百里北去米國二百里東去𤓰州六千五百里大業中始通中國後漸彊盛乃創建乞史城為數十里郭邑二萬家唐貞觀中遣使來貢曹國曹國隋時都那宻水南數里舊康居故地國無主康國王令子烏建領之都城方三里勝兵千餘人國中有得悉神自西海以東諸國並敬事之其神有金人破羅國人丈有五尺髙大相稱每日以駞五頭馬十匹羊百口祭之常有千人食之不盡東南去康國百里西去何國百五十里東去𤓰州六千六百里大業中遣使貢方物何國何國隋時都那宻水南數里舊康居地王姓昭武亦康國王之族屬字敦都城方二里勝兵者千人國城樓北壁畫華夏天子西壁畫波斯拂菻力甚反諸國王東壁畫突厥婆羅門諸國王其王坐金羊座東去曹國百五十里西去小安國三百里東去𤓰州六千七百五十里風俗與康國同大業中及唐武徳貞觀中皆遣使來貢烏那遏烏那遏隋時都烏滸水西舊安息之地王姓昭武亦康國王種類字佛食都城方二里勝兵二百人王坐金羊座東北去安國四百里西北去穆國二百餘里東去𤓰州七千五百里大業中遣使貢方物穆國穆國隋時都烏滸河之西小安息之故地與烏那遏為鄰其王姓昭武國中出金銀雜寳白象水牛氂牛蒲萄五果土宜五榖大宛大宛漢時通焉王治貴山城去長安萬二千五百五十里其國都東至都䕶治所四千三十一里北至康居卑闐城千五百一十里西南至大月氏六百九十里北與康居南與大月氏接土地風氣物類民俗與大月氏安息同大宛左右以蒲萄為酒富人蔵酒至萬餘石久者至數十嵗不敗俗耆酒馬耆目宿宛别邑七十餘城多善馬馬汗血言其先天馬子也言大宛國有髙山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因號曰天馬子云張騫始為武帝言之上遣使者持千金及金馬以請宛善馬宛王以漢絶逺大兵不能至愛其寳馬不肯與漢使妄言謂詈辱宛主宛遂攻殺漢使取其財物於是天子遣貳師將軍李廣利將兵前後十餘萬人伐宛連四年宛人斬其王母寡首獻馬三千匹漢軍乃還語在貳師傳貳師既斬宛王更立貴人素遇漢善者名昧蔡為宛王昩音秣蔡音干葛反後嵗餘宛貴人以為昧蔡讇使我國遇屠相與共殺昧蔡立母寡弟蟬封為王遣子入侍質於漢漢因使使賂賜鎮撫之又發使十餘輩抵宛西諸國求竒物因風諭以伐宛之威宛王蟬封與漢約嵗獻天馬二匹漢使采蒲萄目宿種歸天子以天馬多又外國使來衆益種蒲萄目宿離宫館旁極望焉自宛以西至安息國雖頗異言然大同自相曉知也其人皆深目多須䫇善賈市争分銖貴女子女子所言丈夫乃決正其俗聚婦先以金同心指鐶為聘又以三婢試之不男者絶婚姦淫有子皆卑其母與人馬不調墜死者馬王出斂具其地無絲漆不知鑄鐵器及漢使亡卒降敎鑄作他兵器得漢黄白金輒以為器不用為幣也後漢眀帝時宛又獻汗血馬至後魏文成帝和平六年孝文帝太和三年並遣使獻馬隋時有蘇對沙郍國云即漢大宛也宋膺異物志大宛馬有肉角數寸或有解人語及知音舞與鼓節相應者隋西域圖記云其馬騮馬烏馬多赤耳黄馬赤馬多黒耳唯耳色别自餘毛色與常馬不異又云王姓蘇色匿字底失槃陁積代永襲不絶案今王即底失槃陁之後也桃槐桃槐漢時通焉其國去長安萬一千八百里休循休循漢時通焉王治鳥飛谷在葱嶺西去長安萬二百一十里東至都䕶治所三千一百二十一里至捐毒衍孰谷二百六十里西北至大宛國九百二十里西至大月氏千六百一十里民俗衣服類烏孫因畜隨水草本故塞種也天竺天竺後漢通焉即漢時捐毒國也按漢史捐毒傳云捐毒國王治衍敦谷去長安九千八百六十里其東至都䕶治所二千八百六十一里至疏勒南與葱嶺屬無人民西上葱嶺則休循也西北至大宛千三百里北與烏孫接衣服類烏孫隨水草依葱嶺本塞種也按漢史所云則其國甚小自改稱天竺以後則為大國天竺亦曰身毒一名摩伽陁一名婆羅門在葱嶺之南去月氏東南數千里地方三萬餘里其中分為五天竺一曰中天竺二曰東天竺三曰南天竺四曰西天竺五曰北天竺地各數千里城邑數百南天竺際大海北天竺距雪山四周有山為壁南面一谷通為國門東天竺東際大海與扶南林邑接但隔小海而已西天竺與罽賔波斯接中天竺按四天竺據四天竺之間國各有王從月氏髙附以西南至西海東至磐越國皆天竺之地天竺有别城數百城置長有别國數十國置王雖各小異而俱名天竺扶南傳云舍衛國𨽻屬天竺伽尸國一名波羅奈國亦名波羅奈斯國竺法維佛記云波羅奈國在伽維羅越國南千四百八十里釋法盛歴國傳云其國有稍割牛其牛黒色角細長可四尺餘十日一割或不至十日一割便困病或致死人服牛血皆老夀國人皆夀五百嵗牛夀亦等於人亦屬天竺國都臨恒河一名迦毗棃河河本名新淘源出崑崙分為五𣲖總為恒河其水甘美下有真鹽色正白如水精有靈鷲山胡語曰耆闍崛山山是青石頭如鷲鳥竺法維佛國記云在摩竭提國南亦天竺屬國也其國人土著與月氏同而卑濕暑熱人畏戰弱於月氏其時皆臣屬月氏月氏殺其王置將統其人俗修浮圖道不殺生不飲酒和帝時天竺數遣使貢獻後西域反畔遂絶桓帝延熹二年四年頻從日南徼外來獻世傳明帝夢見金人長大頂有光明以問羣臣或曰西方有神名曰佛其形長丈六尺而黄金色帝於是遣使天竺問佛道法遂於中國圖畫形象焉楚王英始信其術中國因此頗有奉其道者後桓帝好神數事浮屠老子百姓稍有奉者後至轉盛魏晉世絶不復通唯吳時扶南王范㫋遣親人蘇勿使其國從扶南發拘利口循海大灣中正西北入厯灣邉數國可一年餘到天竺江口逆水行七十里乃至焉天竺王驚曰海濵極逺猶有此人乎即令觀視其國内仍遣其臣陳宋等二人以月氏馬四匹報㫋勿積四年方至其時吳遣中郎康泰使扶南及見陳宋等具問天竺土俗云本國佛道所由興也人民敦厖土地饒沃王號茂論所都城郭水泉分流繞于渠塹下注大江其宫殿皆雕文鏤刻街曲市里屋舍樓觀鐘鼓音樂服飾香華水陸流通百賈交會器玩珍瑋恣心所欲左右嘉維舍衛葉波等十六大國去天竺或二三千里共尊奉之以為天地之中宋文帝元嘉五年有迦毗黎國王月愛遣使奉表獻金剛指鐶摩勒金環諸寳物赤白鸚鵡各一明帝泰始二年又遣貢獻以其使主竺扶大竺阿珍並為建威將軍元嘉十八年有蘇摩黎國王那羅跋摩遣使獻方物孝武孝建二年有斤陁利國王釋婆羅那鄰陁遣長史留陀及多獻金銀寳器後廢帝元徽初有婆黎國遣使貢獻凡此諸國皆天竺之屬也梁武帝天監初天竺王屈多遣長史竺羅達奉獻瑠璃唾壺雜香吉貝等物後魏宣武時南天竺遣使獻駿馬云其國出師子貂豹揮胡昆反橐駞犀象有火齊如雲母而色紫别之則薄如蟬翼積之則如紗縠之重㳫有金剛似紫石英百鍊不銷可以切玉瑇瑁金銅鐵鉛錫金縷織成金罽白疊􅕰㲪音塔登又有㫋檀鬱金等物甘蔗諸果石蜜胡椒薑黑鹽西與大秦安息交市海中或至扶南交趾貿易多珊瑚珠璣琅玕俗無簿籍以齒貝為貨尤工幻化丈夫致敬極者䑛足摩踵而致其辭家有竒樂倡妓其王與大臣多服錦罽王為螺髻於頂餘髪翦之使短丈夫翦髪穿耳垂璫俗皆徒跣衣重白色怯於戰鬬有弓箭甲弰亦有飛梯地道木牛流馬之法有文字善天文算厯之術其人皆學悉曇章書云是梵天法書於貝多樹葉以記事隋煬帝通西域遣裴矩應接西蕃諸國多有至者唯天竺不通帝以為恨唐武徳中其國大亂中天竺王尸羅逸多練兵聚衆所向無敵象不解鞍人不釋甲居六嵗而東西南北四天竺國之君皆北面臣之尸羅逸多姓乞利咥氏或云姓刹利氏貞觀十年沙門元奘至其國將梵本經論六百餘部而歸初尸羅逸多問元奘曰爾國有聖人出作秦王破陣樂試為我言其人元奘乃言太宗神聖功徳故尸羅逸多奉表二十二年右衞率府長史王元冊奉使天竺會尸羅逸多死國大亂其臣那伏帝阿羅那順自立乃發兵拒元冊元冊遁抵于吐蕃之西南以書徴鄰國之兵吐蕃發精鋭千二百人泥婆羅國發七千餘騎來赴元冊與其副將師仁率二國之兵進至荼鎛和羅城即中天竺之所居也連戰大破之斬首三千餘級赴水溺死者且萬人獲其王妃及王子等虜男女萬三千人牛馬三萬餘匹於是天竺震響城邑聚落降者五百八十餘所遂俘阿羅那順以還晉宋時浮圖經云臨倪國其王生浮圖太子也父曰屑頭耶母曰莫耶浮圖身體色黄髪青如黛始莫耶夢白象始孕及生從母左脇出生而有髻堕地能行七歩此國在天竺域天竺又有神人名沙律昔漢哀帝元夀元年􅀶士景匿受大月氏使王使伊存口授浮圗經國以象乘入也伊蒲塞桑門比邱皆弟子號也浮圗所載與老子化胡經相出入蓋皆為老子西出闗過西域之天竺教胡為浮圗徒屬弟子號各有二十九不能詳載故畧之諸家記天竺事多取諸僧法明道安之流所記録大率怪誕不經不復悉纂集也莎車莎車漢時通焉王治莎車城去長安九千九百五十里東北至漢都䕶治所四千七百四十六里西至疏勒五百六十里西南至蒲犂七百四十里有鐵山出青玉宣帝時烏孫公主小子萬年莎車王愛之莎車王無子死死時萬年在漢莎車國人計欲自託於漢又欲得烏孫心即上書請萬年為莎車王漢許之遣使者奚充國送萬年萬年初立暴惡國人不説莎車王弟呼屠徴殺萬年并漢使者自立為王約諸國背漢會衞侯馮奉世使送大宛客即以便宜發諸國兵擊殺之更立它昆弟子為莎車王還拜奉世為光禄大夫是嵗元康元年也王莽之亂匈奴單于略有西域唯莎車王延最彊不肯附屬延在元帝時常為侍子長於京師慕樂中國亦復參其典法常勑諸子當世奉漢家不可負也天鳯五年延死諡忠武王子康代立光武初康率傍國拒匈奴擁衞故都䕶吏士妻子千餘口檄書河西問中國動静自陳思慕漢家建武五年河西大將軍竇融乃承制立康為莎車建功懐徳王西域大都尉五十五國皆屬焉九年康死諡宣成王弟賢代立攻破拘彌西夜國皆殺其王而立其兄康兩子為拘彌西夜王十四年賢與鄯善王安並遣使詣闕貢獻於是西域始通葱嶺以東諸國皆屬賢十七年賢復遣使奉獻請都䕶天子以問大司空竇融以為賢父子兄弟相約事漢款誠又至宜加號位以鎮安之帝乃因其使賜賢西域都䕶印綬及車旗黄金錦繡敦煌太守裴遵上言夷狄不可假以大權又令諸國失望詔書收還都䕶印綬更賜賢以漢大將軍印綬其使不肯易遵廹奪之賢由是始恨而猶詐稱大都䕶移書諸國諸國悉服屬焉號賢為單于賢浸以驕横重求賦税數攻龜兹諸國諸國愁懼二十一年冬車師前王鄯善焉耆等十八國俱遣子入侍獻其珍寳及得見皆流涕稽首願得都䕶天子以中國初定北邉未服皆還其侍子厚賞賜之是時賢自負兵彊欲并兼西域攻擊益甚諸國聞都䕶不出而侍子皆還大憂恐乃與敦煌太守檄願留侍子以示莎車言侍子見留都䕶尋出冀且息其兵裴遵以狀聞天子許之二十二年賢知都䕶不至遂遺鄯善王安書令絶通漢道安不納而殺其使賢大怒發兵攻鄯善安迎戰兵敗亡入山中賢殺畧千餘人而去其冬賢復攻殺龜兹王遂兼其國鄯善焉耆諸國侍子久留敦煌愁思皆亡歸鄯善王上書願復遣子入侍更請都䕶都䕶不出誠廹於匈奴天子報曰今使者大兵未能得出如諸國力不從心東西南北自在也於是鄯善車師復附匈奴而賢益横媯塞王自以國逺遂殺賢使者賢擊滅之立其國貴人駟鞬為媯塞王賢又自立其子則羅為龜兹王賢以則羅年少乃分龜兹為烏壘國徙駟鞬為烏壘王又更以貴人為媯塞王數嵗龜兹國人共殺則羅駟鞬而遣使匈奴更請立王匈奴立龜兹貴人身毒為龜兹王龜兹由是屬匈奴賢以大宛貢税減少自將諸國兵數萬人攻大宛大宛王延留迎降賢因將還國徙拘彌王橋塞提為大宛王而康居數攻之橋塞提在國嵗餘亡歸賢復以為拘彌王而遣延留還大宛使貢獻如常賢又徙于闐王俞林為驪歸王立其弟位侍為于闐王嵗餘賢疑諸國欲畔召位侍及拘彌姑墨子合王盡殺之不復置王但遣將鎮守其國位侍子戎亡降漢封為守節侯莎車將君得在于闐暴虐百姓患之明帝永平三年其大人都末出城見野豕欲射之豕乃言曰無射我我乃為汝殺君得都末因此即與其兄弟共殺君得而大人休莫霸復與漢人韓融等殺都末兄弟自立為于闐王復與拘彌國人攻殺莎車將在皮山者引兵歸於是賢遣其太子國相將諸國兵二萬人擊休莫霸霸迎與戰莎車兵敗走殺萬餘人賢復發諸國數萬人自將擊休莫霸霸復破之斬殺過半賢脱身走歸國休莫霸進圍莎車中流矢死兵乃退于闐國相蘇榆勒等共立休莫霸兄子廣徳為王匈奴與龜兹諸國共攻莎車不能下廣徳承莎車之敝使弟輔國侯仁將兵攻賢賢連被兵革乃遣使與廣徳和先是廣徳父拘在莎車數嵗於是賢歸其父而以女妻之結為兄弟廣徳引兵去明年莎車相且運等且音子余反患賢驕暴宻謀反城降于闐反音番于闐王廣徳乃發諸國兵三萬人攻莎車賢城守使使謂廣徳曰我歸汝父與汝婦汝來擊我何為廣徳曰王我婦父也久不相見願各從兩人會城外結盟賢以問且運且運曰廣徳女壻至親宜出見之賢乃輕出廣徳遂執賢而且運等因内于闐兵虜賢妻子而并其國鎻賢將歸嵗餘殺之匈奴聞廣徳滅莎車遣五將發焉耆尉犂龜兹十五國兵三萬餘人圍于闐廣徳乞降以其太子為質約嵗給罽絮冬匈奴復遣兵將賢質子不居徴立為莎車王廣徳又攻殺之更立其弟齊黎為莎車王章帝元和三年時長史班超發諸國兵擊莎車大破之由是遂降漢事具班超傳自後無聞後魏時有渠莎國云故莎車也疏勒疏勒漢時通焉王治疏勒城去長安九千三百五十里東至都䕶治所二千二百一十里南至莎車五百六十里西當大月氏大宛康居道土多稻粟蔗麥銅鐵綿錦雌黄後漢明帝永平十六年龜兹王建攻殺疏勒王成自以龜兹左侯兠題為疏勒王冬漢遣軍司馬班超劫縛兠題而立成之兄子忠為疏勒王忠後反畔超擊斬之事具超傳安帝元初中疏勒王安國以舅臣磐有罪徙於月氏月氏王親愛之後安國死無子母持國政與國人共立臣磐同産弟子遺腹為疏勒王臣磐聞之請月氏王曰安國無子種人㣲弱若立母氏我乃遺腹之叔父也我當為王月氏乃遣兵送還疏勒國人素敬愛臣磐又畏憚月氏即共奪遺腹印綬迎臣磐立為王更以遺腹為磐稾城侯後莎車連叛于闐屬疏勒疏勒以彊故得與龜兹于闐為敵國焉順帝永建二年臣磐遣使朝獻帝拜臣磐為漢大都尉兄子臣勲為守國司馬五年臣磐遣侍子與大宛莎車使俱詣闕陽嘉二年臣磐復獻師子封牛至靈帝建寧元年疏勒王與漢大都尉於獵中為其季父和得所射殺和得自立為王三年涼州刺史孟佗遣從事任渉將敦煌兵五百人與戊巳司馬曹寛西域長史張晏將焉耆龜兹車師前後部合三萬餘人討疏勒攻楨中城四十餘日不能下引去其後疏勒王連相殺害朝廷亦不能禁後魏文成末其王遣使送釋迦牟尼佛袈裟一長二丈餘帝以審是佛衣應有靈異遂命火焚之經日不然觀者悚駭使人云其國見都在姑黙西白山南百餘里去代一萬一千二百五十里南有河西帶葱嶺葱嶺亦名雪山在國西北百餘里河原所自出東去龜兹千五百里西去撥汗撥汗一作判汗千里南去朱俱波八九百里東北至突厥牙帳千餘里東南去𤓰州四千六百里疑即漢疏勒舊城也其國内有大城十二小城數十王戴金師子冠國人手足皆六指産子非六指者則不育隋煬帝世復通焉唐貞觀中仍遣使朝貢國王在唐時姓裴并有漢時莎車捐毒休循三國之地侍子常在京師杜還經行記云拔汗那國在怛邏斯南千里東隔山去疏勒二千餘里西去石國千餘里城有數十兵有數萬唐天寳十年嫁和義公主於此國土有波羅林林下有毬場又有野䑕遍滿于谷偏宜蒲萄馣羅果香棗桃李從此國至西海盡居土室衣羊皮疊布男子婦人皆着鞾婦女不飾鉛粉以青黛塗眼而已馣音諳尉頭尉頭漢時通焉王治尉頭谷去長安八千六百五十里東至都䕶治所千四百一十一里南與疏勒接山道不通西至捐毒千三百一十四里徑道馬行二日田畜隨水草衣服類烏孫烏孫烏孫漢時通焉大昆彌治赤谷城烏孫於西域諸戎其形最異今之胡人青眼赤髭鬂狀類彌猴者本其種也其國謂王曰昆彌亦曰昆莫去長安八千九百里東至都䕶治所千七百二十一里西至康居蕃内地五千里地莽平多雨雪山多松樠其心似松武元反不田作種樹隨畜逐水草與匈奴同俗國多馬富人至四五千匹民剛忿貪狼無信多寇盗最為彊國故服匈奴後盛大取覊屬不肯往朝會東與匈奴西北與康居西與大宛南與城郭諸國相接本塞地也大月氏西破走塞王塞王南越懸度大月氏居其地後烏孫昆莫擊破大月氏大月氏徙西臣大夏而烏孫昆莫居之故烏孫民有塞種大月氏種云始張騫言烏孫本與大月氏共在敦煌間今烏孫雖彊大可厚賂招令東居故地妻以公主與為昆弟以制匈奴語在張騫傳武帝即令騫齎金幣往昆莫見騫如單于禮騫大慙謂曰天子致賜王不拜則還賜昆莫起拜其他如故初昆莫有十餘子中子大禄彊善將將衆萬餘騎别居大禄兄太子太子有子曰岑陬岑音仕林反陬音子侯反太子蚤死謂昆莫曰必以岑陬為太子昆莫哀許之大禄怒廼收其昆弟將衆畔謀攻岑陬昆莫與岑陬萬餘騎令别居昆莫亦自有萬餘騎以自備國分為三大總羈屬昆莫騫既致賜諭指曰烏孫能東居故地則漢遣公主為夫人結約為昆弟共距匈奴不足破也烏孫逺漢未知其大小又近匈奴服屬日久其大臣皆不欲徙昆莫年老國分不能專制廼發使送騫因獻馬數十匹報謝其使見漢人衆富厚歸其國其國後廼益重漢匈奴聞其與漢通怒欲擊之又漢使烏孫乃出其南抵大宛月氏相屬不絶烏孫於是恐使使獻馬願得尚漢公主為昆弟天子問羣臣議許曰必先内聘然後遣女烏孫以馬千匹聘漢元封中遣江都王建女細君為公主以妻焉賜乘輿服御物為備官屬宦官侍御數百人贈送甚盛烏孫昆莫以為右夫人匈奴亦遣女妻昆莫昆莫以為左夫人公主至其國自治宫室居嵗時一再與昆莫會置酒飲食以幣帛賜王左右貴人昆莫年老語言不通公主悲愁自為作歌曰吾家嫁我兮天一方逺託異國兮烏孫王穹廬為室兮旃為牆以肉為食兮酪為漿食謂飯音飤居常土思兮心内傷願為黄鵠兮歸故鄉天子聞而憐之閒嵗遣使者持帷帳錦繡給遺焉昆莫年老欲使其孫岑陬尚公主公主不聼上書言狀天子報曰從其國俗欲與烏孫共滅胡岑陬遂妻公主昆莫死岑陬代立岑陬者官號也名軍須靡昆莫王號也名獵驕靡後書昆彌云昆莫本是王號而其人名獵驕靡故書云昆彌昆取昆莫彌取驕靡彌靡音有輕重耳蓋本一也後遂以昆彌為王號也岑陬尚江都公主生一女少夫公主死漢復以楚王戊之孫解憂為公主妻岑陬岑陬胡婦子泥靡尚小岑陬且死以國與季父大禄子翁歸靡曰泥靡大以國歸之翁歸靡既立號肥王復尚楚主解憂生三男兩女長男曰元貴靡次曰萬年為莎車王次曰大樂為左大將長女弟史為龜兹王絳賔妻小女素光為若呼翖侯妻昭帝時公主上書言匈奴發騎田車師車師與匈奴為一共侵烏孫唯天子幸救之漢養士馬議欲擊匈奴會昭帝崩宣帝初即位公主及昆彌皆遣使上書言匈奴復連發大兵侵擊烏孫取車延惡師地收人民去使使謂烏孫趣持公主來欲隔絶漢昆彌願發國半精兵自給人馬五萬騎盡力擊匈奴唯天子出兵以救公主昆彌漢兵大發十五萬騎五將軍分道並出語在匈奴傳遣校尉常惠使持節䕶烏孫兵昆彌自將翖侯以下五萬騎從西方入至右谷蠡王庭獲單于父行及嫂居次名王犂汙都尉千長騎將以下四萬級馬牛羊驢橐駞七十餘萬頭烏孫皆自取所虜獲還封惠為長羅侯是嵗本始三年也漢遣惠持金幣賜烏孫貴人有功者元康二年烏孫昆彌因惠上書願以漢外孫元貴靡為嗣得令復尚漢公主結婚重親畔絶匈奴願聘馬驘各千匹詔下公卿議大鴻臚蕭望之以為烏孫絶域變故難保不可許上美烏孫新立大功又重絶故業遣使者至烏孫先迎取聘昆彌及太子左右大將軍都尉皆遣使凡三百餘人入漢迎取少主上廼以烏孫主解憂弟子相夫為公主置官屬侍御百餘人舍上林中學烏孫言天子自臨平樂觀會匈奴使者外國君長大角抵設樂而遣之使長羅侯光禄大夫惠為副凡持節者四人送少主至敦煌未出塞聞烏孫昆彌翁歸靡死烏孫貴人共從本約立岑陬子泥靡代為昆彌號狂王惠上書願留少主敦煌惠馳至烏孫責讓不立元貴靡為昆彌還迎少主事下公卿望之復以為烏孫持兩端難結約前公主在烏孫四十餘年恩愛不親宻邊竟未得安此已事之驗也今少主以元貴靡不立而還信無負於夷狄中國之福也少主不止繇役將興其原起此天子從之徴還少主狂王復尚楚主解憂生一男鴟靡不與主和又暴惡失衆漢使衞司馬魏和意副候任昌送侍子公主言狂王為烏孫所患苦易誅也遂謀置酒會罷使士拔劒擊之劒旁下狂王傷上馬馳去其子細沈痩痩音捜會兵圍和意昌及公主於赤谷城數月都䕶鄭吉發諸國兵救之廼解去漢遣中郎將張遵持醫藥治狂王賜金二十斤采繪因收和意昌係𤨏從尉犂檻車至長安斬之車騎將軍長史張翁留驗公主與使者謀殺狂王狀主不服叩頭謝張翁捽主頭罵詈捽持其頭音材兀反主上書翁還坐死副使季都别將醫養視狂王狂王從十餘騎送之都還坐知狂王當誅見便不發下蠶室初肥王翁歸靡胡婦子烏就屠狂王傷時驚與諸翖侯俱去居北山中揚言母家匈奴兵來故衆歸之後遂襲殺狂王自立為昆彌漢遣破羌將軍辛武賢將兵萬五千至敦煌遣使者案行表穿卑鞮侯井以西欲通渠轉榖積居廬舍以討之初楚主侍者馮嫽音了嫽者慧也故以為名能史書習事嘗持漢節為公主使行賞賜於城郭諸國敬信之號曰馮夫人為烏孫右大將妻右大將與烏就屠相愛都䕶鄭吉使馮夫人説烏就屠以漢兵方出必見滅不如降烏就屠恐曰願得小號宣帝徴馮夫人自問狀遣謁者竺次期門甘延夀為副送馮夫人馮夫人錦車持節詔烏就屠詣長羅侯赤谷城立元貴靡為大昆彌烏就屠為小昆彌皆賜印綬破羌將軍不出塞還後烏就屠不盡歸諸翖侯民衆漢復遣長羅侯惠將三校屯赤谷因為分别其人民地界大昆彌户六萬餘小昆彌户四萬餘然衆心皆附小昆彌元貴靡䲭靡皆病死公主上書言年老土思願得歸骸骨葬漢地天子閔而迎之公主與烏孫男女三人俱來至京師是嵗甘露三年也時年且七十賜以公主田宅奴婢奉養甚厚朝見儀比公主後二歲卒三孫因留守墳墓云元貴靡子星靡代為大昆彌弱馮夫人上書願使烏孫鎮撫星靡漢遣吏卒百人送烏孫焉都䕶韓宣奏烏孫大吏大禄大監皆可以賜金印紫綬以尊輔大昆彌漢許之後都䕶韓宣復奏星靡怯弱可免更以季父左大將樂大為昆彌漢不許後段會宗為都䕶招還亡畔安定之星靡死子雌栗靡代小昆彌烏就屠死子拊離代立為弟日貳所殺漢遣使者立拊離子安日為小昆彌日貳亡阻康居漢徙已校屯姑墨欲候便討焉安日使貴人姑莫匿等三人詐亡從日貳刺殺之都䕶廉襃賜姑莫匿等金人二十斤繒三百匹後安日為降民所殺漢立其弟末振將代時大昆彌雌栗靡健翖侯皆畏服之告民牧馬畜無使入牧國中大安和翁歸靡時勝於翁歸靡時也小昆彌末振將恐為所并使貴人烏日領詐降刺殺雌栗靡漢欲以兵討之而未能遣中郎將段會宗持金幣與都䕶圖方畧立雌栗靡季父公主孫伊秩靡為大昆彌漢没入小昆彌侍子在京師者久之大昆彌翖侯難栖殺末振將末振將兄安日子安犂靡代為卜昆彌末振將之兄名安日安日之子名安犂靡漢恨不自責誅末振將復使段會宗即斬其太子番邱番音盤還賜爵闗内侯是歲元延二年也會宗以翖侯難栖殺末振將雖不指為漢合於討賊奏以為堅守都尉責大禄大吏大監以雌栗靡見殺狀奪金印紫綬更與銅墨云末振將弟卑爰㚄㚄音竹二反本共謀殺大昆彌將衆八萬餘口北附康居謀欲藉兵藉借也兼并兩昆彌兩昆彌畏之親倚都䕶哀帝元夀二年大昆彌伊秩靡與單于並入朝漢以為榮至元始中卑爰疐殺烏日領以自效漢封為歸義侯兩昆彌皆弱卑爰疐侵陵都䕶孫建襲殺之自烏孫分立兩昆彌後漢用憂勞且無寧歲其後無聞至後魏時其國數為蠕蠕所侵西徙葱嶺山中無城郭隨畜牧逐水草太武太延三年遣使者董琬等使其國後每朝貢云姑墨姑墨漢時通焉王治南城去長安八千一百五十里東至都䕶治所二千二十一里一作千二十里一作二千二十里南至于闐馬行十五日北與烏孫接出銅鐵雌黄東通龜兹六百七十里王莽時姑墨王丞殺温宿國王并其國後魏時役屬龜兹温宿温宿漢時通焉王治温宿城去長安八千三百五十里東至都䕶治所二千三百八十里西至尉頭三百里北至烏孫赤谷六百一十里土地物類所有與鄯善諸國同東通姑墨二百七十里至後魏時役屬龜兹龜兹烏壘渠犂附龜兹國漢時通焉王治延城去長安七千四百八十里南與精絶東南與且末西南與扜彌北與烏孫西與姑墨接能鑄冶俗有城郭其城三重中有佛塔廟千所人以田種畜牧為業男女皆翦髪垂項王宫壯麗煥若神居東至都䕶治所烏壘城三百五十里烏壘都尉一人户百一十與都䕶同治其南三百三十里至渠犂城渠犂都尉一人户百三十東北與尉犂東南與且末南與精絶接西有河至龜兹五百八十里自武帝初通西域置校尉屯田渠犂是時軍旅連出師行三十二年海内虚耗征和中貳師將軍李廣利以軍降匈奴上既悔逺征而捜粟都尉桑𢎞羊與丞相御史奏言故輪臺東捷枝渠犂皆故國地廣饒水草有溉田五千頃以上處温和田美可益通溝渠種五榖與中國同時熟其旁國少錐刀貴黄金采繒可以易榖食宜給足不可乏宜遣屯田卒詣故輪臺以東置校尉三人分䕶各舉圖地形通利溝渠務使以時益種五榖張掖酒泉遣騎假司馬為斥候屬校尉事有便宜因騎置以聞田一歲有積榖募民壯健有累重敢徙者詣田所就畜積為本業益墾溉田稍築列亭連城而西以威西國輔烏孫為便臣謹遣徴事臣昌分部行邊嚴勑大守都尉明㷭火選士馬謹斥候蓄茭草願陛下遣使使西國以安其意武帝下詔深陳既往之悔曰前有司奏欲益民賦三十助邊用三十者每口轉增三十錢是重困老弱孤獨也而今又請遣卒田輪臺輪臺西於車師千餘里前開陵侯擊車師時危須尉犂樓蘭六國子弟在京師者皆先歸發畜食迎漢軍又自發兵凡數萬人王各自將共圍車師降其王諸國兵便罷力不能復至道上食漢軍食音嗣漢軍破城食至多然士自載不足以竟師彊者盡食畜産羸者道死數千人朕發酒泉驢橐駞負食出玉門迎軍吏卒起張掖不甚逺然尚厮留甚衆曩者朕之不明以軍候𢎞上書匈奴縛馬前後足置城下馳言秦人我匄若馬謂中國為秦人習故言也匄乞與也若汝也乞音氣又漢使者久留不還故興師遣貳師將軍欲以為使者威重也古者卿大夫與謀參以蓍龜不吉不行乃者以縛馬書徧視丞相御史二千石諸大夫郎為文學者乃至郡屬國都尉成忠趙破奴等皆以匈奴自縛其馬不祥甚哉或以為欲以見彊夫不足者視人有餘易之卦得大過爻在九五匈奴困敗公車方士太史治星望氣及太卜龜蓍皆以為吉匈奴必破時不可再得也又曰北伐行將於鬴山必克卦諸將貳師最吉以故朕乃親發貳師下鬴山詔之必毋深入今計謀卦兆皆反繆重合侯得匈奴候者言聞漢軍當來匈奴使巫埋羊牛所出諸道及水上以詛軍單于遺天子馬裘常使巫祝之縳馬者詛軍事也又卜漢軍一將不吉匈奴常言漢極大然不能饑渇能音耐失一狼走千羊乃者貳師敗軍事死畧離散悲痛常在朕心今請逺田輪臺欲起亭隧是擾勞天下非所以優民也今朕不忍聞大鴻臚等又議欲募囚徒送匈奴使者明封侯之賞以報忿五伯所弗能為也且匈奴得漢降者常提掖捜索問以所聞捜索者恐其或私齎文書也今邊塞未正闌出不禁障候長吏使卒獵獸以皮肉為利卒苦而㷭火乏失亦上集不得後降者來若捕生口虜乃知之當今務在於禁苛暴止擅賦力本農修馬復令以補缺毋乏武備而已郡國二千石各上進畜馬方畧補邊狀與計對由是不復出軍而封丞相車千秋為富民侯以明休息富養民也初貳師將軍李廣利擊大宛還過扜彌扜彌遣太子頼丹質龜兹廣利責龜兹曰外國皆臣屬於漢龜兹何以得受扜彌質即將頼丹入至京師昭帝乃用桑𢎞羊前議以扜彌太子頼丹為校尉將軍田輪臺輪臺與渠犂地皆相連也龜兹貴人姑翼謂其王曰頼丹本臣屬吾國今佩漢印綬來征吾國而田必為害王即殺頼丹而上書謝漢漢未能征宣帝時長羅侯常惠使烏孫還便宜發諸國兵合五萬人攻龜兹責以前殺校尉頼丹龜兹王謝曰乃我先王時為貴人姑翼所誤我無罪執姑翼詣惠惠斬之時烏孫公主遣女來至京師學鼓琴漢遣樂奉送公主過龜兹龜兹前遣人至烏孫求公主女未還會女過龜兹龜兹王留不遣復使報公主主許之後公主上書願令女比宗室入朝而龜兹王絳賔亦愛其夫人上書言得尚漢外孫為昆弟願與公主女俱入朝元康元年遂來朝賀王及夫人皆賜印綬夫人號稱公主賜以車騎旗鼓歌吹數十人綺繡雜繒竒珍凡數千萬留且一年厚贈送之後數來朝賀樂漢衣服制度歸其國治宫室作徼道周衞出入傳呼撞鐘鼓如漢家儀外國胡人皆曰驢非驢馬非馬若龜兹王所謂驘也絳賔死其子丞徳自謂漢外孫成哀帝時往來尤數漢遇之亦甚親宻自西域敗没遂不復通建武以降或臣或叛互見諸戎傳中晉武太康中其王遣子入侍惠懐末以中國擾亂就貢方物於張重華苻堅時堅命其將吕光率衆七萬伐之其王白純距境不降光進軍討平之後魏太武太延中嘗遣使入貢梁普通二年其王尼瑞摩珠那勝奉表達于建康唐貞觀二十三年將軍阿史那社爾伐龜兹虜其王如歸立嗣子素稽為王安西都䕶府治其城焉龜兹之在唐世則并有漢時姑墨温宿尉頭三國之地云尉犂尉犂漢時通焉王治尉犂城去長安六千七百五十里西至都䕶治所三百里南與鄯善且末接危須危須漢時通焉王治危須城去長安七千二百九十里西至都䕶治所五百里至焉耆百里焉耆焉耆漢時通焉王治員渠城去長安七千三百里西南至都䕶治所四百里南去尉犂百里北與烏孫接東去交河城九百里西去龜兹九百里皆沙磧其國近海水多魚鹽蒲葦之利四面有大山道險阨易守海水曲入四山之内周匝其城三十餘里後漢明帝永平中有户萬五千與龜兹共攻沒都䕶陳睦校尉郭恂殺吏士二千餘人至永元六年都䕶班超發諸國兵討焉耆危須尉犂山國遂斬焉耆尉犂二王首傳送京師縣蠻夷邸超乃立焉耆左侯元孟為王尉犂危須山國皆更立其王至安帝時西域皆叛延光中超子勇為西域長史復討定諸國元孟與尉犂危須不降永建二年勇與敦煌太守張朗擊破之元孟乃遣子詣闕貢獻晉武帝太康中其王龍安遣子入侍安夫人獪胡之女妊身十二月剖脅生子曰會立之為世子會少而勇傑安病篤謂會曰我嘗為龜兹王白山所辱不忘於心汝能雪之乃吾子也及會立襲滅白山遂據其國遣子熙歸本國為王會有膽氣籌略遂霸西胡葱嶺以東莫不率服其俗丈夫翦髪婦人衣襦著大袴婚姻同於華夏兵有弓刀甲楯死亡者皆焚而後𦵏其服制滿七日則除之俗事天神尤崇信佛道氣候寒土田良沃榖有稻粟菽麥畜有駞馬牛羊養蠶不以為絲唯取綿纊俗尚蒲萄酒兼愛音樂會之據龜兹也恃勇輕率嘗出宿于外為龜兹國人羅雲所殺其後張駿遣沙州刺史楊宣率衆彊理西域宣以部將張植為前鋒所向風靡軍次焉耆熙距戰於賁崙城為植所敗植進屯鐵門未至十餘里熙又率衆先要之於遮留谷植將至或曰漢祖畏於柏人岑彭死於彭亡今谷名遮留殆將有伏植單騎嘗之果有伏發植馳擊敗之進據尉犂熙率其羣下四萬人肉袒降于宣吕光討西域復降于光及光僭位姑臧熙又遣子入侍後魏太武世嘗遣成周公萬度歸討焉耆其王鳩尸畢那衆大潰單騎走入山中度歸進屠其城先是四部諸戎皆降服焉耆焉耆為國斗絶一隅充實日久魏獲其珍竒異玩殊方詭譎難名之物不可勝計橐駞馬牛雜畜殆至巨萬至後周武帝保定四年其王遣使獻名馬隋煬帝大業中其王龍突騎遣貢方物唐貞觀六年又遣使奉獻突騎姓王當是龍安之後或未可知焉耆之在唐世盡并有漢時尉犂危須山國三國之地并鄯善之北界矣烏貪訾離烏貪訾離漢時通焉王治于婁谷去長安萬三百三十里東與單桓南與且彌西與烏孫接卑陸卑陸漢時通焉王治天山東接乾當谷去長安八千六百八十里西南至都䕶治所千二百八十七里卑陸後國卑陸後國王治番渠類谷番音步潘反去長安八千七百一十里其地東與郁立師北與匈奴西與劫國南與車師接郁立師郁立師漢時通焉王治内咄谷咄丁忽反去長安八千八百三十里東與車師後城長西與卑陸北與匈奴接單桓單桓漢時通焉王治單桓城去長安八千八百七十里蒲類蒲類漢時通焉王治天山西疏榆谷去長安八千三百六十里西南至都䕶治所千三百八十七里人廬帳而居逐水草頗知田作有牛馬駱駞羊畜能作弓矢國出好馬蒲類本大國也前西域屬匈奴而其王得罪單于單于怒徙蒲類萬六千餘口内之匈奴右部阿惡地因號曰阿惡國南去車師後部馬行九十餘日人口貧羸逃亡山谷間故留為國云蒲類後國蒲類後國去長安八千六百三十里移支移支後漢時通焉王居蒲類地其人勇猛敢戰以寇鈔為事皆被髪隨畜逐水草不知田作所出皆與蒲類同西且彌西且彌漢時通焉王治天山東于大谷去長安八千六百七十里西南至都䕶治所千四百八十七里東且彌東且彌漢時通焉王治天山東兑虚谷去長安八千二百五十里西南至都䕶治所千五百八十七里人廬帳而居逐水草頗田作其所出有亦與蒲類同所居無常劫國劫國漢時通焉王治天山東丹渠谷去長安八千五百七十里西南至都䕶治所千四百八十七里狐胡狐胡漢時通焉王治車師桞谷去長安八千二百里西至都䕶治所千一百四十七里至焉耆七百七十里山國山國漢時通焉去長安七千一百七十里西至尉犂二百四十里西北至焉耆百六十里西至危須二百六十里東南與鄯善且末接山出鐵民山居寄田糴榖於焉耆龜兹車師車師前王後王並漢時通焉前王國一曰前部治交河城今交河郡水分流繞城下故以為號去長安八千一百五十里西南至都䕶治所千八百七里西域長史及戊巳校尉並治於此去敦煌十三日行其地東西三百里南北五百里四面多大山後王治務塗國唐北庭府蒲類縣也去長安八千九百五十里西南至都䕶治所千二百三十七里北與匈奴接又有車師後城長國武帝天漢二年以匈奴降者介和王為開陵侯將樓蘭國兵始擊車師匈奴遣右賢王將數萬騎救之漢兵不利引去征和四年遣重合侯馬通將四萬擊匈奴道過車師復遣開陵侯將樓蘭尉犂危湏凢六國兵别擊車師勿令得遮重合侯諸國共圍車師車師王降服臣屬漢昭帝時匈奴復使四千騎田車師宣帝即位遣祈連将軍田廣明等五將軍將兵擊匈奴車師田者驚去車師復通於漢匈奴怒召其太子軍宿欲以為質軍宿焉耆外孫不欲質匈奴亡走焉耆車師王更立子烏貴為太子及烏貴立為王與匈奴結婚姻敎匈奴遮漢道通烏孫者地節二年漢遣侍郎鄭吉校尉司馬憙許吏反將免刑罪人田渠犂積榖欲以攻車師至秋收榖吉憙發城郭諸國兵萬餘人自與所將田士千五百人共擊車師攻交河城破之王尚在其北石城中未得㑹軍食盡吉等且罷兵歸渠犂田秋収畢復發兵攻車師王於石城王聞漢兵且至北走匈奴求救匈奴未為發兵王來還與貴人蘇猶議欲降漢恐不見信蘇猶敎王擊匈奴邊國小蒲類斬首略其人民以降吉車師旁小金附國隨漢軍後盗車師車師王復自請擊破金附匈奴聞車師降漢發兵攻車師吉憙引兵北迎之匈奴不敢前吉憙即留一候與卒二十人留守王吉等引兵歸渠犂車師正恐匈奴兵復至而見殺之也乃輕騎奔烏孫吉即迎其妻子置渠犂東奏事至酒泉有詔還田渠犂及車師益積榖以安西國侵匈奴吉還傳送車師王妻子詣長安賞賜甚厚每朝㑹四夷常尊顯以示之於是吉始使吏卒三百人别田車師得降者言單于大臣皆曰車師地肥美近匈奴使漢得之多田積榖必害人國不可不爭也果遣騎來擊田者吉乃與校尉盡将渠犂田士千五百人往田匈奴益復遣騎來漢田卒少不能當保車師城中匈奴将即甘城下謂吉曰單于争此地不可田也圍城數日乃解後常數千騎往來守車師吉上書言車師去渠犂千餘里間以河山北近匈奴漢兵在渠犂者埶不能相救願益田卒公卿議以為道逺煩費可且罷車師田者詔遣長羅侯常惠將張掖酒泉騎出車師北千餘里揚威武車師旁胡騎引去吉乃得出歸渠犂凡三校尉屯田車師王之走烏孫也烏孫留不遣遣使上書願留車師王備國有急可從西道以擊匈奴漢許之於是漢召故車師太子軍宿在焉耆者立以為王盡徙車師國民令居渠犂遂以車師故地與匈奴車師王得近漢田官與匈奴絶亦安樂親漢後漢使侍郎殷廣徳責烏孫求車師王烏孫遣其貴人將詣闕賜第與其妻子居是嵗元康四年也其後置戊巳校尉屯田居車師故地元始中車師後王國有新道出五船北通玉門闗往來差近戊巳校尉徐普欲開以省道里半避白龍堆之阸車師後王姑句音鈎以道當為拄置拄竹羽反言新道當出於後王國漢使往來後王主為之供億拄置猶儲偫也心不便也地又頗與匈奴南將軍地接普欲分明其界然後奏之召姑句使證之不肯繫之姑句數以牛羊賕吏求出不得姑句家矛端生火其妻股紫陬謂姑句曰矛端生火此兵氣也利以用兵前車師前王已為都䕶司馬所殺今久繫必死不如降匈奴即馳突出髙昌壁入匈奴又去胡來王唐兠國比大種赤水羌比近也音頻寢反數相寇不勝告急都䕶但欽欽不以時救助唐兠困急怨欽東守玉門闗玉門闗不納即将妻子人民千餘人亡降匈奴匈奴受之而遣使上書言狀是時新都侯王莾秉政遣中郎將王昌等使匈奴告單于西域内屬不當得受單于謝罪執二王以付使者莽使中郎王萌待西域惡都奴界上逄受單于遣使送因請其罪使者以聞莽不聽詔下㑹西域諸國王陳軍斬姑句唐兠以示之至莽簒位建國二年以廣新公甄豐為右伯當出西域車師後王湏置離聞之與其右將股鞮左將尸泥支謀曰聞甄公為西域太伯當出故事給使者牛羊穀芻茭導譯前五威將過所給使尚未能備今太伯復出國益貧恐不能稱欲亡入匈奴戊巳校尉刁䕶聞之召置離驗問辭服乃械置都䕶但欽在所埓婁城置離人民知其不還皆哭而送之至欽則斬置離置離兄輔國侯狐蘭支將置離衆二千餘人驅畜產舉國亡降匈奴是時莽易單于璽單于恨怒遂受狐蘭支降遣兵與共擊車師後城長傷都䕶司馬及狐蘭支兵復還入匈奴時戊巳校尉刁䕶病遣史陳良屯桓且谷備匈奴宼且子余反史終帶取糧食司馬丞韓元領諸壁右曲侯任商領諸壘相與謀曰西域諸國頗皆叛匈奴欲大侵要死可殺校尉将人衆降匈奴即将數千騎至校尉府脅諸亭令燔積薪分告諸壁曰匈奴十萬騎來入吏士皆持兵後者斬得三四百人去校尉府數里止晨火㸐古然字校尉開門擊鼓收吏士良等隨入遂殺校尉刁䕶及子男四人諸昆弟子男獨遺婦女小兒止留戊巳校尉城遣人與匈奴南將軍相聞南将軍以二千騎迎良等良等盡脅略戊巳校尉吏士男女二千餘人入匈奴單于以良帶為烏賁都尉賁音奔後三嵗單于死弟烏絫單于咸立復與莽和親莽遣使者多齎金幣賂單于購求陳良終帯等單于盡収四人及手殺刁䕶者芝音妻子以下二十七人皆械檻車付使者到長安莽皆燒殺之其後莽復欺詐單于和親遂絶匈奴大擊北邊而西域亦瓦解焉耆國近匈奴先叛殺都䕶但欽莽不能討天鳯三年乃遣五威将王駿西域都䕶李崇将戊巳校尉出西域諸國皆郊迎送兵榖焉耆詐降而聚兵自備駿等將莎車龜兹兵七千餘人分為數部入焉耆焉耆伏兵要遮駿及姑墨尉犂危湏國兵為反間還共襲擊駿等皆殺之唯戊巳校尉郭欽别將兵後至焉耆焉耆兵未還欽擊殺其老弱引兵還莽封欽為剼胡子剼子小反李崇収餘士還保龜兹數年莽死崇遂没西域因絶東漢建武二十一年車師後王與鄯善焉耆等國遣子入侍光武遣還之乃附屬匈奴明帝永平十六年漢取伊吾盧通西域車師始復内屬匈奴遣兵擊之復降匈奴和帝永元二年大将軍竇憲破北匈奴車師震慴前後王各遣子奉貢入侍並賜印綬金帛八年戊巳校尉索頵欲廢後部王涿鞮立破虜侯細致涿鞮忿前王尉卑大賣已因反擊尉卑大獲其妻子明年漢遣将兵長史王林發涼州六郡兵及羌胡二萬餘人以討涿鞮獲首虜千餘人涿鞮入北匈奴漢軍追擊斬之立涿鞮弟農竒為王至永寧元年後王軍就及毋沙麻反畔殺後部司馬及敦煌行事至安帝延光四年長史班勇擊軍就大破斬之順帝永建元年勇率後王農竒子加特奴及八滑等發精兵擊北匈奴呼衍王破之勇於是上立加特奴為後王八滑為後部親漢侯陽嘉三年夏車師後部司馬率加特奴等千五百人掩擊北匈奴於閶吾陸谷獲其母及季母殺掠甚衆四年春呼衍王率兵侵後部帝以車師接近北匈奴為西域蔽扞乃令敦煌太守發諸國兵及玉門闗候伊吾司馬合六千三百騎救之掩擊呼衍王於勒山漢軍不利秋呼衍王復将二千人攻後部破之桓帝元嘉元年呼衍王将三千餘騎寇伊吾伊吾司馬毛愷與戰于蒲類海東吏士悉為所没呼衍王遂攻伊吾屯城夏遣敦煌太守司馬逹將敦煌酒泉張掖屬國吏兵四千餘人救之出塞至蒲類海呼衍王聞而引去漢軍無功而還永興元年車師後部王阿羅多與戊部候嚴皓不相得遂忿戾反畔攻圍漢屯田且固城殺傷吏士後部侯炭遮領餘人畔阿羅多詣漢吏降阿羅多廹急將其母妻從百餘騎亡走北匈奴中敦煌太守宋亮上立後部故王軍就質子卑君為後部王後阿羅多復從匈奴中還與卑君争國頗收其國人戊校尉閻詳慮其招引北匃奴將亂西域乃開信告示許復為王阿羅多乃詣詳降於是收奪所賜卑君印綬更立阿羅多為王仍將卑君還敦煌以後部人三百帳别屬役之食其税帳者猶中華之戸数也自後無聞至魏時賜其王壹多羅守魏侍中號大都尉晉世以交河城為髙昌郡盖因其地髙敞人庻蕃盛立名或云昔漢武帝遣兵西討師旅頓弊者因住焉有漢時髙昌壘故也張軌呂光沮渠䝉遜在河西皆置太守以統之其國人面貌類髙麗男女辮髮垂之於背皆著長身小䄂袍縵襠袴女子頭髮辮而不垂著錦纈纓絡環釧其地髙燥多石磧氣候溫暖與益州相似榖麥再熟宜蠶多五果有草名為羊刺其上生密而味甚佳地產赤鹽其色如朱復有白鹽其形如玉髙昌人取以為枕貢之中國多蒲萄酒俗事天神兼信佛法國中羊馬牧在隐僻處以避外寇非貴人不知其所又有草實如繭中絲如細纑名為白疊子國人取以為布交市用焉其國北有赤石山山北七十里有貪汗山夏有積雪此山之北鐵勒界也從武威西北有㨗路度沙磧千餘里四面茫然無有蹊徑欲往者不可准記唯以人畜骸骨及駝糞為驗路中或聞歌哭之聲行人尋之多致亡失盖魑魅魍魎也故商旅往來多取伊吾路後魏太武時有闞爽者自為髙昌太守太延中遣散騎侍郎王恩生等使髙昌為蠕蠕所執太平真君中爽為沮渠無諱所奪襲據之爽㧞其衆三分之一欲奔蠕蠕保焉耆東界後八年爽子車夷落在焉耆上表朝廷求賑救太武詔開焉耆倉以給之無諱死弟安周立文成和平元年其地為蠕蠕所并蠕蠕以闞伯周為髙昌王髙昌稱王自此始也孝文太和初伯周死子義成立嵗餘為從兄首歸所殺自立為髙昌王五年髙車主阿伏至羅殺首歸兄弟以敦煌人張孟明為王後為國人所殺立馬儒為王以鞏顧禮麴嘉為左右長史二十一年儒遣司馬王體元奉表朝貢請師迎接求舉國内徙孝文納之遣明威将軍韓安保率騎千餘赴之割伊吾地五百里使儒居之至羊榛水儒遣嘉禮率歩騎一千五百迎安保去髙昌四百里而安保不至禮等還髙昌安保亦還伊吾安保遣使與韓興安等十二人使髙昌儒復遣顧禮将其世子義舒迎安保至自棘城去髙昌百六十里而髙昌舊人情戀本土不願東遷相與殺儒而立麴嘉為王嘉字靈鳯金城榆中人既立臣于蠕蠕那盖顧禮與義舒随安保至洛陽及蠕蠕主伏圖為髙車所敗嘉又臣髙車初前部胡人悉為髙車所徙入於焉耆又為嚈噠所殺國人分散衆不自立請王於嘉嘉遣其弟二子為焉耆王由是始大益為國人所服永平元年嘉遣其兄子私署左衛将軍田地太守孝亮朝京師仍求内徙乞軍迎援於是遣龍驤將軍孟威發涼州兵三千人迎至伊吾失期而反於後十餘遣使獻珠像白黑貂裘名馬鹽枕等欵誠備至唯賜優㫖卒不重迎三年嘉遣使朝貢宣武又遣孟威宣詔勞之延昌中以嘉為持節平西将軍𤓰州刺史泰臨縣開國伯私署王如故熙平初遣使朝獻詔曰卿地隔闗山境接荒漠頻請朝援徙國内遷雖來誠可嘉即於理未帖何者彼之甿庻是漢魏遺黎自晉氏不綱因難播越成家立國世積已久惡徙重遷人懐戀舊今若動之恐異同之變爰在肘腋不得便如來表也神龜元年冬孝亮復表求援内徙朝廷不許正光元年明帝遣員外將軍趙義等使於嘉嘉朝貢不絶又遣使奉表自以邊遐不習典誥求借五經諸史并請國子助教劉爕以為博士明帝許之嘉死贈鎮西將軍涼州刺史子堅立於後闗中賊亂使命遂絶普泰初堅遣使朝貢除平西將軍𤓰州刺史㤗臨縣伯王如故又加衛將軍孝武永熙中特除儀同三司進為郡公梁大同中堅嘗遣使獻鳴鹽枕蒲萄良馬氍毹等物於江左其使人云本國有朝烏旦旦集於王之殿前為行列不畏人日出然後散去云周武帝武成初堅復遣使獻方物武帝保定元年又遣使來貢其國周時有一十六城至隋世乃増其二都城周迴一千八百四十歩於坐堂畫魯哀公問政於孔子之像官有令尹一人比中夏相國次有公二人皆王子也一為交河公一為田地公次有左右衛次有八長史曰吏部祠部庫部倉部主客禮部户部兵部等長史也次有五将軍曰建武威逺陵江殿中伏波等將軍也次有八司馬長史之副也次有侍郎校郎主簿從事階位相次分掌諸事次有省事専掌導引其大事則決於王小事則世子及二公随狀斷決評章録記事訖即除籍書之外無久掌文案官人雖有列位並無曹府唯每早集於牙門評議衆事諸城各有户曹水曹田曹每城遣司馬侍郎相監檢校名為城令兵器有弓箭刀楯文字亦同華夏兼用胡書有毛詩論語孝經置學官弟子以相教授雖習讀之而皆為胡語賦税則計田輸銀錢無者輸麻布其刑法風俗婚姻喪葬與中國小異而大同隋開皇十年突厥破其四城有二千人來歸中國堅死子伯雅立其大母本突厥可汗女其父死突厥令依其俗伯雅不從者久之突厥逼之不得已而從煬帝即位引置諸蕃大業四年遣使貢獻帝待其使甚厚明年伯雅來朝因從擊髙麗還尚宗室女華容公主八年冬歸蕃下令國中皆觧辮削袵帝聞而嘉之下詔襃美賜冠帯衣履仍班製造之式然伯雅先臣鐵勒鐵勒恒遣重臣在髙昌有商胡來往則税之送於鐵勒雖有此令取説中華竟畏鐵勒不敢改也自是嵗令貢其方物唐武徳中遣使獻狗雌䧺各一髙六寸長尺餘性甚慧能牽馬銜燭云本生拂菻國其後不供職貢貞觀四年其王文泰來朝伯雅之子後與西突厥連結諸國朝貢者皆道出髙昌文泰皆擁絶之至十三年太宗謂其使曰髙昌數年來朝貢脱略我使人至彼文泰云鷹飛于天雉竄于蒿猫游于堂䑕安于穴各得其所豈不治邪明年當發兵以擊汝國十四年八月交河道行軍大總管侯君集平髙昌國下其郡三縣五城三十二户八千四十六口萬七千七百三十馬四千三百疋太宗以其地為西州以交河城為交河縣始昌城為天山縣田地城為桞中縣東鎮城為蒲昌縣髙昌城為髙昌縣初西突厥遣其葉䕶屯兵於可汗浮圖城與髙昌為影響至是懼而來降以其地為庭州并置蒲類縣每嵗調内地更發千人鎮遏焉黄門侍郎禇遂良上疏以為勞師動衆虚内事外作無益害有益不若擇髙昌可立者而立之使負戴漢恩長為蕃翰不從滑國阿䟦檀周古柯胡密丹白題附滑國車師之别種也後漢時通焉順帝永建初八滑從班勇擊北匈奴有功漢以八滑為後部親漢侯自魏晋以來不通中國梁武帝天監十五年其王厭帯夷栗陁始遣使獻方物普通初復獻黄師子白貂裘波斯錦等物後魏之居代都滑猶為小國屬蠕蠕後稍彊大征其旁國波斯渴槃陁罽賔焉耆龜兹疏勒姑墨于闐句般等國開地千里土地溫暖多山川少樹木有五榖國人以麵及羊為糧其獸有師子兩脚駞野驢有角人皆善騎射著小䄂長袍用金玉為帶女人披裘頭上刻木為角長六寸以金銀飾之少女子兄弟共妻無城郭以氈屋為居東向開户其王坐金牀随太嵗轉與妻並坐接客無文字以木為契與旁國通則使旁國胡為胡書羊皮為紙無職官事天神火神每日則出户祀神而後食其跪一拜而止葬以木為槨父母死其子截一耳葬訖即吉其言語待河南人譯然後通有阿跋檀周古柯胡宻丹等國並滑旁小國也凡滑旁之國衣服容貌皆與滑同普通初皆遣使隨滑使來貢方物又有白題國在滑國東去滑六日行西極波斯土地出粟麥𤓰果食物畧與滑同其王姓支字史稽毅其先蓋匈奴之别種也漢灌嬰與匈奴戰斬白題騎一人是也普通三年亦遣使朝獻江左云車離車離後漢時通焉居沙竒城一名禮惟持一名沛𨽻王在天竺東南三千餘里大國也其土氣物類與天竺同别城數十皆稱王其人怯弱大月氏伐之遂臣服焉其地東西南北方數千里人皆長八尺乘象駱駞往來鄰國有寇乘象以戰髙附髙附後漢時通焉在大月氏西南亦大國也其俗似天竺而弱易服善賈販内富於財所屬無常天竺罽賔安息三國彊即得之弱則失之後漢史云先未嘗屬月氏漢書以為五翖侯之數恐誤蓋髙附後屬安息及月氏破安息始得髙附大秦大秦後漢時通焉一名犂鞬以在海西亦云海西國其地東西南北各數千里有四百餘城小國役屬者數十其地平夷人居星布列置郵亭皆堊塈之有松柏諸木百草人俗力田作多種樹蠶桑皆髠頭而衣文繡乘輜軿白蓋小車出入擊鼓建旌旗幡幟王治安都以石為城郭周圜百餘里城中有五宫相去各十里宫室皆以水精為柱食器亦然其王日游一宫聽事五日而後徧常使一人持囊隨王車人有言事者即以書投囊中王至宫發省理其枉直各有官曹文書置三十六將皆㑹議國事其王無有常人皆簡立賢者國中灾異及風雨不時輒廢而更立受放者甘黜不怨其人民皆長大平正有類中國故謂之大秦土多金銀竒寳有夜光璧明月珠駭雞犀抱朴子云通天犀有白理如綫者以盛米置羣雞中雞欲往啄米至輒驚故南人名為駭雞也大貝木難木難出金翅鳥口中結沬所成碧色珠也土人珍之車渠馬碯虎魄珊瑚大秦西南漲海中可七八百里有珊瑚洲水底有磐石珊瑚生其上土人常乘大舶載鐵網令水工没入視之可下網乃下初生色白漸漸似苖甲拆歴一歲許出網目間變作黄色支格交錯髙極三四尺大者圍尺餘三年乃赤好後沒視之知可採便以鐵鈔發其根乃以索繫網使人於舶上絞車舉出還國理截恣意所作若失時不舉便蠧敗瑠璃琅玕朱丹青碧刺金縷繡織成金縷罽雜色綾作黄金塗火浣布又有織成細布言用水羊毳野蠶繭所作其氍毹􅕰㲪罽帳之屬采色皆鮮於海東諸國所出也又常利得中國縑素解以為胡綾紺紋又合會諸香煎其汁以為蘇合其獸有神龜白馬朱鬛瑇瑁元熊赤螭璧毒䑕等又西海有養之者似狗多力獷惡北附庸小邑有羊羔自然生於土中候其欲萌築牆環之恐為獸所食也其臍與地連割之絶則死擊物驚之乃驚鳴遂絶逐水草無羣有幻人額上為炎燼手中作江湖舉足而珠玉自墮開口則旛毦亂出國貨以金銀為錢銀錢十當金錢一安息天竺人與之交市於海中其利百倍其人質直市無二價榖食常賤國用富饒鄰國使到其界者乘驛詣王都至則給以金錢塗經大海海水鹹苦不可食商客往來皆齎三歲糧是以至者希少漢都䕶班超遣掾甘英使其國入海船人恐之以未必能達英遂止不往語具安息傳中大秦王常欲通使於漢而安息欲以漢繒綵與之交市故遮閡不得自達至桓帝延熹九年大秦王安敦遣使自日南徼外獻象牙犀角瑇瑁始一通焉其所表貢並無珍異疑傳者過焉晉武帝太康中其王嘗遣使貢獻或云其國西有弱水流沙近西王母所居處幾於日所入也漢書云從條支西行二百餘日近日所入則與今書異矣前世漢使皆自烏弋以還莫有至條支者也又云從安息陸道繞海北行出海西至大秦人庶連屬十里一亭三十里一置終無盗賊寇警而道多猛虎師子遮害行旅不百餘人齎兵器輒為所食又言有飛橋數百里可度海北諸國所生竒異玉石諸物怪譎多不經故不記云外國圖曰從隅巨北有國亦名曰大秦其國人長大無有五六尺者杜還經行記云拂菻國在苦國西隔山數千里亦曰大秦其人顔色紅白男子悉著素衣婦人皆服珠錦好飲酒尚乾餅多工巧善織絡或有俘在諸國者守死不改鄉風琉璃妙者天下莫比王城方八十里四面境土各數千里勝兵約有百萬常與大食國相通西枕西海南枕南海北枕可薩突厥西海中有市客主和同我往則彼去彼來則我歸賣者陳之於前買者酬之於後皆以其直置諸物旁待領直然後收物名曰鬼市又聞西有女國感水而生又摩鄰國在㪍薩羅國西南渡大磧行二千里至其國其人黒其俗獷少米麥無草木馬食乾魚人食鶻莽鶻莽即波斯棗也瘴癘特甚諸國陸行之所經山胡則一種有數等法有大食法有大秦法有尋尋法其尋尋蒸報於諸夷中最甚當食不語其大食法者以子弟親戚而作判典縱有過不至相累不食猪狗驢馬等肉不拜國王父母之尊不信鬼神祀天而已其俗每七日一假不買賣不出納唯飲酒謔浪終日其土人善醫眼及痢或未病先見或開腦出蟲奄蔡奄蔡漢時通焉一名栗弋西與大秦東南二千里與康居接去陽關八千餘里控弦十餘萬與康居同俗而屬康居出名馬牛羊蒲萄衆果其土水美故蒲萄酒特有名焉又有嚴國在奄蔡北屬康居出䑕皮以輸之奄蔡其國至後漢時改名阿蘭聊居於地城土氣温和多楨松白草後魏時稱為粟特國國人云其國見居葱嶺之西故奄蔡地也一名温那沙居於大澤在康居西北去代一萬六千里北距安息五千里附庸小國四百餘城土出大禾髙丈餘子如胡豆先是匈奴殺其王而有其地至今王忽倪已三世矣粟特國商人先多詣姑臧販貿及太武平涼州并見鹵掠文成初忽倪遣使請贖所獲商人詔聼焉自後每使朝貢周保定四年復遣使致其方物小人小人在大秦之南軀纔三尺其耕稼之時懼為鶴所食大秦每衞助之小人竭其珍以酬報軒渠軒渠其國多九色鳥青口緑頸紫翼紅膺紺頂丹足碧耳緗背元尾亦名九尾鳥亦名錦鳯其青多紅少謂之繡鸞常從弱水西來或云是王母之使也其國幣貨同三童國也三童三童在軒渠國西南千里人皆眼有三精珠或有四舌者能為一種聲亦能俱語常貨多用蕉越犀象作金幣率效國王之面亦效王后之面若丈夫交易則用國王之面王死則更鑄澤散澤散魏時聞焉屬大秦其治在海中央北至驢分水行半歲風疾時一月到最與安息城谷相近西南詣大秦都不知里數驢分驢分魏時聞焉屬大秦其治去大秦都二千里從驢分城西之大秦度海飛橋長二百四十里發海西道西南繞海道直西行至焉堅昆堅昆魏時聞焉在康居西勝兵二萬人隨水草畜牧多貂有好馬也呼得呼得魏時聞焉在葱嶺北烏孫西北康居東北勝兵萬餘人隨畜牧出好馬亦多貂丁令丁令魏時聞焉在康居北勝兵六萬人隨畜牧出名䑕皮白子青昆子皮此上三國堅昆中央俱去匈奴單于庭安習水七千里南至車師六國五千里西南去康居界二千里西去康居王治所八千里或以為此丁令則匈奴北丁令也而此丁令在烏孫西似其種别也又匈奴北有屈射國有隔昆國有新犂國明此之南自復有丁令非烏孫西丁令也烏孫長老言北丁令有馬腦國其人聲音似鴈鶩從膝以上至頭人也膝以下生毛而馬蹄不騎馬而走疾於馬勇健敢戰短人短人魏時聞焉在康居西北男女皆長三尺人衆甚多去奄蔡諸國甚逺康居長老傳聞嘗有商旅行北方迷惑失道而到斯國國中甚多真珠夜光明月珠見者不知名此國號言以意商度此國去康居可萬餘里突厥本末記云突厥窟北馬行一日有短人國長者不踰三尺亦有二尺者頭少毛髪若羊胞之狀突厥呼為羊胞頭國其傍無他種種類相侵俗無宼盗但有大鳥髙七八尺常伺短人啄而食之短人皆持弓矢以為之備案此亦在西北即魏畧云短人國是也師子師子東晉時通焉天竺旁國也在西海之中延袤二千餘里多出竒寶其地和適無冬夏之異五榖隨人所種不須時節其國舊無人止有鬼神有龍居之諸國商賈來共市易鬼神不見其形但出珍寳明其所堪價商人依賈取之諸國人聞其土樂因此競至或有停住者遂成大國能馴養神師子遂以為名風俗與婆羅門同而尤敬佛法安帝義熙初遣使獻玉佛像髙四尺二寸玉色潔潤形制殊特殆非人工歴晉宋代在建康瓦棺官寺先有徴士戴安道手制佛像五軀及顧長康畫維摩詰并玉像時人謂為三絶至齊東昏遂毁玉像前截臂次取身為嬖妾潘貴妃作釵釧時咸歎惜之建康即今丹陽郡江寧縣宋文帝元嘉五年十二年其王刹利摩訶南各遣使貢獻梁武帝大通元年後王迦葉迦羅訶棃邪亦使使貢獻杜還記云師子國亦曰新檀又曰婆羅門即南天竺也國之北人盡胡貌秋夏炎旱國之南人盡獠面四時霖雨從此始有佛法寺舍人皆儋耳布裹腰嚈噠嚈噠大月氏之種類也亦曰髙車之别種其源出於塞北自金山而南在于闐之西都烏滸水南二百餘里去長安一萬一百里其王都拔底延城蓋王舍城也其城方十里餘多寺塔皆飾以金風俗與突厥畧同其俗兄弟共一妻夫無兄弟者妻戴一角帽若有兄弟者依其多少之數更加帽角焉衣服類胡加以纓絡頭皆翦髪其語與蠕蠕髙車及諸胡不同衆可有十萬無城邑依隨水草以氈為屋夏遷涼土冬逐暖處分其諸妻各在别所相去或二百三百里其王廵歴而行每月一處冬寒之時三月不徙王位不必傳子子弟堪者死便受之其國無車有輿多駝馬用刑嚴急偷盗無多少皆要斬盗一責十死者富家累石為蔵貧者掘地而埋隨身諸物皆置冢内其人凶悍能鬬戰西域康居于闐疏勒安息及諸小國三十許皆役屬之號為大國與蠕蠕婚姻自魏太安以後每遣使朝貢正光末遣貢師子一至髙平遇万俟醜奴反因留之醜奴平送京師永熙以後朝獻遂絶初熙平中明帝遣伏子統宋雲沙門法力等使西域訪求佛經時有沙門慧生者亦與俱行正光中還慧生所經諸國不能知其本末及山川里數蓋舉其畧云至大統十二年遣使獻其方物廢帝二年周明帝二年並遣使來獻後為突厥所破部落分散職貢遂絶隋大業中又遣使朝貢方物其國去漕國千五百里東至𤓰州六千五百里波斯波斯後魏時通焉在達曷水之西都宿利城後周史云蘇利城隋史云蘇藺城記録音訛其實一也去代二萬四千二百二十八里西去海數百里東南去穆國四千餘里西北至拂菻四千五百里即條支之故地也王姓波斯大月氏之别種其先有波斯匿王其子孫以王父字為氏因以為國號焉所都城方十里户十餘萬有河經其城中南流城西十五里有土山周廻髙大其勢連接甚逺中有鷲鳥噉羊土人極以為患其王坐金羊座戴金花冠衣錦袍織成帔飾以真珠寶物其俗丈夫翦髪戴白皮帽貫頭衫兩肩近下開之亦有巾帔縁以織成婦人服大衫披大帔其髪前為髻後披之飾以金銀花仍貫五色珠絡之於膊王於其國内别有小牙十餘所猶中國之離宫也每年四月出游處之十月仍還王即位以後擇諸子之内賢者宻書其名封之於庫諸子及大臣皆莫之知也王死衆乃發書視之其封内有名者即立之為王餘子各出就邊任兄弟更不相見也國人號王曰醫囋才割切妃曰陟率王之諸子曰殺野大官有摸胡壇掌國内獄訟泥弗汗掌庫藏開禁地掌文書及衆務次有遏羅訶地掌王之内事薛波㪍掌四方兵馬其下皆有屬官分統其事兵有甲矟圓排劒弩弓箭戰則乘象其刑法重罪縣諸竿上射殺之次則繫獄新王立乃釋之輕罪則劓刖若髠若翦半髪又繫牌於項以為恥辱犯彊盗繫之終身奸貴人妻者男子流婦人割其耳鼻賦税則准地輸銀錢俗事火神天神文字與胡書異多以姊妹為妻妾自餘婚配亦不擇尊卑諸夷之中最為醜穢百姓女子年十歲以上有姿貌者王收養之有功勲者即以分賜死者多棄於山一月著服城外有人别居唯知喪葬之事號為不净人若入城市則摇鈴以自别以六月為歲首尤重七月七日十二月一日其日人庶以上各相命召設會作樂以極歡娯又每年正月二十日各祭其先死者氣候温熱家自藏冰其地多砂磧引水灌溉其五榖及禽獸與中國畧同唯無稻及黍土出名馬及駞富室至有數千頭又出白象獅子多良犬有大鳥形如橐駞有兩翼飛而不能髙食草與肉亦能噉火有大鳥卵其寶貝則有真珠頗棃珊瑚琉璃馬碯水精瑟瑟金銀鍮石金剛火齊銅錫鑌鐵朱砂水銀錦疊細布氍毹􅕰㲪䕶那越諾布金縷織成赤麖皮其香藥則有薰陸鬱金蘇合青木等香胡椒蓽撥石蜜千年棗香附子訶梨勒無食子鹽綠雌黄又有優鉢曇花鮮華可愛地有鹹池國以饒富神龜中其王遣使上書貢方物云大國天子天之所生願日出處常為漢中天子波斯王居和多千萬敬拜朝廷喜納之自此每使朝獻西魏恭帝二年其王又遣使朝貢隋煬帝時遣雲騎尉李昱使通波斯其國致貢隨昱入朝突厥不能至其國頗羈縻之隋大業中亦遣使來唐貞觀二十一年其國獻理耨蛇形類䑕而色青身長八九寸能入穴取䑕杜還記云自被大食滅至天寳末已百餘年矣伏盧尼伏盧尼後魏時通焉都伏盧尼城在波斯國北去代二萬七千三百二十里累石為城東有大河南流中有鳥其形似人亦有如橐駞馬者皆有翼常居水中出水便死城北有云尼山出銀珊瑚琥珀多師子悦般悦般後漢時通焉在烏孫西北其先匈奴單于之部落也為漢車騎將軍竇憲所逐北單于度金微山西走康居其羸弱不能去者住龜兹北地方數千里衆可二十餘萬涼州人猶謂之單于王其風俗言語似髙車而其人清潔倣胡俗翦髪齊眉以䬾餬塗之昱昱然光澤日三澡潄然後飲食其國南界有火山山旁石皆燋鎔灌地數十里乃凝堅人取以為藥即石流黄也與蠕蠕結好其王嘗將數千人入蠕蠕國欲與蠕蠕主大檀相見入其界百餘里見其部人不浣衣不絆髪不洗手婦人口䑛器物王謂其從臣曰汝曹誑我將我入此狗國中乃馳還大檀遣騎追之不及自是相仇讎數相攻討太武太平真君九年遣使朝獻并送幻人稱能割人喉脉令斷擊人頭令骨陷皆血出淋漓或數升或盈斗以草藥内其口中令嚼咽之須臾血止養瘡一月復常又無痕瘢太武乃取死罪囚試之皆驗云中國諸名山皆有此草乃使人受其術而厚遇之又言其國有大術者蠕蠕來鈔掠術人能作霖雨盲風大雪及行潦蠕蠕凍死亡者十二三是歲再遣使朝貢求與官軍東西合擊蠕蠕太武嘉其意命中外諸軍戒嚴以淮南王他為前鋒襲蠕蠕仍詔有司以其鼓舞之節施於樂府自後每使朝貢朱俱波朱俱波後魏時通焉亦名朱居槃國漢子合國也今并有漢之西夜蒲犂依耐得若四國之地在于闐國西千餘里其西至渇槃國南至女國三千里北至疎勒九百里南至葱嶺二百里其王本疏勒國人魏畧西戎傳曰西夜并屬疏勒宣武永平中朱居槃國遣使朝貢其人言語與于闐相似其間小異人貌多同華夏亦類疏勒唐武徳以後亦頻遣使朝貢渇槃陁渇槃陁後魏時通焉亦名漢陁國亦名渇羅陁國治葱嶺東在朱俱波西河經其國東北流有髙山夏積霜雪附於嚈噠西至䕶宻國其南至縣度山無定界北至疏勒國界西北至判汗國其王本疎勒人累代相承以居此國有户二千餘縣度山在國西南四百里縣度者谿谷不通以䋲相引而度其間四百里往往有棧道因以為名今按縣度與葱嶺迤邐相屬郵置所絶道阻且長故行人由之莫能分别然法顯宋雲所經實縣度山也又有頭痛山在國西南向罽賔歴大頭痛小頭痛之山赤土身熱之阪宋膺異物志云大頭痛小頭痛山皆在渠捜之東疎勒之西經之者身熱頭痛夏月不可行有至死者雖冬月可行尚使人嘔吐有毒藥氣之所為也冬月藥氣枯歇故可行其葱嶺俗號極嶷山今按葱嶺周環其國衣服人貌音語與于闐相似其間多有異者書與婆羅門同國中咸事佛人山居勁健雜人多而胡少有音樂兵器有甲矟弓刀國法殺人劫賊者死自餘懲罰有差其雜税輸之婚姻有同疎勒王坐金人牀死者埋殯七日為孝太武帝太延三年朝獻於後不絶梁大同初復通江左獻其方物梁史稱渇槃陁國于闐西之小國也西隣滑國南接罽賔北連沙勒國都在山谷中城周囬四十餘里國有十二城人衣吉貝布著長身小袖袍小口袴地宜小麥資以為糧多牛馬駱駝羊等出好氊時王姓沙葛氏云鉢和鉢和後魏時通焉在渇槃陁西其土尤寒人畜同居穴地而處又有大雪山望若銀峯其人唯食餅飲麥酒服氈裘有二道一道西行向嚈噠一道西南趨烏萇亦為嚈噠所統波知波知後魏時通焉在鉢和西南土狹人貧依託山谷其王不能總攝有三池傳云大池有龍王次者有龍婦小者有龍子行人經之設祭乃得過不則多有風雷之困賖彌賖彌後魏時聞焉在波知之南山不信佛法專事諸神亦附嚈噠東有鉢盧國路嶮縁鐵䌇而度下不見底熙平中遣使宋雲等使其國竟不能達烏萇烏萇後魏時通焉在賖彌南北有葱嶺南至天竺波羅門土多林果引水灌田宜稻麥俗信佛多諸寺塔人有争訟則服之以藥曲者發狂直者無恙為法不殺犯死罪唯徙於靈山西南有檀特山山上立寺以驢數頭運食山下無人控御自知來往也乾陀乾陀後魏時通焉在烏萇西本名業波為嚈噠所破因改焉其王本勑勒人臨國已三世矣好攻戰與罽賔鬬三年不罷人怨苦之有鬬象七百頭十人乘一象皆執兵仗象鼻縛刀以戰所都城東南七里有佛塔髙七十丈周三百歩即謂雀離佛圖也阿鈎羌阿鈎羌後魏時通焉在莎車西南去代一萬三千里國西有縣度山土有五榖諸果市用錢為貨居止立宫室有兵器土出金珠副貨副貨後魏時通焉去代一萬七千里東至阿富使且國西至沒誰國中間相去一千里南有連山不知名北至竒沙國相去一千五百里國中有副貨城周匝七十里宜五榖蒲萄有馬駞騾國王有黄金殿殿下有金駞七頭各髙三尺其王遣使朝貢疊伏羅疊伏羅後魏時通焉去代三萬一千里國中有勿悉城城北有彊竒水西流有白象并有阿末黎木皮中織作布土宜五榖宣武時其國王伏陁末多遣使獻方物自是每使朝貢拔豆拔豆後魏時通焉去代五萬一千里東至多勿當國西至㫋郍國中間相去七百五十里南至罽陵伽國北至弗那伏旦國中間相去九百里亦康國王之種類也字阿濫宻都城方三里勝兵二千人東北去安國五百里東去烏那遏二百餘里西去波斯國四千餘里東去𤓰州七百里隋大業中遣使貢方物者至拔者至拔後魏時通焉都者至拔城在疏勒西去代一萬一千六百二十里其國東有潘賀郍山出美鐵及師子迷密迷密後魏時通焉在者至拔西去代一萬二千一百里太武正平元年遣使獻一峯黑駞其國東有都滿山出金玉亦多鐵悉萬斤悉萬斤後魏時通焉都悉萬斤城在迷密西去代一萬二千七百二十里其國南有伽色那山出師子每使朝貢忸密忸密後魏時通焉在悉萬斤西去代二萬二千八百二十八里石國石國隋時通焉居於藥殺水都拓折城方十餘里本漢大宛北鄙之地東與北至西突厥界西至波臘國界西南康居界南至率都沙郍國界王姓石名湼國國城之東南立屋置座於中正月六日七月十五日以王父母燒餘之骨金甕盛之置于牀上廵繞而行散以花香雜果王率臣下設祭焉禮終王與夫人出就别帳臣下以次列坐而饗土有粟麥多良馬南去撥汗六百里東南去𤓰州六十里其俗善戰曾貳於突厥射匱可汗擊滅之令特勒甸職攝其國事甸職後以隋大業五年遣使朝貢後不復至唐貞觀八年復遣使云杜還經行記云其國城一名赭支一名大宛天寶中鎮西節度使髙仙芝禽其王及妻子歸京師國中有二水一名真珠河一名質河並西北流土地平敞多果實出好犬良馬又云碎葉國從安西西北千餘里有㪍達嶺嶺南是大唐北界嶺北是突厥騎施南界西至葱嶺二千餘里其水嶺南流者盡過中國而歸東海嶺北流者盡經胡境而入北海又北行數日度雪嶺其海在山中春夏常雨雪故曰雪海中有細道道旁往往有水孔嵌空萬仞輒墮者莫知所在㪍達嶺北行千餘里至碎葉川其川東頭有熱海兹地寒而不凍故曰熱海又有碎葉城天寳七年北庭節度使王正見薄伐城壁摧毁邑居零落昔交河公主所居之地建大雲寺猶存其川西接石國約長千餘里川中有異姓部落有異姓突厥各有兵馬數萬城堡間雜日尋干戈凡是農人皆環甲胄專相鹵掠以為奴婢其川西頭有城名曰怛邏斯石國人鎮即天寶十年髙仙芝軍敗之地從此至西海以東自三月至九月天無雲雨皆以雪水種田宜大麥小麥稻禾豌豆畢豆飲蒲萄酒麋酒醋乳女國女國隋時通焉在葱嶺之南其國代以女為國王王姓蘇毗字末羯在位二十年女王之夫號為金聚不知政事國内丈夫唯以征伐為事山上為城方五六里人有萬家王居九層之樓侍女數百人五日一聼朝復有小女王共理國政其俗貴婦人輕丈夫而性不妬忌男女皆以彩色塗面一日之内或數度變改之男子皆被髪婦人辮髪而縈之以皮為鞋課税無常其王死若無女嗣位國人乃調斂金錢得數百萬還於死王之族買女而立之其地五男三女女貴男賤婦人為吏職男子為軍士女子貴者則多有侍男男子不得有侍女雖賤庶之女盡為家長有數夫焉生子皆從母姓氣候多寒以射獵為業出鍮石朱砂麝香犛牛駿馬蜀馬尤多鹽常將鹽向天竺興販其利數倍亦數與天竺及党項戰争其女王死國中貴人剝取皮以金屑和骨肉置於瓶内而埋之經一年又以其皮内於鐵器埋之俗事阿修羅神又有樹神歲初以人祭或用獼猴祭畢入山祝之有鳥如雌雉來集于掌上破其腹視之有衆粟則年豐砂石則有灾謂之鳥卜開皇六年遣使朝貢後遂絶撥汗撥汗隋時通焉都葱嶺之西五百餘里古渠搜國也王姓昭武字阿利染都城方四里勝兵數千人王坐金羊座妻戴金花西去蘇對沙那國五百里北去石國五百里東北去突厥可二千餘里東去𤓰州五千里大業中遣使貢方物吐火羅吐火羅隋時通焉一名土壑宜後魏時吐呼羅國也魏史稱吐呼羅云去代一萬二千里東至范陽國西至悉萬斤國中間相去二千里南有連山不知名北至波斯國中間相去一萬里治薄提城城周匝六十里城南有西流大水名漢樓河土宜五榖有好馬駞騾其王曾遣使朝貢吐火羅之為吐呼羅音語訛舛或當然也隋史載吐火羅都葱嶺之西五百里在烏滸河南即媯水也與挹怛雜居勝兵十萬人皆習戰俗奉佛多男子少婦人故兄弟通室婦人五夫則首飾戴五角十夫戴十角男子無兄弟者則與他人結為昆弟方始得妻不然終身無婦矣生子屬其長兄被服文字與于闐畧同城北有頗梨山南崖穴中有神馬國人每牧馬於其側時産名駒皆汗血馬其北界則漢時大宛之地南去曹國千七百里東去𤓰州六千七百里大業中遣使來貢唐初屬西突厥髙宗永徽初遣使獻大鳥髙七尺其色元足如駞鼓翅而行日三百里能噉鐵夷俗謂為駞馬龍朔元年吐火羅置州縣使王名逺進西域圗記并請于闐以西波斯以東十六國分置都督府及州八十縣一百軍府百二十六仍於吐火羅國立碑以紀聖徳帝從之劫國劫國隋時聞焉在葱嶺中西與南俱與賖彌國界接西北至挹怛國去長安萬二千里有户數萬氣候熱有稻麥粟豆羊馬出洛沙青黛婚姻同突厥死亡棄於山唐武徳二年遣使貢寳帯金鎻頗黎水精盃各一頗黎四百九十枚大者如棗小者如酸棗陁羅伊羅陁羅伊羅隋時聞焉在烏荼國北大雪山坡上緣梯登山接七百梯方到其國越底延越底延國隋時聞焉治辛頭河北南至婆羅門國三千里西至賖彌國千餘里東北至𤓰州五千四百里其王婆羅門種類户數萬有弓矢刀矟皮甲國法不殺人重罪流輕者杖國無課税其俗事佛書同婆羅門王及庶人翦髪衣錦袍不開縫貧者衣白疊婦人為髻衣裙衫帔長巾俗清潔氣候温多稻有羊馬多牛出鍮石訶梨勒石蜜麖皮細疊大食大食唐永徽中遣使貢獻云其國在波斯之西或云初有波斯胡人若有神助得刀殺人因招附諸胡有胡人十一來據次第摩首受記為王此後衆漸歸附遂滅波斯又破拂菻及婆羅門城所當無敵兵衆有四十二萬有國以來三十四年矣初王己死次傳第一摩首者今王即是第三其王姓大食其國男人鼻大而長痩黑多鬚鬢似婆羅門女人端麗亦有文學與波斯不同出駝馬驢騾羖羊等土多砂石不堪耕種無五榖唯食駝象等肉破波斯拂菻始有米麵敬事天神又云其王常遣人乘船將衣糧入海經涉八年未及西岸於海中見一方石石上有樹枝赤葉青樹上總生小兒長六七寸見人不語而皆能笑動其手脚頭著樹枝人摘取入手即乾黑其使得一枝還今在大食王處杜還經行記云一名亞俱羅其大食王號暮門都此處其士女瓌偉長大衣服鮮潔容止閑麗女子出門必擁蔽其面無問貴賤一日五時禮天食肉作齋以殺生為功徳繫銀帯佩銀刀㫁飲酒禁音樂人相争不至毆擊又有禮堂容数萬人每七日王出禮拜登髙座為衆説法曰人生甚難天道不易姦非劫竊細行謾言安已危人欺貧虐賤有一於此罪莫大焉凡有征戰為敵所戮必得生天殺其敵人獲福無量率土禀化從之如流法唯從寛葬惟從儉郛郭之内􅆵閈之中天地所生無物不有四方輻凑萬貨豊賤錦繡珠貝滿市肆駝馬驢騾充街巷刻密石為廬舍有似中國寳轝每至節日将獻貴人琉璃器皿鍮石瓶鉢盖不可算数粳米白麵不異中華其果有蒲桃人千年棗其蔓菁根大如斗而圓味甚美餘菜亦與諸國同蒲萄大者如雞子香油貴者有二一名即塞漫一名没女甲反師香草貴者有二一名查塞菶蒲孔反一名蔾蘆苃綾絹機杼金銀匠畫匠漢匠起作畫者京兆人樊淑劉泚織絡者河東人樂環吕禮又以橐駞駕車其馬俗云西海濵龍與馬交所產也腹肚小脚腕長善者日走千里其駝小而緊背有孤峯良者日馳千里又有駝鳥髙四尺以上脚似駝蹄頸項勝得人騎行五六里其卵大如二升又有薺樹實如夏棗堪作油食除瘴其氣候温土地無氷雪人多瘧痢一年之内十中五死今吞滅四五十國皆為所役属多分其兵鎮守其境盡於西海焉又云末禄國在亞梅國西南七百餘里胡姓末者兹上人也其城方十五里用鐵為城門城中有盆池又有兩所佛寺其境東西百四十里南北百八十里村柵連接樹木交映四面合匝總是流沙南有大河流入其境分渠数百溉灌一川其土沃饒其人浄潔牆宇髙厚市􅆵平正木既雕刻土亦繪畫又有細軟疊布羔羊皮裘估其上者直銀錢数百果有紅桃白㮈遏白黄李𤓰大者名尋支十餘人飱一顆輙足越𤓰長四尺以上菜有蔓菁蘿蔔長葱顆葱芸薹胡芹葛藍軍逹廽香韮薤瓠蘆尤多蒲萄又有黄牛野馬水鴨石雞其俗以五月為嵗每嵗以畫缺相獻有打毬節鞦韆節其大食東道使鎮於此從此至西海以來大食波斯參雜居止其俗禮天不食自死肉及宿肉以香油塗髪又云苦國在大食西界周廽數千里造屋兼瓦疊石為壁米榖殊賤有大川東流入亞俱羅商客糴此糶彼往來相繼人多魁梧衣裳寛大有似儒服其苦國有五節度有兵馬一萬以上北接可薩突厥可薩北又有突厥足似牛蹄好噉人肉通志卷一百九十六
