body:
  text: 通志巻一百二十一下宋右廸功郎鄭樵漁仲撰列傳第三十四下衞瓘字伯王河東安邑人也高祖暠漢明帝時以儒學自代郡徴至河東安邑卒因賜所亡地而𦵏之子孫遂家焉父覬魏尚書瓘年十歲喪父至孝過人性貞静有名理以明識清允稱襲父爵閿鄉侯弱冠爲魏尚書時魏法嚴苛母陳氏憂之瓘自請得徙爲通事郎轉中書郎時權臣專政瓘優游其間無所親踈甚爲傅嘏所重謂之寗武子在位十年以任職稱累遷散騎常侍陳留王即位拜侍中持節慰勞河北以定議功増邑戸數歳轉廷尉卿瓘明法理毎至聽訟小大以情鄧艾鍾會之伐蜀也瓘以本官持節監艾㑹軍事行鎮西軍司給兵千人蜀既平艾輙承制封拜㑹隂懷異志因艾專擅密與瓘俱奏其狀詔使檻車徴之會遣瓘先收艾會以瓘兵少欲令艾殺瓘因加艾罪瓘知欲危已然不可得而距乃夜至成都檄艾所綂諸將稱詔收艾其餘一無所問若來赴官軍爵賞如先敢有不出誅及三族比至雞鳴悉來赴瓘唯艾帳内在焉平旦開門瓘乗使者車徑入至成都殿前艾卧未起父子俱被執艾諸將圗欲刼艾整仗趣瓘營瓘輕出迎之僞作表草將申明艾事諸將信之而止俄而會至乃悉請諸將胡烈等因執之囚益州廨舍遂發兵反於是士卒思歸内外騷動人情憂懼㑹留瓘謀議乃書板云欲殺胡烈等舉以示瓘瓘不許因相疑異瓘如厠見胡烈故給使使宣語三軍言會反會逼瓘定議經宿不眠各横刀􅂰上在外諸軍已潛欲攻會瓘既不出未敢先發㑹使瓘慰勞諸軍瓘心欲去且堅其意曰卿三軍主宜自行㑹曰卿監司且先行吾當後出瓘便下殿會悔遣之使呼瓘瓘辭眩疾動詐仆地比出閤數十信追之瓘至外解服鹽湯大吐瓘素羸便以困篤會遣所親及醫視之皆言不起㑹由是無所憚及暮門閉瓘作檄宣告諸軍諸軍並已唱義陵旦共攻會㑹率左右距戰諸將擊敗之唯帳下數百人隨會繞殿而走盡殺之瓘於是部分諸將羣情肅然鄧艾本營將士復追破檻車出艾還向成都瓘自以與會共陷艾懼爲變又欲專誅㑹之功乃遣䕶軍田續至綿竹夜襲艾於三造亭斬艾及其子忠初艾之入江油也以續不進將斬之既而赦焉及瓘遣續謂之曰可以報江油之辱矣事平朝議封瓘瓘以剋蜀之功羣帥之力二將跋扈自取滅亡雖運智謀而無搴旗之効固讓不受除使持節都督關中諸軍事鎮西將軍尋遷都督徐州諸軍事鎮東將軍增封菑陽侯以餘爵封弟實開陽亭侯㤗始初轉征東將軍進爵爲公都督青州諸軍事靑州刺史加征東大將軍靑州牧所在皆有政績除征北大將軍都督幽州諸軍事幽州刺史䕶烏桓校尉至鎮表立平州後兼督之于時幽并東有務桓西有力微並爲邉害瓘離閒二虜遂致嫌隙於是務桓降而力微以憂死朝廷嘉其功賜一子亭侯瓘乞以封弟未受命而亡子密受封為亭侯瓘六男無爵悉讓二弟遠近稱之累求入朝旣至武帝善遇之俄使旋鎮咸寜初徴拜尚書令加侍中瓘性嚴整以法馭下視尚書若参佐尚書郎若掾屬瓘學問深博明習文蓻與尚書郎敦煌索靖俱善草書時人號爲一臺二妙漢末張芝亦善草書論者謂瓘得伯英筋靖得伯英肉太康初遷司空侍中令如故爲政清簡甚得朝野聲譽武帝勅瓘第四子宣尚繁昌公主瓘自以諸生之胄婚對微素抗表固辭不許又領太子少𫝊加千兵百騎鼓吹之府以日蝕瓘與太尉汝南王亮司徒魏舒俱遜位帝不聽瓘以魏立九品是權時之制非通經之道遂與太尉亮等上疏乞復古鄉舉里選之法武帝善之卒不能改惠帝之爲太子也朝臣咸以純質不能親政事瓘毎欲陳啓廢之而未敢發後㑹宴陵雲臺瓘託醉因跪帝牀前曰臣欲有所啓帝曰公所言何邪瓘欲言而止者三因以手撫牀曰此座可惜帝乃悟因謬曰公眞大醉邪瓘於此不復有言賈后由是怨瓘宣尚公主數有酒色之過楊駿數與瓘不平駿復欲自專權重宣若離婚瓘必遜位於是遂與黄門等毁之諷帝奪宣公主瓘慙懼告老遜位乃詔進位太保以兵就第給親兵百人置長史司馬從事中郎掾屬及大車官騎麾蓋鼓吹諸威儀一如舊典給厨田十頃園五十畝錢百萬絹五百匹牀帳簟褥主者務令優備有司又奏收宣付廷尉免瓘位詔不許帝後知黄門虛搆欲還復主而宣疾亡惠帝即位復瓘千兵及楊駿誅以瓘錄尚書事加綠綟綬劒履上殿入朝不趨給騎司馬與汝南王亮共輔朝政亮奏遣諸王還藩與朝臣廷議無敢應者惟瓘贊其事楚王瑋由是憾焉賈后素怨瓘且忌其方直不得騁已滛虐又聞瓘與瑋有隙遂謗瓘與亮欲行伊霍之事啓帝作手詔使瑋免瓘等官黄門齎詔授瑋瑋性輕險欲騁私怨夜使清河王遐收瓘左右疑遐矯詔咸諌曰禮律刑名台輔大臣未有此比且請距之須自表得報就戮未晚也瓘不從遂與子恒嶽裔及孫等九人同被害時年七十二恒二子璪玠時在醫家得免初杜預聞瓘殺鄧艾言於衆曰伯玉其不免乎身爲名士位居總率既無徳音又不御下以正是小人而乗君子之器當何以堪其責乎瓘聞之不俟駕而謝終如預言初瓘家人炊飯墮地盡化爲螺歳餘而及禍太保主簿劉繇等冒難收瓘而𦵏之初瓘爲司空時帳下督榮晦有罪瓘斥遣之及難作隨兵討瓘故子孫皆及于禍楚王瑋之伏誅也瓘女與國臣書曰先公名謚未顯無異凡人毎怪一國蔑然無言春秋之失其咎安在悲憤感慨故以示意於是繇等執黄幡撾登聞鼔上言其事并列榮晦罪狀請加族誅詔從之朝廷以瓘舉門無辜受禍乃追瓘伐蜀勲封蘭陵郡公増邑三千戸謚曰成贈假黄鉞恒字巨山少辟司空齊王府轉太子舍人尚書郎祕書丞太子庶子黄門郎恒善草𨽻書爲四體書勢曰昔在黄帝創制造物有沮誦倉頡者始作書契以代結繩蓋覩鳥跡以興思也因而遂滋則謂之字有六義焉一曰指事上下是也二曰象形日月是也三曰形聲江河是也四曰會意武信是也五曰轉注老考是也六曰假借令長是也夫指事者在上爲上在下爲下象形者日滿月虧效其形也形聲者以類爲形配以聲也會意者止戈爲武人言爲信也轉注者以老壽考也假借者數言同字其聲雖異文意一也自黄帝至三代其文不改及秦用篆書焚燒先典而古文絶矣漢武帝時魯共王坯孔子宅得尚書春秋論語孝經時人以不復知有古文謂之科斗書漢世祕藏希得見之魏初傳古文者出於邯鄲淳恒祖敬侯寫淳尚書後以示淳而淳不别至正始中立三字石經轉失淳法因科斗之名遂效其形太康元年汲縣人盗發魏襄王冡得䇿書十餘萬言案敬侯所書猶有髣髴古書亦有數種其一巻論楚事者最爲工妙恒竊悦之故竭愚思以贊其美愧不足厠前賢之作冀以存古人之象焉古無别名謂之字勢云黄帝之史沮誦倉頡眺彼鳥跡始作書契紀綱萬事埀法立制帝典用宣質文著世爰暨暴秦淊天作戾大道既泯古文亦滅魏文好古世傳邱墳歴代莫發眞僞靡分大晉開元𢎞道敷訓天埀其象地耀其文其文乃耀粲矣其章因聲會意類物有方日處君而盈其度月執臣而虧其傍雲委􅉬而上布星離離以舒光禾卉苯䔿以垂頴山嶽嵳峩而連崗蟲跂跂其若動鳥似飛而未揚觀其錯筆綴墨用心精專勢和體均𤼵止無閒或守正循檢矩折規旋或方圓靡則因事制權其曲如弓其直如弦矯然特出若龍騰于川森爾下頽若雨墜于天或引筆􅁬力若鴻鴈高飛邈邈翩翩或縱肆阿􅄼若流蘇懸羽靡靡緜緜是故遠而望之若翔風厲水清波漪漣就而察之有若自然信黄唐之遺跡爲六藝之範先籕篆蓋其子孫𨽻草乃其曽元覩物象以致思非言辭之所宣昔周宣王時史籕始著大篆十五篇或與古同或與古異世謂之籕書者也及平王東遷諸侯力政家殊國異而文字乖形秦始皇帝初兼天下丞相李斯乃奏益之罷不合秦文者斯作倉頡篇中車府令趙高作爰歴篇太史令胡母敬作博學篇皆取史籀大篆或頗省改所謂小篆者或曰下上人程邈爲衙獄吏得罪始皇乃幽繫雲陽十年從獄中作大篆少者增益多者減損方者使圓圓者使方奏之始皇始皇善之出以爲御史使定書或曰邈所定乃𨽻字也自秦壊古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書王莾時使司空甄豐校文字部改定古文復有六書一曰古文孔氏壁中書也二曰竒字即古文而異者也三曰篆書秦篆書也四曰佐書即𨽻書也五曰繆篆所以摹印也六曰鳥書所以書幡信也及許慎撰說文用篆書爲正以爲體例最可得而論也秦時李斯號爲二篆諸山及銅人銘皆斯書也漢建初中扶風曹喜少異於斯而亦稱善邯鄲淳師焉畧究其妙韋誕師淳而不及也大和中誕爲武都太守以能書留補侍中魏氏寶器銘題皆誕書也漢末又有蔡邕采斯喜之法爲古今雜形然精密閑理不如淳也邕作篆勢曰鳥遺跡皇頡循聖作則制斯文體有六篆爲眞形要妙巧入神或龜文鍼列櫛比龍鱗紆體放尾長短復身頽若黍稷之垂頴藴若蟲蛇之焚緼揚波震擊鷹跱鳥震延頸脅翼勢似陵雲或輕筆内投微夲濃末若絶若連似水露綠丝凝垂下端從者如懸衡者如編杳杪邪趣不方不圓若行若飛跂跂翾翾遠而望之象鴻鵠羣游駱驛遷延逼而視之端際不可得見指撝不可勝原硏桑不能數其詰屈離婁不能覩其郤閒般倕揖讓而辭巧籀誦拱手而韜翰處篇籍之首目粲斌斌其可觀摛華艶於紈素爲學蓺之範先喜文徳之𢎞懿愠作者之莫刋思字體之頫仰舉大畧而論旃秦既用篆秦事繁多篆字難成即令𨽻人佐書曰𨽻字漢因行之獨符印璽幡信題署用篆𨽻書者篆之㨗也上谷王次仲始作楷法至靈帝好書時多能者而師宜官爲最大則一字徑丈小則方寸千言甚矜其能或時不持錢詣酒家飲因書其壁雇觀者以讐酒討錢足而滅之每書輒削而焚其柎梁鵠乃益爲版而飲之酒候其醉而竊其柎鵠卒以書至選部尚書宜官後爲袁術將今鉅鹿宋子有耿球碑是術所立其書甚工云是宜官也梁鵠奔劉表魏武帝破荆州募求鵠鵠之爲選部也魏武欲爲洛陽令而以爲北部尉故懼而自縛詣門署軍假司馬在祕書以勤書自効是以今者多有鵠手跡魏武帝懸著帳中及以釘壁玩之以爲勝宜官今宫殿題署多是鵠象鵠宜爲大字邯鄲淳宜爲小字鵠謂淳得次仲法然鵠之用筆盡其勢矣鵠弟子毛𢎞教於祕書今八分皆𢎞法也漢末有左子邑小與淳鵠不同然亦有名魏初有鍾胡二家爲行書法俱學之於劉徳升而鍾氏少異然亦各有巧今大行於世云作𨽻勢曰鳥跡之變乃惟佐𨽻蠲彼繁文崇此簡易厥用既𢎞體象有度煥若星陳鬱若雲布其大徑尋細不容髪隨事從宜靡有常制或穹隆恢廓或櫛比鍼列或砥平繩直或䖤䗺膠戾或長邪角趣或規旋矩折脩短相副異體同勢􅁬筆輕舉離而不絶纎波濃㸃錯落其閒若鐘虡設張庭燎飛煙嶄嶄嶻嵳髙下屬連似崇臺重宇增雲冠山遠而望之若飛龍在天近而察之心亂目眩竒姿詭譎不可勝原硏桑所不能計宰賜所不能言何草篆之足算而斯文之未宣豈體大之難覩將祕奥之不傳聊俯仰而詳觀舉大較而論旃漢興而有草書不知作者姓名至章帝時齊相杜度號善作篇後有崔瑗崔實亦皆稱工杜氏殺字甚安而書體微痩崔氏甚得筆勢而結字小疎𢎞農張伯英者因而轉精甚巧凡家之衣帛必書而後練之臨池學書池水盡黒下筆必爲楷則號忩忩不暇草書寸紙不見遺至今尤寳其書韋仲將謂之草聖伯英弟文舒者次伯英又有姜孟頴梁孔逹田彦和及韋仲將之徒皆伯英弟子有名於世然殊不及文舒也羅叔景趙元嗣者與伯英並時見稱於西州而矜巧自與衆頗惑之故英自稱上比崔仲不足下方羅趙有餘河閒張超亦有名然雖與崔氏同州不如伯英之得其法也崔瑗作草書勢曰書契之興始自頡皇寫彼鳥跡以定文章爰暨末葉典籍彌繁時之多僻政之多權官事荒蕪勦其墨翰惟作佐𨽻舊字是刪草書之法蓋又簡畧應時諭指用於卒迫兼功并用愛曰省力純儉之變豈必古式觀其法象俯仰有儀方不中矩圓不副規抑左掦右望之若﨑竦企鳥峙志在飛移狡獸暴駭將奔未馳或􅣺􅚍㸃􅚭􅃺似連珠絶而不離畜怒怫鬱放逸生竒或凌邃惴慄若據槁臨危旁㸃邪附似蜩螗挶枝絶筆收勢餘綖紏結若杜伯揵毒緣巇螣蛇赴穴頭沒尾垂是故遠而望之􅬜焉若沮岑崩崖就而察之一畫不可移機微要妙臨時從宜畧舉大較髣髴若斯及瓘爲楚王瑋所搆恒聞變以何劭嫂之父也從牆孔中詣之以問消息劭知而不告恒還經厨下收人正食因而遇害後贈長水校尉諡蘭陵貞世子二子璪玠璪字仲寳襲瓘爵後東海王越以蘭陵益其國改封江夏郡公邑八千五百户懷帝即位爲散騎侍郎永嘉五年沒於劉聰元帝以瓘元孫崇嗣玠字叔寳年五歲風神秀異祖父瓘曰此兒有異於衆顧吾年老不見其成長耳總角乘羊車入市見者以爲玉人觀之者傾都驃騎將軍王濟玠之舅也儁爽有風姿毎見玠輒歎日珠玉在側覺我形穢又嘗語人曰與玠同遊若明珠之在側朗然照人及長好言元理其後多病體羸母常禁其語遇有勝日親友時請一言無不咨嗟以爲入微琅邪王澄有高名少所推服毎聞玠言輒嘆息絶倒故時人爲之語曰衞玠談道平子絶倒澄及王元王濟並有盛名皆出玠下世云王氏三子不如衞家一兒玠妻父樂廣有海内重名議者以爲婦公冰清女壻玉潤辟命屢至皆不就乆之爲太傅西閤祭酒拜太子洗馬璪爲散騎侍郎内侍懷帝玠以天下大亂欲移家南行母曰我不能舍仲寶去也玠啓諭深至爲門户大計母涕泣從之臨别玠謂兄曰在三之義人之所重今可謂致身之日兄其勉之乃扶輿母轉至江夏征南將軍山簡見之甚相欽重簡曰昔戴叔鸞嫁女唯賢是與不問貧賤况衞氏權貴門户令望之人乎於是以女妻焉遂進至豫章是時大將軍王敦鎭豫章長史謝鯤先雅重玠相見欣然言論彌曰敦謂鯤曰昔王輔嗣吐金聲於中朝此子復玉振於江表微言之緒絶而復續不意永嘉之末復聞正始之音何平叔若在當復絶倒玠嘗以人有不及可以情恕非意相干可以理遣故終身不見喜愠之容以王敦豪爽而好居物上恐非國之忠臣求向建業京師人士聞其姿容觀者如堵玠勞疾遂甚永嘉六年卒時年二十七時人謂玠被看殺𦵏於南昌謝鯤哭之慟人問曰子有何恤而致斯哀荅曰棟梁折矣不覺哀耳咸和中改塋於江寧丞相王導敎曰衞洗馬明當改𦵏此君風流名士海内所瞻可脩薄祭以敦舊好後劉惔謝尚共論中朝人士或問杜乂可方衞洗馬不尚曰安得相比其間可容數人惔又云杜乂膚清叔寳神清其爲有識者所重如此于時中興名士唯王承及玠爲當時第一云恒族弟展字道舒歴尚書郎南陽太守永嘉中爲江州刺史累遷晉王大理詔有考子證父或鞭父母問子所在展以爲恐傷政敎並奏除之中興建爲廷尉上疏宜復肉刑不見省卒贈光祿大夫張華字荗先范陽方城人也父平魏漁陽守華少孤貧自牧羊同郡盧欽見而器之鄉人劉放亦竒其才以女妻焉華學業優博詞藻温麗朗贍多通圖緯方伎之書莫不詳悉造次必以禮度勇於赴義篤於周急器識𢎞曠時人罕能測之初未知名因著鷦鷯賦以自寄其詞曰何造化之多端播羣形於萬類惟鷦鷯之微禽亦攝生而受氣育翾翾之陋體無元黃以自貴毛無施於器用肉不登乎爼味鷹鸇過猶俄翼尚何懼於罿罻翳薈蒙籠是焉游集飛不飄揚翔不翕習其居易容其求易給巢林不過一枝毎食不過數粒栖無所滯游無所盤匪陋荆棘匪榮茞蘭動翼而逸投足而安委命順理與物無患伊兹禽之無知而處身之似智不懷寶以賈害不飾表以招累静守性而不矜動因循而簡易任自然以爲資無誘慕於世僞鵰鶡介其觜距鵠鷺軼於雲際鵾鷄竄於幽險孔翠生乎遐裔彼晨鳬與歸鴈又矯翼而增逝咸美羽而豐肌故無罪而皆斃徒衘蘆以避繳終爲戮於此世蒼鷹鷙而受紲鸚鵡慧而入籠屈猛志以服飬塊幽縶於九重變音聲以順㫖思摧翮以爲庸戀鍾岱之林野慕隴坻之髙松雖䝉幸於今日未若疇昔之從容海鳥爰居避風而至條枝巨爵踰嶺自致提挈萬里飄飄逼畏夫唯體大妨物而形瓌足偉也隂陽陶烝萬品一區巨細舛錯種繁類殊鷦冥巢於蚊睫大鵬彌乎天隅將以上方不足而下比有餘普天壤而遐觀吾又安知大小之所如陳留阮籍見之歎曰王佐之才也由是聲名始著郡守鮮于嗣薦華爲太常博士盧欽言之於文帝轉河南尹丞未拜除佐著作郎頃之遷長史兼中書郎朝議表奏多見施用遂即眞晉受禪拜黄門侍郎封關内侯華彊記黙識四海之内若指諸掌武帝嘗問漢宫室制度及建章千門萬户華應對如流聽者忘倦畫地成圖左右屬目帝甚異之時人比之子産數歲拜中書令後加散騎常侍遭母憂哀毁過禮中詔勉勵逼令攝事初帝與羊祐謀伐呉而羣臣多以爲不可唯華贊成其策其後祜疾篤帝遣華詣祜問以伐吳之䇿語在祜傳及將大舉以華爲度支尚書乃量計運漕決定廟算衆軍既進而未有剋獲賈充等奏誅華以謝天下帝曰此是吾意華但與吾同耳時大臣皆以爲未可輕進華獨堅執以爲必剋及呉滅詔褒其勲進封爲廣武縣侯增邑萬户封一子爲亭侯千五百户賜絹萬匹華名重一世衆所推服晉史及儀禮憲章並屬於華多所損益當時詔誥皆所草定聲譽益著有台輔之望焉而荀朂自以大族恃帝㤙深增疾之毎伺閒隙欲出華外鎮會帝問華誰可託寄後事者對曰明徳至親莫如齊王攸既非上意所在微爲忤㫖閒言遂行乃出華爲持節都督幽州諸軍事領䕶烏桓校尉安北將軍華撫納新舊夷夏懷之東夷馬韓新彌諸國依山帶海去州四千餘里歴世未附者二十餘國並遣使朝獻於是遠夷賔服四境無虞頻歲豐稔士馬彊盛朝議將欲徵華入相又欲進號儀同初華毁徵士馮恢於帝紞卽恢之弟也深有寵於帝紞常侍帝從容論魏晉事因曰臣竊謂鍾會之釁頗由太祖帝變色曰卿何言邪紞免冠謝曰臣愚冗瞽言罪應萬死然臣微意猶有可申帝曰何以言之紞曰臣以爲善御者必識六轡盈縮之勢善政者必審官方控帶之宜故仲由以兼人被抑冉求以退弱被進漢高八王以寵過夷滅光武諸將由抑損克終非上有仁暴之殊下有愚智之異蓋抑揚與奪使之然耳鍾㑹才見有限而太祖誇奬太過嘉其謀猷盛其名器居以重勢委以大兵故使會自謂算無遺策功在不賞輈張䟦扈遂遘㓙逆耳向令太祖錄其小能節以大禮抑之以權勢納之以軌則則亂心無由而生亂事無由而成矣帝曰然紞稽首曰陛下既已然微臣之言宜思堅冰之漸無使如㑹之徒復致覆䘮帝曰當今豈有如㑹者乎紞曰東方朔有言談何容易易曰臣不宻則失身帝乃屏左右曰卿極言之紞曰陛下謀謨之臣著大功於天下海内莫不聞知據方鎮戎馬之任者皆在陛下聖慮耳帝黙然頃之徵華爲太常以太廟屋棟折免官遂終武帝之世以列侯朝見惠帝即位以華爲太子少傅與王戎裴楷和嶠俱以徳望爲楊駿所忌皆不與朝政及駿誅後將廢皇太后會羣臣於朝堂議者皆承望風㫖以爲春秋絶文姜今太后自絶於宗廟亦宜廢黜惟華議以爲夫婦之道父不能得之於子子不能得之於父皇太后非得罪於先帝者也今黨其所親爲不母於聖世宜依漢廢趙太后爲孝成后故事貶皇太后之號還稱武皇后居異宫以全貴終之㤙不從遂廢太后爲庶人楚王瑋受密詔殺太宰汝南王亮太保衞瓘等内外兵擾朝廷大恐計無所出華白帝以瑋矯詔擅害二公將士倉卒謂是國家意故從之耳今可遣騶虞幡使外軍解嚴理必風靡上從之瑋兵果散及瑋誅華以首謀有功拜右光祿大夫開府儀同三司侍中中書監金章紫綬固辭開府賈謐與后共謀以華庶族儒雅有籌畧進無逼上之嫌退爲衆望所依欲倚以朝綱訪以政事疑而未決以問裴頠頠素重華深贊其事華遂盡忠匡輔彌縫補闕雖當暗主虐后之朝而海内晏然華之功也華懼后族之盛作女史箴以爲諷賈后雖凶妬而知敬重華乆之論前後忠勲進封壯武郡公華十餘讓中詔敦喻乃受數年代下邳王晃爲司空領著作及賈后謀廢太子左衛率劉卞甚爲太子所信遇每會宴卞必預焉屢見賈謐驕傲太子恨之形于言色謐亦不能平卞以賈后謀問華華曰不聞卞曰卞以寒悴自須昌小吏受公成㧞以至今日士感知已是以盡言而公更有疑於卞邪華曰假令有此君欲如何卞曰東宫俊乂如林四率精兵萬人公居阿衡之任若得公命皇太子因朝入錄尚書事廢賈后於金墉城兩黄門力耳華曰今天子當陽太子人子也吾又不受阿衡之任忽相與行此是無其君父而以不孝示天下也雖能有成猶不免罪况權戚滿朝威柄不一而可以安乎及帝會羣臣於式乾殿出太子手書徧示羣臣莫敢有言者惟華諌曰此國家之大禍自漢武以來每廢黜正嫡常至䘮亂且國家有天下日淺願陛下詳之尚書左僕射裴頠以爲宜先檢校傳書者又請比校太子手書不然恐有詐妄賈后乃内出太子素啓事十餘紙衆人比視無敢言非者議至日西不決后知華等意堅因表乞免爲庶人帝乃可其奏初趙王倫爲鎮西將軍撓亂關中氐羌反叛乃以梁王肜代之或説華曰趙王貪昧信用孫秀所在爲亂而秀變詐姦人之雄今可遣梁王斬秀刈趙之半以謝關右不亦可乎華從之肜許諾秀友人辛冉從西來言於肜曰氐羌自反非秀之爲故得免死倫既還諂事賈后因求錄尚書事後又求尚書令華與裴頠皆固執不可由是致怨倫秀疾華如讐武庫火華懼因此變作列兵固守然後救之故累代之寶及漢高斬蛇劔王莾頭孔子屐等盡焚焉時華見劒穿屋而飛莫知所向初華所封壯武郡有桑化爲栢識者以爲不􅖤又華第舍及監省數有妖怪少子韙以中台星坼勸華遜位華不從曰天道元遠唯脩徳以應耳不如静以待之以俟天命及倫秀將廢賈后秀使司馬雅夜告華曰今社稷將危趙王欲與公共匡王室爲霸者之事華知秀等必成簒奪乃拒之雅怒曰刃將加頸而吐言如此不顧而出華方晝卧方夣見屋壞覺而患之是夜難作詐稱詔召華遂與裴頠俱被收華將死謂張林曰卿欲害忠臣邪林稱詔詰之曰卿爲宰相任天下事太子之廢不能死節何也華曰式乾之議臣諌事俱存非不諌也林曰諌若不從何不去位華不能荅須㬰使者至曰詔斬公華曰臣先帝老臣中心如丹臣不愛死懼王室之難禍不可測也遂害之於前殿馬道南夷三族朝野莫不悲痛之時年六十九華性好人物誘進不倦至于窮賤候門之士有一介之善者便咨嗟稱詠爲之延譽雅愛書籍身死之日家無餘財唯有文史溢于几篋甞徙居載書三十乘祕書監摰虞撰定官書皆資華之夲以取正焉天下竒祕世所希有者悉在華所由是博物洽聞時無與比惠帝中人有得鳥毛長三丈以示華華見惨然曰此海鳬毛也出則天下大亂矣陸機甞餉華鮓于時賓客滿坐華發器便曰此龍肉也衆未之信華曰試以苦酒濯之必有異既而五色光起機還問鮓主果云園中茅積下得一白魚質狀殊常以作鮓過美故以相獻武庫封閉甚密其中忽有雉雊華曰此必蛇化爲雉也開視雉側果有蛇蛻焉呉郡臨平江岸崩出一石鼔搥之無聲帝以問華華曰可取蜀中桐材刻爲魚形扣之則鳴矣於是如其言果聲聞數里初吳之未滅也牛斗之閒常有紫氣道術者以爲吳方彊盛未可圖也唯華以爲不然及吳平之後紫氣愈明華聞豫章人雷煥妙逹緯象乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之乆矣惟斗牛之閒頗有異氣華曰是何祥也煥曰寶劔之精上徹於天耳華曰君言得之吾少時有相者言吾年出六十位登三事當得寶劔佩之斯言豈效與因問曰在何郡煥曰在豫章豐城華曰欲屈君爲宰共尋之可乎煥許之華大喜即補煥爲豐城令到縣掘獄屋基入地四丈餘得一石函光氣非常中有䨇劔並刻題一曰龍泉一曰太阿其夕斗牛閒氣不復見焉煥以南昌西山北巖下土以拭劔光芒艶發大盆盛水置劒其上視之者精芒炫目遣使送一劔并土與華留一自佩或謂煥曰得兩送一張公其可欺乎煥曰夲朝將亂張公當受其禍此劒當繫徐君墓樹耳靈異之物終當化去不永爲人服也華得劒寶愛之常置坐側華以南昌土不如華隂赤土報煥書曰詳觀劒文乃干將也莫邪何復不至雖然天生神物終當合耳因以華隂土一斤致煥煥以拭劒倍益精明華誅失劔所在煥卒子華爲州從事持劔行經延平津劒忽於腰下躍出墮水使人沒水取之不見劒但見兩龍各長數丈蟠縈有文章沒者懼而返須㬰光彩照水波浪驚沸於是失劔華歎曰先君化去之言張公終合之論此其驗乎華之博物多此類不可詳載焉後倫秀伏誅齊王冏輔政摰虞致牋於冏稱華前答武帝詔宜留先王事冏以故表列華及裴頠等無辜見誅宜蒙㤙理事下羣官通議議者各有所執而多稱其寃壯武國臣竺道又詣長沙王求復華爵位依違者乆之太安二年詔復華侍中中書監司空公廣武侯及所沒財物與印綬符䇿遣使弔祭之初陸機兄弟志氣高爽自以呉之名家初入洛不推中國人士見華一靣如舊欽華徳範如師資之禮焉華誅後作誄又爲詠徳賦以悼之華著博物志十篇及文章行於世二子禕韙禕字彦仲好學謙敬有父風歴位散騎常侍韙儒博曉天文散騎侍郎同時遇害禕子輿字公安襲華爵避難過江辟丞相掾太子舍人劉卞字叔龍東平湏昌人也夲兵家子質直少言少爲縣小吏功曹夜醉如厠使卞執燭不從功曹衘之以他事補亭子有祖秀才者於亭中與刺史箋乆不成卞敎之數言卓犖有大致秀才謂縣令曰卞公府掾之精者卿云何以爲亭子令即召爲門下史百事疎簡不能周密令問卞能學不答曰願之即使就學無幾卞兄爲太子長兵既死兵例湏代功曹請以卞代兄役令曰祖秀才有言遂不聽卞後從令至洛得入太學試經爲臺四品吏訪問令寫黄紙一鹿車卞曰劉卞非爲人寫黄紙者也訪問知怒言於中正退爲尚書令史或謂卞曰君才簡畧堪大不堪小不如作守舍人卞從其言後爲吏部令史遷齊王攸司空主簿轉太常丞司徒左西曹掾尚書郎所歴皆稱職累遷散騎侍郎除并州刺史入爲左衞率知賈后廢太子之謀甚憂之以計干張華而不用益以不平賈后親黨微服聽察外間頗聞卞言乃遷卞爲輕車將軍雍州刺史卞知言泄恐爲賈后所誅乃飲藥卒初卞之并州昔同時爲湏昌小吏者十餘人祖餞之其一人卿卞卞遣扶出之人以此少之王沈字處道太原晉陽人也祖柔漢匈奴中郎將父機魏東郡太守沈少孤飬於從叔司空昶事昶如父奉繼母寡嫂以孝義稱好書善屬文大將軍曹爽辟爲掾累遷中書黄門侍郎及爽誅以故吏免後起爲治書侍御史轉祕書監正元中遷散騎常侍侍中典著作與荀顗阮籍共撰魏書多爲時諱未若陳壽之實錄也時魏高貴鄉公好學有文才引沈及裴秀數於東堂講讌屬文號沈爲文籍先生秀爲儒林丈人及高貴鄉公將攻文帝召沈及王業告之沈業馳白文帝以功封安平侯邑二千户沈既不忠於主甚爲衆論所排尋遷尚書出監豫州諸軍事􅁬武將軍豫州刺史至鎭乃下敎宣下屬城士庶曰有能舉遺逸於林藪黜姦佞於州國陳長吏之可否説百姓之所患興利除害損益昭然者給榖五百斛若逹一至之言説刺史得失朝政寛猛令剛柔得適者給榖千斛謂余不信有如皎日主簿陳廞禇䂮曰奉省敎命所班用示賞勸實爲感歎然恐拘介之士或憚賞而不言貪昧之人將慕利而妄舉茍不合宜賞不虛行則遠聽者未知當否之所在徒見言之不用謂設有而不行愚以告下之事可小湏後沈又教曰夫徳薄而位厚功輕而祿重貪夫之所徇高士之所不處也若陳至言於刺史興益於夲州逹幽隠之賢去祝鮀之佞立徳於上受分於下斯乃君子之操何不言之有直言至理忠也惠加一州仁也功成辭賞亷也兼斯而行仁智之事何故懷其道而迷其國哉禇䂮復白曰昔魏絳由和戎之功䝉女樂之賜管仲有興齊之勲而加上卿之禮功勲明著然後賞勸隨之未聞張重賞以待諌臣懸榖帛以求盡言也沈無以奪之遂從䂮議沈探尋善政案賈逵已來法制禁令諸所施行擇善者而從之又敎曰後生不聞先王之教而望政道日興不可得也文武並用長乆之道也俗化陵遲不可不革革俗之要實在敦學昔原伯魯不悦學閔馬父知其必亡將吏子弟優閑家門若不敎之必致游戲傷毁風俗矣於是九郡之士咸悦道教移風易俗遷征虜將軍持節都督江北諸軍事五等初建封博陵侯班在次國平蜀之役呉人大出聲爲救蜀振蕩邉境沈鎮御有方寇聞而退轉鎮南將軍武帝即王位拜御史大夫守尚書令加給事中沈以才望顯名當世是以創業之事羊祜荀祜裴秀賈充等皆與沈諮謀焉及帝受禪以佐命之勲轉驃騎將軍錄尚書事加散騎常侍綂城外諸軍事封博陵郡公固讓不受乃進爵爲縣公邑千八百户帝方欲委以萬機太始二年薨帝素服舉哀賜祕器朝服一具衣一襲錢三十萬布百匹𦵏田一頃謚曰元明年帝追思沈勲詔贈司空公又詔沈前以翼贊之勲當受郡公之封而固辭懇至嘉其讓徳不奪其志可以郡公官屬送𦵏沈素清儉不營産業其使所領兵作屋五十閒子浚嗣後沈夫人荀氏卒將合𦵏沈棺櫬已毁更賜東園祕器咸寧中復追封沈爲郡公浚字彭祖母趙氏婦良家女也貧賤出入沈家遂生浚沈初不齒之年十五沈薨無子親戚共立浚爲嗣拜駙馬都尉太康初與諸王侯俱就國三年來朝除員外散騎侍郎元康初轉員外常侍遷越騎校尉右軍將軍出補河内太守以郡公不得爲二千石轉東中郎將鎮許昌及愍懷太子幽于許昌浚承賈后㫖與黄門孫憲共害太子遷寧北將軍青州刺史尋徙寧朔將軍持節都督幽州諸軍事于時朝廷昏亂盜賊蠭起浚爲自安之計結好夷狄以女妻鮮卑務勿塵又以一女妻蘇恕延及趙王倫簒位三王起義浚擁衆挾兩端遏絶檄書使其境内士衆不得赴義成都王頴欲討之而未暇也倫誅進號安北將軍及河閒王顒成都王頴興兵内向害長沙王乂而浚有不平之心頴表請幽州刺史石堪爲右司馬以右司馬和演代堪密使演殺浚并其衆演與烏桓單于審登謀之於是與浚期游薊城南清泉水上薊城内西行有二道演浚各從一道演與浚欲合鹵簿因而圖之値天暴雨兵器霑濕不果而還單于由是與其種人謀曰演圖殺浚事垂克而天卒雨使不得果其天助浚也違天不祥我不可乆與演同乃以謀告浚浚密嚴兵與單于圍演演持白幡詣浚降遂斬之自領幽州大營器械召務勿塵率胡晉合二萬人進軍討頴以主簿祁𢎞爲前鋒遇頴將石超於平棘擊敗之浚乗勝遂克鄴城士衆暴掠死者甚多鮮卑大掠婦女浚命敢有挾藏者斬於是沈於易水者八千人黔首荼毒自此始也浚還薊聲實益盛東海王越將迎大駕浚遣祁𢎞率烏丸騎爲先驅惠帝旋洛陽轉浚驃騎大將軍都督東夷河北諸軍事領幽州刺史以燕國增博陵之封懷帝即位以浚爲司空領烏丸校尉務勿塵爲大單于浚又表封務勿塵遼西郡公其别部大飄滑及其弟渴末别部大屠瓮等皆爲親晉王永嘉中石勒寇冀州浚遣鮮卑文鴦討勒勒走南陽明年勒復寇冀州刺史王斌爲勒所害浚又領冀州詔進浚爲大司馬加侍中大都督督幽冀諸軍事使者未及發㑹洛京傾覆浚大樹威令専征伐遣督䕶王昌中山太守阮豹等率諸軍及務勿塵世子疾陸眷并弟文鴦從弟末柸攻石勒於襄國勒率衆來距昌逆擊敗之末柸逐北入其壘門爲勒所獲勒質末柸遣閒使求和疾陸眷遂以鎧馬二百五十匹金銀各一簏贖末柸結盟而退其後浚布告天下稱受中詔承制乃以司空荀藩爲太尉光祿大夫荀組爲司𨽻大司農華薈爲太常中書令李絙爲河南尹又遣祁𢎞討勒及於廣宗時大霧𢎞引軍就道卒與勒遇爲勒所殺由是劉琨與浚爭冀州琨使宗人劉希還中山合衆代郡上谷廣寗三郡人皆歸于琨浚患之遂輟討勒之師而與琨相距浚遣燕相胡矩督䕶諸軍與疾陸眷并力攻破希驅畧三郡士女出塞琨不復能爭浚還欲討勒使棗嵩督諸軍屯易水召疾陸眷將與之俱攻襄國浚爲政苛暴將吏又貪殘並廣占山澤引水灌田漬陷冢墓調發殷煩下不堪命多叛入鮮卑從事韓咸切諌浚怒殺之疾陸眷自以前後違命恐浚誅之勒亦遣使厚賂疾陸眷等由是不應召浚怒以重幣誘單于猗盧子右賢王曰律孫令攻疾陸眷反爲所破時劉琨大爲劉聰所逼諸避亂游士多歸于浚浚日以彊盛乃設壇告類建立皇太子備置衆官浚自領尚書令以棗嵩裴憲並爲尚書使其子居王官持節領䕶匈奴中郎將以妻舅崔毖爲東夷校尉又使嵩監司冀并兖諸軍事行安北將軍以田徽爲兖州李渾爲青州渾爲石勒所殺以薄盛代之浚以父字處道爲當塗高應王者之䜟謀將僭號胡矩諌浚盛陳其不可浚忿之出矩爲魏郡守前渤海太守劉亮從子北海太守搏司空掾高柔並切諌浚怒誅之浚素不平長史燕國王悌遂因他事殺之時童謡曰十囊五囊入棗郎棗嵩浚之子壻浚聞責嵩而不能罪之也又謠曰幽州城門似藏户中有伏尸王彭祖有􅈢距府門翟雉入聽事時燕國霍原北州名賢浚以僭位事示之原不荅遂害之由是人士憤怨内外無親而矜豪曰甚不親爲政所任多苛剋加亢旱災蝗士卒衰弱浚之承制也参佐皆内叙唯司馬游綂外出綂怨密與石勒通謀勒乃詐降於浚許奉浚爲主時百姓内叛疾陸眷等侵逼浚喜勒之附已勒遂僞卑辭以事之獻遺珍寶使驛相繼浚以勒爲誠不復設備勒乃遣使尅曰上尊號於浚浚許之勒屯兵於易水督䕶孫緯疑其詐馳白浚而引兵逆勒浚不聽使勒直前衆議皆曰胡貪而無信必有詐請距之浚怒欲斬諸言者衆遂不敢復諌盛張設以待勒勒至城便縱兵大掠浚左右復請討之不許及勒登聽事浚乃走出堂皇勒衆執以見勒勒遂與浚妻並坐立浚於前浚罵曰胡奴調汝公何凶逆如此勒數浚不忠於晉并責以百姓餒乏積粟五十萬斛而不振給遂遣騎五百先送浚于襄國收浚麾下精兵萬人盡殺之停二日而還孫緯遮擊之勒僅而得免勒至襄國斬浚而浚竟不爲之屈大罵而死無子太元二年詔興滅繼絶封沈從孫道素爲博陵公卒子崇之嗣義熙十一年改封東莞郡公宋受禪國除荀顗字景倩潁川人魏太尉或之弟六子也幼爲姊壻陳羣所賞性至孝總角知名博學洽聞理思周宻魏時以父勲除中郎宣帝輔政見顗竒之曰荀令君之子也擢拜散騎侍郎累遷侍中爲魏少帝執經拜騎都尉賜爵關内侯難鍾會易無互體又與扶風王駿論仁孝孰先見稱於世時曹爽專權何晏等欲害太常傅嘏顗營救得免及高貴鄉公立顗言於景帝曰今上踐阼權道非常宜速遣使宣徳四方且察外志毌邱儉文欽果不服舉兵反顗預討儉等有功賜爵萬歲亭侯邑四百户文帝輔政遷尚書帝征諸葛誕留顗鎮守顗甥陳㤗卒顗代㤗爲僕射領吏部四辭而後就職顗承㤗之後加之淑愼綜核名實風俗澄正咸熙中遷司空進爵鄉侯顗年踰耳順孝飬烝烝以母憂去職哀毁幾滅性海内稱之文帝奏宜依漢太傅胡廣喪母故事給司空吉凶導從及蜀平興復五等命顗定禮儀顗上請羊祜任愷庾峻應貞孔顥共删改舊文撰定晉禮咸熙初封臨淮侯武帝踐阼進爵爲公食邑一千八百户又詔以顗爲司徒尋加侍中遷太尉都督城外牙門諸軍事置司馬親兵百人頃之又詔顗以公行太子太傅侍中太尉如故時以正徳大序雅頌未合命顗定樂事未終以㤗始十年薨帝爲舉哀皇太子臨䘮二宫賻贈禮秩有加詔賜温明祕器朝服一具衣一襲諡曰康又詔曰太尉不恤私門居無舘宇素丝之志没而彌顯其賜家錢二百萬使立宅舍咸寧初詔論次功臣將配享宗廟所司奏顗等十二人銘功太常配享清廟顗明三禮知朝廷大義而無質直之操唯阿意茍合於荀朂何曾賈充之間初皇太子將納妃顗上言賈充女姿徳淑荗可以参選以此獲譏於世顗無子以從孫徽嗣中興初以顗兄元孫序爲顗後封臨淮公序卒又絶孝武帝又封序子恒繼顗後恒卒子龍符嗣宋受禪國除荀朂字公會潁川潁隂人漢司空爽曾孫也祖蜚射聲校尉父早亡朂依于舅氏岐嶷夙成年十餘歲能屬文從外祖太傅鍾繇曰此兒當及其曾祖既長遂博學逹於從政仕魏辟大將軍曹爽掾遷中書通事郎爽誅門生故吏無敢徃者朂獨臨赴衆乃從之爲安陽令轉驃騎從事中郎朂有遺愛安陽生爲立祠遷廷尉正参文帝大將軍事賜爵關内侯轉從事中郎領記室高貴鄉公欲爲變時大將軍掾孫佑守閶闔門帝弟安陽侯幹聞難欲入佑謂幹曰未有入者可從東掖門及幹至帝遲之幹以狀白帝欲族誅佑朂諌曰孫佑不納安陽誠宜深責然事有逆順用刑不可以喜怒爲輕重今成倅刑止其身佑乃族誅恐義士私議乃免佑爲庻人時官騎路遺求爲刺客入蜀朂言於帝曰明公以至公宰天下宜仗正義以伐違貳而名以刺客除賊非所謂刑于四海以德服遠也帝稱善及鍾㑹謀反審問未至而外人先告之帝待㑹素厚未之信也朂曰㑹雖受恩然其性未可許以見得思義不可不速爲之備帝即出鎮長安主簿郭弈参軍王深以朂是㑹從甥少長舅氏勸帝斥出之帝不納而使朂陪乘待之如初先是朂啓伐蜀宜以衞瓘爲監軍及蜀中亂頼瓘以濟會平還洛與裴秀羊祜共管機密時將𤼵使聘吳並遣當時文士作書與孫皓帝用勗所作皓既報命和親帝謂朂曰君前作書使呉思順勝十萬之衆也帝即晉王位以朂爲侍中封安陽子邑千户武帝受禪改封濟北郡公朂以羊祜讓乃固辭爲侯拜中書監加侍中領著作與賈充共定律令充將鎮關右也朂謂馮紞曰賈公遠放吾等失勢太子婚尚未定若使充女得爲妃則不留而自停矣朂與紞同伺帝閒並稱充女才色絶世若納東宫必能輔佐君子有關雎后妃之徳遂成婚當時甚爲正直者所疾而獲佞媚之譏焉乆之進位光祿大夫既掌樂事又修律呂並行於世初朂於路逢趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者又嘗在帝坐進飯謂在坐人曰此是勞薪所炊咸未之信帝遣問膳夫乃云實用故車脚舉世服其明識俄領祕書監與中書令張華依劉向别錄整理記籍又立書博士置弟子敎習以鍾胡爲法咸寧初與石苞等並爲佐命功臣列於銘享及王濬表請伐呉朂與賈充固諌不可帝不從而呉果滅以専典詔命論功封子一人爲亭侯邑一千户賜絹千匹又封孫顯爲潁陽亭侯及得汲郡冢中古文竹書詔朂撰次之以爲中經列在祕書時議遣王公之國帝以問朂朂對曰諸王公已爲都督而使之國則廢方任又分割郡國人心戀夲必用嗷嗷國皆置軍官兵還當給國而闕邉守帝重使朂思之朂又陳言如詔凖古方伯選才使君國各隨方靣爲都督誠如明㫖至於割正封疆使親疎不同誠爲佳矣然分裂舊土猶懼多所搖動必使人心忿擾思惟竊宜如前若於事不得不時有所轉封而不至分割土域有所損奪者可隨宜節度其五等體國經野實不成制度然但虛名其於實事畧與舊郡縣鄉亭無異若造次改奪恐不能不以爲恨今方了其大者以爲五等可湏後裁度凡事雖有乆而益善者若臨時或有不解亦不可忽帝以朂言爲允多從其意時又議省州郡縣半吏以赴農功朂議以爲省吏不如省官省官不如省事省事不如清心時善其議太康中詔以朂爲左光祿大夫儀同三司開府辟召守中書監侍中侯如故時太尉賈充司徒李允並薨太子太傅又缺朂表陳三公保傅宜得其人若使楊珧参輔東宫必當仰稱聖意尚書令衞瓘吏部尚書山濤皆可爲司徒若以瓘新爲令未出者濤即其人帝並從之明年秋諸州郡大水兖土尤甚朂陳宜立都水使者其後門下啓通事令史伊羡趙咸爲舍人對掌文法詔以問朂朂曰今天下幸頼陛下聖徳六合爲一望道化隆洽垂之將來而門下上稱程咸張惲下稱此等欲以文法爲政皆愚臣所未逹昔張釋之諌漢文謂虎圏嗇夫不宜見用邴吉住車明調和隂陽之夲此二人豈不知小吏之惠誠惜大化也昔魏武帝使中軍司荀攸典刑獄明帝時猶以付内常侍以臣所聞明帝時唯有通事劉㤗等官不過與殿中同號耳又頃言論者皆云省官省事而求益吏者相尋矣多云尚書郎大令史不親文書乃委付書令史及幹誠吏多則相倚也増置文法之職適恐更耗擾臺閣臣竊謂不可時帝素知太子闇弱恐後亂國遣朂及和嶠徃觀之朂還盛稱太子之徳而嶠云太子如初於是天下貴嶠而賤朂帝將廢賈妃朂與馮紞等諌請故得不廢時議以朂之傾國害時孫資劉放之匹然性愼密毎有詔令大事雖已宣布然終不言不欲使人知已豫聞也族弟良曾勸朂曰公大失物情有所進益者自可語之則懷恩多矣其壻武統亦説朂宜有所營置令有歸戴者朂並黙然不應退而語諸子曰人臣不密則失身樹私則背公是大戒也汝等亦當宦逹人間宜識吾此意乆之以朂守尚書令朂乆在中書專管機事及失之甚罔罔悵恨或有賀之者朂曰奪我鳯凰池諸君賀我邪及在尚書課試令史以下覈其才能有闇於文法不能決疑處事者即時遣出帝嘗謂曰魏武帝言荀文若之進善不進不止荀公逹之退惡不退不休二令君之美亦望於君也居職月餘以母憂上還印綬帝不許遣常侍周恢喻㫖朂乃奉詔視職朂乆管機密有才思探得人主微㫖不犯顔忤爭故得始終全其寵祿太康十年卒詔贈司徒賜東園祕器朝服一具錢五十萬布百匹遣兼御史持節䕶喪諡曰成朂有十子其逹者輯藩組輯嗣官至衞尉卒諡曰簡子畯嗣卒諡曰烈無嫡子以弟息識爲嗣輯子綽字彦舒博學有才能撰晉後書十五篇傳於世永嘉末爲司空從事中郎没於石勒爲勒参軍藩字大堅元康中爲黄門侍郎受詔成父所治鐘磬以從駕討齊王冏勲封西華縣公累遷尚書令永嘉末轉司空未拜而洛陽陷没藩出奔密王浚承制奉藩爲留臺太尉及愍帝爲太子委藩督攝遠近建興元年薨於開封年六十九因葬亡所諡曰成追贈太保藩二子邃闓邃字道元解音樂善談論弱冠辟趙王倫相國掾遷太子洗馬長沙王乂以爲参軍乂敗成都王爲皇太弟精選僚屬以邃爲中舍人鄴城不守隨藩在密元帝召爲丞相從事中郎以道險不就愍帝就加左將軍陳留相父憂去職服闋襲封愍帝欲納邃女先徴爲散騎常侍邃懼西都危逼故不應命而東渡江元帝以爲軍諮祭酒太興初拜侍中邃與刀恊婚親時恊執權欲以邃爲吏部尚書邃深距之尋而王敦討恊恊黨並及於難唯邃以踈恊獲免敦表爲廷尉以疾不拜遷太常轉尚書蘇峻作亂邃與王導荀崧並侍天子於石頭峻平後卒贈金紫光祿大夫諡曰靖子汪嗣闓字道明亦有名稱京都爲之語曰洛中英英荀道明大司馬齊王冏辟爲掾冏敗暴尸已一日莫敢收葬闓與冏故吏李述稽含等露布請𦵏朝議聼之論者稱焉爲太傅主簿中書郎與邃俱渡江拜丞相軍諮祭酒中興建遷右軍將軍轉少府明帝嘗從容問王廙曰二荀兄弟孰賢廙答以闓才名過邃帝以語庾亮亮曰邃眞粹之地亦闓所不及由是議者莫能定其兄弟優劣歴御史中丞侍中尚書封射陽公太寧二年卒追贈衞尉諡曰定子逹嗣組字太章弱冠太尉王衍見而稱之曰夷雅有才識初爲司徒左西屬補太子舍人司徒王渾請爲從事中郎轉左長史歴太子中庶子滎陽太守趙王倫爲相國欲收大名選海内德望之士以江夏李重及組爲左右長史東平王堪沛國劉謨爲左右司馬倫簒以組爲侍中及長沙王乂敗惠帝遣組及散騎常侍閭邱仲詣成都王頴慰勞其軍帝西幸長安以組爲河南尹遷尚書轉衞尉賜爵成都縣男加散騎常侍侍中中書監轉司𨽻校尉加特進光祿大夫常侍如故于時天下已亂組兄弟貴盛懼不容於世雖居大官並諷議而已永嘉末復以組爲侍中領太子太保未拜㑹劉曜王彌逼洛陽組與藩俱出奔懷帝䝉塵司徒王浚以組爲司𨽻校尉組與藩移檄天下以琅邪王爲盟主愍帝稱皇太子組即太子之舅又領司隸校尉行豫州刺史事與藩共保滎陽之開封建興初詔藩行留臺事俄而藩薨帝更以組爲司空領尚書左僕射又兼司隸復行留臺事州征郡守皆承制行焉進爵臨潁縣公加夫人世子印綬明年進位太尉領豫州牧假節元帝承制以組爲都督司州諸軍加散騎常侍餘如故頃之又除尚書令表讓不拜及西都不守組乃遣使移檄天下共勸進帝欲以組爲司徒以問太常賀循循曰組舊望清重忠勤顯著遷訓五品實允衆望於是拜組爲司徒組逼於石勒不能自立太興初自許昌帥其屬數百人渡江給千兵百騎組先所領仍皆統攝頃之詔組與太保西陽王羕並錄尚書事各加班劒六十人永昌初遷太尉領太子太保未拜薨年六十五諡曰元子弈嗣弈字元欣少拜太子舍人駙馬都尉侍講東宫出爲鎮東將軍行揚武將軍新汲令愍帝爲太子召爲中舍人尋拜散騎侍郎皆不就隨父渡江元帝踐位拜中庻子遷給事黃門郎父憂去職服闋補散騎常侍侍中時將繕宫城尚書符下陳留王使出城夫弈駁曰昔虞賓在位書稱其美詩詠有客載在雅頌今陳留王位在三公之上坐在太子之右故答表曰書賜物曰與此古今之所崇體國之高義也謂宜除夫役時尚書張闓僕射孔愉難弈以爲昔宋不城周春秋所譏特蠲非體宜應減夫弈重駁以爲春秋之末文武之道將墜于地新有子朝之亂于時諸侯逋替莫肯率職宋之於周實有列國之權且同已勤王而主之者晉客而辭役責之可也今之陳留無列國之勢此之作否何益有無臣以爲宜除於國職爲全詔從之時又通議元㑹曰帝應敬司徒王導不博士郭熙杜援等以爲禮無拜臣之文謂宜除敬侍中馮懷議曰天子脩禮莫盛於辟雍當爾之日猶拜三老况今先帝師傅謂宜盡敬事下門下弈議曰三朝之首宜明君臣之體則不應敬若他日小會自可盡禮又至尊與公書手詔則曰頓首言中書爲詔則云敬問散騎優冊則曰制命今詔文尚異况大㑹之與小會理豈得同詔從之咸和七年卒追贈太僕諡曰定馮紞字少胄安平人也祖浮魏司隸校尉父員汲郡太守紞少博渉經史識悟機辯歴仕爲魏郡太守轉歩兵校尉徙越騎得幸於武帝稍遷左衞將軍承顔悦色寵愛日隆荀朂賈充並與之親善充女之爲皇太子妃也紞有力焉及妃之將廢紞朂乾没救請故得不廢伐呉之役紞領汝南太守以郡兵隨王濬入秣陵遷御史中丞轉侍中帝病篤得愈紞與朂見朝野之望屬在齊王攸攸素薄朂朂以太子愚劣恐攸得立有害於已乃使紞言於帝曰陛下前者疾若不差太子其廢矣齊王爲百姓所歸公卿所仰雖欲高讓其得免乎宜遣還藩以安社稷帝納之及攸薨朝野悲恨初帝友于之情甚篤既納朂紞邪説遂爲身後之慮以固儲位既聞攸隕哀慟特深紞侍立因言曰齊王攸名過於實今得自終此乃大晉之福陛下何乃過哀帝收淚而止初謀伐呉紞與賈充荀朂同共苦諌不可呉平紞内懷慙懼疾張華如讐及張華外鎮威徳大著朝論當徵爲尚書令紞從容侍帝論晉魏故事因諷帝言華不可授以重任帝黙然而止事具華傳太康七年紞疾詔以紞爲散騎常侍賜錢二十萬牀帳一具尋卒二子播熊播大長秋熊字文羆中書郎紞兄恢自有傳賈充字公閭平陽襄陵人也父逵魏豫州刺史陽里亭侯逵晚始生充言後當有充閭之慶故以爲名字焉充少孤居喪以孝聞襲父爵爲侯拜尚書郎典定科令兼度支考課辯章節度事皆施用累遷黄門侍郎汲郡典農中郎將参太將軍軍事從景帝討毌邱儉文欽於樂嘉帝疾篤還許昌留充監諸軍事以勞増邑三百五十户後爲文帝大將軍司馬轉左長史帝新執朝權恐方鎮有異議使充詣諸葛誕圖欲伐呉陰察其變充既論説時事因謂誕曰天下皆願禪代君以爲如何誕厲聲曰卿非賈豫州子乎世受魏恩豈可欲以社稷輸人乎若洛中有難吾當死之充黙然及還白帝曰誕再在楊州威名夙著能得人死力觀其規畧爲反必矣今徴之反速而事小不徴事遲而禍大帝乃徴誕爲司空而誕果叛復從征誕充進計曰楚兵輕而鋭若深溝高壘以逼賊城可不戰而尅也帝從之城陷帝登壘以勞充帝先歸洛陽使充統後事進爵宣陽鄉侯増邑千户遷廷尉充雅長法理有平反之稱轉中䕶軍魏高貴鄉公之攻相府也充率衆拒戰於南闕軍將敗騎督成倅弟太子舍人濟謂充曰今日之事何如充曰公等飬汝正擬今日何復疑濟於是抽戈犯蹕及常道鄉公即位進封安陽鄉侯増邑千二百户統城外諸軍加散騎常侍鍾㑹謀反於蜀帝假充節以夲官都督關中隴右諸軍事西據漢中未至而㑹死時軍國多事朝廷機密皆與籌之帝甚信重充與裴秀王沈羊祜荀朂同受心腹之任帝又命充定法律假金章賜甲第一區五等初建封臨沂侯爲晉元勲深見寵異祿賜常優於羣官充有刀筆才能觀察上㫖初文帝以景帝恢贊王業方傳位於舞陽侯攸充稱武帝寛仁且又居長有人君之徳宜奉社稷及文帝寢疾武帝請問後事文帝曰知汝者賈公閭也帝襲王位拜充晉國衞將軍儀同三司給事中封臨潁侯及受禪充以建明大命轉車騎將軍散騎常侍尚書僕射更封魯郡公毌柳氏爲魯國太夫人充與太傅鄭冲司空荀顗中書監荀朂中軍將軍羊祜中䕶軍王業廷尉杜友守河南尹杜預散騎侍郎裴楷潁川太守周雄齊相郭頎騎都尉成公綏荀煇尚書郎柳軌等共定新律既成詔自太傅車騎以下皆加祿賞其詳依故典於是賜充子弟一人關内侯絹五百匹固讓不許後代裴秀爲尚書令常侍車騎將軍如故尋改常侍爲侍中賜絹七百匹以母憂去職詔遣黄門侍郎慰問又以東南有事遣典軍將軍楊囂宣諭使六旬還内充爲政務農節用并官省職帝善之又以文武異容求罷所領兵及羊祜等出鎮充復上表欲立勲邉境帝並不許從容任職襃貶在已頗好進士毎有所薦逹必終始經緯之是以士多歸焉帝舅王恂嘗毁充而充更進恂或有背充以要權貴者充皆陽以素志待之而充無公方之操不能正身率下專以諂媚取容侍中任愷中書令庾純等剛直守正咸共疾之又以充女爲齊王妃懼後益盛時氐羌反叛帝深以爲慮愷因進説請充鎮關中乃下詔以充爲使持節都督秦涼二州諸軍事侍中車騎將軍如故假羽葆鼔吹給第一駙馬朝之賢良欲進忠規獻替者皆幸充此舉望隆惟新之化充既外出自以爲失職深衘任愷計無所從將之鎮百寮餞于夕陽亭荀朂私焉充以憂告朂曰公國之宰輔而爲一夫所制不亦鄙乎然是行也辭之實難獨有結婚太子不頓駕而自留矣充曰然孰可寄懷對曰朂請言之俄而侍宴論太子婚姻事朂因言充女才質令淑宜配儲宫而楊皇后及荀顗亦並稱之帝納其言會京師大雪平地二尺軍不得發既而儲宫當婚遂不西行詔充居夲職先是羊祜密啓留充及是帝以語充充謝祜曰始知君長者時呉將孫秀降拜爲驃騎大將軍帝以充舊臣欲改班使車騎居驃騎之右充固讓見聽尋遷司空侍中尚書令領兵如故㑹帝寢疾充及齊王攸荀朂参醫藥及疾愈賜絹各五百匹初帝疾篤朝廷屬意於攸河南尹夏侯和謂充曰卿二女壻親疎等矣立人當立徳充不答及是帝聞之徙和光祿勲乃奪充兵權而位遇無替尋轉太尉行太子太保錄尚書事咸寧三年日蝕於三朝充請遜位不許更以沛國之公邱益其封寵幸愈甚朝廷咸側目焉河南尹王恂上言𢎞訓太后入廟合食於景皇帝齊王攸不得行其子禮充議以爲禮諸侯不得祖天子公子不得禰先君皆謂奉綂承祀非謂不得復其父祖也攸身宜服三年喪事自如臣制有司奏若如充議服子服行臣制未有前比宜如恂表攸喪服從諸侯之例帝從充議伐呉之役詔充爲使持節假黄鉞大都督總綂六師給羽葆鼔吹緹幢兵萬人騎二千置左右長史司馬從事中郎增参軍騎司馬各十人帳下司馬二十人大車官騎各三十人充慮大功不捷表陳西有昆夷之患北有幽并之戍天下勞擾年榖不登興軍致討懼非其時又臣老邁非所克堪詔曰君不行吾便自出充不得已乃受節鉞將中軍爲諸軍節度以冠軍將軍楊濟爲副南屯襄陽呉江陵諸守皆降充乃徙屯項王濬之尅武昌也充遣使表曰呉未可悉定方夏江淮下濕疾疫必起宜召諸軍以爲後圖雖腰斬張華不足以謝天下華豫平呉之䇿故充以爲言中書監荀朂奏宜如充表帝不從杜預聞充有奏馳表固爭言平在旦夕使及至轘轅而孫皓已降呉平軍罷帝遣侍中程咸犒勞賜充帛八千匹增邑八千户分封從孫暢新城亭侯蓋安陽亭侯弟陽里亭侯混從孫關内侯衆增户邑充夲無南伐之謀固諌不見用及師出而呉平大慙懼議欲請罪帝聞充當詣闕豫幸東堂以待之罷節鉞僚佐仍假鼔吹麾幢充與羣臣上告成之禮請有司具其事帝謙讓不許及疾篤上印綬遜位帝遣侍臣諭㫖問疾殿中太醫致湯藥賜牀帳錢帛自皇太子宗室躬省起居太康三年四月薨時年六十六帝爲之慟使使持節太常表䇿追贈太宰加衮冕之服綠綟綬御劒賜東園祕器朝服一具衣一襲大鴻臚䕶䘮事假節鉞前後部羽葆鼔吹緹麾大路輼輬車帳下司馬大車椎斧文衣虎賁輕車介士葬禮依霍光及安平獻王故事給塋田一頃與石苞等爲王功配享廟庭諡曰武追贈充子黎民爲魯殤公充婦廣成君郭槐性妬忌初黎民年三歲乳母抱之當閤黎民見充喜笑充就而拊之槐望見謂充私乳母即鞭殺之黎民戀念發病而死後又有生男過朞復爲乳母所抱充以手摩其頭郭疑乳母又殺之兒亦思慕而死充遂無允嗣及薨槐以外孫韓謐爲黎民子奉充後郎中令韓咸中尉曹軫諌槐曰禮大宗無後以小宗支子後之無異姓爲後之文無令先公懷腆后土良史書過豈不痛心槐不從咸等上書求改立嗣事寢不報槐遂表陳是充遺意帝乃詔曰太宰魯公充崇徳立勲勤勞佐命背世殂隕毎用悼心又允子早終世嗣未立古者列國無嗣取始封支度子以紹其後而近代更除其國至於周之公旦漢之蕭何或豫建元子或封爵元妃蓋尊顯勲庸不同常制太宰素取外孫韓謐爲世子黎民後吾退而斷之外孫骨肉至近推恩計情合於人心其以謐爲魯公世孫以嗣其國自非功如太宰始封無後如太宰所取必以已自出不如太宰皆不得以爲比及下禮官議充諡博士秦秀議謚曰荒帝不納博士叚暢希㫖建議諡曰武帝乃從之自充薨至葬賻賜二千萬惠帝即位賈后擅權加充廟備六佾之舞母郭氏爲宜城君及郭氏亡諡曰宣特加殊禮時人譏之而莫敢言者初充前妻李氏淑美有才行生二女襃裕襃一名荃裕一名濬父豐誅李氏坐流徙後娶城陽太守郭配女即廣成君也武帝踐阼李以大赦得還帝特詔充置左右夫人充母亦勅充迎李氏郭槐怒攘袂數充曰刋定律令爲佐命之功我有其分李那得與我並充乃答詔託以謙冲不敢當兩夫人盛禮實畏槐也而荃爲齊王攸妃欲令充遣郭而還其母時沛國劉含母及帝舅羽林監王䖍前妻皆母邱儉孫女此例既多質之禮官俱不能決雖不遣後妻多異居私通充自以宰相爲海内凖則乃爲李氏築别室於永年里而不徃來荃濬毎號泣請充充竟不徃會充當鎮關右公卿供帳祖道荃濬懼充遂去乃排幔出於坐中叩頭流血向充及羣寮陳母應還之意衆以荃王妃皆驚起而散充甚愧愕使黄門將宫人扶去既而郭槐女爲太子妃帝乃下詔斷如李比皆不得還後荃憤恚而薨初槐欲自省李氏充曰彼有才氣卿徃不如不徃及女爲妃槐乃盛威儀而去既入户李氏出迎槐不覺脚屈因遂再拜自是充毎出行槐輒使人尋之恐其過李也初充母柳見古今重節義竟不知充與成濟事以濟不忠數追罵之侍者聞之無不竊笑及將亡充問所欲言柳曰我敎汝迎李新婦尚不肯安問他事遂無言及充薨後李氏二女乃欲令其母附𦵏賈后弗之許也及后廢李氏得合𦵏李氏作女訓行於世謐字長深母賈午充少女也父韓夀字徳眞南陽人魏司徒暨曾孫美姿貌善容止賈充辟爲司空掾充毎宴賓僚其女輒於靑璅中窺之見壽而悦焉問其左右識此人不有一婢説壽姓字云是故主人女大感想發於寤寐婢後往壽家具説女意并言其女光麗艷逸端美絶倫壽聞而心動便令爲通殷勤婢以白女女遂潛脩音好厚相贈結呼壽向夕入壽勁㨗過人踰垣而至家中莫知惟充覺其女悦暢異於常日時西域有貢竒香一着人則經月不歇帝甚貴之惟以賜充及大司農陳騫其女密盗以遺壽充僚屬與壽晏處聞其芬馥稱之於充自是充意知女與壽通而其門閤嚴峻不知所由得入乃夜中陽驚託言有盗因使循墻以觀其變左古白曰無餘異惟東北角如狐狸行處充乃考問女之左右具以狀對充祕之遂以女妻壽壽官至散騎常侍河南尹元康初卒贈驃騎將軍謐好學有才思既爲充嗣繼佐命之後又賈后專恣謐權過人主至乃鏁繫黃門侍郎其爲威福如此負其驕寵奢侈踰度宫室崇僭器服珍麗歌僮舞女選極一時開閤延賓海内輻湊貴游豪戚及浮競之徒莫不盡禮事之或著文章稱美謐以方賈誼渤海石崇歐陽建滎陽潘岳呉國陸機陸雲蘭陵繆徵京兆杜斌摰虞琅邪諸葛詮𢎞農王粹襄城杜育南陽鄒㨗齊國左思清河崔基沛國劉瓌汝南和郁周恢安平索秀潁川陳眕太原郭彰髙陽許猛彭城劉訥中山劉輿劉琨皆傅會於謐號曰二十四友其餘不得豫焉歴位散騎常侍後軍將軍廣成君薨去職䘮未終起爲祕書監掌國史先是朝廷議立晉書限斷中書監荀朂謂宜以魏正始建年著作郎王讚欲引嘉平已下朝臣盡入晉史于時依違未有所決惠帝立更使議之謐上議請從㤗始爲斷於是事下三府司徒王戎司空張華領軍將軍王衍侍中樂廣黃門侍郎嵇紹國子博士謝衡皆從謐議騎都尉濟北侯荀畯侍中荀藩黃門侍郎華混以爲宜用正始開元博士荀熙刁協謂宜嘉平起年謐重執奏戎華之議事遂施行尋轉侍中領祕書監如故謐時從帝幸宣武觀校獵諷尚書於㑹中召謐受拜誡左右勿使人知於是衆疑其有異志矣謐既親貴數入二宫共愍懷太子游處無屈降心常與太子奕碁爭道成都王頴在坐正色曰太子國之儲君賈謐何得無禮謐懼言之於后遂出頴爲平北將軍鎮鄴及爲常侍侍講東宫太子意有不悦謐患之而其家數有妖異飄風吹其朝服飛上數百丈墜于中丞臺又蛇出其被中夜暴雷震其室柱陷入地壓毁牀帳謐益恐及遷侍中專掌禁内遂與后成謀誣陷太子及趙王倫廢后以詔召謐於殿前將戮之走入西鐘下呼曰阿后救我乃就斬之韓壽少弟蔚有器望及壽兄鞏令保弟散騎侍郎預呉王友鑒謐母賈午皆伏誅初充伐呉時嘗屯項城軍中嘗忽失充所在充帳下都督周勤時晝寢夣見百餘人錄充引入一逕勤驚覺聞失充乃出尋索忽覩夣中之逕遂往求之果見充行至一府舍侍衞甚盛府公南靣坐聲色甚厲謂充曰將亂吾家事必爾與荀朂既惑吾子又亂吾孫閒使任愷黜爾而不去又使庾純罵汝而不改今呉寇當平汝方表斬張華汝之闇戇皆此類也若不悛愼當旦夕加罪充因叩頭流血公曰汝所以延日月而名器如此者是衞府之勲耳終當使孫嗣死於鐘虡之閒大子斃於金酒之中小子困於枯木之下荀朂亦宜同然其先徳小濃故在汝後數世之外國嗣亦替言畢命去充忽然得還營顔色憔悴性理昏䘮經日乃復及是謐死於鐘下賈后服金酒而死賈午考竟用木杖終皆如所言趙王倫之敗朝廷追述充勲議立其後欲以充從孫散騎侍郎衆爲嗣衆陽狂自免以子禿後充封魯公又病死永興中立充從曾孫湛爲魯公奉充後遭亂死國除㤗始中人爲充等謠曰賈裴王亂紀綱王裴賈濟天下言亡魏而成晉也充弟混字宫竒篤厚自守無殊才能太康中爲宗正卿歴領軍將軍領城門校尉加侍中封永平侯卒贈中軍大將軍儀同三司充從子彝遵並有鑒裁俱爲黃門郎遵弟模最知名模字思範少有志尚頗覽載籍而深沈有智算確然難奪深爲充所信愛毎事籌之焉充年衰疾劇常憂已諡傳模曰是非乆自見不可掩也起家爲邵陵令遂歴仕二宮尚書吏部郎以公事免起爲車騎司馬豫誅楊駿封平陽鄉侯邑千户及楚王瑋矯制害汝南王亮太保衞瓘詔使模將中騶三百人救之是時賈后既豫朝政欲信親黨拜模散騎常侍二日擢爲侍中模乃盡心匡弼推張華裴頠同心輔政數年之中朝野寧静模之力也乃加授光祿大夫然模潛執權勢外形欲遠之毎有啓奏賈后事入輒取急或託疾以避之至於素有嫌忿多所中陷朝廷甚憚之加貪冒聚斂富擬王公但賈后性甚彊暴模毎盡言爲陳禍福后不能從反謂模毁已於是委任之情日衰而讒閒之徒遂進模不得志憂憤成疾卒追贈車騎將軍開府儀同三司諡曰成子遊字彦將嗣歴官太子侍講員外散騎侍郎郭彰字叔武太原人賈后從舅也與賈充素相親遇充妻待彰若同生歴散騎常侍尚書衞將軍封冠軍縣侯及賈后專朝彰豫参權勢物情歸附賓客盈門世人稱爲賈郭謂謐及彰也卒諡曰烈楊駿字文長𢎞農華陰人也少以王官爲高陸令驍騎鎭軍二府司馬後以后父起居重位自鎮軍將軍遷車騎將軍封臨晉侯識者議之曰夫封建所以藩屏王室也后妃所以供粢盛𢎞内敎也后父始封而以臨晉爲侯兆於亂矣尚書褚䂮音畧郭奕並表駿小器不可任以社稷之重武帝不從帝自太康以後天下無事不復留心萬機惟躭酒色始寵后黨請謁公行而駿及珧濟勢傾天下時人有三楊之號及帝疾篤未有顧命佐命功臣皆已沒矣朝臣惶惑計無所從而駿盡斥羣公親侍左右因輒改易公卿樹其心腹㑹帝小閒見所用者非乃正色謂駿曰何得便爾乃詔中書以汝南王亮與駿夾輔王室駿恐失權寵從中書借詔觀之得便匿藏中書監華廙恐懼自往索之終不肯與信宿之閒上疾遂篤后乃奏帝以駿輔政帝乃頷之便召中書監華廙令何劭口宣帝㫖使作遺詔曰昔伊望作佐勲垂不朽周霍拜命名冠徃代侍中車騎將軍行太子太保領前將軍楊駿經徳履喆監識明遠毗翼二宫忠肅荗著宜正位上台擬跡阿衡其以駿爲太尉太子太傅假節都督中外諸軍事侍中錄尚書領前將軍如故置参軍六人歩兵三千人騎千人移止前衛將軍珧故府若止宿殿中宜有翼衛其差左右衛三部司馬各二十人殿中都尉司馬十人給駿令得持兵仗出入詔成后對廙劭以呈帝帝親視而無言自是二日而崩駿遂當寄託之重居太極殿梓宫將殯六宫出辭而駿不下殿以虎賁百人自衞不恭之跡自此而始惠帝即位進駿爲太傅大都督假黄鉞錄朝政百官總已慮左右間已乃以其甥叚廣張劭爲近侍之職凡有詔命帝省訖入呈太后然後乃出駿知賈后情性難制甚畏憚之又多樹親黨皆領禁兵於是公室怨望天下憤然矣駿弟珧濟並有儁才數相諌止駿不能用因廢於家駿闇於古義動違舊典武帝崩未踰年而改元議者咸以爲違春秋踰年書即位之義朝廷惜於前失令史官沒之故明年正月復改年焉駿自知素無美望懼不能輯和遠近乃依魏明帝即位故事遂大開封賞欲以悅衆爲政嚴碎愎諌自用不允衆心馮翊太守孫楚素與駿厚説之曰公以外戚居伊霍之重握天權輔弱主當仰思古人至公至誠謙順之道於周則周召爲宰在漢則朱虛東牟未有庶姓專朝而克終慶祚者也今宗室親重藩王方壯而公不與共参萬機内懷猜忌外樹私昵禍至無日矣駿不能從𢎞訓少府蒯欽駿之姑子少而相昵直亮不回屢以正言犯駿珧濟爲之寒心欽曰楊文長雖闇猶知人之無罪不可妄殺必當疎我我得疎外可以不與俱死不然傾宗覆族其能乆乎殿中中郎孟觀李肇素不爲駿所禮陰構駿將圖社稷賈后欲預政事而憚駿未得逞其所欲又不肯以婦道事皇太后黃門董猛始自帝之爲太子即爲寺人監在東宫給事於賈后后密通消息於猛謀廢太后猛乃與肇觀潛相結託賈后又令肇報汝南王亮使連兵討駿亮曰駿之凶暴死亡無日不足憂也肇報楚王瑋瑋然之於是求入朝駿素憚瑋先欲召入防其爲變因遂聽之及瑋至觀肇乃啓帝夜作詔中外戒嚴遣使奉詔廢駿以侯就第東安公繇率殿中兵四百人隨其後以討駿叚廣跪而言於帝曰楊駿受恩先帝竭心輔政且孤公無子豈有反理願陛下審之帝不答時駿居曹爽故府在武庫南聞内有變召衆官議之太傅主簿朱振説駿曰今内有變其趣可知必是閹豎爲賈后謀不利於公宜燒雲龍門以示威索造事者首開萬春門引東宫及外營兵公自擁翼皇太子入宫取姦人殿内震懼必斬送之可以免難駿素怯愞不決乃曰魏明帝造此大功奈何燒之侍中傅祗夜白駿請與武荗俱入雲龍門觀察事變祗因謂羣寮宫中不宜空便起揖於是皆走尋而殿中兵出燒駿府又令弩士於閣上臨駿府而射之駿兵皆不得出駿逃于馬廐以㦸殺之觀等受賈后密㫖誅駿親黨皆夷三族死者數千人又令李肇焚駿家私書賈后不欲令武帝顧命手詔聞于四海也駿既誅莫敢收者惟太傅舍人巴西閻纂殯歛之初駿徵高士孫登遺以布被登截被於門大呼曰斫斫剌剌旬月託疾詐死及是其言果驗永熙中温縣有人如狂造書曰光光文長大㦸爲牆毒藥雖行㦸還自傷及駿居内府以㦸爲衛焉永寧初詔曰舅氏失道宗族隕墜渭陽之思孔懷感傷其以蓩亭侯楊超爲奉朝請騎都尉以慰蓼莪之思焉珧字文琚歴位尚書令衞將軍素有名稱得幸於武帝時望在駿前以兄貴盛知權寵不可居自乞遜位前後懇至終不獲許初聘后珧表曰歴觀古今一族二后未嘗以全而受覆宗之禍乞以表事藏之宗廟若如臣之言得以免禍從之右軍督趙休上書陳王莾五公兄弟相代今楊氏三公並在大位而天變屢見臣竊爲陛下憂之由此珧益懼固求遜位聽之賜錢百萬絹五千匹珧初以退讓稱晚乃合朋黨搆出齊王攸中䕶軍羊琇北軍中候成粲謀欲因見珧而手刃之珧知而辭疾不出諷有司奏琇轉爲太僕自是舉朝莫敢枝梧而素論盡矣珧臨刑稱寃云事在石函可問張華當時皆謂宜爲申理合依鍾毓事例而賈氏待諸楊如讐促行刑者遂斬之時人莫不嗟歎焉濟字文通歴位鎮南征北將軍遷太子太傅濟有才蓺嘗從武帝校獵北芒山下與侍中王濟著布袴褶騎馬執角弓在輦前猛獸突出帝命王濟射之應弦而倒湏㬰復一出濟受詔又射殺之六軍大呌稱快帝重兵官多授貴戚清望濟以武蓺號爲稱職與兄珧深慮盛滿乃與諸甥李斌等共切諌駿斥出王佑爲河東太守建立皇儲皆濟謀也初駿忌大司馬汝南王亮催使之藩濟與斌數諌止之駿遂踈濟濟謂傅咸曰若家兄徵汝南王亮入爲大司馬退身避之門户乃得免耳不爾行當赤族咸曰但徵還共崇至公便立太平無爲避也夫人臣不可有專豈獨外戚今宗室疎因外戚之親以得安外戚危倚宗室之重以爲援所謂唇齒相依計之善者濟益懼而問石崇曰人心云何崇曰賢兄執政疎外宗室宜與四海共之濟曰見兄可及此崇見駿及焉駿不納後與諸兄俱見害難𤼵之夕東宫召濟濟謂裴楷曰吾將何之楷曰子爲保傅當至東宫濟好施乆典兵馬所從四百餘人皆秦中壯士射則命中皆欲救濟濟已入宫莫不歎恨通志卷一百二十一下
