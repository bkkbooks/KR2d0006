body:
  text: 通志卷八十四上宋右廸功郎鄭樵漁仲撰宗室傳第七上後魏上谷公紇羅弟建公子題建徳嬰文題子悉陸真定侯武陵侯因長樂王夀樂望都公頽曲陽侯素延順陽公郁辰宜都王目六脩吉陽男比干江夏王吕髙涼王孤子斤真斤子真樂樂子禮洪禮子那弟那子紇子紇子大曹鷙大曹從兄子威禮陵陵瓌瓌子鷙子大器萇孤孫度子子華度子乙斤思乙斤子平子華弟子萇弟珍平子萇生平弟長長生子天穆天穆子儼西河公敦司徒石武衞將軍謂子烏真興烏真子興都都子丕淮陵侯大頭河間公齊子陵陵弟蘭蘭子志扶風公處真文安公泥子屈渾屈子磨昭成九子寔君秦王翰子衞王儀幹儀子纂禎纂弟良儀良弟幹子禎子瑞弟烈子烈子道子晏道子子洛洛乞乞子烈弟觚夀鳩子常山王遵遵子素昭素子陵陪陵弟陪斤忠陪斤子昭子昭子元弟紹斤弟忠子盛盛懋最懋子陟子陟弟順弟順子偉子盛弟秉子秉子秉從毗忠徳徳悝悝嶷悝弟暉弟暉子弼子弼弟子士將子徳弟贊贊淑淑季海季海亨紇根子陳留王䖍子悦翌悦弟崇暉崇子建肅建子琛仁琛子翌子暉子肅弟器兄建弟子祚崙䖍顗顗子地干子毗陵王順力真子遼西公意烈子抜干子抜干曽孫洪超渾意烈弟勃勃粟粟弟渾弟庫汗窟咄道武七王清河王紹陽平王熙熙子佗夀佗曾孫世遵智佗孫法法夀子慶僧法夀弟法僧隆法子景仲景河南王曜子提原提子平原平子和和弟鑒河間王脩長樂王處文廣平王連繼子渾渾子霄京兆王黎子吐根舒吐根子繼义繼子义羅义子舒子善住弟羅弟爽𤓰爽弟蠻羅蠻弟繼弟侯眀元六王樂平戻王丕子拔安定殤王彌樂安王範子良永昌王健子仁建寧王崇子麗新興王俊太武五王晉王伏羅東平王翰子道符臨淮宣王譚子提昌提子昌子彧昌弟孚彧弟孝友孚子端廣陽簡王建子嘉深嘉子深子湛湛湛弟謹子法輪南安隐王余景穆十二王陽平幽王新成子頤暢頤弟衍衍衍子暢欽暢子敏弟融弟欽子子孝京兆康王子推子太興仲太興孫悰暹太興子仲景景弟暹子沖太興弟遥遥弟恒濟隂惠王小新成子欝業欝子弼弟弼子暉暉業昭業撫欝弟偃麗偃子誕顯誕子偃弟麗子和汝隂靈王天賜子逞逞子慶和則逞弟汎子則子文都汎弟修義矩修義子均弟均則弟矩弟雅雅褒樂良厲王萬夀子樂平長樂平子長命命子忠廣平殤王洛侯繼子匡任城康王雲子澄朗澄子彛紀彛庶兄順順子順弟澄弟嵩嵩子世雋南安惠王楨子英弟怡英子熙怡子肅熙弟略廣英肅弟長王􅁮爾朱氏所立者也城陽康王長夀子鸞徽鸞子章武敬王太洛繼子彬是彬子融帝融子朗為後廢樂陵康王胡兒子思譽略思譽子景安定靖王休子爕景爕子超夀超弟琰願琰子景山山子成燮弟平文成五王安樂厲王長樂子詮弟詮子鑒鑒斌之廣川莊王略子諧齊郡順王簡子祐河間孝王若繼子琛安豐匡王猛子延眀獻文六王咸陽王禧子通煜翼樹昌坦趙郡靈王幹子謐兄諶謐諶弟譚讞譚弟廣陵慧王羽子恭是為節閔帝恭兄欣髙陽文穆王雍子泰斌泰子彭城武宣王勰子劭帝劭弟攸是為孝莊劭子韶北海王詳子顥瑱顥弟孝文六王廢太子庶人恂京兆王愉子寳月為寳月弟寳矩是文帝清河文獻王懌子亶為亶子善見是孝静帝廣平文穆王懐子誨第三子修是為孝武帝汝南文宣王悦子潁皇子恌上谷公紇羅神元皇帝之曾孫也初從道武皇帝自獨孤如賀蘭部與弟建勸賀蘭訥推道武為主及道武即帝位以援立功與建同日賜爵為公卒子題賜爵襄城公後進為王擊慕容驎於義臺中流矢薨子悉襲降爵為襄城公卒贈襄城王神元後又有建徳公嬰文真定侯陸並仕太武特獲封爵武陵侯因長樂王夀樂並章帝之後也因從道武平中原以功封曲逆侯太武時改爵武陵夀樂位選部尚書南安王改封長樂王文成即位夀樂有援立功拜太宰大都督中外諸軍録尚書事後矜功與尚書令長孫渴侯爭權並伏法望都公頽昭帝之後也随道武平中原賜爵望都侯太武以頽美儀容進止可觀使迎左昭儀於蠕蠕進爵為公卒曲陽侯素延順陽公郁宜都王目辰並桓帝之後也素延以小統從道武征討諸部初定并州為刺史道武之警於柏肆也并州守將封竇真為逆素延斬之時道武欲撫悦新附悔參合之誅而素延殺戮過多坐免官中山平拜幽州刺史豪奢放逸左遷上谷太守後賜爵曲陽侯道武留心黄老欲以純厚風化雖乘輿服御皆去雕飾素延奢侈過度帝深銜之積其過徵至賜死郁少忠正允直文成時位殿中尚書賜爵順陽公文成崩乙渾專權郁從順徳門入欲誅渾渾窘怖遂奉獻文臨朝以免後復謀殺渾為渾所誅獻文録郁忠正追贈順陽王諡曰簡目辰文成即位歴侍中尚書左僕射封南平公乙渾謀亂目辰與順陽公謀殺之事發目辰逃免獻文傳位有定䇿勲孝文即位進爵宜都王除雍州刺史鎮長安有罪伏法爵除六修穆帝長子也少凶悖穆帝五年遣六脩與輔相衞雄范班及姬澹等救劉琨帝躬統大兵為後繼劉粲懼突圍而走殺傷甚衆帝因大獵夀陽山陳閲皮肉山為變赤穆帝少子比延有寵欲以為後命六修出居新平城而黜其母六修有駿馬日行五百里穆帝欲取以給比延後六修來朝穆帝又命拜比延六修不從穆帝乃坐比延於已所乘歩輦使人𨗳從出遊六修望見以為穆帝謁伏於路左及至乃知為比延慙怒而去穆帝怒伐之帝軍不利六脩殺比延帝易服㣲行人間有賤婦人識帝帝遂暴崩桓帝子普根先守于外聞難來赴滅之吉陽男比干江夏公吕並道武族弟也比干以司衞監討白澗丁零有功賜爵吉陽男後為南道都將戰沒吕以軍功封江夏公位外都大官大見尊重卒贈江夏王陪𦵏金陵髙涼王孤平文皇帝之第四子也多才藝有志略烈帝之前元年國有内難昭成為任子於襄國後烈帝臨崩顧命迎立昭成及崩羣臣咸以新有大故昭成來未可果宜立長君次弟屈剛猛多變不如孤之寛和柔順於是大人梁蓋等殺屈共推孤孤不肯乃自詣鄴奉迎昭成請身為留質石虎義而從之昭成即位乃分國半部以與之薨子斤失職懐怒構寔君為逆死於長安事在寔君傳道武時以孤勲髙追封髙涼王諡曰神武斤子真樂頻有戰功後襲祖封眀元初改封平陽王薨子禮襲本爵髙涼王薨諡懿王子那襲爵拜中都大官驍猛善攻戰正平初坐事伏法獻文即位追那功命子紇紹封薨子大曹性愿直孝文時諸王非道武子孫者皆降爵為公以大曹先世讓國功重髙祖真樂勲著前朝改封太原郡公卒無子國除宣武又以大曹從兄子洪威紹封洪威恭謙好學為潁川太守有政績孝静初在潁川聚衆應西魏齊神武遣將討平之禮弟陵太武賜爵襄邑男進爵為子卒子瓌位柔逺鎮司馬瓌子鷙字孔雀孝文末以軍功賜爵晉陽男鷙先與爾朱榮善武泰初榮至河隂殺戮朝士鷙時與榮共登髙塚俯而觀之自後彌相結納永安初封華山王莊帝既殺榮榮從子兆為亂帝欲率諸軍親討而鷙復隂與兆通乃勸帝曰黄河萬仭寧可卒度帝遂自安及兆入殿鷙又約止衞兵君亡國破皆鷙之由孝静初入為大司馬加侍中鷙容貎魁壯腰帶十圍有武藝木訥少言性方厚每直省闥雖暑月不解衣冠甞在侍中髙岳席咸陽王坦恃力使酒衆皆下之坦謂鷙曰孔雀老武官何因得王鷙答曰斬反人元禧首是以得之衆皆失色鷙怡然如故興和三年薨贈假黄鉞尚書令司徒公子大器襲爵後與元瑾謀害齊文襄見害孤孫度道武初賜爵松滋侯位比部尚書卒子乙斤襲爵襄陽侯獻文崇舊齒拜外都大官甚優重卒子平字楚國襲世爵松滋侯以軍功賜艾陵男卒子萇孝文時襲爵松滋侯例降侯賜艾陵伯萇性剛毅雖有吉慶事未甞開口而笑孝文遷都萇以代尹留鎮除懐朔鎮都大將因别賜萇酒雖拜飲而顔色不泰帝曰聞公一生不笑今方與卿逺隔山岳當為朕笑竟不能得帝曰五行之氣偏有所不入六合之間亦何事不有左右見者無不把腕大笑宣武時為北中郎將帶河内太守萇以河橋船絙路狹不便行旅又秋水汎漲年常破壊乃為船路遂廣容車從京出者率令輸石一雙累以為岸由是來往便利近橋諸郡無復勞擾公私賴之㦄位度支尚書侍中雍州刺史卒諡曰成萇子子華字伏榮襲爵孝莊初除齊州刺史先是州境數經反逆邢杲之亂人不自保子華撫集豪右委之管鑰衆皆感悦境内帖然而性甚褊急當其急也口不擇言手自捶擊長史鄭子湛子華親友也遭其侮罵遂即去之子華雖自悔厲終不能改在官不為矯潔之行凡有饋贈者辭多受少故人不厭其取鞫獄訊囚務加仁恕齊人樹碑頌徳後除濟州刺史爾朱兆之入洛也齊州城人趙洛周逐刺史丹陽王蕭贊表濟南太守房士達攝行州事洛周子元顯先随子華在濟州邀路改表請子華復為齊州刺史朝命從之子華性至孝母房氏甞宴飲親戚家夜還大吐人以為毒母甚憂懼子華掬其吐盡噉之母心遂安尋以母憂還都孝静初除南兖州刺史弟子思通使闗西朝廷使右將軍郭瓊收之子思謂令僕曰速可見殺何為久執國士子華謂子思曰由汝麤疎令我如此以頭叩牀涕泣不自勝子思以手捋鬚顧謂子華曰君惡體氣尋與子思俱賜死於門下外省子思字衆念性剛暴恒以忠烈自許元天穆當朝權以親從薦為御史中尉先是兼尚書僕射元順奏以尚書百揆之本至於公事不應送名御史至子思奏曰案御史令云中尉督司百寮書侍御史紏察禁内又云中尉出行車輻前驅除道一里王公百辟避路時經四帝前後中尉二十許人奉以周旋未甞暫廢府寺䑓省並從此令唯肅宗之世為臨洮舉哀故兼尚書左僕射臣順不肯與名又不送簿故中尉臣酈道元舉而奏之而順復啓云尚書百揆之本令僕納言之貴不宜下隸中尉送名御史尋亦䝉勅聼如其奏從此迄今使無凖一臣初上䑓具見其事意欲申請決議但以權兼未宜便爾日復一日遂歴炎涼去月朔旦䑓移尚書索應朝名帳而省稽留不送尋復移催主吏忽為尚書郎中裴獻伯後注云案舊事御史中尉逄省郎於複道中尉下車執版郎中車上舉手禮之以此而言明非敵體臣既見此深為怪愕循省二三未解所以正謂都省别被新式改易髙祖舊命即遣移問事何所依又獲尚書中郎王元旭報出蔡氏漢官儀似非穿鑿始知裴王規壊典謨心欲自矯臣案漢書宣秉傳云詔徵秉為御史中丞與司隸校尉尚書令俱會殿庭並專席而坐京兆號之為三獨坐又尋魏書崔琰傳晉文陽傅嘏傳皆云既為中丞百寮震悚以此而言則中丞不揖省郎蓋已久矣憲臺不屬都坐亦非今日又尋職令云朝㑹失時即加彈糾則百官簿帳應送尚臺灼然明矣又皇太子以下違犯憲制皆得糾察則令僕朝名宜付御史又亦彰矣茍不付名否臧何騐臣順專執未為平通先朝曲遂豈是正法謹案尚書郎中臣裴獻伯王元旭等望班士流早參清官輕弄短札斐然若斯茍執異端忽焉至此此而不綱將隳朝令請以見事免獻伯等所居官付法科處尚書納言之本令僕百揆之要同彼浮虚助兹乖失宜明首從節級其罪詔曰國異政不可據之古事付司檢髙祖舊格推處得失以聞尋從子思奏仍為元天穆所忿遂停元顯之敗封安定縣子孝靜時位侍中而死萇弟珍字金省襲封艾陵男宣武時曲事高肇遂為帝寵昵彭城王勰之死珍率壯士害之後卒於尚書左僕射平弟長生位遊擊將軍卒孝荘時以子天穆貴盛贈司空天穆性和厚美形貎射有能名六鎮之亂尚書令李崇廣陽王深北討天穆以太尉使勞諸軍路出秀容見爾朱榮深相結託約為兄弟未㡬改授别將赴秀容遂為榮腹心除并州刺史及榮赴洛天穆參其始謀莊帝踐祚除太尉封上黨王徵赴京師後増封通前三萬户尋監國史録尚書事開府世襲并州刺史初杜洛周鮮于修禮等為寇瀛冀諸州人多避亂南向幽州前北平府主簿河間邢杲擁率部曲屯據鄚城以拒洛周葛榮垂將三載及廣陽王深等敗後杲南度居青州北海界靈太后詔流人所在皆置本屬郡縣選豪右為守令以鎮撫之時青州刺史元世雋表置新安郡以杲為太守未報會臺申汰簡所授郡縣以杲從子子瑶資䕃居前乃授河間太守杲深恥恨於是遂反所在流人先為土人陵忽聞杲起逆率來從之旬朔之間衆踰十萬先是河南人常笑河北人好食榆葉故齊人號之為􅞌榆賊杲東掠光州盡海而還又破都督李叔仁軍詔天穆與齊神武徃討大破之杲乃請降傳送京師斬之時元顥乘虚䧟洛陽天穆聞莊帝北廵自畢公壘北度㑹車駕於河内爾朱榮以天時炎熱欲還師天穆苦執不可榮乃從之莊帝還宫加太宰羽葆鼓吹増邑通前七萬户天穆以疎屬本無徳望憑藉爾朱爵位隆極王公以下每旦盈門受納財貨珍寳充積而寛柔容物不甚見忌於時莊帝以其榮黨外示優寵詔天穆乘車出入大司馬門天穆與榮相倚榮常以兄禮事之世隆等雖榮子姪位遇已重天穆或言其失榮即加杖其相親任如此莊帝内畏忌之與榮同時見誅節閔初贈丞相柱國大將軍雍州刺史假黄鉞諡曰武昭子儼襲美才貎位都官尚書及齊受禪聞勅召詐病遂怖而卒西河公敦平文帝之曾孫也道武初從征每居諸將後及從征中山所向無前明元時拜中都大官太武時進爵西河公寵遇彌篤卒子撥襲司徒石平文帝之元孫也有膽略從太武南討至𤓰歩山位尚書令雍州刺史歴比部侍郎華州刺史武衞將軍謂烈帝之第四子也寛雅有將略甞從道武征討有功除武衞將軍子烏真膂力絶人隨道武征伐亦屢有功官至鉅鹿太守卒子興都聰敏剛毅文成時為河間太守賜爵樂城子為政嚴猛百姓憚之獻文初以子丕貴重進爵樂城侯謝老歸家帝賜几杖服物致膳於第其妻婁氏為東陽王太妃卒贈定州刺史河間公諡曰宣子提襲父侯爵提弟丕太武時拜羽林中郎從駕臨江賜爵興平子獻文即位累遷侍中丞相乙渾謀反丕以奏聞詔率元賀等誅之遷尚書令改封東陽公孝文時封東陽王拜侍中司徒公時有諸疑事三百餘條命丕制決率皆平允丕子超生車駕親幸其第詔丕入八議蠲其同籍丁口雜使役調求受復除尋遷太尉録尚書事時淮南王佗淮陽王尉元河東王茍頽並以舊老見禮每有大事引入禁中乘歩挽杖于朝進退相隨丕佗元三人皆容貎壯偉腰帶十圍大耳秀眉鬚鬢班白百僚觀矚莫不祇聳唯茍頽少為短劣姿望亦不逮之孝文文明太后重年敬舊存問周渥賜以珍寳丕聲氣髙朗博記國事饗醼之際常居端坐必抗首大言叙列既往成敗帝后敬納焉然謟事要人驕侮輕賤每見王叡苻承祖嘗傾身下之時文明太后為王叡造宅故亦為丕造甲第一區又使王叡賜丕金印一紐及丕妻段氏卒賜諡恭妃凡此皆曲媚權幸所致時論少之後例降王爵封平陽郡公求致仕詔不許車駕南伐丕與廣陵王羽留守京師並加使持節及帝還代詔丕等以遷洛之事令與羣臣各陳可否燕州刺史穆羆進曰今北有玁狁南有荆揚西有吐谷渾東有高句驪四方未賔九區未一臣愚以為未可且涿鹿之野黄帝是都古先聖王不必悉居中原也帝曰卿言海宇未混此論粗可黄帝始居朔易其後亦遷河南卿當未要其終邪丕曰遷都大事當訊之卜筮審定臧否而後行帝曰昔周公召公卜宅洛邑乃識至兆今無斯人卜亦何益且卜者所以决疑不疑何卜昔軒轅請卜兆而龜焦以問天老老以為善遂用其言終致蕃昌然則至人之量未然審於龜矣丕等不能復有辯論惟云當禀成算不敢有異帝又詔羣臣曰卿等或以朕無為移徙也王者以四海為家或南或北何恒之有朕之逺祖世居北荒平文始居東木根山昭成更營居盛樂太祖道武皇帝遷居平城朕幸屬勝殘之運故移宅中原肇成皇宇卿等當奉先帝令徳光述洪規北人比及十年使其徐移朕自多積倉儲不令窘乏時前懐州刺史青龍前秦州刺史吕受恩等猶固執以為不便帝皆與之抗議使至屈服而罷帝又將北廵丕遷太傅録尚書事頻奏固讓詔斷表啓即家拜授仍詔留守代郡凡在代之事一以委之丕雅愛本風不達新式至於變俗遷洛改官制服禁絶舊言皆所不願孝文知其如此亦不逼之但誘示大理令其不生同異至於衣冕巳行朱服列位而丕猶常服列在坐隅晩乃稍加弁帶而不能修飾容儀帝以丕年衰體重亦不彊責及罷降非道武子孫及異姓王者雖駮於公爵而利享封邑亦不樂帝南征丕表乞少留聖思更圗後舉會司徒馮熙薨詔六軍反斾丕又以熙死于代表求鑾駕親臨詔曰今洛邑肇構跂望成勞開闢暨今豈有以天子之重逺赴舅國之喪朕縱欲為孝其如大孝何縱欲為義其如大義何天下至重君臣道懸豈宜茍相誘引䧟君於不徳令僕以下可赴法官貶之又詔以丕為都督領并州刺史後以平陽畿甸改封丕新興郡公初丕以李沖徳望所屬欲託其子超為超娶其兄女丕前妻子隆同産數人皆别居後得宫人所生子皆同宅共産父子恩愛有虧為物議所鄙丕父子俱不樂南遷帝之發平城也太子恂留於舊京及恂將還洛隆及弟超與穆泰等密謀留恂舉兵斷闗隴據涇北時丕以老居并州雖不預其始計而隆超咸以告丕丕外慮不成口雖致難心頗然之事發帝幸平城推穆泰等罪而隆超兄弟實參首謀帝令丕隨駕每至測問必令丕坐觀有司奏丕當與其子連坐詔以丕誠黨逆但先既許以不死之詔聼免死為民其後妻二子聼隨隆超母弟及餘庶兄弟皆徙敦煌丕時年垂八十猶自平城力載隨駕至洛留洛陽帝每遣左右慰勉之乃還晉陽孝文崩丕自并來赴宣武引見之以丕舊老禮有加焉勅留洛陽後宴于華林都亭特令二子扶侍坐起丕仕歴六世位極公輔而還為庶人然猶心戀京邑而不能自絶於人事詔以丕為三老景明四年薨年八十二詔贈左光禄大夫冀州刺史諡曰平長子隆先以反誅隆弟乙升超亦同誅超弟儁邕並以軍功封儁封新安縣男邕封涇縣男淮陵侯大頭烈帝之曾孫也善騎射擢為内三郎文成初褒封淮陵侯性謹密帝甚重之位寧北將軍卒贈高平公諡曰烈河間公齊烈帝之元孫也少雄桀魁岸太武征赫連昌太武馬蹶賊逼帝齊以身蔽捍決死力戰賊乃退帝得上馬是日㣲齊帝幾殆帝又以㣲服入其城齊固諌不聼乃與數人從帝入城城内既覺諸門悉閉帝及齊等因入其宫中得婦人裙繫之槊上帝乘而上得㧞齊有力焉賜爵浮陽侯從征和龍以功拜尚書進爵為公後與新興王俊討秃髪保周坐事免官爵宋將裴方明䧟仇池太武復授齊前將軍與建興公古弼討之遂克仇池威振羌氐復賜爵河間公與武都王楊保宗對鎮駱谷時保宗弟文徳説保宗閉險自固有期矣秦州主簿邊因知之密告齊齊晨詣保宗呼曰古弼至欲宣詔保宗出齊叱左右扶保宗上馬馳驛送䑓諸氐遂推文徳為主求援於宋宋遣將房亮之苻昭啖龍等率衆助文徳齊擊斬殺龍禽亮之氐遂平以功拜内都大官卒諡敬王長子陵襲爵陵性抗直天安初為乙渾所害陵弟蘭以忠謹見寵孝文初賜爵建陽子卒於武川鎮將子志字猛略少清辯彊幹歴覽書傳頗有文才為洛陽令不避彊禦與御史中尉李彪爭路俱入見面陳得失彪言御史中尉辟承華蓋駐論道鼓劔安有洛陽令與臣抗衡志言神鄉縣主普天之下誰不編户豈有俯同衆官趨避中尉孝文曰洛陽朕之豐沛自應分路揚鑣自今以後可分路而行及出與彪折尺量道各取其半帝謂邢巒曰此兒竟可所謂王孫公子不鏤自雕巒曰露竹霜條故多勁節非鸞則鳯其在本枝也員外郎馮俊昭儀之弟恃勢恣撾所部里正志令主吏收繫處刑除官由此忤㫖左遷太尉主簿俄為從事中郎車駕南征帝㣲服觀戰所有箭欲犯帝志以身鄣之帝危得免矢中志目因喪一明以志行恒州事宣武時除荆州刺史還朝御史中尉王顯奏志抑買良人為婢等事會赦免明帝初兼廷尉卿後除揚州刺史賜爵建忠伯志之威名雖減李宗亦為荆楚所憚尋為雍州刺史晩年耽好聲伎在揚州日侍側將百人器服珍麗冠於一時及在雍州逾尚華侈聚歛無極聲名遂損及莫折念生反詔志為西征都督討之念生遣其弟天生屯隴口與志相持志為賊所乘遂棄大衆奔還岐州賊遂攻城岐州刺史裴芬之疑城人與賊潛通將盡出之志不聼城人果開門引賊鎻志及芬之送念生見害節閔初贈尚書僕射太保扶風公處真烈帝之後也少以壯烈聞位殿中尚書賜爵扶風公委以大政甚見尊禮吐京胡曹僕渾等叛招引朔方人為援處真與高涼王那等討滅之性貪婪在軍暴掠坐事伏法文安公泥魏之踈族也性忠直有智畫道武厚遇之賜爵文安公拜安東將軍卒子屈襲爵明元時居門下出納詔命性明敏善奏事每合上㫖賜爵元城侯加功勞將軍與南平公長孫嵩白馬侯崔宏等並決獄訟明元東廵命屈行右丞相山陽侯奚斤行左丞相並掌軍國甚有聲譽後吐京胡與離石胡等叛置立將校外引赫連屈丐屈督㑹稽侯劉絜永安侯魏勤捍之勤沒於陣絜墜馬胡執送屈丐唯屈衆獨存眀元以屈沒失二將欲斬之時并州刺史元六頭荒滛怠事乃赦屈令攝州事屈嗜酒頗廢政事帝積其前後過失檻車徵還斬於市子磨渾少為明元所知元紹之逆也明元潛隠於外磨渾與叔孫詐云眀元所在紹使帳下二人隨磨渾往規為逆害磨渾既得出遂縛帳下詣眀元斬之帝得磨渾大喜因為羽翼以勲賜爵長沙公拜尚書出為定州刺史卒昭成九子昭成皇帝九子庶長曰寔君次曰獻明帝次曰秦王翰次曰閼婆次曰壽鳩次曰紇根次曰地干次曰力真次曰窟咄寔君性愚贛殘忍不仁昭成季年苻堅遣其將行唐公苻洛等來冦南境昭成遣庫仁逆戰於石子嶺昭成時不豫不能親勤衆軍乃率諸部避難隂山度漠北為髙車四面冦抄復度漠南苻洛軍退乃還雲中初昭成以弟孤辭國乃以半部授孤孤卒子斤失職懐怨欲伺隙為亂獻明皇帝及秦王翰皆先終道武年甫五嵗慕容后子閼婆等雖長而國統未定斤因是說寔君曰帝將立慕容氏子明當除汝頃令諸子戎服夜持兵仗旋汝所居伺便將發耳時苻洛軍猶在君子津諸皇子夜皆挾仗廵警彷徨廬舍之間寔君偵察以斤言為信乃率其屬盡害諸皇子昭成亦暴崩其夜諸皇子婦及宫人奔告苻洛軍堅將李柔張蚝勒兵内逼部衆離散苻堅聞之召燕鳯問其故以狀對堅曰天下之惡一也乃執寔君及斤轘於長安西市寔君孫勿期位定州刺史賜爵林慮侯卒子六狀真定侯秦王翰少有高氣年十五便請征伐昭成壯之使領騎二千長統兵號令嚴信多有克㨗建國十五年卒道武即位追贈秦王諡曰明子儀長七尺五寸容貎甚偉美鬚髯有算略少能舞劒騎射絶人道武幸賀蘭部侍從出入登國初賜爵九原公從破諸部有功及帝將圗慕容垂遣儀觀釁垂謂儀曰吾威加四海卿主不自見吾而遣使人毋乃有失歟儀對曰魏氏世據北方綿歴年祀子孫立功中原晉人王我代地燕代與國由來久矣與國而行人將命其間於故事無失且燕若不能以親仁善隣而命使臣乃欲以兵威相加此乃本朝將帥之事非臣之所知也垂壯其對而禮之儀還報曰燕未可圗垂死乃可帝問其故儀曰垂年已邁其子寳懦而無斷慕容徳自負才氣非弱主之臣釁將内起我姑待之帝以為然改封平原公道武征衞辰儀出别道獲衞辰尸傳首行宫帝大喜徙封東平公命督屯田於河北自五原至稒陽塞外均分農稼大得人心慕容寳之寇五原儀躡據朔方要其還路及并州平儀功居多遷尚書令從圍中山尋遷都督中外諸軍事左丞相進封衞王中山平復遣儀討鄴平之道武將還代都置中山行臺詔儀守尚書令以鎮之逺近懐附尋徵儀以丞相入輔又從征髙車儀别從西北破其别部又從討姚平有功賜以絹布綿牛馬羊等儀膂力絶人弓力將十石時陳留王䖍矟大稱異故世相傳云衞王弓桓王矟上谷侯岌張衮代郡許謙等有名于時皆言儀有不世之略道武以儀器望待之尤重數幸其第如家人禮儀由是矜功恃寵遂與宜都公穆崇伏甲謀亂崇子逐留在伏士中道武召之將有所使逐留聞召疑事發踰墻告狀帝祕而恕之天賜六年天文多變占云當有逆臣伏尸流血帝惡之頗殺公卿欲以厭當天灾儀内不自安單騎遁走帝使人追執之遂賜死𦵏以百姓禮儀十五子纂五嵗道武命養于宫中恩與諸皇子同太武踐阼除定州刺史封中山公進爵為王纂好酒愛佞政以賄成太武殺其親嬖人後悔過修謹拜内大將軍居官清約簡慎更稱亷平纂於宗屬最長宗室有事咸就諮焉薨諡曰簡纂弟良性忠篤明元追録儀功封南陽王以紹儀後良弟幹善弓馬以騎從眀元於白登之東北有䨇鴟飛鳴於上帝命左右射之莫能中鴟遊飛稍髙幹以二箭下䨇鴟帝賜之御馬弓矢金帶各一以旌其能軍中於是號幹為射鴟都將從太武南廵進爵新蔡公文成即位拜都官尚書卒諡曰昭子禎膽氣過人太武時為司衞監從征蠕蠕忽遇賊别部多少不敵禎乃就山解鞍放馬以示有伏賊果疑而避之孝文初賜爵沛郡公後拜南豫州刺史大胡山蠻毎抄掠州界前後牧守多羈縻之禎乃召新蔡襄城蠻酋使之觀射先選左右能射者二十餘人以一死囚參其間禎先發數矢皆中以次命左右射無不破的次至囚囚不能中禎即命斬之蠻酋服技畏威相視股慄又預取死囚十人皆著蠻衣置諸界上禎對蠻酋偽舉目瞻天曰風氣少惡會有鈔賊入境不過十人當在西南五十里許即命騎追掩果縛送十人禎告諸蠻曰此軰合死與不蠻等皆叩頭曰合萬死禎即斬之因慰喻遣還自是境無暴掠淮南人相率投附者三千餘家置之城東汝水之側命曰歸義坊初豫州土豪胡邱生數與外交通及禎為刺史邱生甞有犯因圗為不軌詐向城人云刺史欲遷城中大家向代因與共謀翻城城人石道起密告禎勸禎速掩邱生并諸預謀者禎曰吾不負人人何負我但為邱生誑誤耳若即收掩衆必大懼吾靜以待之不久自當悔服語未訖而城中三百人自縛詣州門陳邱生譎誑之罪而邱生單騎遁去禎恕而不問後徵為都牧尚書卒贈侍中儀同三司諡曰簡公有八子第五子瑞母尹氏生而有異因命之曰瑞字天賜位至大中大夫卒贈太常卿儀弟烈剛武有智略元紹之逆百僚莫敢有聲惟烈出詣紹詐與相附募執明元紹信之自延秋門出遂迎立明元以功進爵隂平王薨諡曰喜子求襲求弟道子位下大夫道子子洛位羽林幢將洛子乞中散大夫乞子晏孝靜初累遷吏部尚書平心不撓時論稱之出為瀛州刺史頗有聲稱蔣天樂之逆見引詔録送定州賜死晏好集圗籍家書多於祕閣諸有假借咸不逆其意亦以此見稱烈弟觚勇烈有膽氣少與兄儀從道武侍衞左右使於慕容垂垂末年政在羣下遂止觚以求賂道武絶之觚率左右馳還為垂子寳所執垂待之甚厚因留心學業誦讀經書數十萬言垂國人咸親重之道武之討中山慕容普驎遂害觚以固衆心帝聞之哀慟及平中山發普驎冢斬其尸收議害觚者傅髙霸程同等斬之皆夷五族乃𦵏觚追諡秦愍王封子䕫為豫章王以紹觚常山王遵壽鳩之子也少而壯勇不拘小節道武初有佐命勲賜爵洛陽公慕容寳之敗也别率騎數百邀其歸路由是有參合之㨗及平中山拜尚書左僕射加侍中領渤海之合口及博陵渤海羣盜起遵討平之遷幽州牧封常山王遵好酒色天賜四年坐醉亂失禮於太原公主賜死𦵏以百姓禮子素明元從母所生特見親寵太武初復襲爵休屠郁原等叛素討之斬其渠率徙千餘家於涿鹿之陽立平原郡以處之及平統萬以素有威懐之略拜假節征西大將軍以鎮之後拜内都大官文成即位務從寛政罷諸雜調有司奏國用不足固請復之唯素曰臣聞百姓不足君孰與足帝善而從之素宗屬之懿又年老帝毎引入訪以政事固辭疾歸第雅性方正居官五十載終始若一時論賢之薨諡曰康陪𦵏金陵配饗廟廷長子悉可陵年十七從太武獵逐一猛獸陵遂空手搏之以獻帝曰汝才力絶人當為國立功立事勿如此也即拜内行阿干又從平涼州沮渠茂䖍令一驍將與陵相擊兩槊皆折陵抽箭射之墜馬陵恐其救至未及㧞劒以刀子戾其頸使身首異處帝壯之即日拜都幢將封暨陽子卒于中軍都將弟陪斤襲爵坐事國除陪斤子昭小字阿倪尚書張彞引兼殿中郎孝文將為齊郡王蘭舉哀而昭乃作宫懸帝大怒詔曰阿倪愚騃誰引為郎於是黜彞白衣守尚書昭遂停廢宣武時昭從弟暉親寵用事稍遷左丞宣武崩于忠執政昭為黄門郎又曲事之忠專權擅威枉䧟忠賢多昭所指𨗳也靈太后臨朝為尚書河南尹聾而狠戾理務峭急所在患之尋出為雍州刺史在州貪虐大為人害後入為尚書謟事劉騰進號征西將軍卒贈尚書左僕射其家納賄元义故䘏典優越子元字彦道以節儉知名孝莊時為洛陽令及節閔即位元上表乞𦵏莊帝時議善之後除尚書左丞孝武即位以孫騰為左僕射騰即齊神武之黨以膂仗入省元依法舉劾當時咸為元懼孝武重其彊正封臨淄縣子及從入闗封陳郡王授儀同三司加開府薨諡曰平昭弟紹字醜倫少聰慧遷尚書右丞紹斷決不避彊禦宣武詔令檢趙修獄紹以脩佞幸即杖殺之帝責紹不重聞紹曰脩姦佞甚於董賢臣若不因釁除之恐陛下復罹哀帝之謗帝以其言正不之罪焉及出廣陵王懐拜紹賀曰阿翁皇家正直雖朱雲汲黯何以仰過紹曰猶恨戮之稍晩耳卒於涼州刺史陪斤弟忠字仙徳以忠謹聞孝文時累遷右僕射賜爵城陽公加侍中鎮西將軍太和四年病篤辭退養疾於髙桞輿駕親送於都門之外卒諡曰宣子盛字始興襲爵位謁者僕射卒子懋字伯邕襲爵降為侯從駕入闗封北平王薨贈尚書左僕射諡曰貞慧子陟字景升位開府儀同三司陟弟順字敬叔射有能名孝武於洛陽華林園戲射以銀酒巵容二升許縣百歩外命工射者十餘人共射中者賜之順發矢即中帝大悦并賜金帛以旌之從帝入闗封濮陽王位侍中及孝武崩祕未發喪諸人多舉廣平王為嗣順於别室泣涕謂周文曰廣平雖親年徳並茂不宜居大寳周文深然之因宣國諱上南陽王尊號以順為中尉行雍州刺史又加開府儀同三司秦州刺史卒子偉字猷道有清才大統十六年封南安郡王及尉遲迥伐蜀以偉為司録書檄文言皆偉所為六官建拜師氏下大夫改淮南縣公周眀帝初拜師氏中大夫受詔於騏驎殿刋正經籍建徳中累遷小司寇為使主報聘於齊是秋武帝親戎東討偉遂為齊所留齊平見釋加受上開府後除襄州刺史位大將軍卒偉性温柔好虛靜篤學愛文初自鄴歸庾信贈其詩云梁亡垂棘反齊平寳鼎歸其為辭人所重如此盛弟秉字壽興少聰慧好學宣武初為徐州刺史在官貪虐失人心其從兄侍中暉深害其能因譖之於帝詔尚書崔亮馳馹檢覈亮受暉㫖到州取他寡婦楚掠令其自誣謂秉壓已為婢秉終恐不免乃令其外弟中兵參軍薛修義將車十乘運麥經其所禁之旁秉因踰牆出赴脩義脩義以大木函盛秉加麥其上載之而出遂至河東匿脩義家逄赦乃出見帝自陳為暉所譖帝亦更無所責初秉為中庶子時王顯在東宫㣲賤秉嘗以公事杖之及顯有寵為御史中尉奏秉誹謗朝廷罪至不敬後因帝極飲無所覺悟重奏秉前事處之大辟命帝注可帝既大醉書字皆半不成當時見者皆知非帝本心然憚顯等無敢申救及行刑日顯自往視之秉命筆自誌墓曰洛陽男子姓元名秉有道無時其年不永餘文多不載顧謂其子曰可置紙筆吾棺中我將訟顯於地下若髙祖之靈有知百日内必當取顯如遂無知亦何足戀未幾宣武崩顯尋被殺靈太后臨朝三公郎中崔鴻上疏理秉詔書追雪贈豫州刺史諡曰莊子最字幹從孝武入闗封樂平王位侍中兼尚書左僕射加特進秉弟益生少亡子毘字休弼孝武之在藩邸毎親之及即位出必陪乘入侍卧内及帝與齊神武有隙時議各有異同或勸天子入夷或言與神武決戰或言奔梁唯毘數人以闗中帝王桑梓固請西入及䇿功論賞毘與領軍斛斯椿等十三人為首毘封魏郡王時王者邑止千户唯毘一邑千五百户齊神武宣告闗東云將天子西入事起元毘雖百赦不在原限薨諡曰景子綽嗣忠弟徳封河東公卒於鎮南將軍贈曹州刺史徳子悝潁川太守卒於光州刺史諡曰恭子嶷字子仲孝武初授兖州刺史于時城人王奉伯等相扇謀逆嶷棄城出走懸門發斷嶷要而出詔齊州刺史尉景本州刺史蔡儁各部在州士往討之嶷返復任封濮陽縣伯孝靜時轉尚書令攝選部嶷雖居重任隨時而已薨於瀛州刺史贈司徒公諡曰靖懿悝弟暉字景襲少沈敏頗渉文史宣武即位為給事黄門侍郎初孝文遷洛舊貴皆難移時欲和衆情遂許冬則居南夏但居北宣武頗惑左右之言外人遂有還北之問至乃牓賣田宅不安其居暉乃請閒言事具奏所聞曰先皇移都以百姓戀土故發冬夏二居之詔權寧物意耳乃是當時之言先皇深意且比來遷人安居嵗久公私計立無復還情伏願陛下終髙祖既定之業勿信邪臣不然之説帝納之再遷侍中領右衞將軍雖無補益深被親寵凡在禁中要密之事暉别奉㫖藏之於櫃唯暉入乃開其餘侍中黄門莫有知者侍中盧昶亦䝉恩眄故時人號曰餓彪將軍飢鷹侍中遷吏部尚書納貨用官皆有定價大郡二千匹次郡一千匹下郡五百匹其餘官職各有差天下號曰市曹出為冀州刺史下車之日連車載物發信都至湯隂間首尾相屬道路不斷其車少脂角即於道上所逄之牛生截取角以充其用暉檢括丁户聼其歸首出調絹五萬疋然聚斂無極百姓患之眀帝初徵拜尚書左僕射詔攝吏部選事後詔暉與任城王澄東平王匡共決門下大事暉又上書論政要三事其一言御史之職務在得賢不拘階秩宜久於事責其成功其二請嚴勅邊將不得妄收降附輙遣援接以啓釁隙其三欲檢括河北逃散户口毋令損耗不已帝納之暉雅好文學招集儒士崔鴻等撰録百家要事以類相從名為科録凡二百七十巻上起伏羲迄於晉凡十四代暉疾篤表上之卒賜東園祕器贈使持節都督中外諸軍事司空公諡曰文憲將𦵏給羽葆班劒鼓吹二十人羽林百二十人子弼字宗輔性和厚美容儀以莊帝舅子壻特封廣川縣子天平初累遷尚書令弼妺為神武所納以親情見委禮遇特隆歴中書監録尚書事位特進宗師齊受禪除左光禄大夫天保三年卒十年諸子與諸元同誅死弼弟子士將有巧思齊武成時位將作大匠徳弟贊頗有名譽好陳軍國事宜孝文初置司州以贊為刺史賜爵上谷侯欲使贊治畿甸故賜名曰贊詔贊乘歩挽入殿門加太子太師遷左僕射孝文遷洛諸公多異同唯贊贊成大事後帝毎南伐輙執贊手寄以大事卒贈衞將軍僕射如故仍進封晉陽縣伯贊弟淑字買仁彎弓三百斤善騎射孝文時為河東太守河東俗多商賈罕事農桑淑下車勸課躬往教示二年間家給人足後卒於平城鎮將諡曰靜有子七人季海字元泉兄弟中最有名譽位洛州刺史季海妻司空李沖之女莊帝從母也賜爵唐郡君以政在爾朱禍難方始勸季海為外官以避纎介及孝莊之難季海果以在藩得免從孝武入闗封馮翊王位中書令雍州刺史遷司空病薨諡曰穆子亨字徳良一名孝才遇周齊分隔時年數嵗與母李氏在洛陽齊神武以亨父在闗中禁錮之其母屢訴凍餓得就食湯隂託大豪李長壽􅂝亨及孤姪數人得至長安周文以功臣子甚禮之大統末襲爵馮翊王累遷勲州刺史改封平涼王周受禪例降為公隋文帝受禪自洛州刺史徵拜太常卿尋出為衞州刺史在職八年風化大洽以老病乞骸骨吏民詣闕上表請留上嗟嘆久之其年亨以疾篤重請還京上令使者致醫藥問動靜相望於道卒于官諡曰宣陳留王䖍紇根之子也登國初賜爵陳留公與衞王儀破黜弗部後衞辰慕容寳來寇䖍絶其右翼寳敗垂憤恚自來桑乾䖍勇而輕敵於陣戰沒䖍姿氣魁傑武力絶倫毎以矟細短乃大作之猶患其輕復綴鈴於刃下其弓力倍加常人以其殊異代京武庫常存而志之䖍嘗以矟刺人遂貫而髙舉又嘗以一手頓矟於地馳馬偽退敵人爭取引不能出䖍引弓而射之一箭殺二三人揺矟之徒亡魂而散徐乃令人取矟而去每從征討及為偏將嘗先登䧟陣勇冠當時敵無衆寡莫敢抗其前者及薨舉國悲歎為之流涕道武追惜傷慟者數焉追諡陳留桓王配享廟庭封其子悦為朱提王悦外和内狠道武嘗以桓王死王事特加親寵為左將軍襲封後為宗師悦恃寵驕矜每謂所親王洛生之徒言曰一旦宫車晏駕吾止避髯公除此誰在吾前衞王儀美髯為内外所重悦故云初姚興之贖狄伯支悦送之路由鴈門悦因背誘姦豪以取其意後遇事譴逃亡投鴈門規收豪桀欲圖不軌為土人所執送帝恕而不罪眀元即位引悦入侍悦言於帝曰京師雜人不可保信宜誅其非類者冀以激變因而為亂又懐其私忿云鴈門人多詐可并誅之帝不從悦内自疑懼懐刀入侍謀為大逆衞將軍叔孫俊見其舉動有異竊視其懐有刀執之遂賜死悦弟崇太武詔令襲桓王爵崇性沈厚初衞王死後道武敦宗親之義詔引諸王子弟入宴常山王素等三十餘人咸謂當與衞王相坐疑懼皆出逃遁將奔蠕蠕唯崇獨至道武見之甚悦厚加禮賜遂寵敬之素等於是亦安久之拜并州刺史有政績從征蠕蠕别督軍出大澤越涿邪山威懾漠北薨諡景王子建襲以罪降爵為公位鎮北將軍懐荒鎮大將卒建子琛位恒肆二州刺史琛子翌為尚書左僕射翌子暉字叔平鬚眉如畫進止可觀好渉獵書記少有美名周文禮之命與諸子游處情契甚厚再遷武伯下大夫奉使突厥可汗悦之遣其名王隨暉貢獻方物拜儀同三司周武帝聘突厥女為后令暉致禮授開府轉司憲大夫及平闗東使暉安集河北封義寧子隋文帝總百揆加上開府進爵為公開皇初拜都官尚書兼領太僕奉詔決杜陽水灌三畤原溉舄鹵之地數千頃人賴其利再遷兵部尚書監漕渠之役未幾坐事免頃之拜魏州刺史頗有惠政後以疾去職卒于京師諡曰元子肅嗣位光禄少卿肅弟仁器性眀敏位日南郡丞建弟嫡子祚字龍夀初建以罪失王爵祚欲求本封有司執不許聼祚襲公卒於河州刺史節閔時贈侍中尚書僕射䖍兄顗性嚴重少言道武敬之雅有謀策從平中山以功賜爵蒲城侯特見寵厚給鼓吹羽儀禮同岳牧顗莅政以威信著稱居官七年乃以元易于代顗為郡時易于子萬言得寵於道武易于以子故忽顗不告其狀輕騎卒至排顗墜牀而據其坐顗不知其代己也謂以罪見捕既而知之耻為所侮謂易于曰我更滿被代常也汝無禮見辱何邪遂搏而殺之以狀聞道武壯之萬言累以訴乃詔顗輸贖顗歸罪有司道武赦之復免其贖病卒子崙太武時襲父爵以功除統萬鎮將後從永昌王仁南征别岀汝隂濟淮宋將劉康祖屯於慰武亭師人患之崙曰今大風既勁若令人推草車方軌而進乘風縱火以精兵自後乘之破之必矣從之斬康祖傳首行宫文成即位除秦州刺史進爵隴西公卒諡曰定子琛襲毗陵王順地干之子也性䟱狠登國初賜爵南安公及道武討中山留順守京師柏肆之敗軍人有亡歸者言大軍奔散不知帝所在順聞之欲自立納莫題諌而止時賀力眷等聚衆作亂於隂館順討之不克乃徙留宫自白登南入繁畤故城阻灅水為固以寧人心道武善之進封毗陵王位司隸校尉道武好黄老數召諸王及朝臣親為説之在坐莫不祗肅唯順獨坐寐不顧而唾帝怒廢之以王薨於家遼西公意烈力真之子也先沒於慕容垂道武征中山意烈迎於井陘及平中原有戰獲勲賜爵遼西公除廣平太守時和䟦為鄴行臺意烈性雄耿自以帝屬耻居跋下遂隂結徒黨將襲鄴發覺賜死子拔干博知古今道武以拔干宗親不念父惡委之心腹有計略屢効忠勤眀元踐阼除渤海太守吏民樂之賜爵武遂子轉平原鎮將得將士心卒諡靈公子受洛襲進爵武邑公卒子叱奴位武川鎮將叱奴子洪超頗有學渉大乗賊亂之後詔洪超持節兼黄門侍郎綏慰冀部還言冀土寛廣界去州六七百里負海險逺宜分置一州鎮遏海曲其後遂立滄州如洪超所言卒於北軍將光禄大夫意烈弟勃善射御以勲賜爵彭城公卒長子粟襲太武時督諸軍屯漠南後征和龍以功進爵為王薨粟弟渾少善弓馬太武嘉之及為都官尚書頗以驕縱為失坐事免徙長社為人所害子庫汗為羽林中郎將從北廵有起乘輿前令庫汗射之應弦而斃太武悦賜一金以旌其能文成起景穆廟賜爵陽豐侯獻文即位復造文成廟拜殿中給事進爵為公庫汗眀於斷決每奉使察行州鎮折獄以情所歴皆稱之秦州父老詣闕乞庫汗為刺史者前後千餘人朝廷許之未及遣遇病卒子古辰襲窟咄昭成崩後苻洛以其年長逼徙長安苻堅禮之教以書學堅國亂随慕容永東遷永以為新興太守劉顯之敗遣弟亢埿等迎窟咄遂逼南界於是諸部騷動道武左右干桓等謀應之有單烏于者預其謀以告帝帝慮駭人心沈吟未發後三日桓以謀白其舅穆崇崇又告之帝乃誅桓等五人餘莫題等七姓悉原不問帝慮内難乃北踰隂山幸賀蘭部遣安同及長孫漫徵兵於慕容垂漫亡奔窟咄安同間行遂達中山慕容垂遣子賀驎將歩騎六千以随之安同與垂使人蘭紇俱還達牛川窟咄兄子意烈捍之安同乃匿於商人橐中至暮得入空井乃免仍奔賀驎軍軍既不至而稍前逼賀染干染干隂懐異端乃為窟咄來侵北部人皆驚駭莫有固志於是北部大人叔孫普洛節及諸烏丸亡奔衞辰賀驎聞之遽遣安同朱譚等來告衆知賀驎軍近乃稍定道武自弩山幸牛川窟咄進屯髙栁道武復使安同詣賀驎因剋會期安同還帝踰參合出代北與賀驎會於髙栁窟咄窮逼望旗奔走遂為衞辰殺之帝悉收其衆賀驎還歸中山道武七王道武皇帝十男宣穆劉后生眀元皇帝賀夫人生清河王紹大王夫人生平陽王熙王夫人生河南王曜河間王脩長樂王處文二王母氏闕叚夫人生廣平王連京兆王黎皇子渾及聰母氏並闕皆早薨無傳清河王紹字受洛拔天興六年封性兇悖好劫剥行人斫射犬豖以為笑樂有孕婦紹剖觀其胎道武甞怒之倒懸於井中垂死乃出眀元甞以義方訓之由此不協而紹母賀夫人有譴帝將殺之會日暮未決賀氏密告急於紹紹乃與帳下及宦者數人踰宫犯禁而入帝驚起求弓刀不及遂暴崩眀日宫門日中不開紹稱詔召百寮於西宫端門前北面紹從門扉間謂曰我有父亦有兄公卿欲從誰也王公以下皆失色莫有對者良久南平公長孫嵩曰臣等不審登遐狀唯隂平公元烈哭泣而去於是朝野兇兇人懐異志肥如侯賀䕶舉燧於安陽城北故賀蘭部人皆往歸之其餘舊部亦率子弟招集故人往往相聚紹聞人情不安乃出布帛班賜王公以下先是眀元在外聞變乃還潛于山中使人夜告北新侯安同衆皆響應衞士執送紹於眀元眀元遂賜紹母子死誅帳下閹宦宫人為内應者十數人其先犯乘輿者羣臣於城南都街生臠食之紹時年十六紹母即獻眀皇后妹也美而艶道武甞如賀蘭部見而悦之告獻眀皇后請納焉后曰不可此過美不善且已有夫帝密令人殺其夫而納之生紹終致大逆焉陽平王熙天興六年封聰達有雅操眀元練兵於東部詔熙督十二軍校閲甚得軍儀賞賜隆厚泰恒六年薨帝哀慟不已長子佗襲爵佗性忠厚武藝無過者後改封淮南王鎮虎牢威名甚著孝文時位司徒賜安車几杖入朝不趨太和十二年薨時孝文有事太廟始薦聞之廢祭輿駕親臨哀慟禮賵有加諡曰靖王世子吐万早卒子僖王顯襲祖爵薨子世遵襲孝眀時為荆州刺史州居邊境前代以來互相抄掠世遵到州不聼侵擾其弟均時在荆州為朝陽戌主有南戌主妻以三月三日遊戲沔水側均輙遣部曲掠取世遵聞之責均遂移還本戌吳人感之其後頗行貨賄散費邊儲望實頗損薨於定州刺史諡曰康王吐万弟鍾葵早卒長子法夀累遷安州刺史法夀先令所親㣲服入境觀察風俗下車便大行賞罸於是境内肅然後於河隂遇害子慶智性貪鄙為太尉主簿事無大小得物然後判或十數錢或二十錢得便取之府中號為十錢主簿法夀弟法僧位益州刺史殺戮自任威怒無恒王賈諸姓州内人士法僧皆召為卒伍無所假縱於是合境皆反招引外寇後拜徐州刺史法僧本附元义以驕恣故恐禍及己將謀為逆時領主書兼舍人張文伯奉使徐州法僧謂曰我欲與卿去危就安能從我乎文伯曰安能棄孝義而從叛逆也法僧將殺之文伯罵曰僕寧死見文陵松栢不能生作背國之虜法僧殺之孝昌元年法僧殺行臺高諒反於彭城自稱尊號改元天啓大軍致討法僧奔梁其文武三千餘人戌彭城者法僧皆印額為奴逼將南度梁武帝授法僧司空封始安郡王尋改封宋王甚見優寵又進位為太尉仍立為魏主不行授開府儀同三司郢州刺史仍徵為太尉卒於梁諡曰襄厲王子景仲景隆景隆初封丹陽公位廣州刺史徙徐州改封彭城王丁父憂襲封宋王又為廣州刺史卒梁復以景仲為廣州刺史封枝江縣公侯景作亂遣人誘召之許奉為主景仲將應之為西江督䕶陳霸先所攻乃縊死河南王曜天興六年封曜武藝絶人與陽平王熙等並督諸軍講武衆咸服其勇薨長子提襲驍烈有父風改封潁川王遣迎昭儀於塞北時年十六有夙成之量殊域敬焉後改封武昌王累遷統萬鎮將甚見寵待薨諡曰成王長子平原襲平原忠果有智略為齊州刺史善於綏撫孝文時妖賊司馬小君自稱晉後屯聚平陸年號聖君平原身自討擊禽小君送京師斬之又有祅人劉舉自稱天子復討斬之時嵗頻不登齊人饑饉平原以私米三千餘斛為粥以全人命北州戌卒千餘人還者皆給路糧百姓稱詠之遷征南大將軍開府雍州刺史鎮長安薨諡曰簡王長子和字善意襲爵初和聘乙氏公主女為妃生子顯薄之以公主故不得遣出因忿遂自落髪為沙門既不得其母乃舍顯以爵讓其次弟鑒鑒固辭公主以其外孫不得襲爵訴於孝文孝文詔鑒終之後令顯襲爵鑒乃受之鑒字紹逺沈重少言寛和好士為齊州刺史時革變之始鑒到官遵孝文之㫖採齊俗之舊軌制粲然齊人愛詠咸曰耳目更新孝文崩後和罷沙門歸俗棄故妻子納寡婦曹氏為妻曹氏年長大和十五嵗携男女五人随鑒至歴城干亂政事和與曹及五子七處受納鑒皆順適其意獄以賄成齊人苦之鑒名大損轉徐州刺史屬徐兖大水人多飢餓鑒表加賑恤人賴以濟先是京兆王愉為徐州王既年少長史盧陽烏寛以御下郡縣多不奉法鑒至表梁郡太守程靈虬殘虐詔免靈虬於是徐境肅然薨諡悼王鑒薨和與鑒子伯崇競求承襲詔聼和襲爵位東郡太守先是郡人孫天恩家饒於財甞與和争地遣奴客毆和垂死至是和誣天恩與北賊交通父子兄弟一時俱戮田宅金寳皆沒縣官天恩宗從欲詣闕訴寃以和元义之親不敢告列和語其郡人曰我覔一州亦應可得念此小人痛入骨髄故乞此郡以報夙昔此後更不希富貴識者知其必沒於此既而果薨贈相州刺史河間王脩天賜四年封薨無子太武詔河南王曜子羯兒襲改封略陽王正平初有罪賜死爵除長樂王處文天賜四年封處文聰辯夙成年十四薨眀元悼傷之屢親臨哀慟陪𦵏金陵無子爵除廣平王連天賜四年封薨無子太武以陽平王熙第二子渾為南平王以繼連後渾好弓馬射鳥輙歴飛而中之日射得五十頭太武甞命左右分射勝者中的籌滿詔渾解之三發皆中帝大悦器其藝能常引侍左右累遷涼州鎮將都督西戎諸軍事領䕶西域校尉恩著涼土更滿還京父老皆涕泣追送薨子飛襲飛後賜名霄身長九尺腰帶十圍容貎魁偉雅有風則貞白卓然好直言正諌朝臣憚之孝文特垂欽重除宗正卿詔曰自今奏事諸臣相稱可云姓名唯南平王一人可直言其封遷左光禄大夫薨賜東園第一祕器孝文緦縗臨霄喪宴不舉樂諡曰安王子纂襲京兆王黎天賜四年封薨子吐根襲改封江陽王薨無子獻文以南平王霄第二子繼為後繼字世仁襲封江陽王宣武時為青州刺史為家僮取人女為婦妾又以良人為婢為御史所彈坐免官爵繼子义先納靈太后妹太后臨朝復繼本封復徙封京兆王歴司徒加侍中繼自孝文時已歴顯要及是入居心膂歴轉台司既而頻表遜位復轉太保未㡬轉太傅侍中皆如故义時執生殺之權繼拜受之日賀者傾朝有識為之致懼後除使持節侍中太師大將軍録尚書事大都督節度西道諸軍事率諸將西討就徳興出師之日車駕臨餞百官祖送尋加太尉公及班師啓求還復封江陽詔從之繼晩更貪婪牧守令長新除赴官無不招納賄貨以相付託妻子各别請屬至乃郡縣㣲吏亦不獲平心選舉法官以义故不敢糾擿天下患之义以物議不止遂黜繼廢於家初爾朱榮之為直寢數以名馬奉义义接以恩意榮甚徳之建義初復以繼為太師司州牧永安二年薨贈假黄鉞都督九州諸軍事録尚書事大丞相如故諡曰武烈义字伯雋小字夜义靈太后以义妹夫除通直郎义妻封新平君後遷馮翊君拜女侍中义累加侍中領軍將軍既在門下兼總禁兵深為靈太后所信委太傅清河王懌以親賢輔政每欲斥黜之义遂令通直郎宋凖告司染都尉韓文殊欲謀逆立懌懌坐禁止後窮按無實懌雖得免猶以兵衞守於宫西别館久之义恐懌終為己害乃與侍中劉騰密謀詐令主食中黄門胡度胡定列辭誣懌云貨度等金帛令以毒藥置御食中害帝騰以具奏眀帝信之乃御顯陽殿騰閉永巷門靈太后不得出懌入遇义於含章殿後义命宗士及直齋執懌將入含章東省騰稱詔集公卿議當懌大逆羣臣畏义無敢異者唯僕射游肇眀其不然义騰持公卿議入奏夜中殺懌於是矯為靈太后辭讓詔义遂與太師髙陽王雍等輔政嘗直禁中眀帝呼為姨夫义處之無愧帝後徙居徽音殿义亦入居殿右其出入常令武士持刀劔以相先後又於千秋門外厰下施木欄檻時或止息其間置腹心防守以備竊發復作别室禁中掌握之寳充牣其内其始專政也猶矯情待物及其得志遽自驕愎耽酒好色諸姑姊妹朋滛無别嘗卧婦人於食轝以帊覆之輿入禁内出亦如之直衞雖知無敢言者政以賄成官由賂進朝綱解弛州鎮多非其人天下由是亂矣义自知不法恐被廢黜乃隂遣其從弟洪業召武州人姬庫根等與之盟欲令為亂冀朝廷以己為將往伐因相與表裏可以自立根等然其言乃厚遺根等遣還州與洪業買馬太后自劉騰死後防衞㣲緩义頗亦自寛時宿於外每日出游留連他宅太后㣲察知之正光五年秋太后對眀帝謂羣臣求出家於嵩山閑居寺欲自下髪帝與羣臣大懼叩頭泣涕遂與太后密謀圖之帝後對义流涕叙太后欲削髪事义乃勸帝順適太后意於是太后數御顯陽殿二宫無復禁礙义舉其親元法僧為徐州刺史法僧據州叛靈太后數以為言义深悔愧丞相髙陽王雍雖位重於义而甚憚义會太后與帝游洛水遂幸雍第定圖义之計後雍從帝朝太后乃進言义父子權重太后曰然元郎若忠於朝廷何不去領軍以餘官輔政义聞之甚懼免冠求解乃以為儀同三司尚書令侍中領左右义雖去兵權然總任内外不慮廢黜時又有閹人張景嵩劉思逸屯𢎞昶伏景皆惡义景嵩以帝嬪潘外憐有幸説嬪云义欲害之嬪泣訴於帝云义非直欲殺妾亦將害陛下帝信之後义出宿遂解其侍中旦欲入宫門者不納尋除名初咸陽王禧以逆見誅其子樹奔梁及元法僧之叛樹自梁遺公卿百僚書暴义過惡言义本名夜义弟羅實名羅刹夜义羅刹此鬼食人非遇黒風事同飄堕嗚呼魏境離此二灾惡木盜泉不息不飲勝母梟稱不入不為况昆季此名表能噬物日露久矣始信斯言义為逺近所惡如此其後靈太后顧謂侍臣曰劉騰元义昔邀朕索鐵劵望得不死朕賴不與中書舍人韓子順對曰臣聞殺活豈計與否陛下昔雖不與何解今日不殺靈太后憮然未㡬有人告义及其弟𤓰謀反先遣元洪業率六鎮降户反定州又令勾魯陽諸蠻侵擾伊闕义兄弟為内應起有日矣靈太后以妹婿故未忍便決羣臣固執不已眀帝又以為言太后乃從之於是义及弟並賜死於家太后猶以妹故復追贈尚書令冀州刺史义子舒祕書郎义死後亡奔梁官至征北大將軍青冀二州刺史子善亦名善住少随父至江南性好學通渉五經尤眀左氏傳侯景之亂善歸周武帝甚禮之以為太子宫尹賜爵江陽縣公每執經以授太子隋開皇初拜内史侍郎凡有敷奏辭氣抑揚觀者屬目陳使袁雅來聘上令善就館受書雅出門不拜善論舊事有拜之儀雅未能對遂拜成禮而去後遷國子祭酒上嘗親臨釋奠令善講孝經敷陳義理兼之以諫上大悦曰聞江陽之説更起朕心賚布一百疋衣一襲善之通博在何妥之下然以風流醖籍為後進所歸妥每懐不平心欲屈善因講春秋初發題諸儒畢集善私謂妥曰名望已定幸無相苦妥然之及就講肆妥遂引古今滯義以難善多不能對二人由是有隙善以髙熲有宰相之具甞言於上曰楊素麄䟱蘇威怯愞元胄元旻正似鴨耳可以付社稷者唯獨髙熲上初然之及熲得罪上以善為熲游説深責望之善憂懼先患消渇於是病頓而卒义弟羅字仲綱雖父兄貴盛而虛已接物累遷青州刺史义專政羅望傾四海於時才名之士王元景邢子才李奬等咸為其賔客從游青土罷州入為宗正卿义死羅通其妻時人穢之或云其救命之計也孝武時位尚書令開府儀同三司梁州刺史孝静初梁遣將圍逼羅以州降封南郡王及侯景僭立以羅為開府儀同三司尚書令改封江陽王梁元帝滅景周文作相遣人求羅遂得還除開府儀同三司侍中少卿襲爵江陽王舒子善住後從南入闗羅乃以爵還善住改封羅為固道郡公羅弟爽字景哲少而機警位給事黄門侍郎金紫光禄大夫卒諡曰懿爽弟蠻仕齊歴位兼度支尚書行潁州事坐不為繼母服為左丞所彈後除開府儀同三司齊天保十年大誅元氏孝昭后蠻之女也為苦請自市追免之賜姓歩孤氏卒賜司空蠻弟𤓰字景邕位給事中與兄义同被誅繼弟羅侯遷洛之際以墳陵在北遂家於燕州之昌平郡内豐資産唯以得意為適不入京師有賔客往來者必厚相禮遺豪據北方甚有聲稱以义執權尤不樂入仕就拜昌平太守眀元六王眀元皇帝七男杜密皇后生太武皇帝大慕容夫人生樂平戾王丕安定殤王彌闕母氏慕容夫人生樂安宣王範尹夫人生永昌莊王健建寧王崇新興王俊二王並闕母氏樂平王丕少有才幹泰恒七年封拜車騎大將軍後督河西髙平諸軍討南秦王楊難當軍至略陽禁令齊肅所過無私百姓争致牛酒難當懼還仇池丕綏懐初附民悉向化初馮𢎞之奔髙麗太武詔髙麗遣送之髙麗不從太武怒將討之丕上疏以為和龍新定宜復之使廣脩農殖以饒軍實然後進圖可一舉而滅帝納之乃止後坐劉絜事以憂薨事在絜傳諡曰戾王子拔襲爵後坐事賜死國除丕之薨及日者董道秀之死也髙允遂著筮論曰昔眀元末起白臺其髙二十餘丈樂平王嘗夢登其上四望無所見以問日者董道秀道秀筮之曰大吉王黙而有喜色後事發王遂憂死而道秀棄市使道秀若推六爻以對王曰易稱亢龍有悔窮髙曰亢髙而無民不為善也夫如是則上寧於王下保於已福禄方至豈有禍哉今舍於本而從其末咎釁之至不亦宜乎定安王彌泰恒七年封薨諡曰殤王無子國除樂安王範泰恒七年封範雅性沈厚太武以長安形勝之地乃拜範為衞將軍開府儀同三司長安鎮都大將時秦土新離寇賊流亡者相繼範寛徭息役與民休息百姓頼之後劉絜之亂範聞而不告事發因疾暴薨長子良太武未有子親撫養之長而壯勇多知嘗參軍國大計文成時襲王拜長安鎮都大將雍州刺史入為内都大官薨諡曰簡王永昌王健泰恒七年封健姿貎魁壯所在征戰常有大功才藝比陳留桓王而智略過之從太武破赫連昌遂西略至木根上討和龍健别攻拔建徳後平叛胡白龍餘黨于西海太武襲蠕蠕越涿邪山詔健殿後矢不虛發所中皆應弦而斃威震漠北尋從平涼州健功居多又討破秃髪保周保周自殺傳首京師復降沮渠無諱薨諡曰莊王子仁襲仁亦驍勇有父風太武竒之後與濮陽王閭著謀為不軌事覺賜死國除建寧王崇泰恒七年封文成時封崇子麗濟南王後與京兆王杜元寳謀逆父子並賜死新興王俊泰恒七年封少善騎射多材藝坐法削爵為公俊好酒色多越法度又以母先遇罪死而已被貶削恒懐怨望頗有悖亂心後事發賜死國除太武五王太武皇帝十一男賀皇后生景穆帝越椒房生晉王伏羅舒椒房生東平王翰弗椒房生臨淮王譚伏椒房生廣陽王建閭石昭儀生吳王余其小兒猫兒真彪頭龍頭並闕母氏皆早薨無傳晉王伏羅真君三年封加車騎大將軍後督髙平涼州諸軍討吐谷渾慕利延軍至樂都謂諸將曰若從正道恐軍聲先振必當逺遁潛軍出其不意此鄧艾禽蜀之計也諸將咸難之伏羅曰夫將軍制勝萬里擇利專之可也遂間道行至大母橋慕利延衆驚奔白蘭慕利延子拾寅走阿曲降其一萬餘部落八年薨無子國除東平王翰真君三年封秦王拜侍中中軍大將軍參典都曹事忠貞雅正百僚憚之後鎮枹罕羌戎敬服改封東平王太武崩諸大臣等議欲立翰而中常侍宗愛與翰不協矯太后令立南安王余遂殺翰子道苻襲爵拜長安鎮都大將皇興元年謀反司馬段太陽斬之傳首京師臨淮王譚真君三年封燕王拜侍中參典都曹事後改封臨淮王薨諡宣王子提襲為梁州刺史以貪縱削除加罰徒配北鎮久之提子員外郎潁免冠請解所居官代父邊戌孝文不許後詔提從駕南伐至洛陽參定遷都之議尋卒以預參遷都功追封長鄉縣侯宣武時贈雍州刺史諡曰懿提子昌字法顯好文學居父母喪哀號孺慕悲感行人宣武時復封臨淮王未拜而薨贈齊州刺史諡曰康王追改封濟南王子彧字文若紹封彧少有才學侍中崔光見而謂人曰黑頭三公當此人也少與從兄安豐王延眀中山王熙並以宗室博古文學齊名時人莫能定其優劣尚書郎范陽盧道將謂吏部清河崔休曰三人才學雖並優美然安豐少於造次中山皂白太多未若濟南風流寛雅時人為之語曰三王楚琳琅未若濟南備員方彧姿制閑裕吐發流靡琅邪王誦有名人也見之未甞不心醉忘疲甞奏郊廟歌詞時稱其美除給事黄門侍郎彧本名亮字仕眀時侍中穆紹與彧同署避紹父諱啓求改名詔曰仕眀風神運吐嘗自比荀文若可名彧以取定體相倫之美彧求復本封詔許復封臨淮寄食相州魏郡又長兼御史中尉彧以為倫叙得之不謝領軍于忠忿言之朝廷曰臨淮雖復風流可觀而無骨鯁之操中尉之任恐非所堪彧遂去威儀單車而還朝流為之嘆息累遷侍中衞將軍左光禄大夫兼尚書左僕射攝選後以本官為東道行臺會爾朱榮入洛殺害元氏彧撫膺慟哭遂奔梁梁武遣其舍人陳建孫迎接并觀彧為人建孫稱彧風神閑儁梁武亦先聞名深相器待見彧於樂游園因設宴樂彧聞聲歔欷涕淚交下梁武為之不樂自前後奔叛皆候㫖稱魏為偽唯彧表啓甞云魏臨淮王梁武體彧雅性不以為責及知莊帝踐阼彧以母老請還辭㫖懇切梁武惜其人才又難違其意遣其僕射徐勉私勸彧留彧曰死猶願北况於生也梁武乃以禮遣彧性至孝自經違離不進酒肉容貌憔悴見者傷之歴位尚書令大司馬兼録尚書莊帝追崇武宣王為文穆皇帝廟號肅祖母李妃為文穆皇后將遷神主於太廟以孝文為伯考彧表諌以為漢祖創業香街有太上之廟光武中興南頓立舂陵之寢元帝之於光武疏為絶服猶尚身奉子道入繼太宗高祖之於聖躬親實猶子陛下既纂洪緒豈宜加伯考之名且漢宣之繼孝昭斯乃上後叔祖豈忘宗承考妣蓋以大義斯奪及金徳將興宣王受寄景王意在毁冕文王心規裂冠雖祭則魏主而權歸晉室昆季之興寔傾曹氏且子元宣王之家允文王成其大業故晉武繼文祖宣而景有伯考之稱以今類古恐或非儔髙祖徳溢寰中道超無外肅祖雖勲格宇宙猶曾奉贄稱臣穆后稟徳坤元復將配享乾位此乃君臣並筵嫂叔同室歴觀墳籍未有其事時莊帝意鋭朝廷無敢言者唯彧與吏部尚書李神儁並有表聞詔報曰漢高不因𤓰瓞之緒光武又無世及之徳皆身受符命不由父祖故太上南頓别廟異寢於理何差朕承文穆皇帝下武遂主神器與高光異若以昔况今不當移寢則魏太祖晉景帝雖王跡已顯皆以人臣而終豈得與餘帝别廟有闕倫序漢宣之父亦非勲徳所出雖不追尊不亦可乎伯考之名自是尊卑之稱何必凖古而言非類也復云君臣同列嫂叔共室當以文穆皇帝昔遂臣道以此為疑禮天子元子猶士禘祫豈不得同室乎且晉文景共為一代議者云世限七主無定數昭穆既同眀有共室之理禮既有祔嫂叔何嫌禮太祖禰一廟豈無婦舅共室也若專以共室為疑容可更議遷毁莊帝既逼諸妹之請此詞意黄門侍郎常景中書侍郎邢子才所贊成也又追尊兄彭城王為孝宣帝彧又面諌曰陛下作而不法後世何觀歴觀載籍未有其事帝不從及神主入廟復勅百官悉陪從一依乘輿之式彧上表以為爰自中古迄於下葉崇尚君親褒眀功懿乃自皇號終無帝名今若去帝直留皇名求之古義少有依凖又不納爾朱榮死除彧司徒公及爾朱兆衆奄至出東掖門為賊所獲見兆辭色不屈為羣胡所毆薨孝武帝末贈大將軍太師太尉公録尚書事諡曰文穆彧美風韻善進止衣冠之下雅有容則博覧羣書不為章句所制文藻雖多亡失猶有傳於世者然居官不能清白所進舉止於親婭為識者所譏無子弟孝友少有時譽襲爵淮陽王累遷滄州刺史為政温和好行小惠不能清白而無所侵犯百姓亦以此便之孝友眀於政理嘗奏表曰令制百家為黨族二十家為閭五家為比鄰百家之内有帥二十五徵發皆免苦樂不均羊少狼多復有蠶食此之為弊久矣京邑諸坊或七八百家唯一里正二史庶事無闕而况外州乎請依舊置三正之名不改而於百家為四閭閭二比計族少十二丁得十二疋貲絹略計見管之户應二萬餘族一嵗出貲絹二十四萬疋十五丁出一番兵計得一萬六千兵此富國安民之道也又言古諸侯一取九女士有一妻二妾晉令諸王置妾八人郡君侯妾六人官品令第一第二品有四妾第三第四有三妾第五第六有二妾第七第八有一妾所以隂教聿脩繼嗣有廣廣繼嗣孝也脩隂教禮也而聖朝忽棄此數由來漸久將相多尚公主王侯例娶后族故無姬媵習以為常舉朝略是無妾天下殆皆一妻婦人多幸生逢今世在家則父母教之以妬既嫁則姑姊勸之以忌以制夫為婦徳以專寵為婦功夫妬忌之心生則妻妾之禮廢妻妾之禮廢則姦滛之兆興斯實有闗於風教者也請以王公第一品娶八通妻以備九女稱事二品備七三品四品備五五品六品則一妻二妾限以一周悉令充數若不充數及待妾非禮使妻妬加捶撻免所居官其妻無子而不娶妾斯則自絶無以血食祖父請科不孝之罪離遣其妻臣今冒申妻妾之數非惟上合禮經亦欲使王侯將相功臣子弟苖允滿朝傳祚於無窮也詔付有司議多不同又言今人生為皁隸𦵏擬王侯盛飾祭儀崇壯邱隴隣里相榮稱為至孝又夫婦之始王化所先共食合瓢足以成禮而今之富者彌奢同牢之設累魚為山山有林木鸞鳯斯存暴殄天物無益於理請自兹以後如婚𦵏踰制者以違㫖論官司不加糾劾即與同罪孝友在尹積平以法自守甚著聲稱然性無骨鯁承事權勢為正直者所譏齊天保初凖例降爵封臨淮縣公拜光禄大夫二年冬被詔入晉陽宫出與元暉業同被害昌弟孚字秀和少有令譽侍中游肇并州刺史髙聰司徒崔光等見孚咸曰此子當凖的人物恨吾徒衰暮不及見耳累遷兼尚書右丞靈太后臨朝宦者干政孚乃總括古今名妃賢后凡為四巻奏之遷左丞蠕蠕主阿那瓌既得反國其人大飢相率入塞阿那瓌上表請臺振給詔孚為北道行臺詣彼振恤孚陳便宜表曰皮服之人未甞粒食宜從俗因利拯其所無昔漢建武中單于欵塞時轉江東米糒二萬五千斛牛羊三萬六千頭以給之斯則前代和戎撫新柔逺之長策也乞以牸牛産羊餬其口命且畜牧繁息是其所便毛血之利惠兼衣食又尚書奏云如其仍住七州随寛置之臣謂人情戀本寧肯徙内若依臣請給振雜畜愛本重鄉必還舊土如其不然禁留益損假令逼徙事非久計何者人各其心去留難測既易水草痾恙將多憂愁致困死亡必甚兼其餘類尚在沙磧脱出狂悖翻歸舊巢必殘掠邑里遺毒百姓亂而方塞未若杜其未萌又貿遷起於上古交易行於中世漢與北通亦立闗市今北人阻飢命懸溝壑公給之外必求市易彼若願求宜見聼許又云營大者不計小名圖逺者不拘近利雖戎夷衰盛歴代不同叛服之情略可論討周之北伐僅獲中規漢氏外攘裁收下策昔在代京恒為重備將帥勞止甲士疲力計前世苦之力未能致今天祚大魏亂亡在彼朝廷垂天覆之恩廓大造之徳鳩其散亡禮送令反宜因此時善思逺策竊以理雖萬變可以一觀來事雖懸易以往卜昔漢宣之世呼韓款塞漢遣董忠韓昌領邊郡士馬送出朔方因留衞助又光武時亦令中郎將段彬置安集掾史随單于所在參察動静斯皆守吉之元龜安邊之勝策計今朝廷成功不減曩時蠕蠕國敝亦同疇日宜凖昔成謀略依舊事借其閑地聼使田牧粗置官屬示相慰撫嚴戒邊兵以見保衞馭以仁寛縻以久策使親不至矯詐䟱不容叛反今北鎮諸將舊常云一人代外邏因令防察所謂天子有道守在四夷者也又云先人有奪人之心待降如受彊敵武非專外亦以防内若從處分割配諸州鎮遼逺非轉輸可到悔叛之情變起難測又居人畜業布在原野戎夷性貪見利思盜防彼肅此少兵不堪渾流之際易相干犯驅之還本未必樂去配州内徙未必肯從既其如此為費必大朝廷不許孚持白虎蟠勞阿那瓌於柔元懐荒二鎮間阿那瓌衆號三十萬隂有異志遂拘留孚載以輼車日給酪一升肉一叚每集其衆坐孚東廂稱為行臺甚加敬禮阿那瓌遂自南還至舊京後遣孚等還因上表謝罪有司以孚事下廷尉廷尉丞高謙之奏孚辱命處孚流罪後拜冀州刺史孚勸課農桑境内稱為慈父隣州號曰神君先是州人張孟都張洪建馬潘崔獨憐張叔緒崔醜張天宜崔思哲等八人皆屯保林野不臣王命州郡號曰八王孚至皆請入城願致死効力後為葛榮所䧟被執兄祐為防城都督兄子禮為録事參軍榮欲先害子禮孚請先死以贖子禮叩頭流血榮乃捨之又大集將士議其死罪孚兄弟各誣已引過争相為死又孟都等數百人皆叩頭就法請活使君榮曰此魏之誠臣義士也凡同禁五百人皆得免榮卒還除冀州刺史元顥入洛授孚東道行臺彭城郡王孚封顥逆書送朝廷天子嘉之顥卒封孚萬年鄉男永安末樂器殘缺莊帝命孚監儀注孚上表曰昔太和中中書監髙閭太樂令公孫崇脩造金石數十年間乃奏成功時大集儒生考其得失太常卿劉芳請别營造久而方就復召公卿量校合否論者沸騰莫有適從登被㫖勅並見施用往嵗大軍入洛戎馬交馳所有樂器亡失垂盡臣至太樂署問太樂令張乾龜等云承前以來置宫懸四箱栒簴六架東北架編黄鍾之磬十四雖器名黄鍾而聲實夷則考之音制不甚諧韻姑洗懸於東北太蔟編於西北㽔賔列於西南並皆器象差位調律不和又有儀鍾十四簴懸架首初不叩擊今便刪廢以從正則臣今據周禮鳬氏脩廣之規磬氏倨句之法吹律求聲叩鍾求音損除煩雜討論實録依十二月為十二宫各凖辰次當位懸設月聲既備随月擊奏則會還相為宫之義又得律吕相生之體今量鍾磬之數各以十二架為定奏可于時縉紳之士咸往觀聼靡不咨嗟嘆服太傅録尚書事長孫承業妙解音律特復稱善後從孝武帝入闗為尚書左僕射扶風郡王尋監國史歴位司空兼尚書令太保時蠕蠕主與孚相識先請見孚然後遣女於是乃使孚行蠕蠕君臣見孚莫不懽悦奉皇后來歸孚性機辯好酒貎短而秃周文帝偏所眷顧甞於室内置酒十􅒤􅒤餘一斛上皆加帽欲以戲孚孚適入室見即驚喜曰吾兄弟輩甚無禮何為竊入王家匡坐相對宜早還宅也因持酒歸周文撫手大笑後遇風患手足不随口不能言乃左手畫地作字乞解所任三奏不許遷太傅薨帝親臨問百官赴弔贈大司馬録尚書事諡曰文簡子端嗣位大行臺尚書華州刺史性䟱狠頗以基地驕物時論鄙之廣陽王建真君三年封楚王後改封廣陽薨諡曰簡王子石侯襲薨諡曰哀王子遺興襲薨諡曰定王無子石侯弟嘉少沈敏喜愠不形於色兼有武略孝文初拜徐州刺史甚有威惠後封廣陽王以紹建後孝文南伐詔嘉斷均口嘉違失指授令賊得免帝怒責之曰叔祖定非世孫何大不相類也及將大漸遺詔以嘉為尚書左僕射與咸陽王禧等輔政遷司州牧嘉表請於京四面築坊三百二十各周一千二百歩乞發三正復丁以充兹役雖有暫勞姦盜永止詔從之拜衞大將軍尚書令除儀同三司嘉好飲酒或沈醉在宣武前言笑自得無所顧忌帝尊年老常優容之與彭城北海髙陽諸王每入宴集極懽彌夜數加賞賜帝亦時幸其第性好儀飾車服鮮華既居儀同又任端首出入容衞道路榮之後拜司空轉司徒嘉好立功名有益公私多所敷奏帝雅委付之愛敬人物後來才俊未為時知者侍坐之次轉加汲引時人以此稱之薨遺命薄𦵏宣武悼惜之贈侍中太保諡曰懿烈嘉後妃宜都王穆夀孫女司空從妹也聰眀絶人及為嘉妃多所匡贊光益家道子深字智逺襲爵孝眀初拜肆州刺史豫行恩信胡人便之刧盜止息後為恒州刺史在州多受納賄賂私家有馬千匹者必取百匹以為恒累遷殿中尚書未拜坐淫城陽王徽妃于氏為徽表訟詔付丞相髙陽王雍等宗室議決其罪以王還第及沃野鎮人破六韓抜陵反叛臨淮王彧討之失利詔深為北道大都督受尚書令李崇節度時東道都督崔暹敗於白道深等諸軍退還朔州深上書曰邊豎構逆以成紛梗其所由來非一朝也昔文眀皇后以移防為重盛簡親賢擁麾作鎮配以髙門子弟以死防遏不但不廢仕宦至乃偏得復除當時人物忻慕為之及太和初歴僕射李沖當官任事涼州土人悉免厮役豐沛舊門仍防邊戌自非得罪當世莫肯與之為伍鎮驅但為虞候白直一生推遷不過軍主然其往世房分留居京者得上品通官在鎮者便為清途所隔或投彼有北以禦魑魅多復逃亡胡鄉乃峻邊兵之格鎮人浮遊在外皆聼流兵投之於是少年不得從師長者不得遊宦獨為匪人言者流涕自定鼎伊洛邊任益輕惟底滯凡才出為鎮將轉相模習專事聚斂或有諸方奸吏犯罪寇邊為之指蹤過㺯官府政以賄立莫能自改咸言奸吏為此無不切齒增怒又阿那瓌背恩縱掠竊奔命師追之十五萬衆度沙漠不日而還邊人見此援師便自意輕中國尚書令臣崇時即申聞求改鎮為州將允其願抑亦先覺朝廷未許而髙闕戌主率下失和抜陵殺之為逆命攻城掠地所見必誅王師屢北賊黨日盛此段之舉指望銷平其崔暹隻輪不反臣崇與臣逡廵復路今者相與還次雲中馬首是瞻未便西邁將士之情莫不解體今日所慮非止西北將恐諸鎮尋亦如此天下之事何易可量時不納其策及東西部勅勒之叛朝議更思深言遣兼黄門侍郎酈道元為大使欲復鎮為州以順人望會六鎮盡叛不得施行􅅧復上言今六鎮俱叛二部髙車亦同惡黨以疲兵討之不必制敵請簡選兵或留守恒州要處更為後圖及李崇徵還深專戎政抜陵避蠕蠕南移度河先是别將李叔仁以抜陵來逼請求迎援深赴之前後降附二十萬人深與行臺六纂表求恒州北别立郡縣安置降户随宜振賚息其亂心不從詔遣黄門侍郎楊置分散之於冀定瀛三州就食深謂纂曰此輩復為乞活矣禍亂當由是作既而鮮于脩禮叛於定州杜洛周反於幽州其餘降户猶在恒州遂欲推深為主深乃上書求還京師令左衞將軍楊津代為都督以深為侍中右衞將軍定州刺史時中山太守趙叔隆别駕崔融討賊失利臺使劉審覈其事會賊逼中山深乃令叔隆防境審馳驛還京云深擅相放縱城陽王徽與深有隙因此構之乃徵深為吏部尚書兼中領軍及深至都眀帝不欲使徽深相憾勅因宴會令相和解徽衘深不已後河間王琛等為鮮于脩禮所敗乃除深儀同三司大都督章武王融為左都督裴衍為右都督並受深節度以討脩禮徽因奏靈太后構深曰廣陽以愛子握兵在外不可測也乃勅章武王等潛相防備融遂以勅示深深懼事無大小不敢自決靈太后聞之乃使問深意狀深乃具言前後為徽所構非一及今復生異議言臣將兒自随證為可疑之兆悠悠之人復傳音響言左軍臣融右軍臣衍皆受密勅伺察臣事徽既用心如此臣將何以自安竊以天歩未夷國難猶梗方伯之任於斯為急徽昔臨藩乃有人譽及居端右無聞焉爾今求出之為州使得申利用徽若外從所長臣無内慮之切亦得展其忠力太后不聼深以兵士頻經退散人無鬬情連營轉栅日行十里行達交津隔水而陣賊脩禮甞與葛榮謀後稍信朔州人毛普賢榮甞銜之普賢昔為深統軍及在交津使人喻之普賢乃有降意深又使録事參軍元晏説賊程殺鬼果相猜貳葛榮遂殺普賢脩禮而自立榮以新得大衆上下未安遂北度瀛州深遂率衆北轉榮東攻章武王融融戰敗於白牛邏深復退走趣定州聞刺史楊津疑其有異志乃止於州南佛寺停二日夜乃召都督毛謐等六七人與之盟約危難之際共相拯恤謐反疑深乃密告津云深謀不軌津遣謐討深深與左右走達博陵郡界逢賊游騎仍引詣葛榮賊徒見深頗有喜者榮新自立内惡之乃害深徽遂誣深降賊奏削深爵録其妻子深府佐宋游道為之訴理妻子乃得釋孝莊世追復王爵贈司徒公諡曰忠武子湛字士淵少有風尚孝莊初襲封孝静初累遷冀州刺史所在聚斂風政不立入為侍中後為司州牧時齊神武作相以湛頗有器望啓超拜太尉公薨贈假黄鉞大司馬尚書令諡曰文獻初湛名位漸重留連聲色始以婢紫光遺尚書郎中宋游道後乃私湛出為冀州竊攜而去游道大致紛紜乃云紫光湛父所寵湛母遺已將致公文久乃停息論者兩非之湛弟謹尚書祠部郎後謀殺齊文襄事泄合門伏法湛子法輪紫光所生也齊王矜湛覆滅乃啓原之復其爵土南安王余真君三年封吳王後改封南安王太武暴崩中常侍宗愛矯皇太后令迎立之然後發喪大赦改年為永平余自以非次而立厚遺羣下取悦於衆為長夜之飲聲樂不絶旬月之間帑藏空罄尤好弋獵出入無度邊方告難余不恤之百姓憤惋而余晏如也宗愛權恣日甚内外憚之余疑愛為變謀奪其權愛因余祭廟夜殺余文成𦵏以王禮諡曰隐通志卷八十四上
