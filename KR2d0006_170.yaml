body:
  text: 通志卷一百四十七宋右迪功郎鄭樵漁仲撰列傳第六十後魏古弼張黎劉潔邱堆娥清伊馛乙瓌子乾歸周幾豆代田車伊洛王洛兒車路頭盧魯元陳建來大干宿石萬安國嵇根周觀尉撥陸真吕洛拔薛彪子尉元慕容白曜子真安契白曜弟子和其奴茍頽宇文福子延宋隱從子愔欽愔孫辨族辨子維頴紀紀子道辨弟頴族弟鴻貴翻辨族弟許彥子宗之刁雍曾孫沖孫孫整雍族雙辛紹先子鳳達弟孫祥穆祥弟少雍鳳達穆子子馥韋閬孫俊閬俊子子粲從叔道福子閬從子崇彧閬族弟珍珍纘纘弟彧子朏杜銓屈遵子恆恆孫拔張蒲谷渾公孫表子軌質軌子睿邃軌弟質子張濟李先曾孫預子先子皎徽皎孫義徽義徽蘭義曾孫昭徽賈彝子秀竇瑾李欣袁式唐和寇讚子臻禮臻子祖酈範子道愼子道約範弟惲韓秀子務堯暄孫雄柳崇陸俟子馛馛子琇子琇弟凱定凱子暐之暐弟恭之子馛弟麗麗定國國子昕昕之子璋定國弟睿操麗從孫源賀孫懷雍懷子子雍子弟子恭劉尼薛提司馬楚之孫悅躍楚之子古弼代人也少忠謹好讀書又善騎射初為獵郎使長安稱旨轉門下奏事明元賜名曰筆取其直而有用後又名弼言其有輔佐之才也令弼典西部與劉潔等分綰機要敷奏百揆太武即位以功拜立節將軍賜爵靈壽侯歷位侍中吏部尚書典南部奏事後征馮𢎞𢎞將奔高麗高麗救兵至𢎞乃隨之令婦人被甲居中其精卒及高麗陳兵於外弼部將高茍子擊賊軍弼酒醉拔刀止之故𢎞得東奔太武大怒黜為廣夏門卒尋復為侍中與尚書李順使涼州賜爵建興公鎮長安甚有威名及議征涼州弼與順咸言涼州乏水草不宜行帝不從既克姑臧微嫌之以其有將略弗之責宋將裴方明克仇池立楊元庶子保熾於是假弼節督隴右諸軍討仇池平之未幾諸氐復推楊文德為主圍仇池弼攻解其圍文德走漢川東道將皮豹子聞仇池圍解議欲還軍弼使謂曰若其班師寇衆復至後舉為難不出秋冬南寇必來以逸待勞百勝之䇿也豹子乃止太武聞之曰弼言長䇿也制有南秦弼謀多矣景穆總攝萬機徵為東宫四輔與宜都王穆壽並參政事遷尚書令弼雖事務殷湊而讀書不輟端謹愼密口不言禁中事功名等於張黎而廉不及也上谷人上書言苑囿過度民無田業宜減大半以賜貧民弼欲陳奏遇帝與給事中劉樹碁志不聽事弼侍坐良久不獲申聞乃於帝前捽樹掣下牀以手搏其耳以拳歐其背曰朝廷不治實爾之罪帝失容放碁曰不聽奏事過在朕躬樹何罪置之弼具狀以聞帝竒弼公直乃可其奏以與百姓弼曰為臣而逞志於君前罪莫大焉乃詣公車免冠徒跣自劾請罪帝召之謂曰卿其冠履吾聞築社之役褰蹶而築之端冕而事之神與之福然則卿有何罪自今以後苟利社稷益國家便人者雖復顚沛造次卿則為之無所顧也太武大閲將校獵於河西弼留守詔以肥馬給騎人弼命給弱者太武大怒曰尖頭奴敢裁量朕也朕還臺先斬此奴弼頭尖帝常命之曰筆頭時人呼為筆公屬官怖惶懼誅弼告之曰吾謂事君使田獵不過盤遊其罪小也不備不虞使戎寇恣逸其罪大也今北狄孔熾南虜未滅狡焉之志窺伺邊境是吾憂也故選肥馬備軍實為不虞之遠慮苟使國家有利吾寧避死乎明王可以理干此自吾罪非卿等之罪帝聞而嘆曰有臣如此國之寶也賜衣一襲馬二匹鹿十頭後車駕田於山北獲麋鹿數千頭詔尚書發車牛五十乘運之帝尋謂從者曰筆公必不與我汝輩不如以馬運之速遂還行百餘里而弼表曰今秋榖懸黃麻菽布野豬鹿竊食鳥鴈侵費風波所耗朝夕三倍乞賜矜緩使得收載帝謂左右曰筆公果如朕卜可謂社稷之臣初楊難當之來也詔弼悉送其子弟於京師楊元少子文德以黃金三十斤賂弼弼受金留文德而遇之無禮文德亡入宋太武以其正直又有戰功弗加罪責太武崩吳王余立以弼為司徒文成即位與張黎並坐議不合旨俱免有怨謗之言其家人告巫蠱俱伏法時人寃之張黎鴈門平原人也善書計道武知待之明元器其忠亮賜爵廣平公管綜機要太武以其功舊任以輔弼除大司農卿軍國大議黎嘗與焉以征赫連功進號征北大將軍與樂安王範濟南公崔徽鎮長安清約公平甚著聲稱代下之日家無餘財太武征涼州蠕蠕吳提乘虛入寇黎與長孫道生拒擊走之景穆初總百揆黎與崔浩等輔政忠於奉上非公事不言詔賜浩黎布帛各千匹以褒舊勳吳王余立以黎為太尉後文成即位與古弼俱誅劉潔長樂信都人也昭成時慕容氏獻女潔祖父生為公主家臣乃隨入魏賜以妻妾生子堤位樂陵太守封信都男卒潔襲堤爵數從征討進爵會稽公後與永安侯魏勤及功勞將軍元屈等擊吐京叛胡為其所執送赫連屈丐潔聲氣不撓呼其字而與之言神色自若屈丐壯而釋之後得還國典東部事明元寢疾太武監國潔與古弼等選侍東宫對綜機要太武即位竒其有柱石用委以大任及議軍國朝臣咸推其能遷尚書令改為巨鹿公車駕西伐潔為前鋒沮渠牧犍弟董來拒戰於城南潔信卜者之言以日辰不協擊鼓却陳故董來得入城太武微嫌之潔久在樞密恃寵自専帝心稍不平時議伐蠕蠕潔言不如廣農積榖以待其來羣臣皆從其議帝決行乃從崔浩議既出與諸將議會鹿渾谷而潔恨其計不行欲沮諸將乃矯詔更期諸將不至時虜衆大亂景穆欲擊之潔執不可停鹿渾谷六日諸將猶不集賊已逺遁追至石水不及而還師次漢中糧盡士卒多死潔陰使人驚軍勸帝棄軍輕還帝不從潔以軍行無功奏歸罪於崔浩帝曰諸將後期及賊不擊罪在諸將豈在於浩又潔矯詔事遂發輿駕至五原收潔幽之太武之征也潔私謂親人曰若軍出無功車駕不返即吾當立樂平王潔又使右丞張嵩求圖讖問劉氏應王繼國家後我審有名姓不嵩對曰有姓而無名窮驗欵引搜嵩家果得讖書潔與南康公狄鄰及嵩等皆夷三族死者百餘人潔既居勢要內外憚之側目而視籍其家財巨萬太武追忿言則切齒邱堆代人也美容儀初以忠謹入侍明元即位拾遺左右稍遷散騎常侍太武監國臨朝堆與太尉穆觀等為右弼及即位賜爵臨淮公位太僕與宗正娥清略地關右而宜城王奚斤表留堆合軍與赫連昌相拒斤進擊赫連定留堆守輜重斤為定禽堆聞而棄甲走長安帝大怒遣西平公安頡斬堆娥清代人也少有將略纍著戰功稍遷給事黃門侍郎明元南巡幸鄴以淸為中領軍將軍與宋兵將軍周幾等度河略地至湖陸以功賜爵須昌侯與幾等遂鎮枋頭太武初還京師進為東平公後從平統萬遂與奚斤討赫連昌至安定及昌弟定西走斤追之清欲尋水往斤不從遂與斤俱為定所擒太武克平涼乃得還後與古弼等東討馮𢎞以不急戰弘奔高麗檻車徵為門卒而卒於家子延賜爵南平公伊馛代人也少而勇健走及奔馬善射多力曵牛却行神麚初擢為侍郎轉三郎加振威將軍賜爵汾陽子太武之將討涼州也議者咸諌以為無水草唯司徒崔浩勸行羣臣出後馛言於帝曰涼州若無水草何得為國議者不可用也宜從浩言帝善之既克涼州太武大會於姑臧謂羣臣曰崔公智計有餘吾亦不復竒之吾正竒馛弓馬之士而所見能與崔公同顧謂浩曰馛智力如此終至公相浩曰何必讀書然後為學衛青霍去病亦不讀書而能大建勳名致位公輔帝笑曰誠如公言馛性忠謹帝親待日殊賞賜優厚太平真君初帝欲拜馛為尚書封郡公馛辭曰尚書務繁公爵至重非臣年少愚近所宜帝問其所欲馛對曰祕書二省多諸文士若恩矜不已請參其次帝賢之遂拜中護祕書監後以頻有戰功進爵河南公後拜司空及為三公清約自守為政舉大綱而已不為苛碎太安二年領太子太保三年與司徒陸麗等並平尚書事薨子蘭襲爵位庫部尚書卒子盆生驍勇有膽氣纍有戰功遂為名將以勳賜爵平城子為西道都督戰沒贈雍州刺史乙瓌代人也其先世統部落太武時瓌父匹知遣瓌入貢帝留之瓌善騎射手格猛虎尚太武女上谷公主除駙馬都尉賜爵西平公從駕南征都督前鋒諸軍事勇冠三軍後進爵為王又為西道都將薨年二十九贈太尉公諡曰恭子乾歸襲爵乾歸有氣幹頗習書疏尤好兵法尚景穆女安樂公主除駙馬都尉侍中獻文初為秦州刺史有惠政孝文即位為中道都將卒諡曰康子海字懷仁位散騎侍郎卒諡曰孝海子瑗字雅珍尚孝文女淮陽公主除駙馬都尉纍遷西兖州刺史天平元年舉兵應樊子鵠戰敗死周幾代人也少以善射為獵郎明元即位為左部尚書以軍功封交趾侯太武以幾有智勇遣鎮河南威信著于外境幾常嫌奚斤等綏撫關中失和每至言論形於聲色斤等憚焉進號宋兵將軍率洛州刺史于栗磾以萬人襲陜城卒于軍軍人無不歎惜之歸葬京師諡曰桓子步襲爵豆代田代人也明元時以善騎射為內細射從攻虎牢詔代田登樓射賊矢不虛發以功遷內三郎從討赫連昌乘勝追賊入其宫門門閉代田踰宫而出太武壯之拜勇武將軍後從討平涼破赫連定得奚斤等以定妻賜之詔斤膝行授酒於代田敕斤曰全爾身命者代田功也以從討和龍戰功封長廣公卒於統萬鎮大將贈長廣王諡曰恭子周求襲爵車伊洛焉耆胡也世為東境部落帥恆修職貢延和中授平西將軍封前部王伊洛規欲歸闕為沮渠無諱斷路伊洛連戰破之無諱卒伊洛前後遣使招喻其子乾壽等及其户五百餘家送之京師又率部衆二千餘人伐高昌討破焉耆東關七城正平二年伊洛朝京師拜都官尚書將軍王如故卒諡康王葬禮依盧魯元故事子歇襲爵王洛兒京兆人也少善騎射明元在東宫給事帷下侍從遊獵夙夜無怠性謹願未嘗有過明元嘗獵于灅南乘冰而濟氷陷沒馬洛兒投水奉帝出岸洛兒殆將凍死明元解衣以賜之自是恩寵日隆天賜末明元避難出居于外洛兒晨夜侍衛無須臾違離恭勤發於至誠元紹之逆明元左右唯洛兒與車路頭晝居山嶺夜還洛兒家洛兒鄰人李道潛相奉給晨復還山衆庶頗知喜而相告紹聞收道潛斬之洛兒猶冒難往返京都通問大臣大臣遂出奉迎百姓奔赴明元還宫社稷獲全洛兒有功焉明元即位拜散騎常侍賜爵新息公加直意將軍又追贈其父為列侯賜僮𨽻五十户永興五年卒贈太尉建平王賜溫明祕器載以輼輬車使殿中衛士為之導從帝親臨哀慟者數四焉乃鴆其妻周氏與合葬子長城襲爵卒無子以其弟德成襲車路頭代人也少以忠厚選給東宫為帳下帥謹愼無過天賜末明元出於外路頭隨侍竭力及即位拜散騎常侍加忠意將軍賜爵宣城公帝性明察羣臣多以職事遇譴至有杖罰故路頭優遊不任事侍宿左右從容談笑而已路頭性無害每至評獄處理常獻寬恕之議以是見重於朝帝亦敬納之寵賜隆厚當時功名莫及泰恆六年卒帝親臨哀慟贈太師宣城王諡曰忠貞喪禮一依安城王叔孫俊故事陪葬金陵子眷襲爵盧魯元昌黎徒河人也曾祖副鳩仕慕容氏為尚書令臨澤公祖父並至大官魯元寬和有雅度明元時選為通直郎以忠謹給侍東宫恭勤盡節太武親愛之及即位以為中書侍郎拾遺左右寵待彌深而魯元益加謹肅帝愈親待之內外大臣莫不敬憚焉性多容納善與人交好掩人之過揚人之善由是公卿咸親附之魯元以工書有文才纍遷中書監領祕書事賜爵襄城公贈其父為信都侯初從征赫連昌太武親追擊之入其城門魯元隨帝出入是日微魯元幾至危殆從征平涼以功拜征北大將軍加侍中後遷太保録尚書事帝貴異之常從征伐出入卧內每有平殄輒賜僮𨽻前後數百人布帛以百萬計帝臨幸其第不出旬日欲其居近易於往來乃賜甲第於宫門南衣食車馬皆乘輿之副太平真君三年駕幸隂山魯元以疾不從侍臣問疾醫藥傳驛相屬於路及薨帝甚悼惜之還臨其喪哭之哀慟二宫命太官日送奠昏晨哭臨訖則備奏鐘鼓伎樂輿駕比葬三臨之喪禮依安成王叔孫俊故事而賵送有加贈襄城王諡曰孝葬於崞山為建碑闕自魏興貴臣恩寵無與為比子統襲爵以父任侍東宫大武以元舅陽平王杜超女南安長公主所生妻之車駕親自臨送太官設供具賞賚千計文成即位典選部主客二曹卒贈襄城王諡曰景無子弟彌娥襲卒贈襄城王諡曰恭魯元少子內給侍東宫景穆深昵之常與同卧起同衣食父子有寵兩宫勢傾天下內性寬厚有父風而恭愼不及正平初宫臣伏誅太武以魯元故唯殺內而厚撫其兄弟陳建代人也以善騎射擢為三郎稍遷下大夫內行長太武討山胡白龍意甚輕之單將數十騎登山臨險每日如此白龍乃伏壯士十餘處出於不意帝墮馬幾至不測建以身捍賊大呼奮擊殺數人身被十餘創帝壯之賜别户二十文成初加冠軍將軍出為雍州刺史假秦郡公帝以建貪暴懦弱遣使就州罰杖五十孝文初徵為尚書右僕射加侍中進爵趙郡公建與侍中尚書晉陽侯元仙德殿中尚書長樂王穆亮北部尚書平原王陸睿密表啓南伐帝嘉之遷司徒征西大將軍進爵魏郡王帝與文明太后頻幸建第賜建妻宴於後庭太和九年薨子念生襲有罪爵除來大干代人也父初真從道武避難叱候山參創業功官至後將軍武原侯與在八議大干驍果善騎射永興初襲爵位中散至於朝賀之日大干常著御鎧盤馬殿庭朝臣莫不嗟歎遷內三郎幢將典宿衛禁旅大干用法嚴明上下齊肅常從明元校獵見虎在高巖上持矟直前刺之應手而死帝嘉其勇壯太武踐阼與襄城公盧魯元等七人俱為常侍常持仗侍衛晝夜不離左右纍從征伐以戰功賜爵廬陵公鎮雲中兼統白道軍事太武以其壯勇數有戰功兼悉北境險要詔使巡撫六鎮以防寇虜經略布置甚得事宜後吐京胡反以大干為都將討平之在吐京卒喪還停於平城南太武出遊還見而問之左右以對帝悼嘆者良久詔聽其喪入殯城內贈司空諡莊公子邱頽襲爵降為晉興侯宿石朔方人赫連屈丐弟文陳之曾孫也天興中文陳父子歸魏道武嘉之以宗女妻焉拜上將軍祖若豆根明元時賜姓宿氏襲上將軍父沓干從太武征平涼有功賜爵漢安男後從討蠕蠕戰沒石年十三襲爵擢為中散遷內行令從於苑中遊獵石走馬引前道峻馬倒殞絶久之乃蘇由是御馬得制文成嘉之賜以綿帛駿馬改爵義陽子又常從獵文成親欲射猛虎石叩馬諌引帝至高原上後猛虎騰躍殺人帝褒美其忠許後有犯罪宥而勿坐賜駿馬一匹尚上谷公主拜駙馬都尉位吏部尚書進爵太山公為北征中道都大將卒追贈太原王諡曰康葬禮依盧魯元故事太和初子倪襲爵萬安國代人也世為酋帥父振尚高陽長公主拜駙馬都尉位長安鎮將爵馮翊公安國少明敏以國甥復尚河南公主拜駙馬都尉獻文特親寵之與同卧起拜大司馬大將軍封安成王安國先與神部長奚買奴不平承明初矯詔殺買奴於苑中孝文聞之大怒遂賜死年二十三子翼襲王爵有嵇根者世為紇奚部帥皇始初率部歸魏尚昭成女生子拔位尚書令拔尚華陰公主生子敬元紹之逆也主有功超授敬大司馬封長樂王薨子護襲拜外都大官根事迹遺落故略附云周觀代人也驍勇有膂力太武以軍功賜爵金城公位高平鎮將善撫士卒號有威名後拜內都大官出為秦州刺史撫馭失和部人薛永宗聚衆汾曲以叛觀討永宗為流矢所中太武幸蒲坂觀聞帝至驚怖而起創重遂卒帝怒絶其爵云尉撥代人也父郍濮陽太守撥為太學生募從兖州刺史羅忸擊賊於陳汝有功賜爵介休男討和龍擊吐谷渾皆有軍功進爵為子纍遷杏城鎮將大得人和文成以撥清平有惠績賜以衣服獻文即位為北征都將南攻懸瓠進爵安城侯位北豫州刺史卒諡敬侯陸真代人也父洛侯秦州刺史真少善騎射太武以真膂力過人拜內三郎太平真君中從討蠕蠕以功賜爵關內侯後攻懸瓠登樓臨射城中弦不虛發從太武至江還次旴眙真功居多文成即位進爵都昌侯位選部尚書後拜長安鎮將時初置長蛇鎮真率衆築城未訖而氐豪仇傉檀等反叛真擊平之卒城長蛇而還東平王道符反于長安以真為長安鎮將賜爵河南公長安平兵人素服其威信及至皆帖然安靜在鎮數年甚著威稱卒諡曰烈子延字契胡提頗有氣幹襲爵河南公例降改封汝陽侯位懷朔鎮大將大僕卿受使綏慰秀容為牧子所害吕洛拔代人也曾祖湯侯昭成時率户五千歸魏父匹知太武時為西部長封滎陽公洛拔以壯勇知名文成末為平原鎮將隨尉元攻宋將張永大敗之賜爵成武侯卒長子文祖獻文以其勳臣子補龍牧曹奏事中散以牧産不滋坐徙武川鎮後文祖以舊語譯注皇誥辭義通辨為外都曹奏事中散後坐事伏法薛彪子代人也祖達頭自姚萇時率部落歸魏道武賜爵聊成侯待以上客禮賜妻鄭氏卒贈冀州刺史諡曰悼父野豬并太二州刺史封河東公有聲稱卒諡曰簡彪子姿貌壯偉明斷有父風為內行長典奏諸曹事當官正直內外憚之及文明太后臨朝出為枋頭鎮將素剛簡為近臣所嫉因小過黜為鎮門士及獻文南巡次山陽彪子拜訴於路復除枋頭鎮將纍遷開府徐州刺史在州甚多惠政百姓便之沛郡太守邵安下邳大守張攀咸以贓汙彪子案之於法安等遣子弟上書誣彪南通賊虜孝文曰此妄矣推案果虛卒諡曰文子琡尉元字茍仁代人也世為豪宗父目斤勇略聞於當時常有戰功拜中山太守元年十九以善射稱為羽林中郎以匪懈見知稍遷駕部給事中賜爵富城男和平中遷北部尚書進爵太昌侯天安元年薛安都以徐州內附請師救援獻文以元為鎮南大將軍持節都督東道諸軍事與城陽公孔伯恭赴之宋兖州刺史畢衆敬遣東平太守章仇檦歸欵元並納之遂長驅而進宋遣將張永沈攸之等率衆討安都屯于下礚安都出城見元元依朝旨授其徐州刺史遣中書侍郎高閭李璨等與安都俱還入城别令孔伯恭撫安內外然後元入彭城元以張永仍據險要攻守勢倍懼傷士卒乃命安都及璨等固守身率精鋭揚兵於外分擊絶其糧運大破永於吕梁之東斬首數萬級追北六十餘里生禽宋使持節梁秦二州刺史元恭祖等永與攸之輕走收其軍資器械宋東徐州刺史張讜兖州刺史王整蘭陵太守元欣青州刺史沈文秀等相與歸命詔拜元鎮南大將軍開府徐州刺史封淮陽公詔元曰自淮以北蕩然清肅皆是元帥經略將士效命之所致也太和初徵為內都大官既而出為使持節鎮西大將軍開府統萬鎮將甚得夷人之心三年進爵淮陽王以舊老見禮聽乘步挽杖於朝齊高帝既立多遣間諜扇動新民不逞之徒所在蜂起以元威名夙振召為征南大將軍總率諸軍以討之元討五固賦元和等皆平東南清晏逺近帖然入為侍中都曹尚書遷尚書令進位司徒十六年例降庶姓王爵封山陽郡公其年頻表以老乞身詔許致仕元詣闕謝恩引見於庭命升殿勞宴賜元冠素服又詔曰前司徒山陽郡公尉元前大鴻臚卿新太伯遊明根並元亨利貞明允誠素位顯台宿歸終私第可謂知始知卒希世之賢也公以八十之年宜處三老之重卿以七十之齡可充五更之選於是養三老五更於明堂國老庶老於階下孝文再拜三老親袒割牲執爵而饋於五更行肅拜之禮賜國老庶老衣服有差既而元言曰自天地分判五行施則人之所崇莫重於孝順然五孝六順天下之所先願陛下重之以化四方臣既年衰不究逺趣心耳所及敢不盡誠帝曰孝順之道天地之經今承三老明言銘之于懷明根言曰夫至孝通靈至順感幽故詩云孝悌之至通於神明光於四海如此則孝順之道無所不格願陛下念之以濟黎庶臣年志朽弊識見昧然在於愚慮不敢不盡帝曰五更助三老以言至範敷展德音當克己復禮以行來授禮畢乃賜步挽一乘詔曰夫尊老尚更列聖同致欽年敬德綿哲齊軌朕雖道謝元風識昧睿則然仰稟先誨企遵猷督故推老以德立更以先有焉斯彰無焉斯顯矣前司徒公元前鴻臚卿明根並以沖德懸車懿量歸老故尊老以三事更以五雖老更非官耄耋罔祿然况事既高宜加殊養三老可給上公祿五更可食元卿俸供食之味亦同其例十七年元疾篤帝親省疾遂薨年八十二諡曰景桓公葬以殊禮給羽葆鼓吹假黃鉞班劔四十人子翊襲爵遷洛以山陽在畿內改為博陵郡公卒於恆州刺史諡曰順慕容白曜慕容晃之元孫也父琚歷官以廉清著稱賜爵高都侯終尚書左丞諡曰簡白曜少為中書吏以敦直給事宫中襲爵稍遷北部尚書文成崩與乙渾共執朝政遷尚書右僕射進爵南鄉公宋徐州刺史薛安都兖州刺史畢衆敬並以城內附詔鎮南大將軍尉元鎮東將軍孔伯恭赴之而宋東平太守申纂屯無鹽并州刺史房崇吉屯斗城遏絶王使皇興初加白曜使持節督諸軍事征南大將軍進爵上黨公屯碻磝為諸軍後繼白曜攻纂於無鹽拔其東郭纂遁遣兵追執之回攻斗城肥城戌主聞軍至棄城遁走獲粟三十萬石又下襲破麋溝垣苖二戍得粟十餘萬斛由是軍糧充足先是淮陽公皮豹子再征苖垣不克白曜一旬內頻拔四城威震齊土獻文下詔褒美之斗城不降白曜縱兵陵城殺數百人崇吉夜遁白曜撫其人百姓懷之獲崇吉母妻待之以禮宋遣將吳喜公欲寇彭城鎮南大將軍尉元請濟師獻文詔白曜赴之白曜至瑕邱遇患因停會崇吉與從弟法壽盜宋盤陽城以贖母妻白曜遣將軍長孫觀等率騎入自馬耳闕赴之觀至盤陽諸縣悉降白曜自瑕邱進攻歷城二年崔道固及兖州刺史梁鄒守將劉休賔靣縛而降白曜皆釋之送道固休賔及其寮屬于京師後乃徙二城人望於下館朝廷置平齊郡懷寧歸安二縣以居之自餘悉為奴婢分賜百官白曜雖在軍旅而接待人物寬和有禮所獲崇吉母妻申纂婦女皆别營安置不令士卒喧雜及進克東陽擒沈文秀凡獲倉粟八十五萬斛始末三年築圍攻擊雖士卒死傷無多怨叛三齊欣然安堵樂業克城之日以沈文秀抗倨不為之拜忿而撾撻唯以此見譏以功拜開府儀同三司都督青州刺史進爵濟南王初乙渾專權白曜頗所挾附後緣此追以為責四年見誅云謀反叛時論寃之白曜一子真安年十一聞父被執將自殺家人止之曰輕重未可知真安曰王位高功重若小罪終不至此我不忍見父之死遂自縊太和中著作佐郎成淹上表理白曜孝文覽表哀愍之白曜弟子契輕薄無檢太和初以名家子擢為中散遷宰官中散南安王楨有貪暴之響遣中散閭文祖詣長安察之文祖受楨金寶之賂為楨隱而不言事發太后引見羣臣謂曰前論貪清皆云克修文祖時亦在中後竟犯法以此言之人心信不可知孝文曰卿等自審不勝貪心者聽辭位歸第契進曰小人之心無恆而帝王之法有恆以無恆之心奉有恆之法非所克堪乞垂退免帝曰契若知心不可恆即知貪之惡矣何為求退遷宰官令賜爵定陶男後卒於都督朔州刺史諡曰克初慕容氏破後種族仍繁天賜末頗忌而誅之時有不免者不敢復姓皆以興為氏延昌末詔復舊姓而其子女先入掖庭者猶號慕容特多於他族和其奴代人也少有操行善騎射初為三郎文成初封平昌公纍遷尚書左僕射又與河東王閭毗太宰常英等並平尚書事在官愼法不受私請遷司空加侍中文成崩乙渾與林金閭擅殺尚書楊保年等時殿中尚書元郁率殿中宿衛士欲加兵於渾渾懼歸咎於金閭執以付郁時其奴以金閭罪惡未分出之為定州刺史皇興元年長安鎮將東平王道符反詔其奴討之未至而道符敗軍還薨內外歎惜之贈平昌王諡曰宣子受襲爵茍頽代人也本姓若干父洛拔內行長頽厚重寡言少嚴毅清直武力過人擢為中散小心謹敬太武至江賜爵建德男纍遷司衛監洛州刺史抑強扶弱山蠻畏威不敢為寇太和中歷位侍中都曹尚書進爵河南公頽方正好直言雖文明太后生殺不允頽亦言至懇切李惠李欣之誅頽並致諌遷司空進爵河東王以舊老聽乘步挽杖於朝大駕行幸三川頽留守京師沙門法秀謀反頽率禁旅收掩畢獲內外晏然薨諡僖王長子愷襲爵河東王例降為公宇文福其先南單于之逺屬也世為擁部大人祖活撥仕慕容垂為唐郡內史遼東公道武之平慕容氏也活撥入魏為第一客福少驍果有膂力拜羽林郎太和中纍遷都牧給事車駕南討時乃遷洛勑福檢行牧馬之所福規石濟以西河內以東拒黃河南北千里為牧地事尋施行今之馬場是也及徙代移雜畜牧於其所福善於將養並無損耗孝文嘉之補司衛監後以勳封襄樂縣男歷位太僕卿都官尚書營州大中正瀛州刺史性忠清在公嚴毅以信御人甚得聲譽二十二年車駕南伐遣福在前軍至鄧城齊明帝遣其尚書崔慧景等率十萬來援孝文勑福領高車羽林兵出其西南奪其橋道遏絶歸路齊衆大怒六道來戰福撫鞍誓衆身先士卒齊兵遂潰帝褒歎之還為征北將軍都督懷朔沃野武川三鎮諸軍事懷朔鎮將至鎮卒諡曰貞忠子延字慶壽體貌魁岸眉目踈朗位員外散騎侍郎以父老詔聽隨侍在瀛州屬大乘祅黨突入州城延率奴客逆戰身被重創賊縱火燒齋閣福時在內延突入抱福出外支體灼爛鬢髮盡焦於是勒衆與賊苦戰賊乃散走以此見稱纍遷直寢後與万俟醜奴戰殁宋隱字處默西河介休人也曾祖奭祖活父恭世仕慕容氏位並通顯慕容俊徙鄴恭始家於廣平列人焉隱性至孝年十二便有成人之志專精好學不以兵難易操仕慕容垂為本州别駕歷尚書郎道武平中山拜尚書吏部郎轉行臺右丞領選屬以老病乞骸骨帝不許尋以母喪歸列人既葬被徵固辭以病而州郡切以期會隱乃棄妻子間行匿於長樂數年而卒臨終謂其子經曰茍能入順父兄出悌鄉黨仕郡幸而至功曹史以忠清奉之則足矣不勞逺詣臺閣恐汝不能富貴而徒延門户之纍若忘吾言是為死若父也使鬼而有知吾不歸食矣隱弟宣字道茂與范陽盧元勃海高允博陵崔建從子愔俱被徵拜中書博士後拜侍郎行司徒校尉卒諡簡侯宣子謨字乾仁襲爵卒於遼西太守子鸞襲位東莞太守鸞弟瓊字普賢母病季秋思瓜瓊夢見之求而遂獲人謂孝感卒於家愔歷中書博士員外散騎常侍使江南爵列人子卒於廣平太守長子顯襲爵無子養弟叔珍子辨為後辨字義和父叔珍娶趙郡李敷妹坐敷事而死辨才學博贍少有美名初至京師見尚書李沖因言論移日沖異之退而謂人曰此人一日千里王佐才也顯卒辨襲爵辨與李彪州里迭相祗好彪為祕書丞請為著作佐郎遷尚書殿中郎中孝文曾因朝會之次歷訪治道辨年少官微自下而對聲姿清亮進止可觀帝稱善者久之因是大被知遇賜名為辨意取辨和獻玉楚王不知寶之義遷中書侍郎兼員外散騎常侍使於齊齊司徒蕭子良祕書丞王融等皆稱美之以為志意謇諤不逮李彪而體韻和雅舉止間邃過之轉散騎侍郎時散騎位在中書之右孝文曾論江左事因問辨曰卿比南行入其隅奧彼政道云何興亡之數可得知不辨對曰蕭氏父子無大功於天下既以逆取不能順守德政不理徭役滋劇以臣觀之必不能貽厥子孫保有南海若物憚其威身免為幸後車駕南征以辨為司徒司馬東道副將軍人有盜馬靽者斬而徇於是三軍震懼莫敢犯法黃門郎崔光薦辨自代帝不許亦賞光知人未幾以辨兼司徒左長史時大選內外羣官并定四海士族辨專參銓量之任事多稱旨然好言人之陰短高門大族意所不便者辨因毁之至於舊族淪滯而人非可忌者又申達之辨又為本州大中正姓族多所降抑頗為時人所怨遷散騎常侍尋為右衛將軍領黃門辨屢自陳讓孝文曰吾為相知者卿亦不可有辭豈得專守一官不助朕為治乎且常侍者黃門之庶兄領軍者三衛之假攝不足空存推讓以棄大委其被知遇如此孝文北都之選也李沖多所參預頗抑宋氏辨有恨於沖而與李彪相善及彪之抗沖沖謂彪曰爾如狗耳為人所嗾及沖劾彪不至大罪辨之力也彪除名辨大相嗟慨密圖申復孝文在汝南不豫大漸旬餘日不見侍臣唯彭城王協等數人而已小瘳乃引見門下及宗室長幼諸人入者未能皆致悲泣惟辨與司徒司馬張海歔欷流涕帝由是益重之車駕征馬圈留辨以本官兼祠部尚書攝七兵事及行執其手曰國之大事在祀與戎故令卿綰攝二曹可不自勉辨頓首辭謝辨劬勞王事恩遇亞於李沖帝亦稱辨可為吏部尚書及崩遺詔以辨為之與咸陽王禧等六人輔政而辨先卒年三十八贈瀛州刺史諡曰貞順辨性好自矜伐自許膏腴孝文以郭祚晉魏名門從容謂辨曰卿固當推郭祚之門辨笑曰臣家未肯推祚帝曰卿自漢魏以來既無高官又無俊秀何得不推祚辨曰臣清素自立要爾不推侍臣出後帝謂彭城王協曰辨人身自不惡乃復欲以門户出矜殊為可怪長子維字伯緒襲父爵為給事中坐諂事高肇出為益州龍驤府長史辭疾不行太尉清河王懌輔政以維名臣子薦為通直郎辟其弟紀行參軍靈太后臨朝委任元乂乂恃寵驕盈懌每以公理裁斷乂甚忿恨思害懌遂與維作計以富貴許之維見乂寵勢日隆乃告司染都尉韓文殊父子謀逆欲立懌懌被録禁中文殊父子懼而逃遁鞫無反狀以文殊亡走懸處大辟置懌於宫西别館禁兵守之維應反坐乂言於太后欲開將來告者之路乃黜為燕州昌平郡守紀為秦州大羌令維及紀頗涉經史而浮薄無行懌尊親懿望朝野瞻屬維受懌眷賞而無狀構間天下士人莫不怪忿而賤薄之及乂殺懌専斷朝政以維兄弟前者告懌徵維為散騎侍郎紀為太學博士領侍御史乂甚昵之維超遷通直散騎常侍又除洛州刺史紀超遷尚書郎紀字仲烈初辨謂族弟世景言維踈險而紀識慧不足維必敗吾業世景以為不爾至是果然聞者以為知子莫若父尚書令李崇左僕射郭祚右僕射遊肇每云伯緒凶踈終敗宋氏幸得殺身耳論者以為有徵後除營州刺史靈太后反政以乂黨除名遂還鄉里尋追其前誣告清河王事於鄴賜死子春卿早亡弟紀以次子欽仁嗣欽仁武定末為太尉祭酒紀明帝末為北道行臺卒于晉陽子欽道仕齊歷位中山太守長於撫接然好察細事其州府佐吏使民間者先酬錢然後敢食臨涖處稱為嚴整尋徵為黃門侍郎又令在東宫教太子吏事時鄭子默以文學見知亦被親寵欽道本文法吏不甚諳識古今凡有疑事必詢子默二人幸於兩宫雖諸王貴臣莫敢不敬憚欽道又遷祕書監仍帶黃門侍郎乾明初遷侍中與楊愔同誅贈吏部尚書趙州刺史辨族弟頴字文賢位魏郡太守納貨劉騰騰言之以為涼州刺史頴前妻劉氏亡後十五年頴夢見之拜曰新婦今被處分為高崇妻故來辭君泫然涕流頴旦見崇言之崇後數日而卒頴族弟鴻貴為定州北平府參軍送戍兵於荆州坐取兵絹四百匹兵欲告之乃斬兵十人又疏凡不達見律令有梟首罪乃生斷兵手以水澆之然後斬決尋坐伏法時人哀兵之苦笑鴻貴之愚云辨族弟翻字飛烏少有操行世人以剛斷許之孝莊時除司徒左長史河南尹初翻為河陰令順陽公主家奴為劫攝而不送翻將兵圍主宅執主壻馮穆步驅向縣時正炎暑立之日中流汗霑地縣舊有大枷時人號曰彌尾青及翻為縣主吏請焚之翻曰置南牆下以待豪右未幾有內監楊小駒詣縣請事辭色不遜翻令取彌尾青以鎖之小駒既免入訴於宣武宣武大怒勑河南尹推之翻具自陳狀詔曰卿故違朝法豈不欲作威以賣名邪翻對曰造者非臣賣名者亦宜非臣臣所以留者非敢施於百姓欲待凶暴之徒如駒者耳於是威振京師及為洛陽令迄河南尹畏憚權勢更相承接故當世之名大致減損卒官贈侍中衛將軍相州刺史孝武初重贈驃騎大將軍開府儀同三司尚書左僕射雍州刺史諡曰貞翻弟育字道和敦篤有志行卒於太中大夫子世良世軌齊史有傳世良長於政治列在良吏目中許彥字道謨高陽新城人也祖茂仕慕容氏高陽太守彥少孤貧好讀書從沙門法睿受易太武徵令卜筮頻驗遂在左右參與謀議彥質厚愼密與人言不及內事帝以此益親待之賜爵武昌公拜相州刺史在州受納多違法度詔書切讓之然以彥腹心近臣弗之罪也卒諡宣公子熙襲熙卒子安仁襲安仁卒子元康襲降爵為侯熙弟宗之歷位殿中尚書定州刺史封潁川公受勑討丁零既平宗之因循郡縣求取不節深澤人馬超毁謗宗之宗之怒毆殺超超家人告狀宗之上超謗訕朝政文成聞之曰此必宗之懼罪誣超案驗果然遂斬于都市元康弟護州主簿子恂字伯禮頗有業尚閨門雍睦三世同居吏部尚書李神俊常稱其家風位司徒咨議參軍修起居注拜太中大夫卒贈吏部尚書冀州刺史恂弟惇齊史有傳刁雍字淑和渤海饒安人也曾祖協從晉元帝度江居京口位尚書令父暢晉右衛將軍初晉相劉裕微時負社錢二萬違時不還暢兄逵執而徴焉及裕誅桓元以嫌先誅刁氏雍與暢故吏遂奔姚興為太子中庶子及姚泓滅與司馬休之等歸魏上表陳誠請於南境自效明元許之假雍建威將軍雍遂於河濟之間招集流散得五千餘人建牙誓衆傳檄邊境雍弟彌時亦率衆入京口親共討裕裕遣將李嵩等討雍雍斬之於蒙山於是衆至二萬進屯固山六月雍又侵裕靑州為裕所逼遂入大鄉山明元南幸鄴問曰縛劉裕者於卿親踈雍曰伯父帝笑曰劉裕父子當應憚卿朕先遣叔孫建等攻青州民盡藏避城猶未下彼既素憚卿威名士民又相信服今欲遣卿助建等卿宜勉之於是假雍鎮東將軍青州刺史東光侯給五萬騎使别立義軍建先攻東陽雍至招集義軍平其北城三十許雍謂建曰賊畏官軍突騎今連車為陳大峴已南處處狹隘不得方軌雍求將義兵五千要嶮破之建不聽曰兵人不宜水土疫病過半今不損大軍安全而返計之上也建乃引還會有勑令雍隨機立效雍於是招集譙梁彭沛民五千餘家置二十七營遷鎮濟陰延和二年立徐州於外黃城置譙梁彭沛四郡九縣以雍為平南將軍徐州刺史賜爵東安伯七年召還為邊民所請復授使持節侍中都督四州諸軍事後除薄骨律鎮將雍以西土乏雨表立鑿渠溉公私田又奉詔以高平安定統萬及薄骨律等四鎮出車牛五十乘運屯榖五十萬斛付沃野以供軍糧道多深沙車牛艱阻求於牽屯山河水之次造船水運又以所綰邊表常備不虞造城儲榖置兵備守詔皆從之詔即名此城為刁公城以旌功焉皇興中雍與隴西王源賀及中書監高允等並以耆年特見優禮錫雍几杖劔履上殿月致珍羞焉雍性寬柔好尚文典手不釋書明敏多智凡所為詩賦頌論并諸雜文百有餘篇又泛施愛士恬靜寡欲篤信佛道著教誡二十餘篇以訓導子孫太和八年冬卒年九十五贈儀同三司諡曰簡子遵字奉國襲爵遵不拘小節長更修改太和中例降為侯常經篤疾幾死見有神明救之言福門子當享長年後卒於洛州刺史諡曰惠侯子楷早卒楷子沖字文朗年十三而孤孝慕過人其祖母司空高允女聰明婦人也哀其早孤撫養尤篤沖免喪後便志學他方高氏泣涕留之沖終不止雖家世貴達及從師於外自同諸生于時學制諸生悉直日監厨沖雖有僕𨽻不令代己身自炊爨每師受之際發志精専不捨晝夜殆忘寒暑學通諸經偏修鄭説陰陽圖緯算數天文風氣之書莫不關綜當時服其精博刺史郭祚聞其盛名訪以疑義沖應機解辨無不袪其久惑後太守范陽盧尚之刺史河東裴桓並徴沖為功曹主簿非所好也受署而已不關事務唯以講學為心四方學徒就其受業者嵗有數百沖雖儒生而執心壯烈不畏強禦延昌中帝舅司徒高肇擅恣威權沖乃抗表極言其事辭旨懇直文義忠憤太傅清河王懌覽而歎惜先是沖曾祖雍作孝行論以誡子孫稱古之葬者衣之以薪不封不樹後世聖人易之以棺椁至秦以後生則不能致養死則厚葬過度及於末世至籧篨裹尸倮而葬者確而為論並非折𠂻既知二者之失豈宜同之當令所存者棺厚不過三寸高不過三尺弗用繒綵斂以時服轜車止用白布為幔不加畫飾名為清素車又去挽歌方相并明器雜物及沖祖遵將卒勑其子孫令奉雍遺旨河南尹丞張普惠謂為太儉貽書於沖叔整令與通學議之沖乃致書國學諸儒以論其事學官竟不能答神麚末沖以嫡傳祖爵東安侯京兆王繼之為司空也並以高選頻辟記室參軍明帝將親釋奠於是國子助教韓神固與諸儒詣國子祭酒崔光吏部尚書甄琛舉其才學奏而徴焉及卒國子博士高涼及范陽盧道侃盧景裕等復上狀陳沖業行議奏諡曰安憲先生祭以太牢子欽字志儒早亡楷弟整字景智少有大度頗涉書史太和十五年為奉朝請孝文都洛親自臨選除司空法曹參軍纍遷黃門郎普泰初假節征東大將軍滄冀瀛三州刺史大都督尋加車騎將軍右光祿大夫遂逄本鄉賊亂奉母客於齊州既而母卒母即高允之女崔光崔亮皆經允接待是以涼燠之際光等每致拜焉天平四年卒於鄴贈司空公諡曰文獻整解音律輕財好施交結名勝聲酒自娛然貪而好色為議者所貶子柔列在齊史整弟宣字季達以功封高城縣侯歷位都官尚書衛大將軍滄州刺史卒贈太尉公諡曰武刁氏世有榮貴而門風不甚修潔為時所鄙雍族孫雙字子山高祖藪晉齊郡太守因晉亂居青州之安樂至雙始歸本鄉雙少好學兼涉文史雅為中山王英所知賞位西河太守為政清簡吏民安悅及中山王熙起兵誅元乂事敗熙弟略投命於雙雙藏護周年時購略甚切略懼求送出境雙曰人生會有一死所難遇耳今遭知己視死如歸願不以為慮略復苦求南轉雙乃遣子昌送達江左靈太后反政知略因雙獲濟徴拜光祿大夫時略姊饒安主刁宣妻也頻訴靈太后乞徵略還朝廷乃以徐州所獲俘江革祖暅二人易之以雙與略有舊乃令至境迎接明帝末除西兖州刺史時盜賊蜂起州人張桃弓等招聚公行劫掠雙至境先遣使喻桃弓陳示禍福桃弓即隨使歸罪雙捨而不問後有盜發之處令桃弓追捕咸悉禽獲於是州境清肅孝莊初行濟州刺史以功封曲城鄉男孝武初遷驍騎大將軍左光祿大夫興和三年卒贈車騎大將軍儀同三司齊州刺史諡曰清穆辛紹先隴西狄道人也五世祖怡晉幽州刺史父深仕西涼為驍騎將軍及涼後主歆與沮渠蒙遜戰於蓼泉軍敗失馬深以所乘馬授歆而身死於難以義烈見稱西土涼州平紹先內徙家於晉陽明敏有識量與廣平遊明根范陽盧度世同郡李承昭等相友善有至性丁父憂三年口不甘味頭不櫛沐髮遂落盡故常著垂裙皂帽自中書博士轉神部令皇興中薛安都以彭城歸魏時朝廷欲綏安初附以紹先為下邳太守為政不甚皎察舉其大綱而已唯教人為畜禦賊之備及宋將陳顯逹蕭道成蕭順之來寇道成謂順之曰辛紹先未易侵也宜共愼之不歷郡境徑屯吕梁紹先卒於郡贈并州刺史晉陽侯諡曰惠子鳯達耽道樂古有長者之名卒於京兆王子推國常侍鳯達子祥字萬福舉司州秀才再遷司空主簿咸陽王禧妃即祥妻之妹也及禧搆逆親知多被塵謗祥獨蕭然不豫轉并州平北府司馬有白壁還兵藥道顯被誣為賊官屬咸疑之祥曰道顯靣有悲色察獄以色其此之謂乎苦執申之月餘别獲真賊後除郢州龍驤府長史帶義陽太守白早生之反也梁遣來援因此緣淮鎮戍相繼降沒唯祥堅城固守梁又遣將胡武城陶平虜於州南金山之上連營侵逼祥出其不意襲之賊大崩禽平虜斬武城以送京師州境獲全論功方有賞授而刺史婁悅恥勳出其下聞之執政事竟不行胡賊劉龍駒作逆華州除祥安定王燮征虜府長史仍為别將與討胡使薛和滅之卒贈南青州刺史祥弟少雍字季和少聰頴有孝行尤為祖父紹先所愛紹先性嗜羊肝常呼少雍共食及紹先卒少雍終身不食肝性仁厚有禮義門內之法為時所重稍遷司空高陽王雍田曹參軍少雍清正不憚強禦積年久訟造次決之請託路絶時稱賢明正始中詔百官各舉所知高陽王雍及吏部郎中李憲俱以少雍為舉首卒於給事中少雍妻王氏有德義少雍與從弟懷仁兄弟同居懷仁等事之甚謹閨門禮讓人無間焉士大夫以此稱美子元桓武定中儀同府司馬元桓弟士遜太師開府功曹參軍鳯達弟穆字叔宗舉茂才東雍州别駕初隨父在下邳與彭城陳敬文友善敬文弟敬武少為沙門從師逺學經久不返敬文病臨卒以雜綾二十匹託穆與敬武穆久不得見經二十年始於洛陽見敬武以物還之封題如故世稱廉信歷東荆州司馬轉長史帶義陽太守領戌雅有恤人之志再轉汝陽太守遇水潦人飢上表請輕租賦帝從之遂勑汝陽一郡聽以小絹為調除平原相徴為征虜將軍太中大夫未發卒於郡贈後將軍幽州刺史子子馥字元頴早有學行纍遷平原相父子並為此郡吏民懷安之元皓入洛子馥不從莊帝反正封三門縣男天平中除太尉府司馬白山連接三齊瑕邱數州之界多有賊盜子馥受使檢覆因辨山谷要害宜立鎮戍之所又諸州豪右在山鼓鑄姦黨多依之又得密造兵仗上表請破罷諸冶朝廷善而從之後卒於清河太守子馥以三傳經同説異遂總為一部傳注並出校比短長會亡未就韋閬字友觀京兆杜陵人也世為三輔冠族祖楷晉長樂清河二郡太守父逵慕容垂大長秋卿閬少有器望遇慕容氏政亂避地薊城太武初徴拜咸陽太守轉武都太守卒於郡子範試守華山郡賜爵高平男卒範子俊字頴超早有學少孤事祖母以孝聞性溫和廉讓為州里所稱太和中襲爵歷位都水使者宣武崩領軍于忠矯擅威刑俊與左僕射郭祚昏嫁故亦同時遇害臨終訴枉於尚書元欽欽知而不敢申理俊歎曰吾一生為善未蒙善報常不為惡今為惡終悠悠蒼天抱直無訴時人咸怨傷焉熙平元年追贈洛州刺史諡曰貞子子粲字暉茂齊王蕭寶夤為雍州刺史引為府主簿轉録事參軍及寶夤反子粲與弟子爽執志不從相率逃免雍州平賜爵長安縣子普泰中纍遷中書侍郎孝武帝入關子粲歷行臺左丞南汾州刺史少弟道諧為鎮城都督元象中齊神武命將出討子粲及道諧俱被獲送於晉陽子粲纍遷南兖州刺史齊天保初封西僰縣男後卒於豫州刺史諡曰忠子粲兄弟十三人並有孝行居父喪毁瘠過禮廬於墓側負土成墳弟榮亮最知名榮亮字子昱博學有文才德行仁孝為時所重歷諫議大夫衛大將軍卒贈河州刺史子綱字世紀有操行才學見稱領袖本州調為中正開皇中位趙州刺史有子文宗文英並知名閬從叔道福父罷為苻堅丞相王猛所器重以女妻焉仕堅為東海太守堅滅奔江左仕宋為秦州刺史道福有志略仕宋位盱眙南沛二郡太守領鎮北府録事參軍與徐州刺史薛安都謀擁州內附賜爵高密侯因家彭城卒贈兖州刺史諡曰簡子欣宗以歸國勳别賜爵杜縣侯歷太中大夫行幽州事卒贈南兖州刺史諡曰簡閬從子崇字洪基父肅字道壽隨劉義真度江位豫州刺史崇年十嵗父卒母鄭氏擕以入魏因寓居河洛少為舅兖州刺史鄭義所器賞位司徒從事中郎孝文納其女為充華嬪除南潁川太守不好發擲細事恆云何用小察以傷大道吏民感之郡中大安帝聞而嘉賞賜帛二百匹遷洛以崇為司州中正尋除咸陽王禧開府從事中郎復為河南邑中正崇頻居衡品以平直見稱出為鄉郡太守更滿應代吏民詣闕乞留復延三年後卒子猷之釋褐奉朝請轉給事中中兵校尉稍遷前後將軍太中大夫卒猷之弟休之貞和自守未嘗言行忤物歷位給事中河南邑中正安西將軍光祿大夫卒子道建道儒閬族弟珍字靈智孝文賜名焉父子尚字文叔位樂安王良安西府從事中郎卒贈雍州刺史珍少有志操歷位尚書南部郎孝文初蠻酋桓誕歸款朝廷思安邊之略以誕為東荆州刺史令珍為使與誕招慰蠻左珍至桐柏山窮淮源宣揚恩澤莫不懷附淮源舊有祠堂蠻俚常用人祭之珍乃曉告曰天地明靈即人之父母豈有父母甘子肉味自今宜悉以酒脯代用羣蠻從約自此而改凡所招降七萬餘户置郡縣而還以奉使稱旨賜爵霸城子後以軍功進爵為侯纍遷顯武將軍郢州刺史所在有聲績朝廷嘉之遷龍驤將軍賜驊騮二匹帛五十匹穀三百斛珍乃召集州內孤貧者謂曰天子謂我能撫綏卿等故賜以榖帛吾何敢獨當遂以所賜悉分與之尋轉荆州刺史與尚書盧陽烏征赭陽為齊將垣歷生蔡道恭所敗免歸鄉里臨别謂陽烏曰主上聖眀志吞吳會用兵機要在於上流若有事荆楚老夫恐不得停耳後車駕征鄧沔復起珍為中軍大將軍彭城王協長史鄧沔既平試守魯陽郡孝文復南伐路經珍郡加中壘將軍正太守珍從至清水帝曰朕頃戎車再駕卿恆翼務中軍今日之舉亦欲引卿同行但三鴉嬰慕非卿無以守也因勑還及孝文崩於行宫祕匿而還至珍郡始發大諱還除中散大夫尋除鎮逺將軍太尉咨議參軍卒贈本將軍青州刺史諡曰懿長子纘字遵彥年十二補中書學生聰敏眀辨為博士李彪所稱尋遷侍御中散孝文每與德學沙門談論往復纘常為綴録無所遺漏頗見知賞纍遷長兼尚書左丞壽春內附尚書令王肅出鎮揚州請纘行為州長史加平逺將軍帶梁郡太守肅薨勑纘行州事任城王澄代肅為州復啓纘為長史澄出征之後梁將薑慶真乘虛攻襲遂據外郭雖尋克復纘坐免官卒纘弟彧字遵慶亦有學識解褐奉朝請稍遷平逺將軍東豫州刺史綏懷蠻左頗得其心蠻酋田益宗子魯生魯賢先叛父南入數為冦掠自彧至州魯生等咸箋啓修敬不復為害彧以蠻俗不識禮儀乃立太學選諸郡生徒於州總教又於城北置崇武館以習武業州境淸肅罷還遇大將軍京兆王繼西征請為長史尋以本官兼尚書為豳夏行臺以功封陰盤縣男卒贈撫軍將軍雍州刺史諡曰文子彪襲孝莊末為藍田太守因仕關西彪弟融以軍功賜爵長安伯稍遷大司馬開府司馬融娶司農卿趙郡李瑾女疑其妻與章武王景哲姦通乃刺殺之懼亦自殺弟朏字遵順少有志業年十八辟州主簿時屬嵗儉朏以家粟造粥以飼飢人所活甚衆解褐太學博士稍遷右軍將軍為荆郢和糶大使南郢州刺史田夷啓稱朏祖父珍往任荆州恩洽夷夏乞朏充南道别將領荆州驍勇共為腹背詔從之未幾行南荆州事遷東徐州刺史梁遣其郢州刺史田粗憘率衆來寇朏於石羊岡破斬之以功封杜縣子卒於侍中雍州刺史諡曰宣長子鴻字道衍頗有幹用纍遷中書舍人天平三年坐漏泄賜死於家杜銓字士衡京兆人晉征南將軍預五世孫也祖胄苻堅太尉長史父嶷慕容垂祕書監仍僑居趙郡銓學涉有長者風與盧元高允等同被徴為中書博士初密太后父豹喪在濮陽太武欲令迎葬於鄴謂司徒崔浩曰天下諸杜何處望高朕今改葬外祖意欲取諸杜中長老一人以為宗正令營護凶事浩曰京兆為美中書博士杜銓其家今在趙郡是杜預後於今為諸杜最密召見銓器貌瓌雅太武感悅謂浩曰此真吾所欲也以為宗正令與杜超子道生送豹喪柩致葬鄴南銓遂與超如親超謂銓曰既是宗近何緣僑居趙郡乃延引同屬魏郡再遷中書侍郎賜爵新豐侯卒贈湘州刺史魏縣侯諡曰宣子振字秀元舉秀才卒於中書博士振子遇字慶期位尚書起部郎竊官材瓦起立私宅清論鄙之卒於河東太守贈都官尚書豫州刺史諡曰惠銓族孫景字宣明學通經史州府交辟不就景子裕字慶延雖官非貴仕而文學相傳仕齊位上樂陵令齊亡退居教授終于家屈遵字子度昌黎徒河人也博學多才藝名著當時為慕容永尚書僕射永滅垂以為博陵令道武南伐車駕將幸魯口博陵太守申永南奔河外高陽太守崔宏東走海濵屬城長史率多逃竄遵獨告其吏民曰往年寶師大敗今兹垂征不還天之棄燕人弗支也魏帝神武命世寬仁善納御衆百萬號令若一此湯武之師吾欲歸命爾等勉之勿遇嘉運而為禍先道武素聞其名拜中書令出納王言兼總文誥中原既平賜爵下蔡子卒子須襲爵除長樂太守進爵信都侯卒贈昌黎公諡曰恭須長子恆字長生沈粹有局量歷位尚書右僕射加侍中以破平涼功賜爵濟北公太武委以大政車駕出征常居中留鎮與襄城公盧魯元俱賜甲第太平真君四年墜馬卒時帝幸隂山景穆遣使乘傳奏狀帝甚悼惜之謂使人曰汝等殺朕良臣何用乘馬遂令步歸贈征西大將軍諡曰成公子道賜襲爵道賜善騎射機辨有辭氣太武甚器之位尚書右僕射加侍中卒諡曰哀公子拔襲爵帝追思其祖父拔年十四以為南部大人時太武南伐禽守將胡盛之以付拔拔酒醉不覺盛之逃走太武令斬之將伏鑕帝愴然曰若鬼有知長生問其子孫朕將何以應之乃赦拔後獻文以其功臣子孫拜營州刺史張蒲字元則河內修武人也本名謨漢太尉延之後父攀仕慕容垂位兵部尚書以清方稱蒲少有父風頻涉文史以端謹見知為慕容寶尚書左丞道武定中山寶之官司敘用者多降品秩帝既素聞蒲名仍拜為尚書左丞天興中以蒲淸謹方正遷東部大人明元即位為內都大官賜爵泰昌子參決庶獄私謁不行號為公正改為壽張子泰恆初丁零翟猛雀驅逼吏民入白𡼏山謀為大逆詔蒲與冀州刺史長孫道生等往討之道生等欲徑擊以大兵蒲曰邊民所以從猛雀者非樂亂也皆逼凶威耳今若直以大軍臨之吏民雖欲返善其道無由又懼誅夷必并勢而拒官軍然後入山恃阻未易圖也不如遣使喻之則民必喜而俱降矣道生等以為然具以奏聞詔蒲往慰諭丁零乃下數千家還其本屬蒲皆安集之猛雀與親黨百餘人奔逃追之斬首送京師太武即位以蒲清貧妻子衣食不給乃出為湘州刺史扶弱抑強進善黜惡風教大行始光三年卒於州年七十二吏民痛惜之蒲在謀臣之列屢出為將朝廷淸論常為稱首贈平東將軍廣平公諡曰文恭子昭襲以軍功進爵修武侯位幽州刺史以善政見稱谷渾字元沖昌黎人也父衮膂力兼人彎弓三百斤勇冠一時仕慕容垂至廣武將軍渾少有父風任俠好氣晚乃折節授經業遂覽羣籍被服類儒者道武時以善𨽻書為內侍左右太武即位纍遷侍中安南將軍領儀曹尚書賜爵濮陽公渾正直有操行性不苟合趣舍不與己同者視之蔑如也然愛重舊故不以富貴驕人時人以此稱之在官廉直為帝所器重詔以渾子孫年十五以上悉補中書學生延和二年春卒太武悼惜之親臨其喪贈賜豐厚諡曰文宣子闡字崇基襲爵位外都大官卒諡曰簡公子洪字元孫位尚書賜爵滎陽公性貪奢僕妾衣服錦綺時獻文舅李峻等初至官給衣服洪輒截沒為有司所糾并窮其前後贓罪伏法子頴位太府少卿卒贈營州刺史諡曰貞子士恢字紹達位鴻臚少卿封元城縣侯有寵於帝太后嬖幸鄭儼懼紹達間構於帝因言次以紹逹為州紹達耽寵不願出太后誣其罪殺之渾曾孫楷性酷暴列在酷吏傳中公孫表字元元燕郡廣陽人也為慕容沖尚書郎慕容垂破長子從入中山慕容寶走乃歸為博士初道武以慕容垂諸子分據勢要權柄推移遂至亡滅表詣闕上韓非書二十卷道武稱善明元初賜爵固安子河西郡飢劉武反於上黨詔表討之為胡所敗帝深銜之泰恆七年宋武帝殂時議取河南侵地以奚斤為都督以表為吳兵將軍廣州刺史表既克滑臺遂圍虎牢車騎次汲郡始昌子蘇坦太史令王亮奏表置軍虎牢東不得形便之地故令賊不得滅明元雅好術數又積前忿及攻虎牢士卒多傷乃使人夜就帳中縊殺之以賊未退祕而不宣初表與勃海封愷友善後為子求愷從女愷不許表甚銜之及封氏為司馬國璠所逮帝以舊族欲原之表證其罪乃誅封氏表外和內忌時人以此薄之表本與王亮同營署及其出也輕侮亮故及於死第二子軌字元慶明元時為中書郎出從征討補諸軍司馬太武平赫連昌引將帥入其府藏各令任意取金玉諸將取之盈懷軌獨不取帝把手親探金賜之謂曰卿臨財廉朕所以增賜者欲顯廉於衆人後兼大鴻臚持節拜立氐楊元為南秦王及境元不郊迎軌數元無蕃臣禮元懼詣郊受命使還稱旨拜尚書賜爵燕郡公出為虎牢鎮將初太武將北征發驢以運糧使軌部調雍州軌令驢主皆加絹一匹乃與受之百姓語曰驢無強弱輔脊自壯衆共嗤之坐徵還卒軌既死帝謂崔浩曰吾過上黨父老皆曰公孫軌為將受貨縱賊使至今餘姦不除軌之罪也其初來單馬執鞭及去從車百兩載物而南丁零渠帥乘山罵軌軌怒取罵軌者之母以矛刺其陰而死之曰何以生此逆子從下到劈分磔四支於山樹上是忍行不忍之事軌幸而早死至今在者吾必族誅之軌終得娶封氏生子睿字叔文位儀曹長賜爵陽平公時獻文於苑內立殿敇中祕羣官制名睿奏曰臣聞至尊至貴莫崇於帝王天人挹損莫大於謙光臣愚以為宜曰崇光奏可卒於南部尚書諡曰宣睿妻崔浩弟女也生子良字遵伯聰明好學為尚書左丞為孝文所知遇良弟衡字道津良推爵讓之仕至司直良以别功賜爵昌平子子崇基襲軌弟質字元直有經義為中書學生稍遷博士太武征涼州留宜都王穆壽輔景穆時蠕蠕乘虛犯塞京師震恐壽雅信任質為謀主質性好卜筮卜筮者咸云必不來故不設備由質幾敗國後屢進讜言超遷尚書卒贈廣陽侯諡曰恭第二子邃字文慶位南部尚書封襄平伯出為靑州刺史以邃在公遺迹可紀下詔褒述卒官孝文在鄴宫為之舉哀時百度唯新靑州佐吏疑為邃服詔曰専古也理與今違専今也大乖曩義當斟酌兩途商量得失民吏之情亦不可苟順也主簿云近代相承服斬過葬便可如故自餘無服大成寥落可準諸境內之人為齊衰三月子同始襲爵卒於給事中邃睿為從父兄弟睿才器小優又封氏之甥崔氏之壻邃母鴈門李氏地望懸隔巨鹿太守祖季真多識北方人物每云士大夫當須好婚親二公孫同堂兄弟耳吉凶會集便有士庶之異張濟字士度西河人也父千秋慕容永驍騎將軍永滅來奔道武善之拜建節將軍賜爵成紀侯濟涉獵書傳清辨美容儀道武愛之引侍左右與公孫表等俱為行人拜散騎侍郎先是姚興遣將攻洛陽晉雍州刺史楊佺期遣使乞師於常山王遵遵以狀聞帝遣濟為遵從事即報之濟自襄陽還帝問濟江南之事濟對曰司馬昌明死子德宗代立所部州鎮迭相攻擊今雖小定君弱臣強全無綱紀臣至襄陽佺期問臣魏初伐中山幾十萬衆臣答四十餘萬佺期曰魏被甲戎馬可有幾匹臣答中軍精騎十有餘萬外軍無數佺期曰以此討羌豈足滅也又曰魏定中山徙幾户於北臣答七萬餘家佺期曰治在何城臣答都平城佺期曰有如許大衆亦何用城為又曰魏帝為欲久都平城將復遷乎臣答非所知也佺期聞朝廷不都山東貌有喜色曰晉魏通和乃在往昔非唯今日羌寇狡猾頻侵河洛夙夜憂危今此寡弱倉庫空竭與君便為一家義無所諱洛城救援仰恃於魏若獲保全當必厚報與其為羌所乘無寧使魏取之道武嘉其辭順乃厚賞其使許救洛陽後遷謁者僕射報使姚興以纍使稱旨拜勝兵將軍頻從車駕北伐濟謀功居多賞賜奴婢百口馬牛數百羊二千餘口天賜五年卒子多羅襲爵坐事除李先字容仁中山盧奴人少好學善占相及推步之術先仕苻堅堅國亂慕容永迎為謀主勸永據長子城仕永位祕書監永為垂所滅徙中山皇始初先於井陘歸道武道武問先曰卿何國人先曰臣本趙郡平棘人帝曰朕聞中山土廣民庶信爾以否先曰臣少官長安仍仕長子後乃還鄉觀其民土實自衆廣又謂曰朕聞長子中有李先者卿其是乎先曰小臣是也帝曰卿識朕不先曰陛下聖德膺符澤被八表龍顔挺特臣安敢不識帝又問曰卿祖父及身悉歷何官對曰臣大父重晉平陽太守大將軍右司馬父懋石虎樂安太守左中郎將臣苻丕尚書右主客郎慕容永祕書監高密侯帝曰慕容永時卿用兵不先曰臣蒙顯任實參兵事帝以其言無隱情故用之後為衛王儀府左長史從儀平鄴到義臺破慕容驎軍回定中山先每一進䇿所向克平車駕還代以先為尚書右中兵郎帝問先曰今蠕蠕屢來犯塞朕欲討之何如先曰蠕蠕不識天命竄伏荒朔屢來偷竊驚動邊民陛下神武威德遐振舉兵征之必將摧殄車駕於是北伐大破蠕蠕賞先奴婢馬牛羊等轉七兵郎遷博士定州大中正帝問先曰天下何者最善可以益人神智對曰唯有經書三墳五典治化之要可以補王者神智又問曰天下書籍凡有幾何朕欲集之如何可備對曰伏羲創制帝王相承以至於今陛下誠欲集之嚴制天下搜索備送所司主之所好集亦不難帝於是班制天下經籍稍集太武之討姚興於柴壁也問先曰興屯天渡分據柴壁相為表裏今欲殄之計將安出先對曰臣聞兵以正合戰以竒勝如聞姚興欲屯兵天渡利其糧道及未到之前遣竒兵先邀天渡柴壁左右嚴設伏兵備其表裏以陛下神䇿觀時而動興欲進不得退又乏糧夫高者為敵所棲深者為敵所囚兵法所忌而興居之可不戰而取帝從其計興果敗歸明元即位問左右曰舊臣之中為先帝所親信者有誰時新息公王洛兒對曰有李先者為先帝所知俄而召先問曰卿有何功行而蒙先帝所識先對曰臣無才行惟以忠直奉上於是命讀韓子連珠論二十二篇太公兵法十一事詔有司曰先所知者皆軍國大事自今常宿於內賜先綿絹雜綵及御馬一匹拜安東將軍壽春侯賜𨽻户二十二詔先與上黨王長孫道生率師襲馮跋乙連城克之悉虜其衆乃進討和龍先言於道生曰宜密使兵人人備青草一束負之以填塞城塹攻其西南絶其外援勒兵急攻賊必可禽道生不從遂掠民而還後出為武邑太守有治名太武即位召為內都大官神麚二年卒年九十五詔賜金縷命服一襲贈定州刺史中山公諡曰文懿子國襲爵國子鳳中書博士鳳子預字元凱少為中書學生聰敏強識涉獵經史太和初歷祕書令齊郡王友出為征西大將軍長史帶馮翊太守積數年府解罷郡遂居長安每羡古人餐玉之法乃採訪藍田躬往攻掘得若環璧雜器形者大小百餘枚頗有粗黑者亦篋盛以還至而觀之皆光潤可玩預乃椎七十枚為屑日服食之餘多惠人後預及聞者更求玉於故處皆無所見馮翊公源懷弟得其玉琢為器佩皆鮮明可寶預服經年云有效驗而世事寢食並不禁節又加之好酒損志及疾篤謂妻子曰服玉屏居山林排棄嗜欲或當有大神力而吾酒色不絶自致於死非藥過也尸體必當有異於人勿速殯令後人知餐服之妙時七月中旬長安毒熱預停尸四宿而體色不變其妻常氏以玉珠二枚唅之口閉不開常氏謂之曰君自云餐玉有神驗何故不受唅也言訖齒啓納珠因噓屬其口都無穢氣舉斂於棺堅直不傾委時猶有遺屑數升囊盛納諸棺中先少子皎天興中密問先曰子孫永為魏臣將復事他姓邪先曰國家政化長逺不可紀極皎為寇謙之弟子遂服氣絶粒數十年隱於恆山年九十餘顔如少童一旦沐浴冠帶家人異之俄而坐卒道士咸稱其得尸解仙道皎孫義徽太和中以儒學博通有才華補清河王懌府記室箋書表疏文不加點清典贍速當世稱之又為懌撰輿地圖及顯忠録性好老莊甚嗤釋教靈太后臨朝屬有沙門惠憐以呪水飲人云能愈疾百姓奔湊日以千數義徽白懌稱其妖妄懌令義徽草奏以諫太后納其言元乂惡懌徙義徽都水使者俄而懌被害因棄官隱於大房山少子蘭以純孝著聞不受辟召孝昌中旌表門閭正光中文宣王亶嗣位思義徽雅正惇篤薦其孫景儒位至奉車都尉自皇始至齊受禪百五十嵗先之所言有明徴焉景儒子昭徽博涉稽古脫略不羈時人稱其為播郎因以字行於燕趙焉善談論有宏辨屬文任氣不拘常則志好隱逸慕葛洪之為人尋師訪道不逺千里遇高尚則傾蓋如故見庸識雖王公蔑如也初為道士中年應詔舉為高唐尉隋大業中將妻子隱於嵩山號黃冠子有文集十卷為學者所稱賈彛字彥倫本武威姑臧人也六世祖敷魏幽州刺史廣川都亭侯子孫因家焉父為苻堅巨鹿太守坐訕謗繫獄彛年十嵗詣長安訟父獲申逺近嘆之僉曰此子英英賈誼之後莫與之京弱冠為慕容垂遼西王農記室參軍道武先聞其名遣使者求彛於垂垂彌增器重垂遣其太子寶來寇大敗於參合執彝及其從兄代郡太守潤等道武即位拜尚書左丞參預國政天賜末彛詣溫湯療疾為叛胡所掠送於姚興積數年遁歸又為赫連屈丐所執拜祕書監太武平赫連昌子秀迎其尸柩葬於代南秀位中庶子賜爵陽都男本州大中正獻文即位進爵陽都子時丞相乙渾妻庶姓而求公主之號屢言于秀秀默然後因公事就第見渾渾夫妻同坐厲色曰爾管攝職事我無所不從我請公主何意不應秀慷慨大言對曰公主之稱王姬之號尊寵之極非庶姓所宜秀寧就死於今朝不取笑於後日渾左右莫不失色為之震懼秀神色自若渾夫妻默然含忿他日乃書太醫給事楊惠富臂作老奴官慳字令以示秀渾每欲伺隙陷之會渾伏誅遂免難時秀與中書令渤海高允俱以儒舊重於時皆選擬方嶽以詢訪被留各聽長子出為郡秀固讓不受許之自始至終歷奉五帝雖不至大官常當機要廉清儉約不營資産年七十三詔給醫藥賜几杖時朝廷舉動大事不決每遣尚書高平公李敷就第訪決卒贈冀州刺史武邑公諡曰簡子俊字異鄰襲爵位荆州刺史依例降爵為伯先是上洛置荆州後改為洛州州在重山人不知學俊表置學官在州五載清靜寡事為吏民所安卒贈兖州刺史子叔休襲爵潤曾孫禎字叔願學涉經史居喪以孝聞太和中以中書博士副中書侍郎高聰使江左還以母老患輒在家定省坐免官後為司徒咨議參軍通直散騎常侍加冠軍將軍卒贈齊州刺史禎兄子景俊亦以學識知名為京兆王愈府外兵參軍愈起逆於冀州將授其官不受死之贈河東太守諡曰貞景俊弟景興清峻鯁正為州主簿遂栖遲不仕後葛榮陷冀州稱疾不拜景興每捫膝而言曰吾不負汝以不拜榮也竇瑾字道瑜頓邱衛國人自云漢司空融之後也高祖成頓邱太守因家焉瑾少以文學知名自中書博士為中書侍郎賜爵繁陽子參軍國謀屢有功進爵衛國侯轉四部尚書初定三秦人心未附拜長安鎮將毗陵公在鎮八年甚著威惠徵為殿中都官尚書太武親待之賞賜甚厚從平蓋吳吳平留瑾鎮長安還京復為殿中都官典左右執法太武歎曰國之良輔毗陵公之謂矣出為冀州刺史清約沖素著稱當時還為內都大官興光初瑾女壻鬱林公司馬彌陀以選尚臨涇公主瑾教彌陀辭託有誹謗呪詛之言與彌陀同誅唯少子遵逃匿得免遵善楷篆北京諸碑及臺殿樓觀宫門題署多遵書為濮陽太守多所受納其子僧演姦通人婦為部人賈邈告坐免後以善書拜庫部令卒官李欣字元盛小名真奴范陽人也曾祖産産子績二世知名於慕容氏父崇馮跋吏部尚書石城太守延和初車駕至和龍崇率十餘郡歸降太武甚禮之呼曰李公以崇為北幽州刺史固安侯卒諡曰襄侯欣母賤為諸兄所輕崇曰此子之生相者言貴吾每觀察或未可知遂使入都為中書學生太武幸中書學見而異之指謂從者曰此小兒終效用於朕之子孫因識眄之帝舅陽平王杜超有女將許貴戚帝謂超曰李欣後必宦逹益人門户可以妻之遂勸成婚南人李哲常言欣必貴達杜超之死也帝親哭三日欣以超女壻得在喪位出入帝指謂左右曰觀此人舉動豈不有異於衆必為朕家幹事之臣欣聰敏機辨強記明察初李靈為文成博士詔崔浩選中書學生器業優者為助教浩舉其弟子箱子與盧度世李敷三人應之給事高讜子祐尚書假霸兒姪等以浩為阿黨其親戚言於景穆景穆以浩為不平聞之於太武太武意在欣曰云何不取幽州刺史李崇老翁兒浩遂對曰前亦言欣合選但以其先行在外故不取之帝曰可待欣還箱子等罷之遂除中書助教博士稍見任用入授文成經文成即位欣以舊恩親寵遷儀曹尚書領中祕書賜爵扶風公賜其母孫氏為容城君帝顧謂羣臣曰朕始學之嵗情未能専既總萬機溫習靡暇是故儒道實有闕焉豈惟豫咎抑亦師傅之不勤所以爵賞仍隆者蓋不遺舊也欣免冠拜謝出為安南將軍湘州刺史為政清簡明於折獄姦盜止息百姓稱之欣上疏求於州郡各立學官使士望之流衣冠之胄就而受業其經藝通明者上之王府獻文從之以欣治為諸州之最加賜衣服自是遂有驕矜自得之志乃受納民財物商胡珍寶兵人告言尚書李敷與欣少長相好每左右之或有勸敷奏聞敷不許獻文聞欣罪狀檻車徵欣栲劾抵罪時敷兄弟將見踈斥有司諷欣以中旨嫌敷兄弟之意令欣告列敷等隱罪可得自全欣深所不欲且弗之知也乃謂其女壻裴攸曰吾與李敷族世雖逺情如一家在事既有此勸昨來引簪自刺以帶自絞而不能致絶且亦不知其事攸曰何為為他死敷兄弟事釁可知有馮闌者先為敷殺其家切恨之但呼闌弟問之足可知委欣從其言又趙郡范檦具條敷兄弟事狀有司以聞敷坐得罪詔列欣貪冒應死以糾李敷兄弟得降鞭百髠刑配為厮役欣之廢也平壽侯張讜見欣與語竒之謂人曰此佳士也終不久屈未幾而復為太倉尚書攝南部事用范檦陳策計令千里之外户别轉運詣倉輸之使者所在委滯停延嵗月百姓競以貨賄各求在前於是逺近大為困弊道路羣議曰畜聚斂之人未若盜臣欣弟左軍將軍璞謂欣曰范檦善能降人以色假人以辭未聞德義之言但有勢利之説聽其言也甘察其行也賊所謂諛諂讒慝貪冒姦佞不早絶之後悔無及欣不從彌信之腹心之事皆以告檦欣既寵於獻文參決軍國大議兼典選舉權傾內外百寮莫不曲節事之檦以無功起家盧奴令承明元年六月獻文崩欣遷司空進爵范陽公七月以欣為侍中鎮南大將軍開府儀同三司徐州刺史范檦知文明太后之忿欣也又知內外疾之太和元年希旨告欣外叛文明太后徴欣至京師詰其叛狀欣曰無之引檦證欣欣言爾妄云知我吾又何言雖然爾不顧豫之厚德而忍為此不仁甚矣檦曰公德於檦何若李敷之德於公公昔忍於敷檦今敢不忍公乎欣慨然曰吾不用璞言自貽伊戚萬悔於心何嗟及矣遂見誅璞字季直性敦厚多識人物賜爵宜陽侯位太常卿袁式字季祖陳郡夏陽人漢司徒滂之後父淵晉侍中式在南歷武陵王遵咨議參軍及劉裕執權式歸姚興及姚泓滅歸魏為上客賜爵陽夏子與司徒崔浩一靣便盡國士之交時朝儀典章悉出於浩浩以式博於故事每所草創恆顧訪之性長者雖羈旅飄泊而清貧守度不失士節時人甚敬重之呼曰袁咨議至延和三年衛大將軍樂安王範為雍州刺史詔式與中書侍郎高允俱為從事郎中辭而獲免式沉靖樂道周覽書傳至於詁訓倉雅偏所留懷作字釋未就以天安二年卒贈豫州刺史諡肅侯子濟襲位魏郡太守政有清稱加寧逺將軍子姪遂居潁川之陽夏唐和字稚起晉昌宜安人也父繇以涼土喪亂民無所歸推隴西李皓於敦煌以寧一州李氏為沮渠蒙遜所滅和與兄契擕外甥李寶避難伊吾招集民衆二千餘家臣於蠕蠕蠕蠕以契為伊吾王經二十年和與契遣使來降為蠕蠕所逼遂擁部落至於高昌蠕蠕遣部帥阿若率騎討和至白力城和率騎五百先攻高昌契與阿若戰殁和收餘衆奔前部王國時沮渠安周屯橫截城和攻拔之斬安周兄子樹又克高寧白力二城斬其戍主遣使表狀世祖嘉其誠欵屢賜和和後與前部王車伊洛擊破安周斬首三百世祖遣成周公萬度歸討焉耆詔和與伊洛率所領赴度歸和奉詔會度歸喻下柳驢以東六城因共擊波居羅城拔之後同征龜兹度歸令和鎮焉耆時柳驢戍主乙真伽率諸胡將據城而叛和領輕騎一百匹入其城擒乙真伽斬之由是諸胡款附西域克平和有力也正平元年和詣闕世祖優寵之待以上客高宗以和歸誠先朝封酒泉公太安中為濟州刺史甚有稱績徵為內都大官評決獄訟不加捶楚察疑獲實者甚多世以是稱之卒贈征西大將軍太常卿酒泉王諡曰宣子欽字孟直中書學生襲爵太和中拜鎮南將軍長安鎮副將轉陜州刺史降爵為侯卒子景宣襲卒於東郡太守契子元達性果毅有父風與叔父和歸闕俱為上客封晉昌公獻文時位華州刺史太和十六年降為侯子崇字繼祖襲爵寇讚字奉國上谷人也因難徙馮翊萬年父修之字延期苻堅東萊太守讚弟謙之有道術太武敬重之故追贈修之安西將軍秦州刺史馮翊公賜命服諡曰哀公詔秦雍二州為立碑墓又贈修之母為馮翊夫人及宗從追贈太守縣令侯子男者十六人其臨職者七郡五縣讚少以淸潔知名身長八尺姿容嚴嶷非禮不動苻堅僕射韋華州里高達雖年時有異恆以風味相待華為馮翊太守召為功曹後除襄邑令姚泓滅秦雍民千餘家推讚為主歸魏拜河南郡太守其後秦雍人來奔河南滎陽河內者户至萬數拜讚綏逺將軍南雍州刺史軹縣侯於洛陽立雍之郡縣以撫之由是流民襁負自逺而至參倍於前賜讚爵河南公加安南將軍領南蠻校尉仍刺史分洛豫二州之僑郡以益之讚雖位高爵重而接待不倦初讚之未貴也嘗從相者唐文相文曰君額上黑子入幘位當至方伯封公及其貴也文以民禮拜謁仍曰明公頗憶疇昔之言乎讚延文坐曰往時卿言杜瓊不得官長人咸謂不然及瓊被選為盩厔令卿猶言相中不見瓊果以暴疾未拜而終昔魏舒見主人兒死自知己必至公吾常以卿言瓊之驗亦復不息此望也乃賜文衣服良馬讚在州十七年甚獲公私之譽年老表求致仕太平真君九年卒遺令薄葬斂以時服年八十六太武悼惜之諡曰宣穆子元寶襲爵元寶弟臻字仙勝年十二遭父憂居喪以孝稱輕財好士獻文末為中州太守時馮熙為洛州刺史政號貪虐仙勝微能附之甚得其意後為𢎞農太守坐受納為御史所劾遂廢卒於家子祖訓順陽太守祖訓弟祖禮並孝友敦穆白首同居父母亡雖久猶於生平所處堂宇備設幃帳几杖以時節開堂列拜垂涕陳薦若宗廟然吉凶之事必先啓告逺出行反亦如之祖禮宣武末為河州刺史在任數年遇郤鐡忽反又為城人詣都列其貪伏十六條會赦免久之兼廷尉卿又兼尚書畏避勢家承顔候色不能有所執據後蠻反於三鴉為都督追討戰殁贈衛大將軍七兵尚書雍州刺史昌平男祖禮弟俊列在周史酈範字世則范陽涿鹿人也祖紹慕容寶濮陽太守以郡迎降道武授兖州監軍父嵩天水太守範太武時給事東宫太武踐阼追録先朝舊勳賜爵永寧男以奉禮郎奉遷太武景穆神主於太廟進爵為子為征南大將軍慕容白曜司馬及定三齊範多進䇿白曜皆用其謀遂表為靑州刺史進爵為侯加冠軍將軍還為尚書右丞後除平東將軍靑州刺史假范陽公範前解州還京也夜夢隂毛拂踝他日説之時齊人有占夢者史武進云公豪盛於齊下矣使君臨撫東秦道光海岱必當重牧全齊再祿營邱矣範笑言曰吾將為卿必驗此夢果如言時鎮將元伊利表範與外賊交通孝文詔範曰鎮將伊利表卿造船市玉與外賊交通規陷卿罪窺覦州任有司推驗虛實自顯有罪者今伏其辜矣卿其明為算略勿復懷疑還朝卒於京師諡曰穆子道元知名道元為政酷虐列在酷吏傳中道元弟道愼字善季涉歷史傳有幹局位正平太守有能名遷長樂相卒贈平州刺史道愼弟道約字善禮朴質遲鈍頗愛琴書性多造請好以榮利干謁乞丐不已多為人所笑弄坎壈於世不免飢寒晚歷東萊魯陽二郡太守為政清靜吏民安之範弟道峻子惲字幼和好學有文才尤長吏幹舉秀才射䇿高第歷位尚書外兵郎行臺長孫承業引為行臺郎惲頗兼武用恆以功名自許每進計於承業多見納用以功賞魏昌縣子惲在軍啓求減身官爵為父請贈詔授征虜將軍安州刺史惲後與唐州刺史崔元珍固守平陽爾朱榮稱兵赴闕惲與元珍不從為榮行臺郎中樊子鵠所攻城陷被害所作文章頗行於世撰慕容氏史未及成而殞子懷則司空長流參軍韓秀字伯武昌黎人也祖宰慕容俊謁者僕射父景皇始初歸魏拜宣威將軍騎都尉秀歷位尚書郎賜爵遂昌子文成稱秀聰敏清辨才任喉舌遂命出納王言并掌機密行幸遊獵隨侍左右獻文即位轉給事中參征南慕容白曜軍事延興中尚書奏以敦煌一鎮介逺西北寇賊路衝慮或不固欲移就涼州羣臣會議僉以為然秀獨曰此蹙國之事非闢土之良愚謂敦煌之立其來已久雖鄰強寇而兵民素習循常置戍足以自全若就姑臧慮人懷異意或貪留重遷情不願徙脫引寇內侵深為國患且捨逺就近遙防有闕一旦廢罷是啓戎心則夷狄交構互相來往關右荒擾烽警不息邊役煩興艱難方甚乃從秀議後為平東將軍靑州刺史卒子務襲爵務字道世性端謹有吏幹為定州平北長史頗有受納為御史中尉李平所劾付廷尉會赦免後除龍驤將軍郢州刺史務獻七寶牀象牙席詔曰昔晉武帝焚雉頭裘朕常嘉之今務所獻亦此之流也竒麗之物有乖風素可付其家人後以詐表破賊免官久之拜太中大夫進號左將軍卒堯暄字辟邪上黨長子人也本名鐘葵後賜名暄祖僧賴道武平中山與趙郡吕含首來歸國暄聰了美容貌為千人軍將太武以其恭謹擢為中散後兼比部尚書于時始立三長暄為東道十三州使更比户籍賜獨車一乘廄馬四匹暄前後從征及出使檢案三十許度皆有克己奉公之稱賞賜衣服綵絹奴婢等物賜爵平陽伯及改置百官授太僕卿轉大司農卒於平城孝文為之舉哀贈相州刺史初暄至徐州見州城樓觀嫌其華盛乃令往往毁撤由是後更損落及孝文幸彭城聞之曰暄猶可追斬長子洪襲爵洪子傑字永壽元象中開府儀同三司樂城縣公洪弟遵位臨洮太守卒諡曰思遵弟榮位員外散騎侍郎子雄字休武少驍果輕財重氣位燕州刺史平城縣伯隨爾朱兆與齊神武戰敗於廣阿率所部據定州歸神武其從兄傑為兆滄州刺史亦遣使降神武以其兄弟俱有誠款即用傑為行瀛州事用雄代傑為瀛州刺史進爵為公時禁網疏漏官司相與聚斂唯雄義然後取接下以恩甚為吏民所懷孝武帝入關雄為大都督隨高昂破賀拔勝於穰城乃除豫州刺史元洪威據潁川叛叛人趙繼宗殺潁川太守卲招據洛口北應洪威雄討之繼宗敗走城內因雄之出據州引西魏雄復與行臺侯景討平之梁將李洪芝王當伯襲破平鄉城雄擊禽之又破梁司州刺史陳慶之復圍南荆州東救未至雄陷其城梁以元慶和為魏王侵擾南境雄大破之於南頓尋與行臺侯景破梁楚城豫州人上書更乞雄為刺史復行豫州事潁州長史賀若統執刺史田迅據州降西魏詔雄與廣州刺史趙育揚州刺史是寶隨行臺任祥攻之西魏將怡峯敗祥等育寶各還據城降敵雄收散卒保大梁周文遣其右丞韋孝寬等攻豫州雄都督程多寶降之執刺史馮雍并雄家屬及部下妻子數千口欲送長安至樂口雄外兵參軍王恆伽都督赫連俊等從大梁邀之斬多寶收雄家口還大梁雄别破樂口遂乘勝進討懸瓠復以雄行豫州事西魏以是寶為揚州刺史據項城義州刺史韓顯據南頓雄一日拔其二城禽顯及長史嶽寶遁走加驃騎大將軍儀同三司仍遣侯景平魯陽復除豫州刺史雄雖武將性質寬厚為政舉其大綱而已在邊十年屢有功績愛好人物多所施與人亦以此稱之興和四年卒於鄴贈司徒諡曰恭子師嗣柳崇字僧生河東解人也七世祖軌晉廷尉卿崇方雅有器量身長八尺美鬚明目兼有學行舉秀才射䇿高第解褐太尉主簿轉尚書右外兵郎中于時河東河北二郡爭境其間有鹽池之饒虞坂之便守宰百姓皆恐外割公利朋競紛囂臺府孝文乃遣崇檢斷上下息訟屬荆郢新附南寇窺擾又詔崇持節與州郡經略加慰喻還遷太子洗馬本郡中正纍遷河中太守崇初屆郡郡人張明失馬疑執十餘人崇見之不問賊事人别借以溫顔更問其親老存否農業多少而微察其辭色即獲真賊吕穆等二人餘皆放遣郡中畏服境內帖然卒於官贈岐州刺史諡曰穆崇所制文章寇亂遺失長子慶和性沈靜不競於時位給事中本郡中正卒慶和弟楷字士則身長八尺善草書頗涉文史位撫軍司馬陸俟代人也曾祖幹祖引世領部落父突道武初率部人從征伐數有戰功位離石鎮將上黨太守關內侯俟少聰慧明元踐阼襲爵關內侯位給事中典選部蘭臺事當官無所撓太武征赫連昌詔俟督諸軍鎮以備蠕蠕與西平公安頡攻克虎牢賜爵建鄴公拜冀州刺史時考州郡惟俟與河內太守邱陳為天下第一轉虎牢鎮將平涼休屠金崖羌狄子玉等叛復轉為安定鎮大將追討崖等皆獲之遷懷荒鎮大將未期高車諸莫弗訟俟嚴急復請前鎮將郎孤太武許之徴俟俟至京朝見言不過周年孤身必敗高車必叛帝疑不實切責之以公歸第明年諸莫弗果殺孤以叛帝聞之大驚召俟問其故俟曰夫高車之俗上下無禮無禮之人難為其上臣涖之以威嚴節之以憲綱欲漸加訓導使知分限而惡直醜正實繁有徒故訟臣無恩稱孤之美孤獲還鎮欣其名譽必加恩於百姓譏臣為失専欲以寬惠臨之仁恕待之無禮之人易生陵慠不過期年無復上下既無上下然後收之以威則人懷怨憝怨憝既多敗亂彰矣帝嘆曰卿身乃短慮何長也即日復除散騎常侍帝征蠕蠕破涼州常隨駕别督輜重又與高涼王那復渡河南略地仍遷長安鎮大將與高涼王那擊蓋吳於杏城獲吳二叔諸將欲送京師俟獨不許曰若不斬吳恐長安之變未巳一身藏竄非其親信誰能獲之若停十萬衆追一人非上䇿也不如私許吳叔免其妻子使自追吳諸將咸曰今獲其二叔唯吳一人何所復至俟曰諸軍不見毒蛇乎不斷其頭猶能為害况除腹心之疾而曰必遺其類可乎遂捨吳二叔與之期及期吳叔不至諸將皆咎俟俟曰此未得其便耳必不背也後數日果斬吳以至皆如其言俟之明略獨決皆此類也遷內都大官安定盧水胡劉超等叛太武以俟威恩被關中詔以本官加都督秦雍諸軍鎮長安帝曰超等恃險不順王命朕若以重兵與卿則超等必合為一若以輕兵與卿則不能制今使卿以方略定之於是俟單馬之鎮既至申揚威信示以成敗超猶無降意俟乃率其帳下見超超使人逆曰三百人以外當以弓馬相待三百人以內當以酒食相供乃將二百騎詣超超備甚嚴遂縱酒盡醉而還後為偽獵詣超與士卒約曰今會發機當以醉為限俟乃詐醉上馬大呼斬超首士卒應聲縱擊遂平之帝大悅徴拜外都大官文成踐阼以子麗有定策勳進爵東平王薨年六十七諡成王有子十二人長子馛多智有父風文成見而悅之謂朝臣曰吾常嘆其父智過其軀是復踰於父矣少為內都下大夫奉上接下行止取與每能逆曉人意與其從事者無不愛之興安初賜爵聊城侯出為相州刺史假長廣公為政清平抑強扶弱州中有德宿老名望素重者以友禮待之詢之政事責以方略如此者十人號曰十善又簡取諸縣強門百餘人以為假子誘接甚勤賜以衣服令各歸家為耳目於是發姦擲伏事無不驗百姓以為神明無敢劫盜者在州七年家至貧約徵為散騎常侍百姓乞留馛者千餘人獻文不許謂羣臣曰馛之善政雖古人何以加之賜絹五百匹奴婢十口馛之代還也吏民大斂布帛以遺之馛皆不受吏民亦不取於是以此物起佛寺因名長廣公寺後襲父改封建安王時宋司州刺史常珍竒以懸瓠城內附新人猶懷去就馛銜旨撫慰諸有陷軍為奴婢者馛皆免之百姓欣悅人情乃定車駕討蠕蠕詔馛為選部尚書録留臺事及獻文將禪位於京兆王子推任城王雲隴西王源賀並固諫馛抗言曰皇太子聖德承基四海瞻望不可橫議干國之紀臣請刎頸殿庭有死無二久之帝乃解詔曰馛直臣也其能保吾子乎遂以馛為太保與太尉源賀持節奉皇帝璽紱傳位于孝文延興四年薨贈以本官諡曰貞王馛有六子琇凱知名琇字伯琳馛第五子也母赫連氏身長七尺九寸甚有婦德馛有以爵傳琇之意琇年九嵗馛謂之曰汝祖東平王有十二子我為嫡長承襲家業今已年老屬汝幼沖詎堪為陸氏宗首乎琇對曰苟非鬬力何患童幼馛竒之遂立琇為世子馛薨襲爵琇沈毅少言雅好讀書以功臣子孫為侍御長纍遷祠部尚書司州大中正會從兄睿事免官景明初試守河內郡咸陽王禧謀反令子曇和等先據河內琇聞禧反斬曇和首時以琇不先送曇和禧敗始斬責其通情徴詣廷尉少卿崔振窮罪狀案琇大逆陸宗大小咸見收捕會將赦先斃於獄琇弟凱仍上書訴寃宣武詔復琇爵子景祚襲凱字智君謹重好學位太子庶子給事黃門侍郎凱在樞要十餘年以忠厚見稱後遇患頻上書乞骸骨除正平太守在郡七年號為良吏初孝文將議革變舊風大臣並有難色又每引劉芳郭祚等常與規謀共論政事而國戚謂遂踈已怏怏有不平之色帝乃令凱私喻之曰至尊但欲廣知前事直當問其古式耳終無寵彼而疏國戚舊人意乃稍解及兄琇陷罪凱亦被收遇赦乃免凱痛兄之死哭無時節目幾失明訴寃不已至正始初宣武復琇官爵凱大喜置酒集諸親曰吾所以數年中抱病忍死者顧門户計耳今願已遂吾事畢矣頃之卒贈龍驤將軍南靑州刺史諡曰惠長子暐字道暉與弟恭之並有時譽洛陽令賈禎見其兄弟嘆曰僕以年老更覩雙璧又嘗兄弟共候黃門侍郎孫惠蔚惠蔚謂諸賔曰不意二陸復在坐隅吾德謝張公無以延譽暐位尚書右户三公郎坐事免後除伏波將軍卒贈冠軍恆州刺史暐擬急就篇為悟蒙章及七誘十醉章表數十篇暐與恭之晚不和睦為時所鄙子元規位尚書郎元規子撥陰陽律厯多所通解位并州長流參軍恭之字季順有操尚位東荆州刺史贈吏部尚書諡曰懿恭之所著文章詩賦凡千餘篇子曄字仁崇篤志文學齊律序則仁崇之辭也位通直散騎常侍弟寬字仁惠太子中舍人待詔文林館寬兄弟並有才品議者稱為三虎馛弟歸位東宫舍人駕部校尉子珍夏州刺史贈太僕卿諡曰靜珍子旭性雅淡好易緯之學撰五星要訣及兩儀真圖頗得其旨要太和中徴拜中書博士稍遷散騎常侍知天下將亂遂隱於太行山屢徴不起卒後贈并汾恆肆四州刺史子騰仕周通顯有傳馛弟麗少以忠謹入侍左右太武特親昵之舉動審慎初無愆失賜爵章安子稍遷南部尚書太武崩南安王余立既而為常侍宗愛等所殺百寮憂懼莫知所為麗首建大議與殿中尚書長孫渴侯尚書源賀羽林中郎劉尼奉迎文成於苑中而立之社稷獲安麗之謀也由是受心膂之任在朝者無出其右興安初封平原王麗頻辭不聼乃啓讓與其父文成曰朕為天下主豈不能得二王封卿父子也以其父俟為車平王麗尋遷侍中撫軍大將軍司徒公復其子孫賜妻妃號麗以優寵既頻固辭不受帝益重之領太子太傅麗好學愛士常以講習為業性孝遭父憂毁瘠過禮和平六年文成崩先是麗療疾於代郡溫泉聞問欲赴左右止之曰宫車晏駕王德望素重姦臣若疾人譽慮有不測之禍麗曰安有聞君父之喪方慮禍難便馳赴初乙弗渾悖傲每為不法麗數諍之由是見忌害之諡曰簡王陪葬金陵孝文追録先朝功臣以麗配饗廟廷麗二妻長曰杜氏次張氏長子定國杜氏所生次睿張氏所出定國在襁褓文成幸其第詔養宫內至於遊止常與獻文同處年六嵗為中庶子及獻文踐阼拜散騎常侍賜爵東郡王定國以承父爵辭不許又以父爵讓弟睿乃聽之俄遷侍中儀曹尚書轉殿中尚書前後大駕征巡擢為行臺録都曹事超遷司空定國恃恩驕恣不循法度延興五年坐事免官爵為兵太和初復除侍中鎮南將軍秦益二州刺史復王爵八年薨於州贈以本官諡莊王子昕之字慶始風望端雅襲爵例降為公尚獻文女常山公主拜駙馬都尉歷通直郎景明中以從叔琇罪免官尋以主壻除通直散騎常侍歷兖靑二州刺史並有政績轉安北將軍湘州刺史卒贈鎮東將軍冀州刺史諡曰惠初定國娶河東柳氏生子安保後娶范陽盧度世女生昕之二室俱為舊族而嫡妾不分定國亡後兩子爭襲父爵僕射李沖有寵於時與度世子伯源婚親相好沖遂左右昕之昕之由是承爵尚主職位赫奕安保沈廢貧賤不免飢寒昕之容貌柔謹孝文以其主壻特垂眷昵宣武時年未四十頻撫三藩當世以此榮之昕之卒後母盧悼念傷過而亡公主奉姑有孝稱神龜初與穆氏琅邪長公主並為女侍中又姓不妬忌以昕之無子為納妾媵而皆育女公主有三女無男以昕之從兄希道第四子子彰為後子彰字明逺本名士沈年十六出後事公主盡禮丞相高陽王雍常言曰常山妹雖無男以子彰為兒乃過於自生矣正光中襲爵東郡公纍遷給事黃門侍郎子彰妻即咸陽王禧女禧誅養於彭城王第莊帝親之略同諸姊建義初爾朱榮欲循舊事庶姓封王由是封子彰濮陽郡王尋而詔罷仍復先爵天平中拜衛將軍潁州刺史以母憂去職元象中以本將軍除齊州刺史又加驃騎將軍行懷州事轉北豫州刺史仍除徐州刺史將軍並如故一年歷三州當世榮之還朝除衛大將軍右光祿大夫行瀛州事尋拜侍中復行滄州事進號驃騎大將軍行冀州事除侍讀兼七兵尚書行靑州事子彰初為州以聚斂為事晚節修改自行靑冀滄瀛甚有時譽加以虛己納物人士敬愛之除中書監卒贈開府儀同三司諡曰文宣子彰崇好道術曾嬰重病藥中須桑螵蛸子彰不忍害物遂不服焉其仁如此教訓六子雅有法度子卬有至性列在齊孝友傳中睿字思弼年十餘襲爵撫軍大將軍平原王沈雅好學折節下士年未二十時人便以宰輔許之娶東徐州刺史博陵崔鑒女時孝文尚未改北人姓鑒謂所親云平原王才度不惡但恨其姓名殊為重復睿婚自東徐還經鄴見李彪甚敬悅之仍與趣京以為館客後為北征都督擊蠕蠕大破之遷侍中都曹尚書時蠕蠕又犯塞詔睿討之追至石磧禽其帥赤阿突等數百人還加散騎常侍遷尚書左僕射領北部尚書十六年降五等之爵以麗勳著前朝封睿巨鹿郡公尋為使持節鎮北大將軍尚書令衛將軍討蠕蠕大破之而還以母憂解職孝文將有南伐之事以本官起授征南將軍睿固辭請終情禮勑有司敦喻不許復除使持節都督恆州刺史行尚書令時車駕南征睿上表諫帝不從睿又表請車駕還代親臨太師馮熙葬坐削奪都督三州諸軍事尋進號征北大將軍以有順遷之表加邑四百户時穆泰為定州刺史以疾病請恆州自效乃以睿為定州刺史未發遂與泰等同謀構逆賜死獄中聽免孥戮徙其妻子於遼西睿長子希道字洪度有風貌美鬚髯歷覽經史頗有文致初拜中散遷通直郎坐父事徙遼西於後得還從征自效以軍功賜爵淮陽男拜諫議大夫纍遷前將軍涇州刺史希道善於馭邊甚有威略轉平西將軍涇州刺史卒官贈撫軍將軍定州刺史希道有六子士懋字元偉天平中以其曾祖麗有翼戴之勳詔特復巨鹿郡公令士懋襲位營州刺史士懋弟士宗字仲彥尚書左外兵郎中士宗弟士述字幼文符璽郎中建義初並於河隂遇害士述弟士沈出繼叔昕之士沈弟士廉字季修建州平北府長史永安末爾朱世隆攻陷州城見害士廉弟士佩字季偉武定中安東將軍司州從事希道弟希悅尚書外兵郎中麗季弟騏驎侍御中散轉侍御史太和初新平太守子高貴孝昌中兖州鎮東府法曹參軍高貴子操字仲志高簡有風格早以學業知名雅好文操為兼散騎常侍聘梁使還遷廷尉卿齊文襄為世子甚好色崔季舒常為掌媒焉時薛置妻元氏有色迎入欲通之元氏正辭且哭世子使季舒送付廷尉罪之操曰廷尉守天子法須知罪狀世子怒召操命刀環築之更令科罪操終不撓乃口責之後徙御史中丞天保中卒於殿中尚書子孔璋武平中卒於高陽太守源賀西平樂都人私署河西王秃髮傉檀之子也傉檀為乞伏熾磐所滅賀自樂都來奔賀偉容貌善風儀太武素聞其名及見器其機辨賜爵西平侯加龍驤將軍謂賀曰卿與朕同源因事分姓今可為源氏自是從擊叛胡白龍又討吐京胡皆先登陷陳以功進號平西將軍太武征涼州以賀為鄉導問攻戰之計賀曰姑臧外有四部鮮卑各為之援然皆臣祖父舊人臣願軍前宣國威信必相率請降外援既服然後攻其城拔之如反掌耳帝曰善乃遣賀招慰下三萬餘落獲雜畜十餘萬及圍姑臧由是無外慮故得専力攻之涼州平以功遷征西將軍進爵西平公從征蠕蠕擊五城吐京胡討蓋吳諸賊皆有功拜散騎常侍又從駕臨江為前鋒大將善撫士卒加有料敵制勝之謀賀為人雄果每遇強寇輒自奮擊帝深誡之賀本名破羌是役也帝謂曰人之立名宜副其實何可濫也因賜名賀拜殿中尚書是時南安王余為宗愛所殺賀部勒禁兵靜遏外內與南部尚書陸麗決議定䇿翼戴文成令麗與劉尼馳詣苑中奉迎賀營中為內應俄而麗抱文成單騎而至及即位賀有力焉以定策勳轉給事中進爵西平郡王及班賜百僚勑賀任意取之辭以江南未賔漠北不欵府庫不宜致匱固使取之唯取戎馬一匹時斷獄多濫賀上書曰案律謀反之家其子孫雖養他族追還就戮所以絶罪人之類彰大逆之辜其為劫賊應誅者兄弟子姪在逺道隔關津皆不坐竊惟先朝制律之意以不同謀非絶類之罪故特垂不死之詔若年十三已下家人首惡計所不及臣愚以為可原其命沒入官帝納之出為冀州刺史改封隴西王既受除上書曰臣聞人之所寶莫寶於生命德之厚者莫厚於宥死然犯死之罪難以盡恕權其輕重有可矜恤今勍寇遊魂於北狡賊負嶮於南其在疆埸猶須防戍臣愚以自非大逆赤手殺人之罪其坐贓及盜與過誤之愆應入死者皆可原命謫守邊境是則已斷之體更受生成之恩徭役之家漸蒙休息之惠刑措之化庶幾在兹帝嘉納之由是入死者皆恕死徙邊久之帝謂羣臣曰昔源賀勸朕宥諸死刑徙充北藩諸戍自爾至今所活殊為不少濟命之理既多邊戍之兵有益苟人人如賀朕治天下復何憂哉羣臣咸曰非忠臣不能進此計非聖主不得納此言賀之臨州鞫獄以情徭役簡省清約寬裕甚得人心時武邑姦人石華告沙門道可與賀謀反有司以聞帝謂羣臣曰賀之誠信必不叛為卿等保之無此明矣告者果引誣於是遣使詔慰賀帝曰賀之忠誠尚致其誣不若是者可無愼乎時考殿最賀治為第一賜衣馬器物甚厚班宣天下賀得民情在州七年徵拜太尉蠕蠕寇邊賀從駕討破之獻文將傳位于京兆王子推時賀都督諸軍屯漠南乃馳傳徴賀賀至正色固執不可即詔賀持節奉皇帝璽綬以授孝文是嵗河西叛賀討平之又討統萬高平至於金城斬首前後八千餘級雜畜男女不可勝紀賀依古今兵法及先儒耆舊之説略採至要為十二陳圖上之獻文覽而嘉焉以年老辭位不許又詔都督諸道軍屯漠南時每嵗秋冬遣軍三道並出以備北寇至春中乃班歸賀以勞役京師又非禦邊長䇿乃上言請募諸州鎮有武勇者三萬人復其徭役厚加賑恤分為三部二鎮之間築城城置萬人給強弩十二牀武衛三百乘弩一牀給牛六頭武衛一乘給牛二頭多造馬槍及諸器械使武略大將二人以鎮撫之冬則講武春則種植並戍並耕則兵未勞而有盈蓄矣又於白道南三處立倉運近州鎮租粟以充之足食足兵以備不虞於事為便不可嵗常舉衆事寢不報又上書稱病乞骸骨至於再三乃許之朝有大議皆就詢訪又給醫藥珍饈太和元年二月療病於溫湯文明太后遣使屢問不息太醫視疾患篤還于京師乃遺令諸子曰吾頃以老患辭事不悟天慈降恩爵逮於汝汝其毋慠吝毋荒怠毋奢越毋嫉妬疑思問言思審行思恭服思度遏惡揚善親賢逺佞目觀必真耳屬必正忠勤以事君清儉以約己吾終之後所葬時服單櫝足申孝心芻靈明器一無用也三年秋薨年七十三贈侍中太尉隴西王印綬諡曰宣王贈雜綵賜輼輬車及命服溫明祕器陪葬于金陵長子延性謹厚少好學位侍御中散賜爵廣武子卒贈涼州刺史廣武侯諡曰簡子鱗襲延弟思禮後賜名懷謙恭寬雅有大度文成末為侍御中散父賀辭老詔授父爵後持節督諸軍於漠南蠕蠕甚憚之還除殿中尚書出為長安鎮將雍州刺史清儉有惠政善撫恤劫盜止息後拜殿中尚書加侍中參都曹事又督諸軍征蠕蠕六道大將咸受節度遷尚書令參議律令後例降為公除司州刺史又從駕南征加衛大將軍領中軍事以母憂去職賜帛三百匹穀一千石車駕幸代詔使者弔慰景明二年除尚書左僕射加位特進時詔以姦吏犯罪每多逃遁肆眚乃出並皆釋然自今犯罪不問輕重藏竄者悉皆逺流若永避不出兄弟代徙懷乃奏曰謹案條制逃吏不在赦限竊惟聖朝之恩事異前宥諸流徙在路尚蒙旋返况有未發而仍遣邊戍案守宰犯罪逃走者衆祿潤既優尚有兹失及蒙恩宥卒然得還今獨苦此等恐非均一之法書奏門下以成式既班駮奏不許懷重奏曰臣以為法貴經通政貴簡要刑憲之設所以網羅罪人苟理之所備不在繁典伏尋條例制勳品以下罪發逃亡遇恩不赦雖欲抑絶姦塗匪為通式謹案事條侵官敗法専據流外豈九品以上人皆貞白也其諸州守宰職任清流至有貪濁事發逃竄而遇恩免罪勳品以下獨求斯例如此則寬縱上流刑法下切育物有差惠罰不等又謀逆滔天經恩尚免吏犯微罪獨不蒙赦使大宥之經不通開生之路致壅進違古典退乖今律臣少踐天官老荷樞要每見訴訟出入嗟苦輒率愚見以為宜停書奏宣武納之其年除車騎大將軍涼州大中正懷又表曰昔世祖升遐南安在位出拜東廟為賊臣宗愛所賊時高宗避難龍潛苑中宗愛異圖神位未立先臣賀與長孫渴侯陸麗等奉迎高宗纂徽寶命麗以扶負聖躬親所見識蒙授撫軍司徒公平原王興安二年追論定策之勳進先臣爵西平王皇興季年顯祖將傳大位於京兆王先臣時都督諸將屯於武川被徵詣京特見顧問先臣固執不可顯祖久乃許之遂命先臣持節授皇帝璽綬於高祖至太和十六年麗息睿狀祕書稱其亡父與先臣援立高宗朝廷追録封睿巨鹿郡開國公臣時丁艱草土不容及例至二十年除臣雍州刺史臨發奉辭靣奏先帝申先臣舊勳時蒙勑旨但赴所臨尋當别判至二十一年車駕幸雍臣復陳聞時蒙勑旨征還當授自宫車晏駕遂爾不申竊惟先臣逺則援立高宗寶歷不墜近則陳力顯祖神器有歸如斯之勳超世之事也麗以父功而獲山河之賞臣有家勳不霑茅土之錫得否相懸請垂裁處詔曰宿老元臣云如所訴訪之史官頗亦言此可依授北馮翊郡開國公食邑九百户又詔為使持節加侍中行臺巡行北邊六鎮恆燕朔三州賑給貧乏兼採風謡考論殿最事之得失皆先決後聞自京師遷洛陽邊朔遙逺加以連年旱儉百姓困弊懷銜命撫導存恤有方便宜轉運有無通濟時后父于徑勢傾朝野徑兄子祚與懷宿夙通婚時為沃野鎮將頗有受納懷將入鎮祚郊迎道左懷不與相聞即劾祚免官懷朔鎮將元尼須與懷少舊亦貪穢狼籍置酒請懷曰命之長短由卿之口豈可不相寬貸懷曰今日之集乃是源懷與故人飲酒之坐非鞫獄之所也明日公庭始為使人檢鎮將罪狀之處尼須揮淚而已無以對之既而懷表劾尼須其奉公不撓皆此類也時百姓為豪強陵壓積年枉滯一朝見申者日有百數所上事宜便於北邊者凡三十餘條皆見嘉納正始元年九月有告蠕蠕率十二萬騎六道並進欲直趣沃野懷朔南寇恆代詔懷以本官加使持節侍中出據北蕃指授規略隨須徵發諸所處分皆以便宜從事又詔懷子直寢徵隨懷北行詔賜馬一匹細鎧一具御矟一枚懷拜受既訖乃於其庭跨鞍執矟躍馬大呼顧謂賔客曰氣力雖衰尚得如此蠕蠕雖畏壯欺老我亦未可便欺今奉廟勝之規總驍悍之衆足以禽其酋帥獻俘闕下耳時年六十一懷至雲中蠕蠕亡遁旋至恆代乃案視諸鎮左右要害之地可以築城置戍之處皆量其高下揣其厚薄及儲糧積仗之宜犬牙相救之勢凡表五十八條宣武並從之卒贈司徒公諡曰惠懷性寬惠不好煩碎恆語人曰為政貴當舉其大綱何必須太子細也譬如為屋但外望高顯楹棟平正足矣斧斤不平非屋病也性不飲酒而喜以飲人好接賔客雅善音律雖在白首至宴居之暇常自操絲竹子子雍字靈和少好文雅篤志於學推誠待士士多歸之纍遷夏州刺史時沃野鎮人破六韓拔陵首為反亂統萬逆徒寇害應接子雍嬰城自守城中糧盡煮馬皮而食之子雍善綏撫無有離二以飢饉轉切欲自出求糧留子延伯據守寮屬僉云未若棄城而去更展規略子雍泣請於衆曰吾世荷國恩此是吾死地更欲何求遂自率羸弱向東夏運糧延伯與將士送出城哭而拜辭三軍莫不嗚咽子雍為朔方胡帥曹阿各拔所邀力屈被執乃密遣人齎書間行與城中云大軍在近汝其奉忠勿以我而移其操子雍雖被囚束雅為胡人所敬常以百姓禮事之子雍為陳安危禍福之端勸阿各拔令降將從之未果而死阿各拔弟桑生代總部衆竟隨子雍降時北海王皓為大行臺子雍具陳諸賊可滅狀皓給子雍兵令其先出時東夏合境反叛所在屯結子雍轉戰而前九旬之中凡數十戰乃平東夏徵稅租粟運糧統萬於是二夏漸寧及蕭寶夤等為賊所敗關右搔擾時子雍新平黑城遂率士馬并夏州募義人鼓行南出賊帥康維摩守鋸谷斷絶􅀈棠橋子雍與戰大破之禽維摩又攻破賊帥契官斤於楊氏堡出自西夏至於東夏轉戰千里至是朝廷始得委問除兼行臺尚書復破賊帥紇單步胡提於曲沃明帝璽書勞勉之子雍在白水郡破賊帥宿勤明逹子阿非軍多所斬獲除給事黃門侍郎封樂平縣公以葛榮久逼信都詔子雍為北討都督時相州刺史安樂王鑒據鄴反勑子雍與都督李神軌先討平之改封陽平縣公遂與裴衍發鄴討葛榮而信都陷除子雍冀州刺史與裴衍俱進子雍戰敗而沒贈司空諡曰莊穆子雍弟子恭字靈順聰敏好學稍遷尚書北主客郎攝南主客事時梁亡人許周自云梁給事黃門侍郎朝士咸共信待子恭奏以為真偽難辨請下徐揚二州密訪周果以罪歸闕詐假職位如子恭所疑河州羌郤鐡忽反詔子恭為行臺討之子恭示以威恩兩旬間悉降朝廷嘉之正光元年為行臺左丞巡北邊轉為起部郎中時明堂辟雍並未建就子恭上書求加經綜書奏從之稍遷豫州刺史頻以軍功加鎮南將軍兼尚書行臺元皓之入洛也加子恭車騎將軍子恭不敢拒之而頻遣間使參莊帝動靜未幾皓敗車駕還洛録前後征討功封臨潁縣侯侍中爾朱榮之死也世隆度律斷據河橋詔子恭為都督以討之尋而太府卿李苖夜燒河橋世隆退走以子恭兼尚書僕射為大行臺大都督節閔帝初以預定策勳封臨汝縣子永熙中入為吏部尚書以子恭前在豫州戰功追賞襄城縣男又論子恭餘效封新城縣子子恭尋表請轉授第五子文盛許之天平初除中書監三年拜魏尹又為齊神武王軍司卒贈司空公諡曰文獻子彪列在齊史劉尼代人也本姓獨孤氏曾祖敦有功於道武為方靣大人父婁為冠軍將軍尼壯健善射太武見而竒之拜羽林中郎加振威將軍賜爵昌國子宗愛既殺南安王余於東廟祕之唯尼知狀尼勸愛立文成愛自以負罪於景穆聞而驚曰君大癡人皇孫若立豈忘正平時事乎尼曰若爾今欲立誰愛曰待還宫擢諸王子賢者而立之尼懼其有變密以狀告殿中尚書源賀賀時與尼俱典兵宿衛仍共南部尚書陸麗謀曰宗愛既立南安還復殺之今不能奉戴皇孫以順民望社稷危矣將欲如何麗曰唯有密奉皇孫耳於是賀與尚書長孫渴侯嚴兵守衛尼與麗迎文成於苑中麗抱文成於馬上入於京師尼馳還東廟大呼曰宗愛殺南安王大逆不道皇孫已登大位有詔宿衛之士皆可還宫衆咸唱萬嵗賀及渴侯登執宗愛賈周等勒兵而入奉文成於宫門外入登永安殿以尼為內行長遷散騎常侍安南將軍進爵東安公尋遷尚書右僕射加侍中進爵為王出為定州刺史在州清愼然率多醉酒治日甚少文成末遷司徒獻文即位以尼有大功於先朝特加尊重賜别户三十皇興四年車駕北征帝親誓衆而尼昏醉兵陳不整帝以其功重特恕之免官而已延興四年薨子社生襲薛提太原人也皇始中補太學生拜侍御史纍遷晉王丕衛兵參軍冀州刺史封太原郡公有政績徵拜侍中攝都曹事太武崩祕不發喪尚書左僕射蘭延侍中和延等議以皇孫幼沖宜立長君徵秦王翰置之祕室提曰皇孫有世嫡之重人望所繫春秋雖少令問聞於天下廢所宜立而更别求必有不可延等未決中常侍宗愛知其謀矯皇后令徴提等入殺之文成即位以提有謀立之誠詔提弟浮子先襲爵太原公有司奏降為侯司馬楚之字德秀晉宣帝弟太常馗之八世孫也父榮期晉梁益二州刺史為其參軍楊承祖所殺楚之時年十七送父喪還丹陽值劉裕誅夷司馬氏叔父宣期兄貞之並遇害楚之乃亡匿諸沙門中濟江自歷陽西入義陽竟陵蠻中及從祖荆州刺史休之為裕所敗乃亡於汝潁之間楚之少有英氣能折節待士與司馬順明道恭等所在聚黨及劉裕受禪楚之規欲報復收衆據長社歸之者常萬餘人裕深憚之遣刺客沐謙圖害楚之楚之待謙甚厚謙夜詐疾意楚之必自來因欲殺之楚之聞謙病果自齎湯藥往省之謙感其意乃出匕首於席下以狀告遂委身以事之其推誠信物得士心皆此類也明元末山陽公奚斤略地河南楚之遣使請降於是假楚之使持節征西將軍荆州刺史奚斤既平河南以楚之使率民户分置汝南汝陽南頓新蔡四郡以益豫州太武初楚之遣妻子內居於鄴尋徵入朝時南藩諸將表宋欲興師乃以楚之為使持節安南大將軍封琅邪王屯潁州以拒之楚之渡河百姓思奮義衆雲集汝潁以南望風從之帝聞而大悅璽書勞勉賜前後部鼓吹楚之破宋將到彥之别軍於長社又與冠軍將軍安頡攻滑臺拔之禽宋將朱修之李元德及東郡太守申謨俘萬餘人上疏宜掃清東南齊一區宇帝以兵久勞不從以散騎常侍徴還從征涼州以功賜𨽻户一百宋遣將裴方明胡崇之冦仇池楚之與淮南公皮豹子等督關中諸軍從散關西入軹地破方明禽崇之仇池平而還車駕伐蠕蠕詔楚之與濟陰公盧中山等督運以繼大軍時鎮北將軍封沓亡入蠕蠕説令擊楚之等以絶糧運蠕蠕乃遣姦人覘楚之軍截驢耳而去有告失驢耳者諸將莫能察楚之曰此必覘賊截之以為驗耳賊將至矣即使軍人伐栁為城灌水令凍城立而賊至冰峻城固不可攻逼賊乃走散帝聞而嘉之尋拜假節侍中鎮西大將軍開府儀同三司雲中鎮大將軍朔州刺史王如故在邊二十餘年以清儉著聞和平五年薨年七十五文成悼惜之贈征南大將軍領護西戎校尉揚州刺史諡曰貞王陪葬金陵長子寶允與楚之同入魏拜中書博士鴈門太守卒楚之後尚諸王女河內公主生子金龍字榮則少有父風後襲爵拜侍中鎮西大將軍開府雲中鎮大將朔州刺史吏部尚書薨贈司空諡康王金龍初納大尉隴西王源賀女生子延宗次纂次悅後娶沮渠氏生子徽亮即河西王沮渠牧犍女太武妹武威公主所生也有寵於文明太后故以徽亮襲例降為公坐連穆泰罪失爵卒悅字慶宗歷位豫州刺史時有汝南上蔡董毛奴者齎錢五千死於道路郡疑縣人張堤為劫又於堤家得錢五千堤懼掠自誣言殺至州悅觀色疑其不實引見毛奴兄靈之謂曰殺人取錢當時狼狽應有所遺曾得何物靈之曰唯得一刀削悅取視之曰此非里巷所為也乃召州內刀匠示之有郭門前曰此刀削門手所作去嵗賣與郭人董及祖悅收及祖詰之及祖款引靈之又於及祖身上得毛奴所衣皂襦及祖伏法悅之察獄多此類也俄與鎮南將軍元英攻克義陽詔改梁司州為郢州以悅為刺史改為豫州刺史論前勳封漁陽子永平元年城人白早生謀為叛逆遂斬悅首送梁詔揚州移購悅首贈靑州刺史諡曰莊子子朏襲爵尚宣武妹華陽公主拜駙馬都尉員外散騎常侍卒贈滄州刺史子鴻字慶公性粗武襲爵位都水使者坐通西魏賜死子孝政襲齊受禪例降朏弟裔周史有傳金龍弟躍字寶龍尚趙郡公主拜駙馬都尉代兄為雲中鎮將拜朔州刺史假安北將軍河內公表求罷河西苑封丐人墾殖有司執奏此苑麋鹿所聚太官取給若以丐人懼有所闕躍固請孝文從之還為祠部尚書大鴻臚卿潁川王師卒楚之父子相繼鎮雲中朔土服其威德司馬氏桓元劉裕之際歸北者又有司馬景之叔璠天助位並崇顯景之字洪略晉汝南王亮之後明元時歸闕賜爵蒼梧公加征南大將軍淸直有節操卒贈汝南王子師子襲爵景之兄凖字巨之以泰恆初歸魏封新安公除廣寧太守改密陵侯子安國襲爵叔璠晉安平獻王孚之後父曇之晉河間王桓元劉裕之際叔璠與兄國璠奔慕容超後投姚泓泓滅奔屈丐統萬卒兄弟俱入國國璠賜爵淮南公叔璠賜爵丹陽侯國璠坐為司馬文思所陷誅事在晉宗室傳中天助自云晉驃騎將軍元顯之子歸闕封東海公歷靑兖二州刺史通志卷一百四十七
