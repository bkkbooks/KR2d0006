body:
  text: 通志卷六十四宋右廸功郎鄭樵漁仲撰藝文略第二禮類第二周官㑹禮儀禮儀注喪服禮記月令周官𫝊注義疏論難義類音圖周官禮十二卷馬融𫝊周官禮十二卷鄭元注周官禮十二卷王肅注周官禮十二卷伊説注唐有十卷周官禮十二卷于寳注周官禮集注二十卷崔靈恩按漢有李氏得周官以為周公所制官政之法上於河間獻王獨闕冬官一篇獻王求以千金不得遂取考工記以補之至王莽時劉歆始置博士以行於世河南緱氏及杜子春受業於歆因以教授是後馬融作傳以授鄭元元作周官注右傳注六部八十卷周官禮義疏四十卷沈重周禮疏五十卷唐賈公彦周禮關言十二卷黄君俞右義疏三部百二卷周官禮異同評十二卷晉司空長史陳劭周官論評十二卷傅元周官禮駁難四卷孫略周官駁難五卷孫琦問于寳駁虞喜撰周禮義決三卷唐王元度右論難五部三十六卷緱氏要鈔六卷周官寧朔新書八卷司馬伷周官分職四卷周官致太平論十卷李泰伯撰右義類四部二十八卷禮音三卷劉昌宗周官音訓三鄭異同辨二卷王曉右音二部五卷周官禮圖十四卷隋經籍志右圖一部十四卷凡周官六種二十一部二百六十五卷按漢曰周官江左曰周官禮唐曰周禮推本而言周官則是儀禮石經注疏音一字石經儀禮九卷隋志今字石經儀禮四卷右石經二部十三卷儀禮十七卷鄭元注儀禮十七卷王肅注儀禮一卷袁凖注儀禮一卷孔倫注儀禮一卷陳詮注儀禮二卷蔡超宗注儀禮二卷田僧紹注按漢初有髙堂生𫝊十七篇又有古經出於淹中河間獻王得而獻之合五十六篇又得穰苴兵法及明堂隂陽之記唯古經十七篇與高堂生所𫝊不殊自高堂生至宣帝時后蒼最明其業乃為曲臺記蒼授梁人戴徳及徳從兄子聖沛人慶普於是有大戴小戴慶氏三家並立是知禮記出於儀禮三家出於高堂也右注七部四十一卷儀禮義疏二卷儀禮義疏六卷儀禮疏五十卷唐賈公彦右疏三部五十八卷儀禮音二卷鄭元儀禮音二卷王肅儀禮音二卷李軌劉昌宗右音三部六卷凡儀禮四種十五部一百十八卷喪服傳注譜集注五義疏儀記要圖服圖問難儀注喪服經傳一卷馬融喪服經傳一卷鄭元喪服經傳一卷王肅喪服經傳一卷晉給事中袁凖略注喪服經傳一卷雷次宗喪服經傳一卷陳銓喪服傳一卷梁裴子野右傳注七部七卷集注喪服經傳一卷晉孔倫集注喪服經傳一卷宋裴松之集注喪服經傳二卷宋蔡超宗集注喪服經傳二卷齊田僧紹右集注四部六卷喪服義疏二卷梁五經博士賀瑒喪服經傳義疏一卷梁何佟之喪服經傳義疏四卷沈文阿喪服文句義疏十卷陳皇侃喪服義十卷陳謝嶠喪服義鈔三卷右義疏六部三十卷喪服要記一卷王肅喪服要記一卷蜀蒋琬喪服要記十卷賀循喪服世行要記十卷齊光祿大夫王逸喪服記十卷王氏喪服古今集記三卷齊太尉王儉喪服要記五卷庾蔚之喪服正要二卷孟詵喪服要集二卷杜預喪服五要一卷嚴氏撰喪服要略一卷晉博士環濟喪服要略二卷喪服制要一卷徐氏喪服義鈔三卷喪服鈔三卷王隆伯喪服變除一卷戴徳喪服變除一卷葛洪喪服加减一卷右記要十八部五十八卷喪服答要難一卷袁析駁喪服經傳一卷卜氏𫝊喪服疑問一卷樊氏喪服要問一卷喪服問答目十三卷皇侃喪服發題二卷沈文阿論喪服決一卷喪服極議一卷殷价右問難八部二十一卷喪服儀一卷晉衛瓘新定喪禮一卷漢劉表凶禮一卷晉廣陵相孔衍陳雜儀注凶儀禮十三卷凶儀一卷鄭珣瑜雜凶禮四十二卷梁皇帝崩凶儀十一卷梁皇太子喪禮五卷梁王侯以下凶禮九卷士喪禮儀注十四卷梁天子喪禮七卷又五卷梁大行皇帝皇后崩儀注一卷梁太子妃薨凶儀注九卷喪服假寧制三卷梁諸侯世子卒凶儀注九卷梁陳大行皇帝崩儀注八卷陳皇太子妃薨儀注四卷陳諸帝后崩儀注五卷陳皇太后崩儀注四卷唐葬王播儀一卷北齊皇太后喪禮十卷喪儀纂要九卷張戩喪服治禮儀注九卷何𦙍晉修復山陵故事五卷車灌撰右儀注二十五部一百八十七卷喪服譜一卷鄭元注喪服譜一卷晉蔡謨撰喪服譜一卷賀循喪服譜一卷龎景昭右譜四部四卷喪服圖一卷王儉喪服圖一卷賀逰喪服圖一卷崔逸喪服禮圖一卷喪服君臣圖一卷喪服圖一卷崔游喪服天子諸侯圖一卷右圖七部七卷五服略例一卷喪禮五服七卷袁憲五服制度一卷五服圖張薦撰卷亡五服圖十卷仲子陵五服志三卷南齊五服制一卷五服法纂三卷五服年月勑一卷右五服圖儀九部二十七卷凡喪服九種八十八部三百四十七卷禮記大戴義小戴庸義疏緯書鈔音中䜟評論名數大戴禮記十三卷漢信都王𫝊戴徳撰漢初河間獻王得仲尼弟子及後學者所記一百三十篇獻之時亦無𫝊之者至劉向考校經籍檢得百三十篇向因第而叙之又得明堂隂陽記三十三篇孔子三朝記七篇王史氏記二十有一篇樂記二十三篇凡五種合二百十四篇戴徳刪其煩重合而記之為八十五篇謂之大戴記而戴聖又刪大戴之書為四十六篇謂之小戴記漢末馬融遂𫝊小戴之學融又足月令一篇明堂位一篇樂記一篇合四十九篇鄭元受業於融為之注觧後學惟𫝊鄭氏學故小戴禮行於世右大戴一部十三卷禮記二十卷漢戴聖撰鄭元注禮記二十卷漢北中郎將盧植注禮記三十卷王肅注禮記三十卷魏孫炎注禮記十二卷葉遵注隋志作業遵禮記略觧十卷庾氏戴聖為九江太守行治多不法何武為揚州刺史聖懼自免後為博士毁武於朝廷武聞之終不揚其惡而聖子賔客為盗繋廬江聖自以子必死武平心決之卒得不死自是聖慚服武毎奏事至京師聖未嘗不造門謝恩戴聖為禮家之宗身為贓吏而子為賊徒可