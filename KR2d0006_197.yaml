body:
  text: 通志卷一百七十三宋右迪功郎鄭樵漁仲撰儒林傳第二晉范平文立陳邵虞喜劉兆汜育徐苗崔遊范隆杜夷董景道續咸徐邈孔衍范宣韋謏范𢎞之王歡梁伏曼容子暅子暅子挺挺知命何佟之劉澄嚴植之司馬筠卞華崔靈恩虞僧誕孔僉盧廣沈峻舅太史叔眀孔子袪皇侃陳沈文阿沈洙戚袞鄭灼陸詡賀沈德威德基全緩張譏顧越龔孟舒沈不害王元規陸慶晉范平字子安吳郡錢唐人也其先銍侯馥避王莽之亂適吳因家焉平研覽墳索遍該百氏姚信賀邵之徒皆從受業吳時舉茂材纍遷臨海太守政有異能孫皓初謝病還家敦悅儒學吳平太康中頻徴不起年六十九卒有詔追加諡號曰文貞先生賀循勒碑紀其德行三子奭咸泉並以儒學至大官泉子蔚關內侯家世好學有書七千餘卷逺近來讀者常有百餘人蔚為辦衣食蔚子文才亦幼知名文立字廣休巴郡臨江人也蜀時遊太學専毛詩三禮師事譙周門人以立為顔回陳夀李虔為遊夏羅憲為子貢仕至尚書蜀平舉秀才除郎中泰始初拜濟隂太守入為太子中庶子上表請以諸葛亮蔣琬費褘等子孫流徙中畿宜見敘用一以慰巴蜀之心次以傾吳人之望事皆施行詔以立為散騎常侍蜀故尚書犍為程瓊雅有德業與立深交武帝聞其名以問立對曰臣至知其人但年垂八十稟性謙退無復當時之望不以上聞耳瓊聞之曰廣休可謂不黨矣故吾善夫人也時西域獻馬帝問立馬何如對曰乞問太僕帝善之遷衛尉咸寧末卒所著章奏詩賦數十篇行於世陳邵字節良東海襄賁人也郡察孝廉不就以儒學徴為陳留內史纍遷燕王師撰周禮評甚有條貫行於世泰始中詔除給事中卒於官虞喜字仲寧會稽餘姚人光祿潭之族也父察吳征虜將軍喜少立操行博學好古諸葛恢臨郡屈為功曹察孝廉州舉秀才司徒辟皆不就元帝初鎮江左上疏薦喜懷帝即位公車徴拜博士不就喜邑人賀循為司空先達貴顯每詣喜信宿忘歸自云不能測也太寧中與臨海任旭俱以博士徴不就眀帝復下詔徴之喜仍辭疾不赴咸和末詔公卿舉賢良方正直言之士太常華恆舉喜為賢良會國有軍事不行咸康初內史何充上疏薦喜詔喜與尋陽翟湯並以散騎常侍徴又不起永和初有司奏稱十月殷祭亰兆府君當遷祧室征西豫章潁川三府君初毁主內外博議不能決時喜在會稽朝廷遣就喜咨訪焉其見重如此喜専心經傳兼覽讖緯乃著安天論以難渾蓋又釋毛詩略注孝經為志林三十萹凡所注述數十萬言行於世年七十六卒無子弟豫自有傳劉兆字延世濟南東平人漢廣川惠王之後也兆博學洽聞溫篤善誘從受業者數千人武帝時五辟公府三徴博士皆不就安貧樂道潛心著述不出門庭數十年以春秋一經而三家殊塗諸儒是非之議紛然互為讐敵乃思三家之異合而通之周禮有調人之官作春秋調人七萬餘言皆論其首尾使大義無乖時有不合者舉其長短以通之又為春秋左氏解名曰全綜公羊穀梁解詁皆納經傳中朱書以别之又撰周易訓注以正動二體互通其文凡所讚述百餘萬言嘗有人著鞾騎驢至兆門外曰吾欲見劉延世兆儒德道素青州無稱其字者門人大怒兆曰聽前既進踞牀問兆曰聞君大學比何所作兆答如上事末云多有所疑客問之兆説疑畢客曰此易解耳因為辨釋疑者是非耳兆别更立意客一難兆不能對客去已出門兆欲留之使人重呼還客曰親親在此營葬宜赴之後當更來也既去兆令人視葬家不見此客竟不知姓名兆年六十六卒有五子卓照耀育臍汜育字稚春濟北盧人也奕世儒素敦睦九族客居青州逮育七世時人號其家兒無常父衣無常主育少履髙操安貧有志業父終居於墓所三十餘載至晦朔躬掃墳壠循行封樹還家則不出門庭或薦之武帝召補南陽王文學祕書郎太傅參軍並不就于時青土隱逸之士劉兆徐苖等皆務教授唯育不畜門人清淨自守時有好古慕德者咨詢亦傾懷開誘以一隅示之合三傳為之解注撰春秋釋疑肉刑論凡所述造七萬餘言年七十一卒徐苖字叔胄髙密淳于人也纍世相承皆以博士為郡守曽祖華有至行嘗宿亭舍夜有神人告之亭欲崩遽出得免祖邵為魏尚書郎以廉直見稱苖少家貧晝執鉏耒夜則吟誦弱冠與弟賈就博士濟南宋鈞受業遂為儒宗作五經同異評又依道家著元微論前後所造數萬言皆有義味性抗烈輕財貴義兼有知人之鑒弟患口癕膿潰苖為吮之其兄弟早亡撫養孤遺慈愛聞於州里田宅奴婢盡推與之鄉鄰有死者便輒耕助營棺椁門生亡於家即殮於講堂其行已純至類皆如此逺近咸歸其義師其行焉郡察孝廉州辟從事治中别駕舉異行公府五辟博士再徴並不就武惠時計吏至臺帝輒訪其安不永寧二年卒遺命濯巾浣衣榆棺雜㙛露車載尸葦席瓦器而已崔遊字子相上黨人也少好學儒術甄眀恬靖謙退自少及長口未嘗語及財利魏末察孝廉除相府舍人出為氐池長甚有惠政以病免遂為廢疾泰始初武帝録敘文帝故府僚屬就家拜郎中年七十餘猶敦學不倦撰喪服圖行於世及劉淵僣位命為御史大夫固辭不就卒於家時年九十三范隆字元嵩鴈門人父方魏鴈門太守隆在孕十五月生而父亡年四嵗又喪母哀號之聲感慟行路單孤無緦功之親疏族范廣愍而養之迎歸教書為立祠堂隆好學修謹奉廣如父博通經籍無所不覽著春秋三傳撰三禮吉凶宗紀甚有條義惠帝時天下將亂隆隱迹不應州郡之命晝勤耕稼夜誦書典頗習祕歷隂陽之學知并州將有氛䘲之祥故彌不復出仕與上黨朱紀友善嘗共紀遊山見一父老於窮澗之濱父老曰二公何為在此隆等拜之仰視則失所在後與紀依于劉淵淵以隆為鴻臚紀為太常並封公隆死於劉聰之世聰贈太師杜夷字行齊盧江灊人也世以儒學稱為郡著姓夷少而恬泊操尚貞素居甚貧窘不營産業博覽經籍百家之書算歷圖緯靡不畢究寓居汝潁之間十載足不出門年四十餘始還鄉里閉門教授生徒千人惠帝時三察孝廉州命别駕永嘉初公車徴拜博士太傅東海王越辟並不就懷帝詔王公舉賢良方正刺史王敦以賀循為賢良夷為方正上疏稱述其能敦於是逼夷赴洛夷遂遁於夀陽鎮東將軍周馥傾心禮接引為參軍夷辭之以疾馥知不可屈乃自詣夷為起宅宇供其醫藥馥敗夷歸舊居道遇兵寇刺史劉陶告廬江郡遣令營恤之常以市租供給家人糧廩勿令闕乏夷尋以胡寇又移渡江王導遣吏周贍之元帝為丞相教以夷為儒林祭酒夷辭疾未嘗朝會帝嘗欲詣夷夷陳萬乘之主不宜往庶人之家帝乃與夷書曰吾與足下雖情在忘言然虛心歷載正以足下羸疾故欲相省寧論常儀也又除國子祭酒建武中令曰國子祭酒杜夷安貧樂道靜志衡門日不暇給雖原憲無以加也其賜穀二百斛皇太子三至夷第執經問義夷雖逼時命亦未嘗朝謁國有大政恆就夷咨訪焉眀帝即位夷自表請退詔不許太寧元年卒年六十六贈大鴻臚諡曰貞子夷臨終遺命子晏曰吾少不出身頃雖見羈録冠舄之飾未嘗加體其角巾素衣斂以時服殯葬之事務從簡儉亦不須茍取矯異也夷所著幽求子二十篇行於世晏仕至蒼梧太守夷兄弟三人兄嵩字行髙亦有志節惠帝時俗多浮偽著任子春秋以刺之弟援髙平相援子潛右衛將軍董景道字文博𢎞農人也少而好學千里追師所在唯晝夜讀誦略不與人交通眀春秋三傳京氏易馬氏尚書韓詩皆精究大義三禮之義専遵鄭氏著禮通論非駮諸儒演廣鄭旨永平中知天下將亂隱於商洛山衣木葉食樹果彈琴歌嘯以自娛毒蟲猛獸皆循繞其傍是以劉淵及聰屢徴皆礙而不達至劉曜時出廬于渭汭曜徴為太子少傅散騎常侍並固辭竟以夀終續咸字孝宗上黨人也性孝謹敦重履道貞素好學師事京兆杜預専春秋鄭氏易教授常數十人博覽羣言髙才善文論又修陳杜律眀達刑書永嘉中歷廷尉平東安太守劉琨承制於并州以為從事中郎後遂沒於石勒勒以為理曹參軍持法平詳當時稱其清裕比之于公著逺遊志異物志汲冡古文釋皆十卷行於世年九十七死於石虎之世虎贈儀同三司徐邈東莞姑幕人也祖澄之為州治中屬永嘉之亂遂與鄉人臧琨等率子弟并閭里士庶千餘家南渡江家於京口父藻都水使者邈姿性端雅勤行勵學博涉多聞以慎密自居少與鄉人臧夀齊名下帷讀書不遊城邑及孝武帝始覽典籍招延儒學之士邈既東州儒素太傅謝安舉以應選年四十四始補中書舍人在西省侍帝雖口不傳章句然開釋文義摽眀指趣撰正五經音訓學者宗之遷散騎常侍猶處西省前後十年每被顧問輒有獻朁多所匡益甚見寵侍帝宴集酣樂之後好為手詔詩章以賜侍臣或文辭率爾所言穢雜邈每應時收斂還省刋削皆使可觀經帝重覽然後出之是時侍臣被詔者或宣揚之故時議以此多邈及謝安薨論者多有同異邈固勸中書令王獻之奏加殊禮仍崇進謝石為尚書令元為徐州邈轉祠部郎上南北郊宗廟迭毁禮皆有證據豫章太守范寧欲遣十五議曹下屬城採求風政并吏假還訊問官長得失邈與寧書曰知足下遣十五議曹各之一縣又吏假歸白所聞見誠是足下留意百姓故廣其視聽吾謂勸導以實不以文十五議曹欲何所敷宣邪庶事辭訟足下聽斷允塞則物理足矣上有理務之心則下之求理者至矣日昃省覽庶事無滯則吏慎其負而人聽不惑豈須邑至里詣飾其遊聲哉非徒不足致益乃是蠶漁之所資又不可縱小吏為耳目也豈有善人君子而干非其事多所告白者乎君子之心誰毁誰譽如有所譽必由歷試如有所毁必以著眀託社之鼠政之甚害自古以來欲為左右耳目者無非小人皆先因小忠而成其大不忠先藉小信而成其大不信遂使君子道消善人輿尸前史所書可為深鑒足下選綱紀必得國士足以攝諸曹諸曹皆是良吏則足以掌文案又擇公方之人以為監司則清濁能否與事而眀足下但平心居宗何取於耳目哉昔眀德馬后未嘗顧與左右言可謂逺識况大丈夫而不能免此乎遷中書侍郎専掌綸詔帝甚親眤之初范寧與邈皆為帝所任使共補朝廷之闕寧才素髙而措心正直遂為王國寶所讒出守逺郡邈孤宦易危而無敢排強族乃為自安之計會帝頗疏會稽王道子邈欲和協之因從容言於帝曰昔淮南齊王漢晉成戒會稽王雖有酣媟之纍而奉上純一宜加𢎞貸消散紛議外為國家之計內慰太后之心帝納焉邈嘗詣東府遇衆賓沉湎引滿喧譁道子曰君時有暢不邈對曰邈陋巷書生唯以節儉清修為暢耳道子以邈業尚道素笑而不以為忤也道子將用為吏部郎邈以波競成俗非己所能節制苦辭乃止時皇太子尚幼帝甚鍾心文武之選皆一時之俊以邈為前衛率領本郡大中正授太子經帝謂邈曰雖未勑以師禮相待然不以博士相遇也古之帝王受經必敬自魏晉以來多使微人教授號為博士不復尊以為師故帝有云邈雖在東宫猶朝夕入見參綜朝政修飾文詔拾遺補闕劬勞左右帝嘉其謹密方之於金霍有託重之意將進顯位未及行而帝暴崩安帝即位拜驍騎將軍隆安元年遭父憂邈先疾患因哀毁增篤不踰年而卒年五十四州里傷悼識者悲之邈蒞官簡惠達於從政論議精密當時多咨稟之觸類辨釋問則有對舊疑嵗辰在卯此宅之左則彼宅之右何得俱忌於東邈以為太嵗之屬自是遊神譬如日出之時向東皆逆非為藏體地中也所注穀梁傳見重於時邈長子豁有父風以孝聞為太常博士祕書郎豁弟浩散騎侍郎鎮南將軍何無忌請為功曹出補西陽太守與無忌俱為盧循所害邈弟廣别有傳孔衍字舒元魯國人孔子二十二世孫也祖文魏大鴻臚父育征南軍司衍少好學年十二能通詩書弱冠公府辟本州舉異行直言皆不就避地江東元帝引為安東參軍専掌記室書令殷積而衍每以稱職見知中興初與庾亮俱補中書郎眀帝之在東宫領太子中庶子于時庶事草創衍經學深博又練識舊典朝儀軌制多取正焉由是元眀二帝並親愛之王敦専權衍私於太子曰殿下宜博延朝彥搜揚才俊詢謀時政以廣聖聰敦聞而惡之乃啓出衍為廣陵郡時人為之寒心而衍不形於色雖郡鄰接西賊猶教誘後進不以戎務廢業石勒嘗騎至山陽勑其黨以衍儒雅之士不得妄入郡境視職期月以太興三年卒於官年五十三衍雖不以文才著稱而博覽過於賀循凡所撰述百餘萬言子啓廬江太守宗人夷吾有美名博學不及衍涉世聲譽過之元帝以為主簿轉參軍稍遷侍中徙太子左衛率卒追贈太僕范宣字宣子陳留人也年十嵗能通詩書嘗以刀傷手捧手改容人問痛邪答曰不足為痛但受全之體而致毁傷不可處耳家人以其年幼而異焉少尚隱遁加以好學手不釋卷以夜繼日遂博綜衆書尤善三禮家至貧儉躬耕供養親沒負土成墳廬於墓側太尉郗鑒命為主簿詔徴太學博士散騎郎並不就家於豫章太守殷羡見宣茅茨不完欲為改宅宣固辭之庾爰之以宣素貧加年荒疾疫厚餉給之宣又不受爰之問宣曰君博學通綜何以太儒宣曰漢興貴經術至於石渠之論實以儒為弊正始以來世尚老莊逮晉之初競以裸裎為髙僕誠太儒然邱不與易宣言談未嘗及老莊客有問人生與憂俱生不知此語何出宣云出莊子至樂萹客曰君言不讀老莊何由知此宣笑曰小時嘗一覽時人莫之測也宣雖間居屢空嘗以讀誦為業譙國戴逵等皆聞風宗仰自逺而至諷誦之聲有若齊魯太元中順陽范寧為豫章太守寧亦儒博通綜在郡立鄉校教授嘗數百人由是江州人士並好經學化二范之風也年五十四卒著禮易論難皆行於世子輯歷郡守國子博士大將軍從事中郎自免歸亦以教授為事義熙中連徴不至韋謏字憲道京兆人也雅好儒學善著述於羣言祕要之義無不綜覽仕於劉曜為黃門郎後又入於石虎署為散騎常侍歷守七郡咸以清化著名又徴為廷尉識者擬之于張前後四登九列六在尚書三為侍中再為太子太傅封京兆公好直諌陳軍國之宜多見允納著伏林二千餘言遂演為典林二十三萹凡所述作及集記世事數十萬言皆深博有才義至冉閔又署為光祿大夫時閔拜其子允為大單于而以降胡一千處之麾下謏諫曰今降胡數千接之如舊誠是招誘之恩然胡羯本為仇敵今之款附茍全性命耳或有刺客變起須臾敗而悔之何所及也古人有言一夫不可忸而况千乎願誅屏降胡去單于之號深思聖王苞桑之誡也閔志在綏撫鋭於澄定聞其言大怒遂誅之并殺其子伯陽謏性不嚴重好徇已之功論者亦以是少之嘗謂伯陽曰我髙我曽重光纍徽我祖我考父父子子汝為我對正值惡抵伯陽曰伯陽之不肖誠如尊教尊亦正值軟抵耳謏慙無言時人傳之以為嗤笑范𢎞之字長文安北將軍汪之孫也襲爵武興侯雅正好學以儒術該眀為太學博士時衛將軍謝石薨請諡下禮官議𢎞之議曰石階藉門蔭屢登崇顯總司百揆翼贊三臺間練庶事勤勞匪懈內外僉議皆曰與能當淮肥之捷勳拯危墜雖皇威遐震狡寇天亡因時立功石亦與焉又開學校以延胄子雖盛化未洽亦愛禮存羊然古之賢輔大則以道事君侃侃終日次則厲身奉國夙夜無怠下則愛人惜力以濟時務此數者然後可免惟塵之譏塞素餐之責矣今石位居朝端任則論道唱言無忠國之謀守職則容身而已不可謂事君貨黷京邑聚斂無厭不可謂厲身坐擁大衆侵食百姓大東流於逺近怨毒結於衆心不可謂愛人工徒勞於土木思慮殫於機巧紈綺盡於婢妾財用糜於絲桐不可謂惜力此人臣之大害有國之所去也先王所以正風俗理人倫者莫尚乎節儉故夷吾受謗乎三歸平仲流美於約已自頃風軌陵遲奢僣無度廉耻不興利競交馳不可不深防源本以絶其流末漢文襲弋綈之服諸侯尤侈武帝焚雉頭之裘靡麗不息良由儉德雖彰而威禁不肅道自我建而刑不及物若存罰其違亡貶其惡則四維必張禮義行矣按諡法因事有功曰襄貪以敗官曰墨宜諡曰襄墨公又論殷浩宜加贈諡不得因桓溫之黜以為國典仍多敘溫移鼎之迹時謝族方顯桓宗猶盛尚書僕射王珣溫故吏也素為溫所寵三怨交集乃出𢎞之為餘杭令將行與會稽王道子箋及王珣書極論前事辭旨憤愾然竟以桓謝之故不調卒於餘杭令年四十七王歡字君厚樂陵人也安貧樂道専精耽學不營産業常丐食誦詩雖家無斗儲意怡如也其妻患之或焚毁其書而求改嫁歡笑而謂之曰卿不聞朱買臣妻邪時聞者多哂之歎守志彌固遂為通儒至慕容暐襲偽號署為國子博士親就受經遷祭酒及暐為苻堅所滅歡死於長安梁伏曼容字公儀平昌安邱人晉著作郎滔之曽孫也父允之宋司空主簿曼容早孤與母兄客居南海少篤學善老易倜儻好大言常云何晏疑易中九事以吾觀之晏了不學也故知平叔有所短聚徒教授以自業為驃騎行參軍宋眀帝好周易集朝臣於清暑殿講詔曼容執經曼容素美風采眀帝以方嵇叔夜使吳人陸採微畫叔夜像以賜之為尚書外兵郎嘗與袁粲罷朝相會言元理時論以為一臺二絶升眀末為輔國長史南海太守至石門作貪泉銘齊建元中上書勸封禪髙帝以為其禮難備不從仕為太子率更令侍皇太子講衛將軍王儉深相愛好令與河內司馬憲吳郡陸澄共撰喪服及竟又欲與定禮樂會儉薨建武中拜中散大夫時眀帝不重儒術曼容宅在瓦棺寺東施髙坐於聽事有賓客輒升髙坐為講説生徒常數十百人梁臺建召拜司徒司馬出為臨海太守天監元年卒官年八十二曼容多伎術善音律射御風角醫算莫不間了為周易毛詩喪服集解老莊論語義子暅字元曜幼傳父業能言元理與樂安任昉彭城劉曼俱知名仕齊位東陽郡丞鄞令時曼容已致仕故頻以外職處暅令得養焉武帝踐阼兼五經博士與吏部尚書徐勉中書侍郎周捨總知五禮事出為永陽內史在郡清潔政務安靜郡人何貞秀等一百五十四人詣州言狀湘州刺史以聞詔勘有十五事為吏民所懷帝善之徙新安太守在郡清恪如永陽時人有賦稅不登者輒以太守田米助之郡多麻苧家人乃至無以為繩其厲志如此屬縣始新遂安海寧並同時生為立祠徴為國子博士領長水校尉時始興內史何逺纍著清績武帝擢為黃門侍郎俄遷信武將軍監吳郡事暅自以名輩素在逺前為吏俱稱廉白逺纍見擢暅循階而已意望不滿多託疾居家尋求假到東陽迎妹喪因留會稽築宅自表解職詔以為豫章內史乃出拜書侍御史虞皭奏暅怨望要君請以大不敬論有詔勿治暅遂得就郡徴為給事黃門侍郎領國子博士未赴卒初暅父曼容與樂安任遙皆昵於齊太尉王儉遙子昉及暅並見知頃之昉才遇稍盛齊末已為司徒左長史暅獨滯於參軍事及終名位略相侔暅性儉素車服粗惡外雖退靜內不免心競故見譏於時然能推薦後來常若不及少年士子或以此依之子挺字士摽幼敏悟七嵗通孝經論語及長博學有才思為五言詩善效謝康樂體父友樂安任昉深相歎異常曰此子日下無雙齊末州舉秀才䇿為當時第一武帝師至新林挺迎謁帝見之甚悅謂之顔子引為征東行參軍時年十八矣天監初除中軍參軍事居宅在潮溝於宅講論語聽者傾朝挺三世同時聚徒罕有其比纍遷為晉陵武康令罷縣還仍於東郊築室不復仕挺少有盛名又善處當世朝中貴勢多與交遊故不能久事隱靜後遂出仕除南臺書侍御史因事納賄被劾懼罪乃變服出家名僧挺藏匿久之遇赦乃出太心寺會邵陵王為江州攜挺之鎮王好文義深被恩禮挺不堪蔬素因此還俗侯景亂中卒著邇説十卷文集二十卷子知命以其父宦途不進怨朝廷後遂盡心侯景景襲郢州圍巴陵軍中書檄皆其文也言及西臺莫不劇筆及景篡位以為中書舍人權傾內外景敗被送江陵於獄幽死挺弟捶亦有才名為邵陵王記室參軍何佟之字士威廬江灊人晉豫州刺史惲六世孫也祖邵之宋員外散騎常侍父歆齊奉朝請佟之少好三禮師心獨學強力専精手不輟卷讀禮論二百餘萹略皆上口太尉王儉雅相推重起家揚州從事仍為總眀館學士仕齊初為國子助教為諸生講喪服結草為絰屈手巾為冠諸公有未曉者委曲誘誨都下稱其醇儒建武中為鎮北記室參軍侍皇太子講時步兵校尉劉瓛徴士吳苞皆已卒都下大儒唯佟之而已當時國家吉凶禮則皆取決焉後為驃騎司馬永元末都下兵亂佟之常集諸生講論孜孜不怠性好潔一日之中洗滌者十餘過猶恨不足時人稱為水淫有至性父母亡後常設一屋晦朔拜伏流涕如此者二十餘年當世服其孝行于時又有遂安令劉澄為性彌好潔在縣掃拂郭邑路無橫草水翦蟲穢百姓不堪命坐免官然甚貞正善醫術與徐嗣伯埓名子聰能世其家業佟之自東昏即位以其凶虐乃謝病終身不涉其廷武帝踐阼尊重儒術以為尚書左丞是時百度草創佟之依禮定議多所裨益天監二年卒官帝甚悼惜之故事左丞無贈官者帝詔特贈黃門侍郎儒者榮之所著文章禮議百許萹子朝隱朝晦嚴植之字孝源建平秭歸人也祖欽宋散騎常侍植之少善莊老能元言精解喪服孝經論語及長編習鄭氏禮周易毛詩左氏春秋性淳孝謹厚不以所長髙人少遭父憂因菜食二十三載仕齊為廣漢王國右長侍仍侍王讀及王誅國人莫敢視植之獨奔哭手營殯斂徒跣送喪墓所為起冡葬畢乃還當時義之後為康樂令植之在縣清白吏民稱之天監二年詔求通儒修五禮有司奏植之主凶禮四年初置五經博士各開館教授以植之兼五經博士植之館在潮溝生徒常百數講説有區假次第析理分眀每當登講五館生畢至聽者千餘人遷中撫軍記室參軍猶兼博士卒於館植之自疾後便不受廩奉妻子困乏及卒喪無所寄生徒為市宅乃得成喪植之性仁慈好行隂德在暗室未嘗怠也少嘗山行見一患者問其姓名不能答載與俱歸為營醫藥六日而死為棺殮殯之卒不知何許人也又嘗緣柵塘行見患人卧塘側問之云姓黃家本荆州為人傭賃疾篤船主將發棄之於岸植之惻然載還療之經年而愈其人請終身充奴僕以報厚恩植之不受遺以資糧遣之所撰凶禮儀注四百七十九卷司馬筠字貞素河內溫人也晉譙王承七代孫祖亮宋司空從事中郎父端字敬文齊奉朝請始安王遙光使掌文記遙光之敗曹虎入城見之端曰身蒙始安厚恩君宜見殺虎叱令速去答曰死生命也君見事不捷便以義師為賊虎捨之去尋兵至見殺筠少孤貧好學師沛國劉瓛強力専精深為瓛器及長博通經術尤眀三禮天監初為暨陽令有清績入拜尚書祠部郎七年安成國太妃陳氏薨江州刺史安成王秀荆州刺史始興王憺並以慈母表解職詔不許還攝本任而太妃在都喪祭無主中書舍人周捨議曰賀彥先稱慈母之子不服慈母之黨婦又不從夫而服慈姑小功服無從故也庾蔚之云非徒子不從母而服其黨孫又不從父而服其慈母由斯而言慈祖母無服眀矣尋門內之哀不容自同於常案父之祥禫子並受弔今二王諸子宜以成服日單衣一日為位受弔制曰二王在逺世子宜攝祭事捨又曰禮云縞素元武子姓之冠則世子衣服宜異於常可著細布衣絹為領帶三年不聽樂又禮及春秋庶母不世祭蓋謂無王命者耳吳太妃既朝命所加得用安成禮秩則當祔廟五世親盡乃毁陳太妃命數之重雖則不異慈孫既不從服廟食理無傳祀子祭孫止是會經文武大議帝由是敕禮官議皇子慈母之服筠議宋朝五服制皇子服訓養母依禮庶母慈已宜從小功之制案曽子問云子遊曰喪慈母禮歟孔子曰非禮也古者男子外有傅內有慈母君命所使教子也何服之有鄭元注云此指謂國君之子也若國君之子不服則王者之子不服可知又喪服經云君子子為庶母慈已者傳曰君子子者貴人子也鄭元引內則三母止施於卿大夫以此而推則慈母之服上不在五等之嗣下不逮三士之息儻其服者止卿大夫尋諸侯之子尚無此服况乃施之皇子謂宜依禮刋除以反前代之惑武帝以為不然曰禮言慈母凡有三條一則妾子之無母使妾之無子者養之命為母子服以三年喪服齊衰章所言慈母如母是也二則嫡妻之子無母使妾養之慈撫隆至雖均乎慈愛但嫡妻之子妾無為母之義而恩深事重故服以小功喪服小功章所以不直言慈母而云庶母慈已者眀異於三年之慈母也其三則子非無母正是擇賤者視之義同師保而不無慈愛故亦有慈母之名師保既無服則此慈母亦無服矣內則曰擇於諸母與可者使為子師其次為慈母次為保母此其眀文言擇諸母是擇人而為此三母非謂擇取兄弟之母也何以知之若是兄弟之母其先有子者則是長妾長妾之禮實有殊加何容次妾生子乃退成保母斯不可也又有多兄弟之人於義或可若始生之子便應三母俱闕邪由是推之內則所言諸母是謂三母非兄弟之母眀矣子遊所問自是師保之慈非三年小功之慈也故夫子得有此對豈非師保之慈母無服之證乎鄭元不辨三慈混為訓釋引彼無服以注慈已後人致繆實此之由經言君子子者此雖起於大夫眀大夫猶爾自斯以上彌應不異故傳云君子子者貴人之子也總言曰貴無所不包經傳互文交相顯發則知慈母之義通乎大夫以上矣宋代此科不乖禮意便加除削良是所疑於是筠等請依制改定嫡妻之子母沒為父妾所養服之五月貴賤並同以為永制筠後為尚書左丞卒於始興內史子夀傳父業眀三禮位尚書祠部郎曲阿令卞華字昭嶽濟隂宛句人晉驃騎將軍壼六世孫也父倫之齊給事中華幼孤貧好學年十四召補國子生及長遍習五經與平原眀山賓會稽賀㻛同業友善天監中為安成王功曹參軍兼五經博士聚徒教授華博涉有機辨説經析理為當時之冠江左以來鍾律絶學至華乃通焉位尚書儀曹吳令卒崔靈恩清河東武城人也少篤學遍習五經尤精三禮三傳靈恩先在北仕魏為太常博士天監十三年歸梁武帝重其儒術纍遷步兵校尉兼國子博士靈恩聚徒教授聽者常數百人性拙朴無風采及解析經理甚有精致都下舊儒咸稱重之助教孔僉尤好其學靈恩先習左傳服解不為江東所行及改説杜義每文句常申服以難杜遂著左氏條義以眀之時助教虞僧誕又精杜學因作申杜難服以答靈恩世並傳焉僧誕會稽餘姚人以左氏教授聽者亦數百人該通義例當世莫及先是儒者論天互執渾蓋二義論蓋不合渾論渾不合蓋靈恩立義以渾蓋為一焉出為長沙內史還除國子博士講衆尤盛又出為桂州刺史卒官靈恩集注毛詩二十二卷注周禮四十卷制三禮義宗三十卷左氏經傳義二十二卷左氏條例十卷公羊穀梁文句義十卷孔僉會稽山隂人少師事何允通五經尤眀三禮孝經論語講説並數十篇生徒亦數百人三為五經博士後為海鹽山隂二縣令僉儒者不長於政術在縣無績太清亂卒於家子淑元頗涉文學官至太學博士僉兄子元素又習三禮有盛名早卒盧廣范陽涿人自云晉司空從事中郎諶之後也少眀經有儒術天監中歸梁仕步兵校尉兼國子博士遍講五經時北來人儒學者有崔靈恩孫詳蔣顯並聚徒講説而音辭鄙拙唯廣言論清雅不類北人僕射徐勉兼通經術深相賞好後為尋陽太守武陵王長史卒官沈峻字士嵩吳興武康人也家世農夫至峻好學與舅太史叔眀師事宗人沈麟士在門下積年晝夜自課時或昏睡輒以杖自擊其篤志如此後出都遍遊講肆遂博通五經尤長三禮為兼國子助教時吏部郎陸倕與僕射徐勉書薦峻曰凡聖賢所講之書必以周禮立義則周官一書實為羣經源本此學不傳多歷年世北人孫詳蔣顯亦經聽習而音革楚夏故學徒不至唯助教沈峻特精此書皆時開講肆羣儒劉嵒沈宏沈熊之徒並執經下坐北面受業莫不嘆服人無間言弟謂宜即用此人令其専此一學周而復始使聖人正典廢而更興勉從之奏峻兼五經博士於時講授聽者常數百人及中書舍人賀琛奉敕撰梁官儀乃啓峻及孔子袪補西省學士助撰録書成入兼中書通事舍人出為武康令卒官傳峻業者又有吳郡張及會稽孔子雲官皆至五經博士尚書祠部郎太史叔眀吳興烏程人吳太史慈後也少善莊老兼通孝經論語禮記尤精三禮每講説聽者常五百餘人為國子助教邵陵王綸好文學及出為江州刺史攜叔眀之鎮王遷郢州又隨府所至輒講授故江州人士皆傳其學峻子文阿列在陳史孔子袪會稽山隂人也少孤貧好學耕耘樵採常懷書自隨投間則誦讀勤苦自勵遂通經術尤眀古文尚書為兼國子助教講尚書四十萹聽者常數百人為西省學士助賀琛撰録書成兼司文侍郎不就纍遷兼中書通事舍人加步兵校尉武帝撰五經講疏及孔子正言専使子袪檢閲羣書以為義證事竟敕子袪與右衛朱異左丞賀琛於士林館遞日執經後加通直正員郎卒官凡著尚書義二十卷集注尚書三十卷續朱異集注周易義一百卷續何承天集禮論一百五十卷皇侃吳郡人青州刺史象九世孫也少好學師事賀㻛精力専門盡通其業尤眀三禮孝經論語為兼國子助教於學講説聽者恆數百人撰禮記講疏五十卷書成奏上詔付祕閣頃之召入夀光殿説禮記義武帝善之加員外散騎侍郎侃性至孝常日限誦孝經二十遍以擬觀世音經丁母憂還鄉里平西邵陵王欽其學厚禮迎之及至感心疾卒所撰論語義十卷與禮記疏並見重於世學者傳焉陳沈文阿字國衡梁武康令峻之子也文阿性剛強有膂力少習父業研精章句祖舅太史叔眀舅王慧興並通經術而文阿頗傳之又博採先儒異同自為義疏通三禮三傳察孝廉纍遷國子助教五經博士簡文帝在東宫引為學士深相禮遇及撰長春義記多使文阿撮異聞以廣之及侯景寇逆簡文别遣文阿募士卒入援都臺城陷與張􅌘保吳興􅌘敗文阿竄于山野景素聞其名求之甚急文阿窮迫不知所出登樹自縊遇有所親救之自投而下折其左臂及景平陳武帝以文阿州里表為原鄉令監江隂郡紹泰元年入為國子博士尋領步兵校尉兼掌儀禮自太清之亂臺閣故事無有存者文阿父峻梁世常掌朝儀頗有遺藁於是斟酌裁撰禮度皆自之出及陳武帝受禪文阿輒棄官還武康帝大怒發使往誅之時文阿宗人沈恪為郡請使者寬其死即面縛鎖頸致於上前上視而笑之曰腐儒復何為者遂赦之武帝崩文阿與尚書左丞徐陵中書舍人劉師知等議大行皇帝靈座俠御衣服之制語在師知傳及文帝即位剋日謁廟尚書左丞庾持奉詔遣博士議其禮文阿議曰昔者隆周之時公旦叔父吕召爪牙成王在喪禍幾覆國是以既葬便有公冠之儀始殯受麻冕之制斯蓋示天下以有主慮社稷之艱危也末葉從橫漢承其弊雖文景刑厝而七國連兵或踰月即尊或崩日稱詔此皆有為而為之非無心於禮制也今國諱之日雖抑哀於璽紱之重猶未序於君臣之儀古禮朝廟退坐正寢聽羣臣之政今皇帝拜廟還宜御太極前殿以正南面之尊此即周康王朝一二臣衛者也其壤奠之節周禮以玉作贄公侯以圭子男執璧此以玉作瑞也奠贄竟又復致享天子以璧王后用琮秦燒經典威儀散滅叔孫通定禮尤失前憲奠贄不圭致享無帛公王同璧鴻臚奏賀若此數事未聞於古後相沿襲至梁行之夫稱觴奉夀國家大慶四廂雅樂歌奏歡欣今君臣吞哀兆庶抑割豈同於惟新之禮乎且周康賓稱奉圭無萬夀之獻此則前凖眀矣愚以今坐正殿止行薦璧之儀無賀酒之禮謹撰謁廟還升正殿羣臣陪薦儀注如别詔可施行尋遷通直散騎常侍兼國子博士領羽林監仍令於東宫講孝經論語天嘉中卒贈廷尉卿所撰儀禮八十餘條春秋禮記孝經論語義記七十餘卷經典大義十八卷並行於時儒者多傳其學沈洙字𢎞道吳興武康人也祖休季梁餘杭令父山卿梁國子博士中散大夫洙少方雅好學不妄交遊通三禮春秋左氏傳精識強記五經章句諸子史書問無不答仕梁為尚書祠部郎時年蓋二十餘大同中學者多涉獵文史不為章句而洙獨積思經術吳郡朱異會稽賀琛甚嘉之及異琛於士林館講制旨義常使洙為都講侯景之亂洙竄於臨安時文帝在焉親就習業及武帝入輔除國子博士與沈文阿同掌儀禮武帝受禪加員外散騎常侍位揚州别駕從事史大匠卿有司奏建康令沈孝軌門生陳三兒牒稱主人翁靈柩在周主人奉使關右固欲迎喪久而未成三月晦即是再周主人弟見在此者為至月末除靈內外即吉為待主人還情禮申竟以事咨左丞江德藻德藻議謂王衛軍云久喪不葬唯主人不變其餘親各終月數而除此蓋引禮文論在家內有事故未得葬者耳孝軌既在異域雖已迎喪還期無指諸弟若遂不除永絶婚嫁此於人情或為未允中原淪陷以後理有事例宜咨沈常侍詳議決洙議曰禮有變正又有從宜禮喪服小記云久而不葬者唯主喪者不除其餘以麻終月數者除喪記注云其餘謂傍親如鄭所解衆子皆應不除王衛軍所引蓋禮之正也但魏氏東關之役既失亡尸柩葬禮無期時議以為禮無終身之喪故制使除服晉氏喪亂或死於虜庭無由迎殯江左故復申眀其制李允之祖王華之父並存亡不測其子孫制服依時釋衰此並變禮之宜也孝軌雖因奉使便欲迎喪而還期未剋宜依東關故事在此者並應釋除衰麻毁靈桁祭若喪柩得還别行改葬之禮自天下寇亂西朝傾覆若此之徒諒并一二寧可喪期無數而弗除衰服朝廷自應為之限制以義斷恩德藻依洙議奏可文帝即位纍遷光祿卿侍東宫讀廢帝嗣位歷尚書左丞衡陽王長史行府國事梁代舊律測囚之法日一上起自晡鼓盡于二更及比部郎范泉刪定律令以舊法測立時久非人所堪分其刻數日再上廷尉以為新制過輕請集八坐丞郎並祭酒孔奐行事沈洙五舍人會尚書省詳議時宣帝録尚書集衆議之都官尚書周𢎞正議曰凡小大之獄必應以情政言依凖五聽驗其虛實豈可令恣考掠以判刑罪且測人時節本非古制近代以來方有此法起自晡鼓迄於二更豈是常人所能堪忍所以重械之下危墯之上無人不服誣枉者多朝晚二時同等刻數進退而求於事為𠂻若謂小促前期數致實罪不服如復時節延長則無愆妄款且人之所堪既有強弱人之立意固亦多途至如貫髙榜笞刺爇身無完者戴就熏針並極困篤不移豈關時刻長短掠測優劣夫與殺不辜寧失不經罪疑唯輕功疑唯重斯則古之聖王垂此眀法愚謂依范泉著制為允洙議曰夜中測立緩急易欺兼用晝漏於事為允但漏刻賖促今古不同漢書律厯何承天祖沖之祖暅父子漏經並自關鼓至下鼓自晡鼓至關鼓皆十三刻冬夏四時不異若其日有長短分在中時前後今用梁末改漏下鼓之後分其短長夏至之日各十七刻冬至之日各十二刻廷尉今牒以時刻短促致罪人不款愚意願去夜測之昧從晝漏之眀斟酌古今之聞參會二漏之議捨秋冬之少刻從夏日之長晷不問寒暑並依今之夏至朝夕上測各十七刻比之古漏則一上多昔四刻即用今漏則冬至多五刻雖冬至之時數刻侵夜正是少日於事非疑庶罪人不以漏短而無捍獄囚無在夜之致誣求之鄙意竊謂宜依范泉前制宣帝曰沈長史議得中宜更博議左丞宗元饒議曰沈議非頓異范正是欲使四時均其刻數請寫還刪定曹詳改前制宣帝依事施行洙以太建元年卒戚袞字公文吳郡鹽官人也少聰慧遊學都下受三禮於國子助教劉文紹一二年中大義略舉年十九梁武帝敕䇿孔子正言并周禮禮記義袞對髙第除揚州祭酒從事史就國子博士宋懷方質儀禮義懷方北人自魏攜儀禮禮記疏祕惜不傳及將亡謂家人曰吾死後戚生若赴便以儀禮禮記義本付之若其不來即宜隨尸而殯為儒者推許如此尋兼太學博士簡文在東宫召袞講論又嘗置宴集元儒之士先命道學互相質難次令中庶子徐摛馳騁大義間以劇談摛辭辨縱橫難以答抗諸儒懾氣時袞説朝聘義摛與往復袞精采自若領答如流簡文深加歎賞敬帝立為江州長史仍隨沈泰鎮南豫州泰之奔齊逼袞俱行後自齊逃還又隨程文季於吕梁軍敗入周久之得歸卒於始興王府録事參軍袞於梁代撰三禮義記逢亂亡失禮記義四十卷行於世鄭灼字茂昭東陽信安人也幼聰敏勵志儒學少受業於皇侃梁簡文在東宫雅愛經術引灼為西省義學士承聖中為兼中書通事舍人仕陳武帝文帝時纍遷中散大夫後兼國子博士未拜卒灼性精勤尤眀三禮少時嘗夢與皇侃遇於途侃謂曰鄭郎開口侃因唾灼口中自後義理益進灼家貧抄義疏以日繼夜筆毫盡每削用之常蔬食講受多苦心熱若瓜時輒偃卧以瓜鎮心起便講誦其篤志如此時有晉陵張崖吳郡陸詡吳興沈德威會稽賀德基俱以禮學自命張崖傳三禮於同郡劉友紹天嘉元年為尚書儀曹郎廣沈文阿儀注撰五禮後為國子博士陸詡少習崔靈恩三禮義梁時百濟國表求講禮博士詔令詡行天嘉中位尚書祠部郎沈德威字懷逺少有操行梁太清末遁於天目山築室以居雖處亂離而篤學無倦天嘉元年徴出都後為國子助教每自學還私室講授道俗受業數百人率常如此遷太常丞兼五禮學士後為尚書祠部郎陳亡入隋官至秦王府主簿卒年五十五賀德基字承業世傳禮學祖父發父淹仕梁俱為祠部郎並有名當世德基少遊學都下積年不歸衣資罄乏又耻服故弊盛冬止衣夾􅀈袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方為重器不久貧寒故以此相遺耳問姓名不答而去德基於禮記稱為精眀位尚書祠部郎雖不至大官而三世儒學俱為祠部郎時論美其不墜全緩字𢎞立吳郡錢唐人也幼受易於博士褚仲都篤志研玩得其精微大建中位鎮南始安王府咨議將軍緩通周易老莊時人言元者咸推焉張譏字直言清河武城人也祖僧寶梁太子洗馬父仲悅梁尚書祠部郎譏幼聰俊有思理年十四通孝經論語篤好元言受學於汝南周𢎞正每有新意為先輩推伏梁大同中召補國子正言生梁武帝於文德殿釋乾坤文言譏與陳郡袁憲等預焉敕令議論諸儒莫敢先出譏乃整容而進咨審循環辭令溫雅帝甚異之賜裙襦絹等仍云表卿稽古之力譏早喪母有錯綵經帕即母之遺制及有所識家人具以告之每嵗時輒對帕哽噎不能勝及丁父憂居喪過禮遷士林館學士簡文在東宫出士林館發孝經題譏論議往復甚見嗟賞每有講集必令召譏及侯景寇逆譏於圍城之中獨侍哀太子於武德後殿講老莊臺城陷譏崎嶇避難卒不事景天嘉中為國子助教時周𢎞正在國學發周易題𢎞正第四弟𢎞直亦在講席譏與𢎞正論議𢎞正屈𢎞直危坐厲聲助其申理譏正色謂𢎞直曰今日義集辨正名理雖兄弟急難四公不得有助𢎞直謂曰僕助君師何為不可舉坐以為笑樂𢎞正嘗謂人曰吾每登坐見張譏在席使人懍然宣帝時為武陵王限內記室兼東宫學士後主在東宫集宫僚置宴時造玉柄麈尾新成後主親執之曰當今雖復多士如林至於堪捉此者獨張譏耳即手授譏仍令於溫文殿講莊老宣帝幸宫臨聽賜御服衣一襲後主嗣位為國子博士東宫學士後主常幸鍾山開善寺召從臣坐於寺西南松林下敕召譏豎義時索麈尾未至後主勑取松枝手以屬譏曰可代麈尾顧謂羣臣曰此即是譏後事陳亡入隋卒於長安年七十六譏性恬靜不求榮利常慕間逸所居宅營山池植花果講周易老莊而教授焉吳郡陸元朗朱孟博一乘寺沙門法才法雲寺沙門慧拔至真觀道士姚綏皆傳其業譏所撰周易義三十卷尚書義十五卷毛詩義二十卷孝經義八卷論語義二十卷老子義十一卷莊子內萹義十二卷外萹義二十卷雜萹義十卷元部通義十二卷遊元桂林二十四卷後主嘗勑就其家寫入祕閣子孝則官至始安王記室參軍顧越字思南吳郡鹽官人也所居新坡黃岡世有鄉校由是顧氏多儒學焉祖道望齊散騎侍郎父仲成梁護軍司馬豫章王府咨議參軍家傳儒業並専門教授越少孤以勤苦自立聰慧有口辨勵精學業不捨晝夜弱冠遊學都下通儒碩學必造門質疑討論無倦至於微言元旨九章七曜音律圖緯咸盡其精微時太子詹事周捨以儒學見重名知人一見越便相歎異命與兄子𢎞正𢎞直遊厚為之談由是聲譽日重時又有會稽賀文發學兼經史與越名相埓故郡下謂之發越焉初為南平元襄王偉國右常侍與文發俱入府並見禮重尋轉行參軍大通中詔飈勇將軍陳慶之送魏北海王皓還北主魏慶之請越參其軍事時慶之所向剋捷直至洛陽既而皓遂肆驕縱又上下離心越料其必敗以疾得歸裁至彭城慶之果見摧衄越竟得先反時稱其見機及至除安西湘東王府參軍及武帝撰制旨新義選諸儒在所流通遣越還吳敷揚講説越遍該經藝深眀毛詩傍通異義特善老莊尤長論難兼工綴文間尺牘長七尺三寸美須眉武帝嘗於重雲殿自講老子僕射徐勉舉越論義越抗首而請音響若鐘容止可觀帝深贊美之由是擢為中軍宣城王記室參軍尋除五經博士仍令侍宣城王講大同八年轉安西武陵王府內中録事參軍尋遷府咨議及侯景之亂越與同志沈文阿等逃難東歸賊黨數授以爵位越誓不受命承聖二年詔受宣惠晉安王府咨議參軍領國子博士越以世路未平無心仕進因歸鄉栖隱於虎邱山與吳興沈炯同郡張種會稽孔奐等每為文會紹泰元年復徴為國子博士天嘉中詔侍東宫讀除東中郎鄱陽王府咨議參軍甚見優禮尋領羽林監遷給事中黃門侍郎國子博士侍讀如故時朝廷草創疑議多所取決咸見施用每侍講東宫皇太子常虛懷禮接越以宫僚未盡時彥且太子仁弱宣帝有奪宗之兆內懷憤激乃上書言其故帝深感之而不能革及廢帝即位拜散騎常侍兼中書舍人黃門侍郎如故領天保博士掌儀禮猶為帝朝夕講授甚見尊寵時宣帝輔政華皎舉兵不從越因請假東還或譛之宣帝言越將扇動蕃鎮遂免官大建元年卒於家年七十所著喪服毛詩老子孝經論語等義疏四十餘卷詩頌碑志箋表凡二百餘萹時有東陽龔孟舒者亦通毛詩善談名理仕梁位尋陽郡丞元帝在江州遇之甚重躬師事焉天嘉中位太中大夫沈不害字孝和吳興武康人也家世冠族不害幼孤而修立好學梁世為太學博士天嘉初除衡陽王府中記室參軍兼嘉德殿學士自梁季喪亂至是國學未立不害上書請建儒宫詔付外議依事施行又表改定樂章詔使製三朝樂歌詞八首合二十曲行之樂府遷國子博士領羽林監勑修五禮掌䇿文諡議等事大建中位光祿卿通直散騎常侍兼尚書左丞卒不害通經術善屬文雖博綜經典而家無卷軸每製文操筆立成曽無尋檢汝南周𢎞正常稱之曰沈生可謂意聖人乎著五禮儀一百卷文集十四卷子志道字崇基少知名除安東新蔡王記室參軍陳亡入隋卒王元規字正範太原晉陽人也祖道實齊晉安郡守父瑋梁武陵王府中記室參軍元規八嵗而孤兄弟三人隨母依舅氏住臨海郡時年十二郡土豪劉瑱者資財巨萬欲妻以女母以其兄弟幼弱欲結強援元規泣請曰因不失親古人所重豈得茍安異壤輒昏非類母感其言而止元規性孝事母甚謹晨夕未嘗離左右梁時山隂縣有暴水流漂居宅元規唯有一小船倉卒引其母妹并姑姪入船元規自執楫掉而去留其男女三人閣於樹秒及水退俱獲全時人稱其至行少從吳興沈文阿受業十八通春秋孝經論語喪服記舉髙第除中軍安成王府記室參軍天嘉中為鎮東鄱陽王府記室參軍領國子助教後主在東宫引為學士就授禮記左傳喪服等義遷國子祭酒新安王伯固嘗因入宫適會元規將講乃啓請執經時論榮之俄除尚書祠部郎自梁代諸儒相傳為左氏學者皆以賈逵服虔之義難駮杜預凡一百八十條元規引證通析無復疑滯每國家議吉凶大禮常參預焉後為南平王府限內參軍王為江州元規隨府之鎮四方學徒不逺來請道者常數十百人遷散騎常侍入隋卒於秦王府東閣祭酒著春秋發題辭及義記十一卷續經典大義十四卷孝經義記兩卷左傳音三卷禮記音二卷子大業聰敏知名時有吳郡陸慶少好學遍通五經尤眀春秋左氏傳節操甚髙仕梁為婁令天嘉初徴為通直散騎侍郎不就永陽王為吳郡太守聞其名欲與相見慶辭以疾時宗人陸榮為郡三官掾慶嘗詣焉王乃微服往榮宅穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚兹鄱陽晉安王俱以記室徴不就乃築室屏居以禪誦為事由是傳經受業者蓋鮮焉通志卷一百七十三
