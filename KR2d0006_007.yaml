body:
  text: 通志卷四宋右廸功郎鄭樵漁仲撰秦紀第四秦臣謹按秦起於臯陶臯陶生伯益父子俱佐舜有功分土賜姓然後子孫蕃庶或於許或於英或於六至春秋而國祀猶存者徳之所逮也由伯益至非子始號秦邑由非子至襄公始建國為諸侯司馬遷曰秦之先高陽氏之苗裔孫曰女脩女脩織元鳥隕卵而吞之生大業大業娶少典之子曰女華生大費與禹平水土有功舜賜以皁游曰爾後必大乃妻以姚姓之玉女大費拜受佐舜調馴鳥獸鳥獸多馴服是為栢翳舜賜姓嬴氏然元鳥隕卵之言恐因生商之事而訛也按地里志秦之先伯益助禹治水為舜虞官養草木鳥獸賜姓嬴栢翳即伯益音訛字異耳况少典在黄帝之前至大業六世猶娶其女乎遷之此言未可信也大費生二子一曰大廉實鳥俗氏二曰若木實費氏若木之元孫費昌去夏歸商為湯御以敗桀於鳴條大廉之元孫曰孟戲仲衍鳥身人言帝太戊聞而卜之使御吉遂妻之自太戊以下仲衍之後遂世有佐商之功嬴姓多顯其元孫曰仲潏在西戎保西垂生蜚廉蜚廉生惡來革惡來有力手裂虎兕蜚廉善走父子俱以材力事紂武王伐紂殺惡來是時蜚㢘為紂作石棺於北方還無所報為壇霍太山而報得石棺銘曰帝令處父不與商亂賜爾石棺以華氏死遂葬於霍太山今晉州霍邑有此冡常祠之蜚㢘之季子曰季勝生孟增孟増幸於周成王是為宅臯狼臯狼生衡父衡父生造父造父以善御幸於周穆王得驥溫驪驊駵騄耳之駟穆王八駿皆因其毛物以命此記不全西巡狩樂而忘歸徐偃王作亂造父為穆王御長驅歸周以救亂穆王以趙城封造父由此為趙氏自蜚㢘生季勝以下五世至造父别居趙趙衰其後也惡來之子曰女防生旁臯旁臯生太几太几生大駱大駱生非子秦非子始以造父之寵䝉趙城姓趙氏居犬邱今槐里也好馬及畜善養息之周孝王召使主馬于汧渭之間馬大蕃息孝王欲以非子為大駱適嗣大駱娶申侯之女生成為適申侯言於孝王曰昔我先驪山之女為戎胥軒妻生仲潏以親故歸周保西垂西垂以睦今我復與大駱妻生適子成申駱重㛰西戎皆服所以為王室也王其圖之孝王曰昔栢翳為舜主畜畜多息故有土賜姓嬴今其後亦為朕息馬朕其分土為附庸邑之秦天水隴西縣舊有秦亭使復續嬴氏祀號曰秦嬴亦不廢大駱之適以和西戎秦嬴生秦侯秦侯立十年卒生公伯公伯立三年卒生秦仲秦仲三年周厲王無道西戎叛王室滅大駱之族于犬丘宣王即位乃以秦仲為大夫討西戎為戎人所殺秦仲立二十三年死於戎難莊公者秦仲之長子也秦仲有子五人宣王俱召之而授以兵七千人使伐西戎破之復其先大駱地宣王以莊公為西垂大夫居故犬丘生三子長子世父曰戎殺我大父我非殺戎王不敢入邑讓其弟襄公為太子自將兵擊西戎莊公立四十四年卒襄公二年戎圍犬邱世父擊之為戎人所虜歲餘復歸世父七年西戎犬戎與申侯伐周殺幽王驪山下襄公救周有功周避犬戎難東徙洛邑襄公以兵送周平王王封襄公為諸侯賜之岐以西之地曰戎為不道侵我岐豐秦能逐戎即有其地與誓封爵之襄公於是始建國與諸侯通使聘享之禮乃用駵駒黄牛羝羊各三祠上帝西畤年表云西畤祠白帝十二年伐戎至岐卒葬西垂子文公立文公三年以兵七百人東獵四年至汧渭之㑹曰昔周邑我先秦嬴於此卒為諸侯乃卜居之吉即營而邑之十年初為鄜畤鄜屬馮翊用三牢十三年初有史以紀事十六年公伐戎戎敗走於是取周餘民略地至岐岐以東獻之周十九年得陳寳二十年法初有三族之罪二十七年伐南山大梓豐大特今武都故道有怒特祠圖大牛上生樹夲有牛從樹中出後見於豐水之中四十八年太子卒諡竫公五十年文公卒葬西山西山在今隴西之西縣竫公子立是為寧寧公二年徙居平陽徐廣曰郿之平陽亭遣兵伐蕩社三年與亳戰亳王奔戎遂滅蕩社亳蕩舊都以戎人居之為亳王故其邑名蕩社也四年魯公子翬弑其君隱公十二年伐蕩氏取之寧公或作憲公生十歳立立十二年卒葬西山有子三人長武公為太子次徳公徳公母弟出子公之卒也大庶長弗忌威壘參父等共廢太子而立出子為君出子六年參父等復令人賊殺出子出子生五歳立立六年遇害參父等乃復立故太子武公武公元年伐彭戲氏至于華山下居平陽封宫三年誅三庶長夷三族以其殺出子故也十年伐邽冀戎初縣之邽属隴西冀屬天水十一年初縣杜鄭京兆有杜縣鄭縣滅小虢虢在雍州十三年齊管至父連稱等弑其君襄公而立公孫無知雍廪殺無知管至父等而立桓公十九年晉曲沃伯始為晉侯齊桓公㑹于鄄始伯諸侯二十年卒葬雍平陽或曰葬宣陽聚東南初以人從死蓋六十有六人焉子白不立封平陽立其弟徳公徳公元年初居雍城雍今鳳翔治大鄭宫以犧三百牢祠鄜畤卜居雍後子孫飲馬於河梁伯芮伯來朝二年初伏周時無伏至此乃有以狗禦蠱謂初作伏祠社磔狗邑四門也徳公生三十三歳而立立二年卒葬咸陽三子長宣公次成公季穆公宣公居陽宫初志閠月元年衞燕伐周出惠王立王子頽三年鄭虢殺子頽入惠王四年作密畤十二年卒有子九人莫適立立其弟成公成公元年梁伯芮伯來朝齊桓公伐山戎次于孤竹四年卒葬陽有子七人莫適立立其弟穆公穆公任好元年自將伐茅津勝之四年逆婦于晉晉太子申生姊也其歳齊桓公伐楚至召陵五年晉獻公滅虞虢虜虞君與其大夫百里奚以為秦穆夫人媵於秦百里奚亡秦走宛楚鄙人執之穆公聞其賢欲重贖之恐楚不與乃使人謂楚曰吾媵臣百里奚在焉請以五羖羊皮贖之楚人遂與之時百里奚年七十餘穆公釋其囚與語國事謝曰亡國之臣何足問穆公曰虞君不用子故亡非子罪也語三日穆公大說授以國政號曰五羖大夫百里奚讓曰臣不及臣之友蹇叔蹇叔之賢世莫之知臣嘗游困於齊乞食䬹人蹇叔収臣臣因欲事齊君無知蹇叔止臣臣得脫齊難遂之周王子頽好牛臣以養牛干之及頽欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利祿爵且留再用其言得脫一不用及虞君難是以知其賢於是穆公使人厚幣迎蹇叔以為上大夫或言禽息薦百里奚不見納穆公出禽息當車以頭擊闑腦乃播出穆公感悟而用百里奚秋穆公自將伐晉戰於河曲晉驪姬作亂太子申生死焉公子重耳夷吾出奔九年齊桓公會諸侯于葵邱晉獻公卒荀息立驪姬之子奚齊里克殺之又立卓子又殺之夷吾請於秦以求入晉穆公許之使百里奚將兵送之夷吾曰誠得立請割河西八城與秦及已立乃背約十二年晉饑請糴于秦秦以百里奚公孫支之言與之粟十四年秦饑請糴于晉以虢射之言遂閉之糴十五年晉惠公夷吾因秦饑伐之戰於韓穆公為晉君所圍於是岐下食馬者三百人馳冒晉軍晉圍解遂脫穆公而反生得晉君初穆公亡善馬岐下野人共得而食之者三百餘人吏逐得欲法之穆公曰君子不以畜產害人吾聞食善馬肉不飲酒傷人乃皆飲之酒而赦之故三百人報食馬之徳穆公旣獲晉君將以祠上帝穆公夫人夷吾姊也衰絰跣行而請乃赦之旣而歸晉君晉乃獻河西之地而使太子圉為質於秦是時秦地東至河十八年齊桓公卒二十年秦滅梁芮晉太子圉逃歸晉二十三年晉惠公卆子圉立是為懐公秦怨子圉亡去乃迎公子重耳於楚入之晉二十四年重耳立是為文公文公殺子圉二十五年秦晉合兵入周襄王二十八年晉文公敗楚於城濮三十年穆公助晉圍鄭鄭使人言於穆公曰亡鄭厚晉於秦何利穆公乃罷兵歸晉亦罷三十二年晉文公卒鄭人有賣鄭於秦曰我主其城門鄭可襲也穆公問蹇叔百里奚對曰徑數國千里而襲人未聞可也穆公曰吾已決矣遂發兵使百里奚之子孟明視蹇叔之子西乞術及白乙丙將兵行明年春秦兵遂東鄭有備遂滅滑滑晉邊邑也是時晉文公未葬襄公遂墨衰絰發兵遮秦兵於殽擊之大破秦軍無一人得脫者虜秦三將以歸晉文公夫人秦穆公之女也為秦三囚將請乃得歸穆公素服郊迎嚮三人哭曰孤以不用百里奚蹇叔言以辱三子三子何罪乎皆復其位三十四年楚太子商臣弑其父成王代立穆公使孟明視等將兵伐晉戰于彭衙秦不利引兵還戎王使由余於秦由余其先晉人也能晉言聞穆公賢故使之觀秦秦穆公示以宫室積聚由余曰使鬼為之則勞神矣使人為之亦苦民矣穆公怪之問曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為治由余笑曰此乃中國所以亂也夫自上聖黄帝作為禮樂法度身以先之僅以小治及其後世日以驕滛阻法度之威以督責於下下罷極則以仁義怨望於上上下交爭怨而相簒弑至於滅宗皆以此類也夫戎夷不然上含淳徳以遇其下下懐忠信以事其上一國之政猶一身之治不知所以治此眞聖人之治也穆公退而問内史廖曰孤聞鄰國有聖人敵國之憂也今由余賢寡人之害柰何廖曰戎王居僻匿未聞中國之聲君試遺其女樂以奪其志為由余請以疏其間留而莫遣以失其期戎王必疑由余君臣有間乃可虜也穆公曰善因與由余曲席而坐傳器而食問其地形與其兵勢盡察其後令内史廖以女樂二八遺戎王戎王受而說之終年不還於是秦乃歸由余由余數諫不聽穆公又數使人間要由余由余遂去降秦穆公以客禮禮之問伐戎之形三十六年穆公益厚孟明等三將復使伐晉渡河焚舟大敗晉人取王官及鄗以報殽之役晉人皆城守不敢出於是穆公乃自茅津渡河封殽中尸為發喪哭之三日乃誓於軍曰嗟士卒聽無譁予誓告汝古之人謀黄髪番番則無所過以申思不用蹇叔百里奚之言故作此誓以記余過君子聞之皆為垂涕曰嗟乎秦穆公之與人周也卒得孟明之慶三十七年秦用由余之謀伐戎益國十二開地千里遂霸西戎天子使召公過賀穆公以金鼓三十九年穆公卒葬雍皇覽曰秦穆公冡在橐泉宫祈年觀下從死者百七十七人秦之良臣子輿氏之子三人曰奄息仲行鍼虎與焉秦人哀之為賦黄鳥穆公之子四十人太子罃立是為康公康公居雍高寢十二年卒葬竘社子共公立共公居雍髙寢三年楚彊大莊王北兵至洛問周鼎輕重五年卒葬康公南子桓公立桓公居雍太寢七年楚莊王服鄭敗晉師于河上是時楚霸會諸侯而盟二十七年卒葬義里邱北子景公立景公居雍髙寢是時晉悼公為盟主三十九年楚靈王為盟主會諸侯于申四十年卒葬邱里南子哀公立哀公或作畢公八年楚公子棄疾弑靈王自立是為平王十一年平王為太子建娶秦女女好遂自娶之十五年楚平王欲誅建建亡伍子胥奔吳三十一年吳王闔閭與伍子胥伐楚楚王亡奔隨吳遂入郢楚大夫申包胥來告急七日不食日夜哭於秦庭哀公發兵五百乘救楚敗吳師楚昭王乃復入郢哀公三十六年卒葬車里北太子夷公早死立夷公之子是為惠公惠公元年魯侯會齊侯于夾谷孔子行相事齊人歸魯鄆讙龜陰之田十年惠公卒葬車里東其子悼公立悼公二年齊田乞弑其君孺子立其兄陽生為悼公六年齊人弑悼公立其子簡公九年晉定公與吳王夫差會盟于黄池爭長吳人曰於周室我為長晉人曰於姬姓我為伯乃先晉人吳彊陵中國六月越入吳十年齊田恒弑簡公立其弟平公是嵗魯西狩獲麟十二年孔子卒十四年悼公卒葬僖公西城雍子厲共公立或作刺龔公厲共公二年蜀人來納賂十六年壍河旁以兵二萬伐大荔取其王城臨晉有王城二十一年初縣頻陽在馮翊晉取武成二十四年晉韓趙魏共殺智伯分其地三十三年伐義渠虜其王三十四年厲共公卒葬入里子躁公立躁公居受寢二年南鄭反十三年義渠來伐至渭南十四年躁公卒葬悼公南立其弟懷公懐公四年庶長鼂與大臣圍公公自殺葬櫟圉氏太子昭子早死立昭子之子靈公或作肅靈公靈公居涇陽十三年城籍姑或曰靈公享國十年卒葬悼公西子獻公不得立立靈公季父悼子是為簡公簡公昭公之弟而懷公子也從晉來六年令吏初帶劒壍洛城重泉十六年公卒或云享國十五年葬僖公西子惠公立惠公十三年伐蜀取南鄭卒葬陵園子出子立出子二年庶長改迎靈公之子獻公于河西而立之殺出子及其母沈之淵旁秦以數易君君臣乖亂故晉復彊奪秦河西地獻公元年止從死二年城櫟陽徙都之今萬年縣十一年周太史儋見獻公曰周故與秦國合而别别五百嵗復合合七十七嵗而霸王出六年桃冬花十八年雨金櫟陽二十一年與晉戰于石門斬首六萬天子賀以黼黻二十三年與晉魏戰于少梁虜其將公孫痤二十四年獻公卒葬囂圉子孝公立孝公元年河山以東彊國六齊威楚宣魏惠燕悼韓哀趙成侯並淮泗之間小國十餘楚魏與秦接界魏築長城自鄭濵洛以北有上郡楚自漢中南有巴黔中周室微諸侯力政秦僻在雍州不與中國諸侯之會盟夷翟遇之孝公於是布徳惠賑孤寡招戰士明功賞下令國中曰昔我穆公自岐雍之間修徳行武東平晉亂以河為界西霸戎翟廣地千里天子致伯諸侯畢賀為後世開業甚光美會往者厲躁簡公出子之不寧國家内憂未遑外事三晉攻奪我先君河西地諸侯卑秦醜莫大焉獻公即位鎮撫邊境徙治櫟陽且欲東伐復穆公之故地脩穆公之政令寡人思念先君之意常痛於心賔客羣臣有能出竒計彊秦者吾且尊官與之分土於是乃出兵東圍陜城西斬戎之獂王衛鞅聞是令下西入秦因景監求見孝公二年天子致胙三年鞅說孝公變法脩刑内務耕稼外嚴戰死之賞罰孝公善之甘龍杜摯等咈然相與爭之卒用鞅法百姓苦之居三年百姓便之乃拜鞅為左庶長七年與魏惠王會杜平八年與魏戰元里有功十年鞅為大良造將兵圍魏安邑降之十二年作為咸陽築冀闕秦徙都之并諸小鄉聚集為大縣縣一令漢書百官表曰縣令長皆秦官萬戸以上為令秩千石至六百石減萬户為長秩五百石至三百石皆有丞尉四十一縣為田開阡陌東地渡洛十四年初為賦十九年天子致伯二十年諸侯畢賀秦使公子少官率師會諸侯于逢澤朝天子二十二年衛鞅擊魏虜魏公子卬封鞅為列侯號商君孝公卒或曰孝公十三年始都咸陽享國二十四年卒𦵏圉子惠文君立初鞅為秦行法法不行太子犯禁鞅曰法之行自貴戚始君欲必行法莫先於太子太子不可黥黥其傅師於是無敢犯者秦人以治及孝公卒太子立宗室多怨鞅鞅亡因以為反而卒車裂以徇秦國惠文君元年楚韓趙蜀人來朝二年天子賀三年王冠四年天子致文武胙五年陰晉人犀首為大良造六年魏納陰晉七年公子卬與魏戰虜其將龍賈斬首八萬八年魏納河西地九年渡河取汾陰皮氏與魏王會應圍焦降之十年張儀相秦魏納上郡十五縣十一年縣義渠歸魏焦曲沃義渠君為臣十二年初臘十三年四月戊午始稱王魏韓皆為王十四年更為元年三年韓魏太子來朝張儀相魏七年樂池相秦韓趙魏燕齊帥匈奴共攻秦使庶長疾與戰于脩魚虜其將申差斬首八萬八年張儀復相秦九年司馬錯伐蜀滅之伐取趙中都西陽十年韓太子來質伐取韓石章伐敗趙將泥伐取義渠二十五城十一年樗里疾攻魏焦降之敗韓岸門斬首萬公子通封於蜀十二年王與梁王會臨晉庶長疾攻趙虜趙將莊十三年庶長章擊楚於丹陽虜其將屈丐斬首八萬又攻楚漢中取地六百里置漢中郡十四年伐楚取召陵丹犂臣蜀相壯殺蜀侯來降惠王卒或曰惠文王享國二十七年卒葬公陽子武王立武王元年與魏惠王會臨晉誅蜀相壯張儀魏章皆東出之魏伐義渠丹犂二年初置丞相以樗里疾甘茂為左右丞相張儀死於魏三年與韓襄王會臨晉外樗里疾相韓武王謂甘茂曰寡人欲容車通三川窺周室死不恨矣其秋使甘茂庶長封伐宜陽四年拔之斬首六萬涉河城武遂魏太子來朝王有力好戲力士任鄙烏獲孟說皆至大官王與孟說舉鼎絶臏八月武王死族孟說鼎者龍文赤鼎也或曰武王享國四年葬永陵武王取魏女為后無子立異母弟瑕為昭襄王昭襄王母曰宣太后楚芈氏也武王死時昭襄王為質於燕燕人送歸得立宣太后弟魏冉自惠文王時用事力能立王元年王以冉為將軍衞咸陽嚴君疾為相甘茂出之魏二年彗星見庶長壯與大臣諸公子謀為亂魏冉誅之王年少太后臨朝冉任政封穰侯三年王冠與楚王會黄棘與楚上庸四年取蒲坂彗星見五年魏王來朝應亭復與魏蒲坂六年蜀侯煇反司馬錯定蜀庶長奐伐楚斬首二萬日食晝晦七年拔新城樗里疾卒魏冉為相八年使將軍芊戎攻楚取新市九年孟嘗君薛文來相秦奐攻楚取八城殺其將景快十年楚懐王不用昭雎言而會秦王至咸陽朝章華臺如蕃臣禮因留之薛文以受金免樓緩為丞相十一年齊韓魏趙宋中山五國共攻秦至鹽氏而還秦與韓魏河北及封陵以和楚懷王亡歸秦遮楚道乃之趙趙不敢納欲走魏秦追及之以歸懷王發病死楚人憐之諸侯不直秦十二年樓緩免穰侯魏冉為相予楚粟五萬石十三年向壽伐韓取武始左更白起攻新城任鄙為漢中守十四年左更白起將兵大破韓魏之師于伊闕斬首二十四萬虜公孫喜拔五城十五年白起為大良造將兵攻魏取垣復予之攻楚取宛十六年左更錯取軹及鄧冉免封冉陶為諸侯十七年魏入河東地四百里韓入武遂地二百里東周君來朝十八年客卿錯伐魏至軹取城大小六十一十九年王為西帝齊為東帝皆復去之二十一年司馬錯攻魏魏獻安邑及河内秦出其人募徙河東賜爵赦罪人遷之二十二年蒙武伐齊取列城九與楚王會宛與趙王會中陽二十三年尉斯離與三晉燕伐齊破之濟西王與魏王會宜陽與韓王會新城二十四年與楚王會鄢又會穰魏冉免相二十五年拔趙二城與韓王會新城與魏王會新明邑二十六年赦罪人遷之穰侯冉復相二十七年白起攻趙取代光狼城司馬錯攻楚黔中拔之二十八年大良造白起攻楚取鄢鄧赦罪人遷之二十九年白起攻楚取郢為南郡楚王走王與楚王會襄陵白起為武安君三十年蜀守若伐取巫郡及江南為黔中郡三十一年白起伐魏取兩城楚人反我江南三十二年穰侯攻魏至大梁破暴鳶斬首四萬鳶走魏入三縣請和三十三年客卿胡傷攻魏卷蔡陽長社取之擊芒卯華陽破之斬首十五萬魏入南陽以和三十五年初置南陽郡三十七年客卿竈攻齊取剛壽滅義渠以范雎為客卿三十八年中更胡傷攻趙閼與不能取四十一年夏攻魏取邢邱懐廢宣太后逐穰侯以范雎為丞相封應侯四十二年安國君為太子宣太后薨葬芷陽酈山四十三年武安君白起攻韓拔九城斬首五萬四十四年攻韓南郡取之四十五年五大夫賁攻韓取十城四十七年秦攻韓上黨上黨降趙秦因攻趙趙發兵擊秦相距秦使武安君白起大破趙於長平殺趙括阬趙降卒四十餘萬人四十八年十月韓獻垣雍秦分三軍武安君歸王齕將伐趙武安皮牢拔之司馬梗北定太原盡有韓上黨又使五大夫陵攻趙邯鄲四十九年以王齕代陵將五十年武安君白起有罪誅齕圍邯戰不拔走還初作河橋五十一年將軍摎攻趙取二十餘縣首虜九萬西周君背秦與諸侯約從將天下銳兵出伊闕攻秦秦使將軍摎攻西周西周君走來自歸盡獻其邑秦受其獻而歸其君於周五十二年取周九鼎寶器以入于秦周初亡應侯免以蔡澤相五十三年天下來賔魏後秦使摎伐魏取吳城魏委國聽令五十四年郊見上帝於雍邱五十六年秋昭襄王卆葬芷陽子安國君柱立是為孝文王孝文王立尊唐八子為唐太后八子者妾媵之號而合葬於先王初華陽夫人無子吕不韋說令立夏姬之子子楚為嗣以自託華陽夫人從之及孝文王即位子楚為太子孝文王除喪十月己亥即位三日辛丑卒或云享國一年卒葬壽陵太子子楚立是為莊襄王莊襄王元年大赦罪人修先王功臣施徳澤厚骨肉而布惠於民以吕不韋為相國封文信侯食河南十萬戸初呂不韋為賈人問其父曰商賈之利幾倍父曰十倍田蠶之利幾倍父曰百倍販國賣君幾倍父曰無倍數後不韋賈邯鄲見子楚為質於趙曰此竒貨也可居時子楚居處困不得志不韋乃進五百金與子楚復以五百金為西說華陽夫人故得為嗣不韋有愛姬子楚慕之妾謂不韋曰妾始有孕而人未知公若以妾獻子楚幸而生男即公之子為秦王也不韋從而獻之以秦昭王四十八年正月生始皇於邯鄲子楚後歸秦及孝文王薨遂即位東周君與諸侯謀秦秦使呂不韋誅之盡入其國秦不絶其祀以陽人地賜周君奉其先祀陽人今汝南之梁縣也使䝉驁伐韓韓獻成臯鞏秦界至大梁初置三川郡二年蒙驁攻趙定太原三年蒙驁攻魏高都汲拔之攻趙榆次新城狼孟取三十七城四月日食四年王齕攻上黨初置太原郡魏將無忌率五國兵攻秦秦却於河外蒙驁敗解而去莊襄王卒或云享國三年葬茝陽太子政立是為始皇帝臣謹按太史公曰秦之先為嬴姓其後分封以國為姓有徐氏郯氏莒氏終黎氏運奄氏莵裘氏將梁氏黄氏江氏脩魚氏白㝠氏蜚廉氏秦氏秦以其先造父封趙城為趙氏然徐郯莒江黄秦趙以國為氏者終黎莵裘以邑為氏者蜚廉以名為氏者司馬遷不通姓氏學皆謂以國為姓况此皆氏也不可以言姓姓則嬴也始皇帝名政虎口日角大目長八尺六寸年十三即位王年尚少國事皆決於大臣呂不韋為相李斯為舍人蒙驁王齮麃公等為將軍當是時秦地已并巴蜀漢中越宛有郢置南郡矣北收上郡以東有河東太原上黨郡東至滎陽滅二周置三川郡呂不韋招賔客致游士欲以并天下二年麃公將卒攻卷斬首三萬三年蒙驁攻韓取十三城王齮死蒙驁攻魏四年拔二城十月庚寅蝗從東方來蔽天天下疫民内粟千石拜爵一級五年蒙驁攻魏取二十城初置東郡冬雷六年諸侯患秦攻伐不已韓魏趙衞楚五國共伐秦春申君為從長至函谷秦出兵擊之五國皆敗走秦遂伐魏取朝歌拔衞濮陽衞君角率其支屬徙居野王阻山以保魏之河内七年彗星先出東方見北方五月見西方夏太后死八年呂不韋舍人嫪毐有寵太后封以太原為長信侯與山陽地令毐居之宫室車馬衣服苑囿馳獵恣毐事無大小皆取決焉九年彗星見或竟天攻魏垣蒲陽四月上宿雍己酉王冠帶劒時年二十二嫪毐事覺作亂矯王御璽太后璽發縣卒及衞卒官騎戎翟君公舍人將攻蘄年宫宫在雍王知之令相國昌平君發卒攻毐戰咸陽毐敗走捕得毐等二十人皆梟首車裂以狥滅其宗及其舍人輕者為鬼薪取薪給宗廟也律曰鬼薪作二嵗及奪爵遷蜀四千餘家家房陵遷太后于雍四月寒有凍死者楊端和攻衍氏彗星見西方又見北方從斗以南八十日十年相國呂不韋坐嫪毐免相桓齮為將軍齊趙來置酒齊人茅焦說王曰秦方以天下為事而大王有遷母之名恐諸侯聞之由此倍秦也王乃迎太后於雍入咸陽復居甘泉宫立茅焦為傅爵之上卿太后大悅曰安秦社稷使妾母子相見者茅君之力也大索逐客李斯上書乃止斯因說秦王請先取韓以恐他國乃使斯下韓韓王患之與韓非謀弱秦大梁人尉繚來說秦王曰以秦之彊諸侯譬如郡縣之君臣但恐諸侯合從翕而出不意此乃智伯夫差湣王之所以亡也願犬王毋愛財物賂其豪臣以亂其謀不過亡三十萬金則諸侯可盡王從其計見尉繚亢禮衣服飲食與繚同繚曰秦王為人蜂凖長目摯鳥膺豺聲少恩而虎狼心居約易出人下得志亦輕食人我布衣也然見我常身自下我誠使秦王得志於天下天下皆為虜矣不可與久游乃亡去秦王覺固止之以為秦國尉卒用其計䇿而李斯用事十一年王翦桓齮楊端和攻鄴取九城王翦攻閼與橑陽取鄴安陽十二年呂不韋奪爵徙蜀飲鴆而死十三年桓齮攻趙平陽殺其將扈輒斬首十萬王之河南正月彗星見東方十四年桓齮攻趙取宜安平陽武城韓非使秦秦用李斯謀留非非死雲陽韓王請為臣十五年大興兵一軍至鄴一軍至太原取狼孟地動十六年韓獻南陽地初令男子書年魏獻地於秦秦置麗邑十七年内史騰攻韓得韓王安盡納其地為潁川郡地動華陽太后卒十八年大興兵攻趙十九年王翦羗廆盡定趙地得趙王秦王之邯鄲諸嘗與王生趙時母家有仇怨者皆阬之王歸母太后崩趙公子嘉率其宗族數百人之代自立為代王東與燕合兵軍上谷二十年燕太子丹患秦兵且至乃使荆軻刺秦王不中體解軻以徇王翦辛勝攻燕破燕軍易水之西二十一年王賁攻薊乃益發卒詣王翦軍遂破燕太子軍取燕薊城燕王走保遼東斬太子丹之首以獻王賁伐楚取十餘城欲遂滅之王翦曰楚地廣民衆非六十萬人不可王以為怯翦謝病老歸二十二年王賁伐魏引河溝灌大梁城壞魏王假降殺之而盡取其地二十三年復召王翦彊起之使將六十萬人擊楚取陳以南至平輿楚悉兵以逆王翦閉壘不戰楚引兵而東乃追擊大破之至蘄南殺其將項燕翦乘勝略定楚地虜楚王負芻二十五年使王賁伐遼東虜燕王喜還擊代虜代王嘉王翦遂定楚江南地降越君置會稽郡五月天下大酺酺音蒲文穎曰周禮族師掌春秋祭酺為人物災害之神蘇林曰陳留俗三月上巳日水上飲食為酺焉二十六年將軍王賁從燕南攻齊入臨淄王建降遂滅齊秦初并天下令丞相御史曰異日韓王納地効璽請為藩臣已而倍約與趙魏合從畔秦故興兵誅之虜其王趙王使其相李牧來約盟故歸其質子已而倍盟反我太原故興兵誅之得其王趙公子嘉乃自立為代王故舉兵擊滅之魏王始約服入秦已而與韓趙謀襲秦秦兵吏誅逐破之楚王獻青陽以西已而畔約擊我南郡故發兵誅得其王遂定楚地燕王昬亂其太子丹乃陰令荆軻為賊兵吏誅滅其國齊王用后勝計絶秦使欲為亂兵吏誅虜其王平齊地寡人以𦕈𦕈之身興兵誅暴賴宗廟之靈六王咸服其辜天下大定今名號不更無以稱成功𫝊後世其議帝號丞相綰御史大夫劫廷尉斯等皆曰昔者五帝地方千里其外侯服夷服諸侯或朝或否天子不能制今陛下興義兵誅殘賊平定天下海内為郡縣法令由一統自上古以來未嘗有五帝所不及臣等謹與博士議曰古有天皇有地皇有泰皇泰皇最貴臣等昧死上尊號王為泰皇命為制令為詔天子自稱曰朕王曰去泰著皇采上古帝位號號曰皇帝他如議制曰可下有司曰制天子荅之曰可追尊莊襄王為太上皇制曰朕聞太古有號毋諡中古有號死而以行為諡如此則子議父臣議君也甚無謂朕弗取焉自今已來除諡法朕為始皇帝後世以數計二世三世至于萬世傳之無窮始皇推終始五徳之傳以為周得火徳秦代周徳從所不勝方今水徳之始改年始朝賀皆自十月朔衣服旌旄節旗皆尚黑數以六為紀符法冠皆六寸而輿六尺乘六馬六尺為歩譙周曰歩以人足為數非獨秦制然更名河曰徳水以為水徳剛戾事皆決於法刻削毋仁恩和義然後合五徳之數於是急法久者不赦丞相綰等言諸侯初破燕齊楚地逺不為置王毋以塡之請立諸子羣臣皆以為便廷尉李斯議曰周文武所封子弟同姓甚衆然後属疏逺相攻擊如仇讐諸侯更相誅伐周天子弗能禁止今海内賴陛下神靈一統皆為郡縣諸侯諸子功臣以公賦稅重賞賜之甚足易制天下無異意則安寧之術也置諸侯不便始皇曰天下共苦戰鬬不休以有侯王賴宗廟天下初定又復立國是樹兵也而求其寧息豈不難哉廷尉議是分天下以為三十六郡三十六郡者三川河東南陽南郡九江鄣郡會稽穎川碭郡泗水薛郡東郡琅邪齊郡上谷漁陽古北平遼西遼東代郡鉅鹿邯鄲上黨太原雲中九原雁門上郡隴西北地漢中巴郡蜀郡黔中長沙凡三十五與内史是為三十六郡郡置守尉監守掌治郡尉佐守典武禁暴監御史掌監郡更名民曰黔首黔亦黎黒也大酺收天下兵古者以銅為兵聚之咸陽銷為鐘鐻鑄金人十二重各千石置廷宫中一法度衡石丈尺車同軌書同文字地東至海曁朝鮮西至臨洮南至北嚮戸開北戸以向日北據河為塞並音旁陰山至遼東徙天下豪富於咸陽十二萬戸諸廟及章臺上林皆在渭南秦每破諸侯寫放其宫室作之咸陽北阪上在長安西北漢武帝别名渭城南臨渭自雍門以東至涇渭殿屋複道周閣相屬所得諸侯美人鐘鼓以充入之二十七年始皇廵隴西北地出雞頭山過囘中作信宫渭南已而更命信宫為極廟象天極自極廟道通酈山作甘泉前殿築甬道築垣墻如街巷自咸陽屬之是嵗賜爵一級治馳道秦為馳道於天下東窮燕齊南極吳楚江湖之上濱海之觀畢至道廣五十步三丈而樹厚築其外隱以金椎樹以青松二十八年始皇東行郡縣上鄒嶧山立石與魯諸儒生議刻石頌秦徳議封禪遂上泰山立石封祠祀下風雨暴至休於樹下因封其樹為五大夫禪梁父刻所立石其辭曰皇帝臨位作制明法臣下修飭二十有六年初并天下罔不賓服親廵逺方黎民登兹泰山周覽東極從臣思迹夲原事業祗誦功徳治道運行諸産得宜皆有法式大義休明垂於後世順承勿革皇帝躬聖旣平天下不懈於治夙興夜寐建設長利專隆敎誨訓經宣達逺近畢理咸承聖志貴賤分明男女禮順愼遵職事昭隔内外靡不清淨施於後嗣化及無窮遵奉遺詔永承重戒於是乃並渤海以東過黄腄立石頌秦徳而去南登琅邪大樂之留三月乃徙黔首三萬戸琅邪臺下復十二歳作琅邪臺立石頌秦徳明徳意曰維二十六年皇帝作始端平法度萬物之紀以明人事合同父子聖智仁義顯白道理東撫東土以省卒士事已大畢乃臨於海皇帝之功勤勞夲事上農除末黔首是富溥天之下摶心壹志器械一量同書文字日月所照舟輿所載皆終其命莫不得意應時動事是維皇帝匡飭異俗陵水經地憂恤黔首朝夕不懈除疑定法咸知所辟方伯分職諸治經易舉錯必當莫不如畫皇帝之明臨察四方尊卑貴賤不踰次行姦邪不容皆務貞良細大盡力莫敢怠荒逺邇辟隱專務肅莊端直敦忠事業有常皇帝之徳存定四極誅亂除害興利致福節事以時諸産繁殖黔首安寧不用兵革六親相保終無冦賊驩欣奉敎盡知法式六合之内皇帝之土西涉流沙南盡北戸東有東海北過大夏人迹所至無不臣者功蓋五帝澤及牛馬莫不受徳各安其宇維秦王兼有天下立名為皇帝乃撫東土至于琅邪列侯武城侯王離列侯通武侯王賁倫侯建成侯趙亥倫侯昌武侯成倫侯武信侯馮毋擇丞相隗林丞相王綰卿李斯卿王戊五大夫趙嬰五大夫楊樛從與議於海上曰古之帝者地不過千里諸侯各守其封域或朝或否相侵暴亂殘伐不止猶刻金石以自為紀古之五帝三王知敎不同法度不明假威鬼神以欺逺方實不稱名故不久長其身未殁諸侯倍叛法令不行今皇帝并一海内以為郡縣天下和平昭明宗廟體道行徳尊號大成羣臣相與誦皇帝功徳刻于金石以為表經旣已齊人徐市等上書言海中有三神山名曰方丈蓬萊瀛洲仙人居之請得齋戒與童男女求之於是遣徐市發童男女數千人入海求仙人始皇還過彭城齋戒禱祠欲出周鼎泗水使千人没水求之弗得乃西南渡淮水之衡山南郡浮江至湘山祠逢大風幾不得渡上問博士曰湘君何神對曰堯之女舜之妻而葬此始皇大怒使刑徒三千人皆伐湘山之樹赭其山乃自南郡由武闗歸二十九年始皇東游至陽武博狼沙中為盜所驚求弗得令天下大索十日登之罘刻石其辭曰維二十九年時在中春陽和方起皇帝東游廵幸之罘臨照于海從臣嘉觀原念休烈追誦夲始大聖作治建定法度顯著綱紀外敎諸侯光施文惠明以義理六國囘辟貪戾無厭虐殺不已皇帝哀衆遂發討師奮揚武徳義誅信行威燀旁達燀先善反莫不賔服烹滅彊暴振救黔首周定四極普施明法經緯天下永為儀則大矣哉宇縣之中承順聖意羣臣誦功請刻于石表垂于常式其東觀曰維二十九年皇帝春游覽省逺方逮于海隅遂登之罘照臨朝陽觀望廣麗從臣咸念原道至明聖法初興清理疆内外誅暴彊武威旁暢振動四極禽滅六王闡并天下菑害絶息永偃戎兵皇帝明徳經理宇内視聽不怠作立大義昭設備器咸有章旗職臣遵分各知所行事無嫌疑黔首改化逺邇同度臨古絶尤常職旣定後嗣循業長承聖治羣臣嘉徳祗誦聖烈請刻之罘旋遂之琅邪道上黨入三十年無事三十一年徐戚曰此年使黔首自實其田十二月更名臘曰嘉平太原眞人茅盈内紀曰始皇三十一年九月庚子盈曾祖父蒙於華山中乘雲駕龍白日昇天先是邑中謠歌云神仙得者茅初成駕龍上昇入太清時下元洲戲赤城繼世而往在我盈帝若學之臘嘉平始皇聞謠歌問其故父老具對云此仙人之謠也因勸始皇求長生之術始皇欣然志於尋神仙遂改臘為嘉平黔首里六石米二羊始皇為微行咸陽若微賤之行故云微行也與武士四人俱夜出逢盜蘭池見窘武士擊殺盜闗中大索二十日米石千六百三十二年始皇之碣石使燕人盧生求羡門古仙人也髙誓刻碣石門墮壞城郭決通隄防其辭曰遂興師旅誅戮無道為逆滅息武殄暴逆文復無罪庶心咸復惠論功勞賞及牛馬恩肥土域皇帝奮威徳并諸侯初一泰平墮壞城郭決通川防夷去險阻地勢旣定黎庶無繇天下咸撫男樂其疇女修其業事各有序惠被諸產久並來由莫不安所羣臣誦烈請刻此石垂著儀矩又使韓終侯公石生求仙人不死之藥始皇廵北邊從上郡入燕人盧生使入海還以鬼神事因奏錄圖書曰亡秦者胡也謂胡亥始皇乃使將軍蒙恬發兵三十萬北擊胡略取河南地三十三年發諸嘗逋亡人贅壻賈人略取陸梁地為桂林象郡南海以適徙民五十萬戍五嶺西北斥逐匈奴自榆中並河以東屬之陰山為三十四縣城河上為塞又使蒙恬渡河取髙闕陶山北假中築亭障以逐戎人徙適實之長城之役起臨洮至遼東延袤萬餘里暴師十餘年三十四年適治獄吏不直者築長城及戍南越地始皇置酒咸陽宫博士七十人前為壽僕射周青臣百官表曰僕射秦官古者重武官有主射者以督課之僕主也進頌曰他時秦地不過千里賴陛下神聖平定海内放逐蠻夷日月所照莫不賔服以諸侯為郡縣人人自安樂無戰爭之患𫝊之萬世自古不及陛下威徳始皇大悅博士齊人淳于越進曰臣聞殷周之王千餘嵗封子弟功臣自為枝輔今陛下有海内而子弟為匹夫卒有田恒六卿之臣無輔拂何以相救哉事不師古而能長久者非所聞也今青臣面諛以重陛下之過非忠臣始皇下其議丞相李斯曰五帝不相復三代不相襲各以治非相反也時變異也今陛下創大業建萬世之功固非愚儒所知且越言乃三代之事何足法也異時諸侯並爭厚招游學今天下已定法令出一百姓當家則力農工士則學習法令辟禁諸生不師今而學古以非當世惑亂黔首丞相臣斯昧死言古者天下散亂莫之能一是以諸侯並作語皆道古以害今餙虛言以亂實人善其所私學以非上之所建立今皇帝并有天下别黑白而定一尊私學而相與非法敎人聞令下則各以其學議之入則心非出則巷議夸主以為名異取以為高率羣下以造謗如此不禁則主勢降乎上黨與成乎下禁之便臣請史官非秦記皆燒之非博士官所職天下有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書棄市以古非今者族吏見知不舉者與同罪令下三十日不燒黥為城旦律說論決為髠鉗輸邊築長城晝日伺宼虜夜暮築長城城旦四嵗也所不去者醫藥卜筮種樹之書若欲有學法令以吏為師制曰可三十五年除道道九原抵雲陽九原縣隸五原郡道九原通甘泉塹山堙谷千八百里直通之於是始皇帝以為咸陽人多先王之宫廷小吾聞文王都酆武王都鎬酆鎬之間帝王都也乃營作朝宫渭南上林苑中先作前殿阿房東西五百歩南北五十丈上可以坐萬人下可以建五丈旗周馳為閣道自殿下直抵南山表南山之顚以為闕為複道自阿房渡渭屬之咸陽以象天極閣道絶漢抵營室也阿房宫未成成欲更擇令名名之作宫阿房故天下謂之阿房宫隱宫徒刑者七十餘萬人分作阿房宫或作麗山發北山石椁乃寫蜀荆地材皆至關中計宫三百關外四百餘於是立石東海上胊界中以為秦東門因徙三萬家麗邑五萬家雲陽皆復不事十嵗盧生說始皇曰臣等求芝竒藥仙者常弗遇類物有害之者方中人主時為微行以辟惡鬼惡鬼辟眞人至人主所居而人臣知之則害於神眞人者入水不濡入火不爇陵雲氣與天地久長今上治天下未能恬淡願止所居宫毋令人知然後不死之藥殆可得也始皇曰吾慕眞人自謂眞人不稱朕乃令咸陽之旁二百里内宫觀二百七十複道甬道相連帷帳鐘鼓美人充之各案署不移徙行所幸有言其處者罪死始皇幸梁山宫從山上見丞相車騎衆弗善也中人或告丞相丞相後損車騎始皇怒曰此中人泄吾語案問莫服詔捕諸時在旁者皆殺之是後莫知行之所在聽事羣臣受決事悉於咸陽宫侯生韓客也盧生相與謀曰始皇為人天性剛戾自用起諸侯并天下意得欲從以為自古莫己及專任獄吏博士雖七十人特備員弗用丞相諸大臣皆受成事倚辦於上樂以刑殺為威天下畏罪持祿莫敢盡忠上不聞過而日驕下懾伏謾欺以取容秦法不得兼方不驗者輒死然候星氣者三百人皆良士畏忌諱諛不敢端言其過天下之事無大小皆決於上上至以衡石量書石百二十斤日夜有程不得休息貪於權勢至如此未可為求仙藥乃亡去始皇聞亡乃大怒曰吾前收天下書不中用者盡去之悉召文學方術士甚衆文學欲以興太平方士欲以練求竒藥今聞韓衆去不報徐市等費以巨萬計終不得藥徒姦利相告日聞盧生等吾待之甚厚今乃誹謗以重吾不徳也諸生在咸陽者吾使人廉問或為妖言以亂黔首於是使御史悉案問諸生諸生傳相告引乃自除犯禁者四百六十餘人皆阬之咸陽使天下知之以懲後益發謫徙邊始皇長子扶蘇諫曰天下初定逺方黔首未集諸生皆誦法孔子今上皆重法繩之臣恐天下不安始皇怒使扶蘇北監䝉恬於上郡三十六年熒惑守心有星隕于東郡至地為石黔首或刻其石曰始皇死而地分始皇聞之遣御史逐問莫服盡取石旁居人誅之因燔銷其石始皇不樂使博士為仙真人詩及行所游天下傳令樂人歌絃之秋使者鄭客從關東夜過華陰平舒道有人素車白馬持璧遮使者曰吾華山君願以此為吾遺滈池君因言曰今年祖龍死祖人之先龍君之象使者問其故因忽不見置其璧去使者奉璧具以聞始皇默然良久曰山鬼固不過知一嵗事也退言曰祖龍者人之先也使御府視璧乃二十八年行渡江所沈璧也於是卜之卦得游徙吉三十七年十月始皇出游左丞相斯從右丞相去疾守少子胡亥愛慕請從上許之十一月行至雲夢望祀虞舜於九疑山浮江下觀籍柯渡海渚過丹陽至錢唐臨浙江水波惡乃西百二十里從狹中渡在餘杭也因始皇至會稽經此立為縣上會稽祭大禹望于南海立石頌徳還過吳從江乘渡並海上北至琅邪徐市等入海求仙藥數嵗不得費多恐譴乃詐曰蓬萊藥可得然常為大鮫魚所苦故不得至願請善射與俱見則以連弩射之始皇夢與海神戰如人狀問占夢博士曰水神不可見以大魚鮫龍為候此惡神當除去而善神可致乃令入海者齎捕魚具而自以連弩候大魚出射之自琅邪北至榮成山弗見至之罘見巨魚射殺一魚遂並海西至平原津而病始皇惡言死羣臣莫敢言死事上病益甚乃為書賜公子扶蘇曰與喪會咸陽而葬書已封在中車府令趙高行符璽事所未授使者七月丙寅崩於沙邱平臺在位三十七年年五十或云五十一沙邱去長安二千餘里趙有此沙邱宫在鉅鹿武靈王之死處丞相斯為上崩在外恐諸公子及天下有變乃秘之不發喪棺載轀凉車中故幸宦者參乘所至上食百官奏事如故宦者輒從轀凉車中可其奏事獨胡亥趙髙所幸宦者五六人知上死趙髙嘗敎胡亥書及律令胡亥私幸之高乃與公子胡亥丞相李斯陰謀破去始皇所封書賜扶蘇者而更詐為丞相斯受遺詔立胡亥為太子更為書賜扶蘇䝉恬罪數以罪賜死行從井陘抵九原會天大暑轀凉車臭乃詔從官令車載一石鮑魚以亂其臭行從直道至咸陽發喪胡亥襲位為二世皇帝九月葬始皇酈山始皇初即位穿治酈山及并天下天下徒送詣七十餘萬人穿三泉下銅銅作錮錮鑄塞而致椁宫觀百姓竒器珍怪徙藏滿之令匠作機弩矢有所穿近者輒射之以水銀為百川江河大海機相灌輸上具天文下具地理以人魚膏為燭人魚似鮎魚四脚度不滅者久之後宫非有子者皆令從死死者甚衆或言工匠為機藏皆知之藏重即泄大事畢已藏閉中羡下外羡門盡閉工匠藏者無復出者樹草木以象山臣謹按皇覽曰始皇墳髙五十餘丈周囘五里餘又按太原眞人茅盈内紀曰始皇三十一年九月庚子盈曾祖父䝉乃於華山之中乘雲駕龍白日升天先是其邑謠歌曰神仙得者茅初成駕龍上昇入太清時下元洲戲赤城繼世而往在我盈帝若學之臘嘉平始皇聞謠而問其故父老具對此仙人之謠勸帝求長生之術始皇欣然乃有尋仙之思因改臘曰嘉平又按始皇名為政徐廣曰一作正宋忠云以正月旦生故名正又按司馬遷云始皇姓趙氏此不達姓氏之言也凡諸侯無氏以國爵為氏其支庶無國爵則稱公子公子之子則稱公孫公孫之子無所稱焉然後以王父字為氏或分邑者則以邑為氏或言官者則以官為氏凡為氏者不一今秦氏自非子得邑則以秦邑為氏及襄公封國則以秦國為氏相傳至於始皇亦如商周相傳至湯武豈有子湯姬發之稱乎若趙氏者自造父獲封趙城為趙氏其後微弱而邑於晉則以趙邑為氏及三分晉國則以趙國為氏豈有秦國之君而以趙國為氏乎漢魏以來與此道異遷漢人但知漢事而已二世皇帝始皇第十八子也元年詔議増始皇寢廟犧牲及山川百祀之禮羣臣皆頓首言曰古者天子七廟諸侯五大夫三雖萬世不軼毁今始皇為極廟四海之内皆獻貢職増犧牲禮咸備無以加先王廟或在西雍或在咸陽天子儀當親奉酌祠始皇廟自襄公已下軼毁所置凡七廟羣臣以禮進祠宜尊始皇廟為帝者祖廟時趙髙為郎中令獨用事二世與高謀曰朕年少初即位黔首未附先帝廵行郡縣以示彊威服海内今晏然不廵行即見弱毋以臣畜天下春遂東行郡縣李斯從到碣石並海南至會稽而盡刻始皇所立列石以章先帝成功盛徳遂至遼東而還二世陰與趙高謀曰大臣不服官吏尚彊及諸公子必與我爭為之柰何髙曰臣固願言而未敢也先帝之大臣皆天下累世名貴人也積功勞世以相傳久矣今髙素小賤陛下幸稱舉令在上位管中事大臣鞅鞅特以貌從臣其心實不服今上出宜因此時案郡縣守尉有罪者誅之上以振威天下下以去上生平所不可者願陛下無疑然後收舉餘民賤者貴之貧者富之逺者近之則上下集而國安矣二世曰善乃行誅大臣及諸公子以罪過連逮少近官三郎無得立者而六公子戮死於杜公子將閭昆弟三人囚於内宫二世使使令將閭曰公子不臣罪當死將閭曰闕廷之禮吾未嘗敢不從賓贊也廊廟之位吾未嘗敢失節也受命應對吾未嘗敢失辭也何謂不臣願聞罪而死使者曰臣不得與謀奉書從事將閭乃仰天大呼者三曰天乎吾無罪昆弟皆拔劍自殺宗室振恐四月二世還至咸陽曰先帝為咸陽朝廷小故營阿房宫為室堂未就而崩今釋弗就是章先帝舉事過也復作阿房宫徵材士五萬人為屯衞咸陽令敎射狗馬禽獸當食者多度不足下調郡縣轉輸菽粟芻藁皆令自齎糧食咸陽三百里内不得食其穀用法益刻深七月戍卒陳勝等反故荆地為張楚勝自立為楚王居陳遣諸將徇地山東郡縣年少苦秦吏皆殺其守尉令丞反以應之相立為侯王合從西嚮名為伐秦不可勝數謁者使東方來謁者秦官掌賓贊受事以反者聞二世怒下吏後使者至上問對曰羣盜郡守尉逐捕今盡得不足憂上悅八月武臣至邯鄲自立為趙王魏咎為魏王田儋為齊王九月劉季起沛為沛公項梁舉兵會稽二年冬陳涉所遣周章等將西至戲水兵數十萬二世大驚與羣臣謀少府章邯曰盜已至衆彊今發近縣不及矣酈山徒多請赦而授之兵以擊之二世乃大赦天下使章邯將兵破周章軍殺章于曹陽二世益遣長史司馬欣董翳佐章邯擊盜殺陳勝城父破項梁定陶滅魏咎臨濟楚地之盜名將已死章邯乃北渡河擊趙王歇等於鉅鹿趙髙說二世曰先帝臨制天下久故羣臣不敢為非進邪說今陛下富於春秋初即位柰何與公卿廷決事事即有誤示羣臣短也於是二世常居禁中與高決事公卿希得朝見右丞相去疾左丞相斯將軍馮劫進諫曰闗東羣盜並起秦兵誅擊所殺亡甚衆然猶不止盜多皆以戍漕轉作事苦賦稅大也請且止阿房作者減省四邊戍轉二世曰先帝起諸侯兼天下天下已定外攘四夷以安邊境作宫室以章得意而君觀先帝功業有緒今朕即位二年之間羣盜並起君不能禁又欲罷先帝之所為何以在位下去疾斯劫吏案責他罪去疾劫曰將相不辱自殺斯卒囚就五刑三年章邯等圍鉅鹿楚上將軍項羽救之冬趙髙為丞相竟案李斯殺之夏章邯等戰數却二世使人責邯邯恐使長史欣請事趙髙弗見又弗信欣恐亡去見邯曰趙髙用事於中將軍有功亦誅無功亦誅項羽急擊秦軍虜王離邯等遂以兵降八月趙髙欲為亂恐羣臣不聽乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤邪謂鹿為馬問左右左右或默或言馬以阿順髙或言鹿者髙因陰中以法羣臣皆畏髙枉矢西行趙高前數言闗東盜無能為也及是燕趙齊楚韓魏皆立為王自關以東大抵畔秦吏應諸侯諸侯咸率其衆西嚮沛公將數萬人已屠武闗使人私於髙高恐二世誅己乃謝病不朝二世夢白虎齧其左驂馬殺之心不樂卜曰涇水為祟二世乃齋於望夷宫張晏曰望夷宫在長陵西北長平觀道東故亭處是也臨涇水作之以望北夷欲祠涇沈四白馬使使責高以盜賊事髙懼乃陰與其壻咸陽令閻樂其弟郎中趙成謀廢二世更立公子嬰乃令樂將吏卒至望夷宫殿門縳衞令斬之成與樂俱入射上幄坐幃二世怒召左右左右皆惶擾不鬬旁有宦者一人侍不敢去二世入内謂曰公何不早告我乃至於此宦者曰臣不敢言故得全使臣早言皆已誅安得至今樂即前數二世曰足下驕恣誅死無道天下共畔足下足下其自為計二世曰丞相可得見否樂曰不可二世曰吾願得一郡為王弗許又曰願為萬户侯弗許又曰願與妻子為黔首比諸公子樂曰臣受命丞相為天下誅足下足下雖多言不敢報麾其兵進二世自殺二世在位三年年二十三趙高立子嬰以黔首葬二世杜南宜春苑中秦王子嬰者始皇之孫公子扶蘇之子也扶蘇嬰父子皆有賢徳百姓愛之二世三年九月趙高旣殺二世懼禍及遂立子嬰以從人望高乃悉召大臣公子告之曰秦故王國始皇君天下始稱帝今六國復自立秦地益小乃以空名為帝不可宜為王如故便乃立子嬰為秦王令子嬰齋當廟見受玉璽齋五日子嬰與其二子謀曰高殺二世恐羣臣誅之今佯以義立我我聞髙與楚約滅秦宗室而王關中今使我齋見廟此欲廟中圖我我稱病不行丞相必來來則殺之高果自徃子嬰遂刺殺高於齋宫三族髙家以徇咸陽子嬰為秦王四十六日楚將沛公破秦軍入武關遂至霸上霸水上也在長安東三十里古者滋水秦穆公更名灞水使人約降子嬰子嬰即係頸以組白馬素車奉天子璽符降軹道旁軹亭名在長安東十三里沛公遂入咸陽封宫室府庫還軍霸上居月餘諸侯兵至項籍為從長殺子嬰及秦諸公子宗族遂屠咸陽燒其宫室三月火不滅虜其子女收其貨寶諸侯共分之滅秦之後分其地為三雍王塞王翟王號三秦項羽為西楚覇王主命分天下王諸侯後五年天下定於漢臣謹按通歴曰趙髙旣殺二世乃引璽自佩之百官莫從將上殿殿欲壞者三趙髙知天命不與羣臣不義而乃立子嬰右秦之世起襄公元年甲子至二世三年甲寅凡二十七世三十三君五百七十一年而亡史記秦襄公至二世六百一十年通志卷四
