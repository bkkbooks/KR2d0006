二品漢不見官屬後漢大將軍驃騎將軍車騎將軍衛將軍有長史一人司馬一人從事中郎二人掾屬二十九人令史及御屬三十一人又賜官騎四十人及鼓吹其領軍皆有部曲大將軍營五部部校尉一人軍司馬一人部下有曲曲有軍候一人曲下有屯屯長一人其不置校尉部但有軍司馬一人其别營領屬為别部司馬其多少各隨時宜門有門候魏以司馬景王為大將軍掾十人則無屬官其驃騎車騎府有長史司馬晉驃騎衛將軍伏波撫軍都護鎮軍中領四征四鎮龍驤典軍上軍輔國等大將軍開府者皆為位從公品秩俸賜亦與諸公同加兵者增置司馬一人從事中郎二人主簿記室督各一人官屬並與公同後周有大將軍長史司馬中郎掾屬諸曹參軍典籖等員隋以後無車騎將軍漢文帝元年始用薄昭為車騎將軍灌嬰周亞夫金日磾並為之後漢章帝時西羌反以舅馬防行車騎將軍征之銀印青綬在卿上絶席還復罷和帝即位以舅竇憲為車騎將軍征丐奴始賜金紫次司空安帝即位西羌寇亂以舅鄧隲為車騎將軍征之數年復罷靈帝數以拜嬖臣又以贈之魏車騎為都督儀與四征同若不為都督雖持節屬四征者與前後左右雜號將軍同其或散還從文官之例則位次三司晉宋車騎衛不復為四征所督故羊祐為車騎將軍開府如三司之儀後魏制與驃騎同隋車騎屬驃騎府唐省之衛將軍漢文帝始用宋昌為衛將軍位亞三司其官屬附見大將軍後凡驃騎車騎衛三將軍皆金印紫綬武冠絳朝服佩水蒼玉晉以陸曄為衛將軍兼儀同三司加千兵百騎東晉已後尤為要重後魏初加大則次儀同三司孝文太和中制加大則位在太子太師上歷代多有唐無之前後左右將軍皆周末官秦因之位上卿金印紫綬漢不常置或有前後或有左右皆掌兵及四夷李廣為前將軍趙充國為後將軍辛慶忌王商為左將軍馮奉世為右將軍光武建武七年省魏以來復置晉武初又置前軍左軍右軍泰始八年又置後軍是為四軍齊亦號左右前後四軍陳並有之北齊左右將軍領千牛備身唐無四征將軍皆漢魏以來置加大者始曰方面征東將軍漢獻帝初平三年以馬騰為之或云以張遼為之征西將軍光武建武中以馮異為征西大將軍征南將軍建武二年置以馮異為之亦以岑彭為征南大將軍征北將軍魏明帝太和中置劉靖為之魏黃初中位次三公後魏加大則涎衛將軍唐無四鎮將軍鎮東將軍後漢末魏武帝為之鎮南將軍後漢末劉表為之魏張魯晉杜預並為之鎮西將軍後漢劉表為之魏鍾會鄧艾並為之鎮北將軍魏明帝太和中置劉靖許允並為之宋時四鎮與中軍為雜號後魏加大次尚書令唐無四安將軍安東將軍後漢陶謙曹休並為之安南將軍光武元年始以岑彭為之安西將軍後漢末段煨魏鍾會石鑒並為之安北將軍晉以郗鑒為之後魏亦有唐無四平將軍平東將軍晉杜預王濬等為之平南將軍晉盧欽羊祜胡奮等為之平西將軍晉嵇紹為之平北將軍漢獻以張燕晉以阮坦為之並漢魏間置後魏亦有之唐無雜號將軍歷代雜號將軍凡數百不可具載今録其著者上將軍漢以呂祿為之騎將軍漢武帝以公孫敖及公孫賀為之元樓船將軍漢元封三年以荀彘為之橫海將軍漢鼎六年以韓説為之擊東越有功利材官將軍漢李息為之掌治宮室軍李廣為之征二師城取善馬故以為號二師將輕車將軍漢武以公孫賀為之後伏波將軍漢武帝征南越始置此號以路博德為之漢馬援亦為之伏波者船涉江海欲使波浪伏息帝中軍將軍漢武帝以公孫敖為之強弩將軍漢武以李沮為之戈船將軍環氏要略云建戈於船上浮渡沮水以討北狄帝奮威將軍漢武帝以田千秋為之度遼將軍漢武初以范明友為之後漢明帝永平八年又置屯五原銀印青綬立積射將軍漢有之晉武帝泰始四年省太康十五年射營弩營置積射強弩將軍主之軍建威將軍漢元帝以韓安國王晏並為之九虎將王莾拜將軍九人皆以虎為號號九虎將軍之征虜將軍後漢建武中始以祭遵為之後張飛亦為虎牙將軍後漢光武以蓋延為之絶橫野將軍漢光武以王常為橫野大將軍位與諸將席捕虜將軍後漢永平中馬武為之鷹揚將軍後漢建安中魏武以曹洪為之孫破虜將軍後漢末以孫堅為之討逆將軍後漢以策為之討虜將軍後漢末以孫權為之將安漢將軍蜀麋竺為之班在軍師將軍之右武威軍魏武帝以于禁為之漢撫軍將軍魏武帝置以司馬懿為之王凌江將軍後置初以羅獻為之寧朔將軍魏以渾為之橫江將軍吳魯肅為之置龍驤將軍晉武帝始以王濬為之殿中將軍宋初之黑矟將軍後魏于栗磾好持黑矟以自衛劉裕書與之曰黑矟公麾下明帝因授黑矟將軍牙門將軍冠服與將軍同魏文帝黃初中置明帝以胡烈為之又王隱晉書云陸機少襲父為牙門將吳人重武官也故晉惠帝特置四部牙門以汝南王祐為之蜀以趙雲為之監軍齊景公使穰苴將兵捍燕晉之師穰苴願得君之寵臣以監軍公使莊賈往賈不時至苴斬之是其始也漢武帝置監軍使者光武以來歙監諸將後漢末劉焉以監軍使者領益州牧劉璋亦為監軍使者魏晉世皆有之魏時司馬昭征夀春石苞為監軍鍾會伐蜀衛瓘為監軍晉孟康持節監石苞諸軍事初隗囂軍中嘗置軍師囂聘平陵人方望為之又袁紹請盧損為軍師至魏武帝又置師官四人以荀攸為軍師軍國選舉及刑獄法制皆使決焉又梁義為左軍師吳朱然為右軍師蜀以諸葛亮為軍師將軍晉避景帝諱改為軍司凡諸軍皆置之以為常員所以節量諸軍亦監軍之職也而太尉軍司尤重故山公啓事曰太尉軍司缺當選上宰監宜得宿有資重者也宋齊以來此官頗廢至梁大通四年元法僧北討復以羊侃為其太尉軍司後代多不置至隋末或以御史監軍事唐亦然時有其職非常官也開元二十年後並以中官為之謂之監軍使軍師祭酒後漢建安三年曹公還許初置此官或理曹掾屬後漢建安十九年魏武令曰軍中典獄者非其人而任以三軍死生吾甚懼之遂署此選明逹法理者為之三署郎官敘漢中郎將分掌三署郎有議郎中郎皆比六百石侍郎比四百石郎中比三百石凡四等皆秦官無員多至千人漢靈帝時三署郎吏二千餘人皆掌門戶出充車騎其散郎謂之外郎故卿校尉牧守待價於此公車特召賢良方正敦朴有道高節公府掾曹試博士者亦充兹位其下第白衣試博士者皆拜郎中中郎有五官左右三將謂五官中郎將左右郎將郎中有車戶騎三將如淳曰主車曰車郎主户衛曰户郎漢舊儀曰郎中令主郎中左右車將主左右車郎左右户將郎主左右户郎凡郎官皆主更直執戟宿衛諸殿門唯議郎不在直中漢儀曰三署郎見光祿勳執版拜見五官左右將執版不拜於三公諸卿無敬郎官故事令出錢市財用給文書乃得出時號曰山郎謂以資財為郎山者財用所出故名貧者或至經歲不得休沐其豪富郎日出遊戲或行錢得善部貨賂流行轉相放效楊惲為中郎將罷山郎其疾病休沐皆以法令有過奏免薦舉其高第有行能者多至郡守九卿三署化之莫不自勵宫殿之內翕然同聲其後遂以為常後漢和帝永元元年初令郎官詔除者得占丞尉以比秩為真凡三署郎官二漢並屬光祿勳光祿選三署郎有行應四科者歲舉茂才二人四行二人又上廉吏六人為長治劇隨缺多少萬戶以上為劇縣其缺少者不選公府亦然故明帝時館陶公主為子求郎帝不許賜錢千萬曰夫郎官上應列宿出宰百里有非其人人受其殃後漢桓靈間三署見郎七百餘人而郡國計吏多留拜為郎太尉楊秉上疏諫曰先王建國順天制官太微積星名為郎位入奉宿衛出牧百姓云云按自近代皆謂郎官上應列宿出宰百里為尚書郎故事且夫天有虎賁郎位等星皆在太微帝座之後為翊衛之象則三署郎也而世人謂之尚書郎則誤矣徵其失也蓋自梁陶藻職官要録以漢三署郎故事通為尚書郎舊有郎中將右騎光武中興悉省之晉議郎遷為太守山公啓事曰議郎許允宜參廣漢太守選亦有郎中等官其後雖有中郎將等官而無三署郎矣中郎將五官左右中郎將皆秦官漢因之並領三署郎後漢郡國舉孝廉以補之三署郎年五十以上屬五官後漢黃琬為五官中郎將時陳蕃為光祿勳深相禮待每與議事舊制光祿舉三署郎以功髙久次才德尤異為茂才四行時權富者多以人事得舉而安貧守志者見遺京師謠曰欲得不能光祿茂才於是蕃琬同心顯用志士故皆為權富郎所中傷其次分屬左右署左右郎將各領左右署郎二署皆有中郎侍郎郎中三郎並屬光祿勳魏無三署郎猶置左右中郎將晉武帝省左右中郎將官宋孝武大明中復置銀章青綬武冠絳朝服佩水蒼玉齊左右中郎將屬西省梁代並分司丹禁唐亦置諸衛中郎將永徽三年八月避太子名改中郎將為旅賁郎將又改為翊軍郎將尋復舊虎賁中郎將周官有虎賁氏掌領虎士八百人漢武帝建元三年初置期門比郎中蓋以微行出遊選材力之士執兵從送期之諸門故名期門無員多至千人平帝元始元年更名虎賁郎舊曰虎賁言如虎之奔置中郎將領之故有虎賁中郎將主虎賁宿衛冠插兩鶡尾鶡鷙鳥中之果徑者尾上黨所貢後漢崔鈞為虎賁中郎將武辨戴鶡尾紗縠單衣虎文錦袴餘郎亦然凡有虎賁中郎虎賁侍郎虎賁郎中節從虎賁皆父死子繼若死王事亦如之前賢亦多為者後漢馬援孔融並為虎賁中郎將魏桓階為虎賁中郎將遷尚書典選唐無東西南北四中郎將東中郎將後漢靈帝以董卓為之南中郎將漢獻帝以臨淄侯曹植為之西中郎將晉以謝曼桓沖為之北中郎將後漢以盧植為之建安中以鄢陵侯曹彰為之按此四中郎將並後漢置江左彌重或領刺史或持節為之銀印青綬服同將軍後魏靈太后時四中郎將兵數寡弱不足以襟帶京師任城王澄奏宜以東中帶滎陽郡南中帶魯陽郡西中帶𢎞農郡北中帶河南郡選一品三品親賢兼稱者居之配以強兵則深根固本之計也靈太后初從之後復止唐至德後節度都團練使殆其遺職也雜中郎將丐奴中郎將後漢主護南單于以張奐為之後魏天興四年罷平越中郎將晉武帝置治廣州主護南越司金中郎將趙王循為之武衛中郎將魏始以許褚為之折衝府隋初左右衛左右武衛左右武候各領軍坊鄉團以統戎卒開皇中置驃騎將軍每府置驃騎車騎二將軍大業三年改驃騎府為鷹揚府改驃騎將軍為鷹揚郎將改車騎將軍為鷹揚副郎將五年又以鷹揚副郎將為鷹擊郎將九年别置折衝果毅及武勇雄武等郎將官以統領驍果至唐初猶有驃騎府及驃騎車騎將軍之制武德七年乃改驃騎為統軍車騎為别將貞觀中復採隋折衝果毅郎將之名改統軍為折衝都尉别將為果毅都尉其府多因其地各自為名無鷹揚之號凡五百七十四府分置於諸州而名𨽻諸衛及東宫率府各領兵滿一千二百人為上府千人為中府八百人為下府每府置折衝都尉一人左右果毅都尉各一人别將一人長史一人兵曹一人校尉六人凡府在赤縣為赤府在畿縣為畿府衛士以三百人為團團有校尉五十人為隊隊有正十人為火火有備每嵗十一月以衛士帳上于兵部以侯調發天下衛士向六十萬人初置以成丁而入六十出役其家不免王徭遂漸逃散年月漸久逃死者不補天寶八載五月停折衝府以無兵可校故也十一年八月改諸衛士為武士奉車駙馬騎三都尉奉朝請三都尉並漢武帝元鼎二年置舊無員或以冠常侍或卿尹校尉左遷為之奉車掌御乘輿車駙馬掌駙馬駙副也非正駕車者騎都尉本監羽林騎奉朝請者漢律諸侯春曰朝秋曰請後漢並屬光祿勳奉朝請無員夲不為官東京罷省三公外戚皇室諸侯多奉朝請謂但奉朝會請召而已晉武帝亦以皇室外戚為三都尉奉朝請元帝為晉王以參軍為奉車都尉掾屬為駙馬都尉行參軍舍人為騎都尉皆奉朝請後罷奉車騎二都尉唯留駙馬都尉奉朝請諸尚公主者若劉惔桓溫等皆為之宋武帝永初以來以朝請選雜其尚公主者唯拜駙馬都尉齊武帝永明中奉朝請至六百餘人梁三都尉並無員秩其奉車駙馬皆武冠絳朝服銀印青綬梁陳駙馬皆尚公主者為之後魏駙馬都尉亦為尚公主官雖位高卿尹而此職不去奉車二十人騎都尉六十人北齊駙馬與後魏同隋開皇三年罷奉朝請煬帝時奉車駙馬並廢唐駙馬都尉從五品皆尚主者為之開元三年敕駙馬都尉從五品階宜依式仍備紫金魚袋天寶已前皆以美儀容者充選奉車都尉五員掌馭副車不常置若大備陳設則以餘官攝行屬左右衛東宫官第九東宫官序太子六傅三太三少賔客詹事丞司主簿直庶子中允司議郎崇中舍人士舍人馬通事舍人校諭德正贊善文館學洗文學書字直典膳郎設藥藏郎門內郎典郎宫郎家令率更令僕左右衛率府副率以下官屬左右司禦率府左右清道率府左右監門率府左右內率府旅賁中郎將太孫官屬東宮官序凡三王教世子必立太傅少傅以資之太傅則示之以父子君臣之道少傅則奉世子以觀太傅之德行而審諭之太傅在前少傅在後謂其在學時也入則有保出則有師謂燕居出入時也漢班彪上書曰昔成王為孺子出則周公召公入則太顚閎夭南宮適散宜生左右前後皆正之以禮師也者教之以事而諭諸德者也保也者愼其身以輔翼之而歸諸道者也秦漢以下始加置詹事中庶子及諸府寺等官亦有以他官而監護者自魏明帝以後久曠東宫制度闕廢官司不具吳孫權即位孫登為太子兼置四友等官以諸葛恪為左輔張休為右弼顧談為輔正都尉陳表為翼正都尉是為四友於是東宮號為多士晉初詹事左右率庶子中舍人諸官並未置唯置衛率令典兵二傅并攝衆事至咸寧元年始置詹事以領宮事宋武置東宮率更令等官其中庶子庶子中舍人舍人洗馬各減舊員之半後周加置太子諫議員四人至隋罷詹事分東宫置門下坊典書坊北齊已有典書坊以分統諸局比門下內史二省門下坊有左庶子二人內舍人四人録事二人統司經宫門內直典膳藥藏齋師等六局典書坊有右庶子二人舍人通事舍人各八人領內坊唐置詹事府以統衆務置左右二春坊以領諸局左春坊置左庶子二人中允二人司議郎四人録事二人左諭德一人左贊善大夫五人崇文館校書二人亦統六局右春坊置右庶子二人中舍人二人舍人四人録事二人右諭德一人右贊善大夫五人通事舍人八人兼領內坊因隋制也臣謹按漢孝宣帝欲令中郎將監護太子家疏廣以為示狹非所以廣太子也後漢順帝立太子居承光宫以侍御史种皓監護有中常侍卒乘衣車來載太子太子太傅高褒憂懼不能止開門將出而皓至手劒當車曰太子國之儲副常侍來無尺一何以得將太子去今日之事有死而已乃遣褒詣臺啓白得中決勑乃聽之太子六傅太子師傅商周已有逮乎列國秦亦有之漢高帝以叔孫通為太子太傅位次太常後亦有少傅後漢太傅禮如師不領官屬而少傅主太子官屬漢魏故事太子於二傅執弟子禮皆為書不曰令少傅稱臣而太傅不臣吳薛綜綜子瑩瑩子兼三代並為太子少傅晉泰始三年武帝始建東宮各置一人尚未置詹事官事無大小皆由二傅少傅立草太傅書真以為儲訓並有功曹主簿五官秩與後漢同皇太子先拜諸傅然後答之如弟子事師之禮二傅不得上疏曲敬武帝後以儲副體尊遂命諸公居之以本位重故或行或領時侍中任愷武帝所親敬復使領之蓋一時之制也咸寧元年以給事黃門侍郎楊珧為詹事掌宫事二傅不復領官屬及楊珧為衛將軍領少傅復省詹事遂崇廣傅訓命太尉賈充領太保司空齊王攸領太傅所置吏屬復如舊二傅皆進賢兩梁冠黑介幘五時朝服佩水蒼玉其後太尉汝南王亮車騎將軍揚駿司空衛瓘石鑒皆領傅保猶不置詹事以終武帝之世惠帝元康元年復置詹事及愍懷太子建宫乃置六傅三太三少焉晉二傅給采田六頃田騶五十人夏後不及田者食俸一年給赤耳安車一乘又晉書曰東宮舊制月請錢五十萬以備衆用景帝諱師故改太師為太帥通省尚書事詹事文書關由六傳自元康之後諸傳或三或四或六渡江之後有太傅少傅不立師保宋有太傅少傅各兼丞一人其保傅並銀章青綬齊與宋同武帝時以王儉為少傅舊太子致敬二傅同至是朝議接少傅以賔友之禮梁太傅位視尚書令少傅視左僕射陳因之自宋以下唯有傅而無師保後魏有太師太傅太保謂之東宮三師少師少傅少保謂之東宮三少北齊皆有之出則三師在前三少在後後周不置隋與北齊同唐六傅不必備唯其人太子出則乘輅備儀以為後從臣謹按後魏孝明在東宫宣武皇帝以崔光為太子傅光固辭帝令太子南面再拜宫臣皆從太子拜光北面立不敢答拜唯西面拜謝而出乃授光太子少傅又按唐貞觀中太宗撰太子接三師之儀出殿門迎太子先拜三師答拜每門讓三師坐與三師書前名皇恐後名皇恐再拜太子賔客漢高帝時有四人年老以上慢侮逃匿山中義不為漢臣謂之四皓東園公綺里季夏黃公甪里先生高帝不能致及將廢太子太子致禮而四人至鬚眉皓白衣冠甚偉高帝異之太子由是不廢至孝武帝又為太子立博望苑使通賔客晉元康元年愍懷太子始之東宮惠帝詔曰太保衛瓘息庭司空隴西王泰息略太子太傅楊濟息毖太子少師裴楷息憲太子少傅華廙息恆五人與太子往來以備賓客時雖非官而謂之東宮賔客其後無聞唐顯慶元年正月以太子太傅兼侍中韓瑗中書令來濟禮部尚書許敬宗左僕射兼太子少師于志寧並為皇太子賔客遂為官員定置四人掌調護侍從規諫凡太子有賔客之事則為上齒蓋取象於四皓焉資位間重其流不雜天寶中賀知章自太子賔客度為道士還鄉舍宅為觀明皇賦詩贈别時議榮之太子詹事秦官漢因之掌皇后太子家漢時太子門大夫庶子洗馬舍人皆屬二傅其太子家令丞率更令丞僕中盾衛率等宫並屬詹事後漢省詹事而太子官悉屬少傅魏復置詹事領東宫衆務晉不置至咸寧元年復置以掌宫事及永康中復不置自大安以來又置終孝懷之世晉職擬尚書令掌三令四率中庶子庶子洗馬舍人等官銀印青綬介幘進賢兩梁冠絳朝服佩水蒼玉宋與晉同齊置府領官屬梁陳任總宫朝後魏有太子左右詹事北齊東宮衆事無大小皆統之領三寺二坊又左右衛後周置太子宫正宮尹隋開皇初置詹事二年罷之唐復置詹事一人掌內外衆務糾彈非違總判府事置少詹事一人以二之龍朔二年改詹事為端尹詹事府為端尹府少詹事為少尹咸通初復舊垂拱元年又改詹事為宮尹少詹事為少尹神龍初復舊臣謹按漢皇后太子各置詹事隨其所在以名官漢官儀曰詹事位在長秋上亦宦者主中諸官後漢志曰初成帝鴻嘉三年省詹事職并大長秋是後皇后當法駕出則中謁中宦者職吏權兼詹事奉引訖罷宦者誅後尚書選兼職吏一人奉引此皆皇后詹事也丞秦官漢因之後漢省魏晉皆隨詹事省置至晉永康中詹事特置丞一人掌文書關通六傅過江多用員外郎及博士為之遷尚書郎宋齊因之梁陳制一梁冠皂朝服銅印墨綬後魏北齊並有之隋初置一人唐置二人掌文武官簿帳朝集假使分判府事臣謹按後魏楊昱為詹事丞孝明為太子尚在懷抱其所出入唯乳母而已不令宫僚聞知昱諫曰太子動止宜令翼從陛下若召太子必降手勑令臣下咸知乃詔曰自此已後非朕手勑勿令兒出宫宫臣在直從至萬歲門主簿一人晉始置歷代皆有掌府事及三寺十率府文符之隱漏程限稽失者司直二人唐龍朔三年置桂坊比御史臺置令一人比大夫司直二人比侍御史掌彈劾宮府寮其後廢桂坊以司直𨽻詹事府太子庶子古者天子有庶子之官周官謂之諸子職諸侯卿大夫之庶子掌其戒令與其教治有大事則帥國子而致於太子唯所用之秦因之置中庶子庶子員漢因之有庶子員五人史丹王商歐陽地餘並為中庶子王莾改曰中尚翼子後漢員五人職如侍中而庶子無員職如三署中郎凡庶子主宮中并諸吏之適子及支庶版籍魏因之在吳為親近之官張溫言於孫權曰中庶子官最親密切問近對宜用雋選由是以顧談為之晉中庶子庶子各四員職比散騎常侍及中書監令皆以俊茂者為之或以郡守參選若釋奠中庶子扶左庶子扶右宋與晉同武冠平巾幘絳朝服元嘉初詔二率中庶子隨太子入直上宮十四年又詔還直東宫至齊其庶子用人卑雜梁天監七年詔革選其年以太子中舍人司徒從事中郎為之凡中庶子四人以功髙者一人為祭酒行則負璽前後部護駕與功高中舍人一人共掌其坊之禁令庶子四人掌侍從左右獻納得失與功高通事舍人一人共掌其坊之禁令冠服並同前代陳因梁制後魏亦有中庶子庶子官北齊門下坊中庶子四人領之典書坊庶子四人領之隋分為左右庶子各二人分統門下典書二坊事唐亦各二人分掌左右春坊事左擬侍中而右擬中書令中允司議郎司經洗馬文學校書正字典膳藥藏內直典設宮門等局郎丞崇文館屬右春坊中舍人舍人通事舍人並屬左春坊其諭德贊善亦左右分𨽻焉中允後漢太子官屬有之職在中庶子下洗馬上漢制太子五日一朝其非朝日即使僕及中允朝朝請問起居其後無聞宋齊有中舍人是其職也唐貞觀初改太子中舍人為中允置二員其後復置中舍人龍朔二年又改中允為左贊善大夫咸亨元年復為中允而左贊善仍置焉中允掌侍從禮儀駮正啓奏并監藥及通判坊局事若庶子闕則監封題職擬黃門侍郎司議郎唐貞觀五年皇太子上表請置史職用司針誡乃於門下坊置太子司議郎四人精選名士以居之掌侍從規諫駮正啓奏并録東宫記注分判坊事職擬給事中中舍人晉咸寧初置四人以舍人才學之美者為之與中庶子共掌文翰在中庶子下洗馬上凡奏事文書皆綜典之監和嘗藥月檢奏直臣名更直五日典文疏如中書郎宋亦四人齊有一人梁時功高者一人與中庶子祭酒共掌其坊之禁令陳因之後魏北齊共有之隋曰內舍人四員屬門下坊煬帝減二人唐中舍人二員掌侍從令書奏疏通判坊事擬中書侍郎或謂之太子中書舍人舍人秦官也漢因之比郎中選良家子為之後漢無員更直宿衛如三署郎中魏因之晉有十六人職比散騎中書侍郎從駕則正直從次直守妃出次直從宋有四人齊有一人梁有十六人掌文記陳因梁制後魏亦有之北齊典書坊置二十人隋典書坊有八人煬帝改為管記舍人減四員唐復為太子舍人四人掌侍從表啓宣行令旨分判坊事通事舍人齊中庶子下有門下通事守舍人四人又庶子下有內典書通事舍人二人掌宣傳令旨內外啓奏梁亦有之視南臺御史多以餘官兼職陳因之北齊門下坊有通事舍人八人至隋亦有之煬帝改為宣令舍人八員唐復為通事舍人亦有八員掌引導辭見承旨勞問左右諭德唐龍朔三年初置太子左右諭德各一員掌侍從贊諭職比右散騎常侍左右贊善大夫唐龍朔二年初置左贊善大夫替中允置右贊善大夫替中舍人咸亨元年中允舍人復舊而贊善大夫别自為官左右各五人皆掌侍從翊贊比諫議大夫崇文館學士魏文帝始置崇文館以王肅為祭酒其後無聞唐貞觀中置崇賢館有學士直學士員掌經籍圖書教授諸王屬左春坊龍朔二年改司經局為桂坊管崇賢館而罷𨽻左春坊兼置文學四員司直二員司直正七品上職為東宮之憲司府門北向以象御史臺其後省桂坊而崇賢又屬左春坊後沛王賢為皇太子避其名改為崇文館其課試舉選與𢎞文館同洗馬秦官漢亦曰先馬如淳曰前驅也國語曰勾踐親為夫差先馬先或作洗後漢員十六人職如謁者太子出則當直者前驅導威儀也漢選郎中補之安帝時太子謁廟洗馬高山冠非乘從時著小冠魏因之晉有八人職如謁者準祕書郎集賢一梁冠黑介幘絳朝服宋與晉同齊置一人梁有典經局又置八人掌文翰尤為清選皆取甲族有才名者為之位視通直郎陳因之北齊典經坊洗馬二人隋曰司經局置洗馬四人煬帝減二人唐司經局洗馬二人龍朔二年改洗馬為司經大夫三年改司經局為桂坊一云析司經局置桂坊司經大夫通判坊事罷𨽻左春坊咸亨初復舊掌侍奉及經史圖籍判局事臣謹按梁庾於陵拜洗馬舍人舊東宫官屬通為清選洗馬掌文翰尤其清者近代用人皆取甲族有才名者時於陵周捨並擢充斯職武帝曰官以人而清豈限於甲族時論美之文學漢時郡及王國並有文學而東宮無聞魏武為丞相以司馬宣王為太子文學自後並無後周建德三年置太子文學十人後省唐龍朔三年置太子文學四員屬桂坊桂坊廢而屬司經開元中定制為三員掌侍奉分掌四部書判書功事校書宋孝建中洗馬有校書吏四人自後無聞北齊有太子校書隋太子校書有六人唐四人掌讐校經籍無郎字初𢎞文崇文二館置讐校開元六年省讐校置校書𢎞文四員崇文二員正字隋太子正字二員煬帝改為正書唐復為正字亦置二人掌刋正文字典膳郎漢魏以來並有太子食官局至北齊門下坊始别置典膳局有監丞各二人隋如北齊之制唐典膳局有郎二人丞二人郎掌進膳嘗食之事丞二之臣謹按唐乾封元年皇太子久在內不出典膳丞邢文偉減膳上啓曰竊見禮大戴記曰太子既冠成人免於保傅之嚴則有司過之史虧膳之宰史之義不得不書過不書則死之宰之義不得不撤膳不撤則死之近代以來未甚談議不接謁見常三朝之後但與內人獨居何由發揮聖智使睿哲文明者乎今史雖闕官宰當奉職沗備所司不敢逃死謹守禮經遽申減膳其年右史闕宰臣進擬數人高宗曰邢文偉嫌我兒不讀書不肯與肉喫此人甚直可用遂拜焉藥藏郎北齊門下坊領藥藏局有監丞各二人侍藥四人隋如齊之制唐藥藏局有郎二人丞二人郎掌和劑醫藥之事丞二之內直郎齊有太子內直兵局內直兵史二人梁有齋內主璽主衣扶侍等局各置有司以丞其事陳因之北齊門下坊領殿內局有內直監二人副監四人隋如北齊制唐內直局有郎二人丞二人掌符璽繖扇几杖衣服之事丞二之典設郎南齊置齋居局齋居庫郎一人梁有齋內局各置有司以丞其事陳因之北齊門下坊有齋局有太子齋內閣帥內閣帥各二人隋如北齊制唐典設局有郎四人掌凡大祭祀湯沐灑掃鋪陳之事宫門郎秦有太子門大夫漢因之員二人職比郎將漢官儀曰門大夫選四府掾屬為之安帝時太子謁廟門大夫乘從冠兩梁冠魏因之晉太子門大夫準公車令掌通箋表及宫門禁防宋因之梁代視謁者僕射陳因之北齊謂之門大夫坊并統伶官隋煬帝改門大夫為官門監唐初為宮門大夫後為宮門局有郎二人丞二人郎掌東宮殿門管鑰及啓閉之事丞二之太子家令家令秦官屬詹事太子稱家故曰家令漢因之有丞主倉穀飲食職似司農少府漢代太子食湯沐邑十縣家令主之後漢則屬少傅主倉穀飲食魏因之晉又兼主刑獄職比廷尉司農少府其家令率更令及僕射為太子三卿太康八年進品與中庶子二率同自漢至晉家令在率更下宋則居上銅印墨綬進賢兩梁冠絳朝服主內茵褥牀几諸供中之物及官奴婢月用錢庫內鹽米車牛刑獄齊因之自宋齊以來清流者不為之至梁天監六年武帝以三卿陵替乃詔革選家令視常侍率更僕視黃門陳因之後魏亦曰三卿北齊詹事領家令有丞功曹主簿領食官典倉司藏等三署及領內坊令丞隋掌刑法食膳倉庫奴婢等煬帝改為司府令唐復為家令寺置家令一人唯不主刑法餘與隋同丞二人主簿一人領食官署典倉署司藏署署令各一人丞各二人太子率更令率更令秦官顔師古曰掌知漏刻故曰率更漢因之有丞主簿庶子舍人更直職似光祿勳而屬詹事後漢因之為太子少傅屬官魏因之晉主宮殿門户及賞罰事銅印墨綬進賢兩梁冠絳朝服宋齊因之梁陳後魏並有北齊領中盾署掌周衛禁防漏刻鐘鼓亦屬詹事隋掌伎樂漏刻有令丞録事各一人唐因之加掌皇族次序及刑法事丞主簿各一人太子僕僕秦官漢因之又有長丞主車馬又有太子廄長一人亦主車馬後漢因之而屬少傅職如太僕太子五日一朝其非太子朝日即與中允入問起居魏因之晉主輿馬兼主親族如太僕宗正從駕乘安車次家令而屬詹事宋齊並有之梁視黃門郎陳因之後魏亦有北齊詹事領僕寺置令丞功曹主簿領廄牧署令隋僕寺置僕一人掌皇族親疏車輿騎乘領廄牧署令丞唐因之加掌儀仗喪葬而不掌親族丞主簿各一人統廄牧署廄牧有令一人丞二人掌車馬間廄畜牧之事左右衛率府衛率府秦官漢因之屬詹事後漢主門衛徼循衛士而屬少傅魏因之晉武帝建東宫置衛率初曰中衛率泰始五年分為左右衛率各領一軍惠帝時愍懷太子在東宫又加前後二衛率晉志曰凡太子出前衛率導在前黃麾左右二率從夾導輿車後衛率從在烏皮外並帶戟執刀成都王穎為太弟又置中衛率是為五率及江左省前後率孝武太元中又置宋齊止置左右二率梁二率視御史中丞銅印墨綬武冠絳朝服左率領七營右率領四營陳有一率後魏曰左右衛率北齊謂之左右衛率坊後周東宫有司戎司武司衛等員隋曰左右率兼有副率二人煬帝改左右衛率為左右侍率兼置副率二人唐為左右衛率府龍朔三年改其府為左右典戎衛咸亨元年復舊置率各一人領兵宿衛督攝隊伍總判府事副率二人長史録事及倉兵胄曹參軍各一人親府勳府翊府中郎將各一人臣謹按晉劉卞為愍懷太子左率知賈后欲害太子乃問張華華曰君欲如何卞曰東宫俊乂如林四率精兵萬人公居阿衡之任若得公命皇太子因朝使録尚書事廢賈后於金墉兩黃門力耳華不從賈后微聞遷卞雍州刺史卞乃服藥卒又按隋以大臣領其職蘇孝慈自兵部尚書拜左衛率尚書如故又按唐以李靖為中書令行左衛率轉兵部尚書左右司禦率府隋文帝置左右宗衛其官制如左右衛各掌以皇族侍衛煬帝後為左右武侍率唐後為左右宗衛率府龍朔二年改為左右司禦衛後改衛為率府焉副率二人長史録事及倉兵曹參軍各一人左右清道率府隋有左右虞候各置開府一人唐開元初為清道率府各置率一人掌斥堠道路先驅後殿伺察姦非副率二人長史録事及倉兵曹參軍各一人左右監門率府隋左右監門率各置一人掌諸門禁煬帝改為監門將軍唐復為左右監門率擬左右監門各置率一人掌門禁之籍副率二人長史録事參軍及兵胄二曹參軍各一人左右內率府隋置左右率副率各一人掌領備身以上禁內侍衛供奉兵仗唐為左右內率府各置率一人掌侍衛左右供奉兵仗副率長史録事參軍及兵胄曹各一人千牛各十六人掌執細刀弓箭宿衛侍從備身各二十八人掌宿衛侍從旅賁中郎將一人職如虎賁中郎將宋初置天子有虎賁習武訓也諸侯有旅賁禦災害也唐諸率府初有中郎郎將官永徽元年以太子名忠改諸率府中郎將為旅賁郎將其郎將改為翊軍後或改或省太孫官屬唐永淳元年三月立皇孫重照為皇太孫將置府寮高宗召吏部郎中王方慶問曰前代故事如何方慶進曰按周禮有嫡孫漢魏以來皇太子在亦不立太孫晉惠帝永寧元年立愍懷太子第三子襄陽王尚為皇太孫太子官屬即轉為太孫官屬南齊永明十年立文惠太子長子南郡王昭業為皇太孫便居東宮今皇太子在而立太孫旁求載籍未有前例上曰自我作古可乎對曰五帝不相沿樂茍不失上下之序不虧政理之道亦何事而不可詩曰貽厥孫謀以燕翼子禮曰君子抱孫不抱子孫可以為王父尸以其昭穆同也今陛下肇建皇孫創斯盛典所以彰子孫千億之盛福祚靈長之應也上恱使方慶詳求典故官屬員品乃奏太孫府置師傅及文學祭酒及長史曹掾主簿管記司録以下六曹從事等官各加王府一級後上頗以為疑竟不補授而止通志卷五十五
