body:
  text: 通志卷五十五宋右迪功郎鄭樵漁仲撰職官略第五武官第八上將軍總敘左右衛併親衛官屬附左右驍衛左右武衛左右威衛左右領軍衛左右金吾衛左右監門衛左右千牛衛左右羽林軍左右龍虎軍左右神虎軍附將軍總敘三代之制天子六軍其將皆命卿故夏書曰大戰于甘乃召六卿蓋古之天子寄軍政於六卿居則以田警則以戰所謂入使治之出使長之之義其職在國則以比長閭胥族師黨正州長鄉大夫為稱在軍則以卒伍司馬將軍為號所以異軍國之名諸侯之制大國三軍次國二軍小國一軍其將亦命卿也晉獻公初作二軍公將上軍未有其號魏獻子衛文子始有將軍稱左傳曰晉閻沒女寬謂魏子曰豈將軍食之而有不足注曰獻子為將軍率故謂之將軍又禮記曰將軍文子之喪自戰國置大將軍周末又置前後左右將軍秦因之位上卿金印紫綬漢興置大將軍驃騎將軍位次丞相車騎將軍衛將軍左右前後將軍皆金印紫綬位次上卿後漢志曰漢將軍比公者四謂大將軍驃騎車騎衛將軍掌京師兵衛四夷屯警孝武征閩越東甌又有伏波樓船及伐朝鮮大宛復置橫海度遼二師宣帝增以蒲類破羌權時之制若此非一亦不常設光武中興諸將軍皆稱大及天下已定武官悉省四征興於漢代四安四平起於魏初後漢有三鎮之稱魏有鎮北之號晉武帝重兵官故軍校多選朝廷清重之士居之置中軍將軍以統宿衛七軍及五王作難東海王越以頃興事皆由殿省乃奏宿衛有侯爵者皆罷之時殿中武官並封侯由是出者略盡皆涕泣而去乃以東海國官領左右衛以國兵宿衛晉宋以來以領軍護軍左右二衛驍騎遊擊將軍謂之六軍宋輿服志曰驃騎車騎衛將軍及諸將軍加大者皆金章紫綬武冠佩水蒼玉諸軍司馬銀章青綬朝服武冠其四安四平左右前後征虜等將軍及四中郎將晉代荀羡王胡之並居此官宋齊以來唯處諸王素族無為者齊以二衛四軍五校驍騎遊擊積射強弩殿中員外殿中武衛七將軍殿中司馬左右及虎賁之中郎將冗從僕射羽林監武騎常侍謂之西省而散騎為東省梁武帝以將軍之名高下舛雜命更加釐定於是有司奏置一百二十五號將軍以鎮衛驃騎車騎為二十四班四征四中為二十三班八鎮為二十二班八安為二十一班四平四翊為二十班凡三十六號為重號將軍又有五德將軍忠勇軍師武臣爪牙龍騎雲麾鎮兵翊師宣惠果毅智威仁威勇威信威嚴威智武仁武勇武信武嚴武是為五德將軍也以班多者為貴凡十品二十四班品取其盈數班法氣候之數制簿悉以大號居後以為選法自小遷大也前史所記以位得從公故將軍之名次于台槐之下至是備其班品敘於百官之外凡一百二十五將軍後魏將軍之名多矣謂驃騎車騎衛為三將軍末年有八柱國大將軍其中六人各督二大將軍凡十二大將軍元贊元育元廓侯莫陳順宇文遵逹奚武李遠豆盧寧宇文貴賀蘭祥楊忠王雄是也又各分統開府一人一開府領一軍兵是為二十四軍分掌禁旅當爪牙禦侮之寄自大統十六年以後功臣位至柱國及大將軍者衆矣咸是散秩無復統禦後周武帝三年改諸軍軍士並為侍官隋煬帝以左右衛左右屯衛左右禦衛左右候衛凡十二衛各置大將軍一人將軍二人以總府事每衛各置長史録事參軍司倉兵騎鎧等參軍員軍人總名衛士蓋魏周十二大將軍之遺制唐武德初秦王既平王世充及竇建德高祖以秦王功殊今古自昔位號不足以為稱乃特置天策上將軍以拜焉位在王公上及升儲宫遂廢天䇿府二年七月高祖以天下未定事資武力將舉關中之衆以臨四方乃置十二軍分關中諸府以𨽻焉以萬年道為參旗軍長安道為鼓旗軍富平道為元戈軍醴泉道為丹鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍岐州道為平道軍豳州道為招搖軍麟州道為苑遊軍涇州道為天紀軍宜州道為天節軍每將軍一人副一人取威名素重者為之楊恭仁劉𢎞基長孫順德等為其將督耕戰之備自是士馬強徑無敵於天下五年省七年以突厥寇掠復置十二軍後又省之其後定制有左右衛左右驍左右武左右威左右領軍左右金吾左右監門左右千牛凡十六衛大將軍各一人左右衛及左右金吾總謂之四衛其餘謂之雜衛將軍總三十人左右千牛衛將軍各一人餘衛各二人左右羽林左右龍虎左右神虎六軍大將軍各一人將軍各三人皆有衛署其餘驃騎輔國鎮軍冠軍四大將軍雲麾勇武壯武宣威明威定遠寧遠遊騎遊擊等九將軍並為五品以上武散官先天二年正月十日詔往者衛士計戶取充使二十一入幕六十出軍既憚劬勞咸欲避匿今改取二十五以上充十五年即放出頻經征鎮者十年放出自今已後羽林飛騎先於衛士中簡擇開元六年始詔折衝府兵每六歲一簡自高宗武后時天下久不用兵府兵之法浸壞番役更代多不以時衛士稍稍亡匿至是益耗散宿衛不能給宰相張説乃請一切幕士宿衛十一年取京兆蒲同岐華府兵及白丁而益以潞州長從兵共二十萬號長從宿衛歲一番命左丞蕭嵩與州刺史共選之明年更號曰彍騎臣謹按宋志曰冗從僕射漢東京有中黃門冗從僕射非其職也魏代因其名而置冗從僕射職官要録曰本期門之職後漢桓帝時置冗從僕射掌諸散從其射事則主帥之左右衛并親衛官屬附漢京師有南北軍掌理禁衛南軍若唐諸衛北軍若唐羽林等軍周勃馳入北軍是也初有衛將軍魏末晉文王又置中衛將軍武帝受禪分中衛為左右衛將軍以羊琇為左趙序為右並置佐吏皆掌宿衛營兵銀章青綬武冠絳朝服佩水蒼玉宋齊謂之二衛各領營兵每暮一人宿直後增二衛儀從為九十人陳因之後魏永光初又增置左右衛將軍各二人北齊二人分掌左右廂所主朱華閣以外各武衛將軍二人二之隋初左右衛大將軍各一人將軍各二人又各統親衛煬帝改左右衛為左右翊衛又加置親衛并領勳武二衛煬帝改三衛為三侍非翊衛府皆無三侍其所領軍士名為驍騎唐復為左右衛大將軍各一人掌宮掖禁禦督攝隊伍將軍各二人二大將軍事長史左右衛各一人晉武帝置左右衛各有長史司馬東晉省長史歷宋齊梁陳後魏北齊並同至隋左右衛各置長史一人唐因之録事參軍左右衛各一人東晉元帝初為鎮東大將軍置録事參軍自後無梁皇子府有中録事參軍録事參軍各一人後魏二人公府及第一第二第三品將軍府及始蕃王二蕃王三蕃王府各有録事參軍官北齊因之隋左右衛府各有録事參軍一人唐因之倉曹參軍左右衛各二人東晉元帝為鎮東大將軍有倉曹參軍宋武帝相府亦置後魏與録事參軍同置北齊因之隋左右衛府各有倉曹參軍一人唐因之置二人兵曹參軍左右衛各二人歷代皆與倉曹同置騎曹參軍左右衛各一人魏司馬景王為大將軍有騎兵宋武帝為相有騎兵參軍隋左右衛府有騎兵參軍唐初因之其後改為騎曹胄曹參軍左右衛各一人東晉元帝為鎮東大將軍有鎧曹參軍宋武帝為相亦有之齊有左右鎧曹各一人隋左右衛府有鎧曹行參軍事一人唐因之長安初改為胄曹神龍初復為鎧曹開元初復為胄曹凡自十六衛及東宫十率府録事及兵倉騎胄等曹參軍通謂之衛佐並為美職漢魏以來諸將軍有長史以下官屬及唐諸衛所置蓋亦因其舊號考其資位則全校微矣其下諸衛官屬並同左右親衛中郎將府中郎將之名秦漢以來有之隋每衛各置開府一員以統之唐武德七年改開府為中郎將親衛為一府勳衛翊衛各為一府中郎將各一人掌領校尉以下宿衛總判府事唐武德七年改親衛驃騎將軍為之其勳翊二衛亦然左右郎將一人隋備身府置左右郎將唐因其名武德七年改親衛車騎將軍為之其勳翊二衛亦然掌二中郎將之職録事參軍一人掌受府事兵曹參軍一人掌判府事校尉五人左右驍衛漢有驍衛將軍謂之雜號將軍武帝以李廣為之後省後漢初改屯衛為驍騎魏置為中軍晉領營兵兼統宿衛梁以來其任愈重天監六年置左右驍騎領朱衣直閣並給儀從北徐州刺史昌義之首為此職出則羽儀清道入則與二衛通直臨軒則升殿夾侍改舊驍騎曰雲騎陳有左右驍騎及雲騎韋翽為驍騎將軍素有名稱每大事常令夾侍左右時人榮之後魏北齊並有驍騎將軍之職後周有左右驍騎率上士隋開皇十八年置備身府煬帝即位改左右備身府為左右驍衛府所領軍士名曰豹騎其備身府又别置焉唐因隋置左右驍衛府龍朔二年去府字光宅元年改左右驍衛為左右武威神龍元年復舊大將軍各一人所掌與左右衛同將軍各二人以副之領官屬並隋置唐因之同左右衛左右武衛後漢末曹公為丞相有武衛營及魏文帝乃置武衛將軍以主禁旅晉宋齊梁陳隋又有建武奮武廣武等將軍至隋採諸武之名置左右武衛大將軍一人將軍二人以總府事煬帝改所領軍士名熊騎唐光宅元年改為左右鷹揚衛神龍元年復為武衛其制與隋同所掌如左右衛領官屬並隋置唐因之同左右衛左右威衛隋初有領軍府煬帝改為左右屯衛唐因之貞觀十二年左右屯衛始置飛騎出遊幸即衣五色袍乘六間馬賜猛獸衣韀而從焉龍朔二年改左右屯衛為左右威衛而别置左右屯營亦有大將軍等官尋改左右屯營為羽林光宅元年改威衛為豹韜衛神龍元年復舊所掌如左右衛領官屬並隋置唐因之同左右衛龍朔三年左右威衛舊官之員外各置録事參軍一人府三人史四人並𨽻左右羽林軍統本司事左右領軍衛初魏武為漢丞相相府自置領軍非漢官也建安十二年改為中領軍以史渙為之與護軍韓浩皆領禁兵文帝受漢禪始置領軍將軍以曹休為之主五校中壘武衛三營晉武帝初省使中軍將軍羊祜統二衛前後左右驍騎七軍營兵即領軍之任也祜遷罷復置北軍中候懷帝永嘉中改中軍曰中領軍元帝永昌元年復改曰北軍中候尋復為領軍成帝時復以為中候而陶侃居之尋復為領軍魏晉領護皆金章紫綬中領中護銀章青綬武冠絳朝服佩水蒼玉晉郗鑒庾亮紀瞻卞壼陸煜褚翼王彪之會稽王道子沈嘉武陵王遵孔安國謝鯤等並為領軍宋置領軍將軍一人掌內軍護軍將軍一人掌外軍齊有領軍及中領軍梁領軍將軍管天下兵要謂之禁司與左右僕射為一流中領軍與吏部尚書為一流梁蕭景為領軍將軍管天下兵要監局官僚皆近幸多驕侈景在職峻切官曹肅然其監局多事唯景及臧盾長於撥繁繼居此職並著聲稱陳因之後魏有領軍護軍二職若侍臣帶者加中又有領軍將軍護軍將軍二將軍與領護不並置北齊領軍府凡禁衛官皆主之以高歸彥為領軍大將軍領軍加大自歸彥始隋有左右領軍府各掌十二軍籍帳差科辭訟之事不置將軍唯有長史司馬諸曹掾屬等官煬帝改領軍為左右屯衛即左右威衛唐復採舊名别置領軍衛分為左右龍朔二年改為左右戎衛咸通元年復舊光宅元年改為左右玉鈐衛神龍元年復舊各置大將軍一人掌宫掖禁備督攝隊伍與左右諸衛同將軍各二人以副之長史齊梁陳並有之北齊有長史司馬隋置録事以下諸曹唐因之同左右衛左右金吾衛秦有中尉掌徼循京師如淳曰所謂遊徼循禁備盜賊也顔師古曰徼謂遮繞漢武帝太初元年更名執金吾顔師古曰金吾鳥名也主辟不祥天子出職主先導以備非常故執此鳥之象因以名官緹騎二百人緹騎無秩比史食俸五百二十人輿服導從光生滿路羣僚之中斯最壯矣光武微時歎曰仕宦當為執金吾舊掌京師盜賊考按疑事後漢掌宫外戒司