body:
  text: 通志卷一百二十五宋右廸功郎鄭樵漁仲撰列傳第三十八晉解系弟結育結弟孫旂孟觀牽秀繆播従弟允皇甫重張輔李含張方閻鼎索靖子綝賈疋周浚子嵩弟謨従父馥成公簡茍晞華軼劉喬孫耽栁耽子劉琨子羣輿琨兄輿子演祖逖兄納邵續李矩叚匹磾魏浚族子該郭黙王導子悦洽恬洽子珣珉解系字少連濟南著人也父修魏琅邪太守梁州刺史考績為天下第一武帝受禪封梁鄒侯系及二弟結育並清身潔已甚得聲譽時荀朂門宗彊盛朝野畏憚之朂諸子謂系等曰我與卿為友應向我公拜朂又曰我與尊先使君親厚系曰不奉先君遺教公若與先君厚往日哀頓當垂書問親厚之誨非所敢承朂父子大慙當世壮之後辟公府掾歴中書黄門侍郎散騎常侍豫州刺史遷尚書出為雍州刺史揚烈将軍西戎校尉假節㑹氐羌叛與征西将軍趙王倫討之倫信用佞人孫秀與系争軍事更相表奏朝廷知系守正不撓而召倫還系表殺秀以謝氐羌不従倫秀譖之系遂坐免官以白衣還第闔門自守及張華裴頠之被誅也倫秀以宿憾収系兄弟梁王肜救系等倫怒曰我於水中見蟹且惡之况此人兄弟輕我邪此而可忍孰不可忍肜苦争之不得遂害之并戮其妻子後齊王冏起義時以裴解為寃首倫秀既誅冏乃奏理之永寧二年追贈光禄大夫加弔祭焉弟結字叔連少與系齊名辟公府掾累遷黄門侍郎歴散騎常侍豫州刺史魏郡太守御史中丞時孫秀亂關中結在都坐議秀罪應誅秀由是致憾及系被害結亦同戮女適裴氏眀日當嫁而禍起裴氏欲認活之女曰家既若此我何活為亦坐死朝廷遂議革舊制女不従坐由結女始也後贈結光禄大夫改葬加弔祭結弟育字穉連名亞二兄歴公府掾太子洗馬尚書郎衛軍長史𢎞農太守與二兄俱被害妻子徙邉孫旂字伯旗樂安人也父歴魏晋際為幽州刺史右将軍旂絜静少自修立察孝廉累遷黄門侍郎出為荆州刺史名位與二解相亞永熈中徴拜太子詹事轉衛尉坐武庫火免官嵗餘出為兖州刺史遷平南将軍假節旂子弼及弟子髦輔琰四人並有吏材稱於當世遂與孫秀合族及趙王倫起事夜従秀開神武門下觀閲器仗兄弟旬月相次為公府掾尚書郎弼又為中堅将軍領尚書左丞輔為上将軍領射聲校尉髦為武衛将軍領太子詹事琰為武威将軍領太子左率皆賜爵開國郡侯推崇旂為車騎将軍開府初旂以弼等受署偽朝遣小息囬責讓弼等以過差之事必為家禍弼等終不従旂制之不可但慟哭而已及齊王冏起義四子皆伏誅襄陽太守宗岱承冏檄斬旂夷三族弟尹字文旗歴陳留陽平太守早卒孟觀字叔時渤海東光人也少好讀書解天文惠帝即位稍遷殿中中郎賈后悖婦姑之禮隂欲誅楊駿而廢太后因駿専權數言之於帝又使人諷觀㑹楚王瑋将討駿觀受賈后㫖宣詔頗加誣其事及駿誅以觀為黄門侍郎特給親信四十人遷積弩将軍封上谷郡公氐帥齊萬年反於關中衆數十萬諸将覆敗相繼中書令陳凖監張華以趙梁諸王在關中雍容貴戚進不貪功退不懼罪士卒雖衆不為之用周處喪敗職此之由上下離心難以勝敵以觀沉毅有文武材用乃啓觀討之觀所領宿衛兵皆趫㨗勇悍并統關中士卒身當矢石大戰十數皆破之生擒萬年威慴氐羌轉東羌校尉徵拜右将軍趙王倫簒位以觀所在著績署為安南将軍監河北諸軍事假節屯宛觀子平為淮南王允前鋒将軍討倫戰死孫秀以觀杖兵在外假言平為允兵所害贈積弩将軍以安觀義軍既起多勸觀應齊王冏觀以紫宮帝座無他變謂倫應之遂不従衆議而為倫守及帝反正永饒冶令空桐機斬觀首傳于洛陽遂夷三族牽秀字成叔武邑觀津人也祖招魏鴈門太守秀博辯有文才性豪侠弱冠得羙名為太保衛瓘尚書崔洪所知太康中調補新安令累遷司空従事中郎與帝舅王愷素相輕侮愷諷司𨽻荀愷奏秀夜在道中戴髙平國守士田興妻秀即表訴被誣論愷穢行文辭亢厲以譏詆外戚于時朝臣雖多證明其行而秀盛名羙譽由是而損遂坐免官後司空張華請為長史秀任氣好為将帥張昌作亂長沙王乂遣秀討昌秀出關因奔成都王頴𨽻伐乂以秀為冠軍将軍與陸機王粹等共為河橋之役機戰敗秀證成其罪又諂事黄門孟玖故見親於頴恵帝西幸長安以秀為尚書秀少在京輦見司𨽻劉毅奏事而扼腕慷慨自謂居司直之任當能激濁揚清䖏鼓鞞之間必建将帥之勲及在常伯納言亦未曾有規獻弼違之奇也河間王顒甚親任之關東諸軍奉迎大駕以秀為平北将軍鎮馮翊秀與顒将馬瞻等輔顒以守關中顒密遣使就東海王越求迎越遣将麋晃等迎顒時秀擁衆在馮翊晃不敢進顒長史楊騰前不應越軍懼越討之欲取秀以自効與馮翊大姓諸嚴詐稱顒命使秀罷兵秀信之騰遂殺秀於萬年繆播字宣則蘭陵人也父悦光禄大夫播才思清辯有意義髙密王泰為司空以播為祭酒累遷太弟中庻子恵帝幸長安河間王顒欲挟天子令諸侯東海王越将起兵奉迎天子以播父時故吏委以心膂播従弟右衛率允顒前妃之弟也越遣播允詣長安説顒令奉帝還洛約與顒分陜為伯播允素為顒所敬信既相見虚懷従之顒将張方自以罪重懼為誅首謂顒曰今據形勝之地國富兵彊奉天子以號令誰敢不服顒惑方所謀猶豫不決方惡播允為越游説隂欲殺之播等亦慮方為難不敢復言時越兵鋒甚盛顒深憂之播允乃復説顒急斬方以謝可不勞而安顒従之於是斬方以謝山東諸侯顒後悔之又以兵距越屢為越所敗帝反舊都播亦従太弟還洛契闊艱難深相親狎及帝崩太弟即帝位是為懐帝以播為給事黄門侍郎俄轉侍中徙中書令任遇日隆専管詔命時越威權自己帝力不能討心甚惡之以播允等有公輔之量又盡忠於國故委以心膂越懼為已害因入朝以兵入宮執播等於帝側帝嘆曰姦臣賊子無世無之不自我先不自我後哀哉起執播等手涕泗歔欷不能自禁越遂害之朝野憤惋咸曰善人國之紀也而加虐焉其能終乎及越薨帝贈播衛尉祠以少牢允字休祖安平獻王外孫也與播名譽略齊初為尚書郎後遷太弟左衛率轉魏郡太守及王浚軍逼鄴石超等大敗允奔東海王越於徐州越使允與播俱入關而所説得行大駕東還越以允為冠軍将軍南陽太守允従藍田出武關之南陽前守衛展距允不受允乃還洛懐帝即位拜允左衛将軍轉散騎常侍太僕卿既而與播及帝舅王延尚書何綏太史令髙堂冲並參機密為東海王越所害皇甫重字倫叔安定朝那人也性沉果有才用為司空張華所知稍遷新平太守元康中華版為秦州刺史齊王冏輔政以重弟商為參軍冏誅長沙王乂又以為參軍時河間王顒鎮關中其将李含先與商重有隙每銜之及此説顒曰商為乂所任重終不為人用宜急除之以去一方之患可表遷重為内職因其經長安乃執之重知其謀乃露檄上尚書以顒信任李含将欲為亂召集隴上士衆以討含為名乂以兵革累興今始寧息表請遣使詔重罷兵徴含為河南尹含既就徵重不奉詔顒遣金城太守游楷隴西太守韓稚等四郡兵攻之成都王頴與顒起兵共攻乂以討后父尚書僕射羊元之及商為名又以商為左将軍河東太守領萬餘人於缺門距張方為方所破顒軍遂進乂既屢敗乃使商間行齎帝手詔使游楷盡罷兵令重進軍討顒商行過長安至新平遇其従甥従甥素憎商以告顒顒捕得商殺之乂既敗重猶堅守閉塞外門城内莫知而四郡兵築土山攻城重輙以連弩射之所在為地窟以防外攻權變百端外軍不能近城将士為之死戰顒知不可㧞乃上表求遣御史宣詔諭之令降重知非朝廷本意不奉詔獲御史騶人問曰我弟将兵来欲至未騶云已為河間王所害重失色立殺騶於是城内知無外救遂共殺重先是重被圍急遣養子昌請救於東海王越越以顒新廢成都王頴與山東連和不肯出兵昌乃與故殿中人楊篇詐稱越命迎羊后於金墉城入宮以后令發兵討張方奉迎大駕事起倉卒百官初皆従之俄而又共誅昌張輔字世偉南陽西鄂人也漢河間相衡之後少有幹局與従母兄劉喬齊名初補藍田令不為豪彊所屈時彊弩将軍龎宗西州大姓護軍趙浚宗婦族也故僮僕放縦為百姓所患輔繩之殺其二奴又奪宗田二百餘頃以給貧户一縣稱之轉山陽令太尉陳凖家僮亦暴横輔復擊殺之累遷尚書郎封宜昌亭侯轉御史中丞時積弩将軍孟觀與眀威将軍郝彦不協而觀因軍事害彦又賈謐潘岳石崇等共相引重及義陽王威有詐冐事輔並糾劾之梁州刺史楊欣有姊喪未經旬車騎長史韓預彊聘其女為妻輔為中正貶預以清風俗論者稱之及孫秀執權威搆輔於秀秀惑之将䋲以法輔與秀牋曰輔徒知希慕古人當官而行不復自知小為身計今義陽王誠𢎞恕不以介意然輔母年七十六常見憂慮恐輔将以怨疾獲罪願眀公留神省察輔前後行事是國之愚臣而已秀雖凶狡知輔雅正為威所誣乃止後遷馮翊太守是時長沙王乂以河間王顒専制關中有不臣之跡言於恵帝密詔雍州刺史劉沉秦州刺史皇甫重使討顒於是沉等與顒戰於長安輔遂将兵救顒沉等敗績顒徳之乃以輔代重為秦州刺史當赴顒之難金城太守游楷亦皆有功轉梁州刺史不之官楷聞輔之還不時迎輔隂圖之又殺天水太守封尚欲揚威西土召隴西太守韓稚㑹議未決稚子朴有武幹斬異議者即収兵伐輔輔與稚戰於遮多谷口輔軍敗績為天水故帳下督富整所殺初輔甞著論云管仲不如鮑叔鮑叔知所奉知所投管仲奉主而不能濟所奔又非濟事之國三歸反坫皆鮑不為又論班固司馬遷云遷之著述辭約而事舉叙三千年事唯五十萬言班固叙二百年事乃八十萬言煩省不同不如遷一也良史述事善足以奨勸惡足以鑒誡人道之常中流小事亦無取焉而班皆書之不如二也毁貶鼂錯傷忠臣之道不如三也遷既創造固又因循難易益不同矣又遷為蘇秦張儀范雎蔡澤作傳逞辭流離亦足以眀其大才故述辯士則詞藻華靡叙實録則𨼆核名檢此所以遷稱良史也又論魏武帝不及劉偹樂毅減於諸葛亮詞多不載李含字世容隴西狄道人也僑居始平少有武幹兩郡並舉孝亷安定皇甫商州里年少少恃豪族以含門寒微欲與結交含距而不納商恨焉遂諷州以短檄召含為門亭長㑹州刺史郭奕素聞其賢下車擢含為别駕遂䖏羣僚之右尋舉秀才薦之公府自太保掾轉秦國郎中令司徒選含領始平中正秦王柬薨含依臺儀𦵏訖除喪尚書趙浚有内寵疾含不事已遂奏含不應除喪本州大中正傅袛以名義貶含中丞傅咸上表理含横被貶黜帝不納含遂貶退割為五品歸長安嵗餘光禄差含為夀城邸閣督司徒王戎表含曾為大臣雖見割削不應降為此職詔停後為始平令及趙王倫簒位或謂孫秀曰李含有文武大才無以資人秀以為東武陽令河間王顒表請含為征西司馬甚見信任頃之轉為長史顒誅夏侯奭送齊王冏使與趙王倫遣張方率衆赴倫皆含謀也後顒聞三王兵盛乃加含龍驤将軍統席薳等鐵騎廻遣張方軍以應義師天子反正含至潼關而還初梁州刺史皇甫商為趙王倫所任倫敗去職詣顒顒慰撫之甚厚含諫顒曰商倫之信臣懼罪至此不宜數與相見商知而恨之及商當還都顒置酒餞行啇因與含忿争顒和釋之後含被徵為翊軍校尉時商參齊王冏軍事而夏侯奭兄在冏府稱奭立義被西藩枉害含心不自安冏右司馬趙驤又與含有隙冏将閲武含懼驤因兵討之乃單馬出奔于顒矯稱受密詔顒即夜見之乃説顒曰成都王至親有大功還藩甚得衆心齊王冏親而専執威權朝廷側目今檄長沙王令討齊使先聞於齊齊必誅長沙因傳檄以加齊罪則冏可擒也既去齊立成都除逼建親以安社稷大勲也顒従之遂表請討冏拜含為都督統張方等率諸軍以向洛陽含屯隂盤而長沙王乂誅冏含等旋師初含之本謀欲并去乂冏使權歸於顒含因得肆其宿志既長沙勝齊顒頴猶各守藩志望未允顒表含為河南尹時商復被乂任遇商兄重時為秦州刺史含疾商滋甚復與重搆隙顒自含奔還之後委以心膂復慮重襲已乃使兵圍之更相表罪侍中馮蓀黨顒請召重還商説乂曰河間之奏皆李含所交搆也若不早圖禍将至矣且河間前舉由含之謀乂乃殺含張方河間人也世貧賤以材勇得幸於河間王顒累遷兼振武将軍永寧中顒表討齊王冏遣方領兵二萬為前鋒及冏被長沙王乂所殺顒及成都王頴復表討乂遣方率衆自函谷入屯河南恵帝遣左将軍商距之方以潛軍破商之衆遂入城乂奉帝討方于城内方軍望見乗輿於是小退方止之不得衆遂大敗殺傷滿于衢巷方退壁于十三里橋人情挫衂無復固志多勸方夜遁方曰兵之利鈍是常貴因敗以為成耳我更前作壘出其不意此用兵之奇也乃夜潛進逼洛城七里乂既新㨗不以為意忽聞方壘成乃出戰敗績東海王越等執乂送于金墉城方使郅輔取乂還營炙殺之於是大掠洛陽官私奴婢萬餘人而西還長安顒加方右将軍馮翊太守蕩隂之役顒又遣方鎮洛陽上官已苖願等距之大敗而退清河王覃夜襲已願已願出奔方乃入洛陽覃於廣陽門迎方而拜方馳下車扶止之於是復廢皇后羊氏及帝自鄴還洛方遣息羆以三千騎奉迎将渡河橋方又以所乗陽燧車青盖素升三百人為小鹵簿迎帝至芒山下方自帥萬餘騎奉雲母輿及旌旗之飾衛帝而進方初見帝将拜帝下車自止之方在洛既乆兵士暴掠發哀獻皇女墓軍人喧喧無復留意議欲西遷尚匿其迹欲湏天子出因刼移都乃請帝謁廟帝不許方遂悉引兵入殿迎帝帝見兵至避之於竹林中軍人引帝出方於馬上稽首曰胡賊縦横宿衛單少陛下今日幸臣壘臣當捍禦寇難致死無二於是軍人便亂入宮閤争割流蘇武帳而為馬帴方奉帝至𢎞農顒遣司馬周弼報方欲廢太弟方以為不可帝至長安以方為中領軍録尚書事領京兆太守時豫州刺史劉喬檄稱潁川太守劉輿廹脅范陽王虓距迎詔命及東海王越等起兵於山東乃遣方率歩騎十萬討之方屯兵覇上而劉喬為虓等所破顒聞喬敗大懼将罷兵恐方不従遲疑未決初方従山東来甚微賤長安富人郅輔厚相供給及貴以輔為帳下督甚暱之顒參軍畢垣河間冠族為方所侮忿而説顒曰張方乆屯覇上聞山東賊盛盤桓不進宜防其未萌其親信郅輔具知其謀矣而繆播等先亦構之顒因使召輔垣迎説輔曰張方欲反人謂卿知之王若問卿何辭以對輔驚曰實不聞方反為之若何垣曰王若問卿但言爾爾不然必不免禍輔既入顒問之曰張方反卿知之乎輔曰爾顒曰遣卿取之可乎又曰爾顒於是使輔送書於方因令殺之輔既暱於方持刀而入守閤者不疑因火下發函便斬方頭顒以輔為安定太守初繆播等議斬方送首與越冀東軍可罷及方死更争入關顒頗恨之又使人殺輔閻鼎字台臣天水人也初為太傅東海王越參軍轉卷令行豫州刺史事屯許昌遭母喪乃於密縣間鳩聚西州流人數千欲還鄉里值京師失守秦王出奔密中司空荀藩藩弟司𨽻校尉組及中領軍華恒河南尹華薈在密縣建立行臺以密近賊南趣許潁司徒左長史劉疇在密為塢主中書令李暅太傅參軍騶㨗劉薈鎮軍長史周顗司馬李述皆来赴疇僉以鼎有才用且手握彊兵勸藩假鼎冠軍将軍豫州刺史蔚等為參佐鼎少有大志因西土人思歸欲立功鄉里乃與撫軍長史王毘司馬𫝊遜懐翼戴秦王之計謂疇㨗等曰山東非覇王䖏不如關中河陽令傅暢遺鼎書勸奉秦王過洛陽謁拜山陵徑據長安糾合夷晋興起義衆尅復宗廟雪社稷之恥鼎得書便欲詣洛流民謂北道近河懼有抄截欲南自武關向長安疇等皆山東人咸不願西入荀藩及疇㨗等並逃散鼎追藩不及暅等見殺唯顗述走得免遂奉秦王行止上洛為山賊所襲殺百餘人率餘衆西至藍田時劉聰向長安為雍州刺史賈疋所逐走還平陽疋遣人奉迎秦王遂至長安而與大司馬南陽王保衛将軍梁芬京兆尹梁綜等並同心推戴立王為皇太子登壇告天立社稷宗廟以鼎為太子詹事總攝百揆梁綜與鼎争權鼎殺綜以王毘為京兆尹鼎首建大謀立効天下始平太守麹允撫夷護軍索綝並害其功且欲専權馮翊太守梁緯北地太守梁肅並綜母弟綝之姻也謀欲除鼎乃誣其有無君之心専戮大臣請討之遂攻鼎鼎出奔雍為氐竇首所殺𫝊首長安索靖字㓜安敦煌人也累世官族父湛北地太守靖少有逸羣之量與鄉人氾衷張甝索紒索永俱詣太學馳名海内號稱敦煌五龍四人並早亡唯靖該博經史兼通内緯州辟别駕郡舉賢良方正對䇿髙第傅元張華與靖一面皆厚與之相結拜駙馬都尉出為西域戊己校尉長史太子僕同郡張勃特表以靖才蓺絶人宜在臺閣不宜逺出邉塞武帝納之擢為尚書郎與襄陽羅尚河南潘岳吴郡顧榮同官咸器服焉靖與尚書令衛瓘俱以善草書知名帝愛之瓘筆勝靖然有楷法逺不能及靖在臺積年除鴈門太守遷魯相又拜酒泉太守恵帝即位賜爵關内侯靖有先識逺量知天下将亂指洛陽宮門銅駝嘆曰㑹見汝在荆棘中耳元康中西戎反叛拜靖大将軍梁王肜左司馬加蕩寇将軍屯兵粟邑撃賊敗之遷始平内史及趙王倫簒位靖應三王義舉以左衛将軍討孫秀有功加散騎常侍遷後将軍太安末河間王顒舉兵向洛陽拜靖使持節監洛城諸軍事游撃将軍領雍秦涼義兵與賊戰大破之靖亦被傷而卒追贈太常時年六十五後又贈司空進封安樂亭侯諡曰荘靖著五行三統正驗論辯理隂陽氣運又撰索子晋詩各二十卷又作草書状其辭曰聖皇御世随時之宜倉頡既生書契是為科斗鳥篆類物象形叡哲變通意巧滋生損之𨽻草以崇簡易百官畢修事業並麗盖草書之為状也婉若銀鈎漂若驚鸞舒翼未發若舉復安蟲蛇虬蟉或往或還類阿那以羸形歘奮釁而桓桓及其逸遊肹嚮乍正乍邪騏驥暴怒逼其轡海水窊隆揚其波芝草蒲陶還相繼棠棣融融載其華元熊對踞于山嶽飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附窈嬈廉笘随體散布紛擾擾以猗靡中持疑而猶豫元螭蛟獸嬉其間騰猨飛鼺相奔趣凌魚奮尾蛟龍反據投空自竄張設牙距或若登髙望其類或若既往而中顧或若俶儻而不羣或若自檢於常度於是多才之英篤蓺之彦役心精㣲耽此文憲守道兼權觸類生變離折八體靡形不判去繁存㣲大象未亂上理開元下周謹案騁辭放手雨行氷散髙音翰厲溢越流漫忽班班而成章信奇妙之煥爛體磥落而壮麗姿光潤以粲粲命杜度運其指使伯英廻其腕著絶勢於紈素垂百世之殊觀先時靖行見姑臧城南石地曰此後當起宮殿至張駿於其地立南城起宗廟建宮殿焉靖有五子鯁綣璆聿綝皆舉秀才聿安昌鄉侯卒少子綝最知名綝字巨秀少有逸羣之量靖每曰綝廊廟之材非簡札之用州郡吏不足汙吾兒也舉秀才除郎中甞報兄讐手殺三十七人時人壮之俄轉太宰參軍除好畤令入為黄門侍郎出參征西軍事轉長安令在官有稱及成都王頴刼遷恵帝幸鄴頴為王浚所破帝遂播越河間王顒使張方及綝東迎乗輿以功拜鷹揚将軍轉南陽王模従事中郎劉聰侵掠關東以綝為奮威将軍以禦之斬聰将呂逸又破聰黨劉豊遷新平太守聰将蘇鐵劉五斗刼掠三輔除綝安西将軍馮翊太守綝有威恩華戎嚮服賊不敢犯及懐帝䝉塵長安又陷模被害綝泣曰與其俱死寜為伍子胥乃赴安定與雍州刺史賈匹扶風太守梁綜安夷護軍麹允等糾合義衆頻破賊黨修復舊舘遷定宗廟進救新平大小百戰綝手擒賊帥李羌與閻鼎立秦王為皇太子及即尊位是為愍帝綝遷侍中太僕以首迎大駕升壇授璽之功封戈居伯又遷前将軍尚書右僕射領吏部京兆尹加平東将軍進號征東尋又詔授衛将軍領太尉位特進軍國之事悉以委之及劉曜侵逼王城以綝為都督征東大将軍持節討之破曜呼曰逐王呼延莫以功封上洛郡公食邑萬户拜夫人荀氏為新豊君子石元為世子賜子弟二人鄉亭侯劉曜入關芟麥苖綝又撃破之自長安伐劉聰聰将趙染染杖其累㨗有自矜之色帥精騎數百與綝戰大敗之染單馬而走轉驃騎大将軍尚書左僕射録尚書承制行事劉曜復率衆入馮翊帝累徵兵於南陽王保保左右議曰蝮虵在手壮士解其腕且斷隴道以觀其變従事中郎裴詵曰虵已螫頭頭可截不保以胡崧行前鋒都督湏衆軍集乃當發麴允欲挟天子趣保綝以保必逞私欲乃止自長安以西不復奉朝廷百官饑乏採稆自存時三秦人尹桓解武等數千家盜發漢覇杜二陵多獲珍寳帝問綝曰漢陵中物何乃多邪綝對曰漢天子即位一年而為陵天下貢賦三分之一供宗廟一供賓客一充山陵漢武帝享年乆長比崩而茂陵不復容物其樹皆已可拱赤眉取陵中物不能減半于今猶有朽帛委積珠玉未盡此二陵是儉者耳亦百世之誡也後劉曜又率衆圍京城綝與麹允固守長安小城胡崧承檄奔命破曜于靈䑓崧慮國家威舉則麹索功盛乃案兵渭北遂還槐里城中饑窘人相食死亡逃奔不可制唯凉州義衆千人守死不移帝使侍中宋敞送牋降於曜綝潛留敞使其子説曜曰今城中食猶足支一嵗未易可尅也若許綝以車騎儀同萬户郡公者請以城降曜斬而送之曰帝王之師以義行也孤将軍十五年未曾以譎詭敗人必窮兵極勢然後取之今索綝所説如是天下之惡一也輙相為戮之若審兵食未盡者便可勉彊固守如其糧竭兵㣲亦宜早寤天命孤恐霜威一震玉石俱摧及帝出降綝随帝至平陽聰以其不忠於本朝戮之於東市賈疋字彦度武威人魏太尉詡之曾孫也少有志畧器望甚偉見之者莫不悦附特為武夫之所瞻仰願為致命初辟公府遂歴顯職遷安定太守雍州刺史丁綽貪横失百姓心乃譖疋于南陽王模模以軍司謝班代之疋奔瀘水與胡彭蕩仲及氐竇首結為兄弟聚衆攻班綽奔武都疋復入安定殺班愍帝以疋為驃騎将軍雍州刺史封酒泉公時諸郡百姓饑饉白骨蔽野百無一存疋率戎晋二萬餘人将伐長安西平太守竺恢亦固守劉粲聞之使劉曜劉雅及趙染距疋先攻恢不尅疋邀撃大破之曜中流矢退走疋追之至于甘泉旋自渭橋襲蕩仲殺之遂迎秦王奉為皇太子後蕩仲子夫護帥羣胡攻之疋敗走夜堕于澗為夫護所害疋勇畧有志節以匡復晋室為已任不幸顛墜時人咸痛惜之周浚字開林汝南安成人也父裴少府卿浚性果烈以才理見知有人倫鑒識其鄉人史曜素微賤衆所未知浚獨引之為友遂以妹妻之曜竟有名於世浚初不應州郡之辟後仕魏為尚書郎累遷御史中丞拜折衝将軍揚州刺史封射陽侯随王渾伐吴攻破江西屯戌與孫皓中軍大戰斬偽丞相張悌等首級數千俘馘萬計進軍屯於横江時聞龍驤将軍王濬既破上方别駕何惲説浚曰張悌率精鋭之卒悉吴國之衆殄滅於此吴之朝野莫不震懾今王龍驤既破武昌兵威甚盛順流而下所向輙尅土崩之勢見矣竊謂宜速渡江直指建鄴大軍卒至奪其膽氣可不戰而擒浚善其謀便使白渾惲曰渾闇於事機而欲慎已免咎必不我従浚固使白之渾果曰受詔但令江北抗衡吴軍不使輕進貴州雖武豈能獨平江東今者違命勝不足多若其不勝為罪已重且詔令龍驤受我節度但當具君舟檝一時俱濟耳惲曰龍驤尅萬里之寇以既濟之功来受節度未之聞也且握兵之要可則奪之所謂受命不受辭也今渡江必全尅獲将有何慮若疑於不濟不可謂智知而不行不可謂忠實鄙州上下所以恨恨也渾執不聽居無何而濬至渾召之不来乃直指三江山孫皓降於濬渾深恨之而欲與濬争功渾牋與浚曰書貴克讓易大謙光斯古文所詠道家所崇前破張悌吴人失氣龍驤因之陥其區宇論其前後我實緩師動則為傷事則不及而今方競其功彼既不吞聲将虧雍穆之𢎞興矜争之鄙斯愚情之所不取也浚得牋即諫止渾渾不能納遂相表奏浚既濟江與渾共行吴城壘綏撫新附以功進封成武侯食邑六千户賜絹六千疋眀年移鎮秣陵時吴初平屢有逃亡者頻討平之賔禮故老捜求俊乂甚有威德吴人悦服初吴之未平也浚在戈陽南北為互市而諸将多相襲奪以為功吴将蔡敏守于沔中其兄珪為将在秣陵與敏書曰古者兵交使在其間軍國固當以信義相髙而聞疆塲之上往往有襲奪互市甚不可行弟慎無為小利而忘大備也候者得珪書以呈浚浚曰君子也及渡江求珪得之問其本曰汝南人也浚戯之曰吾固疑吴無君子而卿果吾鄉人遷侍中武帝問浚卿宗後生稱誰為可答曰臣叔父子恢稱重臣宗従父子馥稱清臣宗帝並召用浚轉少府卿以本官領将作大匠改營宗廟訖增邑五百户後代王渾為使持節都督揚州諸軍事安東将軍卒于位三子顗嵩謨顗嗣爵别有傳云嵩字仲智狷直果狭每以才氣陵物元帝作相引為參軍及帝為晋王又拜奉朝請嵩上䟽言梓宮未反舊京未清未宜推崇尊號由是忤㫖出為新安太守嵩怏怏不悦臨發與散騎郎張嶷在侍中戴邈坐褒貶朝士又詆毁邈邈密表之帝召嵩入面責之曰卿矜豪傲慢敢輕忽朝廷由吾不徳故耳嵩跪謝曰昔唐虞至聖四凶在朝陛下雖盛眀御世亦安能無碌碌之臣乎帝怒収付廷尉廷尉華恒以嵩大不敬棄市論嶷以扇和減罪除名時顗方貴重帝隐忍乆之補廬陵太守不之職更拜御史中丞是時帝以王敦勢盛漸踈忌王導等嵩上䟽言導等忠素竭誠翼成大業不宜輕聽孤臣之言惑疑似之説放逐舊德以佞伍賢逺虧既往之明顧傷伊管之交也䟽奏帝感悟故導等獲全王敦既害顗而使人弔嵩嵩曰亡兄天下人為天下人所殺復何所弔敦甚銜之懼失人情故未加害用為従事中郎嵩王應嫂父也以顗横逆遇禍意恒憤憤甞衆中云應不宜統兵敦密使妖人李脱誣嵩及周莚潛相署置遂害之嵩精於事佛臨刑猶於市誦經云謨以顗故頻居顯職王敦死後詔贈戴若思譙王承等而未及顗時謨為後軍将軍上疏訟若思等既䝉襃顯而顗獨負殊恩䟽奏不報謨復表陳然後追贈顗官謨歴少府丹陽尹侍中中護軍封西平侯卒贈金紫光禄大夫諡曰貞浚従父弟馥馥字祖宣父㽔安平太守馥少與友人成公簡齊名俱起家為諸王文學累遷司徒左西屬司徒王渾表馥理識清正兼有才幹主定九品檢括精詳臣委任責成褒貶允當請補尚書郎許之稍遷司徒左長史吏部郎選舉精密論望益羙轉御史中丞侍中拜徐州刺史加冠軍将軍假節徵為廷尉恵帝幸鄴成都王頴以馥守河南尹陳􅀈上官已等奉清河王覃為太子加馥衛将軍録尚書馥辭不受覃令馥與上官已合軍馥以已小人縦暴終為國賊乃共司𨽻滿奮等謀共誅之謀泄為已所襲奮被害馥走得免及已為張方所敗召馥還攝河南尹暨東海王越迎大駕以馥為中領軍未就遷司𨽻校尉加散騎常侍假節都督諸軍於澠池帝還宮出為平東将軍都督揚州諸軍事代劉凖為鎮東将軍與周玘等討陳敏滅之以功封永寜伯馥自經世故每欲維正朝廷忠情懇至以東海王越不盡臣節每言論厲然越深憚之馥覩羣賊孔熾洛陽孤危乃建䇿迎天子遷都夀春永嘉四年與長史吳思司馬殷識上書即請移幸時越與茍晞不協馥不先白於越而直上書越大怒先是越召馥及淮南太守裴碩馥不肯行而令碩率兵先進碩貳於馥乃舉兵稱馥擅命已奉越密㫖圖馥遂襲之為馥所敗碩退保東城求救于元帝帝遣揚威将軍甘卓建威将軍郭逸攻馥于夀春安豊太守孫恵帥衆應之使謝摛為檄摛馥之故将也馥見檄流涕曰必謝摛之辭也摛聞之遂毁草旬日而馥衆潰奔于項為新蔡王確所拘憂憤發病卒初華譚之失廬江也往夀春依馥及馥軍敗歸于元帝帝問曰周祖宣何至於反譚曰周馥雖死天下尚有直言之士馥見寇賊滋蔓王威不振故欲移都以紓國難方伯不同遂致其伐曾不踰時而京都淪沒若使従馥之謀或可後亡也原情求實何得為反帝曰馥位為征鎮握兵方隅召之不入危而不持亦天下之罪人也譚曰然馥振纓中朝素有俊彦之稱出據方嶽實有偏任之重而髙畧不舉往往失和危不能持當與天下共受其責然謂之反不亦誣乎帝意始解馥有二子密矯密字泰元性虚簡時人稱為清士位至尚書郎矯字正女亦有才幹成公簡字宗舒東郡人也家世二千石性清素不求榮利潛心味道罔有干其志者黙識過人張茂先每言簡清静比揚子雲黙識擬張安世後為中書郎時周馥已為司𨽻校尉鎮東将軍簡自以才髙而在馥之下謂馥曰揚雄為郎三世不徙而王莽董賢位列三司古今一揆耳馥甚慙之官至太子中庻子散騎常侍永嘉末奔茍晞與晞同沒茍晞字道将河内山陽人也少為司𨽻部従事校尉石鑒深器之東海王越為侍中引為通事令史累遷陽平太守齊王冏輔政晞參冏軍事拜尚書右丞轉左丞亷察諸曹八坐以下皆側目憚之及冏誅晞亦坐免長沙王乂為驃騎将軍以晞為従事中郎恵帝征成都王頴以為北軍中候及帝還洛陽晞奔范陽王虓虓承制用晞行兖州刺史汲桑之破鄴也東海王越出次官渡以討之命晞為前鋒桑素憚之於城外為柵以自守晞将至頓軍休士先遣單騎示以禍福桑衆大震棄柵宵遁嬰城固守晞陥其九壘遂定鄴而還西討呂朗等滅之従髙密王泰討青州賊劉根破汲桑故将公師藩敗石勒於河北威名甚盛時人擬之韓白進位撫軍将軍假節都督青兖諸軍事封東平郡侯邑萬户晞練於官事文簿盈積斷决如流人不敢欺其従母依之奉飬甚厚従母子求為将晞距之曰吾不以王法貸人将無後悔邪固欲之晞乃以為督䕶後犯法晞杖節斬之従母叩頭請救不聽既而素服哭之流涕曰殺卿者兖州刺史哭弟者茍道将其杖法如此晞見朝政日亂懼禍及已而多所交結每得珍物即貽都下親貴兖州去洛五百里恐不鮮美募得千里牛每遣信旦發暮還初東海王越以晞復其讐耻甚德之引升堂結為兄弟越司馬潘滔等説曰兖州要衡魏武以之輔相漢室茍晞有大志非純臣乆令䖏之則患生心腹矣若遷于青州厚其名號晞必悦公自牧兖州經緯諸夏藩衛本朝此所謂謀之於未有為之於未亂也越以為然乃遷晞征東大将軍開府儀同三司加侍中假節都督青州諸軍事領青州刺史進為郡公晞乃多置參佐轉易守令以嚴刻立功日加斬戮流血成川人不堪命號曰屠伯頓邱太守魏植為流人所逼聚五六萬大掠兖州晞出屯無鹽以弟純領青州刑殺更甚於晞百姓號小茍酷於大茍晞尋破植時潘㴞及尚書劉望等共誣陷晞晞怒表求㴞等首又請越従事中郎劉洽為軍師越皆不許晞於是昌言曰司馬元超為宰相不平使天下淆亂茍道将豈可以不義使之韓信不忍衣食之恵死於婦人之手今将誅國賊尊王室桓文豈逺哉乃移告諸州稱已功伐陳越罪状時懐帝惡越専權乃詔晞施檄六州同共討越晞乃移諸征鎮尅期大舉㑹王彌遣曹嶷破琅邪北攻齊地茍純城守嶷衆轉盛連營數十里晞還登城望之有懼色與賊連戰輙破之後簡精鋭與賊大戰㑹大風揚塵晞遂敗績棄城夜走嶷追至東山部衆皆降嶷晞單騎奔髙平収邸閣得數千人帝惡越滋甚又屢密詔晞討之晞皆随詔表聞言當祗奉詔書部分諸軍徑至項城龔行天罰初越疑晞與帝有謀使遊騎於成臯間獲晞使果得詔令及朝廷書遂大構嫌隙越出牧豫州以討晞復下檄説晞罪惡遣従事中郎楊瑁為兖州與徐州刺史裴盾共討晞晞使騎収河南尹潘淊㴞夜遁乃執尚書劉曾侍中程延斬之㑹越薨盾敗詔晞為大将軍大都督督青徐兖豫荆揚六州諸軍事增邑二萬户加黄鉞先官如故晞以京邑荒饉日甚寇難交至表請遷都遣従事中郎劉㑹領船數十艘宿衛五百人獻榖千斛以迎帝朝臣多有異同俄而京師䧟晞與王讃屯倉垣豫章王端及和郁等東奔晞晞率羣臣尊端為皇太子置行臺端承制以晞領太子太傅都督中外諸軍録尚書自倉垣徙屯䝉城讃屯陽夏晞出於孤㣲位至上将志頗盈滿奴婢将千人侍妾數十終日累夜不出户庭刑政苛虐縦情肆欲遼西閻亨以書固諫晞怒殺之晞従事中郎明預有疾居家聞之乃轝病諫晞曰皇晋遭百六之數當危難之機眀公親稟廟算将為國家除暴閻亨美士奈何無罪一日殺之晞怒曰我自殺閻亨何關人事而轝疾来罵我左右為之戰慄預曰以眀公以禮見進預欲以禮自盡今明公怒預其若逺近怒明公何昔堯舜之在上也以和理而興桀紂之在上也以惡逆而滅天子且猶如此况人臣乎願明公且置是怒而思預之言晞有慙色由是衆心稍離莫為致用加以疾疫饑饉其将温畿傅宣皆叛之石勒攻陽夏滅王讃馳襲䝉城執晞署為司馬月餘乃殺之晞無子弟純亦遇害華軼字彦夏平原人魏太尉歆之曾孫也祖表太中大夫父澹河南尹軼少有才氣聞於當世汎愛博納衆論美之初為博士累遷散騎常侍東海王越牧兖州引為留府長史永嘉中歴振威将軍江州刺史雖逢喪亂每崇禮典置儒林祭酒以𢎞道訓乃下教曰今大義頽替禮典無宗朝廷滯議莫能攸正常以慨然宜特立此官以𢎞其事軍諮祭酒杜夷棲情元逺礭然絶俗才學精博道行優備其以為儒林祭酒俄被越檄使助討諸賊軼遣前江夏太守陶侃為揚武将軍率兵三千屯夏口以為聲援軼在州甚有威恵州之豪士接以友道得江表之歡心流亡之士赴之如歸時天子孤危四方瓦解軼有匡天下之志每遣貢獻入洛不失臣節謂使者曰若洛都道斷可輸之琅邪王以眀吾之為司馬氏也軼自以受洛京所遣而為夀陽所督時洛京尚存不能祗奉元帝教命郡縣多諫之軼不納曰吾欲見詔書耳時帝遣揚烈将軍周訪率衆屯彭澤以備軼訪過姑熟著作郎于寳見而問之訪曰夫府受分令屯彭澤彭澤江州西門也華彦夏有憂天下之誠而不欲碌碌受人控御頃来紛紜粗有嫌隙今又無故以兵守其門将成其釁吾當屯尋陽故縣既在江西可以扞禦北方又無嫌於相逼也尋洛都不守司空荀藩移檄而以帝為盟主既而帝承制改易長吏軼又不従命於是遣左将軍王敦都督甘卓周訪宋典趙誘等討之軼遣别駕陳雄屯彭澤以拒敦自為舟軍以為外援武昌太守馮逸次于湓口訪撃逸破之前江州刺史衛展不為軼所禮心常怏怏至是與豫章太守周廣為内應潛軍襲軼軼衆潰奔于安城追斬之及其五子傳首建鄴初廣陵髙悝寓居江州軼辟為西曹掾尋而軼敗悝匿軼二子及妻崎嶇經年既而遇赦悝攜攜出首帝嘉而宥之劉喬字仲彦南陽人也其先漢宗室封安衆侯傳襲歴三代祖廙魏侍中父阜陳留相喬少為秘書郎建威将軍王戎引為參軍伐吴之役戎使喬與參軍羅尚濟江破武昌還授滎陽令遷太子洗馬以誅楊駿功賜爵關中侯拜尚書右丞豫誅賈謐封安衆男累遷散騎常侍齊王冏為大司馬初嵇紹為冏所重每下階迎之喬言於冏曰裴張之誅朝臣畏憚孫秀故不敢受財物嵇紹今何所逼忌故畜裴家車牛張家奴婢邪樂彦輔来公未甞下牀何獨加敬於紹冏乃止紹謂喬曰大司馬何故不復迎客喬曰似有正人言以卿不足迎者紹曰正人為誰喬曰其則不逺紹黙然頃之遷御史中丞冏腹心董艾勢傾朝廷百寮莫敢忤㫖喬二旬之間奏劾艾罪釁者六艾諷右丞茍晞免喬官復為屯騎校尉張昌之亂喬出為威逺将軍豫州刺史與荆州刺史劉𢎞共討昌進左将軍恵帝西幸長安喬與諸州郡舉兵迎大駕東海王越承制轉喬安北将軍冀州刺史以范陽王虓代領豫州刺史喬以虓非天子命不受代發兵距之潁川太守劉輿昵於虓喬上尚書列輿罪惡河間王顒得喬所上乃宣詔使鎮南将軍劉𢎞征東大将軍劉凖平南将軍彭城王繹與喬并力攻虓於許昌輿弟琨率衆救虓未至而虓敗虓乃與琨俱奔河北未㡬琨率突騎五千濟河攻喬喬刼琨父蕃以檻車載之據考城以距虓衆不敵而潰喬復収散卒屯于平氏河間王顒進喬鎮東将軍假節以其長子祐為東郡太守又遣劉𢎞劉凖彭城王繹等率兵援喬𢎞與喬牋勸令解兵與虓修好及東海王越将討喬𢎞又與越書請釋私嫌共存公義既而上表朝廷乞發明詔詔越等兩釋猜嫌各保分局時河間王顒方距關東倚喬為助不納其言東海王越移檄天下帥甲士三萬将入關迎大駕軍次於蕭喬懼遣子祐距越於蕭縣之靈壁劉琨分兵向許昌許昌人納之琨自滎陽率兵迎越遇祐衆潰見殺喬衆遂散與五百騎奔平氏帝還洛陽大赦越復表喬為太傅軍諮祭酒越薨復以喬為都督豫州諸軍事鎮東将軍豫州刺史卒於官時年六十三愍帝末追贈司空子挺潁川太守挺子耽字敬道少有行檢以義尚流稱為宗族所推博學明習詩禮三史歴度支尚書加散騎常侍在職公平亷慎所莅著績桓元耽女壻也及元輔政以耽為尚書令加侍中不拜改授特進金紫光禄大夫尋卒追贈左光禄大夫開府耽子栁字叔恵亦有名譽少登清官歴尚書左右僕射時右丞傅廸好廣讀書而不解其義栁唯讀老子而已廸每輕之栁曰卿讀書雖多而無所解可謂書簏矣時人重其言出為徐兖江三州刺史卒贈右光禄大夫開府儀同三司喬弟乂始安太守子成丹陽尹劉琨字越石中山魏昌人漢中山靖王勝之後也祖邁有經國之才為相國參軍散騎常侍父蕃清髙冲儉位至光禄大夫琨少得雋朗之目與范陽祖約俱以雄豪著名年二十六為司𨽻従事時征虜将軍石崇河南金谷澗中有别廬冠絶時軰引致賔客日以賦詩琨預其間文詠頗為當時所許秘書監賈謐參管朝政京師人士無不傾心石崇歐陽建陸機陸雲之徒並以文才降節事謐琨兄弟亦在其間號二十四友太尉髙密王泰辟為掾頻遷著作郎太學博士尚書郎趙王倫執政以琨為記室督轉従事中郎倫子荂即琨姊壻也故琨父子兄弟並為倫所委任及簒荂為皇太子琨為荂詹事三王之討倫也以琨為冠軍假節與孫秀子㑹率宿衛兵三萬拒成都王頴戰於黄橋琨大敗而還焚河橋以自固及齊王冏輔政以其父兄皆有當世之望故特宥之拜兄輿為中書郎琨為尚書左丞轉司徒左長史冏敗范陽王虓鎮許昌引為司馬及恵帝幸長安東海王越謀迎大駕以琨父蕃為淮北護軍豫州刺史劉喬攻范陽王虓於許昌也琨與汝南太守杜育等率兵救之未至而虓敗琨與虓俱奔河北琨之父母遂為劉喬所執琨乃説冀州刺史温羡使讓位於虓及虓領冀州遣琨詣幽州乞師於王浚得突騎八百人與虓濟河共破東平王楙於廪邱南走劉喬始得其父母又斬石超降呂朗因統諸軍奉迎大駕於長安以功封廣武侯邑二千户永嘉元年為并州刺史加振威将軍領匈奴中郎将琨在路上表曰臣以頑蔽志望有限因緣際㑹遂忝過任九月末得發道險山峻胡寇塞路輙以少撃衆冒險而進頓伏艱危辛苦備甞即日逹壺口關臣自渉州疆目覩困乏流移四散十不存二攜老扶弱不絶於路及其在者鬻賣妻子生相棄捐死亡委厄白骨横野哀呼之聲感傷和氣羣胡數萬周匝四山動足遇掠開目覩寇唯有壺關可以告糴而此二道九州之險數人當路則百夫不敢進公私往反沒喪者多嬰守窮城不得薪采耕牛既盡又乏田器以臣愚短當此至難憂如循環不遑寝食臣伏思此州雖云邉朔實邇皇畿南通河内東連司冀北捍殊俗西禦彊虜是勁弓良馬勇士精騎之所出也當湏委輸乃全其命今上尚書請此州榖五百萬斛絹五百萬疋綿五百萬斤願陛下時出臣表速見聽䖏朝廷許之時東嬴公騰自晉陽鎮鄴并土饑荒百姓随騰南下餘户不滿二萬寇賊縦横道路斷塞琨募得千餘人轉鬪至晋陽府寺焚毁僵尸蔽地其有存者饑羸無復人色荆棘成林犲狼滿道琨翦除荆棘収𦵏枯骸造府朝建市獄寇盗互来掩襲常以城門為戰場百姓負楯以耕屬鞬而耨琨撫循勞徕甚得物情是時劉淵在離石相去三百里許琨密遣離間其部雜虜降者萬有餘落淵甚懼遂城蒲子而居之在官未朞流人稍復雞犬之音復相接矣琨父蕃自洛赴之人士奔逆者多歸於琨琨善於懐撫而短於控御一日之中雖歸者數千去者亦以相繼然素奢豪嗜聲色雖暫自矯勵而輙復縦逸河南徐潤者以音律自通遊於貴勢琨甚愛之署為晋陽令潤恃寵驕恣干預琨政奮威䕶軍令狐盛性亢直數以此為諫并勸琨除潤琨不納初單于猗㐌以救東嬴公騰之功琨表其弟猗盧為代郡公與劉希合衆於中山王浚以琨侵已之地數来撃琨琨不能抗由是聲實稍損徐潤又譖令狐盛於琨曰盛将勸公稱帝矣琨不之察便殺之琨母曰汝不能𢎞經畧駕豪傑専欲除勝已以自安何以得濟如是禍必及我不従盛子泥奔于劉聰具言虚實聰大喜以泥為鄉導屬上黨太守襲醇降于聰鴈門烏丸復反琨親率精兵禦之聰遣子粲及令狐泥乗虚襲晋陽太原太守髙喬以郡降聰琨父母並遇害琨引猗盧并力攻粲大敗之死者十五六琨乗勝追之更不能尅猗盧以為聰未可滅遺琨牛羊車馬而去留其将箕澹叚繁等戍晋陽琨志在復讐而屈於力弱泣血尸立撫慰傷痍移居陽邑城以招集亡散愍帝即位拜大将軍都督并州諸軍事加散騎常侍假節琨上䟽謝罪及麹允敗劉曜斬趙冉琨又表求滅聰勒以自効三年帝遣兼大鴻臚趙亷持節拜琨為司空都督并冀幽三州諸軍事琨上表讓司空受都督尅期與猗盧討劉聰尋猗盧父子相圖盧及兄子根皆病死部落四散琨子遵先質於盧衆皆附之及是遵與箕澹等帥盧衆三萬人馬牛羊十萬悉来歸琨琨由是復振率數百騎自平城撫納之屬石勒攻樂平太守韓據請救於琨而琨自以士衆新合欲因其鋭以威勒箕澹諫曰此雖晋人乆在荒裔未習恩信難以法御今内収鮮卑之餘榖外抄殘胡之牛羊且閉關守險務農息士既服化感義然後用之則功可立也琨不従悉發其衆命澹領歩騎二萬為前驅琨自為後繼勒先據險要設伏以撃澹大敗之一軍皆沒并土震駭尋又災旱琨窮蹙不能復守幽州刺史鮮卑叚匹磾遣信要琨欲與同奨王室琨由是率衆赴之従飛狐入薊匹磾見之甚相崇重與琨結㛰約為兄弟是時西都不守元帝稱制江左琨乃令長史温嶠勸進於是河朔征鎮夷夏一百八十人連名上表語在元紀令書奨諭之建武元年琨與匹磾期討石勒匹磾推琨為大都督㰱血載書檄諸方守俱集襄國琨匹磾進屯固安以俟衆軍匹磾従弟末波納勒厚賂獨不進乃沮其計琨匹磾以勢弱而退是嵗元帝轉琨為侍中太尉其餘如故并贈名刀琨答曰謹當躬自執佩馘截二虜匹磾奔其兄喪琨遣世子羣送之而末波率衆要撃匹磾而敗走之羣為末波所得末波厚禮之許以琨為幽州刺史共結盟而襲匹磾密遣使齎羣書請琨為内應而為匹磾邏騎所得時琨别屯故征北府小城不之知也因来見匹磾匹磾以羣書示琨曰意亦不疑公是以白公耳琨曰與公同盟志奨王室仰憑威力庻雪家國之恥若児書密逹亦終不以一子之故負公而忘義也匹磾雅重琨初無害琨意将聽還屯其弟叔軍好學有智謀為匹磾所信謂匹磾曰吾胡夷耳所以能服晋人者畏吾衆也今我骨肉構禍是其良圖之日若有奉琨以起吾族盡矣匹磾遂留琨琨之庻長子遵懼誅與琨左長史楊橋并州治中如綏閉門自守匹磾諭之不得因縦兵攻之琨将龍季猛廹於乏食遂斬橋綏而降初琨之去晋陽也慮及危亡而大恥未雪亦知夷狄難以義服冀輸寫至誠僥倖萬一每見将佐發言慷慨悲其道窮欲率部曲死於賊壘斯謀未畢竟為匹磾所拘自知必死神色怡如也為五言詩贈其别駕盧諶託意非常攄暢幽憤逺想張陳感鴻門白登之事用以激諶諶素無奇畧以常詞酬和殊乖琨心重以詩贈之乃謂琨曰前篇帝王大志非人臣所言矣然琨既忠於晋室素有重望被拘經月逺近憤歎匹磾所署代郡太守辟閭嵩與琨所署鴈門太守王據後将軍韓據連謀密作攻具欲以襲匹磾而韓據女為匹磾兒妾聞其謀而告之匹磾於是執王據辟閭嵩及其徒黨悉誅之㑹王敦密使匹磾殺琨匹磾又懼衆反已遂稱有詔収琨初琨聞敦使至謂其子曰處仲使来而不我告是殺我也死生有命但恨讐恥不雪無以下見二親耳因歔欷不能自勝匹磾遂縊之年四十八子姪四人俱被害朝廷以匹磾尚彊當為國討石勒不舉琨哀三年琨故従事中郎盧諶崔悦等上表理琨寃痛陳其本末求朝廷甄論尋而太子中庻子温嶠又上䟽訟之帝乃下詔褒録下幽州依舊弔祭贈侍中太尉諡曰愍琨少負志氣有縦横之才善交勝已而頗浮誇與范陽祖逖為友聞逖被用與親故書曰吾枕戈待旦志梟逆虜常恐祖生先吾著鞭其意氣相期如此在晋陽常為胡騎所圍數重城中窘迫無計琨乃乗月登樓清嘯賊聞之皆凄然長歎中夜奏胡笳賊又流涕歔欷有懐土之切向晚復吹之為四塞之聲賊並棄圍而走子羣嗣羣字公度少拜廣武侯世子随父在晋陽遭逄寇亂數領偏軍征討性清慎有裁斷得士類懽心及琨為匹磾所害琨従事中郎盧諶等率餘衆奉羣依末波温嶠前後表稱姨弟劉羣内弟崔悦盧諶等皆在末波中翹首南望愚謂此等並有文思於人之中少可愍惜如䝉録召繼絶興亡則陛下更生之恩望古無二咸康二年成帝詔徵羣等為末波兄弟愛其才託以道險不遣石虎滅遼西羣及諶悦同沒胡中石虎皆優禮之以羣為中書令至冉閔敗後羣遇害時勒及石虎得公卿人士多殺之其見擢用終至大官者惟有河東裴憲渤海石璞滎陽鄭系潁川荀綽北地傅暢及羣悦諶等十餘人而已輿字慶孫少儁朗有才局與琨並尚書郭奕之甥名著當時京師為之語曰洛中奕奕慶孫越石辟宰府尚書郎兄弟素侮孫秀及趙王倫輔政秀執權並免其官妹適倫世子荂荂與秀不恊復以輿為散騎侍郎齊王冏輔政以輿為中書侍郎東海王越范陽王虓之舉兵也以輿為潁川太守及河間王顒檄劉喬討虓於許昌矯詔歸罪於輿募能殺輿兄弟送首者封三千户縣侯賜絹五千匹虓之敗輿與之俱奔河北虓既鎮鄴以輿為征虜将軍魏郡太守虓薨東海王越将召之或曰輿猶膩也近則汚人及至越疑之輿密視天下兵簿及倉庫牛馬器械水陸之形皆黙識之是時軍國多事每㑹議自潘㴞以下莫知所對輿既見越應機辯畫越傾膝酬接即以為左長史越既總録以輿為上佐賔客滿筵文案盈几逺近書記日有數千終日不倦或以夜繼之皆人人懽暢莫不悦附命議如流酬對欵備時人服其能比之陳遵時稱越府有三才潘㴞大才劉輿長才裴邈清才越誅繆播王延等皆輿謀也延愛妾荆氏有音伎延尚未殮輿便娉之未及迎又為太傅従事中郎王儁所爭奪御史中丞傅宣劾奏越不問輿而免儁官輿乃説越遣琨鎮并州為越北面之重洛陽未敗病指疽卒時年四十七追贈驃騎将軍先有功封定襄侯諡曰貞子演嗣演字始仁初辟太尉掾除尚書郎以父憂去職服闋襲爵太傅東海王越引為主簿遷太子中庻子出為陽平太守自洛奔琨琨以為輔國将軍魏郡太守琨将討石勒以演領勇士千人行北中郎将兖州刺史鎮廪邱演斬王桑走趙固得衆七千人為石勒所攻演距戰勒退元帝拜為都督後将軍假節後為石虎所圍求救於邵續叚鴦鴦騎救之石虎走随鴦屯厭次被害弟允為琨領兵路逢烏桓賊戰沒允弟挹初為太傅東海王越掾與琨俱被害挹弟啟啟弟述與琨子羣俱在末波中後並入石虎啟為虎尚書僕射後歸國穆帝拜為前将軍加給事中永和九年随中軍将軍殷浩北伐為姚襄所敗啟戰沒述為石虎侍中随啟歸國拜驃騎将軍祖逖字士稚范陽遒人也世吏二千石為北州舊姓父武晋王掾上谷太守逖少孤兄弟六人兄該納等並開爽有才幹逖姓豁蕩不修儀檢年十四五猶未知書諸兄每憂之然輕財好俠慷慨有節尚每至田舎輙稱兄意散榖帛以賑貧乏以是鄉黨親族重之後乃博覽書記該渉古今往来京師見者謂逖有賛世才具僑居陽平年二十四陽平辟察孝亷司𨽻再辟舉秀才皆不行與司空劉琨俱為司州主簿情好綢繆共被同寝中夜聞荒鷄鳴蹴琨覺曰此非惡聲也因起舞逖琨并有英氣每語世事或中宵起坐相謂曰若四海鼎沸豪傑並起吾與足下當相避於中原耳辟齊王冏大司馬掾長沙王乂驃騎祭酒轉主簿累遷太子中舎人豫章王従事中郎従恵帝北伐王師敗績於蕩隂遂退還洛大駕西幸長安關東諸侯范陽王虓髙密王畧平昌公模等競召之皆不就東海王越以逖為典兵參軍濟隂太守母喪不之官及京師大亂逖帥親黨數百家避地淮泗以所乗車馬載同行老疾躬自徒歩藥物衣糧與衆共之又多權畧是以少長咸宗之推逖為行主逹泗口元帝逆用為徐州刺史尋徵為軍諮祭酒居丹徒之京口逖以社稷傾覆常懐振復之志賔客義徒皆暴桀勇士逖遇之如子弟時揚土大饑此軰多為盜竊攻剽富室逖撫慰問之曰比復南塘一出不或為吏所繩逖輙擁護救解之談者以此少逖然逖自若也時帝方拓定江南未遑北伐逖進説曰晋室之亂非上無道而下怨叛也由藩王争權自相誅滅遂使戎狄乗隙毒流中原今遺黎既被殘酷人有奮撃之志大王誠能發威命将使若逖者為之統主則郡國豪傑必應風嚮赴沉溺之士欣於来蘇庻幾國恥可雪願大王圖之帝乃以逖為奮威将軍豫州刺史給千人廪布三千疋不給鎧杖使自招募仍将本流徙部曲百餘家渡江中流撃楫而誓曰祖逖不能清中原而復濟者有如大江辭色壮烈衆皆慨歎屯于淮隂起冶鑄兵器得二千餘人而後進初北中郎将劉演距于石勒也流人塢主張平樊雅等在譙演署平為豫州刺史雅為譙郡太守又有董瞻于武謝浮等十餘部衆各數百皆統屬平逖誘浮使取平浮譎與平㑹遂斬以獻逖帝嘉逖勲使運糧給之而道逺不至軍中大饑進據太邱樊雅遣衆夜襲逖遂入壘㧞㦸大呼直趣逖幕軍士大亂逖命左右距之督護董昭與賊戰走之逖率衆追討而張平餘衆助雅攻逖蓬陂塢主陳川自號寧朔将軍陳留太守逖遣使求救於川川遣将李頭率衆援之逖遂尅譙城初樊雅之據譙也逖以力弱求助於南中郎将王含含遣桓宣領兵助逖逖既尅譙宣等乃去石虎聞而引衆圍譙含又遣宣救逖石虎聞宣至而退宣遂留助逖討諸屯塢未附者李頭之討樊雅也力戰有勲逖時獲雅駿馬頭甚欲之而不敢言逖知其意遂與之頭感逖恩遇每歎曰若得此人為主吾死無恨川聞而怒遂殺頭頭親黨馮寵率其屬四百人歸於逖川益怒遣将魏碩掠豫州諸郡大獲子女車馬逖遣将軍衛䇿邀撃於谷水盡獲所掠者皆令歸本軍無私焉川大懼遂以衆附石勒逖率衆伐川石虎領兵五萬救川逖設奇以撃之虎大敗収兵掠豫州徙陳川歸襄國留桃豹等守川故城住西臺逖遣将韓潛等鎮東臺同一大城賊従南門出入放牧逖軍開東門相守四旬逖以布嚢盛土如米状使千餘人運上臺又令數人擔米偽為疲極而息於道賊果逐之皆棄擔而走賊既獲米謂逖士衆豐飽而胡戍饑乆益懼無復膽氣石勒将劉夜堂以驢千頭運糧以饋桃豹逖遣韓潛馮鐵等追撃於汴水盡獲之桃豹宵遁退據東燕城逖使潛進屯封邱以逼之馮鐵據二臺逖據雍邱數遣軍要截石勒勒屯戍漸蹙候騎甞獲濮陽人逖厚待遣歸咸感逖恩德率鄉里五百家降逖勒又遣精騎萬人距逖復為逖所破勒鎮戍歸附者甚多時趙固上官已李矩郭黙等各以詐力相攻撃逖馳使和解之示以禍福遂受逖節度逖愛人下士雖踈交賤𨽻皆恩禮遇之由是黄河以南盡為晋土河上堡固先有任子在胡者皆聽兩屬時遣游軍偽抄之明其未附諸塢主感戴胡中有異謀輙密以聞前後尅獲皆由此也其有微功賞不踰日躬自儉約勸督農桑尅已務施不畜資産子弟耕耘負擔樵薪又収𦵏枯骨為之祭醊百姓感悦甞致酒大㑹耆老中坐流涕曰吾等老矣更得父母死将何恨乃歌曰幸哉遺黎免俘虜三辰既朗遇慈父元酒忘勞甘瓠脯何以詠恩歌且舞其得人心如此故劉琨與親故書盛賛逖威徳詔進逖為鎮西将軍石勒不敢闚兵河南使成臯縣修逖母墓因與逖書求通使交市逖不報書而聽互市収利十倍於是公私豐贍士馬日滋方當推鋒越河掃清冀朔㑹朝廷将遣戴若思為都督逖以若思吳人雖有才望無宏致逺識且已翦荆棘収河南地而若思雍容一旦来統之意甚怏怏且聞王敦與劉隗等構隙慮有内難大功不遂感激發病乃置妻孥汝南大木山下時中原士庻咸謂逖當進據虎牢而反置家險阸或諫之不聽逖雖内懐憂憤而圖進取不輟營繕虎牢城城北臨黄河西接成臯四望甚逺逖恐南無堅壘必為賊所襲乃使従子汝南太守濟率汝陽太守張敞新蔡内史周閎率衆築壘未成而逖病甚先是華譚庾闡問術人戴洋洋曰祖豫州九月當死初有妖星見于豫州之分歴陽陳訓又謂人曰今年西北大将當死逖亦見星曰為我矣方平河北而天欲殺我此乃不祐國也俄卒于雍邱年五十六豫州士女若喪考妣譙梁百姓為之立祠冊贈車騎将軍王敦乆懐逆亂畏逖不敢𤼵至是始得肆意焉尋以逖弟約代領其衆約别有𫝊逖兄納字士言最有操行能清言文義可觀性至孝少孤貧常自炊爨以飬母平北将軍王敦聞之遺其一婢辟為従事中郎有戯之曰奴價倍婢納曰百里奚何必輕於五羖皮邪轉尚書三公郎累遷太子中庻子歴官多所駮正有補於時齊王冏建義趙王倫収冏弟北海王實及前黄門郎𢎞農董祚弟艾與冏俱起皆将害焉納上䟽救之並見宥後為中護軍太子詹事封晋昌公以洛下将亂乃避地東南元帝作相引為軍諮祭酒納好奕碁王𨼆謂之曰禹惜寸隂不聞數碁對曰我以忘憂耳𨼆曰盖聞古人遭逢則以功達其道若其不遇則以言逹其道古必有之今亦宜然當今晋未有書而天下大亂舊事蕩滅君少長五都遊宦四方華裔成敗皆當聞見何不記述而有裁成况國史明乎得失之跡俱取散愁此可兼濟何必圍碁然後忘憂也納深然之語在𨼆傳納於是言之於帝曰自古小國猶有史官况於大府安可不置因舉𨼆清純亮直學思沉敏五經羣史多所綜悉且好學不倦従善如流若使修著一代之典褒貶與奪誠一時之儁也帝以問記室參軍鍾雅雅曰納所舉雖有史才而今未能立也事遂停然史官之立自納始也初弟約與逖同母偏相親愛納與約異母頗有不平乃密以啟帝稱約懐陵上之性抑而使之可也今顯侍左右假其權勢将為亂階人謂納與約異母忌其寵貴乃露其表以示約約憎納如讐朝廷因此棄納納既閒居但清談披文史而已及約為逆朝野歎納有鑒裁焉温嶠以納州里父黨敬而拜之嶠既為時用盛稱納有名理除光禄大夫納甞問梅陶君鄉里立月旦評何如陶曰善褒惡貶則佳法也納曰未益時王𨼆在坐因曰尚書稱三載考績三考黜陟幽明何得一月便行褒貶陶曰此官法也月旦私法也𨼆曰易云積善之家必有餘慶積不善之家必有餘殃稱家者豈不是官必湏積乆善惡乃著公私何異古人有言貞良而亡先人之殃酷烈而存先人之勲累世乃著豈但一月若必月旦則顔回食埃不免貪汚盗跖引少則為清亷朝種暮穫善惡未定矣時梅陶及鍾雅數説餘事納輙困之因曰君汝潁之士利如錐我幽冀之士鈍如槌持我鈍槌捶君利錐皆當摧矣陶雅並稱有神錐不可得槌納曰假有神錐必有神槌雅無以對後卒於家邵續字嗣祖魏郡安陽人也父乗散騎侍郎續朴素有志烈博覽經史善談理義妙解天文初為成都王頴參軍頴将討長沙王乂續諫曰兄弟如左右手今眀公當天下之敵而欲去一手乎續切惑之頴不納後為茍晞參軍除沁水令時天下漸亂續去縣還家紏合亡命得數百人王浚假續綏集将軍樂陵太守屯厭次以續子乂為督護續綏懐流散多歸附之石勒既破浚遣乂還招續續以孤危無援權附於勒勒亦以乂為督護既而叚匹磾在薊遣書要續俱歸元帝續従之其下諫曰今棄勒歸匹磾任子危矣續垂泣曰我出身為國豈得顧子而為叛臣哉遂絶於勒勒乃害乂續懼勒攻先求救於匹磾匹磾遣弟文鴦救續文鴦未至勒已率八千騎圍續勒素畏鮮卑及聞文鴦至乃棄攻具東走續與文鴦追勒至安陵不及虜勒所署官并驅三千餘家又遣騎入抄勒北邉畧常山亦二千家而還匹磾既殺劉琨夷晋多怨叛遂率其徒依續勒南和令趙領等率廣川渤海千餘家背勒歸續而帝以續為平原樂安太守右将軍冀州刺史進平北将軍假節封祝阿子續遣兄子武邑内史存與文鴦率匹磾衆就食平原為石虎所破續先與曹嶷亟相侵掠嶷因存等敗乃破續屯田又抄其户口續首尾相救疲於奔命太興初續遣存及文鴦屯濟南黄巾固因以逼嶷嶷懼求和俄而匹磾率衆攻叚末杯石勒知續孤危遣石虎乗虚圍續石虎騎至城下掠其居人續率衆出救虎伏騎斷其後遂為虎所獲使續降其城續呼其兄子竺等曰吾志雪國難以報所受不幸至此汝等努力自勉便奉匹磾為主勿有二心時帝既聞續沒又知其部曲文武已共推續息緝為營主詔即以續本位授緝使總率所統石虎使送續於勒勒使徐光讓之曰國家應符撥亂八表宅心遺晋怖威逺竄揚越而續蟻封海阿䟦扈王命以夷狄不足為君邪何無上之甚也國有常刑於分甘乎續對曰晋末饑亂奔控無所保合鄉宗庻全老㓜屬大王龍飛之始委命納質精誠無感不䝉慈恕言歸遺晋仍荷寵授誓盡忠節實無二心且受彼厚榮而復二三其趣者恐亦不容于明朝矣周文生于東夷大禹出自西羌帝王之興盖惟天命所屬德之所招當何常邪伏惟大王聖武自天道隆虞夏凡在含生莫不延首神化耻隔皇風而况囚乎使去真即偽不得早叩天門者大王負囚囚不負大王也釁鼔之刑囚之常分但恨天實為之謂之何哉勒曰其言慨至孤愧之多矣夫忠于其君者乃吾所求也命張賔延之于舘厚撫之尋以為従事中郎令自後諸尅敵擒俊皆送之不得輙害冀獲如續之流石虎之攻續也朝廷有王敦之逼不遑救䘏續既為勒所執身灌園鬻菜以供衣食勒屢遣察之歎曰此真髙人也不如此安足貴乎嘉其清苦數賜榖帛每臨朝嗟嘆以勵羣臣續被獲之後存及竺緝等與匹磾嬰城距宼而帝又假存揚武将軍武邑太守勒屢遣虎攻之戰守疲苦不能自立乆之匹磾及其弟文鴦與竺緝等悉見獲惟存得潰圍南奔在道為賊所殺續竟亦遇害李矩字世廽平陽人也童齓時與羣兒聚戱便為其率計畫指授有成人之量及長為吏送故縣令於長安征西将軍梁王彤以為牙門伐氐齊萬年有殊功封東明亭侯還為本郡督䕶太守宋胄欲以所親吴畿代之矩謝病去畿恐矩復還隂使人刺矩㑹有人救之故得免屬劉淵攻平陽百姓奔走矩素為鄉人所愛乃推為塢主東屯滎陽復移新鄭矩勇毅多權畧志在立功東海王越以為汝隂太守永嘉初使矩與汝南太守袁孚率衆修洛陽千金塢以利運漕及洛陽不守太尉荀藩奔陽城衛将軍華薈奔成臯時大饑賊帥侯都等每略人而食之藩薈部曲多為所啖矩討都等滅之乃營護藩薈各為立屋宇輸榖以給之及藩承制建行䑓假矩滎陽太守矩招懐離散而逺近多附之石勒親率大衆襲矩矩遣老弱入山令所在散牛馬因設伏以待之賊爭取牛馬伏發齊呼聲動山谷遂大破之斬獲甚衆勒乃退藩表元帝加矩冠軍将軍軺車幢盖進封陽武縣侯領河東平陽太守時饑饉相仍又多疫癘矩垂心撫䘏百姓賴焉㑹長安羣賊東下所在多虜掠矩遣部将撃破之盡得賊所掠婦女千餘人諸将以非矩所部欲遂留之矩曰俱是國家臣妾焉有彼此乃一時遣之時劉琨所假河内太守郭黙為劉淵所逼求歸矩矩将使其甥郭誦迎致之而不敢進㑹劉琨遣參軍張肇率鮮卑范勝等五百餘騎往長安屬黙被圍道路不通将還依邵續行至矩營矩謂肇曰黙是劉公所授公家之事知無不為屠各舊畏鮮卑遂邀肇為聲援肇許之賊望見鮮卑不戰而走誦潛遣輕舟濟河使勇士夜襲懐城掩賊留營又大破之黙遂率其屬歸矩後劉聰遣其従弟暢歩騎三萬討矩屯于韓王故壘相去七里遣使招矩時暢卒至矩未暇為備遣人奉牛馬詐降于暢潛匿精勇見其老弱暢不以為虞大饗渠帥人皆醉飽矩謀夜襲之兵士以賊衆皆有懼色矩令郭誦禱鄭子産祠曰君昔相鄭惡鳥不鳴凶胡臭羯何得過庭使巫揚言東里有教當遣神兵相助将士聞之皆踴躍矩乃使誦及督䕶楊璋等選勇敢千人夜襲暢營獲鎧馬甚多斬首數千級暢僅以身免先是郭黙聞矩被攻遣弟芝率衆援之既而聞破暢芝復馳来赴矩矩乃與芝馬五百匹分軍為三道夜追賊復大獲而旋先是聰使其将趙固鎮洛陽長史周振與固不協密陳固罪矩之破暢也帳中得聰書勅暢平矩訖過洛陽収固斬之便以振代固矩送書以示固固即斬振父子遂率千騎来降矩還令守洛陽後數日聰遣其太子粲率劉雅生等歩騎十萬屯孟津北岸分遣雅生攻趙固於洛固奔陽城山遣弟告急矩遣郭誦屯洛口以救之誦使将張皮簡精卒千人夜渡河粲候者告有兵至粲恃其衆不以為虞既而誦等奄至十道俱攻粲衆驚擾一時奔潰殺傷太半因據其營獲其軍資器械不可勝數及旦粲見皮等人少更與雅生悉餘衆攻之苦戰二十餘日不能下矩進救之使壮士三千汎舟迎皮賊臨河列陣作長鈎以鈎舩連戰數日不得渡而矩夜遣部将格增潛濟入皮壘與皮選精騎千餘而殺所獲牛馬焚燒器械夜突圍而出奔虎牢聰追之不及而退聰因憤恚發病而死帝嘉其功拜矩都督河南三郡軍事安西将軍滎陽太守封修武縣侯及劉粲嗣位昬虐日甚其将靳凖乃起兵殺粲并其宗族發聰冢斬其尸遣使歸矩稱劉淵屠各小醜因大晋事故之際作亂幽并矯稱天命至令二帝幽沒虜庭輙率衆扶侍梓宮因請上聞矩馳表于帝帝遣太常韓允等奉迎梓宮未至而凖已為石勒劉曜所沒矩以衆少不足立功每慷慨憤歎及帝踐阼以為都督司州諸軍事司州刺史改封平陽縣侯将軍如故時𢎞農太守尹安振威将軍宋始等四軍並屯洛陽各相疑阻莫有固志矩黙各遣千騎至洛以鎮之安等乃同謀告石勒勒遣石生率騎五千至洛陽矩黙軍皆退還俄而四将復背勒遣使乞迎黙又遣歩卒五百人入洛石生以四将相謀不能自安乃虜宋始一軍渡河而南百姓相率歸矩於是洛中遂空矩乃表郭誦為揚武将軍陽翟令阻水築壘且耕且守為滅賊之計屬趙固死石生遣騎襲誦誦多計畧賊至輙設伏破之虜掠無所得生怒又自率四千餘騎暴掠諸縣因攻誦壘接戰湏㬰退軍堮坂誦率勁勇五百追及生於磐脂故亭又大破之矩以誦功多表加赤幢曲盖封吉陽亭侯郭黙欲侵祖約矩禁之不可遂為約所破石勒又遣其飬子忩襲黙黙懼後患未已将降於劉曜遣参軍鄭雄詣矩謀之矩拒而不許後勒遣其将石良率精兵五千襲矩矩逆撃不利郭誦弟元復為賊所執賊遣元以書説矩曰去年東平曹嶷西賔猗盧矩如牛角何不歸命矩以示誦誦曰昔王陵母在賊猶不改意弟當何論勒復遺誦麈尾馬鞭以示殷勤誦不答勒将石生屯洛陽大掠河南矩黙大饑黙因復説矩降曜矩既為石良所破遂従黙計遣使於曜曜遣従弟岳軍于河隂欲與矩謀攻石生勒使将圍岳岳閉門不敢出黙後為石忩所敗自密南奔建康矩聞之大怒遣其将郭誦等齎書與黙又勅誦曰汝識脣亡之談不迎接郭黙皆由於卿臨難逃走其必留之誦追及襄城黙自知負矩棄妻子而遁誦擁其餘衆而歸矩待其妻子如初劉岳以其外救不至降于石虎矩所統将士有隂謀欲歸勒者矩知之而不能討乃率衆南走将歸朝廷衆皆道亡唯郭誦及參軍郭方功曹張景主簿荀逺将軍騫韜江覇梁志司馬尚季𢎞李環叚秀等百餘人棄家送距至於魯陽縣矩墜馬卒𦵏襄陽之峴山叚匹磾東部鮮卑人也種類勁健世為大人父務勿塵遣軍助東海王越有功王浚表為親晋王封遼西公嫁女與務勿塵以結隣援懐帝即位以務勿塵為大單于匹磾為左賢王率衆助國征討假撫軍大将軍務勿塵死弟渉復辰以務勿塵子疾陸眷襲號劉曜逼洛陽王浚遣督䕶王昌等率疾陸眷及弟文鴦従弟末杯攻石勒於襄國勒敗還壘末杯追入壘門為勒所獲勒質末杯遣使求和於疾陸眷疾陸眷将許之文鴦諫曰受命討勒寧以末杯一人故縦成禽之宼既失浚意且有後憂必不可許疾陸眷不聽以鎧馬二百五十匹金銀各一簏贖末杯勒歸之又厚以金寳綵絹報疾陸眷疾陸眷令文鴦與石虎同盟約為兄弟遂引騎還昌等不能獨守亦還建武初匹磾推劉琨為盟主討石勒并檄渉復辰疾陸眷末杯等三面俱集襄國琨匹磾進屯固安以俟衆軍勒懼遣閒使厚賂末杯然末杯思報其舊恩且因匹磾在外欲襲奪其國乃間匹磾於渉復辰疾陸眷曰以父兄而従子弟邪雖一旦有功匹磾獨収之矣渉復辰等以為然引軍而還匹磾亦止㑹疾陸眷病死匹磾自薊奔喪至右北平末杯宣言匹磾将簒出軍擊敗之末杯遂害渉復辰及其子弟黨與二百餘人自立為單于及王浚敗匹磾領幽州刺史劉琨自并州往依之復與匹磾結盟俱討石勒匹磾復為末杯所敗士衆離散懼琨圖已遂害之於是晋人離散矣匹磾不能自固北依邵續末杯又攻敗之匹磾被創謂續曰吾夷狄慕義以至破家君若不忘舊要與吾追討君之恵也續曰賴公威徳續得效節今公有難豈得不俱遂并力追末杯斬獲畧盡又令文鴦北討末杯弟於薊城及還去城八十里聞續已沒衆懼而散復為石虎所遮文鴦以親兵數百人力戰破之始得入城虎復抄城下文鴦登城臨見欲出撃之匹磾不許文鴦曰我以勇聞故百姓杖我見人被畧而不救非丈夫也令衆失望誰復為我致死乎遂将壮士數十騎出戰殺胡甚多遇馬乏伏不能起虎呼曰大兄與我俱是戎狄乆望共天下不違願今日相見何故復戰請釋杖文鴦罵曰汝為寇虐乆應合死吾兄不用吾計故令汝得至此吾寧死不為汝禽遂下馬苦戰槊折用刀力戰不已石虎軍四面解馬羅披自鄣前捉文鴦文鴦戰自辰至申力極而後被執城内大懼匹磾欲單騎歸朝續弟樂安内史洎勒兵不許洎復欲執臺使王英送於石虎匹磾正色責之曰卿不能遵兄之志逼吾不得歸朝亦已甚矣復欲執天子使者我雖胡夷所未聞也因謂英曰匹磾世受重恩不忘忠孝今日事逼欲歸罪朝廷而見逼廹忠欵不遂若得假息未死之日心不忘本遂渡黄河南匹磾著朝服持節賔従出見石虎曰我受國恩志在滅汝不幸吾國自亂以至於此既不能死又不能為汝敬也勒及石虎素與匹磾約為兄弟故虎起而拜之及到襄國又不為勒禮常著朝服持晋節經年國中謀推匹磾為主事露被害文鴦亦遇酖而死惟末杯在焉及死弟牙立牙死其後従祖就陸眷之孫遼立自務勿塵已後值晋喪亂自稱位號據有遼西之地而臣御晋人其地西盡幽州東界遼水然所統胡晋可三萬餘家控弦可四五萬騎而與石虎逓相侵掠連兵不息竟為虎所破徙其遺黎數萬家於司雍之地其子蘭復聚兵與石虎為患乆之及石氏之亡末杯之子勤鳩集胡羯得萬餘人保枉人山自稱趙王附于慕容儁俄為冉閔所敗徙于繹幕僭即尊號儁遣慕容恪撃之勤懼而降魏浚東郡東阿人也寓居關中初為雍州小史河間王顒敗亂之際以為武威将軍後為度支校尉有幹用永嘉末與流人數百家東保河隂之硤石時京邑荒歉浚刼掠得榖麥獻之懐帝帝以為揚威将軍平陽太守度支如故以亂不之官及洛陽陥屯于洛北石梁塢撫飬遺衆漸修軍器其附賊者皆先解喻説大晋運數靈長行已建立歸之者甚衆其有恃逺不従命者遣将討之服従而已不加侵暴於是逺近感悦襁負至者漸衆劉琨承制假浚河南尹時太尉荀藩建行臺在密縣浚詣藩諮謀軍事藩甚悦要李矩同會矩将夜赴之官屬諫以浚不可信不宜夜往矩曰忠臣同心将何疑乎及㑹客主盡懽浚因與矩相結而去劉曜忌浚得衆率衆軍圍之劉演郭黙遣軍来救曜分兵逆於河北及伏兵深𨼆䖏以邀演黙軍大破之盡虜演等騎浚夜遁走為曜所得遂死之追贈平西将軍族子該領其衆該一名亥本僑居京兆隂磐河間王顒之伐趙王倫以該為将兵都尉及劉曜攻洛陽随浚赴難先領兵屯金墉城故得無他曜引去餘衆依之時杜預子尹為𢎞農太守屯宜陽界一泉塢數為諸賊所抄掠尹要該共距之該遣其将馬瞻将三百人赴尹瞻知其無備夜襲尹殺之迎該據塢塢人震懼並服従之乃與李矩郭黙相結以距賊荀藩即以該為武威将軍統城西雍凉人使討劉曜元帝承制加冠軍将軍河東太守督䕶河東河南平陽三郡曜甞攻李矩該破之及矩将迎郭黙該遣軍助之又與河南尹任愔相連結後漸饑弊曜寇日至欲率衆南徙衆不従該遂單騎走至南陽帝又以為前鋒都督平北将軍雍州刺史馬瞻率該餘衆降曜曜徴發既苦瞻又驕虐部曲遣使呼該該密往赴之其衆殺瞻而納該該遷於新野率衆助周訪討平杜曾詔以該為順陽太守王敦之反也梁州刺史甘卓不従欲觀該去就試以敦㫖動之該曰我本去賊惟忠於國今王公舉兵向天子非吾所宜與也遂距而不應及蘇峻反率衆救臺軍次石頭受陶侃節度峻未平該病篤還屯卒於道𦵏于武陵従子雄統其衆郭黙河内懐人也少微賤以壮勇事太守裴整為督将永嘉之亂黙率遺衆自為塢主以漁舟抄東歸行旅積年遂致巨富流人依附者漸衆撫循将士甚得其歡心黙婦兄同郡陸嘉取官米數石餉妺黙以為違制将殺嘉嘉懼奔石勒黙乃自射殺婦以眀無私遣使謁劉琨琨加黙河内太守劉淵遣従子曜討黙曜列三屯圍之欲使餓死黙送妻子為質并請糴焉糴畢設守曜怒沉黙妻子于河而攻之黙遣弟芝求救於劉琨琨知黙狡猾留之而緩其救黙更遣人告急㑹芝出城浴馬使彊與歸黙乃遣芝質於石勒勒以黙多詐封黙書與劉曜黙使人伺得勒書便突圍投李矩後與矩并力距劉石事見矩傳太興初除潁川太守黙與石忩戰敗矩轉蹙弱黙深憂懼解印授其參軍殷嶠謂之曰李使君遇吾甚厚今遂棄去無顔謝之三日可白吾去也乃奔陽翟矩聞之大怒遣其将郭誦追黙至襄城及之黙棄家人單馬馳去黙至京都眀帝授征虜将軍劉遐卒以黙為北中郎将監淮北軍事假節遐故部曲李龍等謀反詔黙與右衛将軍趙允討平之朝廷将徵蘇峻懼其為亂召黙拜後将軍領屯騎校尉初戰有功及六軍敗續南奔郗鑒議於曲阿北大業里作壘以分賊勢使黙守之峻遣韓晃等攻黙甚急壘中頗乏水黙懼分人馬出外乃潛従南門盪出留人堅守㑹峻死圍解徵為右軍将軍黙樂為邉将不願宿衛及赴召謂平南将軍劉允曰我能禦胡而不見用右軍主禁兵若彊塲有虞被使出征方始配給将卒無素恩信不著以此臨敵少有不敗矣時當為官擇才若人臣自擇官安得不亂乎允曰所論事雖然非小人所及也當發求資於允時允被詔免官不即歸罪方自申理而驕侈更甚逺近怪之初黙之被徵距蘇峻也下次尋陽見允允參佐張滿等輕黙倮露視之黙常切齒至是允臘日餉黙酒一器肫一頭黙對信投之水中忿憤益甚又僑人盖肫先畧取祖煥所殺孔煒女為妻煒家求之張滿等使還其家肫不與因與允滿有隙至是肫謂黙曰劉江州不受免密有異圖與長史司馬張滿荀楷等日夜計謀反逆已形惟忌郭侯一人云當先除郭侯而後起事禍将至矣且深備之黙既懐恨便率其徒候旦門開襲允允将吏欲距黙黙呴之曰我被詔有所討動者誅及三族遂入至内寝允尚與妾卧黙牽下斬之出取允僚佐張滿荀楷等誣以大逆傳允首于京師詐作詔書宣視内外掠允女及諸妾并金寳還船初云下都俄而遂停允故府招桓宣王愆期愆期懼逼勸黙為平南江州黙従之愆期因逃廬山桓宣固守不應司徒王導懼不可制乃大赦天下梟允首於大航以黙為西中郎将豫州刺史武昌太守鄧嶽馳白太尉陶侃侃聞之投袂起曰此必詐也即日率衆討黙上䟽陳黙罪惡導聞之乃収允首詔庾亮助侃討黙黙欲南據豫章而侃已至城下築土山以臨之諸軍大集圍之數重侃惜黙驍勇欲活之遣郭誦見黙黙許降而黙将張丑宋侯等恐為侃所殺故致進退不時得出攻之轉急宋侯遂縳黙求降即斬于軍門同黨死者四十人傳首京師王導字茂𢎞光禄大夫覽之孫也父裁鎮軍司馬少有風鑒識量清逺年十四陳留髙士張公見而奇之謂其従兄敦曰此兒容貌志氣将相之器也初襲祖爵即邱子司空劉實引為東閣祭酒遷祕書郎太子舎人尚書郎並不行後參東海王越軍事時元帝為琅邪王與導素相親善導知天下已亂遂傾心推奉潛有興復之志帝亦雅相器重契同友執帝之在洛陽也導每勸令之國㑹帝出鎮下邳請導為安東司馬軍謀密䇿知無不為及徙鎮建康吳人不附居月餘士庻莫有至者導患之㑹敦来朝導謂之曰琅邪王仁德雖厚而名論猶輕兄威風已振宜有以匡濟者㑹三月上已帝親觀褉乘肩輿具威儀敦導及諸名勝皆騎従吴人紀瞻顧榮皆江南之望竊覘之見其如此咸驚懼乃相率拜於道左導因進計曰古之王者莫不賔禮故老存問風俗虚已傾心以招俊乂况天下喪亂九州分裂大業草創急於得人者乎顧榮賀循此土之望未若引之以結人心二子既至則無不来矣帝乃使導躬造循榮二人皆應命而至由是吳㑹風靡百姓歸心自此之後漸相崇奉君臣之禮始定俄而洛亰傾覆中州士女避亂江左者十六七導勸帝収其賢人君子與之圖事時荆揚晏安户口殷實導為政務在清静每勸帝尅已勵節匡主寧邦於是尤見委杖情好日隆朝野傾心號為仲父帝甞従容謂導曰卿吾之蕭何也對曰大王方立命世之勲一匡九合管仲樂毅於是乎在豈區區國臣所以擬議願深𢎞神慮廣擇良能顧榮賀循紀瞻周玘皆南土之秀願盡優禮則天下安矣帝納焉永嘉末遷丹陽太守加輔國将軍時官制混雜臨郡者不問賢愚豪賤皆加重號輙有鼓盖導上牋以為紊亂彛典謹送鼓盖加崇之物請従導始帝下令嘉其冲退拜寧逺将軍尋加振威将軍愍帝即位徵吏部郎不拜晋國既建以導為丞相軍諮祭酒桓彛初過江見朝廷㣲弱謂周顗曰我以中州多故来此欲求全活而寡弱如此将何以濟憂懼不樂及往見導極談世事謂顗曰向見管夷吾無復憂矣過江人士每至暇日相要出新亭飲宴周顗中坐而嘆曰風景不殊舉目有江河之異皆相視流涕惟導愀然變色曰當共勠力王室尅復神州何至作楚囚對泣邪衆収淚而謝之俄拜右将軍揚州刺史監江南諸軍事遷驃騎将軍加散騎常侍都督中外諸軍事領中書監録尚書事假節刺史如故導以敦統六州固辭中外都督後坐事除節于時軍旅不息學校未修導上書請建立庠序興復道教擇朝臣之子弟並入于學選明博修禮之士而為之師以為中興風化之本帝甚納之及帝登尊號百官陪列命導升御牀共坐導固辭至于三四曰若太陽下同萬物蒼生何由仰照帝乃止進驃騎大将軍儀同三司以討華軼功封武岡侯進位侍中司空假節録尚書領中書監㑹太山太守徐龕反帝訪可以鎮撫河南者導舉太子左衛率羊鑒既而鑒敗抵罪導上䟽乞自貶黜詔不許尋代賀循領太子太傅時中興草創未置史官導始啟立於是典籍頗具時孝懐太子為胡所害始奉諱有司奏天子三朝舉哀羣臣一哭而已導以為皇太子副貳宸極普天有情宜同三朝之哀従之及劉隗用事導漸見踈逺任真推分澹如也有識咸稱導善䖏興廢焉王敦之反也劉隗勸帝悉誅王氏論者為之寒心導率羣従昆弟子姪二十餘人每旦詣臺待罪帝以導忠節有素特還朝服召見之導稽首謝曰逆臣賊子何世無之豈意今者近出臣族帝跣而執之曰茂𢎞方託百里之命於卿是何言邪乃詔曰導以大義滅親可以吾為安東時節假之及敦得志加導守尚書令初西都覆沒海内思主羣臣及四方並勸進於帝時王氏彊盛有専天下之心敦憚帝賢明欲更議所立導固争乃止及此役也敦謂導曰不従吾言㡬致覆族導猶執正義敦無以能奪自漢魏以来賜諡多由封爵雖位通德重先無爵者例不加諡導乃上䟽言武官有爵必諡卿校常伯無爵不諡甚失制度之本意也従之自後公卿無爵而諡導所議也初帝愛琅邪王裒将有奪嫡之議以問導導曰夫立子以長且紹又賢不宜改革帝猶疑之導日夕陳諫故太子卒定及眀帝即位導受遺詔輔政解揚州遷司徒一依陳羣輔魏故事王敦又舉兵内向時敦始寝疾導便率子弟發哀衆聞謂敦死咸有奮志及帝伐敦假導節都督諸軍領揚州刺史敦平封始興郡公邑三千户賜絹九千疋進位太保司徒如故劔履上殿入朝不趍讃拜不名固讓帝崩導復與庾亮等同受遺詔共輔㓜主是為成帝加羽葆鼔吹班劔二十人及石勒侵阜陵詔加導大司馬假黄鉞出討之軍次江寧帝親餞于郊俄而賊退解大司馬庾亮将徵蘇峻訪之於導導曰峻猜險必不奉詔且山藪藏疾宜包容之固争不従亮遂召峻既而難作六軍敗績導入宮侍帝峻以導德望不敢加害猶以本官居已之右峻又逼乗輿幸石頭導争之不得峻日来帝前肆醜言導深懼有不測之禍時路永匡術賈寧並説峻令殺導盡誅大臣更樹腹心峻敬導不納故永等貳於峻導使參軍袁躭潛諷誘永等謀奉帝出奔義軍而峻衛禦甚嚴事遂不果導乃携二子随永奔于白石及賊平宗廟宮室並為灰燼温嶠議遷都豫章三吴之豪請都㑹稽二論紛紜未有所適導曰建康古之金陵舊為帝里又孫仲謀劉元德俱言王者之宅古之帝王不必以豐儉移都茍𢎞衛文大帛之冠則無往不可若不績其麻則樂土為虚矣且北寇游䰟伺我之隙一旦示弱竄於蠻越求之望實懼非良計今特宜鎮之以静羣情自安由是嶠等議並不行導善於因事雖無日用之益而嵗計有餘時帑藏空竭庫中唯有綀數千端鬻之不售而國用不給導患之乃與朝賢俱制綀布單衣於是士人翕然競服之綀遂踊貴乃令主者出賣端至一金其為時所慕如此六年冬烝詔歸胙於導曰無下拜導辭疾不敢當初帝㓜冲見導每拜又常與導手詔則云惶恐言中書作詔則曰敬問於是以為定制自後元正導入帝猶為之興焉時大旱導上䟽遜位優詔不許導固讓詔累逼之然後視事導簡素寡欲倉無儲榖衣不重帛帝知之給布萬疋以供私費導有羸疾不堪朝㑹帝幸其府縦酒作樂後令輿車入殿其見敬如此石虎掠騎至歴陽導請出討之加大司馬假黄鉞中外諸軍事置左右長史司馬給布萬疋俄而賊退解大司馬復轉中外大都督進位太傅又拜丞相依漢制罷司徒官以并之是嵗妻曹氏卒贈金章紫綬初曹氏性妬導甚憚之乃密營别舘以䖏衆妾曹氏知而将往焉導恐妾被辱遽令命駕猶恐遲之以所執麈尾柄驅牛而進司徒蔡謨聞之戱導曰朝廷欲加公九錫導不之覺但謙退而已謨曰不聞餘物唯有短轅犢車長柄麈尾導大怒謂人曰吾往與羣賢共遊洛中何曾聞有蔡克兒也于時庾亮以望重地逼出鎮於外南蠻校尉陶稱間説亮當舉兵内攻或勸導密為之防導曰吾與元䂓休戚是同悠悠之談宜絶智者之口則如君言元規若来吾便角巾還第復何懼哉又與稱書以為庾公帝之元舅宜善事之於是讒間遂絶時亮雖居外鎮而執朝廷之權既據上流握彊兵趣向者多歸之導内不能平常遇西風塵起舉扇自蔽徐曰元規塵汚人自漢魏以来羣臣不拜山陵導以元帝睠同布衣匪唯君臣而已每一崇進皆就拜不勝哀慼由是詔百官拜陵自導始也咸和五年薨時年六十四帝舉哀於朝堂三日遣大鴻臚持節監護喪事賵襚之禮一依漢愽陸侯及安平獻王故事及𦵏給九游輼輬車黄屋左纛前後羽葆鼓吹虎賁班劔百人中興名臣莫與為比冊書褒顯諡曰文獻導二弟頴敞少與導俱知名時人以頴方温太真以敞比鄧伯道並早卒導六子悦恬洽協劭薈悦字長豫弱冠有髙名事親色飬導甚愛之導甞共悦奕碁争道導笑曰相與有瓜葛那得為爾邪導性儉節帳下甘果爛敗令棄之云勿使大郎知悦少侍講東宮歴吴王友中書侍郎先導卒諡曰貞世子先是導夢人以百萬錢買悦潛為祈禱者備矣尋掘地得錢百萬意甚惡之一皆藏閉及悦疾篤導憂念特至不食積日忽見一人形状甚偉被甲持刀導問君是何人曰僕是蒋侯也公兒不佳欲為請命故来耳公勿復憂因求食遂噉數升食訖勃然謂導曰中書患非可救者言訖不見悦亦尋殞絶悦與導語常以慎密為端導還臺及行恱未甞不送至車後悦既亡導還臺自悦常所送䖏哭至臺門又甞為母曹氏襞歛箱箧中物悦亡其母長使封箧不忍復開悦無子以弟恬子混為嗣襲導爵丹陽尹卒贈太常子嘏嗣尚鄱陽公主歴中領軍尚書卒子恢嗣義熙末為游撃将軍悦弟恬字敬豫少好武不為公門所重導見悦輙喜見恬便有怒色州辟别駕不行襲爵即邱子性慠誕不拘禮法謝萬甞造恬既坐少頃恬便入内萬以為必厚待已殊有喜色恬乆之乃沐頭散髪而出據胡牀於庭中曬髪神氣慠邁竟無賔主之禮萬悵然而還晚節更好士多技蓺善奕棊為中興第一遷中書郎帝欲以為中書令導固讓従之除後将軍魏郡太守加給事中領兵鎮石頭導薨去官俄起為後将軍復鎮石頭轉吴國㑹稽内史加散騎常侍卒贈中軍将軍諡曰憲恬弟洽字敬和導諸子中最知名與荀羡俱有美稱弱冠歴散騎中書郎中軍長史司徒左長史建武将軍吴郡内史徵拜領軍尋加中書令固讓表䟽十上穆帝詔曰敬和清裁貴令昔為中書郎吾時尚小數呼見意甚親之今所以用為令既機任湏才且欲時時相見共講文章待以友臣之義而累表固讓甚違本懐其催洽令拜苦讓遂不受升平二年卒於官年三十六二子珣珉珣字元琳弱冠與陳郡謝元為桓温掾俱為温所敬重温甞謂人曰謝掾年四十必擁旄杖節王掾當作黒頭公皆未易才也珣轉主簿時温經畧中夏無有寧嵗軍中機務並委珣焉文武數萬人悉識其面従討袁真封東亭侯轉大司馬參軍琅邪王友中軍長史給事黄門侍郎珣兄弟皆謝氏壻以猜嫌致隙太傅安既與珣絶㛰又離珉妻由是二族遂成仇釁時希安㫖乃出珣為豫章太守不之官除散騎常侍不拜遷秘書監安卒後遷侍中孝武深杖之轉輔國将軍吴國内史在郡為士庻所悦徵為尚書右僕射領吏部轉左僕射加征虜将軍復領太子詹事時帝雅好典籍珣與殷仲堪徐邈王恭欷恢等並以才學文章見昵於帝及王國寳自媚於㑹稽王道子而與珣等不叶帝慮晏駕後怨隙必生乃出恭恢為方伯而委珣端右珣夢人以大筆如椽與之既覺語人云此當有大手筆事俄而帝崩哀䇿諡議皆珣所草隆安初國寳用事謀黜舊臣遷珣尚書令王恭赴山陵欲殺國寳珣止之曰國寳雖終為禍亂要罪逆未彰今便先事而發恐大失朝野之望况擁彊兵竊𤼵於京輦誰謂非逆國寳若遂不改惡布天下然後順時望除之亦無憂不濟也恭乃止既而謂珣曰比来視君一似胡廣珣曰王陵廷争陳平慎黙但問嵗終何如耳恭尋起兵國寳将殺珣等僅而得免語在國寳傳二年恭復舉兵假珣節進衛将軍都督琅邪水陸軍事事平上所假節加散騎常侍四年以疾解職嵗餘卒時年五十二追贈車騎将軍開府諡曰獻穆桓元輔政改贈司徒初珣既與謝安有隙在東聞安薨便出京師詣族弟獻之曰吾欲哭謝公獻之驚曰所望於法護於是直前哭之甚慟法護珣小字也珣五子𢎞虞栁孺曇首宋世並有髙名珣弟珉字季琰少有才蓺善行書名出珣右時人為之語曰法䕶非不佳僧彌難為兄僧彌珉小字也時有外國沙門名提婆妙解法理為珣兄弟講毘曇經珉時尚㓜講未半便云已解即於别室與沙門法綱等數人自講法綱嘆曰大義皆是但小未精耳辟州主簿舉秀才不行後歴著作散騎郎國子博士黄門侍郎侍中代王獻之為長兼中書令二人素齊名世謂獻之為大令珉為小令太元十三年卒時年三十八追贈太常二子朗練義熙中並歴侍中洽弟協字敬祖元帝撫軍參軍襲爵武岡侯早卒無子以弟劭子謐為嗣謐字稚逺少有美譽與譙國桓允太原王綏齊名拜祕書郎襲父爵遷祕書丞歴中軍長史黄門郎侍中及桓元舉兵詔謐銜命詣元元深敬昵焉拜建威将軍吴國内史未至郡元以為中書令領軍将軍吏部尚書遷中書監加散騎常侍領司徒及元将簒以謐兼太保奉璽册詣元元簒封武昌縣開國公加班劔二十人初劉裕為布衣衆未之識也惟謐獨奇賞之常謂裕曰卿當為一代英雄及裕破桓元謐以本官加侍中領揚州刺史録尚書事謐既受寵桓氏常不自安護軍将軍劉毅甞問謐曰璽綬何在謐益懼㑹王綏以桓氏甥自疑謀反父子兄弟皆伏誅謐従弟諶少驍果輕侠欲誘謐還吴起兵為亂乃説謐曰王綏無罪而義旗誅之是誅時望也兄少立名譽加地位如此欲不危得乎謐懼而出奔劉裕牋詣大将軍武陵王遵遣人追躡謐既還委任如先加謐班劔二十人義熙三年卒官時年四十八追贈侍中司徒諡曰文恭三子瓘球琇入宋皆至大官協弟劭字敬倫歴東陽太守吏部郎司徒左長史丹陽尹劭美姿容有風操雖家人近習未甞見其堕替之容桓温甚器之遷吏部尚書尚書僕射領中領軍出為建威将軍吴國内史卒贈車騎将軍諡曰簡三子穆黙恢穆臨海太守黙吴國内史加二千石恢右衛将軍穆三子簡智超黙二子鑒恵義熙中並歴顯職劭弟薈字敬文恬虚守静不競榮利少歴清官除吏部郎侍中建威将軍吴國内史時年饑粟貴人多餓死薈以私米作饘粥以飴餓者所濟活甚衆徵補中領軍不拜徙尚書領中護軍復為征虜将軍吴國内史頃之桓冲表請薈為江州刺史固辭不拜轉督浙江東五郡左将軍㑹稽内史進號鎮軍将軍加散騎常侍卒於官贈衛将軍子廞歴太子中庻子司徒左長史以母喪居于吴王恭舉兵加廞建威将軍吴國内史令起軍助為聲援廞即墨絰合衆誅殺異已仍遣前吴國内史虞嘯父等入吴興聚兵輕侠赴者萬計廞自謂義兵一動勢未必寧可乗間而取富貴而曾不旬日國寳賜死恭罷兵符廞去職廞大怒廻衆討恭恭遣司馬劉牢之距戰于曲阿廞衆潰奔走遂不知所在長子泰為恭所殺少子華以不知廞存亡憂毁布衣蔬食後従兄謐言其死所華始發喪入仕初導渡淮使郭璞筮之卦成璞曰吉無不利淮水絶王氏滅其後子孫繁衍竟如璞言通志卷一百二十五
