body:
  text: 通志卷五下宋右迪功郎鄭樵漁仲撰前漢紀第五下文帝景帝武帝昭帝宣帝元帝成帝哀帝平帝孝文皇帝名恆之字常高祖第四子也母曰薄姬高祖十一年春已破陳豨定代地立為代王都中都即王位十七年高后崩諸呂謀為亂欲危劉氏丞相陳平太尉周勃朱虛侯劉章等共誅之謀立代王遂使人迎代王郎中令張武等議皆曰漢大臣皆故高帝時將習兵事多謀詐其屬意非止此也特畏高帝呂太后威耳今已誅諸呂新喋大頰反履涉也血京師以迎大王為名實不可信願稱疾無往以觀其變中尉宋昌進曰秦失其政豪傑並起人人自以為得之者以萬數然卒踐天子位者劉氏也天下絶望一矣高帝封王子弟地犬牙相制所謂磐石之宗也天下服其強二矣漢興除秦苛政約法令施德惠人人自安難動搖三矣夫以呂太后之嚴立諸呂為三王擅權專制然而太尉以一節入北軍一呼士皆袒左為劉氏畔諸呂卒以滅之此乃天授非人力也今大臣雖欲為變百姓弗為使其黨寧能專一邪况內有朱虛東牟之親外畏吳楚淮南琅邪齊代之強方今高帝子獨淮南王與大王大王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王幸勿疑也代王報太后計猶豫未定卜之兆得大橫占曰大橫庚庚余為天王夏啓以光代王曰寡人固已為王矣又何王乎卜人曰所謂天王者乃天子也於是代王乃遣太后弟薄昭往見太尉勃勃等具言所以迎立王者昭還報曰信矣無可疑者代王笑謂宋昌曰果如公言乃令昌驂乘張武等六人乘六乘傳詣長安至高陵休止而使宋昌先馳之長安觀變昌至渭橋丞相以下皆迎昌還報代王乃進至渭橋羣臣拜謁稱臣代王下車拜太尉勃進曰願請間言宋昌曰所言公公言之所言私王者不受私太尉乃跪上天子璽符代王謝曰至代邸而議之閏月己酉入代邸羣臣從至上議曰丞相臣平太尉臣勃大將軍臣武御史大夫臣蒼宗正臣郢朱虛侯臣章東牟侯臣興居典客臣揭再拜言大王足下子𢎞等皆非孝惠皇帝子不當奉宗廟臣謹請隂安侯高帝兄伯妻頃王后兄仲妻也與琅邪王宗室大臣列侯吏二千石議曰大王高皇帝長子宜為高帝嗣願大王即天子位代王曰奉高帝宗廟重事也寡人不佞不足以稱願請楚王計宜者寡人不敢當羣臣皆伏固請代王西鄉讓者三南鄉讓者再丞相平等皆曰臣伏計之大王奉高帝宗廟最宜稱雖天下諸侯萬民皆以為宜臣等為宗廟社稷計不敢忽願大王幸聽臣等臣謹奉天子璽符再拜上代王遂即天子位羣臣以禮次侍乃使太僕嬰與東牟侯興居先清宮奉天子法駕迎於代邸皇帝即日夕入未央宮夜拜宋昌為衛將軍鎮撫南北軍張武為郎中令行殿中還坐前殿於是夜下詔曰制詔丞相太尉御史大夫間者諸呂用事擅權謀為大逆欲危宗廟賴將相列侯宗室大臣誅之朕初即位其赦天下賜民爵一級女子百戶牛酒酺五日賜爵者謂一家之長得之也女子謂賜爵者之妻率百戶共得牛若干頭酒若干石無定數也漢律三人以上無故羣飲酒罰金四兩今詔橫賜得令會聚飲食五日也元年冬十月辛亥皇帝見于高廟右丞相徙為左丞相太尉勃為右丞相大將軍灌嬰為太尉壬子遣車騎將軍薄昭迎皇太后于代詔曰前呂産自置為相國呂祿為上將軍擅矯遣灌將軍嬰將兵擊齊欲代劉氏嬰留滎陽與諸侯合謀以誅呂氏呂産欲為不善丞相平與太尉勃等謀奪呂産等軍朱虛侯章首先捕斬産太尉勃身率襄平侯通持節承詔入北軍典客揭奪呂祿印其益封太尉勃邑萬戶賜金五千斤丞相平將軍嬰邑各三千戶金二千斤朱虛侯章襄平侯通邑各二千戶金千斤封典客揭為陽信侯金千斤十二月立趙幽王子遂為趙王徙琅邪王澤為燕王呂氏所奪齊楚地皆歸之詔曰法者治之正也所以禁暴而率善人也今犯法已論而使無罪之父母妻子同産坐之及為收孥朕甚不取其除收孥諸相坐律令正月有司請早建太子詔曰朕既不德今縱不能博求賢聖有德之人而禪天下焉而曰豫建太子是重吾不德也謂天下何其安之有司曰豫建太子所以重宗廟社稷不忘天下也上曰楚王季父也明於國家之大體吳王於朕兄也惠仁以好德淮南王弟也秉德以陪朕諸侯王宗室昆弟有功臣多賢及有德義者今不選舉焉而曰必子人其以朕為忘賢有德者而專於子非所以憂天下也朕甚不取有司固請曰古者殷周有國治安皆千歲有天下者莫長焉用此道也立嗣必子所從來遠矣高帝始平天下建諸侯為帝者太祖諸侯王及列侯始受國者亦皆為其國祖子孫繼嗣世世弗絶天下之大義也故高帝設之以撫海內今釋宜建而更選於諸侯宗室非高帝之志也子啓最長敦厚慈仁請建以為太子上乃許之因賜天下民當代父後者爵各一級封將軍薄昭為軹侯三月立太子母竇氏為皇后上為立后故詔鰥寡孤獨窮困之民議振貸之又曰今歲首不時使人存問長老又無布帛酒肉之賜將何以佐天下子孫孝養其親其令縣道有蠻夷曰道年八十已上賜米人月一石肉二十斤酒五斗其九十已上又賜帛人二匹絮三斤刑者及有罪耐以上不用此令楚元王交薨四月齊楚地震二十九山同日崩大水潰出六月令郡國無來獻施惠天下諸侯四夷遠近歡洽乃修代來功詔曰方大臣誅諸呂迎朕朕狐疑皆止朕惟中尉宋昌勸朕朕得保宗廟已尊昌為衛將軍其封昌為壯武侯諸從朕者六人官皆至九卿又曰列侯從高帝入蜀漢者六十八人益邑各三百戶故吏二千石以上從高帝潁川守尊等十人食邑六百戶淮陽守申屠嘉等十人五百戶衛尉足等十人四百戶封淮南王舅父趙兼為周陽侯齊王舅父駟鈞為靖郭侯故常山丞相蔡兼為樊侯二月冬十月丞相陳平薨詔曰古者諸侯建國千餘各守其地以時入貢民不勞苦今列侯多居長安邑遠吏卒給輸費苦而列侯亦無繇教訓其民其令列侯之國為吏及詔所止者遣太子十一月癸卯晦日有食之詔曰天下治亂在豫一人二三執政猶吾股肱也朕之不德上纍三光之明其悉思朕之過失及知見之所不及丐以啓告朕及舉賢良方正能直言極諫者以匡朕之不逮因各敕以職任務省繇費以便民朕既不能遠德故􅍀然念外人之有非是以設備未息今縱不能罷邊屯戍而又飭兵厚衛其罷衛將軍軍太僕見馬遺財足餘皆以給傳置春正月丁亥詔開籍田朕將親率耕以給宗廟粢盛民謫作縣官及貸種食未入入未備者皆赦之三月詔立趙王遂弟辟疆為河間王朱虛侯章為城陽王東牟侯興居為濟北王因立皇子武為代王參為太原王揖為梁王五月詔除誹謗妖言之律又民或祝詛者此細民之愚無知抵死自今以來有犯此者勿聽治九月初與郡國守相為銅虎符竹使符詔勸民務農其賜天下今年田租之半三年冬十月丁酉晦日有蝕之十一月丁卯晦日有蝕之詔曰前遣列侯之國辭未行丞相朕之所重其為朕率列侯之國遂免丞相勃遣就國十二月太尉潁隂侯灌嬰為丞相罷太尉官屬丞相夏四月城陽王章薨淮南王長殺辟陽侯審食其五月胸奴入北地居河南為寇帝初幸甘泉六月帝曰漢與胸奴約為兄弟毋使害邊境所以輸遺胸奴甚厚今右賢王離其國將衆居河南降地陵轢邊吏入盜甚敖無道非約也其發邊吏騎八萬五千詣高奴遣丞相灌嬰擊之胸奴去發中尉材官屬衛將軍軍長安辛卯帝自甘泉之高奴因幸太原見故羣臣皆賜之舉功行賞諸民里賜牛酒復晉陽中都民三歲租留遊太原十餘日濟北王興居聞帝之代欲自擊胸奴乃反發兵欲襲滎陽於是詔罷丞相兵以棘蒲侯柴武為大將軍將四將軍十萬衆擊之祁侯繪賀為將軍軍滎陽秋七月上自太原至長安詔曰濟北王背德反上詿誤吏民為大逆濟北吏民兵未至先自定及以軍城邑降者皆赦之復官爵與王興居去來者亦赦之八月虜濟北王興居自殺赦諸與興居反者四年冬十二月丞相灌嬰薨夏五月復諸劉有屬籍家無所與賜諸侯王子邑各二千戶秋九月封齊悼惠王子七人為列侯綘侯周勃有罪逮詣廷尉詔獄作顧成廟如淳曰身存而立廟也自是皆有其廟景曰德陽武曰龍淵昭曰徘徊宣曰樂遊元曰長壽成曰陽池五年春二月地震夏四月除盜鑄錢令更造四銖錢六年冬十月桃李華十一月有司言淮南王長出入擬於天子廢先帝法與棘蒲侯太子竒謀反遣使閩越及胸奴發其兵欲危宗廟社稷羣臣議曰當棄市帝不忍致法於王赦其罪廢勿王羣臣請處王蜀嚴道卭都帝許之道病死上憐之後十六年追尊淮南王諡厲王王其子三人為淮南王衡山王廬江王七年冬十月令列侯太夫人夫人諸侯王子及吏二千石無得擅徵捕夏四月赦天下六月癸酉未央宮東闕罘罳災八年夏封淮南厲王長四子為列侯有長星出於東方九年春大旱十年冬行幸甘泉將軍薄昭死十一年冬十一月行幸代春正月上自代還夏六月梁王揖薨胸奴冦狄道十二年冬十二月河決東郡春正月賜諸侯王女邑各二千戶二月出孝惠皇帝後宫美人令得嫁三月除關無用傳詔曰朕親率天下農十年于今詔書數下而歲功未興是吏奉吾詔不勤而勸民不明也其賜農民今年租稅之半又遣謁者勞賜三老孝者帛人五匹悌者力田二匹廉吏二百石以上率百石者三匹又問民所不便安而以戶口率置三老孝悌力田常員令各率其意以道民焉十三年春二月甲寅詔曰朕親率天下農耕以供粢盛皇后親桑以為祭服其具禮儀夏除祕祝以祕祝之官移過於下故也五月齊太倉令淳于公有罪當刑詔獄逮徒繫長安其少女緹縈自傷泣隨其父至長安上書願沒入為官婢贖父刑罪天子憐之為除肉刑六月詔除田租稅賜天下孤寡布帛絮各有數十四年冬胸奴謀入邊為冦攻朝那塞殺北地都尉卬上乃遣三將軍軍隴西北地上郡中尉周舍為衛將軍郎中令張武為車騎將軍軍渭北車千乘騎卒十萬帝親自勞軍勒兵申教令賜軍吏卒帝欲自將擊胸奴羣臣諫皆不聽皇太后固要帝帝乃止於是以東陽侯張相如為大將軍建成侯董赫內史欒布皆為將軍擊胸奴胸奴遁走春詔有司廣增諸祀壇埸圭幣令祠官致敬毋有所祈福於朕十五年春黃龍見成紀乃詔議郊祀魯人公孫臣上書言漢家得土地宜改正朔服色趙人新垣平以望氣見因説上設五廟于渭陽四月上幸雍始郊見五帝赦天下修名山大川常祀而絶者有司以歲時致禮九月詔諸侯王公卿郡守舉賢良能正言極諫者上親策之傳納以言十六年夏四月上郊祀五帝于渭陽五月立齊悼惠王子六人淮南厲王子三人皆為王九月得玉杯刻曰人主延壽令天下大酺明年改元後元年冬十月新垣平詐覺謀反夷三族春正月孝惠皇后張氏薨詔曰間者歲比不登水旱頻仍丞相列侯吏二千石博士議有可以佐百姓者率意遠思無有所隱二年夏行幸雍棫陽宫六月代王參薨胸奴和親詔布告天下三年春二月行幸代四年夏四月丙寅晦日有蝕之五月赦天下免官奴婢為庶人行幸雍五年春正月行幸隴西三月行幸雍秋七月行幸代六年冬胸奴三萬騎入上郡三萬騎入雲中以中大夫令免為車騎將軍屯飛狐故楚相蘇意為將軍屯句注將軍張武屯北地河內太守周亞夫為將軍次細柳宗正劉禮為將軍次霸上祝兹侯徐厲為將軍次棘門以備胡夏四月大旱蝗令諸侯無入貢弛山澤減諸服御損郎吏員發倉庾以振民民得賣爵七年夏六月己亥帝崩于未央宮年四十六遺詔曰朕聞之蓋天下萬物之萌生靡不有死死者天地之理物之自然奚可甚哀當今之世咸嘉生而惡死厚葬以破業重服以傷生吾甚不取且朕既不德無以佐百姓今崩又使重服久臨以罹寒暑之數哀人父子傷長老之志損其飲食絶鬼神之祀以重吾不德謂天下何朕獲保宗廟以眇眇之身託于天下君王之上二十有餘年矣賴天之靈社稷之福方內安寧靡有兵革朕既不敏常畏過行以羞先帝之遺德惟年之久長懼于不終今乃幸以天年得復供養于高廟朕之不明與嘉之其奚哀念之有其令天下吏民令到出臨三日皆釋服無禁娶婦嫁女祠祀飲酒食肉自當給喪事服臨者皆無踐絰帶無過三寸無布車及兵器無發民男女哭臨宮殿中殿中當臨者皆以旦夕各十五舉音禮畢罷非旦夕臨時禁無得擅哭臨已下服大紅音功十五日小紅十四日纎七日釋服它不在令中者皆以此令比類從事布告天下使明知朕意霸陵山川因其故毋有所改歸夫人以下至少使令中尉亞夫為車騎將軍屬國悍為將屯將軍郎中令張武為復土將軍發近縣卒萬六千人發內史卒萬五千人藏郭穿復土屬將軍武賜諸侯王以下至孝悌力田金錢各有數乙巳葬霸陵羣臣皆頓首上尊號曰孝文皇帝班氏曰孝文皇帝即位二十三年宮室苑囿車騎服御無所增益有不便輒弛以利民嘗欲作露臺召匠計之直百金上曰百金中民十家之産吾奉先帝宮室常恐羞之何以臺為身衣弋綈所幸愼夫人衣不得曵地幃帳不得文繡以示敦朴為天下先治霸陵皆以瓦器不得以金銀銅錫為飾因其山不起墳南越王尉他自立為帝上召尉他兄弟以德懷之他遂去帝稱臣與胸奴約和親後而背約入盜令邊守備不發兵深入恐煩苦百姓吳王詐病不朝就賜几杖羣臣如袁盎等諫説雖切嘗假借納用焉張武等受賂遺金錢覺上乃發御府金錢賜之以愧其心弗下吏專務以德化民是以海內殷富興於禮義斷獄數百幾致刑措烏乎仁哉孝文帝元年十六年後元年七年即位二十三年孝景皇帝名啓之字開文帝太子也母曰竇皇后後七年六月己亥文帝崩九日太子即皇帝位尊皇太后薄氏曰太皇太后皇后曰皇太后九月有星孛于西方元年十月詔曰蓋聞古者祖有功而宗有德制禮樂各有由歌者所以發德也舞者所以明功也高廟酎奏武德文始五行之舞孝惠廟酎奏文始五行之舞孝文皇帝臨天下通關梁不異遠方除誹謗去肉刑賞賜長老收恤孤獨減耆欲不受獻罪人不孥不誅亡罪除宮刑出美人重絶人之世德厚侔天地利澤施四海靡不獲福明象乎日月而廟樂不稱朕甚懼焉其為孝文皇帝廟為昭德之舞以明休德然後祖宗之功德施于萬世永永無窮朕甚嘉之其與丞相列侯中二千石禮官具禮儀奏丞相臣嘉等奏曰陛下永思孝道立昭德之舞以明孝文皇帝之德皆臣嘉等愚所不及臣謹議曰功莫大於高皇帝德莫盛於孝文皇帝高皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜世世獻祖宗之廟郡國諸侯宜各為孝文皇帝立太宗之廟諸侯王列侯使者侍祠天子所獻祖宗之廟請宣布天下制曰可春正月詔郡國或磽狹無所農桑􅌛畜民欲徙寬大地者聽之夏四月赦天下賜民爵一級遣御史大夫青翟至代下與胸奴和親五月令田半租令羣臣無朝賀秋七月詔曰吏受所監臨以飲食免重受財物賤買貴賣論輕廷尉與丞相更議著令廷尉信謹與丞相議曰吏及諸有秩受其官屬所監所治所行所將其與飲食計償費勿論它物若買故賤賣故貴皆坐臧為盜沒入臧縣官吏遷徙免罷受其故官屬所將監治送財物奪爵為士伍免之無爵罰金二斤令沒入所受有能捕告畀其所受臧二月冬十二月有星孛于西南令天下男子二十始傅春三月立皇子德為河間王閼為臨江王餘為淮陽王非為汝南王彭祖為廣川王發為長沙王夏四月壬午太皇太后崩六月丞相嘉薨封故相國蕭何孫係為列侯秋與胸奴和親三月冬十二月襄平侯嘉子恢説不孝謀反欲以殺嘉大逆無道詔赦嘉為襄平侯及妻子當坐者復故爵論恢説及妻子如法春正月淮陽王宮正殿災吳王濞膠西王卬楚王戊趙王遂濟南王辟光災川王賢膠東王雄渠皆舉兵反發兵西鄉天子為斬御史大夫鼂錯以謝七國大赦天下遣袁盎諭告不止遂西圍梁上乃遣太尉周亞夫大將軍竇嬰將兵擊之二月壬子晦日有蝕之諸將破七國兵斬首十餘萬級追斬吳王濞於丹徒六王皆自殺夏六月詔諸吏民為吳王濞等所詿誤及逋逃亡軍者皆赦之又楚元王子藝等與濞等為逆朕不忍加法除其籍毋令汙宗室立平陸侯劉禮為楚王續元王後立皇子端為膠西王勝為中山王賜民爵一級四年春復置諸關用傳出入夏四月己巳立皇子榮為皇太子徹為膠東王六月赦天下賜民爵一級秋七月臨江王閼薨十月戊戌晦日有蝕之五年春正月作陽陵邑夏募民徙陽陵賜錢二十萬遣公主嫁單于六年冬十二月雷霖雨秋九月皇后薄氏廢七年冬十一月庚寅晦日有蝕之春正月廢皇太子榮為臨江王二月罷太尉官夏四月立皇后王氏立膠東王徹為皇太子賜民為父後者爵一級中元年夏四月赦天下賜民爵一級封故御史大夫周苛周昌孫子為列侯二年春二月令諸侯王薨列侯初封及之國大鴻臚奏諡誄策列侯薨及諸侯太傅初除之官大行奏諡誄策王薨遣光祿大夫弔襚祠賵視喪事因立嗣子列侯薨遣太中大夫弔祠視喪事因立嗣其薨葬國得發民挽喪穿復土治墳無過三百人畢事胸奴入燕改磔曰棄市勿復磔三月臨江王榮坐侵太宗廟地徵詣中尉自殺夏四月有星孛于西北立皇子越為廣川王寄為膠東王秋七月更郡守為太守郡尉為都尉九月封故楚趙傅相內史前死事者四人子為列侯甲戌晦日有蝕之三年冬十一月罷諸侯御史大夫官春正月皇太后崩夏旱禁酤酒秋九月蝗有星孛于西北戊戌晦日有蝕之立皇子乘為清河王四年春三月起德陽宮御史大夫綰奏禁馬高五尺九寸以上齒未平不得出關夏蝗秋赦徒作陽陵者死罪欲腐者許之十月戊午日有蝕之五年夏立皇子舜為常山王六月赦天下賜民爵一級秋八月己酉未央宮東關災更名諸侯丞相為相九月詔諸獄疑若雖文致於法而人心不厭者輒讞之六年冬十月行幸雍郊五畤十二月更官名命廷尉為大理將作少監為將作大匠主爵中尉為都尉長信詹事為長信少府將作為大長秋大行為行人奉常為太常典客為大行治粟內史為大農以大內為二千石置左右內官屬大內定鑄錢偽黃金棄市律春三月雨雪夏四月梁王薨分梁為五國封孝王子五人為王五月詔曰夫吏者民之師也車駕衣服宜稱吏六百石以上皆長吏也亡度者或不吏服出入閭里與民亡異令長吏二千石車朱兩轓千石至六百石朱左轓車騎從者不稱其官衣服下吏出入閭巷亡吏體者二千石上其官屬三輔舉不如法令者皆上丞相御史請之又詔酷吏奉憲失中令有司減笞法定箠令六月胸奴入鴈門至武泉入上郡取苑馬秋七月辛亥晦日有蝕之後元年冬更命中大夫為衛尉春正月詔獄疑者讞有司有司有所不能決移廷尉有令讞而後不當讞者不為失欲令治獄者務先寬三月赦天下賜民爵一級中二千石諸侯相爵右庶長夏大酺五日民得酤酒五月地震秋七月乙巳晦日有蝕之條侯周亞夫下獄死二年冬省徹侯之國春胸奴入鴈門太守馮敬與戰死發車騎材官屯以歲不登令內史郡不得食馬粟徒𨽻衣七緵布夏四月詔曰雕文刻鏤傷農事者也錦繡纂組害女紅者也朕親耕后親桑以奉宗廟粢盛祭服為天下先不受獻減太官省繇賦欲天下務農蠶素有畜積以備災害今歲或不登民食頗寡其咎安在或詐偽為吏吏以貨賂為市漁奪百姓侵牟萬民縣丞長吏也姦法與盜盜甚無謂也其令二千石各修其職不事官職耗亂者丞相以聞請其罪五月詔曰人不患其不知患其為詐也不患其不勇患其為暴也不患其不富患其亡厭也其唯廉士寡欲易足今訾與資同算萬錢為一算十以上乃得官廉士算不必衆有市籍不得官無訾又不得官朕甚愍之訾算四得官亡令廉士久失職貪夫長利秋大旱三年春正月詔令郡國務勸農桑益種樹吏發民若取庸采黃金珠玉坐贓為盜二千石聽者與同罪又詔八歲已下八十已上及孕子未乳當鞫繫者並頌音容繫之皇太子冠賜民為父後者爵一級甲子帝崩于未央宫年四十八遺詔賜諸侯王列侯馬二駟吏二千石黃金二斤吏民戶百錢出宮人歸其家復終身二月癸酉葬陽陵陵在長安東北四十五里荀悅曰自漢初務本勸農纍世承業至是始天下富庶家給人足京師之錢纍百巨億貫朽而不可校太倉之粟充實露積於外腐敗而不可食衆庶街巷有馬阡陌之間成羣守閭閻者食粱肉為吏者長子孫居官者以官為姓號人人自愛而不犯法仁義興焉景帝初元七年中元六年後元三年即位十六年臣謹按張晏曰自景帝至平帝本紀皆王莽時劉歆揚雄馮衍史岑等所記惟武帝紀遷沒其書殘缺禇少孫補之所謂褚先生是也孝武皇帝名徹之字通景帝中子也母曰王美人年四歲立為膠東王孝景七年廢太子榮為臨江王以膠東王為皇子王美人為皇后後三年春正月景帝崩太子即皇帝位尊皇太后竇氏曰太皇太后皇后曰皇太后三月尊太后母臧兒為平原君封太后同母弟田蚡勝皆為列侯建元元年自古帝王未有年號始起於此冬十月詔丞相御史列侯中二千石二千石諸侯相舉賢良方正直言極諫之士丞相綰奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷奏可春二月赦天下賜民爵一級年八十復二算九十復甲卒行三銖錢夏四月己巳詔民年九十以上已有受鬻法為復子若孫令得身率妻妾遂其供養之事五月令祠官修山川之祠為歲事赦吳楚七國帑輸在官者秋七月詔省衛士卒萬人罷苑馬以賜貧民議立明堂遣使者安車蒲輪徵魯申公二年冬十月御史大夫趙綰坐請毋奏事太皇太后及郎中令王臧皆下獄自殺丞相嬰太尉蚡免春二月丙戌朔日有蝕之夏四月戊申有如日夜出初置茂陵邑三年春河水溢于平原大飢人相食賜徙茂陵者戶錢二十萬田二頃初作便門橋秋七月有星孛于西北濟川王明坐殺太傅中傅廢遷防陵閩越圍東甌東甌告急遣中大夫嚴助持節發會稽兵浮海救之未至閩越走兵還九月丙子晦日有蝕之四年夏有風赤如血六月旱秋有星孛于東北五年春罷三銖錢行半兩錢置五經博士夏四月平原君薨五月大蝗秋八月廣川王越清河王乘皆薨六年春二月乙未遼東高廟災夏四月壬子高園便殿火上素服五日五月丁亥太皇太后崩秋八月有星孛于東方長竟天閩越王郢攻南越遣大行高恢將兵出豫章大司農韓安國出會稽擊之未至越人殺郢降兵還元光元年冬十一月初令郡國舉孝廉各一人衛尉李廣為驍騎將軍屯雲中中尉程不識為車騎將軍屯鴈門六月罷夏四月赦天下賜民長子爵一級復七國宗室前絶屬者五月詔舉賢良天子親策問之而覽其對於是董仲舒公孫𢎞之徒出焉秋七月癸未日有蝕之二年冬十月行幸雍祠五畤春詔問公卿欲攻單于之要大行王恢建議宜擊夏六月御史大夫韓安國為護軍將軍衛尉李廣為驍騎將軍太僕公孫賀為輕車將軍大行王恢為將屯將軍太中大夫李息為材官將軍將三十萬衆屯馬邑谷中誘致單于欲襲擊之單于入塞覺之走出六月軍罷將軍王恢坐首謀不進下獄死秋九月令民大酺五日三年春河水徙從頓邱東南流入渤海夏五月封高祖功臣五人後為列侯河水決濮陽汜郡十六發卒十萬救決河起龍淵宮四年冬魏其侯竇嬰有罪棄市春三月乙卯丞相蚡薨夏四月隕霜殺草五月地震赦天下五年春正月河間王德薨夏發巴蜀治南夷道又發卒治鴈門阻險秋七月大風拔木乙巳皇后陳氏廢捕為巫蠱者皆梟首八月螟徵吏民有明當世之務習先聖之術者縣次給食令與計偕六年冬初算商車春穿漕渠通渭胸奴入上谷殺略吏民遣車騎將軍衛青出上谷騎將軍公孫敖出代輕車將軍公孫賀出雲中驍騎將軍李廣出鴈門青至龍城獲首虜七百級廣敖失師而還詔書切責敖廣等而赦其軍士夏大旱蝗六月行幸雍秋胸奴盜邊遣將軍韓安國屯漁陽元朔元年冬十一月詔曰十室之邑必有忠信三人並行厥有我師朕深詔執事興廉舉孝庶幾成風今或至闔郡而不薦一人是化不下究而積行之君子壅於上聞也二千石官長紀綱人倫將何以佐朕勸元元厲蒸庶崇鄉黨之訓哉且進賢受上賞蔽賢蒙顯戮古之道也其與二千石禮官博士議不舉者罪有司奏議曰古者諸侯貢士一適謂之好德再適謂之賢賢三適謂之有功乃加九錫不貢士一則黜爵再則黜地三則黜爵地畢矣夫附下罔上者死附上罔下者刑與聞國政而亡益於民者斥在上位不能進賢者退此所以勸善黜惡也今詔書令二千石舉孝廉所以化元元移風俗也不舉孝不奉詔當以不敬論不察廉不勝任也當免奏可十二月江都王非薨春三月甲子立皇后衛氏詔赦天下與民更始秋胸奴入遼西殺太守入漁陽鴈門敗都尉殺三千餘人遣將軍衛青出鴈門將軍李息出代獲首虜數千級東夷薉君南閭等口二十八萬人降為蒼海郡魯王餘長沙王發皆薨二年冬賜淮南王災川王几杖毋朝春正月詔令諸侯王得以邑土分子弟於是梁王城陽王願以邑分弟於是藩國始分而子弟畢侯矣胸奴入上谷漁陽殺略吏民千餘人遣將軍衛青李息出雲中至高闕遂西至符離獲首虜數千級收河南地置朔方五原郡三月乙亥晦日有蝕之夏募民徙朔方十萬口又徙郡國豪傑及訾三百萬以上于茂陵秋燕王定國有罪自殺三年春罷蒼海郡三月詔赦天下夏胸奴入代殺太守入鴈門殺略千餘人六月庚午皇太后崩秋罷西南夷城朔方令民大酺五日四年冬行幸甘泉夏胸奴入代定襄上郡殺略千餘人五年春大旱大將軍衛青將六將軍兵十餘萬人出朔方高闕獲首虜萬五千級夏六月詔興禮樂丞相𢎞請為弟子置博士員學者益廣秋胸奴入代殺都尉六年春二月大將軍衛青將六將軍兵十餘萬騎出定襄斬首三千餘級還休士馬于定襄雲中鴈門赦天下夏四月衛青復將六將軍絶幕大克獲前將軍趙信軍敗降胸奴右將軍蘇建亡軍獨身脫還贖為庶人六月詔軍士比多克獲受爵賞而欲移賣者無所流貤其議為令有司奏請置武功賞官以寵戰士元狩元年冬十月行幸雍祠五畤獲白麟作白麟之歌十一月淮南王安衡山王賜謀反誅黨與死者數萬人十二月大雨雪民凍死夏四月赦天下丁卯立皇太子賜中二千石爵右庶長民為父後者一級詔赦天下遣謁者巡行天下賜縣三老孝者帛人五匹鄉三老弟者力田帛人三匹年九十以上及鰥寡孤獨帛人二匹絮三斤八十以上米人三石有寃失職使者以聞縣鄉即賜毋贅聚五月乙巳晦日有蝕之胸奴入上谷殺數百人二年冬十月行幸雍祠五畤春三月丞相𢎞薨遣驃騎將軍霍去病出隴西至臯蘭斬首八千餘級夏馬生余吾水中南越獻馴象能言鳥將軍去病公孫敖出北地二千餘里過居延斬首虜三萬餘級胸奴入鴈門殺略數百人遣衛尉張騫郎中令李廣皆出右北平廣殺胸奴三千餘人盡亡其軍四千人獨身脫還及公孫敖張騫皆後期當斬贖為庶人江都王建有罪自殺膠東王寄薨秋胸奴昆邪王殺休屠王并將其衆合四萬餘人來降置五屬國以處之以其地為武威酒泉郡三年春有星孛于東方夏五月赦天下立膠東康王少子慶為六安王封故相國蕭何曽孫慶為列侯秋胸奴入右北平定襄殺略千餘人遣謁者勸有水災郡種宿麥舉吏民能假貸貧民者以名聞減隴西北地上郡戍卒半發謫吏穿昆明池四年冬有司言關東貧民徙隴西北地西河上郡會稽凡七十二萬五千口縣官衣食振業用度不足請收銀錫造白金及皮幣以足用初算緡錢春有星孛于東北夏有長星出于西北大將軍衛青將四將軍出定襄將軍去病出代各將五萬騎步兵踵軍後數十萬人青至幕北圍單于斬首萬九千級至闐顔山乃還去病與左賢王戰斬首虜七萬餘級封狼居胥山乃還兩軍士死者數萬人前將軍廣後將軍食其皆後期廣自殺食其贖死五年春三月甲午丞相李蔡有罪自殺天下馬少平牡馬匹二十萬罷半兩錢行五銖錢徙天下姦猾吏民於邊六年冬十月賜丞相以下至吏二千石百金千石以下至乘從者帛蠻夷錦各有差雨水亡氷夏四月乙巳廟立皇子閎為齊王旦為燕王胥為廣陵王初作誥六月詔遣博士大等六人分循行天下存問鰥寡廢疾無以自振業者貸與之諭三老孝弟以為民師舉獨行之君子徵詣行在所秋九月大司馬驃騎將軍去病薨元鼎元年夏五月赦天下大酺五日得鼎汾水上濟東王彭離有罪廢徙上庸二年冬十一月御史大夫張湯有罪自殺十二月丞相青翟下獄死春起柏梁臺三月大雨雪夏大水關東餓死者以千數秋九月詔江南水潦下巴蜀之粟致之江陵遣博士中等分循行諭告所抵無令重困吏民有振救飢民免其厄者具舉以聞三年冬徙函谷關於新安以故關為𢎞農縣十一月令民告緡者以其半與之正月戊子陽陵園火夏四月雨雹關東郡國十餘飢人相食常山王舜薨子勃嗣立有罪廢徙房陵四年冬十月行幸雍祠五畤賜民爵一級女子百戶牛酒行自夏陽東幸汾隂十一月甲子立后土祠于汾隂脽上禮畢行幸滎陽還至洛陽詔求周後得孽子嘉封為周子南君以奉周祀春二月中山王勝薨夏封方士欒大為樂通侯位上將軍六月得寶鼎后土祠旁秋馬生渥窪水中作寶鼎天馬之歌立常山憲王子商為泗水王五年冬十月行幸雍祠五畤遂踰隴登空同西臨祖厲河而還十一月辛巳朔旦冬至立泰畤于甘泉天子親郊見朝日夕月詔以是月望見泰一修天文禪乃辛卯夜若景光十有二明丁酉拜况于郊夏四月南越王相呂嘉反殺漢使者及其王王太后赦天下丁丑晦日有蝕之秋蛙蝦蟇鬬遣伏波將軍路博德出桂陽下湟水樓船將軍楊僕出豫章下湞水歸義侯越嚴為戈船將軍出零陵下灕水甲為下瀨將軍下蒼梧皆將罪人江淮以南樓船十萬人越馳義侯遺别將巴蜀罪人發夜郎兵下牂柯江咸會番禺九月列侯坐獻黃金酎祭宗廟不如法奪爵者六百人丞相趙周下獄死樂通侯欒大坐巫罔要斬西羌衆十萬人反與胸奴通使攻故安圍枹罕胸奴入五原殺太守六年冬十月發隴西天水安定騎士及中尉河南河內卒十萬人遣將軍李息郎中令徐自為征西羌平之行東將幸緱氏至左邑桐鄉聞南越破以為聞喜縣春至汲新中鄉得呂嘉首以為獲嘉縣馳義侯遺兵未及下上便令征西南夷平之遂定越地以為南海蒼梧鬱林合浦交址九真日南珠崖儋耳郡定西南夷以為武都牂柯越巂沈黎文山郡秋東越王餘善反攻殺漢將吏遣橫海將軍韓説中尉王溫舒出會稽樓船將軍楊僕出豫章擊之又遣浮沮將軍公孫賀出九原胸河將軍趙破奴出令居皆二千餘里不見虜而還乃分武威酒泉地置張掖敦煌郡徙民以實之元封元年冬十月詔曰南越東甌咸伏其辜西蠻北夷頗未輯睦朕將巡邊垂擇兵振旅躬秉武節置十二部將軍親帥師焉行自雲陽北歷上郡西河五原出長城北登單于臺至朔方臨北河勒兵十八萬騎旌旗徑千餘里威震胸奴遣使者郭吉告單于曰南越王頭已縣於漢北闕矣單于能戰天子自將待邊不能亟來臣服何但亡匿幕北寒苦之地為胸奴讋焉單于怒囚吉然終不敢出上還祠黃帝於橋山乃歸甘泉東越殺王餘善降詔以東越險阻反覆為後世患遷其民於江淮間遂虛其地春正月行幸緱氏詔曰朕用事華山至于中嶽獲駮麃見夏后啓母石翌日親登崇高御史乘屬在廟旁吏卒咸聞呼萬歲者三登禮罔不答其令祠官加增太室祠禁無伐其草木以山下三百戶為之奉邑名日崇高獨給祠復亡所與行遂東巡海上夏四月癸卯上還登封泰山降坐明堂詔與士夫更始以十月為元封元年行所巡至博奉高蛇音移邱歷城梁父民田租逋賦貸已除加年七十以上及孤寡帛人二匹四縣毋出今年租算賜天下民爵一級女子百戶牛酒行自泰山復東巡海上至碣石自遼西歷北邊九原五月歸于甘泉秋有星孛于東井又孛于三台齊王閎薨臣謹按劉氏按封禪書云其後三年有司言改元宜以天瑞命不宜以一二數推其所謂後三年者蓋盡元狩六年至元鼎三年也然元鼎四年方得寶鼎又無緣三年而稱之以此而言自元鼎以前之元皆有司所追命其實年號之起在元鼎耳故元封改元始有詔書臣又按劉氏以元封改元始有詔書前此之元皆無也然元鼎元年五月得鼎汾水上所以改元為得此鼎非為四年所得之鼎也誠哉改元之號在後而追號前年以足武帝之始二年冬十月行幸雍祠五畤春幸緱氏遂至東萊夏四月還祠泰山至瓠子臨決河命從臣將軍以下皆負薪塞河隄赦所過徒賜孤獨高年米人四石作瓠子之歌還作甘泉通天臺長安飛廉館朝鮮王攻殺遼東都尉乃募天下死罪擊朝鮮六月詔以甘泉宫內中産芝九莖連葉赦天下賜雲陽都百戶牛酒作芝房之歌秋作明堂于泰山下遣樓船將軍楊僕左將軍荀彘將應募罪人擊朝鮮又遣將軍郭昌中郎將衛廣發巴蜀兵平西南夷未服者以為益州郡三年春作角抵戲以享外國朝獻者三百里內皆來觀夏朝鮮斬其王右渠降以其地為樂浪臨屯元莬真番郡樓船將軍楊僕坐失亡多免為庶人左將軍荀彘坐爭功棄市秋七月膠西王端薨武都氐人反分徙酒泉郡四年冬十月行幸雍祠五畤通回中道遂北出蕭關歷獨鹿鳴澤自代而還幸河東春三月祠后土有神光集于靈壇一夜三燭幸中都宮殿上見光詔赦汾隂夏陽中都死罪以下賜三縣及楊氏皆無出今年租賦夏大旱民多暍死秋以胸奴弱可遂臣服乃遣使説之單于使來死京師胸奴冦邊遣拔胡將軍郭昌屯朔方五年冬行南巡狩至于盛唐望祀虞帝于九嶷登灊天柱山自尋陽浮江親射蛟江中獲之舳艫千里薄樅陽而出作盛唐樅陽之歌遂北至琅邪並海所過禮祠其名山大川春三月還至泰山增封甲子祠高祖于明堂以配上帝因朝諸侯王列侯受郡國計夏四月詔赦天下所幸縣毋出今年租賦賜鰥寡孤獨帛貧窮者粟還幸甘泉郊泰畤大司馬大將軍青薨初置刺史部十三州名臣文武欲盡詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之纍而立功名夫泛駕之馬跅弛之士亦在御之而已其令州郡察吏民有茂材異等可為將相及使絶國者六年冬行幸回中春作首山宮三月行幸河東祠后土詔赦汾隂殊死以下賜天下貧民布帛人一匹益州昆明反赦京師亡命令從軍遣拔胡將軍郭昌將以擊之夏京師民觀角抵于上林平樂館秋大旱蝗太初元年冬十月行幸泰山十一月甲子朔旦冬至祀上帝于明堂乙酉柏梁臺災十二月禪高里祠后土東臨勃海望祠蓬萊春還受計于甘泉二月起建章宫夏五月正歷用夏正以正月為歲首色上黃數用五定官名協音律遣因杅胸奴地名因所征以名將軍也杅羽俱切將軍公孫敖築塞外受降城秋八月行幸安定遣二師將軍李廣利發天下謫民西征大宛蝗從東方飛至敦煌二年春正月丞相慶薨三月行幸河東祠后土令天下大酺五日膢五日祠門尸比臘夏四月詔曰朕用事介山祭后土皆有光應其赦汾隂安邑殊死以下五月籍吏民馬補車騎馬秋蝗遣浚稽將軍趙破奴二萬騎出朔方擊胸奴不還冬十二月御史大夫兒寬卒三年春正月行東巡海上夏四月還修封泰山禪石閭遣光祿勳徐自為築五原塞外列城西北至盧朐遊擊將軍韓説將兵屯之強弩都尉路博德築居延秋胸奴入定襄雲中殺略數千人行壞光祿諸亭障又入張掖酒泉殺都尉四年春二師將軍廣利斬大宛王首獲汗血馬來作西極天馬之歌秋起明光宮冬行幸回中徙𢎞農都尉治武關稅出入者以給關吏卒食天漢元年春正月行幸甘泉郊泰畤三月行幸河東祠后土胸奴歸漢使者使使來獻夏五月赦天下秋閉城門大搜發謫戍屯五原二年春行幸東海還幸回中夏五月二師將軍三萬騎出酒泉與右賢王戰于天山斬首虜萬餘級又遣因杅將軍出西河騎都尉李陵將步卒五千人出居延北與單于戰斬首虜萬餘級陵兵敗降胸奴秋止禁巫祠道中者大搜渠黎六國遣使來獻泰山琅邪羣盜徐勃等阻山攻城道路不通遣直指使者暴勝之等衣繡衣杖斧分部逐捕刺史郡守以下皆伏誅十一月詔關都尉曰今豪傑多遠交依東方羣盜其謹察出入者三年春二月御史大夫王卿有罪自殺初𣙜酒酤三月行幸泰山修封祀明堂因受計還幸北地祠常山瘞元玉夏四月赦天下行所過毋出田租秋胸奴入鴈門太守坐畏愞棄市四年春正月朝諸侯王于甘泉宮發天下七科謫及勇敢士遣二師將軍李廣利將六萬騎步兵七萬人出朔方因杅將軍公孫敖萬騎步兵三萬人出鴈門遊擊將軍韓步兵三萬人出五原強弩都尉路博德步兵萬餘人與二師會廣利與單于戰余吾水上連日敖與左賢王戰不利皆引還夏四月立皇子髆音博為昌邑王秋九月令死罪人贖錢五十萬減死一等太始元年春正月因杅將軍敖有罪要斬徙郡國吏民豪桀于茂陵雲陵夏六月赦天下二年春正月行幸回中三月詔改名黃金為麟趾裊蹄以協瑞焉因以班賜諸侯王秋旱九月募死罪人贖錢五十萬減死一等御史大夫杜周卒三年春正月行幸甘泉宫饗外國客二月令天下大酺五日行幸東海獲赤鴈作朱鴈之歌幸琅邪禮日成山登之罘浮大海山稱萬歲冬賜行所過戶五千錢鰥寡孤獨帛人一匹四年春三月幸泰山壬午祀高祖于明堂以配上帝因受計癸未祀孝景帝于明堂甲申修封丙戍禪石閭夏四月幸不其祠神人于交門宫若有鄉坐拜者作交門之歌夏五月還幸建章宫赦天下秋七月趙有蛇從郭外入邑與邑中蛇羣鬪孝文廟下邑中蛇死冬十月甲寅晦日有蝕之十二月行幸雍祠五畤西至安定北地征和元年春正月還幸建章宫三月趙王彭祖薨冬十一月發三輔騎士大搜上林閉長安城門索十一日乃解巫蠱起二年春正月丞相賀下獄死夏四月大風發屋折木閏月諸邑公主諸邑琅邪縣也陽石公主皆坐巫蠱死夏行幸甘泉秋七月按道侯韓説使者江充掘蠱太子宫壬午太子與皇后謀斬充以節發兵與丞相劉屈氂大戰長安死者數萬人庚寅太子亡皇后自殺初置城門屯兵更節加黃旄御史大夫暴勝之司直田仁坐失縱勝之自殺仁要斬八月辛亥太子自殺于湖癸亥地震九月立趙敬肅王子偃為平干王胸奴入上谷五原殺略吏民三年春正月行幸雍至安定北地胸奴入五原酒泉殺南都尉三月遣二師將軍廣利將五萬人出五原御史大夫商邱成二萬人出西河重合侯馬通四萬騎出酒泉成至浚稽山與虜戰多斬首通至天山虜引去因降車師皆引兵還廣利敗降胸奴夏五月赦天下六月丞相屈氂下獄要斬妻子梟首秋蝗九月反者公孫勇胡倩發覺皆伏辜四年春正月行幸東萊臨大海二月丁酉隕石于雍二聲聞四百里三月上耕于巨定還幸泰山修封庚寅祀于明堂癸巳禪石閭夏六月還幸甘泉秋八月辛酉晦日有蝕之後元元年春正月行幸甘泉郊泰畤遂幸安定昌邑王髆薨二月詔以郊見上帝薦于泰畤光景並見其赦天下夏六月御史大夫商邱成有罪自殺侍中僕射莽何羅與弟重合侯通謀反侍中駙馬都尉金日磾奉車都尉霍光騎都尉上官桀討之秋七月地震往往涌泉出二年春正月朝諸侯王于甘泉宫賜宗室二月行幸盩厔五柞宫上疾篤乙丑立皇子弗陵為皇太子丁卯帝崩于五柞宫入殯于未央宫前殿三月甲申葬茂陵在長安西北八十里年七十一班固曰漢承百王之弊高祖撥亂反正文景務在養民至于稽古禮文之事猶多闕焉孝武初立卓然罷黜百家表章六經遂疇咨海內舉其茂俊與之立功興大學修郊祀改正朔定歷數協音律作詩樂建封禪禮百神紹周後號令文章焕然可述後嗣得遵洪業而有三代之風如武帝之雄材大略不改文景之恭儉以濟斯民雖詩書所稱何有加焉孝武帝建元元光元朔元狩元鼎元封各六年太初天漢太始征和各四年後元二年即位五十四年孝昭皇帝名弗陵之字不武帝少子也母曰趙倢妤居鉤弋宫號鉤弋夫人孕十四月而生帝時武帝年七十矣欲立之為太子患其年稚母少恐女主顓恣故倢妤以微譴死武帝末戾太子敗燕王旦廣陵王胥行驕嫚後元二年二月武帝疾病遂立昭帝為太子年八歲以侍中奉車都尉霍光為大司馬大將軍受遺詔輔少主丁卯帝崩戊辰太子即皇帝位謁高廟帝姊鄂邑長公主共養省中大將軍光秉政領尚書事車騎將軍金日磾左將軍上官桀副焉夏六月赦天下秋七月有星孛於北方濟北王寬有罪自殺賜長公主及宗室昆弟各有差追尊趙倢妤為皇太后起雲陵冬胸奴入朔方殺略吏民發軍屯西河左將軍桀行北邊始元元年春二月黃鵠下建章宫太液池中公卿上壽賜諸侯王列侯宗室金錢各有差己亥上耕于鉤盾弄田益封燕王廣陵王及鄂邑長公主各萬三千戶夏為太后起圍廟雲陵益州廉頭姑繒牂柯談指同並音伴二十四邑皆反遣水衡都尉吕破胡募吏民及發犍為蜀郡奔命擊益州大破之有司請河內屬冀州河東屬并州秋七月赦天下賜民百戶牛酒大雨渭橋絶八月齊孝王孫劉澤謀反欲殺青州刺史雋不疑發覺皆伏誅遷不疑為京兆尹賜錢百萬九月丙子車騎將軍日磾薨閏月遣故廷尉王平等五人持節行郡國舉賢良問民疾苦寃失職者冬無氷二年春正月大將軍光左將軍桀皆以前捕斬反虜重合侯馬通功封光為博陸侯桀為安陽侯以宗室毋在位者舉茂材劉辟強劉長樂皆為光祿大夫辟強守長樂衛尉三月遣使者振貸貧民毋種食者秋八月詔往年災害多今年蠶麥傷所振貸種食勿收責毋令出今年田租冬發習戰射士詣朔方調故吏將屯田張掖郡三年春二月有星孛于西北秋募民徙雲陵賜錢田宅冬十月鳯凰集東海遣使者祠其處十一月壬辰朔日有蝕之四年春三月甲寅立皇后上官氏赦天下辭訟在後二年前皆勿聽治夏六月皇后見高廟賜長公主丞相將軍列侯中二千石以下及郎吏宗室錢帛各有差徙三輔富人雲陵賜錢戶十萬秋七月詔以比歲不登往時令民共出馬其止勿出諸給中都官者且減之冬遣大鴻臚田廣明擊益州廷尉李种坐放縱死罪棄市五年春正月追尊皇太后父為順成侯夏陽男子張延年一作成方詣北闕自稱衛太子誣罔要斬夏罷天下亭母馬及馬弩關六月封皇后父驃騎將軍上官安為桑樂侯詔曰朕修古帝王之事通保傅傳孝經論語尚書未云有明其令三輔太常舉賢良各二人郡國文學高第各一人賜中二千石以下至吏民爵各有差罷儋耳真番郡秋大鴻臚廣明軍正王平擊益州斬首捕虜三萬餘頭六年春正月上耕于上林二月詔有司問郡國所舉賢良文學民所疾苦議罷鹽鐵𣙜酤栘中監蘇武前使胸奴留單于庭十九年乃還奉使全節以武為典屬國賜錢百萬夏旱大雩不得舉火秋七月罷𣙜酤官令民得以律占租賣酒升四錢以邊塞闊遠取天水隴西張掖郡各二縣置金城郡鉤町侯毋波助漢擊反者有功詔立母波為鉤町王大鴻臚廣明將率有功賜爵關內侯食邑元鳯元年春長公主共養勞苦復以藍田益長公主湯沐邑泗水戴王前薨以毋嗣國除後宫有遺腹子暖許遠反相內史不奏言上聞而憐之立暖為泗水王相內史皆下獄三月賜郡國所選有行義者涿郡韓福等五人帛人五十匹遣歸詔曰朕閔勞以官職之事其務修孝悌以教鄉里令郡縣常以正月賜羊酒有不幸者賜衣被一襲祠以中牢武都氐人反遣執金吾馬適建姓馬適名建龍額侯額音洛韓增大鴻臚廣明將三輔太常徒皆免刑擊之夏六月赦天下秋七月乙亥晦日有蝕之既八月改始元為元鳯九月鄂邑長公主燕王旦與左將軍上官桀桀子驃騎將軍安御史大夫桑𢎞羊皆謀反伏誅初桀安父子與大將軍光爭權欲害之詐使人為燕王旦上書言光罪時上年十四覺其詐後有譖光者上輒怒曰大將軍國家忠臣先帝所屬敢有譖毁者坐之光由是得盡忠語在燕王霍光傳冬十月詔曰左將軍安陽侯桀驃騎將軍桑樂侯安御史大夫𢎞羊皆數以邪枉干輔政大將軍不聽而懷怨望與燕王通謀燕王遣壽西長孫縱之壽西姓長名孫姓縱之名賂遺長公主丁外人謁者杜延年大將軍長史公孫遺等交通私書共謀令長公主置酒伏兵殺大將軍光徵立燕王為天子大逆毋道故稻田使者燕倉先發覺以告大司農敞敞告諫大夫延年延年以聞丞相徵事任宫手捕斬桀丞相少史王壽誘將安入府門皆已伏誅吏民得以安封延年倉宫壽皆為列侯又曰燕王迷惑失道前與齊王子劉澤等為逆抑而不揚望王反道自新今乃與長公主及左將軍桀等謀危宗廟王及公主皆自伏辜其赦王太子建公主子文信及宗室子與燕王上官桀等謀反父母同産當坐者皆免為庶人其吏為桀等所詿誤未發覺在吏者除其罪二年夏四月上自建章宫徙未央宫大置酒賜郎從官帛及宗室子錢人二十萬吏民獻牛酒者賜帛人一匹六月赦天下詔曰朕閔百姓未贍前年減漕三百萬石頗省乘輿馬及苑馬以補邊郡三輔傳馬其令郡國毋斂今年馬口錢三輔太常得以收粟當賦三年春正月泰山有大石自起立上林有柳樹枯僵自起生罷中牟苑賦貧民詔曰乃者民被水災頓匱於食朕虛倉廩使使者振困乏其止四年毋漕三年以前所振貸非丞相御史所請邊郡受牛者勿收責夏四月少府徐仁廷尉王平左馮翊賈勝胡皆坐縱反者仁自殺平勝皆要斬冬遼東烏桓反以中郎將范明友為度遼將軍將北邊七郡郡二千騎擊之四年春正月丁亥帝加元服見于高廟賜諸侯王丞相大將軍列侯宗室下至吏民金帛牛酒各有差賜中二千石以下及天下民爵毋收四年五年口賦三年以前逋更賦未入者皆勿收令天下酺五日甲戍丞相千秋薨夏四月詔度遼將軍明友前擊益州反虜後擊武都反氐及今破烏桓皆有功封為平陵侯平樂監傅介子持節使誅斬樓蘭王安歸首縣北闕封義陽侯五月丁丑孝文廟正殿火上及郡臣皆素服發中二千石將五校作治六日成太常及廟令丞郎吏皆劾大不敬會赦太常轑陽侯德免為庶人六月赦天下五年春正月廣陵王來朝益國萬一千戶賜錢二千萬黃金二百斤劔二安車一乘馬二駟夏大旱六月發三輔及郡國惡少年吏有告劾亡者屯遼東秋罷象郡分屬鬱林牂柯冬十一月大雷十二月庚戍丞相欣薨六年春正月募郡國徒築遼東元莵城夏赦天下詔曰夫榖賤傷農今三輔榖減賤其令以叔粟當今年賦右將軍張安世宿衛忠勤封富平侯烏桓復犯塞遣度遼將軍范明友擊之元平元年春二月詔減口賦錢有司奏請減什三上許之甲申晨有流星大如月衆星皆隨西行夏四月癸未帝崩于未央宫六月壬申葬平陵在長安西北七十里年二十二班固曰孝昭以幼年即位而知燕蓋上官逆黨之詐不疑霍光委任以政當孝武奢侈餘弊師旅之後海內虛耗戶口減半光知時務之要輕繇薄賦與民休息至始元元鳯之間胸奴和親百姓充實舉賢良文學問民所疾苦議鹽鐵而罷𣙜酤尊號曰昭不亦宜乎孝昭帝始元元鳯各六年元平元年即位十三年孝宣皇帝初名病已元康二年更名詢之字謀武帝曽孫戾太子孫也太子納史良娣生史皇孫皇孫納王夫人生宣帝號曰皇曽孫生數月遭巫蠱事太子良娣皇孫王夫人皆遇害惟餘曽孫一人曽孫雖在襁褓猶坐收繫郡邸獄丙吉為廷尉監治巫蠱於郡邸愍曽孫之無辜使女徒復作淮陽趙徵卿渭城胡組更乳養私給衣食視遇甚有恩巫蠱事連歲不決至後元二年武帝疾往來長楊五柞宫望氣者言長安獄中有天子氣上遣使者分條中都官獄繫者輕重皆殺之內謁者令郭穰夜至郡邸獄吉拒閉使者曰皇曽孫在此他人無辜死猶不可况曽孫乎使者自夕至明不得入因劾奏吉武帝亦悟曰天使之然也乃赦天下吉乃載曽孫送祖母史良娣家後有詔掖庭養視上屬籍宗正時掖庭令張賀嘗事戾太子思顧舊恩哀曽孫奉養曽孫甚謹以私錢供給教書既壯為取暴室嗇夫許廣漢女曽孫因依倚廣漢兄弟及祖母家史氏受詩於東海澓音馥中翁高材好學亦喜遊俠鬪雞走馬具知閭里姦邪吏治得失數上下諸陵周遍三輔嘗困於蓮勺音輦勺鹵中尤樂杜鄠之間率常在下杜時會朝請舍長安尚冠里身足下有毛卧居數有光耀每買餅所從買家輒大讎音售亦以是自怪元平元年四月昭帝崩無嗣大將軍霍光請皇后徵昌邑王賀六月丙寅賀受皇帝璽綬尊皇后曰皇太后賀淫亂不君即位凡二十七日光白皇太后廢之秋七月光奏議曰禮人道親親故尊祖尊祖故敬宗大宗無嗣擇支子孫賢者為嗣孝武皇帝曽孫病已有詔掖庭養視至今年十八師受詩論語孝經操行節儉慈仁愛人可以嗣孝昭皇帝後奉承祖宗子萬姓奏可遣宗正德至曽孫尚冠里舍洗沐賜御府衣太僕以軨獵車奉迎就齊宗正府庚申入未央宫見皇太后封為陽武侯已而羣臣奉上璽綬即皇帝位謁高廟八月己巳丞相敞薨九月大赦天下十一月壬子立皇后許氏賜諸侯王以下金錢至吏民鰥寡孤獨各有差初羣臣方議所立后上乃求微時故劒羣臣知其意乃奏立許倢妤為皇后后父廣漢封昌城君後封平恩侯皇太后歸長樂宫初置屯衛本始元年春正月募郡國吏民訾百萬以上徙平陵遣使者持節詔郡國二千石謹牧養民而風德化大將軍光稽首歸政上謙讓委政焉論定策功益封大將軍光萬七千戶車騎將軍光祿勳富平侯安世萬戶詔曰故丞相安平侯敞等居位守職與大將軍光車騎將軍安世建議定策以安宗廟功賞未加而薨其益封敞嗣子忠及丞相陽平侯義度遼將軍平陵侯明友前將軍龍雒侯增太僕建平侯延年太常蒲侯昌諫大夫宜春侯談當塗侯平杜侯屠耆堂長信少府關內侯勝邑戶各有差封御史大夫廣明為昌水侯後將軍充國為營平侯大司農延平為陽城侯少府樂成為爰氏侯光祿大夫遷為平邱侯賜右扶風德典屬國武廷尉光宗正德大鴻臚賢詹事畸光祿大夫吉京輔都尉廣漢爵皆關內侯德武食邑夏四月庚午地震詔內郡國舉文學高第各一人五月鳯皇集膠東千乘赦天下賜吏二千石諸侯相下至中都官宦吏六百石爵各有差自左更至五大夫賜天下人爵各一級孝者二級女子百戶牛酒租稅勿收六月詔曰故太子在湖未有號諡歲時祠其議諡置圍邑秋七月詔立燕刺王太子建為廣陽王立廣陵王胥少子𢎞為髙密王二年春以水衡錢為平陵徙民起第宅大司農陽城侯田延年有罪自殺夏五月詔曰朕以眇身奉承祖宗夙夜惟念孝武皇帝躬履仁義選明將討不服胸奴遠遁平氐羌昆明南越百蠻鄉風欵塞來享建太學修郊祀定正朔協音律封泰山塞宣房符瑞應寶鼎出白麟獲功德茂盛不能盡宣而廟樂未稱其議奏有司奏請宜加尊號尊孝武廟為世宗廟奏盛德文始五行之舞天子世世獻武帝巡守所幸之郡國皆立廟賜民爵一級女子百戶牛酒胸奴數侵邊又西伐烏孫昆彌及公主上書言願發國精兵以擊胸奴唯天子哀憐出兵以救公主秋大興發調關東輕車鋭卒選郡國吏三百石伉健習騎射者皆從軍御史大夫田廣明為祁連將軍後將軍趙充國為蒲類將軍雲中太守田順為虎牙將軍及度遼將軍范明友前將軍韓增凡五將軍兵十五萬騎校尉常惠持節護烏孫兵咸擊胸奴三年春正月癸亥皇后許氏崩戊辰五將軍師發長安夏五月軍罷祁連將軍廣明虎牙將軍順有罪下有司皆自殺校尉常惠將烏孫兵入胸奴右地大克獲封列侯大旱郡國傷旱甚者民毋出租稅三輔民就賤者且毋收事盡四年六月己丑丞相義薨四年春正月詔曰蓋聞農者興德之本也今歲不登已遣使者振貸困乏其令太官損膳省宰樂府減樂人使歸就農業丞相以下至都官令丞上書入榖輸長安倉助貸貧民民以車船載榖入關者得毋用傳三月乙卯立皇后霍氏賜丞相以下至郎吏從官金錢帛各有差赦天下夏四月壬寅郡國四十九地震或山崩水出北海琅邪地震壞祖宗廟詔丞相御史與列侯中二千石博問經學之士有以應變輔朕之不逮毋有所諱令三輔太常內郡國舉賢良方正各一人律令有可蠲除以安百姓條奏被地震壞敗甚者勿收租賦大赦天下上以宗廟墮素服避正殿五日五月鳳皇集北海安邱淳于秋廣川王吉有罪廢遷上庸自殺地節元年春正月有星孛于西方三月假郡國貧民田夏六月詔宗室屬未盡而以罪絶若有賢材改行勸善其復屬使得自新冬十一月楚王延壽謀反自殺十二月癸亥晦日有蝕之二年春三月庚午大司馬大將軍光薨詔曰大司馬大將軍博陸侯宿衛孝武皇帝三十餘年輔孝昭皇帝十有餘年遭大難躬秉義率三公諸侯九卿大夫定萬世策以安宗廟天下蒸庶咸以康寧功德茂盛朕甚嘉之復其後世疇其爵邑世世毋有所與功如蕭相國夏四月鳳皇集魯郡羣鳥從之大赦天下五月光祿大夫平邱侯王遷有罪下獄死上始親政事又思報大將軍功德乃復使樂平侯山領尚書事而令羣臣得奏封事以知下情五日一聽事丞相以下各奉職奏事以傅奏其言考試功能侍中尚書功勞當遷及有異善厚加賞賜至于子孫終不改易樞機周密品式備具上下相安莫有茍且之意也三年春三月詔膠東相成治有異等其秩成二千石賜爵關內侯又詔加賜鰥寡孤獨高年帛二千石嚴教吏謹視遇毋令失職令內郡國舉賢良方正可親民者夏四月戊申立皇太子大赦天下賜御史大夫爵關內侯中二千石爵右庶長天下當為父後者爵一級賜廣陵王黃金千斤諸侯王十五人黃金各百斤列侯在國者八十七人黃金各二十斤九月壬申地震冬十月詔有能針朕過失及賢良方正直言極諫之士以匡朕之不逮毋諱有司又詔罷車騎將軍右將軍屯兵及池籞未御幸者假與貧民郡國宫館勿復修治流民還歸者假公田貸種食且勿算事十一月詔令郡國舉孝弟有行義聞於鄉里者各一人十二月初置廷尉平四人秩六百石省文山郡并蜀四年春二月封外祖母為博平君故酇侯蕭何曽孫建世為侯詔民有大父母父母喪者勿繇事使得收斂送終盡其子道夏五月詔自今子首匿父母妻匿夫孫匿大父母皆勿坐其父母匿子夫匿妻大父母匿孫殊死以下皆上請廷尉以聞立廣川惠王孫文為廣川王秋七月大司馬霍禹謀反詔曰乃者東織室令史張赦使魏郡豪李竟報冠陽侯霍雲謀為大逆朕以大將軍故抑而不揚冀其自新今大司馬博陸侯禹與母宣成侯夫人顯及從昆弟冠陽侯雲樂平侯山諸姊妹壻度遼將軍范明友長信少府鄧廣漢中郎將任勝騎都尉趙平長安男子馮殷等謀為大逆顯前又使女侍醫淳于衍進藥殺共哀皇后謀毒太子欲危宗廟逆亂不道咸伏其辜諸為霍氏所詿誤未發覺在吏者皆赦除之八月己酉皇后霍氏廢九月詔遣使者循行郡國問民所疾苦減天下鹽賈又詔令郡國歲上繫囚以掠笞若瘐死者所坐名縣爵里丞相御史課殿最以聞十二月清河王年有罪廢遷房陵元康元年以杜東原上為初陵更名杜縣為杜陵徙丞相將軍列侯吏二千石訾百萬者於杜陵三月詔以鳯皇集泰山陳留甘露降未央宫其赦天下徒賜勤事吏中二千石以下至六百石爵自中郎吏至五大夫佐史以上二級民一級女子百戶牛酒加賜鰥寡孤獨三老孝弟力田帛所振貸勿收夏五月立皇考廟益奉明園户為奉明縣復高皇帝功臣綘侯周勃等百六十家子孫令奉祭祀其毋嗣者復其次秋八月詔曰朕不明六藝鬱于大道是以隂陽風雨未時其博舉吏民厥身修正通文學明於先聖之術宣究其意者各二人中二千石各一人冬置建章衛尉二年春正月詔赦天下與士大夫厲精更始二月乙丑立皇后王氏賜丞相以下至郎從官錢帛各有差三月以鳯皇甘露降集賜天下吏爵二級民一級女子百戶牛酒鰥寡孤獨高年帛夏五月詔曰比者獄吏用法持巧析律二端增辭飾非奏不如實二千石各察官屬勿用此人吏務平法或擅興繇役飾厨傳稱過使客越職踰法以取名譽朕所不取今年頗被疾疫之災其令郡國被災甚者毋出今年租賦又曰聞古天子之名難知而易諱也今百姓多上書觸諱以犯罪者朕甚憐之其更命詢諸觸諱在令前者赦之冬京兆尹趙廣漢有罪要斬三年春以神爵數集泰山賜諸侯王丞相將軍列侯二千石金郎從官帛各有差賜天下吏爵二級民一級女子百戶牛酒鰥寡孤獨高年帛三月詔封故昌邑王賀為海昏侯又詔曰朕微眇時御史大夫邴吉中郎將史曽史元長樂衛尉許舜侍中光祿大夫許延壽皆與朕有舊恩及故掖庭令張賀輔導朕躬修文學經術恩惠卓異厥功茂焉詩不云乎無德不報封賀所子弟子侍中中郎將彭祖為陽都侯追賜賀諡曰陽都哀侯吉曽元舜延壽皆為列侯故人下至郡邸獄復作嘗有阿保之功皆受官祿田宅財物各以恩深淺報之夏六月詔曰前年夏神爵集雍今春五色鳥以萬數飛過屬縣翺翔而舞欲集未下其令三輔毋得以春夏擲巢探卵彈射飛鳥具為令立皇子欽為淮陽王四年春正月詔曰朕惟耆老之人髮齒墮落血氣衰微亦亡暴虐之心今或罹文法拘執囹圄不終天命朕甚憐之自今已來諸年八十以上非誣告殺傷他皆勿坐遣太中大夫強等十二人循行天下存問鰥寡覽觀風俗察吏治得失舉茂材異倫之士二月河東霍徵史等謀反誅之三月詔以神爵五采以萬數集長樂未央北宫高寢甘泉泰畤殿中及上林苑賜天下吏爵二級民一級女子百戶牛酒加賜三老孝弟力田帛人二匹鰥寡孤獨各一匹秋八月賜右扶風尹翁歸子黃金百斤以奉其祭祀又賜功臣適後黃金人二十斤丙寅大司馬衛將軍安世薨比年豐榖石五錢神爵元年春正月行幸甘泉祠泰畤三月幸河東祠后土詔曰乃者元康四年嘉榖元稷降于郡國神爵仍集金芝九莖産于函德殿銅池中九真獻竒獸南郡獲白虎威鳯朕飭躬齋精祈為百姓東濟大河神魚出舞幸萬歲宫神爵翔集朕之不德懼不能任其以五年為神爵元年賜天下勤事吏爵二級女子百戶牛酒鰥寡孤獨高年帛所振貸物勿收行所過毋出田租西羌反發三輔中都官徒弛刑及應募佽飛射士羽林孤兒胡越騎三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士羌騎詣金城夏四月遣後將軍趙充國強弩將軍許延壽擊西羌六月有星孛于東方即拜酒泉太守辛武賢為破羌將軍與兩將軍並進詔曰軍旅暴露轉輸煩勞其令諸侯王列侯蠻夷王侯君長當朝二年者皆毋朝秋賜故大司農朱邑子黃金百斤以奉祭祀是歲趙充國言屯田便宜十二事語在充國傳二年春二月詔以鳯皇甘露降集京師赦天下夏五月羌虜降服斬其首惡大豪揚玉酋非首置金城屬國以處降羌秋胸奴日逐王先賢撣音田將人衆萬餘來降使都護西域騎都尉鄭吉迎日逐破車師皆封列侯九月司𨽻校尉蓋寬饒有罪下有司自殺胸奴單于遣名王奉獻賀正月始和親三年春起樂遊苑三月丙午丞相相薨秋八月詔曰吏不亷平則治道衰今小吏皆勤事而奉祿薄欲其毋侵漁百姓難矣其益吏百石以下奉十五四年春二月詔曰乃者鳯皇甘露降集京師嘉瑞並見修興太一五帝后土之祠祈為百姓蒙祉福鸞鳯萬舉蜚覽翺翔集止于旁齋戒之暮神光顯著薦鬯之夕神光交錯或降于天或登于地或從四方來集于壇上帝嘉嚮嚮讀曰饗海內承福其赦天下賜民爵一級女子百戶牛酒鰥寡孤獨高年帛夏四月潁川太守黃霸以治行尤異秩中二千石賜爵關內侯黃金百斤及潁川吏民有行異者爵人二級力田一級貞婦順女帛令郡國舉賢良可親民者各一人五月胸奴單于遣弟呼留若王勝之來朝呼留若王謡也勝之人名冬十月鳳皇十一集杜陵十一月河南太守嚴延年有罪棄市十二月鳯皇集上林五鳳元年春正月行幸甘泉郊泰畤皇太子冠皇太后賜丞相將軍列侯中二千石帛人百匹大夫人八十匹夫人六十匹又賜列侯嗣子爵五大夫男子為父後者爵一級夏赦徒作杜陵者冬十二月乙酉朔日有蝕之左馮翊韓延壽有罪棄市二年春三月行幸雍祠五畤夏四月己丑大司馬車騎將軍增薨秋八月詔百姓嫁娶得具酒食相賀召郡國二千石毋有所禁冬十一月胸奴呼遫纍遫古速字纍力追反單于帥衆來降封為列侯十二月平通侯楊惲於吻反坐前為光祿勳有罪免為庶人不悔過怨望大逆不道要斬三年春正月癸卯丞相吉薨三月行幸河東祠后土詔曰往者胸奴數為邊寇百姓被其害朕承至尊未能綏安胸奴虛閭權渠單于請求和親病死右賢王屠耆堂代立骨肉大臣立虛閭權渠單于子為呼韓邪單于擊殺屠耆堂諸王並自立分為五單于更相攻擊死者以萬數畜産大耗什八九人民飢餓相燔燒以求食因大乖亂單于閼氏上音焉下音支子孫昆弟及呼遫纍單于名王右伊秩訾且渠當戶以下伊秩訾且渠當戶皆胸奴官號也訾音子移反且音子余反將衆五萬人來降歸義單于稱臣使弟奉珍朝賀正月北邊晏然靡有兵革之事朕飭躬齋戒郊上帝祠后土神光並見或興于谷燭耀齋宫十有餘刻甘露降神爵集已詔有司告祠上帝宗廟三月辛丑鸞鳯又集長樂宫東闕中樹上飛下止地文章五色留十餘刻吏民並觀朕之不敏婁蒙嘉瑞懼不能任其減天下口錢赦殊死以下賜民爵一級女子百戶牛酒大酺五日加賜鰥寡孤獨高年帛置西河北地屬國以處胸奴降者四年春正月廣陵王胥有罪自殺胸奴單于稱臣遣弟谷蠡上音鹿下音犂王入侍以邊塞亡寇減戍卒什二大司農中丞耿壽昌奏設常平倉以給北邊省轉漕賜爵關內侯夏四月辛丑晦日有蝕之詔遣使者問民所疾苦復遣丞相御史掾二十四人循行天下舉寃獄察擅為苛禁深刻不改者甘露元年春正月行幸甘泉祠泰畤胸奴呼韓邪單于遣子右賢王銖婁渠堂入侍銖音殊婁力于反二月丁巳大司馬車騎將軍延壽薨夏四月黃龍見新豐丙申太上皇廟火甲辰孝文廟火上素服五日冬胸奴單于遣弟左賢王來朝賀二年春正月立皇子囂為定陶王詔曰乃者鳳皇甘露降集黃龍登興醴泉滂流枯稿榮茂神光並見咸受禎祥其赦天下減民算三十賜諸侯王丞相將軍列侯中二千石金錢各有差賜民爵一級女子百戶牛酒鰥寡孤獨高年帛夏四月遣護軍都尉祿將兵擊珠崖秋九月立皇子宇為東平王冬十二月行幸萯音倍陽宫屬之欲反玉觀胸奴呼韓邪單于欵五原塞願奉國珍朝三年正月詔有司議咸曰單于非正朔所加王者外客也禮儀宜如諸侯王稱臣昧死再拜位次諸侯王下詔曰蓋聞五帝三王禮所不施不及以政今胸奴單于稱北藩臣朕德不能𢎞覆其以客禮待之位在諸侯王上三年春正月行幸甘泉郊泰畤胸奴呼韓邪單于稽古兮反侯姍音刪來朝贊謁稱藩臣而不名賜以璽綬冠帶衣裳安車駟馬黃金錦繡繒絮使有司道單于先行就邸長安宿長平上自甘泉宿池陽宫上登長平阪詔單于毋謁其左右當戶之羣皆列觀蠻夷君長王侯迎者數萬人夾道陳上登渭橋咸稱萬歲單于就邸置酒建章宫饗賜單于觀以珍寶二月單于罷歸遣長樂衛尉高昌侯忠車騎都尉昌騎都尉虎將萬六千騎送單于單于居幕南保光祿城詔北邊振榖食郅支單于遠遁胸奴遂定詔曰乃者鳳皇集新蔡羣鳥四靣行列皆鄉鳯皇立以萬數其賜汝南太守帛百匹新蔡長吏三老孝弟力田鰥寡孤獨各有差賜民爵二級毋出今年租三月己丑丞相霸薨詔諸儒講五經同異太子太傅蕭望之等平奏其議上親稱制臨決焉乃立梁邱易大小夏侯尚書榖梁春秋博士冬烏孫公主來歸四年夏廣川王海陽有罪廢遷房陵冬十月丁卯未央宫宣室閣火黃龍元年春正月行幸甘泉郊泰畤胸奴呼韓邪單于來朝禮賜如初二月單于歸國詔曰今吏或以不禁姦邪為寬大縱釋有罪為不苛或以酷惡為賢皆失其中方今天下少事繇役省減兵革不動而民多貧盜賊不止其咎安在上計簿具文而已務為欺謾以避其課三公不以為意朕將何任自今諸請詔省卒徒自給者皆止御史察計簿疑非實者按之使真偽無相亂三月有星孛于王良閣道入紫宫夏四月詔曰舉亷吏誠欲得其真也吏六百石位大夫有罪先請秩祿上通足以效其賢材自今以來毋得舉冬十二月甲戍帝崩于未央宫年四十三班固曰孝宣之治信賞必罰綜核名實政事文學法理之士咸精其能至于技巧工匠器械自元成間鮮能及之亦足以知吏稱其職民安其業也遭值胸奴乖亂推亡固存信威北夷單于慕義稽首稱藩功光祖宗業垂後嗣可謂侔德殷宗周宣矣孝宣帝本始地節元康神爵五鳯甘露各四年黃龍元年即位二十五年孝元皇帝名奭之字盛宣帝太子也母曰共哀許皇后宣帝微時生民間年二歲宣帝即位八歲立為皇太子壯大柔仁好儒見宣帝所用多文法吏以刑名繩下大臣楊惲蓋寬饒等坐刺譏辭語見誅嘗侍燕從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以霸王道雜之奈何純任德教用周政乎且俗儒不逹時宜好是古非今使人眩於名實不知所守何足委任乃歎曰亂我家者太子也繇是疏太子而愛淮陽王欲立之曰淮陽王明察好法宜為吾子而王母張倢妤尤幸上有意欲用淮陽王代太子然以少依許氏俱從微起故終不背焉黃龍元年十二月癸巳宣帝崩太子即皇帝位謁高廟尊皇太后曰太皇太后皇后曰皇太后初元元年春正月辛丑孝宣皇帝葬杜陵陵在長安南五十里賜諸侯王公主列侯黃金吏二千石以下錢帛各有差大赦天下三月封皇太后兄侍中中郎將王舜為安平侯丙午立皇后王氏以三輔太常郡國公田及苑可省者振業貧民資不滿千錢者賦貸種食封外祖父平恩戴侯同産弟子中常侍許嘉為平恩侯奉戴侯後夏四月詔遣光祿大夫褒等十二人循行天下存問耆老鰥寡孤獨困乏失職之民延登賢俊招顯側陋因覽風俗之化又詔關東今年榖不登其令郡國被災害甚者毋出租賦江海陂湖園池屬少府者以假貧民勿租賦賜宗室有屬籍者馬一匹至二駟三老孝者帛五匹弟者力田三匹鰥寡孤獨二匹吏民五十戶牛酒六月以民疾疫令太官損膳減樂府員省苑馬以振困乏秋八月上郡屬國降胡萬餘人亡入胸奴九月關東郡國十一大水飢或人相食轉旁郡榖以相救詔令諸宫館希幸御者勿繕治太僕減榖食馬水衡省肉食獸二年春正月行幸甘泉祠泰畤賜雲陽民爵一級女子百戶牛酒立弟竟為清河王三月立廣陵厲王太子霸為王詔罷黃門乘輿狗馬水衡禁囿宜春下苑少府佽飛外池嚴籞池田假與貧民詔曰朕德不逮災異並臻乃二月戊午地震隴西郡毁落太上皇廟殿壁木飾壞敗獂音桓道縣城郭官寺及民室屋壓殺人衆山崩地裂水泉涌出其令郡國被地動災甚者毋出租賦赦天下有可蠲除減省以便百姓者條奏毋有所諱丞相御史中二千石舉茂材異等直言極諫之士朕將親覽焉夏四月丁巳立皇太子賜御史大夫爵關內侯中二千石右庶長天下當為父後者爵一級列侯錢各二十萬五大夫十萬六月關東飢齊地人相食秋七月詔曰歲比災害一年中地再動北海水溢流殺人民其咎安在公卿其悉意陳朕過失靡有所諱冬詔故前將軍望之傅朕八年道以經書厥功茂焉其賜爵關內侯邑八百戶朝朔望十二月中書令𢎞恭石顯等譖望之令自殺三年春令諸侯相位在郡守下珠崖郡山南縣反待詔賈捐之請棄之乃罷珠崖夏四月乙未晦茂陵白鶴館災詔曰天降災異有司莫言朕過百姓仍遭凶厄毋以相振朕甚閔焉其赦天下夏旱立長沙煬王弟宗為王封故海昏侯賀子代宗為侯六月詔以隂陽錯謬風雨不時其罷甘泉建章宫衛令就農百官各省費丞相御史舉天下明隂陽災異者各三人於是言事者衆或進擢見用人人自以為得上意四年春正月行幸甘泉郊泰畤三月行幸河東祠后土赦汾隂徒賜民爵一級女子百戶牛酒鰥寡高年帛行所過毋出租賦五年春正月以周子南君為周承休侯位次諸侯王三月行幸雍祠五畤夏四月有星孛于參詔以皇天降異咎流萬民其令大官毋日殺所具各減半乘輿秣馬無乏正事而已罷角抵上林宫館希御幸者齊三服官北假田官鹽鐡官常平倉博士弟子毋置員以廣學者賜宗室子有屬籍者馬一匹至二駟三老孝者帛人五匹弟者力田三匹鰥寡孤獨二匹吏民五十戶牛酒省刑罰七十餘事除光祿大夫以下至郎中保父母同産之令令從官給事宫司馬中者得為大父母父母兄弟通籍冬十二月丁未御史大夫貢禹卒衛司馬谷吉使胸奴不還永光元年春正月行幸甘泉郊泰畤赦雲陽徒賜民爵一級女子百戶牛酒高年帛行所過毋出租賦二月詔丞相御史舉質朴敦厚遜讓有行者光祿歲以此科第郎從官三月詔赦天下令厲精自新各務農畝無田者皆假之貸種食如貧民賜吏六百石以上爵五大夫勤事吏二級為父後者民一級女子百戶牛酒鰥寡孤獨高年帛是月雨雪隕霜傷麥稼秋罷當言罷某官某事此下疑有爛脫二年春二月詔大赦天下賜民爵一級女子百戶牛酒鰥寡孤獨高年三老孝弟力田帛又賜諸侯王公主列侯黃金中二千石以下至中都官長吏各有差吏六百石以上爵五大夫勤事吏各二級三月壬戍朔日有蝕之詔以天見大異以戒朕躬其令內郡國舉茂材異等賢良直言之士各一人夏六月詔以連年不登四方飢饉朕甚傷焉其赦天下秋七月西羌反遣右將軍馮奉世擊之八月以太常任千秋為奮威將軍别將五校並進三年春西羌平軍罷三月立皇子康為濟陽王夏四月癸未大司馬車騎將軍接薨冬十一月詔曰乃者己丑地動中冬雨水大霧盜賊並起吏何不以時禁各悉意對冬復鹽鐡官博士弟子員以用度不足民多復除毋以給中外繇役四年春二月詔以百姓婁遭凶咎加以邊竟不安其赦天下所貸貧民勿收責三月行幸雍祠五畤夏六月甲戍孝宣園東闕災戊寅晦日有蝕之詔公卿勉思天戒愼身修永以輔朕之不逮直言盡意毋有所諱九月戊子罷衛思后園及戾園冬十月罷祖宗廟在郡國者諸陵分屬三輔以渭城壽陵亭部原上為初陵詔曰安土重遷黎民之性頃者有司奏徙郡國民以奉園陵令百姓棄墳墓别親戚非人情所願今所為初陵者勿置縣邑使天下安土樂業亡有動搖之心布告天下使明知之又罷先后父母奉邑五年春正月行幸甘泉郊泰畤三月上幸河東祠后土秋潁川水出流殺人民吏從官縣被害者與告士卒遣歸冬上幸長楊射熊館布車騎大獵十二月乙酉毁太上皇帝孝惠皇帝寢廟園建昭元年春三月上幸雍祠五畤秋八月有白蛾羣飛蔽日從東都門至軹道冬河間王元有罪廢遷房陵罷孝文太后孝昭太后寢園二年春正月行幸甘泉郊泰畤三月行幸河東祠后土益三河大郡太守秩戶十二萬為大郡夏四月赦天下六月立皇子興為信都王閏月丁酉太皇太后上官氏崩冬十一月齊楚地震大雨雪樹折屋壞淮陽王舅張博魏郡太守京房坐窺道諸侯王以邪意漏泄省中語博要斬房棄市三年夏令三輔都尉大郡都尉秩皆二千石六月甲辰丞相元成薨秋使護西域騎都尉甘延壽副校尉陳湯嬌與矯同發戊巳校尉屯田吏士及西域胡兵攻郅支單于冬斬其首傳詣京師縣蠻夷邸門四年春正月以誅郅支單于告祠郊廟赦天下夏四月詔遣諫大夫博士賞等二十一人循行天下存問耆老鰥寡孤獨乏困失職之人舉茂材特立之士六月甲申中山王竟薨藍田地沙石雍霸水安陵岸崩雍涇水水逆流五年春三月詔赦天下賜民爵一級女子百戶牛酒三老孝弟力田帛又詔方春農桑興百姓戮力之時而不良之吏覆案小罪徵召證案興不急之事以妨百姓公卿其明察申敕之夏六月庚申復戾園壬申晦日有蝕之秋七月庚子復太上皇寢廟園原廟昭靈后武哀王昭哀后衛思后園竟寧元年春正月胸奴呼韓邪單于來朝詔以單于保塞邊垂無事其改元為竟寧賜單于待詔掖庭王嬙為閼氏皇太子冠賜列侯嗣子爵五大夫天下為父後者爵一級二月御史大夫延壽卒三月癸未復孝惠皇帝寢廟園孝文太后孝昭太后寢園夏封騎都尉甘延壽為列侯賜副校尉陳湯爵關內侯黃金百斤夏五月壬辰帝崩于未央宫毁太上皇孝惠孝景皇帝廟罷孝文孝昭太后昭靈后武哀王昭哀后寢園秋七月丙戍葬渭陵在長安北五十六里班彪曰臣外祖兄弟為元帝侍中語臣曰元帝多材藝善史書鼓琴瑟吹洞蕭自度曲被歌聲分刌制度窮極幼眇上音要下音妙少而好儒及即位徵用儒生委之以政貢薛韋匡迭為宰相而上牽制文義優遊不斷孝宣之業衰焉然寬𢎞盡下出於恭儉號令溫雅有古之風烈孝元帝初元永光建昭各五年竟寧元年即位十六年孝成皇帝名驁五到反之字俊元帝太子也母曰王皇后元帝在太子宫生帝于甲觀畫堂為世嫡皇孫宣帝愛之字曰太孫常置左右三歲而宣帝崩元帝即位帝為太子壯好經書寬博謹愼初居桂宫嘗被急召出龍樓門不敢絶馳道西至直城門得絶乃度還入作室門上遲之問其故以狀對上大悅乃著令令太子得絶馳道云其後幸酒樂燕樂上樂讀如夲字或音五教反下樂音來各反上不以為能而定陶恭王有材藝母傅昭儀又愛幸上以故嘗有意欲以恭王為嗣賴侍中史丹護太子家輔助有力上亦以先帝尤愛太子故得毋廢竟寧元年五月元帝崩六月乙未太子即皇帝位謁高廟尊皇太后曰太皇太后皇后曰皇太后以元舅侍中衛尉陽平侯王鳳為大司馬大將軍領尚書事己未有司言乘輿牛車馬禽獸皆非禮不宜以葬奏可秋七月大赦天下建始元年春正月乙丑皇曽祖悼考廟災立故河間王弟上郡庫令良為王有星孛于營室罷上林詔獄二月右將軍長史姚尹等使胸奴還去塞百餘里暴風火發燒殺尹等七人賜諸侯王丞相將軍列侯王太后公主王主吏二千石黃金宗室諸官吏千石以下至二百石及宗室子有屬籍者三老孝弟力田鰥寡孤獨錢帛各有差吏民五千戶牛酒詔以火災星變故赦天下與士大夫自新封舅諸吏光祿大夫關內侯王崇為安成侯賜舅王談商立根逢時爵關內侯夏四月黃霧四塞博問公卿大夫無有所諱六月有青蠅無萬數集未央宫殿中朝者坐秋罷上林宫館希御幸者二十五所八月有兩月相承晨見東方九月戊子流星光燭地長四五丈委曲蛇形貫紫宫十二月作長安南北郊罷甘泉汾隂祠是日大風拔甘泉畤中大木十韋韋與圍同以上郡國被災什四以上毋收田租二年春正月罷雍五畤辛巳上始郊祀長安南郊詔赦奉郊縣長安長陵及中都官耐罪徒減天下賦錢算四十閏月以渭城延陵亭部為初陵二月詔三輔內郡舉賢良方正各一人三月北宫井水溢出辛丑上始祠后土於北郊丙午立皇后許氏罷六廄技巧官夏大旱東平王宇有罪削樊亢父縣秋罷太子博望苑以賜宗室朝請音才性反者減乘輿廄馬三年春三月赦天下徒賜孝弟力田爵二級諸逋租賦所振貸勿收秋關內大水七月虒上小女陳持弓聞大水至走入橫城門闌入尚方掖門至未央宫鉤盾中吏民驚上城虒音斯虒上地名在渭水邊陳姓持弓名無符籍妄入宫曰闌掖門正門之傍小門如人臂掖也橫音光長安北面西頭第一門也九月詔遣諫大夫林等循行天下冬十二月戊申日有蝕之夜地震未央宫殿中詔以災異婁發令公卿各思朕過失明白陳之丞相御史與將軍列侯中二千石及內郡國舉賢良方正能直言極諫之士詣公車朕將覽焉越嶲山崩四年春罷中書宦官初置尚書員五人夏四月雨雪五月中謁者丞陳臨殺司隸校尉轅豐於殿中秋桃李實大水河決東郡金隄冬十月御史大夫尹忠以河決不憂職自殺河平元年春三月詔曰河決東郡流漂二州校尉王延世隄塞輒平其改元為河平賜天下吏民爵各有差夏四月己亥晦日有蝕之既詔公卿大夫百寮各修其職陳朕過失無有所諱大赦天下六月罷典屬國并大鴻臚秋九月復太上皇寢廟園二年春正月沛郡鐵官冶鐵飛夏六月封舅談商立根逢時皆為列侯三年春二月丙戍犍為地震山崩雍江水水逆流秋八月乙卯晦日有食之光祿大夫劉向校中祕書謁者陳農使使求遺書於天下四年春正月胸奴單于來朝赦天下徒賜孝弟力田爵二級諸逋租賦所振貸勿收二月單于罷歸國三月癸丑朔日有蝕之遣光祿大夫博士嘉等十一人行舉瀕河之郡水所毁傷困乏不能自存者財振貸其為水所流壓死不能自葬令郡國給槥櫝葬埋槥音衛櫝音讀小棺也已葬者與人錢二千避水它郡國在所冗食之冗如勇反散也毋令失職舉敦厚有行能直言之士壬申長陵臨涇岸崩雍涇水夏六月庚戍楚王囂薨山陽火生石中改元為陽朔陽朔元年春二月丁未晦日有蝕之三月赦天下徒冬京兆尹王章有罪下獄死二年春寒詔令公卿大夫政事務順四時月令三月大赦天下夏五月除吏八百石五百石秩秋關東大水流民欲入函谷天井壺口五阮阮其遠反關者勿苛留遣諫大夫博士分行視八月甲申定陶王薨九月詔奉使者不稱令丞相與中二千石二千石雜舉可充博士位者使卓然可觀是嵗御史大夫張忠卒三年春三月壬戍隕石東郡八夏六月潁川鐡官徒申屠聖等百八十人殺長吏盜庫兵自稱將軍經歷九郡遣丞相長史御史中丞逐捕以軍興從事皆伏辜秋八月丁巳大司馬大將軍王鳳薨四年春正月詔令二千石勉勸農桑二月赦天下秋九月壬申東平王宇薨閏月壬戍御史大夫于永卒鴻嘉元年春二月詔遣諫大夫理等舉三輔三河𢎞農寃獄令公卿大夫部刺史明申敇守相以稱朕意其賜天下民爵一級女子百戶牛酒加賜鰥寡孤獨高年帛逋貸未入者勿收壬午行幸初陵赦作徒以新豐戲鄉為昌陵縣奉初陵賜百戶牛酒上始為微行出冬黃龍見真定二年春行幸雲陽三月博士行飲酒禮有雉蜚集于庭歷階升堂而雊復集諸府又集承明殿詔舉敦厚有行義能直言者夏徙郡國豪傑訾五百萬以上五千戶于昌陵賜丞相御史將軍列侯公主中二千石冡地第宅六月立中山憲王孫雲客為廣德王三年夏四月赦天下令吏民得買爵賈級千錢大旱秋八月乙卯孝景廟闕災冬十一月甲寅皇后許氏廢廣漢男子鄭躬等六十餘人攻官寺篡囚徒盜庫兵自稱山君四年春正月詔以水旱為災關東流冗者衆青幽冀部尤劇遣使者循行郡國被災害什四以上民資不滿三萬勿出租賦逋貸未入皆勿收流民欲入關輒籍內所之郡國謹遇以理務有以全活之思稱朕意秋勃海清河河溢被災者振貸之冬廣漢鄭躬等黨與竇廣犯歷四縣衆且萬人拜河東都尉趙護為廣漢大守發郡中及蜀郡合三萬人擊之或相捕斬除罪旬月平遷護為執金吾賜黃金百斤永始元年春正月癸丑太官淩室火戊午戾后園闕火夏四月封倢妤趙氏父臨為成陽侯五月封舅曼子侍中騎都尉光祿大夫王莽為新都侯六月丙寅立皇后趙氏大赦天下秋七月詔曰朕執德不固謀不盡下過聽將作大匠萬年言昌陵三年可成作治五年中陵司馬殿門內尚未加功天下虛耗百姓罷勞客土疏惡終不可成朕惟其難怛然傷心夫過而不改是謂過矣其罷昌陵及故陵勿徙吏民令天下毋有搖動之心立城陽孝王子俚為王八月丁丑太皇太后王氏崩二年春正月己丑大司馬車騎將軍王音薨二月癸未夜星隕如雨乙酉晦日有蝕之詔曰乃者龍見東萊日有蝕之天著變異以顯朕郵朕甚懼焉公卿申敇百寮深思天誡有可省減便安百姓者條奏所振貸貧民勿收又曰關東比歲不登吏民以義收食貧民榖物助縣官振贍者已賜直其百萬以上加賜爵右更欲為吏補三百石其吏也遷二等三十萬以上賜爵五大夫吏亦遷二等民補郎十萬以上家毋出租賦三歲萬錢以上一年冬十一月行幸雍祠五畤十二月詔曰前將作大匠萬年知昌陵卑下妄請營作積土增高多興繇役百姓罷極天下匱竭常侍閎前為大司農中丞數奏昌陵不可成侍中衛尉長數白宜早止徙家反故處閎前賜爵關內侯黃金百斤今賜長關內侯食邑千戶閎五百戶萬年邪佞不忠毒流衆庶雖蒙赦不宜居京師其徙萬年焞煌郡是歲御史大夫王駿卒三年春正月己卯晦日有蝕之詔曰天災仍重朕甚懼焉惟民之失職臨遣太中大夫嘉等循行天下存問耆老民所疾苦其與部刺史舉惇朴遜讓有行義者各一人冬十月庚辰皇太后詔有司復甘泉泰畤汾隂后土雍五畤陳倉陳寶祠十一月尉氏男子樊並等十三人謀反殺陳留太守劫略吏民自稱將軍徒李談等五人共格殺並等皆封為列侯十二月山陽鐵官徒蘇令等二百二十八人攻殺長吏盜庫兵自稱將軍經歷郡國十九殺東郡太守汝南都尉遣丞相長史御史中丞持節督趣逐捕汝南太守嚴欣捕斬令等遷欣為大司農賜黃金百斤四年春正月行幸甘泉郊泰畤神光降集紫殿大赦天下賜雲陽吏民爵女子百戶牛酒鰥寡孤獨高年帛三月行幸河東祠后土賜吏民如雲陽行所過毋出田租夏四月癸未長樂臨華殿未央宫東司馬門皆災六月甲午霸陵園門闕災出杜陵諸未嘗御者歸家詔曰乃者地震京師火災婁降朕甚懼之有司其悉心明對厥咎朕將親覽焉又曰聖王明禮制以序尊卑異車服以彰有德今公卿列侯親屬近臣奢侈踰制吏民慕效寖以成俗其申敇有司以漸禁之青緑民所常服且勿止列侯近臣各自省改司𨽻校尉察不變者秋七月辛未晦日有蝕之元延元年春正月己亥晦日有蝕之三月行幸雍祠五畤夏四月丁酉無雲有雷聲光耀耀四面下至地昏止赦天下秋七月有星孛于東井詔公卿博士議郎各悉心惟思變意明以經對毋有所諱與內郡國舉方正能直言極諫者各一人北邊二十二郡舉勇猛知兵法者各一人封蕭相國後喜為酇侯冬十二月辛亥大司馬大將軍王商薨是歲昭儀趙氏害後宫皇子二年春正月行幸甘泉郊泰畤三月行幸河東祠后土夏四月立廣陵孝王子守為王冬行幸長楊宫從胡客大校獵宿萯陽宫賜從官三年春正月丙寅蜀郡岷山崩雍江三日江水竭二月封侍中衛尉淳于長為定陵侯三月行幸雍祠五畤四年春正月行幸甘泉郊泰畤二月罷司𨽻校尉官三月行幸河東祠后土甘露降京師賜長安民牛酒綏和元年春正月大赦天下二月癸丑詔曰朕承太祖鴻業奉宗廟二十五年德不能綏理宇內百姓怨恨者衆不蒙天祐至今未有繼嗣天下無所繫心觀于往古近事之戒禍亂之萌皆由斯焉定陶王欣於朕為子慈仁孝順可以承天序繼祭祀其立欣為皇太子封中山王舅諫大夫馮參為宜鄉侯益中山國三萬戶以慰其意賜諸侯王列侯金天下當為父後者爵三老孝弟力田帛各有差又曰蓋聞王者必存二王之後所以通三統也昔成湯受命列為三代而祭祀廢絶考求其後莫正孔吉其封吉為殷紹嘉侯三月進爵為公及周承休侯皆為公地各百里行幸雍祠五畤夏四月以大司馬車騎將軍根為大司馬罷將軍官御史大夫為大司空封為列侯益大司馬大司空奉如丞相秋八月庚戍中山王興薨冬十一月立楚孝王孫景為定陶王定陵侯淳于長大逆不道下獄死廷尉孔光使持節賜貴人許氏藥飲藥死十二月罷部刺史更置州牧秩二千石二年春正月行幸甘泉郊泰畤二月壬子丞相翟方進薨三月行幸河東祠后土丙戍帝崩于未央宫年四十六皇太后詔有司復長安南北郊四月己卯葬延陵在扶風去長安六十二里班彪曰臣之姑充後宫為倢妤父子昆弟侍帷幄數為臣言成帝善修容儀升車立正不內顧不疾言不親指臨朝淵默尊嚴若神可謂穆穆天子之容者矣博覽古今容受直辭公卿稱職奏議可述遭世承平上下和睦然湛于酒色趙氏內亂外家擅朝言之可為於邑建始以來王氏始執國命哀平短祚莽遂篡位蓋其威福所由來者漸矣孝成帝建始河平陽朔鴻嘉永始元延各四年綏和二年即位二十六年孝哀皇帝名欣之字喜元帝庶孫定陶恭王子也母曰丁姬年三嵗嗣立為王長好文辭法律元延四年入朝盡從傅相中尉時成帝少弟中山孝王亦來朝獨從傅上怪之以問定陶王對曰令諸侯王來朝得從其國二千石傅相中尉皆國二千石故盡從之上令誦詩通習能説他日問中山王獨從傅在何法令不能對令誦尚書又廢及賜食於前後飽起下襪繫解成帝由此以為不能而賢定陶王數稱其材時王祖母傅太后隨王來朝私賂遺上所幸趙昭儀及帝舅票騎將軍曲陽侯王根昭儀及根見上亡子亦欲豫自結為長久計皆更稱定陶王勸帝以為嗣成帝亦自美其材為加元服而遣之時年十七矣明年使執金吾任宏守大鴻臚持節徵定陶王立為皇太子謝曰臣幸得繼父守藩為諸侯王材質不足以假充太子之宫陛下聖德寬仁敬承祖宗奉順神祇宜蒙福祐子孫千億之報臣願且得留國邸旦夕奉問起居俟有聖嗣歸國守藩書奏天子報聞後月餘立楚孝王孫景為定陶王奉恭王祀所以奬厲太子専為後之誼綏和二年三月成帝崩四月丙午太子即皇帝位謁高廟尊皇太后曰太皇太后皇后曰皇太后大赦天下賜宗室王子有屬者馬各一駟吏民爵百戶牛酒三老孝弟力田鰥寡孤獨帛太皇太后詔尊定陶恭王為恭皇五月丙戍立皇后傅氏詔曰春秋母以子貴尊定陶太后曰恭皇太后丁姬曰恭皇后各置左右詹事食邑如長信宫中宫追尊傅父為崇祖侯丁父為褒德侯封舅丁明為陽安侯舅子滿為平周侯追諡滿父忠為平周懷侯皇后父晏為孔鄉侯皇太后弟侍中光祿大夫趙欽為新成侯六月詔曰鄭聲淫而亂樂聖王所放其罷樂府曲陽侯根前以大司馬建社稷策益封二千戶太僕安陽侯舜輔導有舊恩益封五百戶及丞相孔光大司空汜鄉侯何武益封各千戶詔曰河間王良喪太后三年為宗室儀表益封萬戶又曰諸侯王列侯公主吏二千石及豪富民多畜奴婢田宅亡限與民爭利百姓失職其議限列有司條奏諸王列侯得名田國中列侯在長安及公主名田縣道關內侯吏民名田皆無得過三十頃諸侯王奴婢二百人列侯公主百人關內侯吏民三十人年六十以上十歲以下不在數中賈人皆不得名田為吏犯者以律論諸民田畜奴婢過品皆沒入縣官齊三服官諸官織綺繡難成害女紅之物皆止無作輸除任子令及誹謗詆欺法掖庭宫人年三十以下出嫁之官奴婢五十以上免為庶人禁郡國無得獻名獸益吏三百石以下奉察吏殘賊酷虐者以時退有司無得舉赦前往事博士弟子父母死豫寧三年秋七月罷大司馬莽就第曲陽侯根成都侯况皆有罪根就國况免為庶人歸故郡詔以間者日月亡光五星失行郡國比比地動河南潁川郡水出流殺人民壞敗廬舍朕甚懼焉已遣光祿大夫循行舉籍賜死者棺錢人三千其令水所傷縣邑及他郡國災害什四以上民資不滿十萬皆毋出今年租賦建平元年春正月赦天下侍中騎都尉新成侯趙欽成陽侯趙欣皆有罪免為庶人徙遼西太皇太后詔外家王氏田非冡塋皆以賦貧民二月詔大司馬列侯將軍中二千石州牧守相舉孝悌敦厚能直言通政事延于側陋可親民者各一人三月賜諸侯王公主列侯丞相將軍中二千石中都官郎吏金錢帛各有差冬中山孝王太后媛弟宜鄉侯馮參有罪皆自殺二年春正月罷大司空復御史大夫夏四月詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶尊恭皇太后曰帝太太后稱永信宫恭皇后曰帝太后稱中安宫立恭皇廟于京師赦天下徒罷州牧復刺史六月庚申帝太后丁氏崩詔起陵於恭皇之園發陳留濟隂近郡國五萬人穿復土待詔夏賀良等言赤精子之讖漢家歷運中衰當再受命宜改元易號詔赦天下以建平二年為太初元年號曰陳聖劉太平皇帝漏刻以百二十為度七月以渭城西北原上永陵亭部為初陵勿徙郡國民使得自安八月詔以夏賀良等言皆違經背古不合時宜六月甲子制書非赦令也皆蠲除之賀良等反道惑衆下有司皆伏辜丞相博御史大夫元孔鄉侯晏有罪博自殺元減死二等晏削戶四分之一語在博傳三年春正月立廣德夷王弟廣漢為廣平王癸卯帝太太后所居桂宫正殿火三月己酉丞相當薨有星孛于河鼓夏六月立魯頃王子郚郚音魚又音吾鄉侯閔為王冬十一月壬子復甘泉泰畤汾隂后土祠罷南北郊東平王雲雲后謁安成恭侯夫人放皆有罪雲自殺謁放棄市四年春大旱關東民傳行西王母籌經歷郡國西入關至京師民又會聚祠西王母或夜持火上屋擊鼓號呼相驚恐二月封帝太太后從弟侍中傅商為汝昌侯太后同母弟子侍中鄭業為陽信侯三月侍中駙馬都尉董賢光祿大夫息夫躬南陽太守孫寵皆以告東平王封列侯夏四月賜中二千石至六百石及天下男子爵六月尊帝太太后為皇太太后秋八月恭皇園北門災冬詔將軍中二千石舉明兵法有大慮者元壽元年春正月辛丑朔日有蝕之詔公卿大夫陳朕過失無有所諱其與將軍列侯中二千石舉賢良方正能直言者各一人大赦天下丁巳皇太太后傅氏崩三月丞相嘉有罪下獄死秋九月大司馬票騎將軍丁明免孝元廟殿門銅龜蛇鋪首鳴門鋪首作龜蛇之形所以銜環也鋪普胡反二年春正月胸奴單于烏孫大昆彌來朝二月歸國單于不説夏四月壬辰晦日有蝕之五月正三公官分職大司馬衛將軍董賢為大司馬丞相孔光為大司徒御史大夫彭宣為大司空封長平侯正司直司𨽻造司寇職事未定六月戊午帝崩于未央宫年二十六秋九月壬寅葬義陵義陵在扶風去長安四十六里班氏曰孝哀自為藩王及充太子之宫文辭博敏幼有令聞睹孝成世祿去王室權柄外移是故臨朝婁誅大臣欲強主威以則武宣雅性不好聲色時覽卞射武戲即位痿痺末年寖劇饗國不永哀哉孝哀皇帝建平四年元壽二年即位六年孝平皇帝初名箕子元始二年更名衎之字樂元帝庶孫中山孝王子也母曰衛姬年三歲嗣立為王元壽二年六月哀帝崩太皇太后詔曰大司馬董賢年少不合衆心其上印綬罷賢即日自殺新都侯王莽為大司馬領尚書事秋七月遣車騎將軍王舜大鴻臚左咸使持節迎中山王辛卯貶皇太后趙氏為孝成皇后退居北宫哀帝皇后傅氏退居桂宫孔鄉侯傅晏少府董恭等皆免官爵徙合浦九月辛酉中山王即皇帝位謁高廟大赦天下帝年九歲太皇太后臨朝大司馬莽秉政百官總已以聽於莽詔赦天下元始元年春正月越裳氏重譯獻白雉一黑雉二詔使三公以薦宗廟羣臣奏言大司馬莽功德比周公賜號安漢公及太師孔光等皆益封賜天下民爵一級吏在位二百石以上一切滿秩如真立故東平王雲太子開明為王故桃鄉頃侯子成都為中山王封宣帝耳孫信等三十六人皆為列侯太僕王惲等二十五人前議定陶傅太后尊號守經法不阿指從邪右將軍孫建爪牙大臣大鴻臚咸前正議不阿後奉節使迎中山王及宗正劉不惡執金吾任岑中郎將孔永尚書令姚恂沛郡太守石詡皆以前與建策東迎即位奉事周密勤勞賜爵關內侯食邑各有差賜帝徵即位前所過縣邑吏二千石以下至佐史爵各有差又令諸侯王公列侯關內侯亡子而有孫若子同産子者皆得以為嗣公列侯嗣子有罪耐以上先請宗室屬未盡而以罪絶者復其屬其為吏舉亷佐史補四百石天下吏比二千石以上年老致仕者參分故祿以一與之終其身遣諫大夫行三輔舉籍吏民以元壽二年倉卒時橫賦斂者償其直義陵民冡不妨殿中者勿發天下吏民亡得置什器儲偫二月置羲和官秩二千石外史閭師秩六百石班教化禁淫祀放鄭聲乙未義陵寢神衣在柙中丙申旦衣在牀上寢令以急變聞用太牢祠夏五月丁巳朔日有蝕之大赦天下公卿將軍中二千石舉敦厚能直言者各一人六月使少府左將軍豐賜帝母中山孝王姬璽書拜為中山孝王后賜帝舅衛寶寶弟元爵關內侯賜帝女弟四人號皆曰君食邑各二千戶封周公後公孫相如為褒魯侯孔子後孔均為褒成侯奉其祀追諡孔子曰褒成宣尼公罷明光宫及三輔馳道天下女徒已論歸家顧山錢月三百復貞婦鄉一人置少府海丞果丞各一人大司農部丞十三人人部一州勸農桑太皇太后省所食湯沐邑十縣屬大司農常别計其租入以贍貧民秋九月赦天下徒以中山苦陘縣為中山孝王后湯沐邑二年春黃支國獻犀牛詔曰皇帝二名通于器物今更名合於古制使太師光奉太牢告祠高廟夏四月立代孝王元孫之子如意為廣宗王江都易王孫盱台侯宫為廣川王廣川惠王曽孫倫為廣德王封故大司馬博陸侯霍光從父昆弟曽孫陽宣平侯張敖元孫慶忌綘侯周勃元孫共舞陽侯樊噲元孫之子章皆為列侯復爵賜故曲周侯酈商等後元孫酈明友等百一十三人爵關內侯食邑各有差郡國大旱蝗青州尤甚民流亡安漢公四輔三公卿大夫吏民為百姓困乏獻其田宅者二百三十人以口賦貧民遣使者捕蝗民捕蝗詣吏以石斗受錢天下民資不滿二萬及被災之郡不滿十萬勿租稅民疾疫者舍空邸第為置醫藥賜死者一家六尸以上葬錢五千四尸以上三千二尸以上二千罷安定呼池苑以為安民縣起官寺市里募徙貧民縣次給食至徙所賜田宅什器假與犂牛種食又起五里於長安城中宅二百區以居貧民秋舉勇武有節明兵法郡一人詣公車九月戊申晦日有蝕之赦天下徒使謁者大司馬掾四十四人持節行邊兵執金吾侯陳茂假以鉦鼓募汝南南陽勇敢吏士三百人諭説江湖賊成重等二百餘人皆自出送家在所收事重徙雲陽賜公田宅冬中二千石舉治獄平歲一人三年春詔有司為皇帝納采安漢公莽女語在莽傳又詔光祿大夫劉歆等雜定婚禮四輔公卿大夫博士郎吏家屬皆以禮娶親迎立軺併馬夏安漢公奉車服制度吏民養生送終嫁娶奴婢田宅器械之品立官稷及學官郡國曰學縣道邑侯國曰校校學置經師一人鄉曰庠聚曰序序庠置孝經師一人陽陵任橫等自稱將軍盜庫兵攻官寺出囚徒大司徒掾督逐皆伏辜安漢公世子宇與帝外家衛氏有謀宇下獄死誅衛氏四年春正月郊祀高祖以配天宗祀孝文以配上帝改殷紹嘉公曰宋公周承休公曰鄭公詔百寮自今婦女非身犯法及男子年八十以上七歲以下家非坐不道詔所名捕它皆無得繫其當驗者即驗問定著令二月丁未立皇后王氏大赦天下遣太僕王惲等八人置副假節分行天下覽觀風俗賜九卿以下至六百石宗室有屬籍者爵自五大夫以上各有差賜天下民爵一級鰥寡孤獨高年帛夏皇后見于高廟加安漢公曰宰衡賜公太夫人號曰功顯君封公子安臨皆為列侯安漢公奏立明堂辟雍尊孝宣廟為中宗孝元廟為高宗天子世世獻祭冬置西海郡徙天下犯禁者處之梁王立有罪自殺分京師置前輝光後丞烈二郡更公卿大夫八十一元士官名位次及十二州名分界郡國所屬罷置改易天下多事吏不能紀冬大風吹長安城東門屋瓦且盡五年春正月祫祭明堂諸侯王二十八人列侯百二十人宗室子九百餘人徵助祭禮畢皆益戶賜爵及金帛增秩補吏各有差詔曰惟宗室子皆太祖高皇帝子孫及兄弟吳頃楚元之後漢元至今十有餘萬人雖有王侯之屬莫能相紏或陷入刑罪教訓不至之咎也自太上皇以來族親各以世氏郡國置宗師以紏之致教訓焉二千石選有德義者以為宗師考察不從教令有寃失職者宗師得因郵亭書言宗伯請以聞常以歲正月賜宗師帛各十匹羲和劉歆等四人使治明堂辟癰令漢與文王靈臺周公作洛同符太僕王惲等八人使行風俗宣明德化萬國齊同皆封為列侯徵天下通知逸經古記天文歷算鍾律小學史篇方術本草及以五經論語孝經爾雅教授者在所為駕一封軺傳遣詣京師至者數千人閏月立梁孝王元孫之耳孫音為王帝益壯以衛后故怨不悅冬十二月丙午莽因臘日上椒酒置毒酒中帝崩于未央宫大赦天下有司議曰禮臣不殤君皇帝年十有四歲宜以禮斂加元服奏可葬康陵在長安北六十里詔曰皇帝仁惠無不顧哀每疾一發氣輒上逆害於言語故不及有遺詔其出媵妾皆歸家得嫁如孝文時故事班氏曰孝平之世政自莽出褒善顯功以自尊盛觀其文辭方外百蠻亡思不服休徵嘉應頌聲並作至乎變異見于上民怨於下莽亦不能文也莽立宣帝之元孫廣戚侯之子嬰為帝年三歲號曰孺子遂引周公居攝故事明年改元居攝後二年篡位定有天下之號曰新改元初始初始一年始建國五年天鳳六年地皇四年孝平帝元始五年右漢自高祖至孺子十三帝通王莽合二百二十九年漢二百十四年偽新十五年通志卷五下
