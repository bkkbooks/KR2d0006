body:
  text: 通志卷七十九下宋右迪功郎鄭樵漁仲撰宗室傳第二魏曹仁弟純曹洪曹休曹真真子爽謐何晏軌鄧揚丁畢李勝叔桓範侯爽從弟文妻夏氏武帝二十五子任城威王彰陳思王植子志蕭懷王熊豐愍王昂相殤王鑠鄧哀王沖彭城王據燕王宇沛穆王林中山恭王衮濟陽懷王玹陳留恭王峻范陽閔王矩趙王幹臨邑殤公子上楚王彪剛殤公子勤穀城殤公子乘郿戴公子整靈殤公子京樊安公均廣宗殤公子棘東平靈王徽樂陵王茂文皇帝九子贊哀王協北海悼王㽔東武陽懷王鑒東海定王霖元城哀王禮邯鄲懷王雍清河悼王貢廣平哀王儼蜀劉永劉理後主太子璿吳孫靜子瑜子臺瑜弟皎峻皎弟奐弟奐靜曾孫峻從綝孫賁子鄰弟輔孫翊姪孫秀孫韶伯父河河子桓韶子楷丞桓姪孫吳主五子孫登孫慮孫和孫霸孫奮魏曹仁字子孝太祖從弟也少好弓馬弋獵及豪傑並起仁亦陰結少年得千餘人周旋淮泗之間遂從太祖為别部司馬行厲鋒校尉太祖之破袁術仁斬獲頗多從征徐州仁常督騎為軍前鋒别攻陶謙將呂由破之還與大軍合彭城大破謙軍從攻費華即墨開陽謙遣别將救諸縣仁以騎擊破之太祖征吕布仁别攻勾陽拔之生獲布將劉何太祖平黃巾迎天子都許仁數有功拜廣陽太守太祖器其勇略不使之郡以議郎督騎太祖征張繡仁别徇旁縣虜其男女三千餘人太祖軍還為繡所追軍不利士卒喪氣仁率勵將士甚奮太祖壯之遂破繡太祖與袁紹久相持於官渡紹遣劉備徇濦強諸縣多舉衆應之自許以南吏民不安太祖以為憂仁曰南方以大軍方有目前急其藝不能相救劉備以強兵臨之其背叛固宜也備新將紹兵未能得其用擊之可破也太祖善其言遂使將騎擊備破走之仁盡復收諸叛縣而還紹遣别將韓荀鈔斷西道仁擊荀於雞洛山大破之由是紹不敢復分兵出復與史渙等鈔紹運車燒其糧穀河北既定從圍壺關太祖令曰城拔皆坑之連月不下仁言於太祖曰圍城必示之活門所以開其生路也今公告之必死將人自為守且城固而糧多攻之則士卒傷守之則引日久今頓兵堅城之下以攻必死之虜非良計也太祖從之城降於是録仁前後功封都亭侯從平荆州以仁行征南將軍留屯江陵拒吳將周瑜瑜將數萬衆來攻前鋒數千人始至仁登城望之乃募得三百人遣部曲將牛金逆與挑戰賊多金衆少遂為所圍長史陳矯俱在城上望見金等垂沒左右皆失色仁意氣奮怒甚謂左右取馬來矯等共援持之謂仁曰賊衆盛不可當也假使棄數百人何苦而將軍以身赴之仁不應遂被甲上馬將其麾下壯士數十騎出城去賊百餘步迫溝矯等以為仁當住溝上為金形藝也仁徑渡溝直前衝入賊圍金等乃得解餘衆未盡出仁復直還突之拔出金兵亡其數人賊衆乃退矯等初見仁出皆懼及見仁還乃歎曰將軍真天人也三軍服其勇太祖益壯之轉封安平亭侯太祖討馬超以仁行安西將軍督諸將拒潼關破超渭南蘇伯田銀反以仁行驍騎將軍都督七軍討銀等破之復以仁行征南將軍假節屯樊鎮荆州侯音以宛叛略傍縣衆數千人仁率諸軍攻破音斬其首還屯樊即拜征南將軍關羽攻樊時漢水暴溢于禁等七軍皆沒禁降羽仁人馬數千人守城城不沒者數版羽乘船臨城圍數重外內斷絶糧食欲盡救兵不至仁激厲將士示以必死將士感之無二心徐晃救至水亦稍減晃從外擊羽仁得潰圍出羽退走仁少時不修行檢及長為將嚴整奉法令常置科於左右案以從事鄢陵侯彰北征烏丸文帝在東宫以書戒彰曰為將奉法不當如征南邪及即王位拜仁車騎將軍都督荆揚益州諸軍事進封陳侯增邑二千并前三千五百戶追賜仁父熾諡陳穆侯置守冢十家後召還屯宛孫權遣將陳邵據襄陽詔仁討之仁與徐晃攻破邵遂入襄陽使將軍髙遷等徙漢南附化民於漢北文帝遣使即拜仁大將軍又詔移屯臨潁遷大司馬復督諸軍據烏江屯合淝黃初四年薨諡忠侯子泰嗣官至鎮東將軍假節轉封寧陵侯泰薨子初嗣又分封泰弟楷範皆為列侯而牛金官至將軍仁弟純初以議郎參司空軍事督虎豹騎從圍南皮袁談出戰士卒多死太祖欲緩之純曰今千里蹈敵進不能克退必喪威且懸師深入難以持久彼勝而驕我敗而懼以懼敵驕必可克也太祖善其言遂急攻之談敗純麾下騎斬談首及北征三郡純步騎獲單于踏頓以前後功封高陵亭侯邑三百戶從征荆州追劉備於長坂獲其二女輜從收其散卒進降江陵從還譙建安十五年薨文帝即位追諡曰威侯子演嗣官至領軍將軍正元中進封平樂鄉侯演薨子亮嗣曹洪字子廉太祖從弟也太祖起義兵討董卓至滎陽為卓將徐榮所敗太祖失馬賊追甚急洪下以馬授太祖太祖辭讓洪曰天下可無洪不可無君遂步從到汴水水深不得渡洪循水得船與太祖俱濟還奔譙揚州刺史陳溫素與洪善洪將家兵千餘人就溫募兵得廬江上甲二千人東到丹陽復得數千人與太祖會龍亢太祖征徐州張邈舉兖州叛迎呂布時大飢荒洪將兵在前先據東平范聚糧穀以繼軍太祖討邈布於濮陽布破走遂據東阿轉擊濟隂山陽中牟陽武京密十餘縣皆拔之以前後功拜鷹揚校尉遷揚武中郎將天子都許拜洪諫議大夫别征劉表破表别將於舞陽陰葉堵陽博望有功遷厲鋒將軍封國明亭侯纍從征伐拜都護將軍文帝即位為衛將軍遷驃騎將軍進封野王侯益邑千戶并前二千一百戶位特進後徙封都陽侯始洪家富而性吝嗇文帝少時從洪貸絹百匹洪不稱意常恨之遂以舍客犯法下獄當死羣臣並救莫能得卞太后謂郭后曰令曹洪今日死吾明日敕帝廢后矣后為涕泣屢請乃得免官削爵土洪先帝功臣時人多為觖音欽恚反望明帝即位拜後將軍更封樂城侯邑千戶位特進復拜驃騎將軍太和六年薨諡恭侯子馥嗣侯初太祖分洪戶封子震列侯洪族父瑜修慎篤敬官至衛將軍封列侯曹休字文烈太祖族子也天下亂宗族各散去鄉里休年十餘歲喪父獨與一客擔喪假葬攜將老母渡江至吳休祖父嘗為吳郡太守休於太守舍見壁上祖父畫像下榻拜涕泣同坐皆嘉歎之後以太祖舉兵易姓名轉至荆州間行北歸見太祖太祖謂左右曰此吾家千里駒也使與文帝同止見待如子常從征伐使領虎豹騎宿衛劉備遣將吳蘭屯下辨太祖遣曹洪征之以休為騎都尉參洪軍事太祖謂休曰汝雖參軍其實帥也洪聞此令亦委事於休備遣張飛屯固山欲斷軍後衆議狐疑休曰賊實斷道者當伏兵潛行今乃先張聲藝此其不能也宜及其未集促擊蘭蘭破則飛自走矣洪從之進兵擊蘭大破之飛果走太祖拔漢中諸軍還長安拜休中領軍文帝即王位為領軍將軍録前後功封東陽亭侯夏侯惇薨以休為鎮南將軍假節都督諸軍事車駕臨送上乃下輿執手而别孫權遣將屯歷陽休到擊破之又别遣兵渡江燒賊蕪湖營數千家遷征東將軍領揚州刺史進封安陽鄉侯帝征孫權以休為征東大將軍假黃鉞督張遼等及諸州郡二十餘軍擊權大將吕範等於洞浦破之拜揚州牧明帝即位進封長平侯吳將審德屯皖休擊破斬之吳將韓綜翟丹等前後率衆詣休降增邑四百并前二千五百戶遷大司馬都督揚州如故太和二年帝為二道征吳遣司馬懿從漢水下督休諸軍向尋陽賊將偽降休深入戰不利退還宿石亭軍夜驚士卒亂棄甲兵輜重甚多休上書謝罪帝遣屯騎校尉楊既慰喻禮賜甚隆休因此癰發背薨諡壯侯子肇嗣肇有當世才度為散騎常侍屯騎校尉明帝寢疾方與燕王宇等屬以後事帝意尋變詔肇以侯歸第正始中薨追贈衛將軍子興嗣初文帝分休戶三百封肇弟纂為列侯後為殄吳將軍薨追贈前將軍曹真字子丹太祖族子也太祖起兵真父邵募徒衆為州郡所殺太祖哀真少孤撫養如己子使與文帝共止嘗獵為虎所逐顧射虎應聲而倒太祖壯其鷙勇使將虎豹騎討靈邱賊拔之封靈夀亭侯以偏將軍將兵擊劉備别將於下辨破之拜中堅將軍從至長安領中領軍是時夏侯淵沒於陽平太祖憂之以真為征蜀護軍督徐晃等破劉備别將髙詳於陽平太祖自至漢中拔出諸軍使真至武都迎曹洪等還屯陳倉文帝即王位以真為鎮西將軍假節督雍涼州諸軍事録前後功進封東鄉侯張進等反於酒泉真遣費曜討破之斬進等黃初三年還京都以真為上軍大將軍都督中外諸軍事假節鉞與夏侯尚等征孫權擊牛渚屯破之轉拜中軍大將軍加給事七年文帝寢疾真與陳羣司馬懿等受遺詔輔政明帝即位進封邵陵侯裴松之案真父名邵而封邵陵侯若非書誤則事不可論遷大將軍諸葛亮圍祈山南安天水安定三郡反應亮帝遣真督諸軍屯郿遣張郃擊亮將馬謖大破之安定民楊條等略吏民保月支城真進軍圍之條謂其衆曰大將軍自來吾願早降耳遂自縳出三郡皆平真以亮懲於祁山後必從陳倉出乃使將軍郝昭王生等守陳倉治其城明年春亮果圍陳倉已有備而不能克增邑并前二千九百戶四年朝洛陽遷大司馬賜劒履上殿入朝不趨真以蜀連出侵邊境宜遂伐之數道並入可大克也帝從其計真當發帝親臨送真以八月發長安從子午道南入司馬懿泝漢水當會南鄭諸軍或從斜谷道或從武威入會大霖雨三十餘日棧道斷絶詔真還軍真少與宗人曹遵鄉人朱讚並事太祖遵讚早亡真愍之乞分所食邑封遵讚子詔嘉美之聽分其邑賜遵讚子爵關內侯各百戶真每征行與將士同勞苦軍賞不足輒以家財班賜士卒皆願為用真病還洛陽帝自幸其第省疾薨諡元侯子爽嗣帝追思真功悉封五子羲訓則彥皚皆為列侯真弟彬文帝世分真二百戶封為列侯爽字昭伯少以宗室謹重明帝在東宫甚親愛之及即位為散騎侍郎纍遷城門校尉加散騎常侍轉武衛將軍寵待有殊帝寢疾乃引爽入卧內拜大將軍假節鉞都督中外諸軍録尚書事與太尉司馬懿並受遺詔輔少主明帝崩齊王即位加爽侍中改封武安侯邑萬二千尸賜劒履上殿入朝不趨贊拜不名丁謐乃畫䇿使爽白天子發詔轉司馬懿為太傅外以名號尊之內欲令尚書奏事先來由己得制其輕重也爽弟羲為中領軍訓武衛將軍彥散騎常侍侍講其餘諸弟皆以列侯侍從出入禁闥貴寵莫盛焉初南陽何晏鄧揚李勝沛國丁謐東平畢軌咸有聲名進趣於時明帝以其浮華皆黜抑之及爽秉政乃復進敘任為腹心揚等欲令爽立威名於天下勸使伐蜀爽從其言司馬懿止之不能禁正始五年爽乃西至長安大發卒六七萬人從駱谷入是時關中及氐羌轉輸不能供牛馬騾驢多死民夷號泣道路入谷口數百里賊因山為固兵不得進爽參軍楊偉為爽陳形藝宜急還不然將敗揚與偉爭於爽前偉曰揚勝將敗國家事可斬也爽不悅乃引軍還初爽以懿年德並髙恆以父道事之不敢專行及晏等進用咸共推戴説爽以權重不宜委之於人乃以晏揚謐為尚書晏典選舉軌司𨽻校尉勝河南尹諸事希復由懿懿遂稱疾避爽晏等專政共分割洛陽野王典農部桑田數百頃及壞湯沐地以為産業承藝竊取官物因緣求欲州郡有司望風莫敢忤旨晏等與廷尉盧育素有不平因育吏微過深文致育法使主者先收育印綬然後奏聞其作威如此爽飲食車服擬於乘輿尚方珍玩充牣其家妻妾盈後庭又私取先帝才人七八人及將吏師工鼓吹良家子女三十三人皆以為伎樂詐作詔書發才人五十七人送鄴臺使先帝倢妤教習為伎擅取太樂樂器武庫禁兵作窟室綺疏四周數與晏等會其中縱酒作樂羲深以為憂屢諫止爽爽並不納羲至於涕泣爽又與兄弟數俱出遊大司農沛國桓範謂曰總萬機典禁兵不宜並出若有閉城門誰復內人者爽曰誰敢爾邪懿常密為之備九年冬李勝出為荆州刺史爽等令勝辭懿并伺察焉懿見勝命兩婢侍持衣衣落指口言渴婢進粥懿不持杯而飲粥流霑胸勝曰衆謂明公舊風發動何意乃爾懿使聲氣才屬言年老沈疾死在旦夕君當屈并州并州近胡好為之備且以子師昭為託勝曰還忝本州非并州也懿復錯亂其辭曰君方到并州勝曰當忝荆州懿曰年老意荒不解君言今為本州好建功勳勝退告爽曰司馬公尸居餘氣形神已離不足慮矣故爽等不復設傋十年正月車駕朝髙平陵爽兄弟皆從懿乃部勒兵馬先據武庫遂出屯洛水浮橋奏爽曰臣昔從遼東還先帝詔陛下秦王及臣升御床把臣臂深以後事為念臣言二祖亦屬臣以後事為念此自陛下所見無所憂苦萬一有不如意臣當以死奉明詔黃門令董箕等才人侍疾者皆所聞知今大將軍爽背棄顧命敗亂國典內則僭擬外專威權破壞諸營盡據禁兵羣官要職皆置所親殿中宿衛歷世舊人皆復斥出欲置新人以樹私計根據磐牙縱恣日甚外既如此又以黃門張當為都監專共交關看察至尊候伺神器離間二宫傷害骨肉天下洶洶人懷危懼陛下但為寄坐耳豈得久安此非先帝詔陛下及臣升御牀之本意也臣雖朽邁敢忘往言昔趙髙極意秦氏以滅吕霍早斷漢祚永世此乃陛下之大鑒臣受命之時也大尉臣濟尚書令臣孚等皆以爽有無君之心兄弟不宜典兵宿衛奏永寧宫皇太后令敕臣如奏施行臣輒敕主者及黃門令罷爽羲訓吏兵以侯就第不得逗留以稽車駕敢有稽留便以軍法從事臣輒力疾將兵屯洛水浮橋伺察非常爽得奏不通迫窘不知所為懿使爽所親信説爽宜早自歸罪唯免官而已時桓範聞兵起不應太后召矯詔開平昌門拔劒戟將門候南奔爽懿謂蔣濟曰智囊往矣濟曰範則智矣駑馬戀棧豆爽必不能用也範果説爽挾車駕幸許昌招外兵爽兄弟猶豫未決範重謂羲曰此事昭然卿用讀書何為今卿門戶求貧賤復可得乎且匹夫持質一人尚欲望活今卿與天子相隨令於天下誰敢不應今詣許昌不過中宿所憂穀食而大司農印章在我身羲兄弟不從自甲夜至五鼓爽乃投刀於地曰我亦不失作富家翁範哭曰曹子丹佳人生汝兄弟豚犢耳何圖今日坐汝等族滅邪於是爽乃通懿奏請下詔免己官奉駕還宫爽兄弟歸家懿發卒圍守之有司奏黃門張當私以所擇十人張何等與爽疑有姦收付廷尉考實當陳爽與晏等隂謀反逆並先習兵須三月中發於是收晏等下獄會公卿朝臣廷議以為春秋之義君親無將將而必誅爽以支屬世蒙殊寵親受先帝握手遺詔託以天下而包藏禍心蔑棄顧命乃與晏揚及當等謀圖神器範黨同罪人皆為大逆不道於是收爽羲訓晏揚謐軌勝範當等皆伏誅夷三族晏何進孫也母尹氏太祖為司空時納晏母為夫人晏長於宫省性無所顧憚服飾擬於太子故文帝特憎之不呼其姓字常謂之為假子尚同母妹金鄉公主少以才秀知名好老莊言作道德論及諸文賦著述凡數十篇與夏侯元司馬師等皆名盛於時晏嘗曰唯深也故能通天下之志夏侯太初是也唯幾也故能成天下之務司馬子元是也唯神也不疾而速不行而至吾聞其語未及其人蓋欲以神況諸已也晏性自喜又好色動靜粉白不去手行步顧影故黃初時無所事任及明帝立頗為冗官至正始初曲合於爽爽亦以才能用為散騎常侍遷侍中尚書晏為尚書主選舉其宿與之有舊者多被拔擢爽敗懿使晏治爽等獄晏窮治黨與冀以獲宥懿曰凡有八族晏疏丁鄧等七族懿曰未也晏窮急乃曰豈謂晏乎懿曰是也乃收晏鄧揚字元茂鄧禹後也少得士名於京師明帝時為尚書郎除洛陽令坐事免拜中郎又入兼中書郎初揚與李勝等為浮華友及在中書浮華事發被斥出遂不復用正始初乃出為潁川太守轉大將軍長史遷侍中尚書揚為人好貨前在內職許臧艾授以顯官艾以父妾與揚故京師為之語曰以官易婦鄧元茂每所薦達多如此比故何晏選舉不得人頗由揚之不公忠遂同其罪丁謐字彥靖父斐字文侯初斐隨太祖太祖以斐鄉里特饒愛之斐性好貨數請求犯法輒得原宥為典軍校尉總攝內外每所陳説多見從之建安末從太祖征吳斐隨行自以家牛羸困乃私易官牛為人所白被收送獄奪官其後太祖問斐曰文侯印綬所在斐亦知見戲對曰以易餅耳太祖笑顧謂左右曰東曹毛椽數白此家欲令我重治我非不知此人不清良有以也我之有斐譬如人家有盜狗而善捕鼠盜雖有少損而完我囊貯遂復斐官聽用如初後數歲病亡謐少不肯交遊但博觀書傳為人沈毅頗有才略太和中常住鄴借人空屋居其中而諸王亦欲借之不知謐已得直開門入謐望見王交腳卧而不起而呼其奴客曰此何等人促呵使去王怒其無禮還具上言明帝收謐繫鄴獄以其功臣子原出後帝聞其有父風召拜度支郎中曹爽宿與相親時爽為武衛將軍數為帝説其可大用會帝崩爽輔政乃拔謐為散騎常侍遂轉尚書謐為人外似踈略而內多所忌其在臺閣數有彈駁臺中患之事不得行又其意輕貴多所忽略雖與何晏鄧揚等同位而皆少之唯以藝屈於爽爽亦敬之言無不從故于時謗書謂臺中有三狗二狗崖柴不可當一狗憑默作疽囊三狗謂何鄧丁也默者爽小字也其意言三狗皆欲囓人而謐尤甚也奏使郭太后出居别宫及遣樂安王使北詣鄴又遣文欽令還淮南皆謐之計司馬懿由是特深恨之畢軌字昭先父字子禮建安中為典農校尉軌以才能少有名聲明帝在東宫時軌在文學中黃初末出為長史明帝即位入為黃門郎子尚公主居處殷富遷并州刺史其在并州名為驕豪時雜虜數為暴害吏民軌輒出軍擊鮮卑軻比能失利中護軍蔣濟表曰畢軌前失既往不咎但恐是後難可以再凡人材有長短不可強成軌文雅智意自為美器今失并州換置他州若入居顯職不毁其德於國事實善此安危之要唯聖恩察之至正始中入為中護軍轉侍中尚書遷司𨽻校尉素與曹爽善每言於爽多見從之李勝字公昭父休字子朗有智略張魯前為鎮北將軍休為司馬家南鄭時漢中有甘露降子朗見張魯精兵數萬人有四塞之固遂言赤氣久衰黃家當興欲魯舉號魯不聽會魯破太祖以其勸魯內附賜爵關內侯署散官騎從詣鄴至黃初中仕歷上黨巨鹿二郡太守後以年老還拜議郎勝少遊京師雅有材智與曹爽善明帝禁浮華而人白勝堂有四窗八達各有主名用是被收以其所連引者多故得原禁錮數歲帝崩曹爽輔政勝為洛陽令夏侯元為征西將軍以勝為長史元亦宿與勝厚駱谷之役議從勝出由是司馬懿不悅於勝纍遷滎陽太守河南尹勝前後所歷宰守未嘗不稱職為尹歲餘廳事前屠蘇壞令人更治之小材一枚激墮正撾受符吏石虎頭斷之後旬日遷為荆州刺史未及之官而敗也桓範字元則世為冠族建安末入丞相府延康中為羽林左監以有文學與王象等典集皇覽明帝時為中領軍尚書遷征虜將軍東中郎將使持節都督青徐諸軍事治下邳與徐州刺史鄒岐爭屋引節欲斬岐為岐所奏不直坐免還復為兖州刺史怏怏不得意又聞當轉為冀州牧是時冀州統屬鎮北而鎮北將軍吕昭才實仕進本在範後範謂其妻仲長曰我寧作諸卿向三公長跪耳不能為吕子展屈也其妻曰君前在東坐欲擅斬徐州刺史衆人謂君難為作下今復羞為吕屈是復難為作上也範忿其言觸實乃以刀環撞其腹妻時懷孕遂墮胎死範亦竟稱疾不赴冀州正始中拜大司農範前在臺閣號為曉事及為司農又以清省稱範嘗抄撮漢書中諸事自以意斟酌之名曰世要論蔣濟為太尉嘗與範會社下羣卿列坐有數人範懷其所撰欲以示濟謂濟當虛心觀之範出其書以示左右左右傳之示濟濟不肯視範心恨之因論他事乃發怒謂濟曰我祖薄德公等何似邪濟性雖強毅亦知範剛殼睨而不應各罷範於沛郡仕次在曹真後于時曹爽輔政以範鄉里老宿於九卿中特敬之然不甚親也及司馬懿起兵閉城門以範為曉事乃指召之欲使領中領軍範欲應召而其子諌之以為車駕在外不如南出範疑有頃兒又促之範欲去而司農丞吏皆止範範不從乃突出至平昌城門城門已閉門候司蕃故範舉吏也範呼之舉手中版以示之矯曰有詔召我卿促開門蕃欲求見詔書範呵之言卿非我故吏邪何以敢爾乃開之範出城顧謂蕃曰太傅圖逆卿從我去蕃徒行不能及遂避側範南見爽勸爽兄弟以天子詣許昌徴四方以自輔爽兄弟不能用爽等既免官帝還宫遂令範隨從到洛水浮橋北望見懿下車叩頭而無言懿呼範姓曰桓大夫何為爾邪車駕入宫有詔範還復位範詣闕拜章謝待報會司蕃詣鴻臚自首具説範前臨出所道懿乃忿然曰誣人以反於法何應主者曰科律反受其罪乃收範於闕下時人持範甚急範謂部官曰徐之我亦義士耳遂送廷尉初爽從弟文叔娶譙郡夏侯文寧之女名令女文叔早死服闋自以年少無子恐家必嫁之乃斷髮為信其後家果欲嫁之令女聞即復以刀截兩耳居止常依爽及爽被誅曹氏盡死令女家上書與曹氏絶婚強迎令女歸復欲嫁之令女懼不免竊入寢室以刀斷鼻蒙被而卧其母呼與語不應發被視之血流滿牀席舉室驚惶奔視莫不酸鼻或謂之曰人生世間如輕塵棲弱草耳何至自苦乃爾且夫家夷滅已盡守此欲誰為哉令女曰聞仁者不以盛衰改節義者不以存亡易心曹氏前盛之時尚欲保終況今衰亡何忍棄之禽獸之行吾豈為乎懿聞而嘉之聽使乞子字養為曹氏後嘉平中紹功臣世後封真族孫熙為新昌亭侯邑三百戶以奉真後武帝二十五子武皇帝二十五男卞皇后生文皇帝任城威王彰陳思王植蕭懷王熊劉夫人生豐愍王昂相殤王鑠環夫人生鄧哀王沖彭城王據燕王宇杜夫人生沛穆王林中山恭王衮秦夫人生濟陽懷王玹陳留恭王峻尹夫人生范陽閔王矩王昭儀生趙王幹孫姬生臨邑殤公子上楚王彪剛殤公子勤李姬生榖城殤公子乘郿戴公子整靈殤公子京周姬生樊安公均劉姬生廣宗殤公子棘宋姬生東平靈王徽趙姬生樂陵王茂任城威王彰字子文少善射膂力過人手格猛獸不避險阻數從征伐志意慷慨太祖嘗抑之曰汝不念讀書慕聖道而好乘馬擊劒此一夫之用何足貴也課彰讀詩書彰謂左右曰丈夫一為衛霍將十萬騎馳沙漠驅戎狄立功建號耳何能作博士邪太祖嘗問諸子所好使各言其志彰曰好為將太祖曰為將奈何對曰被堅執鋭臨難不顧為士卒先賞必行罰必信太祖大笑建安二十一年封鄢陵侯二十三年代郡烏丸反以彰為北中郎將行驍騎將軍臨發太祖戒彰曰居家為父子受事為君臣動以王法從事爾其戒之彰北征入涿郡叛胡數千騎卒至時兵馬未集唯有步卒千人騎數百匹用田豫計固守要隙虜乃散退彰追之身自搏戰射胡騎胡騎應弦而倒者前後相屬戰過半日彰鎧中數箭意氣愈厲乘勝逐北至于桑乾去代二百餘里長史諸將皆以為士馬疲頓又受節度不得過代不可深進違令輕敵彰曰率師而行唯利所在何節度乎胡走未逺追之必破從令縱敵非良將也遂上馬令軍中後出者斬一日一夜與虜相及擊大破之斬首獲生以千數彰乃倍常科大賜將士將士無有不悅者時鮮卑大人軻比能將數萬騎觀望強弱見彰力戰所向皆破乃請服北方悉平時太祖在長安召彰詣行在所彰自代過鄴太子謂彰曰卿新有功今西見上宜勿自伐應對常若不足者彰到如太子言歸功諸將太祖喜持彰鬚曰黃鬚兒竟大竒也太祖東還以彰行越騎將軍留長安太祖至洛陽得疾驛召彰未至太祖崩文帝即王位彰與諸侯就國詔增邑五千并前萬戶黃初二年進爵為公三年立為任城王四年朝京師疾薨于邸諡曰威及葬賜鸞輅龍旗虎賁百人如漢東平王故事子楷嗣徙封中牟王五年改封任城縣太和六年復改封任城國食五縣二千五百戶青龍三年楷坐私遣官屬詣中尚方作禁物削縣二千戶正始七年徙封濟南三千戶正元景元初連增邑凡四千四百戶陳思王植字子建年十歲餘誦讀詩論及辭賦數十萬言善屬文太宗常視其文謂植曰汝倩人邪植跪曰言出為論下筆成章顧當靣試奈何倩人時鄴銅爵臺新成太祖悉將諸子登臺使各為賦植援筆立成可觀太祖甚異之性簡易不治威儀輿馬服飾不尚華麗每進見難問應聲而對特見寵愛建安十六年封平原侯後徙封臨災侯太祖征孫權使植留守鄴戒之曰吾昔為頓邱令年二十三思此時所行無愧於今今汝亦年二十三矣可不勉歟植既以才見異而丁儀丁廙楊修等為之羽翼太祖狐疑幾為太子者數矣而植任性而行不自雕礪飲酒不節文帝御之以術矯情自飾宫人左右並為之説故遂定為嗣二十二年增植邑五千并前萬戶植嘗乘車行馳道中開司馬門出太祖大怒公車令坐死由是重諸侯科禁而植寵日衰太祖既慮終始之變以楊修頗有才䇿而又袁氏之甥於是以罪誅修植益內不自安二十四年曹仁為關羽所圍太祖以植為南中郎將行征虜將軍欲遣救仁呼有所敕戒時植將行太子飲焉逼而醉之太祖召不能受命於是悔而罷之文帝即王位誅丁儀丁廙并其男口植與諸侯並就國黃初二年監國謁者灌均希指奏植醉酒悖慢劫脅使者有司請治罪帝以太后故貶爵安鄉侯其年改封鄄城侯三年立為鄄城王邑二千五百戶四年徙封雍邱王其年朝京師上疏曰臣自抱釁歸藩刻肌刻骨追思罪戾晝分而食夜分而寢誠以天罔不可重離聖恩難可再恃竊感相鼠之篇無禮遄死之義形影相弔五情愧赧以罪棄生則違古賢夕改之勸忍活苟全則犯詩人胡顔之譏伏惟陛下德象天地恩隆父母施暢春風澤如時雨是以不别荆棘者慶雲之惠也七子均養者尸鳩之仁也舍罪責功者明君之舉也矜愚愛能者慈父之恩也是以愚臣徘徊於恩澤而不能自棄者也前奉詔書臣等絶朝心離志絶自分黃耉無復執圭之望不圗聖詔猥垂齒召至止之日馳心輦轂假處西館未奉闕庭踊躍之懷瞻望反側謹拜表獻詩二篇其辭曰於穆顯考時維武皇受命于天寧濟四方朱旗所拂九土披攘元化滂流荒服來王超商越周與唐比蹤篤生我皇奕世再聰武則肅烈文則時雍受禪炎漢臨君萬邦萬邦既化率由舊則廣命懿親以藩王國帝曰爾侯君兹青土奄有海濱方周于魯車服有輝旗章有敘濟濟俊乂我弼我輔伊豫小子恃寵驕盈舉挂時網動亂國經作藩作屏先軌是墮傲我皇使犯我朝儀國有典刑我削我絀將置于理元凶是率明明天子時篤同類不忍我刑暴之朝肆違彼執憲哀于小子改封兖邑于河之濱股肱弗置有君無臣荒淫之闕誰弼豫身煢煢僕夫于彼冀方嗟豫小子乃罹斯殃赫赫天子恩不遺物冠我元冕要我朱紱朱紱光大使我榮華剖符授玉王爵是加仰齒金璽俯執聖策皇恩過隆祗承怵惕咨我小子頑凶是嬰逝慙陵墓存愧闕廷匪敢慠德實恩是恃威靈改加足以沒齒昊天罔極性命不圖常懼顛沛抱罪黃壚願蒙矢石建旗東嶽庶立毫釐微功自贖危軀授命知足免戾甘赴江湘奮弋吳越天啓其衷得會京畿遲奉聖顔如渴如飢心之云慕愴矣其悲天髙聽卑皇肯照微又曰肅承明詔應會皇都星陳夙駕秣馬脂車命彼掌徒肅我征旅朝發鸞臺夕宿蘭渚芒芒原隰祁祁士女經彼公田樂我稷黍爰有樛木重陰匪息雖有餱糧飢不遑食望城不過靣邑匪遊僕夫警䇿平路是由元駟藹藹揚鑣􅞎沫流風翼衡輕雲承蓋涉澗之濵緣山之隈遵彼河滸黃阪是階西濟關谷或降或升騑驂倦路再寢再興將朝聖皇匪敢晏寧弭節長騖指日遄征前驅舉燧後乘抗旌輪不輟運鸞無廢聲爰暨帝室稅此西墉嘉詔未賜朝覲莫從仰瞻城閾俯惟闕廷長懷永慕憂心如酲帝嘉其辭義優詔答勉之初植來朝未到關留其從官於關東自將兩三人微行入見清河長公主欲因主以謝罪而關吏以聞帝使人逆之不得見太后以為自殺也對帝泣會植科頭負鈇鑕徒跣詣闕下帝及太后乃喜及見之帝猶嚴顔色不與語又不使冠履植伏地涕泣太后為不樂詔乃聽復王服是時待遇諸國法峻任城王暴薨諸王既懷友于之痛植及白馬王彪還國欲同路東歸以敘隔絶之思而監國使者不聽植發憤告離而作詩敘意其辭悲愴六年帝東征還過雍邱幸植宫增戶五百太和元年徙封浚儀二年復還雍邱植常自憤怨抱利器而無所施上疏求自試效力邊境帝疑不用三年徙封東阿五年一再上疏求存問親戚及陳審舉之義皆優制答報其年冬詔諸王朝六年正月其二月以陳四縣封植為陳王邑三千五百戶植每欲求别見獨談論及時政幸冀試用終不能得既還悵然絶望時法制待蕃國既自峻迫寮屬皆賈豎下材兵人給其殘老大數不過二百人又植以前過事復減半十一年中而三徙都嘗汲汲無歡遂發病薨時年三十一初植登魚山臨東阿喟然有歸焉之志遂營為墓至是葬焉遺令務從儉薄景初中詔收黃初中諸奏植罪狀公卿以下議尚書中書祕書三府大鴻臚者並削除之撰録植前後所著賦頌詩銘雜論凡百餘篇副藏內外植庶子志字允恭少好學以才行稱夷簡有大度兼善騎射植以為保家之主立以為嗣植薨徙封濟北王晉武帝為撫軍將軍迎陳留王于鄴志夜謁見帝與語自暮達旦甚竒之及帝受禪降為鄄城縣公詔以志履德清純才髙行潔好古博物為魏宗英授樂平郡太守在郡上書以為宜尊儒重道請為博士置吏卒遷章武趙郡太守雖纍居郡職不以政事為意晝則遊獵夜誦詩書以聲色自娛當時見者未能審其量也咸寧初詔為散騎常侍國子博士帝嘗閲六代論問志曰是卿先王所作邪志對曰先王有手所作目録請歸尋案還奏曰案録無此帝曰誰作志曰以臣所聞是臣族父冏所作以先王文髙名著欲令書傳後世是以假託帝曰古來亦多有是顧謂公卿曰父子證明足以為審自今以後可無復疑後遷祭酒齊王攸將之國下太常議崇錫文物時博士秦秀等以為齊王宜內輔朝政不可之藩志又嘗恨其父不得志於魏因愴然歎曰安有如此之才如此之親不得樹本助化而逺出海隅晉朝之隆其殆乎哉乃奏議留攸辭甚剴切議成當上見其從弟高邑公嘉嘉曰兄議固佳百年之後必書晉史目下將無見責邪帝覽議大怒曰曹志尚不明吾心况四海乎以議者不指答所問橫造異論䇿免太常鄭默於是有司奏收志等結罪詔惟免志官以公還第其餘皆付廷尉頃之志復為散騎常侍丁母憂居喪過禮因此篤疾喜怒失常九年卒太常奏以惡諡崔褒歎曰魏顆不從亂以病為亂故也今諡曹志而諡其病豈謂其病不為亂乎遂諡為定蕭懷王熊早薨黃初二年追封諡蕭懷公泰和三年又追進爵為王青龍二年子哀王炳嗣食邑二千五百戶六年薨無子國除豐愍王昂字子修弱冠舉孝亷隨太祖南征為張繡所害無子黃初二年追封諡曰豐悼公三年以樊安公均子琬奉昂後封中都公其年徙封長子公五年追加昂號曰豐悼王太和三年改諡曰愍王嘉平六年以琬襲昂爵為豐王正元景元中纍增邑并前二千七百戶琬薨諡曰恭王子廉嗣相殤王鑠早薨太和二年追封諡青龍元年子愍王潛嗣其年薨二年子懷王偃嗣邑二千五百戶四年薨無子國除正元二年以樂陵王茂子陽都公竦繼鑠後鄧哀王沖字倉舒少聰察岐嶷生五六歲智意所及有若成人時孫權致巨象太祖欲知其斤重訪之羣下咸莫能出其理沖曰置象船上而刻其水痕所至稱物以載之則校可知矣太祖大悅即施行焉時軍國多事用刑嚴重太祖馬鞍在庫而為鼠所齧庫吏懼必死議欲面縳首罪猶懼不免沖謂曰待三日中然後自歸沖於是以刀穿單衣如鼠齧者謬為失意貌有愁色太祖問之對曰世俗以為鼠齧衣者其主不吉今單衣見齧是以憂戚太祖曰此妄言耳無所苦也俄而庫吏以齧鞍聞太祖笑曰兒衣在側尚齧况鞍縣柱乎一無所問沖仁愛識達皆此類也凡應罪戮而為沖微所辨理賴以濟宥者前後數十太祖數對羣臣稱述有欲傳後意年十三建安十三年疾病太祖親為請命及亡哀甚文帝寬喻太祖太祖曰此我之不幸而汝曹之幸也言則流涕為聘甄氏亡女與合葬贈騎都尉印綬命宛侯據子琮奉沖後二十二年封琮為鄧侯黃初二年追諡沖曰鄧哀侯又追加號為公三年進琮爵徙封冠軍公四年徙封己氏公太和五年加沖號曰鄧哀王景初元年琮坐事削戶三百貶爵為都鄉侯三年復為己氏公正始七年轉封平陽公景初正元景元中纍增邑并前千九百戶彭城王據建安十六年封范陽侯二十三年徙封宛侯黃初二年進爵為公三年為章陵王其年徙封義陽文帝以南方下溼又以環大妃彭城人徙封彭城又徙封濟陰五年詔曰先王建國隨時而制漢祖增秦所置郡至光武以天下損耗并省郡縣以今比之益不及焉其改諸王皆為縣王據改封定陶縣太和六年改封諸王皆以郡為國據復封彭城景初初據坐私遣人詣中尚方作禁物削縣二千戶二年復所削戶邑正元景元中纍增邑并前四千六百戶燕王宇字彭祖建安十六年封都鄉侯二十二年改封魯陽侯黃初二年進爵為公三年為下邳王五年改封單父縣太和六年改封燕王明帝少與宇同止常愛異之及即位寵賜與諸王殊青龍三年徴入朝景初元年還鄴二年夏復徴詣京師冬十二月明帝疾篤拜宇大將軍屬以後事受署四日宇深固讓帝意亦變遂免宇官三年夏還鄴景初正元景元中纍增邑并前五千五百戶常道鄉公奐宇之子也入繼太宗沛穆王林建安十六年封饒陽侯二十二年徙封譙黃初二年進爵為公三年為譙王五年改封譙縣七年徙封鄄城太和六年改封沛景初正元景元中纍增邑并前四千七百戶林薨子緯嗣中山恭王袞建安二十一年封平鄉侯袞少好學年十餘歲能屬文每讀書文學左右常恐以精力為病數諫止之然性所樂不能廢也二十二年徙封東鄉侯其年又改封贊侯黃初二年進爵為公官屬皆賀衮曰夫生深宫之中不知稼穡之艱難多驕逸之失諸賢既慶其休宜輔其闕每兄弟遊娛衮獨談思經典文學防輔相與言曰受詔察公舉措有過當奏有善亦宜聞不可匿其美也遂共表稱陳衮之美衮聞大驚懼責文學曰修身自守常人之行耳而諸君乃以上聞是增其負纍也且如有善何患不聞而遽共如是非益我者其戒慎如此三年為北海王其年黃龍見鄴西漳水袞上書贊頌詔賜黃金十斤詔曰昔唐叔歸禾東平獻頌斯皆骨肉贊美以彰懿親王研精墳典耽味道真文雅炳煥朕甚嘉之王其克慎明德以終令聞四年改封贊王七年徙封濮陽太和二年就國袞尚儉約教敕妃妾紡績織絍習為家人之事五年冬入朝六年冬改封中山初袞來朝犯京都禁為有司所奏青龍元年詔削縣二戶七百五十袞憂懼戒敕官屬愈謹帝嘉其意二年復所削縣三年秋袞得疾病詔遣太醫視疾殿中虎賁齎手詔賜珍膳相屬又遣太妃沛王林並就省疾袞疾困敕令官屬曰吾寡德忝寵大命將盡吾既好儉而聖朝著終誥之制為天下法吾氣絶之日自殯及葬務奉詔書昔衛大夫蘧瑗葬濮陽吾望其墓常想其遺風願託賢靈以弊髮齒吾兆域必往從之禮男子不卒於婦人之手亟以時成東堂堂成名之曰遂志之堂輿疾往居之又令世子曰汝幼小未聞義方早為人君但知樂不知苦必將以驕奢為失也接大臣務以禮雖非大臣老者猶宜答拜事兄以恭恤弟以慈兄弟有不良之行當造膝諫之諫之不從流涕喻之喻之不改乃白其母若猶不改當以奏聞并辭國土與其守寵罹禍不若貧賤全身也此亦謂大罪惡耳其微過細故當掩覆之嗟爾小子慎修乃身奉聖朝以忠貞事太妃以孝敬閨闈之內奉令于太妃閫閾之外受教於沛王無怠乃心以慰豫靈其年薨詔沛王林留訖葬使大鴻臚持節典護喪事宗正弔祭贈賻甚厚凡所著文章二萬餘言才不及陳思王而好與之侔子孚嗣景初正元景元中纍增戶并前三千四百戶濟陽懷王玹建安十六年封西鄉侯早薨無子二十年以沛王林子贊襲玹爵邑早薨無子文帝復以贊弟一紹玹後黃初二年改封濟陽侯四年進爵為公太和四年追進玹爵諡曰懷公六年又進號曰懷王追諡贊曰西鄉哀侯一薨諡曰悼公子恆嗣景初正元景元中纍增邑并前千九百戶陳留恭王峻字子安建安二十一年封郿侯二十二年徙封襄邑黃初二年進爵為公三年為陳留王五年改封襄邑縣太和六年又封陳留甘露四年薨子澳嗣景初正元景元中纍增邑并前四千七百戶范陽閔王矩早薨無子建安二十二年以樊安公均子敏奉矩後封臨晉侯黃初三年追封諡矩為范陽閔公五年改封敏范陽王七年徙封句陽太和六年追進矩號曰范陽閔王改封敏琅琊王景初正元景元中纍增邑并前三千四百戶敏薨諡曰原王子焜嗣趙王幹建安二十年封髙平亭侯二十二年徙封賴亭侯其年改封𢎞農侯黃初二年進爵徙封燕公三年為河間王五年改封樂城縣七年徙封巨鹿太和六年改封趙王幹母有寵於太祖及文帝為嗣幹母有力文帝臨崩有遺詔是以明帝常加恩意青龍二年私通賓客為有司所奏帝賜璽書誡誨而不之罪景初正兀景元中纍增邑并前五千戶臨邑殤公子上早薨太和五年追封諡無後楚王彪字朱虎建安二十一年封壽春侯黃初二年進爵徙封汝陽公三年封弋陽王其年徙封吳王五年改封夀春縣七年徙封白馬太和五年冬朝京師六年改封楚初彪來朝犯禁青龍初為有司所奏詔削縣三戶千五百二年大赦復所削縣景初三年增戶五百并前三千戶嘉平元年兖州刺史令狐愚與太尉王淩謀迎彪都許昌語在淩傳乃遣傳及侍御史就國案驗收治諸連及者廷尉請徴彪治罪於是依漢燕王旦故事使兼廷尉大鴻臚持節賜彪璽書切責之使自圗焉彪乃自殺妃及諸子皆免為庶人徙平原彪之官屬以下及監國謁者坐知情無輔導之義皆伏誅國除為淮南郡正元元年詔封彪世子嘉為常山真定王景元元年增邑并前二千五百戶嘉入晉封高邑公元康中為國子博士後為東管太守轉員外散騎侍郎剛殤公子勤早薨太和五年追封諡無後穀城殤公子乘早薨太和五年追封諡無後郿戴公子整奉從叔父郎中紹後建安二十二年封郿侯二十三年薨無子黃初二年追進爵諡曰戴公以彭城王據子範奉整後三年封平氏侯四年徙封成武太和三年進爵為公青龍三年薨諡曰悼公無後四年詔以範弟東安鄉公闡為郿公奉整後景初正元景元中纍增邑并前千八百戶靈殤公子京早薨太和五年追封諡無後樊安公均奉叔父薊恭公彬後建安二十二年封樊侯二十四年薨子抗嗣黃初二年追進公爵諡曰樊安公三年徙封抗薊公四年徙封屯留公景初元年薨諡曰定公子諶嗣景初正元景元中纍增邑并前千九百戶廣宗殤公子棘早薨太和五年追封諡無後東平靈王徽奉叔父朗陵哀侯王後建安二十二年封歷城侯黃初二年進爵為公三年為廬江王四年徙封壽張王五年改封壽張縣太和六年改封東平青龍二年徽使官屬撾壽張縣吏為有司所奏詔削縣一戶五百其年復所削縣正始三年薨子翕嗣景初正元景元中纍增邑并前三千四百戶翕入晉封廩邱公樂陵王茂建安二十二年封萬歲亭侯二十三年改封平輿侯黃初三年進爵徙封乘氏公七年徙封中邱茂性慠佷少無寵於太祖及文帝世又獨不王太和元年徙封聊城公其年為王詔書著其不間禮教且戒飭之六年改封曲陽王正始三年東平靈王薨茂稱嗌痛不肯發哀居處出入自若有司奏除國土詔削縣一戶五百五年徙封樂陵詔以茂租奉少諸子多復所削戶又增戶七百嘉平正元景元中纍增邑并前五千戶文帝九子文皇帝九男甄氏皇后生明帝李貴人生贊哀王協潘淑媛生北海悼王㽔朱淑媛生東武陽懷王鑒仇昭儀生東海定王霖徐姬生元城哀王禮蘇姬生邯鄲懷王雍張姬生清河悼王貢宋姬生廣平哀王儼贊哀王協早薨太和五年追封諡曰經殤公青龍二年更追改號諡三年子殤王尋嗣景初三年又增戶五百并前三千戶正始九年薨無子國除北海悼王㽔黃初七年明帝即位立為陽平縣王太和六年改封北海青龍元年薨二年以琅邪王子贊奉㽔後封昌鄉公景初二年立為饒安王正始七年徙封文安正元景元中纍增邑并前三千五百戶東武陽懷王鑒黃初六年立其年薨青龍三年賜諡無子國除東海定王霖黃初三年立為河東王六年改封館陶縣明帝即位以先帝遺意愛寵霖異於諸國而霖性粗暴閨門之內婢妾之間多所殘害太和六年改封東海嘉平元年薨子啓嗣景初正元景元中纍增邑并前六千二百戶髙貴鄉公髦霖之子也入繼太宗元城哀王禮黃初二年封秦公以京兆郡為國三年改為京兆王六年改封元城王太和三年薨五年以任城王楷子悌嗣禮後六年改封梁王景初正元景元中纍增邑并前四千五百户邯鄲懷王雍黃初二年封淮南公以九江郡為國三年進為淮南王四年改封陳六年改封邯鄲太和三年薨五年以任城王楷子溫嗣雍後六年改封魯陽景初正元景元中纍增邑并前四千四百戶清河悼王貢黃初三年封四年薨無子國除廣平哀王儼黃初三年封四年薨無子國除臣謹按袁子曰魏興大亂之後民人損減不可則以古始於是封建侯王皆使寄地空名而無其實王國有老兵百餘人以衛其國雖有王侯之號而乃儕於匹夫縣隔千里之外無朝聘之儀鄰國無會同之制諸侯遊獵不得過三十里又為設防輔監國之官以伺察之王侯皆思為匹夫而不能得既違宗國藩屏之義又虧親戚骨月之恩遂至於敗亡云蜀劉永字公夀先主子後主庶弟也章武元年六月立為魯王建興八年改封甘陵王初永憎宧人黃皓皓既信任用事譖構永於後主後主稍疏外永至不得朝見者十餘年咸熙元年永東遷洛陽拜奉車都尉封為鄉侯劉理字奉孝亦後主庶弟也與永異母章武元年六月立為梁王建興八年改封安平王延熙七年卒諡曰悼王子哀王允嗣十九年卒子殤王承嗣二十年卒無子景曜四年以武邑侯輯襲王位輯理子也咸熙元年東遷洛陽拜奉車都尉封鄉侯後主太子璿字文衡母王貴人本敬哀張皇后侍人也延熙元年立為皇太子時年十五景曜六年冬蜀亡咸熙元年正月鍾會作亂於成都璿為亂兵所害璿弟瑤琮瓚諶詢璩六人諶自殺餘皆內徙永嘉大亂子孫絶滅唯永孫元奔蜀李雄偽署安樂公以嗣禪後永和中桓溫討李勢元猶在云吳孫靜字幼臺堅季弟也堅始舉事靜紏合鄉曲及宗族五六百人以為保障衆咸附焉策破劉繇定諸縣進攻會稽遣人請靜靜將家屬與䇿會于錢唐是時太守王朗拒策於固陵䇿數渡水不能克靜説策曰朗負阻城守難可卒拔查瀆南去此數十里而道之要徑也宜從彼據其內所謂攻其無備出其不意者也吾當自帥衆為軍前隊破之必矣策曰善乃詐令軍中曰頃連雨水濁兵飲之多腹痛令促具罌缶數百口澄水至昏暮羅以然火誑朗便分軍夜投查瀆道襲髙遷屯朗大驚遣故丹陽太守周昕等帥兵前戰䇿破昕等斬之遂定會稽表拜靜為奮武校尉欲授之重任靜戀墳墓宗族不樂出身求留鎮守策從之權統事就遷昭義中郎將終於家有五子皓瑜皎奐謙皓三子綽超恭超為偏將軍恭生峻綽生綝瑜字仲異以恭義校尉始領兵衆是時賔客諸將多江西人瑜虛心綏撫得其歡心建安九年領丹陽太守為衆所附至萬餘人加綏遠將軍十一年與周瑜共討麻保二屯破之後從權拒曹公於濡須權欲急戰瑜説權持重權不從軍果無功遷奮威將軍領郡如故自溧陽徙屯牛渚瑜以永安人饒助為襄安長無錫人顔連為居巢長使招納廬江二郡各得降附濟陰人馬普篤學好古瑜厚禮之使二府將吏子弟就業遂立學官臨饗講肄是時諸將皆以軍務為事而瑜好樂墳典雖在戎旅誦聲不絶年三十九建安二十年卒五子彌熙耀曼紘曼至將軍列侯瑜弟皎字叔朗始拜護軍校尉領衆二千餘人是時曹公數出濡須皎每赴拒號為精鋭遷都護征虜將軍代程普督夏口黃蓋及兄瑜卒又并其軍賜沙羡雲杜南新市竟陵為奉邑自置長吏輕財能施善於交結與諸葛瑾至厚委廬江劉靖以得失江夏李允以衆事廣陵吳碩河南張梁以軍旅而傾心親待莫不自盡皎嘗遣兵候獲魏邊將吏美女以進皎皎更其衣服送還之下令曰所欲誅者曹氏其百姓何罪自今以往不得擊其老弱由是江淮間多歸附者嘗以小故與甘寧爭或以諫寧寧曰臣子一例征虜雖公子何得專行侮人邪吾值明主但當效力以報所天誠不能隨俗屈曲矣權聞之以書讓皎皎得書上疏陳謝遂與寧結厚後吕蒙當襲南郡權欲令皎與蒙為左右部大督蒙説權曰若至尊以征虜能宜用之以蒙能宜用蒙昔周瑜程普為左右部督共攻江陵雖事決於瑜普自持久將且俱是督遂共不睦幾敗國事此目前之戒也權寤乃以蒙為大督皎為後繼禽關羽定荆州皎有力焉建安二十四年卒權追録其功封子允為丹陽侯允卒無子弟晞嗣領兵有罪自殺國除弟咨彌儀皆將軍封侯咨羽林督儀無難督咨為滕允所殺儀為孫峻所害皎弟奐字季明兄皎既卒代統其衆以揚武中郎將領江夏太守在事一年遵皎舊迹禮劉靖李允吳碩張梁及江夏閭舉等並納其善奐訥於造次而敏於當官軍民稱之黃武五年權攻石陽奐以地主使所部將軍鮮于丹帥五千人先斷淮道自帥吳碩張梁為軍前鋒降髙城得三將大軍引還權詔使在前住駕過其軍見奐軍陳整齊權歎曰初吾憂其遲鈍今治軍諸將少能及者吾無憂矣拜揚威將軍封沙羡侯吳碩張梁皆裨將軍賜爵關內侯奐亦愛樂儒生復命部曲子弟就業後仕進者數十人嘉禾中卒時年四十子承嗣以昭武中郎將代統兵領郡赤烏六年卒無子封承庶弟一奉奐後襲業為將孫峻之誅諸葛恪也一與全熙施績攻恪弟公安督融融自殺一從鎮南遷鎮軍假節督夏口及孫綝誅滕允吕據據允皆一之妹夫也一弟封又知允據謀自殺綝遣朱異潛襲一一知之率部曲千餘口過將允妻奔魏魏以一為車騎將軍儀同三司封吳侯以故主芳貴人邢氏妻之邢美色妬忌下不堪命遂共殺一及邢氏一入魏黃初三年死靜曾孫峻字子逺父恭為散騎侍郎峻少便弓馬精果膽決孫權末徙武衛都尉為侍中權臨薨受遺輔政領武衛將軍典宿衛封都鄉侯既誅諸葛恪遷丞相大將軍督中外諸軍事假節進封富春侯峻素無重名驕矜險害多所刑殺百姓囂然又姦亂宫人與公主魯班私通五鳯元年吳侯英謀殺峻事泄死二年魏將毌邱儉文欽以衆叛與魏人戰于樂嘉峻遣驃騎將軍吕據左將軍留贊襲壽春會欽敗降軍還是歲蜀使來聘將軍孫儀孫邵綝恂等欲因會殺峻事泄儀等自殺死者數十人并及公主魯育太平元年峻用征北將軍文欽計將征魏先遣欽與吕據車騎劉纂鎮南朱異前將軍唐咨自江都入淮泗以圖青徐進至石頭餞之入據營據御軍嚴整峻惡之稱心痛而去遂夢為諸葛恪所擊恐懼發病死時年三十八以後事付從弟綝綝字子通父綽為安民都尉綝始為偏將軍及峻死為侍中武衛將軍領中外諸軍事代知朝政吕據聞之大恐與諸將共表滕允為丞相綝更以允為大司馬代吕岱駐武昌據引兵還使人報允欲共廢綝允乃勒兵自衛綝使將軍劉丞攻之殺允及將士數十人夷允三族事在允傳綝既誅允遷大將軍假節封永寧侯負貴倨傲多行無禮遇峻從弟右將軍慮甚薄慮怒與將軍王惇謀殺綝綝殺惇慮服藥死魏大將諸葛誕舉夀春叛保城請降吳遣文欽唐咨全端全懌等救之魏人圍誕欽等突圍入城魏悉中外軍增誕之圍朱異率衆屯安豐為文欽勢為魏師所敗綝於是大發卒出屯鑊里復遣異率諸將攻魏連敗而歸綝更授兵三萬人使異死戰異不從綝斬之會誕敗綝引軍還綝既不能拔出誕而喪敗士卒自戮名將莫不怨之及孫亮始親政事多所問難綝甚懼乃還建業稱疾不朝築室於朱雀橋南使弟威逺將軍據入蒼龍宿衛武衛將軍恩偏將軍幹長水校尉闓分屯諸營欲以專朝自固亮內嫌綝乃推魯育見殺本末責怒虎林督朱熊熊弟外部督朱損不匡正孫峻乃令丁奉殺熊及損綝入諫不從亮遂與公主魯班太常全尚將軍劉丞議誅綝亮妃綝從姊女也密以告綝綝率衆夜襲全尚遣弟恩殺劉丞於蒼龍門外遂圍宫使光祿勳孟宗告廟廢亮召羣臣議議者皆震怖曰唯將軍令綝遣中書郎李崇奪亮璽綬以亮罪狀班告遠近尚書桓彛不肯署名綝怒殺之以亮為會稽王遣將軍孫耽送之國徙尚於零陵遷公主於豫章典軍施正勸綝徴琅邪王休而立之綝遣宗正楷奉書迎休休入即位綝稱草莽臣詣闕上書上印綬節鉞乞退還田里以避賢路休引見慰喻又下詔以大將軍為丞相荆州牧食五縣恩為御史大夫衛將軍據右將軍皆縣侯幹雜號將軍亭侯闓亦封亭侯綝一門五侯皆典禁兵權傾人主自吳國朝臣未嘗有也綝奉牛酒詣休休不受齎詣左將軍張布酒酣出怨言曰初廢少主時多勸吾自為之者吾以陛下賢明故迎之帝非我不立今上禮見拒是與凡臣無異會當改圖耳布以言聞休休銜之恐其有變數加賞賜又復加恩侍中與琳分省文書或有告琳懷怨侮上欲圖反者休執以付綝綝殺之由是愈懼因孟宗求出屯武昌休許焉盡敕所督中營精兵萬餘人皆令裝載所取武庫兵器咸令給與將軍魏邈説休曰綝居外必有變武衛施朔又告綝欲反有徴休密問張布布與丁奉謀於會殺綝永安元年十二月丁卯建業中謠言明會有變綝聞之不悅夜大風發木揚沙綝益恐戊辰臘會綝稱疾休強起之使者十餘輩綝不得已將入衆止焉綝曰國家屢有命不可辭可豫整兵令府內起火因是可得速還遂入尋而火起綝求出休曰外兵多不足煩丞相也綝起離席奉布目左右縳之綝叩首曰願徙交州休曰卿何以不徙滕允吕據綝復曰願沒為官奴休曰何不以允據為奴乎遂斬之以綝首令其衆曰諸與綝同謀皆赦放仗者五千人闓乘船欲北降追殺之夷三族發峻棺取其印綬斫其木而埋之以殺魯育等故也綝死時年二十八休恥與峻綝同族特除其屬籍稱之曰故峻故綝云休又下詔曰諸葛恪滕允吕據並以無罪為峻綝兄弟所害可為痛心促皆改葬各為祭奠其罹恪等事見逺徙者一切召還孫賁字伯陽父􅀢字聖一堅同産兄也賁早孤弟輔尚幼賁贍育友愛甚篤為郡督郵守長堅於長沙起義兵賁去吏從征伐堅薨賁攝帥餘衆扶送靈柩後袁術徙壽春賁又依之術從兄紹用會稽周昂為九江太守紹與術不協遣賁攻破昂於陰陵術表賁領豫州刺史轉丹陽都尉行征虜將軍討平山越為揚州刺史劉繇所迫逐因將士衆還住歷陽頃之術復使賁與吳景共擊樊能張英等未能拔及策東渡江助賁景破英能等遂進擊劉繇繇走豫章策遣賁景還壽春報術值術僣號署置百官除賁九江太守賁不就棄妻奴還江南時策已平吳會二郡賁與策征廬江太守劉勳江夏太守黃祖軍旋聞繇病死過定豫章上賁領太守復封都亭侯建安十三年使者劉隱奉詔拜賁為征虜將軍領郡如故在官十一年卒子鄰嗣鄰年九歲代領豫章進封都鄉侯在郡垂二十年討平叛賊政績修理召還武昌為繞帳督遷夏口沔中督威逺將軍所居任職赤烏二十年卒子苖嗣苖弟旅及叔父安熙績皆歷列位賁弟輔字國儀以揚武校尉佐孫䇿平三郡䇿討丹陽七縣使輔西屯歷陽以拒袁術又從䇿討陵陽生得祖郎等策西襲廬江太守劉勳輔隨從身先士卒有功策上輔廬陵太守遷平南將軍假節領交州刺史輔恐權不能守江東因權出行東冶乃遣人齎書呼曹公行人以告權乃還偽若不知與張昭共見輔權謂輔曰兄厭樂邪何為呼他人輔云無是權因投書與昭昭示輔輔慙無辭乃悉斬輔親近分其部曲徙輔置東數歲卒子興昭偉昕皆歷列位孫翊字叔弼權弟也驍悍果烈有兄䇿風太守朱治舉孝廉司空辟建安十八年以偏將軍領丹陽太守時年二十初孫權殺吳郡太守盛憲憲故孝廉媯覽戴員亡匿山中翊為郡皆禮致之以覽為大都督督兵員為郡丞覽員親近邊鴻等數為翊所困常欲叛逆因吳主出征遂其姦計時諸縣令長並會見翊翊大請賓客既醉送客鴻從後斫殺翊郡中擾亂鴻迸走入山翊妻徐氏構募追捕中宿乃得覽員歸罪殺鴻諸將皆知覽員所為而力不能討覽入居軍府中悉取翊嬪妾及左右侍御欲復取徐徐恐逆之見害乃紿之曰乞須晦日設祭除服然後聽命潛使所親語翊舊將孫髙傳嬰等與共圖覽髙嬰涕泣許諾密呼翊時侍養者二十餘人以徐意語之共設盟誓合謀到晦日設祭徐氏哭泣盡哀畢乃除服薰香沐浴更於他室安施幃帳言笑歡悅示無戚容大小悽愴怪其如此覽密覘視無復疑意徐呼髙嬰與諸婢羅住戶內使人召覽覽盛服而入徐出戶拜覽適得一拜徐便大呼二君可起高嬰俱出共得殺覽餘人即就外殺員徐氏乃還縗絰奉覽員首以祭翊墓舉軍震駭以為神異吳主續至悉誅覽員餘黨擢高嬰為牙門其餘皆賜金帛時建安九年也翊子松為射聲校尉都鄉侯黃龍三年卒蜀丞相諸葛亮甚器松聞其死甚傷悼之翊弟匡字季佐舉孝廉茂才未試用卒時年二十餘子泰曹氏之甥也為長水校尉嘉禾三年從權圍新城中流矢死泰子秀為前將軍夏口督秀公室至親提兵在外皓意不能平建衡二年皓遣何定將五千人至夏口獵先是民間僉言秀當見圖而定逺獵秀遂驚夜將妻子親兵數百人奔晉晉以秀為驃騎將軍儀同三司封會稽公皓大怒追改秀姓曰厲秀在晉朝聞皓降羣臣畢賀秀稱疾不與南向流涕曰昔討逆弱冠以一校尉創業今後主舉江南而棄之宗廟山陵於此為墟悠悠蒼天此何人哉朝廷美之以吳平降為伏波將軍開府如故永寧中卒子儉官至給事中孫韶字公禮伯父河字伯海本姓俞氏亦吳人也孫策愛之賜姓為孫列之屬籍或云河堅族子也出後姑俞氏後復姓為孫河質性忠直訥言敏行有氣幹能服勤少從堅征討常為前驅後領左右兵典知內事待以腹心之任又從䇿平定吳會從權討袁術術破拜威寇中郎將領廬江太守後為將軍屯京城孫翊之遇害也河馳赴宛陵責怒覽員以不能全翊令使姦變得施二人議曰伯海與將軍疏逺而責我乃爾討虜若至吾屬無類矣遂殺河使人北迎揚州刺史劉馥令住歷陽以丹陽應之會覽員就誅韶年十七收河餘衆繕治京城起樓櫓修器備以禦敵權聞亂從椒邱還過定丹陽引軍歸吳夜至京城下營試攻驚之兵皆乘城傳檄備警歡聲動地頗射外人權使曉諭乃止明日見韶甚器之即拜丞烈校尉統河部曲食曲阿丹徒二縣自置長吏一如河舊後為廣陵太守偏將軍權為吳王遷揚威將軍封建德侯權稱尊號為鎮北將軍韶為邉將數十年善養士卒得其死力常以警強場逺斥候為務先知動靜而為之備故鮮有負敗青徐汝沛頗來歸附淮南濵江屯候皆撤兵逺徙徐泗江淮之地不居者各數百里自權西征還都武昌韶不進見十餘年後權還建業乃得朝覲權問青徐諸屯要害逺近人馬衆寡魏將帥姓名盡具識之所問咸對身長八尺儀貌都雅權悅曰吾久不見公禮不圖進益乃爾加領幽州牧赤烏四年卒子越嗣至右將軍越兄楷武衛大將軍臨成侯代越為京下督楷弟異至領軍將軍奕宗正卿恢武陵太守天璽元年徴楷為宫下鎮驃騎將軍初永安賊施但等劫皓弟謙襲建業或白楷二端不即赴討者皓數遣詰楷楷常惶怖而卒被召遂將妻子親兵數百人歸晉晉以為車騎將軍封丹陽侯吳平降為渡遼將軍永安元年卒河子桓字叔武少聰朗年二十五拜安東中郎將與陸遜共拒劉備備軍衆甚盛彌山亘谷桓投刀奮命與遜戮力備遂敗走桓斬上兜道截其徑要備踰山越險僅乃得免忿恚歎曰吾昔初至京城桓尚小兒而今迫孤乃至此也桓以功拜建武將軍封丹徒侯下牛渚作橫江塢會卒桓弟俊為定武中郎將赤烏十三年卒長子建襲爵平虜將軍少子慎鎮南將軍慎子丞好學有文章皓世為黃門侍郎吳平赴洛為范陽涿令甚有政績永安中陸機為都督請丞為司馬與機俱被害吳主五子孫登字子高權長子也魏黃初二年以權為吳王拜登東中郎將封萬戶侯登辭疾不受是歲立登為太子選置師傅銓簡秀士以為賓友於是諸葛恪張休顧談陳表等以選入侍講詩書出從騎射權欲登讀漢書習知近代之事以張昭有師法重煩勞之乃令休從昭受讀還以授登登待接僚屬略用布衣之禮與恪休談等或同輿而載或共帳而寐太傅張溫言於權曰中庶子官最親密切問近對宜用俊德乃用表等為中庶子又以庶子禮拘復令整巾侍坐黃龍元年權稱尊號登為皇太子以恪為左輔休為右弼談為輔正表為翼正是為四友而謝景范慎刁元羊衜等皆為賓客於是東宫號為多士權遷都建業徴大將軍陸遜輔登鎮武昌領宫府留事登或射獵當由徑道常逺避良田不踐苖稼至所頓息又擇空間之地其不煩民如此嘗乘馬出有彈丸過左右求之有一人操彈佩丸咸以為是辭對不服從者欲捶之登不聽使求過丸比之非類乃見釋又失盛水金馬盂覺得其主乃左右所為不忍致罰呼責數之長遣歸家敕親近勿言後弟慮卒權為之降損登詣權晝夜兼行到賴鄉自聞即時召見見權悲泣因諌曰慮寢疾不起此乃天命也方今朔土未一四海喁喁天戴陛下而以下流之念減損太官殽饌過於禮制臣竊憂惶權納其言為之加膳住二十餘日欲遣西還深自陳乞以久離定省子道有闕又陳陸遜忠勤無所顧憂權遂留焉嘉禾三年權征新城使登居守總知留事時年榖不豐頗有盜賊乃表定科令所以防禦甚得止姦之要初登所生庶賤徐夫人少有母養之恩後徐氏以妬廢處吳而步夫人最寵步氏有賜登不敢辭拜受而已徐氏使至所賜衣服必沐浴服之登將拜太子辭曰本立而道生欲立太子宜先立后權曰卿母安在登曰在吳權默然立凡二十一年年三十三卒臨終上疏以弟和仁孝聰哲德行清茂宜早建置以繫民望又多所薦達賢士夫并陳時政既絶而後書聞權益以摧感言則隕涕是歲赤烏四年也謝景時為豫章太守不勝哀情棄官奔赴拜表自劾權曰君與太子從事異於他吏使中使慰勞聽還本職發遣還郡諡登曰宣太子子璠希皆早卒次子英封吳侯五鳯元年英以大將軍孫峻專權謀誅之事覺自殺國除孫慮字子智登弟也少敏惠有才藝權器愛之黃武七年封建昌侯二年丞相雍等奏慮性聰體逹所向日新比方近漢宜進爵稱王權未許久之尚書僕射存上疏言慮才並文武宜以為鎮軍大將軍授任偏方以光大業權乃許之於是假節開府治半州慮以皇子之尊富於春秋逺近嫌其不能留意及至臨事遵奉法度敬納師友過於衆望年二十嘉禾元年卒無子國除孫和字子孝慮弟也少以母王有寵見愛年十四為置宫衛使中書令闞澤教以書藝和好學下士甚見稱述登亡立為太子時年十九闞澤為太傅薛綜為少傅蔡頴張純封俌嚴維等皆從容侍從是時有司頗以條書問事和以為姦妄之人將因事錯意以生禍心不可長也表宜絶之又都督劉寶白庶子丁晏晏亦白寶和謂寶曰文武在事當能幾人因隙構簿圖相危害豈有福哉遂兩釋之使相厚善是後王夫人與全公主有隙權嘗寢疾和祠祭於廟而和妃叔父張休居近廟邀和過所居全公主使人覘視因言與權曰太子不在廟中專就妃家計議又言王夫人見上寢疾有喜色權由是發怒夫人憂死而和寵稍損魯王霸覬覦滋甚陸遜吾粲顧談等數陳適庶之義理不可奪全寄楊竺為霸支黨譖訴日興粲遂下獄誅談徙交州權沈吟者歷年後遂幽閉和於是驃騎將軍朱據僕射屈晃等率諸將吏泥頭自縛連日詣闕請和權登白爵觀見甚惡之敕據晃等無事忿忿權欲廢和立亮無難督陳正五營督陳象上書稱引晉獻公殺申生立奚齊晉國擾亂據晃又固諫不止權大怒族誅正象據晃牽入殿杖一百竟徙和於故鄣羣臣坐諫誅放者十數人衆咸寃之太元二年正月封和為南陽王遣之長沙四月權薨諸葛恪秉政恪即和妃張之舅也妃使黃門陳遷之建業上疏中宫并致問於恪臨去恪謂遷曰為我達妃期當使妃勝他人其言頗泄又恪有徙都意使治武昌宫民間或言欲迎和及恪被誅孫峻因此奪和璽綬徙新都又遣使者賜死和與妃張辭别張曰吉凶當終相隨不獨生活也亦自殺舉邦傷焉和四子皓德謙俊孫休立封皓為烏程侯德錢唐侯謙永安侯俊拜騎都尉休薨皓入即阼其年追諡父和曰文皇帝改葬明陵置園邑令丞守視後年又分吳郡丹陽九縣為吳興郡治烏程置太守四時奉祠寶鼎二年復立廟京師號清廟其後皓在武昌吳興施但因民之不堪命聚萬餘人劫謙將至秣陵欲立之但兵敗謙被執皓鴆之并殺俊孫霸字子威和同母弟也和為太子霸為魯王寵愛崇特與和無異頃之和霸不穆權禁斷往來督軍使者羊衜上疏乞發優詔使二宫周旋禮命如初權不能用時全寄吳安孫竒楊竺等隂共附霸圗危太子譖毁既行太子以敗霸亦賜死流竺尸于江竺兄穆以數諫戒竺得免大辟猶徙南州霸賜死又誅寄安竒等咸以黨霸構和故也霸二子基一五鳯中封基為吳侯一宛陵侯基侍孫亮在內太平二年盜乘御馬收付獄罪當死亮不忍為特赦宫中基以得免孫皓即位追和霸舊隙削基一爵土與祖母謝姬俱徙會稽烏傷縣孫奮字子揚霸母弟也母曰仲姬太元二年立為齊王居武昌權薨太傅諸葛恪不欲諸王居江濵兵馬之地徙奮於豫章奮怒不從命又數越法度恪上箋為陳禍福奮得箋懼遂移南昌然遊獵彌甚官屬不堪命及恪誅奮下蕪湖欲至建業觀變傅相謝慈等諌奮奮殺之坐廢為庶人徙章安縣太平二年封為章安侯建衡二年孫皓左夫人王氏卒皓哀念過甚朝夕哭臨數月不出由是民間或謂皓死訛言奮與上虞侯奉當有立者奮母仲姬墓在豫章豫章太守張俊疑其或然掃除墳塋皓聞之車裂俊夷三族誅奮及其五子國除通志卷七十九下
