body:
  text: 通志卷一百四十宋右迪功郎鄭樵漁仲撰列傳第五十三梁沈約子旋范雲孫伯翳縝雲從父兄韋睿睿兄纂稜睿子放正黯裴邃子之禮悌兄子之髙之之髙弟之之悌弟橫江淹任昉栁惔惔弟惲逺惲子偃子惲弟憕子憕弟忱敬忱從叔慶慶逺津津仲禮禮王志兄子泰從弟子筠騫筠子祥騫志弟彬暕彬弟寂志子騫子規弟暕子承兄承弟訓從志從父瞻瞻子籍王瑩子實弟瑩從父亮王進之子清王份子琳僉琳子銓孫銓弟錫錫弟份從克沈約字休文吳興武康人也伯祖田子晉龍驤將軍始平太守祖林子宋贈征虜將軍父璞淮南太守林子璞附田子傳元凶弒立璞以奉迎之晚見殺約時年十三潛竄山谷會赦乃免既而流寓孤貧篤志好學晝夜不釋卷母恐其以勞生疾常遣減油滅火而晝之所讀夜輒誦之遂博通羣籍善屬文濟陽蔡興宗聞其才而善之及為郢州引為安西外兵參軍兼記室興宗常謂其諸子曰沈記室人倫師表宜善師之及為荆州又為征西記室帶關西令齊初為征虜記室帶襄陽令所奉主即齊文惠太子太子入居東宫為步兵校尉管書記直永夀省校四部圖書時東宫多士約特被親遇每旦入見景斜方出時王侯到宫或不得進約每以為言太子曰吾生平懶起是卿所悉得卿談論然後忘寢卿欲我夙興可恆早入遷太子家令後為司徒右長史黃門侍郎時竟陵王招士約與蘭陵蕭琛琅邪王融陳郡謝朓南郡范雲樂安任昉等皆遊焉當世號為得人隆昌元年除吏部郎出為東陽太守齊眀帝即位徴為五兵尚書遷國子祭酒眀帝崩政歸冢宰尚書令徐孝嗣使約撰定遺詔永元中復為司徒左長史進號征虜將軍南河清太守初武帝在西邸與約舊遊建康城平引為驃騎司馬時帝勳業既就天人允屬約嘗叩其端帝默然不應他日又進曰今與古異不可以淳風期萬物士大夫攀龍附鳳者皆望有尺寸之功以保其福祿今童兒牧豎悉知齊祚之終且天文人事表革運之徴永元以來尤為彰著讖云行水中作天子此又歷然在記天心不可違人情不可識帝曰吾方思之約曰公初起兵樊沔此時應思今日王業已就何所復思昔武王伐紂始入人便曰吾君武王不違人意亦無所思公自至京邑已移氣序比於周武遲速不同若不早定大業稽天人之望脫一人立異便損威德且人非金石時事難保豈可以建安之封遺之子孫若天子還都公卿在位則君臣分定無復異圖君眀於上臣忠於下豈復有人方更同公作賊帝然之約出召范雲告之雲對略同約旨帝曰智者乃爾暗同卿眀早將休文更來雲出語約約曰卿必待我雲許諾而約先期入帝令草其事約乃出懷中詔書并諸選置帝初無所改俄而雲自外來至殿門不得入徘徊夀光閣外但云咄咄約出雲問曰何以見處約舉手向左雲笑曰不乖所望有頃帝召雲謂曰生平與沈休文同居不覺有異人處今日才智縱橫可謂眀識雲曰公今知約不異約今知公帝曰我起兵於今三年矣功臣諸將實有其勞然成帝業者乃卿二人也梁臺建為散騎常侍吏部尚書兼右僕射及受禪為尚書僕射封建昌縣侯又拜約母謝為建昌國太夫人奉䇿之日吏部尚書范雲等二十餘人咸來致拜朝野以為榮俄遷右僕射天監二年遭母憂輿駕親出臨弔以約年衰不宜致毁遣中書舍人斷客節哭起為鎮軍將軍丹陽尹置佐史服闋遷侍中右光祿大夫領太子詹事奏尚書八條事遷尚書令纍表陳讓改授左僕射領中書令尋遷尚書令領太子少傅九年轉左光祿大夫初約久處端揆有志台司論者咸謂為宜而帝終不用乃求外出又不見許與徐勉素善遂以書陳情於勉言已老病百日數旬革帶常應移孔以手握臂率計月小半分欲謝事求歸老之秩勉為言於帝請三司之儀弗許但加鼓吹而已約性不飲酒少嗜欲雖時遇隆重而居處儉素立宅東田矚望郊阜常為郊居賦以序其事尋加特進遷中軍將軍丹陽尹侍中特進如故十二年卒官年七十三諡曰隱約左目重瞳子腰有紫志聰眀過人好墳籍聚書至二萬卷都下無比少孤貧約於宗黨得米數百斛為宗人所侮覆米而去及貴不以為憾用為郡部傅嘗侍宴有妓婢師是齊文惠宫人帝問識坐中客不曰唯識沈家令約伏地流涕帝亦悲焉為之罷酒約歷仕三代該悉舊章博物洽聞當世取則謝元暉善為詩任彥升工於筆約兼而有之然不能過也自負髙才昧以榮利乘時射勢頗纍清談及居端揆稍𢎞止足每進一官輒殷勤請退而終不能去論者方之山濤用事十餘年未常有所薦逹政之得失唯唯而已初武帝有憾於張稷及卒因與約言之約曰左僕射出作邊州刺史已往之事何足復論帝以為約昏家相為怒約曰卿言如此是忠臣邪乃輦歸內殿約懼不覺帝起猶坐如初及還未及牀憑空頓於户下因病夢齊和帝劔斷其舌召巫視之巫言如夢乃呼道士奏赤章於天稱禪代之事不由己出先是約嘗侍宴會豫州獻栗徑寸半帝竒之問栗事多少與約各疏所憶少帝三事約出謂人曰此公護前不讓即羞死帝以其言不遜欲扺其罪徐勉固諫乃止及疾上遣主書黃穆之専知省視穆之夕還增損不即啓聞懼罪竊以赤章事因上省醫徐奘以聞又積前失帝大怒中使譴責者數焉約懼遂卒有司諡曰文帝曰懷情不盡曰隱故改為隱約少時常以晉氏一代竟無全書年二十許便有撰述之意宋泰始初征西將軍蔡興宗為啓眀帝有敕許焉自此踰二十年所撰之書方就凡一百餘卷條流雖舉而採掇未周永眀初遇盜失第五帙又齊建元四年被敕撰國史永眀二年又兼著作郎撰次起居注五年春又被敕撰宋書六年二月畢功表上之其所撰國史為齊紀二十卷天監中又撰梁武紀十四卷又撰邇言十卷諡例十卷文章志三十卷文集一百卷皆行於世又撰四聲譜以為在昔詞人纍千載而不悟而獨得胸襟窮其妙旨自謂入神之作武帝雅不好焉嘗以問周捨曰何謂四聲捨曰天子聖哲是也然帝竟不甚遵用也約子旋字士規襲爵位司徒右長史太子僕以母憂去官因蔬食辟榖服除猶絶粳粱終於南康內史諡曰恭集注邇言行於世旋弟趨字孝鯉亦知名位黃門郎旋卒子實嗣實弟衆列在陳史范雲字彥龍南鄉舞隂人晉平北將軍汪六世孫也祖璩之宋中書侍郎雲六嵗就其姑夫袁叔眀讀毛詩日誦九紙陳郡殷琰名知人候叔眀見之曰公輔才也雲性機警有識且善屬文下筆輒成時人每疑其宿搆父抗為郢府參軍雲隨在郢時吳興沈約新野庾杲之與抗同府見而友之起家郢州西曹書佐轉法曹行參軍俄而沈攸之舉兵圍郢城抗時為府長流入城固守留家屬居外雲為軍人所得攸之召與語聲色甚厲雲容貌不變徐自陳説攸之笑曰卿定可兒且出就舍眀旦又召雲令送書入城內餉武陵王酒一石犢一頭餉長史桞世隆鱠魚二十頭皆去其首城內或欲誅雲雲曰老母弱弟懸命沈氏若其違命禍必及親今日就戮甘心如薺世隆素與雲善乃免之後除員外散騎郎齊建元初竟陵王子良為會稽太守雲為府主簿王未之知後剋日祭秦望山乃命雲雲以山上有秦始皇刻石此文三句一韻人多作兩句讀之並不得韻又皆大篆人多不識乃夜取史記讀之令上口眀日登山子良令賔僚讀之皆茫然不識末問雲雲曰下官嘗讀史記見此刻石文進乃讀之如流子良大恱因以為上賔自是寵冠府朝子良為丹陽尹雲復為主簿深相親任時進見齊髙帝會有獻白烏帝問此何瑞雲位卑最後答曰臣聞王者敬宗廟則白烏至時謁廟始畢帝曰卿言是也感應之理一至此乎子良為南徐州南兖州雲並隨府遷每陳朝政得失於子良尋除尚書殿中郎子良為雲求祿齊武帝曰聞范雲諂事汝政當流之子良對曰雲之事臣動相針諫諫書存者百有餘紙帝索視之言皆切至咨嗟良久曰不意范雲乃爾方令弼汝子良為司徒又補記室時巴東王子響在荆州殺上佐都下丐丐人多異志而豫章王嶷鎮東府多還私邸動移旬日子良築第西郊遊戲而已武帝時為南郡王文學與雲俱為子良所禮武帝勸子良還石頭并言大司馬宜還東府子良不納武帝以告雲時廷尉平王植為齊武帝所狎雲謂植曰西夏不靜人情甚惡大司馬詎得久還私第司徒亦宜鎮石頭鄉入既數言之差易植因求雲作啓自呈之俄而二王各鎮一城文惠太子嘗幸東田觀穫稻雲時從文惠顧雲曰此刈甚快雲曰三時之務亦甚勤勞願殿中知稼穡之艱難無徇一朝之宴逸也文惠改容謝之及出侍中蕭緬先不相識就車握雲手曰不謂今日復見讜言永眀十年使魏魏人李彪宣命至雲所甚見稱美彪為設甘蔗黃甘粽隨盡絶益彪笑謂曰范𣪚騎小復儉之一盡不可復得使還再選零陵內史初零陵舊政公田奉米之外别雜調四千石及雲至郡上其半百姓恱之深為齊眀帝所知還除正員郎時髙武王侯並懼大禍雲因帝召次曰昔太宰文宣王語臣言嘗夢在一髙山上上有一深坑見文惠太子先墜次武帝次文宣望見僕射在室坐御牀備王者羽儀不知此是何夢卿勿向人道眀帝流涕曰文宣此惠亦難負於是處昭胄兄弟異於餘宗室雲之幸於子良江祏求雲女昏姻酒酣巾箱中取翦刀與雲曰且以為聘雲笑受之至是祏貴雲又因酣曰昔與將軍俱為黃鵠今將軍化為鳯凰荆布之室理隔華盛因出翦刀還之祏亦更姻他族反祏敗妻子流離每相經理又為始興內史舊郡界得亡奴婢悉付作部曲即貨去買銀輸官雲乃先聽百姓志之若百日無主依判送臺又郡相承後堂有雜工作雲悉省還役並為眀帝所賞郡多豪猾大姓二千石有不善者輒共殺害不則逐之邊帶蠻俚尤多盜賊前內史皆以兵刃自衛雲入境撫以恩德罷亭候商賈露宿郡中稱為神眀遷廣州刺史平越中郎將至任遣使祭孝子南海羅威唐頌蒼梧丁密頓琦等墓時江祏姨弟徐藝為曲江令祏深以託雲有談儼者縣之豪族藝鞭之儼以為恥至都訴雲雲坐徴還下獄會赦免初武帝為司徒祭酒與雲俱在竟陵王西邸情好歡甚永眀末武帝與兄懿卜居東郊之外雲亦築室相依武帝每至雲所其妻嘗聞蹕聲又常與武帝同宿顧皓之舍皓之妻方産有鬼在外曰此中有王有相雲起曰王當仰屬相以見歸因是盡心推事及帝起兵將至都雲雖無官自以與帝素欵慮為昏主所疑將求入城先以車迎太原孫伯翳謀之伯翳曰今天文顯於上災變應於下蕭征東以濟世雄武挾天子以令諸侯天時人事寧俟多説雲曰此政會吾心今羽翮未偹不得不就籠檻希足下善聽之及入城除國子博士未拜而東昏遇弒侍中張稷使雲銜命至石頭武帝恩待如舊遂參讚謨謀毗佐大業仍拜黃門侍郎與沈約同心翊贊俄遷大司馬咨議參軍領録事梁臺建遷侍中武帝時納齊東昏余妃頗妨政事雲嘗以為言未之納後與王茂同入卧內雲又諫王茂因起拜曰范雲言是公必以天下為念無宜留惜帝默然雲便疏令以余氏賚茂帝賢其意而許之眀日賜雲茂錢各百萬及帝受禪柴燎南郊雲以侍中參乘禮畢帝升輦謂雲曰朕之今日所謂凛乎若朽索之馭六馬雲對曰亦願陛下日慎一日帝善其言即日遷散騎常侍吏部尚書以佐命功封霄城縣侯雲以舊恩超居佐命盡誠翊亮知無不為帝亦推心仗之所奏多久雲本大武帝十三嵗嘗侍宴帝謂臨川王宏鄱陽王恢曰我與范尚書少親善申四海之敬今為天下主此禮既革汝宜代我呼范為兄二王下席拜與雲同車還尚書下省時人榮之帝嘗與雲言及舊事云朕司州還在三橋宅門生王道牽衣云聞外述圖讖云齊祚不久别應有王者官應取富貴朕齋中坐讀書內感其言而外迹不得無怪欲呼人縛之道叩頭求哀乃不敢復言今道為羽林監文德主帥知管籥雲曰此乃天意令道發耳帝又云布衣時嘗夢拜兩舊妾為六宫今有天下此嫗己卒所拜非復其人恆以為恨其年雲以本官領太子中庶子二年遷尚書右僕射猶領吏部頃之坐違詔用人免吏部猶為右僕射雲性篤時事寡嫂盡禮家事必先咨而後行好節尚竒專趨人之急少與領軍長史王畡善雲起宅新成移家始畢畡亡於官舍尸無所歸雲以東箱給之移尸自門入躬自營含招復如禮時人以為難及居選官任寄隆重書牘盈案賔客滿門雲應答如流無所壅滯官曹文墨發擲若神時人咸服其眀贍性頗激厲少威重有所是非形於造次士或以此少之初雲為郡號亷潔及貴重頗通饋遺然家無蓄積隨散之親友武帝九錫之出雲忽中疾居二日半召醫徐文伯視之文伯曰緩之一月乃復欲速即時愈政恐二年不復可救雲曰朝聞夕死而况二年文伯乃下火而牀焉重衣以覆之有頃流汗於此即起二年果卒帝為流涕即日輿駕臨殯詔贈侍中衛將軍禮官請諡曰宣敕賜諡曰文有集三十卷子孝才嗣孫伯翳太原人晉祕書監盛之元孫曾祖放晉國子博士長沙太守父康起部郎常映雪讀書者伯翳位終驃騎鄱陽王參軍事雲從父兄縝字子真父濛奉朝請早卒縝少孤貧事母孝謹年未弱冠從沛國劉瓛學瓛甚竒之親為之冠在瓛門下積年恆芒屩布衣徒行於路瓛門下多車馬貴遊縝在其間聊無恥愧及長博通經術尤精三禮性質直好危言髙論不為士友所安唯與外弟蕭琛善琛名曰口辨每服縝簡詣年二十九髮白皤然乃作傷暮詩白髮詠以自嗟仕齊位尚書殿中郎永眀中與魏氏和親簡才學之士以為行人縝及從弟雲蕭琛琅邪顔幼眀河東裴昭眀相繼將命皆著名鄰國時竟陵王子良盛招賔客縝亦與焉嘗侍子良子良深信釋教而縝盛稱無佛子良問曰君不信因果何得富貴貧賤縝答曰人生如樹花同發隨風而墮自有拂簾幌墜於茵席之上自有關籬墻落於糞溷之中墜茵席者殿下是也落糞溷者下官是也貴賤雖復殊途因果竟在何處子良不能屈然深怪之退論其理著神滅論以為神即形也形即神也形存則神存形謝則神滅形者神之質神者形之用是則形稱其質神言其用形之與神不得相異神之於質猶利之於刀形之於用猶刀之於利利之名非刀也刀之名非利也然而捨利無刀捨刀無利未聞刀沒而利存豈容形亡而神在此論出朝野喧譁子良集僧難之而不能屈太原王惔乃著論譏縝曰嗚呼范子曾不知其先祖神靈所在欲杜縝後對縝又對曰嗚呼王子知其祖先神靈所在而不能殺身以從之其險詣皆此類也子良使王融謂之曰神滅既自非理而卿堅執之恐傷名教以卿之才美何患不至中書郎而顧乖剌為此可便毁棄之縝大笑曰使范縝賣論取官已至令僕矣何但中書郎邪後為宜都太守性不喜神鬼時夷陵有伍相廟唐漢三神廟胡里神廟縝乃下教斷不祀後以母憂去職居于南州武帝至縝墨縗來迎武帝與縝有西邸之舊見之甚恱及建康城平以縝為晉安太守在郡清約資公祿而已遷尚書左丞及還雖親戚無所遺唯餉前尚書令王亮縝在齊時與亮同臺為郎舊相友愛至是亮擯棄在家縝自以首迎武帝志在權軸而所懷未滿亦怏怏故私相親結以矯於時竟坐亮徙廣州在南纍年追為中書郎國子博士卒文集十五卷子胥字長才傳父業位國子博士有口辨大同中常兼主客郎應接北使卒於鄱陽內史韋睿字懷文京兆杜陵人也世為三輔著姓祖元避吏隱長安南山宋武帝入關以太慰掾徴不至伯父祖征宋末為光祿勳父祖歸寧逺長史睿事繼母以孝聞祖征纍為郡守每携睿之職視之如子時睿內兄王憕姨弟杜惲並有鄉里盛名祖征謂睿曰汝自謂何如憕惲睿謙不敢對祖征曰汝文章或小減學識當過之然幹國家成功業皆莫汝逮也外兄杜幼文為梁州刺史要睿俱行梁土富饒往者多以賄敗睿雖幼猶以亷聞宋永元初袁顗為雍州刺史見而異之引為主簿顗到州與鄧琬起兵睿求出為義成郡故免顗之禍纍遷齊興太守本州别駕長水校尉右軍將軍齊末多故欲還鄉里求為上庸太守俄而太尉陳顯逹護軍將軍崔慧景頻逼建鄴人心惶駭西土人謀之睿曰陳雖舊將非髙人才崔頗更事懦而不武天下真人殆興吾州矣乃遣其二子自結於武帝及兵起檄至睿率郡人伐竹為筏倍道求赴有衆二千馬二百匹帝見睿甚恱撫几曰他日見君之面今日見君之心吾事就矣師克郢魯平茄湖睿多建䇿皆見用大軍發郢謀留守將上難其人久之顧睿曰棄騏驥而不乘焉遑遑而更索即日以為江夏太守行郢州府事初郢城之拒守也男女垂十萬閉壘經年疾疫死者十七八皆積尸於牀下而生者寢處其上每屋盈滿睿料簡隱恤咸為營理百姓賴之梁臺建徴為大理武帝即位遷廷尉封梁都子天監二年改封永昌再遷豫州刺史領歷陽太守魏遣衆來伐睿率州兵擊走之四年侵魏詔睿都督衆軍睿遣長史王超宗梁郡太守馮道根攻魏小峴城未能拔睿巡行圍柵魏城中忽出數百人陳於門外睿欲擊之諸將皆曰向本輕來請還授甲而後戰睿曰魏城中二千餘人閉門堅守足以自保今無故出人於外必其饒勇若能挫之其城自拔衆猶遲疑睿指其節曰朝廷授此非以為飾韋睿之法不可犯也乃進兵魏軍敗因急攻之中宿而城拔遂進討合肥先是右軍司馬胡景略至合肥久未能下睿案行山川曰吾聞汾水可以灌平陽即此是也乃堰肥水頃之堰成水通舟艦繼至魏初分築東西小城夾肥睿先攻二城既而魏援將楊靈允帥軍五萬奄至衆懼不敵請表益兵睿曰賊已至城下方復求軍且吾求濟師彼亦徴衆師克在和古人之義也因戰破之軍人少安初肥水堰立使軍主王懷靜築城於岸守之魏攻陷城乘勝至睿堤下軍監潘靈祐勸睿退還巢湖諸將入請走保三乂睿怒曰將軍死綏有前無却因令取繖扇麾幢樹之堤下示無動志睿素羸每戰未嘗騎馬以板輿自載督勵衆軍魏兵鑿堤睿親與爭魏軍却因築壘於堤以自固起鬬艦髙與合肥城等四而臨之城潰俘獲萬餘所獲軍實無所私焉初胡景略與前軍趙祖恱同軍交惡志相陷害景略一怒自齧其齒齒皆流血睿以將帥不和將致患禍酌酒自勸景略曰且願兩虎勿復私鬬故終於此役得無害焉睿每晝接客旅夜算軍書三更起張燈逹曙撫循其衆常如不及故投募之士爭歸之所至郡舍修立館宇藩籬墉壁皆應凖繩合肥既平有詔班師去魏軍既近懼為所躡睿悉遣輜重居前身乘小輿殿後魏人服睿威名望之不敢逼全軍而還於是遷豫州於合肥五年魏中山王元英攻北徐州圍刺史昌義之於鍾離衆兵百萬連城四十餘武帝遣征北將軍曹景宗拒之次邵陽洲築壘相守未敢進帝怒詔睿會焉賜以龍環御刀曰諸將有不用命者斬之睿自合肥徑隂陵大澤過澗谷輒飛橋以濟師人畏魏軍甚多勸睿緩行睿曰鍾離今鑿穴而處負戶而汲車馳卒奔猶恐其後而况緩乎旬日而至邵陽初帝敕景宗曰韋睿卿鄉望宜善敬之景宗見睿甚謹帝聞曰二將和師必濟矣睿於景宗營前二十里夜掘長塹樹鹿角截洲為城比曉而營立元英大驚以杖擊地曰是何神也景宗慮城中危懼乃募軍士言文逹洪騏驎等齎敕入城使固城守潛行水底得逹東城城中戰守日苦始知有援於是人百其勇魏將楊大眼將萬餘騎來戰大眼勇冠三軍所向披靡睿結車為陳大眼聚騎圍之睿以強弩二千一時俱發洞甲穿中殺傷甚衆大眼矢貫右臂而走眀旦元英自率衆來戰睿乘素木輿執白角如意以麾軍一日數合元英甚憚其強魏軍又夜來攻城飛矢雨集睿子黯請下城以避睿不許軍中驚睿於城上厲聲呵之乃定魏人先於邵陽洲兩岸為兩橋樹柵數百步跨淮通道睿裝大艦使梁郡太守馮道根廬江太守裴邃秦郡太守李文釗等為水軍會淮水暴長睿即遣之鬬艦競發皆臨賊壘以小船載草灌之以膏從而焚其橋風怒火盛敢死之士拔柵斫橋水又漂疾倐忽之間橋柵盡壞道根等皆身自搏戰軍人奮勇呼聲動天地無不一當百魏人大潰元英脫身遁去魏軍趨水死者十餘萬斬首亦如之其餘釋甲降者尚數十萬睿遣報昌義之義之且悲且喜不暇答但呌曰更生更生帝遣中書郎周捨勞軍於淮上睿積所獲於軍門捨觀之謂睿曰君此獲復與熊耳山等矣以功進爵為侯七年遷左衛將軍俄為安西長史南郡太守會司州刺史馬仙琕自北還軍為魏人所躡三關擾動詔睿督衆軍援焉睿至安陸增築城二丈餘更開大塹起髙樓衆頗譏其示弱睿曰不然為將當有怯時是時元英復追仙琕將復邵陽之恥聞睿至乃退帝亦詔罷軍十三年為丹陽尹以公事免十四年為雍州刺史初睿起兵鄉中客隂雙光泣止睿睿還為州雙光道候睿笑曰若從公言乞食於路矣餉耕牛十頭睿於故舊無所惜士大夫年七十以上多與假板縣令鄉里甚懷之十五年拜表致仕優詔不許徴拜護軍給鼓吹一部入直殿省居朝廷恂恂未嘗忤視武帝甚禮敬之性慈愛撫孤兄子過於己子歷官所得祿賜皆散之親故家無餘財後為護軍居家無事慕萬石陸賈之為人因畫之於壁以自玩時年雖老暇日猶課諸兒以學第三子稜尤眀經史世稱其洽聞睿每坐使稜説書其所發摘稜猶弗之逮武帝方鋭意釋氏天下咸從風而化睿自以信受素薄位居大臣不欲與衆俯仰所行略如他日普通元年遷侍中車騎將軍未拜卒於家年七十九遺令薄葬斂以時服武帝即日臨哭甚慟贈車騎將軍開府儀同三司諡曰嚴睿雅有曠世之度涖人以愛惠為本所居必有政績將兵仁愛士卒營幕未立終不肯舍井竈未成亦不先食被服必於儒者雖臨陳交鋒常緩服乘輿執竹如意以麾進止與裴邃俱為梁世名將餘人莫及初邵陽之役昌義之甚德睿請曹景宗與睿會因設錢二千萬官賭之景宗擲得雉睿徐擲得盧遽取一子反之曰異事遂作塞景宗時與羣帥爭先告捷睿獨居後其不尚勝率多如是世尤以此賢之睿兄纂闡並早知名纂仕齊位司徒記室特進沈約嘗稱纂於上曰恨陛下不與此人同時其學非臣輩也闡為建寧縣所得俸祿百餘萬還家悉委伯父處分鄉里宗事之位通直郎睿子放字元直身長七尺七寸腰帶八圍容貌甚偉襲封永昌縣侯位竟陵太守在郡和理為吏人所稱大通元年武帝遣兼領軍曹仲宗等攻渦陽又以放為眀威將軍總兵會之魏大將軍費穆率衆奄至放軍營未立麾下止有二百餘人放從弟洵驍果有勇力單騎擊刺屢折魏軍洵馬亦被傷不能進放胄又三貫矢衆皆失色請放突出放厲聲叱之曰今日唯有死爾乃免胄下馬據胡牀處分士卒皆殊死戰莫不一當百遂北至渦陽魏又遣常山王元昭大將軍李奬乞伏寶費穆等五萬人來援放大破之渦陽城主王偉以城降魏人棄諸營壘一時奔潰衆軍乘之斬獲略盡禽穆弟超并王偉送建鄴還為太子右衛率中大通二年徙北徐州刺史卒於鎮諡曰宜侯放性宏厚篤實輕財好施於諸弟尤雍穆每將逺别及行役初還常同一室卧起時比之三薑初放與吳郡張率皆有側室懷孕因指腹為婚其後各産男女未及成長而率亡遺嗣孤弱放常贍恤之及為北徐州時有貴族請婚者放曰吾不失信於故友乃以息岐娶率女又以女適率子時稱放能篤舊焉子粲死於侯景之難列在忠義傳中放弟正字敬直位襄陽太守初正與東海王僧孺善及僧孺為吏部郎參掌大選賔友故人無不傾意正獨淡然及僧孺擯廢正復篤素分有踰曩日論者稱焉卒於給事黃門侍郎子載仕陳為太子右衛率載弟鼎歷陳入隋位光州刺史載鼎俱列在陳史正弟稜字威直性恬素以書史為業博物強記當世士咸就質疑位終光祿卿著漢書續訓二卷稜弟黯字務直性強正少習經史位太傅卿侯景濟江黯屯六門尋改為都督城西南諸軍時景於城外起東西二土山城內亦應之簡文親自負土哀太子以下躬執畚鍤黯守西土山畫夜苦戰以功授輕車將軍加持節卒於城內初黯為太僕卿而兄子粲為左衛率黯以故常怏怏謂人曰韋粲已落驊騮前朝廷是能用才不識者頗以此議之裴邃字深眀河東聞喜人魏冀州刺史徽之後也祖壽孫寓居壽陽為宋武帝前軍長史父仲穆驍騎將軍邃十嵗能屬文善左氏春秋齊東昏踐阼始安王蕭遙光為揚州刺史引邃為參軍遙光敗邃還壽陽會刺史裴叔業以夀陽降魏邃遂隨衆北徙魏宣武帝雅重之仕魏為魏郡太守魏遣王肅鎮夀陽邃固求隨肅密圖南歸天監初自拔南還除後軍咨議參軍邃求邊境自效以為廬江太守五年征邵陽洲魏人為長橋斷淮以濟邃築壘逼橋每戰輒克於是密作沒突艦會甚雨淮水暴溢邃乘艦徑造橋側進擊大破之以功封夷陵縣子遷廣陵太守與鄉人共入魏武廟因論帝王功業其妻甥王篆之密啓武帝云裴邃多大言有不臣迹由是左遷始安太守邃志立功邊垂不願間退乃致書於吕僧珍曰昔阮咸顔延有二始之歎吾才不逮古人今為三始非其願也後為竟陵太守開置屯田公私便之再遷西戎校尉北梁秦二州刺史復開創屯田數千頃省息邊運人吏獲安乃相率餉絹千餘匹邃不欲逆其意納二匹而已入為大匠卿普通二年義州刺史文僧眀以州入魏魏軍來援以邃為信武將軍督衆軍討焉邃深入魏境出其不意魏所署義州刺史封夀據檀公峴邃擊破之遂圍其城夀請降義州平除豫州刺史加督鎮合肥四年大軍北侵以邃督征討諸軍事先襲夀陽攻其郛斬門而入一日戰九合為後軍蔡秀成失道不至邃以援絶拔還於是邃復整兵收集士卒令諸將各以服色相别邃自為黃袍騎先攻拔狄邱甓城黎漿又屠安成馬頭沙陵等戍眀年略地至汝潁間所在響應魏夀陽守將長孫承業河間王元琛出城挑戰邃臨淮歎曰今日不破河間方為謝元所笑乃為四甄以待之令直閣將軍李祖憐偽遁以引承業承業等悉衆追之四甄競發魏軍大敗斬首萬餘級承業奔走閉門不敢復出在軍疾篤命衆軍守備身還合肥尋卒贈侍中左衛將軍進爵為侯諡曰烈邃深沉有思略為政寬眀能得士心居身方正有威重將吏憚之少敢犯法及卒淮肥間莫不流涕以為邃不死當大闢土宇云子之禮字子義美容儀能言元理為西豫州刺史母憂居喪唯食麥飯邃廟在光宅寺西堂宇宏敞松柏鬱茂范雲廟在三橋蓬蒿不翦武帝南郊道經二廟顧而嘆曰范為己死裴為更生大同初都下旱蝗四籬門外桐柏凋盡唯邃墓犬牙不入當時異之歷位黃門侍郎武帝設無遮會儛象驚排突陛衛王公皆散唯之禮與散騎常侍臧盾不動帝壯之以之禮為壯勇將軍北徐州刺史盾兼中領軍將軍之禮卒於少府卿諡曰壯子政承聖中位給事黃門侍郎魏克江陵隨例入長安邃兄髦位中散大夫髦子之髙字如山頗讀書少負意氣隨叔父邃征討所在立功甚為邃所器重戎政咸以委焉夀陽之役邃卒於軍所之髙𨽻夏侯夔平夀陽仍除梁郡太守封都城縣男時魏汝隂來附敕之髙應接仍除頴州刺史父憂還郡起為光逺將軍令討平隂陵盜以為譙州刺史侯景之亂之髙為西豫州刺史率衆入援南豫州刺史鄱陽嗣王範命之髙總督江右援軍諸軍事頓張公洲桞仲禮至橫江之髙遣船舸迎致仲禮與韋粲等俱會青塘及城陷之髙還合肥與鄱陽王範西上元帝遣召之以為侍中護軍將軍軍到江陵時之髙第六弟之悌在侯景中或傳之悌斬侯景元帝使兼中書舍人黃羅漢報之髙之髙竟無言直云賊自殺賊非之髙所聞元帝深嗟其介直承制除特進金紫光祿大夫卒諡曰恭子畿官至太子右衛率魏克江陵力戰死之之髙第十二弟之橫字如嶽少好賔遊重氣俠不事産業之髙以其縱誕乃為狹被蔬食以激厲之之橫嘆曰大丈夫富貴必作百幅被遂與僮屬數百人於芍陂大營田墅遂致殷積簡文在東宫聞而要之以為河東王常侍遷直閣將軍侯景之亂𨽻鄱陽王範討景景濟江仍與範世子嗣入援臺城城陷退還合肥侯景遣任約逼晉熙範令之橫下援未及至範薨之橫乃還時尋陽王大心在江州範副梅思立密要大心襲盆城之橫斬思立而拒大心大心以州降侯景之橫與兄之髙歸元帝位廷尉卿河東內史隨王僧辨拒侯景景退遷東徐州刺史封豫寧侯又隨僧辨破景景東奔僧辨命之橫與杜崱入守臺城及陸納據湘州叛又𨽻僧辨南討斬納將李賢眀平之又破武陵王於峽口還除吳興太守乃作百幅被以成其志魏克江陵齊遣上黨王髙渙挾貞陽侯眀攻東關晉安王承制以之橫為徐州刺史都督衆軍出守蘄城之橫營壘未周而齊軍大至兵盡矢窮遂於陳沒贈司空諡曰忠壯子鳳寶嗣江淹字文通濟陽考城人也父康之南沙令雅有才思淹少孤貧常慕司馬長卿梁伯鸞之為人不知章句之學留情於文章早為髙平檀超所知常升以上席甚加禮焉起家南徐州從事轉奉朝請宋建平王景素好士淹隨景素在南兖州廣陵令郭彥文得罪辭連淹言受金淹被繫獄自獄中上書曰昔者賤臣叩心飛霜擊於燕地庶女告天振風襲於齊臺下官每讀其書未嘗不廢卷流涕何者士有一定之論女有不易之行信而見疑貞而為戮是以壯夫義士伏死而不顧者以此也下官聞仁不可恃善不可依謂徒虛語乃今知之伏願大王暫停左右少加矜察下官本蓬戶桑樞之人布衣韋帶之士退不飾詩書以驚愚進不買聲名於天下日者謬得升降承眀之闕出入金華之殿何嘗不局影凝嚴側身扄禁者乎竊慕大王之義復為門下之賔備鳴盜淺術之餘豫三五賤伎之末大王惠以恩光顧以顔色實佩荆卿黃金之賜竊感豫讓國士之分矣常欲結纓伏劍少謝萬一剖心摩踵以報所天不圖小人固陋坐貽謗缺迹墜昭憲身限幽圄履影弔心酸鼻痛骨下官聞虧名為辱虧形次之是以每一念來忽若有遺加以涉旬月迫季秋天光沈隂左右無色身非木石與獄吏為伍此少卿所以仰天椎心泣盡而繼之以血者也下官雖乏鄉曲之譽然嘗聞君子之行矣其上則隱於簾肆之間卧於巖石之下次則結綬金馬之庭髙議雲臺之上退則虜南越之君係單于之頸俱啓丹册並圖青史寧爭分寸之末競錐刀之利哉下官聞積毁銷金積讒摩骨逺則直生取疑於盜金近則伯魚被名於不義彼之二才猶或如是况在下官焉能自免昔上將之恥絳侯幽獄名臣之羞史遷下室至如下官當何言哉夫以魯連之智辭祿而不反接輿之賢行歌而忘歸子陵閉關於東越仲蔚杜門於西秦亦良可知也若使下官事非其虛罪得其實亦當鉗口吞舌伏匕首以殞命何以見齊魯竒節之人燕趙悲歌之士乎方今聖歷欽眀天下樂業青雲浮洛榮光塞河西洎臨洮狄道北距飛狐陽原莫不寖仁沐義照景飲醴而已下官抱痛圜門含憤獄戶一物之微有足悲者仰惟大王少垂眀白則梧邱之魂不愧於沈首鵠亭之鬼無恨於灰骨景素覽書即日出之尋舉南徐州秀才對䇿上第再遷府主簿景素為荆州淹從之鎮少帝即位多失德景素専據上流咸勸因此舉事淹每從容進諫景素不納及鎮京口淹為鎮軍參軍領南東海郡丞景素與腹心日夜謀議淹知禍機將發乃贈詩十五首以諷焉會東海太守陸澄丁艱淹自謂郡丞應行郡事景素用司馬栁世隆淹固求之景素大怒言於選部黜為建安吳興令及齊髙帝輔政聞其才召為尚書駕部郎驃騎參軍事俄而荆州刺史沈攸之作亂髙帝謂淹曰天下紛紛若是君謂何如淹曰昔項強而劉弱袁衆而曹寡羽卒受一劔之辱紹終為奔北之虜此所謂在德不在鼎公何疑哉帝曰試為我言之淹曰公雄武有竒略一勝也寬容而仁恕二勝也賢能畢力三勝也人望所歸四勝也奉天子而伐叛逆五勝也彼志鋭而器小一敗也有威無恩二敗也士卒解體三敗也搢紳不懷四敗也懸兵數千里而無同惡相濟五敗也雖豺狼十萬而終為我獲焉帝笑曰君談過矣桂陽之役朝廷周章詔檄久之未就齊髙帝引淹入中書省先賜酒食淹素能飲啖食鵝炙垂盡進酒數升訖文誥亦辦相府建補記室參軍髙帝讓九錫及諸表章皆淹製也齊受禪復為驃騎豫章王嶷記室參軍建元二年始置史官淹與司徒左長史檀超共掌其任所為條例並為王儉所駮其言皆不行淹任性文雅不以著述在懷所撰十三篇竟無次序又領東武令參掌詔䇿後拜中書侍郎王儉嘗謂曰卿年三十五已為中書侍郎才學如此何憂不至尚書金紫所謂富貴卿自取之但問年夀何如爾淹曰不悟眀公見眷之重永眀三年兼尚書左丞時襄陽人開古冢得玉鏡及竹簡古書字不可識王僧虔善識字體亦不能諳直云似是科斗書淹以科斗字推之則周宣王之前也簡殆如新少帝初兼御史中丞眀帝作相謂淹曰君昔在尚書中非公事不妄行在官寬猛能折衷今為南司足以振肅百僚也淹曰今日之事可謂當官而行更恐不足仰稱眀旨爾於是彈中書令謝朏司徒左長史王繢護軍長史庾𢎞逺並以托疾不豫山陵公事又奏收前益州刺史劉悛梁州刺史隂智伯並贓貨巨萬輒收付廷尉臨海太守沈昭略永嘉太守庾曇隆及諸郡二千石并大縣官長多被劾內外肅然眀帝謂曰自宋以來不復有嚴眀中丞君今日可謂近世獨步也纍遷祕書監侍中衛尉卿初淹年十三時孤貧常采薪以養母曾於樵所得貂蟬一具將鬻以供養其母曰此故汝之休徴也汝才行如此豈長貧賤也可留待得侍中著之至是果如母言永元中崔慧景舉兵圍都衣冠悉投名刺淹稱疾不往及事平時人服其先見東昏末淹以祕書監兼衛尉又副領軍王瑩及武帝至新林淹微服來奔位相國右長史天監元年為散騎常侍左衛將軍封臨沮縣伯淹乃謂子弟曰吾本素宦不求富貴今之忝竊遂至於此平生言止足之事亦以備矣人生行樂須富貴何時吾功名既立正欲歸身草萊耳以疾遷金紫光祿大夫改封醴陵侯卒武帝為素服舉哀諡曰憲淹少以文章顯晚節才思微退云為宣城太守時罷歸始泊禪靈寺渚夜夢一人自稱張景陽謂曰前以一匹錦相寄今可見還淹探懷中得數尺與之此人大恚曰那得割截都盡顧見邱遲謂曰餘此數尺既無所用以遺君自爾淹文章躓矣又常宿於冶亭夢一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可以見還淹乃探懷中得五色筆一以授之爾後為詩絶無美句時人謂之才盡凡所著述自撰為前後集并齊史十志並行於世嘗欲為赤縣經以補山海之闕竟不成子蒍嗣任昉字彥升樂安博昌人也父遙齊中散大夫遙兄遐字景逺少敦學業家行甚謹位御史中丞金紫光祿大夫永眀中遐以罪將徙荒裔遙懷名請訴言淚交下齊武帝聞而哀之竟得免遙妻河東裴氏髙眀有德行嘗晝卧夢有五色采旗蓋四角懸鈴自天而墜其一鈴落入懷中心悸因而有娠占者曰必生才子及生昉身長七尺五寸幼而聰敏早稱神悟四嵗誦詩數十篇八嵗能屬文自製月儀辭義甚美褚淵嘗謂遙曰聞卿有令子相為喜之所謂百不為多一不為少由是聞聲藉甚年十二從叔晷有知人之量見而稱其小名曰阿堆吾家千里駒也昉孝友純至每侍親疾衣不解帶言與淚并湯藥飲食必先經口初為奉朝請舉兖州秀才拜太學博士永眀初衛將軍王儉領丹陽尹復引為主簿儉每見其文必三復殷勤以為當時無輩曰自傅季友以來始復見於文子若孔門是用其入室升堂於是令昉作一文及見曰正得吾腹中之欲乃出自作文令昉點正昉因定數字儉拊几嘆曰後世誰知子定吾文其見知如此後為司徒竟陵王記室參軍時琅邪王融有才俊自謂無對當時見昉之文恍然自失以父喪去官泣血三年杖而後起齊武帝謂昉伯遐曰聞昉哀瘠過禮使人憂之非直亡卿之寶亦時才可惜宜深相全譬遐使進飲食當時勉勵回即嘔出昉父遙本性重檳榔以為常餌臨終嘗求之剖百許口不得好者昉亦所嗜好深以為恨遂終身不嘗檳榔遭繼母憂昉先以毁瘠每一慟絶良久乃蘇因廬於墓側以終喪禮哭泣之地草為不生昉素強壯腰帶甚充服闋後不復可識齊眀帝深加器異欲大相擢引為愛憎所白乃除太子步兵校尉掌東宫書記齊眀帝廢鬱林王始為侍中中書監驃騎大將軍開府儀同三司揚州刺史録尚書事封宣城郡公使昉具草帝惡其辭斥甚慍昉亦由是終建武中位不過列校昉尤長為筆頗慕傅亮才思無窮當時王公表奏無不請焉昉起草即成不加點竄沈約一代辭宗深所推挹永元中紆意於梅蟲兒東昏中旨用為中書郎謝尚書令王亮亮曰卿宜謝梅那忽謝我昉慙而退末為司徒右長史武帝克建鄴霸府初開以為驃騎記室參軍專主文翰每制書草沈約輒求同署嘗被急召昉出而約在是後文筆約參製焉始武帝與昉遇竟陵王西邸從容謂昉曰我登三府當以卿為記室昉亦戲帝曰我若登三事當以卿為騎兵以帝善騎也至是引昉符昔言焉昉奉箋云昔承清宴屬有緒言提挈之旨形乎善謔豈謂多幸斯言不渝蓋謂此也梁臺建禪讓文誥多昉所具奉世叔父母不異嚴親事兄嫂恭謹外氏貧闕恆營奉供養祿奉所收四方餉遺皆頒之親戚即日便盡性通脫不事儀形喜怒未嘗形於色車服亦不鮮眀武帝踐阼歷給事黃門侍郎吏部郎出為義興太守嵗荒民散以私奉米豆為粥活三千餘人時産子者不舉昉嚴其制罪同殺人孕者供其資費濟者千室在郡所得公田奉秩八百餘石昉五分督一餘者悉原兒妾食麥而已友人彭城到溉溉弟洽從昉共為山澤遊及被代登舟止有絹七匹米五石至都無衣鎮軍將軍沈約遺裙衫迎之重除吏部郎參掌大選居職不稱尋轉御史中丞袐書監自齊永元以來祕閣四部篇卷紛雜昉手自讎校由是第目定焉出為新安太守在郡不事邊幅率然曵杖徒行邑郭人通辭訟者就路決焉為政清省吏人便之卒於官唯有桃花米二十石無以為斂遺言不許以新安一物還都雜木為棺浣衣為斂闔境痛惜百姓共立祠堂於城南嵗時祠之武帝聞問方食西苑緑沈瓜投之於盤悲不自勝因屈指曰昉少時常恐不滿五十今四十九可謂知命即日舉哀哭之甚慟追贈太常諡曰敬子昉好交結奬進士友不附之者亦不稱述得其延譽者多見升擢故衣冠貴遊莫不多與交好坐上客恆有數十時人慕之號曰任君言如漢之三君也在郡尤以清潔著名百姓年八十以上者遣戶曹掾訪其寒溫嘗欲營佛齋調楓香二石始入三斗便出教長斷曰與奪自己不欲貽之後人郡有蜜嶺及楊梅舊為太守所采昉以冒險多物故即時停絶吏人咸以百餘年未之有也為家誡殷勤甚有條貫陳郡殷藝與建安太守到溉書曰哲人云亡儀表長謝元龜何寄指南何託其為士友所推如此昉不事生産至乃居無室宅時或譏其多乞貸亦隨復散之親故常自歎曰知我者亦以叔則不知我者亦以叔則既以文才見知時人云任筆沈詩昉聞甚以為病晚節轉好著詩欲以傾沈用事過多屬辭不得流便自爾都下士子慕之轉為穿鑿於是有才盡之談矣博學於書無所不見家雖貧聚書至萬餘卷率多異本及卒後武帝使學士賀縱共沈約勘其書目官無者就其家取之所著文章數十萬言盛行於時東海王僧孺嘗論之以為過於董生揚子昉樂人之樂憂人之憂虛往實歸忘貧去吝行可以厲風俗義可以厚人倫能使貪夫不取懦夫有立其見重如此有子東里西華南容北叟並無術業墜其家聲兄弟流離不能自振生平舊交莫有收恤西華冬月著葛帔練裙道逢平原劉孝標泫然矜之曰我當為卿作計乃著廣絶交論以譏其舊交曰客問主人曰朱公叔絶交論為是乎為非乎主人曰客奚此之問客曰夫草蟲鳴則阜螽躍雕龍嘯而清風起故氤氲相感霧涌雲蒸嚶鳴相召星流電激是以王陽登則貢公喜罕生逝而國僑悲且心同琴瑟言鬱郁於蘭茝道叶膠漆志婉孌於塤箎聖賢以此鏤金版而鐫盤盂書玉牒而刻鐘鼎若乃匠石輟成風之妙巧伯牙息流波之雅引范張款款於下泉尹班陶陶於永夕駱驛縱橫煙霏雨散巧歷所不知心計莫能測而朱益州汨彝敘粵謨訓捶直切絶交遊視黔首以鷹鸇嫓人靈於豺虎蒙有猜焉請辨其惑主人欣然曰客所謂撫弦徽音未達燥濕變響張羅沮澤不睹鴻鴈髙飛蓋聖人握金鏡闡風烈龍驤蠖屈從道汙隆日月連璧贊亹亹之𢎞致雲飛雷薄顯棣華之微旨若五音之變化濟九成之妙曲此朱生得元珠於赤水謨神睿以為言至夫組織仁義琢磨道德歡其愈樂恤其陵夷寄通靈臺之下遺迹江湖之上風雨急而不輟其音霜雪零而不渝其色斯賢逹之素交歷萬古而一遇逮叔世人訛狙詐飈起溪谷不能踰其險鬼神無以究其變競毛羽之輕趨錐刀之末於是素交盡利交興天下蚩蚩鳥驚雷駭然利交同源派流則異較言其略有五術焉若其寵均董石權壓梁竇雕刻百工爐錘萬物吐嗽興雲雨呼吸下霜露九域聳其風塵四海疊其燻灼靡不望影星奔藉響川鶩雞人始唱鶴蓋成隂髙門旦開流水接軫皆願摩頂至踵隳膽抽腸約同要離焚妻子誓殉荆卿湛七族是曰勢交其流一也富埒陶白資巨程羅山擅銅陵家藏金冗出平原而聫騎居里閈而鳴鐘則有窮巷之賔繩樞之士冀宵燭之末光邀潤屋之微澤魚貫鳬躍颯沓鱗萃分鴈鶩之稻粱霑玉斚之餘瀝銜恩遇進款誠援青松以示心指白水而旌信是曰賄交其流二也陸大夫燕喜西都郭有道人倫東國公卿貴其籍甚縉紳羡其登仙加以斂頤蹙頞涕唾流沫騁黃馬之劇談縱碧雞之雄辨敘溫燠則寒谷成暄論嚴枯則春叢零葉飛沉出其顧指榮辱定其一言於是有弱冠王孫綺紈公子道不挂於通人聲未遒於雲閣攀其鱗翼丐其餘論附騏驥之旄端軼歸鴻於碣石是曰談交其流三也陽舒隂慘生靈大情憂合歡離品物恆性故魚以泉涸而詬沫鳥因將死而鳴哀同病相憐綴河上之悲曲恐懼置懷昭谷風之盛典斯則斷金由於湫隘刎頸起於苫蓋是以伍員濯溉於宰嚭張王撫翼於陳相是曰窮交其流四也馳鶩之俗澆薄之倫無不操權衡執纎纊衡所以揣其輕重纊所以屬其鼻息若衡不能舉纊不能飛雖顔冉龍翰鳯雛曾史蘭薰雪白舒向金玉泉海卿雲黼黻河漢視若遊塵遇同土梗莫肯費其半菽罕有落其一毛若衡重錙銖纊微彯撇雖共工之搜慝歡兜之掩義南荆之跋扈東陵之巨猾皆為匐匐委蛇折支舐痔金膏翠羽將其意脂韋便辟導其誠故輪蓋所遊必非夷惠之室苞苴所入實行張霍之家謀而後動芒毫寡忒是曰量交其流五也凡斯五交義同賈鬻故桓談譬之於闤闠林回諭之於甘醴夫寒暑遞進盛衰相襲或前榮而後悴或始富而終貧或初存而末亡或古約而今泰循環反覆迅若波瀾此則徇利之情未嘗異變化之道不得一由是觀之張陳所以凶終蕭朱所以隙末斷焉可知矣而翟公方規規然勒門以針客何所視之晚乎然因此五交是生三釁敗德殄義禽獸相若一釁也難固易擕讐訟所聚二釁也名陷叨餮貞介所羞三釁也古人知三釁之為梗懼五交之速尤故王丹威子以檟楚朱穆昌言而示絶有旨哉近世有樂安任昉海內髦傑早綰銀黃夙昭人譽遒文麗藻方駕曹王英跱俊邁聨橫許郭類田文之愛客同鄭莊之好賢見一善則盱衡扼腕遇一才則揚眉抵掌雌黃出其唇吻朱紫由其月旦於是冠蓋輻湊衣裳雲合輜軿擊轊坐客恆滿蹈其閫閾若升闕里之堂入其隩隅謂登龍門之坂至於顧眄增其倍價翦拂使其長鳴彯組雲臺者摩肩趨走丹墀者疊迹莫不締恩狎結綢繆思惠莊之清塵庶羊左之徽烈及瞑目東粵歸骸洛浦繐帳猶懸門空漬酒之彥墳草未宿野絶動輪之賔藐爾諸孤朝不謀夕流離大海之南寄命瘴癘之地自昔把臂之英金蘭之友曾無羊舌下泣之仁寧慕郈成分宅之德嗚呼世路之嶮􅤡一至於此也太行孟門豈云嶄絶是以耿介之士疾其若斯裂裳褁足棄之長鶩獨立髙山之頂歡與麋鹿同羣皎皎然絶其氛濁誠耻之也誠畏之也到溉見其論抵几於地終身恨之昉撰雜傳二百四十七卷地記二百五十二卷文章三十三卷東里位尚書外兵郎柳惔字文通河東解人也伯祖元景宋贈太尉父世隆齊左光祿大夫侍中元景世隆俱有傳惔好學工製文尤曉音律少與長兄中書郎恱齊名琅邪王儉謂人曰柳氏二龍可謂一日千里儉為尚書左僕射嘗造世隆宅世隆謂為詣已徘徊久之及至門唯求恱及惔遣謂世隆曰賢子俱有盛才一日見顧今故報禮若仍相造似非本意恐年少窺人嘗豫齊武烽火樓宴帝善其詩謂豫章王嶷曰惔非徒風韻精爽亦屬文遒麗後為巴東王子響友子響為荆州惔隨之鎮響昵近小人惔知將為禍稱疾還都及難作以免纍遷新安太守居郡以無政績免建武末為梁南秦二州刺史及武帝起兵惔舉漢中以應武帝帝受命為太子詹事加散騎常侍武帝之鎮襄陽惔祖道帝解茅土玉環贈之天監二年元會帝謂曰卿所佩玉環是新亭所贈邪對曰既而瑞感神衷臣謹服之無斁帝因勸之酒惔時未卒爵帝曰吾常比卿劉越石近辭巵酒邪罷會封曲江縣侯帝因宴為詩貽惔曰爾實冠羣后惟余實念功帝又嘗謂曰徐元瑜違命嶺南周書父子兄弟罪不相及朕已放其諸子何如惔曰罰不及嗣賞延於後今復見之聖朝時以為知言尋遷尚書左僕射年六十卒於湘州刺史諡曰穆惔度量寬博家人未嘗見其喜愠甚重其婦頗成畏憚性愛音樂女妓精麗略不敢視僕射張稷與惔狎密而為惔妻賞敬稷每詣惔必先相問夫人惔每欲見妓恆因稷請奏其妻隔幔坐妓然後出惔因得留目惔著仁政傳及諸詩賦粗有辭義子昭位中書郎襲爵曲江侯惔弟惲字文暢少有志行好學善尺牘與陳郡謝草瀹鄰居深見友愛草瀹曰宅南柳郎可為儀表初宋時有嵇元榮羊蓋者並善琴云傳戴安道法惲從之學惲特窮其妙齊竟陵王子良聞而引為法曹行參軍唯與王暕陸果善每嘆曰暕雖名家猶恐纍我也雅被子良賞狎子良嘗置酒後園有晉太傅謝安鳴琴在側援以授惲惲彈為雅弄子良曰卿巧越嵇心妙臻羊體良質美手信在今夜豈止當今稱竒亦可追蹤古烈為太子洗馬父憂去官著述先頌申其罔極之心文甚哀麗後試守鄱陽相聼吏屬得盡三年喪禮署之文教百姓稱焉還除驃騎從事中郎武帝至建鄴惲候謁石頭以為征東府司馬上箋請城平之日先收圖籍及遵漢髙寬大之義帝從之徙為相國右司馬天監元年除長兼侍中與僕射沈約等共定新律惲立性貞素以貴公子早有令名少工篇什為詩云亭臯木葉下隴首秋雲飛琅邪王融見而嗟賞因書齋壁及所執白團扇武帝與宴必詔惲賦詩嘗和武帝登景陽樓篇云太液滄波起長楊髙樹秋翠華承漢逺雕輦逐風遊深見賞美當時咸共稱傳歷平越中郎將廣州刺史祕書監右衛將軍再為吳興太守為政清靜人吏懷之於郡感疾自陳解任父老千餘人拜表陳請事未施行卒初惲父世隆彈琴為士流第一惲每奏其父曲常感思復變體備寫古曲嘗賦詩未就以筆捶琴坐客過以筯和之惲驚其哀韻乃製為雅音後傳擊琴自於此惲常以今聲轉棄古法乃著清調論具有條流齊竟陵王嘗宿宴明旦將朝見惲投壺聲不絶停􅓅久之進見遂晚齊武帝遲之王以實對武帝復使為之賜絹二十匹嘗與琅邪王瞻博射嫌其皮濶乃摘梅帖烏珠之上發必命中觀者驚駭武帝好奕棊使惲品定棊譜集能者二百七十八人第其優劣為棊品三卷惲為第二焉帝謂庾楷曰吾聞君子不可求備至如栁惲可謂具美分其才藝足了十人惲著卜杖龜經性好醫術盡其精妙少子偃字彥遊年十二武帝引見詔問讀何書對曰尚書又問有何美句對曰德惟善政政在養民衆咸異之詔尚武帝女長城公主拜駙馬都尉都亭侯位鄱陽內史卒子昐尚陳文帝女富陽公主拜駙馬都尉加散騎常侍愚戅使酒因醉乘馬入殿門為有司所劾卒於家贈侍中中護軍惲弟憕字文深少有大意好元言通老易武帝舉兵至姑熟憕與兄惲及諸友朋於小郊候接時道路猶梗憕與諸人同憩逆旅食俱去行里餘憕曰寧我負人無人負我若復有追堪憩此客舍命左右燒逆旅舍以絶後追當時服其善斷歷位給事黃門侍郎與琅邪王峻齊名俱為中庶子時人號為方正後為鎮北始興王長史王移鎮益州復請憕帝曰栁憕風標才氣恐不能久為少王臣王祈請數四不得已以為鎮西長史蜀郡太守在蜀廉恪為政益部懷之憕弟忱字文若年數嵗父世隆及母閻氏並疾忱不解帶經年及居喪以毁聞仕齊為西中郎主簿東昏遣巴西太守劉山陽由荆州襲武帝于雍州西中郎長史蕭頴胄計未定召忱及其所親席闡文等夜入議之忱及闡文並勸同武帝頴胄從之以忱為寧朔將軍纍遷侍中郢州平頴胄議遷都夏口忱以巴峽未賔不宜輕捨根本搖動人心不從俄而巴東兵至峽口遷都之議乃息論者以為見機及武帝受命封州陵伯歷五兵尚書祕書監散騎常侍改授給事中光祿大夫疾篤不拜卒諡曰穆忱兄弟十五人多少亡唯第二兄惔第三兄惲第四兄憕及忱三兩年間迭為侍中復居方伯當世罕比子範嗣忱從父慶逺字文和父叔珍義陽內史慶逺仕齊為魏興太守郡遭暴水人欲移於杞城慶逺曰吾聞江河長不過三日命築土而已俄而水退百姓服之後為襄陽令武帝之臨雍州問京兆人杜惲求州綱紀惲言慶逺武帝曰文和吾已知之所問未知者耳因辟為别駕慶逺謂所親曰天下方亂定霸者其吾君乎因盡誠協贊及起兵慶逺常居帷幄為謀主從軍東下身先士卒武帝行營見慶逺頓舍嚴整每嘆曰人人若是吾又何憂建康城平為侍中帶淮陵齊昌二郡太守城內嘗夜火衆並驚懼武帝時居宫中悉斂諸門鑰問栁侍中何在慶逺至悉付之其見任如此霸府建為從事中郎武帝受禪封重安侯位散騎常侍改封雲杜侯出為雍州刺史加都督帝餞於新亭謂曰卿衣錦還鄉朕無西顧憂矣始武帝為雍州慶逺為别駕謂曰昔羊公語劉𢎞卿後當居吾處今相觀亦復如是曾未十年而慶逺督府談者以為逾於魏詠之纍遷侍中領軍將軍給扶出為雍州刺史慶逺重為本州頗厲清節士庶懷之卒官贈開府儀同三司諡曰忠惠侯喪還都武帝親出臨之初慶逺從父兄世隆嘗謂慶逺曰吾昔夢太尉以褥席見賜吾遂亞台司適又夢以吾褥席與汝汝必光我門族至是慶逺亦繼世隆焉慶逺子津字元舉雖乏風華性甚強直人或勸之聚書津曰吾嘗請道士上章驅鬼安用此鬼名邪歷散騎常侍太子詹事襲封雲杜侯侯景圍城既急帝召津問䇿對曰陛下有邵陵臣有仲禮不忠不孝賊何由可平太清三年城陷卒子仲禮勇力兼人少有膽氣身長八尺眉目踈朗初簡文帝為雍州刺史津為長史及簡文入居儲宫津亦得侍從仲禮留在襄陽馬仗軍人悉付之撫循故舊甚得衆和起家著作佐郎稍遷電威將軍陽泉縣侯中大通中西魏將賀拔勝來逼樊鄧仲禮出擊破之除黃門郎稍遷司州刺史武帝思見其面使畫工圖之初侯景潛圖反噬仲禮先知之屢啓求以精兵三萬討景朝廷不許及景濟江朝野便望其至仲禮率雍司精卒赴援諸藩推為總督景素聞其名甚憚之仲禮亦自謂當世英雄諸將莫已若也韋粲見攻仲禮方食投箸被練馳之騎能屬七十比至粲已敗仲禮因與景戰於青塘大敗之景與仲禮交戰各不相知仲禮矟將及景而賊將支伯仁自後斫仲禮中肩馬陷於淖賊知為仲禮聚矟刺之騎將郭山石救之以免自此壯氣外衰不復言戰神情慠佷凌蔑將帥邵陵王綸亦鞭策軍門每日必至纍刻移時仲禮亦弗見也綸既忿難怨隙遂成而仲禮常置酒髙會日作優倡毒掠百姓汙辱妃主父津登城謂曰汝君父在難不能盡心竭力百代之後謂汝為何仲禮聞之言笑自若晚又與臨城公大連不協景嘗登朱雀樓與語遺以金鐶是後閉營不戰衆軍日往固請皆悉拒焉南安侯駿謂曰城急如此都督不復處分如脫不守何靣以見天下義士仲禮無以應之及臺城陷侯景矯詔使石城公大款以白虎幡解諸軍仲禮召諸將軍會議邵陵王以下畢集王曰今日之命委之將軍仲禮熟視不對裴之髙王僧辨曰將軍擁衆百萬致宫闕淪沒正當悉力決戰何所多言仲禮竟無一言諸軍乃隨方各散時湘東王繹遣王琳送米二十萬石以饋軍至姑熟聞臺城陷乃沈米於江而退仲禮及弟敬禮羊鴉仁王僧辨趙伯超並開營降賊時城雖淪陷援軍甚衆軍士咸欲盡力及聞降莫不歎憤論者以為梁禍始於朱異成於仲禮仲禮等入城並先拜景而後見帝帝不與言既而景留其弟敬禮羊鴉仁遣仲禮僧辨西上各復本位餞於後渚景執仲禮手曰天下之事在將軍耳郢州已西並以相付及至江陵會嶽陽王察南冦湘東王以仲禮為雍州刺史襲襄陽仲禮方觀成敗未發及南陽圍急杜岸請救仲禮乃以别將夏侯強為司州刺史守義陽自帥衆如安陸使司馬康昭如竟陵討孫皓皓執魏戍人以降仲禮命其將王叔孫為竟陵太守副軍馬岫為安陸太守置孥於安陸而以輕兵師於漴頭將侵襄陽嶽陽王察告急於魏魏遣大將楊忠援之仲禮與戰於漴頭大敗并弟子禮沒於魏魏相安定公宇文泰待仲禮以客禮西魏於是盡得漢東敬禮少以勇烈聞粗暴無行檢恆略賣人為百姓所苦故襄陽有栁四郎歌起家著作佐郎稍遷扶風太守侯景度江敬禮率馬步三千赴援至都與景頻戰甚著威名臺城陷景與仲禮經略上流留敬禮為質以為護軍將軍景餞仲禮於後渚敬禮謂仲禮曰景今來會敬禮抱之兄便可殺雖死無恨仲禮壯其言許之及酒數行敬禮目仲禮仲禮見備衛嚴不敢動遂不果會景征晉熙敬禮與南康王會理謀襲其城尅期將發建安侯蕭賁告之遂遇害臨死曰我兄老婢也國敗家亡實余之責今日就死豈非天乎王志字次道琅邪臨沂人齊侍中僧虔之子也志九嵗居所生母憂哀容毁瘠為中表所異弱冠選尚宋孝武女安固公主拜駙馬都尉褚淵時為司徒引志為主簿謂其父僧虔曰朝廷之恩本為殊特所可光榮在屈賢子纍遷宣城內史清謹有恩惠郡人張倪吳慶爭田經年不決志到官父老相謂曰王府君有德政吾鄉里乃有如此爭倪慶因相擕請罪所訟地遂成間田後為東陽太守郡獄有重囚十餘冬至日悉遣還家過節皆反唯一人失期志曰此自太守事主者勿憂明旦果至稱為婦孕吏人益嘆服之為吏部尚書在選以和理稱崔慧景平以例加右軍將軍封臨汝侯固讓改領右衛將軍及武帝軍至城內弒東昏百僚署名送首志歎曰冠雖弊可加足乎因取庭樹葉捼服之偽悶不署名武帝覽箋無志署心嘉之弗以讓也霸府開為驃騎大將軍長史梁臺建位散騎常侍中書令天監初為丹陽尹為政清靜都下有寡婦無子姑亡舉責以斂葬既而無以還之志愍其義以奉錢償焉時年飢每旦為粥於郡門以賑百姓衆悉稱惠常懷止足謂諸子姪曰謝莊在宋孝武時位止中書令吾自視豈可過之三年為散騎常侍中書令因多謝病簡通賔客九年還為散騎常侍金紫光祿大夫卒志善藁𨽻當時以為楷法齊遊擊將軍徐希秀亦號能書常謂志為書聖志家居建康禁中里馬糞巷父僧虔門風寬恕志尤惇厚所歷不以罪咎劾人門下客嘗盜脫志車幰賣之志知而不問待之如初賔客遊其門者專蓋其過而稱其善兄弟子姪皆篤實謙和時人號馬糞諸王為長者普通四年志改葬武帝厚賻贈之諡曰安有五子緝休諲操素志兄慈仕齊為冠軍將軍卒贈太常慈子泰字仲通幼敏悟年數嵗時祖母集諸孫姪散棗栗於牀羣兒競之泰獨不取問其故對曰不取自當得賜由是中表異之少好學手所抄寫二千許卷及長通和溫雅家人不見喜愠之色姊夫齊江夏王鋒為齊明帝所害外甥蕭子友並孤弱泰資給撫訓逾於子姪天監元年為祕書丞自齊永元之末後宫火延燒祕書書圖散亂殆盡泰表校定繕寫武帝從之歷中書侍郎掌吏部仍即真自過江吏部郎不復典大選令史以下小人求競者輻湊前後少能稱職泰為之不為貴賤請屬易意天下稱平轉黃門侍郎每豫朝宴刻燭賦詩文不加點帝深賞嘆沈約常曰王有養炬謝有覽舉養泰小字炬筠小字也始革大理以泰為廷尉卿再歷侍中後為都官尚書泰能接人士故每願其居選官頃之為吏部尚書衣冠屬望未及選舉乃疾改除散騎常侍左驍騎將軍未拜卒諡曰夷子廓志弟揖位太中大夫揖子筠字元禮一字德柔幼而警悟七嵗能屬文年十六為芍藥賦其辭甚美及長清靜好學與從兄泰齊名沈約見筠以為似外祖袁粲謂僕射張稷曰王郎非唯額類袁公風韻都欲相似稷曰袁公見人輒矜嚴王郎見人必娛笑惟此一條不能酷似仕為尚書殿中郎王氏過江以來未有居郎署或勸不就筠曰陸平原東南之秀王文度獨步江東吾得比蹤昔人何所多恨乃欣然就職沈約每見筠文咨嗟嘗謂曰昔蔡伯喈見王仲宣稱曰王公之孫吾家書籍悉當相與僕雖不敏請附斯言自謝朓諸賢零落平生意好殆絶不謂疲暮復逢於君約於郊居宅閣齋請筠為草木十詠書之壁皆真寫文辭不加篇題約謂人曰此詩指物程形無假題署約製郊居賦構思積時猶未都畢示筠草筠讀至雌霓五的反連蜷約撫掌欣抃曰僕常恐人呼為霓五兮反次至墜石磓星及氷懸塪而帶抵筠皆擊節稱贊約曰知音者希真殆竒絶所以相要政在此數句耳筠又嘗為詩呈約約即報書歎詠以為後進擅美筠又能用強韻每公宴並作辭必研靡約嘗啓上言晚來名家無先筠者又於御筵謂王志曰賢弟子文章之美可謂後來獨步謝朓常見語云好詩圓美流轉如彈丸近見其數首方知此言為實纍遷太子洗馬中舍人並掌東宫管記昭眀太子愛文學士常與筠及劉孝綽陸倕到洽殷鈞等遊宴元圃太子獨執筠袖撫孝綽肩曰所謂左把浮邱袖右拍洪崖肩其見重如此筠又與殷鈞以方雅見禮後為中書郎奉敕製開善寺寶志法師碑文辭甚麗逸又敕撰中書表奏三十卷及所上賦頌都為一集後為太子家令復掌管記普通元年以母憂去職筠有孝性毁瘠過禮大通二年為司徒左長史三年昭明太子薨敕製哀䇿文復見嗟賞尋出為臨海太守在郡侵刻還資有芒屩兩船他物稱是為有司所奏不調纍年後歷祕書監太府卿度支尚書司徒左長史及簡文即位為太子詹事筠家纍千金性儉嗇外物粗弊所乘牛嘗飼以青草及遇亂舊宅先為賊焚乃寓居國子祭酒蕭子雲宅夜忽有盜攻懼墜井卒時年六十九家人十三口同遇害人棄尸積於空井中筠狀貌寢小長不滿六尺性𢎞厚不以藝能髙人而少擅才名與劉孝綽見重當時其自序云余少好抄書老而彌篤雖遇見瞥觀皆即疏記後重省覽歡興彌深習與性成不覺筆倦自年十三四齊建武二年乙亥至梁大同六年四十載矣初年讀五經皆七八十遍愛左氏春秋吟諷常為口實廣略去取凡三過五抄餘經及周官儀禮國語爾雅山海經本草並再抄子史諸集皆一遍未嘗倩人假手並躬自抄録大小百餘卷不足傳之好事蓋以備遺忘而已又與諸兒書論家門集云史傳稱安平崔氏及汝南應氏並纍葉有文才所以范蔚宗云崔氏雕龍然不通父子兩三世耳非有七葉之中名德重光爵位相繼人人有集如吾門者也沈少博約常語人云吾少好百家之言身為四代之史自開闢以來未有爵位蟬聨文才相繼如王氏之盛也汝等仰觀堂構思各努力筠自撰其文章以一官為一集自洗馬中書中庶吏部左佐臨海太府各十卷尚書三十卷凡一百卷行於世子祥仕陳位黃門侍郎揖弟彬字思文好文章習篆𨽻與志齊名時人為之語曰三真六草為天下寶齊武帝起舊宫彬獻賦文辭典麗尚齊髙帝女臨海長公主拜駙馬都尉仕齊歷太子中庶子徙永嘉太守卜室於積榖山有終焉之志天監中歷吏部尚書祕書監卒諡曰惠彬立身清白推賢接士有士君子風彬弟寂字子元性迅動好文章讀范滂傳未嘗不嘆悒王融敗後賔客多歸之齊建武初欲獻中興頌兄志謂曰汝膏粱年少何患不逹不鎮之以靜將恐貽譏寂乃止位祕書郎卒年二十一志從子騫字思寂本字元成與齊髙帝偏諱同故改焉太尉儉之子也騫性凝簡慕樂廣之為人未嘗言人之短諸女子姪皆嬪王尚主朔望來歸輜軿填咽非所欲也敕嵗中不過一再見嘗從容謂諸子曰吾家本素族自可依流平進不須茍求也歷黃門郎司徒右長史不事産業有舊墅在鐘山八十餘頃與諸宅及故舊共佃之常謂人曰我不如鄭公業有田四百頃而食常不周以此為愧永元末召為侍中不拜三年春枉矢晝見西方長十餘丈騫曰此除舊布新之象也及武帝起兵騫曰天時人事其在此乎武帝霸府建引為大司馬咨議參軍遷侍中及帝受禪降封為侯歷位度支尚書中書令武帝於鐘山西造大愛敬寺騫舊墅在寺側者即王導賜田也帝遣主書宣旨就騫市之欲以施寺答云此田不賣若敕取所不敢言酬對又脫略帝怒遂付市評田價以直逼還之由是忤旨出為吳興太守騫性侈於味而儉於服頗以多忌為纍又惰於接物雖王書宣敕或過時不見才望不及弟暕特以儉之嫡故不棄於時暕為尚書左丞僕射當朝用事騫自中書令為郡邑邑不樂在郡卧不視事徴復為度支尚書加給事中領射聲校尉以母憂去職普通三年卒年四十九贈侍中金紫光祿大夫諡曰安子規字威眀八嵗丁所生母憂居喪有至性齊太尉徐孝嗣每見必為流涕稱曰孝童叔父暕亦深器重之常曰此兒吾家千里駒也年十二略通五經大義及長遂博涉有口辨為本州迎主簿起家祕書郎纍遷太子洗馬天監十二年改造太極殿畢規獻新殿賦其辭甚工後為晉安王綱雲麾咨議參軍久之為新安太守父憂去職服闋襲封南昌縣侯除中書黃門侍郎敕與陳郡殷藝琅邪王錫范陽張緬同侍東宫俱為昭眀太子所禮湘東王繹時為丹陽尹與朝士宴集屬規為酒令規從容曰江左以來未有兹舉特進蕭琛金紫光祿大夫傅昭在坐並謂知言朱異嘗因酒卿規規責以無禮普通初陳慶之北侵陷洛陽百僚稱慶規退曰可弔也又何賀焉道家有云非為功難成功難也昔桓溫得而復失宋武竟無成功我孤軍無援深入寇境將為亂階俄見覆沒六年武帝於文德殿餞廣州刺史元景隆詔羣臣賦詩同用五十韻規援筆立奏其文又美武帝嘉焉即日授侍中後為晉安王長史王立為太子仍為散騎常侍太子中庶子侍東宫太子賜以所服貂蟬并降令書恱是舉也尋為吳郡太守主書芮珍宗家在吳前守宰皆傾意附之至是珍宗假還規遇之甚薄珍宗還都密奏規不理郡事俄徴為左戶尚書郡境千餘人詣闕請留表三奏不許求於郡樹碑許之規常以門宗貴盛恆思減退後為太子中庶子領步兵校尉辭疾不拜遂於鐘山宋熙寺築室居焉卒贈光祿大夫諡曰文皇太子出臨哭與湘東王繹令曰王威眀風韻遒上神峯摽映千里絶迹百尺無枝實俊人也一爾過隙永歸長夜金刀掩芒長淮絶涸去嵗冬中已傷劉子今兹寒孟復悼王孫俱往之傷信非虛説規集後漢衆家異同注續漢書二百卷文卷二十卷子褒魏克江陵入長安騫弟暕字思晦年數嵗而風神警拔有成人之度時父儉作宰相賔客盈門見暕曰公才公望復在此矣弱冠選尚淮南長公主拜駙馬都尉歷祕書丞齊明帝詔求異士始安王遙光薦暕及東海王僧孺除暕騎從事中郎天監中歷位侍中吏部尚書領國子祭酒門貴與物隔不能留心寒素頗稱刻薄後為尚書左僕射領國子祭酒卒諡曰靖子承幼訓並通顯承字安期初為祕書郎纍遷中書黃門侍郎兼國子博士時膏腴貴遊咸以文章相尚罕以經術為業唯承獨好儒業遷長兼侍中俄轉國子祭酒承祖儉父暕皆為此職三世為國師前代未之有久之出為東陽太守政存寬惠吏人恱之卒郡諡曰章承性簡貴有風格右衛朱異當朝用事每休下車馬填門有魏郡申英者門寒才俊好危言髙論以忤權右嘗指異門曰此中輻湊皆為利往能不至者唯大小王東陽耳小東陽即承弟幼也時唯承兄弟及禇翔不至異門世並稱之訓字懷範生而紫胞師媼云法當貴幼聰警有識量僧正惠超見而竒之謂門人羅智國曰四郎眉目踈朗舉動和韻此是興門戶者智國以白暕暕亦曰不墜基業其在文殊文殊訓小字也年十三暕亡憂毁家人莫識十六召見文德殿應對爽徹上目送之久謂朱異曰可謂相門有相初補國子生問説師袁昻昻曰久籍髙名有勞虛想及觀容止若披雲霧俄而諸袁子弟來昻謂諸助教曰我兒出十數若有一子如此實無所恨射䇿除祕書郎纍遷祕書丞嘗賦詩云旦奭匡世功蕭曹佐氓俗追祖儉之志也後拜侍中入見武帝帝問何敬容曰禇淵年幾為宰相敬容曰少過三十上曰今之王訓無謝禇淵訓美容儀善進止文章為後進領袖年二十六卒諡溫子志從父兄瞻字思饒祖栁字休季宋太保𢎞之兄也栁仕宋位光祿大夫東亭侯父遒字世倫位侍中光祿大夫瞻年六嵗從師時有伎經門過同業皆出觀瞻獨不視習業如初從父僧逹聞而異之謂其父猷曰大宗不衰寄之此子年十二居父憂以孝聞服闋襲封東亭侯後頗好逸遊為閭里患以輕薄稱及長折節修士操涉獵書記善碁工射歷位驃騎將軍王晏長史晏誅出為晉陵太守潔已為政妻子不免飢寒時號廉平王敬則作亂瞻赴都敬則經晉陵郡人多附之敬則敗臺軍討賊黨瞻言愚人易動不足窮法齊明帝從之所全萬數遷御史中丞梁臺建為侍中起部尚書性率亮居選所舉用意而行頗嗜酒每飲輒彌月而精神朗贍不廢簿領武帝每稱瞻有三術射碁酒及卒諡康侯子長元早卒瞻從子籍字文海父僧祐齊太子中舍人僧祐附其從祖弟太尉儉傳列在齊史籍始仕為餘杭令政化如神善於摘服自下莫能欺也俄為百姓所訟轉錢唐令下車布政咸謂數十年來未之有也籍好學有才氣為詩慕謝靈運至其合也殆無愧色時人咸謂康樂之有王籍如仲尼之有邱眀老𣆀之有莊周天監中為輕車湘東王咨議參軍隨府會稽郡至若邪溪賦詩云蟬噪林逾靜鳥鳴山更幽劉摛見之擊節不能已已以公事免及為中散大夫彌忽忽不樂乃至徒行市道不擇交遊有時塗中見相識輒以笠傘覆面後為作唐侯相小邑窮僻彌不樂不理縣事人有訟者鞭而遣之未幾而卒籍甚工草書筆勢邁放蓋孔琳之流亞也湘東人士集其文為十卷云王瑩字奉光琅邪臨沂人也晉中軍將軍恬之後父懋字昌業宋光祿大夫封南鄉侯瑩選尚宋臨淮公主拜駙馬都尉纍遷義興太守代謝超宗超宗去郡與瑩交惡還都就懋求書屬瑩求一吏曰丈人一旨如湯澆雪耳及至瑩答旨以公吏不可超宗往懋處對諸賔謂懋曰湯定不可澆雪懋面洞赤唯大恥愧懋後往超宗處設精白𩸆美鮓麞􅦭懋問那得此味超宗詭言義興始見餉陽驚曰丈人豈應不得邪懋大忿言於朝廷稱瑩供養不足坐失郡廢棄久之後歷侍中東陽太守以居郡有惠政遷吳興太守齊眀帝勤憂庶政瑩頻處二郡皆有能名還為中領軍隨王長史意不平改為太子詹事中領軍永元初政由羣小瑩守職而已不能有所是非及尚書令徐孝嗣誅瑩頗綜朝政啓取孝嗣所居宅及取孝嗣封名枝江縣侯以為已封從弟亮謂曰此非盛德也瑩怒曰我昔從東度為吳興束身登岸徐時為宰相不能見知相用為領軍長史令住其宅差無多慚時人咸謂失德亮既當朝於瑩素雖不善時欲引與同事遷尚書左僕射未拜會護軍崔慧景自京口奉江夏王內向瑩拒慧景於湖頭衆敗瑩赴水乘艕入樂遊因得還臺城慧景敗瑩還居領軍府武帝兵至復假節都督宫城諸軍事建康平瑩乃以宅還徐氏初為武帝相國左長史及踐阼封建城縣公纍遷尚書令瑩性清慎帝深善之時有虎入郭上意不恱以問羣臣羣臣莫對瑩在御筵乃斂版答曰帝舜擊石拊石百獸率舞陛下膺籙御圖虎象來格帝大恱衆咸服焉十五年位左光祿大夫開府儀同三司丹陽尹既為公須開黃閣宅前促欲買南鄰朱侃半宅侃懼見侵貨得錢百萬瑩乃回閣向東時人為之語曰欲向南錢可貪遂向東為黃銅及將拜印工鑄印六鑄而龜六毁及成頭空不實補而用之居職六日暴疾薨諡曰靜恭少子實嗣起家祕書郎尚武帝女安吉公主襲爵建城縣公為新安太守實從兄來郡就求告實與銅錢五十萬不聽於郡及道散用從兄密於郡市貨還都求利及去郡數十里實乃知命追之呼從兄上岸盤頭令卒與杖搏頰從兄乞原劣得免後為南康嗣王湘州長史長沙郡以三月三日出稧實衣冠傾﨑王性方嚴見之意殊惡實稱主上謂王曰蕭王志念實殿下何見憎王驚赧即起後密啓之因此禁錮瑩從父弟亮字奉叔父攸字昌逹仕宋位太宰中郎贈給事黃門侍郎亮以名家宋末選尚公主拜駙馬都尉歷任袐書丞齊竟陵王子良開西邸延才俊以為士林使工圖其像亮亦豫焉纍遷晉陵太守在職清公有美政時有晉陵令沈巑之性粗踈好犯亮諱亮不恱遂啓代之巑之怏怏乃進坐云下官以犯諱被代未知眀府諱若為攸字當作無骹尊傍犬為大傍無骹尊若是有心攸無心攸乞告示亮不履下牀跣而走巑之撫掌大笑而去建武末纍遷吏部尚書時右僕射江祏管朝政多所進拔為士所歸亮自以身居選部每持異議始亮未為吏部郎時以祏帝之內弟故深友祏祏為之延譽益為帝所器重至是與祏情好攜薄祏昵之如初及祏遇誅羣小放命凡所除拜悉由內降亮弗能止外若詳審內無眀鑒所選用拘資次而已當時不謂為能後為尚書左僕射及東昏肆虐亮取容以免武帝至新林內外百僚皆道迎其不能拔者亦間路送誠欵亮獨不遣及東昏遇弒張稷仍集亮等於太極殿前西鐘下坐議欲立齊湘東嗣王寶晊領軍瑩曰城閉已久人情離解征東在近何不咨問張稷又曰桀有昏德鼎遷于殷今實微子去殷項伯歸漢之日亮默然朝士相次下牀乃遣國子博士范雲齎東昏首送石頭推亮為首城平朝士畢至亮獨後裙履見武帝帝謂曰顛而不扶安用彼相亮曰若其可扶眀公豈有今日之舉因泣而去霸府開以為大司馬長史梁臺建授侍中尚書令固讓乃為侍中中書監兼尚書令及受禪遷侍中尚書令中軍將軍封豫寧縣公天監二年轉光祿大夫元日朝會亮辭疾不登殿設饌别省語笑自若數日詔公卿問訊亮無病色御史中丞樂藹奏亮大不敬論棄市詔削爵廢為庶人四年帝宴華光殿求讜言尚書左丞范縝起曰司徒謝本有虛名陛下擢之如此前尚書令王亮頗有政體陛下棄之如彼愚臣所不知帝變色曰卿可更餘言縝固執不已帝不恱御史中丞任昉因奏縝妄陳褒貶請免縝官詔可亮因屏居閉掃不通賔客遭母憂居喪盡禮後為中書監加散騎常侍卒諡煬子王進之琅邪臨沂人晉尚書僕射彬之後也祖準之宋丹陽尹自有傳父輿之征虜主簿進之仕齊位給事黃門侍郎扶風太守武帝之舉兵也所在響應鄰郡多請進之同遣修謁進之曰非吾志也竟不行武帝嘉之梁臺建歷尚書左丞廣平天門二郡太守左衛將軍封建寧公進之子清位散騎常侍金紫光祿大夫鎮東府長史新野東陽二郡太守安南將軍封中盧公承聖末陳武帝殺太尉王僧辨遣兄子蒨攻僧辨壻杜龕龕告難於清清往援龕大敗蒨於吳興追奔至晉陵時廣州刺史歐陽頠亦同清援龕中更改異殺清而歸武帝清子猛歷陳入隋位開府儀同三司列在陳史王份字季文琅邪臨沂人晉丞相導之後宋中書監常侍僕射揚州刺史彧之兄子也父粹字景深位黃門侍郎份始仕宋位始安內史袁粲之誅親故無敢視者份獨往致慟由是顯名纍遷大司農份兄奐齊雍州刺史永眀末於州舉兵拒命事敗被害事具奐本傳奐誅後其子肅奔魏份自拘請罪齊武帝宥之肅屢引魏人至邊份嘗因侍坐武帝謂曰比有北信不份改容對曰肅既近忘墳柏寧逺憶有臣帝亦以此亮焉後位祕書監仕梁位散騎常侍領步兵校尉兼起部尚書武帝嘗於宴席問羣臣曰朕為有為無份曰陛下應萬物為有體至理為無帝稱善後纍遷尚書左僕射歷侍中特進左光祿大夫監丹陽尹卒諡曰胡子長子琳字孝璋位司徒左長史琳齊代取武帝妹義興長公主有子九人並知名長子銓字公衡美風儀善占吐尚武帝女永嘉公主拜駙馬都尉銓雖學業不及弟錫而孝行齊焉時人以為銓錫二王可謂玉昆金友母長公主疾銓形貌瘠毁人不復識及居喪哭泣無常因得氣疾位侍中丹陽尹卒於衛尉卿子溥字伯淮尚簡文帝女餘姚公主錫字公嘏幼警悟與兄弟受業至應休散輒獨留不起精力不倦致損右目十二為國子生十四舉清茂除祕書郎再遷太子洗馬時昭眀太子尚幼武帝敕錫與祕書郎張纘使入宫不限日數與太子遊狎情兼師友又敕陸倕張率謝舉王規王筠劉孝綽到洽張緬為學士十人盡一時之選錫以戚屬封永安侯普通初魏始連和使劉善眀來聘敕中書舍人朱異接之善眀彭城舊友氣調甚髙負其才氣酒酣謂異曰南國辨學如中書者幾人異曰異所以得接賔宴乃分職是司若以才辨相尚則不容見使善眀乃曰王錫張纘北間所聞云何可見異具啓聞敕即使南苑設宴錫與張纘朱異四人而已善眀造席遍論經史兼以嘲謔錫纘隨方酬對無所稽疑善眀甚相嘆挹他日謂異曰一日見二賢實副所期不有君子安能為國引宴之日敕使左右徐僧權於坐後言則書之纍遷吏部郎中時年二十四謂親友曰吾以外戚謬被時知兼比羸病庶務雜擁安能捨其所好而徇其不能乃稱疾不拜便謝遣胥徒拒絶賔客掩扉覃思室宇蕭然諸子溫凊隔簾趨倚公主乃命穿壁使子涉湜觀之卒年三十六贈侍中諡曰貞子錫弟僉字公會八嵗丁父憂哀毁過禮初補國子生祭酒袁昻稱為通理纍遷始興內史丁所生母憂固辭不拜又除南康內史在郡義興主薨詔起復郡後為太子中庶子掌東宫管記卒贈侍中元帝詔賢而不伐曰恭追諡曰恭子份從孫克彧之曾孫也祖繢齊太常父俊不慧位止建安太守克美容貌善容止歷位司徒右長史尚書僕射臺城陷仕侯景為太宰侍中録尚書事景敗克迎候王僧辨僧辨問克曰勞事夷狄之君克不能對次問璽紱何在克默然良久曰趙平原將去平原名思賢景腹心也景授平原太守故克呼焉僧辨乃誚克曰王氏百世卿族便是一朝而墜克後仕陳位尚書右僕射份弟通勵列在陳史通志卷一百四十
