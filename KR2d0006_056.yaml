body:
  text: 通志卷五十一宋右迪功郎鄭樵漁仲撰職官略第一官制總序伏羲氏以龍紀故以龍名官共工以水紀故以水名官神農氏以火紀故以火名官黃帝氏以雲紀故以雲名官少昊摯之立也鳯凰至故為鳥紀而以鳥名官鳯鳥氏歷正也元鳥氏司分也伯趙氏司至也青鳥氏司啓也丹鳥氏司閉也祝鳩氏司徒也鴡鳩氏司馬也鳴鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩聚民者也五雉為五工正九扈為九農正自顓帝以來不能紀逺乃紀於近為民師而命以民事又有五行之官是謂五官社稷五祀是尊是奉春官木正曰勾芒夏官火正曰祝融秋官金正曰蓐收冬官水正曰元冥中官土正曰后土唐堯之代分命羲和欽若昊天歷象日月星辰以授人時內有百揆四嶽外有州牧侯伯虞舜氏有天下以禹作司空使宅百揆棄作稷官播百榖契作司徒敷五教臯繇作士正五刑垂作共工利器用益作虞育草木鳥獸伯夷秩宗典三禮夔典樂教胄子和神人龍作納言出納帝命蓋亦為六官以主天地并四時也夏后之制亦置六卿其官名次猶承虞制商人制天子建天官先六太曰太宰太宗太史太祝太士太卜典司六典天子之五官曰司徒司馬司空司士司寇典司五衆天子之六府曰司土司木司水司草司器司貨典司六職天子之六工曰土工金工石工木工獸工草工典制六材五官致貢曰享五官之長曰伯千里之內為王畿千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰左右伯周成王參改商官制為周禮以作天地四時之名謂之六卿立天官冢宰掌邦治地官司徒掌邦教春官宗伯掌邦禮夏官司馬掌邦政秋官司寇掌邦刑冬官司空掌邦事各有徒屬用於百事嵗終天子齊戒受諫六卿以百官之成質於天子百官齊戒受質然後休老勞農成嵗事制國用自周衰官失而百職亂戰國並爭各有變易秦始皇兼天下建皇帝之號立百官之職不師古始罷侯置守太尉主五兵丞相總百揆又置御史大夫以二於丞相漢初因循而不革隨時冝也其後頗有所改大司馬左右前後將軍侍中常侍散騎諸吏為中朝丞相以下至六百石為外朝王莽篡位慕從古官而吏民皆弗便光武中興務從節約并官省職費減億計後漢建武六年詔曰百姓遭難戶口耗少而官吏尚繁於是司𨽻州牧條奏并省四百餘縣吏職減損十置其一廢丞相與御史大夫而以三司總理衆務洎于叔世事歸臺閣論道之官但偹員而已魏與吳蜀多依漢制晉氏繼及大抵略同山公啓事曰晉制諸坐公事者皆三年乃得敘用其中多有好人令逍遙無事臣以為略依左遷法隨資裁減之亦足懲戒又傅元議曰諸官有病滿百日不差冝令去職既差復用太元六年改制減費損吏士職員凡七百人時議省州郡縣半吏以赴農功爰及宋齊亦無改作宋時制新長吏以父母疾去官禁錮三年山隂令沈叔任父疾去職御史中丞鄭鮮之上議曰所以為其制者蒞官不久則奔競互生故杜其欲速之請以申考績之實耳今父母之疾而加以罪名損義疾理莫此為大詔從之於是自二品以上父母及為祖父母後者墳墓崩毁及疾病親屬輒去並不禁錮又劉祗為中書郎江夏王義恭領中書監服親不得相臨表解職也孝武詔曰昔二王兩謝俱至崇禮自今三臺五省悉同此例又詔曰方鎮所假禮白郡縣年限依臺除食祿三分之一不給送官司有三臺五省之號三臺蓋兩漢舊名五省謂尚書中書門下祕書集書省也郡縣有三嵗為滿之期宋州郡縣居職以三周為小滿梁武受終多遵齊舊然而定諸卿之位分配四時置戎秩之官至百有餘號陳遵梁制不失舊物焉後魏昭成之即王位初置官司分掌衆職然而其制草創名稱乖疏皇始元年道武平并州始建臺省置百官封公侯將軍刺史太守尚書郎等官悉用文人天興中太史言天文錯亂當改王易政故官號數革初道武制官皆擬逺古雲鳥之義諸曹走使謂之鳬鴨取飛之迅疾也以伺候宫禁謂之白鷺取其延頸逺視他皆此類至孝文太和中王肅來奔為制官品百司位號皆準南朝改次職令以為永制凡守令以六年為滿後經六年乃敘又作考格以之黜陟太和十八年詔曰古者三載考績三考黜陟朕今三載一考考便黜陟各令當司考其優劣為三等六品以下尚書重問五品以上朕與公卿親論善惡上上者遷之下下者黜之中中者守本位又宣武帝行考陟之法任事上中者三年升一階散官上第者四載登一級孝明以後授受多濫齊髙氏創業亦遵後魏臺省位號多類江東以門下省掌獻納諫正中書省管司王言祕書省典司經籍集書省掌從容諷議中常侍省掌出入門閣御史臺察糾彈劾後主臨御爵祿犬馬宇文氏之初據關中猶依魏制及平江陵之後别立憲章酌周禮之文建六官之職其他官亦兼用秦漢及隋文帝踐極百度伊始復廢周官還依漢魏其於庶僚頗有損益凡官以四考而代又制凡官以理去職聼並執笏至煬帝初存稽古多復舊章百官不得計考增級如有德行功能灼然顯著者擢之大業三年始行新令有三臺五省五監十二衛十六府殿內尚書門下內史祕書五省也謁者司𨽻御史三臺也少府長秋國子將作都水五監也左右翊左右􅀈左右武左右屯左右禦左右候十二衛也左右偹身左右監門等凡十六府也或是舊名或是新置諸省及左右衛武候領軍監開府為內官自餘為外官于時天下繁冨四方無虞衣冠文物為盛矣既而漸為不道百度方亂號令日改官名月易圖籍散逸不得而詳偹唐之職員多因隋制雖有小變革而大較不異貞觀六年大省內官凡文武定員六百四十有三而已顯慶元年初制拜三師三公親王尚書令雍州牧開府儀同三司驃騎大將軍左右僕射並臨軒册授太子二少侍中中書令諸曹尚書諸衛大將軍特進鎮軍輔國大將軍光祿大夫太子詹事太常卿都督及上州刺史在京者朝堂受册又制文武官五品以上老及病不因罪解者並聼同致仕例龍朔二年又改官名咸亨元年復舊至于武太后再易庶官或從宜創號改尚書省為文昌臺門下省為鸞臺中書省為鳯閣御史臺為肅政臺及諸寺衛等名又置控鶴府官員或參用古典改六尚書為天地四時之官天授二年凡舉人無賢不肖咸加擢拜大置試官以處之試官蓋起於此也試者未為正命凡正官皆稱行守其階髙而官卑者稱行階卑而官髙者稱守階官同者並無行守字太后務收物情其年二月十道使舉人并州石艾縣令王山耀等六十一人並授拾遺補闕懷州録事參軍崔獻可等二十四人並授侍御史并州録事參軍徐昕等二十四人並授著作郎魏州內黃縣尉崔宣道等二十二人並授衛佐校書御史等故當時諺曰補闕連車載拾遺平斗量把椎侍御史脫腕校書郎試官自此始也于時擢人非次刑網太密雖驟歷榮貴而敗輪繼軌神功元年制曰自今木色出身解天文者進轉官不得過太史令音樂者不得過太樂鼓吹令醫術者不得過尚藥奉御隂陽卜筮者不得過太卜令斛造食者不得過司膳神龍初官復舊號二年三月又置員外官二千餘人舊有員外官至此大增加兼超授諸門官為員外官者亦千餘人中書令李嶠初自地官尚書貶通州刺史至是召拜吏部侍郎嶠志欲曲行私惠求名悅衆兾得重居相位乃奏請大置員外官多引用勢家親識至是嶠又自覺銓衡失序官員倍多府庫由是減耗也於是遂有員外員外官其初但云員外至永徽六年以蔣孝璋為尚藥奉御員外特置仍同正員至是員外官或有同正員者其加同正員者惟不給職田耳其祿俸賜會與正官同單言員外者祿俸減正官之半檢校試攝判知之官攝者言敕攝非州府板署檢校者云檢校某官判官者云判某官事知者云知某官事皆是詔除而非正命逮乎景龍官紀大紊復有斜封無坐處之誦興焉景龍中有太平安樂長寧冝城等諸公主及皇后陸氏妹郕國夫人李氏妹崇國夫人並昭容上官氏與其母沛國夫人鄭氏尚宫柴氏賀婁氏女巫隴西夫人趙氏皆引用親識亦多猥濫或出自臧獲或由於屠販多因賂貨纍居榮秩咸能别於側門降墨敕斜封以授焉故時人號為斜封官時既政出多門遷除甚衆自宰相至于內外員外官及左右臺御史多者則數踰十倍皆無廳事可以處之故時人謂之三無坐處謂宰相御史及員外官也先天以來始懲其弊至開元二十五年刋定職次著為格令此格皆武德貞觀之舊制永徽初已詳定之至開元二十五年再刪定焉至二十八年又省文武六品以下官三百餘員及諸流外番官等蓋尚書省以統會衆務舉持繩目門下省以侍從獻替規駮非冝中書省以獻納制册敷揚宣勞祕書省以監録圖書殿中省以供修服御內侍省以承旨奉引尚書門下中書祕書殿中內侍凡六省御史臺以肅清僚庶九寺太常光祿衛尉宗正太僕大理鴻臚司農太府為九寺五監少府將作國子軍器都水為五監以分理羣司六軍左右羽林左右龍虎左右神武為六軍十六衛左右衛左右􅀈衛左右武左右威左右領軍左右金吾左右監門左右千牛為十六衛以嚴其禁禦一詹事府二春坊有左右春坊又有內坊掌閣內諸事三寺家令寺率更寺太僕寺十率左右衛左右司禦左右清道左右監門左右內侍凡十率府俾乂儲宫牧守督護分臨畿服京府置牧餘府州置都督都護太守設官以經之置使以緯之按察採訪等使以理州縣節度團綀等使以督府軍事租庸轉運鹽鐡青苗營田等使以育財貨其餘細務因事置使者不可悉數其轉運以下諸使無適所治廢置不常故不别列於篇自六品以下率由選曹居官者以五嵗為限於是百司具舉庶績咸理亦一代之制焉一嵗為一考四考有替則為滿若無替則五考而罷六品以下吏部注擬謂之旨投五品以上則皆敕除自至德之後天下多難甄才録效制勑特拜繁於吏部於是兼試員外郎倍多正員至廣德以來乃立制限州縣員外兼試等官各有定額並云額內溢於限者不得視職其有身帶京官冗職資名清美兼州縣職者云占闕焉即如正員之例官以三考而代無替四考而罷由是官有常序焉歷代官制要略官數官品設官沿革封爵三公宰相祿秩官數唐六十員虞六十員尚書云建官惟百鄭元云虞官六十唐官未聞堯舜同道或皆六十并屬官而言則皆有百夏百二十員尚書云夏商官倍則當二百鄭元曰百二十商二百四十員明堂位二百鄭元曰百四十二周六萬二千六百七十五員內一千六百四十二人外諸侯同官六萬一千三十二人按禮記王制計之商制同漢自丞相至佐史凡十三萬二百八十五員哀帝時數兼諸州府郡胥吏後漢七千五百六十七員晉六千八百三十六員宋六千一百七十二員齊二千一百三員後魏七千七百六十四員北齊二千三百二十二員並內官後周二千九百八十九員並內官隋一萬二千五百七十六員內官二千五百八十一外郡縣官九千九百九十五唐一萬八千八百五員內官二千六百二十外郡縣官一萬六千一百八十五官品周官九命漢自中二千石至百石凡十六等後漢自中二千石至斗食凡十三等魏秩次多因漢制更置九品晉宋齊並因之梁因之更置十八班班多為貴陳並因之後魏置九品品各置從凡十八品自四品以下每品分為上下階凡三十階北齊並因之後周制九命每命分為二以正為上凡十八命隋置九品品各有從自四品以下每品分為上下凡三十階自太師始焉謂之流內流內自此始焉焬帝除上下階唯留正從