body:
  text: 通志卷一百二十七宋右迪功郎鄭樵漁仲撰列傳第四十晉孫惠熊逺王鑒陳頵髙嵩郭璞葛洪庾亮子彬冰羲冰和條亮弟懌翼懌弟弟條弟桓彛子雲雲弟豁石民豁子石虔綏石虔子振豁石虔弟石秀沖石生石石康弟祕祕弟弟沖子嗣弟嗣子允寧允謙謙修徐王子承坦承子述之述子之禕綏坦之子愷嶠愈袁國寶承族子悅之忱台愈子祖之荀嵩子㽔羡范汪子寧堅汪叔劉惔張憑韓伯孫惠字德施吳國富陽人吳豫章太守賁曾孫也父祖並仕吳惠口訥好學有才識州辟不就寓居蕭沛之間永寧初赴齊王冏義討趙王倫以功封晉興縣侯辟大司馬户曹掾轉東曹屬冏驕矜僭侈天下失望惠獻言於冏諷以五難四不可勸令歸藩辭甚切至冏不納惠懼罪辭疾去頃之冏果敗成都王頴引惠為大將軍參軍領奮威將軍白沙督是時頴將征長沙王乂以陸機為前鋒都督惠與機鄉里憂其致禍勸機讓都督於王粹及機兄弟被戮惠甚傷恨之時惠又擅殺頴牙門將梁俊懼罪因改姓名以遁後東海王越舉兵下邳惠乃詭稱南嶽逸士秦祕之以書干越辭旨慷慨越省書榜道以求之惠乃出見越即以為記室參軍専掌文疏豫參謀議除散騎郎太子中庶子復請補司空從事中郎越誅周穆等夜召參軍王廙造表廙戰懼壞數紙不成時惠不在越歎曰孫中郎在表久就矣越遷太傅以惠為軍咨祭酒數咨訪得失每造書檄越或驛馬催之應命立成皆有文綵除祕書監不拜轉彭城內史廣陵相遷廣武將軍安豐內史以迎大駕之功封臨湘縣公元帝遣甘卓討周馥於夀陽惠乃率衆應卓馥敗走廬江何鋭為安豐太守惠權留郡境鋭以他事收惠下人推之惠既非南朝所授常慮讒間因此大懼遂攻殺鋭奔入蠻中尋病卒時年四十七喪還鄉里朝廷明其夲心追加弔賻熊逺字孝文豫章南昌人也祖翹嘗為石崇蒼頭而性廉直有士風黃門郎潘嶽見而稱異勸崇免之乃還鄉里逺有志尚縣召為功曹不起強與衣幘扶之使謁十餘日薦於郡由是辟為文學掾逺曰辭大不辭小也固請留縣太守察逺孝亷屬太守討氐羌逺遂不行送至隴右而還後太守會稽夏靜辟為功曹及靜去職逺送至會稽以歸州辟主簿别駕舉秀才除監軍華軼司馬領武昌太守寧逺護軍元帝作相引為主簿時傳北陵被發帝將舉哀逺上疏言承傳之語未可為定且園陵非一而直言侵犯逺近弔問答之宜當有主謂應更遣使攝河南尹按行得審問然後可發哀即宜命將至洛修復園陵討除逆類則天下響應矣屬有杜韜之難不能從時江東草創農桑弛廢逺建天子帥三公九卿諸侯躬耕帝籍之議時論美之建興初正旦將作樂逺諫以孝懷皇帝梓宫未反履端元日正始之初貢士鱗萃南北雲集有識之士於是觀禮今榮耳目之觀崇戲弄之好非納軌物有塵大教謂宜設饌以賜羣下而已元帝納之轉丞相參軍是時琅邪國侍郎王鑒勸帝親征杜韜逺上疏言且當命將興師不宜親舉會韜已平轉從事中郎纍遷太子中庶子尚書左丞散騎常侍帝每歎其忠公謂曰卿在朝正色不茹柔吐剛忠亮至到可謂王臣也吾所欣賴卿其勉之及中興建帝賜諸吏投刺勸進者加位一等百姓投刺者賜司徒吏凡二十餘萬逺以為秦漢因赦賜爵非長制也今案投刺者不獨近者情重逺者情輕可依漢法例賜天下爵於恩為普無偏頗之失可以息檢核之煩塞巧偽之端帝不從轉為御史中丞時尚書刁協用事衆皆憚之尚書郎盧綝將入直遇協於大司馬門外協醉使綝避之綝不回協令威儀牽捽綝墮馬至協車前而後釋逺奏免協官時冬雷電且大雨帝下書責躬引過逺復上疏以為胡賊猾夏二帝幽殯梓宫未返而不能遣軍進討一失也羣官不以讐賊未報為恥務在調戲酒食而已二失也選官用人不料實德惟在白望不求才幹惟事請託當官者以治事為俗吏奉法為苛刻盡禮為諂諛從容為高妙放蕩為逹士驕蹇為簡雅三失也世所惡者陸沈泥滓時所善者翺翔雲霄是以萬機未整風俗為薄朝廷以從順為善相違見貶安得朝有辨爭之臣士有祿仕有志乎古之取士敷奏以言明試以功今先祿不試甚違古義又舉賢不出世族用法不及權貴是以才不濟務好惡無所懲若此道不改求以救亂難矣纍遷侍中出補會稽內史時王敦作逆沈充舉兵應之加逺將軍距而不受不輸軍資於充以保境安衆為務敦至石頭諷朝廷徵逺乃拜太常卿加散騎常侍敦深憚其正而有謀引為長史數月病卒逺弟縉名亞於逺為王敦主簿終於鄱陽太守縉字鳴鵠位至武昌太守王鑒字茂髙堂邑人也父濬御史中丞鑒少以文筆著稱初為元帝琅邪國侍郎時杜韜作逆江湘流弊王敦不能制朝廷深以為憂鑒上疏勸帝親征帝深納之即命中外戒嚴會韜已平故止中興建拜駙馬都尉奉朝請出補永興令大將軍王敦請為記室參軍未就而卒時年四十一文集傳於世鑒弟濤及弟子戭並有才筆濤字茂略歷著作郎無錫令戭字庭堅亦為著作並早卒陳頵字延思陳國苦人也少好學有文義父欣立宅起門頵曰當使容車馬欣笑而從之仕為郡督郵檢獲隱匿者三千人為一州尤最太守劉享拔為主簿州辟部從事乘馬車還家宗黨榮之劾案沛王韜獄未竟會解結代楊凖為刺史韜因河間王顒屬結結至大會問主簿史鳯曰沛王貴藩州據何法而擅拘邪時頵在坐對曰甲午詔書刺史銜命國之外臺其非所部而在境者刺史并糾事徵文墨前後列上七被詔書如州所劾無有違謬結曰衆人之言不可妄聽且依法窮竟又問僚佐曰河北白壤膏梁何故少人士每以三品為中正答曰詩稱惟嶽降神生甫及申夫英偉大賢多出於山澤河北土平氣均蓬蒿裁髙三尺不足成林故也結曰張彥真以為汝潁巧辨恐不及青徐儒雅也頵曰彥真與元禮不協故設過言老子莊周生陳梁伏羲傳説師曠大項出陽夏漢魏二祖起於沛譙凖之衆州莫之與比結甚異之曰豫州人士常半天下此言非虛會結遷尚書結恨不得盡其才用元康中舉孝廉而州將留之頵薦同縣焦保州遂辟保齊王冏起義州遣頵將兵赴之拜駙馬都尉遭賊避難于江西歷陽內史朱彥引為參軍鎮東從事中郎袁琇薦頵於元帝遷鎮東行參軍事典法兵二曹頵與王導書曰中華所以傾弊者正由取才失所先白望而後實事浮競驅馳互相貢薦言重者先顯言輕者後敘遂相波扇乃至陵遲加有莊老之俗傾惑朝廷養望者為𢎞雅政事者為俗人王職不恤法物墜喪今宜改張眀賞信罰拔卓茂於密縣顯朱邑於桐鄉然後大業可舉中興可冀耳建興初制版補録事參軍參佐掾屬多設解故以避事任頵議諸僚屬乘昔西臺養望餘弊小心恭肅更以為俗偃蹇倨慢以為優雅至今朝士縱誕臨事逰行漸弊不革以至傾國故百尋之屋突直而燎焚千里之隄蟻垤而穿敗古人防小以全大慎微以杜萌自今臨使稱疾須催乃行者皆免官初趙王倫篡位三王起義制己亥格其後論功雖小亦皆依用頵意謂不宜以為常式駮之曰聖主懸爵賞功制罰糾違斯道苟明人赴水火且名器之實不可妄假非才謂之致寇寵厚戒在斯亡昔孫秀口唱篡逆手弄天機惠皇失御九服無戴三王建義席卷四海合起義之衆結天下之心故設己亥義格以權濟難此自一切之法非常倫之格也其起義以來依格雜猥遭人為侯或加兵伍或出皂僕金紫佩士卒之身符䇿委庸𨽻之門使天官降辱王爵黷賤非所以正皇綱重名器之謂也謂自今以後宜停之頵以孤寒數有奏議朝士多惡之出除譙郡太守太興初以疾徴久之白衣兼尚書因陳時務以為昔江外初平中州荒亂故貢舉不試宜漸循舊搜揚隱逸試以經䇿又馬隆孟觀雖出貧賤勳濟甚大以所不習而統戎事鮮能以濟宜開舉武略任將帥者言問核試盡其所能然後隨才授任舉十得一猶勝不舉况或十得二三日磾降虜七世內侍由余戎狄入為秦相豈藉華宗之族見齒於奔競之流乎宜引幽滯之俊抑華校實則天清地平人神感應後拜天門太守殊俗安之選腹心之吏為荆州參軍若有調發動靜馳白故恆得宿辦陶侃征還頵先至巴陵上禮侃以為能表為梁州刺史綏懷荒弊甚有威惠梁州大姓互相嫉妬説頵年老耳聾侃召頵還以西陽太守蔣巽代之年六十九卒髙嵩字茂琰廣陵人也父悝少孤事母以孝聞年十二值嵗飢悝菜蔬不饜每致甘肥於母撫幼弟以友愛稱寓居江州刺史華軼辟為西曹書佐及軼敗悝藏匿軼子經年會赦乃出元帝嘉而宥之以為參軍遂歷顯位至丹陽尹光祿大夫封建昌伯嵩少好學善史書總角時司空何充稱其明惠充為揚州引嵩為主簿益相欽重轉驃騎主簿舉州秀才除太學博士父艱去職初悝以納妾致訟被黜及終嵩乃自繫廷尉訟寃遂停喪五年不葬表疏數十上帝哀之乃下詔曰悝備位大臣違憲被黜事已久判其子嵩求直無已今特聽傳侯爵由是見稱拜中書郎再遷黃門侍郎簡文帝輔政引為撫軍司馬時桓溫擅威率衆北伐軍次武昌簡文患之嵩曰宜致書喻以禍福自當反斾如其不耳便六軍整駕逆順於兹判矣若有異計請先釁鼓便於坐為簡文書草曰寇難宜平時會宜接此實為國逺圖經略大算能𢎞斯會非足下而誰但以此興師動衆要當以資實為夲運轉之艱古人之所難不可易之於始而不熟慮須所以深用惟疑在乎此耳然異常之事衆之所駭遊聲噂􅊱想足下亦少聞之茍患失之無所不至或能望風振擾一時崩散如其不然者則望實並喪社稷之事去矣皆由吾暗弱德信不著不能鎮靜羣庶保固維城所以內愧于心外慙良友吾與足下雖職有內外安社稷保國家其致一也天下安危繫之明德先存寧國而後圖其外使王基克隆大義𢎞著所望於足下區區誠懷豈可復顧嫌而不盡哉溫得盡還鎮嵩纍遷侍中是時謝万為豫州都督疲於親賔相送方卧在室嵩徑造之謂曰卿今疆理西藩何以為政万粗陳其意嵩便為敘刑政之要數百言万遂起坐呼嵩小字曰阿酃故有才具邪哀帝雅好服食嵩諫以為非萬乘所宜陛下此事實日月之一食也後以公事免卒於家子耆官至散騎常侍郭璞字景純河東聞喜人也父瑗為尚書都令史時尚書杜預有所增損瑗多駮正之以公方稱終於建平太守璞好經術博學有髙才而訥於言論詞賦為中興之冠好古文竒字妙於隂陽算厯有郭公者客居河東精於卜筮璞從之受業公以青囊中書九卷與之由是遂洞五行天文卜筮之術禳災轉禍通致無方雖京房管輅不能過也璞門人趙載竊青囊中書未及讀而為火所焚惠懷之際河東先擾璞筮之投䇿而歎曰嗟乎黔黎將湮於異類桑梓其翦為龍荒乎於是潛結姻昵及交遊數十家欲避地東南抵將軍趙固會固所乘良馬死固惜之不接賔客璞至門吏不為通璞曰吾能活馬吏驚入白固趨出曰君能活吾馬乎璞曰得健夫二三十人皆持長竿東行三十里有邱林社廟者便以竿打拍當得一物宜急持歸得此馬活矣固如其言果得一物似猴將歸此物見死馬便噓吸其鼻頃之馬起奮迅嘶鳴食如常不復見向物固竒之厚加資給行至廬江太守胡孟康被丞相召為軍咨祭酒時江淮清晏孟康安之無心南度璞為占曰敗康不之信璞將趣裝去之愛主人婢無由而得乃取小豆三斗繞主人宅散之主人晨起見赤衣人數千圍其家就視則滅甚惡之請璞為卦璞曰君家不宜畜此婢可於東南三十里賣之愼勿爭價則此妖可除也主人從之璞因隂令人賤買此婢復為符投井中數千赤衣人皆反縛一一自投于井主人大悅璞擕婢去後數旬而廬江陷璞既過江宣城太守殷祐引為參軍時有物大如水牛灰色卑腳腳類象胸前尾上皆白大力而遲鈍來到城下衆咸異焉祐使人伏而取之令璞作卦遇遁之蠱其林曰艮體連乾其物壯巨山潛之畜匪兕匪虎身與鬼并精見二午法當為禽兩靈不許遂被一創還其夲墅按卦名之是為驢鼠卜適了伏者以戟刺之深尺餘遂去不復見郡綱紀上祠請殺之巫云此是䢼亭驢山君鼠使詣荆山暫來過我不須觸之其精妙如此祐遷石頭督護璞復隨之時有鼯鼠出延陵璞占之曰此郡東當有妖人欲稱制者尋亦自死矣後當有妖樹生然若瑞而非瑞辛螫之木也儻有此者東南數百里必有作逆者期明年矣無錫縣歘有茱萸四株交枝而生若連理者其年盜殺吳興太守袁琇或以問璞璞曰卯爻發而沴金此木不曲直而成災也王導深重之引參已軍事嘗令作卦璞言公有震厄可命駕西出數十里得一柏樹截斷如身長置常寢處災當可消矣導從之數日果震柏木粉碎時元帝初鎮建業導令璞筮之遇咸之井璞曰東北郡縣有武名者當出鐸以著受命之符西南郡縣有陽名者井當沸其後晉陵武進縣人於田中得銅鐸五枚歷陽縣中井沸經日乃止及帝為晉王又使璞筮遇豫之暌曰會稽當出鐘以告成功上有勒銘應在人家井泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者也及帝即位大興初會稽剡縣人果於井中得一鐘長七寸二分口徑四寸半上有古文竒書十八字云會稽嶽命餘字時人莫識之璞曰蓋王者之作必有靈符塞天人之心與神物合契然後可以言受命矣觀五鐸啓號於晉陵棧鐘告成於會稽瑞不失類出皆以方豈不偉哉若夫鐸發其響鐘徵其象器以數臻事以實應天人之際不可不察帝甚重之璞著江賦其辭甚偉為世所稱後復作南郊賦帝見而嘉之以為著作佐郎于時隂陽錯謬而刑獄繁興璞上疏曰臣聞春秋之義貴元愼始故分至啓閉以觀雲物所以顯天人之統存休咎之徵臣不揆淺見輒依嵗首粗有所占卦得解之既濟按爻論思方涉春木王龍德之時而為廢水之氣來見乘加升陽未布隆隂仍積坎為法象刑獄所麗變坎加離厥象不燭以義推之皆為刑獄殷繁理有壅濫又去年十二月二十九日太白蝕月月者屬坎羣隂之府所以照察幽情以佐太陽者也太白金行之星而來犯之天意若曰刑理失中自壞其所以為法者也臣術學庸近不練內事卦理所及敢不盡言又去秋以來沉雨跨年雖為金家涉火之祥然亦是刑獄充溢怨歎之氣所致往建興四年十二月中行丞相令史淳于伯刑於市而血逆流長標伯者小人雖罪在未允何足感動靈變致若斯之怪邪明皇天所以保祐金家子愛陛下屢見災異殷勤無已陛下宜側身思懼以應靈譴皇極之謫事不虛降不然恐將來必有愆陽苦雨之災崩震薄蝕之變狂狡蠢戾之妖以益陛下旰食之勞也臣謹尋按舊經尚書有五事供禦之術京房易傳有消復之救所以緣咎而致慶因異而邁政故木不生庭太戊無以隆雉不鳴鼎武丁不為宗夫寅畏者所以饗福怠傲者所以招禍此自然之符應不可不察也按解卦繇云君子以赦過宥罪既濟云思患而豫防之臣愚以為宜發哀矜之詔引在豫之責蕩除瑕釁贊陽布惠使幽斃之人應蒼生以悅育否滯之氣隨谷風而舒散此亦寄時事以制用藉開基而曲成者也臣竊觀陛下貞明仁恕重光四祖祥靈表瑞人鬼獻謀應天順時殆不尚此然即位以來而康哉之歌不作者何邪殆由仗道之情未著而任刑之風先彰漢之中宗聰悟獨斷可謂令主然厲意刑名用虧純德老子以禮為忠信之薄况刑又是禮之糟粕者乎願陛下少鑒臣言疏奏優詔報之其後日有黑氣璞復上疏曰臣以頑昧近者冒陳所見陛下不遺狂言事蒙御省伏讀聖詔歡懼交戰臣前云升陽未布隆隂仍積坎為法家刑獄所麗變坎加離厥象不燭疑將來必有薄蝕之變也此月四日日去山六七丈精光潛暗而色都赤中有異物大如雞子又有青黑之氣共相薄擊良久乃解按時在嵗首純陽之月日在癸亥全陰之位而有此異殆元首供禦之義不顯消復之理不著之所致也去微臣所陳未及一月而便有此變益明皇天留情陛下懇懇之至也往年嵗末太白蝕月今年嵗始日有咎謫曾未數旬大眚再見日月告釁見懼詩人無白天髙其鑒不逺故宋景言善熒惑退次光武寧亂呼沱結冰此明天人之懸符有若形影之相應應之以德則休祥臻酬之以怠則咎徴作陛下宜躬承靈譴敬天之怒施沛然之恩諧元同之化上所以允塞天意下所以弭息羣謗矣頃之遷尚書郎數言便宜多所匡益明帝之在東宫與溫嶠庾亮並有布衣之好璞亦以才學見重埒於嶠亮論者美之然性輕易不修威儀嗜酒好色時或過度著作郎干寶常誡之曰此非適性之道也璞曰吾所受有本限用之恆恐不得盡卿乃憂酒色之為害乎璞既好卜筮縉紳多笑之又自以才髙位卑乃著客傲辭不載永昌元年皇孫生璞上疏曰臣竊惟陛下符運至著勳業至大而中興之祚不隆聖敬之風未躋者殆由法令太明刑教太峻故水至清則無魚政至察則衆乖此自然之勢也臣去春啓事以囹圄充斥陰陽不和推之卦理宜因郊祀作赦以蕩滌瑕穢不然將來必有愆陽苦雨之災崩震薄蝕之變狂狡蠢戾之妖其後月餘日果薄鬭去秋以來諸郡並有暴雨水皆洪潦嵗用無年適聞吳興復欲有構妄者咎徵漸成臣甚惡之頃者以來役賦轉重獄犴日結百姓困擾甘亂者多小人愚嶮共相扇動雖勢無所至然不可不虞按洪範傳君道虧則日蝕人憤怨則水涌溢隂氣積則下代上此微理潛應已著實於事者也假令臣遂不幸謬中必貽陛下側席之憂今皇孫載育天固靈基黔首顒顒實望惠潤又嵗涉午位金家所忌宜於此時崇恩布澤則火氣潛消災譴不生矣陛下上承天意下順物情可因皇孫之慶大赦天下然後明罰敕法以肅理官克厭天心慰塞人事兆庶幸甚禎祥必增矣疏奏納焉即大赦改年時暨陽人任谷因耕息於樹下忽有一人著羽衣就淫之既而不知所在谷遂有娠積月將産羽衣人復來以刀穿其隂下出一蛇子便去谷遂成宦者後詣闕上書自云有道術帝留宫中璞上疏陳其妖異不宜引之禁內臣忝荷史任敢忘直筆惟義是規其後元帝崩谷因亡走璞以母憂去職卜葬地於暨陽去水百許步人以近水為言璞曰即為陸矣其後沙漲數十里皆為桑田未期王敦起璞為記室參軍是時潁川陳述為大將軍掾有美名為敦所重未幾而沒璞哭之哀甚呼曰嗣祖嗣祖焉知非福未幾而敦作難時明帝即位踰年未改號而熒惑守房璞時休歸帝乃遣使齎手詔問璞會暨陽縣復上言曰赤烏見璞乃上疏請改年肆赦文多不載璞嘗為人葬明帝微服往觀之因問主人何以葬龍角此法當滅族主人曰郭璞云此葬龍耳不出三年當致天子也帝曰出天子邪答曰能致天子問耳帝甚異之璞素與桓彛友善彛每造之或值璞在婦間便入璞曰卿來他處自可徑前但不可厠上相尋耳必客主有殃彛後因醉詣璞正逢在厠掩而觀之見璞裸身被髮銜刀設醊璞見彛撫心大驚曰吾每屬卿勿來反更如是非但吾禍卿亦不免天實為之將以誰咎璞終嬰王敦之禍彛亦死蘇峻之難王敦之謀逆也溫嶠庾亮使璞筮之璞對不決嶠亮令占已之吉凶璞曰大吉嶠等退相謂曰璞對不了是不敢有言或天奪敦魄今吾等與國家共舉大事而璞云大吉是為舉事必有成也於是勸帝討敦初璞每言殺我者山宗至是果有姓崇者構璞於敦敦將舉兵又使璞筮璞曰無成敦固疑璞之勸嶠亮又聞卦凶乃問曰卿更筮吾夀幾何答曰思向卦明公起事必禍不久若住武昌夀不可測敦大怒曰卿夀幾何曰命盡今日日中敦怒收璞詣南岡斬之璞臨出謂行刑者欲何之曰南岡頭璞曰必在雙柏樹下此柏應有大鵲巢衆索之不得璞更令尋覔果於枝間得一大鵲巢密葉蔽之初璞行經越城間遇一人呼問姓名因以袴褶遺之其人辭不受璞曰但取後自當知其人遂受而去至是果此人行刑及王敦平追贈𢎞農太守時年四十九初庾翼幼時常令璞筮公家及身卦成曰建元之末邱山傾長順之初子凋零及康帝即位將改為建元或謂庾冰曰子忘郭生之言邪邱山上名此號不宜用冰撫心歎恨及帝崩何充改元為永和庾翼歎曰天道精微乃當如是長順者永和也吾庸得免乎其年翼卒氷又筮其後嗣卦成曰卿諸子並當貴盛然有見白龍者凶徵至矣若墓碑生金庾氏之大忌也後冰子藴為廣州刺史妾房內忽有新生白狗子莫知所由來其妾祕愛之不令藴知狗轉長大藴入見狗眉眼分明又身至長而弱異於常狗藴甚怪之將出共視在衆人前忽失所在藴慨然曰殆白龍乎庾氏之禍至矣又墓碑生金俄而為桓溫所滅終如其言璞之占驗皆此類也璞撰前後筮驗六十餘事名為洞林又抄京費諸家要最更撰新林十篇卜韻一篇注釋爾雅别為音義圖譜又注三蒼方言穆天子傳山海經及楚辭子虛上林賦數十萬言皆傳於世所作詩賦誄頌亦數萬言子驁官至臨賀太守葛洪字稚川丹陽句容人也祖系吳大鴻臚父悌吳平後入晉為卲陵太守洪少好學家貧躬自伐薪以貿紙筆夜輒寫書誦習遂以儒學知名性寡欲無所愛玩不知棊局幾道樗蒲齒名為人木訥不好榮利閉門却掃未嘗交遊時輩於餘杭山見何幼道郭文舉目擊而已各無所言時或尋書問義不逺數千里﨑嶇冒涉期於必得遂究覽典籍尤好神仙導養之術從祖元吳時學道得仙號曰葛仙公以其鍊丹祕術授弟子鄭隱洪就隱學悉得其法焉後師事南海太守上黨鮑元元亦內學逆占將來見洪深重之以女妻洪洪傳元業兼綜練醫術凡所著撰皆精核是非而才章富贍太安中石氷作亂吳興太守顧祕為義軍都督與周玘等起兵討之祕檄洪為將兵都尉攻氷别帥破之遷伏波將軍氷平洪不論功賞徑至洛陽欲搜求異書以廣其學洪見天下已亂欲避地南土乃參廣州刺史嵇含軍事及含遇害遂停南土多年征鎮檄命一無所就後還鄉里禮辟皆不赴元帝為丞相辟為掾以平賊功賜爵關內侯初司徒導召補州主簿轉司徒掾遷咨議參軍千寶深相親友薦洪才堪國史遷為散騎常侍領大著作洪固辭不就以年老欲鍊丹以祈遐夀聞交趾出丹求為句漏令元帝以洪資髙不許洪曰非欲求榮以有丹耳帝從之洪遂將子姪俱至廣州刺史鄧嶽留不聽去洪乃上羅浮山鍊丹嶽表補東宫太守又辭不就嶽乃以洪兄子望為記室參軍在山積年優遊間養著述不輟其自序曰洪體乏進趣之才偶好無為之業假令奮翅則能陵厲元霄騁足則能追風躡景猶欲戢徑翮於鷦鷃之羣藏逸迹於跛驢之伍豈况大塊稟我以尋常之短羽造化假我以至駑之蹇足自卜者審不能者止豈敢力蒼蠅而慕沖天之舉䇿跛鱉而追飛兔之軌飾嫫母之篤陋求媒陽之美談推沙礫之賤質索千金於和肆哉夫僬僥之步而企及夸父之蹤近才所以躓礙也要離之羸而強赴扛鼎之勢秦人所以斷筋也是以望絶於榮華之塗而志安乎窮圯之域藜藿有八珍之甘蓬蓽有藻棁之樂也故權貴之家雖咫尺弗從也知道之士雖艱逺必造也考覽奇書既不少矣率多隱語難可卒解自非至精不能尋究自非篤勤不能悉見也道士𢎞博洽聞者寡而意斷妄説者衆至於時有好事者欲有所修為倉卒不知所從而意之所疑又無足咨今為此書粗舉長生之理其至妙者不得宣之於翰墨蓋粗言較略以示一隅冀悱憤之徒省之可以思過半矣豈謂暗塞必能窮微暢逺乎聊論其所先覺耳世儒徒知服膺周孔莫信神仙之書不但大而笑之又將毁謗真正故余所著悉言黃白之事名曰內篇其餘駮難通釋名曰外篇大凡內外一百一十六篇雖不足藏諸名山且欲緘之金匱以示識者自號抱朴子因以為名其餘所著碑誄詩賦百卷移檄章表三十卷神仙良吏隱逸集異等傳各十卷又抄五經史漢百家之言方伎雜事三百一十卷金匱一藥方一百卷肘後要急方四卷洪博聞深洽江左絶倫著述篇章富於班馬又精辨元賾析理入微後忽與嶽疏云當逺行尋師尅期便發嶽得疏狼狽往别而洪坐至日中兀然若睡而卒嶽至不及見時年八十一視其顔色如生體亦柔軟舉尸入棺甚輕如空衣世以為尸解得仙云庾亮字元規明穆皇后之兄也父琛在外戚傳亮美姿容善談論性好莊老書風格整峻動由禮節閨門之內不肅而成時人以為夏侯太初陳長文之倫也年十六東海王越辟為掾不就隨父在會稽嶷然自守時人皆憚其方儼莫敢造之元帝為鎮東時聞其名辟西曹掾及引見風情都雅過於所望甚器重之聘亮妹為皇太子妃亮固讓不許轉丞相參軍預討華軼功封都亭侯轉參丞相軍事掌書記中興初拜中書郎領著作侍講東宫其所論釋多見稱述與溫嶠俱為太子布衣之好時帝方任刑法以韓子賜皇太子亮諫以申韓刻薄不足留聖心太子甚納焉纍遷給事中黃門侍郎散騎常侍時王敦在蕪湖帝使亮詣敦籌事敦與亮談論不覺改席而前退而歎曰庾元規賢於裴頠逺矣因表為中領軍明帝即位以為中書監亮上疏辭讓深陳外戚之戒帝納其言而止王敦既有異志內深忌亮而外崇重之亮憂懼以疾去官復代王導為中書監及敦舉兵加亮左衛將軍與諸將距錢鳯及沈充之走吳興也又假亮都督東征諸軍事追充事平以功封永昌縣開國公賜絹五千四百匹固讓不受轉護軍將軍及帝疾篤不欲見人羣臣無得進者撫軍將軍南頓王宗右衛將軍虞允等素被親愛與西陽王羕將有異謀亮直入卧內見帝流涕不自勝既而正色陳羕與宗等謀廢大臣規共輔政社稷安否將在今日辭旨切至帝深感悟引亮升御座遂與司徒王導受遺詔輔幼主加亮給事中徙中書令太后臨朝政事一決於亮先是王導輔政以寬和得衆亮任法裁物頗以此失人心又先帝遺詔褒進大臣而陶侃祖約不在其列侃約疑亮刪除遺詔並流怨言亮懼亂於是出溫嶠為江州以廣聲援修石頭城以備之會南頓王宗復謀廢執政亮殺宗而廢宗兄羕宗帝室近屬羕國族元老又先帝保傅天下咸以亮翦削宗室琅邪人卞咸宗之黨也與宗俱誅咸兄闡亡奔蘇峻亮符峻送闡而峻保匿之峻又多納亡命專用威刑亮知峻必為亂乃徵峻為大司農舉朝謂之不可平南將軍溫嶠亦纍書止之亮皆不納峻遂與祖約俱舉兵反溫嶠聞峻不受詔便欲下衛京都三吳又起義兵亮並不聽而報嶠書曰吾憂西陲過於歷陽足下無過雷池一步也既而峻將韓晃寇宣城亮遣拒之不能制峻乘勝至于京都詔假亮節都督征討諸軍事戰于建陽門外軍未及陳士衆棄甲而走亮乘小船西奔亂兵相剝掠亮左右射賊誤中柂工應弦而倒船上咸失色欲散亮不動容徐曰此手何可使著賊衆心乃安亮擕其三弟懌條翼南奔溫嶠嶠素欽重亮雖在奔敗猶欲推為都統亮固辭乃與嶠推陶侃為盟主侃至尋陽既有憾於亮議者咸謂侃欲誅執政以謝天下亮甚懼及見侃引咎自責風旨可觀侃不覺釋然乃謂亮曰君侯修石頭以擬老子今日反見求邪便談宴終日亮噉薤因留白侃問曰安用此為亮云故可以種侃於是尤相稱歎云非唯風流兼有為政之實既至石頭亮遣督護王彰擊峻黨張曜反為所敗亮送節傳以謝侃侃答曰古人三敗君侯始二當今事急不宜數爾又曰朝政多門用生國禍喪敗之來豈獨由峻也亮時以二千人守白石壘峻步兵萬餘四面來攻衆皆震懼亮激厲將士並殊死戰峻軍乃退追斬數百級峻平帝幸溫嶠舟亮得進見稽顙哽咽詔羣臣與亮俱升御座亮明日又泥首謝罪乞骸骨欲闔門投竄山海帝遣尚書侍中手詔慰諭此社稷之難非舅之責也亮上疏謝罪陳誠優詔答之亮又欲遁逃山海自暨陽東出詔有司録奪舟船亮乃求外鎮以自效出為持節都督豫州揚州之江西宣城諸軍事平西將軍假節豫州刺史領宣城內史亮遂受命鎮蕪湖頃之後將軍郭默據湓口以叛亮表求親征於是以本官加征討都督率將軍路永毛寶趙允匡術劉仕等步騎一萬會太尉陶侃俱討破之亮還蕪湖不受爵賞侃移書曰夫賞罰黜陟國之大信竊怪矯然獨為君子亮曰元帥指撝武臣效命亮何功之有遂苦辭不受進號鎮西將軍又固讓初以誅王敦功封永昌縣公亮比陳讓疏數十上至是許之陶侃薨遷亮都督江荆豫益梁雍六州諸軍事領豫荆江三州刺史開府儀同三司亮固讓開府乃遷鎮武昌時王導輔政主幼時艱務存大綱不拘細目委任趙允賈寧等諸將並不奉法大臣患之陶侃欲起兵廢導而郗鑒不從乃止至是亮又欲率衆黜導又以咨鑒而鑒又不許故其事得息時石勒新死亮有開復中原之謀乃解豫州授輔國將軍毛寶使與西陽太守樊峻精兵一萬俱戌邾城又以陶稱為南中郎將江夏相率部曲五千人入沔中亮弟翼為南蠻校尉南郡太守鎮江陵以武昌太守陳囂為輔國將軍梁州刺史趣子午又遣偏軍伐蜀至江陽執偽荆州刺史李閎巴郡太守黃植送于京都亮當率大衆十萬據石頭城為諸軍聲援乃上疏曰蜀胡二寇凶虐滋甚內相誅鋤衆叛親離蜀甚弱而胡尚強並佃並守修進取之備襄陽北接宛許南阻漢水其險足固其土足食臣宜移鎮襄陽之石城下并遣諸軍羅布江沔比及數年戎士習練乘釁齊進以臨河洛大勢一舉衆知存亡開反善之路宥逼脅之罪因天時順人情誅逋逆實聖朝之所先務願陛下許其所陳濟其此舉淮泗夀陽所宜進據臣輒簡練部分乞槐棘參議以定經略帝下其議時王導與亮意同郗鑒以資用未備不可大舉亮又上疏便欲遷鎮會寇陷邾城毛寶赴水而死亮陳謝自貶三等行安西將軍有詔復位尋拜司空餘官如故固讓不拜亮自邾城陷沒憂慨發疾會王導薨徵亮為司徒揚州刺史録尚書事亮又固辭帝許之咸康六年薨時年五十二追贈太尉諡曰文康喪至車駕親臨及葬又贈永昌公印綬亮弟冰上疏陳兄志不受帝從之亮將葬何充會之歎曰埋玉樹於土中使人情何能已初亮所乘馬有的顱殷浩以為不利於主勸亮賣之亮曰曷有已之不安而移於人浩慙而退亮在武昌諸佐吏殷浩之徒乘秋夜往共登南樓俄而不覺亮至諸人將起避之亮徐曰諸君少住老子於此處興復不淺便據胡牀與浩等談詠竟坐其坦率行已多此類也三子彬羲和彬年數嵗雅量過人溫嶠嘗隱暗怛之彬神色自若乃徐跪謂嶠曰君侯何至於此論者謂不減於亮蘇峻之亂遇害羲少有時譽初為吳國內史時穆帝頗愛文義羲至郡獻詩頗存諷諫其詩文多不載羲方見授用而卒子凖太元中自侍中代桓石虔為豫州刺史西中郎將鎮歷陽卒官凖子悅義熙中江州刺史凖弟楷自有傳和字道季好學有文章叔父翼將遷鎮襄陽和年十五以書諫止翼翼甚奇之升平中代孔嚴為丹陽尹表除衆役六十餘事太和中代王恪為中領軍卒於官子恆尚書僕射贈光祿大夫亮弟懌字叔預少以通簡為兄亮所稱弱冠西陽王羕辟不就東海王沖為長水校尉清選綱紀以懌為功曹除暨陽令又為沖中軍司馬轉散騎侍郎遷左衛將軍以討蘇峻功封廣饒男出補臨川太守歷監梁雍三州軍事轉輔國將軍梁州刺史假節鎮魏興時兄亮總統六州以懌寬厚容衆故授以逺任為東西勢援尋進監秦州氐羌諸軍事懌遣牙門霍佐迎將士妻子佐驅三百餘口亡入石虎亮表上貶懌為建威將軍朝議欲召還亮上疏曰懌御衆簡而有惠州户雖小賴其寬政佐等同惡大數不多且懌名號大不可以小故輕議進退其文武之心轉已安定賊帥文秀遣使歸誠上洛附賊降者五百餘口冀一安隱無復怵惕從之後以所鎮險逺糧運不繼詔懌以將軍率所領屯半州尋遷輔國將軍豫州刺史進號西中郎將監宣城廬江歷陽安豐四郡軍事假節鎮蕪湖懌嘗以白羽扇獻成帝帝嫌其非新反之侍中劉劭曰柏梁雲構大匠先居其下管絃繁奏夔牙先聆其音懌之上扇以好不以新後懌聞之曰此人宜在帝之左右又嘗以毒酒餉江州刺史王允之允之覺其有毒飲犬犬斃乃密奏之帝曰大舅已亂天下小舅復欲爾邪懌聞遂飲鴆而卒時年五十贈衛將軍諡曰簡子統字長仁少有令名司空太尉辟皆不就調補撫軍會稽王司馬出為建威將軍寧夷護軍尋陽太守年二十九卒時人稱其才器甚惜之子元之官至宣城內史懌弟冰字季堅兄亮以名德流訓冰以雅素垂風諸弟相率莫不好禮為世論所重亮嘗以為庾氏之寶司徒辟不就徵祕書郎預討華軼功封都鄉侯王導請為司徒右長史出補吳國內史會蘇峻作逆遣兵攻冰冰不能禦便棄郡奔會稽會稽內史王舒以冰行奮武將軍距峻别率張健於吳中時健黨甚衆諸將莫敢先進冰率衆擊健走之於是乘勝而進赴于京都又遣司馬滕含攻賊石頭城拔之冰勳為多封新吳縣侯固辭不受遷給事黃門侍郎又讓不拜司空郗鑒請為長史不就出補振威將軍會稽內史徵為領軍將軍又辭尋入為中書監揚州刺史都督揚豫兖三州軍事征虜將軍假節是時王導新喪人情恇然冰兄亮既固辭不入衆望歸冰冰既當重任經綸時務不捨晝夜賔禮朝賢升擢後進由是朝野注心咸曰賢相初導輔政每從寬惠冰頗任威刑殷融諫之冰曰前相之賢猶不堪其𢎞况吾者哉范汪謂冰曰頃天文錯度足下宜盡消禦之道冰曰元象豈吾所測正當勤盡人事耳又隱實户口料出無名萬餘人以充軍實詔復論前功冰上疏固辭許之成帝疾篤時有妄為尚書符敕宫門宰相不得前左右皆失色冰神氣自若曰是必虛妄推問果詐衆心乃定進號左將軍康帝即位又進車騎將軍冰懼權盛乃求外出會弟翼當伐石虎於是以夲號除都督江荆寧益梁交廣七州豫州之四郡軍事領江州刺史假節鎮武昌以為翼援臨發上疏頗盡忠益頃之獻皇后臨朝徵冰輔政冰辭以疾篤尋而卒時年四十九册贈侍中司空諡曰忠成祠以太牢冰天性清愼常以儉約自居中子襲嘗貸官絹十匹冰怒捶之市絹還官臨卒謂長史江虨曰吾將逝矣恨報國之志不展死之日斂以時服無以官物也及卒無絹為衾室無妾媵家無私積世以此稱之冰七子希襲友藴倩邈柔希字始彥初拜祕書郎纍遷司徒右長史黃門侍郎建安太守未拜復為長史兼右衛將軍遷侍中出為輔國將軍吳國內史希既后之戚屬冰女又為海西公妃故希兄弟並顯貴太和中希為北中郎將徐兖二州刺史藴為廣州刺史並假節友東陽太守倩太宰長史邈會稽王參軍柔散騎常侍倩最有才器桓溫深忌之初慕容俊圍梁父斷澗水泰山太守諸葛攸奔鄒山魯髙平等數郡皆沒希坐免官頃之徵為護軍將軍希怒固辭希初免時多盜北府軍資溫諷有司劾之復以罪免遂家于晉陵之暨陽初郭璞筮冰云子孫必有大禍唯用三陽可以有後故希求鎮山陽友為東陽家于暨陽及海西公廢桓溫陷倩及柔以武陵王黨殺之希聞難便與弟邈及子攸之逃于海陵陂澤中藴於廣州飲鴆而死及友當伏誅友子婦桓祕女也請溫故得免故青州刺史武沉希之從母兄也潛餉給希經年溫後知之遣兵捕希武沉之子遵與希聚衆於海濵略漁人船夜入京口城平北司馬卞耽踰城奔曲阿吏士皆散走希放城內囚徒數百人配以器杖遵於外聚衆宣令云逆賊桓溫廢帝殺王稱海西公密旨誅除凶逆京都震擾內外戒嚴屯備六門平北參軍劉奭與髙平太守郗逸之逰軍督護郭龍等集衆拒之卞耽又與曲阿人𢎞戎發諸縣兵二千并力屯新城以擊希希戰敗閉城自守溫遣東海太守周少孫討之城陷被擒希邈及子姪五人斬于建康市遵及黨與並伏誅唯友及藴諸子獲全友子叔宣右衛將軍藴子廓之東陽太守冰弟條字幼序初辟太宰府纍遷黃門郎豫章太守徵拜祕書監賜爵鄉侯出為冠軍將軍臨川太守豫章黃韜自稱孝神皇帝以臨川人李髙為相聚黨數百人乘犢車衣皂袍攻郡縣條討平之條於兄弟最凡劣故祿位不至卒官贈左將軍條弟翼字稚恭風儀秀偉少有經綸大略京兆杜乂陳郡殷浩並才名冠世而翼弗之重也每語人曰此輩宜束之髙閣俟天下太平然後議其任耳見桓溫總角之中便期之以逺略因言於成帝曰桓溫以英雄之才願陛下勿以常人遇之常壻畜之宜委以方面之任必有匡濟艱難之勳蘇峻作逆翼時年二十二兄亮使白衣領數百人備石頭亮敗與翼俱奔事平詔辟太尉陶侃府轉參軍纍遷從事中郎在公府雍容諷議頃之除振威將軍西陽太守撫和百姓甚得歡心遷南蠻校尉領南郡太守加護國將軍假節及邾城失守石城被圍翼屢設竒兵潛致糧仗石城得全翼之勳也賜爵都亭侯及亮卒授都督江荆司雍梁益六州諸軍事安西將軍荆州刺史假節代亮鎮武昌翼以帝舅年少超居大任遐邇屬目慮其不稱翼每竭志能勞謙匪懈戎政嚴明經略深逺數年之中公私充實人情翕然稱其才幹由是自河以南皆懷歸附石虎汝南郡守戴開率數千人詣翼降又遣使東至遼東西到涼州要結二方欲同大舉慕容皓張駿並報使請期翼雅有大志欲以滅胡平蜀為己任言論慷慨形于辭色將兵都尉錢頎陳事合旨翼拔為五品將軍賜榖二百斛時東土多賦役百姓乃從海道入廣州刺史鄧嶽大開鼓鑄諸夷因此知造兵器翼表陳東境國家所資侵擾不已逃逸漸多夷人常伺隙若知造鑄之利將不可禁時殷浩徵命無所就而翼請為司馬及軍司並不肯赴翼遺浩書因致其意先是殷浩父羡為長沙在郡貪殘兄冰與翼書屬之翼報書曰殷君始往雖多驕豪實有風力之益亦似由有佳兒弟故小令物情難之自頃以來奉公更退私纍日滋亦不稍以此寥蕭之也既雅敬洪逺又與浩親善其父兄得失豈以小小計之大較江東政以傴儛豪強以為民蠧時有行法輒施之寒劣如往年偷石頭倉米一百萬斛皆是豪將輩而直打殺倉督監以塞責山遐作餘姚半年而為官出二千户政雖不倫公強官長也而羣共驅之不得安席紀睦徐寧奉王使糾罪人船頭到渚桓逸還復而二使免官雖皆前宰之惛謬江東事去實此之由也兄弟不幸橫陷此中自不能拔腳於風塵之外當共眀目治之荆州所統一二十郡唯長沙最惡惡而不黜與殺督監者復何異邪翼有風力格裁發言立論皆如此康帝即位翼欲率衆北伐上疏曰賊虎年已六十奢淫理盡醜類怨叛又欲決死遼東皓雖驍果未必能固若北無掣手之虜則江南不異遼左矣臣所以輒發良人不顧怨咎然東西形援未必齊舉且欲北進移鎮安陸入沔五日溳水通流輒率南郡太守王愆期江夏相謝尚尋陽太守袁真西陽太守曹據等精鋭三萬風馳上道并勒平北將軍桓宣撲取黃季欲并丹水搖蕩秦雍御以長轡用逸待勞比及數年興復可冀臣既臨許洛竊謂桓溫可渡戍廣陵何充可移據淮泗赭圻路永進屯合肥伏願表御之日便決聖聽不可廣詢同異以乖事會兵聞拙速不聞工之久也於是並發所統六州奴及車牛驢馬百姓嗟怨時欲向襄陽慮朝廷不許故以安陸為辭帝及朝士皆遣使譬止車騎參軍孫綽亦致書諫翼不從遂違詔輒行至夏口復上表言襄陽荆楚之舊西接益梁與關隴咫尺北去洛河不盈千里上沃田良方城險峻水路流通轉運無滯進可以掃蕩秦趙退可以保據上流臣輒量宜入沔徙鎮襄陽其謝尚王愆期等悉令還據夲戍須到所在馳遣啓聞翼時有衆四萬詔加都督征討軍事師次襄陽大會僚佐陳旌甲親授弧矢曰我之行也若此射矣遂三起三疊徒衆屬目其氣十倍初翼遷襄陽舉朝謂之不可議者或謂避衰唯兄冰意同桓溫及譙王無忌贊成其計至是冰求鎮武昌為翼繼援朝議謂冰不宜出冰乃止又進翼征西將軍領南蠻校尉胡賊五六百騎出樊城翼遣冠軍將軍曹據追擊於撓溝北破之死者近半獲馬百匹翼綏來荒逺務盡招納之宜立客館置典賔參軍桓宣卒翼以長子方之為義城太守代領宣衆司馬應誕為龍驤將軍襄陽太守參軍司馬勳為建威將軍梁州刺史戍西城康帝崩兄冰卒以國家情事留方之戍襄陽還鎮夏口悉取冰所領兵自配以兄子統為尋陽太守詔使翼還督江州又領豫州刺史辭豫州後欲移鎮樂鄉詔不許繕修軍器大佃積榖欲圖後舉遣益州刺史周撫西陽太守曹據伐蜀破蜀將李桓於江陽翼如厠見一物如方相俄而疽發背疾篤表第二子爰之行輔國將軍荆州刺史司馬朱燾為南蠻校尉以千人守巴陵永和元年卒時年四十一追贈車騎將軍諡曰肅翼卒未幾部將于瓚戴羲等作亂殺將軍曹據翼長史江虨司馬朱燾將軍袁真等共誅之爰之有翼風尋為桓溫所廢溫既廢爰之又以征虜將軍劉惔監沔中軍事領義城太守代方之而方之爰之並遷徙于豫章桓彛字茂倫譙國龍亢人漢五更榮之九世孫也父皓官至郎中彛少孤貧雖簞瓢處之晏如性通朗早獲盛名有人倫識鑒拔才取士或出於無聞或得之孩抱時人方之許郭少與庾亮深交雅為周顗所重顗常歎曰茂倫嶔崎歷落固可笑人也起家州主簿赴齊王冏義拜騎都尉元帝為安東將軍版行逡遒令尋辟丞相中兵屬纍遷中書郎尚書吏部郎名顯朝廷于時王敦擅權嫌忌士望彛以疾去職嘗過輿縣縣宰東海徐寧字安期通朗博涉彛遇之欣然停留纍日結交而别先是庾亮每屬彛覓一佳吏部及至都謂亮曰為卿得一吏部矣亮問所在彛曰人所應有而不必有人所應無而不必無徐寧真海岱清士因為敘之即遷吏部郎竟歷顯職明帝將伐王敦拜彛散騎常侍引參密謀及敦平以功封萬寧縣男丹陽尹溫嶠上言宣城阻帶山川頻經變亂宜得望實居之竊謂桓彛可充其選帝手詔曰適得太真表如此今大事新定朝廷須才不有君子其能國乎方今外務差輕欲停此事彛上疏深自撝挹內外之任並非所堪但以墳柏在此郡欲暫結名義遂補彛宣城內史在郡有惠政為百姓所懷蘇峻之亂也彛糾合義衆欲赴朝廷其長史裨惠以郡兵寡弱山人易擾可案甲以須後舉彛厲色曰夫見無禮於其君者若鷹鸇之逐鳥雀今社稷危逼義無晏安乃遣將軍朱綽討賊别帥於蕪湖破之彛尋出石跪會朝廷遣將軍司馬流先據慈湖為賊所敗遂長驅徑進彛以郡無堅城遂退據廣德尋王師敗績彛聞而慷慨流涕進屯涇縣時州郡多遣使降峻裨惠又勸彛偽與通和以紓交至之禍彛曰吾受國厚恩義在致死焉能忍垢蒙辱與醜逆通問如其不濟此則命也遣將軍俞縱守蘭石峻遣將韓晃攻之縱將敗左右勸縱退軍縱曰吾受桓侯厚恩夲以死報吾之不可負桓侯猶桓侯之不可負國也遂力戰而死晃因進軍攻彛彛固守經年勢孤力屈賊曰彛若降當待以優禮將士多勸彛偽降更思後舉彛不從辭氣壯烈志節不撓城陷為晃所害年五十三時賊尚未平諸子並流迸宣城人紀世和率義故葬之賊平追贈廷尉諡曰簡咸安中改贈太常俞縱亦以死節追贈興古太守初彛與郭璞善嘗令璞筮卦成璞以手壞之彛問其故曰卦與吾同丈夫當此非命如何竟如其言有五子溫雲豁祕沖溫别有傳雲字雲子初為驃騎何充參軍尚書郎不拜襲爵萬寧男歷位建武將軍義城太守遭母憂去職葬畢起為江州刺史稱疾廬于墓次詔書敦逼固辭不行服闋然後蒞職加都督司豫二州軍事領鎮蠻護軍西陽太守假節雲招集衆力志在足兵多所枉濫衆皆嗟怨時溫執權有司不敢彈劾升平年年卒贈平南將軍諡曰貞子序嗣官至宣城內史豁字子朗初辟司徒府祕書郎皆不就簡文帝召為撫軍從事中郎除吏部郎以疾辭遷黃門郎未拜時謝万敗於梁濮許昌潁川諸城相次陷沒西藩騷動溫命豁督沔中七郡軍事建威將軍新野義城二郡太守擊慕容屈塵破之進號右將軍溫既內鎮以豁監荆揚雍州軍事領護南蠻校尉荆州刺史假節將軍如故時梁州刺史司馬勳以梁益叛豁使其參軍桓羆討之而南陽督護趙𢎞趙億等逐太守桓淡據宛城以叛豁與竟陵太守羅崇討破之又攻偽南中郎將趙盤於宛盤退走豁追至魯陽獲之送于京師置戍而旋又監寧益軍事溫薨遷征西將軍進督交廣并前五州軍事苻堅寇蜀豁遣江夏相竺瑗距之廣漢太守趙長等戰死瑗引軍退頃之堅又寇涼州弟沖遣輔國將軍朱序與豁子江州刺史石秀泝流就路稟節度豁遣督護桓羆與序等遊軍沔漢為涼州聲援俄而張天錫陷沒詔遣中書郎王尋之詣豁咨謀邊事豁表以梁州刺史毛憲祖監沔北軍事兖州刺史朱序為南中郎將監沔中軍事鎮襄陽以固北鄙太元初遷征西大將軍開府豁上疏固讓不許及符堅陷仇池豁以新野太守吉挹行魏興太守督護梁州五郡軍事戍梁州堅陷涪城梁州刺史楊亮益州刺史周仲孫並委戌奔潰豁以威略不振所在覆敗又上疏陳謝固辭不拜開府尋卒時年五十八贈司空夲官如故諡曰敬賻錢五十萬布五百匹使者持節監護喪事豁時譽雖不及沖而甚有器度但遇強寇故功業不建初豁聞苻堅國中有謡云誰謂爾堅石打碎有子二十人皆以石為名以應之唯石虔石秀石民石生石綏石康知名石虔小字鎮惡有才幹趫捷絶倫從父在荆州於獵圍中見猛虎被數箭而伏諸督將素知其勇戲令拔箭石虔因急往拔得一箭猛虎跳石虔亦跳髙於猛虎猛虎伏復拔一箭以歸從溫入關叔父沖為苻健所圍垂沒石虔躍馬赴之拔沖於數萬衆之中而還莫敢抗之三軍歎息威震敵人時有患瘧疾者謂曰桓石虔來以怖之病者多愈其見畏如此初袁真以夀陽叛石虔以寧逺將軍南頓太守帥諸將攻之尅其髙城又擊苻堅將王鑒于石橋獲馬五百匹除竟陵太守以父憂去職尋而苻堅入寇淮南詔曰石虔文武器幹御戎有方古人絶哭金革不避况在餘哀豈得辭事可奮威將軍南平太守尋進冠軍將軍苻堅荆州刺史梁成襄陽太守閻震率衆寇竟陵石虔與弟石民距之賊阻滶水屯管城石虔設計夜渡水既濟賊始覺力戰破之進尅管城禽震斬首七千級俘獲萬人馬數百匹牛羊千頭具裝鎧三百領成以輕騎走保襄陽石虔復領河東太守進據樊城堅兖州刺史張崇納降二千家而還沖卒石虔以冠軍將軍監豫揚州五郡軍事豫州刺史尋以母憂去職服闋復夲位久之命移鎮馬頭石虔求停歷陽許之太元十三年卒追贈右將軍追論平閻震功追爵作塘侯第五子誕嗣誕長兄洪襄城太守洪弟振字道全少果鋭而無行元為荆州振為揚武將軍淮南太守轉江夏相以凶橫見黜及元之敗也桓謙匿於沮中振逃於華容之涌中元先令將軍王稚徽戍巴陵稚徽遣人報振云桓欽已尅京邑馮稚等復平尋陽劉毅諸軍並敗於中路振大喜時安帝在江陵振乃聚黨數十人襲江陵比至城有衆二百謙亦聚衆而出遂陷江陵迎帝於行宫振聞桓升死大怒將肆逆於帝謙苦禁之乃止遂命羣臣辭以楚祚不終百姓之心復歸於晉更奉進璽綬以琅邪王領徐州刺史振為都督八州鎮西將軍荆州刺史帝侍御左右皆振之腹心既而歎曰公昔不早用我遂致此敗若使公在我為前鋒天下不足定今獨作此安歸乎遂肆意酒色暴虐無道多所殘害振營于江津南陽太守魯宗之自襄陽破振將溫楷于柞溪進屯紀南振聞楷敗留其將馮該守營自率衆與宗之大戰振勇冠三軍衆莫能禦宗之敗績振追奔遇宗之單騎於道弗之識也乃問宗之所在紿曰已前走矣宗之於是自後而退尋而劉毅等破馮該平江陵振聞該敗衆潰而走後與該子宏出自溳城復襲江陵荆州刺史司馬休之奔襄陽振自號荆州刺史建威將軍劉德肅率寧逺將軍索邈與振戰於沙橋振兵雖少左右皆力戰每一合振輒瞋目奮擊衆莫敢當振時醉且中流矢廣武將軍唐興臨陳斬之石秀幼有令名風韻秀徹博涉羣書尤善老莊常獨處一室簡於應接時人方之庾純甚為簡文帝所重豁為荆州請為鷹揚將軍竟陵太守非其好也尋代叔父沖為寧逺將軍江州刺史領鎮蠻護軍西陽太守居尋陽性放曠常弋釣林澤不以榮爵嬰心善騎射發則命中嘗從沖獵登九井山徒旅甚盛觀者傾坐石秀未嘗屬目止嘯詠而已謝安嘗訪以世務默然不答安甚怪之他日安以語其從弟嗣嗣以問之石秀曰世事此公所諳吾又何言哉在州五年以疾去職年四十三卒於家朝野悼惜之追贈後將軍後改贈太常子稚玉嗣元之篡也以石秀一門之令封稚玉為臨沅王石民弱冠知名衛將軍謝安引為參軍叔父沖上疏版督荆江豫三州之十郡軍事振武將軍領襄城太守戍夏口與石虔攻苻堅荆州刺史梁成等於竟陵明年又與隋郡太守夏侯澄之破苻堅將慕容垂薑成等於漳口復領譙國內史梁郡太守沖薨詔以石民監荆州軍事西中郎將荆州刺史桓氏世蒞荆土石民兼以才望甚為人情所仰初沖遣竟陵太守趙統伐襄陽至是石民復遣兵助之尋而苻堅敗於淮淝石民遣南陽太守髙茂衛山陵時堅雖破敗而慕容垂等復盛石民遣將軍晏謙伐𢎞農賊東中郎將慕容夔降之始置湖陕二戍獲關中擔幢伎以充太樂時苻堅子丕僭號於河北謀襲洛陽石民遣將軍馮該討之臨陳斬丕及其左僕射王孚吏部尚書苟操等傳首京都而丁零翟遼復侵逼山陵石民使河南太守馮遵討之時乞活黃淮自稱并州刺史與遼共攻長社衆數千人石民復遣南平太守郭銓松滋太守王遐之擊淮軒之遼走河北以前後功進左將軍卒無子石生隆安中以司徒左長史遷侍中歷驃騎太傅長史會稽世子元顯將伐桓元石生馳書報元元甚德之及元用事以為前將軍江州刺史尋卒於官石綏元顯時為司徒左長史元用事拜黃門郎左衛將軍元敗石綏走江西塗中聚衆攻歷陽後為梁州刺史傅歆之所殺石康偏為元所親愛元為荆州以為振威將軍纍遷荆州刺史討庾庂功封武陵王事具元傳豁弟祕字穆子少有才氣不倫於俗初拜祕書郎兄溫抑而不用久之為輔國將軍宣城內史時梁州刺史司馬勳叛入蜀祕以本官監梁益二州征討軍事假節勳平還郡後為散騎常侍徙中領軍孝武帝初即位妖賊盧竦入宫祕與左衛將軍殷康俱入擊之溫入朝窮考竦事收尚書陸始等罹罪者甚衆祕亦免官居于宛陵每憤憤有不平之色溫疾篤祕與溫子熙濟等謀共廢沖沖密知之不敢入頃溫氣絶先遣力士拘録熙濟而後臨喪祕於是廢棄遂居于墓所放志田園好遊山水後起為散騎常侍凡三表自陳詔曰祕受遇先朝是以延之而頻有讓表以栖尚告誠兼有疾疢省用增歎可順其所執祕素輕沖沖時權盛祕恥常侍位卑故不應朝命與謝安書及詩十首辭理可觀其文多引簡文帝之盻遇先沖卒長子蔚官至散騎常侍遊擊將軍元篡以為醴陵王祕弟沖字幼子溫諸弟中最淹識有武幹溫甚器之弱冠太宰武陵王晞辟不就除鷹揚將軍鎮蠻護軍西陽太守從溫征伐有功遷督荆州之南陽襄陽新野義陽順陽雍州之京兆揚州之義城七郡軍事遷寧朔將軍義城新野二郡太守鎮襄陽又從溫破姚襄及虜周成進號征虜將軍賜爵豐城公尋遷振威將軍江州刺史領鎮蠻護軍西陽譙二郡太守溫之破姚襄也獲襄將張駿楊凝等徙于尋陽沖在江陵未及之職而駿率其徒五百人殺江州督護趙毗掠武昌府庫將妻子北叛沖遣將討獲之遽還所鎮初彛亡後沖兄弟並少家貧母患須羊以解無由得之溫乃以沖為質羊主甚富言不欲為質幸為養買德郎買德郎即沖小字也及沖為江州出射羊主於堂邊看沖識之謂曰我買德也遂厚報之頃之進監江荆豫三州之六郡軍事南中郎將假節州郡如故在江州凡十三年而溫薨孝武帝詔沖為中軍將軍都督揚江豫三州軍事揚豫二州刺史假節時詔賻溫錢布漆蠟等物而不及大殮沖上疏陳溫素懷每存清儉且私物足舉凶事求還官庫詔不許沖猶固執不受初溫執權大辟之罪皆自己決沖既涖事上疏以為生殺之重古今所慎凡諸死罪先上須報沖既代溫居任盡忠王室或勸沖誅除時望專執權衡沖不從謝安以時望輔政為羣情所歸沖懼逼寧康三年乃解揚州自求出外桓氏黨與以為非計莫不扼腕苦諫郗超亦深止之沖皆不納處之淡然不以為恨忠言嘉謀每盡心力於是改授都督徐兖豫青揚五州之六郡軍事車騎將軍徐州刺史以北中郎府并中軍鎮京口假節又詔沖及謝安並加侍中以甲仗五十人入殿時丹陽尹王藴以后父之重昵于安安意欲出藴為方伯乃復解沖徐州直以車騎將軍都督豫江二州之六郡軍事自京口遷鎮姑熟既而苻堅寇涼州沖遣宣城內史朱序豫州刺史桓伊率衆向夀陽淮南太守劉波泛舟淮泗乘虛致討以救涼州拜表以聞優詔聽許會張天錫陷沒於是罷兵俄而豁卒遷都督江荆梁益寧交廣七州揚州之義成雍州之京兆司州之河東軍事領護南蠻校尉荆州刺史持節將軍侍中如故又以其子嗣為江州刺史沖將之鎮帝餞於西堂賜錢五十萬酒三百四十石牛五十頭犒賜文武謝安送至溧州沖既到江陵時苻堅強盛沖欲移阻江南乃上疏曰自中興以來荆州所鎮隨宜回轉臣亡兄溫以石虎死經略中原因江陵路便即而鎮之事與時遷勢無常定且兵者詭道示之以弱今宜全重江南輕戌江北南平孱陵縣界地名上明田土膏良可以資業軍人在吳時樂鄉城以上四十餘里北枕大江西接三峽若狂狡送死則舊郢以北堅壁不戰接會濟江路不云逺乘其疲墯撲翦為易臣司存閫外輒隨宜處分於是移鎮上明使冠軍將軍劉波守江陵咨議參軍楊亮守江夏詔以荆州水旱飢荒又沖新移草創嵗運米三十萬斛以供軍資須年豐乃止堅遣其將符融寇樊鄧石越寇魯陽姚萇寇南鄉韋鍾寇魏興所在陷沒沖遣江夏相劉奭南中郎將朱序擊之而奭畏懦不進序又為賊所擒沖深自咎責上疏送章節請解職不許遣左衛將軍張元之詣沖咨謀軍事沖率前將軍劉波及兄子振威將軍石民冠軍將軍石虔等伐苻堅拔堅築陽攻武當走堅兖州刺史張崇堅遣慕容垂毛當寇鄧城苻熙石越寇新野沖既憚堅衆又以疾疫還鎮上明表以夏口江沔衝要密邇強寇兄子石民堪居此任輒版督荆江十郡軍事振武將軍襄城太守尋陽北接強蠻西連荆郢亦一任之要今府州既分請以王薈補江州刺史詔從之時薈始遭兄邵喪將葬辭不欲出於是衛將軍謝安更以中領軍謝輶代之沖聞之而怒上疏以為輶文武無堪求自領江州帝許之沖使石虔伐堅襄陽太守閻震擒之及大小帥二十九人送于京都詔歸沖府以平震功封次子謙宜陽侯堅使其將郝貴守襄陽沖使揚威將軍朱綽討之遂焚燒沔北田稻拔六百餘戶而還又遣上庸太守郭寶伐堅魏興太守褚垣上庸太守假方並降之新城太守麴常遁走三郡皆平詔賜錢百萬袍表千端初沖之西鎮以賊寇方強故移鎮上明謂江東力弱正可保固封疆自守而已又以將相異宜自以德望不逮謝安故委之內相而四方鎮扞以為己任又與朱序欵密俄而序沒於賊沖深用愧惋既而苻堅盡國內侵沖深以根夲為慮乃遣精鋭三千來赴京師謝安謂三千人不足以為損益而欲外示間暇聞軍在近固不聽報云朝廷處分已定兵革無闕西藩宜以為防時安已遣兄子元及桓伊等諸軍沖謂不足以為廢興召吏佐對之歎曰謝安乃有廟堂之量不間將略今大敵垂至方逰談不暇唯遣諸不經事少年衆又寡弱天下事可知吾其左袵矣俄而聞堅破大勳克舉又知朱序因以得還沖夲疾病加以慚耻發病而卒時年五十七贈太尉夲官如故諡曰宣穆賻錢五十萬布五百匹沖性儉素而謙虛愛士嘗浴後其妻送以新布沖大怒促令持去其妻復送之而謂曰衣不經新何由得故沖笑而服之命處士南陽劉驎之為長史驎之不屈沖親往迎之禮之甚厚又辟處士長沙鄧粲為别駕備禮盡恭粲感其好賢乃起應命初郤鑒庾亮庾翼臨終皆有表樹置親戚唯沖獨與謝安書云妙靈靈寶尚小亡兄寄託不終以此為恨言不及私論者益嘉之及喪下江陵士女老幼皆臨江曕送號哭盡哀後元篡位追贈太傅宣城王有七子嗣謙修崇𢎞羡怡嗣字恭祖少有清譽與豁子石秀並為桓氏子姪之冠沖既代豁西鎮詔以嗣督荆州之三郡豫州之四郡軍事建威將軍江州刺史蒞事簡約修所住齋應作板簷嗣命以茅代之版付船官轉西陽襄城二郡太守鎮夏口後領江夏相卒官追贈南中郎將諡曰靖子允嗣允字茂逺少有清操雖奕世華貴甚以恬退見稱初拜祕書丞纍遷中書郎祕書監元甚欽愛之遷中書令元篡位為吏部尚書隨元西奔元死歸降詔曰夫善著則祚逺勳彰故事殊以宣孟之忠蒙後晉國子文之德世嗣獲存故太尉沖昔藩陕西忠誠王室諸子染凶自貽罪戮念沖遺勤用悽于懷其孫允宜見矜宥以奬為善可特全生命徙于新安及東陽太守殷仲文永嘉太守駱球等謀反隂欲立允為元嗣事覺伏誅嗣弟謙字敬祖詳正有器望初以父功封宜陽縣開國侯纍遷輔國將軍吳國內史孫恩之亂謙出奔無錫徵拜尚書驃騎大將軍元顯引為咨議參軍轉司馬元興初朝廷將伐元以桓氏世在陕西謙父沖有遺惠於荆楚懼人情向背乃用謙為持節都督荆益寧梁四州諸軍事西中郎將荆州刺史假節以安荆楚元既用事以謙為尚書左僕射領吏部加中軍將軍謙兄弟顯列元甚倚仗而內不能善也改封謙寧都侯拜尚書令加散騎常侍遷侍中衛將軍開府録尚書事元篡位復領揚州刺史本官如故封新安王及桓振作亂謙保護乘輿頗有功焉然而暗愞尤不可以造事初勸振率軍下戰已守西陵振既輕謙用事故不從及振敗謙奔于姚興先是譙縱稱藩於姚興縱與盧循通使潛相影響乃表興請謙共順流東下興問謙謙曰臣門著恩荆楚從弟元末雖篡位皆是逼迫人神所明今臣與縱東下百姓自應駭動興曰小水不容大舟若縱才力足以濟事亦不假君為鱗翼宜自求多福遂遣之謙至蜀欲虗懷引士縱疑之乃置謙於龍格使人守之謙向諸弟泣曰姚主言神矣後與縱將譙道福俱下謙於道占募百姓感沖遺惠投者二萬人劉道規破謙斬之謙弟修字承祖尚簡文帝女武昌公主歷吏部郎稍遷左衛將軍王恭將伐譙王尚之先遣何淡之孫無終向句容修以左衛領振武將軍與輔國將軍陶無忌距之修次句容俄而恭敗無終遣書求降修既旋軍而楊佺期已至石頭時朝廷無備內外崩駭修既進説曰殷桓之下専王恭恭既破滅莫不失色今若優詔用元元必內喜則能制仲堪佺期使並順命朝廷納之以修為龍驤將軍荆州刺史假節權領左衛文武之鎮又令劉牢之以千人送之轉仲堪為廣州修未及發而元等盟於尋陽求誅牢之尚之并訴仲堪無罪獨被降黜於是詔復仲堪荆州御史中丞江績奏修承受楊佺期之言交通信命宣傳不盡以為身計疑誤朝算請收付廷尉特詔免官尋代王凝之為中護軍頃之元破仲堪佺期詔以修為征虜將軍江州刺史尋復為中護軍元執政以修都督六州右將軍徐兖二州刺史假節尋進撫軍將軍加散騎常侍元篡以為撫軍大將軍封安成王劉裕義旗起斬之徐寧者東海郯人也少知名為輿縣今時廷尉桓彝稱有人倫鑒識彝嘗去職至廣陵尋親舊還遇風停浦中纍日憂悒因上岸見一室宇有似廨署訪之云是輿縣彝乃造之寧清惠博涉相遇欣然因留數夕彝大賞之結交而别至都謂庾亮曰吾為卿得一佳吏部郎語在彝傳即遷吏部郎左將軍江州刺史卒官王湛字處沖司徒渾之弟也少有識度身長七尺八寸龍顙大鼻少語言初有隱德人莫能知兄弟宗族皆以為癡其父昶獨異焉遭父喪居於墓次服闋闔門守靜不交當世沖素簡淡器量隤然有公輔之望兄子濟輕之所食方丈盈前不以及湛湛命取菜蔬對而食之濟嘗詣湛見牀頭有周易問曰叔父何用此為湛曰體中不佳時脫復看耳濟請言之湛因剖析元理微妙有奇趣皆濟所未聞也濟才氣抗邁於湛略無子姪之敬既聞其言不覺栗然心形俱肅遂留連彌日纍夜自視缺然乃歎曰家有名士三十年而不知濟之罪也既辭而去湛送至門濟有從馬絶難乘濟問湛曰叔頗好騎不湛曰亦好之因騎此馬姿容既妙廽䇿如縈善騎者無以過之又濟所乘馬甚愛之湛曰此馬雖快然力薄不能苦行近見督郵馬當勝但芻秣不至耳濟試養之而與己馬等湛又曰此馬任重方知之平路無以别也於是當蟻封內試之濟馬果躓而督郵馬如常濟益歎異白其父曰濟始得一叔乃濟以上人也武帝亦以湛為癡每見濟輒調之曰卿家癡叔死未濟常無以答及是帝又問如初濟曰臣叔殊不癡因稱其美帝曰誰比濟曰山濤以下魏舒以上時人謂湛上方山濤不足下比魏舒有餘湛聞曰欲處我於季孟之間乎湛少仕歷秦王文學太子洗馬尚書郎太子中庶子出為汝南內史元康五年卒年四十七子承嗣承字安期清虛寡欲無所修尚言理辨物但明其指要而不飾文辭有識者服其約而能通弱冠知名太尉王衍雅貴異之比南陽樂廣焉永寧初為驃騎參軍值天下將亂乃避難南下遷司空從事中郎豫迎大駕賜爵藍田縣侯遷尚書郎不就東海王越鎮許昌以為記室參軍雅相知重勑其子毗曰夫學之所益者淺體之所安者深間習禮度不如式曕儀刑諷味遺言不若親承音旨王參軍人倫之表汝其師之在府數年見朝政漸替因辭以母老求出越不許久之遷東海太守政尚清靜不為細察小吏有盜池中魚者綱紀推之承曰文王之囿與衆共之池魚何足惜邪有犯夜者為吏所拘承問其故答曰從師受書不覺日暮承曰鞭撻寧越以立威名非政化之本使吏送令歸家其從容寬恕如此尋去官東渡江是時道路梗澀人懷危懼承每遇艱險處之夷然雖家人近習不見其憂喜之色既至下邳登山北望歎曰人言愁我始欲愁矣及至建鄴為元帝鎮東府從事中郎甚見優禮承少有重譽而推誠接物盡𢎞恕之理故衆咸親愛焉渡江名臣王導衛玠周顗庾亮之徒皆出其下為中興第一年四十六卒朝野痛惜之自昶至承世有髙名以為祖不及孫孫不如父子述嗣述字懷祖少孤事母以孝聞安貧守約不求聞逹性沉靜每坐客馳辨異端競起而述處之恬如也少襲父爵年三十尚未知名人或謂之癡司徒王導以門地辟為中兵屬既見無他言唯問以在東米價述但張目不答導曰王掾不癡人何言癡也嘗見導每發言一坐莫不贊美述正色曰人非堯舜何得每事盡善導改容謝之謂庾亮曰懷祖清貞簡貴不減祖父但曠淡微不及耳康帝為驃騎將軍召補功曹出為宛陵令太尉司空頻辟又除尚書吏部郎並不行歷庾氷征虜長史時庾翼鎮武昌以纍有妖怪又猛虎入府欲移鎮避之述與氷言天道元逺鬼神難言逹人君子直道而行何避之有時朝議亦不允翼遂不移鎮述出補臨海太守遷建威將軍會稽內史蒞政清肅終日無事母憂去職服闋代殷浩為揚州刺史加征虜將軍初至主簿請諱報曰亡祖先君名播海內逺近所知內諱不出門餘無所諱尋加中書監固讓經年不拜復加征虜將軍進都督揚州徐州之琅邪諸軍事衛將軍并冀幽平四州大中正刺史如故尋遷散騎常侍尚書令將軍如故述每受職不為虛讓其有所辭必於不受至是子坦之諫以為故事應讓述曰汝謂我不堪邪坦之曰非也但克讓自美事耳述曰既云堪何為復讓人言汝勝我定不及也坦之為桓溫長史溫欲為子求婚於坦之及還家省父而述愛坦之雖長大猶抱置膝上坦之因言溫意述大怒遽排下曰汝竟癡耶詎可畏溫面而以女妻兵也坦之乃辭以他故溫曰此尊君不肯耳遂止簡文帝每言述才既不長直以真率便敵人耳謝安亦歎美之初述家貧求試守宛陵令頗受贈遺而修家具為州司所檢有一千三百條王導使謂之曰名父之子不患無祿屈臨小縣甚不宜爾答曰足自當止時人未之逹也此後屢居州郡清潔絶倫祿賜皆散之親故宅宇舊物不革於昔始為當時所歎但性急為纍嘗食雞子以筯刺之不得便大怒擲地雞子圓轉不止便下牀以屐齒踏之又不得瞋甚掇內口中齧破而吐之既躋重位每以柔克為用謝奕性粗常忿述極言罵之述無所應面壁而已居半日奕去始復坐人以此稱之太和二年以年迫懸車上疏乞骸骨歸老邱園不許述竟不起三年卒時年六十六初桓溫平洛陽議欲遷都朝廷憂懼將遣侍中止之述曰溫欲以虛聲威朝廷非事實也但從之自無所至事果不行又議欲移洛陽鐘虡述曰永嘉不競暫都江左方當蕩平區宇旋軫舊京若其不耳宜改遷園陵不應先事鐘虞溫竟無以奪之追贈侍中驃騎將軍開府諡曰穆以避穆帝改曰簡子坦之嗣坦之字文度弱冠與郗超俱有重名時人為之語曰盛德絶倫郗嘉賔江東獨步王文度嘉賔超小字也僕射江虨領選將擬為尚書郎坦之聞曰自過江東來尚書郎正用第二人何得以此見擬虨遂止簡文帝為撫軍將軍辟為掾纍遷參軍從事中郎仍為司馬加散騎常侍出為大司馬桓溫長史尋以父憂去職服闋徵拜侍中襲父爵時卒士韓悵逃亡歸首云失牛故叛有司劾悵偷牛考掠服罪坦之以為悵束身自歸而法外加罪懈怠失牛事或可恕加之木石理有自誣宜附罪疑從輕之例遂以見原海西公廢領左衛將軍坦之有風格尤非時俗放蕩不敦儒教頗尚刑名學著廢莊論以闢之為當世所稱又領本州大中正簡文臨崩詔大司馬溫依周公居攝故事坦之自持詔入於帝前毁之帝曰天下儻來之運卿何所嫌坦之曰天下宣元之天下陛下何得專之帝乃使坦之改詔焉溫薨坦之與謝安共輔幼主遷尚書令領丹陽尹俄授都督徐兖青三州刺史鎮廣陵將之鎮表言僕射臣安都督臣沖人望具瞻社稷之臣且受遇先帝綢繆繾綣並志竭忠貞盡心盡力歸誠陛下以報先帝愚謂周旋舉動皆應咨此二臣然後情聽獲盡庶事可畢也表奏帝納之時謝安愛好聲律期功之慘不廢妓樂頗以成俗坦之非而苦諫之安遺坦之書曰知君思相愛惜之至僕所求者聲謂稱情義無所不可為復聊以自娛耳若潔軌迹崇世教非所擬議亦非所屑常謂君粗得鄙趣者猶未悟之濠上邪故知莫逆未易為人坦之答曰具君雅旨此是誠心而行獨往之美然恐非大雅中庸之謂意者以人之體韻猶器之方圓方圓不可錯用體韻豈可易處各順其方以𢎞其業則嵗寒之功必有成矣吾子少立德行體議淹允加以令地優遊自居僉曰之談咸以清逺相許至於此事實有疑焉公私二三莫見其可以此為濠上悟之者得無鮮乎且天下之寶故為天下所惜天下之所非何為不可以天下為心乎想君幸復三思書往反數四安竟不從坦之又嘗與殷康子書論公謙之議康子及袁宏並有疑難坦之摽章擲句一一申而釋之莫不厭服又孔嚴著通葛論坦之與書贊美之其好摽明賢勝多類此初坦之與沙門竺法師甚厚每共論幽明報應便要先死者當報其事後經年師忽來云貧道已死罪福皆不虛唯當勤修道德以升濟神明耳言訖不見坦之尋亦卒時年四十六臨終與謝安桓沖書言不及私唯憂國家之事朝野痛惜之追贈安北將軍諡曰獻坦之弟禕之字文邵少知名尚尋陽公主歷中書侍郎年未三十而卒贈散騎常侍坦之四子愷愈國寶沈愷字茂仁愈字茂和並少踐清階愷襲父爵愈稍遷驃騎司馬加輔國將軍愷太元末為侍中領右衛將軍多所獻替兄弟貴盛當時莫比及王恭等討國寶愷愈並請解職以與國寶異生又素不協故得免禍國寶既死出愷為吳郡內史愈為江州刺史都督豫州四郡輔國將軍假節未幾徵愷為丹陽尹及桓元等至江寧愷領兵守石頭俄而元等走復為吳郡病卒追贈太常愈至鎮未幾殷仲堪桓元楊佺期舉兵應王恭乘流奄至愈既無備惶遽奔臨川為元所得元盟於尋陽以愈置壇所愈甚耻之及事解除會稽內史元篡位以為尚書右僕射劉裕義旗建加前將軍愈既桓氏壻父子寵貴又嘗輕侮劉裕心不自安潛結司州刺史溫詳謀作亂事泄被誅子孫十餘人皆伏法國寶少無士操不修廉隅婦父謝安惡其傾側每抑而不用除尚書郎國寶以中興膏腴之族惟作吏部不為餘曹郎甚怨望固辭不拜從妹為會稽王道子妃由是與道子遊處遂間毁安焉及道子輔政以為祕書丞俄遷琅邪內史領堂邑太守加輔國將軍入補侍中遷中書令中領軍與道子專權扇動內外中書郎范寧國寶舅也儒雅方直疾其阿諛勸孝武帝黜之國寶乃使陳郡袁悅之因尼支妙音致書與太子母陳淑瑗説國寶忠謹宜見親信帝知之託以他罪殺悅之國寶大懼遂因道子譖毁寧寧由是出為豫章太守及弟忱卒國寶自表求解職迎母并奔忱喪詔特賜假而盤桓不時進發為御史中丞褚粲所奏國寶懼罪衣女子衣託為王家婢詣道子告其事道子言之於帝故得原後驃騎參軍王徽請國寶同宴國寶素驕貴使酒怒尚書左丞祖台之攘袂大呼以盤盞樂器擲台之台之不敢言復為粲所彈詔以國寶縱肆情性甚不可長台之懦弱非監司體並坐免官頃之復職愈驕蹇不遵法度起齊侔清暑殿帝惡其僭侈國寶懼遂諂媚於帝而頗疏道子道子大怒嘗於內省面責國寶以劍擲之舊好盡矣是時王雅亦有寵薦王珣於帝帝夜與國寶及雅宴帝微有酒令召珣將至國寶自知才出珣下恐至傾其寵因曰王珣當今名流不可以酒色見帝遂止而以國寶為忠將納國寶女為琅邪王妃未婚而帝崩安帝即位國寶復事道子進從祖弟緒為琅邪內史亦以邪佞見知道子復惑之倚為心腹並為時之所疾國寶遂參管朝權威震內外遷尚書左僕射領選加後將軍丹陽尹道子悉以東宫兵配之時王恭與殷仲堪並才器各居名藩惡道子國寶亂政屢有憂國之言道子等亦深忌憚之謀去其兵未及行而恭檄至以討國寶為名國寶惶遽不知所為緒説國寶令矯道子命召王珣車允殺之以除羣望因挾主相以討諸侯國寶許之珣允既至而不敢害反問計於珣珣勸國寶放兵權以迎恭國寶信之語在珣傳又問計於允允曰南北同舉而荆州未至若朝廷遣軍恭必城守昔桓公圍夀陽彌時乃尅若京城未拔而上流奄至君將何以待之國寶尤懼遂上疏解職詣闕待罪既而悔之詐稱詔復其本官欲收其兵拒王恭道子既不能拒諸侯欲委罪國寶乃遣譙王尚之收國寶付廷尉賜死并斬緒於市以謝王恭國寶貪縱聚斂不知紀極後房妓妾以百數天下珍玩充滿其室及王恭伏法詔追復國寶夲官元興初桓元得志表徙其家屬於交州國寶弟忱字元逹弱冠知名與王恭王珣俱流譽一時歷位驃騎長史嘗造其舅范寧與張元相遇寧使與元語元正坐斂袵待其有發忱不與之言元失望便去寧讓忱曰張元吳中之秀何不與語忱笑曰張祖希欲相識自可見詣寧謂曰卿風流俊望真後來之秀忱曰不有此舅焉有此甥既而寧使報元元束帶造之始為賔主太元中出為荆州刺史都督荆益寧三州軍事建武將軍假節忱自恃才氣放酒誕節慕王澄之為人又年少居方伯之任談者憂之及鎮荆州威風肅然殊得物和桓元時在江陵既其夲國且奕葉故義常以才雄駕物忱每裁抑元嘗詣忱通人未出乘輿直進忱對元鞭門幹元怒去之忱亦不留嘗朔日見客仗衛甚盛元言欲獵借數百人忱悉給之元憚而服焉性任逹不拘末年尤嗜酒一飲連月不醒或裸體而遊每歎三日不飲便覺形神不相親婦父嘗有慘忱乘醉弔之婦父慟哭忱與賔客十許人連臂被髮裸身而入繞之三匝而出其所行多類此數年卒官追贈右將軍諡曰穆愈子綏字彥猷少有美稱厚自矜遇實鄙而無行父愈為殷桓所捕綏未測存亡在都有憂色居處飲食每自貶降時人每謂為試守孝子桓元之為太尉綏以桓氏甥甚見寵待為太尉右長史及元篡遷中書令劉裕建義以為冠軍將軍其家夜中梁上無故有人頭墮於牀而血流滂沱俄拜荆州刺史假節坐父愈之謀與弟納並被誅初綏與王謐桓允齊名為後進之秀謐位官既極保身而終允以從坐誅聲稱猶全綏身死名論殆盡亦以薄行矜峭而尚人故也自昶父漢鴈門太守澤已有名稱忱又秀出綏亦著稱八葉繼軌軒冕莫與為比焉承族子嶠字開山祖默魏尚書父佑以才智稱為楊駿腹心駿之排汝南王亮退衛瓘皆佑之謀也位至北軍中侯嶠少有風尚并司二州交辟不就永嘉末擕其二弟避亂渡江時元帝鎮建鄴教曰王佑三息始名德之之胄並有操行宜蒙飾敘且可給錢三十萬布三百匹米五十斛親兵二十人尋以嶠參世子東中郎軍事不就愍帝徵拜著作郎右丞相南陽王保辟皆以道險不行元帝作相以為水曹屬除長山令遷太子中舍人以疾不拜王敦請為參軍爵九原縣公敦在石頭欲禁私伐蔡洲荻以問羣下時王師新敗士庶震懼莫敢異議嶠獨曰中原有菽庶民採之百姓不足君孰與足若禁人樵伐未知其可敦不悅敦將殺周顒戴若思嶠於坐諫曰濟濟多士文王以寧安可戮諸名士以自全敦大怒欲斬嶠賴謝鯤以免敦猶銜之黜為領軍長史敦平後除中書侍郎兼大著作固辭轉越騎校尉頻遷吏部郎御史中丞祕書監領本州大中正咸和初朝議欲以嶠為丹陽尹嶠以京尹望重不宜以疾居之求補廬陵郡乃拜嶠廬陵太守以嶠家貧無以上道賜帛百匹錢十萬尋卒官諡曰穆子淡嗣歷位右衛將軍侍中中護軍尚書廣州刺史淡子度世驍騎將軍袁悅之者字元禮陳郡陽夏人也父朗給事中悅之能長短説甚有精理始為謝元參軍為元所遇丁憂去職服闋還都止齎戰國䇿言天下要惟此書後甚為會稽王道子所親愛每勸道子專攬朝權道子頗納其説俄而見誅祖台之者字元辰范陽人也官至侍中光祿大夫撰志怪書行於世荀嵩字景猷潁川臨潁人魏太尉彧之元孫也父頵羽林右監安陵鄉侯與王濟何劭為拜親之友嵩志操清純雅好文學齠齔時族曾祖顗見而竒之以為必興頵門弱冠太原王濟甚相器重以方其外祖陳郡袁侃謂侃弟奧曰向見荀監於清虛名理當不及父德性純粹是賢兄輩人也其為名流所賞如此泰始中詔以嵩代兄襲爵補濮陽王允文學與王敦顧榮陸機等友善趙王倫引為相國參軍倫篡轉護軍司馬給事中稍遷尚書吏部郎太弟中庶子纍遷侍中中護軍王彌入洛嵩與百官奔於密未至而母亡賊追將及同旅散走嵩被髮從車守喪號泣賊棄其母尸於地奪車而去嵩被四創氣絶至夜方蘇葬母於密山服闋族父藩承制以嵩監江北軍事南中郎將後將軍假節襄城太守時山陵發掘嵩遣主簿石覽將兵入洛修復山陵以勳進爵舞陽縣公遷都督荆州江北諸軍事平南將軍鎮宛改封曲陵公為賊杜曾所圍石覽時為襄城太守嵩力弱食盡使其小女灌求救於覽及南中郎將周訪訪即遣子撫率兵三千人會石覽俱救嵩賊聞兵至散走嵩既得免乃遣南陽中部尉王國劉願等潛軍襲穰縣獲曾從兄偽新野太守保斬之元帝踐阼徵拜尚書僕射使嵩與刁協共定中興朝儀從弟馗早亡二息序廞年各數嵗嵩迎與共居恩同其子太尉臨淮公荀顗國允廢絶朝廷以嵩屬近欲以嵩子襲封嵩哀序孤微乃讓封與序論者稱焉轉太常時方修學校簡省博士置周易王氏尚書鄭氏古文尚書孔氏毛詩鄭氏周官禮記鄭氏春秋左傳杜氏服氏論語孝經鄭氏博士各一人凡九人其儀禮公羊榖梁及鄭易皆省不置嵩以為不可乃上疏請增置四人會王敦之難不行敦表以嵩為尚書左僕射及帝崩羣臣議廟號王敦遣使謂曰豺狼當路梓宫未反祖宗之號宜别思詳嵩議以為禮祖有功宗有德元皇帝天縱聖哲光啓中興德澤侔於太戊功惠邁於漠宣臣敢依前典上號曰中宗既而與敦書曰承以長蛇未翦别詳祖宗先帝應天受命以隆中興中興之主寧可隨世數而遷毁敢率丹直詢之朝野上號中宗卜日有期不及重請專輒之愆所不敢辭初敦待嵩甚厚欲以為司空於此銜之而止太寧初加散騎常侍後領太子太傅以平王敦功更封平樂伯坐使威儀為猛虎所食免職後拜金紫光祿大夫録尚書事散騎常侍如故遷右光祿大夫開府儀同三司録尚書如故又領祕書監給親兵百二十人年雖衰老而孜孜典籍世以此嘉之蘇峻之役嵩與王導陸曄共登御牀擁衛帝及帝被逼幸石頭嵩亦侍從不離帝側賊平帝幸溫嶠舟嵩年老病篤猶力步而從咸和三年薨時年六十七贈侍中諡曰敬其後著作郎虞預與丞相王導箋請增嵩寵秩不從升平四年嵩改葬詔賜錢百萬布五千匹有二子㽔羡㽔嗣㽔字令逺起家祕書郎稍遷尚書左丞㽔有儀操風望雅為簡文帝所重時桓溫平蜀朝廷欲以豫章郡封溫㽔言於帝曰若溫復假王威北平河洛則何以加此於是乃止轉散騎常侍少府不拜出補東陽太守除建威將軍吳國內史卒官子籍嗣位至散騎常侍大長秋羡字令則清和有凖才年七嵗遇蘇之難隨父在石頭峻甚愛之恆置膝上羡隂白其母曰得一利刀子足以殺賊母掩其口曰無妄言年十五將尚尋陽公主羡不欲連婚帝室乃逺遁去監司追不獲已乃出尚主拜駙馬都尉弱冠與琅邪王洽齊名沛國劉惔太原王濛陳郡殷浩並與交好驃騎將軍何充出鎮京口請為參軍穆帝又以為撫軍參軍徵補太常博士皆不就後拜祕書丞義興太守征北將軍褚裒以為長史既到裒謂佐史曰苟生資逸羣之氣將有沖天之舉諸君宜善事之尋遷建威將軍吳國內史除北中郎將徐州刺史監徐兖二州揚州之晉陵諸軍事假節殷浩以羡在事有能名故居以重任時年二十八中興方伯未有如羡之少者羡至鎮發二州兵使參軍鄭襲戍淮隂羡尋北鎮淮隂屯田於東陽之石鱉尋加監青州諸軍事又領兖州刺史鎮下邳羡自鎮來朝時蔡謨固讓司徒不起中軍將軍殷浩欲加大辟以問於羡羡曰蔡公今日事危明日必有桓文之舉浩乃止及慕容俊攻假蘭於青州詔使羡救之俊將王騰趙盤寇琅邪鄄城北方騷動羡討之擒騰盤迸走軍次琅邪而蘭已沒羡退還下邳留將軍諸葛攸髙平太守劉莊等三千人守琅邪參軍戴逯蕭轄二千人守泰山是時慕容蘭以數萬屯汴城甚為邊害羡自光水引汶通渠至於東阿以征之臨陳斬蘭帝將封之羡固辭不受先是石虎死胡中大亂羡撫納降附甚得衆心以疾篤解職後除右軍將軍加散騎常侍讓不拜升平二年卒時年三十八帝聞之歎曰荀令則王敬和相繼凋落股肱腹心將復誰寄乎追贈驃騎將軍范汪字元平雍州刺史晷之孫也父稚早卒汪少孤貧六嵗過江依外家新野庾氏荆州刺史王澄見而竒之曰興范族者必是子也年十三喪母居喪盡禮親鄰哀之及長好學外氏家貧無以資給汪乃廬於園中布衣蔬食燃薪寫書寫畢讀誦亦遍遂博學多通善談名理弱冠至京師屬蘇峻作亂王師敗績汪乃逃遁西歸庾亮溫嶠屯兵尋陽時行李斷絶莫知峻之虛實咸恐賊強未敢進及汪至嶠等訪之汪曰賊政令不一貪暴縱橫滅亡已兆雖強易弱朝廷有倒懸之急宜時進討嶠深納之是日護軍平南二府禮命交至始解褐參護軍軍事賊平賜爵都鄉侯復為庾亮平西參軍從討郭默進爵亭侯辟司空郗鑒掾除宛陵令復參亮征西軍事轉州别駕汪為亮佐吏十有餘年甚相欽重轉鷹揚將軍安逺護軍武陵內史徵拜尚書侍郎時庾翼將悉郢漢之衆以事中原軍次安陸尋轉屯襄陽汪上疏以賊雖衰弊然得臣猶在連兵不解患難將起國家宜以萬全至安為計宜且嚴詔喻翼還鎮養鋭以為後圖尋而驃騎將軍何充輔政請為長史桓溫代翼為荆州復以汪為安西長史溫西征蜀委以留府蜀平進爵武興縣侯而溫頻請為長史江州刺史皆不就自請還京求為東陽太守溫甚恨焉在郡大興學校甚有惠政頃之召入頻遷中領軍夲州大中正時簡文帝作相甚相親昵除都督徐兖青冀四州揚州之晉陵諸軍事安北將軍徐兖二州刺史既而桓溫北伐令汪率文武出梁國以失期免為庶人朝廷憚溫不敢執談者為之歎恨汪屏居吳郡從容講肄不言枉直後至姑熟見溫溫時方起屈滯以傾朝廷謂汪逺來詣已傾身引望謂袁宏曰范公來可作太常邪汪既至才坐溫謝其逺來意汪實來造溫恐以趨時致損乃曰亡兒瘞此故來視之溫殊失望而止時年六十五卒於家贈散騎常侍諡曰穆長子康嗣早卒康弟寧最知名寧字武子少篤學多所覽通簡文作相將辟之為桓溫所諷遂寢不行終溫之世兄弟無在列位者時以虛浮相扇儒學日替寧以為其源始於王弼何宴二人之罪深於桀紂乃著論以闢之溫薨後始解褐為餘杭令在縣興學校養生徒潔已修禮志行之士莫不宗之期年之後風化大行自中興已來崇學敦教未有如寧者也在職六年遷臨淮太守封陽遂鄉侯頃之徵拜中書侍郎在職多所獻替有益政道時更營新廟博求辟雍明堂之制寧據經傳奏上皆有典證孝武帝雅好文學甚被親愛朝廷疑議輒咨訪之寧指斥朝士直言無諱王國寶寧之甥也以諂媚事會稽王道子懼為寧所不容乃相驅扇因被疏隔求補豫章太守或為筮之不吉帝曰豫章不宜太守何急以身試死邪寧不信卜占固請行臨發上疏陳時政得失帝善之寧之出非帝意故所啓多合旨在郡又大設庠序遣人往交州採磬石以供學用改革舊制不拘常慮逺近至者千餘人資給衆費一出私祿并取郡四姓子弟皆充學生課讀五經又起學臺功用彌廣江州刺史王凝之上言曰豫章郡居此州之半太守臣寧入參機省出宰名郡而肆其奢濁所為狼籍郡城先有六門寧悉改作重樓復更開二門舍前為八私立下舍七所臣伏尋宗廟之設各有品秩而寧自置家廟又下十五縣皆使左宗廟右社稷凖之太廟皆資人力又奪人居宅功夫萬計寧若以古制宜崇自當列上而敢專輒惟在任心州既聞知即苻從事制不復聽而寧嚴威屬縣惟令速立願出臣表下太常議之禮典詔曰漢宣云可與共治天下者良二千石也若范寧果如凝之所表者豈可復宰郡乎以此抵罪子泰時為天門太守棄官稱訴帝以寧所務惟學事久不判會赦免初寧嘗患目痛就中書侍郎張湛求方湛因嘲之曰古方宋陽里子少得其術以授魯東門伯魯東門伯以授左邱明遂世世相傳及漢杜子夏鄭康成魏髙堂隆晉左太沖凡此諸賢並有目疾得此方云用損讀書一減思慮二專內視三簡外觀四旦晚起五夜早眠六凡六物熬以神火下以氣篩藴於胸中七日然後納諸方寸修之一時近能數其目睫逺視尺捶之餘長服不已洞見墻壁之外非但明目乃亦延年寧既免官家於丹陽猶勤經學終年不輟年六十三卒於家初寧以春秋榖梁氏未有善釋遂沉思積年為之集解其義精審為世所重既而徐邈復為之注世亦稱之子泰元熙中為護軍將軍汪叔堅字子常博學善屬文永嘉中避亂江東拜佐著作郎撫軍參軍討蘇峻賜爵都亭侯纍遷尚書右丞時廷尉奏殿中帳吏卲廣盜官幔三張合布三十匹有司正刑棄市廣二子宗年十三雲年十一黃幡撾登聞鼓乞恩辭求自沒為奚官奴以贖父命尚書郎朱映議以為天下之人父無子者少一事遂行便成永制懼死罪之刑於此而弛堅亦同映議時議者以廣為鉗徒二兒沒入既足以懲艾使百姓知父子之道聖朝有垂恩之仁可特聽減廣死罪為五嵗刑宗等付奚官為奴而不為永制堅駮之曰自淳朴澆散刑辟仍作刑之所以止刑殺之所以止殺雖時有赦過宥罪議獄緩死未有行小不忍而輕易典刑者也且既許宗等宥廣以死若復有宗比而不求贖父者豈得不擯絶人倫同之禽獸邪按主者今奏云惟特聽宗等而不為永制臣以為王者之作動關盛衰嚬笑之間尚愼所加况於國典可以徒虧今之所以宥廣正以宗等耳人之愛父誰不如宗今既居然許宗之請將來訴者何獨匪民特聽之意未見其益不以為例交興怨讟此為施一恩於今而開萬怨於後也成帝從之正廣死刑後遷護軍長史卒官子啓字榮期雖經學不及堅而以才義顯於當世於時清談之士庾和韓伯袁宏等並相知友為祕書郎纍居顯職終於黃門侍郎父子並有文筆傳於世劉惔字真長沛國相人也祖宏字終嘏光祿勳宏兄粹字純嘏侍中弟潢字仲嘏吏部尚書皆有名中朝時人語曰洛中雅雅有三嘏父耽晉陵太守亦知名惔少清逺有標竒與母任氏寓居京口織芒屩以為養雖蓽門陋巷晏如也人未之識唯王導深器之後稍知名論者比之袁羊惔喜還告其母其母聰明婦人也謂之曰此非汝比勿受之又有方之范汪者惔復喜母又不聽及惔年德轉升論者遂比之荀粲尚明帝女廬陵公主以惔雅善言理簡文帝初作相與王濛並為談客俱蒙上賔禮時孫盛作易象妙於見形論帝使殷浩難之不能屈帝曰使真長來故應有以制之乃命迎惔盛素敬服惔及至便與抗答辭甚簡至盛理遂屈一座撫掌大笑咸稱美之纍遷丹陽尹為政清整門無雜賔時百姓頗有訟官長者諸郡往往有相舉正惔歎曰夫居下訕上此弊道也古之善政司契而已豈不以其敦夲正源鎮靜流末乎君雖不君下安可以失禮若此風不革百姓將往而不反遂寢而不問性簡貴與王羲之雅相友善郗愔有傖奴善知文章羲之愛之每稱奴於惔惔問何如方回邪羲之曰小人耳何得比郗公惔曰若不如方回故常奴耳桓溫嘗問惔會稽王談更進邪惔曰極進然故第三流耳溫曰第一復誰惔曰故在我輩其髙自標置如此惔每奇溫才而知其有不臣之迹及溫為荆州惔言於帝曰溫不可使居形勝地其位號常宜抑之勸帝自鎮上流而已為軍司帝不納又請自行復不聽及溫伐蜀時咸謂未易可制唯惔以為必克或問其故云以蒱博驗之其不必得則不為也恐溫終專制朝廷及後竟如其言嘗薦吳郡張憑憑卒為美士衆以此服其知人也尤好老莊任自然趣疾篤百姓欲為之祈禱家人又請祭神惔曰丘之禱久矣遂卒官年三十六孫綽為之誄曰居官無官官之事處事無事事之心時人以為名言後綽嘗詣褚裒言及惔流涕曰可謂人之云亡邦國殄瘁裒大怒曰真長生平何嘗相比數而卿今日作此靣向人邪其為名流所敬重如此張憑字長宗祖鎮蒼太守憑年數嵗鎮謂其父曰我不如汝有佳兒憑曰阿翁詎宜以子戲父邪及長有志氣為鄉閭所稱舉孝亷負其才自謂必參時彥初欲詣劉惔鄉里及同舉者共笑之既至惔處之下座神意不接憑欲自發而無端會王濛就惔清言有所不通憑於末座判之言旨深逺足暢彼我之懷一座皆驚惔延之上座清言彌日留宿至旦遣之憑既還船須臾惔遣傳教覔張孝廉船便召與同載遂言之於簡文帝帝召與語歎曰張憑勃窣為理窟官至吏部郎御史中丞韓伯字康伯潁川長社人也母殷氏髙明有行家貧窶伯年數嵗至大寒母方為作襦令伯捉尉斗而謂之曰且著𥜗尋當作復袴伯曰不復須母問其故對曰火在斗中而柄尚熱今既著襦下亦當暖母甚異之及長清和有思理留心文藝舅殷浩稱之曰康伯能自標置居然是出羣之器潁川庾和名重一時少所推服常稱伯及王坦之曰思理倫和我敬韓康伯志力強正吾愧王文度自此以還吾皆百之矣舉秀才徵佐著作郎並不就簡文帝居藩引為談客自司徒左西屬轉撫軍掾中書郎散騎常侍豫章太守入為侍中陳郡周協為謝安主簿居喪廢禮時崇尚莊老脫落名教伯領中正不通協議曰拜下之敬猶違衆從禮情理之極不宜以多比為通時人憚焉識者謂伯可謂澄世所不能澄而裁世所不能裁者矣與夫容已順衆者豈得同時而共稱焉王坦之又常著公謙論袁宏作論以難之伯覽而美其辭旨以為是非既辨誰與正之遂作辨謙以折中之轉丹陽尹吏部尚書領軍將軍既疾病占候者云不宜此官朝廷改授太常未拜卒時年四十九即贈太常子璯官至衡陽太守通志卷一百二十七
