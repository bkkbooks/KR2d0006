body:
  text: 通志卷一百三十八宋右迪功郎鄭樵漁仲撰列傳第五十一齊劉悛弟繪瑱繪弟崔祖思叔父景真宗景真子元祖祖思人文仲荀伯玉蘇侃虞悰胡諧之范百年虞玩之劉休江祏劉暄蕭惠基弟惠休惠朗張岱兄子緒江謐謝超宗謝朓謝皓弟草瀹到撝沈憲沈沖張融融弟寶稱王秀之從父弟延之子阮韜秀延之子綸之綸之昕之子峻王瞻從叔元載房元載弟元邈叔安袁彖宗人廓之劉祥陸澄王諶從叔摛蕩何憲孔劉瓛蔡仲熊弟婁幼瑜瓛璡陸慧曉兄子間間子絳厥絳弟王斌孔稚圭父靈産周顒庾杲之江斆何戢從叔昌宇蔡約裴昭眀顧憲之孔琇之王逡之劉悛字士操彭城安上里人也彭城劉同出楚元王分為三里以别宋氏帝族悛父勔宋鎮軍將軍自有傳悛少隨父征竟陵王於廣陵以功拜駙馬都尉後為桂陽王征北中兵參軍與武帝同直殿內深相欵好並為宋眀帝所親待悛夲名忱宋眀帝多忌反語劉忱為臨讐改名悛焉武帝常至悛宅晝臥覺悛自捧金澡罐受四升水以沃盥因以與帝前後所納稱此後遷安逺護軍武陵內史郡南古江隄久廢悛修未畢而江水忽至百姓棄役奔走悛親率厲之於是乃立漢夀人邵榮興六世同爨悛表其門閭悛強濟有世調善於流俗蠻王田僮在山中年垂百餘嵗南譙王義宣為荆州僮出謁至是又謁悛眀帝崩表求奔赴敕帶郡還都吏民送者數千萬人悛人人執手繼以涕泣百姓感之贈送甚厚桂陽之難加寧朔將軍助守石頭父勔於大航戰死悛時遇疾扶伏路次號哭求勔尸勔尸頂後傷缺悛割髮補之持喪墓側冬月不衣絮髙帝代勔為領軍素與勔善以書譬悛殷勤抑勉建平王景素反高帝總衆軍出頓元武湖悛初免喪高帝召悛及其弟愃入省欲使領支軍及見皆羸削改貌於是而止霸業初建悛先致誠節沈攸之事起加輔國將軍後為廣州刺史襲爵鄱陽縣侯武帝自尋陽還遇悛於舟渚歡宴敘舊停十餘日乃下遣文惠太子及竟陵王子良攝衣履修父友之敬齊受禪國除平西記室參軍夏侯恭叔上書以栁元景中興功臣劉勔殞身王事宜存封爵詔以興運隆替不容復厝意也初蒼梧廢髙帝集議中華門見悛謂曰君昨直邪悛曰僕昨正直而言急在外至是上謂悛曰功名之際人所不忘卿昔於中華門答我何其欲謝世事悛曰臣世受宋恩門荷齊眷非常之勳非臣所及進不逺怨前代退不孤負聖眀敢不以實迎答遷太子中庶子領越騎校尉時武帝在東宫每幸悛坊間言至夕賜屏風帷帳武帝即位改領軍將軍後拜司州刺史悛父勔討殷琰平夀陽無所犯害百姓德之為立碑記悛步道從夀陽之鎮過勔碑下再拜泣涕悛於州治下立學校得古禮器銅罍甑豳山銅罍樽銅豆鐘各二口獻之遷長兼侍中車駕數幸悛宅宅盛修山池造甕牖武帝著鹿皮冠披悛菟皮衾於牖中宴樂以冠賜悛至夜乃去後從駕登蔣山帝數歎曰貧賤之交不可忘糟粳之妻不下堂顧謂悛曰此况卿也世言富貴好改其素情吾雖有四海今日與卿盡布衣之適悛起拜謝纍遷始興王前軍長史平蠻校尉蜀郡太守行益州府州事初高帝輔政有意欲鑄錢以禪讓之際未及施行建元四年奉朝請孔顗上鑄錢均貨議辭證甚博其略以為食貨相通理勢自然李悝曰糴甚貴傷人甚賤傷農人傷則離散農傷則國貧甚賤與甚貴其傷一也三吳國之關奧比嵗時被水潦而糴不貴是天下錢少非穀穰賤此不可不察也鑄錢之弊在輕重屢變重錢患難用而難用為纍輕輕錢弊盜鑄而盜鑄為禍深人所盜鑄嚴法不禁者由上鑄錢惜銅愛工也惜銅愛工謂錢無用之器以通交易務欲令輕而數多使省工而易成不詳慮其為患也自漢鑄五銖錢至宋文帝歷五百餘年制度世有廢興而不變五銖錢者眀其輕重可法得貨之宜以為開置泉府方牧貢金大興鎔鑄錢重五銖一依漢法若官鑄已布於人使嚴斷剪鑿輕小破缺無周郭者悉不得行官錢細小者稱合銖兩銷以為大利貧良之人塞姦巧之路錢貨既均逺近若一百姓樂業市道無爭衣食滋殖矣時議者多以錢貨輕轉少宜更廣鑄重其銖兩以防人姦髙帝使諸州郡大市銅炭會晏駕事寢永眀八年悛啓武帝曰南廣郡界蒙山下有城名蒙城可二頃地有燒爐四所髙一丈廣一丈五尺從蒙城渡水南百許步平地掘土深二尺得銅又有古掘銅坑深二丈并居宅處猶存鄧通南安人漢文帝賜通嚴道縣銅山鑄錢今蒙山近在青衣水南青衣左側並是故秦之嚴道地青衣縣文帝改名漢嘉且蒙山去南安二百里案此必是通所鑄處近喚蒙山獠出云甚可經略此議若立潤利無極并獻蒙山銅一片又銅石一片平州鑄鐵刀一口上從之遣使入蜀鑄錢得千餘萬工費多乃止悛仍代始興王鑑為益州刺史監益寧二州諸軍事悛既籍舊恩尤能文附人主承迎權貴賔客閨房供費奢廣罷廣司二州傾資貢獻家無留儲在蜀作金浴盆餘金物稱是罷任以夲號還都欲獻之而武帝晏駕鬱林新立悛奉獻減少鬱林知之諷有司收悛付廷尉將加誅戮眀帝啓救之見原禁錮終身雖見廢黜而賔客曰至海陵即位以白衣除兼左户尚書尋除正眀帝立加領驍騎將軍復故官駙馬都尉悛歷朝皆見恩遇高帝為鄱陽王鏘納悛妹為妃眀帝又為晉安王寶義納悛女為妃自此連姻帝室王敬則反悛出守琅邪城轉五兵尚書初宋桂陽王休範舉兵犯闕悛父勔領兵鎮扞石頭兵敗死之悛兄弟以父死朱雀航終身不行此路眀帝崩東昏即位改授散騎常侍領驍騎將軍尚書如故衛送山陵路經朱雀航感慚至曲阿而卒贈太常常侍都尉如故諡曰敬子三子孺覽遵俱知名悛弟愃位太子中庶子子苞與孺覽遵皆列在梁史愃弟繪字士章解褐著作佐郎為髙帝行參軍帝見而歎之曰劉公為不亡也及豫章王嶷鎮江陵以繪為鎮西外兵參軍繪聰警有文義善隸書數被賞召進對華敏僚吏之中見遇莫及時琅邪王鋼為功曹以吏能自進嶷謂僚佐曰吾雖不能得應嗣陳蕃然閣下自有二驥也性通悟出為南康相郡人有姓賴者所居名穢里刺謁繪繪戲嘲之曰君有何穢而居穢里此人應聲曰未審孔丘何闕而居闕里繪默然不答亦無忤意歎其辨速繪在郡專意講説上左右陳洪請假南還問繪在郡何似既而聞之曰南康是三州喉舌應須治幹豈可以年少講學處之邪召為中書郎掌詔誥敕助國子祭酒何允撰修禮儀永眀末都下人士盛為文章談議皆湊竟陵王西邸繪為後進領袖機悟多能時張融以言辭辨捷周顒彌為清綺而繪音采不贍麗雅有風則時人為之語曰三人共宅夾清漳張南周北劉中央言其處二人間也魚復侯子響誅後豫章王嶷欲求葬之召繪為表言其事繪求紙筆須臾便成嶷歎曰禰衡何以過此唯足八字云提攜鞠飬甫見成人後魏使至繪以辭辨被敕接使事畢當撰語辭繪謂人曰無論潤色未易但得我語亦難矣事兄悛恭謹與語呼為使君隆昌中悛坐事將見誅繪伏闕請代兄死眀帝輔政救解之乃免死引為録事筆翰眀帝即位為太子中庶子安陸王寶晊為湘州以繪為冠軍長史長沙內史行湘州事寶晊妃悛女也寶晊愛其侍婢繪奪取具以啓聞寶晊以為恨與繪不協遭母喪去官有至性服闋為晉安王征北長史南東海太守行南徐州事及梁武起兵以繪為雍州刺史固讓不就衆以朝廷昏亂為之寒心繪終不受乃改用張欣泰轉繪建安王車騎長史行府國事及東昏見殺城內遣繪及國子博士范雲等齎其首詣梁武帝於石頭轉大司馬從事中郎卒子孝綽梁史有傳繪弟瑱字士溫少有行業文藻篆隸丹青並為當世所稱時有滎陽毛惠逺善畫馬瑱善畫婦人並為當世第一瑱妹為鄱陽王妃伉儷甚篤王為眀帝所誅妃追傷遂成痼疾醫所不療有陳郡殷蒨善寫人面與真不别瑱令蒨畫王形像并圗王平生所寵姬共照鏡狀如欲偶寢瑱乃密使媪嬭示妃妃視畫竟仍唾之因罵云故宜其早死於是恩情即歇病亦除差此姬亦被廢苦因即以此畫焚之瑱仕歷尚書吏部郎義興太守先繪卒崔祖思字敬元清河東武城人魏中尉琰七世孫也祖諲宋冀州刺史父僧護州秀才祖思少有志氣好讀書史年一十八為都昌令隨青州刺史垣護之入堯廟廟有蘇侯神偶坐護之曰唐堯聖人而與蘇侯神為列今欲正之何如祖思曰蘇峻今日便為四凶之五使君若清此坐則是堯廟重去四凶也由是諸雜神並除髙帝在淮隂祖思聞風自結為上輔國主簿甚見親待參預謀議宋朝初議封高帝為梁公祖思啓曰讖云金刀利刃齊刈之今宜稱齊實應天命髙帝從之自相國從事中郎遷齊內史髙帝既為齊王置酒為樂羮膾既至祖思曰此味故為南北所推侍中沈文季曰羮膾吳食非祖思所解祖思曰炮鱉膾鯉似非勾吳之詩文季曰千里蓴羮豈關魯衛帝甚恱曰蓴羮故應還沈髙帝輔政衆議將加九錫內外皆贊成之祖思獨曰公以仁恕匡社稷執股肱之義君子愛人以德不宜如此帝聞之曰祖思還同荀令豈孤所望也由此不復處任職之官而禮見甚重垣崇祖受密旨參訪朝臣光祿大夫垣閎曰身受宋氏厚恩復蒙眀公接眷進不敢同退不敢異祖思又曰公退讓誠節故宜受之以禮次問冠軍將軍崔文仲文仲問崇祖曰卿意云何對曰聖人云知幾其神又云見幾而作文仲撫髀曰政與吾意同崇祖具説之及帝受禪閎存故爵文仲崇祖皆封侯祖思加官而已除給事中黃門侍郎武帝即位祖思啓陳政事以自古開物成務必以教學為先宜於太廟之南𢎞修文序司農以北廣開武校又曰漢文集上書囊以為殿帷劉備取帳構銅鑄錢以充國用魏武遣女皂帳婢十人東阿婦以繡衣賜死王景興以折米見誚宋武節儉過人張妃房唯碧綃紋幬三齊苮席五盞盤桃花米飯殷文仲勸令畜伎答云我不解聲仲文曰但畜自解又答曰畏解故不畜歷觀帝王未嘗不以約素興侈麗亡也伏惟陛下體唐成儉踵虞為朴寢殿則素木卑構膳器則陶瓢充御瓊簮玉笏碎以為塵珍裘繡服焚之如草宜察朝士有柴車蓬館髙以殊等馳禽荒色長違清編如此則調風變俗不俟終日又曰憲律之重由來尚矣實宜清置廷尉茂簡三官漢來習律有家子孫並傳其業今廷尉律生乃令史門户刑之不厝抑此之由又曰案前漢編户千萬太樂伶官才八百二十九人孔光等奏罷不合經法者四百四十一人正樂定員唯置三百八十八人而編户千萬今户口不能百萬而大樂雅鄭元徽時校試千有餘人後堂雜伎不在其數糜費既多又傷敗風俗今欲撥邪聲歸正道莫如罷雜伎王庭唯置鐘簴羽戚登歌而已上詔報答後為青冀二州刺史在政清簡而謙卑下士言議未嘗及時事上更以敬重之未幾卒上深加歎息祖思叔父景真位昌平太守有惠政嘗懸一蒲鞭而未嘗用去任之日人士思之為立祠子元祖有學行好屬文仕至射聲校尉武帝取為延昌主帥從駕至何美人墓上為悼亡詩特詔元祖使和稱以為善永眀九年魏使李道固及蔣少遊至元祖言少遊臣甥有班倕之工今來必令模寫宫掖未可令反上不從少遊果圖畫而歸元祖歷位驍騎將軍出為東海太守上每思之時節常賜手敕賞賜有加時青州刺史張沖啓淮北頻嵗不熟今秋始稔此境鄰接戌冦彌須沃實乞權斷販過淮南而徐兖豫司諸州又各斷穀米不聽出境自是江北荒儉有流亡之弊元祖乃上書謂宜豐儉均之書奏見從祖思宗人文仲立徐州刺史封建陽縣子在政為百姓所懷除黃門侍郎領越騎校尉徙封隨縣嘗獻髙帝纒鬚繩一枚上納受之後卒於汝隂太守贈徐州刺史諡襄子荀伯玉字弄璋廣陵人也祖永南譙太守父闡之給事中伯玉仕宋為晉安王子勛鎮軍行參軍泰始初隨子勛舉事及事敗還都賣卜自業髙帝鎮淮隂伯玉為髙帝冠軍刑獄參軍髙帝為宋眀帝所疑被徴為黃門郎深懷憂慮見平澤有羣鶴仍命筆詠之曰八風儛遙翮九野弄清音一摧雲間翅為君苑中禽以示伯玉深旨伯玉勸髙帝命數十騎入魏界安置標榜魏果遣遊騎數百履行界上髙帝以聞猶懼不得留令伯玉占伯玉言不成行而帝卒復夲任由是見親待髙帝有故吏東莞竺景秀嘗以過繫作部髙帝謂伯玉曰卿比看景秀不答曰數往候之備加責誚云若許某自新當吞刀刮腸飲灰洗胃帝善其答即釋之卒為忠信士後隨髙帝還都除奉朝請髙帝使主家事武帝罷廣興還立别宅遣人於大宅掘樹數株伯玉不與馳以聞髙帝善之髙帝為南兖州伯玉從轉鎮軍中兵參軍帶廣陵令初髙帝在淮隂伯玉假還廣陵夢上廣陵城南樓上有二青衣小兒語伯玉云草下肅九五相追逐伯玉視城下人頭皆有草泰始七年又夢髙帝乘船在廣陵北渚兩腋下有翅不舒伯玉問何時當舒帝曰却後三年伯玉夢中自謂是呪師凡六唾呪之有六龍出兩腋下翅皆舒還復斂元徽二年而髙帝破桂陽威名大震五年而廢蒼梧謂伯玉曰卿夢今且效矣升眀初仍為髙帝驃騎中兵參軍帶濟陽太守霸業既建伯玉忠勤盡心常衛左右加前將軍大見委任建元元年封南豐縣子為豫章王司空咨議太守如故時武帝在東宫自以年長與髙帝同創大業朝事大小悉皆專斷多違制度左右張景真偏見任遇又多僣侈武帝拜陵還景真白服乘畫舴艋坐胡床觀者咸疑是太子內外祇畏莫敢有言者驍騎將軍陳允叔先已陳景真及太子前後得失伯玉因武帝拜陵之後密啓之上大怒豫章王嶷素有寵政以武帝長嫡又南郡王兄弟並列故武帝為太子至是有改立之意武帝東還髙帝遣文惠太子聞喜公子良宣敕詰責并示以景真罪狀使以太子令收景真殺之允叔因白武帝皆言伯玉以聞武帝憂懼稱疾月餘日上怒不解晝臥太陽殿王敬則直入叩頭啓請往東宫以慰太子高帝無言敬則因大聲宣旨往東宫命裝束又敕太官設饌密遣人報武帝令奉迎因呼左右索輿髙帝了無動意敬則索衣以衣髙帝仍牽上輿遂幸東宫召諸王晏飲因遊元圃園長沙王晃捉華蓋臨川王映執雉尾扇聞喜公子良持酒鎗南郡王行酒武帝與豫章王嶷及敬則自捧肴饌髙帝大飲賜武帝以下酒並大醉盡歡日暮乃去是日微敬則則東宫殆廢髙帝重伯玉盡心愈見信任使掌軍國密事權動朝右每暫休出外軒蓋填門嘗遭母憂成服日左率蕭景先侍中王晏共載弔之五更便巾車未到伯玉宅二里許王侯朝士已盈巷至下鼓尚未得前司徒禇淵衛軍王儉俱進繼後方得前又倚聽事久之中詔遣中書舍人徐希秀斷哭止客久方得弔比出二人飢之氣息惙然切齒形於聲貌眀日入宫便言云臣等所見二宫門及齋閣方荀伯玉宅政可設雀羅也續復言外論云千敕萬令不如荀公一命武帝深怨伯玉髙帝臨崩指伯玉以屬武帝武帝即位伯玉憂懼上聞之以其與垣崇祖善崇祖田業在江西慮相扇為亂加意撫之伯玉乃安永眀元年與崇祖並見誣伏誅而允叔為太子左率吕文顯歎曰伯玉能謀太祖而不能自謀豈非天哉初伯玉微時有善相墓者謂其父曰君墓當出暴貴者但不得久耳又出失行女子伯玉聞之曰朝聞道夕死可矣頃之伯玉姊當嫁眀日應行今夕逃隨人去其家尋求不能得後出家為尼伯玉卒致敗亡云蘇侃字休烈武邑人也祖護夲都太守父端州中從事侃涉獵書傳出身補良城令薛安都反引侃為其府參軍使掌書記侃自拔南歸髙帝在淮上便自委結帝用為冠軍録事參軍是時新失淮北髙帝北戍鎮淮隂不滿千人每嵗秋冬間邊淮騷動常恐虜至帝乃作塞客吟以喻志侃逹上之旨更自勤厲遂見委以府事深被知待桂陽之難帝以侃為平南録事領軍主從頓新亭使分金銀賦賜將士帝每遷隨府轉復為帝太尉咨議侃事帝既久備悉起居乃與邱巨源撰蕭太尉記載帝征伐之功封新建縣侯齊臺建為黃門侍郎領射聲校尉任以心膂帝即位撰聖皇瑞命記一卷奏之建元元年卒上惜之甚至諡質侯虞悰字景豫會稽餘姚人也祖嘯父晉左户尚書父秀之黃門郎悰少以孝聞父病不欲見人雖子弟亦不得前時悰年十二三晝夜伏户外問內豎消息問未知轉嗚咽流涕如此者百餘日及亡終喪日唯食麥粄二枚仕宋位黃門郎宋眀帝誅山陽王休祐至葬日寒雪厚三尺故人無至者唯悰一人來赴初武帝始從宦家貧薄悰數相分遺每行必呼帝同載帝甚德之建元初為太子中庶子纍遷豫章內史悰家富於財而善為滋味豫章王嶷盛饌享賔謂悰曰肴羞有所遺不悰曰何曾食蔬有黃頷臛恨無之纍遷太子右率永眀八年大水百官戎服救太廟悰朱衣乘車鹵簿於宣陽門外入行馬內馳逐人被奏見原上以悰布衣之舊從容謂悰曰我當令卿復祖業轉侍中朝廷咸驚其驟遷祠部尚書武帝幸華林園就悰求味悰獻粣及雜肴數十輿太官鼎味不及也上就悰求諸飲食方悰祕不出上醉後體不快悰乃獻醴酒鯖鮓一方而已鬱林王立兼大匠卿起休安陵於陵所受局下牛酒坐免官隆昌元年以白衣領職鬱林廢悰竊嘆曰王徐遂縛袴廢天子天下豈有此理邪延興元年領右軍眀帝立悰稱疾不陪位帝使尚書令王晏齎廢立事示悰以悰舊人引參佐命悰謂晏曰主上聖眀公卿戮力寧假朽老以匡贊惟新乎不敢聞命因慟不自勝朝議欲糾之僕射徐孝嗣曰此亦古之遺直衆議乃止悰稱疾篤還東詔賜假百日轉給事中光祿大夫尋加正員常侍卒悰性敦實與人知識必相存訪親疏皆有終始世以此稱之胡諧之豫章南昌人也祖廉之書侍御史父翼之州辟不就諧之仕宋為邵陵王左軍咨議武帝為江州以諧之為别駕委以事任建元二年為給事中驍騎將軍上方欲奬以貴族盛姻以諧之家人語傒音不正乃遣宫內四五人往諧之家教子女語二年後帝問曰卿家人語音正未諧之答曰宫人少臣家人多非唯不能得正音遂使宫人頓成傒語帝大笑遍向朝臣説之永眀五年為左衛將軍加給事中諧之風采瓌潤善自居處兼以舊恩見遇朝士多與交逰六年遷都官尚書上欲遷諧之嘗從容謂曰江州有幾侍中邪答曰近世唯程道惠一人而已上曰當令有二後以語尚書令王儉儉意更異乃以為太子中庶子領左衛率諧之有識具每朝廷官缺乃應遷代密量上所用人皆如其言虞悰以此稱服之既居權要多所徴求就梁州刺史范柏年求佳馬柏年患之謂使曰馬非狗子那可得為應無極之求接使人薄使人致恨歸謂諧之曰柏年云胡諧是何傒狗無厭之求諧之切齒致忿時王元邈代柏年柏年稱疾推遷不時還諧之言於帝曰柏年恃其山川險固聚衆欲擅一州及柏年下帝欲不問諧之又言見虎格得而放上山於是賜死十年諧之轉度支尚書領衛尉眀年卒諡肅侯柏年夲梓橦人土斷屬梁州華陽郡初為州將劉亮使出都咨事見宋眀帝帝言次及廣州貪泉因問柏年卿州復有此不答曰梁州唯有文川武鄉廉泉讓水又問卿宅在何處曰臣所居廉讓之間帝嗟其善答因見知歷位內外終於梁州刺史虞玩之字茂瑶會稽餘姚人也祖宗晉尚書庫部郎父玫通直常侍玩之少間刀筆泛涉書史仕宋為烏程令路太后外親朱仁彌犯罪玩之依法案之太后怨訴孝武坐免官元徽中為尚書右丞髙帝參政與玩之書曰張華為度支尚書事不徒然今漕藏有闕吾賢居右丞已覺金粟可積也玩之上表陳府庫錢帛器械役力州縣轉多興用漸廣慮不支嵗月朝議優報之轉少府髙帝鎮東府朝廷致敬玩之為少府猶躡屐造席髙帝取屐親視之訛黑斜鋭蒵斷以芒接之問曰卿此屐已幾載玩之曰初釋褐拜征北行佐買之著已三十年貧士竟不辦易帝咨嗟因賜以新屐玩之不受帝問其故答曰今日之賜恩華俱重但蓍簮弊席復不可遺所以不敢當帝善之引為驃騎咨議參軍霸府初開賔客輻湊髙帝留意簡接玩之與樂安任遐俱以應對席上之美齊名見遇遷黃門郎領夲郡中正先是宋世人籍欺巧及高帝即位敕玩之與驃騎將軍傅堅意檢定簿籍建元二年詔輔臣曰黃籍民之大綱國之政端自頃氓俗欺巧乃至竊注爵位盜易年月增損三狀貿襲萬端或户存而文書已絶或人在而反託死叛停私而云隸役身強而稱六疾編户齊家少不如此皆政之巨蠹教之深疵若約之以刑則人偽已逺若綏之以德則勝殘未易諸賢並深眀治體各獻嘉謀以振澆化玩之表言便宜多見采納於是朝廷乃别置校籍官置令史限人一日得數巧以防懈怠於是貨賂因緣籍注雖正猶強推却以充程限既連年不已又謫巧者戍緣淮各十年百姓怨望富陽人唐宇之僑居桐廬父祖相傳圖墓為業宇之自云其家墓有王氣山中得金印轉相誑惑永眀二年冬宇之聚黨遂陷富陽至錢唐僣號置太子賊遂據郡又遣偽會稽太守孫泓取山隂時會稽太守王敬則朝正故宇之謂可乘虛而襲泓至浦陽江而郡丞張思祖遣峽口戍主楊休武拒戰大破之朝廷遣禁兵東討至錢唐一戰便散禽斬宇之進平諸郡縣臺軍乘勝百姓頗被強奪軍還上聞之收軍主前軍將軍陳天福棄市天福善馬矟為諸將法上寵將也既伏誅內外莫不震肅由是乃詔謫役邉疆各許還夲土玩之以久宦年老衰疾上表告退許之玩之於人物好臧否宋末王儉舉貟外郎孔蕩使魏玩之言論不相饒儉蕩並恨之至是玩之東歸儉不出送朝廷無祖餞者中丞劉休與親知書曰虞公散髮海隅同古人之美而東都之送殊不藹藹玩之歸家起大宅數年卒其後貟外郎孔瑄就儉求會稽五官儉方盥投皂莢於地曰卿鄉俗惡虞玩之至死煩人劉休字𢎞眀沛郡相人也父超九真太守休初為駙馬都尉宋明帝居藩休為湘東國常侍不為帝所知襲祖爵南鄉侯友人陳郡謝儼同丞相義宣反休坐匿之被繫尚方孝武崩乃得出泰始初諸州反休素能筮知眀帝當勝靜處不預異謀休之繫尚方也尚方令吳喜愛其才後投吳喜為喜輔師府録事參軍喜薦之於眀帝得在左右版桂陽王征北參軍帝頗有好尚尤嗜飲食休多藝能爰至鼎味無不間解遂見親賞長直殿內後宫孕者帝使筮其男女無不如占帝素肥痿不能御內諸王妓妾懷孕使密獻入宫皆使休筮之以故得親密焉帝憎婦人妬尚書右丞羅彥逺以善碁見親婦妬傷其面帝曰我為卿治之何如彥逺率爾從旨其夕遂賜藥殺其妻休妻王氏亦妬帝聞之賜休妾敕與王氏二十杖令休於宅後開小店使王氏賣掃帚皂莢以此辱之其見親如此尋除貟外郎領輔國司馬中書通事舍人帶南城令後為都水使者南康相休善談政體而在郡無異績建元初為御史中丞頃之啓言宋世載祀六十歷斯任者五十有三校其年月不過盈嵗於臣叨濫宜請骸骨上曰卿職當國司以威為夲而忽憚世誚卿便應辭之如事可獲何惰晚節邪四年出為豫章內史卒宋末造指南車髙帝以休有思理使與王僧虔對共監試又元嘉中羊欣重王子敬正隸書世共宗之而右軍之體微古不復見貴及休始好右軍法因此大行云江祏字𢎞業濟陽考城人也祖遵寧朔參軍父德麟司徒右長史祏姑為高帝兄始安貞王道生妃追諡景皇后生眀帝祏少為眀帝所親恩如兄弟眀帝為吳興以祏為郡丞後除通直郎補南徐州别駕眀帝輔政委以腹心引為驃騎咨議參軍領南平昌太守時新立海陵人情未服祏每説眀帝以君臣大節眀帝轉顧而不言眀帝髀上有赤志常祕不傳既而祏勸帝出以示人晉夀太守王洪範罷任還上袒示之曰人皆謂此是日月相卿幸無泄之洪範曰公日月在軀如何可隱轉當言之公卿上大恱會直後張伯尹瓉等屢謀竊發祏憂虞無計每夕輒託事外出及眀帝入纂議定加祏寧朔將軍眀帝為宣城王太史密奏圖緯云一號當得十四年祏入帝喜以示祏曰得此復何所望及即位遷守衛尉安陸縣侯祏祖遵以后父贈金紫光祿大夫父德麟以帝舅亦贈光祿大夫建武二年遷左衛將軍掌甲仗廉察四年轉太子詹事祏以外戚親要權冠當時魏軍南伐眀帝欲以劉暄為雍州暄時方希內職不願逺役投于祏祏謂明帝曰昔人相暄得一州便躓今為雍州儻相中乎上默然俄召梁武帝謂曰今使卿為雍州閫外一以相委祏既見任遂逺致餉遺或取諸王名書好物然家行甚睦待子姪有恩永泰元年眀帝寢疾轉祏侍中中書令出入殿省及崩遺詔轉尚書左僕射祏弟衛尉祀為侍中皇后弟劉暄為衛尉與始安王遙光徐孝嗣蕭坦之等輔政誡東昏曰五年中汝勿厝意過此自覽勿復委人及即位祏參掌選事眀帝雖顧命羣臣而意寄多在祏兄弟至是更直殿內動止關咨永元元年領太子詹事劉暄遷散騎常侍右衛將軍帝稍欲行意徐孝嗣不能奪蕭坦之雖時有異同而祏堅意執制帝深忌之孝嗣謂祏曰主上稍有異同詎可為相乖反祏曰但以見付必無所憂左右小人會稽茹法珍吳興梅蟲兒東海祝靈勇東冶軍人俞靈韻右衛軍人豐勇之等並為帝所委任祏常裁抑之羣小切齒帝失德既彰祏議欲立江夏王寶元劉暄初為寶元郢州行事執事過刻有人獻馬寶元欲看之暄曰馬何用看妃索煮肫帳下咨暄暄曰旦已煮鵝不煩復此寶元恚曰舅殊無渭陽之情暄聞之亦不悅至是不同祏議欲立建安王寶夤密謀于遙光遙光自以年長屬當鼎命微旨動祏祏弟祀以少主難保勸祏立遙光暄以遙光若立已失元舅之望不肯同故祏遲疑久不決遙光大怒遣左右黃曇慶於青溪橋道中刺殺暄曇慶見暄部伍人多不敢發事覺暄告祏謀帝處分收祏兄弟祀時直在殿內疑有異遣信報祏曰劉暄似有謀今作何計祏曰政當靜以鎮之俄而召祏入見停中書省先是直齋袁文曠以王敬則勳當封祏執不與帝使文曠取祏以刀環築其心曰復能奪我封不祀祏同日見殺祏任寄雖重而不忘財利論者以此少之祏等既誅帝恣意遊走單騎奔馳謂左右曰祏常禁吾乘馬小子若在吾豈能得此因問祏親親餘誰答曰江祥今猶在冶乃於馬上作敕賜祥死祀字景昌位晉安王鎮北長史南東海太守行府州事祀弟禧早卒有子廞字偉卿年十二聞收至謂家人曰伯既如此無心獨存赴井死劉暄字士穆彭城人及聞祏等戮眠中大驚投出户外問左右收至未良久意定還坐大悲曰不念江行自痛也遙光事起以討劉暄為名事平暄遷領軍將軍封平都縣侯其年茹法珍梅蟲兒徐世摽構暄有異志帝曰領軍是我舅豈應有此世摽曰眀帝是武帝同堂恩遇如此尚滅害都盡舅復焉可信乃誅之暄為人性軟弱當軸居政每事讓江祏羣弟不得進官死之日皆怒之和帝中興元年贈祏衛將軍暄散騎常侍撫軍將軍並開府儀同三司祀散騎常侍太常卿蕭惠基南蘭陵人也父思話宋贈征西將軍儀同三司自有傳惠基幼以外戚見宋江夏王義恭義恭歎其詳審以女結婚除車騎主簿泰始初兄益州刺史惠開拒命眀帝遣惠基使蜀宣旨慰勞惠開降而益州土酋反引氐賊圍州城惠基於外宣示朝廷威賞於是氐人斬賊帥降還為太子中舍人惠基西使部曲並欲論功惠基毁除勳簿或問其意惠基曰我若論其此勞則馳驅而已豈吾懷素之夲邪遷黃門郎惠基善隸書及奕碁髙帝與之情好相得早相器遇桂陽王休範妃惠基姊也帝謂之曰卿家桂陽遂復作賊帝頓新亭壘以惠基為軍副惠基弟惠朗親為休範攻戰惠基在城內了不自疑後為長兼侍中袁粲劉秉起兵之夕髙帝以秉是惠基姊夫惠基時直在侍中省遣王敬則觀其指趣見惠基安靜不與秉相知由是益加恩信髙帝即位為都官尚書掌吏部永眀中為侍中領驍騎將軍尚書令王儉朝宗貴望惠基同在禮閣非公事不私覿焉遷太常加給事中自宋大眀以來聲伎所尚多鄭衛淫俗而雅樂正聲鮮有好者惠基解音律尤好魏三祖曲及相和歌每奏輒賞恱不能已當時能碁人琅邪王抗第一品吳郡褚思莊會稽夏赤松第二品赤松思速善於大行思莊戲遲巧于鬭碁宋文帝世羊元保為會稽帝遣思莊入東與元保戲因制局圖還於帝前覆之髙帝使思莊與王抗交賭自食時至日暮一局始畢上倦遣還省至五更方決抗睡於局後寢思莊達旦不寐世或云思莊所以品第致髙緣其用思深久人不能對也抗思莊並至給事中永眀中敕使抗品棊竟陵王子良使惠基掌其事初思話先于曲阿起宅有間曠之致惠基常謂所親曰須婚嫁畢當歸老舊廬立身退素朝廷稱為善士眀年卒贈金紫光祿大夫子洽附載從兄視素傳列在梁史惠基弟惠休永眀四年為廣州刺史罷任獻奉傾資上敕中書舍人茹法亮曰可問蕭惠休故當不復私邪吾欲分受之也後封建安縣子永元元年從吳興太守徴為尚書右僕射吳興郡項羽神舊酷烈人云惠休事神謹故得美遷于時朝士多見殺二年惠休還至平望帝令服藥而卒贈金紫光祿大夫惠休弟惠朗同桂陽賊髙帝赦之後為西陽王征虜長史行南兗州事坐法免官惠郎弟惠蒨位左户尚書子介亦附視素傳張岱字景山吳郡吳人也父裕宋會稽太守自有傳岱仕宋州辟從事纍遷東遷令時殷沖為吳興太守謂人曰張東遷親貧須養所以栖遲下邑然名器方顯終當大至後為司徒左西曹掾母年八十籍注未滿岱便去官從實還飬有司以岱違制將欲糾舉孝武曰觀過可以知仁不須案也纍遷山隂令職事間理巴陵王休若為北徐州未親政事以岱為冠軍咨議參軍領彭城太守行府州國事後臨海王為征虜將軍鎮廣州豫章王為車騎將軍鎮揚州晉安王為征虜將軍鎮南兖州岱歷為三府咨議三王行事與典籖主帥共事事舉而情得或謂岱曰主王既幼執事多門而每能緝和公私云何致此岱曰古人言一心可以事百君我為政端平待物以禮悔吝之事無由而及眀暗短長更是才用多少耳入為黃門郎新安王子鸞以盛寵為南徐州割吳郡屬焉髙選佐吏孝武召岱謂曰卿美效夙著兼資宦已多今欲用卿為子鸞别駕總刺史之任無謂小屈終當大申也帝崩纍遷吏部郎泰始末為吳興太守元徽中為益州刺史加都督數年益土安其政纍遷吏部尚書王儉為吏部郎時專斷曹事岱每相違執及儉為宰相以此頗不相善岱兄子瓌與弟恕共誅吳郡太守劉遐髙帝欲以恕為晉陵郡岱曰恕未間從政美錦不宜濫裁髙帝曰恕為人我所悉且又與瓌同勳自應有賞岱曰若以家貧賜祿此所不論若語功推事臣門之恥加散騎常侍建元元年中詔序朝臣欲以右僕射擬岱褚淵謂得此過優若别有忠誠特宜升引者别是一理詔更量出為吳郡太守髙帝知岱歷仕清直至郡未幾手敕曰大郡任重乃未欲回換但總戎務殷宜須望實今用卿為護軍加給事岱拜竟中詔以家為府武帝即位復為吳興太守岱晚節在吳興更以寬恕著名遷南兗州刺史未拜卒岱初作遺命分張家財封置箱中家業張減隨復改易如此十數年諡曰貞子岱兄演仕宋位太子中舍人演子緒字思曼緒少知名清簡寡欲從伯敷及叔父鏡從叔暢並皆貴異之鏡比之樂廣敷云是我輩人暢言于孝武帝用為尚書倉部郎都令史咨詳郡縣米事緒蕭然直視不以經懷宋眀帝每見緒輒歎其清談轉太子中庶子夲州大中正遷司徒左長史吏部尚書袁粲言於帝曰臣觀張緒有正始遺風宜為宫職復轉中庶子後為侍中遷吏部郎參掌大選元徽初東宫官罷選曹擬舍人王儉為格外記室緒以儉人地兼美宜轉祕書丞從之緒又遷侍中嘗私謂客曰一生不解作諾有以告袁粲褚淵者由是出為吳郡太守緒初不知也升眀二年自祠部尚書為髙帝太傅長史建元元年為中書令緒善談元深見敬異僕射王儉嘗云緒過江來所未有北士可求之耳不知陳仲弓黃叔度能過之不駕幸莊嚴寺聽僧逹道人講維摩經緒坐逺不聞僧逹言上難移緒乃遣僧達以近之時帝欲用緒為右僕射以問王儉儉曰緒少有清望誠美選也然南士由來少居此職褚淵曰儉少年或未憶耳江左用陸玩顧和皆南人也儉曰晉氏衰政不可為則先是緒諸子皆輕俠中子充少時又不護細行儉又以為言乃止又立國學以緒為太常外領國子祭酒以王延之代緒為中書令何點歎曰晉以子敬季琰為此職今以王延之張緒為之可謂清官後接之者實為未易緒長於周易言精理奧見宗一時常云何平叔不解易中七事武帝即位轉吏部尚書祭酒如故永眀二年領南郡王師加給事中三年轉太子詹事師給事如故緒每朝見武帝目送之謂王儉曰緒以位尊我我以德貴緒遷散騎常侍金紫光祿大夫師如故給親信二十人復領中正長沙王晃屬選用吳郡聞人雍為州議曹緒以資籍不當執不許晃遺書固請之緒正色謂晃信曰此是身家州郡殿下何得見逼乃止緒吐納風流聼者皆忘飢疲見者肅然如在宗廟雖終日與居莫能測焉劉悛之為益州獻栁數株枝條甚長狀若絲縷時舊宫芳林苑始成武帝以植於太昌靈和殿前常賞玩咨嗟曰此楊栁風流可愛似張緒當年時其見賞愛如此王儉為尚書令丹陽尹時諸令史來問迅有一令史善俯仰進止可觀儉賞異之問曰經與誰共事答云十餘嵗在張令門下儉目送之時尹丞殷臶在坐曰是康成門人也七年竟陵王子良領國子祭酒武帝敕王晏曰吾欲令司徒辭祭酒以授張緒物議以為如何子良竟不拜以緒領國子祭酒緒口不言利有財輒散之清談端坐或終日無食門生見緒飢為之辦餐然未嘗求也死之日無宅以殯遺命凶事不設栁翣止以蘆葭轜車引柩靈上置杯水香火不設祭從弟融敬緒事之如親兄齎酒於緒靈前酌飲慟哭曰阿兄風流頓盡追贈散騎常侍特進光祿大夫諡簡子子完宋後廢帝時為正員郎以險行見寵坐廢錮完弟允永眀中安西功曹淫通殺人伏法允兄充知名列在梁史江謐字令和濟陽考城人祖秉之宋臨海太守自有傳父徽尚書都官郎吳令元凶弒立殺徐湛之徽以黨與見誅謐坐繫尚方宋孝武平建鄴乃得出為于湖令強濟稱職宋眀帝為兖州謐傾身奉事為帝所待及即位以為驃騎參軍弟蒙貌醜帝嘗召見狎侮之謐再遷右丞兼比部郎泰始四年江夏王義恭第十五女卒年十九未笄禮官議從成人服諸王服大功左丞孫敻重奏禮記女子十五而笄鄭元云應年許嫁者也其未許嫁者則二十而笄射義云十九猶為殤禮官違越經典於理無據太常以下結免贖論謐坐杖督五十奪勞百日謐又奏敻先不研辨混同謬議凖以事例亦宜及咎敻又結免贖論詔可出為建平王景素冠軍長史長沙內史行湘州事政教苛刻僧遵道人與謐情欵隨謐蒞郡犯小事餓繫郡獄遵道裂衣食之盡而死為有司奏徴還眀帝崩遇赦免髙帝領南兖州謐為鎮軍長史廣陵太守入為遊擊將軍性疏俗善趨時利元徽末朝野咸屬意建平王景素謐深自委結景素敗僅得免禍蒼梧王廢後物情尚懷疑惑謐獨竭誠歸事髙帝升眀元年為黃門侍郎領尚書左丞沈攸之事起議加髙帝黃鉞謐所建也事寧遷吏部郎建元元年位侍中既而驃騎豫章王嶷領湘州以謐為長史封永新縣伯三年為左户尚書諸王子出閣用文武主帥皆悉以委謐尋敕選曰江謐寒士誠當不得競等華儕然甚有才幹可遷掌吏部謐才長刀筆所在幹職髙帝崩謐稱疾不入衆頗疑其怨不預顧命也武帝即位謐又不遷官以此怨望時武帝不豫謐詣豫章王嶷請間曰至尊非起疾東宫又非才公今欲何計武帝知之出為鎮北長史南東海太守未發憂甚乃以奕碁占卦云有客南來金碗玉杯上使御史中丞沈沖奏謐前後罪惡請收送廷尉詔賜死果以金罌盛藥鴆之子介建武中為吳令政亦深苛人門榜死人髑髏為謐首介棄官而去謝超宗陳郡陽夏人也祖靈運宋臨川內史自有傳父鳳與超宗坐靈運事徙嶺南鳳卒徙所超宗元嘉末得還與慧休道人來往好學有文辭盛得名譽新安王子鸞孝武帝寵子超宗以選補王國常侍王母殷淑儀卒超宗作誄奏之帝大嗟賞謂謝莊曰超宗殊有鳳毛恐靈運復出時右衛將軍劉道隆在御坐出候超宗曰聞君有異物可見乎超宗曰懸罄之室復有異物邪道隆武人無識正觸其父名曰旦侍宴至尊説君有鳳毛超宗徒跣還內道隆謂檢覓毛至暗待不得乃去泰始中為尚書殿中郎三年都令史駱宰議策秀孝格五問並得為上四三為中二為下一不第超宗議不同詔從宰議髙帝為領軍數與超宗共屬文愛其才翰左衛將軍袁粲聞之謂髙帝曰超宗開亮可與語取為長史臨淮太守粲誅髙帝以超宗為義興太守升眀二年坐公事免詣東府門自通其日風寒慘厲髙帝謂四坐曰此客至使人不衣自暖矣超宗既坐飲酒數杯辭氣橫出高帝對之甚歡拔為驃騎咨議及齊受禪轉黃門郎有司奏撰立郊廟歌上敕司徒褚淵侍中謝朏散騎侍郎孔稚圭太學博士王咺之總眀學士劉融何法圖何曇秀作者凡十人超宗辭獨見用為人恃才使酒多所陵忽在直省常醉上召見語及北方事超宗曰虜動來二十年矣佛出亦無如之何以失儀出為南郡王中軍司馬人問曰承有朝命定是何府超宗怨望答曰不知是司馬為是司驢既是驢府政應為司驢為有司奏以怨望免官禁錮十年後司徒褚淵因送湘州刺史王僧虔閣道壞墜水僕射王儉嘗為牛驚跣下車超宗撫掌笑曰落水三公墜車僕射淵出水霑濕狼籍超宗先在僧虔舫抗聲曰有天道焉天所不容地所不受投畀河伯河伯不受淵大怒曰寒士不遜超宗曰不能賣袁劉得富貴焉免寒士前後言誚稍布朝野武帝即位使掌國史除竟陵王征北咨議領記室愈不得志超宗為子娶張敬兒女為婦上甚疑之永眀元年敬兒誅超宗謂丹陽尹李安人曰往年殺韓信今年殺彭越君欲何計安人具啓之上積懷超宗輕慢使兼中丞袁彖奏超宗請付廷尉武帝雖可其奏以彖言辭依違使左丞王逡之奏彖輕文略奏撓法容非請免彖所居官詔彖匿情欺國愛朋罔主免官禁錮十年超宗下廷尉一宿髮白皓首詔徙越嶲行至豫章上敕內史虞悰賜自盡勿傷其形骸眀年超宗門生王永又告超宗子才卿死罪二十餘條上疑其妄以才卿付廷尉辨以不實見原永先於獄盡之才卿弟幾卿列在梁史謝朓字元暉超宗之族父而宋左僕射裕之姪子也祖述吳興太守附載裕傳父緯散騎侍郎朓少好學有美名文章清麗為隨王子隆鎮西功曹轉文學子隆在荆州好辭賦數集僚友元暉尤被賞遇流連晤對不捨日夕長史王秀之以元暉年少相動欲以啓聞武帝嘗敕令還都朓道中為詩寄西府曰常恐鷹隼擊秋菊委嚴霜寄言罻羅者寥廓已髙翔仍除新安王中軍記室朓為箋辭子隆時荆州信去倚待朓執筆便成文無點易以夲官兼尚書殿中郎隆昌初敕朓接北使朓自以口訥啓辭見許眀帝輔政以為驃騎咨議領記室掌霸府文筆又掌中書詔誥轉中書郎出為晉安王鎮北咨議南東海太守行南徐州事啓王敬則反謀上甚賞之遷尚書吏部郎朓上表三讓中書疑朓官未及讓以問國子祭酒沈約約曰宋元嘉中范曄讓吏部朱修之讓黃門蔡興宗讓中書並三表詔答其事宛然近世小官不讓遂成常俗王藍田劉安西並貴重初自不讓今豈可慕此不讓邪孫興公孔顗並讓記室今豈可三署皆讓邪謝吏部今授超階所讓别有意豈關官之大小撝讓之美夲出人情若大官必讓便與詣闕章表不異例既如此謂都非疑朓又啓讓上優答不許朓善草隸長五言詩沈約常云二百年來無此詩也敬皇后遷祔山陵朓撰哀策文齊世莫有及者東昏失德江祏欲立江夏王寶元末更回惑與弟祀密謂朓曰江夏年少脫不堪負荷神器不可復行廢立始安年長入纂不乖物望非以此要富貴政是求安國家爾遙光又遣親人劉渢密致意於朓欲以為肺腑朓自以受恩眀帝非渢所言不肯答少日遙光以朓兼知衛尉事朓懼見引即以祏等謀告左興盛興盛不敢發言又説劉暄曰始安一旦南面則劉渢劉晏居卿今地但以卿為反覆人爾暄陽驚馳告始安王及江祏始安欲出朓為東陽郡祏固執不與先是朓常輕祏為人祏嘗詣朓朓因言有一詩呼左右取既而便停祏問其故云定復不佳祏以為輕已後祏及弟祀劉渢劉晏俱候朓朓謂祏曰可謂帶二江之雙流以嘲弄之祏轉不堪至是構而害之詔暴其過惡收付廷尉又使御史中丞范岫奏收朓下獄死時年三十六臨終謂門賔曰寄語沈公君方為三代史亦不得見沒初朓告王敬則反敬則女為朓妻常懷刀欲報朓朓不敢相見及當拜吏部謙挹尤甚尚書郎范縝嘲之曰卿人地之美無慙小選但恨今自不可刑于寡妻朓有愧色及臨誅歎曰天道其不可昧乎我雖不殺王公王公因我而死朓好奬人才會稽孔闓粗有文筆未為時知孔稚圭嘗令草讓表以示朓朓嗟吟良久手自折簡寫之謂稚圭曰士子聲名未立應共奬成無惜齒牙餘論其好善如此朓及殷濬素與梁武以文章相得帝以大女永興公主適濬子鈞第二女永世公主適朓子謨及帝為雍州二女並暫隨母向州及梁武即位二主始隨內還梁武意薄謨又以門單欲更適張𢎞策子𢎞策卒又以與王志子諲而謨不堪歎恨為書狀如詩贈主主以呈帝甚蒙矜歎而婦終不得還尋用謨為信安縣稍遷王府咨議時以為沈約早與朓善為制此書云謝皓字仁悠朓之族子也祖密宋侍中父莊中書令散騎常侍金紫光祿大夫莊附載密傳皓少簡靜宋末為豫章太守至石頭遂白服登烽火樓坐免官詣髙帝自占謝言辭清麗容儀端雅左右為之傾目宥而不問永眀初髙選文學以皓為竟陵王友歷吏部郎有簡秀之目卒於北中郎長史皓弟草瀹字義潔年七嵗王彧見而異之言於宋孝武召見於人衆中草瀹舉止間詳應對合旨帝恱詔尚公主景和敗事寢僕射褚淵以女妻之厚為資送性甚敏贍嘗與劉悛飲推讓久之悛曰謝莊兒不可云不能飲草瀹曰茍得其人自可湛湎千日悛甚慙無言仕齊纍遷中書侍郎衛軍王儉引為長史雅相禮遇後拜吏部尚書眀帝廢鬱林領兵入殿左右驚走報草瀹草瀹與客圍碁每下子輒云其當有意竟局乃還齋臥竟不問外事眀帝即位草瀹又屬疾不知公事蕭諶以兵臨起之草瀹曰天下事公卿處之足矣且死者命也何足以此懼人後宴會功臣上酒尚書令王晏等興席草瀹獨不起曰陛下受命應天王晏以為己力獻觴遂不見報上大笑解之坐罷晏呼草瀹共載欲相撫恱草瀹又正色曰君巢窟在何處晏初得班劒草瀹謂曰身家太傅裁得六人若何事頓得二十晏甚憚之謂江祏曰彼上人者難為酬對加領右軍將軍兄朏在吳興論啓公事稽晚草瀹輒代朏為啓上知非朏手迹被問見原永泰元年卒于太子詹事贈金紫光祿大夫諡簡子初朏為吳興草瀹於征虜渚送别朏指草瀹口曰此中唯宜飲酒草瀹建武之朝專以長酣為事與劉瑱沈昭略交飲各至數斗武帝問王儉當今誰能為五言儉曰朏得父膏腴江淹有意上起禪靈寺敕草瀹撰碑文其辭甚佳子覽附載兄朏傳列在梁史到撝字茂謙彭城武原人也祖彥之宋護軍將軍自有傳父仲度驃騎從事中郎撝襲爵建昌公宋眀帝立欲收物情以撝功臣之後自長兼左户郎中擢為太子洗馬撝資藉豪富厚自奉養供一身一月千萬宅宇山池妓妾姿藝皆窮上品才調流贍善納交遊愛妓陳玉珠眀帝遣求不與逼奪之撝頗怨帝令有司誣奏將殺之撝入獄數宿鬚鬢皆白免死繫尚方奪封與弟賁撝由是更以貶素自立眀帝崩弟賁讓封還撝朝議許之弟遁元徽中為南海太守在廣州升眀元年沈攸之反刺史陳顯達起兵應朝廷遁猶豫見殺遁家人在都從野夜歸見兩三人持堊刷其家門須臾而滅眀日而遁死問至撝懼請髙帝謝即拔撝武帝中軍咨議參軍建元初國除武帝即位纍遷司徒左長史宋時武帝與撝同從宋眀帝射雉郊野渴倦撝得早青瓜與上對剖食之上又數遊撝家懷其舊德至是一嵗三遷永眀元年為御史中丞車駕幸丹陽郡宴飲撝恃舊酒後狎侮同列謂庾杲之曰蠢爾蠻荆其俗鄙復謂虞悰曰斷髮文身其風陋王晏既貴雅步從容又問曰王散騎復何故爾晏先為國常侍轉員外散騎郎此二職清華所不為故以此嘲之王敬則執榠查以刀子削之又曰此非元徽頭何事自契之為左丞庾杲之所糾以贖論再遷左衛將軍隨王子隆帶彭城郡撝問訊不修部下敬為有司舉免官後為五兵尚書廬陵王中軍長史卒子沆嗣列在梁史沈憲字彥璋吳興武康人也祖説道巴西梓潼二郡太守父璞之北中郎行參軍憲少有幹局為駕部郎宋眀帝與憲圍碁謂曰卿廣州刺史材也補烏程令甚著政績太守褚淵歎美以為方圎可施少府管掌煩冗材幹者並更其職憲以吏能纍遷少府卿武陵王曄為會稽以憲為左軍司馬髙帝以山隂户衆難御欲分為兩縣武帝啓曰縣豈不可御但用不得人耳乃以憲帶山隂令政績大著孔圭請假東歸謂人曰沈令料事特有天才後為晉安王後軍長史廣陵太守西陽王子眀代為南兖州憲仍留為冠軍長史太守如故永眀八年子眀典籖劉道濟贓私百萬為有司所奏賜死憲坐不糾免官後除散騎常侍未拜卒當時稱為良吏憲同郡邱仲起先是為晉平郡清亷自立褚淵歎曰目見可欲心能不亂此楊公所以遺子孫也仲起字子震位至廷尉卒沈沖字景綽吳興武康人也父懷文宋廣陵太守為孝武帝所忌收付廷尉賜死自有傳沖涉獵文義仕宋歷位撫軍正佐兼記室及父懷文得罪被繫沖與兄淡深行謝情哀貌苦見者傷之栁元景欲救懷文言於孝武曰沈懷文三子塗炭不可見願陛下速正其罪帝曰宜急殺之使其意分竟殺之元景為之歎息沖兄弟以此知名纍遷司徒録事武帝為江州沖為征虜長史尋陽太守建元中纍遷太子中庶子武帝在東宫待以恩舊及即位轉御史中丞侍中永眀四年為五兵尚書沖與兄淡深名譽有優劣世號為腰鼓兄弟淡深並歷御史中丞兄弟三人皆為司直晉宋所未有也中丞案裁之職被惡者多結怨永眀中深彈吳興太守袁彖建武中彖從弟昂為中丞到官數日奏彈深子繢父在僦白幰車免官禁錮沖母孔氏在東鄰家失火疑為人所焚爇大呼曰我三兒皆作御史中丞與人豈有善者方恐肌分骨散何但焚如兄弟後並歷侍中武帝方欲任沖尋卒追贈太常諡曰恭子張融字思光吳郡吳人也父暢宋會稽太守附載其叔父南蠻校尉邵傳融弱冠有名道士陸修靜以白鷺羽塵尾扇遺之曰此既異物以奉異人解褐為宋新安王子鸞行參軍王母殷淑儀薨後四月八日建齋并灌佛僚佐襯者多至一萬少不減五千融獨注襯百錢帝不悅曰融殊貧當序以佳祿出為封溪令從叔永出後渚送之曰似聞朝旨汝尋當還融曰不患不還正恐還而復去及行路經嶂嶮獠賊執融將殺而食之融神色不動方作洛生詠賊異之而不害也浮海至交州於海中遇風終無懼色方詠曰乾魚自可還其夲鄉肉脯復何為者哉又作海賦文辭詭激獨與衆異後以示鎮軍將軍顧覬之覬之曰卿此賦實超元虛但恨不道鹽耳融即求筆注曰漉沙構白熬波出素積雪中春飛霜暑路此四句後所足也覬之與融兄有恩好覬之卒融身負墳土在南與交趾太守卞展善展於嶺南為人所殺融挺身奔赴舉後秀才射策中第為尚書殿中郎不就改為儀曹郎尋請假奔叔父喪道中罰幹錢敬道鞭杖五十寄繫延陵獄大眀五年制二品清官行僮幹杖不得出十為左丞孫緬所奏免官復位攝祠部倉部二曹時領軍劉勔戰死融以祠部議上應哭勔帝納之又俗人忌以正月開太倉融議不宜拘束小忌尋兼掌正厨見宰殺廽車徑去自表解職再遷南陽王友融父暢為丞相義宣長史義宣敗暢幾為王元謨所殺時元謨子瞻為南陽王長史暢啓求去官不許融家貧欲祿乃與從叔征北將軍永書曰融昔幼學早訓家風雖則不敏率以成性布衣韋帶弱年所安簞食瓢飲不覺自樂但人生多待榛栗棗修女贄既長束帛禽鳥男禮已大勉身就官十年七仕不欲代耕何至此事昔求三吳一丞雖屬舛錯今聞南康缺守願為得之融不知階級階級亦可不知融政以求丞不得所以求郡求郡不得亦可復求丞又與吏部尚書王僧虔書曰融天地之逸人也進不辨貴退不知賤實以家貧纍積孤寡傷心八姪俱孤二弟頓弱豈能以山海陋祿申融情纍阮籍愛東平土風融亦欣晉平間外時議以融非御人才竟不果用辟齊太傅掾稍遷中書郎非其所好乞為中散大夫不許張氏自敷以來並以理音辭修儀範為事至融風止詭越坐常危膝行則曵步翹身仰首意制甚多見者驚異聚觀成市而融了無慙色隨例同行常稽遲不進髙帝素愛融為太尉時與融欵接見融常笑曰此人不可無一不可有二即位後手詔賜融衣曰見卿衣服粗故誠乃素懷有夲然過爾藍縷亦虧朝望今送一通故衣意謂雖故乃勝新也是吾所著已令裁減稱卿之體并履一量髙帝出太極殿西室融入問訊彌時方登階及就席上曰何乃遲為對曰自地升天理不得速時魏主至淮而退帝問羣臣彼何意忽來忽去未有答者融時在下坐抗聲曰以無道而來見有道而去公卿咸以為捷融善草書常自美其能帝曰卿書殊有骨力但恨無二王法答曰非恨臣無二王法亦恨二王無臣法融請假還鄉詣王儉别儉立地舉袂不前融亦舉手呼儉曰前儉不得已趨就之融曰使融為不慕勢而令君為趨士豈不善乎常嘆云不恨我不見古人所恨古人又不見我融與吏部尚書何戢善往詣戢誤通尚書劉澄下車入門乃曰非是望澄又曰非是既造席視澄曰都自非是乃去其為異如此入為長沙王鎮軍參軍竟陵王征北咨議並領記室司徒從事中郎永眀二年總眀觀講敕朝臣集聽融扶入就榻私索酒飲之事畢乃長歎曰嗚呼仲尼獨何人哉為御史中丞到撝所奏免官尋復職融容貌短醜精神清徹王敬則見融革帶寬殆將至髀謂曰革帶太急融曰既非步吏急帶何為融以假東出武帝問融住在何處答曰臣陸處無屋舟居無水後上問其兄緒緒曰融近東出未有居止權遣小船於岸上住上大笑後使融接對北使李道固道固顧而言曰張融是宋彭城長史張暢子不融嚬蹙久之曰先君不幸名達六夷豫章王大會賔僚融食炙始行畢行炙人便去融欲求鹽蒜口終不言方搖食指半日每出入朝廷皆拭目驚觀之八年朝臣賀衆瑞公事融扶入拜起復為有司所奏見原遷司徒兼右長史竟陵張欣時為諸暨令坐罪當死欣時父興世討宋南譙王義宣時官軍欲殺融父暢興世以袍覆暢而坐之得免興世卒融著髙履為負土成墳至是融啓竟陵王子良乞代欣時死子良答曰此乃是長史美事恐朝有常典不得如長史所懷遷黃門郎太子中庶子司徒左長史融有孝義忌月三旬不聼樂事嫂甚謹父暢臨終謂諸子曰昔丞相事難吾以不同將見殺緣司馬竺超民得活爾等必報其子後超民孫微冬月遭母喪居貧融弔之悉脫衣以為賻披牛被而反常以兄事微豫章王嶷竟陵王子良薨自以身經佐吏哭輒盡慟建武四年病卒遺令建白旐無旒不設祭令人捉塵尾登屋復魄曰吾平生所善自當陵雲一笑三千賈棺無製新衾左手執孝經老子右手執小品法華經妾二人事哀畢各遣還家曰以吾生平之風調何至使婦人行哭失聲不須暫停閨閣融元義無師法而神解過人髙談鮮能抗拒永眀中遇疾為問律自序云吾文章之體多為世人所驚汝可師耳以心不可使耳為心師也夫文豈有常體但以有體為常正當有其體丈夫當刪詩書制禮樂何至因循寄人籬下臨卒又誡其子曰手澤存焉父書不讀况文音情婉在其韻吾意不然别遺爾旨吾文體英變變而屢奇豈吾天挺蓋不隤家聲汝可號哭而看之融文集十卷行於世自名其集為玉海司徒褚淵問其故融云蓋玉以比德海崇上善耳張氏前有敷演鏡暢後有充融卷稷融第六弟寶稱建武中出為廬陵太守時名流謝草瀹何點陸慧曉孔稚圭至融弟鐵之舍點造坐便曰今日可謂盛集二五我兄弟之流阿六張氏保家之子顧見王思逺曰卿詐作善非實得也二五謂稚圭及融並第五寶稱永元中為湘州行事蕭頴胄在江陵乘腰輿詣頴胄舉動自若頴胄問何至之晚答曰夲朝危亂四海橫流既不能為比干之死實未忍為微子之去是以至晚頴胄深以為善即用為相府咨議參軍後位御史中丞王秀之字伯奮琅邪臨沂人祖裕之宋特進左光祿大夫自有傳父瓚之金紫光祿大夫秀之始仕宋為太子舍人父卒為庵舍於墓下持喪服闋復職吏部尚書褚淵見秀之貞潔欲與結婚秀之不肯以此頻轉兩府外兵曹參軍後為晉平太守至郡期年求還或問其故答曰此郡沃壤珍阜日至人所昧者財財生則禍逐智者不昧財亦不逐禍吾山資已足豈可久留以妨賢路乃上表請代時人謂王晉平恐富求歸齊受命為豫章王嶷驃騎長史嶷于荆州立學以秀之為儒林祭酒武帝即位纍遷侍中祭酒轉都官尚書初秀之祖裕之有特操徐羡之傅亮當朝裕之不與往來及致仕隱吳興與秀之父瓉之書深朂以靜退瓉之歷官至五兵尚書未嘗詣一朝貴江湛謂何偃曰王瓉之今便是朝隱及栁元景顔師伯貴要瓉之終不詣之至秀之為尚書又不與王儉欵接三世不事權貴時人稱之轉侍中領射聲校尉出為隨王鎮西長史南郡內史後為輔國將軍吳興太守秀之先為諸王長史行事便歎曰仲祖之識已見于今可以止足便無復仕進志止營理舍亭山宅有終焉之志及除吳興郡隱業所在心願為之到郡修舊山移置輜重隆昌元年卒遺令朱服不得入棺祭則酒脯而已世人以僕妾直靈助哭當由喪主不能淳至以多聲相亂魂而有靈吾當笑之諡曰簡子秀之從父弟延之字希季父升之位都官尚書延之少而靜默不交人事舉秀才纍遷司徒左長史延之清貧居宇穿漏褚淵往候之具啓宋眀帝即敕材官為起三間齋屋出為吳郡太守罷還家産無所增益遷吏部尚書尚書左僕射宋德既衰髙帝輔政朝野之情人懷彼此延之與尚書令王僧虔中立無所去就時人為之語曰二王持平不送不迎髙帝以此善之宋升眀三年出為安南將軍江州刺史建元元年進號鎮南將軍延之與金紫光祿大夫阮韜俱宋領軍劉湛外甥並有早譽湛甚愛之曰韜後當為第一延之為次也延之甚不平每致餉下都韜與朝士同例髙帝聞其如此與延之書曰韜云卿未嘗有别意當由劉家月旦故邪韜字長眀陳留人晉金紫光祿大夫裕元孫也為南兖州别駕刺史江夏王義恭逆求資費錢韜曰此朝廷物執不與韜少歷清官宋孝武選侍中四人並以風貌王彧謝莊為一雙韜與何偃為一雙常充兼假官至散騎常侍金紫光祿大夫領始興王師卒延之居身簡素清靜寡欲凡所經歷務存不擾在江州祿俸外一無所納獨處齋內未嘗出户吏人罕得見焉雖子弟亦不得妄前時時見親舊未嘗及世事從容談詠而已後為尚書左僕射尋領竟陵王師卒諡曰簡子綸之字元章為安成王記室參軍嘗預召會退居僚末司徒袁粲聞而歎曰格外之官便今日為重貴遊居此位者遂以不掌文記為髙自綸之始也永眀中歷位侍中出為豫章太守下車祭徐孺子許子將墓圗畫陳蕃華歆謝鯤像於郡朝堂為政寬簡稱良二千石武帝幸琅邪城綸之與光祿大夫金景文等二十一人坐不參承為有司奏免官後位侍中都官尚書卒自裕之至綸之並方嚴皆尅日乃見子孫蓋家風也綸之子昕有業行居父憂過禮謝草瀹欲遣參之孔稚圭曰何假參此豈有全理竟以憂卒秀之子峻字茂逺少美風姿善容止位桂陽內史梁天監初為中書侍郎梁武帝甚恱其風采與陳郡謝覽同見賞識纍遷侍中吏部尚書處選甚得名譽峻性詳雅無趨競心嘗與謝覽約官至侍中不復謀仕進覽自吏部尚書出為吳興太守平心不畏強禦亦由處俗情薄故也峻為侍中已後雖不退身亦淡然自守無所營務遷金紫光祿大夫未拜卒諡曰惠子子琮為國子生尚始興王女繁昌主琮不慧為學生所嗤遂離婚峻謝王王曰此自上意儂極不願如此峻曰下官曽祖是謝仁祖外孫亦不藉殿下姻媾為門户耳王瞻字眀逺一字叔鸞太原祁人也父元謨宋護軍將軍豫州刺史自有傳瞻負氣傲俗好貶裁人物仕宋為王府參軍嘗詣劉秉直登榻曰君侯是公孫僕是公子引滿促膝唯餘二人秉外迹雖酬之意甚不悅豫章王嶷少時早與瞻友瞻嘗候嶷髙論武帝在大牀寢瞻謂嶷曰帳中人物亦復隨人寢興嶷言次忽問王彧兄楷賢愚何如殷道矜瞻曰卿遂復言他人兄邪武帝稱嶷小名曰多汝兄愚那得忽來問王參軍此句瞻曰直恐如卿來談武帝銜之未嘗形之于色後歷黃門侍郎及建元初瞻為永嘉太守詣闕跪拜不如儀武帝知之召入東宫仍送付廷尉殺之命左右啓髙帝曰父辱子死王瞻傲朝廷臣輒已收之髙帝曰此何足計及聞瞻已死乃默然無言瞻從叔元載字彥休父㽔東莞太守元載仕宋位益州刺史沈攸之之難元載起義送誠于髙帝封鄂縣子建元元年為左户尚書永眀四年位兖州刺史卒官諡烈子元載弟元邈字彥逺仕宋位青州刺史髙帝之鎮淮隂為宋眀帝所疑欲北親魏遣書結元邈元邈長史房叔安進曰布衣韋帶之士銜一餐而不忘義使之然也今將軍居方州之重託君臣之義無故舉忠孝而棄之三齊之士寧蹈東海死耳不敢隨將軍也元邈意乃定仍使叔安使建鄴發髙帝謀髙帝於路執之并求元邈表叔安答曰寡君使表上天子不上將軍且僕之所言利國家而不利將軍無所應問荀伯玉勸殺之髙帝曰物各為主無所責也元邈罷州還髙帝塗中要之元邈嚴軍直過還都啓宋眀帝稱髙帝有異謀髙帝不恨也升眀中髙帝引為驃騎司馬泰山太守元邈甚懼髙帝待之如初再遷西戎校尉梁南秦二州刺史封河陽縣侯兄弟同時為方伯建元初亡命李烏奴作亂梁部元邈使人偽降烏奴告之曰王使君兵弱㩗愛妾二人已去矣烏奴喜輕兵襲州城元邈出竒兵破之髙帝聞之曰元邈果不負吾延興元年為中護軍眀帝使元邈往江州殺晉安王子懋元邈苦辭不行及遣王廣之往廣陵取安陵王子敬元邈不得已奉旨建武中卒於護軍贈雍州刺史諡壯侯叔安字子仁清河人髙帝即位懷其中正時為益州司馬寧蜀太守就拜前將軍方用為梁州會病卒帝歎曰叔安節義古人中求之耳恨不至方伯而終子長瑜亦有義行永眀中為州中從事袁彖字緯才陳郡陽夏人宋贈侍中湛之從曽孫也湛自有傳祖洵吳郡太守父覬好學美才早有清譽位武陵內史彖少有風氣善屬文及談元舉秀才歷王府參軍不就覬臨終與兄雍州刺史顗書曰史公才識可喜足懋先基矣史公彖小字也及顗在雍州舉兵事敗為宋眀帝所誅投尸于江不許斂葬彖與舊奴一人微服求尸四十餘日乃得密瘞石頭後岡身自負土懷其文集未嘗離身眀帝崩後乃改葬顗從叔司徒粲祖舅征西將軍蔡興宗並器之仕宋為高帝太傅相國主簿祕書丞入齊為中書郎兼太子中庶子又以中書郎兼御史中丞坐彈謝超宗簡奏依違免官後拜廬陵王咨議時南郡江陵縣人茍蔣之弟胡之婦為曾口寺沙門所淫夜入茍家蔣之殺沙門為官司所檢蔣之列家門穢行欲告則恥欲忍則不可實已所殺胡之列又如此兄弟爭死江陵令宗躬啓州荆州刺史廬江王求博議彖曰夫迅寒急節乃見松筠之操危機回構方識貞孤之風竊以蔣之胡之殺人原心非暴辨讞之日友于讓生事憐左右義哀行路昔文舉引謗獲漏疏網蔣之心迹同符古人若陷以深刑實傷為善由是蔣之兄弟免死纍遷太子中庶子出為冠軍將軍監吳興郡事彖性剛固以微言忤武帝又薄王晏為人晏請交不答武帝在便殿用金柄刀子翦爪晏在側曰外聞有金刀之言恐不宜用此物帝窮問所以晏曰袁彖為臣説之上䘖怒良久彖到郡坐逆用祿錢免官付東冶彖妹為竟陵王子良妃子良世子昭胄時年八嵗見武帝而形容慘悴帝問其故昭胄流涕曰臣舅負罪今在尚方臣母悲泣不食已積日臣所以不寧帝曰特為兒赦之既而帝遊孫陵望東冶曰冶中有一好貴囚數日與朝臣幸冶履行庫藏因晏飲賜囚徒酒肉敕見彖與語眀日釋之後為侍中彖充腴異衆每從射雉郊野數推扶乃能徒步幼而母卒養于伯母王氏事之如親閨門孝義隆昌元年卒諡靖子彖宗人廓之字思度宏之曽孫也父景雋宋世為淮南太守以非罪見誅廓之終身不聼音樂布衣蔬食足不出門示不臣于宋時又以比晉之王裒顔延之見其幼時歎曰有子如袁廓足矣齊國建方出仕稍至殿中郎王儉桞世隆傾心待之為太子洗馬于時何僴亦稱才子為文惠太子作楊畔歌辭甚惻麗太子甚悅廓之諌之曰夫楊畔既非典雅而聲甚哀思殿下當降意簫韶奈何聼亡國之音太子改容謝之劉祥字顯徴東莞莒人也曾祖穆之宋佐命元勳贈侍中司徒自有傳祖式之宣城淮南二郡太守俱有傳父敳太宰從事中郎祥宋世解褐為巴陵王征西行軍參軍少好文學性韻剛疏輕言肆行不避髙下建元中為正貟郎司徒褚淵入朝以腰扇鄣日祥從側過曰作如是舉止羞面見人扇鄣何益淵曰寒士不遜祥曰不能殺袁劉安得免寒士永眀初撰宋書譏斥禪代尚書令王儉密以啓聞武帝銜而不問歷臨川王驃騎從事中郎祥兄整為廣州卒官祥就整妻求還資事聞朝廷祥於朝士多所貶忽王奐為僕射祥與奐子融同載行至中堂見路人驅驢祥曰驢汝好為之如汝人才皆已為令僕矣其侮慢如此著連珠十五首以寄其懷其譏議者云希世之寶違時必賤偉俗之器無聖則淪是以眀玉黜于楚岫章甫窮于越人有以祥連珠啓武帝帝令御史中丞任遐奏其過惡付廷尉上别遣敕祥曰卿素無行檢朝野所悉輕棄骨肉侮蔑兄嫂此是卿家行不足乃無關他人見卿擬連珠寄意悖慢彌不可長當原卿性命令卿萬里思愆卿若能改革當令卿得還乃徙廣州不得意終日縱酒少時病卒陸澄字彥深吳郡吳人也祖劭臨海太守父瑗州從事澄少好學博覽無所不知行坐眠食手不釋卷起家太學博士宋太始初為尚書殿中郎議皇后諱班下應依舊稱姓左丞徐爰案司馬孚議皇后春秋逆王后于齊並不言姓澄以意立議坐免官白衣領職郎官舊坐杖有名無實澄在官積前後罰凡至千數後兼左丞泰始六年詔皇太子朝服衮冕九章澄與儀曹郎邱仲起議服冕以朝實著經文秦除六冕漢眀還備魏晉以來不欲令臣下服衮冕故位公者加侍官今皇太子禮絶羣后宜遵聖王盛典革近代之制纍遷御史中丞建元元年驃騎咨議沈憲等家奴客為劫子弟被劾憲等晏然左丞任遐奏澄不糾請免澄官上表自理言舊例無左丞糾中丞之儀詔外詳議尚書令褚淵檢宋以來左丞糾正而中丞不糾免官者甚衆奏澄諛聞膚見貽撓後昆上掩皇眀下籠朝議請以見事免所居官詔澄以白衣領職永眀元年纍遷度支尚書尋領國子博士尚書令王儉謂之曰昔曹志繆恱為此官以君繼之始無慙德儉嘗問澄曰崇禮門有鼓而未嘗鳴其事安在答曰江左草創崇禮闥皆是茅茨故設鼓有火則扣以集衆相傳至今又與王儉書陳王弼注易元學之所宗今若𢎞儒鄭注不可廢并言左氏杜學之長穀梁舊有麋信近益以范寧不足兩立世有一孝經題為鄭元注觀其用辭不與注書相類案元自序所注衆書亦無孝經且為小學之類不宜列在帝典儉答曰易體微逺實貫羣籍豈可專據小王便為該偹依舊存鄭髙尚來説元凱注傳超邁前儒穀梁小書無俟兩注存麋略范率由舊式凡此諸議並同雅論疑孝經非鄭所注僕以此書眀百行之首實人倫所先七略藝文並陳之六藝不與蒼頡凡將之流也鄭注虛實前代不嫌意謂可安仍舊立置儉自以博聞多識讀書過澄澄謂曰僕少來無事唯以讀書為業且年位已髙今君少便鞅掌王務雖復一覽便諳然見卷軸未必多僕儉集學士何憲等盛自商略澄待儉語畢然後談所遺漏數百十條皆儉所未覩儉乃歎服儉在尚書省出巾箱几案雜服飾令學士隸事事多者與之人人各得一兩物澄後來更出諸人所不知事復各數條并舊物奪將去轉散騎常侍祕書監吳郡中正光祿大夫加給事中尋領國子祭酒竟陵王子良得古器小口方腹而底平可容七八升以問澄澄曰此名服匿單于以與蘇武子良後詳視器底有字髣佛可識如澄所説隆昌元年以老疾轉光祿大夫加散騎常侍未拜卒諡靜子年七十澄當世稱為碩學讀易三年不解文義欲撰宋書竟不成王儉戲之曰陸公書厨也家多墳籍人所罕見撰地理書及雜傳死後乃出初澄弟鮮得罪宋世當死澄于路見舍人王道隆叩頭流血以此見原揚州主簿顧測以兩奴就鮮質錢鮮死子暉誣為買劵澄為中丞測遂為澄所抑世以此少之王諶字仲和東海郯人晉少傅雅元孫也祖慶貟外常侍父元閔護軍司馬宋大明中沈曇慶為徐州辟諶為迎主簿又為州迎從事湘東王彧國常侍鎮北行參軍及彧即帝位是為眀帝除司徒參軍帶薛令兼中書舍人諶有學義甚見親遇常在左右帝所行慘僻諶屢諌不從請退坐此繫尚方後拜中書侍郎明帝好圍碁置圍碁州邑以建安王休仁為圍碁州都大中正諶與太子右率沈勃尚書水部郎庾圭之彭城丞王抗四人為小中正朝請褚思莊傅楚之為清定訪問後為尚書左丞領東觀祭酒即眀帝所置總眀觀也遷黃門郎永明初纍遷豫章王太尉司馬武帝與諶相遇于宋眀之世甚委任之歷黃門郎領驍騎將軍太子中庶子諶貞正和謹朝廷稱為善人多與之厚八年轉冠軍將軍長沙王車騎長史徙廬江王中軍長史又徙西陽王子眀征虜長史行南兖府州事諶少貧常自紡績及通貴後每為人説之世稱其達九年卒諶從叔摛以博學見知尚書令王儉嘗集才學之士總校虛實類物隸之謂之隸事自此始也儉嘗使賔客隸事多者賞之事皆窮唯廬江何憲為勝乃賞以五花簟白團扇坐簟執扇容氣甚自得摛後至儉以所隸示之曰卿能奪之乎摛操筆便成文章既奧辭亦華美舉坐擊掌摛乃命左右抽憲簟手自掣取扇登車而去儉笑曰所謂大力者負之而趨竟陵王子良校試諸學士唯摛問無不對為秣陵令清直請謁不行羽林隊主潘敞有寵勢傾人主婦弟犯法敞為之請摛摛投書于地更鞭四十敞怒譛之眀曰而見代永明八年天忽黃色照地衆莫能解司徒法曹王融上金天頌摛曰是非金天所謂榮光武帝太恱用為永陽郡後卒于尚書左丞時有何憲者字子思廬江灊人博涉該通畢覽羣籍天閣寶祕人間散逸無遺漏焉任昉劉渢共執祕閣四部書試問其所知自甲至丁書説一事并敘述作之體連日纍夜莫見所遺宗人何遁退讓士也見而美之願與為友憲位夲州别駕國子博士永眀十年使于魏時又有孔蕩者字世逸會稽山隂人也好典故學與王儉至交升眀中為齊臺尚書儀曹郎屢針闕禮多見信納上謂王儉曰孔蕩真所謂儀曹不忝厥職也儉為宰相蕩常謀議帷幄每及選用頗失鄉曲情儉從容啓上曰臣有孔蕩猶陛下之有臣也永眀中為太子家令卒時人呼孔蕩何憲為王儉三公及卒儉惜之為撰祭文劉瓛字子圭沛郡相人晉丹陽尹琰六世孫也祖𢎞之給事中父惠臨賀太守瓛篤志好學博通訓義年五嵗聞舅孔熙先讀管寧傳欣然欲讀舅更為説之精意聼受曰此可及也宋大眀四年舉秀才兄璲亦有名先應州舉至是别駕東海王元曽與瓛父惠書曰此嵗賢子充秀州閭可謂得人除奉朝請不就兄弟三人共處蓬室一間為風所倒無以葺之怡然自樂習業不廢聚徒教授常有數十丹陽尹袁粲于後堂夜集聞而請之指聽事前古桞樹謂瓛曰人謂此是劉尹時樹每想髙風今復見卿清德可謂不衰矣薦為祕書郎不見用後拜安成王撫軍行參軍以公事免瓛素無宦情自此不復仕袁粲誅瓛微服往哭并致賻助髙帝踐阼召瓛入華林園談論問以政道答曰政在孝經宋氏所以亡陛下所以得之是也帝咨嗟曰儒者之言可寶萬世又謂瓛曰吾應天革命物議以為何如瓛對曰陛下誡前軌之失加之以寬厚雖危可安若循其覆轍雖安必危矣及出帝顧謂司徒褚淵曰方直乃爾學士故自過人敕瓛使數入而瓛自非詔見未常到宫門上欲用瓛為中書郎使吏部尚書何戢喻旨戢謂瓛曰上意欲以鳳池相處恨君資輕可且就前除少日當轉國子博士便即所授瓛曰平生無榮進意今聞得中書郎而拜記室豈夲心哉後以母老闕養重拜彭城郡丞司徒褚淵宣旨喻之答曰自省無廊廟才所願唯保彭城丞耳上又以瓛兼總眀觀祭酒除豫章王驃騎記室參軍丞如故瓛終不就武陵王曄為會稽太守上欲令瓛為曄講除會稽郡丞學徒從之者轉衆永眀初竟陵王子良請為征北司徒記室瓛與張融王思逺書言情固辭不受除步兵校尉又不拜瓛姿狀纖小儒學冠于當時都下士子貴逰莫不下席受業當時推其大儒以比古之曹鄭瓛謙率通美不以髙名自居逰詣故人唯一門生持胡牀隨後主人未通便坐門待答住在檀橋瓦屋數間皆上穿漏學徒景慕不敢指斥呼為青溪焉竟陵王子良親往修謁十年表武帝為瓛立館以楊烈橋故主第給之生徒皆賀瓛曰室美豈為人哉此華宇豈吾宅邪幸可詔作講堂猶恐見害也未及徙居遇疾子良遣從瓛學者彭城劉繪順陽范縝將厨于瓛宅營齋及卒門人受學並弔服臨送時年六十六瓛有至性祖母病疽經年手持膏藥糊指為爛母孔氏甚嚴眀嘗謂親戚曰阿稱便是今世曽子阿稱瓛小名也年四十餘未有婚對建元中髙帝與司徒褚淵為瓛娶王氏女王氏因穿壁挂履土落孔氏牀上孔氏不悅瓛怒即出其妻及居母憂不出廬足為之屈杖不能起此山常有鴝鵒鳥瓛在山三年不敢來服釋還家此鳥乃至梁武帝少時嘗經伏膺及天監元年下詔為瓛立碑諡曰貞簡先生所著文集行于世初瓛講月令畢謂學生嚴桓之曰江右以來陰陽歷數之學廢矣吾今講此曽不得其倣佛學者美其退讓時濟陽蔡仲熊禮學博聞謂人曰五音夲在中土故氣韻調平今既東南土氣偏詖故不能感動木石瓛亦以為然仲熊執經議論往往與時宰不合亦終不改操求同故坎壈不進歷年方至尚書左丞當時恨其不遇又東陽婁幼瑜字季玉著禮捃拾三十卷瓛弟璡字子敬方軌正直儒雅不及瓛而文采過之宋泰豫中為眀帝挽郎建元初為武陵王曄冠軍征虜參軍曄與僚佐飲自割鵝炙璡曰應刃落爼是宰夫之事殿下親執鸞刀下官未敢安席因起請退與友人會稽孔蕩同舟入東於塘上遇一女子蕩目送曰美而豔璡曰斯豈君子所宜言乎非吾友也于是解裳自隔或曰與友孔徹同舟入東徹留目觀岸上女子璡舉席自隔不復同坐兄瓛夜隔壁呼璡共語不答方下牀著衣立然後應瓛怪其久璡曰向來束帶未竟其立操如此文惠太子召璡入侍東宫每上事輒削草尋署射聲校尉卒于官時濟陽江重欣亦清介雖處暗室如對嚴賔而不及璡也重欣位至射聲校尉陸慧曉字叔眀吳郡吳人晉太尉玩之元孫也自玩至慧曉祖萬載世為侍中皆有名行伯父仲元又為侍中時人方之金張二族父子真仕宋為海陵太守時中書舍人狄當見幸家在海陵假還葬父子真不與相聞當請發人修橋又以妨農不許彭城王義康聞而賞之王僧達貴公子孫以才傲物為吳郡太守入昌門曰彼有人焉顧琛一公兩掾英英門户陸子真五世內侍我之流亞子真自臨海太守眼疾歸為中散大夫卒慧曉清介正立不雜交逰會稽內史同郡張緒稱之曰江東裴樂也初應州郡辟舉秀才歷諸府行參軍以母老還家侍養十餘年不仕高帝輔政除為尚書殿中郎鄰族來相賀慧曉舉酒曰陸慧曉年踰三十婦父領選始作尚書郎卿輩乃復以為慶邪髙帝表禁奢侈慧曉撰答詔草為帝所賞引為太傅東閣祭酒建元初仍遷太子洗馬廬江何點常稱慧曉心如照鏡遇形觸物無不朗然王思逺常如懷氷暑月亦有霜氣當時以為實録慧曉與張融並宅其間有池池上有二株楊栁何點歎曰此水便是醴泉此木便是交讓及武陵王曄出守會稽上為精選僚吏以慧曉為征虜功曹與府參軍沛國劉璡同從述職璡清介士也行至吳璡謂人曰吾聞張融與陸慧曉並宅其間有水必有異味遂命駕往酌而飲之曰飲此水則鄙吝之萌盡矣何點薦慧曉于豫章王嶷補司空掾加以恩禮纍遷安西咨議領冠軍録事參軍武帝第三子廬陵王子卿為南豫州刺史帝稱其小名謂司徒竟陵王子良曰烏熊癡如熊不得天下第一人為行事無以壓一州既而曰吾思得人矣乃使慧曉為長史行事臨别帝問曰卿何以輔持廬陵答曰靜以修身儉以養性靜則人不擾儉則人不煩上大恱後為司徒右長史時陳郡謝朏為左長史府公竟陵王子良謂王融曰我府二上佐求之前代誰比融曰眀公二上佐天下英奇少見其比子良西邸抄書令慧曉參知其事尋遷西陽王征虜巴陵王後軍臨汝公輔國三府長史行府州事復為西陽王左軍長史領會稽郡丞行郡事隆昌元年徙為晉熙王冠軍長史江夏內史行郢州事慧曉歷輔五政治身清肅僚佐以下造詣必起送之或謂慧曉曰長史貴重不宜妄自謙屈答曰我性惡人無禮不容不以禮處人未嘗卿士大夫或問其故慧曉曰貴人不可卿而賤者乃可卿人生何容立輕重于懷抱終身常呼人位建武初除西中郎長史行事內史如故俄徴黃門郎未拜遷吏部郎尚書令王晏選門生補內外要局慧曉為用數人而止晏恨之送女伎一人欲與申好慧曉不納吏曹都令史歷政以來咨執選事慧曉任已獨行未嘗與語帝遣主書單景俊以事詣問慧曉仍謂曰都令史諳悉舊貫可共參懷慧曉謂景俊曰六十之年不能復咨都令史為吏部郎也上若謂身不堪便當拂衣而退帝甚憚之後欲用為侍中以形短小乃止出為晉安王鎮北司馬征北長史東海太守行府州事入為五兵尚書行揚州事崔慧景事平領右軍將軍出監南徐州朝議復欲以為侍中王亮曰濟河須人今且就朝廷借之以鎮南兖州王瑩王志皆曰侍中彌須英華方鎮猶應有選者亮曰角其二者則貂璫緩拒冦切當今朝廷甚弱宜從其切者乃以為輔國將軍南兖州刺史加都督至鎮俄爾以疾卒贈太常三子僚佐倕並有聲時人謂之三陸初授慧曉兖州三子依次第作一讓表辭並雅麗時人歎伏僚學涉子史長于微言美姿容鬚眉如畫位西昌侯長史蜀郡太守倕梁史有傳慧曉兄子間字遐業有風槩與人交不茍合少為同郡張緒所知仕至揚州别駕眀帝崩間謂所親人曰宫車晏駕百司將聼冢宰主上地重才弱必不能振難將至矣乃感心疾不復預州事永元末刺史始安王遙光據東府作亂或勸去之間曰吾為人吏何可逃死臺軍攻陷城間以綱佐被收至杜姥宅尚書令徐孝嗣啓間不預逆謀未及報徐世摽命殺之間四子厥絳完襄絳字魏卿時隨間抱頸求代死不遂以身蔽刀刃行刑者俱害之厥字韓卿少有風槩雅好屬文永眀元年詔百官舉士同郡司徒左西曹掾顧皓之表薦厥州舉秀才時盛為文章吳興沈約陳郡謝朓琅邪王融以氣類相推轂汝南周顒善識聲韻約等文皆用宫商將平上去入四聲以此制韻有平頭上尾蜂腰鶴膝五字之中音韻悉異兩句之內角徴不同不可增減世呼為永眀體沈約宋書謝靈運傳後又論其事厥與約書曰范詹事自序性别宫商識清濁特能適輕重濟艱難古今文人多不全了斯處縱有會此者不必從根夲中來尚書亦云自靈均以來此祕未覩或間與理合匪由思至張蔡曺王曾無先覺潘陸顔謝去之彌逺大旨與宫羽相變低昂舛節若前有浮聲則後須切響一簡之內音韻盡殊兩句之中輕重悉異辭既美矣理又善焉但觀歷代衆賢似不都諳此處而云此祕未覩近于誣乎案范云不從根夲中來尚書云匪由思至斯則揣情謬于元黃擲句著其音律也范又云時有會此者尚書云或暗與理合則美韻清謳有辭章韻調者雖有差謬亦有會合推此以往可得而言夫思有合離前哲同所不免文有開塞即事不得無之子建所以好人譏彈士衡所以遺恨終篇既曰遺恨非盡美之作理可詆訶君子執其詆訶便謂合理為暗豈如指其合理而寄詆訶為遺恨邪自魏文屬論深以清濁為言劉楨奏書大眀體勢之致齟齬妥帖之談操末續巔之説興元黃于律吕比五色之相宣茍此祕未覩兹論為何所指邪愚謂前英已早識宫徴但未屈曲指的若今論所申至于掩瑕藏疾合少謬多則臨淄所云人之著述不能無病者也非知之而不改謂不改則不知斯曹陸又稱竭情多悔不可力強者也今許以有病有悔為言則必自知無悔無病之地引其不了不合為暗何獨誣其一合一了之地乎意者亦質文時異今古好殊將急在情物而緩于章句情物文之所急美惡猶且相半章句意之所緩故合少而謬多義兼于斯必非不知眀矣長門上林殆非一家之賦洛神池鴈便是二體之作孟堅精正詠史無虧于東主平子恢富羽獵不纍于憑虛王粲初征他文未能稱是楊修敏捷暑賦彌日不獻率意寡尤則事促乎一日翳翳愈伏而理賖于七步一人之思遲速天懸一家之文工拙壤隔何獨宫商律吕必責其如一邪論者乃可言未窮其致不得言曽無先覺也約答曰宫商之聲有五文字之别纍萬以纍萬之繁配五聲之約髙下低昂非思力所學又非止若思而已十字之文顛倒相配字不過十巧歷已不能盡何況復過於此者乎靈均以來未經用之于懷抱固無從得其髣佛矣若斯之妙而聖人不尚何邪此蓋曲折聲韻之巧無當于訓義非聖哲元言之所急也是以子雲譬之雕蟲篆刻云壯夫不為自古辭人豈不知宫羽之殊商徵之别雖知五音之異而其才參差變動所昧實多故鄙意所謂此祕未覩者也以此而推則知前世文士便未悟此處若以文章之音韻同弦管之聲曲美惡妍蚩不得頓相乖反譬猶子野操曲安得忽有闡緩失調之聲以洛神比陳思他賦有似異手之作故知天機啓則律吕自調六情滯則音律頓舛也士衡雖云煥若縟錦寧有濯色江波其中復有一片是衛文之服此則陸生之言即復不盡者矣韻與不韻復有精粗輪扁不能言之老夫亦不辨盡此約論四聲妙有銓辨而諸賦亦往往與聲韻乖時有王斌者不知何許人著四聲論行于時斌初為道人博涉經籍雅有才辨善屬文能唱導而不修容儀嘗弊衣于瓦官寺聽雲法師講成實論無復坐處唯僧正慧超尚空席斌直坐其側慧超不能平乃罵曰那得此道人祿蔌似隊父唐突人因命驅之斌笑曰既有敘勳僧正何為無隊父道人不為之動而撫機問難辭理清舉四坐皆屬目後還俗以詩樂自樂人莫能名之永元元年始安王遙光事難厥父間被誅厥坐繫尚方尋有赦厥感慟而卒年二十八文集行于世時又有會稽虞炎以文學與沈約俱為文惠太子所遇意眄殊常官至驍騎將軍厥弟襄附載倕傳孔稚圭字德璋會稽山隂人也祖道隆位侍中父靈産泰始中罷晉安太守有隱遁之志于禹井山立館事道精篤吉日于靜屋四面朝拜涕泗滂沱東出過錢塘北郭輒於舟中遙拜杜子恭墓自此至都東向坐不敢背側元徽中為中散大夫頗解天文好術數髙帝輔政沈攸之起兵靈産密白髙帝曰沈攸之兵衆雖強以天時冥數而觀無能為也髙帝驗其言擢遷光祿大夫以簏盛靈産上靈臺令其占候餉靈産白羽扇素隱几曰君有古人之風故遺君古人之服當世榮之稚圭少學涉有美譽太守王僧虔見而重之引為主簿州舉秀才再遷殿中郎髙帝為驃騎以稚圭有文翰取為記室參軍與江淹對掌辭筆為尚書左丞父憂去官與兄仲智還居父山舍仲智妾李氏驕妬無禮稚圭白太守王敬則殺之永眀中歷位黃門郎太子中庶子廷尉江左相承用晉世張裴杜預注律二十卷曰張杜律武帝留心法令數訊囚徒詔獄官詳正舊注先是尚書刪定郎王植撰定律奏之削其煩害録其允𠂻取張裴注七百三十一條杜預注七百九十一條或二家兩釋于義乃備者又取一百十條其注相同者取一百三條集為一書凡一千五百三十二條為二十卷請付外詳校擲其違繆詔從之於是公卿八座參議考正舊注有輕重處竟陵王子良下意多使從輕其中朝議不能斷者則制旨平決至九年成書稚圭表上律文二十卷録序一卷所奏獲允者宜寫律上國學置律助教依五經例國子有欲讀者策試上過第即擢用使處法職以勸士流詔報從之事竟不行轉御史中丞建武初為平西長史南郡太守稚圭以魏連嵗南伐百姓死傷乃上表陳通和之策帝不從徵侍中不行留夲任稚圭風韻清疏好文詠飲酒七八斗與外兄張融情趣相得又與琅邪王思逺廬江何點點弟允並欵交不樂世務居宅盛營山水憑几獨酌傍無雜事門庭之內草萊不翦中有蛙鳴或問之曰欲為陳蕃乎稚圭笑答曰我以此當兩部鼓吹何必效蕃王晏嘗鳴鼓吹候之聞羣蛙鳴曰此殊聒人耳稚圭曰我聽鼓吹殆不及此晏甚有慙色永元元年為都官尚書遷太子詹事加騎常侍三年稚圭疾東昏屏除以牀舁之走因此疾甚遂卒贈金紫光祿大夫周顒字彥倫汝南安成人晉左光祿大夫顗七世孫也祖虎頭員外常侍父恂歸鄉相顒少為族祖朗所知解褐海陵國侍郎益州刺史蕭惠開賞異顒携入蜀為厲鋒將軍帶肥鄉成都二縣令仍為府主簿嘗謂惠開性太險每致諌惠開不恱答顒曰天險地險王侯設險但問用險何如耳隨惠開還都宋明帝頗好元理以顒有辭義引入殿內親近宿直帝所為慘毒之事顒不敢顯諌輒誦經中因緣罪福事帝亦為之小止元徽中詔為郯令有恩惠百姓思之髙帝輔政引接顒顒善尺牘沈攸之送絶交書髙帝口授令顒裁答轉齊臺殿中郎建元初為長沙王後軍參軍山隂令還為文惠太子中軍録事參軍文惠在東宫顒遷正貟郎始興王前軍咨議直侍殿省深見賞遇顒音辭辨麗出言不窮宫啇朱紫發口成句泛涉百家長于佛理著三宗論言空假義西涼州智林道人遺顒書深相贊美言捉塵尾來四十餘載頗見宗録唯此塗白黑無一人得者為之發病非意此音猥來入耳其論見重如此顒于鍾山西立隱舍休沐則歸之轉太子僕射兼著作撰起居注遷中書郎兼著作常遊侍東宫少從外氏車騎將軍臧質家得衛恆散隸書法學之甚工文惠太子使顒書元圃茅齋壁國子祭酒何允以倒薤書來就顒換之顒笑而答曰天下有道邱不與易也每賔友會問顒虛席晤語辭韻如流聼號者忘倦兼善老易與張融相遇輒以元言相滯彌日不解清貧寡欲終日長蔬雖有妻子獨處山舍衛將軍王儉謂顒曰卿山中何所食顒曰赤米白鹽緑葵紫蓼文惠太子問顒菜食何味最勝顒曰春初早韭秋末晚菘時何允亦精言佛法無妻妾太子又問顒卿精進何如何允顒曰三塗八難共所未免然各有其纍太子曰所纍伊何對曰周妻何肉其言辭應變皆如此也轉國子博士兼著作郎如故太學諸生慕其風爭事華辨始著四聲切韻行于世後卒于官子捨列在陳史庾杲之字景行新野人也祖深之位義興太守雍州刺史以善政聞父粲為宋南郡王義宣丞相城局參軍王舉兵見殺杲之幼有孝行宋司空劉勔見而奇之謂曰見卿足使江漢崇望杞梓發聲解褐奉朝請稍遷駕部郎清貧自業食唯有韭葅草瀹韭生韭雜菜任昉戲之曰誰謂庾郎貧食鮭常有二十七種言三九也纍遷尚書左丞衛軍王儉謂人曰昔袁公作衛軍欲用我為長史雖不獲就要是意向如此今應須如我輩人也乃用杲之為衛軍長史安陸侯蕭緬與儉書曰盛時元僚實難其選庾景行泛緑水依芙蓉何其麗也時人以入儉府為蓮花池故緬書美之歷位黃門吏部郎御史中丞參掌大選杲之風範和潤善音吐武帝令對魏使兼侍中上每歎其風姿之美栁世隆在御座謂武帝曰庾杲之為蟬冕所映彌有華采陛下故當與其即真上甚悅王儉乃曰國家以杲之清美所以許其假職若以其即真當在胡諧之後武帝嘗與朝臣商略酒後謂羣臣曰我後當得何諡羣臣莫有答者王儉因目杲之杲之從容曰陛下夀等南山方與日月齊眀千載之後豈是臣子輕所仰量時人雅歎其辨答杲之嘗兼主客郎對魏使使問杲之曰百姓那得家家題門帖賣宅答曰朝廷既欲掃蕩京洛尅復神州所以家家賣宅耳魏使縮鼻而不答時諸王年少不得妄稱接人敕杲之及濟陽江淹五日一詣諸王使申逰好再遷吏部郎參大選事太子右衛率加通直常侍九年卒上甚惜之諡曰貞子江斆字叔文濟陽考城人也曾祖夷宋湘州刺史自有傳祖湛吏部尚書父任著作佐郎斆母宋文帝女淮陽長公主幼以戚屬召見孝武謂謝莊曰此小兒方當為名器少有美譽尚孝武女臨汝公主拜駙馬都尉為丹陽丞時袁粲為尹見斆歎曰風流不墜政在江郎數與宴賞留連日夜遷中書郎斆庶祖母王氏老疾斆視膳嘗藥七十餘日不解衣及纍居內官每以侍奉陳請朝廷優其朝直初湛娶褚秀之女大義不終褚淵為衛軍重斆為人先通意引為長史隨府轉司空長史領臨淮太守轉髙帝太尉從事中郎齊臺建為吏部郎髙帝即位斆以祖母久疾連年臺閣之職永廢溫凊啓求自解初宋眀帝敕斆出繼其叔遜為從祖淳後于是僕射王儉啓禮無後小宗之文近世緣情皆由父祖之命未有既孤之後出繼宗族也雖復臣子一揆而義非天屬江忠簡允嗣所寄唯斆一人傍無期屬斆宜還夲若不欲江遜絶後可以斆小兒繼遜為孫尚書參議以間世立後禮無其文荀顗無子立孫墜禮之始何琦又立此論義無所據于是斆還夲家詔使自量立後者出為豫章內史還除太子中庶子未拜門客通贓利武帝遣使檢覆斆藏此客而躬自引咎上甚有怪色王儉從容啓上曰江斆若能臨郡此便是具美耳上意乃釋永明中為竟陵王司馬斆好文辭圍碁第五品為朝貴中最遷侍中歷五兵尚書東陽吳二郡太守復為侍中尋轉都官尚書領驍騎將軍王晏啓武帝曰江斆今重登禮閣兼掌六軍慈渥所覃實有優忝但語其事任殆同間輩天旨既欲升其名位愚謂以侍中領驍騎望實清顯有殊納言上曰斆常啓吾為其鼻中惡今既以何允王瑩還門下故有此回換耳先是中書舍人紀僧真得幸于武帝稍歷軍校容表有士風謂帝曰臣小人出自夲縣武吏邀逄聖時階榮至此為兒婚得荀昭光女即時無復所須唯就陛下乞作士大夫帝曰由江斆謝草瀹我不得厝此意可自詣之僧真承旨詣斆登榻坐定斆便命左右曰移吾牀讓客僧真喪氣而退告武帝曰士大夫故非天子所命時人重斆風格不為權幸降意隆昌元年為侍中領國子祭酒鬱林廢朝臣皆被召入宫斆至雲龍門方知廢立託散動醉吐車中而去眀帝即位改領祕書監又改領晉安王師卒年四十四遺令不受賻贈詔賻錢三萬布百匹子蒨啓遵斆命不受詔嘉美之從其所請贈散騎常侍太常卿諡曰敬子子蒨列在梁史何戢字惠景廬江灊人也祖尚之宋中書令自有傳父偃吏部尚書被遇于孝武帝戢以選尚山隂公主拜駙馬都尉纍遷中書郎景和世山隂主就帝求吏部郎禇淵入內侍已淵雖見拘迫終不肯從與戢同居止月餘由是特申情好元徽初淵參朝政引戢為侍中時年二十九戢以年未三十苦辭內侍改授司徒左長史髙帝為領軍與戢來往數申歡宴上好水引餅戢令婦女躬自執事以設上焉久之復為侍中纍遷髙帝相國長史建元元年遷散騎常侍太子詹事尋改侍中詹事如故上欲轉戢領選問尚書令褚淵以戢資重欲加散騎常侍淵曰宋世王球從侍中中書令單作吏部尚書資與戢相似領選職方昔少輕不容頓加常侍聖旨每以蟬冕不宜過多臣與王儉既已左珥若復加戢則八座便有三蟬若帖以驍騎亦不為少乃以戢為吏部尚書加驍騎將軍戢美容儀動止與褚淵相慕時人呼為小褚公家業富盛性又華侈衣被服飾極為奢麗出為左衛將軍吳興太守上頗好畫扇宋孝武曽賜戢蟬雀扇乃顧景秀所畫時吳郡陸探微顧彥先皆能畫歎其巧絶戢因王晏獻之上令晏厚酬其意眀年卒時年三十六諡懿子女為鬱林王后以后父追贈侍中右光祿大夫戢從叔昌宇字儼望父佟之位侍中昌宇少而清靖獨立不羣所交者必當世清名是以風流籍甚仕宋為尚書儀曹郎建平王景素征北南徐州府主簿以風素見重母老求祿出為湘東太守還為髙帝驃騎功曹昌宇在郡景素被誅昌宇痛之至是啓髙帝理其寃又與司空褚淵書極言之髙帝嘉其義歷位中書郎王儉衛軍長史儉謂昌宇曰後任朝事者非卿而誰臨海王昭秀為荆州以昌宇為西中郎長史南郡太守行荆州事眀帝將踐阼先使裴叔業齎旨詔昌宇令以便宜從事昌宇拒之曰國家委身以上流之重付身以萬里之事臨海王未有失寧得從君單詔邪即時自有啓聞須反更議叔業曰若爾便是拒詔拒詔軍法行事耳答曰能見殺者君也能拒詔者僕也君不能見殺政有沿流之計耳昌宇素有名德叔業不敢逼而退上聞而嘉之昭秀由此得還都昌宇後為吏部尚書嘗有一客姓閔求官昌宇謂曰君是誰後答曰子騫後昌宇以團扇掩口而笑謂坐客曰遙遙華胄昌宇不雜交遊通和泛愛歷郡皆以清白稱後卒於侍中領驍騎將軍贈太常諡曰簡子子敬容後史有傳蔡約字景撝濟陽考城人也祖廓宋祠部尚書自有傳父興宗光祿大夫約少尚宋孝武帝女安吉公主拜駙馬都尉仕齊纍遷太子中庶子領屯騎校尉永眀八年八月合朔約既武冠解劒于省眠至下鼓不起為有司所奏贖論出為宜都王冠軍長史淮南太守行府州事武帝謂曰今用卿為近藩上佐想副我所期約曰南豫密邇京師不化自理臣亦何人爝火不息時諸王行事多相裁割約居右任主佐之間穆如也遷司徒左長史眀帝為録尚書輔政百僚脫屐到席約躡屐不改帝謂江祏曰蔡氏是禮度之門故自可悅祏曰大將軍有揖客復見於今約好飲酒夷淡不與世雜永元二年卒於太子詹事年四十四贈太常弟樽列在梁史裴昭眀河東聞喜人祖松之宋光祿大夫自有傳父駰南中郎外兵參軍昭眀少傳儒史之業宋泰始中為太學博士有司奏太子婚納徵用玉璧虎皮未詳何所凖擬昭眀議曰禮納徵儷皮鄭云皮為庭實鹿皮也晉太子納妃注以虎皮二太元中公主納徵虎豹皮各一此豈謂婚禮不詳王公之差故取虎豹文蔚以尊其事虎豹雖文而徵禮所不言熊羆雖古而婚禮所不及圭璋雖美或為用各異今宜凖經誥凡諸僻謬一皆詳正於是有司參議加圭璋豹熊羆皮各二元徽中出為長沙郡丞罷任刺史王藴之謂曰卿清貧必無還資湘中人士有須一禮之命者我不愛也昭眀曰下官忝為郡佐不能光益上府豈以鴻都之事仰纍清風歷祠部通直郎永眀三年使魏武帝謂之曰以卿有將命之才使還當以一郡相賞還為始安內史郡人龔元宣云神人與其玉印玉版書不須筆吹紙便成字自稱龔聖人以此惑衆前後郡太守敬事之昭眀付獄案罪及還甚貧罄武帝曰裴昭眀罷郡還遂無宅居我不讀書不知古人中誰可比之遷射聲校尉九年復北使建武初為王元邈安北長史廣陵太守眀帝以其在事無啓奏代還責之昭眀曰臣不欲競執關鍵故耳昭眀歷郡皆清勤常謂人曰人生何事須聚畜一身之外亦復何須子孫若不才我聚彼散若能自立則不如一經故終身不治産業中興二年卒子子野列在梁史顧憲之字士思吳郡吳人宋湘州刺史覬之之孫也覬之自有傳憲之性清直宋元徽中為建康令時有盜牛者與夲主爭牛各稱已物二家辭證等前後令莫能決憲之至覆其狀乃令解牛任其所去牛徑還夲宅盜者始伏其罪時人號曰神眀至於權要請託長史貪殘據法直繩無所阿縱性又清儉強力為政甚得人和故都下飲酒者醇旨輒號為顧建康謂其清且美焉仕齊為衡陽內史先是郡境連嵗疾疫死者太半棺槨尤貴悉裹以葦席棄之路傍憲之下教分告屬縣求其親黨悉令殯葬其家人絶滅者憲之出公祿使綱紀營護之又土俗山人有病輒云先亡為禍皆開冢剖棺水洗枯骨名為除祟憲之曉喻為陳死生之别事不相由風俗遂改時刺史王奐初至唯衡陽獨無訟者乃歎曰顧衡陽之化至矣若九郡率然吾將何事後為東中郎長史行會稽郡事山隂人吕文度有寵于武帝於餘姚立邸頗縱橫憲之至郡即日除之文度後還葬郡縣爭赴弔憲之不與相聞文度甚䘖之亦卒不能傷也時西陵戍主杜元懿以吳興嵗儉會稽年登商旅往來倍於他嵗西陵牛埭稅官格曰三千五百求加至一倍計年長百萬浦陽南北津及栁浦四埭乞為官領攝一年格外長四百許萬武帝以示會稽使陳得失憲之議曰尋始立牛埭非茍通僦以納稅也當以風濤迅險人力不捷立此濟急以利物耳既公私是樂故輸直無怨京師航渡即其例也而後之監領各務已功或禁遏别道又生理外凡如此類不經埭煩牛者上詳被報蒙停格外十條從來喧訴始得暫弭案吳興頻嵗失稔今兹尤饉去乏從豐良由飢餒舊格新減尚未議登格外加倍將以何術皇慈恤隱振廩蠲調而元懿幸災榷利重增困瘼人而不仁古今共疾且比見加格置市者前後相屬非唯新加無贏並皆舊格有闕愚恐元懿今啓亦當不殊若事不副言懼貽譴詰便百方侵苦為公賈怨為害不小又言民間利病數事武帝並從之由是深以方直見知遷南中郎巴陵王長史南兖南豫二州事典籖咨事未嘗接以顔色動遵法制時司徒竟陵王於宣城臨成定陵三縣界立屯封山澤數百里禁人樵採憲之固陳不可言甚切直王曰非君無以聞此德音即命罷屯禁遷給事黃門郎兼尚書吏部郎中宋時其祖覬之嘗為吏部于庭列植嘉樹謂人曰吾為憲之植耳至是憲之果為此職永眀中為豫章內史在任清簡務存寬惠有貞婦萬晞者少孀居無子事舅姑尤孝父母欲奪而嫁之誓死不許憲之賜以束帛表其節義梁武平建鄴為揚州牧徴憲之為别駕從事史比至而已受禪憲之風疾漸篤因求還吳就加太中大夫憲之雖纍經宰郡資無儋石及歸蕭然環堵不免飢寒天監八年卒於家臨終為制敕其子薄葬務從簡素所著詩賦銘讃并衡陽郡記數十篇孔琇之會稽山隂人宋侍中特進左光祿大夫靖之孫也靖自有傳父靈運著作郎琇之幼為國子生舉孝亷補吳令有小兒年十嵗偷刈鄰家稻一束琇之付獄案罪或諌之答曰十嵗便能為盜長大何所不為縣中皆震肅遷尚書左丞又以職事知名後兼左户尚書廷尉卿出為臨海太守在任清約罷郡獻乾薑二十斤武帝嫌其少及知琇之清乃歎息出監吳興郡尋拜太守政稱清嚴眀帝輔政防備諸藩致密旨于上佐使便宜從事隆昌元年遷晉熙王冠軍長史江夏內史行郢州事欲令殺晉熙琇之辭不許欲自引決友人陸間諌之琇之不從遂不食而死子臻至太子舍人尚書三公郎臻子幼孫梁寧逺枝江公主簿無錫令幼孫子奐奐列在陳史王逡之字宣約琅邪臨沂人晉尚書僕射彬元孫也曽祖彪之位尚書令祖臨之御史中丞父瓌之司空咨議參軍從兄準之宋丹陽尹贈太常逡之少好學博聞仕宋位吳令升眀末尚書左僕射王儉重儒術逡之以著作郎兼尚書左丞參定齊國儀禮初儉檢撰古今喪服集記逡之難儉十一條更撰世行五卷時國學久廢建元二年逡之先上表立學轉國子博士又兼著作郎永眀起居注後位南康相光祿大夫加給事中逡之率素衣裳不浣几案塵黑年老手不釋卷建武二年卒從弟圭之位長水校尉撰齊儀職永眀九年其子中軍參軍皓啓上其書凡五十卷詔付祕閣通志卷一百三十八
