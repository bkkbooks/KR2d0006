body:
  text: 欽定四庫全書御製重刻通志序宋鄭樵氏以閎通之學思欲極古今之變㑹通於一仿歴代史例采正史及百家雜録為紀𫝊為譜為略所撰二十略者包羅天人錯綜政典該括名物上下數千年首尾相属用功亦良勤矣觀其詆訶司馬遷班固之失髙自稱許謂足以盡學者之能事豈不卓然雄視著作之林而後人復厯舉其疎漏如馬端臨通考之所議者則亦不能為之諱也夫博物洽聞之士殫畢生之精力從容几研囊括貫串勒為成書宜其援据精而條理宻顧紀事纂言尚不免於紕繆若此豈非所謂多而不能無失者歟而况設局分曺成於衆手動淹嵗序舉後忘前亥豕魯魚觸目而是任撡觚者其可不知所懼也乎甚矣夫著述之難也好古者類矜三通既重刻通典通考工竣爰出内府通志善本校而付之剞劂以廣考索之助而序之如此乾隆己巳冬十一月欽定四庫全書史部四通志别史類提要臣等謹案通志二百卷宋鄭樵撰樵有爾雅註已著録通史之例肇於司馬遷故劉知㡬史通述二體則以史記漢書共為一體述六家則以史記漢書别為兩家以一述一代之事一總厯代之事也其例綜括千古歸一家言非學問足以該通文章足以鎔鑄則難以成書梁武帝作通史六百二十卷不久即已散佚故後有作者率莫敢措意於斯樵負其淹博乃網羅舊籍叅以新意撰為是編凡帝紀十八卷皇后列𫝊二卷年譜四卷畧五十一卷列𫝊一百二十五卷其紀𫝊刪録諸史稍有移掇大抵因仍舊目為例不純其年譜仿史記諸表之例惟間以大封拜大政事錯書其中或繁或漏亦復多岐均非其注意所在其平生之精力全帙之菁華惟在二十畧而已一曰氏族二曰六書三曰七音四曰天文五曰地理六曰都邑七曰禮八曰諡九曰器服十曰樂十一曰職官十二曰選譽十三曰刑法十四曰食貨十五曰藝文十六曰校讐十七曰圖譜十八曰金石十九曰災祥二十曰草木昆蟲其氏族六書七音都邑草木昆蟲五畧為舊史之所無案史通書志篇曰可以為志者其道有三一曰都邑志二曰氏族志三曰方物志樵増氏族都邑草木昆蟲三畧葢竊據是文至於六書七音乃小學之支流非史家之本義矜竒炫博泛濫及之此於例為無所取矣餘十五畧雖皆舊史所有然諡與器服乃禮之子目校讐圖譜金石乃藝文之子目析為别類不亦冗且碎乎且氏族畧多挂漏六書畧多穿鑿天文畧祗載丹元子步天歌地理畧則全抄杜佑通典州郡總序一篇前雖先列水道數行僅雜取漢書地理志及水經注數十則即禹貢山川亦未能一一詳載諡畧則别立數門而沈約扈琛諸家之諡法悉刪不録即唐㑹要所載杲字諸諡亦並漏之器服畧器則所載尊彛爵觶之制制既不詳又與金石畧複出服則全鈔杜佑通典之嘉禮其禮樂職官食貨選舉刑法六畧亦但刪録通典無所辨証至職官畧中以通典註所引之典故悉改為按語大書更為草率矣藝文畧則分門太繁又韓愈論語觧論語類前後兩出張弧素履子儒家道家兩出劉安淮南子道家襍家兩出荆浩筆法記乃論畫之語而列於法書類吳興人物志河西人物志乃𫝊記之流而列於名家類段成式之玉格乃酉陽襍俎之一篇而列於寳器類尤為荒謬金石畧則鐘鼎碑碣核以博古考古二圖集古金石二録脫畧至十之七八災祥畧則悉抄諸史五行志草木昆蟲畧則并詩經爾雅之注疏亦未能詳核葢宋人以義理相髙於考證之學罕能留意樵恃其該洽睥睨一世諒無人起而難之故髙視濶步不復詳檢遂不能一一精宻致後人多所譏彈也特其採摭既已浩博議論亦多警闢雖純駁互見而瑕不掩瑜究非游談無根者可及至今資為考鏡與杜佑馬端臨書並稱三通亦有以焉乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書通志總序宋右廸功郎鄭樵漁仲撰百川異趨必㑹於海然後九州無浸淫之患萬國殊途必通諸夏然後八荒無壅滯之憂㑹通之義大矣哉自書契以來立言者雖多惟仲尼以天縱之聖故總詩書禮樂而㑹于一手然後能同天下之文貫二帝三王而通為一家然後能極古今之變是以其道光明百世之上百世之下不能及仲尼既沒百家諸子興焉各效論語以空言著書論語門徒集仲尼語至於歴代實蹟無所紀繫迨漢建元元封之後司馬氏父子出焉司馬氏世司典籍工於制作故能上稽仲尼之意㑹詩書左傳國語世本戰國策楚漢春秋之言通黄帝堯舜至于秦漢之世勒成一書分為五體本紀紀年世家傳代表以正歴書以類事傳以著人使百代而下史官不能易其法學者不能舍其書六經之後惟有此作故謂周公五百歲而有孔子孔子五百歲而在斯乎是其所以自待者已不淺然大著述者必深於博雅而盡見天下之書然後無遺恨當遷之時挾書之律初除得書之路未廣亘三千年之史籍而跼蹐於七八種書所可為遷恨者博不足也凡著書者雖採前人之書必自成一家言左氏楚人也所見多矣而其書盡楚人之辭公羊齊人也所聞多矣而其書皆齊人之語今遷書全用舊文閒以俚語良由採摭未備筆削不遑故曰予不敢墮先人之言乃述故事整齊其傳非所謂作也劉知幾亦譏其多聚舊記時插雜言所可為遷恨者雅不足也大抵開基之人不免草創全屬繼志之士為之彌縫晉之乗楚之檮杌魯之春秋其實一也乗檮杌無善後之人故其書不行春秋得仲尼挽之於前左氏推之於後故其書與日月並傳不然則一卷事目安能行於世自春秋之後惟史記擅制作之規模不幸班固非其人遂失㑹通之㫖司馬氏之門户自此衰矣班固者浮華之士也全無學術專事剽竊肅宗問以制禮作樂之事固對以在京諸儒必能知之儻臣鄰皆如此則顧問何取焉及諸儒各有所陳固惟竊叔孫通十二篇之儀以塞白而已儻臣鄰皆如此則奏議何取焉肅宗知其淺陋故語竇憲曰公愛班固而忽崔駰此葉公之好龍也固於當時已有定價如此人材將何著述史記一書功在十表猶衣裳之有冠冕木水之有本原班固不通旁行邪上以古今人物彊立差等且謂漢紹堯運自當繼堯非遷作史記厠於秦項此則無稽之談也由其斷漢為書是致周秦不相因古今成間隔自髙祖至武帝凡六世之前盡竊遷書不以為慚自昭帝至平帝凡六世資於賈逵劉歆復不以為恥况又有曹大家終篇則固之自為書也幾希徃徃出固之胷中者古今人表耳他人無此謬也後世衆手修書道傍築室掠人之文竊鍾掩耳皆固之作俑也固之事業如此後來史家奔走班固之不暇何能測其淺深遷之於固如龍之於猪奈何諸史棄遷而用固劉知幾之徒尊班而抑馬且善學司馬遷者莫如班彪彪續遷書自孝武至於後漢欲令後人之續已如已之續遷既無衍文又無絶緒世世相承如出一手善乎其繼志也其書不可得而見所可見者元成二帝贊耳皆於本紀之外别記所聞可謂深入太史公之閫奥矣凡左氏之有君子曰者皆經之新意史記之有太史公曰者皆史之外事不為褒貶也間有及褒貶者褚先生之徒雜之耳且紀傳之中既載善惡足為鑒戒何必於紀傳之後更加褒貶此乃諸生決科之文安可施於著述殆非遷彪之意况謂為贊豈有貶辭後之史家或謂之論或謂之序或謂之銓或謂之評皆效班固臣不得不劇論固也司馬談有其書而司馬遷能成其父志班彪有其業而班固不能讀父之書固為彪之子既不能保其身又不能傳其業又不能教其子為人如此安在乎言為天下法范曄陳夀之徒繼踵率皆輕薄無行以速罪辜安在乎筆削而為信史也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也此言相因也自班固以斷代為史無復相因之義雖有仲尼之聖亦莫知其損益會通之道自此失矣語其同也則紀而復紀一帝而有數紀傳而復傳一人而有數傳天文者千古不易之象而世世作天文志洪範五行者一家之書而世世序五行傳如此之類豈勝繁文語其異也則前王不列於後王後事不接於前事郡縣各為區域而昩遷革之源禮樂自為更張遂成殊俗之政如此之類豈勝斷綆曹魏指吳蜀為寇北朝指東晋為僭南謂北為索虜北謂南為島夷齊史稱梁軍為義軍謀人之國可以為義乎隋書稱唐兵為義兵伐人之君可以為義乎房元齡董史册故房彦謙擅羙名虞世南預修書故虞荔虞寄有嘉傳甚者桀犬吠堯吠非其主晋史黨晋而不有魏凡忠於魏者目為叛臣王淩諸葛誕母邱儉之徒抱屈黃壤齊史黨齊而不有宋凡忠於宋者目為逆黨袁粲劉秉沈攸之之徒含寃九原噫天日在上安可如斯似此之類歴世有之傷風敗義莫大乎此遷法既失固弊日深自東都至江左無一人能覺其非惟梁武帝為此慨然乃命吳均作通史上自太初下終齊室書未成而均卒隋楊素又奏令陸從典續史記訖于隋書未成而免官豈天之靳斯文而不傳與抑非其人而不祐之與自唐之後又莫覺其非凡秉史筆者皆凖春秋專事褒貶夫春秋以約文見義若無傳釋則善惡難明史冊以詳文該事善惡已彰無待美刺讀蕭曹之行事豈不知其忠良見莽卓之所為豈不知其㐫逆夫史者國之大典也而當職之人不知留意於憲章徒相尚於言語正猶當家之婦不事饔飱專鼓唇舌縱然得勝豈能肥家此臣之所深恥也江淹有言修史之難無出於志誠以志者憲章之所繫非老於典故者不能為也不比紀傳紀則以年包事傳則以事繫人儒學之士皆能為之惟有志難其次莫如表所以范煜陳夀之徒能為紀傳而不敢作表志志之大原起於爾雅司馬遷曰書班固曰志蔡邕曰意華嶠曰典張勃曰録何法盛曰説餘史並承班固謂之志皆詳於浮言略於事實不足以盡爾雅之義臣今總天下之大學術而條其綱目名之曰略凡二十略百代之憲章學者之能事盡於此矣其五略漢唐諸儒所得而聞其十五略漢唐諸儒所不得而聞也生民之本在於姓氏帝王之制各有區分男子稱氏所以别貴賤女子稱姓所以别婚姻不相紊濫秦并六國姓氏混而為一自漢至唐歴世有其書而皆不能明姓氏原此一家之學倡於左氏因生賜姓胙土命氏又以字以諡以官以邑命氏邑亦土也左氏所言惟兹五者臣今所推有三十二類左氏不得而聞故作氏族略書契之本見於文字獨體為文合體為字文有子母主類為母從類為子凡為字書者皆不識子母文字之本出於六書象形指事文也㑹意諧聲轉注字也假借者文與字也原此一家之學亦倡於左氏然止戈為武不識諧聲反正為乏又昧象形左氏既不别其源後人何能别其流是致小學一家皆成鹵莽經㫖不明穿鑿蠭起盡由於此臣於是驅天下文字盡歸六書軍律既明士乃用命故作六書略天籟之本自成經緯縱有四聲以成經横有七音以成緯皇頡制字深達此機江左四聲反沒其㫖凡為韻書者皆有經無緯字書眼學韻書耳學眼學以母為主耳學以子為主母主形子主聲二家俱失所主今欲明七音之本擴六合之情然後能宣仲尼之教以及人面之俗使裔夷之俘皆知禮義故作七音略天文之家在於圖象民事必本於時時序必本於天為天文志者有義無象莫能知天臣今取隋丹元子步天歌句中有圖言下成象靈臺所用可以仰觀不取甘石本經惑人以妖妄速人於罪累故作天文略地理之家在於封圻而封圻之要在於山川禹貢九州皆以山川定其經界九州有時而移山川千古不易是故禹貢之圖至今可别班固地理主於郡國無所底止雖有其書不如無也後之史氏正以方隅郡國併遷方隅顛錯皆因司馬遷無地理書班固為之創始致此一家俱成謬舉臣今凖禹貢之書而理川源本開元十道圖以續今古故作地理略都邑之本金湯之業史氏不書黄圖難考臣上稽三皇五帝之形勢逺探四夷八蠻之巢穴仍以梁汴者四朝舊都為痛定之戒南陽者疑若可為中原之新宅故作都邑略諡法一家國之大典史氏無其書奉常失其㫖周人以諱事神諡法之所由起也古之帝王存亡皆用名自堯舜禹湯至于桀紂皆名也周公制禮不忍名其先君武王受命之後乃追諡太王王季文王此諡法所由立也本無其書後世偽作周公諡法欲以生前之善惡為死後之勸懲且周公之意既不忍稱其名豈忍稱其惡如是則春秋為尊者諱為親者諱不可行乎周公矣此不道之言也幽厲桓靈之字本無凶義諡法欲名其惡則引辭以遷就其意何為皇頡制字使字與義合而周公作法使字與義離臣今所纂並以一字見義削去引辭而除其曲説故作諡略祭器者古人飲食之器也今之祭器出於禮圖徒務説義不思適用形制既乖豈便歆享夫祭器尚象者古之道也器之大者莫如罍故取諸雲山其次莫如尊故取諸牛象其次莫如彜故取諸雞鳯最小者莫如爵故取諸雀其制皆象其形鑿項及背以出内酒惟劉杳能知此義故引魯郡地中所得齊子尾送女器有犧尊及齊景公冢中所得牛尊象尊以為證其義甚明世莫能用故作器服略樂以詩為本詩以聲為用風土之音曰風朝廷之音曰雅宗廟之音曰頌仲尼編詩為正樂也以風雅頌之歌為燕享祭祀之樂工歌鹿鳴之三笙吹南陔之三歌間魚麗之三笙間崇邱之三此大合樂之道也古者絲竹有譜無辭所以六笙但存其名序詩之人不知此理謂之有其義而亡其辭良由漢立齊魯韓毛四家博士各以義言詩遂使聲歌之道日㣲至後漢之末詩三百僅能傳鹿鳴騶虞伐檀文王四篇之聲而已太和末又失其三至于晋室鹿鳴一篇又無傳自鹿鳴不傳後世不復聞詩然詩者人心之樂也不以世之興衰而存亡繼風雅之作者樂府也史家不明仲尼之意棄樂府不收乃取工伎之作以為志臣舊作系聲樂府以集漢魏之辭正為此也今取篇目以為次曰樂府正聲者所以明風雅曰祀享正聲者所以明頌又以琴操明絲竹以遺聲準逸詩語曰韶盡美矣又盡善也武盡美矣未盡善也此仲尼所以正舞也韶即文舞武即武舞古樂甚希而文武二舞猶傳於後世良由有節而無辭不為義説家所惑故得全仲尼之意五聲八音十二律者樂之制也故作樂略學術之茍且由源流之不分書籍之散亡由編次之無紀易雖一書而有十六種學有傳學有注學有章句學有圖學有數學有䜟緯學安得總言易類乎詩雖一書而有十二種學有詁訓學有傳學有注學有圖學有譜學有名物學安得總言詩類乎道家則有道書有道經有科儀有符籙有吐納内丹有爐火外丹凡二十五種皆道家而渾為一家可乎醫方則有脉經有灸經有本草有方書有炮炙有病源有婦人有小兒凡二十六種皆醫家而渾為一家可乎故作藝文略冊府之藏不患無書校讎之司未聞其法欲三館無素餐之人四庫無蠧魚之簡千章萬卷日見流通故作校讎略河出圖天地有自然之象圖譜之學由此而興洛出書天地有自然之文書籍之學由此而出圖成經書成緯一經一緯錯綜而成文古之學者左圖右書不可偏廢劉氏作七略收書不收圖班固即其書為藝文志自此以還圖譜日亡書籍日冗所以困後學而隳良材者皆由於此何哉即圖而求易即書而求難舍易從難成功者少臣乃立為二記一曰記有記今之所有者不可不聚二曰記無記今之所無者不可不求故作圖譜略方冊者古人之言語欵識者古人之面貎方冊所載經數千萬傳欵識所勒猶存其舊蓋金石之功寒暑不變以兹稽古庶不失真今藝文有志而金石無紀臣於是採三皇五帝之泉幣三王之鼎彛秦人石鼓漢魏豐碑上自蒼頡石室之文下逮唐人之書各列其人而名其地故作金石略洪範五行傳者巫瞽之學也歴代史官皆本之以作五行志天地之間災祥萬種人間禍福㝠不可知若之何一蟲之妖一物之戾皆繩之以五行又若之何晋厲公一視之逺周單公一言之徐而能闗於五行之沴乎晋申生一衣之偏鄭子臧一冠之異而能闗於五行之沴乎董仲舒以隂陽之學倡為此説本於春秋牽合附㑹歴世史官自愚其心目俛首以受籠罩而欺天下臣故削去五行而作災祥略語言之理易推名物之狀難識農圃之人識田野之物而不達詩書之㫖儒生達詩書之㫖而不識田野之物五方之名本殊萬物之形不一必廣覽動植洞見幽潛通鳥獸之情状察草木之精神然後參之載籍明其品彚故作昆蟲草木略凡十五略出臣胸臆不涉漢唐諸儒議論禮略所以叙五禮職官略所以秩百官選舉略言掄材之方刑法略言用刑之術食貨略言財貨之源流凡兹五略雖本前人之典亦非諸史之文也古者記事之史謂之志書大傳曰天子有問無以對責之疑有志而不志責之丞是以宋鄭之史皆謂之志太史公更志為記今謂之志本其舊也桓君山曰太史公三代世表旁行邪上並效周譜古者紀年别繫之書謂之譜太史公改而為表今復表為譜率從舊也然西周經幽王之亂紀載無傳故春秋編年以東周為始自皇甫謐為帝王世紀及年歴上極三皇譙周陶𢎞景之徒皆有其書學者疑之而以太史公編年為正故其年始於共和然共和之名已不可據况其年乎仲尼著書斷自唐虞而紀年始於魯隱以西周之年無所考也今之所譜自春秋之前稱世謂之世譜春秋之後稱年謂之年譜太史公紀年以六甲後之紀年者以六十甲或不用六十甲而用歲陽歲隂之名今之所譜即太史公法既簡且明循環無滯禮言臨文不諱謂私諱不可施之於公也若廟諱則無所不避自漢至唐史官皆避諱惟新唐書無所避臣今所修凖舊史例間有不得而避者如諡法之類改易本字則其義不行故亦凖唐舊漢景帝名啓改啓為開安帝名慶改慶為賀唐太祖名虎改虎為武髙祖名淵改淵為水若章懐太子注後漢書則濯龍淵不得而諱杜佑作通典則虎賁不得而諱夫學術超詣本乎心識如人入海一入一深臣之二十略皆臣自有所得不用舊史之文紀傳者編年紀事之實蹟自有成規不為智而増不為愚而減故於紀傳即其舊文從而損益若紀有制詔之辭傳有書疏之章入之正書則據實事寘之别録則見類例唐書五代史皆本朝大臣所修㣲臣所不敢議故紀傳訖隋若禮樂政刑務存因革故引而至唐云嗚呼酒醴之末自然澆漓學術之末自然淺近九流設教至末皆弊然他教之弊㣲有典刑惟儒家一家去本太逺此理何由班固有言自武帝立五經博士開弟子員設科射策勸以官禄訖于元始百有餘年傳業者寖盛枝葉繁滋一經説至百餘萬言大師衆至千餘人蓋禄利之路然也且百年之間其患至此千載之後弊將若何况禄利之路必由科目科目之設必由乎文辭三百篇之詩盡在聲歌自置詩博士以來學者不聞一篇之詩六十四卦之易該於象數自置易博士以來學者不見一卦之易皇頡制字盡由六書漢立小學凡文字之家不明一字之宗伶倫制律盡本七音江左置聲韻凡音律之家不達一音之㫖經既茍且史又荒唐如此流離何時返本道之汙隆存乎時時之通塞存乎數儒學之弊至此而極寒極則暑至否極則泰來此自然之道也臣蒲柳之質無復餘齡葵藿之心惟期盛世謹序通志總序奉㫖開列校刻通志諸臣職名監理和碩和親王臣𢎞晝武英殿總裁内閣學士兼禮部侍郎臣德齡大理寺少卿臣王㑹汾國子監祭酒臣陸宗楷提調翰林院編修臣林蒲封原任詹事府詹事兼翰林院侍讀學士今加七品銜臣陳浩校對日講官起居注翰林院侍讀學士臣程景伊翰林院侍講臣羅源漢翰林院編修臣王檢翰林院編修臣楊述曽翰林院編修臣李清時翰林院編修臣鄭虎文翰林院編修臣史貽謨翰林院編修臣李友棠翰林院檢討臣張馨掌貴州道監察御史臣儲麟趾翰林院庶吉士臣劉星煒翰林院庶吉士臣陳淦校錄貢生臣潘煇貢生臣謝霖貢生臣劉岱貢生臣李泓貢生臣盧殿人貢生臣申居鄖貢生臣楊志梁貢生臣王埰貢生臣李藴芳貢生臣路談貢生臣鄭思紱武英殿監造内務府錢糧衙門郎中兼佐領加六級紀録十六次臣永保内務府錢糧衙門員外郎兼佐領加一級紀録八次臣永忠内務府廣儲司員外郎臣永泰内務府廣儲司司庫加一級紀録五次臣三格監造加一級臣李保監造加二級臣姚文彬庫掌臣虎什泰庫掌臣高永仁庫掌臣吉蘭泰庫掌臣保慶
