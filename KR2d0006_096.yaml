body:
  text: 通志卷八十五上宋右迪功郎鄭樵漁仲撰宗室傳第八上北齊趙郡王琛子睿信睿子整清河王嶽子勱廣平公盛子子瑗陽州公永樂繼子孝緒弼永樂弟長襄樂王顯國上洛王思宗子元海好思宗弟思平秦王歸彥武興王普長樂太守靈山子懿伏繼子伏護護孫乂神武諸子永安簡平王浚平陽靖翼王淹子德彭城景思王浟子寶德上黨剛肅王渙子寶嚴襄城景王清繼子亮任城王湝髙陽康穆王湜博陵文簡王濟華山王凝馮翊王潤漢陽敬懷王洽文襄諸子河南康獻王孝瑜子𢎞節廣寧王孝珩河間王孝琬子正禮蘭陵武王長恭安德王延宗漁陽王紹信文宣諸子太原王紹德范陽王紹義西河王紹仁隴西王紹廉孝昭諸子樂陵王百年汝南王彥理弟彥德彥彥基彥康忠武成諸子南陽王綽琅琊王儼齊安王廓北平王貞髙平王仁英淮南王仁光弟仁機仁仁雍仁仁儉雅直謙仁後主諸子東平王恪善德質買德錢北齊趙郡王琛字元寶神武皇帝之弟也少便弓馬有志氣神武既定天下中興初授琛常侍鎮西將軍既居禁衛恭勤慎密率先左右封南趙郡公纍遷定州刺史六州大都督甚有聲譽及斛斯椿等釁結神武將謀內討以晉陽根本召琛留掌後事天平中除御史中尉正色紏彈無所回避逺近肅然尋亂神武後庭因杖而薨時年二十三贈太尉尚書令諡曰貞天平三年又贈假黃鉞左丞相太師録尚書事天統初進爵為王配饗髙祖廟庭子睿嗣小名須拔生三旬而孤聰慧夙成特為神武所愛飬於宫中令遊娘母之恩同諸子魏興和中襲爵南趙郡公年至四嵗未嘗識母其母魏華陽公主也其徔母姊鄭氏戲謂曰汝是我姨兒何反親遊氏睿因訪問遂失精神神武疑其感疾睿對曰兒無患但聞有所生欲得暫見神武驚命元夫人至就宫見之睿前跪拜因抱頸大哭神武甚悲傷謂平秦王曰此兒天性至孝我兒無及者遂為休務一日睿初讀孝經至資於事父輒流涕歔欷十嵗喪母神武親送至領軍府為發哀舉聲殞絶三日水漿不入口神武與武明太后殷勤敦譬方漸承旨居喪長齋骨立杖而後起神武令恆山王與同卧起日夜譬之并敕左右不許進水雖絶清漱午輒不肯食由是神武食必呼與同案神武崩復哭泣歐血及壯將婚娶而貌有戚容文襄謂曰我為爾娶鄭述祖女門閥甚髙當無可憾而反不樂何邪睿對曰自痛孤遺方徔婚冠彌用感切言未卒嗚咽不自勝文襄為之憫然勵之勤學常夜分方罷文宣受禪進爵為王睿身長七尺容儀甚偉間習吏職有知人之鑒天保二年為定州刺史六州大都督時年十七睿留心庶事紏擲姦邪稱為良牧六年詔領山東兵數萬監築長城于時盛夏睿屏除蓋扇親與軍人同勞苦長史永欽道以睿冒暑遣倍道送氷睿對之歎息云三軍之人皆飲溫水吾何心獨進寒氷遂至銷液竟不一嘗兵人感悅先是役罷任其自歸丁壯先返羸弱多致僵殞睿於是親率營伍強弱相持賴全者十三四焉八年除北朔州刺史都督長城諸鎮事睿慰撫新遷量置烽戍內外防禦備有條法大為兵民所安有乏水處睿禱而得泉州人至今號曰趙郡王井九年濟南以太子監國因立大都督府與尚書省分理衆事仍開府置佐史文宣特崇其選乃除睿侍中攝大都督府長史睿後因侍宴帝徔容顧謂恆山王演曰由來亦有如此長史不皇建初兼并州事孝昭崩預受顧託奉迎武成於鄴以功拜尚書令天統中追贈父琛假黃鉞母元氏贈趙郡王妃諡曰貞昭華陽長公主如故有司備禮儀就墓拜受時隆冬盛寒睿徒步號哭面皆破裂歐血數升及還不堪參謝帝親就第省問拜司空攝録尚書事河清三年周師及突厥至并州武成戎服將以宫人出避睿叩馬諫乃止帝親御戎六軍進止並令取睿節度而使假孝先總焉帝與宫人被緋甲登故北城以望軍營甚整突厥咎周人曰爾言齊亂故請我共來伐之今齊人眼中亦有鐡何可當邪乃還至涇嶺凍滑乃鋪氊以度胡馬寒瘦膝已下皆無毛比至長城死且盡乃截矟杖之以歸是役也假孝先持重不與賊戰自晉陽東道為虜所屠無遺類焉斛律光自三堆還帝以遭大寇抱其頸哭任城王湝進曰何至此乃止光面折孝先於帝前曰假婆善為送女客於是以睿為能加尚書令封宣城郡公拜太尉監五禮晚節頗為和士開所構睿久典朝政清正自守譽望日隆漸被疏忌乃撰古之忠臣義士號曰要言以致其意武成崩葬後數日睿與馮翊王潤安德王延宗及元文遙等奏後主云和士開不宜仍居內任并入奏太后因出士開為兖州刺史太后曰士開舊經驅使欲留過百日睿正色不許太后令酌酒賜睿睿正色曰今論國家大事非為巵酒言訖便出其夜睿方寢見一人可長丈四五尺臂長丈餘當門向牀以臂壓睿良久遂失所在睿意甚惡之起坐歎曰大丈夫運命一朝至此至旦欲入朝妻子咸諫止之睿曰自古忠臣皆不顧身命社稷事重吾寧死事先皇不忍見朝廷顛沛至殿門又有人曰願勿入睿曰吾上不負天死亦無恨入見太后太后復以為言睿執之彌固出至永巷被執送華林園於崔離佛院令劉桃枝拉而殺之時年三十六大霧三日朝野寃惜之期年後詔聽以王禮葬竟無贈諡子整信嗣好學有行檢位儀同三司後終於長安清河王嶽字洪略神武徔父弟也父翻字飛雀以器度知名卒於侍御中散元象中贈假黃鉞大將軍太傅太尉録尚書事諡孝宣公嶽幼孤貧人未知之長而敦直姿貌嶷然深沈有器量初嶽家于洛邑神武每奉使入洛必止于嶽宅嶽母山氏嘗夜起見神武室中有赤光心異之詣卜者為之筮遇乾之大有占者曰飛龍在天之象也貴不可言山氏以語神武神武益自負及神武起兵信都山氏聞之喜謂嶽曰赤光之瑞驗矣汝可間行徔之嶽遂往信都神武見之大悅中興初除金紫光祿大夫領武衛神武與四胡戰于韓陵神武將中軍髙昂將左軍嶽將右軍中軍敗績賊乘之嶽舉麾大呼橫衝賊陳神武方得回師因大破賊以功除衛將軍左光祿大夫封清河郡公母山氏封郡君授女侍中入侍皇后天平二年除侍中六州軍事都督尋加開府嶽辟引時賢以為僚屬論者美之尋授使持節六州大都督冀州大中正俄拜京畿大都督其六州事悉隸京畿神武統務晉陽嶽與侍中孫騰等在京師輔政嶽性至孝母疾衣不解帶及遭喪去職哀毁骨立神武憂之每日遣人勞勉尋起復本位厯冀晉二州刺史西南道都督有綏邉之稱及神武崩侯景叛梁武帝遣其貞陽侯淵眀於寒山擁泗水灌彭城與景相為掎角嶽總帥諸軍南討與行臺慕容紹宗擊淵眀破禽之俘馘數萬景仍擁衆於渦陽與左衛將軍劉豐等相持嶽回軍又破之景單騎逃竄以功除侍中太尉又拜河南總管統慕容紹宗劉豐等討西魏將王思政於長社嶽引洧水灌其城紹宗劉豐為思政所獲西魏援兵復至嶽內外防禦城不沒者三版會文襄親臨數日城陷獲思政等以功别封真定縣男是役也文襄以為已功故賞典不𢎞文襄崩文宣出撫晉陽令嶽以本官兼尚書左僕射留鎮京師天保初進封清河郡王尋除司州牧五年加太保梁元帝為西魏所逼遣使告急詔嶽為西南道大行臺統司徒潘相樂等救江陵師次義陽西魏尅荆州嶽因略地南至梁郢州尅之獲刺史司徒陸法和送鄴朝廷知江陵陷詔嶽班師嶽自討寒山長社及出隨陸並有功績威名彌重而性華侈尤悅酒色歌姬舞女陳鼎擊鐘諸王不及也初髙歸彥少孤神武令嶽撫飬嶽輕其年幼情禮甚薄歸彥內銜之及歸彥為領軍大被寵遇嶽謂其德已更倚仗之歸彥密構其短奏嶽於城南起宅聽事後僭擬為永巷但無闕耳帝後夜行見宅壯麗意不能平屬帝時召鄴下婦人薛氏入宫而嶽先嘗迎之至宅由其姊也帝怒縣薛氏姊而支解之讓嶽以為姦人之女嶽曰臣始聞其美欲納以為婦見其輕佻故出之非姦也帝益怒六年冬使髙歸彥就宅賜以鴆嶽曰臣無罪歸彥逼飲之遂薨時年三十四詔大鴻臚監護喪事贈使持節都督冀等七州太宰太傅定州刺史假黃鉞給輼輬車諡曰昭武敕以城南宅為莊嚴寺初嶽與神武經綸天下家有私兵戎器儲甲千餘領文襄之末嶽以四方無事表請納之文襄敦至親之重推心相任云叔屬居肺腑職在維城所有之甲夲資國用叔何疑而納之文宣之世亦頻請納又不許及將薨遺表謝恩并請上甲于武庫至是方納焉皇建中配享文襄廟庭後歸彥反武成知其前譖曰清河忠烈盡力皇家而歸彥毁之間吾骨肉籍沒歸彥以歸彥良賤百口賜嶽家又思嶽功重贈太師太保餘如故子勱字敬德幼聰敏美風儀以仁孝聞年七嵗襲爵清河王十四為青州刺史拜日文宣戒之曰叔父前牧青州甚有遺惠故遣汝慰彼黎庶無墜家聲勱流涕對曰臣以蒙幼濫叨拔擢雖竭庸愚懼忝先正文宣曰汝既能如此言吾不慮也尋追授領軍大將軍開府儀同三司以清河地在畿內改封樂安王性剛直有才幹斛律光雅敬之每征伐則引為副轉侍中尚書右僕射後主於晉州敗太后徔土門道還京師敕勱統領兵馬侍衛時佞幸閹寺猶行暴虐民間雞豕悉縱鷹犬搏噬取之勱收儀同苟子溢將斬以徇太后有令然後釋之劉文殊謂勱曰子溢之徒言成禍福豈不慮後邪勱攘𬒮曰自獻武皇帝以來撫飬士卒委政親賢用武行師未有折衄今西寇已次并州逹官委叛正坐此輩専政㺯權所以內外離心衣冠解體若得今日斬此輩明日受誅亦無所恨文殊甚愧之太后還至鄴周軍續至人皆凶懼無有鬪心朝士出降相屬勱因奏後主曰今所翻叛多是貴人至於卒伍猶未離二請追五品已上家屬置之三臺因脅之曰若戰不捷即焚此臺此曹顧惜妻子必當死戰且王師頻北賊徒輕我今背城一決理必破之後主不從遂棄鄴東遷勱恆後殿為周軍所得武帝與語大悅因問齊亡所由勱發言流涕悲不自勝帝為改容授開府儀同三司隋文帝為丞相深器之再遷椘州刺史城北有伍子胥廟其俗尚鬼祈者必以牛酒至破産業勱嘆曰子胥賢者豈宜損百姓乎告諭所部自是遂止百姓賴之開皇七年轉光州刺史表請伐陳并平陳五䇿帝嘉之答以優詔及大舉伐陳以勱為行軍總管從宜陽公王世積下陳江州以功拜上開府賜物三千假時隴右諸羌數為寇亂朝廷以勱有威名拜洮州刺史下車大崇威惠民夷悅附後吐谷渾來寇勱時遇疾不能拒戰賊遂大掠而去憲司奏勱失亡戶口坐免卒於家唐褎顯前代名臣追贈都督四州諸軍事定州刺史子士廉最知名廣平公盛神武徔叔祖也寬厚有長者風神武起兵於信都盛來赴以為中軍大都督封廣平郡公厯位司徒太尉天平三年薨於位贈假黃鉞太尉太師録尚書事無子以兄子子瑗嗣天保初改封平昌王卒於魏尹陽州公永樂神武徔祖兄子也太昌初封陽州縣伯進爵為公纍遷北豫州刺史河橋之戰司徒髙昂失利奔退永樂守洛陽南城昻走趣城南西軍追者將至永樂不開門昻遂為西軍所禽神武大怒杖之二百後罷豫州家産不立神武問其故對曰裴監為長史辛公正為别駕受王委寄斗酒隻雞不敢入神武乃以永樂為濟州仍以監公正為長史别駕謂永樂曰爾勿大貪小小義取莫復畏永樂至州遽有受納監公正諫不見聽以狀啓聞神武封以示永樂永樂由是知二人清直並擢用之後卒於州贈太師太尉録尚書事諡曰武昭無子徔兄思宗以第二子孝緒為後襲爵天保初改封修城郡王永樂弟長弼小名阿伽性粗武出入城市好歐擊行路時人呼為阿伽郎君以宗室封廣武王時有天恩道人至凶暴橫行閭肆後入長弼黨専以鬪歐為事文宣並收掩付獄天恩等十餘人皆棄市長弼鞭一百尋為營州刺史在州無故自驚亡入突厥竟不知死所襄樂王顯國神武徔祖弟也無才技直以宗室謹厚天保元年封襄樂郡王位右衛將軍卒上洛王思宗神武徔子也性寬和頗有武幹天保初封上洛郡王厯位司空太傅薨於官子元海纍遷散騎常侍自陳願處山林修行釋典文宣許之乃入林慮山經二年絶棄人事志不能固自啓求歸徵復本任乃更縱酒肆情廣納姬侍尋除領軍將軍元海器小志大頗以智謀自許皇建末孝昭幸晉陽元海以散騎常侍留典機密初孝昭之誅楊愔也謂武成云事成以汝為皇太弟及踐位立其子百年為皇太子留濟南於鄴使武成居守以兵衛之武成意不平既而除領軍庫狄伏連為幽州刺史以斛律豐樂為領軍蓋以分武成之權也武成留伏連而不聽豐樂視事乃與河南王孝瑜偽獵謀之於野際夜乃歸先是童謡云中興寺裏白鳬翁四方側聽聲雍雍道人聞之夜打鐘時丞相府在北城中即舊中興寺也鳬翁謂雄雞武成小字步落稽也道人濟南小名也打鐘言將被擊也未幾太史奏言北城有天子氣孝昭以為濟南之祥使平秦王歸彥之鄴迎濟南赴並州將除之武成以告元海并問自安之計元海曰皇太后萬福主上至性非常殿下不須别慮武成曰此豈我推誠之意邪元海乞遷省思之時既夜武成留不聼去元海繞牀萬匝逹旦不寐夜漏未盡武成遽出曰神算如何曰夜中有三䇿恐不適用耳因引梁孝王懼誅入關事請乘數騎入晉陽先見太后求哀後見主上請去兵權不干朝政以死為限此上䇿也若不見許當更表請青齊二州刺史委政綱紀沉靖自居此中䇿也更問下䇿曰發言即恐族誅因逼之曰濟南世嫡主上假太后令而奪之今集文武示以此敕執豐樂斬歸彥尊濟南號令天下以順討逆此萬世一時也武成大悅狐疑竟未能用乃使鄭道謙卜之道謙云不利舉事靜則吉又召曹魏祖訊以國事魏祖云當有大凶又時有林慮令姓藩者頗知占候密謂武成曰宫車非久晏駕殿下當為天下主武成拘之內庭以候之又令巫覡雜卜皆云不須舉兵自有大慶武成乃奉詔送濟南於晉陽至即見殺及孝昭崩武成即位除元海侍中開府儀同三司太子詹事河清二年元海為和士開所譖武成鞭之六十責之曰爾在鄴時教我以弟反兄幾許不義以鄴城兵馬抗并州幾許無智不義無智若為可使出為兖州刺史元海後妻陸太姬甥也以故尋被任使武平中與祖珽共執朝政元海多以太姬密語告珽珽求領軍元海不可珽乃以其所告報太姬姬怒出元海為鄭州刺史鄴城將敗徴為尚書令周建德七年於鄴城謀逆伏誅元海好亂樂禍詐行仁慈不飲酒噉肉文宣天保末年敬信內法乃至宗廟不血食皆元海之為及為右僕射又説後主禁斷屠宰原其本心非靖故終致覆敗思宗弟思好本浩氏子也思宗飬以為弟遇之甚薄少以騎射事文襄文宣受命為左衛大將軍本名思孝天保五年討蠕蠕文宣悅其驍勇謂曰爾擊賊如鶻入鴉羣宜思好事故改名焉纍遷尚書令朔州道行臺朔州刺史開府南安王甚得邉朔人心後主時斫骨光辨奉使至州思好迎之甚謹光辨倨傲思好銜之武平五年遂舉兵反與並州諸貴書曰主上少長深宫未辨人之情偽昵近凶狡踈逺忠良遂使刀鋸刑餘貴溢軒階商人醜類擅權帷幄剝削生靈劫掠朝市暗于聽受専行忍害幽母深宫無復人子之禮二弟殘戮頓絶孔懷之義仍縱子立奪馬於東門光辨掣鷹於西市駁龍得儀同之號逍遙受郡君之名犬馬班位榮冠軒冕人不堪役思長亂階趙郡王睿實曰宗英社稷是寄左丞相斛律明月世為元輔威著鄰國並非有辜奄見誅殄孤既忝預皇枝實蒙殊奬今便擁率義兵指除君側之惡幸悉此懷無致疑惑行臺郎王行思之辭也思好至陽曲自號大丞相置百官以行臺左丞王尚之為長史武衛趙海在晉陽時倉卒不暇奏矯詔發兵拒之軍士皆曰南安王來我輩唯有奉迎耳帝聞變使唐雍莫多婁敬顯劉桃枝中領軍庫狄士文馳之晉陽帝勒兵續進思好軍敗與行思投水而死其麾下二千人桃枝圍之且殺且招終不肯降以至於盡時帝在道叱奴世安自晉陽送露布於城平都遇斛斯孝卿孝卿誘使食因馳詣行宫大呌云已了帝大歡左右呼萬嵗良久世安乃以狀自陳帝曰爾告何物事乃得坐食於是賞孝卿而免世安罪暴思好尸七日然後屠剝焚之烹尚之於鄴市令內參射其妃於宫內仍焚殺之思好前反三旬有人告其謀反韓長鸞女適思好子故奏言有人誣告諸貴事相擾動不殺無以息後乃斬之思好既誅死者弟伏闕為兄訴寃且求贈典長鸞抑而不通平秦王歸彥字仁英神武族弟也父徽魏末坐事當徙涼州行至河渭間遇賊以軍功得免流因居於河州積年以解胡言為西域大使以功行河州事遂死焉徽於神武舊恩甚篤及神武平京洛迎徽喪為之營葬贈司徒諡曰文宣初徽嘗過長安市與婦人王氏私通而生歸彥至是年九嵗神武追見之對之悲喜稍遷徐州刺史歸彥少質朴後更改節放縱好聲色妻魏上黨王元天穆女也醜而妒數與忿爭密啓文宣求離不報天保初封平秦王嫡妃康及所生母王氏並為太妃善事二母以孝聞徴為兼侍郎稍被親寵以討侯景功别封長樂郡公除領軍大將軍領軍加大自歸彥始文宣誅髙德正金寶財貨悉以賜之乾明初拜司徒仍總知禁衛濟南自晉陽之鄴楊愔宣敕留徔駕兵五千於西中隂備非常至鄴數日歸彥乃知之由是隂怨楊燕等楊燕等欲去二王問計於歸彥歸彥詐喜請與髙元海謀之元海亦口許心違馳告長廣楊燕之戮歸彥有力焉孝昭將入雲龍門都督成休寧列仗拒而不內歸彥諭之然後得入進向柏閣永巷亦如之孝昭踐阼以此彌見優重每入常坐平原王假韶上尋除司空兼尚書令齊制宫內唯天子紗帽臣下皆戎帽特賜歸彥紗帽以寵之孝昭崩歸彥徔晉陽迎武成于鄴及武成即位進位太傅領司徒常聽將私部曲三人帶刀入仗徔武成還都諸貴戚等競要之其所往處一坐盡傾歸彥既地居將相志意盈滿發言陵侮傍若無人議者以威權震主必為禍亂上亦尋其前後翻覆之迹漸忌之髙元海畢義雲髙乾和等咸數言其短遂出歸彥為冀州刺史上幸歸彥第召魏收對御作詔欲加右丞相收曰至尊以右丞相登極今為歸彥威名大盛故出之豈可復加此號乃拜太宰冀州刺史即命乾和繕寫畫日仍敕門司不聽輒內時歸彥在家縱酒經宿不知至明欲參至門知之大驚而退及通名謝敕令早發又敕武職督將悉送至清陽宫送者再拜而退莫敢共語唯趙郡王睿與語久之時無聞者至州不自安遂謀逆置私驛於南境上偵伺朝廷動息時車駕將幸晉陽歸彥謀乘虗入鄴又以時未受調欲班賜軍士訖然後發郎中令吕思禮知其謀以狀告詔遣平原王假韶襲之歸彥聞有王師乃嬰城距守先是冀州刺史宇文仲鸞司馬李祖挹别駕陳季璩中徔事房子弼長樂郡守尉普興等疑歸彥有異亦連名密啓歸彥追而獲之遂收禁仲鸞等五人脅之徔逆仲鸞等不徔皆殺之軍已逼城歸彥登陴大呌云孝昭皇帝初崩六軍百萬衆悉由臣手此時投身向鄴迎陛下今日豈有異心正恨髙元海畢義雲髙乾和誑惑聖上疾忌忠良但為殺此三人即臨城自刎其後城破單騎北走至交津見獲鎖送鄴帝令趙郡王睿私問其故歸彥曰使黃頷小兒牽挽我何得不反曰誰邪歸彥曰元海乾和豈是朝廷老宿如趙家老公時又詎懷怨於是帝又使讓焉對曰髙元海受畢義雲宅用作本州刺史給後部鼓吹臣為藩王太宰反無正欲殺元海義雲而已上令都督劉桃枝牽入歸彥猶作前語望活帝命群臣議其罪皆云不可赦乃載以露車銜枚面縛使桃枝臨之以刃擊鼓隨之并子孫十五人皆棄市贈仁州刺史初魏時山崩得二石角藏在武庫文宣嘗賜徔臣兵器特以二石角與歸彥謂曰爾事恆山不得反事長廣得反反時將此角嚇漢歸彥額角三道著幘不安文宣見之怒使以馬鞭擊其額流血被面曰爾反時當以此骨嚇漢其言反竟驗云武興王普字德廣歸彥兄歸義之子也性寬和有度量年九嵗與歸彥自河州俱入洛神武使與諸子同遊處天保初封武興郡王武平二年纍遷司空六年為豫州道行臺尚書令後主奔鄴就加太宰周師逼乃降卒於長安贈上開府豫州刺史長樂太守靈山字景嵩神武族弟也徔神武起兵信都終長樂太守贈大將軍司空諡曰文宣一子懿卒於武平鎮將無子文宣以靈山徔父兄齊州刺史建明子伏護為靈山後伏護字臣援粗有刀茟天統初纍遷黃門侍郎伏護厯事數朝恆參機要而性嗜酒每多醉失末路逾劇乃至連日不食神識慌惚遂以卒贈兖州刺史建國侯孫乂襲乂少謹厚武平末給事黃門侍郎隋開皇中為太府少卿坐事死神武諸子神武十五男武明婁皇后生文襄皇帝文宣皇帝孝昭皇帝襄城景王清武成皇帝博陵文簡王濟王氏生永安簡平王浚穆氏生平陽靖翼王淹大爾朱氏生彭城景思王浟華山王凝韓氏生上黨剛肅王渙小爾朱氏生任城王湝遊氏生髙陽康穆王湜鄭氏生馮翊王潤馬氏生漢陽敬懷王洽永安簡平王浚字定樂神武第三子也初神武納浚母當月而有孕及産後疑非已類不甚愛之而浚早慧後更被寵年八嵗時問博士盧景裕曰祭神如神在此為有神邪無神邪裕曰有神浚曰有神當云祭神神在何煩云如景裕不能答及長嬉戲不節嘗以屬請受納大見杖罰遂折節讀書元象中封永安郡公豪爽有氣力善騎射為文襄所愛文宣性雌懦每參文襄有時洟出浚恆責帝左右何不為二兄拭鼻由是見銜纍遷中書監兼侍中出為青州刺史雖頗好遊畋而聰明矜恕上下畏悅之保定初進爵為王文宣末年多酒失浚謂親近曰二兄舊不甚了了自為帝識解頓進今沈湎敗德朝臣無敢諫者大敵未滅吾殊以為憂欲乘驛至鄴面陳不知吾言見用不或者以告帝愈銜之八年來朝徔幸東山帝祼裎為樂雜以婦女又自作狐掉尾戲曲盡醜態浚進言此非人主所宜帝甚不悅時楊遵彥侍側浚引於屏處責其不諫帝雅不欲大臣與諸王交語遵彥懼以聞帝大怒曰小人由來難忍遂罷酒還宫浚尋還州又上書切諫詔令徴浚浚懼禍稱疾不朝上令馳驛收浚老幼泣送者數千人及至盛以鐡籠與上黨王渙俱置北城地牢下飲食溲穢共在一所明年帝親將左右臨穴歌謳令浚等和之浚等惶怖聲戰帝為愴然泣下將赦之長廣王湛先與浚不睦進曰猛虎出押寧無噬人帝默然浚等聞之呼湛小名曰步落稽皇天見汝左右聞者莫不悲傷浚渙皆有雄略為諸王所傾服帝恐為害乃先自刺浚渙使劉桃枝等繼之槊每下浚渙輒以手拉折於是投炬於籠中燒殺之加石土其上後出其尸皮髮皆盡天下寃之帝以浚妃陸氏配儀同劉郁捷郁捷帝蒼頭也以軍功見寵當刺浚時郁捷實中其要害故以配焉後數日帝以陸氏先無寵於浚敕與離絶乾明元年贈太尉無子詔以彭城王浟第二子凖字茂則嗣平陽靖翼王淹字子邃神武第四子也元象中封平陽郡公纍遷尚書左僕射天保初進爵為王厯位尚書令開府儀同三司司空太尉皇建初為太傅與彭城河間王並給仗身羽林百人太寧元年遷太宰性沉謹以寬厚稱河清三年薨於晉陽或云以鴆終還葬鄴贈假黃鉞太宰録尚書事子德素嗣彭城景思王浟字子深神武第五子也元象二年拜通直散騎常侍長樂郡公博士韓毅教浟書見浟茟迹未工因戲浟曰五郎書畫如此忽為常侍開國今日後宜更用心浟正色答曰昔甘羅幼為秦相未聞能書凡人唯論才具何如豈必勤勤於筆迹博士當今能書者何為不作三公時年蓋八嵗矣毅甚慙除驃騎大將軍開府武定六年出為滄州刺史為治嚴察部內肅然守令參佐下及胥吏行遊往來皆自齎糧食浟多伺察民間之事纎介皆知有隰沷縣主簿張逹嘗詣州夜投民家民為設雞臛浟詗知之逹至廷參浟謂之曰昨食雞羮其自獻之邪抑邀之使辦也逹皇恐伏罪又有士人自幽州騎驢至滄州界逢一少年求與為伴行數里許其人疲極息於道上少年遂驅其驢由支徑以去不知所如往士人以告州浟曰驢上當無他負載乎曰無唯有鹿脯一肋耳浟乃密令人分市鹿脯城中而得鹿肋於肆推所徔求竟獲盜驢者境內號為神眀轉都督定州刺史民有訴失牛者浟訪之曰所失微有别識否民言驪牛而自領以下逹於尻其毛皆白他無類者長史韋道建謂中徔事魏道勝曰史君在滄州禽姦如神今若得此賊定神矣浟乃詐為臺符市牛皮而髙其直盜利其估也果持皮出售浟案其毛色而執之道建等驚服又有老嫗自列云孤貧唯仰種蔬自給每被竊取而不得其主名浟夜令左右往書菜葉為字明旦於市中物色皆得之自是州境無復盜賊治為當時第一天保初封彭城王四年徴為侍中民吏送别悲號滿道有老父數百人相率具饌餞浟於野曰自殿下來至今五載唯飲此鄉水未食百姓食今當逺别聊獻疏薄用表至誠浟重違其意為食一口而去七年轉司州牧選徔事皆取文才之士詳練法律明於剖斷者當時稱為美選州舊桉五百餘浟未期悉斷盡别駕羊修等恐犯權戚乃詣閣咨陳浟使告曰吾直道而行何憚權戚卿等當成人之美反以權戚為言修等慙悚而退後加特進兼司空太尉州牧如故太妃薨解任尋復本官俄拜司空兼尚書令濟南嗣位除開府儀同三司尚書令領大宗正卿皇建初拜大司馬兼尚書令轉太保武成入承大業遷太師録尚書事浟明練世務果於決斷事無大小咸悉以情趙郡李公統預髙歸彥之逆其母崔氏即御史中丞崔昻之徔父姊兼右僕射魏收之內妹也依令年出六十例免入官崔增年陳訴所司以昂收故崔遂獲免浟擲發其事昂等以罪除名自後車駕巡幸常留守鄴河清三年三月羣盜白子禮等數十人劫浟為主詐稱使者至浟第入內室稱敕牽浟上馬臨以白刃欲引向南殿浟大呼不徔遂殺之時年三十二朝野痛惜焉初浟之未遇劫也其妃鄭氏夢人斷浟首持去惡之數日而浟被害贈假黃鉞太師太尉録尚書事給輼輬車子寶德嗣位開府兼尚書左僕射上黨剛肅王渙字敬夀神武第七子也天姿雄桀俶儻不羣雖在童幼恆以將略自許神武壯而愛之曰此兒似我及長力能扛鼎材武絶倫每謂左右曰人不可無學但要不為博士耳故讀書頗知梗槩而不甚耽習元象中封平原郡公文襄之遇賊渙年尚幼在西學聞宫中歡驚曰大兄必遭難矣彎弓而出武定末除冀州刺史在州有美政天保初封上黨王厯中書令尚書左僕射與恆山王演等築伐惡諸城遂聚鄴下輕薄陵犯郡縣為法司所紏文宣戮其左右數人渙亦被譴六年率衆送梁王蕭淵明還江南仍破東關斬梁侍進裴之橫等威名甚盛八年録尚書事初術士言亡齊者黑衣由是自神武後每出行不欲見桑門為黑衣故也是時文宣幸晉陽以所忌問左右曰何物最黑對曰莫過漆帝以渙第七為當之乃使庫真都督破六韓伯升之鄴徴渙渙至紫陌橋殺伯升而逃憑河而度土人執以送官帝用鐡籠盛之與永安王浚同置地牢下嵗餘與浚同見殺時年二十六以其妃李氏配馮文洛文洛乃帝家舊奴積勞位至刺史帝令文洛等殺渙故以其妻妻焉乾明元年始收二王餘骨葬之贈司空諡曰剛肅有敕李氏還第而文洛尚以故意修飾詣李李盛列左右引文洛立於階下數之曰遭難流離以至大辱志操寡薄不能自盡幸蒙恩詔得返蕃闈汝是誰家奴猶欲見侮於是杖之一百流血灑地渙無嫡子庶長子寶嚴以河清二年襲爵位終金紫光祿大夫開府儀同三司襄城景王清神武第八子也美容貌弱年有器望元象中封章武郡公天保初封襄城郡王二年春薨齊氏諸王選國臣府佐多取富商羣小鷹犬少年唯襄城廣寧蘭陵王等頗引文藝清識之士當時以此稱之乾明元年二月薨贈假黃鉞太師太尉録尚書事無子詔以恆山王演第二子亮嗣亮字彥道性恭孝美風儀好文學為徐州刺史坐奪商人財物免官後主敗奔鄴亮徔焉遷兼太尉太傅周師入鄴亮於啓夏門拒守諸軍皆不戰而敗周軍既入城亮方退走亮入太廟行馬內痛哭拜辭然後為周軍所執入關依例授儀同分配逺邉卒於龍州任城王湝神武第十子也少眀慧天保初封自孝昭武成時車駕還鄴常令湝鎮晉陽總并省事厯司徒太尉并省録尚書事天統三年拜太保并州刺史别封正平郡公時有婦人臨汾水浣衣有乘馬人換其新靴馳而去者婦人持故靴詣州言之湝召居城諸嫗以靴示之紿曰有乘馬人於路為賊所害遺此靴焉得無親屬乎一嫗撫膺哭曰兒昨著此向妻家如其語捕獲之時稱神明武平初遷太師司州牧出為冀州刺史加太宰遷右丞相都督青州刺史湝頻牧大蕃雖不潔已然寬恕為吏民所懷五年青州人崔蔚波等夜襲州城湝倉卒部分號令齊整擊賊大破之拜左丞相轉瀛州刺史後主奔鄴加湝大丞相及安德王稱尊號於晉陽使劉子昂修啓於湝云至尊出奔宗廟既重羣公勸逼權主號令事寧終歸叔父湝曰我人臣何容受此執子昂送鄴帝至濟州禪位於湝竟不逹湝與廣寧王孝珩於冀州召募得四萬餘人拒周軍周齊王憲來伐先遣送書并赦詔湝並沉諸井戰敗湝孝珩俱被禽憲曰任城王何苦至此湝曰下官神武皇帝子兄弟十五人不幸而獨存逢宗社傾覆今日得死無愧墳陵憲壯之歸其妻子將至鄴城湝馬上大哭自投于地流血滿面至長安尋與後主同死妃盧氏賜斛斯徴盧蓬首垢面長齋不言笑徴放之乃為尼隋開皇三年表請文帝葬湝及五子於長安北原髙陽康穆王湜神武第十一子也天保元年封十年稍遷尚書令以滑稽便辟有寵於文宣常在左右行杖以撻諸王太后深銜之其妃父護軍長史張晏之嘗要道拜湜湜不禮焉帝問其故對曰無官職漢何禮之有帝於是擢拜晏之為徐州刺史文宣崩湜兼司徒導引梓宫於馬上吹笛云至尊頗知臣不又擊邊鼓為樂太后杖湜百餘未幾薨太后哭之哀曰我恐其不成就與杖何期帶創死也乾明初贈假黃鉞太師司徒録尚書事子士義襲爵博陵文簡王濟神武第十二子也天保元年封濟嘗徔文宣巡幸於路忽憶太后遂逃歸帝怒臨以白刃因此驚恍歷位太尉河清初出為定州刺史天統五年在州語人云計次第亦應到我後主聞之隂使人殺之贈假黃鉞太尉録尚書事子智襲爵華山王凝神武第十三子也天保元年封新平郡王九年改封安定十五年封華山厯位中書令齊州刺史就加太傅薨於州贈左丞相太師録尚書凝諸王中最為孱弱妃王氏太子洗馬王洽女也與蒼頭姦凝知而不能限禁後事發王氏賜死詔杖凝一百其愚如此馮翊王潤字子澤神武第十四子也幼時神武稱曰此吾家千里駒也天保初封歷位東北道行臺右僕射都督定州刺史潤美姿儀年十四五母鄭妃與之同寢有穢雜之聲及長廉慎方雅習於吏職至於擲發隱偽姦吏無所匿其情開府王回洛與六州大都督獨孤枝侵竊官田受納賄賂潤案舉其事二人表言王出送臺使登魏孝文舊壇南望嘆息不測其意武成使元文遙就州宣敕曰馮翊王少小謹慎在州不為非法朕信之熟矣登髙望逺人之常情鼠輩欲輕相間構曲生眉目於是回洛決鞭二百獨孤枝決杖一百尋為尚書令領太子少師厯司徒太尉大司馬司州牧太保河南道行臺録尚書事别封文成郡公太師太宰復為定州刺史薨贈假黃鉞左丞相子茂德嗣漢陽敬懷王洽字敬延神武第十五子也天保元年封五年薨年十三乾明元年贈太保司空無子以任城王第二子建德為後文襄諸子文襄六男文敬元皇后生河間王孝琬宋氏生河南王孝瑜王氏生廣寧王孝珩蘭陵王長恭不得母氏姓陳氏生安德王延宗燕氏生漁陽王紹信河南康獻王孝瑜字正德文襄長子也初封河南郡公齊受禪進爵為王厯位中書令司州牧初孝瑜飬於神武宫中與武成同年相愛將誅楊愔等孝瑜預其謀及武成即位禮遇特隆孝瑜容貌魁偉精彩雄毅謙慎寬厚兼愛文學讀書敏速十行俱下覆碁不失一道初文襄於鄴東起小池遊觀時俗眩之孝瑜遂于第作水堂龍舟植幡矟於舟上數集諸弟宴射其間遂為諸王所慕尚武成幸其第見而悅之故盛興後園之役武成嘗使和士開與胡后對坐握槊孝瑜諫曰皇后天下之母不可與臣下接手帝深納之後又言趙郡王父死非命不可親近由是睿及士開皆側目士開既密告其奢僭睿又言山東唯聞有河南王不聞有陛下帝由是忌之有爾朱御女者本事太后孝瑜先與之通後因太子婚夜孝瑜竊與之言武成大怒頓飲其酒三十七杯使婁子彥載以出鴆之於車孝瑜體素肥大腰帶十圍至西華門藥發煩熱躁悶投水而絶贈太尉録尚書事子𢎞節嗣孝瑜母魏吏部尚書宋辨孫也本魏頴川王斌之妃為文襄所納生孝瑜孝瑜還第為太妃孝瑜妃盧正山女武成胡后之內姊也孝瑜薨後宋太妃為盧妃所譖武成殺之廣寧王孝珩文襄第二子也歷位司州牧尚書令司空司徒録尚書事大將軍大司馬孝珩愛賞人物學涉經史好綴文有技藝嘗於聼事畫一蒼龍見者疑以為真又作朝士圗當時稱為妙絶後主自晉州敗奔鄴詔王公朝士議於含光殿孝珩曰大敵既深事藉機變宜使任城王領幽州道兵入土門揚聲趣并州獨孤永業領洛州道兵趣潼關揚聲取長安臣請領京畿兵出自滏口鼓行逆戰賊軍逺來日增疲老聞南北有兵自然潰散又請出宫人寶物賞賜將士帝不能用承光即位以孝珩為太宰孝珩與呼延族莫多婁敬顯尉相願同謀期以正月五日自於千秋門斬髙阿那肱令相願以禁兵應之於內族與敬顯自遊豫園勒兵出盡誅韓長鸞等既而阿那肱從别宅取便路入宫事不果孝珩乃求領兵出拒西軍謂髙阿那肱韓長鸞陳德信等曰聞朝廷遲疑不賜遣領兵擊賊豈畏孝珩反邪孝珩破宇文雍遂至長安反時何與國家事以今日之急猶作如此相猜疑他日從可知也髙韓恐其有變出孝珩為滄州刺史孝珩至州以五千人會任城王於信都共為匡復之計周齊王憲來伐孝珩與周軍力戰兵弱不能敵瞋怒曰由髙阿那肱小人吾道窮矣齊叛臣乞伏令和以矟刺孝珩墜馬奴白澤以身扞之孝珩猶傷數處遂為周所虜齊王憲問孝珩齊亡之由孝珩自陳國難辭淚俱下俯仰有節憲為之改容親為灑創傅藥禮遇甚厚孝珩歎曰李穆叔有言齊氏二十八年今果然矣自神武皇帝以外吾諸父兄弟無有一人得至四十者命也奈何嗣君無獨見之眀宰相非柱石之寄恨不得握兵符受廟算身先士卒展我心力耳周人以孝珩歸長安依例授開府縣侯後周武帝在雲陽宫宴齊之君臣自彈胡琵琶命孝珩吹笛孝珩辭曰亡國之音不足聼也固命之舉笛裁至口而淚下嗚咽周武乃止其年十月疾甚啓周武帝乞歸葬山東曰臣聞狐死首邱示不忘舊念臣先人墳柏在鄴武帝覽啓而哀之尋卒令葬於鄴河間王孝琬文襄第三子也天保元年封天統中纍遷尚書令初突厥與周師入太原武成將避之而東孝琬叩馬諫請委趙郡王部分軍馬必能尅敵帝徔其言孝琬免胄將出帝使追還之周軍退拜并州刺史孝琬以文襄世嫡驕矜自負河南王之死諸王在宫內莫敢舉聲唯孝琬大哭而出又怨執政為草人擬而射之和士開與祖珽譖之云草人擬聖躬也又前突厥至州孝琬脫兜鍪抵地云豈是老嫗須著此此言屬大家也初魏世謠言河南種穀河北生白楊樹頭金雞鳴珽以謠説帝曰河南河北河間也金雞鳴孝琬將有建金雞之事也帝頗惑之時孝琬得佛牙置於第內夜有神光不以進御帝聞使搜之得填庫矟幡數百帝以為反狀訊其諸姬有陳氏者無寵誣對曰王嘗畫陛下像哭之為厭勝其反固宜孝琬性孝每追慕文襄輒出其像對之悲泣至是陳氏以為言而不能辨帝怒令武衛赫連輔元倒鞭撾之孝琬大呼曰徔阿叔乞命帝曰爾叔為誰敢喚天子作叔邪孝琬曰臣神武皇帝嫡孫文襄皇帝嫡子魏孝靜皇帝外甥何為不得喚陛下作叔也帝愈怒折其兩脛而死瘞諸西山及帝崩乃得改葬子正禮嗣幼聰頴能誦左氏春秋齊亡遷綿州卒蘭陵武王長恭一名孝瓘文襄第四子也纍遷中領軍開府并州刺史突厥入晉陽長恭盡力擊破之芒山之役長恭為中軍以五百騎再入周軍遂破其圍至金墉下被圍甚急城上人不知其為蘭陵王也長恭免胄示其面競下弩手救之於是大捷武士為蘭陵王入陳曲以歌謠之進位尚書令司州牧厯青瀛二州刺史頗有受納後為太尉與假韶共討柏谷又攻定陽親自督戰大破之俘其衆以前後功别封巨鹿長樂樂平髙陽等郡公遷大司馬領宗正芒山之捷後主謂長恭曰王入陳太深萬一失利悔無所及長恭對曰家事親切不覺遂然帝嫌其稱家事遂忌之定陽之役稍酷虐其屬尉相願謂長恭曰王受朝寄何得如此貪殘長恭未及答相願曰豈不由芒山大捷恐以威武見忌故自穢乎長恭曰然相願曰朝廷若忌王於此犯便當行罰本欲求福反以速禍也長恭遽前執其手求自安術相願因勸長恭杜門屬疾謝絶時事長恭然其言而未能即退及江淮有事恐復為將領憂懼成疾因而不治武平四年帝使徐之範齎鴆賜死長恭謂妃鄭氏曰我以忠見誅天道殆不可曉邪妃曰何不求見自列長恭曰此爵既頒何由可見飲之而薨贈太尉長恭貌柔心壯音容兼美其為將也躬勤細事每得甘美乃至一瓜數果必與將士共之初在瀛州行參軍陽士深表列其贓免官及討定陽士深在軍恐禍及長恭聞之曰何待我之淺也乃求小失杖二十以安之嘗朝退僕徔盡散長恭獨還無所譴罰武成賞其功命賈護為買妾二十人長恭唯受其一有千金責劵臨死燔之安德王延宗文襄第五子母陳氏魏廣陽王妓也延宗幼為文宣所養甚愛之年十二猶騎置腹上令溺已臍中抱之曰可憐止有此一箇問欲作何王對曰欲作衝天王文宣問楊愔愔曰天下安得此郡名今取其義願使安於德於是封安德焉為定州刺史於樓上大便使人在下張口承之以蒸豬糝和人糞以飼左右有難色者鞭之孝昭帝聞之使趙道德就州杖之一百道德以延宗受杖不謹又加三十未幾又以囚試刀驗其利鈍驕縱多不法武成使撻之殺其昵近九人自是深自改悔蘭陵王芒山凱旋自言兵勢諸兄弟咸壯之延宗獨曰四兄非大丈夫何意不乘勝徑入使延宗當此勢關西豈得復存及蘭陵死妃鄭氏以頸珠施佛廣寧王使贖之延宗手書諫之而滴淚滿紙河間死延宗哭之出血又結草為武成像鞭而訊之曰我兄無罪何故殺之奴以狀告武成覆卧延宗於地鞭之二百幾死後厯司徒太尉及平陽之役後主自晉陽禦之命延宗率右軍先進戰於城下禽周開府宇文挺等十數人及大戰延宗以麾下再入周軍氣壯兵鋭敵人莫不披靡俄而諸軍敗延宗一軍獨全後主將奔晉陽延宗奏言大家但在營莫動以兵馬付臣臣必能破之帝不納及至並州不守周軍入􅔨鼠谷乃下詔以延宗為相國并州刺史總山西兵事謂曰并州阿兄自取兒今去也延宗曰陛下為社稷自重臣為陛下出力死戰駱提婆曰至尊計已定王不得輒沮後主竟奔鄴在並州將卒固請延宗即尊位皆云王若不作天子諸人實不能與王出死力延宗不得已即皇帝位下詔曰武平孱弱政由宦豎釁結蕭牆盜起疆場斬關夜遁莫知所之則我髙祖之業將墜於地王公卿士猥見推逼今便祗承寶位可大赦天下改武平七年為德昌元年以晉昌王唐雍為宰輔齊昌王莫多婁敬顯沭陽王和阿于子右衛大將軍假暢武衛將軍相里僧伽開府韓骨胡侯莫陳洛州等為爪牙衆聞之不召而至者前後相屬延宗容貌充壯坐則仰偃則伏人皆笑之及是赫然奮發氣力絶異馳騁行陳徑捷若飛傾府藏及後宫美女以賜將士又籍沒內參千餘家後主謂近臣曰我寧使周得并州不欲使安德得之左右曰理然延宗見士卒皆親執手陳辭自稱名流涕嗚咽衆皆爭為死童兒女子亦乘屋攘𬒮投甎石以擊周軍特進開府那盧安生守太谷以萬兵叛周軍圍晉陽望之如黑雲四合延宗有衆四萬命莫多婁敬顯韓骨胡拒城南和阿于子假暢拒城東延宗親當周齊王於城北奮大矟往來督戰所向無前尚書令史沮山亦肥大多力捉長刀步徔殺傷甚多武衛蘭芙蓉綦連延長皆死于陳和阿于子假暢以千騎投周軍周軍盡鋭攻東門際昏遂入進兵焚佛寺門屋飛熖照天地延宗與敬顯率壯士自西門入夾擊周軍周軍大亂爭門相填壓塞路不得進齊人從後斫刺死者二千餘人多禁衛諸公子周武帝左右略盡自拔無路承御上士張夀輒牽馬頭賀拔佛恩以鞭拂其後﨑嶇僅得出齊人奮擊幾中焉至城東厄曲佛恩及降者皮子信為之導僅免時四更也延宗謂周武帝死於亂兵使於積尸中求長鬛不得時齊人既勝入坊飲酒盡醉卧延宗不能復整周武帝出城飢甚欲為遁計齊王憲及柱國王誼諫以為去必不免假暢又盛言城內空虛無繼援周武帝乃駐馬鳴角收兵俄頃復振詰旦還攻東門克之又入南門延宗戰力屈走至城北於民家見禽周武帝自投下馬執其手延宗辭曰死人手何敢逼至尊帝曰兩國天子有何怨惡直為百姓來耳勿怖終不相害使復衣帽而禮之先是髙都郡有山焉絶壁臨水忽有墨書云齊亡延宗洗視愈眀帝使人就寫使者改亡為上至是應焉延宗以十二月十三日晡時受敕守并州明日建尊號不間日而被圍經宿至食時而敗年號德昌好事者言其得二日云既而周武帝問鄴城若為取延宗辭曰亡國大夫不可與圖存此非臣所及強問之乃曰若任城王援鄴臣不能知若今主自守陛下兵不血刃及至長安周武與齊之君臣飲酒令後主起舞延宗悲不自持屢欲仰藥自裁傅婢苦執諫而止未幾周武誣後主及延宗等云遙應穆提婆謀反賜死皆自陳無之延宗攘𬒮泣而不言以椒塞口而死明年李妃收殯之後主之傳位於太子也孫正言竊謂人曰我昔武定中為廣州士曹聞襄城人曹普演有言髙王諸兒阿保當為天子至髙德之承之當滅阿保謂天保德之謂德昌也承之謂幼主年號承光其言竟信云漁陽王紹信文襄第六子也歷特進開府中領軍護軍青州刺史行經漁陽郡有巨富人鍾長命紹信引與同坐太守鄭道蓋來謁長命欲起紹信不聽曰何物小人乃煩主人公為起乃與長命結為弟兄使其妃行家人禮責長命贈賄百萬鍾氏因此貧乏齊滅死於長安文宣諸子文宣五男李后生廢帝及太原王紹德馮世婦生范陽王紹義裴嬪生西河王紹仁顔嬪生隴西王紹廉太原王紹德文宣第二子也天保末為開府儀同三司武成因怒李后詬紹德曰爾父擊我時竟不來救以刀鐶築殺之親以土埋之遊豫園武平元年詔以范陽王子辨才為後襲太原王范陽王紹義文宣第三子也初封廣陽徙封范陽歷位侍中清都尹好與羣小同飲擅使內參歐殺博士任方榮武成杖之二百送付昭信后后又杖一百及後主奔鄴以紹義為尚書令定州刺史周武帝克并州以封輔相為北朔州總管此州齊之重鎮諸勇士多聚焉前長史趙穆司馬王當萬等謀執輔相迎任城王於瀛州事不果遂迎紹義紹義至馬邑先是輔相及其屬韓阿各奴等數十人皆齊叛臣自肆州以北城戍二百八十餘盡從輔相及紹義至皆反馬紹義與靈州刺史袁洪猛引兵南出欲取并州至新興而肆州已為周守前隊二儀同以所部降周周兵擊顯州執刺史陸瓊又攻陷諸城紹義還保北朔周將宇文神舉軍逼馬邑紹義遣杜眀逹拒之兵大敗紹義曰有死而已不能降人遂奔突厥衆三千家徔之紹義令之曰欲還者任意於是哭拜别者太半突厥他鉢可汗謂文宣為英雄天子以紹義重踝似之甚見愛重凡齊人在北者悉𨽻紹義髙寶寧在營州表上尊號紹義遂即皇帝位稱武平元年以趙穆為天水王他鉢聞寶寧得平州亦招諸部各舉兵南向云共立范陽王作齊帝為其報讐周武帝大集兵於雲陽將親北伐遇疾暴崩紹義聞之以為天贊已也盧昌期據范陽亦表迎紹義俄而周將宇文神舉攻滅昌期其日紹義適至幽州聞周守將出兵于外欲乘虛取薊城列天子旌旗登故昭王冡乘髙望逺部分兵衆神舉遣大將軍宇文恩將四千人馳救幽州半為齊軍所殺紹義聞范陽城陷素服舉哀回軍入突厥周人購之於他鉢又使賀若誼往説之他鉢猶不忍遂偽與紹義獵於南境使誼執之以歸流於蜀紹義妃勃海封孝琬女自突厥逃歸紹義在蜀遺妃書云夷狄無信使吾至此竟死蜀中西河王紹仁文宣第四子也天保末為開府儀同三司尋薨隴西王紹廉文宣第五子也初封長樂後改焉性粗暴嘗拔刀逐范陽王紹義紹義走入廄閉門拒之乃免紹義初為清都尹未及理事紹廉先往喚囚悉出率意決遣之能飲酒一舉數升終以此薨孝昭諸子孝昭七男元皇后生樂陵王百年桑氐生襄城王亮出後襄城景王諸姬生汝南王彥理始平王彥德城陽王彥基定陽王彥康汝陽王彥忠樂陵王百年孝昭第二子也孝昭即位立百年為皇太子納斛律光長女為妃帝臨崩遺詔傳位於武成并有手書其末曰百年無罪汝可以樂處置之勿學前人大寧中封樂陵王河清三年五月白虹圍日再重又橫貫而不逹赤星見帝以盆承星影而蓋之一夜盆自破欲以百年厭之會博陵人賈德胄教百年書百年嘗作數勑字德胄封之以奏帝又發怒使召百年百年被召自知不免割帶玦留與妃斛律氏見帝於元都苑涼風堂使百年書敕字驗與德胄所奏相類遣左右亂捶擊之又令人拽百年走繞堂下且走且擊所厯處血皆遍地氣息將盡曰願與阿叔作奴遂斬之棄池中池水盡赤帝於後園親臨瘞之妃把玦哀號不食月餘亦死玦猶在手拳不可開時年十四其父光自擘之乃開後主時改九院為二十七院掘地得小尸緋袍金帶一髻一解一足有靴諸內參竊言百年太子也或以為太原王紹德詔以襄城王子白澤襲爵樂陵王齊亡入關徙蜀死汝南王彥理武平初封王位開府清都尹齊亡入關隨例授儀同大將軍封縣子女入太子宫故得不死隋開皇初卒於并州刺史始平王彥德城陽王彥基定陽王彥康汝南王彥忠與汝南王同受封並加儀同後事闕武成諸子武成十三男胡皇后生後主及琅琊王儼李夫人生南陽王綽後宫生齊安王廓北平王貞髙平王仁英淮南王仁光西河王仁機樂平王仁雍頴川王仁儉安樂王仁雅丹陽王仁直東海王仁謙南陽王綽字仁通武成長子也以五月五日丙時生至午時後主乃生武成以綽母李夫人非正嫡故貶為弟初名融字君明出後漢陽王河清三年改封南陽别為漢陽置後綽始十餘嵗留守晉陽愛波斯狗尉破胡諫之綽歘然斫殺數狗狼籍在地破胡驚走不敢復言後為司徒冀州刺史好祼人畫為獸狀縱犬噬而食之左轉定州汲井水為後池在樓上彈人好微行遊獵無度恣情強暴云學文宣伯為人有婦人抱兒路中逢之走避入草綽奪其兒飼波斯狗婦人號哭綽怒又縱狗使食婦人狗不食塗以兒血乃食焉後主聞之詔鎖綽赴行在所至而宥之問在州何者最樂對曰多取蝎混蛆中觀之極樂後主即夜索蝎一斗比曉得二三升置諸浴斛使人祼卧其中號呌宛轉帝與綽臨觀喜噱不已謂綽曰有如此樂事何不早馳驛奏聞綽由是大為後主所寵拜大將軍朝夕同戲韓長鸞惡之綽尋除齊州刺史將發長鸞令綽親信誣告其反有司奏處大辟後主不忍顯戮使寵胡何猥薩於後園與綽角戲因扼殺之瘞於興聖佛寺經四百餘日乃斂顔色毛髮皆如生俗云五月五日生者腦不壞故也綽兄弟皆呼父為兄兄嫡母為家家乳母為姊姊婦為妹妹齊亡妃鄭氏為周武帝所幸請葬綽勑所司葬於永平陵北琅邪王儼字仁威武成第三子也初封東平王拜開府侍中中書監京畿大都督領軍大將軍領御史中丞遷大司徒尚書令大將軍録尚書事大司馬魏氏舊制中丞出千步清道與皇太子分路行王公皆遙住車去牛頓軛於地以待中丞過其或遲違則赤棒棒之自都鄴後此儀浸絶武成欲雄寵儼乃使一依舊制儼初徔北宫出將上中丞凡京畿步騎領軍之官屬中丞之威司徒之鹵簿莫不畢備帝與胡后在華林園東門外張幕隔青紗步障觀之遣中尉驟馬趣仗不得入自言奉敕赤棒應聲碎其鞍馬驚人墜帝大笑以為善更敕令駐車傳語良久觀者傾京邑儼恆居宫中坐含香殿視事諸父皆拜焉帝幸并州儼恆居守每送駕或中道或至晉陽乃還王師羅嘗從駕後至武成欲罪之辭曰臣與東平王别留連不覺晚武成憶儼為之下泣舍師羅不問儼器服玩飾皆與後主同所須悉官給於南宫嘗見新氷緑李還怒曰尊兄已有我何意無從是後主先得新竒屬官及工匠必獲罪太上胡后猶以為不足儼嘗患喉使醫下針張目不瞬又言於帝曰阿兄愞何能率左右帝每稱曰此黠兒也當有所成以後主為劣有廢立之意武成崩改封琅邪儼以和士開駱提婆等奢恣意甚不平嘗衆詰之二人相謂曰琅邪眼光奕奕數步射人每奉對不覺汗出天威尚不爾也由是忌之武平二年出儼居北宫五日一朝不復得時見太后四月詔除太保餘官悉解猶帶中丞且以京畿北城有武庫欲移儼於外然後奪其兵權書侍御史王子宜與儼左右開府髙舍洛中常侍劉辟強説儼曰殿下被踈正由士開間構何可出北宫入百姓叢中也儼謂侍中馮子琮曰士開罪重兒欲殺之子琮心欲廢帝而立儼因贊成其事儼乃令子宜表彈士開罪請付禁推子琮雜以他文書奏之後主不審省而可之儼誑領軍庫狄伏連曰奉敕令領軍收士開伏連以咨子琮且請覆奏子琮曰琅邪王受敕何須重奏伏連信之伏五十人於神虎門外詰旦執士開送御史儼使馮永洛就臺斬之儼徒本意唯殺士開及是因逼儼曰事既然不可中止儼遂率京畿軍士三千餘人屯千秋門外帝使劉桃枝將禁兵八十人召儼桃枝遙拜儼命反縛將斬之禁兵散走帝又使馮子琮召儼儼辭曰士開謀廢至尊欲剃家家頭為尼罪合萬死臣為是矯詔誅之尊兄若欲殺臣不敢逃罪若放臣願遣姊姊來迎臣臣即入見姊姊即陸令萱也儼欲誘出殺之令萱執刀帝後聞之戰栗又使韓長鸞召儼儼將入劉辟強牽衣諫曰若不斬提婆母子殿下無由得入廣寧安德二王適從西來欲助成其事曰何不入辟強曰人少安德王顧衆而言曰孝昭誅楊遵彥只八十人今乃數千何言人少後主泣啓太后當與家家永别乃急召斛律光儼時亦召之光聞儼殺士開撫掌大笑曰龍子作事固自不似凡人入見後主於永巷帝率宿衛者步騎四百授甲將出光曰小兒輩㺯兵與交手即亂鄙諺曰奴見大家心死至尊宜自至千秋門琅邪必不敢動皮景和亦以為然後主從之光步道使人走出曰大家來儼徒駭散帝駐馬橋上遙呼之儼猶立不進光就謂曰天子弟殺一漢何苦執其手強引以前請帝曰琅邪王年少輕為舉措長大自不復然願寬其罪帝拔儼帶刀鐶亂築辨頭良久乃釋之收伏連及髙舍洛王子宜劉辟強都督翟顯貴於後園帝親射之而後斬皆支解暴之都街下文武職吏盡欲殺之光以皆勳貴子弟恐人心不安趙彥深亦云春秋責帥於是罪之各有差儼之未獲罪也鄴城北有白馬佛塔石虎時為佛圗澄作也儼將修之巫云浮屠不可動動之北城當失主不徔破至第二級得白蛇長數丈回旋失之數旬而儼敗自是太后處儼於宫內食必自嘗之陸令萱説帝曰琅邪王聰明雄勇觀其相表殆非人臣自専殺已來常懷恐懼宜早為計何洪珍與和士開素善亦請殺之未決帝以食輿密迎祖珽問之珽稱周公殺管蔡季友鴆慶父以對帝納其言以儼之晉陽使右衛大將軍趙元侃誘執儼元侃曰臣昔事先帝日見先帝愛王今寧就死不能行此帝出元侃為豫州刺史九月帝啓太后曰眀旦欲與仁威出獵須早出早還是夜四鼓帝召儼儼疑之陸令萱曰兄兄喚兒何不去儼出至永巷劉桃枝反接其手儼呼曰乞見家家尊兄桃枝以袖塞其口反𫀆蒙頭負出至大眀宫鼻血滿面遂拉殺之時年十四裹之以席埋於室內帝使啓太后臨哭十餘聲即擁入殿眀年三月葬於鄴西贈諡曰椘恭哀帝以慰太后有遺腹四男生數月皆幽死以平陽王淹孫世俊嗣儼妃李祖欽女也進為椘帝后居宣則宫齊亡乃嫁焉齊安王廓字仁𢎞武成第四子也性長者無過行位特進開府儀同三司定州刺史北平王貞字仁堅武成第五子也沈審寬厚帝常曰此兒得我鳯毛位司州牧京畿大都督兼尚書令録尚書事帝行幸總留臺事積年後主以貞長大漸忌之阿那肱承旨令馮士幹劾繫貞於獄奪其留後權髙平王仁英武成第六子也舉止軒昂精神無檢格位定州刺史淮南王仁光武成第七子也性躁暴位清都尹次西河王仁機生而無骨不自支持次樂平王仁雍次頴川王仁儉次安樂王仁雅從小有瘖疾次丹陽王仁直次東海王仁謙皆飬於北宫琅邪王死後諸王守禁彌切武平末仁雍已下始得出外供給儉薄取充而已尋後主窮蹙以廓為光州刺史貞為青州仁英為冀州仁儉為膠州仁直為濟州自廓已下多與后主死於長安仁英以清狂仁雅以瘖疾獲免俱徙蜀隋開皇中追還仁英詔與蕭琛陳叔寶修其本宗祭祀未幾而卒後主諸子後主五男穆皇后生幼主諸姬生東平王恪次善德次賈德次質錢胡太后以恪嗣琅邪王尋夭折齊滅周武帝以任城王以下大小二十一王歸于長安皆有封爵其後不從戮者散配西土皆死於邉通志卷八十五上
