body:
  text: 通志卷一百二十二宋右迪功郎鄭樵漁仲撰列傳第三十五晉魏舒李喜劉實弟智髙光王渾子濟王濬唐彬山濤子簡遐簡子王戎從弟衍郭衍弟澄舒樂廣鄭袤子默球默子李允盧欽子浮子志弟珽諶珽志子華表子廙廙子恆嶠恆弟石鑒溫羡魏舒字陽元任城樊人也少孤為外家寧氏所飬寧氏起宅相宅者云當出貴甥外祖母以魏氏甥小而慧意謂應之舒曰當為外氏成此宅相久乃别居身長八尺二寸姿望秀偉飲酒石餘而遲鈍質朴不為鄉親所重從叔父吏部郎衡有名當世亦不之知使守水碓每嘆曰舒堪數百户長我願畢矣舒亦不以介意不修常人之節不為皎厲之事每欲容才長物終不顯人之短性好騎射著韋衣入山澤以漁獵為事惟太原王乂謂舒曰卿終為台輔然今未能令妻子免飢寒吾當助卿營之常振其匱乏舒受而不辭舒嘗詣野王主人妻夜産俄而聞車馬之聲相問曰男也女也曰男書之十五以兵死復問寢者為誰曰魏公舒後十五載詣主人問所生兒何在曰因條桑為斧傷而死舒自知當為公矣年四十餘郡上計掾察孝亷宗黨以舒無學業勸令不就可以為髙耳舒曰若試而不中其負在我安可虛竊不就之髙以為已榮乎遂自課百日習一經因而對䇿升第除澠池長遷浚儀令入為尚書郎時欲沙汰郎官非其才者罷之舒曰吾即其人也襆被而出同僚素無清論者皆有愧色談者稱之纍遷後將軍鍾育長史育每與參佐射舒常為畫籌而已後遇朋人不足以舒滿數育初不知其善射舒容範間雅發無不中舉坐愕然莫有敵者育嘆而謝曰吾不足以盡卿才有如此射矣豈一事哉轉相國參軍封劇陽子府朝碎務未嘗見是非至於廢興大事衆人莫能斷者舒徐為籌之多出衆議之表文帝深器重之每朝會坐罷目送之曰魏舒堂堂人之領神也遷宜陽滎陽二郡太守甚有聲稱徴拜散騎常侍出為冀州刺史在州三年以簡惠稱入為侍中武帝以舒清素特賜絹百匹遷尚書以公事當免官詔以贖論舒三娶妻皆亡是歲自表乞假還本郡葬妻詔賜葬地一頃錢五十萬太康初拜右僕射舒與衛瓘山濤張華等以六合混一宜用古典封禪東嶽前後纍陳其事帝謙讓不許以舒為左僕射領吏部舒上言令選六宫聘以玉帛而舊使御府丞奉聘宣成嘉禮贄重使輕以為拜三夫人宜使卿九嬪使五官中郎將美人良人使謁者於典制為𢎞有詔詳之衆議異同遂寢加右光祿大夫儀同三司及山濤薨以舒領司徒有頃即真舒有威重德望祿賜散之九族家無餘財陳留周震纍為諸府所辟辟書既下公輒喪亡僉號為殺公掾莫有辟者舒乃命之而竟無患識者以此稱其逹命以年老每稱疾遜位中復暫起署兖州中正尋又稱疾尚書左丞郤詵與舒書曰公久疾小差視事是也唯上所念何意起訖還卧屈身廽法甚失具瞻之望公少立巍巍一旦棄之可不惜哉舒稱疾如初後以災異遜位帝不聽後因正旦朝罷還第表送章綬帝手詔敦勉而舒執意彌固乃詔舒以劇陽子就第位儀同三司祿賜如前几杖不朝賜錢百萬牀帳簟褥自副以舍人四人為劇陽子舍人置官騎十人使光祿勳奉䇿主者詳案典禮令皆如舊制於是賜安車駟馬門施行馬舒為事必先行而後言遜位之際莫有知者時論以為晉興以來三公能辭榮善終者未之有也司空衛瓘與舒書曰每與足下共論此事日日未果可謂瞻之在前忽焉在後矣太熙元年薨時年八十二帝甚傷悼賵賻優厚諡曰康子混字延廣清惠有才行為太子舍人年二十七先舒卒朝野咸為舒悲惜舒每哀慟退而嘆曰吾不及莊生逺矣豈以無益自損乎於是終服不復哭詔曰舒惟一子薄命短折舒告老之年處窮獨之苦每念怛然為之嗟悼乃給陽燧四望繐窗户皂輪車牛一乘庶出入觀望或足散憂也以庶孫融嗣又早卒從孫晃嗣李喜字季和上黨銅鞮人也父佺漢大鴻臚喜少有髙行博學研精與北海管寧以賢良徴不行纍辟三府不就宣帝復辟喜為太傅屬固辭疾郡縣扶輿上道時喜母疾篤乃竊踰泫氏城而徒還遂遭母喪論者嘉其志節後為并州别駕時驍騎將軍秦朗過并州州將畢軌敬焉令乘車至閣喜固諫以為不可軌不得已從之景帝輔政命喜為大將軍從事中郎喜到引見謂喜曰昔先公辟君而君不應今孤命君而君至何也對曰先公以禮見待喜得以禮進退明公以法見繩喜畏法而至帝甚重之轉司馬尋拜右長史從討毌邱儉還遷御史中丞當官正色不憚強禦百僚震肅焉薦樂安孫璞亦以道德顯時人稱為知人尋遷大司馬以公事免司馬佃為寧北將軍鎮鄴以喜為軍司頃之除涼州刺史加揚威將軍假節領護羌校尉綏御華夷甚有聲績羌虜犯塞喜因其隙會不及啓聞輒以便宜出軍深入遂大剋獲以功重免譴時人比之漢朝馮甘焉於是請還許之居家月餘拜冀州刺史纍遷司𨽻校尉及魏帝告禪于晉喜以本官行司徒事副太尉鄭沖奉䇿泰始初封祁侯喜上言故立進令劉友前尚書山濤中山王睦故尚書僕射武陔各占官三更稻田請免濤睦等官陔已亡請貶諡詔曰犮侵刻百姓其考竟以懲邪佞濤等不二其過皆勿問喜亢志在公當官而行可謂邦之司直矣其申敕羣僚各慎所司寬宥之恩不可數遇也喜為二代司𨽻朝野稱之以公事免其年皇太子立以喜為太子太傅自魏明帝以後久曠東宫制度廢闕官司不具詹事左右率庶子中舍人諸官並未置唯置衛率令典兵二傅并攝衆事喜在位纍年訓導盡規遷尚書僕射拜特進光祿大夫以年老遜位詔喜因光祿之號改假金紫置官騎十人賜錢五十萬祿賜班禮一如三司門施行馬初喜為僕射時涼州虜寇邊喜唱義遣軍討之朝士謂出兵不易虜未足為患竟不從之後虜果大縱逸涼州覆沒朝廷深悔焉以喜清素貧儉賜絹百匹及齊王攸出鎮喜上表諫諍辭甚懇切喜自歷仕雖清非異衆而家無儲糧親舊故人乃至分衣共食未嘗私以王官及卒追贈太保諡曰成子贊嗣少子儉字仲約歷左積弩將軍屯騎校尉儉子𢎞字世彥少有清節永嘉中歷給事黃門侍郎散騎常侍劉實字子真平原髙唐人漢濟北惠王夀之後也父廣斥邱令實少貧苦賣牛衣以自給然好學手約繩口誦書博通古今清身潔已行無瑕玷郡察孝亷州舉秀才皆不行以計吏入洛調為河南尹丞遷尚書郎廷尉正後歷吏部郎參文帝相國軍事封循陽子鍾會鄧艾之伐蜀也有客問實曰二將其平蜀乎實曰破蜀必矣而皆不還客問其故笑而不答竟如其言實之先見皆此類也以世多進趣亷遜道廢乃著崇讓論以矯之辭多不録泰始初進爵為伯纍遷少府咸寧中為太常轉尚書杜預之伐吳也實以本官行鎮南軍司初實妻盧氏生子躋而卒華氏將以女妻之實弟智諫曰華氏類貪必破門户辭之不得竟婚華氏而生子夏實竟坐夏受賂免官頃之為大司農又以夏罪免實每還州里鄉人載酒肉以候之實難逆其意輒共啖之而返其餘或謂實曰君行髙一世而諸子不能遵何不旦夕切磋使知過而自改邪實曰吾之所行是所聞見不相祖習豈復教誨之所得乎世以實言為當後起為國子祭酒散騎常侍愍懷太子初封廣陵王髙選師友以實為師元康初進爵為侯纍遷太子太保加侍中特進右光祿大夫開府儀同三司領冀州都督九年䇿拜司空遷太保轉太傅太安初實以老病遜位賜安車駟馬錢百萬以侯就第及長沙成都之相攻也實為軍人所掠潛歸鄉里惠帝崩實赴山陵懷帝即位復授太尉實自陳年老固辭不許左丞劉坦上言以為古之飬老以不事為優不以吏之為重謂宜聽實所守三年詔實以侯就第位居三司之上秩祿凖舊賜几杖不朝及宅一區國之大政就其咨訪歲餘薨時年九十一諡曰元實少貧窶杖䇿徒行每所憩止不纍主人薪水之事皆自營給及位望通顯每崇儉素不尚華麗嘗詣石崇家如厠見有綘紋帳裀褥甚麗兩婢持香囊實便退笑謂崇曰誤入卿內崇曰是厠耳實曰貧士未嘗得此乃更如他厠雖處榮寵居無第宅所得俸祿贍恤親故雖禮教陵遲而行已以正喪妻為廬杖之制終喪不御內輕薄者笑之實不以介意自少及老篤學不倦雖居職務卷弗離手尤精三傳辨正公羊以為衛輒不應辭以王父命祭仲失為臣之節舉此二端以明臣子之體遂行於世又撰春秋條例二十卷有二子躋夏躋字景雲官至散騎常侍夏以貪汚棄放於世實弟智字子房貞素有兄風少貧窶每負薪自給讀誦不輟竟以儒行稱歷中書黃門吏部郎出為潁川太守平原管輅嘗謂人曰吾與劉潁川兄弟語使人神思清發昏不假寐自此之外殆白日欲寢矣入為祕書監領南陽王師加散騎常侍遷侍中尚書太常著喪服釋疑論多所辨明太康末卒諡曰成髙光字宣茂陳留圉城人魏太尉柔之子也光少習家業明練刑理初以太子舍人纍遷尚書郎出為幽州刺史潁川太守是時武帝置黃沙獄以典詔囚以光歷世眀法用為黃沙御史秩與中丞同遷廷尉元康中拜尚書典三公曹時趙王倫篡逆光於其際守道貞全及倫賜死齊王冏輔政復以光為廷尉遷尚書加奉車都尉後從駕討成都王頴有功封延陵縣公邑千八百户于時朝廷咸推光明於用法故頻典理官惠帝為張方所逼幸長安朝臣奔散莫有從者光獨侍帝而西遷尚書左僕射加散騎常侍光兄誕為上官已等所用歷徐雍二州刺史誕性任放無倫次而決烈過人與光異操常謂光小節恆輕侮之光事誕愈謹帝既還洛陽時太弟新立重選傅訓以光為少傅加光祿大夫常侍如故及懷帝即位加光祿大夫金章紫綬與傅祗並見推崇尋為尚書令本官如故以疾卒贈司空侍中屬京洛傾覆竟未加諡子韜字子逺放佚無檢光為廷尉時韜受貨賕有司奏按之而光不知時人雖非光不能防間其子以其用心有素不以為纍初光詣長安留臺以韜兼為右衛將軍韜與殿省小人交通及光卒仍於喪中往來不絶時東海王越輔政不朝覲韜知人心有望密與太傅參軍薑頥京兆杜概等謀討越事泄伏誅王渾字元沖太原晉陽人也父昶魏司空渾沈雅有器量襲父爵京陵侯辟大將軍曹爽掾爽誅隨例免起為懷令參文帝安東軍事纍遷散騎黃門侍郎散騎常侍咸熙中為越騎校尉武帝受禪加揚烈將軍遷徐州刺史時年荒歲飢渾開倉賑贍百姓賴之泰始初增封邑千八百户久之遷東中郎將督淮北諸軍事鎮許昌數陳損益多見納用轉征虜將軍監豫州諸軍事假節領豫州刺史渾與吳接境宣布威信前後降附甚多吳將薛瑩魯淑衆號十萬淑向弋陽瑩向新息時州兵並放休息衆裁一旅浮淮潛濟出其不意瑩等不虞晉師之至渾擊破之以功封次子尚為關內侯遷安東將軍都督揚州諸軍事鎮夀春吳人大佃皖城圖為邊害渾遣揚州刺史應綽督淮南諸軍攻破之並破諸别屯焚其積穀百八十餘萬斛稻苖四千餘頃船六百餘艘渾遂陳兵東疆視其地形險易歷觀敵城察攻取之勢及大舉伐吳渾率師出橫江遣參軍陳慎都尉張喬攻尋陽瀨鄉又擊吳牙門將孔忠皆破之獲吳將周興等五人又遣殄吳護軍李純據髙望城討吳將俞恭破之多所斬獲吳厲武將軍陳代平虜將軍朱明懼而來降吳丞相張悌大將軍孫震等率衆數萬指城陽渾遣司馬孫疇揚州刺史周浚擊破之臨陳斬二將及首虜七千八百級吳人大震孫皓司徒何植建威將軍孫晏送印節詣渾降既而王濬破石頭降孫皓威名益振明日渾始濟江登建鄴宫釃酒髙會自以先據江上破皓中軍按甲不進致在王濬之後意甚愧恨有不平之色頻奏濬罪狀時人譏之帝下詔曰使持節都督揚州諸軍事安東將軍京陵侯王渾督率所統遂逼秣陵令賊孫皓救護自衛不得分兵上赴以成西軍之功又摧大敵獲張悌使皓塗窮勢盡靣縛乞降遂平定秣陵功勳茂著其增封八千户進爵為公封子澄為亭侯弟湛為關內侯賜絹八千匹轉征東大將軍復鎮夀陽渾不尚刑名處斷明允時吳人新附頗懷畏懼渾撫循羈旅虛懷綏納座無虛席門不停賔於是江東之士莫不悅附徴拜尚書左僕射加散騎常侍會朝廷立議齊王攸當之藩渾上書言攸至親盛德宜贊朝政今陛下出攸之國假以都督虛號而無典戎幹方之實懼非追述先帝文明太后待攸之宿意也若以攸望重於事宜出者今以汝南王亮代攸亮宣皇帝子文皇帝弟胄駿各處方任有內外之資論以後慮亦不為輕攸今之國適足長異同之論以損仁慈之美耳而令天下窺陛下有不崇親親之情臣竊為陛下不取也若以妃后外親任以朝政則有王氏傾漢之權吕産專朝之禍若以同姓至親則有吳楚七國逆亂之殃歷觀古事輕重所在無不為害唯當任王道而求忠良耳若以智計猜物雖親見疑至於疏逺者庸可保乎愚以為太子太保缺宜留攸居之庶全陛下有篤親親之恩使攸蒙仁覆之惠也帝不納太熙初遷司徒惠帝即位加侍中又京陵置士官如睢陵比及楊駿誅重崇舊臣乃加渾兵渾以司徒文官主史不持兵持兵乃吏屬絳衣自以偶因時寵權得持兵非是舊典皆令皂服論者美其謙而識體楚王瑋將害汝南王亮等也公孫宏説瑋曰昔宣帝廢曹爽引太尉蔣濟參乘以增威重大王今舉非常事宜得宿望鎮壓衆心司徒王渾宿有威名為三軍所信服可請同乘使物情有憑也瑋從之渾辭疾歸第以家兵千餘人閉門距瑋瑋不敢逼俄而瑋以矯詔伏誅渾乃率兵赴宫帝嘗訪渾元會問郡國計吏方俗之宜渾奏曰陛下欽明聖哲光于逺近明詔沖虛詢及芻蕘斯乃周文疇咨之求仲尼不耻下問也舊三朝元會前計吏詣軒下侍中讀詔計吏跪受臣以詔文相承已久無他新聲非陛下留心方國之意也可令中書令指宣明詔問方土異同賢才秀異風俗好尚農桑本務刑獄得無寃濫守長得無侵虐其勤心政化興利除害者授以紙筆盡意陳聞以明聖指埀心四逺不復因循常辭且察其答對文義以觀計吏人才之實又先帝時正會後東堂見征鎮長史司馬諸王國卿諸州别駕若不能别見可前詣軒下使侍中宣問以審察方國於事為便帝然之又詔渾録尚書事渾所歷之職前後著稱及居台輔聲望日減元康七年薨時年七十五諡曰元長子尚早亡次子濟嗣濟字武子少有逸才風姿英爽氣蓋一時好弓馬勇力絶人善易及莊老文詞俊茂伎藝過人有名當世與姊夫和嶠及裴楷齊名尚常山公主年二十起家拜中書郎以母憂去官起為驍騎將軍纍遷侍中與侍中孔恂王恂楊濟同列為一時俊彥武帝嘗會公卿藩牧於式乾殿顧濟恂而謂諸公曰朕左右可謂恂恂濟濟矣每侍見未嘗不咨論人物及萬機得失濟善於清言修飾詞令諷議將順朝臣莫能尚焉帝益親貴之仕進雖速論者不以主壻之故咸稱才能致之然外雖𢎞雅而內多忌刻好以言傷物儕類以此少之以其父故每排王濬時議譏之齊王攸當之藩濟既陳情又纍使公主與甄德妻長廣公主俱入稽顙泣請帝留攸帝怒謂侍中王戎曰兄弟至親今出齊王自是朕家事而甄德王濟連遣婦來生哭人以忤旨左遷國子祭酒常侍如故數年入為侍中時渾為僕射主者處事或不當濟性峻厲明法繩之素與從兄佑不平佑黨頗謂濟不能顧其父由是長異同之言出為河南尹未拜坐鞭王官吏免官而王佑始見委任而濟遂被斥外於是乃移第北芒山下性豪侈麗服玉食時洛京地甚貴濟置地為馬埒編錢滿之時人謂為金溝王愷以帝舅奢豪有牛名八百里駁常瑩其蹄角濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡牀叱左右速探牛心來須臾而至一割便去和嶠性至儉家有好李帝求之不過數十濟候其上直率少年詣園共啖畢伐樹而去帝嘗幸其宅供饌甚豐悉貯琉璃器中蒸肫甚美帝問其故答曰以人乳蒸之帝色甚不平食未畢而去濟善解馬性嘗乘一馬著連乾鄣泥前有水終不肯渡濟云此必是惜鄣泥使人解去便渡故杜預謂濟有馬癖帝嘗謂和嶠曰我將罵濟而後官爵之何如嶠曰濟俊爽恐不可屈帝因召濟切讓之既而曰知愧不濟答曰尺布斗粟之謡常為陛下耻之他人能令親疏臣不能使親親以此愧陛下耳帝默然帝嘗與濟棊而孫皓在側謂皓曰何以剝人面皮皓曰見無禮於君者則剝之濟時伸腳局下而皓譏焉尋使白衣領太僕年四十六先渾卒追贈驃騎將軍及其將葬時賢無不畢至孫楚雅敬濟而後來哭之甚悲賔客莫不垂涕哭畢向靈牀曰卿常好我作驢鳴我為卿作之體似聲真賔客皆笑楚顧曰諸君不死而令王濟死乎初濟尚公主主兩目失眀而妬忌尤甚然終無子有庶子二人卓字文宣嗣渾爵拜給事中次聿字茂宣襲公主封敏陽侯濟二弟澄字道深汶字茂深皆辨惠有才藻並歷清顯王濬字士治𢎞農湖人也家世二千石濬博涉墳典美姿貌不修名行不為鄉曲所稱晚乃變節疏通亮逹恢廓有大志嘗起宅開門前路廣數十步人或謂之何太過濬曰吾欲使容長戟幡旗衆咸笑之濬曰陳勝有言燕雀安知鴻鵠之志州郡辟河東從事守令有不亷潔者皆望風自引而去刺史燕國徐邈有女才淑擇夫未嫁邈乃大會佐吏令女於內觀之女指濬告母邈遂妻之後參征南軍事羊祜深知待之祜兄子暨白祜濬為人志大奢侈不節不可專任宜有以裁之祜曰濬有大才將欲濟其所欲必可用也轉車騎從事中郎識者謂祜可謂能舉善焉除巴郡太守郡邊吳境兵士苦役生男多不飬濬乃嚴其科條寬其徭課其産育者皆與休復所全活者數千人轉廣漢太守垂惠布政百姓賴之濬夜夢懸三刀於卧屋梁上須臾又益一刀濬驚覺意甚惡之主簿李毅再拜賀曰三刀為州字又益一者明府其臨益州乎及賊張𢎞殺益州刺史皇甫晏果遷濬為益州刺史濬設方略悉誅𢎞等以勳封關內侯懷輯殊俗待以威信蠻夷徼外多來歸降徴拜右衛將軍除大司農車騎將軍羊祜雅知濬有竒略乃密表留濬於是重拜益州刺史武帝謀伐吳詔濬修舟艦濬乃作大船連舫方百二十步受二千餘人以木為城起樓櫓開四出門其上皆得馳馬來往又畫鷁首怪獸於船首以懼江神舟楫之盛自古未有濬造船於蜀其木柿蔽江而下吳建平太守吳彥取流柿以呈孫皓曰晉必有攻吳之計宜增建平兵建平不下終不敢渡皓不從尋以謡言拜龍驤將軍監益梁諸軍事語在羊祜傳時朝議咸諫伐吳濬乃上疏曰臣數參訪吳楚同異孫皓荒淫凶逆荆揚賢愚無不嗟怨且觀時運宜速征伐若今不伐天變難預令皓卒死更立賢主文武各得其所則強敵也臣作船七年日有朽敗又臣年已七十死亡無日三者一乖則難圖也誠願陛下無失事機帝深納焉賈充荀勗陳諫以為不可唯張華固勸又杜預表請帝乃發詔分命諸方節度濬於是統兵先在巴郡之所全育者皆堪徭役供軍其父母戒之曰王府君生爾爾必勉之無愛死也太康元年正月濬發自成都率巴東監軍廣武將軍唐彬等攻吳丹陽尅之禽其丹陽監盛紀吳人於江險磧要害之處並以鐡鎖橫截之又作鐡錐長丈餘暗置江中以逆巨船先是羊祜獲吳間諜具知情狀濬乃作大筏數十亦方百餘步縳草為人被甲持杖令善水者以筏先行筏遇鐡錐錐輒著筏去又作火炬長十餘丈大數十圍灌以麻油在船前遇鎖然炬燒之須臾融液斷絶於是船無所礙二月庚申尅吳西陵獲其鎮南將軍留憲征南將軍成據宜都太守盧忠壬戌尅荆門夷道二城獲監軍陸晏乙丑尅樂鄉獲水軍督陸景平西將軍施洪等來降乙亥詔進濬為平東將軍假節都督益梁諸軍事濬自發蜀兵不血刃攻無堅城夏口武昌無復支抗於是順流鼓棹徑造三山皓遣遊擊將軍張象率舟軍萬人以禦濬象望旗而降皓聞濬軍旌旗器甲屬天滿江威勢甚盛莫不破膽用其光祿勳薛瑩中書令胡沖計送降文於濬曰吳郡孫皓叩頭死罪昔漢室失御九州幅裂先人因時略有江南遂阻山河與魏乖隔大晉龍興德覆四海暗劣偷安未喻天命至於今者猥煩六軍衡蓋路次逺臨江渚舉國震惶假息漏刻敢緣天朝含𢎞光大謹遣私署太常張夔等奉所佩璽綬委質請命壬寅濬入于石頭皓乃備亡國之禮素車白馬肉袒面縛銜璧牽羊大夫衰服士輿襯率其偽太子瑾瑾弟魯王虔等二十一人造于壘門濬躬解其縳受璧焚櫬送于京師乃收其圖籍封其府庫軍無私焉帝遣使者犒濬軍初詔書使濬下建平受杜預節度預至江陵謂諸將帥曰若濬軍得下建平則順流長驅威名已著不宜令受制於我若不能克則無緣得施節度濬至西陵預與之書曰足下宜摧其西藩便當徑取秣陵討纍世之逋寇釋吳人於塗炭自江入淮逾于泗汴泝河而上振旅還京師亦曠世一事也濬大悅表呈預書及濬將至秣陵王渾遣使要令暫過論事濬舉帆直指報曰風利不得泊也王渾久破皓中軍斬張悌等頓兵未敢進而濬乘勝納降渾耻而且忿乃表濬違詔不受節度誣罪狀之有司遂按濬檻車徴帝弗許下詔讓濬曰伐國事重宜令有一前詔使將軍受安東將軍渾節度渾思謀深重案甲以待將軍云何徑前不從軍命違制昧利甚失大義將軍功勳簡在朕心當率由詔書崇成王法而於事終恃功肆意朕將何以令天下濬上書自理曰臣前被庚戌詔書曰軍人乘勝猛氣益壯便當順流長騖直造秣陵臣被詔之日即便東下又前被詔書云太尉賈充總統諸方自鎮東大將軍胄及渾濬彬等皆受充節度無令臣别受節度之文臣自逹巴邱所向風靡知孫皓窮踧勢無所至十四日至牛渚去秣陵二百里宿設部分為攻取節度前至三山見渾軍在北岸遣書與臣可暫來過共有所議亦不語臣當受節度之意臣水軍風發乘勢造賊城加宿設部分行有次第無緣得於長流之中廽船過渾令首尾斷絶須臾之間皓遣使歸命臣即報渾書并寫皓箋具以示渾使速來當於石頭相待軍以日中至秣陵暮乃被渾所下當節度之符欲令臣明十六日悉將所領還圍石頭備皓越逸又索蜀兵及鎮南諸軍人名定見臣以為皓已來首都亭無緣共合空圍又兵人定見不可倉卒皆非當今之急不可承用中詔謂臣忽棄明制專擅自由伏讀嚴詔驚怖悚栗不知軀命當所投厝豈惟老臣獨懷戰灼三軍上下咸盡喪氣臣受國恩任重事大常恐託付不效孤負聖朝故投身死地轉戰萬里被蒙寬恕之恩得從臨履之宜是以憑賴威靈幸而能濟皆是陛下神䇿廟算臣承指授效鷹犬之用耳有何勳勞而恃功肆意寧敢昧利而違聖詔臣以十五日至秣陵而詔書以十二日起洛陽其間懸闊不相赴接則臣之罪責宜蒙察恕假令孫皓猶有螳蜋舉斧之勢而臣輕軍單入有所虧喪罪之可也臣所統八萬餘人乘勝席卷皓以衆叛親離無復羽翼匹夫獨坐不能庇其妻子雀鼠貪生茍乞一活耳而江北諸軍不知其虛實不早縳取自為小誤臣至便得更見怨恚並云守賊百日而令他人得之言語噂􅊱不可聽聞案春秋之義大夫出疆由有專輒臣雖愚蠢以為事君之道唯當竭節盡忠奮不顧命量力受任臨事制宜苟利社稷死生以之若其顧護嫌疑以避咎責此是人臣不忠之利實非明主社稷之福也臣不自料忘其鄙劣披布丹心輸寫肝膽欲竭股肱之力加之以忠貞庶必掃除凶逆清一宇宙願令聖世與唐虞比隆陛下粗察臣之愚欵而識其欲自效之誠是以授臣以方牧之任委臣以征討之事雖燕王之信樂毅漢祖之任蕭何無以加焉受恩深重死且不報而以頑疏舉措失宜陛下𢎞恩財加切讓惶怖怔營無地自厝願陛下明臣赤心而已渾又騰周浚書云濬軍得吳寶物濬復表曰被戊戌詔書下安東將軍所上揚州刺史周浚書謂臣諸軍得孫皓寶物又謂牙門將李髙放火燒皓偽宫輒公文上尚書具列本末又聞渾案陷上臣臣受性愚忠行事舉動信心而前期於不負神明而已秣陵之事皆如前所表而惡直醜正實繁有徒欲構南箕成此貝錦公於聖世反白為黑夫佞邪害國自古而然故無極破楚宰嚭滅吳及至石顯傾亂漢朝皆載在典籍而為世作戒昔樂毅伐齊下城七十而卒被讒間脫身出奔樂羊既反謗書滿篋况臣頑疏能免讒慝之口然所望全其首領者實賴陛下聖哲欽明使浸潤之譖不得行焉然臣孤根獨立朝無黨援久棄遐外人道斷絶而結恨強宗取怨豪族以纍卵之身處雷霆之衝繭栗之質當豺狼之路其見吞噬豈抗唇齒夫犯上干主其罪可救乖忤貴臣則禍在不測故朱雲折檻嬰逆鱗之怒慶忌救之成帝不問望之周堪違忤石顯雖闔朝嗟嘆而死不旋踵此臣之所大怖也今渾之支黨姻族外內皆根據盤互並處世位聞遣人在洛中專共交構盜言孔甘疑惑觀聽夫曾參之不殺人亦以明矣然三人傳之其母投杼今臣之信行未若曾參之著而讒構沸騰非徒三夫之對外內扇助為二五之應夫猛虎當塗麒麟恐懼况臣脆弱敢不悚栗偽吳君臣今皆生在便可驗問以明虛實前偽中郎將孔攄説去二月武昌失守水軍行至皓案行石頭還左右皆跳刀大呼云要當為陛下一死戰決之皓意大喜謂必能然便盡出金寶以賜與之小人無狀得便持走皓懼乃圖降首降使適去左右劫奪財物略取妻妾放火燒宫皓逃身竄首恐不脫死臣至遣參軍主者救斷其火耳周浚以十六日前入皓宫臣時遣記室吏往視書籍浚使收縛若有遺寶則浚前得不應移蹤後人欲求茍免也臣前在三山得浚書云皓散寶物以賜將士府庫空虛而今復言金銀篋笥動有萬計疑臣軍得之言語反覆無復本末臣復與軍司張牧汝南相馮紞等共入觀皓宫乃無席可坐後日又與牧等共視皓舟船渾又先臣一日上其船船上之物皆渾所知見臣之案行皆出其後若有寶貨渾應得之又臣將軍素嚴兵人不得妄離部陳聞在秣陵諸軍凡二十萬衆臣軍先至為土地之主百姓之心皆歸仰臣臣切勑所領秋毫不犯諸有市易皆有伍任證佐明從劵契有違犯者凡斬十三人皆吳人所知也餘軍縱橫詐稱臣軍而臣軍類皆蜀人幸以此自别耳豈獨浚之將士皆是夷齊而臣部軍悉聚盜跖邪時有八百餘人緣石頭城劫取布帛臣牙門將軍馬潛即收得二十餘人并疏其督將姓名移以付浚使得自科決而寂無反報疑皆縱遣絶其端緒也又聞吳人言前張悌戰時所殺才有二千人而渾浚露布言以萬計以吳剛子為主簿而遣剛至洛欲令剛增斬級之數可具問孫皓及其諸臣則知其定審若信如所聞浚等虛詐尚欺陛下豈惜於臣云臣屯聚蜀人不時送皓欲有反狀又恐動吳人言臣皆當誅殺取其妻子冀其作亂得騁私忿謀反大逆尚以見加其餘謗􅊱故其宜耳渾案臣瓶磬小器蒙國厚恩頻繁擢敘遂過其任渾此言最信內省慙懼今年平吳誠為大慶於臣之身便受咎纍既無孟側䇿馬之好而令濟濟之朝有讒邪之人虧穆穆之風損皇代之美由臣頑疏使致於此拜表流汗言不識次濬至京都有司奏濬表既不列前後所被七詔月日又赦後違詔不受渾節度大不敬付廷尉科罪詔曰濬前受詔徑造秣陵後乃下受渾節度詔書稽留所下不至便合與不受詔同責未為經通濬不即表上被渾宣詔此可責也濬有征伐之勞不足以一眚掩之有司又奏濬赦後燒賊船百三十五艘輒敕付廷尉禁推詔曰勿推拜濬輔國大將軍領步兵校尉舊校唯五置此營自濬始也有司又奏輔國依比未為逹官不置司馬不給官騎詔依征鎮給五百大車增兵五百人為輔國營給親騎百人官騎十人置司馬封襄陽縣侯邑萬户封子彛楊鄉亭侯邑千五百户賜絹萬匹又賜衣一襲錢三十萬及食物濬自以功大而為渾父子及豪強所抑屢為有司所奏每進見陳其攻伐之勞及見枉之狀或不勝忿憤徑出不辭帝每容恕之益州護軍范通濬之外親也謂濬曰卿功則美矣然恨以所居美者未盡善也濬曰何謂也通曰卿旋師之日角巾私第口不言平吳之事若有問者輒曰聖主之德羣帥之力老夫何功之有焉如斯顔老之不伐龔遂之雅對將何以過之藺生所以屈亷頗王渾能無愧乎濬曰吾始懼鄧艾之事畏禍及不得無言末不能遣諸胸中是吾褊也時人咸以濬功重報輕博士秦秀太子洗馬孟康前溫令李密等並表訟濬之屈帝乃遷濬鎮軍大將軍加散騎常侍領後軍將軍王渾詣濬濬嚴設備衛然後見之其相猜防如此濬平吳之後以勳髙位重不復素業自居乃玉食錦服縱奢侈以自逸其有辟引多是蜀人示不遺故舊也後又轉撫軍大將軍開府儀同三司加特進散騎常侍後軍將軍如故太康六年卒時年八十諡曰武葬柏谷山大營塋域葬垣周四十五里面别開一門松柏茂盛子矩嗣矩弟暢散騎郎暢子粹太康十年武帝詔粹尚潁川公主仕至魏郡太守濬有二孫過江不見齒録安西將軍桓溫鎮江陵表言之卒不見省唐彬字儒宗魯國鄒人也父臺太山太守彬有經國大度而不拘行檢少便弓馬好遊獵身長八尺走及奔鹿強力兼人晚乃敦悅經史尤明易經隨師受業還家教授恆數百人初為郡門下掾轉主簿刺史王沈集諸參佐盛論距吳之䇿以問九郡吏彬與譙郡主簿張惲俱陳吳有可兼之勢沈善其對又使彬難言吳未可伐者而辭理皆屈還遷功曹舉孝亷州辟主簿纍遷别駕彬忠肅公亮盡規匡救不顯諫以自彰又奉使詣相府計事于時僚佐皆當世英彥見彬莫不欽悅稱之於文帝薦為掾屬帝以問參軍孔皓皓忌其能良久不答陳騫在坐斂板而稱曰彬之為人勝騫甚逺帝笑曰但能如卿固未易得何論於勝因辟為鎧曹屬帝問曰卿何以致辟對曰修業陋巷觀古人之遺迹言滿天下無口過行滿天下無怨惡帝顧四坐曰名不虛行他日謂孔皓曰近見唐彬卿受蔽賢之責矣初鄧艾之誅也文帝以艾久在隴右素得士心一旦夷滅恐邊情騷動使彬密察之彬還白帝曰鄧艾忌克詭狹矜才負能順從者謂為見事直言者謂為觸忤雖長史司馬參佐牙門答對失指輒見罵辱處身無禮大失人心又好施行事役數勞衆力隴右甚患苦之喜聞其禍不肯為用今諸軍已至足以鎮壓外內願無以為慮俄除尚書水部郎泰始初賜爵關內侯出補鄴令彬導德齊禮期月化成遷弋陽太守明設禁防百姓安之以母喪去官益州東接吳寇監軍位缺朝議用武陵太守楊宗及彬武帝以問散騎常侍文立立曰宗彬俱不可失然彬多財欲而宗好酒惟陛下裁之帝曰財欲可足酒者難改遂用彬尋又詔彬監巴東諸軍事加廣武將軍上征吳之䇿甚合帝意後與王濬共伐吳彬屯據衝要為衆軍前驅每設疑兵應機制勝陷西陵樂鄉多所禽獲自巴陵沔口以東諸賊所聚莫不震懾倒戈肉袒彬知賊寇已殄孫皓將降未至建鄴二百里稱疾遲留以示不競果有先到者爭物後到者爭功于時有識莫不髙彬此舉吳平詔以彬為右將軍都督巴東諸軍事徴拜翊軍校尉改封上庸縣侯食邑六千户賜絹六千匹朝有疑議每參預焉北虜侵掠北平以彬為使持節監幽州諸軍事領護烏丸校尉右將軍彬既至鎮訓卒利兵廣農重稼震威曜武宣喻國命示以威信於是鮮卑二部大莫廆擲何等並遣侍子入貢兼修學校誨誘無倦仁惠廣被遂開拓舊境却地千里復秦長城塞自溫城洎于碣石綿亘山谷且三千里分軍屯守烽候相望由是邊境安寧無犬吠之警自漢魏征鎮莫之比焉鮮卑諸種畏懼遂殺大莫廆彬欲討之恐列上候報虜必逃散乃發幽冀車牛參軍許祗密奏之詔遣御史檻車徴彬付廷尉以事直見釋百姓追慕彬功德生為立碑作頌彬初受學於東海閻德門徒甚多獨目彬有廊廟才及彬官成而德已卒乃為之立碑元康初拜使持節前將軍領西戎校尉雍州刺史下教曰此州名都士人林藪處士皇甫申叔嚴舒龍薑茂時梁子逺等並志節清茂履行髙潔踐境望風虛心飢渴思加延致待以不臣之典幅巾相見論道而已豈以吏職屈染髙規郡國備禮發遣以副於邑之望於是四人皆到彬敬而待之元康四年卒官時年六十諡曰襄賜絹二百匹錢二十萬長子嗣官至廣陵太守少子岐征虜司馬山濤字巨源河內懷人也父曜宛句令濤早孤居貧少有器量介然不羣性好莊老每隱身自晦與嵇康吕安善後遇阮籍便為竹林之交著忘言之契康後坐事臨刑謂子紹曰巨源在汝不孤矣濤年四十始為郡主簿功曹上計掾舉孝亷州辟部河南從事與石鑒共宿濤夜起蹴鑒曰今為何等時而眠邪知太傅卧何意鑒曰宰相三不朝與尺一令歸第卿何慮也濤曰咄石生無事馬蹄間邪投傳而去未二年果有曹爽之事遂隱身不交世務與宣穆后有中表親是以見景帝帝曰吕望欲仕邪命司隸舉秀才除郎中轉驃騎將軍王昶從事中郎久之拜趙國相遷尚書吏部郎文帝與濤書曰足下在事清朗雅操邁時念多所乏今致錢二十萬穀二百斛魏帝嘗賜景帝春服帝以賜濤又以母老并贈藜杖一枚晚與尚書和逌交又與鍾會裴秀等并申欵昵以二人居勢爭權濤平心處中各得其所而俱無恨焉遷大將軍從事中郎鍾會作亂於蜀而文帝將西征時魏氏諸王公並在鄴帝謂濤曰西偏吾自了之後事深以委卿以本官行軍司馬給親兵五百人鎮鄴咸熙初封新沓子轉相國左長史典統别營時帝以濤鄉閭宿望命太子拜之帝以齊王攸繼景帝後素又重攸嘗問裴秀曰大將軍開建未遂吾但承奉後事耳故立攸將歸功於兄何如秀以為不可又以問濤濤對曰廢長立少違禮不祥國之安危恆必由之太子位於是乃定太子親拜謝濤及武帝受禪以濤守大鴻臚護送陳留王詣建鄴泰始初加奉車都尉進爵新沓伯及羊祜執政時人欲危裴秀濤正色保持之由是失權臣意出為兾州刺史加寧逺將軍冀州俗薄無相推轂濤甄拔隱屈搜訪賢才旌命三十餘人皆顯名當時人懷慕尚風俗頗革轉北中郎將督鄴城守事入為侍中遷尚書以母老辭職詔曰君雖乃心在於色飬然職有上下旦夕不廢醫藥且當割情以隆在公濤心求退表疏數十上久乃見聽除議郎帝以濤清儉無供飬特給日契加賜牀帳茵褥禮秩崇重時莫為比後除太常卿以疾不就會遭喪歸鄉里濤年踰耳順居喪過禮負土成墳手植松柏未幾詔起濤為吏部尚書濤辭以喪病章表懇切會元皇后崩遂扶輿還洛逼迫詔命自力就職前後選舉周遍內外而並得其才咸寧初轉太子太傅加散騎常侍除尚書僕射加侍中領吏部固辭以老疾上表陳狀章表數十上久不攝職為左丞白裒所奏帝曰濤以病自聞但不聽之耳使濤坐執銓衡則可何必上下邪不得有所問濤不自安上表謝罪詔敦喻之濤不獲已乃起視事濤再起選職十有餘年每一官缺輒啓擬數人詔旨有所向然後顯奏隨帝意所欲為先故帝之所用或非舉首衆情不察以濤輕重任意或譛之於帝帝手詔戒濤曰夫用人惟才不遺踈逺單賤天下便化矣而濤行之自若一年之後衆情乃寢濤所奏甄别人物各為題目時稱山公啓事濤中立於朝晚值后黨專權不欲任楊氏多有諷諫帝雖悟而不能改後以年衰疾篤上疏告退免冠徒跣上還印綬詔不許濤苦表請退又不許尚書令衛瓘奏濤以微苦久不視職手詔頻煩猶未順旨參議以為無專節之尚違在公之義若實沈篤亦不宜居位可免濤官中詔瓘曰濤以德素為朝之望而嘗深退讓至於懇切故比有詔欲必奪其志以匡輔不逮主者既不思明詔旨而反深加詆案虧崇賢之風以重吾不德何以示逺近邪濤不得已又起視事太康初遷右僕射加光祿大夫侍中掌選如故濤以老疾固辭手詔敦譬濤又上表固讓不許吳平之後帝詔天下罷軍役示海內大安州郡悉去兵大郡置武吏百人小郡五十人帝嘗講武于宣武場濤時有疾詔乘步輦從因與盧欽論用兵之本以為不宜去州郡武備其論甚精于時咸以濤不學孫吳而暗與之合帝稱之曰天下名言也而不能用及永寧之後屢有變難寇賊焱起郡國皆以無備不能制天下乃至大亂如濤言焉後拜司徒濤復固讓詔不從濤又表乞骸骨詔敕斷章表使者乃卧加章綬濤曰垂沒之人豈可汚官府乎輿疾歸家以太康四年薨時年七十九詔賜東園祕器朝服一具衣一襲錢五十萬布百匹以供喪事䇿贈司徒蜜印紫綬侍中貂蟬新沓伯蜜印青朱綬祭以太牢諡曰康將葬賜錢四十萬布百匹左長史范晷等上言濤舊第屋十間子孫不相容帝為之立室初濤布衣家貧謂妻韓氏曰忍飢寒我後當作三公但不知卿堪為公夫人不耳及居榮貴貞慎儉約雖爵同千乘而無嬪媵祿賜俸秩散之親故初陳郡袁毅嘗為鬲令貪濁而賂遺公卿以求虛譽亦遺濤絲百斤濤不欲異於時受而藏於閣上後毅事露檻車送廷尉凡所受賂皆見推檢濤乃取絲付吏積年塵埃印封如故濤飲酒至八斗方醉帝欲試之乃以酒八斗飲濤而密益其酒濤極本量而止有子五人該淳允謨簡該字伯倫嗣父爵仕至并州刺史太子左率贈長水校尉該子瑋字産祖翊軍校尉次子世回吏部郎散騎常侍淳字子元不仕允字叔真奉車都尉並少尫病形甚短小而聰敏過人武帝聞而欲見之濤不敢辭以問於允允自以尫陋不肯行濤以為勝已乃表曰臣二子尫病宜絶人事不敢受詔謨字季長明悉有才智官至司空掾簡字季倫性溫雅有父風年二十餘濤不之知簡歎曰吾年幾三十而不為家公所知後與譙國嵇紹沛郡劉謹𢎞農楊淮等齊名初為太子舍人纍遷太子庶子黃門郎出為青州刺史徴拜侍中頃之轉尚書歷領軍將軍荆州刺史領南蠻校尉不行復拜尚書光熙初轉吏部尚書永嘉初出為雍州刺史鎮西將軍徴為尚書左僕射領吏部簡上疏欲令朝臣各舉所知以廣得才之路朝廷從之永嘉三年出為征南將軍都督荆湘交廣四州諸軍事假節鎮襄陽于時四方寇亂天下分崩王威不振朝野危懼簡優遊卒歲惟酒是耽諸習氏荆土豪族有佳園池簡每出嬉遊多之池上置酒輒醉名之曰髙陽池時有童兒歌曰山公出何許往至髙陽池日夕倒載歸茗艼無所知時時能騎馬倒著白接籬舉鞭向葛強何如并州兒強家在并州簡愛將也尋加都督寧益軍事時劉聰入寇京師危逼簡遣督護王萬率師赴難次于涅陽為宛城賊王如所破遂嬰城自守及洛陽陷沒簡又為賊嚴嶷所逼乃遷于夏口招納流亡江漢歸附時華軼以江州作難或勸簡討之簡曰與彥夏舊友為之惆悵簡豈利人之機以為功伐乎其篤厚如此時樂府伶人避難多奔沔漢宴會之日寮佐或勸奏之簡曰社稷傾覆不能匡救有晉之罪人也何作樂之有因流涕慷慨坐者咸愧焉年六十卒追贈征南大將軍儀同三司子遐字彥林為餘姚令時江左初基法禁寬弛豪族多挾藏户口以為私附遐繩以峻法到縣八旬出口萬餘縣人虞喜以藏户當棄市遐欲繩喜諸豪強莫不切齒於遐言於執事以喜有髙節不宜屈辱又以遐輒造縣舍遂陷其罪遐與會稽內史何充箋乞留百日窮翦逋逃退而就罪無恨也充申理不能得竟坐免官後為東陽太守為政嚴猛康帝詔曰東陽頃來竟囚每多入重豈郡多罪人將捶楚所求莫能自固邪遐處之自若郡境肅然卒於官王戎字濬沖琅邪臨沂人也祖雄幽州刺史父渾涼州刺史貞陵亭侯戎幼而頴悟神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電年六七歲於宣武場觀戲猛獸在檻中虓吼震地衆皆奔走戎獨立不動神色自若魏明帝於閣上見而竒之又嘗與羣兒戲於道側見李樹多實等輩競趣之戎獨不往或問其故戎曰樹在道邊而多子必是苦李取之信然阮籍素與渾為友戎年十五隨渾在郎舍戎少籍二十歲而籍與之交籍每過渾俄頃輒去過視戎良久然後出謂渾曰濬沖清賞非卿倫也共卿言不如共阿戎談及渾卒於涼州故吏賻贈數百萬戎辭而不受由是顯名為人短小任率不修威儀善發談端賞其要會朝賢嘗上已禊洛或問王濟曰昨遊有何言談濟曰張華善説史漢裴頠論前言往行衮衮可聽王戎談子房季札之間超然元著其為識鑒者所賞如此戎嘗與阮籍飲時兖州刺史劉昶字公榮在坐籍以酒少酌不及昶昶無恨色戎異之他日問籍曰彼何如人也答曰勝公榮不可不與飲若減公榮則不敢不共飲惟公榮可不與飲戎每與籍為竹林之遊戎嘗後至籍曰俗物已復來敗人意戎笑曰卿輩意亦復易敗耳鍾會伐蜀過與戎别問計將安出戎曰道家有言為而不恃非成功難保之難也及會敗議者以為知言襲父爵辟相國掾歷吏部黃門郎散騎常侍河東太守荆州刺史坐遣吏修園宅應免官詔以贖論遷豫州刺史加建威將軍受詔伐吳戎遣參軍羅尚劉喬領前鋒進攻武昌吳將楊雍孫述江夏太守劉朗各率衆詣戎降戎督大軍臨江吳牙門將孟泰以蘄春邾二縣降吳平進爵安豐縣侯增邑六千户賜絹六千匹戎渡江綏慰新附宣揚威惠吳光祿勳石偉方直不容皓朝稱疾歸家戎嘉其清節表薦之詔拜偉為議郎以二千石祿終其身荆土悅服徴為侍中南郡太守劉肇賂筒中細布五十端為司𨽻所糾以知而未納故得不坐然議者尤之帝謂朝臣曰戎之為行豈懷私苟得正當不欲為異耳帝雖以是言釋之然為清慎者所鄙由是損名戎在職雖無殊能而庶績修理後遷光祿勳吏部尚書以母憂去職性至孝不拘禮制飲酒食肉或觀奕碁而容貌毁悴杖然後起裴頠往弔之謂人曰若使一慟能傷人濬沖不免滅性之譏也時和嶠亦居父喪以禮法自持量米而食哀毁不踰於戎帝謂劉毅曰和嶠毁頓過禮使人憂之毅曰嶠雖寢苫食粥乃生孝耳至於王戎所謂死孝陛下當先憂之戎先有吐疾居喪增甚帝遣醫療之并賜藥物又斷賔客楊駿執政拜太子太傅駿誅之後東安公繇專斷刑賞威振外內戎誡繇曰大事之後宜深逺之繇不從果得罪轉中書令加光祿大夫給恩信五十人遷尚書左僕射領吏部戎始為甲午制凡選舉皆先治百姓然後授用司𨽻傅咸奏戎曰書稱三載考績三考黜陟幽明今內外羣官居職未期而戎奏還既未定其優劣且送故迎新相望道路巧詐由生傷農害政戎不仰依堯舜典謨而驅動浮華虧敗風俗非徒無益乃有大損宜免戎官以敦風俗戎與賈郭通親竟得不坐尋轉司徒以王政將圯茍媚取容屬愍懷太子之廢竟無一言匡諫裴頠戎之壻也頠誅戎坐免官齊王冏起義孫秀録戎於城內趙王倫子欲取戎為軍司博士王繇曰濬沖譎詐多端安肯為少年用乃止惠帝反宫以戎為尚書令既而河間王顒遣使就説成都王頴將誅齊王冏檄書至冏謂戎曰孫秀作逆天子幽逼孤糾合義兵掃除元惡臣子之節信著神眀二王聽讒造搆大難當賴忠謀以和不協卿其善為我籌之戎曰公首舉義衆匡定大業開闢以來未始有也然論功報賞不及有勞朝野失望人懷二志今二王帶甲百萬其鋒不可當若以王就第不失故爵委權崇讓此求安之計也冏謀臣葛旟怒曰漢魏以來王公就第寧有得保妻子乎議者可斬於是百官震悚戎偽藥發墮厠得不及禍戎以晉室方亂慕蘧伯玉之為人與時舒卷無蹇諤之節自經典選未嘗進寒素退虛名但與時浮沉户調門選而已尋拜司徒雖位總鼎司而委事寮宷間乘小馬從便門而出遊見者不知其三公也故吏多至大官道路相遇輒避之性好興利廣收八方園田水碓周遍天下積實聚財不知紀極每自執牙籌晝夜算計常若不足而又儉嗇不自奉飬天下謂之膏肓之疾女適裴頠貸錢數萬久而未還女後歸寧戎色不悅女遽還直乃歡從子將婚戎遺其一單衣婚訖而更責取家有好李嘗出貨之恐人得種乃鑽其核以此獲譏於世其後從帝北伐王師敗績於蕩隂戎復詣鄴隨帝還洛陽車駕之西遷也戎出奔於郟危難之間親執鋒刃談笑自若未嘗有懼容時召親賔歡娛永日永興二年薨于郟縣時年七十二諡曰元戎有人倫鑒識賞目山濤如璞玉渾金人皆欽其寶莫知名其器王衍神姿髙徹如瑶林瓊樹自然是風塵表物謂裴頠拙於用長荀勗工於用短陳道寧􅀈􅀈如束長竿族弟敦有髙名戎惡之敦每候戎輒託疾不見敦後果為逆亂其鑒賞先見如此嘗經黃公酒壚下過顧謂後車客曰吾昔與嵇叔夜阮嗣宗酣暢於此竹林之遊亦預其末自嵇阮淪亡吾便為時之所􅀈紲今日視之雖近邈若山河初孫秀為琅邪郡吏求品於鄉議戎從弟衍將不許戎勸品之及秀得志朝士有宿怨者皆被誅而戎衍獲濟焉子萬有美名少而大肥戎令食粳而肥愈甚年十九卒有庶子興戎所不齒以從弟陽平太守愔子為嗣衍字夷甫神情明秀風姿詳雅總角嘗造山濤濤嗟嘆良久既去目而送之曰何物老嫗生寧馨兒然誤天下蒼生者未必非此人也父乂為平北將軍常有公事使行人列上不時報衍年十四在京師造僕射羊祜申陳事狀辭甚清辨祜名德貴重而衍幼年無屈下之色衆異之楊駿欲以女妻焉衍恥之遂陽狂自免武帝聞其名問戎曰夷甫當世誰為比戎曰未見其比當從古人中求耳泰始八年詔舉竒才可以安邊者衍初好論縱橫之術故尚書盧欽舉為遼東太守不就於是口不論世事惟雅詠元虛而已嘗因宴集為族人所怒舉樏擲其靣衍初無言引王導共載而去然心不能平在車中攬鏡自照謂導曰爾看吾目光乃在牛背上矣父卒於北平送故甚厚為親識之所借貸因以捨之數年之間家資罄盡出就洛城西田園而居焉後為太子舍人遷尚書郎出補元城令終日清談而縣務亦理入為中庶子黃門侍郎魏正始中何晏王弼等祖述老莊立論以為天地萬物皆以無為為本無也者開物成務無往而不存者也隂陽恃以化生萬物恃以成形賢者恃以為德不肖恃以免身故無之為用無爵而貴矣衍甚重之唯裴頠以為非著論以譏之而衍處之自若衍既有盛才美貌明悟若神常自比子貢兼聲名籍甚傾動當世妙善元言唯談老莊為事每捉玉柄塵尾與手同色義理有所不安隨即改更世號口中雌黃朝野翕然謂之一世龍門矣纍居顯職後進之士莫不景慕放效選舉登朝皆以為稱首矜髙浮誕遂成風俗焉衍嘗喪幼子山簡弔之衍悲不自勝簡曰孩抱中物何至於此衍曰聖人忘情最下不及於情然則情之所鍾正在我輩簡服其言更為之慟衍妻郭氏賈后之親藉中宫之勢剛愎貪戾聚斂無厭好干預人事衍患之而不能禁時有鄉人幽州刺史李陽京師大俠也郭氏素憚之衍謂郭曰非但我言卿不可李陽亦謂不可郭氏為之小損衍疾郭之貪鄙故口未嘗言錢郭欲試之令婢以錢繞牀使不得行衍晨起見錢謂婢曰舉阿堵物却其措意如此後歷北軍中候中領軍尚書令女為愍懷太子妃太子為賈后所誣衍懼禍自表離婚賈后廢有奏衍曰衍與司徒梁王肜書寫呈皇太子手與妃及衍書陳見誣之狀肜等伏讀辭旨懇惻衍備位大臣應以義責也太子被誣得罪衍不能守死善道即求離婚得太子手書隱蔽不出志在苟免無忠謇之操宜加顯責以厲臣節可禁錮終身詔從之衍素輕趙王倫之為人及倫篡位衍陽狂斫婢以自免及倫誅拜河南尹轉尚書又為中書令時齊王冏有匡復之功而專權自恣公卿皆為之拜衍獨長揖焉以病去官成都王頴以衍為中軍師纍遷尚書僕射領吏部後拜尚書令司空司徒衍雖居宰輔之重不以經國為念而思自全之計説東海王越曰中國已亂當賴方伯宜得文武兼資以任之乃以弟澄為荆州族弟敦為青州因謂澄敦曰荆州有江漢之固青州有負海之險卿二人在外而吾留此足以為三窟矣識者鄙之及石勒王彌寇京師以衍都督征討諸軍事持節假黃鉞以拒之衍使前將軍曹武左衛將軍王景等擊賊退之獲其輜重遷太尉尚書令如故封武陵侯辭封不受時洛陽危逼多欲遷都以避其難而衍獨賣車牛以安衆心越之討茍晞也衍以太尉為太傅軍事及越薨衆共推衍為元帥衍以寇賊鋒起辭曰吾少無宦情隨牒推移遂至於此今日之事安可以非才處之俄而舉軍為石勒所破勒呼王公與之相見問衍以晉故衍陳禍敗之由云計不在已勒甚悅之與語移日衍自説少不豫事欲求自免因勸勒稱尊號勒怒曰君名蓋四海身居重任少壯登朝至於白首何得言不豫世事邪破壞天下正是君罪使左右扶出謂其黨孔萇曰吾行天下多矣未嘗見如此人當可活否萇曰彼晉之三公必不為我盡力何足貴乎勒曰要不可加以鋒刃也使人夜排牆填殺之衍將死顧人言曰嗚呼吾曹雖不如古人向若不祖尚浮虛戮力以匡天下猶可不至今日時年五十六衍俊秀有令望希心元逺未嘗語利王敦過江嘗稱之曰夷甫處衆中如珠玉在瓦石間顧愷之作畫贊亦稱衍巖巖清峙壁立千仞其為人所尚如此子元字眉子少慕簡曠亦有俊才與衛玠齊名荀藩用為陳留太守屯尉氏元素名家有豪氣荒弊之時人情不附將赴祖逖為盜所害焉澄字平子生而警悟雖未能言見人舉動便識其意衍妻郭性貪鄙欲令婢路上擔糞澄年十四諫郭以為不可郭大怒謂澄曰昔夫人臨終以小郎屬新婦不以新婦屬小郎因捉其衣裾將杖之澄爭得脫踰窗而走衍有重名於世時人許以人倫之鑒尤重澄及王敦庾敳嘗為天下人士目曰阿平第一子嵩第二處仲第三澄嘗謂衍曰兄形似道而神峯太俊衍曰誠不如卿落落穆穆然也澄由是顯名有經澄所題目者衍不復有言輒云已經平子矣少歷顯仕纍遷成都王頴從事中郎頴嬖豎孟玖譖殺陸機兄弟天下切齒澄發玖私姦勸頴殺玖頴乃誅之士庶莫不稱善及頴敗東海王越請為司空長史以迎大駕勳封南鄉侯遷建威將軍雍州刺史不之職時王敦謝鯤庾敳阮修皆為衍所親善號為四友而亦與澄狎又有光逸胡母輔之等亦豫焉酣宴縱誕窮歡極娛惠帝末衍白東海王越以澄為荆州刺史持節都督領南蠻校尉敦為青州衍因問以方略敦曰當臨事制變不可預論澄辭義鋒出算略無方一坐嗟服澄將之鎮送者傾朝澄見樹上鵲巢便脫衣上樹探鷇而㺯之神氣蕭然傍若無人劉鯤謂澄曰卿形雖散朗而內實動俠以此處世難得其死澄默然不答澄既至鎮日夜縱酒不親庶事雖寇戎急務亦不以在懷擢順陽人郭舒於寒悴之中以為别駕委以州府時京師危逼澄率衆軍將赴國難而飄風折其節柱會王如寇襄陽澄前鋒至宜城遣使詣山簡為如黨嚴嶷所獲嶷偽使人從襄陽來而問之曰襄陽拔未答云昨旦破城已獲山簡乃隂緩澄使令得亡去澄聞襄陽陷以為信然散衆而還既而恥之託糧運不贍委罪長史蔣俊而斬之竟不能進巴蜀流民散在荆湘者與土人忿爭遂殺縣令屯聚樂鄉澄使成都內史王機討之賊請降澄偽許之既而襲之於寵洲以其妻子為賞沉八千餘人於江中於是益梁流民四五萬家一時俱反推杜韜為主南破零桂東掠武昌敗王機於巴陵澄亦無憂懼之意但與機日夜縱酒投壺博戲數十局俱起殺富人李才取其家資以賜郭舒南平太守應詹驟諫不納於是上下離心內外怨叛澄望實雖損猶傲然自得後出軍擊杜韜次于作塘山簡參軍王沖叛于豫州自稱荆州刺史澄懼使杜㽔守江陵澄遷於孱陵尋奔沓中郭舒諫曰使君臨州雖無異政未失衆心今西收華容向義之兵足以擒取小虜奈何自棄澄不能從初澄命武陵諸郡同討杜韜天門太守扈瓌次于益陽武陵內史武察為其郡夷所害瓌以孤軍引還澄怒以杜曾代瓌夷袁遂瓌故吏也託為瓌報仇遂舉兵逐曽自稱平晉將軍澄使司馬毋邱邈討之為遂所敗會元帝徴澄為軍咨祭酒於是赴召時王敦為江州鎮豫章澄過詣敦澄宿有盛名出於敦右士庶莫不傾慕之兼勇力絶人素為敦所憚澄猶以舊意侮敦敦益忿怒請澄入宿隂欲殺之而澄左右有二十餘人持鐡馬鞭為衛澄手恆捉玉枕以自防故敦未之得發後敦賜澄左右酒皆醉借玉枕觀之因下牀而謂澄曰何與杜韜通信澄曰事自可驗敦欲入內澄手引敦衣至於絶帶乃登于梁因罵敦曰行事如此殃將及焉敦令力士路戎扼殺之時年四十四載尸還其家劉琨聞澄之死歎曰澄自取之及敦平澄故吏佐著作郎桓稚上表理澄請加贈諡詔復澄本官諡曰憲長子詹早卒次子徽右軍司馬郭舒字稚行幼請其母從師歲餘便歸粗識大義鄉人少府范晷宗人武陵太守郭景咸稱舒當為後來之秀終成國器始為領軍校尉坐擅放司馬彪繫廷尉世多義之刺史夏侯含辟為西曹轉主簿含坐事舒自繫理含事得釋刺史宗岱命為治中喪母去職劉𢎞牧荆州引為治中𢎞卒舒率將士推𢎞子璠為主討逆賊郭勱滅之保全一州王澄聞其名引為别駕澄終日酣飲不以衆務在意舒常切諌之及天下大亂又勸澄修德飬威保完州境澄以亂自京都起非復一州所能匡禦雖不能從然重其忠亮荆土士人宗廞嘗因酒忤澄澄怒叱左右棒廞舒厲色謂左右曰使君過醉汝輩何敢妄動澄恚曰别駕狂邪誑言我醉因遣掐其鼻灸其眉頭舒跪而受之澄意少釋而廞遂得免澄之奔敗也以舒領南郡澄又欲將舒東下舒曰舒為萬里紀綱不能匡正令使君奔亡不忍渡江乃留屯沌口采稆湖澤以自給鄉人盜食舒牛事覺來謝舒曰卿飢所以食牛耳餘肉可共啖之世以此服其𢎞量舒少與杜曾厚曽嘗召之不往曾銜之至是澄又轉舒為順陽太守曽密遣兵襲舒遁逃得免王敦召為參軍轉從事中郎襄陽都督周訪卒敦遣舒監襄陽軍甘卓至乃還朝廷徴舒為右丞敦留不遣敦謀為逆舒諌不從使守武昌荆州别駕宗淡忌舒才能數譖之於王廙廙疑與甘卓同密以白敦敦不受髙官督護繆坦嘗請武昌城西地為營太守樂凱言於敦曰百姓久買此地種菜自贍不宜奪之敦大怒曰王處仲不來江湖當有武昌地不而人云是我地邪凱懼不敢言舒曰公聽舒一言敦曰平子以卿病狂故掐鼻灸眉頭舊疢復發邪舒曰古之狂也直周昌汲黯朱雲不狂也昔堯立誹謗之木舜置敢諫之鼓然後事無枉縱公為勝堯舜邪乃逆折舒使不得言何與古人相逺敦曰卿欲何言舒曰繆坦可謂小人疑誤視聽奪人私地以強凌弱晏子稱君曰其可臣獻其否以成其可是以舒等不敢不言敦即使還地衆咸壯之敦重舒公亮給賜轉豐數詣其家表為涼州刺史病卒樂廣字彥輔南陽淯陽人也父方參魏征西將軍夏侯元軍事廣時年八歲元嘗見廣在路因呼與語還謂方曰向見廣神姿朗徹當為名士卿家雖貧可令專學必能興卿門户也方早卒廣孤貧僑居山陽寒素為業人無知者性沖約有逺識寡嗜欲與物無競尤善談論每以約言析理以厭人之心其所不知默如也裴楷嘗引廣共談自夕申旦雅相欽挹嘆曰我所不如也王戎為荆州刺史聞廣為夏侯元所賞乃舉秀才楷又薦廣於賈充遂辟太尉掾轉太子舍人尚書令衛瓘朝之耆舊逮與魏正始中諸名士談論見廣而竒之曰自昔諸賢既沒嘗恐微言將絶而今乃復聞斯言於君矣命諸子造焉曰此人之水鏡見之瑩然若披雲霧而覩青天也王衍自言與人語甚簡至及見廣便覺已之煩其為識者所嘆美如此出補元城令遷中書侍郎轉太子中庶子纍遷侍中河南尹廣善清言而不長於筆將讓尹請潘嶽為表嶽曰當得君意廣乃作二百句語述已之志嶽因取次比便成名筆時人咸云若廣不假嶽之筆嶽不取廣之旨無以成斯美也嘗有親客久闊不復來廣問其故答曰前在坐蒙賜酒方欲飲見杯中有蛇意甚惡之既飲而疾于時河南聽事壁上有角漆畫作蛇廣意杯中蛇即角影也復置酒問客曰酒中復有所見不答曰所見如初廣乃告其所以客豁然意解沉痾頓愈衛玠總角時嘗問廣夢廣曰是想玠曰神形所不接而夢豈是想邪廣曰因也玠思之經月不得遂以成疾廣聞故命駕為剖析之玠病即愈廣嘆曰此賢胸中必無膏肓之疾廣所在為政無當時功譽然每去職遺愛為人所思凡所論人必先稱其所長則所短不言而自見矣人有過先盡𢎞恕然後善惡自彰矣廣與王衍俱宅心事外名重於時故天下言風流者謂王樂為稱首焉少與𢎞農楊凖相善凖之二子曰喬曰髦皆知名於世凖使先詣裴頠頠性𢎞方愛喬有髙韻謂凖曰喬當及卿髦小減也又使詣廣廣性清純愛髦有神檢謂凖曰喬自及卿然髦亦清出凖笑曰我二兒之優劣乃裴樂之優劣也論者以為喬雖有髙韻而神檢不足樂為得之矣是時王澄胡母輔之等皆亦任放為逹或至裸體者廣聞而笑曰名教內自有樂地何必乃爾其居才愛物動有理中皆此類也值世道多虞朝章紊亂清已中正任誠保素而已時人莫有見其際焉先是河南官舍多妖怪前尹皆不敢處正寢廣居之不疑嘗外户自閉左右皆驚廣獨自若顧見牆有孔使人掘牆得狸而殺之其怪亦絶愍懷太子之廢也詔故臣不得辭送衆官不勝憤嘆皆冒禁拜辭司𨽻校尉滿奮勑河南中部收縛拜者送獄廣即便解遣衆人代廣危懼孫琰説賈謐曰前以太子罪惡有斯廢黜其臣不懼嚴詔冒罪而送今若係之是彰太子之善不如釋去謐然其言廣故得不坐遷吏部尚書左僕射後東安王繇當為僕射轉廣為右僕射領吏部代王戎為尚書始戎薦廣而終踐其位時人美之成都王頴廣之壻也及與長沙王乂遘難而廣既處朝望羣小讒謗之乂以問廣廣神色不變徐答曰廣豈以五男易一女乂猶以為疑廣竟以憂疾卒荀藩聞廣之不免也為之流涕三子凱肇謨凱字𢎞緒大司馬齊王掾參驃騎軍事肇字𢎞茂太傅東海王掾洛陽陷兄弟相擕南渡江謨字𢎞範征虜將軍吳郡內史鄭袤字林叔滎陽開封人也髙祖衆漢大司農父泰揚州刺史有髙名袤少孤早有識鑒荀攸見之曰鄭公業為不亡矣隨叔父渾避難江東時華歆為豫章太守渾往依之歆素與泰善撫飬袤如己子年十七乃還鄉里性清正時濟隂魏諷為相國掾名重當世袤同郡任覽與結交袤以諷姦雄終必為禍勸覽逺之及諷敗論者稱焉魏武帝初封諸子為侯精選賔友袤與徐幹俱為臨淄侯文學轉司𨽻功曹從事司空王朗辟為掾袤舉髙陽許允扶風魯芝東萊王基朗皆命之後咸至大位有重名袤遷尚書郎出為黎陽令吏民悅服太守班下屬城特見甄異為諸縣之最遷尚書右丞轉濟隂太守下車旌表孝悌敬禮賢能興立庠序開誘後進調補大將軍從事中郎拜散騎常侍會廣平太守缺宣帝謂袤曰賢叔大匠垂稱於陽平魏郡百姓蒙惠化且盧子家王子雍繼踵此郡世不乏賢故復相屈袤在廣平以德化為先善作條教郡中愛之徴拜侍中百姓戀慕涕泣路隅遷少府髙貴鄉公即位袤與河南王肅備法駕奉迎於元城封廣昌亭侯徙光祿勳領宗正毋邱儉作亂景帝自出征之百官祖送於城東袤疾病不任會帝謂中領軍王肅曰唯不見鄭光祿為恨肅以語袤袤自輿追帝及於近道帝笑曰故知侯生必來也遂與袤共載曰計將何先袤曰昔與儉俱為臺郎特所知悉其人好謀而不逹事情自昔建勳幽州志望無限文欽勇而無算今大軍出其不意江淮之卒鋭而不能固深溝髙壘以挫其氣此亞夫之長也帝稱善轉太常髙貴鄉公議立明堂辟雍精選博士袤舉劉毅劉實程咸庾峻後並至公輔大位及常道鄉公立與議定䇿進封安成鄉侯邑千户景元初疾病失明屢乞骸骨不許拜光祿大夫五等初建封密陵伯武帝踐阼進爵為侯雖寢疾十餘年而時賢並相推薦泰始中詔以袤為司空天子臨軒遣五官中郎將國坦就第拜授袤前後辭讓遣息稱上送印綬至於十數謂坦曰魏以徐景山為司空吾時為侍中受詔譬旨徐公語吾曰三公當上應天心茍非其人實傷和氣不敢以垂死之年纍辱朝廷也終於不就遵大雅君子之迹可不務乎固辭久之見許以侯就第拜儀同三司置舍人官騎賜牀帳簟褥錢五十萬九年薨時年八十五帝於東堂發哀賜祕器朝服一具衣一襲錢三萬絹布各百匹以供喪事諡曰元有子六人長子默嗣次質舒詡稱豫位並列卿默字思元起家祕書郎考核舊文刪省浮穢中書令虞松謂曰而今而後朱紫别矣轉尚書考功郎專典伐蜀事封關內侯遷司徒左長史武帝受禪與太原郭奕俱為中庶子朝廷以太子官屬宜稱陪臣默上言皇太子體皇極之尊無私於天下宫臣皆受命天朝不得同之藩國事遂施行出為東郡太守值歲荒人飢默輒開倉賑給乃舍都亭自表待罪朝廷嘉默憂國詔書褒嘆比之汲黯班告天下若郡縣有此比者皆聽出給入為散騎常侍初帝以貴公子當品鄉黨莫敢與為輩求之州內於是十二郡中正僉共舉默文帝與默書曰小兒得厠賢子之流愧有竊賢之纍及武帝出祠南郊使默驂乘因謂默曰卿知何得驂乘乎昔州里舉卿相輩常愧有纍清談遂問政事對曰勸穡務農為國之基選人得才濟世之道居官久職政事之宜明慎黜陟勸戒之由崇尚儒素化導之本如此而已矣帝善之後以父喪去官尋起為廷尉是時鬲令袁毅坐交通貨賂大興刑獄在朝多見引逮唯默兄弟以潔慎不染其流遷太常時僕射山濤欲舉一親親為博士謂默曰卿似尹翁歸令吾不敢復言默為人敦重柔而能整皆此類也及齊王攸當之國下禮官議崇錫典制博士祭酒曹志等並立異議默容過其事免官尋拜大鴻臚遭母喪舊制既葬還職默自陳懇至久而見許遂改法定令聽大臣終喪自默始也服闋為大司農轉光祿勳太康元年卒時年六十八諡曰成尚書令衛瓘奏默才行名望宜居論道五升九卿位未稱德宜贈三司而后父楊駿先欲以女妻默子豫默曰吾每讀雋不疑傳常想其為人畏逺權貴奕世所守遂辭之駿深為恨至此駿議不同遂不施行默寬沖博愛謙虛溫謹不以才地矜物事上以禮遇下以和雖僮豎厮飬不加聲色而猶有嫌怨故士君子以為居世之難子球字子瑜少辟宰府入侍二宫成都王為大將軍起義討趙王倫球自頓邱太守為右長史以功封平夀公纍遷侍中尚書散騎常侍中護軍尚書右僕射領吏部永嘉二年卒追贈金紫光祿大夫諡曰元球弟豫永嘉末為尚書李允字宣伯遼東襄平人也祖敏漢河南太守去官還鄉里遼東太守公孫度欲強用之敏乘輕舟浮滄海莫知所終允父信追求積年浮海出塞無所見欲行喪制服則疑父尚存情若居喪而不聘娶後有鄰居故人與其父同年者亡因喪制服燕國徐邈與之同州里以不孝莫大於無後勸使娶妻既生允遂絶房室常如居喪禮不堪其憂數年而卒允既幼而孤母又改行有識之後降食哀戚亦以喪禮自居又以祖不知存亡設木主以事之由是以孝聞容貌質素頽然若不足者而智度沈邃言必有則初仕郡上計掾州辟部從事治中舉孝亷參鎮北軍事遷樂平侯相政尚清簡入為尚書郎遷中護軍司馬吏部郎銓綜亷平賜爵關內侯出補安豐太守文帝引為大將軍從事中郎遷御史中丞恭恪直繩百官憚之伐蜀之役為西中郎將督關中諸軍事後為河南尹封廣陵伯泰始初拜尚書進爵為侯允奏以為古者三公坐而論道內參六官之事外與六卿之教或處三槐兼聽獄訟稽疑之典謀及卿士陛下聖德欽明垂心萬機猥發明詔儀刑古式雖唐堯疇咨周文翼翼無以加也自今以往國有大政可親延羣公詢納讜言其軍國所疑延詣省中使侍中尚書咨論所宜若有疾疢不任覲會臨時遣侍臣訊訪詔從之遷吏部尚書僕射尋轉太子少傅詔以允忠允髙亮有匪躬之節使領司𨽻校尉允屢自表讓忝傅儲宫不宜兼監司之官武帝以二職並須忠賢故每不許咸寧初皇太子出居東宫帝以司𨽻事任峻重而少傅有旦夕輔導之務允素羸不宜久勞之轉拜侍中加特進俄遷尚書令侍中特進如故允雖歷職內外而家至貧儉兒病無以市藥帝聞之賜錢十萬其後帝以司徒舊丞相之職詔以允為司徒在位五年簡亮持重稱為任職以吳會初平大臣多有勳勞宜有登進乃上疏遜位帝不聽遣侍中宣旨優詔敦喻絶其章表允不得已起視事太康三年薨詔遣御史持節監喪致祠諡曰成皇太子命舍人王贊誄之文義甚美帝後思允清節詔曰故司徒李允太常彭灌並履忠清儉身歿家無餘積賜允家錢二百萬穀千斛灌家半之三子固真長修固字萬基散騎郎先允卒固子志嗣爵志字彥道歷位散騎侍郎建威將軍陽平太守真長位至太僕卿修黃門侍郎太弟中庶子盧欽字子若范陽涿人也祖植漢侍中父育魏司空世以儒業顯欽清淡有遠識篤志經史舉孝亷不行魏大將軍曹爽辟為掾爽弟嘗有所屬請欽白爽子弟不宜干犯法度爽深納之而罰其弟除尚書郎爽誅免官後為侍御史襲父爵大利亭侯纍遷琅邪太守宣帝為太傅辟從事中郎出為陽平太守遷淮北都督伏波將軍甚有稱績徴拜散騎常侍大司農遷吏部尚書進封大梁侯武帝受禪以為都督沔北諸軍事平南將軍假節追鋒軺卧車各一乘第二駙馬二乘騎具刀器御府人馬鎧等及錢三十萬欽在鎮寬猛得中疆場無虞入為尚書僕射加侍中奉車都尉領吏部以清貧特賜絹百匹欽舉必以才稱為亷平咸寧四年卒詔贈衛將軍開府儀同三司賜祕器朝服一具衣一襲布五十匹錢三十萬諡曰元又以欽忠清髙潔不營産業身歿之後家無所庇特賜錢五十萬為立第舍復下詔曰故司空王基衛將軍盧欽典領軍將軍楊囂並素清貧身歿之後居無私積頃者飢饉聞其家大匱其各賜穀三百斛欽歷宰州郡不尚功名唯以平理為務祿俸散之親故不營資産動循禮典妻亡制廬杖終喪居外所著詩賦論難數十篇名曰小道子浮嗣浮字子雲起家太子舍人病疽截手遂廢然朝廷器重之以為國子博士祭酒祕書監皆不就欽弟珽字子笏衛尉卿珽子志字子道初辟公府掾尚書郎出為鄴令成都王頴之鎮鄴也愛其才量委以心膂遂為謀主齊王冏起義遣使告頴頴召志計事志曰趙王無道肆行篡逆四海人神莫不憤怒今殿下總率三軍應期電發子來之衆不召自至掃夷凶逆必有征無戰然兵事至重聖人所慎宜旌賢任才以收時望頴深然之改選上佐髙辟掾屬以志為咨議參軍仍補左長史專掌文翰頴前鋒都督趙驤為倫所敗士衆震駭議者多欲還保朝歌志曰今我軍失利敵新得勝必有輕易陵轢之情若頓兵不進三軍畏衄懼不可用且戰何能無勝負宜更選精兵星行倍道出賊不意此用兵之竒也頴從之及倫敗志勸頴曰齊王衆號百萬與張泓等相持不能決大王徑得濟河此之大勳莫之與比而齊王今當共大王共輔朝政志聞兩雄不俱處功名不共立今宜因太妃微疾求還定省推崇齊王徐結四海之心此計之上也頴納之遂以母疾還藩委重於冏由是頴獲四海之譽天下歸心朝廷封志為武強侯加散騎常侍及河間王顒納李含之説欲內除二王樹頴儲副遣報頴頴將應之志正諫不從及冏滅頴遙執朝權遂懷觖望之心以長沙王乂在內不得恣其所欲密欲去乂時荆州有張昌之亂頴表求親征朝廷許之會昌等平乃廽兵以討乂志諫曰公前有復皇祚之大勳及事平歸功於齊辭九錫之賞不當朝政之權振陽翟飢民葬黃橋白骨皆盛德之事四海之人莫不荷賴矣逆寇縱肆猾擾荆楚今公掃清羣難南土以寧振旅而旋頓軍關外文服入朝此霸王者之事也頴不納及乂死頴表志為中書監留鄴參署相府事乘輿敗於蕩隂頴遣志督兵迎帝及王浚攻鄴志勸頴奉天子還洛陽時甲士尚萬五千人志夜部分至曉衆皆成列而程太妃戀鄴不欲去頴未能決俄而衆潰唯志與子謐兄子綝殿中虎賁千人而已志復勸頴早發時有道士姓黃號曰聖人太妃信之及使呼入道士求兩杯酒飲訖拋杯而去於是志計始決而人馬復散志於營陳間尋索得數乘鹿車司馬督韓元收集黃門得百餘人志入帝問志曰何故散敗至此志曰賊去鄴尚八十里而人士一朝駭散太弟今欲奉陛下還洛陽帝曰甚佳於是御犢車便發屯騎校尉郝昌先領兵八千守洛陽帝召之至汲郡而昌至兵杖甚盛志喜於復振啓天子宜下赦書與百姓同其休慶既逹洛陽志啓以滿奮為司𨽻校尉奔散者多還百官粗備帝悅賜志絹二百匹綿百斤衣一襲鶴翎𫀆一領初河間王顒聞王浚起兵遣右將軍張方救鄴方聞成都軍敗頓兵洛陽不敢進縱兵虜掠密謀遷都長安將焚宗廟宫室以絶人心志説方曰昔董卓無道焚燒洛陽怨毒之聲百年猶存何為襲之乃止方遂逼天子幸其壘帝垂泣就輿唯志侍側曰陛下今日之事當一從右將軍臣駑怯無所云補唯知盡微誠不離左右而已停方壘三日便西志復從至長安頴被黜志亦免官及東海王越奉迎大駕顒啓帝復頴還鄴以志為魏郡太守加左將軍隨頴北鎮行逹洛陽而平昌公模遣前鋒督護馮嵩距頴頴還長安未至而聞顒斬張方求和於越頴住華隂志進長安詣闕陳謝即還就頴於武關復為劉陶所驅廽詣河北及頴薨官屬奔散唯志親自殯送時人嘉之越命志為軍咨祭酒遷衛尉永嘉末轉尚書洛陽沒志將妻子北投并州刺史劉琨至陽邑為劉粲所虜與次子謐詵等俱遇害於平陽長子諶字子諒清敏有理思好老莊善屬文選尚武帝女滎陽公主拜駙馬都尉未成禮而公主卒後州舉秀才辟太尉掾洛陽沒隨志北依劉琨與志俱為劉粲所虜粲據晉陽留諶為參軍琨收散卒引猗盧騎還攻粲粲敗走諶得赴琨先父母兄弟在平陽者悉為劉聰所害琨為司空以諶為主簿轉從事中郎琨妻即諶之從母既加親愛又重其才地建興末隨琨投假匹磾匹磾自領幽州取諶為别駕匹磾既害琨尋亦敗喪時南路阻絶段末波在遼西諶往投之元帝之初末波通使於江左諶因其使抗表理琨文旨甚切於是即加弔祭纍徴諶為散騎中書侍郎而為末波所留遂不得南渡末波死弟遼代立諶流離世故且二十載石虎攻破遼西復為虎所得以為中書侍郎國子祭酒侍中中書監屬冉閔誅滅石氏諶隨閔軍於襄國遇害時年六十七是歲永和六年也諶名家子早有聲譽才髙行潔為一時所推值中原喪亂與清河崔悅潁川荀綽河東裴憲北地傅暢並淪陷非所雖俱顯於石氏恆以為辱諶每謂諸子曰吾身沒之後但稱晉司空從事中郎爾撰祭法注莊子及文集皆行於世悅字道儒魏司空林曾孫劉琨妻之姪也與諶俱為琨司空從事中郎後為末波佐史沒石氏亦居大官其綽憲暢並别有傳華表字偉容平原髙唐人也父歆清德髙行為魏太尉表年二十拜散騎黃門郎纍遷侍中正元初石苞來朝盛稱髙貴鄉公以為魏武更生時聞者流汗沾背表懼禍作頻稱疾歸下舍故免於大難後遷尚書五等建封觀陽伯坐供給喪事不整免泰始中拜太子少傅轉光祿勳遷太常卿數歲以老病乞骸骨詔曰表清貞履素有老成之美久幹王事靜恭匪懈而以疾固辭章表懇至令聽如所上以為太中大夫賜錢二十萬牀帳褥席祿賜與卿同門施行馬表以苦節垂名司徒李允司𨽻王宏等並嘆美表清淡退靜以不可得貴賤而親疏也咸寧元年八月卒時年七十二諡曰康詔賜朝服有六子廙岑嶠鑒淡簡廙字長駿𢎞敏有才藝妻父盧育典選難舉親姻故廙年三十五不得調晚為中書通事郎泰始初遷冗從僕射少為武帝所禮歷黃門侍郎散騎常侍前軍將軍侍中南中郎將都督河北諸軍事父疾篤輒還仍遭喪舊例葬訖復任廙固辭忤旨初表有賜客在鬲使廙因縣令袁毅録名三客各代以奴及毅以貨賕致罪獄辭迷謬不復顯以奴代客直言送三奴與廙而毅亦盧氏壻也又中書監荀勗先為中子求廙女廙不許為恨因密啓帝以袁毅貨賕者多不可盡罪宜責最所親者一人因指廙當之又緣廙有違忤之咎遂於喪服中免廙官削爵土大鴻臚何遵奏廙免為庶人不應襲封請以表世孫混嗣表有司奏曰廙所坐除名削爵一時之制廙為世子著在名簿不聽襲嗣此為刑罰再加諸侯犯法八議平處者褒功重爵也嫡統非犯終身棄罪廢之為重依律應聽襲封詔曰諸侯薨子踰年即位此古制也應即位而廢之爵命皆去矣何為罪罰再加且吾之責廙以肅貪穢本不論常法也諸賢不能將眀此意乃更詭易禮律不顧憲度君命廢之而羣下復之此為上下正相反也於是有司奏免議者官詔皆以贖論混以世孫當受封逃避斷髮陽狂病瘖不能語故得不拜世咸稱之廙棲遲家巷垂十載教誨子孫講誦經典集經書要事名曰善文行於世與陳協共造䐗蘭於宅側帝嘗出視之問其故左右以實對帝心憐之帝後又登陵雲臺望見廙苜蓿園阡陌甚整依然感舊太康初大赦乃得襲封久之拜城門校尉遷左衛將軍數年以為中書監惠帝即位加侍中光祿大夫尚書令進爵為公應楊駿召不時還有司奏免官尋遷太子少傅加散騎常侍動遵禮典得傅導之儀後年衰病篤詔遣太醫療病進位光祿大夫開府儀同三司時河南尹韓夀因托賈后求以女配廙孫陶廙距而不許后深以為恨故遂不登台司年七十五卒諡曰元三子混薈恆混字敬倫嗣父爵清貞簡正位侍中尚書卒官子陶嗣補鞏令沒於石勒薈字敬叔為河南尹與荀藩荀組俱避賊至臨潁父子並遇害恆字敬則博學以清素為稱尚武帝女滎陽長公主拜駙馬都尉元康初東宫建恆以選為太子賔客賜爵關內侯食邑百户辟司徒王渾倉曹掾屬除散騎侍郎遷散騎常侍北軍中侯俄拜領軍加散騎常侍愍帝即位以恆為尚書進爵苑陵縣公頃之劉聰逼長安詔出恆為鎮軍將軍領潁川太守以為外援恆興合義軍得二千人未及西赴而關中陷歿時羣賊方盛所在州郡相繼奔敗恆亦欲棄郡東渡而從兄軼為元帝所誅以此為疑先書與驃騎將軍王導導言於帝帝曰兄弟罪不相及况羣從乎即召恆補光祿勳恆到未及拜更以為衛將軍加散騎常侍本州大中正尋拜太常議立郊祀尚書刁協國子祭酒杜彛議須還洛乃修郊祀恆議漢獻帝居許即便郊柴宜於此修立司徒荀組驃騎將軍王導同恆議遂定郊祀尋以疾求解詔曰太常職主宗廟蒸嘗敬重而華恆所疾不堪親奉職事夫子稱吾不預祭如不祭况宗伯之任職所司邪令轉恆為廷尉頃之加特進太寧初遷驃騎將軍加散騎常侍督石頭水陸諸軍事王敦表轉恆為護軍疾病不拜授金紫光祿大夫又領太子太保成帝即位加散騎常侍領國子祭酒咸和初以愍帝時賜爵進封一皆削除恆更以討王敦功封苑陵縣侯復領太常蘇峻之亂恆侍帝左右從至石頭備履艱危困悴踰年初恆為州大中正鄉人任讓輕薄無行為恆所黜及讓在峻軍中任勢多所殺害見恆輒恭敬不肆其虐鍾雅劉超之死亦將及恆讓盡心救衛故得免及帝加元服又將納后寇難之後典籍靡遺婚冠之禮無所依據恆推尋舊典撰定禮儀并郊廟辟雍朝廷軌則事並施用遷左光祿大夫開府常侍如故固讓未拜會卒時年六十九册贈侍中左光祿大夫開府諡曰敬恆清恪儉素雖居顯列常布衣蔬食年老彌篤死之日家無餘財唯有書數百卷時人以此貴之子俊嗣為尚書郎俊子仰之大長秋嶠字叔駿才學深博少有令問文帝為大將軍辟為掾屬補尚書郎轉車騎從事中郎泰始初賜爵關內侯遷太子中庶子出為安平太守辭親老不行更拜散騎常侍典中書著作領國子博士遷侍中太康末武帝頗親宴樂又多疾病屬小瘳嶠與侍臣表賀因微有諷諫帝手詔報之元康初封宜昌亭侯誅楊駿改封樂鄉侯遷尚書後以嶠博聞多識屬書典實有良史之志轉祕書監加散騎常侍班同中書寺為內臺中書散騎著作及治禮音律天文數術南省文章門下撰集皆典統之初嶠以漢紀煩穢慨然有改作之意會為臺郎典官制事由是得遍觀祕籍遂就其緒起於光武終於孝獻一百九十五年為帝紀十二卷皇后紀二卷十典十卷傳七十卷及三譜傳序目録凡九十七卷嶠以皇后配天作合前史作外戚傳以繼末編非其義也故易為后妃紀以次帝紀又改志為典以有堯典故也而改名漢後書奏之詔朝臣會議時中書監荀朂令和嶠太常張華侍中王濟咸以嶠文質事核有遷固之規實録之風藏之祕府後太尉汝南王亮司空衛瓘為東宫傅列上通􅊰事遂施行嶠所著論議難駁詩賦之屬數十萬言其所奏官制太子宜還宫及安邊雩祭明堂辟雍浚導河渠巡禹之舊迹置都水官修蠶宫之禮置長秋事多施行元康三年卒追贈少府諡曰簡嶠性嗜酒率常沈醉所撰書十典未成而終祕書監何劭奏嶠中子徹為佐著作郎使踵成未竟而卒後監繆徽又奏嶠少子暢為佐著作郎克成十典并草魏晉紀傳與著作郎張載等俱在史官永嘉喪亂經籍遺沒嶠書存者三十餘卷嶠有三子頥徹暢頥嗣官至長樂內史暢有才思所著文章數萬言遭寇亂避難荆州為賊所害時年四十石鑒字林伯樂陵厭次人也出自寒素雅志公亮仕魏歷尚書郎侍御史尚書左丞御史中丞多所糾正朝廷憚之出為并州刺史假節護胸奴中郎將武帝受禪封堂陽子入為司𨽻校尉轉尚書時秦涼為虜所敗遣鑒都督隴右諸軍事坐論功虛偽免官後為鎮南將軍豫州刺史坐討吳賊虛張首級詔遣歸田里終身不得復用勿削爵土久之拜光祿大夫復為司𨽻校尉稍加特進遷右光祿大夫開府領司徒前代三公册拜皆設小會所以崇宰輔之制也自魏末巳後廢不復行至鑒有詔令會遂以為常太康末拜司空領太子太傅武帝崩鑒與中護軍張劭監統山陵時大司馬汝南王亮為太傅楊駿所疑不敢臨喪出營城外時有告亮欲舉兵討駿駿大懼白太后令帝為手詔詔鑒及張劭使率陵兵討亮劭駿甥也便率所領催鑒速發鑒以為不然保持之遣人密覘視亮已别道還許昌於是駿止論者稱之山陵訖封昌安縣侯元康初為太尉年八十餘克壯慷慨自遇若少年時人美之尋薨諡曰元子陋字處賤襲封歷屯騎校尉溫羡字長卿太原祁人漢護羌校尉序之後也祖恢魏揚州刺史父恭濟南太守兄弟六人並知名於世號曰六龍羡少以朗悟見稱齊王攸辟為掾遷尚書郎惠帝即位拜豫州刺史入為散騎常侍纍遷尚書及齊王冏輔政以羡攸之故吏意特親之轉吏部尚書先是張華被誅冏建議欲復其官爵論者或以為非羡駁之曰自天子已下爭臣各有差不得歸罪於一人也故晏子曰為已死亡非其親昵誰能任之里充之殺二庶陳乞之立陽生漢朝之誅諸吕皆積年之後乃得歷事未有事主見存而得行其志於數月之內也式乾之會張華獨諫上宰不和不能乘風贊善望其指麾從命不亦難乎况今皇后譛害其子內難不預禮非所任且后體齊於帝尊同皇極罪在枉子事不為逆義非所討今以華不能廢枉子之后與趙盾不討殺君之罪同而貶責之於義不經通也華竟得追復爵位其後以從駕討成都王頴有功封大陵縣公邑千八百户出為冀州刺史加後將軍范陽王虓敗於許昌也自牧冀州羡乃避之惠帝之幸長安以羡為中書令不就及帝還洛陽徴為中書監加散騎常侍未拜會帝崩懷帝即位遷左光祿大夫開府領司徒論者僉謂為速在位未幾病卒贈司徒諡曰元有三子祗允裕祗字敬齊太傅西曹掾允字敬咸太子舍人裕字敬嗣尚武安長公主官至左光祿大夫通志卷一百二十二
