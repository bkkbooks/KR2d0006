body:
  text: 通志卷一百六十五宋右迪功郎鄭樵漁仲撰外戚傳一晉羊琇王恂弟虔愷楊文宗羊元之虞豫子允庾琛杜乂禇裒何凖子澄王濛子修王遐王藴禇爽後魏賀訥姚黃眉杜超賀迷閭毗馮熙子誕李惠髙肇胡國珍從曽孫長粲楊騰乙弗繪北齊趙猛胡長仁隋髙祖外家吕氏獨孤羅弟善陀晉羊琇字稚舒景獻皇后從父弟也父耽官至太常兄瑾尚書右僕射琇少舉郡計參鎮西鍾會軍事從平蜀及會謀反琇正言苦諫還賜爵關內侯琇涉學有智算少與武帝通門甚相親狎每接筵同席嘗謂帝曰若富貴見用任領護各十年帝戲而許之初帝未為太子而聲論不及弟攸文帝素有代宗之義琇密為武帝畫策甚有匡救又觀察文帝為政損益揆度應所顧問之事皆令武帝默而識之後文帝與武帝論當世之務及人間可否武帝答無不允由是儲位遂定及帝為撫軍命琇參軍事帝即王位後擢琇為左衛將軍封甘露亭侯帝踐阼纍遷中護軍加散騎常侍琇在職十三年典禁兵豫機密寵遇甚厚初杜預拜鎮南將軍朝士畢賀皆連榻而坐琇與裴楷後至曰杜元凱乃復以連榻而坐客邪遂不坐而去琇性豪侈費用無復齊限而屑炭和作獸形以溫酒洛下豪貴咸競效之又喜遊宴以夜續晝中外五親無男女之别時人譏之然黨慕勝已其所推奉便盡心無二窮窘之徒特能振恤選用多以得意者居先不盡銓次之理將士有冒官位者為其致節不惜軀命然放恣犯法每為有司所貸其後司𨽻校尉劉毅劾之應至重刑武帝以舊恩直免官而已尋以侯白衣領護軍頃之復職及齊王攸出鎮也琇以切諫忤旨左遷太僕卿既失寵憤怨遂發病以疾篤求退拜特進加散騎常侍還第卒帝手詔追贈輔國大將軍開府儀同三司賜東園祕器朝服一襲錢三十萬布百匹諡曰威王恂字良夫文明皇后之弟也父肅魏蘭陵侯恂文義通博在朝忠正纍遷河南尹建立二學崇明五經鬲令袁毅嘗餽以駿馬恂不受及毅敗受貨者皆被貶黜焉魏氏給公卿已下租牛客戶數各有差自後小民憚役多樂為之貴勢之門動有百數又太原諸部亦以丐奴胡人為之田客多者數千武帝即位詔禁募客恂明峻其防所部莫敢犯者咸寧四年卒贈車騎將軍恂弟虔字恭祖以功幹見稱纍遷衛尉封安壽亭侯拜平東將軍假節監青州諸軍事徵為光祿勳轉尚書卒子士文嗣歷右衛將軍南中郎將鎮許昌為劉聰所害虔弟愷字君夫少有才力歷位清顯雖無細行有在公之稱以討楊駿勳封山都縣公邑千八百户遷龍驤將軍領驍衛將軍加散騎常侍尋坐事免官起為射聲校尉久之轉後將軍愷既世族國戚性復豪侈用赤石脂泥壁石崇以愷將為鴆毒之事司𨽻校尉傅祗劾之有司皆論正重罪詔特原之由是衆人僉畏愷故敢肆其意所欲之事無所顧憚焉及卒諡曰醜楊文宗武元皇后父也其先仕漢四世為三公文宗為魏通事郎襲封蓩亭侯早卒以后父追贈車騎將軍諡曰穆羊元之惠皇后父尚書右僕射瑾之子也元之初為尚書郎以后父拜光祿大夫特進散騎常侍更封興晉侯遷尚書右僕射加侍中進爵為公成都王頴之攻長沙王乂也以討元之為名遂憂懼而卒追贈車騎將軍開府儀同三司虞豫元敬皇后父也少有美稱州郡禮辟並不就拜南陽王文學早卒明帝即位追贈散騎常侍驃騎大將軍開府儀同三司平山縣侯子允嗣允敬后弟也初拜散騎常侍遷步兵校尉太寧末追贈豫官以允襲封爵轉右衛將軍與南頓王宗俱為明帝所昵並典禁兵及帝不豫宗以隂謀發覺事連允帝隱忍不問徙允為宗正卿加散騎常侍咸和二年宗伏誅左遷允為桂陽太守秩中二千石頻徙琅邪廬陵太守咸康元年卒追贈衛將軍加散騎常侍子洪襲爵庾琛字子美明穆皇后父也兄衮在孝友傳琛永嘉初為建威將軍過江為會稽太守徵為丞相咨議祭酒卒官以后父追贈左將軍妻母丘氏追封鄉君子亮陳先志不受咸和中成帝又下詔追贈琛驃騎將軍儀同三司亮又辭焉亮在列傳杜乂字𢎞理成恭皇后父也祖鎮南將軍預父尚書左丞相錫乂性純和美姿容有盛名於江左王羲之見而目之曰膚若凝脂眼如點漆此神仙人也桓彝亦曰衛玠神清杜乂形清襲封當陽侯為丹陽丞早卒無男生后而乂終妻裴氏嫠居養后以禮自防甚有德音咸康初追贈乂金紫光祿大夫封裴氏為高安鄉君邑五百户至孝武帝時崇進為廣德縣君裴氏壽考百姓號曰杜姥初司徒蔡謨甚器重乂嘗言於朝曰恨諸君不見杜乂也其為名流所重如此禇裒字季野康獻皇后父也祖䂮有局量以幹用稱嘗為縣吏事有不合令欲鞭之䂮曰物各有所施榱椽之材不合以為藩落也願明府埀察乃捨之家貧辭吏年埀五十鎮南將軍羊祜與之有舊言於武帝始被升用官至安東將軍父洽武昌太守裒少有簡貴之風與亰兆杜乂俱有盛名冠于中興譙國桓彜見而目之曰季野有皮裏陽秋言其外無臧否而內有所褒貶也謝安亦雅重之常云裒雖不言而四時之氣亦備矣初辟西陽王椽吳王文學蘇峻之構逆也車騎將軍郗鑒以裒為參軍峻平以功封都鄉亭侯稍遷司徒從事中即除給事黃門侍即康帝為琅邪王將納妃妙選素望詔娉裒女為妃於是出為豫章太守及康帝即位徵拜侍中遷尚書以后父苦求外出除建威將軍江州刺史鎮半洲在官清約雖居方伯恆使私僮樵採頃之徵為衛將軍領中書令裒以中書銓管詔命不宜以姻戚居之固讓詔以為左將軍兗州刺史都督兗州徐州之琅邪諸軍事假節鎮金城又領琅邪內史初裒總角詣庾亮亮使郭璞筮之卦成璞駭然亮曰有不祥乎璞曰此非人臣卦不知此年少何以乃表斯祥二十年外吾言方驗及此二十九年而康獻皇太后臨朝有司以裒皇太后父議加不臣之禮拜侍中衛將軍録尚書事持節都督刺史如故裒以近戚懼護譏嫌上疏固請居藩於是改授都督徐兗青揚州之晉陵吳國諸軍事衛將軍徐兗二州刺史假節鎮亰口永和初復徵裒將以為揚州録尚書事吏部尚書劉遐説裒曰會稽王令德國之周公也足下宜以大政付之裒長史王胡之亦勸焉於是固辭歸藩朝野咸歎服之進號征北大將軍開府儀同三司固辭開府裒又以政道在於得才宜委賢任能升進舊齒乃薦前光祿大夫顧和侍中殷浩疏奏即以和為尚書令浩為揚州刺史及石虎死裒上表請伐之即日戒嚴直指泗口朝議以裒事任貴重不宜深入可先遣偏師裒重陳前所遣前鋒督護王頤之等徑造彭城示以威信後遣督護麋嶷進軍下邳賊即奔潰嶷率所領據其城池今宜速發以成聲勢於是除征討大都督徐兗青揚豫五州諸軍事裒率衆三萬徑進彭城河朔士庶歸降者日以千計裒撫納之甚得其歡心先遣督護徐龕伐沛獲偽相支重郡中二千餘人歸降魯郡山有五百餘家亦建義請援裒遣龕領鋭卒三千迎之龕違裒節度軍次代陂為石遵將李莬所敗死傷太半龕執節不撓為賊所害裒以春秋責帥授任失所威略虧損上疏自貶以征北將軍行事求留鎮廣陵詔以偏師之責不應引咎逋寇未殄方鎮任重不宜貶降使還鎮江口解征討都督時石虎新死其國大亂遺户二十萬口渡河將歸順乞師救援會裒已旋威勢不接莫能自拔皆為慕容皓及苻健之衆所掠死亡咸盡裒以遠圖不就憂慨發疾及至京口聞哭聲甚衆裒問何哭之多左右曰代陂之役也裒益慚恨永和五年卒年四十七遠近嗟悼吏士哀慕之贈侍中太傅夲官如故諡曰元穆子歆字幼安以學行知名歷散騎常侍祕書監何凖字幼道穆章皇后父也高尚寡欲弱冠知名州府交辟不就兄充為驃騎將軍勸其令仕凖曰第五之名何減驃騎凖兄弟中第五故有此言充居宰輔之重權傾一時凖散帶衡門不及人事唯誦佛經修營塔廟而已徵拜散騎侍即不起年四十七卒升平元年追贈金紫光祿大夫封晉興縣侯子惔以父素行高潔表讓不受三子放惔澄放繼充惔官至南康太守早卒惔子元度西陽太守次叔度太常卿尚書澄字季元起家祕書即轉丞清正有器望纍遷祕書監太常中護軍孝武帝深愛之以為冠軍將軍吳國內史太元末琅邪王出居外第妙選師傅徵拜尚書領琅邪王師安帝即位遷尚書左僕射典選王師如故時澄以腳疾固讓特聽不朝坐家視事又領夲州大中正及桓元執政以疾奏免卒于家安帝反正追贈金紫光祿大夫長子籍早卒次子融元熙中為大司農王濛字仲祖哀靖皇后父也會祖黯歷位尚書祖佑北軍中候父訥新淦令濛少時放縱不羈不為鄉曲所齒晚節克己勵行有風流美譽虛已應物恕而後行莫不敬愛焉事諸毋甚謹奉祿資産常推厚居薄喜愠不形於色不修小潔而以清約見稱善𨽻書美姿容嘗覽鏡自照稱其父字曰王文開生如此兒邪居貧帽敗自入市買之嫗悅其貌遺以新帽時人以為逹與沛國劉惔齊名友善惔嘗稱濛性至通而自然有節濛每云劉君知我勝我自知時人以惔方荀奉倩濛比袁曜卿凡稱風流者舉濛惔為宗焉司徒王導辟為椽導復引匡術弟孝濛致箋於導曰開國承家小人勿用公仗德義以尹天下方將澄清彜倫崇重名器夫軍國殊用文武異容豈可令涇渭混流虧清穆之風何以允答具瞻儀刑海內導不答後出補長山令復為司徒左西屬濛以此職有譴則應受杖固辭詔為停罰猶不就徙中書郎簡文帝之為會稽王也嘗與孫綽商略諸風流人綽言劉惔清蔚簡令王濛溫潤恬和桓溫高爽邁出謝尚清易令逹而濛性和暢能言理辭簡而有會及簡文帝輔政益貴幸之與劉琰號為入室之賔轉司徒左長史晚求為東陽不許及濛病乃恨不用之濛聞之曰人言會稽王癡竟癡也疾漸篤於燈下轉麈尾視之歎曰如此人曽不得四十年也年三十九卒臨殯劉琰以犀把麈尾置棺中因慟絶久之謝安亦嘗稱美濛云王長史語甚不多可謂有令音有二子修藴修字敬仁小字茍子明秀有美稱善隸書號曰流奕清舉年十二作賢全論濛以示劉琰曰敬仁此論便足以參微言起家著作郎琅邪王文學轉中軍司馬未拜而卒年四十二臨終歎曰無愧古人年與之齊矣王遐字桓子簡順皇后父驃騎將軍述之從叔也少以華族仕至光祿勳寧康初追贈特進光祿大夫加散騎常侍諡曰靖長子格領軍將軍恪子欣之豫章太守秩中二千石欣之弟歡之廣州刺史遐少子臻崇德衛尉王藴字叔仁孝武定皇后父司徒左長史濛之子也起家著作郎纍遷尚書吏部郎性平和不抑寒素每一官缺求者十輩藴無所是非時簡文帝為會稽王輔政藴輒連狀白之曰某人有地某人有材務存進退各隨其方故不得者無怨焉補吳興太守甚有德政屬部荒人飢輒開倉贍恤主簿執諫請先列表上待報藴曰今百姓嗷然路有飢饉若表上須報何以救將死之命乎專輒之愆罪在太守且行仁義而敗無所恨也於是大賑貸之賴藴全者十七八焉朝廷以違科免藴官士庶詣闕訟之詔特左降晉陵太守復有惠化百姓歌之定后立以后父遷光祿大夫領五兵尚書本州大中正封建昌縣侯藴以恩澤賜爵非三代令典固辭不受朝廷敦勸終不肯拜乃授都督亰口諸軍事左將軍徐州刺史假節復固讓謝安謂藴曰卿居后父之重不應妄自菲薄以虧時遇宜依禇公故事但令在貴權於事不事耳可暫臨此任以紓國恩之重於是乃受命鎮于亰口頃之徵拜尚書左僕射將軍如故遷丹陽尹即本軍號加散騎常侍藴以姻戚不欲在內苦求外出復以為都督浙江東五郡鎮軍將軍會稽內史常侍如故藴素嗜酒末年尤甚及在會稽略少醒日然猶以和簡為百姓所悅時王悅來拜墓藴子恭往省之素相善遂留十餘日方還藴問其故恭曰與阿太語蟬連不得歸藴曰恐阿太非汝之友阿太悅小字也後竟乖初好時以為知人太元九年卒年五十五追贈左光祿大夫開府儀同三司長子華早卒次子恭在列傳恭弟爽字季明強正有志力歷給事黃門侍郎侍中孝武帝崩王國寶夜欲開門入為遺詔爽距之曰大行晏駕皇太子未至敢入者斬乃止爽嘗與會稽王道子飲道子醉呼爽為小子爽曰亡祖長史與簡文皇帝為布衣之交亡姑亡姊伉儷二宫何小子之有及國寶執權免爽官後兄恭再起事並以爽為寧朔將軍參預國事恭敗被誅褚爽字𢎞茂小字期生恭思皇后父也祖裒父歆爽少有令稱謝安甚重之嘗曰若期生不佳我不復論士矣為義興太守早卒以后父追贈金紫光祿大夫爽子秀之淡之裕之義熙中並歷大官宋史有傳後魏賀訥代人道武皇帝之舅獻明后之兄也其先世為君長四方附國有數十部祖紇始有勳於國尚平文女父野干尚昭成女遼西公主及昭成崩諸部乖亂獻明后與道武及衛秦二王往依訥會苻堅使劉庫仁分攝國事於是道武還居獨孤部訥總攝東部為大人遷居大寧行其恩信衆多歸之盛於庫仁苻堅假訥鷹揚將軍後劉顯謀逆道武輕騎歸訥訥見而驚喜拜曰官家復國之後當念老臣帝笑曰誠如舅言要不忘也訥中弟染干粗暴忌帝常圖為逆每為皇姑遼西公主擁護故染干不得肆其禍焉諸部大人請訥兄弟求舉道武為主染干曰在我國中何得爾也訥曰大國興復先業於我國中我國之福也遂與諸大人勸進道武登代王位于牛川及帝討吐突鄰部訥兄弟遂懷異圖率諸部救之帝擊之大潰訥西遷衛辰遣子直力鞮征訥訥告急請降道武簡精騎二十萬救之遂徙訥部落及諸弟處之東偏訥又通於慕容埀埀以訥為歸善王染干謀殺訥而代立訥遂與染干相攻埀遣子麟討之敗染干於牛都破訥於赤城道武遣師救訥麟乃引退訥從道武平中原拜安逺將軍其後離散諸部分土定居不聽遷徙其君長大人皆同編户訥以元舅稍見尊重然無所統領以壽終於家訥弟盧亦從平中原以功賜爵遼西公帝遣盧會衛王儀伐鄴而盧自以帝之季舅不肯受儀節度帝遣使切責之盧遂憤恨與儀司馬丁建構成其嫌彌加猜忌會道武勑儀去鄴盧亦引歸道武以盧為廣川太守盧性雄豪耻居冀州刺史王輔下襲殺輔奔慕容德德以為并州刺史廣寧王廣固敗盧亦沒訥從父弟悅初道武之居賀蘭部也人情未甚附唯悅舉部隨從又密為帝祈禱天神請成大業出於誠至帝嘉之甚見寵待後平中原以功賜爵巨鹿縣侯進爵北新公卒子泥襲爵後降為肥如侯道武崩亰師草草泥出舉烽於安陽城北賀蘭部人皆往赴之明元即位乃罷詔泥與元渾等八人拾遺左右與北新侯安同持節行并定二州劾奏并州刺史元六頭等皆伏罪州郡肅然後從太武征赫連昌以功進爵為琅邪公軍國大事並參預焉又征蠕蠕為别道將坐逐賊不進詐增虜級當斬贖為庶人久之拜光祿勳為外都大官復本爵卒官子醜建襲姚黃眉姚興之子明元昭哀皇后之弟也姚泓滅黃眉間來歸魏明元厚禮待之賜爵隴西公尚陽翟公主拜駙馬都尉𨽻户二百太武即位遷內都大官後拜太常卿卒贈雍州刺史隴西王諡曰獻陪葬金陵黃眉寬和溫厚希言得失太武悼惜之故贈禮有加焉杜超字祖仁魏郡鄴人密皇后之兄也少有節操泰恆中為相州别駕始光中太武思念舅氏以超為陽平公尚南安長公主拜駙馬都尉位大鴻臚卿車駕幸其第賞賜巨萬神麚三年以超行征南大將軍太宰進爵為王鎮鄴追加超父豹鎮東大將軍陽平景王母曰巨鹿惠君真君五年超為帳下所害太武臨其喪哀慟久之諡曰威王長子道生賜爵城陽侯後為秦州刺史進爵河東公道生弟鳯皇襲超爵侍中特進太武追思超不已欲以鳯皇為定州刺史鳯皇不願違離闕庭乃止鳯皇弟道俊賜爵發干侯鎮枋頭除兗州刺史超既薨復授超從弟遺侍中安南將軍開府相州刺史入為內都大官進爵廣平王遺性忠厚頻歷州郡所在著稱薨贈太傅諡曰宣王長子元寶位司空元寶弟允寶司𨽻校尉元寶又進爵亰兆王及歸而父遺喪明當入謝元寶欲以表聞文成未知遺薨怪其不至召之元寶將入時人止之曰宜以家憂勿往元寶欲見其寵不從遂冒哀而入未幾以謀反伏誅親從皆斬唯元寶子世衝逃免時朝議欲追削超爵位中書令高允上表理之後兗州故吏汲宗等以道俊遺惠在人前從坐削爵受誅委骸土壤求得收葬書奏詔義而聼之贈散騎常侍安南將軍南康公諡曰昭世衝襲遺公爵賀迷代人太武敬哀皇后之從父也皇后生景穆初后少孤父兄近親唯迷故蒙賜爵長鄉子卒贈光祿大夫五原公閭毗代人蠕蠕主大檀之親屬太武時自其國來降毗即恭皇后之兄也后生文成文成大安二年以毗為平北將軍賜爵河東公弟紇為寧北將軍賜爵零陵公其年並加侍中進爵為王毗征東將軍評尚書事紇征西將軍中都大官自餘子弟賜爵為王者二人公五人侯六人子三人同時受拜所以隆崇舅氏和平二年追諡后祖父延定襄康公父辰定襄懿王毗薨贈太尉追贈毗妻河東王妃子惠襲紇薨贈司空子豆後賜名莊太和中初立三長以莊為定户籍大使甚有時譽十六年例降爵後為七兵尚書卒紇弟染位外都大官冀州刺史江夏公卒先是文成以乳母常氏有保護功既即尊位尊為保太后後尊為皇太后興安二年太后前兄英字世華自肥如令超為散騎常侍鎮軍大將軍賜爵遼西公弟喜鎮軍大將軍祠曹尚書帶方公三妹皆封縣君妹夫王睹為平州刺史遼東公追贈英祖父苻堅扶風太守亥為鎮西將軍遼西簡公父渤海太守澄為侍中征東大將軍太宰遼西獻王英母許氏博陵郡公遣兼太常盧度世持節改葬獻王於遼西樹碑立廟置守冡百家太安初英為侍中征東大將軍太宰進爵為王喜左光祿大夫改封燕郡從兄欣為安東將軍朝鮮侯欣子伯夫散騎常侍選部尚書次子員金部尚書喜子振太子庶子三年英領太師評尚書事內都大官伏寶泰等州刺史五年詔以太后母宋氏為遼西王太妃和平元年喜為洛州刺史初英事宋不能謹而睹奉宋其至就食於和龍無車牛宋疲不能進睹負宋於笈至是宋於英等薄不如睹之篤謂太后曰何不王睹而黜英太后曰英為長兄門户主也家內小小不順何足追計睹雖盡力故是他姓奈何在英上夲州郡公亦足報矣天安中英為平州刺史欣為幽州刺史伯夫進爵范陽公英濁貨徙敦煌諸常自興安至是皆以親疏受爵賜田宅時為隆盛後伯夫為洛州刺史以贓汚欺妄徵斬於亰都承眀元年徵英復官薨諡遼西平王始英之徵也夢日墜其所居黃山下水中村人以牛車挽致不能出英獨抱載而歸聞者異之後員與伯夫子禽可共為飛書誣謗朝政事發有司執憲刑及五族孝文以文眀太后故罪止一門欣年老赦免歸家恕其孫一人扶養又給奴婢田宅其家僮沒入者百人金錦布帛數萬計賜尚書己下宿衛己上其女壻及親從在朝皆免歸夲鄉十一年孝文文眀太后以文昭太后故悉出其家前後沒入子女以喜子振試守正平郡卒馮熙字晉昌長樂信都人文眀太后之兄也祖𢎞北燕主太武平遼海熙父朗內徙官至秦雍二州刺史遼西郡公坐事誅文眀太后臨朝追贈假黃鉞太宰燕宣王立廟長安熙生於長安為姚氏魏母所養以叔父樂陵公邈因戰入蠕蠕魏母攜熙逃避至氐羌中撫育年十一好弓馬有勇幹氐羌皆歸附之魏母惡其如此將還長安始􅈬博士學問從師授孝經論語好陰陽兵法事及長遊華陰河東二郡間性泛愛不拘小節人無士庶來則納之取人子女為奴婢有容色者幸之為妾有子女數十人號為貪縱文眀太后既貴使人訪知熙所在徵赴亰師拜冠軍將軍賜爵肥如侯尚景穆女博陵長公主拜駙馬都尉出為定州刺史進爵昌黎王獻文即位遷太傅纍拜內都大官孝文即位文眀太后臨朝王公貴人登進者衆帝乃承旨以熙為侍中太師中書監領祕書事熙以頻履師傅又中宫之寵為羣情所駭心不自安乞轉外任文眀太后亦以為然於是除車騎大將軍開府都督洛州刺史餘如故洛陽雖經破亂而舊三字石經宛然猶在至熙與常伯夫相繼為州廢毁分用大至頽落熙為政不能仁厚而崇佛法自出家財在諸州鎮建圖精舍七十二處寫十六部一切經延致名德沙門日與講論精勤不倦所費亦不資而所營塔寺多在高山秀阜傷殺人牛有沙門勸止之熙曰成就之後人唯見佛圖焉豈知殺人牛也其北芒寺碑文中書侍郎賈元壽之辭孝文頻登北芒寺親讀碑文稱為嘉作熙求入朝授內都大官太師如故熙事魏母孝謹如事所生魏母卒乃散髮徒跣水漿不入口三日詔不聽服熙表求依趙氏之孤帝以熙情難奪聼服齊衰期後以例降改封京兆郡公帝納其女為后曰白虎通云王所不臣數有三焉妻之父母抑言其一此所謂供承宗廟不欲奪私心然吾孝著於春秋無臣證於往牒既許通體之一用開至尊之敬比長秋配極陰政既敷未聞有司陳奏斯式可詔太師輒從臣禮又勒集書造儀付外孝文前後納熙三女二為后一為昭儀由是馮氏寵貴益厚賞賜纍巨萬帝每詔熙上書不臣入朝不拜熙上書如舊熙於後遇疾綿寢四載詔遣醫問道路相望車駕亦數臨幸焉將遷洛帝親與熙别見其困篤歔欷流涕密勑宕昌公主曰太師萬一不幸即可監護喪事十九年薨於代車駕在淮南留臺表聞還至徐州乃舉哀為制緦服詔有司豫辦凶儀并開魏亰之墓令公主之柩俱向伊洛凡所營送皆公家為備又勑代都給綵帛前後六千匹以供凶用皇后詣都赴哭太子恂亦赴代哭及將葬贈黃鉞侍中都督十州諸軍事大司馬太尉冀州刺史加黃屋左纛備九錫前後部羽葆鼓吹皆依晉太宰安平獻王故事有司奏諡詔曰可以威強恢逺曰武奉諡於公柩至洛七里澗帝服縗往迎叩靈悲慟而拜焉葬日送臨墓所親作銘志主生二子誕修誕字思正修字寶業皆姿質妍麗年財十餘文眀太后俱引入禁中申以教誡然不能習讀經史兄弟並無學術徒整飾儀容寬雅恭謹而已誕與孝文同嵗幼侍書學仍蒙親侍尚帝妹樂安長公主拜駙馬都尉侍中征西大將軍南平王修侍中鎮北大將軍尚書東平公又除誕儀曹尚書知殿中事及罷庶姓王誕為侍中都督中外諸軍事中軍將軍特進改封長樂郡公誕拜官孝文立於庭遙受其拜既訖還室修降為侯誕修雖並長宫禁而性趣乖别誕性淳篤修乃浮競誕亦未能誨督其過然時言於太后孝文嚴責之至於捶楚由是陰懷毒恨遂結左右有憾於誕者求藥欲因食害誕事覺帝自詰之具得情狀誕引過謝乞全修命帝以誕父老又重其意不致於法撻之百餘黜為平城百姓修妻司空穆亮女也求離婚請免官帝引管蔡事皆不許帝寵誕仍陰與同輿而載同案而食同席坐卧彭城王協北海王詳雖直禁中然親近不及十六年以誕為司徒帝既愛誕除官日親為制三讓表并啓將拜又為其章謝尋加車騎大將軍太子太師十八年帝謂其無師傅奬導風誕深自誨責從駕南伐十九年至鍾離誕遇疾不能侍從帝日省問醫藥備加帝鋭意臨江乃命六軍發鍾離南轅與誕泣訣左右皆莫不掩涕時誕已惙然強坐視帝悲而淚不能下言夢太后來呼臣帝嗚咽執手而出遂行是日去鍾離五十里許昏時告誕薨問帝哀不自勝時崔慧景裴叔業軍在中淮去所次不過百里帝乃輕駕西還從者數千人夜至誕薨所拊尸哀慟若喪至戚逹旦聲淚不絶從者亦迭舉音帝以所服衣幍充襚親自臨視徹樂去膳宣勑六軍止臨江之駕帝親北渡慟哭極哀喪至洛陽車駕猶在鍾離詔留守賜賻物布帛五千匹穀五千斛以供葬事贈假黃鉞使持節大司馬領司徒侍中都督太師駙馬公如故加以殊禮備錫九命依晉大司馬齊王攸故事有司奏諡詔曰案諡法主善行德曰元柔克有光曰懿昔貞惠兼美受二諡之榮忠武雙徽錫兩號之茂式凖前訓宜契具瞻既自少綢繆知之惟朕案行定名可諡曰元懿帝又親為作碑文及挽歌詞皆窮美盡哀事過其厚車駕還亰遂親至誕墓停車而哭使彭城王協詔羣官脫朱衣服單衣介幘而哭司徒貴者示以朋友微者示如寮佐公主貞厚有禮度産二男長子穆字孝和襲熙爵避皇子愈封改封扶風郡公尚孝文女順陽長公主拜駙馬都尉厯員外通直散騎常侍穆與叔輔興不和輔興亡贈相州刺史祖載在庭而穆方髙車良馬恭受職命言宴滿堂欣笑自若為御史中尉東平王匡所劾後位金紫光祿大夫遇害河陰贈司空雍州刺史子冏字景昭襲爵昌黎王尋以庶姓罷王仍襲扶風郡公子峭字子漢齊受禪例降穆弟皓襲父誕長樂郡公修弟聿字寶興廢皇后同産兄也位黃門郎信都伯後坐妹廢免為長樂百姓宣武時卒於河南尹聿同産弟風幼養於宫文明太后特加愛念數歲賜爵至北平王拜太子中庶子出入禁闥寵侔二兄孝文親政後恩寵稍衰降爵為侯幽后立乃復敘用后死亦冗散卒贈青州刺史崔光之兼黃門也與聿俱直光每謂之曰君家富貴太盛終必衰敗聿云我家何負四海乃呪我也光云以古推之不可不慎時熙為太保誕司徒太子太傅修侍中尚書聿黃門廢后在位禮愛未弛是後嵗餘修以罪棄熙誕喪亡后廢聿退時人以為盛必衰也李惠中山人思皇后之父也父蓋少知名歷位殿中都官尚書左將軍南郡公初太武妹武威長公主故涼王沮渠牧犍之妻太武平涼州頗以公主通密計之助故寵遇差隆詔蓋尚焉蓋妻興氏以是而出是後蓋加侍中駙馬都尉殿中都官尚書右僕射卒官贈征南大將軍定州刺史中山王諡曰莊惠弱冠襲父爵妻襄城王韓頽女生二女長即后也惠歷位散騎常侍侍中征西大將軍秦益二州刺史進爵為王轉雍州刺史征南大將軍加長安鎮大將惠長於思察雍州聼事有燕爭巢鬬已纍日惠令人掩獲試命綱紀斷之並辭惠乃使卒以弱竹彈兩燕既而一去一留惠笑謂吏屬曰此留者自計為巢功重彼去者既經楚痛理無固心羣下伏其深察人有負鹽負薪者同釋重擔息樹陰二人將行爭一羊皮各言籍背之物惠遣爭者出顧州綱紀曰此羊皮可拷知主乎羣下咸無答者惠令人置羊皮席上以杖擊之見少鹽屑曰得其實矣使爭者視之負薪者乃伏而就罪凡所察究多如此類由是吏人莫敢欺犯後為開府儀同三司青州刺史王如故歷政有美績惠素為文眀太后所忌誣惠將南叛誅之惠二弟初樂與惠諸子同戮後妻梁氏亦死青州盡沒其家財惠夲無釁故天下冤惜之惠從弟鳯為定州刺史長樂王主簿後長樂以罪賜死時卜筮者河間邢瓚辭引鳯云長樂不軌鳯為謀主伏誅唯鳯弟道念及兄弟之子皆逃免後遇赦乃出太和十二年孝文將爵舅氏詔訪存者而惠諸從以再離孥戮難於應命唯道念敢先詣闕乃由后妹及鳯兄弟子女之存者於是賜鳯子屯爵柏人侯安祖浮陽侯興祖安喜侯道念貞定侯從弟寄生髙邑子皆加將軍十五年安祖昆弟四人以外戚蒙見詔謂曰卿之先世內外有犯得罪於時然官必用材以親非興邦之選外氏之寵超於末葉從今已後自非奇才不復得外戚謬班抽舉既無殊能今且可還後例降爵安祖等改侯為伯並去軍號帝奉馮氏過厚於李氏過薄舅家了無敘用朝野人士所以竊議太常高閭顯言于禁中及宣武寵隆外家並居顯位乃惟孝文舅氏存己不霑恩澤景明末特詔興祖為中山太守正始初詔追崇惠為使持節驃騎將軍開府儀同三司定州刺史中山公太常奏諡上言案諡法武而不遂曰壯諡曰壯公興祖自中山遷燕州刺史卒以兄安祖子侃晞為後襲先封南郡王後以庶姓罷王改為博陵郡公侃晞為莊帝所親幸拜散騎常侍嘗食典御帝之圖爾朱榮侃晞與魯安等持刃於禁內殺榮及莊帝蒙塵侃晞奔梁高肇字首文文昭皇太后之兄也自云本渤海蓨人五世祖顧晉永嘉中避亂入高麗父揚字法修孝文初與弟乘信及其鄉人韓內異富等入魏拜厲威將軍河間子乘信眀威將軍俱待以客禮遂納揚女是為文昭皇后生宣武揚卒景明初宣武追思舅氏徵肇兄弟等録尚書事北海王詳等奏揚宜贈左光祿大夫賜爵渤海公諡曰敬其妻蓋氏宜追封清河郡君詔可又詔揚嫡孫猛襲渤海公爵封肇平原公肇弟顯澄城郡公三人同日受封始宣武未與舅氏相接將拜爵乃賜衣幘引見肇顯于華林都亭皆甚惶懼舉動失儀數日之間貴富赫奕是年咸陽王禧誅財物珍寶奴婢田宅多入高氏未幾肇遂為尚書右僕射冀州大中正尚宣武姑高平公主遷尚書令領吏部肇出自夷土時望輕之及在位居要留心百揆孜孜無倦世咸謂之為能宣武初六輔專政後以咸陽王禧無事構逆由是遂委信於肇肇既無親族頗結朋黨附之者旬月超升背之者陷以大罪以北海王詳位居其上構殺之又説宣武防衛諸王殆同囚禁時順皇后暴崩世言肇為之皇子昌薨僉謂王顯失於醫療承肇意旨及亰兆王愈出為冀州刺史畏肇恣擅遂至不軌肇又譖殺彭城王協由是朝野側目咸畏惡之因此專權與奪任己又嘗與清河王懌於雲龍門外廡下忽忿諍大至紛紜太尉高陽王雍和止之高后既立愈見寵信肇既當衡軸每事任己本無學識動違禮度好改先朝舊制減削封秩抑黜勳人由是怨聲盈路矣延昌初遷司徒雖貴登台鼎猶以去要怏怏形于辭色衆咸嗤笑之父兄封贈雖久竟不改瘞三年乃詔令遷葬肇不自臨赴唯遣其兄子猛改服詣代遷葬於鄉時人以肇無識哂而不責也及大舉征蜀以肇為大將軍都督諸軍為之節度與都督甄琛等二十餘人俱面辭宣武於東堂親奉規略是日肇所乘驄馬停於神虎門外無故驚倒轉卧渠中鞍具瓦解衆咸怪異肇出惡焉四年宣武崩赦罷征軍明帝與肇及征南將軍元遙等書稱諱言以告凶問肇承變非唯仰慕亦憂身禍朝夕悲泣至于羸悴將至宿瀍澗驛亭家人夜迎省皆不相視直至闕下衰服號哭還升太極殿奉喪盡哀太尉高陽王先居西柏堂專決庶事與領軍于忠密欲除之潛備壯士直寢邢豹伊盆生等十餘人於舍人省下肇哭梓宫訖於百官前引入西廊清河王懌任城王澄及諸王等皆竊言目之肇入省壯士扼而拉殺之下詔暴其罪惡稱為自盡自餘親黨悉無追問削除職爵葬以士禮逮昏乃於厠門出其尸歸家初肇西征行至函谷車軸中折從者皆以為不獲吉還也靈太后臨朝令特贈營州刺史永熙二年孝武帝贈使持節侍中中外諸軍事太師大丞相太尉公録尚書事冀州刺史肇子植自中書侍郎為濟州刺史率州兵討破元愈别將有功當蒙封賞不受云家荷重恩為國致效是其常節何足以膺進陟之報懇惻發於至誠歷青相朔恆四州刺史卒植頻蒞五州皆以清能著稱當時號為良刺史贈安北將軍冀州刺史肇長兄琨早卒襲揚封渤海郡公贈都督五州諸軍事鎮東大將軍冀州刺史詔其子猛嗣猛字豹兒尚長樂公主即宣武同母妹也拜駙馬都尉歷位中書令出為雍州刺史有能名入為殿中尚書卒贈司空冀州刺史孝武帝時復贈太師大丞相録尚書事公主無子猛先在外有男不敢令主知臨終方言之年幾三十矣乃召為喪主尋卒無後琨弟偃字仲遊太和十年卒正始中贈安東將軍都督青州刺史諡曰莊侯景眀四年宣武納其女為貴嬪及于順皇后崩永平元年立為皇后二年八坐奏封后母王氏為武邑郡君偃弟壽早卒壽弟即肇也肇弟顯侍中高麗國大中正早卒胡國珍字世玉安定臨涇人也祖略姚興勃海公姚逹平北府咨議參軍父深赫連屈丐給事黃門侍即太武克統萬深以降欵之功賜爵武始侯後拜河州刺史國珍少好學雅尚清儉太和十五年襲爵例降為伯女以選入掖庭生眀帝即靈太后也孝明帝踐阼以國珍為光祿大夫靈太后臨朝加侍中封安定郡公追崇國珍妻皇甫氏為亰兆郡君置守冢十户尚書令任城王澄奏安定公宜出入禁中參咨大務詔屈公入決萬機尋進位中書監儀同三司侍中如故賜絹嵗八百匹妻梁四百匹男女姊妹各有差國珍與太師高陽王雍太傅清河王懌太保廣平王懷入居門下同釐庶政詔依漢車千秋晉安平王故事給步挽一乘自掖門至于宣光殿得以出入并備几杖後與侍中崔光俱授帝經侍直禁中國珍上表陳刑政之宜詔皆施行熙平中加國珍使持節都督雍州刺史驃騎大將軍開府靈太后以國珍年老不欲令其在外且欲示以方面之榮竟不行遷司徒公侍中如故就宅拜之靈太后明帝率百寮幸其第宴會極歡又追尊亰兆郡君為秦太上君太上君景眀三年薨於洛陽於此十六年矣太后以太上君墳瘞卑局更增廣為起塋域門闕碑表侍中崔光等奏按漢高祖母始諡曰昭靈夫人後為昭靈后薄太后母曰靈文夫人皆置園邑三百家長丞奉守今秦太上君未有尊諡陵寢孤立即秦君名宜上終稱兼設掃衛以慰情典請上尊諡曰孝穆權置園邑三十戶立長丞奉守太后從之封國珍繼室梁氏為趙平郡君元義妻拜為女侍中封新平郡君又徙封馮翊君國珍子祥妻長安縣公主即清河王懌女也國珍年雖篤老而雅敬佛法時事潔齋自禮拜至於出入侍從猶能跨馬據鞍神龜元年四月七日步從所建佛像發第至閶闔門四五里八日又立觀像晚乃肯坐勞熱增甚因遂寢疾靈太后親侍藥膳十二日薨年八十給東園溫明祕器五時朝服各一具衣一襲贈布三千匹錢一百萬蠟千斤大鴻臚持節監護喪事太后還宫成服於九龍殿遂居九龍寢室眀帝服小功服舉哀於太極東堂又詔自始薨至七七皆為設千僧齋齋令七人出家百日設萬人齋二七人出家先是巫覡言將有凶勸令為厭勝法國珍拒而不從云吉凶有定分唯修德以禳之臨死與太后訣云母子善臨天下殷勤至於再三又及其子祥云我唯有一子死後勿如比來以威抑之靈太后以其好戲時加威訓國珍故以為言始國珍欲就祖父西葬舊鄉後緣前世諸胡多在洛葬有終洛之心崔光嘗對太后前問國珍云國公萬年後為在此安厝為歸長安國珍言當陪葬天子山陵及病危太后請以後事竟言還安定語遂惛忽太后問清河王懌與崔光等議去留懌等皆以病亂請從先言太后猶記崔光昔與國珍言遂營墓於洛陽太后雖外從衆議而深追臨終之語云我公之逺慕二親亦吾之思父母也追崇假黃鉞使持節侍中相國都督中外諸軍事太師領太尉公司州牧制號太上秦公加九錫葬以殊禮給九旒鑾輅虎賁班劒百人前後部羽葆鼓吹輼輬車諡曰文宣公賜物三千假粟一千五百石又詔贈國珍祖父父兄下逮從子皆有封職持節就安定監護喪事靈太后迎太上君神柩還第與國珍俱葬贈禭一與國珍同及國珍神主入廟詔太常權給以軒縣之樂六佾之舞初國珍無男養兄真子僧洗為後後納趙平君生子祥字元吉襲封故事世襲例皆減邑唯祥獨得全封趙平君薨給東園祕器明帝服小功服舉哀于東堂靈太后服齊衰期葬於太上君墓左不得祔合祥歷位殿中尚書中書監侍中改封平涼郡公薨贈開府儀同三司雍州刺史諡曰孝景僧洗字湛輝封爰德縣公位中書監侍中改封濮陽郡公僧洗自永安後廢棄不預朝政天平四年薨詔給東園祕器贈太師太尉公録尚書事雍州刺史諡曰孝真長子寧字惠歸襲國珍先爵改為臨涇伯後進為公歷岐涇二州刺史卒諡曰孝穆女為清河王亶妃生孝靜皇帝武定初贈太師太尉公録尚書事諡曰孝昭子虔字僧敬元義之廢靈太后虔時為千牛備身與備身張車渠等謀義事發義殺車渠等虔坐逺徙靈太后反政徵為吏部郎中太后好以家人禮與親族宴戲虔嘗致諫由是後宴謔多不預焉出為涇州刺史封安陽縣侯興和三年以帝元舅超遷司空公薨贈太傅太尉公尚書僕射徐州刺史諡曰宣葬日百官會葬乘輿送於郭外子長粲仕齊纍遷章武太守為政清靜頗得民和除兼并省尚書左丞當官正色無所回避尚書左僕射趙彥深密勿樞要中書舍人裴澤便蕃左右以殿門受拜皆彈紏之彥深等頗有恨言長粲不以介意後主踐阼長粲被勑與黃門馮子琮出入禁中專典敷奏武成還鄴後主在晉陽長粲仍受委留後後主從武成還鄴仍勑在亰省判度支尚書監議五禮武成崩與領軍婁定逺録尚書趙彥深左僕射和士開高文遙領軍綦連猛高阿那肱僕射唐雍同知朝政時人號為八貴於後定逺文遙並出唐雍專典外兵綦連猛阿那肱别總武任長粲常在左右兼宣詔令從幸晉陽後主富於春秋庶事皆相歸委長粲盡心毗奉甚得名譽又正為侍中丁母憂給假馳驛奔喪尋有詔起復前任隴東王長仁心欲入處機要之地為執政不許長仁疑長粲通謀大以為恨遂言於太后發其陰私請出為州太后為言於後主後主不得已從焉除趙州刺史及辭長粲眷戀流涕後主亦憫然慰勉之至州存心政事為吏民所懷因沐髮手不得舉失瘖卒後主聞而傷悼在朝文武嗟嘆咸惜之贈司空公尚書左僕射瀛州刺史諡文貞公長粲性溫雅在官清潔但始居要密便為子叔泉取清河崔德儉女為妻在晉陽處分用妻弟王逖與德儉對為司徒主簿時論以此譏之又性好內有一侍婢其妻王驕妬手刺殺之為此忿恨數年不相見親表為之語曰自我不見于今三年後納妾李氏又與王别宅亦無朝拜之禮嫠婦公孫氏已殺三夫長粲不信強取之令與李氏同住未期而亡子仲操位陳留太守次叔泉通直散騎侍即先是望氣者上言太白食昴法當大赦和士開奏聞詔降罪人以應之尚書左僕射徐之才諳練往事語士開曰天埀象見吉凶有成災者有不成災者案昴趙分或可趙地有災古者王侯各在封邑故分野有災當其君長今吾等虛名竟不之國刺史專令一境善惡所歸比來多以刺史為驗未幾而長粲死焉寧弟盛字歸興位左衛將軍賜爵江陽男歷幽瀛二州刺史為政清靜民吏懷之轉冀州刺史卒贈司徒公録尚書事定州刺史追封陽平郡公諡曰懿穆眀帝後納其女為皇太后舅皇甫集妻集字元會一字文都安定朝那人封涇陽縣公位儀同三司雍州刺史右衛大將軍贈侍中司空公諡曰靜集弟度字文亮封安縣公纍遷尚書左僕射領左衛將軍度頑蔽每與人言自稱僕射時人方之毛嘉正光初元義出之為都督瀛州刺史度不願出頻表固辭乃除右光祿大夫孝昌元年為司空領軍將軍加侍中元義之見出也恐朝夕誅滅度與妻陳氏多納其貨為之左右度無子養兄集子子熙為子子熙嫂趙郡太守裴他女他還亰師度問他外何消息他曰行路所聞唯道明公多取元義金帛逺近無不慨歎公宜戮此罪人以謝天下陳氏聞而惡之又攝吏部事遷司徒兼尚書令不拜尋轉太尉孜孜營利老而彌甚遷授之際皆自請乞靈太后知其無用以舅氏難違之然所歷官最為貪蠧爾朱榮入洛西奔兄子華州刺史雍尋與雍為人所殺楊騰𢎞農人文帝之舅也父貴琅邪郡守封華隂男騰妹為亰兆王愈妃故騰得處貴遊景明初襲爵後為襄城太守甚有聲稱文帝即位位開府儀同三司出鎮河東薨贈司空雍州刺史諡曰貞襄子盛乙弗繪河南洛陽人文帝皇后之兄也文帝即位開府儀同三司侍中中書監魏昌縣公又為吏部尚書北齊趙猛太安狄郍人也姊為文穆皇帝繼室生趙郡公琛猛性方直頗有器幹齊神武舉義以預義勳封信都縣伯纍遷南營州刺史卒贈司空公胡長仁字孝隆安定臨涇人武成皇后長兄也父延之魏中書令兗州刺史太寧中贈司空公長仁以內戚歷位尚書左僕射尚書令及武成崩參預朝政封隴東郡王左丞酈孝裕郎中陸仁惠盧元亮厚相結託長仁每上省孝裕必方駕而來省務既繁簿案堆積令史欲咨郡坐者日有百數孝裕屏人私請朝退亦相隨仁惠元亮又伺間而往停斷公事人號為三佞長仁私遊友密處處追尋孝裕勸其求進和士開深疾之於是除孝裕為章武郡守元亮為淮南郡守仁惠為幽州長史孝裕又説長仁曰王陽卧疾和士開必來王因而殺之入見太后不過百日失官便代其處士開知其謀更徙孝裕為北營州建德郡守長仁每干執事求為領軍將相文武以主上富於春秋母后家不可專政故抑而不許以本官攝選長仁性好威福意猶未盡先是尚書胡長粲奏事內省長仁疑粲間已苦請太后出之天統五年從駕自并還鄴夜發滏口帝以夜漏尚早停於路傍長仁後來謂是從行諸貴遂遣門客程牙馳驛呼問帝遣中尚食陳德信問是何人牙不答而走帝命左右追射之既而捉獲因令壯士撲之決馬鞭二百牙一宿便死士開因此遂令德信列長仁倚親驕豪無畏憚由是除齊州刺史及辭於昭陽列仗引見長仁不敢發語唯泣涕橫流到任啓求暫歸所司不為奏長仁怨憤謀令冀州人李揩牆刺和士開其弟長咸告之士開密與祖孝徵議之孝徵引漢文帝殺薄昭為故事於是勑遣張固劉桃枝馳驛詣齊州責長仁謀害宰輔遂賜死先是太白食昴占者曰昴為趙分不利胡王長仁未幾死長仁性好歌舞飲酒至數斗不亂自至齊州每進酒後必長歎歔欷流涕不自勝左右莫不怪之尋而後主納長仁女為后重加贈長仁子君璧襲爵隴東王君璧弟君璋及長仁弟長雍等前後七人並賜爵合門貴盛后廢後稍稍黜退焉隋高祖外家吕氏其族蓋微平齊之後求訪不知所在至開皇初濟南郡上言有男子吕永吉自稱有姑字苦桃嫁為楊忠妻勘驗知是舅子始追贈外祖雙周為上柱國太尉八州諸軍事青州刺史封齊郡公諡曰敬外祖母姚氏為齊敬公夫人詔並改葬於齊州立廟置守冡以永吉襲爵留在亰師及大業中授上黨郡太守性識庸劣職務不理後去官不知所終永吉後父道貴性尤頑騃言詞陋鄙初自鄉里徵入長安上見之悲泣道貴略無戚容但連呼帝名云種未定不可偷大似苦桃姊後以數犯忌諱動致違忤上甚耻之乃命高頴厚加供給不許接對朝士拜上儀同出為濟南太守令即之任斷其入朝道貴還至本郡頗自崇重每與人言自稱皇舅數將儀衛出入閭里從故人遊宴庶僚咸苦之後郡廢終于家子孫無聞焉獨孤羅字羅仁雲中人也其先為部落大人父信周大宗伯衛國公自有傳初信隨魏孝武入關中羅遂為高氏所囚及信為宇文護所誅羅始見釋寓居中山孤貧無以自給齊將獨孤永業以宗族故哀之為買田宅遺以資蓄信入關後復娶二妻郭氏生子六人善穆藏順陀整崔氏生高祖獻皇后及齊亡高祖為定州總管獻皇后遣人求羅得之相見悲不自勝侍御者皆泣於是厚遺車馬財物未幾周武帝以羅功臣子久淪異域徵拜楚安郡太守以疾去官歸亰師諸弟見羅少長貧賤每輕侮不以兄禮事之羅性長者亦不與諸弟校競長短后由是重之高帝為丞相拜羅儀同嘗置左右既受禪詔追贈羅父其諸弟以羅母沒齊先無夫人號不當承襲上以問后后曰羅誠嫡長不可誣也於是襲爵趙國公以其弟善為河內郡公穆為金泉縣公藏為虎牢縣公陀為武喜縣公整為千牛備身擢拜羅為左領將軍遷左衛將軍前後賞賜不可勝計出為涼州總管進位上柱國徵拜左武衛大將軍煬帝嗣位改封蜀國公未幾卒官諡曰恭子纂嗣位河陽都尉纂弟武都大業末為河陽都尉庶長子開逺宇文化及之弒逆也裴虔通率賊入成象殿宿衛兵士皆從逆開逺時為千牛與獨孤盛力戰閣下為賊所執賊義而捨之善字伏陀幼聰慧善騎射以父勳封魏寧縣公魏廢帝元年又以父勳授驃騎大將軍開府儀同三司加侍中進爵長城郡公周孝閔帝踐阼除河州刺史以父負釁久廢於家保定三年乃授龍州刺史天和六年襲爵河內郡公從帝東征以功授上開府尋除兗州刺史政在簡惠百姓安之卒於州贈使持節柱國五州諸軍事定州刺史子覽嗣位右候衛大將軍大業末卒陀字黎邪仕周胥附上士坐父徙蜀十餘年宇文護誅始歸長安其外祖母高氏先事貓鬼已殺其舅郭沙羅因轉入其家上微聞而不信會獻皇后及楊素妻鄭氏俱有疾召醫視之皆曰此貓鬼疾上以陀后之異母弟陀妻楊素之異母妹由是意陀所為陰令其兄左監門郎將穆以情喻之上又遣左右諷陀陀言無有上不悅左轉遷州刺史出怨言上令左僕射高熲納言蘇威大理正皇甫孝緒大理丞楊逺等雜按之陀婢徐阿尼言本從陀母家來常事貓鬼每以子日夜祀之言子者鼠也其貓鬼每殺人所死家財物潛移於畜貓鬼家陀嘗從家中索酒其妻曰無錢可酤陀因謂阿尼曰可令貓鬼向越公家使我足錢阿尼便呪之居數日貓鬼向素家後上初從并州還陀於園中謂阿尼曰可令貓鬼向皇后所使多賜吾物阿尼復呪之遂入宫中楊逺乃於門下外省遣阿尼呼貓鬼阿尼於是夜中置香粥一盆以匙扣而呼曰貓女可來無往宫中久之阿尼色正青若被牽拽者云貓鬼已至上以其事下公卿奇章公牛𢎞曰祅由人興殺其人可以絶矣上令犢車載陀夫妻將賜死於其家陀弟司勳侍中整詣闕求哀於是免陀死除名以其妻楊氏為尼先是有人訟其母為人貓鬼所殺者上以為祅妄怒而遣之及此詔誅被訟行貓鬼家陀未幾而卒煬帝即位追念舅氏聼以禮葬乃下詔贈正議大夫帝意猶不已復贈銀青光祿大夫二子延福延壽陀弟整位幽州刺史大業初贈金紫光祿大夫平鄉侯通志卷一百六十五
