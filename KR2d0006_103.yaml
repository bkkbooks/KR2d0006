body:
  text: 通志卷九十一宋右迪功郎鄭樵漁仲撰烈傳第四春秋鄭祭足公子騑公孫舍之罕虎公孫僑遊吉燭之武衛石碏石祁子孔達孔悝孫良夫寧速北宫他蘧瑗寧俞史鰌孫林父寧喜宋公子目夷向戌樂喜華元華費遂秦百里孟眀視鄭祭足字仲足鄭大夫也其先為祭封人因以為氏鄭武公娶於申曰武薑生莊公及共叔段莊公寤生驚薑氏遂惡之愛共叔段欲立之亟請於武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑唯命請京使居之謂之京城太叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰薑氏欲之焉辟害對曰薑氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可圖况君之寵弟乎不聽既而太叔將襲鄭莊公伐之逐諸鄢而克之莊公二十四年祭足帥師取溫之麥既又取成周之禾二十六年衛人以燕師伐鄭祭足原繁泄駕以三軍軍其前使曼伯與子元潛軍軍其後燕人畏鄭三軍而不虞制人鄭以制人敗燕師于北制三十七年王以諸侯伐鄭祭足從鄭伯敗王師于繻葛祝聃射王中肩鄭伯使祭足勞王於軍且問左右初祭仲有寵於莊公莊公使為卿為公娶鄧曼生昭公故祭仲欲立之宋雍氏女於莊公曰雍姞生厲公雍氏宗有寵於宋四十三年夏莊公卒昭公立宋人誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之秋九月丁亥昭公奔衛己亥祭仲立厲公厲公立四年祭仲専公患之使其壻雍紏殺之將享諸郊雍姬知之謂其母曰父與夫孰親母曰人盡夫也父一而已遂告祭仲曰雍氏舍其室而將享子於郊吾惑之以告祭仲殺雍紏尸諸周氏之汪是以厲公懼奔蔡而昭公復歸于鄭初鄭伯將以高渠彌為卿昭公惡之固諫不聽昭公立渠彌懼誅弒昭公而立子亹眀年齊侯會于首止子亹會之高渠彌相秋七月戊戌齊人殺子亹而轘高渠彌是行也祭仲知之故稱疾不往祭仲卒逆鄭子儀於陳而立之鄭昭公之為太子也嘗有功于齊齊侯請妻之昭公固辭祭仲曰必取之君多內寵子無大援將不立三公子皆君也弗聽是以及此終如祭仲之言公子騑字子駟穆公子也初成公如晉晉以鄭二於楚也執公公子班立公子繻為君鄭人殺繻立成公太子髠頑子班奔許既而晉人歸成公成公七年子班自訾求入于太宫不能殺子印子羽反軍于市子駟帥國人盟于太宫遂從而盡焚之殺子如子駹孫叔孫知十四年公疾子駟請息肩於晉公曰楚君以鄭故親集矢於其目非異人任寡人也若背之是棄力與言其誰昵我免寡人惟二三子已而公薨於是子罕當國子駟為政晉師侵鄭諸大夫欲從晉子駟曰官命未改不可違也從之僖公之為太子也於成公之十年與子罕適晉不禮焉又與子豐適楚亦不禮焉既立而朝于晉子豐欲訴諸晉而廢之子罕止之及將會于鄬子駟相又不禮焉侍者諫不聽又諫殺之及鄵子駟使賊夜弒僖公而以瘧疾赴于諸侯簡公生五年子駟奉而立之次年羣公子以僖公之死也謀子駟子駟先之辟殺子狐子熙子侯子丁孫擊孫惡出奔衛二年子國侵蔡有功楚子囊伐鄭討侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰周詩有之曰俟河之清人夀幾何兆云詢多職競作羅謀之多族民之多違事滋無成民急矣姑從楚以紓吾民晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待於二竟以待強者而庇民焉寇不為害民不罷病不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五會之信今將背之雖楚救我將安用之親我無成鄙我是欲不可從也不如待晉晉君方眀四軍無闕八卿和睦必不棄鄭楚師遼逺糧食將盡必將速歸又何患焉舍之聞之杖莫如信完守以老楚杖信以待晉不亦可乎子駟曰詩云謀夫孔多是用不集發言盈庭誰敢執其咎請從楚騑也受其咎乃及楚平使王子伯駢告于晉曰君命敝邑修而車賦警而師徒以討亂略蔡人不從敝邑之人不敢寧處悉索敝賦以討于蔡獲司馬燮獻于邢邱今楚來討曰女何故稱兵于蔡焚我郊鄙馮陵我城郭敝邑之衆夫婦男女不遑啓處以相救也翦焉傾覆無所控告民死亡者非其父兄即其子弟夫人愁痛不知所庇民知窮困而受盟于楚孤也與其二三臣不能禁止不敢不告三年晉知武子以諸侯之師圍鄭子駟行成同盟于戲將盟子駟及公子發公子嘉公孫輒公孫蠆公孫舍之及其大夫門子皆從鄭伯晉士莊子為載書曰自今日既盟之後鄭國而不惟晉命是聽而或有異志者有如此盟公子騑趨進曰天禍鄭國使介居二大國之間大國不加德音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不惟有禮與強可以庇民者是從而敢有異志亦如之冬楚子伐鄭子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯強是從今楚師至晉不我救則楚強矣盟誓之言豈敢背之且要盟無質神弗臨也所臨唯信信者言之瑞也善之主也是故臨之眀神不蠲要盟背之可也乃及楚平初子駟與尉止有爭將禦諸侯之師而黜其車尉止獲又與之爭子駟抑尉止曰爾車非禮也遂弗使獻子駟又嘗為田洫司氏堵氏侯氏子師氏皆喪田焉簡公三年五族羣聚不逞之人因公子之徒以作亂於是子駟當國子國為司馬子耳為司空子孔為司徒尉止司城侯晉堵女父子師僕帥賊以入晨攻執政于西宫之朝殺子駟子國子耳劫公以如北宫子孔知之故不死子駟之子曰子西公孫舍之字子展成公之孫子罕之子也簡公三年楚伐宋衛侯救宋師于襄牛子展曰必伐衛不然是不與楚也得罪於晉又得罪於楚國將若何子駟曰國病矣子展曰得罪於二大國必亡病猶不愈於亡乎諸大夫皆以為然故使皇耳帥師侵衛於是晉侵鄭鄭既患晉楚諸大夫曰不從晉國幾亡楚弱於晉晉不吾疾也晉疾楚將辟之何為而使晉師致死於我楚弗敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚不能也吾乃固與晉大夫皆説之使疆場之司惡於宋宋向戍侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告於楚楚師至吾又與之盟而重賂晉師乃免矣於是子展侵宋諸侯伐鄭乃與晉行成楚子囊將以秦師伐鄭公逆之更伐宋諸侯悉師以伐鄭觀兵于東門鄭復行成晉趙武入而與公盟子展出盟晉侯初子駟之遇害也子孔代當國政子孔専欲去諸大夫十一年子孔將叛晉而起楚師以去之使告子庚子庚弗許楚子聞之使揚豚尹宜告子庚故子庚治兵於汾子孔使子蟜伯有子張從公伐齊子孔子展子西守子展知子孔之謀完守入保子孔不敢會楚師故子庚伐鄭門于純門信于城下而還國人患子孔十二年乃討西宫之難與純門之師子孔當罪以其甲及子革子良氏之甲守子展子西率國人伐之殺子孔而分其室子然子孔宋子之子也士子孔圭媯之子也圭媯之班亞宋子而相親也士子孔亦相親也僖之四年子然卒簡之元年士子孔卒司徒孔實相子革子良之室三室如一故及於難子革子良出奔楚楚以子革為右尹鄭人使子展當國子西聽政立子産為卿十五年遊眅如晉未出竟遭逆妻者奪之以館于邑已而其夫攻子眀殺之以其妻行子展廢其子良而立太叔曰國卿君之二也民之主也不可以茍請舍子眀之類求亡妻者使復其所使遊氏勿怨曰無昭惡也十七年陳侯會楚子伐鄭當陳隧者井堙木刋眀年子展及子産帥車七百乘伐陳宵突陳城遂入之陳侯扶其太子偃師奔墓遇司馬桓子曰載余曰將巡城遇賈獲載其母妻下之而授公車子展命師無入公宫與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社使其衆男女别而纍以待於朝子展執縶而見再拜稽首承飲而進獻子産入數俘而出祝祓社司徒致民司馬致節司空致地乃還使子産獻捷于晉冬子展子産如晉拜陳之功二十二年子展卒罕虎字子皮子展之子也以王父字為氏子展卒子皮嗣為卿於是鄭飢而未及麥民病子皮以子展之命餼國人粟户一鐘是以得鄭國之民故罕氏常掌國政為上卿宋司城子罕聞之曰鄰於善民之望也子皮外寬內眀好善而能擇故於國最愛子産時國多大族其黨不一有欲害子産者子皮嘗抑之子産欲行則子皮止之子皮為政事無大小聽子産而後行二十三年授子産政辭曰國小而逼族大寵多不可為也子皮曰虎帥以聽誰敢犯子子善相之國無小小能事大國乃寬鄭介於大國自厲公已來晉楚爭盟鄭無日不受其師及子産為政慎之以禮重之以辭非義不動非信不言不茍於利凡有所為必要其終以是諸侯多親之民靜國安子皮之由也二十九年子皮如齊娶於子尾氏晏子驟見之陳桓子問其故對曰能用善人民之主也子皮卒子産歸自晉未至聞之哭且曰吾已矣無為為善矣唯夫子知我者也公孫僑字子産穆公之孫而子國之子也釐公初立子國為司馬居亞卿之位簡公元年鄭人欲媚于晉子國子耳侵蔡獲蔡司馬公子燮鄭人皆喜惟子産不順曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉將為戮矣二年盜殺子駟子國子耳子西聞盜不警而出尸而追盜盜入于北宫乃歸授甲臣妾多逃器用多喪子産聞盜為門者庀羣司閉府庫慎閉藏完守備成列而後出兵車十七乘尸而攻盜於北宫子蟜帥國人助之殺尉止子師僕盜衆盡死侯晉奔晉堵女父司臣尉翩司齊奔宋子孔當國為載書以位序聽政辟大夫諸司門子不順將誅之子産止之請焚書子孔不可曰為書以定國衆怒而焚之是衆為政也國不亦難乎子産曰衆怒難犯専欲難成合二難以安國危之道也不如焚書以安衆子得所欲衆亦得安不亦可乎専欲無成犯衆興禍子必從之乃焚書於倉門之外衆而後定十二年子産為卿十五年晉人來徴朝子産對曰在晉先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝于執事執事不禮於寡君寡君懼因是行也我二年六月朝于楚晉以是有戲之役楚人猶競而申禮於敝邑敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢携二於楚我四年三月先大夫子蟜又從寡君以觀釁於楚晉於是乎有蕭魚之役謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池楚亦不競寡君盡其土實重之以宗器以受齊盟遂帥羣臣隨于執事以會嵗終二于楚者子侯石盂歸而討之溴梁之眀年子蟜老矣公孫夏從寡君以朝于君見於嘗酎與執燔焉間二年聞君將靖東夏四月又朝以聽事期不朝之間無嵗不聘無役不從以大國政令之無常國家罷病不虞荐至無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉若不恤其患而以為口實其無乃不堪任命而翦為仇讐敝邑是懼其敢忘君命委諸執事執事實重圖之范宣子為政諸侯之幣重鄭人患之十七年公如晉子産寓書於子西以告宣子曰子為晉國四鄰諸侯不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚於公室則諸侯二若吾子賴之則晉國二諸侯二則晉國壞晉國二則子之家壞何沒沒也將焉用賄夫令名德之輿也德國家之基也有基無壞無亦是務乎有德則樂樂則能久詩云樂只君子邦家之基有令德也夫上帝臨女無二爾心有令名也夫恕思以眀德則令名載而行之是以逺至邇安毋寧使人謂子子實生我而謂子浚我以生乎象有齒以焚其身賄也宣子説乃輕幣子展伐陳有功還使子産獻捷于晉戎服將事晉人問陳之罪對曰昔虞閼父為周陶正以服事我先王我先王賴其利器用也與其神眀之後也庸以元女太姬配胡公而封諸陳以備三恪則我周之自出至於今是賴桓公之亂蔡人欲立其出我先君莊公奉五父而立之蔡人殺之我又與蔡人奉戴厲公至於壯宣皆我之自立夏氏之亂成公播蕩又我之自入君所知也今陳忘周之大德蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而耻大姬天誘其衷啓敝邑心陳知其罪授手于我用敢獻功晉人曰何故侵小對曰先王之命唯罪所在各致其辟且昔天子之地一圻列國一同自是以衰今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士城濮之役文公布命曰各復舊職命我文公戎服輔王以授楚捷不敢廢王命故也士莊伯不能詰復於趙文子文子曰其辭順犯順不祥乃受之晉程鄭之死也然眀豫知之及卒子産始知然眀問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子太叔曰他日吾見蔑之面而已今吾見其心矣子太叔問政於子産子産曰政如農功日夜思之思其始以成其終朝夕而行之行無越思如農之有畔其過鮮矣簡公賞入陳之功享子展賜之先路三命之服先八邑賜子産次路再命之服先六邑子産辭邑曰自上以下降殺以兩禮也臣之位在四且子展之功也臣不敢及賞禮請辭邑公固與之乃受三邑公孫揮曰子産其將知政矣讓不失禮楚子及秦人侵鄭印堇父與皇頡戍城麇楚人囚之以獻於秦鄭人取貨於印氏以請之子太叔為令正以為請子産曰不獲受楚之功而取貨於鄭秦不其然若曰拜君之勤鄭國微君之惠楚師其猶在敝邑之城下其可弗從遂行秦人不豫更幣從子産而後獲之許靈公如楚請伐鄭曰師不興孤不歸矣卒于楚楚子曰不伐鄭何以求諸侯遂伐鄭鄭人將禦之子産曰晉楚將平諸侯將和楚王是故昧於一來不如使逞而歸乃易成也夫小人之性釁於勇嗇於禍以足其性而求名焉者非國家之利也若何從之子展説不禦寇於是楚師入于南里墮其城涉於樂氏門于師之梁縣門發獲九人焉涉于汜而歸而後葬許靈公蔡侯歸自晉入于鄭鄭伯享之不敬子産曰蔡侯其不免乎日其過此也君使子展迋往也于况反勞于東門之外而傲吾曰猶將更之今受享而惰乃其心也君小國事大國而惰傲以為己心將得死乎若不免必由其子其為君也淫而不父僑聞之如是者必有子禍二十一年子産相公如楚舍不為壇外僕言曰昔先大夫相先君適四國未嘗不為壇自是至今亦皆循之今子草舍無乃不可乎子産曰大適小則為壇小適大茍舍而已焉用壇僑聞之大適小有五美宥其罪戾赦其過失救其災患賞其德刑教其不及小國不困懷服如歸是故為壇以昭其功宣告後人無怠於德小適大有五惡説其罪戾請其不足行其政事共其職貢從其時命不然則重其幣帛以賀其福而弔其凶皆小國之禍也焉用作壇以昭其禍所以告子孫無昭禍焉可也二十三年復相公如晉叔向問鄭國之政焉對曰吾得見與否在此嵗也駟良方爭未知所成若有所成吾得見乃可知也叔向曰不既和矣乎對曰伯有侈而愎子晳好在人上莫能相下雖其和也猶有積惡也惡至無日矣六月如陳蒞盟歸復命告大夫曰陳亡國不可與聚禾粟繕城郭恃此二者而不撫其民其君弱植公子侈太子卑大夫敖政多門以介於大國能無亡乎不過十年矣伯有耆酒飲於窟室朝至未巳既而朝則又將使子晳如楚歸而飲酒子晳以駟氏之甲伐而焚之伯有奔許大夫聚謀子皮曰仲虺之志云亂者取之亡者侮之推亡固存國之利也罕駟豐同生伯有汰侈故不免人謂子産就直助強子産曰豈為我徒國之禍難誰知所敝能主強直難乃不生姑成吾所乃斂伯有氏之死者而殯之不及謀而遂行子皮止之衆曰人不我順何止焉子皮曰夫子禮於死者况生者乎遂自止之子産入於是公與其大夫及國人盟伯有怒鄭人之盟已也自墓門之瀆入因馬師頡介于襄庫以伐舊北門駟帶率國人以伐之皆召子産子産曰兄弟而及此吾從天所與伯有死于羊肆子産襚之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬之斗城子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止子皮既授子産政有事伯石子産賂之邑子太叔曰國皆其國也奚獨賂焉子産曰無欲實難皆得其欲以從其事而要其成非我有成其在人乎何愛於邑邑將焉往子太叔曰若四國何子産曰非相違也而相從也四國何尤焉鄭書有之曰安定國家必大焉先姑先安大以待其所歸既伯石懼而歸邑卒與之伯有既死使太史命伯石為卿辭太史退則請命焉復命之又辭如是三乃受策入拜子産以是惡其為人也使次己位子産為政使都鄙有章上下有服田有封洫廬井有伍大夫之忠儉者從而與之泰侈者因而斃之豐卷將祭請田焉弗許曰唯君用鮮衆給而已豐卷怒退而徴役子産奔晉子皮止之而逐豐卷豐卷奔晉子産請其田里三年而復之反其田里及其入焉從政一年輿人誦之曰取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之二十四年六月子産相公如晉晉侯以魯喪故未之見也子産使盡壞其館之垣而納車馬焉士文伯讓之曰敝邑以政刑之不修寇盜充斥無若諸侯之屬辱在寡君者何以是令吏人完客所館髙其閈閎厚其牆垣以無憂客使今吾子壞之雖從者能戒其若異客何以敝邑之為盟主繕完葺牆以待賔客若皆毁之其何以共命寡君使丐請命對曰以敝邑褊小介於大國誅求無時是以不敢寧居悉索敝賦以來會時事逢執事之不間而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也其暴露則恐燥濕之不時而朽蠹以重敝邑之罪僑聞文公之為盟主也宫室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廄繕修司空以時平易道路圬人以時塓塓莫歷反館宫室諸侯賔至甸設庭燎僕人巡宫車馬有所賔從有代巾車脂轄隸人牧圉各瞻其事百官之屬各展其物公不留賔而亦無廢事憂樂同之事則巡之教其不知而恤其不足賔至如歸無寧災患不畏寇盜而亦不患燥濕今銅鞮之宫數里而諸侯舍於隸人門不容車而不可踰越盜賊公行而夭厲不戒賔見無時命不可知若又勿壞是無所藏幣以重罪也敢請執事將何所命之雖君之有魯喪亦敝邑之憂也若獲薦幣修垣而行君之惠也敢憚勤勞文伯復命趙文子曰信我實不德而以隸人之垣以贏諸侯是吾罪也使士文伯謝不敏焉晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館叔向曰辭之不可已也如是夫子産有辭諸侯賴之若之何其釋辭也鄭人遊于鄉校以論執政然眀謂子産曰毁鄉校如何子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨未聞作威以防怨豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道不如吾聞而藥之也然眀曰蔑也今而後知吾子之信可事也小人實不才若果行此其鄭國實賴之豈惟二三臣仲尼聞之曰人謂子産不仁吾不信也子皮欲使尹何為邑子産曰少未知可否子皮曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣子産曰不可人之愛人也求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛於子子於鄭國棟也棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲子皮曰善哉虎不敏吾聞君子務知大者逺者小人務知小者近者我小人也衣服附在吾身我知而慎之大官大邑所以庇身也我逺而慢之微子之言吾不知也他日我曰子為鄭國我為吾家以庇焉其可也今而後知不足自今請雖吾家聽子而行子産曰人心之不同如其面焉吾豈敢謂子面如吾面乎抑心所謂危亦以告也子皮以為忠故委政焉子産是以能為鄭國二十五年楚公子圍來聘且娶於公孫假氏伍舉為介將入館鄭人惡之使行人子羽與之言乃館於外既聘將以衆逆子産患之使子羽辭曰以敝邑褊小不足以容從者請墠聽命令尹命太宰伯州犂對曰君辱貺寡大夫圍謂圍將使豐氏撫有而室圍布几筵告於莊共之廟而來若野賜之是委君貺於草莽也是寡大夫不得列於諸卿也不寧唯是又使圍蒙其先君將不得為寡君老其蔑以復矣唯大夫圖之子羽曰小國無罪恃實其罪將恃大國之安靖已而無乃包藏禍心以圖之小國失恃而懲諸侯使莫不憾者距違君命而有所壅塞不行是懼不然敝邑館人之屬也其敢愛豐氏之祧伍舉知其有備也請垂櫜而入許之徐吾犯之妹美公孫楚聘之矣公孫黑又使強委禽焉犯懼告子産子産曰是國無政非子之患也唯所欲與犯請於二子使女擇焉皆許之子晳盛飾而入布幣而出子南戎服而入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也夫夫婦婦所謂順也適子南氏子晳怒既而櫜甲以見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈子晳傷而歸告大夫曰我好見之不虞其有異志也故傷大夫皆謀之子産曰直鈞幼賤有罪罪在楚也乃執子南而數之曰國之大節有五女皆姦之畏君之威聽其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉不畏威也姦國之紀不聽政也子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忌不事長也兵其從兄不養親也君曰余不女忍殺宥女以逺勉速行乎無重而罪遂放之於吳為遊楚亂故六月丁巳公及其大夫盟于公孫假氏罕虎公孫僑公孫假印假遊吉駟帶私盟于閨門之外實薰隧公孫黑強與於盟使太史書其名且曰七子子産弗討晉侯有疾公使子産如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈音審臺駘為祟史莫之知敢問何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷閼伯于商邱主辰商人是因故辰為商星遷實沈于大夏主參唐人是因以服事夏商其季世曰唐叔虞當武王邑薑方震大叔夢帝謂已余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封太叔焉故參為晉星由是觀之則實沈參神也昔金天氏有裔子曰昧為元冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處太原帝用嘉之封諸汾川沈姒蓐黃實守其祀今晉主汾而滅之矣由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之災於是乎禜音泳之日月星辰之神則雪霜風雨之不時於是乎禜之若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以聽政晝以訪問夕以修令夜以安身於是乎節宣其氣勿使壅閉湫底以露其體兹心不爽而昏亂百度今無乃一之則生疾矣僑又聞之內官不及同姓其生不殖美先盡矣則相生疾君子是以惡之故志曰買妾不知其姓則卜之違此二者古之所慎也男女辨姓禮之大司也今君內實有四姬焉其無乃是乎若由是二者弗可為也已四姬有省猶可無則必生疾矣叔向曰善哉肸未之聞也此皆然矣晉侯聞子産之言曰博物君子也重賄之秋楚公子圍使公子黑肱伯州犂城犫櫟郟鄭人懼子産曰不害令尹將行大事而先除二子也禍不及鄭何患焉冬公子圍弒其君自立是為靈王鄭遊吉如楚聘歸謂子産曰具行器矣楚王汰侈而自説其事必合諸侯吾往無日矣子産曰不數年未能也公孫黑將作亂欲去遊氏而代其位傷疾作而不果駟氏與諸大夫欲殺之子産在鄙聞之懼弗及乘遽而至使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不女堪専伐伯有而罪一也昆季爭室而罪二也薰隧之盟女矯君位而罪三也有死罪三何以堪之不速死大刑將至再拜稽首辭曰死在朝夕無助天為虐子産曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎請以印為褚師子産曰印也才君將任之不才將朝夕從女女罪之不恤而又何請焉不速死司寇將至乃縊於周氏之衢加木焉二十七年公如楚子産相楚子享之賦吉日既享子産乃具田備王以田江南之夢楚子將求諸侯問於子産曰晉其許我乎對曰許君晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君將焉用之王曰諸侯其來乎對曰必來從宋之盟承君之歡不畏大國何故不來不來者其魯衛曺邾乎曹畏宋邾畏魯魯衛逼於齊而親於晉唯是不來其餘君之所及也誰敢不至王曰然則吾所求者無不可乎對曰求逞於人不可與人同欲盡濟已而諸侯如楚曺邾辭以難衛辭以疾魯辭以時祭子産作邱賦國人謗之曰其父死於路已為蠆尾以令於國國將若何子寬以告子産曰何害茍利社稷死生以之且吾聞為善者不改其度故能有濟也民不可逞度不可改詩曰禮義不愆何恤於人言吾不遷矣子産聘於晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走羣望有加而無瘳今夢黃熊入於寢門其何厲鬼也對曰以君之眀子為大政其何厲之有昔堯殛鯀于羽山其神化為黃熊以入于羽淵實為夏郊三代祀之晉為盟主其或者未之祀也乎韓子祀夏郊晉侯有間賜子産莒之二方鼎公孫假既死子産為豐施歸州田於韓宣子曰日君以夫公孫假為能任其事而賜之州田今無祿早世不獲久享君德其子弗敢有不敢以聞於君私致諸子宣子辭子産曰古人有言曰其父析薪其子弗克負荷施將懼不能任其先人之祿其况能任大國之賜縱吾子為政而可後之人若屬有疆場之言敝邑獲戾而豐氏受其大討吾子取州是免敝邑於戾而建置豐氏也敢以為請宣子受之鄭人相驚以伯有曰伯有至矣則皆走不知所往初或夢伯有介而行曰壬子余將殺帶也眀年壬寅余將殺假也及壬子駟帶卒國人益懼壬寅公孫假卒國人愈懼其眀月子産立公孫泄及良止以撫之乃止子太叔問其故子産曰鬼有所歸乃不為厲吾為之歸也子太叔曰公孫泄何為子産曰説也為身無義而圖説從政有所反之以取媚也不媚不信不信民不從也及子産適晉趙景子問焉曰伯有能為鬼乎子産曰能人生始化曰魄既生魄陽曰魂用物精多則魂魄強是以有精爽而至於神眀匹夫匹婦強死其魂魄猶能馮依於人以為淫厲况良霄我先君穆公之胄子良之孫子耳之子敝邑之卿從政三世矣鄭雖無腆抑諺曰蕞爾國而三世執其政柄其用物也𢎞矣其取精也多矣其族又大所馮厚矣而強死能為鬼不亦宜乎子皮之族飲酒無度故馬師氏與子皮氏有惡罕朔殺罕魋以奔晉韓宣子問其位於子産子産曰君之羈臣茍得容以逃死何位之敢擇卿違從大夫之位罪人以其罪降古之制也朔於敝邑亞大夫也其官馬師也獲戾而逃惟執政所置之得免其死為惠大矣又敢求位宣子為子産之敏也使從嬖大夫晉之葬平公也諸侯之大夫如晉子皮將以幣行子産曰喪焉用幣用幣必百兩百兩必千人千人至將不行不行必盡用之幾千人而國不亡子皮固請以行既葬諸侯之大夫欲因見新君叔孫昭子曰非禮也弗聽叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見則是重受弔也大夫將若之何皆無辭以見子皮盡用其幣歸謂子羽曰非知之難將在行之夫子知之矣我則不足書曰欲敗度縱敗禮我之謂矣夫子知度與禮矣我實縱欲而不能自克也楚靈王伐蔡晉謀會諸侯以救之子皮將行子産曰行不逺不能救蔡也蔡小而不順楚大而不德天將棄蔡以壅楚盈而罰之蔡必亡矣且喪君而能守者鮮矣三年王其有咎乎美惡周必復王惡周矣三十有六年簡公卒將為葬除及遊氏之廟將毁焉子太叔使其除徒執用以立而無庸毁曰子産過女而問何故不毁乃曰不忍廟也諾將毁矣既如是子産乃使辟之司墓之室有當道者毁之則朝而塴弗毁則日中而塴子太叔請毁之曰無若諸侯之賔何子産曰諸侯之賔能來會吾葬豈憚日中無損於賔而民不害何故不為遂弗毁日中而葬君子謂子産為知禮禮無毁人以自成也晉昭公既立而會諸侯子産子太叔相公以會子産以幄幕九張行子太叔以四十既而悔之每舍損焉及會亦如之平邱之會晉令諸侯日中造于除癸酉退朝子産命外僕速張於除子太叔止之使待眀日及夕子産聞其未張也使速往乃無所張矣及盟子産爭承曰昔天子班貢輕重以列列尊貢重周之制也卑而貢重甸服也鄭伯男也而使從公侯之貢懼弗給也敢以為請諸侯靖兵好以為事行李之命無月不至貢之無藝小國有闕所以得罪也諸侯修盟存小國也貢獻無極亡可待也存亡之制將在今矣自日中以爭至于昏晉人許之既盟子太叔咎之曰諸侯若討其可瀆乎子産曰晉政多門二偷之不暇何暇討國不競亦陵何國之為子産歸未至聞子皮卒哭且曰吾已無為為善矣唯夫子知我仲尼謂子産於是行也足以為國基矣合諸侯藝貢事禮也晉韓起來聘公享之子産戒曰茍有位於朝無有不共恪孔張後至立於客間執政禦之適客後又禦之適縣間客從而笑之事畢富子諫曰夫大國之人不可不慎也幾為之笑而不陵我我皆有禮夫猶鄙我國而無禮何以求榮孔張失位吾子之耻也子産怒曰發命之不衷出令之不信刑之頗纇獄之放紛會朝之不敬使命之不宣取陵於大國罷民而無功罪及而弗知僑之耻也孔張君之昆孫子孔之後也執政之嗣也為嗣大夫承命以使周於諸侯國人所尊諸侯所知立於朝而祀於家有祿於國有賦於軍喪祭有職受脤歸脤其祭在廟已有著位在位數世世守其業而忘其所僑焉得耻之辟音僻邪之人而皆及執政是先王無刑罰也子寧以他規我宣子有環其一在鄭商宣子謁諸公子産弗與曰非官府之守器也寡君不知子太叔子羽謂子産曰韓子亦無幾求晉國亦未可以二晉國韓子不可偷也若屬有讒人交鬬其間鬼神而助之以興其凶怒悔之何及吾子何愛於一環以取憎於大國也盍求而與之子産曰吾非偷晉而有二心將終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令於小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣若韓子奉命以使而求玉焉貪淫甚矣獨非罪乎出一玉以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦鋭乎韓子買諸賈人既成賈矣商人曰必告君大夫韓子請諸子産曰日起請夫環執政弗義不敢復也今買諸商人商人曰必以聞敢以為請子産對曰昔我先君桓公與商人皆出自周庸次比耦以艾殺此地斬之蓬蒿藜藋而共處之世有盟誓以相信也曰爾無我叛我無強賈毋或丐奪爾有利市寶賄我勿與知恃此質誓故能相保以至于今今吾子以好來辱謂敝邑強奪商人是教敝邑背盟誓也毋乃不可乎吾子得玉而失諸侯必不為也若大國令而共無藝鄭鄙邑也亦弗為也僑若獻玉不知所成敢私布之韓子辭玉曰起不敏敢求玉以徼二罪敢辭鄭六卿餞宣子宣子請皆賦以見鄭志既皆賦宣子賦我將子産拜使五卿皆拜曰吾子靖亂敢不拜德宣子私覲於子産以玉與馬曰子命起舍夫玉是賜我玉而免吾死矣敢藉手以拜定公四年鄭大旱使屠擊柷欵豎柎有事於桑山斬其木不雨子産曰有事於山藝山林也而斬其木其罪大矣奪之官邑五年裨竈言於子産曰宋衛陳鄭將同日火若我用瓘斚玉瓚鄭必不火子産弗與既而四國皆火眀年竈復曰鄭又將火請用玉子産竟不與亦不復火語具裨竈傳中鄭之未災也里析告子産曰將有大祥民震動國幾亡吾身泯焉弗良及也國遷其可乎子産曰雖可吾不足以定遷矣及火里析死矣未葬子産使輿三十人遷其柩火作子産辭晉公子公孫于東門使司寇出新客禁舊客勿出於宫使子寬子上巡羣屏攝至于大宫使公孫登徙大龜使祝史徙主祏於周廟告于先君使府人庫人各警其事商成公警司宫出舊宫人置諸火所不及司馬司寇列居火道行火所焮城下之人伍列登城眀日使野司寇各保其徴郊人助祝史除於國北禳火于元冥回祿祁于四鄘書焚室而寬其征與之材三日哭國不市使行人告於諸侯是秋乃大為社祓禳於西方振除火災乃簡兵大搜將為搜除子太叔之廟在道南其寢在道北其庭小過期三日使除徒陳於道南廟北曰子産過女而命速除乃毁於而鄉子産朝過而怒之除者南毁子産及衝使從者止之曰毁於北方火之作也子産授兵登陴子太叔曰晉無乃討乎子産曰吾聞之小國忘守則危况有災乎國之不可小有備故也既晉之邊吏讓曰鄭國有災晉君大夫不敢寧居卜筮走望不愛牲玉鄭之有災寡君之憂也今執事􅏌然授兵登陴將以誰罪邊人恐懼不敢不告子産對曰若吾子之言敝邑之災君之憂也敝邑失政天降之災又懼讒慝之間謀之以啓貪人荐為敝邑不利以重君之憂幸而不亡猶可説也不幸而亡君雖憂之亦無及也鄭有他境望走在晉既事晉矣敢有二心駟偃卒子遊娶於晉大夫生絲弱其父兄立其弟子瑕子産憎其為人也且以為不順弗許亦弗止駟氏聳他日絲以告其舅晉人使以幣如鄭問駟乞之立故駟氏懼駟乞欲逃子産弗遣請龜以卜亦弗豫大夫謀對子産不待而對客曰鄭國不天寡君之二三臣札瘥夭昏今又喪我先大夫偃其子幼弱其一二父兄懼隊宗主私族於謀而立長親寡君與其二三老曰抑天實剝亂是吾何知焉諺曰無過亂門民有亂兵猶憚過之而况敢知天之所亂今大夫將問其故抑寡君實不敢知其誰實知之平邱之會君尋舊盟日無或失職若寡君之二三臣其即世者晉大夫而専制其位是晉之縣鄙也何國之為辭客幣而報其使晉人舍之鄭大水龍鬬于時門之外洧淵國人請為禜焉子産弗許曰我鬬龍不我覿也龍鬬我獨何覿焉禳之則彼其室也吾無求於龍龍亦無求於我乃止八年子産有疾謂子太叔曰我死子必為政唯有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寬難疾數月而卒太叔為政不忍猛而寬鄭國多盜取人於萑苻之澤太叔悔之曰吾早從夫子不及此興徒兵以攻萑苻之盜盡殺之盜少止仲尼曰善哉政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寬也毋縱詭隨以謹無良式遏寇虐慘不畏眀糾之以猛也柔逺能邇以定我王平之以和也又曰不競不絿不剛不柔布政優優百祿是遒和之至也子産之為政擇能而使之馮簡子能斷大事子太叔美秀而文公孫揮能知四國之為而辨於其大夫之族姓班位貴賤能否而又善為辭令裨諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃問四國之為於子羽且使多為辭令與裨諶乘以適野使謀可否而告馮簡子使斷之事成乃授子太叔使行之以應對賔客是以鮮有敗事子産卒孔子聞之出涕曰古之遺愛也其子國參字曰子思子太叔遊吉穆公之胄也穆公生公子偃偃字子遊吉偃之孫也以王父字為氏曰遊吉簡公二十一年公使遊吉如楚及漢楚人還之曰宋之盟君實親辱今吾子來寡君謂吾子姑還吾將使馹奔問於晉而以告子太叔曰宋之盟將利小國而亦使安定其社稷鎮撫其民人以禮承天之休此君之憲令而小國之望也寡君是故使吉奉其皮幣以嵗之不易聘於下執事今執事有命曰女何與政令之有必使而君棄而封守跋涉山川蒙犯霜露以逞君心小國將君是望敢不唯命是聽其毋乃非盟載之言以闕君德而執事有不利焉小國是懼不然其何勞之敢憚子太叔歸復命告子展曰楚子將死矣不修其德而貪昧於諸侯以逞其願欲得久乎易曰迷復凶其楚子之謂乎欲復其願而棄其本復歸無所是謂迷復能無凶乎君其往也送葬而歸以快楚心楚不幾十年未能恤諸侯也吾乃休吾民矣是秋遂如晉告將朝于楚及冬而楚子卒晉平公杞出也故治杞知悼子合諸侯之大夫以城杞子太叔往見衛太叔文子與之語文子曰甚乎其城杞也子太叔曰若之何哉晉國不恤宗周之闕而夏肄是屏其棄諸姬亦可知也已諸姬是棄其誰歸之吉也聞之棄同即異是謂離德詩曰協比其鄰婚姻孔云晉不鄰矣其誰歸之子産治遊楚之罪成放之於吳將行子産咨於太叔太叔曰吉不能亢身焉能亢宗彼國政也非私難也子圖鄭國利則行之又何疑焉周公殺管叔而囚蔡叔夫豈不愛王室故也吉若獲戾子將行之何有於諸遊二十七年太叔如晉送少薑之葬也梁丙與張躍見之梁丙曰甚矣哉子之為此來也子太叔曰將得已乎昔文襄之霸也其務不煩諸侯令諸侯三嵗而聘五嵗而朝有事而會不協而盟君薨大夫弔卿共葬事夫人士弔大夫送葬足以昭禮命事謀闕而已無加命矣今嬖寵之喪不敢擇位而數於守適唯懼獲戾豈敢憚煩少薑有寵而死齊必繼室今兹吾又將來賀張躍曰善哉吾得聞此數也然自今子其無事矣譬如火焉火中寒暑乃退此其極也能無退乎晉將失諸侯諸侯求煩不獲二大夫退子太叔告人曰張躍有知其猶在君子之後乎定公八年子産卒太叔為政後五年諸侯以王室故會于黃父子太叔見簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰何謂禮對曰吉也聞諸先大夫子産曰夫禮天之經也地之義也民之行也天地之經而民實則之則天之眀因地之性生其六氣用其五行氣為五味發為五色章為五聲淫則昏亂民失其性是故為禮以奉之為六畜五牲三犧以奉五味為九文六采五章以奉五色為九歌八風七音六律以奉五聲為君臣上下以則地義為夫婦內外以經二物為父子兄弟姑姊甥舅昏媾姻亞以象天眀為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震曜殺戮為溫慈和惠以效天之生殖長育民有好惡喜怒哀樂生于六氣是故審則宜類以制六志哀有哭泣樂有歌舞喜有施舍怒有戰鬭喜生於好怒生於惡是故審行信令禍福賞罰以制死生生好物也死惡物也好物樂也惡物哀也哀樂不失乃能協於天地之性是以長久簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也民之所以生也是故先王尚之故人之自能曲直以赴禮者謂之成人大不亦宜乎簡子曰鞅也請終身守此言也獻公二年晉頃公之喪公使遊吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送葬今吾子無二何故對曰諸侯所以歸晉君禮也禮也者小事大大字小之謂事大在共其時命字小在恤其所無以敝邑居大國之間共其職貢與其備禦不虞之患豈忘共命先王之制諸侯之喪士弔大夫送葬唯嘉好聘享三軍之事於是乎使卿晉之喪事敝邑之間先君有所助執紼矣若其不間雖士大夫有所不獲數矣大國之惠亦慶其加而不討其乏眀底其情取備而已以為禮也靈王之喪我先君簡公在楚我先大夫印假實往敝邑之少卿也王吏不討恤所無也今大夫曰女盍從舊舊有豐有省不知所從從其豐則寡君幼弱是以不共從其省則吉在此矣唯大國圖之晉人不能詰八年諸侯盟于召陵子太叔還未至而卒晉趙簡子為之臨甚哀曰黃父之會夫子語我九言曰無始亂無怙富無恃寵無違同無敖禮無驕能無復怒無謀非德無犯非義鞅敢忘之燭之武鄭大夫也文公三十六年晉文公為公子過鄭公不禮焉眀年晉文公立後六年晉文公秦穆公圍鄭討其無禮且二於楚也晉軍函陵秦軍汜南佚之狐言於公曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也已公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪鄰鄰之厚君之薄也若舍鄭以為東道主行李之往來共其困乏君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉用之闕秦以利晉唯君圖之秦伯説與鄭人盟使杞子逢孫楊孫戍之乃還子犯請擊之公曰不可微夫人之力不及此因人之力而敝之不仁失其所與不知以亂易整不武吾其還也亦去之衛石碏衛大夫也衛莊公娶於齊東宫得臣之妹曰莊薑美而無子又娶于陳曰厲媯生孝伯蚤死其娣戴媯生桓公莊薑以為己子公子州吁嬖人之子也有寵而好兵公弗禁莊薑惡之石碏諫曰臣聞愛子教之以義方弗納於邪驕奢淫泆所自邪也四者之來寵祿過也將立州吁乃定之矣若猶未也階之為禍夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣且夫賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎弗聽其子厚與州吁遊禁之不可桓公立乃老州吁卒弒桓公自立為君州吁未能和其民厚問定君於其父碏曰王覲為可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰衛國褊小老夫耄矣無能為也此二人者實弒寡君敢即圖之陳人執之而請蒞於衛衛人使右宰醜蒞殺州吁于濮石碏使其宰獳羊肩蒞殺石厚于陳君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎石祁子者衛大夫石駘仲之子也衛惠公之十年宋南宫萬弒其君閔公出奔陳其黨猛獲奔衛宋人使請猛獲於衛羣臣欲勿許石祁子曰不可天下之惡一也惡於宋而保於我保之何補得一夫而喪一國與惡而棄好非謀也衛人歸之初駘仲卒無適子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆故衛人以龜為有知也孔莊叔達者衛大夫也成公五年晉文公伐衛公出奔孔達從之既復使為政七年諸侯朝晉成公不朝使孔達侵鄭伐綿訾及匡十年晉合諸侯伐衛圍戚取之獲孫昭子成公使告于陳陳共公曰更伐之我辭之故孔達帥師伐晉陳侯為衛請成于晉晉人不許乃執孔達以説之後二年晉人歸孔達于衛以為衛之良也故免之穆公三年從晉宋曺同盟于清邱曰恤病討二既而陳二於楚故宋師伐陳孔達救之曰先君有約言焉若大國討我則死之眀年晉以衛之救陳也有討焉使人弗去曰罪無所歸將加而師孔達曰茍利社稷請以我説罪我之由我則為政而亢大國之討將以誰任我則死之縊而死衛人以説于晉而免然以其成勞也復室其子使復其位孔悝莊叔之後文子圉之子也事衛侯輒為卿輒父蒯聵不得立居于戚蒯聵之姊伯姬孔悝之母也伯姬潛入蒯聵于孔氏逼其子與之盟故孔悝出輒而立蒯聵是為莊公莊公既立而德之乃銘孔悝於鼎曰六月丁亥公假於太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難於漢陽即宫于宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤王家夙夜不解民咸曰休哉公曰叔舅豫女銘若纂乃考服悝再拜稽首曰對揚以辟之勤大命施于蒸彞鼎眀年莊公逐孔悝孔悝出奔宋孫桓子良夫衛大夫也穆公十一年及石稷等侵齊與齊師遇石子欲還桓子曰不可以師伐人遇其師而還將謂君何若知不能則如勿出今既遇矣不如戰也戰于新築衛師不利石子曰師敗矣子不少須衆懼盡子喪師徒何以復命皆不對又曰子國卿也隕子辱矣子以衆退我此乃止且告車來甚衆齊師乃止次于鞫居新築人仲叔于奚救桓子桓子是以免既衛人賞之以邑辭請曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑唯名與器不可以假人君之所司也名以出信信以守物器以藏禮禮以行義義以生利利以平民政之大莭也若以假人與人政也政亡國家從之弗可止也已桓子還於新築不入遂如晉乞師以郤獻子之有宿憾於齊也主於郤獻子晉侯許之乃從獻子敗齊師于鞍定公元年又從獻子伐牆咎如牆咎如潰是嵗冬晉侯使荀庚聘魯且尋盟定公使桓子如魯會將盟魯成公問諸臧宣伯曰中行伯之於晉也其位在三孫子之於衛也位為上卿其將誰先對曰次國之上卿當大國之中卿衛在晉不得為次焉晉司夏盟其將先之遂先盟晉桓子受盟而還四年從晉伯宗伐宋討辭會也桓子卒子林父嗣林父自有傳寧莊子速穆仲靜之子也為衛之正卿莊子始事懿公懿公無道不愛士而好鶴鶴有乘軒者懿公之九年狄人伐衛公將戰國人受甲者曰使鶴鶴實有祿位余焉能戰公與石祁子玦寧莊子矢使守曰以此贊國擇利而為之與夫人繡衣曰聽於二子渠孔禦戎子伯為右黃夷前驅孔嬰齊殿及狄人戰于熒澤衛師敗績懿公死遂滅衛狄人囚史華龍滑與禮孔以逐衛人二人曰我太史也實掌其祭不先國不可待也乃先之至則告石祁子寧莊子曰不可待也二大夫夜與國人出狄入衛遂從之又敗諸河莊子以君死國𣪚故立戴公申以廬于曺戴公立十數日而薨復立戴公之弟燬是為文公文公遷于楚邱文公之十八年邢人及狄人伐衛圍莵圃文公以國讓其父兄子弟及朝衆曰茍能治之燬請從焉衆不可而後師于訾婁狄師還邢人猶留距衛衛人以為憾眀年秋文公將伐邢以報莵圃之役於是衛大旱卜有事於山川不吉寧莊子曰昔周飢克殷而年豐今邢方無道諸侯無伯天其或者欲使衛討邢乎從之師興而雨二十三年晉公子重耳自齊過衛時文公以有邢狄之虞不能禮焉寧莊子言於公曰夫禮國之紀也親民之結也善德之建也國無紀不可以終民無結不可以固德無建不可以立此三者君之所慎也今君棄之無乃不可乎晉公子善人也晉衛親也君不禮焉棄三德矣臣故云君其圖之康叔文之昭也唐叔武之穆也周之大功在武天祚將在武族茍姬未絶周室而俾守大聚者必武族也武族惟晉實昌晉允公子實德晉仍無道天祚有德晉之守祀必公子也若復而修其德鎮撫其民必獲諸侯以討無禮君弗蚤圖衛其在討小人是懼敢不盡心公弗聽二十四年公子重耳反國是為晉文公文公立修霸業以求諸侯眀年衛文公卒子成公立晉人未能釋憾於衛而成公復二於楚故晉師討焉衛人欲求説於晉出成公成公出奔楚遂適陳國幾亡卒如莊子之言莊子卒子俞嗣是為武子武子自有傳北宫文子他姬姓出自成公北宫懿子括之孫也獻公之三年懿子帥師侵鄭十八年從晉荀偃伐秦懿子生遺遺生文子襄公二年文子相公如楚過鄭印假迋勞于棐林如聘禮而以勞辭文子入聘子羽為行人馮簡子與子太叔逆客事畢文子言於公曰鄭有禮其數世之福也其無大國之討乎詩云誰能執熱逝不以濯禮之如政如熱之有濯也濯以救熱何患之有及楚見令尹圍之威儀言於公曰令尹似君矣將有他志雖獲其志不能終也詩云靡不有初鮮克有終終之實難令尹其將不免公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其下畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之則而象之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰威儀棣棣不可選也言君臣上下父子兄弟內外小大皆有威儀也周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也周書數文王之德曰大國畏其力小國懷其德言畏而愛之也詩云不識不知順帝之則言則而象之也紂囚文王七年諸侯皆從之囚紂於是乎懼而歸之可謂愛之矣文王伐崇再駕而降為臣蠻夷率服可謂畏之矣文王之功天下誦而歌舞之可謂則之矣文王之行至今為法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也文子之子喜靈公十三年齊豹之亂公生賜之諡曰貞子蘧瑗字伯玉衛大夫也瑗謂君子之人達故觀其器而知其工之巧觀其發而知其人之知故君子慎其所以與人者時獻公無道辱侮大臣孫林父懼將謀出之入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢姦之雖姦之庸知愈乎遂從近關出既反國寧喜以父命欲納獻公告伯玉伯玉曰瑗不得聞君之出敢聞其入又從近關出顔闔將傳衛靈公太子而問於伯玉曰有人於此其德天殺與之為無方則危吾國與之為有方則危吾身其知適足以知人之過而不知其所以過若然者吾奈之何伯玉曰善哉問乎戒之慎之正汝身哉形莫若就心莫若和雖然之二者有患就不欲入和不欲出形就而入且為顛為滅為崩為蹶心和而出且為聲為名為妖為孽彼且為嬰兒亦與之為嬰兒彼且為無町畦亦與之為無町畦彼且為無崖亦與之為無崖達之入於無疵汝知夫螳蜋乎怒其臂以當車轍不知其不勝任也是其才之美者也汝不知夫養虎者乎不敢以生物與之為其殺之之怒也不敢以全物與之為其決之之怒也時其飢飽達其怒心虎之與人異類而媚養己者順也故其殺者逆也夫愛馬者以筐盛矢以蜄盛溺適有蚊虻僕緣而拊之不時則決銜毁首碎胸意有所至而愛有所亡可不慎邪公叔文子升於瑕邱蘧伯玉從文子曰樂哉斯邱也死則我必欲葬焉伯玉曰吾子樂之則瑗請前文子悔而止寧武子俞寧莊子之子也成公三年楚伐宋晉文公欲假道於衛以救宋成公不許晉更從河南濟救宋徴師於衛大夫欲許成公不肯晉及齊盟于斂盂成公請盟晉人拒之公欲與楚國人不欲出其君以説于晉公出居于襄牛寧武子從大夫元咺奉公弟叔武以攝位或訴元咺於公曰立叔武矣其子角從公公使殺之咺不廢命奉夷叔以入守晉人以叔武故復公寧武子與衛人盟于宛濮曰天禍衛國君臣不協以及此憂也今天誘其𠂻使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉不協之故用昭乞盟于爾大神以誘天𠂻自今日已往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也眀神先君是紏是殛國人聞此盟也而後不二公先期入寧武子先長牂守門以為使也與之乘而入公子歂犬華仲前驅叔武將沐聞君至喜捉髮而出前驅射而殺之公知其無罪枕之股而哭之歂犬走出公使殺之元咺以叔武之死也出奔晉以訟於晉侯寧武子為輔針莊子為坐士榮為大士公不勝晉殺士榮刖針莊子謂寧俞忠而免之執公歸于京師置諸深室寧武子職納橐饘焉元咺歸于衛立公子瑕晉侯使醫衍鴆公武子貨醫使薄其鴆不死魯侯為之請納玉於王與晉侯皆十玨王乃釋公公使賂周歂冶厪曰茍能納我吾使爾為卿周冶殺元咺子適子儀公復歸于衛公再出而不失國皆武子之功也眀年狄圍衛衛遷于帝邱卜曰三百年衛成公夢康叔曰相奪豫享公命祀相寧武子不可曰鬼神非其族類不歆其祀杞鄫何事相之不享於此久矣非衛之罪也不可以間成王周公之命祀請改祀命從之公使寧武子聘于魯魯侯與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功於是乎王賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾魯人服之武子之子曰相相之子曰殖史鰌字子魚亦曰祝他靈公二十九年劉文公合諸侯于召陵謀伐楚將會子行敬子言於公曰會同難嘖有煩言莫之治也其使祝他從公曰善乃使子魚子魚辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二徼大罪也且夫祝社稷之常𨽻也社稷不動祝不出竟官之制也君以軍行祓社釁鼓祝奉以從於是乎出竟若嘉好之事君行師從卿行旅從臣無事焉公曰行也及臯鼬將長蔡於衛衛侯使祝他私於萇𢎞曰聞諸道路不知信否聞蔡將先衛信乎萇𢎞曰信蔡叔康叔之兄也先衛不亦可乎子魚曰以先王觀之則尚德也昔武王克商成王定之選建眀德以蕃屏周故周公相王室以尹天下於周為睦分魯公以大路大旗夏后氏之璜封父之繁弱殷氏六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其醜類以法則周公用即命于周是使之職事于魯以昭周公之眀德分之土田陪敦祝宗卜史備物典策官司彛器因商奄之民命以伯禽而封於少皥之虛分康叔以大路少帛綪茷旃旌大吕殷氏七族陶氏施氏繁氏錡氏樊氏飢氏終葵氏封畛土略自武父以南及圃田之北竟取於有閻之土以共王職取於相土之東都以會王之東搜聃季授土陶叔授民命以康誥而封於殷虛皆啓以商政疆以周索分唐叔以大路密須之鼓闕鞏沽洗懷姓九宗職官五正命以唐誥而封於夏虛啓以夏政疆以戎索三者皆叔也而有令德故昭之以分物不然文武成康之伯猶多而不獲是分唯不尚年也管蔡啓商惎間王室王於是乎殺管叔而囚蔡叔以車七乘徒七十人其子蔡仲改行帥德周公舉之以為己卿士見諸王而命之以蔡其命書云王曰胡無若爾考之違王命也若之何其使蔡先衛也武王之母弟八人周公為太宰康叔為司寇聃季為司空五叔無官豈尚年哉曺文之昭也晉武之穆也曺為伯甸非尚年也今將尚之是反先王也晉文公為踐土之盟衛成公不在夷叔其母弟也猶先蔡載書云王若曰晉重耳魯申衛武蔡甲午鄭捷齊潘宋王臣莒期藏在周府可覆視也吾子欲復文武之略而不正其德將如之何萇𢎞説告劉子與范獻子謀之乃長衛侯於盟孫文子林父桓子之子也林父嗣為卿為定公所惡定公四年林父出奔晉十二年公如晉晉侯欲以林父見公不可既歸晉侯使郤犫送林父而見之公欲辭定薑曰不可是先君宗卿之嗣也大國又以為請不許將亡雖惡之不猶愈於亡乎君其忍之安民而宥宗卿不亦可乎公見而復之公薨孔成子寧惠子以公命立敬姒之子衎是為獻公定薑見其不哀也欲廢之既以為言大夫皆懼孫文子自是不敢舍其重器於衛盡置諸戚而甚善晉大夫十一年文子聘於魯且尋桓子之盟公登亦登穆子有辭亦無悛容魯人以是知其必亡也十八年公戒孫文子寧惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒孫文子如戚其子孫蒯入使公飲之酒使大師歌巧言之卒章大師辭師曺請為之初公有嬖妾使師曺誨之琴師曺鞭之公怒鞭師曺故師曺欲歌之以怒孫子而報公公使歌之遂誦之蒯懼告文子文子曰君忌我矣弗先必死并帑於戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢姦之雖姦之庸知愈乎遂行從近關出公使子蟜子伯子皮與孫子盟于邱宫孫文子皆殺之公如鄄使子行於孫子孫子又殺之公出奔齊孫氏追之敗公徒于阿澤及竟公使祝宗告亡且告無罪定薑曰無神何告若有不可誣也舍大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪衛人立公孫剽是為殤公林父與寧喜相之以聽命於諸侯殤公十二年寧喜納獻公伐孫氏孫氏敗遂弒殤公林父以戚如晉孔子書曰入于戚以叛罪孫氏也衛人侵戚東鄙孫子訴于晉晉戍茅氏殖綽伐茅氏殺晉戍三百人孫蒯追之弗敢擊林父曰厲之不如遂從衛師敗之圉獲殖綽復訴于晉晉趙武會諸侯于澶淵以討衛疆戚田取衛西鄙懿氏六十以與孫氏於是獻公會之晉人以林父故執寧喜北宫遺公如晉晉人亦執公囚之於士弱氏齊晏平仲私於叔向曰晉為盟主而為臣執君若之何叔向告趙文子文子以告晉侯乃許歸公初孫蒯田于曺隧飲馬于重邱毁其瓶重邱人閉門而詬之曰親逐而君爾父為厲是之不憂而何以田為於是孫蒯伐曺取重邱寧悼子喜惠子殖之子也定公之末年晉郤犫來聘公享之惠子相苦成叔傲惠子曰郤犫其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觥其觩旨酒思柔彼交匪傲萬福來求今夫子傲取禍之道也已而果然定公有疾使惠子與孔成子立敬姒之子衎以為太子公薨太子立為獻公獻公不禮於孫文子寧惠子二子怒共謀出之公奔于齊惠子與孫氏立公孫剽相之以聽命於諸侯既而悔之將死召悼子曰吾得罪於君悔無及也名在諸侯之策曰孫林父寧殖出其君君入則掩之若能掩之則吾子也若不能猶有鬼神吾有餒而已不來食矣悼子許諾惠子遂卒悼子立獻公聞是言也使與悼子言悼子曰必子鮮在不然必敗公使子鮮為復辭敬似強命之對曰君無信臣懼不免敬似曰雖然以吾故也許諾子鮮不獲命於敬姒以公命與寧喜言曰茍反政由寧氏祭則寡人悼子告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行從近關出告右宰榖右宰榖曰不可獲罪於兩君天下誰畜之悼子曰吾受命於先人不可以二穀曰我請使焉而觀之遂見公於夷儀反曰君淹恤在外十二年矣而無憂色亦無寬言猶夫人也若不已死無日矣悼子曰子鮮在榖曰子鮮在何益多而能亡於我何為悼子曰雖然弗可以己孫文子在戚孫嘉聘於齊孫襄居守寧喜右宰穀伐孫氏不克伯國傷悼子出舍於郊伯國死孫氏哭國人召悼子悼子復攻孫氏克之遂殺殤公及太子角而納獻公孔子書曰寧喜弒其君言罪之在寧氏也獻公既復而寧喜専公患之公孫免餘請殺之公曰微寧子不及此吾與之言矣事未可知祗成惡名止也對曰臣殺之君勿與知乃與公孫無地公孫臣謀使攻寧氏弗克皆死公曰臣也無罪父子死余矣於是免餘復攻寧氏殺寧喜及右宰穀尸諸朝石惡將會宋之盟受命而出衣其尸枕之股而哭之欲斂以亡懼不免且曰受命矣乃行子鮮曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公使止之不可及河又使止之止使者而誓於河託於木門不鄉衛國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也將誰訴乎吾不可以立於人之朝矣終身不仕公喪之如稅服終身公與免餘邑六十辭曰唯卿備百邑臣六十矣下有上祿亂也臣弗敢聞且寧子唯多邑故死臣懼死之速及也公固與之受其半以為少師公使為卿辭曰太叔儀不二能贊大事君其命之乃使文子為卿宋公子目夷字子魚襄公之庶兄也桓公有疾襄公為太子固請曰目夷長且仁君其立之公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順遂走而退桓公薨襄公即位使子魚為司馬齊桓公薨襄公將求諸侯十年春執滕子嬰齊夏盟曺人邾人于曺南鄫子會盟于邾公使邾人執鄫子用之于次睢之上欲以屬東夷司馬子魚曰古者六畜不相為用小事不用大牲而况敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄德今一會而虐二國之君又用諸淫昏之鬼將以求霸不亦難乎得死為幸曺南之會也曺人不修地主之禮秋公圍曺子魚諌曰文王聞崇德亂而伐之軍三旬而不降退修教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御于家邦今君德無乃猶有所闕而以伐人若之何盍姑內省德乎無闕而後動可也十二年公為鹿上之盟以求諸侯於楚楚人許之子魚曰小國爭盟禍也宋其亡乎幸而後敗秋諸侯會公于盂子魚曰禍其在此乎君欲已甚其何以堪之於是楚執公以伐宋冬會于薄以釋之子魚曰禍猶未也未足以懲君十三年鄭伯如楚公伐鄭子魚曰所謂禍在此矣秋楚人伐宋以救鄭冬十一月公及楚人戰于泓宋人既成列楚人未既濟子魚曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天贊我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛眀耻教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳可也子魚卒子友嗣文公七年友為左師向戍桓公之族也事平公為左師食邑於合曰合左師晉荀偃士丐以宋事晉厚而向戌有賢行請伐逼陽而封焉既滅逼陽以與向戌向戌辭曰君若猶辱鎮撫宋國而以逼陽光啓寡君羣臣安矣其何貺如之若専賜臣是臣興諸侯以自封也其何罪大焉敢以死請乃與宋公十五年向戌侵鄭大獲十八年聘于魯見孟獻子尤其室曰子有令問而美其室非所望也二十年華閲卒華臣弱皋比之室使賊殺其宰華吳賊六人以鈹殺諸盧門合左師之後左師懼曰老夫無罪賊曰皋比私有討於吳遂幽其妻曰畀余而大璧公聞之曰臣也不唯其宗室是暴大亂宋國之政必逐之左師曰臣也亦鄉也大臣不順國之耻也不如蓋之乃舍之左師為已短策茍過華臣之門必騁初芮司徒生女子赤而毛棄諸堤下共姬之妾取以入名之曰棄長而美平公入夕共姬與之食公見棄也而視之尤姬納諸御嬖生佐惡而婉太子痤美而狠合左師畏而惡之寺人惠牆伊戾為太子內師而無寵二十九年楚客聘于晉過宋太子知之請野享之公使往伊戾請從之公曰夫不惡女乎對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有共其外莫共其內臣請往也遣之至則欿用牲加書徴之而馳告公曰太子將為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚太子太子曰惟佐也能免我召而使請曰日中不來吾知死矣左師聞之聒而語過期乃縊而死佐為太子公徐聞其無罪也乃亨伊戾左師見夫人之步馬者問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人夫人使饋之錦與馬先之以玉曰君之妾棄使某獻左師改命曰君夫人而後再拜稽首受之向戌善於趙文子又善於令尹子木欲弭諸侯之兵以為名使告諸晉楚齊秦皆許之三十年遂會諸侯為盟已而請賞公與之邑子罕有辭左師辭之楚靈王之合諸侯也以侈示之椒舉諫之不聽子産見左師曰吾不患楚矣汰而愎諫不過十年左師曰然不十年侈其惡不逺逺惡而後棄善亦如之德逺而後興樂喜字子罕戴公之子公子衎之後也事平公為司城平公之五年華羽與樂轡少相狎長相優又相謗也子蕩怒以弓梏華弱于朝平公見之曰司武而梏于朝難以勝矣遂逐之司城子罕曰同罪異罰非刑也專戮於朝罪孰大焉亦逐子蕩子蕩射子罕之門曰幾日而不我從子罕善之如初十二年災樂喜為政使伯氏司里火所未至徹小屋塗大屋陳畚挶具綆缶備水器量輕重蓄水潦積土塗巡丈城繕守備表火道使華臣具正徒令隧正納郊保奔火所使華閲討右官官庀其司向戌討左亦如之使樂遄庀刑器亦如之使皇鄖命校正出馬工正出車備甲兵庀武守使西鉏吾庀守府令司宫巷伯警宫二師令四鄉正敬享祝宗用馬于四墉祀盤庚于西門之外初鄭衛氏司氏之亂其餘盜在宋鄭人以子西伯有子産之故十八年賂宋以馬四十乘與師茷師慧三月公孫黑為質焉司城子罕以堵女父尉翩司齊與之良司臣而逸之託諸季武子武子置諸卞鄭人醢之三人也師慧過朝將私焉相曰朝也慧曰無人焉相曰朝也何故無人慧曰必無人焉若猶有人豈其以千乘之相易淫樂之矇必無人焉故也子罕聞之固請而歸之宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人以為寶也故敢獻之子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶稽首而告曰小人懷璧不可以越鄉納此以請死也子罕置諸其里使玉人為之攻之富而後使復其所皇國父為太宰為平公築臺妨於農收子罕請俟農功之畢公弗許築者謳曰澤門之晳實興我役邑中之黔實慰我心子罕聞之親執撲以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥濕寒暑今吾君為一臺而不速成何以為役謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也向戌之議偃兵也既會諸侯歸而請賞曰請免死之邑公與之邑六十以示子罕子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德也聖人以興亂人以廢廢興存亡昏眀之術皆兵之由也而子求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大罰而又求賞無厭之甚也削而投之左師辭邑向氏欲攻之左師曰我將亡夫子存我德莫大焉又可攻乎晉人欲伐宋使人覘之陽門之介夫死子罕入而哭之哀覘宋者反報於晉侯曰陽門之介夫死司城哭之哀而民説殆不可伐也孔子聞之曰善哉覘國乎凡民有喪扶服救之雖微晉而已天下其孰能當之華元戴公之後也戴公子考父食采於華因氏焉世為宋卿文公四年鄭伐宋華元樂莒禦之戰于大棘將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師宋師敗績囚華元獲樂莒及甲車四百六十乘俘二百五十人馘百人宋人以車百乘文馬百駟贖華元于鄭半入華元逃歸立于門外告而入見羊斟曰子之馬然也對曰非馬也其人也言畢奔于魯宋城華元為植巡功城者謳曰睅其目皤其腹棄甲而復于思于思棄甲復來使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那役人曰從其有皮丹漆若何華元曰去之夫其口衆我寡時服其有容十六年楚子使申舟聘于齊曰無假道於宋亦使公子馮聘于晉不假道于鄭初陳侯鄭伯會楚子于息將以伐宋華御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聽命遂道以田孟諸公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬命夙駕載燧公違命無畏抶其僕以徇或謂申舟曰國君不可戮也申舟曰當官而行何強之有詩曰剛亦不吐柔亦不茹毋縱詭隨以謹罔極是亦非辟強也敢愛死以亂官乎至是以惡宋之故見犀而行曰鄭昭宋聾晉使不害我則必死王曰殺女我則伐之遂行及宋公使人止之華元曰過我而不假道鄙我也鄙我亡也殺其使必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起屨及於窒皇劔及於寢門之外車及於蒲胥之市九月楚子圍宋踰年不下楚師將去之申犀稽首於王之馬前曰無畏知死不敢廢王命王棄言焉王不能答用申叔時之謀築室反耕公懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰敝邑易子而食析骸而㸑雖然城下之盟有以國敝不能從也去我三十里唯命是聽子反懼與之盟而告王退三十里公及楚平華元為質盟曰我無爾詐爾無我虞二十二年文公卒始厚葬用蜃炭益車馬始用殉重器備椁有四阿棺有翰檜君子謂華元不能治煩去惑君生縱其欲死又益其侈是棄君於惡也共公八年晉使糴茷如楚楚許晉成華元善於令尹子重又善於欒武子聞晉楚之相通也如楚遂如晉以合晉楚之成十年晉士燮楚公子罷許偃盟于宋西門之外華元故也十三年共公卒平公即位華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司寇鱗朱為少司寇向帶為太宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉二華戴族也司城莊族也六官皆桓族也魚石將止華元魚府曰右師反必討是無桓氏也魚石曰右師茍穫反雖許之討必不敢且多大功國人與之不反懼桓氏之無祀於宋也右師討猶有戌在桓氏雖亡必偏魚石自止華元于河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山魚石向為人鱗朱向帶魚府出舍于睢上華元使止之不可冬十月華元自止之不可乃反魚府曰今不從不得入矣右師視速而言疾有異志焉若不我納今將馳矣登邱而望之則馳騁而從之則決睢澨閉門登陴矣左師二司寇二宰遂出奔楚華元使向戍為左師老佐為司馬樂裔為司寇以靖國人華元之子華臣華閲閲為右師華費遂事元公為大司馬費遂之子曰貙多僚登貙為少司馬多僚為御士元公無信多私而惡華向華定華亥與向寧謀曰亡愈於死先諸元公十年夏六月華亥偽有疾私誘羣公子公子問之則執之殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行於其廪公如華氏請焉弗許遂劫之取太子欒與母弟張公子地以為質公亦取華亥之子無戚向寧之子羅華定之子啓與華氏盟以為質於是公黨公子城公孫忌樂舍司馬強向宜向鄭楚建郳申出奔鄭其徒與華氏戰於鬼閻敗子城子城適晉華亥與其妻必盥而食所質公子者而後食公與夫人每日必適華氏食公子而後歸華亥患之欲歸公子向寧曰唯不信故質其子若又歸之死無日矣公請於華費遂將攻華氏對曰臣不敢愛死無乃求去憂而滋長乎臣是以懼敢不聽命公曰子死亡有命余不忍其詬也費遂從之冬十月公殺華向之質而攻之華向奔陳華登奔吳向寧欲殺太子華亥曰干君而出又殺其子其誰納我且歸之有庸使少司寇華牼以歸乃謂牼曰子之齒長矣不能事人以三公子為質必免公子既入華牼將自門行公遽見之執其手曰余知而無罪也入復其所二十一年多僚與貙相惡乃譖於公曰貙將納亡人亟言之公曰司馬以吾故亡其良子死亡有命吾不可以再亡之對曰君若愛司馬則如亡死如可逃何逺之有公懼使侍人召司馬之侍人宜僚飲之酒而使告司馬司馬歎曰必多僚也吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙將使田孟諸而遣之公飲之酒厚酬之賜及從者司馬亦如之張丐尤之曰必有故使子皮承宜僚以劒而訊之宜僚盡以告張丐欲殺多僚子皮曰司馬老矣登之謂甚吾又重之不如亡也子皮將見司馬而行則遇多僚御司馬而朝張丐不勝其怒遂與子皮臼任鄭翩殺多僚劫司馬以叛而召亡人於是華向入樂大心豐愆華牼禦諸橫華氏居盧門以南里叛宋城舊鄘及桑林之門而守之華登以吳師救華氏齊烏枝鳴戍宋厨人濮曰軍志有之先人有奪人之心後人有待其衰盍及其勞且未定也伐諸若入而固則華氏衆矣悔無及也從之齊師宋師敗吳師于鴻口獲其二帥公子苦雂偃州員華登帥其餘以敗宋師公欲出厨人濮曰吾小人可藉死而不能送亡君請待之乃徇曰楊徽者公徒也衆從之公自楊門見之下而巡之曰國亡君死二三子之耻也豈専孤之罪也齊烏枝鳴曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劒從之華氏北復即之厨人濮以裳裹首而荷以走曰得華登矣遂敗華氏于新里翟僂新居于新里既戰説甲于公而歸華姓居于公里亦如之公子城以晉師至曺翰胡會晉荀吳齊苑何忌衛公子朝救宋與華氏戰于赭邱鄭翩願為鸛其御願為鵝子祿御公子城莊堇為右干犫御吕封人華豹張丐為右相遇城還華豹曰城也城怒而反之將注豹則關矣曰平公之靈尚輔相余豹射出其間將注則又關矣曰不狎鄙抽矢城射之殪張丐抽殳而下射之折股扶服而擊之折軫又射之死干犫請一矢城曰余言女於君對曰不死伍乘軍之大刑也干刑而從子君焉用之子速諸乃射之殪大敗華氏圍諸南里華亥搏膺而呼見華貙曰吾為欒氏矣貙曰子無我迋不幸而後亡使華登如楚乞師華貙以車十五乘徒七十人犯師而出食於睢上哭而送之乃復入楚子以薳越帥師將逆華氏太宰犯諫曰諸侯惟宋事其君今又爭國釋君而臣是助無乃不可乎王曰而告我也後既許之矣師遂行楚薳越使告于宋曰寡君聞君有不令之臣為君憂無寧以為宗羞寡君請受而戮之對曰孤不佞不能媚於父兄以為君憂拜命之辱抑君臣日戰君曰余必臣是助亦唯命人有言曰唯亂門之無過君若惠保敝邑無亢不𠂻以奬亂人孤之望也唯君圖之楚人患之諸侯之戍謀曰若華氏知困而致死楚耻無功而疾戰非吾利也不如出之以為楚功其亦無能為也已救宋而除其害又何求乃固請出之宋人從之於是華亥向寧華定自宋南里出奔楚秦百里孟眀視父曰百里傒先為虞大夫晉獻公滅虞虜虞君及百里傒既歸乃以為秦穆公夫人媵於秦百里傒亡秦走宛楚鄙人執之穆公聞其賢欲重贖之恐楚人不與乃使人謂楚曰吾媵臣百里傒在焉請以五羖之皮贖之楚人許而遂歸之當是時年七十餘矣穆公釋其囚與語國事謝曰臣亡國之臣何足問公曰虞君不用子故亡非子罪也固問語三日穆公大説授之國政號曰五羖大夫百里傒曰臣不及臣友蹇叔蹇叔賢而世莫知公問之故對曰臣嘗遊困於齊而乞食䬹人蹇叔收臣臣因欲事齊君無知蹇叔止臣臣得脫齊難遂之周周王子頽好牛臣以養牛干之及頽欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利祿爵且留再用其言得脫一不用及於難是以知其賢於是穆公使人厚幣迎蹇叔以為上大夫秦嘗使大夫杞子戍鄭鄭人使掌北門之管杞子使告于秦曰若潛師以來國可得也穆公然之訪諸蹇叔蹇叔曰勞師以襲逺非所聞也師勞力竭逺主備之無乃不可乎師之所為鄭必知之勤而無所必有悖心且行千里其誰不知又問百里傒傒曰徑數國千里而襲人未見其利且人賣鄭焉知我國人不有以我情告鄭者乎公曰子不知吾已決矣遂發兵使百里傒子孟明視蹇叔子西乞術白乙丙將兵師出於東門之外蹇叔百里傒二人哭之公聞之怒曰孤發兵而子沮哭吾軍何也二老曰臣非敢沮君軍行臣子與往臣老遲還恐不相見故哭耳二老退而謂其子曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所辟風雨也必死是間余收爾骨焉秦師遂東過周北門左右免胄而下超乘者三百乘王孫滿尚幼觀之言於王曰秦師輕而無禮必敗輕則寡謀無禮則脫入險而脫又不能謀能無敗乎及滑鄭商人弦髙將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將步師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衛且遽告于鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉曰吾子淹久於敝邑唯是脯資餼牽竭矣為吾子之將行也鄭之有原圃猶秦之有具囿也吾子取其麋鹿以間敝邑若何杞子奔齊孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還晉人用先軫之言發命興師敗孟明于殽獲三帥以歸文嬴請之公舍之已而悔之使陽處父追之及河則已在舟中矣於是穆公素服郊次鄉師而哭曰孤違二老以辱二三子孤之罪也不替孟眀孤之過也大夫何罪且吾不以一眚掩大德因作誓以謝蹇叔百里傒及三年孟明視帥師伐晉以報殽之役晉侯禦之先且居將中軍趙衰佐之王官無地禦戎狐鞫居為右及孟明戰于彭衙孟明敗績及歸繆公猶用孟明增修國政重施於民次年孟明伐晉濟河焚舟取王官及郊晉懼不敢出乃自茅津濟封殽尸而還遂霸西戎通志卷九十一
