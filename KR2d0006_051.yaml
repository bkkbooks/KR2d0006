body:
  text: 通志卷四十六宋右廸功郎鄭樵漁仲撰諡略第一諡上序論五篇諡中諡法三篇諡下後論四篇諡上臣謹按字有不可避諱者諡法是也故此三篇並從本字序論第一古無諡諡起於周人羲皇之前名是氏亦是號亦是至神農氏則有炎帝之號軒轅氏則有黄帝之號二帝之號雖殊名氏則一焉堯曰陶唐舜曰有虞禹曰夏后湯曰殷商則氏已異於名堯曰放勲舜曰重華禹曰文命湯曰武王則號已異於氏然是時有名號之别者不過開基之祖耳夏自啓商自太甲皆一名而生死通稱若其曰祖曰宗為中為高則又不可常也以諱事神者周道也周人卒哭而諱將𦵏而諡有諱則有諡無諱則諡不立蓋名不可名已則後王之語前王後代之及前代所以為昭穆之次者將何以别哉生有名死有諡名乃生者之辨諡乃死者之辨初不為善惡也以諡易名名尚不敢稱况可加之以惡乎非臣子之所安也嗚呼春秋紀實事而褒貶之説行諡法别昭穆而美刺之説行當其時已紛紜矣後之人何獨不然臣恐褒貶之説不已則春秋或幾乎息矣於是作春秋考春秋𫝊又恐美刺之説不已則周公之意其亡矣夫於是作諡法使百代之下為人臣為人子者知尊君嚴父奉亡如存不敢以輕重之意行乎其間以傷名敎者也序論第二天下有難行之道雖曰古有是道而後世終不可行者非古有是道也後之人設是道以實之耳豈有可行於古而不可行於今之道乎若曰臣子可以議君父之得失使有徳則諡善無徳則諡惡大行受大名細行受細名行生於已名生於人此眞不可行之道也自非伐無道誅有罪收其鯨鯢以為京觀則安得有惡諡之稱乎臣以為立諡之意本為昭穆命諡之義取於尊隆且生有惡死無惡者人之情也生可簡死不可簡者禮之事也生雖侯伯死必稱公生不踰等死必加等先王之通制也豈有稱生之號有隆而命死之名有虧乎諡亦有惡惡諡非所以加君父也子曰父在觀其志父没觀其行三年無改於父之道可謂孝矣不若是是不當於人心子議父臣議君秦人之所厭而削之也今先儒之所為諡者正秦人之論耳不合乎古道序論第三按諡法惡諡莫如桀紂其次莫如桓靈其次莫如幽厲此古今之所聞也以臣所見皆不然桀紂是名耳非諡也名者生之所命而非死之所加也當夏之季當殷之興則未有諡桀非諡也當殷之季當周之興雖有諡法然得諡為榮不得諡為辱名之以紂辱莫大焉桀之所名者取於木猶高柴公孫枝之所取云耳豈有賤人多殺之名而可以為名乎紂之所名者取於絲猶臧紇南宫縚之所取云耳豈有殘義損善之名而可以為名乎是名也非已之所更即父兄之所命也安得有是義乎桓於經典並無惡義如公執桓圭桓乃珪璋之首稱如桓桓武王桓乃果毅之盛德齊之桓公用能覇業周之桓王元無累行安得桓為惡名乎靈者神聖之異名周之東也王綱不振四方解體迨乎靈王周道始昌諸侯服從故𫝊曰惟有髭王甚神聖以其生有神聖之徳死則諡之以靈是為名實允當其曰請為靈若厲者荆蠻不根之論也安得靈為惡名乎幽者隠之並名也周幽王喪於犬戎之禍魯隠公卒於羽父之難皆臣子所不忍言故以幽隠命之痛惻之甚也豈有擁遏不通之義乎語曰子溫而厲威而不猛恭而安厲與安並徳故於厲言而猛則異於是故於猛言不厲非惡也豈有暴虐無親之義乎厲王過矣使厲王而有暴虐無親之名則宣王不得為孝子幽王過矣使幽王而受擁遏不通之責則晉文侯鄭武公不得為良臣成周之法初無惡諡諡之有惡者後人之所立也由有美刺之説行然後人立惡諡序論第四諡之有善惡者即文而見不即説而見且曰戾曰刺豈不見其有凶徳何必以不悔前過然後為戾暴慢無親然後為刺乎一戾不足其説又益之以戾一刺不足其説又益之以刺非古之道也曰蕩曰荒豈不見其有滛行何必好内逺禮然後為蕩縱樂無度然後為荒乎一蕩不足其説又益之以蕩一荒不足其説又益之以荒非古之道也諡之善惡可即一文以見義一文不得而盡者即複文以見義複文不足以盡者又從而加之如衛之公孫枝是為恵貞文子亦古之道何必為之説以釋之乎釋之之言既多又非載籍之常義學者而盡欲以善惡之義通之有其名實相違而義不可通者則必迂其説曲而通之也桀紂初非惡名桓靈亦非惡諡由其君而衆惡所集使名與諡不能主也人聞其名見其諡則翕然以為惡矣且愛人愛其人之烏惡人惡其人之狗烏狗何與於善惡但隨人好惡所生矣是以君子惡居下流故名之曰幽厲序論第五法之為諡者取一文耳非有説也諡法行而其説紛紛成書見於世者有周公諡法有春秋諡法有廣諡有今文尚書有大戴記有世本有獨斷有劉熙之書有來奥之書有沈約之書有賀琛之書有王彦威之書有蘇冕之書有扈蒙之書有蘇洵之書其實皆由漢魏以來儒生取古人之諡而釋以已説集而為法也故蘇氏曰周公之法反取賀琛之新法而載之書是知世之諡法其名尤古者益非古法也今考周公之書所用後人之語甚多是皆為諡法者展轉相因言文雜揉無足取也惟沈約之書愽採古今詮次有紀然亦無所建明至蘇氏承詔編定六家諡法乃取周公春秋廣諡沈約賀琛扈䝉之書斷然有所去取其善惡有一成之論實前人所不及也皇也帝也王也公也侯也君也師也長也胥也實尊卑之號上下之稱且生有爵死有諡以是為諡未之敢聞也若帝王可以為諡則天子亦可以為諡矣若公侯可以為諡則卿大夫亦可以為諡矣若師長可以為諡則父兄亦可以為諡矣無義之談莫此為甚經幾百年間而後蘇子闢之堯取累土以命名舜取濃華以命名禹取於獸湯取於水桀以喬木紂以繹絲是非已之所更必父兄之所命也且生有爵死有諡以是為諡未之敢聞也蘇氏未暇及臣不敢後焉謹條其可用者二百十諡分為三類只以一文見義無事乎文之廣無事乎説之繁庶乎表裏蘇氏之學是亦典禮之大者諡中上諡法神聖賢文武成康獻懿元章釐景宣明昭正敬恭莊肅穆戴翼襄烈桓威勇毅克壯圉或作禦魏安定簡貞節白匡質靖眞順思考暠顯和元高光大英睿博憲堅孝忠惠徳仁智愼禮義周敏信逹寛理凱清直欽益良度類基慈齊深溫讓密厚純勤謙友祁廣淑儉靈榮厲比絜舒賁逸退訥偲逑懋宜哲察通儀經庇恊端休悦綽容確恒熙洽紹世果右百三十一諡用之君親焉用之君子焉中諡法懐悼愍亦作閔哀隠幽冲夷懼息擕􅀈愿儆右十四諡用之閔傷焉用之無後者焉下諡法野夸躁伐荒煬戾刺虚蕩墨愆亢千𥚹専輕苛介暴虐愎悖凶慢忍毒惡殘奰攘頑昬驕酗湎僥狃侈惑靡溺偽妄讟謟誣詐譎訩詭􅀈邪慝蠱危圯懦撓覆敗斁疵饕費右六十五諡用之殱夷焉用之小人焉凡上中下諡共二百十言以備典禮之用諡下後論第一凡蘇氏所取一百六十八諡三百十一條臣今只即一文以見義即文可以見文不必曰施而中理曰文經緯天地曰文即武可以見武不必曰克定禍亂曰武保大定功曰武即孝可以見孝不必曰慈惠愛親曰孝能養能恭曰孝即忠可以見忠不必曰盛衰純固曰忠臨患不忘曰忠且即文以見義則文簡而義顯舍文而從説則説多而義惑蘇氏所削為多矣臣今復削去三百十一條之説只從百六十八諡而増損焉實得二百十諡分而為三上諡百三十用於君親用於君子下諡六十五用於殱夷用於非君子中諡十四用於閔傷用於無後者其有堯舜禹湯桀紂六文乃人名非諡法所宜去也陳胡公滿者言其老也有胡耉之稱焉胡非諡義齊有丁公名也漢有丁公姓也丁非諡義故去胡去丁曰商曰使曰軍曰䟆曰鼎曰莫曰敵曰震曰攝曰革曰易曰素曰頃凡十三文雖有其諡於辭義未安所宜去也曰原曰愛曰聲曰聞曰要曰强曰平凡七文文雖可用於義不専亦宜去蘇氏所取者百六十八諡今去其二十八凡蘇氏所去者百九十八今取其七十二諡披沙得金甄金去土非相違也而相從也後論第二蘇氏去其歴代所以為尊卑之號者九皇帝王公侯君師長胥是也子曰左邱明恥之丘亦恥之蘇氏去其義之不安者八今取其賁取其逸請以待邱園也蘇氏去其子孫不忍稱者九十四今取其暴取其虐取其愎取其凶取其悖取其慢取其忍取其毒取其惡取其奰取其攘取其頑所以待暴戾取其昬取其驕取其酗取其湎取其僥取其狃取其侈取其惑取其靡取其溺所以待滛侈取其謟取其偽取其讟取其妄取其誣取其詐取其譎取其訕取其詭取其􅀈取其邪取其慝取其蠱所以待姦回取其危取其圯取其撓取其覆取其敗取其斁所以待覆亡取其懦取其疵取其饕所以待貪鄙蘇氏去其名之不能舉其人之要者八今取其退取其訥所以待恬退之士取其修取其訓所以待禮法之人蘇氏去其鄙陋不足以訓者十有一今取其偲取其逑為靖専者備也蘇氏去其泛濫不可指明善惡之狀者七今取其懋為黽勉者備也取其宜為中庸者備也蘇氏去其重複而無益於用者五十七今取其哲有異於智也取其察有異於明也取其通有異於敏也取其儀有異於穆也取其經有異於憲也取其庇有異於禮也取其協有異於順也取其端有異於直也取其費有異於夸也取其休取其悦有異於凱也取其綽取其容有異於寛也取其確取其恒有異於介也取其熙取其洽有異於和也後論第三蘇氏於百六十八諡之外有七去三百十一條之中有六類七去者削其文六類者易其義臣今此書只以文顯不用義説故於六類亦無所用但第四類中比儉二義於文未安不得不為之説儉乃㳟儉之儉比乃協比之比儉也比也古之美諡也蘇氏引儉則固之義而更之曰菲薄廢禮曰儉引君子周而不比之義而更之曰事君有黨曰比以比儉二諡内於惡徳此臣之所不取也儉若為惡徳則夫子溫良恭儉之儉其將何處比若為惡徳則協比其鄰婚姻孔云之比其將何為若之何以不中禮之儉為儉朋比之比為比乎臣今易置從古道也後論第四語曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也然則文子之諡初無諡法仲尼則因問而即其人之行事以釋之柰何先立其法必使人之曲中也規矩本為方圓設而非豫為大小劑量使制器者範圍於此况所作之法只採經𫝊之言其間有大不通理處子曰敏而好學不恥下問是以謂之文而云敏而好學曰文可也孟子曰陳善閉邪謂之敬而云陳善閉邪曰敬可也易之益曰君子見善則遷有過則改而云遷善改過曰益可也左氏曰共用之謂勇而云率義其用曰勇可也柰何詩曰哿矣能言巧言如流曰哿可乎書曰賓于四門四門穆穆而云闢于四門曰穆可乎𫝊曰季子生而有文在其手曰友遂命之而云有文在手曰友何義也書曰乃聖乃神乃武乃文而云乃聖乃神曰武何義也詩序曰太平之君子能持盈守成而云持盈守滿曰成何義也至於終始如一者則謂之終為人所渴望者則謂之渴於義安乎取並后匹嫡之義而為並取牝雞之晨惟家之索義而為索是可用乎千百年間學者見之禮官博士行之而斷無以為非者通志卷四十六
