body:
  text: 通志卷一百四十九宋右迪功郎鄭樵漁仲撰列傳第六十二後魏王慧龍子寶興子寶興子瓊瓊遵業鄭羲子懿昭懿弟道昭道子嚴祖嚴祖子仲禮曾羲兄孫伯猷羲兄孫先護薛辨父強古辨子謹子謹子初拔拔允拔拔弟子驎駒聰驎駒子慶之弟湖湖子聰子孝通韓茂子均皮豹子子懷喜封敕文吕羅漢孔伯恭田益宗孟表奚康生楊大眼崔延伯李叔仁裴駿子修莊修子詢從修弟宣宣子伯駿弟安祖裴延俊從叔子夙從祖弟良祖良從父兄子慶孫子延俊從弟仲規仲規弟景融薛真度子懷吉劉休賓子文曄房法壽族子景伯景景伯弟景先景遠伯子文烈畢衆敬子元賓羊深深弟侃父深子肅深叔靈引韓麒麟孫子熙子顯宗程駿李彪子志髙道悅甄琛子侃弟侃弟楷纂琛從父密張髙聰王慧龍太原晉陽人晉尚書僕射愈之孫散騎常侍郎緝之子也幼聰慧愈以為諸孫之龍故名焉初宋武微時愈不為之禮及得志愈合家見誅慧龍年十四為沙門僧彬所匿因將過江津人見其行意匆匆疑為王氏子孫彬稱為受業者乃免既濟遂西上江陵依叔祖忱故吏荆州前中從事習辟強時刺史魏詠之卒辟強與江陵令羅修前别駕劉期公土人王騰等謀舉兵推慧龍為盟主克日襲州城而宋武聞詠之卒亦慮江陵有變遣其弟道規為荆州衆遂不果羅修等將慧龍又與僧彬北詣襄陽晉雍州刺史魯宗之資給慧龍送渡江遂奔姚興其自言也如此姚泓滅慧龍歸魏明元引見與言慧龍請效力南討言終俯而流涕天子為之動容謂曰朕方混一車書席卷吳會卿情計如此豈不能相資以衆乎然亦未之用後拜洛陽鎮將鎮金墉會明元􅀢太武初即位咸謂南人不宜委以師旅之任遂停前授初崔浩弟恬聞慧龍王氏子以女妻之浩既婚姻及見慧龍曰信王家兒也王氏世齇鼻江東謂之齇王慧龍鼻漸大浩曰真貴種矣數向諸公稱其美司徒長孫嵩聞之不悅言於太武以其嗟服南人則有訕鄙國化之意太武怒召浩責之浩免冠陳謝得釋慧龍由是不調久之除樂安王範傅領并荆揚三州大中正慧龍抗表願得南垂自效崔浩固言之乃授南蠻校尉安南大將軍左長史及宋荆州刺史謝晦起兵江陵引慧龍為援慧龍督司馬靈壽等一萬人拔其思陵戍進圍項城晦敗乃班師後宋將王元謨寇滑臺詔假慧龍楚兵將軍與安頡等同討之相持五十餘日諸將以賊盛莫敢先慧龍設竒兵大破之太武賜以劒馬錢帛授龍驤將軍賜爵社長侯拜滎陽太守仍領長史在任十年農戰並修大著聲績招攜邊遠歸附者萬餘家號為善政其後宋將到彥之檀道濟頻頓淮潁大相侵掠慧龍力戰屢摧其鋒彥之與友人蕭斌書曰魯軌頑鈍馬楚粗狂亡人之中唯王慧龍及韓延之可為深憚不意儒生懦夫乃令老子訝之宋文縱反間云慧龍自以功髙而位不至欲引寇入邊因執安南大將軍司馬楚之以叛太武聞曰此必不然是齊人忌樂毅耳乃賜慧龍璽書曰義隆畏將軍如虎欲相中害朕自知之風塵之言想不足介意也宋文計既不行復遣刺客吕元伯購慧龍首二百户男絹一千匹元伯為反間來屏人有所論慧龍疑之使人探其懷有尺刀元伯叩頭請死慧龍曰各為其主也吾不忍害此人左右皆言義隆賊心未已不殺元伯無以創將來慧龍曰死生有命彼亦安能害我且吾方以仁義為干鹵又何憂乎刺客遂捨之時人服其寬恕慧龍自以遭難流離常懷憂悴乃作祭伍子胥文以寄意焉生一男一女遂絶房室布衣蔬食不參吉事舉動必以禮太子少傅遊雅言於朝曰慧龍古之遺孝也撰帝王制度十八篇號曰國典太平真君初拜使持節寧南將軍虎牢鎮都副將未至鎮而卒臨沒謂功曹鄭曄曰吾羇旅南人恩非舊結蒙聖朝殊特之慈得在疆場效命誓願鞭尸吳市戮墳江隂不謂嬰此重疾有心莫遂非唯仰愧國靈實亦俯慙后土修短命也夫復何言身歿後乞葬河內州縣之東鄉依古墓而不墳足藏髮齒而已庶其魂而有知猶布結草之報時制南人入國者皆葬桑乾曄等申遺意詔許之贈安南將軍荆州刺史諡穆侯吏民及將士共於墓所起佛寺圖慧龍及僧彬像而讚之吕元伯感全宥之恩留守墓側終身不去子寶興襲爵寶興少孤事母至孝尚書盧遐妻崔浩女也初寶興母及遐妻俱孕浩謂曰汝等將來所生皆我之自出可指腹為親及昏浩為撰儀躬自監視謂諸客曰此家禮事宜盡其美及浩被誅盧遐後妻寶興從母也緣坐沒官寶興亦逃避未幾得出盧遐妻時官賜度斤度斥鎮髙車滑骨寶興盡賣貨産自出塞贖之以歸州辟中從事别駕舉秀才皆不就閉門不交人事襲爵封長社侯龍驤將軍卒子瓊襲爵瓊字世珍孝文賜名焉太和九年為典寺令十六年降侯為伯帝納其長女為嬪拜前將軍并州大中正正始中為光州刺史有受納響為中尉王顯所劾終得雪免神龜中除左將軍兖州刺史去州歸京多年沈滯所居在司空劉騰宅西騰雖勢傾朝野初不候之騰既權重吞并鄰宅增廣舊居唯瓊終不肯與以此久見屈抑瓊女適范陽盧道亮不聽歸其夫家女卒哀慟無已瓊仍葬之别所冢不即塞常於壙內哭泣久之乃掩當時深怪之加以聾疾每見道俗乞丐無已造次見之令人笑愕道逢太保廣平王懷據鞍抗禮自言馬瘦懷即以所乘馬并乘具與之嘗詣尚書令李崇騎馬至其黃閣見崇子世哲直問繼伯在不崇趨出瓊乃下崇好以紙帖衣領瓊哂而掣去之瓊見崇小子青肫盛服就褫之崇亦不恨領軍元義使奴遺瓊馬瓊并留奴王誦聞之笑曰東海之風於茲墜矣孝昌三年除鎮東將軍金紫光祿大夫中書令時瓊子遵業為黃門郎故有此授卒贈征北將軍中書監并州刺史自慧龍入國三世一身至瓊始有四子長子遵業風儀清秀涉歷經史位著作佐郎與司徒左長史崔鴻同撰起居注遷右軍將軍兼散騎常侍慰勞蠕蠕乃詣代京采拾遺文以補起居所闕與崔光安豐王延明等參定服章及光為孝明講孝經遵業預講弟延業録義並應詔作釋奠侍宴詩時人語曰英英濟濟王家兄弟轉司徒左長史黃門郎監典儀注遵業有譽當時與中書令陳郡袁翻尚書琅邪王誦並領黃門郎號曰三哲時政歸門下世謂侍中黃門為小宰相而遵業從容恬素若處邱園嘗著穿角履好事者多毁新履以學之以胡太后臨朝天下方亂謀避地自求除州太后曰王誦罷幽州始作黃門卿何乃欲除州也更待一二年當有好處分遵業兄弟並交遊時俊乃為當時所美及爾朱榮入洛兄弟在父喪中以於莊帝有從姨兄弟之親相率奉迎俱見害河隂議者惜其人才而譏其躁競贈并州刺史著三晉記十卷行於世子松年仕齊位散騎常侍齊史有傳遵業弟廣業性沈雅涉歷書傳位太尉祭酒遷屬卒於太中大夫贈徐州刺史子乂有儀望以幹用見稱卒於南巨鹿太守廣業弟延業博學多聞頗有才藻位中書郎河隂之役遂亡骸骨又無子贈齊州刺史延業弟季和位書侍御史并州大中正贈華州刺史鄭羲字幼麟滎陽開封人魏將作大匠渾之八世孫也曾祖豁慕容垂太常卿父曄不仕娶長樂潘氏生六子粗有志氣而羲第六文學為優弱冠舉秀才尚書李孝伯以女妻之文成末拜中書博士天安初宋司州刺史常珍竒據汝南來降獻文詔殿中尚書元石為都將赴之遣羲參石軍事到上蔡珍竒率文武三百人來迎既相見議欲頓軍汝北未即入城羲謂石曰機事尚速今珍竒雖來意未可量不如直入其城奪其管籥據有府庫雖出珍竒非意要以全制為勝石從羲言遂䇿馬徑入其城城中尚有珍竒親兵數百人在珍竒宅內石既克城意益憍忌置酒嬉戲無警防之虞羲勸嚴兵設備以待非常其夜珍竒果使人燒府欲因救火作難以石有備乃止明旦羲齎白虎幡安慰郭邑衆心乃定明年又引軍東討汝隂宋汝隂太守張超城守不下石攻之不克議欲還軍長社待秋擊之羲曰今超驅市人命不延月宜安心守之超食已盡不降當走而欲棄還長社超必修城深塹多積薪穀將來恐難圖矣石不納遂旋師長社至冬復往攻超超果設備無功而還歷年超死楊文長代戍食盡城潰乃克之竟如羲䇿淮北平遷中書侍郎延興初陽武人田智度年十五妖惑動衆擾亂京索以羲河南人望為州郡所信遣乘傳慰喻羲到宣示禍福衆皆散智度尋見禽斬以功賜爵泰昌男孝文初兼員外散騎常侍寧朔將軍陽武子使於宋中山王睿寵幸當世並置王官羲為其傅是後歷年不轉資産亦乏因請假歸遂盤桓不返及李沖貴寵與羲昏姻乃就家徵為中書令文明太后為父燕宣王立廟於長安初成以羲兼太常卿假滎陽侯具官屬詣長安拜廟建碑於廟門還以使功仍賜侯爵出為西兖州刺史假南陽公羲多所受納政以賄成性又嗇吝人有禮餉者不與柸酒臠肉而西門受羊酒東門沽賣之以李沖之親法官不之糾也酸棗令鄭伯孫鄄城令董騰别駕賈懷德中從事申靈度並在任亷貞勤恤百姓羲皆申表稱薦時論多之文明太后為孝文納其女為嬪徵為祕書監太和十六年卒尚書奏諡曰宣詔曰蓋棺定諡先典成式激揚清濁政道明範羲雖宿有文業而政闕亷清尚書何乃情遺至公愆違明典依諡法博聞多見曰文不勤成名曰靈可贈以本官加諡文靈長子懿字景伯涉歷經史位太子庶子襲爵滎陽伯懿間雅有政事才為孝文所器遇拜長兼給事黃門侍郎司徒左長史宣武初以從弟思和同咸陽王禧逆與弟通直常侍道昭俱坐緦親出禁拜太常少卿出為齊州刺史懿好勸課善斷決雖不清潔義然後取百姓猶思之卒贈兖州刺史諡曰穆子恭業襲爵武定三年坐與房子遠謀害齊神武伏誅懿弟道昭字僖伯少好學綜覽羣言兼中書侍郎從征沔北孝文饗侍臣於縣瓠方丈竹堂道昭與兄懿俱侍坐樂作酒酣孝文歌曰白日光天兮無不曜江左一隅獨未照彭城王協續曰願從聖明兮登衡會萬國馳誠混日外鄭懿歌曰雲雷大振兮天門闢率土來賓一正厯邢巒歌曰舜舞干戚兮天下歸文德遠被莫不思道昭歌曰皇風一鼓兮九地匝戴日依天清六合孝文又歌曰遵彼汝墳兮昔化貞未若今日道風明宋辨歌曰文王政教暉江沼寧如大化光四表孝文謂道昭曰自此遷豫雖猥與諸才俊不廢詠綴未若今日遂命邢巒記之又曰當爾之年卿頻丁艱私每眷文席常用慨然尋正除中書郎纍遷國子祭酒廣平王懷為司州牧以道昭與宗正卿元匡為州都督道昭上表曰臣聞唐虞啓運以文德為本殷周創業以道藝為先然則禮樂者為國之基不可斯須廢也伏惟大魏定鼎伊瀍惟新寶厯九服感至德之和四垠懷擊壤之慶而蠢爾閩吳阻化江湫先帝爰震武怒戎車不息而停鑾駐蹕留心典墳命故御史中尉臣李彪與吏部尚書任城王臣澄等妙選英儒以崇學校澄等依旨置四門博士四十人其國子博士太學博士及國子助教宿已簡置伏尋先旨意在速就但軍國多事未遑營立自爾迄今垂將一紀學官雕落四術寢廢遂使碩儒耆德卷經而不談俗學後生遺本而逐末進競之風實由於此矣伏惟陛下欽明文思元覽洞遠垂心經素優柔墳籍屢發中旨敦營學館房宇既修生徒未立臣往年刪定律令謬預議筵謹依凖前修尋訪舊事參定學令事訖封呈請早勑施行使選授有依生徒可凖詔褒美之而尚未允遂道昭又表曰臣自往年以來頻請學令並置生員前後纍上未蒙一報當以臣識淺濫官無能有所感悟者也館宇既修生房粗構博士見員足可講習雖新令未班請依舊權置國子學生漸開訓業使播教有章儒風不墜至若孔廟既成釋奠告始揖讓之容請俟令出不報遷祕書監滎陽邑中正出歷兖青二州刺史復入為祕書監卒諡曰文恭道昭好為詩賦凡數十篇其在二州政務寬厚不任威刑為吏人所愛子嚴祖頗有風儀粗觀文史輕躁薄行不修士業孝武時御史中尉綦俊劾嚴祖與宋氏從姊姦通人士咸耻言之而嚴祖聊無愧色孝靜初除驃騎將軍左光祿大夫鴻臚卿出為北豫州刺史還除鴻臚卿卒贈司空公庶子仲禮少輕險有膂力齊神武嬖寵其姊火車以親戚被昵擢為帳內都督掌神武弓矢出入隨從與任胄俱好酒不憂公事神武責之胄懼潛通西魏為人糾告懼遂謀逆事發火車欲乞哀神武避不見賴武明皇后及文襄爭為言故仲禮死而不及其家嚴祖更無子弟敬祖以子紹元嗣紹元小字安都位太尉咨議趙郡太守卒子翻仕齊司徒記室參軍尋遇齊亡歷周隋遂隱居不仕列在隱逸傳中翻二弟子騰天壽俱仕隋子騰位蔣州司馬天壽開府參軍並以雅素見稱敬祖起家著作郎敬祖子元禮敬祖弟述祖皆仕齊列在齊史羲長兄白驎次小白次洞林次叔夜次連山並恃豪門多行無禮鄉黨之內疾之若讎小白位中書博士子允伯有當世器幹孝文納其女為嬪位東徐州刺史卒於鴻臚少卿諡曰簡子希俊未官而卒子道育武定中開封太守希俊弟幼儒好學修謹丞相髙陽王雍以女妻之位司州别駕有當官稱卒贈散騎常侍兖州刺史諡曰肅幼儒亡後妻淫蕩凶悖肆行無禮幼儒時望甚優其從兄伯猷每謂所親曰從弟人才足為令德不幸得如此婦今死復重死可為悲歎幼儒子敬道敬德俱仕西魏敬道位巴開新三州刺史敬道子正則仕周復州刺史允伯弟平城廣陵王羽納其女為妃位東平原太守性猜狂使酒為政貪殘卒贈南青州刺史長子伯猷博學有文才早知名舉司州秀才歷太學博士領殿中御史與當時名勝咸申遊欵眀帝釋奠詔伯猷録義後為尚書外兵郎中典起居注以軍功賜爵陽武子節閔帝時以舅氏超授征東將軍金紫光祿大夫領國子祭酒轉護軍將軍賜爵武成子元象初以本官兼散騎常侍使梁前後使人梁武令其侯王於馬射之日宴對申禮伯猷之行梁武令其領軍將軍臧盾與之接議者以此貶之使還除南青州刺史在官貪婪妻安豐王元延明女專為聚斂貨賄公行潤及親戚戶口逃散邑落空虛及誣陷良善云欲反叛籍其資財盡以入已誅其丈夫婦女配沒百姓寃苦聲聞四方為御史紏劾死罪數十條遇赦免因以頓廢齊文襄作相每誡厲朝士常以伯猷及崔叔仁為喻武定七年除太常卿卒贈驃騎大將軍中書監兖州刺史子藴太子舍人陽夏太守伯猷弟仲衡武定中儀同開府中郎仲衡弟輯之司徒咨議齊大寧中以軍功賜爵成臯男位金紫光祿大夫東濟北太守肥城戍主卒贈度支尚書豫州刺史輯之弟懷孝司徒咨議齊太寧中仁州刺史洞林子敬叔滎陽邑中正濮陽太守坐貪穢除名子籍字承宗平東府長史籍弟瓊字祖珍有強幹稱位范陽太守頗有聲卒孝昌中弟儼寵要重贈青州刺史瓊兄弟雍睦其諸娣姒亦咸相親愛閨門之內有無相通為時人所稱美子道雍周少司空周史有傳儼得幸於靈太后列在幸佞傳中子文寬從武帝西入關敬叔弟子恭燕郡太守孝昌中因儼勢除衛尉少卿遷衛將軍左光祿大夫卒後贈尚書右僕射諡曰貞叔夜子伯夏位東萊太守卒贈青州刺史伯夏弟謹字仲恭琅邪太守性嚴暴撾撻僮僕酷過人理父子一時為奴所害斷首投馬槽下乘馬北逃其第二子思明驍勇善騎射被髮率衆馳追之及河奴乘馬投水思明止所將從自射之一發而中落馬墮流禽至家臠殺之思明弟思和並以武力自效思明位直閣將軍坐弟思和同元禧逆徙邊會赦免卒後贈濟州刺史子先護少有武幹莊帝之居藩也先護得自結託及爾朱榮稱兵向洛靈太后令先護與鄭季明等守河梁先護聞莊帝即位於河北遂開門納榮以功封平昌縣侯廣州刺史元皓入洛莊帝北巡先護據州起義兵不受命莊帝還京進爵郡公歷東雍豫二州刺史兼尚書右僕射及爾朱榮死徐州刺史爾朱仲遠擁兵向洛詔先護與都督賀拔勝行臺楊昱同討之聞京師不守先護部衆逃散因奔梁尋歸為仲遠所害孝武初贈使持節都督四州刺史子偉周世有功歷位華州刺史有傳薛辨字允白河東汾隂人也曾祖興晉尚書右僕射冀州刺史安邑公諡曰莊祖濤襲爵位梁州刺史諡曰忠惠京師傾覆皆以義烈著聞父強字威明幼有大志懷軍國籌略與北海王猛同志友善及桓溫入關中猛以葛巾謁之溫曰江東無卿比也秦國定多竒士如生輩尚有幾人吾欲與之俱南猛曰公求可與撥亂濟時者友人薛威明其人也溫曰聞之久矣方致朝命強聞之自商山來謁與猛皆署軍謀祭酒強察溫有大志而無成功乃勸猛止俄而溫敗及苻堅立猛見委任其平陽公融為書將以車馬聘強猛以為不可屈乃止及堅如河東伐張平自與數百騎馳至強壘下求與相見強使主簿責之因慷慨宣言曰此城終無生降之臣但有死節之將耳堅諸將請攻之堅曰須吾平晉自當面縛捨之以勸事君者後堅伐晉軍敗強遂總宗室強兵威振河輔破慕容永於陳川姚興聞而憚之遣使重加禮命徵拜右光祿大夫七兵尚書封馮翊郡公轉左戶尚書年九十八卒贈輔國將軍司徒公諡曰宣辨幼而俊爽俶儻多大略由是豪傑多歸慕之強卒復襲統其營仕姚興歷太子中庶子河北太守辨知姚氏運衰遂棄歸保鄉邑及晉將劉裕平姚泓即署相國掾尋除平陽太守委以北道鎮捍及長安失守辨遂歸魏仍立功於河際位平西將軍東雍州刺史賜爵汾隂侯其年詣闕明元深加器重明年方得旋鎮帝謂之曰朕委卿西蕃志在關右卿宜克終良算與朕為長安主人辨既還任務農教戰恆以數千之衆摧抗赫連氏帝甚嘉奬之又除并州刺史徵授大羽鎮將泰恆七年卒於官帝以所圖未遂深悼惜之贈并雍二州刺史子謹字法順容貌魁偉高才博學隨劉昶渡江位府記室參軍辨將歸魏密報謹謹遂亦來奔授河東太守後襲爵汾隂侯始光三年與宜都王奚斤共討赫連昌禽其東平公乙兜克蒲坂遂以新舊百姓并為一郡除平西將軍復為太守神麚三年除使持節秦州刺史山胡白龍憑險作逆太武詔南陽公奚眷與謹並為都將討平之封涪陵郡公太延初征吐沒骨平之謹自郡遷州威恩兼被風化大行時兵荒之後儒雅道息謹命立庠序教以詩書三農之暇悉令受業躬巡邑里親加考試河汾之地儒道更興太平真君初徵授內都坐大官輔政深見賞重每訪以政道車駕臨幸者前後數四後從駕北討與中山王辰等後期見殺尋贈鎮西將軍秦雍二州刺史諡曰元公長子初古拔一曰車轂拔本名洪祚太武賜名焉沈毅有器識弱冠司徒崔浩見而竒之太平真君中蓋吳擾動關右薛永宗屯據河側太武親討焉詔拔紏合宗鄉壁於河際斷二寇往來之路事平除中散賜爵永康侯太武南討以拔為都將從駕臨江而還又共陸真討反氐仇傉檀強免生平之皇興三年除散騎常侍尚文成女西河長公主拜駙馬都尉其年拔族叔徐州刺史安都據城歸順勑拔詣彭城勞迎除南豫州刺史延興二年除鎮西大將軍開府儀同進爵平陽公三年拔與南兖州刺史遊明根南平太守許含等以善政徵詣京師獻文親自勞勉復令還州太和六年改爵河東公卒贈左光祿大夫諡曰康長子允字寧宗少有父風弱冠拜中散襲爵鎮西大將軍河東公除懸瓠鎮將尋授持節義陽道都將後除立忠將軍河北太守郡帶山河俗多盜賊有韓馬兩姓各十餘家恃強憑險最為狡害劫掠道路侵暴鄉閭允至郡即收其姦魁二十餘人一時戮之於是羣盜懾氣郡中清肅卒於郡諡曰敬子裔字豫孫襲爵性豪爽盛營園宅賓客聲妓以恣嬉遊卒於洛州刺史子孝紳襲爵位太中大夫孝紳立行險薄坐事為河南尹元世俊所劾死後贈華州刺史拔弟洪隆字菩提位河東太守長子驎駒好讀書舉秀才除中書博士齊使至詔驎駒兼主客郎以接之卒贈河東太守諡曰宣始拔尚河西主有賜田在馮翊驎駒徙居之遂家於馮翊之夏陽長子慶之字慶集頗有學業間解几案位廷尉丞廷尉寺鄰北城曾夏日寺傍得一狐慶之與廷尉正博陵崔纂或以城狐狡害宜速殺之或以長育之月宜待秋分二卿裴延俊袁翻互有同異雖曰戲謔詞義可觀事傳於世後兼左丞為并肆行臺賜爵龍邱子行滄州刺史為葛榮攻圍城陷尋患卒贈華州刺史慶之弟英集性通率隨舅李崇在揚州以軍功至治書侍御史通直散騎常侍卒英集子端仕周位基州刺史自有傳洪隆弟湖字破胡少有節操篤志於學専精講習不干時務與物無競好以德義服人或有兄弟忿鬩鄰里爭訟者恐湖聞之皆內自改悔鄉里化其風教咸以敬讓為先三召州都再辟主簿州將傾心致禮並不獲已而應之為本州中從事别駕除河東太守兄弟並為本郡當世榮之復受詔為仇池都將後罷郡終於家有八子長子聰知名聰字延智方正有理識善自摽致不妄遊處雖在暗室終日矜莊見者莫不凛然加敬博覽墳籍精力過人至於前言往行多所究悉詞辨占對尤是所長遭父憂廬於墓側哭泣之聲酸感行路友于篤睦而家教甚嚴諸弟雖昏官恆不免杖罰對之肅如也未弱冠州辟主簿太和十五年釋褐著作佐郎于時孝文留心氏族正定官品士大夫解巾優者不過奉朝請聰起家便佐著作時論美之後遷書侍御史凡所彈劾不避強禦孝文或欲寬貸者聰輒爭之帝每云朕見薛聰不能不憚何况諸人也自是貴戚斂手纍遷直閣將軍兼給事黃門侍郎散騎常侍直閣如故聰深為孝文所知外以德器遇之內以心膂為寄親衛禁兵委聰管領故終太和之世恆帶直閣將軍羣臣罷朝之後聰恆陪侍帷幄言兼晝夜時政得失預以謀謨動輒匡諫事多聽允而重厚沈密外莫窺其際帝欲進以名位輒苦讓不受帝亦雅相體悉謂之曰卿天爵自髙固非人爵之所榮也又除羽林監帝曾與朝臣論海內姓地人物戲謂聰曰世人謂卿諸薛是蜀人定是蜀人不聰對曰臣遠祖廣德世仕漢朝時人呼為漢臣九世祖永隨先主入蜀時人呼為蜀臣今事陛下是虜非蜀也帝撫掌笑曰卿幸可自明非蜀何乃遂復苦朕聰因投戟而出帝曰薛監醉耳其見知如此二十三年從駕南征兼御史中尉及宣武即位除都督齊州刺史政存簡靜卒於州吏民追思留其所坐榻以存遺愛贈征虜將軍華州刺史諡曰簡懿侯魏前二年重贈車騎大將軍儀同三司延州刺史子孝通最知名孝通字士達博學有俊才蕭寶夤征關中引參驃騎大將軍府事禮遇甚隆及寶夤將有異志孝通悟其萌託以拜掃求歸乃見許同寮咸怪止之但笑而不答遽歸鄉里寶夤後果逆命北海王元皓入洛宗人薛永宗修義等又聚徒作亂欲以應之孝通與所親計曰北海乘虛遠入吳兵不能久住事必無成今若與永宗等同舉滅族道也乃率其近親與河東太守元襲嬰城固守及寶夤平定元皓退走預其事者咸罹禍唯同孝通者皆免事寧入洛除員外散騎侍郎爾朱天光鎮關右表為關西大行臺郎中深見任遇關中平定預有其功以功賜爵汾隂侯莊帝既幽崩元曄地又疏遠更議主社稷孝通以廣陵王恭髙祖猶子又在茂親夙有令望不言多載理必陽瘖奉以為主天人允叶世隆等並以為疑孝通密贊天光察之廣陵王曰天何言哉於是定册即節閔帝也以首創大義拜銀青光祿大夫散騎常侍兼中書舍人封藍田縣子孝通求以官贈亡兄景懋又言已有侯爵請轉授兄息子舒節閔覽啓傷感以侯爵既重不容轉授乃下詔褒美特贈景懋撫軍北雍州刺史孝通尋遷中書郎深為節閔所知重普泰二年正月乙酉中書舍人元翽獻酒肴帝因與元翌及孝通等宴兼奏絃管命翽吹笛帝亦親以和之因使元翌等嘲以酒為韻孝通曰既逢堯舜君願上萬年壽帝曰平生好元默慙為萬國首帝曰卿所謂壽豈容徒然便命酌酒賜孝通仍命更嘲不得中絶孝通即豎忠為韻帝曰卿不忘忠臣之心翽曰聖主臨萬機享世永無窮孝通曰豈唯被草木方亦及昆蟲翌曰朝賢既濟濟野苖又芃芃帝曰君臣體魚水書軌一華戎孝通曰微臣信慶渥何以答華嵩于時孝通內典機密外參朝政軍國動靜預以謀謨加以汲引人物知名之士多見推薦外兄裴伯茂豪俊多所輕忽唯欽賞孝通每有著述共參同異孝通以裴宏放過甚每謂之曰兄以阮籍嵇康何如管仲樂毅蓋自許經綸抑裴傲也裴笑而不答宏放自若屬齊神武起兵河朔攻陷相州刺史劉誕爾朱天光自關中討之孝通以關中險固秦漢舊都須預謀鎮遏以為後計縱河北失利猶足據之節閔深以為然問誰可任者孝通與賀拔嶽同事天光又與周文有舊二人並先在關右因並推薦之乃超授嶽岐華秦雍諸軍事關西大行臺雍州牧周文為左丞孝通為右丞齎詔書馳驛入關授嶽等同鎮長安嶽深相器重待以師友之禮與周文結為兄弟情寄特隆後天光敗於韓陵節閔遂不得入關為齊神武幽廢孝武帝即位後神武方得志徵賀拔嶽為冀州刺史嶽懼欲單馬入朝孝通乃謂嶽曰高王以數千鮮卑破爾朱百萬之師其鋒誠亦難敵然公兩兄太師領軍宿在其上侯深樊子鵠賈知斛斯椿大野胡也杖吒吕延慶之徒於爾朱之世皆其夷等韓陵之役此輩前後降附皆由事危勢逼非其本心在於高王曹操之孔融馬懿之葛誕今或在京師或據州鎮除之又失人望留之為腹心之疾雖令孫騰在闕下婁昭處鉤陳必不能如建安之時明矣以今觀之隙難未已吐萬仁雖復退逸猶在并州高王之計先須平殄今方綏撫羣雄安置內外何能去其巢穴與公事關中地也且六郡良家之子三輔禮義之人踰幽并之驍騎勝汝潁之竒士也皆繫仰於公效其智力據華山以為城雉因黃河而為池塹退守不失封泥進兵同於建水乃欲束手受制於人不亦鄙乎言未卒嶽執孝通手曰君言是也乃遜辭為啓而不就徵太昌元年孝通因使入朝仍被留京師重除中書侍郎永熙三年三月出為恆山太守仍以經節閔任遇故也及孝武西遷或稱孝通與周文友密及樹置賀拔嶽鎮關中之計遂見拘執將赴晉陽及引見咸為之憂孝通神氣從容辭理切直齊神武更相欽歎即日原免然猶致疑忌不加位秩但引為坐客時訪文典大事而已齊神武讓劒履上殿表猶使為文曾與諸人同詣晉祠皆屈膝盡禮孝通獨捧手不拜顧而言曰此乃諸侯之國去吾何遠恭而非禮將為神笑拜者慙焉興和二年卒於鄴魏前二年周文追軫舊好奏贈車騎將軍儀同三司青州刺史齊武平初又贈鄭州刺史文集八十卷行於時子道衡隋史有傳韓茂字元興安定安武人也父耆字黃耇永興中自赫連屈丐來降位恆山太守假安武侯仍居恆山之九門卒贈涇州刺史諡曰成茂年十七膂力過人尢善騎射明元曾親征丁零翟猛茂為中軍執幢時大風諸軍旌旗皆偃仆茂於馬上持幢初不傾倒帝異而問之謂左右曰記之尋徵詣行在所以為虎賁郎將後從太武討赫連昌大破之以功賜爵蒲隂子遷侍輦郎又從破統萬平平涼當茂所衝莫不應弦而殪拜內侍長進爵九門侯後從征蠕蠕頻戰大捷與樂平王丕等伐和龍茂為前鋒都將戰功居多遷司衛監録前後功拜散騎常侍殿中尚書進爵安定公從破薛永宗蓋吳轉都官尚書從車駕南征拜徐州刺史還拜侍中尚書左僕射文成踐阼拜尚書令加侍中征南大將軍茂沈毅篤實雖無文學每議論合理為將善於撫衆勇冠當世為朝廷所稱太安二年領太子少師卒贈涇州刺史安定王諡曰桓長子備字延德賜爵行唐侯歷太子庶子寧西將軍典遊獵曹加散騎常侍襲爵安定公征南大將軍卒贈雍州刺史諡曰簡備弟均字天德少善射有將略初為中散賜爵范陽子遷金部尚書加散騎常侍兄備卒無子均襲爵安定公征南大將軍歷定青冀三州刺史甚有清譽廣阿澤在定冀相三州界土曠人稀多有寇盜乃置鎮以靜之以均在冀州劫盜止息除大將軍廣阿鎮大將加都督三州諸軍事均清身率下禁斷姦邪於是趙郡屠各西山丁零聚黨山澤以劫害為業者均皆誘慰追捕遠近震局先是河外未賔人多去就故權立東青州為招懷之本新附人咸受優復然舊人姦逃者多往投焉均表陳非便朝議罷之後均所統劫盜頗起獻文詔書讓之又以五州人戶殷多編籍不實詔均檢括出十餘萬户復授定州刺史百姓安之卒諡康公皮豹子漁陽人也少有武略泰恆中為中散太武時為散騎常侍賜爵新安侯又拜選部尚書後除開府儀同三司進爵淮陽公鎮長安坐盜官財徙於統萬太平真君三年宋將裴方明等侵南秦王楊難當遂陷仇池太武徵豹子復其爵位尋拜使持節仇池鎮將督關中諸軍與建興公古弼等分命諸將十道並進四年正月豹子進擊樂鄉大破之宋使其秦州刺史胡崇之鎮仇池至漢中聞官軍已西懼不敢進豹子與司馬楚之至濁水擊禽崇之盡虜其衆仇池平未幾諸氐復推楊文德為主以圍仇池古弼討平之時豹子次下辨聞圍解欲還弼使謂豹子曰賊耻其負敗必求報復不如陳兵以待之豹子以為然尋除都督秦雍荆梁益五州諸軍事進號征西大將軍開府仇池鎮將持節公如故宋復遣楊文德薑道盛冦濁水别遣將青陽顯伯守斧山以拒豹子濁水城兵射殺道盛豹子至斧山斬顯伯悉俘其衆初南秦王楊難當歸命詔送楊氏子弟詣京師文德以行賂得留出奔漢中宋以文德為武都王守葭蘆城招誘氐羌於是武都隂平五部氐人叛應文德詔豹子討之文德阻兵固險以拒豹子文德將楊高來降文德棄城南走收其妻子寮屬及故武都王保宗妻公主送京師宋白水太守郭啓元率衆救文德豹子大破之啓元文德走還漢中興安二年宋遣蕭道成等入漢中别令楊文德楊頭等率氐羌圍武都豹子分兵將救之聞宋人增兵益將表狀求助詔高平鎮將茍莫千率突騎二千以赴之道成等乃退徵豹子為尚書出為內都大官宋遣其將殷孝祖修兩當城於清東以逼南境天水公封敇文擊之不克詔豹子與給事中周邱等助擊之宋瑕邱鎮遣步卒五千助戍兩當豹子大破之追至城下其免者千餘人而已既而班師先是河西諸胡亡匿避命豹子討之不捷而還又坐免官尋以前後戰功復擢為內都大官卒文成追惜之贈淮陽王諡曰襄子道明襲道明第八弟懷喜文成以其名臣子擢為侍御中散遷侍御長孝文初吐谷渾拾夤部落飢窘侵掠澆河詔假平西將軍廣川公與上黨王孫觀討拾夤又以其父豹子昔鎮仇池有威信拜使持節侍中都督秦雍荆梁益五州諸軍事大將軍開府仇池鎮將假公如故懷喜至申布恩惠夷人大悅酋帥率戶歸附置廣業固道二郡以居之徵為南部尚書賜爵南康侯太和元年宋葭蘆戍主楊文度遣弟鼠據仇池詔懷喜討鼠鼠棄城走進次濁水遂軍於覆津文度將強大黑固守津道懷喜部分將士擊大黑走之追奔攻拔葭蘆城斬文度傳首京師詔慰勉之又詔於駱谷築城懷喜表求待來年築城詔責之曰若不時築築而不成成而不固以軍法繩之南天水人柳旃據嶮不順懷喜討滅之後為豫州刺史詔讓其在州寬怠以飲酒廢事威不禁下遣使就州決以杖罰卒諡曰恭公子承宗襲封敇文代人也本姓是賁祖豆開府冀青二州刺史關內侯父涅侍御長贈定州刺史章武侯諡曰隱敇文始光初為中散稍遷西部尚書出為使持節開府領護西夷校尉秦益二州刺史賜爵天水公鎮上邽詔敇文征吐谷渾慕利延兄子拾歸於枹罕衆少不利詔廣川公乙烏頭等二軍與敇文會隴右軍次武始拾歸夜遁敇文引軍入枹罕虜拾歸妻子及其人户分徙千家於上邽留烏頭守枹罕金城邊冏天水梁會謀反據上邽東城南城攻逼西城敇文先已設備賊乃退冏會復攻城氐羌一萬屯南嶺休官屠各及雜戶二萬餘人屯北嶺為冏等形援敇文設竒兵大破之斬冏衆復推梁會為主安豐公閭根率軍助敇文敇文又表求助未及報梁會欲謀逃遁先是敇文掘重塹於東城之外幾斷賊走路夜半會乃飛梯騰塹而走敇文先嚴兵於塹外拒鬬從夜至旦敇文謀於衆曰困獸猶鬬而况於人乃以白虎幡宣告賊衆若能歸降原其生命應時降者六百餘人會知人心沮壞於是分遁敇文縱騎騰躡死者太半略陽王元逹因梁會之亂聚黨攻城招引休官屠各之衆推天水休官王官興為秦地王敇文與臨淮公莫真討破之天安元年卒長子萬護讓爵於弟翰于時讓者唯萬護及元氏侯趙辟惡子元伯讓其弟次興朝廷義而許之吕羅漢本東平壽張人也其先石勒時徙居幽州祖顯字子明少好學性亷直鄉人有忿爭者皆就質焉慕容垂以為河間太守皇始初以郡降道武賜爵魏昌男拜巨鹿太守清身奉公妻子不免飢寒百姓頌之曰時惟府君克清克明緝我荒土人胥樂生願壽無疆以享長齡卒官父溫字晞陽善書好施有文武才略位上黨太守有能名卒贈豫州刺史野王侯諡曰敬羅漢仁厚篤慎弱冠以武幹知名父溫之為秦州司馬羅漢隨侍隴右氐楊難當冦上邽鎮將元意頭知羅漢善射共登西城樓令射難當隊將及兵二十三人應弦而殪賊衆轉盛羅漢曰今不出戰示敵以弱意頭善之即簡千餘人令羅漢出戰衆皆披靡難當大驚會太武賜難當璽書責其跋扈難當還仇池意頭具以狀聞徵為羽林郎上邽休官吕豐屠各王飛鹿等據嶮為逆詔羅漢討禽之後從征懸瓠以功遷羽林中郎幢將賜爵烏程子及南安王余立羅漢猶典宿衛文成之立羅漢有力焉加龍驤將軍仍幢將進爵野王侯拜司衛監遷散騎常侍殿中尚書進爵山陽公後為鎮西將軍秦益二州刺史時仇池氐羌反逼駱谷鎮將吳保元走登百頃請援於羅漢羅漢率步騎隨長孫觀掩擊氐羌大破之賊衆退散詔書慰勞之涇州人張羌郎聚衆千人州軍討之不能制羅漢擊禽之仇池氐羌叛逆其賊帥蛩亷苻欣等皆受宋官爵鐡劵略陽公伏阿奴為都將與羅漢赴討所在破之禽亷欣等秦益阻遠南連仇池西接赤水諸羌恃險數為叛逆自羅漢涖州撫以威惠西戎懷德土境帖然孝文下詔褒美之徵拜內都大官聽察多得其情卒官諡莊公長子興祖襲爵山陽公後例降為侯孔伯恭魏郡鄴人也父昭位侍中幽州刺史魯郡公卒諡曰康伯恭以父任拜給事中後賜爵濟陽男進彭城公獻文初宋徐州刺史薛安都以彭城內附宋遣張永沈攸之等擊安都安都請援獻文進伯恭號鎮東將軍副尚書尉元救之永與攸之棄船而走伯恭以書喻下邳宿豫城內時攸之吳喜公等率衆來援下邳屯軍焦墟曲去下邳五十餘里伯恭密造火車攻其營水陸俱進攸之等既聞將戰引軍退保樊階城宋寧朔將軍陳顯達領衆遡清而上以迎攸之屯于睢清合口伯恭率衆度水大破顯達攸之聞顯達軍敗順流退下伯恭從清西與攸之合戰大破之吳喜公輕騎遁走乘勝追奔八十餘里軍資器械虜獲萬計進攻宿豫宋戍將魯僧遵棄城夜遁又遣將孔大恆等南討淮陽宋太守崔武仲焚城南走遂據淮陽皇興二年以伯恭為散騎常侍彭城鎮將都督徐南北兖州諸軍事假東海公卒贈鎮東大將軍東海王諡曰桓伯恭弟伯遜襲父爵魯郡公位東萊鎮將東徐州刺史坐事免官卒于家田益宗光城蠻也身長八尺雄果有將略貌狀舉止有異常蠻世為四山蠻帥受制於齊太和十七年遣使張超奉表歸魏十九年拜員外散騎常侍都督南司州刺史光城縣伯食蠻邑一千户所統守宰任其銓置後以益宗既渡淮北不可仍為司州乃於新蔡立東豫州以益宗為刺史尋改封安昌縣伯景明初梁師寇三關益宗遣光城太守梅興之進至隂山關南據長風城逆擊大破之二十二年梁建寧太守黃天賜築城赤亭復遣其將黃公賞屯於漴城與長風相持益宗命安蠻太守梅景秀與興之掎角擊討破之獲其二城上表陳攻取之術宣武納之遣鎮南將軍元英攻義陽益宗遣其息魯生斷梁人糧運破梁戍主趙文興倉米運舟焚燒蕩盡時樂口已南郢豫二州諸縣皆沒於梁唯有義陽而已梁招益宗以車騎大將軍開府儀同三司五千户郡公當時安危在益宗去就而益宗守節不移郢豫克平益宗力也益宗年稍衰老聚斂無厭兵人患其侵擾諸子及孫競規賄貨部內苦之咸言欲叛宣武亦深慮焉乃遣中書舍人劉桃符宣旨慰喻庶以安之桃符還啓益宗侵掠之狀詔之曰聞卿息魯生在淮南貪暴橫殺梅伏生為爾不已損卿誠效可令魯生與使赴闕當加任使魯生久未至延昌中詔以益宗為使持節鎮東將軍濟州刺史常侍如故帝慮其不受代遣後將軍李世哲與桃符率衆襲之奄入廣陵益宗子魯生魯賢等奔於關南招引梁兵光城已南皆為梁所保世哲擊破之復置郡戍以益宗還授征南將軍金紫光祿大夫加散騎常侍改封曲陽縣伯益宗生長邊地不願內榮雖位秩崇重猶以為恨表陳桃符讒毁之狀詔曰既經大宥不容方更為獄熙平初益宗又表乞東豫以招二子靈太后令答不許卒贈征東大將軍郢州刺史諡曰莊少子纂襲位中散大夫卒贈東豫州刺史益宗長子隨興位弋陽東汝南二郡太守益宗兄興祖位江州刺史孟表字武達濟北蛇邱人也自云本屬北地號索里諸孟青徐內屬後表因事南渡仕齊為馬頭太守太和十八年表據郡歸魏除南兖州刺史領馬頭太守賜爵譙縣侯鎮渦陽後齊遣其豫州刺史裴叔業攻圍六十餘日城中食盡唯以朽革及草木皮葉為糧表撫循將士勠力固守會鎮南將軍王肅救之叔業乃退初有一南人自云姓邊字叔珍攜妻息從壽春投表未及送闕會叔業圍城表後察叔珍言色頗有異即推核乃是叔業姑兒規為內應所攜妻子並亦假妄於北門外斬之人情乃安孝文嘉其誠封汶陽縣伯歷濟州刺史散騎常侍光祿大夫齊州刺史卒贈兖州刺史諡曰恭奚康生河南陽翟人其先代人也本姓達奚世為部落大人祖真柔元鎮將內外三都大官賜爵長進侯卒贈幽州刺史諡曰簡康生少驍勇有武藝彎弓十石矢異常箭為當時所服太和初蠕蠕頻寇康生為前驅軍主頻戰陷陳壯氣有聞由是為宗子隊主從駕征鍾離駕旋濟淮五將未渡齊遣將據渚邀斷津路孝文勑曰能破中渚主賊者以為直閣將軍康生謂人曰如其捷也得暢名績脫若不捷命也在天丈夫今日何為不決遂應募縛筏積柴因風放火燒其船艦依煙直過飛刀亂斫投河溺死者甚衆乃假康生直閣將軍後以勳除太子三校西臺直後吐京胡反自號辛支王康生為軍主從章武王彬討之分為五軍四軍皆敗康生軍獨全率精騎一千追胡至車突谷康生詐為墮馬胡皆謂死爭欲取之康生騰騎奮矛殺數十人胡遂奔北辛支輕騎退走去康生百餘步康生彎弓射之應弦而死因俘其半牛羊駝馬以萬數齊置義陽郡招誘邊人康生又隨王肅圍其城齊將張伏護日升城樓言辭不遜肅令康生射之康生以強弓大箭望樓射窗扉開即入應箭而斃彼人見箭皆以為狂弩齊將裴叔業率衆圍渦陽欲解義陽之急詔遣高聰元衍等援之並敗退帝乃遣康生馳往一戰大破之及壽陽來降遣康生領羽林千人給龍廄馬萬匹馳赴之破走其將桓和陳伯之以功除征虜將軍封安武縣男出為南青州刺史後梁郁州軍主徐濟寇邊遣康生破禽之時梁武帝聞康生能引強弓力至十石故特作大弓兩張送與康生康生得弓便會集文武乃用平射猶有餘力其弓長八尺把中圍尺有二寸箭粗殆如今之長笛觀者以為希世絶倫弓即表送置之武庫後梁遣都督臨川王蕭宏勒甲十萬規寇徐州詔授康生武衛將軍一戰敗之還京召見宴會賞帛千匹賜驊騮御胡馬一匹出為華州刺史頗有聲績轉涇州刺史以輒用官炭瓦為御史所劾削除官爵尋復之梁直閣將軍徐元明戍於郁州殺其刺史張稷以城內附詔遣康生迎接賜細御銀纒槊一張并棗奈果面勑曰果者果如朕心棗者早遂朕意未發間郁州刺史復叛事停及大舉伐蜀假康生安西將軍邪趣綿竹至隴右宣武崩班師後除相州刺史在州以天旱令人鞭石虎像復就西門豹祠求雨不獲令吏取豹舌未幾二兒暴喪身亦遇疾巫以為虎豹之祟徵拜光祿勳領右衛將軍與元義同謀廢靈太后遷撫軍大將軍河南尹仍右衛領左右子難娶左衛將軍俟剛女即元義妹夫也義以其通姻深相委託三人率多俱宿禁內時或送出入義以康生子難為千牛備身康生性粗武言氣髙下義稍憚之見于顔色康生亦微懼不安正光二年二月明帝朝靈太后于西林園文武侍坐酒酣迭儛次至康生康生乃為力士儛至於折旋每顧視太后舉手蹈足瞋目頷首為殺縛之勢太后解其意而不敢言日暮太后欲攜帝宿宣光殿俟剛曰至尊已朝訖嬪御在南何勞留宿康生曰至尊陛下兒隨陛下將東西更訪問誰羣臣莫敢應靈太后自起援帝臂下堂而去康生大呼唱萬嵗於後近侍皆唱萬嵗明帝引前入閣左右競相排閣不得閉康生奪其子難千牛刀斫直後元思輔乃得定明帝既上殿康生時有酒勢將出處分遂為義所執鎖於門下至曉義不出令侍中黃門僕射尚書等十餘人就康生所訊其事處康生斬刑難絞刑義與剛並在內矯詔決之康生如奏難恕死從流難哭拜辭父康生欣子免死慷慨了不悲泣語子云我不畏死汝何為哭也有司驅逼奔走赴市時已昏暗行刑人注刀數下不死於地刻截咸言稟義意旨過至苦痛嘗食典御奚混與康生同執刀入內亦就市絞刑康生久為將及臨州多所殺戮而乃向信佛道每捨居宅立寺塔凡歷四州皆有建置死時年五十四子難年十八以侯剛壻得停百日竟徙安州後尚書盧同為行臺義令殺之康生於南山立佛圖三層先死忽夢崩壞沙門有為解云檀越當不吉利無人供養佛圖故崩耳康生稱然竟及於禍及靈太后反政贈都督冀瀛滄三州諸軍事驃騎大將軍司空冀州刺史諡曰武貞又追封壽張縣侯子剛襲楊大眼武都氐難當之孫也少有膽氣驍捷跳走如飛然庶孽不為宗親顧待不免飢寒太和初起家奉朝請時孝文將南伐令尚書李沖典選征官大眼往求焉沖不許大眼曰尚書不見知聽下官出一伎便出長繩三丈許繫髻而走繩直如矢馬馳不及見者無不驚歎沖曰自千載以來未有逸材若此者也遂用為軍主大眼顧謂同僚曰吾之今日所謂蛟龍得水之秋自此一舉終不復與諸君齊列矣未幾遷統軍從車駕征宛葉穰鄧九江鍾離之間所經戰陳莫不勇冠六軍宣武初裴叔業以壽春內附大眼與奚康生率衆先入以功封安成縣子除直閣將軍出為東荆州刺史時蠻酋樊秀安等反詔大眼為别將隸都督李崇討平之大眼功尤多妻潘氏善騎射大眼至於攻陳遊獵之際潘亦戎裝或齊鑣戰場或並驅林壑及至還營同坐幕下對諸僚佐言笑自得大眼時指謂諸人曰此潘將軍也梁武遣其將張惠紹總率衆軍竊據宿豫又假大眼平東將軍為别將與都督邢巒討破之遂與中山王英同圍鍾離大眼軍城東守淮橋東西道屬水泛漲大眼所管統軍劉神符公孫祉兩軍夜中爭橋奔退大眼不能禁相尋而走坐徙營州為兵永平中追其前勳起為試守中山內史時高肇征蜀宣武患梁人侵軼徐揚乃徵大眼為太尉長史持節假平南將軍東征别將隸都督元遙遏禦淮肥大眼至京師時人思其雄勇喜其更用臺省門巷觀者如市後梁將康絢於浮山遏淮規浸壽春明帝加大眼光祿大夫率諸軍鎮荆山復其封邑後與蕭寶夤俱征淮堰不能克遂於堰上流鑿渠決水而還加平東將軍大眼善騎乘撫巡士卒呼為兒子及見傷痍為之流泣自為將帥常身先兵士衝突堅陳出入不疑當其鋒者莫不摧焉前後江南所遣督將皆懷畏懾時傳言淮泗荆沔之間有童兒啼者恐之云楊大眼至無不即止王肅弟康之初歸國也謂大眼曰在南聞君之名以為眼如車輪及見乃不異於人大眼曰旗鼓相望瞋眸奮發足使君目不能視何必大如車輪當世推其驍勇以為關張弗之過也然征淮堰之役喜怒無常捶撻過度軍士頓憾焉或者以為性移所致又以本將軍為荆州刺史常縛藁為人衣以青布而射之召諸蠻渠指示之曰卿等若作賊吾正如此相殺也又北淯郡嘗有虎害人大眼搏而獲之斬其頭縣於穰市自是荆蠻相謂曰楊公惡人常作我蠻形以射之又深山之虎尚所不免遂不敢復為寇盜在州二年卒大眼雖不學常遣人讀書而坐聽之悉皆記識令作露布皆口授之而竟不多識字也有三子長甑生次領軍次征南皆潘氏所生咸有父風初大眼徙營州潘在洛陽頗有失行及為中山大眼側生女夫趙延寶告之於大眼大眼怒幽潘而殺之後娶繼室元氏大眼之死也甑生等問元氏印綬所在時元始懷孕自指其腹謂甑生等曰開國當我兒襲之汝等婢子勿有所望甑生等深以為恨及大眼喪將還京出於城東七里營車而宿夜二更甑生等開大眼棺延寶怪而問焉征南射殺之元怖走入水征南又彎弓將射之甑生曰天下豈有害母之人乃止遂取大眼尸令人馬上抱之左右扶挾以叛荆人畏甑生等不敢苦追遂奔梁崔延伯博陵人也祖壽於彭城陷入江南延伯少以武壯聞仕齊為緣淮遊軍主帶濠口戍主太和中入魏常為統帥膽氣絶人兼有謀略積勞稍進除征虜將軍荆州刺史賜爵定陵男荆州土險蠻左為寇每有聚結延伯輒自討之莫不摧殄由是穰土帖然無敢為患永平中轉幽州刺史梁遣左遊擊將軍趙祖悅率衆盜據硤石詔延伯為别將與都督崔亮討之亮令延伯守下蔡延伯與别將伊甕生挾淮為營延伯遂取車輪去輞削鋭其輻兩兩接對揉竹為絙貫連相屬並十餘道橫水為橋兩頭施大鹿盧出沒任情不可燒斫既斷祖悅走路又令舟舸不通由是梁軍不能赴救合軍咸見俘虜於軍拜平南將軍光祿大夫延伯與楊大眼等至自淮陽靈太后幸西林園引見延伯等太后曰卿等志尚雄烈皆國之名將比平硤石公私慶快此乃卿等之功也但淮堰仍在宜須預謀故引卿等親共量算各出一圖以為後計大眼對曰臣輒謂水陸二道一時俱下往無不克延伯曰既對聖顔答旨宜實水南水北各有溝瀆陸地之計如何可前愚臣短見願聖心思水兵之勤若給復一年專習水戰脫有不虞召便可用靈太后曰卿之所言深是宜要當勑如請二年除并州刺史在州貪汚聞於遠近還為金紫光祿大夫出為鎮南將軍行岐州刺史假征西將軍賜驊騮馬一匹正光五年秋以往在揚州建淮橋之勳封當利縣男改封新豐子時莫折念生兄天生下隴東寇征西將軍元志為天生所禽賊衆甚盛進屯黑水詔延伯為使持節征西將軍與西道都督行臺蕭寶夤討之寶夤與延伯結壘馬嵬南北相去百餘步延伯曰今當仰為明公參賊勇怯延伯選精兵數千下渡黑水進向賊營寶夤率騎於水東尋原西北以示後繼於是賊衆大盛水西一里營營連接延伯徑至賊壘揚威脅之徐而遂退賊以延伯衆少開營競追衆過十倍臨水逼蹶寶夤親觀之懼有虧損延伯不與戰身自殿後抽衆東渡轉運如神須臾濟盡徐乃自渡賊徒奪氣相率還營寶夤大悅謂官屬曰崔公古之關張也今年何患不制賊延伯馳見寶夤曰此賊非老奴敵公但坐看後日延伯勒衆而出寶夤為後拒天生悉衆來戰延伯身先士卒陷其前鋒於是驍鋭競進大破之俘斬十餘萬追奔及於小隴秦賊徑強諸將所憚初朝廷議遣將咸曰非延伯無以定之至是果能克敵詔授左衛將軍餘如故於時万俟醜奴宿勤明達等冦掠涇州先是盧祖遷伊甕生數將皆以元志前行之始同時發雍從六陌道將取高平志敗仍停涇部延伯既破秦賊乃與寶夤率衆會於安定甲卒十二萬鐵馬八千匹軍威甚盛時醜奴置營涇州西北七十里當原城時或輕騎暫來挑戰大兵未交便示奔北延伯矜功負勝遂唱議先驅伐木别造大排內為鎖柱教習強兵負而趨走號為排城戰士在外輜重居中自涇州緣原北上衆軍將出討賊未戰之間有賊數百騎詐持文書云是降簿乞緩師寶夤延伯謂其事實逡巡未鬭俄而宿勤明達率衆自東北而至乞降之賊從西競下諸軍前後受敵延伯上馬突陳賊勢摧挫便爾逐北徑造其營賊本輕騎延伯軍兼步卒兵力疲怠賊乃乘間得入排城延伯軍大敗死傷者將有二萬寶夤斂軍退保涇州延伯修繕器械購募驍勇復從涇州西進去賊彭坑合柵七里結營延伯耻前挫辱不報寶夤獨出襲賊大破之俄頃間平其數柵賊皆逃併見兵人采掠散亂不整還來衝突遂大奔敗延伯中流矢為賊所害士卒死者萬餘人延伯善將撫能得衆心與康生大眼為諸將之冠延伯末年功名尤重時大冦未平而延伯死朝野歎懼焉贈使持節車騎大將軍開府儀同三司定州刺史諡曰武烈李叔仁隴西人也驍健有武力前後數從征討以功賜爵獲城鄉男梁豫州刺史王超宗內侵叔仁時為兼統軍隸揚州刺史薛真度真度遣叔仁討超宗大破之以功纍遷洛州刺史假撫軍將軍後以軍功封陳郡公又除光祿大夫朔州刺史齊州廣川劉某執清河太守邵懷聚衆反自署大行臺詔叔仁為都督討平之除鎮西將軍金紫光祿大夫轉車騎大將軍儀同三司邢杲反於青州叔仁為大都督出討於淮北失利而還永安三年坐事除名尋復官爵節閔帝初加散騎常侍開府後除涼州刺史遣使密通欵於東魏事覺見殺叔仁所用之槊長大異於常槊時人壯之裴駿字神駒小名皮河東聞喜人也父雙碩位恆農太守安邑子贈東雍州刺史聞喜侯駿幼而聰慧親表異之稱為神駒因以為字弱冠通涉經史好屬文性方檢有禮度鄉里宗敬之蓋吳作亂於關中汾隂人薛永宗聚衆應之屢破諸縣來襲聞喜縣中無兵仗人情駭動縣令憂惶計無所出駿在家聞之便率厲鄉豪奔赴賊乃退刺史嘉之以狀表聞會太武親討蓋吳引見駿駿陳敘事宜甚會機理帝大悅顧謂崔浩曰裴駿有當世才具且忠義可嘉補中書博士浩亦深器駿目為三河領袖轉中書侍郎宋使明僧皓來聘以駿有才學假散騎常侍於境上勞接卒贈秦州刺史聞喜侯諡曰康子修字元寄清辨好學歷位祕書中散主客令纍遷中大夫兼祠部曹事職主禮樂每有疑議修斟酌故實咸有條貫卒諡曰恭伯宣武時追贈東秦州刺史修早孤居喪以孝聞二弟三妹並在幼弱撫養訓誨甚有義分次弟務早喪修哀傷之感於行路愛育孤姪同於己子及將異居奴婢田宅悉推與之時人以此稱焉子詢字敬叔美儀貌多藝能音律博奕咸所間解位平昌太守時太原長公主寡居與詢私姦明帝仍詔詢尚焉尋以主壻特除散騎常侍時本邑中正闕司徒召詢為之詢族叔景自陳情願此官詢遂讓焉時論善之尋監起居事遷祕書監出為郢州刺史詢以凡司戍主蠻酋田朴特地居險要衆踰數萬足為邊捍遂表朴特為西郢州刺史朝議許之梁將李國興冦邊朴特與部曲為表裏聲援郢州獲全朴特頗有力焉徵為七兵尚書武泰中以本官兼侍中為關中大使未及發於河隂遇害贈司徒公諡曰貞烈無子修弟宣字叔令通辨博物早有聲譽少孤事母兄以孝友稱舉秀才至都見司空李欣與言自旦及夕欣嗜善不已孝文初徵為尚書主客郎遷洛陽以宣為採材副將奉使稱旨轉司州刺史别駕仍兼長史宣明敏有器幹總攝州府事無凝滯遠近稱之為太尉長史上言曰自遷都已來凡戰陳之處及軍罷兵還之道所有骸體無人覆藏者請悉令州郡戍邏檢行埋掩并符出兵之鄉其家有死於戎役者請使招魂復魄祔祭先靈復其年租調身被傷痍者免其兵役朝廷從之出為征虜將軍益州刺史宣善於綏撫甚得羌戎之心後晉壽更置益州改宣所涖為南秦州刺史武興薑謨等千餘人乞延更限宣武嘉焉宣家世以儒學為業常慕廉退每歎曰以賈誼之才仕漢文之世而不歷公卿將非運也乃謂親賔曰吾本閭閻之士素無當世之志直隨牒推移遂至於此祿厚養親道不光國瞻言往哲可以言歸矣因奉表求解宣武不許乃作懷田賦以敘志焉及患篤詔遣太醫令馳驛就視并賜御藥宣素明隂陽之書始患便自尅亡日果如其言贈豫州刺史諡曰定尋改為穆子敬憲嗣敬憲以文章著稱列在文苑傳敬憲弟莊伯字孝夏亦有文才器度間雅喜愠不形於色博識多聞善以約言辨物司空任城王澄辟為行參軍甚加知賞年二十一上神龜頌時人異之文筆與敬憲相亞臨淮王彧北討引為記室參軍委以章奏之事及聞敬憲寢疾求假不許遂徑自還彧亦矜而不問扶侍兄病晝夜不離於側形容憔悴因葬敬憲於鄉遇疾卒年二十八兄弟皆以才學知名同年俱喪世共嗟惜之永安三年贈通直散騎侍郎諡曰獻兄弟並無子所著詞藻莫為集録莊伯弟獻伯廷尉卿濟州刺史少以學尚風流有名京洛為政嚴酷不得吏民之和但以清白流譽卒於殿中尚書駿從弟安祖少而聰慧年八九歲就師講詩至鹿鳴篇語諸兄云鹿雖禽獸得食相呼而况人乎自此之後未曾獨食州辟主簿人有兄弟爭財相訟安祖召其兄弟以禮義責讓之此人兄弟明日相率謝罪州內欽服之後有人勸其入仕安祖曰高尚之事非敢庶幾但京師遼遠憚於棲屑耳於是間居養志不出城邑安祖曾行值天熱舍於樹下有鷙鳥逐雉雉急投之遂觸樹而死安祖愍之乃取置隂地徐徐護視良久得蘇喜而放之後夜忽夢見一丈夫衣冠甚偉著繡衣曲領向安祖再拜安祖怪而問之此人云感君前者見放故來謝德聞者異之後孝文幸長安至河東存訪故老安祖朝於蒲坂帝與語甚悅仍拜安邑令安祖固辭老病詔給一時俸以供湯藥年八十三卒於家裴延俊字平子河東聞喜人魏冀州刺史徽之八世孫也曾祖奣咨議參軍并州别駕祖雙彪河東太守贈雍州刺史諡曰順父嵩州主簿行平陽郡事以平蜀賊丁蟲功贈東雍州刺史延俊少孤事母以孝聞涉獵墳史頗有才筆舉秀才射策高第除著作佐郎纍遷太子洗馬又領本邑中正及太子恂廢以宫官例免宣武即位為中書侍郎時帝專心釋典不事墳籍延俊上疏致諫後除司州别駕及詔立明堂羣官博議延俊獨著一堂之論太傅清河王懌時典衆議讀而笑曰子故欲遠符僕射也明帝時纍遷幽州刺史范陽郡有舊督亢渠徑五十里漁陽燕郡有故戾陵諸堨廣袤三十里皆廢毁多時莫能修復水旱不調延俊乃表求營造遂躬自履行相度形勢隨力分督未幾而就溉田百萬餘畝為利十倍百姓賴之又命主簿酈惲修起學校禮教大行人歌謡之在州五年考績為天下最拜太常卿歷七兵殿中二尚書散騎常侍御史中尉又以本官兼侍中吏部尚書延俊在臺閣守職而已不能有所裁斷直繩也莊帝初於河陰遇害贈儀同三司都督雍州刺史子元直敬猷並有學尚與父同時遇害元直贈光州刺史敬猷妻丞相高陽王雍外孫超贈尚書僕射延俊從叔愛醜桃弓並見稱於鄉里子夙字買興沈雅有器識儀望甚偉孝文見而異之吏部尚書任城王澄有知人鑒每歎美夙以遠大許之位河北太守以忠恕接下百姓感而懷之卒於郡三子範升之鑒鑒字道徽性強正有學涉卒於廷尉卿鑒居官清苦時論稱之贈東兖州刺史子澤列在齊史延俊從祖弟良字元賔稍遷尚書考功郎中時汾州吐京胡薛羽等作逆以良兼尚書左丞為西北道行臺時有五城郡山胡馬宜都賀悅回成等以妖妄惑衆假稱帝號服素衣持白傘白幡率諸逆衆於雲臺郊抗王師良大破之又山胡劉蠡升自云聖術胡人信之咸相影響旬月之間逆徒遂振以良為汾州刺史加輔國將軍行臺如故良以城人飢窘夜率衆奔西河汾州之居西河自良始也孝靜初為衛大將軍太府卿卒於官贈吏部尚書諡曰貞又重贈侍中尚書僕射子叔祉粗涉文學居官甚著聲績仕終司空右長史良從父兄子慶孫字紹遠少孤性倜儻重然諾正光末汾州吐京羣胡薛悉公馬牒騰並自立為王衆至數萬詔慶孫為募人别將招率鄉豪以討之慶孫每摧其鋒進軍深入至雲臺郊大戰郊西賊衆大潰徵赴都除直後於是賊復鳩集北連蠡升南通綘蜀凶徒轉盛以慶孫為别將從軹關入討深入二百餘里至陽胡城朝廷以此地被山帶河襟要之所明帝末遂立邵郡因以慶孫為太守慶孫務安緝之咸來歸業爾朱榮之死也世隆擁衆北度詔慶孫為大都督與行臺源子恭率衆追擊慶孫與世隆密通事泄追還河內斬之慶孫任俠有氣鄉曲壯士及好事者多相依附撫養咸有恩紀在郡日逢歲飢凶四方遊客恆有百餘慶孫自以家糧贍之性雖粗武愛好文流與諸才學之士咸相交結輕財重義坐客恆滿是以為時所稱延俊從祖弟仲規少好經史頗有志節咸陽王禧為司州牧辟為主簿仍表行建興郡事車駕自代還洛次於郡境仲規備供帳朝於路側詔仲規曰畿郡望重卿何能自致此也仲規曰陛下棄彼元壤來宅紫縣臣方躍馬吳會冀功銘帝籍豈一郡而已孝文笑曰冀卿必副此言駕還見咸陽王曰昨得汝主簿為南道主人六軍豐贍元弟之寄殊副所望除司徒主簿仲規父在鄉疾病棄官奔赴以違制免久之中山王英征義陽引為統軍奏復本資於陳戰沒贈河東太守諡曰貞無子弟叔義以第二子伯茂後之伯茂以文學知名列在文苑傳伯茂亦無子兄景融以第二子孝才繼齊武平末位中書舍人叔義亦有學行纍遷泰山太守為政清靜吏民安之遷司徒從事中郎卒贈東秦州刺史諡曰宣子景融字孔明篤學好屬文舉秀才射策高第除太學博士稍遷諫議大夫領著作元象中儀同高嶽以為録事參軍弟景龍景顔被劾廷尉獄景融入選吏部擬郡為御史中尉崔暹所彈云其貪榮昧進遂坐免官病卒景融卑退廉謹無競於時雖才不稱學而綴緝無倦文詞泛濫理會處寡所作文章别有集録景顔頗有學尚孝靜初為司徒長史在官貪穢為中尉所劾遇病死獄中延俊族兄聿字外興以操尚貞立為孝文所知為北中府長史時帝以聿與中書侍郎崔亮清貧欲以幹祿優之乃以亮帶野王縣事聿帶溫縣時人榮之卒於平秦郡太守贈洛州刺史子子袖入關西延俊族人瑗字珍寶太和中析屬河北郡少孤貧清苦自立為汝南王悅郎中令孝靜初卒於雍州刺史延俊從父兄宣明位華州刺史有惠政諡曰簡二子景鸞景鴻並有逸才河東呼景鸞為驥子景鴻為龍文景鸞位華州刺史子文端齊行臺郎四子願安志𢎞振景鴻齊和夷郡守子叔卿博涉有孝行時號曰裴曾子位隋貝邱令子神舉神符而神舉最知名薛真度河東汾隂人鎮南大將軍徐州刺史安都之從祖弟也安都宋史有傳真度始與安都南奔及從安都來降為上客太和初賜爵河北侯出為平州刺史假陽平公後降為伯歷荆州東荆州刺史初遷洛後真度每獻計勸先取樊鄧後攻南陽故大為孝文帝所賞改封臨晉縣伯轉豫州刺史景明初豫州大飢真度表輒白别出倉米五千斛為粥救其甚者詔曰真度所表甚有憂濟百姓之意宜在拯恤歷華荆二州刺史入為大司農卿正始初除揚州刺史還朝除金紫光祿大夫加散騎常侍改封敷西卒贈左光祿大夫諡曰莊有子十二人嫡子懷徹襲封初真度有女妓數十人每集賔客輒命之絲竹歌舞不輟於前盡聲色之適庶長子懷吉居喪過周以父妓十餘人并樂器獻之宣武納焉懷吉好勇有膂力雖不善書學亦解達時事卒於汾州刺史懷吉本不厲清節及為汾州偏有聚納之響自以支庶餌誘勝已共為婚姻多攜親戚悉令同行兼為之彌縫恣其取受而將勞賔客曲盡物情送去迎來不避寒熱性少言每有接對但默然而返既指授先期明人馬之數左右密已記録俄而酒饌相尋芻粟繼至逮于將别贈以錢縑下及厮傭咸過本望真度諸子既多其母非一同産相朋因有憎愛興和中遂致訴列云以毒相害顯在公府發揚疵釁時人耻焉劉休賔字處幹本平原人也祖昶從慕容德南渡河家于北海都昌縣父奉伯宋北海太守休賔少好學有文才仕宋為兖州刺史娶崔邪利女生子文煜崔氏先歸寧在魯郡邪利之降文煜母子與俱入魏及慕容白曜軍至休賔不降白曜請崔氏與文煜至以報休賔又執休賔兄延和妻子巡視城下休賔答白曜許待歷城降當即歸順密遣主簿尹文達向歷城觀魏軍形勢文達詣白曜詐祗候白曜令文達往升城見其妻子文煜哭泣以爪髮為信文達回復經白曜誓約而還見休賔休賔撫爪髮泣復遣文達與白曜期白曜以酒灌地啓告山河誓而不負休賔文達還謂休賔可早決計休賔於是告兄子聞慰聞慰固執不可遂差本契白曜尋遣著作佐郎許赤彪夜至梁鄒南門告城上人曰休賔遣文達頻造僕射許降何得無信於是城內遂相維持欲降不得歷城降休賔乃出請命及立平齊郡乃以梁鄒人為懷寧縣以休賔為令延興二年卒文煜有志尚綜覽羣書輕財重義太和中坐從兄聞慰南叛被徙北邊孝文特聽還代帝曾幸方山文煜大言求見申父功厚賞屈於是賜爵都昌子深見待遇拜協律中郎卒於高陽太守贈兖州刺史諡曰貞休賔族父旋之其妻許氏生工子法鳳法武而旋之早卒東陽平許氏攜二子入魏孤貧不自立母子並出家為尼僧既而反俗俱奔江南法武後改名竣字孝標梁史有傳房法壽小名烏頭清河東武城人也曾祖諶仕燕位太尉掾隨慕容氏遷于齊子孫因家之遂為東清河繹幕人焉法壽幼孤少好射獵輕率勇果結諸羣小為劫盜宗族患之弱冠州迎主簿後以母老不復應州郡命常盜殺䐗牛以供母招集壯士恆有百數仕宋為魏郡太守法壽從祖弟崇吉母妻為慕容白曜所獲託法壽為計法壽與崇吉歸款於白曜詔以法壽為平遠將軍與韓麒麟對為冀州刺史及歷城梁鄒降法壽崇吉等與崔道固劉休賔俱至京師以法壽為上客崇吉為次客崔劉為下客法壽供給亞於薛安都等以功賜爵壯武侯給以田宅奴婢性愛酒好施親舊賔客率同飢飽坎壈常不豐足畢衆敬等皆尚其通愛卒贈青州刺史諡敬侯子伯祖襲例降為伯歷齊郡內史伯祖暗弱委事於功曹張僧皓大有受納伯祖衣食不充遷幽州輔國軍長史後坐事免官卒子翼大城戍主帶宗城太守襲爵壯武侯翼子豹仕齊歷西河博陵樂陵太守有能名列在良吏傳伯祖弟幼愍安豐新蔡二郡太守坐事奪官居家忽聞門有客聲出無所見還至庭中為家羣犬所噬卒法壽族子景伯字良暉祖元慶仕宋歷七郡太守後為沈文秀青州建威府司馬宋明帝之弒廢帝子業子業弟子勛起兵文秀後歸子勛元慶不同為文秀所害父愛親獻文時三齊平隨例內徙為平齊人以父非命蔬食終身景伯生於桑乾少喪父以孝聞家貧傭書自給養母甚謹尚書盧淵稱之於李沖沖時典選版為奉朝請纍遷齊州輔國長史會刺史亡勑行州事政存寬簡百姓安之後除清河太守郡民劉簡虎曾失禮於景伯聞其臨郡闔門逃亡景伯督切屬縣追捕禽之即署其子為西曹掾令喻山賊賊以景伯不念舊惡一時俱下論者稱之舊制守令六年為限限滿將代郡民韓靈和等三百餘人表訴乞留復加二載後遷司空長史以母疾去官景伯性淳和涉獵經史諸弟宗之如事嚴父及弟亡蔬食終喪期周不內御憂毁之容有如居重其次弟景先亡其幼弟景遠期年哭臨亦不內寢鄉里為之語曰有義有禮房家兄弟廷尉卿崔光韶好標榜人物無所推尚每云景伯有士大夫之行業及母亡景伯居喪不食鹽菜因此遂為水病積年不愈卒於家贈左將軍齊州刺史景伯子文烈位司徒左長史與從父弟逸祐並有名文烈性溫柔未嘗嗔怒為吏部郎時經霖雨絶糧遣婢糴米因爾逃竄三四日方還文烈徐謂曰舉家無食汝從何處來竟無楚撻子山基仕隋歷户部考功侍郎並著能名見稱於時景先字光胄幼孤貧無資從師其母自授毛詩曲禮年十二請其母曰豈可使兄傭賃以供景先也請自求衣然後就學母哀其小不許苦請乃從之遂得一羊裘欣然自足晝則樵蘇夜誦經史自是精勤遂大通贍太和中例得還鄉郡辟功曹州舉秀才解褐太學博士時太常劉芳侍中崔光當世儒宗歎其精博奏兼著作佐郎修國史侍中穆紹又啓景先撰宣武起居注纍遷步兵校尉領尚書郎齊州中正所歷皆有當官稱景先沈敏方正事兄恭謹出告反靣晨昏參省側立移時兄亦危坐如對賔客兄曾寢疾景先侍湯藥衣冠不解形容毁瘁親友見者莫不哀之卒贈洛州刺史諡曰文景先作五經疑問百餘篇其語典詣符璽郎王神貴益之名為辨疑合成十卷亦有可觀節閔帝時奏上之帝親自執卷與神貴往復嘉其用心子延祐武定末太子家令後𨽻魏收修史景遠字叔遐重然諾好施與值頻歲凶儉以家財分贍宗親又於通衢為粥以飼餓者存濟甚衆平原劉郁行經齊兖之境忽遇劫賊已殺十餘人次至郁郁呼曰與君鄉近何忽見殺賊曰若言鄉里親親是誰郁曰齊州主簿房陽是我姨兄陽是景遠小字賊曰我食其粥得活何得殺其親遂還衣物蒙活者二十餘人景遠好史傳不為章句天性小急不類家風然事二兄至謹撫養兄孤恩訓甚篤益州刺史傅豎眼慕其名義啓為昭武府功曹參軍以母老不應豎眼頗恨之卒于家子敬道永熙中開府參軍畢衆敬小名奈東平須昌人也少好弓馬射獵交結輕果常於疆境盜掠為業仕宋位太山太守湘東王彧殺其主子業而自立是為明帝遣衆敬詣兖州募人到彭城刺史薛安都召與密謀云晉安有上流之名且孝武第三子當共卿西從晉安衆敬從之東平太守申纂據無鹽城不與之同及宋平子勛授纂兖州刺史會有人發衆敬父墓令其母骸首散落衆敬發喪行服疑纂所為弟衆愛為薛安都長史亦遣人密至濟隂掘纂父墓以相報答及安都以城入魏衆敬不同其謀子元賔以母并百口悉在彭城恐交致禍日夜啼泣遣請衆敬衆敬猶未從之衆敬先已遣表謝宋宋明帝授衆敬兖州刺史而以元賔有他罪獨不捨之衆敬拔刀破柱曰皓首之年唯有此子今不原貸何用獨全及尉元至乃以城降元遣將入城事定衆敬悔恚數日不食皇興初就拜散騎常侍兖州刺史賜爵東平公與中書侍郎李璨對為刺史慕容白曜攻克無鹽獲申纂無殺纂意而城中火起纂為所燒死衆敬聞克無鹽懼不殺纂乃與白曜書并表朝廷云家酷由纂聞纂死乃悅二年與薛安都朝京師賜甲第一區後復為兖州刺史徵還京師衆敬善自奉養食膳豐華必致他方遠味年已七十髮鬚皓白而氣力未衰跨鞍馳騁有若少壯篤於姻類深有國士之風張讜之亡躬自營視有若至親太和中孝文賔禮舊老衆敬與高允引至方山雖文武奢儉好尚不同然亦與允甚相愛敬接膝談款有若平生後以篤老乞還桑梓朝廷許之衆敬臨還獻真珠璫四具銀裝劒一口刺彪矛一枚仙人文綾一百匹文明太后與帝引見於皇信堂賜以酒饌車馬絹等勞遣之卒於兖州子元賔少豪俠有武幹涉獵書史與父同建勳誠至京師俱為上賔賜爵須昌侯後拜兖州刺史假彭城公父子相代為本州當世榮之時衆敬以禮還鄉常呼元賔為使君每元賔聽政時乘板輿出至元賔所先遣左右勑不起觀其斷決欣欣然喜見顔色衆敬善持家業猶能督課田産大致儲積元賔為政清平善撫人物百姓愛樂之以父憂解任喪中遙授長兼殿中尚書卒贈衛尉卿諡曰平元賔入魏初妻東平劉氏有四子祖朽祖髦祖歸祖旋賜妻元氏生二子祖榮祖暉祖朽最長次祖暉次祖髦故事前妻雖先有子後賜之妻子皆承嫡所以劉氏先亡祖暉不服重元氏後卒祖朽等三年終禮祖榮早卒子義允襲祖爵東平公例降為侯卒子僧安襲祖朽身長八尺腰帶十圍涉獵經史好為文詠善與人交襲父爵須昌侯例降為伯以本州中正為統軍𨽻邢巒討梁師以功封南城縣男歷散騎侍郎中書侍郎神龜末除東豫州刺史祖朽善撫邊清平有信百姓稱之後為瀛州刺史卒贈吏部尚書兖州刺史無子以弟祖歸子義暢為後襲爵義暢傾巧無士業善通時要位中書侍郎兖州大中正後除散騎常侍坐事伏法祖髦以兄祖朽别封南城以須昌伯回授之位東平太守卒於本州别駕祖暉早有事幹為幽州刺史以全守勳封新昌縣子逢蕭寶夤退敗祖暉拔城東趣華隂坐免官爵尋行幽州事建義中詔復州爵後為賊宿勤明達所攻沒長子義協襲爵齊受禪例降義協弟義雲仕齊歷位兖州刺史性殘忍列在酷吏傳中祖歸位建寧太守子義遠平原太守義遠弟義顯義攜性並豪率天平以後梁使人還往經歷兖城前後州將以義攜兄弟善營鮭膳器物鮮華常兼長史接宴賔客祖旋太尉行參軍卒贈都官尚書齊兖二州刺史衆敬弟衆愛隨兄歸魏以勳為第二客賜爵巨平侯卒贈徐州刺史諡曰康子聞慰字子安有器幹襲爵例降為伯延昌初纍遷清河內史固以疾辭後試守廣平內史正光初相州刺史中山王熙起兵謀誅元義聞慰斬其使發兵拒之義以為忠於已遷滄州刺史甚有政績後除散騎常侍東道行臺尋為都督安樂王鑒軍司馬攻元法僧敗奔還京師被劾遇赦免卒贈散騎常侍兖州刺史伯如故諡曰恭子祖彥字修賢涉獵書傳風度間雅為時所知以侍御史為元法僧監軍法僧反被逼南入後還歷中書侍郎襲爵巨平伯卒贈尚書右僕射兖州刺史祖彥弟祖哲祕書郎諸畢當朝不乏榮貴但幃薄不修為時所鄙申纂本魏郡人申鐘曾孫也皇始初道武平中山纂舉室南奔家于濟隂及在無鹽仕宋為兖州刺史既敗子景義入魏羊深字文泉太山巨平人也父祉贈安東將軍兖州刺史天性剛愎所歷皆以酷忍稱列在酷吏傳深早有風尚學涉經史兼長几案少與隴西李神俊同志相友自司空記室參軍再遷尚書駕部郎中于時沙汰郎中務精才實深以才堪見留在公明斷尚書僕射崔亮吏部尚書甄琛咸敬重之明帝行釋奠之禮講孝經深儕輩中獨蒙引聽時論美之正光末北地人車金雀等率羌胡反叛高平賊宿勤明達冦豳夏諸州北海王皓為都督行臺討之以深為行臺右丞軍司仍領郎中皓敗還京頃之遷尚書左丞蕭寶夤反攻圍華州正平薛鳳賢等作逆勑深兼給事黃門侍郎與大行臺僕射長孫承業共會潼關規模進止事平以功賜爵新泰男靈太后曾幸芒山集僧尼齋會公卿盡在坐太后引見深欣然勞問之顧謂左右曰羊深真忠臣也舉坐傾心莊帝踐阼除太府卿又為二兖行臺深處分軍國損益隨機亦有時譽初爾朱榮殺害朝士深第七弟侃為太山太守性粗武遂率鄉人外招梁冦深在彭城忽得侃書招深同逆深慨然流涕斬使人并書表聞莊帝乃下詔褒其忠烈令還朝受勑乃歸京師除名久之除金紫光祿大夫元皓入洛以深兼黃門侍郎皓平免官普泰初為散騎常侍衛將軍右光祿大夫監起居注自天下多事東西二省官員委積節閔帝勑深與常侍盧道虔元晏元法壽選人補定自奉朝請以上各有沙汰尋兼侍中節閔帝甚親待之時膠序廢替名教陵遲深乃上疏請修立國學廣延胄子帝善之孝武初除中書令永熙三年以深兼御史中尉東道軍司及帝入關深與樊子鵠不從齊神武起兵於兖州子鵠署深為齊州刺史天平二年東魏軍討破之斬於陳深子肅武定末儀同開府東閣祭酒以學尚知名乾明初為冀州中從事趙郡王為巡省大使肅以遲緩不任職解朝議以肅無罪尋復之武平中入文林館撰書尋為武德郡守祉弟靈引好法律李彪為中丞以為書侍御史固辭彪頗銜之及為三公郎坐兄祉事知而不紏彪劾奏免官甚為尚書令高肇所昵京兆王愈與肇深相嫌忌及愈出鎮冀州肇舉靈引為愈長史以相間伺靈引私恃肇勢每折於愈及愈作逆先斬靈引於門時論云非直愈自不臣抑亦由肇及靈引所致事平贈平東將軍兖州刺史諡曰威子敦廣平太守有聲稱列在良吏傳中靈引弟瑩字靈珍兖州别駕從事瑩子烈列在齊史韓麒麟昌黎棘城人自云漢大司馬增之後也父瑚秀容平原二郡太守麒麟幼而好學美容姿善騎射景穆監國為東曹主書文成即位賜爵漁陽男父亡居喪有禮後參征南慕容白曜軍事進攻升城師人多傷及城潰白曜將坑之麒麟諫曰始踐偽境方宜寬威厚惠此韓信所以降范陽也勍敵在前而便坑其衆恐自此以東各為守禦三齊未易圖也白曜從之皆令復業齊人大悅後白曜表麒麟為冠軍將軍與房法壽對為冀州刺史白曜攻東陽麒麟上義租六十萬斛并攻戰器械於是軍須無乏及白曜被誅麒麟停滯多年孝文時拜齊州刺史假魏昌侯在官寡於刑罰從事劉普慶説麒麟曰明公仗節方夏無所斬戮何以示威麒麟曰人不犯法何所戮乎若必須斬斷以立威名當以卿應之普慶慙懼而退麒麟以新附之人未階臺官士人沈抑乃表請守宰有闕宜推用豪望增置吏員廣延賢哲則華族蒙榮良才獲敘懷德安土庶或在兹朝議從之太和十年京都大飢麒麟表陳時務曰古先哲王經國立政積儲九稔謂之太平故躬籍千畝以率百姓用能衣食滋茂禮教興行逮於中代亦崇斯業入粟者與斬敵同爵力田者與孝悌均賞實百王之常軌為政之所先今京師人庶不耕者多遊食之口三分居二蓋一夫不耕或受其飢况於今者動以萬計故頃年山東遭水而人有餒終今秋京都遇旱穀價踊貴實由農人不勤素無儲積故也伏惟陛下天縱欽明道高三五上垂覆載之澤而下有凍餒之人皆由有司不為其制長吏不恤其本自承平日久豐穰積年競相矜夸浸成侈俗故令耕者日少田者日荒穀帛罄於府庫寶貨盈於市里衣食匱於室麗服溢於路飢寒之本實在於斯愚謂凡珍玩之物皆宜禁斷吉凶之禮備為格式令貴踐有别人歸朴素制天下男女計口受田宰司四時巡行臺使歲一檢按勤相勸課嚴加賞罰數年之中必有盈贍雖遇凶災免於流亡矣往年校比户貫租賦輕少臣所統齊州租粟才可給俸略無入倉雖於人為利而不可長久脫有戎役或遭天災恐供給之無方無所取濟請減絹布增益穀租年豐多積歲儉出振所謂私人之穀寄積於官官有宿積則人無荒年矣卒官遺勑其子殯以素棺事從儉約麒麟立性恭慎恆置律令於坐隅臨終之日唯有俸絹數十匹其清貧如此贈散騎常侍燕郡公諡曰康長子興宗字茂先好學有文才位祕書中散卒贈漁陽太守子子熙字元雍少自修整有學識弱冠未能自通侍中崔光舉為清河王懌常侍遷郎中令初子熙父以爵辭與弟顯宗顯宗不受子熙緣父素懷卒亦不襲及顯宗卒子熙别蒙賜爵乃以先爵讓弟仲穆兄弟友愛如此母亡居喪有禮子熙為懌所眷遇遂闕位待其畢喪後復引用及劉騰元義害懌久不得葬子熙為之憔悴屏居田野每言王若不得復封以禮還葬誓以終身不仕後靈太后反政以義為尚書令解其領軍子熙與懌中大夫劉定興及學官令傅靈檦賔客張子慎伏闕上書訴懌之枉極言元義劉騰誣誷書奏靈太后義之乃引子熙為中書舍人後遂剖騰棺賜義死尋令修國史建義初兼黃門尋為正子熙清白自守不交人事又少孤為叔顯宗所撫養及顯宗卒顯宗子伯華又幼子熙愛友等於同生長猶共居車馬資財隨其費用未嘗見於言色又上書求析階與伯華於是除伯華東太原太守及伯華在郡為刺史元弼所辱子熙乃泣訴朝廷明帝詔遣按驗元弼大見詰讓爾朱榮之禽葛榮送至京師莊帝欲靣數之子熙以為榮既元凶自知必死或恐不遜無宜見之爾朱榮聞而大怒請罪子熙莊帝恕而不責及邢杲起逆詔子熙慰勞杲詐降子熙信之還至樂陵杲復反子熙還坐付廷尉論以大辟恕死免官孝武初領著作以奉册勳封歷城縣子天平初為侍讀除國子祭酒子熙儉素安貧常好退靜遷鄴之始百官並給兵力時以祭酒間務止給二人或有令其陳請者子熙曰朝廷自不與祭酒兵何關韓子熙事論者高之元象中加衛大將軍先是子熙與弟聘王氏為妻姑之女生二子子熙尚未婚後遂與寡嫗李氏姦合而生三子王李不穆迭相告言子熙因此慙恨遂以發疾卒遺誡不求贈諡其子不能遵奉遂至干謁武定初贈驃騎大將軍儀同三司幽州刺史興宗弟顯宗字茂親性剛直能靣折廷諍亦有才學沙門法撫三齊稱其聰悟嘗與顯宗校試抄百餘人名各讀一遍隨即覆呼撫猶有一二舛謬顯宗了無誤錯法撫歎曰貧道平生以來唯服郎耳太和初舉秀才對策甲科除著作佐郎後兼中書侍郎既定遷都顯宗上書一曰竊聞輿駕今夏若不巡三齊當幸中山竊以為非計也何者當今徭役宜早息洛京宜速成省費則徭役可簡并功則洛京易就願且還北京以省諸州供帳之費則南州免雜徭之煩北都息分析之歎洛京可以時就遷者僉爾如歸二曰自古聖帝必以儉約為美亂主必以奢侈貽患仰惟先朝皆卑宫室而致力於經略故能基宇開廣業祚隆泰今洛陽基趾魏明所營取譏前代伏願陛下損之頃來北都富室競以宅第相尚今因遷徙宜申禁約令貴賤有檢無得踰制端廣衢路通利溝洫使寺署有别士庶異居永垂百世不刋之範三曰竊聞輿駕還洛陽輕將數千騎臣甚為陛下不取也夫千金之子猶坐不垂堂况萬乘之尊富有四海乎清道而行尚恐銜橛之失况履涉山河而不加三思哉四曰竊惟陛下耳聽法音目玩墳典口對百辟心慮萬機晷昃而食夜分而寢加以孝思之至與時而深文章之業日成篇卷雖睿明所用未足為煩然非所以嗇神養性熙無疆之祚莊周有言形有待而智無崖以有待之形役無崖之智殆矣此愚臣所不安也孝文頗納之顯宗又上言前代取士必先正名故有賢良方正之稱今州郡貢察徒有秀孝之名而無秀孝之實而朝廷但檢其門望不復彈坐如此則可令别貢門望以敘士人何假冒秀孝之名也夫門望者是其父祖之遺烈亦何益於皇家益於時者賢才而已茍有其才雖屠釣奴虜之賤聖皇不恥以為臣茍非其才雖三后之允自墜於皂𨽻矣議者或云今世等無竒才不若取士於門此亦失矣豈可以世無周召便廢宰相而不置但當校其有寸長銖重者即先敘之則賢才無遺矣又曰夫帝王所以居尊而御下者威也兆庶所以徙惡而從善者法也是以有國有家必以刑法為政生人之命於是而在有罪必罰罰必當克則雖以捶撻薄刑而人莫敢犯有制不行人得僥幸則雖參夷之誅不足以肅自太和以來未多坐盜棄市而遠近肅清由此言之止姦在於防檢不在嚴刑今州郡牧守邀當時之名行一切之法臺閣百官亦咸以深酷為無私以仁恕為容盜迭相敦厲遂成風俗陛下居九重之內視人如赤子百司分萬務之要遇下如仇讎是則堯舜止一人而桀紂以千百和氣不至蓋由於此宜勑示百官以惠元元之命又曰昔周王為犬戎所逐東遷河洛鎬京猶稱宗周以存本也光武雖曰中興實自草創西京尚置京尹亦不廢舊今陛下光隆先業遷宅中土稽古復禮於斯為盛按春秋之義有宗廟謂之都無謂之邑此不刋之典也况北代宗廟在焉山陵託焉王業所基聖躬所載其為神鄉福地實亦遠矣今便同之郡國臣竊不安愚謂代都宜建畿置尹一如故事崇本重舊以光萬葉又曰伏見洛京之制居人以官位相從不依族類然官位非常有朝榮而夕悴則衣冠淪於厮豎之邑臧獲顯於膏腴之里物之顛倒或至于斯古之聖王必令四民異居者欲其業定而志專業定則不為偽志專則不搖故耳目所習不督而就父兄之教不肅而成仰惟太祖道武皇帝創基撥亂日不暇給然猶分别士庶不令雜居伎作屠沽各有攸處但不設科禁買賣任情販貴易賤錯居渾雜假令一處彈筝吹笛緩舞長歌一處嚴師苦訓誦詩講禮宣令童齓任意所從其走赴舞堂者萬數往就學館者無一此則伎作不可雜居士人不宜異處之明驗也故孔父云里仁之美孟母𢎞三徙之訓賢聖明誨若此之重今令伎作之家習士人風禮則百年難成令士人兒童效伎作容態則一朝可得以士人同處則禮教易興伎作雜居則風俗難改朝廷每選舉人士則校其一婚一官以為升降何其密也至於伎作宦途得與膏粱華望接閈連甍何其略也今稽古建極光宅中區凡所徙居皆是公地分别伎作在於一言有何為疑而虧盛美又曰自南偽相承竊有淮北欲擅中華之稱且以招誘邊人故僑置中州郡縣自皇風南被仍而不改凡有重名其數甚衆非所以疆域物土必也正名之謂也愚以為可依地理舊名一皆釐革小者并合大者分置及中州郡縣昔以戶少并省今人口既多亦可復舊君人者以天下為家不得有所私也故倉庫儲貯以俟水旱之災供軍國之用至於有功德者然後加賜爰及末代乃寵之所隆賜賚無限自此以來亦為太過在朝諸貴受祿不輕土木被綺羅僕妾厭粱肉而復厚賚屢加動以千計若分賜鰥寡贍濟實多如不悛革豈周急不繼富之謂也又曰諸宿衛內直者宜令武官習弓矢文官諷書傳無令繕其蒱博之具以成褻狎之容徒損朝儀無益事實如此之類一宜禁止帝善之孝文曾謂顯宗及程靈蚪曰著作之任國書是司卿等之才朕自委悉中省之品卿等所聞若欲取况古人班馬之徒固自遼闊若求之當世文學之能卿等應推崔孝伯又謂顯宗曰見卿所撰燕志及在齊詩詠大勝比來之文然著述之功我所不見當更訪之監令校卿才能可居中第又謂程靈蚪曰卿比顯宗復有差降可居下上顯宗曰臣才第短淺比於崔光實為隆渥然臣竊謂陛下貴古而賤今臣學微才短誠不敢仰希於古然遭聖明之世陳翰勒素實録時事亦未慙於後人昔揚雄著太元經當時不免覆甕之談二百年外則越諸子今臣之所撰雖未足光述帝載然萬祀之後仰觀祖宗巍巍之功上覩陛下明明之德亦何謝欽明於唐典慎徽於虞書帝曰假使朕無愧於虞舜卿復何如於堯臣顯宗曰陛下齊蹤堯舜公卿寧非二八之儔帝又曰卿為著作僅名奉職未是良史也顯宗曰臣仰遭明時直筆無懼又不受金安眠美食此臣優於遷固也帝哂之後與員外郎崔逸等參定朝儀帝曾詔百官曰自近代已來高卑出身常有素分朕意所為可復以為不可宜相與校量之李沖對曰未審上古以來置官列位為欲為膏粱兒弟為欲益治贊時帝曰俱然為人沖曰若欲為人何為專崇門品不有拔才之詔帝曰茍有殊人之技不患不知然君子之門假使無當世之用者要自德行純篤是以用之沖曰傅巖吕望豈可以門見舉帝曰如此濟世者希曠代有一兩耳沖謂諸卿士曰適欲請救諸賢祕書令李彪曰師旅寡少未足為援意有所懷敢不盡言於聖日陛下若專以門地未審魯之三卿孰若四科帝曰猶如向解顯宗進曰陛下光宅洛邑百禮惟新國之興否指此一選且以國事論之不審中祕監令之子必為祕書郎頃來為監令者子皆可為不帝曰卿何不論當世膏腴為監令者顯宗曰陛下以物不可類不應以貴承貴以賤襲賤帝曰若有髙明卓爾才具俊出者朕亦不拘此例後為本州中正二十一年車駕南伐以顯宗為右軍府長史統軍次赭陽齊戍主成公期遣其軍主胡松髙法援等并引蠻賊來擊軍營顯宗親率拒戰遂斬法援首顯宗至新野帝詔曰卿破賊斬帥何為不作露布也顯宗曰臣頃聞鎮南將軍王肅獲賊二三驢馬數匹皆為露布臣在東觀每私哂之近雖仰憑威靈得摧醜虜斬禽不多脫復高曵長縑虛張功捷尤而效之其罪彌甚所以斂毫卷帛解上而已帝笑曰如卿此勳誠合茅土須赭陽平定即冀檢審相酬新野平以顯宗為鎮南廣陵王嘉咨議參軍後顯宗上表頗自矜伐訴前征勳詔曰顯宗進退無檢虧我清風付尚書推列以聞兼尚書張彛奏免顯宗官詔特以白衣守咨議展其後效顯宗既失意遇信向洛乃為五言詩寄御史中尉李彪以申憤結二十三年卒顯宗撰馮氏燕志孝友傳各十卷景明初追赭陽勳賜爵章武男子伯華襲程駿字驎駒本廣平曲安人也六世祖良晉都水使者坐事流于涼州祖父肇吕光民部尚書駿少孤貧居喪以孝稱師事劉昞性機敏好學晝夜無倦昞謂門人曰舉一隅而以三隅反者此子亞之也駿白昞曰今名教之儒咸謂老莊其言虛誕不切實要不可以經世駿謂不然夫老子著抱一之言莊生申性本之旨若斯者可謂至順矣人若乖一則煩偽生爽性則沖真喪昞曰卿年尚幼言若老成美哉由是聲譽益播沮渠牧犍擢為東宫侍講及涼州平遷于京師為司徒崔浩所知文成踐阼遷著作郎皇興中除高密太守尚書李敷奏駿實史才方申直筆請留之書奏從之獻文屢引駿與論易老之義顧謂羣臣曰朕與此人言意甚開暢又問駿年對曰臣六十有一帝曰昔太公既老而遇文王卿今遇朕豈非早乎駿曰臣雖才謝吕望而陛下尊過西伯覬天假餘年竭六韜之效延興末高麗王璉求納女於掖庭假駿散騎常侍賜爵安豐男持節如高麗迎女駿至平壤城或勸璉曰魏昔與燕婚既而伐之由行人具其夷嶮故也今若送女恐不異於馮氏璉遂謬言女喪駿與璉往復經年責璉以義方璉不勝其忿遂斷駿從者酒食欲逼辱之憚而不敢害會獻文崩乃還拜祕書令初遷神主于太廟有司奏舊事廟中執事之官例皆賜爵今宜依舊詔百寮評議羣臣咸以為宜依舊事駿獨以為不可表曰臣聞名器為帝王所貴山河為區夏之重是以漢祖有約非功不侯必當屬身命於戎旅之辰展心力於戰謀之日然後可以應茅土之錫未見預事於宗廟而獲賞於疆土雖復帝王制作弗相沿襲然一時恩澤豈足為長世之軌乎書奏從之文明太后謂羣臣曰言事固當正直而凖古典安可附會暫時舊事乎賜駿衣一襲帛二百匹又詔曰駿歷官清慎言事每愜門無挾貨之賔室有懷道之士可賜帛六百匹旌其儉德駿悉散之親故性介直不競時榮太和九年正月病篤遺命薄葬事存儉約駿病甚孝文文明太后遣使者更問其疾勑侍御師徐謇診視賜以湯藥臨終詔以小子公稱為中散從子靈蚪為著作佐郎及卒孝文文明太后傷惜之賜東園祕器朝服一稱帛三百匹贈兖州刺史曲安侯諡曰憲所作文章自有集録李彪字道固頓邱衛國人也孝文賜之名以有史才故擬漢之班彪晉之司馬彪也家寒微少孤貧有大志好學不倦初受業於長樂監伯陽伯陽稱美之晚與漁陽高悅北平陽尼等將隱於名山不果而罷悅兄閭博學高才家富典籍彪遂於悅家手抄口誦不暇寢食既而還鄉里平原王陸睿年將弱冠雅有志氣娶東徐州刺史崔鑒女路由冀相聞彪名而詣之修師友之禮稱之於州郡遂舉孝廉至京師館而受業焉高閭稱之于朝貴李沖禮之甚厚彪深宗附之孝文初為中書教學博士後假散騎常侍封衛國子遷祕書丞參著作事自成帝已來至于太和崔浩高允著述國書編年敘録為春秋之體遺落時事三無一存彪與祕書令高祐始奏從遷固之體創為紀傳表志之目焉彪又表上封事七條曰古先哲王之為制也自天子以至公卿下及抱關擊柝其宫室車服各有差品小不得僭大賤不得踰貴夫然故上下序而人意定今時浮華相競情無常守大為消功之物巨制費力之事豈不繆哉夫消功者錦繡雕文是也費力者廣宅高宇壯制麗飾是也其妨男業害女功者可勝言哉漢文帝賈誼上疏云今之王政可為長太息者六此即是其一也夫上之所好下必從之故越王好勇而士多輕死楚王好瘠而國有飢人今二聖躬行儉素詔令殷勤而百姓之奢猶未革者豈楚越之人易變如彼大魏之士難化如此此蓋朝制不宣人未見德使之然耳臣愚以為第宅車服自百官以下至於庶人宜為其等制使貴不逼賤卑不僭高不可以稱其侈意用違經典其二曰易稱主器者莫若長子傳曰太子奉冢嫡之粢盛然則祭無主則宗廟無所饗冢嫡廢則神器無所傳聖賢知其如此故垂誥以為長世之法昔姬王得斯道也故恢崇儒術以訓世嫡世嫡於是習成懿德用大協於黎蒸是以世統黎元載祀八百逮嬴氏之君於秦也弗以義方教厥冢子冢子於是習成凶德肆虐以臨黔首是以享年不永二世而亡亡之與興道在師傅故禮云冢子生因舉以禮使士負之有司齊肅端冕見于南郊明冢嫡之重見于天也過闕則下過廟則趨明孝敬之道也然古之太子自為赤子而教固以行矣此則遠世之鏡也高宗文成皇帝慨少時師不勤教嘗謂羣臣曰朕始學之日年在幼沖情未能專既臨萬機不遑溫習今而思之豈非唯豫之咎抑亦師傅之不勤尚書李欣免冠而謝此則近日之可鑒也伏惟太皇太后翼贊高宗訓成顯祖使顯巍之功邈乎前王陛下幼蒙鞠養聖敬之躋及儲宫誕育復親撫誥日省月課實勞神慮今誠宜凖古立師傅以詔導太子詔導正則太子正太子正則皇家慶皇家慶則人事幸甚矣其三曰記云國無三年之儲謂非其國光武以一畝不實罪及牧守聖人之憂世重穀殷勤如彼明君之恤人勸農相切若此頃年山東飢去歲京師儉內外人庶出入就豐既廢營産疲困乃加又於國體實有虛損若先積穀安而給之豈有驅督老弱糊口千里之外以今况古誠可懼也臣以為宜折州郡常調九分之二京都度支歲用之餘各立官司年豐糴積於倉時儉則加私之二糶之於人如此人必事田以買官絹又務貯財以取官粟年登則常積歲凶則直給又别立農官取州郡户十分之一以為屯人相水陸之宜料頃畝之數以贓贖雜物餘財市牛科給令其肆力一夫之田歲責六十斛甄其正課并征戍雜役行此二事數年之中則穀積而人足雖災不害臣又聞前代賢主皆務懷遠人禮賢引滯故漢高過趙求樂毅之胄晉武廓定旌吳蜀之彥臣謂宜於河表七州人中擢其門才引令赴闕依中州官比隨能序之一可以廣聖朝均新舊之義二可以懷江漢歸有道之情其四曰漢制度斷獄報重盡季冬至孝章時改盡十月以育三微後歲旱論者以不十月斷獄陰氣微陽氣泄以故致旱事下公卿尚書陳寵曰冬至陽氣始萌故十一月有射千藝荔之應周以為春十二月陽氣上通雉雊雞乳殷以為春十三月陽氣已至蟄蟲皆震夏以為春三微成著以通三統三統之月斷獄流血是不稽天意也章帝善其言卒以十月斷今京師及四方斷獄報重常竟季冬不推三正以育三微寬宥之情每過於昔遵之典憲猶或闕然今豈所謂助陽發生埀奉微之仁也誠宜遠稽周典近採漢制天下斷獄起自初秋盡於孟冬不於三統之春行斬絞之刑如此則道協幽顯仁垂後昆其五曰古者大臣有坐不廉而廢者不謂之不廉乃曰簠簋不飭此君之所以禮貴臣不明言其過也臣有大譴則白冠氂纓盤水加劒造室而請死此臣之所以知罪而不敢逃刑也聖朝賔遇大臣禮崇古典自太和以降有負罪當陷大辟者多得歸第自盡遣之之日深垂隱愍言發悽淚百官莫不見四海莫不聞誠足以感將死之心慰戚屬之情然恩發於𠂻未著永制此愚臣所以敢陳末見者昔漢文時人有告丞相周勃謀反者逮繫長安獄頓辱之與皂𨽻同賈誼乃上書極陳君臣之義不宜如是夫貴臣者天子為其改容而禮貌之吏人為其俯伏而敬貴之其有罪過廢之可也賜之死可也若束縛之輸之司寇榜笞之小吏詈罵之殆非所以令衆庶見也及將刑也臣則北面再拜跪而自裁天子曰子大夫自有過矣吾遇子有禮矣此上不使人抑而刑之也孝文深納其言是後大臣有罪皆自殺不受刑至孝武時稍復下獄良由孝文行之當時不為永制故耳今天下有道庶人不議之時安可陳瞽言於朝且恐萬世之後繼體之主有若漢武之事焉得行恩當時不著長世之制乎其六曰孝經稱父子之道天性蓋明一體而同氣可共而不可離者也及其有罪不相及者乃君上之厚恩也而無情之人父兄繫獄而子弟無慘惕之容子弟即刑父兄無愧恧之色宴安榮位遊從自若車馬仍華衣冠猶飾寧是同體共氣分憂均戚之理也臣愚以為父兄有犯宜令子弟素服肉袒詣闕請罪子弟有坐宜令父兄露版引咎乞解所司若職任必要不宜許者慰免留之如此足以敦厲凡薄使人知有所耻其七曰禮云臣有大喪君三年不呼其門此聖人緣情制禮以終孝子之情也周季陵夷喪禮稍亡是以要絰即戎素冠作刺逮乎虐秦殆皆泯矣漢初軍旅屢興未能遵古至宣帝時人當從軍屯者遭大父母父母死未滿三月皆弗徭役其朝臣喪制未有定聞至後漢元初中大臣有重憂始得去官終服暨魏武孫劉之世日尋干戈前世禮制復廢不行晉時鴻臚鄭穆喪親固請終服武帝感其孝誠遂著令以為常聖魏之初撥亂反正未遑建終喪之制今四方無虞百姓安逸誠是孝慈道洽禮教興行之日也然愚臣所懷竊有未盡伏見朝臣丁大憂者假滿赴職衣錦乘軒從郊廟之祀鳴玉垂綏同節慶之宴傷人子之道虧天地之經愚謂如有遭父母喪者皆得終服若無其人有曠官者則優旨慰喻起令視事但綜理所司出納敷奏而已國之吉慶一令無預其軍戎之警墨縗從役雖愆於禮事所宜行也帝覽而善之尋皆施行彪稍見禮遇詔曰彪雖宿非清第閥閲華資然識性嚴聰學博墳籍剛辨之才頗堪時用兼優吏職載宣朝美若不賞庸敘績將何以勸奬勤能特遷祕書令以參議律令之勤賜帛五百匹馬一匹牛二頭其年加員外散騎常侍使於齊齊武帝遣其主客郎劉繪接對并設宴樂彪辭樂及坐彪曰向辭樂者卿或未相體我皇孝性自天追慕罔極故有今者喪除之議去三月晦朝臣始除衰裳猶以素服從事裴謝在北固應具此我今辭樂想卿無怪繪曰請問魏皇喪禮竟何所依彪曰高宗三年孝文踰月今聖上追鞠育之深恩感慈訓之厚德報於殷漢之間可謂得禮之變繪復問若欲遵古何為不終三年彪曰萬機不可久曠故割至慕俯從羣議服變不異三年而限同一期可謂亡禮之禮繪言汰哉叔氏專以禮許人彪曰聖朝自為曠代之制何關許人繪言百官總已以聽於冢宰萬機何慮於曠彪曰我聞載籍五帝之臣臣不若君故君親攬其事三王君臣智等故共理機務五霸臣過於君故事決於下我朝官司皆五帝之臣主上親覽蓋遠軌軒唐也彪將還齊主謂彪曰卿前使還日賦阮詩云但願長間暇後歲復來遊果如今日卿此還復有來理不彪答云使臣請重賦阮詩曰燕衍清都中一去永矣哉齊王惘然曰清都可爾一去何事觀卿此言似成長闊當以殊禮相送遂親至琅邪城登山臨水命羣臣賦詩以送别其見重如此彪前後六度銜命南人竒其謇博後為御史中尉領著作郎彪既為孝文所寵性又剛直多所劾糾遠近畏之豪右屏氣帝常呼為李生於是從容謂羣臣曰吾之有李生猶漢之有汲黯也後除散騎常侍領御史中尉解著作事帝宴羣臣於流化池謂僕射李沖曰崔光之博李彪之直是我國家得賢之基車駕南伐彪兼度支尚書與僕射李沖任城王澄等參理留臺事彪素性剛豪殊與沖等意議乖異遂形於聲色無降下之心沖積其前後罪乃於尚書省禁止彪而彈奏之請免所居職付廷尉獄沖又表彪罪惡數事有司處彪大辟帝恕之除名而已彪尋歸本郡帝北幸鄴彪野服稱草萊臣拜迎鄴南帝曰朕以卿為已死彪對曰子在回何敢死帝悅因謂曰朕期卿每以貞松為志歲寒為心卿應報國盡心為用近見彈文殊乖所以卿罹此譴為朕與卿為宰事為卿自取彪曰臣愆由已至罪自身招實非陛下橫與臣罪又非宰事無辜濫臣罪既如此宜伏東臯之下不應遠點屬車之清塵但伏承聖躬不豫臣肝膽塗地是以敢至非謝罪而來帝曰朕欲用卿憶李僕射不得帝尋納宋辨之言將復採用會留臺表至言彪與御史賈尚往窮庶人恂事理有誣抑奏請收彪彪自言事枉帝明彪無此遣左右慰勉之聽以牛車散載送之洛陽會赦得免宣武踐阼彪自託於王肅又與郭祚崔光劉芳甄琛邢巒等詩書往來迭相稱重因論求復舊職修史官之事肅等許為其左右彪乃表求都下乞一靜處綜理國籍以終前志官給事力以充所須近則期月可就遠也三年有成時司空北海王詳尚書令王肅許之肅以其無祿頗相賑餉遂在祕書省同晉王隱故事白衣修史宣武親政崔光表曰臣昔為彪所致與之同業積年其志力貞強考述無倦頃來契闊多所廢離近蒙收起還綜厥事老而彌篤史才日新若克復舊職專功不怠必能昭明春秋闡成皇籍既先帝厚委宿歷高班纎負微愆應從滌洗愚謂宜申以常伯正綰著作宣武不許詔彪兼通直散騎常侍行汾州事非彪好也固請不行卒於洛陽始彪為中尉號為嚴酷以姦欺難得乃為木手擊其脅腋氣絶而復屬者時有焉又慰喻汾州叛胡得其凶渠皆鞭靣殺之及彪病體上往往創潰痛毒備極贈汾州刺史諡曰剛憲彪在祕書歲餘史業竟未及就然區分書體皆彪之功述春秋三傳合成十卷其餘著詩頌誄章表别有集彪雖與宋辨結管鮑交辨為大中正與孝文私議猶以寒地處之殊不欲微相優假彪亦知之不以為恨辨卒彪痛之無已為之哀誄備盡辛酸郭祚為吏部彪為子志求官祚乃以舊第處之彪以位經常伯又兼尚書謂祚應以貴遊拔之深用忿怨形於言色時論以此非祚祚每曰爾與義和至友豈能饒爾而怨我乎任城王澄與彪先亦不睦及為雍州彪詣澄為志求其府僚澄釋然為啓得為列曹行參軍時稱澄之美志字鴻道博學有才幹年十餘便能屬文彪竒之謂崔鴻曰子宜與鴻道為二鴻於洛陽鴻遂與交款往來彪有女幼而聰令彪每竒之教之書學讀誦經傳嘗竊謂所親曰此當興我家卿曹容得其力彪亡後宣武聞其名召為媫妤在宫常教帝妹書誦授經史始彪竒志及媫妤特加器愛公私坐集必自稱詠由是為孝文所貴及彪亡後媫妤果入掖庭後宫咸師宗之宣武崩後為比邱尼通習經義每講説諸僧歎重之志歷官所在著績桓叔興外叛南荆荒毁領軍元義舉其才任撫導擢為南荆州刺史建義初叛入梁志弟遊有才行隨兄志在南荆州屬爾朱之亂與志俱奔江左子昶仕周有傳高道悅字文欣遼東新昌人也曾祖策馮跋散騎常侍新昌侯祖育馮𢎞建德令太武東討率部歸命授建忠將軍齊郡建德二郡太守賜爵肥如子父元起武邑太守遂居勃海蓨縣道悅少為中書學生侍御主文中散後為諫議大夫正色當官不憚強禦車駕南征徵兵秦雍大期秋季閲集洛陽道悅以使者書侍御史薛聰侍御史主文中散元志等稽違期會奏舉其罪又奏兼左僕射吏部尚書任城王澄位總朝右任屬戎機兵使會否曾不檢奏尚書左丞公孫良職綰樞轄蒙冒莫舉請以見事免澄良等所居官時道悅兄觀為外兵郎中澄奏道悅有黨兄之負孝文詔責然以事經恩宥遂寢而不論詔曰道悅資性忠篤稟操貞亮居法樹平肅之規處諫著必犯之節王公憚其風鯁朕實嘉其一至謇諤之誠何愧黯鮑也其以為主爵下大夫諫議如故車駕幸鄴又兼御史中尉留守洛京時宫闕初基廟庫未構車駕將水路幸鄴已詔都水回營構之材以造舟楫道悅表諫以為闕居宇之功作遊嬉之用損耗殊倍又深薄之危古今共慎於是帝遂從陸路轉道悅太子中庶子正色立朝儼然難犯宫官上下咸畏憚之太和二十年秋車駕幸中嶽詔太子恂入居金墉而恂潛謀還代忿道悅前後規諫遂於禁中殺之帝甚加悲惜贈散騎常侍營州刺史并遣王人慰其妻子又詔使者監護喪事葬于舊塋諡曰貞侯宣武又追録忠槩拜長子顯族給事中顯族亦以忠厚見稱卒於右軍將軍顯族弟敬猷有風度蕭寶夤西征引為驃騎司馬及寶夤謀逆敬猷與行臺郎中封偉伯等潛圖義舉謀泄見殺贈滄州刺史聽一子出身道悅長兄嵩字崑崙魏郡太守嵩弟雙清河太守坐黷貨將刑於市會赦免時北海王詳為録尚書事雙多納金寶除司空長史後為梁州刺史專肆貪暴以罪免後貨高肇復起為幽州刺史以貪穢被劾罪未判遇赦復任未幾而卒雙弟觀尚書左外兵郎城陽王鸞司馬南征赭陽先驅而殁諡曰閔甄琛字思伯中山無極人漢太保邯之後也父凝州主簿琛少敏悟閨門之內兄弟戲狎不以禮法自居學覽經史頗有刀筆而形貌短陋鮮風儀舉秀才入都積歲頗以奕碁廢日至乃通夜不止手下倉頭常令執燭或時睡頓大加其杖如此非一奴復不勝楚憤乃曰郎君辭父母仕宦若為讀書執燭不敢辭罪乃以圍碁日夜不息豈是向京之意而賜加杖罰不亦非理琛悵然慙感遂從許赤彪假書研習聞見日優太和初拜中書博士遷諫議大夫時有所陳亦為孝文知賞宣武踐阼以琛為中散大夫兼御史中尉琛表弛鹽稅及山澤之禁宣武從之詔琛參八坐議事尋正中尉遷侍中領中尉琛俯眉畏避不能繩紏貴遊凡所劾者率多下吏於時趙修寵貴琛傾身事之琛父凝為中散大夫弟僧林為本州别駕皆託修申逹至修姦詐事露明當收考今日乃舉其罪及監決修鞭猶相隱恤惻然告人曰趙修小人背如土牛殊耐鞭杖有識以此非之修死之日琛與黃門郎李憑以朋黨被召詣尚書兼尚書元英邢巒窮其阿附之狀琛曾拜官諸賔悉集巒乃晚至琛謂巒何處放蛆來今晚始顧雖以言戲巒頗變色銜忿及此大相推窮司徒録尚書事北海王詳等奏曰謹案侍中領御史中尉甄琛身居直法紏擲是司風邪響黷猶宜劾紏况趙修侵公害私朝野切齒而琛恆不陳奏方更往來中外影響致其談譽令布衣之父超登正四之官七品之弟越陟三階之祿虧先皇之選典塵聖朝之官人又與黃門郎李憑相為表裏憑兄叨封知而不言及修釁彰方加彈奏生則附其形勢死則就地排之竊天之功以為己力仰欺朝廷俯罔百司其為鄙詐於斯甚矣謹依律科從請以職除其父中散實為叨越雖皇族帝孫未有此例既得不以倫請下收奪李憑明附趙修是親是仗緇點皇風塵鄙正化此而不紏將何以肅整阿腴獎厲忠槩請免所居官以肅風軌奏可琛遂免歸本郡左右相連死黜者二十餘人琛始以父母老常求解官扶侍故孝文授以本州長史及貴逹不復請歸至是乃還供養數年遭母憂母巨鹿曹氏有孝性夫氏去家路逾百里每得魚肉菜果珍美口實者必令僮僕走奉其母乃後食焉琛母服未闋復喪父琛於塋兆內手種松柏隆冬負掘水土鄉老哀之咸助加力十餘年中墳成木茂與弟僧林誓以同居沒齒專事産業躬親農圃時以鷹犬馳逐自娛朝廷有大事猶上表陳情久之復除散騎常侍領給事黃門侍郎定州大中正大見親寵委以門下庶事出參尚書入厠帷幄始孝文時琛兼主客郎迎送齊使彭城劉纘琛欽其器貌常歎詠之纘子昕為眗山戍主昕死家屬入洛有女年未二十琛乃納昕女為妻婚日詔給厨費琛所好悅宣武時調戲之遷河南尹黃門中正如故琛表曰國家居代患多盜竊世祖太武皇帝親自發憤廣置主司里宰皆以下代令長及五等散男有經略者乃得為之又多置吏士為其羽翼崇而重之始得禁止今遷都已來天下轉廣四遠赴會事過代都寇盜公行劫害不絶此由諸坊混雜釐比不精主司暗弱不堪檢察故也今擇尹既非南金里尉鉛刀而割欲望清肅都邑不可得也里正乃流外四品職輕任碎多是下才人懷茍且不能督察故使盜得容姦百賦失理邊外小縣所領不過百戶而令長皆以將軍居之京邑諸坊大者或千户五百戶其中王公卿尹貴勢姻戚豪猾僕隸蔭養姦徒高門邃宇不可干問比之邊縣難易不同今難彼易此實為未愜王者立法隨時從宜先朝立品不必即定施而觀之不便則改今間官靜任猶聽長兼况劇煩要務不得簡能下領請取武官中八品將軍以下幹用貞濟者以本官俸恤領里尉之任各食其祿高者領六部尉中者領經途尉下者領里正不爾請少高里尉之品選下品中應選者進而為之則督責有所輦轂可清詔曰里正可進至勳品經途從九品六部尉正九品諸職中簡取何必須武人也琛又奏以羽林為遊軍於諸坊巷司察盜賊於是京邑清靜後皆踵焉轉太子少保黃門如故及高肇死琛以肇黨不宜復參朝政出為營州刺史遷涼州刺史猶以高氏之昵不欲處之於內久之為吏部尚書未幾除定州刺史辭曰陛下在東宫崔光為少傅臣為少保今光為車騎大將軍儀同三司開國公故僕射遊肇時為侍中與臣官階相似肇在省為僕射死贈車騎將軍儀同三司冀州刺史臣今適為征北將軍定州刺史生師保不如死遊肇詔書慰遣之琛既至郡衣錦晝遊大為稱滿政體嚴細甚無聲譽崔光辭司徒之授也琛與光書外相抑揚內實附會光亦揣知其意復書以悅之徵為車騎將軍特進又拜侍中以其衰老詔賜御府杖朝直杖以出入卒詔給東園祕器贈司徒公尚書左僕射加後部鼓吹太常議諡文穆吏部郎袁翻駮奏改曰孝穆詔從之琛祖載明帝親送降車就輿弔服哭之遣舍人慰其諸子琛性輕簡好嘲謔故少風望然明解有幹具在官清白自孝文宣武咸相知待明帝以師傅之義而加禮焉所著文章鄙碎無大體時有理詣磔四聲姓族廢興會通緇素三論及家誨二十篇篤學文一卷頗行於世琛長子侃字道正位祕書郎性險薄多與盜劫交通隨琛在京以酒色夜宿洛水亭舍歐擊主人為司州牧所劾淹在州獄琛大以慙慨廣平王懷為牧與琛先不協欲具案窮推琛託左右以聞宣武勑懷寬放懷固執之久乃特旨赦出侃自此沈廢卒於家侃弟楷字德方粗有文學頗更吏事琛啓除祕書郎宣武崩未葬楷與河南尹丞張普惠等飲戲免官後稍遷尚書儀曹郎有當官之稱明帝末丁憂在鄉定州刺史廣陽王深召楷兼長史委以州任尋屬鮮于修禮毛普賢等率北鎮流人反於州西北之左人城屠村掠野引向州城州城內先有燕恆雲三州避難戶修禮等聲云欲將此輩共為舉動楷見人情不安慮有變起乃亟收三州人中粗暴者殺之以威外賊及刺史元固大都督楊津等至楷乃還家後修禮等忿楷屠害北人遂掘其父墓載棺巡城示相報復孝莊時徵為中書侍郎後齊文襄取為儀同府咨議參軍卒贈驃騎將軍祕書監滄州刺史琛從父弟密字叔雍清謹少嗜欲頗涉書史疾世俗貪競乾沒榮寵曾為風賦以見意後參中山王英軍事英鍾離敗退鄉人蘇良沒於賊中密盡私財以贖之良歸傾資報密密一皆不受曰濟君之日本不求貨豈相贖之意及葛榮侵擾河北詔密為相州行臺援守鄴城莊帝以密全鄴勳賞安市縣子孝靜初為衛尉卿在官有平直之譽出為徐州刺史卒官贈驃騎將軍儀同三司瀛州刺史諡曰靖琛同郡張纂字伯業祖珍字文表慕容寶度支尚書道武平中山入魏卒於涼州刺史諡曰穆纂頗涉經史雅有器尚交結勝流為樂陵太守在郡多所受納聞御史至棄郡逃走於是除名乃卒天平初贈定州刺史纂叔感字崇仁有器業不應州郡之命子宣軌少孤事母以孝聞纍遷相州撫軍府司馬宣軌性通率輕財好施屬葛榮圍城與刺史李神有固守效以功賜爵中山公後坐事死鄴纂從弟元賔位奉朝請及外生高昻貴達啓贈瀛州刺史高聰字僧智本渤海人也曾祖軌隨慕容德徙青州因居北海之劇縣父法昻少隨其舅宋車騎將軍王元謨征伐以功至員外郎早卒聰生而喪母祖母王撫育之大軍攻克東陽聰徙平城與蔣少遊為雲中兵戶窘困無所不為族兄允視之若孫大加賙給聰涉獵經史頗有文才允嘉之數稱其美言之朝廷由是與少遊同拜中書博士轉侍郎為高陽王雍傅稍為孝文知賞太和十七年兼員外散騎常侍使於齊後兼太子左率聰微習弓馬乃以將略自許孝文鋭意南討專訪王肅以軍事聰託肅願以偏禆自效肅言之於帝故假聰輔國將軍受肅節度同援渦陽聰躁怯少威重及與賊交望風退敗孝文恕死徙平州行屆瀛州刺史王質獲白兔將獻託聰為表帝見表顧王肅曰在下那得有此才令朕不知肅曰比高聰北徙或其所製帝悟曰必應然也宣武初聰復竊還京師説高肇廢六輔宣武親政除給事黃門侍郎後加散騎常侍及幸鄴還於河內懷界帝射矢一里五十餘步侍中高顯等奏盛事竒迹必宜表述請勒銘射宫永彰聖藝遂刋銘射所聰為之詞趙修嬖幸聰深朋附及詔追贈修父聰為碑文出入同載觀視碑石聰每見修迎送盡禮聰又為修作表陳當時便宜教其自安之術由是迭相親狎修死甄琛李憑皆被黜落聰深見危慮而先以疏宗之情曲事高肇竟獲自免肇之力也修之任勢聰傾身事之及死言必毁惡茹皓之寵聰又媚附每相招命稱皓才識非修之儔乃因皓啓請田宅皆被遂許及皓見罪戮聰以為死之晚也其薄於情義皆如此侍中高顯為護軍聰代兼其任顯與兄肇疑聰間構而求之聰居兼十餘旬出入機要言即真無遠慮藉貴因權耽於酒色賄納之音聞於遐邇中尉崔亮知肇微恨遂面陳聰罪出為并州刺史聰善於去就知肇嫌之側身承奉肇遂待之如舊聰在并州數歲多不率法又與太原太守王椿有隙再為大使御史舉奏肇每以宗私相援事得寢緩宣武末拜散騎常侍平北將軍明帝踐阼以其素附高肇出為幽州刺史尋以高肇之黨與王世義高綽李憲崔楷蘭氛之為中尉元匡所彈靈太后並特原之聰遂廢於家斷絶人事唯修營園果世稱高聰梨以為珍異又唯以聲色自娛後拜光祿大夫卒靈太后聞其亡嗟惋良久贈青州刺史諡曰獻聰有妓十餘人有子無子皆主籍為妾以悅其情及病欲不適他人並令燒指吞炭出家為尼聰所作文筆二十卷子長雲字彥鴻位輔國將軍中散大夫河隂遇害贈兖州刺史通志卷一百四十九
