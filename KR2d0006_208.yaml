body:
  text: 通志卷一百八十四宋右廸功郎鄭樵漁仲撰佞幸傳第一史記立佞幸傳前漢北齊不易其名宋曰恩倖臣後魏曰恩倖今總曰佞幸前漢鄧通趙談韓嫣淳于長張放董賢王閎宋戴法興戴明寶顯董元嗣奚度徐爰阮佃夫干天寶夀寂之姜産之運王道隆楊長南齊紀僧眞劉係宗茹法亮吕文度謙綦母珍之杜文徐龍駒道曹剛吕文顯茹法珍梅蟲兒徐世􅋆梁周石珍陸驗徐驎陳司馬申施文慶沈客卿孔範後魏王叡子襲椿王仲興趙脩茹皓常季賢義陳埽静徐恭趙邕侯剛徐紇鄭儼郭秀北齊和士開安吐根穆提婆母陸令萱高阿那肱韓鳳前漢漢興佞幸寵臣高祖時則有籍孺孝惠有閎孺此兩人非有才能但以婉媚貴幸與上卧起公卿皆因關說故孝惠時郎侍中皆冠鵔鸃貝帶傅脂粉化閎籍之屬也兩人徙家安陵其後寵臣孝文時士人則鄧通宦者則趙談北宫伯子孝武時士人則韓嫣宦者則李延年孝元時宦者則𢎞恭石顯孝成時士人則張放淳于長孝哀時則有董賢孝景昭宣時皆無寵臣景帝唯有郎中令周仁昭帝時駙馬都尉秺侯金賞嗣父車騎將軍日磾為侯二人之寵取過庸不篤宣帝時侍中中郎將張彭祖少與帝㣲時同席研書及帝即尊位彭祖以舊恩封陽都侯出常参乘號為爱幸其人謹敕無所虧損為其小妻所毒薨國除鄧通蜀郡南安人也以濯船為黄頭郎濯直敎反持濯行船也土勝水其色黄故刺船郎皆著黄㡌因號曰黄頭郎文帝嘗夢欲上天不能有一黄頭郎從後推上天顧見其衣尻帶後穿覺而之漸臺以夢中隂目求推者郎見鄧通其衣後穿夢中所見也召問其名姓姓鄧名通鄧猶登也文帝甚說尊幸之日日異通亦愿謹不好外交雖賜洗沐不欲出於是文帝賞賜通鉅萬以十數官至上大夫文帝時間如通家遊戲然通無他技能不能有所薦達獨自謹身以媚上而已上使善相者相通曰當貧餓死上曰能富通者在我何說貧於是賜通蜀嚴道銅山得自鑄錢鄧氏錢布天下其富如此文帝嘗病癰鄧通嘗為上𠻳吮之上不樂從容謂曰天下誰最爱我者通曰宜莫若太子太子入問疾上使太子齰癰太子𠻳癰而色難之已而聞通常為上齰之太子大慙繇是心怨通及文帝崩景帝立鄧通免家居居無何人有告通盜出徼外鑄錢下吏驗問頗有遂竟案盡没入之通家尚負責數鉅萬長公主賜鄧通吏輙随没之一簪不得著身於是長公主乃令假衣食竟不得名一錢寄死人家趙談者以星氣幸北宫伯子長者愛人故親近然皆不比鄧通韓嫣字王孫弓高侯頽當之孫也武帝為膠東王時嫣與上學書相愛及上為太子愈益親嫣嫣善騎射聰慧上已即位欲事伐胡而嫣先習兵以故益尊貴官至上大夫賞賜儗鄧通如時嫣常與上臥起江都王入朝得從獵上林中天子車駕蹕道未行而先使嫣乘副車從數十百騎馳視獸江都王望見以為天子辟從者伏謁道傍嫣驅不見既過江都王怒為皇太后泣請得歸國入宿衛比韓嫣太后由此銜嫣嫣侍出入永巷不禁以奸聞皇太后太后怒使使賜嫣死上為謝終不能得嫣遂死弟說亦爱幸以軍功封案道侯巫蠱時為戾太子所殺子増封龍雒侯大司馬車騎將軍自有傳淳于長字子孺魏郡元城人也少以太后姊子為黄門郎未得進幸㑹大將軍王鳳病長侍病晨夜扶丞左右甚有甥舅之恩鳳且終以長屬託太后及帝帝嘉長義拜為列校尉諸曹遷水衡都尉侍中至衛尉九卿乆之趙飛燕貴幸上欲立以為皇后太后以其所出㣲難之長主往來通語東宫嵗餘趙皇后得立上甚徳之廼追顯長前功下詔曰前將作大匠解萬年奏請營作昌陵罷弊海内侍中衛尉長數白宜止徙家反故處朕以長言下公卿議者皆合長計首建至策民以康寧其賜長爵關内侯後遂封為定陵侯大見信用貴傾公卿外交諸侯牧守賂遺賞賜亦絫鉅萬多畜妻妾淫於聲色不奉法度初許皇后坐執左道廢處長定宫而后姊孊為龍頟思侯夫人寡居長與孊私通因取為小妻許后因孊賂遺長欲求復為偼伃長受許后金錢乘輿服御物前後千餘萬詐許為白上立以為左皇后孊每入長定宫輙與孊書戲侮許后嫚易無不言交通書記賂遺連年是時帝舅曲陽侯王根為大司馬驃騎將軍輔政數嵗乆病數乞骸骨長以外戚居九卿位次第當代根根兄子新都侯王莽心害長寵私聞長取許孊受長定宫賂遺莽侍曲陽侯疾因言長見將軍久病意喜自以為代輔政至對衣冠議語署置具言其罪過根怒曰即如是何不白也莽曰未知將軍意故未敢言根曰趣白東宫莽求見太后具言長驕佚欲代曲陽侯對莽母上車私與長定貴人姊通受取其衣物太后亦怒曰免至如此往白之帝莽白上上乃免長官遣就國初長為侍中奉兩宫使親密紅陽侯立獨不得為大司馬輔政立自疑為長毁譖常怨毒長上知之及長當就國也立嗣子融從長請車騎長以珍寶因融重遺立立因為長言於是天子疑焉下有司案驗吏捕融立令融自殺以滅口上愈疑其有大姦遂逮長繋洛陽詔獄窮治長具服戲侮長定宫謀立左皇后辠至大逆死獄中妻子當坐者徙合浦母若歸故郡紅陽侯立就國將軍卿大夫郡守坐長免罷者數十人莽遂代根為大司馬乆之還長母及子酺於長安後酺有辠莽復殺之徙其家屬歸故郡始長以外親親近其愛幸不及富平侯張放放常與上卧起俱為㣲行出入董賢字聖卿雲陽人也父恭為御史任賢為太子舍人哀帝立賢随太子官為郎二嵗餘賢傳漏在殿下為人美麗自喜哀帝望見悅其儀貌識而問之曰是舍人董賢邪因引上與語拜黄門郎由是始幸問及其父為雲中候即日徴為霸陵令遷光禄大夫寵爱日甚為駙馬都尉侍中出則驂乘入御左右旬月間賞賜累鉅萬貴震朝廷嘗與上卧起嘗晝寢偏藉上褏上欲起賢未覺不欲動賢乃斷褏而起其恩愛至此賢亦性柔和便辟善為媚以自固每賜洗沐不肯出常留中視醫藥上以賢難歸詔令賢妻得通引籍殿中止賢廬若吏妻子居官寺舍又召賢女弟以為昭儀位次皇后更名其舍為椒風以配椒房云昭儀及賢與妻旦夕上下並侍左右賞賜昭儀及賢妻亦各千萬數遷賢父為少府賜爵關内侯食邑復徙為衞尉又以賢妻父為將作大匠弟為執金吾詔將作大匠為賢起大第北闕下重殿洞門土木之功窮極伎巧柱檻衣以綈錦下至賢家僮僕皆受上賜及武庫禁兵上方珍寶其選物上第盡在董氏而乘輿所服乃其副也及至東園祕器珠𥜗玉柙豫以賜賢無不備具又令將作為賢起冢塋義陵旁内為便房剛栢題湊外為徼道周垣數里門闕罘罳甚盛上欲侯賢而未有緣㑹待詔孫寵息夫躬等告東平王雲后謁祠祀祝詛下有司治皆伏其辜上於是令躬寵為因賢告東平事者廼以其功下詔封賢為高安侯躬宜陵侯寵方陽侯食邑各千戸頃之復益封賢二千戸丞相王嘉内疑東平事寃甚惡躬等數諫諍以賢為亂國制度嘉竟坐言事下獄死上初即位祖母傅太后母丁太后皆在两家先貴傅太后從弟喜先為大司馬輔政數諫失太后指免官上舅丁明代為大司馬亦任職頗害賢寵及丞相王嘉死明甚憐之上寖重賢欲極其位而恨明如此遂冊免明令上驃騎將軍印綬罷歸就第遂以賢代明為大司馬衛將軍是時賢年二十二雖為三公常給事中領尚書百官因賢奏事以父恭不宜在卿位徙為光禄大夫秩中二千石弟寛信代賢為駙馬都尉董氏親屬皆侍中諸曹奉朝請寵在丁傅之右矣明年匈奴單于來朝宴見羣臣在前單于怪賢年少以問譯上令譯報曰大司馬賢年少以大賢居位單于乃起拜賀漢得賢臣初丞相孔光為御史大夫賢父恭為御史事光及賢為大司馬與光並為三公上故令賢私過光光雅恭謹知上欲尊寵賢及聞賢當來也光警戒衣冠出門待望見賢車乃却入賢至中門光又入閤既下車乃出拜謁送迎甚謹不敢以賔客鈞敵之禮賢歸上聞之喜立拜光兩兄子為諫大夫常侍賢由是權與人主侔矣是時成帝外家王氏衰廢唯平阿侯譚子去疾哀帝為太子時為庶子得幸及即位為侍中騎都尉上以王氏亡在位者遂用舊恩親近去疾復進其弟閎為中常侍閎妻父蕭咸前將軍望之子也乆為郡守病免為中郎將兄弟並列賢父恭慕之欲與結婚姻閎為賢弟寛信求咸女為婦咸惶恐不敢當初上冊拜賢為大司馬其文有曰允執其中至是咸私謂閎曰董公為大司馬冊文言允執其中此乃堯禪舜之文非三公故事長老見者莫不心懼此豈家人子所能堪邪閎性有智略聞咸言心亦悟乃還報恭深達咸自謙薄之意恭嘆曰我家何用負天下而為人所畏如是意不說後上置酒麒麟殿賢父子親屬宴飲王閎兄弟侍中中常侍皆在側上有酒所從容視賢而笑曰吾欲法堯禪舜何如閎進曰天下乃高皇帝之天下非陛下之有也陛下奉承宗廟當傳子孫於無窮統業至重天子無戲言上黙然不悅左右皆恐於是遣閎出後不得復侍宴賢第新成功堅其外大門無故自壞賢心惡之後數月哀帝崩太皇太后召大司馬賢引見東廂問以喪事調度賢内憂不能對免冠謝太后曰新都侯莽前以大司馬奉送先帝大行曉習故事吾令莽佐君賢頓首曰幸甚太后遣使者召莽既至以太后指使尚書劾賢帝病不親醫藥禁止賢不得出入宫殿司馬門中賢不知所為詣闕免冠徒跣謝莽使謁者以太后詔即闕下策免賢收大司馬印綬罷歸第即日賢與妻皆自殺家惶恐夜𦵏莽疑其詐死有司奏請發賢棺至獄侯視莽復風大司徒光奏賢罪大親屬不宜在中土請收沒入財物縣官諸以賢為官者皆免父恭弟寛信與家屬徙合浦母别歸故郡鉅鹿長安中小民讙譁郷其第哭幾獲盜之縣官斥賣董氏財凡四十三萬萬賢既見發臝侯其尸因埋獄中賢所厚吏沛朱詡自劾去大司馬府買棺衣收賢尸𦵏之王莽聞之大怒以他辠擊殺詡詡子浮建武中貴顯至大司馬司空封侯而王閎王莽時為牧守所居見紀莽敗乃去官世祖下詔曰武王克殷表商容之閭閎修善謹勅兵起吏民獨不争其頭首今以閎子補吏至墨綬卒官蕭咸外孫云宋戴法興會稽山隂人也家貧父碩子以販紵為業法興二兄延壽延興並脩立延夀善書法興好學山隂有陳戴者家富有錢三千萬鄉人咸云戴碩子三免敵陳戴三千萬錢法興少賣葛於山隂市後為尚書倉部令史大將軍彭城王義康於尚書中覔了了令史得法興為記室令史義康敗仍為孝武征虜撫軍記室掾及徙江州仍補南中郎典籖帝於巴口建義法興與典籖戴明寶蔡閑俱轉参軍督䕶及上即位並為南臺侍御史同兼中書通事舍人法興等專管内務權重當時孝建元年為南魯郡太守觧舍人侍太子於東宫大明初三典籖並以南下預宻謀封法興吳昌縣男明寶湘鄊縣男閑時已卒追加爵封法興轉給事中太子旅賁中郎將孝武親覽朝政不任大臣而腹心耳目不得無所委寄法興頗知古今素見親待雖出侍東宫而倚任隆宻魯郡巢尚之人士之末元嘉中侍始興王濬讀書亦渉獵文史為上所知孝建初補東海國侍郎仍兼中書通事舍人凡選授遷轉誅賞大處分上皆與法興尚之参決内外諸雜事多委明寶上性嚴暴睚眦之間動至罪戮尚之每臨事解釋多得全免殿省甚賴之而法興明寳大通人事多納貨賄凡所薦達言無不行天下輻湊門外成市家産並累千金明寶驕縱尤甚長子敬為揚州從事與上争買御物六宫嘗出敬盛服騎馬於車左右馳驟去來上大怒賜敬死繫明寳尚方尋被原釋委任如初孝武崩前廢帝即位法興遷越騎校尉時太宰江夏王義恭錄尚書事任同總已而法興尚之執權日乆威行内外義恭積相畏服至是懾憚尤甚廢帝未親萬機凡制勅施為悉決法興之手尚書中事無大小專斷之顏師伯義恭守空名而已尚之甚聰敏時百姓欲為孝武立寺疑其名尚之應聲曰宜云天保詩云天保下報上也時服其機速廢帝年已漸長凶志轉成欲有所為法興每相禁制謂帝曰官所為如此欲作營陽邪帝意稍不能平所爱幸閹人華願免有盛寵賜與金帛無算法興常加裁減願免甚恨之帝常使願免出入市里察聽風謠而道路之言謂法興為眞天子帝為贋天子願免因此告帝曰外間云宫中有兩天子官是一人戴法興是一人官在深宫中人物不相接法興與太宰顔栁一體往來門客恒有數百内外士庶莫不畏服之法興是孝武左右復久在宫闈今將他人作一家深恐此坐席非復官許帝遂免法興官徙付逺郡尋於家賜死法興臨死封閉庫藏使家人謹視牡籥死一宿又殺其二子截法興棺焚之籍没財物法興能為文章頗行於世死後帝敕巢尚之曰不謂法興積釁累愆遂至於此吾今自覽萬幾卿等宜竭盡誠力尚之時為新安王子鸞撫軍中兵参軍淮陵太守乃觧舍人轉為撫軍諮議参軍太守如故明帝初復以尚之兼中書通事舍人南清河太守累遷黄門侍郎出為新安太守病卒戴明寶南東海丹徒人亦歴員外散騎常侍給事中孝武時帶南清河太守前廢帝即位權任悉歸法興而明寶輕矣明帝初天下反叛以明寶舊人屢經戎事復委任之後坐納貨賄繫尚方尋被宥位宣城太守昇明初以老拜太中大夫病卒武陵國典書令董元嗣與法興明寶等俱為孝武南中郎典籖元嘉三十年奉使還都㑹元凶弑逆遣元嗣南還報上以徐湛之等反上時在巴口元嗣具言弑逆狀上遣元嗣下都奉表於劭既而上舉義兵劭詔責元嗣元嗣答云始王未有反謀劭不信備加考掠不伏遂死時孝武帝剋京師贈員外散騎侍郎使文士蘇寶生為之誄焉大明中又有奚顯度者南東海郯人官至員外散騎侍郎孝武嘗使督領人功而苛虐無道動加捶撲暑雨寒雪不聽暫休人不堪命或自經死時建康縣考囚或用方材壓額及踝脛人間謠曰寧得建康壓額不能受奚度拍又相戲曰勿反顧付奚度其酷暴如此前廢帝嘗戲云顯度刻虐為百姓所疾此當除之左右因唱爾即日宣殺焉時人比之孫皓殺岑昏焉徐爰字長玉南琅邪開陽人也本名瑗以與傅亮父同名亮唘改為爰初為晋琅邪王大司馬府中典軍從北征㣲宻有意理為武帝所知少帝在東宮入侍左右文帝初又見親任遂至殿中侍御史元嘉十二年轉南臺御史始與王濬後行参軍復侍太子於東宫遷員外散騎侍郎文帝每出軍常懸授兵略二十九年重遣王元謨等北侵配爰五百人随軍碻磝銜中㫖臨時宣示孝武至新亭大將軍江夏王義恭南奔爰時在殿内誑劭追義恭因即得南走時孝武將即大位軍府造次不暁朝章爰素諳其事既至莫不喜悅以兼太常丞撰立儀注後兼尚書右丞遷左丞先是元嘉中使著作郎何承天草創國史孝武初使奉朝請山謙之南臺御史蘇寶生踵成之孝建六年又以爰領著作郎使終其業爰雖因前作而專為一家之書上表起元義熙為王業之始載序宣力為功臣之斷桓元篡竊同於王莽雖靈武克殄自詳之晋錄及犯命干紀受戮霸朝雖在揖禅之前皆著之宋策國典體大方垂不朽請别加詳議於是内外博議太宰江夏王義恭等三十五人同爰議宜以義熙元年為斷散騎常侍巴陵王休若尚書金部郎檀道鸞二人謂宜以元興三年為始太學博士虞龢謂宜以開國為宋公元年詔曰項籍聖公編錄二漢前史已有成例桓元傳宜在宋典餘如爰議孝武崩營景寧陵爰以本官兼將作大匠爰便僻善事人能得人主微㫖頗渉書傳尤悉朝儀元嘉初便入侍左右預参顧問既長於附㑹又飾以典文故為文帝所任遇大明世委寄尤重朝廷大禮儀非爰議不行雖復當時碩學所觧過人者既不敢立異議所言亦不見從孝武崩公除後晋安王子勛侍讀博士諮爰宜習業與否爰答曰居喪讀喪禮習業何嫌少日始安王子眞博士又諮爰爰曰小功廢業三年喪何容讀書其專斷乖謬如此前廢帝凶暴殿省舊人多見罪黜唯爰巧於將迎終始無忤誅羣公後以爰為黄門侍郎領射聲校尉著作如故封吳平縣子寵待隆密羣臣莫比帝每出行常與沈慶之山隂公主同輦爰亦預焉明帝即位以黄門侍郎改領長水校尉兼尚書左丞明年除太中大夫著作並如故爰執權日久上在蕃素所不悅及景和世屈辱卑約爰禮敬甚簡益銜之泰始三年詔暴其罪徙交州及行又詔除廣州統内郡有司奏以為宋隆太守除命既下爰已至交州詔聽還仍除南康郡丞明帝崩還都以爰為濟南太守復除中散大夫元徽三年卒身歴七朝年八十二爰子希秀甚有學觧亦閑篆隸正覺禪靈二寺碑即希秀書也爰之徙交州明帝召希秀謂曰比當令卿父還希秀再拜答曰臣父年老恐不及後恩帝大嗟賞即召爰還希秀位驍騎將軍淮南太守子泓甚閑吏職而在事刻薄於人少恩仕齊歴位臺郎秣陵建康令湘東太守阮佃夫㑹稽諸暨人也元嘉中出身為臺小史明帝初出閤選為主衣後又請為世子師甚見信待景和末明帝被拘于殿内住在祕書省為帝所疑大禍將至計無從出佃夫與王道隆李道免及帝左右琅邪淳于文祖謀共廢立時直閤將軍栁光世亦與帝左右蘭陵繆方盛丹陽周登之有密謀未知所奉登之與明帝有舊方盛等乃使登之結佃夫佃夫大悅先是帝立皇后普暫撤諸王奄人明帝左右錢藍生亦在例事畢未被遣密使藍生候帝慮事泄藍生不欲自出帝動止輙以告淳于文祖令報佃夫景和元年十一月二十九日晡時帝出幸華林園建安王休仁山陽王休祐山隂主並侍側明帝猶在祕書省不被召益懼佃夫以告外監典事東陽朱幼又告主衣吳興夀寂之細鎧主南彭城姜產之產之又語所領細鎧將臨淮王敬則幼又告中書舍人戴明寶並響應明寶幼欲取其日向暁佃夫等勸取開門鼓時幼預約勒内外使錢藍生密報建安王休仁等時帝欲南廵腹心直閤將軍宗越等其夕並聽出外裝束唯有隊主樊僧整防華林閤僧整是栁光世鄉人光世要之即受命姜產之又要隊副陽平聶慶及所領壮士㑹稽富靈符吳郡俞道龍丹陽宋逵之陽平田嗣並聚於慶省佃夫慮力少更欲招合夀寂之曰謀廣事泄不煩多人時巫覡言後堂有鬼其夕帝於竹林堂前與巫共射之建安王休仁等山隂主並從帝素不悅寂之見輙切齒寂之既與佃夫等成謀又慮禍至抽刀前入姜産之随其後淳于文祖繆方盛周登之富靈符聶慶田嗣王敬則俞道龍宋逵之又繼進休仁聞行聲甚疾謂休祐曰事作矣相随奔景陽山帝見寂之至引弓射之不中而走寂之追而弑之事定宣令宿衛曰湘東王受太后令除狂主今已平定明帝即位論功行封夀寂之姜產之佃夫王道隆淳于文祖李道免繆方盛周登之等七人皆封縣侯富靈符聶慶田嗣王敬則俞道龍宋逵之等六人皆封縣子佃夫遷南臺侍御史薛索免度淮為寇山陽太守陳天祚又反佃夫與諸軍破薛索免降天祚後轉太子歩兵校尉南魯郡太守侍太子於東宮泰始四年以本官兼游擊將軍及輔國將軍葢次陽與二衞参員直次陽字崇基平昌安邱人也位冠軍將軍卒時佃夫及王道隆楊運長並執權亞人主巢戴大明之世方之蔑如也嘗正旦應合朔尚書奏遷元㑹佃夫曰元正慶㑹國之大禮何不遷合朔日邪其不稽古如此大通貨賄凡事非重賂不行人有餉絹二百匹嫌少不答書宅舍園池諸王邸第莫及女妓數十藝貌冠絶當時金玉錦繡之飾宫掖不逮也每製一衣造一物京邑莫不法效焉於宅内開瀆東出十許里塘岸整潔汎輕舟奏女樂中書舍人劉休嘗詣之値佃夫出行中路相逢要休同反就席便命施設一時珍羞莫不備具凡諸火劑並皆始熟如此者數十種佃夫常作數十人饌以待賔客故造次便辦類皆如此雖晋世王石不能過也泰始初軍功既多爵秩無序佃夫僕從附隸皆受不次之位捉車人虎賁中郎將傍馬者員外郎朝士貴賤莫不自結而矜慠無所降意入其室者唯吳興沈勃吳郡張澹數人而已明帝晏駕後廢帝即位佃夫權任轉重兼中書通事舍人加給事中輔國將軍餘如故欲用張澹為武陵郡左衛將軍袁粲以下皆不同而佃夫稱敕施行又廬江何恢有妓張耀華美而有寵為廣州刺史將發要佃夫飲設樂佃夫見張氏悅之頻求於恢恢曰恢可得此人不可得也佃夫拂衣出戸曰卿惜指不知失掌邪遂諷有司以公事彈恢凡如此類粲等並不敢執元徽三年遷黄門侍郎領右衞將軍明年改領驍騎將軍遷南豫州刺史歴陽太守猶管内任時廢帝猖狂好出游走始出宫猶整羽儀隊仗俄而棄部伍單騎與數人相随或出郊野或入市㕓内外莫不憂懼佃夫密與直閤將軍申伯宗歩兵校尉朱幼干天寶謀共廢帝立安成王五年春帝欲往江乗射雉帝每出常留隊仗主樂游苑至是棄仗而去佃夫欲稱太后令喚隊仗還閉城門分人守石頭東府遣人執帝廢之自為揚州刺史輔政與申伯宗等已成謀㑹帝不成向江乗故其事不行干天寶因以其謀告帝帝乃收佃夫幼伯宗於光禄外邸賜死佃夫幼等罪止一身餘無所問朱幼泰始初為外監配衣諸軍征討有濟辦之能遂官陟三品為奉朝請南高平太守封安浦縣侯干天寶其先胡人豫竹林堂功元徽中封鄂縣子發佃夫謀以為清河太守右軍將軍昇明中齊高帝以其反覆賜死夀寂之位太子屯騎校尉南泰山太守多納貨賄請謁無窮有一不從便切齒罵詈常云利刀在手何憂不辦鞭尉吏斫邏將後為有司所奏徙送越州至豫章謀反乃殺之姜産之位南濟陽太守後北侵魏戰敗見殺王道隆吳興烏程人兄道迄渉學善書形貌又美吳興太守王韶之謂人曰有子弟如王道迄無所少道隆亦知書泰始二年兼中書通事舍人道隆為明帝所委過於佃夫而和謹自保不妄毁傷人執權既乆家產豐積豪麗雖不及佃夫而精整過之元徽二年桂陽王休範舉兵乃以討佃夫道隆及楊運長為名休範奄至新亭見殺楊運長宣城懷安人素善射為射師性謹慤為明帝委信及即位親遇甚厚後廢帝即位與佃夫俱兼通事舍人以平桂陽王休範功封南城縣子運長質木㢘正脩身甚清不事園宅不受餉遺而凡鄙無識唯與寒人潘智徐文盛厚善動止施為必與二人量議文盛為奉朝請預平桂陽王休範封廣晋縣男順帝即位運長為宣城太守尋還家沈攸之反運長有異志齊高帝遣驃騎司馬崔文仲誅之南齊紀僧眞丹陽建康人也少随征西將軍蕭思話及子惠開皆被賞遇惠開性苛僧眞以微過見罰既而委任如舊及罷益州還都不得志而僧眞事之愈謹惠開臨終歎曰紀僧眞方當富貴我不見也以僧眞託劉秉周顒初惠開在益州益州反被圍危急有道人謂之曰城圍尋觧檀越貴門後方大興無憂外賊也惠開密謂僧眞曰我子弟見在者並無異才政是蕭道成耳惠開没僧眞憶其言乃請事高帝随從在淮隂以閑書題令答逺近書疏自寒官歴至高帝冠軍府参軍主簿僧眞夢蒿艾生滿江驚而白之高帝曰詩人采蕭蕭即艾也蕭生斷流卿勿廣言其見親如此元徽初從高帝出頓新亭拒桂陽賊有功除南臺御史高帝領軍功曹高帝將廢立謀之袁粲褚淵僧眞唘曰今朝廷猖狂人不自保天下之望不在袁褚明公豈得黙然坐受夷滅存亡之機仰希熟慮高帝納之高帝欲度廣陵起兵僧眞又曰主上雖復狂釁而累世皇基猶固盤石今百口北度何必得俱縱得廣陵城天子居深宫施號令目明公為逆何以避此如其不勝則應北走胡中竊謂此非萬全䇿也高帝曰卿顧家豈得逐我行邪僧眞頓首稱無貳昇明元年除員外郎帶東武城令尋除給事中高帝坐東府高樓望石頭城僧眞在側上曰諸將勸我攻袁劉我意未願便爾及沈攸之事起從高帝入朝堂石頭反夜高帝遣衆軍掩討宫城中望石頭火光及呌聲甚盛人懷不測僧眞謂衆曰呌聲不絶是必官軍所攻火光起者賊不容自燒其城此必官軍勝也尋而啓石頭平上出頓新亭使僧眞領軍千人在帳内初上在領軍府僧眞學上手迹下名至是報答書疏皆付僧眞上觀之笑曰我亦不復能别也初上在淮隂脩理城得古錫趺九枚大數尺下有篆文莫能識者僧眞省事獨曰何湏辯此文字此自久逺之物錫而有九九錫之徵也高帝曰卿勿妄言及上將拜齊公已尅日有楊祖之謀於臨軒作難僧眞具請上更選吉辰尋而祖之事覺上曰無卿言亦當致小狼狽此何異滹沱之氷轉齊國中書舍人建元初帶東燕令封新陽縣男轉羽林監遷尚書主客郎太尉中兵参軍兼中書舍人高帝疾甚令僧眞典遺詔永明元年丁父喪起為建威將軍尋除南太山太守又為舍人僧眞容貌言吐雅有士風武帝嘗目送之笑曰人生何必計門戸紀僧眞堂堂貴人所不及也諸權要中最被眄遇後除前軍將軍遭母喪開冡得五色兩頭蛇武帝崩僧眞號泣思慕明帝以僧眞歴朝驅使建武初除游擊將軍兼司農待之如舊欲令僧眞臨郡僧眞唘進其弟僧猛為鎭蠻䕶軍晋熙太守永泰元年除司農卿明帝崩掌山陵事出為廬陵内史卒于官弟僧猛卒於晋熙太守兄弟皆有風姿舉止並善隸書僧猛又能飛白書作飛白賦僧眞子交卿甚有觧用宋時有道人楊法持與高帝有舊元徽末宣傳密謀昇明中以為僧正建元初罷道為寕朔將軍封州陵男二年遣法持為軍主領支軍救援朐山永明四年坐役使客將奪其鮭禀削封云劉係宗丹陽人也少便書畫為宋竟陵王誕子景粹侍書誕舉兵廣陵城内皆死敕沈慶之赦係宗以為東宫侍書泰始中為主書以寒宦累至勲品元徽初為奉朝請兼中書通事舍人員外郎封始興南亭侯帶秣陵令高帝廢蒼梧明旦呼正直舍人虞整醉不能起係宗歡喜奉敕高帝曰今天地重開是卿盡力之日使寫諸處分敕令及四方書疏使主書十人書吏二十人配之事皆稱㫖高帝即位除龍驤將軍建康令永明初為右將軍淮陵太守兼中書通事舍人母喪自觧起復本職四年白賊唐㝢之起宿衛兵東討遣係宗随軍慰勞遍至遭賊郡縣百姓被驅逼者悉無所問還復人伍係宗還上曰此叚有征無戰以時平蕩百姓安恬甚快也賜係宗錢帛上欲脩白下城難於動役係宗唘誨役在東人丁隨㝢之為逆者上從之後車駕出講武上履行白下城曰劉係宗為國家得此一城永明中魏使書常令係宗題答祕書局皆隸之再為少府欝林即位除寕朔將軍宣城太守係宗乆在朝省閑於職事武帝常云學士輩不堪經國唯大讀書耳經國一劉係宗足矣沈約王融數百人於事何益其重吏事如此建武二年卒官茹法亮吳興武康人也宋大明中出身為小史歴齋幹扶侍孝武末年鞭罰過度校獵江右選白衣左右百八十人皆面首富室從至南州得鞭者過半法亮憂懼因緣唘出家得為道人明帝初罷道結事阮佃夫累至高帝冠軍府行参軍及武帝鎭湓城湏舊驅使人法亮求留為武帝江州典籖除南臺御史帶松滋令法亮便僻觧事善於承奉稍見委信建元初度東宫主書除奉朝請補東宫通事舍人武帝即位仍為中書通事舍人除員外郎帶南濟隂太守與㑹稽吕文度臨海吕文顯並以姦佞諂事武帝文度為外監專制兵權領軍將軍守虚位而已天文寺常以上將星占文度吉凶文度尤見委信上嘗云公卿中有憂國如文度者復何憂天下不寕文度既見委用大納財賄廣開宅宇盛起土山奇禽怪樹皆聚其中後房羅綺王侯不能及又唘上籍被却者悉充逺戍百姓嗟怨或逃亡避咎富陽人唐㝢之因此聚黨為亂鼓行而東乃於錢唐縣僭號以新城戍為偽宫以錢唐縣為偽太子宫置百官皆備三吳却籍者奔之衆至三萬竊稱吳國偽年號興平其源始於虞玩之而成於文度事見虞玩之傳法亮文度並勢傾天下太尉王儉常謂人曰我雖有大位權寄豈及茹公永明二年封望蔡縣男七年除臨淮太守轉竟陵王司徒中兵参軍巴東王子響於荆州殺僚佐上遣軍西上使法亮宣㫖安撫子響法亮至江津子響呼法亮法亮疑畏不肯往又求見傳詔法亮又不遣故子響怒遣兵破尹略軍事平法亮至江陵誅賞處分皆稱敕斷決軍還上悔誅子響法亮被責少時親任如舊廣開宅宇私齋光麗與延昌殿相埒延昌殿武帝中齋也宅後為魚池釣臺土山樓館長廊將一里竹林花藥之美公家苑囿所不能及鬱林即位除歩兵校尉時有綦毋珍之居舍人之任凡所論薦事無不允内外要職及郡丞尉皆論價而後施行貨賄交至旬月之間累至千金帝給珍之宅宅邊又有空宅從即併取輙令材官營作不關詔㫖材官將軍細作丞相語云寕拒至尊敕不可違舍人命珍之母隨弟欽之作暨陽令欽之罷縣還珍之迎母至湖熟輙將青􅌁百人自隨鼓角横吹都下富人追從者百數欽之自行佐作縣還除廬陵王驃騎参軍又詐宣敕使欽之領青􅌁珍之有一銅鏡背有三公字常語人云徵祥如此何患三公不至乃就蔣王廟乞願得三公封郡王啓帝求封朝議未許又自陳曰珍之西州伏事侍從入宫契闊心膂竭盡誠力王融姦謀潛構自非珍之翼衛扶持事在不測今惜千戸侯誰為官使者又有牒自論於朝廷曰當世祖晏駕之時内外紛擾珍之手抱至尊口行處分忠誠契闊人誰不知今希千戸侯於分非過乃許三百戸瞋恚形於言色進為五百户又不肯受明帝議誅之乃許封汝南縣有杜文謙者吳郡錢唐人帝為南郡王文謙侍五經文句歴太學博士出為溧陽令未之職㑹明帝知權蕭諶用事文謙乃謂珍之曰天下事可知灰盡粉滅匪朝伊夕不早為計吾徒無類矣珍之曰計將安出答曰先帝故人多見擯斥今召而使之誰不慷慨近聞王洪輙與趙越常徐僧亮萬靈會共語皆攘袂搥牀君其宻報周奉叔使萬靈㑹魏僧勔殺蕭諶則宫内之兵皆我用也即勒兵入尚書斬蕭令兩都伯力耳其次則遣荆軻豫讓之徒因諮事左手頓其胸則方寸之刃足以立事亦萬世一時也今舉大事亦死不舉事亦死二死等耳死社稷可乎若遲疑不斷復少日録君稱敕賜死父母為殉在眼中矣珍之不能用時徐龍駒亦當得封珍之恥與龍駒共詔因求别立事未及行而事敗珍之在西州時有一手版相者云當貴每以此言動帝又圖黄門郎帝嘗問之曰西州時手版何在珍之曰此是黄門手版官何湏問帝大笑珍之時為左將軍南彭城太守領中書通事舍人正直宿宣㫖使即往蔣王廟祈福因收送廷尉與周奉叔杜文謙同死文謙有學行善言吐其父聞其死曰吾所以憂者恐其不得死地耳今以忠義死復何恨哉王經母所以欣經之義也時人美其言龍駒以閹人本給安陸侯後度東宫為齋帥帝即位以後便佞見寵凡諸鄙黷雜事皆所誘勸位羽林監後閤舍人黄門署令淮陵太守帝為龍駒置嬪御妓樂常往含章殿著黄綸㡌被貂裘南面向案代帝畫敕内左右侍直與帝不異前代趙忠張讓之徒莫之能比封惠懷縣男事未行明帝請誅之懇至乃見許曹道剛廢帝之日直閤省蕭諶先入若欲論事兵隨後奄進以刀刺之洞胸死因進宫内廢帝直後徐僧亮盛怒大言於衆曰吾等荷恩今日應死報又見殺道剛字景昭彭城人性質直帝雖與之狎而未嘗敢詶帝說市里雜事以為歡樂道剛輙避之益州人韓䕶善騎馬帝嘗呼入華林園令騎大賞狎之道剛出謂明帝主上猶是小免左右皆湏正人使日見禮則近聞韓䕶與天子齊馬並馳此導人君於危地道剛欲殺之既而遣人刺殺䕶及道剛死張融謂劉繪曰道剛似不為謟亦復不免也答曰夫徑寸之珠非不寶也而蜯之所病云何不療之哉此道剛所以死也明帝即位高武舊人鮮有存者法亮以主者乆事故不見疑位任如故先是延昌殿為武帝隂室蔵諸服御二少帝並居西殿及明帝居東齋開隂室出武帝白紗㡌防身刀法亮歔欷流涕永泰元年王敬則事平法亮復受敕宣慰諸郡無所受納東昏即位出法亮為大司農中書權利之職法亮不樂去固辭不受既而代人已到法亮垂涕而出卒官吕文顯臨海人也昇明初為高帝録尚書省事累遷殿中御史後為秣陵令封劉陽縣男永明元年為中書通事舍人文顯臨事以刻覈被知三年帶南清河太守與茹法亮等迭出入為舍人並見親幸多四方餉遺並造大宅聚山開池時中書舍人四人各住一省世謂之四戸既總重權勢傾天下晋宋舊制宰人之官以六年為限近世以六年過乆又以三周為期謂之小滿而遷換去來又不依三周之制送故迎新吏人疲於道路四方守宰餉遺一年咸數百萬舍人茹法亮於衆中語人曰何湏覔外禄此一户内年辦百萬蓋約言之也其後元象失度史官奏宜脩祈禳之禮王儉聞之謂上曰天文乖忤此禍由四户仍奏文顯等專擅愆和極言其事上雖納之而不能改也文顯累遷左中郎將南東莞太守故事府州部内論事皆籖前直叙所論之事後云謹籖日月下又云某官某籖故府州置典籖以典之本五品吏宋初改為七職宋氏晚運多以幼少皇子為方鎭時主皆以親近左右領典籖典籖之權稍重大明太始中長王臨藩素族出鎭莫不皆出内教命刺史不得專其任也宗慤為豫州吳喜公為典籖慤刑政所施喜公每多違執慤大怒曰宗慤年將六十為國竭命政得一州如斗大不能復與典籖共臨之喜公稽顙流血乃止自此以後權寄彌隆典籖逓互還都一嵗數反時主輙與間言訪以方事刺史行事之美惡係於典籖之口莫不折節推奉恒慮不及於是威行州郡權重藩君劉道濟柯孟孫等姦匿發露雖即顯戮而權任之重不異明帝輔政深知之始制諸州急事宜宻有所論不得遣典籖還都而典籖之任始輕後以文顯守少府見任使歴建武永元之世至尚書右丞少府卿卒官茹法珍㑹稽人梅蟲兒吳興人也齊東昏時並為制局監俱見爱幸自江祏始安王遥光等誅後及左右應敕捉刀之徒並專國命人間謂之刀敕權奪人主都下為之語曰欲求貴職依刀敕湏得富豪事捉刀時又有新蔡人徐世􅋆尤見寵信自殿内主帥為直閤驍騎將軍凡諸殺戮皆世􅋆所勸殺徐孝嗣後封臨汝縣子陳顯達事起加輔國將軍雖用䕶軍崔慧景為都督而兵權實在世􅋆當時權勢傾法珍蟲免又謂法珍蟲免曰何世天子無要人但阿儂貨主惡耳法珍等與之争權遂以白帝帝稍惡其凶彊世􅋆竊欲生心左右徐僧重密知之發其事收得千餘人仗及咒詛文又畫帝十餘形像備為刑斬刺射支觧之狀而自作已像著通天冠衮服題云徐氏皇帝永光二年事發乃族之自是法珍蟲免用事並為外監口稱詔敕中書舍人王咺之與相脣齒專掌文翰其餘二十餘人皆有勢力崔慧景平後法珍封餘干縣男蟲免封竟陵縣男崔慧景之平曲赦都下及南兖州本以宥賊黨而羣凶用事刑辟不依詔書無罪家富者不論赦令莫不受戮籍其家産與慧景深相關為盡力而家貧者一無所問始安顯達時亦已如此至慧景平復然或說王咺之云赦書無信人情大惡咺之曰政當復有赦耳復赦羣小誅戮亦復如先帝自羣公誅後無復忌憚無日不游走所幸潘妃本姓俞名尼子王敬則妓也或云宋文帝有潘妃在位三十年於是改姓曰潘其父寶慶亦從改焉帝呼寶慶及法珍為阿父蟲免及東冶營兵俞靈運為阿免帝與法珍等俱詣寶慶帝躬自汲水助厨人作膳為市中雜語以為諧謔又常輕騎戎服往諸承敕家游宴有吉凶輙往慶弔奄人王寶孫年十三四號為倀子最有寵参預朝政雖王咺之蟲免之徒亦下之控制大臣移易詔敕乃至騎馬入殿詆訶天子公卿見之莫不懾息其佐成昏亂者法珍蟲免及王咺之俞寶慶俞靈運祝靈勇范亮之徐僧重時崇濟芮安泰劉文泰吕文慶胡輝光繆買飬章道之楊敬子李粲之周管之范曇濟石曇悅張惡奴王勝公王懷藻梅師濟鄒伯免史元益王靈範席休文觧滂及太史令駱文叔大巫朱光尚凡三十一人又有奄官王寶孫王法昭許朗之許伯孫方佛念馬僧猛盛劭王竺免隨要袁係世等十人梁武平建鄴皆誅又朱興光為茹法珍所疾得罪被繫豐勇之與王珍國相知行殺皆免初左右刀敕之徒悉號為鬼宫中訛云趙鬼食鴨㔅諸鬼盡著調當時莫觧梁武平建鄴東昏死羣小一時誅滅故稱為諸鬼也俗間以細剉肉糅以薑桂曰㔅意者以凶黨皆細剉而烹之也梁周石珍建康之厮𨽻也世以販絹為業天監中稍遷至宣傳左右身長七尺頗閑應對後遂至制局監帶開陽令歴位直閤將軍太清三年封南豐縣侯猶領制局臺城未陥已射書與侯景相結門初開石珍猶侍左右時賊遣其徒入直殿内或驅馬出入殿庭武帝方坐文德殿怪問之石珍曰皆丞相甲士上曰何物丞相對曰侯丞相上怒叱之曰是名侯景何謂丞相石珍求媚於賊乃飬其黨田遷以為己子遷亦父事之景篡位制度羽儀皆石珍自出景平後及中書舍人嚴亶等送于江陵亶本為齋監居臺省積乆多閑故實在賊居要亞於石珍及簡文見立亶學北人着靴上殿無肅恭之禮有怪之者亶曰吾豈畏劉禪乎從景圍巴陵郡呌曰荆州郡何不送降及至江陵將刑於市泣謂石珍曰吾等死亦是罪盈石珍與其子昇相抱哭亶謂監刑人曰傳語湘東王不有廢也君何以興俱腰斬自是更殺賊黨以版柙舌釘釘之不復得語陸驗徐驎並吳郡吳人驗少而貧苦落魄無行邑人郁吉卿者甚富驗傾身事之吉卿貸以錢米驗借以商販遂致千金因出都下散貲以事權貴朱异其邑子也故嘗有德遂言於武帝㧞之與徐驎兩人逓為少府丞太市令驗本無藝業而容貌特醜先是外國獻生犀其形甚陋故閭里咸謂驗為生犀驗驎並以貪刻為務百賈畏之异尤與之暱世人謂之三蠧司農鄉傅岐梗直士也嘗謂异曰卿任参國鈞榮寵如此比日所聞鄙穢狼籍若使聖主發悟欲免得乎异曰外間謗讟知之乆矣心茍無愧何恤人言岐謂人曰朱彦和將死矣恃諂以求容肆辯以拒諫聞難而不懼知惡而不改天奪其鑒其能乆乎驗竟以侵削為能數年遂登列棘鳴佩珥貂並肩英彦仕至太子右衞率卒贈右衞將軍逺近聞其死莫不快之驎素為邵陵王綸所憾太清二年為綸所殺陳司馬申字季和河内温人也祖慧逺梁都水使者父元通梁尚書左户郎申早有風概十四便善奕棊嘗随父候吏部尚書到溉時梁州刺史隂子春領軍朱异在焉呼與棊申每有妙思异觀而奇之因引申游處太清之難父母俱没因此自誓擔土菜食終身梁元帝承制累遷鎮西外兵記室参軍及侯景冦郢州申随都督王僧辯據巴陵每進䇿皆見行用僧辯歎曰此生要鞬汗馬或非所長若使撫衆守城必有竒績僧辯之討陸納也于時賊衆奄至左右披靡申躬蔽僧辯蒙楯而行會裴之横救至賊乃退僧辯顧而笑曰仁者必有勇豈虚言哉太建中除秣陵令在職以清能見紀有白雀集于縣庭復為東宫通事舍人叔陵之肆逆也事既不㨗出據東府申馳召右衛將軍蕭摩訶帥兵先至追斬之後主深嘉焉以功除太子左衛率封文招縣伯兼中書通事舍人遷右衛將軍歴事三帝内掌機密頗作威福性忍害好飛書以譖毁朝之端士遍罹其殃参預謀謨乃於外宣說以為已力省中祕事往往泄漏性又果敢善應對能候人主顔色有忤已者必以㣲言譖之附已者因機進之是以朝廷内外皆從風靡初尚書右僕射沈君理卒朝廷議以毛喜代之申慮喜預政乃短喜於後主曰喜臣之妻兄高宗時稱陛下有酒德請逐去宫臣陛下寕忘之邪喜由是廢錮又與施文慶李脱兒比周譖殺傅縡奪任忠部曲以配蔡徴孔範是以文武觧體至於覆滅申嘗晝寢於尚書下省有烏啄其口流血及地時論以為譖賢之効也後加散騎常侍右衛舍人如故至徳四年卒後主嗟悼乆之贈侍中䕶軍將軍進爵為侯諡曰忠及𦵏後主自為製誌銘子秀嗣官至太子舍人施文慶不知何許人也家本吏門至文慶好學頗渉書史後主之在東宫文慶事焉及即位擢為中書舍人仍屬叔陵作亂隋師臨境軍國事務多起倉卒文慶聰敏彊記明閑吏職心算口占應時條理由是大被親幸又自太建以來吏道疏簡百司弛縱文慶盡其力用無所縱捨分官聫事莫不振懼又引沈客卿陽恵朗徐哲暨慧景等云有吏能後主信之然並不達大體督責苛碎聚歛無厭王公大人咸共疾之後主益以文慶為能尤更親重内外衆事無不委任累遷太子左衛率舍人如故禎明三年湘州刺史晋熙王叔文在職既乆大得人和後主以其據有上流隂忌之自度素與羣臣少恩恐不為用無所任者乃擢文慶為都督湘州刺史配以精兵二千欲令西上仍徵叔文還朝文慶深喜其事然懼居外後執事者持已短長因進其黨沈客卿以自代未發間二人共掌機宻時隋軍大舉分道而進尚書僕射袁憲驃騎將軍蕭摩訶及文武羣臣持議請於京口採石置兵五千并出金翅二百縁江上下以為防備文慶恐無兵從已廢其述職而客卿又利文慶之任已得專權俱言於朝曰必有論議不假靣陳但作文唘即為通奏憲等以為然二人齎唘入白後主曰此是常事邊城將帥足以當之若出人船必恐驚擾及隋軍臨江間諜驟至憲等慇懃奏請至於再三文慶等曰元㑹將逼南郊之日太子多從今若出兵事便廢闕後主曰今且出兵若北邊無事因以水軍從郊何為不可又對曰如此則聲聞隣境便謂國弱後又以貨動江總總為之游說後主重違其意而廹羣官之請乃令付外詳議總又抑憲等由是未决而隋師濟江後主性怯懦不達軍事晝夜啼泣臺内處分一以委之文慶既知諸將疾已恐其有功乃奏曰此等怏怏素不服官廹此事機那可專信凡有所唘請經略之計並皆不行尋敕文慶領兵頓於樂游苑陳亡隋晋王廣以文慶受委不忠曲為諂佞以蔽耳目比黨數人並於石闕前斬之以謝百姓沈客卿吳興武康人也美風采善談論博渉書史與施文慶少相親昵累遷至尚書儀曹郎聰明有口辯頗知故事每朝廷體式吉凶儀注凡所疑議客卿斟酌裁斷理雖有不經而衆莫能屈事多施行至徳初以為中書舍人兼歩兵校尉掌金帛局以舊制軍人士人二品清官並無關市之稅後主盛脩宫室窮極耳目府庫空虛有所興造恒若不給客卿每立異端唯以刻削百姓為事奏請不問士庶並責關市之估而又增重其舊於是以陽惠朗為太市令暨慧景為尚書金倉都令史二人家本小吏考校簿領毫釐不差糺讁嚴急百姓嗟怨而客卿居舍人總以督之每歳所入過於常格數十倍後主大悅尋加客卿散騎常侍左衞将軍舍人如故惠朗慧景奉朝請禎明三年客卿遂與文慶俱掌機密隋師至文慶出頓樂游苑内外事客卿總焉臺城失守隋晉王以客卿重賦厚斂以悅於上與文慶暨慧景陽惠朗等俱斬於石闕前徐哲不知何許人也施文慶引為制局監掌刑法亦與客卿同誅孔範字法言會稽山隂人也曾祖景偉齊散騎常侍祖滔梁海鹽令父岱歴職清顯範少好學博涉書史太建中位宣惠江夏王長史後主即位為都官尚書與江總等並為狎客範容止都雅文章贍麗又善五言詩尤見親愛後主性愚佷惡聞過失每有惡事範必曲為文飾稱揚贊美時孔貴人絶愛幸範與孔氏結為兄妹寵遇優渥言聽計從朝廷公卿咸畏範範因驕矜以為文武才能舉朝莫及從容白後主曰外間諸将起自行伍匹夫敵耳深見逺慮豈其所知後主以問施文慶文慶畏範並以為然自是将帥㣲有過失即奪其兵分配文吏隋師将濟江羣官請為備防文慶沮壞之後主未决範奏曰長江天壍古來限隔虜軍豈能飛度邊将欲作功勞妄言事急臣自恨位卑虜若能來定作太尉公矣或妄言北軍馬死範曰此是我馬何因死亡後主笑以為然故不深備尋而隋将賀若弼陷南徐州執城主荘元始韓擒虎陷南豫州敗水軍都督高文泰與中領軍魯廣逹頓于白塔寺後主多出金帛募人立功範素於武士不接莫有至者唯負販輕薄多從之高麗百濟崑崙諸夷並受督時任蠻奴請不戰而已渡江攻其大軍又司馬消難言於後主曰弼若登高舉烽與韓擒虎相應鼔聲交震人情必離請急遣兵北據蒋山南斷淮水質其妻子重其賞賜陛下以精兵萬人守城莫出不過十日食盡二将之頭可致闕下範冀欲立功志在於戰乃曰司馬消難狼子野心任蠻奴淮南傖士語並不可信事遂不行隋軍既逼蠻奴又欲為持久計範又奏請作一决當為官勒石燕然後主從之明日範以其徒居中以抗隋師未陣而北範脫身遁免尋與後主俱入長安初晉王廣所戮陳五佞人範與散騎常侍王瑳王儀御史中丞沈瓘過惡未彰故免及至長安事並露隋文帝以其姦佞諂惑並暴其過惡名為四罪人流之逺裔以謝呉越之人瑳儀並琅邪人瑳刻薄貪鄙忌才害能儀候意承顔傾巧側媚又獻其二女以求親昵瓘險慘苛酷發言邪諂故同罪焉後魏王叡字洛誠自云太原晉陽人也六世祖横張軌參軍晉亂子孫因居於武威姑臧父橋字法生觧天文卜筮凉州平入京家貧以術自給歴位終於侍御中散天安初卒贈平逺将軍凉州刺史顯菱侯諡曰敬叡少傳父業而姿貎偉麗景穆之在東宫見而竒之興安初擢為太卜中散稍遷為令領太史永明元年文明太后臨朝叡因縁見幸超遷給事中俄為侍中吏部尚書賜爵太原公於是内參機密外預政事愛寵日隆朝士懾憚焉太和二年孝文及文明太后率百寮與諸方客臨虎圏有猛虎逸登閣道幾至御坐左右侍衛皆驚靡叡獨執㦸禦之虎乃退故親任轉重三年春詔叡與東陽王丕入八議永受復除四年遷尚書令進爵中山王加鎮東大将軍置王官二十二人中書侍郎鄭羲為傅中郎令以下皆當時名士又拜叡妻丁氏為妃及沙門法秀謀逆事發多所牽引叡曰與殺不辜寧赦有罪宜梟首惡餘從原赦不亦善乎孝文從之得免者千餘人叡出入帷幄太后密賜珍翫繒綵人莫能知率常以夜帷載閹官防致前後巨萬不可勝數加以田園奴婢牛馬雜畜盡皆良美大臣及左右因是以受賚賜外示不私所費又以萬計及疾病孝文及太后每親視疾侍官省問相望於道及疾篤上疏陳情并言刑政得失尋薨孝文文明太后親臨哀慟賜温明祕器宕昌公王遇監䕶喪事贈衞大将軍太宰并州牧諡曰宣王内侍長董醜奴營墳墓将𦵏於城東孝文登城樓以望之京都文士為作哀詩及誄者百餘人乃立叡祠於都南二十里大道右起廟以時祭薦并立碑銘置守祠五家又詔襃揚叡圖其捍猛獸状於諸殿令高允為之讚京邑士女謟稱叡美造新聲而絃歌之名曰中山王詔班樂府合樂奏之初叡女妻李冲兄子㽔次女又適趙國李恢子華女之将行先入宫中其禮略如公主王女之儀太后親御太華殿寝其女於帳中叡與張祐侍坐叡所親及兩李家丈夫婦人列於東西廊及女子登車太后送過中路時人竊謂天子太后嫁女叡之𦵏也假親姻義舊衰絰縞冠送喪者千餘人皆舉聲慟泣以要榮利時謂之義孝叡既貴乃言家本太原晉陽遂移屬焉故其兄弟封爵多以并州郡縣薨後重贈叡父橋侍中征西将軍左光禄大夫儀同三司武威王諡曰定追策叡母賈氏為妃立碑於墓左父子並𦵏城東相去里餘遷洛後更徙𦵏太原晉陽故地子襲字元孫叡薨孝文詔襲代領都曹為尚書令領吏部曹後襲王爵例降為公太后崩後襲禮遇稍薄不復闗預時事後出為并州刺史輿駕詣洛路幸其州人庶多為立銘置於大路虛相稱美或云襲所教也尚書奏免其官詔唯降號二等卒贈豫州刺史諡曰質襲弟椿字元壽正始中拜太原太守坐事免椿僮僕千餘園宅華廣聲伎自適無乏於時或有勸椿仕者椿笑而不答雅有巧思凡所營製可為後法由是正光中元义将營明堂辟雍欲徴為将作大匠椿聞而固辭孝昌中爾朱榮以汾州胡逆表椿慰勞汾胡汾胡與椿並州服其聲望所至降下事寧授太原太守以預立荘帝功封遼陽縣子尋轉封真定縣永熈中除瀛州刺史時有風雹之變詔書廣訪讜言椿乃上疏言政事之宜椿性嚴察下不容姦所在吏人畏之重足天平末更滿還鄉初椿於宅構起聽事極為高壮時人忽云此乃太原王宅豈是王太原宅椿往為本郡世皆呼為王太原未幾爾朱榮居椿之宅榮封太原王焉至於齊神武之居晉陽霸朝所在人士輻湊椿禮敬親知多所拯接後以老病辭疾客居趙郡之西鯉魚祠山卒贈尚書左僕射太尉公冀州刺史諡曰文恭及𦵏齊神武親自弔送椿妻鉅鹿魏悅次女明逹有逺操多識往行前言隨夫在華州兄子建在洛遇患聞而馳赴膚容虧損親類歎尚之爾朱榮妻北鄉郡長公主深所禮敬永安中詔以為南和縣君内足於財不以華飾為意撫兄子牧情同已子存拯親類所在周給椿名位終始魏有力焉卒贈鉅鹿郡君無子以兄孫叔明為後王仲興趙郡南欒人也父天徳起自細微至殿中尚書仲興幼而端謹以父任早給事左右累遷越騎校尉孝文在馬圈自不豫大漸迄于崩仲興頗預侍䕶宣武即位轉左中郎将及帝親政與趙脩並見寵任遷光禄大夫領武衛将軍雖與脩並而畏慎自退不若脩倨傲無禮咸陽王禧之出奔也當時上下微為震駭帝遣仲興先馳入金墉安慰後與領軍于勁參機要因自廻馬圈侍疾及入金墉功遂封上黨郡開國公自拜武衛及受封日車駕每臨饗其宅宣武游幸仲興常侍不離左右外事得徑以聞百寮亦聳體而承望焉兄可久以仲興故自散爵為征虜府長史帯彭城太守仲興世居趙郡自以寒微云舊出京兆霸城故為雍州大中正尚書後以仲興賞報過優北海王詳嘗以靣啓奏請降减事久不决可久在徐州恃仲興寵勢輕侮司馬梁郡太守李長壽乃令童僕邀毆長壽遂折其臂州以表聞北海王詳因百寮朝集厲色大言曰徐州名藩先帝所重朝廷云何簡用上佐遂致此紛紜以徹荒外豈不為國醜辱仲興是後漸疎宣武乃下詔奪其封邑後卒於并州刺史宣武時又有上谷寇猛少以姿幹充虎賁稍遷至武衛将軍出入禁中無所拘忌自以上谷寇氏得補燕州大中正而不能甄别士庶也卒贈燕州刺史趙脩字景業趙郡房子人也父謐陽武令脩本給事東宫為白衣左右頗有膂力宣武踐阼愛遇日隆然天性闇塞不閑書疏宣武親政旬月間頻有轉授每受除設宴帝幸其宅諸王公百寮悉從帝親見其母脩能劇飲至於逼勸觴爵雖北海王詳廣陽王嘉等皆亦不免必致困亂每適郊廟脩常驂陪出入華林恒乗馬至禁内咸陽王禧誅其家財貨多賜高肇及脩脩之𦵏父百官自王公已下無不弔祭酒犢祭奠之具填塞門街於京師為制碑銘獸石柱皆發人車牛傳致本縣財用之費悉自公家凶吉車乗将百兩道路供給皆出於官時将馬射宣武留脩過之帝如射宫又驂乗輅車旒竿觸東門折脩恐不逮𦵏日驛赴窆期左右求從及特遣者數十人脩道路嬉戲殆無慼容或與賔客奸掠婦女祼觀從者噂踏喧譁詬詈無節莫不畏而惡之是年又為脩廣增宅舍多所并兼洞門高堂房廡周博崇麗擬於諸王其四靣鄰居賂入其地者侯天盛兄弟越次出補長史大郡脩起自賤伍暴致富貴奢慠無禮物情所疾因其在外左右或諷紏其辠自其𦵏父還也舊寵少薄初王顯附脩後因忿䦧密伺其過列脩𦵏父時路中滛亂不軌又云與長安人趙僧􅋆謀匿玉印事高肇甄琛等構成其辠乃密以聞始琛及李馮等曲事脩無所不至懼相連及乃争共紏擿遂有詔按其罪惡鞭之一百徙敦煌為兵其家宅作徒即仰停罷所親在内者悉令出禁是日脩詣領軍于勁第與之摴蒱籌未及畢羽林數人相續而至稱詔呼之脩驚起隨出路中執引脩馬詣領軍府琛與顯監决其辠先具問事有力者五人更迭鞭之占令必死㫖决百鞭其實三百脩素肥壮腰腹博碩堪忍楚痛了不轉動鞭訖即召驛馬促之令發出城西門不自勝舉縛置鞍中急驅馳之其母妻追隨不得與語行八十里乃死初于后之入脩之力也脩死後領軍于勁猶追感舊意經恤其家自餘朝士昔相宗承者悉棄絶之以示已之踈逺焉茹皓字禽竒舊呉人也父謙之本名要隨宋巴陵王休若為将至彭城寓居淮陽上黨年十五六為縣金曹吏南徐州刺史沈陵見而善之自隨入洛舉充孝文白衣左右宣武踐阼皓侍直禁中稍被寵接宣武嘗拜山陵路中欲引與同車黄門侍郎元匡切諫乃止及帝親政皓眷賚日隆時趙脩亦被幸妬之求出皓皓亦慮見危禍不樂内官遂超授濮陽太守其父因皓訟理舊勲先除兖州陽平太守賜以子爵父子剖符名邦郡境相接皓忻於去内不以疎外為戚及趙脩等敗竟獲全皓雖起細微為守乃清簡寡事後授左中郎将領直閤寵待如前皓既宦逹自云本出鴈門鴈門人謟附者乃因薦皓於司徒請為肆州大中正詔特依許遷驍騎将軍領華林諸作皓性微工巧多所興立為山於天淵池西採掘北芒及南山佳石徙竹汝潁羅蒔其間經構樓觀列於上下樹草栽木頗有野致帝心悅之以時臨幸焉皓貴寵日昇關預政事太傅北海王詳以下咸祗憚之皓娶僕射高肇從妺於帝為從母迎納之日詳親詣之禮以馬物皓又為弟娉安豐王延明妹延明恥非舊流不許詳勸之云欲覔官職如何不與茹皓為婚姻也延明乃從之皓頗敏慧折節下人潛自經營隂有納受貨産盈積起宅宫西朝貴弗之及也時帝雖親萬機皓率常居内留宿不還傳可門下奏事未幾轉光禄少卿意殊不已方欲陳馬圈從先帝勞更希榮舉初脩皓之寵北海王詳皆附之又直閣劉胄本為詳所薦常感恩高肇素嫉諸王常規陷害既知詳與皓交關相昵乃構之云皓等将有異謀宣武乃召中尉崔亮令奏皓胄常季賢陳埽静四人擅勢納賄及私亂諸事即日執皓等皆詣南臺翌日奏處殺之皓妻被髪出堂而迎皓皓徑入哭别食椒而死胄字元孫後位直閤将軍季賢起於主馬宣武初好騎乗因是獲寵位司藥丞仍主廐閑埽静徐義㳟並彭城舊營人埽静能為宣武典櫛梳義恭善執衣服並以巧便旦夕居中愛幸相侔官叙不異二人皆奉承皓皓亦接眷而埽静偏為親密與皓常在左右略不歸休皓敗埽静亦死於家義恭小心謹慎皓等死後彌見幸信宣武不豫義恭晝夜扶抱崩于懷中義恭謟附元义义有滛宴多在其宅位終左光禄大夫趙邕字令和自云南陽人也潔白美鬚眉司空李沖之貴寵也邕以少年端謹出入其家頗給按磨奔走之役冲令與諸子游處人有束帯謁沖者時託之以自通太和中給事左右至殿中監宣武即位及親政猶居本任微與趙脩結為宗援然亦不甚相附也邕父怡以邕寵召拜太常少卿尋為荆州大中正出為荆州刺史怡乃致其母喪𦵏於宛城之南趙氏舊墟後拜金紫光禄大夫卒贈相州刺史宣武每出入郊廟脩恒以常侍兼侍中陪乗而邕兼奉車都尉執轡同載時人竊論號為二趙以趙出南陽徙屬荆州邕轉給事中南陽中正以父為荆州大中正罷宣武崩邕兼給事黄門後為幽州刺史貪與范陽盧氏為婚女父早亡其叔許之而母不從母北平陽氏擕女至家藏避規免邕乃考掠陽叔遂至於死陽氏訴寃邕坐處死㑹赦免孝昌初卒侯剛字乾之河南洛陽人也其先代人本出寒微少以善於鼎俎得進膳出入積官至嘗食典御宣武以其質直賜名剛焉稍遷左中郎将領刀劔左右後領太子中庶子宣武崩剛與侍中崔光迎明帝於東宫尋除衛尉卿封武陽縣侯俄為侍中撫軍将軍恒州大中正進爵為公熙平中侍中游肇出為相州剛言於靈太后曰昔高氏擅權游肇抗衡不屈而出牧一藩未盡其美宜還引入以輔聖主太后善之剛寵任既隆江陽王繼尚書長孫承業皆以女妻其子司空任城王澄以其起由膳宰頗竊侮之云此近為我舉食然公坐對集敬遇不虧後剛坐掠殺試射羽林為御史中尉元匡所弹處剛大辟尚書令任城王澄為之言於靈太后令削封三百户觧嘗食典御剛於是頗為失意剛自太和進食遂為典御歴兩都三帝二太后将三十年至此始觧御史中尉元匡之廢也剛為太傅清河王懌所舉除車騎将軍領御史中尉及領軍元义執政剛長子义之妹夫乃引剛為侍中左衛将軍還領嘗食典御以為扳援復領御史中尉剛啓軍旅稍興國用不足求以已邑俸粟賑給征人比至軍下明帝許之孝昌元年除領軍初元义之觧領軍靈太后以义腹心尚多恐難卒制故權以剛代之示安其意尋出為冀州刺史剛在道詔暴其朋黨元义逼脅内外降為征虜将軍餘悉削黜終於家永安中贈司徒公剛以上谷先有侯氏於是始家焉徐紇字武伯樂安博昌人也家世寒微紇少好學頗以文詞見稱宣武初自主書除中書舍人謟附趙脩脩誅坐徙枹罕雖在徒役志氣不撓故事捉逃役流兵五人者聽免紇以此得還久之復除中書舍人太傅清河王懌以文翰待之及元义害懌出為鴈門太守稱母老觧郡尋飾貌事义又大得义意靈太后反政以紇曾為懌所顧待復自母憂中起為中書舍人曲事鄭儼儼特信任之俄遷給事黄門侍郎仍領舍人總攝中書門下事軍國詔命莫不由之時有急速令數吏執筆或行或卧人别占之造次俱成不失事理雖無雅才咸得濟用時黄門侍郎太原王遵業琅邪王誦並稱文學亦不免為紇秉筆承其指授尋加金紫紇機辨有智數公當决斷終日不以為勞長直禁中略無休息時復夜還與沙門講論分宵逹旦而心力無怠道俗歎服之然性浮動慕權利外似謇正内實諂諛時豪勝已必相陵架書生貧士矯意禮之其詭態若此有識鄙焉紇既處腹心参判機密勢傾一時逺近填湊與鄭儼李神軌寵任相亞時稱徐鄭焉然無經國大體好行小數説靈太后以鐵劵間爾朱榮左右榮知深以為憾啓求誅之榮将入洛既尅河梁紇矯詔夜開殿中取驊騮御馬千餘匹東走兖州羊侃時為泰山太守紇往投之說侃令舉兵從之遂聚兵反共紇圍兖州孝荘初遣侍中于暉為行臺與齊神武討之紇慮不免説侃請乞師於梁侃信之遂奔梁紇文筆駁論數十卷多有遺落時或存於世焉鄭儼字季然滎陽開封人也祖敬叔濮陽太守父籍徐州平東長史儼容貌壮麗初為司徒胡國珍行參軍因為靈太后所幸時人未之知後太后廢蕭寳夤西征以儼為友及太后反政儼請使還朝復見寵待拜諫議大夫中書舍人領嘗食典御晝夜禁中寵愛尤甚儼每休沐太后嘗遣閹童隨侍儼見其妻唯得言家事而已與徐紇俱為舍人儼以紇有智數仗為謀主紇以儼寵幸既盛傾身承接共相表裏勢傾内外城陽王徽亦與之合當時政令歸於儼等遷散騎常侍車騎将軍舍人常侍如故明帝崩事出倉卒天下咸言儼計爾朱榮舉兵向洛陽以儼紇為辭榮逼京師儼走歸鄉里儼從兄仲明欲據郡起衆尋為其部下所殺儼與仲明俱傳首洛陽郭秀范陽涿人也事齊神武稍遷行臺中丞封壽陽伯親寵日隆多受賂遺進退人物張伯徳祁仲彦張華原之徒皆深相附㑹秀疾神武親視之問所欲官乃啓為七兵尚書除書未至而卒家無成人子弟神武自至其宅親使録知其家資粟帛多少然後去贈儀同三司恒州刺史命其子孝義與太原公以下同學讀書初秀忌嫉楊愔誑脅令其逃亡秀死後愔還神武追忿秀即日斥遣孝義終身不齒北齊和士開字彦通清都臨漳人其先西域商胡本姓素和氏父安恭敏善事人稍遷中書舍人魏静帝嘗夜與朝賢講集命安看斗柄所指安曰臣不識北斗神武聞之以為淳直由是啓除給事黄門侍郎位儀州刺史士開貴贈司空公尚書左僕射冀州刺史諡文貞公士開幼而敏慧選為國子學生解悟㨗疾為同業所尚天保初武成封長廣王辟士開開府行參軍武成好握槊士開善於此戲由是遂有斯舉加以傾巧便僻又能彈胡琵琶因致親狎嘗謂王曰殿下非天人也是天帝也王曰卿非世人也是世神也其深相愛重如此文宣知其輕薄不欲令王與小人相親善責其戲狎過度徙之馬城乾明元年孝昭誅楊愔等敕追還長廣玉請之也武成即位累遷給事黄門侍郎侍中高元海黄門郎高乾和及御史中丞畢義雲等疾之将言其事士開乃奏元海等交結朋黨欲擅威福乾和因被疎斥義雲反納貨於士開除兖州刺史士開初封定州真定縣子尋進為伯天統元年加儀同三司尋除侍中加開府及遭母劉氏憂帝聞而悲惋遣武衛将軍侯吕芬詣宅晝夜扶侍并節哀止哭又遣侍中韓寳業齎手敕慰諭云朕之與卿本同心腹今懷抱痛割與卿無異當深思至理以自開慰成服後吕芬等始還其日遣韓寳業以犢車迎士開入内帝親握手下泣曉諭然後遣還駕幸晉陽給假聽過七日續發其見重如此并諸弟四人並起復本官四年再遷尚書右僕射侍中如故帝先患氣疾因飲酒輙大發動士開每諫不從後帝屬氣疾發又欲飲酒士開淚下歔欷而不能言帝曰卿此是不言之諌因不飲酒及冬公主出降叚氏帝幸平原王第始飲酒焉又除尚書左僕射仍兼侍中武成在外朝視事或在内宴賞須臾之間不得不與士開相見或累月不歸一日數入或放還之後俄頃即追未至之間連騎催喚奸謟日至寵愛彌隆前後賞賜不可勝紀言辭容止極諸鄙䙝以夜繼日無復君臣之禮至説武成云自古帝王盡為灰土堯舜桀紂竟復何異陛下宜及少壮恣意作樂從横行之即是一日快活敵千年國事分付大臣何慮不辦無為自勤約也帝大悅於是委趙彦深掌官爵元文遥掌財用唐邕掌外兵白建掌騎兵馮子琮胡長粲掌東宫帝三四日乃一坐朝書數字而已略無言須臾罷入及帝寝疾於乾壽殿士開入侍醫藥帝謂士開有伊霍之才屬以後事臨崩握其手曰勿負我也仍絶於士開之手後主以武成顧託之恩深委任之又先得幸於胡太后是以彌見親密趙郡王叡與婁定逺元文遥等謀出士開仍引任城馮翊二王及叚韶安吐根共為計策屬太后觴朝貴於前殿叡靣陳士開罪失云士開先帝弄臣城狐社䑕受納貨賄穢亂宫掖臣等義無杜口冒以死陳太后曰先帝在時王等何意不道今日欲欺孤寡邪但飲酒勿多言叡詞色愈厲安吐根繼進曰臣本商胡得在諸貴行末既受厚恩豈敢惜死不出士開朝野不定太后曰别日論之王等且散叡等或投冠於地或拂衣而起言詞咆哮無所不至明日叡等復於雲龍門令文遥入奏三反太后不聽叚韶呼胡長粲使傳太后言曰梓宫在殯事大怱速猶欲王等更思量趙郡王等遂並拜謝長粲復命太后謂曰成妹母子家計者兄之力也厚賜叡等而罷之太后及後主召問士開士開曰先帝於羣臣之中待臣最重陛下諒闇始爾大臣皆有覬覦今若出臣正是翦陛下羽翼宜謂叡等云文遥與臣同是任用豈得一去一留並可以為州且依舊出納待過山陵然後發遣叡等謂臣真出心必喜之後主及太后告叡等如其言以士開為兖州刺史文遥為西兖州刺史山陵畢叡等促士開就路士開載美女珠簾及諸寳翫以詣婁定逺謝曰諸貴欲殺士開䝉王特賜性命用作方伯今欲奉别且先送二女子一珠簾定逺大喜謂士開曰欲得還入不士開曰在内久常不自安不願更入定逺信之送至門士開曰今日逺出願得一辭覲二宫定逺許之士開由是得見太后及後主進説曰先帝一旦登遐臣愧不能自死觀朝貴意勢欲以陛下為乾明臣出之後必有大變臣復何靣目見先帝於地下因慟哭後主及太后皆泣問計将安出士開曰臣已得入復何所慮正須數行詔書耳於是詔出定逺為青州刺史責趙郡王叡以不臣之罪召入殺之復除士開侍中左僕射定逺歸士開所遺仍加以餘珍賂之武平元年封淮陽王尋除尙書令録尚書事食定州常山郡幹武成時恒令士開與太后握槊又出入卧内遂與太后為亂及武成崩後彌自放恣琅邪王儼惡之與領軍大将軍庫狄伏連侍中馮子琮御史王子宜武衛大将軍高舍洛等謀誅之伏連發京畿軍士帖神武千秋門外並私約束不聽士開入殿士開雖為領軍恒性好内多早下縱當直必須還宅晚始來門禁宿衛略不在意其年七月二十五日旦士開依式早參庫狄伏連前把士開手曰今有一大好事王子宜便授一函云有敕令王向臺遣軍士防送禁治書侍御㕔事儼遣都督馮永洛就臺斬之時年四十八先是鄴下童謡云和士開當入臺士開謂入上臺至是果驗儼令御史李幼業羊立正将令史就宅簿録家口自領兵士從殿西北角出斛律明月說後主親自曉告軍士軍士果散即斬伏連及王子宜並支觧棄屍殿西街自餘皆辮頭反縛付趙彦深於凉風堂推問死者十餘人帝哀悼不視事數日後追憶不已詔起復其子道盛為通直散騎常侍又敕其弟士休入内省參典機密詔贈士開假黄鉞十州諸軍事右丞相太宰司徒公録尚書事諡曰文定士開禀性庸鄙不窺書傳發言吐論唯以諂媚自資自河清天統以後威權轉盛富商大賈朝夕填門聚斂貨財不知紀極雖公府屬掾郡縣守長不拘階次啓牒即成朝士不知㢘恥者多相附㑹甚者為其假子與市道小人丁鄒嚴興等同在昆季行列又有一人士曾參士開疾患遇醫人云王傷寒極重應服黄龍湯士開有難色是人云此物甚易王不須疑惑請為王先嘗之一舉便盡士開深感此心為之彊服遂得汗病愈其勢傾朝廷如此雖以左道事之者不隔賢愚無不進擢而正理違忤者亦頗能含容之士開見人将加刑戮多所營救既得免罪即令諷論責其珍寳謂之贖命物雖有全濟者皆非直道安吐根安息胡人曾祖入魏家於酒泉吐根魏末充使蠕蠕因留塞北天平初蠕蠕主使至晉陽吐根密啓本蕃情状神武得為之備蠕蠕果遣兵入掠無獲而反神武以其忠欵厚加賞賚其後與蠕蠕和親結成婚媾皆吐根為行人也吐根性和善頗有計䇿頻使入朝為神武親待在其本蕃為人所譖奔投神武文襄嗣事以為假節凉州刺史率義侯稍遷儀同三司食永昌郡幹皇建中加開府齊亡年卒穆提婆本姓駱漢陽人也父超以謀叛伏法提婆母陸令萱配入掖庭提婆為奴後主在襁褓中令其鞠養謂之乾阿妳呼姊姊遂為胡太后昵愛令萱姧巧多機辯取媚百端宫掖之中獨擅威福封為郡君和士開高阿那肱皆為郡君義子天統初奏引提婆入侍後主朝夕左右大被親狎無所不為武平元年稍遷儀同三司又加開府尋授武衛大将軍秦州大中正二年除侍中轉食樂陵郡幹寵遇彌隆遂至尚書左右僕射領軍大將軍録尚書事封城陽郡王贈其父司徒公尚書左僕射城陽王令萱又佞媚穆昭儀養之為女是以提婆改姓穆及穆氏定位號令萱曰太姬視第一品班在長公主之上自武平三年之後令萱母子勢傾内外賣官鬻獄聚斂無厭每一賜與動傾府藏令萱則自太后以下皆受其指麾提婆則唐邕之徒皆重跡屛氣提婆嘗有罪太姬於帝前罵之曰奴斷我兒兒謂帝奴謂提婆也斛律皇后之廢也太后欲以胡昭儀正位後宫力不能遂乃卑辭厚禮以求令萱令萱亦以胡氏寵幸方睦不得已而白後主立之然意在穆昭儀每私謂後主曰豈有男為皇太子而身為婢妾又恐胡后不可以正義離間乃外求左道行厭蠱之術旬朔之間胡氏遂即精神恍惚言笑無恒後主遂漸相畏惡令萱一旦忽以皇后服御衣被穆昭儀又先别造寳帳爰及枕席器玩莫匪珍竒坐昭儀於帳中謂後主云有一聖女出将大家看之及見昭儀更相媚悅令萱云如此人不作皇后遣何物人作皇后於是立穆氏為右皇后以胡氏為左皇后尋復黜胡以穆為正嫡引祖珽為宰相殺胡長仁皆令萱所為也自外殺生與奪不可盡言提婆雖庸品厮濫而性乃和善不甚害物耽聲色極奢侈晚朝早退全不以公事闗懷未嘗毒害士人亦由此稱之晉州軍敗後主還鄴提婆奔投周軍令萱自殺子孫大小皆棄市籍沒其家周武帝以提婆為柱國宜州刺史未幾云将據宜州起兵與後主相應誅死後主及齊氏諸王並因此非命高阿那肱善無人也父市貴從神武以軍功封常山郡公位晉州刺史贈太尉公及阿那肱貴寵贈成臯王阿那肱初為庫典每從征討以功封宜城縣男天保初除庫典都督四年從討契丹及蠕蠕以蹻㨗見知太寧初除假儀同三司武衛将軍阿那肱工於騎射性便僻善事人每宴射之次大為武成所愛重又謟悦和士開尤相䙝狎士開每為之言彌見親待河清中除儀同三司食汾州定陽仵城二郡幹以破突厥封宜君縣伯天統初加開府除侍中驃騎大将軍領軍别封昌國縣侯後主即位除并省尚書右僕射武平元年封淮陽郡王仍遷并省尚書左僕射又除并省尚書令領軍大将軍并州刺史阿那肱才伎傭劣不渉文史識用尤在士開之下而奸巧計數亦不逮士開既為武成所幸多令在東宫侍衛後主所以大被寵遇士開死後後主謂其識度足繼士開遂致位宰輔武平四年令其録尚書事又總知外兵及内省機密頓不如和士開駱提婆母子賣獄鬻官韓長鸞憎疾良善而少言辭不妄喜怒亦不察人隂私虛相讒搆遂至司徒公右丞相其録尚書刺史並如故及周師逼平陽後主於天池校獵晉州頻遣馳奏從旦至午驛馬三至阿那肱云大家正作樂邊境小小兵馬自是常事何急奏聞向暮更有使至云平陽城已䧟賊方乃奏知明即欲引軍淑妃又請更合圍所以彌致遲緩及軍赴晉州命阿那肱率前軍先進仍總節度諸軍後主至平陽城下謂阿那肱曰戰是邪不戰是邪阿那肱曰兵雖多堪戰者不過十萬病傷及繞城火頭三分除一昔國家攻玉壁彼援軍來即退今日将士豈勝神武皇帝時邪不如勿戰却守高梁橋安吐根曰一把子賊馬上刺取擲汾河中帝意未决諸内參曰彼亦天子彼尚能懸軍逺來我何為守壍示弱帝曰此言是也於是橋壍進軍使内參讓阿那肱曰爾富貴足惜性命邪後主從穆提婆觀戰東偏頗有退者提婆怖曰大家去大家去帝與淑妃奔高梁橋開府奚長樂諫曰半進半退戰家之常體今兵衆全整未有傷敗陛下舍此安之御馬一動人情驚亂願速還安慰之武衛張常山自後至亦曰軍尋收訖甚整頓圍城兵亦不動至尊宜回不信臣言乞将内參往視帝将從之提婆引帝肘曰此言豈可信邪帝遂北馳有軍士雷相告稱阿那肱遣臣招引西軍行到文侯城恐事不果故還聞奏後主召侍中斛律孝卿令其檢校孝卿固執云此人自欲投賊行至文侯城迷不得去畏死妄語耳事遂寝還至晉陽阿那肱腹心人馬子平告阿那肱謀反又以為虛妄斬子平乃顛沛還鄴侍衛逃散唯阿那肱及閹寺數十騎從行復除大丞相後主走度河令阿那肱以數千人投濟州闗仍遣覘候周軍進止日夕馳報阿那肱每奏云周軍未至且在青州集兵馬未須南行及周軍且至闗所部兵馬皆散阿那肱遂降時人皆云阿那肱表欵周武必仰生致齊主故不速報兵至使後主被禽阿那肱至長安授大将軍封郡公尋出為隆州刺史大象末在蜀從王謙起兵誅死初天保中文宣自晉陽還鄴有愚僧禿師於路中大呌呼文宣姓名云阿那瓌終破你國時蠕蠕主阿那瓌在塞北彊盛帝尤忌之所以每歳擊討後亡齊者遂屬高阿那肱云肱雖作肱字世人皆稱為瓌音斯固亡秦者胡葢縣定於窈㝠也韓鳳字長鸞昌黎人也父永興開府青州刺史高密郡公鳳少聰察有膂力善騎射稍遷烏賀鎮大賢鎮正都督後主居東宫年尚幼武成簡都督三十人送令侍衛鳳在其數後主親就衆中牽鳳手曰都督看兒來因此被識數喚共戲襲高密郡公位開府儀同三司武平二年和士開為庫狄伏連等矯害敕咸陽王斛律明月宜陽王趙彦深在凉風堂推問支黨其事祕密皆令鳳口傳然後宣詔敕號令文武禁掖防守悉以委之除侍中領軍總知省内機密祖珽曾與鳳於後主前論事珽語鳳云彊弓長矟容相推讓軍國謀算何由得争鳳答云各出意見豈在文武優劣後主将誅斛律明月鳳固執不從祖珽因有讒言既誅明月數日後主不與語後尋復舊仍封舊國昌黎郡王又加特進及祖珽除北徐州刺史即令赴任既辭之後遲留不行其省事徐孝逺密告祖珽誅斛律明月後矯稱敕賜其珍寳財物亦有不云敕而徑廻取者敕令領軍将軍侯吕芬追珽還引入侍中省鎻禁其事首尾並鳳約敕責之進位領軍大将軍餘悉如故息寳行尚公主在晉陽賜甲第一區其公主生男滿月駕幸鳳宅宴㑹盡日每旦早參先被勑喚顧訪出後方引奏事官若不視事内省急速者皆附奏聞軍國要密無不經手東西廵幸及山水游戲射獵獨在御旁與高阿那肱穆提婆共處衡軸號曰三貴損國害政日月滋甚壽陽陷沒鳳與穆提婆聞告敗握槊不輟曰他家物從他去後帝使於黎陽臨河築城戍曰急時且守此作龜兹國子更可憐君臣應和若此鳳恒帯刀走馬未嘗安行瞋目張拳有噉人之勢每咤曰恨不得剉漢狗飼馬又曰刀止可刈漢賊頭不可刈草其弟萬歳及其二子寳行寳信並開府儀同萬歳又拜侍中亦處機要寳信尚公主駕復幸其宅親戚咸䝉官賞鳳母鮮于叚孝言之從母子姊也為此偏相參附奏遣監造晉陽宫陳徳信馳驛檢行見孝言役官夫匠自營宅即語云僕射為至尊起臺殿未訖何容先自營造鳳及穆提婆亦遣孝言分工匠為已造宅徳信還具奏聞及幸晉陽鳳又以官馬與他人乗騎上因此發忿與提婆並除名亦不露其辠仍毁其宅公主離婚復被遣向鄴吏部門參及後主晉陽走還被勑喚入内尋詔復王爵及開府領軍大将軍常在左右仍從後主走度河到青州并為周軍所獲鳳於權要之中尤嫉人士朝夕讌私唯相譖訴崔季舒等寃酷皆鳳所為也每一賜與動至千萬恩遇日甚彌自驕恣意色嚴厲未嘗與人相承接朝士諮事莫敢仰視動致呵叱輙詈云狗漢大不可耐唯須殺却若見武職雖厮養末品亦容下之後仕隋位終於隴州刺史通志卷一百八十四
