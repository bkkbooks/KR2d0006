body:
  text: 通志卷一百八十二宋右迪功郎鄭樵漁仲撰藝術傳第二魏朱建平周宣管輅杜夔馬鈞蜀周羣父舒張裕吳吳範劉惇趙達晉陳訓戴洋韓友淳于智步熊杜不愆嚴卿隗照卜珝鮑靚吳猛幸靈佛圖澄麻襦單道開黃泓索紞孟欽王嘉僧涉郭黁鳩摩羅什沙門曇霍臺産宋徐文伯曽祖熙從祖秋夫叔嚮弟嗣伯父道度薛叔父子雄伯宗梁釋寶志魏朱建平沛國人也善相術於閭巷之間效驗非一太祖為魏公聞之召為郎文帝為五官將坐上會客三十餘人文帝問已年夀又令遍相衆賓建平曰將軍當夀八十至四十時當有小厄謂夏侯威曰君四十九位為州牧而當有厄過厄即至七十致位公輔謂應璩曰君六十二位為常伯而當有厄先此一年當獨見一白狗旁人不見也謂曹彪曰君據藩國至五十七當厄於兵宜善防之初潁川荀攸鍾繇相與親善攸先亡子幼繇經紀其門户欲嫁其妾與人書曰吾與公達曽共使朱建平相建平曰荀君雖少當以後事付鍾君吾時啁之曰惟當嫁卿阿騖耳何意此子竟早隕沒戲言遂驗乎今欲嫁阿騖使得善處追思建平之妙雖唐舉許負何以復加也文帝黃初七年年四十病困謂左右曰建平所言八十謂晝夜也吾其決之頃之果崩夏侯威為兖州刺史年四十九十二月上旬得疾念建平之言自分必死豫作遺令及送喪之備咸使素辦至下旬轉差垂以平復三十日日昃請紀綱大吏設酒曰吾所苦漸平眀日雞鳴年便五十建平之戒真必過矣威罷客之後合瞑疾動夜半遂卒璩六十一為侍中直省內歘見白狗問之衆人悉無見者於是數聚會并急遊觀田里飲宴自娛過期一年六十三卒曹彪封楚王年五十七坐與王淩通謀賜死凡説此輩無不如言不能具詳故粗記數事惟相司空王昶征北將軍程喜中領軍王肅有蹉跌云肅年六十二疾篤衆醫並以為不愈肅夫人問以遺言肅云建平相我年踰七十位至三公今皆未也將何慮乎而肅竟卒建平又善相馬文帝將出取馬外入建平道遇之語曰此馬之相今日死矣帝將乘馬馬惡衣香齧文帝膝帝大怒即使殺馬建平黃初中卒周宣字孔和樂安人也為郡吏太守楊沛夢人曰八月一日曹公當至必與君杖飲以藥酒使宣占之是時黃巾賊起宣對曰夫杖起弱者藥治人病八月一日賊必除滅至期賊果破後東平劉楨夢蛇生四足穴居門中使宣占之宣曰此為國夢非君家之事也當殺女子而作賊者頃之女賊鄭薑遂皆夷討以蛇女子之祥足非蛇之所宜故也文帝問宣曰吾夢殿屋兩瓦墜地化為鴛鴦此何謂也宣曰後宫當有暴死者帝曰吾詐卿耳對曰夫夢者意耳茍以形言便占吉凶言未畢而黃門令奏宫人相殺無幾帝復問曰我昨夜夢青氣自地屬天宣對曰天下當有貴女子寃死是時帝已遣使賜甄后璽書聞宣言而悔之遣人追使者不及帝復問曰吾夢摩錢文欲令滅而更愈眀此何謂邪宣悵然不對帝重問之宣對曰此自陛下家事雖意欲爾而太后不聽是以文欲滅而眀耳時帝欲治弟植之罪逼於太后但加貶爵以宣為中郎屬太史嘗有問宣曰吾昨夜夢見芻狗其占何也宣答曰君欲得美食耳有頃出行果遇豐膳後又問宣曰昨夜復夢見芻狗何也宣曰君欲墮車折腳宜戒慎之頃之果如宣言後又問宣昨夜復夢見芻狗何也宣曰君家欲失火當善護之俄遂火起語宣曰前後三時皆不夢也聊試君耳何以皆驗邪宣對曰此神靈動君使言故與真夢無異也又問宣曰三夢芻狗而其占不同何也宣曰芻狗者祭神之物故君始夢當得飲食也祭祀既訖則芻狗為車所轢故中夢當墮車折腳也芻狗既車轢之後必載以為樵故後夢憂失火也宣之敘夢凡此類也十中八九世以比建平之相矣其餘效故不次列眀帝末卒管輅字公眀平原人也容貌粗醜無威儀而嗜酒飲食言戲不擇非類故人多愛之而不敬也年八九嵗便喜仰視星辰得人輒問其星名夜不肯寐父母禁之不能止常云家雞野鵠猶尚知時况於人乎與鄰比兒共戲土壤中輒畫地作天文及日月星辰每答言説事語皆不常宿學耆人不能折之皆知其當有大異之材父為琅邪即邱長輅時年十五來至官舍讀書始讀詩論語及易本便開淵布筆辭義斐然于時黌上有逺方及國內諸生四百餘人皆服其才琅邪太守單子春雅有材度聞輅一黌之俊欲得見輅輅父即遣造之子春大會賓客百餘人坐上皆能言之士輅問子春府君名士加有雄貴之姿輅既年少膽未堅剛若欲相觀懼失精神請先飲醇酒三升然後言之子春大喜便酌令飲之酒盡後問子春今欲與輅為對者若府君四坐之士邪子春曰吾欲自與卿旗鼓相當輅言始讀詩論語易本學問微淺未能上引聖人之道陳秦漢之事但欲論金木水火土鬼神之情耳子春言此最難者而卿以為易邪於是唱大論之端遂經於隂陽文采葩流枝葉橫生少引聖籍多發天然子春及衆士互相攻劫論難鋒起而輅人人答對言皆有餘至日向暮酒食不行子春語衆人曰此年少盛有才器聽其言論正似司馬太史遊獵之賦何其磊落雄壯英神已茂必能眀天文地理變化之數不徒有言也於是發聲徐州號為神童及父為利漕利漕民郭恩字義博有才學善易春秋又能仰觀輅就義博讀易數十日中意便開發論難踰於師於此分蓍下卦用思精妙占筮吉凶初無差錯又從義博學仰觀二十日中通夜不寐語義博曰君但告我墟落處所耳至於推運會論災異自當出吾天分學未一年義博反從輅問易及天文事要義博每聽輅語未嘗不推機慷慨自言登聞君至論之時恐我篤疾眀暗之不相逮何其逺也義博設主人獨請輅具告辛苦自説兄弟三人俱得躄疾不知何故使輅筮其所由輅曰卦中有君本墓墓中有女鬼非君伯母當叔母也昔飢荒之世當有利其數升米者排著井中嘖嘖有聲推一大石下破其頭孤魂寃痛自訴於天於是義博涕泣曰實有斯事但願斯疾不及子孫耳輅言火形不絶水形無餘不及後也廣平劉奉林婦病困已買棺器時正月也使輅筮之曰命在八月辛卯日中之時奉林謂必不然而婦漸差至秋發動一如輅言輅往見安平太守王基基令作卦輅曰當有賤婦人生一男兒墯地便走入竈中死又牀上當有一大蛇䘖筆小大共視須臾去之也又烏來入室中與燕共鬭燕死烏去有此三怪基大驚問其吉凶輅曰直官舍久逺魑魅魍魎為怪耳兒生便走非能自走直宋無忌之妖將其入竈也大蛇銜筆直老書佐耳烏與燕鬭直老鈴下耳今卦中見象而不見其凶知非妖咎之徴無所憂也後卒無患時信都令家婦女驚恐更互疾病使輅筮之曰君北堂西頭有兩死男子一男持矛一男持弓箭頭在壁內腳在壁外持矛者主刺頭故頭重痛不得舉也持弓箭者主射胸腹故心中縣痛不得飲食也晝則浮遊夜來病人故使驚恐也王基即遣信都令掘其室中入地八尺果得二棺一棺中有矛一棺中有角弓及箭弓箭久逺皆消爛但有鐵及角完耳乃徙骸骨去城一十里埋之家中皆愈清河王經去官還家輅與相見經曰近有一怪大不喜之欲煩作卦卦成輅曰爻吉不為凶也君夜在堂户前有一流光如燕爵者入君懷中殷殷有聲內神不安解衣倣徉招呼婦人覔索餘光經大笑曰實如君言輅曰吉遷官之徴也其應行至頃之經為江夏太守輅又至郭義博家有飛鳩在梁頭鳴甚悲輅曰當有老公從東方來攜豚一頭酒一壺主人雖喜當有小故眀日果有客如所占義博使客節酒戒肉慎火而射雞作食箭從樹間激中數嵗女子手流血驚怖義博遂從輅學鳥鳴之候輅言君雖好道天才既少又不解音律恐難為師也輅為説八風之變五音之數以律吕為衆鳥之商六甲為時日之端反覆繾曲出入無窮義博靜然沉思馳精數日卒無所得乃歎曰才不出位難以追蹤於是遂止輅至渤海劉長仁有辨才為安德令聞輅能曉鳥鳴難輅曰夫生民之音曰言鳥獸之聲曰鳴故言者則有知之貴靈鳴者則無知之賤名何由以鳥鳴為語亂神眀之所異也孔子曰吾不與鳥獸同羣眀其賤也輅答曰夫天雖有大象而不能言故運星精於上流神眀於下驅風雲以表異役鳥獸以通靈表異者必有浮沉之候通靈者必有宫商之應是以宋襄失德六鶂並退伯姬將焚鳥毁其巢四國未火融風以發赤烏夾日殃在荆楚此乃上天之所使自然之眀符考之律吕則聲音有本求之人事則吉凶不失昔在秦祖以功受封葛盧聽音著在春秋斯皆典謨之實事非聖賢之虛名也商之將興由一燕卵文王受命丹鳥銜書此乃聖人之靈祥國家之休祚何賤之有乎夫鳴鳥之聽精在鶉火妙在八神自非斯倫猶子路之於死生也長仁言君辭雖茂華而不實未之敢信須臾有鳴鵲來在長仁家閣屋上其聲甚急輅曰鵲言東北有婦昨殺其夫牽引西家人夫離婁侯不過日日在虞淵之際告者至矣到時果有東北同伍民來告鄰婦手殺其夫詐言西家人與夫有嫌來殺我壻長仁大服輅至列人典農王𢎞直許有飄風髙三尺餘從申上來在庭中幢幢回轉息以復起良久乃止𢎞直以問輅輅曰東方當有馬吏至恐父哭子如何眀日膠東吏到𢎞直子果亡𢎞直問其故輅曰其日乙卯則長子之候也木落於申斗建申申破寅死喪之候也日加午而風發則馬之候也離為文章則吏之候也申未為虎虎為大人則父之候也有雄雉飛來登𢎞直內鈴柱頭𢎞直大以不安令輅作卦輅曰到五月必遷時三月也至期𢎞直果為渤海太守館陶令諸葛原遷新興太守輅往祖餞之賓客並會原自起取燕卵蜂窠鼅蛛著器中使射覆卦成輅曰第一物含氣須變依乎宇堂雄雌以形翅翼舒張此燕卵也第二物家室倒縣門户衆多藏精育毒得秋乃化此蜂窠也第三物觳觫長足吐絲成羅尋網求食利在昏夜此鼅蛛也舉坐驚喜輅族兄孝國居斥丘輅往從之與二客會客去後輅謂孝國曰此二人天庭及口耳之間同有凶氣異變俱起雙魂無宅流魂於海骨歸於家少許時當並死也後數十日二人飲酒醉夜共載車牛驚下道入漳河中皆即溺死也當此之時輅之鄰里外户不閉無相偷竊者清河太守華表召輅為文學掾安平趙孔曜薦輅於冀州刺史裴徽徽即辟輅為文學從事引與相見大善友之徙部巨鹿遷治中别駕輅初應州召與弟季儒共載至武城西自卦吉凶語儒云當在故城中見三貍若爾者乃顯前到河西故城角正見三貍共踞城側兄弟並喜正始九年徽復舉輅秀才輅辭徽徽謂輅曰丁鄧二尚書有經國才略於物理不精也何尚書神眀精微言皆巧妙巧妙之至殆破秋毫君當慎之自言不解易九事必當以相問比至洛宜善精其理也輅言何若欲差次老莊而參爻象愛微辨而興浮藻可謂射侯之巧非能破秋毫之妙也若九事皆至義者不足勞思也輅去之後嵗朝當有時刑大風風必摧破樹木若發於乾者必有天威不足共清談者十二月到京吏部尚書何晏請之果共論易九事九事皆眀晏曰君能隂陽此世無雙時鄧揚在晏許揚言君見謂善易而語初不及易中辭義何也輅曰夫善易者不論易也晏笑而贊之曰可謂要言不煩因謂輅曰試為作一卦知位當至三公不又問連夢見青蠅數十頭來止鼻上驅之不肯去有何意故輅曰夫飛梟天下賤鳥及其在林食椹則懷我好音况輅心非草木敢不盡忠昔元凱之弼重華宣慈惠和周公之翼成王坐而待旦故能流光六合萬國咸寧此乃履道休應非卜筮之所眀也今君侯位重山嶽勢若雷霆而懷德者鮮畏威者衆殆非小心翼翼多福之仁又鼻者艮此天中之山髙而不危所以長守貴今青蠅臭惡而集之焉位峻者顛輕豪者亡不可不思害盈之數盛衰之期是故山在地中曰謙雷在天上曰壯謙則裒多益寡壯則非禮不履未有損已而不光大行非而不傷敗願君侯上追文王六爻之旨下思尼父彖象之義然後三公可決青蠅可驅也揚曰此老生之常談輅答曰夫老生者見不生常談者見不談晏曰過嵗更當相見輅還邑舍具以此言語舅氏舅氏責輅言太切至輅曰與死人語何所畏邪舅大怒謂輅狂悖嵗朝果西北大風塵埃蔽天十餘日聞晏揚皆誅舅氏復謂輅曰爾前何以知何鄧之敗輅曰鄧之行步筋不束骨脈不制肉起立傾倚若無手足此為鬼躁何之視候魂不守宅血不華色精爽煙浮容若稿木此為鬼幽故鬼躁者為風所收鬼幽者為火所燒自然之符不可以蔽也於是舅氏始服始輅過魏郡太守鍾育共論易義輅因言卜可知君生死之日育使筮其生日月如言無蹉跌育大愕然曰君可畏也死以付天不以付君遂不復筮育問輅天下當太平否輅曰方今四九天飛利見大人神武升建王道文眀何憂不平育未解輅言無幾曹爽等誅乃覺寤云平原太守劉邠取印囊及山雞毛著器中使筮輅曰內方外員五色成文含寶守信出則有章此印囊也髙嶽巖巖有鳥朱身羽翼元黃鳴不失晨此山雞毛也邠曰此郡官舍連有變怪使人恐怖其理何由輅曰或因漢末之亂兵馬擾攘軍尸流血汚染邱山故因昏夕多有形怪也眀府道德髙妙自天祐之願安百祿以光休寵清河令徐季龍使人行獵令輅筮其所得輅曰當獲小獸復非食禽雖有爪牙微而不強雖有文章蔚而不眀非虎非雉其名曰狸獵人暮歸果如輅言季龍取十三種物著大篋中使輅射云器中籍籍有十三種物先説雞子後道𧖟蛹遂一一名之惟以梳為枇耳輅隨軍西行過毋邱儉墓下倚樹哀吟精神不樂人問其故輅曰林木雖茂無形可久碑誄雖美無後可守元武藏頭蒼龍無足白虎銜尸朱雀悲哭四危以備法當滅族不過二載其應至矣卒如其言後得休過清河倪太守時天大旱倪問輅雨期輅曰今夕當雨至日向暮了無雲氣衆人並嗤輅輅言樹上已有少女微風樹間又有隂鳥和鳴又少男風起衆鳥和翔其應至矣須臾果有艮風鳴鳥日未入東南有山雲樓起黃昏之後雷聲大動到一鼓中星月皆沒風雲並興元氣四合大雨河傾倪修主人禮共為歡樂調輅言誤中耳輅曰誤中與天期不亦工乎正元二年弟辰謂輅曰大將軍待君意厚冀當富貴乎輅歎曰吾自知有分直耳然天與我才眀不與我年壽恐四十七八間不見女嫁兒娶婦也若得免此欲作洛陽令可使路不拾遺枹鼓不鳴但恐至太山治鬼不得治生民如何辰問其故輅曰吾額上無生骨眼中無守精鼻無梁柱腳無天根背無三甲腹無三壬此皆不夀之驗又吾本命在寅加月食夜生天有常數不可得諱但人不知耳吾前後相當死者過百人略無錯也是嵗八月為少府丞眀年二月卒年四十八輅卒後有閻纘者字續伯該微通物有良史風為天下補綴遺脫頗托輅事云嘗授劉太常實曰輅始見聞由於為鄰婦卜亡牛云當在西面窮牆中縣頭上向教婦人令視諸邱冢中果得牛婦人因以為藏已牛告官案驗乃知以術知故裴冀州遂聞焉又云路中小人失妻者輅為卜教使眀旦於東陽城門中伺擔豚人牽與共鬭具如其言豚逸走即共追之豚入人舍突破主人甕婦從甕中出劉侯云甚多此類傳所載財十一二耳中書令史紀元龍輅鄉里人云輅在田舍嘗候逺鄰主人患數失火輅卜教使眀日於南陌上伺候當有一角巾諸生駕黑牛故車必引留為設賓主此可消之即從輅戒諸生言有急求去不聽遂強留宿生意大不安以為圖己主人罷入生乃把刀出門閭倚兩積薪側立假寐焱有一小物直來過前如獸手中持火以口吹之生驚舉刀斫正斷要視之乃狐也自此主人不復有災前長廣太守陳承祐口受城門校尉華長駿語云昔其父為清河太守時召輅作吏駿時少小後以鄉里遂加恩意常與同載周旋具知其事云諸要驗三倍於傳駿又云輅卜亦不悉中十得七八駿問其故輅云理無差錯來卜者或言不足以宣事實故使爾華城門夫人者魏故司空涿郡盧公女也得疾連年不差華家時居西城下南纒里中三廄在其東南輅卜當有師從東方來自言能治便聽使之必得其力後無何有南征廄騶當兖州甲卒來詣盧公言能治女郎公即表請留之専使其子將詣華氏療疾初用散藥後用丸治尋有效即奏除騶名以補太醫又云輅隨父在利漕時有治下屯民捕得鹿其晨行還鹿為人所取但見毛血來詣輅卜輅為卦語云此有盜者是汝東巷中第三家也汝徑往門前伺無人時取一瓦子密發其碓屋東頭第七椽以瓦著下不過眀日食時自送還汝其夜盜者父病頭痛壯熱煩疼亦來詣輅卜輅為發其事盜者具服輅令擔其皮肉還藏著故處病當自愈乃密教鹿主往取又語使復往如前舉椽棄瓦盜父亦差又都尉治內史有失物者輅使眀晨於寺門外看當逢一人使指天畫地舉手四向自當得之暮果獲於故處矣杜夔字公良河南人也以知音律為雅樂郎中平五年疾去官州郡司徒禮辟以世亂奔荆州荆州牧劉表令與孟曜為漢主合雅樂樂備表欲庭觀之夔諫曰今將軍號不為天子合樂而庭作之無乃不可乎表納其言而止後表子琮降太祖太祖以夔為軍謀祭酒參太樂事因令創制雅樂夔善鍾律聰思過人絲竹八音靡所不能惟歌舞非所長時散郎鄧靜尹齊善詠雅樂歌師尹胡能歌宗廟郊祀之曲舞師馮肅服養曉知先代諸舞夔總統研精逺考諸經近采故事教習講肄備作樂器紹復先代古樂皆自夔始黃初中為太樂令協律都尉漢鑄鐘工柴玉巧有意思形器之中多所造作亦為時貴人見知夔令玉鑄銅鐘其聲鈞清濁皆不如法數毁改作玉甚厭之謂夔清濁任意頗拒捍夔夔玉更相白於太祖太祖取所鑄鐘雜錯更試然後知夔為精而玉之妄也於是罪玉及諸子皆為養馬士文帝愛待玉又嘗令夔與左願等於賓客之中吹笙鼓琴夔有難色由是帝意不悅後因他事繫夔使願等就學夔自謂所習者雅仕宦有本意猶不滿遂黜免以卒弟子河南邵登張泰桑馥各至太樂丞下邳陳頏司律中郎將自左延年等雖妙於音咸善鄭聲其好古存正莫及夔馬鈞字德衡扶風人也巧思絶世為博士居貧嘗思綾機之變舊綾機五十綜者五十躡六十綜者六十躡鈞患其喪功費日乃皆易以十二躡其竒文異變因感而作者猶自然之成形也為給事中與常侍髙堂隆驍騎將軍秦朗爭論二子言古無指南車記言之虛也鈞曰古有之未之思耳夫何逺之有隆朗以白眀帝帝詔鈞作之而指南車成時服其精妙鈞居亰師城內有地可以為園患無水以灌之乃作翻車令童兒轉之而灌水自覆更出更入其巧百倍於常其後有上百戲者能設而不能動帝以問鈞可動否對曰可動帝曰其巧可益否對曰可益受詔作之以大木雕構使其形若輪平地施之潛以水發焉設為女樂舞象至令木人擊鼓吹簫作山嶽使木人跳丸擲劒緣繩倒立出入自在百官行署舂磨鬭雞變巧百端帝大悅之鈞見諸葛亮連弩曰巧則巧矣未盡善也言作之可令加五倍又患發石車敵人之於樓邊縣濕牛皮中之則墯石不能連屬而至欲作一輪縣大石數十以機鼓輪為常則以斷縣石飛擊敵城使首尾電至嘗試以車輪縣瓴甓數十飛之數百步矣凡鈞之制造其巧妙雖古公輸班翟王爾亦不是過傅元嘗為之序云蜀周羣字仲直巴西閬中人也父舒字叔布少學術於廣漢楊厚名亞董扶任安數被徴終不詣時人有問春秋讖曰代漢者當塗髙此何謂也舒曰當塗髙者魏也鄉黨學者私傳其語羣少受學於舒専心候業於庭中作小樓家富多奴常令奴更直於樓上視天災才見一氣即白羣羣自上樓觀之不避晨夜故凡有氣候無不見之是以所言多中建安七年越嶲有男子化為女人時羣言哀帝時亦有此異將易代之祥也至二十五年魏果代漢十二年十月有星孛於鶉尾是為荆州之分羣以為荆州牧當死而失土眀年秋劉表卒曹操平荆州十七年十二月星孛於五諸侯羣以為西方専據土地者皆將失地是時劉璋據益州張魯據漢中韓遂據涼州宋建據枹罕眀年冬曹操遣偏師擊涼州十九年獲宋建韓遂逃於羌中被殺其年秋璋失益州二十年秋曹操攻漢中張魯降皆如羣言羣初被劉璋辟召為師友從事先主定蜀署羣儒林校尉先主欲與曹操爭漢中問羣羣對當得其地不得其民也若出偏軍必不利當戒慎之時州後部司馬蜀郡張裕亦曉占候而天才過羣諫先主曰不可爭漢中軍必不利先主竟不用裕言果得地而不得民也遣將軍吳蘭雷銅等入武都皆沒不還先主以羣言為驗舉羣茂材裕又私語人曰嵗在庚子天下當易姓劉氏祚盡矣主公得益州九年之後寅卯之間當失之人密白其言初先主與劉璋會涪時裕為璋從事侍坐其人饒鬚先主嘲之曰昔吾居涿縣特多毛姓東西南北皆諸毛也涿令稱曰諸毛繞涿居乎裕即答曰昔有作上黨潞長遷為涿令涿令者去官還家時人與書欲署潞則失涿欲署涿則失潞乃署曰潞涿君先主無鬚故裕以此及之先主常銜其不遜加忿其漏言乃顯裕諫爭漢中不驗下獄將誅之諸葛亮表請其罪先主答曰芳蘭生門不得不鉏裕遂棄市後魏氏之立先主之薨皆如裕所刻又曉相術每舉鏡視靣自知刑死未嘗不撲之於地也羣卒子巨頗傳其術吳吳範字文則會稽上虞人也以治歷數知風氣聞於郡中舉有道詣亰師世亂不行會孫權起於東南範委身焉每有災祥輒推數言狀其術多效遂以顯名初權在吳欲討黃祖範曰今兹少利不如眀年眀年戊子荆州劉表亦身死而國亡權遂征祖卒不能克眀年出軍行及尋陽範見風氣因詣船賀催兵急行至即破祖祖得夜亡權恐失之範曰未逺必生獲祖至五更中果得之劉表竟死荆州分割及壬辰嵗範又白言嵗在甲午先主當得益州吕岱從蜀還遇之白帝説蜀部衆離落死亡且半事必不濟權以難範範曰臣所言者天道也而岱所見者人事耳後卒得蜀權與吕蒙謀襲關侯議之近臣多曰不可範曰得之後侯在麥城使使請降權問範曰竟當降否範曰彼有走氣言降詐耳權乃使潘璋徼其徑路覘候者還白侯已去範曰雖去不免問其期曰眀日日中權立表下漏以待之及中不至權問其故範曰時向中未正中也頃之有風動帷範拊手曰即至矣須臾外稱萬嵗傳言得侯後權與魏為好範曰以風氣言之彼以貌來其實有謀宜為之備蜀人盛兵於西陵範曰後當和親終皆如其言其占驗眀審如此權以範為騎都尉領太史令數從訪問欲知其決範祕惜其術不以至要語權權由是恨之初權為將軍時範常白言江南有王氣亥子之間有大福慶權曰若終如言以君為侯及立為吳王範時侍燕曰昔在吳中嘗言此事大王識之邪權曰有之因呼左右以侯綬帶範範知權欲以厭當前言輒手推不受及後論功行封以範為都亭侯詔臨當出權恚其愛道於已也削除其名範為人剛直頗好自稱然與親故交接有終始素與魏滕同邑相善滕嘗有罪權責怒甚嚴敢有諫者死範謂滕曰與汝偕死滕曰死而無益何用死為範曰安能慮此坐觀汝邪乃髠頭自縛詣門下使鈴下以聞鈴下曰不敢白白必死範曰汝有子邪曰有曰使汝為吳範死子以屬我鈴下曰諾乃排閣入言言未卒權大怒欲使投以戟逡巡走出範因突入叩頭流血言與涕并良久權意釋乃免滕滕見範謝曰父母能生長我不能免我於死丈夫相知如汝足矣何用多為滕字用林性剛直行不茍合雖遭困逼終不回撓初亦忤䇿幾殆賴太妃救得免語見妃嬪傳歷歷山鄱陽山隂三縣令鄱陽太守黃武五年範病卒初範先知其死日謂權曰陛下某日當喪軍師權曰吾無軍師焉得喪之範曰陛下出軍臨敵須臣言而後行臣乃陛下之軍師也至其日果卒範長子先死少子尚幼於是業絶權追思之募三州有能舉知術數如吳範趙達者封千户侯卒無所得劉惇字子仁平原人也遭亂避地客遊廬陵事孫輔以眀天官達占數顯於南土每有水旱寇賊皆先時處期無不中者輔異焉以為軍師軍中咸敬事之號曰神眀建安中孫權在豫章時有星變以問惇惇曰災在丹陽權曰何如曰客勝主人到其日當得問是時邊鴻作亂卒如惇言惇於諸術皆善尤眀太一皆能推演其事窮盡要妙著書百餘篇刁元稱以為竒惇亦寶惜其術不以告人故世莫得而眀也趙達河南人也少從漢侍中單甫受學用思精密謂東南有王者氣可以避難故脫身渡江治九宫一算之術空其微旨是以能應機立成對問若神至計飛蝗射隱伏無不中效或難達曰飛者固不可校誰知其然此殆妄耳達使其人取小豆數升播之席上立處其數驗覆果信嘗過知故知故為之具食食畢謂曰倉卒乏酒又無佳肴無以敘意如何達因取盤中隻著再三縱橫之乃言卿東壁下有美酒一斛又有鹿肉三斤何以辭無時坐有他賓內得主人情主人慙曰以卿善射有無欲相試耳竟效如此遂出酒肴酣飲又有書簡上作千萬數著空倉中封之令達算之達處如數云但有名無實其精微若是達寶惜其術自闞澤殷禮皆名儒善士親屈節就學達祕而不告也太史丞公孫勝少師事達勤苦纍年達許教之者有年數矣臨當喻語而輒復止勝他日齎酒具候顔色拜跪而請達曰吾先人得此術欲圖為帝王師至仕來三世不過太史郎誠不欲復傳之且此術微妙頭乘尾除一算之法父子不相語然以子篤好不倦今真以相授矣飲酒數行達起取素書兩卷大如手指達曰當寫讀此則自解矣吾久廢不復省之今欲思論一過數日當以相與勝如期往至乃陽求索書驚言失之云女壻昨來必是渠所竊去遂從此絶孫權行師征伐每令達有所推步皆如其言權問其法達終不語由此見薄祿位不至達常笑謂諸星氣風術者曰當回算帷幕不出户牖以知天道而反晝夜暴露以望氣祥不亦難乎間居無為引算自校乃歎曰吾算訖盡某年月日其終矣達妻數見達效聞而哭泣達欲弭妻意乃更步算言向者謬誤耳尚未也後如期死權聞達有書求之不得乃録問其女及發棺皆無所得法術絶焉晉陳訓字道元歷陽人少好祕學天文算歷隂陽占候無不畢綜尤善風角孫皓以為奉禁都尉使其占候皓政嚴酷訓知其必敗而不敢言時錢塘湖開或言天下當太平青蓋入洛時皓以問訓訓曰臣止能望氣不能達湖之開塞退而告其友曰青蓋入洛將有輿櫬銜璧之事非吉祥也尋而吳亡訓隨例內徙拜諫議大夫俄而去職還鄉及陳敏作亂遣弟宏為歷陽太守訓謂邑人曰陳家無王氣不久當滅宏聞將斬之訓鄉人秦璩為宏參軍乃説宏曰訓善風角可試之如不中徐斬未晚乃赦之時宏攻征東參軍衡彥於歷陽乃問訓曰城中有幾千人攻之可拔不訓登牛渚山望氣曰不過五百人然不可攻攻之必敗宏復大怒曰何有五千人攻五百人而有不得理命將士攻之果為彥所敗方信訓有道術乃優遇之都水參軍淮南周亢嘗問訓以官位訓曰君至卯年當部符近郡酉年當有曲蓋亢曰脫如來言當相薦拔訓曰性不好官惟欲米耳後亢果為義興太守金紫將軍時劉聰王彌寇洛陽歷陽太守武瑕問訓曰國家人事如何訓曰胡賊三逼國家當敗天子野列今尚未也其後懷愍二帝果有平陽之酷焉或問其以眀年吉凶者訓曰揚州刺史當死武昌大火上方節將亦當死至時劉陶周魴皆卒武昌大火燒數千家時甘卓為歷陽太守訓私謂所親曰甘侯頭低而視仰相法名為眄刀又目中有赤脈自外而入不出十年必以兵死不領兵則可以免卓果為王敦所害丞相王導多病每憂慮以問訓訓曰公耳豎垂肩必夀亦大貴子孫當興於江東咸如其言訓年八十餘卒戴洋字國流吳興長城人也年十二遇病死五日而蘇説死時天使其為酒藏吏授符録給吏從幡麾將上蓬萊崑崙積石大室恆廬衡等諸山既而遣歸逢一老父謂之曰汝後當得道為貴人所識及長遂善風角為人短陋無風望然好道術妙解占候卜數吳末為臺吏知吳將亡託病不仕及吳平還鄉里後行至陳國瀨鄉經老子祠皆是洋昔死時所見使處但不復見昔物耳因問守藏應鳯曰去二十餘年常有人乘馬東行過老君祠而不下馬未達橋墜馬死者不鳯言有之所問之事多與洋同揚州刺史嘗問吉凶於洋洋答曰熒惑入南斗八月有暴水九月當有客軍西南來如期果大水而石冰作亂冰既據揚州洋謂人曰視賊雲氣四月當破果如其言時陳敏為右將軍堂邑令孫混見而羡之洋曰敏當作賊族滅何足願也未幾敏果反而誅焉初混欲迎其家纍洋曰此地當敗得臘不得正豈可移家於賊中乎混便止嵗末敏弟昶攻堂邑混遂以單身走免其後都水馬武舉洋為都水令史洋請急還鄉將赴洛夢神人謂之曰洛中當敗人盡南渡後五年揚州當有天子洋信之遂不去既而皆如其夢廬江太守華談問洋曰天下誰當復作賊者洋曰王機尋而機反陳􅀈問洋曰人言江南當有貴人顧彥先周宣珮當是不洋曰顧不及臘周不見來年八月榮果以十一月十七日卒十九日臘玘以眀年七月晦亡王導遇病召洋問之洋曰君侯本命在申金為土使之主而於申上石頭立冶火光照天此為金火相爍水火相煎以故受害耳導即移居東府病遂差鎮東從事中郎張闓舉洋為丞相令史時司馬揚為烏程令將赴職洋曰君宜深慎下吏揚後果坐吏免官洋又謂曰卿雖免官十一月當作郡加將軍至期為太山太守振武將軍揚賣宅將行洋止之曰君不得至當還不可無宅揚果為徐龕所逼不得之郡元帝增揚衆二千使助祖逖洋勸揚不行揚乃稱病收付廷尉俄而因赦得出元帝將登阼使洋擇日洋以為宜用三月二十四日丙午太史令陳卓奏用二十二日言昔越王用甲辰三月反國范蠡稱在陽之前當生盡出上下盡空德將出遊刑入中宫今與此同洋曰越王為吳所囚雖當時遜媚實懷怨憤蠡故用甲辰乘德而歸留刑吳宫今大王內無含咎外無怨憤當承天洪命納祚無窮何為追越王去國留殃故事邪乃從之及祖約代兄鎮譙請洋為中典軍遷督護永昌元年四月庚辰禺中時有大風起自東南折木洋謂約曰十月必有賊到譙城東至歷陽南方有反者主簿王振以洋為妖白約收洋付刺姦而絶其食五十日言語如故約知其有神術乃赦之而讓振振後有罪被收洋救之約曰振往日相繫今何以救之洋曰振不識風角非有宿嫌振往時垂餓死洋養活之振猶尚遺忘夫處富貴而不棄貧賤甚難約義之即原振賜洋米三十石至十月三日石勒騎果到譙城東洋言於約曰賊必向城父可遣騎水南追之步軍於水北斷要路賊必敗約竟不追賊乃掠城父婦女輜重而去約將魯延求追賊洋曰不可約不從使兄子智與延追之賊偽棄婦女輜重走智與延等爭物賊還掩之智延僅以身免士卒皆死約表洋為下邑長時梁國人反逐太守袁晏梁城峻險約欲討之而未決洋曰賊以八月辛酉日反日辰俱王辛德在南方酉受自刑梁在譙北乘德伐刑賊必破亡又甲子日東風而雷西行譙在東南雷在軍前為軍驅除昔吳伐關羽天雷在前周瑜拜賀今與往同故知必剋約從之果平梁城太寧二年正月有大流星東南行洋曰至秋府當移夀陽及王敦作逆約問其勝敗洋曰太白在東方辰星不出兵法先起為主應者為客辰星若出太白為主辰星為客辰星不出太白為客先起兵者敗今有客無主有前無後宜傳檄所部應詔伐之約乃率衆向合肥俄而敦死衆敗遂往夀陽洋又曰江淮之間當有軍事譙城虛曠宜還固守不者雍邱沛皆非官有也約不從豫土遂陷於賊咸和元年春約南行佃遇大雷雨西南來洋曰甲子西南天雷其下必失大將至夏汝南人反執約兄子濟送於石勒約府內地忽赤如丹洋曰按河圖徴云地赤如丹血丸丸當有下反上者恐十月二十七日胡馬當來飲淮水至時石勒騎大至攻城大戰其日西風兵火俱發約大懼會風回賊退時傳言勒遣騎向夀陽約欲送其家還江東洋曰必無此事尋而傳言果妄咸和初月暈左角有赤白珥約問洋洋曰角為天門開布陽道宫門當有大戰俄而蘇峻遣使招約俱反洋謂約曰蘇峻必敗然其初起兵鋒不可當可外和內嚴以待其變約不從遂與峻反至三年五月大風雷雨西北來城內海暝洋謂約曰雷鳴人上眀使君當逺佞近直愛下振貧昔秦有此變卒至亂亡約大怒收洋繫之遣部將李槩將兵到廬江其衆盡散約召洋出問之曰吾還東何如留夀陽若留夀陽何如入胡洋曰東入失半入胡滅門留夀陽尚可約欲東向歷陽其衆不樂東下皆叛約劫約姊及嫂奔於石勒約到歷陽祖煥問洋曰君昔言平西在夀陽可得五年果如君言今在歷陽可得幾時洋曰得六月耳約問洋臺下及此氣候何如洋曰此當復有反者臺下來年三月當太平江州當大喪後南方復有軍事此去千里尋而牽騰叛約約率所親將家屬奔於石勒二月而天子反正四月而溫嶠卒郭默據盆口以叛後勒誅約及親屬並盡皆如洋言約既敗洋往尋陽時劉允鎮尋陽允問洋曰我病當差不洋曰不憂使君不差憂使君今年有大厄使君年四十七行年入庚寅太公隂謀曰六庚為白虎在上為客星在下為害氣年命與并必凶當忌十二月二十二日庚寅勿見客允曰我當解職將君還野中治病洋曰使君當作江州不得解職允曰溫公不復還邪洋曰溫公雖還使君故作江州俄如其言九月甲寅申時回風從東來入允兒船中西過狀如匹練長五六丈洋曰從風咸池下來攝提下去咸池為刀兵大殺為死喪到甲子日申時府內大聚骨埋之允問在何處洋曰不出州府門也允架府東門洋又曰東為天牢牢下開門憂天獄至十二月十七日洋又曰臘近可閉門以五十人備守并以百人備東北寅上以却害氣允不從二十四日壬辰允遂為郭默所害南中郎將桓宣以洋為參軍將隨宣往襄陽太尉陶侃留之住武昌時侃謀北伐洋曰前年十一月熒惑守胃昴至今年四月積五百餘日昴趙之分野石勒遂死熒惑以七月退從畢右順行入黃道未及天關以八月二十二日復逆行還鉤繞畢向昴昴畢為邊兵主胡夷故置天弓以射之熒惑逆行司無德之國石𢎞死是也勒之餘燼以自殘害今年官與太嵗太隂三合癸已癸為北方北方當受災嵗鎮二星共合翼軫從子入已徘徊六年荆楚之分嵗鎮所守其下國昌豈非功德之徴也今年六月鎮星前角亢角亢鄭之分嵗星移入房太白在心心房宋分順之者昌逆之者亡石虎若興兵東南此其死會也官若應天伐刑徑據宋鄭則無敵矣若天與不取反受其咎侃志在中原聞而大喜會病篤不果行侃薨征西將軍庾亮代鎮武昌復引洋問氣候洋曰天有白氣喪必東行不過數年必應尋有大鹿向西城門洋曰野獸向城主人將去城東家夜半望見城內有數炬火從城上出如大車狀白布幔覆與火俱出城東北行至江乃滅洋聞而歎曰此與前白氣同時亮欲西鎮石城或問洋此西足當欲東不洋曰不當也咸康三年洋言於亮曰武昌土地有山無林政可圖始不可居終山作八字數不及九昔吳用壬寅來上創立宫城至己酉還下秣陵陶公亦涉八年土地盛衰有數人心去就有期不可移也公宜更擇吉處武昌不可久住五年亮令毛寶屯邾城九月洋言於亮曰毛豫州今年受死問昨朝大霧晏風當有怨賊報仇攻圍諸侯誠宜逺偵邏寶問當在何時答曰五十日內其夕又曰九月建戌朱雀飛驚征軍還歸乘戴火光天示有信災發東房葉落歸本慮有後患眀日又曰昨夜火殃非國福今年架屋致使君病可因燒屋移家南渡無嫌也寶即遣兒婦還武昌尋傳賊當來攻城洋曰十月丁亥夜半時得賊問干為君支為臣丁為征西府亥為邾城功曹為賊神加子時十月水王木相王相氣合賊必來寅數七子數九賊髙可九千人下可七千人從魁為貴人加丁下剋上有空亡之事不敢進武昌也賊果陷邾城而去亮問洋曰故當不失石城否洋曰賊從安陸向石城逆太白當伐身無所慮亮曰天何以利胡而病我洋曰天符有吉凶土地有盛衰今年害氣三合己亥已為天下亥為戎胡石虎亦當受死今乃不憂賊但憂公病耳亮曰何以救我病洋曰荆州受兵江州受災公可去此二州亮曰如此當有解否洋曰恨晚猶差不也亮竟不能解二州遂至大困洋曰昔蘇峻時公於白石祠中祈福許賽其牛至今未解故為此鬼所考亮曰有之君是神人也或問洋曰庾公可得幾時洋曰見眀年時亮已不識人咸以為妄果至正月一日而薨庾翼代亮洋復為占候少時卒年八十餘所占驗者不可勝紀韓友字景先廬江舒人也為書生受易於會稽伍振善占卜能圖宅相冢亦行京費厭勝之術龍舒長鄧林婦病積年垂死醫巫皆息意友為筮之使畫作野豬著卧處屏風上一宿覺佳於是遂差舒縣廷掾王睦病死已復魄友為筮之令以丹畫版作日月置牀頭又以豹皮馬鄣泥卧上立愈劉世則女病魅積年巫為攻禱伐空冡故城間得狸鼉數十病猶不差友筮之命作布囊依女發時張囊著窗牖間友閉户作氣若有所驅斯須之間見囊大脹如吹因決敗之女仍大發友乃更作皮囊二枚沓張之施張如前囊復脹滿因急縛囊口懸著樹二十許日漸消開視有二斤狐毛女遂差宣城邊洪以四月中就友卜家中安否友曰卿家有兵殃其禍甚重可伐七十束柴積於庚地至七月丁酉放火燒之咎可消也不爾其凶難言洪即聚柴至日大風不敢發火洪後為廣陽領校遭母喪歸家友來投之時日已暮出告從者速裝束吾當夜去從者曰今日已暝數十里草行何急復去友曰非汝所知也此間血覆地寧可復住苦留之不待食而去其夜洪歘發狂絞殺兩子并殺婦又斫父妾二皆被創因出亡走眀日其宗族往收殯亡者尋索洪數日於宅前林中得之已自經死宣城太守殷祐有病友筮之曰七月晦日將有大鸜鳥來集廳事上宜勤伺取若獲者為善不獲將成禍祐乃謹為其備至日果有大鸜垂尾九尺來集廳事上掩捕得之祐乃遷石頭督護後為吳郡太守友卜占神效甚多而消殃轉禍無不皆驗干寶問其故友曰筮卦用五行相生殺如按方投藥治病以冷熱相救其差與不差不可必也友以元康六年舉賢良元帝渡江以為廣武將軍永嘉末卒淳于智字叔平濟北盧人也有思義能易筮善厭勝之術髙平劉柔夜卧鼠齧其左手中指以問智智曰是欲殺君而不能當為君使其反死乃以朱書手腕橫文後三寸作田字辟方一寸二分使露手以卧眀旦有大鼠伏死手前譙人夏侯藻母病困詣智卜忽有一狐當門向之嘷藻驚怖馳見智智曰其禍甚急君速歸在狐嘷處拊心啼哭令家人驚怪大小必出一人不出哭勿止然後其禍可救也藻還如其言母亦扶病而出家人既集堂屋五間拉然而崩護軍張劭母病篤智筮之使西出市沐猴繫母臂令傍人捶拍恆使作聲三日放去劭從之其猴出門即為犬所咋死母病遂差上黨鮑瑗家多喪病貧苦或謂之曰淳于叔平神人也君何不試就卜知禍所在瑗性質直不信卜筮曰人生有命豈卜筮所移會智來應詹謂曰此君寒士每多屯虞君有通靈之思可為一卦智乃為卦卦成謂瑗曰君安宅失宜故令君困君舍東北有大桑樹君徑至市入門數十步當有一人持荆馬鞭者便就買以懸此樹三年當暴得財瑗承言詣市果得馬鞭懸之三年浚井得錢數十萬銅鐵器復二十餘萬於是致贍疾者亦愈其消災轉禍不可勝紀而卜筮所占千百皆中應詹少亦多病智乃為符使詹佩之誦其文既而皆驗莫能學也性深沈常自言短命曰辛亥嵗天下有事當有巫醫挾道術者死吾守易義以行之猶當不應此乎太康末為司馬督有寵於楊駿故見殺步熊字叔熊陽平發干人也少好卜筮術數門徒甚盛熊學舍側有一人燒死吏持熊諸生謂為失火熊曰己為卿卜得其人矣使從道南行當有一人來問得火主未者便縛之吏如熊言果是耕人自言草惡難耕故燒之忽風起延燒逺近實不知草中有人又鄰人兒逺行或告已死其父母號哭制服熊為之卜剋日當還如期果至趙王倫聞其名召之熊謂諸生曰倫死不久不足應也倫怒遣兵圍之數重熊乃使諸生著其裘南走倫兵悉赴捉之熊密從北出得脫後為成都王頴所辟頴使熊射覆物無所失後頴奔關中平昌公模鎮鄴以熊頴黨誅之杜不愆廬江人也少就外祖郭璞學易卜屢有驗髙平郗超年二十餘得重疾試令筮之不愆曰按卦言之卿所苦尋除然宜於東北三十里外宫姓家索其所養雄雉籠置東簷下却後九日丙午日午時必當有雌雉飛來與交既而雙去若如此不出二十日病都除又是休應年將八十位極人臣若但雌逝雄留者病一周方差年半八十名位亦失超時正羸篤慮命在旦夕笑而答曰若保八十之半便有餘矣一周病差何足為淹然未之信或勸依其言索雉果得至丙午日超卧南軒之下觀之至日晏果有雌雉飛入籠與雄雉交而去雄雉不動超歎息曰雖管郭之竒何以尚此超病彌年乃起至四十卒於中書郎不愆後占筮轉踈無復此類後為桓嗣建威參軍嚴卿會稽人也善卜筮鄉人魏序欲暫東行荒年多抄盜令卿筮之卿筮曰君慎不可東行必遭暴害之氣而非劫也序不之信卿曰既必不停宜以禳之可索西郭外獨母家白雄狗繫著船前求索止得駁狗無白者卿曰駁者亦足然猶恨其色不純當餘小毒正及六畜輩耳無所復憂序行半路狗忽然作聲甚急有如人打之者比視已死吐黑血斗餘其夕序墅上白鵝數頭無故自死而序家無恙隗照汝隂人也善於易臨終書版授其妻曰吾亡後當大荒窮雖爾慎莫賣宅也却後五年春當有詔使來頓此亭姓龔此人負吾金即以此版往責之勿違言也照亡後其家大困乏欲賣宅憶夫言輒止期日有龔使者止亭中妻遂齎版往責之使者執版惘然不知所以妻曰夫臨亡手書版見命如此不敢妄也使者沈吟良久而悟謂曰賢夫何善妻曰亡夫善於易而未曽為人卜也使者曰噫可知矣乃命取蓍筮之卦成撫掌而歎曰妙哉隗生含眀隱迹可謂鏡窮遠而洞吉凶者也於是告照妻曰吾不相負金也賢夫自有金耳知亡後當暫窮故藏金以待太平所以不告兒婦者恐金盡而困無己也知吾善易故書版以寄意耳金有五百斤盛以青甕覆以銅柈埋在堂屋東頭去壁一丈入地九尺妻還掘之皆如卜焉卜珝字子玉胸奴後部人也少好讀易郭璞見而歎曰吾所弗如也奈何不免兵厄珝曰然吾大厄在四十一位為卿將當受禍耳不爾者亦為猛獸所害吾亦未見子之令終也璞曰吾禍在江南甚營之未見免兆雖然在南猶可延期住此不過時月珝曰子勿為公吏可以免諸璞曰吾不免公吏猶子之不能免卿將也珝曰吾此雖當有帝王子終不復奉二京矣琅邪可奉卿謹奉之主晉祀者必此人也珝遂隱於龍門山劉淵僣號徴為大司農侍中固以疾辭淵曰人各有心卜珝之不欲在吾朝何異髙祖四公哉可遂其髙志後復徴為光祿大夫珝謂使者曰非吾死所也及劉聰嗣偽位徴為太常時劉琨據并州聰問何時可平珝答曰并州陛下之分今兹剋之必矣聰戲曰朕欲勞先生一行可乎珝曰臣所以來不及裝者正為是行也聰大悅署珝使持節平北將軍將行謂其妹曰死自吾分後慎勿紛紜及攻晉陽為琨所敗珝卒先奔為其元帥所殺鮑靚字太元東海人也年五嵗語父母云本是曲陽李家兒九嵗墮井死其父母尋訪得李氏推問皆符驗靚學兼內外眀天文河洛書稍遷南陽中部都尉為南海太守嘗行部入海遇風飢甚取白石煮食之以自濟王機時為廣州刺史入厠忽見二人著烏衣與機相捍良久禽之得二物似烏鴨靚曰此物不祥機焚之徑飛上天機尋誅死靚嘗見仙人道君授道訣年百餘嵗卒吳猛豫章人也少有孝行夏日常手不驅蚊懼其去已而噬親也年四十邑人丁義始授其神方因還豫章江波甚急猛不假舟楫以白羽扇畫水而渡觀者異之庾亮為江州刺史嘗遇疾聞猛神異乃迎之問已疾何如猛辭以自算盡請具棺服旬日而死形狀如生未及大斂遂失其尸識者以為亮不祥之徴亮疾果不起幸靈者豫章建昌人也性少言與小人羣居見侵辱而無愠色邑里號之曰癡雖其父母兄弟亦以為癡也嘗使守稻羣牛食之靈見而不驅待牛去乃往理其殘亂者其父母見而怒之靈曰夫萬物生天地之間各欲得食牛方食奈何驅之其父愈怒曰即如汝言復用理壞者何為靈曰此稻又欲得終其性牛自犯之靈可以不收乎時順陽樊長賓為建昌令發百姓作官船於建城山中吏令人各作箸一雙靈作而未輸或竊之焉俄而竊者心痛欲死靈謂之曰爾得無竊我箸乎竊者不應有頃逾急靈曰若爾不以情告我者今真死矣竊者急遽乃首出之靈於是飲之以水病即立愈行人由此敬畏之船成當下吏以二百人引一艘不能動方請益人靈曰此以過足但部分未至耳靈請自牽之乃手執箸惟用百人而船去如流衆大驚怪咸稱其神於是知名有龔仲儒者女病積年氣息財屬靈使以水含之己而強起應時大愈又吕猗母皇氏得痿痺病十有餘年靈療之去皇氏數尺而坐冥目寂然有頃顧謂猗曰扶夫人令起曰老人得病纍年奈何可倉卒起邪靈曰但試扶起於是兩人夾扶以立少選靈又令去扶即能自行由此遂愈於是百姓奔趨水陸輻湊從之如雲皇氏自以病久懼有發動靈乃留水一器令食之每取水輒以新水補處二十餘年水清如新塵垢不能加焉時髙悝家有鬼怪言語訶叱投擲內外不見人形或器物自行再三發火巫祝厭劾而不能絶適值靈乃要之靈於陌頭望其屋謂悝曰此君之家邪悝曰是也靈曰知之足矣悝固請之靈不得已至門見符索甚多謂悝曰當以正止邪而以邪救邪惡得己乎並使焚之惟據軒小坐而去其夕鬼怪即絶靈所救愈多此類然不取報謝行不騎乘長不娶妻性至恭見人即先拜言輒自名凡草木之夭傷於山林者必起理之器物之傾覆於塗路者必舉正之周旋江州間謂其士人曰天地之於人物一也咸欲不失其情性奈何制服人以為奴婢乎諸君若欲享多福以保性命可悉免遣之十餘年間賴其術以濟者極多後乃娶妻畜車馬奴婢受貨賂致遺於是其術稍衰所療得失相半焉佛圖澄天竺人也本姓帛氏少學道妙通元術永嘉四年來適洛陽自云百有餘嵗常服氣自養能積日不食善誦神咒能役使鬼神腹旁有一孔常以絮塞之每夜讀書則拔絮孔中出光照於一室又嘗齋時平且至流水側從腹旁孔中引出五藏六府洗之訖還內腹中又能聽鈴音以言吉凶莫不懸驗及洛中寇亂乃潛草野以觀變石勒屯兵葛陂専行殺戮沙門遇害者甚衆澄投勒大將軍郭黑略家黑略每從勒征伐輒豫剋勝負勒疑而問曰孤不覺卿有出衆智謀而每知軍行吉凶何也黑略曰將軍天挺神武幽靈所助有一沙門智術非常云將軍當略有區夏已應為師臣前後所白皆其言也勒召澄試以道術澄即取鉢盛水燒香咒之須臾鉢中生青蓮花光色曜目勒由此信之勒自葛陂還河北過枋頭枋頭人夜欲斫營澄謂黑略曰須臾賊至可令公知果如其言有備故不敗勒欲試澄夜冠胄衣甲執刀而坐遣人告澄云夜來不知大將軍所在使人始至未及有言澄遙問曰平居無寇何故夜嚴勒益信之勒後因忿欲害諸道士并欲苦澄澄乃潛避至黑略舍語弟子曰若將軍信至問吾所在者報云不知所之既而勒使至覔澄不得使還報勒勒大驚曰吾有惡意向澄澄舍我去矣通夜不寢思欲見澄澄知勒意悔眀旦造勒勒曰昨夜何行澄曰公有怒心昨故權避公今改意是以敢來勒大笑曰道人謬矣襄國城塹水源在城西北五里其水源暴竭勒問澄何以致水澄曰今當勑龍取水乃與弟子法首等數人至故泉源上坐繩牀燒安息香咒願數百言如此三日水泫然微流有一小龍長五六寸許隨水而來諸道士競往視之有頃水大至隍塹皆滿鮮卑假末波攻勒衆甚盛勒懼問澄澄曰昨日寺鈴聲鳴云眀旦食時當禽假末波勒登城望末波軍不見前後失色曰末波如此豈可獲乎更遣夔安問澄澄曰已獲末波矣時城北伏兵出遇末波執之澄勸宥末波遣還本國勒從之卒獲其用劉曜遣從弟嶽攻勒勒遣石虎距之嶽敗退保石梁塢石虎堅柵守之澄在襄國忽歎曰劉嶽可憫弟子法祚問其故澄曰昨日亥時嶽已破被執果如所言及曜自攻洛陽勒將救之其羣下咸諫以不可勒以訪澄澄曰相輪鈴音云秀支替戾岡僕谷劬秃當此羯語也秀支軍也替戾岡出也僕谷劉曜胡位也劬秃當捉也此言軍出捉得劉曜也又令一童子潔齋七日取麻油合燕支躬自研於掌中舉手示童子粲然有輝童子驚曰有軍馬甚衆見一人長大白晳以朱絲縛其肘澄曰此即曜也勒甚悅遂赴洛距曜生擒之勒僣稱趙天王行皇帝事敬澄彌篤時石聰將叛澄誡勒曰今年蔥中有蟲食必害人可令百姓無食蔥也勒班告境內慎無食蔥俄而石聰果走勒益重之事必咨而後行號曰大和尚勒愛子斌暴病死將殯勒歎曰朕聞虢太子死扁鵲能生之今可得效乎乃令告澄澄取楊枝沾水灑而咒之就執斌手曰可起矣因此遂蘇有頃平復自是勒諸子多在澄寺中養之勒死之年天靜無風而塔上一鈴獨鳴澄謂衆曰鈴音云國有大喪不出今年矣既而勒果死及石虎僣位遷都於鄴傾心事澄有重於勒下書衣澄以綾錦乘以雕輦朝會之日引之升殿常侍以下悉助舉輿太子諸公扶翼而上主者唱大和尚衆坐皆起以彰其尊又使司空李農旦夕親問其太子諸公五日一朝尊敬莫與為比攴道林在京師聞澄與諸石遊乃曰澄公其以石虎為海鷗鳥也百姓因澄故多奉佛皆營造寺廟相競出家真偽渾殽多生愆過石虎下書料簡其著作郎王度奏曰佛外國之神非諸華所應祠奉漢代初傳其道唯聽西域人得立寺都邑以奉其神漢人皆不出家魏承漢制亦循前軌今可斷趙人悉不聽詣寺燒香禮拜以遵典禮其百辟卿士下逮衆𨽻例皆禁之其有犯者與淫祀同罪其趙人為沙門者還服百姓朝士多同度所奏石虎以澄故下書曰朕出自邊戎忝君諸夏至於饗祀應從本俗佛是戎神所應兼奉其夷趙百姓有樂事佛者特聽之澄時止鄴城寺中弟子遍於郡國常遣弟子法常北至襄國弟子法佐從襄國還相遇於梁基城下對車夜談言及和尚比旦各去佐始入澄逆笑曰昨夜爾與法常交車共説汝師邪佐愕然愧懴於是國人每相語莫起惡心和尚知汝及澄之所在無敢向其方面涕唾者石虎太子邃有二子在襄國澄語邃曰小阿彌比當得疾可往看之邃即馳信往視果已得疾太醫殷騰及外國道士自言能療之澄告弟子法牙曰正使聖人復出不愈此病况此等乎後三日果死邃將圖為逆謂內豎曰和尚神通儻發吾謀眀日來者當先除之澄月望將入覲石虎謂弟子僧慧曰昨夜天神呼我曰眀日若入還勿過人我儻有所過汝當止我澄常入必過邃邃知澄入要候甚苦澄將上南臺僧慧引衣澄曰事不得止坐未安便起邃固留不住所謀遂差還寺歎曰太子作亂其形將成欲言難言欲忍難忍乃因事從容針石虎虎終不解俄而事發方悟澄言後郭黑略將兵征長安北山羌墮羌伏中時澄在堂上慘然改容曰郭公今有厄乃唱云衆僧祝願澄又自祝願須臾曰若東南出者活餘向者則困復更祝願有頃曰脫矣後月餘黑略還自説墮羌圍中東南走馬乏正遇帳下人推馬與之曰公乘此馬小人乘公馬濟不濟命也黑略得其馬故獲免推檢時日正是澄祝願時也時大旱石虎遣其太子詣臨漳西滏口祈雨久而不降乃令澄自行即有白龍降於祠所其日大雨方數千里澄常遣弟子向西域市香既行澄告餘弟子曰掌中見買香弟子在某處被劫垂死因燒香祝願遙救護之弟子後還云某月某日某處為賊所劫垂當見殺忽聞香氣賊無故自驚曰救兵已至棄之而走黃河中舊不生黿時忽有得者以獻石虎澄見而歎之曰桓溫入河其不久乎溫字元子後果如其言也石虎嘗晝寢夢見羣羊負魚從東北來寤以訪澄澄曰不祥也鮮卑其有中原乎後亦皆驗澄嘗與石虎升中臺澄忽驚曰變變幽州當火災仍取酒噀之久之而笑曰救之得矣石虎遣驗幽州云爾日火從西門起西南有黑雲來驟雨滅之雨亦頗有酒氣石宣將殺石韜宣先到寺與澄同坐浮圖一鈴獨鳴澄謂曰解鈴音乎鈴云胡子洛度宣變色曰是何言歟澄謬曰老胡為道不能山居無言重茵美服豈非洛度乎石韜後至澄熟視良久韜懼而問澄澄曰怪公血臭故相視耳石虎夢龍飛西南自天而落旦而問澄澄曰禍將作矣宜父子慈和深以慎之石虎引澄入東閣與其后杜氏問訊之澄曰脅下有賊不出十日自浮圖以西此殿以東當有流血慎勿東也杜氏曰和尚耄邪何處有賊澄即易語云六情所受皆悉是賊老自應耄但使少者不昏即好耳遂便寓言不復彰的後二日石宣果害石韜於佛寺中欲因石虎臨喪殺之虎以澄先誡故獲免及宣被收澄諌石虎曰皆陛下之子也何為重禍邪陛下若含怒加慈者尚有六十餘嵗如必誅之宣當為彗星下掃鄴宫石虎不從後月餘有一妖馬髦尾皆有燒狀入中陽門出顯陽門東首東宫皆不得入走向東北俄爾不見澄聞而歎曰災其及矣石虎大饗羣臣於太武前殿澄吟曰殿乎殿乎棘子成林將壞人衣石虎令發殿石下視之有棘生焉冉閔小字棘奴石虎造太武殿初成圖畫自古賢聖忠臣孝子烈士貞女皆變為胡狀旬餘頭悉縮入肩中惟冠䯰髣佛微出石虎大惡之祕而不言也澄對之流涕乃自啓營墓於鄴西紫陌還寺獨語曰得三年乎自答不得又曰得二年一年百日一月乎自答不得遂無復言謂弟子法祚曰戊申嵗禍亂漸萌己酉嵗石氏當滅吾及其未亂當先從化矣卒於鄴宫寺後有沙門從雍州來稱見澄西入關石虎掘而視之唯有一石而無尸石虎惡之曰石者朕也葬我而去吾將死矣因而遇疾眀年石虎死遂大亂麻襦者不知何許人也莫得其姓名石虎時在魏縣市中乞丐恆著麻襦布裳故時人謂之麻襦言語卓越狀如狂者乞得米穀不食輒散置大路云飼天馬趙興太守籍狀收送詣石虎先是佛圖澄謂石虎曰國東二百里某月日當送一非常人勿殺之也如期果至石虎與共語了無異言惟道陛下當終一柱殿下石虎不解送以詣澄麻襦謂澄曰昔在光和中會奄至今日酉戎受元命絶歷終有期金離消於壤邉荒不能遵驅除靈期迹莫已己之懿裔苖葉繁其來方積休期於何期永以歡之澄曰天回運極否將不支九木水為難無可以術寧元哲雖存世莫能基必莫能基必頺久遊閻浮利擾擾多此患行登凌雲宇會於虛遊間其所言人莫能曉石虎遣驛馬送還本縣既出城請步云我當有所過君至合口橋見待使人如言而馳至橋麻襦已先至後慕容俊投石虎尸於漳水倚橋柱不流時人以為一柱殿下即此謂也及元帝嗣位江左亦以為天馬之應單道開敦煌人也常衣粗褐或贈以繒服皆不著不畏寒暑晝夜不卧常服細石子一吞數枚日一服或多或少好山居而山樹諸神見異形試之初無懼色石虎時從西平來一日行七百里其一沙彌年十四行亦及之至秦州表送到鄴石虎令佛圖澄與語不能屈也初止鄴城西沙門法綝祠中後徙臨漳昭德寺於房內造重閣髙八九尺於上編管為禪室坐其中石虎資給甚厚道開皆以施人人或來咨問者道開都不答日服鎮守藥數丸大如梧子藥有松蜜薑桂茯苓之氣時復飲茶蘇一二升而已自云能療目疾就療者頗驗視其行動狀若有神佛圖澄曰此道士觀國興衰若去者當有大亂及石虎末道開南渡許昌尋而鄴中大亂升平三年至京師後至南海入羅浮山獨處茅茨蕭然物外年百餘嵗卒於山舍敕弟子以尸置石穴中弟子乃移入石室陳郡袁宏為南海太守與弟頴叔及沙門支法防共登羅浮山至石室口見道開形骸如生香火瓦器猶存宏曰法師業行殊羣正當如蟬蛻耳乃為之贊云黃泓字始長魏郡斥邱人也父沈善天文祕術泓從父受業精妙逾深兼博覽經史尤眀禮易性忠勤非禮不動永嘉之亂與勃海髙瞻避地幽州説瞻曰王浚昏暴終必無成宜思去就以圖久安慕容廆法政修眀虛懷引納且讖言真人出東北儻或是乎宜相與歸之同建事業瞻不從泓乃率宗族歸廆廆待以客禮引為參軍軍國之務動輒咨之泓指説成敗事皆如言廆常曰黃參軍孤之仲翔也及皓嗣位遷左常侍領史官甚重之石虎攻皓皓將走遼東泓曰賊有敗氣無可憂也不過二日必當奔潰宜嚴勒士馬為追擊之備皓曰今寇盛如此卿言必走孤未敢信泓曰殿下言盛者人事耳臣言必走者天時也胡足為疑及期石虎果退皓益竒之及慕容俊即王位遷從事中郎俊聞冉閔亂將圖中原訪之於泓泓勸行俊從之及僭號署為進謀將軍太史令關內侯尋加奉車都尉西海太守領太史令開陽亭侯又封平舒縣五等伯常從左右咨決大事靈臺令許敦害其寵諂事慕容評設異議以毁之乃以泓為太史靈臺諸署統加給事中泓待敦彌厚不以毁已易心慕容暐敗以老歸家歎曰燕必中興其在吳王恨吾年過不見耳年九十七卒卒後三年偽吳王慕容垂興焉索紞字叔徹敦煌人也少遊京師受業大學博綜經籍遂為通儒眀隂陽天文善術數占候司徒辟除郎中知中國將亂避世而歸鄉人就占者如市紞曰攻乎異端戒在害己無為多事多事多患遂詭言虛説無驗乃止唯以占夢為無悔吝乃不逆問者孝廉令狐䇿夢立冰上與冰下人語紞曰冰上為陽冰下為隂隂陽事也士如歸妻逮冰未泮婚姻事也君在冰上與冰下人語為陽語隂媒介事也君當為人作媒冰泮而婚成䇿曰老夫耄矣不為媒也會太守田豹因䇿為子求鄉人張公徴女仲春而成婚焉郡主簿張宅夢走馬上山還繞舍三周但見松柏不知門處紞曰馬屬離離為火火禍也人上山為凶字但見松柏墓門象也不知門處為無門也三周三期也後三年必有大禍宅果以謀反伏誅索充初夢天上有二棺落於充前紞曰棺者職也當有京師貴人舉君二官者頻再遷俄而司徒王戎書屬太守使舉充太守先署充功曹而舉孝廉充後夢見一虜脫上衣來詣充紞曰虜去上中下半男字夷狄隂類君婦當生男終如其言宋桷夢內中有一人著赤衣桷手把兩杖極打之紞曰內中有人肉字也肉色赤也兩杖箸象也極打之飽肉食也俄而亦驗焉黃平問紞曰我昨夢舍中馬舞數十人向馬拍手此何祥也紞曰馬者火也舞為火起向馬拍手救火人也平未歸而火作索綏夢東方有二角書詣綏大角朽敗小角有題韋囊角佩一在前一在後紞曰大角朽敗腐棺木小角有題題所詣一在前前凶也一在後後背也當有凶背之問時綏父在東居三日而凶問至郡功曹張邈嘗奉使詣州夜夢狼啖一腳紞曰腳肉被啖為却字會東虜反遂不行凡所占無不驗太守隂淡從求占書紞曰昔入太學因一父老為主人其人無不知又匿姓名有似隱者紞因從父老問占夢之術審測而説實無書也淡命為西閣祭酒紞辭曰少無山林之操遊學京師交結時貴希申鄙藝會中國不靖欲養志終年老亦至矣不求聞達又少不習勤老無吏幹濛汜之年弗敢聞命淡以束帛禮之月致羊酒年七十五卒於家孟欽洛陽人也有左慈劉根之術百姓惑而赴之苻堅召詣長安惡其惑衆命苻融誅之俄而欽至融留之遂大宴羣寮酒酣目左右收欽欽化為旋風飛出第外頃之有告在城東者融遣騎追之垂及忽然已逺或有兵衆距戰或前有溪澗騎不得過遂不知所在堅末復見於青州苻朗尋之入於海島王嘉字子年隴西安陽人也輕舉止醜形貌外若不足而聰睿內眀滑稽好語笑不食五穀不衣美麗清虛服氣不與世人交遊隱於東陽谷鑿崖穴居弟子受業者數百人亦皆穴處石虎之末棄其徒衆至長安潛隱於終南山結菴廬而止門人聞而復隨之又遷於倒獸山苻堅纍徴不至公侯以下咸躬往參詣好尚之士無不宗師之問其當世者皆隨問而對好為譬喻狀如戲調言未然之事辭如讖記當時鮮能曉之事過皆驗堅將南征遣使者問之嘉曰金剛火強乃乘使者馬正衣冠徐徐東行數百步而䇿馬馳反脫衣服棄冠履而歸下馬踞牀一無所言使者還告堅不悟復遣問之曰吾世祚云何嘉曰未央咸以為吉眀年癸未敗於淮南所謂未年而有殃也人候之者至心則見之不至心則隱形不見衣服在架履杖猶存或欲取其衣者終不及企而取之衣架逾髙而屋亦不大履杖諸物亦如之姚萇之入長安禮嘉如苻堅故事逼以自隨每事咨之萇既與苻登相持謂嘉曰吾得殺苻登定天下否嘉曰略得之萇怒曰得當云得何略之有遂斬之先此釋道安謂嘉曰世故方殷可以行矣嘉答曰卿其先行吾負債未果去俄而道安亡至是嘉戮死所謂負債者也苻登聞嘉死設壇哭之贈太師諡曰文及萇死萇子興字子略方殺登略得之謂也嘉之死日人有隴上見之其所造牽三歌讖事過皆驗纍世猶傳之又著拾遺録十卷其記事多詭異今行於世僧涉者西域人也不知何姓少為沙門苻堅時入長安虛靜服氣不食五穀日能行五百里言未然之事驗若指掌能以祕呪下神龍每旱堅常使之呪龍請雨俄而龍下鉢中天輒大雨堅及羣臣親就鉢觀之卒於長安後大旱移時堅歎曰涉公若在豈憂此乎郭黁西平人少眀式易仕郡主簿張天錫末年苻氏每有西伐之問太守趙凝使黁筮之黁曰若郡內二月十五日失囚者東軍當至涼祚必終凝乃申約屬縣至十五日鮮卑折掘送馬於凝凝怒其非駿幽之內廄鮮卑懼而夜遁凝以告黁黁曰是也國家將亡不可復振苻堅末當陽門震刺史梁熙問黁曰其祥安在黁曰為四夷之事也當有外國二王來朝主上一當反國一死此城嵗餘而鄯善及前部王朝于苻堅西歸鄯善王死於姑臧吕光之王河西也西海太守王楨叛黁勸光襲之光之左丞吕寶曰千里襲人自昔所難況王者之師天下所聞何可僥幸以邀成功黁不可從誤人大事黁曰若其不捷黁自伏鈇鉞之誅如其克也左丞為無謀矣光從而克之光比之京管常參幃幄密謀光將伐乞伏乾歸黁諌曰今太白未出不宜行師往必無功終當覆敗太史令賈曜以為必有秦隴之地及克金城光使曜詰黁黁密謂光日昨有流星東墜當有伏尸死將雖得此城憂在不守正月上旬河氷將解若不早渡恐有大變後二日而敗問至光引軍渡河訖冰泮時人服其神驗光以黁為散騎常侍太常黁後以光年老知其將敗遂與光僕射王祥起兵作亂百姓聞黁起兵咸以聖人起事事無不成故相率從之如不及黁以為代吕者王乃推王乞基為主後吕隆降姚興興以王尚為涼州刺史終如黁言黁之與光相持也逃人稱吕統病死黁曰未也光統之命盡在一時後統死三日而光死黁嘗曰涼州謙光殿後當有索頭鮮卑居之終於秃髮傉檀沮渠蒙遜迭據姑臧黁性褊酷不為士庶所附戰敗奔乞伏乾歸乾歸敗入姚興黁以滅姚者晉遂將妻子南奔為追兵所殺鳩摩羅什天竺人也世為國相父鳩摩羅炎聰懿有大節將嗣相位乃辭避出家東度蔥領龜兹王聞其名郊迎之請為國師王有妹年二十才悟眀敏諸國交聘並不許及見炎心欲當之王遂逼以妻焉既而羅什在胎其母慧解倍常及年七嵗母遂與俱出家羅什從師受經日誦千偈偈有三十二字凡三萬二千言義亦自通年十二其母攜到沙勒國王甚重之遂停沙勒一年博覽五眀諸論及隂陽星算莫不畢盡妙達吉凶言若符契為性率達不拘小檢修行者頗共疑之然羅什自得於心未嘗介意専以大乘為化諸學者咸共師焉年二十龜兹王迎之還國廣説諸經四逺學徒莫之能抗有頃羅什母辭龜兹王往天竺留羅什住謂之曰方等深教不可思議傳之東土惟爾之力但於汝無利其可如何羅什曰必使大化流傳雖苦而無恨母至天竺道成進登第三果西域諸國咸伏羅什神雋每至講説諸王皆長跪坐側令羅什踐而登焉苻堅聞之密有迎羅什之意會太史奏云有星見外國分野當有大智入輔中國堅曰朕聞西域有鳩摩羅什將非此邪乃遣驍騎將軍吕光等率兵七萬西伐龜兹謂光曰若獲羅什即馳驛送之光軍未至羅什謂龜兹王白純曰國運衰矣當有勍敵從日下來宜恭承之勿抗其鋒白純不從出兵距戰光遂破之乃獲羅什光見其年齒尚少以凡人戲之強妻以龜兹王女羅什距而不受辭甚苦至光曰道士之操不踰先父何所固辭乃飲以醇酒同閉密室羅什被逼遂妻之光還中路置軍於山下將士已休羅什曰在此必狼狽宜徙軍隴上光不納至夜果大雨洪潦暴起水深數丈死者數千人光密異之光欲留王西國羅什謂光曰此凶亡之地不宜淹留中路自有福地可居光還至涼州聞苻堅已為姚萇所害於是竊號河右屬姑臧大風羅什曰不祥之風當有姦叛然不勞自定也俄而有叛者尋皆殄滅沮渠蒙遜先推建康太守假業為主光遣其子纂率衆討之時論謂業等烏合纂有威聲勢必全尅光以訪羅什答曰此行未見其利既而纂敗於合黎俄又郭黁起兵纂棄大軍輕還復為黁所敗僅以身免中書監張資病光博營救療有外國道人羅義云能差資病光喜給賜甚重羅什知義誑詐告資曰義不能為益徒煩費耳冥運雖隱可以事試也乃以五色絲作繩結之燒為灰末投水中云灰若出水還成繩者病不可愈須臾灰聚浮出復為繩義療果無效少日資亡頃之光死纂立有豬生子一身三頭龍出東廂井中於殿前蟠卧比旦失之纂以為美瑞號其殿為龍翔殿俄而有黑龍升於當陽九宫門纂改九宫門為龍興門羅什曰比日潛龍出遊豕妖表異龍者隂類出入有時而今屢見則為災眚必有下人謀上之變宜尅已修德以答天戒纂不納後果為吕超所殺羅什之在涼州積年吕光父子既不𢎞道故藴其深解無所宣化姚興遣姚碩德西伐破吕隆乃迎羅什待以國師之禮仍使入西眀閣及逍遙園譯出衆經羅什多所暗誦無不究其義旨既覽舊經多有紕繆於是興使沙門僧睿僧肇等八百餘人傳受其旨更出經論凡三百餘卷沙門慧睿才識髙眀常隨羅什傳寫羅什每為慧睿論西方辭體商略同異云天竺國俗甚重文制其宫商體韻以入管絃為善凡覲國王必有贊德經中偈頌皆其式也羅什雅好大乘志在敷演常歎曰吾若著筆作大乘阿毗曇非迦旃子比也今深識者既寡將何所論唯為姚興著實相論二卷興奉之若神嘗講經於草堂寺興及朝臣大德沙門千有餘人肅容觀聽羅什忽下髙座謂興曰有二小兒登吾肩欲鄣須婦人興乃召宫女進之一交而生二子焉興嘗謂羅什曰大師聰眀超悟天下莫二何可使法種少嗣送以伎女十人逼之令受爾後不住僧坊别立解舍諸僧多效之羅什乃聚針盈鉢引諸僧謂之曰若能見效食此者乃可畜室耳因舉匕進針與常食不别諸僧愧服乃止杯渡比邱在彭城聞羅什在長安歎曰吾與此子戲别三百餘年相見杳然未期遲有遇於來生耳羅什未終少日覺四大不悆乃口出三蕃神呪令外國弟子誦之以自救未及致力轉覺危殆於是力疾與衆僧告别曰因法相遇殊未盡心方復後世惻愴可言死於長安姚興於逍遙園依外國法以火焚尸薪滅形碎唯舌不爛沙門曇霍者不知何許人也秃髮傉檀時從河南來持一錫杖令人跪曰此是波若眼奉之可以得道時人咸異之或遺以衣服受而投之於河後日以還本主衣無所汚行步如風雲言人死生貴賤無毫釐之差人或藏其錫杖曇霍大哭數聲閉目須臾起而取之咸竒其神異莫能測也每謂傉檀曰若能安坐無為則天下可定祚允克昌如其窮兵好殺禍將及已傉檀不能從傉檀女病甚請救療曇霍曰人之死生自有定期聖人亦不能轉禍為福曇霍安能延命邪正可知早晚耳傉檀固請之時後宫門閉曇霍曰急開後門及開門則生不及則死傉檀命開之不及而死後兵亂不知所在也臺産字國俊上洛人漢侍中崇之後也少専京氏易善圖讖祕緯天文洛書風角星算六日七分之學尤善望氣占候推步之術隱居商洛南山兼善經學泛情教授不交當世劉曜時災異特甚命公卿各舉博識直言之士一人其大司空劉均舉産曜親臨東堂遣中黃門䇿問之産極言其故曜覽而嘉之引見訪以政事産流涕歔欷具陳災變之禍政化之闕辭甚懇至曜改容禮之署為博士祭酒諫議大夫領太史令至眀年而其言皆驗曜彌重之轉大中大夫嵗中三遷歷位尚書光祿大夫太子少師位特進金章紫綬爵關中侯宋徐文伯字德秀東海人濮陽太守熙之曽孫也熙好黃老隱於秦望山有道士過求飲留一瓠􅕧與之曰君子孫宜以道術救世當得二千石熙開之乃扁鵲鏡經一卷因精心學之遂名震海內生子秋夫彌工其術仕至射陽令嘗夜有鬼呻吟聲甚悽愴秋夫問何須答言姓某家在東陽患腰痛死雖為鬼痛猶難忍請療之秋夫曰云何厝法鬼請為芻人案孔穴針之秋夫如其言為灸四處又針肩井三處設祭埋之眀日見一人謝恩忽然不見當世服其通靈秋夫生道度叔嚮皆能精其業道度有腳疾不能行文帝令乘小輿入殿為諸皇子療疾無不絶驗仕至蘭陵太守文帝常云天下有五絶而皆出錢塘謂杜道鞠彈碁范悅時褚欣逺模書褚允圍碁徐道度療疾也道度生文伯叔嚮生嗣伯文伯亦精其業兼有學行性倜儻不屈意於公卿不以醫術自業吳郡張融謂文伯嗣伯曰昔王微嵇叔夜並學而不能殷仲堪之徒故所不論得之者由神眀洞徹然後可至故非吾徒所及且褚侍中澄雖富貴亦能救療人疾卿此便成不達答曰唯達者知此可崇不達者多以為深纍既鄙之何能不耻之文伯為效與嗣伯相埓孝武路太后病衆醫不識文伯診之曰此石博水腸耳乃為水劑消石湯病即愈除鄱陽王常侍遺以千金旬日恩遇隆重眀帝宫人患腰痛牽心每至發輒氣欲絶衆醫以為肉癥文伯曰此髮癥也以油投之即吐得一物如髮稍引之長三尺頭已成蛇能動遂挂門上滴盡乃一髮而已病即差後廢帝出樂遊苑門逢一婦人有娠帝亦善醫診之曰此腹是女也問文伯文伯曰腹有兩子一男一女男左邊青黑形小於女帝性急便欲使剖文伯惻然曰若以刀斧恐其變易請針之胎自落便寫足太隂補手陽眀胎便應針而落兩兒相續出果如其言子雄亦傳家業尤工診察位奉朝請能清言多為貴遊所善事母孝謹母終毁瘠幾至自滅俄而兄亡扶杖臨喪撫膺一慟遂以哀卒嗣伯字叔紹亦有孝行善清言位正員郎諸府佐彌為臨川王映所重時直閣將軍房伯玉服五石散十許劑無益更患冷夏日常復衣嗣伯為診之曰卿伏熱應須以水發之非冬月不可至十一月冰雪大盛令二人夾捉伯玉解衣坐於石上取冷水從頭澆之盡二十斛伯玉口噤氣絶家人啼哭請止嗣伯遣人執杖防閣敢有諫者撾之又盡水百斛伯玉始能動而見背上彭彭有氣俄而起坐曰熱不可忍乞冷飲嗣伯以水與之一飲一升病即差自爾恆發熱冬月猶著單褌衫體更肥壯常有嫗患滯冷積年不差嗣伯為診之曰此尸注也當以死人枕煮服之乃愈於是往古冢中取枕枕已一邊腐缺服之即差後秣陵人張景年十五患腹脹面黃衆醫不能療以問嗣伯嗣伯曰此石蛔耳極難療當取死人枕煮服之依語煮枕以湯投下得大利有蛔蟲頭堅如石者五六升病即差後沈僧翼患眼痛又多見鬼物以問嗣伯嗣伯曰邪氣入肝可覔死人枕煮服之竟可埋枕於故處如其言又愈王晏知而問之曰三病不同而皆用死人枕而俱差何也答曰尸注者鬼氣也伏而未起故令人沈滯得死人枕投之魂氣飛越不復附體故尸注可差石蛔者久蛔也醫療既僻蛔蟲轉堅世間藥不能遣所以須鬼物驅之然後可散故令煮死人枕服之夫邪氣入肝故使眼痛而見魍魎應須邪物以鈎之故用死人枕也氣因枕而去故令埋於冢間也又春月出南籬間戲聞笡屋有呻吟聲嗣伯曰此病甚重更一二日不療必死乃往視之見一老姥稱體痛而處處有黑敢黑無數嗣伯還煮斗餘湯送令服之服訖痛勢愈甚跳投牀者無數須臾所黑敢處皆拔出釘長寸許以膏塗諸瘡口三日而復云此名釘疽也時又有薛伯宗善徙癰疽有公孫泰者患背伯宗為氣封之徙置齋前栁樹上眀旦癰消樹便起一瘤如拳大稍稍長二十餘日瘤大膿爛出黃赤汁斗餘樹為之痿損梁釋寶志者不知何許人有於宋泰始中見之出入鍾山往來都邑年已五六十矣齊宋之間稍顯靈迹被髮徒跣語默不倫或被錦袍飲啖同於凡俗恆以鏡銅剪刀鑷屬挂杖負之而趍或從人徴索酒肴或纍日不食豫言未兆識他心智一日中分身易所逺近驚赴所居噂􅊱齊武帝忿其惑衆收付建康獄旦日咸見遊行市里既而檢校猶在獄中其夜又語獄吏曰門外有兩輿食金鉢盛飯汝可取之果是文惠太子及竟陵王子良所供養縣令吕文顯以啓武帝乃迎入華林園少時忽著三布帽亦不知於何得之俄而武帝崩文惠太子豫章王相繼薨齊亦於此季矣靈和寺沙門釋寶亮欲以衲被遺之未及有言寶志忽來牽被而去蔡仲熊嘗問仕何所至了自不答直解杖頭左索繩擲與之莫之能解仲熊後至尚書左丞方知言驗永眀中住東宫後堂從平旦門中出入末年忽云門上血汚衣褰裳走過至鬱林見害梁以犢車載尸出自此門舍故閹人徐龍駒宅而帝頸血流於門限焉梁武帝尤深敬事常問年祚逺近答曰元嘉元嘉帝欣然以為享祚倍宋文之年寶志雖剃鬚髮而常冠帽下裙納袍故俗呼為志公好為讖記所謂志公符是也髙麗聞之遣使齎錦帽供養天監十三年卒將死忽移金剛像出置户外語人云菩薩當去旬日無疾而終先是琅邪王筠至莊嚴寺寶志遇之與交言歡飲至亡敕命筠為碑蓋先覺也通志卷一百八十二
