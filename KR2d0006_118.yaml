body:
  text: 通志卷一百四宋右迪功郎鄭樵漁仲撰列傳第十七後漢劉聖公劉盆子王昌劉永龐萌張步王閎李憲陳衆彭寵盧芳隗囂王遵公孫述劉聖公名元光武族兄也弟為人所殺聖公結客欲報之客犯法聖公避吏於平林吏繫其父子張聖公詐死使人持喪歸舂陵吏乃出子張聖公因自逃匿王莽末南方飢饉人庶羣入野澤掘鳬茈而食之更相侵奪新市人王匡王鳳為平理諍訟遂推為渠帥衆數百人於是諸亡命馬武王常成丹等往從之共攻離鄉聚藏於緑林中數月間至七八千人地皇二年荆州牧某史闕其名發奔命二萬人攻之匡等相率迎擊於雲杜大破牧軍殺數千人盡獲輜重遂攻拔竟陵轉擊雲杜安陸多略婦女還入緑林中至有五萬餘口州郡不能制三年大疾疫死者且半乃各分散引去王常成丹西入南郡號下江兵王匡王鳳馬武及其支黨朱鮪張卬等北入南陽號新市兵皆自稱將軍七月匡等進攻隨未能下平林人陳牧廖湛復聚衆千餘人號平林兵以應之聖公因往從牧等為其軍安集掾是時光武及兄伯升亦起舂陵與諸部合兵而進四年正月破王莽前隊大夫甄阜屬正梁邱賜斬之號聖公為更始將軍衆雖多而無所統一諸將共議立更始為天子二月辛巳設壇場於淯水上沙中陳兵大會更始即帝位南靣立朝羣臣更始素懦弱羞愧流汗舉手不能言於是大赦天下建元日更始元年悉拜置諸將以族父良為國三老王匡為定國上公王鳳成國上公朱鮪大司馬伯升大司徒陳牧大司空餘皆九卿將軍五月伯升拔宛六月更始入都宛城盡封宗室及諸將為列侯者百餘人更始忌伯升威名遂誅之以光祿勳劉賜為大司徒前鍾武侯劉望起兵略有汝南時王莽納言嚴尤秩宗將軍陳茂既敗於昆陽往歸之望遂自立為天子以尤為大司馬茂為丞相時王莽使太師王匡國將哀章守洛陽更始遣定國上公王匡攻洛陽西屏大將軍申屠建丞相司直李松攻武關三輔震動是時海內豪傑翕然響應皆殺其牧守自稱將軍用漢年號以待詔命旬月之間遍於天下長安中起兵攻未央宫九月東海人公賔就斬王莽於漸臺收璽綬傳首詣宛更始時在便坐黃堂取視之喜曰莽不如是當與霍光等寵姬韓夫人笑曰若不如是帝焉得之乎更始悅乃懸莽首於宛城市是月拔洛陽生縛王匡哀章至皆斬之十月使奮威大將軍劉信擊殺劉望於汝南并誅嚴尤陳茂更始遂北都洛陽以劉賜為丞相申屠建李松自長安傳送乘輿服御又遣中黃門從官奉迎遷都二年二月更始自洛陽而西初發李松奉引馬驚奔觸北宫鐵柱門三馬皆死初王莽敗惟未央宫被焚而已其餘宫館一無所毁宫女數千備列後庭自鐘鼓帷帳輿輦器服太倉武庫官府市里不改於舊更始既至居長樂宫升前殿郎吏以次列庭中更始羞怍俯首刮席不敢視諸將後至者更始問虜掠得幾何左右侍官皆宫省久吏各驚相視李松與棘陽人趙萌説更始宜悉王諸功臣朱鮪爭之以為高祖約非劉氏不王更始乃先封宗室太常將軍劉祉為定陶王劉賜為宛王劉慶為燕王劉歙為元氏王大將軍劉嘉為漢中王劉信為汝隂王後遂立王匡為比陽王王鳳為宜城王朱鮪為膠東王衛尉大將軍張卬為淮陽王廷尉大將軍王常為鄧王執金吾大將軍廖湛為穰王申屠建為平氏王尚書胡殷為隨王柱天大將軍李通為西平王五威中郎將李軼為舞隂王水衡大將軍成丹為襄邑王大司空陳牧為隂平王驃騎大將軍宋佻為潁隂王尹尊為郾王唯朱鮪辭曰臣非劉宗不敢干典遂讓不受乃徙鮪為左大司馬劉賜為前大司馬使與李軼李通王常等鎮撫關東以李松為丞相趙萌為右大司馬共秉內任更始納趙萌女為夫人有寵遂委政於萌日夜與婦人飲宴後庭羣臣欲言事輒醉不能見時不得已乃令侍中坐帷內與語諸將識非更始聲出皆怨曰成敗未可知遽自縱放若此韓夫人尤嗜酒每侍飲見常侍奏事輒怒曰帝方對我飲正用此時持事來乎起抵破書案趙萌専權威福自己郎吏有説萌放縱者更始怒拔劒擊之自是無復敢言萌私忿侍中引下斬之更始救請不從時李軼朱鮪擅命山東王匡張卬暴三輔其所受官爵者皆羣小賈豎或有膳夫庖人多著繡靣衣錦袴襜褕諸于罵詈道中長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯軍帥將軍豫章李淑上書諌曰方今賊冦始誅王化未行百官有司宜慎其任夫三公上應台宿九卿下括河海故天工人其代之陛下定業雖因下江平林之藝斯蓋臨時濟用不可施之既安宜釐改制度更延英俊因才授爵以匡王國今公卿大位莫非戎陳尚書顯官皆出庸伍資亭長賊捕之用而當輔佐綱維之任惟名與器聖人所重今以所重加非其人望其毗益萬分興化致理譬猶緣木求魚升山採珠海內望此有以窺度漢祚臣非有憎疾以求進也但為陛下惜此舉厝敗材傷錦所宜至慮惟割既往謬妄之失思隆周文濟濟之美更始怒繫淑詔獄自是關中離心四方怨叛諸將出征各自専置牧守州郡交錯不知所從十二月赤眉西入關三年正月平陵人方望立前孺子劉嬰為天子初望見更始政亂度其必敗謂安陵人弓林等曰前定安公嬰平帝之嗣雖王莽篡奪而嘗為漢主今皆云劉氏真人當更受命欲共定大功何如林等然之乃於長安求得嬰將至臨涇立之聚黨數千人望為丞相林為大司馬更始遣李松與討難將軍蘇茂等擊破皆斬之又使蘇茂拒赤眉於𢎞農茂軍敗死者千餘人三月遣李松會朱鮪與赤眉戰於蓩鄉蓩音莫老反松等大敗棄軍走死者三萬餘人時王匡張卬守河東為鄧禹所破還奔長安卬與諸將議曰赤眉近在鄭華隂間旦暮且至今獨有長安見滅不久不如勒兵掠城中以自富轉攻所在東歸南陽收宛王等兵事若不集復入湖池中為盜耳申屠建廖湛等皆以為然共入説更始更始怒不應莫敢復言及赤眉立劉盆子更始使王匡陳牧成丹趙萌屯新豐李松軍掫以拒之掫音子侯反張卬廖湛胡殷申屠建等與御史大夫隗囂合謀欲以立秋日貙膢時共劫更始俱成前計侍中劉能卿知其謀以告之更始託病不出召張卬等卬等皆入將悉誅之惟隗囂不至更始狐疑使卬等四人且待於外廬卬與湛殷疑有變遂突出獨申屠建在更始斬之卬與湛殷遂勒兵掠東西市昏時燒門入戰於宫中更始大敗明旦將妻子車騎百餘東奔趙萌於新豐更始復疑王匡陳牧成丹與張卬等同謀乃並召入牧丹先至即斬之王匡懼將兵入長安與張卬等合李松還從更始與趙萌共攻匡卬於城內連戰月餘匡等敗走更始徙居長信宫赤眉至高陵匡等迎降之遂共連兵而進更始城守使李松出戰敗死者二千餘人赤眉生得松時松弟泛為城門校尉赤眉使使謂之曰開城門活汝兄泛即開門九月赤眉入城更始單騎走從厨城門出諸婦女從後連呼曰陛下當下謝城更始即下拜復上馬去初侍中劉恭以赤眉立其弟盆子自繫詔獄聞更始敗乃出步從至高陵止傳舍右輔都尉嚴夲恐失更始為赤眉所誅將兵在外號為屯衛而實囚之赤眉下書曰聖公降者封為長沙王過二十日勿受更始遣劉恭請降赤眉使其將謝祿往受之十月更始遂隨祿肉袒詣長樂宫上璽綬於盆子赤眉坐更始置庭中將殺之劉恭謝祿為請不能得遂引更始出劉恭追呼曰臣誠力竭請得先死拔劒欲自刎赤眉帥樊崇等遽共救止之乃赦更始封為畏威侯劉恭復為同請竟得封長沙王更始常依謝祿居劉恭亦擁護之三輔苦赤眉暴虐皆憐更始而張卬等以為慮謂祿曰今諸營長多欲篡聖公者一旦失之合兵攻公自滅之道也於是祿使從兵與更始共牧馬於郊下因令縊殺之劉恭夜往收藏其尸光武聞而傷焉詔大司徒鄧禹葬之於霸陵有三子求歆鯉明年夏求兄弟與母東詣洛陽帝封求為襄邑侯奉更始祀歆為榖孰侯鯉為壽光侯求後徙封咸陽侯求卒子巡嗣復徙封灌澤侯巡卒子姚嗣劉盆子者太山式人城陽景王章之後也祖父憲元帝時封為式侯父萌嗣王莽篡位國除因為式人焉天鳳元年琅邪海曲有吕母者子為縣吏犯小罪宰論殺之吕母怨宰密聚客規以報仇母家素豐資産數百萬乃益釀醇酒買刀劒衣服少年來酤者皆賒與之視其乏者輒假衣裳不問多少數年財用稍盡少年欲相與償之吕母垂泣曰所以厚諸君者非欲求利徒以縣宰不道枉殺吾子欲為報怨耳諸君寧肯哀之乎少年壯其意又素受恩皆許諾其中勇士自號猛虎遂相聚得數十百人因與吕母入海中招合亡命衆至數千吕母自稱將軍引兵還攻破海曲執縣宰諸吏叩頭為宰請母曰吾子犯小罪不當死而為宰所殺殺人當死又可請乎遂斬之以其首祭子冢復還海中後數歲琅邪人樊崇起兵於莒衆百餘人轉入太山自號三老時青徐大飢冦賊蜂起羣盜以崇勇猛皆附之一歲間至萬餘人崇同郡人逢安東海人徐宣謝祿楊音各起兵合數萬人復引從崇共還攻莒不能下轉掠至姑幕因擊王莽探湯侯田况大破之殺萬餘人遂北入青州所過虜掠還至太山留屯南城初崇等以困窮為冦無攻城徇地之計衆既寖盛乃相與為約殺人者死傷人者償創以言辭為約束無文書旌旗部曲號令其中最尊者號三老次從事次卒吏泛相稱曰臣人王莽遣平均公廉丹太師王匡擊之崇等欲戰恐其衆與莽兵亂乃皆朱其眉以相識别由是號曰赤眉赤眉遂大破丹匡軍殺萬餘人追至無鹽廉丹戰死王匡走崇又引其兵十餘萬復還圍莒數月或説崇曰莒父母之國奈何攻之乃解去時吕母病死其衆分入赤眉青犢銅馬中赤眉遂冦東海與王莽沂平大尹戰敗死者數千人乃引去掠楚沛汝南潁川還入陳留攻拔魯城轉至濮陽會更始都洛陽遣使降崇崇等聞漢室復興即留其兵自將渠帥二十餘人隨使者至洛陽降更始皆封為列侯崇等既未有國邑而留衆稍有離叛乃遂亡歸其營將兵入潁川分其衆為二部崇與逢安為一部徐宣謝祿楊音為一部崇安攻拔長社南擊宛斬縣令而宣祿等亦拔陽翟引之梁擊殺河南太守赤眉衆雖數戰勝而疲敝厭兵皆日夜愁泣思欲東歸崇等計議慮衆東向必散不如西攻長安更始二年冬崇安自武關宣等從陸渾關兩道俱入三年正月俱至𢎞農與更始諸將連戰剋勝衆遂大集乃分萬人為一營凡三十營營置三老從事各一人進至華隂軍中常有齊巫鼓舞祠城陽景王以求福助巫狂言景王大怒曰當為縣官何故為賊有笑巫者輒病軍中驚動時方望弟陽怨更始殺其兄乃逆説崇等曰更始荒亂政令不行故使將軍得至於此今將軍擁百萬之衆西向帝城而無稱號名為羣賊不可以久不如立宗室挾義誅伐以此號令誰敢不服崇等以為然而巫言益甚前及鄭乃相與議曰今迫近長安而鬼神如此當求劉氏共尊立之六月遂立盆子為帝自號建世元年初赤眉過式掠盆子及二兄恭茂皆在軍中恭少習尚書略通大義及隨崇等降更始即封為式侯以明經數言事拜侍中從更始在長安盆子與茂留軍中屬右校卒吏劉俠卿主芻牧牛號曰牛吏及崇等欲立帝求軍中景王後者得七十餘人惟盆子與茂及前西安侯劉孝最為近屬崇等議曰聞古天子將兵稱上將軍乃書札為符曰上將軍又以兩空札置笥中遂於鄭北設壇場祠城陽景王諸三老從事皆大會陛下列盆子等三人居中立以年次探札盆子最幼後探得符諸將皆稱臣拜盆子時年十五被髮徒跣敝衣赭汗見衆拜恐畏欲啼茂謂曰善藏符盆子即齧折棄之復還依俠卿俠卿為制絳單衣半頭赤幘直綦履乘軒車大馬赤屏泥絳襜絡而猶從牧兒遨崇雖起勇力而為衆所宗然不知書數徐宣故縣獄吏能通易經遂共推宣為丞相崇御史大夫逢安左大司馬謝祿右大司馬自楊音以下皆為列卿軍及高陵與更始叛將張卬等連和遂攻東都門入長安城更始來降盆子居長樂宫諸將日會論功爭言歡呼拔劒擊柱不能相一三輔郡縣營長遣使貢獻兵士輒剽奪之又數虜暴吏民百姓保壁由是皆復固守至臘日崇等乃設樂大會盆子坐正殿中黃門持兵在後公卿皆列坐殿上酒未行其中一人出刀筆書謁欲賀其餘不知書者起往請之各各屯聚更相背向大司農楊音案劒罵曰諸卿皆老傭也今日設君臣之禮反更肴亂兒戲尚不如此皆可格殺更相辨鬬而兵衆遂各踰宫斬關入掠酒肉互相殺傷衛尉諸葛稚聞之勒兵入格殺百餘人乃定盆子惶恐日夜啼泣獨與中黃門共卧起惟得上觀閣而不聞外事時掖庭中宫女猶有數百千人自更始敗後幽閉殿內掘庭中蘆蔔根捕池魚而食之死者因相埋於宫中有故祠甘泉樂人尚共擊鼓歌舞衣服鮮明見盆子叩頭言飢盆子使中黃門􅀢之米人數斗後盆子去皆餓死不出劉恭見赤眉衆亂知其必敗自恐兄弟俱禍密教盆子歸璽綬習為辭讓之言建武二年正月朔崇等大會劉恭先曰諸君共立恭弟為帝德誠深厚立且一年肴亂日甚誠不足以相成恐死而無所益願得退為庶人更求賢知惟諸君省察崇等謝曰此皆崇等罪也恭復固請或曰此寧式侯事邪恭惶恐起去盆子乃下牀解璽綬叩頭曰今設置縣官而為賊如故吏人貢獻輒見剽劫流聞四方莫不怨恨不復信向此皆立非其人所致願乞骸骨避賢聖必欲殺盆子以塞責者無所離死誠冀諸君肯哀憐之耳因涕泣噓唏崇等及會者數百人莫不哀憐之乃皆避席頓首曰臣無狀負陛下請自今已後不敢復放縱因共抱持盆子帶以璽綬盆子號呼不得已既罷出各閉營自守三輔翕然稱天子聰明百姓爭還長安市里且滿得二十餘日赤眉貪財物復出大掠城中糧食盡遂收載珍寶因大縱火燒宫室引兵而西過祠南郊車甲兵馬最為猛盛衆號百萬盆子乘王車駕三馬從數百騎乃自南山轉掠城邑與更始將軍嚴春戰於郿破春殺之遂入安定北地至陽城番須中逢大雪坑谷皆滿士多凍死乃復還發掘諸陵取其寶貨遂汙辱吕后尸凡賊所發有玉匣殮者率皆如生故赤眉得多行媱穢大司徒鄧禹時在長安遣兵擊之於郁夷反為所敗禹乃出之雲陽九月赤眉復入長安止桂宫時漢中賊延岑出散關屯杜陵逢安將十餘萬人擊之鄧禹以逢安精兵在外惟盆子與羸弱居城中乃自往攻之會謝祿救至夜戰稿街中禹兵敗走延岑及更始將軍李寶合兵數萬人與逢安戰於杜陵岑等大敗死者萬餘人寶遂降安而延岑收散卒走寶乃密使人謂岑曰子努力還戰吾當於內反之表裏合勢可大破也岑即還挑戰安等空營擊之寶從後悉拔赤眉旌幟更立己幡旗安等戰疲還營見旗幟皆白大驚亂走自投川谷死者十餘萬逢安與數千人脫歸長安時三輔大飢人相食城郭皆空白骨蔽野遺人往往聚為營保各堅守不下赤眉虜掠無所得十二月乃引而東歸衆尚二十餘萬隨道復散光武乃遣破姦將軍侯進等屯新安建威大將軍耿弇等屯宜陽分為二道以要其還路敕諸將曰賊若東走可引宜陽兵會新安賊若南走可引新安兵會宜陽明年正月鄧禹自河北度擊赤眉於湖禹復敗走赤眉遂出關南向征西大將軍馮異破之於崤底帝聞乃自將幸宜陽盛兵以邀其走路赤眉忽遇大軍驚震不知所為乃遣劉恭乞降曰盆子將百萬衆降陛下何以待之帝曰待汝以不死耳樊崇乃將盆子及丞相徐宣以下三十餘人肉袒降上所得傳國璽綬更始七尺寶劍及玉璧各一積兵甲宜陽城西與熊耳山齊帝令縣厨賜食衆積困餧十餘萬人皆得飽飫明旦大陳兵馬臨洛水令盆子君臣列而觀之謂盆子曰自知當死不對曰罪當應死猶幸上憐赦之耳帝笑曰兒大黠宗室無蚩者又謂崇等曰得無悔降乎朕今遣卿歸營勒兵鳴鼓相攻決其勝負不欲強相服也徐宣等叩頭曰臣等出長安東都門君臣計議歸命聖德百姓可與樂成難與圗始故不告衆耳今日得降猶去虎口歸慈母誠歡誠喜無所恨也帝曰卿所謂鐵中錚錚傭中佼佼者也又曰諸卿大為無道所過皆夷滅老弱溺社稷汙井竈然猶有三善攻破城邑周遍天下本故妻婦無所改易是一善也立君能用宗室是二善也餘賊立君迫急皆持其首降自以為功諸卿獨完全以付朕是三善也乃令各與妻子居洛陽賜宅人一區田二頃其夏樊崇逢安謀反誅死楊音在長安時遇趙王良有恩賜爵關內侯與徐宣俱歸鄉里卒於家劉恭為更始報殺謝祿自繫獄赦不誅帝憐盆子賞賜甚厚以為趙王郎中後病失明賜滎陽均輸官地以為列肆使食其稅終身王昌一名郎趙國邯鄲人也素為卜相工明星歷常以為河北有天子氣時趙繆王子林好奇數任俠於趙魏間多通豪猾而郎與之親善初王莽篡位長安中或自稱成帝子子輿者莽殺之郎緣是詐稱真子輿云母故成帝謳者嘗下殿卒僵須臾有黃氣從上下半日乃解遂􅗖身就館趙后欲害之偽易他人子以故得全輿年十二識命者郎中李曼卿與俱至蜀十七到丹陽二十還長安展轉中山來往燕趙以須天時林等愈動疑惑乃與趙國大豪李育張參等通謀規共立郎會人間傳赤眉將度河林等因此宣言赤眉當立劉子輿以觀衆心百姓多信之更始元年十二月林等遂率車騎數百晨入邯鄲城止於王宫立郎為天子林為丞相李育為大司馬張參為大將軍分遣將帥徇下幽冀移檄州郡曰制詔部刺史郡太守曰朕孝成皇帝子子輿者也昔遭趙氏之禍因以王莽篡殺賴知命者將護朕躬解形河濵削迹趙魏王莽竊位獲罪於天天命祐漢故使東郡太守翟義嚴鄉侯劉信擁兵征討出入胡漢普天率土知朕隱在人間南嶽諸劉為其先驅朕仰觀天文乃興于斯以今月壬辰即位趙宫休氣熏蒸應時獲雨蓋聞為國子之襲父古今不易劉聖公未知朕故且持帝號諸興義兵咸以助朕皆當裂土享祚子孫已詔聖公及翟太守亟與功臣詣行在所疑刺史二千石皆聖公所置未覩朕之沈滯或不識去就強者負力弱者惶惑今元元創痍已過半矣朕甚悼焉故遣使者班下詔書郎以百姓思漢既多言翟義不死故詐稱之以從人望於是趙國以北遼東以西皆從風而靡明年光武自薊得郎檄南走信都發兵徇旁縣遂攻柏人不下議者以為守柏人不如定巨鹿光武乃引兵東北圍巨鹿郎太守王饒據城數十日連攻不剋耿純説曰久守王饒士衆疲敝不如及大兵精鋭進攻邯鄲若王郎已誅王饒不戰自服矣光武善其計乃留將軍鄧滿守巨鹿而進軍邯鄲屯其郭北門郎數出戰不利乃使其諫議大夫杜威持節請降威雅稱郎實成帝遺體光武曰設使成帝復生天下不可得況詐子輿者乎威請求萬戶侯光武曰顧得全身可矣威曰邯鄲雖鄙并力固守尚曠日月終不君臣相率但全身而已遂辭而去因急攻之二十餘日郎少傅李立為反間開門內漢兵遂拔邯鄲郎夜亡走道死追斬之劉永者梁郡睢陽人梁孝王八世孫也傳國至父立元始中立與平帝外家衛氏交通為王莽所誅更始即位永先詣洛陽紹封為梁王都睢陽永聞更始政亂遂據國起兵以弟防為輔國大將軍防弟少公御史大夫封魯王遂招諸郡豪傑沛人周建等並署為將帥攻下濟隂山陽沛楚淮陽汝南凡得二十八城又遣使拜西防賊帥山陽佼強為橫行將軍是時東海人董憲起兵據其郡而張步亦定齊地永遣使拜憲翼漢大將軍步輔漢大將軍與共連兵遂専據東方及更始敗永自稱天子建武二年夏光武遣虎牙大將軍蓋延等伐永初陳留人蘇茂為更始討難將軍與朱鮪等守洛陽鮪既降漢茂亦歸命光武因使茂與蓋延俱攻永軍中不相能茂遂反殺淮陽太守掠得數縣據廣樂而臣於永永以茂為大司馬淮陽王蓋延遂圍睢陽數月拔之永將家屬走虞虞人反殺其母及妻子永與麾下數十人奔譙蘇茂佼強周建合軍救永為蓋延所敗茂奔還廣樂強建從永走保湖陵三年春永遣使立張步為齊王董憲為海西王於是遣大司馬吳漢等圍蘇茂於廣樂周建率衆救茂茂建戰敗棄城復還湖陵而睢陽人反城迎永吳漢與蓋延等合軍圍之城中食盡永與茂建走酇諸將追急永將慶吾斬永首降封吾為列侯蘇茂周建奔垂惠共立永子紆為梁王佼強還保西防四年秋遣捕虜將軍馬武騎都尉王霸圍紆建於垂惠蘇茂將五校兵救之紆建亦出兵與武等戰不剋而建兄子誦反閉城門拒之建茂紆等皆走建於道死茂奔下邳與董憲合紆奔佼強五年遣驃騎大將軍杜茂攻佼強於西防強與劉紆奔董憲時平狄將軍龐萌反叛遂襲破蓋延引兵與董憲連和自號東平王屯桃鄉之北龐萌山陽人初亡命在下江兵中更始以為冀州牧將兵屬尚書令謝躬共破王郎及躬敗萌乃歸降光武即位以為侍中萌為人遜順甚見信愛帝嘗稱曰可以託六尺之孤寄百里之命者龐萌是也拜為平狄將軍與蓋延共擊董憲時詔書獨下延而不及萌萌以為延譖已自疑遂反帝聞之大怒曰自將討萌與諸將書曰吾常以龐萌社稷之臣將軍得無笑其言乎老賊當族其各厲兵馬會睢陽憲聞帝自討龐萌乃與劉紆蘇茂佼強去下邳還蘭陵使茂強助萌合兵三萬急圍桃城帝時幸蒙聞之乃留輜重自將輕騎三千步卒數萬晨夜馳赴師次任城去桃鄉六十里旦日諸將請進賊亦勒兵挑戰帝不聽乃休士養鋭以挫其鋒城中聞車駕至衆心益固時吳漢在東郡馳使召之萌等乃悉兵攻城二十餘日衆疲困而不能下及吳漢與諸將到乃率衆軍進桃城而帝親自搏戰大破之萌茂強夜棄輜重逃奔董憲乃與劉紆悉其兵數萬人屯昌慮自將鋭卒拒新陽帝先遣吳漢擊破之憲走還昌慮漢進守之憲恐乃招誘五校餘賊步騎數千人屯建陽去昌慮三十里帝至蕃去憲所百餘里諸將請進帝不聽知五校乏食當退敕各堅壁以待其敝頃之五校糧盡果引去帝乃親臨四面攻憲三日復大破之衆皆奔散遣吳漢追擊之佼強將其衆降蘇茂奔張步憲及龐萌走入繒山數日吏士聞憲尚在復往往相聚得數百騎迎憲入郯城吳漢等復攻拔郯憲與龐萌走保朐劉紆不知所歸軍士高扈斬其首降梁地悉平吳漢進圍朐明年城中穀盡憲萌潛出襲取贛榆琅邪太守陳俊攻之憲萌走澤中會吳漢下朐城進盡獲其妻子憲乃流涕謝其將士曰妻子皆已得矣嗟乎久苦諸卿乃將數十騎夜去欲從間道歸降而吳漢校尉韓湛追斬憲於方與方與人黔陵亦斬萌皆傳首洛陽封韓湛為列侯黔陵關內侯張步字文公琅邪不其人也漢兵之起步亦聚衆數千轉攻傍縣下數城自為五威將軍遂據本郡更始遣魏郡王閎為琅邪太守步拒之不得進閎為檄曉喻吏人降得贛榆等六縣收兵數千人與步戰不勝時梁王劉永自以更始所立貪步兵強承制拜步輔漢大將軍忠節侯督青徐二州使征不從命者步貪其爵號遂受之乃理兵於劇以弟𢎞為衛將軍𢎞弟藍元武大將軍藍弟夀高密太守遣將徇泰山東萊城陽膠東北海濟南齊諸郡皆下之步拓地寖廣兵甲日盛王閎懼其衆散乃詣步相見欲誘以義方步大陳兵引閎怒曰步有何過君前見攻之甚乎閎按劒曰太守奉朝命而文公擁兵相拒閎攻賊耳何謂甚邪步默然良久離席跪謝乃陳樂獻酒待以上賔之禮令閎關掌郡事建武三年光武遣光祿大夫伏隆持節使齊拜步為東萊太牢劉永聞隆至劇乃馳遣立步為齊王步即殺隆而受永命是時帝方北憂漁陽南事梁楚故步得専集齊地據郡十二及劉永死步等欲立永子紆為天子自為定漢公置百官王閎諫曰梁王以奉本朝之故是以山東頗能歸之今尊立其子將疑衆心且齊人多詐宜且詳之步乃止五年步聞帝將攻之以其將費邑為濟南王屯歷下冬建威大將軍耿弇破斬費邑進拔臨淄步以弇兵少逺客可一舉而取乃悉將其衆攻弇於臨淄步兵大敗還奔劇帝自幸劇步退保平夀蘇茂將萬餘人來救之茂讓步曰以南陽兵精延岑善戰而耿弇走之大王奈何就攻其營既呼茂不能待邪步曰負負無可言者帝乃遣使告步茂能相斬降者封為列侯步遂斬茂使使奉其首降步三弟各自繫所在獄皆赦之封步為安邱侯後與家屬居洛陽王閎亦詣劇降八年夏步將妻子逃奔臨淮與弟𢎞藍欲招其故衆乘船入海琅邪太守陳俊追擊斬之王閎者王莽叔父平阿侯談之子也哀帝時為中常侍時幸臣董賢為大司馬寵愛貴盛閎屨諌忤旨哀帝臨崩以璽綬付賢曰無妄以與人時國無嗣主內外恇懼閎白元后請奪之即帶劒至宣德後闥舉手叱賢曰宫車晏駕國嗣未立公受恩深重當俯伏號泣何事久持璽綬以待禍至邪賢知閎必死不敢拒之乃跪授璽綬閎馳上太后朝廷壯之及王莽篡位潛忌閎乃出為東郡太守閎懼誅常繫藥手內莽敗漢兵起閎獨完全東郡三十餘萬戶歸降更始李憲者潁川許昌人也王莽時為廬江屬令莽末江賊王州公等起衆十餘萬攻掠郡縣莽以憲為偏將軍廬江連率擊破州公莽敗憲據郡自守更始元年自稱淮南王建武三年遂自立為天子置公卿百官擁九城衆十餘萬四年秋光武幸壽春遣揚武將軍馬成等擊憲圍舒至六年正月拔之憲亡走其軍士帛意追斬憲而降憲妻子皆伏誅封帛意漁浦侯後憲餘黨淳于臨等猶聚衆數千人屯灊山攻殺安風令揚州牧歐陽歙遣兵不能剋帝議欲討之廬江人陳衆為從事白歙請得喻降臨於是乘單車駕白馬往説而降之灊山人共生為立祠號白馬陳從事云彭寵字伯通南陽宛人也父宏哀帝時為漁陽太守偉容貌能飲飯有威於邊王莽居攝誅不附己者宏與何武鮑宣並遇害寵少為郡吏地皇中為大司空士從王邑東拒漢軍到洛陽聞同産弟在漢兵中懼誅即與鄉人吳漢亡至漁陽抵父時吏更始立使謁者韓鴻持節徇北州承制得専拜二千石已下鴻至薊以寵漢並鄉閭故人相見歡甚即拜寵偏將軍行漁陽太守事漢安樂令及光武鎮慰河北至薊以書招寵寵具牛酒將上謁會王郎詐立傳檄燕趙遣將徇漁陽上谷急發其兵北州衆多疑惑欲從之吳漢説寵從光武語在漢傳會上谷太守耿況亦使功曹寇恂詣寵結謀共歸光武寵乃發步騎三千人以吳漢行長史及都尉嚴宣護軍蓋延狐奴令王梁與上谷軍合而南及光武於廣阿光武承制封寵建忠侯賜號大將軍遂圍邯鄲寵轉糧食前後不絶及王郎死光武追銅馬北至薊寵上謁自負其功意望甚高光武接之不能滿以此懷不平光武知之以問幽州牧朱浮浮對曰前吳漢北發兵時大王遺寵以所服劒又倚以為北道主人寵謂至當迎閣握手交歡並坐今既不然所以失望浮因曰王莽為宰衡時甄豐旦夕入謀議時人語曰夜半客甄長伯及莽篡位後豐意不平卒以誅死光武大笑以為不至於此及即位吳漢王梁寵之所遣並為三公而寵獨無所加愈怏怏不得志歎曰我功當為王但爾者陛下忘我邪是時北州破散而漁陽差完有舊鹽鐵官寵轉以貿穀積珍寶益富強朱浮與寵不相能浮數譖構之建武二年春詔徴寵寵意浮賣已上疏願與浮俱徴又與吳漢蓋延等書盛言浮枉狀固求同徴帝不許益以自疑而其妻素剛不堪抑屈固勸無受召寵又與常所親信吏計議皆懷怨於浮莫有勸行者帝遣寵從弟子后蘭卿喻之寵因留子后蘭卿遂發兵反拜署將帥自將二萬餘人攻朱浮於薊分兵徇廣陽上谷右北平又自以與耿況俱有重功而恩賞並薄數遣使要誘況況不受輒斬其使秋帝使遊擊將軍鄧隆救薊隆軍潞南浮軍雍奴遣吏奏狀帝讀檄怒謂使吏曰營相去百里其藝豈可得相及比若還北軍必敗矣寵果盛兵臨河以拒隆又别發輕騎三千襲其後大破隆軍浮逺遂不能救引而去明年春寵遂拔右北平上谷數縣遣使以美女繒綵賂遺胸奴要結和親單于使左南將軍七八千騎往來為遊兵以助寵又南結張步及富平獲索諸豪傑皆與交質連衡遂攻拔薊城自立為燕王其妻數惡夢又多見怪變卜筮及望氣者皆言兵當從中起寵疑子后蘭卿質漢歸故不信之使將兵居外無親於中五年春寵齋獨在便室蒼頭子密等三人因寵卧寐共縛著牀告外吏云大王齋禁皆使吏休偽稱寵命教收縛奴婢各置一處又以寵命呼其妻妻入大驚寵急呼曰趣為諸將軍辦裝於是兩奴將妻入取寶物留一奴守寵寵謂守奴曰若小兒我素愛也今為子密所迫劫耳解我縛當以女珠妻汝家中財物皆與若小奴意欲解之視戶外見子密聽其語遂不敢解於是收金玉衣物至寵所裝之被馬六匹使妻縫兩縑囊昏夜後解寵手令作記告城門將軍云今遣子密等至子后蘭卿所速開門出勿稽留之書成即斬寵及妻頭置囊中便持記馳出城因以詣闕封為不義侯明旦閣門不開官屬踰牆而入見寵尸驚怖其尚書韓立等共立寵子午為王以子后蘭卿為將軍國師韓利斬午首詣征虜將軍祭遵降夷其宗族盧芳字君期安定三水人也居左谷中王莽時天下咸思漢德芳由是詐自稱武帝曾孫劉文伯曾祖母胸奴谷蠡渾邪王之姊為武帝皇后生三子遭江充之亂太子誅皇后坐死中子次卿亡之長陵小子回卿逃於左谷霍將軍立次卿迎回卿回卿不出因居左谷生子孫卿孫卿生文伯常以是言誑惑安定間王莽末乃與三水屬國羌胡起兵更始至長安徴芳為騎都尉使鎮撫安定以西更始敗三水豪傑共計議以芳劉氏子孫宜承宗廟乃共立芳為上將軍西平王使使與西羌胸奴結和親單于曰胸奴本與漢約為兄弟後胸奴中衰呼韓邪單于歸漢漢為發兵擁護世世稱臣今漢亦中絶劉氏來歸我亦當立之令尊事我乃使句林王將數千騎迎芳芳與兄禽弟程俱入胸奴單于遂立芳為漢帝以程為中郎將將胡騎還入安定初五原人李興隨昱朔方人田颯代郡人石鮪閔堪各起兵自稱將軍建武四年單于遣無樓且渠王入五原塞與李興等和親告興欲令芳還漢地為帝五年李興閔堪引兵至單于庭迎芳與俱入塞都九原縣掠有五原朔方雲中定襄鴈門五郡並置守令與胡通兵侵苦北邊六年芳將軍賈覽將胡騎擊殺代郡太守劉興芳後以事誅其五原太守李興兄弟而其朔方太守田颯雲中太守橋扈恐懼叛芳舉郡降光武令領職如故後大司馬吳漢驃騎大將軍杜茂數擊芳並不剋十二年芳與賈覽共攻雲中久不下其將隨昱留守九原欲脅芳降芳知羽翼外附心膂內離遂棄輜重與十餘騎亡入胸奴其衆盡歸隨昱昱乃隨使者程恂詣闕拜昱為五原太守封鐫胡侯昱弟憲武進侯十六年芳復入居高桞與閔堪兄林使使請降乃立芳為代王堪為代相林為代太傅賜繒二萬匹因使和集胸奴芳上疏謝曰臣芳過託先帝遺體棄在邊陲社稷遭王莽廢絶以是子孫之憂所宜共誅故遂西連羌戎北懷胸奴單于不忘舊德權立救助是時兵革並起往往而在臣非敢有所貪覬期於奉成宗廟興立社稷是以久僭號位十有餘年罪宜萬死陛下聖德高明躬率衆賢海內賔服惠及殊俗以肺附之故赦臣芳罪加以仁恩封為代王使備北藩無以報塞重責冀必欲和輯胸奴不敢遺餘力負恩貸謹奉天子玉璽思望闕庭詔報芳朝明年正月其冬芳入朝南入昌平有詔止令更朝明歲芳自道還憂恐乃復背叛遂反與閔堪閔林相攻連月胸奴遣數百騎迎芳及妻子出塞芳留胸奴中十餘年病死初安定屬國胡與芳為冦及芳敗胡人還鄉里積苦縣官徭役其中有駮馬少伯者素剛壯二十一年遂率種人反叛與胸奴連和屯聚青山乃遣將兵長史陳欣率三千騎擊之少伯乃降徙於冀縣隗囂字季孟天水成紀人也少仕州郡王莽國師劉歆引囂為士歆死囂歸鄉里季父崔素豪俠能得衆聞更始立而莽兵連敗於是乃與兄義及上邽人楊廣冀人周宗謀起兵應漢囂止之曰夫兵凶事也宗族何辜崔不聽遂聚衆數千人攻平襄殺莽鎮戎大尹崔廣等以為舉事宜立主以一衆心咸謂囂素有名好經書遂共推為上將軍囂辭讓不得已曰諸父衆賢不量小子必能用囂言者乃敢從命衆皆曰諾囂既立遣使聘請平陵人方望以為軍師望至説囂曰足下欲承天順民輔漢而起今立者乃在南陽王莽尚據長安雖欲以漢為名其實無所受命將何以見信於衆乎宜急立高廟稱臣奉祠所謂神道設教求助人神者也且禮有損益質文無常削地開兆茅茨土階以致其肅敬雖未備物神明其舍諸囂從其言遂立廟邑東祀高祖太宗世宗囂等皆稱臣執事史奉璧而告祝畢有司穿坎于庭牽馬操刀奉盤錯匙遂割牲而盟曰凡我同盟三十一將十有六姓允承天道興輔劉宗如懷姦慮明神殛之高祖文皇武皇俾墜厥命厥宗受兵族類滅亡有司奉血匙進護軍舉手揖諸將軍曰匙不濡血歃不入口是欺神明也厥罰如盟既而薶血加書一如古禮事畢移檄告郡國曰漢復元年七月己酉朔己巳上將軍隗囂白虎將軍隗崔左將軍隗義右將軍楊廣明威將軍王遵雲旗將軍周宗等告州牧部監郡卒正連率大尹尹尉隊大夫屬正屬令故新都侯王莽慢侮天地悖道逆理鴆殺孝平皇帝篡奪其位矯託天命偽作符書欺惑衆庶震怒上帝反戾飾文以為祥瑞戲弄神祇歌頌禍殃楚越之竹不足以書其惡天下昭然所共聞見今略舉大端以喻吏民蓋天為父地為母禍福之應各以事降莽明知之而冥昧觸冒不顧大忌詭亂天術援引史傳昔秦始皇毁壞諡法以一二數欲至萬世而莽下三萬六千歲之厯言身當盡此度循亡秦之軌推無窮之數是其逆天之大罪也分裂郡國斷截地絡田為王田賣買不得規錮山澤奪民本業造起九廟窮極工作發冢河東攻劫邱壟此其逆地之大罪也尊任殘賊信用姦佞誅戮忠正覆按口語赤車奔馳法冠晨夜寃繫無辜妄族衆庶行炮烙之刑除順時之法灌以醇醯裂以五毒政令日變官名月易貨幣歲改吏民昏亂不知所從商旅窮窘號泣市道設為六管增重賦斂刻剝百姓厚自奉養苞苴流行財入公輔上下貪賄莫相檢考民坐挾銅炭沒入鍾官徒𨽻殷積數十萬人工匠飢死長安皆臭既亂諸夏狂心益悖北攻強胡南擾徑越西侵羌戎東摘濊貊使四境之外並入為害緣邊之郡江海之瀕滌地無類故攻戰之所敗苛法之所陷飢饉之所夭疾疫之所及以萬萬計其死者則露尸不掩生者則奔亡流散幼孤婦女流離係虜此其逆人之大罪也是故上帝哀矜降罰于莽妻子顛殞還自誅刈大臣反據亡形已成大司馬董忠國師劉歆衛將軍王涉皆結謀內潰司命孔仁納言嚴尤秩宗陳茂舉衆外降今山東之兵二百餘萬已平齊楚下蜀漢定宛洛據敖倉守函谷威命四布宣風中嶽興滅繼絶封定萬國遵高祖之舊制修孝文之遺德有不從命武軍平之馳使四夷復其爵號然後還師振旅􅐤弓卧鼓申命百姓各安其所庶無負子之責囂乃勒兵十萬擊殺雍州牧陳慶將攻安定安定大尹王向莽從弟平阿侯談之子也威風獨能行其邦內屬縣皆無叛者囂乃移書於向喻以天命反覆誨示終不從於是進兵虜之以徇百姓然後行戮安定悉降而長安中亦起兵誅王莽囂遂分遣諸將徇隴西武都金城武威張掖酒泉敦煌皆下之更始二年遣使徴囂及崔義等囂將行方望以為更始未可知固止之囂不聽望以書辭謝而去曰足下將建伊吕之業𢎞不世之功而大事草創英雄未集以望異域之人疵瑕未露欲先崇郭隗想望樂毅故欽承大旨順風不讓將軍以至德尊賢廣其謀慮動有功發中權基業以定大勳方緝今俊乂並會羽翮比肩望無耆耇之德而猥託賔客之上誠自愧也雖懷介然之節欲潔去就之分誠終不背其本二其志也何則范蠡收責句踐乘扁舟於五湖咎犯謝罪文公亦逡巡於河上夫以二子之賢勒銘兩國猶削迹歸愆請命乞身望之無勞蓋其宜也望聞烏氏有龍池之山微徑南通與漢相屬其傍時有竒人聊及間暇廣求其真願將軍勉之囂等遂至長安更始以為右將軍崔義皆即舊號其冬崔義謀欲叛歸囂懼并禍即以事告之崔義誅死更始感囂忠以為御史大夫明年夏赤眉入關三輔擾亂流聞光武即位河北囂即説更始歸政於光武叔父國三老良更始不聽諸將欲劫更始東歸囂亦與通謀事發覺更始使使者召囂囂稱疾不入因會客王遵周宗等勒兵自守更始使執金吾鄧曄將兵圍囂囂閉門拒守至昏時遂潰圍與數十騎夜斬平城門關亡歸天水復招聚其衆據故地自稱西州上將軍及更始敗三輔耆老士大夫皆奔歸囂囂素謙恭愛士傾身引接為布衣交以前王莽平河大尹長安谷恭為掌野大夫平陵范逡為師友趙秉蘇衡鄭興為祭酒申屠剛杜林為持書楊廣王遵周宗及平襄人行巡阿陽人王捷長陵人王元為大將軍杜陵金丹之屬為賔客由此名震西州聞於山東建武二年大司徒鄧禹西擊赤眉屯雲陽禹裨將馮愔引兵叛禹西向天水囂逆擊破之於高平盡獲輜重於是禹承制遣使持節命囂為西州大將軍得専制涼州朔方事及赤眉去長安欲西上隴囂遣將軍楊廣迎擊破之又追敗之於烏氏涇陽間囂既有功於漢又受鄧禹爵署其腹心議者多勸通使京師三年囂乃上書詣闕光武素聞其風聲報以殊禮言稱字用敵國之儀所以慰藉之良厚時陳倉人吕鮪擁衆數萬與公孫述通冦三輔囂復遣兵佐征西大將軍馮異擊之走鮪遣使上狀帝報以手書曰慕樂德義思相結納昔文王三分猶服事殷但駑馬鉛刀不可強扶數蒙伯樂一顧之價而蒼蠅之飛不過數步即託驥尾得以絶羣隔於盜賊聲聞不數將軍操執款款扶傾救危南拒公孫之兵北禦羌胡之亂是以馮異西征得以數千百人躑躅三輔微將軍之助則咸陽已為他人禽矣今關東冦賊往往屯聚志務廣逺多所不暇未能觀兵成都與子陽角力如令子陽到漢中三輔願因將軍兵馬鼓旗相當儻肯如言蒙天之福即智士計功割地之秋也管仲曰生我者父母成我者鮑子自今以後手書相聞勿用傍人解構之言自是恩禮愈篤其後公孫述數出兵漢中遣使以大司空扶安王印綬授囂囂自以與述敵國恥為所臣乃斬其使出兵擊之連破述軍以故蜀兵不復北出時關中將帥數上書言蜀可擊之狀帝以示囂因使討蜀以效其信囂乃遣長史上書盛言三輔單弱劉文伯在邊未宜謀蜀帝知囂欲持兩端不願天下統一於是稍黜其禮正君臣之儀初囂與來歙馬援相善故帝數使歙援奉使往來勸令入朝許以重爵囂不欲東連遣使深持謙辭言無功德須四方平定退伏閭里五年復遣來歙説囂遣子入侍囂聞劉永彭寵皆已破滅乃遣長子恂隨歙詣闕以為胡騎校尉封鐫羌侯而囂將王元王捷常以為天下成敗未可知不願専心內事元遂説囂曰昔更始西都四方響應天下喁喁謂之太平一旦敗壞大王幾無所厝今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之説棄千乘之基羇旅危國以求萬全此循覆車之軌計之不可者也今天水完富士馬最強北收西河上郡東收三輔之地案秦舊迹表裏河山元請以一丸泥為大王東封函谷關此萬世一時也若計不及此且畜養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸要之魚不可脫於淵神龍失藝即還與蚯蚓同囂心然元計雖遣子入質猶負其險厄欲専方面於是遊士長者稍稍去之六年關東悉平帝積苦兵間以囂子內侍公孫述逺據邊垂乃謂諸將曰且當置此兩子於度外耳因數騰書隴蜀告示禍福囂賔客據史多文學生每所上事當世士大夫皆諷誦之故帝有所辭答尤加意焉囂復遣使周遊詣闕先到馮異營遊為仇家所殺帝遣衛尉銚期持珍寶繒帛賜囂期至鄭被盜亡失財物帝常稱囂長者務欲招之聞而歎曰吾與隗囂事欲不諧使來見殺得賜道亡會公孫述遣兵冦南郡乃詔囂當從天水伐蜀因此欲以潰其心腹囂復上言白水險阻棧閣絶敗又多設支閡帝知其終不為用叵欲討之遂西幸長安遣建威大將軍耿弇等七將軍從隴道伐蜀先使來歙奉璽書喻旨囂疑懼即勒兵使王元據隴坻伐木塞道謀欲殺歙歙得亡歸諸將與囂戰大敗各引退囂因使王元行巡侵三輔征西大將軍馮異征虜將軍祭遵等擊破之囂乃上疏謝曰吏民聞大兵卒至驚恐自救臣囂不能禁止兵有大利不敢廢臣子之節親自追還昔虞舜事父大杖則走小杖則受臣雖不敏敢忘斯義今臣之事在於本朝賜死則死加刑則刑如遂蒙恩更得洗心死骨不朽有司以囂言慢請誅其子恂帝不忍復使來歙至汧賜囂書曰昔柴將軍與韓信書云陛下寬仁諸侯雖有亡叛而後歸輒復位號不誅也以囂文吏曉義理故復賜書深言則似不遜略言則事不決今若束手復遣恂弟歸闕庭者則爵祿獲全有浩大之福矣吾年垂四十在兵中十歲厭浮語虛辭即不欲勿報囂知帝審其詐遂遣使稱臣於公孫述明年述以囂為朔寧王遣兵往來為之援藝秋囂將步騎三萬侵安定至隂槃馮異率諸將拒之囂又令别將下隴攻祭遵於汧兵並無利乃引還帝因令來歙以書招王遵遵乃與家屬東詣京師拜為太中大夫封向義侯遵字子春霸陵人也父為上郡太守遵少豪俠有才辨遂與囂舉兵而常有歸漢意曾於天水私於來歙曰吾所以戮力不避矢石者豈要爵位哉徒以人思舊主先君蒙漢厚恩思效萬分耳又數勸囂遣子入侍前後辭諫切甚囂不從故去焉八年春來歙從山道襲得略陽城囂出不意懼更有大兵乃使王元拒隴坻行巡守番須口王孟塞雞頭道牛邯軍瓦亭囂自悉其大衆圍來歙公孫述亦遣其將李育田弇助囂攻略陽連月不下帝乃率諸將西征之數道上隴使王遵持節監大司馬吳漢留屯於長安遵知囂必敗滅而與牛邯舊故知其有歸義意以書喻之曰遵與隗王歃盟為漢自經歷虎口踐履死地已十數矣于時周洛以西無所統一故為王策欲東收關中北取上郡進以奉天人之用退以懲外夷之亂數年之間冀聖漢復存當挈河隴奉舊都以歸本朝生民已來臣人之藝未有便於此時者也而王之將吏羣居穴處之徒人人抵掌欲為不善之計遵與儒卿日夜所爭害幾及身者豈一事哉前計抑絶後䇿不從所以吟嘯扼腕垂涕登車幸蒙封拜得延論議每及西州之事未嘗敢忘孺卿之言今車駕大衆已在道路吳耿驍將雲集四境而孺卿以奔離之卒拒要厄當軍衝視其形藝何如哉夫智者覩危思變賢者泥而不滓是以功名終申䇿畫復得故夷吾束縛而相齊黥布仗劒以歸漢去愚就義功名並著今孺卿當成敗之際遇嚴兵之鋒可為怖栗宜斷之心胸參之有識邯得書沈吟十餘日乃謝士衆歸命洛陽拜為太中大夫於是囂大將十三人屬縣十六衆十餘萬皆降王元入蜀求救囂將妻子奔西城從楊廣而田弇李育保上邽詔告囂曰若束手自詣父子相見保無他也高皇帝云橫來大者王小者侯若遂欲為黥布者亦自任也囂終不降於是誅其子恂使吳漢與征南大將軍岑彭圍西城耿弇與虎牙大將軍蓋延圍上邽車駕東歸月餘楊廣死囂窮困其大將王捷别在戎邱登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂自刎頸死數月王元行巡周宗將蜀救兵五千餘人乘高卒至鼓譟大呼曰百萬之衆方至漢軍大驚未及成陳元等決圍殊死戰遂得入城迎囂歸冀會吳漢等食盡退去於是安定北地天水隴西復反為囂九年春囂病且餓出城餐糗糒恚憤而死王元周宗立囂少子純為王明年來歙耿弇蓋延等攻破落門周宗行巡茍宇趙恢等將純降宗恢及諸隗分徙京師以東純與巡宇徙𢎞農唯王元留為蜀將及輔威將軍臧宫破延岑元舉衆詣宫降元字惠孟初拜上蔡令遷東平相坐墾田不實下獄死牛邯宇孺卿狄道人有勇力才氣雄於邊垂及降大司空司直杜林太中大夫馬援並薦之以為護羌校尉與來歙平隴右十八年純與賔客數十騎亡入胡至武威捕得誅之公孫述字子陽扶風茂陵人也哀帝時以父任為郎後父仁為河南都尉而述補清水長仁以述年少遣門下掾隨之官月餘掾辭歸白仁曰述非待教者也後太守以其能使兼攝五縣政事修理姦盜不發郡中謂有鬼神王莽天鳳中為導江卒正居臨卭復有能名及更始立豪傑各起其縣以應漢南陽人宗成自稱虎牙將軍入略漢中又商人王岑亦起兵於雒縣自稱定漢將軍殺王莽庸部牧以應成衆合數萬人述聞之遣使迎成等成等至成都虜掠暴橫述意惡之召縣中豪桀謂曰天下同苦新室思劉氏久矣故聞漢將軍到馳迎道路今百姓無辜而婦子係獲室屋燒燔此冦賊非義兵也吾欲保郡自守以待真主諸卿欲并力者即留不欲者便去豪桀皆叩頭曰願效死述於是使人詐稱漢使者自東方來假述輔漢將軍蜀郡太守兼益州牧印綬乃選精兵千餘人西擊成等比至成都衆數千人遂攻成大破之成將垣副殺成以其衆降二年秋更始遣柱功侯李寶益州刺史張忠將兵萬餘人徇蜀漢述恃其地險衆附有自立志乃使其弟恢於綿竹擊寶忠大破走之由是威震益部功曹李熊説述曰方今四海波蕩匹夫橫議將軍割劇千里地什湯武若奮威德以投天隙霸王之業成矣宜改名號以鎮百姓述曰吾亦慮之公言起我意於是自立為蜀王都成都蜀地肥饒兵力精強逺方士庶多往歸之卭笮君長皆來貢獻李熊復説述曰今山東飢饉人庶相食兵所屠滅城邑邱墟蜀地沃野千里土壤膏腴果實所生無穀而飽女工之業覆衣天下名材竹幹器械之饒不可勝用又有魚鹽銅銀之利浮水轉漕之便北據漢中杜褒斜之險東守巴郡拒扞關之口地方數千里戰士不下百萬見利則出兵而略地無利則堅守而力農東下漢水以窺秦地南順江流以震荆揚所謂用天因地成功之資今君王之聲聞於天下而名號未定志士狐疑宜即大位使逺人有所依歸述曰帝王有命吾何足以當之熊曰天命無常百姓與能能者當之王何疑焉述夢有人語之曰八某子系十二為期覺謂其妻曰雖貴而祚短若何妻對曰朝聞道夕死尚可况十二乎會有龍出其府殿中夜有光耀述以為符瑞因刻其掌文曰公孫帝建武元年四月遂自立為天子號成家色尚白建元曰龍興元年以李熊為大司徒以其弟光為大司馬恢為大司空改益州為司𨽻校尉蜀郡為成都尹越嶲任貴亦殺王莽大尹而據郡降述遂使將軍侯丹開白水關北守南鄭將軍任滿從閬中下江州東據扞關於是盡有益州之地自更始敗後光武方事山東未遑西伐關中豪桀吕鮪等往往擁衆以萬數莫知所屬多往歸述皆拜為將軍遂大作營壘陳車騎肄習戰射會聚兵甲數十萬人積糧漢中築宫南鄭又造十層赤樓帛蘭船多刻天下牧守印章備置公卿百官使將軍李育程烏將數萬衆出陳倉與吕鮪徇三輔三年征西將軍馮異擊鮪育於陳倉大敗之鮪育奔漢中五年延岑田戎為漢兵所敗皆亡入蜀岑字叔牙南陽人始起據漢中又擁兵關西關西所在破散走至南陽略有數縣戎汝南人初起兵夷陵轉冦郡縣衆數萬人岑戎並與秦豐合豐俱以女妻之及豐敗故二人皆降於述述以岑為大司馬封汝寧王戎翼江王六年述遣戎與將軍任滿出江關下臨沮夷陵間招其故衆因欲取荆州諸郡竟不能剋是時述廢銅錢置鐵官錢百姓貨幣不行蜀中童謠言曰黃牛白腹五銖當復好事者竊言王莽稱黃述自號白五銖錢漢貨也言天下當并還劉氏述亦好為符命鬼神瑞應之事妄引讖記以為孔子作春秋為赤制而斷十二公明漢至平帝十二代厯數盡也一姓不得再受命又引録運法曰廢昌帝立公孫括地象曰帝軒轅受命公孫氏握援神契曰西太守乙卯金謂與西方太守而乙絶卯金也五德之運黃承赤而白繼黃金據西方為白德而代王氏得其正序又自言手文有竒及得龍興之瑞數移書中國冀以惑動衆心帝患之乃與述書曰圖讖言公孫即宣帝也代漢者當塗高君豈高之身邪乃復以掌文為瑞王莽何足效乎君非吾賊臣亂子倉卒時人皆欲為君事耳何足數也君日月已逝妻子弱小當早為定計可以無憂天下神器不可力爭宜留三思署曰公孫皇帝述不答明年隗囂稱臣於述述騎都尉平陵人荆邯見東方將平兵且西向説述曰兵者帝王之大器古今所不能廢也昔秦失其守豪桀並起漢祖無前人之迹立錐之地起於行陳之中躬自奮擊兵破身困者數矣然軍敗復合創愈復戰何則前死而成功踰於却就而滅亡也隗囂遭遇運會割有雍州兵強士附威加山東遇更始政亂復失天下衆庶引領四方瓦解囂不及此時推危乘勝以爭天命而退欲為西伯之事尊師章句賔友處士偃武息戈卑辭事漢喟然自以文王復出也令漢帝釋關隴之憂専精東伐四分天下而有其三使西州豪桀咸歸心於山東發間使召擕二則五分而有其四若舉兵天水必至沮潰天水既定則九分而有其八陛下以梁州之地內奉萬乘外給三軍百姓愁困不堪上命將有王氏自潰之變臣之愚計以為宜及天下之望未絶豪傑尚可招誘急以此時發國內精兵令田戎據江陵臨江南之會倚巫山之固築壘堅守傳檄吳楚長沙以南必隨風而靡令延岑出漢中定三輔天水隴西拱手自服如此海內震搖冀有大利述以問羣臣博士吳柱曰昔武王伐殷先觀兵孟津八百諸侯不期同辭然猶還師以待天命未聞無左右之助而欲出師千里之外以廣封疆者也邯曰今東方無尺土之柄驅烏合之衆跨馬陷敵所向輒平不亟乘時與之分功而坐談武王之説是效隗囂欲為西伯也述然邯言欲悉發北軍屯士及山東客兵使延岑田戎分出兩道與漢中諸將合兵并藝蜀人及其弟光以為不宜空國千里之外決成敗於一舉固爭之述乃止延岑田戎亦數請兵立功終疑不聽述性苛細察於小事敢誅殺而不見大體好改易郡縣官名然少為郎習漢家制度出入法駕鑾旗旄騎陳置陛戟然後輦出房闥又立其兩子為王食犍為廣漢各數縣羣臣多諫以為成敗未可知戎士暴露而遽王皇子示無大志傷戰士心述不聽唯公孫氏得任事由此大臣皆怨八年帝使諸將攻隗囂述遣李育將萬餘人救囂囂敗并沒其軍蜀地聞之恐動述懼欲安衆心成都郭外有秦時舊倉述改名白帝倉自王莽以來常空述即詐使人言白帝倉出穀如山陵百姓空市里往觀之迹乃大會羣臣問曰白帝倉竟出穀乎皆對言無述曰訛言不可信道隗王破者復如此矣俄而囂將王元降述以為將軍明年使元與領軍環安拒河池又遣田戎及大司徒任滿南郡太守程泛將兵下江關破虜將軍馮駿等拔巫及夷陵夷道因據荆門十一年征南大將軍岑彭攻之滿等大敗述將王政斬滿首降于彭田戎走保江州城邑皆開門降彭遂長驅至武陽帝乃與述書陳言禍福以明丹青之信述省書歎息以示所親太常常少光祿勳張隆隆少皆勸降述曰廢興命也豈有降天子哉左右莫敢復言中郎將來歙急攻王元環安安使刺客殺歙述復令刺殺岑彭十二年述弟恢及子壻史興並為大司馬吳漢輔威將軍臧宫所破戰死自是將帥恐懼日夜離叛述誅滅其家猶不能禁帝必欲降之乃下詔諭述曰往年詔書比下開示恩信勿以來歙岑彭受害自疑今以時自詣則家族完全若迷惑不喻委肉虎口痛哉奈何將帥疲倦吏士思歸不樂久相屯守詔書手記不可數得朕不食言述終無降意九月吳漢又破斬其大司徒謝豐執金吾袁吉漢兵遂守成都述謂延岑曰事當奈何岑曰男兒當死中求活可坐窮乎財物易聚耳不宜有愛述乃悉散金帛募敢死士五千餘人以配岑於市橋偽建旗幟鳴鼓挑戰而潛遣竒兵出吳漢軍後襲擊破漢漢墮水緣馬尾得出十一月臧宫軍至咸門述視占書云虜死城下大喜謂漢等當之乃自將數萬人攻漢使延岑拒宫大戰岑三合三勝自旦及日中軍士不得食並疲漢因令壯士突之述兵大亂被刺洞胸墮馬左右輿入城述以兵屬延岑其夜死明旦岑降吳漢乃夷述妻子盡滅公孫氏并族延岑遂放兵大掠焚述宫室帝聞之怒以譴漢又讓漢副將劉尚曰城降三日吏民從服孩兒老母口以萬數一旦放兵縱火聞之可為酸鼻尚宗室子孫嘗更吏職何忍行此仰視天俯視地觀放麑啜羮二者孰仁良失斬將弔民之義也初常少張隆勸述降不從並以憂死帝下詔追贈少為太常隆為光祿勳以禮改葬之其忠節志義之士並蒙旌顯程烏李育以有才幹皆擇用之於是西土咸悅莫不歸心焉通志卷一百四
