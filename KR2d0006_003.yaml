body:
  text: 通志卷一宋右迪功郎鄭樵漁仲撰三皇紀第一太昊炎帝黃帝臣謹按三皇伏羲但稱氏神農始稱帝堯舜始稱國自上古至夏商皆稱名至周始稱諡而稱氏者三皇以來未嘗廢也年代則稱紀自開闢至獲麟凡二百七十六萬歲分為十紀厥初生民穴居野處聖人教之結巢以避蟲豸之害而食草木之實故號有巢氏亦曰大巢氏亦謂之始君言君臣之道於是乎始也有天下百餘代民知巢居未知熟食燧人氏出焉觀星辰而察五木知空有火麗木則明故鑽木取火教民以烹飪之利號燧人氏以夫燧者火之所生也時無文字未有甲歷紀年始作結繩之政而立傳教之臺始為日中之市而興交易之道亦謂之遂皇或言遂皇持斗機運轉之法以施政教此亦欽若昊天以授民時之義也三皇者天皇地皇人皇是也其説不經無所取證當取伏羲為天皇神農為人皇黃帝為地皇之説為正其説出三皇太古書然太昊以明天事故曰太昊炎帝以明民事故曰神農黃帝以明地事故曰黃帝此理甚明伏羲作連山神農作歸藏黃帝作坤乾易之始自伏羲三易之本自三皇夏人因連山而作連山商人因歸藏而作歸藏周人因坤乾而作周易八卦具而六十四卦成世言伏羲畫卦文王重之皆沿襲之言也傳曰法始乎伏羲言圖象書契於此乎始三皇五帝三王之事蓋已久矣臣之所志在於傳信其有傳疑者則降而書之以備記載云太昊伏羲氏亦曰庖犧氏亦曰皇雄氏亦曰天皇伏亦作虙犧亦作戲亦作羲或言象日月之明故曰太昊伏制犧牛故曰伏犧因取犧牲以充庖厨故號庖犧然去古已遠古人名號難以今義求也伏犧者燧人氏之子母曰華胥履大人之迹於雷澤而孕因風而生故為風姓伏羲生於成紀作都于陳故陳為太昊之墟樂日立基或云扶來繼天而王為百王先人生之始也與禽獸無異知有母而不知有父知有愛而不知有禮卧則呿呿起則盱盱飢則求食飽則棄餘茹毛飲血而衣皮革伏羲德合上下天應以鳥獸文章地應以河圖洛書仰則觀象於天俯則觀法於地中則觀萬物之宜始作書契以代結繩之政始畫八卦卦有二爻重而為六十四名曰連山象法乾坤以正君臣父子夫婦之義始作罔罟以佃以漁以贍民用制嫁娶以儷皮為禮作二十五絃之瑟服牛乘馬冶金成器本陽氣之始而為律法本五材之用而定五行因龍馬負圖而出于河之瑞故官以龍紀而為龍師乃命子襄為飛龍氏造六書一曰象形二曰指事三曰會意四曰轉注五曰諧聲六曰假借使天下義理必歸文字天下文字必由六書命子英為潛龍氏造甲歷起於甲寅日月歲時自此而生又命五官春官為青龍夏官為赤龍秋官為白龍冬官為黑龍中官為黃龍乃升傳教之臺而以甲歷示民命栗陸為水龍氏繁滋草木疏導泉源毋怠於時命混沌為降龍氏驅除民害民安則安民危則危毋怠於民命大庭氏主屋廬為民居處命陰康氏主水土為民田里於是共工為上相柏皇為下相朱襄昊英常居左右朱襄即子襄昊英即子英也栗陸居北赫胥居南昆連居西葛天居東陰康居下分九州之牧而天下化洽在位百十六年左氏曰任宿須句顓臾風姓也實司太昊與有濟之祀四國伏羲之後歷夏商至周不泯所謂盛德必百世祀者臣謹按言伏羲氏者為以木德王天下帝出乎震之義伏羲氏沒女媧氏作是為女皇春秋世譜云華胥生男子為伏羲女子為女媧故世言女媧伏羲之妹風姓人首蛇身乘伏羲制度作笙簧張雲幕枚占神明能變化萬物往古之時四極廢九州裂天不兼覆地不周載火爁炎而不滅水浩洋而不息猛獸食精民鷙鳥攫老弱女媧鍊五色石以補蒼天斷鼇足以立四極殺黑龍以濟冀川積蘆灰以止淫水天不足西北故日月移焉地不足東南故百川注焉蒼天神四極正淫水涸冀川平狡蟲死精民生女媧之後有大庭氏有柏皇氏有中央氏有栗陸氏有驪連氏有赫胥氏有尊盧氏有混沌氏有昊英氏有朱襄氏有葛天氏有陰康氏有無懷氏據女媧氏天子也自大庭之後十三氏皆臣於伏羲諸家以為天子臣每疑此在伏羲時為諸侯如夏商周在唐虞之世是也不然當伏羲之世分九牧而理天下各君一方以效其治後世之訛以為相繼為天子也或言朱襄之時多風而陽氣蓄積萬物解散果實不實士逹作五絃瑟以來陰氣以定羣生葛天之時民俗熙熙其作樂也三人摻牛尾投足以歌八闋一曰載民二曰元鳥三曰遂草木四曰奮五榖五曰謹天常六曰逹帝功七曰依地德八曰總萬物之極或言自伏羲至無懷千二百六十年自女媧至無懷凡十五君襲庖羲之號千一百五十年或云自伏羲至無懷五萬七千七百八十二年自女媧至無懷一萬七千七百八十七年臣又按太史公作五帝紀擇其雅言而書臣今紀採諸家之言而以雅馴者為經其不典之言則列於篇後以備記載非傳信也其誕而野如盤古者則亦不書炎帝神農氏起於烈山亦曰烈山氏亦曰連山氏亦曰伊耆氏亦曰大庭氏亦曰魁隗氏亦曰人皇少典之元子其母曰女登有蟜氏之女也女登有神龍之感而生神農焉長於薑水故為薑姓以火德王天下故為炎帝民不粒食未知耕稼於是因天時相地宜始作耒耜教民藝五穀故謂之神農民有疾病未知藥石乃味草木之滋察寒溫之性而知君臣佐使之義皆口嘗而身試之一日之間而遇七十毒或云神農嘗百藥之時一日百死百生其所得三百六十物以應周天之數後世承傳為書謂之神農本草又作方書以救時疾復演八卦而為六十四卦名之曰歸藏作都于陳後徙魯以火紀官春官為大火夏官為鶉火秋官為西火冬官為北火中官為中火樂曰下謀或曰扶持其俗朴重端慤不忿爭而財足無制令而民從威厲而不殺法省而不煩列㕓於國日中為市始作五絃削桐為琴糾絲為絃以通天地之德以合神人之和郊特牲曰伊耆氏始作蠟明堂位曰土鼓蕢桴葦籥伊耆氏之樂也夙沙氏為諸侯不用命箕文諫而殺之神農退而修德夙沙之民自攻其君而來歸南交趾北幽都東暘谷西三危是其封域也在位百二十年或云百四十年臣謹按炎帝之女溺死東海化為精衛每銜西山木石以填東海無雄偶海燕而生今東海畔有衛誓水以精衛溺於此川故誓不飲其水一名鳥誓一名寃禽一名志鳥俗呼帝女雀又按神農人身牛首納莽水氏之女曰聼詙生臨魁嗣神農曰帝臨魁在位八十年或云六十年帝承嗣位六十年或云六年一本承在臨魁前帝明嗣位四十九年帝直嗣位四十五年帝釐嗣位四十八年帝哀嗣位四十三年帝榆罔嗣位五十五年諸侯相侵帝不能正黃帝征之天下尊為天子炎帝遂絶自神農至榆罔五百年自臨魁至榆罔凡七帝襲神農之號三百八十年吕氏春秋曰神農有天下七世宋均曰女媧至神農七十二姓譙周曰伏羲次有三姓至女媧女媧五十姓至神農神農相氶八代共五百二十年黃帝軒轅氏亦曰地皇亦曰有熊氏亦曰帝鴻氏亦曰歸藏氏或言有土德之瑞故曰黃帝有軒冕之服故曰軒轅作都于有熊故曰有熊少典娶于有蟜氏孕二十四月而生帝于壽丘本姓公孫以長于姬水故改姓姬帝生而神靈弱而能言年逾十五聰明無不徇通神農氏世衰諸侯相侵暴帝乃習用干戈以征不享諸侯咸來賔從於是修德振兵治五氣藝五種撫萬民度四方教熊羆貔貅貙虎與炎帝戰於阪泉之野三戰然後得志蚩尤為亂獨伯天下莫與之爭衡帝乃徵師諸侯以中黃直為將與戰於涿鹿之野遂禽蚩尤戮於中冀名其地曰絶轡之野或云榆罔之時有庶人曰蚩尤逐榆罔榆罔與軒轅殺蚩尤于中冀軒轅復與榆罔五戰于阪泉為軒轅所滅諸侯咸尊之代神農氏為天子是為黃帝始制法度正名百物萬世不能易也為營陳之法設五旗五麾有不率化者從而征之凡五十二戰而天下服披山通道未嘗寧居東至于海登丸山及岱宗西至于空桐登雞頭南至于江登熊湘北逐葷粥合符釡山而邑于涿鹿之阿遷徙往來無常處以師兵為營衛受命之日有景雲之瑞故官以雲紀師以雲命春官為青雲夏官為縉雲秋官為白雲冬官為黑雲中官為黃雲置左右大監監于萬國萬國和而鬼神山川封禪與為多焉獲寶鼎神策是歲己酉朔旦冬至得天之紀迎日推策終而復始演八卦為六十四卦名之曰坤乾帝受河圗見日月星辰之象始有星官之書察五運六氣乃著岐伯之問是為內經或言內經後人所作而本於黃帝舉風后力牧泰山稽常先大鴻以治民封巨鬼臾區皆臣佐也或云黃帝得六相而天地治神明至風后明乎天道故為當時太常察乎地利故為稟者奢龍辨乎東方故為土師祝融辨乎南方故為司徒大封辨乎西方故為司馬后土辨乎北方故為理官又造書契調鍾律紀歷數命蒼頡為史官制文字大撓為帝師作甲子容成造歷𨽻首作數伶倫制十二律自大夏之西阮隃之陰取竹於嶰溪之谷其竅厚鈞者斷兩節間而吹之長三寸九分以為黃鍾之宫制十二筒聽鳳凰之鳴而别十二律其雄鳴六雌鳴亦六叶黃鍾之宫是生六律六吕候氣之應以正五聲實歷數權衡度量所由生也又命榮猿與伶倫鑄十二鍾以和五音仲春之月辰在乙卯日在奎始奏之命曰咸池亦曰大咸始制衣服作冕旒充纊元衣黃裳析翬翟之華漬草木之英變為五色文章而著於器服以表貴賤服牛乘馬作舟車以通道上棟下宇作宫室以居安重門擊柝以待暴客作杵臼以利用作弧矢以振威旁行海內方制萬里畫野分州得百里之國萬區以分星次經土設井以塞爭端立步制畝以均不足使八家為井井開四道而分八宅同井而飲存亡更守男女交姻有無相貸疾病相扶風俗可同生産可一性情可親井一為鄰鄰三為朋朋三為里里五為邑邑十為都都十為師師十為州分於井而計於州則地著而數詳民不習偽官不懷私城郭不閉見利不爭風雨時若五穀豐登人無天枉物無疵厲鷙鳥不妄搏猛獸不妄噬裔夷之人罔不來享有草生于庭佞人入則指之名曰屈軼鳳凰巢于阿閣麒麟遊于苑囿帝二十五子為二十五宗其四母之子得姓者十四人别為十二姓姬酉祁已滕針任荀僖姞儇依二人為姬二子為己帝娶西陵之女曰嫘祖亦曰女節生二子其後皆有天下一曰元囂是為青陽降居江水為帝少昊二曰昌意降居若水為諸侯昌意娶蜀山女曰昌僕亦曰女極生高陽為帝顓頊黃帝崩在橋山在位百年年百十歲或云在位百十年年三百歲子孫相承共一千五百二十年皇覽曰橋山在上郡今綏州也臣謹按晉語黃帝之子二十五宗其得姓者十四人為十二姓姬酉祁已滕針任荀僖姞儇依是也二人為姬二人為已自神農至榆罔凡七世襲炎帝之號皆神農之裔也黃帝在位百年五帝三王皆黃帝之裔也據晉語少典娶于有蟜氏生黃帝然炎帝至榆罔更八世五百年何由有同父兄弟故知國語之言不可盡信先儒本之今不遽易也臣又按方士之言曰黃帝採首山之銅鑄鼎於荆山之下鼎既成有龍垂胡髯下迎黃帝帝上騎羣臣後宫從上者七十餘人龍乃升天餘小臣不得上悉持龍髯髯拔墮黃帝之弓百姓仰望乃抱其弓與胡髯而號故後世名其地曰鼎湖弓曰烏號又曰黃帝迎日推策後率二十歲復朔旦冬至凡二十推三百八十年黃帝仙登於天又按外紀黃帝與蚩尤戰於涿鹿之野蚩尤為大霧軍士昏迷軒轅作指南車以示四方山海大荒北經曰蚩尤伐黃帝帝命應龍攻於冀州之野應龍蓄水蚩尤請風伯雨師作大風雨黃帝下天女曰􅔨止雨河圖曰蚩尤兄弟八十一人並獸身人語食沙石作兵仗刀戟大弩威振天下誅殺無度天授軒轅神符伏蚩尤蚩尤沒後亂未定軒轅畫蚩尤象以威海內管仲曰葛盧山交而出水金從之出蚩尤受之以作劍戟任昉述異記蚩尤兄弟七十二人銅頭鐵額食鐵石能作雲霧軒轅誅之於涿鹿今冀州也有蚩尤神俗云人身牛蹄四目六手冀州人掘地得髑髏如銅鐵者即蚩尤骨齒長二寸堅不可碎秦漢間説蚩尤者耳鬢如劍戟頭有角與軒轅鬬以角抵人人不能向今冀州有樂名蚩尤戲其民三三兩兩頭戴牛角而相抵漢造角抵戲蓋其遺制也皇覽曰蚩尤冢在東平壽張闞鄉高七尺居民常以十月食之有赤氣如匹絳而出鄉人呼為蚩尤旗又按崔實月令曰祖者道祭也黃帝之子好遠遊死為道路神故後人出行有祖餞之事述異記蒼頡墓在北海俗呼為藏書室有碑文周時莫識遂藏故府逮秦時李斯始識八字云上天作命皇辟迭王漢叔孫通識十二字又云南海中有軒轅丘鸞自歌鳳自舞古云天帝樂也臣又按伏羲有河圗之應矣而黃帝復受河圖伏羲命子襄作六書矣而黃帝復命蒼頡制文字伏羲已造律歷矣而黃帝復有律歷之作伏羲作易矣而神農黃帝復作易學者不能無疑於古帝王受命之符皆有其應所以伏羲黃帝各受河圖者也古者書契未一用字亦希故隨時而作務在應用所以周有史籀秦有李斯皆一時制字之人也乃若律歷之所更易象之所作亦在適時所以三代之前律歷不同而易亦異右天皇自伏羲至無懷十五世千二百六十年人皇自神農至榆罔八世五百年地皇黃帝一世百年三皇凡二十四世共千八百六十年通志卷一
