body:
  text: 通志卷一百三十三宋右迪功郎鄭樵漁仲撰列傳第四十六宋王誕兄子偃偃子藻王華父廞子孔寧王惠從父弟球王彧子絢蘊兄子王裕之王鎮之弟𢎞之阮𢎞之子曇生萬齡王韶之王悅之王準之族子素王懿兄孫文和到彥之垣護之張興世袁湛弟豹顗豹孫孔靖子靈符之靈符子深孔琳之孫顗殷景仁從弟淳弟淳子孚弟孚子臻淳沖沖淡王誕字茂世琅邪臨沂人太保𢎞從祖兄也祖恬晉中軍將軍父混太常卿誕少有才藻晉孝武帝崩從叔尚書令珣為哀策文久而未就謂誕曰猶恨少序節物一句因出本示之誕攬筆便益之接其秋冬代變後云霜繁廣除風回高殿珣嗟歎其清拔因而用之襲爵雉鄉侯會稽王世子元顯開府以誕為功曹纍遷後軍長史琅邪內史誕結事元顯嬖人張法順故為元顯所寵元顯納妾誕為之親迎隨府轉驃騎長史內史如故元顯討桓元欲悉誅桓氏誕固陳桓修等與元志趣不同遂得免修誕甥也及元得志誕將見誅修為之陳請得徙廣州盧循據廣州以誕為其平南長史甚賔禮之誕久客思歸乃説循曰被蒙殊眷士感知己實思報答下官與劉鎮軍情味不淺若得北歸必蒙任寄公私際會思報厚恩循然之時廣州刺史吳隱之亦為循所留誕又曰將軍今留吳公竊謂將軍非計也昔孫伯符豈不欲留華子魚但以一境不容二君耳於是誕及隱之並得還武帝請為太尉咨議參軍盡心歸奉日夜不懈帝甚委仗之盧循自蔡洲南走劉毅固求追討帝持疑未決誕密白曰公既平廣固復滅盧循則功蓋終古勳無與二如此大威豈可使餘人分之毅與公同起布衣一時相推耳今既已喪敗不宜復使立功武帝納其説七年遷吳國內史以母憂去職武帝伐劉毅起為輔國將軍誕固辭以墨縗從行時諸葛長民掌留府事心不自安高祖甚慮之毅既平誕求先下帝曰長民似有自疑心卿詎宜便去誕曰長民知下官蒙公垂眄今輕身單下必當以為無虞可少安其意帝笑曰卿勇過賁育矣於是先還九年卒後追封作唐縣五等侯子詡早卒誕兄嘏字偉世侍中左户尚書始興公嘏子偃字子遊母晉孝武帝女鄱陽公主宋受禪封永成君偃尚武帝第二女吳興長公主諱榮男常倮偃縛諸庭樹時天夜雪噤凍久之偃兄恢排閣詬主乃免偃謙虛恭謹不以世事關懷位右光祿大夫贈開府儀同三司諡恭公長子藻位東陽太守尚文帝第六女臨川長公主諱英媛公主性妬而藻别愛左右人吳崇祖景和中主讒之於廢帝藻下獄死主與王氏離昏宋世諸主莫不嚴妬明帝每疾之湖熟令袁焰妻以妬賜死使近臣虞通之撰妬婦記左光祿大夫江湛孫斆當尚孝武帝女上乃使人為斆作表讓婚首敘晉氏以來配尚王姬者雖纍經美胄亟有才名至如王敦懾氣桓溫斂威真長佯愚以求免子敬炙足以違禍王偃無仲都之質而倮雪於北階何瑀闕龍工之姿而投軀於深井謝莊殆自害於矇叟殷仲幾不免於強鉏爰及王藻戲笑遂為寃魂褚曖憂憤橫致夭絶其言驕妬之狀曲盡形容上因以其表遍示諸主用諷切之并為戲笑元徽中臨川主表求還身王族守養弱嗣許之藻弟懋字昌業位光祿大夫封南鄉侯懋子瑩梁史有傳王華字子陵輔國將軍誕從祖弟也祖薈衛將軍會稽內史父廞司徒右長史晉安帝隆安初王恭起兵討王國寶時廞丁母憂在家恭檄令起兵廞即聚衆應之以女為貞烈將軍以女人為官屬及國寶死恭檄廞罷兵廞起兵之際多所誅戮至是不復得已因舉兵以討恭為名恭遣劉牢之擊廞廞敗走不知所在長子泰為恭所殺華時年十三在軍中與廞相失隨沙門釋曇冰逃使提衣襆從後津邏咸疑焉華行遲曇冰罵曰奴子怠懈行不及我以杖捶華數十衆乃不疑由此得免遇赦還吳少有志行以父存沒不測布衣蔬食不交遊如此者十餘年為時人所稱美武帝欲收其才用乃發廞喪問使華制服服闋武帝北伐長安領鎮西將軍北徐州刺史辟華為州主簿後為别駕歷職著稱文帝鎮江陵以為西中郎主簿咨議參軍文帝未親政事悉委司馬張邵華性尚物不欲人在已前邵性豪侈每行來常引夾轂華出入乘牽車從者不過兩三人以矯之嘗相逢華陽若不知是邵謂左右曰此鹵簿甚盛必是殿下乃下牽車立於道側及邵至乃驚邵白服登城為華所糾邵坐被徵華代為司馬文帝將入奉大統以少帝見害不敢下華曰先帝有大功於天下四海所服雖嗣主不綱人望未改徐羡之中才寒士傅亮布衣諸生非有晉宣帝王大將軍之心明矣獨畏廬陵嚴斷將來必不自容殿下寬睿慈仁天下所知且越次奉迎冀以見德悠悠之論殆必不然羡之亮謝晦又要檀道濟王𢎞五人同功勢均體敵莫肯相讓脫有異論勢必不行今日就徵萬無所慮文帝從之曰卿復為吾之宋昌矣乃留華總後任上即位以華為侍中領右衛將軍先是會稽孔寧子為文帝鎮西咨議參軍以文義見賞至是為黃門侍郎領步兵校尉寧子先為何無忌安成國侍郎還東修宅令門可容高蓋鄰里笑之寧子曰大丈夫何常之有寧子與華並有富貴之願自羡之等執權日夜構之於帝寧子嘗東歸至金昌亭左右欲泊船寧子命去之曰此弒君亭不可泊也華每間居諷詠嘗誦王粲登樓賦曰冀王道之一平假高衢而騁力出入逢羡之等每切齒憤吒歎曰當見太平時否元嘉二年寧子卒三年誅羡之等華遷護軍將軍侍中如故宋世唯華與南陽劉湛不為飾讓得官即拜以此為常華以情事異人未嘗預宴集終身不飲酒有宴不之詣若有論事者乘車造門主人出車就之及王𢎞輔政而𢎞弟曇首為文帝所任與華相埓華嘗謂己力用不盡每歎曰宰相頓有數人天下何由得治四年卒時年四十三九年以誅羡之功追封新建縣侯諡曰宣孝武即位配饗文帝廟庭子定侯嗣卒子長嗣坐罵母奪爵以長弟佟紹封齊受禪國除王惠字令明誕從祖弟也祖劭車騎將軍父默左光祿大夫惠幼而夷簡為叔父司徒謐所知恬靜不交遊未嘗有雜事陳郡謝瞻才辨有風氣嘗與兄弟羣從造惠談論鋒起文史間發惠時相酬應言清理遠瞻等慙而退武帝聞其名以問其從兄誕誕曰惠後來秀令鄙宗之美也即以為太尉行參軍纍遷世子中軍長史時會稽內史劉懷敬之郡送者傾京師惠亦造别還過從弟球球問向何所見惠曰唯覺即時逢人耳素不與謝靈運相識嘗得交言靈運博辨辭義鋒起惠時然後言時荀伯子在坐退而告人曰靈運固自蕭散直上王郎有如萬頃波焉嘗臨曲水風雨暴至坐者皆馳散惠獨徐起姿制不異常時任其沾濡宋國初建當置郎中令武帝難其人謂傅亮曰今用郎中令不可減袁曜卿既而曰吾得其人矣曜卿不得獨擅其竒乃以惠居之少帝即位以蔡廓為吏部尚書不肯拜乃以惠代焉惠被召即拜未嘗接客人有與書求官者輒聚置閣上及去職印封如初談者以廓之不拜惠即拜雖事異而意同也兄鑒頗好聚斂廣營田業惠意甚不同謂鑒曰何用田為鑒怒曰無田何由得食惠曰亦復何用得食其標寄如此元嘉初卒贈太常無子惠從父弟球字蒨玉司徒謐之子也少與惠齊名武帝受命為太子中舍人宜都王友轉咨議參軍文帝即位王𢎞兄弟貴動朝廷球終日端坐未嘗相往來𢎞亦雅敬之歷位侍中中書令吏部尚書時中書舍人徐爰有寵於上上嘗命球及殷景仁與之相知球辭曰士庶區别國之章也臣不敢奉詔上改容謝焉球簡貴不喜交遊筵席虛靜門無異客曇首常云蒨玉亦是玉巵無當耳既而尚書僕射殷景仁領軍將軍劉湛並執重權傾動內外球雖通家姻戚未嘗往來居選職接客甚希不視求官書疏而銓衡有序遷光祿大夫領廬陵王師時大將軍彭城王義康專以政事為本刀筆簡練者多被意遇謂劉湛曰王敬𢎞王球之屬竟何所堪施為自富貴復那可解球兄子履深結劉湛委誠義康與劉斌等球每訓厲不納自大將軍從事中郎轉太子中庶子流涕訴義康不願違離故復為從事中郎文帝甚銜之及誅湛之夕履徒跣告球球命為取履先溫酒與之謂曰常日謂汝云何履怖不得答球徐曰阿父在汝何憂左右扶郎還齋上亦以球故免死廢於家殷景仁卒球除尚書僕射王師如故素有腳疾多病還家朝直至少録尚書江夏王義恭謂尚書何尚之曰當今乏才羣下宜加戮力而王球放恣如此宜以法糾之尚之曰球有素尚加又多疾公應以淡退求之未可以文案責也義恭又面啓文帝曰王球誠有素譽頗以物外自許端任要切或非所長帝曰誠知如此要是時望所歸昔周伯仁終日飲酒而居此任蓋所以崇素德也遂見優容後以白衣領職十八年卒時年四十九贈特進金紫光祿大夫無子以從孫奐為後奐齊史有傳王彧字景文球從子也祖穆字伯遠司徒謐之長兄位臨海太守父僧朗仕宋位尚書右僕射明帝初以后父加特進贈開府儀同三司諡元公彧名與明帝諱同故以字行伯父智少簡貴有高名武帝甚重之常言見王智使人思仲祖武帝與劉穆之謀討劉毅而智在焉他日穆之白武帝曰伐國重事公言何乃使王智知武帝笑曰此人高簡豈聞此輩論議其見知如此為宋國五兵尚書封建陵縣五等子追贈太常智無子故父僧朗以景文繼智幼為從叔球所知憐美風姿為一時所推讓袁粲見之歎曰景文非但風流可悅乃哺啜亦復可觀有一客少時及見謝混答曰景文方謝叔源則為野父矣粲惆悵良久曰恨眼中不見此人景文好言理少與陳郡謝莊齊名文帝嘗與羣臣臨天泉池帝埀綸良久不獲景文越席曰臣以為垂綸者清故不獲貪餌衆皆稱善文帝甚相欽重故為明帝娶其妹而以景文之名名之武帝第五女新安公主先適太原王景深離絶當以適景文景文固辭以疾故不成婚襲爵建陵子起家太子太傅主簿轉太子舍人纍遷宣城太守元凶弒立以為黃門侍郎未及就孝武入討景文遣間使歸欵以父在都下不獲致身事平頗見嫌責猶以舊恩纍遷司徒左長史上以散騎常侍舊與侍中俱掌獻替欲高其選以景文及會稽孔覬俱南北之望以補之尋復為司徒左長史以姊墓開不臨赴免官後拜侍中領射聲校尉左衛將軍加給事中太子中庶子坐與奉朝請毛法因蒱戲得錢百二十萬白衣領職永光初為吏部尚書景和元年遷尚書右僕射後出為安南將軍江州刺史明帝剪除暴主又平四方欲引朝望以佐大業乃下詔徵景文為領左衛將軍尋加丹陽尹遭父憂起為尚書左僕射丹陽尹固辭僕射出為江州刺史加都督服闋乃受詔封江安縣侯固讓不許後徵為尚書左僕射領吏部揚州刺史加太子詹事不願還朝求為湘州不許時又謂景文在江州不能潔已景文與上幸臣王道隆書深自申理景文屢辭內授上手詔譬之曰尚書左僕射卿已經此任東宮詹事用人雖美職次政可比中書令耳庶好作揚州徐干木王休元殷鐵並處之不辭卿清才令望何愧休元毗贊中興豈謝干木綢繆相與何後殷鐵邪司徒以宰相不應帶神州遠遵先旨京口鄉基義重密邇畿內又不得不同驃騎陜西任要由來用宗室驃騎既云巴陵理應居之中流雖曰間地控帶二江通接荆郢經塗之要由來有重鎮如此則揚州自成闕刺史卿若有辭便不知誰應處之此選大備與公卿疇懷非聊爾也固辭詹事領選徙為中書令常侍僕射揚州如故又進中書監領太子太傅常侍僕射揚州如故景文固辭太傅上遣新除尚書右僕射褚淵宣旨以古來比例六事難之不得已乃受拜時太子及諸皇子小上稍為身後之計諸將帥吳喜壽寂之之徒慮其不能奉幼主並殺之而景文外戚貴盛張永纍經軍旅又疑其將來難信乃自為謠言曰一士不可親弓長射殺人一士王字指景文弓長張字指張永景文彌懼乃自陳求解揚州上答詔頗以貴滿誡之大抵欲其離權也時上既有疾而諸弟並己見殺惟桂陽王休範人才本劣不見疑出為江州刺史慮一旦晏駕皇后臨朝則景文自然成宰相門族強盛藉元舅之重歲暮不為純臣泰豫元年春上疾篤遣使送藥賜景文死使謂曰朕不謂卿有罪然吾不能獨死請子先之因手詔云與卿周旋欲全卿門户故有此處分敇至之夜景文正與客棊扣函看復封還置局下神色怡然不變方與客棊思行爭劫竟斂子內奩畢徐謂客曰奉勑見賜以死方以勑示客酒至未飲門客焦度在側憤怒發酒覆地曰大丈夫安能坐受死州中文武可數百人足以一奮景文曰知卿至心若見念者為我百口計乃墨啓答勑并謝賜詔酌謂客曰此酒不可相勸自仰而飲之時年六十追贈開府儀同三司諡曰懿長子絢絢字長素早惠年五六歲讀論語至周監於二代外祖何尚之戲之曰可改耶耶乎文哉絢應聲答曰尊者之名安可戲寧可道草翁之風必舅尚之子名偃故絢云云及長篤志好學位祕書丞先景文卒諡曰恭絢弟繢齊史有傳彧兄子藴字彥深父揩太中大夫揩人才凡劣故藴不為羣從所禮常懷耻慨家貧為廣德令明帝即位四方叛逆欲以將領自奮每撫刀曰龍泉太阿汝知我者叔父景文常誡之曰阿答汝滅我門户藴曰答與童烏貴賤異童烏絢小字答藴小字也及事寧封吉陽縣男歷晉陵義興太守所蒞並貪縱後為給事黃門侍郎桂陽之逼京師王道隆為亂兵所殺藴力戰御溝側被重創或扶以免事平撫軍長史褚澄為吳郡太守司徒左長史蕭開明言於朝曰褚澄開城以納賊更為股肱大郡王藴被甲死戰棄而不收賞罰如此何憂不亂褚淵慙乃議用藴為湘州刺史及齊高帝輔政藴與沈攸之連謀事敗斬於秣陵市王裕之字敬𢎞琅邪臨沂人也與武帝同諱故以字行曾祖􅘙晉驃騎將軍祖胡之司州刺史父茂之字興元晉陵太守敬𢎞少有清尚起家本國常侍衛軍參軍性恬靜樂山水求為天門太守其妻桓元姊也敬𢎞之郡元時為荆州遣信要令過已敬𢎞至巴陵謂人曰靈寶正當欲與其姊集聚耳我不能為桓氏贅壻乃遣别船送妻往江陵妻在江陵彌年不迎山郡無事恣其遊適意甚好之轉安西長史後為南平太守去官居作唐縣界桓元輔政及篡位屢召不下武帝以為車騎將軍從事中郎徐州中從事史征西將軍道規咨議參軍時府主簿宋協亦有高趣道規並以事外相期嘗共酣飲敬𢎞因醉失禮為外司所白道規即便引還重申初宴永初中纍遷吏部尚書敬𢎞每被召即便祗奉既到宜退旋復解官武帝嘉其志不茍違也除廬陵王師加散騎常侍敬𢎞自陳無德不可師範令王固讓不拜元嘉三年為尚書僕射關署文案初不省讀嘗豫聽訟上問以疑獄敬𢎞不對上變色問左右何故不以訊牒副僕射敬𢎞曰臣乃得訊牒讀之政自不解上甚不悅雖以禮敬亦不以時務及之六年遷尚書令敬𢎞固讓表求還東上不能奪改授侍中特進左光祿大夫給親信三十人及東歸車駕幸冶亭餞送十二年徵為太子少傅敬𢎞詣京師上表固辭不拜東歸上時不豫自力見焉十六年以為左光祿大夫開府儀同三司侍中如故又詣都表辭竟不拜東歸二十三年重申前命復辭明年薨於餘杭之舍亭山年八十八歲順帝升明二年追諡文貞公敬𢎞形狀短小而坐起端方桓元謂之彈碁發八勢所居舍亭山林澗環周備登臨之美時人謂之王東山文帝嘗問為政得失敬𢎞對曰天下有道庶人不議上高其言左右嘗使二老婦女戴五絛五辮著青紋袴􅘼飾以朱粉女適尚書僕射何尚之弟述之敬𢎞嘗往何氏看女值尚之不在因寄齋中卧俄頃尚之還敬𢎞使二婦女子守閣不聽尚之入云政熱不堪相見君可且去尚之於是移於他室上將為廬陵王納其女辭曰臣女幼既許孔淳之息矣上亦不強也子恢之被召為祕書郎敬𢎞求為奉朝請與恢之書曰祕書有限故有競朝請無限故無競吾欲使汝處於不競之地文帝嘉而並許之敬𢎞見兒孫歲中不過一再相見見輒尅日未嘗教子孫以學問各隨所欲人或問之答曰丹朱不應乏教寧越不聞被捶恢之位新安太守嘗請假還東定省敬𢎞尅日見之至日輒不果假日將盡恢之乞求奉辭敬𢎞呼前至閣復不見恢之於閣外拜辭流涕而去恢之弟瓚之官至吏部尚書金紫光祿大夫諡曰貞子瓚之弟升之位都官尚書升之子延之瓚之子秀之列在齊史王鎮之字伯重晉司州刺史胡之之從孫而裕之從祖弟也祖耆之位中書郎父隨之上虞令鎮之為剡上虞令並有能名桓元輔政以為大將軍録事參軍時三吳飢荒遣鎮之銜命賑恤而會稽內史王愈不奉符旨鎮之依事糾奏愈子綏元之外甥當時貴盛鎮之為所排抑以母老求補安成太守以母憂去職在官清潔妻子無以自反乃棄官致喪還上虞舊墓葬畢為子摽之求安復令隨子之官服闋為征西道規司馬南平太守後為御史中丞執正不撓百僚憚之出為建威將軍平越中郎將廣州刺史加都督武帝謂人曰鎮之少著清績必將繼美吳隱嶺南弊俗非此不康也在鎮不受俸祿蕭然無營去官之日不異初至武帝初建相國府為咨議參軍領録事善於吏職嚴而不殘遷宋臺祠部尚書武帝踐阼卒於宣訓衛尉弟𢎞之少孤貧育於外祖徵士何凖從叔獻之及太原王恭並貴重之晉安帝隆安中為司徒主簿性好山水求為烏傷令尋以病歸桓元輔政桓謙以為衛軍參軍時殷仲文還姑熟祖送傾朝謙要𢎞之同行答曰凡祖離送别必在有情下官與殷風馬不接無緣扈從謙貴其言母隨兄鎮之之安成郡𢎞之解職同行義熙中何無忌及武帝辟召一無所就從兄敬𢎞為吏部尚書表薦𢎞之為太子庶子不就文帝即位敬𢎞為尚書左僕射又陳𢎞之高行表於初筮苦節彰於暮年當今內外晏然修太平之化宜招空谷以敦沖退之美又徵為通直散騎常侍不就敬𢎞嘗解貂裘與之即著以採藥家在會稽上虞性好釣上虞江有一處名三石頭𢎞之每埀釣於此經過者不識之或問漁師得魚賣不𢎞之曰亦自不得得亦不賣日夕載魚入上虞郭經親故門各以一兩頭置門內而去始寧沃川有佳山水𢎞之又依巖築室謝靈運顔延之並相欽重靈運與廬陵王義真箋曰會稽既豐山水是以江左嘉遁並多居之但季世慕榮幽栖者寡若王𢎞之拂衣歸耕踰歷三紀孔淳之隱約窮岫自始迄今阮萬齡辭事就間纂成先業既遠同羲唐亦激貪厲競浙河之外栖遲山澤如斯而已殿下愛素好古夢想巖穴若遺一介有以相存真可謂千載盛美也𢎞之元嘉四年卒後顔延之欲為作誄終不就𢎞之子曇生好文義以謙和見稱歷吏部尚書太常卿孝武末為吳興太守明帝初吳興與四方同逆戰敗歸降被宥終於中散大夫阮萬齡陳留尉氏人祖思曠左光祿大夫父寧黃門侍郎萬齡少知名為孟昶建威長史時袁豹江夷相繼為昶司馬時人謂昶府有三素望萬齡家在會稽剡縣頗有素情位左户尚書太常出為湘州刺史無政績後為散騎常侍金紫光祿大夫卒曇生弟普曜位祕書監普曜子晏自有傳王韶之字休泰胡之從孫而敬𢎞從祖弟也祖羡之鎮軍掾父偉之少有志尚當世詔命表奏輒手自書寫太元隆安時事小大悉撰録位本國郎中令韶之家貧好學嘗三日絶糧而執卷不輟家人誚之曰困窮如此何為不耕答曰我常自耕耳父偉之為烏程令韶之因居縣境好史籍博學多聞初為衛將軍謝琰行參軍得父舊書韶之因私撰晉安帝陽秋既成時人謂宜居史職即除著作佐郎使續後事訖義熙九年善敘事辭論可觀為後代佳史遷尚書祠部郎晉帝自孝武以來常居內殿武官主書於中通呈以省官一人管司詔誥住在西省因謂之西省郎傅亮羊徽相代領西省事義熙十一年武帝以韶之博學有文辭補通直郎領西省事轉中書侍郎安帝之崩也武帝使韶之與帝左右密加鴆毒恭帝即位遷黃門侍郎領著作西省如故凡諸詔奏皆其辭也武帝受禪加驍騎將軍本郡中正黃門如故西省職解復掌宋書坐璽制謬誤免黃門事在謝晦傳韶之為晉史序王珣貨殖王廞作亂珣子𢎞廞子華並貴顯韶之懼為所陷深結徐羡之傅亮等景平元年遷侍中出為吳郡太守羡之被誅王𢎞入為相領揚州刺史𢎞雖與韶之不絶諸弟未相識者皆不復往來韶之在郡常慮為𢎞所繩夙夜勉勵政績甚美𢎞亦抑甚私憾文帝兩嘉之韶之在任積年稱為良守徵為祠部尚書加給事中坐去郡長取送故免官十二年又為吳興太守卒撰孝經傳三卷文集行於世宋七廟歌辭韶之所制也子曄位臨賀太守王悅之字少明晉右軍將軍羲之曾孫也祖獻之中書令父靖之司徒左長史為劉穆之所厚就穆之求侍中如此非一穆之曰卿若不求久自得之遂不果悅之少厲清操亮直有風檢為吏部郎鄰省有會同者遺悅之餅一甌辭不受曰此費誠小然少來不願當之明帝泰始中為黃門郎御史中丞上以其廉介賜良田五頃以為侍中在門下盡其心力掌檢校御府太官太醫諸署時承奢汰之後姦竊者衆悅之案覆無所避得姦甚多於是衆署共咒詛悅之悅之病甚恆見兩烏衣人捶之及卒上乃收典掌者十許人桎梏之送淮隂密令度瓜步江投之中流王準之字元魯晉尚書僕射彬元孫也曾祖彪之位尚書令祖臨之父納之並御史中丞彪之博聞多識練悉朝儀自是家世相傳並諳江左舊事緘之青箱世人謂王氏青箱學準之兼明禮傳贍於文辭起家為本國右常侍桓元篡位以為尚書祠部郎武帝起兵為太尉主簿出為山隂令有能名豫討盧循功封都亭侯宋臺建除御史中丞為百僚所憚自彪之至準之四世居此職準之嘗作五言詩范泰嘲之云卿唯解彈事耳準之正色答曰猶差卿世載雄狐坐世子右衛率謝靈運殺人不舉免官武帝受命拜黃門侍郎永初中奏曰鄭元注禮三年之喪二十七月而吉古今學者多謂得禮之宜晉初用王肅議祥禫共月故二十五月而除遂以為制江左以來凖晉朝施用搢紳之士多遵元義夫先王制禮以大順羣心喪也寧戚著在前經今大宋開泰品物遂理愚謂宜同即物情以元義為制朝野一禮則家無殊俗從之元嘉中歷位侍中郎官尚書改領吏部性峭急頗失縉紳之望出為丹陽尹準之究識舊儀問無不知時大將軍彭城王義康録尚書事每歎曰何須高論元虛正得如王準之兩三人便足了天下矣然寡乏風素不為時流所重所撰儀注朝廷咸見遵用年二十九卒贈太常子輿之位征虜主簿輿之子進之列在梁史準之族子素字休業高祖翹之晉光祿大夫曾祖望之祖泰之並不仕父元𢎞位平固令素少有志行家貧母老初為廬陵王國侍郎母憂去職往東陽隱居不仕頗管田園之資得以自立愛好文義不以人俗纍懷孝武帝下詔徵素與處士朱百年並為太子舍人不就素既屢被徵辟聲譽甚高山中有蚿蟲聲甚清長聽之使人不厭而其形甚醜素乃為蚿賦以自况泰始七年卒年五十四王懿字仲德太原祁人自言漢司徒允弟幽州刺史懋七世孫也祖宏仕石虎父苖仕苻堅皆至二千石仲德少沉審有意略事母甚謹學通隂陽精解聲律苻氏之敗仲德年十七與兄睿字元德同起義兵與慕容垂戰敗仲德被重創走與家屬相失路徑大澤不能前困憊卧於林中忽有一小兒青衣年可七八歲騎牛行見仲德驚問曰漢已食未仲德言飢小兒去須臾復來得飯與之仲德食畢欲行會暴雨江溢莫知津徑遇有一白狼至前仰天而號號訖銜仲德衣因渡水仲德隨之得濟與元德相及渡河至滑臺復為翟遼所留使為將帥積年仲德欲南歸乃棄遼奔泰山遼遣騎追之急夜行忽見前有猛炬導之乘火行百許里得免晉太元末徙居彭城兄弟名犯晉宣元二帝諱故以字行北土重同姓並謂之骨肉有遠來相投者莫不竭力營贍若有一人不至者以為不義不為鄉邑所容仲德聞王愈在江南貴盛是太原人乃遠來歸之愈接遇甚薄因至姑熟投桓元值元篡位見輔國將軍張暢言及世事仲德曰自古革命誠非一族然今之起者恐不足以濟大事元德果徑有計略仕元為殿中將軍武帝甚知之告以義舉使元德於京邑襲元仲德聞其謀謂元德曰天下大事不可不密且兵家務拙速不貴巧遲元無遠慮好冒夜出入今取之正須一夫力耳事泄元德為元所誅仲德竄走會義軍尅京邑仲德抱元德子方回出候武帝帝於馬上抱方回與仲德相對號慟追贈元德給事中封安復縣侯以仲德為鎮軍中兵參軍武帝伐廣固仲德率諸軍為前鋒小大二十餘戰每戰輒克盧循冦逼敗劉毅於桑落帝北伐始還衆議並欲遷都仲德正色曰今天子當陽而治明公命世作輔新建大功威震六合妖冦豕突乘我遠征既聞凱入將自奔散且四海之內所以奉明公者道存故爾今自投草莾則同之匹夫匹夫號令何以威物義士英豪當求其主耳此謀若行請從此辭武帝甚悅除輔國將軍使戍白石及循退仲德率劉鍾追討大破之功冠諸將封新淦縣侯義熙十二年北伐進仲德征虜將軍加冀州刺史督前鋒諸軍事冠軍將軍檀道濟龍驤將軍王鎮惡向洛陽寧朔將軍劉遵考建武將軍沈林子出石門寧朔將軍朱超石胡藩向半城咸受統於仲德仲德率龍驤將軍朱牧寧遠將軍竺靈秀嚴綱等開巨野入河乃總衆軍進據潼關武帝遂平長安以仲德為太尉咨議參軍武帝欲遷都洛陽衆咸以為宜仲德曰反宅中華誠是億兆顒顒之望然天下艱難羣虜孔熾暴師經載士有歸心王化始通新邦未附以衆情言之恐未易可立今當以建業為王基江左為始本遷都之計以俟文軌大同帝深納之使衛送姚泓先還彭城武帝受命纍遷徐州刺史加都督元嘉三年進號安北將軍與到彥之北伐大破魏軍魏棄河南司兗而去三州既定三軍咸喜而仲德獨有憂色曰胡虜雖仁義不足而凶狡有餘今雖斂戈北歸若河冰合豈不能為三軍患諸賢不諳北土情偽必墮其計諸軍進屯靈昌十月虜於委粟津渡河進逼金墉而洛陽虎牢並不守彥之聞二城並沒欲焚舟步走仲德曰洛陽既敗虎牢無以自立理必然也虜去我猶自千里滑臺尚有強兵若便捨舟士卒必散且當入濟至馬耳谷口更詳所宜乃回軍沿濟南歷城步上焚舟棄甲還至彭城仲德坐免官尋與檀道濟共救滑臺糧盡乃歸自是復失河南九年又為鎮北將軍徐州刺史仲德三臨徐州威惠宣著於彭城立佛寺作白狼童子像於塔中以存河北所遇也十三年進號鎮北大將軍十五年卒年九十諡曰桓侯亦於廟中立白狼童子壇每祭必祠之子正循嗣為家童所殺仲德兄孫文和景和中為征北義陽王昶府佐昶於彭城奔魏部曲皆散文和獨送至界上昶謂曰諸人皆去卿有老母何獨不去文和乃去升明中為巴陵內史沈攸之事起文和斬其使馳白齊武帝及齊永明年中歷青冀兖益四州刺史到彥之字道豫彭城武原人楚大夫屈到之後也少以寒苦自立武帝討孫恩以鄉里樂從每有戰功義旗將起彥之家在廣陵臨川武烈王道規兢桓𢎞彥之時近行不在聞事捷馳歸而道規已南渡江彥之倉卒晚方獲濟至京口武帝已向京邑孟昶居守留之及事定武帝謂同義曰到彥之應來而不至必有故也及彥之至帝責之亦不自陳昶又不申理故不加官爵白衣隨道規追桓元於崢嶸洲力戰有功義熙元年補鎮軍行參軍六年盧循逼京都彥之與檀道濟掩循輜重與循黨荀林戰敗免官後以軍功封佷山縣子為太尉中兵參軍遷道規輔國參軍建平太守武帝討司馬休之休之苻郡發兵彥之斬休之使率軍出峽口進次宜都宜都太守師寂説彥之曰司馬平西宗室之重寬仁得衆魯雍州父子一世驍雄今據六州之地率用命之士國富兵精難以為敵劉公遠軍師疲衆老轉禍為福子其圖之彥之慨然曰我受恩過分託身劉氏如其王旅不振受屈勍敵當以死報國家况倚天子之威馮泰山之固劉公果決獨斷用兵如神奮百勝之威責不臣之罪回山壓卵何憂不濟彥之進見武帝帝大悅更配百艦以為先登事平驃騎將軍道憐鎮江陵以彥之為驃騎咨議參軍尋遷司馬南郡太守武帝受命以佐命功進爵佷山縣侯彥之佐守荆楚垂二十載威信為士民所懷又從文帝西鎮除使持節南蠻校尉及徐羡之等廢少帝與傅亮等率百僚奉迎文帝帝以少帝及廬陵王並見殺疑不敢下彥之與司馬王華以為羡之等必無異志從之又欲使彥之領兵前驅彥之曰彼既不二便應朝服順流若使有虞此師既不足恃更開嫌隙之端非所以允答羣情副遠邇之望也會雍州刺史褚叔度卒乃遣彥之權鎮襄陽羡之等欲即以彥之為雍州上不許徵為中領軍委以戎政彥之自襄陽下謝晦已至鎮慮彥之不過已彥之至楊口乃步往江陵深布誠欵晦亦厚自結納彥之船出楊口留馬數十匹及利劒名刀悉以與晦晦意由此大安元嘉三年討晦進彥之鎮軍將軍彥之於彭城洲戰不利咸欲退還夏口彥之不回會檀道濟至晦乃敗走江陵平因監荆州州府事改封建昌縣公其秋遷南豫州刺史監六州諸軍事鎮歷陽上於彥之恩寵隆密將加開府欲先令立功七年遣彥之督王仲德竺靈秀尹沖假宏趙伯符竺靈真庾俊之朱修之等八軍北伐自淮入泗泗水峻日裁行十里自四月至七月始至東平須昌縣魏濟州刺史庫悉吉戍碻磝焚城走兗州刺史叱羅俊燒滑臺率衆奔河北遣將軍王元謨向虎牢魏大將赤歇據城戰大破之斬赤歇等六人首魏洛州刺史亦棄洛陽奔彥之留朱修之守滑臺尹沖守虎牢杜驥守金墉十月魏軍向金墉次至虎牢杜驥奔走尹沖衆潰而死十一月朔魏軍向滑臺時河冰將合糧食又罄彥之先有目疾至是大動將士疾疫乃回軍入濟焚舟步上依險南出得至彭城初遣彥之資實甚盛及還凡百蕩盡府藏為空彥之上章節謝罪文帝遣檀道濟北救滑臺收彥之下獄免官兗州刺史竺靈秀棄軍伏誅明年夏起彥之為護軍九年復封爵邑固辭明年卒乃復先户邑諡曰忠公孝建三年詔彥之與王華王曇首配食文帝廟庭長子元度位益州刺史少子仲度嗣位驃騎從事中郎兄弟並有才用皆早卒仲度子撝列在陳史垣護之字彥宗略陽垣道人也族姓豪強石虎時自略陽徙鄴祖敞仕苻氏為長樂國郎中令伯父遵父苖仕慕容超並見委任遵為尚書苖為京兆太守武帝圍廣固遵苖踰城歸降並以為太尉行參軍元嘉中遵為員外散騎常侍苖屯騎校尉仍家下邳護之少倜儻不拘小節形狀短陋而氣幹強果元嘉初為殿中將軍隨到彥之北侵魏彥之將回師護之以書諫彥之不納散敗而歸文帝聞而喜之纍遷鍾離太守隨王元謨入河元謨攻滑臺護之以百舸為前鋒進據石濟及魏救將至馳書勸元謨急攻之不見從元謨敗退不暇報護之而魏軍悉牽元謨水軍大艚連以鐵鎖三重斷河以絶護之還路河水迅急護之中流而下每至鐵鎖以長柯斧斷之魏人不能禁唯失一舸餘舸並全留戍麋溝城還為江夏王義恭驃騎户曹參軍戍淮隂領濟北太守三十年文帝崩還屯歷下孝武入討率所領馳赴帝以為冀州刺史及南郡王義宣反兗州刺史徐遺寶護之妻弟也與護之書勸使同逆護之馳使以聞率軍隨沈慶之等擊魯爽義宣率大衆至梁山與王元謨相持柳元景率護之及護之弟詢之柳叔仁鄭琨等出鎮新亭元謨求上遺元景等進據西州護之水軍先發大破賊將龐法起元景乃以精兵配護之追討會朱修之已平江陵至尋陽而還遷徐州刺史封益陽縣侯後拜青冀二州刺史鎮歷城大明二年徵為右衛將軍還於道聞竟陵王誕據廣陵反護之即率部曲受車騎大將軍沈慶之節度事平轉臨淮太守徙豫州刺史護之所蒞多聚斂貨賄七年坐下獄免官明年起為太中大夫未拜以憤卒諡壯侯護之弟子崇祖齊史有傳張興世字文德竟陵人也本名世明帝益為興世少家貧白衣隨王元謨伐蠻每戰輒禽獲諸將不及元謨甚奇之孝武鎮尋陽以補南中郎參軍督護從入討元凶𨽻柳元景為前鋒及南郡王義宣反又隨元謨出梁山有戰功明帝即位四方反叛進興世號龍驤將軍領水軍拒南賊時臺軍據赭圻朝廷遣吏部尚書褚淵就赭圻行選是役也皆先戰授位檄版不供由是有黃紙札南賊屯鵲尾相持久不決興世建議曰賊據上流兵張地勝我今相持有餘而制敵不足若以奇兵潛出其上因險自固隨宜斷截使其首尾周惶進退疑沮中流一梗糧運自艱乃制勝之奇也沈攸之吳喜並贊其計分戰士七千配之興世乃令輕舸泝流而上旋復回還一二日中輒復如此使賊不為之備賊師劉故聞興世欲上笑之曰我尚不敢越彼下取揚州張興世何人欲輕據我上興世謂攸之等曰上流唯有錢溪可據今往據之其夜四更值便風乃舉帆直前徑據錢溪劉胡來攻將士欲迎擊之興世曰賊來尚遠而氣驟盛夫驟既力盡盛亦易衰此曹翽所以破齊也將士不得妄動賊來轉近興世乃命壽寂之任農夫率壯士擊走之袁顗愠曰賊據人肝藏裏云何得活是月朔赭圻軍士伐木為柵於青山遇一童子曰賊下旬當平無為自苦忽不見至是果敗興世又遏其糧道賊衆漸飢劉胡棄軍走袁顗仍亦奔散興世遂與吳喜共平江陵遷右軍將軍封作唐縣侯泰豫元年為雍州刺史左衛將軍以疾徙光祿大夫尋卒興世居臨沔水沔水自襄陽以下至于九江二千里中先無洲嶼興世初生當其門前水中一旦忽生洲年年漸大及至興世為方伯洲大十餘頃父仲子由興世致位給事中興世欲將往襄陽仲子愛戀鄉里不肯去嘗謂興世曰我雖田舍老公樂聞彭角汝可送一部行田時欲吹之興世素恭謹畏法譬之曰此是天子鼓角非田舍公所吹興世欲拜墓仲子謂曰汝衛從太多先人必當驚怖興世減撤而後行子欣泰齊史有傳袁湛字士深陳郡陽夏人也祖耽晉歷陽太守父質琅邪內史並知名湛少與弟豹並為從外祖謝安所知安以其兄子元女妻湛武帝起兵以為鎮軍咨議參軍以從征功封晉寧縣五等男義熙十二年為尚書左僕射武帝北伐湛兼太尉與兼司空尚書范泰奉九命禮物拜授武帝帝沖讓湛等隨軍至洛陽住柏谷塢泰議受使未畢不拜晉帝諸陵湛獨至五陵展禮時人美之初陳郡謝重王胡之外孫也於諸舅敬禮多闕重子絢湛之甥也嘗於公坐謾湛湛正色謂曰汝便是兩世無渭陽情絢有愧色十四年卒贈左光祿大夫文帝即位以后父贈侍中左光祿大夫開府儀同三司諡曰敬公大明三年孝武幸藉田經湛墓遣使致祭增守墓五户子淳淳子植並早卒湛弟豹字士蔚好學博聞窮覽典籍初為著作佐郎纍遷劉毅咨議參軍領記室豹善談雅俗每商較古今兼以誦詠聽者忘疲為御史中丞時鄱陽縣侯孟懷玉上母檀氏拜國太夫人有司奏許之豹以為婦人從夫之爵懷玉父大司農綽見居列卿妻不宜從子奏免尚書右僕射劉柳左丞徐羡之郎何劭之等官詔並贖論後坐事降為丹陽尹太尉長史從朱齡石伐蜀武帝使豹為檄文甚工義熙九年卒後以參伐蜀之謀追封南昌縣五等子子洵吳郡太守洵弟淑太子左衛率不從元凶之亂為其所殺在忠義傳洵子顗字國章初為豫州主簿纍遷晉陵太守襲南昌縣五等子大明末拜侍中領前軍將軍時新安王子鸞以母嬖有盛寵太子在東宮多過上微有廢太子立子鸞之意從容言之顗盛稱太子好學有日新之美帝怒振衣而入顗亦厲色而出左丞徐爰言於帝請宥之帝意解後帝又以沈慶之才用不多言論頗相嗤毁顗又陳慶之忠勤有幹略堪當重任由是前廢帝深感顗慶之亦懷其德景和元年誅羣公欲引進顗任以朝政遷為吏部尚書封新淦縣子俄而意趣乖異寵待頓衰始令顗與沈慶之徐爰參知選事尋復反以為罪使有司糾奏坐白衣領職從幸湖熟往反數日不被命顗慮禍求出乃除建安王休仁安西長史休仁不行即以顗為寧蠻校尉雍州刺史加都督顗舅蔡興宗謂曰襄陽星惡豈可冒邪顗曰白刃交前不救流矢令者之行本願生出虎口且天道遼遠何必皆驗如其有徵當修德以禳之於是狼狽上路恆慮見追行至尋陽曰今知免矣與鄧琬欵狎過常每清間必盡日窮夜顗與琬人地本殊衆知其有異志矣及至襄陽使劉胡繕修兵械會明帝定大事進顗號右將軍遣荆州典籖邵宰乘驛還江陵道由襄陽顗反意已定而糧仗未足且欲奉表於明帝顗子祕書丞戩曰一奉表疏便為彼臣以臣伐君於義不可顗從之顗詐云被太皇太后令使其起兵便建牙馳驛奉勸晉安王子勛即大位與琬書使勿解甲子勛即位進號顗安北將軍加尚書左僕射顗本無將略在軍中未嘗戎服語不及戰陳唯賦詩談議而已不能撫接諸將劉胡每論事酬對甚簡由此大失人情胡常切齒恚恨胡以南軍未至軍士匱乏就顗換襄陽之資顗答曰都下兩宅未成方應經理不可損徹又信往來之言言都下米貴斗至數百以為不勞攻伐行自離散於是擁甲以待之明帝使顗舊門生徐碩奉手詔譬顗曰卿未經為臣今追蹤竇融猶未晚也及劉胡叛走不告顗顗至夜方知大怒罵曰今年為小子所誤呼取飛燕謂其衆曰我當自出追之因又遁走至鵲頭與戍主薛伯珍及其所領數千步青林欲向尋陽夜止山間宿殺馬勞士顗顧伯珍曰我舉八州以謀王室未一戰而敗豈非天邪非不能死蓋欲草間求活望一至尋陽謝罪主上然後自刎耳因慷慨叱左右索節無復應者及旦伯珍請求間言乃斬顗首詣錢溪馬軍主襄陽俞湛之降湛之因斬伯珍併送首以為己功明帝忿顗違叛流尸於江弟子彖收瘞於石頭後岡後廢帝即位方得改葬顗子戩昻戩為黃門侍郎戌湓城尋陽敗伏誅昻知名梁世有傳顗從父弟粲順帝初遷中書監司徒侍中時齊高帝將革命粲於石頭舉兵匡復不克死之列在忠義傳孔靖字季恭會稽山隂人也名與武帝祖諱同故以字稱祖瑜晉車騎將軍父誾散騎常侍季恭始察孝廉纍遷司徒左西掾未拜遭母憂隆安五年被起為山隂令不就武帝東征孫恩屢至會稽過季恭宅季恭正晝卧有神人衣服非常謂曰起天子在門既而失之遽出適見帝延入結交執手曰卿後當大貴願以身為託於是曲意禮接贍給甚厚帝後討孫恩時桓元篡形已著帝欲於山隂建義季恭以山險路遠且元未居極位不如待其篡後於京口圖之帝以為然時虞嘯父為會稽內史季恭求為府司馬不得乃出詣都及帝定桓元以季恭為會稽內史使齎封版拜授正與季恭遇季恭便回舟夜還至即叩扉入郡嘯父本為桓元所授聞元敗開門請罪季恭慰勉使且安所住明日乃移季恭到任釐整浮華剪罰遊惰由是竟內肅清纍遷吳興太守加冠軍先是吳興頻喪太守言項羽神為卞山王居郡聽事二千石常避之季恭居聽事竟無害也遷尚書左僕射固讓義熙八年復為會稽內史修飾學校督課誦習十年復為右僕射又讓不拜除領軍加散騎常侍十二年致仕拜金紫光祿大夫是歲武帝北伐季恭求從以為太尉軍咨祭酒從平關洛宋臺初建以為尚書令又讓乃拜侍中特進左光祿大夫辭事東歸帝餞之戲馬臺百僚咸賦詩以述其美及受命加開府儀同三司季恭讓纍年不受薨以為贈子靈符位丹陽尹會稽太守尋加豫章王子尚撫軍長史靈符家本豐富産業甚廣又於永興立墅周回三十三里水陸地二百六十五頃含帶二山又有果園九處為有司所糾詔原之而靈符對答不實坐免尋又復官靈符慤實有堪幹不存華飾每所蒞官政績修理廢帝景和中犯忤近臣為所讒構遣使鞭殺之二子湛之深之於都賜死明帝即位追贈靈符金紫光祿大夫深之大明中為尚書比部郎時安陸應城縣人張江陵與妻吳共罵母黃令死黃忿恨自經死已值赦案律子賊殺傷歐父母梟首罵詈棄市謀殺夫之父母亦棄市會赦免刑補治江陵罵母母以自裁重於傷歐若同殺科則疑重用傷歐及詈科則疑輕制唯有打母遇赦猶梟首無詈母致死會赦之科深之議曰夫題里逆心而仁者不入名且惡之况乃人事故毆傷呪詛法所不原詈之致盡則理無可宥罰有從輕蓋疑失善求之文旨非此之謂江陵雖遇赦恩故合梟首婦本以義愛非天屬黃之所恨情不在吳原死補治有允正法詔如深之議靈符弟靈運位著作郎靈運子琇之齊史有傳孔琳之字彥琳會稽山隂人也曾祖羣晉御史中丞祖沈丞相掾父廞光祿大夫琳之強正有志力少好文義解音律能彈棊妙善草𨽻桓元輔政為太尉以為西閣祭酒元時議欲廢錢用榖帛琳之議曰洪範八政以貨次食豈不以交易之所資為用之至要者乎故聖王制無用之貨以通有用之財既無毁敗之費又省難運之苦此錢所以嗣功龜貝歷代不廢者也穀帛為寶本充衣食今分以為貨則致損甚多又勞毁於商販之手耗棄於割截之用此之為弊著於昔曩故鍾繇曰巧偽之人競濕穀以要利制薄絹以充資魏世制以嚴刑弗能禁也是以司馬芝以為用錢非徒豐國亦所以省刑今既用而廢之則百姓頓亡其財是有錢無糧之人皆坐而飢困此斷之之弊也魏明帝時錢廢穀用四十年矣以不便於人乃舉朝大議精才達故之士莫不以宜復用錢彼尚舍穀帛而用錢足以明穀帛之弊著於已試也元又議復肉刑琳之以為三代風純而事簡故罕蹈刑辟季末俗巧而務殷故動陷憲網若三千行於叔世必有踊貴之尤此五帝不相循法肉刑不可悉復者也漢文發仁惻之意傷自新之路莫由革古創制號稱刑厝然名輕而實重反更傷人故孝景嗣位輕之以緩緩而人慢又不禁邪期于刑罰之中所以見美於昔歷代詳論而未獲厥中者也兵荒已後罹法更多棄市之而本斬右趾漢文一謬承而弗革所以前賢恨恨議之而未辨鍾繇陳羣之意雖小有不同欲以右趾代棄市若從其言則所活者衆矣降死之生誠為輕法可以全其性命蕃其産育仁既濟物功亦益衆又今之所患逋逃為先屢叛不革宜令竄身靡所亦以肅戒未犯永絶惡原至於餘條宜且依舊元好人附悅而琳之不能順旨是以不見知纍遷尚書左丞揚州中從事史所居著績時責衆官獻便宜議者以為宜修庠序恤典刑審官方明黜陟舉逸拔才務農簡調琳之於衆議之外别建言曰夫璽印者所以辨章官爵立契符信官莫大於皇帝爵莫尊於公侯而傳國之璽歷代遞用襲封之印奕世相傳貴在仍舊無取改作今世唯尉一職獨用一印至於內外羣官每遷悉改討尋其義私所未喻若謂官各異姓與傳習不同則未若異代之為殊也若論其名器雖有公卿之貴未若帝王之重若以或有誅夷之臣忌其凶穢則漢用秦璽延祚四百未聞以子嬰身戮國亡而棄不佩帝王公侯之尊不疑於傳璽人臣衆僚之卑何嫌於即印載籍未聞其説推别自乖其凖而終年刻鑄喪功消實金銀銅炭之費不可稱言非所以因循舊貫易簡之道愚謂衆官即用一印無煩改作若新置官又官多印少文或零失然後乃鑄則仰禆天府非唯小益又曰凶門柏歷不出禮典起自末代積習生常遂成舊俗爰自天子達于庶人誠行之有由卒改必駭然茍無關於情而有愆禮度存之未有所明去之未有所失固當式遵先典釐革後謬况復兼以遊費實為人患者乎凡人士喪儀多出閭里每有此須動十數萬損人財力而義無所取至於寒庶則人思自竭雖復室如縣磬莫不傾産單財所謂葬之以禮其若是乎愚謂宜一切罷凶門之式遷尚書吏部郎義熙十二年除武帝平北征西長史遷侍中宋臺初建除宋國侍史永初二年為御史中丞明憲直法無所屈撓奏劾尚書令徐羡之虧違憲典時羡之領揚州刺史琳之弟璩之為中從事羡之使璩之解釋琳之使停寢其事琳之不許曰我觸忤宰相正當罪止一身汝必不應從坐何須勤勤邪自是羣僚震肅莫敢犯禁武帝甚嘉之行經蘭臺親加臨幸遷祠部尚書不事産業家尤貧素景平元年卒追贈太常卿子邈有父風官至揚州中從事邈子顗字思遠少骨鯁有風力以是非為己任口吃好讀書早知名初舉揚州秀才衡陽王義季以為安西記室顗奉牒固辭義季不能奪纍遷黃門侍郎初晉安帝時散騎常侍遷望甚重與侍中不異其後職任間散用人漸輕孝建三年孝武欲重其選於是吏部尚書顔竣舉顗及司徒左長史王景文並堪散騎常侍帝不欲威權在下其後分吏部尚書置二人以輕其任侍中蔡興宗謂人曰選曹要重常侍間淡改之以名而不以實雖主意欲為輕重人心豈可變邪既而常侍之選復卑選部之貴不異大明元年徙太子中庶子領翊軍校尉歷祕書監廷尉卿為御史中丞坐鞭令史為有司所糾原不問六年除顗安陸王子綏冠軍長史江夏內史復隨府轉後軍長史內史如故為人仗酒使氣每醉輒彌日不醒僚類間多所陵忽尤不能曲意權幸莫不畏而疾之不治産業居常貧罄無有豐約未嘗關懷為府長史典籖咨事不呼前不敢前不令去不敢去雖醉日居多而明曉政事醒時判決未嘗有壅衆咸云孔公一月二十九日醉勝他人二十九日醒也孝武每欲引見先遣人覘其醉否性真素不尚矯飾遇得寶玩服用不疑而他物粗敗終不改易時吳郡顧顗之亦尚儉素衣裘器服皆擇其陋者宋世言清約稱此二人顗弟道存從弟徽之頗營産業二弟請假東還顗出渚迎之輜重十餘船皆是綿絹紙席之屬覬見之偽喜謂曰我比乏得此甚要因令上置岸側既而正色謂道存等曰汝輩忝預士流何至還東作賈客邪命燒盡乃去先是庾徽之為御史中丞性豪麗服玩甚華覬代之衣冠器用莫不粗率蘭臺令史並三吳富人並有輕之之意顗蓬首緩帶風貌清嚴皆重迹屏氣莫敢欺犯庾徽之字景猷潁川鄢陵人也後卒於南東海太守顗後為司徒左長史道存代顗為後軍長史江夏內史時東土大旱都邑米貴一斗將百錢道存慮顗甚乏遣吏載五百斛米餉之顗呼吏謂之曰我在彼三載去官之日不辦有路糧郎至彼未幾那能便得此米邪可載米還彼吏曰自古以來無有載米上水者都下米貴乞於此貨之不聽吏乃載米而去永光元年遷侍中後為尋陽王右軍長史行會稽郡事明帝即位召為太子詹事遣顗佐平西司馬庾業為右軍司馬代顗行會稽郡事時上流反叛上遣都水使者孔璪入東慰勞璪至説顗以廢帝侈費都下罄匱今南北並起遠近離叛若擁五郡之鋭招動三吳事無不尅顗然其言遂發兵馳檄顗長子公璪二子淹元並在都馳信密報泰始二年正月並逃叛東歸遣書要吳郡太守顧琛琛以母年篤老又密邇建鄴與長子寶素謀議未判少子寶先時為山隂令馳書報琛以為南師已近朝廷孤弱不時順從必有覆滅之禍時顗前鋒已渡浙江琛遂據郡同反吳興太守王曇生義興太守劉延熙晉陵太守袁標一時響應庾業既東明帝即以代延熙為義興以延熙為巴陵王休若鎮東長史業至長塘湖即與延熙合明帝遣建威將軍沈懷明東討尚書張永繼進巴陵王休若董統東討諸軍顗所遣孫曇瓘等軍頓晉陵九里部陳甚盛懷明至奔牛所領寡弱張永至曲阿未知懷明安否退還延陵就休若諸將咸勸退破岡休若宣令敢有言退者斬衆少定乃築壘息甲建武將軍吳喜及督護任農夫等繼至先是龍驤將軍阮佃夫募得蜀人數百多壯勇便捷皆著犀皮鎧執短兵遂配農夫及戰每先登東人並畏憚又怪其形飾殊異舊傳狐獠食人東人見之輒奔農夫進義興與吳喜擊諸柵大破之義興平劉延熙投水死時齊高帝率張永劉亮等諸軍至晉陵九里西結營與東軍相持上遣積射將軍江方興南臺御史王道隆至晉陵視賊形勢賊帥孫曇瓘程扞宗陳景達凡有五城互相連帶扞宗城猶未固道隆率所領急攻之俄頃城陷斬扞宗首劉亮果徑以刀楯直入重柵衆軍隨之即皆摧破高帝與永等乘勝馳擊又大破之曇瓘因此敗走孔璪與曇生焚倉庫奔錢唐會稽聞西軍稍近將士多奔亡顗不能復制上虞令王晏起兵攻郡顗以東西交逼憂遽不知所為其夕率千人聲云東討實趨石瀃遇潮涸不得去衆叛都盡門生載以小船竄于山嵴村村人縛以送晏晏調曰此事孔璪之為無豫卿事可作首辭當相為申理顗曰江東處分莫不由身委罪求活便是君輩行意耳晏乃斬之東閣外臨死求酒曰此是平生所好偽中郎張綏封倉庫以待王師晏至郡殺綏執尋陽王子房縱兵大掠府庫空盡孔璪投門生陸林夫林夫斬首以送顧琛王曇生袁標等並詣吳喜歸罪喜皆宥之東軍主凡七十六人於陳斬十七人餘皆原宥顗之起兵也夢行宣陽門道上顧望皆邱陵顗寤私告人曰邱陵者弗平建康其殆難尅顗弟道存位黃門侍郎南海太守晉安王子勛建偽號以為侍中行雍州事事敗見殺殷景仁陳郡長平人也曾祖融晉太常祖茂之特進左光祿大夫父道裕早亡景仁少有大成之量司徒王謐見而以女妻之為武帝太尉行參軍歷位中書侍郎景仁學不為文而敏有思致口不談議而深達理至於國典朝議舊章記注莫不撰録識者知其有當世之志也嘗建議請百官舉才以所薦能否黜陟武帝甚知之遷太子庶子少帝即位入補侍中纍表辭讓詔曰景仁退挹之懷有不可奪可改除黃門侍郎以申君子之請後歷左衛將軍文帝即位委遇彌厚俄遷侍中左衛如故時與王華王曇首劉湛四人並時為侍中俱居門下皆以風力局幹冠冕一時同升之美近代莫及元嘉三年車駕征謝晦司徒王𢎞入居中書下省景仁長直共掌留任晦平代到彥之為中領軍侍中如故文帝所生章太后早亡上奉太后所生蘇氏甚謹六年蘇氏卒車駕親往臨哭詔遵二漢推恩之典景仁議以為漢氏推恩加爵于時承秦之弊儒術蔑如懼非盛明所宜軌蹈晉監二代朝政之所因君舉必書哲王之所愼體至公者懸爵賞於無私奉天統者每屈情以申制所以作孚萬國貽則後昆上從之丁母憂葬竟起為領軍將軍固辭上使綱紀代拜遣中書舍人周起輿載還府服闋遷尚書僕射太子詹事劉湛代為領軍湛與景仁素善初皆被遇於武帝俱以宰相許之湛嘗居外任會王𢎞王華王曇首相繼亡景仁引湛還朝共參朝政湛既入以景仁位遇本不踰已而一旦居前意甚憤憤知文帝信仗景仁不可移奪乃深結司徒彭城王義康欲倚宰相之重以傾之十二年景仁遷中書令護軍將軍僕射如故尋復加領吏部湛愈怒義康納湛言毁景仁於帝帝遇之益隆景仁密陳相王權重非社稷計上以為然景仁對親舊歎曰引之令入入便噬人乃稱疾解職表疏纍上不見許使停家養病湛議欲遣人若劫盜者於外殺之以為文帝雖知當不能傷至親之愛上微聞之徙景仁於西掖門外晉鄱陽王第以為護軍府密邇宮禁故其計不行景仁卧疾者五年雖不見上而密函去來日中以十數朝政大小必以問焉影迹周密莫有窺其際者及將收湛之日景仁便拂拭衣冠寢疾既久左右皆不悟其意其夜上出華林園延賢堂召景仁景仁猶稱腳疾小牀輿以就坐誅討處分一皆委之代義康為揚州刺史僕射吏部如故遣使者授印綬主簿代拜拜畢便覺疾甚情理乖錯性本寬厚而忽更苛暴問左右曰今年男婚多女嫁多是冬大雪景仁乘輿出聽事觀望忽驚曰當閣何得有大樹既而曰我誤耳疾篤文帝謂不利在州使還住僕射下省為州凡月餘日卒或云見劉湛為祟追贈侍中司空諡曰文成公大明五年孝武行經景仁墓詔遣致祭子道矜幼而不慧位太中大夫道矜子恆明帝時位侍中度支尚書屬父疾積久為有司所奏詔曰道矜生便有病更無橫疾恆因愚習惰久妨清序可除散騎常侍景仁從祖弟淳字粹遠祖允晉太常父穆以和謹致稱自五兵尚書為武帝相國左長史元嘉中位特進右光祿大夫始興王師卒諡曰元淳少好學有美名歷中書黃門侍郎黃門清切直下應留下省以父老特聽還家高簡寡欲早有清尚愛好文義未嘗違捨在祕書閣撰四部書大目凡四十卷行於世元嘉十一年卒朝廷痛惜之子孚有父風嘗與侍中何朂共食孚羮盡朂云益殷蓴羮朂司空無忌子也孚徐輟筯曰何無忌諱孚位吏部郎為順帝撫軍長史子臻字後同幼有名行袁粲禇淵並賞異之每造二公之席輒清言畢景王儉為丹陽尹引為郡丞袁昻先拜祕書丞求臻為到省表臻答曰何不見倩拜而見倩作表遂不為作歷位太子洗馬淳弟沖字希遠位御史中丞有司直之稱再遷度支尚書元凶妃即淳女而沖在東宫為劭所知遇劭弒立以為司𨽻校尉沖有學義文辭劭使尚書符罪狀孝武亦為劭盡力建鄴平賜死沖弟淡字夷遠亦歷黃門吏部郎太子中庶子大明中又以文章見知通志卷一百三十三
