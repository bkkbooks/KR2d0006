body:
  text: 通志卷四十八宋右廸功郎鄭樵漁仲撰器服略第二車輅之制臣謹按考工記曰一器而工聚焉者車為多上蓋如規象天二十八撩音老象列宿方輿象地三十幅象日月前則聽鸞和之響傍則賭四時之運等威有辨貴賤有序者車之制也故書曰明試以功車服以庸洎乎魏晉政敎陵遲僭踰莫禁世有變改異制殊狀今略舉沿革云天子車輅五輅古史考云黄帝作車至少昊始駕牛及陶唐氏制彤車乘白馬則馬駕之初也有虞氏因彤車而制鸞車夏后氏因鸞車而制鈎車鈎之言不揉自曲也奚仲為車正建游旐尊卑上下各有等級商因鈎車而制大輅禮緯曰山車乘鈎乃鈎車之象昔成湯用而郊把有山車之瑞山車謂之桑金車似金根之色亦謂之大輅周因商輅以制木輅約木以加飾為五輅一曰玉輅以祀二曰金輅以賔同姓以封三曰象輅以朝異姓以封四曰革輅以節戎以封四衛五曰木輅以田以封藩國其制度之祥在禮經秦平天下閱三代之禮或曰商瑞山車金根之色乃因金根車用金飾而為帝軫黒旗皂斿以從水德復法水數駕馬以六漢武帝天漢四年始定輿服之制郊祀所乘謂之大駕車千乘騎萬疋其儀甚盛不必師古及赤眉之亂文物無遺後漢光武平公孫述始獲葆車輿輦因舊制金根車擬周之玉輅最尊者也輪皆朱班重牙貳轂兩轄轂外復有一轂抱轄其外乃復設轄抱銅置其中金薄繆龍為輿倚較徐廣曰繆交錯之形也較在箱上説文曰􅏹文畫蕃箱也通俗文曰車箱為較文虎伏軾龍首銜軛左右吉陽筩鸞雀立衡􅏹文畫轅羽蓋華蚤建大旂十有二斿畫日月升龍駕六馬象鑣鏤錫金鍐方釳插翟尾朱兼樊纓赤罽易茸金就十二左纛以氂牛尾為之在左騑馬軛上大如斗是為徳車大駕則御鳳凰車以金根車為副其駕黒馬六因秦不改或云始自漢制許慎五經異義説天子駕六馬以經言時乘六龍以御天故所御皆六餘皆駕四後從為副車魏武王受漢獻帝命乘金根車駕六馬設五時副車至明帝景初中山茌縣黄龍見以為魏得地統服色尚黄戎事乘黒首白馬齊王正始中詔出入必御輦乘輿晉武帝承魏陳留王命乘金根車駕六馬備五時副車及受禪設玉金象革木五輅並為法駕旗斿服用悉取周制文物華藻因金根車更増其飾朱班漆輪加畫􅏹文兩箱之後加玳瑁為鵾翅加以金銀雕飾時人亦謂為金鵾車斜注旂旗於車之左又加棨㦸於車之右皆橐而施之棨㦸韜以黼繡上繋大蛙蟆幡長丈餘於㦸之杪轅皆曲向上取夏商山車垂鈎之義玊輅駕六馬以黒金象革木駕四馬以黄金為义髦插以翟尾象鑣而鏤錫金鑁而方釳許乞反鞶纓赤罽易茸金就十有二五輅皆有鍚鸞之飾和鈴之響鈎膺玉瓖龍輈華轙朱幩音紛法駕行則五輅各有所主復制金根車去漢之文物駕四馬不建旗幟上如畫輪車下猶金根之飾東晉元帝始建戎輅大輅各一以商人祀用大輅周人即戎用戎輅故也因金根車飾皆駕黒駟是為元牡安帝義熈中平關洛得姚興偽車輦或時乘用焉宋孝武大明中尚書左丞荀萬秋改造五輅依晉金根車加赤漆􅏹畫玉飾諸末建青旗十有二斿駕駟以黒復因漢之安車章施羽葆蓋以祀金根為金輅建青旂駕黒馬四羽葆蓋以賔象革木輅並擬玉輅漆􅏹畫羽葆蓋象輅視朝革輅即戎二輅並建赤斾駕黒馬四木輅建赤麾以田駕赤馬四大事法駕五輅俱出齊武帝永平初伏曼容議齊德尚青旗先青次赤次白次黒軍容戎事宜依漢道行運之色因宋金根車而修玉輅五輅江左相承駕駟左右騑為六初加玉輅為重蓋棲寶鳳皇綴金鑷珠璫玉蜯珮四角金龍銜五采眊又麒麟頭加以采畫馬首戴之竟陵王子良啓曰蓋圓象天軫方象地上無二天之儀下設兩蓋之飾求諸志録難為折衷又假為麟首加乎馬頭事不師古鮮或可施至建武中明帝乃省重蓋等金輅之飾如玉輅而減少象輅減金輅革輅如象輅而尤減木輅如革輅建大赤麾首施大騶幡金輅玉輅建碧旂象輅木輅建赤旂梁武帝初因齊制天監三年五輅旗麾同用赤而斿不異以從行運也七年帝據周禮玉輅以祀金輅以賔今祀乘金輅詔下詳議周捨謂金輅為齊車本不關於祭祀於是改陵廟皆乘玉輅轡以朱絲陳天嘉初令劉仲舉議造玊金象革木等五輅及五色副車皆金薄交龍為輿倚較文貔伏軾虬首銜軛左右吉陽筩鸞雀立衡􅏹文畫轓緑油蓋黄紋裏相思撩金華末斜注旂旗於車之左各依方色加棨㦸於車之右韜以黼繡獸頭幡長丈四尺揭於㦸杪玉輅正副同駕六馬除皆駕駟並金义髦插以翟尾玊為鏤錫又以彩畫蛙蟆綴兩軸頭即漢之飛軨遺象也五輅兩箱後皆用玳瑁為鵾翅加以金銀雕飾兩箱之裏衣以紅錦金花帖釘上用紅紫錦為後檐青紋純帶夏用花簟冬用綺繡褥此後漸修具依梁制後魏天興初始制軒冕未知古式多違舊章至孝文太和中儀曹令李韶更議改正唯備五輅各依方色其餘車輦猶未能具明帝熙平中侍中崔光等議大造車服五輅並駕五馬亦無經據北齊車服制度多因後魏天保中所乘是太和中李韶所制五輅後周依周禮設六官置司輅之職掌皇帝之輅十有二等一曰蒼輅以祀昊天上帝二曰青輅以祀東方上帝三曰朱輅以祀南方上帝及朝日四曰黄輅以祭地祇中央上帝五曰白輅以祀西方上帝及夕月六曰元輅以祀北方上帝及感帝祭神州此六輅通漆之而無他飾即周木輅之遺象也馬皆疏面斿就以方色俱十有二七曰玉輅以享先皇加元服納后八曰碧輅以祭社稷享諸先帝大卜食三老五更享諸侯及耕耤九曰金輅以祀星辰祭四望視朔射饗十曰象輅以望秩羣祀視朝燕射廵省臨學幸道法門十一曰革輅以廵兵即戎十二曰木輅以田獵行鄉畿此六輅又以六色漆畫之用玉碧金象革物以飾諸末皆錫面金鈎就以五采俱十有二其輅之式飾重較加茸焉隋開皇元年内史李徳林奏後魏輿輦乖制請皆廢之唯留太和時李韶所制五輅北齊所遵者後著令玉輅青質以玉飾諸末重箱盤輿左龍右虎金鳳翅畫􅏹文鳥獸黄屋左纛金鳳一在軾前八鑾在衡二鈴在軾龍輈之上前設障塵青蓋黄裏繡斿帶金博山綴以鑑子下垂八珮植四十葆羽輪皆朱班重牙複轄左建太常十有二斿皆畫升龍日月其長曵地右載闟㦸長四尺廣三尺黻文旗首金龍頭銜鈴及緌垂以結綬駕蒼龍金鑁方釳插翟尾五隼鏤鍚鞶纓十有二就皆五采繒罽為飾天子祭祀納后則乘之金輅赤質以金飾諸末左建旟畫飛隼右建闟㦸盤輿鳳翅等並同玉輅駕赤騮臨朝㑹同饗射飲至則乘之象輅黄質以象飾諸末左建旌畫桴驎右建闟㦸駕黄騮祀后土則乘之革輅白質輓之以革左建旗畫騶虞右建闟㦸駕白駱廵狩臨兵則乘之木輅黒質漆之左建旐畫元武右闟㦸駕黒騮田獵則乘之其五輅並駕六馬飾同玉輅復制安車重輿曲壁紫油􅀈裳通幰朱絲絡網朱鞶纓駕赤騮臨幸所乘按隋氏五輅遠酌周禮旗斿藻飾近約漢制文質相半唐因隋制玉金象革木是為天子五輅玉輅青質重輿左青龍右白虎金鳳翅畫􅏹文鳥獸黄屋左纛金鳯一在軾前十二鑾在衡五輅鸞數皆凖此制副輅及耕根車則八二鈴在軾龍輈前設障塵青蓋黄裏繡飾博山鑑子植羽輪皆朱班重牙左建旂十有二斿斿畫升龍其長曵地右載闟㦸長四尺廣三尺黻文旂首金龍頭銜結綬及鈴緌駕蒼龍金鑁方釳插翟尾五隼鏤鍚鞶纓十有二就祭祀納后則供之金輅赤質餘同玉輅駕赤騮饗射祀還飲至則供之象輅黄質餘同金輅駕黄騮行道則供之革輅白質鞔以革餘同象輅駕白駱廵狩臨兵事則供之木輅黒質漆之餘同革輅駕黒騮田獵則供之旌旗鞶纓及蓋皆從輅色其蓋文裏俱用黄其鏤鍚五輅並同其飾武徳初著令天子鑾輅玉金象革木五等屬車十乘指南車記里鼓車白鷺車鑾旗車辟惡車皮軒車耕根車安車四望車羊車貞觀元年十一月始加黄鉞車豹尾車通為十二乘以為儀仗之用大駕行幸則分前後施於鹵簿之内若大陳設則行分左右施於儀仗之中高祖太宗大禮則乘輅高宗不喜乘輅每有大禮則御輦至武太后以為常明皇以輦不中禮廢而不用開元十一年冬祀南郊乘輅而徃禮畢騎還自是行幸郊祀皆騎於儀仗之内其五輅腰輿陳於鹵簿而已副車秦平天下以諸侯所乘之車為副車漢制安車立車各五乘為乘輿副車輪皆朱班重牙貳轂兩轄金薄繆龍為輿倚較文虎伏軾龍首銜軛左右吉陽筩鸞雀立衡􅏹文畫輈羽蓋華蚤建大旂十有二斿畫日月升龍駕六馬象鑣鏤鍚金鑁方釳插翟尾朱兼樊纓赤罽易茸金就十有二左纛以氂牛尾為之在左騑馬軛上大如斗其馬各如方色白馬者朱其髦尾為朱鬛云所御駕六餘皆駕四後從為副車應劭漢官鹵簿圖曰乘輿大駕則御鳳皇以金根為副魏因漢制五時副車置髦頭雲罕晉制五安車五立車合十乘名五時車俗謂五帝車駕旗十二斿各如車色立車則正植其旗安車則斜注駕馬仍漢制左右騑驂金鑁鏤錫黄屋左纛如金根之制行則從後東晉過江副車遺缺有事權以馬車代之建旗其上其後制五色木車象五時車植旗於牛背行則使人輿之牛之為義蓋取負重致逺而安穏旗常纒而不舒所謂徳車結旌唯天子親戎五旗舒斾所謂武車綏旌宋因晉而無副車齊王儉議乘黄無副今衣書車十二乘古副車之象也亦曰五時副車青萌車是謂㩉他合反幰車梁依晉置五牛旗車左青赤右白黒黄居其中象古之五時副車一曰副車陳因舊制五時副車飾同五輅並駕六馬隋因陳制五時副車色及旗章一同正輅唯降二等駕用四馬唐之制副輅五乘大駕行幸皆次於五輅戎車周巾車氏革輅即戎車車僕掌戎輅之萃音倅廣車之萃闕車之萃苹車之萃輕音磬車之萃萃猶副也此五者兵車所謂五戎也漢戎車不巾不蓋其飾如耕車蕃以矛麾金鼔羽析幢翳􅞙胄甲弩之箙魏景初改正朔戎事乘黒首白馬建大赤之旗太始中並建赤旗晉制輕車駕二馬古之獸車也前後二十乘分居左右輿輪洞朱建矛㦸麾幢置弩於軾上大駕出射聲校尉司馬吏士載以次屬車後宋依漢制戎車建矛麾斜注之載金鼓羽幢置甲弩於軾上輕車之制因漢不易以武剛車為殿孫子兵法曰有巾有蓋謂之武剛車齊梁已下及後周與隋或并用之獵車周謂之竒車曲禮曰國君不乘竒車注云獵車也巾車氏木輅以田漢制其飾如安車重輞縵輪繆龍繞之一曰闟猪車親校獵乘之魏因漢制改名闟虎車晉因魏制一名闟㦸車宋因晉制自後無聞指南車黄帝與蚩尤戰於涿鹿之野蚩尤作大霧將士皆迷四方黄帝於是作指南車以示方向故後常建焉出崔豹古今注周致太平越裳氏重譯來獻使者迷其歸路周公為司南之制使載之南周年至國故常為先導示服逺人而正四方漢初置俞兒騎馬為先驅之乘左思曰俞兒騁路指南司方後廢其騎而存其車後漢張衡始復創造漢末喪亂其器不存魏明帝青龍中令博士馬鈞紹作焉車上有木仙人舉手常指南車箱回轉所指微差晉亂復亡東晉義熙十三年劉裕平長安始得此車復修之一名司南車駕駟其下制如樓三級四角金龍衘羽葆刻木為仙人衣羽衣立車上車雖廻運而手常指南大駕出行為先啟之乘此車戎狄所制機數不精廻曲頻驟猶須人力正之范陽人祖冲之有巧思常謂宜更造宋順帝昇明中齊高帝為相命冲之造焉車成使撫軍將軍丹陽尹王僧䖍等試之其制甚精百屈千廻未嘗移變齊因宋制而加飾焉梁復名司南車大駕出為先啓之乘後魏太武帝使工人郭善明造之彌年不就扶風人馬岳又造垂成善明酖殺之唐修之備於大駕行則先導記里鼓車東晉安帝義熙十三年劉裕滅後秦所獲未詳其所由來制如指南車駕駟中有木人執槌向鼓行一里則打一槌崔豹古今注云亦名大章車所以識道里也車上有二層皆有木人執槌行一里下一層撃鼔行十里上一層撃鐲尚方故事存其作法然未詳宋因之不易大駕鹵簿次指南車後齊因宋制而加飾焉梁因齊制改駕以牛唐復修大駕鹵簿次指南車後白鷺車隋一名鼓吹車車上施層樓樓上有翔鷺棲焉唐因之駕四馬大駕出在記里鼓車後鸞旗車漢制鸞旗車析羽毛而編之列繋幢傍胡廣曰以銅作鸞鳥於車衡上晉宋因之駕四馬先輅所載也唐備於大駕鹵簿次白鷺車後辟惡車秦制也桃弓葦矢所以禳祓不祥太卜令一人在車執弓箭出崔豹古今注唐之制駕四馬大駕出在鸞旗車後皮軒車漢制皮軒車以虎皮為軒晉宋相因駕四馬皆大夫載自後無聞唐備之以大駕鹵簿次於辟惡車後耕根車漢制耕根車如副車有三蓋一曰芝車置􅞙耒耜之箙上親耕所乘也魏因之建赤旗晉因之駕駟天子親耕所乘置耒耜於軾上一名三蓋車宋因之隋以青為質三重蓋羽葆雕裝同玉輅駕六馬其軾平以青囊盛耒耜而加之籍田則乘之唐因隋其飾不易大駕行則備焉安車周制致仕之老及后乘之漢制乘輿金根車安車立車蔡邕曰五安五立徐廣曰立乘曰高車坐乘曰安車是為徳車五時車安立亦皆如之各如方色馬亦如之建大旂十有二斿駕六馬餘皆駕四皇太子王公列侯皆乘之自漢以後亦為副車晉制因之天子所御則駕六餘皆駕四三公下至九卿各一乘公駕三特進駕二卿駕一宋因之齊制諸玉三公國公列侯等行禮則乘之隋制金飾紫通幰朱裏駕四馬臨幸及賜予則供之唐之制以金飾駕四馬臨幸則乘之大駕出在耕根車後四望車齊四望車通幰油幢絡班漆輪轂亦曰皂輪車以加貴臣隋制同犢車黄金飾青油紫幢朱裏紫通幰紫絲網駕一牛拜陵臨弔則乘之唐之制以金飾駕四馬拜陵臨弔則乘之大駕出在安車後遊車漢制九遊車九乘大駕為先乘宋因之自後無聞羊車晉制羊車一名輦車其上如軺伏兎箱漆畫輪軛武帝時䕶軍羊琇乘羊車為司𨽻校尉劉毅糾劾梁因制羊車小兒衣青布袴褶五辮髻數人引之貴賤通得乘之名牽子也隋大業始置焉制如軺車金寶飾紫錦幰朱絲網馭童二十人皆兩環髻服青衣年十四五者乘之謂之羊車小史駕以果下馬其大如羊唐因之小史十四人畫輪車晉制畫輪車駕牛以彩漆畫輪轂上起四夾杖左右開四望緑油幢朱絲青交絡其上形制如輦其下猶犢車貴者不乘牛車漢武帝推恩之末諸侯寡弱貧者至乘牛車其後稍貴天子至士遂為常乘至尊出朝堂舉哀乘之大駕次羊車後宋齊梁相因為羣公所乘自後無聞鼓吹車梁制鼓吹車上施層樓四角金龍銜旒蘇羽葆凡鼓吹陸則樓車水則樓船在殿庭則畫筍簴為樓上有翔鷺棲焉或為鶴形自後無聞象車晉武帝太康中平吳後南越獻馴象詔作大車駕之載鼓吹十人使越人騎之元正大㑹入庭大駕鹵簿行則試橋道自後不見黄鉞車晉制黄鉞車駕一馬大駕行次於華蓋後御麾左右又有金鉞車金鉦車並駕三馬唐貞觀以後加之備於大駕鹵簿天寶元年改為金鉞車豹尾車周制也古者軍正建之漢制大駕出屬車八十一乘法駕出屬車三十六乘最後一乘垂豹尾晉因之在鹵簿之末宋志徐廣按淮南子云軍正執豹皮以正其衆禮記曰前士師則載虎皮乘輿豹尾以其義類唐之制大駕出在黄鉞車後駕二馬武衞隊正一人在車執之建華車晉制建華車二乘駕四馬大駕出分在左右行自後無聞皇太后皇后車輅周禮王后之五輅一曰重翟二曰厭翟三曰安車四曰翟車五曰輦車漢皇后駕輅青羽蓋駕四馬斾九斿後漢太皇太后皇太后皇后法駕皆御金根車重翟羽蓋加青交絡帷裳非其法駕則乘紫罽軿車雲􅏹文畫輈黄金塗五末五末轅一轂二箱二共五也蓋蚤施金花駕三馬左右騑晉制后乘重翟羽蓋金根車加青絡青帷裳雲􅏹畫轅黄金塗五末蓋蚤施金華駕三馬左右騑其廟見小駕則乘紫罽軿車飾及駕馬如重翟非法駕則皇太后乘輿皇后畫車后先蠶乘油畫雲母安車駕六騩馬騩淺黒色音貴油畫兩轅安車駕五騩馬為副又金博山駢紫絳罽車皆駕三騩馬宋因之法駕乘重翟齊因重翟車車加金塗飾後魏熙平中有司蘇紹議皇后之輅其從祭則御金根車親喪則御雲母車歸寧則御紫罽車遊行御安車弔問御紺罽車並駕四馬北齊因之後周皇后之車十二等一曰重翟以從皇帝祀郊禖享先皇朝皇太后二曰厭翟以祭陰社三曰翟輅以採桑四曰翠輅以從皇帝見賔客五曰雕輅以歸寧六曰篆輅以臨諸道法門六輅皆錫面朱總金鈎七曰蒼輅以適命婦八曰青輅九曰朱輅十曰黄輅十一曰白輅十二曰元輅五時常出則供之六輅皆疏面繢總隋開皇初李徳林奏用後魏熙平蘇紹議皇后之輅後著令制重翟青質金飾諸末朱輪金根朱牙其箱飾以重翟羽青油幢朱裏通幰繡紫帷朱絲絡網繡紫絡帶八鑾在衡鏤錫鞶纓十二就金鑁方釳插翟尾朱總駕蒼龍受冊從祀郊禖享廟則供之厭翟赤質金飾諸末輪畫朱牙其箱飾以翟羽紫油幢朱裏通幰紅錦帷朱絲絡網紅錦絡帶餘如重翟駕赤騮親桑則供之翟車黄質金飾諸末輪畫朱牙其車側飾以翟羽黄油幢黄裏通幰白紅錦帷朱絲絡網白紅錦絡帶餘如重翟駕黄騮歸寧則供之諸鞶纓之色皆從車質安車赤質金飾紫通幰朱裏駕四馬臨幸及弔則供之輦金飾同於蓬輦通幰班輪駕四馬宫苑近行則乘之屬車三十六乘唐因隋制重翟厭翟翟車安車其飾不易又制四望車紫油朱質通幰畫絡帶拜陵臨弔則供之又制金根車朱質紫油通幰畫絡帶朱絲絡網常行則供之皇太子皇子車輅周制巾車氏掌王五輅金輅建大旂以封同姓同姓謂王子母弟率以功徳出封若魯衛之屬漢皇太子皆安車朱班輪飛軨青蓋金花爪倚虎較伏鹿軾􅏹文畫轓吉陽筩文輈金塗五末旂九斿畫降龍皇太子為王賜以乘之皇孫綠車以從皆左右騑三馬名皇孫車魏因之文帝問東平王有輅為是特賜乎鄭稱對曰天子五輅金輅以封同姓諸侯得與天子同乘金輅非特賜晉因魏安車而駕三馬非法駕則乘畫輪車上開四望緑油幢朱絲繩絡兩箱裏飾以金錦黄金漆塗五末其副車三乘形制如所乘但不畫輪耳王青蓋車皇孫緑蓋車並駕三左右騑東晉安帝時乘後山安車制如金輅宋因之皇子為王亦錫以皇太子之安車皇孫緑車亦因舊法齊皇太子乘象輅校飾如御旂旗九斿降龍梁因齊象輅制鑾輅駕三左右騑朱班輪倚獸較伏鹿軾九斿降龍青蓋畫轓文輈金塗五末以畫輪車為副常乘畫輪則衣書車為副其畫輪車上開四望緑油幢朱繩絡兩箱裏飾以金錦陳因梁制後魏乘金輅朱蓋赤質駕四馬北齊因之隋皇太子金輅赤質金飾諸末重較箱畫􅏹文鳥獸黄伏鹿軾龍輈金鳳一在軾前設障塵朱蓋黄裏輪畫朱牙左建旂九斿右載闟㦸旂首金龍頭銜結綴及鈴緌駕赤騮駟八鑾在衡二鈴在軾金鑁方釳插翟尾五隼鏤錫鞶纓九就從祀享廟正冬大朝納妃則乘之軺車金飾諸末紫通幰朱裏駕一馬五日常朝饗宫官出入行道乘之四望車金飾諸末紫油幢通幰朱裏朱絲絡網駕一馬弔臨則乘之唐因隋制公侯大夫等車輅周制巾車掌王五輅象輅以封異姓革輅以封四衛木輅以封藩國又曰服車五乘孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車庶人乘役車漢景帝中元五年始詔六百石以上施車轓得銅五末軛有陽筩中二千石以上右騑三百石以上皂布蓋千石以上皂繒蓋二百石以下白布蓋皆有四維杠衣賈人不得乘馬車除吏赤蓋杠其餘皆青大使車立乘駕駟赤帷裳持節者重導從賊曹車斧車督車功曹車皆兩大車伍伯璅弩十二人辟車四人從車四乘小使車不立乘有騑赤屏泥油重絳帷導無斧車近小使車蘭輿赤轂白蓋赤帷裳從騎四十人此謂追捕考按有所勅取者之所乘也諸使車皆朱班輪四幅赤衡軛公卿二千石郊廟眀堂祠陵法出皆大車立乘駕駟他出乘安車公卿以下至縣三百戸長導從置門下五吏賊曹督察盜賊功曹皆帶劍三車導主簿主記兩車為從縣令以上加導斧車後漢制公侯乘安車駕二右騑皆朱班輪飛軨倚鹿較伏熊軾皂繒蓋黒幡中二千石二千石皆皂蓋朱兩幡千石六百石朱左幡晉制雲母車以雲母飾犢車臣下不得乘以賜王公耳皂輪車駕四牛形如犢車皂漆輪轂上加青油幢朱絲繩絡諸王三公有勲徳者特加之位至公或四望三望夾望車油幢車形制如皂輪但不漆轂耳通幰車駕牛如犢車但舉其幰通覆車上也諸王三公並乘之諸公給朝車駕駟安車黒耳駕三各一乘皂輪犢車各一乘自祭酒掾屬以下及令史皆皂軨特進及車騎驃騎以上諸大將軍不開府非持節都督者給安車黒耳駕二三公九卿中二千石二千石河南尹謁者僕射郊廟法出皆大車立乘駕四他出乘安車其去位致仕告老賜安車駟馬郡縣公侯安車駕二右騑皆朱班輪倚鹿較伏熊軾黒輜皂繒蓋公旗旂八斿侯七斿卿五斿皆畫降龍中二千石二千石皆皂蓋朱兩䮳駕二中二千石以上右騑千石六百石朱左轓王公之元子攝命理國者安車駕三旗旂七斿其封侯之元子五斿大使車立乘駕四赤帷裳騶騎導從舊公卿二千石郊廟上陵從駕所乘小使車不立乘駕四輕車之流也蘭輿皆朱轂赤屏泥白蓋赤帷裳又别有小使車赤轂皂蓋追捕執取者所乘凡諸使車皆朱班輪赤衡軛追鋒車去小平蓋加通幔如軺車駕二追鋒者以迅速為名施於戎陣之間是為𫝊乘軺車古之將軍車也一馬曰軺車二馬曰軺𫝊按漢世貴輜軿而賤軺車魏晉重軺車而賤輜軿三品將軍以上尚書令軺車黒耳有後戸僕射但有後戸無耳並皂輪也宋因晉有追鋒車雲母車四望車公及列侯所乘安車依漢舊制駕二馬旂旗斿王公侯七卿五皆降龍公卿中二千石郊陵法皆出大車立乘駕四他出去位致仕皆安車駟馬中二千石皆皂蓋朱轓銅飾五末駕二右騑王公世子攝命理國者安車駕三旂旗七斿侯世子五斿齊制黄屋車建碧旂九斿九命上公所乘青蓋安車朱轓班輪駕一左右騑通幰車為副諸王禮行所乘皂蓋安車朱轓漆班輪駕一馬通幰朱車為副三公禮行所乘安車黒耳皂蓋朱轓駕一牛車為副國公列侯禮行所乘馬車駕一九卿領䕶二衛驍游四軍五校從郊陵所乘餘同晉法梁制二千石四品以上及列侯皆給軺車駕牛伏兎箱青油幢朱絲絡網轂皆黒漆天監二年令三公開府尚書令則給鹿轓軺施耳後户皂輞尚書僕射左右光禄大夫侍中中書監令秘書監則給鳳轄軺後户皂輞領䕶國子祭酒太子詹事尚書侍中列卿等則給聊泥軺無後户漆輪車騎驃騎及諸王除刺史帶將軍則給龍雀軺以金根飾御史中丞給方蓋軺形小如傘諸王三公有勲徳者皆特加皂輪車駕牛形如犢車但烏漆輪轂黄金雕裝上加青油幢朱絲絡通幰王公加禮者給油幢絡車駕牛朱輪華轂後魏三公及王車朱屋青蓋制同五輅名曰高車駕三馬庶姓王侯及尚書令僕以下列卿以上並給軺車駕一馬或乘四望通幰車駕一牛北齊因之庶姓王至儀同三司以下翟尾扇紫傘皇宗及三品以上官青傘朱裏其青傘碧裏逹於士人不禁正從一品執事散官及儀同三司乘油色朱絡網車車牛飾得用金塗及純銀二品三品得乘卷通幰車車牛飾用金塗四品以下七品以上得乘偏幰車車牛飾以銅後周諸公之輅九方輅各象方之色碧輅金輅皆錫面鞶纓九就金鈎象輅犀輅貝輅革輅篆輅木輅皆疏面鞶纓九就凡就皆以朱白蒼三采諸侯自方輅而下八無碧輅諸伯自方輅而下七又無金輅諸子自方輅而下六又無象輅諸男自方輅而下五又無犀輅凡就各如其命三公之輅車九祀輅犀輅貝輅篆輅木輅夏輅縵車墨車棧車自篆輅以上金塗諸末疏錫鞶纓金鈎木輅以下銅飾諸末疏面鞶纓皆九就三孤自祀輅而下八無犀輅六卿自祀輅而下七又無貝輅上大夫自祀輅而下六又無篆輅中大夫自祀輅而下五又無木輅下大夫自祀輅而下四又無夏輅士車三祀車墨車棧車凡就各如其命數自孤以下就以朱緑二采隋制公及一品象輅黄質以象飾諸末建旟畫以鳥隼受冊告廟升壇上任親迎及𦵏則乘之侯伯及二品三品革輅白質建旟畫熊虎受冊告廟親迎及𦵏則乘之子男及四品木輅黒質以漆飾之建旐畫龜蛇受冊告廟親迎及𦵏則乘之象輅以下斿及就數各依爵品犢車則魏武賜楊彪七香車也駕牛自王公已下至五品以上並給乘之三品以上青幰朱裏五品以上紺幰碧裏皆白銅裝唯有參謁及弔喪者則不張幰而乘鐵裝車六品以下不給任自乘犢車弗許施幰初五品以上乘偏幰車其後嫌其美停不用以白幰代之三品以上通幰車則青壁一品軺車油幰朱網唯車輅一等聽勅始得乘之唐王公以下車輅親王及武職一品象輅自餘及二品三品革輅四品木輅五品軺車象輅朱班輪左建旂旂畫龍一升一降右載闟㦸革輅以革飾左建旜通帛為旜餘同象輅木輅以漆飾之餘同革輅軺車曲壁青通幰諸輅質蓋旂旜皆朱一品九斿二品八斿三品七斿四品六斿其鞶纓就數皆准此主妃命婦等車漢制長公主乘赤罽駢車大貴人公主王妃封君油畫駢車大貴人加節畫輈皆右騑而已公列侯中二千石二千石夫人㑹朝若親蠶各乘其夫之安車右騑加交絡帷裳皆皂非公㑹不得乘朝車得乘漆布輜軿車銅飾五末晉制三夫人油駢車駕兩馬左騑其貴人加節畫輈三夫人助蠶乘青交絡安車駕三皆以紫絳罽軿車九嬪世婦乘軿車駕三長公主赤罽軿車駕兩馬公主王太妃王妃皆油軿車駕兩馬右騑公主油畫安車駕三青交絡以紫絳罽軿車駕三馬為副王太妃三夫人亦如之公主助蠶乘油畫安車駕三公主有先置者乘青交絡安車駕三諸王妃公太夫人夫人縣鄉郡公侯特進夫人助蠶乘皂交絡安車駕三諸侯監國世子之世婦侍中常侍尚書中書監令卿校世婦命婦助蠶乘皂交絡安車儷駕郡縣公侯中二千石二千石夫人㑹朝及蠶各乘其夫之安車皆右騑皂交絡皂帷裳自非公㑹則不得乘軺車王妃特進夫人封郡君安車駕三皂交絡封縣鄉君油軿車駕兩馬右騑宋齊依晉無大更革梁天監二年令上臺六宫長公主公主諸王太妃王妃皆得乘青油輿搨幢通幰車以搨幢湼幰為副采女皇女諸王嗣子侯夫人皆乘赤油搨幢車以湼幰為副侍女直乘湼幰二乘後周制公夫人之輅車九厭翟翟輅翠輅皆錫面朱總金鈎雕輅篆輅皆勒面刻白黒韋為當顱繢總朱輅黄輅白輅元輅皆雕面刻漆韋為當顱鷖總總黒色繪其著如朱總諸侯夫人自翟輅而下八諸伯夫人自翠輅而下七諸子夫人自雕輅而下六諸男夫人自篆輅而下五鞶纓就數各視其君三妃三公夫人之輅九篆輅朱輅黄輅白輅元輅皆勒面繢總夏篆夏縵墨車棧車皆雕面鷖總三㚤由力反三孤内子自朱輅而下八六嬪六卿内子自黄輅而下七上媛婦中大夫孺人自元輅而下五下媛婦下大夫孺人自夏篆而下四御婉士婦人自夏縵而下三其鞶纓就各以其等皆簟笰漆之君以赤卿大夫士以黒君駕四馬三輈六轡卿大夫士駕二馬一輈四轡隋制皇太子妃乘翟車以赤為質駕三馬畫轅金飾犢車為副紫幰朱網絡良娣以下並乘犢車青幰朱裏三公夫人公主王妃並犢車紫幰朱網絡五品以上命婦並乘青幰與其夫同唐制内命婦夫人乘厭翟車嬪乘犢車媫妤以下乘安車各駕二馬外命婦公主王妃乘厭翟車駕二馬自餘一品乘白銅飾犢車青通幰朱裏油幢朱絲網駕牛二品以下去油幢絡網四品青偏縵其王公以下車輅皆太僕官造貯掌之若受制行冊命及三時廵陵婚𦵏則給之輦輿輦人所輦也徐爰釋問云天子御輦侍中陪乘今輦制象軺車而不施輪通幰朱絡飾以金玉用人荷之或曰夏后氏末代制輦名曰余車商曰胡奴車周曰輜車即輦也王妃輦車組絻有翣羽蓋秦為人君之乘漢因之成帝遊後庭則乘輦魏晉小出則乘之亦多乘輿東晉過江亡其制度至太元中謝安率意造焉及破苻堅於淮上獲京都舊輦形制無差義熙五年劉裕執慕容超獲金鉦輦宋因之齊亦因之而盛増其飾又制卧輦校飾如坐輦不堪服用復制小輿形如軺車小行幸則乘之輿説文云箯竹輿也周禮考工記曰周人上輿漢室制度以雕玉為之方徑六尺今輿制如輦而但小耳宫苑宴私則御之梁制小輿似軺車金裝漆畫施八横元正大㑹乘出上殿西堂舉哀亦乘之行則從後一名羊車一名輦其上如軺小兒衣青布袴褶五辮髻數人引之漢氏或以人牽或駕果下馬梁貴賤通乘名曰牽子又制歩輿方四尺上施隠膝優老者人輿升殿司徒謝朏以脚疾優之自天子至下賤得通乘歩輿又制副輦加笨歩本反如犢車通幰朱絡謂之蓬輦後魏道武帝天興初始修軒冕制乾象輦羽葆圓蓋畫日月五星二十八宿天街雲罕山林竒瑞遊麟飛鳳朱雀元武騶虞青龍駕二十四馬又制大樓輦車龍輈加玉飾四轂六衡方輿圓蓋建太常畫升龍日月駕二十牛又制象輦左右金鳳白鹿仙人羽葆旒蘇金鈴玉佩初駕二象後以六駝代之復有遊觀小樓等輦駕十五馬車等草創修制多違舊章隋制輦而不施輪通幰朱絡飾以金玊而人荷之又依梁制副輦復制輿如輦而小宫苑私宴御之小輿幰方形同幄帳自閤内升正殿御之唐制輦有七一曰大鳳輦二曰大芳輦三曰仙遊輦四曰小輕輦五曰芳亭輦六曰大玉輦七曰小玉輦轝有三一曰五色轝二曰常平轝三曰腰轝大駕鹵簿先五輅而行旌旗黄帝振兵敎熊羆貔貅貙虎制陣法設五旗五麾夏氏奚仲為車正建旗斿旐以别尊卑等級商因之周制司常掌九旗王建太常諸侯建旂孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞游車載旌大麾以田大帛以即戎翿旌龍旃秦水徳旗斿皆尚黒其制未詳漢制龍旂九斿七仞以象大火鳥旟七斿五仞以象鶉火熊旗六斿五仞以象參代龜蛇旐四斿四仞以象營室弧旌枉矢以象弧也此諸侯以下之所建也後周太常畫三辰旂畫青龍旟畫朱鳥旌畫黄麟旗畫白虎旐畫元武皆加雲氣其旜物在軍亦畫其事號加以雲氣徽幟亦如之旌節又畫白虎而析羽於其上又司常掌旗物之藏通帛之旗六以供郊丘之祀蒼青朱黄白黒六旗畫繢之以充玉輅之等一曰三辰之常二曰青龍之旗三曰朱鳥之旟四曰黄麟之旌五曰白虎之旂六曰元武之旐皆左建旗而右建闟㦸又有繼旗四以施軍旅一曰麾以供軍將二曰旞以供師帥三曰以供旅帥四曰斾以供卒長諸公方輅碧輅建旂金輅建旟篆輅建物木輅建旐諸侯自金輅而下如諸公之旗諸伯自象輅而下如諸侯之旗諸子自犀輅而下如諸伯之旗諸男自篆輅而下如諸子之旗三公犀輅貝輅篆輅建旜木輅建旐夏篆夏縵及棧車建物孤卿以下各以其等建其旗旌杠皇帝六刃諸侯五大夫四士三斿皇帝曵地諸侯及軹大夫及轂士及軫凡注毛於杠首曰綏析羽曰旌全羽曰旞鹵簿屬車附古者諸侯九乘秦滅九國兼其車服故制大駕屬車八十一薛綜曰屬者相連屬也皆在後二行法駕半之左右分行其車皆皂蓋赤裏朱幡輜戈矛弩箙尚書御史所載最後一乘垂豹尾以前為省中胡廣曰施之道路故須豹尾過後屯圍乃得解省中即今之仗内漢制乘輿大駕備車千乘騎萬匹屬車八十一乘公卿奉引太僕大將軍參乘祀天於甘泉用之後漢明帝上原陵大喪並因前代為大駕用八十一乘祀天南郊則法駕用三十六乘河南尹執金吾雒陽令奉引奉車郎御史侍中參乘前驅有九斿雲罕鳳皇車闟㦸車皮軒車鸞旗車後有金鉦車黄鉞車黄門鼓車黄門令校駕祀天南郊以法駕祀地明堂省什三祀宗廟尤省謂之小駕每出太僕奉駕上鹵簿中常侍小黄門副尚書主者郎令史副侍御史蘭臺令史副皆執法以督整車騎謂之䕶駕春秋上陵尤省於小駕直事尚書一人從晉制大駕鹵簿先象車鼓吹一部十三人中道次静室令駕一中道式道侯二人駕一分左右次洛陽尉二人騎分左右次洛陽亭長九人赤車駕一分三道鼓吹正二人引次洛陽令皂車駕一中道次河南中部掾中道河橋掾在左功曹史在右並駕一次河南尹駕駟㦸吏六人次河南主簿駕一中道次河南主記駕一中道次司𨽻部河南從事中道都部從事居左别駕從事居右並駕一次司𨽻校尉駕三㦸吏六人次司𨽻主簿駕一中道次司𨽻主記駕一中道次廷尉明法掾中道五官掾居左功曹史居右並駕一次廷尉卿駕駟㦸吏六人次廷尉主簿主記並駕一在左太僕引從如廷尉在中宗正引從如廷尉在右次太常駕駟中道㦸吏六人次太常外部掾居左五官掾功曹史居右並駕一次光禄引從中道太常主記居左衛尉引從居右並駕一次太尉外督令史駕一中道次東西捕賊倉戸等曹屬並駕一引從次太尉駕駟中道太尉主簿舍人各一人祭酒二人並駕一在左右次司徒引從駕駟中道次司空引從駕駟中道三公騎令史㦸各八人鼓吹各一部七人次中䕶軍中道駕駟鹵簿左右各二行㦸楯在外弓矢在内鼓吹一部七人次歩兵校尉在左長水校尉在右並駕一各鹵簿左右二行㦸楯在外刀楯在内鼓吹各一部七人次射聲校尉在左翊軍校尉在右並駕一皆鹵簿左右各二行㦸楯在外刀楯在内鼓吹各一部七人驍騎將軍在左游撃將軍在右並駕一皆鹵簿左右引各二行㦸楯在外刀楯在内鼓吹各一部七人騎隊五在左五在右隊各五十匹命中督二人分領左右各有㦸吏二人麾幢揭鼓在隊前次左將軍在左前將軍在右並駕一皆鹵簿左右各二行㦸楯在外刀楯在内鼓吹各一部七人次黄門麾騎中道次黄門前部鼓吹左右各一部十三人駕駟八校尉佐仗左右各四行外大㦸楯次九尺楯次弓矢弩並熊渠佽飛督領之次司南車駕駟中道䕶駕御史騎夾左右次謁者僕射駕駟中道次御史中丞駕一中道次虎賁郎將騎中道次九斿車中道武剛車夾左右並駕駟次雲罕車駕駟中道次闟㦸車駕駟中道長㦸邪偃向後次皮軒車駕駟中道次鸞旗車中道建華車分左右並駕駟次䕶駕尚書郎三人都官郎中道駕部在左中兵在右並騎又有䕶駕尚書一人騎督攝前後無常次相風中道次司馬督在前中道左右各司馬史三人引仗左右各六行外大㦸楯二行次九尺楯次刀楯次弓矢次弩次五時車左右有遮列騎次典兵中郎中道督攝前却無常左殿中御史右殿中監並騎次高蓋中道左罼右罕次御史中道左右節郎各四人次華蓋中道次殿中司馬中道殿中都尉在左殿中校尉在右左右各四行細楯一行在弩内又殿中司馬一行殿中都尉一行殿中校尉一行次棡鼓中道次金根車駕六馬中道太僕卿大將軍叅乘左右又各増三行為九行司馬史九人引大㦸楯二行九尺楯一行刀楯一行由基一行細弩一行細跡禽一行椎斧一行刀楯一行連細楯殿中司馬都尉殿中校尉為左右各十二行金根車建青旂斿十二左將軍騎在左右將軍騎在右殿中將軍持鑿腦斧夾車車後衣書主職歩從六行合左右三十二行次曲華蓋中道侍中散騎常侍黄門侍郎並