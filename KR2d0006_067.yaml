body:
  text: 通志卷六十二宋右廸功郎鄭樵漁仲撰食貨略第二錢幣漕運鹽鐵茶鬻爵𣙜酤算緡雜税平準均輸平糴常平義倉錢幣自太昊以來則有錢矣太昊氏髙陽氏謂之金有熊氏髙辛氏謂之貨陶唐氏謂之泉啇人周人謂之布齊人莒人謂之刀謂之泉者言其形謂之金者言其質謂之刀者言其器謂之貨謂之布者言其用古文錢字作泉者其形如泉文一變而為刀器再變而為圜法太公作九府圜法黄金方寸而重一斤錢圜函方輕重以銖布帛廣二尺二寸為幅長四丈為疋以為貿易之制自圜法流通於世民實便之故泉與刀並廢後人不曉其謂也觀古錢其形即篆泉文也後世代以錢字故泉之文借為泉水之泉其實泉之篆文下體不從水也先儒不知夲末謂流於泉布於布寳扵金利扵刀此皆沿鑿之義也錢所以權天下之利而便於民古人與金銀龜貝相參為幣惟管仲之論詳焉以先王所以守財物御人事而平天下者在乎此禹有五年之水湯有七年之旱民之無饘有賣子者禹以歴山之金鑄幣以賑之湯以莊山之金鑄幣以贖之周景王時患錢輕更鑄大錢徑一寸二分重十二銖文曰大泉五十肉好皆有周郭以勸農贍不足百姓䝉其利楚莊王以為幣輕更以小為大百姓不便皆去其業孫叔敖為相市令言扵相曰市亂人莫安其處行不定叔敖白於王遂令復如故而百姓乃安也秦一中國之幣為二等黄金以溢為名上幣二十兩為溢改周一斤之制銅錢質如周錢文曰半兩重如其文為下幣而珠玉龜貝銀錫之屬為器飾寳蔵不為幣然各随時而輕重無常漢興以為秦錢重難用更令民鑄莢錢如榆莢也錢重銖半徑五分文曰漢興黄金一斤復周之制更以斤名金髙后二年行八銖錢秦錢文曰半兩即八銖錢漢以其太重更鑄榆莢人患太輕至此復行八銖錢六年行五分錢徑以五分用莢錢也孝文五年為錢益多而輕乃更鑄四銖錢其文為半兩除盗鑄錢令便民放鑄是時呉以諸侯即山鑄錢富埒天子文字與四銖同微重耳後卒叛逆鄧通大夫也以鑄錢文字稱兩同四銖財過王者故吳鄧錢布天下孝武帝有事於四夷又徙貧民七十萬口扵新秦中用度既廣出御府錢以贍不足而冶鑄或累萬金不佐公家之急扵是天子與公卿議更錢造幣以贍用而摧浮滛并兼之徒是時禁苑有白鹿而少府多銀錫乃以白鹿皮方尺緣以藻繢為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又造銀錫為白金以為天用莫如龍地用莫如馬人用莫如龜故白金三品其一曰重八兩圜之其文龍名曰白選漢志曰白撰直三千二曰以重差小方之其文馬直五百以半斤之重差為三品此重六兩則下品重四兩三曰復小撱之其文龜直三百令縣官銷半兩錢更鑄三銖錢文如其重盗鑄諸金錢罪皆死而吏民之盗鑄白金者不可勝數有司言三銖錢輕易姦詐乃更請郡國鑄五銖錢是為白金五銖錢四五年間郡國姦鑄益多公卿請令京師官鑄赤仄以赤銅為其郭一當五賦官用非赤仄不得行白金稍賤民不寳用縣官以令禁之無益嵗餘終廢不行其後二嵗赤仄錢賤民巧法用之不便又廢扵是悉禁郡國無鑄錢專令上林三官鑄錢既多而令天下非三官錢不得行諸郡國前所鑄錢皆廢銷之輸入其銅三官而民之鑄錢益少計其費不能相當惟真工大姦乃盗為之宣帝時貢禹言鑄錢采銅一嵗十萬人不耕民坐盗鑄䧟刑者多富人蔵錢滿室猶無厭足民心揺動棄夲逐末耕者不能半姦邪不可禁原起扵錢疾其末者絶其夲宜罷采珠玉金銀鑄錢之官毋復以為幣除其販賣租銖之律租税祿賜皆以布帛及榖使百姓壹意農桑議者以為交易待錢布帛不可尺寸分裂禹議亦寢自孝武元狩五年三官初鑄五銖錢至平帝元始中成錢二百八十億萬餘云王莽居攝變漢制以周錢有子母相權扵是始造大錢徑一寸二分重十二銖文曰大錢五十又造契刀錯刀契刀環如大錢身形如刀長二寸文曰契刀五百錯刀以黄金錯其文曰一刀直五千與五銖錢凡四品並行莽即真以為書劉字有金刀乃罷錯刀契刀及五銖錢而更作金銀龜貝錢布之品名曰寳貨扵是為錢貨六品銀貨二品龜寳四品貝貨五品布貨十品凡寳貨五物六名二十八品鑄作錢布皆用銅殽以鏈錫文質周郭放漢五銖錢云其金銀與他物雜色不純好龜不盈五寸貝不盈六分皆不得為寳貨元龜為蔡非四民所得居有者入太卜受直其後百姓憒亂其貨不行民私以五銖錢市買莽患之下詔敢挾五銖錢者為惑衆投諸四裔扵是農商失業食貨俱廢其後改易不常品名頗衆不足記也及公孫述僭號扵蜀廢銅錢置鐵官鑄鐵錢百姓貨幣不行後漢光武除王莽貨泉自莽亂後貨幣雜用布帛金粟建武十六年馬援上書曰富國之夲在扵食貨宜如舊鑄五銖錢帝從之扵是復鑄五銖錢天下以為便及章帝時榖價貴縣官經用不足朝廷憂之尚書張林言今非但榖貴百物皆貴此錢賤故爾宜令天下悉以布帛為租市買皆用之封錢勿出如此則百物皆賤矣帝用其言少時復止和帝時有上書言民以貨輕錢薄故致貧困宜改鑄大錢事下四府羣寮及太學能言之士孝㢘劉陶上議曰當今之憂不在扵貨在乎民饑盖民可百年無貨不可一朝有饑故食為至急也議者不逹農殖之夲多言鑄冶之便或欲因緣行詐以賈國利國利將盡取者争競造鑄之端扵是乎生葢萬人鑄之一人奪之猶不能給况今一人鑄之則萬人奪之乎夫欲民繁財阜要在止役禁奪則百姓不勞而足帝乃不鑄錢靈帝作五銖錢而為四出道連扵邊緣有識者尤之董卓焚燒宮室乃刼鑾駕西幸長安悉壊五銖錢更鑄小錢大五分盡取長安飛㢘之屬充鼓鑄其錢無輪郭文章不便時人由是貨輕而物貴榖一斛至錢數百萬曹公為相扵是罷之還用五銖魏文帝黄初二年罷五銖錢使百姓以榖帛為市買至眀帝時錢廢榖用既久人間巧偽漸多競濕榖以要利作薄絹以為市雖處以嚴刑而不能禁也司馬芝等舉朝大議以為用錢非徒豐國亦所以省刑今若更鑄五銖於事為便帝乃更立五銖錢至晋用之不聞有所改創蜀先主劉備攻劉璋與士衆約若事定府庫百姓孤無取焉及㧞成都士衆皆捨干戈赴諸庫蔵取寳物軍用不足備甚憂之西曹掾劉巴曰此易耳但當鑄錢一直百平諸物價令吏為官市備從之數月之間府庫充實文曰直百亦冇勒為五銖者大小秤兩如一焉並徑七分重四銖呉孫權嘉平五年鑄大錢一當五百文曰大泉五百徑一寸三分重十二銖而使吏民輸銅計鑄畢設盗鑄之科赤烏元年鑄一當千大錢徑一寸四分重十六銖故呂䝉定荆州孫權賜錢一億錢既太貴但有空名民間患之後孫權下令曰徃日鑄大錢云以廣貨故聴之今聞人意不以為便其省之晋元帝過江用孫氏赤烏舊錢輕重雜行大者謂之比輪中者謂之四文呉興沈充又鑄小錢謂之沈郎錢錢既不多由是稍貴孝武帝太元三年詔曰錢國之重寳小人貪利銷壊無已監司當以為意廣州夷人寳貴銅鼓而州境素不出銅聞官私賈人皆貪比輪錢斤兩差重以入廣州貨與夷人鑄敗作鼓其重為禁制安帝元興中桓元輔政立議欲廢錢用榖帛孔琳之議曰聖王制無用之貨以通有用之財既無毁敗之費又省運致之苦此錢所以嗣功龜貝歴代不廢者也榖帛夲充衣食今分以為貨致損必多魏眀帝廢錢用榖四十年矣終以不便故捨榖帛而復用錢此已然之驗也元議遂不行宋文帝元嘉七年立錢置法鑄四銖文曰四銖重如其文人間頗盗鑄多剪鑿古錢取銅帝甚患之錄尚書江夏王義恭建議以一大錢當兩以防穿鑿議者多同之遂以一錢當兩行之經時公私非便乃罷自元嘉中鑄四銖錢輪郭形制與古五銖同價無利百姓不資盗鑄孝武孝建初鑄四銖文曰孝建一邊為四銖其後稍去四銖專為孝建三年尚書右丞徐爰議曰貨薄民貧公私俱罄不有革造將大乏宜應式遵古典収銅繕鑄納贖刋刑著在往䇿今宜以銅贖刑随罪為品詔可之所鑄錢形式薄小輪郭不成就扵是民間盗鑄者雲起雜以鉛錫並不牢固又翦鑿古錢以取其銅錢既轉小稍違官式雖重制嚴刑人吏官長坐死免者相係而盗鑄彌甚百物踊貴人患苦之乃立品格薄小無輪郭者悉加禁斷時議者又以銅轉難得欲鑄二銖錢顔竣陳三不可逮廢帝景和二年遂鑄二銖錢文曰景和形式轉細官錢每出民間即模効之而大小厚薄皆不及也無輪郭不磨翦鑿者謂之耒子尤薄輕者謂之荇葉市井通用之永光元年沈慶之啓通私鑄由是錢貨亂改一千錢長不盈三寸大小稱此謂之鵝眼錢劣扵此者謂之綖環錢入水不沉随手破碎市井不復斷數十萬錢不盈一掬㪷米一萬商貨不行眀帝太始初惟禁鵝眼綖環其餘皆通用復禁民鑄官署亦廢工尋又普斷唯用古錢齊高帝建元四年奉朝請孔覬上書曰三呉國之闗閫比嵗被水潦而糴不貴是天下錢少非榖穰賤此不可不察也鑄錢之弊在輕重屢變重錢患難用而難用為無累輕錢患盗鑄而盗鑄為禍深民所盗鑄嚴法不禁者由上鑄錢惜銅愛工也惜銅愛工也者謂錢無用之器以通交易務欲質輕而數多不慮其患也自漢鑄五銖錢至宋文帝四百餘年制度有廢興而不變五銖者其輕重可法得貨之宜也上乃使諸州大市銅欲更鑄㑹上崩乃止梁初惟京師及三吳荆郢江湘梁益用錢其餘州郡則雜以榖帛交易交廣之域則全以金銀為貨武帝乃鑄錢肉好周郭文曰五銖重如其文而又别鑄除其肉郭謂之女錢二品並行百姓或私以古錢交易有直百五銖五銖女錢太平百錢定平一百五銖雉錢五銖對文等號輕重不一天子頻下詔書非新鑄二種之錢並不許用而趨利之徒私用轉甚至普通中乃議盡罷銅錢更鑄鐵錢人以鐵賤易得並皆私鑄及大同以後所在鐵錢遂如邱山物價騰貴交易者以車載錢不復計數而惟論貫啇旅姦詐因之以求利自破嶺以東八十為百名曰東錢江郢以上七十為百名曰西錢京師以九十為百名曰長錢中大同元年天子乃詔通用足陌詔下而人不從錢陌益少至扵末年遂以三十五為百云陳初承梁喪亂之後鐵錢不行始梁末又有兩柱錢及鵝眼錢于時人雜用其價同但兩柱重而鵝眼輕私家多鎔鑄又間以錫鐵兼以粟帛為貨至文帝天嘉五年改鑄五銖初出一當鵞眼之十宣帝大建十一年又鑄大貨六銖以一當五銖之十與五銖並行後還當一人皆不便乃相與訛言曰六銖錢有不利縣官之象未㡬而帝崩遂廢六銖而行五銖以至陳亡而嶺南諸軍州多以鹽米布帛交易俱不用錢云北齊神武霸政之初承魏猶用永安五銖遷鄴已後百姓私鑄體制漸别遂各以為名有雍州青赤梁州生厚𦂳錢吉錢河陽生澀天柱赤牽之稱冀州之北錢皆不行交易者皆以絹布神武帝乃収境内之銅及錢仍舊文更鑄流之四境未㡬之間漸復細薄姦偽競起文宣受禪除永安之錢改鑄常平五銖重如其文其錢甚貴且制造甚精至乾明皇建之間往往私鑄鄴中用錢有赤郭青熟細眉赤生之異河南所用有青薄鉛錫之别青齊徐兖梁豫荆河等州輩類各殊武平以後私鑄轉甚或以生鐵和銅至于齊亡卒不能禁後周之初尚用魏錢及武帝保定元年七月乃更鑄布泉錢以一當五與五銖並行是時梁益之境又雜用古錢交易而河西諸郡或用西域金銀錢而官不禁建徳三年六月更鑄五行大布錢以一當十大収商賈之利與布泉錢並行四年七月又以邊境之上人多盗鑄乃禁五行大布錢不得出入四闗其布泉錢聴入而不聴出五年正月以布泉漸賤而人不用遂廢之初令私鑄者絞從者逺配為戸齊平已後山東之人猶雜用齊氏舊錢至宣帝大象元年十一月又鑄永通萬國錢以一當千與五行大布及五銖凡三品並用隋高祖既受周禪以天下錢貨輕重不等乃更鑄新錢背靣肉好皆有周郭文曰五銖而重如其文每錢一千重四斤二兩是時錢既新出百姓或有私鎔鑄三年四月詔四靣諸闗各付百錢為様從闗外來勘様相似然後得過様不同者即壊以為銅入官詔行新錢已後前代舊錢有五行大布永通萬國及齊常平所在勿用以其貿易不止四年詔仍依舊不禁者縣令奪半年祿然百姓習用既久猶不能絶五年正月詔又嚴其制自是錢貨始一所在流布百姓便之是時見用之錢皆須和易錫鑞錫鑞既賤求利者多私鑄之錢不可禁約其年詔乃禁出錫鑞之處並不得私有採取十年詔晋王廣聴扵揚州立五鑪鑄錢其後姦猾稍多漸磨鑪錢郭取銅私鑄又雜以鉛錫遞相放効錢遂輕薄乃下惡錢之禁京師及諸州邸肆之上皆令立榜置様為准不中様者不入扵市十八年詔漢王諒聴扵并州立五鑪鑄錢是時江南民間錢少晋王又請於鄂州白紵山有銅鑛處錮銅鑄錢於是詔聴置十鑪鑄錢又詔蜀王秀聴扵益州立五鑪鑄錢是時錢益濫惡乃令有司括天下邸肆見錢非官鑄者皆毁之其銅入官而京師以惡錢貿易為吏所執有死者數年之間私鑄頗息大業已後王綱弛紊巨姦大猾遂多私鑄錢轉薄惡初每千猶重二斤後漸輕至一斤或翦鐵鐷裁皮糊紙以為錢相雜用之貨賤物貴以至於亡唐髙祖即位仍用隋之五銖錢武徳四年廢五銖錢鑄開元通寳錢徑八分重二銖四參積十文重一兩千文重六斤四兩仍置鑄錢監扵洛并幽益桂等州秦王齊王各賜三鑪鑄錢右僕射裴寂一鑪議者以新錢輕重大小最為折衷逺近甚便之後盗鑄漸起而所在用錢濫惡顯慶五年九月以天下惡錢轉多乃令所在官為市取之五惡錢酬一好錢百姓以惡錢價賤私自蔵之候官禁之弛高宗又令以好錢一文買惡錢兩文弊仍不息至乾封元年封岳之後又改造新錢文曰乾封泉寳徑一寸重二銖六分仍與舊錢並行新錢一文當舊錢十周年之後舊錢並廢初開元錢文給事中歐陽詢制詞及書時稱其工其字含八分及篆隸體其詞先上後下次左後右流俗謂之開通元寳錢及鑄新錢乃同流俗乾字直上封字在左尋寤錢文之誤又縁改鑄商賈不通米帛增價乃議却用舊錢二年正月下詔曰開元通寳高祖創之太宗承之萬代之法也乾封新錢更不須鑄仍令天下置鑄之處並鑄開元通寳錢既而私鑄更多有將船㭖宿於江中鼓鑄所部不能覺察錢復惡濫儀鳳四年四月令東都出逺年糙米及粟就市給糴㪷别納惡錢百文其惡錢令少府司農毁之是時鑄多錢賤粟貴扵是權罷少府鑄錢尋復舊則天長安中揭様於市令民間依様用錢俄而簡擇難於交易又降勑非穿穴及鐵錫銅液者並許用之自是盗鑄蜂起有鎔錫以錢模夾之斯須則盈千百開元五年知政事宋璟請禁天下惡錢行二銖四參錢時江淮錢尤濫惡有官鑪偏鑪稜錢時錢等數色璟乃遣監察御史蕭隠之充江淮使隠之乃令率戸出錢務加督責百姓乃以上青錢充惡錢納之其小惡者或沉之扵江湖以免罪戾扵是市井不通物價騰起流聞京師隠之貶官璟因罷相張嘉貞知政事請不禁鑄錢弛其禁民乃安之二十二年張九齡初知政事眀皇下其議左監門衛錄事參軍劉秩上議曰古者以珠玉為上幣黄金為中幣刀布為下幣今之錢即古之下幣也今若捨之任人自鑄則上無以御下下無以事上遂陳五不可時黄門侍郎裴耀卿等皆以為恐小人棄農逐利而濫惡更甚事遂不行但下詔禁惡錢而已天寳中内作判官韋倫請厚價募工由是役用减而鼓鑄多天下置九十九鑪鑄錢絳州三十鑪楊潤宣鄂蔚各十鑪益鄧郴各五鑪洋州三鑪定州一鑪約每鑪役丁匠三十人每年除六月七月停作餘十月作十畨每鑪約用銅二萬一千二百二十斤白鑞三千七百九斤黑錫五百四十斤每千錢除工匠外用銅鑞錫約價七百五十文每鑪嵗鑄錢三千三百緡約一嵗計鑄錢三十二萬七千餘緡肅宗乾元元年經費不給有司請鑄錢使第五琦鑄乾元重寳錢徑一寸每緡十斤與開元錢參用以一當十二月琦入為相又請更鑄重輪乾元錢一當五十二十斤成貫詔可之於是新錢與開元乾元錢三品並行尋而榖價騰貴米斗至七千餓死者相枕於道乃擡舊開元錢以一當十减重稜乾元錢以一當三十緣人厭錢價不定民間擡加價錢為虚錢長安城中競為盗鑄京兆尹鄭叔清擒捕之數月間榜死者八百餘人上元元年以重稜當五十錢减作三十以開元舊錢一當十寳應元年改乾元重稜小錢一當二重稜大錢一當三尋又改行乾元大小錢並以一當一自第五琦更鑄犯法者日數百至是人甚便之鹽鐵轉運使劉晏以江淮諸州任土所出皆賤弱難致之貨以輸京師不足償道路之直扵是積之江淮易銅鉛薪炭廣鑄錢嵗得十餘萬緡輸京師及荆揚二州自是錢始增加大歴七年禁天下鑄銅器建中元年戸部侍郎韓洄上言江淮錢監嵗供鑄錢四萬五千貫輸于京師度工用轉送之費每貫計錢二千是夲倍利也今啇州有紅崖冶出銅益多又有洛源監不理久廢請增工鑿山以取銅興洛源錢監置十鑪鑄之每嵗計出錢七萬二千貫度工用轉送之費貫計錢九百則利浮夲也其江淮七監請皆停罷從之元和三年鹽鐵使李巽上言郴州平陽高亭兩縣之境有平陽冶及馬迹曲木等古銅坑二百八十餘井今請於郴州舊桂陽監置鑪兩所日鑄二十萬以年計之鑄成七千萬貫有利扵人從之其年六月下蓄錢之禁又以有銀之山必有銅鑛銅可資鼓鑄銀無益扵生民自五嶺以北銀宜禁採惟課採銅資官鑄作四年京師用錢毎緡除二十陌扵是禁之又禁錢出嶺除採銀禁六年制公私交易十緡以上即兼用段疋其年三月河東節度使王鍔奏請扵蔚州加置至五鑪八年四月勑以錢重貨輕出内庫錢五十萬貫令兩市収市布帛毎端疋估加十之一十二年禁蔵錢不得過五十緡十五年八月中書門下奏令諸道公納銅器各納所在節度團練防禦經畧使給與價直仍令鑄錢長慶元年九月勑泉貨之義所貴通流如聞比來用錢所在除陌不一與其禁人之必犯未若從俗之所宜交易往來務令可守其内外公私給用錢貨從今以後每千墊八十以用九百二十為貫漕運秦欲攻匈奴運糧使天下飛芻輓粟起於黄腄腄音誰東萊二縣琅琊負海之郡轉輸北河北河今朔方之北河率三十鍾而致一石至漢興高皇帝時漕轉山東之粟以給中都官嵗不過數十萬石孝武建元中通西南夷作者數萬人千里負擔饋糧率十餘鍾致一石其後東滅朝鮮置滄海郡人徒之費擬西南夷又衛青擊匈奴取河南地今朔方之地復興十萬餘人築衛朔方轉漕甚逺自山東咸被其勞元光中大司農鄭當時言於帝曰異時闗東運粟漕水從渭中上道九百餘里度六月而罷若引渭穿渠起長安傍南山下至河三百餘里度可三月而罷此損漕省半天子乃令齊水工徐伯表發卒穿漕渠以運大便利其後河東守番係言漕從山東西嵗百餘萬石更底柱之險敗亡甚多而亦頗費請穿渠引汾溉皮氏汾隂下引河溉汾隂蒲坂下度可得五千頃故盡河壖棄地度可得榖二百萬石以上榖從渭上與闗中無異而底柱之東可無復漕天子又以為然渠田數嵗河徙渠田遂廢其後人有上書欲通褒斜道褒斜二水名褒水東流南入沔今漢中郡褒城縣斜水北流入渭今武功縣及扶風郡及漕事下御史大夫張湯湯聞其事言抵蜀故道多坂廻逺今穿襃斜道少坂近四百里而襃水通沔斜水通渭皆可以行船漕漕從南陽上沔入襃襃之絶水至斜間百餘里以車轉從斜入渭如此漢中之榖可致山東從沔無限便扵底柱之漕且襃斜林木山箭之饒擬扵巴蜀天子然之拜湯子卬為漢中守發數萬人作襃斜道五百餘里道果便近而水多湍石不可漕孝宣即位百姓安土嵗數豐稔榖石五錢農人少利時耿夀昌以善為算能商功利得幸扵上五鳳中奏言故事嵗漕闗東榖四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原等郡榖足可以供京師可以省闗東漕卒過半天子從其計御史大夫蕭望之奏言夀昌欲近糴漕闗内之榖築倉理船費直二萬萬餘有動衆之功恐生旱氣人被其災夀昌習於商功分銖之事其深計逺慮誠未足任宜且如故帝不聴漕事果便魏齊王正始四年司馬懿使鄧艾行陳項以東至夀春艾以為田良水少不足以盡地利宜開河渠可以大積軍糧又通漕運之道懿從之乃廣開漕渠東南有事與衆泛舟而下逹于江淮資食有儲而無水害艾所建也晋武帝太始十年鑿陜南山决河東注洛以通漕運雖有此詔而未成功懐帝永嘉元年修千金堨於許昌以通運成帝咸和六年以海賊寇抄運漕不繼發王公已下千餘丁各運米六斛穆帝時頻有大軍糧運不繼制王公已下十三戸共借一人助度支運後魏自徐揚内附之後仍世經畧江淮扵是轉運中州以實邊鎮百姓疲扵道路有司請扵水運之次随便置倉乃於小平石門白馬津漳涯黑水濟州陳郡大梁凡八所各立邸閣每軍國有須應機漕引此費役微省時三門都將薛欽上言計京西水次汾華二州𢎞農河北河東平陽等郡年常綿絹及貲麻皆折公物雇車牛送京道險人弊費公損私略計華州一車官酬絹八疋三丈九尺别有私人雇價布八十疋河東一車官酬絹五疋二丈别有私人雇價布五十疋自餘州郡雖未練多少推之逺近應不减此今求車取雇絹三疋市材造船不勞採斫計船一艘舉十三車車取三疋合有三十九疋雇作首并匠及船上雜具食直足以成船計一船䞉絹七十八疋布七百八十疋又租車一乘官格二十斛成載私人雇價逺者五斗布一疋近者一石布一疋准其私費一車有布逺者八十疋近者四十疋造船一艘計舉七百石准其雇價應有千四百疋今取布三百疋造船一艘并船上覆理雜事計一船有䞉布千一百疋又汾州有租庸調之處去汾不過百里華州去河不滿六十里並令計程依舊酬價車送船所船之所運惟逹㵢陂其陸路從㵢陂至倉門調一車雇絹一疋租一車布五疋則於公私為便詔從之而未能盡行也孝文太和七年薄骨律鎮將刁雍上表曰奉詔高平安定統萬薄骨律鎮今靈武郡統萬今朔方郡是也及臣所守四鎮出車五千乘運屯榖五十萬斛付沃野鎮以供軍糧臣鎮去沃野八百里道多深沙輕車往來猶以為難設令載榖二千石每至深沙必致滯䧟又榖在河西轉至沃野越渡大河計奉五千乘運十萬斛百餘日乃得一返大廢生民耕墾之業車牛艱阻難可全至一嵗不過三運五十萬斛乃經三年臣聞鄭白之渠遂引淮海之粟泝流數十周年乃得一至猶稱國有儲糧民用安樂求扵􅀈􅀈山在今平原郡高平縣今笄頭山河水之次造船二百艘二船為一舫一船勝二千斛一舫十人計須千人臣鎮内之兵率皆習水一運二十萬斛方舟順流五日而至自沃野牽上十日還到合六十日得一返從三月至九月三返運送六十萬斛計用人工輕於車運十倍有餘不費牛力又不廢田詔曰知欲造船運榖一冬即大省人力既不費牛又不廢田甚善非但一運自可永以為式隋文帝開皇三年以京師倉廪尚虛議為水旱之備詔扵蒲陜虢熊伊洛鄭懐邠衛汴許汝等水次十三州置募運米丁又於衛州置黎陽倉陜州置常平倉華州置廣通倉轉相灌注漕闗東及汾晋之粟以給京師又遣倉部侍郎韋瓚向蒲陜以東募民能扵洛陽運米肆拾碩經底柱之險逹于常平者免其征戍其後以渭水多沙流有深淺漕者苦之四年詔宇文愷率水工鑿渠引渭水自大興城東至潼闗三百餘里名曰廣通渠轉運通利闗内頼之煬帝大業元年發河南諸郡男女百餘萬開通濟渠自西苑引榖洛水逹于河又引河通扵淮海自是天下利扵轉輸四年又發河北諸郡百餘萬衆開永濟渠引沁水南逹于河北通涿郡自是丁男不供始以婦人從役五年扵西域之地置西海鄯善且末等郡逐吐谷渾得其地並在今酒泉張掖晋昌郡之北今悉為北狄之地謫天下罪人配為戍卒大開屯田發西方諸郡運糧以給之七年冬大會涿郡分江淮南兵配驍衛大將軍來䕶兒别以舟師濟滄海舳艫數百里並載軍糧期與大兵㑹扵平壤唐咸亨三年扵岐州陳倉縣東南開渠引渭水入昇原渠通船栰至長安故渠開元十八年眀皇問朝集使利害之事宣州刺史裴耀卿上便宜曰江南户口稍廣倉庫所資惟出征庸更無征防緣水陸遥逺轉運艱辛功力雖勞倉儲不益竊見毎州所送租庸調等夲州正月二月上道至揚州入斗門即逢水淺已有阻礙須停留一月以上三月四月以後始渡淮入汴多屬汴河乾淺又船運停留至六月七月始至河口即逢黄河水漲不得入河又須停一兩月待河水小始得上河入洛即漕路乾淺船艘隘閙船載停滯備極艱辛計從江南至東都停滯日多得行日少糧食既皆不足折欠因此而生又江南百姓不習河水皆轉雇河師水手更為損費伏見國家舊法往代成規擇制便宜以垂長久河口元置武牢倉江南船不入黄河即扵倉内便貯鞏縣置洛口倉從黄河不入漕洛即扵倉内安置爰及河陽倉栢崖倉太原倉永豐倉渭南倉節級取便例皆如此水通則随近轉運不通則且納在倉不滯逺船不憂欠耗比扵曠年長運利便一倍有餘今若且置武牢洛口等倉江南船至河口即却還夲州更得其船充運并取所減脚錢更運江淮變造義倉每年剩得一二百萬石即數年之外倉廪轉加其江淮義倉多為下濕不堪久貯若無般運三兩年色變即給貸費散公私無益疏奏不省至二十一年耀卿為京兆尹京師雨水害稼榖價踴貴耀卿奏曰國家帝業夲在京師萬國朝宗百代不易之所但為秦中地狹収粟不多儻遇水旱便則匱乏往者貞觀永徽之際祿廪數少每年轉運不過一二十萬石所用便足以此車駕久得安居今昇平日久國用漸廣每年陜洛漕運數倍扵前支猶不給陛下數幸東都以就貯積為國大計不憚劬勞皆為憂民而行豈是故欲來往若能更廣陜運支入京倉廪常有二三年糧即無憂水旱今日天下輸丁約有四百萬人每丁支出錢百文充陜洛運脚五十文充營窖等用貯納司農及河南府陜州以充其費租米則各随逺近任自出脚送納東都至陜河路艱險既用陸脚無由廣致若能開通河道變陸為水則所支有餘動盈萬計且江南租船所在侯水始敢進發吳人不便河漕由是所在停留日月既淹遂生隠盗臣請扵河口置一倉納江東租米便扵船廻從河口分入河洛官自雇船載運河運者至三門之東置一倉既屬水險即扵河岸傍山車運十數里至三門之西又置一倉毎運置倉即般下貯納水通即運水細便止漸至太原倉泝河入渭更無停留所省巨萬臣常任濟定冀等三州刺史詢訪故事前漢都闗内年月稍久及隋亦在京師縁河皆有舊倉所以國用常贍若依此行用利便實深上大恱尋以耀卿為黄門侍郎同中書門下平章事勑鄭州刺史河南少尹蕭炅自江淮至京以來檢古倉節級貯納仍以耀卿為轉運都使扵是始置河隂縣及河隂倉河清縣置栢崖倉三門東置集津倉三門西置三門倉開三門北山十八里陸行以避湍險自江淮西北泝鴻溝悉納河隂倉自河隂候水調浮漕送含嘉倉又取曉習河水者遞送納于太原倉所謂北運也自太原倉浮渭以實闗中凡三年運七百萬石省脚三十萬耀卿罷相後緣邊運險澁頗有欺隠議者又言其不便事又停廢二十七年河南採訪使汴州刺史齊澣以江淮漕運經淮水波濤有沉損遂開廣濟渠下流自泗州虹縣至楚州淮隂縣北十八里合于淮而踰時畢功既而以水流浚急行旅艱險旋即停廢却由舊河二十九年陜州刺史李齊物避三門河路急峻扵其北鑿石渠通運船為漫流河泥旋填淤塞不可漕而止天寳三年左常侍兼陜州刺史韋堅開漕河自苑西引渭水因古渠至華隂入渭引永豐倉及三門倉米以給京師名曰廣運潭以堅為天下轉運使灞滻二水㑹扵漕渠每夏大雨輙皆填閼大歴之後漸不通舟天寳中毎嵗水陸運米二百五十萬石入闗舊扵河南路運至陜郡太原倉又運至永豐倉及京師大倉開元初河南尹李傑始為陸運使從含嘉倉至太原倉置八遞塲相去每塲四十里毎嵗冬初起運八十萬石後至一百萬石毎遞用車八百乘分為前後交兩月而畢其後漸加至天寳七載滿二百五十萬石每遞用車千八百乘自九月至正月畢天寳九載九月河南尹裴逈以遞重恐傷牛扵是又以遞塲為交塲兩遞簡擇近水處為宿塲天寳十載九月相州刺史李南金又上表曰臣以舊籍天下水陸估價車乘有綱運各令官兵提廵共五十萬大率大歴之後以水陸運使兼防押四十萬石各押入闗鹽鐵茶鹽筴之利管子言之盡矣其所以相桓公霸齊鹽筴之利也漢孝武中年大興征伐財用匱竭扵是大農工鹽鐵丞孔僅東郭咸陽言山海天地之蔵宜屬少府陛下弗私以屬大農佐賦願募民自給費因官器作煮鹽官與牢盆牢盆者煮鹽之器也浮食奇民欲擅管山海之貨以致富羡役利細民其沮事之議不可勝聴敢私鑄鐵器煮鹽者釱左趾釱音徒計及足鉗也沒其器物郡不出鐵者置小鐵官使屬在所縣使僅咸陽乗𫝊舉行天下鹽鐵作官府主煮鑄及出納除故鹽鐵家富者為吏吏益多賈人矣卜式為御史大夫見郡國多不便縣官作鹽鐵器苦惡價貴或彊令民買之而船有算商者少物貴乃因孔僅言船算事上不說孝昭元始六年令郡國舉賢良文學之士問以民所疾苦教化之要皆對曰願罷鹽鐵酒𣙜均輸官無與天下争利示以儉節然後教化可興御史大夫桑𢎞羊難以為此國家大業所以制四夷安邊足用之夲往者豪彊之家得管山海之利成姦偽之業家人有寳器尚猶柙而蔵之况天地之山海乎夫權利之處必在山澤非豪民不能通其利異時鹽鐵未籠布衣有朐邴人君有吳王亦可見矣鹽鐵之利佐百姓之急奉軍旅之費不可廢也扵是丞相奏曰賢良之士不眀縣官猥以鹽鐵為不便宜罷郡國𣙜酤酒闗内鐵奏可扵是利復流下庶民休息孝元帝時嘗罷鹽鐵官三年而復之後漢眀帝時尚書張林上言鹽鐵食之急者官自可鬻和帝即位詔曰孝武𣙜収鹽鐵之利以奉師旅之費中興以來猶未能革先帝恨之故遺戒罷鹽鐵之禁縱民煮鑄入税縣官如故事布告天下獻帝建安初闗中百姓流入荆州者十餘萬家及聞夲土安寜皆企願思歸而無以自業扵是衛覬議以為鹽者國之大寳自喪亂以來放散今宜舊置使者監賣以其直益市犂牛百姓歸者以供給之勸耕積粟以豐殖闗中逺者聞之必多競還魏武扵是遣謁者僕射監鹽官移司隸校尉居𢎞農流民果還闗中豐實後魏宣武時河東郡有鹽池舊立官司以収税利先是罷之而人有富彊者專擅其用貧弱者不得資益延興末復立監司量其貴賤節其賦入公私兼利其後更罷更立至扵永熈自遷鄴後扵滄瀛幽青四州之境傍海煮鹽滄州置竈一千四百八十四瀛州置竈四百五十二幽州置竈百八十青州置竈五百四十六又扵邯鄲置竈四計終嵗合収鹽二十萬九千七百八斛四斗軍國所資得以周贍矣後周文帝霸政之初置掌鹽之政令一曰散鹽煮海以成之二曰監鹽引池以化之三曰形鹽掘地以出之四曰飴鹽扵戎以取之凡監鹽毎池為之禁百姓取之皆為税隋開皇三年通鹽池鹽井與百姓共之唐開元元年十一月左拾遺劉彤上表曰臣聞漢孝武之時廐馬三十萬後宫數萬人外討夷狄内興宮室殫費之甚實倍當今然而古費多而貨有餘今用少而財不足者何也豈非古取山澤而今取貧民哉取山澤則公利厚而人歸扵農取貧民則公利薄而人去其業故先王作法也山海有官虞衡有職輕重有術禁發有時一則專農二則饒國眀皇令宰臣議其可否咸以鹽鐵之利甚益國用遂令將作大匠姜師度戸部侍郎强循俱攝御史中丞與諸道按察使撿責海内鹽鐵之課二十五年倉部格蒲州鹽池令州司監當租分與有力之家營種之課収鹽每年上中下畦通融収一萬石又屯田格幽州鹽屯每屯配丁五十人一年収率滿二千八百石又成州長道縣鹽井一所並節級有賞罰蜀道陵綿等十州鹽井總九十所每年課鹽都當錢八千七百五十一貫陵州鹽井一所課都當錢二千六十一貫綿州井四所都當錢二百九十二貫資州井六十八所都當錢一千十三貫瀘州井五所都當錢一千八百五十貫榮州井十二所都當錢四百貫梓州都當錢七百一十七貫遂州四百一十五貫閬州一千七百貫普州二百七十八貫遂寜府都當錢二千七百九十三貫果州都當錢九千九百八十七貫卭州都當錢三百七貫初徳宗納戸部侍郎趙贊議稅天下茶漆竹木十取一以為常平夲錢至貞元八年鹽鐵使張滂奏出茶州縣若山及商人要路以三等定估計税其一自是嵗得錢四十萬緡然水旱亦未嘗拯之也穆宗即位兩鎮用兵帑蔵空虚鹽鐵使王播增天下茶稅率百錢增五十及王涯判二使置𣙜茶使徙民茶樹扵官塲焚其舊積天下大怨武宗即位鹽鐵轉運崔珙增江淮茶税是時茶商所過州縣有重稅或掠奪舟車露積雨中諸道置邸以収稅謂之搨地錢故私販益起鬻爵漢孝文時晁厝說上曰欲人務農在扵貴粟貴粟之道在扵使人以粟為賞罰今募天下入粟縣官得以拜爵得以除罪如此富人有爵農人有錢粟有所洩夫能入粟以受爵皆有餘者也取有餘以供上用則貧人之賦可損所謂以有餘補不足令出而人利者也順扵人心所補者三一曰主用足二曰民賦少三曰勸農功爵者上之所擅出扵口而無窮粟者人之所種生扵地而不乏夫得高爵與免罪人之所甚欲也使天下人入粟扵邊以受爵免罪不過三嵗塞下之粟必多矣扵是從厝之言令人入粟邊六百石爵上造第二等爵稍增至四千石為五大夫第九等爵萬二千石為大庶長第十八等爵各以多少級數為差厝復奏言陛下幸使天下入粟塞下以拜爵甚大惠也竊恐塞卒之食不足用大洩天下粟邊食足以支五嵗可令入粟郡縣矣入諸郡縣以備凶災足支一嵗以上可時赦勿収農人租如此徳澤加扵萬民矣上從之孝景帝時上郡以西旱復修賣爵令而裁其價以招人裁謂减省及徒復作得輸粟扵縣官以除罪孝武帝元朔元年外事四夷内興功利國用空竭乃募人能入奴婢以終身復為郎增秩及入羊馬為郎始於此五年有司議令民得買爵及贖禁錮免减罪請置賞官名曰武功爵茂陵中書冇武功爵一級曰造士二級曰閑輿衛三級曰良士四級曰元戎士五級曰官首六級曰秉鐸七級曰千夫八級曰樂卿九級曰執戎十級曰政戾庶長十一級曰軍衛此武帝所置以寵軍功也顔師古云此下云級十七萬凡直三十餘萬金茂陵書止十一級皆前漢之制至後漢和帝依級散其賞曰乃故制軍功也則計數不足與夲文乖矣或者茂陵之書不說盡也級十七萬凡直三十餘萬金請買武功爵官首者試補吏先除千夫如五大夫五大夫者舊二十等爵之第九級也至此以上始免徭役故毎先選以為吏千夫者乃武功十一等爵之第七也亦得免役今則先除為吏比扵五大夫也其有罪又减二等爵得至樂卿樂卿者乃武功爵第八言買爵惟得至第八以崇軍功軍功多用超等大者封侯卿大夫小者郎吏吏道雜而多端然官職耗廢矣元鼎初豪富皆爭匿財不助縣官惟卜式數求入財天子乃超拜式為中郎賜爵左庶長田十頃布告天下以風百姓始令吏得入粟補官郎至六百石後桑𢎞羊請令民得入粟補官及罪人贖令民能入粟甘泉各有差以復終身所忠又言世家子弟富人或鬬雞走狗弋獵愽戲亂齊民乃徵諸犯令相引數千人名曰株送徒入財者得補郎後漢孝安永初三年天下水旱用度不足三公奏請令吏民入榖得闗内侯靈帝懸洪都之榜開賣官之路公卿以降悉有等差廷尉崔烈入錢五百萬以買司徒刺史二千石遷除皆責助理宫室錢大都至二三千萬錢不畢至自殺羊續為太尉時拜三公者皆輸東園禮錢千萬令中使督之名為左騶其所往輙迎致禮厚加贈賂續乃坐使人扵單席上舉緼袍以示之晋武帝太康三年問劉毅曰卿以吾可方漢何主也對曰桓靈之主帝曰吾雖徳不及古人猶克已為理南平吳會一同天下方之桓靈不亦甚乎對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之乃不如也後魏明帝孝昌二年初承喪亂之後倉廪空虚遂班入粟之制輸粟八千石賞散侯六千石散伯四千石散子三千石散男職人輸七百石賞一大階授以實官白人輸五百石聴依第出身千石加一大階諸沙門有輸粟四千石入京倉者授夲州統各有差唐至徳二年七月宣諭使侍御史鄭叔清奏承前諸使下召納錢物多給空名告身雖假以官賞其忠義猶未盡才能今皆量文武才藝奏聞便寫告身諸道士女道士及僧尼如納錢請准勑廻授餘人并情願還俗授官勲邑號等亦聴又准敕納錢百千文與眀經出身如曾受業粗通帖䇿修身慎行鄉曲所知者量减二十千文如先經舉送到省落第者减五十千文若粗識文字者准元敕處分未曾讀學不識文字者加三十千其商賈准令所在収税如能據所有資財十分納四助軍者便與終身優復如扵敕條外有悉以家産助國嘉其竭誠待以非次如先出身及官資並量資歴好惡各據夲條格例節級優加擬授如七十以上情願授致仕官者毎色内量十分減二分錢時屬幽冦内侮天下多虞軍用不充權為此制尋即停罷𣙜酤漢孝武天漢三年初𣙜酒酤孝昭始元末丞相車千秋奏罷酒酤賣酒斗四錢孝元時賈捐之上書曰昔孝文時天下人賦四十丁男三年而一事今天下人賦數百造鹽鐵𣙜酒之利以佐用度猶不能足而人困矣王莽時義和魯匡言名山大澤鹽鐵錢布帛五均賖貸斡在縣官惟酒酤獨未斡請法古令官作酒以二千五百石為一率開一壚以賣壚謂賣酒之區也以其一邊高形如壚故取其名也月讎五十釀為准一釀用麤米二斛麴一斛得成酒六斛六斗除米麴夲價計其利而什分之以其七入官其三及糟酨灰炭胾酢醬也酨才伐反給工器薪樵之費扵是置命士督五均六斡而人愈病陳文帝天嘉中虞荔等以國用不足奏請𣙜酤從之隋文帝開皇三年罷酒坊與百姓共之唐廣徳二年十二月敕天下州各量定酤酒戸随月納稅除此外不問官私一切禁斷大歴六年二月量定三等逐月稅錢並充市絹進奉建中三年制禁人酤酒官司置店自酤収利以助軍費算緡漢孝武元狩四年自作皮幣鑄白金後商賈以幣之變多積貨逐利扵是公卿言商賈之衆貧者蓄積無有皆仰縣官異時笇軺車賈人緡錢皆有差請笇如故緡絲也以貫錢一貫千文出二十為笇也詩云維絲伊緡軺小車也諸賈人末作貰貸買賣居邑貯積諸物及商人取利者雖無市籍各以其物自占占隠度也各隠度其財物多少而為名簿送之扵官也占音之贍反率緡錢二千而算一率計有二千錢者則出一笇也諸作有租及鑄以手力所作而賣也率緡錢四千而算一非吏比者三老北邊騎士軺車一笇比例也身非為吏之例非為三老非為北邊騎士而亦有軺車皆令之出一笇商賈人軺車二笇船五丈以上一算匿不自占占不悉戍邊入緡錢有能告者以其半畀之天子既下緡錢令而尊卜式百姓終莫分財佐縣官扵是楊可告緡徧天下中家以上大抵皆遇告憲司理之獄少反者得民財物以億計奴婢十萬數田大縣數百頃小縣百餘頃宅亦如之初大農管鹽鐵官布多置水衡欲以主鹽鐵及楊可告緡上林財物衆乃令水衡主上林上林既充滿益廣乃分緡錢諸官而水衡少府大農太僕各置農官往往即郡縣比沒入田田之其沒入奴婢分諸苑養狗馬禽獸及與諸官其後令吏得入粟補官及罪人贖入粟甘泉不復告緡晋自過江至扵梁陳凡貨賣奴婢馬牛田宅有文劵率錢一萬輸估四百入官賣者三百買者一百無文劵者随物所堪亦百分収四名為散估歴宋齊梁陳如此為常以人競商販不為田業故使均輸欲為懲勵雖以此為辭其實利在侵削此亦笇緡之類雜稅漢高帝十一年令諸侯王通侯常以十月朝獻及郡各以其口數率人嵗六十三錢以給獻費孝武元光六年冬初算商車太初四年冬行回中徙𢎞農都尉治武闗稅出入者以給闗吏卒食孝昭元鳳六年令郡國無斂今年馬口錢往時有馬口出斂今省之所謂租六畜宣帝時耿夀昌奏請增海租三倍天子從其計御史大夫蕭望之奏言故御史屬徐宮家在東萊言往年加海租魚不出長老皆言武帝時縣官嘗自漁海魚不出後予人魚乃出夫隂陽之感物類相應萬事盡然宜且如故上不聴王莽令諸取鳥獸魚鼈百蟲扵山林水澤及畜牧者嬪婦桑蠶織絍紡績補縫工匠醫巫卜祝及他方伎商販賈人坐肆列里區謁舍謁舍若今客館皆各自占所為扵其在所之縣官除其夲計其利十一分之而以其一為貢末年盗賊羣起匈奴侵冦大募天下囚徒人奴名曰豬突豨勇一切税吏民貲三十而取一後漢靈帝時南宫災中常侍張讓趙忠等說帝令斂天下田稅十錢以治宫室宋元嘉二十七年後魏南侵軍旅大起用度不充王公妃主及朝士牧守各獻金帛等物以助國用下及富室小人亦有獻私財數千萬者揚南徐兖江四州富有之家資滿五十萬僧尼滿二十萬者並四分換一過此率計事息即還齊武帝時王敬則為東揚州刺史以會稽邊帶湖海人無士庶皆保塘陂敬則以功力有餘悉評斂為錢以送臺庫帝納之竟陵王子良上表曰臣忝會稽粗閑物俗塘丁所上夲不入官良由陂湖宜壅橋路須通均夫訂直人自為用若甲分毁壊則年一修改一限堅完則終嵗無役今乃通課此直悉以還臺租賦之外更生一調致令塘路崩蕪湖源洩散害人損政實此為劇自東晋至陳西有石頭津東有方山津各置津主一人賦曹一人直水五人以檢察禁物及亡叛者荻炭魚薪之類出津者並十分稅一以入官淮水北有大市自餘小市十餘所備置官司稅斂既重時甚患之後魏眀帝孝昌二年稅市入者人一錢其店舍又為五等収稅有差北齊黄門侍郎顔之推奏請立闗市邸店之税開府鄧長顒贊成之後主大恱扵是以其所入以供御府聲色之費軍國之用不在此焉稅僧尼令曰僧尼坐受供飬逰食四方損害不少雖有薄斂何足為也後周閔帝初除市門稅及宣帝即位復興入市之稅每人一錢隋文帝登庸又除入市之稅唐開元十八年御史大夫李朝隠奏請薄百姓一年税錢充夲依舊令髙户及典正等捉随月収利將供官人料錢自天寳末年盗賊奔突克復之後府庫一空及所在屯師用度不足扵是遣御史康雲間出江淮陶銳往蜀漢豪啇富户皆籍其家資所有財貨畜産或五分納一謂之率貸所収巨萬計葢權時之宜其後諸道節度觀察使多率税啇賈以充軍資雜用或扵其津濟要路及市肆間交易之處計錢至一千以上者皆以分數稅之自是啇旅無利多失業矣上元中勑江淮堰壊啇旅牽船過處凖斛㪷納錢謂之埭程大歴初諸州府應稅青苖錢每畆十文充百司手力資課三年十月十六日臺司奏兵馬事縁上元十一年冬人民失業之後又其昨北寇未平之日百司支計不給每畆更加五文充大計錢平準均輸漢武帝征伐四夷國用空竭興利之官自此始也桑𢎞羊為大農中丞管諸會計事稍稍置均輸以通貨物矣謂諸當所輸於官者皆令輸其土地所饒平其所在時價官更扵他處賣之輸者既便而官有利漢書百官表大司徒屬有平凖令元封元年桑𢎞羊為治粟都尉領大農盡管天下鹽鐵以諸官各自市相與爭物故騰躍而天下賦輸或不償其僦費乃請置大農部丞數十人分部主郡國各往往縣置均輸鹽鐵官令逺方各以其物如異時商賈所轉販者為置平凖扵京師盡籠天下之貨物貴則賣之賤則買之如此富商大賈無所牟大利即反夲而萬物不得騰踊故抑天下物名曰平凖天子以為然而許之時南越初置郡數反發南方吏卒往誅之間嵗萬餘人帝數行幸所過賞賜用帛百餘萬疋錢金巨萬計皆取足大農諸均輸一嵗之中帛得五百萬疋人不益賦而天下用饒後漢章帝時尚書張林上言宜自交趾益州上計吏來市珍珤収採其利武帝所謂均輸也謂租賦并雇運之直官總取而官轉輸扵京故曰均輸也詔議之尚書僕射朱暉奏曰按王制天子不言有無諸侯不言多少食祿之家不與百姓爭利今均輸之法與賈販無異鹽利歸官則下窮怨布帛為租則吏姦盗誠非眀主所當宜行帝不從其後用度益奢平糴常平義倉漢宣帝時數嵗豐穰榖石至五錢農人少利大司農中丞耿夀昌請令邊郡皆築倉以榖賤時增其價而糴以利農榖貴時减價而糶名曰常平倉人便之上乃下詔賜夀昌爵闗内侯元帝即位罷之後漢眀帝永平五年作常平倉晋武帝欲平一江表時榖賤而布帛貴帝欲立平糴法用布帛市榖以為糧儲四年乃立常平倉豐則糴儉則糶以利百姓宋文帝元嘉中三呉水潦榖貴人饑彭城王義康立議以東土災荒人凋榖踊富商蓄米日成其價宜班下所在隠其虛實令積蓄之家聴留一年儲餘皆勒使糶貨為制平價此所謂常道行扵百代權宜用扵一時也又縁淮嵗豐邑地沃壤麥既已登黍粟行就可折其估賦仍就交市三呉饑人即以貸給使彊壯轉運以贍老弱未盡施行人賴之矣齊武帝永眀元年天下米榖布帛賤上欲立常平倉市積為蓄六年詔出上庫錢五千萬扵京師市米買絲綿紋絹布揚州出錢千九百一十萬揚州治建業今江寜縣也南徐州二百萬南徐州治京口各扵郡所市糴南荆河州二百萬南荆河州治夀春市絲綿紋絹布米大麥江州五百萬市米胡麻荆州五百萬郢州三百萬皆市絹綿布米大小豆大麥胡麻湘州二百萬市米布蠟司州二百五十萬司州治汝南今義陽郡是也西荆河州二百五十萬西荆河州治歴陽南兖州二百五十萬南兖州治廣陵雍州五百萬市絹綿布米使臺𫝊並扵所在市易後魏孝莊時秘書丞李彪上奏曰今山東饑京師儉臣以為宜折州郡常調九分之二京師都度支嵗用之餘各立官司年豐糴積扵倉時儉則減私之十二糶之如此人必力田以買官絹又務貯錢以取官粟年豐則常積嵗凶則直給明帝神龜正光之際自徐揚内附之後収内兵資與人和糴積為邊備也北齊河清中令諸州郡皆别置富民倉初立之日准所領中下户口數得一年之糧適當州榖價賤時斟量割當年義租充入齊制毎嵗人出租二石義租五㪷墾租送臺義租納郡以備水旱榖貴下價糶之賤則還用所糴之物依價糴貯後周文帝創置六官司倉掌辨九榖之物以量國用足即蓄其餘以待凶荒不足則止餘用足則以粟貸人春頒秋斂隋文帝開皇三年衛州置黎陽倉陜州置常平倉華州置廣通倉轉相灌注漕闗東及汾晋之粟以給京師京師置常平監五年工部尚書長孫平奏古者三年耕而餘一年之積九年作而有三年之儲雖水旱為災人無菜色皆由勸導有方蓄積先備請令諸州百姓及軍人勸課當社共立義倉収穫之日随其所得勸課出粟及麥扵當社造倉窖貯之即委社司執帳檢校毎年収積勿使損敗若時或不熟當社有饑饉者即以此榖賑給自是諸州儲峙委積至十五年以義倉貯在人間多有費損詔曰夲置義倉止防水旱百姓之徒不思久計輕爾費損扵後乏絶又北境諸州異扵餘處靈夏甘𤓰等十一州所有義倉雜種並納夲州若人有旱歉少糧先給雜種及逺年粟十六年又詔秦渭河廓豳隴涇寜原敷丹延綏銀等州社倉並扵當縣安置又詔社倉准上中下三等稅上户不過一石中戸不過七斗下户不過四斗唐貞觀初尚書左丞戴胄上言曰水旱凶災前聖之所不免國無九年之儲蓄禮經之所眀誡今喪亂之後户口凋殘毎嵗租米未實倉廪随即出給纔供當年若遇凶災將何賑恤故隋開皇立制天下之人節級輸粟名為社倉終扵文皇得無饑饉及大業中國用不足並取社倉以充官費故至末塗無以支給今請自王公以下爰及衆庶計所墾田稼穡頃畆每至秋熟准其見苖以理勸課盡令出粟稻麥之鄉亦同此税各納所在為立義倉年榖不登百姓饑饉當所州縣随便取給太宗從之自是天下州縣始置義倉每有饑饉則開倉賑給髙宗永徽二年九月頒新各義倉據地取稅實是勞煩宜令户出粟上上戸五石餘各有差六年京東西市置常平倉高宗武太后數十年間義倉不許雜用其後公私窘廹貸義倉支用自中宗神龍之後天下義倉費用向盡開元二十五年定式王公以下毎年戸别據所種田畆别税粟二升以為義倉其啇賈戸若無田及不足者上上户稅五石上中以下遞减各有差諸出給雜種准粟者稻榖一斗伍升當粟一斗其折納糙米者稻三石折納糙米一石四斗天寳八載凡天下諸色米都九千六百六萬二千二百二十石和糴一百一十三萬九千五百三十石闗内五十萬九千三百四十七石河東十一萬二百二十九石河西三十七萬一千七百五十石隴右一十四萬八千一百四石諸色倉糧總千二百六十五萬六千六百二十石北倉六百六十一萬六千八百四十石太倉七萬一千二百七十石含嘉倉五百八十三萬三千四百石太原倉二萬八千一百四十石永豐倉八萬三千七百二十石龍門倉二萬三千二百五十石正倉總四千二百一十二萬六千一百八十四石闗内道百八十二萬一千五百一十六石河北道百八十二萬一千五百四十六石河東道三千五十八萬九千一百八十石河西道七十萬二千六十五石隴右道三十七萬二千七百八十石劒南道二十二萬三千九百四十石河南道五百八十二萬五千四百一十四石淮南道六十八萬八千二百五十二石江南道九十七萬八千八百二十五石山南道十四萬三千八百八十二石義倉總六千三百一十七萬七千六百六十石闗内道五百九十四萬六千二百一十二石河北道一千七百五十四萬四千六百石河東道七百三十萬九千六百一十石河西道三十八萬八千四百三石隴右道三十萬三十四石劔南道百七十九萬七千二百二十八石河南道千五百四十二萬九千七百六十三石淮南道四百八十四萬八百七十二石江南道六百七十三萬九千二百七十石山南道二百八十七萬一千六百六十八石常平倉總四百六十萬二千二百二十石闗内道三十七萬三千五百七十石河北道百六十六萬三千七百七十八石河東道五十三萬五千三百八十六石河西道百六十六萬三千七百七十八石隴右道四萬二千八百五十石劒南道七萬七百四十石河南道百二十一萬二千四百六十四石淮南道八萬一千一百五十二石山南道四萬九千一百九十石江南道闕通志卷六十二
