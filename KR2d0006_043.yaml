body:
  text: 通志卷三十八宋右迪功郎鄭樵漁仲撰天文略第一總序東方七宿北方七宿西方七宿南方七宿天文序堯命羲和揭星鳥星火星虛星昴之象以示人使人知二至二分以行四時不幸而占候之説起持吉凶以惑人紛紛然務為妖妄是以刑網禁之臣謹按占候之學起於春秋戰國其時所謂精於其道者梓慎裨竈之徒耳後世之言天者不能及也魯昭公十七年冬有星孛于大辰西及漢禆竈言於子産曰宋衛陳鄭將同日火若我用瓘斚玉瓚鄭必不火子産弗與明年五月壬午四國皆火裨竈曰不用吾言鄭又將火鄭人請用之子産復弗與子太叔咎之曰寶以保民子何愛也子産曰天道遠人道邇竈焉知天道是亦多言矣豈不或信卒弗與亦不復火昭公二十四年五月乙未朔日有食之梓慎曰將水昭子曰旱也日過分而陽猶不克克必甚能無旱乎是秋大旱如昭子之言夫災旱易推之數也慎竈至精之術也而或中或否後世之愚瞽若之何而談吉凶知昭子之言則知隂陽消長之道可以理推不可以象求也知子産之言則知言而中者亦不可聽况於不中者乎臣之所作天文書正欲學者識垂象以授民時之意而杜絶其妖妄之源焉聊舉二條以為證臣舊作圖譜志謂天下之大學術者十有六皆在圖譜無圖有書不可用者天文是其一也而歷世天文志徒有其書無載象之義故學者但識星名不可以仰觀雖有其書不如無也隋有丹元子者隱者之流也不知名氏作步天歌見者可以觀象焉王希眀纂漢晉志以釋之唐書誤以為王希眀也天文籍圖不籍書然書經百傳不復訛謬縱有訛謬易為考正圖一再傳便成顛錯一錯愈錯不復稽尋所以信圖難得故學者不復識星臣向嘗盡求其書不得其象又盡求其圖不得其信一日得步天歌而誦之時素秋無月清天如水長誦一句凝目一星不三數夜一天星斗盡在胸中矣此本只傳靈臺不傳人間術家祕之名曰鬼料竅世有數本不勝其訛今則取之仰觀以從稽定然步天歌之言不過漢晉諸志之言也漢晉志不可以得天文者謂所載者名數災祥叢雜難舉故也步天歌句中有圖言下見象或約或豐無餘無失又不言休祥是深知天者今之所作以是為本舊於歌前亦有星形然流傳易訛所當削去惟於歌之後採諸家之書以備其書云東方角兩星南北正直著中有平道上天田總是黑星兩相連别有一烏名進賢平道右畔獨淵然最上三星周鼎形角下天門左平星雙雙橫於庫樓上庫樓十星屈曲眀樓中五柱十五星三三相著如鼎形其中四星别名衡南門樓外兩星橫角二星十二度為主造化萬物布君之威信謂之天闕其間天門也其內天庭也故黃道經其中七曜之所行也其星眀則太平芒動則國不寧日食右角國不寧月食左角天下道斷金火犯有戰敵金守之大將持政左角為天田為理主刑其南為太陽道五星犯之為旱右角為將主兵其北為太隂道五星犯之為水蓋天之三門猶房之四表也左右角間二星曰平道為天子八逹之衢眀正則吉動搖則法駕有虞天田主天子畿內封疆金守之主兵火守之主旱水守之主潦平道西一星曰進賢在太微宫東眀則賢者在位暗則在野又曰主卿相舉逸才周鼎三星在攝提西國之神器也不見或移徙則運祚不寧天門二黑星在平星北角之南主天之門為朝聘待客之所眀則四方歸化不見則兵革起邪佞生平星一星在庫樓北平天下之法獄廷尉之象也庫樓十星其六大星為庫南四星為樓在角南一曰天庫兵車之府也旁十五星三三而聚者柱也中央四小星衡也主陳兵其占曰庫中星不見兵四合無星則下臣謀上眀而動搖則兵出四方盡不見則國無君庫樓東北二星曰陽門主守隘塞也南門二星在庫樓南天之外門也主守兵眀則逺方入貢暗則夷人畔客星守之主兵至亢四星恰如彎弓狀大角一星直上眀折威七子亢下橫大角左右攝提星三三相似如鼎形折威下左頓頑星兩箇斜安黃色精頑下二星號陽門色若頓頑直下􅢶亢四星九度日月之中道主天子內朝天下之禮法也又曰總攝天下奏事聽訟理獄録功者也亦為疏廟主疾疫其星眀大四海歸王輔臣納忠人無疾疫移動多病不見則天下鼎沸而旱潦作矣大角一星在攝提間天王坐也又為天子梁棟金守之則兵起日月食主凶亢南七黑星曰折威主斬殺金火守之夷人犯邊將有棄市者攝提六星直斗杓之南主建時節伺禨祥攝提為盾以夾擁帝坐也主九卿眀大三公恣橫客星入之聖人受制一曰大臣之象頓頑二星在折威東南主考囚察情偽也陽門在庫樓東北主邊塞險阻之地客星出陽門夷狄犯邊氐四星似斗側量米天乳氐上黑一星世人不識稱無名一箇招搖梗河上梗河橫列三星狀帝席三黑河之西亢池六星近攝提氐下衆星騎官出騎官之衆二十七三三相連十欠一陳車氐下騎官次騎官下三車騎位天輻兩星立陳傍將軍陳裏振威霜氐十六度下二尺為五星日月中道為天子之路寢眀則大臣妃后奉君不失節如不見或移動則臣將謀內禍亂生矣日月食主內亂木犯之立后妃火犯臣僭上金犯拜將水犯百官憂客星犯婚禮不整彗孛犯暴兵起月暈人不安一曰氐為后妃之府休解之房前二星適也後二星妾也將有徭役之事氐先動星眀大則民無勞天乳在氐北主甘露眀則潤澤甘露降招搖一星在梗河北次北斗柄端主胡兵芒角變色搖動則兵革大起梗河二星在大角北天子以備不虞其色變動有兵喪帝席三星在大角西比天子宴樂獻夀之所其星不見大人失位亢池六黑星為泛舟楫主迎送移徙則凶騎官二十七星在氐南天子騎士之象星衆則安不見兵起車騎三黑星在氐南騎官之上都車馬之將也金火犯為災動搖車騎行天輻兩黃星在房西主鑾駕客星來守之則輦轂有憂也騎陳將軍一星在騎官東南主騎將也搖動則騎將出房四星直下主眀堂鍵閉一黃斜向上鈎鈐兩箇近其傍罰有三星植鍵上兩咸夾罰似房狀房下一星號為日從官兩箇日下出房六度為眀堂天子布政之宫也亦四輔也下第四星上將也次次將也次次相也上星上相也南二星君位北二星夫人位又為四表中間為天衢之大道亦謂之天闕黃道之所經也南間曰陽環亦曰陽道其南曰太陽北間曰隂間亦曰隂道其北曰太隂七曜由乎天衢則天下平和由陽道則主旱喪由隂道則主水兵房星亦曰天駟為天馬主車駕南星曰左驂次左服次右服次右驂亦曰天廄又主開閉為蓄藏之所由也房星眀則王者眀驂星大則兵起星離則人流日月食主昏亂權臣橫彗孛犯之兵起下二星為隂五星犯之為水上二星為陽五星犯之為旱房北二小星曰鈎鈐房之鈐鍵天之管籥主閉藏鍵天心也王者孝則鈎鈐眀近房天下同心遠則天下不和王者絶後房鈎鈐間有星及踈坼則地動河清東咸西咸各四星在房心北日月五星之道也為房之户所以防淫佚也眀則吉暗則凶日月五星犯守之有隂謀火守之兵起罰三星在東咸正西南北而刑主受金贖罪正而直列則法令大平曲而斜列則刑罰不中日一星在房中道前太陽之精主眀德金火犯守之有憂從官二星在積卒西北心三星中央色最深下有積卒共十二三三相聚心下是心六度一名大火天王位也中星曰明堂為大辰天子之正位也前星為太子不明則太子不得位後星為庶子明則庶子繼心上四尺為日月五星之中道中心明則化成道昌直則地動移徙不見國亡又曰心變黑色大人有憂直則主失勢動則國有憂離則民流金火犯血光不止土木犯吉日月食吉月暈兵起火來守之國無主客星及孛犯天下兵荒積卒十二星在房心西南五營軍士也微而小則吉明大動搖兵大起一星亡兵出二星亡兵半出三星亡兵出盡他星守之兵大起近臣誅尾九星如鉤蒼龍尾下頭五點號龜星尾上天江四橫是尾東一箇名傅説傳説東畔一魚子龜西一室是神宫所以列在后妃中尾十九度后妃之府後宫之埸也北之一丈為天之中道上第一星后也次三星夫人次則嬪妾第三星傍一星名曰神宫解衣之內室尾亦為九子星色欲均明大小相承則后妃無妬忌後宫有敘多子孫星微細暗后有憂疾踈逺則后失勢動移則君臣不和天下亂就聚則大水木犯之及月暈則后妃死火犯宫中內亂土犯吉水犯宫中有事客星犯大臣誅日月食主飢一曰金火守之後宫兵起龜五星在尾南漢中主占定吉凶明則君臣和不明為乖戾亡則赤地千里火守之兵起在外守之兵罷天江四星在尾之北主太隂不欲明明而動水暴出參差則馬貴其星不具則津河關道不通熒惑守之有立主客星入河津絶傅説一星在尾後河中主後宫女巫祝祀神靈祈禱子孕故曰主王后之內祭祀以求子孫也詩云克禋克祀以弗無子即此之象也其星明大王者多子孫小而暗後宫少子動搖則後宫不安星搖則天子無嗣魚一星在尾後河中主隂事知雲雨之期也大明則隂陽和風雨時暗則魚多亡動搖則大水暴出出漢中則大魚多死火守在南則旱在北則水起臣謹按傳説一星惟主後宫女巫禱祠求子之事謂之傅説者古有傅母有保母傅而説者謂傅母喜之也今之婦人求子皆祀婆神此傅説之義也偶商之傳説與此同音諸子百家更不詳審其義則曰傅説騎箕尾而出殊不知箕尾専主後宫之事故有傅説之佐焉箕四星形狀如簸箕箕下三星名木杵其前一黑是粳皮箕十一度亦謂之天津後宫妃后之位上六尺為天之中道箕一曰天雞主八風凡日月宿在箕東壁翼軫者風起又主口舌主客蠻夷諸國故蠻夷將動先表箕焉星大明直則五穀熟君無讒間踈暗則無君世亂五穀貴蠻夷不伏內外有差就聚細微天下憂動則蠻夷有使來離徙則人流若移入河國災人相食月暈金火犯之兵起流星犯大臣叛日宿其野風起杵三星在箕南主杵舂之用也縱為豐橫為飢移徙人失業不見人相食客星入杵臼天下有急變粳一星在箕口前杵臼西北明則為豐暗則為飢不見人相食北方斗六星其狀似北斗魁上建星三相對天辨建上三三九斗下圓安十四星雖然名鱉貫索形天雞建背雙黑星天籥柄前八黃精狗國四方雞下生天淵十星鱉東邊更有兩狗斗魁前農家丈人狗下眠天淵十黃狗色元斗二十五度天廟也亦曰天機五星貫中日月正道為丞相太宰之位酌量政事之宜褒進賢良稟授爵祿又主兵南二星魁天梁也中央二星天相也北二星天府庭也亦為夀命之期將有天子之事占於南斗星盛明君臣一心天下和平爵祿行芒角動搖天子愁兵起移徙其臣逐日月五星逆入斗天下流蕩孛犯之兵起星小暗則廢宰相及死鱉十四星在南斗南鱉為水蟲為太隂有星守之白衣會主有大水火守之旱建六星在斗背亦曰天旗臨於黃道天之都關也建斗之間七曜之道建為謀事為天鼓為天馬南二星天庫也中央二星市也鈇鑕也上二星旗跗也建動搖則人勞月暈之蛟龍見牛馬疫月食五星犯守大臣相譖臣謀主亦為關梁不通有大水天辨九星在建星北入河中市官之長也主列肆闤闠若市籍之事以知市珍也星明則吉彗星犯守之糴貴兵起天雞二星在狗國北主候時也金火守入兵大起天籥八星在斗南斗杓西主鎖籥關閉明吉暗凶狗國四星在建東北主鮮卑烏丸沃沮明則邊寇作金火犯守外夷有變太白逆守之其國亂客星守犯之有大盜其王且來天淵十星在鱉東南一曰天海主溉灌火守之大旱水守之大水一曰主海中魚鱉狗二黑星在斗魁前主吠守禦姦回也不居常處為大災農丈人一星在南斗西南老農主稼穡也其占與粳略同牛六星近在河岸頭頭上雖然有兩角腹下從來欠一腳牛下九黑是天田田下三三九坎連牛上直建三河鼓鼓上三星號織女左旗右旗各九星河鼓兩畔右邊明更有四黃名天桴河鼓直下如連珠羅堰三烏牛東居漸臺四星似口形輦道東足連五丁輦道漸臺在何許欲得見時近織女牛七度天之關梁日月五星之中道主犧牲其北二星一曰即路一曰聚火又曰上一星主道路次二星主關梁次三星主南越甘氏曰上二星主道路次二星主關梁次二星主南夷中一星主牛移動則牛多殃明大則王道昌其星曲則糴貴又曰星明大則關梁通牛貴怒則馬貴不明失常穀不登細則牛賤中星移上下牛多死小星亡則牛多疫月暈損犢金火犯之兵災水土犯之吉天田九星牽牛南太微東主天子畿內之田其占與角之天田同九坎九黑星在天田東主溝渠所以導逹泉源流瀉盈溢明盛則有水災夷人侵邊不明則吉河鼓三星在牽牛北天鼓也主軍鼓及鈇鉞一曰三武主天子三將軍中央大星為大將軍左星為左將軍右星為右將軍左星南星也所以備關梁設險阻而拒難也明大光潤將軍吉動搖差度亂兵起直則將有功曲則將失律左旗右旗各九星在河鼓左右皆天之旗鼓也旗星明潤將軍吉動搖兵起怒則馬貴旗端四星南北列曰天桴鼓桴也星不明漏刻失時動搖軍鼓用桴鼓相直亦然織女三星在河北天紀東端天女也主果蓏絲綿珍寶也王者至孝神祇咸喜則織女星俱眀天下和平大星怒角布帛貴又曰三星俱眀女功善暗而微天下女功廢不見兵起東足四星曰漸臺臨水之臺也主刻漏律吕之事西足五星曰輦道天子嬉遊之道金火守之御路兵起羅堰三星在牽牛東主隄塘壅蓄水潦灌溉田苗大而眀大水泛溢臣謹按張衡云牽牛織女七月七日相見者即此也古雅云河鼓謂之牽牛又歌曰東飛百勞西飛燕黃姑織女時相見黃姑即河鼓也音訛耳女四星如箕主嫁娶十二諸國在下陳先從越國向東論東西兩周次二秦雍州南下雙鴈門代國向西一晉伸韓魏各一晉北輪楚之一國魏西屯楚城南畔獨燕軍燕西一郡是齊鄰齊北兩邑平原君欲知鄭在越下存十六黃星細區分五箇離珠女上星敗瓜珠上瓠瓜生兩箇各五瓠瓜眀天津九箇彈弓形兩星入牛河中橫四箇奚仲天津上七箇仲側扶筐星女十一度下九尺為日月中道天之少府也謂之須女者須賤妾之稱婦職之卑者也主婦女之位其星如婦功之式主布帛裁製嫁娶星明天下豐女功昌小暗則國藏虛移動則婦女受殃産死者多后妃廢日月食國憂木犯立后火犯女喪金犯災土孛犯損蠶月暈婦人災又曰水守之萬物不成火守之布帛貴人多死土守之有女喪金守之兵起十二國有十六星齊一星在九坎之東齊北二星曰趙趙北一星曰鄭鄭北一星曰越越東二星曰周周東南北列二星曰秦秦南二星曰代代西一星曰晉晉北一星曰韓韓北一星曰魏魏西一星曰楚楚南一星曰燕其星有變各以其國離珠五星在須女北須女之藏府也為女子之星非其故後宫亂客星犯之後宫凶瓠瓜五星在離珠北主隂謀主後宫主果食眀則歲熟微則后失勢瓜果不登客星守之魚鹽貴旁五星曰敗瓜主種植與瓠瓜略同天津九星在虛危北橫漢中津梁所度眀而動則兵起如流沙死人如亂麻參差不齊馬貴一星不備關梁不通三星不備覆陷天下星亡水災河溢水賊稱王奚仲四星在天津北古車正也金火守之兵車必起扶筐七黑星主蠶事見吉不見則凶臣謹按天之所覆者廣而華夏所占者牛女下十二國耳牛女在東南故釋氏謂華夏為南贍部洲其二十八宿所管者多十二國之分野隨其所𨽻耳虛上下各一如連珠命祿危非虛上呈虗危之下哭泣星哭泣雙雙下壘城天壘團圓十三星敗臼四星城下橫臼西三箇離瑜眀虛九度少強冢宰之官也主邑居廟堂祭祀之事又主風雲死喪下九尺為天之中道眀靜則天下安動搖則有死喪哭泣日月食兵起流星犯賊亂宗廟五星犯有災虛北二星曰司命主舉過行罰滅不祥又北二星曰司祿主爵祿增年延德故在六宗之祀司危二星在司祿之北主矯枉失司非二星在司危之北主察愆過凡此四司皆黑星眀大為災居常則平虛南二星曰哭主號哭也哭東二星曰泣主死眀則國多哭泣金火守之亦然泣南十三星曰天壘城如貫索形主北夷丁零胸奴敗臼四星在虛危南知凶災他星守之飢兵起秦代東三星南北列曰離瑜離袿衣也瑜玉飾皆婦人之服也星微則後宫儉約眀大則婦人奢危三星不直舊先知危上五黑號人星人畔三四杵臼形人上七烏號車府府上天鈎九黃晶鈎上五鴉字造父危下四星號墳墓墓下四星斜虛梁十箇天錢梁下黃墓傍兩星能蓋屋身著黑衣危下宿危十六度主天府曰天市主架屋甘氏云為天市廟堂下九尺為天之中道主架屋受藏風雨墓墳祠祀如動則天下大動土功張衡云虛危等為死喪哭泣之事亦為邑居廟堂祠祀之事冡宰之官動則死喪哭泣火守則天子將兵金守則飢饉兵起虛危動則有土功火守則兵起水守則下謀上一云危動而不眀土功兵革起月暈日月五星犯即有災車府東南五黑星曰人星有如人象主靜衆庶柔逺能邇一日卧星主防淫不見則人有詐行詔書眀則人安暗凶內杵三星在人星傍主軍糧正直下臼吉不相當糧絶不直民飢凶臼四星在人星東南主舂臼覆則大飢仰則大豐隋志云客星入杵臼兵起天下聚米天津東南七星曰車府東近河邊抵司非主官車之府金火守之兵車大動天鈎九星如鈎狀在造父西河中主乘輦服飾法式直則地將動眀則服飾正也傳舍南河中五星曰造父御官也一曰司馬或曰伯樂星亡馬大貴眀則吉墳墓四星在危下如墓形主喪葬之事眀則多死亡虛梁四星在蓋屋南主園陵寢廟非人所處故曰虛梁金火守入犯兵災大起天錢十星在北落西北主錢帛所聚星眀則府藏盈不爾虛耗金火守之兵盜起蓋屋二星在危南主天子所居室亦為宫室之官金守之國兵起慧孛尤甚也室兩星上有離宫出繞室三雙有六星下頭六箇雷電形壘壁陳次十二星十二兩頭大似升陳下分布羽林軍四十五卒三為羣壁西四星多難論子細厯厯看區分三粒黃金名鈇鉞一顆真珠北落門門東八魁九箇子門西一宿天綱是電傍兩星土功吏騰蛇室上二十二室十七度亦謂之營室甘氏云為太廟天子之宫也石氏謂之元宫一曰清廟又為軍糧之府及土功事星眀國昌小不眀祠祀鬼神不享國多疾疫動則有土功兵出野離宫六星兩兩居之分布室壁之間天子之别宫也主隱藏休息之所金火守入則兵起室南六星曰雷電主興雷動蟄明或動則震雷作壁陳十二星在羽林北橫列營室之南羽林之垣壘也星衆而眀則安寧希而動則兵革起不見天下亂五星入天軍皆為兵起金火水尤甚羽林四十五星三三而聚散在營室之南天軍也主軍騎又主翼主也星衆而眀則安寧希而動則兵革起不見天下亂金火水守入兵起斧鉞三星亦曰斧鑕在八魁西北主誅夷不眀則斧鑕不用移動則兵起有星入之皆為大臣誅北落師門一星在羽林西南天之蕃落也亦曰天軍蕃之候門長安北門曰北落門以象此也主非常以候兵眀大則軍安微弱則兵起金火守之有兵災一曰有星守之虜入塞北落東南九黑星曰八魁主張捕禽獸之官也客星入之多盜賊兵起金火入亦然北落西南一星曰天綱主武帳天子遊獵之所會金火守兵起室西南二星曰土功吏主土功之官也動搖則有修築之事隋志土功吏主司過度騰蛇二十二星在營室北若盤蛇之狀居於河濵謂之天蛇星主水蟲微則國安眀則不寧移南大旱移北大水客星守之水雨為災水物不收壁兩星下頭是霹靂霹靂五星橫著行雲雨次之口四方壁上天廄十圓黃鈇鑕五星羽林傍壁九度下九尺為天之中道主文章天下圖書之祕府也亦主土功明則圖書集道術行小人退君子進星失色大小不同天子重武臣賤文士圖書隱親黨回邪用星動則有土功離徙就聚為田宅事日月食損賢臣五星孛犯兵起土功西南五星曰霹靂主興雷奮擊明而動用事不眀凶霹靂南四星曰雲雨明則多雨水火守之大旱天廄十星在東壁北蓋天馬之廄今之驛亭也不見則天下道斷鈇鑕五星在天倉西南刈具也主斬芻飼牛馬眀則牛馬肥微暗則牛馬飢餓并死喪也西方奎腰細頭尖似破鞋一十六星繞鞋生外屏七烏奎下橫屏下七星天溷眀司空左畔土之精奎上一宿軍南門河中六箇閣道形附路一星道傍眀五箇吐花王良星良星近上一䇿名奎十六度天之武庫也石氏謂之天豕亦曰封豕主兵九尺下為天之中道又主溝瀆西南大星所謂天豕目亦曰大將眀則天下安動則兵亂客星守入兵起金火守有水災隋志云若帝淫泆政不平則奎有角角動則有兵不出年中或有溝瀆之事又曰奎中星眀水大出日月食五星犯皆有凶奎南七星曰外屏以蔽天溷也占與天囷同天溷七星在外屏南天之厠也不見則人不安移徙亦然天溷南一星曰土司空主水土之事大而黃眀天下安若客星入之多土功天下大疫軍南門一星在天將軍西南主誰何出入動搖則軍行不見則兵亂閣道六星在王良前飛道也從紫宫至河神所乘也一曰主道里張衡云天子遊别宫之道一曰王良旗一曰紫宫旗亦所以為旌表而不欲其動搖一星不具則輦道不通動搖則宫掖之內兵起附路一星在閣道南傍别道也備閣道之敗傷而乘之也一曰太僕主禦風雨亦遊從之義也一曰占與閣道同王良五星在奎北居河中天子奉車御官也其四星曰天駟旁一星曰王良亦曰天馬其星動為䇿馬故曰王良䇿馬車騎滿野亦曰王梁梁為天橋主禦風雨水道故或占津梁其星移主有兵亦曰馬病客星守之橋不通金火守之皆為兵憂前一星曰䇿王良之御䇿也主天子僕御在王良旁若移在馬後是謂䇿馬婁三星不勻近一頭左更右更烏夾婁天倉六箇婁下頭天庾四星倉東腳婁上十一將軍侯婁十二度下九尺為日月中道亦為天獄主苑牧犧牲供給郊祀亦為興兵聚衆動搖則聚衆星直則有執主之命者就聚國不安金火守之則宫苑之內兵起日月食宫內亂金木火土犯凶水犯吉孛犯起兵月暈兩軍各退左更五星在婁東山虞也主知山澤林藪之事亦主仁智右更五星在婁西牧師也主官養牧牛馬亦主禮義金火守之山澤有兵其占兩更同兩更者秦爵名天倉六星在婁南倉穀所藏也星黃而大歲熟東南四星曰天庾積厨粟之所也天將軍十一星在婁北主武兵中央大星天之大將也外小星吏士也大將星搖兵起大將出小星不具兵起胃三星鼎足河之次天廪胃下斜四星天囷十三如乙形河中八星名太陵陵北九箇天船名陵中積尸一箇星積水船中一黑精胃十五度天之儲藏五穀之倉也又名大梁明則四時和平天下晏然倉廪實不明則上下失位星小則少穀輸運又云動則有輸運事就聚則穀貴人流暗則凶荒五星犯日月食孛侵並有災天廪四星在昴南一曰天廥張衡云主積蓄黍稷以供享祀春秋所謂御廪也天囷十三星在胃南倉廪之屬主給御糧也明而黃則歲豐微變常色則不吉金火守之即災起太陵八星在胃北主陵墓明而大或中星多則天下多死喪或兵起天船九星在太陵之北居河中一曰舟星主渡亦主水旱不在河中津河不通水泛溢中四星欲其均明即天下安不則兵若喪移徙亦然客彗出入為大水有兵太陵中一星曰積尸明則死人如山張衡云一名積廪積尸明而大或其傍星多則天下多死喪或兵起若不見而暗皆吉火守則天下大哭泣天船中一星曰積水主候水災昴七星一聚實不少阿西月東各一星月下五黃天隂名隂下六烏芻藁營營南十六天苑形河裏六星名卷舌舌中黑點天讒星礪石舌傍斜四丁昴十一度下為日月中道天之耳目也主西方主獄事又為旄頭邊星也又主喪甘氏云主口舌奏對若明大則君無佞臣天下安和暗小則佞者被誅搖動君信讒殺忠良張衡云昴明則獄訟平暗則刑罰濫六星與大星等大水有白衣會七星黃兵大起動搖有大臣下獄大而盡動若跳躍者邊兵大起一星不見皆憂兵之象也天阿一星在胃東月一星在昴東皆黑星並主女人災福又曰天阿主察山林妖變天隂五星在畢柄西主從天子弋獵之臣預隂謀也不眀則禁言漏泄天苑十六星在昴畢南如環狀天子之苑囿養禽獸之所也主馬牛羊明則牛馬羊盈希則死芻藁六星在苑西以供牛馬之食也一曰天積天子之藏府也星盛則歲豐穰希則貨財散張衡云不見則牛暴死火守之則火災起卷舌六星在昴北天讒之外主口語以知讒佞張衡云主樞機曲而靜則賢人用直而動則讒人得志卷舌移出漢則天下多妄言旁星繁則死人如邱山天讒一星在卷舌中主醫巫占與從官同礪石四星在五車北主磨礪鋒刃明則兵起如常則吉金火及客星守之兵動畢恰似瓜叉八星出附耳畢股一星光天街兩星畢背傍天節耳下八烏幢畢上橫列六諸王王下四皂天高星節下團圓九州城畢口斜對五車口車有三柱任縱橫車中五箇天潢精潢畔咸池三黑星天關一星車腳邊參旗九箇參車間旗下直建九斿連斿下十三烏天園九斿天園參腳邊畢十七度主邊兵主弋獵其大星曰天高一曰邊將主四夷之尉也星明大則逺夷來貢天下安失色則邊兵亂一星亡為兵喪動搖邊城兵起有讒臣離徙天下獄亂就聚法令酷甘氏云畢主街巷隂雨天之雨師也故明而移動則霖潦及街巷壅塞明而定則天下安張衡云畢為天馬一曰日月食邊兵凶將衰木犯有軍功昴畢間二星曰天街三光之道也主伺候關梁張衡云主國界也街南為華夏街北為夷屬金火守之諸夷兵起明王道正暗兵起附耳一星在畢下天高東南隅主聽得失伺愆邪察不祥星盛則中國微有盜賊邊候警外國反鬬兵連年合移動則佞讒行兵大起邊尤甚入畢兵起天節八星在畢南主使臣之所持也宣威德於四方明吉暗凶諸王六星在五車南天漢之中主宗社蕃屏王室也明則諸候奉上天下安不見宗社傾危四方兵起天高四星在參旗西北近畢此臺榭之高主遠望氣象不見則官失其守隂陽不和五車五星三柱九星共十四星在畢東北五車主天子五兵張衡云天子兵車舍也西北曰天庫主太白秦也次東北星曰天獄主辰星燕趙也次東南星曰天倉主歲星衛魯也中央星曰司空主鎮星楚也次西南星曰卿主熒惑魏也五星有變各以其所主而占之三柱一曰三泉即天淵一曰休即天休一曰旗即天旗五星均眀柱皆具即人倉廪實不具其國絶食兵且起五車三柱有變各以其國占之三柱出外兵出柱入兵入柱出一月米貴三倍期一年出兩月米貴六倍期二年出三月米貴十倍期三年柱出不與天倉相近米穀運出千里柱倒立尤甚火入守天下旱金入守兵起水入月暈不爾則有赦天潢五星在五車中主河梁津渡之處也不見則河梁不通咸池三星在五車中天潢南魚囿也金火犯之則有大災隋志云月五星入天潢兵起道不通天下亂易政咸池明有龍墮死虎狼害人兵起天關一星在五車南畢西北亦曰天門日月五星所行之道也主邊塞事主關閉芒角有兵五星守之貴人多死移徙若與五車合大將軍披甲參旗九星在參西五車之間天旗也明而希則邊寇不動不然反是隋志參旗一曰天旗一曰天弓主司弓弩之張候變禦難玉井西南九星曰九斿天子之旗也主邊軍進退金火守之兵亂起天苑之南十三星曰天園植果菜之所也曲而鈎則果菜熟不然則否觜三星相近作參蕊觜上坐旗真指天尊卑之位九相連司怪曲立坐旗邊四鴉大近井鉞前觜一度在參之右角如鼎足形主天之關明大則天下安五穀熟移動則君臣失位天下旱隋志云觜觽為三軍之候行軍之藏府主葆旅收斂萬物明則軍儲盈將得勢動而明盜賊羣行葆旅起動移將有逐者張衡云葆旅野生之可食者金火來守國易政兵起災生日食臣不忠月食君害臣五星犯災生孛客星犯兵起坐旗九星在司怪西北主别君臣尊卑之位明則國有禮暗則反是司怪四星在井鉞前候天地日月星辰禽獸蟲蛇草木之變與天高占同參總有十星觜相侵兩肩䨥足三為心伐有三星足裏深玉井四星右足隂屏星兩扇井南襟軍井四星屏上吟左足下四天厠臨厠下一物天屎沉參十度上為日月五星中道甘氏曰參為忠良孝謹之子眀大則臣忠子孝安吉移動殺忠臣一曰參伐一曰大辰一曰天市一曰鈇鉞主斬刈又為天獄主殺伐又主權衡所以平理也又主邊城為九譯故不欲其動也參白獸之體其中三星橫列三將也東北曰左肩主左將西北曰右肩主右將東南曰左足主後將軍西南曰右足主偏將軍故黃帝占參應七將中央三小星曰伐天之都尉也主胡鮮卑戎狄之國故不欲明又曰七將皆明天下兵精也王道缺則芒角張伐星明與參等大臣謀亂兵起參星失色軍散敗參芒角動搖邊候有急天下兵起又曰有斬伐之事參左足入玉井中兵大起秦地大水若有喪山石為怪參足若突出玉井則虎狼暴害人差戾王臣二金火來守則國易政兵起災生日月食則田荒米貴五星犯災甚玉井四星在參西右足下水象也屏二星在玉井南屏為屏風客星入之四足蟲大疾人亦多死不見則國內寢疾玉井東下四星曰軍井行軍之井也軍井未逹將不言渴名取此也又曰主軍營之事天厠四星在屏東溷也主天下疾病黃吉青赤白皆凶不見與屏同天屎一星在厠南色黃則吉他色皆凶南方井八星橫列河中淨一星名鉞井邊安兩河各三南北正天樽三星井上頭樽上橫列五諸侯侯上北河西積水欲覔積薪東畔是鉞下四星名水府水位東邊四星序四瀆橫列南河裏南河下頭是軍市軍市團圓十三星中有一箇野雞精孫子丈人市下列各立兩星從東説闕邱二箇南河東邱下一狼光蒙茸左畔九箇彎弧弓一矢擬射頑狼胸有箇老人南極中春秋出入夀無窮井三十四度甘氏云井八星在河中主泉水日月五星貫之為中道石氏謂之東井亦曰天井主諸侯帝戚三公之位故明大則封侯建國搖動失色則誅侯戚廢戮三公帝師受殃矣張衡云天之南門也黃道所經為天之亭候主水衡事法令所取平也王者用法平則井明而端列鉞一星附井之前主伺奢淫而斬之故不欲其明大與井齊或搖動則天子用鉞於大臣月宿井有風雨之應又曰井為天子府暗芒并日月食五星逆犯大臣謀亂兵起中有六星不欲大明明即水災南北兩河各三星分夾東井一曰天高天之闕門主關梁南河曰南戍一曰南宫一曰陽門一曰越門一曰權星主火北河曰北戍一曰北宫一曰隂門一曰胡門一曰衡星主水兩戍之間三光之常道也河戍動搖中國兵起張衡云河南星不具則南道不通北亦如之動搖及火守中國兵起天樽三星在五諸侯南主盛饘粥以給酒食之正也張衡云以給貧餒明則豐暗則荒或言暗吉五諸侯五星在東井東北近北河主刺舉戒不虞又曰治隂陽察得失亦曰主帝心一曰帝師二曰帝友三曰三公四曰博士五曰太史又曰五曰大夫此五者常為帝定疑議星明大潤澤則天下大治芒角則禍在中張衡又曰五諸侯治隂陽察得失明而潤大小齊等則國之福又曰赤則豐暗則荒積水一星在北河北所以供酒用也不見為災又曰主候水災積薪一星在積水東以備庖厨之用明則人主康火守之大旱水府四星在東井西南水官也占與水位同水位四星在東井東主水衡又主瀉溢流也故巫咸氏贊曰水位四星瀉溢流移動近北河則國沒為江河若水火及客星守犯之百川盈溢四瀆四星在東井南軒轅東以江河淮濟之積精也明大則水泛溢軍市十三星如錢狀在參東南天軍貨易之市客星及金火守之軍大飢野雞一星在軍市中主變怪也以芒角動搖為兵災移出則諸侯兵起軍市西南二星曰丈人丈人東二星曰子子東二星曰孫丈人主夀考之臣不見人臣不得通子與孫皆侍丈人之側相扶而居不見為災守常無咎闕丘二星在南河東主象魏天子之䨥闕諸侯之兩觀也金火守之兵戰闕下狼一星在天市東南為野將主殺掠色有常不欲變動角而變色動搖盜賊作邊兵起人相食躁則人主不靜不居其宫馳騁天下張衡云居非其處則人相食色黃白而明吉黑凶赤芒角兵起金火守之亦然弧矢九星在狼東南天弓也以備盜賊常向狼弧矢動搖不如常者多盜賊明則兵大起狼弧張害及邊天下乖亂又曰天弓張天下盡兵主與臣相謀張衡云引滿則天下兵起老人一星在弧南一曰南極常以秋分之旦見于丙春分之夕沒于丁常以秋分候之南郊明大則人主有夀天下安寧不見則人主憂鬼四星册方似木匱中央白者積尸氣鬼上四星是爟位天狗七星鬼下是外厨六間柳星次天社六箇弧東倚社東一星是天紀輿鬼二度為日月五星之中道主死亡疾病張衡云主祠祀天目也又主視眀察姦謀東北星主積馬東南星主積兵西南星主積布帛西北星主積金玉隨其變占之中央一星名積尸亦曰積尸氣者但見氣而已主死喪祠祀一曰鈇鑕主誅斬鬼星明大則穀成不明人散動而光上賦斂重徭役多星徙人愁政令急鬼質欲其忽忽不明則安明則兵起大臣謀主下流亡甘氏云積尸搖動失色則疾病鬼哭人荒軒轅西四星曰爟亦曰烽爟主烽火備警急占以不明安靜明大甚則邊亭警急搖動芒角亦然又曰明吉暗凶天狗七星在鬼西南狼之北橫河中以守賊也移徙則兵起金火犯之人相食外厨六星在柳南天子之外厨也占與天厨同弧南六星為天社在老人東南似柳直明則吉隋志云共工之子勾龍能平水土故祀以配社其精為星外厨之南一星曰天紀主知禽獸齒歲金火守之禽獸多死柳八星曲頭垂似柳近上三星號為酒享宴大酺五星守栁十四度上為天之中道甘氏云主飲食倉庫酒醋之位明大則人豐酒食搖動則大人酒死失色則天下不安飢饉流於道路不過三年必應張衡云栁為朱雀之嗉天之厨宰也主尚食和滋味隋志云又主雷雨一曰天相一曰天庫一曰注又主木功星明大臣重慎國安厨食具注舉首王命興輔佐出星直天下謀伐其主就聚兵鬪國門酒旗三星在軒轅右角之南酒官之旗也主享宴飲食五星守酒旗天下大酺有酒肉財物之賜及爵宗室星七星如鈎栁下生星上十七軒轅形軒轅東頭四內平平下三箇名天相相下稷星橫五靈七星七度甘氏云主后妃御女之位亦為賢士若失色芒動則后妃死賢士誅明大則道化成國盛張衡云七星為朱鳥之頸一名天都主衣裳文繡隋志云主急兵守盜賊故欲明則王道昌暗則賢良不處天下空天子疾動則兵起離則易政日食兵飢婦人災木犯人安火犯旱金土水犯俱災月暈孛犯兵起軒轅十七星在七星北黃帝之神黃龍之體也后妃之主士女職也一曰東陵一曰權星主雷雨之神南大星女主也次北一星夫人也屏也上將也次北一星妃也次將也其次諸星皆次妃之屬也女主南小星女御也左一星少民少后宗也右一星大民太后宗也欲其色黃小而明也張衡云軒轅如龍之體主雷雨之神後宫之象焉隂陽交合盛為雷激為電和為雨怒為風亂為霧凝為霜散為露聚為雲立為虹霓離為背矞分為抱珥此十四變皆軒轅主之其星欲小而黃明則吉移徙則國人流迸東西角張而振后敗水火金守之女主惡也漢注曰軒轅為權太微為衡月五星守犯者如衡占內平四星在中台南爟之北平罪之官也明則刑罰平暗則否酒旗南三星曰天相丞相之象也其占與相星略同稷五星在七星之南主農正也取乎百穀之長以為其號明大則歲大豐不明則儉不見則人相食張六星似軫在星旁張下只是有天廟十四之星册四方長垣少微雖向上星數欹在太微傍天尊一星直上黃張十七度甘氏云主天廟明堂御史之位上為天之中道若明大則國盛強失色宗廟不安明堂宫廢隋志云主珍寶宗廟所用及衣服又主天厨飲食賞賚之事星明則王者行五禮得天之中動則賞賚離徙天下有逆人就聚有兵金火守之有兵起或云主貢物色細無光王者少子孫日食虧修禮也月食大潦魚行人道火孛犯兵起水土犯國不寧張南十四星曰天廟天子祖廟也客星守之祠官有憂其占與虛梁同長垣四星在少微南主界域及胡夷火守之胡人入中國大白入之九卿謀反少微四星在太微西南北列士大夫之位也一名處士亦天子副主或曰博士官一曰主衛掖門南第一星為處士第二星為議士第三星為博士第四星為大夫眀大而黃則賢士舉月五星犯守之處士女主憂宰相易翼二十二星大難識上五下五橫著行中心六箇恰如張更有六星在何許三三相連張畔附必若不能分處所更請向前看記取五箇黑星翼下頭欲知名字是東甌翼十九度甘氏云主太微三公化道文籍失色則民流日月交食五星並逆芒動則化道不行文籍壞滅動移則三公廢明大則化成隋志云翼為天之樂府主俳倡戲樂又主夷狄逺客負海之賔明大則禮樂興四夷來賔動則蠻夷使來離徙則天子舉兵或云明則禮樂興暗則政教失日食臣僭月食婦人憂五星孛流客犯大凶東甌五星在翼之南蠻夷星也張衡云主東越穿胸南越三夷金火守之其地有兵芒角動移兵內叛軫四星似張翼相近中央一箇長沙子左轄右轄附兩星軍門兩黃近翼是門下四箇土司空門東七烏青邱子青邱之下名器府器府之星三十二以上便為太微宫黃道向上看取是軫十七度甘氏云軫七星主將軍樂府歌歡之事五星犯之失位亡國女子主政人失業賊黨掠人禍生於百日內若明大則天下昌萬民康四海歸王張衡云軫為冢宰輔臣也主車騎明大則車騎用一云明大則車騎動隋志云主載任有軍出入皆占於軫又主死喪明則車駕備動則車騎用離徙天子憂就聚兵大起轄兩星附軫兩傍主王侯左轄為王者同姓右轄為異姓星明兵大起遠軫凶軫轄舉南蠻侵張衡云轄不見國有大憂長沙一星在軫之中主夀命也長沙明則人夀長子孫盛軍門二黃星在青邱西天子六軍之門也主營候豹尾威旗占以移其處為道不通土司空四黃星在軍門南主土功巫咸氏云金火犯之天下男不得耕女不得織隋志云一曰司徒主界域青邱七黑星在軫東南主東方三韓之國占與東甌同軫南三十二星曰器府主樂器之府也明則樂器調理暗則有咎通志卷三十八
