body:
  text: 通志卷一百四十五宋右迪功郎鄭樵漁仲撰列傳第五十八陳袁樞弟憲敬憲叔父敬弟泌蔡凝沈衆蕭允弟引韋載弟鼎趙知禮蔡景歷子微宗元饒劉師知謝岐毛喜沈君理弟君髙君公陸山才沈炯虞荔弟寄傅縡章華施沈客卿文慶顧野王蕭濟姚察江總徐陵子儉弟份克儀陵孝周𢎞正弟𢎞讓𢎞直陸繕從祖孫瓊瓊子從典從瓊從父弟琰從琰弟瑜瑜父兄玠瑜父弟琛張種隂鏗陳暄杜龕熊曇朗周迪留異陳寶應袁樞字踐言陳郡陽夏人也祖昂梁司空自有傳父君正吳郡太守樞美容儀性沉靜好學手不釋卷家本顯貴資産充積而樞獨處率素傍無交往非公事未嘗出遊榮利之懷淡如也侯景之亂樞往吳郡省父父卒於官時四方擾亂人求茍免樞居喪以至孝聞王僧辨平侯景鎮建鄴衣冠爭往造請樞杜門靜居不求聞逹紹泰中歷吏部尚書吳興郡太守永定中徵為侍中掌選遷都官尚書掌選如故樞博學明悉舊章初髙祖長女永嗣公主先適陳留太守錢蕆生子岊主及岊並卒于梁時髙祖受命唯主追封至是將葬尚書請議加蕆駙馬都尉並贈岊官樞議曰昔王姬下嫁必適諸侯同姓為主聞於公羊之説車服不繫顯於詩人之篇漢氏初興列侯尚主自斯以後降嬪素族駙馬都尉置由漢武或以假諸功臣或以加於戚屬是以魏曹植表駙馬奉車取為一號齊職儀曰凡尚公主必拜駙馬都尉魏晉已來因為瞻凖蓋以王姬之重庶姓之輕若不加其等級寧可合卺而酳所以假駙馬之位乃宗於皇女也今公主早薨伉儷已絶既無禮數致疑何須駙馬之授案杜預尚晉宣帝第二女晉武踐阼而主已亡泰始中追贈公主元凱無復駙馬之號梁文帝女新安穆公主早薨天監初王氏無追拜之事逺近二例足以校明無勞此授今宜追贈亭侯時議以為當天嘉三年為吏部尚書領丹陽尹以葬父拜表自解詔令葬訖停宅視郡事服闋還職時僕射到仲舉雖參掌選事銓衡汲引並出於樞舉薦多會上旨謹愼周密清白自居文武職司鮮有遊其門者廢帝即位遷尚書左僕射卒諡曰簡懿有集十卷行於世弟憲字德章幼聰敏好學有雅量梁武帝修建庠序别開五館其一館在憲宅西憲常招引諸生與之談論每有新義出人意表同輩咸嗟賞焉大同八年武帝撰孔子正言章句詔下國學宣制旨義憲時年十四被詔為國子正言生謁祭酒到溉溉目送之愛其神彩在學一歲國子博士周𢎞正謂憲父君正曰賢子今兹欲䇿試不君正曰經義猶淺未敢令試居數日君正遣門下客岑文豪與憲候𢎞正會𢎞正將升講坐弟子畢集乃延憲入室授以麈尾令憲豎義時謝岐何妥在坐𢎞正謂曰二賢雖窮奧賾得無憚此後生邪何謝於是乃遞起義端深極理致憲與往復數番酬對間敏𢎞正謂妥曰恣卿所問勿以童幼期之時學衆滿堂觀者重沓而憲神色自若辨論有餘𢎞正亦起數難終不能屈因告文豪曰卿還咨袁吳郡此郎已堪見代為博士矣時生徒對䇿多行賄賂文豪請具束修君正曰我豈能用錢為兒買第邪學司銜之及憲試爭起劇難憲隨問隨對剖析如流到溉顧憲曰袁君正其有後矣及君正將之吳郡溉祖道於征虜亭謂君正曰昨䇿生蕭敏孫徐孝克非不解義至於風神器局去賢子遠矣尋舉高第以貴公子選尚南沙公主梁簡文帝女也大同元年釋褐袐書郎遷太子舍人侯景寇逆憲東之吳郡尋丁父憂哀毁過禮高祖作相除司徒户曹初謁遂抗禮長揖中書令王勱謂憲曰卿何矯衆不拜録公憲曰於理不應致拜衛尉趙知禮曰袁生舉止詳中故有陳汝之風陳受命授中書侍郎兼散騎常侍與黃門郎王瑜使齊數年不遣天嘉初乃還太建三年纍遷御史中丞羽林監文帝時豫章王叔英不奉法度逼取人馬憲劾奏免叔英自是朝野嚴憚憲詳練朝章尤明聽斷至有獄情未盡而有司具法者即伺間為帝言之所申理甚衆嘗陪宴承香閣賔退之後宣帝留憲與衛尉樊俊徙席山亭談宴終日帝目憲而謂俊曰袁家故為有人其見重如此自侍中遷吳郡太守以父任固辭改授南康內史遷吏部尚書憲以久居清憲纍表自求解任帝曰諸人在職屢有謗書卿處事已多可謂清白别相甄録且勿致辭遷右僕射參掌選事先是憲長兄樞為左僕射至是憲為右僕射故臺省目樞為大僕射憲為小僕射朝廷榮之及宣帝不豫憲與吏部尚書毛喜俱受顧命始興王叔陵之肆逆也憲指麾部分預有力焉後主被創病篤執憲手曰我兒尚幼後事委卿憲曰羣情喁喁冀聖躬康復後事之旨未敢奉詔以功封建安縣伯領太子中庶子尋除侍中太子詹事及太子加元服行釋奠禮憲表請解職不許尋給扶二人皇太子頗不率典訓憲手表陳諫十條皆援引古今言辭切直太子雖外示容納心無悛改後主欲立寵姬張貴妃子始安王為嗣嘗從容言之吏部尚書蔡徵順旨稱贊憲厲色折之曰皇太子國家儲副億兆宅心卿是何人輕言廢立然竟廢太子為吳興王後主知憲有規諫之事歎曰袁德章骨鯁之臣即日詔為尚書僕射禎明三年隋軍來伐隋將賀若弼進燒宫城北掖門兵衛皆散朝士各藏匿唯憲侍左右後主謂憲曰我從來待卿不先餘人今日見卿可謂歲寒知松柏後凋也非惟由我無德亦是江東衣冠道盡後主遑遽將避匿憲正色曰北兵之入必無所犯大事如此陛下安之臣願陛下正衣冠御前殿依梁武帝見侯景故事以待之不從因下榻馳去憲從出後堂景陽殿後主投井中憲拜哭而出及至長安隋文帝重其雅操下詔以為江表稱首授開府儀同三司昌州刺史開皇十四年授晉王廣府長史十八年卒時年七十贈大將軍安成郡公諡曰簡長子承業仕隋至祕書丞國子司業憲叔父敬字子恭純素有風格幼便好學老而無倦仕梁位太子中舍人魏尅江陵流寓嶺表髙祖受禪敬在廣州依歐陽頠頠卒其子紇據州將有異志敬纍諌不從宣帝即位遣章昭逹討紇紇將敗恨不納敬言朝廷義之徵為太子中庶子歷左戶都官二尚書太常卿散騎常侍金紫光祿大夫加特進至德三年卒諡靖德子子元友嗣敬弟泌字文洋清正有幹局容體魁岸志行修謹仕梁歷諸王府佐侯景之亂泌兄君正為吳郡太守梁簡文帝在東宫版泌為東宮領直令往吳中召募士卒及景圍臺城泌率所領赴援城陷依鄱陽嗣王範範卒泌降景景平王僧辨表泌為富春太守兼丹陽尹貞陽侯蕭淵明僭位以為侍中使於齊髙祖受禪泌自齊從梁永嘉王莊往王琳所及莊稱尊號以泌為侍中丞相長史琳敗衆皆散唯泌輕舟送逹於北境屬莊於御史中丞劉仲威然後拜辭歸陳請罪文帝深義之纍遷通直散騎常侍兼侍中聘周及宣帝入輔以泌為司徒左長史卒於官臨終戒其子芳華曰吾於朝廷素無功績瞑目之後斂手足還葬無得受贈諡其子述泌遺意朝廷不許贈金紫光祿大夫諡曰質蔡凝字子居濟陽考城人也祖撙梁吳郡太守自有傳父彥髙給事黃門侍郎凝美容止及長博涉經傳有文詞尤工草𨽻太建元年纍遷太子中舍人以名公子選尚信義公主拜駙馬都尉中書侍郎遷晉陵太守及將之郡更令左右修中書廨宇謂賔友曰庶來者無勞尋授吏部侍郎凝年位未髙而才地為時所重常端坐西齋自非素貴名流罕所交接趣時者多譏焉宣帝嘗謂凝曰我欲用義興主壻錢肅為黃門侍郎卿意如何凝正色曰帝鄉舊戚恩由聖旨則無所復問若格以僉議黃散之職故須人門兼美帝默然而止肅聞而不平義興公主日譖之尋免官遷交趾頃之追還後主嗣位為給事黃門侍郎後主嘗置酒歡甚將移宴𢎞範宫衆人咸從唯凝與袁憲不行後主曰何為凝曰長樂尊嚴非酒後所過臣不敢奉詔衆人失色後主曰卿醉矣令引出他日後主謂吏部尚書蔡徵曰蔡凝負地矜才無所用也尋遷信威晉熙王府長史鬱鬱不得志乃喟然歎曰天道有廢興夫子云樂天知命斯理庶幾可逹因著小室賦以見志陳亡入隋道病卒年四十七子君知頗知名沈衆字仲興吳康武興人梁尚書令約之孫也父旋南康內史衆好學頗有文詞仕梁為太子舍人時梁武帝制千文詩衆為之注解與陳郡謝景同時召見於文德殿帝令衆為竹賦賦成奏之手勑答曰卿文體翩翩可謂無忝爾祖纍遷太子中舍人兼散騎常侍聘魏還為驃騎廬陵王咨議參軍侯景之亂表求還吳興召募故義部曲以討賊梁武許之及景圍臺城衆率宗族及義附五千餘人入援都軍容甚整景深憚之梁武於城內遙授太子右衛率臺城陷衆乃降景景平元帝以為司徒左長史魏尅江陵見虜尋而逃歸髙祖受命位中書令帝以衆州里知名甚敬重之賞賜超於時輩性吝嗇財帛億計無所分遺自奉甚薄每朝會中衣裳破裂或躬提冠履永定二年兼起部尚書監起太極殿恆著布袍芒屩以麻繩為帶又囊麥飯粄以噉之朝士咸共誚其所為衆性狷急因忿恨遂歷詆公卿非毁朝廷髙祖大怒以衆素有令望不欲顯誅因其休假還武康遂於吳中賜死蕭允字叔佐蘭陵人也祖惠蒨齊左戶尚書父介梁光祿大夫附從兄視素傳允少知名風神凝遠通逹有識鑒容止溫藉動合規矩仕梁纍遷太子洗馬侯景攻陷臺城百僚奔散允獨整衣冠坐於宫坊景軍人敬焉弗之逼也尋出居京口時寇賊縱橫百姓波駭衣冠士族四出奔散允獨不行人問其故允答曰性命有常分豈可逃而獲免但患難皆生於利茍不求利禍從何生方今百姓爭欲奮臂而論大功一言而取卿相亦何事於一書生哉莊周所謂畏影避迹吾弗為也乃閉門靜處併日而食卒免於患侯景平後髙祖以書召之辭以疾永定中侯安都為南徐州刺史躬造其廬以申長幼之敬宣帝即位為黃門侍郎晉安王為南豫州以為長史時王尚少未親民務故委允行府事入為光祿卿允性敦重未嘗以榮利干懷及晉安王出鎮湘州又苦擕允允少與蔡景歷善景歷子徵修父黨之敬聞允將行乃詣允曰公年德並髙國之元老從容坐鎮旦夕自為列曹何為方辛苦蕃外答曰已許晉安豈可忘信其恬退類如此鄱陽王出鎮會稽允又為長史帶會稽郡丞行經延陵季子廟設蘋藻之薦託異代之交為詩以敘意詞理清典後主嘗問蔡徵允之為人徵曰允清虛元逺殆不可測至於文章可得而言因誦允詩以對後主嗟賞久之拜光祿大夫及隋師濟江允遷於關右是時南士至長安者例皆授官唯允與尚書僕射謝胄辭以老病隋文帝義之並厚賜帛尋卒年八十四弟引字叔休方正有器度望之儼然雖造次之間必修法度性聰敏博學善屬文仕梁釋褐著作佐郎西昌侯儀同府主簿侯景之亂元帝為荆州朝士多歸之引曰諸王力爭禍患方始今日逃難未是擇君之秋吾家再世為始興郡遺愛在民可南行以存家門耳於是乃與弟肜及宗親等百餘人南奔嶺表時始興人歐陽頠為衡州刺史引往依焉頠遷廣州病死子紇領其衆引疑紇異圖因事規正由是情禮漸踈及紇反時都下士人岑之敬公孫挺等並惶駭唯引徐謂之曰管幼安袁曜卿亦但安坐耳君子正身以明道直已以行義亦何憂乎及番禺平引始北還宣帝召引問嶺表事引具陳之帝甚悅拜金部侍郎引善𨽻書為當時所重宣帝嘗披奏事指引署名曰此字筆勢翩翩似鳥之欲飛引謝曰此乃陛下假其毛羽耳帝又謂引曰我每有所忿見卿輒意解何也引曰此陛下不遷怒臣何預此恩引性抗直不事權貴宣帝每欲遷用輒為用事者所裁及呂梁覆師戎儲空匱轉引為庫部郎掌知營造引在職一年而器械充足歷中書黃門吏部侍郎時廣州刺史馬靖甚得嶺表人心而兵甲精練每年深入俚洞又數有戰功朝野頗生異議宣帝以引悉嶺外物情且遣引觀靖審其舉措諷令送質引奉密旨南行外託收督賧物既至番禺靖即悟旨遣兒弟為質還至贛水而帝崩後主即位轉引為中庶子以疾去官復起為建康令時殿內隊主吳璡及宦者李善度蔡脫兒等多所請屬引一皆不許引始族子密時為黃門侍郎諫引曰李蔡之勢在朝皆憚之宜亦少為身計引曰吾之立身自有本末亦安能為李蔡致屈就令不平不過改職耳吳璡竟作飛書李蔡證之坐免卒於家子德言最知名引弟肜位太子中庶子南康王長史韋載字德基京兆杜陵人梁侍中車騎將軍睿之孫也睿自有傳父正給事黃門侍郎載少聰慧篤志好學年十二隨叔父稜見沛國劉顯顯問漢書十事載隨問應無疑滯及長博涉文史沉敏有器局仕梁為尚書三公郎侯景之亂元帝承制以為中書侍郎尋為尋陽太守隨都督王僧辨東討侯景景平歷位琅邪義興太守髙祖誅王僧辨乃遣周文育襲載載嬰城自守載所屬縣並髙祖舊兵多善用弩載收得數十人繫以長鎖令所親監之使射文育軍約曰十發不兩中者死每發輒中所中皆斃相持數旬髙祖聞文育不利以書喻載以誅王僧辨意并奉梁敬帝勑勑載解兵載得書乃以衆降髙祖恆引置左右與之謀議徐嗣徽任約等引齊軍濟江據石頭城帝問計於載載曰齊軍若分兵先據三吳之路略地東境則時事去矣今可即於淮南即侯景故壘築城以通東道轉輸别令輕兵絶其糧運使進無所虜退無所資則齊將之首旬日可致帝從之永定中位散騎常侍太子右衛率天嘉元年以疾去官載有田十餘頃在江乘縣之白山至是遂築室而居屛絶人事吉凶慶弔無所往來不出籬門者幾十載卒於家載弟鼎字超盛少通曉博涉經史明隂陽逆刺尤善相術仕梁起家湘東王法曹參軍遭父憂水漿不入口者五日哀毁過禮殆將滅性服闋為邵陵王主簿侯景之亂鼎兄昻於京口戰死鼎賫尸出寄於中興寺求棺無所得鼎哀憤慟哭忽見江中有物流至鼎所竊異之往視乃一新棺也因以充斂元帝聞之以為精誠所感侯景平司徒王僧辨以為户曹屬纍遷中書侍郎髙祖在南徐州鼎望氣知其當王遂寄孥焉因謂髙祖曰眀年有大臣誅死後四歲梁其代興天之歷數當歸舜後昔周滅殷氏封媯汭於宛邱其裔子孫因為陳氏僕觀明公天縱神武繼絶統者無乃是乎帝隂有圖僧辨意聞其言大喜因而定策及受禪拜黃門侍郎太建中以廷尉卿為使聘周加散騎常侍後為太府卿至德初鼎盡貨田宅寓居僧寺友人大匠卿毛彪問其故答曰江東王氣盡於此矣吾與爾當葬長安期運將及故破産爾初鼎之聘周也嘗遇隋文帝謂曰觀君容貌不久必大貴貴則天下一家歲一周天老夫將委贄願深自愛及陳亡驛召入京授上儀同三司待遇甚厚每公宴鼎恆預焉性簡貴雖為亡國之臣未嘗俯仰當世時吏部尚書韋世康兄弟顯貴隋文帝從容謂鼎曰世康與公逺近對曰臣宗族南徙昭穆非臣所知帝曰卿百代卿族豈忘本也命官給酒肴遣世康請鼎還杜陵乃自楚太傅孟以下二十餘世並考論昭穆作韋氏七卷示之歡飲十餘日乃還時蘭陵公主寡上為之求夫選親衛栁述及蕭瑒等以示鼎鼎曰瑒當封侯而無貴妻之相述亦通顯而守位不終上曰位由我爾遂以主降述上又問鼎諸兒誰得嗣位答曰至尊皇后所最愛者當與之非臣敢預知也上笑曰不肯顯言乎開皇十三年除光州刺史以仁義教導務引清靜州中有土豪外修邊幅而內行不軌常為劫盜鼎於都會時謂之曰卿是好人那忽作賊因條其徒黨姦謀逗遛其人驚懼即自首伏又有人客遊通主家之妾及其還去妾盜珍物於夜逃亡尋於草中為人所殺主家知客與妾通因告客殺之縣司鞫問具得姦狀因斷客死獄成上於鼎鼎覽之曰此客實姦而不殺也乃某寺僧詃妾盜物令奴殺之贓在某處即放此客遣人掩僧並獲其贓物自是部內肅然咸稱其神道無拾遺尋追入京頃之卒于長安年七十九趙知禮字齊旦天水隴西人父孝穆梁侯官令知禮涉獵文史善書翰髙祖之討元景仲也或薦之引為記室知禮為文贍速每占授軍書下筆便就率皆稱旨由是常侍左右深被委任當時計畫莫不預焉知禮亦多所獻替髙祖平侯景軍至白茅灣上表於梁元帝及與王僧辨論述軍事其文並知禮所製侯景平授中書侍郎封始平縣子陳受命授通直散騎常侍直殿省遷太府卿權知領軍事天嘉元年進爵為伯王琳平授吳州刺史知禮沉靜有謀謨每軍國大事文帝輒令璽書問之再遷右將軍領前軍將軍卒贈侍中諡曰忠子元恭嗣蔡景歷字茂世濟陽考城人也祖點梁尚書左民侍郎父大同輕車嶽陽王記室參軍景歷少俊爽有孝行家貧好學善尺牘工草隸解褐諸王府佐出為海陽令為政有能名梁簡文帝為侯景所幽景歷與南康嗣王蕭會理謀欲挾簡文出奔事泄見執賊黨王偉保護之獲免因客遊京口髙祖鎮朱方素聞其名以書要之景歷對使人答書筆不停輟文不重改髙祖得書甚加歎賞即日版授征北府中兵參軍仍領記室衡陽獻王昌為吳興太守帝以鄉里父老尊卑有數恐昌年少接對乖禮乃遣景歷輔之承聖中還掌記室髙祖將討王僧辨獨與侯安都等數人謀之景歷弗之知部分既畢召令草檄景歷援筆立成辭義感激事皆稱旨及帝受禪遷祕書監中書通事舍人掌詔誥永定二年坐妻弟劉淹詐受周寶安餉馬為御史中丞沈炯所劾降為中書侍郎舍人如故三年髙祖崩時外有強寇文帝鎮南皖朝無重臣宣后呼景歷及江大權杜稜定議祕不發喪疾呼文帝景歷躬共宦者及內人密營斂服時既暑熱須治梓宫恐斤斧之聲或聞于外仍以蠟為祕器文書詔誥依舊宣行文帝即位復為祕書監舍人如故以定䇿功封新豐縣子纍遷散騎常侍文帝誅侯安都景歷勸成其事以功遷太子左衛率進爵為侯常侍舍人如故六年坐妻兄劉洽依倚景歷權勢前後姦詭并受歐陽威餉絹百匹免官華皎反以景歷為武勝將軍吳明徹軍司皎平明徹於軍中輒戮安成內史楊文通又受降人馬仗有不分明景歷又坐不能匡正被收久之獲宥宣帝即位纍遷通直散騎常侍中書通事舍人掌詔誥仍復封邑太建五年都督吳明徹北侵所向克捷與周將梁士彥戰於吕梁斬獲萬計方欲進圖彭城時宣帝鋭意河南以為指麾可定景歷稱師老將驕不宜過窮逺略帝惡其沮衆大怒猶以朝廷舊臣不深罪之出為豫章內史未行為飛章所劾以在省之日贓汙狼藉帝令有司按問景歷但承其半於是御史中丞宗元饒奏免景歷所居官徙居會稽下鴻臚削爵土及吳明徹敗帝追思景歷前言即日追還復以為征南鄱陽王咨議參軍數日遷員外散騎常侍兼御史中丞復本爵封入守度支尚書舊式拜官在午後景歷拜日適值輿駕幸元武觀在位皆侍宴帝恐景歷不豫特令早拜其見重如此卒官年六十贈太常卿諡曰敬十三年改葬重贈中領軍禎眀元年配享髙祖廟庭二年車駕幸其宅重贈景歷侍中撫軍將軍諡曰忠敬給鼓吹一部勑於墓所立碑景歷屬文不尚雕靡而長於敘事應機敏速為當世所稱有文集三十卷子徵嗣江大權字伯謀濟陽考城人位少府封四會縣伯太建二年卒於通直散騎常侍徵字希祥幼聰敏精識強記年六歲詣梁吏部尚書禇翔翔嗟其頴悟七歲丁母憂居喪如成人禮繼母劉氏性悍視之不以道徵供侍益謹初無怨色徵本名覽景歷以為有王祥之性故為之更名字焉髙祖為南徐州召補迎主簿尋授太學博士太建中纍遷太子中舍人兼東宫領直襲封新豐侯至德中位太子中庶子中書舍人掌制誥尋授左户尚書與僕射江總知撰五禮事後主器其材幹任寄日隆遷吏部尚書每十日一往東宫於皇太子前論述古今得喪及當時政務又勑以廷尉寺獄事無大小取徵議決俄有勑遣收募兵士自為部曲徵善撫恤得物情旬月之間有衆近一萬徵位望既重聲位熏灼物議咸忌憚之尋徙中書令中書清簡無事或云徵有怨言後主聞之大怒收奪人馬將誅之左右致諫獲免禎明二年隋軍濟江後主以徵有幹用令權知中領軍事徵日夜勤苦備盡心力後主嘉焉謂曰事寧有以相報及決戰於鐘山南岡敕徵守宫城西北大營尋令督衆軍戰事京城陷入長安徵美容儀有口辨多所詳究至於士流宦官皇家戚屬及當朝制度憲章儀範户口風俗山川土地問無不對然頗便佞進取不能以退素自業初拜吏部尚書啓後主借鼓吹後主謂所司曰鼓吹軍樂有功乃授蔡徵不自量揆紊我朝章然以其父景歷有締構之功宜且如所啓拜訖即追還徵不修廉隅皆此類也隋文帝聞其敏贍召見顧問言輒會旨然纍年不調久之除太常丞歷尚書戶部儀曹郎轉給事郎卒子翼位司徒屬入隋為東宫學士宗元饒南郡江陵人也少好學以孝謹聞解褐仕梁為征南府外兵參軍及司徒王僧辨幕府初建元饒與沛南劉師知同為主簿髙祖受禪稍遷廷尉尚書左丞中書通事舍人宣帝初即位遷左丞軍國務廣事無巨細一以責之臺省號為稱職遷御史中丞知五禮事時合州刺史陳褎贓汚狼籍遣使就渚斂魚又令人於六郡乞米百姓甚苦之元饒劾奏免之吳興太守武陵王伯禮豫章內史南康嗣王方泰等驕蹇放橫元饒案奏皆見黜削元饒性公平善持法諳曉故事明練政體吏有犯法政不便民及於名教不足者隨事糾正多所禆益遷南康內史以秩米三千餘斛助民租課存問髙年拯救乏絶百姓甚賴焉以課最入朝詔加散騎常侍後為吏部尚書卒劉師知沛國相人也家本素族祖奚之齊淮南太守以善政聞父景彥梁司農卿師知本名思智以與敬帝諱同改焉好學有當務才博涉書史工文筆善儀禮臺閣故事多所詳悉紹泰初髙祖入輔以師知為中書舍人掌詔誥是時兵亂之後朝儀多闕髙祖為丞相及加九錫并受禪其儀注並師知所定梁敬帝在內殿師知常侍左右及將加害師知詐帝令出帝覺繞牀走曰師知賣我陳霸先反我本不須作天子何意見殺師知執帝衣行事者加刃焉既而報髙祖曰事已了髙祖曰卿乃忠於我後莫復爾師知不對髙祖受命仍兼舍人性踈簡與物多忤雖位官不遷而任遇甚重其所獻替皆有𢎞益及髙祖崩六日成服時朝臣共議大行皇帝靈坐俠御人衣服吉凶之制博士沈文阿議宜服吉服師知議云既稱成服本備喪禮靈筵服物皆悉縞素按梁昭明太子薨成服俠侍之官悉著縗斬唯著鎧不異此即可擬愚謂六日成服俠靈坐須服縗絰中書舍人蔡景歷江德藻謝岐等與師知同議時以二議不同乃啓取左丞徐陵決斷陵云梓宫祔山陵靈筵祔宗廟有此分判便驗吉凶按山陵鹵簿吉部伍中公卿已下導引者爰及虎賁鼓吹執蓋奉車並是吉服豈容俠御獨為縗絰若言公卿胥吏並服縗絰此與梓宫部伍有何差别若言文物並吉司事者凶豈容袵絰而奉華蓋縗衣而升玉路邪博士謝岐議曰靈筵祔宗廟梓宫還山陵實如左丞議但山陵鹵簿備有吉凶從靈輿者儀服無變從梓宫者皆服苴縗爰至士禮悉同此制此自是山陵之儀非關成服今謂梓宫靈扆共在西階稱為成服亦無鹵簿直是爰自胥吏上至王公四海之內必備縗絰案梁昭明太子薨略是成例豈容凡百士庶悉此日服重而侍中至於武衛最是近官反鳴玉紆青與平吉不異左丞既推以山陵事愚意或謂與成服有殊陵重答云老病屬纊不能多説古人爭議多成怨府傅元見尤於晉代王商取陷於漢朝謹自三緘敬同髙命若萬一不死猶得展言庶與羣賢更申揚榷文阿猶執所見衆議不能決乃具録二議奏聞上從師知議遷鴻臚卿舍人如故天嘉元年坐事免尋起為中書舍人復掌詔誥天康元年文帝不豫師知與僕射到仲舉等入侍醫藥帝崩豫受顧命及宣帝入輔師知與仲舉等遣舍人殷不佞矯詔令宣帝還東府事覺於北獄賜死初文帝勑師知撰起居注自永定二年秋至天嘉元年為十卷謝岐會稽山隂人也父逹梁太學博士岐少機警好學仕梁為山隂令侯景亂流寓東陽景平依於張彪彪在吳郡及會稽庶事委之彪每征討恆留岐監郡知後事彪敗髙祖引參機密為兼尚書右丞時軍旅屢興糧儲多闕岐所在幹理深被知遇永定元年為給事黃門侍郎中書舍人兼右丞如故天嘉二年卒贈通直散騎常侍弟嶠篤學為通儒毛喜字伯武滎陽陽武人也祖稱梁散騎侍郎父栖忠中權司馬喜少好學善草隸起家王府參軍髙祖素知之及鎮京口命與宣帝往江陵仍勑宣帝咨稟之及梁元帝即位以宣帝為領直喜為尚書功論侍郎及魏平江陵喜與宣帝俱遷關右文帝即位喜自周還進和好之䇿朝廷乃遣周𢎞正等通聘及宣帝反國又遣喜入關以家屬為請周冢宰宇文護執喜手曰能結二國之好者卿也仍迎栁皇后及後主還天嘉三年至都宣帝時為驃騎將軍仍以喜為府記室咨議參軍府朝文翰皆喜詞也文帝嘗謂宣帝曰我諸子皆以伯為名汝諸兒宜以叔為稱宣帝以訪於喜喜即條目古名賢杜叔英虞叔卿等二十餘人以啓之文帝稱善文帝崩廢帝沖昧宣帝録尚書輔政僕射到仲舉等知朝望有歸乃矯太后令遣宣帝還東府當時疑懼無敢措言喜即馳入謂宣帝曰今日之言必非太后之意宗社至重願加三思須臾聞奏果如其䇿右衛將軍韓子髙始與仲舉通謀其事未發喜謂宣帝曰宜簡人馬配與子髙并賜鐵炭使修器甲宣帝曰子髙即欲收執何更如是喜曰山陵始畢邊寇尚多而子髙受委前朝名為杖順宜推心安誘使不自疑徐而圖之一壯士之力耳宣帝卒行其計及帝即位除給事黃門侍郎兼中書舍人典軍國機密宣帝將議北侵勑喜撰軍制十三條詔頒天下文多不載論定䇿功封東昌縣侯以太子右衛率右將軍行江夏武陵桂陽三王府國事母憂去職詔贈其母庾氏東昌國太夫人賜錢布三十萬遣員外散騎常侍杜緬圖其墓田上親與緬按圖指畫其見重如此歷位御史中丞五兵尚書參掌選事及衆軍北伐得淮南之地喜陳安邊之術宣帝納之即日施行宣帝又問喜曰我欲進兵彭汴如何對曰淮左新平邊民未乂周氏始吞齊國難與爭鋒且棄舟楫之工踐車騎之地去長就短非吳人所便臣愚以為未若安民保境順時而動斯久長之術也宣帝不從吳明徹卒俘於周喜後歷丹陽尹吏部尚書及宣帝崩叔陵搆逆勑中庶子陸瓊宣旨令南北諸軍皆取喜處分賊平加侍中初宣帝委政於喜喜亦勤心納忠數有諫爭事並見從由是十餘年間江東狹小遂稱全盛自淮北敗不用喜謀帝深悔之謂袁憲曰一不用毛喜計遂令至此由是益見親重言無回避而皇太子好酒德每共親幸人為長夜之宴喜嘗言之宣帝故太子銜之後主即位遂見疏逺及被始興王所傷創愈置酒於後殿引江總以下展樂賦詩醉酣而命喜于時山陵初畢未及踰年喜見之不懌欲諫之而後主已醉喜升階陽為心疾仆於階下移出省中後主醒乃疑之謂江總曰我悔召毛喜知其無病但欲阻我歡宴非我所為耳乃與司馬申謀曰此人負氣吾欲將乞鄱陽兄弟聽其報讎可乎對曰喜終不為官用願如聖旨傳縡爭之曰不然若許報讎欲置先皇何地後主曰當乞一小郡勿令見人事耳至德元年乃以喜為永嘉內史喜至郡不受俸秩政務清靜民吏安之遇豐州刺史章大寶舉兵反郡與豐州接而素無備喜乃修城隍器械又遣兵援建安賊平授南安內史禎明元年徵為光祿大夫領左驍騎將軍道卒有集十卷子處沖嗣沈君理字仲倫吳與人也祖僧畟梁左户尚書父巡元帝時位少府卿魏平荆州梁宣帝署金紫光祿大夫君理美風儀博涉有識鑒髙祖鎮南徐州巡遣君理致謁深見器重命尚會稽長公主及帝受禪拜駙馬都尉封永安亭侯為吳郡太守時兵革未寧百姓荒弊君理總集士卒修飭器械深以幹理見稱文帝嗣位纍遷左户尚書天嘉六年為東陽太守天康元年以父憂去職自請往荆州迎柩朝議以在位重臣難令出境乃遣長兄君嚴往焉及還將葬詔贈巡侍中領軍將軍諡曰敬子太建中歷位太子詹事吏部尚書宣帝以君理女為皇太子妃賜爵望蔡縣侯位侍中尚書右僕射卒贈翊左將軍開府儀同三司諡曰貞憲君理弟君髙君公君髙字季髙少知名性剛直有吏能位衛尉卿平越中郎將都督廣州刺史甚得人和卒諡祁子君公自梁元帝敗後常在江陵禎明中與蕭瓛蕭巖叛隋歸陳後主擢為太子詹事君公博學有才辨善談論後主深器之陳亡入隋文帝以其叛亡命斬於建康君理弟叔邁方正有幹局位通直散騎常侍侍東宫陸山才字孔章吳郡吳人也祖翁寶梁尚書水部郎父泛中散大夫山才倜儻好尚文史范陽張纘纘弟逭並欽重之紹泰中都督周文育出鎮南豫州不知書疏以山才為長史政事悉以委之文育南討尅蕭勃禽歐陽頠計畫多出山才後文育重鎮豫章金口山才復為鎮南長史豫章太守文育為熊曇朗所害曇朗囚山才等送於王琳未至而侯安都敗琳將常衆愛由是山才獲反纍遷度支尚書坐侍宴與蔡景歷言語過差為有司所奏免官尋授散騎常侍遷西陽武昌二郡太守諡曰簡子沈炯字初明吳興武康人也祖瑀梁尋陽太守父續王府記室參軍炯少有俊才為當時所重仕梁釋褐王國常侍纍遷尚書左户郎吳令侯景之難吳郡太守袁君正入援建鄴以炯監吳郡臺城陷景將宋子仙據吳興遣使召炯委以書記之任炯固辭以疾子仙怒命斬之炯解衣就戮礙於路間桑樹乃更牽往他所或救之僅而獲免子仙愛其才卒逼令掌書記及子仙為僧辨所敗僧辨素聞其名於軍中購得之酬所獲者錢十萬自是羽檄軍書皆出於炯及簡文遇害四方嶽牧皆上表於江陵勸進僧辨令炯製表其文甚工當時莫有逮者髙祖南下與僧辨會於白茅灣登壇設盟炯為其文及侯景東奔至吳郡獲炯妻虞氏及子行簡並殺之炯弟擕其母逃免侯景平梁元帝愍其妻子嬰戮特封原鄉侯僧辨為司徒以炯為從事中郎梁元帝徵為給事黃門侍郎領尚書左丞魏尅荆州為西魏所虜魏人甚禮之授以儀同三司炯以母在東恆思歸國恐魏人愛其文才留之閉門却掃無所交接時有文章隨即毁棄不令流布嘗獨行經漢武通天臺為表奏之陳已思鄉之意曰臣聞橋山雖掩鼎河之竈可祠有魯遂荒大庭之迹無泯伏惟陛下降德猗蘭纂靈豐谷漢道既登神仙可望射之罘於海浦禮日觀而稱功橫中流於汾河指柏梁而髙宴何其甚樂豈不然歟既而運屬上仙道窮晏駕甲帳珠簾一朝零落茂陵玉碗遂出人間凌雲故基與原田而膴膴别風餘迹帶陵阜而芒芒羈旅縲臣豈不落淚昔承明見厭嚴助冬歸駟馬可乘長卿西反恭聞故實竊有愚心黍稷非馨敢望徼福但雀臺之弔空愴魏君雍邱之祠未光夏后瞻仰煙霞伏增悽戀奏訖其夜夢有宫禁之所兵衛甚嚴炯便以情事陳訴聞有人言甚不惜放卿還幾時可至少日便與王克等並放東歸紹泰二年至都歷司農卿御史中丞髙祖受禪加通直散騎常侍表求歸養詔不許文帝嗣位又表求去詔答曰當勑所由相迎尊纍使卿公私無廢也初髙祖嘗稱炯宜居王佐軍國大政多預謀謨文帝又重其才欲寵貴之會王琳入寇大雷留異據東境帝欲使炯因是立功乃解中丞加明威將軍遣還鄉里收合徒衆以疾卒于吳中年五十九贈侍中諡曰恭子有集二十卷行於世虞荔字山披會稽餘姚人也祖權梁廷尉卿永嘉太守父檢平北始興王咨議參軍荔幼聰敏有志操年九歲隨從伯闡候太常陸倕倕問五經十事荔隨問輒應無有遺失倕甚異之又嘗詣徴士何允時太守衡陽王亦造焉允言於王王欲見荔荔辭曰未有版刺無容拜謁王以荔有髙尚之志雅相欽重還郡即辟為主簿荔又辭以年小不就及長美風儀博覽墳籍善屬文仕梁釋褐為西中郎法曹外兵參軍兼丹陽詔獄正梁武帝於城西置士林館荔乃製碑奏上帝命勒之於館仍用荔為士林學士尋為司文郎遷通直散騎侍郎兼中書舍人時左右之任多參權軸內外機務互有帶掌惟荔與顧協泊然靖退居於西省俱以文史見知號為清白尋領大著作及侯景之亂荔率親屬入臺除鎮西咨議參軍舍人如故臺城陷逃歸鄉里侯景平元帝徵為中書侍郎不就貞陽侯僭位授揚州别駕並不就張彪之據會稽荔時在焉及文帝平彪髙祖及文帝並以書招之迫切不得已乃應命至都而髙祖崩文帝嗣位除太子中庶子仍侍太子讀尋領太著作楊州大中正初荔母隨荔入臺卒於臺內尋而城陷情禮不申由是終身蔬食布衣不聽音樂雖任遇隆重而居止儉素淡然無營文帝深器之常引在左右朝夕顧訪荔性沉密少言論凡所獻替莫有見其際者時荔第二弟寄寓于閩中依陳寶應荔每言之輒流涕文帝哀之而謂曰我亦有弟在遠此情甚切他人豈知乃敕寶應求寄寶應終不遣荔因以感疾帝欲數往臨視令將家口入省荔以禁中非私居之所乞停城外帝不許乃令住蘭臺乘輿再三臨問手敕中使相望於道又以荔蔬食積久非羸疾所堪乃手敕曰卿年事已多氣力衰減方欲委仗良須克壯今給卿魚肉不得固從所執荔終不從卒贈侍中諡曰德子及喪柩還鄉里帝親出臨送當時榮之子世基世南並少知名寄字次安少聰敏年數歲有客造其父遇寄於門因嘲之曰郎子姓虞必當無智寄應聲曰文字不辨豈得非愚客大慙入謂其父曰此子非常人文舉之對不是過也及長好學善屬文性沖靜有栖遁之志弱冠舉秀才對策髙第起家梁宣城王國左常侍大同中嘗驟雨殿前往往有雜色寶珠梁武觀之甚有喜色寄因上瑞雨頌帝謂寄兄荔曰此頌典裁清拔卿之士龍也將如何擢用寄聞之歎曰美盛德之形容以申擊壤之情耳吾豈買名求仕者乎乃閉門稱疾唯以書籍自娛嶽陽王察為會稽太守以寄為中記室領郡五官掾在職簡略煩苛務存大體曹局之內終日寂然侯景之亂隨兄荔入臺除正威將軍城陷遁還鄉里張彪往臨川強寄俱行寄與彪將鄭瑋同舟而載瑋嘗忤彪意乃劫寄奔晉安時陳寶應據有閩中得寄甚喜髙祖平侯景寄勸令自結寶應從之乃遣使歸誠承聖元年除中書侍郎寶應愛其才託以道阻不遣每欲引寄為僚屬委以文翰固辭獲免及寶應結婚留異潛有逆謀寄微知其意言説之際每陳逆順之理微以諷諫寶應輒引他事以拒之又嘗令左右讀漢書卧而聽之至蒯通説韓信曰相君之背貴不可言寶應蹶然起曰可謂智士寄正色曰覆酈驕韓未足稱智豈若班彪王命識所歸乎寄知寶應不可諫慮禍及已乃為居士服以拒絶之常居東山寺稱東山居士偽以腳疾不復起寶應以為假託遣人燒寄所卧屋寄安卧不動親近將扶寄出寄曰吾命有所懸避欲安往所縱火者旋自救之寶應自此乃信及留異稱兵寶應資其部曲寄乃因書極諫為陳禍福凡有十事言甚激切寶應覽書大怒或謂寶應曰虞公病篤言多錯謬寶應乃小釋亦以寄人望且優容之及寶應敗走夜至蒲田顧謂其子扞秦曰早從虞公計不至今日扞秦但泣而已寶應既禽凡諸賓客微有交涉者皆誅唯寄以先識免禍初沙門慧標涉獵有才思及寶應起兵作五言詩以送之曰送馬猶臨水離旗稍引風好看今夜月當照紫微宫寶應得之甚悅慧標以示寄寄一覽便止正色無言慧標退寄謂所親曰標公既以此始必以此終後竟坐是誅文帝尋敕章昭逹發遣寄還朝及至引寄曰管寧無恙甚慰勞懷頃之帝謂到仲舉曰衡陽王既出閣雖未置府僚然須得一人旦夕遊處兼掌書記宜求宿士有行業者仲舉未知所對帝曰吾自得之乃手敕用寄寄入謝帝曰所以暫屈遊藩者非止以文翰相煩乃令以師表相事也頃之表求解職歸鄉里優詔答之許其東還後除東中郎咨議加戎昭將軍寄又辭以疾不堪旦夕陪列上於是令長停公事其有疑議就以決之但旦夕箋修而已太建八年加太中大夫後卒寄少篤行造次必於仁厚雖僮豎未嘗加以聲色至臨危執節則辭氣懍然白刃不憚也自流寓南土與兄荔隔絶因感氣疾每得荔書氣輒奔劇前後所居官未嘗至秩滿裁期年數月便自求解常曰知足不辱吾知足矣及謝病私庭每諸王為州將下車必造門致禮命釋鞭版授以几杖侍坐嘗出遊近寺閭里傳相告語老幼羅列望拜道左或言誓為約者但指寄便不欺其至行所感如此所製文筆遭亂多散失傅縡字宜事北地靈州人也父彜梁臨沂令縡幼聰敏七歲誦古詩賦至十餘萬言長好學能屬文梁太清末丁母憂在兵亂中居喪盡禮哀毁骨立士友以此稱之後依湘州刺史蕭修修頗好士廣集墳籍縡肆志尋閲因博通羣書王琳引為記室參軍琳敗隨琳將孫瑒還都時文帝使顔晃賜瑒雜物瑒託縡啓謝詞理周洽文無加點晃還言之文帝召為撰史學士再遷驃騎安成王中記室撰史如故縡篤信佛教從興皇寺慧朗法師受三論盡通其學尋以本官兼通直散騎侍郎使齊還纍遷太子庶子後主即位遷祕書監右衛將軍兼中書通事舍人掌詔誥縡為文典麗性又敏速雖軍國大事下筆輒成未嘗起草沉思者亦無以加焉甚為後主所重然性木強不持檢操負材使氣陵侮人物朝士多銜之會施文慶沈客卿以便佞親幸専制衡軸而縡益疏文慶等共譖縡受髙麗使金後主收縡下獄縡素剛烈因憤恚乃於獄中上書曰夫人君者恭事上帝子愛黔黎省嗜欲逺諂佞未明求衣日旰忘食是以澤被區宇慶流子孫陛下頃來酒色過度不虔郊廟大神専媚淫昏之鬼小人在側宦豎弄權惡忠直若仇讎視百姓如草芥後宫曵綺繡廄馬餘菽粟兆庶流離轉尸蔽野貨賄公行帑藏損耗神怨人怒衆叛親離恐東南王氣自斯而盡書奏後主大怒頃之意解遣使謂縡曰我欲赦卿卿能改過不縡曰臣心如面臣面可改則臣心可改後主於是益怒令宦者李善度窮其事賜死獄中時年五十有集十卷縡雖強直有才而毒惡傲慢為當世所疾及死有惡蛇屈尾來上靈牀當前受祭酹去而復來者百餘日時時有彈指聲時有吳興章華字仲宗家世農夫華獨好學與士君子遊處頗通經史善屬文避侯景之亂遊嶺南居羅浮山寺専精習業歐陽頠為廣州署為南海太守頠子紇敗乃還京師後主即位朝臣以華素無閥閲乃除太市令非其所好乃辭疾不拜鬱鬱不得志禎明初上書極諫其大略曰昔髙祖南平百越北誅逆虜世祖東定吳會西破王琳髙宗克復淮南辟地千里三祖之功亦云勤矣陛下即位于今五年不思先帝之艱難不知天命之可畏溺於嬖寵惑於酒色祠七廟而不出拜妃嬪而臨軒老臣宿將棄之草莽諂佞讒邪升之朝廷今疆埸日蹙隋軍壓境陛下如不改絃易張臣見麋鹿復遊於姑蘇矣書奏後主大怒即日斬之沈客卿吳興人性便佞忍酷為中書舍人每持異端唯以刻削百姓為事施文慶烏程人起自微賤有吏才後主拔為中書舍人俄擢湘州刺史未及之官會隋軍來伐四方州鎮相繼以聞文慶與客卿俱掌機密外有表啓皆由其呈奏文慶心悅湘州重鎮兾欲早行遂與客卿共為表裏抑而不言後主不之知也遂以無備至于敗國實一人之罪隋軍既入並斬之于闕下顧野王字希馮吳郡吳人也祖子喬梁東中武陵王府參軍事父烜信威臨賀王記室兼本郡五官椽以儒術知名野王幼好學七歲讀五經略知大指九歲能屬文常制日賦領軍朱異見而竒之年十二隨父之建安撰建安地記二篇長而遍觀經史精記默識天文地理蓍龜占候蟲篆竒字無所不通梁世為臨賀王府記室宣城王為揚州刺史野王及琅邪王褒並為賔客王甚愛其才野王又好丹青善圖寫王于東府起齋令野王畫古賢命王褒書贊時人稱為二絶及侯景之亂野王丁父憂歸本郡乃召募鄉黨隨義軍援都城野王體素清羸裁長六尺又居喪過毁殆不勝衣及杖戈被甲陳君臣之義逆順之理抗辭作色見者莫不壯之城陷逃會稽天嘉中勑補撰史學士太建中為太子率更令尋領大著作掌國史知梁史事兼東宫通事舍人時宫僚有濟陽江總吳國陸瓊北地傅縡吳興姚察並以才學顯著論者推重之後為黃門侍郎光祿卿知五禮事卒贈祕書監右衛將軍野王少以篤學至性知名在物無過辭失色觀其容貌似不能言及其厲精力行皆人所莫及其所撰著玉篇三十卷輿地志三十卷符瑞圖十卷顧氏譜傳十卷分野樞要一卷續洞冥記一卷乾象表一卷並行於時又撰通史要略一百卷國史記傳二百卷未就而卒文集二十卷時有蕭濟者字孝康東海蘭陵人也少好學博通經史解褐梁祕書郎為太子舍人預平侯景功封松陽縣侯髙祖出鎮徐方以濟為長史文帝守會稽以濟為宣毅府長史及即位授侍中濟毗佐二主恩遇甚篤歷守蘭陵陽羡臨安郡所在著績遷仁威將軍揚州長史宣帝嘗勑取揚州曹事躬自省覽見濟條制詳悉乃顧謂左右曰我本為蕭長史長於經傳不言精練繁劇乃至此太建中歷位五兵度支祠部三尚書卒姚察字伯審吳興武康人吳太常卿信之九世孫也父僧坦梁太醫正及元帝在荆州為晉安王咨議參軍後入周位遇甚重察幼有至性事親以孝聞六歲誦書萬餘言不好戲弄厲精學業年十二能屬文父僧坦精醫術知名梁代每得二宫所行供賜皆回給察兄弟為遊學之資察並用聚蓄圖書由是聞見日博年十三梁簡文帝在東宫盛修文義即引於宣猷堂聽講論難為儒者所稱及簡文嗣位尤加禮接起家南海王國左常侍兼司文侍郎後兼尚書駕部郎遇梁室喪亂隨二親還鄉里在喪亂間篤學不廢元帝於荆州即位授察原鄉令著作杜偉表用察為佐著作撰史永定中吏部尚書徐陵領大著作復引為史佐太建初補宣明殿學士尋為通直散騎常侍報聘于周江左耆舊先在關右者咸相傾慕沛國劉臻竊於公館訪漢書疑事十餘條並為剖析皆有經據臻謂所親曰名下定無虛士及還察著西聘道里記使還補東宫學士遷尚書祠部侍郎于時濟陽江總吳國顧野王陸瓊瓊從弟瑜河南褚玠北地傅縡等皆以才學之美晨夕娛侍察每言論製述咸為諸人宗重遷尚書祠部侍郎此曹職司郊廟舊魏王肅奏祀天地設宫懸之樂八佾之儛爾後因循不革梁武帝以為事人禮縟事神禮簡古無宫懸之文陳初承用莫有損益宣帝欲設備樂付有司立議以梁武為非時碩學名儒朝端在位者咸希上旨並即注同察乃博引經籍獨違羣議據梁樂為是當時驚駭莫不慙服僕射徐陵因改同察議其不順時隨俗皆此類也後歷仁威淮南王平南建安王二王府咨議參軍丁內憂去職俄起為戎昭將軍知撰梁史又勑専知優册謐議等文筆後主立兼東宫通事舍人知撰史至德元年除中書侍郎轉太子僕餘並如故初梁室淪沒父僧坦入長安察蔬食布衣不聽音樂至是凶問因聘使到江南時察母韋氏喪制適除後主以察羸瘠慮加毁頓乃密遣中書舍人司馬申就宅發哀仍勑専加譬抑曰卿惸然一身宗奠是寄毁而滅性聖教所不許宜微自遣割以存禮制尋以忠毅將軍起兼東宫通事舍人察頻表不許俄勑知著作郎事服闋除給事黃門侍郎領著作察既纍居憂戚齋素日久因加氣疾後主常别召見為之動容命停持長齋可從晚食又詔授祕書監領著作如故察在祕書大加刪正又奏撰中書表集旬月遷度支吏部二尚書仍領著作察既博極墳素尤善人物至於姓氏所起枝葉所分官職姻娶興衰髙下舉而論之無所遺失銓衡之職久無梓匠後主方擇其人尚書令江總等咸共薦察勑召入論選事察垂涕拜曰臣東臯賤族忝竊逾分銓衡之重必知不可後主曰選衆之舉僉議所歸昔毛玠雅量清恪盧育心平體正王藴銓量得地山濤舉不失才就卿而求兼此衆美察自居顯要甚勵清潔自廩俸以外一不交通嘗有私門生不敢厚餉止送南布一端花練一匹察曰吾所衣著止是麻布蒲練此物於吾無用既欲相欵接幸不順爾此人遜請猶冀受納察厲色驅出因此人莫敢饋遺陳滅入隋詔授祕書丞别勑成梁陳二代史又勑於朱華閣長參隋文帝知察蔬菲别日獨召入內殿賜果菜乃指察謂朝臣曰聞姚察學行當今無比我平陳唯得此一人開皇十三年襲封北絳郡公察在陳時聘周因得與父僧坦相見將别之際絶而復蘇至是承襲愈更悲感見者莫不為之歔欷丁後母杜氏喪解職在服制之中有白鳩巢于户上仁夀二年詔奪情禮除員外散騎常侍晉王侍讀煬帝即位授太子內舍人改易衣冠刪正朝式參預對問察一人而已大業二年終于東都時年七十四遺命薄葬以松板薄棺才可容身土周於棺而已葬日止鹿車即送厝舊塋北不須立靈置一小牀每日設清水六齋日設齋食菜果任家有無不須别經營也初察嘗願讀一藏經並已究竟將終曾無痛惱但向西坐正念云一切空滅其後身體柔軟顔色如恆兩宫悼惜贈賵甚厚察至孝有人倫鑒識沖虛謙遜不以所長矜人専志著書白首不倦初後主所製文筆卷軸甚多付察悉令刋定察所著漢書訓纂三十卷説林十卷西聘玉璽建康三鐘等記各一卷文集二十卷並傳於世所撰梁陳史雖未畢功隋文帝遣內史舍人虞世基索本且進藏在內殿梁陳二史本多是察之所撰其中序論及紀傳有所闕者臨亡之時仍以體例誡約子思亷撰續思亷流涕奉行思亷在陳為衡陽王府法曹參軍會稽王主簿入隋為河間郡司法內史侍郎虞世基奏之踵成梁陳二代史自爾以來稍就江總字總持濟陽考城人也六世祖湛宋領軍湛生恁著作佐郎恁生斆齊祕書監斆生蒨司徒左長史蒨生紑紑有至性列梁孝友傳紑生總總七歲而孤依于外氏幼聰敏亦有至性元舅吳平侯蕭勱名重當時特所鍾愛嘗謂總曰爾操行殊異風采英拔後之知名當出吾右及長篤學有文辭家傳賜書數十卷總晝夜尋讀未嘗輟手年十八解褐王府參佐遷尚書殿中郎梁武帝撰正言始畢制述懷詩總預同此作帝覽總詩深見嗟賞仍轉侍郎尚書僕射范陽張纘度支尚書琅邪王筠都官尚書南陽劉之遴並髙才碩學總時年少有名纘等雅相推重為忘年友會之遴嘗酬總詩深相欽挹纍遷太子中舍人侯景寇建鄴詔以總權兼太常卿守小廟臺城陷總避難﨑嶇纍年至會稽憩龍華寺乃制修心賦略序時事其詞甚清拔總第九舅蕭勃先據廣州總又自會稽往依焉及元帝平侯景徴為始興內史會魏剋江陵不行自此流寓嶺南積歲天嘉四年以中書侍郎徵還朝直侍中省掌東宫管記纍遷左户尚書轉太子詹事總性寬和溫裕尤工五言七言溺於浮靡及為宫端與太子為長夜之飲養良娣陳氏為女太子亟微行遊總家宣帝怒免之後又歷左户尚書後主即位除吏部尚書參掌選事遷尚書僕射參掌如故尋䇿詔授尚書令加扶給鼓吹既當權任宰不持政務但日與後主遊宴後庭多為豔詩好事者相傳諷玩不絶唯與陳暄孔範王瑳等十餘人當時謂之狎客由是國政日頽綱紀不立有言之者輒以罪斥之君臣昏亂以至于滅禎明三年陳亡入隋拜上開府開皇十四年卒於江都時年七十六總嘗自敘云太建之時權移羣小諂嫉作威屢被摧黜奈何命也識者譏其言迹之乖有文集三十卷傳於世長子溢字深源頗有文詞性慠誕恃勢驕物雖近屬故友不免詆欺歷官中書黃門侍郎太子中庶子入隋為秦王文學卒徐陵字孝穆東海郯人也祖超之梁員外散騎常侍父摛梁末贈侍中太子詹事自有傳陵母臧氏嘗夢五色雲化為鳯集左肩上已而誕陵沙門釋寶志者有道術陵年數歲家人擕以候之寶志摩其頂曰天上石麒麟也光宅寺慧雲法師每嗟陵早就謂之顔回八歲能屬文十三通莊老義既長博涉史籍縱橫有口辨父摛為晉安王咨議王又引陵參寧蠻府軍事王立為皇太子東宫置學士陵充其選稍遷尚書度支郎出為上虞令御史中丞劉孝儀與陵先有隙風聞劾陵在縣贓汙因坐免久之為通直散騎侍郎簡文在東宫撰長春殿義記使陵為序又令於少傅府述已所製莊子義太清二年為通直散騎常侍使魏魏人授館宴賓是日甚熱其主客魏收嘲陵曰今日之熱當由徐常侍來陵即答曰昔王肅至此為魏始制禮儀今我來聘使卿復知寒暑收大慙齊文襄為相以收失言囚之纍日及侯景寇京師陵父摛先在圍城之內陵不奉家信便蔬食布衣若居憂恤會齊受魏禪梁元帝承制於江陵復通使於齊陵纍求復命終拘留不遣陵乃致書於僕射楊遵彥情理梗切遵彥不報及江陵陷齊送貞陽侯淵明為梁嗣乃遣陵隨還太尉王僧辨初拒境不納淵明復往致書皆陵辭也及淵明入僧辨得陵大喜以為尚書吏部郎兼掌詔誥其年髙祖誅僧辨仍進討韋載而任約徐嗣徽承虛襲石頭陵感僧辨舊恩往赴任約約平髙祖釋陵不問以為尚書左丞紹泰二年又使齊還除給事黃門侍郎祕書監陳受禪加散騎常侍天嘉四年為五兵尚書領大著作六年除散騎常侍御史中丞時安成王頊為司空以帝弟之尊勢傾朝野直兵鮑僧睿假王威風抑塞辭訟大臣莫敢言者陵乃為奏彈之文帝見陵服章嚴肅若不可犯為斂容正坐陵進讀奏狀時安成王殿上侍立仰視文帝流汗失色陵遣殿中御史引王下殿遂劾免自此朝廷肅然遷吏部尚書領大著作陵以梁末以來選授多失其所於是提舉綱維綜核名實時有冒進求官喧競不已者陵乃為書宣示之曰永定之時聖朝草創干戈未息尚無條序府庫空虛賞賜懸乏白銀難得黃札易營權以官階代於錢絹義在撫接無計多少致令員外常侍路上比肩咨議參軍市中無數豈是朝章應其如此今衣冠禮樂日富年華何可猶作舊意非理望也所見諸君多踰本分猶言大屈未諭髙懷若問梁朝朱領軍異亦為卿相此不踰其本分邪此是天子所拔非關選序梁武帝云世間人言有目色我特不目色范悌宋文帝亦云人豈無運命每有好官缺輒憶羊元保此則清階顯職不由選也既忝衡流諸賢深明鄙意自是衆咸服焉時論比之毛玠及宣帝入輔謀黜異志者引陵預其議廢帝即位封建昌縣侯太建中遷尚書左僕射陵抗表推周𢎞正王勱等帝召陵入內殿曰卿何為固辭此職而舉人乎陵曰周𢎞正從殿下西還舊藩長史王勱太平中相府長史張種帝鄉賢戚若選賢與舊臣宜居後帝苦屬之乃奉詔及朝議北伐宣帝曰朕意已決卿可舉元帥衆議咸在中衛將軍淳于量獨陵曰不然吳明徹家在淮左悉彼風俗將略人才當今亦無過者於是爭論纍日不能決都官尚書裴忌曰臣同徐僕射陵應聲曰非但明徹良將裴忌即良副也是日詔明徹為都督令忌監軍事遂尅淮南數十州之地帝因置酒舉杯屬陵曰賞卿知人陵避席對曰定䇿皆出聖𠂻非臣之力也領國子祭酒七年以公事免侍中僕射尋加侍中給扶十二年為中書監領太子詹事陵以年老纍表求致仕帝亦優禮之乃詔將作為造大齋令陵就第攝事後主即位遷左光祿大夫太子少傅至德元年卒年七十七詔贈特進初後主為文示陵云他人所作陵嗤之曰都不成辭句後主銜之至是諡曰章偽侯陵器局𢎞逺容止可觀性又清簡無所營樹祿俸與親故共之太建中食建昌户户送米至水次親戚有貧匱者皆召令取焉數日便盡陵家尋致乏絶府寮怪問其故陵云我有車牛衣裳可賣餘家有可賣不其周給如此少而崇信釋教經論多所釋解後主在東宫令陵講大品經義學名僧自逺雲集每講筵商較四座莫能與抗目有青精時人以為聰慧之相自陳創業文檄軍書及受禪詔䇿皆陵所製而九錫尤美為一代文宗亦不以此矜物未嘗詆訶作者其於後進接引無倦文宣之世國家有大手筆皆陵草之其文頗變舊體緝裁巧密多有新意每一文出手好事者已傳寫成誦遂被之華夷家有其本後逢喪亂多散失存者三十卷有四子儉份儀僔儉一名報幼而修立勤學有志操汝南周𢎞直重其為人妻之以女梁元帝召為尚書金部郎中嘗侍宴賦詩元帝歎賞之曰徐氏之子復有文矣魏平江陵還建鄴纍遷中書侍郎太建初廣州刺史歐陽紇舉兵反宣帝令儉持節喻旨紇見儉盛列仗衛言辭不恭儉曰吕嘉之事誠為已逺將軍獨不見周迪陳寶應乎紇默然不答懼儉沮衆不許入城置儉於袛園寺紇嘗出見儉儉曰將軍業已舉事儉須還報天子儉之性命雖在將軍將軍成敗不在於儉幸不見留紇於是遣儉儉從間道馳還宣帝乃命章昭逹討紇以儉監昭逹軍紇平為兼中書通事舍人後主立再遷尋陽內史為政嚴明盜賊靜息遷散騎常侍襲封建昌侯入為御史中丞儉公平無所阿附尚書令江總望重一時為儉所劾後主深委任焉禎明二年卒份少有父風九歲為夢賦陵見之謂所親曰吾幼屬文亦不加此為海鹽令有政績入為太子洗馬性孝悌陵嘗疾篤份燒香泣涕跪誦孝經日夜不息如是者三日陵疾豁然而愈親黨皆謂份孝感所致先陵卒儀少聰警仕為尚書殿中郎陳亡隱於錢塘之赭山隋煬帝召為學士尋除著作佐郎大業四年卒陵弟孝克少為周易生有口辨能談元理既長遍通五經博覽史籍亦能屬文起家為太學博士性至孝遭父憂殆不勝喪事所生母陳氏盡就養之道梁末侯景寇亂大飢死者十七八孝克養母饘粥不能給妻臧氏領軍將軍盾之女也甚有容色孝克乃謂之曰今飢荒如此供養交闕欲嫁卿與富人望彼此俱濟於卿意如何臧氏不之許時有孔景行者為侯景將頗富於財孝克密因媒者陳意景行多從左右遂逼而迎之臧氏涕泣而去所得榖帛悉以遺母孝克又剃髮為沙門改名法整兼乞食以充給焉臧氏亦深念舊恩數饋餉故不乏絶後景行戰死臧氏伺孝克於途中纍日乃見謂孝克曰往日之事非為相負今既得脫當歸供養孝克默然無答於是歸俗更為夫妻後東遊居錢唐之佳義里與諸僧討論釋典遂通三論每日二時講旦講佛經晚講禮傳道俗受業者數百人天嘉中除剡令非其好尋去職太建四年徵為祕書丞不就乃蔬食長齋持菩薩戒晝夜講誦法華經宣帝甚嘉其操行除國子祭酒孝克每侍宴無所食噉至席散當其前膳羞損減帝密記以問中書舍人管斌斌曰每見孝克取珍果內紳帶中莫識其意後尋訪方知其還以遺母帝嗟歎乃勑所司自今宴享孝克前饌並遣將還以餉其母時論美之至德中皇太子入學釋奠百司陪列孝克發孝經題後主詔皇太子北面致敬禎明元年入為都官尚書自晉以來尚書官僚皆攜家屬居省省在臺城內下舍門中有閣道東西跨路通于朝堂其第一即都官之省西抵閣道年代久逺多有鬼怪每昏夜之際無故有聲光或見人著衣冠從井中出須臾復沒或門閣自然開閉居省者多死亡尚書周確卒於此省孝克代確便即居之經涉兩載妖變皆息時人以為貞正所致孝克性清素好施惠故不免飢寒後主勑以石頭津稅給之孝克悉用設齋寫經隨盡二年為散騎常侍侍東宫陳亡隨例入長安家道壁立所生母患欲粳米為粥不能常辦母亡後孝克遂常噉麥有遺粳米者孝克對而悲泣終身不復食之開皇十二年長安疾疫隋文帝聞其名行召令於尚書都堂講金剛般若經尋授國子博士後侍東宫講禮傳十九年以疾卒年七十三臨終正坐念佛室內有非常香氣鄰里皆驚異之子萬載位太子洗馬周𢎞正字思行汝南安成人也祖顒齊中書郎自有傳父寶始梁司徒祭酒𢎞正幼孤及弟𢎞讓𢎞直俱為伯父侍中捨所養年十歲通老子周易捨每與談論輒異之曰觀汝神情頴悟清理警發後世知名當出吾右河南裴子野深相賞納請以女妻之十五召補國子生仍於國學講周易諸生傳習其義以季春入學孟冬應舉學司以其日淺不之許焉博士到洽曰周郎年未弱冠便自講經雖曰諸生實堪師表無俟策試普通中初置司文義郎直壽光省以𢎞正為司義侍郎𢎞正醜而不陋吃而能談俳諧似優剛腸似直善元理為當世所宗藏法師於開善寺講説門徒數百𢎞正年少未知名著紅襌錦絞髻踞門而聽衆人蔑之弗譴也既而乘間進難舉坐盡傾法師疑非世間人覘知大相賞狎劉顯將之尋陽朝賢畢祖道顯縣帛十匹約曰儉衣來者以賞之衆人競改常服不過長短之間顯曰將有甚於此矣既而𢎞正緑絲布袴繡假種軒昂而至折摽取帛大通三年昭明太子薨其嗣華容公不得立乃以晉安王綱為皇太子𢎞正奏記請抗目夷上仁之義執子臧之節其抗直守正如此常自稱有才無相僕射徐勉掌選以其陋不堪為尚書郎乃獻書於勉其言甚切稍遷國子博士學中有宋元凶講孝經碑歷代不改𢎞正始到官即表刋除時於城西立士林館𢎞正居以講授聽者傾朝野焉𢎞正啓梁武周易疑義凡五十條又請釋乾坤二繫帝優詔答之後為平西邵陵王府咨議參軍有罪應流徙勑以賜於陀利國未去寄繫尚方於獄上武帝講武詩降勑原罪仍復本位𢎞正博物知乾象善占候大同末嘗謂弟𢎞讓曰國家厄運數年當有兵起吾與汝不知何所逃之及梁武帝納侯景𢎞正謂𢎞讓曰亂階此矣臺城陷𢎞正諂附王偉避景諱又與周石珍合族改姓姬氏侯景拜為太常景將篡之際使掌禮儀及王僧辨東討元帝謂僧辨曰王師近次朝士孰當先來王僧辨曰其周𢎞正乎𢎞正智不及機體能制勝無妻子之顧有獨決之明其餘皆不逮也俄而前部傳云𢎞正至僧辨飛騎迎之及見歡甚曰吾固知王僧逹非後機者公可坐吾膝上對曰可謂進而若加諸膝老夫何足以當僧辨即日啓元帝帝手書與𢎞正仍遣使迎之謂朝士曰晉氏平吳喜獲二陸今我破賊亦得兩周今古一時足為連類及至禮數甚優朝臣無比授黃門侍郎直侍中省俄遷左户尚書加散騎常侍夏月著犢鼻褌衣朱衣為有司所彈其任逹如此元帝嘗著金樓子曰余於諸僧重招提琰法師隱士重華陽陶貞白士大夫重汝南周𢎞正其於義理情轉無窮亦一時之名士也𢎞正善清談梁末為元宗之冠及侯景平王僧辨啓送祕府圖籍勑𢎞正讎校時朝議遷都但元帝再臨荆峽前後二十餘年情所安戀不欲歸建鄴兼故府臣僚皆楚人並欲即都江陵云建康蓋是舊都雕荒已極且王氣已盡兼與北止隔一江若有不虞悔無所及且臣等又聞荆南有天子氣今其應矣元帝無去意時尚書左僕射王褒及𢎞正咸侍帝顧曰卿意何如褒等以帝猜忌弗敢衆中公言唯唯而已褒後因請間密諫還丹陽甚切帝雖納之色不悅及明日衆中謂褒曰卿昨勸還建鄴不為無理吾昨夜思之猶懷疑惑褒知不引納乃止他日𢎞正乃正色諫至於再三曰若如士大夫知聖主所都本無定處至如黔首未見入建鄴城便謂未是天子猶列國諸王今日赴百姓之心不可不歸建鄴當時頗相酬許𢎞正退後黃羅漢宗懍乃言𢎞正王褒並東人仰勸東下非為國計𢎞正竊知其言他日乃復上前面折二人曰若東人勸下東謂之私計西人勸住西亦是私計不衆人默然而人情並勸遷都上又曾以後堂大集文武其預會者四五百人常欲遍試人情曰勸吾去者左袒於是左袒者過半武昌太守朱買臣上舊左右閹人也頗有幹用故上擢之及是勸上遷曰買臣家在荆州豈不願官長住但恐是買臣富貴非官富貴也上深感其言卒不能用及魏平江陵𢎞正遁歸建鄴太平元年授侍中領國子祭酒遷太常卿都官尚書髙祖受禪授太子詹事天嘉元年遷侍中國子祭酒往長安迎宣帝三年自周還廢帝嗣位領都官尚書總知五禮事宣帝即位遷特進領國子祭酒加秩太建二年授尚書右僕射尋勑侍東宫講論語孝經太子以𢎞正德望素重有師資之敬焉𢎞正特善元言兼明釋典雖碩德名僧莫不請質疑滯六年卒官年七十九贈侍中中書監諡曰簡子所著周易講疏十六卷論語疏十一卷莊子疏八卷老子疏五卷孝經疏二卷集二十卷行於世子豫元年十四與俱載入東乘小航度淮見藤花𢎞正挽之船覆俱溺𢎞正僅免豫元遂得心驚疾次子墳尚書吏部郎𢎞讓性簡潔博學多通始仕不得志隱於句容之茅山頻徵不出晚仕侯景為中書侍郎人問其故對曰昔王道正直得以禮進退今乾坤易位不至將害於人吾畏死耳始彭城劉孝先亦辭辟命隨兄孝勝在蜀武陵王建號仕為世子府咨議參軍二隱並獲譏於世𢎞讓承聖初為國子祭酒二年為仁威將軍城句容以居之命曰仁威壘天嘉初以白衣領太常卿光祿大夫加金章紫綬𢎞讓弟𢎞直字思方幼而聰敏仕梁為西中郎湘東王外兵記室參軍與東海鮑泉南陽宗懍平原劉綬沛國劉榖同掌書記王出鎮江荆二州纍除咨議參軍及承制封湘濵縣侯纍遷昌州刺史王琳之舉兵𢎞直在湘州琳敗乃入陳位太常卿光祿大夫加金章紫綬𢎞直方雅敦厚氣調髙於次昆或問三周孰賢曰若蜂腰矣太建七年卒遺疏絶氣之後便買市中材小形者斂以時服古人通制但下見先人必須備禮可著單衣裙衫故履既應侍養宜備紛帨或逢善友又須香爐棺內唯安白布手巾粗香爐而已此外無所用卒於家年七十六有集二十卷子確字士濳美容儀寬大有行檢博涉經史篤好元言位都官尚書禎明初卒陸繕字士繻吳郡吳人也祖慧曉齊南兗州刺史自有傳父任御史中丞繕幼有志尚以雅正知名梁承聖中為中書侍郎掌東宫管記魏平江陵繕微服遁還建鄴紹泰元年除司徒右長史御史中丞以父所終固辭髙祖作輔以繕為司徒司馬及受命為侍中出為新安太守文帝嗣位徵為中庶子領步兵校尉掌東宫管記繕儀表端麗進退間雅趨步躡履文帝使太子諸王咸取則焉後復拜御史中丞猶以父所終固辭不許乃權換廨宇徙以居之太建中歷度支尚書侍中太子詹事尚書右僕射尋遷左僕射參掌選事别勑與徐陵等七人參議政事卒贈特進諡曰安子以繕東宫舊臣特賜祖奠繕子辨慧年數歲詔引入殿內進止有父風宣帝因賜名辨慧字敬仁繕兄子見賢亦方雅位少府卿卒繕從祖孫瓊字伯玉瓊祖完梁寧逺長史琅邪彭城二郡丞父雲公給事黃門掌著作瓊幼聰慧有思理六歲為五言詩頗有詞彩梁大同末雲公受梁武詔校定碁品到溉朱異以下並集瓊時年八歲於客前覆局由是京師號曰神童異言之武帝有勑召見瓊風神警亮進退詳審帝甚異之十一丁父憂毁瘠有至性從祖襄歎曰此兒必荷門基所謂一不為少及侯景作逆擕母避地於縣之西鄉勤苦讀書晝夜無怠遂博學善屬文天嘉中以文學纍遷尚書殿中郎瓊素有令名深為文帝所賞及討周迪陳寶應等都官符及諸大手筆並中勑付瓊為新安王文學掌東宫管記及宣帝為司徒妙簡僚佐吏部尚書徐陵薦瓊於宣帝言瓊識具優敏文史足用進居郎署歲月過淹左西掾缺允膺兹選雖階次小踰其屈滯已積乃除司徒左西掾尋兼通直散騎常侍聘齊太建中為給事黃門侍郎轉中庶子領大著作撰國史後主即位直中書省掌詔誥至德元年除度支尚書參選事掌詔誥并判廷尉建康二獄事初瓊父雲公奉梁武帝撰嘉瑞記瓊述其旨而續焉自永定迄於至德勒成一家之言遷吏部尚書著作如故瓊詳練譜牒雅有識鑒先是吏部尚書宗元饒卒尚書左僕射袁憲舉瓊宣帝未之用至是居之時號為稱職瓊性謙素不自封植雖位望日隆而執志逾下園池室宇無所改作車馬衣服不尚鮮華四時俸祿皆散之宗族家無餘財暮年深懷止足思避權要常謝病不視事俄丁母憂初瓊之侍東宫母隨在官舍及喪還鄉詔加賻贈後主自製志銘朝野榮之瓊哀慕過毁以至德四年卒有文集二十卷行於世子從典字由儀幼而聰敏年八歲讀沈約集見回文碑銘援筆擬之便有佳致十二作栁賦其詞甚美瓊時為東宫管記官僚並一時俊偉瓊示以此賦咸竒其異才從父瑜特所賞愛及瑜將卒命家中墳籍皆付從典從典乃集瑜文為十卷仍製集序其文甚工從典篤好學業博涉羣書於班史尤所屬意年十五州舉秀才遷太子舍人時後主賜僕射江總并其父詩總命從典為謝啓援筆便就文華理暢總甚異焉金陵淪沒入隋為東宫學士尚書右僕射楊素奏從典續司馬遷史記迄於隋其書未就坐弟受漢王諒職免後卒於南陽縣主簿瓊從父弟琰字溫玉父令公梁中軍宣城王記室參軍琰幼孤好學有志操州舉秀才纍遷宣惠始興王外兵參軍直嘉德殿學士文帝聽覽餘暇頗留心史籍以琰博學善占誦引置左右嘗使製刀銘琰援筆即成無所點竄帝嗟賞久之賜衣一襲俄兼通直散騎常侍副琅邪王厚聘齊至鄴而厚卒琰為使主時年二十餘風采韶亮占對間敏齊士大夫甚傾心焉太建初為武陵王明威府功曹史兼東宫管記丁母憂去官卒至德二年追賜司農卿琰寡嗜欲鮮矜競遊心經籍晏如也所製文筆多不存本後主求其遺文撰成二卷琰弟瑜字幹玉少篤學美詞藻州舉秀才再遷軍師晉安王外兵參軍東宫學士兄琰時為管記並以才學娛侍左右時人比之二應太建中纍遷太子洗馬中舍人瑜聰敏強記嘗受莊老於汝南周𢎞正學成實論於僧滔法師並通大旨時皇太子好學欲博覽羣書以子集繁多命瑜抄撰未就而卒太子為之流涕親製祭文仍與詹事江總論述其美詞甚傷切至德二年追贈光祿卿有集十卷瑜有從父兄玠從父弟琛玠字潤玉梁大匠卿晏子之子𢎞雅有識度好學能屬文後主在東宫徵為管記仍兼中書舍人尋以疾失明將還鄉里太子解衣贈之為之流涕太建八年卒至德二年追贈少府卿有集十卷琛字潔玉宣毅臨川王長史邱公之子少警俊事後母以孝聞後主嗣位為給事黃門侍郎中書舍人參掌機密琛性頗疏坐漏泄禁中語詔賜死張種字士苖吳郡吳人也曾祖裕宋會稽太守自有傳祖辨宋大司農廣州刺史父略太子中庶子臨海太守種少恬靜居處雅正傍無造請時人語曰宋稱敷演梁則卷充清虛學尚種有其風仕梁為中軍宣城王府主簿時已四十餘家貧求為始豐令及武陵王紀為益州刺史重選府僚以種為左西曹掾種辭以母老為有司奏坐黜免侯景之亂奉母東奔鄉里母卒種時年五十而毁瘠過甚又迫以凶荒未葬服雖畢居家飲食恆若在喪景平後司徒王僧辨以狀奏起為中從事并為具葬禮葬訖種方即吉僧辨又以種年老無子賜以妾及居處之具髙祖受禪為太常卿歷位左户尚書侍中中書令金紫光祿大夫種沉深虛靜識量宏博時以為宰相之器僕射徐陵嘗抗表讓位於種以為宜居左執其為時望所推如此卒贈特進諡元子種仁恕寡欲雖歷顯位家産屢空終日晏然不以為病太建初女為始興王妃以居處僻陋賜宅一區又纍賜無錫嘉興縣秩嘗於無錫見重囚在獄天寒呼囚暴日遂失之帝大笑而不深責有集十四卷種弟稜亦清靜有識度位司徒左長史贈光祿大夫陰鏗字子堅武威姑臧人也父子春梁左衛將軍自有傳鏗五歲能誦詩賦日千言及長博涉史傳尤善五言詩為當時所重釋褐梁湘東王府法曹行參軍初鏗嘗與賔友宴飲見行觴者因回酒炙以授之衆坐皆笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗嘗為賊所擒或救之獲免鏗問其故乃前所行觴者天嘉中為始興王中録事參軍文帝嘗宴羣臣賦詩徐陵言之於帝即日召鏗預宴使賦新成安樂宫鏗援筆便就帝甚賞之纍遷晉陵太守員外散騎常侍頃之卒有集三卷行於世陳暄義興國山人也父慶之梁司州刺史自有傳暄學不師受文才俊逸尤嗜酒無節操遍歷王公門沉湎喧譊過差非度其兄子秀常憂之致書於暄友人何胥冀以諷諫暄聞之與秀書曰旦見汝書與孝典陳吾飲酒過差吾有此好五十餘年昔吳國張長公亦稱耽嗜吾見張時伊已六十自言引滿大勝少年時吾今所進亦多於往日老而彌篤唯吾與張季舒耳且吾方與此子交歡於地下汝欲夭吾此志邪昔阮咸阮籍同遊竹林宣子不聞斯言王湛能元言巧騎武子呼為癡叔何陳留之風不嗣太原之氣巋然翻成可怪吾既寂漠當世朽病殘年産不異於顔原名未動於卿相若不日飲醇酒復欲安歸汝以飲酒為非吾以不飲酒為過昔周伯仁度江唯三日醒吾不以為少鄭康成一飲三百杯吾不以為多然洪醉之後有得有失成厮養之志是其得也使次公之狂是其失也吾嘗譬酒之猶水亦可以濟舟亦可以覆舟故江咨議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉美哉江公可與共論醉矣汝驚吾墮馬侍中之門陷池武陵之第遍布朝野自言焦悚丘也幸茍有過人必知之吾生平所願身沒之後題吾墓云陳故酒徒陳君之神道若斯志意豈避南征之不復賈誼之慟哭者哉何水曹眼不識杯鐺吾口不離瓢杓汝寧與何同日而醒與吾同日而醉乎政言其醒可及其醉不可及也速營糟邱吾將老焉爾無多言非爾所及暄以落魄不為中正所品久不得調太康中徐陵為吏部尚書精簡人物縉紳之士皆嚮慕焉暄以玉帽簪插髻紅絲布裹頭袍拂踝靴至膝不陳爵里直上陵坐陵不之識命吏持下暄徐步而出舉止自若竟無怍容作書謗陵陵甚病之後主之在東宫引為學士及即位遷通直散騎常侍與義陽王叔逹尚書孔範度支尚書袁權侍中王瑳金紫光祿大夫陳褒御史中丞沈瓘散騎常侍王儀等恆入禁中陪侍遊宴謂為狎客暄素通脫以俳優自居文章諧謬語言不節後主甚親匿而輕侮之嘗倒懸於梁臨之以刃命使作賦仍限以晷刻暄援筆即成不以為病而傲弄轉甚後主稍不能容遂摶艾為帽加於其首用火以爇之然及於髮垂泣求哀聲聞於外而弗之釋會衛尉卿栁莊在坐遽起撥之拜謝曰陳暄無罪臣恐陛下有玩人之失輒矯赦之造次之愆伏待刑憲後主素重莊意稍解勑引暄出命莊就坐經數日暄發悸而死杜龕京兆杜陵人也世居襄陽諸父兄弟九人皆知名伯父崱為梁名將自有傳龕父岺龕少驍勇善用兵與諸父歸梁元帝帝以為鄭州刺史封中廬縣侯與王僧辨討平河東王譽又隨僧辨下繼徐文盛軍至巴陵聞侯景陷郢州西上將至乃與僧辨等守巴陵景至圍之數旬不尅而遁遷太府卿定州刺史及衆軍至姑熟景將侯子鑒逆戰龕與髙祖及王琳等擊之大敗子鑒遂至石頭景親會戰龕與衆軍大破之論功為最授東揚州刺史又與僧辨降陸納平武陵王及魏平江陵後齊納貞陽侯淵明以紹梁嗣以龕為震州刺史吳興太守遷南豫州刺史封溧陽縣侯又加散騎常侍鎮南大將軍龕僧辨壻也始為吳興太守以髙祖既非素貴及為其本郡以法繩其宗門無所縱捨髙祖銜之切齒及僧辨敗龕乃據吳興以拒之頻敗文帝軍龕好飲酒終日恆醉勇而無略部將杜泰私通於文帝説龕降龕然之其妻王氏曰霸先讎隙如此何可求和因出私財賞募復大敗文帝軍後杜泰降文帝龕尚醉不覺文帝遣人負出項王寺前斬之王氏因截髮出家杜氏一門覆滅熊曇朗豫章南昌人也世為郡著姓曇朗跅弛不羈有膂力容貌甚偉侯景之亂稍聚少年據豐城為柵桀黠劫盜多附之梁元帝以為巴山太守魏尅荆州曇朗兵力稍強劫掠鄰縣縳賣居人山谷之中最為巨患及侯瑱據豫章曇朗外不服從隂欲圖瑱侯方兒之反填也曇朗為之謀主瑱敗曇朗獲瑱馬仗子女甚多及蕭勃踰嶺歐陽頠為前軍曇朗紿頠共往巴山襲黃法氍又紿法氍期共破頠且曰事捷與我馬仗乃出軍與頠掎角而進又紿頠曰余孝頃欲相掩襲須分留竒兵頠送甲三百領助之及至城下將戰曇朗偽北法氍乘頠頠失援狼狽退衄曇朗取其馬仗而歸時巴山陳定亦擁兵立寨曇朗偽以女妻定子又謂定曰周迪余孝頃並不願此昏必須以強兵來迎定信之及至曇朗執之收其馬仗並論價責贖陳初以南川豪帥歷宜新豫章二郡太守抗拒王琳有功封永化縣侯位平西將軍開府儀同三司及周文育攻余孝勱於豫章曇朗出軍會之文育失利曇朗乃害文育以應王琳琳東下文帝徵南川兵江州刺史周迪髙州刺史黃法氍欲沿流應赴曇朗乃據城列艦遏迪等及王琳敗走迪攻陷其城曇朗走入村中村人斬之傳首建鄴懸於朱雀觀宗族無少長皆棄市周迪臨川南城人也少居山谷有膂力能挽強弩以弋獵為事侯景之亂迪宗人周續起兵於臨川梁始興王蕭毅以郡讓續迪占募鄉人從之每戰勇冠衆軍續所部渠帥皆郡中豪族稍驕橫續頗禁之渠帥等乃殺續推迪為主梁元帝授迪高州刺史封臨汝縣侯紹泰二年為衡州刺史領臨川內史周文育之討蕭勃也迪按甲保境以觀成敗及高祖受禪王琳東下迪欲自據南川乃總召所部八郡守宰結盟聲言入赴朝廷恐其為變因厚撫之琳至盆城新吳洞主余孝頃舉兵應琳琳以為南川諸郡可傳檄而定乃遣其將李孝欽樊猛等南徵糧餉孝欽等與余孝頃逼迪迪大敗之禽孝欽猛孝頃送建鄴以功加平南將軍開府儀同三司文帝嗣位熊曇朗反迪與周敷黃法氍等圍曇朗屠之王琳敗後文帝徵迪出鎮盆口又徵其子入朝迪趦趄顧望並不至豫章太守周敷本屬迪至是與法氍率其部詣闕文帝録其破熊曇朗功並加官賞迪聞之不平乃陰與留異相結及王師討異迪疑懼乃使其弟方興襲周敷敷與戰破之又别使兵襲華皎於盆城事覺盡為皎禽天嘉三年文帝乃使江州刺史吳明徹都督衆軍與高州刺史黃法氍豫章太守周敷討迪不能克文帝乃遣宣帝總督討之迪衆潰脫身踰嶺之晉安依陳寶應寶應以兵資迪留異又遣第二子忠臣隨之明年秋復越東興嶺文帝遣都督章昭逹征迪迪又散於山谷初侯景之亂百姓皆棄本為盜唯迪所部獨不侵擾耕作𨽻業各有贏儲政令嚴明徵斂必至性質朴不事威儀冬則短身布袍夏則紫紗祙履居常徒跣雖外列兵衛內有女伎挼繩破蔑傍若無人然輕財好施凡所周贍毫釐必均訥於語言而矜懷信實臨川人皆德之至是並藏匿雖加誅戮無肯言者昭逹仍度嶺與陳寶應相抗迪復收合出東興文帝遣都督程靈洗破之迪與十餘人竄山穴中後遣人潛出臨川郡市魚鮭臨川太守駱文牙執之令取迪自效誘迪出獵伏兵斬之傳首建鄴梟於朱雀觀三日留異東陽長山人也世為郡豪姓異善自居處言語醖藉為鄉里雄豪多聚惡少陵侮貧賤守宰皆患之仕梁晉安安固二縣令侯景之亂還鄉里召募士卒太守沈巡援臺讓郡於異異使兄子超監知郡事率兵隨巡出都及城陷異隨梁臨城公大連大連委以軍事異性殘暴無遠略私樹威福衆並患之會景將宋子仙濟浙江異奔還鄉里尋以衆降子仙子仙以為鄉𨗳令執大連邵陵王綸聞之曰姓作去留之留名作同異之異理當同於逆虜侯景署異為東陽太守收其妻子為質景行臺劉神茂建義拒景異外同神茂而密契於景及神茂敗被景誅異獨獲免景平後王僧辨使異慰勞東陽仍保據巖阻州郡憚焉魏尅荆州王僧辨以異為東陽太守文帝平定會稽異雖有糧饋而擁擅一郡威福在已紹泰二年以應接功除縉州刺史領東陽太守封永嘉縣侯又以文帝長女豐安公主配異第三子貞臣永定三年徵異為南徐州刺史遷延不就文帝即位改授縉州刺史領東陽太守頻遣其長史王澌為使入朝澌每言朝廷虛弱異信之常懷兩端與王琳潛通信使及琳敗文帝遣左衛將軍沈路代異為郡實以兵襲之異與路戰敗乃表啓遜謝時朝廷方事湘郢且羈縻之異知終見討乃使兵戍下淮及建德以備江路湘州平文帝乃下詔揚其罪惡使司空侯安都討之異與第二子忠臣奔陳寶應及寶應平并禽異送都斬建康市子姪並伏誅唯第三子貞臣以尚主獲免陳寶應晉安侯官人也世為閩中四姓父羽有材幹為郡雄豪寶應性反覆多變詐梁時晉安數反纍殺郡將羽初並扇惑成其事後復為官軍鄉導破之由是一郡兵權皆自己出侯景之亂晉安太守賔化侯蕭雲以郡讓羽羽年老但主郡事令寶應典兵時東境飢饉會稽尤甚死者十七八而晉安獨豐沃士衆強盛侯景平元帝以羽為晉安太守及高祖輔政羽請歸老求傳郡於寶應髙祖許之紹泰二年封侯官縣侯髙祖受禪授閩州刺史領會稽太守文帝即位加其父光祿大夫仍命宗正録其本系編為宗室寶應娶留異女為妻侯安都之討異寶應遣兵助之又資周迪兵糧出寇臨川及都督章昭逹破迪文帝命討寶應詔宗正絶其屬籍寶應據建安湖際逆拒昭逹昭逹深溝高壘不與戰但命伐木為簰俄而水盛乘流放之突其水柵寶應衆潰執送都斬建康市通志卷一百四十五
