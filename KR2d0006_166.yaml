body:
  text: 通志卷一百四十三宋右迪功郎鄭樵漁仲撰列傳五十六梁侯景王偉侯景字萬景魏之懷朔鎮人也或云鴈門人少不羈見憚鄉里及長驍勇有膂力善騎射以選為北鎮戍兵稍立功效為鎮功曹史魏末北方大亂乃事邉將爾朱榮甚見器重即委以軍事初學兵法於榮部將慕容紹宗未幾紹宗每詢問焉會懷朔鎮將葛榮南逼榮自討之命景先驅至河內生禽葛榮以功擢定州刺史始魏相髙歡微時與景甚相友好及歡誅爾朱氏景復以衆降之仍為歡所用景性殘忍酷虐馭軍嚴整然破掠所得財寶皆班賜將士故咸為之用所向多捷總攬兵權與歡相亞稍至吏部尚書非其好也每獨曰何當離此反故紙邪尋封濮陽縣公歡之敗於沙苑景謂歡曰宇文泰恃於戰勝今必致殆請以數千徑騎至關中取之歡以告其妃婁氏婁氏曰彼若得泰亦將不歸得泰失景於事奚益歡乃止後為河南道大行臺位司徒又言於歡曰恨不得泰請兵三萬橫行天下要須濟江縛取蕭衍老公以作太平寺主歡壯其言使擁兵十萬専制河南杖任若已之半體景右足短弓馬非其所長所在唯以智謀時歡部將髙昂彭樂皆雄勇冠時唯景常輕之言似豕突並勢何所至及將鎮河南請于歡曰今握兵在逺姦人易生詐偽大王若賜以書請異於他者許之每賜景書别加得點雖子弟弗之知及歡疾篤謂其子澄曰侯景姦猾多計反覆難知我死後必不為汝用澄乃矯書召之景知偽懼禍因用王偉計乃以太清元年二月遣其行臺郎中丁和來上表求降武帝召羣臣廷議尚書僕射謝舉及百辟等皆議納景非便帝不從初帝以是歲正月乙卯於善言殿讀佛經因謂左右黃慧弼曰我昨夜夢天下太平爾其識之及和至校景實以正月乙卯日定計焉帝由是納之於是封景河南王大將軍使持節督河南北諸軍事大行臺承制如鄧禹故事給鼓吹一部魏新喪元帥景又舉河南內附髙澄嗣事為渤海王遣其將慕容紹官圍景於長社景急乃求割魯陽長社東荆北兖請救於西魏魏遣五城王元慶等率兵救之紹宗乃退景復請兵於司州刺史羊鴉仁鴉仁遣長史鄧鴻率兵至汝水元慶軍夜遁鴉仁乃據懸瓠時景將蔡道遵北歸言景有悔過志髙澄以為信然乃以書喻景若還許以豫州刺史終其身所部文武更不追攝闔門無恙并還寵妻愛子景報書不從澄知景無歸志乃遣軍相繼討景帝聞鴉仁已據懸瓠遂命羣帥指授方略大舉攻東魏以貞陽侯蕭淵明為都督淵眀軍敗見俘紹宗攻潼州刺史郭鳳棄城走景乃遣其行臺左丞王偉左户郎中王則詣闕獻䇿請求元氏子弟立為魏主輔以北伐詔許之以太子舍人元貞為咸陽王須渡江許即位以乘輿之副資給之髙澄又遣慕容紹宗追景景退保渦陽使謂紹宗曰欲送客邪將定雌雄邪紹宗曰將決戰遂順風以陳景閉壘頃之乃出紹宗曰景多詭好乘人背使備之果如其言景命戰士皆被短甲短刀但低視斫人脛馬足遂敗紹宗軍禆將斛律光尤之紹宗曰吾戰多矣未見此賊之難也爾其當之光被甲將出紹宗戒之曰勿渡渦水既而又為景敗紹宗謂曰定何如也相持連月景食盡誑其衆以為家口並見殺衆皆信之紹宗遙謂曰爾等家並完乃被髮向北斗以誓之景士卒並北人不樂南渡其將暴顯等各率所部降紹宗景軍潰散喪甲士四萬人馬四千匹輜重萬餘兩乃與腹心數騎自硤石濟淮稍收散卒得馬步八百人南過小城人登陴詬之曰跛腳奴何為邪景怒破城殺言者而去晝夜兼行追軍不敢逼使謂紹宗曰景若就禽公復何用紹宗乃縱之既而莫適所歸馬頭戍主劉神茂者為韋黯所不容因是踣馬乃馳謂景曰夀陽去此不逺城池險固韋黯是監州耳王若次近郊必郊迎因而執之可以集事得城之後徐以啓聞朝廷喜王南歸必不責也景執其手曰天教也及至而黯授甲登陴景謂神茂曰事不諧矣對曰黯懦而寡智可説下也乃遣豫州司馬徐思玉夜入説之黯乃開門納景景執黯數將斬之久而見釋乃遣于子悅馳以敗聞自求貶削優詔不許復求資給即授南豫州刺史本官如故帝以景兵新破未忍移易故以鄱陽王範為合州刺史即鎮合肥魏人攻懸瓠懸瓠糧少羊鴉仁去懸瓠歸義陽魏人入懸瓠更求和親帝召公卿謀之張綰朱異咸請許之景聞未之信乃偽作鄴人書求以貞陽侯换景帝將許之舍人傅岐曰侯景以窮歸義棄之不祥且百戰之餘寧肯束手受縶謝舉朱異曰景奔敗之將一使之力耳帝從之復書曰貞陽旦至則景夕反景謂左右曰我固知吳兒老公薄心腸又請婚於王謝帝曰王謝門髙非偶可於朱張以下訪之景怒曰會將吳兒女以配奴王偉曰今坐聽亦死舉大事亦死王其圖之於是遂懷反計屬城居民悉占募為軍士輒停責市估及田租百姓子女悉以配將士又啓求錦萬匹為軍人袍中領軍朱異議以御府錦署止充頒賜不容以供邊用請送青布以給之又以臺所給仗多不能精啓請東冶煆工欲更營造勑並給之景自渦陽敗後多所須求朝廷含𢎞未嘗拒絶先是貞陽侯淵眀督衆軍圍彭城沒于魏至是遣使述魏人請追前好許彼之還武帝覽之流涕乃報淵明啓當别遣行人帝亦願息兵乃與魏和通景聞之懼馳啓固諫帝不從爾後上疏跋扈言辭不遜又聞遣伏挺徐陵使魏不知所為元貞知景異志纍啓還朝景謂曰將㝎江南何不少忍貞益懼奔還建鄴具以事聞景又招司州刺史羊鴉仁同逆鴉仁録送其使鄱陽王範鎮合肥及鴉仁俱纍啓稱景有異志朱異曰侯景數百叛虜何能為役並抑不奏聞愈加賞賜景所以姦謀益果乃上言曰高澄狡猾寧可全信陛下納其詭語求與連和臣亦竊所笑也臣行年四十有六初未聞江左有佞邪之臣一旦入朝乃致嚻讟寧堪粉骨投命讐門請乞江西一境受臣控督如其不許即領甲臨江上向閩越非唯朝廷自恥亦是三公旰食帝使朱異宣語答景使曰譬如貧家畜十客五客尚能得意朕唯有一客致有忿言亦是朕之失也景又知臨賀王正德怨望朝廷密令要結正德許為內應二年八月景遂發兵反於豫州城南集其將帥登壇歃血是日地大震於是以誅中領軍朱異少府卿徐驎太子左率陸驗制局監周石珍為辭以為姦臣亂政請帶甲入朝先攻馬頭木柵執太守劉神茂戍主曹璆等武帝聞之笑曰是何能為吾以折箠笞之乃勑購斬景者不問南北人同賞封二千户公一州刺史其人主帥欲還北不須州者賞以絹布二萬以禮發遣於是詔合州刺史鄱陽王範為南道都督北徐州刺史封山侯正表為北道都督司州刺史柳仲禮為西道都督通直散騎常侍裴之髙為東道都督同討景濟自歷陽又命侍中開府儀同三司邵陵王綸持節董督衆軍景聞之謀於王偉偉曰莫若直掩揚都臨賀反其內大王攻其外天下不足定也兵聞拙速不聞工遲令今便須進路不然邵陵及人九月景發夀春聲云遊獵人不覺也留偽中軍大都督王貴顯守夀春城出軍偽向合肥遂襲譙州助防董紹先降之執刺史豐城侯泰武帝聞之遣太子家令王質率兵三千巡江遏防景進攻歷陽太守莊鐵鐵遣弟昕夜斫景營戰沒鐵母愛其子勸鐵降景拜其母鐡乃勸景曰急則應機緩必致禍景乃使鐵為導是時鎮戍相次啓聞朱異尚曰景必無渡江志蕭正德先遣大船數十艘偽稱載荻實擬濟景景至江口將渡江慮王質為梗俄而質被追為丹陽尹無故自退景聞之未信乃密遣覘之謂使者曰質審退可折江東樹枝為驗覘人如言而返景大喜曰吾事辦矣乃自採石濟馬數百匹兵八千人都下不之覺景即分兵襲姑熟執淮南太守文成侯寧遂至慈湖南津校尉江子一奔還建鄴皇太子見事急入靣啓武帝曰請以事垂付願不勞聖心帝曰此自汝事何更問為太子仍停中書省指授內外擾亂相劫不復通於是詔以揚州刺史宣城王大器為都督內外諸軍事都官尚書羊侃為軍師將軍以副焉遣南浦侯推守東府城西豐公大春守石頭城輕車長史謝禧守白下既而景至朱雀航遣徐思玉入啓乞帶甲入朝除君側之惡請遣了事舍人出相領解實欲觀城中虛實帝遣中書舍人賀季主書郭寶亮隨思玉往勞之于版橋景北靣受敕季曰今者之舉何以為名景曰欲為帝也王偉進曰朱異徐驎諂黷亂政欲除姦臣耳景既出惡言留季不遣寶亮還宫先是大同中童謡曰青絲白馬夀陽來景渦陽之敗求錦朝廷所給青布及是皆用為袍采色尚青景乘白馬青絲為轡欲以應謡蕭正德先屯丹陽郡至是率所部與景合建康令庾信率兵千人屯航北及景至撤航始除一舶見賊軍皆著鐵靣遂棄軍走南塘遊軍復閉航度景皇太子以所乘馬授王質配精兵三千使援庾信質至領軍府與賊相遇未陳而奔景乘勝至闕下西豐公大春棄石頭城走景遣其儀同于子悅據之謝禧亦棄白下城走景於是遣百道攻城縱火燒大司馬東西華諸門城中倉卒未有備乃鑿門樓下水沃火久之方滅賊又斫東掖門將入羊侃鑿門扇刺射殺人賊乃退又登東宫牆射城內至夜簡文募人出燒東宫東宫臺殿遂盡所聚數百厨圖籍一皆灰燼先是簡文夢有人畫作秦始皇云此人復焚書至是而驗景又燒城西馬廄士林館太府寺眀日景又作木驢數百攻城城上擲以石所值皆碎賊又作尖項木驢狀似槥石不能破乃作雉尾炬灌以膏蠟叢下焚之賊既不尅士卒來者甚多乃止攻築長圍以絶內外又啓求誅朱異陸驗徐驎周石珍等城內亦射賞格出外有能斬景首授以景位并錢一億萬布絹各萬匹女樂二部莊鐵乃奔歷陽紿言景已梟首景城守郭駱懼棄城走夀陽鐵得入城遂奔尋陽十一月景立蕭正德為帝即偽位於儀賢堂改年曰正平初童謡有正平之言故立號以應之識者以為正德卒當平殄也景自為相國天柱將軍正德以女妻之景又攻東府城設百尺樓車鉤城堞盡落城遂陷景使其儀同盧暉略率數十人持長刀夾城門悉驅城內文武祼身而出使交兵殺之死者三千餘人南浦侯推是日遇害景使正德子見理及暉略守東府城初景至都便唱云武帝已晏駕雖城內亦以為然簡文慮人情有變乃請上輿駕巡城上將登城陸驗諫曰陛下萬乘之重豈可輕脫因泣下帝深感其言乃幸大司馬門城上聞蹕聲皆鼓譟軍人莫不屑涕百姓乃安景又於城東西各起一土山以臨城城中亦作兩土山以應之簡文以下皆親畚鍤初景至便望尅定建鄴號令甚明不犯百姓既攻城不下人心離沮又恐援軍總集衆心潰散乃縱兵殺掠交尸塞路富室豪家恣意裒剝子女妻妾悉入軍營又募北人先為奴者並令自拔賞以不次朱異家黥奴乃與其儕踰城投賊景以為儀同使至闕下以誘城內乘馬披錦袍詬曰朱異五十年仕宦方得中領軍我始事侯王已為儀同於是奴僮競出盡皆得志景食石頭常平倉既盡便掠居民爾後米一升七八萬錢人相食有食其子者又築土山不限貴賤晝夜不息亂加歐捶疲羸者因殺之以填山號哭之聲動天地百姓不敢藏隱並出從之旬日間衆至數萬景儀同范桃棒密貪重賞求以甲士二千人來降以景首應購遣文德主帥前白馬遊軍主陳昕夜踰城入密啓言狀簡文以啓上上大悅使報桃棒事定許封河南王鐫銀劵以與之簡文恐其詐猶豫未決上怒曰受降常理何忽致疑朱異傅岐同請納之簡文曰吾即堅城自守所望外援外援若至賊豈足平今若開門以納桃棒桃棒之意尚且難知一旦傾危悔無及矣桃棒又曰今止將所領五百餘人若至城門自皆脫甲乞朝廷賜容事濟之時保禽侯景簡文見其言愈疑之朱異以手捶胸曰今年社稷去矣俄而桃棒軍人魯伯和告景並烹之至是邵陵王綸率西豐公大春新塗公大成永安侯確南安鄉侯駿前譙州刺史趙伯超武州刺史蕭弄璋步兵校尉尹思合等馬步二萬發自京口直據鍾山景黨大駭具舟船咸欲逃散分遣萬餘人距戰綸大破之於愛敬寺下斬首千餘級景初聞綸至懼形於色及敗軍還尤言其盛愈恐命具舟石頭將北濟任約曰去鄉萬里走欲何之戰若不捷君臣同死草間乞活約所不為景乃留宋子仙守壁自將鋭卒拒綸陳於覆舟山北與綸相持會暮景退還南安侯駿帥數十騎挑之景回軍與戰駿退時趙伯超陳於元武湖北見駿急不赴乃率軍前走衆軍因亂遂敗績綸奔回京口賊盡獲其輜重生俘千餘人獲西豐公大春及綸司馬邱慧逺直閣將軍胡子約廣陵令霍雋等來送城下逼令云已禽邵陵王雋獨云王小小失利已全軍還京口城中但堅守援軍尋至語未卒賊以刀傷其口雋辭色如舊景義而釋焉正德乃收而害之是日鄱陽世子嗣裴之髙至後渚結營于蔡洲景分軍屯南岸十二月景造諸攻具及飛樓橦車登城車鉤堞車階道車火車並髙數丈車至二十輪陳於闕前百道攻城以火焚城東南隅大樓因火勢以攻城城上縱火悉焚其攻具賊乃退是時景土山成城內土山亦成以太府卿韋黯守西土山左衛將軍桞津守東土山山起芙蓉層樓髙四丈飾以錦罽捍以烏笙山峯相近募敢死士厚衣袍鎧名曰僧騰客配二山交矟以戰鼓呌沸騰昏旦不息土山攻戰既苦人不堪命桞津命作地道毁外山擲雉尾炬燒其櫓堞外山崩壓賊且盡賊又作蝦蟇車運土石填塹戰士升之樓車四靣並至城內飛石碎其車賊死積於城下賊又掘城東南角城內作迂城形如却月以捍之賊乃退材官將軍宋嶷降賊因為立計引元武湖水灌臺城城外水起數尺闕前御街並為洪波又燒南津居民營寺莫不咸盡司州刺史李仲禮衡州刺史韋粲南陵太守陳文徹宣猛將軍李孝欽等皆來赴援鄱陽世子嗣裴之高又濟江柳仲禮營朱雀航南裴之髙營南苑韋粲營青塘陳文徹李欽屯丹陽郡鄱陽世子嗣營小航南並緣淮造柵及旦景方覺乃登禪靈寺門樓以望之見韋粲營壘未合渡兵擊之斬粲首徇城下仲禮聞粲敗不遑貫甲與數十人赴之遇賊斬首數百仍投水死者千餘人仲禮深入馬陷泥亦被重創自是賊不敢濟岸邵陵王綸又與臨城公大連等自東道集于南岸荆州刺史湘東王繹遣世子方等兼司馬吳曄天門太守樊文皎下赴京師營于洲子岸前高州刺史李遷仕前司州刺史羊鴉仁又率兵繼至既而鄱陽世子嗣永安侯確羊鴉仁李遷仕樊文皎率衆渡淮攻破賊東府城前柵遂營于青溪水東景遣其儀同宋子仙緣水西立柵以相拒景食稍盡人相食者十五六於是援軍四方雲合至于北岸衆號百萬百姓扶老擕幼以候王師才過淮便競剝掠徴責金銀列營而立互相疑二邵陵王綸柳仲禮甚於讐敵臨城公大連永安侯確逾於水火無有鬬心賊黨有欲自拔者聞之或止賊之始至城中才得固守平蕩之事期望援軍既而中外斷絶有羊車兒獻計作紙鴉繫以長繩藏敕於中簡文出太極殿前因西北風而放冀得書逹羣賊駭之謂是厭勝之術又射下之其危急如此是時城中圍逼既久膎味頻絶簡文上厨僅有一肉之膳軍士煮弩燻鼠捕雀食之殿堂舊多鴿羣聚至是殱焉初宫門之閉公卿以食為念男女貴賤並出負米得四十萬斛收諸府藏錢帛五十億萬並聚德陽堂魚鹽樵採所取蓋寡至是乃壞尚書省為薪撤薦銼以飼馬盡又食飯焉御甘露厨有乾苔味酸鹹分給戰士軍人屠馬於殿省間鬻之雜以人肉食者必病賊又置毒於水竇於是稍行腫滿之疾城中疫死者大半初景之未渡江魏人遣檄極言景反覆猜忍又言帝飾智驚愚將為景欺至是禍敗之狀皆如所陳南人或以為讖時景軍亦飢不能復戰東城有積粟其路為援軍所斷且聞湘東王下荆州兵彭城劉邈乃説景曰大軍頓兵已久攻城不拔今衆軍雲集未易可破如聞軍糧不支一月運漕路絶野無所掠嬰兒掌上信在於今未若乞和全師而反景乃與王偉計遣任約在城北拜表偽降以河南自效帝曰吾有死而已寧復是議且賊凶逆多詐此言云何可信既而城中日蹙簡文乃請武帝曰侯景圍逼既無勤王之師今欲許和更思後計帝大怒曰和不如死簡文曰城下之盟乃是深恥白刃交前流矢不顧上遲回久之曰爾自圖之無令取笑千載乃聽焉景請割江右四州地并求宣城王大器出送然後解圍濟江仍許遣其儀同于子悅右丞王偉入城為質中領軍傅岐議以宣城王嫡嗣子重有輕言者請劍擊之乃請石城公大欵出送詔許焉遂於西華門外設壇遣尚書僕射王克兼侍中上甲鄉侯韶兼散騎常侍蕭瑳與于子悅王偉等登壇共盟右衛將軍柳津出西華門下景出其柵門與津遙相對刑牲歃血南兖州刺史南康嗣王會理前青冀二州刺史湘潭侯退西昌侯世子彧率衆三萬至于馬卬洲景慮北軍自白下而上斷其江路請悉勒衆南岸敕乃遣北軍並進江潭苑景又啓稱永安侯趙威方頻隔柵詬臣云天子自與爾盟我終當逐汝乞召入城即進發敕並召之景遂運東城米于石頭食乃足又啓云西岸信至髙澄已得夀春鐘離便無處安足權備廣陵譙州須征得夀春鐘離即以奉還朝廷時荆州刺史湘東王繹師于武成河東王譽次巴陵前信州刺史桂陽王慥頓江津並未之進既而有敕班師湘東王欲旋中記室參軍蕭賁曰景以人臣舉兵向闕今若放兵未及渡江童子能斬之必不為也大王以十萬之師未見賊而退若何湘東王不悅賁骨鯁士也每恨湘東王不入援嘗與王雙六食子未下賁曰殿下都無下意王深為憾遂因事害之景既知援軍號令不一終無勤王之效又聞城中死疾轉多當有應之者既却湘東王等又得城東之米王偉且説景曰王以人臣舉兵背叛圍守宫闕已盈十旬逼辱妃主凌穢宗廟今日持此何處容身願且觀變景然之乃抗表於武帝陳帝十失言辭甚悖三年三月丙辰朔城內於大極殿前設壇使兼太宰尚書僕射王克等告天地神祇以景違盟舉烽鼓譟初城圍之日男女十餘萬貫甲者三萬至是疾疫且盡守陴者止二三千人並悉羸懦橫尸滿路無人埋瘞臰氣熏數里爛汁滿溝洫於是羊鴉仁柳敬理鄱陽世子嗣進軍於東府城北柵壘未立為景將宋子仙所敗送首級於闕下景又遣于子悅乞和帝遣御史中丞沈浚至景營景無去意浚因責之景大怒決石闕前水百道攻城晝夜不息丁卯城遂陷邵陵王世子子堅帳內白雲朗董勛華於城西北樓納賊五鼓賊四靣飛梯衆悉上永安侯確與其兄堅力戰不能却乃還見文德殿言狀須臾景乃先使王偉儀同陳慶入殿陳謝曰臣既與髙氏有隙所以歸投每啓不蒙為奏所以入朝而姦佞懼誅深見推拒連兵多日罪合萬誅武帝曰景今何在卿可召來時武帝坐文德殿景乃入朝以甲士五百自衛帶劍升殿拜訖帝神色不變使引向三公榻坐謂曰卿在戎日久無乃為勞景默然又問曰卿何州人而來至此乎景又不能對其從者任約代對又問初渡江有幾千人景曰千人圍臺城有幾人曰十萬令有幾人曰率土之內莫非已有帝俯首不言景出謂其廂公王僧貴曰吾嘗據鞍對敵矢刃交下而意氣安緩了無怖心今日見蕭公使人自懾豈非天威難犯吾不可以再見之矣出見簡文于永福省簡文坐與相見亦無懼色初簡文寒夕詩云雪花無有蒂水鏡不安臺又詠月云飛輪了無轍氷鏡不安臺後人以為詩讖謂無蒂者是無帝不安臺者臺城不安輪無轍者以邵陵名綸空有赴援名也既而景屯兵西州使偽儀同陳慶以甲防太極殿悉鹵掠乘輿服玩後宫嬪妾收王侯朝士送永福省撤二宫侍衛使王偉守武德殿于子悅屯太極東堂矯詔大赦天下自為大都督都督中外諸軍録尚書事其侍中使持節大丞相王如故先是城中積尸不暇埋瘞又有已死而未斂或將死而未絶景悉命聚而焚之臰氣聞十餘里尚書外兵郎鮑正疾篤曵出焚之宛轉火中久而方絶景又矯詔令征鎮守將各復本任於是諸軍並散降蕭正德為侍中大司馬百官皆復其職帝雖外迹不屈而意猶怨憤景欲以宋子仙為司空帝曰調和隂陽豈在此物景又請以文德主帥鄧仲為城門校尉帝曰不置此官簡文重入奏帝怒曰誰令汝來景聞亦不敢逼後每徴求多不稱旨至於御膳亦被裁抑遂懷憂憤五月感疾餒崩于文德殿景祕不發喪權殯于昭陽殿自外文武咸莫之知二十餘日然後升梓宫於太極前殿迎簡文即位及葬修陵使衛士以大釘於要地釘之欲令後世絶滅矯詔赦北人為奴婢者冀收其力用焉時東揚州刺史臨城公大連據州吳興太守張嵊據郡自南陵以上並各據守景制命所行唯吳郡以西南陵以北而已六月景乃殺蕭正德於永福省封元羅為西秦王元景襲為陳留王諸元子弟封王者十餘人以柳仲禮為使持節大都督𨽻大丞相參戎事十一月百濟使至見城邑邱墟於端門外號泣行路見者莫不灑泣景聞大怒收小莊嚴寺禁不聽出入大寶元年正月景矯詔自加班劍四十人給前後部羽葆鼓吹置左右長史從事中郎四人三月甲申景請簡文禊宴於樂遊苑帳飲二日其逆黨悉以妻子自隨皇太子以下並令馬射箭中者賞以金錢翌日向晨簡文還宫景拜伏苦請簡文不從及發景即與溧陽主共據御牀南靣並坐羣臣文武列坐侍宴四月辛卯景又召簡文幸西州簡文御素輦侍衛四百人景衆數千浴鐵翼衛簡文至西州景等逆拜上冠下屋白紗帽服白布裙𥜗景服紫袖褶上加金帶與其偽儀同陳慶索超世等西向坐溧陽主與其母范淑妃東向坐上聞絲竹悽然下泣景起謝曰陛下何不樂上為笑曰丞相言索超世聞此聲以為何聲景曰臣且不知豈獨超世上乃命景起舞景即下席應絃而歌上顧命淑妃淑妃固辭乃止景又上禮遂逼上起舞酒闌坐散上抱景于牀曰我念丞相景曰陛下如不念臣臣何以至此上索筌蹄曰我為公講命景離席使其唱經景問超世何經最小超世曰唯觀世音小景即唱爾時無盡意菩薩上大笑夜乃罷時江南大飢江揚彌甚旱蝗相繼年榖不登百姓流亡死者塗地父子擕手共入江湖或兄弟相要俱緣山嶽芰實荇花所在皆罄草根木葉為之雕殘雖假命須臾終死山澤其絶粒久者鳥靣鵠立俯伏牀帷不出户牖者莫不依羅綺懷金玉交相枕籍待命聽終於是千里絶煙人迹罕見白骨成聚如邱隴焉而景虐於用刑酷忍無道於石頭立大舂碓有犯法者搗殺之東陽人李瞻起兵為賊所執送詣建鄴景先出之市中斷其手足刻析心腹破出肝腸瞻正色整容言笑自若見其膽者乃如升焉又禁人偶語不許大酺有犯則刑及外族其官人任兼閫外者位必行臺入附凶徙者並稱開府其親寄隆重則號曰左右廂公勇力兼人名為庫真部督七月景遣任約寇江州刺史尋陽王大心以州降之景遂矯詔自進位相國封太山等二十郡為漢王入朝不趨贊拜不名劍履上殿依漢蕭何故事十月景又矯詔自加宇宙大將軍都督六合諸軍事以詔文呈簡文簡文大驚曰將軍乃有宇宙之號乎初武帝既崩景立簡文升重雲殿禮佛為盟曰臣乞自今兩無疑二臣固不負陛下陛下亦不得負臣及南康王會理之事景稍猜懼謂簡文欲謀之王偉因構扇遂懷逆謀矣二年正月景以王克為太宰宋子仙為太保元羅為太傅郭元建為太尉張化仁為司徒任約為司空于慶為太師紇奚斤為太子太傅時靈護為太子太保王偉為尚書左僕射索超世為右僕射於大􅟘跨水築城名曰捍國初元帝聞江州失守乃遣都督秦州刺史徐文盛率軍下武昌拒約相持既久至是元帝又遣巴州刺史王珣率兵助文盛任約以西臺益兵告急於景三月景自率衆三萬西上援約次西陽文盛率水軍邀戰大破之會景遣宋子仙襲陷郢州盡獲武昌軍人家口故文盛之衆大潰奔歸江陵景乘勝西上號三十萬聨旗千里江左以來水軍之盛未有也帝聞之謂御史中丞宗凛曰賊若分守巴陵鼓行西上荆郢危殆此上䇿也身頓長沙徇地零桂運糧以至洞庭湘郢非吾有此中䇿也擁衆江口連攻巴陵鋭意盡於攻城士卒飢於半菽此下䇿也吾安枕而卧無所多憂於是元帝遣領軍將軍王僧辨率衆東下次于巴陵會景至僧辨沈船卧鼓若將已遁景遂圍城元帝遣平北將軍胡僧祐與居士陸法和救巴陵景遣任約逆擊之僧祐與法和退據赤亭景至與戰大破之禽其將任約景乃夜遁還都左右有泣者景命斬之王僧辨乃率衆軍東下次漢口攻魯山及郢城皆陷之自是衆軍所至皆捷先是景每出師戒諸將曰若破城邑淨殺却使天下知吾威名故諸將以殺人為戲而百姓雖死不從之是年四月景乃廢簡文幽于永福省詔草成逼簡文寫之至先皇念神器之重思社稷之固歔欷嗚咽不能自止是日景迎豫章王棟即皇帝位升太極前殿大赦改元為天正元年有回風自永福省吹其文物皆倒折見者莫不驚駭初景既平京邑便有篡奪之志以四方須定故未自立既而巴陵失守江郢喪師猛將外殱雄心內沮便欲速僭大號遂其姦心又王偉云自古移鼎必須廢立故景從之其太尉郭元建聞之自秦郡馳還諫曰主上仁明何得廢之四方之師所不動者正為二宫萬福若遂行弒逆結怨海內事機一去雖悔無及景曰王偉勸吾元建固陳不可景意遂回欲復帝位以棟為太孫王偉固執不可乃禪位于棟景以哀太子妃賜郭元建元建曰豈有皇太子妃而降為人妾竟不與相見十月壬寅夜遣彭雋王修纂害簡文是月景東道行臺劉神茂儀同尹思合劉歸義王曄及雲麾將軍元頵等據東陽歸順十一月景以趙伯超鎮錢塘遣田遷謝答仁東征神茂等景乃矯蕭棟詔自加九錫之禮漢國置丞相以下百官陳備物於庭忽有野鳥翔于景册書上赤足丹觜形如山鵲都下左右所無賊徒悉駭竟射之不能中南兖獲白麞建康獲白鼠以獻蕭棟棟歸之于景景又矯蕭棟詔追崇其祖為大將軍父為大丞相自加冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲罕樂儛八佾鐘簴宮懸之樂一如舊儀尋又矯蕭棟詔禪位使偽大宰王克奉璽紱于已先夕景宿大莊嚴寺即南郊柴燎于天升壇受禪大風折木旗蓋盡偃文物並失舊儀既倡警蹕識者以為名景而言警蹕非久祥也景聞惡之改為備蹕人又曰備於此便畢矣有司乃奏改云永蹕乃以廣柳車載鼓吹橐駝負犧牲輦上置垂腳坐焉景所帶劍水精摽無故墮落手自拾取甚惡之將登壇有兔自前而走俄失所在又白虹貫日三重日青無色還將登太極殿醜徒數萬同共吹脣唱吼而上及升御牀牀腳自陷大赦改元為大始元年方饗羣臣中會而起觸扆墜地封蕭棟為淮陰王幽之改梁律為漢律改左户尚書為殿中尚書五兵尚書為七兵尚書直殿主帥為直寢景三公之官動置十數儀同尤多或匹馬孤行自執羈紲以宋子仙郭元建張化仁任約為佐命元功並加三公之位王偉索超世為謀主于子恱彭雋主擊斷陳慶吕季略盧暉略于和史安和為爪牙斯皆尤毒於百姓者其餘如王伯醜任延和等復有十數人梁人而為景用者則故將軍趙伯超前制局監姬石珍內監嚴亶邵陵王記室伏知命此四人盡心竭力者若太宰王克太傅元羅侍中殷不害太常姬𢎞正等雖官尊止從人望非腹心任也景祖名乙羽周及篡以周為廟諱故改周𢎞正周石珍姓姬也其左僕射王偉請立七廟景曰何謂七廟偉曰天子祭七世祖考故置七廟並請七世諱敕太常具祭祀之禮景曰前世吾不復憶惟阿爺名標且在朔州伊那得來噉是衆聞咸竊笑之景黨有知景祖名乙羽周者自外悉是王偉制其名位以漢司徒侯霸為始祖晉徴士侯瑾為七世祖於是追尊其祖周為大丞相父標為元皇帝于時景修飾臺城及朱雀宣陽等門童謡曰的脰馬拂朱雀還與吳又曰脫青袍著芒屩荆州天子挺應著時都下王侯庶姓五等廟樹咸見殘毁唯文宣太后廟四周柏樹獨鬱茂及景篡修南郊路偽都官尚書吕季略説景令伐此樹以立三橋始斫南靣十餘株再宿悉枿生便長數尺時既冬月翠茂若春賊乃大驚惡之使悉斫殺識者以為僵柳起於上林乃表漢宣之興今廟樹重青必彰陜西之瑞又景牀東邊香爐無故墜地景呼東西南北皆謂為廂景曰此東廂香爐那忽下地議者以為湘東軍下之徴十二月謝答仁李慶等軍至建德攻元頵李占柵大破之執頵占送京口截其手足殉之經日乃死二年正月朔景臨朝會王僧辨軍至蕪湖景遣兵助侯子鑒等守姑熟是月朔馬駒生角謝答仁攻東陽劉神茂降以送建鄴景為大銼碓先進其腳寸寸斬之至頭方止使衆觀之以示威三月景自往姑熟巡視壘柵又誡子鑒曰西人善水戰不可爭鋒往年任約敗績良為此也若得馬步一交必當可破汝但堅壁以觀其變子鑒乃率步騎萬餘人渡洲并水軍俱進僧辨逆擊大破之子鑒僅以身免景聞子鑒敗大懼涕下覆靣引衾而卧良久方起歎曰咄叱咄叱誤殺乃公初景之為丞相居于西州將率謀臣朝必集行列門外謂之牙門以次引進與以酒食言笑談論善惡必同及篡恆坐內不出舊將稀見靣咸有怨心至是登烽火樓望西師看一人以為千人大懼僧辨及諸將遂於石頭城西步上連營立柵至于落星墩景大恐自率侯子鑒等於石頭東北立柵拒守遣掘王僧辨父墓剖棺焚尸僧辨等進營於石頭城北景列陳挑戰僧辨率衆奪擊大破之景既退敗不敢入宫收其散兵屯于闕下遂將逃竄王偉攬轡諫曰自古豈有叛天子今宫中衛士尚足一戰寧可便走棄此欲何之景曰我在北攻賀拔勝敗葛榮揚名河朔與髙王一種人今來直渡大江取臺城如反掌打邵陵王於北山破柳仲禮於南岸皆乃所親見今日之事恐是天亡乃好守城我當復一決爾仰觀石闕逡巡歎息久之乃以皮囊盛二子挂馬鞍與其儀同田遷范希榮等百餘騎東奔王偉遂委臺城竄逸侯子鑒等奔廣陵王克開臺城門引裴之橫入宫縱兵攻掠是夜遺燼燒太極殿及東西堂延閣祕署皆盡羽儀輦輅莫有孑遺王僧辨命武州刺史杜崱救火僅而得滅故武德五明重雲殿及門下中書尚書省得免僧辨迎簡文梓宫升於朝堂三軍縞素踊於哀次命侯瑱裴之橫追賊於東焚偽神主於宣陽門作神主於太廟收圖書八萬卷歸江陵杜崱守臺城都下户口百遺一二大航南岸極目無煙老小相扶競出才渡淮王琳杜龕軍人掠之甚於寇賊號呌徹于石頭僧辨謂為有變登城門故亦不禁也僉以王師之酷甚於侯景君子以是知僧辨之不終也初景之圍臺城援軍三十萬兵士望青袍則氣消膽奪及赤亭之役胡僧祐以羸卒一千破任約精甲二萬轉戰而東前無橫陳既而侯瑱率軍追景景至嘉興趙伯超據錢塘距之景退還吳郡逹松江而侯瑱軍奄至景衆未陳皆舉幡乞降景不能制乃與腹心數十人單舸而走推墮二子於水自滬瀆入海至胡豆洲前太子舍人羊鯤殺之送尸于僧辨景長不滿七尺長上短下眉目踈秀廣顙高權色赤少鬚低視屢顧聲散識者曰此豺狼之聲故能食人亦當為人所食既南奔魏相髙澄悉命先剝景妻子靣皮以大鐵鑊盛油煎殺之女以入宫為婢男三歲者並下蠶室後齊文宣夢彌猴坐御牀乃並煮景子於鑊其子之在北者殱焉景性猜忌好殺戮恆以手刃為戲方食斬人於前言笑自若口不輕飱或先斬手足割舌劓鼻經日乃殺之自篡立後時著白紗帽而尚披青袍或以牙梳插髻牀上常設胡牀及筌蹄著靴垂腳坐或跂户限或走馬邀遊於宫內及華林園彈射鴉鳥自為天子王偉不許輕出於是欎怏更成失志曰吾無事為帝與受擯不殊及聞義師轉近猜忌彌深牀前蘭錡自繞然後見客每登武帝所常幸殿若有芒刺在身恆聞咄叱者又處宴居殿一夜驚起若有物扣其心自是凡武帝所常居處並不敢處多在昭陽殿廊下所居殿屋常有鵂鶹鳥鳴呼景惡之每使人窮山野捕鳥景所乘白馬每戰將勝輒躑躅嘶鳴意氣駿逸其有奔衄必低頭不前及石頭之役精神沮喪卧不肯動景使左右拜請或加箠䇿終不肯起始景左足上有肉瘤狀似龜戰應尅捷瘤則隱起分眀如不勝瘤則低至是瘤隱陷肉中天監中有釋寶志曰掘尾狗子自發狂當死未死嚙人傷須臾之間自滅亡起自汝隂死三湘又曰山家小兒果攘臂太極殿前作虎視狗子景小字山家小兒皆猴狀景遂覆陷都邑毒害皇家起自懸瓠即昔之汝南巴陵有地名三湘景奔敗處其言皆驗景常謂人曰侯字人邊作主下作人此明是人主也臺城既陷武帝嘗語人曰侯景必得為帝但不久耳破侯景字成小人百日天子為帝當得百日案景以辛未年十一月十九日篡位壬申年三月十九日敗得一百二十日而景以三月一日便往姑熟計在宫殿足滿十旬其言竟驗又大同中太醫令朱耽嘗直禁省無何夢犬羊各一在御座覺而告人曰犬羊非佳物也今在御座將有變乎既而天子蒙塵景登正殿焉及景將敗有僧通道人者意性若狂飲酒噉肉不異凡等遊行世間已數十載姓名鄉里人莫能知初言隱伏久乃方驗人並呼為闍梨景甚信敬之景常於後堂與其徒共射時僧通在坐奪景弓射景陽山大呼云得奴已景後宴集其黨又召僧通僧通取肉揾鹽以進景問曰好不景答所恨太鹹僧通曰不鹹則爛及景死僧辨截其二手送齊文宣傳首江陵果以鹽五斗置腹中送于建康暴之于市百姓爭取屠膾羹食皆盡并溧陽主亦預食例又焚景骨揚灰曾罹其禍者仍以灰和酒飲之首至江陵元帝命梟於市三日然後煮而漆之以付武庫先是江陵謡言苦竹町市南有好井荆州軍殺侯景及景首至元帝付咨議參軍李季長宅宅東即苦竹町也既加鼎鑊即用市南井水焉景儀同謝答仁行臺趙伯超降于侯瑱生禽賊行臺田遷儀同房世貴蔡夀樂領軍王伯醜凶黨悉平斬房世貴于建康市餘黨送江陵初郭元建以有禮於皇太子妃將降侯子鑒曰此小惠也不足自全乃奔齊臣謹按李延夀史於侯景傳中同異頗多據梁武再問景景皆不能對令從者代對景退而自歎懾於天威是也今延夀之史於又不能對之後又問初渡江有幾人景曰千人圍臺城有幾人曰十萬今有幾人曰率土之內莫非己有武帝俯首不言如此則景為辨士矣何因有天威難犯吾不可以再見之語乎又以簡文寒夕詩與詠月詩為詩讖復無成言徒費箋注讖語殆不如是武帝葬修陵侯景正當朝得免藁瘞足矣何因相地以取佳城仍更使衛士以大釘於要地釘之欲令後世絶滅乎此皆取於稗官小説不典之言延夀之史似此為多故知南北朝之行事當得識者裁正之爾王偉其先略陽人父略仕魏為許昌令因居潁川偉學通周易雅高辭采仕魏為行臺郎景叛後高澄以書招之偉為景報澄書其文辭甚美澄覽書曰誰所作也左右稱偉之文澄曰才如此何由不早使知邪偉既協景謀謨其文檄並偉所製及行篡逆皆偉創謀也景敗與侯子鑒俱走相失潛匿草中直瀆戍主黃公喜禽送之見王僧辨長揖不拜執者促之偉曰各為人臣何事相敬僧辨曰卿為賊相不能死節而求活草間顛而不扶焉用彼相偉曰廢興時也工拙在人向使侯氏早從偉言明公豈有今日之勢僧辨大笑意甚異之命出以徇偉曰昨及朝行八十里願借一驢代步僧辨曰汝頭方行萬里何八十里哉偉曰今日之事乃吾心也前尚書左丞虞騭嘗見辱於偉遇之而唾其靣曰死虜庸復能為惡乎偉曰君不讀書不足與語騭慙而退及吕季略周石珍嚴亶俱送江陵偉尚望見全於獄為詩贈元帝下要人曰趙一能為賦鄒陽解獻書可惜西江水不救轍中魚又上五百字詩於帝帝愛其才將捨之朝士多忌乃請曰前日偉作檄文有異辭句元帝求而視之檄云項羽重瞳尚有烏江之敗湘東一目寧為四海所歸帝大怒使以釘釘其舌於柱剜其腸顔色自若仇家臠其肉俯而視之至骨方刑之石珍及亶並夷三族趙伯超趙革子也初至建康王僧辨謂曰卿荷國重恩遂復同逆對曰當今禍福恩在明公僧辨又顧謝答仁曰聞卿是侯景梟將恨不與卿交兵答仁曰公英武蓋世答仁安能仰敵僧辨大笑答仁以不失禮於簡文見宥伯超及伏知命俱餓死江陵獄中彭雋亦生獲破腹抽出其肝臟雋猶不死然後斬之通志卷一百四十三
