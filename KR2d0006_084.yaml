body:
  text: 通志卷七十八上宋右迪功郎鄭樵漁仲撰宗室傳第一上前漢荆王賈燕王澤吳王濞楚元王交戊強辟德向歆高六王齊悼惠王肥城陽王章魏濟北王興居勃趙隱王如意趙幽王友趙共王恢燕靈王建淮南厲王長淮南王安北衡山王賜濟王勃荆王劉賈高帝從父兄也不知其所起漢元年還定三秦賈為將軍定塞地從東擊項籍漢王敗成臯北度河得張耳韓信軍軍修武深溝高壘使賈將二萬人騎數百擊楚度白馬津入楚地燒其積聚以破其業無以給項王軍食已而楚兵擊之賈輒避不肯與戰而與彭越相保漢王追項籍至固陵使賈南度淮圍夀春還至使人間招楚大司馬周殷周殷反楚佐賈舉九江迎英布兵皆會陔下誅項籍漢王因使賈將九江兵與太尉盧綰西南擊臨江王共尉尉死以臨江為南郡漢六年春會諸侯於陳廢楚王信囚之分其地為二國當是時也高祖子弱昆弟少又不賢欲王同姓以填天下乃下詔曰將軍劉賈有功及擇子弟可以為王者羣臣皆曰立劉賈為荆王王淮東五十二城高祖弟交為楚王王淮西三十六城因立子肥為齊王始王昆弟劉氏也立六年而淮南王黥布反東擊荆賈與戰弗勝走富陵為布軍所殺高祖自擊破布十二年立沛侯劉濞為吳王王故荆地燕王劉澤高祖從祖昆弟也高祖三年澤為郎中十一年以將軍擊陳豨將王黃封為營陵侯高后時齊人田生楚漢春秋云字子春遊乏資以畫姦澤澤大説之用金二百斤為田生壽田生已得金即歸齊二年澤使人謂田生曰弗與矣田生如長安不見澤而假大宅令其子求事吕后所幸大謁者張卿居數月田生子請張卿臨親修具張卿往見田生盛帷張共具譬如列侯張卿驚酒酣乃屏人説張卿曰臣觀諸侯王邸第百餘皆高帝一切功臣今吕氏雅故夲推轂高帝就天下功至大又有親戚太后之重太后春秋長諸吕弱太后欲立吕産為吕王王代吕后又重發之恐大臣不聼今卿最幸大臣所敬何不風大臣以聞太后太后必喜諸吕以王萬户侯亦卿之有太后心欲之而卿為內臣不急發恐禍及身矣張卿大然之乃風大臣語太后太后朝因問大臣大臣請立吕産為吕王太后賜張卿千金張卿以其半與田生田生弗受因説之曰吕産王也諸大臣未大服今營陵侯澤諸劉長為大將軍獨此尚觖望今卿言太后裂十餘縣王之彼得王喜於諸吕王益固矣張卿入言之又太后女弟吕須女亦為營陵侯妻故遂立營陵侯澤為琅邪王琅邪王與田生之國田生勸王急行毋留出關太后果使人追止之已出即還澤王琅邪二年而太后崩澤乃曰帝少諸吕用事諸劉孤弱引兵與齊王合謀西欲誅諸吕至梁聞漢遣灌將軍屯滎陽澤還兵備西界遂跳驅至長安代王亦從代至諸將相與琅邪王共立代王為天子是為孝文帝文帝元年乃徙澤為燕王而復以琅邪歸齊澤王燕二年薨諡曰敬王子康王嘉嗣九年薨子定國嗣定國與父康王姬姦生子男一人奪弟妻為姬與子女三人姦定國有所欲誅殺臣肥如令郢人郢人等告定國定國使謁者以他法劾捕格殺郢人滅口至元朔中郢人昆仲復上書具言定國事下公卿皆議曰定國禽獸行亂人倫逆天道當誅上許之定國自殺立四十二年國除哀帝時繼絶世乃封敬王澤元孫之孫無終公士歸生為營陵侯更始中為兵所殺吳王濞高帝兄仲之子也高帝立仲為代王胸奴攻代仲不能堅守棄國間行走雒陽自歸天子不忍致法廢為合陽侯子濞封為沛侯黥布反高祖自將往誅之濞年二十以騎將從破布軍荆王劉賈為布所殺無後上患吳會稽輕悍無壯王填之諸子少乃立濞於沛為吳王王三郡五十三城已拜受印高祖召濞相之曰若狀有反相獨悔業已拜因拊其背曰漢後五十年東南有亂豈汝邪然天下同姓一家慎無反濞頓首曰不敢會孝惠高后時天下初定郡國各務自拊循其民吳有豫章郡銅山即招致天下亡命者盜鑄錢東煮海水為鹽以故無賦國用饒足孝文時吳太子入見得侍皇太子飲博吳太子師傅皆楚人輕悍又素驕博爭道不恭皇太子引博局提吳太子殺之於是遣其喪歸葬吳吳王愠曰天下一宗死長安即葬長安何必來葬復遣喪之長安葬吳王由是怨望稍失藩臣禮稱疾不朝京師知其以子故驗問實不病諸吳使來輒繫責治之吳王恐所謀滋甚及後使人為秋請上復責問吳使者使者曰察見淵中魚不祥今吳王始詐疾及覺見責急愈益閉恐上誅之計乃無聊唯上與更始於是天子皆赦吳使者歸之而賜吳王几杖老不朝吳得釋其謀亦益解然其居國以銅鹽故百姓無賦卒踐更輒豫平賈歲時存問茂材賞賜閭里他郡國吏欲來捕亡人者頌頌猶公也頌讀曰容共禁不與如此者三十餘年以故能使其衆朝錯為太子家令得幸皇太子數從容言吳過可削數上書説之文帝寬不忍罰以此吳王日益橫及景帝即位錯為御史大夫説上曰昔高帝初定天下昆弟少諸子弱大封同姓故孽子悼惠王王齊七十二城庶弟元王王楚四十城兄子王吳五十餘城封三庶孽分天下半今吳王前有太子之隙詐稱病不朝於古法當誅文帝不忍因賜几杖德至厚也不改過自新乃益驕恣公即山鑄錢煮海為鹽誘天下亡人謀作亂逆今削之亦反不削亦反削之其反亟禍小不削之其反遲禍大三年冬楚王來朝錯因言楚王戊往年為薄太后服私姦服舍請誅之詔赦削東海郡及前二年趙王有罪削其恆山郡膠西王卬以賣爵事有姦削其六縣漢廷臣方議削吳吳王恐削地無已因欲發謀舉事念諸侯無足與計者聞膠西王勇好兵諸侯皆畏憚之於是乃使中大夫應高口説膠西王曰吳王不肖有夙夜之憂不敢自外使使臣諭其愚心王曰何以教之高曰今者主上任用邪臣聼信讒賊變更律令侵削諸侯徴求滋多誅罰良重日以益甚語有之曰狧粳及米吳與膠西知名諸侯也一時見察不得安肆矣吳王身有內疾不能朝請二十餘年常患見疑無以自白脅肩絫足猶懼不見釋竊聞大王以爵事有過所聞諸侯削地罪不至此此恐不止削地而已王曰有之子將奈何高曰同惡相助同好相留同情相求同欲相趨同利相死今吳王自以與大王同憂願因時循理棄軀以除患於天下意亦可乎膠西王瞿然駭曰寡人何敢如是主上雖急固有死耳安得不事高曰御史大夫朝錯營惑天子侵奪諸侯蔽忠塞賢朝廷疾怨諸侯皆有背叛之意人事極矣慧星出蝗蟲起此萬世一時而愁勞聖人所以起也吳王內以朝錯為誅外從大王後車方洋天下所向者降所指者下莫敢不服大王誠幸而許之一言則吳王率楚王略函谷關守滎陽敖倉之粟距漢兵治次舍須大王大王幸而臨之則天下可并兩主分割不亦可乎王曰善歸報吳王猶恐其不果乃身自為使者至膠西面約之膠西羣臣或聞王謀諫曰諸侯地不能為漢什二為叛逆以憂太后非計也今承一帝尚云不易假令事成兩主分爭患乃益生王不聼遂發使約齊災川膠東濟南皆許諾諸侯既新削罰震恐多怨錯及削吳會稽豫章郡書至則吳王先起兵誅漢吏二千石以下膠西膠東災川濟南楚趙亦皆反發兵西齊王後悔背約城守濟北王城壞未完其郎中令劫守王不得發兵膠西王膠東王為渠率與災川濟南共攻圍臨災趙王遂亦隂使胸奴與連兵七國之發也吳王悉其士卒下令國中曰寡人年六十二身自將少子年十四亦為士卒先諸年上與寡人同下與少子等皆發兵二十餘萬人南使閩東越閩東越亦發兵從孝景前三年正月甲子初起兵於廣陵西涉淮因并楚兵發使遺諸侯書曰吳王劉濞敬問膠西王膠東王災川王濟南王趙王楚王淮南王衡山王廬江王故長沙王子幸教以漢有賊臣錯無功天下侵奪諸侯之地使吏劾繫訊治以侵辱之為故不以諸侯人君禮遇劉氏骨肉絶先帝功臣進任姦人誑亂天下欲危社稷陛下多病志逸不能省察欲舉兵誅之謹聞教敝國雖狹地方三千里人民雖少精兵可具五十萬寡人素事南越三十餘年其王諸君皆不辭分其兵以隨寡人又可得三十萬寡人雖不肖願以身從諸王南越直長沙者因王子定長沙以北西走蜀漢中告越楚王淮南三王與寡人西面齊諸王與趙王定河間河內或入臨晉關或與寡人會雒陽燕王趙王故與胡王有約燕王北定代雲中轉胡衆入蕭關走長安匡正天下以安高廟願王勉之楚元王子淮南三王或不洗沐十餘年怨入骨髓欲一有所出久矣寡人未得諸王之意未敢聼今諸王茍能存亡繼絶振弱伐暴以安劉氏社稷所願也吳國雖貧寡人節衣食用積金錢修兵革聚糧食夜以繼日三十餘年矣凡皆為此願諸王勉之能斬捕大將者賜金五千斤封萬戶列將三千斤封五千戶禆將二千斤封二千戶二千石千斤封千戶皆為列侯其以軍若城邑降者卒萬人萬戶如得大將人户五千如得列將人戶三千如得禆將人户千如得二千石其小吏皆以差次受爵金他封賜皆倍軍法其有故爵邑者更益勿因願諸王明以令士大夫不敢欺也寡人金錢在天下者往往而有非必取於吳諸王日夜用之不能盡有當賜者告寡人寡人且往遺之敬以聞七國反書聞天子乃遣太尉條侯周亞夫將三十六將軍往擊吳楚遣曲周侯酈寄擊趙將軍欒布擊齊大將軍竇嬰屯滎陽監齊趙兵初吳楚反書聞兵未發竇嬰言故吳相爰盎召入見上問以吳楚之計盎對曰吳楚相遺書曰賊臣朝錯擅適過諸侯削奪之地以故反名為西共誅錯復故地而罷方今計獨斬錯發使赦七國復其故地則兵可毋血刃而俱罷上從其議遂斬錯語具在盎傳以盎為太常奉宗廟使吳王吳王弟子德侯為宗正輔親戚使至吳吳楚兵已攻梁壁矣宗正以親故先入見諭吳王拜受詔吳王聞盎來亦知其欲説笑而應曰我已為東帝尚誰拜不肯見盎而留軍中欲劫使將盎不肯使人圍守且殺之盎得夜亡走梁遂歸報條侯將乘六乘傳會兵滎陽至雒陽見劇孟喜曰七國反吾乘傳至此不自意全又以為諸侯已得劇孟孟今無動吾據滎陽滎陽以東無足憂者至雒陽問故父絳侯客鄧都尉曰䇿安出客曰吳楚兵鋭甚難與爭鋒楚兵輕不能久方今為將軍計莫若引兵東北壁昌邑以梁委吳吳必盡鋭攻之將軍深溝髙壘使輕兵絶淮泗口塞吳餉道使吳梁相敝而糧食竭乃以全制其極破吳必矣條侯曰善從其䇿遂堅壁昌邑南輕兵絶吳餉道吳王之初發也吳臣田祿伯為大將軍田祿伯曰兵屯聚而西無他竒道難以立功臣願得五萬人别循江淮而上收淮南長沙入武關與大王會此亦一竒也吳王太子諫曰王以反為名此兵難以藉人人亦且反王奈何且擅兵而别多他利害徒自損耳吳王即不許田祿伯吳少將桓將軍説王曰吳多步兵步兵利險漢多車騎車騎利平地願大王所過城不下直去疾西據雒陽武庫食敖倉粟阻山河之險以令諸侯雖無入關天下固已定矣大王徐行留下城邑漢軍車騎至馳入梁楚之郊事敗矣吳王問吳老將老將曰此年少推鋒可耳安知大慮王於是不用桓將軍計王專并將其兵未渡淮諸賔客皆得為將校尉行間侯司馬獨周邱不用周邱者下邳人亡命吳酤酒無行王薄之不任周邱乃上謁説王曰臣以無能不得待罪行間臣非敢求有所將也願請王一漢節必有以報王乃豫之周邱得節夜馳入下邳下邳時聞吳反皆城守至傳舍召令入户使從者以罪斬令遂召兄弟所善豪吏告曰吳反兵且至屠下邳不過食頃今先下家室必完能者封侯至矣出乃相告下邳皆下周邱一夜得三萬人使人報吳王遂將其兵北略城邑比至城陽兵十餘萬破城陽中尉軍聞吳王敗走自度無與共成功即引兵歸下邳未至癰發背死二月吳王兵既破敗走於是天子制詔將軍蓋聞為善者天報以福為非者天報以殃高皇帝親垂功德建立諸侯幽王悼惠王絶無後孝文皇帝哀憐加惠王幽王子遂悼惠王子卭等令奉其先王宗廟為漢藩國德配天地明並日月而吳王濞背德反義誘受天下亡命罪人亂天下幣稱疾不朝二十餘年有司數請濞罪孝文皇帝寬之欲其改行為善今乃與楚王戊趙王遂膠西王卬濟南王辟光災川王賢膠東王雄渠約從謀反為逆無道起兵以危宗廟賊殺大臣及漢使者迫劫萬民伐殺無罪燒殘民家掘其邱壟甚為暴虐而卬等又重逆無道燒宗廟鹵御物朕甚痛之朕素服避正殿將軍其勸士大夫擊反虜擊反虜者深入多殺為功斬首捕虜比三百石以上皆殺無有所置敢有議詔及不如詔者皆要斬初吳王之度淮與楚王遂西敗棘壁乘勝而前鋭甚梁孝王恐遣將軍擊之又敗梁兩軍士卒皆還走梁數使使條侯求救條侯不許又使使訴條侯於上上使告條侯救梁又守便宜不行梁使韓安國及楚死事相弟張羽為將軍乃得頗敗吳兵吳兵欲西梁城守不敢西即走條侯軍會下邑欲戰條侯壁不肯戰吳糧絶卒飢數挑戰遂夜奔條侯壁驚東南條侯使備西北果從西北不得入吳大敗士卒多飢死叛散於是吳王乃與其戲下壯士千人夜亡去度淮走丹徒保東越東越兵可萬餘人使人收聚亡卒漢使人以利啖東越東越即紿吳王吳王出勞軍使人鏦殺吳王盛其頭馳傳以聞吳王太子駒亡走閩越吳王之棄軍亡也軍遂潰往往稍降太尉條侯及梁軍楚王戊軍敗自殺三王之圍齊臨災也三月不能下漢兵至膠西膠東災川王各引兵歸國膠西王徒跣席稿飲水謝太后王太子德曰漢兵還臣觀之以罷可襲願收王餘兵擊之不勝而逃入海未晚也王曰吾士卒皆已壞不可用不聼漢將弓高侯頽當遺王書曰奉詔誅不義降者赦除其罪復故不降者滅之王何處須以從事王肉袒叩頭漢軍壁謁曰臣卬奉法不謹驚駭百姓乃苦將軍逺道至于窮國敢請葅醢之罪弓高侯執金鼓見之曰王苦軍事願聞王發兵狀王頓首膝行對曰今者朝錯天子用事臣變更高皇帝法令侵奪諸侯地卬等以為不義恐其敗亂天下七國發兵且以誅錯今聞錯已誅卬等謹已罷兵歸將軍曰王茍以錯為不義何不以聞及未有詔虎符擅發兵擊義國以此觀之意非徒欲誅錯也乃出詔書為王讀之曰王其自圖之王曰如卬等死有餘罪遂自殺太后太子皆死膠東災川濟南王皆伏誅酈將軍攻趙十月而下之趙王自殺濟北王以劫故不誅初吳王首反并將楚兵連齊趙正月起三月皆破滅楚元王交字遊高祖同父少弟也好書多材蓻少時嘗與魯穆生白生申公俱受詩於浮邱伯伯者孫卿門人也及秦焚書各别去髙祖兄弟四人長兄伯次仲伯蚤卒高祖既為沛公景駒自立為楚王高祖使仲與審食其留侍太上皇交與蕭曹等俱從高祖見景駒遇項梁共立楚懷王因西攻南陽入武關與秦戰於藍田至霸上封交為文信君從入蜀漢還定三秦誅項籍即帝位交與盧綰常侍上出入卧內傳言語諸內事隱謀而上從父兄劉賈數别將漢六年既廢楚王信分其地為二國立賈為荆王交為楚王王薛郡東海彭城三十六縣先有功也後封次兄仲為代王長子肥為齊王初高祖微時常避事時時與賔客過其邱嫂食嫂厭叔與客來陽為羮盡轑釡客以故去已而視釡中有羮繇是怨嫂及立齊代王而伯子獨不得侯太上皇以為言高祖曰某非敢忘封之也為其母不長者七年十月封其子信為羮頡音戞侯元王既至楚以穆生白生申公為中大夫高后時浮邱伯在長安元王遣子郢客與申公俱卒業文帝時聞申公為詩最精以為博士元王好詩諸子皆讀詩申公始為詩傳號魯詩元王亦次之詩傳號曰元王詩世或有之高后時以元王子郢客為宗正封上邳侯元王立二十三年薨太子辟非先卒文帝乃以宗正上邳侯郢客嗣是為夷王申公為博士官隨郢客歸復以為中大夫立四年薨子戊嗣文帝尊寵元王子生爵比皇子景帝即位以親親封元王寵子五人子禮為平陸侯富為休侯歲為沈音審猶侯執為宛朐侯執古蓻字調為棘樂侯初元王敬禮申公等穆生不耆酒元王每置酒常為穆生設醴及王戊即位常設後亡設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市稱疾卧申公白生強起之曰獨不念先王之德與今王一旦失小禮何足至此穆生曰易稱知幾其神乎幾者動之微吉凶之先見也君子見幾而作不俟終日先王之所以禮吾三人者為道之存故也今而忽之是忘道也忘道之人胡可與久處豈為區區之禮哉遂謝病去申公白生獨留王戊稍淫暴二十年為薄太后服私姦服舍削東海薛郡乃與吳通謀二人諫不聼胥靡之衣之赭衣使杵臼碓舂於市休侯使人諫王王曰季父不吾與我起先取季父矣休侯懼與母太夫人奔京師二十一年春景帝之三年也削書到遂應吳王反其相張尚太傳趙夷吾諫不聼遂殺尚夷吾起兵會吳西攻梁破棘壁至昌邑南與漢將周亞夫戰漢絶吳楚糧道士飢吳王走戊自殺軍遂降漢漢已平吳楚景帝乃立宗正平陸侯禮為楚王奉元王後是為文王三年薨子安王道嗣二十二年薨子襄王注嗣十四年薨子節王純嗣十六年薨子延夀嗣宣帝即位延夀以為廣陵王胥武帝子天下有變必得立陰欲附倚輔助之故為其後母弟趙何齊取廣陵王女為妻與何齊謀曰我與廣陵王相結天下不安發兵助之使廣陵王立何齊尚公主列侯可得也因使何齊奉書遺廣陵曰願長耳目毋後人有天下何齊父長年上書告之事下有司考驗辭服延夀自殺立二十二年國除初休侯富既奔京師而王戊反富等皆坐免侯削屬籍後聞其數諫戊乃更封為紅侯太夫人與竇太后有親懲山東之寇求留京師詔許之富子辟強等四人共養仕於朝太夫人薨賜塋葬靈戶富傳國至曾孫無子絶辟強字少卿亦好讀書能屬文武帝時以宗室子隨二千石論議冠諸宗室清靜少欲常以書自娛不肯仕昭帝即位或説大將軍霍光曰將軍不見諸吕之事乎處伊尹周公之位攝政擅權而背宗室不與共職是以天下不信卒至於滅亡今將軍當盛位帝春秋富宜納宗室又多與大臣共事反諸吕道如是則可以免患光然之乃擇宗室可用者辟強子德待詔丞相府年三十餘欲用之或言父見在亦先帝之所寵也遂拜辟強為光祿大夫守長樂衛尉時年已八十矣徙為宗正數月卒德字路叔少修黃老術有智略少時數言事召見甘泉宫武帝謂之千里駒昭帝初為宗正丞雜治劉澤詔獄父為宗正徙大鴻臚丞遷太中大夫後復為宗正雜案上官氏蓋主事德常持老子知足之計妻死大將軍光欲以女妻之德不敢取畏盛滿也蓋長公主孫談遮德自言德數責以公主起居無狀侍御史以為光望不受女承指劾德誹謗詔獄免為庶人屏居山田光聞而恨之復白召德守青州刺史歲餘復為宗正與立宣帝以定䇿賜爵關內侯地節中以親親行謹厚封為陽城侯子安民為郎中右曹宗家以德得官宿衛者二十餘人德寬厚好施生每行京兆尹事多所平反罪人家産過百萬則以振昆弟賔客食飲曰富民之怨也立十一年子向坐鑄偽黃金當伏法德上書訟罪會薨大鴻臚奏德訟子罪失大臣體不宜賜諡置嗣制曰賜諡繆侯為置嗣傳至孫慶忌復為宗正太常薨子岑嗣為諸曹中郎將列校尉至太常薨傳子至王莽敗乃絶向字子政夲名更生年十二以父德任為輦郎既冠以儒行修飭擢為諫大夫是時宣帝循武帝故事招選名儒俊材置左右更生以通達能屬文辭與王褒張子僑等並進對獻賦頌凡數十篇上復興神仙方術之事而淮南有枕中鴻寶苑祕書書言神仙使鬼物為金之術及鄒衍重道延命方世人莫見而更生父德武帝時治淮南獄得其書更生幼而讀誦以為竒獻之言黃金可成上令典尚方鑄作事費甚多方不驗上乃下更生吏吏劾更生鑄偽黃金繫當死更生兄陽城侯安民上書入國戶半贖更生罪上亦竒其材得踰冬減死論會初立榖梁春秋徴更生受榖梁講論五經於石渠復拜為郎中給事黃門遷散騎諫大夫給事中元帝初即位太傅蕭望之為前將軍少傳周堪為諸吏光祿大夫皆領尚書事甚見尊任更生年少於望之堪然二人重之薦更生宗室忠直明經有行擢為散騎宗正給事中與侍中金敞拾遺於左右四人同心輔政患苦外戚許史在位放縱而中書宦官𢎞恭石顯弄權望之堪更生議欲白罷退之未白而語泄遂為許史及恭顯所譖訴堪更生下獄及望之皆免官語在望之傳其春地震夏客星見昴卷舌間上感悟下詔賜望之爵關內侯奉朝請秋徴堪向欲以為諫大夫恭顯白皆為中郎冬地復震時恭顯許史子弟侍中諸曹皆側目於望之等更生懼焉乃使其外親上變事言竊聞故前將軍蕭望之等皆忠正無私欲致大治忤於貴戚尚書今道路人聞望之等復進以為且復見毁讒必曰嘗有過之臣不宜復用是大不然臣聞春秋地震為在位執政太盛也不為三獨夫動亦已明矣且往者高皇帝時季布有罪至於夷滅後赦以為將軍高后孝文之間卒為名臣孝武帝時兒寬有重罪繫按道侯韓説諫曰前吾邱夀王死陛下至今恨之今殺寬後將復大恨矣上感其言遂貰寬復用之位至御史大夫御史大夫未有及寬者也又董仲舒坐私為災異書主父偃取奏之下吏罪至不道幸蒙不誅復為太中大夫膠西相以老病免歸漢有所欲興常有詔問仲舒為世儒宗定議有益天下孝宣皇帝時夏侯勝坐誹謗繫獄三年免為庶人宣帝復用勝至長信少府太子太傅名敢直言天下美之若乃羣臣多此比類難一二記有過之臣無負國家有益天下此四臣者足以觀矣前𢎞恭奏望之等獄決三月地大震恭移病出後復視事天陰雨雪由是言之地動殆為恭等臣愚以為宜退恭顯以章蔽善之罰進望之等以通賢者之路如此太平之門開災異之原塞矣書奏恭顯疑其更生所為白請考姦詐辭果服遂逮更生繫獄下太傅韋元成諫大夫貢禹與廷尉雜考劾更生前為九卿坐與望之堪謀排車騎將軍高許史氏侍中者毁離親戚欲退去之而獨專權為臣不忠幸不伏誅復蒙恩徴用不悔前過而教令人言變事誣罔不道更生坐免為庶人而望之亦坐使子上書自寃前事恭顯白令詣獄置對望之自殺天子甚悼恨之乃擢周堪為光祿勳堪弟子張猛光祿大夫給事中大見信任恭顯憚之數譖毁焉更生見堪猛在位幾已得復進懼其傾危乃上封事諫曰臣前幸得以骨肉備九卿奉法不謹乃復蒙恩竊見災異並起天地失常徴表為國欲終不言念忠臣雖在甽畝猶不忘君惓惓之義也況重以骨肉之親又加以舊恩未報乎欲竭愚誠又恐越職然惟二恩未報忠臣之義一抒愚意退就農畝死無所恨臣聞舜命九官濟濟相讓和之至也衆賢和於朝則萬物和於野故簫韶九成而鳯凰來儀擊石拊石百獸率舞四海之內靡不和寧及至周文開基西郊雜遝衆賢罔不肅和崇推讓之風以銷分爭之訟文王既沒周公思慕歌詠文王之德其詩曰於穆清廟肅雍顯相濟濟多士秉文之德當此之時武王周公繼政朝臣和於內萬國歡於外故盡得其歡心以事其先祖其詩曰有來雍雍至止肅肅相維辟公天子穆穆言四方皆以和來也諸侯和於下天應報於上故周頌曰降福穰穰又曰飴我釐牟釐牟麥也始自天降此皆以和致和獲天助也下至幽厲之際朝廷不和轉相非怨詩人疾而憂之曰民之無良相怨一方衆小在位而從邪議歙歙相是而背君子故其詩曰歙歙訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依君子獨處守正不橈衆枉勉強以從王事則反見憎毒讒訴故其詩曰密勿從事不敢告勞無罪無辜讒口嗸嗸當是之時日月薄蝕而無光其詩曰朔日辛卯日有蝕之亦孔之醜又曰彼月而微此日而微今此下民亦孔之哀又曰日月鞠凶不用其行四國無政不用其良天變見於上地變動於下水泉沸騰山谷易處其詩曰百川沸騰山冡卒崩高岸為谷深谷為陵哀今之人胡憯莫懲霜降失節不以其時其詩曰正月繁霜我心憂傷民之訛言亦孔之將言民以是為非甚衆大也此皆不和賢不肖易位之所致也自此之後天下大亂篡殺殃禍並作厲王奔彘幽王見殺至乎平王末年魯隱之始即位也周大夫祭伯乖離不和出奔於魯而春秋為諱不言來奔傷其禍殃自此始也是後尹氏世卿而專恣諸侯背畔而不朝周室卑微二百四十二年之間日食三十六地震五山陵崩阤二彗星三見夜常星不見夜中星隕如雨一火災十四長狄入三國五石隕墜六鶂退飛多麋有蜮蜚鸜鵒來巢者皆一見晝冥晦雨木冰李梅冬實七月霜降草木不死八月殺菽大雨雹雨雪靁霆失序相乘水旱飢蝝螽螟􅑣午並起當是時禍亂輒應弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數也周室多禍晉敗其師於貿戎伐其郊鄭傷桓王戎執其使衛侯朔召不往齊逆命而助朔五大夫爭權三君更立莫能正理遂至陵夷不能復興由此觀之和氣致祥乖氣致異祥多者其國安異衆者其國危天地之常經古今之通義也今陛下開三代之業招文學之士優遊寬容使得並進今賢不肖渾殽白黑不分邪正雜糅忠讒並進章交公車人滿北軍朝臣舛午膠戾乖剌更相讒訴轉相是非傳授增加文書紛紏前後錯謬毁譽渾亂所以營惑耳目感移心意不可勝載分曹為黨往往羣朋將同心以陷正臣正臣進者治之表也正臣陷者亂之機也乘治亂之機未知孰任而災異數見此臣所以寒心者也夫乘權藉藝之人子弟鱗集於朝羽翼陰附者衆輻湊於前毁譽將必用以終乖離之咎是以日月無光雪霜夏隕海水沸出陵谷易處列星失行皆怨氣之所致也夫遵衰周之軌迹循詩人之所刺而欲以成太平致雅頌猶卻行而求及前人也初元以來六年矣案春秋六年之中災異未有稠如今者也夫有春秋之異無孔子之救猶不能解紛況甚於春秋乎原其所以然者讒邪並進也讒邪之所以並進者由上多疑心既已用賢人而行善政如或譖之則賢人退而善政還夫執狐疑之心者來讒賊之口持不斷之意者開羣枉之門讒邪進則衆賢退羣枉盛則正士消故易有否泰小人道長君子道消君子道消則政日亂故為否否者閉而亂也君子道長小人道消小人道消則政日治故為泰泰者通而治也詩又云雨雪麃麃見晛聿消與易同義昔者鯀共工歡兜與舜禹雜處堯朝周公與管蔡並居周位當是時迭進相毁流言相謗豈可勝道哉帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕於魯李斯與叔孫俱宦於秦定公始皇賢季孟李斯而消孔子叔孫故以大亂汚辱至今故治亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也言守善篤也易曰渙汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也用賢未能三旬而退是轉石也論語曰見不善如探湯今二府奏佞讇不當在位歷年而不去故出令則如反汗用賢則如轉石去佞則如拔山如此望陰陽之調不亦難乎是以羣小窺見間隙緣飾文字巧言醜詆流言飛文譁於民間故詩云憂心悄悄慍于羣小小人成羣誠足慍也昔孔子與顔淵子貢更相稱譽不為朋黨禹稷與臯陶傳相汲引不為比周何則忠於為國無邪心也故賢人在上位則引其類而聚之於朝易曰飛龍在天大人聚也在下位則思與其類俱進易曰拔茅茹以其彚征吉在上則引其類在下則推其類故湯用伊尹不仁者逺而衆賢至類相致也今佞邪與賢臣並在交戟之內合黨共謀違善依惡歙歙訿訿數設危險之言欲以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也自古明聖未有無誅而治者也故舜有四放之罰而孔子有兩觀之誅然後聖化可得而行也今以陛下明知誠深思天地之心迹察兩觀之誅覽否泰之卦觀雨雪之詩歷周唐之所進以為法原秦魯之所消以為戒考祥應之福省災異之禍以揆當世之變放逺佞邪之黨壞散險詖之聚杜閉羣枉之門廣開衆正之路決斷狐疑分别猶豫使是非炳然可知則百異消滅而衆祥自至太平之基萬世之利也臣幸得託肺附誠見陰陽不調不敢不通所聞竊推春秋災異以效今事一二條其所以不宜宣泄臣謹重封昧死上恭顯見其書愈與許史比而怨更生等堪性公方自見孤立遂直道而不曲是嵗夏寒日青無光恭顯及許史皆言堪猛用事之咎上內重堪又患衆口之寖潤無所取信時長安令楊興以材能幸常稱譽堪上欲以為助乃見問興朝臣齗齗不可光祿勳何邪興者傾巧士謂上疑堪因順指曰堪非獨不可於朝廷自州里亦不可也臣見衆人聞堪前與劉更生等謀毁骨肉以為當誅故臣前言堪不可誅傷為國養恩也上曰然此何罪而誅今宜奈何興曰臣愚以為可賜爵關內侯食邑三百户勿令典事明主不失師傅之恩此最䇿之得者也上於是疑會城門校尉諸葛豐亦言堪猛短上因發怒免豐語在其傳又曰豐言堪猛貞信不立朕閔而不治又惜其材能未有所效其左遷堪為河東太守猛槐里令顯等專權日甚後三歲餘孝宣廟闕災其晦日有蝕之於是上召諸前言日變在堪猛者責問皆稽首謝乃因下詔曰河東太守堪先帝賢之命而傅朕資質淑茂道術通明議論正直秉心有常發憤悃愊信有憂國之心以不能阿尊事貴孤特寡助抑厭遂退卒不克明往者衆臣見異不務自修深惟其故而反暗昧説天託咎此人朕不得已出而試之以彰其材堪出之後大變仍臻衆亦默然堪治未期年而三老官屬有識之士詠頌其美使者過郡靡人不稱此固足以彰先帝之知人而朕有以自明也俗人乃造端作基非議詆欺或引幽隱非所宜明意疑以類欲以陷之朕亦不取也朕迫于俗不得專心乃者天著大異朕甚懼焉今堪年衰歲暮恐不得自信排於異人將安究之哉其徴堪詣行在所拜為光祿大夫秩中二千石領尚書事猛復為太中大夫給事中顯幹尚書尚書五人皆其黨也堪希得見常因顯白事事決顯口會堪疾瘖不能言而卒顯誣譖猛令自殺於公車更生傷之乃著疾讒摘要救危及世頌凡八篇依興古事悼已及同類也遂廢十餘年成帝即位顯等伏辜更生乃復進用更名向向以故九卿召拜為中郎使領護三輔都水數奏封事遷光祿大夫是時帝元舅陽平侯王鳳為大將軍秉政倚太后專國權兄弟七人皆封為列侯時數有大異向以為外戚貴盛鳳兄弟用事之咎而上方精於詩書觀古文詔向領校中五經祕書向見尚書洪範箕子為武王陳五行陰陽休咎之應向乃集合上古以來歷春秋六國至秦漢符瑞災異之記推迹行事連傳禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳳兄弟起此論也然終不能奪王氏權久之營起昌陵數年不成復還歸延陵制度泰奢向上疏諫曰臣聞易曰安不忘危存不忘亡是以身安而國家可保也故賢聖之君博觀終始窮極事情而是非分眀王者必通三統明天命所授者博非獨一姓也孔子論詩至於殷士膚敏祼將于京喟然歎曰大哉天命善不可不傳于子孫是以富貴無常不如是則王公其何以戒慎民萌何以勸勉蓋傷微子之事周而痛殷之亡也雖有堯舜之聖不能化丹朱之子雖有禹湯之德不能訓末孫之桀紂自古及今未有不亡之國也昔高皇帝既滅秦將都雒陽感寤劉敬之言自以德不及周而賢於秦遂徙都關中依周之德因秦之阻世之長短以德為效故常戰栗不敢諱亡孔子所謂富貴無常蓋謂此也孝文皇帝居霸陵北臨厠意悽愴悲懷顧謂羣臣曰嗟乎以北山石為椁用紵絮斫陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石槨又何戚焉夫死者無終極而國家有廢興故釋之之言為無窮計也孝文寤焉遂薄葬不起山墳易曰古之葬者厚衣之以薪藏之中野不封不樹後世聖人易之以棺槨棺槨之作自黃帝始黃帝葬於橋山堯葬濟陰邱壠皆小葬具甚微舜葬蒼梧二妃不從禹葬會稽不改其列殷湯無葬處文武周公葬於畢秦穆公葬於雍橐泉宫祈年館下樗里子葬於武庫皆無邱壠之處此聖帝眀王賢君智士逺覽獨慮無窮之計也其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也夫周公武王弟也葬兄甚微孔子葬母於防稱古墓而不墳曰丘東西南北之人也不可不識也為四尺墳遇雨而崩弟子修之以告孔子孔子流涕曰吾聞之古者不修墓蓋非之也延陵季子適齊而反其子死葬於嬴博之間穿不及泉斂以時服封墳掩坎其高可隱而號曰骨肉歸復於土命也魂氣則無不之也夫嬴博去吳千有餘里季子不歸葬孔子往觀曰延陵季子於禮合矣故仲尼孝子而延陵慈父舜禹忠臣周公弟弟其葬君親骨肉皆微薄矣非茍為儉誠便於體也宋桓司馬為石槨仲尼曰不如速朽秦相吕不韋集知略之士而造春秋亦言薄葬之義皆明於事情者也逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭莊襄五王皆大作邱壠多其瘞藏咸盡發掘暴露甚足悲也秦始皇帝葬於驪山之阿下錮三泉上崇山墳其高五十餘丈周回五里有餘石槨為遊館人膏為燈燭水銀為江海黃金為鳬雁珍寶之藏機械之變棺槨之麗宫館之盛不可勝原又多殺宫人生薶工匠計以萬數天下苦其役而反之驪山之作未成而周章百萬之師至其下矣項籍燔其宫室營宇往者咸見發掘其後牧兒亡羊羊入其鑿牧者持火照求羊失火燒其藏椁自古至今葬未有盛如始皇者也數年之間外被項籍之災內離牧豎之禍豈不哀哉是故德彌厚者葬彌薄知愈深者葬愈微無德寡知其葬愈厚邱壠彌高宫廟甚麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣周德既衰而奢侈宣王賢而中興更為儉宫室小寢廟詩人美之斯干之詩是也上章道宫室之如制下章言子孫之衆多也及魯嚴公刻飾宗廟多築臺囿後嗣再絶春秋刺焉周宣如彼而昌魯秦如此而絶是則奢儉之得失也陛下即位躬親節儉始營初陵其制約小天下莫不稱賢眀及徙昌陵增埤為高積土為山發民墳墓積以萬數營起邑居期日迫卒功費大萬百餘死者恨於下生者愁於上怨氣感動陰陽因之以飢饉物故流離以千萬數臣甚惛焉以死者為有知發人之墓其害多矣若其無知又安用大謀之賢知則不説以示衆庶則苦之若茍以説愚夫淫侈之人又何為哉陛下慈仁篤美甚厚聰明疏達蓋世宜𢎞漢家之德崇劉氏之美光昭五帝三王而顧與暴秦亂君競為奢侈比方邱壠説愚夫之目隆一時之觀違賢知之心亡萬世之安臣竊為陛下羞之唯陛下上覽明聖黃帝堯舜禹湯文武周公仲尼之制下觀賢知穆公延陵樗里張釋之之意孝文皇帝去墳薄葬以儉安神可以為則秦昭始皇增山厚藏以侈生害足以為戒初陵之橅宜從公卿大臣之議以息衆庶書奏上甚感向言而不能從其計向睹俗彌奢淫而趙衛之屬起微賤踰禮制向以為王教由內及外自近者始故採取詩書所載賢妃貞婦興國顯家可法則及孽嬖亂亡者序次為列女傳凡八篇以戒天子及采傳記行事著新序説苑凡五十篇奏之數上疏言得失陳法戒書數十上以助觀覽補遺闕上雖不能盡用然內嘉其言常嗟歎之時上無繼嗣政由王氏出災異寖甚向雅竒陳湯智謀與相親友獨謂湯曰災異如此而外家日盛其漸必危劉氏吾幸得同姓末屬絫世蒙漢厚恩身為宗室遺老歷事三主上以我先帝舊臣每進見常加優禮吾而不言孰當言者向遂上封事極諫曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政未有不為害者也昔晉有六卿齊有田崔衛有孫寧魯有季孟常掌國事世執朝政終後田氏取齊六卿分晉崔杼弒其君光孫林父寧殖出其君衎弒其君剽季氏八佾舞於庭三家者以雍徹並專國政卒逐昭公周大夫尹氏管朝事濁亂王室子朝子猛更立連年乃定故經曰王室亂又曰尹氏殺王子克甚之也春秋舉成敗録禍福如此類甚衆皆陰盛而陽微下失臣道之所致也故書曰臣之有作威作福害于而家凶于而國孔子曰祿去公室政逮大夫危亡之兆秦昭王舅穰侯及涇陽葉陽君專國擅藝上假太后之威三人者權重於昭王家富於秦國國甚危殆賴寤范雎之言而秦復存二世委任趙高專權自恣壅蔽大臣終有閻樂望夷之禍秦遂以亡近事不逺即漢所代也漢興諸吕無道擅相尊王吕産吕祿席太后之寵據將相之位兼南北軍之衆擁梁趙王之尊驕盈無厭欲危劉氏賴忠正大臣絳侯朱虛侯等竭誠盡節以誅滅之然後劉氏復安今王氏一姓乘朱輪華轂者二十三人青紫貂蟬充盈幄內魚鱗左右大將軍秉事用權五侯驕奢僭盛並作威福擊斷自恣行汙而寄治身私而託公依東宫之尊假甥舅之親以為威重尚書九卿州牧郡守皆出其門管執樞機朋黨比周稱譽者登進忤恨者誅傷遊談者助之説執政者為之言排擯宗室孤弱公族其有智能者尤非毁而不進逺絶宗室之任不令得給事朝省恐其與已分權數稱燕王蓋主以疑上心避諱吕霍而弗肯稱內有管蔡之萌外假周公之論兄弟據重宗族磐互歷上古至秦漢外戚僭貴未有如王氏者也雖周皇甫秦穰侯漢武安吕霍上官之屬皆不及也物盛必有非常之變先見為其人微象孝昭帝時冠石立於泰山仆栁起於上林而孝宣帝即位今王氏先祖墳墓在濟南者其梓柱生枝葉扶疏上出屋根函地中雖立石起栁無以過此之明也事藝不兩大王氏與劉氏亦且不並立如下有泰山之安則上有纍卵之危陛下為人子孫守持宗廟而令國祚移於外親降為皂𨽻縱不為身奈宗廟何婦人內夫家外父母家此亦非皇太后之福也孝宣皇帝不與舅平昌樂昌侯權所以全安之也夫明者起福於無形銷患於未然宜發明詔吐德音援近宗室親而納信黜逺外戚母授以政皆罷令就第以則效先帝之所行厚安外戚全其宗族誠東宫之意外家之福也王氏永存保其爵祿劉氏長安不失社稷所以褒睦外內之姓子子孫孫無疆之計也如不行此䇿田氏復見於今六卿必起於漢為後嗣憂昭昭甚明不可不深圖不可不蚤慮易曰君不密則失臣臣不密則失身幾事不密則害成唯陛下深留聖思審固幾密覽往事之戒以折中取信居萬安之實用保宗廟久承皇太后天下幸甚書奏天子召見向歎息悲傷其意謂曰君且休矣吾將思之以向為中壘校尉向為人簡易無威儀亷靖樂道不交接世俗專積思於經術晝誦書傳夜觀星宿或不寐達旦元延中星孛東井蜀郡岷山崩雍江向惡此異懷不能已復上奏其辭曰臣聞帝舜戒伯禹毋若丹朱傲周公戒成王毋若殷王紂詩曰殷監不逺在夏后之世亦言湯以桀為戒也聖帝明王常以敗亂自戒不諱廢興故臣敢極陳其愚唯陛下留神察焉謹案春秋二百四十二年日蝕三十六襄公尤數率三歲五月有竒而一食漢興訖竟寧孝景帝尤數率三歲一月而一食臣向前數言日當食今連三年比食自建始以來二十歲間而八食率二歲六月而一發古今罕有異有小大希稠占有舒疾緩急而聖人所以斷疑也易曰觀乎天文以察時變昔孔子對魯哀公並言夏桀殷紂暴虐天下故歷失則攝提失方孟陬無紀此皆易姓之變也秦始皇之末至二世時日月薄食山陵淪亡辰星出於四孟太白經天而行無雲而雷枉矢夜光熒惑襲月孽火燒宫野禽戲廷都門內崩長人見臨洮石隕於東郡星孛大角大角以亡觀孔子之言考暴秦之異天命信可畏也及項籍之敗亦孛大角漢之入秦五星聚于東井得天下之象也孝惠時有雨血日食於衝滅光星見之異孝昭時有泰山卧石自立上林僵栁復起大星如月西行衆星隨之此為特異孝宣興起之表天狗夾漢而西久陰不雨者二十餘日昌邑不終之異也皆著於漢紀觀秦漢之易世覽惠昭之無後察昌邑之不終視孝宣之紹起天之去就豈不昭昭然哉高宗成王亦有雊雉拔木之變能思其故故高宗有百年之福成王有復風之報神明之應應若景嚮世所同聞也臣幸得託末屬誠見陛下有寬明之德冀銷大異而興高宗成王之聲以崇劉氏故豤豤數姦死亡之誅今日食尤屢星孛東井攝提炎及紫宫有識長老莫不震動此變之大者也其事難一二記故易曰書不盡言言不盡意是以設卦指爻而復説義書曰伻來以圖天文難以相曉臣雖圖上猶須口説然後可知願賜清燕之間指圖陳狀上輒入之然終不能用也向每召見數言公族者國之枝葉枝葉落則夲根無所庇廕方今同姓疏逺母黨專政祿去公室權在外家非所以強漢宗卑私門保守社稷安固後嗣也向自見得信於上故常顯訟宗室譏刺王氏及在位大臣其言多痛切發於至誠上數欲用向為九卿輒為王氏居位者及丞相御史所持故終不遷居列大夫官前後三十餘年年七十二卒卒後十三歲而王氏代漢向三子皆好學長子伋以易教授官至郡守中子賜九卿丞蚤卒少子歆最知名歆字子駿少以通詩書能屬文召見成帝待詔宦者署為黃門郎河平中受詔與父向領校祕書講六藝傳記諸子詩賦數術方技無所不究向死後歆復為中壘校尉哀帝初即位大司馬王莽舉歆宗室有材行為侍中太中大夫遷騎都尉奉車光祿大夫貴幸復領五經卒父前業歆乃集六藝羣書種别為七略歆及向始皆治易宣帝時詔向受榖梁春秋十餘年大明習及歆校祕書見古文春秋左氏傳歆大好之時丞相史尹咸以能治左氏與歆共校經傳歆略從咸及丞相翟方進受質問大義初左氏傳多古字古言學者傳訓故而已及歆治左氏引傳文以解經轉相發眀由是章句義理備焉歆亦湛靖有謀父子俱好古博見強志過絶於人歆以為左邱明好惡與聖人同親見夫子而公羊榖梁在七十子後傳聞之與親見之其詳略不同歆數以難向向不能非間也然猶自持其榖梁義及歆親近欲建立左氏春秋及毛詩逸禮古文尚書皆列於學官哀帝令歆與五經博士講論其義諸博士或不肯置對歆因移書太常博士責讓之曰昔唐虞既衰而三代迭興聖帝明王纍起相襲其道甚著周室既微而禮樂不正道之難全也如此是故孔子憂道之不行歷國應聘自衛反魯然後樂正雅頌乃各得其所修易序書制作春秋以紀帝王之道及夫子沒而微言絶七十子終而大義乖重遭戰國棄籩豆之禮理軍旅之陳孔氏之道抑而孫吳之術興陵夷至於暴秦燔經書殺儒士設挾書之法行是古之罪道術由是遂滅漢興去聖帝明王遐逺仲尼之道又絶法度無所因襲時獨有一叔孫通略定禮儀天下惟有易卜未有他書至孝惠之世乃除挾書之律然公卿大臣絳灌之屬咸介胄武夫莫以為意至孝文皇帝始使掌故朝錯從伏生受尚書尚書初出於屋壁朽折散絶今其書見在時師傳讀而已詩始萌芽天下衆書往往頗出皆諸子傳説猶廣立於官為置博士在漢朝之儒惟賈生而已至孝武皇帝然後鄒魯梁趙頗有詩禮春秋先師皆起於建元之間當此之時一人不能獨盡其經或為雅或為頌相合而成泰誓後得博士集而讀之故詔書稱曰禮壞樂崩書缺簡脫朕甚閔焉時漢興已七八十年離於全經固已逺矣及魯恭王壞孔子宅欲以為宫而得古文於壞壁之中逸禮有三十九書十六篇天漢之後孔安國獻之遭巫蠱倉卒之難未及施行及春秋左氏邱明所修皆古文舊書多者二十餘通藏於祕府伏而未發孝成皇帝閔學殘文缺稍離其真乃陳發祕藏校理舊文得此三事以考學官所傳經或脫簡傳或間編傳問民間則有魯國桓公趙國貫公膠東庸生之遺學與此同抑而未施此乃有識者之所惜閔士君子之所嗟痛也往者綴學之士不思廢絶之闕茍因陋就寡分文析字煩言碎辭學者罷老且不能究其一蓻信口説而背傳記是末師而非往古至於國家將有大事若立辟雍封禪巡狩之儀則幽冥而莫知其原猶欲保殘守缺挾恐見破之私意而無從善服義之公心或懷妒疾不考情實雷同相從隨聲是非抑此三學以尚書為備謂左氏為不傳春秋豈不哀哉今聖上德通神明繼統揚業亦閔文學錯亂學士若兹雖昭其情猶依違謙讓樂與士君子同之故下明詔試左氏可立不遣近臣奉指銜命將以輔弱扶微樂與二三君子比意同力冀得廢遺今則不然深閉固距而不肯試猥以不誦絶之欲以杜塞餘道絶滅微學夫可與樂成難與慮始此乃衆庶之所為耳非所望士君子也且此數家之事皆先帝所親論今上所考核其古文舊書皆有徴驗外內相應豈茍而已哉夫禮失求之於野古文不猶愈於野乎往者博士書有歐陽春秋公羊易則施孟然孝宣皇帝猶復廣立榖梁春秋梁邱易大小夏侯尚書義雖相反猶並置之何則與其過而廢之也寧過而立之傳曰文武之道未墜於地在人賢者志其大者不賢者志其小者今此數家之言所以兼包大小之義豈可偏絶哉若必專已守殘黨同門妒道真違明詔失聖意以陷於文吏之議甚為二三君子不取也其言甚切諸儒皆怨恨是時名儒光祿大夫龔勝以歆移書上疏深自罪責願乞骸骨罷及儒者師丹為大司空亦大怒奏歆改亂舊章非毁先帝所立上曰歆欲廣道術亦何以為非毁哉歆由是忤執政大臣為衆儒所訕懼誅求出補吏為河內太守以宗室不宜典三河徙守五原後復轉在涿郡歷三郡守數年以病免官起家復為安定屬國都尉會哀帝崩王莽持政莽少與歆俱為黃門郎重之白太后太后留歆為右曹太中大夫遷中壘校尉羲和京兆尹使治明堂辟雍封紅休侯典儒林史卜之官考定律歷著三統歷譜初歆以建平元年改名秀字頴叔河圖赤伏符云劉秀發兵捕不道四夷雲集龍鬭野四七之際火為主故改名冀以應之也及王莽篡位歆為國師後事皆在莽傳高六王高皇帝八男吕后生孝惠帝曹夫人生齊悼惠王肥薄姬生孝文帝戚夫人生趙隱王如意趙姬生淮南厲王長諸姬生趙幽王友趙共王恢燕靈王建淮南厲王長自有傳齊悼惠王肥其母高祖微時外婦也高祖六年立為齊王食七十餘城諸民能齊言者皆與齊孝惠二年入朝帝與齊王燕飲太后前置齊王上坐如家人禮太后怒乃令人酌兩巵鴆酒置前令齊王為壽齊王起帝亦起欲俱為夀太后恐自起反巵齊王怪之因不敢飲陽醉去問知其鴆乃憂自以為不得脫長安內史士曰太后獨有帝與魯元公主今王有七十餘城而公主乃食數城王誠以一郡上太后為公主湯沐邑太后必喜王無憂矣於是齊王獻城陽郡以尊公主為王太后吕太后喜而許之乃置酒齊邸樂飲遣王歸國後十三年薨子襄嗣悼惠王子前後凡九人為王太子襄為齊哀王次子章為城陽景王興居為濟北王將閭為齊王志為濟北王辟光為濟南王賢為災川王卬為膠西王雄渠為膠東王齊哀王襄孝惠六年嗣立明年惠帝崩吕太后稱制元年以其兄子鄜侯吕台為吕王割齊之濟南郡為吕王奉邑明年哀王弟章入宿衛於漢高后封為朱虛侯以吕祿女妻之後四年封章弟興居為東牟侯皆宿衛長安高后七年割齊琅邪郡立營陵侯劉澤為琅邪王是歲趙幽王友幽死于邸三趙王既廢高后立諸吕為三王擅權用事章年二十有氣力忿劉氏不得職嘗入侍燕飲高后令章為酒吏章自稱曰臣將種也請得以軍法行酒髙后曰可酒酣章進歌舞已而曰請為太后言耕田高后兒子畜之笑曰顧乃父知田耳若生而為王子安知田乎章曰臣知之太后曰試為我言田意章曰深耕穊音冀種立苗欲疏非其種者鉏而去之太后默然頃之諸吕有一人醉亡酒章追拔劍斬之而還報曰有亡酒一人臣謹行軍法斬之太后左右皆大驚業已許其軍法亡以罪也因罷酒自是後諸吕憚章雖大臣皆依朱虛侯劉氏為強其明年高后崩趙王吕祿為上將軍吕王産為相國皆居長安中聚兵以威大臣欲為亂章以吕祿女為婦知其謀乃使人陰出告其兄齊王欲令發兵西朱虗東牟欲從中與大臣為內應以誅諸吕因立齊王為帝齊王聞此計與其舅駟鈞郎中令祝午中尉魏勃陰謀發兵齊相召平聞之乃發兵入衛王宫魏勃紿平曰王欲發兵非有漢虎符驗也而相君圍王固善勃請為君將兵衛衛王召平信之乃使魏勃將勃既將以兵圍相府召平曰嗟乎道家之言當斷不斷反受其亂遂自殺於是齊王以駟鈞為相魏勃為將軍祝午為內史悉發國中兵使祝午紿琅邪王劉澤曰吕氏為亂齊王發兵欲西誅之齊王自以兒子年少不習兵革之事願舉國委大王大王自高帝將也習戰事齊王不敢離兵使臣請大王幸之臨災見齊王計事并將齊兵以西平關中之亂琅邪王信之以為然乃馳見齊王齊王與魏勃等因留琅邪王而使祝午盡發琅邪國而并將其兵琅邪王劉澤既見欺不得反國乃説齊王曰齊悼惠王高皇帝長子也推夲言之大王高皇帝適長孫也當立今諸大臣狐疑未有所定而澤於劉氏最為長年大臣固待澤決計今大王留臣無為也不如使我入關計事齊王以為然乃益具車送琅邪王琅邪王既行齊遂舉兵西攻吕國之濟南於是齊王遺諸侯王書曰髙帝平定天下王諸子弟悼惠王薨惠帝使留侯張良立臣為齊王惠帝崩高后用事春秋高聼諸吕擅廢帝更立又殺三趙王滅梁趙燕以王諸吕分齊國為四忠臣進諫上或亂不聼今高后崩皇帝春秋富未能治天下固待大臣諸侯今諸吕又擅自尊官聚兵嚴威劫列侯忠臣矯制以令天下宗廟以危寡人帥兵入誅不當為王者漢聞之相國吕産等遣大將軍潁陰侯灌嬰將兵擊之嬰至滎陽乃謀曰諸吕舉兵關中欲危劉氏而自立今我破齊還報是益吕氏資也乃留兵屯滎陽使人諭齊王及諸侯與連和以待吕氏之變而共誅之齊王聞之乃屯兵西界待約吕祿吕産欲作亂朱虛侯章與太尉勃丞相平等誅之章首先斬吕産太尉勃等乃盡誅諸吕而琅邪王亦從齊至長安大臣議欲立齊王皆曰母家駟鈞惡戾虎而冠者也訪以吕氏故幾亂天下今又立齊王是欲復為吕氏也代王母家薄氏君子長者且代王高帝子於今見在最為長以子則順以善人則大臣安於是大臣乃謀迎代王而遣章以誅吕氏事告齊王令罷兵灌嬰在滎陽聞魏勃夲教齊王反既誅吕氏罷齊兵使使召責問魏勃勃曰失火之家豈暇先言丈人而後救火乎因退立股戰而栗恐不能言者終無他語灌將軍孰視笑曰人謂魏勃勇妄庸人耳何能為乎乃罷勃勃父以善鼓琴見秦皇帝及勃少時欲求見齊相曹參家貧無以自通乃常獨早掃齊相舍人門外舍人怪之以為物而司之得勃勃曰願見相君無因故為子掃欲以求見於是舍人見勃曹參因以為舍人一為參御言事參以為賢言之悼惠王王召見拜為內史始悼惠王得自置二千石及悼惠王薨哀王嗣勃用事重於相齊王既罷兵歸而代王立是為孝文帝文帝元年盡以高后時所割齊之城陽琅邪濟南郡復豫齊而徙琅邪王王燕益封朱虛東牟各二千戶黃金千斤是歲齊哀王薨子文王則嗣十四年薨無子國除城陽景王章孝文二年以朱虗侯與東牟侯興居俱立二年薨子共王喜嗣孝文十二年徙王淮南五年復還王城陽凡立三十四年薨子頃王延嗣二十六年薨子敬王義嗣九年薨子惠王武嗣十一年薨子荒王順嗣四十六年薨子戴王恢嗣八年薨子孝王景嗣二十四年薨子哀王雲嗣一年薨無子國絶成帝復立雲兄俚為城陽王王莽時絶濟北王興居初以東牟侯與大臣共立文帝於代邸曰誅吕氏臣無功請與太僕滕公俱入清宫遂將少帝出迎皇帝入宫始誅諸吕時朱虗侯章功尤大大臣許盡以趙地王章盡以梁地王興居及文帝立聞朱虗東牟之初欲立齊王故黜其功二年王諸子乃割齊二郡以王章興居章興居意以自失職奪功歲餘章薨而胸奴大入邊漢多發兵丞相灌嬰將擊之文帝親幸太原興居以為天子自擊胡遂發兵反上聞之罷兵歸長安使棘蒲侯柴將軍擊破虜濟北王王自殺國除文帝憫濟北王逆亂以自滅明年盡封悼惠王諸子罷軍等七人為列侯至十五年齊文王又薨無子時悼惠王後尚有城陽王在文帝憐悼惠王適嗣之絶於是乃分齊為六國盡立前所封悼惠王子列侯見在者六人為王齊孝王將閭以楊虗侯立濟北王志以安都侯立災川王賢以武城侯立膠東王雄渠以白石侯立膠西王卬以平昌侯立濟南王辟光以扐音勒侯立孝文十六年六王同日俱立立十一年孝景三年吳楚反膠東膠西災川濟南王皆發兵應吳楚欲與齊齊孝王狐疑城守不聼三國兵共圍齊齊王使路中大夫告於天子天子復令路中大夫還報告齊王堅守漢兵今破吳楚矣路中大夫至三國兵圍臨災數重無從入三國將與路中大夫盟曰若反言漢已破矣齊趣下三國不且見屠路中大夫既許至城下望見齊王曰漢已發兵百萬使太尉亞夫擊破吳楚方引兵救齊齊必堅守無下三國將誅路中大夫齊初圍急陰與三國通謀約未定會路中大夫從漢來其大臣乃復勸王無下三國會漢將欒布平陽侯等兵至齊擊破三國兵解齊圍已後聞齊初與三國有謀將欲移兵伐齊孝王懼飲藥自殺而膠東膠西濟南災川王皆伏誅國除獨濟北王在齊孝王之自殺也景帝聞之以為齊首善以迫劫有謀非其罪也召立孝王太子夀是為懿王續齊後二十三年薨子厲王次昌嗣其母曰紀太后太后取其弟紀氏女為王后王不愛紀太后欲其家重寵令其長女紀翁主入王宫正其後宫無令得近王欲令愛紀氏女王因與其姊翁主姦齊有宦者徐甲入事漢皇太后皇太后有愛女曰修成居非劉氏子皇太后前嫁金氏所生女太后憐之修成君有女娥太后欲嫁之於諸侯宦者甲乃請使齊必令王上書請娥皇太后大喜使甲之齊時主父偃知甲之使齊以取后事亦因謂甲即事成幸言偃女願得充王後宫甲至齊風以此事紀太后怒曰王有后後宫備具且甲齊貧人及為宦者入事漢初無補益乃欲亂吾王家且主父偃何為者乃欲以女充後宫甲大窮還報皇太后曰王已願尚娥然事有所害恐如燕王燕王者與其子昆弟姦坐死故以燕感太后太后曰毋復言嫁女齊事事寖淫聞於上主父偃由此與齊有隙偃方幸用事因言齊臨災十萬戶市租千金人衆殷富巨於長安非天子親弟愛子不得王此今齊王於親屬益疏乃從容言吕太后時齊欲反及吳楚時孝王幾為亂今聞齊王與其姊亂於是武帝拜偃為齊相且正其事偃至齊急治王後宫宦者為王通於姊翁主所者辭及王王年少懼以罪為吏所執誅乃飲藥自殺是時趙王懼主父偃一出敗齊恐其漸疏骨肉乃上書言偃受金及輕重之短天子亦因囚偃公孫𢎞曰齊王以憂死無後非誅偃無以塞天下之望偃遂坐誅厲王立五年國除濟北王志吳楚反時初亦與通謀後堅守不發兵故得不誅徙王災川元朔中齊國絶悼惠王後唯有二國城陽災川災川地比齊武帝為悼惠王冢園在齊乃割臨災東圜悼惠王冢園邑盡以豫災川令奉祭祀志立三十五年薨是為懿王子靖王建嗣二十年薨子頃王遺嗣三十五年薨子思王終古嗣五鳯中青州刺史奏終古使所愛奴與八子及諸御婢姦終古或參與被席或白晝使裸伏犬馬交接終古親臨觀産子輒曰亂不可知使去其子事下丞相御史奏終古位諸侯王以令置八子秩比六百石所以廣嗣重祖也而終古禽獸行亂君臣夫婦之别悖逆人倫請逮捕有詔削四縣二十八年薨子考王尚嗣五年薨子孝王橫嗣三十一年薨子懷王交嗣六年薨子永嗣王莽時絶趙隱王如意九年立四年高祖崩吕太后徴王到長安鴆殺之無子絶趙幽王友十一年立為淮陽王趙隱王如意死孝惠元年徙友王趙凡立十四年友以諸吕女為后不愛愛他姬諸吕女怒去讒之於太后曰王曰吕氏安得王太后百歲後吾必擊之太后怒以故召趙王趙王至置邸不見令衛圍守之不得食其羣臣或竊饋之輒捕論之趙王餓乃歌曰諸吕用事兮劉氏微迫脅王侯兮強授我妃我妃既妒兮誣我以惡讒女亂國兮上曾不寤我無忠臣兮何故棄國自快中野兮蒼天與直于嗟不可悔兮寧早自賊為王餓死兮誰者憐之吕氏絶理兮託天報仇遂幽死以民禮葬之長安高后崩孝文即位立幽王子遂為趙王二年有司請立皇子為王上曰趙幽王幽死朕甚憐之已立其長子遂為趙王遂弟辟強及齊悼惠王子朱虗侯章東牟侯興居有功皆可王於是取趙之河間立辟強是為河間文王文王立十三年薨子哀王福嗣一年薨無子國除趙王遂立二十六年孝景時鼂錯以過削趙常山郡諸侯怨吳楚反遂與合謀起兵其相建德內史王悍諫不聼遂燒殺德悍發兵住其西界欲待吳楚俱進北使胸奴與連和漢使曲周侯酈寄擊之趙王城守邯鄲相距七月吳楚敗胸奴聞之亦不肯入邊欒布自破齊還并兵引水灌趙城城壞王遂自殺國除景帝憐趙相內史守正死皆封其子為列侯趙共王恢十一年梁王彭越誅立恢為梁王十六年趙幽王死吕后徙恢王趙恢心不樂太后以吕産女為趙王后王后從官皆諸吕也內擅權微司趙王王不得自恣王有愛姬王后鴆殺之王乃為歌詩四章令樂人歌之王悲思六月自殺太后聞之以為用婦人故自殺無思奉宗廟禮廢其嗣燕靈王建十一年燕王盧綰亡入胸奴明年立建為燕王十五年薨有美人子太后使人殺之絶後淮南厲王長高帝少子也其母故趙王張敖美人高帝八年從東垣過趙趙王獻美人幸而有身趙王不敢內宫為築外宫舍之及貫髙等謀反事覺并逮治王盡捕王母兄弟美人繫之河內厲王母亦繫告吏曰日得幸上有子吏以聞上方怒趙王未及理厲王母厲王母弟趙兼因辟陽侯言吕后吕后妬不肯白辟陽侯不強爭厲王母已生厲王恚即自殺吏奉厲王詣上上悔令吕后母之而葬其母真定真定厲王母家縣也十一年淮南王布反上自擊滅布即立子長為淮南王王早失母常附吕后孝惠吕后時以故得幸無患然常心怨辟陽侯不敢發及孝文初即位自以為最親驕蹇數不奉法上寬赦之三年入朝甚橫從上入苑獵與上同輦常謂上大兄厲王有材力力扛鼎乃往請辟陽侯辟陽侯出見之即自褎金椎椎之命從者刑之馳詣闕下肉袒而謝曰臣母不當坐趙時事辟陽侯力能得之吕后不爭罪一也趙王如意子母無罪吕后殺之辟陽侯不爭罪二也吕后王諸吕欲以危劉氏辟陽侯不爭罪三也臣謹為天下討賊報母之仇伏闕下請罪文帝傷其志為親故不治赦之當是時自薄太后及太子諸大臣皆憚厲王厲王以此歸國益恣不用漢法出入警蹕稱制自作法令數上書不遜順文帝重自切責之時帝舅薄昭為將軍尊重上令昭豫厲王書諫數之曰竊聞大王剛直而勇慈惠而厚貞信多斷是天以聖人之資奉大王也甚盛不可不察今大王所行不稱天資皇帝初即位易侯邑在淮南者大王不肯皇帝卒易之使大王得三縣之實甚厚大王以未嘗與皇帝相見求入朝見未畢昆弟之歡而殺列侯以自為名皇帝不使吏與其間赦大王甚厚法二千石缺輒言漢補大王逐漢所置而請自置相二千石皇帝骫天下正法而許大王甚厚大王欲屬國為布衣守冢真定皇帝不許使大王毋失南面之尊甚厚大王宜日夜奉法度修貢職以稱皇帝之厚德今乃輕言恣行以負謗於天下甚非計也夫大王以千里為宅居以萬民為臣妾此髙皇帝之厚德也髙帝蒙霜露沐風雨赴矢石野戰攻城身被創痍以為子孫成萬世之業艱難危苦甚矣大王不思先帝之囏苦日夜怵惕修身正行養犧牲豐粢盛奉祭祀以無忘先帝之功德而欲屬國為布衣甚過且夫貪讓國土之名輕廢先帝之業不可以言孝父為之基而不能守不賢不求守長陵而求之真定先母後父不誼數逆天子之令不順言節行以髙兄無禮幸臣有罪大者立斷小者肉刑不仁貴布衣一劍之任賤王侯之位不知不學問大道觸情妄行不祥此八者危亡之路也而大王行之棄南面之位奮諸賁之勇常出入危亡之路臣之所見髙皇帝之神必不廟食於大王之手明白昔者周公誅管叔放蔡叔以安周齊桓殺其弟以反國秦始皇殺兩弟遷其母以安秦頃王亡代髙帝奪之國以便事濟北舉兵皇帝誅之以安漢故周齊行之於古秦漢用之於今大王不察古今之所以安國便事而欲以親戚之意望於太上不可得也亡之諸侯遊宦事人及舍匿者論皆有法其在王所吏主者坐今諸侯子為吏者御史主為軍吏者中尉主客出入殿門者衛尉大行主諸從蠻夷來歸誼及以亡名數自占者內史縣令主相欲委下吏無與其禍不可得也王若不改漢繫大王邸論相以下為之奈何夫墮父大業退為布衣所哀幸臣皆伏法而誅為天下笑以羞先帝之德甚為大王不取也宜急改操易行上書謝罪曰臣不幸早失先帝少孤吕氏之世未嘗忘死陛下即位臣怙恩德驕盈行多不軌追念罪過恐懼伏地待誅不敢起皇帝聞之必喜大王昆弟歡欣於上羣臣皆得延壽於下上下得宜海內常安願孰計而疾行之行之有疑禍如發矢不可追已王得書不説六年令男子但等七十人與棘蒲侯柴武太子竒謀以輦車四十乘反谷口令人使閩越胸奴事覺治之乃使使召淮南王王至長安丞相張蒼典客馮敬行御史大夫事與宗正廷尉雜奏長廢先帝法不聼天子詔居處無度為黃屋蓋擬天子擅為法令不用漢法及所置吏以其郎中春為丞相收聚漢諸侯人及有罪亡者匿與居為治家室賜與財物爵祿田宅爵或至關內侯奉以二千石所當得大夫但士伍開章等七十人與棘蒲侯太子竒謀反欲以危宗廟社稷謀使閩越及胸奴發其兵事覺長安尉竒等往捕開章長匿不豫與故中尉蕳忌謀殺以閉口為棺槨衣衾葬之肥陵謾吏曰不知安在又陽聚土樹表其上曰開章死葬此下及長身自賊殺無罪者一人令吏論殺無罪者六人為亡命棄市詐捕命者以除罪擅罪人無告劾繫治城旦以上十四人赦免罪人死罪十八人城旦舂以下五十八人賜人爵關內侯以下九十四人前日長病陛下心憂之使使者賜棗脯長不肯見拜使者南海民處廬江界中者反淮南吏卒擊之陛下遣使齎帛五十匹以賜吏卒勞苦者長不欲受賜謾曰無勞苦者南海王織上書獻璧帛皇帝忌擅燔其書不以聞忌即上蕳忌也吏請詔治忌長不遣謾曰忌病長所犯不軌當棄市臣請論如法制曰朕不忍置法於王其與列侯吏二千石議列侯吏二千石臣嬰等四十三人議皆曰宜論如法制曰其赦長死罪廢勿王有司奏請處蜀郡嚴道卬郵遣其子子母從居縣為築蓋家室皆日三食給薪萊鹽炊食器席蓐制曰食長給肉日五斤酒二斗令故美人材人得幸者十人從居於是盡誅所與謀者乃遣長載以輜車令縣次傳爰盎諫曰上素驕淮南王不為置嚴相傅以故至此且淮南王為人剛今暴摧折之臣恐其逢霧露病死陛下有殺弟之名奈何上曰吾特苦之耳令復之淮南王謂侍者曰誰謂乃公勇者吾以驕不聞過故至此乃不食而死縣傳者不敢發車封至雍雍令發之以死聞上悲哭謂爰盎曰吾不從公言卒亡淮南王盎曰淮南王不可奈何願陛下自寬上曰為之奈何曰獨斬丞相御史以謝天下乃可上即令丞相御史逮諸縣傳淮南王不發封餽侍者皆棄市乃以列侯禮葬淮南王于雍置守冢三十家孝文八年憐淮南王王有子四人年皆七八嵗乃封子安為阜陵侯子勃為安陽侯子賜為陽周侯子良為東城侯十二年民有作歌歌淮南王曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容上聞之曰昔堯舜放逐骨肉周公殺管蔡天下稱聖何者不以私害公天下豈以為我貪淮南地邪乃徙城陽侯王淮南王故地而追尊諡淮南王為厲王置園如諸侯儀十六年上憐淮南王廢法不軌自使失國早夭乃徙淮南王喜復王故城陽而立厲王三子王淮南王故地三分之阜陵侯安為淮南王安陽侯勃為衡山王陽周侯賜為廬江王東城侯良前薨無後孝景三年吳楚七國反吳使者至淮南王欲發兵應之其相曰王必欲應吳臣願為將王乃屬之相已將兵因城守不聼王而為漢漢亦使曲城侯將兵救淮南淮南以故得完吳使者至廬江廬江王不應而往來使越至衡山衡山王堅守無二心孝景四年吳楚已破衡山王朝上以為貞信乃勞苦之曰南方卑濕徙王王於濟北以褒之及薨遂賜諡為貞王廬江王以邉越數使使相交徙為衡山王王江北淮南王安為人好書鼓瑟不喜弋獵狗馬馳騁亦欲以行陰德拊循百姓流名譽招致賔客方術之士數千人作為內書二十一篇外書甚衆又有中篇八卷言神仙黃白之術亦二十餘萬言時武帝方好藝文以安屬為諸父辨博善為文辭甚尊重之每為報書及賜常召司馬相如等視草乃遣初安入朝獻所作內篇新出上愛祕之使為離騷傳旦受詔日食時上又獻頌德及長安都國頌每宴見談説得失及方技賦頌昏暮然後罷安初入朝雅善太尉武安侯蚡蚡迎之霸上與語曰方今上無太子王親髙皇帝孫行仁義天下莫不聞宫車一日晏駕非王尚誰立者淮南王大喜厚遺武安侯寶賂其羣臣賔客江淮間多輕薄以厲王遷死感激安建元六年彗星見淮南王心怪之或説王曰先吳軍起時彗星出長數尺然尚流血千里今慧星竟天天下兵當大起王心以為上無太子天下有變諸侯並爭愈益治攻戰具積金錢賂遺郡國遊士妄作妖言阿諛王王喜多賜豫之王有女陵慧有口王愛陵多豫金錢為中詗長安約結上左右元朔二年上賜淮南王几杖不朝后荼愛幸生子遷為太子取皇太后外孫修成君女為太子妃王謀為反具畏太子妃知而內泄事乃與太子謀令詐不愛三月不同席王陽怒太子閉使與妃同內終不近妃妃求去王乃上書謝歸之后荼太子遷及女陵擅國權奪民田宅妄致繫人太子學用劍自以為人莫及聞郎中雷被巧召與戲被一再辭讓誤中太子太子怒被恐此時有欲從軍者輒詣長安被即願奮擊胸奴太子數惡被王使郎中令斥免欲以禁後元朔五年被遂亡之長安上書自明事下廷尉河南河南治逮淮南太子王王后計欲毋遣太子遂發兵計未定猶與十餘日會有詔即訊太子淮南相怒壽春丞留太子逮不遣劾不敬王請相相不聼王使人上書告相事下廷尉治從迹連王王使人候司漢公卿請逮捕治王王恐欲發兵太子遷謀曰漢使即逮王令人衣衛士衣持戟居王旁有非是者即刺殺之臣亦使人刺殺淮南中尉乃舉兵未晚也是時上不許公卿而遣漢中尉宏即訊驗王王視漢中尉顔色和問斥雷被事耳自度無何不發中尉還以聞公卿治者曰淮南王安雍閼求奮擊胸奴者雷被等格明詔當棄市詔不許請廢勿王上不許請削五縣可二縣使中尉宏赦其罪罰以削地中尉入淮南界宣言赦王王初聞公卿請誅之未知得削地聞漢使來恐其捕之乃與太子謀如前計中尉至即賀王王以故不發其後自傷曰吾行仁義見削地寡人甚耻之為反謀益甚諸侯使者道長安來為妄言言上無男即喜言漢廷治有男即怒以為妄言非也日夜與左吳等按輿地圖部署兵所從入王曰上無太子宫車即晏駕大臣必徴膠東王不即常山王諸侯並爭吾可以無備乎且吾髙帝孫親行仁義陛下遇我厚吾能忍之萬世之後吾寧能北面事豎子乎王有孽子不害最長王不愛后與太子遷皆不以為子兄數不害子建材髙有氣常怨望太子不省其父時諸侯皆得分子弟為侯淮南王有兩子一子為太子而建父不得為侯陰結交欲害太子以其父代之太子知之數捕繫笞建建具知太子之欲謀殺漢中尉乃使所善壽春嚴正上書告太子陰事引建為徴書既聞上以其事下廷尉河南治是歲元朔六年也故辟陽侯孫審卿善丞相公孫𢎞怨淮南厲王殺其大父陰求淮南事而搆之於𢎞𢎞乃疑淮南有畔逆計深探其獄河南治建辭引太子及黨與初王數以舉兵謀問伍被被常諫之以吳楚七國為效王引陳勝吳廣被復言形藝不同必敗亡及建見治王恐國隂事泄欲發復問被被為言發兵權變語在被傳於是王鋭欲發乃令官奴入宫中作皇帝璽丞相御史大夫將軍吏中二千石都官令丞印及旁近郡太守都尉印漢使節法冠欲如伍被計使人偽得罪而西事大將軍丞相一日發兵即刺大將軍衛青而説丞相𢎞下之如發蒙耳王欲發國中兵恐相二千石不聼乃與伍被謀為失火宫中相二千石救火因殺之又欲令人衣求盜衣持羽檄從南方來呼言曰南越兵入欲因以發兵乃使人之廬江會稽為求盜未決廷尉以建辭連太子遷聞上遣廷尉監與淮南中尉逮捕太子至淮南王聞與太子謀召相二千石欲殺而發兵召相相至內史以出為解中尉曰臣受詔使不得見王王念獨殺相而內史中尉不來無益也即罷相計猶與未決太子念所坐者謀殺漢中尉所與謀殺者已死以為口絶乃謂王曰羣臣可用者皆前繫今無足與舉事者王以非時發恐無功臣願會逮王亦愈欲休即許太子太子自刑不殊伍被自詣吏具告與淮南王謀反吏因捕太子王后圍王宫盡捕王賔客在國中者素得反具以聞上下公卿治所連引與淮南王謀反列侯二千石豪桀數千人皆以罪輕重受誅衡山王賜淮南王弟當坐收有司請逮捕衡山王上曰諸侯各以其國為夲不當相坐與諸侯王列侯議趙王彭祖列侯讓等四十三人皆曰淮南王安大逆無道謀反明白當伏誅膠西王端議曰安廢法度行邪辟有詐偽心以亂天下營惑百姓背畔宗廟妄作妖言春秋曰臣毋將將而誅安罪重於將謀反形已定臣端所見其書印圖及他逆亡道事驗明白當伏法論國吏二百石以上及比者宗室近幸臣不在法中者不能相教皆當免削爵為士伍毋得官為吏其非吏他贖死金二斤八兩以章安之罪使天下明知臣子之道毋敢復有邪僻背畔之意丞相𢎞廷尉湯等以聞上使宗正以符節治王未至安自刑殺后太子諸所與謀皆收夷國除為九江郡衡山王賜后乘舒生子三人長男爽為太子次女無采少男孝姬徐來生子男女四人美人厥姬生子二人淮南衡山相責望禮節間不相能衡山王聞淮南王作為畔逆具亦心結賔客以應之恐為所并元光六年入朝謁者衛慶有方術欲上書事天子王怒故劾慶死罪強榜服之內史以為非是郤其獄王使人上書告內史內史治言王不直又數侵奪人田壞人冢以為田有司請逮治衡山王上不許為置吏二百石以上衡山王以此恚與奚慈張廣昌謀求能為兵法候星氣者日夜縱臾王謀反事后乘舒死立徐來為后厥姬俱幸兩人相妬厥姬乃惡徐來於太子曰徐來使婢蠱殺太子母太子心怨徐來徐來兄至衡山太子與飲以刃刑傷之后以此怨太子數惡之於王女弟無采嫁棄歸與客姦太子數以數讓之無采怒不與太子通后聞之即善遇無采及孝孝少失母附后后以計愛之與共毁太子王以故數繫笞太子元朔四年中人有賊傷后假母者王疑太子使人傷之笞太子後王病太子時稱病不侍孝無采惡太子實不病自言有喜色王於是大怒欲廢太子而立弟孝后知王決廢太子又欲并廢孝后有侍者善舞王幸之后欲令與孝亂以汚之欲并廢二子而以已子廣代之太子知之念后數惡已無已時欲與亂以止其口后飲太子太子前為壽因據后股求與卧后怒以告王王乃召欲縳笞之太子知王常欲廢已而立孝乃謂王曰孝與王御者姦無采與奴姦王強食請上書即背王去王使人止之莫能禁王乃自追捕太子太子妄惡言王械繫宫中孝日益以親幸王竒孝材能乃佩之王印號曰將軍令居外家多給金錢招致賔客賔客來者微知淮南衡山有逆計皆將養勸之王乃使孝客江都人枚赫陳喜作輣車煆矢刻天子璽將相軍吏印王日夜求壯士如周邱等數稱引吳楚反時畫計約束衡山王非敢效淮南王求即天子位畏淮南起并其國以為淮南已西發兵定江淮間而有之望如是元朔五年秋當朝六年過淮南淮南王乃昆弟語除前隙約束反具衡山王即上書謝病上賜不朝乃使人上書請廢太子爽立孝為太子爽聞即使所善白嬴之長安上書言衡山王與子謀逆言孝作兵車煆矢與王御者姦至長安未及上書即吏捕嬴以淮南事繫王聞之恐其言國陰事即上書告太子以為不道事下沛郡治元狩元年冬有司捕求與淮南王謀反者得陳喜於孝家吏劾孝首匿喜孝以為陳喜雅數與王計反恐其發之聞律先自告除其罪又疑太子使白嬴上書發其事即先自告所與謀反者枚赫陳喜等廷尉治事驗請逮捕衡山王治上曰勿捕遣中尉安大行息即問王王具以情實對吏皆圍王宫守之中尉大行還以聞公卿請遣宗正大行與沛郡雜治王王聞即自殺孝先自告反告除其罪孝坐與王御婢姦及后徐來坐蠱前后乘舒及太子爽坐告王父不孝皆棄市諸坐與王謀反者皆誅國除為郡濟北貞王勃景帝四年徙徙二年因前王衡山凡十四年薨子式王胡嗣五十四年薨子寬嗣十二年寬坐與父式王后光姬孝兒姦悖人倫又祠祭祝詛上有司請誅上遣大鴻臚利召王王以刃自剄死國除為北安縣屬泰山郡通志卷七十八上
