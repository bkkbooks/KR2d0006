body:
  text: 通志卷七十一宋右廸功郎鄭樵漁仲撰校讎略第一秦不絶儒學論二篇陸賈秦之巨儒也酈食其秦之儒生也叔孫通秦時以文學召待詔博士數嵗陳勝起二世召博士諸儒生三十餘而問其故皆引春秋之義以對是則秦時未嘗不用儒生與經學也况叔孫通降漢時自有弟子百餘人齊魯之風亦未甞替故項羽既亡之後而魯為守節禮義之國則知秦時未甞廢儒而始皇所阬者盖一時議論不合者耳蕭何入咸陽收秦律令圖書則秦亦未甞無書籍也其所焚者一時間事耳後世不明經者皆歸之秦火使學者不覩全書未免乎疑以𫝊疑然則易固為全書矣何甞見後世有明全易之人㢤臣向謂秦人焚書而書存諸儒窮經而經絶盖為此發也詩有六亡篇乃六笙詩本無辭書有逸篇仲尼之時已無矣皆不因秦火自漢已来書籍至于今日百不存一二非秦人亡之也學者自亡之耳編次必謹類例論六篇學之不専者為書之不眀也書之不明者為類例之不分也有専門之書則有専門之學有専門之學則有世守之能人守其學學守其書書守其類人有存沒而學不息世有變故而書不亡以今之書校古之書百無一存其故何㢤士卒之亡者由部伍之法不明也書籍之亡者由類例之法不分也類例分則百家九流各有條理雖亡而不能亡也巫醫之學亦經存沒而學不息釋老之書亦經變故而書常存觀漢之易書甚多今不𫝊惟卜筮之易傳法家之書亦多今不傳惟釋老之書𫝊彼異端之學能全其書者専之謂矣十二野者所以分天之綱即十二野不可以明天九州者所以分地之紀即九州不可以明地七略者所以分書之次即七略不可以明書欲明天者在於明推歩欲明地者在於明逺邇欲明書者在於明類例噫類例不眀圖書失紀有自来矣臣於是捴古今有無之書為之區别凡十二類經類第一禮類第二樂類第三小學類第四史類第五諸子類第六星數類第七五行類第八藝術類第九醫方類第十類書類第十一文類第十二經一類分九家九家有八十八種書以八十八種書而捴為九種書可乎禮一類分七家七家有五十四種書以五十四種書而搃為七種書可乎樂一類為一家書十一種小學一類為一家書八種史一類分十三家十三家為書九十種朝代之書則以朝代分非朝代書則以類聚分諸子一類分十一家其八家為書八種道釋兵三家書差多為四十種星數一類分三家三家為書十五種五行一類分三十家三十家為書三十三種藝術一類為一家書十七種醫方一類為一家書二十六種類書一類為一家分上下二種文類一類分二家二十二種别集一家為十九種書餘二十一家二十一種書而已捴十二類百家四百二十二種朱紫分矣散四百二十二種書可以窮百家之學歛百家之學可以明十二類之所歸易本一類也以數不可合於圖圖不可合於音䜟緯不可合於𫝊注故分為十六種詩本一類也以圖不可合於音音不可合於譜名物不可合於詁訓故分為十二種禮雖一類而有七種以儀禮雜於周官可乎春秋雖一類而有五家以啖趙雜於公榖可乎樂雖主於音聲而歌曲與管絃異事小學雖主於文字而字書與韻書背馳編年一家而有先後文集一家而有合離日月星辰豈可與風雲氣候同為天文之學三命元辰豈可與九宫太一同為五行之書以此觀之七略所分自為茍簡四庫所部無乃繁博類書猶持軍也若有條理雖多而治若無條理雖寡而紛類例不患其多也患處多之無術耳今所紀者欲以紀百代之有無然漢晉之書最為希闊故稍略隋唐之書於今為近故差詳崇文四庫及民間之藏乃近代之書所當一一載也類例既分學術自明以其先後本末具在觀圖譜者可以知圖譜之所始觀名數者可以知名數之相承䜟緯之學盛於東都音韻之書𫝊於江左傳注起於漢魏義疏成於隋唐覩其書可以知其學之源流或舊無其書而有其學者是為新出之學非古道也編次必記亡書論三篇古人編書皆記其亡闕所以仲尼定書逸篇具載王儉作七志已又條劉氏七略及二漢藝文志魏中經簿所闕之書為一志阮孝緒作七録已亦條劉氏七略及班固漢志袁山松後漢志魏中經晉四部所亡之書為一録隋朝又記梁之亡書自唐以前書籍之富者為亡闕之書有所系故可以本所系而求所以書或亡於前而備於後不出於彼而出於此及唐人收書只記其有不記其無是致後人失其名系所以崇文四庫之書比於隋唐亡書甚多而古書之亡尤甚焉古人亡書有記故本所記而求之魏人求書有闕目録一卷唐人求書有搜訪圖書目一卷所以得書之多也闕下詔并書目一卷惜乎行之不逺一卷之目亦無𫝊焉臣今所作羣書㑹紀不惟簡别類例亦所以廣古今而無遺也古人編書必究本末上有源流下有沿襲故學者亦易學求者亦易求謂如隋人於厯一家最為詳明凡作厯者㡬人或先或後有因有革存則俱存亡則俱亡唐人不能記亡書然猶紀其當代作者之先後必使具在而後己及崇文四庫有則書無則否不惟古書難求雖今代憲章亦不備書有名亡實不亡論一篇書有亡者有雖亡而不亡者有不可以不求者有不可求者文言略例雖亡而周易具在漢魏吴晉鼓吹曲雖亡而樂府具在三禮目錄雖亡可取諸三禮十三代史目錄雖亡可取諸十三代史常鼎寳文選著作人名目錄雖亡可取諸文選孫玉汝唐列聖實録雖亡可取諸唐實錄開元禮目録雖亡可取諸開元禮名醫别錄雖亡陶隠居已收入本草李氏本草雖亡唐慎微已收入證類春秋括甲子雖亡不過起隠公至哀公甲子耳韋嘉年號錄雖亡不過起漢後元至唐中和年號耳續唐厯雖亡不過起續栁芳所作至唐之末年亦猶續通典續杜佑所作至宋初也毛詩蟲魚草木圖盖本陸璣疏而為圖今雖亡有陸璣疏在則其圖可圖也爾雅圖盖本郭璞注而為圖今雖亡有郭璞注在則其圖可圖也張頻禮粹出於崔靈恩三禮義宗有崔靈恩三禮義宗則張頻禮粹為不亡五服志出於開元禮有開元禮則五服志為不亡有杜預春秋公子譜無顧啓期大夫譜可也有洪範五行𫝊無春秋災異應録可也丁副春秋三𫝊同異字可見於杜預釋例陸淳纂例京相璠春秋土地名可見於杜預地名譜桑欽水經李騰説文字源不離説文經典分毫正字不離佩觽李舟切韻乃取説文而分聲天寳切韻即開元文字而為韻内外轉歸字圖内外𫝊鈴指歸圖切韻樞之類無不見於韻海鏡源書評書論書品書訣之類無不見於法書苑墨藪唐人小説多見於語林近代小説多見於集説天文横圖圓圖分野圖紫微圖象度圖但一圖可該大象賦小象賦周髀星述四七長短經劉石甘巫占但一書可備開元占經象應騐錄之類即古今通占鑑乾象新書可以見矣李氏本草拾遺刪繁本草徐之才藥對南海藥譜藥林藥論藥忌之書證類本草收之矣肘後方鬼遺方獨行方一致方及諸古方之書外臺秘要太平聖恵方中盡收之矣紀元之書亡者甚多不過紀運圖厯代圖可見其略編年紀事之書亡者甚多不過通厯帝王厯數圖可見其略凡此之類名雖亡而實不亡者也編次失書論五篇書之易亡亦由校讎之人失職故也盖編次之時失其名帙名帙既失書安得不亡也按唐志於天文類有星書無日月風雲氣候之書豈有唐朝而無風雲氣候之書乎編次之時失之矣按崇文目有風雲氣候書無日月之書豈有宋朝而無日月之書乎編次之時失之矣四庫書目並無此等書而以星禽洞微之書列於天文且星禽洞微五行之書也何與於天文射覆一家於漢有之世有其書唐志崇文目並無何也軌革一家其来舊矣世有其書唐志崇文目並無四庫始收入五行類醫方類自有炮灸一家書而隋唐二志並無何也人倫之書極多唐志只有袁天綱七卷而已婚書極多唐志只有一部崇文只有一卷而已四庫全不收見名不見書論二篇編書之家多是茍且有見名不見書者有㸔前不㸔後者尉繚子兵書也班固以為諸子類寘於雜家此之謂見名不見書隋唐因之至崇文目始入兵書類顔師古作刋謬正俗乃雜記經史惟第一篇説論語而崇文目以為論語類此之謂㸔前不㸔後應知崇文所釋不㸔全書多只㸔帙前數行率意以釋之耳按刋謬正俗當入經解類按漢朝駮議諸王奏事魏臣奏事魏臺詔議南臺奏事之類隋人編入刑法者以隋人見其書也若不見其書即其名以求之安得有刑法意乎按唐志見其名為奏事直以為故事也編入故事類况古之所謂故事者即漢之章程也異乎近人所謂故事者矣是之謂見名不見書按周易參同契三卷周易五相類一卷爐火之書也唐志以其取名於周易則以為卜筮之書故入周易卜筮類此亦謂見名不見書收書之多論一篇臣甞見鄊人方氏望壺樓書籍頗多問其家乃云先人守無為軍日就一道士𫝊之尚不能盡其書也如唐人文集無不備又甞見浮屠慧邃收古人簡牘宋朝自開國至崇觀間凡是名臣及髙僧筆迹無不備以一道士能備一唐朝之文集以一僧能備一宋朝之筆迹况於堂堂天府而不能盡天下之圖書乎患不求耳然觀國家向日文物全盛之時猶有遺書民間所有秘府所無者甚多是求之道未至耳闕書備於後世論一篇古之書籍有不足於前朝而足於後世者觀唐志所得舊書盡梁書卷帙而多於隋盖梁書至隋所失已多而卷帙不全者又多唐人按王儉七志阮孝緒七錄搜訪圗書所以卷帙多於隋而復有多於梁者如陶潜集梁有五卷隋有九卷唐乃有二十卷諸書如此者甚多孰謂前代亡書不可備於後代乎亡書出於後世論一篇古之書籍有不出於當時而出於後代者按蕭何律令張蒼章程漢之大典也劉氏七略班固漢志全不收按晉之故事即漢章程也有漢朝駮議三十卷漢名臣奏議三十卷並為章程之書至隋唐猶存奈何闕於漢乎刑統之書本於蕭何律令厯代増修不失故典豈可闕於當時乎又况兵家一類任宏所編有韓信軍法三篇廣武一篇豈有韓信軍法猶在而蕭何律令張蒼章程則無之此劉氏班氏之過也孔安國舜典不出於漢而出於晉連山之易不出於隋而出於唐應知書籍之亡者皆校讎之官失職矣亡書出於民間論一篇古之書籍有上代所無而出於今民間者古文尚書音唐世與宋朝並無今出於漳州之呉氏陸機正訓隋唐二志並無今出於荆州之田氏三墳自是一種古書至熙豐間始出於野堂村校按漳州吴氏書目算術一家有數件古書皆三館四庫所無者臣已收入求書類矣又師春二卷甘氏星經二卷漢官典儀十卷京房易鈔一卷今世之所𫝊者皆出吳氏應知古書散落人間者可勝計㢤求之之道未至耳求書遣使校書久任論一篇求書之官不可不遣校書之任不可不専漢除挟書之律開獻書之路久矣至成帝時遣謁者陳農求遺書於天下遂有七略之藏隋開皇間竒章公請分遣使人搜訪異本後嘉則殿藏書三十七萬卷禄山之變尺簡無存乃命苗發等使江淮括訪至文宗朝遂有十二庫之書唐之季年猶遣監察御史諸道搜求遺書知古人求書欲廣必遣官焉然後山林藪澤可以無遺司馬遷世為史官劉向父子校讎天祿虞世南顔師古相繼為祕書監令孤徳棻三朝當修史之任孔頴逹一生不離學校之官若欲圖書之備文物之興則校讎之官豈可不久其任㢤求書之道有八論九篇求書之道有八一曰即類以求二曰旁類以求三曰因地以求四曰因家以求五曰求之公六曰求之私七曰因人以求八曰因代以求當不一於所求也凡星厯之書求之靈臺郎樂律之書求之太常樂工靈臺所無然後訪民間之知星厯者太常所無然後訪民間之知音律者眼目之方多眼科家或有之疽痬之方多外醫家或有之紫堂之書多亡世有𫝊紫堂之學者九曜之書多亡世有𫝊九星之學者列仙𫝊之類道藏可求此之謂即類以求凡性命道徳之書可以求之道家小學文字之書可以求之釋氏如素履子元真子尹子鬻子之類道家皆有如倉頡篇龍龕手鑑郭迻音訣圖字母之類釋氏皆有周易之書多藏於卜筮家洪範之書多藏於五行家且如邢璹周易略例正義今道藏有之亰房周易飛伏例卜筮家有之此之謂旁類以求孟少主實錄蜀中必有王審知𫝊閩中必有零陵先賢𫝊零陵必有桂陽先賢贊桂陽必有京口記者潤州記也東陽記者婺州記也茅山記必見於茅山觀神光聖迹必見於神光寺如此之類可因地以求錢氏慶系圗可求於忠懿王之家章氏家譜可求於申公之後黄君俞尚書闗言雖亡君俞之家在興化王棐春秋講義雖亡棐之家在臨漳徐寅文賦今莆田有之以其家在莆田潘佑文集今長樂有之以其後居長樂如此之類可因家以求禮儀之書祠祀之書斷獄之書官制之書版圖之書今官府有不經兵火處其書必有存者此謂求之公書不存於秘府而出於民間者甚多如漳州呉氏其家甚微其官甚卑然一生文字間至老不休故所得之書多蓬山所無者兼藏書之家例有兩目録所以示人者未甞載異書若非與人盡誠盡禮彼肯出其所秘乎此謂求之私鄉人李氏曽守和州其家或有沈氏之書前年所進褚方囬清慎帖䝉賜百匹兩此則沈家舊物也鄉人陳氏甞為湖北監司其家或有田氏之書臣甞見其有荆州田氏目録若迹其官守知所由来容或有焉此謂因人以求胡旦作演聖通論余靖作三史刋誤此等書卷帙雖多然流行於一時實近代之所作書之難求者為其久逺而不可迹也若出近代人之手何不可求之有此謂因代而求編次之訛論十五篇隋志所類無不當理然亦有錯收者諡法三部已見經解類矣而汝南君諡議又見儀注何也後人更不考其錯誤而復因之按唐志經解類已有諡法復於儀注類出魏晉諡議盖本隋志一類之晝當集在一處不可有所間也按唐志諡法見於經解一類而分為兩處置四庫書目以入禮類亦分為兩也唐志於儀注類中有玉璽國寳之書矣而於𫝊記類中復出此二書四庫書目既立命書類而三命五命之書復入五行卜筮類遁甲一種書耳四庫書目分而為四類兵書見之五行卜筮又見之壬課又見之命書又見之既立壬課類則遁甲書當𨽻壬課類中月令乃禮家之一類以其書之多故為専類不知四庫書目如何見於禮類又見於兵家又見於農家又見於月鑑按此宜在嵗時類太元經以諱故崇文改為太真今四庫書目分太元太真為兩家書貨泉之書農家類也唐志以顧烜錢譜列於農至於封演錢譜又列於小説家此何義㢤亦恐是誤耳崇文四庫因之並以貨泉為小説家書正猶班固以太元為揚雄所作而列於儒家後人因之遂以太元一家之書為儒家類是故君子重始作若始作之訛則後人不復能反正也有厯學有算學隋志以厯數為主而附以算法雖不别條自成兩類後人始分厯數為兩家不知唐志如何以厯與算二種之書相濫為一雖曰厯算同歸乎數各自名家李延夀南北史唐志類於集史是崇文類於雜史非吳紀九卷唐志類於編年是隋志類於正史非海宇亂離志唐志類於雜史是隋志類於編年非唐藝文志與崇文總目既以外丹煆法為道家書矣奈何藝文又於醫術中見太清神丹經諸丹藥數條崇文又於醫書中見伏火丹砂通元祕訣數條大抵爐火與服餌兩種向来道家與醫家雜出不獨藝文與崇文雖隋志亦如此臣今分為兩類列於道家庶無雜揉嵗時自一家書如嵗時廣記百十二卷崇文捴目不列於嵗時而列於類書何也類書者謂捴衆類不可分也若可分之書當入别類且如天文有類書自當列天文類職官有類書自當列職官類豈可以為類書而捴入類書類乎諫疏時政論與君臣之事隋唐志並入雜家臣今析出按此當入儒家大抵隋唐志於儒雜二家不分古今編書所不能分者五一曰傳記二曰雜家三曰小説四曰雜史五曰故事凡此五類之書足相紊亂又如文史與詩話亦能相濫凡編書每一類成必計卷帙于其後如何唐志於集史計卷而正史不計卷實錄與詔令計卷而起居注不計卷凡書計卷帙皆有空别唐志無空别多為抄寫所移隋志最可信緣分類不考故亦有重複者嘉瑞記祥瑞記二書既出雜𫝊又出五行諸葛武侯集誡衆賢誡曹大家女誡正順志娣姒訓女誡女訓凡數種書既出儒類又出捴集衆僧𫝊髙僧𫝊梁皇大捨記法藏目錄元門寳海等書既出雜𫝊又出雜家如此三種實由分類不明是致差互若廼陶𢎞景天儀説要天文類中兩出趙政甲寅元厯序厯數中兩出黄帝飛鳥厯與海中仙人占災祥書五行類中兩出庾季才地形志地理類中兩出凡此五書是不校勘之過也以隋志尚且如此後来編書出於衆手不經校勘者可勝道㢤於是作書目正訛崇文明於兩類論一篇崇文總目衆手為之其間有兩類極有條理古人不及後来無以復加也道書一類有九節九節相屬而無雜揉又雜史一類雖不標别然分上下二卷即為二家不勝冗濫及覩崇文九節正所謂大熱而濯以清風也雜史一類隋唐二志皆不成條理今觀崇文之作賢於二志逺矣此二類往往是一手所編惜乎當時不盡以其書屬之也泛釋無義論一篇古之編書但標類而已未甞注解其著注者人之姓名耳盖經入經類何必更言經史入史類何必更言史但随其凡目則其書自顯惟隋志於疑晦者則釋之無疑晦者則以類舉今崇文總目出新意每書之下必著説焉據標類自見何用更為之説且為之説也已自繁矣何用一一説焉至於無説者或後書與前書不殊者則强為之説使人意怠且太平廣記者乃太平御覽别出廣記一書専記異事奈何崇文之目所説不及此意但以謂博採羣書以類分門凡是類書皆可博採羣書以類分門不知御覽之與廣記又何異崇文所釋大槩如此舉此一條可見其他書有不應釋論三篇實錄自出於當代按崇文捴目有唐實錄十八部既謂唐實錄得非出於唐人之手何湏一一釋云唐人撰凡編書皆欲成類取簡而易曉如文集之作甚多唐人所作自是一類宋朝人所作自是一類但記姓名可也何湏一一言唐人撰一一言宋朝人撰然崇文之作所以為衍文者不知其為㡬何此非不逹理也著書之時元不經心耳有應釋者有不應釋者崇文總目必欲一一為之釋間有見名知義者亦彊為之釋如鄭景岫作南中四時攝生論其名自可見何用釋㢤如陳昌允作百中傷寒論其名亦可見何必曰百中者取其必愈乎書有應釋論一篇隋志於他類只注人姓名不注義説可以睹類而知義也如史家一類正史編年各随朝代易明不言自顯至於雜史容有錯雜其間故為之注釋其易知者則否惟覇史一類紛紛如也故一一具注盖有應釋者有不應釋者不可執一槩之論按唐志有應釋者而一槩不釋謂之簡崇文有不應釋者而一槩釋之謂之繁今當觀其可不可不類書而類人論三篇古之編書以人類書何甞以書類人㢤人則於書之下注姓名耳唐志一例削注一例大書遂以書類人且如别集類自是一類總集自是一類奏集自是一類令狐楚集百三十卷當入别集類表奏十卷當入奏集類如何取類於令狐楚而别集與奏集不分皮日休文數十卷當入總集類文集十八卷當入别集類如何取類於皮日休而總集與别集無别詩自一類賦自一類陸龜䝉有詩十卷賦六卷如何不分詩賦而取類於陸龜䝉按隋志於書則以所作之人或所解之人注其姓名於書之下文集則大書其名於上曰某人文集不著注焉唐志因隋志係人於文集之上遂以他書一槩如是且春秋一類之學當附春秋以顯如曰劉向有何義易一類之書當附易以顯如曰王弼有何義唐志以人寘於書之上而不著注大有相妨如管辰作管輅𫝊三卷唐省文例去作字則當曰管辰管輅𫝊是二人共𫝊也如李邕作狄仁傑𫝊三卷當去作字則當曰李邕狄仁傑𫝊是二人共𫝊也又如李翰作張廵姚誾𫝊三卷當去作字則當曰李翰張廵姚誾𫝊是三人共𫝊也若文集置人於上則無相妨曰某人文集可也即無某人作某人文集之理所志唯文集置人於上可以去作字可以不著注而於義無妨也又如盧槃佐作孝子𫝊三卷又作髙士𫝊二卷髙士與孝子自殊如何因所作之人而合為一似此類極多炙轂子雜錄注解五卷乃王叡撰若從唐志之例則當曰王叡炙轂子雜錄注解五卷是王叡復為注解之人矣若用隋志例以其人之姓名著注於其下無有不安之理編書不明分類論三篇七略惟兵家一略任宏所校分權謀形勢隂陽技巧為四種書又有圖四十三卷與書參焉觀其類例亦可知兵况見其書乎其次則尹咸校數術李柱國校方技亦有條理惟劉向父子所校經𫝊諸子詩賦冗雜不明盡採語言不存圖譜緣劉氏章句之儒胸中元無倫類班固不知其失是致後世亡書多而學者不知源則凡編書惟細分難非用心精微則不能也兵家一略極明若他略皆如此何憂乎斯文之䘮也史家本於孟堅孟堅初無獨斷之學惟依緣他人以成門户紀志𫝊則追司馬之蹤律厯藝文則躡劉氏之迹惟地理志與古今人物表是其胸臆地理一學後代少有名家者由班固修之無功耳古今人物表又不足言也古者修書出於一人之手成於一家之學班馬之徒是也至唐人始用衆手晉隋二書是矣然亦皆随其學術所長者而授之未甞奪人之所能而彊人之所不及如李淳風于志寧之徒則授之以志如顔師古孔頴逹之徒則授之紀𫝊以顔孔博通古今于李明天文地理圖籍之學所以晉隋二志髙於古今而隋志尤詳明也編次有叙論二篇隋志每于一書而有數種學者雖不標别然亦有次第如春秋三𫝊雖不分為三家而有先後之列先左氏次公羊次榖梁次國語可以次求類唐志不然三𫝊國語可以渾而雜出四家之學猶方圓氷炭也不知國語之文可以同於公榖公榖之義可以同於左氏者乎隋志於禮類有䘮服一種雖不别出而於儀禮之後自成一類以䘮服者儀禮之一篇也後之議禮者因而講究遂成一家之書尤多於三禮故為之别異可以見先後之次可以見因革之宜而無所紊濫今唐志與三禮雜出可乎編次不明論七篇班固藝文志出於七略者也七略雖疎而不濫若班氏歩歩趨趨不離於七略未見其失也間有七略所無而班氏雜出者則躓矣揚雄所作之書劉氏盖未收而班氏始出若之何以太元法言樂箴三書合為一總謂之揚雄所序三十八篇入於儒家類按儒者舊有五十二種固新出一種則揚雄之三書也且太元易類也法言諸子也樂箴雜家也奈何合而為一家是知班固胸中元無倫類舊類有道家有道書道家則老荘是也有法家有刑法法家則申韓是也以道家為先法家次之至於刑法道書别出條例刑法則律令也道書則法術也豈可以法術與老荘同條律令與申韓共貫乎不得不分也唐志則併道家道書釋氏三類為一類命以道家可乎凡條例之書古人草昧後世詳明者有之未有棄古人之詳明従後人之紊濫也其意謂釋氏之書難為在名墨兵農之上故以合於道家殊不知凡目之書只要明曉不如此論髙卑况釋道二家之書自是矛盾豈可同一家乎漢志於醫術類有經方有醫經於道術類有房中有神仙亦自微有分别奈何後之人更不本此同為醫方同為道家者乎足見後人之茍且也唐志别出明堂經脉一條而崇文總目合為醫書據明堂一類亦有數家以為一條已自疎矣况合於醫書而其類又不相附可乎漢志以司馬法為禮經以太公兵法為道家此何義也疑此二條非任氏劉氏所收盖出班固之意亦如以太元樂箴為儒家類也漢志以世本戰國䇿秦大臣奏事漢著記為春秋類此何義也唐志以選舉志入職官類是崇文總目以選舉志入𫝊記非通志卷七十一
