body:
  text: 通志卷六十八宋右廸功郎鄭樵漁仲撰藝文略第六法家管子十八卷齊相管夷吾撰漢劉向録校又十九卷唐尹知章注舊有三十卷又二十四卷唐房元齡撰管氏指略二卷唐杜佑撰商君書五卷秦相衛鞅撰漢有十九篇今亡三篇慎子一卷戰國時處士慎到撰舊有十卷漢有四十二篇隋唐分為十卷今亡九卷三十七篇韓子二十卷韓非撰唐有尹知章注今亡晁氏新書七卷漢御史大夫晁錯撰崔氏政論六卷漢尚書崔寔撰劉氏政論五卷魏侍中劉廙撰阮子政論五卷魏清河太守阮武撰劉氏法論十卷魏劉邵撰元氏世要論十二卷魏大司農桓範撰陳子要言十四卷吳豫章太守陳融撰治道集十卷李文博撰正論三卷李敬元撰凡法家一種十六部一百六十一卷名家鄧析子一卷戰國時鄭大夫尹文子二卷尹文周之處士遊齊稷下公孫龍子一卷戰國時人舊十四篇今亡八篇又一卷陳嗣古注又一卷賈太隱注人物志三卷魏劉邵撰偽凉劉昺注廣人物志三卷唐杜周士撰河西人物志十卷趙武孟撰吳興人物志十卷唐宋璲撰九州人士論一卷魏司空盧毓撰士操一卷魏文帝撰士緯新書十卷姚信撰梁人姚氏新書二卷其書類士緯辨名苑十卷范謐撰兼名苑二十卷僧逺年撰天保正名論八卷龍昌期撰凡名家一種十六部八十四卷墨家墨子十五卷宋大夫墨翟撰墨翟與孔子同時漢志注在孔子後又三卷樂臺注唐志不載當考隨巢子一卷墨翟弟子胡非子一卷墨翟弟子董子一卷戰國時董無心撰其說本墨氏凡墨家一種五部二十一卷縱橫家鬼谷子三卷皇甫謐注鬼谷先生楚人也生於周世隱居鬼谷又三卷樂臺注又三卷唐尹知章注又三卷梁陶𢎞景注補闕子十卷梁元帝撰縱橫集二十卷李緯撰採六國至東漢辨説之詞凡縱橫一種六部四十二卷雜家尸子二十卷秦相衛鞅上客尸佼撰吕氏春秋二十六卷秦相呂不韋撰高誘注淮南子二十一卷漢淮南王劉安撰許慎注又二十一卷高誘注淮南鴻烈音二卷風俗通義三十卷應劭撰嘿記三卷吳大鴻臚張儼撰抱扑子外篇三十卷葛洪撰金樓子十卷梁元帝撰博物志十卷張華撰又十卷張公雜記一卷張華撰梁有五卷大槩似博物志雜記十一卷張華撰廣志二卷郭義恭撰又十卷部略十五卷博覽十三卷崔豹古今注五卷伏侯古今注三卷續古今注三卷唐周䝉撰中華古今注三卷馬縞撰古今善言二十卷宋車騎將軍范泰撰闕文十三卷陸澄撰記聞二卷宋後軍參軍徐益夀撰備遺記三卷方類六卷袖中記二卷沈約撰袖中略集一卷沈約撰珠叢一卷沈約撰採璧三卷梁中書舍人庾肩吾撰物始十卷謝昊撰隋志昊作吳事始三卷唐劉孝孫房徳懋撰皆為王府官以教諸王始學續事始三卷唐劉睿撰續事始五卷偽蜀馮鑑撰鴻寳十卷雜略十三卷清神三卷前言八卷會林五卷對林十卷道言六卷叱囉羡撰文府五卷語對十卷朱澹逺撰語麗十卷梁朱澹逺撰對要十卷雜語三卷衆書事對三卷廊廟五格二卷王彬撰名數十卷徐陵撰物重名五卷眞注要錄一卷天地體二卷諸書要略一卷魏彦深撰雜事鈔二十四卷雜書鈔四十四卷子鈔三十卷梁黟令庾仲容撰子鈔三十卷沈約撰子林三十卷薛克構撰子書要略一卷盧藏用撰子談論三卷文章始一卷任昉撰續文章始一卷姚察撰翰墨林十卷新舊傳四卷文鑑五卷典要三卷宋朝王曉撰古今辨作錄三卷博覽十五卷統載三十卷韓潭撰博雅志十三卷李文成撰麟閣詞英六十卷唐高宗時勅撰屬文要義十卷元懐景撰意林三卷馬總撰魏氏手略二十卷魏謩撰博文竒要二十卷古今精義十五卷薛洪撰諭善錄七卷庾敬休撰諭䝉一卷馮伉撰䝉求三卷唐李澣撰又二十卷續䝉求三卷唐王範撰唐䝉求三卷唐白廷翰撰系䝉二卷李伉撰羣書系䝉三卷劉潛撰三足記二卷盧景亮撰古今語要十二卷偽唐喬舜封撰歴代創制儀五卷五書一卷李愚撰物類相感志十卷釋贊寧撰近事會元五卷格言六卷偽唐韓熙載撰長短要術十卷唐趙蕤撰凡雜家一種九十二部九百六卷農家范子計然十五卷問答尹都尉書三卷汜勝之書二卷漢議郎汜勝之撰齊民要術十卷後漢賈思勰撰春秋濟世六常擬議五卷隋楊瑾撰武后兆民本業三卷演齊民要術李淳風撰大農孝經一卷本朝賈元道撰農家切要一卷農子一卷山居要術三卷王珉撰本書三卷何亮撰凡農家一種十二部四十七卷小說燕丹子一卷丹燕王喜太子青史子一卷宋玉子一卷楚大夫宋玉撰語林十卷東晉處士裴啓撰𤨏語一卷梁金紫光禄大夫顧協撰郭子三卷東晉中郎郭澄之撰賈泉注笑林三卷後漢給事中邯鄲淳撰又三卷路氏撰笑苑四卷解頤二卷楊松玢撰世說八卷宋臨川王劉義慶撰世說抄一卷續世說十卷劉孝標撰俗說一卷小說十卷梁武帝勅安右長史殷芸撰又十卷劉義慶撰邇說一卷梁南臺治書伏暅撰辯林二十卷蕭賁撰辯林二卷席希秀撰瓊林七卷周虎門學士陰顥撰座右方八卷庾元威撰座右法一卷類林三卷裴子野撰啟顏錄十卷侯白撰說林五卷孔衍撰說林二十卷張太素撰中樞龜鑑一卷唐蘇瓌撰廬陵官下記二卷唐段成式撰劇談錄三卷康軿撰雲溪友議三卷唐范攄撰嵐齋集二十五卷唐李躍撰常侍言旨一卷幽閑鼓吹一卷唐張固撰盧氏雜說一卷唐盧言撰桂苑叢譚一卷會昌解頤一卷松窻録一卷瀟湘録十卷唐栁祥撰醉郷日月三卷唐皇甫松撰笑林三卷唐何自然撰牛羊日歴一卷唐劉軻撰猗犴子一卷元結撰刋誤一卷唐李滂撰資暇三卷李匡文撰炙轂子雜錄注解五卷唐王睿撰杜陽雜編三卷蘇鶚撰家學要録二卷唐栁珵撰俳諧集十五卷劉訥言撰說纂四卷李繁撰劉公嘉話錄一卷韋絢撰戎幕閑談一卷