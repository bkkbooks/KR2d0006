body:
  text: 通志卷三十一宋右迪功郎鄭樵漁仲撰六書略第一六書序經術之不明由小學之不振小學之不振由六書之無傳聖人之道惟藉六經六經之作惟藉文言文言之本在於六書六書不分何以見義經之有六書猶奕之有二棋博之有五木奕之變無窮不離二色博之應無方不離五物苟二棋之無别則白猶黑也黑猶白也何以明勝負茍五木之不分則梟猶盧也盧猶梟也何以決雌雄小學之義第一當識子母之相生第二當識文字之有間象形指事文也會意諧聲轉注字也假借文字俱也象形指事一也象形别出為指事諧聲轉注一也諧聲别出為轉注二母為會意一子一母為諧聲六書也者象形為本形不可象則屬諸事事不可指則屬諸意意不可會則屬諸聲聲則無不諧矣五不足而後假借生焉一曰象形而象形之别有十種有天物之形有山川之形有井邑之形有草木之形有人物之形有鳥獸之形有蟲魚之形有鬼物之形有器用之形有服飾之形是象形也推象形之類則有象貌象數象位象氣象聲象屬是六象也與象形並生而統以象形又有象形而兼諧聲者則曰形兼聲有象形而兼會意者則曰形兼意十形猶子姓也六象猶適庶也兼聲兼意猶姻婭也二曰指事指事之别有兼諧聲者則曰事兼聲有兼象形者則曰事兼形有兼會意者則曰事兼意三曰會意二母之合有義無聲四曰轉注别聲與義故有建類主義亦有建類主聲有互體别聲亦有互體别義五曰諧聲母主形子主聲者諧聲之義也然有子母同聲者有母主聲者有主聲不主義者有子母互為聲者有三體主聲者有諧聲而兼會意者則曰聲兼意六曰假借不離音義有同音借義有借同音不借義有協音借義有借協音不借義有因義借音有因借而借有語辭之借有五音之借有三詩之借有十日之借有十二辰之借有方言之借六書之道備於此矣臣舊有象類之書極深研幾盡制作之妙義奈何小學不傳已久見者不無疑駭今取象類之義約而歸於六書使天下文字無所逃而有目者可以盡曉嗚呼古者有尉律所以敕小學也學童十七巳上始試諷籕書九千字乃得為吏又以八體試之郡移太史并課最者以為尚書史書或不正輒舉劾之夫古文變而為籕書籕書變而為篆𨽻秦漢之人習篆𨽻必試以籕書者恐失其原也後之學者六書不明篆籕罔措而欲通經難矣哉且尉律者廷尉治獄之律也古人於獄訟之書猶不敢茍簡若是而况聖人之經乎象形第一序曰書與畫同出畫取形書取象畫取多書取少凡象形者皆可畫也不可畫則無其書矣然書窮能變故畫雖取多而得算常少書雖取少而得算常多六書也者皆象形之變也今推象形有十種而旁出有六象天物之形日太陽之精正圓不虧其中象日烏之形古文星小則為星大則為槃月太隂之精多虧少盈故其形缺天一大為天象天垂示之形旦日初出於地上云古雲字象其形後人加雨故以云為云回之云回古雷字後人加雨作雷又作靁省作雷回象雷形借為回旋之回古尊罍器多作云回雨古作又作即而成文雨即而備體右八山川之形丘象山丘在地一地也山嵒魚銜切岸也􅖘於口切山名在陽羡廣音儼説文因廣為屋象對刺髙屋之形丆呼旱切山石之崖巖人可居石嵒魚咸切嶄嵒也水坎之體也從則為水川水會為川􅖱即畎字小水為􅖱巜即澮字廣尺深尺曰􅖱廣二尋深二仞曰巜書曰濬􅖱巜距川泉本錢字象錢貨之形自九府圜法行然後外圓內方此實錢也借為泉水之泉所以生字皆取借義􅏨蒲糜切水邪流􅏨匹卦切從反永徐錯曰永長流也反即分􅏨也永象水巠理之長詩曰江之永矣土象物在土中拆土而出之形􅤓即塊字從土一屈象形堊即坐字象人據土而坐之形􅎧都回切説文小􅊟也􅊟即阜字説文大陸山無石者􅤦亦作音阜兩阜之間也鹵郎古切説文西方鹹地從西省象鹽形屾所臻切二山也磊魯猥切衆石也壵音堯説文土髙也凹於交切窊也凸陀沒切出貌又徒結切凹昵洽切凹凹物低垂貌嶽説文東岱南霍西華北恆中泰室王者所以巡狩所至嶽古作嶽象髙形右三十井邑之形井即井字説文八家一井象井幹之形其中點者甕之象也丹説文巴越之赤石也象采丹井其中之點象丹形田象田有所畫疆畛之形髙亦作高象臺觀高之形從坰口與倉舍同意口即圍字京説文人所為絶高丘也從高省丨象高形即坰字邑外謂之郊郊外謂之野野外謂之林林外謂之坰象逺界即郭字説文民所度居也從回象城之重兩亭相對也即廩字方曰倉圜曰廩上象其蓋苦本切今作壼説文宫中道從口象宫垣道上之形引詩室家之壼音綿説文交覆深屋也穴胡決切象穿土為室之形畕居良切比田也畾魯水切田間謂之畾又盧回切雷也音虺仲湯左相闕本義右十四草木之形之𨽻作之今作芝象芝出於地丕從不不音跗象華之不蕚敷披於地上之形帝象華蒂之形才説文草木之初也從丨上貫一將生枝葉下一地也丑列切又采早切象草木初生有二葉附芽而出屯株倫切象草木初自地出從屮貫一一象地也丵仕角切叢生草音介説文草蔡也象草生之散亂也未木之滋也於木有加焉一曰木生未遂也木上象枝幹下象根荄不牙葛切又牛代切木屈頭不出也桑木之類惟桑葉茂故詩曰桑之未落其葉沃若從叒象葉盛也出華英也華皆五出故象五出之形音垂象草木華葉垂敷之形乎感切象草木之華未發􅝟然之形􅓒田聊切象草木之實垂􅓒􅓒然亡暘切木芒也從來象其實也從夕象其根也來説文周所受瑞麥來牟一來二牟象芒束之形詩曰貽我來牟禾象根葉及垂穗之形秀茂盛也象根壅盛而禾髙茂米象禾實之形匹仞切枲莖皮也從屮從八象枲之皮莖音叔豆也象豆生之形韭象韭芽初生於地上之形象葉芘其實也音端説文物初生之題也上象生形下象其根禾音稽木之曲頭止不能上也今作漆説文木汁可以髹物象形漆如水滴而下不音跗象華蕚蒂之形詩曰常棣之華蕚不韡韡火象火形又魚燕借為尾象個竹枚也陟格切草葉也從垂穗上貫一下有根一地也説文磔也從舛在木上一曰髙木也弋涉切木葉也果木實也説文木之垂朵朵也詡鬼切𨽻作卉草之總名茻音莾蕨類繁薈而叢生一曰衆草象草並出之形芻説文刈草也象包束草之形胡先切草木􅝟盛也郎擊切稀踈適也一曰厯也季從禾厯從二禾皆以禾為節歷亦作麻􅾧匹卦切説文葩之總名勇主切説文本不勝末微弱也右四十五人物之形人象人立也今作化説文變也從到人臣按道家謂順行則為人逆行則為道人死則歸於土道則離人故能變化而上升古文殄字從反匕身人身從禽畜身衡此象人之身兒古文竒字人也人象立人兒象行人立有所負行有所戴説文孺子也象小兒頭囟未合今作簮説文從人匕象簮形説文頌儀也從白象人面之形今作辨象戴辨之形公戶切説文雍蔽從人象左右皆蔽之形當侯切兜鍪胄也象人戴胄形秃象人之髮秃少如禾之芒爾與之切也面説文顔前也從百象人面𨽻作首從􅔣從川川象髮謂之鬊鬊即川也鬊舒閏切百書九切頭也古堯切斬首到縣故從到首長展兩􅋀在人上者故古文從上從人後之為字者因古文而成體其上則象發號施令其下則象垂衣裳之形從匕所以化下也其實本古文之尤耳元人頭也從二從兒二古文上字象人頭兒象其身大説文大象人形又曰大人也亦説文人之臂亦也從大象兩亦之形今别作腋夫説文丈夫也從大一以象簪也周制以八寸為尺十尺為丈人長八尺故曰丈夫夭於兆切説文屈也從大象形又古老􅋀不長也阻力􅋀又力結切傾頭也古郎切又寒剛切説文人頸也從大省象頸脈形交交脛也鳥光􅋀説文曲頸也從大象偏曲之形土刀切説文進趣也臣按與交同意交以脛之交以脛之偏以脛之進他達切象人形亦作大立象人立地之上從大人也一地也今作夏説文中國之人也從夂從􅔣從臼臼兩手夂兩足胸息進切説文頭會蓋心耳耴陟涉切耳垂也手女象婦人斂容儀之形母從女象褱子之形又曰象乳子毋武扶切説文止之也從女有姦之者也説文女陰也民氓也象俯首力作之形而説文頰毛也力筋也力由筋以生故象筋之形甲象人被甲之形故古文甲從人頭子他骨􅋀説文不順出到子了盧鳥切脛之椎骨丁了切男子隂居桀切説文無右臂居月切説文無左臂息夷某與隂謂之同體口牛刀切喧也噩魚各切驚動也走從夭從止止足也天象人之仰首張足而奔之形止象足趾他違切説文蹈也從反止步行也象二趾相前後蒲末􅋀足相戾而躓也丑略切從彳從止彳行也止足也象足而行也𨽻作彳丑亦切小步也象人脛三屬相連也亍丑玉􅋀説文步止也從反彳余忍􅋀説文長行也從彳引之行從彳左步也從亍右步也左右步俱舉而後為行者牙説文牡齒也象上下相錯之形足象股脛下屬於趾之形所葅􅋀説文足也上象腓腸下從止舌象吐舌之形谷極虐切口上阿也從口上象其理他感切吐舌貌他點切舌貌壬如林切象懷妊之形與巫同意廾居竦切竦手也普班切引也從反廾臼居玉切義手也要伊消切説文身中也象人要自臼之形申以書告上也從象書從臼捧書也曵余制切委地而行側絞切説文􅲍也覆手曰爪止兩切􅲍也與爪相向居六切挶也覆手挶也紀劇切持也象手有所虱據也居玉切持也從反􅲍鬥都豆切從􅲍從象對敵之形又説文手也三指者手之列多略不過三也􅚀音左左手也音肱臂上也丑械其手也彗旋芮切説文掃竹也從又持甡古邁切説文分決也從又中象決形徐鍇曰工物也丨所以決之又古穴􅋀目説文人眼重童子也恭于切從大大人也象人具兩目之形古倦切目圍也如鼻間兩目之形眉旻悲切説文目上毛也從目象眉之形上象額理也自疾二切鼻也象鼻形又始生之子亦為自么於堯切説文小也象子初生之形吕脊骨也豫余吕切説文推豫也象相豫之形骨説文肉之核也從有肉古瓦切剔人肉置其骨也肉外象臠中象肉理巫説文祝也女能事無形以舞降神者象人兩褎舞形與工同意古者巫咸初作巫昌兖切説文對卧也從反相背美忝切説文蓋也象布包覆腦下有兩背而夂在下或作莫坎切楚危切説文行遲曳及夂象人兩脛有所屣也夊陟侈切説文從後至也象人兩脛後有致之者久説文從後灸之象人兩脛後有距也引周禮久諸牆以觀其橈疒音疾説文人有疾病象倚著之形苜徒結切目不正也或作象目生花之形尸主所祭之神而託於人故象人之形包説文象人褱妊已在中象子未成形古懷切背吕也象脅肋之形吅音喧驚呼也象並口呼之象側立切衆口也瞿九遇切左右視也從相聽也比毗志切相聽為從反從為比北蒲昧切乖也從二人相背魚音切衆立也㚘薄旱切並行也並𨽻作並併也孖津之切一産二子也􅀈須兖切選具也闕本義右百二十三鳥獸之形工瓦切羊角也丫於加切物之岐頭者采蒲莧切獸之迹也象指爪之分羊孔子曰牛羊之字以形舉萈胡官切羊細角牛説文象角頭三封尾之形音牢象圈養之狀牽象牽牛之狀角荒胡切説文虎文也按此象虎而刳其肉象其皮之文虎象虎踞而回顧之形毛説文眉髮之屬及獸毛也尾象毛在後體之形豕豖敕六切豕絆足行豙魚記切豕怒毛起居例切豕之頭何加切從下象其足通貫切豕走也羊至切説文修豪獸一曰河內名豕也從下象毛足豸池爾切説文獸長行豸豸然欲有所司殺形又丈蟹切蟲無足徐姊切如野牛而青古作兕易羊益切説文蜥蜴蝘蜓守宫象形祕書説日月為易象陰陽也禺牛具切母猴象説文象長鼻牙南越大獸三年一乳象耳牙四足之形古作象馬何開切又胡關切説文馬一嵗也從馬一絆其足亦作馵朱戍切馬後左足白􅎗陟立切絆馬也鹿􅞧宅買切獬􅞧獸似山牛一角古者決獄令觸不直㲋丑略切似兔青色而大兔犬説文狗之有垂蹄者也孔子曰視犬之字如畫狗尨莫江切犬之多毛者犮蒲撥切説文走犬貌從犬而丿之曳其足則刺犮也鼠能奴來切獸也又為三足鱉熊羽弓切説文獸似豕山居冬蟄巤良涉切説文毛巤也象髮在胸上及毛髮巤鼠之形離音離又音摛説文山神獸也歐陽喬説離猛獸也禹説文蟲也或曰獸類㹌符朱切如人被髮一名梟羊萬無販切説文蟲也卨私列切説文蟲也嘼許救切説文㹌也象耳頭足厹地之形血象薦血之形革象獸之皮凡取皮者必張之頭角尾足皆具焉皮象以手剝取其皮之形夔渠追切説文神魖也如龍一足象有角足人面之形奴刀切説文貪獸也一曰母猴又奴冬切鳥烏焉鳶也朋音鳳説文神鳥也五色舉出於東方君子之國見則天下安寧舄七約切即鵲也萑胡官切説文鴟屬從佳從廾有毛角隹説文鳥之短尾總名也羽鳥長毛也彡所銜切説文毛飾畫文也􅷾之忍切説文新生羽而飛也几音殳説文鳥之短羽飛几几也弱亦作弱説文橈也上象橈曲彡象毛釐撓弱也弱物并故從二歰色入切説文不滑也從四止臣按獸畜少滑者有四止也西古作􅒾鳥在巢上象形説文鳥在木上曰巢在穴曰窠飛説文鳥翥也􅀈權俱切脯挺也􅀈猶芻也芻象束草􅀈象束脯雔所江切雙鳥雥徂合切羣鳥虤五間切虎怒也賏音鶯頸飾也豩悲巾切二豕也㹜語巾切兩犬相齧也毳充芮切説文獸細毛也右七十五蟲魚之形其中從仌象鱗其下似火象尾燕説文元鳥也籋口布翅枝尾乙魚腸也又魚鰓骨蟲許偉切説文一名蝮博三寸首大如擘指象其卧形物之微細或行或毛或羸或介或鱗以蟲為象蜀説文葵中蠶也從蟲上目象蜀頭形中象其身它湯河切説文蟲也從蟲而長象寃曲垂尾形上古草居患它故相問無它乎或作蛇又時遮切説文頭與它同天地之性廣肩無雄龜鱉之類以它為雄象足甲尾之形也黽莫杏切説文蛙黽也從它象形渠幽切龍子有角者卵盧管切説文凡物無乳者卵生臣按此象蟲之卵附著於木枝之形如雀甕螵蛸之類是也卵公渾切鯤無子白魚胞也巴説文蟲也或曰食象蛇丁蠆尾也又為著物之丁卜灼剝龜也象炙龜之形兆灼龜坼也丙魚尾也貝説文海介蟲也居陸名猋在水名蜬象形古者貨貝而寶龜至秦廢貝行錢時丑切堪㐨魚名平祕切贔屭鼇也一曰雌鼇為贔語居切二魚也音昆蟲之總名説文有足曰蟲無足曰豸右二十三物之形象鬼魅之形敷物切鬼頭也右二器用之形弋橛也象折木袤鋭著形從象物挂之也戈説文平頭戟也音橛逆鈎也居月切説文鈎識也從反亅又株衛切劒戟貌􅗵古本切鈎逆鋩也乙於謹切説文象􅲖曲隱蔽形甫良切説文受物之器也今作災東楚名缶曰災象甃瓦之形弓徒案切説文行丸也几亦作己踞几也周禮有五几俱永切象窗牖漏明且子余切説文薦也從几足有二橫一其下地也臣按此即爼豆之爼淺野切薦也斤斧屬象曲柄之形斗説文十升也象形有柄升説文十籥也從斗亦象形古雅切玉爵也象形與爵同意一曰斝受六升又居迓切鬱尊矛説文酋矛也建於兵車長二丈車于歲切車軸專也酉即卣也卣即尊也以韋編竹為書玉象貫玉之形即琴字主之庾切説文云知庾切象鐙鐙中火主也鐙中主火焰之形楚限切燔肉器干象干戟之形魚戟切於古為戟字庚之類故亦有三足率捕鳥畢也鬲鼎屬説文實五觳斗二升曰觳象腹交文三足訖嶽切二玉相合為一珏􅰍古禾切説文秦名土釡曰􅲒亦作丸胡官切説文圜傾側而轉者從反仄他刀切戎鼓大首謂之􅠭從又象手執之也義初加切象義物之形尼輒切䈤也象竹篾交錯成物之狀盾食閏切説文瞂也所以扞身蔽目華北潘切説文箕屬所以推棄之器也又璧吉切畢説文田罔也從華象畢形微也古候切説文交積材也象對交之形壴中句切説文陳樂立而上見也皿説文飯食之用器也豈可亥切樂器與壴同體豆説文食肉器也豐音禮行禮之器説文豆之滿者一曰鄉飲酒有豐侯者自是器名登禮器也象肉在豆中之形缶説文瓦器所以盛酒漿秦人鼓之以節歌矢説文從入象鏑栝羽之形古者夷牟初作矢即矦字射矦也即射字象張弓發矢之形臼説文舂也古者掘地為臼其後穿木石兩古作二十四銖為兩象稱形月莫報切説文小兒蠻夷頭衣也舟古作𨽻作月方併船也象兩舟省總頭形逆及切象人持舟之形尺昌石切説文十寸也人手郤十分動脈為寸口十寸為尺周制寸尺咫尋常仞諸度量皆以人之體為法卪今作節符信也象相合之形則侯切左卪也合符有二與者執左取者執右勺之若切説文挹取凹象形中有實與包同意説文昆吾圜器也臣按禮經古有壷何必取於昆吾新室改為疊從晶從宜宜盛社肉之器象肉多之形與豐登同意正諸盈切射的也詩曰終日射侯不出正兮乏扶法切從反正藏矢之具彌兖切避箭短牆刀刃象刀有刃之形匕必履切小刀也創楚良切片説文判木也音牆殳也亦判木也鼎説文三足兩耳和五味之寶器也易卦巽木於下者為鼎象析木以炊也門戶闔為門偏為戶亦作繖顙旱切蓋也寧直吕切當屏間也説文大版也所以飾鐘鼓捷業如鋸齒以白畫之象其齟齬相承也從􅰠從木木象版詩巨業維樅樂逆角切説文五聲八音總名象鼓鞞木虡也乘食陵切説文覆也從入桀桀黠也軍法曰乘音徯説文袤徯有所俠藏也區踦區藏匿也從品在匚中品衆也今作曲象器曲受物也右八十七服飾之形衣象人披衣之形即衣字從向身衰蘇禾切説文草雨衣巾佩巾也從坰丨象糸也市分物切説文韠也上古衣蔽前而已市以象之帶説文紳也男子鞶帶婦人鞶絲象繫佩之形毗祭切敗衣也网今作網説文庖犧氏始結繩以漁示音祈象旗斿之形勿州里所建旗象其柄有三斿於阮切旌旗之斿也左象人執旗杠右象旗斿丑許切旌旗杠貌系胡計切繫也從系而有所著焉莫狄切説文細絲也象束絲之形圖象圖畫之形右十五象貌八象分别之貌入説文象從上俱下也爻象交加通疏貌㸚力几切象希明之貌丨音衮上下通貌通疏而明貌空媧切物不齊也一曰䔪邪離絶貌莫狄切覆物之貌莫保切重覆貌苦江切幬帳之象從􅜪覆也從之飾也呼訝切説文覆也從坰上下覆之壬他鼎切説文象物出地挺生也王于况切象物出地而盛也生象草木出土上丰敷容切草盛丰丰也縳也又舂遇切約也居之切象薦物之貌必至切説文相付與之約在閣上也渠之切象播物之貌常句切説文老人行才相逮從省易省行象文説文錯畫也象交文音包説文裹也象人曲形有所包裹凶説文惡也象地穿交啖其中居月切也動貌居謁切也動貌息進切説文疾飛也似飛而羽不見非違也從飛下翅取其相背氏與民同體象民俯首力作之貌居虬切説文相糾繚也一曰瓜瓠結丩起而談切説文毛冉冉也陟劣切象聨綴之貌魚廢切芟草也從丿從乀相交也又牛蓋切創乂懲也毋古患切象穿物之貌串古患切穿也口音韋象環繞之狀至象鳥飛而至地之貌小象水之微也音兖説文山間泥地從口從水敗貌録音祿説文刻木録録也音齊象禾麥吐穗上平也力軌切象纍土石為牆壁貌象人臣事君屈服之貌力弔切髙飛貌從鬒鬒者羽之稠也敷文切又蘇典切野火貌右四十四象數一二三亖乂音五五七九十千草日執􅋀二十并也蘇沓切三十并也亦作卉世三十年息入切四十并也一二三亖象正數餘並合數右十四象位上下中旁亦作旁象位取聲音集象三方合房密切又於兆切又匹蔑切右戾也分物切左戾也余制切説文抴也徐鍇曰象丿而不舉首弋支切説文流也從反􅛣又以制切曵足也又力結切左戾也今作尤今作右右十一象氣氣亦作氣象氣上升之狀只語已之辭象言訖而氣散郎激切鬲也象孰飪五味氣上出也白疾二切説文此亦自字也省自者詞言乏氣從鼻出與口相助也亦作􅝉音忽説文出氣詞也從曰象氣出形音考説文氣欲舒出包上礙於一也虎何切詞也從反丂兮説文語所稽也從丂從八象氣越丂乎語之餘也一曰疑辭乃説文曵詞之難也象氣之出難于説文於也象氣之舒平説文語平舒從于從八八分也兊舊作兌説也徐鉉曰從口從八象氣之分散欠説文張口氣悟也象氣從人上出之形旡𨽻作旡音既説文飲食氣逆不得息曰旡從反欠右十五象聲牟説文牛鳴也從牛象其聲氣從口出臣按此象其開口出氣蓋聲無形不可象芈綿婢切説文羊鳴也象聲氣上出與牟同意囂虛嬌切説文聲也氣出頭上吳説文大言也從口徐鍇曰大言故口以出聲轟呼宏切説文羣車聲也噪先到切鳥在木上羣鳴也曰王伐切象口氣出也口氣出聲乃發號胡到切説文痛聲也從口在丂上􅮎郎丁切象衆聲嵒尼輒切多言之聲彭蒲庚切鼓聲也從彡象擊聲砳力摘切石聲也二石相擊而成聲䖜魚巾切説文兩虎爭聲從曰象口氣出也右十三象屬己亥十日十二辰皆假借惟己亥為正書者以其日辰不可名象惟取同音而借己亥無同音之本故無所借已不可為也象蛇之形而為己亥不可為也象豕之形而為亥右二形兼聲齒從止聲余律切筆也從聿一聿尼輒切長丈二尺軍中士所持司馬法曰執羽從殳亦音殊今作箕説文簸也從竹甘象形下其丌也亦為箕字丌亦音箕􅀢即互字説文可以收繩也從竹象形象人手所推握也曐今作星晶象星之散明生象其發渙也禽説文走獸總名從厹象形今聲禽離兕頭相似厹人九切説文獸足蹂地也象形九聲按九亦象足幹戉王伐切斧也從戈音厥象斧刃金説文象金在上中形今聲五葛切説文岸髙也從山丆丆亦聲龍説文從肉飛之形童省聲韋説文相背也從舛口聲獸皮之韋可以束枉戾齨巨九切説文老人齒如臼也犂針切以水沃竈中火也姑宏切臂上也從某某音肱今作疈判也辦今作辨判也從力從辡辡平免切别也辨説文治也從言在辡之間辨匹見切斷也或言韋中絶也畞今作畝説文六尺為步步百為畝或作畞從田十久徐氏曰十四方也久聲􅕆舅許切今作虡説文鐘鼓之拊也飾為猛獸從虍異象其下足也舝胡戞切説文車軸專鍵也兩穿相背從舛􅍛省聲􅍛古偰字舜𨽻作舜説文草也楚謂之葍秦謂之蔓蔓地連華象形從舛舛亦聲􅒧况于切説文草木華也臣按從亐雖聲亦象蒂蕚疔當經切病創一曰倚也人有疾病象倚著之形又尼厄切亦作裘説文皮衣也從衣求聲一曰象形與衰同意彘説文豕也後蹄廢謂之彘從矢聲從二匕彘足與鹿足同乙獻切説文大貌從大聲按雖聲亦象人之面目淵亦作􅘢説文回水也從水象形左右岸也中象水貌臣按水復加􅘢是為形兼聲滷籠五切西方鹹地也鹵象鹽形今以為聲靁今省作雷古作畾􅳑音關説文從絲貫杼也草古礦字今作疇從壽時流切象耕屈之形斦魚斤切二斤也頛音耒説文頭不正也從頁從耒耒頭傾也䪻音辨冠傾也右三十七形兼意籥説文樂之竹管三孔以和衆聲臣按從册象編竹從集從􅮎集衆聲也集音集􅮎音吟寸説文十分也人手郤一寸動謂之寸口從又從一又曰寸人手也又曰法度也耒説文手耕曲木也從木推手古者垂作耒耜以振民也臣按丰亦音耒象形彤説文丹飾也從彡彡其畫也皀皮及切説文穀之馨香也象嘉穀在裹中之形匕所以扱之或説皀一粒也説文以秬釀鬱草芬芳攸服以降神也從凵器也中象米匕所以扱也紆勿切説文芳草也十葉為貫百廾貫築以煮之為從臼坰缶鬯彡其飾也臣按之上體與㸑同意象煮之形從彡所以飾鬯也爵篆作説文禮器也象爵之形中有鬯酒又持之也舂説文搗粟也從廾持杵臨臼上午杵省也臿楚洽切説文舂去麥皮也從臼干所以臿之函容也舀以沼切説文杼臼也從爪臼引詩或或臼夷周切臽乎切説文小阱也從人在臼上頁胡結切頭也從􅔣從兒廾居容切竦手也􅶐渠龜切説文持弩拊也從廾肉兵説文械也從廾持斤并力之貌弄玩也謂寶玉可玩棄捐也具説文共置也從廾從具省古以貝為貨戒警也從廾持戈以戒不虞奐呼貫切説文取奐也共同也古作􅪃直紹切灼龜坼也經天切髆也俗作肩今作胃説文穀府也從從肉象形脊篆作説文背吕也從􅑰從肉彪必幽切虎文也敕合切和五味以烹也盥古玩切説文澡手也從臼水臨皿居宜切馬絡頭也從网從􅎗􅎗馬絆也須説文面毛也從頁從彡肜篆作䑣船中也鬼説文從人象鬼頭鬼隂氣賊害從某魅明祕切説文老精物也從鬼彡彡鬼毛粦良刃切説文兵死及牛馬之血為粦徐鍇曰舛者人足也言光行著人夾失冉切説文盜竊褱物也從亦有所持俗謂蔽人俾夾是也從二入今陜郡之字從此􅓟今作絶説又斷絲也從系從刀從卩古作􅓟象不連體絶二絲素篆作説文白緻繒也從糸􅑰取其澤也蠆説文毒蟲也蠆上同疆今作疆説文界也從畕三其界畫也音斗説文酒器也從金象器形亦音斗􅤦今作音阜説文兩􅊟之間也酋説文繹酒也從酉水半見於上禮有大酋掌酒官也􅀈今省作虐説文殘也從虍虎足反爪人也􅽗戶快切合會善言也㠭知衍切極工者也説文從四工又象疊物之形炎火光上也焱以冉切火華也又以聸切焱焱火盛貌右五十凡象形類計六百八指事第二序曰指事類乎象形指事事也象形形也指事類乎會意指事文也會意字也獨體為文合體為字形可象者曰象形非形不可象者指其事曰指事此指事之義也尹説文治也從又丿握事者也史篆作𠬢記事者説文從又持中中正也外説文逺也卜尚平旦今夕卜於事外矣與賜豫也説文一勺為與丈説文十尺也從又持十篆作支􅥷忍甚切説文㨖也從于入一為于入二為􅥷言稍甚也疐陟利切説文礙不行也從叀引而止之也叀者如叀馬之鼻從此與牽同意叀音專事職也與吏同意也尼輒切説文手之疌巧也從又持巾隸徒耐切説文及也從又從省又持者從後及之也今作尾玄説文黑而有赤色者玄象幽而入覆之也叀今作專説文小謹也從省􅋄財見也爭象二手而競一物之狀倚謹切説文所倚據也􅜆今作亂説文治也子相亂􅗸治之也享今作享説文獻也從高省曰象進熟物形降乎江切説文服也從攴相承不敢並也柬賈限切説文分别簡之從束八八分别也帚止酉切説文糞也從又持巾掃內古者少康初作箕帚秫酒少康杜康也弔多嘯切問終也古之葬者厚衣以薪故弔者必持弓貫矢警烏鳶也冘余針切説文冘冘行貌從人出坰坰即坰也兀説文髙而上平也從一在人上古説文故也從十口識前言者也又音故古作今作畏説文惡也從甶虎省鬼頭而虎爪可畏也五委切説文仰也從人在􅛣上仄説文側傾也從人在􅛣下直説文正見也從􅡊從十從目徐鍇曰􅡊隱也今十目所見是直也亡篆作亡説文逃也從入從􅡊􅡊音隱去虔切罪愆也從干二二古文上字干上則為罪矣或曰干亦為犴字在犴獄之上則罪愆之人也辛辛罪也辛被罪者也故辛視而有加焉臾羊朱切説文束縳捽抴為臾從申從乙臣按從臼從人則有捽抴之義百篆作從自自一至十十為百牙葛切説文語相訶歫也從口歫䇂䇂惡聲也章説文樂終為一章從音從十十數之終也竟説文樂曲盡為竟從音從人音沒説文入水有所取也從又在回下回古文回回淵水也及逮也從又從人徐鍇曰及前人也古文作秦刻石作善篆作古作譱説文吉也從競從羊此與義美意同美説文甘也從羊從大羊在六畜主給膳也美與善同肯今作肯説文骨間肉肯肯著者也又可亥切奇説文異也從大從可昷篆作烏昆切説文仁也從皿從囚食囚也官溥説全純玉也從入從王古作同內入也從坰自外而入也􅣃攻乎切説文秦以市買多得為􅣃引詩我􅣃酌彼金罍從夕從乃乃益至也又果五切言從二從舌二古文上字自舌上而出者言也音説文聲也從言含一晝説文日之出入與夜為界從畫省從日再説文一舉而二也爯處陵切説文并舉也從爪冓省甘説文美也從口含一一道也臣按此象甘物含而不去之狀叵普火切不可也從反可央説文中央也從大在坰之內大人也央旁同意寉胡沃切説文髙至也從隹上欲出門􅫇今作厚厚也從到享謂上之所以享下可謂厚下矣起戟切説文際見之白也從白上下小見川祖財切説文害也從一雍川引春秋傳曰川雍為澤凶今作弗兩已相背公説文平分也臣按從八從某所以别某也今作乖戾也從彼列切介畫也説文從八從人人各有介分别也以刀分别物也谷象谷形從口能應聲之義夕説文莫也從月半見􅀢於交切深目貌從目反也亦作負房九切説文恃也從人守貝有所恃也一曰受貸不償􅩏蘇果切説文貝聲也從小貝員今作員于權切數也徐鍇曰古以貝為貨故數之􅀢博抱切説文相次也從匕從十鴇從此艮篆作􅀢説文狠也從目匕匕目猶目相比不相下易曰􅀢其限目匕為􅀢匕目為真鬒之忍切説文稠髮也從彡從人引詩曰鬒髮如雲令篆作力政切説文發號也從集曰徐鍇曰集而為之節制也赤説文南方赤色也從大從火夰古老切説文放也從大而八分也又下老切㚔尼輒切説文所以驚人也從大從􅥷一曰大聲也一曰俗語以盜不止為㚔羌墟羊切説文西戎牧羊人也從羊從人右七十八事兼聲用説文可施行也從卜從中庸説文用也從用從庚庚更事也易曰先庚三日甫説文男子美稱從用父菐蒲沃切煩瀆也從廾從又方六切今説文是時也從集從􅗵􅗵古文及字逋還切説文賦事也從八八亦聲右六事兼形支説文去竹之枝也從手持半竹吏説文治人者也徐鍇曰吏之治人心主於一故從一臣疑吏史之字象人形吏從一象簪與夫之一同按説文夫從一象簪也父説文矩也家長率教者臣按人道尊又故父於又有加焉父向左子向右是尊卑相向之義也幻今作幻相詐惑也從到豫爭象二手而競一物之狀戊亡撫切從戈前垂象盾執戈揚盾所以為武戊即武也引説文開弓也從弓丨申有所上也從曰從丨丨象束書臼而上之也克篆作説文肩也象屋下刻木之形臣按今匠者治材刻之以承上木則曰肩今作宣上下象天地中即雷字雷所以發宣天地之氣畫胡麥切説文界也象田四界聿所以畫之右十一事兼意歬今作前人在舟上不行而進故説文不行而進謂之歬爨七亂切説文齊謂之炊爨臼象持甑坰為竈口廾推林內火臣按此説頗迂爨上象竈以安甑下象廾而焚也􅗸平小切受也從爪從又象爪取而手受之也􅀈財干切説文殘穿也從㱑從又臣按歹殘骨也又取之也然凡從􅀈者皆有深意曹篆作􅔟説文獄之兩曹也在廷東從㯥治事者從日寒説文凍也從人在宀下從草薦覆之下有仌侵説文漸進也從人又持帚若掃之進又手也義説文已之威儀也從羊善美同意也后説文繼體君也象人之形從口施令以告四方也司説文謂臣司事於外者是矣謂從反后非也司向后者也邑説文國也從口先王之制尊卑有大小從卪怨阮切向邑成文即花苑之苑右十二凡指事類計百七通志卷三十一
