body:
  text: 通志卷一百三十九宋右迪功郎鄭樵漁仲撰列傳第五十二梁王茂曹景宗王珍國張齊席闡文夏侯詳子亶魚夔𢎞吉士瞻蔡道恭楊公則鄧元起羅研李膺張惠紹馮道根康絢昌義之張𢎞策子緬綰纘庾域子子輿鄭紹叔呂僧珍樂藹子法才法藏子法藏子雲王茂字休逺一字茂先太原祁人也祖深北中郎司馬父天生宋末為列將於石頭克司徒袁粲以勳至巴西梓潼二郡太守封上黃縣男茂年數嵗為大父深所異常謂親識曰此吾家千里駒成門戶者必此兒也及長好讀兵書究其大指性沉隱不妄交遊身長八尺潔白美容儀齊武帝布衣時嘗見之歎曰王茂先年少堂堂如此必為公輔之器宋升明末起家奉朝請祕書郎歷參軍校尉纍年不調茂亦知齊之將亡求為邊職久之為雍州長史襄陽太守武帝一見便以王佐許之事無大小皆詢焉人或譖茂反帝弗之信譖者驟言之遣視其甲矟則蟲網焉乃誅言者或云茂與帝不睦帝諸腹心並勸除之而茂少有驍名帝又惜其用曰將舉大事便害健將此非上䇿乃令腹心鄭紹叔往侯之遇其卧因問疾茂曰我病可耳紹叔曰都下殺害日甚使君家門塗炭今欲起義長史那得猶卧茂因擲枕起即袴褶隨紹叔入見武帝大喜下牀迎因結兄弟被推赤心遂得盡力義師起茂與張𢎞䇿勸帝迎和帝不從武帝發雍部每遣茂為前驅師次郢城茂進平加湖破光子矜吳子陽等斬馘萬計從武帝東下復為軍鋒師次秣陵東昏遣大將軍王珍國盛陳兵於朱雀門衆號二十萬遣使度航請戰及戰茂與曹景宗等不利引却茂下馬單刀直前外生韋欣慶勇力絶人執鐵纒矟翼茂而進遂大破之縱兵追奔積尸與航欄等其赴淮死者不可勝算長驅至宣陽門是役也茂勳第一亦欣慶之力也建康城平以茂為護軍將軍遷侍中領軍將軍時東昏妃潘玉兒有國色武帝將留之以問茂茂曰亡齊者此物留之恐貽外議帝乃出之軍主田安啓求為婦玉兒泣曰昔者見遇時主今豈下匹非類死而後已義不受辱及見縊潔美如生輿出尉吏俱行非禮乃以余妃賜茂亦潘之亞也羣盜之燒神虎門也茂率所領到東掖門應赴為盜所射茂躍馬而進羣盜反走茂以不能式遏姦盜自表解職優制不許加鎮軍將軍封望蔡縣公是嵗江州刺史陳伯之叛茂出為江州刺史南討之伯之奔魏時九江新經軍寇茂務農省役百姓安之四年魏攻漢中茂受詔西禦魏軍退乃班師遷侍中中衛將軍太子詹事車騎將軍八年以夲號開府儀同三司丹陽尹時天下無事武帝方敦文雅茂心頗怏怏侍宴醉後每見言色帝嘗宥之而不責也十一年進位司空茂辭京尹改領中衛將軍茂性寬厚居官雖無美譽亦為吏民所安居處方正在一室中衣冠儼然僕妾莫見其惰容姿表瓌麗鬚眉如畫出入朝會每為衆所瞻望明年出為使持節散騎常侍驃騎將軍開府同三司之儀都督江州諸軍事江州刺史在州不取奉獄無滯囚居處被服同於儒者視事三年薨於州年六十武帝甚悼惜之贈侍中太尉加班劔二十人鼓吹一部諡曰忠烈初茂以元勳賜鐘磬之樂茂在州夢鐘磬在格無故自墮心甚惡之既覺命奏樂既成列鐘磬在格果無故編皆斷絶墮地茂謂長史江詮曰此樂天子所賜以惠勞臣也樂既極矣能無憂乎俄而病卒子貞秀嗣以居喪無禮為有司所奏徙越州後詔留廣州與魏降人杜景欲襲州城長史蕭昻斬之曹景宗字子震新野人也父欣之仕宋位至徐州刺史景宗幼善騎射好畋獵常與少年數十人於澤中逐麞鹿每衆騎赴鹿鹿馬相亂景宗於衆中射之人皆懼中馬足鹿應弦輒斃以此為樂年末弱冠欣之於新野遣出州以匹馬將數人於中路卒遭蠻賊數百圍之景宗帶百餘箭乃馳騎四射每箭殺一蠻蠻遂散走因是以膽勇知名頗愛史書每讀穰苴樂毅傳輒放卷嘆息曰大丈夫當如是少與州里張道門善道門車騎將軍敬兒少子也為武陵太守敬兒誅道門於郡伏法親屬故吏莫敢收景宗自襄陽遣船到武陵收其尸迎還殯葬鄉里以此義之齊建武二年魏攻夀春赭陽景宗為偏將以衝堅陷陳功除遊擊將軍四年太尉陳顯逹督衆軍北圍馬圈景宗從之以甲士二千設伏破魏援軍中山王英四萬人及克馬圈顯逹論功以景宗為後景宗退無怨言魏孝文率衆大至顯逹宵奔景宗導入山道故顯逹父子獲全武帝為雍州刺史景宗深自結附數請帝臨其宅時天下方亂帝亦厚加意焉永元初表為竟陵太守及武帝起兵景宗亦聚衆并率五服內子弟三百人從軍遣親人杜思沖勸先迎南康王於襄陽即帝位然後出師為萬全之計武帝不從以景宗為前鋒軍及漢口命景宗與王茂濟江圍郢城自二月至於七月郢城降復率衆前驅取建康路次江寧東昏遣將軍李居士以重兵屯新亭景宗始至營柵未立居士望而輕之因鼓譟前薄景宗被甲馳戰短兵才接居士棄甲奔走景宗皆獲之因鼓譟而前徑至皂策橋築壘景宗又與王茂呂僧珍掎角破王珍國於大航景宗軍士皆桀黠無賴御道左右莫非富室抄掠財物虜奪子女景宗不能禁及武帝入頓新城嚴申號令然後稍息復與衆軍長圍六門城平拜右衛將軍封湘西縣侯除郢州刺史加都督天監元年進號平西將軍改封竟陵縣侯景宗在州鬻貨聚斂於城南起宅長堤以東夏口以北開街列門東西數里而部曲殘橫人頗厭之二年十月魏攻司州圍刺史蔡道恭城中負板而汲景宗望關門不出但耀軍遊獵而已及司州城陷為御史中丞任昉所奏帝以功臣不問徵為右衛將軍五年魏中山王英攻鐘離圍徐州刺史昌義之武帝詔景宗督衆軍援義之豫州刺史韋睿亦援焉而受景宗節度詔景宗頓道人洲待衆軍齊集俱進景宗欲專其功乃違敕而進遇暴風卒起頗有沈溺復還守先頓帝聞之曰此所以破也景宗不進豈天意乎若孤軍獨往城不時立必見狼狽今得待軍同進始可大捷矣及韋睿至與景宗進頓邵陽洲立壘與魏城相去百餘步魏連戰不能却傷殺者十二三自是魏軍不敢逼景宗等器甲精新軍儀甚盛魏人望之奪氣魏大將軍楊大眼對橋北岸立城以通糧運每牧人過岸伐芻藁輒為大眼所略景宗乃募勇敢士千餘人徑度大眼城南數里築壘親自舉築大眼來攻景宗破之因得壘成使别將趙草守之因謂為趙草城是後恣芻牧焉大眼遣抄略輒為趙草所獲先是詔景宗等預裝髙艦使與魏橋等為火攻計令景宗與睿各攻一橋睿攻其南景宗攻其北六年三月因春水生淮水暴長六七尺睿遣所督將馮道根李文釗裴邃韋寂等乘艦登岸擊魏洲上軍盡殪景宗使衆軍復鼓譟亂登諸城呼聲震天地大眼於西岸燒營而奔英自東岸棄城走諸壘相次土崩悉棄其器甲爭投水死淮水為之不流景宗令軍主馬廣躡大眼至濊水上四十餘里伏尸相枕義之出逐英至洛口英以匹馬入梁城緣淮百餘里尸骸相藉生擒五萬餘人收其軍糧器械積如山嶽牛馬驢騾不可稱計景宗乃搜所得生口萬餘人馬千匹遣獻捷于京師先是旱甚詔祈蔣帝神求雨十旬不降帝怒命載荻欲焚蔣廟并神影爾日開朗欲起火當神上忽有雲如繖倐忽驟雨如瀉臺中宫殿皆自振動帝懼馳詔追停少時還靜自此帝畏信遂深自踐阼以來未嘗躬自到廟於是備法駕將朝臣修謁是時魏軍攻圍鐘離蔣帝神報敕必許扶助既而無雨水長遂挫敵人亦神之力焉凱旋之後廟中人馬腳盡有泥濕當時並目覩焉景宗振旅凱入帝於華光殿宴飲連句令左僕射沈約賦韻景宗不得韻意色不平啓求賦詩帝曰卿伎能甚多人才英拔何必止在一詩景宗已醉求作不已詔令約賦韻時韻已盡惟餘竸病二字景宗便操筆須斯而成曰去時兒女悲歸來笳鼓竸借問行路人何如霍去病帝嘆不已約及朝賢驚嗟竟日詔令上左史於是增封進爵為公拜侍中鎮軍將軍給鼓吹一部景宗為人自恃尚勝每作書字有所不解不以問人皆以意造焉雖公卿無所推揖唯以韋睿年長且州里勝流特相敬重同宴御筵亦曲躬謙遜武帝以此嘉之景宗妓妾至數百人窮極錦繡性躁動不能沉默出行常欲褰車帷幔左右輒諌以位望隆重人所具瞻不宜然景宗謂所親曰我昔在鄉里騎快馬如龍與少年輩數十騎拓弓弦作礕礰聲箭發如餓鴟呌平澤中逐麞鹿數肋而射之渴飲其血飢食其胃甜如甘露漿覺耳後生風鼻頭出火此樂使人忘死不知老之將至今來揚州作貴人轉動不得路行開車幔小人輒言不可閉置車中如三日新婦遭此悒悒使人氣盡景宗為人嗜酒好樂臘月於宅中使人作邪呼逐除遍往人家丐酒食夲以為戲而部下多輕剽因弄人婦女奪人財物帝頗知之景宗懼乃止武帝數宴見功臣共道故舊事景宗酒後謬妄或誤稱下官帝故縱之以為笑樂七年遷安南將軍江州刺史赴任卒於道贈雍州刺史開府儀同三司諡曰壯子皎嗣景宗齊永元初任竟陵郡其第九弟義宗年少未有位官居在雍州既方伯之弟又是豪強之門市邊富人姓向以見錢百萬欲壻義宗以妹適之義宗遣人送書竟陵咨景宗景宗題書後答曰買猶未得云何已賣義宗貪鏹遂成後隨武帝西下歷位梁秦二州刺史向家兄弟憑附曹氏位登列卿後義宗為都督征穰城軍敗見獲於魏卒王珍國字德重沛郡相人也父廣之齊鎮軍將軍自有傳珍國仕齊為南譙太守有能名時郡境苦飢珍國乃發米散財以振窮乏髙帝手勑云卿愛人活國甚副吾意永明初遷桂陽內史討捕賊盜境內肅清罷任還都路經江州刺史栁世隆臨渚餞别見珍國還裝輕素嘆曰此真良二千石也還為大司馬中兵參軍武帝雅相知賞謂其父廣之曰珍國應堪大用卿可謂老蚌也廣之曰臣不敢辭帝大笑帝每嘆曰晚代將家子弟如珍國者少矣纍遷遊擊將軍父憂去職建武末魏軍圍司州明帝使徐州刺史裴叔業攻拔渦陽以為聲援起珍國為輔國將軍助焉魏將楊大眼大衆奄至叔業懼棄軍走珍國率其衆殿故不至大敗及會稽太守王敬則反珍國又率衆拒之永元中為北徐州刺史將軍如故武帝起兵東昏召珍國以衆還都使出屯朱雀門為王茂所敗乃入城密遣郤纂奉明鏡獻誠於武帝帝斷金以報之時侍中衛尉張稷都督衆軍珍國潛結稷腹心張齊要稷稷許之十二月丙寅旦珍國引稷於衛尉府勒兵入自雲龍門殺東昏於內殿與稷會尚書僕射王亮等於西鐘下使國子博士范雲等奉東昏首歸武帝後因侍宴帝曰卿明鏡尚存朕昔金何在珍國曰黃金謹在臣肘不敢失墜歷位左衛將軍加散騎常侍封滆陽侯遷都官尚書初珍國自以廢殺東昏意望台鼎先是出為梁秦二州刺史心常鬱怏酒後於坐啓云臣近入梁山便哭帝大驚曰卿若哭東昏則已晚若哭我我復未死珍國起拜謝竟不答坐即散因此疏退久方有此進天監五年魏任城王澄攻鐘離帝遣珍國為援因問討賊方略對曰臣常患魏衆少不苦其多武帝壯其言乃假節與衆軍同赴魏軍退班師又出為南秦梁二州刺史會梁州長史夏侯道遷以州降魏珍國步道出魏興將襲之不果遂留鎮焉改封宜陽縣侯纍遷丹陽尹卒贈車騎將軍諡曰威子僧度嗣張齊字子嚮馮翊郡人少有膽氣初事荆府司馬垣歷生歷生酗酒遇下嚴酷不禮之及吳郡張稷為荆府司馬齊復從之甚見重以為腹心齊盡心事稷稷為南兖州擢為府中兵參軍武帝起兵東昏徴稷歸都督宫城諸軍事齊夜引珍國就稷齊手自執燭定謀明旦與稷珍國即東昏於殿內齊手殺焉武帝受禪封齊安昌侯位歷陽太守齊手不知書目不識字在郡清整吏事甚修天監四年魏將王足攻蜀圍巴西帝以齊為輔國將軍救蜀未至足退齊進戍南安遷巴郡太守初南鄭沒于魏乃於益州西置南梁州州鎮草創皆仰益州取足齊上夷獠義租得米二十萬斛十一年進假節督益州外水諸軍齊在益部纍年討擊蠻獠身無寧嵗其居軍中能身親勞辱與士卒同勤苦自頓舍城壘皆委曲得其便調結衣糧資用人無困乏既為物情所歸蠻獠亦不敢犯是以威名行於庸蜀巴西郡居益州之半又當東道衝要刺史經過軍府逺涉多窮匱齊緣路聚糧食種蔬菜行者皆取給焉歷南梁州刺史遷信武將軍征西鄱陽王司馬新興永寧二郡太守未發卒諡曰壯席闡文安定臨涇人也孤貧涉獵書史齊初為雍州刺史蕭赤斧中兵參軍由是與其子頴胄善復歷西中郎中兵參軍領城局武帝之將起兵闡文勸頴胄同焉仍遣客田祖恭私報帝并獻銀裝刀帝報以金如意和帝稱尊號為衛尉卿頴胄暴卒州府騷擾闡文以和帝幼弱中流任重時始興王憺留鎮雍部乃與西朝群臣迎憺總州事故賴以寧輯帝受禪除都官尚書封山陽縣伯出為東陽太守在郡有能名冬至悉放獄中囚依期而至改封湘西侯卒官諡曰威夏侯詳字叔業譙郡人也年十六遭父艱居喪哀毁三年廬於墓側常有三足雀飛來集其廬戶衆咸異焉服闋刺史殷琰召為主簿宋太始初琰舉豫州叛宋明帝遣劉勔討之攻守連月人情危懼將請救於魏詳説琰曰今日之舉本思效節若社稷有奉便歸朝廷何可屈身北面異域若謂不然詳願充一介琰許之詳出見勔曰將軍嚴圍峭壘矢刃如霜城內愚迷實同困獸士庶懼誅咸欲投魏僕所以踰城歸德敢布腹心願將軍施宏曠之恩垂霈然之惠解圍退舍皆相率而降矣勔許之即日琰及衆俱出降一州以全後為新汲令政有異績豫州刺史假佛榮班下境內為屬城表轉中從事史仍遷别駕歷事八將州部稱之齊明帝為刺史雅相器遇及輔政引詳及裴叔業日夜與語詳輒不酬帝以問叔業叔業以告詳詳曰不為福始不為禍先由此微有忤出為征虜長史義陽太守及南康王為荆州詳遷西中郎司馬新興太守武帝起兵與南康王長史蕭頴胄同創大舉慮詳不同以告栁忱忱曰易耳近詳求昏未之許今許之令成昏而告之不憂立異於是以女適其子夔及西臺建以詳為中領軍加散騎常侍南郡太守凡軍國大事頴胄多決於詳及帝圍郢城未下頴胄遣衛尉席闡文如武帝軍詳獻議曰窮壁易守攻取勢難若使賊人衆而食少故宜計日而守之若食多而力寡故宜悉衆而攻之若使糧力俱足非攻守所屈便宜散金寶縱反間使彼智者不用愚者懷猜此魏武之所以定大業也欲所言者難以紙宣輒口布於席衛尉特願垂採武帝加納焉頃之穎胄卒時武帝弟始興王憺留守襄陽詳乃遣使迎憺共參軍國遷侍中尚書左僕射尋授荆州刺史詳固讓于憺和帝詔加詳禁兵出入殿省又固讓不受天監元年徴為侍中車騎將軍封寧都縣侯詳纍讓乃更授右光祿大夫侍中如故給親信二十人改封豐城縣公二年抗表致仕詔解侍中特進三年遷湘州刺史詳善吏事在州四載為百姓所稱州城南臨水有峻峰舊老相傳云刺史登此山輒被代因是歷政莫敢至者詳於其地起臺榭延僚屬以表損挹之志六年徵為尚書左僕射金紫光祿大夫卒時年七十四上為素服舉哀贈開府儀同三司諡曰景子亶嗣亶字世龍齊永元末父詳為南康王司馬隨府鎮荆州亶留京師為東昏聽政主帥及慧景作亂亶以捍禦功除驍騎將軍武帝起兵詳與長史蕭頴胄協同密遣人往都下迎亶亶乃齎宣德皇后令令南康王纂承大統建康城平以亶為尚書吏部郎俄遷侍中奉璽於武帝天監六年纍遷南郡太守父憂解職居喪盡禮廬于墓側遺財悉推諸弟八年起為司州刺史領安陸太守服闋襲封豐城縣公居州甚有威惠為邊人悅服歷都官尚書遷給事中右衛將軍纍遷吳興太守在郡復有惠政吏民圗其像立碑頌美焉普通五年為中護軍六年大舉北伐帝先遣豫州刺史裴邃帥譙州刺史湛僧智及明紹世魚𢎞張澄等自南道攻夀陽未克而邃卒乃加亶使持節以代邃與魏將河間王深臨淮王彧等相距頻戰克捷尋敕班師合肥須堰成復進七年夏淮堰水盛夀陽城將沒武帝復遣北道軍元樹帥彭寶孫陳慶等稍進亶帥湛僧智魚𢎞張澄等通清流澗將入淮肥魏軍夾肥築城出亶後亶與僧智還襲破之進攻黎漿貞威將軍韋放自北道會焉兩軍既合所向皆降下凡降城五十二獲男女口七萬五千人米二十萬碩詔以夀陽依前代置豫州合肥鎮改為南豫州以亶為豫南豫二州刺史加都督夀春久罹兵荒百姓多流散亶輕刑薄賦務農省役頃之民户充復卒於州鎮帝聞之即日素服舉哀贈車騎將軍諡曰襄州人夏侯簡等表請為亶立碑置祠詔許之亶美風儀寬厚有氣度獵涉文史辨給能專對宗人夏侯溢為衡陽內史辭日亶侍御坐帝謂亶曰夏侯溢於卿疏逺亶答云是臣從弟帝知溢於亶已疏乃曰卿傖人如何不辨族從亶對曰臣聞服屬易疏所以不忍言族時以為能對亶歷六郡三州不治産業祿賜所得隨散親故性儉素居處服用充足而已不事華侈晚年頗好音樂有妓妾十數人並無被服姿容每有客常隔簾奏之時謂簾為夏侯妓衣子誼襲封豐城縣公亶弟夔字季龍位大匠卿纍遷信武將軍司州刺史領安陸太守帥壯武將軍裴之禮直閣將軍任思祖出義陽道攻平靜穆陵陰山三關克之是時譙州刺史湛僧智圍魏東豫州刺史元慶和於廣陵入其郛魏將元顯伯率軍赴援僧智逆擊破之夔自武陽出會僧智斷魏軍歸路慶和於內築柵自固及夔至慶和遂請降夔乃登城拔魏幟建梁軍旗鼓衆莫敢妄動凡降男女四萬口收粟六十萬石元顯伯聞之夜遁追禽二萬餘人斬獲不可勝數由是義陽北道遂與魏絶及魏郢州刺史元顯逹降詔改為北司州以夔為刺史兼督司州封保城縣侯中大通六年遷豫州刺史加都督豫州積嵗連兵民頗失業夔乃率軍人於蒼陵立堰溉田千餘頃嵗收穀百餘萬石以充儲備兼贍貧人境內賴之夔兄亶先經此任至是夔又居焉兄弟並有恩惠於鄉里百姓歌之曰我之有州頻得夏侯前兄後弟布政優優在州七年逺近多附之有部曲萬人馬二千匹並服習精強為當時之盛性奢豪後房妓妾曵羅縠飾金翠者百數愛好人士不以貴勢自髙文武賔客恆滿坐時亦以此稱之卒於州諡曰桓子撰嗣官至太僕卿撰弟譒少粗險薄行常停鄉里領其父部曲為州助防刺史貞陽侯淵明引為府長史淵明被魏囚復為侯景長史景反譒前驅濟江頓兵士林館破邸第及居人富室子女財貨盡略有之淵明在州有四妾章施王阮並有國色淵眀被魏囚其妾並還都第譒至破第納焉魚𢎞襄陽人身長八尺白晳美姿容纍從征討常為軍鋒歷南譙盱台竟陵太守嘗語人曰我為郡有四盡水中魚鱉盡山中麞鹿盡田中米穀盡村里人民盡丈夫生世如輕塵栖弱草白駒之過隙人生但歡樂富貴在何時於是恣意酣賞侍妾百餘人不勝金翠服玩車馬皆窮一時之驚絶有眠牀一張皆是蹙柏四面周匝無一有異通用銀縷金花壽福兩重為腳為湘東王鎮西司馬述職西上道中乏食緣路採菱作菱米飯以給所部𢎞度之所後人覔一菱不得又於窮洲之上捕得數百獼猴膊以為脯以供酒食比及江陵資食復振逢敕迎瑞像王令送像下都𢎞率部曲數百悉衣錦袍赫奕滿道頗為人所慕塗經夏首李抗斆其為人抗舅元法僧聞之杖抗三百後為新興永寧太守卒官吉士瞻字梁容馮翊蓮勺人也少有志氣不事生業時徵士吳苞見其姿容勸以經學因誦鮑照詩云豎儒守一經未足識行藏拂衣不顧年逾四十忽忽不得志乃就江陵卜者王生計祿命王生曰君擁旄仗節非一州後一年當得戎馬大都及武帝起兵義陽太守王撫之天門太守王智逺武陵太守蕭強等並不從令鎮軍蕭頴胄遣士瞻討平之齊和帝即位以為領軍司馬士瞻少時嘗於南蠻國中擲博無禈褰露為儕輩所侮及平魯休烈軍得絹三萬匹乃作百禈其外並賜軍士不以入室以軍功除輔國將軍步兵校尉建康平為巴東相建平太守初士瞻為荆府城局參軍役萬人浚仗庫防火池得一金革鉤隱起鏤甚精巧篆文曰錫爾金鉤且公且侯士瞻娶夏侯詳兄女女竊以與詳詳喜佩之及是革命詳果封侯而士瞻不錫茅土天監二年入為直閣將軍歷位梁秦二州刺史加都督後為太子右衛軍又出為西陽武昌二郡太守在郡清約家無私積初士瞻夢得一積鹿皮從而數之有十一領及覺喜曰鹿者祿也吾當居十一祿乎自其仕進所蒞已久及除二郡心甚惡之遇疾不肯療普通七年卒於郡贈左衛將軍諡曰胡子子琨時在戎役聞問一踊而絶良久乃蘇不顧軍制輒離所部遂以孝聞詔下旌異蔡道恭字懷儉南陽冠軍人也父那宋益州刺史道恭少寬厚有大量仕齊纍有戰功遷西中郎南康王中兵參軍加輔國將軍武帝起兵南康王長史蕭頴胄以道恭舊將素著威略專相委任齊和帝即位遷右衛將軍巴西太守魯休烈等自巴蜀連兵寇上明以道恭為西討都督諸軍事大破之休烈等降於軍門遷司州刺史天監初論功封漢夀縣伯進號平北將軍三年魏圍司州時城中衆不滿五千人食裁支半嵗魏軍攻之晝夜不息乃作大車載土四面俱前欲以填塹道恭輒於塹內列艨艟鬭艦以待之魏人不得進又濳作伏道以決塹水道恭復載土豚塞之相持百餘日前後斬獲不可勝計魏造大梯衝車攻圍日急道恭用四石烏漆大弓射所中皆洞甲飲羽一發或貫兩人敵人望弓皆靡又於城內作土山厚二十餘丈多作大矟長二丈五尺施長刃使壯士執以刺魏人魏軍甚憚之將退會道恭疾篤乃呼兄子僧協從弟靈恩及諸帥謂曰吾受國厚恩不能滅寇今所苦轉篤勢不支久汝等當以死固節無令吾沒有遺恨又令取所持節受僧協曰稟命出疆憑此而已既不得奉以還朝方欲擕之同逝可與棺柩相隨衆皆流涕其年五月卒魏人知道恭死攻之轉急先是朝廷遣郢州刺史曹景宗赴援景宗不前至八月城內糧盡城乃陷詔贈鎮西將軍并尋購其喪櫬八年魏人許還道恭喪其家以女樂易之乃得歸葬于襄陽子淡嗣傳國至孫固早卒國除楊公則字君翼天水西縣人也父仲懷為宋豫州刺史殷琰將琰叛輔國將軍劉勔討琰仲懷力戰死於橫塘公則隨父在軍年未弱冠冒陳抱父尸號哭氣絶良久勔命還仲懷首公則斂畢徒步負喪歸里由此著名後果州刺史范百年版為宋熙太守領白馬戍主時氐賊李烏奴攻白馬公則固守經時矢盡糧絶陷於寇抗聲罵賊烏奴壯之更厚待焉要與同事公則偽許而圗之謀泄單馬逃歸梁州刺史王元邈以事表聞齊髙帝下詔褒美之除晉夀太守在仕清潔自守遷扶風太守母憂去官雍州刺史陳顯逹起為寧朔將軍領襄陽太守荆州刺史巴東王子響構亂公則進討事平遷武寧太守百姓便之入為前軍將軍和帝為荆州刺史公則為西中郎中兵參軍及蕭頴胄協同武帝起兵以公則為輔國將軍領西中郎􅖴議參軍率衆東下時湘州行事張寶積發兵自守未知所附公則回師南討寶積懼釋甲以俟命焉公則撫納之湘境遂定和帝即位授湘州刺史武帝軍次沔口公則率湘府之衆會帝於夏口時荆州諸軍悉受公則節度雖蕭頴逹宗室之貴亦𨽻焉郢城平武帝命諸軍即日俱下公則受命先驅徑掩柴桑江州既定連旌東下直造京邑公則號令嚴明秋毫不犯所在莫不賴焉大軍至新林公則自越城移屯領軍府壘北樓與南掖門相對嘗登樓望戰城中遙見麾蓋縱神鋒弩射之矢貫胡牀左右皆失色公則曰虜幾中吾腳談笑如初東昏夜選勇士攻公則柵軍中驚擾公則堅卧不起徐命擊之東昏軍乃退公則所領多是湘漢人性怯懦城內輕之以為易與每出蕩戰輒先犯公則壘公則奬厲軍士克獲更多及城平城內出者或被剝奪公則親率麾下列陳東掖門衛送公卿士庶故出者多由公則營焉進號左將軍還鎮南藩初公則東下湘部諸郡多未賔從及公則還州然後諸屯聚並散天監元年進號平南將軍封寧都縣侯湘州寇亂纍年人多流散公則輕刑薄斂頃之戶口充復公則為政雖無威嚴然勵已亷慎為吏民所悅湘俗單門多以賂求州職公則至悉斷之所辟引皆州郡著姓武帝班下諸州以為法則四年徴為中護軍代至乘二舸便發送故一無所取遷衛尉卿時朝廷始議北伐以公則功名素著至京師詔假節先屯洛口公則受命將發遘疾謂親友曰昔亷頗馬援以年老見遺猶自力請用今國家不以吾朽懦任以前驅方於古人見知重矣雖臨途疾苦豈可僶俯辭事若以馬革裹尸還葬此吾志也遂強起登舟至洛口夀春士女歸降者數千人魏豫州刺史薛恭度遣長史石榮等前鋒接戰公則即斬石榮等逐北至夀春去城數十里而返疾篤卒於師時年六十一武帝深痛惜之即日舉哀諡烈侯公則為人敦厚慈愛居家篤睦視兄子過於已子家財悉委焉性好學雖居軍旅手不輟卷士大夫以此稱之子瞟嗣有罪國除帝以公則勳臣特聽庶長子眺嗣眺固讓歷年乃受鄧元起字仲居南郡當陽人也少有膽幹旅力過人性任俠好賑施鄉里少年多附之齊世以軍功遷武寧太守永元末魏軍逼義陽元起自郡赴援蠻帥田孔明附於魏寇掠三關規襲夏口元起率鋭卒攻之旬月之間頻陷六城斬獲萬計餘黨悉皆走散仍戍三關每戰必捷勇冠當時敢死之士樂為用命者萬餘人武帝起兵蕭頴胄以書招之部曲多勸其還郢元起言於衆曰朝廷暴虐誅戮宰臣羣小用事衣冠道盡荆雍二州同舉大事何患不克且我老母在西豈容背夲若事不成正當受戮昏朝幸免不孝之罪即日治嚴上道至江陵為西中郎中兵參軍率衆與武帝會於夏口帝命王茂曹景宗及元起等圍郢和帝即位授廣州刺史平越中郎將中興元年七月郢州降以夲號為益州刺史仍為前軍先定尋陽及大軍進至京邑元起築壘於建陽門與王茂曹景宗等合兵長圍身當鋒鏑建康平遷征虜將軍天監初封當陽縣侯進號左將軍刺史如故始述職焉武帝之起益州刺史劉季連持兩端及聞元起將至遂發兵拒守元起至巴西巴西太守朱士略開門以待先時蜀人多逃亡至是竸出投元起皆稱起義應朝廷師人新故三萬餘元起在道日久軍糧乏絶或説之曰蜀郡政慢若檢巴西二郡籍注因而罰之所獲必厚元起然之涪令李膺諌曰使君前有嚴敵後無繼援山人始附於我觀德若紏以刻薄人必不堪衆心一離雖悔無及膺請出圗之不患資糧不足也元起曰善一以委卿膺退率富人上軍資米俄得三萬斛元起進屯西平季連始嬰城自守元起乃圍城柵其三面而塹焉益州兵亂日久人廢耕農內外苦飢道路斷絶季連計窮會武帝使赦其罪季連即日開城納元起元起送季連於京師武帝論平蜀功復進元起號平西將軍元起以鄉人庾黔婁為録事參軍又得荆州刺史蕭遙欣故客蔣光濟並厚待之任以州事黔婁甚清潔光濟多計謀相率為善政元起之克季連也城內財寶無所私勤恤人事口不論財色性能飲酒至一斛不亂及是絶之蜀土翕然稱焉元起舅子梁矜孫性輕脫與庾黔婁志行不同乃言於元起曰城中稱有三刺史節下何以堪之元起由此遂疏黔婁光濟而政迹稍減在州二年以母老乞歸供養詔許焉徴為右衛將軍以西昌侯蕭藻代之是時梁州刺史夏侯道遷以南鄭叛引魏將王景允孔陵攻東西晉夀並遣使告急衆勸元起救之元起曰朝廷萬里軍不卒至若寇賊侵淫方須撲討董督之任非我而誰何事忩忩便相催督黔婁等苦諌之皆不從其言武帝尋亦假元起節征討諸軍將救漢中比至魏已攻陷兩晉夀蕭藻將至元起頗營還裝糧儲器械略無遺者藻入城甚怨望之復求其良馬元起曰年少郎子何用馬為藻恚怒因表其逗留不憂軍事收付州獄元起於獄中自縊而死其麾下圍城哭且問其故藻懼曰天子有詔衆乃散遂誣以反帝疑焉有司追刻削爵土詔減邑之半封松滋縣侯故吏廣漢羅研詣闕訟之帝曰果如我所量也使讓藻曰元起為汝報讐汝為讐報讐忠孝之道如何乃貶藻號為冠軍將軍贈元起征西將軍給鼓吹諡忠侯羅研字深微少有材辨元起平蜀辟為主簿後為信安令故事置勸農謁者圍桑度田勞擾百姓研請除其弊帝從之鄱陽忠烈王恢臨蜀聞其名請為別駕及西昌侯藻重為刺史州人為之懼研舉止自若侯謂曰非我無以容卿非卿無以事我齊茍兒之役臨汝侯嘲之曰卿蜀人樂禍貪亂一至於此對曰蜀中積弊實非一朝百姓為村不過數家有食窮逼之人十有八九束縳之使旬有二三貪亂樂禍無足多怪若令家畜五母之雞二母之豕牀上有百錢布被甑中有數升麥飯雖蘇張巧説於前韓白按劍於後將不能使一夫為盜况貪亂乎大通二年為散騎侍郎鄱陽嗣王範將西忠烈王恢謂曰吾昔在蜀每事委羅研汝遵而勿失範至復以為別駕升堂拜母蜀人榮之數年卒官蜀土以文逹者唯研與同郡李膺膺字公允有才辨西昌侯藻為益州以為主簿使至都武帝悅之謂曰今李膺何如昔李膺對曰今當勝昔帝問其故對曰昔李膺事桓靈之主今李膺逢堯舜之君帝嘉其對以如意擊席者久之乃以為益州别駕著益州記三卷行於世初元起在荆州刺史隨王欲版元起為從事别駕庾蓽堅執不可元起恨之大軍既至京師蓽在城內甚懼及城平元起先遣人迎蓽語人曰庾別駕若為亂兵所殺我無以自眀因厚遺之少時又嘗至其西沮田舍有沙門造之乞米元起問曰今日有稻幾何封曰二千斛元起悉以施之時人稱其二者有大度元起初為益州過江陵迎其母母事道方居館中不肯出元起拜請同行母曰汝貧賤家兒忽得富貴詎可久保我寧死此不能與汝共入禍敗元起之至巴東聞蜀亂使蔣光濟筮之遇蹇因喟然嘆曰吾豈鄧艾而及此乎後果如筮子鏗嗣張惠紹字德繼義陽人也少有武幹仕齊為竟陵橫桑戍主母喪歸鄉里聞武帝起兵乃自歸纍有戰功及帝踐阼封石陽縣侯位驍騎將軍直閣左細仗主時東昏餘黨四百人竊入南北掖門夜燒神虎門害衛尉張𢎞䇿惠紹馳率所領赴戰賊乃散走遷太子右衛率以軍功纍增爵邑歷位衛尉卿左衛將軍司州刺史領安陸太守在州和理吏民親愛之徴還為左衛將軍加通直散騎常侍甲仗百人直衛殿中卒諡曰忠子登嗣纍有戰功與湛僧智胡紹世魚𢎞並為當時驍將歷官衛尉卿太子左衛率卒官諡曰愍馮道根字巨基廣平酇人也少孤家貧傭賃以養母行得甘肥不敢先食必遽還以遺母年十三以孝聞於鄉里郡召為主簿不就曰吾當封侯廟食安能為儒吏邪年十六鄉人蔡道班為湖陽戍主攻蠻錫城反為蠻所困道根救之匹馬轉戰提雙劍左右擊殺傷甚多道班獲免由是知名齊建武末魏孝文攻陷南陽等五郡明帝遣太尉陳顯逹等爭之師入汋均口道棖説顯逹曰汋均水急不如悉船於酇城方道步進顯逹不聼道根猶以私屬從軍及顯逹敗夜走賴道根指路以全尋為汋均口戍副以母喪還家聞武帝起兵乃謂所親曰金革奪禮古人不避揚名後世豈非孝乎時不可失吾其行矣共率鄉人子弟勝兵者悉歸武帝𨽻於王茂常為前鋒陷陳於朱雀航大戰斬獲尤多武帝即位以為驍騎將軍封增城縣男天監二年為南梁太守領阜陵戍初到阜陵修城隍逺斥候如敵將至者衆頗笑之道根曰怯防勇戰此之謂也修城未畢會魏將黨法宗傳豎眼等率衆二萬奄至城下道根塹壘未固城中衆少莫不失色道根命開城門緩服登城選精鋭二百人出與魏軍戰大破之魏軍因退遷輔國將軍六年魏攻鐘離詔豫州刺史韋睿救之道根為睿前驅至徐州建計據邵陽洲築壘掘塹以逼魏城道根能走馬步地計馬足以賦功城隍立辦及淮水長道根乘戰艦斷魏連橋魏軍敗績進爵豫寧伯八年拜豫州刺史領汝陰太守為政清簡境內安之纍遷右衛將軍道根性謹厚木訥少言為將能檢御部曲所過村陌將士不敢虜掠每征伐終不言功諸將喧譁爭競道根默然而已其部曲或怨非之道根喻之曰明主自鑒功夫多少吾將何事武帝嘗指道根示尚書令沈約曰此人口不論勳約曰此陛下之大樹將軍也歷處州郡和理清靜為下所懷在朝廷雖貴顯而性儉約所居宅不治牆屋無器服侍衛入其室則蕭然如素士之貧賤者當世服其清退帝亦雅重之微時不學既貴粗讀書自謂少文常慕周勃之器量十六年復假節信武將軍豫州刺史將行帝引朝臣宴别道根於武德殿召畫工使圗其形道根踧踖謝曰臣所可報國家者唯餘一死耳今天下太平臣恨無可死之地豫部重得道根民皆喜悅武帝每稱曰馮道根所在能使朝廷不復憶有一州居少時遇疾乞還朝廷徵為散騎常侍左軍將軍既至以疾卒於官是日輿駕春祠二廟及出宫有司以聞帝問中書舍人朱異曰吉凶同日今可行乎異對曰昔柳莊寢疾衛獻公當祭請於尸曰有臣柳莊非寡人之臣社稷之臣也聞其死請往不釋祭服而往遂以禭之道根雖末為社稷之臣亦有勞於王室臨之禮也駕即幸其宅哭之甚慟諡曰威子懷嗣康絢字長明華山藍田人也其先出自康居漢初置都護府盡臣西域康居亦遣侍子待詔於河西因留為居人其後即以康為氏晉時隴右亂遷於藍田絢曽袓因為苻堅太子詹事生穆穆為姚萇河南尹宋永初中穆率鄉族三千餘家入襄陽之峴南宋為置華山郡藍田縣寄治于襄陽以穆為秦梁二州刺史未拜卒絢世父元隆父元撫並為流人所推相繼為華山太守絢少倜儻有志氣齊武帝為雍州刺史所辟皆使名家絢特以才力召為西曹書佐永明二年除奉朝請後再遷為華山太守推誠撫循荒餘悅服永元二年武帝兵起絢舉郡以應之身率敢勇三千人私馬二百五十匹以從自是常領遊兵有急應赴斬獲居多天監元年封南陽縣男除竟陵太守十三年遷太子右衛率甲仗百人與領軍蕭景入直殿內絢身長八尺容貌絶倫雖居貴顯猶習武藝帝幸德陽殿戲馬敕絢馬射撫弦貫的觀者悅之其日上使畫工圗絢形遣中使持以問絢曰卿識此圗否其見親如此時魏降人王足陳計求堰淮水以灌夀陽足引北方童謡曰荆山為上格浮山為下格潼沱為激溝併灌巨野澤帝以為然使水工陳承伯材官將軍祖暅視地形咸謂淮內沙土漂輕不堅實其功必不可就帝弗納發徐揚人率二千户取五丁以築之假絢節都督淮上諸軍事并護堰作役人及戰士有衆二十萬於鐘離南起浮山北抵巉石依岸以築土合脊於中流十四年四月堰將合淮水漂疾輒復決潰衆患之或謂江淮多有蛟龍乘風雨決壞崖岸其性惡鐵因是引東西二冶鐵器大則釡鬲小則鋘鋤數千萬斤沉于堰所猶不能合乃伐樹為井幹填以巨石加土其上緣淮百里內岡陵木石無巨細必盡負擔者肩上皆穿夏日疾疫死者相枕蠅蟲晝夜聲相混合帝愍之遣尚書右僕射袁昻侍中謝舉假節慰勞之并加蠲復是冬寒甚淮泗盡凍士卒死者十七八帝遣賜以衣袴十一月魏遣將楊大眼揚聲決堰絢命諸軍撤營露次以待之遣其子悅拒戰斬魏咸陽王府司馬徐方興魏軍小却十五年四月堰乃成其長九里下闊一百四十丈上廣四十五丈髙二十丈深十九丈五寸夾之以堤并植杞柳軍人安堵列居其上其水清潔俯視邑居墳墓了然皆在其下或謂絢曰四瀆者天地所以節宣其氣不可久塞若鑿湫東注則遊波寬緩堰得不壞絢然之開湫東注又縱反間於魏曰梁所懼開湫魏人信之果鑿山深五丈開湫北注水日夜分流湫猶不減其月魏軍竟潰而歸水之所及夾淮方數百里地魏夀陽城戍稍徙頓八公山北南居人散就岡壠初堰起徐州界刺史張豹子謂已必尸其事既而絢以他官來監作豹子甚慚由是譖絢與魏交通帝雖不納猶以事畢徴絢除司州刺史領安陸太守絢既徴還豹子不修堰其秋淮水暴長堰壞奔流于海殺數萬人其聲若雷聞三百里水中怪物隨流而下或人頭魚身或龍形馬首殊類詭狀不可勝名祖暅坐下獄絢在州三年大修城隍號為嚴整普通元年除衛尉卿未拜卒輿駕即日臨哭諡曰壯絢寬和少喜懼在朝廷見人如不能言號為長厚在省每寒見省官有繿縷者輒遣遺以襦衣其好施如此子悅嗣昌義之歷陽烏江人也少有武幹為馮翊戍主武帝為雍州因事帝帝亦厚遇之及起兵版為輔國將軍軍主每戰必捷天監元年封永豐侯纍遷北徐州刺史鎮鐘離四年大舉北侵臨川王宏督衆軍向洛口義之為前將軍攻魏梁城戍尅之五年冬武帝以征役久詔班師魏中山王元英乘勢追攝攻沒馬頭等城城內糧貯魏悉移歸北議者咸謂無復南向帝曰此必進兵非其實也乃遣修鐘離城敕義之為戰守備是冬英果率衆數十萬圍鐘離衝車毁西墉時城中之衆才三千義之督率隨方抗禦前後殺傷萬計魏軍死者與城平六年帝遣曹景宗韋睿率衆二十萬救焉大破魏軍義之率輕兵追至洛口而還以功進號軍師將軍遷都督南兖州刺史坐以禁物出蕃為有司所奏免十三年纍遷左衛將軍是冬帝遣太子右衛率康絢督衆軍作荆山堰魏將李曇定大衆逼荆山揚聲決堰詔假義之節救絢軍未至絢等已破魏軍魏又遣大將軍李平攻硤石義之又率朱衣直閣王神念救之魏克硤石義之班師為有司所奏帝以其功臣不問十五年授北徐州刺史義之不知書所識不過十字性寬厚為將能得人死力及居藩任吏民安之改封營道縣侯徴為護軍將軍卒於官帝深痛惜之諡曰烈子寶景嗣張𢎞䇿字真簡范陽方城人文獻皇后之從父弟也父安之青州主簿南蠻行參軍𢎞䇿幼以孝聞母常有疾五日不食𢎞䇿亦不食母強為之進粥𢎞䇿乃食母所餘後遭母憂三年不食鹽菜幾至滅性兄弟友愛不忍暫離雖各有室常同卧起時比之薑肱兄弟𢎞䇿與武帝年相輩幼見親狎常隨帝遊處每入室常覺有雲氣體輒肅然𢎞䇿由此特加敬異建武末與兄𢎞胄從武帝宿酒酣徙席星下語及時事𢎞䇿因問帝曰緯象云何國家故當無恙乎帝曰天下方亂舅知之乎漢北有失地氣浙東有急兵祥今冬初魏軍必動動則亡漢北王敬則猜嫌已久當乘間而作𢎞䇿曰敬則張兩赤眼安能立事帝曰敬則庸才為天下唱先耳主上運祚盡於來年國權當歸江劉而江甚隘劉又暗弱帝今久疾外多異議萬一伺釁稽部且乘機而作是亦無成徒自驅除耳眀年都邑有大亂死人過於亂麻齊之歷數自兹亡矣梁楚漢當有英雄者興𢎞䇿曰瞻烏爰止于誰之屋武帝笑曰光武有云安知非僕𢎞䇿起曰今夜之言是天意也請定君臣之分武帝曰舅欲斆鄧晨乎是冬魏軍寇新野齊明帝命武帝將兵為援且授以密旨仍代曹虎監雍州事𢎞䇿聞之心喜謂武帝曰夜中言當驗武帝笑曰且勿多言𢎞䇿從武帝西行仍參帷幄身親勞役不憚辛苦五年秋明帝崩遺制以武帝為雍州刺史乃表𢎞䇿為録事參軍帶襄陽令武帝觀海內方亂有匡濟之心密為儲備謀猷所及唯𢎞䇿而已時帝長兄長沙宣武王懿罷益州還仍為西中郎長史行郢州事武帝使𢎞䇿到郢陳大計於懿曰昔晉惠庸主諸王爭權遂內難九興外寇三作方今喪亂有甚於此六貴爭權人握王憲制主畫敕各欲專權且嗣主在宫本無令譽媟近左右蜂目忍人一居萬機恣其所欲豈肯虛坐主諾委政朝臣積相嫌二必大誅戮始安欲為趙倫形迹已露蹇人上天信無此理且性猜狹徒取禍機所可當軸江劉而已祏怯而無斷暄弱而不才折鼎覆餗跂足可待蕭坦胸懷猜忌動言相傷徐孝嗣材非柱石聼人穿鼻若隙開釁起必中外土崩今得外藩幸圖身計及今猜防未生宜召諸弟以時聚集郢州控帶荆湘西注漢沔雍州士馬呼吸數萬時安則竭誠本朝時亂則為國翦暴如不早圖悔無及也懿聞之變色而心未之許及懿遇禍帝將起兵夜召𢎞䇿呂僧珍入定議旦乃發兵以𢎞䇿為輔國將軍主領萬人督後部事及郢城平蕭頴逹楊公則諸將皆欲頓軍夏口武帝以為宜乘勢長驅直指京邑惟𢎞䇿與帝意合又訪寧朔將軍庾域域又同即日上道遂緣江至建康凡磯浦村落軍行宿次立頓處所𢎞䇿預為圖皆在目中城平武帝遣𢎞䇿與呂僧珍先入清宮封檢府庫于時城中珍寶委積𢎞䇿申勒部曲秋毫無犯遷衛尉卿加給事中天監初加散騎常侍封洮陽縣侯𢎞䇿盡忠奉上知無不為交友故舊隨才薦拔縉紳皆趨焉時東昏餘黨孫文明等初逢赦令多未自安文明又嘗夢乘馬至雲龍門心惑其夢遂作亂帥數百人因運荻炬束仗得入南北掖門至夜作亂燒神虎門總章觀入衛尉府𢎞䇿踰垣匿于龍廄遇賊見害時年四十七賊又進燒尚書省及閣道雲龍門前軍司馬呂僧珍直殿省帥羽林兵邀擊不能却上戎服御前殿謂僧珍曰賊夜來是衆少曉則走矣命打五鼓賊謂已曉乃散官軍捕文明斬于東市張氏親屬臠肉之帝哭之慟曰痛哉衛尉天下事當復與誰論詔給𢎞䇿宅一區衣一襲錢十萬布百匹蠟二百斤贈車騎將軍諡曰愍侯𢎞䇿為人寬厚通率篤舊故及居隆重不以貴地自髙故人賔客接之如布衣祿賜皆散之親友及遇害莫不痛惜焉子緬嗣緬字元長年數嵗外祖中山劉仲德異之曰此兒非常器非止為張氏寶方當為海內令名也齊永元末武帝師起𢎞䇿從武帝向都留緬襄陽年始十嵗每聞軍有勝負憂喜形於顔色天監元年𢎞䇿遇害緬痛父之酷喪過於禮武帝每遣喻之服闋襲封洮陽縣侯召補國子生起家祕書郎出為淮南太守時年十八帝疑其年少未間吏事乃遣主書封取郡曹文案見其斷決允愜甚稱賞之再遷雲麾外兵參軍緬少勤學自課讀書手不輟卷尤明後漢及晉代衆家客有執卷質緬者隨問便對略無遺失殿中郎缺帝謂徐勉曰此曹舊用文學且居鵷行之首宜詳擇其人勉舉緬充選頃之為武陵太守還拜太子洗馬中舍人緬母劉氏以父沒家貧葬禮有闕遂終身不居正室不隨子入官府緬在郡所得祿俸不敢用乃至妻子不易衣裳及還都並供其母賑贍親屬雖纍載所蓄一朝隨盡緬私室常閴然如貧素者纍遷豫章內史緬為政任恩不設鉤巨吏民化其德亦不敢欺故老咸云數十年未有也後為御史中丞坐收捕人與外國使鬭左降黃門郎兼領先職俄復舊任居憲司推繩無所顧望號為徑直武帝乃遣畫工圖其形於臺省以勵當官中大通二年遷侍中未拜卒詔便舉哀昭明太子亦往臨哭緬愛墳籍聚書至萬餘卷抄後漢紀四十卷晉書三十卷又抄江左集未及成文集五卷子傳嗣緬弟纘字伯緒緬第三弟也出繼從伯𢎞籍𢎞籍武帝舅也梁初贈廷尉卿纘年十一尚帝弟四女富陽公主拜駙馬都尉封利亭侯召補國子生起家祕書郎時年十七身長七尺四寸眉目疏朗神采爽發武帝異之常曰張壯武云後八世有逮吾者其此子乎纘好學兄緬有書萬餘卷晝夜披讀殆不輟手祕書郎有四員宋齊以來為甲族起家之選待次入補其居職例不數十日便遷任纘固求不徙欲遍觀閣內書籍帝執四部書目曰君讀此畢乃可言優仕矣如此三載方遷太子舍人轉洗馬中舍人並掌管記纘與琅邪王錫齊名普通初魏使彭城人劉善明通和求詣纘與錫纘時年二十三善明見而嗟服纍遷尚書吏部俄而長兼侍中時人以為早逹河東裴子野曰張吏部有喉唇之任已恨其晚矣子野性曠逹自云年出三十不復詣人初未與纘相遇便虛相推重因為忘年之交大通中為吳興太守居郡省煩苛務在清靜吏民便之大同二年徴為吏部尚書纘居選後門寒素有一介之善者皆見引拔不為貴門屈意人士翕然稱之負其才氣無所與讓定襄侯祗無學術頗有文性與兄衡山侯恭俱為皇太子愛賞時纘從兄謐聿並不學問性又凡愚恭祗嘗預東宫盛集太子戲纘曰丈人謐聿皆何在纘從容曰纘有謐聿亦殿下之衡定也太子色慙或云纘從兄聿及弼愚短湘東王在坐問纘曰丈人二從聿弼藝業何如纘曰下官從弟雖並無多學術猶賢殿下之有衡定舉坐愕然其忤物如此五年武帝詔曰纘外氏英華朝中領袖司空已後名冠范陽可尚書僕射纘本寒門以外戚顯重髙自擬倫而詔有司空范陽之言深用為狹以朱異草詔與異不平初纘與參軍何敬容意趣不協敬容居權軸賔客輻湊有過詣纘纘輒距不前曰吾不能對何敬容殘客及是遷為讓表曰自出守肱股入居衡尺可以仰首伸眉論列是非者矣而寸襟所滯近蔽耳目深淺清濁豈能有預加以矯心飾貌酷非所間不喜俗人與之共事此言以指敬容也在職議南郊御乘素輦適古今之𠂻又議印綬官若備朝服宜並著綬時並施行改為湘州刺史述職經塗作南征賦初吳興吳規頗有才學邵陵王綸引為賔客深相禮遇及綸作牧郢蕃規隨從江夏遇纘出之湘鎮路經郢服綸餞之南浦纘見規在坐意不能平忽舉杯屬吳規曰此酒慶汝得陪今宴規尋起還其子翁孺見父不悅問而知之翁孺因氣結爾夜便卒規恨纘慟兒憤哭兼至信次之間又致殞規妻深痛父子翌日又亡時人謂張纘一杯酒殺吳氏三人其輕傲皆此類也至州務公平遣使十郡慰勞解放老疾吏役及關市戍邏先所防人一皆省併州界零陵衡陽等郡有莫徭戶者依山險為居歷政不賔服因此向化益陽縣人作田二頃皆異畝同穎在政四年流人自歸戶口增十餘萬州境大寧晚頗好積聚多寫圗書數萬卷有油二百斛米四千石他物稱是太清二年徙授領軍俄改雍州刺史初聞邵陵王綸當代已為湘州其後更用河東王譽纘素輕少王州府侯迎及資待甚薄譽深銜之及至州譽遂托疾不見纘仍檢括州府付度事留纘不遣會聞侯景寇京師譽理裝當下援荆州刺史湘東王繹與纘素有舊纘將因之以斃譽兄弟時譽及信州刺史桂陽王慥各率所領入援臺下慥至江津譽次江口湘東王屆郢州之武城屬侯景已請和武帝詔罷援軍譽自江口將還湘鎮欲待湘東至謁督府方還纘乃貽湘東王書曰河東載檣上水欲襲江陵嶽陽在雍共謀不逞江陵遊軍主朱榮又遣使報云桂陽住此欲應譽察湘東信之乃鑿船沈米斬纜而歸至江陵收慥殺之荆湘因構嫌隙纘尋棄其部曲擕其二女單舸赴江陵湘東遣使責讓譽索纘部下仍遣纘向襄陽前刺史嶽陽王察推遷未去鎮但以城西白馬寺處之會聞賊陷臺城察不受代州助防杜岸紿纘曰觀嶽陽不容使君使君素得物情若走入西山招集義舉事無不濟纘以為然因與岸兄弟盟乃要雍州人席引等於西山聚衆纘服婦人衣乘青布輿與親信十餘人奔引等杜岸馳告察察令中兵參軍尹正追討纘以為赴期大喜及至並禽之纘懼不免請為沙門名法緒察襲江陵常載纘隨後逼使為檄固辭以疾及軍敗退行至湕水南防守纘者慮追兵至遂害之棄尸而去元帝承制贈開府儀同三司諡簡憲公元帝少時纘便推誠委結及即位追思之嘗為詩序云簡憲之為人也不事王侯負才任氣見余則申旦逹夕不能己巳懷夫人之德何日忘之纘著鴻寶一百卷文集二十卷初纘往雍州資産悉留江陵性既貪婪南中資賄填積及死湘東王皆使收之書二萬卷並摙還齋珍寶財物悉付庫以糟鹽之屬還其家次子希字子顔早知名尚簡文第九女海鹽公主承聖初位侍中纘第四弟綰字孝卿少與兄纘齊名湘東王嘗䇿之百事綰對闕其六號為百六公位員外散騎常侍中軍宣城王長史俄徙御史中丞武帝遣綰弟中書舍人絢宣旨曰為國之急惟在執憲直繩用人之夲不限升降晉宋之世周閔蔡廓並以侍中為之卿勿疑是左遷也時宣城王府望重故有此旨焉大同四年元日舊制僕射中丞坐位東西廂時綰兄纘為僕射及百司就列兄弟並導騶分趨兩陛前代未有也時人榮之出為豫章內史在郡述制旨禮記正言義四姓衣冠士子聼者常數百人八年安城人劉敬宫挾妖道遂聚黨破郡縣進寇豫州刺史湘東王遣司馬王僧辨討賊受綰節度旬月間賊黨悉平十年復為御史中丞綰再為憲司彈糾無所廽避豪右憚之時城西開士林館聚學者綰與右衛朱異太府卿賀琛遞述制旨禮記中庸義太清三年為吏部尚書侯景陷宫城綰奔江陵湘東王承制授尚書右僕射江陵陷朝士皆俘入關綰以疾免卒於江陵次子交字少遊尚簡文第十一女定陽公主承聖二年官至祕書丞掌東宫管記庾域字司大新野人也少沈靜有名鄉曲文帝為郢州辟為主簿嘆美其才曰荆南杞梓其在斯乎加以恩禮長沙宣武王為梁州以為録事參軍帶華陽太守時魏軍攻圍南鄭州有空倉數十所域手自封題指示將士云此中粟皆滿足支二年但努力堅守衆心以安軍退以功拜羽林監及長沙王為益州域隨為南中郎記室懷寧太守罷任還家妻子猶事井臼而域所衣大布餘奉專充供養母好鶴唳域在任營求孜孜不怠一旦雙鶴來下論者以為孝感所致永元初南康王版西中郎咨議參軍母憂去職武帝起兵遣使以書招域西臺建以為寧朔將軍領行選從武帝東下師次陽口和帝遣御史中丞宗夬勞軍域乃諷夬曰黃鉞未加非所以總率侯伯夬反西臺即授武帝黃鉞蕭頴胄既都督中外諸軍事論者謂武帝應致箋域爭不聼乃止郢城平域及張𢎞䇿議與武帝同即命衆軍便下域每獻謀畫多被納用霸府初開以為咨議參軍天監初封廣牧縣子後軍司馬出為寧朔將軍巴西梓潼二郡太守梁州長史夏侯道遷降魏魏遣騎進襲巴西域固守百餘日城中糧盡將士皆齕草食土死者大半無有離心軍退詔增封進爵為伯于時兵後大飢域上表振貸不待報輒開倉為有司所紏上遷域西中郎司馬輔國將軍寧蜀太守卒於官子子輿字孝卿幼而岐嶷五嵗讀孝經手不釋卷或曰此書文句不多何用自苦答曰孝德之本何謂不多齊永眀末除州主簿時父在梁州遇疾子輿奔侍醫藥言淚恆并長沙宣武王省疾見之顧曰庾録事雖危殆可憂更在子輿尋丁母憂哀至輒嘔血父戒以滅性乃禁其哭泣梁初為尚書郎天監三年父出守巴西子輿以蜀路險難啓求侍從以孝養獲許父遷寧蜀子輿亦相隨父於路感心疾每痛至必呌子輿亦悶絶及父卒哀慟將絶者再奉喪還鄉秋水猶壯巴東有淫預石髙出二十許丈及秋至則才見如馬次有瞿塘大灘行旅忌之部伍至此石猶不見子輿撫心長呌其夜五更水忽退減安流南下及度水復舊行人為之語曰淫預如幞本不通瞿塘水退為庾公初發蜀有雙鳩巢舟中及至又栖廬側每聞哭泣之聲必飛翔簷宇悲鳴激切欲為父立佛寺未有定處夢有僧謂曰將修勝業嶺南原即可營造明往履歷果見標度處所若有人功因立精舍居墓所以終喪服闋手足拘攣待人而起仍布衣蔬食志守墳墓叔該謂曰汝若固志吾亦抽簪於是始仕雖以嫡長襲爵國秩盡推諸弟纍遷兼中郎司馬大通二年除巴陵內史便道之官路中遇疾或勸上郡就醫子輿曰吾疾患危重理難全濟豈可貪官陳尸公廨因勒門生不得輒入城市即於渚次卒遺令單衣帢履以斂酒脯施靈而已鄭紹叔字仲明榮陽開封人也纍世居夀陽祖琨宋髙平太守紹叔年二十餘為安豐令有能名後為本州治中從事史時刺史蕭誕弟諶被誅臺遣收誕兵使卒至左右驚散紹叔獨馳赴焉誕死侍送喪柩衆咸稱之既到京師司空徐孝嗣見而異之曰祖逖之流也武帝臨司州命為中兵參軍領長流因是厚自結附帝罷州還京師謝遣賔客紹叔獨固請願留帝曰卿才用幸自有餘我今未能相益宜更思他塗紹叔曰委質有日義無二心帝固不許於是乃還夀陽刺史蕭遙昌苦要引紹叔終不受命遙昌將囚之鄉人救解得免及帝為雍州刺史紹叔間道西歸補寧蠻長史扶風太守東昏既害朝宰頗疑武帝紹叔兄植為東昏直後東昏遣至雍州託候紹叔潛使為刺客至州紹叔知之密以白武帝帝於紹叔處置酒宴之戲植曰朝廷遣卿見圖今日間宴是見取良會也賔主大笑令植登臨城隍周觀府署士卒器械舟艫戎馬莫不富實植退謂紹叔曰雍州實力未易圖也紹叔曰兄還為天子言之兄若取雍州紹叔請以此衆一戰送兄於南峴相持慟哭而別東昏續遣主帥杜伯符亦欲為刺客詐言作使帝亦先知宴接如常伯符懼不敢發帝後即位作五字詩具及之帝初起兵紹叔為冠軍將軍改驃騎將軍從帝東下江州平留紹叔監州事謂曰蕭何鎮關中漢祖得成山東之業寇恂守河內光武建河北之基今之九江昔之河內我故留卿以為羽翼前途不捷我當其咎糧運不繼卿任其責紹叔流涕拜辭於是督江湘糧運事無闕乏天監初入為衛尉卿紹叔少失父家貧事母及祖母以孝聞奉兄恭謹及居顯要祿賜所得及四方饋遺悉歸之兄室忠於事上所聞纎毫無隱每為帝言事善則曰臣愚不及此皆聖主之䇿不善則曰臣智慮淺短以為其事當如是殆以此誤朝廷也臣之罪深矣帝甚親信之母憂去職紹叔有至性帝常使人節其哭頃之封營道縣侯復為衛尉卿以營道縣戶口凋弊改封東興縣侯三年魏圍合肥紹叔以本號督衆軍鎮東關事平復為衛尉既而義陽為魏所陷司州移鎮關南以紹叔為征虜將軍司州刺史紹叔至州創立城隍修治兵器廣田積穀招納流民百姓安之性頗矜躁以權勢自居然能傾心接物多所薦舉士類亦以此歸之六年徴為左衛將軍司豫州大中正紹叔至家疾篤詔於宅拜授輿載還府中使醫藥一日數至卒於府舍帝將臨其殯以紹叔宅巷狹陋不容輿駕乃止詔贈散騎常侍護軍將軍賜東園祕器衣一襲朝服一具諡曰忠紹叔卒後帝嘗澘然謂朝臣曰鄭紹叔立志忠烈善必稱君過即歸已當今殆無其比其見賞惜如此子貞嗣吕僧珍字元瑜東海范陽人也世居廣陵家甚寒賤童兒時從師受學有相工歷觀諸生指僧珍曰此兒有竒聲封侯相也年二十餘事文帝為門下書佐身長七尺七寸容貌甚偉在同類中少所褻狎曹輩皆憚之文帝為豫州刺史以為典籖帶蒙令文帝遷領軍補主簿祅賊唐宇之寇東陽文帝率衆東討使僧珍知諸軍衆局事僧珍宅在建陽門東自受命當行每日由建陽門道不過私室文帝以此益知之雍州王奐反敕遣僧珍𨽻將軍曹虎西討魏軍寇沔北司空陳顯逹出討一見僧珍甚異之因屏人呼上坐謂曰卿有貴相後當不見減於我努力為之建武二年魏軍南攻五道並進武帝率師援義陽僧珍從在軍中長沙宣武王時為梁州刺史被魏圍守連月義陽與雍州路斷間諜不通武帝欲遣使至襄陽求梁州問衆皆憚行僧珍固請充使因即日單舸上道及至襄陽督遣援軍且獲宣武王書而反帝甚嘉之東昏即位司空徐孝嗣管朝政欲要僧珍與共事僧珍揣非久安竟弗往時武帝已臨雍州僧珍固求西歸得補卭令及至帝命為中兵參軍委以心膂僧珍陰養死士歸之者甚衆帝頗招武猛士庶響從會者萬餘人因命按行城西空地將起數千間屋以為止舍多伐竹木沈於檀溪積茅蓋若山阜皆未之用僧珍獨悟其旨亦私具櫓數百張及兵起帝夜召僧珍及張𢎞䇿定議明旦乃會衆發兵悉取檀溪竹木裝為樓艦葺之以茅並皆立辦衆軍將發諸將果爭櫓僧珍乃出先所具每船賦二張爭者乃息帝以僧珍為輔國將軍步兵校尉出入卧內宣通意旨郢州平帝進軍以僧珍為前鋒大軍至江寧僧珍與王茂率精兵先登赤鼻邏其日東昏將李居士來戰僧珍大破之乃與茂進白板橋立壘茂移頓越城僧珍守白板李居士知城中衆少直來薄城僧珍謂將士曰今力不敵不可戰亦勿遙射須至塹裏當併力破之俄而皆越塹僧珍分人上城自率馬步三百人出其後內外齊擊居士等應時奔散建康城平帝命僧珍率所領先入清宫與張𢎞䇿封檢府庫武帝受禪以為冠軍將軍前軍司馬封平固縣侯再遷左衛將軍加散騎常侍入直祕書省總知宿衛天監四年冬大舉北伐自是軍機多事僧珍晝直中書省夜還祕書省五年旋軍以夲官領太子中庶子僧珍去家久表求拜墓帝欲榮之使為夲州乃授使持節平北將軍南兗州刺史僧珍在任見士大夫迎送過禮平心率下不私親戚兄弟皆在外堂並不得坐指客位謂曰此兗州刺史坐非吕僧珍牀及至別室促膝如故從父兄子先以販蔥為業僧珍既至乃棄業求州官僧珍曰吾荷國重恩無以報效汝等自有常分豈可妄求叨越但當速歸蔥肆耳僧珍舊宅在市北前有督郵廨卿人咸勸徙廨以益其宅僧珍怒曰督郵官廨也豈可徙之以益吾私宅乎姊適于氏住市西小屋臨路與列肆雜處僧珍常導從鹵簿到其宅不以為恥在州百日徴為領軍將軍直祕書省如先常以私車輦水灑御路僧珍既有大勳任總心膂恩遇隆密時莫與為比性甚恭慎當直禁中盛暑不敢解衣每侍御坐屏氣鞠躬對果食未嘗舉箸因醉後取一甘食武帝笑謂曰卿今日便是大有所進祿俸外又月給錢十萬其餘賜賚不絶於時初從帝攻郢州久不下咸欲走北僧珍獨不肯纍日乃見從一夜僧珍忽頭痛壯熱及明而顙骨益大其骨法蓋有異焉十年疾病車駕臨幸中使醫藥日有數四僧珍語親舊曰吾昔在蒙縣嘗病熱發黃時心謂必不濟矣主上見語云卿有富貴相必當不死俄而果愈吾今已富貴而復發黃所苦與昔正同必不復起矣竟如言卒于領軍府舍時年五十八帝即日臨殯贈驃騎將軍開府儀同三司常侍鼓吹如故給東園祕器朝服一具衣一襲喪事所須隨申備辦諡曰忠敬武帝痛惜之言為流涕子淡嗣初宋季雅罷南康郡市宅居僧珍宅側僧珍問宅價曰一千一百萬僧珍怪其貴季雅曰一百萬買宅一千萬買鄰及僧珍生子季雅往賀署函曰錢一千閽人少之弗為通強之乃進僧珍疑其故親自發乃金錢也遂言於帝陳其才能以為壯武將軍衡州刺史將行謂所親曰不可以負吕公在州大有政績臣謹按姚思亷之史謂吕僧珍為宋文帝門下書佐文帝為豫州以僧珍為典籖帶蒙令及文帝為丹陽尹又令僧珍為督郵僧珍以天監十年卒李延夀之史亦如此云而以宋文帝為梁文帝蓋誤也按宋史文帝永初中為荆州刺史未嘗為豫州據自宋初至天監十年凡九十餘年矣又姚史云僧珍年二十餘依宋丹陽尹劉秉秉誅後事太祖文皇帝如此則僧珍當時是一百幾二十嵗矣而云年五十八史家訛謬頗多舉僧珍傳可以知其他不必盡信也今無所考據但從其舊樂藹字蔚逺南陽淯陽人晉尚書令廣之六世孫也世居江陵方頤隆凖舉重醖藉其舅雍州刺史宗慤嘗陳器物試諸甥姪藹時尚幼無所取慤由此竒之又取史傳各一卷授藹等使讀畢言所記藹略讀具舉慤益善之齊豫章王嶷為荆州刺史以藹為驃騎行參軍領州主簿參知州事嶷嘗問藹風土舊俗域隍山川險易藹隨問立對若按圗牒嶷益重焉州人嫉之或譖藹廨門如市嶷遣覘之方見藹閉閣讀書後為大司馬記室永明八年荆州刺史巴東王子響稱兵反既敗焚燒府舍官曹文書一時蕩盡齊武帝引見藹問以西事藹占對詳敏帝悅焉用為荆州治中從事敕付以修復府州事藹還州繕治廨署數百區頃之咸畢而役不及民荆部之為壯觀自晉王悅移鎮以來府舍未之有也豫章王嶷薨藹解官赴喪率荆湘二州故吏建碑墓所南康王為西中郎以藹為咨議參軍武帝起兵蕭頴胄引藹及宗夬劉坦任以經略梁臺建遷尚書左丞時營造器甲船艦軍糧及朝廷儀憲悉資於藹焉天監初纍遷御史中丞領本州大中正初藹發江陵無故於船中得八車輻如中丞健步避道者至是果遷焉藹性公強居憲臺甚稱職時長沙宣武王將葬而車府忽於庫失油絡欲推主者藹曰昔晉武庫失火張華以為積油萬匹必然今庫若有灰非吏罪也既而檢之果有積灰時稱其博物𢎞恕二年出為冠軍將軍平越中郎將廣州刺史前刺史徐元瑜罷歸遇始興人士反逐內史崔睦舒因掠元瑜財産元瑜走歸廣州借兵於藹託欲討賊而實謀襲藹藹覺誅之尋卒於官藹姊適徴士同郡劉蚪亦明識有禮訓藹為州迎姊居官舍三分秩祿以供焉西土稱之子法才字元備幼與弟法藏俱有美名沈約見之曰法才實才子為建康令不受俸秩比去將至百金縣曹啓輸臺庫武帝嘉其清節曰居職若斯可為百城表矣遷太舟卿尋除南康內史法才恥以讓奉受名辭不拜歷位少府卿江夏太守因被代表求便道還鄉至家割宅為寺栖心物表尋卒法藏位征西録事參軍早亡子子雲美容貌善舉止位江陵令元帝承制除光祿卿魏克江陵衆奔散呼子雲子雲曰終為虜矣不如守以死節遂仆地卒於馬蹄之下通志卷一百三十九
