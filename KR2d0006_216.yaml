body:
  text: 通志卷一百九十二宋右迪功郎鄭樵漁仲撰載記第七南涼秃髮烏孤利鹿孤傉檀南燕慕容德超慕容鍾封孚北涼沮渠蒙遜牧犍南涼秃髮烏孤河西鮮卑人也其先與後魏同出八世祖匹孤率其部自塞北遷于河西其地東至麥田牽屯西至濕羅南至澆河北接大漠匹孤卒子夀闐立初夀闐之在孕母胡掖氏因寢而産于被中鮮卑謂被為秃髮因而氏焉夀闐卒孫樹機能立壯果多謀略泰始中殺秦州刺史胡烈于萬斛堆敗涼州刺史蘇愈于金山盡有涼州之地武帝為之旰食後為馬隆所敗部下殺之以降從弟務丸立死孫推斥立死子思復鞬立部衆稍盛烏孤即思復鞬之子也及嗣位務農桑修鄰好吕光遣使署為假節冠軍大將軍河西鮮卑大都統廣武縣侯烏孤謂諸將曰吕氏逺來假授當可受不衆咸曰吾士衆不少何故屬人烏孤將從之其將石真若留曰今夲根未固理宜隨時光德刑修眀境內無虞若致死于我者大小不敵後雖悔之無所及也不如受而遵養之以待其釁烏孤乃受之烏孤討乙弗折掘二部大破之遣其將石亦干築廉川堡以都之烏孤登廉川大山泣而不言石亦干進曰臣聞主憂臣辱主辱臣死大王所為不樂者將非吕光乎光年已衰老師徒屢敗今我以士馬之盛保據大川乃可以一擊百光何足懼也烏孤曰光之衰老亦吾所知但我祖宗以德懷逺殊俗憚威盧陵契汗萬里委順及吾承業諸部背叛邇既乖違逺何以附所以泣耳其將苻渾曰大王何不振旅誓衆以討其罪烏孤從之大破諸部吕光封烏孤廣武郡公又討意云鮮卑大破之光又遣使署烏孤征南大將軍益州牧左賢王烏孤謂使者曰吕王昔以専征之威遂有此州不能以德柔逺惠安黎庶諸子貪淫三甥肆暴郡縣土崩下無生賴吾安可違天下之心受不義之爵帝王之起豈有常哉無道則滅有德則昌吾將順天人之望為天下之主留其鼓吹羽儀謝其使而遣之隆安元年自稱大都督大將軍大單于西平王赦其境內年號太初曜兵廣武攻克金城光遣將軍竇茍來伐戰于街亭大敗之降光樂都湟河澆河三郡嶺南羌胡數萬落皆附之光將楊軌王乞基率户數千來奔烏孤更稱武威王後三嵗徙于樂都署弟利鹿孤為驃騎大將軍西平公鎮安夷傉檀為車騎大將軍廣武公鎮西平以楊軌為賓客金石生時連珍四夷之豪俊隂訓郭幸西州之德望楊統楊貞衛殷麴丞眀郭黃郭奮史皓鹿嵩文武之秀傑梁昶韓匹張昶郭韶中州之才令金樹薛翹趙振王忠趙朝蘇霸秦雍之世門皆內居顯位外宰郡縣官方授才咸得其所烏孤從容謂其羣下曰隴右區區數郡地耳因其兵亂分裂遂至十餘乾歸擅命河南段業阻兵張掖虐氐假息偷據姑臧吾藉父兄遺烈思廓清西夏兼弱攻昧三者何先楊統進曰乾歸夲我所部終必歸服假業儒生才非經世權臣擅命制不由已千里伐人糧運懸絶且與我鄰好許以分災共患乘其危弊非義舉也吕光衰老嗣紹沖暗二子纂𢎞雖頗有文武而內相猜忌若天威臨之必應鋒瓦解宜遣車騎鎮浩舋鎮北據廉川乘虛迭出多方以誤之救右則擊其左救左則擊其右使纂疲于奔命人不得安其農業兼弱攻昧于是乎在不出二年可以坐定姑臧姑臧既拔二寇不待兵戈自然服矣烏孤然之遂隂有吞并之志假業為吕纂所侵遣利鹿孤救之纂懼燒氐池張掖榖麥而還以利鹿孤為涼州牧鎮西平追傉檀入録府國事是嵗烏孤因酒墜馬傷脅笑曰幾使吕光父子大喜俄而患甚顧謂羣下曰方難未靜宜立長君言終而死在王位三年偽諡武王廟號烈祖弟利鹿孤立利鹿孤以隆安三年即偽位赦其境內殊死已下又徙居于西平使記室監麴梁眀聘于段業業曰貴主先王創業啓運功髙先世宜為國之太祖有子何以不立梁眀曰有子羌奴先王之命也業曰昔成王弱齡周召作宰漢昭八嵗金霍夾輔雖嗣子沖幼而二叔休眀左提右挈不亦可乎梁眀曰宋宣能以國讓春秋美之孫伯符委事仲謀終開有吳之業且兄終弟及殷湯之制也亦聖人之格言萬代之通式何必允已為是紹兄為非業曰美哉使乎之義也利鹿孤聞吕光死遣其將金樹蘇翹率騎五千屯于昌松漠口既逾年赦其境內改元曰建和二千石長吏清髙有惠化者皆封亭侯關內侯吕纂來伐使傉檀距之纂士卒精鋭進度三堆三軍擾懼傉檀下馬據胡牀而坐士衆心乃始安與纂戰敗之斬二千餘級纂西擊段業傉檀率騎一萬乘虛襲姑臧纂弟緯守南北城以自固傉檀置酒于朱眀門上鳴鐘鼓以饗將士耀兵于青陽門虜八千餘户而歸乞伏乾歸為姚興所敗率騎數百來奔處之晉興待以上賓之禮乾歸遣子謙等質于西平鎮北將軍俱延言于利鹿孤曰乾歸夲我之屬國妄自尊立理窮歸命非有欵誠若奔東秦必引師西侵非我利也宜徙于乙弗之間防其越逸之路利鹿孤曰吾方𢎞信義以收天下之心乾歸投誠而徙之四海將謂我不可以誠信託也俄而乾歸果奔于姚興利鹿孤謂延曰不用卿言乾歸果叛卿為吾行也延追乾歸至河不及而還利鹿孤立二年龍見于長寧麒麟遊于綏羌于是羣臣勸進以隆安五年僭稱河西王其將鍮勿崘進曰昔我先君肇自幽朔被髮左袵無冠冕之儀遷徙不常無城邑之制用能中分天下威振殊境今建大號誠順天心然寧居樂士非貽厥之規倉府粟帛生敵人之志且首兵始號事必無成陳勝項籍前鑒不逺宜署晉人于諸城勸課農桑以供軍國之用我則習戰法以誅未賓若東西有變長算以縻之如其敵強于我徙而以避其鋒不亦善乎利鹿孤然其言于是率師伐吕隆大敗之獲其右僕射楊桓傉檀謂之曰安寢危邦不思擇木老為囚虜豈曰智也桓曰受吕氏厚恩位忝端二雖洪水淹天猶欲濟彼俱溺實恥為叛臣以見眀主傉檀曰卿忠臣也以為左司馬祠部郎中史皓謂利鹿孤曰古之王者行師以全軍為上破國次之拯溺救焚東征西怨今不以綏寧為先唯以徙户為務安土重遷故有離叛所以斬將克城土不加廣今取士拔才必先弓馬文章學藝為無用之條非所以來逺人垂不朽也孔子曰不學禮無以立宜建學校開庠序選耆德碩儒以訓胄子利鹿孤善之于是以田元沖趙誕為博士祭酒以教胄子時利鹿孤雖僭位尚臣姚興楊桓兄經佐命姚萇早死興聞桓有德望徴之利鹿孤不敢留為之流涕而遣之利鹿孤又遣傉檀攻吕隆昌松太守孟褘于顯美克之傉檀執褘而數以不降之罪褘曰夫能忠于彼者必亦忠于此褘受吕氏厚恩受藩屏之任眀公至而歸命執事謂何傉檀大説釋其縛待以客禮徙顯美麗靬二千餘户而歸嘉褘忠烈拜左司馬褘請曰為人守而不全復忝顯任竊所未安如得眀公之恩俾就戮于姑臧死且不朽傉檀義而許之吕隆為沮渠蒙遜所伐遣使乞師利鹿孤引羣下議之尚書左丞婆衍崘曰二寇相殘適足為吾取之資不宜救也傉檀曰姑臧河西一都之會不可使蒙遜據之宜在速救利鹿孤曰車騎之言吾之心也遂遣傉檀率騎一萬救之至昌松而蒙遜已退傉檀徙涼澤假冡五百餘家而歸利鹿孤寢疾令曰內外多虞國機務廣其令車騎嗣業以成先王之志在位三年而死葬于西平之東偽諡曰康王弟傉檀嗣傉檀少機警有才略其父竒之謂諸子曰傉檀眀識幹藝非汝等輩也是以諸兄不以授子欲傳之于傉檀及利鹿孤即位垂拱而已軍國大事皆以委之以元興元年僭號涼王遷于樂都改元曰𢎞昌初乞伏乾歸之在晉興也以世子熾磐為質後熾磐逃歸為追騎所執利鹿孤命殺之傉檀曰臣子逃歸君父振古通義故魏武善關羽之奔秦昭恕頃襄之逝熾磐雖逃叛孝心可嘉宜垂全宥以𢎞海嶽之量乃赦之至是熾磐又奔允街傉檀歸其妻子姚興遣使拜傉檀車騎將軍廣武公傉檀大城樂都姚興遣將齊難率衆迎吕隆于姑臧傉檀攝昌松魏安二戍以避之興涼州刺史王尚遣主簿宗敞來聘敞父燮吕光時自湟河太守入為尚書郎見傉檀于廣武執其手曰君神爽宏拔逸氣凌雲命世之傑也必當克清世難恨吾年老不及見耳以敞兄弟託君至是傉檀謂敞曰孤以常才謬為尊先君所見稱每自恐有纍大人水鏡之眀及忝家業竊有懷君子詩云中心藏之何日忘之不圗今日得見卿也敞曰大王仁侔魏祖存念先人雖朱暉眄張堪之孤叔向撫汝齊之子無以加也酒酣語及平生傉檀曰卿魯子敬之儔恨不與卿共成大業耳傉檀以姚興之盛又密圗姑臧乃去其年號罷尚書丞郎官遣參軍關尚聘于興興謂尚曰車騎投誠獻欵為國藩屏擅興兵衆輒造大城為臣之道固若是乎尚曰王侯設險以自固先王之制也所以安人衛衆豫備不虞車騎僻在遐藩密邇勍寇南則逆羌未賓西則蒙遜跋扈蓋為國家重門之防不圖陛下忽以為嫌興笑曰卿言是也傉檀遣其將文支討南羌西虜大破之上表姚興求涼州不許加傉檀𣪚騎常侍增邑二千户傉檀于是率師伐沮渠蒙遜次于氐池蒙遜嬰城固守芟其禾苗至于赤泉而還獻興馬三千匹羊三萬頭興乃署傉檀為使持節都督河右諸軍事車騎大將軍領護胸奴中郎將涼州刺史常侍公如故鎮姑臧傉檀率步騎三萬次于五澗興涼州刺史王尚遣辛鼂孟褘彭敏出迎尚出自清陽門鎮南文支入自涼風門宗敞以别駕送尚還長安傉檀曰吾得涼州三千餘家情之所寄唯卿一人奈何捨我去乎敞曰今送舊君所以忠于殿下傉檀曰吾今新牧貴州懷逺安邇之略為之若何敞曰涼土雖弊形勝之地道由人𢎞實在殿下段懿孟褘武威之宿望辛鼂彭敏秦隴之冠冕裴敏馬輔中州之令族張昶涼國之舊允張穆邉憲文齊楊班梁嵩趙昌武同飛羽以大王之神略撫之以威信農戰並修文教兼設可以從橫于天下河右豈足定乎傉檀大悅賜敞馬二十匹于是大饗文武于謙光殿班賜金馬各有差遣西曹從事史皓聘于姚興興謂皓曰車騎坐定涼州衣錦夲國其德我乎皓曰車騎積德河西少播英問王威未接投誠萬里陛下官方任才量功授職彛倫之常何德之有興曰朕不以州授車騎者車騎何從得之皓曰使河西雲擾吕氏顛狽者實由車騎兄弟傾其根夲陛下雖鴻羅遐被涼州猶在天網之外故征西以周召之重力屈姑臧齊難以王旅之盛勢挫張掖王尚孤城獨守外逼羣狄陛下不連兵十年殫竭中國涼州未易取也今以虛名假人內收大利乃知妙算自天聖與道合雖云遷授蓋亦時宜興悅其言拜騎都尉傉檀宴羣寮于宣德堂仰視而歎曰古人言作者不居居者不作信矣孟褘曰張文王築城苑繕宫廟為貽厥之資萬世之業秦師濟河漼然瓦解梁熙據全州之地擁十萬之衆軍敗于酒泉身死于彭濟吕氏以排山之勢王有西夏率土崩離銜璧秦雍寬饒有言富貴無常忽輒易人此堂之建年垂百載十有二主唯信順可以久安仁義可以永固願大王勉之傉檀曰非君無以聞讜言也傉檀雖受制于姚興然車服禮章一如王者以宗敞為太府主簿録記室事傉檀偽遊澆河襲徙西平湟河諸羌三萬餘户于武興番禾武威昌松四郡徴集戎夏之兵五萬餘人大閲于方亭遂伐沮渠蒙遜入西硤蒙遜率衆來距戰于均石為蒙遜所敗傉檀率騎二萬運榖四萬石以給西郡蒙遜攻西郡陷之其後傉檀又與赫連勃勃戰于陽武為勃勃所敗將佐死者十餘人傉檀與數騎奔南山幾為追騎所得傉檀懼東西寇至徙三百里內百姓入于姑臧國中駭怨屠各成七免因百姓之擾也率其屬三百人叛傉檀于北城推梁貴為盟主貴閉門不應一夜衆至數千殿中都尉張猛大言于衆曰主上陽武之敗蓋恃衆故也責躬悔過眀君之義諸君何故從此小人作不義之事殿內虎旅正爾相尋目前之危悔將無及衆聞之咸𣪚七免奔晏然殿中騎將白路等追斬之軍咨祭酒梁裒輔國司馬邉憲等七人謀反傉檀悉誅之姚興以傉檀外有陽武之敗內有邉梁之亂遣其尚書郎韋宗來觀釁傉檀與宗論六國從橫之規三家戰爭之略逺言天命廢興近陳人事成敗機變無窮辭致清辨宗出而歎曰命世大才經綸名教者不必華宗夏士撥煩理亂澄氣濟世者亦未必八索九邱五經之外冠冕之表復自有人車騎神機秀發信一代之偉人由余日磾豈足為多也宗還長安言于興曰涼州雖殘弊之後風化未頽傉檀權詐多方憑山河之固未可圗也興曰勃勃以烏合之衆尚能破之吾以天下之兵何足克也宗曰形移勢變終始殊途陵人者易敗自守者難攻陽武之役傉檀以輕勃勃致敗今以大軍臨之必自固求全臣竊料羣臣無傉檀匹也雖以天威臨之未見其利興不從乃遣其將姚弼及斂成等率步騎三萬來伐又使其將姚顯為弼等後繼遺傉檀書云遣尚書左僕射齊難討勃勃懼其西逸故令弼等于河西邀之傉檀以為然遂不設備弼衆至漠口昌松太守蘇霸嬰城固守弼喻霸令降霸曰汝違負盟誓伐委順之藩天地有靈將不祐汝吾寧為涼鬼何降之有城陷斬霸弼至姑臧屯于西苑州人王鍾宋鍾王娥等密為內應候人執其使送之傉檀欲誅其元首前軍伊力延侯曰今強敵在外內有姦豎兵交勢踧禍難不輕宜悉坑之以安內外傉檀從之殺五千餘人以婦女為軍賞命諸郡縣悉驅牛羊于野斂成縱兵虜掠傉檀遣其鎮北俱延鎮軍敬歸等十將率騎分擊大敗之斬首七千餘級姚弼固壘不出傉檀攻之未克乃斷水上流欲以持久斃之會雨甚堰壞弼軍乃振姚顯聞弼敗兼道赴之軍勢甚盛遣射將孟欽等五人挑戰于涼風門弦未及發材官將軍宋益等馳擊斬之顯乃委罪斂成遣使謝傉檀引師而歸傉檀于是僭即涼王位赦其境內改年為嘉平置百官立夫人折掘氏為王后世子虎臺為太子録尚書事左長史趙鼂右長史郭幸為尚書左右僕射鎮北俱延為太尉鎮軍敬歸為司𨽻校尉自餘封署各有差遣其左將軍枯木駙馬都尉胡康伐沮渠蒙遜掠臨松人千餘户而還蒙遜大怒率騎五千至于顯美方亭破車蓋鮮卑而還俱延又伐蒙遜大敗而歸傉檀將親率衆伐蒙遜趙鼂及太史令景保諌曰今太白未出嵗星在西宜以自守難以伐人傉檀怒以為沮衆保復切諌傉檀遂鎖保而行曰有功當殺汝以徇無功封汝百户侯既而蒙遜率衆來距戰于窮泉傉檀大敗單馬奔還景保為蒙遜所擒讓之曰卿眀於天文為彼國所任違天犯順智安在乎保曰臣匪為無智但言而不從蒙遜曰昔漢祖困于平城以婁敬為功袁紹敗于官渡而田豐為戮卿䇿同二子貴主未可量也卿必有婁敬之賞者吾今放卿但恐有田豐之禍耳保曰寡君雖才非漢祖猶不同夲初正可不得封侯豈慮禍也蒙遜乃免之至姑臧傉檀謝之曰卿孤之蓍龜也而不能從之孤之深罪封保安亭侯蒙遜進圍姑臧百姓懲東苑之戮悉皆驚散疊掘麥田車蓋諸部盡降于蒙遜傉檀遣使請和蒙遜許之乃遣司𨽻校尉敬歸及子他為質歸至胡坑逃還他為追兵所執蒙遜徙其衆八千餘户而歸右衛折掘竒鎮據石驢山以叛傉檀懼為蒙遜所滅又慮竒鎮克嶺南乃遷于樂都留大司農成公緒守姑臧傉檀始出城焦諶王侯等閉門作難收合三千餘家保據南城諶推焦眀為大都督龍驤大將軍諶為涼州刺史降于蒙遜鎮軍敬歸討竒鎮于石驢山戰敗死之蒙遜因克姑臧之威來伐傉檀遣其安北假茍左將軍雲連乘虛出番禾以襲其後徙三千餘家于西平蒙遜圍樂都三旬不克遣使謂傉檀曰若以寵子為質我當還師傉檀曰去否任卿兵勢卿違盟無信何質以供蒙遜怒築室返耕為持久之計羣臣固請乃以子安周為質蒙遜引歸吐谷渾樹洛干率衆來伐傉檀遣其太子虎臺距之為洛干所敗傉檀又將伐蒙遜邯川護軍孟愷諫曰蒙遜初并姑臧凶勢甚盛宜固守伺隙不可妄動不從五道俱進至番禾苕藋掠五千餘户其將屈右進曰陛下轉戰千里前無完陳徙户資財盈溢衢路宜倍道旋師早度峻險蒙遜善于用兵士衆習戰若輕軍卒至出吾慮表大敵外逼徙户內攻危之道也衛尉伊力延曰我軍勢方盛將士勇氣自倍彼徒我騎勢不相及若倍道旋師必捐棄資財示人以弱非計也屈右出而告其諸弟曰吾言不用天命也此吾兄弟死地俄而昏霧風雨蒙遜軍大至傉檀敗績而還蒙遜進圍樂都傉檀嬰城固守以子染干為質蒙遜乃歸久之遣安西紇勃耀兵西境蒙遜侵西平徙户掠牛馬而還邯川護軍孟愷表鎮南湟河太守文支荒酒愎諌不恤政事傉檀召文支而讓之文支頓首陳謝邯川人衛章等謀殺孟愷南啓乞伏熾磐郭越止之密以告愷愷誘章等飲酒殺四十餘人愷懼熾磐軍之至馳告文支文支遣將軍匹珍赴之熾磐軍到城聞珍將至引歸蒙遜又攻樂都二旬不克而還鎮南文支以湟河降蒙遜徙五千餘户于姑臧蒙遜又來伐傉檀以太尉俱延為質蒙遜乃引還傉檀議欲西征乙弗孟愷切諌弗聼謂其太子虎臺曰今不種多年內外俱窘事宜西行以拯此弊蒙遜近去不能卒來旦夕所慮唯在熾磐彼名微衆寡易以討禦吾不過一月自足周旋汝謹守樂都無使失墜傉檀乃率騎七千襲乙弗大破之獲牛馬羊四十餘萬熾磐乘虛來襲撫軍從事中郎尉肅言于虎臺曰今外城廣大難以固守宜聚國人于內城肅等率諸晉人距戰于外如或不捷猶有萬全虎臺曰小賊蕞爾旦夕當走卿何慮之過也虎臺懼晉人有二心也乃召豪望有勇謀者閉之于內孟愷泣曰熾磐不道人神同憤愷等進則荷恩重遷退顧妻子之纍豈有二乎今事已急矣人思自效有何猜邪虎臺曰吾豈不知子忠實懼餘人脫生意表以君等安之耳一旬而城潰安西樊尼自西平奔告傉檀傉檀謂衆曰今樂郡為熾磐所陷男夫盡殺婦女賞軍雖欲歸還無所赴也卿等能與吾籍乙弗之資取契汗以贖妻子者是所望也不爾歸熾磐便為奴僕矣豈忍見妻子在他懷抱中遂引師而西衆多逃返遣鎮北段茍追之茍亦不還于是將士皆散唯中軍紇勃後軍洛肱安西樊尼散騎侍郎隂利鹿在焉傉檀曰蒙遜熾磐昔皆委質于吾今而歸之不亦鄙哉四海之廣匹夫無所容其身何其痛也蒙遜與吾名齊年比熾磐姻好少年俱其所忌勢皆不濟與其聚而同死不如分而或全樊尼長兄之子宗部所寄吾衆在北者户垂一萬蒙遜方招懷遐邇存亡繼絶汝其西也紇勃洛肱亦與尼俱吾年老矣所適不容寧見妻子而死遂歸熾磐唯隂利鹿隨之傉檀謂利鹿曰去危就安人之常也吾親屬皆𣪚卿何獨留利鹿曰臣老母在家方寸實亂但忠孝之義義不俱全雖不能西哭沮渠申包胥之誠東感秦援展毛遂之操負羈靮而侍陛下者臣之分也惟願開𢎞逺猷審進止之算傉檀歎曰知人固未易人亦未易知大臣親戚皆棄我去終始不虧者唯卿一人嵗寒不凋見之于卿傉檀至西平熾磐遣使郊迎待以上賓之禮初樂都之潰也諸城皆降于熾磐傉檀將尉賢政固守浩舋不下熾磐呼之曰樂都已潰卿妻子皆在吾間孤城獨守何所為也賢政曰受涼王厚恩為國家藩屏雖知樂都已陷妻子為擒先歸獲賞後順受誅然不知主上存亡未敢歸命妻子小事豈足動懷昔羅憲待命晉文亮之文聘後來魏武不責邀一時之榮忘委付之重竊用恥焉大王亦安用之哉熾磐乃遣虎臺手書喻政政曰汝為國儲不能盡節面縛于人棄父負君虧萬世之業賢政義士豈如汝乎既而聞傉檀至左南乃降熾磐以傉檀為驃騎大將軍封左南公嵗餘為熾磐所鴆左右勸傉檀解藥傉檀曰吾病豈宜療邪遂死時年五十一在位十三年偽諡景王虎臺後亦為熾磐所殺傉檀少子保周獵于破羌俱延子覆龍鹿孤孫副周烏孤孫承鉢皆奔沮渠蒙遜久之歸魏魏以保周為張掖王覆龍酒泉公破羌西平公副周永平公承鉢昌松公烏孤以安帝隆安元年僭立至傉檀三世凡十八年以安帝義熙十年滅南燕慕容德字元眀皓之少子也母公孫氏夢日入臍中晝寢而生德年未弱冠身長八尺二寸姿貌雄偉額有日角偃月重文博觀羣書性清慎多才藝慕容俊之僭立也封為梁公厯幽州刺史左衛將軍及暐嗣位改封范陽王稍遷魏尹加散騎常侍俄而苻堅將苻雙據陕以叛堅將苻栁起兵枹罕將應之德勸暐乘釁討堅辭旨慷慨識者言其有逺略暐竟不能用德兄垂甚壯之因共論軍國大謀言必切至垂謂之曰汝器識長進非復吳下阿蒙也枋頭之役德以征南將軍與垂擊敗晉師及垂奔苻堅德坐免職後遇暐敗徙于長安苻堅以為張掖太守數嵗免歸及堅以兵臨江拜德為奮威將軍堅之敗也堅與張夫人相失慕容暐將護致之德正色謂暐曰昔楚莊滅陳納巫臣之諫而棄夏姬此不祥之人惑亂人主戎事不邇女器秦之敗師當由于此宜掩目而過奈何將衛之也暐不從德馳馬而去之還次滎陽言于暐曰昔句踐捷于會稽終獲吳國聖人相時而動百舉百全天將悔禍故使秦師喪敗宜乘其弊以復社稷暐不納乃從垂如鄴及垂稱燕王以德為車騎大將軍復封范陽王居中鎮衛參斷政事久之遷司徒于時慕容永據長子有衆十萬垂議討之羣臣咸以為疑獨德議與垂合遂以滅永垂臨終戒其子寶以鄴城委德寶既嗣位以德為使持節都督冀兖青徐荆豫六州諸軍事特進車騎大將軍冀州牧領南蠻校尉鎮鄴罷留臺以都督専總南夏魏將拓拔章攻鄴德遣南安王慕容青等夜擊敗之魏師退次新城青等請擊之别駕韓􅒲進曰古人先決勝廟堂然後攻戰今魏不可擊者四燕不宜動者三魏懸軍逺入利在野戰一不可擊也深入近畿頓兵死地二不可擊也前鋒既敗後陳方固三不可擊也彼衆我寡四不可擊也官軍自戰其地一不宜動動而不勝衆心難固二不宜動城隍未修敵來無備三不宜動此皆兵家所忌不如深溝髙壘以逸待勞彼千里餽糧野無所掠久則三軍靡資攻則衆旅多斃師老釁生詳而圖之可以捷矣德曰韓别駕之言良平之䇿也于是召青還師魏又遣遼西公賀賴盧率騎與章圍鄴德遣其參軍劉藻請救于姚興且參母兄之問而興師不至衆大懼德于是親饗戰士厚加撫接人感其恩皆樂為致命會章盧內相乖爭各引軍潛遁章司馬丁建率衆來降言章師老可以敗之德遣將追破章軍人心始固時魏師入中山慕容寶出奔于薊慕容詳又僭號會劉藻自姚興而至興太史令髙魯遣其甥王景暉隨藻送玉璽一紐并圗讖祕文曰有德者昌無德者亡德受天命柔而復剛又有謡曰大風蓬勃揚塵埃八井三刀卒起來四海鼎沸中山頽惟有惡人據三臺于是德之羣臣議以慕容詳僭號中山魏師盛于冀州未審寶之存亡因勸德即尊號德不從會慕容達自龍城奔鄴稱寶猶存羣議乃止尋而寶以德為丞相領冀州牧承制南夏德兄子麟自羲臺奔鄴因説德曰中山既沒魏必乘勝攻鄴雖糧儲素積而城大難固且人情沮動不可以戰及魏軍未至擁衆南渡就魯陽王和據滑臺而聚兵積榖伺隙而動計之上也魏雖拔中山勢不久留不過驅掠而返人不樂徙理自生變然後振威以援之魏則內外受敵使戀舊之士有所依憑廣開恩信招集遺黎可一舉而取之先是慕容和亦勸德南徙于是許之隆安二年乃率户四萬車二萬七千乘自鄴將徙于滑臺遇風船沒魏軍垂至衆懼議欲退保黎陽其夕流澌凍合是夜濟師旦魏師至而冰泮若有神焉遂改黎陽津為天橋津及至滑臺景星見于尾箕漳水得白玉狀若璽于是德依燕元故事稱元年大赦境內殊死已下置百官以慕容麟為司空領尚書令慕容法為中軍將軍慕輿拔為尚書左僕射丁通為尚書右僕射自餘封授各有差初河間有麟見慕容麟以為已瑞及此潛謀為亂事覺賜死其夏魏將賀賴盧率衆附之至是慕容寶自龍城南奔至黎陽遣其中黃門令趙思召慕容鍾來迎鍾夲首議勸德稱尊號聞而惡之執思付獄馳使白狀德謂其下曰卿等前以社稷大計勸吾攝政吾亦以嗣帝奔亡人神曠主故權順羣議以繫衆望今天方悔禍嗣帝得還吾將具駕奉迎謝罪行闕然後角巾私第卿等以為何如其黃門侍郎張華進曰夫爭奪之世非雄才不振從橫之時豈懦夫能濟陛下若蹈匹婦之仁捨天授之業威權一去則身首不保何退讓之有乎德曰吾以古人逆取順守其道未足所以中路徘徊悵然未決耳慕輿護請馳問寶虛實德流涕而遣之乃率壯士數百隨思而北因謀殺寶初寶遣思之後知德攝位懼而北奔護至無所見執思而還德以思間習典故將任之思曰昔關羽見重曹公猶不忘先主之恩思雖刑餘賤𨽻荷國寵靈犬馬有心而况人乎乞還就上以眀微節德固留之思怒曰周室衰微晉鄭夾輔漢有七國之難實賴梁王殿下親則叔父位則上台不能率先羣后以匡王室而幸根夲之傾為趙倫之事思雖無申胥哭秦之效猶慕君賓不生莽世德怒斬之晉南陽太守閭邱羡寧朔將軍鄧啓方率衆二萬來伐師次管城德遣其中軍慕容法撫軍慕容和等距之王師敗績德怒法不窮追晉師斬其撫軍司馬靳瓌初苻登既為姚興所滅登弟廣率部落降于德拜冠軍將軍處之乞活堡會熒惑守東井或言秦當復興者廣乃自稱秦王敗德將慕容鍾時德始都滑臺介於晉魏之間地無十城衆不過數萬及鍾喪師反側之徒多歸于廣德乃留慕容和守滑臺親率衆討廣斬之初寶之至黎陽也和長史李辨勸和納之和不從辨懼謀泄乃引晉軍至管城冀德親率師於後作亂會德不出愈不自安及德此行也辨又勸和反和不從辨怒殺和以滑臺降于魏時將士家悉在城內德將攻之韓範言于德曰魏師已入城據國成資客主之勢翻然復異人情既危不可以戰宜先據一方為關中之基然後畜力而圖之計之上也德乃止德右衛將軍慕容雲斬李辨率將士家纍二萬餘人而出三軍慶悅德謀于衆曰苻廣雖平而撫軍失據進有強敵退無所託計將安出張華進曰彭城阻帶山川楚之舊都地嶮人殷可攻而據之以為基夲慕容鍾慕輿護封逞韓􅒲等固勸攻滑臺潘聰曰滑臺四通八逹非帝王之居且北通大魏西接強秦此二國者未可以髙枕而待之彭城土曠人稀地平無嶮晉之舊鎮必距王師又密邇江淮水路通浚秋夏霖潦十里為湖且水戰國之所短吳之所長今雖克之非久安之計也青齊沃壤號曰東秦土方二千户餘十萬四塞之固負海之饒可謂用武之國三齊英傑蓄志以待孰不思得眀主以立尺寸之功廣固者曹嶷之所營山川阻峻足為帝王之都宜遣辨士馳説於前大兵繼進於後辟閭渾昔負國恩必翻然向化如其守迷不順大軍臨之自然瓦解既據之後閉關養鋭伺隙而動此亦二漢之有關中河內也德猶豫未決沙門朗公素知占候德因訪其所適朗曰敬覽三策潘尚書之議可謂興邦之術矣今嵗初長星起于奎婁遂掃虛危而虛危齊之分野除舊布新之象宜先定舊魯巡撫琅邪待秋風戒節然後北轉臨齊天之道也德大悅引師而南兖州北鄙諸縣悉降置守宰以撫之存問髙年軍無私掠百姓安之牛酒屬路德遣使喻齊郡太守辟閭渾渾不從遣慕容鍾率步騎二萬擊之德進據琅邪徐兖之士附者十餘萬自琅邪而北迎者四萬餘人德進寇莒城守將任安委城而遁以潘聰鎮莒城鍾傳檄青州諸郡開曉禍福令有能斬送渾者賞同佐命渾聞德軍將至徙八千餘家入廣固諸郡皆承檄降于德渾懼將妻子奔于魏德遣射聲校尉劉綱追斬于莒城渾參軍張瑛嘗與渾作檄辭多不遜及此德擒而讓之瑛神色自若徐對曰渾之有臣猶韓信之有蒯通通遇漢祖而蒙恕臣遭陛下而嬰戮比之古人竊為不幸防風之誅臣實甘之但恐堯舜之化未𢎞于四海耳德初善其言後竟殺之德遂入廣固四年僭即皇帝位於南郊大赦改元為建平設行廟于宫南遣使奉策告成焉進慕容鍾為司徒慕輿拔為司空封孚為左僕射慕輿護為右僕射遣其度支尚書封愷中書侍郎封逞觀省風俗所在大饗將士以其妻假氏為皇后建立學官簡公卿已下子弟及二品士門二百人為太學生後因宴其羣臣酒酣笑而言曰朕雖寡薄恭已南面而朝諸侯在上不驕夕惕于位可方自古何等主也其青州刺史鞠仲曰陛下中興之聖后少康光武之儔也德顧命左右賜仲帛千匹仲以賜多為讓德曰卿知調朕朕不知調卿乎卿飾對非實故亦以虛言相賞賞不謬加何足謝也韓範進曰臣聞天子無戲言忠臣無妄對今日之論上下相欺可謂君臣俱失德大悅賜範絹五十匹自是昌言競進朝多直士矣德母兄先在長安遣平原人杜𢎞如長安問存否𢎞曰臣至長安若不奉太后動止便即西如張掖以死為效臣父雄年踰六十未沾榮貴乞夲縣之祿以申烏鳥之情張華進曰杜𢎞未行而求祿要利情深不可使也德曰吾方散所輕之財招所重之死况為親尊而可吝乎且𢎞為君迎親為父求祿雖外如要利而實忠孝乃以雄為平原令𢎞至張掖為盜所殺德聞而悲之厚撫其妻子眀年德如齊城登營邱望晏嬰冡顧謂左右曰禮大夫不逼城葬平仲古之賢人逹禮者也而生居近市死葬近城豈有意乎青州秀才晏謨對曰孔子稱臣先人平仲賢則賢矣豈不知髙其梁豐其禮蓋政在家門故儉以矯世存居湫隘卒豈擇地而葬乎所以不逺門者猶兾悟平生意也遂以謨從至漢城陽景王廟宴庶老于申池北登社首山東望鼎足因目牛山而歎曰古無不死愴然有終焉之志遂問謨以齊之山川邱陵賢哲舊事謨厯對詳辨畫地成圗德深嘉之拜尚書郎立冶于商山置鹽官于烏常澤以廣軍國之用德故吏趙融自長安來始具母兄凶問德號慟吐血因而寢疾其司𨽻校尉慕容達因此謀反遣牙門皇璆率衆攻端門殿中師侯赤眉開門應之中黃門孫進扶德踰城隱于進舍假宏等聞宫中有變勒兵屯四門德入宫誅赤眉等逹懼而奔魏慕容法及魏師戰于濟北之標榆谷魏師敗績其尚書韓􅒲上疏言百姓因秦晉之弊迭相蔭冒或百室合户或千户共籍公避課役擅為姦宄宜隱實黎萌正其編貫庶益軍國兵資之用德納之遣其車騎將軍慕容鎮率騎三千緣邉嚴防備百姓逃竄以􅒲為使持節散騎常侍行臺尚書巡郡縣隱實得蔭户五萬八千􅒲公廉正直所在野次人不擾焉德大集諸生親臨策試既而饗宴乘髙逺矚顧謂其尚書魯邃曰齊魯固多君子當昔全盛之時梓慎巴生淳于鄒田之徒蔭修簷臨清沼馳朱輪佩長劔恣非馬之雄辭奮談天之逸辨指麾則紅紫成章俯仰則邱陵生韻至于今日荒草頽墳氣消煙滅永言千載能不依然邃答曰武王封比干之墓漢祖祭信陵之墳皆留心賢哲每懷往事陛下慈深二主澤被九泉若使彼而有知寧不銜荷矣先是妖賊王始聚衆于泰山自稱太平皇帝號其父為太上皇兄為征東將軍弟征西將軍慕容鎮討擒之斬于都市臨刑或問其父及兄弟所在始答曰太上皇帝蒙塵于外征東征西亂兵所害惟朕一身獨無聊賴其妻怒之曰止坐此口以至于此奈何復爾始曰皇后自古豈有不破之家不亡之國邪行刑者以刀鐶築之仰視曰崩即崩矣終不改帝號德聞而哂之時桓元將行篡逆誅不附已者冀州刺史劉軌襄城太守司馬休之征虜將軍劉敬宣廣陵相髙雅之江都長張誕並內不自安皆奔于德于是德中書侍郎韓範上疏請乘晉亂奄有吳會德下令王公詳議兹事其下咸以桓元新得志未可圗乃止于是講武于城西步兵三十七萬車一萬七千乘鐡騎五萬三千周亘山澤旌旗彌漫鉦鼓之聲振動天地德登髙望之顧謂劉軌髙雅之曰昔郤克忿齊子胥怨楚終能暢其剛烈名流千載卿等既知投身有道當使無慙昔人也雅之等頓首答曰幸蒙陛下天覆之恩大造之澤存亡繼絶實在聖時雖則萬隕何以上報俄聞桓元敗德以慕容鎮為前鋒慕容鍾為大都督配以步卒二萬騎五千剋期將發而德寢疾于是罷兵初德迎其兄子超于長安及是而至德夜夢其父曰汝既無子何不早立超為太子不爾惡人生心寤而告其妻曰先帝神眀所勑觀此夢意吾將死矣乃下書以超為皇太子大赦境內子為父後者人爵二級其月死即義熙元年也時年七十乃夜為十餘棺分出四門潛葬山谷竟不知其尸之所在在位五年偽諡獻武皇帝超字祖眀德兄北海王納之子苻堅破鄴以納為廣武太守數嵗去官家于張掖德之南征留金刀而去及垂起兵山東苻昌收納及德諸子皆誅之納母公孫氏以耄獲免納妻段氏方娠未決囚之于郡獄獄掾呼延平德之故吏也嘗有死罪德免之至是將公孫及段氏逃于羌中而生超焉年十嵗而公孫氏卒臨終授超以金刀曰若天下太平汝得東歸可以此刀還汝叔也平又將超母子奔于吕光及吕隆降于姚興超又隨涼州人徙于長安超母謂超曰吾母子全濟呼延氏之力平今雖死吾欲為汝納其女以答厚意于是娶之超自以謂父在東恐為姚氏所録乃陽狂行乞秦人賤之惟姚紹見而異焉勸興拘以爵位召見與語超深自晦匿興大鄙之謂紹曰諺云妍皮不褁癡骨妄語耳由是得去來無禁德遣使迎之超不告母妻乃歸及至廣固呈以金刀具宣祖母臨終之言德撫之號慟超身長八尺腰帶九圍精彩秀發容止可觀德甚加禮遇始名之曰超封北海王拜侍中驃騎大將軍司隸校尉開府置佐吏德無子欲以超為嗣故為超起第于萬春門內朝夕觀之超亦深逹德旨入則盡歡承奉出則傾身下士于是內外稱美焉頃之立為太子及德死以義熙元年僭嗣偽位大赦境內改元曰太上尊德妻段氏為皇太后以慕容鍾都督中外諸軍録尚書事慕容法為征南都督徐兖揚南兖四州諸軍事慕容鎮加開府儀同三司尚書令封孚為太尉麴仲為司空潘聰為左光祿大夫封嵩為尚書左僕射自餘封拜各有差後又以鍾為青州牧段宏為徐州刺史公孫五樓為武衛將軍領屯騎校尉內參政事封孚言于超曰臣聞五大不在邉五細不在庭鍾國之宗臣社稷所賴宏外戚懿望親賢具瞻正應參翼百揆不宜逺鎮方外今鍾等出藩五樓內輔臣竊未安超新即位害鍾等權逼以問五樓五樓欲専斷朝政不欲鍾等在內屢有間言孚説竟不行鍾宏俱有不平之色相謂曰黃犬之皮恐當終補狐裘也五樓聞之嫌隙漸構初超自長安行至梁父慕容法時為兖州鎮南長史悅夀還謂法曰向見北海王子天資𢎞雅神爽髙邁始知天族多竒玉林皆寶法曰昔成方遂詐稱衛太子人莫辨之此復天族乎超聞而恚恨形于言色法亦怒處之外館由是結憾及德死法又不奔喪超遣使讓焉法常懼禍至因此遂與慕容鍾段宏等謀反超知而徴之鍾稱疾不赴于是收其黨侍中慕容統右衛慕容根散騎常侍段封誅之車裂僕射封嵩于東門之外西中郎將封融奔于魏超尋遣慕容鎮等攻青州慕容昱等攻徐州慕容凝韓範攻梁父昱等攻莒城拔之徐州刺史段宏奔于魏封融又集羣盜襲石塞城殺鎮西大將軍餘鬱青土震恐人懷異議慕容凝謀殺韓範將襲廣固範知而攻之凝奔梁父範并其衆攻梁父克之凝奔姚興慕容法出奔于魏慕容鎮克青州鍾殺其妻子為地道而出單馬奔姚興于時超不恤政事畋遊是好百姓苦之其僕射韓􅒲切諌不納超議復肉刑九等之選羣下議多不同乃止超母妻既先在長安為姚興所拘責超稱藩求太樂諸伎若不可使送吳口千人超下書遣羣臣詳議左僕射段暉議曰太上囚楚髙祖不回今陛下嗣守社稷不宜以私親之故而降統天之尊又太樂諸伎皆是前世伶人不可與彼使移風易俗宜掠吳口與之尚書張華曰若侵掠吳邉必成鄰怨此既能往彼亦能來兵連禍結非國之福也昔孫權重黎庶之命屈已以臣魏惠施惜愛子之頭捨志以尊齊况陛下慈德在秦方寸崩亂宜暫降大號以申至孝之情權變之道典謨所許韓範智能回物辨足傾人昔與姚興俱為秦太子中舍人可遣將命降號修和所謂屈于一人之下申于萬人之上也超大悅曰張尚書得吾心矣使範聘于興及至長安興謂範曰封愷前來燕王與朕抗禮及卿至也欵然而附為依春秋以小事大之義為當専以孝敬為母屈也範曰昔周爵五等公侯異品小大之禮因而生焉今陛下命世龍興光宅西秦夲朝主上承祖宗遺烈定鼎東齊中分天曜南面並帝通聘結好義尚謙沖便至矜誕茍折行人殊似吳晉爭盟滕薛競長恐傷大秦堂堂之盛有損皇燕巍巍之美彼我俱失竊未安之興怒曰若如卿言便是非為大小而來範曰雖由大小之義亦緣寡君純孝過于重華願陛下體敬親之道霈然垂愍興曰吾久不見賈生自謂過之今不及矣于是為範設舊交之禮申敘平生謂範曰燕王在此朕亦見之風表乃可于機辨未也範曰大辨若訥聖人美之况爾日龍潛鳳戢和光同塵若使負日月而行則無繼天之業矣興笑曰可謂使乎延譽者也範承間逞説姚興大悅賜範千金許以超母妻還之慕容凝自梁父奔于姚興言于興曰燕王稱藩夲非推德權為母屈耳古之帝王尚興師徴質豈可虛還其母乎母若一還必不復臣也宜先制其送伎然後歸之興意乃變遣使聘于超超遣其僕射張華給事中宗正元入長安送太樂伎一百二十人于姚興興大悅延華入宴酒酣樂作興黃門侍郎尹雅謂華曰昔殷之將亡樂師歸周今皇秦道盛燕樂來庭廢興之兆見于此矣華曰自古帝王為道不同權譎之理會于功成故老子曰將欲取之必先與之今總章西入必由余東歸禍福之驗此其兆乎興怒曰昔齊楚競辨二國連師卿小國之臣何敢抗衡朝士華遜辭曰奉使之始實願交歡上國上國既遺小國之臣辱及寡君社稷臣亦何心而不仰酬興善之于是還超母妻義熙三年追尊其父為穆皇帝立其母段氏為皇太后妻呼延氏為皇后祀南郊將登壇有獸大如馬狀類鼠而色赤集于圜丘之側俄而不知所在須臾大風暴起天地晝昏其行宫羽儀皆振裂超懼密問其太史令成公綏對曰陛下信用姦臣誅戮賢良賦斂繁多事役殷苦所致也超懼而大赦譴責公孫五樓等俄而復之是嵗廣固地震天齊水湧井水溢汝水竭河濟凍合而澠水不冰超正旦朝羣臣于東陽殿聞樂作歎音佾不備悔送伎于姚興遂議入寇其領軍韓􅒲諌曰先帝以舊京傾沒戢翼三齊茍時運未可上智輟謀今陛下嗣守成規宜閉關養士以待賊釁不可結怨南鄰廣樹仇隙超曰我計已定不與卿言于是遣其將斛榖提公孫歸等率騎寇宿豫陷之執陽平太守劉千載濟隂太守徐阮大掠而去簡男女二千五百付太樂教之時公孫五樓為侍中尚書領左衛將軍専總朝政兄歸為冠軍常山公叔父頽為武衛興樂公五樓宗親皆夾輔左右王公內外無不憚之超論宿豫之功封斛榖提等並為郡縣公慕容鎮諫曰臣聞懸賞待勳非功不侯今公孫歸結禍延兵殘賊百姓陛下封之得無不可乎夫忠言逆耳非親不發臣雖庸朽忝國戚藩輒盡愚欵惟陛下圗之超怒不答自是百僚杜口莫敢開言尚書都令史王儼諂事五樓遷尚書郎出為濟南太守入為尚書左丞時人為之語曰欲得侯事五樓又遣公孫歸等率騎五千入寇濟南執太守趙元略男女千餘人而去劉裕率師將討之超引見羣臣于東陽殿議距王師公孫五樓曰吳兵輕果所利在戰初鋒勇鋭不可爭也宜據大峴使不得入曠日延時沮其鋭氣可徐簡精騎二千循海而南絶其糧運别敕段暉率兖州之軍緣山東下腹背擊之上策也各命守宰依險自固校其資儲之外餘悉焚蕩芟除粟苗使敵無所資堅壁清野以待其釁中策也縱賊入峴出城逆戰下策也超曰京都殷盛户口衆多非可一時入守青苗布野非可卒芟設使芟苗城守以全性命朕所不能今據五州之強帶山河之固戰車萬乘鐵馬萬羣縱令過峴至于平地徐以精騎踐之此成擒也賀賴盧苦諌不從退謂五樓曰上不用吾計亡無日矣慕容鎮曰若如聖旨必須平原用馬為便宜出峴逆戰戰而不勝猶可退守不宜縱敵入峴自貽窘逼昔成安君不守井陘之關終屈于韓信諸葛瞻不據束馬之嶮卒擒于鄧艾臣以為天時不如地利阻守大峴策之上也超不從鎮出謂韓􅒲曰主上既不能芟苗守嶮又不肯徙人逃寇酷似劉璋矣今年國滅吾必死之卿等中華之士復為文身矣超聞而大怒收鎮下獄乃攝莒梁父二戍修城隍簡士馬畜鋭以待之其夏王師次東莞超遣其左軍段暉輔國賀賴盧等六將步騎五萬進據臨朐俄而王師度峴超懼率卒四萬就暉等于臨朐謂公孫五樓曰宜進據川源晉軍至而失水亦不能戰矣五樓馳騎據之劉裕前驅將軍孟龍符已至川源五樓戰敗而返裕遣咨議參軍檀韶率鋭卒攻破臨朐超大懼單騎奔段暉于城南暉衆又戰敗裕軍人斬暉超又奔還廣固徙郭內人入保小城使其尚書郎張綱乞師于姚興赦慕容鎮進録尚書都督中外諸軍事引見羣臣謝之曰朕嗣奉成業不能委賢任善而専固自由覆水不收悔將何及智士逞謀必在事危忠臣立節亦在臨難諸君其勉思六竒共濟艱運鎮進曰百姓之心係于一人陛下既躬率六軍身先奔敗羣臣解心士庶喪氣內外之情不可復恃如聞西秦自有內難恐不暇分兵救人正當更決一戰以爭天命今散卒還者猶有數萬可悉出金帛宫女餌令一戰天若相我足以破賊如其不濟死尚為美不可閉門坐受圍擊司徒慕容惠曰不然今晉軍乘勝有陵人之氣敗軍之將何以禦之秦雖與勃勃相持不足為患且二國連衡勢成脣齒今有寇難秦必救我但自古乞援不遣大臣則不致重兵是以趙𨽻三請楚師不出平原一使援至從成尚書令韓範德望具瞻燕秦所重宜遣乞援以濟時艱于是遣範與王薄乞師于姚興未幾裕師圍城四面皆合人有竊告裕軍曰若得張綱為攻具者城乃可得耳是月綱自長安歸遂奔于裕裕令綱周城大呼曰勃勃大破秦軍無兵相救超怒伏弩射之乃退右僕射張華中丞封愷並為裕軍所獲裕令華愷與超書勸令早降超乃遺裕書請為藩臣以大峴為界并獻馬千匹以通和好裕弗許江南繼兵相尋而至尚書張俊自長安還又降于裕説裕曰今燕人所以固守者外仗韓範冀得秦援範既時望又與姚興舊昵若勃勃敗後秦必救燕宜密信誘範啖以重利範來則燕人絶望自然降矣裕從之表範為散騎常侍遺範書以招之時姚興乃遣其將姚強率步騎一萬隨範就其將姚紹于洛陽并兵來援會赫連勃勃大破秦軍興追強還長安範歎曰天其滅燕乎會得裕書遂降于裕裕謂範曰卿欲立申包胥之功何以虛還也範曰自亡祖司空世荷燕寵故泣血秦庭冀匡禍難屬西朝多故丹誠無效可謂天喪弊邑而贊眀公智者見幾而作敢不至乎翌日裕將範循城由是人情離駭無復固志裕謂範曰卿宜至城下告以禍福範曰雖蒙殊寵猶未忍謀燕裕嘉而不強左右勸超誅範家以止後叛超知敗在旦夕又弟􅒲盡忠無二故不罪焉是嵗東萊雨血廣固城門鬼夜哭眀年朔旦超登天門朝羣臣于城上殺馬以饗將士文武皆有遷授超幸姬魏夫人從超登城見王師之盛握超手而相對泣韓􅒲諫曰陛下遭百六之會正是勉強之秋而反對女子悲泣何其鄙也超拭目謝之其尚書令董鋭勸超出降超大怒繫之于獄于是賀賴盧公孫五樓為地道出戰王師不利河間人元文説裕曰昔趙攻曹嶷望氣者以為澠水帶城非可攻拔若塞五龍口城必自陷石虎從之而嶷請降後慕容恪之圍段龕亦如之而龕降降後無幾又震開之今舊基猶在可塞之裕從其言至是城中男女患腳弱病者大半超輦而升城尚書悅夀言于超曰天地不仁助寇為虐戰士尫病日就凋隕守困窮城息望外援天時人事亦可知矣茍厯運有終堯舜降位轉禍為福聖逹以先宜追許鄭之蹤以存宗廟之重超歎曰廢興命也吾寧奮劔決死不能銜璧求生于是張綱為裕造衝車覆以版屋蒙之以皮并設諸竒巧城上火石弓矢無所施用又為飛樓懸梯木幔之屬遙臨城上超大怒懸其母而支解之城中出降者相繼裕四面進攻殺傷甚衆悅夀遂開門以納王師超與左右數十騎出亡為裕軍所執裕數之以不降之狀超神色自若一無所言惟以毋託裕將劉敬宣而已裕送建康市斬之時年二十六在位六年始德以安帝隆安四年僭立至超二世凡十一年以義熙六年滅慕容鍾字道眀德從弟也少有識量喜怒不形于色機神秀發言論清辨至于臨難對敵智勇兼濟纍進竒策德用之頗中由是政無大小皆以委之遂為佐命元勳後公孫五樓規挾威權慮鍾抑已因勸超誅之鍾遂謀反事敗奔于姚興興拜始平太守歸義侯封孚字處道渤海蓚人也祖悛振威將軍父放慕容暐之世吏部尚書孚幼而聰敏和裕有士君子之稱寶僭位纍遷吏部尚書及蘭汗之篡南奔辟閭渾渾表為渤海太守德至莒城孚出降德曰朕平青州不以為慶喜于得卿也常外總機事內參密謀雖位任崇重謙虛博納甚有大臣之體及超嗣位政出權嬖多違舊章軌憲日頽殘虐滋甚孚屢盡匡救超不能納也後臨軒謂孚曰朕于百王可方誰孚對曰桀紂之主超大慙怒孚徐步而出不為改容司空鞠仲失色謂孚曰與天子言何其亢厲宜應還謝孚曰行年七十墓木已拱惟求死所耳竟不謝以超三年死于家時年七十一文筆多傳于世北涼沮渠蒙遜臨松盧水胡人也其先世為胸奴左沮渠遂以官為氏焉蒙遜博涉羣史頗曉天文雄傑有英略滑稽善權變梁熙吕光皆竒而憚之故常遊飲自晦會伯父羅仇麴粥從吕光征河南光前軍大敗麴粥言于兄羅仇曰主上荒耄驕縱諸子朋黨相傾讒人側目今軍敗將死正是智勇見猜之日可不懼乎吾兄弟素為所憚與其經死溝瀆豈若勒衆向西平出苕藋奮臂大呼涼州不足定也羅仇曰理如汝言但吾家纍世忠孝為一方所歸寧人負我無我負人俄而皆為光所殺宗姻諸部會葬者萬餘人蒙遜哭謂衆曰昔漢祚中微吾之乃祖翼奬竇融保寧河右吕王昏耄荒虐無道豈可不上繼先祖安時之志使二父有恨黃泉衆咸稱萬嵗遂斬光中田護軍馬邃臨松令井祥以盟一旬之間衆至萬餘屯據金山與從兄男成推光建康太守段業為使持節大都督龍驤大將軍涼州牧建康公改吕光龍飛二年為神璽元年業以蒙遜為張掖太守男成為輔國將軍委以軍國之任業將使蒙遜攻西郡衆咸疑之蒙遜曰此郡據嶺之要不可不取業曰卿言是也遂遣之蒙遜引水灌城城潰執太守吕純以歸于是王德以晉昌孟敏以敦煌降業業封蒙遜臨池侯吕𢎞去張掖將東走業議欲擊之蒙遜諫曰歸師勿遏窮寇弗追此兵家之戒也不如縱之以為後圖業曰一日縱敵悔將無及遂率衆追之為𢎞所敗業賴蒙遜而免歎曰孤不能用子房之言以至于此業築西安城以其將臧莫孩為太守蒙遜曰莫孩勇而無謀知進忘退所謂為之築冡非築城也業不從俄而為吕纂所敗蒙遜懼業不能容已每匿智以避之業僭稱涼王以蒙遜為尚書左丞梁中庸為右丞吕光遣其二子紹纂伐業業請救于秃髮烏孤烏孤遣其弟鹿孤及楊軌救業紹以業等軍盛欲從三門關挾山而東纂曰挾山示弱取敗之道不如結陳衝之彼必憚我而不戰也紹乃引軍而南業將擊之蒙遜諌曰楊軌恃虜騎之強有窺覦之志紹纂兵在死地必決戰求生不戰則有泰山之安戰則有纍卵之危業曰卿言是也乃按兵不戰紹亦難之各引兵歸業憚蒙遜雄武微欲逺之乃以蒙遜從叔益生為酒泉太守蒙遜為臨池太守業門下侍郎馬權俊爽有逸氣武略過人業以權代蒙遜為張掖太守甚見稱重每輕陵蒙遜蒙遜亦憚而怨之乃譖之于業曰天下不足慮惟當憂馬權耳業遂殺之蒙遜謂男成曰段業愚暗非濟亂之才信讒愛佞無鑒斷之眀所憚惟索嗣馬權今皆死矣蒙遜欲除業以奉兄何如男成曰業羇旅孤飄我所建立有吾兄弟猶魚之有水人既親我背之不祥乃止蒙遜既為業所憚內不自安請為西安太守業亦以蒙遜有大志懼為朝夕之變乃許焉蒙遜期與男成同祭蘭門山密遣司馬許咸告業曰男成欲謀叛許以取假日作逆若求祭蘭門山臣言驗矣至期日果然業收男成令自殺男成曰蒙遜欲謀叛先已告臣臣以兄弟之故隱忍不言以臣今在恐部人不從與臣剋期祭山返相誣告臣若朝死蒙遜必夕發乞詐言臣死説臣罪惡蒙遜必作逆臣投袂討之事無不捷業不從蒙遜聞男成死泣告衆曰男成忠于段公枉見屠害諸君能為報仇乎且州土兵亂似非業所能濟吾所以初奉之者以之為陳吳耳而信讒多忌枉害忠良豈可安枕卧觀使百姓離于塗炭男成素有恩信衆皆憤泣而從之比至氐池衆逾一萬鎮軍臧莫孩率部衆附之羌胡多起兵響應蒙遜壁于侯塢業先疑其右將軍田昻幽之于內至是謝而赦之使與武衛梁中庸等攻蒙遜業將王豐孫言于業曰西平諸田世有反者昻貌恭而心佷志大而情險不可信也業曰吾疑之久矣但非昻無可以討遜豐孫言既不從昻至侯塢率騎五百歸于蒙遜蒙遜至張掖昻兄子承愛斬關內之業左右皆散蒙遜大呼曰鎮西何在軍人曰在此業曰孤單飄一已為貴門所推可見丐餘命投身嶺南庶得東遷與妻子相見蒙遜遂斬之業京兆人也博涉史傳有尺牘之才為杜進記室從征塞表儒素長者無他權略威禁不行羣下擅命尤信卜筮讖記巫覡徴祥故為姦佞所誤隆安五年梁中庸房晷田昻等推蒙遜為使持節大都督大將軍涼州牧張掖公赦其境內改元永安署從兄伏奴為鎮軍將軍張掖太守和平侯弟拏為建忠將軍都谷侯田昻為鎮南將軍西郡太守臧莫孩為輔國將軍房晷梁中庸為左右長史張騭謝正禮為左右司馬擢任賢才文武咸悅時姚興遣將姚碩德攻吕隆于姑臧蒙遜遣從事中郎李典聘于興以通和好蒙遜以吕隆既降于興酒泉涼寧二郡叛降李皓乃遣建忠拏牧府長史張潛見碩德于姑臧請軍迎接率郡人東遷碩德大悅拜潛張掖太守拏建康太守潛勸蒙遜東遷拏私于蒙遜曰吕氏猶存姑臧未拔碩德糧竭將還不能久也何故違離桑梓受制于人輔國莫孩曰建忠之言是也蒙遜乃斬張潛因下書蠲省百徭専功南畝眀設科條務盡地利時梁中庸為西郡太守西奔李皓蒙遜聞之笑曰吾與中庸義深一體而不信我但自負耳孤豈恨之乃盡歸其妻孥蒙遜下令求言令內外羣僚各搜揚賢俊廣進芻蕘以聞遣輔國臧莫孩襲山北虜大破之姚興遣將齊難率衆四萬迎吕隆隆勸難伐蒙遜難從之莫孩敗其前軍難乃結盟而還蒙遜伯父中田護軍親信臨松太守孔篤並驕奢侵害百姓苦之蒙遜曰亂吾國者二伯父也何以綱紀百姓乎皆令自殺蒙遜襲狄洛磐于番禾不剋遷其五百餘户而還姚興遣使人梁斐張構等拜蒙遜鎮西大將軍沙州刺史西海侯時興亦拜秃髮傉檀為車騎將軍封廣武公蒙遜聞之不悅謂斐等曰傉檀上公之位而身為侯者何也構對曰傉檀輕狡不仁欵誠未著聖朝所以加其重爵者褒其歸善即敘之義耳將軍忠貫白日勳髙一時當入諧鼎味匡贊帝室安可以不信待也聖朝爵必稱功官不越德如尹緯姚晃佐命初基齊難徐洛元勳驍將並位才二品爵止侯伯將軍何以先之乎竇融殷勤固讓不欲居舊臣之右未解將軍忽有此問蒙遜曰朝廷何不即以張掖見封乃更逺封西海邪構曰張掖規畫之內將軍已自有之所以逺授西海者蓋欲逺大將軍之國耳蒙遜大悅乃受拜時地震山崩折木太史令劉梁言于蒙遜曰辛酉金也地動于金金動刻木大軍東行無前之徴時張掖城每有光色蒙遜曰王氣將成百戰百勝之象也遂攻秃髮西郡太守楊統于日勒統降拜為右長史寵踰功舊張掖太守句呼勒出奔西涼以從弟成都為金山太守羅仇子也鄯為西郡太守麴粥子也句呼勒自西涼奔還待之如初蒙遜率騎二萬東征次于丹嶺北虜大人思盤率部落三千降之時木連理生于永安蒙遜率步騎三萬伐秃髮傉檀次于西郡大風從西北來氣有五色俄而晝昏至顯美徙數千户而還傉檀追及蒙遜于窮泉蒙遜將擊之諸將皆曰賊已安營弗可犯也蒙遜曰傉檀謂吾逺來疲弊必輕而無備及其壘壁未成可以一鼓而滅進擊敗之乘勝至于姑臧夷夏降者萬數千户傉檀懼請和許之而歸及傉檀南奔樂都魏安人焦朗據姑臧自立蒙遜率步騎三萬攻朗剋而宥之饗文武將士于謙光殿班賜金馬有差以敦煌張穆博通經史才藻清贍擢拜中書侍郎委以機密之任以其弟拿為護羌校尉秦州刺史封安平侯鎮姑臧旬餘而拿死又以從祖益子為鎮京將軍護羌校尉秦州刺史鎮姑臧俄而蒙遜遷于姑臧以義熙八年僭即河西王位大赦境內改元元始置官僚如吕光為三河王故事繕宫殿起城門諸觀立其子政德為世子加鎮衛大將軍録尚書事傉檀來伐蒙遜敗之于若厚塢傉檀湟河太守文支據湟州護軍成宜侯率衆降之署文支鎮東大將軍廣武太守振武侯成宜侯為振威將軍湟川太守以殿中將軍王建為湟河太守蒙遜西如苕藋遣冠軍伏恩率騎一萬襲卑和烏啼二虜大破之俘二千餘落而還蒙遜寢于新臺閹人王懷祖擊蒙遜傷足其妻孟氏擒斬之夷其三族蒙遜母車氏疾篤蒙遜升南景門散錢以賜百姓下書大赦殊死已下俄而車氏死蒙遜遣其將運糧于湟河自率衆攻剋乞伏熾磐廣武郡以運糧不繼自廣武如湟河度浩舋熾磐遣將乞伏魋尼寅距蒙遜蒙遜擊斬之熾磐又遣將王衡折斐麴景等率騎一萬據勒姐嶺蒙遜且戰且前大破之擒折斐等七百餘人麴景奔還蒙遜以弟漢平為折衝將軍湟河太守乃引還晉益州刺史朱齡石遣使來聘蒙遜遣舍人黃迅報聘益州因表朝廷願率河西戎卒為晉右翼前驅以圗剋復熾磐率衆三萬襲湟河漢平力戰固守遣司馬隗仁夜出擊熾磐斬級數百熾磐將引退先遣老弱漢平長史焦昶將軍段景密信招熾磐熾磐復進攻漢平漢平納昶景之説面縛出降仁勒壯士百餘據南門樓上三日不下衆寡不敵為熾磐所擒熾磐怒命斬之段暉諫曰仁臨難履危奮不顧命忠也宜宥之以厲事君熾磐乃執之而歸在熾磐所五年暉又為之固請乃得還姑臧及至蒙遜執其手曰卿孤之蘇武也以為髙昌太守為政有威惠之稱然頗以愛財為失蒙遜西祀金山遣沮渠廣宗率騎一萬襲烏啼虜大捷而還蒙遜西至苕藋遣前將軍沮渠成都將騎五千襲卑和虜蒙遜率中軍三萬繼之卑和虜率衆迎降遂循海而西至鹽池祀西王母寺寺中有元石神圖命其中書侍郎張穆賦焉銘之於寺前遂如金山而歸蒙遜下書曰頃自春炎旱害及時苗碧原青野倐為枯壤將刑政失中下有寃獄乎役繁賦重上天所譴乎內省多缺孤之罪也書不云乎百姓有過罪豫一人可大赦殊死已下翌日而澍雨大降蒙遜聞劉裕滅姚泓怒甚門下校郎劉祥言事于蒙遜蒙遜曰汝聞劉裕入關敢研研然也遂殺之其峻暴如是顧謂左右曰古之行師不犯嵗鎮所在姚氏舜後軒轅之苗裔也今鎮星在軒轅而裕滅之亦不能久守關中蒙遜為李歆敗于解支澗復收散卒欲戰前將軍成都諫曰臣聞髙祖有彭城之敗終成大業宜旋師以為後圗蒙遜從之城建康而歸其羣下上書言朝士多違憲制不遵典章或公文御案而在家卧署或事無可否望空而過至今黜陟無紀駁議不聞宜肅振綱維申修舊則蒙遜納之命征南姚艾尚書左丞房晷撰朝堂制行之旬日百僚振肅太史令張衍言于蒙遜曰今嵗臨澤城西當有破兵蒙遜乃遣其世子政德屯兵若厚塢蒙遜西至白岸謂張衍曰吾今年當有所定但太嵗在申月又建申未可西行且當南巡要其歸會主而勿客以順天心計在臨機慎勿露也遂攻浩舋而蛇盤于帳前蒙遜笑曰前一為騰蛇今盤在吾帳天意欲吾回師先定酒泉燒攻具而還次于川巖聞李歆徴兵欲攻張掖蒙遜曰入吾計矣但恐聞吾廽軍不敢前也兵事尚權乃露布西境稱得浩舋將進軍黃谷歆聞而大悅進入都瀆澗蒙遜潛軍逆之敗歆于壞城遂進克酒泉百姓安堵如故軍無私焉以子牧犍為酒泉太守歆之舊臣皆隨才擢敘蒙遜既克酒泉于是西域諸國皆詣蒙遜朝貢稱臣蒙遜僭立九年而宋氏受禪蒙遜前既稱藩于晉宋景平初遂受宋命為都督涼秦河沙四州諸軍事驃騎大將軍涼州牧河西王是嵗遣其世子政德擊柔然兵敗見殺遂立次子興國為世子元嘉五年改年承元眀年遣世子興國攻秦為秦王慕末所禽復立興國母弟菩提為世子蒙遜嘗遣使求書于宋文帝並給之又就司徒王𢎞求搜神記𢎞亦與之八年復遣其尚書郎宗舒左常侍髙猛稱臣朝貢于魏繼遣其子安周內侍八年魏太武遣兼太常李順持節拜蒙遜為假節加侍中都督涼州西域羌戎諸軍事太傅行征西大將軍涼州牧涼王王七郡置將相羣卿百官建天子旌旗出入警蹕如漢初諸侯王故事使司徒崔浩為册書以褒賞之蒙遜復改年為義和元嘉十年夏四月蒙遜死時年六十六蒙遜在位三十三年偽諡武宣王廟號太祖牧犍亦曰茂虔蒙遜諸子也蒙遜滅西涼使鎮酒泉後徙敦煌太守牧犍聰頴好學和雅有度量蒙遜病甚國人議以世子菩提幼弱廢之立牧犍為世子加中外大都督大將軍録尚書事至是遂襲偽位改年永和遣使告命于魏先是魏太武遣李順迎蒙遜女為夫人會蒙遜死牧犍受蒙遜遺意送妹于代太武拜為昭儀復遣李順拜牧犍為使持節侍中都督涼沙河三州西域羌戎諸軍事車騎將軍開府儀同三司領護西戎校尉涼州刺史河西王牧犍上表乞安平一號太武不許元嘉十一年牧犍復奉表于宋宋亦册命為涼州刺史河西王牧犍尚魏太武妹武威公主遣其相宋繇表謝獻馬五百匹黃金百斤繇又表請公主及牧犍母妃后定號太武命其臣議之皆曰母以子貴妻從夫爵牧犍母宜稱河西國太后公主于其國稱王后于京師則稱公主太武從之牧犍遣建節將軍沮渠旁周朝魏太武遣侍中古弼尚書李順賜牧犍侍臣衣服有差并徴其世子封壇入侍牧犍遣封壇朝于平城先是牧犍淫于其嫂李氏兄弟三人傳嬖之李與牧犍姊共毒公主太武遣醫乘傳救公主得愈太武徴李氏牧犍不遣厚送居于酒泉十六年魏使者自西域還至武威牧犍左右有告使者曰我君承蠕蠕可汗妄言云去嵗魏天子自來伐我士馬疲死大敗而還我君大喜宣言於國使者還以聞太武遣尚書賀多羅使涼州觀虛實賀多羅還亦言牧犍雖外修臣禮內實乖悖是嵗夏六月太武親討牧犍命公卿為書數其十二罪且曰若親帥羣臣迎拜馬首上策也六軍既臨面縳輿櫬其次也若守迷不悟身死族滅為世大戮宜思厥中自求多福七月太武至上郡屬國城以安逺將軍源賀為鄊導牧犍聞魏師濟河用其左丞姚定國計不肯出迎求救于蠕蠕遣其弟征南大將軍董來將萬餘人出戰望風奔潰太武至姑臧遣使諭牧犍出降牧犍聞蠕蠕欲入魏邉冀幸太武東還遂嬰城固守太武分軍圍之源賀引兵招慰諸部鮮卑下三萬餘落故太武得専攻姑臧無復外慮既而牧犍兄子祖踰城出降太武具知城中情實因急攻之牧犍兄子萬年復率麾下來降九月姑臧城潰牧犍率其文武五千人面縛請降太武釋而禮之收其城內户口二十餘萬使張掖王秃髮保周及龍驤將軍穆羆與源賀分徇諸部雜胡降者又數十萬擊取張掖樂都酒泉武威皆置將守之徙牧犍宗族及吏民三萬户于平城初牧犍即位之三年有老父投書于敦煌東門求之不獲書曰涼王三十年若七年牧犍以問奉常張慎慎對曰昔虢之將亡神降于莘願陛下崇德修政以享三十年之祚若盤于逰田荒于酒色臣恐七年將有大變牧犍不悅又有人于震電所得石丹書曰河西河西三十年破帶石樂七年帶石青山名在姑臧南舊有神祀傍泥陷不通董來曰祀豈有知乎遂毁祀伐木通道而行至是果七年而滅始蒙遜以晉安帝隆安五年僭立至牧犍二世三十九年而滅太武克姑臧猶以妹壻待牧犍其母死以王太妃禮葬焉又為蒙遜置守冡三十家牧犍至平城太武授征西大將軍河西王如故當姑臧之未破也牧犍使人斫開庫取金銀珠玉及珍竒器物不更封閉百姓因之入盜巨細蕩盡有司求賊不得元嘉二十四年其所親人及守藏者告之乃窮竟其事搜其家中悉得所藏器物又告牧犍父子多畜毒藥前後隱竊殺人乃有百數姊妹皆為左道朋行淫佚曾無愧顔又蒙遜在時有罽賓沙門曇無讖者東入鄯善自云能使鬼物療病令婦人多子與鄯善王妹頭陀林淫通發覺亡奔涼州蒙遜寵之號曰聖人曇無讖以男女交接術教授婦女蒙遜諸女子婦皆往受法太武聞諸行人言曇無讖術乃召之蒙遜不遣乃發露其事栲訊殺之至是告者亦言太武追記其事遂賜昭儀沮渠氏死誅其宗族唯萬年及祖以前降得免是嵗又有人告牧犍與故臣交通謀反太武詔司徒崔浩就公主第賜牧犍死牧犍與主決良久乃自裁太武葬以王禮諡曰哀及公主死詔與牧犍合葬公主無男有女以國甥得襲母爵為武威公主蒙遜子季義為魏東雍州刺史後與河東薛安都謀逆召至平城使其兄弟扼殺之萬年以先降故封張掖王祖廣武公後亦坐謀逆賜死牧犍弟樂安太守安周當牧犍之敗奔于吐谷渾太武遣鎮南將軍奚眷討之牧犍弟酒泉太守無諱奔晉昌太武使弋陽公元潔守酒泉無諱圍酒泉陷之又圍張掖不能克退保臨松太武以詔諭之時永昌王健鎮涼州無諱使其中尉詣健求奉酒泉及送潔還朝太武于是拜無諱征西大將軍涼州牧酒泉王尋以無諱謀規叛亂復遣奚眷討酒泉克之無諱遂謀渡流沙遣安周西擊鄯善鄯善欲降會魏使者勸令拒守安周不能克退保東城既而鄯善王比龍西奔且末其世子乃從安周鄯善大亂無諱遂渡流沙士卒渴死者大半因據鄯善先是髙昌太守闞爽為敦煌公李寶舅唐契所攻聞無諱至鄯善使人詐降欲令無諱與唐契相擊留安周住鄯善從焉耆東北趣髙昌會蠕蠕殺唐契爽遂拒無諱無諱將衛興奴遂屠其城爽奔蠕蠕無諱復據髙昌元嘉二十一年夏無諱病死安周立後為蠕蠕所并沮渠氏遂絶通志卷一百九十二
