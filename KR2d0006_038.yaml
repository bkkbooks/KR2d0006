body:
  text: 通志卷三十三宋右迪功郎鄭樵漁仲撰六書略第三諧聲第五序曰諧聲與五書同出五書有窮諧聲無窮五書尚義諧聲尚聲天下有有窮之義而有無窮之聲擬之而後言議之而後動者義也不疾而速不行而至者聲也作者之謂聖述者之謂明五書作者也諧聲述者也諧聲者觸聲成字不可勝舉今略但引類以記其目一五二四示百十二玉二百八十與四氣四士三屮三草千一百四十六茻一八二采四牛三十一口五百七十二吅九品二㗊五走百七十六止二十四是二辵二百十六彳二百二十八三行十六齒九十六牙三足三百五十二籥十册一舌十谷二句三言五百二十一音二十七廾十九舁一臼一爨一革百九十二鬲二十􅦧十六爪六六門十一又四支五聿二五殳三十四寸七皮五十一支百七十三卜五用一爻三􅡚二目三百四十七瞿一眉二盾二自九白四鼻二十六羽九十二隹九十三苜四羊六十四雥一鳥四百三十六么五􅗸四􅀈二􅀢百二十九骨十二肉四百五十四刀百八十七刃四耒五十六角八十一竹五百七十四工四巫三甘八曰四丂八壴十五鼓十七豈二豆二十六虍十虎十八皿五十二去七血二十五丹六皀三鬯三食二十集二入二缶四十二矢二十七高十􅴹九享三廩一麥八十及七舛二韋五十七反二木九百十七林十桑八出七􅜨三生四􅑰六术五二束八㯻七口三十七貝百二十三邑九十􅣑二倝三偃二十八晶一月二十五夕四多二十六弓二朿二片五十三爿六鼎五禾二百八十九黍二十六香二十五米百六十八臼十四求十六􅀈十一韭五瓜三十三宀九十六穴百十七疒三百五十六坰五冃十六八十二四巾八十八帛十白四十八薾九人五百八十六匕二從五壬十一身三十二衣二百五十五毛九十尸二十九尾二舟百十九几七見九十一欠百五十三頁二百三十面四十首六須六彡十九文九髟百四十七卪三十一包二十一鬼四十六山三百四十五屵八廣四十一廠四十九石三百五十一長十七豕七十一􅀢三豸六十九馬二百六十四􅎷四十五㲋四三犬二百九十二鼠五能二火三百十三炎七黑百五炙赤十九大三十四尢六亢三十四壺三三六立四十四凶六心七百二水千五十七川二十七泉一􅏨一谷二十八欠五十七雨百四十五雲六魚三百二十六龍二飛四七至七鹵二十五戶十六門百十二耳八十五手七百二十五女五百五十丿一氏五戈三十八五匚三十五􅷺二災十一瓦二百二十一弓六十七弦三系三糸四百九十素八蟲五百五十四䖵五十六蟲五風百九龜五黽二十五卯四土三百七十四田六十八黃十四男二力百二金三百九十一几七且一斤二十斗十八矛三十三車七十六􅎧五􅊟七十六􅤦五叕一厹二甲五巴一辛十一子二十三申二酉六十二船六右諧聲字多不能紀今取二百七十六部之中而得二萬一千三百四十一字並見六書證訛子母同聲嚳枯沃切急告之甚也􅔨丑忍切走也卙即入切説文斟斟盛也汝南名蠶盛曰斟􅀈籍入切説文詞之􅀈矣忤五故切逆也吟魚音切呻也􅀈於金切小聲又塢感切鍾病聲周禮微聲􅀈攲邱奇切持去也􅀈丘奇切佹嶇也㩾株垂切􅀈㩾不齊㩺攀麋切方言南楚之間器破而未離謂之㩺隸郎計切説文附著也一曰賤稱􅀈徒奈切及也引詩􅀈天之未隂雨從隸枲聲枲亦音怠羊至切習也又以制切勞也㿳莊持切手足膚黑􅀈當侯切小穿也􅀈郎才切至也勤也斄洛哀切説文強曲毛可以著起衣棽癡林切説文木枝條棽儷也良刃切獸名似彘身黃尾白煢渠營切説文回疾也䨽非尾切説文别也􅩪邊兮切説文牢也所以拘非也從非陛省聲今作無説文亡也從亡無聲奇字作旡通於旡者王育説天屈西北為無釐里之切説文蒙福也􅀈居蚪切説文相紏繚也一曰瓜瓠結斗起象形或作斗袪尤切戾也㐜渠尤切讐也􅀈郎丁切撞也鄧中莖切張也湯丁切評議也從古文平字􅀢七支切人子腸也孳子之切説文汲汲生也從子兹聲孷陵之切方言陳楚之間凡人嘼乳而雙産謂之孷疑語其切惑也説文從子止上矢聲􅠟渠希切説文訖事之樂也犐音鳩犐大牝也右三十七母主聲瞿九遇切説文鷹隼之視也一曰心驚貌􅀢俱遇切舉目驚􅀢然􅀈仕角切説文角長貌築張六切説文以竹曲五絃之樂也從竹從鞏鞏持之也􅀈囊何切廣雅􅀈􅢲多也㗬陟加切説文厚脣貌從尚􅀈徐錯曰多即厚也又抽加切牆慈良切垣蔽也􅀈羊進切説文擊小鼓引樂聲也從申柬聲又以忍切􅦠沽三切南方山有􅦠􅀈林東方朔説􅀢居蔭切承樽桉䎶仍吏切神聽告響謂之䎶䋀洪孤切履也胡光切卵中黃黌胡盲切學舍枓當口切勺也延抽前切説文安步㢟㢟也延長行也􅀈都回切坐貌􅀈覩猥切􅀈木垂貌綴株衛切合著也側律切雞子出殼聲右二十一主聲不主義􅕆養里切踞也説文從後近之徐鍇曰妮也匏瓠也魏闕名右四子母互為聲靡忙皮切分也易曰吾與爾靡之又文披切説文披靡也又眉陂切散也又謨加切收靡縣名又靡詖切偃也曵也䢈丞真切説文日月合宿為䢈又黃外切􅀢子兩切大也又坐五切蜼徒冬切山海經松果山有鳥名蜼梁狀如山雞黑身赤足可以已曝又魯水切獸似狖卬鼻長尾右四聲兼意禮古作禮事神人之文也從示從豐豐祭器祰苦浩切説文告祭也祏常隻切石藏宗廟主祫總祭其先無間遠近曰祫周禮三嵗一祫禘周禮五嵗一禘大祭也一曰配帝禜于平切又為命切説文設綿蕝為營以禳風雨雪霜水旱疫癘從示榮省聲臣按此從營省為營以祀日月星辰山川也禬古外切説文會福祭也引周禮禬之祝號琥火五切説文發兵瑞玉為虎文一曰禮西方之玉瓏盧鍾切説文禱旱玉龍瑁莫報切説文諸侯執圭朝天子執玉以冒之似犁冠周禮天子執瑁四寸珥忍止切耳璫又仍吏切瑱也珩何庚切佩上玉也琀胡南切送死口中玉又胡紺切撫文切説文草初生其香分布亦作芝真而切菌類説文神草也災莊持切始治田也一嵗曰災二嵗曰畬或省草或從禾又將來切苷沽三切甘草也莽謨黨切即茻也南昌謂犬善逐草中為莽故從犬從茻莫莫故切日且冥也從日在茻中葬則浪切説文藏也從死在茻中少尺沼切説文不多也從小丿聲尐子列切説文少也從小乀聲兵列切説文分也從重八引孝經説云上下有别兆字亦類此􅀢以諸切二余也補過切布也從采從音播㹂輕甸切牛不從羈謂之㹂牭息利切説文四嵗牛􅠒呼形切聲也唬虛交切説文虎鳴也􅀈徒蓋切嘗也絫力鬼切增也絫十黍之重也壘力軌切壘擊也返孚袁切回行也又甫遠切遁都困切逃也遻五各切説文相遇驚也從辵從咢咢亦聲𧳨刀九切説文復也吐內切却也從彳從􅀢􅀢即退也後下豆切詩傳相導前後曰先後從彳從􅀢􅀢即後也䶤下八切齧骨聲􅀢測角切行也蹂而由切踐也詩或簸或蹂又忍九切獸足蹂地也踄蒲故切説文蹈也又白各切􅀈去智切舉踵也或省趾足也踅丑例切跳也又去例切跛也􅀢逵協切説文􅀢足也一曰小步籲弋灼切呼也他念切舌貌㔹歷德切説文材十人也䢅隸作䢅説文早昧爽也從臼從辰辰時也夕為夙臼辰為䢅皆同意弆口舉切徹也㸑粗尊切鼎欲沸貌釁許愼切説文血祭也象祭竈也從㸑省從酉酉所以祭也從分分亦聲莊皆切説文戒潔也齋或作居行切説文五味盉也從羮省從􅦧緊頸忍切説文纒絲急也􅀢天黎切臥也一曰虎臥息微又田黎切毄吉歷切相擊中也如車相擊故從殳從軎的則切取也專説文六寸薄也從寸叀聲一曰專紡專説文正也又諸盈切賦也周禮聽政役以比居敆葛合切合會也盧玩切煩也􅀈説文擊也一曰治也􅀈亭年切説文平田也引周書畋爾田􅀈測革切説文擊馬也或作策眅披班切説文多白眼也引春秋傳鄭遊眅字子明又普版切又普患切轉目視睍胡典切説文出目也一曰好視又形甸切目小也延面切相顧視而行也或作䀽瞑忙經切翕目也又母逈切瞑睦目不明眇説文一目小也矈民堅切説文目旁薄緻矈矈也􅀢營隻切視也瞁呼役切驚視貌䁼密北切䁼視無所見嗅許救切説文以鼻就臭也莫結切説文火不明也周書曰布重席織蒻席也疾正切深坑也殯必仭切説文死在棺將遷葬柩賔遇之夏后氏殯於阼階啇人殯於兩楹之間周人殯於賔階薧呼高切説文死人里也從死從蒿省薨説文公侯􅀈也􅀢巨兩切僵仆也􅀈資四切説文戰見血曰傷亂或為惛死而復生為􅀈斃斃毗祭切説文頓仆也引春秋傳與犬犬斃或從死􅀈都回切骨起骿蒲眠切説文并脅也晉文公骿脅骹邱交切説文脛也䏒匹見切半體也􅀈丁聊切博雅斷也刌取本切説文切也博雅斷也判説文分也剝説文裂也從刀從録録刻割也劃胡麥切裂也又忽麥切説文錐刀曰劃劑才詣切説文齊也刵仍吏切説文斷耳也劓魚器切説文刖鼻也刺説文君殺大夫曰刺刺直傷也􆀢紕民切分也耕説文犁也一曰古者井田故從井衡何庚切説文牛觸橫大木著其角從角從大行聲引詩設其楅衡簺先代切説文行棊相塞謂之簺築張六切説文以竹曲五絃之樂也從竹從鞏鞏持之也箕説文簸也從竹􆂻象形下其丌也古作􆂻異説文分也從丌從畀畀豫也􅀢居號切即古文誥字㔫則箇切今作優説文尤手相佐助也甜徒兼切美也􅀢徒南切説文和也從麻麻調也又沽三切猒於鹽切説文飽也從甘從然􅀈吹也又雲俱切歎也號説文痛聲也從口在丂上可説文肯也從口丂丂亦聲哥説文聲也從二可古文以為歌字哿賈我切説文可也引詩哿矣富人􅀈虎何切開口聲愷説文康也亦作凱盧回切龜目酒尊􅀢他感切説文血醢也禮有􅀢醢以牛脯梁鹽酒也􅀢舅許切説文黑黍一稃二米以釀也饜於鹽切飽也又於艷切餂徒兼切美也從食從甛省􅀈沽三切餌也餽吳人謂祭曰餽􅟿去久切食物爛也䢈丞真切説文日月合宿為䢈又黃外切糴徒歷切説文市穀也從入從耀或省罍盧回切説文龜目酒尊刻目作雲雷象施不窮也罄説文器中空也引詩瓶之罄矣知説文詞也或曰覺也臣按從矢發也發口而後人知之矣羽已切説文語己辭也矤亦作矧説文况也詞也從矢從引從矢取詞之所之如矢也敲黑各切大也喬巨嬌切説文高而曲也從夭從高省傾雪切説文缺也古者城闕其南方謂之從缺省稟筆錦切説文賜榖也今作愛説文行貌從文愛聲致陟利切説文詣送也􅀢今作昆周人謂兄為􅀢從弟從眔徐鉉曰眔目相及也或省作晜朲而鄰切字林屋間木人柵測革切説文編木也櫑盧回切龜目酒尊刻木作雲雷象枰蒲兵切枰仲木名一曰博局又皮命切博雅平也栮忍止切木䓴杽敕九切説文械也􅱮胡感切木垂華實從木從弓檒符風切風行木上曰檒又方馮切厚葉弱枝善搖貧説文財分少也䝳財干切害物貪財也尸羊切説文行賈也賀説文以禮相奉慶也貹所慶切富也貫説文錢貝之貫從母貝暒今作晴雨止而星見也升日之升也彌登切瞢增日無光旦儻旱切明也又徒案切暖乃管切溫也晛呼典切日見也又形甸切説文見也引詩見晛曰消晄戶廣切説文明也暗塢感切説文不明也倝古案切説文日始出光倝倝也從旦於聲明照也古作明辨匹見切革中絶也䅘又郎才切説文齊謂麥曰䅘毇虎委切説文米一斛舂為八斗也從䊆殳䊆糗也殳治米之器宔腫庾切説文宗廟宔祏所禁切禁省窣蘇骨切説文穴中卒也䆷一決切説文深抉也初危切説文減也􅕆倫為切病瘦也􅕆眉耕切目無眸子􅕆噎寧切㰽聲也疚居又切久病㽷式類切腫病痜他谷切首痬莫報切觸也􅀢古泫切挂也巾居銀切佩巾也輕甸切幡係於棨者從棨省佃亭年切治土也古者一夫一婦佃田百畝一曰古卿車又堂練切説文中也春秋傳曰乘中佃一轅車俒胡昆切又胡囷切説文全也引逸周書朕實不明以俒伯父佼居肴切又下巧切説文交也僜都騰切上車也仕上史切説文學也使爽士切説文伶也又疏史切將符者阡千人之長曰阡伍五人之長也説文相參伍什説文相什保也伯説文長也俔輕甸切説文譬喻也一曰聞見引詩俔天之妹化説文教行也古作􅀢仲説文中也係説文潔束也倌沽凡切主駕人也又古患切説文小臣也詩命彼倌人􅀈胡慣切仕也一曰閹人或省腦奴皓切説文頭也從匕匕相匕著也川象髮囟象腦形􅔨兹用切説文隨行也隸作從䩁甫微切説文細毛紛紛也或省㲝謨袍切毛或作㲝又莫報切輕毛雮莫卜切鳥澤羽㲏普刀切毛起貌屎馨夷切呻也又矧視切糞也􅕆牀史切待也從俟省㞒虛器切臥息也從自自即􅀢又許介切居陵切説文競也從二兄二兄競意從手聲一曰兢謹也隸省作兢子林切説文替替鋭意也又則旰切二人屈已以贊也兟所臻切説文進也從二先贊從此吃邱既切氣也歊虛嬌切説文歊歊氣出貌從欠高高亦聲以九切説文言意也從欠從亦聲或省欥弋質切説文詮詞也從欠從日日亦聲詩欥求厥寧次説文不前不精也􅀈鳥瓦切色敗艴蒲沒切説文色艴如也或作􅀈又敷勿切孟子艴然不悅胞匹交切説文兒生裹也傀古委切怪異也􅔨所介切鬼名或省作􅀈􅀈蒲奔切山形似瓫庥虛尤切説文息止也從人依木或從廣廟説文尊先祖貌也古作廟座坐具磬説文樂石也又棄挺切擊石聲硻邱耕切説文餘堅也砫腫庾切宗廟宔祏從石從主􅢢經天切説文三嵗豕肩相及者引詩並驅從兩豜兮􅀈莫後切豕名驂説文駕三馬也駟説文一乘也􅦩音八説文馬八嵗騛匪微切説文馬逸足也馼無分切説文馬赤鬛縞身目若黃金名曰馼古皇之乘周文王時犬戎獻之引春秋傳文馬百駟畫馬也西伯獻紂以全其身或書作􅀈馺悉合切説文馬行相及也或曰馳也髦謨袍切馬長尾􅀈蒲故切習馬也奘慈良切妄強犬也又在黨切􅰉於咸切説文竇中犬聲㺥鋤咸切狡也􅀈丈蟹切獬􅀈獸也似山牛一角古者決訟令觸不直爆比角切落也一曰火聲煣忍九切屈伸木也又如又切燎憐蕭切火在地上曰燎又郎鳥切説文放火也又力照切柴祭天也墨密北切説文書墨也㚕房密切説文從大弗聲大也讀若豫違汝弼又分物切􅀈胡黨切説文直項莽􅀈貌從亢從夋夋倨也亢亦聲絞説文縊也􅔨倫為切膝病也又魯果切蒞力至切説文臨也從立從隸隸及也竦息拱切説文謹也從立從束束自申束也竩宜寄切人所宜也凶虛容切又許拱切説文擾恐也從人在凶下春秋傳曰曹人凶懼德今作德説文外得於人內得於己也憼居慶切説文肅也或從心㢜口黨切大意又苦謗切説文闊也􅀢胡千切説文急也河南密縣有􅀢亭愚説文戅也從心從禺禺猴屬獸之愚者懝牛代切説文騃也一曰惶也或書作􅀢忘説文不識也又無放切棄忘也㤮古况切説文誤也愾許既切説文太息也引詩愾我寤歎又邱蓋切患説文憂也從心上貫叩叩亦聲態説文意也從心從能徐鍇曰心能其事然後有態度也臣按能音耐此即諧聲字沝之壘切閩人謂水曰沝從二水􅐹羽兩切去也揚雄弔屈原作此以其去水中故從水􅀢疾郢切陷也雷盧回切説文隂陽薄動雷雨生物者也籕文靁間有回回雷聲也雲説文山川氣也從雨云象雲回轉之形臣按古雲作云雷作回皆象其形尊罍器見之矣後人借云為云曰之云回為回旋之回故於雲雷復加雨以别漁語居切捕魚也又牛據切説文澱滓濁泥龗郎丁切説文龍也從龍霝聲靠苦到切相違也或書作􅀢亂説文治也從􅜆從乙治之也一曰紊也李斯從刀乴似絶切拈也閨説文特立之戶上圜下方有似圭狀夢説文寐而有覺也從宀疒夢聲閽説文常以昏閉門隸也澄延切市門聲説文音也古作殸􅀈五滑切説文吳楚之外凡無耳者謂之􅀈言若斷耳為盟一曰聾也插測洽切刺肉也又七接切搢也挻尸連切説文長也方言楚部謂取物而逆曰挻授説文豫也投説文擲也一曰合也拱説文斂手也㧓莊交切博雅搔也又側絞切又止兩切批擊也姓息正切説文人所生也古之神聖母感天而生子故稱天子引春秋傳天子因生以賜姓娶説文取婦也婚説文婦家也禮娶婦以昏時姻説文壻家也女之所因故曰姻妊如林切孕也娣説文女弟也婢説文女之卑者也媄母鄙切説文色好也媛干眷切美女詩曰邦之媛兮姦説文犯淫也􅀢霜夷切女巫或書作􅀈􅬥矩鮪切黍稷方器也古作匭蟘敵德切説文蟲食苖葉者吏乞蟘則生引詩去其螟蟘實職切説文敗創也從蟲從食食亦聲或省蠅説文營營青蠅蟲之大腹者螙都故切説文木中蟲蠱造蠱之法以百蟲置皿中俾相啖食其存者為蠱故從蟲皿也􅀈芳無切􅀈化也陸續曰自􅀈而鷇又俞戍切育也坤説文地也易之卦也從土位在申坪蒲兵切地平也或書作又皮命切均説文平遍也亦書作􅀢城説文以盛民也􅛮苦本切耕也墲蒙晡切規度墓地也方言凡葬無墳謂之墓所以墓謂之墲又罔甫切黃説文地之色從田從炗炗亦聲炗古文光也功説文以勞定國也勶刺列切説文發也勥渠良切説文迫也古從強舉兩切勥力拒也㔙晡橫切大力也􅀢口蟹切㔥􅀢疲也㔥部買切㔥􅀢􅀈子賀切手相佐助鑾説文人君乘車四馬鑣八鑾鈴象鸞鳥聲和則肅也從鑾省鉎師庚切鐵衣也又桑經切鍒而由切説文鐵之耎也鉃矧視切箭鏃又作木切利也扣去厚切説文金飾器口鏨財甘切鑿也又在敢切鐫謂之鏨又疾冉切又昨濫切鈴節丁切説文令丁也𨫔脂利切説文羊箠專有鐵一曰田器又私列切又質入切一説東夷謂鍬為𨫔又的協切􅀢居隱切謹身所承也又苟起切􅛂汝甘切須也㪵博慢切量物分半也䡊府遠切説文車耳反出也軵乳勇切説文反推車令有所付也一曰輕車或從茸從冗又符遇切車廂立木承重較之材轚吉詣切舟車序行也又吉歷切説文車轄相轚引周禮舟輿轚互者􅀈辛於切相和集也􅀈窺營切又犬穎切反也陷説文高下也一曰陊也或從土陸方竹切説文高平地籕作亦姓阢五忽切危也又語韋切石山戴土隙乞逆切説文壁際孔也􅀈展呂切所以載盛米從寧從災災缶也􅀈展呂切積也馗渠追切説文九逵道也似龜背故謂之馗馗高也從九從首􅀈苦故切搗茱萸為之味辛而苦悲巾切駮也字説文乳也從子在宀下子亦聲一曰文也又津之切養也鄭康成曰小國貢輕字之也􅀢古乎切説文無父也季説文少稱也從子從稚省娩芳萬切説文生子免身也孰説文食飪也攳徐侵切長也馬融曰踔攳枝頤與之切説文也象形篆從貢籕從首又曳來切順説文理也囟思晉切頭會腦蓋也䩌慈消切説文面焦枯小也詵疏臻切説文致言也引詩螽斯羽詵詵兮諟士紙切理也審也誡居拜切敕也誋渠記切誡也詔告也證諸盈切又之盛切諫也警舉影切言戒譣千簾切議也宜寄切言之當也誇枯瓜切説文譀也古作􅀢噭去厚切説文扣也如求婦先噭叕之繼説文續也從糸繼一曰反􅓟為繼􅀈質力切説文作布帛之總名也樂浪潔令織從糸從式徐鉉曰潔令蓋律令之書也䌖疾葉切合也又即入切一曰蠻夷貨䋛母禮切説文繡文如聚細米也緉里養切説文履兩板也一曰緉􅥭絞也工沽紅切巧飾也影物之隂影也舊作景葛洪始加彡或書作􅀈彣無分切説文也髦説文髮也邱顔切寡髮也髯如占切説文頰須也右三百七十三三體諧聲四體附序曰一子一母為諧聲是合二體者也有三體之合者非常道也故别之􅗨徒沃切從草從水毒聲蕅五厚切從草從水禺聲歸女嫁也從止婦省􅎧聲奉承也從手從廾丰聲衛從行從匝韋聲行匝列衛也釁象祭竈也從㸑省從酉酉所以祭從分分亦聲春從草從日屯聲鬻音煮從􅦧從水從煮省聲作代切説文設飪也從從食才聲音釐圻也從支從廠蓋廠之性坼果孰有味亦坼故謂之從聲徐錯曰廠崖也矍從明從佳佳欲逸走從又持之矍矍也􅕆今作鷹從隹疒省聲或從人人亦聲徐鉉曰鷹隨人指蹤故從人雁今作鴈從隹從人廠聲徐鉉曰大夫以為贄昏禮用之故從人衡戶庚切牛觸橫大木著其角從角從大行聲簠黍稷圜皿也從竹甫聲悉則切從宀屋也從廾捧也㠭象疊物之形捧而塞於屋中䀇公戶切器也從皿從缶古聲虜獲也從母從力虍聲槱余救切從木從火酉聲夢寐而有覺也從㝉從疒夢聲彘直例切豕也從彐從矢聲從北象足􅀢之笑切耕以臿浚出下壚土也從􅊟從土召聲冥幽也從日從六冖聲梁水橋也從木從水刃聲刃初良切履足所依也從彳從夂舟象形從尸聲疑惑也從子止七矢聲傷痛也從皿聿皕聲􅀢音斯虎臥息從臥從虎從􅛣聲寶珍也從宀從貝珤聲害從宀從口言從家起也丰聲丰音介右三十凡諧聲類計二萬一千八百十通志卷三十三
