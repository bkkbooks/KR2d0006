body:
  text: 通志卷一百十四宋右廸功郎鄭樵漁仲撰列傳第二十七魏張楊張燕公孫度子康晃康弟恭淵康子晃弟張繡張魯夏侯惇韓浩史渙夏侯淵子霸榮稱夏侯尚子元李豐王許允經荀彧荀攸賈詡袁渙張範弟承涼茂國淵王脩張楊字稚叔雲中人也以武勇給并州為武猛從事靈帝末天下亂置西園八校尉以所寵小黄門蹇碩為西園上軍校尉軍京都欲以御四方徴天下豪傑以為偏裨太祖及袁紹等皆為校尉屬之并州刺史丁原遣楊将兵詣碩為假司馬靈帝崩碩為何進所殺楊復為進所遣歸本州募兵得千餘人因留上黨擊山賊進敗董卓作亂楊遂以所将攻上黨太守於壺關不下畧諸縣衆至數千人山東兵起欲誅卓袁紹至河内楊與紹合復與匈奴單于於扶羅屯漳水單于欲叛紹楊不從單于執楊與俱去紹使将麴義追擊於鄴南破之單于與楊至黎陽攻破渡遼将軍耿祉軍衆復振卓以楊為建義将軍河内太守天子之在河東楊将兵至安邑拜安國将軍封晉陽侯楊欲迎天子還洛諸将不聽楊還野王建安元年楊奉董承韓暹挾天子還舊京糧乏楊以糧迎道路遂至洛陽謂諸将曰天子當與天下共之幸有公卿大臣楊當捍外難何事京都遂還野王即拜大司馬楊性仁和無威刑下人謀反發覺對之涕泣輙原不問楊素與吕布善太祖之圍布楊欲救之不能乃出兵東市遥為之埶其将楊醜殺楊以應太祖楊将眭固又殺醜将其衆欲北合袁紹太祖遣史渙邀擊破之於射犬城斬固盡收其衆也張燕常山眞定人也本姓褚黄巾起燕合聚少年為羣盗在山澤間轉攻還真定衆萬餘人博陵張牛角亦起衆自號将兵從事與燕合燕推牛角為帥俱攻廮陶牛角為飛矢所中被創且死令衆奉燕告曰必以燕為帥牛角死衆奉燕故改姓張燕剽悍㨗速過人故軍中號曰飛燕其後人衆寖廣燕善招攜故常山趙郡中山上黨河内諸山谷皆相通其小帥孫䡖王當等各以部衆從燕衆至百萬號曰黑山靈帝不能征河北郡縣被其害燕遣人至京都乞降拜燕平難中郎将是後董卓遷天子於長安天下兵數起燕遂以其衆與豪傑相結袁紹與公孫瓚争冀州燕遣将杜長等助瓚與紹戰為紹所敗人衆稍散太祖将定冀州燕遣使求佐王師拜征北将軍率衆詣鄴封安國亭侯邑五百户燕薨子方嗣方薨子融嗣燕曾孫林晉惠帝世為門下令史與趙王倫為亂未及期年位至尚書令衛将軍封郡公尋為倫所殺公孫度字升濟本遼東襄平人也度父延避吏居元菟任度為郡吏時元菟太守公孫琙子豹年十八早死度少時名豹又與琙子同年琙見而親愛之遣就師學為取妻後舉有道除尚書郎稍遷冀州刺史以謡言免同郡徐榮為董卓中郎将薦度為遼東太守度起元菟小吏為遼東郡所輕先時屬國公孫昭守襄平令召度子康為伍長度到官收昭笞殺於襄平市郡中名豪大姓田韶等宿遇無恩皆以法誅所夷滅百餘家郡中震慄東伐髙句驪西撃烏九威行海外初平元年度知中國擾攘語所親吏柳毅陽儀等曰漢祚将絶當與諸卿圗王耳時襄平延里社生大石長丈餘下有三小石為之足或謂度曰此漢宣帝冠石之祥而里名與先君同社主土地明當有土地而三公為輔也度益喜故河内太守李敏郡中知名惡度所為恐為所害乃将家屬入于海度大怒掘其父冢剖棺焚屍誅其宗族分遼東郡為遼西中遼郡署太守越海収東萊諸縣置營州刺史自立為遼東侯平州牧追封父延為建義侯立漢二祖廟承制設壇墠於襄平城南郊祀天地籍田理兵乘鸞輅九旒旄頭羽騎太祖表度為武威将軍封永寜鄉侯度曰我王遼東何永寜也藏印綬武庫度死子康嗣位以永寧鄉侯封弟恭是歲建安九年也十二年太祖征三郡烏丸屠柳城袁尚等奔遼東康斬送尚首語在武紀封康襄平侯拜左将軍康死子晃淵等皆小衆立恭為遼東太守文帝踐阼遣使即拜恭為車騎将軍假節封平郭侯追贈康大司馬初恭病隂消為閹人劣弱不能治國太和二年淵脅奪恭位明帝即位拜淵揚烈将軍遼東太守淵遣使南通孫權徃來賂遺權遣使張彌許晏等齎金玉珍寳立淵為燕王淵亦恐權遠不可恃且貪貨物誘致其使悉斬送彌晏等首明帝於是拜淵大司馬封樂浪公持節領軍如故使者至淵設甲兵為軍陣出見使者又數對國中賓客出惡言景初元年乃遣幽州刺史母邱儉等齎璽書徵淵淵遂發兵逆於遼隧與儉等戰儉等不利而還淵遂自立為燕王置百官有司遣使者持節假鮮卑單于璽封拜邊民誘呼鮮卑侵擾北方二年春遣太尉司馬懿征淵六月軍至遼東淵遣将軍卑衍楊祚等歩騎數萬屯遼陽圍壍二十餘里懿軍至令衍逆戰懿遣将軍胡遵等擊破之懿令軍穿圍引兵東南向而急東北即趨襄平衍等恐襄平無守夜走還諸軍進至首山淵復遣衍等迎軍殊死戰懿復擊大破之遂進軍造城下為圍壍會霖雨三十餘日遼水暴長運船自遼口徑至城下雨霽起土山修櫓為發石連弩射城中淵窘急糧盡人相食死者甚多将軍楊祚等降八月丙寅夜大流星長數十丈從首山東北墜襄平城東南壬午淵衆潰與其子脩将數百騎突圍東南走大兵急擊之當流星所墜處斬淵父子城破斬相國以下首級以千數傳淵首洛陽遼東帶方樂浪元菟悉平初淵家數有怪犬冠幘絳衣上屋晨炊有小兒蒸死甑中襄平北市生肉長圍各數尺有頭目口喙無手足而動摇占曰有形不成有體無聲其國滅亡始度以中平六年據遼東至淵三世凡五十年而滅始淵兄晃為恭任子在洛陽淵首到晃亦坐戮張繡武威祖厲人驃騎将軍濟族子也邊章韓遂為亂涼州金城麴勝襲殺祖厲長劉儁繡為縣吏閒伺殺勝郡内義之遂招合少年為邑中豪桀董卓敗濟與李傕擊吕布為卓報仇語在卓傳繡隨濟以軍功稍遷至建忠将軍封宣威侯濟屯𢎞農士卒饑餓南攻穰為流矢所中死繡領其衆屯宛與劉表合太祖南征軍淯水繡舉衆歸之太祖納濟妻繡恨之太祖聞其不悦宻有殺繡之計計漏繡掩襲太祖太祖軍敗二子沒繡還保穰太祖比年攻之不克及太祖拒袁紹於官渡繡從賈詡計復以衆降語在詡傳繡至太祖執繡手與之歡宴為子均取繡女拜揚武将軍官渡之役繡力戰有功遷破羌将軍從破袁紹於南皮復増邑凡二千户時天下戸口減耗十才一在諸将之封未有滿千户者而繡特多從征烏丸於柳城未至薨諡定侯子泉嗣坐與魏諷謀反國除張魯字公祺沛國豐人也祖父陵客蜀學道於鵠鳴山中造作符書以惑百姓從受道者出米五斗故世號米賊陵死子衡行其道衡死魯復行之益州牧劉焉以魯為督義司馬與别部司馬張脩将兵擊漢中太守蘇固魯遂襲殺脩奪其衆焉死子璋代立以魯不順盡殺魯母家室魯遂據漢中以鬼道教民自號師君其來學道者初皆名鬼卒受本道已信號祭酒各領部衆多者為治頭大祭酒皆教以誠信不欺詐有病自首其過大都與黄巾相似諸祭酒皆作義舎如今之亭傳又置義米肉懸於義舍行路者量腹取足若過多鬼道輙病之犯法者三原然後乃行刑不置長吏皆以祭酒為治民夷便樂之雄據巴漢垂三十年漢末力不能征遂就寵魯為鎮民中郎将領漢寜太守通貢獻而已民有地中得玉印者羣下欲尊魯為漢寜王魯功曹巴西閻圃諌曰漢川之民户出十萬財富土沃四面險固上匡天子則為桓文次及竇融不失富貴今承制署置勢足斬斷不煩於王願且不稱勿為禍先魯從之韓遂馬超之亂闗西民從子午谷奔魯者數萬家建安二十年太祖乃自散關出武都征之至陽平關魯欲舉漢中降其弟衞不肯帥衆數萬距關堅守太祖攻破之遂入蜀魯聞陽平已䧟将稽顙圃又曰今以廹徃功必䡖不如依杜灌赴朴胡相拒然後委積功必多於是乃奔南山入巴中左右欲悉燒寳貨倉庫魯曰本欲歸命國家而意未逹今之走避鋭鋒非有惡意寳貨倉庫國家之有遂封藏而去太祖入南鄭甚嘉之又以魯本有善意遣人慰喻魯盡将家出太祖逆拜魯為鎮南将軍待以客禮封閬中侯邑萬户封魯五子及閻圃等皆為列侯為子彭祖取魯女魯薨諡原侯子富嗣夏侯惇字元讓沛國譙人夏侯嬰之後也年十四就師學人有辱其師者惇殺之由是以烈氣聞太祖初起惇常為禆将從征伐太祖行奮武将軍以惇為司馬别屯白馬遷折衝校尉領東郡太守太祖征陶謙留惇守濮陽張邈叛迎吕布太祖家在鄄城惇輕車徃赴適與布㑹交戰布退還遂入濮陽襲得惇軍輜重遣将偽降共執持惇責以寳貨惇軍中震恐惇将韓浩乃勒兵屯惇營門召軍吏諸将皆案甲當部不得動諸營乃定遂詣惇所叱持質者曰汝等凶逆乃敢執刼大将軍復欲望生邪且吾受命討賊寜能以一将軍之故而縱汝乎因涕泣謂惇曰當柰國法何促召兵擊持質者持質者惶懼叩頭言我但欲乞資用去耳浩數責皆斬之惇既免太祖聞之謂浩曰卿此可為萬世法乃著令自今已後有持質者皆當并擊勿顧質由是刼質者遂絶太祖自徐州還惇從征吕布為流矢所中傷左目時夏侯淵與惇俱為将軍軍中呼惇為盲夏侯惇惡之每照鏡輙撲鏡於地復領陳留濟隂太守加建武将軍封高安郷侯時旱蝗大作惇乃斷太夀水作陂身自負土率将士勸種稻民頼其利轉領河南尹太祖平河北為大将軍後拒鄴破遷伏波将軍領尹如故使得以便冝從事不拘科制建安十二年錄惇前後功增封邑千八百户并前二千五百户二十一年從征孫權還使惇都督二十六軍留居巢賜伎樂名倡令曰魏絳以和戎之功猶受金石之樂况将軍乎二十四年太祖擊破吕布軍於摩陂召惇常與同載特見親重出入臥内諸将莫得比也拜前将軍督諸軍還夀春徙屯召陵文帝即王位拜大将軍數月薨諡忠侯惇雖在軍旅親迎師受業性清儉有餘財輙以分施不足資之於官不治産業子充嗣帝追思惇功欲使子孫畢侯分惇邑千户賜惇七子二孫爵皆關内侯惇弟亷及子㮊素自封列侯初太祖以女妻㮊即清河公主也㮊歴位侍中尚書安西鎮東将軍假節充薨子廙嗣廙薨子劭嗣韓浩者字元嗣河内人漢末兵起縣近山藪多宼浩聚徒衆為縣藩衞太守王匡以為從事将兵拒董卓於盟津時浩舅杜陽為河隂令卓執之使招浩浩不從袁術聞而壮之以為騎都尉夏侯惇聞其名請與相見大竒之使領兵從征伐時大議損益浩以為當急田太祖善之遷䕶軍太祖欲討柳城領軍史渙以為道遠深入非完計也欲與浩共諌浩曰今兵勢彊盛威加四海戰勝攻取無不如志不以此時遂除天下之患将為後憂且公神武舉無遺策吾與君為中軍主不宜沮衆遂從破柳城改其官為中䕶軍置長史司馬從討張魯魯降議者以浩智畧足以綏邊欲留使都督諸軍鎮漢中太祖曰吾安可以無䕶軍遂與俱還其見親任如此及薨太祖愍惜之無子以養子榮嗣史渙字公劉沛國人少任俠有雄氣太祖初起以客從行中軍校尉從征伐常監諸将見親信轉拜中領軍十四年薨子静嗣夏侯淵字妙才惇族弟也太祖居家曾有縣官事淵代引重罪太祖營救之得免時兖豫大亂淵以饑乏棄其㓜子而活亡弟孤女人以此義之太祖起兵以别部司馬騎都尉從遷陳留頴川太守及與袁紹戰於官渡行督軍校尉紹破使督兖豫徐州軍糧時軍食少淵傳饋相繼軍以復振昌狶反遣于禁擊之未抜復遣淵與禁并力遂擊狶降其十餘屯狶詣禁降淵還拜典軍校尉淵為将赴急疾常出敵之不意故軍中為之語曰典軍校尉夏侯淵三日五百六日一千濟南樂安黄巾徐和司馬俱等攻城殺長吏淵将泰山齊平原郡兵擊大破之斬和乎諸縣收其糧榖以給軍士十四年以淵為行領軍太祖征孫權還使淵督諸将擊廬江叛者雷緒緒破又行征西䕶軍督徐晃擊太原賊攻下二十餘屯斬賊帥商曜屠其城從征韓遂等戰於渭南又督朱靈平隃麋汧氐與太祖㑹安定降楊秋十七年太祖乃還鄴以淵行䕶軍将軍督朱靈路招等屯長安擊破南山賊劉雄降其衆圍遂超餘黨梁興於鄠抜之斬興封博昌亭侯馬超圍涼州刺史韋康於冀淵救康未到康敗去冀二百餘里超來逆戰軍不利汧氐反淵引軍還十九年趙衢尹奉等謀討超姜叙起兵鹵城以應之衢等譎説超使出擊敘於後盡殺超妻子超奔漢中還圍祈山敘等急求救諸将議者欲湏太祖節度淵曰公在鄴反覆四千里比報回敘等必敗非救急也遂行使張郃督歩騎五千在前從陳倉狹道入淵自督糧在後郃至渭水上超将氐羌數千逆郃未戰超走郃進軍収超軍器械淵到諸縣皆已降韓遂在顯親淵欲襲取之遂走淵收遂軍糧追至畧陽城去遂二十餘里諸将欲攻之或言當攻興國氐淵以為遂兵精興國城固攻不可卒㧞不如擊長離諸羌長離諸羌多在遂軍必歸救其家若遂獨守則孤救長離則官兵得與野戰可必虜也淵乃留督将守輜重輕兵歩騎到長離攻燒羌屯斬獲甚衆諸羌在遂軍者各還種落遂果救長離與淵軍對陣諸将見遂衆惡之欲結營作塹乃與戰淵曰我轉鬭千里今復作營塹則士衆罷弊不可久賊雖衆易與耳乃鼓之大破遂軍得其旌麾還畧陽進軍圍興國氐王千萬逃奔馬超餘衆降轉擊高平屠各皆散走収其糧榖牛馬乃假淵節初枹罕宋建因涼州亂自號河首平漢王太祖使淵帥諸将討建淵至圍枹罕月餘抜之斬建及所置丞相已下淵别遣張郃等平河闗渡河入小湟中河西諸羌盡降隴右平太祖下令曰宋建造為亂逆三十餘年淵一舉滅之虎歩關右所向無前仲尼有言吾與爾不如也二十一年增封三百户并前八百户還擊武都氐羌下辯收氐榖十餘萬斛太祖西征張魯淵等将涼州諸将侯王已下與太祖會休亭太祖每引見羌胡以淵畏之會魯降漢中平以淵行都䕶将軍督張郃徐晃等平巴郡太祖還鄴留淵守漢中即拜淵征西将軍二十三年劉備軍陽平關淵率諸将拒之相守連年二十四年正月備夜燒圍鹿角淵使張郃䕶東圍自将輕兵䕶南圍備挑戰郃軍不利淵分所将兵半助郃為備所襲淵遂戰死諡曰愍侯初淵雖數戰勝太祖常戒曰為将當有怯弱時不可但恃勇也将當以勇為本行之以智計但知任勇一匹夫敵耳淵妻太祖内妹長子衡尚太祖弟海陽哀侯女恩寵特隆衡襲爵轉封安寜亭侯黄初中賜淵中子霸太和中賜霸四弟爵皆關内侯霸正始中為討蜀䕶軍右将軍進封博昌亭侯素為曹爽所厚聞爽誅自疑亡入蜀以淵舊勲赦霸徙樂浪郡霸弟威官至兖州刺史威弟惠樂安太守惠弟和河南尹和弟稱自孺子時而好合聚童兒為之渠帥戲必為軍旅戰陣之事有違者輙嚴以鞭箠衆莫敢逆淵竒之使讀項羽傳及兵書不肯曰能則自為耳安能學人年十六淵與之畋見奔虎稱馳馬逐之禁之不可一箭而倒名聞太祖太祖把其手喜曰我得汝矣與文帝為布衣之交每宴會氣陵一坐辯士不能屈世之高名者多從之游年十八卒稱弟榮㓜聰慧七歲能屬文誦書日千言經目輙識之文帝聞而請焉賓客百餘人人一奏刺悉書其鄉邑姓名世所謂爵里刺也客示之一寓目使之遍談不謬一人帝深竒之漢中之敗榮年十三左右提之走不肯曰君親在難焉所逃死乃奮劒而戰遂沒陣衡薨子績嗣為虎賁中郎将績薨子褒嗣夏侯尚字伯仁淵從子也文帝與之親友太祖定冀州尚為軍司馬将騎從征伐後為五官将文學魏國建遷黄門侍郎代郡胡叛遣鄢陵侯彰征討之以尚參彰軍事定代地還太祖崩於洛陽尚持節奉梓宫還鄴并錄前功封平陵亭侯拜散騎常侍遷中領軍文帝踐阼更封平陵鄉侯遷征南将軍領荆州刺史假節都督南方諸軍事尚奏劉備别軍在上庸山道險難彼不我虞若以竒兵潛行出其不意則獨克之勢也遂勒諸軍擊破上庸平三郡九縣遷征南大将軍孫權雖稱藩尚益脩攻討之備權後果有貳心黄初三年車駕幸宛使尚率諸軍與曹眞共圍江陵權将諸葛瑾與尚對江瑾渡入江中渚而分水軍於江中尚夜多持油船将歩騎萬餘人於下流潛渡攻瑾諸軍夾江燒其舟船水陸並攻破之城未抜會大疫詔勅尚引諸軍還益封六百户并前千九百户假鉞進為牧荆州殘荒外接蠻夷而與呉阻漢水為境舊民多居江南尚自上庸通道西行七百餘里山民蠻夷多服從者五六年間降附數千家五年徙封昌陵鄉侯尚有愛妾嬖幸寵奪適室適室曹氏女也故文帝遣人絞殺之尚悲感發病怳惚既𦵏埋妾不勝思見復出視之文帝聞而恚之曰杜襲之輕薄尚良有以也然以舊臣恩寵不衰六年尚疾篤還京都帝數臨幸執手涕泣尚薨諡曰悼侯子元嗣又分尚户三百賜尚弟子奉爵關内侯元字太初少知名弱冠為散騎黄門侍郎嘗進見與皇后弟毛會並坐元耻之不悦形之於色明帝恨之左遷為羽林監正始初曹爽輔政元爽之姑子也累遷散騎常侍中䕶軍元世名知人為中䕶軍㧞用武官參㦸牙門無非俊傑後多牧州典郡立法垂教者太傅司馬懿訪以時事元上議於懿皆切政理懿敬重焉頃之為征西将軍假節都督雍涼諸軍事元既遷大将軍司馬師代為䕶軍䕶軍總統諸将任主武官選舉前後當此官者不能止貨賂故蒋濟為䕶軍時有謡言欲求牙門當得千匹百人督五百匹司馬懿與濟善聞以問濟濟無以解之因戲曰洛中市買一錢不足則不行遂相對歡笑元代濟雖號識别然亦不能止絶人事及師代元乃整頓法令無敢犯者元在州與曹爽共興駱谷之役時人譏之爽誅徵元為大鴻臚數年徙太常元以爽抑絀内不得意中書令李豐雖宿為司馬師所親待然私心在元遂結皇后父光祿大夫張緝謀欲以元輔政豐既内握權柄子韜復尚齊長公主又與緝俱馮翊人故緝信之豐隂令其弟兖州刺史翼求入朝欲使将兵入并力起事會翼求朝不聽嘉平六年二月當拜貴人豐等欲因御臨軒諸門有陛兵誅師以元代之以緝為驃騎将軍豐密語黄門監蘇鑠永寜署令樂敦冗從僕射劉賢等因曰卿諸人居内多有不法大将軍嚴毅累以為言張當可以為誡鑠等皆許以從命豐遂遣子韜以謀報元元曰宜詳之耳師微聞其謀使舍人王羕以車迎豐豐不知而徃師以所聞責豐豐知禍及遂正色曰卿父子懐姦将傾社稷惜吾力劣不能相禽滅耳師怒使勇士以刀環築殺之事下有司收元緝鑠敦賢等送廷尉元至廷尉不肯下辭廷尉鍾毓自臨治元元正色責毓曰吾當何辭卿為令史責人也卿便為吾作毓以其名士節高不可屈而獄當竟夜為作辭令與事相附流涕以示元元視頷之而已毓弟會年少於元元不與交是日於毓坐欲狎而友元元正色曰鍾君何得相逼如此毓遂奏豐等謀廹脅至尊擅誅冡宰大逆無道請論如法於是會公卿朝臣廷尉議咸以毓所正皆如科律報毓施行詔書齊長公主先帝遺愛匄其三子死命於是豐元緝敦賢等皆夷三族韜以尚主賜死獄中其餘親屬徙樂浪郡元格量𢎞濟臨斬東市顔色不變舉動自若時年四十六初元為征西被徵時夏侯霸将奔蜀呼元欲與之俱元曰吾豈茍存自客於宼虜乎遂還京師太傅司馬懿薨高陽許允謂元曰無復憂矣元歎曰卿何不見事乎此人猶能以通家年少遇我子元子上不吾容也元嘗著樂毅張良及本無肉刑論辭㫖通遠咸傳於世元之執也衞将軍司馬昭流涕請之師曰卿忘會趙司空𦵏乎先是司空趙儼薨師昭兄弟會𦵏賔客以百數元時後至衆賓客咸越席而迎師由是惡之元之禍蓋萌於此云正元中紹功臣世封尚從孫本為昌陵亭侯邑三百户以奉尚後李豐字安國衞尉義之子也黄初中以父任召隨軍始為白衣時年十七八在鄴下名為清白識别人物海内翕然莫不注意後隨軍在許昌聲稱日隆其父不願其然勅令閉門謝客初明帝在東宫豐在文學中及即尊位得呉降人問江東聞中國名士為誰降人云聞有李安國者是時豐為黄門郎明帝問左右安國所在左右以豐對帝曰豐名乃被於呉越邪後轉騎都尉給事中帝崩後為永寧太僕以名過其實能用少也正始中遷侍中尚書僕射豐在臺省常多託疾時臺制疾滿百日當解禄豐疾未滿數十日輙暫起已復臥如是數歲豐弟翼及偉仕數歲間並歴郡守時太傅司馬懿久病偉為二千石荒於酒亂新平扶風二郡而豐不召衆人以為恃寵曹爽專政豐依違二公間無有適莫故于時有謗書曰曹爽之勢熱如湯太傅父子冷如漿李豐兄弟如㳺光其意以為豐雖外示清浄而内圗事有似於㳺光也及司馬懿奏誅爽住車闕下與豐相聞豐怖懅氣索足委地不能起至嘉平四年懿終後中書令缺大将軍司馬師因奏用豐豐知此非顯選又自以連婚國家思附至尊深疾司馬氏放逐有廢易之謀及事敗被誅師夜送豐尸以付廷尉廷尉鍾毓不受曰非法官所治也以其状告且勅之乃受帝怒将問豐死意太后懼呼帝入乃止遂遣使收翼翼後妻散騎常侍荀廙姊謂翼曰中書事發可及詔書未至赴呉何為坐取死亡左右可共同赴水火者誰翼思未答妻曰君在大州不知可與同死生者去亦不免翼竟從坐先是中領軍許允與豐及元親善時有詐作尺一詔書以元為大将軍允為太尉共錄尚書事有何人天未明乘馬以詔版付允門吏曰有詔因便馳走允即投書燒之不以關呈大将軍後豐等事覺允亦坐謫死允字士宗世冠族父據仕歴典農校尉郡守允少與同郡崔贊俱發名於冀州召入軍明帝時為吏部郎選郡守明帝疑其所用非次召入将加罪允妻阮氏跣出謂曰明主可以理奪難以情求允頷之而入帝怒詰之允對曰某郡太守雖限滿文書先至年限在後日限在前帝前取事視之乃釋遣出望其衣敗曰清吏也賜之後出為郡守稍遷為侍中尚書中領軍允聞李豐等被收欲徃見大将軍師已出門回遑不定中道還取袴豐等已收訖師聞允前遽怪之曰我自收豐等不知士大夫何為忩忩乎是時朝臣遽者多耳而衆人咸以為意在允也㑹鎮北将軍劉靜卒朝廷以允代静為鎮北将軍假節都督河北諸軍事已受節傳出止外舍師與允書曰鎮北雖少事而都典一方念足下震華鼓建朱節歴本州此所謂著繡晝行也允心甚悦與臺中相聞欲易其鼓吹旌旗其兄子素頗聞衆人説允前見嫌意戒允但當趣去耳安用是為邪允曰卿俗士不解我以榮國耳故求之既而復謂其妻曰吾知免矣妻曰禍見於此何免之有允善相印将拜以印不善使更刻之如此者三允曰印雖始成而已被辱問送印者果懐之而墜於厠相印書曰相印法本出陳長文長文以語韋仲将印工楊利從仲将受法以語許士宗利以法術占吉凶十可中八九仲将問長文從誰得法長文曰本出漢世有相印相笏經又有鷹經牛經馬經印工宗養以法語程中伯是故有十三家相法傳於世帝以允當出乃詔會羣臣羣臣皆集帝特引允以自近允前為侍中顧當與帝别涕泣歔欷㑹訖罷以詔促令去會有司奏允前擅以厨錢榖乞諸俳及其官屬故遂收送廷尉考問竟得減死徙樂浪郡卒於道中阮氏賢明而醜允始見愕然交禮畢無復入意阮遣婢覘之云有客姓桓阮曰是必桓範将勸使入也既而範果勸之允入湏臾便起阮捉裾留之允顧謂曰婦有四徳卿有其㡬對曰新婦所乏唯容士有百行君有其㡬允曰皆備阮曰士有百行以徳為首君好色不好徳何謂皆備允有慙色知其非凡遂雅相親重生二子竒猛皆少有令問允既為師所誅門生走入告阮正在機神色不變曰早知爾耳門生欲藏其子阮曰無預諸兒事後移居墓所師遣鍾會觀之謂會曰若其子才蓺徳能及父當收竒猛知之以語其母母答汝等雖佳才具不多可率胸懐與會語便自無憂不湏極哀會止便止不可多少問朝事竒等從之會反命具以状對卒免其禍竒猛後皆貴顯時又有清河王經者字彦偉亦與允俱稱冀州名士初為江夏太守大将軍曹爽附絹二十疋令交市於呉經不發書棄官歸母問歸状經以實對母以經典兵馬而擅去對送吏杖經五十爽聞不復罪母因謂經曰汝田家子今仕至二千石物太過不祥可以止矣經不能從歴二州刺史司隸校尉甘露中為尚書坐高貴鄉公事被誅事在本紀經臨入獄辭母母顔色不變笑而應曰人誰不死徃所以止汝者恐死不得其所也以此并命何恨之有哉經為司隸時辟河内向雄為都官從事及經刑於東市雄哭之感動一市刑及經母雍州故吏皇甫晏以家財收𦵏焉允始與同發名同郡崔贊者亦嘗戒允以處世太盛允不能用以至於敗荀彧字文若潁川潁隂人也祖父淑朗陵令父緄濟南相叔父爽司空緄畏憚宦官乃為彧娶中常侍唐衡女彧以少有才名故得免於譏議南陽何顒名知人見彧而異之曰王佐才也永漢元年舉孝亷拜守宫令董卓之亂求出補吏除亢父令遂棄官歸鄉里謂父老曰潁川四戰之地天下有變常為兵衝宜亟避之郷人多懐土不能去㑹冀州牧同郡韓馥遣騎迎之彧乃獨将宗族行其留者後多為董卓将李傕所殺畧焉彧比至冀州而袁紹已奪馥位紹待彧以上賓之禮彧弟諶及同郡辛評郭圗皆為紹所任彧度紹終不能成大事時太祖為奮武将軍在東郡彧聞其雄畧初平二年乃去紹而從太祖太祖大悦曰吾子房也以為舊武司馬時年二十九明年太祖為鎮東将軍領兖州牧彧又為鎮東司馬興平元年太祖征陶謙彧任留事守鄄城㑹張邈陳宫以兖州反潛迎吕布布既至諸城皆應之邈乃使人譎彧曰吕将軍來助曹使君擊陶謙宜亟供軍實彧知邈有變即勒兵設備故邈計不行豫州刺史郭貢率兵數萬到城下求見彧彧将徃東郡太守夏侯惇等止之曰何知貢不與吕布同謀而欲輕見之今君為一州之鎮徃必危也彧曰貢與邈等分非素結今来速者計未必定及其猶豫宜時説之縱不為用可使中立若先懐疑嫌彼将怒而成謀不如徃也貢既見彧無懼意知城不可攻遂引而去彧乃使程昱説范東阿使固其守卒全三城以待太祖焉二年陶謙死太祖欲遂取徐州還定吕布彧諫曰昔高祖保關中光武據河内皆深根固本以制天下進足以勝敵退足以堅守故雖有困敗而終濟大業将軍本以兖州首事故能平定山東此實天下之要地而将軍之關中河内也若不先定之根本将何所寄乎宜急分討陳宫使虜不得西顧乘其間而收熟麥約食稸榖以資一舉則吕布不足破也今舍之而東未見其便多留兵則力不勝敵少留兵則後不足固布乘虚宼暴震動人心縱數城或全其餘非復已有則将軍尚安所歸乎且前討徐州威罰實行其子弟念父兄之恥必人自為守就能破之尚不可保彼若懼而相結共為表裏堅壁清野以待将軍将軍攻之不抜掠之無獲不出一旬則十萬之衆未戰而自困矣夫事固有棄彼取此以權一時之埶願将軍慮焉太祖於是大收熟麥復與布戰布敗走因分定諸縣兖州遂平建安元年太祖擊破黄巾漢獻帝自河東還洛陽太祖議奉迎都許衆以山東未定韓暹楊奉負功恣雎未可卒制彧乃勸太祖曰昔晉文公納襄王而諸侯景從漢髙祖東伐為義帝縞素而天下歸心自天子播越将軍首唱義兵徒以山東擾亂未能逺赴關右雖禦難於外乃心無不在王室今車駕旋軫東京榛蕪義士有存本之思兆人懐感舊之哀誠因此時奉主上以從民望大順也秉至公以服天下大畧也扶𢎞義以致英俊大徳也四方雖有逆節必不能為累明矣韓暹楊奉其敢為害若不時定使豪傑生心後雖慮之無及太祖遂至洛陽奉迎天子都許天子拜太祖大将軍進彧為侍中守尚書令常居中持重太祖雖征伐在外軍國事皆與彧籌焉太祖問彧誰能代卿為我謀者彧薦從子攸及鍾繇郭嘉陳羣杜襲司馬懿戲志才等太祖以彧為知人諸所進逹皆稱職唯嚴象為揚州韋康為涼州後敗亡自太祖之迎天子都許也袁紹内懐不服紹既并河朔天下畏其彊太祖方東憂吕布南拒張繡而繡敗太祖軍於宛紹益驕與太祖書其辭悖慢太祖大怒出入動静變於常衆皆謂以失利於繡故也鍾繇以問彧彧曰公之聰明必不追咎徃事殆有他慮即見太祖問之太祖以紹書示彧曰今将討不義而力不敵何如彧曰古之成敗者誠有其才雖弱必彊茍非其人雖彊易弱劉項之存亡足以觀矣今與公争天下者唯袁紹爾紹貌外寛内忌任人而疑其心公明逹不拘唯才所宜此度勝也紹遲重少决失在後機公能斷大事應變無方此謀勝也紹御軍寛緩法令不立士卒雖衆其實難用公法令既明賞罰必行士卒雖寡皆争致死此武勝也紹慿世資從容飾智以收名譽故士之寡能好問者多歸之公以至仁待人推誠心不為虚美行已謹儉而與有功者無所恡惜故天下忠正效實之士咸願為用此徳勝也夫以四勝輔天子仗義征伐誰敢不從紹雖彊其何能為太祖悦彧曰不先取吕布河北亦未易圗也太祖曰然吾所惑者又恐紹侵擾關中亂羌胡南誘蜀漢是我獨以兖豫抗天下六分之五也為将柰何彧曰關中将帥以十數莫能相一唯韓遂馬超最彊彼見山東方争必各擁衆自保今若撫以恩徳遣使連和相持雖不能久安比公安定山東足以不動鍾繇可屬以西事則公無憂矣三年太祖既破張繡東禽吕布定徐州遂與袁紹相拒孔融謂彧曰紹地廣兵強田豊許攸智計之士也為之謀審配逢紀盡忠之臣也任其事顔良文醜勇冠三軍統其兵殆難克乎彧曰紹兵雖多而法不整田豐剛而犯上許攸貪而不治審配專而無謀逢紀果而自用此二人留知後事若攸家犯其法必不能縱也不縱攸必為變顔良文醜一夫之勇耳可一戰而禽也五年與紹連戰太祖保官渡紹圍之太祖軍糧方盡書與彧議欲還許以致紹師彧報曰今軍食雖少未若楚漢在滎陽成臯間也是時劉項莫肯先退先退者埶屈也公以十分居一之衆畫地而守之阨其喉而不得進已半年矣情見勢竭必将有變此用竒之時不可失也太祖乃止遂以竒兵襲紹别屯斬其将淳于瓊等紹退走審配以許攸家不法收其妻子攸怒叛紹顔良文醜臨陣授首田豐以諫見誅皆如彧所策六年太祖就榖東平之安民糧少不足與河北相支欲因紹新破以其間擊討劉表彧曰今紹敗其衆離心宜乘其困遂定之而背兖豫遠師江漢若紹收其餘燼承虚以出人後則公事去矣太祖復次于河上紹病死太祖渡河擊紹子譚尚而高幹郭援侵畧河東關右震動鍾繇帥馬騰等擊破之語在繇傳八年太祖錄前後功表封彧為萬歲亭侯九年太祖㧞鄴領兾州牧有説太祖宜復古置九州則冀部所制者廣大天下易服太祖将從之彧言曰今若依古制是為冀州所統悉有河東馮翊扶風西河幽并之地也公前屠鄴城海内震駭各懼不得保其土宇守其兵衆今若一處被侵必謂以次見奪人心易動若一旦生變天下未可圗也願公先定河北然後修復舊京南臨楚郢責王貢之不入天下咸知公意則人人自安湏海内大定乃議古制此社稷之長利也太祖遂寝九州議是時荀攸常為謀主彧兄衍以監軍校尉守鄴都督河北事太祖之征袁尚也高幹密遣兵謀襲鄴衍逆覺盡誅之以功封列侯太祖以女妻彧長子惲後稱安陽公主彧及攸並貴重皆謙冲節儉禄賜散之宗族知舊家無餘財十二年增彧邑千户合二千户太祖将伐劉表問彧策安出彧曰今華夏已平南土知困矣可顯出宛葉而間行輕進以掩其不意太祖遂行會表病死太祖直趨宛葉如彧計表子琮以州逆降十七年董昭等謂太祖宜進爵國公九錫備物以彰殊勲密以諮彧彧以為太祖本興義兵以匡朝寜國秉忠貞之誠守退讓之實君子愛人以徳不宜如此太祖由是心不能平會征孫權表請彧勞軍于譙因輒留彧以侍中光禄大夫持節参丞相軍事太祖軍至濡湏彧疾留夀春太祖饋之食發視乃空器也於是彧飲藥而卒年五十漢帝哀惜之祖日為之廢讌樂謚曰敬侯明年太祖遂稱魏公云子惲嗣官至虎賁中郎将初文帝與平原侯植並有擬論文帝曲禮事彧及彧卒惲又與植善而與夏侯尚不睦文帝深恨惲惲早卒子甝霬音翼以外甥故猶寵待惲弟俁御史中丞俁弟詵大将軍從事中郎皆知名早卒詵弟顗咸熙中為司空惲子甝嗣為散騎常侍進爵廣陽郷侯年三十薨子頵嗣霬官至中領軍薨謚貞侯追贈驃騎将軍子愷嗣霬妻司馬師之妹也師昭皆與親善咸熙中開建五等霬以著勲前朝改封愷南頓子荀攸字公逹彧從子也祖父曇廣陵太守攸少孤年七八歲叔父衢嘗醉誤傷攸耳而攸出入遊戲常避䕶不欲令衢見衢後聞之乃驚其夙智如此及曇卒故吏張權求守曇墓攸年十三疑之謂衢曰此吏有非常之色殆将有姦衢寤乃推問果殺人亡命由是異之何進秉政徵海内名士攸等二十餘人攸到拜黄門侍郎董卓之亂關東兵起卓徙都長安攸與議郎鄭泰何顒侍中种輯越騎校尉伍瓊等謀曰董卓無道甚於桀紂天下皆怨之雖資彊兵實一匹夫耳今直刺殺之以謝百姓然後據殽函輔王命以號令天下此桓公之舉也事垂就而覺收顒攸繫獄顒憂懼自殺攸言語飲食自若會卓死得免棄官歸復辟公府舉高第遷任城相不行攸以蜀漢險固人民殷盛乃求為蜀郡太守道絶不得至駐荆州太祖迎天子都許遺攸書曰方今天下大亂智士勞心之時也而顧觀變蜀漢不已久乎於是徵攸為汝南太守入為尚書太祖素聞其名與語大悦謂荀彧鍾繇曰公逹非常人也吾得與之計事天下當何憂哉以為軍師建安三年從征張繡攸言於太祖曰繡於劉表相恃為彊然繡以㳺軍仰食於表表不能供也勢必離不如緩軍以待之可誘而致也若急之其勢必相救太祖不從遂進軍之穰與戰繡急表果救之軍不利太祖謂攸曰不用君言至是乃設竒兵復戰大破之是歲太祖自宛征吕布至下邳布敗退固守攻之不㧞連戰士卒疲太祖欲還攸與郭嘉説曰吕布勇而無謀今三戰皆北其鋭氣衰矣三軍以将為主主衰則軍無奮意夫陳宫有智而遲今及布氣之未復宫謀之未定急攻之布可㧞也乃引沂泗灌城城潰生禽布後從救劉延於白馬攸畫策斬顔良語在武紀太祖㧞白馬還遣輜重循河而西袁紹渡河追卒與太祖遇諸将皆恐説太祖還保營攸曰此所以禽敵柰何去之太祖目攸而笑遂以輜重餌賊賊競奔之陣亂乃縱歩騎擊大破之斬其将文醜太祖遂與紹相拒於官渡軍食方盡攸言於太祖曰紹運車旦暮至其将韓􅀢鋭而輕敵擊可破也太祖曰誰可使攸曰徐晃可乃遣晃及史渙邀擊破走之燒其輜重會許攸来降言紹遣淳于瓊等将萬餘兵迎運糧将驕卒惰可邀擊也衆皆疑唯攸與賈詡勸太祖太祖乃留攸及曹洪守軍太祖自将攻破之盡斬瓊等紹将張郃高覧燒攻櫓降紹遂棄軍走郃之來洪疑不敢受攸謂洪曰郃計不用怒而來君何疑乃受之七年從討袁譚尚於黎陽明年太祖方征劉表譚尚争冀州譚遣辛毗乞降請救太祖将許之以問羣下羣下多以為表彊宜先平之譚尚不足憂也攸曰天下方有事而劉表坐保江漢之間其無四方之志可知矣袁氏據四州之地帶甲十萬紹以寛厚得衆借使二子和睦以守其成業則天下之難未息也今兄弟遘惡其勢不兩全若有所并則力專力專則難圖也及其亂而取之天下定矣此時不可失也太祖曰善乃許譚和親遂還擊破尚其後譚叛從斬譚於南皮冀州平太祖表封攸陵樹亭侯十二年大論功行封太祖曰忠正密謀撫寜内外文若是也公逹其次也增邑四百户並前七百户轉為中軍師魏國初建為尚書令攸深密有智防自從太祖征伐常謀謩帷幄時人及子弟莫知其所言太祖每稱曰公逹外愚内智外怯内彊不伐善無施勞智可及愚不可及雖顔子寗武不能過也文帝在東宫太祖謂曰荀公逹人之師表也汝當盡禮敬之攸曾病世子問病獨拜牀下其見尊異如此攸與鍾繇善繇言我每有所行反覆思維自謂無以易以咨公逹輙復過人意公逹前後凡畫竒䇿十二唯繇知之繇撰集未就會薨故世不得盡聞也攸後從征孫權道薨時年五十八太祖言則流涕每曰孤與荀公逹周遊二十餘年初無毫毛可非者又常稱荀令君之進善不進不休荀軍師之去惡不去不止君子以為知言長子緝有攸風早卒次子適嗣無子絶黄初中紹封攸孫彪為陵樹亭侯邑三百户後轉封邱陽亭侯正始中追謚攸曰敬侯賈詡字文和武威姑臧人也少時人莫之知惟漢陽閻忠異之謂詡有良平之竒察孝亷為郎疾病去官西還至汧遇叛氐同行數十人皆為所執詡曰我叚公外孫也汝别埋我我家必厚贖之時太尉叚熲久為邊将威震西土故詡以懼氐氐果不敢害與盟而送之其餘悉死詡實非叚甥權以濟事咸此類也董卓之入洛陽詡以太尉掾為平津都尉遷討虜校尉卓壻中郎将牛輔屯陜詡在輔軍卓敗輔又死衆恐懼校尉李傕郭氾張濟等欲解散間行歸鄉里詡説之使攻長安語在卓傳傕等既得志以詡為左馮翊欲以功侯之詡曰此救命之計何功之有固辭不受又以為尚書僕射詡曰尚書僕射官之師長天下所望詡名不素重非所以服人也縱詡昧於榮利柰國朝何乃更拜詡尚書典選舉多選舊名以為令僕論者以此多詡而於傕等復多所匡濟故皆親而憚之㑹母喪去官拜光禄大夫傕氾等鬭長安中傕復請詡為宣義将軍傕等和出天子祐䕶大臣詡有力焉天子既出詡上還印綬是時将軍叚煨屯華隂與詡同郡遂去傕託煨詡素知名為煨軍所望煨内恐其見奪而外奉詡禮甚備詡愈不自安張繡在南陽詡隂結繡繡遣人迎詡詡将行或謂詡曰煨待君厚矣君安去之詡曰煨性多疑有忌詡意禮雖厚不可恃久将為所圗我去必喜又望吾結大援於外必厚吾妻子繡無謀主亦願得詡則家與身必俱全矣詡遂徃繡執子孫禮煨果善視其家詡説繡與劉表連和太祖比征之一朝引軍退繡自追之詡謂繡曰不可追也追必敗繡不從進兵交戰大敗而還詡謂繡曰促更追之更戰必勝繡謝曰不用公言以至於此今已敗柰何復追詡曰兵勢有變速徃必利繡從之遂収散卒赴追大戰果以勝還問詡曰繡以精兵追退軍而公曰必敗退以敗卒擊勝兵而公曰必克悉如公言何其反而皆驗也詡曰此易知耳将軍雖善用兵非曹公敵也軍雖新退曹公必自斷後追兵雖精将既不敵彼士亦鋭故知必敗曹公攻将軍無失策力未盡而退必國内有故已破将軍必輕軍速還縱留諸将斷後諸将雖勇亦非将軍敵故雖用敗兵而戰必勝也繡乃服是後太祖拒袁紹於官渡紹遣人招繡并與詡書結援繡欲許之詡顯於繡坐上謂紹使曰歸謝袁本初兄弟不能相容而能容天下國士乎繡驚懼曰何至於此竊謂詡曰若此當何歸詡曰不如從曹公繡曰袁彊曹弱又與曹為讎從之若何詡曰此所以宜從也夫曹公奉天子以令天下其宜從一也紹彊盛我以少衆從之必不以我為重曹公衆弱其得我必喜其宜從二也夫有霸王之志者固将釋私怨以明徳於四海其宜從三也願将軍無疑繡從之率衆歸太祖太祖見之喜執詡手曰使我信重於天下者子也表詡為執金吾封都亭侯遷冀州牧兾州未平留參司空軍事袁紹圍太祖於官渡太祖糧盡問詡計焉出詡曰公明勝紹勇勝紹用人勝紹决機勝紹有此四勝而半年不定者但顧萬全故也必决其機湏㬰可定也太祖曰善乃并兵出圍擊紹三十餘里營破之紹軍大潰河北平太祖領冀州牧徙詡為太中大夫建安十三年太祖破荆州欲順江東下詡曰明公昔破袁氏今收漢南威名逺著軍勢既大若乘舊楚之饒以饗吏士撫安百姓使安土樂業則可不勞衆而江東稽服矣太祖不從軍遂無利太祖後與韓遂馬超戰於渭南超等索割地以和并求任子詡以為可偽許之又問詡計策詡曰離之而已太祖曰解一承用詡謀語在武紀卒破遂超詡本謀也是時文帝為五官将而臨菑侯植才名方盛各有黨與有奪宗之議文帝使人問詡自固之術詡曰願将軍恢崇徳度躬素士之業朝夕孜孜不違子道如此而已文帝從之深自砥礪太祖又嘗屏除左右問詡詡嘿然不對太祖曰與卿言而不答何也詡曰屬適有所思故不即對耳太祖曰何思詡曰思袁本初劉景升父子也太祖大笑於是太子遂定詡自以非太祖舊臣而䇿謀深長懼見猜嫌闔門自守退無私交男女嫁娶不結髙門天下之論智計者歸之文帝即位以詡為太尉進爵魏夀鄉侯增邑三百并前八百户又分邑三百封小子訪為列侯以長子穆為駙馬都尉帝問詡曰吾欲伐不從命以一天下呉蜀何先對曰攻取者先兵權建本者尚徳化陛下應期受禪撫臨率土若綏之以文徳而俟其變則平之不難矣呉蜀雖蕞爾小國依阻山水劉備有雄才諸葛亮善治國孫權識虚實陸遜見兵勢據險守要汎舟江湖皆難卒謀也用兵之道先勝後戰量敵論将故舉無遺䇿臣竊料群臣無與權備對雖以天威臨之未見萬全之勢也昔舜舞干戚而有苗服臣以為當今宜先文後武文帝不納後興江陵之役士卒多死詡年七十七薨謚肅侯晋司徒缺武帝問其人於荀朂朂答曰三公具瞻所歸不可用非其人昔魏文帝用賈詡為三公孫權笑之子穆嗣歴位郡守穆薨子模嗣模子允允弟龕從弟疋皆至大官顯於晉世袁渙字耀卿陳郡扶樂人也父滂為漢司徒當時諸公子多越法度而渙清静舉動必以禮郡命為功曹郡中姦吏皆自引去後辟公府舉高第遷侍御史除譙令不就劉備之為豫州舉渙茂才後避地江淮為袁術所命術每有所咨訪渙常正議術不能抗然敬之不敢不禮也頃之吕布擊術於阜陵渙徃從之遂復為布所拘留布初與劉備和親後離隙布欲使渙作書詈辱備渙不可再三彊之不許布大怒以兵脅渙曰為之則生不為則死渙顔色不變笑而應之曰渙聞唯徳可以辱人不聞以罵使彼固君子邪且不恥将軍之言彼誠小人邪将復将軍之意則辱在此不在彼且渙他日之事劉将軍猶今日之事将軍也如一旦去此復罵将軍可乎布慙而止及布敗歸太祖時陳羣父子亦在布軍見太祖皆拜渙獨高揖不為禮太祖甚嚴憚之時太祖給衆官車各數乘使取布軍中物唯其所欲衆人皆重載唯渙取書數百卷資糧而已衆人聞之大慙太祖益以此重之渙言於太祖曰夫兵者凶器也不得已而用之鼓之以道徳征之以仁義兼撫其民而除其害夫然故可與之死而可與之生自大亂以來十數年矣民之欲安甚於倒縣然而暴亂未息者何也意者政失其道歟渙聞明君善於救世故世亂則齊之以義時偽則鎮之以樸世異事變治國不同不可不察也夫制度損益此古今之不必同者也若夫兼愛天下而反之於正雖以武平亂而濟之以徳誠百王不易之道也公明哲超世古之所以得其民者公既勤之矣今之所以失其民者公既戒之矣海内頼公得免於危亡之禍然而民未知義唯公所以訓之則天下幸甚太祖深納焉拜為沛南部都尉是時新募民開屯田民不樂多逃亡渙白太祖曰夫民安土重遷不可卒變易以順行難以逆動宜順其意樂之者乃取不欲者勿彊太祖從之百姓大悦遷為梁相渙每勑諸縣務存鰥寡高年表異孝子貞婦常談曰世治則禮詳世亂則禮簡全在斟酌之間耳方今雖擾攘難以禮化然在吾所以為之為政崇教訓忠恕再思而後行外温柔而内能斷以病去官百姓思之後徵為諫議大夫丞相軍祭酒前後得賜甚多皆散盡之家無所儲終不問產業乏則取之於人不為皦察之行然時人服其清魏國初建為郎中令行御史大夫事渙言於太祖曰今天下大難已除文武並用長久之道也以為可大收編籍明先聖之教以易民視聼使海内斐然向風則逺人不服可以文徳來之太祖善其言時有傳劉備死者羣臣皆賀渙以嘗為備舉吏獨不賀居官數年卒太祖為之流涕賜穀二千斛一教以太倉榖千斛賜郎中令家一教以垣下榖千斛與曜卿家外不解其意教曰以太倉榖者官法也垣下榖者親舊也文帝聞渙昔距吕布之事問渙從弟敏渙勇怯何如敏對曰渙貌似和柔然其臨大節處危難雖賁育不過也渙子侃亦精粹閑素有父風歴位郡守尚書初渙從弟霸公恪有功幹魏初為大司農及同郡何䕫並知名於世而霸子亮䕫子曾與侃復齊聲友善亮貞固有學行疾何晏鄧颺等著論以譏切之位至河南尹尚書霸弟徽以儒素稱遭天下亂避地交州司徒辟不至徽弟敏有武藝而好水功官至河隄謁者張範字公儀河内脩武人也祖父歆為漢司徒父延為太尉太傅袁隗欲以女妻範範辭不受性恬静樂道忽於榮利徵命無所就弟承字公先亦知名以方正徵拜議郎遷伊闕都尉董卓作亂承欲合徒衆與天下共誅卓承弟昭時為議郎適從長安來謂承曰今誅卓衆寡不敵難以成功不若擇所歸附待時而動然後可以如志承然之乃解印綬間行歸家與範避地揚州袁術備禮招請範稱疾不徃術不彊屈也遣承與相見術時欲僭據卽以問承承以正議抗之語在術傳是時太祖将征冀州術復問曰今曹公欲以弊兵數千敵十萬之衆可謂不量力矣子以為何如承乃曰漢徳雖衰天命未改曹公挾天子以令天下雖敵百萬之衆可也術作色不懌承去之太祖平冀州遣使迎範範以疾留彭城遣承詣太祖太祖表以為諌議大夫範子陵及承子戬為山東賊所得範直詣賊請二子賊以陵還範範謝曰諸君相還兒厚矣夫人情雖愛其子然吾憐戬之小請以陵易之賊義其言悉以還範太祖自荆州還範得見於陳以為議郎參丞相軍事甚見敬重太祖征伐常令範及邴原留與世子居守太祖謂文帝曰舉動必諮此二人世子執子孫禮範救恤窮乏家無所餘中外孤寡皆歸焉贈遺無所逆亦終不用及去皆以還之建安十七年卒魏國初建承以丞相參軍祭酒領趙郡太守政化大行太祖將西征徵承参軍事至長安病卒文帝即位以範子參為郎中承孫邵晉中䕶軍與舅楊駿俱被誅事見晉史涼茂字伯方山陽昌邑人也少好學論議常據經典以處是非太祖辟為司空掾舉髙第補侍御史時泰山多盗賊以茂為泰山太守旬月之間襁負而至者千餘家轉為樂浪太守公孫度在遼東擅留茂不遣之官然茂終不為屈度謂茂及諸将曰聞曹公逺征鄴無守備今吾欲以歩卒三萬騎萬匹直指鄴誰能禦之諸将皆曰然又顧謂茂曰於君意何如茂答曰比者海内大亂社稷将傾将軍擁十萬之衆安坐而觀成敗夫為人臣者固若是邪曹公憂國家之危敗愍百姓之苦毒率義兵為天下誅殘賊功高而徳廣可謂無二矣以海内初定民始安集故未責将軍之罪耳而将軍乃欲稱兵西向則存亡之效不崇朝而决将軍其勉之諸将聞茂言皆震動良久度曰凉君言是也後徵還為魏郡太守甘陵相所在有治績文帝為五官将茂以選為長史遷左軍師魏國初建遷尚書僕射後為中尉奉常文帝在東宫茂復為太子太傅甚見敬禮卒官國淵字子􅊂樂安蓋人也師事鄭元後與邴原管寜等避亂遼東淵篤學好古在遼東常講學於山巖東土多推慕之由此知名及還舊土太祖辟為司空掾屬每於公朝論議常直言正色退無私焉太祖欲廣置屯田使淵典其事淵屢陳損益相土處民計民置吏明功課之法五年中倉廪豐實百姓競勸樂業太祖征關中以淵為居府長史統留事田銀蘇伯反河東銀等既破後有餘黨皆應伏法淵以為非首惡請不行刑太祖從之頼淵得生者千餘人舊破賊文書以一為十及淵上首級如其實數太祖問其故淵曰夫征討外宼多其斬獲之數者欲以大武功且示民聽也河間在封域之内銀等叛逆雖克㨗有功淵竊恥之太祖大悦遷魏郡太守時有投書誹謗者太祖疾之欲必知其主淵請留其本書而不宣露其書多引二京賦淵勅功曹曰此郡既大今在都輦而少學問者其簡開解年少欲遣就師功曹差三人臨遣引見訓以所學未及二京賦博物之書也世人忽畧少有其師可求能讀者從受之又密喻㫖旬日得能讀者遂徃受業吏因請使作牋比方其書與投書人同手収攝案問具得情理遷太僕居列卿位布衣蔬食禄賜散之宗族故舊卒官王脩字叔治北海營陵人也年七歲喪母母以社日亡來歲隣里社脩感念母哀甚隣里為之罷社年二十游學南陽止張奉舎奉舉家得疾病無相視者脩親隠䘏之病愈乃去初平中北海相孔融召以為主簿守髙密令高密孫氏素豪俠人客數犯法民有相刼者賊入孫氏吏不能執脩将吏民圍之孫氏拒守吏民畏憚不敢近脩令吏民敢有不攻者與同罪孫氏懼乃出賊由是豪彊懾服舉孝亷修讓邴原融不聽時天下亂遂不行頃之郡中有反者脩聞融有難夜徃奔融賊初發融謂左右曰能冐難来唯王脩耳言終而脩至復署功曹時膠東多賊宼復令脩守膠東令膠東人公沙盧宗彊自為營塹不肯應發調修獨将數騎徑入其門斬盧兄弟公沙氏驚怖莫敢動脩撫慰其餘由是㓂少止融每有難脩雖休歸在家無不至融常頼脩以免袁譚在青州辟脩為治中從事别駕劉獻數毁脩後獻以事當死脩理之得免時人益以此多焉袁紹又辟脩除即墨令後復為譚别駕紹死譚尚有隙尚攻譚譚軍敗脩率吏民徃救譚譚喜曰成吾軍者王别駕也譚之敗劉詢起兵漯隂諸城皆應譚歎息曰今舉州皆叛豈孤之不徳邪脩曰東萊太守管統雖在海表此人不反必來後十餘日統果棄其妻子來赴譚妻子為賊所殺譚更以統為樂安太守譚欲復攻尚脩諫曰兄弟還相攻擊是敗亡之道也譚不悦然知其忠節後又問脩計安出脩以手足為譬力勸譚與尚親睦語在譚傳譚不用其言遂與尚相攻請救於太祖太祖既破冀州譚又叛太祖遂引軍攻譚於南皮脩時運糧在樂安聞譚急将所領兵及諸從事數十人徃赴譚至髙密聞譚已死下馬號哭曰無君焉歸遂詣太祖乞收𦵏譚屍太祖欲觀脩意黙然不應脩復曰受袁氏厚恩若得收斂譚屍然後就戮無所恨太祖嘉其義聽之以脩為督軍糧還樂安譚之破諸城皆服唯管統以樂安不從命太祖命脩取統首脩以統亡國之忠臣因解其縛使詣太祖太祖悦而赦之袁氏政寛在職勢者多畜聚太祖破鄴沒入審配等家貲以萬數及破南皮閲脩家榖不滿十斛有書數百卷太祖歎曰士不妄有名乃禮辟為司空掾行司金中郎将遷魏郡太守為治抑彊扶弱百姓稱之魏國建為大司農郎中令太祖議行肉刑脩以為時未可行太祖採其議乃止徙為奉常其後嚴才反與其徒屬數十人攻掖門脩聞變召車馬未至便将官屬歩至宫門太祖在銅爵臺望見之曰彼来者必王叔治也相國鍾繇謂脩曰舊京城有變九卿各居其府脩曰食其禄焉避其難居府雖舊非赴難之義頃之病卒官子忠官至東萊太守散騎常侍初脩識高柔於弱冠異王基於童幼終皆逺至世稱其知人通志卷一百十四
