body:
  text: 通志卷四十七宋右迪功郎鄭樵漁仲撰器服略第一尊彝爵觶之制臣舊嘗觀釋奠之儀而見祭器焉可以觀玩可以説義而不可以適用也夫祭器者古人適用之器若內圓而外方內方而外圓若之何飲食若臺而安器若器而安臺或盛多而受少或質輕而任重若之何持執以此事神其不得於古之道明矣原其制作蓋本於禮圖禮圖者初不見形器但聚先儒之説而為之是器也姑可以説義云耳由是疑焉因疑而思思而得古人不徒為器也而皆有所取象故曰制器尚象器之大者莫如罍物之大者莫如山故象山以制罍或為大器而刻雲雷之象焉其次莫如尊又其次莫如彝最小莫如爵故受升為爵受二斗為彝受五斗為尊受一石為罍按獸之大者莫如牛象其次莫如虎蜼禽之大者則有雞鳳小則有雀故制爵象雀制彝象雞鳳差大則象虎蜼制尊象牛極大則象象尊罍以盛酒醴彝以盛明水鬱鬯爵以為飲器皆量其器所盛之多寡而象禽獸賦形之大小焉臣謹按沈約與劉查論宗廟犧尊約云鄭康成答張逸謂為畫鳳凰尾婆娑然今無復此器則不依古查曰此言未必可按古者尊彝皆刻木為鳥獸鑿頂及背以出內酒魏時魯郡地中得齊大夫子尾送女器有犧尊作犧牛形又晉永嘉中曹嶷於青州發齊景公塜得二尊形亦為牛象此古之尊彝為可據也又按王肅注禮以犧象二尊並全刻牛象之形鑿背為尊其説益可據也又按陸佃禮象所記章惇家有古銅象尊三足象其鼻形望而視之真象也此又見象尊之制出於近代矣又按爵與觶皆飲器觶大而爵小陸佃禮象云今祕閣及文彥博李公麟家皆有古銅爵有首有尾有柱有足有柄祭統曰尸酢夫人執柄夫人授尸執足先儒謂柄為尾蓋不見此制焉然古銅爵今之士大夫家亦多有之臣見者屢矣謂其口似雀之狀如今之荷葉杯葵花盞皆取其口之象而非謂通體為雀也今祭器之爵徒設雀形而妨於飲者按禮器云卑者舉角注云四升曰角角之類則有觚有觶有散有觥觶與爵同為飲器而爵為小角與觚觶散觥同為一類而觥為大故觥則取兕角而以為罰器兕之為獸獸之大者也按舊圖匏爵用匏片為之則知角爵刳角為之所謂觚謂觶謂散謂觥者名號不同大小異制耳君臣冠冕巾幘等制度歷代冕辨黃帝作冕垂旒目不邪視也充纊耳不聽讒言也唐虞以上冠布無緌夏后以牟追以收商制章甫或以哻形制並無文周制辨師掌王之五冕皆元冕朱裏綖紐五采繅十有二就皆五采玉十有二玉笄朱紘諸侯及孤卿大夫之冕各以其等為之秦滅禮學郊社服用皆以袀元漢興草創仍秦之舊蔡雍獨斷云袀紺繒也班固東都賦注云袀皂也袀音鈞及光武踐阼郊祀天地明堂皆冠旒冕前後邃綖孝明帝永平初詔有司采周官禮記尚書夏侯氏説公卿以下冕皆廣七寸長尺二寸前圓後方朱緑裏元上前垂四寸後垂三寸係白玉珠為十二旒以其綬采色為組纓禮記曰元冠朱組纓天子之服是也其旒珠用真白玉三公諸侯七旒青玉珠卿大夫五旒黑玉珠皆有前無後各以其色綬為組纓旁垂黈纊助天子郊祀天地明堂則冠之魏因漢故事明帝好婦人之飾冕旒改用珊瑚珠晉因之東晉元帝初過江服章多闕而冕飾以翡翠珊瑚雜珠侍中顧和奏舊禮冕旒用白玉珠今美玉難得可用白璇珠從之後帝郊祀天地明堂宗廟及元會臨軒改服黑介幘通天冠平冕皂表朱緑裏廣七寸長一尺二寸加於通天冠上前圓後方垂白玉珠十二旒以朱組為纓無緌王公卿助祭郊廟冠平冕王公八旒卿七旒組為纓色如綬也宋因之更名曰平天冕天子郊祀及宗廟服之王公並用舊法齊因之梁因之其制前垂四寸後垂三寸旒長齊肩以組為纓色如其綬旁垂黈纊充耳珠以玉瑱乘輿郊祀天地明堂享宗廟元會臨軒則服之五等諸侯助祭平冕九旒青玉為珠有前無後各以其綬色為組纓旁垂黈纊陳因之以為冕旒皇太子朝冠逺遊冠侍祭則平冕九旒五等諸侯助祭郊廟皆平冕九旒青玉為珠有前無後各以其綬色為組纓旁垂黈纊北齊採陳之制旒玉用五采以組為纓色如其綬其四時郊祀封禪大事皆服袞冕皇太子平冕黑介幘白珠九旒飾以三采玉以組為纓色如其綬未加元服則空頂黑介幘雙童髻雙玉導後周設司服之官掌皇帝十二冕祀昊天則蒼冕五帝各隨方色朝日同青冕夕月同素冕地祗同黃冕神州社稷同元冕享先皇加元服等以象冕享先帝食三老耕籍等以袞冕視朔大射等以山冕視朝臨法門適宴等以鷩冕皆十有二旒諸公之冕九一曰方冕二曰袞冕三曰山冕四曰鷩冕五曰火冕六曰毳冕皆九旒七曰韋冕八曰皮辨九曰元冠諸侯八無袞冕諸伯七又無山冕諸子六又無鷩冕諸男五又無火冕冕五旒三公之冕九一曰祀冕二曰火冕三曰毳冕四曰藻冕五曰絺冕六曰爵辨七曰韋辨八曰皮辨九曰元冠三孤自祀冕而下八無火冕公卿七又無毳冕上大夫六又無藻冕中大夫五又無皮辨下大夫四又無爵辨士之服三一曰祀辨二曰爵辨三曰元冠庶士元冠而已隋採北齊之法袞冕垂白珠十二旒以組為纓色如其綬黈纊充耳玉笄太子庶子裴正奏色並用元旒齊於膊廣齊於耳唯應著幘者依漢晉法皇太子袞冕垂白珠九旒青纊充耳犀笄國公冕青珠九旒初受册命執贄入朝祭祀親迎三公助祭並服之侯伯則鷩冕子男則毳冕五品以上絺冕九品以上爵辨唐依周禮制天子之六冕有大裘冕袞冕鷩冕毳冕絺冕元冕大裘冕無旒廣八寸長一尺六寸元表纁裏以下廣狹準此金飾玉簪導簪亦謂之笄所以拘冠使不墜也導以掠髮使入巾幘之中以組為纓色如其綬祀天地神祇服之袞冕加金飾垂白珠十有二旒以組為纓色如其綬黈纊充耳玉簪導諸祭祀及享廟遣上將征還飲至加元服元日受朝等服之鷩冕有事逺主服之按周禮逺主謂先公毳冕祭海嶽服之絺冕祭社稷帝社服之元冕蠟百神朝日夕月服之自袞冕而下旒數並依周禮皇太子袞冕白珠九旒諸臣袞冕青珠九旒青纊充耳簪導鷩冕七旒第二品服之毳冕五旒第三品服之絺冕四旒第四品服之元冕三旒第五品服之龍朔以後改更不同緇布冠一曰進賢冠周制士冠禮云緇布冠以為始冠之冠冠而敝之可也注云初加緇布冠次加皮辨次加爵辨加皮辨後而棄之後漢制進賢冠為儒者之服前高七寸後高三寸長八寸公侯三梁中二千石以下至博士兩梁小吏私學弟子皆一梁蔡雍云千石以下一梁晉因之天子元服始加則冠五梁進賢冠三公及封郡公縣侯鄉亭侯則三梁卿大夫下至千石則兩梁中書門下至門郎小吏並一梁宋因之為儒冠齊因之為開國公侯下至小吏之服其以梁數為降殺則依晉制梁因之以為乘輿宴會之服則五梁進賢冠陳因之為文散內外百官所服以梁數為高卑天子所服則五梁北齊進賢五梁冠不通于下隋因陳制內外文官通服之降殺一如舊法唐因之若親王則加金附蟬為飾復依古制緇布冠為始冠之冠進賢緇布二制存焉牟追冠夏后氏牟追冠長七寸高四寸廣五寸後廣二寸制如覆杯前高廣後卑鋭商因之制章甫冠高四寸半後廣四寸前櫛首周因之制委貌冠司服云凡甸冠辨服甸田獵也漢制委貌以皂繒為之形如委榖之貌上小下大長七寸高四寸前高廣後卑鋭無笄有纓行大射禮於辟雍諸公卿大夫行禮者冠之宋依漢制通天冠通天冠本秦制其狀不傳漢因秦名制高九寸正豎頂少斜却乃直下為鐵卷梁前有山展筒為述筒駮犀簪導乘輿所常服晉依漢制前加金博山述注云述即鷸也鷸知天雨故冠像焉前有展筒宋因之又加黑介幘舊有冠無幘齊因之東昏侯改用玉簪導梁因之復加冕於其上為平天冕陳因之北齊依之乘輿釋奠所服隋因之加金博山附蟬十二首施珠翠黑介幘玉簪導朔日元會冬朝會諸祭還則服之唐因之其纓改以翠緌長冠漢高帝採楚制長冠形如板以竹為裏亦名齊冠後以竹皮為之高七寸廣二寸以高帝所制曰劉氏冠故為享廟之服恭之至也鄙人或謂之鵲尾冠晉依之去竹用漆纚救日蝕諸祀則冠之梁天監中祠部郎中沈宏議竹葉冠是漢祖微時所服不可為祭服宜改用爵辨司馬褧云若必遵三王則所廢非一遂不改逺遊冠有具服逺遊冠有公服逺遊冠按逺遊冠秦採楚制楚莊王通梁組纓似通天冠而無山述有展筒橫之于前漢天子五梁太子三梁諸侯王通服之晉皇太子及諸王後常冠焉以翠羽為緌綴以白珠帝之兄弟之子封郡王者通服之則青絲為緌梁為皇太子朝服加金博山翠緌陳因之其藻飾服用依晉故事也北齊依之制五梁冠乘輿所服不通于下隋制三梁加金附蟬九首施珠翠黑介幘翠緌犀簪導皇太子元朔入朝釋奠則服之唐因之其制具開元禮序例高山冠秦滅齊獲其君冠以賜近臣因而制之形如通天冠頂不斜却直植鐵為卷梁高九寸無山展筒故亦名側注冠其體側立而曲注故也中外謁者僕射行人使者等所服漢舊儀云乘輿冠高山冠飛月之纓一云飛翮之纓通天子之服也魏明帝以其制似通天逺遊故改令卑下除去卷筒如介幘幘上加物以象山行人使者服之晉宋齊梁陳歷代因之隋因魏制參用之形如進賢於冠加三峯謁者大夫以下服之梁數依其品降殺唐因之內侍省內謁者監及親王司閣等服之法冠秦滅楚獲其君冠賜御史以纚為展筒鐵為柱梁一名柱後惠文冠執法者服之或謂之獬豸冠注云獬豸神羊一角能别曲直楚王獲之以為冠漢晉至陳歷代相因襲不易隋開皇中於進賢冠上加二真珠為獬豸角形大業中改制一角注云獬豸神獸蓋一角今二角者非也執法者服之唐用一角為獬豸之形御史臺監察以上服之建華冠漢制以鐵為柱卷貫大銅珠九枚形似縷鹿薛綜曰下輪大上輪小也記曰知天者冠述知地者履絇左氏傳曰鄭子臧好聚鷸冠建華是也祠天地五郊明堂舞人服之晉及陳代相因不易餘並無聞趙惠文冠一名武冠秦滅趙以其君冠賜近臣胡廣曰趙武靈王效胡服以金璫飾首前插貂尾為貴職或以北土多寒胡人以貂皮溫額後代效之亦曰惠文惠者蟪也其冠文細如蟬翼故名惠文或曰齊人見千嵗涸澤之神名曰慶忌冠大冠乘小車好疾馳因象其冠漢因之曰武辨一名大冠諸武官冠之侍中中常侍加黃金璫附蟬為飾插以貂尾黃金為笄侍中插左常侍插右貂用赤黑色又名鵕鸃冠倉頡解詁曰鵕鸃鷩即翟山雞之屬尾彩鮮明是將飾冠以代貂焉幸臣閎孺為侍中皆服大冠天子元服亦為先加又加雙鶡尾植左右名鶡冠鶡鷙鳥之暴者每所攫撮應爪摧碎天子武騎故冠之徐廣曰鶡似黑野雞出上黨晉因之名繁冠一名建冠一名籠冠即惠文冠也宋因之不易齊因之侍臣加貂蟬餘軍校武職黃門散騎等皆冠之唯武騎虎賁插鶡尾於武冠上梁因制逺遊平上幘武冠陳因之不易後為鶡冠武者所服北齊依之曰武辨季秋講武出征告廟則服之隋亦名武辨武職及侍臣通服之侍臣加金璫附蟬以貂為飾侍左者左珥侍右者右珥天子則金博山三公以上玉枝四品以上金枝文官七品以上眊白筆八品以上及武官皆不眊筆唐因之乘輿加金附蟬平巾幘侍中中書令則加貂蟬侍左右珥諸武官府衛領軍九品以上等亦準此方山冠漢制似進賢冠以五采縠為之祠宗廟八佾四時五行樂人服之冠衣各如其方之色而舞焉晉因之巧士冠漢制高七寸要後相通直植似高山冠不常服唯郊天黃門從官者四人冠之在鹵簿中次乘輿車前以備宦者四星云晉因之自後無聞却非冠漢制似長冠皆縮垂五寸有纓緌宫殿門吏僕射等冠之梁北郊圖執事者縮纓緌隋依之門者禁防伺非服也唐因之亭長門僕服之樊噲冠漢將樊噲造次所冠以入項羽軍其制似平冕廣九寸高七寸前後各四寸殿門司馬衛士服之或曰樊噲常持鐵楯聞項羽有意殺漢王噲裂裳以褁楯冠之入軍門立漢王傍視項羽晉宋齊陳不易其制餘並無聞術氏冠漢制前圓差池四重趙武靈王好服之今不以施用或曰楚莊王獬冠是也晉因之宋以後無聞却敵冠晉制前高四寸通長四寸後高三寸似進賢冠凡當殿門衛士服之陳因之餘並廢翼善冠唐貞觀中制月一日十五日視朝常服之又與平巾幘通用太宗初服翼善冠賜貴臣進德冠因謂侍臣曰幞頭起於周武帝蓋取便於軍容耳今四海無虞此冠頗採古法兼類幞頭乃宜便服開元十七年廢不用皇有虞氏皇而祭其制無文蓋爵辨之類夏后氏因之曰收純黑前小後大商因之曰哻黑而微白前大後小周因制爵辨爵辨冕之次也赤而微黑如爵頭然前小後大三代以來皆廣八寸長尺二寸如冕無旒皆三十升布為之士冠禮三加成人服之漢依周制或云中古以下其制用絲祠天地五郊明堂雲翹樂舞服之晉依漢制更名廣冕有收持笄服用如舊隋依之以角為簪導士助君祭服之唐因之以繒代布用元纓簪導九品以上冠親迎助祭私家祭祀服之皮辨周禮辨師云王之皮辨會五采玉􅋒象邸玉笄司服云視朝則皮辨服士冠禮曰三王共皮辨以鹿皮為之晉依舊制以鹿淺毛黃白色者為之其服用等級並準周官後周田獵則服之以鹿子皮為之隋因之大業中所造通用烏漆紗前後二傍如蓮葉四間空處又安拳花頂上當縫安金梁梁上加􅋒天子十二真珠為之皇太子及一品九􅋒二品八􅋒下六品各殺其一􅋒以玉為之皆犀簪導六品以下無􅋒皆象簪導唯天子乃用金稜後制鹿皮者以賜近臣唐因之以鹿皮為之玉簪導十二􅋒朔日受朝服之韋辨周官司服云凡兵事韋辨服晉以韋為之頂上少尖宋因之或為車駕親戎中外戒嚴之服後周巡兵即戎則服之自此以來無復其制幘古者有冠無幘其戴也如首有頍所以安物故詩曰有頍者辨此之謂也秦雄諸侯乃加其武將首為絳袙以表貴賤其後稍稍作顔題袙音盲百切漢因續其顔却摞之施巾連題却覆之至孝文乃高其顔題續之為耳崇其申為屋貴賤皆服之文者長耳謂之介幘武者短耳謂之平上幘稱其冠也尚書幘收三寸名曰納言亦以忠正明近職也迎氣五郊各如其色從章服也武吏常赤幘成其威也未冠童子幘無屋者示未成人也未入學小童幘勾卷屋者示尚幼小未逺冒也喪幘却摞反本禮也制紺幘以齋青幘以耕緗幘以獵晉因之東晉哀帝從博士曹洪等議立秋御讀月令改用素幘宋因之以黑幘騎吏鼓吹武官服之其救日蝕文武官皆冕冠著赤幘齊因之以黑幘拜陵所服梁因之以黑介幘為朝服元正朝賀畢還儲更出所服未加元服則空頂幘陳因之諸軍司馬服平巾幘長吏介幘黃鉞郎朝服赤介幘簪筆隋依之天子田獵御戎文官出遊田里武官自一品以下至九品并流外吏等上下通服黑介幘平巾黑幘又制緑幘庖人服之其平巾黑幘之制玉枝金花飾犀簪導紫羅褶其御五輅人隨其車色唐因制乘輿空頂介黑幘雙王導加寶飾祭還及冬至朔日受朝會臨軒拜王公則服之黑介幘拜陵則服之平巾幘金寶飾導簪冠支皆以玉乘馬則服之皇太子平巾幘乘馬則服之空頂介幘雙玉導加寶飾謁廟還宫元日冬至朔日入朝釋奠則服之冠幘五品以上陪祭服之臣謹按蔡雍獨斷曰幘古之卑賤執事不冠者所服也漢元帝額有壯髮不欲使人見始進幘服之羣臣皆隨焉然尚無巾王莽頂秃幘上施屋壯髮謂當額前侵下而生者是幍魏武以天下凶荒資財乏匱擬古皮辨裁縑皂以為幍苦洽反幍合乎簡易隨時之義以色别其貴賤本施軍飾非為國容或云本末有岐荀文若巾之行觸木枝成岐因之為名遂不改因通以慶弔幍與帢同晉因之咸和中制聽尚書八座丞郎門下三侍官乘車白幍齊依以素為之舉哀臨喪服之梁因之以代古疑縗為弔服羣臣舉哀臨喪則服之陳因之而初婚冠送餞則服之隋依梁不易唐因之帽帽野人之服也董巴云上古穴居野處衣毛帽皮以此而言不施衣冠明矣周成王問周公曰舜之冠何如焉曰古之人上有帽而勾額魏管寧在家常著帛帽晉因魏制宋制黑帽綴紫標標以繒為之長四寸廣一寸後制高屋白紗帽齊因之梁因之制頗同至於高下翅之卷小異耳皆以白紗為之陳因之天子及士人通冠之白紗者名高頂帽皇太子在上省則烏紗帽在永福省則白紗又有皂繒雜紗為之高屋下裙蓋無定凖後周之時咸著突騎帽如今繒帽垂裙覆帶蓋索髮之遺像也又文帝項上瘤疾不欲人見每常著焉相魏之時著而謁帝故後周一代以為雅服小朝公宴咸許戴之隋開皇初文帝常著烏紗帽自朝貴已下至于冗吏通著入朝後復制白紗高屋帽其服練裙𥜗烏皮履宴接賔客則服之大業中令五品以上通服朱紫是以烏紗帽漸廢貴賤通服折上巾唐因之制白紗帽又制為紗帽視朝聽訟宴見賔客服之臣謹按元中記云旬始作帽晉志云帽名猶冠也義取於蒙覆其首本纚也古者冠無幘冠下有纚以繒為之後世施幘於冠因或裁纚為帽自乘輿宴居下至庶人無爵者皆得服之又按吳書云陸遜破曹休於石亭還當反西陵朝臣燕賜終日上脫裙帽以賜遜時同羣臣朝謁而服之又按後漢郭林宗行遇雨霑巾角折後周武帝建德中因制折上巾葛巾東晉制以葛為之形如帢而橫著之為尊卑共服太元中國子生見祭酒博士冠角巾齊依之陳依之北齊依之自後無聞臣謹按角巾之制宋不存至齊立學王儉議更存焉幅巾後漢末王公名士以幅巾為雅是以袁紹崔豹之徒雖為將帥皆著縑巾時有妖賊以黃為巾時號黃巾賊後周武帝因裁幅巾為四腳唐因之臣謹按方言云巾趙魏之間通謂之承露郭林宗折巾謂此也袁紹戰敗幅巾渡河按此則庶人及軍旅皆服之用全幅帛而向後襆髮謂之頭巾俗人謂之襆頭巾子唐武德初始用之初尚平頭小樣者天授二年武太后內宴賜羣臣高頭巾子呼為武家諸王樣景龍四年三月中宗內宴賜宰臣以下內樣巾子其樣高而踣皇帝在藩時所冠人號為英王踣樣君臣服章制度袍附虞書曰豫欲觀古人之象日月星辰山龍華蟲作繢宗彝藻火粉米黼黻絺繡備十二章衣元裳黃上六章在衣下六章在裳上畫下繡夏商之世皆相襲而無變周官司服掌王之吉凶衣服大裘以祀天大裘黑羔裘示質也袞冕之服享先王升日月於旌旗服備九章一曰龍二曰山三曰華蟲四曰火五曰宗彝皆畫以為繢六曰藻七曰粉米八曰黼九曰黻皆絺以為繡則袞之衣五章裳四章凡九鷩冕之服享先公鷩畫雉謂華蟲其衣三章裳四章凡七毳冕之服祀四望山川毳畫虎蜼謂宗彝也其衣三章裳二章凡五絺冕之服祭社稷五祀絺刺粉米無畫其衣一章裳二章凡三元冕之服祭羣小祀其衣無文裳刺黻而已几冕服皆元衣纁裳凡兵事韋辨服以韎韋為辨又以為衣裳春秋傳曰晉郤至衣韎韋之跗注者是也視朝則皮辨服視內外朝之事其服十五升白布衣積素以為裳王受諸侯朝覲於廟則袞冕凡甸冠辨服甸田獵也冠辨委貌其服緇布衣亦積素以為裳公之服自袞冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自絺冕而下如子男之服卿大夫之服自元冕而下如孤之服士之服自皮辨而下如大夫之服其齋服有元端素端自公之袞冕至卿大夫之元冕皆其朝聘天子及助祭之服諸侯非二王之後其餘皆元冕而祭於已雜記曰大夫冕而祭於公辨而祭於已士辨而祭於公冠而祭於已大夫爵辨自祭家廟唯孤爾其餘皆元冠與士同元冠自祭其廟者其服朝服元端秦制水德服尚袀黑袀音均後漢光武踐阼始修郊祀天子冕服從歐陽氏説三公九卿特進朝侯侍祠侯從夏侯氏説祀天地明堂皆冠旒冕衣裳皆元上纁下一服而已明帝永平中議乘輿備文日月十二章刺繡文三公諸侯用山龍九章九卿以下用華蟲七章皆備五采大佩赤舄絇履以承大祭百官執事者冠長冠皆祗服五嶽四瀆山川宗廟社稷諸沾秩祠皆袀兀絳緣領袖為中衣絳袴襪示其赤心奉神也其五郊迎氣衣幘袴襪各如方色云百官不執事者各服長冠袀元以從大射禮於辟雍公卿諸侯大夫行禮者冠委貌衣元端素裳鄭元曰端取其正也鄭衆曰衣有襦裳者為端執事者冠布辨衣緇麻衣皂領袖下素裳若冠通天冠服衣深衣制有袍隨五時色梁劉昭曰袍者或曰周公抱成王宴居故施袍孔子衣縫掖之衣縫掖其袖合而縫大之近今袍者也今下至賤夫小吏皆通制袍單衣皂緣領袖中衣為朝服云魏氏多因漢法其所損益之制無聞按後漢志孝明皇帝永平二年詔從歐陽夏侯二家所説制冕服乘輿刺繡文公卿以下織成文據晉志云魏明帝以公卿袞黼之服擬於至尊多所減損始制服刺繡公卿織成未詳孰是晉因不改大祭祀衣皂上絳下裳前三幅後四幅衣畫而裳繡日月星辰凡十有二章素帶廣四寸朱裏以朱緣裨飾其側中衣以絳緣領赤皮為韍絳袴襪赤舄未加元服則皂紗袍絳緣中衣絳袴襪黑舄又朝服通天冠絳紗袍皂緣中衣拜陵則菚單衣雜服有青赤黃白黑五色紗袍其武辨素服單衣公卿助祭郊廟王公山龍以下九章卿華蟲以下七章其緇布冠衣黑而裳素中衣以皂緣領袖袴褶之制未詳所起其後車駕親戎中外戒嚴服無定色冠黑帽綴黑褾以繒為之長四尺廣一寸腰有絡帶以代鞶革中官紫褾外官絳褾又有纂嚴戎服而不綴褾行留文武悉同宋因之制平天冕服不易舊法更名韍曰蔽膝其未加元服釋奠先聖視朝拜陵等服及雜色紗裙武冠素服並沿舊不改王公助祭郊廟章服降殺亦如之袴褶因晉不易腰有絡帶以代鞶革中官紫褾外官絳褾又有纂嚴戎服而不綴褾行留文武悉同其田獵巡幸惟從官戎服帶鞶革文帝元嘉中巡幸搜狩救廟水火皆如之明帝太始四年詔曰近改定令修成六服朕以大冕純玉璅元衣黃裳祀天宗祀明堂又以法冕元衣絳裳祀太廟元正大會朝諸侯又以飾冕紫衣紅裳小會宴饗送諸侯臨軒會王公又以繡冕朱衣裳征伐講武校獵又以紘冕青衣裳耕稼饗國子又以通天冠朱紗袍為聽政之服泰始六年正月有司奏被敕議皇太子正冬服袞冕九章以朝賀詔可齊因制平天冠服不易舊法郊廟臨朝所服也舊袞服用織成建武中明帝以織太重乃采畫為之加金飾銀薄時亦謂為天衣通天冠服絳紗袍皂緣中衣乘輿臨朝所服臣下皆同拜陵則黑介幘服無定色舉哀臨喪白帢單衣亦謂之素服王公助祭平冕服山龍以下九章卿七章皆畫皂絳繒為之袴褶相因不改梁因制平天冠服衣畫而裳繡十二章素帶朱裏以朱緣裨飾其側更名赤韍為韠餘因舊法又有通天冠服絳紗袍皂緣中衣黑舄是為朝服元正賀畢還儲更衣出所服也釋奠先聖則皂紗袍絳緣中衣絳袴襪黑舄拜陵則菚布單衣又有白帢單衣以代古之疑縗天監三年何佟之議公卿以祭服裏有中衣即今中單也後漢從夏侯氏説祭服絳緣領袖為中衣絳袴襪示其赤心奉神也今中衣絳緣足有所明無俟於袴既非聖法謂不可施遂依議除之七年周捨議按禮有虞氏皇而祭深衣而飬老鄭元云皇是畫鳳羽也今袞衣宜畫鳳以示差降帝曰古文日月星辰此以一辰攝三物也山龍華蟲又以一山攝三物也藻火粉米又以一藻攝三物也是為九章今袞衣畫龍則宜畫鳳又五經博士陸瑋等議王者祀昊天服大裘鄭元注司服云大裘黑羔裘也既無所出未為可據按六冕之服皆元上纁下今宜以繒為之其制式如裘其裳以纁皆無文繡詔可九年司馬筠等議云按玉藻諸侯元冕以祭裨冕以朝雜記又云大夫冕而祭於公辨而祭於已今之尚書上異公侯下非卿士止有朝衣本無冕服既從齋祭不容同於在朝宜依太常及博士諸齋官例著白衣絳襈中單竹葉冠陳因之永定元年武帝即位徐陵曰乘輿御服皆採梁制帝曰今天下初定務從節儉應用繡織成者並可彩畫至文帝天嘉初悉改易之後魏天興六年詔有司始制冠冕各依品秩以示等差然自晉左遷中原禮儀多缺未能皆得舊制至太和中方考故實正定前繆更造衣冠尚不能周洽及熙平二年太傅清河王懌黃門侍郎韋延祥等奏定五時朝服準漢故事五郊衣幘各如方色焉北齊因之河清中改易舊物著為定制云後周設司服之官掌皇帝十二服祀昊天上帝則蒼衣蒼冕五方上帝各隨方色朝日用青衣青冕祭皇地祇用黃衣黃冕夕月用素衣素冕神州社稷用元衣元冕享先皇加元服納后朝諸侯則用十二章之服享諸先帝食三老五更享諸侯耕籍則用龍以下九章之服祀星辰祭四望祀朔大射饗羣臣等則用山冕八章之服羣祀視朝臨太學入道法門燕射養庶老適諸侯家則用鷩冕七章之服其九章以下衣重袞山鷩裳重黼黻俱十有二等通以升龍為領褾巡兵即戎則韎韋以為衣裳田獵則皮辨謂以鹿子皮為辨白布衣而素裳也諸公之服九章服之章數皆隨冕而降其一其八章以下衣重藻粉米裳重黼黻俱九等皆以山為領褾諸侯服八章而下俱八等皆以華蟲為領褾諸伯服七章而下俱七等皆以火為領褾諸子服六章俱六等皆以宗彝為領褾諸男服五章皆以藻為領褾三公之服有九章有六衣重宗彝與藻裳重黼黻俱為九等皆以宗彝為領褾三孤之服有八章有五衣重藻與粉米裳重黼黻俱為八等公卿之服有七章有四衣重粉米裳重黼黻為七等皆以藻火為領褾上大夫之服有六章有三衣重粉米裳重黼黻為六等中大夫之服有五章有三衣重粉米為五等下大夫之服有四章有三衣重粉米為四等士之服三則祀辨爵辨元冠服皆元衣其裳上士以元中士以黃下士雜裳謂前元後黃庶士元冠服其在官府吏之屬服緇衣裳隋文帝即位將改後周制度乃下詔曰宣尼制法損益可知朕受天命赤雀來儀五德相生宜為火色其郊丘廟社可依袞冕之儀朝會衣裳宜盡用赤昔丹烏木運周有大帛之旗黃星土德曹乘黑首之馬今之戎服皆可尚黃在外所著者通用雜色祭祀之服須合禮經宜集通儒更可詳議太子庶子攝太常少卿裴正奏曰後魏以來法度咸闕天興草創多參胡制周氏因襲不可以訓今採東齊之法乘輿袞冕元衣纁裳衣山龍華蟲火宗彝五章裳藻粉米黼黻四章衣重宗彝裳重黼黻為十二等衣褾領織成升龍白紗內單黼黻領青褾襈裾革帶玉鈎䚢大帶素帶朱裏紕其外上以朱下以緑韍隨裳色龍火山三章轆轤玉具劒火珠鏢首白玉雙珮元組雙大綬六采元黃赤白縹緑純元質長二丈四尺五百首廣一尺小雙綬長二丈六寸色同大綬而首半之間施三玉環朱襪赤舄舄加金飾祀圓丘方澤五帝明堂五郊雩䄍封禪朝日夕月宗廟社稷籍田遣上將征還飲至元服納后正月受朝及臨軒拜王公則服之通天冠加金博山附蟬十二首施珠翠黑介幘玊簪導絳紗袍深衣制白紗內單皂領褾襈裾絳紗蔽膝白假帶方心曲領其革帶劒珮綬舄與上同黑介幘白紗單衣烏皮履拜陵則服之白紗帽白練裙襦烏皮履視朝聽訟及宴見賔客皆服之白帢白紗單衣烏皮履舉哀則服之皇太子袞冕元衣纁裳衣山龍華蟲火宗彝五章裳藻黼黻粉米四章織成為之白紗內單黼領青褾襈裾革帶金鈎䚢大帶素帶不朱裏亦紕以朱緑韍隨裳色火山二章玉具劒火珠鏢首瑜玊雙佩朱組雙大綬四采赤白縹紺純朱質長丈八尺三百二十首廣九寸小雙綬長二尺六寸色同大綬而首半之間施二玊環朱襪赤舄舄以金飾侍從皇帝祭祀及謁廟加元服納妃則服之逺遊三梁冠加金附蟬九首施珠翠黑介幘犀簪導絳紗袍白紗內單皂領褾襈裾白假帶方心曲領絳紗蔽膝襪舄其革帶劒珮綬與上同謁廟還宫元日朔日入朝釋奠則服之逺遊冠公服絳紗單衣革帶金鈎䚢假帶方心紛長六尺四寸廣二寸四分色同其綬金縷鞶囊襪履五日常朝則服之袞冕服九章同皇太子王國公開國公初受册執贄入朝祭祀親迎則服之三公助祭者亦服之鷩冕服七章衣華蟲火宗彝三章裳藻粉米黼黻四章侯伯初受册執贄入朝祭祀親迎則服之毳冕五章衣宗彝藻粉米三章裳黼黻二章子男初受册執贄入朝祭祀親迎則服之絺冕服三章正三品以下從五品以上助祭則服之自王公以下服章皆繡為之祭服冕皆簪導青纊充耳元衣纁裳白紗內單黼領絺冕以下內單青領青褾襈裾革帶鈎䚢大帶王三公及公侯伯子男素帶不朱裏皆紕其外上以朱下以緑正三品以下從五品以上素帶紕其垂外以元內以黃鈎皆用青組朱韍凡韍皆隨裳色袞鷩毳火山二章絺山一章劒佩綬襪赤舄爵辨從九品以上助祭則服之玄衣纁裳無章白絹內單青領褾襈裾革帶大帶武辨平巾幘諸武職及侍臣通服之侍臣加金璫附蟬以貂為飾侍左者左珥侍右者右珥委貌冠未冠則雙童髻空頂黑介幘皆深衣青領烏皮履國子太學四門生服之朝服亦名具服絳紗單衣白紗內單皂領袖皂襈革帶鈎䚢假帶曲領方心絳紗蔽膝襪舄綬劒珮從五品以上陪祭朝饗拜表凡大事則服之六品以下從七品以上去劒珮綬餘並同自餘公事皆從公服亦名從省服唐制天子衣服有大裘袞冕鷩冕毳冕絺冕元冕通天冠武辨黑介幘白紗帽平巾幘白帢凡十二等貞觀四年制三品以上服紫四品五品以上服緋六品七品以上緣八品九品以上青婦人從夫之色仍通服黃后妃命婦首飾制度周制追師掌王后之首服為副編次追衡笄為九嬪及外內命婦之首服以待祭祀賔客鄭元謂副之言覆所以覆首為之飾其遺象若今步搖編編髮為之其遺象若今假紒矣次次第髮長短為之所謂髲髢也追猶治也王后之衡笄皆以玉為之唯祭服有衡垂于副之兩旁當耳其下以紞垂瑱笄卷髮者漢制太皇太后皇太后入廟翦氂蔮簪珥珥耳璫垂珠也簪以玳瑁為擲長一尺端為華勝上為鳳皇爵以翡翠為毛羽下有白珠垂黃金鑷左右一橫簪之以安蔮諸簪珥皆同制其擲有等級焉皇后謁廟假髻步搖俗謂之珠松是也簪珥步搖以黃金為山題貫白珠為枝相繆八爵九華熊虎赤羆天鹿辟邪南山豐大特六獸詩所謂副笄六珈珈笄飾之最盛者所以别尊卑者也南山豐大特按史記秦文公二十七年伐南山大梓豐大特徐廣注云今武都故道有怒特祠圖大牛上生木本有牛從木中出後見於豐水中諸爵獸皆以翡翠為毛羽金題白珠璫繞以翡翠為華云貴人助蠶大手髻黑玳瑁又加簪珥長公主加步搖公主大手髻皆有簪珥公卿列侯中二千石二千石夫人紺繒蔮黃金龍首銜白珠魚須擲長一尺為簪珥魏制貴人夫人以下助蠶皆大手髻七鈿音奠蔽髻黑玳瑁又加簪珥九嬪以下五鈿世婦三鈿諸王妃長公主大手髻七鈿蔽髻其長公主得有步搖皆有簪珥公特進列侯卿校世婦以下夫人紺繒蔮黃金龍首銜白珠魚須擲長一尺為簪珥晉依前代皇后首飾則髻步搖簪珥步搖以黃金為山題貫白珠為枝相繆八爵九華熊虎赤羆天鹿辟邪南山豐大特六獸諸爵獸皆以翡翠為毛羽金題白珠璫繞以翡翠為華宋依漢制太后入廟祭祀首飾翦氂蔮皇后親蠶首飾假髻步搖八雀九華加以翡翠復依晉法皇后十二鈿步搖大手髻公主會見三夫人大手髻七鈿蔽髻公夫人五鈿世婦三鈿其長公主得有步搖公特進列侯夫人二千石命婦年長者紺繒蔮齊因之公主會見大手髻不易舊法陳依前制皇后謁廟首飾假髻步搖簪珥步搖以黃金為山題貫白珠為枝相繆八爵九華熊虎赤羆天鹿辟邪南山豐大特六獸諸爵獸皆以翡翠為華開國公侯太夫人夫人大手髻七鈿蔽髻九嬪及公夫人五鈿世婦三鈿其長公主得有步搖公特進列侯卿校中二千石夫人紺繒蔮黃金龍首銜白珠魚須擲長一尺為簪珥後魏天興六年詔有司始制冠冕各依品秩以示等差然未能皆得舊法北齊依前制皇后首飾假髻步搖十二鈿八爵九華內命婦以上蔽髻唯以鈿數花叉多少為品秩二品以上金玊飾三品以下金飾內命婦左右昭儀三夫人視一品假髻九鈿三品五鈿蔽髻四品三鈿五品一鈿又有宫人女官第二品七鈿蔽髻三品五鈿四品三鈿五品一鈿七品大手髻八品偏髾髻皇太子妃假髻步搖九鈿郡長公主七鈿蔽髻太子良娣視九嬪女侍中五鈿內外命婦宫人女官從蠶則各依品次還著蔽髻後周制皇后首飾花叉十有二樹諸侯之夫人亦皆以命數為之節三妃三公夫人以下又各依其命一命再命者又俱以三為節隋因之皇后首飾花十二樹皇太子妃公主王妃三師三公夫人一品命婦並九樹侯夫人二品命婦並八樹伯夫人三品命婦並七樹子夫人世婦及皇太子昭訓四品以上命婦並六樹男夫人五品命婦並五樹女御及皇太子良娣三樹自皇后以下小花並如大花之形唐武德中制令皇后褘衣首飾花叉十二樹餘各有差開元中又定品令后妃命婦服章制度周制內司服掌王后之六服褘衣揄翟闕翟鞠衣展衣褖衣素紗王后之服刻繒為之形而采畫之綴於衣以為文章褘衣畫翬者揄翟畫搖者闕翟刻而不畫此三者皆祭服從王祭先王則服褘衣祭先公則服揄翟祭羣小祀則服闕翟今世有袿衣者蓋三翟之遺俗鞠衣黃桑服也色如麴塵象桑葉始生月令三月薦鞠衣于上帝告桑事展當為袒袒衣以禮見王及賔客之服其色白緣衣御於王之服亦以燕居其色黑六服備於此矣以下推次其色則闕翟赤揄翟青禕衣元此鄭據五行相生為説也素紗者今之白縳也六服皆袍制以白縳為裏使之張顯今世有沙縠者名出於此其翟多少各依命數揄音搖縳音絹辨內外命婦之服鞠衣展衣褖衣素紗內命婦之服鞠衣九嬪也展衣世婦也褖衣女御也外命婦者其夫孤也則服鞠衣其夫卿大夫也則服展衣其夫士也則服褖衣三夫人及公之妻並闕翟以下至侯伯之夫人揄翟子男之夫人亦闕翟唯二王後褘衣也漢制太皇太后皇太后皇后入廟服紺上皂下蠶服青上縹下皆深衣制徐廣曰即單衣也縹音匹繞反隱領袖緣以絛貴人助蠶服純縹上下長公主見會自公主封君以上皆帶綬以采組為緄帶各如其綬色黃金辟邪首為帶鐍飾以白珠公卿列侯中二千石夫人入廟佐祭者服皂絹上下助蠶者縹絹上下自二千石夫人以上至皇后皆以蠶衣為朝服公主貴人妃以上嫁娶則服錦綺羅縠繒采十二色重褖袍特進列侯以上錦繒采十二色六百石以上重練采九色禁丹紫紺三百石以上五采青絳黃紅緑二百石以上四采青黃紅緑賈人緗縹而已緗赤黃色魏之服制不依古法多以文繡晉依前漢制皇后謁廟服皂上縹下隱領袖緣元康六年詔以純青服貴人夫人貴嬪是為三夫人皆金章紫綬九嬪銀印青綬佩采瓄玊助蠶之服純縹為上下皇太子妃金璽龜鈕纁朱綬佩瑜玉諸王太妃諸長公主金印紫綬佩山元玉自公主以上皆帶綬以綵組為緄帶各如其綬色金辟邪首為帶玦郡縣公侯夫人銀印青綬水蒼玉公特進列卿世婦中二千石夫人入廟助祭者皂絹上下助蠶者緇絹上下自二千石以上至皇后皆以蠶衣為朝服宋制太后皇后入廟服袿襡上圭下屬大衣謂之褘衣公主會見封君以上皆帶綬以采為緄帶各如綬色公特進列侯夫人卿校世婦二千石命婦年長者入廟佐祭皂絹上下助蠶則青絹上下自皇后至二千石命婦皆以蠶衣為朝服按漢劉向曰古者天子至于士王后至于命婦必佩玉尊卑各有其制皇后至命婦所佩玉古制不存今與外同制齊因之袿襡用繡為衣裳黃綬貴嬪夫人貴人王大妃長公主封君皆紫綬六宫郡公侯夫人青綬陳依前制皇后謁廟袿襡大衣皂上皂下親蠶則青上縹下隱領袖緣貴妃嬪金章龜鈕紫綬佩于闐玉獸頭鞶九嬪以下章綬佩帶各有差自公主封君以上皆帶綬以綵組為裩帶各以其綬色金辟邪首為帶玦自二千石以上至皇后皆以蠶衣為朝服北齊皇后助祭朝會以褘衣祠郊禖以揄翟小宴以闕翟親蠶以鞠衣禮見皇帝以展衣宴居以褖衣六服俱有蔽膝織成緄帶內外命婦從五品以上金章紫綬服揄翟雙佩山元玉九嬪視三品銀章青綬鞠衣佩水蒼玉其餘各有差餘與女侍中同外命婦皆如其夫若夫假章印綬佩妻則不假一品二品服闕翟三品服鞠衣四品展衣五品褖衣內外命婦宫人從蠶則各依品次皆服青紗公服其外命婦綬帶鞶囊皆準其夫公服之例百官之母詔加太夫人者朝服公服各與其命婦服同後周制皇后之服十有二等其翟衣六從皇帝祀郊禖享先皇朝皇太后則服翬衣祭隂社朝命婦則服揄衣祭羣小祀受獻繭則服鷩衣採桑則服鳪衣黃色音卜從皇帝見賔客聽女教則服鵫衣白色音罩食命婦歸寧則服􅀈衣元色音秩俱十有二等以翬翟為領褾各有二臨婦學及法道門燕命婦則蒼衣春齋及祭還則青衣夏齋及祭還則朱衣採桑齋及祭還則黃衣秋齋及祭還則素衣冬齋及祭還則元衣自青而下其褾領以相生之色諸公夫人自揄衣以下鷩鳪鵫􅀈朱黃素元等衣而九諸侯夫人自鷩衣而下八諸伯夫人自鳪衣而下七諸子夫人自鵫衣而下六諸男夫人自􅀈衣而下五其翟衣翟皆依其等數而領褾各有差三妃三公夫人之服九鳪衣鵫衣􅀈衣青衣朱衣黃衣素衣元衣綃衣其翟亦九等以鳪翟為領褾各九三孤之內子自鵫衣而下八翟皆八等以鵫翟為領褾各八九嬪六卿之內子自􅀈衣而下七翟皆七等以􅀈翟為領褾各七上媛上大夫之孺人自青衣而下六中媛中大夫之孺人自黃衣而下四御婉士之婦自素衣而下三中宫六尚緅子侯反衣諸命秩之服曰公服其餘常服曰私衣隋制皇后褘衣鞠衣青衣朱衣四等褘衣深青質織成領袖文以翬翟五采重行十二等素紗內單黼領羅縠褾襈色皆以朱蔽膝隨裳色以緅為緣用翟三章大帶隨衣裳飾以朱緣之革帶青襪舄舄以金飾白玉佩元組綬章采尺寸同於乘輿祭及朝會大事服之鞠衣黃羅為質織成領袖蔽膝革帶及舄隨衣色餘準褘衣親蠶服也青衣去大帶及珮綬金飾履禮見天子則服之朱服如青服有金璽盤螭鈕文曰皇后之璽冬至大朝則并璜琮各以笥貯進於座隅皇太后同於后服而貴妃以下並亦給印三妃服揄翟金章龜鈕文從其職紫綬金縷獸頭鞶囊佩于闐玉九嬪服闕翟金章龜鈕文從其職佩采瓄玉媫妤銀縷織成他如嬪服美人才人鞠衣銀印圭鈕獸爪鞶囊佩水蒼玉寶林服展衣艾綬鞶囊珮玉同媫妤承衣刀人采女皆褖衣無印綬皇太子妃服揄翟衣九章金璽龜鈕素紗內單黼領羅褾襈色皆用朱蔽膝二章大帶同褘衣青緣革帶朱襪青舄舄加金飾佩瑜玊纁朱綬獸頭鞶囊凡大禮見皆服之唯侍親桑則用鞠衣珮綬與褕衣同良娣鞠衣銀印青綬獸爪鞶囊餘同世婦寶林八子展衣銅印佩水蒼玉艾綬諸王太妃妃長公主三公夫人一品命婦揄翟繡為九章佩山元玊獸頭鞶囊綬同夫色公夫人縣主二品命婦亦揄翟繡八章從親桑同鞠衣自此以下珮皆水蒼玉侯伯夫人三品命婦亦服揄翟繡為七章子夫人四品命婦服闕翟刻赤繒為翟綴衣上為六章男夫人五品命婦闕翟五章若從親蠶皆同鞠衣唐武德令皇后服有褘衣鞠衣細叉禮衣三等皇太子妃揄翟鞠衣自皇后至內外命婦衣服制度並具開元禮天子諸侯玉佩劒綬璽印周制天子佩白玉而元組綬公侯佩山元玉而朱組綬大夫佩水蒼玉而緇組綬世子佩瑜玉而綦組綬士佩瓀玫而縕組綬綬者所以貫佩玉綦文雜色縕赤黃色王鎮圭長尺有二寸大圭長三尺杼上終葵首終葵椎也為椎於其杼上杼殺也繅藉五采五就以朝日公執桓圭九寸侯執信圭伯執躬圭皆七寸繅皆三采三就子執榖璧男執蒲璧繅皆二采再就以朝覲宗遇會同于王三采朱白蒼二采朱緑也凡玉天子用全上公用龍侯用瓚伯用將龍瓚將皆雜名自五霸迭興戰兵不息佩非戰器韍非兵旗於是解去綬佩留其係璲以為章表韍珮遂廢又三代之制人臣皆以金玉為印龍虎劒唯所好也秦始制璽以玉不通臣下用制乘輿六璽曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽又始皇得藍田白玉為璽螭虎鈕文曰受天之命皇帝壽昌韍珮既廢乃以采組連結於璲光明章表轉相結受故謂之綬漢高帝入關得秦始皇白玉璽佩之曰傳國璽與斬蛇劒俱為乘輿之寶韍承秦制用而弗改加之以雙印佩刀後漢孝明帝乃為大佩衝牙雙瑀璜皆以白玉月令章句曰佩上有雙珩下有雙璜琚瑀以雜之衝牙蠙珠以納其間纂要曰琚瑀所以納珠在玉之間今白珠也乘輿落以白珠公卿諸侯以采絲其視冕旒為祭服云佩刀乘輿黃金通身貂錯半鮫魚鱗金漆錯雌黃室五色罽隱華室諸侯王黃金錯環挾半鮫黑室公卿百官皆淳黑不半鮫小黃門雌黃室中黃門朱室童子皆虎爪文虎賁黃室虎文其將白虎文皆以白珠為􅝑口之飾刀鋒曰􅝑匹燒反乘輿者加翡翠山紆嬰其側佩雙印長寸二分方六分乘輿諸侯王公列侯以白玉中二千石以下至四百石皆以黑犀三百石以至私學弟子皆以象牙上合絲乘輿以縢貫白珠赤罽蕤諸侯王以下綔口故反赤絲蕤縢綔各如其印質刻書文曰正月剛卯既決靈殳四方赤青白黃四色是當帝令祝融以教夔龍庶疫剛疸莫我敢當疾日嚴卯帝令夔龍􅀈爾周伏化兹靈殳既決既直既觚既方庶疫剛疸莫我敢當前漢注云以正月卯日作乘輿黃赤綬四采黃赤紺縹淳黃圭長丈九尺九寸五百首凡綬先合單紡為一絲四絲為一扶五扶為一首五首成一文采純為一圭首多者系細首少者系粗漢官儀曰璽皆白玊螭虎鈕文曰黃帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽凡六璽皇帝行璽封常行詔敕之璽賜諸侯王書信璽發兵召大臣天子行璽䇿拜外國事之璽賜外國書信璽發外國兵及事天地鬼神璽皆以武都紫泥封青布囊白素裏兩端無縫尺一版中約署黃帝帶綬黃地六采不佩璽璽以金銀縢組侍中組負以從秦前民皆佩綬以金玉銀銅犀象為方寸璽各服所好奉璽書使者乘馳傳其驛騎也三騎行晝夜千里為程諸侯王赤綬四采赤黃縹紺淳赤圭長二丈一尺三百首太皇太后皇太后皇后其綬皆與乘輿同長公主天子貴人與諸侯王同綬者加特也諸國貴人相國皆緑綬三采緑紫紺淳緑圭長二丈一尺二百四十首前漢書曰相國丞相皆秦官金印紫綬高帝相國緑綬徐廣曰金印緑綟音戾草名以染似緑又云似紫紫綬名緺音瓜其色青紫公加殊禮皆得服之公侯將軍紫綬二采紫白淳紫圭長丈七尺百八十首前漢書曰太尉金印紫綬御史大夫位上卿銀印青綬成帝更名大司空金印紫綬將軍亦金印漢官儀曰馬防為車騎將軍銀印青綬在卿上絶席和帝以竇憲為車騎將軍始加金紫次司空九卿中二千石青綬三采青白紅淳青圭長丈七尺百二十首一號青緺綬自青綬以上縌音逆皆長三尺二寸與綬同采而首半之縌者古佩璲也佩綬相迎受故曰縌紫綬以上縌綬之間得施玉環鐍云通俗文曰缺環曰鐍漢舊儀曰其斷獄者印為章也千石六百石墨綬三采青赤紺淳青圭長丈六尺八十首四百石三百石長同漢官儀曰尚書僕射銅印青綬四百石三百石二百石黃綬淳黃圭一采長丈五尺六十首自墨綬以下縌綬皆長三尺與綬同采而首半之百石青紺綸一采宛轉繆織長丈二尺晉制盛服則雜寶為佩金銀校飾綬黃赤縹紺四采太子諸王纁朱綬赤黃縹紺相國緑綟綬三采緑紫紺郡公朱侯伯青朱子男素朱皆三采公嗣子紫侯嗣子青鄉亭關內侯紫綬白二采郡國太守內史青尚書令僕射中書監令祕書監皆墨丞皆黃諸府丞亦然其佩刀者以木代真刀也宋皇太子金璽龜鈕朱綬四采赤黃縹紺佩瑜玉諸王金璽龜鈕纁朱綬四采赤黃縹紺佩山元玉太宰太傅太保丞相司徒司空金章紫綬佩山元玊相國則緑綟綬三采緑紫紺自相國而下或銅印銀章或青綬或墨綬以至别部司馬以下假墨綬者凡六十等各有差凡此前衆職江左多不備又多闕朝服諸應給朝服佩玉而在京師者給朝服非諸烏丸羌戎蠻諸校尉以上及刺史西域戊巳校尉皆不給佩玉其來朝會權時假給會罷輸還凡應朝服者而官不給聽自具之諸假印綬而官不給鞶囊者得自具作其位假綬者不得佩綬革古制也按漢代著鞶囊者側在腰間或云傍囊或云綬囊然則以此囊盛綬也或盛或散各有其時齊乘輿制六璽以金為之並依秦漢之制皇太子諸王金璽皆龜鈕公侯五等金章其公將軍金章光祿大夫卿尹太子傅諸領護將軍中郎將校尉郡國太守內史四品五品將軍皆銀章尚書令僕射中書監令祕書監丞太子二率諸府長史卿尹丞尉都水使者諸州刺史皆銅印其綬乘輿黃赤縹紺四采太子諸王纁朱綬赤黃縹紺色亦同相國緑綟綬三采緑紫紺羣公朱侯伯青子男素朱皆三采公嗣子紫侯嗣子青鄉亭侯關中關內侯紫綬皆二采郡國太守內史青尚書僕射中書監令祕書監皆墨丞皆黃諸府丞亦然梁制乘輿印璽並如齊制皇太子金璽龜鈕朱綬三百首佩瑜玉帶鹿盧劒火珠首素革帶玉劒獸頭鞶囊諸王金璽龜鈕纁朱綬百六十首佩山元玉垂組大帶獸頭鞶腰劒若加餘官則服其加官之服開國公金章龜鈕元朱綬百四十首佩山元玉獸頭鞶腰劒自開國公而下或金章或金印或銀章或銀印或銅印或青綬或紫綬或墨綬或黃綬或艾綬或佩水蒼玉或佩五采或無佩而簪筆者或獸頭鞶或獸爪鞶或腰劒或紫荷執笏或赤舄絇履或毼縠單衣介幘以至四品將兵以下所領不滿五十人除版而不給章者凡七十等各有差陳永定元年武帝所定乘輿服御皆採梁舊制以天下初定務從節儉應用繡織成者並可彩畫珠玉之飾任用蚌也至天嘉初悉改易之令一依梁天監舊事北齊制天子六璽並依舊式皇帝行璽之璽信璽並白玉為之方一寸三分天子行璽之璽信璽並黃金為之方一寸二分又有傳國璽白玉為之方四寸螭獸鈕上交蟠螭隱起鳥篆書文曰受天之命皇帝夀昌凡八字在六璽外唯封禪以封石函又有督攝萬機印一鈕以木為之長尺二寸廣二寸五分背上為鼻鈕鈕長九寸厚一寸廣七分腹下隱起篆文書為督攝萬機凡四字此印常在內唯以印籍縫用則左户部郎中度支尚書奏取印訖轉內皇太子璽黃金為之方一寸龜鈕文曰皇太子璽宫中大事用璽小事用門下典書坊印諸侯印綬二品以上並金章紫綬三品銀章青綬四品得印者銀印青綬五品六品得印者銅印墨綬七品八品九品得印者銅印黃綬金銀章印及銅印並方一寸皆龜鈕東西南北四藩諸國王之章上藩用中金中藩用下金下藩用銀並方寸龜鈕佐官唯公府長史尚書二丞給印綬六品以下九品以上唯當曹為官長者給印餘自非長官雖位尊亦不給諸王纁朱綬四采赤黃縹紺純朱質纁文織長二丈一尺二百四十首廣九寸開國郡縣公散郡公元朱綬四采元赤縹紺朱質元文織長丈八尺百八十首廣八寸開國縣侯伯青朱綬四采青赤白縹朱質青文織長丈六尺百四十首廣七寸開國縣子男名號侯開國鄉男素朱綬三采青赤白朱質白文織長丈四尺百二十首廣六寸一品二品紫綬三采紫黃赤純紫質長丈八尺百八十首廣八寸三品四品青綬三采青白紅純青質長丈六尺百四十首廣七寸五品六品墨綬二采青紺純紺質長丈四尺一百首廣六寸七品八品九品黃綬二采黃白純黃質長丈二尺六十首廣五寸官品從第二以上小綬間得施玉環官有綬者則有紛皆長八尺廣三寸各隨綬色若服朝服則佩綬公服則佩紛官無綬者不給佩紛其鞶囊二品以上金鏤三品金銀縷四品銀縷五品六品綵縷七八九品絲縷獸爪鞶官無印綬者並不給佩鞶囊及爪其佩及劒一品玉具劒佩山元玉二品金裝劒佩水蒼玉三品及開國子男五等散品名號侯雖四品五品並銀裝劒佩水蒼玉侍中以下通直郎以上陪位則象劒木劒也言其象真劒帶劒者入宗廟及升殿若在仗內皆解劒後周皇帝八璽有神璽有傳國璽皆寶而不用神璽眀受之於天傳國璽眀受之於運皇帝負扆則置神璽於筵前之右置傳國璽於筵前之左其六璽並因舊制皆白玉為之方一寸五分高一寸螭獸鈕三公諸侯皆金印方一寸二分高八分龜鈕七命以上銀四命以上銅皆龜鈕三品以下銅印銅鼻其方皆寸其高六分文曰某公官之印凡組綬皇帝以蒼青朱黃白元纁紅紫緅碧緑十有二色諸公九色自黃以下諸侯八色自白以下諸伯七色自元以下諸子六色自纁以下諸男五色自紅以下三公之綬如諸公三孤之綬如諸侯六卿之綬如諸伯上大夫之綬如諸子中大夫之綬自紫以下士之綬自緅以下其璽印綬亦如之保定四年百官始執笏常服焉內外命婦皆執笏其拜俯伏方興宇文護始袍加下襴遂為後制隋制神璽寶而不用受命璽封禪則用之餘六璽行用並因舊制其綬自王公侯伯子男為四等又以從正一品三品四品五品亦為四等之差大抵遵北齊之制采純及首微有加減焉自王公以下皆有小雙綬長二尺六寸色同大綬而首半之正從一品施二玉環以下不合有綬者則有紛皆長六尺四寸廣二寸四分各隨綬色其鞶囊如北齊制其佩一品及五等諸侯並山元玉五品以上水蒼玉唐貞觀十六年太宗刻受命元璽白玉為螭首其文曰皇天景命有德者昌永徽二年四月敕開府儀同三司及京官文武職事四品五品並給隨身魚上元元年八月敕文武官三品以上金玉帶十二胯四品金魚帶十一胯五品金帶十胯六品七品並銀帶九胯八品九品服並鍮石帶八胯庶人服黃銅鐵帶六胯其一品以下文官並帶手巾筆袋刀子磨石其武官欲帶手巾筆袋亦聽之武太后天授元年九月改內外官所授魚為龜至神龍元年二月京文武官五品以上依舊式佩魚袋垂拱二年正月赦文諸州都督刺史並準京官帶魚長夀三年改玉璽為符寶開元二年七月敕珠玉錦繡既令禁斷準式三品以上飾以玉四品以上飾以金五品以上飾以銀者宜於腰帶及馬鐙酒杯杓依式自外悉禁斷天授二年八月左羽林大將軍建昌王攸寧借紫衫金帶借紫自此始八年二月敕都督刺史品卑者借緋及魚袋永為常式天寶十載改傳國寶為承天大寶天子之寶八一曰神寶所以臣百王鎮萬國寶而不用二曰受命寶所以修封禪禮神祇三曰皇帝行寶答疏於王公則用之四曰皇帝之寶勞來勳賢則用之五曰皇帝信寶召大臣則用之六曰天子行寶答四夷書則用之七曰天子之寶慰撫蠻夷則用之八曰天子信寶發蕃國兵則用之凡大朝會則奉寶以進于御座車駕行幸則奉寶以從于黃鉞車之內臣謹按梁制左右光祿大夫加金章紫綬銀章青綬者同其位但加金紫者謂之金紫光祿大夫但加銀青者謂之銀青光祿大夫又按北齊之制三品以上凡是五省官及中侍中省官皆為印不為章四品以下凡是開國子男及五等散品名號侯皆為銀章不為印通志卷四十七
