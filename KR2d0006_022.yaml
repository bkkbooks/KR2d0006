body:
  text: 通志卷十五下宋右廸功郎鄭樵漁仲撰後魏紀第十五下孝文帝宣武帝孝明帝孝莊帝節閔帝安定王孝武帝西魏文帝廢帝恭帝東魏孝靜帝高祖孝文皇帝諱宏獻文皇帝之太子也母曰李夫人皇興元年八月戊申生於平城紫宫神光照室天地氛氲和氣充塞帝潔白有異姿襁褓岐嶷長而𢎞裕仁孝綽然有人君之表獻文尤愛異之三年六月辛未立為皇太子五年受禪延興元年秋八月丙午皇帝即位太華前殿改皇興五年為延興丁未宋人來聘九月壬戍詔在位及民庶進直言壬午青州高陽人封辯聚黨自號齊王州軍討平之冬十月丁亥沃野統萬二鎮勅勒叛詔太尉隴西王源賀追擊至枹罕滅之徙其遺逃於冀定相三州為營戸十二月乙酉封駙馬都尉穆亮為趙郡王壬辰詔求舜後獲東萊人媯茍之復其家畢世以彰盛徳之不朽復前濮陽王孔雀本封辛丑徙趙郡王穆亮為長樂王癸卯日有蝕之二年春正月大陽蠻酋桓誕率戸内屬拜征南將軍封襄陽王曲赦京師及河西南至秦涇西至枹罕北至凉州及諸鎮詔假員外散騎常侍邢祐使於宋二月丁巳詔曰頃者淮徐未賔尼父廟隔非所致令祠典寢頓禮章殄滅遂使女巫妖覡滛進非禮自今有祭孔廟制用酒酺而已不聽婦女雜合以祈非望之福犯者以違制論其公家有事自如常禮蠕蠕犯塞太上皇帝次於北郊詔諸將討之虜遁走北部勑勒叛奔蠕蠕太上皇帝追至石磧不及而還三月戊辰以散騎常侍駙馬都尉萬安國為大司馬大將軍討安城王庚午親耕籍田連川勑勒謀叛徙配青徐齊兖四州為户夏四月庚子詔工商雜伎盡聽赴農諸州課人益種菜果辛亥宋人來聘癸酉詔沙門不得去寺行者以公文是月宋明帝殂五月丁巳詔軍警給璽印𫝊符次給馬印六月安州遭水雹詔丐租振恤丙申詔今年貢舉尤為猥濫自今所遣皆可門盡州郡之高才極鄉閭之選戊午行幸隂山秋七月壬寅詔州郡縣各遣二人才堪專對者赴九月講武當親問風俗八月百濟遣使請兵伐高麗九月辛巳車駕還宫戊申統萬鎮將河間王閭虎皮坐貪殘賜死己酉詔以州鎮十一水旱丐其田租開倉振恤又詔流迸之人皆令還本違者徙邊冬十月蠕蠕犯塞及五原十一月太上皇帝親討之將度漠蠕蠕聞之北走數千里丁亥封皇叔畧為廣川王壬辰分遣使者廵省風俗問民疾苦帝每月一朝崇光宫十二月庚戍詔曰頃者以來官以勞升未久而代牧守無恤人之心競為聚歛送故迎新相屬於路非所以固民志隆政道也自今牧守温良仁儉克己奉公者可久於其任歳積有成遷位一級其貪殘非道侵削黎庶者雖在官甫爾必加黜罰著之令以為彛凖詔以代郡事同豐沛代人先配邉戍者免是歳高麗地豆干庫莫奚高昌等國遣使朝貢三年春正月庚辰詔員外散騎常侍崔演使於宋丁亥改崇光宫為寕光宫二月戊午太上皇帝至自北討飲至䇿勲告於宗廟甲戍詔縣令能静一縣刼盜者兼理二縣即食其祿能静三縣者三年遷為郡守二千石能静二郡上至三郡亦如之三年遷為刺史三月壬午詔諸倉屯榖麥充積者出賜貧人夏四月戊申詔假司空上黨王長孫觀等討吐谷渾拾寅壬子詔以孔子二十八世孫魯郡孔乗為崇聖大夫給十戸以供灑埽六月甲子詔曰往年縣召秀才二人問守宰善惡而賞者未幾罪者衆多肆法傷生情所未忍諸為人所列者特原其罪盡可代之秋七月詔河南六州人戸收絹一匹綿一斤租三十石乙亥行幸隂山八月庚申帝從太上皇帝幸河西拾寅謝罪請降許之九月辛巳車駕還宫乙亥宋人來聘己亥詔曰今京師及天下囚未判在獄致死無近親者給衣衾棺櫝葬之不得暴露辛丑詔遣十使循行州郡檢括户口冬十月太上皇帝將南討詔州郡之人十丁取一充行戸租五十石以備軍糧十一月戊寅詔以河南州郡牧守多不奉法致新邦百姓莫能上達遣使者觀風察獄黜陟幽明捜揚振恤癸巳太上皇帝南廵至懐州所過問民疾苦賜高年孝悌力田布帛十二月癸卯朔日有蝕之庚戍詔關外苑囿聽民樵採是歳高麗契丹庫莫奚悉萬斤等國並遣使朝貢州鎮十一水旱丐民田租開倉振恤相州人饑死者二千八百四十五人祅人劉舉自稱天子齊州刺史武昌王平原捕斬之四年春正月癸酉朔日有蝕之丁丑太尉隴西王源賀以病辭位二月甲辰太上皇帝至自南廵辛未禁寒食三月丁亥詔員外散騎常侍許赤虎使於宋夏四月丁卯詔自今非謀反大逆干紀外奔罪止其身而已秋七月己夘曲赦仇池八月戊申大閲於北郊九月以宋亂故詔將軍元蘭等伐蜀漢冬十月庚子宋人來聘十一月分遣侍臣循河南七州觀察風俗撫慰初附是歳粟特勑勒吐谷渾高麗曹利闊悉契丹庫莫奚地豆干等國並遣使朝貢州鎮十三大饑丐民田租開倉振之五年春二月癸丑詔定考課明黜陟夏四月詔禁畜鷹鷂開相告之制五月丙午詔員外散騎常侍許赤虎使於宋丁未幸武州山辛酉幸車輪山六月庚午禁殺牛馬壬申曲赦京師死罪遣備蠕蠕秋九月癸邜洛州人賈伯奴稱恒農王豫州人田智度稱上洛王郡討平之冬十月太上皇帝大閲於北郊十二月丙寅改封建昌王長樂為安樂王己丑城陽王長夀薨庚寅宋人來聘是歳高麗吐谷渾龜兹契丹庫莫奚地豆干蠕蠕等國並遣使朝貢承明元年春二月司空東郡王陸定國坐事免官爵為兵夏五月冀州人宋伏龍聚衆自稱南平王郡縣捕斬之六月甲子詔中外戒嚴分京師見兵為三等第一軍出遣第一兵二等亦如之辛未太上皇帝崩壬申大赦改元大司馬大將軍安城王萬安國坐法賜死戊寅以征西大將軍安樂王長樂為太尉尚書左僕射南平公目辰為司徒進封宜都王以南部尚書李訢為司空尊皇太后為太皇太后臨朝稱制秋七月甲辰追尊皇妣李貴人為思皇后濮陽王孔雀有罪賜死八月甲子詔羣公卿士有便民益國者具狀以聞甲戍以長安二蠶多死丐民歳賦之半九月丁亥曲赦京師冬十月丁巳起七寶永安行殿乙丑進假東陽王丕爵為王己未詔羣官卿士下及吏民各聽上書直言極諫勿有所隐諸有益政利民可以正風俗者有司以聞辛未幸建明佛寺大宥罪人進濟南公羅㧞為王是歳蠕蠕高麗庫莫奚波斯契丹宕昌悉萬斤等國並遣使朝貢太和元年春正月乙酉改元辛亥起太和安昌二殿己酉秦州畧陽人王元夀聚衆自號衝天王雲中饑開倉振恤二月辛未秦益二州刺史武都公尉洛侯討破王元夀三月庚子以雍州刺史東陽王丕為司徒丙午詔曰去年牛疫死傷大半今東作既興人湏肄業其勑在所督課田農有牛者加勤於常歳無牛者倍庸於餘年一夫制田四十畆中男二十畆無令民有餘力地有遺利夏四月樂安王良薨詔復前東郡王陸定國官爵五月車駕祈雨於武州山俄而澍雨大洽秋七月壬辰京兆王子推薨庚子定三等死刑己酉起朱明思賢門是月宋人弑其主昱八月壬子大赦丙子詔曰工商皂𨽻各有厥分而有司縱濫或染清流自今戸内有工役者唯止本部丞已下凖次而授若階籍元勲以勞定國者不從此制戊寅宋人來聘九月乙酉詔羣臣定律令於大華殿庚子起永樂遊觀殿於北苑穿神泉池冬十月辛亥朔日有蝕之癸酉宴京邑耆老年七十以上於太華殿賜以衣服詔七十以上一子不從役宋假蘆戍主楊文度遣弟䑕襲䧟仇池十一月丁亥懐州人伊祈茍自稱堯後應王聚衆於重山洛州刺史馮熈討平之閏月庚午詔員外散騎常侍李長仁使於宋十二月壬寅征西將軍皮喜攻䧟葭蘆斬楊文度𫝊首京師丁未州郡八水旱蝗人饑詔開倉恤是歳高麗契丹庫莫奚蠕蠕車多羅西天竺舎衛疊伏羅栗楊婆員闊等國並遣使朝貢二年春正月丁巳封昌黎王馮熈第二子始興為北平王二月丁亥行幸代之湯泉所過問民疾苦以宫女賜貧民無妻者癸邜車駕還宫乙酉晦日有蝕之三月丙子以河南公梁彌機為宕昌王夏四月己丑宋人來聘京師旱甲辰祈天災於北苑親自禮焉減膳避正殿丙午澍雨大洽曲赦京師五月詔曰廼者人漸奢尚婚𦵏越軌又皇族貴戚及士庶之家不惟氏族高下與非類婚偶先帝親發明詔為之科禁而百姓習常仍不肅改朕念憲章舊典永為定凖犯者以違制論六月庚子皇叔若薨秋八月分遣使者考察守宰問民疾苦丙戍詔罷諸州禽獸之貢九月乙巳朔日有蝕之丙辰曲赦京師冬十月壬辰詔員外散騎常侍鄭羲使於宋十二月癸巳誅南郡王李惠是歳龜兹國獻名駞龍馬珍寳甚衆吐谷渾蠕蠕勿吉等國並遣使朝貢州鎮二十餘水旱民饑詔開倉振恤三年春正月癸丑巛徳六合殿成庚申詔罷行察官二月辛巳帝太皇太后幸代郡湯泉問民疾苦鰥寡貧者妻以宫女己亥還宫三月癸邜朔日有蝕之甲辰曲赦京師夏四月壬申宋人來聘癸未樂良王樂平薨甲午宋順帝禪位于齊庚子進淮陽公尉元爵為王宜都王目辰有罪賜死五月丁巳帝祈雨於北苑開陽門是日澍雨大洽六月辛未以雍州民饑開倉振恤起文石室靈泉殿於方山秋七月壬寅詔免宫人年老及病者八月壬申詔羣臣進直言乙亥幸方山起思逺佛寺丁丑還宫九月壬子以司徒東陽王丕為太尉趙郡公陳建為司徒進爵魏郡王河南公茍頽為司空進爵河東王進太原公王叡中山王隴東公張祐新平王乙未定州刺史安樂王長樂有罪賜死庚申隴西王源賀薨冬十月己巳朔大赦十一月癸邜賜京師貧窮高年疾患不能自存衣服布帛各有差癸丑進假梁郡公元嘉爵為假王督二將出淮隂隴西公元琛三將出廣陵河東公薛豹子三將出廣固至夀春是歳吐谷渾高麗蠕蠕地豆干契丹庫莫奚龜兹粟特州逸河龔疊伏羅負闊悉萬斤等國各遣使朝貢四年春正月癸卯乾象六合殿成乙卯廣川王畧薨丁巳罷畜鷹鷂之所以其地為報徳佛寺戊午襄城王韓頽有罪削爵徙邉二月癸巳以旱故詔天下祀山川羣神及能興雲雨者修飾祠堂薦以牲璧民有疾苦所在存問夏四月乙邜幸廷尉籍坊二獄引見諸囚詔隨輕重決遣以赴耕耘甲申賜天下貧民一户之内無雜財榖帛者禀一年六月丁卯以澍雨大洽曲赦京師秋七月辛亥行幸太山詔㑹京師耆老賜錦綵衣服几杖稻米蜜麵復家人不徭役閏月丁亥幸虎圈親録囚徒輕者皆免之壬辰頓邱王李鍾葵有罪賜死八月乙酉詔諸州置氷室九月乙亥思義殿成壬午東明觀成戊子詔曰隆寒雪降可遣侍臣詣廷尉獄及囚所察饑寒者給以衣食桎梏者代以輕鎻是歳郡鎮十八水旱民饑詔開倉振恤蠕蠕悉萬斤等國並遣使朝貢五年春正月己邜南廵丁亥至中山親見高年問民疾苦二月辛邜朔大赦賜孝悌力田孤貧不能自存者榖帛各有差免宫人之老者還其親丁酉至信都存問如中山己酉講武于唐水之陽庚戍車駕還宫沙門法秀謀反伏誅假梁郡王嘉大破齊俘獲三萬餘口送京師三月辛酉朔幸肆州癸亥講武于雲水之陽所經考察守宰黜陟之己巳車駕還宫詔曰法秀妖詐亂常妄説符瑞蘭臺御史張求等一百餘人招結奴𨽻謀為大逆有司科以族誅誠合刑憲但矜愚重命猶所不忍其五族者降止同祖三族止一門門誅止身夏四月己亥行幸方山建永固石室於山立碑焉銘太皇太后終制于金冊又起鑒元殿甲寅以旱故詔所在掩骸骨祈禱神祇任城王雲薨五月庚申以農月時要詔天下勿使有留獄六月甲辰中山王叡薨戊午封皇叔簡為齊郡王猛為安豐王秋七月庚申朔日有蝕之甲子齊人來聘九月庚午閲武於南郊大饗羣臣齊使車僧朗以班在宋使殷靈誕後辭不就席宋降人解奉君刃僧朗於㑹中詔誅奉君等乙亥封昌黎王馮熈世子誕為南平王冬十二月癸巳州鎮十二饑詔開倉振恤是歳鄧至蠕蠕等國並遣使朝貢六年春正月甲戍大赦辛邜詔以靈邱郡土既褊塉又諸州路衝復其民租十五年癸巳白蘭王吐谷渾翼世以誣罔伏誅乙未詔曰蕭道成逆亂江淮戎旗頻舉七州之民既有征運之勞深乖輕徭之義其復常調三年癸丑賜王公以下清勤著稱者榖帛有差三月庚辰幸虎圈詔曰虎狼猛暴食肉殘生從今勿復捕貢辛巳幸武州山石窟寺賜貧老衣服是月齊高帝殂夏四月甲辰賜畿内鰥寡孤獨不能自存者粟帛各有差秋七月發州郡丁萬人修靈邱道八月癸未朔分遣大使廵行天下遭水之處丐其租賦貧儉不自存者賜以粟帛庚子罷山澤禁九月辛酉以氐楊後起為武都王是歳地豆干吐谷渾等國並遣使朝貢七年春正月庚申詔曰朕每思知百姓疾苦以増修寛政故具問守宰苛虐之狀於州郡使者今秀孝計掾對多不實甚乖朕虛求之意宜案以大辟明罔上必誅然情猶未忍可恕罪聽歸申布天下使知後犯無恕丁邜詔青齊兖東徐四州戸運倉粟二十萬石送瑕邱琅邪復租算一年三月甲戍以冀定二州饑詔郡國為粥於路以食之又弛關津之禁夏四月庚子幸崞山賜所過鰥寡不能自存者衣服粟帛壬寅車駕還宫閏月癸丑皇子生大赦六月定州上言為粥所活九十四萬七千餘口秋七月甲申詔假員外散騎常侍李彪使於齊改封濟南王羅㧞為趙郡王九月壬寅詔求讜言冀州上言為粥所活七十五萬一千七百餘口冬十月戊午皇信堂成十一月辛丑齊人來聘十二月乙巳朔日有蝕之癸丑詔曰夏殷不嫌一族之婚周世始絶同姓之娶斯皆教随時設政因事改者也皇運初基日不暇給古風遺樸未遑釐改自今悉禁絶之有犯者以不道論庚午開林慮山禁與民共之州鎮十三饑詔開倉振恤八年春正月詔隴西公琛尚書陸叡為東西二道大使褒善罰惡夏五月己邜詔振賜河南七州戍兵甲申詔員外散騎常侍李彪使於齊六月丁卯詔曰置官班祿行之尚矣自中原喪亂兹制中絶先朝因循未遑釐改朕顧憲章舊典始班俸祿罷諸商人以簡人事乃増調三匹榖二斛九斗以為官司之禄均豫調為二匹之賦即兼商用雖有一時之煩終克永逸之益禄行之後贓滿一匹者死變法改度宜為更始其大赦天下與之惟新戊辰武州水壊民居秋八月甲辰詔以班制俸祿更興刑書寛猛未允人或異議制百辟卿士工商吏人各上便宜勿有所隐九月甲午齊人來聘戊戍詔俸制十月為首每季一請於是内外百官受祿有差冬十一月乙未詔員外散騎常侍李彪使於齊十二月州鎮十五水旱民饑詔使者開倉振恤是歳蠕蠕高麗等國各遣使朝貢九年春正月戊寅詔禁圖䜟祕緯及名孔子閉房記留者以大辟論又諸巫覡假稱神鬼妄説吉凶及委巷諸非墳典所載者嚴加禁斷癸未大饗羣臣於大華殿班賜皇誥二月己亥制皇子封王者皇孫皇曽孫紹封者皇女封者歳禄各有差封廣陽王建第二子嘉為廣陽王己巳詔百辟卿士工商吏民各上書極諫靡有所隐三月丙申封皇弟禧為咸陽王幹為河南王羽為廣陵王雍為頴川王勰為始平王詳為北海王夏五月齊人來聘秋七月丙午朔新作諸門癸未遣使拜宕昌王梁彌機兄子彌承為宕昌王八月庚申詔曰數州災水饑饉荐臻致有賣鬻男女者天譴在予一人百姓横罹艱毒今自太和六年已來買定冀幽相四州饑民良口者盡還所親雖聘為妻妾遇之非理情不樂者亦離之冬十月丁未詔使者循行州郡與牧守均給天下之田還受以生死為斷勸課農桑興富民之本辛酉司徒魏郡王陳建薨詔員外散騎常侍李彪使於齊十二月乙邜以侍中淮南王他為司徒是歳京師及州鎮十三水旱傷稼宕昌高麗吐谷渾等國並遣使朝貢十年春正月癸亥朔帝始服衮冕朝饗萬國二月甲戍初立黨里鄰三長定民户籍三月庚戍齊人來聘夏四月辛酉朔始制五等公服甲子帝初法服御輦祝西郊六月己邜名皇子曰恂大赦秋八月乙亥給尚書五等品爵已上朱衣玉珮大小組綬九月辛邜詔起明堂辟雍冬十月癸酉有司議依故事配始祖於南郊十一月議定州郡縣官依口給俸十二月乙酉汝南穎川饑詔丐民田租開倉振恤是歳蠕蠕高麗吐谷渾勿吉等國並遣使朝貢十一年春正月丁亥朔詔定樂章非雅者除之二月甲子肆州之鴈門及代郡民饑詔開倉振恤夏五月癸巳南平王渾薨甲午詔復七廟子孫及外戚緦服已上賦役無所與六月辛巳秦州民饑詔開倉振恤秋七月己丑詔今年榖不登聼民出關就食遣使者造籍分遣去留所在開倉振恤八月壬申蠕蠕犯塞遣平原王陸叡討之庚辰大議北伐辛巳罷山北苑以其地賜貧民冬十月辛未詔罷起部無益之作出宫人不執機杼者甲戍詔曰鄉飲之禮廢則長㓜之序亂孟冬十月人閑歳隙宜於此時導以徳義可下諸州黨里之内推賢而長者教其里人父慈子孝兄友弟順夫和妻柔不率長教者具以名聞十一月丁未詔罷尚方錦繡綾羅之工百姓欲造任之無禁其御府衣服金銀珠玉綾紬錦太官雜器太僕乗具内庫弓矢出其大半班賚百官及京師民庶下至工商皂𨽻逮於六鎮戍士各有差戊申詔今寒氣勁切杖箠難任自今月至來年孟夏不聼拷問罪人又歳饑輕囚宜速決了無令薄罪乆留獄犴十二月詔祕書丞李彪著作郎崔光改析國記依紀𫝊體是歳大饑詔所在開倉振恤吐谷渾高麗悉萬斤等國並遣使朝貢十二年春正月辛巳朔初建五牛旌旗乙未詔鎮戍流徙之人年滿七十孤單窮獨無成人子孫旁無朞親者具狀以聞二月辛亥朔日有蝕之三月丁亥中散梁衆保等謀反伏誅夏四月甲子大赦己巳齊將陳顯達攻䧟澧陽長樂王穆亮率騎討之五月丁酉詔六鎮雲中河西及關内郡各修水田通渠溉灌壬寅増置彛器於太廟秋九月甲午詔曰日蝕脩徳月蝕修刑廼者癸巳夜月蝕盡公卿已下宜慎刑罰以答天意丁酉起宣文堂經武殿癸邜淮南王他薨冬閏十月甲子帝觀築圜丘于南郊十一月雍豫二州民饑詔開倉振恤梁州刺史臨淮王提坐貪縱配北鎮是歳高麗宕昌吐谷渾勿吉武興等國並遣使朝貢十三年春正月辛亥祀圜丘初備大駕乙丑兖州人王伯㳟聚衆勞山自稱齊王東萊鎮將孔伯孫討斬之戊辰齊人冦邊淮南太守王僧雋擊走之二月庚子引羣臣訪政道得失損益之宜三月夏州刺史章武王彬以貪財削封夏四月丁丑詔曰升樓散物以賚百姓至使人馬騰踐多有毁傷今可斷之以本所費之物賜窮老貧獨者州鎮十五大饑詔所在開倉振恤五月庚戍祀方澤六月汝隂王天賜南安王禎並坐贓賄免為庶人秋七月立孔子廟於京師八月乙亥詔兼員外散騎常侍邢産使於齊九月出宫人賜北鎮人貧鰥寡者冬十月己未安豐王猛薨十二月丙子司空河東王茍頽薨甲午齊人來聘己亥以尚書令尉元為司徒左僕射穆亮為司空是歳高麗吐谷渾隂平中赤武興宕昌等國各遣使朝貢十四年春己巳朔日有蝕之三月戊寅初制定起居注制詔遣侍臣廵行州郡問民疾苦夏四月地豆干頻犯塞甲戍征西大將軍陽平王熈擊走之甲午詔兼員外散騎常侍邢産使於齊五月己酉庫莫奚犯塞安州都將樓龍兒擊走之沙門司馬御惠自言聖王謀破平原郡禽獲伏誅秋七月甲辰詔罷都牧雜制八月詔議國之行次九月癸丑太后馮氏崩詔聼藩鎮曽經内侍者前後奔赴冬十月戊辰詔將親侍龍輿奉訣陵隧諸常從之具悉可停之其武衛之官防侍如法癸酉葬文明太皇太后於永固陵甲戍車駕謁永固陵羣臣固請公除帝不許己邜車駕謁永固陵庚辰帝居廬引見羣寮於太和殿太尉東陽王丕等據權制固請帝引古禮往復羣臣乃止京兆王太興有罪免官削爵詔曰公卿屢依金冊遺旨中代權制或請過葬即吉朕思遵逺古終三年之制依禮既虞卒哭此月二十一日授服以葛易麻既以衰服在上公卿不得獨釋於下故於朕之授服變從練禮已下復為節降斟酌古今以制厥衷且取遺旨速除之一端粗申臣子罔極之巨痛癸未詔曰朕逺遵古式欲終三年之禮百辟羣臣據金冊顧命將奪朕心從先朝之制朕仰惟金冊俯自推省取諸二衷不許衆議以衰服過期終四節之慕又奉遵聖訓聿修誥旨不敢暗黙自居以曠機政庶不愆遺令之意差展哀慕之情並下州鎮長至三元絶告慶之禮甲申車駕謁永固陵十一月甲寅詔内外職人先朝班次及諸方雜客冬至之日盡聽入臨三品以下衰服者至夕復臨其餘唯旦臨而已其拜哭之節一依别儀丁巳齊人來聘十二月壬午詔依凖邱井之式遣使與州郡宣行條制隐口漏丁即聽附實若朋附豪勢陵抑孤獨罪有常刑是嵗吐谷渾宕昌武興隂平高麗等國並遣使朝貢十五年春正月丁巳帝始聽政於皇信東室初分置左右史官癸亥晦日有蝕之二月己丑齊人來聘三月甲辰車駕謁永固陵夏四月癸亥帝始進蔬食乙丑謁永固陵自正月不雨至于癸酉有司奏祈百神詔曰何宜四氣未周便行禮事唯當考躬責己以待天譴甲戍詔員外散騎常侍李彪使於齊己邜經始明堂改營太廟五月己亥議改律令於東明觀折疑獄乙邜枹罕鎮將長孫百年攻吐谷渾所置洮陽泥和二戍尅之俘獲三萬餘人詔悉免歸丙辰詔造五輅六月丁未濟隂王鬱以貪殘賜死秋七月乙丑謁永固陵規建夀陵己邜詔議祖宗以道武皇帝為太祖乙酉車駕廵省京邑聽訟而還八月壬辰議養老又議肆類上帝禋于六宗禮帝親臨決詔郡國有時物可以薦宗廟者貢之戊戍移道壇於桑乾之隂改曰崇虛寺己亥詔諸州舉秀才先盡才學乙巳親定禘祫禮丁巳議律令事仍省雜祀九月辛巳齊人來聘冬十月庚寅車駕謁永固陵是月明堂太廟成十一月丁邜遷七廟神主於新廟乙亥大定官品戊寅考諸牧守詔假通直散騎常侍李彪聘於齊丙戍初罷小歳賀丁亥詔二千石考上上者假四品將軍賜乗黄馬一匹上中者五品將軍上下者衣一襲十二月壬辰遷社於内城之西癸巳班賜刺史已下衣冠以安定王休為太傅齊郡王簡為太保帝為高麗王璉舉哀於城東行宫己酉車駕迎春於東郊辛亥詔簡選樂官是歳吐谷渾悉萬斤高麗鄧至宕昌等國並遣使朝貢十六年春正月戊午朔朝饗羣臣於太華殿帝始為王公興縣而不樂己未宗祀顯祖獻文皇帝於明堂以配上帝遂升臺以觀雲物降居青陽左个布政事每朔依以為常辛酉始以太祖配南郊壬戍詔定行次以水承金甲子詔罷祖祼乙丑制諸逺屬非太祖子孫及異姓為王者皆降為公公為侯侯為伯子男仍舊皆除將軍之號戊辰帝臨思義殿策問秀孝丙子始以孟月祭廟二月戊子帝移御永樂宫庚寅壊太華殿經始太極殿辛邜罷寒食享壬辰幸北部曹歴觀諸省廵省京邑聽理寃訟甲午車駕初朝日于東郊遂以為常丁酉詔祀唐堯於平陽虞舜於廣寗夏禹於安邑周文於洛陽丁未改諡宣尼曰文聖尼父告諡孔廟三月丁邜廵省京邑癸酉省西郊郊天雜事乙亥車駕初迎氣於南郊自此為常辛巳以高麗王璉孫雲為其國王齊人來聘夏四月丁亥朔頒新律令大赦甲寅幸皇宗學親問博士經義五月癸未詔羣臣於皇信堂更定律條流徒限制帝親臨決之秋七月壬戍詔曰自今選舉每以季月本曹與吏部銓簡甲戍詔兼員外散騎常侍宋弁使於齊八月庚寅車駕初祀夕月於西郊遂以為常乙未詔陽平王賾左僕射陸叡督十二將北討蠕蠕丙午宕昌王梁彌承來朝司馬尉元以老遜位己酉以尉元為三老游明根為五更又養國老庶老將行大射之禮雨不克成癸丑詔曰國家雖宗文以懐九服修武以寕八荒然於習武之方猶為未盡將於馬射之前先行講武之式可勑有司豫修塲埒其列陣之儀五戎之數别俟後勑九月甲寅朔大序昭穆於明堂祀文明太皇太后於元堂辛未帝以文明太皇太后再周忌日哭於陵左絶膳三日哭不輟聲辛巳武興王楊集始來朝冬十月己亥以太傅安定王休為大司馬特進馮誕為司徒甲辰詔以功臣配饗太廟庚戍太極殿成饗羣臣十一月乙邜依古六寢權制三室以安昌殿為内寢皇信堂為中寢四下為外寢十二月賜京邑老人鳩杖齊人來聘是嵗高麗鄧至契丹及吐谷渾等國並遣使朝貢十七年春正月壬子朔饗百寮於太極殿乙丑詔大賜諸蕃君長車旗衣馬錦綵繒纊多者一千少者三百各以命數為差詔兼員外散騎常侍邢巒使於齊丙子以吐谷渾伏連籌為其國王庚辰蠲大司馬安定王休太保齊郡王簡朔望之朝二月乙酉詔賜議律令之官各有差己酉車駕始籍田於都南三月戊辰改作後宫夏四月戊戍立皇后馮氏是月齊直閤將軍蠻酋田益宗率部落内屬五月壬戍宴四廟子孫於宣文堂帝親與之齒行家人禮甲子帝臨朝堂引見公卿以下決疑政録囚徒丁丑以旱徹膳㐮陽蠻酋雷婆思等率其部内徙居於太和川六月庚辰朔日有蝕之丙戍帝將南伐詔造河橋乙未講武乙巳詔曰比百秩雖陳事典未叙自八元樹位躬加省覧作職員令二十一卷事廹戎期未善周悉湏待軍廻便論所闕權可付外施行立皇子恂為皇太子秋七月癸丑以皇太子立詔賜人為父後者爵一級為公士曽為吏屬者爵二級為上造鰥寡孤獨不能自存者人粟五斛戊午中外戒嚴是月齊武帝殂八月乙酉三老山陽郡公尉元薨丙戍車駕類於上帝遂臨尉元喪丁亥帝辭永固陵己丑發京師南伐歩騎三十餘萬太尉丕奏請以宫人從詔以臨戎不語内事不許壬寅車駕至肆州民年七十以上賜爵一級路見眇跛停駕親問賜衣食復終身戊申幸并州親見高年問民疾苦九月壬子詔兼員外散騎常侍高聰聘於齊丁巳詔車駕所經傷人秋稼者畆給五斛戊辰濟河詔洛懐并肆所過四州賜高年爵恤鰥寡孤獨各有差孝悌亷義文武應求者皆以名聞又詔厮養户不得與庶士婚有文武之才積勞應進者同庶族例聽之庚午幸洛陽周廵故宫基跡帝顧謂侍臣曰晉徳不修荒毁至此遂詠黍離詩為之流涕壬申觀河橋幸太學觀石經丙子六軍發軫丁丑帝戎服執鞭御馬而出羣臣稽顙於馬前請停南伐帝乃止仍議遷都計冬十月戊寅朔幸金墉城詔徴司空穆亮與尚書李冲將作大匠董爵經始洛京己邜幸河南城乙酉幸豫州癸巳次於石濟乙未解嚴設壇於滑臺宫詔京師及諸州從戎者賜爵一級應募者加二級主將加三級癸邜幸鄴城乙巳詔安定王休率從官迎家口於代車駕送於漳水上初帝之南伐起宫殿於鄴西十一月癸亥宫成徙御焉十二月戊寅廵省六軍乙未詔隐恤軍士死亡疾病務令優給是嵗勿吉吐谷渾宕昌隂平契丹庫莫奚高麗鄧至等國並遣使朝貢十八年春正月丁未朔朝羣臣於鄴宫澄鸞殿癸亥南廵詔相兖豫三州賜高年爵恤鰥寡孤老各有差孝悌亷義文武應求者皆以名聞戊辰經殷比干墓祭以太牢乙亥幸洛陽西宫二月己丑行幸河隂規建方澤之所丙申徙封河南王幹為趙郡王頴川王雍為高陽王壬寅北廵癸夘齊人來聘甲辰詔諭天下以遷都意閏月癸亥次勾注陘南皇太子朝于蒲地壬申至平城宫癸酉臨朝堂部分遷留甲戍謁永固陵三月庚辰罷西郊祭天壬辰帝臨太極殿諭在代羣臣遷移之畧夏五月甲戍朔日有蝕之乙亥詔罷五月五日七月七日饗六月己巳詔兼員外散騎常侍盧昶使於齊秋七月乙亥以宋王劉昶為大將軍壬辰北廵戊戍謁金陵辛丑幸朔州是月齊蕭鸞弑其主昭業八月癸亥皇太子朝於行宫甲辰行幸隂山觀雲川丁未幸閲武臺臨觀講武因幸懐朔武川撫㝠柔元等四鎮乙丑南還所過皆親見高年問民疾苦貧窘孤老者賜以粟帛丙寅詔六鎮及禦夷城人年老孤貧廢疾者賜粟宥罪各有差戊辰車駕次旋鴻池庚午謁永固陵辛未還平城宫九月壬申朔詔曰三載考績自古通經三考黜陟以彰能否朕今三載一考考即黜陟欲令愚滯無妨於賢者才能不擁於下位各令當曹考其優劣為三等六品已下尚書重問五品已上朕將親與公卿論其善惡上上者遷之下下者黜之中中者守其本任壬午帝臨朝堂親加黜陟壬辰隂平王陽炅來朝冬十月甲辰以太尉東陽王丕為太傅戊申親告太廟奉迎神主辛亥車駕發平城宫壬戍次於中山之唐湖乙丑分遣侍臣廵問疾苦己巳幸信都庚午詔曰比聞縁邊之蠻多有竊掠致有父子乖離室家分絶可詔荆郢東荆三州勒諸蠻人勿有侵暴是月齊蕭鸞弑其主昭文而自立十一月辛未朔詔冀定二州賜高年爵恤鰥寡孤老各有差孝義廉貞文武應求者具以名聞丁丑幸鄴甲申經比干墓親為弔文樹碑刋之己丑車駕至洛陽十二月辛丑朔分命諸將南征壬寅革衣服之制癸邜詔中外戒嚴戊申復代遷户租賦三嵗己酉詔王公侯伯子男開國食邑者王食半公三分食一侯伯四分食一子男五分食一辛亥車駕南伐丁邜詔郢豫二州賜高年爵恤孤寡鰥老各有差縁路之丁復田租一嵗孝悌亷貞文武應求者具以名聞戊辰車駕至懸瓠己巳詔夀陽鍾離馬頭之師所獲男女口皆放還南是嵗高麗國遣使朝貢十九年春正月辛未朔朝饗羣臣於懸瓠癸酉詔禁淮北人不得侵掠犯者以大辟論壬午講武於汝水西大賚六軍平南將軍王肅左將軍元麗並大破齊軍己亥車駕濟淮二月甲辰幸八公山路中雨甚詔去盖見軍士病者親隐恤之戊申車駕廵淮南東人皆安堵租運屬路丙辰幸鍾離戊午軍士禽齊人三千帝曰在君為君其人何罪於是免歸辛酉發鍾離將臨江水司徒馮誕薨壬戍詔班師丁邜遣使臨江數齊主罪惡三月戊子太師馮熙薨夏四月丁未曲赦徐豫二州其運轉之士復租三年辛亥詔賜高年爵恤孤寡老疾各有差徳著邱園者具以名聞齊人降者給復十五年癸丑幸小沛使以太牢祭漢高祖廟己未幸瑕邱使以太牢祠岱嶽詔宿衛武官増位一級庚申幸魯城親祠孔子廟辛酉詔拜孔氏四人顔氏二人為官詔兖州刺史舉部内士人堪軍國及守宰政績者具以名聞詔賜兖州人爵及粟帛如徐州又詔選諸孔宗子一人封崇聖侯邑一百戸以奉孔子祀命兖州為孔子起園栢修飾墳壠更建碑銘襃揚聖徳戊辰行幸碻磝太和廟成五月己巳城陽王鸞赭陽失利降為定㐮縣王廣川王諧薨庚午遷文成皇后馮氏神主於太和廟甲戍行幸滑臺丙子次於石濟庚辰皇太子朝於平桃城癸未車駕至自南伐甲申減閒官禄以禆軍國之用乙酉行飲至禮班賜各有差甲午皇太子冠於廟六月己亥詔不得以北俗之語言於朝廷違者免所居官辛丑詔復軍士從駕渡淮者租賦三年癸邜詔皇太子赴平城宫壬子詔濟州東郡滎陽及河南諸縣車駕所經者賜高年爵恤孤寡老疾各有差孝悌亷義文武應求者具以名聞癸丑求天下遺書祕閤所無有禆時用者加以厚賞乙邜曲赦梁州復民田租三歳丙辰詔遷洛人死葬河南不得還北於是代人南遷者悉為河南洛陽人戊午詔改長尺大㪷依周禮制度班之天下秋八月幸西宫路見壊塚露棺駐輦埋之乙巳詔選天下勇士十五萬人為羽林虎賁以充宿衛丁巳詔諸從兵從征被傷者皆聽還本金墉宫成甲子引羣臣歴宴殿堂九月六宫及文武盡遷洛陽丙戍行幸鄴丁亥詔諸墓舊銘記見存昭然為時人所知者三公及位從公者去墓三十歩尚書令僕九列十五歩黄門五校十歩各不聽墾殖遣黄門郎以太牢祭比干墓乙未車駕還宫冬十月甲辰曲赦相州賜高年爵恤孤老痼疾各有差丙辰車駕至自鄴辛酉詔州郡舉士壬戌詔諸州牧考屬官為三年之科以聞將加親覽以定升降詔徐兖光南青荆洛六州嚴纂戎備應湏赴集十一月行幸委粟山議定圜丘甲申祀圜丘丙戍大赦十二月乙未朔引見羣臣光極堂宣下品令為大選之始辛酉以咸陽王禧為長兼太尉復前安南王禎本爵甲子引見羣臣光極堂班賜冠服是歳高麗鄧至吐谷渾等國各遣使朝貢二十年春正月丁邜詔改姓元氏壬辰封始平王勰為彭城王復封定㐮王鸞為城陽王二月辛丑幸華林聽訟於都亭壬寅詔自非金革皆聽終三年喪丙午詔畿内七十已上暮春赴京師將行養老禮庚戍幸華林聽訟於都亭癸丑詔介山之邑聽為寒食自無禁斷三月丙寅宴羣臣及國老庶老於華林園詔國老黄耇以上假中散大夫郡守老至年以上假給事中縣令庶老直假郡縣各賜鳩杖衣裳丁丑詔諸州中正各舉其鄉人望年五十已上守素衡門者授以令長夏五月丙子詔敦勸農功令畿内嚴加課督惰業者申以楚撻力田者具以名聞丙戍初營方澤於河隂遣使以太牢祭漢光武及明章三帝陵又詔漢魏晉諸帝陵各禁方百歩不得樵蘇踐藉丁亥祀方澤秋七月廢皇后馮氏戊寅帝以久旱咸秩羣神自癸未不食至於乙酉是夜澍雨大洽八月壬辰朔幸華林園親録囚徒減降本罪二等決遣之丁巳南安王禎薨幸華林園聽訟九月戊辰車駕閲武于小平津癸酉還宫丁亥將通洛水入榖帝親臨觀庚寅晦日有蝕之冬十月戊戍以代遷之士皆為羽林虎賁司州之人十二夫調一吏為四年更卒歳開番假以供公私力役己酉曲赦京師十一月乙酉復封前汝隂王天賜孫景和為汝隂王前京兆王大興為西河王十二月甲子以西北州郡旱儉遣侍臣廵察開倉振恤乙丑開鹽池禁丙寅廢皇太子恂為庶人戊辰置常平倉樂陵王思譽知恒州刺史穆泰謀反不告削爵為庶人二十一年春正月丙申立皇子恪為皇太子賜天下為父後者爵一級己亥遣侍臣廵方省察問民疾苦黜陟守宰乙巳北廵二月壬戍次於太原親見高年問所不便乙丑詔并州士人年六十以上假以郡守先是定州人王金鉤訛言自稱應王丙寅州郡捕斬之癸酉車駕至平城甲戌謁永固陵乙未南廵甲寅詔汾州睗高年爵各有差丙辰次平陽使以太牢祭唐堯夏四月庚申幸龍門使以太牢祭夏禹癸亥幸蒲坂使以太牢祭虞舜修堯舜夏禹廟幸未幸長安壬申武興王楊集始來朝乙亥親見高年問所疾苦丙子遣侍臣分省縣邑振賜榖帛戊寅幸未央殿阿房宫遂幸昆明池癸未宋王劉昶薨丙戍使以太牢祀漢帝諸陵五月丁亥朔衛大國遣使朝貢己丑車駕東旋汎渭入河庚寅詔雍州士人百年以上假華郡太守九十以上假荒郡八十以上假華縣七十以上假荒縣庶老以年各減一等七十以上賜爵三級其營船夫賜爵一級孤寡鰥貧各賜榖帛其孝友徳義文武才幹悉仰貢舉壬辰使以太牢祭周文王於酆祭周武王於鎬癸邜遣使祭華岳六月庚申車駕至自長安壬辰詔冀定瀛相濟五州發卒士二十萬將以南討癸亥司空穆亮遜位秋七月甲午立昭儀馮氏為皇后甲寅帝親為羣臣講喪服於清徽堂八月丙辰詔中外戒嚴壬戍立皇子愉為京兆王懌為清河王懐為廣平王戊辰講武於華林園庚辰車駕南討九月丙申詔司州洛陽人年七十以上無子孫六十以上無朞親貧不自存者給以衣食及不滿六十而有廢痼之疾無大功親窮困無以自療者皆於别坊遣醫救䕶給大醫師四人豫請藥物療之辛丑帝留諸將攻赭陽引師南討丁未車駕發南陽留太尉咸陽王禧前將軍元英攻之己酉車駕至新野冬十月丁巳四面進攻不尅詔左右軍築長圍以守之乙亥追廢貞皇后林氏為庶人十一月丁酉大破齊軍於沔北於是人皆復業九十以上假以郡守六十五以上假以縣令十二月丁邜詔流徒之囚皆勿決遣登城之際令其先鋒自効庚午車駕臨沔遂東還戊寅還新野己邜親行營壘恤六軍以齊郡王子琛紹河間王若後高昌國遣使朝貢二十二年春正月癸未朔饗羣臣於新野行宫丁亥㧞新野斬其太守劉忌於宛庚午至自新野辛未詔以穣人首歸大順始終若一者給復三十年摽其所居曰歸義鄉次降者給復十五年三月壬午朔大破齊將崔慧景蕭衍軍於鄧城庚寅行幸樊城觀兵㐮沔耀武而還曲赦二荆魯陽辛亥行幸懸瓠夏四月趙郡王幹薨秋七月壬午詔后之私府損半六宫嬪御五服男女恒恤恒供亦宜令減半在戎之親三分省一以供賞是月齊明帝殂八月辛亥皇太子自京師來朝壬戍高麗遣使朝貢九月己亥帝以禮不伐喪詔反斾丙午車駕發懸瓠冬十月己酉朔曲赦二豫州殊死已下復民田租一歳十一月辛巳幸鄴二十三年春正月戊寅朔朝饗羣臣於鄴先是帝不豫至是有瘳庚辰羣臣上夀大饗於澄鸞殿壬午幸西門豹祠遂歴漳水而還戊戍車駕至自鄴癸邜行飲至䇿勲之禮甲辰大赦太保齊郡王簡薨二月辛亥以長兼太尉咸陽王禧為太尉癸亥以中軍大將軍彭城王勰為司徒復樂陵王思譽本封癸酉齊將陳顯達攻䧟馬圈戌三月庚辰車駕南伐癸未次梁城丙戍帝不豫丁酉車駕至馬圈戊戍頻戰破之己亥收其戎資億計諸將追奔漢水斬獲及赴水死者十八九庚子帝疾甚車駕北次榖塘原甲辰詔賜皇后馮氏死詔司徒勰徴太子於魯陽踐阼以北海王祥為司空王肅為尚書令廣陽王嘉為左僕射尚書宋弁為吏部尚書與太尉咸陽王禧右僕射任城王澄等六人輔政夏四月丙午朔帝崩于榖塘原之行宫時年三十三祕諱至魯陽發喪還京師上諡曰孝文皇帝廟曰高祖五月丙申葬長陵帝㓜有至性年四歳時獻文患癕帝親自吮膿五歳受禪悲泣不自勝獻文問其故對曰代親之感内切於心獻文甚歎異之文明太后以帝聰聖後或不利馮氏將謀廢帝乃於寒月單衣閉室絶食三朝召咸陽王禧將立之元丕穆泰李冲固諫乃止帝初不有憾唯深徳丕等撫念諸弟始終曽無纎介惇睦九族禮敬俱深雖於大臣持法不縱然性寛慈進食者曽以熱羮覆帝手又曽於食中得蟲穢物並笑而恕之宦者先有譖帝於太后太后杖帝數十帝黙受不自申明太后崩後亦不以介意聽覽政事從善如流哀矜百姓恒思所以濟益天地五郊宗廟二分之禮常必躬親不以寒暑為倦尚書奏案多自尋省百官大小無不留心務於周洽每言凡為人君患於不均不能推誠遇物茍能均誠胡越之人亦可親如兄弟常從容謂史官曰直書時事無諱國惡人君威福自己史復不書將何所懼南北征廵有司奏請修道帝曰粗修橋梁通輿馬便止不湏去草剗令平也凡所修造不得已而為之不為不急之事重損民力廵幸淮南如在内地軍事湏伐人樹者必留絹以酬其直人苖稼無所傷踐諸有禁忌禳厭之方非典籍之載者一皆除罷雅好讀書手不釋卷五經之義覽之便講學不師受探其精奥史𫝊百家無不該渉善談莊老尤精釋義才藻富贍好為文章詩賦銘頌任興而作有大文筆馬上口授及其成也不改一字自太和十年已後詔册皆帝文也自餘文章百有餘篇愛竒好士情如饑渇待納朝賢隨才輕重常寄以布素之意悠然元邁不以世務嬰心又少善射有膂力年十餘能以指彈碎羊髆骨射禽獸莫不隨行所至而斃之至十五便不復殺生射獵之事悉止性儉素常服澣濯之衣鞍勒鐵木而已帝之雅志皆此類也孝文帝延興五年承明元年太和二十三年即位二十九年世宗宣武皇帝諱恪孝文皇帝第二子也母曰高夫人初夣為日所逐避於牀下日化為龍繞已數匝寤而驚悸遂有娠太和七年閏四月生帝於平城宫二十一年正月丙申立為皇太子二十三年四月丙午孝文帝崩丁巳太子即皇帝位諒闇委政宰輔五月高麗國遣使朝貢六月乙邜分遣侍臣廵行州郡問民疾苦考察守令黜陟幽明襃禮名賢戊辰追尊皇妣曰文昭皇后秋八月戊申遵遺詔孝文皇帝三夫人已下悉免歸家癸丑増宫臣位一級冬十月癸未鄧至國王象舒彭來朝丙戍謁長陵丁酉享太廟十一月幽州人王惠定聚衆反自稱明法皇帝刺史李肅捕斬之是歳州鎮十八水饑分遣使者開倉振恤景明元年春正月辛丑朔日有蝕之壬寅謁長陵乙巳大赦改元丁未齊豫州刺史裴叔業以夀春内屬二月戊戍復以彭城王勰為司徒齊將胡松李居士軍屯宛陳伯之水軍逼夀春夏四月丙申司徒彭城王勰車騎將軍王肅大破之己亥皇弟恌薨五月甲寅北鎮饑遣兼侍中楊播廵撫振恤六月丙子以司徒彭城王勰為大司馬秋七月己亥朔日有蝕之齊將陳伯之冦淮南八月乙酉彭城王勰破伯之於肥口九月齊州人桞世明聚衆反冬十月丁邜朔謁長陵庚寅齊兖二州討世明平之丁亥改授彭城王勰司徒録尚書事十一月丁巳陽平王賾薨是歳州鎮十七大饑分遣使者開倉振恤高麗吐谷渾等國並遣使朝貢二年春正月丙申朔謁長陵庚戌帝始親政遵遺詔聽司徒彭城王勰以老歸第進太尉咸陽王禧位太保以司空北海王詳為大將軍錄尚書事丁巳引見羣臣於太極前殿告以覽政之意壬戍以太保咸陽王禧領太尉以大將軍廣陵王羽為司空分遣大使黜陟幽明二月庚午進宿衛之官位一級甲戍大赦三月乙邜朔詔以比年連有軍旅正調之外皆蠲罷壬戍青齊徐兖四州大饑人死者萬餘口是月齊雍州刺史蕭衍奉其南康王寶融為主東赴建鄴夏五月壬子廣陵王羽薨壬戍太保咸陽王禧謀反賜死六月丁亥考諸州刺史加以黜陟秋七月癸巳朔日有蝕之乙巳蠕蠕犯塞辛酉大赦九月丁酉發畿内夫五萬五千人築京師三百二十坊四旬罷己亥立皇后于氏乙邜免夀春營户並𨽻揚州冬十一月丙申以驃騎大將軍穆亮為司空丁酉以大將軍北海王詳為太傅領司徒壬寅改築圜丘於伊水之陽乙邜仍有事焉十二月齊直後張齊殺其主蕭寶卷以降蕭衍是嵗高麗吐谷渾等國並遣使朝貢三年春二月戊寅以旱故詔州郡掩骸骨三月齊建安王寶夤來奔夏四月詔撫軍將軍李崇討魯陽反蠻齊主蕭寶融遜位於梁閏四月丁巳司空穆亮薨秋七月丁巳朔日有蝕之八月丁邜以前太傅平陽公元丕為三老九月丁巳行幸鄴丁邜詔使者弔比干墓戊寅閲武於鄴南冬十月庚子帝躬御弧矢射逺及一里五十步羣臣勒銘於射所甲辰車駕還宫十二月壬寅以太極前殿初成饗羣臣賜布帛有差是歳河州大饑死者二千餘口西域二十七國並遣使朝貢四年春正月乙亥親耕籍田三月己巳皇后先蠶於北郊四月癸未朔以蕭寶夤為東揚州刺史封丹陽郡公齊王庚寅南天竺國獻辟支佛牙戊戌為旱故命鞫寃獄己亥減膳徹懸辛丑澍雨大洽五月甲戌行梁州事楊椿大破反氐六月壬午朔封皇弟悦為汝南王秋七月乙邜三老平陽公元丕薨庚午詔復收鹽池利辛未以彭城王勰為太師八月勿吉國貢楛矢冬十一月己未封武興國世子楊紹先為武興王正始元年春正月丙寅大赦改元夏五月丁未朔太傅北海王詳以罪廢為庶人六月以旱故徹樂減膳癸巳詔有司修案舊典祗行六事甲午帝以旱故親薦享於太廟戊戍詔立周旦夷齊廟於首陽山庚子以旱故公卿以下引咎責躬又録京師見囚殊死以下皆減一等鞭杖之坐悉原之秋七月丙子假鎮南將軍李崇大破諸蠻八月丙子假鎮南將軍元英破梁將馬仙琕於義陽詔洛陽令有大事聽面敷奏乙酉元英攻㧞義陽辛邜英又大破梁軍仍清三關丁酉封英為中山王九月詔諸州蠲停徭役不得横有徴發蠕蠕犯塞詔左僕射源懐討之冬十月乙未詔斷羣臣白衣募吏十一月戊午詔有司依漢魏舊章營繕國學十二月丙子以苑牧公田分賜代遷戸己邜詔羣臣議定律令閏月癸邜朔行梁州事夏侯道遷據漢中來降乙丑以高陽王雍為司空是歳高麗遣使來朝貢二年春正月丙子封宕昌世子梁彌博為宕昌王二月梁州氐蜀反絶漢中運路州刺史邢巒頻大破之夏四月己未城陽王鸞薨乙丑詔曰中正所銓但為門第吏部彛倫仍不才舉八坐可審議往代擢賢之體必令才學並申資望兼致邢巒遣統軍王足西伐頻破梁諸軍遂入劍閣秋七月戊子王足撃破梁軍因逼涪城八月壬寅詔中山王英南討襄沔冬十一月戊辰朔武興王楊紹先叔父集起謀反詔光祿大夫楊椿討之王足圍涪城益州諸郡戌降者十二三送編籍者五萬餘戸既而足引軍退是歳鄧至國遣使朝貢三年春正月丁邜朔皇子昌生大赦壬申梁秦二州刺史邢巒連破氐賊尅武興秦州人王智等聚衆自號王公尋推秦州主簿吕茍兒為主年號建明己邜楊集起兄弟相率降二月丙辰詔求讜言戊午詔右衛將軍元麗等討吕茍兒三月己巳以戎旅興詔停諸作己邜樂良王長命坐殺人賜死庚寅平南將軍曲江縣公陳伯之自梁城南奔夏四月丁未詔罷鹽池禁五月丙寅詔以時澤未降春稼已旱或有孤老餧疾無人贍救因以致死暴露溝塹者令洛陽部尉依法棺埋秋七月庚辰元麗大破秦賊降吕茍兒及其王公三十餘人秦涇二州平戊子中山王英大破梁徐州刺史王伯敖於隂陵己丑詔發定冀瀛相并肆六州卒十萬以濟南軍八月壬寅安東將軍邢巒破梁將桓和於孤山諸將所在尅㨗兖州平壬戍曲赦涇秦岐涼河五州九月癸酉邢巒大破梁軍於淮南遂攻鍾離冬十一月甲子帝為京兆王愉清河王懌廣平王懐汝南王悦講孝經於式乾殿是嵗高麗蠕蠕國並遣使朝貢四年夏四月戊戍鍾離大水中山王英敗績而還六月己丑朔詔有司凖前式置國子立太學樹小學於四門秋八月己亥中山王英齊王蕭寶夤坐鍾離敗除名辛丑敦煌大饑詔開倉振恤九月己未詔以徙正宫極庸績未酬以司空高陽王雍為太尉尚書令廣陽王嘉為司空百官悉進位一級庚申夏州長史曹明謀反伏誅甲子開斜谷舊道丙戍司州民饑詔開倉振恤閏月甲午禁太司馬門不得車馬出入冬十月丁邜皇后于氏崩自碣石至於劍閣東西七千里置二十二都尉是歳西域東夷四十餘國並遣使朝貢永平元年春三月戊子皇子昌薨丙午以去年旱儉遣使者所在振恤夏五月辛邜帝以旱故減膳徹懸六月壬申詔依洛陽舊圗修聽訟觀秋七月甲午立夫人高氏為皇后八月壬子朔日有蝕之癸亥冀州刺史京兆王愉據州反丁邜大赦改元九月丙戍復前中山王英本封戊戍殺太師彭城王勰癸邜假鎮北將軍李平尅信都冀州平冬十月豫州彭城人白早生殺刺史司馬悦據城南叛十二月己未尚書邢巒尅懸瓠斬早生禽梁將齊茍兒等是歳北狄東夷西域十八國並遣使朝貢高昌國王麴嘉表求内徙二年春正月涇州沙門劉慧汪聚衆反詔華州刺史奚康生討之夏四月己酉武川鎮饑詔開倉振恤甲子詔縁邊州鎮自今一不聽冦盜境外犯者罪同境内五月辛丑帝以旱故減膳徹懸禁斷屠殺甲辰幸華林都亭録囚徒死罪以下降一等六月辛亥詔曰江海方同車書宜一諸州軌轍南北不等今可申勑四方逺近無二秋八月丙午朔日有蝕之戊申以鄧至國世子像覽蹄為其國王九月辛巳封故北海王子顥為北海王壬午詔定諸門闥名冬十月癸丑以司空廣陽王嘉為司徒庚午郢州獻七寶牀詔不納冬十月甲申詔禁屠殺含孕以為永制己丑帝於式乾殿為諸僧朝臣講維摩詰經十二月詔五等諸侯其同姓者出身公正六下侯從六上伯從六下子正七上男正七下異族出身公從七上侯從七下伯正八上子正八下男從八上清修出身公從八下侯正九上伯正九下子從九上男從九下是歳西域東夷二十四國並遣使朝貢三年春二月壬子秦州沙門劉光秀謀反州郡捕斬之癸亥秦州隴西羌殺鎮將趙雋反州軍討平之三月丙戍皇子詡生大赦夏四月平陽郡之禽昌襄陵二縣大疫自正月至此月死者二千七百三十人五月丁亥冀定二州旱儉詔開倉振恤六月甲寅詔重求遺書於天下冬十月辛夘中山王英薨丙申詔太常立館使京畿内外疾病之徒咸令居處嚴勑醫署分師救療考其能否而行賞罸又令有司集諸醫工惟簡精要取三十卷以班九服十二月辛巳江陽王繼坐事除名甲申詔於青州立孝文皇帝廟殿中侍御史王敞謀反伏誅是歳西域東夷北狄十六國並遣使朝貢四年春正月丁巳汾州劉龍駒聚衆反詔諫議大夫薛和討之二月壬午青齊徐兖四州民饑甚遣使振恤三月壬戍司徒廣陽王嘉薨夏四月梁遣其鎮北將軍張稷及馬仙琕冦朐山詔徐州刺史盧昶率衆赴之五月己亥遷代京銅龍置天泉池西丙辰詔禁天文學冬十一月朐山城陷盧昶大敗而還十二月壬戍朔日有蝕之是歳西域東夷北狄二十九國並遣使朝貢延昌元年春正月乙巳以頻年水旱百姓饑斃分遣使者開倉振恤丙辰以尚書令高肇為司徒清河王懌為司空三月甲午州郡十一大水詔開倉振恤以京師榖貴出倉粟八十萬石以振恤貧者己未安樂王詮薨夏四月詔以旱故斷食粟之畜丁卯詔曰遷京嵩縣年將二紀博士端然虚祿靖言念之有兼愧慨可嚴勑有司國子學孟冬使成太學四門明年暮春令就戊辰以旱故詔尚書與羣司鞫理獄訟辛未詔饑民就榖六鎮丁丑帝以旱故減膳徹懸癸未詔曰肆州地震陷裂死傷甚多亡者不可復追生病宜加療救可遣太醫折傷者并給所須藥就療乙酉大赦改元詔立理訴殿申訟車以盡寃窮之理五月丙午詔天下有粟之家供年之外悉貸饑民自二月不雨至於是月己未晦日有蝕之六月壬申澍雨大洽戊寅通河南牝馬之禁庚辰詔出太倉粟五十萬石以振京師及州郡饑民冬十月乙亥立皇子詡為皇太子十一月丙申詔以東宫建賜天下為父後者爵一級孝子順孫廉夫節婦旌表門閭量給粟帛十二月己巳詔守宰為御史彈赦免者及考在中第皆代之是歳西域東夷十國並遣使朝貢二年春正月戊戍帝御申訟車親理寃訟二月丙辰朔振恤京師貧人甲戍以六鎭大饑開倉拯贍己卯進太尉高陽王雍位太保閏月辛丑以苑牧地賜代遷人無田者是春民饑死者數萬口夏四月庚子以絹十五萬疋振河南郡人五月甲寅朔日有蝕之是月夀春大水遣平東將軍奚康生等歩騎數千赴之六月乙酉青州民饑詔使者開倉振恤甲午曲赦揚州辛亥帝御申訟車親理寃訟是夏十三郡大水秋八月辛卯詔以水旱饑儉百姓多陷罪辜降死以下刑九月丙辰以貴族豪門崇習奢侈詔尚書嚴立限級節其流宕冬十月詔以恒肆地震民多死傷重丐一年租賦十二月丙戍丐洛陽河隂二縣租賦乙巳詔以恒肆地震民多離災其有課丁没盡老㓜單立家無受復者各賜廩粟以接歳稔是歳東夷西域十餘國並遣使朝貢三年春二月乙未詔曰肆州秀容郡敷城縣鴈門郡原平縣並自去年四月以來山鳴地震于今不已告譴彰咎朕甚懼焉可恤瘼寛刑以答災譴夏四月青州民饑辛巳開倉振恤乙巳上御申訟車親理寃訟秋八月甲申帝臨朝堂考百司而加黜陟冬十一月辛亥詔司徒高肇為大將軍平蜀大都督歩騎十五萬西伐益州丁巳幽州沙門劉僧紹聚衆反自號淨居國明法王州郡捕斬之十二月庚寅詔立明堂是歳東夷西域八國並遣使朝貢四年春正月甲寅帝不豫丁巳崩于式乾殿時年三十三二月甲戍朔上尊諡曰宣武皇帝廟號世宗甲午𦵏景陵帝㓜有大度喜怒不形於色雅性儉素初孝文欲觀諸子志尚大陳寶物任其所取京兆王愉等皆競取珍玩帝唯取骨如意而已孝文大竒之及庶人恂失徳孝文謂彭城王勰曰吾固疑此兒有非常志相今果然矣乃見立為儲貳雅愛經史尤長釋氏之義每至講論連夜忘疲善風儀美容貌臨朝淵黙端嚴若神有人君之量矣宣武帝景明正始永平延昌各四年即位凡一十六年肅宗孝明皇帝諱詡宣武皇帝之第二子也母曰胡充華永平三年三月丙戍生於宣光殿之東北有光照於庭中延昌元年十月乙亥立為皇太子四年正月丁巳宣武帝崩是夜太子即皇帝位戊午大赦己未徵下西討東防諸軍庚申詔大保髙陽王雍入居西栢堂决庶政以任城王澄為尚書令百官總已以聽二王二月庚辰尊皇后髙氏為皇太后辛巳司徒髙肇至京師以罪賜死癸未進太保髙陽王雍位太傅領太尉以司空清河王懌為司徒以驃騎大將軍廣平王懐為司空乙亥尊胡充華為皇太妃三月甲辰朔皇太后出俗為尼徙御金墉城丙辰詔進宫臣位一級乙丑進文武羣官位一級夏六月沙門法慶聚衆反於冀州殺阜城令自稱大乗秋八月乙亥領軍于忠矯詔殺左僕射郭祚尚書裴植免太傅高陽王雍官以王還第丙子尊皇太妃為皇太后戊子帝朝太后於宣光殿大赦己丑進司徒清河王懌為太傅領太尉以司空廣平王懐為太保領司徒任城王澄為司空庚寅以車騎大將軍于忠為尚書令特進崔光為車騎大將軍並儀同三司壬辰復江陽王繼本國復濟南王彧先封為臨淮王羣臣奏請皇太后臨朝稱制九月乙巳皇太后親覽萬機甲寅征西大將軍元遥破斬法慶𫝊首京師安定王爕薨冬十二月辛丑以高陽王雍為太師己酉鎮南將軍崔亮破梁將趙祖悦軍遂圍硤石丁卯帝皇太后謁景陵是歳東夷西域北狄十八國並遣使朝貢熈平元年春正月戊辰朔大赦改元荆沔都督元志大破梁軍以吏部尚書李平為行臺節度討硤石諸軍二月乙巳鎮東將軍蕭寶夤大破梁將於淮北癸亥初聽秀才對䇿第中上已上叙之乙丑鎮南崔亮鎮軍李平等剋硤石斬趙祖悦𫝊首京師盡俘其衆三月戊辰朔日有蝕之夏四月戊戍以瀛洲民饑開倉振恤五月丁卯朔以炎旱命釐察獄訟權停作役庚午詔放華林野獸於山澤秋七月庚午重申殺牛禁八月丙午詔古帝諸陵四面各五十步勿聽耕稼九月丁丑淮堰破梁緣淮城戍村落十餘萬口皆漂入海是歳吐谷渾宕昌鄧至高昌隂平等國並遣使朝貢二年春正月大乗餘賊復相聚攻瀛洲刺史宇文福討平之甲戍大赦庚寅詔遣大使廵行四方問疾苦恤孤寡黜陟幽明二月丁未封御史中尉元匡為東平王三月丁亥太保領司徒廣平王懐薨夏四月丁酉詔京尹所統年高者版賜郡縣各有差戊申以開府儀同三司胡國珍為司徒乙卯皇太后幸伊闕石窟寺即日還宫改封安定王超為北平王五月庚辰重申天文禁犯者以大辟論秋七月乙亥儀同三司汝南王悦坐殺人免官以王還第己巳享太廟八月戊戍宴道武以來宗室年十五以上於顯陽殿申家人禮己亥詔庶族子弟年未十五不聽入仕庚子詔咸陽京兆二王子女皆附屬籍丁未詔太師高陽王雍入居門下參決尚書奏事冬十月以幽冀滄瀛光五州饑遣使廵撫開倉振恤是歳東夷西域氐羌等十一國並遣使朝貢神龜元年春正月甲子詔以氐酋楊定為隂平王壬申詔給京畿及諸州老人版郡縣各有差及賜鰥寡孤獨粟帛庚辰詔以雜役戸或冐入清流所在職人皆令五人相保無人任保者奪官還役乙酉秦州羌及幽州大饑死者三千七百九十人詔刺史開倉振恤二月乙酉詔以神龜表瑞大赦改元東益州氐反三月南秦州氐反夏四月丁酉司徒胡國珍薨甲辰改封江陽王繼為京兆王六月自正月不雨是月辛卯澍雨乃降秋七月河州人却鐡怱聚衆反自稱水池王閠月甲辰開恒州銀山禁八月癸丑朔詔京師見囚殊死以下悉減一等甲子却鐡怱詣行臺源子㳟降九月戊申皇太后高氏崩于瑶光寺冬十月丁卯以尼禮𦵏高太后於芒山十二月辛未詔曰人生有終下歸兆域京邑隠振口盈億萬貴賤攸憑未有定所今制乾脯山以西擬為九原是歳東夷西域北狄十一國並遣使朝貢二年春正月辛巳朔日有蝕之丁巳詔曰皇太后撝挹自居稱號弗備宜遵舊典稱詔宇内以副黎烝元元之望是月改𦵏文昭皇太后高氏二月乙丑齊郡王祐薨庚午羽林千餘人焚征西將軍張彝第歐傷彝燒殺其子均乙亥大赦丁丑詔求直言壬寅詔以旱故命依舊雩祈察理寃獄掩胔埋骼振窮恤寡三月甲辰澍雨大洽夏五月戊戍以司空任城王澄為司徒京兆王繼為司空秋八月乙未御史中尉東平王匡坐事削除官爵九月庚寅皇太后幸嵩高山癸巳還宫冬十二月癸丑司徒任城王澄薨庚申大赦詔除滛祀焚諸雜神是歳吐谷渾宕昌嚈噠等國並遣使朝貢正光元年春正月乙亥朔日有蝕之夏四月丙辰詔尚書長孫承業廵撫北蕃觀察風俗五月辛巳以炎旱故詔八坐鞫見囚申枉濫秋七月丙子侍中元义中常侍劉騰奉帝幸前殿矯皇太后詔歸政遜位乃幽皇太后北宫殺太傅清河王懌總勒禁旅決事殿中辛卯帝加元服大赦改元内外百官進位一等八月甲寅相州刺史中山王熙舉兵欲誅騰不果見殺九月壬辰蠕蠕王阿那瓌來奔戊戍以太師高陽王雍為丞相冬十月乙卯以儀同三司汝南王悦為太尉十一月己亥封阿那瓌為朔方郡公蠕蠕王十二月壬子詔送蠕蠕王阿那瓌歸北辛酉以司空京兆王繼為司徒二年春正月南秦州氐反二月車駕幸國子學祠孔子以顔回配甲午右衛將軍奚康生於禁中將殺元义不果為义所害以儀同三司劉騰為司空夏四月庚子進司徒京兆王繼位太保壬寅以儀同三司崔光為司徒五月丁酉朔日有蝕之秋七月己丑以旱故詔有司脩案舊典祗行六事八月己巳蠕蠕後主郁久閭侯匿伐來奔懐朔鎮十二月甲戍詔司徒崔光安豐王延明等議定服章庚辰以東益南秦州氐反詔河間王琛討之失利是歳焉耆居密波斯高昌勿吉伏羅高車等國並遣使朝貢三年春正月辛亥耕籍田夏四月庚辰以高車國主覆羅伊匐為鎮西將軍西海郡公高車國王五月壬辰朔日有蝕之六月己巳以旱故詔分遣有司馳祈岳瀆及諸山川百神能興雲雨者命理寃獄止土功減膳徹懸禁止屠殺冬十一月己丑朔日有蝕之乙巳祀圓丘丙午詔班歴大赦十二月癸酉以太保京兆王繼為太傅司徒崔光為太保是歳波斯不溪龜兹吐谷渾並遣使朝貢四年春二月壬申追封故咸陽王禧為敷城王京兆王愉為臨洮王清河王懌為范陽王以禮加葬丁丑河間王琛章武王融並以貪汙削爵除名己卯蠕蠕主阿那瓌率衆犯塞遣尚書左丞元孚為北道行臺持節喻之蠕蠕後主郁久閭侯匿伐來朝司空劉騰薨夏四月阿那瓌執元孚北遁秋八月癸未追復故范陽王懌為河間王九月丁酉詔太尉汝南王悦入居門下與丞相高陽王雍參決尚書奏事冬十一月癸未朔日有蝕之丙申趙郡王謐薨十二月以太尉汝南王悦為太保徐州刺史北海王顥坐貪汙削爵除官是歳宕昌庫莫奚國並遣使朝貢五年春正月辛丑祀南郊三月沃野鎮人破六韓拔陵反聚衆殺鎮將號眞王元年夏四月高平酋長胡琛反自稱高平王攻鎮以應拔陵别將盧祖遷撃破之五月都督北征諸軍事臨淮王彧攻討敗於五原削除官爵壬申詔尚書令李崇為大都督率廣陽王琛等北討六月秦州城人莫折大提據城反自稱秦王殺刺史李彦大提尋死子念生代立僭稱天子年號天建置立百官丁酉大赦秋七月戊午復河間王琛臨淮王彧本封是月涼州幢帥于菩提呼延雄執刺史宋頴據州反念生遣其兄高陽王天生下隴東冦八月甲午雍州刺史元志西討大敗於隴東退守岐州丙申詔諸州鎮軍元非犯配者悉免為編戸改鎮為州依舊名稱九月壬申詔尚書左僕射齊王蕭寶夤為西道行臺大都督復撫軍北海王顥官爵為都督並率諸將西討乙亥帝幸明堂餞寳夤等吐谷渾主伏連籌遣兵討涼州于菩提走追斬之城人趙天安復推宋頴為刺史冬十月營州城人劉安定就徳興據城反執刺史李仲遵城人王惡兒斬安定以降徳興東走自號燕王十二月詔太傅京兆王繼為太師大將軍率諸將西討汾州正平平陽胡叛逆詔復征東將軍章武王融封爵為大都督率衆討之莫折念生遣兵攻涼州城人趙天安復執刺史以應之是歳嚈噠契丹地豆干庫莫奚等國並遣使朝貢孝昌元年春正月庚申徐州刺史元法僧據城反自稱宋王年號天啟遣其子景仲歸梁梁遣其將豫章王綜入守彭城法僧擁其僚屬南入詔臨淮王彧尚書李憲為都督安豐王延明為東道行臺俱討徐州癸亥蕭寳夤及征西將軍崔延伯大破賊於黑水天生退走入隴涇岐及隴悉平以太師大將軍京兆王繼為太尉二月詔追復故樂良王長命爵以其子忠紹之戊戍大赦三月甲戍詔五品以上各薦所知夏四月辛卯皇太后復臨朝攝政引羣臣面陳得失壬辰征西將軍都督崔延伯大敗於涇川戰殁六月癸未大赦改元蠕蠕主阿那瓌大破拔陵是月諸將逼彭城蕭綜夜潛出降梁諸將奔退衆軍追躡免者十一二秋八月癸酉詔斷逺近貢獻珍麗違者免官柔元鎮人杜洛周反於上谷年號真王九月乙卯詔減天下諸調之半壬戍詔五品以上各舉所知辛未曲赦南北秦州冬十月蠕蠕遣使朝貢十一月辛亥詔父母年八十以上者皆聽居官時四方多事諸蠻復反十二月山胡劉蠡升反自稱天子二年春正月庚戍封廣平王懐長子誨為范陽王壬子以太保汝南王悦領太尉是月五原鮮于脩禮反於定州年號魯興二月庚申帝及皇太后臨大夏門親覽寃訟三月庚子追復中山王熙本爵以其子叔仁紹之夏四月大赦戊申北討都督河間王琛長孫承業失利還詔並免官爵五月丁未車駕將北討内外戒嚴前給事黄門侍郎元略自梁還朝封義陽王以丞相高陽王雍為大司馬六月己巳曲赦齊州絳蜀陳雙熾聚衆反自號始建王曲赦平陽建興正平三郡詔假鎮西將軍都督長孫承業討雙熾平之丙子改封義陽王略為東平王戊寅詔復京兆王繼本封江陽王戊子詔曰自運屬艱棘歴載於兹朕威徳不能遐被經略無以及逺何以茍安黄屋無愧黔黎今便避居正殿蔬飱素服當親自招募收集忠勇其有直言正諌之士敢决狥義之夫二十五日悉集華林東門人别引見共論得失秋八月丙子進封廣川縣公元邵為常山王戊子進武城縣公子攸為長樂王癸巳賊帥元洪業斬鮮于脩禮請降為賊黨葛榮所殺九月辛亥葛榮敗都督廣陽王琛章武王融於博野白牛邏融殁於陳榮自稱天子國號齊年稱廣安冬十一月戊戍杜洛周攻䧟幽州執刺史王延年及行臺常景丙午税京師田租畆五升借賃公田者畝一斗閏月税市人出入者各一錢店舎為五等梁將元樹逼夀春揚州刺史李憲力屈而降初留州縣及長史司馬戍主副質子於京師詔頃舊京淪覆中原喪亂宗室子女屬籍在七廟内為雜戸濫門拘辱者悉聽離絶是歳疊伏羅庫國並遣使朝貢三年春正月甲戍以司空皇甫度為司徒儀同三司蕭寳夤為司空辛巳葛榮䧟殷州刺史崔楷固節死之甲申詔峻鑄錢之制蕭寳夤大敗于涇州北海王顥尋亦敗走曲赦關西及正平平陽建興戊子以司徒皇甫度為太尉己丑以四方未平詔内外戒嚴將親征二月丁酉詔開輸賞格輸粟入瀛定岐雍四州者官斗二百斛賞一階入二華州者五百石賞一階不限多少粟畢授官虜賊據潼關三月甲子詔將西討中外戒嚴虜賊走復潼關秋七月相州刺史安樂王鑒據州反己丑大赦八月都督源子邕李神軌裴衍攻鄴丁未斬鑒相州平九月己未東豫州刺史元慶和以城南叛秦州城人杜粲殺莫折念生自行州事冬十月戊申曲赦恒農巴西河北正平平陽邵郡及關西諸州軍甲寅雍州刺史蕭寳夤據州反自號齊年稱隆緒十一月己丑葛榮攻䧟冀州執刺史元孚逐出居人凍死者十六七十二月戊申都督源子邕裴衍與榮戰敗於陽平東北並殁是月杜粲為駱超所殺超遣使歸罪是歳蠕蠕遣使朝貢武泰元年春正月乙丑生皇女祕言皇子丙寅大赦改元丁丑雍州人侯終徳相率攻蕭寳夤寳夤度渭走雍州平二月癸丑帝崩於顯陽殿時年十九甲寅皇子即位大赦皇太后詔曰皇家握歴受圖年將二百祖宗累聖社稷載安高祖以文思先天世宗以下武繼世大行在御重以寛仁奉養率由温明㳟順實望穹靈降祐麟趾衆䌓自潘充華有孕椒宫冀誕儲貳而熊羆無兆唯虺遂彰于時直以國歩未康假稱統允欲底定物情係仰宸極何圖一旦弓劒莫追皇曽孫故臨洮王寳暉世子釗體自高祖天表卓異大行平日養愛特深義齊若子事符當璧允膺大寶即日踐阼可班宣逺邇咸使知之乙卯㓜主即位儀同三司大都督爾朱榮抗表請入奔赴勒兵而南是月杜洛周為葛榮所并三月甲申上尊諡曰孝明皇帝乙酉𦵏於定陵廟號肅宗四月戊戍爾朱榮濟河庚子皇太后㓜主崩孝明帝熙平神龜各二年正光五年孝昌三年武泰元年即位十三年敬宗孝莊皇帝諱子攸彭城王勰之第三子也母曰李妃明帝初以勰有魯陽翼衛之勲封帝武城縣公㓜侍明帝書於禁中及長風神秀慧姿貌甚美雅為明帝親待孝昌二年八月進封長樂王歴位侍中中軍將軍以兄彭城王劭事轉為衛將軍左光祿大夫中書監寔見出也武泰元年二月明帝崩大都督爾朱榮謀廢立以帝家有忠勲且兼人望陰與帝通率衆來赴帝與兄弟夜北度河㑹榮於河陽永安元年夏四月戊戍帝南濟河即皇帝位以皇兄彭城王邵為無上王皇弟霸城公子正為始平王以爾朱榮為使持節侍中都督中外諸軍事大將軍尚書令領軍將軍領左右封太原王己亥百僚相率有司奉璽綬備法