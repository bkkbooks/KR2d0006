黄門侍郎帝以元擅權託稱瘖病絶言垂一紀居於龍華佛寺無所交通永安末有白莊帝言帝不語將有異圖人間遊聲又云常有天子氣帝懼禍遂逃匿上洛尋見追躡送京師拘禁多日以無狀獲免及莊帝崩爾朱世隆等以元曄踈逺又非人望所推以帝有過人之量將謀廢立恐實不語乃令帝所親申意兼迫脅帝帝曰天何言哉世隆等大悦及元曄至邙南世隆等奉帝東郭外行禪讓禮太尉爾朱度律奉路車進璽綬服衮冕百官侍衛入自建春雲龍門普泰元年春二月己巳皇帝即位於太極前殿羣臣拜賀禮畢遂登閶闔門大赦以魏為大魏改建明二年為普泰元年罷税市及税鹽之官庚午詔曰自秦之末競為皇帝忘負乗之深殃垂貪鄙於萬葉予今稱帝已為襃矣可普告令知是月鎮逺將軍清河崔祖螭聚青州七郡之衆圍東陽幽州刺史劉靈助起兵於薊河北大使髙乾及其弟昂夜襲冀州執刺史元嶷共推前河内太守封隆之行州事三月癸酉封長廣王曄為東海王以青州刺史魯郡王肅為太師沛郡王欣為太傅司州牧改封淮陽王以徐州刺史彭城王爾朱仲逺雍州刺史隴西王爾朱天光並為大將軍以柱國大將軍并州刺史潁川王爾朱兆為天柱大將軍封晉州刺史平陽郡公髙歡為勃海王以特進清河王亶為太傅以尚書令樂平王爾朱世隆為太保以趙郡王諶為司空丙申定州刺史侯深破劉靈助於安國城斬之𫝊首京師夏四月壬子享太廟癸亥隴西王爾朱天光破宿勒明達禽送京師斬之丙寅以侍中爾朱彦伯為司徒詔有司不得復稱偽梁罷細作之條無禁隣國還往五月丙子爾朱仲逺使其都督魏僧朂等討崔祖螭於東陽斬之六月己亥朔日有蝕之庚申勃海王髙歡起兵信都以誅爾朱氏為名秋七月壬申爾朱世隆等害前太保楊愔前司空楊津丙戍司徒爾朱彦伯以旱遜位九月以彭城王爾朱仲逺為太宰庚辰以隴西王爾朱天光為大司馬癸巳追尊皇考為先帝皇妣王氏為先太妃封皇弟永業為髙密王皇子子恕為勃海王冬十月壬寅髙歡推勃海太守元朗即皇帝位於信都二年春閏三月髙歡敗爾朱天光等於韓陵夏四月辛巳髙歡與廢帝至邙山使魏蘭根慰喻洛邑且觀帝之為人蘭根忌帝雅徳還致毁謗竟從崔㥄議廢帝於崇訓佛寺而立平陽王脩是為孝武帝帝既失位乃賦詩曰朱門久可患紫極非情翫顛覆立可待一年三易換時運正如此唯有脩真觀五月丙申帝遇弑殂於門下外省時年三十五孝武帝詔百司赴會𦵏用王禮加九旒鑾輅黄屋左纛班劒百二十人後西魏追諡節閔皇帝節閔帝普泰二年廢帝安定王諱朗字仲哲章武王融第三子也母曰程氏帝少稱明悟元曄建明二年正月戊子為勃海太守普泰元年十月勃海王髙歡奉帝以主號令中興元年冬十月壬寅皇帝即位於信都西大赦改普泰元年為中興以勃海王髙歡為丞相都督中外諸軍事以河北大使髙乾為司空辛亥髙歡大破爾朱兆於廣阿十一月梁將元樹入據譙城二年春二月甲子以勃海王髙歡為大丞相柱國大將軍太師及歡敗爾朱氏於韓陵四月辛巳帝於河陽遜位於别邸五月孝武封帝為安定郡王十一月殂於門下外省時年二十永熙二年葬於鄴西南野馬崗安定王中興二年孝武皇帝諱脩字孝則廣平武穆王懐之第三子也母曰李氏帝性沈厚學渉好武事遍體有鱗文年十八封汝陽縣公夢人有從諱謂已曰汝當大貴得二十五年永安三年封平陽王普泰中為侍中尚書左僕射中興二年髙歡既敗爾朱氏廢帝自以疎逺請遜大位歡乃與百寮議以孝文不可無後時召汝南王悦於梁至將立之宿昔而止又諸王皆逃匿帝在田舍先是嵩山道士潘彌望見洛陽城西有天子氣候之乃帝也於是造第密言之居五旬而髙歡使斛斯椿求帝椿從帝所親王思政見帝帝變色曰非賣我邪椿遂以白歡歡遣四百騎奉迎帝入氈帳陳誠泣下霑襟讓以寡徳歡再拜帝亦拜歡出備服御進湯沐達夜嚴警昧爽文武執鞭以朝使斛斯椿奉勸進表椿入帷門罄折延首而不敢前帝令思政取表曰視此便不得不稱朕矣於是假廢帝安定王詔策而禪位焉即位于東郭之外用代都舊制以黒氈䝉七人歡居其一帝於氈上西向拜天訖自東陽雲龍門入永熙元年夏四月戊子皇帝御太極前殿羣臣朝賀禮畢升閶闔門大赦改中興二年為太昌元年壬辰髙歡還鄴五月丙申節閔帝殂以太傅淮陽王欣為太師改封沛郡王以司徒趙郡王諶為太保以司空南陽王寳炬為太尉以太保長孫承業為太傅辛丑復前司空髙乾位己酉以儀同三司清河王亶為司徒乙卯内外解嚴六月癸亥朔帝於華林園納訟丁卯南陽王寶炬坐事降為驃騎大將軍開府以王歸第己卯臨顯陽殿納訟丙戊詔曰間者凶權誕恣法令變常遂立夷貊輕賦冀收天下之意隨以箕歛之重終納十倍之征掩目捕雀何能過此今歳租調且兩收一丐明年復舊秋七月庚子以南陽王寶炬為太尉乙卯帝臨顯陽殿親理寃獄是月東南道大行臺樊子鵠大破梁軍於譙城禽其將元樹八月丁卯封西中郎將元寧為髙平王九月癸卯進燕郡公賀拔允爵為王癸丑改封沛郡王欣為廣陵王節閔帝子勃海王子恕為沛郡王冬十月辛酉朔日有蝕之十一月丁酉祀圜丘甲辰殺安定王朗及東海王曄己酉以汝南王悦為侍中大司馬開府𦵏太后胡氏十二月丁亥殺大司馬汝南王悦大赦改元為永興以同明元時年號尋改為永熈是歳蠕蠕嚈噠髙麗契丹庫莫奚髙昌等國並遣使朝貢二年春正月庚寅朔朝饗羣臣于太極前殿丁酉勃海王髙歡大敗爾朱氏山東平罷諸行臺丁巳追尊皇考為武穆皇帝太妃馮氏為武穆皇后皇妣李氏曰皇太妃二月以咸陽王坦為司空三月甲午太師魯郡王肅薨丁巳以太保趙郡王諶為太尉以太尉南陽王寶炬為尚書令太保開府是月阿至羅十萬戸内附詔復以勃海王髙歡為大行臺隨機裁處夏四月己未朔日有蝕之秋七月壬辰以太師廣陵王欣為大司馬以太尉趙郡王諶為太師並開府庚戍以前司徒燕郡王賀拔允為太尉冬十月癸未以衛將軍𤓰州刺史泰臨縣伯髙昌王趙子堅為儀同三司進爵郡公十二月丁巳狩於嵩陽士卒寒苦己巳遂幸温湯丁丑還宫三年春二月壬戍大赦壬午封左衛將軍元斌之為潁川王夏四月癸丑朔日有蝕之辛未髙平王寧坐事降爵為公五月丙戍置勲府庶子箱别六百人騎官箱别二百人閤内部曲數千人帝内圖髙歡乃以斛斯椿為領軍使與王思政等統之以為心膐軍謀朝政咸決於椿分置督將及河南關西諸刺史辛卯下詔戒嚴揚聲伐梁實謀北討是夏契丹髙麗吐谷渾並遣使朝貢秋七月己丑親總六軍十餘萬次河橋髙歡引軍東度丙午帝率南陽王寶炬清河王亶廣陽王湛斛斯椿以五千騎宿瀍西廣陽王别舎沙門都維郍惠臻負璽持千牛力以從有牛百頭盡殺以食軍士衆知帝將出其夜亡者過半清河廣陽二王亦逃歸略陽公宇文泰遣都督駱超李賢和各領數百騎赴難駱超先至甲戍賢和㑹帝於崤中己酉髙歡入洛遣婁昭及河南尹元子思領左右侍官追帝請廻駕高昂率勁騎及帝於陜西帝鞭馬長騖至湖城飢渇甚有王思村人以麥飯壺漿獻帝帝甘之復一村十年是歳二月熒惑入南斗衆星北流羣䑕浮河向鄴梁武帝跣而下殿以禳星變及聞帝之西慙曰虜亦應天象乎帝至稠桑潼關大都督毛洪賔迎獻食八月宇文泰遣大都督趙貴梁禦甲騎二千來赴乃奉迎帝過河謂禦曰此水東流而朕西上若得重謁洛陽廟是卿等功也帝及左右皆流涕宇文泰迎帝於東陽帝勞之將士皆呼萬歳遂入長安以雍州公廨為宫大赦甲寅髙歡推司徒清河王亶為大司馬承制總萬機居尚書省歡追車駕至潼關九月己酉歡東還洛陽帝親督衆攻潼關斬其行臺華長瑜又剋華州其冬十月髙歡推清河王亶子善見為主徙都鄴是為東魏魏於此始分為二帝之在洛也從妹不嫁者三一曰平原公主明月南陽王同産也二曰安徳公主清河王懌女也三曰蒺䔧亦封公主帝内宴令諸婦人詠詩或詠鮑昭樂府曰朱門九重開九閨願逐明月入君懐帝既以明月入關蒺䔧自縊宇文泰使元氏諸王取明月殺之帝不悦或時彎弓或時推案君臣由此不安平閠十二月癸巳潘彌奏言今日當甚有急兵其夜帝在逍遥園宴阿至羅顧侍臣曰此處彷彿華林園使人聊増悽惋命取所乗波斯騮馬使南陽王躍之將攀鞍蹶而死帝惡之日晏還宫至後門馬驚不前鞭打入謂潘彌曰今日幸無他不彌曰過夜半則大吉須臾帝飲酒遇酖而崩時年二十五謚曰孝武殯於草堂佛寺十餘年乃𦵏雲陵始宣武孝明間謡曰狐非狐貉非貉焦梨狗子齧斷索識者以為索謂魏本索髮焦梨狗子指宇文泰俗謂之黒獺也孝武帝永熈三年文皇帝諱寶炬孝文皇帝之孫京兆王愉之子也母曰楊氏帝正始初坐父愉罪兄弟皆幽宗正寺及宣武崩乃得雪正光中拜直閤將軍時胡太后多嬖寵帝與明帝謀誅之事泄免官武泰中封邵縣侯永安三年進封南陽王孝武即位拜太尉加侍中永熙二年進位太保開府尚書令三年孝武與髙歡構難以帝為中軍四面大都督及從入關拜太宰錄尚書事孝武崩丞相略陽公宇文泰率羣公卿士奉表勸進三讓乃許焉大統元年春正月戊申皇帝即位於城西大赦改元追尊皇考為文景皇帝皇妣楊氏為皇后己酉進丞相略陽公宇文泰都督中外諸軍錄尚書事大行臺改封安定郡公以尚書令斛斯椿為太保廣平王贊為司徒乙卯立妃乙氏為皇后立皇子欽為皇太子甲子以廣陵王欣為太傅以儀同三司万俟夀樂干為司空東魏將侯景攻䧟荆州二月前南青州刺史大野拔斬兖州刺史樊子鵠以州降東魏夏五月降罪人加安定公宇文泰位柱國秋七月以開府儀同三司念賢為太尉以司空万俟夀樂干為司徒以開府儀同三司越勒肱為司空梁州刺史元羅以州降梁九月有司請煎御香澤須錢萬貫帝以軍旅在外停之冬十月太師上黨王長孫承業薨十二月以太尉念賢為太傅以河州刺史梁景叡為太尉二年春正月辛亥祀南郊改以神元皇帝配東魏攻䧟夏州二月儀同三司段敬討叛羌梁仚定平之三月以涼州刺史李叔仁為司徒以司徒万俟夀樂干為太宰夏五月司空越勒肱薨秦州刺史建中王万俟普撥及其子太宰夀樂干率所部奔東魏秋九月以扶風王孚為司空以太保斛斯椿為太傅冬十一月追改始祖神元皇帝為太祖道武皇帝為烈祖是歳關中大飢人相食死者十七八三年春二月槐里獲神璽大赦夏四月太傅斛斯椿薨五月以廣陵王欣為太宰賀拔勝為太師六月以司空扶風王孚為太保以太尉梁景叡為太傅以司徒廣平王贊為太尉以開府儀同三司王盟為司空冬十月安定公宇文泰大破東魏軍於沙苑拜泰柱國大將軍十二月司徒李叔仁自梁州通使於東魏建昌太守賀蘭植攻斬之四年春正月辛酉拜天於清暉室終帝世遂為常二月東魏攻䧟南汾潁豫廣四州廢皇后乙氏三月立蠕蠕女郁久閭氏為皇后大赦以司空王盟為司徒秋七月東魏將侯景等圍洛陽帝與安定公宇文泰東伐九月車駕至自東伐以撫軍將軍梁仚定為南洮州刺史安西蕃五年春二月赦京城内夏五月以開府儀同三司李弼為司空免妓樂雜役之徒皆從編戸秋七月詔自今恒以朔望觀閲京師見禁囚徒以司空扶風王孚為太尉冬十月於陽武門外縣鼔置紙筆以求得失六年春正月庚戍朝羣臣自西遷至此禮樂始備太尉扶風王孚薨二月鑄五銖錢降罪人冬十一月太師念賢薨七年春二月幽州刺史順陽王仲景以罪賜死三月夏州刺史劉平謀反大都督于謹討禽之秋九月詔班政事之法六條冬十一月叛羌梁仚定徒黨屯於赤水城秦州刺史獨孤信撃平之尚書奏班十二條制十二月御憑雲觀引見諸王叙家人之禮手詔為宗誡十條以賜之八年春三月初置六軍夏四月鄯善王兄鄯朱郍率衆内附秋八月以太尉王盟為太保冬十月詔皇太子鎮河東十二月行幸華州起萬夀殿於沙苑北九年春正月降罪人禁中外及從母兄弟姊妹為昏閏月車駕至自華州二月東魏北豫州刺史髙仲密據虎牢内附以仲密為侍中司徒封勃海郡公秋七月大赦以太保王盟為太傅以太尉廣平王贊為司空冬十二月以司空李弼為太尉十年春正月甲子詔公卿已下每月上封事三條極言得失刺史二千石銅墨已上有讜言嘉謀勿有所諱夏五月太師賀拔勝薨秋七月更權衡度量十一年夏五月太傅王盟薨詔諸鞫大辟獄皆命三公覆審然後加刑冬始築圜丘於城南封皇子儉十二年春二月涼州刺史宇文仲和反秦州刺史獨孤信討平之三月鑄五銖錢夏五月詔女年不滿十三以上勿得以嫁秋九月東魏勃海王髙歡攻玉壁晉州刺史韋孝寛力戰禦之冬十二月歡燒營而退十三年春正月開白渠以溉田二月詔自今應宫刑者直没官勿刑亡奴婢應黥者止科亡罪以開府儀同三司若干惠為司空東魏勃海王髙歡薨其司徒侯景據潁川率河南六州内附授景太傅河南大行臺上谷郡公三月大赦夏五月以太傅侯景為大將軍以開府儀同三司獨孤信為大司馬晉王謹薨秋七月司空若干惠薨大將軍侯景據豫州叛封皇子寧為趙王十四年春正月赦潁豫廣北洛東荆襄等七州以開府儀同三司趙貴為司空皇孫生大赦夏五月以安定公宇文泰為太師廣陵王欣為太傅太尉李弼為大宗伯前太尉趙貴為大司冦以司空于謹為大司空十五年己巳五月侯景殺梁武帝初詔諸代人太和中改姓者並令復舊六月東魏勃海王髙澄攻䧟潁川秋八月盜殺東魏勃海王髙澄冬十二月封梁雍州刺史岳陽王蕭詧為梁王十六年夏四月封皇子儒為燕王公為吳王五月東魏静帝遜位于齊秋七月安定公宇文泰東伐至恒農齊師不出乃還九月大赦十七年春三月庚戍帝崩于乾安殿時年四十五夏四月庚辰葬於永陵上諡曰文皇帝帝性彊果始為太尉時侍中髙隆之恃勃海王髙歡之黨驕狎公卿因公㑹帝勸酒不飲怒而歐之罵曰鎮兵何敢爾也孝武以歡故免帝太尉歸第命羽林守衛月餘復位及歡將改葬其父朝廷追贈太師百寮㑹弔者盡拜帝獨不屈曰安有生三公而拜贈太師耶及躋大位權歸周室嘗登逍遥觀望嵯峨山因謂左右曰望此令人有脱屣之意若使朕年五十便委政儲宫尋山餌藥不能一日萬機也既而大運未終竟保天祿云西魏文帝大統十七年廢帝諱欽文皇帝之長子也母曰乙皇后大統元年正月乙卯立為皇太子十七年三月即皇帝位是月梁邵陵王蕭綸侵安陸大將軍楊忠討禽之元年冬十一月梁湘東王蕭繹討侯景禽之遣其舎人魏彦來告仍嗣位於江陵二年秋八月大將軍尉遲迴剋成都劒南平冬十一月安定公宇文泰殺尚書元烈三年春正月安定公宇文泰廢帝而立齊王廓帝自元烈之誅有怨言淮安王育廣平王贊等並垂泣諌帝不聽故及於辱廢帝三年無年號㳟皇帝諱廓文皇帝之第四子也大統十四年封為齊王廢帝三年正月即皇帝位改元元年夏四月蠕蠕乙㫋達官冦廣武五月柱國李弼追擊之斬首數千級收輜重而還冬十一月遣師滅梁戕梁元帝梁太尉王僧辯奉元帝子方智為王承制居建業二年秋七月梁太尉王僧辯納貞陽侯蕭淵明於齊奉以為主梁王方智為太子九月梁司空陳霸先殺僧辯廢蕭淵明復奉方智為帝是歳梁廣州刺史王琳冦邊大將軍豆盧寧帥師討之三年春正月丁丑初行周禮建六官以安定公宇文泰為太師冡宰以柱國李弼為大司徒趙貴為太保大宗伯以尚書令獨孤信為大司馬以于謹為大司冦以侯莫陳崇為大司空冬十月乙亥安定公宇文泰薨十二月庚子帝遜位於周周閔帝元年正月封帝為宋公尋殂㳟帝三年無年號右後魏自道武帝至㳟帝凡十五帝一百六十一年而禪于周自孝武帝入關不還髙歡乃立孝文帝曽孫清河王子善見為帝稱天平元年東魏孝靜皇帝諱善見清河文宣王亶之世子也母曰胡妃永熙三年八月拜開府儀同三司孝武帝既入關勃海王髙歡乃與百僚㑹議推帝以奉明帝之後時年十一天平元年冬十月丙寅皇帝即位于城東北大赦改元庚午以太師趙郡王諶為大司馬以司空咸陽王坦為太尉以開府儀同三司髙盛為司徒以開府儀同三司髙昻為司空壬申享太廟丙子車駕北遷于鄴詔勃海王髙歡留後部分改司州為洛州以尚書令元弼為儀同三司洛州刺史鎮洛陽十一月兖州刺史樊子鵠南青州刺史大野拔據瑕邱反庚寅車駕至鄴居北城相州之廨改相州刺史為司州牧魏郡太守為魏尹徙鄴舊人西徑百里以居新遷人分鄴置臨漳縣以魏郡林慮廣平陽邱汲郡黎陽東濮陽清河廣宗等郡為皇畿十二月丁卯燕郡王賀拔允薨庚午詔内外戒嚴百司悉依舊章從容雅服不得以矛釤從事丙子進侍中封隆之等五人為大使廵喻天下丁丑赦畿内閏月宋以元慶和為魏王入據平瀨鄉孝武崩于長安初置四中郎將於礓石橋置東中蒲泉置西中濟北置南中洛水置北中二年春正月乙亥兼尚書右僕射東南道行臺元晏討元慶和破走之二月壬午以太尉咸陽王坦為太傅以司州牧西河王悰為太尉己丑前南青州刺史大野拔斬樊子鵠以降兖州平戊戍梁司州刺史陳慶之冦豫州刺史堯雄撃走之三月辛酉以司徒髙盛為太尉以司空髙昂為司徒濟陰王暉業為司空勃海王髙歡討平山胡劉蠡升辛未以旱故詔京邑及諸州郡縣收瘞骸骨是春髙麗契丹並遣使朝貢夏四月前青州刺史侯梁反攻掠青齊癸未濟州刺史蔡雋討平之壬辰降京師見囚夏五月大旱勒城門殿門及省府寺署坊門澆人不簡王公無限日得雨乃止六月元慶和冦南頓豫州刺史堯雄大破之秋七月甲戍封汝南王悦孫綽為琅邪王八月辛夘司空濟陰王暉業坐事免甲午發衆七萬六千人營新宫九月丁巳以開府儀同三司襄城王旭為司空冬十月丁未梁柳仲禮冦荆州刺史王元撃破之癸丑祀圜丘甲寅閶闔門災龍見并州人家井中十二月壬午車駕狩于鄴東甲午文武百官量事各給祿是歳西魏文帝大統元年也三年春正月癸卯朔饗羣臣於前殿戊申詔百官舉士舉不稱才者兩免之二月丁未梁光州刺史郝樹以州内附丁酉加勃海王世子澄為尚書令大行臺大都督三月甲寅以開府儀同三司華山王鷙為大司馬丁卯陽夏太守盧公纂據郡南叛大都督元整破之夏四月丁酉昌樂王誕薨五月癸卯賜鰥寡孤獨貧賤者衣物各有差丙辰以錄尚書事西河王悰為司州牧戊辰太尉髙盛薨六月辛巳趙郡王諶薨秋七月庚子大赦梁夏州刺史田獨鞞潁川防城都督劉鸞慶並以州内附八月并肆涿建四州霜霣大饑九月壬寅以定州刺史侯景兼尚書右僕射南道行臺節度諸軍南討丙辰平陽人路季札聚衆反辛酉御史中尉竇泰討平之冬十一月戊申詔遣使廵檢河北流移饑人侯景攻剋梁楚州獲刺史桓和十二月以并州刺史尉景為太保辛未遣使者版假老人官百歳已下各有差壬申大司馬清河王亶薨癸未以太傅咸陽王坦為太師是歳髙麗勿吉並遣使朝貢四年春正月以汝陽王暹為錄尚書事夏四月辛未遷七帝神主入新廟大赦内外百官普進一階先是滎陽人張儉等聚衆反於大騩山通西魏壬辰武衛將軍髙元咸討破之六月己巳幸華林園理訟辛未詔尚書掩骼埋胔推錄囚徒壬午閶闔門災秋七月甲辰遣兼散騎常侍李楷聘于梁八月西魏剋陜州刺史李徽伯死之九月侍中元子思與其弟子華謀西入並賜死閏月乙丑衛將軍右光祿大夫蔣天樂謀反伏誅禁京師酤酒冬十月以咸陽王坦為錄尚書事壬辰勃海王髙歡西討敗于沙苑己酉西魏行臺宫景夀都督楊白駒冦洛州大都督韓賢大破之西魏又遣其大行臺元季海大都督獨孤信逼洛州刺史廣陽王湛棄城歸闕季海信遂據金墉十一月丙子以驃騎大將軍儀同三司万俟普為太尉十二月甲寅梁人來聘河間人邢磨納范陽人盧仲禮等各聚衆反是歳髙麗蠕蠕並遣使朝貢元象元年春正月辛酉朔日有蝕之有巨象自至碭郡陂中南兖州獲送于鄴丁卯大赦改元二月丙辰遣兼散騎常侍鄭伯猷聘于梁夏四月庚寅曲赦畿内開酒禁六月壬辰帝幸華林都堂聽訟秋七月乙亥髙麗遣使朝貢是夏山東大水蝦蟆鳴于樹上秋八月辛卯大敗西魏于河隂九月大都督賀拔仁撃邢磨納盧仲禮等破平之冬十月梁人來聘十二月庚寅遣陸操聘于梁興和元年春正月辛酉以尚書令孫騰為司徒三月甲寅朔封常山郡王劭第二子曜為陳郡王五月甲戍立皇后髙氏乙亥大赦是月髙麗遣使朝貢六月乙酉以尚書左僕射司馬子如為山東黜陟大使尋為東北道行臺差選勇士庚寅前潁州刺史奚思業為河南大使簡發勇士丁酉梁人來聘戊申開府儀同三司汝陽王暹薨秋八月壬辰遣兼散騎常侍王元景聘于梁九月甲子發畿内十萬人城鄴四十日罷辛未曲赦畿内死罪已下各有差冬十一月癸亥以新宫成大赦改元八十已上賜綾帽及杖七十旁無朞親及有疾廢者各賜粟帛築城之夫給復一年二年春正月壬申以太保尉景為太傅以驃騎大將軍開府儀同三司庫狄干為太保丁丑徙御新宫大赦内外百官普進一階營構主將别優一階三月乙卯梁人來聘夏五月己酉西魏行臺宫延和陜州刺史宫元慶率戸内屬置之河北馬塲振稟各有差壬子遣兼散騎常侍李象聘于梁閏月丁丑朔日有蝕之己丑封皇兄景植為宜陽王皇弟威為清河王謙為潁川王六月壬子大司馬華山王鷙薨冬十月丁未梁人來聘十一月乙卯遣兼散騎常侍崔長謙聘於梁是歳髙麗蠕蠕勿吉並遣使朝貢三年春二月甲辰阿至羅出吐拔郍渾大率部來降三月乙酉梁州人公孫貴賔聚衆反自號天王陽夏鎮將討禽之夏四月戊申阿至羅國主副伏羅越君子去賔來降封為髙車王六月乙丑梁人來聘秋七月己卯宜陽王景植薨八月甲子遣兼散騎常侍李騫聘於梁先是詔羣官於麟趾閣議定新制冬十月甲寅班於天下己巳發夫五萬人築漳濵堰三十五日罷癸亥車駕狩于西山十一月戊寅還宫丙戍以開府儀同三司彭城王韶為太尉以度支尚書胡僧敬為司空是歳蠕蠕髙麗勿吉國並遣使朝貢四年春正月丙辰梁人來聘夏四月丙寅遣兼散騎常侍李繪聘于梁乙酉以侍中廣陽王湛為太尉以尚書右僕射髙隆之為司徒以太尉彭城王韶為錄尚書事丁亥太傅尉景坐事降為驃騎大將軍開府儀同三司辛卯以太保庫狄干為太傅以領軍將軍婁昭為大司馬封祖裔為尚書右僕射六月丙申復前侍中樂良王忠爵丁酉復陳留王景皓常山王紹宗髙密王永業爵秋八月庚戍以開府儀同三司吏部尚書侯景為兼尚書僕射河南行臺隨機討防冬十月甲寅梁人來聘十一月壬午驃騎大將軍開府儀同三司青州刺史西河王悰薨十二月辛亥使兼散騎常侍陽斐使于梁是歳蠕蠕髙麗吐谷渾並遣使朝貢武定元年春正月壬戍朔大赦改元己巳車駕蒐于邯鄲之西山癸酉還宫二月壬申北豫州刺史髙仲密據虎牢西叛三月丙午帝親納訟戊申勃海王髙歡大敗西魏師于邙山追奔至恒農而還豫洛二州平夏四月封彭城王韶弟襲為武安王五月壬辰以剋復虎牢降天下死罪已下囚乙未以吏部尚書侯景為司空六月乙亥梁人來聘戊寅封前員外散騎侍郎元長春為南郡王八月乙丑以汾州刺史斛律金為大司馬壬午遣兼散騎常侍李渾聘于梁冬十一月甲午車駕狩于西山乙巳還宫是歳吐谷渾髙麗蠕蠕並遣使朝貢二年春二月丁卯徐州人劉烏黒聚衆反遣行臺慕容紹宗討平之三月梁人來聘以旱故宥死罪已下囚丙午以開府儀同三司孫騰為太保壬子以勃海王世子髙澄為大將軍領中書監元弼為錄尚書事以尚書左僕射司馬子如為尚書令以太原公髙洋為左僕射夏五月甲午遣散騎常侍魏季景聘于梁丁酉太尉廣陽王湛薨秋八月癸酉尚書令司馬子如坐事免九月甲申以開府儀同三司濟隂王暉業為太尉太師咸陽王坦坐事免以王還第冬十月丁巳太保孫騰大司馬髙隆之各為括戸大使凡獲逃戸六十餘萬十一月西河地陷有火出甲申以司徒髙隆之為尚書令以前大司馬婁昭為司徒庚子祀圜丘辛丑梁人來聘是歳吐谷渾地豆干室韋髙麗蠕蠕勿吉等並遣使朝貢三年春正月丙申遣兼散騎常侍李奬聘于梁二月庚申吐谷渾國奉其從妹以備後庭納為容華嬪夏五月甲辰大赦秋七月庚子梁人來聘冬十月遣中書舎人尉瑾聘于梁十二月以司空侯景為司徒以中書令韓軌為司空戊子以太保孫騰為錄尚書事是歳髙麗吐谷渾蠕蠕並遣使朝貢四年夏五月壬寅梁人來聘六月庚子以司徙侯景為河南大行臺應機討防秋七月壬寅遣兼散騎常侍元廓聘于梁八月移洛陽漢魏石經于鄴是歳室韋勿吉地豆干髙麗蠕蠕並遣使朝貢五年春正月己亥朔日有蝕之丙午勃海王髙歡薨辛亥司徒侯景降于西魏以求救西魏遣其將李弼王思政赴之思政等入據潁川景乃出走豫州乙丑梁人來聘二月侯景復背西魏歸梁夏四月壬申大將軍髙澄來朝甲午遣兼散騎常侍李緯聘于梁五月丁酉朔大赦戊戍以尚書右僕射襄城王旭為太尉甲辰以太原公髙洋為尚書令領中書監以青州刺史尉景為大司馬以開府儀同三司庫狄干為太師以録尚書事孫騰為太傅以汾州刺史賀拔仁為太保以司空韓軌為司徒以領軍將軍可朱渾道元為司空以司徒髙隆之錄尚書事以徐州刺史慕容紹宗為尚書左僕射髙陽王斌為右僕射戊午大司馬尉景薨六月乙酉帝為勃海王舉哀於東堂服緦衰秋九月辛丑梁貞陽侯蕭淵明冦徐州堰泗水於寒山灌彭城以應侯景冬十一月乙酉以尚書左僕射慕容紹宗為東南道行臺與大都督髙岳潘相樂大破禽之及其二子瑀道十二月乙亥蕭淵明至帝御閶闔門讓而宥之岳等廻師討侯景是歳髙麗勿吉並遣使朝貢六年春正月己亥大都督髙岳等於渦陽大破侯景俘斬五萬餘人其餘溺死於渦水水為不流景走淮南二月己卯梁遣使求和許之三月癸巳以太尉襄城王旭為大司馬以開府儀同三司髙岳為太尉辛亥以冬春亢旱赦罪人各有差夏四月甲子吏部令史張永和青州人崔闊等偽假人官事覺糺檢首者六萬餘人甲戍太尉髙岳司徒韓軌大都督劉豐等討王思政於潁川引洧水灌其城九月乙酉梁人來聘冬十月戊申侯景濟江推梁臨賀王正徳為主以攻建業是歳髙麗室韋蠕蠕吐谷渾並遣使朝貢七年春正月戊辰梁北徐州刺史中山侯蕭正表以鎮内附封蘭陵郡公吳郡王三月丁卯侯景剋建業夏五月丙辰侯景殺梁武帝戊寅勃海王髙澄帥師赴潁川六月剋之獲西魏大將軍王思政等秋八月辛卯立皇子長仁為太子盗殺勃海王髙澄癸巳大赦内外百官並進二級甲午太原公髙洋如晉陽冬十月癸未以開府儀同三司咸陽王坦為太傅甲午以開府儀同三司潘相樂為司空十二月甲辰吳郡王蕭正表薨己酉以并州刺史彭樂為司徒是歳蠕蠕地豆干室韋髙麗吐谷渾並遣使朝貢八年春正月辛酉帝為勃海王髙澄舉哀於東堂戊辰詔太原王髙洋嗣事徙封齊郡王甲戍地豆干契丹並遣使朝貢二月庚寅以尚書令髙隆之為太保三月庚申進齊郡王髙洋爵為齊王夏四月乙巳蠕蠕遣使朝貢五月甲寅詔齊王為相國總百揆備九錫之禮以齊國太妃為王太后王妃為王后丙辰帝遜位於齊齊天保元年己未封帝為中山王邑一萬戸上書不稱臣答不稱詔載天子旌旗行魏正朔乗五時副車封王諸子為縣公邑各一千戸奉絹一萬疋錢一萬貫粟二萬石奴婢三百人水碾一具田百頃園一所於中山國立魏宗廟二年十二月己酉中山王殂時年二十八三年二月奉諡曰孝靜皇帝葬於鄴西漳北其後發之陵崩死者六十人帝好文美容儀力能挾石師子以踰墻射無不中嘉辰宴㑹多命羣臣賦詩從容沉雅有孝文風勃海王髙澄嗣事甚忌焉以大將軍中兵參軍崔季舒為中書黄門侍郎令監察動静小大皆令季舒知澄與季舒書曰癡人復何似癡勢小差未帝嘗與獵於鄴東馳逐如飛監衛都督烏郍羅受工伐從後呼帝曰天子莫走馬大將軍怒澄嘗侍帝飲大舉觴曰臣澄勸陛下帝不悦曰自古無不亡之國朕亦何用此活澄怒曰朕朕狗脚朕澄使季舒毆帝三拳奮衣而出明日澄使季舒勞帝帝亦謝焉賜絹季舒未敢受以啟澄澄使取一段帝束百疋以與之曰亦一段爾帝不堪憂辱詠謝靈運詩曰韓亡子房奮秦帝魯連恥本自江海人忠義動君子常侍侍講荀濟知帝意乃與華山王大器元瑾密謀於宫中偽為山而作地道向北城至千秋門門者覺地下響動以告澄澄勒兵入宫曰陛下何意反邪臣父子功存社稷何負陛下邪及將殺諸妃嬪帝正色曰王自欲反何關於我我尚不惜身何况妃嬪澄下牀叩頭大啼謝罪於是酣飲夜久乃出居三日幽帝於含章堂大器瑾等皆見烹於市及將禪位於文宣襄城王昶及司徒潘相樂侍中張亮黄門郎趙彦深等求入奏事帝在昭陽殿見之昶曰五行遞運有始有終齊王聖徳欽明萬姓歸仰臣等昧死聞奏願陛下則堯禪舜帝便歛容答曰此事推挹已久謹當遜避又云若爾須作詔書侍郎崔劼裴讓之奏云詔已作訖即付楊愔進於帝凡十條書訖曰將安朕何所復若為而去楊愔對曰在北城别有館宇還備法駕依常仗衛而去帝乃下御座歩就東廊口詠范蔚宗後漢贊云獻生不辰身播國屯終我四百永作虞賔所司奏請發帝曰古人念遺簪敝履欲與六宫别可乎髙隆之曰今日天下猶是陛下之天下况在後宫乃與妃嬪以下訣莫不欷歔掩涕貴嬪趙國李氏誦陳思王詩云王其愛玉體俱享黄髮期皇后已下皆哭直長趙徳以故犢車一乗候於東上閤帝上車徳超上車持帝帝肘之曰朕畏天順人授位相國何物奴敢逼人趙徳尚不下及出雲龍門王公百寮衣冠拜辭帝曰今日不減常道鄉公漢獻帝衆皆悲愴髙隆之泣灑遂入北城下司馬子如南宅及文宣行幸常以帝自隨帝后封太原公主常為帝嘗食以䕶視焉竟遇酖而崩東魏孝静帝天平四年天象元年興和四年武定八年即位十七年右東魏一帝十七年而禪位于齊按後魏正史自孝武帝後便列孝靜帝紀乃云宇文氏害孝武以南陽王寶炬為僭稱尊號通志卷十五下
