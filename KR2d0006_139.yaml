body:
  text: 通志卷一百十九宋右廸功郎鄭樵漁仲撰列傳第三十二吳劉繇子基太史慈士夑爕弟壹燮子徽䵋子武壹匡張昭子承子休弟奮顧雍子邵弟承邵子譚悌譚雍族人諸葛瑾子融歩騭子闡張紘孫尚嚴畯程秉闞澤薛綜子瑩周瑜子允魯肅吕䝉程普黄盖韓當蔣欽周泰陳武子修表董襲甘寜凌統徐盛潘璋丁奉劉繇字正禮東莱牟平人也齊孝王少子封牟平侯子孫家焉繇伯父寵為漢太尉繇兄岱字公山歴位侍中兖州刺史繇十九從父韙為賊所劫質繇簒取以歸由是顯名舉孝廉為郎中除下邑長時郡守以貴戚託之遂棄官去州辟部濟南濟南相中常侍子貪穢不循法繇奏免之平原陶邱洪薦繇欲令舉茂才刺史曰前年舉公山奈何復舉正禮乎洪曰若明使君用公山於前擢正禮於後所謂御二龍於長塗騁騏驥於千里不亦可乎㑹辟司空掾除侍御史不就避亂淮浦詔書以為揚州刺史時袁術在淮南繇畏憚不敢之州欲南渡江吳景孫賁迎致曲阿術圖為僭逆攻没諸郡縣繇遣樊能張英屯江邊以拒之以景賁術所授用乃廹逐使去於是術乃自置揚州刺史與景賁共攻英能等嵗餘不下漢命加繇為牧振武將軍衆數萬人孫䇿東渡江破英能等繇奔丹徒遂泝江南保豫章駐彭澤笮融先至殺太守朱皓入居郡中繇進討融為融所破更復招合屬縣攻融融敗走入山為民所殺繇尋病卒時年四十二笮融丹陽人聚衆依徐州牧陶謙謙使督廣陵彭城運漕曹操攻陶謙徐土騷動融將男女萬口馬三千匹走廣陵廣陵太守趙昱待以賓禮先是彭城相薛禮為陶謙所逼屯秣陵融利廣陵之資因酒酣殺昱放兵大掠因載而去過殺禮然後殺皓融事詳具陶謙傳中後䇿西伐江夏還過豫章収載繇喪善遇其家王朗遺䇿書曰劉正禮昔初臨州未能自逹實頼尊門為之先後用能濟江成治有所處定踐境之禮感分結意情在終始後以袁氏之嫌稍更乖剌更以同盟還為讐敵原其本心實非所樂康寜之後常願渝平更成復踐宿好一爾分離欵意不昭奄然殂隕可為傷恨知敦以厲薄徳以報怨収骨育孤哀亡愍存捐既往之猜保六尺之託誠深恩重分羙名厚實也昔魯人雖有齊怨不廢喪紀春秋善之謂之得禮誠良史之所宜藉卿校之所歎聞正禮元子致有志操想必有以殊異威盛刑行施之以恩不亦優哉繇長子基字敬輿年十四居繇喪盡禮故吏餽餉皆無所受姿容羙好孫權愛敬之權為驃騎將軍辟東曹掾拜輔義校尉建忠中郎將權為吳王遷基大司農權嘗宴飲騎都尉虞翻醉酒犯忤權欲殺之威怒甚盛由基諫諍翻以得免權大暑時嘗於船中宴飲於船樓上值雷雨權以盖自覆又命覆基餘人不得也其見待如此徙郎中令權稱尊號改為光禄勲分平尚書事年四十九卒後權為子霸納基女賜第一區四時寵賜與全張比基二弟鑠尚皆騎都尉太史慈字子義東莱黄人也少好學仕郡奏曹史㑹郡與州有隙曲直未分以先聞者為善時州章已去郡守恐後之求可使者慈年二十一以選行晨夜取道洛陽詣公車門見州吏始欲求通慈問曰君欲通章邪吏曰然問章安在曰車上慈曰章題署得無誤邪取来視之吏殊不知其東莱人也因為取章慈已先懐刀便截敗之吏踊躍大呼言人壊我章慈將至車間與語曰向使君不以章相與吾亦無因得敗之是為吉凶禍福等耳吾不獨受此罪豈若黙然俱出去可以存易亡無事俱就刑辟吏言君為郡敗吾章已得如意欲復亡何為慈答曰初受郡遣但来視章通與未耳吾用意太過乃相敗章今還亦恐以此見譴怒故俱欲去耳吏然慈言即曰俱去慈既出城因遁還通郡章州家聞之更遣吏通章有司以格章之故不復見理州受其短由是知名而為州家所疾恐受其禍乃避之遼東北海相孔融聞而竒之數遣人訊問其母并致餽遺時融以黄巾宼暴出屯都昌為賊管亥所圍慈從遼東還母謂慈曰汝與孔北海未嘗相見至汝行後贍恤殷勤過於故舊今為賊所圍汝宜赴之慈留三日單歩徑至都昌時圍尚未宻慈夜伺閒隙得入見融因求兵出斫賊融不聽欲待外救外救未有至者而圍日偪融欲告急平原相劉備城中人無由得出慈自請求行融曰今賊圍甚宻衆人皆言不可卿意雖壯無乃實難乎慈對曰昔府君傾意於老母老母感遇遣慈赴府君之急固以慈有可取而来必有益也今衆人言不可慈亦言不可豈府君愛顧之義老母遣慈之意邪事已急矣願府君無疑融乃然之於是嚴行蓐食須明便帯鞬攝弓上馬將兩騎自隨各作一的持之開門直出外圍下左右人並驚駭兵馬互出慈引馬至城下塹内植所持的各一出射之射之畢徑入門明晨復如此圍下人或起或卧慈復植的射之畢復入門明晨復出如此無復起者於是乃鞭馬直突圍中馳去比賊覺知慈行已過又射殺數人皆應弦而倒故無敢追者遂到平原説劉備曰慈東莱之鄙人也與孔北海親非骨肉比非鄉黨特以名志相好有分災共患之義今管亥暴亂北海被圍孤窮無援危在旦夕以君有仁義之名能救人之急故北海區區延頸恃仰使慈冒白刃突重圍從萬死之中自託於君惟君所以存之備斂容答曰孔北海知世間有劉備邪即遣精兵三千人隨慈賊聞軍至觧圍散去融既得濟益貴重慈曰卿吾之少友也事畢還啓其母母曰我喜汝有以報孔北海也揚州刺史劉繇與慈同郡慈自遼東還未與相見暫渡江到曲阿見繇未去㑹孫䇿至或勸繇可以慈為大將軍繇曰我若用子義許子將不當笑我邪但使慈偵視輕重時獨與一騎卒遇䇿䇿從騎十三皆韓當宋謙黄盖輩也慈便前鬭正與䇿對䇿刺慈馬而擥得慈項上手㦸慈亦得䇿兠鍪㑹兩家兵騎並各来赴於是觧散慈當與繇俱奔豫章而遁於蕪湖亡入山中稱丹陽太守是時䇿已平定宣城以東惟涇以西六縣未服慈因進住涇縣立屯府大為山越所附䇿躬自攻討慈遂見囚執䇿素聞其名即觧縳捉其手曰寜識神亭時邪若卿爾時得我云何慈曰未可量也䇿大笑曰今日之事當與卿共之因咨以進取之術慈對曰敗軍之將不足與論事䇿曰昔韓信定計於廣武今䇿決疑於仁者君何辭焉慈曰州軍新破士卒離心若儻分散難復合聚欲出宣恩安集恐不合尊意䇿長跪曰誠本心所望也明日日中望君来還諸將皆疑䇿曰太史子義青州名士以信義為先終不欺䇿明日大請諸將豫設酒食立竿視影日中而慈至䇿大喜即署門下督常與參論軍事還吳授兵拜折衝中郎將㑹劉繇亡於豫章揚州士衆萬餘人欲奉華歆為主歆以為因時擅命非人臣所宜謝遣之其衆未有所屬䇿命慈往撫安之謂曰劉牧往責吾為袁氏攻廬江其意頗猥理恕不足何者先君手下兵數千餘人盡在公路許孤志在立事不得不屈意於公路求索故兵再往纔得千餘人耳仍令孤攻廬江爾時事勢不得不為其行但其後不遵臣節自棄作邪譖之事諫之不從丈夫義交茍有大故不得不離孤交求公路及絶之本末如此今其喪亡恨不及其生時與共論辯今兒子在豫章不知華子魚待遇何如其故部曲復依隨之否卿則其州人昔又從事寜能往視其兒子並宣孤意於其部曲部曲樂来者便與俱来不樂来者且慰安之并觀華子魚所以牧禦方規何似視廬陵鄱陽人民親附之否卿手下兵宜將多少自由卿意慈對曰慈有不赦之罪將軍待遇過望古人報主以死期於盡節沒而後已今並息兵兵不宜多將數十人自足以往還也左右皆曰慈未可信或云慈與華子魚州里恐留彼為籌䇿或疑慈西託黄祖假路還北多言遣之非計䇿曰太史子義雖氣勇有膽烈然非縱横之人其心有士謨志經道義貴重然諾一以意許知已死亡不相負且子義舎我當復與誰諸君勿復憂也乃餞於昌門把腕而别曰何時能還答曰不過六十日果如期而反於是議者遂服慈見䇿曰華子魚良徳也然非籌畧才無他方規自守而已又丹陽僮芝自擅廬陵詐言被詔書為太守鄱陽民帥别立宗部阻兵守界不受子魚所遣長吏言我已别立郡須漢遣真太守来當迎之耳子魚不但不能諧廬陵鄱陽近自海昬有上繚壁有五六千家相結聚作宗伍唯輸租布於郡耳發召一民遂不可得子魚亦覩視之而已䇿拊掌大笑仍有兼并之志矣頃之遂定豫章劉表從子磐驍勇數為宼於艾西安諸縣䇿於是分海昬建昌左右六縣以慈為建昌都尉治海昬并督諸將拒磐磐不復為宼慈長七尺七寸羙鬚髯猨臂善射弦不虚發嘗從䇿討麻保賊賊於屯裏縁樓上行詈以手持樓棼慈引弓射之矢貫手著棼圍外萬衆莫不稱善其妙如此曹公聞其名遺慈書以箧封之慈發省無所道而但貯當歸孫權統事以慈能制磐遂委南方之事建安十一年卒時年四十一慈臨亡歎息曰丈夫生世當帯七尺之劍以升天子之階今所志未從奈何而死乎權甚悼惜之子亨官至越騎校尉士燮字威彦蒼梧廣信人也其先本魯國汶陽人至王莽之亂避地交州六世至燮父賜桓帝時為日南太守燮少游學京師事潁川劉子竒治左氏春秋察孝廉補尚書郎公事免官父賜喪闋後舉茂才除巫令遷交趾太守弟壹初為郡督郵刺史丁宫徴還京都壹侍送勤恪宫感之臨别謂曰刺史若待罪三事當相辟也後宫為司徒辟壹比至宫已免黄琬代為司徒甚禮遇壹董卓作亂壹亡歸鄉里交州刺史朱符為夷賊所殺州郡擾亂燮乃表壹領合浦太守次弟徐聞令䵋領九真太守䵋弟武領南海太守燮體器寛厚謙虚下士中國士人往依避難者以百數耽玩春秋為之注觧陳國袁徽與尚書令荀彧書曰交趾士府君既學問優博又逹於從政處大亂之中保全一郡二十餘年疆埸無事民不失業覊旅之徒皆䝉其慶雖竇融之保河西曷以加之官事小闋輙玩習書傳春秋左氏傳尤簡練精微吾數以咨問傳中諸疑皆有師説意思甚宻又尚書兼通古今大義詳備聞京師古今之學是非忿爭今欲條左氏尚書長義上之其見稱如此燮兄弟並為列郡雄長一州偏在萬里威尊無上出入鳴鐘磬備具威儀笳簫鼓吹車騎滿道胡人夹轂焚香者常有數十妻妾乗輜軿子弟從兵騎當時貴重震服百蠻尉他不足踰也武先病没朱符死後漢遣張津為交州刺史津後又為其將區景所殺而荆州牧劉表遣零陵頼恭代津是時蒼梧太守史璜死表又遣吳巨代之與恭俱至漢聞張津死賜燮璽書曰交州絶域南帯江海上恩不宣下義壅塞知逆賊劉表又遣頼恭闚看南上今以燮為綏南中郎將董督七郡領交趾太守如故後燮遣吏張旻奉貢詣京都是時天下喪亂道路斷絶而燮不廢貢職特復下詔拜安逺將軍龍度亭侯後巨與恭相失舉兵逐恭恭走還零陵建安十五年孫權遣歩騭為交州刺史騭到燮率兄弟奉承節度而吳巨懐異心騭斬之權加燮為左將軍建安末年燮遣子廞入質權以為武昌太守燮壹諸子在南者皆拜中郎將燮又誘導益州豪姓雍闓等率郡人民使遥東附權益嘉之遷衛將軍進封龍編侯弟壹偏將軍都鄉侯燮每遣使詣權致雜香細葛輙以千數明珠大貝琉璃翡翠玳瑁犀象之珍竒物異果蕉椰龍眼之屬無嵗不至壹時貢馬凡數百匹權輙為書厚加寵賜以答慰之燮在郡四十餘嵗黄武九年年九十卒權以交趾縣逺恐難制馭遂分合浦以北為廣州吕岱為刺史交趾以南為交州戴良為刺史又遣陳時代燮為交趾太守岱留南海良與時俱前行到合浦而燮子徽自署交趾太守帥宗兵拒良良留合浦交趾桓鄰燮舉吏也叩頭諫徽使迎良徽怒笞殺鄰鄰兄治子發又合宗兵撃徽徽閉門城守治等攻之數月不能下乃約和親各罷兵還而吕岱被詔誅徽自廣州將兵晝夜馳入過合浦與良俱前壹子中郎將匡與岱有舊岱署匡師友從事先移書交趾告諭禍福又遣匡見徽説令服罪雖失郡守保無他憂岱尋匡後至徽兄祗弟幹頌等六人肉袒奉迎岱謝令復服前至郡下明旦早施帳幔請徽兄弟以次入賓客滿坐岱起擁節讀詔書數徽罪過左右因反縛以出即皆伏誅傳首武昌壹䵋匡後出權原其罪及燮質子廞皆免為庶人數嵗壹䵋坐法誅廞病卒無子妻寡居詔在所月給米賜錢四十萬張昭字子布彭城人也少好學善𨽻書從白侯子安受左氏春秋博覽衆書與琅邪趙昱東海王朗俱發名友善弱冠察孝廉不就與朗共論舊君諱事州里才士陳琳等皆稱善之刺史陶謙舉茂才不應謙以為輕已遂見拘執昱傾身營救方以得免漢末大亂徐方士民多避難揚土昭皆南渡江孫䇿創業命昭為長史撫軍中郎將升堂拜母如比肩之舊文武之事一以委焉昭每得北方士大夫書疏專歸羙於昭昭欲黙而不宣則懼有私宣之又恐非宜進退不安䇿聞之歡笑曰昔管子相齊一則仲父二則仲父而桓公為霸者宗今子布賢我能用之其功名獨不在我乎䇿臨亡以弟權託之曰若仲謀不任事者君便自取䇿卒昭率羣僚立權而輔之上表漢室下移屬城中外將校各令奉職權悲慼未視事昭謂權曰夫為人後者貴能負荷先軌克昌堂構以成勲業也方今天下鼎沸羣盜滿山孝廉何得寢伏哀戚肆匹夫之情哉乃身自扶權上馬陳兵而出然後衆心知有所歸昭復為權長史授任如前劉備表權行車騎將軍昭為軍師權每田獵常乗馬射虎虎嘗突前攀持馬鞍昭變色而前曰將軍何有當耳夫為人君者謂能駕馭英雄驅使羣賢豈謂馳逐於原野校勇於猛獸乎如有一旦之患奈天下笑何權謝昭曰年少慮事不逺以此慙君然猶不能已乃作射虎車為方目間不置盖一人為御自於中射之時有逸羣之獸輙復犯車而權每手擊以為樂昭雖諫争常笑而不答魏黄初二年遣使者邢貞拜權為吳王貞入門不下車昭謂貞曰夫禮無不敬故法無不行而君敢自尊大豈以江南寡弱無方寸之刃故乎貞即遽下車拜昭為綏逺將軍封由拳侯權於武昌臨釣臺飲酒大醉權使人以水灑羣臣曰今日酣飲惟醉墮臺中乃當止耳昭正色不言出外車中坐權遣人呼昭還謂曰為共作樂耳公何為怒乎昭對曰昔紂為糟邱酒池長夜之飲當時亦以為樂不以為惡也權黙然有慙色遂罷酒初權當置丞相衆議歸昭權曰方今多事職統大者責重非所以優之也後孫邵卒百僚復舉昭權曰孤豈為子布有愛乎顧丞相事煩而此公性剛所言不從怨咎將興非所以益之也乃用顧雍權既稱尊號昭以老病上還官位及所統領更拜輔吳將軍班亞三司改封婁侯食邑萬戸在里宅無事乃著春秋左氏傳觧及論語注權嘗問衛尉嚴畯寜念小時所闇誦書不畯因誦孝經仲尼居昭曰嚴畯鄙生臣請為陛下誦之乃誦君子之事上咸以昭為知所誦昭每朝見辭氣壯厲義形於色曽以直言逆旨中不進見後蜀使来稱蜀徳之羙而羣臣莫拒權歎曰使張公在坐彼不折則廢安得復自誇乎明日遣中使勞問因請見昭昭避席謝權跪止之昭坐定仰曰昔太后桓王不以老臣屬陛下而以陛下屬老臣是以思盡臣節以報厚恩使泯没之後有可稱述而智慮淺短違逆盛旨自分幽淪長棄溝壑不圖復䝉引見得奉帷幄然臣愚心所以事國志在忠益畢命而已若乃變心易慮以偷榮取容此臣所不能也權辭謝焉權以公孫淵稱藩遣張彌許晏至遼東拜淵為燕王昭諫曰淵背魏懼討逺来求援非本志也若淵改圖欲自明於魏兩使不反不亦取笑於天下乎權與相反覆昭意彌切權不能堪按刀而怒曰吳國士人入宫則拜孤出宫則拜君孤之敬君亦為至矣而數於衆中折孤孤常恐失計昭熟視權曰臣雖知言不用每竭愚忠者誠以太后臨崩呼老臣於牀下遺詔顧命之言故在耳因涕泣横流權擲刀致地與昭對泣然卒遣彌晏往昭忿言之不用稱疾不朝權恨之土塞其門昭又於内以土封之淵果殺彌晏權數慰謝昭昭固不起權因出過其門呼昭昭辭疾篤權焼其門欲以恐之昭更閉户權使人滅火住門良乆昭諸子共扶昭起權載以還宫深自克責昭不得已然後朝㑹昭容貎矜嚴有威風權常曰孤與張公言不敢妄也舉邦憚之年八十一嘉禾五年卒遺令幅巾素棺歛以時服權素服臨弔諡曰文侯長子承己自封侯少子休襲爵昭弟子奮年二十造作攻城大攻車為歩騭所薦昭不願曰汝年尚少何為自委於軍旅乎奮對曰昔童汪死難子竒治阿奮實不才耳於年為不少也遂領兵為將軍連有功效至平州都督封樂鄉亭侯承字仲嗣少以才學知名與諸葛瑾歩騭嚴畯相友善權為驃騎將軍辟西曹掾出為長沙西部都尉討平山宼得精兵萬五千人後為濡須都督奮威將軍封都鄉侯領部曲五千人承為人壯毅忠讜能甄識人物拔彭城蔡款南陽謝景於孤微童幼後並為國士款至衛尉景豫章太守又諸葛恪年少時衆人竒其英才承言終敗諸葛氏者元遜也勤於長進篤於物類凡在庶幾之流無不造門年六十七赤烏七年卒諡曰定侯子震嗣初承喪妻昭欲為索諸葛瑾女承以相與有好難之權聞而勸焉遂為婚生女權為子和納之權數令和修敬於承執子壻之禮震諸葛恪誅時亦死休字叔嗣弱冠與諸葛恪顧譚等俱為太子登僚友以漢書授登從中庶子轉為右弼都尉權嘗游獵迨暮乃歸休上疏諫戒權大善之以示於昭及登卒後為侍中拜羽林都督平三典軍事遷揚武將軍為魯王霸友黨所譖與顧譚承俱以芍陂論功事休承與典軍陳恂通情詐増其伐並徙交州中書令孫𢎞佞偽險詖𢎞因是譖訴下詔書賜休死時年四十一顧雍字元歎吳郡吳人也蔡伯喈從朔方還嘗避怨於吳雍從學琴書伯喈異之以其為蔡邕之所歎因以為字焉州郡表薦弱冠為合肥長後轉在婁曲阿上虞皆有治迹孫權領㑹稽太守不之郡以雍為丞行太守事討除宼賊郡界寜静吏民歸服數年入為左司馬權為吳王累遷大理奉常領尚書令封陽遂鄉侯拜侯還寺而家人不知後聞乃驚黄初四年迎母於吳既至權臨賀之親拜其母於庭公卿大臣畢㑹後太子又往慶焉雍為人不飲酒寡言語舉動時當權嘗歎曰顧君不言言必有中至飲宴歡樂之際左右恐有酒失而雍必見之是以不敢肆情權亦曰顧公在坐使人不樂其見憚如此是嵗改為太常進封醴陵侯代孫邵為丞相平尚書事其所選用文武將吏各隨能所任心無適莫時訪逮民間及政職所宜輙宻以聞若見納用則歸之於上不用終不宣泄權以此重之然於公朝有所陳及辭色雖順而所執者正權常令中書郎詣雍有所咨訪若合雍意事可施行即與相反覆究而論之為設酒食如不合意雍即正色改容黙然不言無所施設即退告權曰顧公歡悦是事合宜也其不言者是事未平也孤當重思之其敬信如此後權嘗咨問得失張昭因陳聽采聞頗以法令太稠刑罰微重宜有所蠲損權黙然顧問雍曰君以為何如對曰臣之所聞亦如昭所陳權於是乃議獄輕刑時江邊諸將各欲立功自効多陳便宜權以訪雍雍曰臣聞兵法戒於小利此等所陳欲邀功名而為其身非為國也陛下宜禁制之茍不足以曜威損敵所不宜聽也權從之乆之吕壹秦博為中書典校諸官府及州郡文書壹等因此漸作威福遂造作㩁酤障管之利舉罪紏姦纖介必聞重以深按醜誣毁短大臣排陷無辜雍等皆見舉白用被譴讓後壹姦罪發露収繋廷尉雍往斷獄壹以囚見雍和顔色問其辭狀臨出又謂壹曰君意得無欲有所道壹叩頭無言時尚書郎懐叙靣詈辱壹雍責叙曰官有正法何至於此雍為相十九年年七十六赤烏六年卒初雍微疾時權令醫趙泉視之既而拜其少子濟為騎都尉雍聞悲曰泉善别死生吾必不起故上欲及吾目見濟拜也權素服臨弔諡曰肅侯長子邵早卒次子裕有篤疾少子濟嗣無後絶永安元年詔以裕襲爵為醴陵侯奉雍嗣邵字孝則博覽書傳好樂人倫少與舅陸績齊名而陸遜張敦卜静等皆亞焉權妻以䇿女年二十七起家為豫章太守下車祀先賢徐孺子之墓優待其後禁其淫祀非禮之祭者小吏姿質佳者輙令就學擇其先進擢置右職舉善以教風化大行初錢塘丁諝出於役伍陽羡張秉生於庶民烏程吳粲雲陽殷禮起於微賤邵皆拔而友之為立聲譽秉遭大䘮親為制服結絰邵當之豫章發在近路值秉疾病時送者百數邵辭賓客曰張仲節有疾苦不能来别恨不見之暫還與訣諸君少時相待其留心下士惟善所在皆此類也諝至典軍中郎秉雲陽太守禮零陵太守粲太子少傅世以邵為知人在郡五年卒子譚承譚字子黙弱冠與諸葛恪等為太子四友從中庶子轉輔正都尉赤烏中代恪為左節度每省簿書未嘗下籌徒屈指心計盡發疑謬下吏以此服之加奉車都尉薛綜為選曹尚書自以才不逮譚上疏固讓譚遂代綜祖父雍卒數月拜太常代雍平尚書事是時魯王霸有盛寵與太子和齊衡譚上疏曰臣聞有國有家者必明嫡庶之端異尊卑之禮使髙下有差階級踰邈如此則骨肉之恩生覬覦之望絶昔賈誼陳治安之計論諸侯之勢以為勢重雖親必有逆節之累勢輕雖疎必有保全之祚故淮南親弟不終饗國失之於勢重也吳芮疎臣傳祚長沙得之於勢輕也昔漢文帝使慎夫人與皇后同席袁盎退夫人之座帝有怒色及盎辨上下之儀陳人彘之戒帝既悦懌夫人亦悟今臣所陳非有所偏誠欲以安太子而便魯王也由是霸與譚有隙時長公主壻衛將軍全琮子寄為覇賓客寄素傾邪譚所不納先是譚弟承與張休俱北征夀春全琮時為大都督與魏將王凌戰於芍陂軍不利魏兵乗勝陷没五營將秦兒軍休承奮擊之遂駐魏師時琮羣子緒端亦並為將因敵既往乃進擊之凌軍用退時論功行賞以為駐敵之功大退敵之功小休承並為雜號將軍緒端偏裨而已寄父子益恨共搆㑹譚譚坐徙交州幽而發憤著新言二十篇其知難篇盖以自悼傷也見流二年年四十二卒於交趾承字子直嘉禾中與舅陸瑁俱以禮徴拜騎都尉領羽林兵後為吳郡西部都尉與諸葛恪等共平山越别得精兵八千人還屯軍章阮拜昭義中郎將入為侍中芍陂之役拜奮威將軍出領京下督數年與兄譚張休等俱徙交州年三十七卒雍族人悌字子通以孝悌廉正聞於郷黨年十五為郡吏除郎中稍遷偏將軍權末年嫡庶不分悌數與驃騎將軍朱據共陳禍福言辭切直朝廷憚之待妻有禮常夜入晨出希見其面嘗疾篤妻出省之悌命左右扶起冠幘加襲起對趣令妻還其貞潔不凟如此悌父向歴四縣令年老致仕悌每得父書常洒掃整衣服更設几筵舒書其上拜跪讀之每句應諾畢復再拜若父有疾耗之問至即臨書垂涕聲語哽咽父以夀終飲漿不入口五日權為作布衣一襲皆􅀢絮著之彊令釋服悌雖以公議自割猶以不見父喪常畫壁作棺形設神座於下每對之哭泣服未闋而卒悌四子彦禮謙祕祕晉交州刺史祕子衆尚書僕射諸葛瑾字子瑜琅邪諸縣人後徙陽都陽都先有姓葛者故謂之諸葛因以為氏瑾少游京師治毛詩尚書左氏春秋遭母憂居喪至孝事繼母恭敬甚得人子之道漢末避亂江東值孫䇿卒孫權姊壻曲阿𢎞咨見而異之薦之於權與魯肅等並見賓待後為權長史轉中司馬建安二十年權遣瑾使蜀通好劉備瑾與其弟亮俱公㑹相見退無私面瑾每有諫喻於權未嘗切愕㣲見風采粗陳指歸如有未合則捨而及他徐復託事造端以物類相求於是權意往往而釋吳郡太守朱治權舉將也權曽有以望之而素加敬難自詰讓忿忿不觧瑾揣知其故而不敢顯陳乃乞以意私自問遂於權前為書泛論物理因以己心遥往忖度之畢以呈權權喜笑曰孤意觧矣顔氏之徳使人加親豈謂此乎權又怪校尉殷謨罪至不測羣下多為之請權怒益甚與相反覆唯瑾黙然權曰子瑜何獨不言瑾避席曰瑾與殷謨等遭本州傾覆生類殄盡棄墳墓㩗老弱披草莱歸聖化在流𨽻之中䝉生成之福不能躬自督厲陳答萬一至令謨孤負恩遇自陷罪戾臣將謝過不暇誠不敢有言權聞之愴然乃曰特為君赦之後從討闗侯封宣城侯以綏南將軍代吕䝉領南郡太守駐公安劉備東伐吳吳王求和瑾與備牋曰奄聞旗鼓来至白帝或恐議臣以吳王侵取此州危害闗侯怨深禍大不宜答和此用心於小未留意於大者也試為陛下論其輕重及其大小陛下若抑威損忿暫省瑾言者計可立决不復咨之於羣后也陛下以闗侯之親何如先帝荆州大小孰與海内俱應仇疾誰當先後若審此數易於反掌矣時或言瑾别遣親人與劉備相聞權曰孤與子瑜有死生不易之誓子瑜之不負孤猶孤之不負子瑜也陸遜亦表明瑾必無此宜有以散其意權報曰子瑜與孤從事積年恩如骨肉深相明䆒其為人非道不行非義不言元徳昔遣孔明至吳孤嘗語子瑜曰卿與孔明同産且弟之隨兄於義為順何以不留孔明孔明若留從卿者孤當以書觧元徳意自隨人耳子瑜答孤言弟亮已失身於人委質定分義無二心亮之不留猶瑾之不往也其言足貫神明今豈當有此乎孤前得妄語文疏即封示子瑜并手筆與子瑜即得其報論天下君臣大節一定之分孤與子瑜可謂神交非外言所間也知卿意至輙封来表以示子瑜使知卿意黄武元年遷左將軍督公安假節封宛陵侯虞翻以狂直流徙惟瑾屢為之説翻與所親書曰諸葛敦仁則天活物比䝉清論有以保分惡積罪深見忌殷重雖有祈老之救徳無羊舌觧釋難冀也瑾為人有容貌思度於時服其𢎞雅權甚重之每事使咨訪焉又别咨瑾曰近得伯言表以為曹丕已死毒亂之民當望旌瓦觧而更静然聞皆選用忠良寛刑罰布恩惠薄賦省役以悦民心其患更深於曹操時孤以為不然操之所行其惟殺伐小為過差及離間人骨肉以為酷耳至於將御自古少有比之丕之於操萬不及也今叡之不如丕猶丕之不如操也其所以務崇小惠必以其父新死自度衰㣲恐困苦之民一朝崩沮故彊屈曲以求民心欲自安爾寜是興隆之漸邪聞任陳長文曹子丹輩或文人諸生或宗室戚臣寜能御雄才虎將以制天下乎夫威柄不專則其事乖錯如昔張耳陳餘非不敦睦至於秉勢自還相賊乃事理使然也又張文之徒昔所以能守善者以操笮其頭畏操威嚴故竭心盡意不敢為非耳逮丕繼業年已長大承操之後以恩情加之用能感義今叡幼弱隨人東西此曹等輩必當因此弄巧行態阿黨比周各助所附如此之日奸讒並起更相陷懟轉成嫌貳一爾已往羣下争利主幼不御其為敗也焉得乆乎所以知其然者自古至今安有四五人把持刑柄而不離刺轉相蹄齧者也彊當陵弱弱當求援此亂亡之道也子瑜卿但側耳聽之伯言常長於計校恐此一事小短也權稱尊號拜大將軍左都䕶領豫州牧及吕壹誅權又有詔責瑾等以不直言極諫瑾輙因事以答辭順理正時瑾為吳大將軍而弟亮為蜀丞相二子恪融皆典戎馬督領將帥族弟誕又顯名於魏一門三方並為冠盖天下榮之瑾才畧雖不及弟而徳行尤純妻死不更娶有所愛妾生子不舉其篤慎如此恪名盛當世權深器異之然瑾常嫌之謂非保家之子每以憂戚赤烏四年年六十八卒遺命令素棺歛以時服事從省約恪已自封侯故弟融襲爵攝兵業駐公安秋冬則射獵講武春夏則延賓髙㑹休吏假卒或不逺千里而造焉融父兄質素雖在軍旅身無采飾而融錦罽文繡獨為奢綺孫權薨徙奮威將軍後恪征淮南假融節令引軍入沔以擊西兵恪既誅遣無難督施寛就將軍施績孫壹全熈等取融融卒聞兵士至惶懼猶豫不能决計先是公安有靈鼉鳴童謠云白鼉鳴龜背平南郡城中可長生守死不去義無成及兵到圍城融刮金印龜服之而死三子皆伏誅恪自有傳歩騭字子山臨淮淮隂人也世亂避地江東單身窮困與廣陵衛旌同年相善俱以種𤓰自給晝勤四體夜誦經傳㑹稽焦征羌郡之豪族征羌名矯嘗為征羌令人客放縱騭與旌求食其地懼為所侵乃共修刺奉𤓰以獻征羌征羌方在内卧駐之移時旌欲委去騭曰本所以来畏其彊也而今舎去欲以為髙袛結怨矣良乆征羌開牖見之身隐几坐帳中設席置地坐騭旌於牖外旌恥之騭神色自若征羌作食身享大案肴膳重㳫以小盤飯與騭旌惟菜茹而已旌不能食騭極飯致飽乃辭出旌怒騭曰何能忍此騭曰吾等貧賤是以主人以貧賤遇之固其宜也當何所恥衛旌字子旗後官至尚書孫權為討虜將軍召騭為主記除海鹽長還辟車騎將軍東曹掾建安十五年出領鄱陽太守徙交州刺史立武中郎將領武射吏千人便道南行明年追拜使持節征南中郎將劉表所置蒼梧太守吳巨隂懐異心外附内違騭降意懐誘請與相見因斬徇之威聲大震士爕兄弟列在諸郡相率供命南土之賓自此始也益州大姓雍闓等殺蜀所署太守正昻與爕相聞求欲内附騭因承制遣使宣恩撫納由是加平戎將軍封廣信侯延康元年權遣吕岱代騭騭將交州義士萬人出長沙㑹劉備東下武陵蠻夷蠢動權逆命騭上益陽備既敗績而零桂諸郡猶相驚擾處處阻兵騭周旋征討皆平之黄武二年遷右將軍左䕶軍改封臨湘侯五年假節徙屯漚口權稱尊號拜驃騎將軍領冀州牧是嵗都督西陵代陸遜撫二境頃以冀州在蜀分觧牧職時權太子登在武昌愛人好善以書與騭求令薦士騭條于時事業在荆州界者諸葛瑾陸遜朱然程普潘濬裴元夏侯承衛旌李肅周條石幹十一人甄别行狀因上疏奬勸太子使之拔任其後中書吕壹典校文書多所糾舉騭上疏言諸典校擿抉細微吹毛求瑕構陷大臣擅作威福為國大害可一切罷省權亦覺悟遂誅吕壹隲前後薦逹屈滯救觧患難書數十上權不能悉納然時採其言多䝉濟頼赤烏九年代陸遜為丞相猶誨育門生手不釋書被服居䖏有同儒生然門内妻妾服飾奢綺頗以此見譏在西陵二十年鄰敵敬其威信性寛𢎞得衆喜怒不形於聲色而内外肅然十一年卒子協嗣統騭所領加撫軍將軍協卒子璣嗣侯協弟闡繼業為西陵督加昭武將軍封西亭侯鳯皇元年召為繞帳督闡累世在西陵卒被徴命自以失職又懼有讒禍於是據城降晉遣璣與弟璿詣洛陽為任晉以闡為都督西陵諸軍事衞將軍儀同三司侍中假節領交州牧封宜都公璣監江陵諸軍事左將軍加散騎常侍領盧陵太守改封江陵侯璿給事中宣威將軍封都郷侯命車騎將軍羊祜荆州刺史楊肇往赴救闡孫皓使陸抗西行祜等遁退抗陷城斬闡等歩氏泯滅惟璿紹祀張紘字子綱廣陵人也少逰學京師入太學事博士韓宗治京氏易歐陽尚書又於外黄從濮陽闓受韓詩及禮記左氏春秋還本郡舉茂才公府辟皆不就避難江東值孫䇿創業遂委質焉表為正議校尉紘與張昭並與參謀常令一人居守一人從征討建安四年䇿遣紘奉章至許宫留為侍御史少府孔融等皆與親善曹公聞䇿薨欲因喪伐吳紘諫以為乗人之喪既非古義若其不克成讐棄好不如因而厚之曹公從其言即表權為討虜將軍領㑹稽太守曹公欲令紘輔權内附出紘為㑹稽東部都尉權初承統外難既多深懐憂懼每有異事宻計及章表書記與四方交結常令紘與張昭草創撰作權於羣臣多呼其字唯呼張昭曰張公紘曰東部所以重二人也後權以紘為長史從征合肥權率輕騎將往突敵紘諫曰夫兵者凶器戰者危事也今麾下恃盛壯之氣忽彊暴之虜三軍之衆莫不寒心雖斬將搴旗威震敵場此乃偏將之任非主將之宜也願麾下抑賁育之勇懐霸王之計權納紘言而止既還明年將復出軍紘又諫曰自古帝王受命之君雖有皇靈佐於上文徳播於下亦頼武功以昭其勲然而貴於時動乃後為威耳今麾下值四百之厄有扶危之功宜且隠息師徒廣開播殖任賢使能務崇寛惠順天命以行誅伐可不勞而定也於是遂止不行紘建計宜出都秣陵權從之令還吳迎家道病卒臨困授子靖留牋曰自古有國有家者咸欲修徳政以比隆盛世至於其治多不馨香非無忠臣賢佐闇於治體也由主不勝其情弗能用耳夫人情惮難而趨易好同而惡異與治道相反傳曰從善如登從惡如崩言善之難也人君承奕世之基據自然之勢假八柄之威甘易同之歡無假取於人而忠臣挟難進之術吐逆耳之言其不合也不亦宜乎雖則有釁巧辯緣間眩於小忠戀於恩愛賢愚雜錯長幼失叙其所由来情亂之也故明君悟之求賢如飢渇受諫而不厭抑情損欲以義割恩上無偏謬之授下無希冀之望宜加三思含垢藏疾以成仁覆之大時年六十卒權省書流涕紘著詩賦銘誄十餘篇又善楷篆為世所賞子元官至南郡太守尚書元子尚孫皓時為侍郎以言語辯捷見知擢為侍中中書令皓使尚鼓琴尚對曰素不能勅使學之皓他日説琴之精妙尚因言晉平公使師曠作清角曠曰吾君徳薄不足以聽之皓意謂尚諷已不説後積他事下獄皆追以此為詰送建安作船乆之又就加誅初紘與同郡秦松字文表陳端字子正並見待於孫䇿參與謀謨各早卒嚴畯字曼才彭城人也少耽學善詩書三禮又好説文避亂江東與諸葛瑾歩騭齊名友善性質直純厚其於人物忠告善道志存補益張昭進之於孫權權以為騎都尉從事中郎及横江將軍魯肅卒權以畯代肅督兵萬人鎮據陸口衆人咸為畯喜畯前後固辭言臣樸素書生不閑軍事非才而據咎悔必至發言慷慨至于流涕權乃聽焉世嘉其能以實讓權為吳王及稱尊號畯嘗為衛尉後使至蜀蜀相諸葛亮深善之不畜禄賜皆散之親戚知故家常不充廣陵劉頴與畯有舊頴精學家巷權聞徴之以疾不就其弟畧為零陵太守卒官頴往赴喪權知其詐病急驛収録畯亦馳語頴使還謝權權怒廢畯而頴得免罪乆之以畯為尚書令後卒時年七十八二子凱爽凱官至升平少府畯著孝經傳潮水論又與裴元張承論管仲季路皆傳於世元字彦黄下邳人也亦有學行官至太中大夫問子欽齊桓晉文夷惠四人優劣欽答所見與元相反覆各有文理欽與太子登遊䖏登每稱其翰采云程秉字徳樞汝南南頓人也逮事鄭元後避亂交州與劉熈考論大義遂博通五經士爕命為長史權聞其名儒以禮徴秉既到拜太子太傅黄武四年權為太子登聘周瑜女秉守太常迎妃於吳權親幸秉船深見優禮既還秉從容進説登曰婚姻人倫之始王化之基是以聖王重之所以率先衆庶風化天下故詩羙闗雎以為稱首願太子尊禮教於閨房存周南之所詠則道化隆於上頌聲作於下矣登曰將順其羙匡救其惡誠所頼於傅君也病卒官著周易摘尚書駮論語弼凡三萬餘言秉為傅時率更令河南徴崇亦篤學立行云闞澤字徳潤㑹稽山隂人也家世農夫至澤好學居貧無資常為人傭書以供紙筆所寫既畢誦讀亦徧追思論講究覽羣籍兼通歴數由是顯名察孝㢘除錢塘長遷郴令孫權為驃騎將軍辟補西曹掾及稱尊號以為尚書嘉禾中為中書令加侍中赤烏五年拜太子太傅領中書如故澤以經傳文多難得盡用乃斟酌諸家刋約禮文及諸注疏以授二宫為制行出入及見賓儀又著乾象歴注以正時日每朝廷大議經典所疑輙咨訪之以儒學勤勞封都鄉侯性謙恭篤慎宫府小吏呼召對問皆為抗禮人有非短口未嘗及容貌似不足者然所聞少窮權嘗問書傳篇賦何者為羙澤欲諷喻以明治亂因對賈誼過秦論最善權覽讀焉初以吕壹奸罪發聞有司窮治奏以大辟或以為宜加焚裂用彰元惡權以訪澤澤曰盛明之世不宜復有此刑權從之又諸官司有所患疾欲増重科防以檢御臣下澤每曰宜依禮律其和而有正皆此類也六年冬卒權痛惜感悼食不進者數日澤州里先輩丹陽唐固亦修身積學稱為儒者著國語公羊榖梁傳注講授常數十人權為吳王拜固議郎自陸遜張温駱統等皆拜之黄武四年為尚書僕射卒薛綜字敬文沛郡竹邑人也少依族人避地交州從劉熈學士爕既附孫權召綜為五官中郎將除合浦交趾太守時交土始開刺史吕岱率師討伐綜與俱行越海南征及到九真事畢還都守謁者僕射西使張奉於權前列尚書闞澤姓名以嘲澤澤不能答綜下行酒因勸酒曰蜀者何也有犬為獨無犬為蜀横目句身虫入其腹奉曰不當復列君吳邪綜應聲曰無口為天有口為吳君臨萬邦天子之都於是衆坐喜笑而奉無以對其樞機敏捷皆此類也吕岱從交州召出綜懼繼岱者非其人上疏曰昔帝舜南廵卒於蒼梧秦置桂林南海象郡然則四國之内屬也有自来矣趙佗起番禺懐服百越之君珠官之南是也漢武帝誅吕嘉開九郡設交趾刺史以監鎮之山川長逺習俗不齊言語同異重譯乃通民如禽獸長幼無别椎結徒跣貫頭左袵長吏之設雖有若無自斯以来頗徙中國罪人雜居其間稍使學書粗知言語使驛往来觀見禮化及後錫光為交趾太守任延為九真太守乃教其耕犂使之冠履為設媒官始知聘娶建立學校導之經義由此已降四百餘年頗有似類自臣昔客始至之時珠崖除州縣嫁娶皆須八月引户人民集㑹之時男女自相可適乃為夫妻父母不能止交趾糜泠九真都龎二縣皆兄死弟妻其嫂世以此為俗長吏恣聽不能禁制日南郡男女裸體不以為羞由此言之可謂蟲豸有靦面目耳然而土廣人衆阻險毒害易以為亂難使從治縣官覊縻示令威服田户之租賦裁取供辦貴致逺珍明珠香藥象牙犀角瑇瑁珊瑚琉璃鸚鵡翡翠孔雀竒物充備寳玩不必仰其賦入以益中國也然在九甸之外長吏之選類不精覈漢時法寛多自放肆故數反違法珠崖之廢起於長吏覩其好髪髠取為髲及臣所見南海黄盖為日南太守下車以供設不豐撾殺主簿仍見驅逐九真太守儋萌為妻父周京作主人并請大吏酒酣作樂功曹番歆起舞屬京京不肯起歆猶廹彊萌遂忿杖歆亡於郡内歆弟苖率衆攻府毒矢射萌萌至物故交趾太守士爕遣兵致討卒不能克又故刺史㑹稽朱符多以鄉人虞褒劉彦之徒分作長吏侵虐百姓彊賦於民黄魚一枚収稻一斛百姓怨叛山賊並出攻州突縣符走入海流離喪亡次得南陽張津與荆州牧劉表為隙兵弱敵彊嵗嵗興軍諸將厭患去留自在津小檢攝威武不足為所陵侮遂至殺没後得零陵頼恭恭先輩仁謹不暁時事表又遣長沙吳巨為蒼梧太守巨武夫輕悍不為恭所服故相怨恨遂逐出恭求依歩騭是時津故將夷廖錢博之徒尚多騭以次鉏治綱紀適定㑹仍召出吕岱既至有士氏之變越軍南征平討之日改置長吏章明王綱威加萬里大小承風由此言之綏邊撫裔實有其人牧伯之任既宜清能荒要之表禍福尤甚今日交州雖名粗定尚有髙涼宿賊其南海蒼梧鬰林珠官四郡境界未綏依作宼盗專為亡叛逋逃之藪若岱不復南新刺史宜得精宻檢攝八郡方畧智計能稍稍以漸平治髙凉者假其威寵借之形勢責其成効庶幾可補復如但中人僅守常法無竒數異術者則羣惡日滋乆逺成害故國之安危在於所任不可不察也竊惟朝廷忽輕其選故敢竭愚情以廣聖思黄龍三年建昌侯慮為鎮軍大將軍屯半州以綜為長史外掌衆事内授書籍慮卒入守賊曹尚書遷尚書僕射時公孫淵降而復叛權盛怒欲自親征綜上疏諫曰夫帝王者萬國之元首天下之所繫命也是以居則重門擊柝以戒不虞行則清道案節以養威嚴盖所以存萬安之福鎮四海之心昔孔子疾時託乗桴浮海之語季由斯喜拒以無所取才漢元帝欲御樓船薛廣徳請刎頸以血染車何則水火之險至危非帝王所宜渉也諺曰千金之子坐不垂堂况萬乗之尊乎今遼東戎貊小國無城池之固備禦之術器械銖鈍犬羊無政往必禽克誠如明詔然其方土寒埆榖稼不殖民習鞍馬轉徙無常卒聞大軍之至自度不敵鳥驚獸駭長驅奔竄一人匹馬不可得而見雖獲空地守之無益此不可一也加又洪流滉瀁有成山之難海行無常風波難免倐忽之間人船異勢雖有尭舜之徳智無所施賁育之勇力不得設此不可二也加以鬰霧㝠其上鹹水蒸其下善生流腫轉相洿染凡行海者稀無斯患此不可三也天生神聖顯以符瑞當乗平喪亂康此民物嘉祥日集海内垂定逆虜凶虐滅亡在近中國一平遼東自斃但當拱手以待耳今乃違必然之圖尋至危之阻忽九州之固肆一朝之忿既非社稷之重計又開闢以来所未嘗有斯誠羣僚所以傾身側息食不甘味寢不安席者也唯陛下抑雷霆之威忍赫斯之怒遵乗橋之安逺履氷之險則臣子頼祉天下幸甚時羣臣多諫權遂不行正月乙未權敕綜祝祖不得用常文綜承詔卒造文義信辭粲爛權曰復為兩頭使滿三也綜復再祝辭令皆新衆咸稱善赤烏三年遷選曹尚書五年為太子少傅領選職如故六年春卒凡所著詩賦難論數萬言名曰私載又定五宗圖述二京觧皆傳於世子珝官至威南將軍征交趾還道病死珝弟瑩字道言初為祕府中書郎孫休即位為散騎中常侍數年以病去官孫皓初為左執法遷選曹尚書及立太子又領少傅建衡三年皓追歎瑩父綜遺文且命瑩繼作瑩獻詩稱述祖父歸羙朝廷辭義可採皓嘉之是嵗何定建議鑿聖谿以通江淮皓令瑩督萬人往遂以多磐石難施功罷還出為武昌左部督後定被誅皓追聖谿事下瑩獄徙廣州右國史華覈上疏曰臣聞五帝三王皆立史官叙録功羙垂之無窮漢時司馬遷班固咸命世大才所撰精妙與六經俱傳大吳受命建國南土大皇帝末年命太史令丁孚郎中令項峻始撰吳書孚峻俱非史才其所撰作不足紀録至少帝時更差韋矅周昭薛瑩梁廣及臣五人訪求往事所共撰立備有本末昭廣先亡曜負恩蹈罪瑩出為將復以過徙其書遂委滯迄今未撰奏臣愚淺才劣適可為瑩等記注而已若使撰合必襲孚峻之跡懼墜大皇帝之元功損當世之盛羙瑩渉學既博文章尤妙同僚之中瑩為冠首今者見吏雖多經學記述之才如瑩者少是以慺慺為國惜之實欲使卒垂成之功編於前史之末奏上之後退填溝壑無所復恨皓遂召瑩遷為左國史頃之選曹尚書同郡繆褘以執意不移為羣小所疾左遷衡陽太守既拜又追以職事見詰責拜表陳謝因過詣瑩復為人所白云褘不懼罪多將賓客㑹聚瑩許乃収褘下獄徙桂陽瑩還廣州未至召瑩還復職是時法政多謬舉措煩苛瑩每上便宜陳緩刑簡役以濟育百姓事或施行遷光禄勲天紀四年晉軍征皓皓奉書於司馬伷王渾王濬請降其文瑩所造也瑩既至洛陽特先見叙為散騎常侍答問䖏當皆有條理太康三年卒著書八篇名曰新議瑩子兼晉史有傳周瑜字公瑾廬江舒人也從祖父景景子忠皆為漢太尉父異洛陽令瑜長壯有姿貌初孫堅興義兵討董卓徙家於舒堅子䇿與瑜同年獨相友善瑜推道南大宅以舎䇿升堂拜母有無通共瑜從父尚為丹陽太守瑜往省之㑹䇿將東渡到歴陽馳書報瑜瑜將兵迎䇿䇿大喜曰吾得卿諧也遂從攻横江當利皆拔之乃渡撃秣陵破笮融薛禮轉下湖熟江乗進入曲阿劉繇奔走而䇿之衆已數萬矣因謂瑜曰吾以此衆取吳㑹平山越已足卿還鎮丹陽瑜還頃之袁術遣從弟允代尚為太守而瑜與尚俱還夀春術欲以瑜為將瑜觀術終無所成故求為居巢長欲假塗東歸術聽之遂自居巢還吳是嵗建安三年也䇿親自迎瑜授建威中郎將即與兵二千人騎五十匹瑜時年二十四吳中皆呼為周郎以瑜恩信著於廬江出備牛渚後領春榖長頃之䇿欲取荆州以瑜為中䕶軍領江夏太守從攻皖拔之時得橋公二女皆國色也䇿自納大橋瑜納小橋䇿從容戲瑜曰橋公二女雖流離得吾二人作壻亦足為歡復進尋陽破劉勲討江夏還定豫章廬陵留瑜鎮巴邱五年䇿薨權統事瑜將兵赴喪因留吳以中䕶軍與長史張昭共掌衆事時曹操新破袁紹兵威甚盛七年下書責權任子權召羣臣㑹議張昭秦松等猶豫不能决權意不欲遣質乃獨將瑜入詣母前定議瑜曰昔楚國初封於荆山之側不滿百里之地繼嗣賢能廣土開境立基於郢遂據荆揚至於南海傳業延祚九百餘年今將軍承父兄餘資兼六郡之衆兵精糧多將士用命鑄山為錢煑海為鹽境内富饒人不思亂汎舟舉帆朝發夕到土風勁勇所向無敵有何逼廹而欲送質質一入不得不與曹氏相首尾與相首尾則命召不得不往如此受制於人極不過一侯印僕從十餘人車數乗馬數匹豈與南面稱孤同哉不如勿遣徐觀其變若曹氏能率義以正天下將軍事之未晚若圖為暴亂兵猶火也弗戢將自焚將軍韜勇抗威以待天命何送質之有權母曰公瑾議是也公瑾與伯符同年小一月耳我觀之如子也汝其兄事之遂不送質十一年督孫瑜等討麻保二屯梟其渠帥囚俘萬餘口還備官亭江夏太守黄祖遣將鄧龍將兵數千人入柴桑瑜追討擊之生虜龍送吳十三年春權討江夏以瑜為前部大督其年九月曹操入荆州劉琮舉衆降操得其水軍船歩兵數十萬與權書言水歩八十萬將東下將士聞之皆懼權大㑹羣臣問以計䇿張昭等議咸曰曹操豺虎也然託名漢相挟天子以征四方動以朝廷為辭今曰拒之事更不順且將軍大勢可以拒操者長江也今操得荆州奄有其地劉表所治水軍䝉衝鬭艦乃以千數操悉浮以沿江兼有歩兵水陸俱下此為長江之險己與我共之矣而勢力衆寡又不可論不如迎之為愈瑜曰不然操雖託名漢相其實漢賊也將軍以雄武之姿仗父兄之烈割據江東地方數千里兵精足用英豪樂業尚當横行天下為漢除殘去穢况操自送死而可迎之邪請為將軍籌之今使北土已安操無内憂能曠日持乆来爭疆場又能與我校勝負於舟楫可乎今北土既未平安加馬超韓遂尚在闗西為操後患且捨鞍馬仗舟楫與吳越爭衡本非中國所長又今盛寒馬無藁草驅中國士衆逺渉江湖之間不習水土必生疾病此數四者用兵之患也而操皆冒行之將軍擒操宜在今日瑜請得精兵三萬進住夏口保為將軍破之權曰老賊欲廢漢自立乆也徒忌二袁吕布劉表與孤耳今數雄已滅唯孤尚存孤與老賊勢不兩立君言當撃甚與孤合此天以君授孤也因拔刀斫前奏案曰諸將吏敢復有言迎操者與此案同乃罷㑹是夜瑜復見權曰諸人徒見操書言水歩八十萬而各恐懾不復料其虚實便開此議甚無謂也今以實校之彼所將中國人不過十五六萬且軍已乆疲所得表衆亦極七八萬耳尚懐狐疑夫以疲病之卒御狐疑之衆衆數雖多甚未足畏瑜得精兵五萬自足制之願將軍勿慮權撫其背曰公瑾卿言至此甚合孤心子布元表諸人各顧妻子挟持私慮深失所望獨卿與子敬與孤同耳此天以卿二人贊孤也五萬兵難卒合已選三萬人船糧戰具俱辦卿與子敬程公便在前發孤當續發人衆多載資糧為卿後援卿能辦之者誠决邂逅不如意便還就孤孤當與孟徳决之時劉備為曹操所破欲引兵南渡與魯肅遇於當陽遂共圖計因進住夏口遣諸葛亮詣權權遂遣瑜及程普等與備并力逆曹操遇於赤壁時操軍衆已有疾病初一交戰操軍敗退引次江北瑜等在南岸瑜部將黄盖曰今宼衆我寡難與持乆然觀操軍方連船艦首尾相接可焼而走也乃取䝉衝鬭艦數十艘實以薪草灌膏油其中以帷幕覆之建龍幡牙旗於艦上先書報曹操欺以欲降又豫備走舸各繋大船後因引次俱前操軍吏士皆引頸觀望指言盖降盖放諸船同時發火風猛火烈悉延焼岸上營落頃之煙炎張天人馬焼溺死者甚衆操軍遂敗退還保南郡備與瑜等復共追操操留曹仁等守江陵城徑自北歸瑜與程普又進至南郡與仁相對各隔大江兵未交鋒瑜即遣甘寜前據夷陵仁分兵騎别攻圍寜寜告急於瑜瑜用吕䝉計留凌統以守其後身與䝉上救寜寜圍既觧乃渡屯北岸克期大戰瑜親跨馬擽陳㑹流矢中右脇瘡甚便還後仁聞瑜卧未起勒兵就陣瑜乃自興案行軍營激揚吏士仁由是遂退權拜瑜偏將軍領南郡大守以下雋漢昌瀏陽州陵為奉邑屯據江陵劉備以左將軍領荆州牧治兵公安詣京見權瑜上啟曰劉備以梟雄之姿而有闗侯張飛熊虎之將必非乆屈為人用者愚謂大計宜徙備置吳盛為築宫室多其羙女玩好以娛其耳目昬其智識分此二人各置一方使如瑜者得挟與攻戰大事可定也今猥割土地以資其業聚此三人俱在疆場恐蛟龍得雲雨終非池中物也權以曹操在北方當廣擥英雄又恐備難卒制故不納是時劉璋為益州牧外有張魯侵宼瑜乃詣京見權曰今曹操新折衂方憂在腹心未能與將軍連兵相事也乞與奮威俱進取蜀得蜀而并張魯因留奮威固守其地與馬超結援瑜還與將軍據襄陽以䠞操北方可圖也權許之瑜還江陵為行裝而道於巴邱病卒時年三十六權素服發哀感慟左右喪當還吳又迎之蕪湖衆事費度一為供給初瑜見友於䇿太妃又使權以兄奉之是時權位為將軍諸將賓客為禮尚簡而瑜獨先盡敬便執臣節瑜性度恢廓大率為得人唯與程普不睦普頗以年長陵侮瑜瑜折節容下終不與校普後自敬服而親重之乃告人曰與周公瑾交若飲醇醪不覺自醉也始曹操聞瑜年少有羙才謂可游説動也乃密下揚州遣九江蔣幹往見瑜幹有儀容以才辯見稱獨歩江淮之間莫與為對乃布衣葛巾自託私行詣瑜瑜出迎之立謂幹曰子翼良苦逺渉江湖為曹氏説客邪幹曰吾與足下州里中間别隔遥聞芳烈故来敘濶并觀雅規而云説客無乃逆詐乎瑜曰吾雖不及䕫曠聞弦賞音足知雅曲也因延幹入為設酒食畢遣之曰適吾有密事且出就館事了别自相請後三日瑜請幹與周觀營中行視倉庫軍資器杖訖還飲宴示之侍者服飾珍玩之物因謂幹曰丈夫處世遇知己之主外託君臣之義内結骨肉之恩言行計從禍福共之假使蘇張更生酈叟復出猶撫其背而折其辭豈足下幼生所能移乎幹但笑終無所言幹還稱瑜雅量髙致非言辭所閒中州之士亦以此多之劉備之自京還也權乗飛雲大船與張昭秦松魯肅等十餘人共追送之大宴㑹敘别昭肅等先出權獨留與備語備因言次歎瑜曰公瑾文武籌畧萬人之英顧其器量廣大恐不乆為人臣耳瑜之破曹操也操曰孤不羞走後書與權曰赤壁之役值有疾病孤焼船自退横使周瑜虚獲此名瑜威聲逺著故備與操咸欲疑譖之後權稱尊號謂公卿曰孤非周公瑾不帝矣瑜少精意於音樂雖三爵之後其有闕誤瑜必知之知之必顧故時人謡曰曲有誤周郎顧瑜兩男一女女配太子登男循尚公主拜騎都尉有瑜風早卒循弟允初拜興業都尉妻以宗女授兵千人屯公安黄龍元年封都鄉侯後以罪徙廬陵郡赤烏二年諸葛瑾歩騭連名上疏列瑜勲績謂宜襃顯其後乞匄允餘罪還兵復爵以勸来者權尚未許㑹朱然及全琮亦俱陳乞權乃許之㑹允病死瑜兄子峻亦以瑜元功為偏將軍領吏士千人峻卒全琮表峻子䕶為將權曰昔走曹操拓有荆州皆是公瑾常不忘之初聞峻亡仍欲用䕶聞䕶性行危險用之適為作禍故便止之孤念公瑾豈有已乎魯肅字子敬臨淮東城人也生而失父與祖母居家富於財性好施與多賑窮弊肅體貌魁竒少有壯節好為竒計時天下已亂乃學擊劒騎射招聚少年摽賣田宅給其衣食往来南山中射獵隂相部勒講武習兵父老咸曰魯氏世衰乃生此狂兒周瑜為居巢長將數百人故過候肅并求資糧肅家有二囷米各三千斛肅乃指一囷與瑜瑜益知其竒也遂相親結定僑札之分袁術聞其名就署東城長肅見術無綱紀不足立事故不應命乃令其屬曰中國失綱宼賊暴横淮泗間非遺種之地吾聞江東沃野萬里國富兵彊可以避害寜肯相隨俱至樂土以觀時變乎其屬皆從命乃使細弱在前彊壯在後男女三百餘人行州追騎至肅等徐行勒兵持滿謂之曰卿等丈夫當觧大數今日天下兵亂有功不賞不追無罰何為相偪乎又自植盾引弓射之矢皆洞貫騎既嘉肅言且度不能制乃相率還肅南到居巢就周瑜瑜之東渡因與同行留家曲阿㑹祖母亡還葬東城劉子楊與肅友善遺肅書曰方今天下豪傑並起吾子姿才尤宜今日急還迎老母無事滯於東城近鄭寳者今在巢湖擁衆萬餘䖏地肥饒廬江間人多依就之况吾徒乎觀其形勢又可博集時不可失足下速之肅答然其計葬畢還曲阿欲北行㑹瑜已徙肅母到吳肅具以狀語瑜時孫䇿已薨權尚住吳瑜謂肅曰昔馬援答光武云當今之世非但君擇臣臣亦擇君今吾之主人親賢貴士納竒録異且吾聞先哲秘論承運代劉氏者必興於東南推歩事勢當其歴數終構帝基以協天符正烈士攀龍附鳯馳騖之秋吾方逹此足下不須以子楊之言介意也肅從其言瑜因薦肅才宜佐時當廣求其比以成功業不可令去也權即召肅與語甚悦之衆賓罷退肅亦辭出權乃獨引肅還合榻對飲因密議曰今漢室傾危四方雲擾孤承父兄遺業思有桓文之功君既惠顧何以佐之肅對曰昔髙帝區區欲尊事義帝而不獲者以項羽為害也今之曹操猶昔項羽將軍何由得為桓文乎肅竊料之漢室不可復興曹操不可卒除為將軍計唯有鼎足江東以觀天下之釁規模如此亦自無嫌何者北方誠多務也因其多務勦除黄祖進代劉表亘長江所極據而有之然後建號帝王以圖天下此髙帝之業也權曰今盡力一方冀以輔漢耳此言非所及也張昭非肅謙下不足頗訾毁之云肅年少麤疎未可用權不以介意益貴重之賜肅母衣服幃帳居處雜物富擬其舊及劉表死肅進説曰荆楚與國隣接水流順北外帯江漢内阻山陵有金城之固沃野萬里士民殷富若據而有之此帝王之資也今表新亡二子素不輯睦軍中諸將各有彼此加劉備天下雄梟與操有隙寄寓於表表惡其能而不能用也若備與彼協心上下齊同則宜撫安與結盟好如有違離宜别圖之以濟大事肅請得奉命弔表二子并慰勞其軍中用事者及説備使撫表衆同心一意共圖曹操備必喜而從命如其克諧天下可定也今不速往恐為操所先權即遣肅行到夏口聞曹操已向荆州晨夜兼道比至南郡而表子琮已降曹操備惶遽奔走欲南渡江肅徑迎之到當陽長阪與備㑹宣騰權㫖及陳江東彊固勸備與權并力備甚歡悦時諸葛亮與備相隨肅謂亮曰我子瑜友也即共定交備遂到夏口遣亮使權肅亦返命㑹權得曹操欲東之問與諸將議皆勸權迎之而肅獨不言權起更衣肅追于宇下權知其意執肅手曰卿欲何言肅對曰向察衆人之議專欲誤將軍不足與圖大事今肅可迎操耳如將軍不可也何以言之今肅迎操操當以肅還付鄉黨品其名位猶不失下曹從事乗犢車從吏卒交遊士林累官故不失州郡也將軍迎操欲安所歸乎願早定大計莫用衆人之議也權歎息曰諸人持議甚失孤望今卿廓開大計正與孤同此天以卿賜我也時周瑜受使至鄱陽肅勸追召瑜還遂任瑜以行事以肅為贊軍校尉助畫方畧及曹操破走肅即先還權大請諸將迎肅肅將入閤拜權起迎而禮之因謂曰子敬孤持鞍下馬相迎足以顯卿未肅趨進曰未也衆人聞之無不愕然就坐徐舉鞭言曰願至尊威徳加乎四海總括九州克成帝業更以安車軟輪徴肅始當顯耳權撫掌大笑後備詣京見權求都督荆州惟肅勸權借之共拒曹操操聞權以土地業備方作書落筆於地周瑜病困上疏曰當今天下方有事役是瑜乃心夙夜所憂願至尊先慮未然然後康樂今既與曹操為敵劉備近在公安邊境密邇百姓未附宜得良將以鎮撫之魯肅智畧足任乞以代瑜瑜殞踣之日所懐盡矣即拜肅奮武校尉代瑜領兵瑜士衆四千餘人奉邑四縣皆屬焉令程普領南郡太守肅初住江陵後下屯陸口威恩大行衆増萬餘人拜漢昌太守偏將軍十九年孫權破皖城轉横江將軍先是益州牧劉璋綱維頽弛周瑜甘寜並勸權取蜀權以咨備備内欲自規乃偽報曰備與璋託為宗室兾慿威靈以匡漢朝今璋得罪左右備獨竦懼非所敢聞願加寛貸若不獲請備當被髪歸於山林後備西圖璋留闗侯守江陵權曰猾虜乃敢挟詐及侯與肅鄰界數生狐疑疆場紛錯肅常以歡好撫之備既定益州權求長沙零桂備不承㫖權遣吕䝉率衆進取備聞之自還公安遣侯爭三郡肅住益陽與侯相拒肅要侯相見各駐兵馬百歩上但諸將軍單刀俱㑹肅因數責闗侯曰烏林之役左將軍身在行間寢不脫介戮力破魏豈得徒勞無一塊壤而足下来欲収地邪肅曰不然始與豫州覲於長阪豫州之衆不當一校計窮慮極志摧勢弱圖欲逺竄主上矜愍豫州之身無有處所不愛土地士民之力使有所庇廕以濟其患而豫州私獨飾情愆徳隳好今已藉手於西州矣又欲翦并荆土斯盖凡夫所不忍行而況整頓人物之主乎肅聞貪而棄義必為禍階吾子屬當重任不能明道䖏分以義輔時而負恃弱衆以圖力爭師曲為老將何獲濟侯無以答備遂割湘水為界於是罷軍肅至鎮卒實建安二十二年也年四十六權為舉哀又臨其葬諸葛亮亦為發哀及權稱尊號臨壇顧謂公卿曰昔魯子敬嘗道此可謂明於事勢矣肅遺腹子淑既壯濡須督張承謂終當逺到至永安中為昭武將軍都亭侯武昌督建衡中假節遷夏口督所在嚴整有方幹鳯皇三年卒子睦襲爵領兵馬吕䝉字子明汝南富陂人也少南渡依姊夫鄧當當為孫䇿將數討山越䝉年十五六竊隨當擊賊當顧見大驚呵叱不能禁止歸以告䝉母母恚欲罰之䝉曰貧賤難可居脱誤有功富貴可致且不探虎穴焉得虎子母哀而舎之時當職吏以䝉年少輕之曰孺子何能為此欲以肉餧虎耳他日與䝉㑹又嗤辱之䝉大怒引刀刺之出走逃于邑子鄭長家因校尉袁雄自首雄承間為言於孫䇿䇿召見竒之引置左右数年鄧當死張昭薦䝉代當拜别部司馬權統事料諸小將兵少而用薄者欲并合之䝉隂賖貰為兵作絳衣行縢及簡日陳列赫然兵人練習權見之大悦増其兵從討丹陽所向有功拜平北都尉領廣徳長從征黄祖祖令都督陳就逆以水軍出戰䝉勒前鋒親梟就首將士乗勝進攻其城祖聞就死委城走兵追禽之權曰事之克由陳就先獲也以䝉為横野中郎將賜錢千萬是嵗又與周瑜程普等西破曹操於烏林圍曹仁於南郡益州將襲肅舉軍来附瑜表以肅軍益䝉䝉盛稱肅有膽用且慕化逺来於義宜益不宜奪也權善其言還肅兵瑜使甘寜前據夷陵曹仁分衆圍寜寜困急使使請救諸將以兵少不足分䝉謂瑜普曰留淩公績䝉與君行觧圍釋急勢亦不乆䝉保公績能十日守也又説瑜分遣三百人柴斷險道賊走可得其馬瑜從之軍到夷陵即日交戰所殺過半敵夜遁去行遇柴道騎皆舎馬歩走兵追蹙擊獲馬三百匹方船載還於是將士形勢百倍乃渡江立屯與相攻擊曹仁退走遂據南郡撫定荆州還拜偏將軍領尋陽令魯肅代周瑜當之陸口過䝉屯下肅意尚輕䝉或説肅曰吕將軍功名日盛不可以故意待也君宜顧之遂往詣䝉酒酣䝉問肅曰君受重任與闗羽為隣將何計畧以備不虞肅造次應曰臨時施宜䝉曰今東西雖為一家而闗羽實熊虎也計安可不豫定因為肅畫五䇿肅於是越席就之撫其背曰吕子明吾謂大弟但有武畧耳至於今者學識英博非復吳下阿䝉䝉曰士别三日即更刮目相待大兄今論何一稱穰侯乎肅遂拜䝉母結友而别初權謂䝉及蔣欽曰卿今並當塗掌事宜學問以自開益䝉曰軍中常苦多務不容復讀書權曰孤豈欲卿治經為博士邪但當令渉獵見往事耳卿言多務孰若孤孤少時歴覽詩書禮記左傳國語唯不讀易至統事以来省三史諸家兵書自以為大有所益如卿二人意性朗悟學必得之寜當不為乎宜急讀孫子六韜左傳國語及三史孔子言終日不食終夜不寢以思無益不如學也光武當兵馬之務手不釋卷孟徳亦自謂老而好學卿何獨不自勉朂邪䝉始就學篤志不倦其所覽見舊儒不勝權後嘗歎曰人長而進益如吕䝉蔣欽盖不可及也時䝉與成當宋定徐顧屯次比近三將死子弟幼弱權悉以兵幷䝉䝉固辭陳啟顧等皆勤勞國事子弟雖小不可廢也書三上權乃聽䝉於是又為擇師使輔導之其操心率如此魏使廬江謝竒為蘄春典農屯皖田數為邊宼䝉使人誘之不從則伺隙襲撃之竒遂退縮其部伍孫子才宋豪等皆攜負老弱詣䝉降後從權拒曹操於濡湏數進竒計又勸權夹水口立塢諸將皆曰上岸擊賊洗足入船何用塢為䝉曰兵有利鈍戰無百勝如有邂逅敵歩騎蹙人不暇及水其得入船乎權曰善乃作塢曹操不能下而退遂使朱光為廬江太守屯皖大開稻田又令閒人招誘鄱陽賊帥使作内應䝉曰皖田肥羙若一収熟彼衆必増如是數嵗操態見矣宜早除之乃具陳其収於是權親征皖引見諸將問以計䇿諸將皆勸作土山添攻具䝉趨進曰治攻具及土山必歴日乃成城備既修外救必至不可圖也且乗雨水以入若留經日水必向盡還道艱難䝉竊危之今觀此城不能甚固以三軍鋭氣四面並攻不移時可拔及水以歸全勝之道也權從之䝉薦甘寜為升城督督攻在前䝉以精鋭繼之侵晨進攻䝉手執枹鼓士卒皆騰踴自升食時破之既而張遼至夹石聞城已拔乃退權嘉其功即拜廬江太守所得人馬皆分與之别賜尋陽屯田六百户官屬三十人䝉還尋陽未期而廬陵賊起諸將討撃不能禽權曰鷙鳥累百不如一鶚復令䝉討之䝉至誅其首惡餘皆悉放復為平民是時劉備令闗侯鎮守專有荆土權命䝉西取長沙零桂三郡䝉移書二郡望風歸服唯零陵太守郝普城守不降而備自蜀親至公安遣侯爭三郡權時住陸口使魯肅將萬人屯益陽拒侯而飛書召䝉使捨零陵急還助肅初䝉既定長沙當之零陵過酃載南陽鄧元之元之者郝普之舊也欲令誘普反被書當還䝉祕之夜召諸將授以方畧晨當攻城顧謂元之曰郝子太聞世間有忠義事亦欲為之而不知時也左將軍在漢中為夏侯淵所圍闗侯在南郡今至尊身自臨之近者破樊本屯救酃逆為孫規所破此皆目前之事君所親見也彼方首尾倒縣救死不給豈有餘力復營此哉今吾士卒精鋭人思致命至尊遣兵相繼於道今子太以旦夕之命待不可望之救猶牛蹄中魚冀頼江漢其不可恃亦明矣若子太必能一士卒之心保孤城之守尚能稽延旦夕以待所歸者可也今吾計力度慮而以攻此曽不移日而城必破城破之後身死何益於事而令百嵗老母戴白受誅豈不痛哉度此家不得外問謂援可恃故至於此耳君可見之為陳禍福元之見普具宣䝉意普懼而聽之元之先出報䝉普尋後當至䝉豫勅四將各選百人普出便入守城門須臾普出䝉迎執其手與俱下船語畢出書示之因撫手大笑普見書知備在公安而羽在益陽慙恨入地䝉留孫河委以後事即日引軍赴益陽備請盟權乃歸普等割湘水為界以零陵還之以尋陽陽新為䝉奉邑師還遂征合肥既徹兵為張遼等所襲䝉與凌統以死扞衛後曹操又大出濡須權以䝉為督據前所立塢置强弩萬張於其上以拒曹操操前鋒屯未就䝉發弩攻破之操引退拜䝉左護軍虎威將軍魯肅卒䝉遂西屯陸口肅軍人馬萬餘盡以屬焉又拜漢昌太守食下雋瀏陽漢昌州陵與闗侯分土接境知侯驍雄有并兼心且居國上流其勢難乆初魯肅等以為曹操尚存禍難始構宜相輔協與之同仇不可失也䝉乃密陳計䇿曰今征虜守南郡潘璋住白帝蔣欽將游兵萬人循江上下應敵所在䝉為國家前據襄陽如此何憂於操何賴於侯且侯君臣矜其詐力所在反覆不可以腹心待也今侯所以未便東向者以至尊聖明䝉等尚存也今不於彊壯時圖之一旦僵仆欲復陳力其可得邪權深納其䇿又聊復與論取徐州意䝉對曰今操逺在河北新破諸袁撫集幽冀未暇東顧徐土守兵聞不足言往自可克然地勢陸通驍騎所騁至尊今日得徐州操後旬必来争雖以七八萬人守之猶當懐憂不如取侯全據長江形勢益張權尤以此言為當及䝉代肅初至陸口外倍修恩厚與侯結好後侯討樊留兵將備公安南郡䝉上疏曰侯討樊而多留備兵必恐䝉圖其後故也䝉常有病乞分士衆還建業以治疾為名侯聞之必撤備兵盡赴襄陽大軍浮江晝夜馳上襲其空虚則南郡可下而侯可禽也遂稱疾篤權乃露檄召䝉還隂與圖計侯果信之稍撤兵以赴樊魏使于禁救樊侯盡禽禁等人馬數萬託以糧乏擅取湘闗米權聞之遂行先遣䝉在前䝉至尋陽盡伏其精兵􅖻􅑳中使白衣摇櫓作商賈人服晝夜兼行至侯所置江邊屯候盡収縳之是故侯不聞知遂到南郡士仁麋芳先與侯有隙皆降䝉入據城盡得侯及將士家屬皆撫慰之約令軍中不得干歴人家有所求取䝉麾下士是汝南人取民家一笠以覆官鎧官鎧雖公䝉猶以為犯軍令不可以卿里故而廢軍法遂垂涕斬之於是軍中震慄道不拾遺䝉旦暮使親近存恤耆老問所不足疾病者給醫藥飢寒者賜衣糧城中大悦侯府藏財寳皆封閉以待權至侯還在道路數使人與䝉相聞䝉輙厚遇其使周游城中家家致問或手書示信侯人還私相參訊咸知家門無恙見待過於平時故侯吏士無鬭心㑹權尋至侯自知孤窮乃走麥城西至漳郷衆皆委侯而降權使朱然潘璋斷其徑路侯父子俱禽荆州遂定權大㑹於公安以䝉為南郡太守封孱陵侯乃増給歩騎鼓吹勅選虎威將軍官屬并南郡廬江二郡威儀拜畢還營兵馬導從前後鼓吹光曜于路仍賜錢一億黄金五百斤䝉固辭金錢權不許封爵未下㑹䝉疾發權時在公安迎置内殿所以治䕶者萬方募封内有能愈䝉疾者賜千金時有鍼加權為之慘戚欲數見其顔色又恐其勞動常穿壁瞻之見小能下食則喜顧左右言笑不然則咄嗟夜不能寐病中瘳為下赦令羣臣畢賀後更増篤權自臨視命道士於星辰下為之請命時年四十二遂卒於内殿權哀痛甚為之降損䝉未死時所得金寳諸賜盡付府藏勅主者命絶之日皆上還喪事務約權聞之益以悲感䝉少不修書傳每陳大事常口占為牋疏嘗以部曲事為江夏太守蔡遺所白䝉無恨意及豫章太守顧邵卒權問所用䝉因薦遺奉職佳吏權笑曰君欲為祁奚邪於是用之甘寜麤暴好殺既嘗失䝉意又時違權令權怒之䝉輙陳請云天下未定鬭將如寜難得宜容忍之權遂厚寜卒得其用䝉子霸襲爵與守冡三百家復田五十頃覇卒兄琮襲侯琮卒弟睦嗣孫權與陸遜論周瑜魯肅及䝉曰公瑾雄烈膽畧兼人遂破孟徳開拓荆州邈焉難繼君今繼之公瑾昔要子敬来東致逹於孤孤與宴語便及大畧帝王之業此一快也後孟徳因獲劉琮之勢張言方率數十萬衆水歩俱下孤普請諸將咨問所宜無適先對至子布文表俱言宜遣使修檄迎之子敬即駮言不可勸孤急呼公瑾付任以衆逆而擊之此二快也且其决計䇿意出蘓張逺矣後雖勸吾借元徳地是其一短不足以損其二長也周公不求備於一人故孤忘其短而貴其長常以比方鄧禹也又子明少時孤謂不辭劇易果敢有膽而已及身長大學問開益籌畧竒至可以次於公瑾但言議英發不及之耳圖取闗侯勝於子敬子敬答孤書云帝王之起皆有驅除闗不足忌此子敬内不能辦外為大言耳孤亦恕之不茍責也然其作軍屯營不失令行禁止部界無廢負路無拾遺其法亦羙也程普字徳謀右北平土垠人也初為州郡吏有容貌計畧善於應對從孫堅征伐討黄巾於宛鄧破董卓於陽人攻城野戰身被瘡夷堅薨復隨䇿在淮南從攻廬江拔之還俱東渡䇿到横江當利破張英于麋等轉下秣陵湖熟句容曲阿普皆有功増兵二千騎五十匹進破烏程石木波門陵傳餘杭普功為多䇿入㑹稽以普為吳郡都尉治錢唐後徙丹陽都尉居石城復討宣城涇安吳陵陽春榖諸賊皆破之䇿常攻祖郎大為所圍普與一騎共蔽扞䇿驅馬疾呼以矛突賊賊披靡䇿因隨出後拜盪宼中郎將領零陵太守從討劉勲於尋陽進攻黄祖於沙羡還鎮石城䇿薨與張昭等共輔孫權遂周旋三郡平討不服又從征江夏還過豫章别討樂安樂安平定代太史慈備海昬與周瑜為左右督破曹公於烏林又進攻南郡走曹仁拜裨將軍領江夏太守治沙羡食四縣先出諸將普最年長人皆呼程公性好施與喜士大夫周瑜卒代領南郡太守權分荆州與劉備普復還領江夏遷盪宼將軍卒權稱尊號追論普功封子咨為亭侯黄盖字公覆零陵泉陵人也少孤貧常以負薪餘閑學書疏講兵事初為郡吏察孝廉辟公府孫堅舉義兵盖從征伐堅南破山賊北走董卓拜盖為别部司馬堅薨盖隨䇿及權擐甲周旋蹈刃屠城諸山越不賓有宼難之縣輙用盖為守長石城縣吏特難檢御盖乃署兩掾分主諸曹教曰令長不徳徒以武功為官不以文吏為稱今宼賊未平有軍旅之務一以文書委付兩掾當檢攝諸曹紏擿謬誤兩掾所署事入諾出若有姦欺終不加以鞭杖各宜盡心無為衆先初皆怖威夙夜恭職乆之吏以盖不視文書漸容人事盖亦嫌外懈怠時有所省各得兩掾不奉法數事乃悉請諸掾吏賜酒食因出事詰問兩掾辭屈皆叩頭謝罪盖曰前已相勅不以鞭杖相加非相欺也遂殺之縣中震慄後轉春榖長尋陽令凡守九縣所在平定遷丹陽都尉抑彊扶弱山越懐附盖姿貌嚴毅善於養衆每所征討士卒皆爭先為用建安中隨周瑜攻曹操於赤壁建䇿火攻語在瑜傳拜武鋒中郎將武陵蠻夷反亂攻破城邑乃以盖領太守時郡兵才五百人盖自以不敵因開城門賊半入乃撃之斬首數百餘皆奔走盡歸邑落誅討魁帥其附從者赦之自春訖夏宼亂盡平諸幽䆳巴醴由誕邑侯君長皆改操易節奉禮請見郡境遂清後長沙益陽縣為山賊所攻盖又平討之加偏將軍病卒官盖當官决斷事無留滯國人思之及權踐阼追論其功賜子柄爵闗内侯韓當字義公遼西令支人也以便弓馬有膂力幸於孫堅從征伐周旋數犯危難陷敵擒虜為别部司馬及孫䇿東渡從討三郡遷先登校尉授兵二千騎五十匹從征劉勲破黄祖還討鄱陽領樂安長山越畏服後以中郎將與周瑜等拒破曹操又與吕䝉襲取南郡遷偏將軍領永昌太守宜都之役與陸遜朱然等共攻蜀軍於涿鄉大破之徙威烈將軍封都亭侯曹真攻南郡當保東南在外為帥厲將士同心固守又敬望督司奉遵法令權善之黄武二年封石城侯遷昭武將軍領冠軍太守後又加都督之號將敢死及觧煩兵萬人討丹陽賊破之㑹病卒子綜襲侯領兵其年權征石陽以綜有憂使守武昌而綜淫亂不軌權雖以父故不問綜内懐懼載父喪將母家屬部曲男女數千人奔魏魏以為將軍封廣陽侯數犯邊境殺害人民權常切齒之東興之役綜為前鋒軍敗身死諸葛恪斬送其首以白權廟蔣欽字公奕九江夀春人也孫䇿之襲袁術欽隨從給事及䇿東渡拜别部司馬授兵與䇿周旋平定三郡又從定豫章調授葛陽尉歴三縣長討平盜賊遷西部都尉㑹稽妖賊吕合秦狼等為亂欽將兵討撃遂禽合狼五縣平定徙討越中郎將以涇拘昭陽為奉邑賀齊討黝賊欽督萬兵與齊并力黝賊平定從征合肥魏將張遼襲權於津北欽力戰有功遷盪宼將軍領濡須督後召還都拜津右䕶軍典領辭訟權嘗入其堂内見欽母綀帳縹被妻妾布裙權歎其在貴守約即勅御府為母作錦被改易帷帳妻妾衣服悉皆錦繡初欽屯宣城嘗討豫章賊蕪湖令徐盛収録屯吏表斬之權以欽在逺不許盛由是自嫌於欽曹操出濡須欽與吕䝉持諸軍節度盛常畏欽因事害己而欽每稱其善盛既服徳論者羙焉權討闗羽欽督水軍入沔還道病卒權素服舉哀以蕪湖民二百户田二百頃給欽妻子子壹封宣城侯領兵拒劉備有功還赴南郡與魏交戰臨陣卒壹無子弟休領兵後有罪失業周泰字幼平九江下蔡人也與蔣欽俱隨孫䇿為左右服事恭敬數戰有功䇿入㑹稽署别部司馬授兵權愛其為人請以自給䇿討六縣山賊權住宣城使士自衛不能千人意尚忽畧不治圍落而山賊數千人卒至權始得上馬而賊鋒刃已交於左右或斫權中馬鞍衆莫能自定唯泰奮激投身衛權膽氣倍人左右由泰並能就戰賊既觧散身被十二創良乆乃蘇是日無泰權幾危殆䇿深徳之補春榖長從攻皖及討江夏還過豫章復補宜春長所在皆食其征賦從討黄祖有功復與周瑜程普拒曹操於赤壁攻曹仁於南郡荆州平定將兵屯岑曹操出濡湏泰復赴撃操退留督濡須拜平虜將軍時朱然徐盛等皆在所部以泰寒門並不伏權特為案行至濡須塢因㑹諸將大為酣樂權自行酒到泰前命觧衣權手自指其創痕問以所起泰輙記昔戰鬭䖏以對畢使復服權把其臂因流涕字之曰幼平卿為孤兄弟戰如熊虎不惜軀命被創數十膚如刻畫孤亦何心不待卿以骨肉之恩委卿以兵馬之重乎復命坐歡讌極夜其明日遣使者授以御盖於是盛等乃伏後權破闗羽欲進圖蜀拜泰漢中太守奮威將軍封陵陽侯黄武中卒子邵以騎都尉領兵曹仁出濡須邵戰有功又從破曹休進位裨將軍黄龍二年卒弟承領兵襲侯陳武字子烈廬江松滋人也孫䇿在夀春武往修謁時年十八長七尺八寸因從渡江征討有功拜别部司馬䇿破劉勲多得廬江人料其精鋭乃以武為督所向無前及權統事轉督五校武仁厚好施鄉里逺方客多依託之尤為權所親愛數至其家累有功勞進位偏將軍建安二十年從撃合肥奮命戰死權哀之命以其愛妾殉葬自臨其葬復客二百家子修有武風年十九權召見奨厲拜别部司馬授兵五百人時諸將新兵多有逃叛而修撫循得意不失一人權竒之拜為校尉建安末追録功臣後封修都亭侯為觧煩督黄龍元年卒弟表字文奧武庶子也少知名與諸葛恪顧譚張休等並侍東宫皆共親友尚書暨豔亦與表善後豔遇罪時人咸自營䕶信厚言薄表獨不然士以此重之徙太子中庶子拜翼正都尉兄修亡後表母不肯事修母表謂其母曰兄不幸早亡表統家事當奉嫡母母若能為表屈情承順嫡母者是至願也若母不能直當出别居耳表於大義公正如此由是二母感悟雍穆表以父死敵場求用為將領兵五百人表欲得戰士之力傾意接待士皆愛附樂為用命時有盗官物者疑無難士施明明素壯悍収栲極毒唯死無辭廷尉以聞權以表能得健兒心詔以明付表使自以意求其情實表便破械沐浴易其衣服厚設酒食歡以誘之明乃首服具列支黨表以状聞權深竒之欲全其名特為赦明而誅其黨遷表為無難右部督封都亭侯以繼舊爵表皆陳譲乞以傳修子延權不許嘉禾三年諸葛恪領丹陽太守討平山越以表領新安都尉與恪參勢初表所受賜復人得二百家在㑹稽新安縣表簡視其人皆堪好兵乃上疏陳讓乞以還官充足精鋭詔曰先將軍有功於國國家以此報之卿何得辭焉表乃稱曰今除國賊報父之仇以人為本空枉此勁鋭以為僮僕非表志也皆輙料取以充部伍所在以聞權甚嘉之下郡縣料正户羸民以補其䖏表在官三年廣開降納得兵萬餘人事㨗當出㑹鄱陽民吳遽等為亂攻沒城郭屬縣摇動表便越界赴討遽以破敗遂降陸遜拜表偏將軍進封都郷侯北屯章阮年三十四卒家財盡於養士死之日妻子露立太子登為起屋宅子敖年十七拜别部司馬授兵四百人敖卒修子延復為司馬代敖延弟永將軍封侯始施明感表自變行為善遂成健將致位將軍董襲字元代㑹稽餘姚人也身長八尺武力過人孫䇿入郡襲迎於髙遷亭䇿見而偉之到署門下賊曹時山隂宿賊黄龍羅周勃聚黨數千人䇿自出討襲身斬羅勃首還拜别部司馬授兵数千遷揚武都尉從䇿攻皖又討劉勲於尋陽伐黄祖於江夏䇿薨權年少初統事太妃憂之引見張昭及襲問江東可保安否襲對曰江東之勢有山川之固而討逆明府恩徳在民討虜承基大小用命張昭秉衆事襲等為𤓰牙此地利人和之時也萬無所憂衆皆壯其言鄱陽賊彭虎等衆數萬人為亂襲與凌統歩騭蔣欽各别分討襲所向輙破虎等望見襲旌旗便散走旬日盡平拜威越校尉遷偏將軍建安十三年從權討黄祖祖横兩䝉衝挟守沔口以栟櫚大紲繋石為矴上有千人以弩交射飛矢雨下軍不得前襲與凌統俱為前部各將敢死百人人被兩鎧乗大舸船突入䝉衝裏襲身以刀斷兩紲䝉衝乃横流大兵遂進祖便開門走兵追斬之明日大㑹權舉觴屬襲曰今日之㑹斷紲之功也後曹操出濡須襲從權赴之權使襲督五樓船住濡須口夜卒暴風五樓船傾覆左右散走小舸乞使襲出襲怒曰受將軍任在此備賊何等委去也敢復言此者斬於是莫敢干其船其夜船敗襲死權改服臨殯供給甚厚甘寜字興覇巴郡臨江人也少有氣力好遊侠招合輕薄少年為之渠帥羣聚相隨挟持弓弩負眊帯鈴民聞鈴聲即知是寜其出入也歩則陳車騎水則連輕舟侍從被文繡所往光道路住止常以繒錦維舟去或割棄以示奢也人與相逢及屬城長吏接待隆厚者乃與交歡不爾即放縱所將奪其資貨於長吏界中有所賊害作其發負至二十餘年止不攻刼頗讀諸子乃將僮客八百人往依劉表因居南陽表儒人不習軍事時諸英豪並起寜觀表事勢終必無成恐一朝土崩并受其禍欲東入吳黄祖在夏口軍不得過乃留依祖祖三年不禮之孫權討祖祖軍敗奔走追兵急寜以善射將兵在後射殺權校尉凌操祖既得免軍罷還營待寜如初祖都督蘇飛數薦寜祖不用令人化諉其客客稍亡寜欲去恐不獲免獨憂悶不知所出飛知其意乃要寜為之置酒謂曰吾薦子者數矣主不能用日月逾邁人生幾何宜自逺圖庶遇知己寜良乆乃曰雖有其志未知所由飛曰吾欲白子為邾長於是去就孰與臨阪轉丸乎寜曰幸甚飛白祖聽寜之縣寜遂招懐亡客并義從者得数百人與歸吳周瑜吕䝉並薦於孫權權加異之同於舊臣寜陳計曰今漢祚日㣲曹操彌憍終為簒盗南荆之地山陵形便江川流通誠是國之西勢也寜已觀劉表慮既不逺兒子又劣非能承業傳基者也至尊宜早規之不可後操圖之圖之之計宜先取黄祖祖今年老昏耄已甚財榖並乏左右欺弄務於貨利侵求吏士吏士心怨舟船戰具頓廢不修怠於耕農軍無法伍至尊今往其破可必一破祖軍鼓行而西西據楚闗大勢彌廣即可漸窺巴蜀權深納之張昭在坐難曰吳下業業若軍果行恐必致亂寜謂昭曰國家以蕭何之任付君君居守而憂亂奚以希慕古人乎權舉酒屬寜曰興覇今年行討如此酒矣決以付卿卿當勉建方畧令必克祖則卿之功何嫌張長史之言乎權遂西行果禽祖盡獲其士衆遂授寜兵屯當口權之破祖也先作兩函欲以盛祖及蘇飛首飛令人告急於寜寜曰飛若不言吾豈忘之權為諸將置酒寜下席叩頭血涕交流為權言飛疇昔舊恩寜不值飛固已捐骸於溝壑不得致命於麾下今飛罪當夷戮特從將軍乞其首領權感其言謂曰今為君置之若走去何寜曰飛免分裂之禍受更生之恩逐之尚必不走豈圖亡哉若爾寜頭當代入函權乃赦之寜後隨周瑜拒破曹操於烏林攻曹仁於南郡未拔寜建計先徑取夷陵往即得其城因入守之時手下有數百兵并所新得僅滿千人曹仁乃令五六千人圍寜寜受攻累日敵設髙楼雨射城中士衆皆懼唯寜談笑自若遣使報瑜瑜用吕䝉計帥諸將觧圍後隨魯肅鎮益陽拒闗侯侯號有三萬人自選精鋭五千人投縣上流十餘里淺瀬云欲夜渉渡肅與諸將議寜時有三百兵乃曰可復以五百人益吾吾往對之保侯聞吾咳唾不敢渉水渉水即為吾禽肅便選千兵益寜寜乃夜往侯聞之不敢渡而結柴營今遂名此處為闗侯瀬權嘉寜功拜西陵太守領陽新下雉兩縣後從攻皖為升城督寜手持練身縁城為士卒先卒破獲朱光計功吕䝉為最寜次之拜折衝將軍後曹操出濡須號四十萬衆臨江飲馬權率衆七萬應之使寜領三千人為前部督權密勅寜出斫敵前營特賜羙酒衆殽寜乃料賜手下百餘人食食畢寜先以銀盌酌酒自飲兩盌乃酌與其都督都督伏不肯時持寜引白削置膝上呵謂之曰卿見知於至尊孰與甘寜甘寜尚不惜死卿何以獨惜死乎都督見寜色厲即起拜持酒次通酌兵各一銀盌至二更時衘枚出徑詣曹操營拔鹿角踰壘入營斬数十級北軍驚駭鼓譟舉火如星寜已還入營作鼓吹稱萬嵗因夜見權權喜曰足以驚駭老賊不然無以觀卿膽耳即賜絹千匹刀百口權曰孟徳有張遼孤有興覇足相敵也停住月餘北軍遂退自是權益貴重寜増兵二千人寜雖麄猛好殺然開爽有計畧輕財敬士能厚養健兒健兒亦樂為用命建安二十年從攻合肥㑹疾疫軍旅皆已引出唯車下虎士千餘人并吕䝉蔣欽凌統及寜從權逍遥津北張遼覘望知之即將歩騎奄至寜引兵射敵與統等死戰寜厲聲問鼓吹何以不作壯氣毅然權尤嘉之凌統怨寜殺其父操寜常備統不與相見權亦命統不得讐之嘗於吕䝉舎㑹酒酣統乃以刀舞寜起曰寜能雙㦸舞䝉曰寜雖能未若䝉之巧也因操刀持揗以身分之後權知統意乃令寜將兵徙屯半州寜厨下兒曽有過走投吕䝉䝉恐寜殺之故不即還後寜齎禮禮䝉母臨當與升堂乃出厨下兒還寜寜許䝉不殺斯須還船縳置桑樹自挽弓射殺之畢勅船人更増舸纜觧衣卧船中䝉大怒擊鼓㑹兵欲就船攻寜寜聞之故卧不起䝉母徒跣出諫䝉曰至尊待汝如骨肉屬汝以大事何有以私怒而欲攻殺甘寜寜死之日縱至尊不問汝是為臣下非法䝉素至孝聞母言即豁然意釋自至寜船笑呼之曰興覇老母待卿食急上寜涕泣歔欷曰負卿與䝉俱還見母歡宴竟日寜卒權痛悼之子瓌以罪徙㑹稽無幾死凌統字公績吳郡餘杭人也父操輕侠有膽氣孫䇿初興每從征伐常冠軍履鋒守永平長平治山越奸猾歛手遷破賊校尉及權統事從討江夏入夏口先登破其前鋒輕舟獨進為甘寜射死統年十五左右多稱述者權亦以操死國事拜統别部司馬行破賊都尉使攝父兵後從擊山賊權破保屯先還餘麻屯萬人統與督張異等留攻圍之克日當攻先期統與督陳勤㑹飲酒勤剛勇任氣因督祭酒陵轢一坐舉罰不以其道統疾其侮慢面折不為用勤怒詈統及其父操統流涕不答衆因罷出勤乗酒凶悖又於道路辱統統不忍引刀斫殺勤數日乃死及當攻屯統曰非死無以謝罪乃率厲士卒身當矢石所攻一面應時破壊斬首千餘其屯遂降還自拘於軍正權壯其果毅使得以功贖罪後權復征江夏統為前鋒與所厚健兒数十人共乗一船常去大兵数十里行入右江斬黄祖將張碩盡獲船人還以白權引軍兼道水陸並集時吕䝉敗其水軍而統先搏其城於是大獲權以統為承烈都尉後與周瑜等拒破曹操於烏林遂攻曹仁遷為校尉雖在軍旅親賢接士輕財重義有國士之風又從破皖拜盪宼中郎將領沛相與吕䝉等西取三郡反自益陽從征合肥為右部督時權撤軍前部已發魏將張遼等奄至津北權使追還前兵兵去已逺勢不相及統率親近三百人陷圍扶扞權出敵已毁橋橋之屬者兩板權䇿馬驅馳統復還戰左右盡死身亦被創所殺数十人度權已免乃還橋敗路絶被甲潛行權既御船見之驚喜統痛親近無反者悲不自勝權引袂拭之謂曰公績亡者已矣茍使卿在何患無人權遂留統於船盡易其衣服其創賴得卓氏良藥故得不死拜偏將軍倍給本兵時有薦同郡盛暹於權者以為梗槩大節有過於統權曰且令如統足矣後召暹夜至時統已卧聞之攝衣出門執其手以入其愛善不害如此統以山中人尚多壯悍可以威恩誘也權令東占且討之命勅屬城凡統所求皆先給後聞統素愛士士亦慕焉得精兵萬餘人過本縣歩入寺門見長吏懐手版恭敬盡禮親舊故人恩意益隆事畢當出㑹病卒時年四十九權聞之拊牀起坐哀不能自止数日減膳言及流涕使張承為作銘誄二子烈封年各数嵗權内養於宫愛待與諸子同賓客進見呼示之曰此吾虎子也及八九嵗令葛光教之讀書十日一令乗馬及長追録統功封烈亭侯還其故兵後烈有罪封復襲爵領兵徐盛字文嚮琅邪莒人也遭亂客居吳以勇氣聞孫權統事以為别部司馬授兵五百人守柴桑長拒黄祖祖子射嘗率数千人下攻盛盛時吏士不滿二百與相拒撃傷射吏士千餘人已乃開門出戰大破之射遂絶跡不復為宼權以為校尉蕪湖令復討臨城南阿山賊有功徙中郎將督校兵曹操出濡須從權禦之魏嘗大出横江盛與諸將俱赴討時乗䝉衝遇迅風船落敵岸下諸將恐懼未有出者盛獨將兵上突斫敵敵披靡退走有所殺傷風止便還權大壯之及權為魏稱藩魏使邢貞拜權為吳王權出都亭候貞貞有驕色張昭既怒而盛忿憤顧謂同列曰盛等不能奮身出命為國家并許洛吞巴蜀而令吾君與貞盟不亦辱乎因涕泣横流貞聞之曰江東將相如此非乆下人者也後遷建武將軍封都亭侯領廬江太守賜臨成縣為奉邑劉備次西陵盛攻取諸屯所向有功曹休出洞口盛與吕範全琮渡江拒守遭大風船人多喪盛収餘兵與休夹江休使兵將就船攻盛盛以少禦多敵不能克各引軍退遷安東將軍封蕪湖侯後魏文帝大出有渡江之志盛建計從建業築圍作薄落圍上設假樓江中浮船諸將以為無益盛不聽固立之文帝到廣陵望圍愕然彌漫數百里而江水盛長歎曰魏雖有武騎千羣無所用也便引軍退諸將乃服黄武中卒子楷襲爵領兵潘璋字文珪東郡發干人也孫權為陽羡長始往隨權性博蕩嗜酒居貧好賖酤債家至門輙言後豪富當還權竒愛之因使召募得百餘人遂以為將討山賊有功署别部司馬後為吳大市刺姦盗賊斷絶由是知名遷豫章西安長劉表在荆州民数被宼自璋在事宼不入境比縣建昌起為賊亂轉領建昌加武猛校尉討治惡民旬月盡平召合遺散得八百人將還建業合肥之役張遼奄至諸將不備陳武鬭死宋謙徐盛皆披走璋身次在後便馳進横馬斬謙盛兵走者二人兵皆還戰權甚壯之拜偏將軍遂領百校屯半州權征闗侯璋與朱然斷侯走道到臨沮住夹石璋部下司馬馬忠禽侯并侯子平都督趙累等權即分宜都至秭歸二縣為固陵郡拜璋為太守振威將軍封溧陽侯甘寜卒又并其軍劉備出夷陵璋與陸遜并力拒之璋部下督斬備䕶軍馮習等所殺傷甚衆拜平北將軍㐮陽太守魏將夏侯尚圍南郡分前部三萬人作浮橋渡百里洲上時諸葛瑾楊粲並㑹兵赴救未知所出而魏兵日渡不絶璋曰魏勢始盛江水又淺未可與戰便將所領到魏軍上流五十里伐葦數百萬束縳作大筏欲順流放火燒敗浮橋作筏適畢伺水長當下尚便引退璋下備陸口權稱尊號拜右將軍璋為人麄猛禁令肅然好立功夫所領兵馬不過数千而其所在常如萬人征伐止頓便立軍市他軍所無皆仰取足然性奢侈末年彌甚服物僭擬吏兵富者或殺取其財物数不奉法監司舉奏權惜其功而輙原不問嘉禾三年卒子平以無行徙㑹稽璋妻居建業賜田宅復客五十家丁奉家承淵廬江安豐人也少以驍勇為小將屬甘寜陸遜潘璋等数隨征伐戰鬭常冠軍每斬將搴旗身被創夷稍遷偏將軍封都亭侯魏遣諸葛誕胡遵等攻東興諸葛恪率軍拒之諸將皆曰敵聞太傅自来上岸必遁走奉獨曰不然彼動其境内悉許洛兵大舉而来必有成規豈虚還哉無恃敵之不至恃吾有以勝之及恪上岸奉與將軍唐咨吕據留贊等俱從山西上奉曰今諸軍行遲若敵據便地則難與爭鋒矣乃辟諸軍使下道帥麾下三千人徑進時北風奉舉帆二日至遂據涂塘天寒雪甚諸將置酒髙㑹奉見其前部兵少相謂曰取封侯爵賞正在今日乃使兵觧鎧著胄持短兵敵人從而笑焉不為設備奉縱兵斫之大破敵前屯㑹據等至魏軍遂潰遷滅宼將軍進封都亭侯魏將文欽来降以奉為虎威將軍從孫峻至夀春迎之與敵追軍戰於髙亭奉跨馬持矛突入其陣中斬首數百獲其軍器進封安豐侯太平三年魏大將諸葛誕據夀春来降魏人圍之遣朱異唐咨等往救復使奉與黎斐觧圍奉為先登屯於黎漿力戰有功拜左將軍孫休即位休與張布謀欲誅孫綝布曰丁奉雖不能吏書而計畧過人能斷大事休召奉謂曰綝秉國威將圖不軌欲與將軍誅之奉曰丞相兄弟支黨甚盛恐人心不同不可卒制可因臘㑹有陛下兵以誅之也休納其計因㑹請綝奉與張布目左右斬之遷大將軍加左右都䕶永安二年假節領徐州牧六年魏伐蜀奉率諸軍向夀春為救蜀之勢蜀亡軍還休薨奉與丞相濮陽興從萬彧之言共迎立孫皓遷右大司馬左軍師寳鼎三年皓命奉與諸葛靚攻合肥奉與晉大將石苞書構而間之苞以徴還建衡元年奉復率衆治涂塘因攻晉榖陽榖陽民知之引去奉無所獲皓怒斬奉導軍三年奉貴而有功漸以驕矜或有毁之者皓追以前出軍事徙奉家於臨川奉弟封官至後將軍先奉死通志卷一百十九
