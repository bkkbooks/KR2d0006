body:
  text: 通志卷二十七宋右廸功郎鄭樵漁仲撰氏族略第三以邑為氏周邑祭氏姬姓周公第七子所封其地今鄭州管城東北祭城是也周畿内之邑故祭氏世為周卿士子孫以邑為氏又鄭有祭仲足以其地近於鄭故亦為鄭所并尹氏少昊之子封於尹城因以為氏子孫世為周卿士食采於尹今汾州有尹吉甫墓即其地也古今人表尹夀為堯師漢有尹咸尹賞尹齊尹翁歸後漢有尹敏晉有尹奉蘇氏己姓顓帝裔孫吳回為重黎生陸終陸終生昆吾封於蘓其地鄴西蘇城是也至周武王用忿生為司冠邑於蘇子孫因以為氏世居河内又有拔略氏改為蘇氏虜姓也毛氏周文王之子毛伯明之所封世為周卿士食采於毛子孫因以為氏趙有毛遂漢有毛公治詩趙人也為河間王博士毛萇亦治詩人古川又有代北之族世為酋長樊氏姬姓周太王之子虞仲支孫仲山甫為周宣王卿士食采於樊曰大侯因邑命氏其地一名陽樊今河南濟源東南三十八里皮城是也以樊皮居之故名皮城又商人七族有樊氏仲尼弟子有樊遲魯人盖其後也尋氏亦作鄩曹姓古斟鄩之後或言與夏同姓今濰州東五十里尚有鄩亭京相璠云斟鄩去鄩亭七里周有鄩單氏周室卿大夫成王封蔑於單邑故為單氏魯成公元年始見春秋晉侯使瑕嘉平戎於王單襄公如晉拜成襄十年傳曰王叔氏與伯輿爭政坐獄於庭王叔不能舉其要辭故奔晉於是單靖公為政於王室代王叔也二十餘代為周卿士漢有功臣中牟侯單左車傳封六代昌武侯單究傳封七代也甘氏夏時侯國酈道元云甘水東十里洛陽南有故甘城世謂之鑒城一云周武王封同姓於畿内因氏焉甘昭公者周惠王之子也王子帶魯僖元年又封之於甘僖二十四年傳曰甘昭公有寵於惠后惠后欲立之昭十二年甘簡公無子立其弟過將去成景之族丙申殺甘悼公而立成公之孫鰌子孫以邑為氏秦有甘茂生羅楚有甘公撰星占漢義陽侯甘延夀吳將軍甘寧緱氏周卿士食采之邑也又渇侯氏改為緱氏榮氏周大夫榮夷公其先食邑於榮杜預云鞏縣西有榮錡澗周畿内地也又魯亦有榮氏漢有榮廣宋朝有榮諲為光禄卿望出樂安上谷太平登科有榮見素榮真素榮輯今知臨安有榮薿郗氏音絺己姓青陽氏之後蘓忿生支子封郗邑因氏焉趙有郗疵今望出濟南鞏氏今鞏縣也周卿士鞏簡公甸内侯也晉有鞏朔漢有侍中鞏攸宋朝鞏申為光禄卿望出山陽氾氏音凡本亦作汎周大夫食采於汎因以為氏漢有汎勝之為黄門侍郎撰農書十二篇謝邱氏風俗通周宣王支子食采謝邱漢書古今人表魯有謝邱章營氏風俗通周成王卿士營伯之後也後漢有京兆尹營郃望出成陽宋朝有營道學究出身劉氏祁姓帝堯陶唐氏之後受封於劉其地今定州唐縣也裔孫劉氏以能擾龍事夏后孔甲為御龍氏在商為豕韋氏在周為唐杜氏亦為杜伯以成王滅唐而遷之於杜也今永興長安縣南十里下杜城是也至宣王滅其國杜伯之子隰叔奔晉為士師故為士氏孫士㑹適秦後歸晉其處於秦者為劉氏此祁姓之劉也以國為氏又成王封王季之子於劉邑因以為氏杜預云緱氏西北舊有劉亭按緱氏熙寧中省入河南偃師此姬姓之劉也以邑為氏姬姓之劉世為周卿士康公獻公其後也祁姓之劉即士㑹之後周末家于魏又徙豐此班固之說也劉端字執嘉生四子伯仲季交季即漢髙祖也名邦漢自髙祖至光武光武至獻帝享國四百二十五年又有東郡河南雕陰三族俱出匈奴之族漢髙祖以宗女妻冒頓其俗貴者皆從母姓因改為劉氏又漢賜項氏姓為劉氏原氏周文王第十六子原伯之後封於河内今澤州沁水是其地也周有原莊公世為周卿士故以邑為氏魯有原壤陳有原仲晉有原軫徃徃其族散在他國而以本國為氏者召氏或作邵姬姓召公食邑也杜預云扶風雍縣東南有召亭雍今鳯翔天興此舊地也東仙之後其地在今王屋又周公封魯召公封燕雖各之國也然其後有留佐周室者世為周卿士也周厲王時周徳衰微兄弟道缺召穆公於東都收會宗族而作常棣之詩召簡公之後不見春秋召與邵一氏而後世分為二齊有召忽漢功臣有召歐又南陽太守召信臣生馴孫林此單召者也秦有邵不疑及汝南安陽之族皆從邑魯邑臧氏姬姓魯孝公之子公子彄食邑于臧因以為氏隠十年臧僖伯諌觀魚桓二年臧哀伯諌納郜鼎襄二十四年臧紇為季氏廢長立庻被孟氏所譖斬鹿門之關以出奔邾乃立臧為致防而奔齊漢有燕王臧荼城陽王太𫝊臧璋後漢二十八將城門校尉臧宫望出東海郈氏亦作后魯孝公八世孫成叔為郈大夫因以為氏郈邑今鄆州須城東三十六里郈鄉亭是孔子弟子后處之邑漢有少府后倉古今人表作厚費氏亦音祕姬姓懿公之孫費伯之邑也今沂州費縣西北二十里故費城是紂幸臣費仲夏禹之後也楚有費無極又費連氏改為費氏虜姓也郎氏姬姓魯懿公孫費伯城郎因以居之子孫遂以為氏今單州魚臺縣舊有郁郎亭是其地漢有郎含後漢中郎郎顗北海人石趙司空郎闓宋朝郎簡為侍郎錢塘人皇祐登科郎淑蘓州人又有郎誼湖州人栁氏魯孝公之後孝公生子展展孫無駭生展禽字季為魯士師諡曰惠食采於栁下故謂之栁下惠子孫以邑為氏楚滅魯仕楚秦并天下栁氏遷於河東匡氏魯匡邑宰匡句須之後開封長垣縣西南十里匡邑故城亦屬衞又疑魯别有匡邑廬山記楚威王時有匡俗先生管氏魯大夫食采於管因氏焉鄆氏魯大夫食采於鄆子孫氏焉鄆亦作運落姑氏魯大夫食采於落姑因氏焉漢博士落姑仲異鄒氏子姓宋湣公之後正考父食邑於鄒生叔梁紇遂為鄒氏其地今兖州鄒縣是也齊有鄒衍鄒忌望出范陽卞氏魯邑也今兖州泗水有卞城姓纂云曹叔振鐸之後有支庻食采於卞因以氏焉然卞非曹邑之地魯有卞莊子楚有卞和南史儒林卞華宋朝卞衮為鹽鐵副使瑕邱氏姬姓風俗通魯桓公庻子食采瑕邱漢有瑕邱申陽矍相氏魯大夫食采矍相因氏姓苑云沛人菟裘氏史記秦嬴姓之後也其地魯邑今在兖州奉符晉邑欒氏姬姓晉靖侯孫欒賔食邑趙州平棘西北十六里古欒城是其地以邑為氏欒氏世為晉卿又齊有欒氏姜姓齊惠公之後惠公子堅字子欒是以字為氏者漢有欒布又有尚書欒巴望出西河魏郡宋朝登科有欒副郄氏姬姓晉之公族也晉大夫郄文子食邑於郄世為晉卿以邑為氏望出山陽宋朝登科郄濟川真定人又景祐登科郄晉卿苦氏即郄氏郤犨亦號苦成于苦為别封之邑潛夫論苦成城在鹽池東北越大夫苦成漢有苦灼為㑹稽太守音庫祁氏姬姓晉獻侯四世孫奚為晉大夫食邑于祁遂以為氏其地即今大原祁縣是也猶有祁奚墓或云隰叔之後與士氏同族又祁亦姓也出黄帝後所謂伊祁是也亦作耆望出太原樂陵宋朝登科祁髙開封人又有祁融荀氏晉之公族也隰叔之後僖二十八年荀林父將中軍故曰中行氏荀邑在絳州正平西十五里宣十二年荀林父與楚子戰于邲荀首趙同為下軍大夫荀首食邑於智號曰智莊子襄十四年知朔生盈而死故荀氏同見又為田氏程氏輔氏荀本侯國姬姓晉滅之以為邑荀侯之裔亦以國為氏智氏姬姓即荀氏荀首别食智邑又為智氏至荀瑶為趙魏所滅故智氏亦謂荀氏望出河東天水陳留輔氏姬姓晉之公族也本荀氏又食邑於智故又為智氏智果以智伯剛愎必亡其宗别為輔氏又晉大夫有輔躒漢有輔狼為尚書令今河東有此姓望出扶風宋朝登科輔章無為軍人續氏姬姓晉大夫狐鞫居食采於續故謂之續簡伯又為續氏一云舜七友續牙之後漢功臣表續相如封承父侯晉有續武威撰異物志石趙有太子少保續咸上黨河東襄陽並有此姓望出鴈門宋元祐登科續渙若汝州人建炎續商賢兖州人近續觱為吏部郎戲陽氏晉邑也舊屬衞今相州安陽縣永和鎮東二十五里戲陽城衞大夫戲陽速晉有戲陽扶為卿函與氏晉大夫范臯夷食采函與因氏焉邯鄲氏嬴姓晉趙盾從父昆弟子曰趙穿食邑邯鄲因以為氏其地今為邑𨽻磁州漢有衞尉邯鄲義羊舌氏姬姓晉之公族也靖侯之後食采於此故為羊舌大夫有四族皆彊家羊舌晉邑名未詳其所或言羊舌氏姓季名果有人盗殺羊而遺其頭不敢不受受而埋之後盜事發詞連季氏乃掘而示之以明已不食惟舌存而得免此不根之論也羊氏即羊舌氏之後春秋末始單為羊氏秦亂徙居泰山戰國有羊千著書漢隴西功曹羊嘉宋朝登科羊奭濰州人絳氏晉絳縣老人之後其地在今絳州步氏姬姓晉公族郄氏之後歩陽食采於歩遂以為氏仲尼弟子有歩叔乗齊人又步鹿氏改為步氏朢出潯陽宋朝登科步覺民河南府人蒯氏風俗通晉大夫蒯得之後又衞有蒯聵見左傳前漢有蒯徹又有蕢氏同音宋初登科有蒯諤彘氏左傳士㑹支子士魴别食采於彘邑在平陽北號恭子曲氏姬姓晉穆侯封少子成師于曲沃支孫氏焉今絳州曲沃即其地漢有代郡太守曲謙貨殖傳有曲叔後漢太常卿曲仲尼唐貞元中陳許節度使曲環陜州人望出陜郡鴈門宋朝登科曲全昌和州人范氏陶唐之裔歴虞夏商周成王遷之杜為伯宣王殺杜伯其子隰叔奔晉為士師故為士氏其子孫處隨及范故經傳見三族焉范晉邑也其地濮州范縣是也范氏帝堯裔孫劉累之後伊祁姓自虞以上為陶唐氏夏為御龍氏商為豕韋氏周為唐杜氏周衰奔晉為范氏按隰叔生士輿士輿生士蒍而釋例云士蔿杜伯之孫隰叔之子也士蔿字子輿因疑此而為士輿也越有范蠡著書曰計然魏有范座項羽有范增居巢人苖氏芊姓楚大夫伯棼之後伯棼以罪誅其子賁皇奔晉晉人與之苖因以為氏河内軹縣南苖亭即其地也漢有長水校尉苖浦王莽時有苖訢東晉有苖願望出東陽邴氏亦作丙晉大夫邴豫食邑于邴因以為氏齊亦有邴邑而亦有邴氏漢有博士邴丹丞相丙吉出魯國功臣表有髙苑侯丙倩傳封八代又漢都尉李陵降匈奴裔孫歸魏見於丙殿賜氏曰丙唐應公邴粲其後也與髙祖有舊以其姓犯廟諱賜姓李吾邱氏吾音魚即虞邱氏也晉大夫虞邱子著書楚莊王相虞邱子薦孫叔敖自代者令狐氏姬姓周文王子畢公髙之後有畢萬仕晉其子犨封於魏犨之子顆以獲秦將杜回功别封於令狐故為令狐顆其地在今猗氏縣西十五里漢有令狐邁避王莽亂居敦煌生稱宋慶歴登科有令狐詠河中人元符有令狐相如鄆州大觀有令狐皥如汝州人溫氏姬姓唐叔虞之後晉郤至為溫大夫號温季因以為氏按姓纂唐表皆言唐叔虞之後以公族封於河内此即郤至之封言郤至食采于溫亦號温季一事分而為二誤矣温今河内温縣是也漢功臣表温疥封椿侯疥孫何始居太原又有温忩氏改為温氏揚氏姬姓周宣王子尚父幽王時封為揚侯為晉所滅其後為氏焉或曰周景王之後一云唐叔虞之後至晉武公孫于齊生伯僑歸周天子封揚侯然傳言虞虢焦滑霍揚韓魏皆姬姓之國為晉所滅晉以為羊舌氏之邑此其明也揚雄自叙云伯僑不知周何别也又云晉武公子伯僑生文文生突羊舌大夫也又云晉之公族食邑於羊舌凡三縣一曰銅鞮二曰揚氏三曰平陽突生職職生五子赤肸鮒虎季夙赤字伯華為銅鞮大夫生子容肸字叔向亦曰叔譽鮒字叔魚虎字叔羆號羊舌四族叔向晉太傅食采揚氏其地平陽揚氏縣是也叔向生伯石字食我以邑為氏曰揚石黨於祁盈盈得罪於晉并滅羊舌氏叔向子孫逃于華山仙谷遂居華陰又有揚突後周賜姓獨孤氏隋復本姓又有莫胡盧氏改為揚氏又煬帝誅揚元感改姓為梟氏盂氏晉大夫食采盂邑因氏焉其地今為太原盂縣晉有盂丙衞有盂黶壺氏晉大夫邑也因以為氏其地今潞州黎城東壺口闗是也衞有壺黯漢有諫議大夫壺遂列仙傳有壺公鞮氏亦為銅鞮氏風俗通云晉有銅鞮伯華之後晉之别邑也今屬威勝軍有故城及銅鞮宫遺址遆氏音帝今同州澄城多此姓本銅鞮氏避事改焉緜氏晉大夫食采緜上因氏焉今大通監緜上縣是其地晉張方腹心有緜思又河南官氏志爾緜氏改為緜望出河南梓潼解氏晉大夫解揚解狐之後其先食采於解今解州即其地漢有御史大夫解延年司𨽻校尉解光又解毗氏改為解宋熙寜登科解澄開封人又有解九臯州氏風俗通云晉有州綽州賔其先食采于州因以為氏其地今懷州武陟縣是也衞有公子州吁漢有州輔魏有州秦又淳于氏謂之州公其後亦為州氏姜姓春秋時小國也鄔氏晉大夫鄔臧之後也食邑于鄔杜預云太原鄔縣宋登科鄔執權撫州人鄔大昕惠州人莢氏風俗通莢成僖子晉大夫也見世本王僧孺百家志云荀永之娶平陽莢氏又漢藝文志有夾氏春秋音莢俠氏即莢氏音莢韓侠累之後急就章有俠却敵鄂氏姬姓晉鄂侯之後以居於鄂邑故支庶以為氏焉漢初功臣安平侯鄂千秋沛人又巴郡蠻七姓鄂其一也望出武昌焉翼氏姬姓晉翼侯居翼城因氏焉漢諌議大夫翼奉東海下邳人衞邑寗氏姬姓衞武公生季亹食采於寗因以為氏杜云汲郡修武縣按修武今屬懷州武陟然獲嘉有寗城周有寗越晉有寗嬴元氏左傳衞大夫元咺之後也咺食邑於元今大名府元城是其地子孫以邑為氏又拓跋氏云黄帝子昌意之後昌意少子封居北土世為鮮卑君長宋書云李陵之後自昌意三十九世至昭成皇帝什翼揵始號代王都雲中至道武皇帝始改號魏至孝文帝更為元氏都洛陽又有紇骨氏改為元氏又有是云氏改為元氏又有景氏改為元氏儀氏衞大夫儀封人之後徐大夫儀楚陳大夫儀行父望出晉陽常氏姬姓衞康叔支孫食邑於常因以為氏或言黄帝臣常先之後左傳越大夫常夀過漢有右將軍長羅侯常惠宋朝登科有常九思又有常琪成都人又有恒氏避宋諱亦改為常裘氏衞大夫食采於裘因氏焉或云本求氏改為裘望出渤海虢略承氏衞大夫承成之後見世本望出千乗濮氏衞大夫食采於濮因而氏焉其地在澶州濮陽今新定有此姓望出魯國濮陽宋朝登科濮俊民開封人濮溫其邵武人戚氏衞大夫食采於戚因氏焉其地在衞州頓邱昔賢有戚子著書漢髙祖戚夫人生趙王如意功臣表有臨轅侯戚鰓傳封七世望出齊郡宋建隆登科有戚維汲氏風俗通衞宣公太子伋之後居汲因以為氏然汲衞邑也其大夫所治之邑又何必子伋為哉其地今衞州衞縣宋尚書郎汲熙載望出清河聶氏衞大夫食采於聶因氏焉史記軹人聶政殺韓相侠累漢有太守聶良護羌校尉聶尚又有聶壹吳志有將軍聶支石趙録冉閔有中書令聶熊望出河東又新安棗氏本棘氏衞大夫棘子成之後避地改為棗後漢有棗祗商邱氏衞大夫食邑於此漢有御史大夫秺侯商邱成又有商邱子胥髙邑人見列仙傳五鹿氏姬姓風俗通衞邑也晉公子重耳封舅犯於五鹿支孫氏焉漢有少府五鹿充宗代郡成陽縣有五鹿氏鄭邑馮氏世本云歸姓鄭大夫馮簡子之後姓纂云周文王第十五子畢公髙之後畢萬封魏支孫食采於馮城因氏焉漢書云秦末馮亭為上黨太守入趙其宗族或留潞或在趙秦丞相去疾御史大夫刼漢博成侯母擇並亭之後也至馮唐徙安陵為楚相弟騫自上黨徙杜陵孫奉世左將軍生譚逡野王立參野王左馮翊上郡太守參宜鄉侯漢功臣又有閼氏侯馮解散穀陵侯馮谿傳封六代後漢司馬馮勤魏郡人馮衍杜陵人生豹為尚書司空馮魴南陽人廷尉馮緄巴郡人京氏鄭武公少子改封於京謂之京城太叔因氏焉舊滎陽京縣是其地後齊廢入滎陽其故城在縣東南二十里又李氏改為京氏望出譙國齊邑閭邱氏志籍不言所出然邾國有閭邱杜預云髙平南陽縣北有顯閭亭本邾地為齊所并徃徃閭邱氏食邑於此故以命氏釋例公子譜皆略惟世本詳焉盖春秋閭邱嬰之後也迨齊宣王時有閭邱卭閭邱光漢有廷尉閭邱勲後漢太常閭邱遵魏有閭邱決著書十二篇晉有太常閭邱冲南陽太守閭邱羡閭氏齊大夫閭邱嬰之後或單言閭氏從省文也又改為盧氏隰氏姜姓齊莊公子廖事桓公封於隰陰為大夫故以為氏杜預云濟南有隰隂縣崔氏姜姓出齊丁公嫡子季子讓國於叔乙食采于崔遂為崔氏杜預云濟南東朝陽縣西北有崔氏城是也季子生穆伯穆伯生沃沃生野八世孫夭僖二十八年晉侯宋公齊國歸父崔夭次于城濮夭生杼宣十九年齊惠公卒崔杼有寵於惠公髙國畏其偪也公卒而逐之書曰崔氏出奔衞非其罪也成十七年齊侯使崔杼為大夫襄二十三年崔杼弑莊公崔杼生成及彊後妻生明嫡庻爭立二十七年慶封使盧蒲嫳殺成及彊杼及其妻縊崔明奔魯生良十五世孫意如為秦大夫封東萊侯二子伯基仲牟伯基居清河東武城仲牟居博陵安平並為著姓盧氏姜姓齊太公之後也齊文公之子髙髙之孫傒食采於盧今齊州盧城是也因邑為氏秦有博士盧敖子孫家于涿水之上遂為范陽涿人漢有燕王盧綰其裔也又有盧蒲氏出自桓公亦為盧氏皆齊之盧也按河南後魏官氏志有莫盧氏代姓也後改為蘆復去艸又有范陽雷氏以盧雷聲近故亦改為盧焉又有三原閭氏准制改為盧氏又章仇大翼善天文隋煬帝賜姓盧氏鮑氏姒姓不知所出或云夏禹之後有鮑叔仕齊食采於鮑因以為氏鮑叔字叔牙進管仲於齊桓公遂覇諸侯其後有鮑牽曰鮑莊子為夫人聲孟子所譖靈公刖其足傳曰鮑莊子之智不如葵葵猶能衞其足齊人召鮑國而立之定九年陽虎奔齊請伐魯鮑文子諌曰魯未可取也世為齊卿又俟力氏改為鮑代姓也望出上黨東海棠氏姜姓齊桓公之後邑于棠曰棠公其後為棠氏又楚亦有棠邑大夫伍尚之所封號曰棠君其後亦為棠氏穰氏風俗通田穰苴諸田之族穰所食之邑因以氏焉穰苴為齊大司馬晏氏或云齊公族襄公二十九年吳季札聘于齊說晏平仲謂之曰子速納邑與政無邑與政乃免於難故晏子因陳桓子納政與邑以免欒髙之難漢有司𨽻校尉晏稱南燕有晏漢宋朝有宰相晏殊應神童舉臨川人望出齊國晝氏風俗通齊大夫食采晝邑因氏焉檀氏姓纂云姜姓齊公族有食瑕邱檀城因以為氏然瑕邱魯地也或齊之公族奔于魯者受邑乎檀也禮記魯有檀弓是其裔也又周卿士檀伯逹六國時齊有檀子望出清河平盧髙平來氏本作郲子姓商之支孫食采於郲因以為氏其後避難去邑齊有來章秦末徙義陽之新野風俗通楚有來英漢功臣表車犬侯来蒼車犬音待宋朝登科來章磁州人菑氏齊邑也見姓苑孔融集菑莊青州人為北海望族盆氏齊邑也盆成子之後漢盆謐為中郎將望出齊郡即墨氏齊將田單守即墨支孫氏焉漢書儒林傳城陽相即墨成即氏風俗通漢單父令即費其先食采即墨因以命氏葵邱氏齊邑也英賢傳古有葵邱頎又石虎時有龍驤將軍葵邱直梁邱氏齊大夫食采梁邱景公時有梁邱據漢少府梁邱賀諸縣人王莽時有梁邱賜籍邱氏齊大夫籍邱子鉏余邱氏齊公族食采余邱漢有侍御史余邱炳又隠士余邱靈居曲河安平氏齊將田單封安平君因氏焉髙堂氏齊公族也風俗通齊卿髙敬仲食采於髙堂因氏焉其地在博州髙唐楚邑鬬氏芊姓若敖之後按若敖名熊義其先無字鬬者必邑也其地未詳若敖娶於䢵生鬬伯比滛於䢵子之女生子文焉棄諸夢中虎乳之䢵子見而收之楚人謂乳為穀謂虎為於莵故名之曰鬬穀於莵子文楚之良也世為令尹秉楚政薳氏亦作蔿芊姓楚蚡冒之後薳章食邑于薳故以命氏按楚有地名蔿又有薳澨則知薳為楚邑矣又晉士蔿之後亦為蔿氏此以王父字為氏者屈氏芊姓楚之公族也莫敖屈瑕食邑於屈因以為氏三閭大夫屈平字原其後也漢有屈燕又屈突氏改為屈氏望出河南宋朝登科屈符屈唐臣又同州屈理耀州屈長吉屈大方廬州人屈中羙並登科陰氏姬姓管夷吾七代孫修適楚為隂大夫因以為氏風俗通又云隂康氏之後周有隂不佞隂里人又後周賜姓邱月隂氏隨復舊姓宋朝登科陰信臣陰昭又有陰晫鳯翔人鍾氏晉伯宗之後伯宗晉之賢者也為郤氏所譖被殺子伯州犂奔楚邑于鍾離今濠州也子孫以邑為氏或言鍾或言鍾離楚有鍾儀鍾建鍾子期與伯牙為友項羽將鍾離昧昧有二子長曰發居九江仍故姓次曰接居潁川長社為鍾氏南唐有鍾傳鍾離氏姬姓即鍾氏以伯州犂居鍾離故曰鍾離氏亦省言鍾氏州犂與晉同祖而世本云與秦同祖嬴姓何也戰國䇿齊賢人鍾離千昧楚人鍾離岫撰會稽後賢傳後漢鍾離意㑹稽山陰人曾孫緒樓船都尉生駰春氏風俗通云楚相黄歇春申君之後上官氏楚王子蘭為上官邑大夫因以為氏秦滅楚徙隴西之上邽漢有右將軍安陽侯上官桀生安桑樂侯女為昭帝皇后拜車騎將軍後以反伏誅裔孫勝詹氏楚詹尹之後有詹何善釣周有詹父又有詹喜楚辭有太卜詹尹宋朝為著姓望出渤海河問蔓氏楚有鬬成然食采於蔓曰蔓成然其後以邑為氏白氏芊姓楚白公勝之後也楚有白邑其地在蔡州襃信秦大夫白乙丙武安君白起史記有白圭周富人也漢書白生魯人為楚元王博士晉有白襃苻秦大鴻臚白景望出南陽太原葉氏舊音攝後世與木葉同音風俗通楚沈尹戍生諸梁食采於葉因氏焉吳志有都尉葉雄唐有葉法善宋朝為著姓望出下邳南陽商宻氏楚大夫食采之邑其地在今鄧州穰縣軒邱氏芈姓楚文王庻子食采軒邱因氏漢有梁相軒邱豹三閭氏芊姓楚屈原為三閭大夫因氏焉鄧陵氏芊姓楚公子食邑鄧陵因氏焉鄧陵氏著書見韓子諸梁氏楚莊王之後食邑諸梁因氏焉棠谿氏姬姓吳王闔閭弟夫槩王奔楚為棠谿氏其地在今蔡州遂平漢有棠谿惠又五官中郎將棠谿典宋邑留氏按姓纂衞大夫留封人之後然無據宋有留邑此則宋之留邑大夫因以邑為氏其地在今徐州泗水東南二十五里留城是也漢功臣彊圉侯留肸𫝊封四代吳有將軍留贊又有劉誕謀逆貶姓為留五代留從効為泉州節度使望出㑹稽宋朝登科留溶漳州人留毅衢州人合氏子姓宋向戌食采於合為宋左師故謂之合左師望出馮翊坎氏英賢傳云宋附庸有坎氏華氏子姓宋戴公子考父食采於華因氏焉世為宋卿漢功臣表終陵侯華無害傳封四代宋朝有華相華泰登科韓邑平氏姬姓韓哀侯少子婼食采平邑因以為氏秦滅韓徙下邑漢有丞相平當生晏司徒北齊有平筌望出河内燕郡宋朝登科平天倪大名府人横氏風俗通云韓公子咸號横陽君子孫氏焉魏邑鄴氏魏邑名今為相州治縣風俗通漢有梁令鄴鳯信氏風俗通魏公子信陵君之後趙邑馬氏即馬服氏嬴姓伯益之後趙奢封馬服君因以為氏或去服為馬秦滅趙奢孫興徙咸陽雎氏息為切趙大夫食采於睢邑因以命氏藺氏姬姓韓厥元孫曰康仕趙食采於藺因氏焉康裔孫相如為趙上卿子孫仕秦隨司馬錯伐蜀因家成都望出中山華隂宋朝登科藺中謹開封人藺中行永静人鹿氏趙大夫食采五鹿因氏焉漢有巴郡太守鹿旗子孫因家焉又阿鹿元氏改為鹿氏後魏黄門侍郎鹿悆宋朝鹿稹登進士第又有鹿元規單州人鹿敏求陳州人武成氏嬴姓風俗通趙平原君勝封武成君因氏焉鄡氏苦遥切趙大夫食采深澤鄡邑因氏焉孔子弟子鄡單字子家望出太原鉅鹿秦邑衙氏嬴姓秦穆公子食采於衙因氏焉其地即彭衙也同州白水東北六十里有彭衙城漢有長平令衙謹卿七世同居蜀志晉有督䕶衙傳望出江夏武安氏芊姓秦將白起封武安君因氏焉漢有千乗侯武安㳟華陽氏秦宣太后弟封華陽君子孫氏焉漢有諌議大夫華陽通涇陽氏秦宣太后弟封涇陽君因氏焉漢有駙馬都尉涇陽犨髙陵氏嬴姓秦昭王弟封髙陵君因氏焉漢有諌大夫髙陵顯諸國邑通氏巴大夫食采於通川因氏焉譙氏曹大夫食采於譙因氏焉漢譙隆為上林令以忠諌拜侍中望出巴西譙國宋朝登科譙南薰鄾氏鄧大夫食采鄾邑子孫因氏焉杜預云地在鄧縣南沔水之北酇氏音鑽海西先賢傳酇授字仲華漁陽人縣氏或為平聲其先有為縣大夫者望出扶風風俗通縣成父孔子門人漢有甘陵相縣芝吳中書令縣黙酈氏黄帝之後支孫食采於酈因氏焉漢有廣野君酈食其沛人弟商右相曲周景侯生寄一名况食其子疥封髙梁侯傳封三代後魏酈道元字善長注水經官至御史中丞望出新蔡宋朝登科酈因江陵人取慮氏徐偃王子食邑取慮因氏焉姓纂云今臨淮有此姓薊氏邑名在燕地神仙傳有薊子訓望出内黄鮮于氏子姓鮮音仙商後周武王封箕子於朝鮮支子仲食采於于子孫以鮮于為氏宋慶歴登科有鮮于綽鄭州人政和有鮮于陶宣和有鮮于先知並閬州人鮮氏音仙鮮于氏之後亦為鮮氏蜀李夀司空鮮思明望出南安宋朝登科有鮮洪範開封人熙寧有鮮符戎州人毋邱氏其先食采毌邱因氏焉宋朝登科有毋邱㑹政和有毋邱儼毌邱斌並閬州人毋氏毋邱氏或為毋氏唐開元補闕毋景洛陽人一云吳人宋朝毋湜直龍圖閣又毋隨登科望出平昌鉅鹿三烏氏風俗通凡氏於職三烏五鹿有三烏大夫因氏焉漢有三烏羣為上郡計渠邱氏亦作著邱氏嬴姓莒國之君居於渠邱故謂之渠邱公今密州莒縣有渠邱城英賢傳彭城有渠邱氏漁陽氏燕大夫受封漁陽因以為氏漢有少府漁陽鴻北平人堂邑氏漢張騫使西域從百餘人堂邑氏二人得還漢魏邑泉氏狀云本姓全氏全琮之後琮孫暉魏封南陽侯食封白水遂改為泉氏然國語潞洛泉余滿皆赤翟隗姓是則舊有泉氏矣後魏洛州刺史上洛侯泉企揭陽氏漢功臣安道侯揭陽定為南海揭陽令因氏焉以鄉為氏臣謹按封土之制降國而為邑降邑而為關内邑降關内邑而為鄉降鄉而為亭後世但知傳國邑之封而失鄉亭之㫖今自國至亭列五等裴氏嬴姓伯益之後秦非子支孫封􅘌鄉因以為氏今聞喜􅘌城是也按聞喜𨽻解州六代孫陵當周僖王之時封為解邑君乃去邑從衣為裴裴衣長貌一云晉平公封顓帝之孫鍼於周川之裴中號裴君又唐開元右驍衛大將軍疎勒王裴夷健之後為西域裴又後趙録有壘氏本姓裴改為壘自魏晉至周隋裴氏七代有傳陸氏媯姓田敬仲之後也十一世齊宣王少子通封於平原般縣陸郷即陸終氏之故地因以為氏通諡元侯生㳟侯發為齊上大夫生二子萬臯臯孫賈為漢大中大夫萬生烈為吳令遷豫章都尉既卒吳人思之迎其䘮葬于胥屏亭子孫遂為吳郡吳縣人十世孫閌穎川太守生三子卭温威號穎川枝威生續揚州别駕生三子稠逄襃號荆州枝稠為荆州刺史二子肅謙肅為丹徒令號丹徒枝又代北有部落大人號步陸孤氏後魏孝文遷洛陽改為陸氏虜姓也耨氏廣信都多此姓本姓陸避事改耨女玉切龎氏姬姓周文王子畢公髙之後其支庻封於龎因以為氏魏有龎涓趙有龎煖望出譙國閻氏姬姓武王封太伯曾孫仲奕於閻鄉因以為氏又云昭王少子生而有文在其手曰閻康王封於閻城又云唐叔虞之後晉成公子懿食采於閻晉滅之子孫散處河洛然太伯無後武王克商求仲雍之孫叔逹之子周章封於吳為太伯後周章之弟曰虞仲封於虞為仲雍後未聞仲奕者也有文在手之言多為迂誕晉有閻沒齊有閻職又有雲中族後周賜姓大野氏隋復舊望出樂安郝氏出於赫胥氏太昊氏之佐也殷帝乙時有子期封太原郝鄉因氏焉漢有上谷太守郝賢後漢有郝蘭宋朝郝太冲雍熙二年及第郝居中景徳元年登第尸氏漢書尸佼晉人為商君師著尸子風俗通云其先封尸鄉因以為氏齊相有尸臣肥氏恐其先有封於肥鄉者戰國䇿趙賢人肥義之後風俗通云漢有肥韶英布將肥赫又仁恕掾肥親資氏黄帝之後食采益州資中因以為氏風俗通資成陳留人望出南陽會稽郟氏左傳鄭大夫郟張其先封郟鄉因氏焉宋郟良子修輔並登進士第吳興人望出滎陽武陵嘉祐有郟亶開封人紹興有郟升卿平江人胡毋氏媯姓齊宣王封母弟於母鄉其鄉本胡國因曰胡毋氏漢有太史胡毋㳟大陸氏姜姓齊太公之後食邑陸鄉因號大陸氏齊簡公時有大陸子方以亭為氏麋氏楚大夫受封於南郡麋亭因以為氏或言工尹麋之後以名為氏望出東海南陽采氏黄帝封其子於右北平采亭因氏焉俞豆氏芊姓楚公子食采於南陽俞豆亭因氏焉歐陽氏姒姓越王勾踐之後支孫封烏程歐陽亭因氏焉烏程𨽻湖州漢有歐陽和伯授尚書曽孫髙博士孫地餘少府子政以地為氏所居附傅氏商相傅説之後築於傅巖因以為氏唐傅㳺藝賜姓武氏䝉氏風俗通東䝉主以䝉山為氏秦有將軍䝉驁生武武生恬皆仕秦望出安定宋䝉傳祥符元年登科又有䝉汲台州人䝉著封州人臣謹按䝉山在沂州費縣西北八十里又有東䝉在費西北七十五里在䝉山之東主其山之祀者子孫因山為氏陵陽氏搜神記陵陽子明止陵陽山得仙其後因山為氏少室氏國語少室周為趙簡子戎右城氏風俗通凡氏於事者城郭園池皆姓也池氏以所居為氏也漢有中牟令池瑗魏有城門侯池仲魚望出西平今為福州大姓有池鍔登科涂氏洪州人因水為氏宋朝登科涂天明涂正勝涂壎並撫州人嵇氏姒姓夏少康封子季杼於會稽遂為會稽氏漢初徙譙嵇山改為嵇氏又統嵇氏改為嵇氏宋翰林學士嵇潁鮭氏音圭以居鮭陽改為鮭氏後漢有鮭陽鴻為少府傳孟氏易橋氏黄帝葬橋山子孫守冡因為橋氏漢有橋庇仁喬氏即橋氏也後周文帝作相命橋氏去木義取髙逺一云匃奴貴姓世為輔相宋朝有喬惟岳給事中勞氏其先居東海勞山因氏焉望出松陽東關氏晉有東關嬖五漢有將軍北亭侯東關義關氏風俗通云關令尹喜之後也一云夏大夫關龍逄之後漢有長水校尉關陽蜀有前將軍漢夀亭侯關羽望出隴西東海潁氏鄭大夫頴考叔為潁谷封人故以為氏今許州長社有潁谷即其地也後漢潁容字子嚴著春秋釋例望出陳留狐邱氏晉大夫狐邱林之後見世本英賢傳曰出自狐邱封人之裔邱氏姜姓太公封於齊而都營邱其支庻居於營邱者遂以邱為氏其地在今齊州臨淄或云濰州昌樂有營邱故城左傳有邾大夫邱弱邱氏世居扶風又有邱林氏邱敦氏並改為邱氏虜姓也壺邱氏列子師壺邱子林鄭人桑邱氏漢書桑邱公著書五篇姓纂云今下邳有此姓龍邱氏見風俗通漢有髙士龍邱萇吳郡人蛇邱氏見英賢傳後漢河内太守蛇邱彧生重濟北太守女適羊續重濟北人陶邱氏帝堯子丹朱居陶邱因氏焉齊大夫陶邱徳漢侍御陶邱仁於邱氏其先家於邱因氏焉漢有宛朐令於邱略苞邱氏楚苞邱先生荀卿弟子水邱氏漢司𨽻校尉水邱崇曹邱氏漢書楚有曹邱生見季布傳楚邱氏新序楚邱先生孟嘗君時人廪邱氏齊大夫廪邱子之後見世本英賢傳有廪邱充齊隠者曼邱氏齊士曼邱不澤漢韓信將曼邱臣咸邱氏齊有隠士咸邱䝉浮邱氏列仙傳周太子晉時道士浮邱伯控鶴上嵩山漢書楚元王與申公學詩浮邱伯荀卿門人安邱氏漢有長陵三老安邱望之注老子行於世京兆人淄邱氏英賢傳齊勇士淄邱許稷邱氏漢稷邱子得仙道雍邱氏晉郭黙將軍雍邱洛何邱氏楚有何邱子後魏殿中將軍何邱勍列威將軍何邱寄麥邱氏英賢傳齊桓公時賢人麥邱老北邱氏獻邱氏﨑邱氏羌邱氏逄邱氏厚邱氏並見姓苑羑氏地名羑里即文王所囚之地也居於此地者以羑為氏或言羑里獄官綺氏漢初四皓隠商山號綺里季其後為綺氏以季居於綺里也臣謹按四皓非顯逹之人其初不得受氏之祖故以所居為氏此三代之事也如介之推燭之武冀芮潁考叔之類是矣濟氏以所居近濟水故以為氏襄陽有此姓見姓苑巷氏毛詩寺人巷伯之後艾氏晏子春秋大夫艾孔之後即左傳裔欵也艾亦謂之艾陵齊魯境上山風俗通龎儉母艾氏南燕有牙門艾江又東平太守艾銓唐有侍郎御史艾敬直北平人宋朝艾潁為御史元豊登科艾早真州人元祐艾與言沂州人望出隴西河南天水又河南官氏志艾斤氏改為艾氏柘氏楚大夫以地為氏急就章漢有柘温舒望出武陵燭氏鄭人燭之武不得氏以其居於燭地故言燭之者猶言介之推佚之狐也􅰤氏所嫁切風俗通云新鄭人楊􅰤村在縣西二十五里闕氏風俗通闕黨童子之後漢有荆州刺史闕翊漢書藝文志闕子著書後漢末闕宣下邳人王僧孺百家譜云蕭逺娶下邽闕氏之女辟閭氏姬姓衞文公支孫居楚邱營辟閭里因為辟閭氏焉漢書儒林傳太子少傳辟閭曽孫某為昌邑王太傅申屠氏姜姓周幽王申后兄申侯之後支子居安定屠原因以為氏一說申徒狄夏賢人後音轉改為申屠氏又有作勝屠者或云申屠楚官號申徒氏風俗通云本申徒氏隨音改為申屠氏申徒狄夏賢人也湯以天下授之耻不以義聞已自投於河莊子申徒元者鄚人也漢有西屏將軍申徒建東門氏姬姓魯莊公子公子遂字襄仲居東門號東門襄仲因氏焉漢有荆州刺史東門雲又有東門京善相馬西門氏鄭大夫居西門因氏焉列子有西門子魏文侯時西門豹為鄴令漢王莽時有西門息神仙傳有西門惠宋祥符登科西門治大觀有西門解濵州人西氏姓苑云西門豹之後改為西南門氏見姓苑北門氏左傳有北門駟尸子有北門子莊子有北門成陽門氏禮記陽門介夫之後桐門氏子姓左傳宋樂大心為右師食采桐門因氏焉夷門氏史記魏隠士侯嬴為夷門門者因氏焉闕門氏漢書儒林傳膠東内史闕門慶忌鄒人申公弟子也木門氏宋公子食采木門因氏焉說苑衞大夫有木門子髙逄門氏漢書古今人表有逄門子豹藝文志逄門子著兵法胥門氏左傳吳大夫胥門巢之後也弋門氏姓苑云漢陽人雍門氏齊頃公之子公子勝居雍門故為雍門氏戰國䇿雍門周以鼓琴干孟嘗君說苑齊有雍門子秋耏氏宋有耏班以其守耏門故以為氏漢功臣表芒侯耏跖生昭昭生申尚景帝女南宫公主門氏周禮公卿之子入王端門敎以六藝謂之門子其後為氏後魏有門文愛今望出河南又廬江河南官氏志有叱門氏改為門氏又有吐門氏改為門氏又有庫門氏改為門氏東宫氏東宫得臣齊大夫也其後東宫得疾隠嵩山年三百嵗西宫氏見姓苑南宫氏姬姓孟僖子之後也或言文王四友南宫子之後宋有南宫長萬南宫牛仲尼弟子南宫縚字子容魯人宋天聖登科南宫誠慶歴有南宫覲洪州人紹興有南宫瑞北宫氏姬姓衞之公族也左傳有北宫奢漢書有北宫伯子晉有西河太守北宫協前涼有䕶軍北宫萌東郭氏姜姓齊公族桓公之後也齊大夫東郭書見左傳又大陸子方號東郭賈齊人莊子有東郭子魏文侯時有東郭子方東郭惠見說苑西郭氏姓氏英賢傳云齊有賢者居西郭因氏焉漢有謁者僕射西郭嵩晉有祕書西郭陽北海人何承天云西朝名士也南郭氏莊子有南郭子綦左傳有南郭偃南郭且于北郭氏左傳齊大夫北郭子車之後也子車名佐生北郭啟說苑齊人有北郭騷與晏子為友東閭氏東閭子嘗富貴後乞食於道曰吾為相六年未嘗薦一士見說苑西閭氏說苑有西閭過屋廬氏晉賢人屋廬子著書言彭𥅆之法市南氏左傳楚人有市南宜僚亦見莊子社南氏其先齊倡見風俗通又姓苑云扶風安陵有社南氏社北氏風俗通與社南皆齊倡也漢有髙煬娶扶風社北氏臣謹按優倡依社而居則其志可知也三邱氏蜀志有三邱務三州氏孝子傳有三州昏延陵氏姬姓吳季札居延陵因氏焉亦為延州來氏呂氏春秋延陵玉趙襄子謀臣於陵氏姜姓風俗通陳仲子齊世家辭爵灌園於於陵子孫氏焉平陵氏史記平陵老之後梁垣氏陳留風俗傳周畢公後有梁垣演居大梁之墟子孫因氏焉漢光武時侍御史梁垣列字惠伯又武陵太守梁垣成蒲圃氏魯地以所居為氏東方氏風俗通伏羲之後帝出於震位主東方子孫因氏焉宋嘉祐登科有東方頴叔梓州人熙寧有東方暉開封人西方氏姓苑云少昊金天氏位主西方金因氏焉宋朝登科西方琥淄州人九方氏列子秦穆公時九方臯一名歅善相馬東里氏姬姓鄭大夫子産居東里因氏焉曹瞞狀有南陽太守東里昆泰始先賢狀有東里冕魏志有東里衮百里氏風俗通秦大夫百里奚之後其先虞人家于百里因氏焉後漢徐州刺史吉陽亭侯百里嵩陳留人東鄉氏宋大夫東鄉為人之後見世本漢有并州䕶軍東鄉子琴髙密人見英賢傳西鄉氏風俗通宋大夫西鄉錯之後見世本尸子有隠者西鄉曹南鄉氏晉髙士居隠南鄉因氏焉後漢有羽林左監南鄉槐北鄉氏見姓苑東野氏家語有東野畢弋東野稷見莊子西野氏南野氏北野氏並見姓苑北唐氏英賢傳曰晉有髙人越者隠伏於北唐因氏焉漢有北唐子真治京氏易北海氏英賢傳曰古有劉河者處於北海其後以為氏吳大夫有北海子髙成陽氏見姓苑漢有安陽䕶軍成陽恢生謁者僕射昇河東人濮陽氏其地在今澶州後漢外黄令牛述以濮陽潛為主簿鮮陽氏漢有揚州刺史鮮陽戩孫滔武騎常侍鮭陽氏音珪漢有少府鮭陽鴻治孟氏易梗陽氏晉有梗陽巫臯漢有侍御史謁者梗陽真落下氏漢武帝時落下閎善天文地理歴數巴郡閬中人神仙傳有落下公𤓰田氏王莽時臨淮𤓰田儀為盗賊甪氏亦作甪里氏漢初商山四皓有甪里先生以其所居在甪里後漢有甪若叔者其後也禄里氏即甪里也以甪音禄故亦作禄神仙傳有禄里先生綺里氏漢商山四皓綺里季之後夏里氏四皓夏里黄公河内人樗里氏亦作樗氏嬴姓秦丞相樗里子之後也名疾秦惠文王弟桐里氏見英賢傳後漢御史中謁者桐里斥生儒議郎晉博昌令桐里夫並河東人空同氏世本云子姓盖因空同山也延州氏姬姓吳季札居延州来因氏延州郄州氏世本晉郄豹孫歩楊生郄州因氏焉阪上氏上黨屯留人其先居阪上因氏焉晉惠帝時有殿中將軍阪上囂鉛陵氏呂氏春秋有鉛陵卓子以姓為氏氏附姚氏虞之姓也虞舜生於姚墟故因生以為姓後世亦有以為氏者左傳鄭大夫姚句耳是也漢有諫議大夫姚平舜後胡公封陳至敬仲仕齊又為田氏至田豐王莽封為代睦侯奉舜後子恢避莽亂居吳郡改姓媯氏五代孫敷又為姚氏臣謹按虞有二姓曰媯因姚墟之生而姓姚因嬀水之居而姓嬀故姚恢改姓為嬀而嬀皓又改姓為姚知姚與媯二姓可通嬀氏帝舜之後也舜居媯汭因以為姓或言舜生媯汭此姓也世亦以為氏後漢有媯皓改為姚氏文士傳有媯覽姜氏姓也炎帝生於姜水因生以為姓其後太公封於齊世與周魯為婚姻歴二十九世為田氏所滅子孫分散或以國為氏或以姓為氏又桓庭昌唐上元中准制改為姜氏歸氏姓也未詳得姓之始左傳胡子國姓歸為楚所滅子孫或以國為氏或以姓為氏以姓為氏者世居吳郡任氏姓也未詳因生之始然妊娠女子之事也姓女子之稱也妊古作壬又作任或云黄帝二十五子十二人以徳為姓一為任氏六代至奚仲封薛又云黄帝之孫顓帝少子陽封於任故以為任氏又任為風姓之國實太昊之後主濟祀今濟州任城即其地也任姓之任與任國之任子孫皆以任為氏魏有任鄙漢有御史大夫廣阿侠任敖武帝時有任安風氏姓也伏羲氏之姓任宿須句顓臾四國皆風姓風作即古文風字世亦有此姓此雖姓也古之時亦有以為氏者黄帝之臣風后是也姬氏姓也帝嚳生姬水因以為姓裔孫周文王三十餘代至赧王子孫號姬氏漢有周子南君姬嘉唐水部郎中姬處遜世居長安開元初明皇以嫌名改為周氏望出南陽嬴氏伯益之後伯益作朕虞有功賜姓嬴氏漢有嬴公治公羊望出河東太原臣謹按嬴地名也杜預云泰山嬴縣唐并入兖州博城博城今爲奉符以所居於嬴故因生以姓或言河間有嬴水故為瀛州即嬴姓所居之地姓氏齊人有此姓見漢書貨殖傳臨菑姓偉貲五千萬注云姓姓名偉是氏本氏氏齊大夫之後也吳志北海氏儀本姓氏孔融嘲之曰氏者民無上可改為是遂改焉仕吳官至侍中都亭侯唐天寶祕書少監是光又改姓齊又是云氏改為是氏亦有氏氏五代梁將氏叔琮氏延賞子氏帝嚳之子契受封於商賜姓子湯有天下微子基宋世為子姓或以為氏又楚有屈建字子木公子申字子西皆為子氏左傳魯叔孫之車士有子商鉏家語注姓子名商鉏鄭大夫子人九子熙子丁子上又宋有子韋明天文宋朝皇祐九年子元瑜登科開封人芈氏楚姓也陸終之子季連之後也陸終娶鬼方之女孕而不育十一年開左脇出三人焉又開右脇出三人焉第六子曰季連是為芊姓周文王時季連苖裔鬻熊為文王師事成王成王舉文王勞臣封其裔子于丹陽是為楚國漢初楚懷王孫芊心項羽封為楚懷王後為義帝臣謹按三代之時男子未嘗稱姓支庻未嘗稱國秦滅六國諸侯子孫皆為民庻故或以國或以姓為氏所以楚之子孫可稱楚亦可稱芈姒氏伯鯀之姓鯀為堯崇伯賜姓姒氏其子禹受舜禪為夏家至桀而絶祀國為姒姓之後王莽時封夏後遼西姒豐為章功侯按官氏志姒亦改為似後魏渴侯氏改為似氏隗氏姓也赤狄姓隗潞子嬰兒是也廧咎如東山臯落氏皆其别種而亦姓隗允氏允姓之戎居於𤓰州者其後以為氏或言允格之後偃氏臯陶生於曲阜是為偃姓六蓼皆􅟠姓之國祀臯陶文公五年楚滅之又國語舒庸舒鳩並偃姓吳有偃州員王莽時有偃參又有偃氏即偃之别族也公羊傳有偃子臯為晉士官又有匽氏後漢匽皇后秃氏國語云祝融後八姓已董彭秃妘斟曹芊周皆滅之賈逵云秃彭姓别族也姞氏史記姞氏為后稷元妃南燕宻須皆姞姓之國後改為吉氏宋朝登科吉臨澤州人酉氏黄帝十四子之一姓也見國語或作羑魏有陳留人酉收今望出太原㚰氏方几切見纂要又據此當是姓漆氏長狄僑如本鄋暪之國姓漆又為氏一云桼室女之後古有漆沈為魯相或云即漆雕開亦單為桼氏宋有郎中令漆凱之望出南昌弋氏姓也姓纂云今蒲州有弋氏望出河東宋朝弋子元太平興國二年登進士第侯岡氏地記蒼頡姓侯岡氏居馮翊衙縣伊祈氏堯之姓亦作伊祁伊氏即伊祁氏之後也裔孫伊尹名摯相湯生陟奮風俗通漢有議郎伊推又伊嘉為鴈門都尉石顯黨又伊婁氏改為伊氏宋朝登科有伊尚己氏音自己之己昆吾之姓也漢有太常卿己茂嫪氏郎到切按從女者姓也秦有嫪毐以字為氏周人字林氏姬姓周平王庻子林開之後因以為氏開生林英英生林茂林慶世系甚明而譜家謂王子比干為紂所戮其子堅逃長林之山遂為氏按古人受氏之義無此義也魯有林放仲尼弟子齊有林阮見說苑林類見列子林回見莊子林雍林不狃林楚世仕季氏故曰林氏之先皆季氏之良也然桓王之孫又有林茂林英者王子克之子也恐有差訛不應一族而同名氏者兩人又有邱林氏改為林虜姓也臣謹按林氏在唐末為昌宗而特詳著豈林寶作元和姓纂故爾然林氏出比干之子堅之說由寶傳之也著書之家不得有偏徇而私生好惡所當平心直道於我何厚於人何薄哉家氏姬姓周大夫家父之後以字為氏又魯有子家氏亦為家氏魯之公族宋朝家静登進士第蜀人也又有家彬家仲並眉州人望出南安京兆忌氏風俗通周公忌父之後以王父字為氏謀氏風俗通云周卿士祭公謀父之後以字為氏顯氏周大夫顯父之後旅氏風俗通周大夫子旅之後漢高功臣昌平侯旅卿傳封六代望出南安又共侯旅罷師傳封四代方氏周大夫方叔之後以字為氏風俗通云方雷氏之後漢有方賀唐有詩人方干嚴州人宋朝方氏為著姓閩中為多望出河南賁氏縣賁父之後風俗通魯有賁浦賁音奔又音肥漢功臣表賁赫槐氏左傳富父槐之後以王父字為氏槐音回吉氏尹吉甫之後也或云黄帝之裔伯鯈之後封於南燕賜姓姞氏後改為吉漢有漢中太守吉恪魏有吉茂晉有魏興太守吉挹劉宋有將軍吉幹宋熙寧登科有吉甫絳州人紹聖有吉觀國康國並通利軍人建炎吉與忠兖州人魯人字施氏姬姓魯惠公之子公子尾字施父其子因以為氏齊有施常仲尼弟子漢有博士施讐竒氏伯竒之後以王父字為氏又後魏河南官氏志竒斤氏改為竒氏望出河南今開封有此姓宋朝登科竒軾代州人為氏姬姓魯昭公子公為之後以字為氏後漢南郡太守為昆貢氏仲尼弟子端木賜字子貢其後以字為氏漢有御史大夫貢禹望出廣陵琅邪衆氏姬姓魯公子益師字衆仲亦曰衆父以字為民衆一音終騫氏風俗通云仲尼弟子閔子騫之後以王父字為氏閔損字子騫顓孫氏媯姓陳公子顓孫仕晉子孫氏焉顓孫師字子張仲尼弟子顓孫子英見說苑公父氏姬姓魯季悼子之子靖字公父之後也公之氏姬姓季悼子之子鞅字公之之後是也公石氏姬姓悼公子堅字公石之後也公索氏魯有公索氏將祭而亡其牲見家語公伯氏魯有公伯寮仲尼之弟子公慎氏魯有公慎氏公輸氏魯公輸般之後也公西氏見姓苑魯有公西赤子華公西蒧子上並仲尼弟子公罔氏仲尼時魯有公罔氏公冶氏公冶長齊人仲尼弟子公祖氏仲尼弟子公祖句兹魯人見纂要公羊氏魯有公羊高子夏弟子注春秋公良氏仲尼時魯人公良孺公齊氏仲尼弟子公齊定公山氏魯有公山不狃為季氏宰公儀氏公儀仲子魯人見禮記史記公儀休為魯相公沙氏後漢遼東屬國都尉公沙穆北海膠東人公玉氏玉音肅黄帝時公玉帶造明堂少施氏姬姓世本魯惠公子施父之後夏父氏魯大夫夏公弗忌宋大夫夏父徵子服氏姬姓魯桓公之子公子慶父元孫孟懿伯字子服其後以為氏子家氏姬姓魯莊公之孫公孫歸父字子家其後為子家氏子桑氏魯大夫子桑伯子之後也秦公孫枝字子桑其後亦氏焉莊子有子桑雩子陽氏姬姓魯公族有子陽者其後以王父字為氏子叔氏姬姓魯文公之子公子叔肸之子子叔聲伯之後為子叔氏亦為叔氏子士氏姬姓魯桓公之後叔孫氏之裔也叔孫成子為子士氏亦為叔孫氏子言氏姬姓魯季平子生昭伯字子言其後也本季氏子楊氏姬姓世本季桓子生穆叔其後為子楊氏子孟氏姬姓魯公子子孟之後見英賢傳又齊簡王時有子孟卿為大夫子我氏姬姓魯叔孫成子生申字子我因氏焉又衞大夫有子我封人子有氏魯有子有善祥見禮記宋有若是也又宋有子有㳟叔亦為有氏子仲氏姬姓風俗通魯宣公子仲之後見毛詩子羽氏姬姓晉公族子羽之後為楚隨邑大夫衞有行人子羽晉人字張氏世仕晉晉分為三又世仕韓此即晉之公族以字為氏者譜家謂黄帝子少昊青陽氏第五子揮為弓正觀弧星始制弓矢主祀弧星賜姓張氏此非命姓氏之義也按晉有解張字張侯自此晉國世有張氏則因張侯之字以命氏可無疑也趙有張談韓有張開地趙韓分晉皆張侯之裔也漢有張耳張釋之後周改賜叱羅氏隋復舊矯氏晉大夫矯父之後漢有將軍矯望後魏有矯慎扶風人郭頌世語北海有髙士矯應嘉氏晉大夫嘉父之後欒氏黨也胥氏晉大夫胥臣之後以字為氏或言出赫胥氏之後宋有胥偃為翰林學士慶歴登科有胥世臣撫州人熙寧有胥彦回潭州人先氏晉大夫先軫之後世為晉卿漢有先虞宋有瀘州人先詔登科利孫氏晉大夫公子利孫其後氏焉漢東萊太守任秉娶利孫氏㔻氏㔻亦作丕晉大夫㔻鄭之後也臣謹按㔻鄭亦曰㔻鄭父名字通稱也父者男子之羙稱則知自稱為㔻鄭人稱之曰㔻鄭父叔帶氏嬴姓趙夙字叔帶以字為氏齊大夫有叔帶子莊父為宰御見說苑叔向氏晉羊舌大夫之後羊舌肸肸字叔向以字為氏叔魚氏晉羊舌大夫之後也羊舌鮒字叔魚衞人字孫氏姬姓衞武公之後也武公和生公子惠孫惠孫生耳為衞上卿食邑於戚生武仲亦曰孫仲以王父字為氏孫仲生炎曰孫昭子自昭子六世至孫嘉世居汲郡晉有孫登即其裔也又有孫氏芊姓楚令尹孫叔敖之後也又有孫氏媯姓齊陳敬仲四世孫孫桓子無宇之後也或言桓子之子書戍莒有功齊景公賜姓孫氏非也以字為氏何用賜為此當是桓子祖父字也桓子曾孫武以齊之田鮑四族謀為亂奔吳為將武之子明食邑於冨春自是世為富春人彌氏姬姓史記衞公孫彌牟彌牟孫子瑕以王父字為氏臣謹按王父字為氏者皆公子也諸侯支庻之子為所始之宗故以其字為氏今彌牟者公子郢之子靈公之孫也以此則知亦有以公孫之字為氏者析氏衞公族大夫析朱鉏之後也朱鉏公子黒背之孫以王父字為氏齊有大夫析歸父後漢析像通京氏易像者鬱林太守析國之子也廣漢雒縣人像入後漢方術傳望出廣漢西河也臣謹按鄭公孫黒字子晳楚公子黒肱亦字子晳今析朱鉏乃公子黒之子疑析即黒之字耳晳亦作析石氏姬姓靖伯之孫石碏有大功於衞世為衞大夫齊有石之紛如楚有石奢石乞鄭有石申父石癸石楚石制石首石􅎢周有石速石張石尚漢有石奮生建慶號萬石君五代石氏建國號晉又烏石蘭氏改為石氏臣謹按晉揚食我字伯石鄭公孫段字子石則知此之為石者必其字也南氏姬姓衞靈公之子公子郢字子南以字為氏或言周宣王南仲之後又魯亦有南氏又楚有子南氏亦為南氏是皆以字為氏者或言晉高士居隠於南鄉因以為氏此以鄉為氏者姓源韻譜云盤庚妃姜氏夢龍入懷因孕十二月而生手把南字長荆州因號南赤龍此里巷之言也六國時有南公子著書言五行隂陽之事漢有南竭為北平太守又有南季善算王莽時有南觀觀一作歡後漢有南韜為雍州刺史南纂為平昌太守唐有南霽雲忠義之士宋朝南楚南翥登進士第望出汝南宣和有南得臣燕人望出汝南又姓源韻譜云亦改為宇文氏子南氏衞靈公之子公子郢之後為子南氏鄭穆公之孫公孫楚之後為子南氏姬姓也楚莊王之子公子追舒之後為子南氏芊姓也子玉氏姬姓衞大夫子玉霄之後秦穆公時大夫有子玉房子伯氏姬姓衞大夫子伯季之後魏有子伯先子夏門人居西河子齊氏姬姓衞公族也公南氏姬姓衞獻公之子楚字公南生子牟為公南氏公叔氏姬姓衞獻公之公子當字公叔之後公孟氏姬姓衞公孟縶之後也公明氏衞大夫公明賈公文氏衞大夫公文要公析氏姬姓衞公子黒背字子析之後也鄭人字游氏姬姓鄭穆公之子公子偃字子游其後以王父字為氏鄭大夫游吉裔孫尋漢御史中丞後漢有游因前趙有游子逺前燕有游宗皆為股肱之任國氏姬姓鄭穆公之子公子發字子國其後以王父字為氏齊有國氏姜姓其先共伯齊之公族也髙氏國氏世為齊上卿盖天子所以命相齊者故曰有天子之二守國髙在宋朝登科國鼎臣海州人國經衡州人又有國宗望出下邳樂安駟氏姬姓鄭穆公子子駟之後也公子騑字子駟其孫駟帶駟乞以王父字為氏漢恩澤侯表鄔侯駟鈞齊哀王舅印氏姬姓鄭穆公子子印之後也公子㫻字子印其孫印段以王父字為氏望出馮翊南唐印粲登第宋朝有印况舉進士江寧人良氏姬姓鄭穆公子子良之後漢有河間相良就又有良賀伯有氏姬姓鄭穆公元孫良霄字伯有之後也伯有為良氏復為伯有氏所以别其族羽氏姬姓鄭子羽之後也漢有侠士羽公後魏官氏志弗羽氏改為羽氏望出河南罕氏姬姓鄭穆公之子公子喜字子罕其孫罕虎罕魋遂為罕氏子師氏姬姓鄭大夫子師僕之後也漢有北平太守子師將子國氏姬姓鄭公子發字子國之後也亦為國氏子罕氏姬姓鄭公子喜字子罕之後也或作子軒氏亦為罕氏子孔氏鄭公子嘉字子孔之後也姬姓又有公子志謂之士子孔並穆公之子亦為孔氏子游氏姬姓鄭公子偃字子游之後也亦為游氏子駟氏姬姓鄭公子騑字子駟之後也亦為駟氏子晳氏姬姓鄭公孫黒字子晳之後也子豐氏姬姓鄭公子去疾字子豐之後也亦為豐氏子人氏鄭子人九之後也亦為子氏宋人字孔氏子姓出宋閔公之後閔公生弗父何以有宋而授厲公三世生正考父傳所謂三命滋益㳟者考父生孔父嘉為大司馬魯隠公三年宋穆公疾召孔父而屬殤公焉桓三年宋華父督見孔父之妻子路目逆而送之曰羙而艶遂殺嘉而取其妻其子奔魯嘉字孔父後世以字為孔氏又為孔父氏自孔父六世而生仲尼三嵗䘮父十九而娶娶一年而生鯉以哀公十六年四月己丑卒年七十三葬魯城北泗上自漢以來孔氏襲奉百世不絶又衞有孔氏不知所出為衞世卿魯文公元年孔逹始見傳昭七年衞襄公夫人無子嬖人婤姶生孟縶孔成子夢康叔謂已立元余使羈之孫圉與史狗相之故孔氏之孫世為衞大夫又鄭有孔氏穆公蘭之後也穆公之子十三人其二皆為孔氏宋子生子曰公子喜字子孔遂為孔氏圭媯生子曰公子志字士子孔亦為孔氏後無聞牛氏子姓宋微子之後司宼牛父之子孫以王父字為氏趙有武靈王將軍牛翦秦大儒有牛缺漢䕶羌校尉牛邯前秦有大夫牛夷北涼有郎中牛温後秦有牛犨淮南子有牛哀又有牛金之後逃難改姓牢氏又改為尞氏後復牛氏樂氏子姓宋微子之後戴公生公子衎字樂父子孫以王父字為氏曽孫樂莒莒孫喜字子罕燕有樂毅毅孫臣叔漢髙祖封為華成君裔孫恢宋朝樂史作寰宇記又有樂良樂泌登科樂希孟樂璠並卭州人皇甫氏子姓宋戴公之子充石字皇父其後以王父字為氏漢興改父為甫後漢安定都尉皇甫儁生稜始居安定稜子彪有八子號八祖皇甫氏為著姓靈氏子姓宋大夫子靈之後也文公之子公子圍龜字子靈以字為氏或曰齊靈公之後以字為氏者左傳有靈輙邊氏子姓宋公子城之後城字子邊或言宋平公子御戎字子邊以王父字為氏孫卭為司徒又周大夫有邊伯正氏亦作政子姓宋正考父之後魏志永昌太守正帛宋登科正尹祿氏子姓風俗通云紂子武庚字禄父其後以字為氏涇陽有此禄姓亦出扶風又吐蕃酋長有禄東贊乙氏子姓商湯字天乙支孫因以王父字為氏前燕有䕶軍乙逸今襄陽有乙氏又燕有鴻臚乙歸揚威將軍乙愛皆北狄種類又河南官氏志乙弗氏改為乙氏或云望出平原魚氏子姓風俗通云宋桓公子公子目夷字子魚子孫以王父字為氏漢有長安冨人魚翁叔唐有魚朝恩宋朝有御史中丞魚周詢開封人事父氏子姓宋人子革氏世本宋司城子革之後又曰季平子支孫亦為子革氏子儀氏左傳宋桓司馬之臣子儀克齊人字慶氏姜姓齊桓公之子公子無虧之後也無虧生慶克亦謂之慶父名字通用是亦以字為氏者望出廣陵臣謹按諸侯之子稱公子公子之子稱公孫公孫之子以王父字為氏今無虧之子慶父其後為慶氏此又以父字為氏而不以王父字為氏也不可一槩言賀氏即慶氏也姜姓齊桓公之支庻也自齊慶父之後皆以慶為氏至後漢汝陰令慶儀即慶普之裔也儀之孫酺酺子侍中質避安帝父諱改為賀氏又後魏賀蘭氏賀賴氏並改為賀氏虜姓也望出廣平宋賀恂青州人慶歴登科賀理蔡州人熙寧登科賀旂元祐賀衞政和賀紱並齊人也賀宻賀天覺並宻州人宣和登科尚氏姜姓齊太公之後也太公號太師尚父支孫因氏焉後漢髙士尚長字子平望出汲郡清河上黨旗氏風俗通齊卿公孫竈之孫樂施字子旗子孫以王父字為氏後漢有九江太守旗况子旗氏姜姓齊惠公曽孫欒施字子旗之後也本欒氏子乾氏姜姓世本齊公子都字子乾之後也子工氏姜姓世本齊頃公之子公子子共之後也子泉氏姜姓世本齊頃公之子公子湫字子泉之後也又子泉捷齊大夫見新序子襄氏姜姓齊惠公之子公子子襄之後也子雅氏姜姓齊惠公之孫公孫竈字子雅之後也子尾氏姜姓齊惠公之孫公孫蠆字子尾之後也亦為髙氏邾人字顔氏曹姓顓帝元孫陸終第五子曰安安裔孫挾周武王時封之於邾為魯附庸邾挾之後至於夷父字顔公羊謂之顔公子孫因以為氏據圈稱陳留風俗傳及葛洪要字皆如此云但謂顔為武公然邾自顔六世至文公蘧蒢始有爵諡武公之號未必然也王儉譜云顔氏出自魯侯伯禽支庻食采顔邑因氏焉真卿尚書譜云未知儉何所慿故當依圈葛二家及舊譜為定仲尼弟子逹者顔氏八人四科之首稱顔淵然惟齊魯多顔氏豈其近於邾故顔公之子孫散在二國與漢有大司農顔異濟南人顔駟江都人後漢顔良為袁紹將臨沂人諸國人字董氏己姓或言姬姓黄帝之裔孫有􅀈叔安生董父其後遂為董氏又有陸終之子參故姓董周時為故國其後亦為董氏晉有董狐董安于漢有江都相董仲舒清河廣川人後漢有董宣董鈞宣陳留人鈞犍為人晉有董京董飬又有范陽董秦大歴賜姓李氏明氏姬姓虞仲之後也有百里奚者為虞之公族大夫晉獻公滅虞虜虞公及其大夫百里奚以媵秦穆姬自此遂為秦大夫奚生孟明視視名也明字也以字為氏宋朝有明鎬參知政事熙寧登科明覿吉州人紹興撫諭使明櫜潭州人子臧氏姬姓曹公子欣時字子臧之後也子華氏韓有子華子因以為氏焉子州氏莊子堯以天下與子州支父舜以天下與子州支伯公賔氏王莽校尉公賔就斬莽首傳於宛就北海人陳人字袁氏亦作轅亦作爰媯姓舜後陳胡公之裔胡公生申公申公生靖伯十八世孫莊伯生諸字伯爰孫濤塗以王父字為氏世為陳上卿轅氏陳轅濤塗之後其詳見袁氏譜史記儒林有轅固漢書有轅豊後漢功臣禦兒侯轅終古爰氏即袁氏也陳胡公裔九代孫爰伯諸之後漢有爰盎楚人後漢侍中爰延陳留人魏郎中令爰節占氏陳子占之後以王父字為氏子獻氏嬀姓世本陳桓公孫子獻之後風俗通云齊大夫子獻之後也楚文王之時子獻遼為大夫子占氏世本陳桓子生書字子占之後也子鞅氏嬀姓陳倍公生簡子齒為子鞅氏子芒氏媯姓陳僖公生盈字子芒之後也子尚氏媯姓世本陳僖公生廪邱子尚意兹因氏焉國語鄭大夫子尚伯父子禽氏媯姓陳僖公生惠子子得為子禽氏子輿氏媯姓陳桓公生子石難為子輿氏子寤氏媯姓陳僖公生宣子其後為子寤氏子沮氏媯姓陳桓公生子輿為子沮氏子宋氏媯姓陳宣公生子楚其後為子宋氏子夏氏媯姓陳公子少西字子夏之後也子枋氏楚人字秦人字附成氏楚若敖之後以字為氏僖二十六年成得臣鬬宜申帥師滅䕫冬令尹子玉司馬子西伐宋圍緡二十八年晉及楚戰于城濮楚師敗績子玉及連穀而死文五年成大心率師滅六十二年令尹大孫伯卒成嘉為令尹昭十二年或譖成虎於楚子成虎知之而不能行楚子謂成虎若敖之餘也遂殺之又有郕國之後亦去邑為成又周成肅公成桓公未知其以字以邑與後漢成瑨魏有成濟成倅包氏出自申氏楚大夫申包胥之後以字為氏宋朝包拯為樞宻副使廬州人潘氏芊姓楚之公族以字為氏潘崇之先未詳其始或言畢公髙之子季孫食采於潘謬矣潘岳家風詩自可見晉亦有潘父恐自楚徃也漢有潘瑾後漢有潘勉又有破多羅氏改姓潘氏虜姓也宋朝潘羙為太師乗氏風俗通楚大夫子乗之後以王父字為氏又乗睢古賢人見世本漢有煮棗侯乗昌乗平聲或音賸又有乗和治易為博士椒氏楚伍參之後也或為伍氏或為椒氏囊氏芊姓楚莊王子子囊之後也公子貞字子囊以字為氏孫囊瓦為令尹齊大夫囊帶叔敖氏芈姓楚蚡冐之後也蒍艾獵為令尹字叔敖以字為氏無鉤氏芊姓潛夫論云楚蚡冐生薳章為王子無鉤氏焉若敖氏芊姓楚君若敖之後也臣謹按若敖者楚君熊義字也或言楚國尊者稱敖如霄敖郟敖之類是也伯比氏芈姓楚若敖之後也懷王時有大夫伯比仲華則知伯比雖以鬬氏傳家而復以伯比為氏亦所以别族子庚氏芊姓楚公子午字子庚其後以王父字為氏子季氏芊姓楚之公族也子西氏芊姓楚公子申字子西之後也子重氏芊姓楚公子嬰齊字子重之後子期氏芊姓楚公子結字子期之後也子囊氏芊姓楚公子貞字子囊之後也桑氏嬴姓秦大夫子桑之後也公孫枝字子桑以字為氏漢有御史大夫桑𢎞羊成帝時有桑欽撰水經三卷五代尚書令桑維翰望出朝登郵人臣謹按以王父字為氏者公子之為王父者也今公孫枝之後亦用公孫字為氏逢孫氏英賢傳秦大夫逄孫之後漢有隴西都尉逢孫依通志卷二十七
