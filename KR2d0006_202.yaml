body:
  text: 通志卷一百七十八宋右廸功郎鄭樵漁仲撰隠逸傳第二宋宗炳從父弟彧之沈道䖍孔淳之周續之戴顒翟法賜雷次宗郭希林劉凝之龔祈朱百年闗康之辛普明樓恵明漁父孫緬齊褚伯玉顧歡盧度杜京産孔道徽徽道徽父祐道兄子總明僧紹兄僧允僧僧允次弟暠臧榮緒宗測吳苞趙僧巖孔蔡薈嗣之徐伯珍婁㓜瑜沈麟士庾易劉虬沈顗梁何㸃兄求弟允阮孝緒劉歊王敬允訐歊族弟鄧郁陶𢎞景諸葛璩劉慧斐范元琰庾詵子曼倩張孝秀庾承先陳馬樞後魏眭夸馮亮李謐鄭脩隋李士謙崔廓徐則張文詡鄭翻宋宗炳字少文南陽湼陽人也祖承宜都太守父繇之湘鄉令母同郡師氏聰辯有學義教授諸子炳居䘮過禮為鄉閭所稱刺史舉秀才不就武帝既誅劉毅領荆州問毅府諮議參軍田永曰今日何施而可永曰除其宿釁倍其恵澤貫叙門次顯擢才能如此而已武帝納之乃辟炳為主簿不起問其故荅曰栖邱飲谷三十餘年武帝善其對而止炳妙善琴書圖畫精於言理每㳺山水往輙忘歸征西長史王敬𢎞每從之㳺未嘗不彌日也乃下入廬山就釋慧逺考尋文義兄臧為南平太守逼與俱還乃於江陵三湖立宅閑居無事武帝召為太尉行参軍驃騎將軍道憐命為記室参軍並不就二兄早卒孤累甚多家貧無以相贍頗營稼穡人有餉遺並受之武帝勅南郡長給吏役又數致餼賫後子弟從禄乃悉不復受武帝開府辟召下書召炳與鴈門周續之並為太尉掾皆不起及受禪徴為太子舍人元嘉初又以太子庶子徴並不應妻羅氏亦有髙情與炳協趣羅氏沒炳哀之過甚既乃輟哭悲情頓釋謂沙門釋慧堅曰死生之分未易可逹三復至教方能遣哀衡陽王義季為荆州親至其室與之歡宴命為諮議参軍不起炳好山水愛逺㳺西陟荆巫南登衡岳因結宇衡山欲懐尚平之志有疾還江陵歎曰老疾俱至名山恐難徧覩唯當澄懐觀道卧以㳺之凡所㳺履皆圖之於室謂人曰撫琴動操欲令衆山皆響古有金石弄為諸桓所重桓氏亡其聲遂絶唯炳傳焉文帝遣樂師楊歡就炳受之炳孫測亦有祖風齊史隠逸有傳炳從父弟彧之字叔粲早孤事兄恭謹家貧好學雖文義不逮於炳而真澹過之徴辟一無所就元嘉初大使陸子貞觀採風俗三詣彧之每辭疾不見告人曰我布衣草莱之人少長壟畆何宜枉軒冕之客子真還表薦之又不就徴卒於家沈道䖍吳興武康人也少仁愛好老易居縣北石山下孫恩亂後饑荒縣令庾肅之迎出縣南廢頭里為立宅臨溪有山水之玩時復還石山精廬與諸孤兄子共釜庾之資困不改節受琴於戴遶王敬𢎞深敬重之郡州府凡十二命皆不就有人竊其園菜者外還見之仍自逃隠待竊者去後乃出人又拔其屋後大筍令人止之曰惜此筍欲令成林更有佳者相與乃令人買大筍送與之盗者慙不取道䖍使置其門内而還常以捃拾自資同捃者或争穟道䖍諫之不止悉以其所得與之争者愧恧後每事輙云勿令居士知冬月無複衣戴顒聞而迎之為作衣服并與錢一萬及還分身上衣及錢悉供諸兄弟子無衣者鄉里少年相率受學道䖍常無食以立學徒武康令孔欣之厚相資給受業者咸得有成文帝聞之遣使存問賜錢三萬米二百斛悉供孤兄子嫁娶徴員外散騎侍郎不就累世事佛推父祖舊宅為寺至四月八日每請像請像之日輙舉家感動焉道䖍年老菜食恒無經宿之資而琴書為樂孜孜不倦文帝勅郡縣使隨時資給卒子慧鋒脩父業不就州辟孔淳之字彦深魯人也祖惔尚書祠部郎父粲秘書監徴不就淳之少有髙尚愛好墳籍為太原王恭所稱居㑹稽剡縣性好山水每所㳺觀必窮其幽峻或旬日忘歸嘗㳺山遇沙門釋法崇因留共止遂停三載法崇嘆曰緬想人外三十年矣今乃傾盖于兹不覺老之將至也及淳之還乃不告以姓除著作佐郎太尉参軍並不就居䘮至孝廬於墓側服闋與處士戴顒王𢎞之及王敬𢎞等並為人外之㳺又申之以婚姻敬𢎞以女適淳之子尚遂以烏羊繋所乘車轅提壺為禮至則盡歡共飲訖暮而歸或怪其如此答曰固亦農夫田父之禮也㑹稽太守謝方明苦要之不能致使謂曰茍不入吾郡何為入吾郭淳之笑曰潛㳺者不識其水巢栖者非辨其林飛沈所至何問其主終不肯往茅室蓬户庭草蕪徑唯牀上有數帙書元嘉初復徴為散騎侍郎乃逃于上虞縣界家人莫知所在弟黙之為廣州刺史出都與别司徒王𢎞要淳之集冶城即日命駕東歸遂不顧也元嘉七年卒黙之儒學注糓梁春秋黙之子熙先事在范曄傳周續之字道祖鴈門廣武人也其先過江居豫章建昌縣續之年八嵗䘮母哀戚過於成人奉兄如事父豫章太守范寗於郡立學招集生徒逺方至者甚衆續之年十二詣寗受業居學數年通五經五緯號曰十經名冠同門時稱為顔子既而閑居讀老易入廬山事沙門釋慧逺時彭城劉遺民遁迹廬山陶淵明亦不應徴命謂之潯陽三隠續之以為唯身不可遣餘累宜絶遂終身不娶布衣蔬食劉毅鎮姑孰命為撫軍参軍徴為太學博士並不就江州刺史每相招請續之不尚峻節頗從之㳺常以嵇康髙士傳得出處之美因為之注武帝北討世子居守迎續之館于安樂寺延入講禮月餘復還山江州刺史劉栁薦之武帝俄辟太尉掾不就帝北伐還鎮彭城遣使迎之禮賜甚厚每稱之曰心無偏吝真髙士也尋復南還及帝踐阼復召之上為開館東郭外招集生徒乘輿降幸并見諸生問續之禮記傲不可長與我九齡射於矍圃之義辨析精奥稱為該通續之素患風痺不復堪講乃移病鍾山景平元年卒通毛詩六義及禮論注公羊傳行於世無子兄子景逺有續之之風戴顒字仲若譙郡銍人也父逵兄勃並隠遯有髙名顒年十六遭父憂㡬於毁滅因此長抱羸患前後徴辟不就以父不仕復脩其業父善琴書顒並傳之凡諸音律皆能揮手㑹稽剡縣多名山故世居剡下顒及兄勃並受琴於父父歿所傳之聲不忍復奏遂各造新弄勃製五部顒製十五部顒又製長弄一部並傳於世中書令王綏嘗擕客造之勃等方進豆粥綏曰聞卿善琴試欲一聽不荅綏恨而去桐廬縣素多名山兄弟復共㳺之因留居止勃疾患醫藥不給顒謂勃曰顒今從兄閑居非有心於語黙但以兄方疾苦無可營療顒當干禄以自濟耳乃求海虞令事垂行而勃卒乃止仍以桐廬僻逺難以養疾乃出居吳下吴下士人並為築室聚石引水植林開澗少時繁宻有若自然乃述荘周大㫖著逍遥論注禮記中庸篇三吳将守及郡内衣冠要其同㳺野澤堪行便去不為矯介衆論以此多之宋國初建令曰前太尉参軍戴顒辟士韋元並秉操幽遁守志不逾宜加恩奨以宏止退並可散騎常侍通直不起元嘉初又與宗炳同徴不就衡陽王義季鎮京口長史張邵與顒姻通迎来止黄鵠山山北有竹林精含林澗甚美顒憇于此澗義季亟從之㳺顒服其野服不改常度為義季鼓琴並新聲變曲其三調㳺絃廣陵止息之流皆與世異文帝每欲見之嘗謂黄門侍郎張敷曰吾東巡之日當宴戴公山下也以其好音長給正聲伎一部顒合何嘗白鵠二聲以為一調號為清曠自漢世始有佛像形制未工逵特善其事顒亦参焉宋世子鑄丈六銅像於瓦官寺既成而面恨痩工不能改乃迎顒看之顒曰非面痩乃臂胛肥耳及減臂胛痩患即除無不嘆服十八年卒年六十四無子後景陽山成顒已亡矣上嘆曰恨不使戴顒觀之翟法賜潯陽柴桑人也曽祖湯祖荘父矯並髙尚不仕逃避徴辟法賜少守家業立屋於廬山頂䘮親後便不復還家不食五糓以獸皮及結草為衣雖鄉親中表莫得見焉州辟主簿舉秀才徴著作佐郎並不就後其家人至石室尋求因復逺徙違避徴聘遁迹幽深潯陽太守鄧文子表曰奉詔書徴郡民新除著作佐郎南陽翟法賜補散騎侍郎法賜隠迹廬山于今四世栖身幽巖人罕見者如當逼以王憲束以嚴科驅山獵草以期禽獲必致顛殞有傷盛化乃止後卒於巖石之間不知年月雷次宗字仲倫豫章南昌人也少入廬山事沙門釋慧逺篤志好學尤明三禮毛詩隠退不交世務本州辟從事散騎侍郎徴並不就與子姪書以言所守曰人生之脩短咸有定分不可以智力求但當於所禀之中順而勿牽爾汝等年各成長冠娶以畢修葺衡泌吾復何憂自今以往家事大小一勿見闗子平之言可以為法元嘉十五年召至京師開館於雞籠山聚徒教授置生百餘人㑹稽朱膺之潁川庾蔚之並以儒學監總諸生時國子學未立上留意藝文使丹陽尹何尚之立元學太子率更令何承天立史學司徒参軍謝元立文學凡四學並建車駕數幸次宗館資給甚厚又除給事中不就久之還廬山公卿以下並設祖道二十五年制以散騎侍郎徴詣京邑為築室於鐘山西巖下謂之招隠館使為皇太子諸王講䘮服經次宗不入公門乃使自華林東門入延賢堂就業其年卒於鐘山子肅之頗傳其業官至豫章郡丞郭希林武昌人也曽祖翻晉世髙尚不仕希林少守家業徴召一無所就卒子蒙亦隠居不仕劉凝之字隠安小名長生南郡枝江人也父期公衡陽太守兄盛公髙尚不仕凝之慕老萊嚴子陵為人推家財與弟及兄子立屋於野外非其力不食州里重其徳行辟召並不就妻梁州刺史郭銓女也遣送豐麗凝之悉散之親屬妻亦能不慕榮華與凝之安儉苦夫妻共乘薄笨車出市買易周用之外輙以施人為村里所誣一年三輸公調凝之以為信然求皆與之又嘗有認其所著屐凝之笑曰僕著已敗令家中覔新者與君此人後田中得所失屐送還不肯復取徴為秘書郎不就臨川王義慶衡陽王義季鎮江陵並遣使存問凝之荅書曰頓首稱僕不脩百姓禮人或譏焉凝之曰昔老萊向楚王稱僕嚴陵亦抗禮光武未聞巢許稱臣堯舜時戴顒與衡陽王義季書亦稱僕荆州年饑義季慮凝之餒斃餉錢十萬凝之大喜将錢至市門觀有饑色者悉分與之俄頃立盡性好山水一旦並擕妻子泛江湖隠居衡山之陽登髙嶺絶人迹為小屋居之採藥服食妻子皆從其隠元嘉二十五年卒年五十九龔祈字盖道武陵漢夀人也從祖元之父黎人並不應徴辟祈風姿端雅容止可觀中書郎范述見而嘆之曰此荆楚之仙人也自少及長徴辟一無所就祈時或賦詩而言不及世事卒年四十二朱百年㑹稽山隂人也祖凱之晉左衛將軍父璹揚州主簿百年少有髙情親亡服闋携妻孔氏入㑹稽山伐樵採箬為業以樵箬置道頭輙為行人所取明旦已復如此人稍怪之積久方知是朱𨼆士所賣湏者隨其所堪多少留錢取樵箬而去或遇寒雪樵箬不售無以自資輙自榜船送妻還孔氏天晴復迎之有時出山隂為妻買繒綵三五尺好飲酒遇醉或失之頗能言元理為詩詠往往有髙勝之言隠迹避人唯與同縣孔顗友善顗亦嗜酒相得輙酣對盡歡百年家素貧母以冬月亡衣並無綿絮自此不衣綿帛嘗寒時就顗宿衣悉裌布飲酒醉眠顗以卧具覆之百年不覺也既覺引卧具去體謂顗曰綿定竒温即因流涕悲慟顗亦為之傷感除太子舍人不就顔竣為東揚州發教餉百年榖三百斛不受時山隂又有寒人姚吟亦有髙趣為衣冠所重峻餉吟二百斛吟亦不受百年卒山中蔡興宗為㑹稽太守餉百年米百斛百年妻遣婢詣郡門固讓時人美之以比梁鴻妻闗康之字伯愉河東楊人也世居京口寓居南平昌少而篤學姿状豐偉下邳趙繹以文義見稱康之與之友善特進顔延之等與當時名士十許人入山候之見其散髮被黄布帊席松葉枕一塊白石而卧了不相眄延之等咨嗟而退不敢干也晉陵顧悦之難王弼易義四十餘條康之申王難顧逺有情理又為毛詩義經籍疑滯多所論釋嘗就沙門支僧納學算妙盡其能徴辟一無所就棄絶人事守志閑居弟雙之為臧質車騎参軍與質俱下至赭圻病卒瘞於水濵康之時得疾少差牽以迎䘮因得虚勞病寢頓二十餘年時有閑日輙卧論文義孝武即位遣大使陸子真巡行天下使反薦康之宜加徴聘不見省康之性清約獨處一室希與妻子相見不通賔客弟子以業傳授尤善左氏春秋齊髙帝為領軍時素好此學送本與康之康之手自㸃定又造禮論十卷髙帝絶賞愛之及崩遺詔以入元宫康之以明帝泰始初與平原明僧紹俱徴辭以疾時又有河南辛普明東陽樓恵明皆以篤行聞普明字文逹少就康之受業至性過人居貧與兄共處一帳兄亡仍以帳施靈牀蚊甚多通夕不得寝而終不言侵螫僑居㑹稽士子髙其行當葬兄皆送金為贈後至者不復肯受人問其故荅曰本以兄墓不周故不逆親友之意今實已足豈可利亡者餘贈邪齊豫章王嶷為揚州徴為議曹從事不就恵明字智逺立性貞固有道術居金華山舊多毒蟲自恵明居之無復辛螫之苦藏名匿迹人莫之知明帝召不至齊髙帝徴又不至文恵太子在東宫苦延方至仍又辭歸俄自金華輕棹西下乃就路廻之豐安旬日之間唐㝢之妖賊入城塗地唯豐安獨全時人以為有先覺齊武帝勅為立館漁父者不知姓名亦不知何許人也太康孫緬為尋陽太守落日逍遥渚際見一輕舟凌波隠顯俄而漁父至神韻瀟灑垂綸長嘯緬甚異之乃問有魚賣乎漁父笑而荅曰其釣非釣寜賣魚者邪緬益怪焉遂褰裳渉水謂曰竊觀先生有道者也終朝鼓枻良亦勞止吾聞黄金白璧重利也駟馬髙盖榮勢也今方王道文明守在海外隠鱗之士靡然向風子何不贊緝熙之美何用晦其若是也漁父曰僕山海狂人不達世務不辨貧賤無論榮貴乃歌曰竹竿籊籊河水悠悠相忘為樂貪餌吞鈎非夷非恵聊以忘憂於是悠然鼓楫而去緬字孝緒太子僕興曽之子也有學義明帝甚知之位至左丞東中郎司馬齊褚伯玉字元璩吳郡錢塘人也髙祖含始平太守父逷征虜参軍伯玉少有隠操寡嗜慾年十八父為之婚娶婦入前門伯玉從後門出遂往剡居瀑布山性耐寒暑時人比之王仲都在山三十餘年隔絶人物王僧逹為吳郡苦禮致之伯玉不得已停郡信宿纔交數言而退宋孝建二年散騎常侍樂詢行採風俗表薦伯玉加徴聘本州議曹從事不就髙帝即位手詔吳㑹二郡以禮迎遣又辭疾上不欲違其志勅於剡縣白石山立太平館居之建元元年卒年八十六伯玉常居一樓上仍葬樓所孔珪從其受道法為於館側立碑顧歡字景怡一字元平吳郡鹽官人也家世寒賤父祖並為農夫歡獨好學年六七嵗知推六甲家貧父使田中驅雀歡作黄雀賦而歸雀食稻過半父怒欲撻之見賦乃止鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者夕則然松節讀書或然糠自照及長篤志不倦聞吳興東遷邵元之能傳五經文句假為書師從之受業同郡顧凱之臨縣見而異之遣諸子與㳺及孫憲之並受經焉年二十餘更從豫章雷次宗諮元儒諸義母亡水漿不入口六七日廬於墓次遂隠居不仕於剡中天台山開館聚徒受業者常近百人歡早孤讀詩至哀哀父母輙執書慟泣由是受學者廢蓼莪篇不復講焉晚節服食不與人通每旦出户山鳥集其掌上取食好黄老通解隂陽書為數術多効騐初以元嘉中出都寄住東府忽題柱云三十年二月二十一日因東歸後元凶弑逆是其年月日也弟子鮑靈綬門前有一株樹大十餘圍上有精魅數見影歡印樹樹即枯死山隂白石村多邪病村人告訴求哀於歡歡乃往村中為講老子規地作獄有頃見狐狸黿鼉自入獄中者甚多即命殺之病者皆愈又有病邪者問歡歡曰家有何書荅曰唯有孝經而已歡曰可取仲尼居置病人枕邉恭敬之自差也而後病者果愈人問其故答曰善禳惡正勝邪此病者所以差也髙帝輔政徴為揚州主簿及踐阼乃至稱山谷臣顧歡上表進政綱一卷時員外郎劉思効表陳讜言優詔並稱其美歡東歸上賜塵尾素琴永明元年詔徴為太學博士同郡顧黯為散騎侍郎黯字長孺亦有隱操與歡俱不就徴㑹稽孔珪嘗登嶺尋歡共談四本歡曰夫中理唯一豈容有二四本無正失中故也於是著三名論以正之歡又以佛道二家教異學者互相非毁乃著夷夏論以辨其異同宋司徒袁粲託為道人通公駮之歡與往復論難其辭甚暢文多不載歡口不辯長於著論又注王弼易二繋學者傳之知將終賦詩言志曰五塗無恒宅三清有恒舎精氣因天行㳺魂隨物化鵾鵬適大海蜩鳩之桑柘達生任去留善死均日夜委命安所乘何方不可駕翹心企前覺融然從此謝自尅死日自擇葬時卒於剡山時年六十四身體香軟道家謂之屍解仙化焉還葬舊墓木連理生於墓側縣令江山圖表狀武帝詔歡諸子撰歡文議三十卷又始興人盧度字孝章亦有道術少隨張永北侵魏永敗魏人追之急阻淮水不得過度心誓曰若得免死從今不復殺生湏臾見兩楯流来接之得過後隠居廬陵西昌三顧山鳥獸隨之夜有鹿觸其壁度曰汝勿壊我壁鹿應聲而去屋前有池養魚皆名呼之次第来取食乃去逆知其死年月與親友别永明末以夀終杜京産字景齊吳郡錢塘人也祖運劉毅衛軍參軍父道鞠州從事善彈碁京産少恬静閉意榮宦頗渉文義専脩黄老㑹稽孔顗清剛有峻節一見而為款交郡命主簿州辟從事稱疾去與同郡顧歡同契於始寜東山開舍授學建元中武陵王曄為㑹稽髙帝遣儒士劉瓛入東為曄講瓛故往與之㳺曰杜生當今之臺尚也京産請瓛至山舍講書傾資供待子栖躬自屣履為瓛生徒下食孔珪周顒謝卄瀹並致書以通殷勤永明十年珪及光禄大夫陸澄祠部尚書虞悰太子右率沈約司徒右長史張融表薦京産徴為奉朝請不至於㑹稽日門山聚徒教授建武初徴為員外散騎侍郎京産曰荘生持釣豈為白屋所回辭疾不就卒㑹稽山隂人孔道徽守志業不仕與京産善道徽父祐至行通神隠於四明山嘗見山谷中有數百斛錢視之如瓦石不異采樵者競取入手成沙礫曽有鹿中箭来投祐祐為之養創愈然後去太守王僧䖍與張緒書曰孔祐敬康曽孫也行動幽祗徳標松桂引為主簿遂不可屈此古之遺徳也道徽少厲髙行能世其家風隠居南山終身不窺都邑豫章王嶷為揚州辟西曹書佐不至鄉里宗慕之道徽兄子總有操行遇饑寒不可得衣食縣令吳興邱仲孚薦之除竟陵王侍郎竟不至永明中㑹稽中山有人姓蔡不知名隠山中養䑕數千頭呼来即来遣去即去言語狂易時謂之謫仙不知所終京産髙祖子恭以来及子栖世傳五斗米道不替栖有至性列在孝友傳明僧紹字休烈一字承烈平原鬲人其先吳太伯之裔百里奚字孟明其後世以名為姓祖玩州中從事父畧給事中僧紹明經有儒術宋元嘉中再舉秀才永光中鎮北府辟功曹並不就隠長廣郡嶗山聚徒立學魏尅淮北乃南渡江宋明帝以通直郎召不就髙帝為太傅教辟僧紹及顧歡臧榮緒以旌幣之禮徴為記室參軍不至僧紹弟慶符為青州僧紹乏糧食隨慶符之鬱州住弇榆山栖雲精舍欣玩水石竟不一入州城詔書就徴不就泰始季年岷益有山崩淮水竭齊郡僧紹竊謂其弟曰夫天地之氣不失其序若夫陽伏而不泄隂廹而不蒸於是乎有山崩川竭之變昔伊洛竭而夏亡河竭而殷亡三川竭岐山崩而周亡五山崩而漢亡夫有國必依山川而為固山崩川竭不亡何待今漢徳如四代之季矣爾誌吾言而勿泄也竟如其言建元元年冬徴為正員外郎不就其後帝與崔思祖書曰明居士標意可重吾前㫖尚未逹邪小涼欲有講事即可至彼具述吾意令與慶符俱歸僧紹又曰不食周粟而食周薇古猶發譏在今安得息談邪聊以為笑慶符罷任僧紹隨歸住江乘攝山僧紹聞沙門釋僧逺夙徳往候定林寺帝欲出寺見之僧逺夙問僧紹曰天子若来居士若為相對僧紹曰山藪之人政當鑿坯以遁若辭不獲命當依戴公故事耳既而遁還攝山建栖霞寺而居之帝甚以為恨昔戴顒髙卧牖下以山人之服加其身與相見僧紹故云髙帝後謂慶符曰卿兄髙尚其事亦堯之外臣朕夢想幽人固已動矣所謂逕路絶風雲通仍賜竹根如意筍籜冠隠者以為榮焉勃海封延伯者髙行士也聞之歎曰明居士身彌後而名彌先亦宋齊之儒仲也永明中徴國子博士不就卒僧紹長兄僧允能元言仕宋為江夏王義恭參軍王别為立榻比之徐孺子位冀州刺史子慧照元徽中為髙帝平南主簿轉驃中兵參軍建元元年為巴州刺史綏懐長史上許為益州刺史未遷卒僧允次弟僧暠亦好學宋大明中再使魏于時新誅司空劉誕孝武謂曰彼若問廣陵之事何以答之對曰當以周之管蔡漢之淮南語之帝大悦及至魏魏問曰卿頻此句當疑上國無相踰者邪答曰聰明特達舉袂成帷比屋之甿又無下僕晏子所謂看國善惡故每辱此庭位至青州刺史僧紹子元琳仲璋山賔並傳家業山賔最知名梁史有傳臧榮緒東莞莒人也祖奉先建陵令父庸人國子助教榮緒㓜孤躬自灌園以供祭祀母䘮後乃著嫡寝論洒埽堂宇置筵席朔望輙拜薦甘珍未嘗先食純篤好學括東西晉為一書紀録志傳凡百一十卷隠居京口教授髙帝為揚州刺史徴榮緒為主簿不到建元中司徒褚淵啓髙帝稱述其美上答曰公所道臧榮緒者吾甚悉之以其有史翰得入天禄甚嘉榮緒敦愛五經謂人曰昔呂尚奉丹書武王致齊降位李釋教誡並有禮敬之儀因甄明至道乃著拜五經序論嘗以宣尼庚子日生其日陳五經拜之自號被褐先生又以飲酒亂徳言常為誡永明六年卒初榮緒與闗康之俱隠京口世號為二隠宗測字敬微南陽人宋徴士炳之孫也世居江陵測少静退不樂人間常歎曰家貧親老不擇官而仕先哲以為美談余竊有惑誠不能潛感地金㝠致江鯉但當用天之道分地之利孰能食人厚禄憂人重事乎驃騎豫章王嶷辟為参軍不起測荅府召云何為謬傷海鳥横斤山木母䘮身負土植松柏豫章王復遣書請之辟為參軍測荅曰性同鱗羽愛止山壑眷戀松雲輕迷人路縱宕巖流有若狂者忽不知老至而今鬢已白豈容課虚責有限魚鳥慕哉永明三年詔徴為太子舎人不就欲㳺名山乃寫祖炳所作尚子平圖於壁上測長子賔官在京師知父此㫖便求禄還為南郡丞測遂付以家事刺史安陸王子敬長史劉寅以下皆贈送之測無所受唯齎老荘二書自隨子孫拜辭悲泣測長嘯不視遂往廬山止祖炳舊宅魚復侯子響為江州厚遣贈遺測曰少有狂疾尋山採藥逺来至此量腹而進松术度形而衣薜蘿淡然已足豈容當此横施子響命駕造之測避不見後子響不告而来奄至所住測不得已巾褐對之竟不交一言子響不悦而退侍中王秀之彌所欽慕乃令陸探微畫其形與已相對又貽書曰昔人有圖畫僑札輕以自方耳尚書令王儉亦雅重之贈以蒲褥筍蓆頃之測送弟䘮還西仍留舊宅永業寺絶賔客唯與同志庾易劉虬宗人尚之等往来講説荆州刺史隨王子隆至遣别駕宗忻口致勞問測笑曰貴賤理隔何以及此竟不荅建武二年徴為司徒主簿不就卒測善畫自圖阮籍遇孫登於行鄣上坐卧對之又畫永業寺佛影臺皆為妙作頗好音律善易老續皇甫謐髙士傳三卷又嘗㳺衡山七嶺著衡山廬山記云尚之字敬之亦好山澤徴辟一無所就以夀終吳苞字天盖一字懐徳濮陽鄄城人也儒學善三禮及老荘宋太始中過江聚徒敎學冠黄葛巾竹麈尾蔬食二十餘年與劉瓛俱於褚淵宅講授瓛講禮苞講論語孝經諸生朝聽瓛晚聴苞隆昌元年徴為太學博士不就始安王遥光及江袥徐孝嗣共為立館於鐘山下教授朝士多到門焉當時稱其儒者自劉瓛已後聚徒講授唯苞一人而已以夀終時有趙僧巖蔡薈皆有景行慕苞為人僧巖北海人寥廓無常人不能測與劉善明友善明為青州欲舉為秀才大驚拂衣而去後忽為沙門栖遲山谷常以一壺自隨一且謂弟子曰吾今夕當死壺中大錢一千以通九泉之路蠟燭一挺以照七尺之尸至夜而亡時人以為知命蔡薈字休明陳留人清抗不與俗人交李撝謂江斆曰古人稱安貧清白曰夷湼而不緇曰白至如蔡休明者可不謂之夷白乎又有魯國孔嗣之字敬伯宋時與髙帝俱為中書舎人並非所好自廬江郡守去官隠居鐘山朝廷以為太中大夫卒徐伯珍字文楚東陽太末人也祖父並郡掾史伯珍少孤貧學書無紙常以竹箭箬葉甘蕉及地上學書山水暴出漂溺宅舎村鄰皆奔走伯珍累牀而坐讀書不輟叔父璠之與顔延之友善還袪䝉山立精舎講授伯珍往從學積十年尋究經史學者多依之太守琅邪王曇生吳郡張淹並加禮辟伯珍應召便退如此者凡十二焉徴士沈儼造膝談論申以素交吳郡顧歡擿出尚書滯義伯珍訓答甚有條理儒者宗之好釋氏老荘兼明道術嵗嘗旱伯珍筮之如期而雨舉動有禮過曲木之下趨而避之早䘮妻晚不復重娶自比曽参宅南九里有髙山班固謂之九巖山後漢龍邱萇隠䖏也山多龍鬚檉柏望之五采世呼為婦人巖伯珍遂移居之階戸之間木生皆連理門前生梓樹一年便合抱館東石壁夜忽有赤光洞照俄爾而滅又有白雀一雙栖其户牖論者以為隠徳之感焉刺史豫章王辟議曹從事不就家甚貧窶兄弟四人皆白首相對時人呼為四皓建武四年卒年八十四受業生凡千餘人伯珍同郡婁㓜瑜字季亦聚徒教授不應徴辟頗為臨川王暎所賞異著禮捃拾三十卷沈麟士字雲禎吳興武康人也祖膺期晉太中大夫父䖍之宋安樂令麟士㓜而俊敏年七嵗聴叔父岳言元賔散言無所遺失岳撫其肩曰若斯文不絶其在爾乎及長博通經史有髙尚之心親亡居䘮盡禮服闋忌日輙涕泣彌日居貧織簾誦書口手不息鄉人號為織簾先生嘗為人作竹誤傷手便流淚而還同作者謂曰此不足損何至涕零荅曰此本不痛但遺體毁傷感而悲耳嘗行路鄰人認其所著屐麟士曰是卿屐邪即跣而反鄰人得屐送前者還之麟士曰非卿屐邪笑而受之宋元嘉末文帝令僕射何尚之抄撰五經訪舉學士縣以麟士應選不得已至都尚之深相接重謂子偃曰山藪故多竒士沈麟士黄叔度之流也豈可澄清淆濁邪汝師之麟士嘗苦無書因㳺都下歴觀四部畢乃嘆曰古人亦何人哉少時稱疾歸鄉不與人物通養孤兄子義著鄉曲或勸之仕荅曰魚縣獸檻天下一契聖人元悟所以每履吉先吾誠未能景行坐忘何為不希企日損乃作元散賦以絶世太守孔山士辟不應宗人徐州刺史曇慶侍中懐文左率勃来侯之麟士未嘗荅也隠居餘不吳差山講經教授從學士數十百人各營屋宇依止其側時人為之語曰吳差山中有賢士開門教授居城市麟士重陸機連珠每為諸生講之征北張永為吳興請麟士入郡麟士聞郡後堂有好山水即戴安道㳺吳興因古基為山池也欲一觀之乃往停數月永欲請為功曹使人致意麟士曰明府徳履冲素留心山谷是以被褐負杖忘其疲病必欲飾渾沌以蛾眉冠越客於文冕走雖不敏請附髙節有蹈東海而死耳不忍受此黥劓永乃止永明中吏部郎沈淵中書郎沈約並表薦麟士義行曰吳興沈麟士英風夙挺峻節早成真粹禀於天然博綜生乎篤習家世貧窶藜藿不給懐書而耕白首無倦挟卷採薪行歌不輟長兄早卒孤姪數四攝尫鞠稚吞苦推甘年踰七十業行無改元嘉以来聘召仍疊玉質踰潔霜操日嚴若使聞政王庭服道槐掖必能孚朝規於邉鄙布和澤於荒陲於是詔又徴為太學博士不就麟士乃與約等書曰名者實之賔本所不庶中央無心空勤南北為惠反凶将在於斯麟士無所營求以篤學為務恒馮素几鼓素琴不為新聲負薪汲水并日而食守操終老篤學不倦遭火燒書數千卷麟士年過八十耳目猶聰手以反故抄冩燈下細書復成二三千卷滿數十箧時人以為養身静嘿所致製黒蝶賦以寄意著周易兩繫荘子内篇訓注易經禮記春秋尚書論語孝經䘮服老子要略數十卷梁天監元年與何㸃同徴又不就二年卒於家年八十五以楊王孫皇甫謐深達生死而終禮矯俗乃自為終制遺令氣絶剔被取三幅布以覆屍及斂仍移布於屍下以為斂服反被左右兩際以周上不復製覆被不湏沐浴含珠以本裙衫先着襌凡二服上加單衣幅巾履枕棺中唯此依士安用孝經既殯不復立靈座四節及祥權鋪席於地以設元酒之奠人家相承漆棺今不復爾亦不湏旐成服後即葬作冢令小後祔更作小冢於濵合葬非古也冢不湏聚土成墳使上與地平王祥終制亦爾𦵏不湏轜車靈舫魌頭也不得朝夕下食祭奠之法至於𦵏唯取清水一盂子彞奉而行之州鄉皆稱歎焉庾易字㓜簡新野人也徙居江陵祖致巴郡太守父道驥安西参軍易志性恬静不交外物臨川王暎臨州表薦之餉麥百斛易謂使人曰走樵採麋鹿之伍得終身毛褐馳騁日月之車保自耕之禄於大王之恩亦已深矣固辭不受以文義自樂安西長史袁彖欽其風贈以鹿角書格蚌盤蚌研白象牙筆并贈詩曰白日清明青雲遼亮昔聞巢許今覩臺尚易以連理几竹翹書格報之建武三年詔徴為司空主簿不就卒子黔婁於陵肩吾皆知名各有傳劉虬字靈預一字徳明南陽湼陽人晉豫州刺史喬之七世孫也徙居江陵虬少而抗節好學湏得禄便隠宋泰始中仕至晉平王驃騎記室當陽令罷官歸家静處常服鹿皮袷斷糓餌术及胡麻建元初豫章王嶷為荆州牧辟虬為别駕與同郡宗測新野庾易並遺書禮請之虬等各脩牋荅而不應命永明三年刺史盧陵王子卿表虬及同郡宗測宗尚之庾易劉昭五人請加蒲輪束帛之命詔徴為通直郎不就竟陵王致書通意虬答曰虬四節卧疾病三時營灌植暢餘隂於山澤託暮情於魚鳥寜非唐虞重恩周邵宏施虬精信釋氏衣麤布禮佛長齋注法華經自講佛義以江陵西沙洲去人逺乃徙居之建武二年詔徴國子博士不就其冬虬病正晝有白雲徘徊簷戸之内又有香氣及磬聲其日卒年五十八虬子之遴知名梁史有傳沈顗字處黙吳興武康人也父坦之仕齊位都官郎顗幼清静有至行慕黄叔度徐孺子之為人讀書不為章句著述不尚浮華常獨處一室人罕見其面從叔勃貴顯每還吳興賔客填咽顗不至其門勃就之顗送迎不越閫勃歎曰吾乃今知貴不如賤也顗内行甚脩事母兄孝友兄昂一名顒亦退素以家貧仕為始安令兄弟不能相離相隨之任永明年中徴拜著作郎太子舎人通直郎並不起文惠太子嘗擬古詩云磊磊落落玉山崩顗聞之嘆曰此䜟言也既而太子薨至秋武帝崩鬱林海陵相次黜辱顗素不事家産及昂卒逢齊末兵荒與家人并日而食或有饋其粱肉者閉門不受唯採蓴菜供食以樵採自資怡怡然恒不改其樂梁天監四年大舉北侵南陽樂藏為武康令以顗從役到建鄴揚州别駕陸任以書與吴興太守栁惲青之不能甄善别賢惲大慙即表停之卒於家所著文章數十篇梁何㸃字子晳廬江灊人也祖尚之宋司空父鑠宜都太守鑠素有風疾無故忽害㸃母王氏坐法死㸃兄弟以此無宦情㸃兄求字子有宋元嘉初為文帝挽郎歴位太子洗馬丹陽郡丞清退無嗜慾後為太子中舎人泰始初妻亡還吳葬舊墓除中書郎不拜仍住吳隠居波若寺足不踰戸人莫見其面宋明帝崩出奔國哀除永嘉太守求時寄住南澗寺不肯詣臺乞於野外拜受見許一夜忽乘小船逃歸吳隠虎邱山齊永明四年拜太中大夫不就卒㸃年十一居父母憂㡬至毁性及長感家禍欲絶昏宦祖尚之彊為娶琅邪王氏禮畢将親迎㸃累涕泣求執本志遂得罷㸃明目秀眉容貌方雅真素通美不以門戸自矜博通羣書善談論家本素族親姻多貴仕㸃雖不入城府性率到好狎人物遨逰人間不簮不帶以人地並髙無所與屈大言踑踞公卿敬下之或乘柴車躡草蹻恣心所適致醉而歸故世論以㸃為孝隠士弟允為小隠士士大夫多慕從之時人重其通稱為㳺侠處士兄求卒㸃菜食不飲酒訖於三年腰帶減半宋太始末徴為太子洗馬齊初累徴中書侍郎太子中庶子並不就與陳郡謝􅀈吳國張融㑹稽孔稚珪為莫逆友㸃門世信佛從弟遁以東籬門園居之稚珪為築室焉園内有卞忠貞冢㸃植花卉於冢側每飲必舉酒酹之招擕勝侶及名徳桑門清言賦詠優㳺自得初褚淵王儉為宰相㸃謂人曰我齊書作已竟贊云淵既世族儉亦國華不頼舅氏遑恤國家王儉聞之欲候㸃知不可見乃止豫章王嶷造㸃㸃從後門遁去司徒竟陵王子良聞之曰豫章王尚望塵不及吾當望岫息心後㸃在法輪寺子良就見之㸃角巾登席子良欣説無已遺㸃嵇叔夜酒盃徐景山酒鐺㸃少時常患渴利積年不愈後在吳中石佛寺建講於講所晝寝夢一道人形貌非常授丸一掬夢中服之自此而差時人以為淳徳所感性通悦好施逺近致遺一無所拒隨後散焉嘗行經朱雀門街有自車後盗㸃衣者見而不言旁人禽盗與之㸃乃以衣施盗盗不敢受㸃令告有司盗懼乃受之㸃雅有人倫之鑒多所甄抜知吳興邱遲於童㓜稱濟陽江淹於寒素其後貴達悉如其言㸃哀樂過人嘗行逢𦵏者嘆曰此哭者之懐豈可思邪於是悲慟不能禁老乃娶魯國孔嗣女嗣亦隠者㸃雖昏亦不與妻相見築别室以處之人莫喻其意吴國張融少時免官而為詩有髙言㸃荅詩曰昔聞東都日不在簡書前雖戯而融久病之及㸃後昏融始為詩贈㸃曰惜哉何處士薄暮遘荒淫㸃亦病之永元中崔慧景圍城人間無薪㸃悉伐園樹以贍親黨慧景性好佛義先慕交㸃㸃不顧之至是乃逼召㸃㸃裂裠為袴往赴其軍終日談説不及軍事其語黙之迹如此慧景平後東昏大怒欲誅之王瑩為之懼求計於蕭暢暢謂茹法珍曰㸃若不誘賊共講未必可量以此言之乃應得封東昏乃止武帝與㸃有舊及踐阼手詔諭舊賜以鹿皮巾等仍召之㸃以巾褐引入華林園帝賦詩置酒恩禮如舊仍下詔以為侍中㸃捋帝鬚曰乃欲臣老子邪即辭疾不起復下詔詳加資給並出在所日費所湏太官别給天監三年卒無子詔給第一品材一具䘮事所湏内監經理㸃弟允字子季出繼叔父曠故更字允叔年八嵗居憂毁若成人及長輕薄不覊晚年折節好學師事沛國劉瓛受易及禮記毛詩又入鐘山定林寺聴内典其業皆通而縱情誕節時人未之知也惟瓛與汝南周顒深器異之仕齊為建安太守政有恩信不忍欺每伏臘放囚還家依期而反歴黄門侍郎太子中庶子尚書令王儉受詔撰新禮未就而卒又使特進張緒續成緒又卒屬在司徒竟陵王子良子良以讓允乃置學士二十人佐允撰録後以國子祭酒與太子中庶子王瑩並為侍中時允單作祭酒疑所服陸澄博士該通亦不能據遂以元服臨試爾後詳議乃用朱服祭酒朱服自此始也及鬱林嗣位允為后族甚見親待累遷中書令領臨海巴陵王師允雖貴顯常懐止足建武初已築室郊外號曰小山常與學徒㳺處其内至是遂賣園宅欲入東山未及發聞謝􅀈罷吳興郡不還允恐後之乃拜表解職不待報輙去明帝大怒使御史中丞袁昂奏收允尋有詔許之允以㑹稽山多靈異遂往㳺焉居若邪山雲門寺初允二兄求㸃並栖遁求先卒至是允又隠世號㸃為大山允為小山亦曰東山世謂何氏三髙永元中徴為太常太子詹事並不就武帝霸府建引允為軍謀祭酒并與書允不至及帝踐阼詔為特進右光禄大夫遣領軍司馬王杲之以手勅諭意並徴謝􅀈杲之先至允所允恐􅀈不出先示以可起乃單衣鹿皮巾執經卷下牀跪受詔書出就席伏讀允因謂杲之曰吾昔於齊朝欲陳兩三條事一者欲正郊丘二者欲更鑄九鼎三者欲樹雙闕世傳晉室欲立闕王丞相指牛頭山云此天闕也是則未明立闕之意闕者謂之象魏懸法於其上浃日而收之象者法也魏者當塗而髙大貌也鼎者神器有國所先圓丘國郊舊典不同南郊祠五帝靈威仰之類圜丘祠天皇大帝北極大星是也往代合之郊丘先儒之巨失今梁徳告始不宜遂因前謬卿宜詣闕陳之杲之曰僕之鄙劣豈敢輕議國典此當敬俟叔孫生耳及杲之從謝􅀈所還問允以出期允知􅀈已應召答杲之曰吾年已五十七月食四㪷米不盡何容復有宦情杲之失色不能答允反謂曰卿何不遣傳詔還朝拜表留與我同㳺邪杲之愕然曰古今不聞此例允曰檀弓兩卷皆言物始自卿而始何必有例允􅀈俱前代髙士而允處名譽尤邁矣杲之還以允意奏聞有勅給白衣尚書禄允固辭又勅山隂庫錢月給五萬又不受乃勅何子朗孔夀等六人於東山受學太守衡陽王元簡深加禮敬月中常命駕式閭談論終日允以若邪山地勢廹隘不容學徒乃遷秦望山山有飛泉乃起學舎即林成援因巖為堵别為小閤室寝處其中躬自啟閉僮僕無得至者山側營田二頃講隙從生徒㳺之允初遷将築室忽見二人著元冠容貌甚偉問允曰君欲居此邪乃指一處云此中殊吉忽不復見允依其言而卜焉尋而山發洪水木石皆倒抜唯允所居之室巋然獨存元簡乃命鍾嶸作瑞室頌刻於石以旌之及元簡去郡入山與允别允送至都賜埭去郡三里因曰僕自棄人事交㳺路絶非自降貴山藪豈容復望城邑此埭之逰於今絶矣執手涕零何氏過江自晉司空充並𦵏吴西山允家世年皆不永唯祖尚之至七十二允年登祖夀乃移還吳作别山詩一首言甚悽愴至吴居虎邱山西寺講經論學僧復隨之東境守宰經途者莫不畢至允常禁殺忽有虞人逐鹿鹿徑来趨允伏而不動又有異鳥如鶴紅色集講堂馴狎如家禽焉初開善寺藏法師與允遇於秦望山後還都卒於鐘山其死日允在波若寺見一名僧授允香爐奩并函書云貧道發自揚都呈何居士言訖失所在允開函乃是大荘嚴論世中未有訪之香爐乃藏公所常用又於寺内立明珠柱柱乃七日七夜放光太守何逺以狀啓昭明太子太子欽其徳遣舎人何思澄致手令以褒美之中大通三年卒年八十六先是允疾妻江氏夢神告之曰汝夫夀盡既有至徳應獲延期汝當代之妻覺説焉俄得患而卒允疾乃瘳至是允夢見一神女并八十許人並衣帢行列在前俱拜牀下覺又見之便命營凶具既而疾困不復瘳遂卒初允侈於味食必方丈後稍欲去其甚者猶食白魚䱉脯糖蟹以為非見生物疑食蚶蠣使門人議之學生鍾岏曰䱉之就脯驟於屈申蟹之将糖躁擾彌甚仁人用意深懐如怛至於車螯蚶蠣眉目内闕慙渾沌之竒獷殻外緘非全人之慎不悴不榮曽草木之不若無馨無臭與瓦礫其何算故宜長充庖厨永為口實竟陵王子良見岏議大怒周顒與允書勸令食菜曰變之大者莫過死生生之所重無逾性命性命之於彼極切滋味之在我可賒若云三世理誣則幸矣良快如使此道果然而受形未息一往一来生死常事則傷心之惨行亦自及丈人於血氣之類雖不身踐至於晨鳬夜鰥不能不取備屠門財貝之經盗手猶為亷士所棄生性之物一啓鸞刀寜復慈心所忍騶虞雖饑非自死之草不食聞其風者豈不使人多媿丈人得此有素聊復片言起發耳故允未年遂絶血味允注百法論十二門論各一卷注周易十卷毛詩總集六卷毛詩隠義十卷禮記隠義二十卷禮荅問五十五卷子撰亦不仕有髙風阮孝緒字士宗陳留尉氏人也父彦之宋太尉從事中郎以清幹流譽孝緒七嵗出繼從伯允之允之母周氏卒遺財百餘萬應歸孝緒孝緒一無所納盡以歸允之姊琅邪王晏之母聞者咸歎異之乳人憐其傳重辛苦竊玉羊金獸等物與之孝緒見而駭愕啓彦之送還王氏㓜至孝雖與童兒㳺戯恒以穿池築山為樂年十三遍通五經十五冠而見其父彦之彦之誡曰三加彌尊人倫之始宜思自勗以庇爾躬答曰願跡松子於瀛海追許由於穹谷庶保餘生以免塵累自是屏居一室非定省未嘗出户家人莫見其面親友因呼為居士年十六父䘮不服綿纊雖蔬有味亦吐之外兄王晏貴顯屢至其門孝緒度之必至顛覆聞其笳管輙穿籬逃匿不與相見曾食醤美問之云是王家所得便吐餐覆醤及晏誅親戚咸為之懼孝緒曰親而不黨何坐之及竟獲免武帝起兵圍建鄴家貧無以爨僮妾竊鄰人墓樵以繼火孝緒知之乃不食乃更令撤屋而炊所居以一鹿牀為精舎以樹環繞天監初御史中丞任昉尋其元履之所欲造而不敢望而歎曰其室雖邇其人甚逺其為名流所欽尚如此自是欽慕風譽者莫不懐刺斂袵望塵而息殷芸欲贈以詩昉曰趣舎既異何必相干芸乃止唯與比部郎裴子野交子野薦之尚書徐勉言其年十餘嵗隨父為湘州行事不書官紙以成其親之清白論其志行粗類管㓜安比以采章如似皇甫謐天監十二年詔公卿舉士祕書監傅照上疏薦之與吳郡范元琰俱徴並不到陳郡袁峻謂曰往者天地閉賢人隠今世路已清而子猶遁可乎荅曰昔周徳雖興夷齊不厭薇蕨漢道方盛黄綺無悶山林為仁由已何闗人世况僕非往賢之類邪初謝􅀈及伏暅應徴天子以為隠者茍立虚名以要顯譽故孝緒與何允俱得遂其髙志後聴講於鐘山母王氏忽有疾兄弟欲召之母曰孝緒至性㝠通必當自到果心驚而反鄰里嗟異之合藥湏得生人葠舊傳鐘山所出孝緒躬歴幽隠累日不逢忽見一鹿前行孝緒感而隨後至一所遂滅就視果獲此草母得服之遂愈時皆歡歎其孝感所致有善筮者張有道曰吾見子隠迹而心難明自非考之龜著無以驗也及布卦既揲五爻曰此将為咸應感之法非嘉遁之兆孝緒曰安知後爻不為上九果成遁卦有道歎曰此所謂肥遯無不利象實應徳心迹并也孝緒曰雖獲遯卦而上九爻不發升遐之道便當髙謝許生乃著髙隠傳上自炎黄終於天監末斟酌分為三品言行超逸名氏弗傳為上篇始終不耗姓名可録為中篇挂冠人世棲心塵表為下篇湘東王著忠臣傳集釋氏碑銘丹陽尹録研神記並先簡孝緒而後施行南平元襄王聞其名致書要之不赴曰非志驕富貴但性畏廟堂若使麏麚可驂何以異夫驥騄初建武末青溪宫東門無故自崩大風抜東宫門外揚栁或以問孝緒孝緒曰青溪皇家舊宅齊為木行東為木位今東門自壊木其衰矣武帝素畜䜟緯孝緒兼有其書或勸蔵之荅曰昔劉徳重淮南秘要適為更生之禍杜瓊所謂不如不知此言美矣客有求之答曰已所不欲豈可嫁禍於人乃焚之鄱陽忠烈王妃孝緒姊也王嘗命駕欲就之逰孝緒鑿垣而遁卒不肯見王悵然歎息王諸子篤渭陽之情嵗時之貢無所受納未嘗相見竟不知識或問其故孝緒曰我本素賤不應為王侯姻戚邂逅所逢豈闗始願劉歊曾以米饋之孝緒不納歊亦棄之末年以蔬食斷酒其恒供養石像先有損壊心欲治補罄心敬禮經一夜忽然完復衆並異之大同二年正月孝緒自筮卦吾夀與劉著作同年及劉杳死孝緒曰劉既逝矣吾其㡬何其年十月卒年五十八簡文在東宫隆恩厚贈子恕等述先志不受顧協以為恩異常均議令恭受門徒追論徳行謚曰文貞處士所著七録削繁等一百八十一卷並行於世初孝緒所撰髙隠傳中篇所載一百三十七人劉歊劉訏覽其書曰昔嵇康所贊闕一自擬今四十之數将待吾等成之邪對曰所謂荀君雖少後事當付鍾君若素車白馬之日輙獲麟於二子歊訏果卒乃益二傳及孝緒亡訏兄絜録其所遺行次於篇末成絶筆之意云劉歊字士光平原人也本名冉祖勔宋司空父繪武帝霸府從事中郎繪附兄太常悛傳列在齊史歊始生之夕有香氣滿室㓜有識慧四嵗䘮父與羣兒同處獨不戯弄六嵗誦論語毛詩意所不解便能問難十二讀荘子逍遥篇曰此可解耳客問之隨問而答皆有情理家人每異之謂為神童及長博學有文才不娶不仕與族弟訏並隠居求志遨逰林澤以山水書籍相娛而已奉母兄以孝悌稱寝食不離左右母意有所湏口未及言歊已先知手自營辦狼狽供奉母每疾篤夢歊進藥及翌日轉有間効其誠感如此性重興樂尤愛山水登危履險必盡幽遐人莫能及皆歎其有濟勝之具常欲避人世以母老不忍違每隨兄霽杳從官少時好施務周人之急人或遺之亦不拒也久而歎曰受人者必報不則有愧於人吾固無以報人豈可常有愧乎天監十七年忽著革終論以為形者無知之質神者有知之性有知不獨存依無知以自立故形之於神逆旅之館耳及其死也神去此館速朽得理是以子羽沈川漢伯方壙文楚黄壤士安麻索此四子者得理也若從四子而逰則平生之志得矣然積習生常難卒改革一朝肆志儻不見從今欲翦截煩厚務在儉易進不保尸退畢常俗不傷存者之念有合至人之道且張奐止用幅巾王肅唯盥手足范冉斂畢復𦵏爰珍無設筵几文度故舟為棺子亷牛車載柩叔超誡絶墳壠康成使無卜吉此數公者尚或如之况為吴人而尚華泰今欲髣髴景行以為軌則氣絶不湏復魂盥洗而斂以一千錢市成棺單故裙衫衣巾枕履此外送往之具棺中常物一不得有所施世多信李彭之言可謂惑矣余以孔釋為師差無此惑斂訖載以露車歸於舊山隨得一地地足為坎坎足容棺不湏塼甓不勞封樹勿設祭饗勿置几筵其蒸嘗繼嗣言象所絶事止余身無傷世教初訏之疾歊盡心救療及卒哀傷為之誄又著悲友賦以序哀情忽有老人無因而至謂曰君心力堅猛必破死生但運㑹所至不得久留一方耳彈指而去歊心知其異試遣尋之莫知其所於是信心彌䔍既而寝疾恐貽母憂乃自言笑勉進湯藥謂兄霽杳曰兩兄禄仕足申供養歊之歸泉復何所憾願深割無益之悲十八年年三十二卒始沙門釋寳誌遇歊於興皇寺驚起曰隠居學道清浄登仙如此三説歊未死之春有人為其庭中栽柿歊謂兄子弇曰吾不見此實爾其勿言至秋而亡人以為知命親故誄其行迹諡曰貞節處士先是有太中大夫琅邪王敬允以天監八年卒遺命不得設復魄旌旐一蘆䕠藉下一枚覆上吾氣絶便沐浴藍輿載尸還忠侯大夫𡑞中若不行此則戮吾尸於九泉敬允外甥許慧昭因阮研以聞詔曰敬允令其息崇素氣絶便沐浴藉以二蘆䕠鑿地周身歸𦵏忠侯此達生之格言賢夫玉匣石槨逺矣然子於父命亦有所從有所不從今崇素若信遺意土周淺薄屬辟不施一朝見侵狐䑕戮尸已甚父可以訓子子亦不可行之外内易棺此自奉親之情藉土而𦵏亦通人之意宜兩捨兩取以達父子之志棺周於身土周於槨去其牲奠斂以時服一可以申情二可以稱家禮教無違生死無辱此故當為安也歊族弟訏字彦度祖承宗宋太宰参軍父靈真齊鎮西諮議武昌太守訏㓜稱純孝數嵗父母繼卒訏居䘮哭泣孺慕㡬至滅性赴弔者莫不傷焉後為伯父所養事伯母及昆妺孝友篤至為宗族所稱自傷早孤人有誤觸其諱者未嘗不感結流涕長兄絜為聘妻尅日成婚訏聞而逃匿事息乃還本州刺史張稷辟為主簿主者檄召訏乃挂檄於樹而逃陳留阮孝緒博學隠居不交當世恒居一鹿牀環植竹木寝處其中時人造之未嘗見也訏經一造孝緒即顧以神交訏族兄歊又履髙操三人日夕招攜故都下謂之三隠訏善元言尤精意釋典曾與歊聽講鐘山諸寺因共卜築宋熙寺東澗有終焉之志尚書郎何炯嘗遇之於路曰此人風神穎俊盖荀奉倩衛叔寳之流也命駕造門拒而不見族祖孝標與書稱之曰訏超超越俗如天半朱霞歊矯矯出塵如雲中白鶴皆儉嵗之粱稷寒年之纎纊訏常著穀皮巾披衲衣每逰山澤輙留連忘返神理閑正姿貌甚華在林谷之間意氣彌逺或有遇之者皆謂神人家甚貧苦併日而食隆冬之月或無氊絮訏處之晏然人不覺其饑寒也自少至長無喜愠之色每於可競之地輙以不競勝之或有加陵之者莫不退而愧服由是衆論咸歸重焉天監七年卒於歊舎臨終執歊手曰氣絶便斂斂畢即埋靈筵一不湏立勿設饗祀無求繼嗣歊從而行之宗人至友相與刋石立銘謚曰元貞處士南嶽鄧先生名郁荆州建平人也少而不仕隠居衡山極峻之嶺立小板屋兩間足不下山斷榖三十餘載唯以澗水服雲母屑日夜誦大洞經武帝敬信殊篤為帝合丹帝不敢服起五嶽樓貯之供養道家吉日躬往禮拜白日神仙魏夫人忽来降臨乘雲而至從少媪三十並著絳紫羅繡袿䙱年皆可十七八許色艷桃李質勝瓊瑶言語良久謂郁曰君有仙分所以故来尋當相候至天監十四年忽見二青鳥悉如白鶴大鼓翼鳴舞移晷方去謂弟子等曰求之甚勞得之甚逸近青鳥既来期㑹至矣少日無病而終山内唯聞香氣世未嘗有武帝後令周捨為鄧元傳具序其事陶𢎞景字通明丹陽秣陵人也祖隆王府参軍父貞孝昌令初𢎞景母郝氏夢青龍自懐而出并見兩天人手執香爐来至其所已而有娠遂以宋孝建三年丙申嵗夏至日生𢎞景㓜有異操年四五嵗恒以荻為筆畫灰中學書至十嵗得葛洪神仙傳晝夜研尋便有養生之志謂人曰仰青雲覩白日不覺為逺矣父為妾所害𢎞景終身不娶及長身長七尺七寸神儀明秀朗目疎眉細形長額聳耳耳孔有十餘毛出外二寸許左膝有數十黒子作七星文讀書萬餘卷一事不知以為深恥善琴碁工草隸未弱冠齊髙帝作相引為諸王侍讀除奉朝請雖在朱門閉影不交外物惟以披閲為務朝儀故事多所取焉家貧求宰縣不遂永明十年脱朝衣掛神虎門上表辭禄詔許之賜以束帛勅所在日給伏苓五斤白蜜二升以供服餌及發公卿祖之於征虜亭供張甚盛車馬填咽皆云宋齊以来未有斯事朝野榮之於是止於句容之句曲山恒曰此山下是第八洞宮名曰金陵華陽之天周回一百五十里昔漢有咸陽三茅君得道来掌此山故謂之茅山乃中山立館自號華陽陶隠居人間書禮即以隠居代名始從東陽孫㳺嶽受符圖經法徧歴名山尋訪仙藥身既輕㨗性愛山水每經澗谷必坐卧其間吟詠盤旋不能已已謂門人曰吾見朱門廣厦雖識其華樂而無欲往之心望髙巖瞰大澤知此難立止自恒欲就之且永眀中求禄得輙差舛若不爾豈得為今日之事乎豈唯身有仙相亦緣勢使之然也時沈約為東陽郡守髙其志操累書要之不至𢎞景為人圓通謙謹出處𠖇㑹心如明鏡遇物便了言無煩舛有言隨覺齊宜都王鑑為明帝所害其夜夢鑑告𢎞景别云三年當生某家𢎞景因訪其幽𠖇中事多説袐異因著夢記焉永元初更築三層樓自處其上弟子處其中賔客至其下與物遂絶唯一家僮得至其所本便馬善射晚皆不為唯聴吹笙而已特愛松風庭院皆植松每聞其響欣然為樂有時獨逰泉石望見者以為仙人性好著述尚竒異顧惜光景老而彌篤尤明隂陽五行風角星算山川地理方圓産物醫術本草帝代年歴以算推知漢熹平三年丁丑冬至加時在日中而天實以乙亥冬至加時在夜半凡差三十八刻是漢歴後天二日十二刻也又以歴代皆取其先妣母后配饗地祗以為神理宜然碩學通儒咸所不悟又嘗造渾天象髙三尺許地居中央天轉而地不動以機動之悉與天相㑹云修道所湏非止史官用是深慕張良為人云古賢無與為比齊末為歌曰水丑木為梁字及武帝兵至新林遣弟子戴猛之假道奉表及聞議禪代𢎞景乃援引圖䜟數處皆成梁字令弟子進之武帝既早與之㳺及即位後恩禮愈篤書問不絶冠盖相望𢎞景既得神符祕訣以為仙丹可成而苦無藥物帝給黄金朱砂曾青雄黄等後合飛丹色如霜雪服之體輕及帝服飛丹有騐益敬重之每得其書燒香䖍受帝使造年歴至己巳嵗而加朱㸃實太清三年也帝手敇數招之錫以鹿皮巾後屢加禮聘並不出惟畫作兩牛一牛散放在水草之間一牛著金籠頭有人執䋲以杖驅之帝笑曰此人無所不作欲斆曵尾之龜豈有可致之理國家每有吉凶征討大事無不前以諮訪月中常有數信時人謂為山中宰相二宮及王公貴要参候相繼贈遺未嘗絶時多不納受縱留者即作功徳天監四年移居積金東澗𢎞景得辟榖導引之法自隠處四十許年逾八十而有壮容仙書云眼方者夀千嵗𢎞景末年一眼有時而方曽夢佛授其菩提記云名為勝力菩薩乃詣鄮縣阿育王塔自誓受五大戒後簡文臨南徐州欽其風素召至後堂以葛巾進見與談論數日而去簡文甚敬異之天監二年獻丹於武帝中大通初又獻二丹其一名善勝一名成勝並為佳寳𢎞景無疾自知應逝逆尅亡日仍為告逝詩大同二年卒時年八十五顔色不變屈伸如常香氣累日氤氲滿山遺令既沒不湏沐浴不湏施牀止以兩重席鋪於地因所著舊衣上加生裓裙及臂衣靺冠巾法服左肘録鈐右肘藥鈐佩符絡左腋下繞腰穿環結於前釵符於髻上通以大袈裟覆衾䝉首足器有車馬道人道士並在門中道人左道士右百日内常然燈且常香火弟子遵而行之詔贈太中大夫謚曰貞白先生𢎞景妙解術數逆知梁祚将覆預製詩云夷甫任散誕平叔坐論空豈悟昭陽殿遂作單于宮詩蔵箧中化後門人方稍出之大同末士人競談元理不習武事及侯景簒果在昭陽殿初𢎞景母夢青龍無尾自己升天𢎞景果不娶無子從兄以子松喬嗣所著學苑百卷孝經論語集注帝代年歴本草集注効騐方肘後百一方古今州郡記圖像集要及玉匱記七曜新舊術數疏占候合丹法式共祕宻不傳及撰而未訖又十部唯弟子得之諸葛璩字幼玫琅邪陽都人也世居京口璩㓜事徴士闗康之博渉經史復師徴士臧榮緒榮緒著晉書稱璩有發擿之功方之壺遂齊建武初南徐州行事江祀薦璩於明帝言璩安貧守道悦禮敦詩如其簡退可揚清厲俗請辟為議曹從事帝許之璩辭不赴陳郡謝朓為東海太守下教揚其風槩餉榖百斛天監中舉秀才不就璩性勤於誨誘後生就學者日至居宅狭陋無以容之太守張仄為起講舎璩處身清正妻子不見喜愠之色旦夕孜孜講誦不輟時人益以此崇之卒於家璩所著文章二十卷門人劉暾集而録之劉慧斐字宣文彭城人也父元直淮南太守慧斐少博學能屬文起家安成王法曹行参軍嘗赴都途經尋陽㳺於匡山遇處士張孝秀相得甚歡遂有終焉之志因不仕居於東林寺又於山北構園一所號曰離垢園時人仍謂離垢先生慧斐尤明釋典工篆𨽻在山寫佛經二千餘卷常所誦者百餘卷晝夜行道孜孜不怠逺近欽慕之簡文臨江州遺以几杖論者云自逺法師殁後将二百年始有張劉之盛矣元帝及武陵王等書問不絶大同三年卒慧斐兄慧鏡子曇浄有孝行列在孝犮傳范元琰字伯珪一字良玉吴郡錢唐人也祖悦之太學博士徴不至父靈瑜居父憂以毁卒元琰時童孺哀慕盡禮親黨異之及長好學博通經史兼精佛義性謙敬不以所長驕人祖母患癰恒自含吮與人言常恐傷物居家不出城市雖獨居如對賔客見者莫不改容憚之家貧唯以園蔬為業嘗出行見人盗其菘元琰遽退走母問其故具以實答母問盗者為誰荅曰向所以退畏其愧恥今啓其名願不泄也於是母子祕之或有渉溝盗其筍者元琰因伐木為橋以度之自是盗者大慙一鄉無復草竊齊建武初徴為曹虎平西参軍不至于時始安王遥光為揚州謂徐孝嗣曰曹虎参軍豈是禮賢之職欲以西曹書佐聘之㑹遥光敗不果時人以為恨沛國劉瓛深加器異嘗表稱之天監九年縣令管慧辯上言義行揚州刺史臨川王宏辟命不至卒於家庾詵字彦寳新野人也㓜聰警篤學經史百家無不該綜緯候書射碁算機巧並一時之絶而性託夷簡特愛林泉十畝之宅山池居半蔬食弊衣不治産業遇火止出書數箧坐於池上有為火来者荅云唯恐損竹嘗乘舟從沮中山舎還載米一百五十石有人寄載三十石及至宅寄載者曰君三十斛我百五十斛詵黙然不言恣其取足鄰人有被執為盗見劾妄款詵詵矜之乃以書質錢二萬令門生詐為其親代之酬備鄰人獲免謝詵詵曰吾矜天下無辜豈期謝也武帝少與詵善及起兵署為平西府記室詵不屈平生少所㳺狎河東栁惲欲與交拒而弗納普通中詔以為黄門侍郎稱疾不赴晚年尤遵釋教宅内立道塲環繞禮懴六時不輟誦法華經每日一徧後夜中忽見道人自稱願公容止甚異呼詵為上行先生授香而去中大通四年因晝寝忽驚覺曰願公復来不可久住顔色不變言終而卒年七十八舉室咸聞空中唱云上行先生已生彌陀浄域矣武帝聞而下詔諡曰貞節處士詵所撰帝歴二十卷易林二十卷續伍端休江陵記一卷晉朝雜事五卷總抄八十卷行於世子曼倩字世華亦早有令譽元帝在荆州以為中録事每出帝嘗目送之謂劉之遴曰荆南信多君子後轉諮議参軍所著䘮服儀文字體例老子義疏算經及七曜歴術并所製文章凡九十五卷子季才有學行承聖中位中書侍郎江陵平隨例入長安張孝秀字文逸南陽宛人也徙居尋陽曽祖湏無祖僧監父希並别駕從事孝秀長六尺餘白晳美鬚眉仕州從事史遇刺史陳伯之叛孝秀與州中士大夫謀襲之事覺逃於盆水側有商人寘諸褚中展轉入東林伯之得其母郭以蠟灌殺之孝秀遂遣其妻妾入匡山修行學道服闋建安王召為别駕因去職歸山居於東林寺有田數十頃部曲數百人率以力田盡供山衆逺近歸慕赴之如市孝秀性通率不好浮華常冠榖皮巾躡蒲履手執并閭皮麈尾服寒食散盛冬卧於石上博渉羣書専精釋典僧有虧戒律者集衆佛前作偈磨而笞之多能改過善談論工𨽻書凡諸藝能莫不明習普通三年卒室中皆聞非常香簡文甚傷悼焉與劉慧斐書述其貞白云庾承先字子通潁川鄢陵人也少沈静有志操是非不渉於言喜愠不形於色人莫能窺也弱嵗受學於南陽劉虬强記敏識出於羣輩元經釋典靡不該悉九流七略咸所精練辟功曹不就乃與道士王僧鎮同㳺衡岳晚以弟疾還鄉里遂居士臺山鄱陽忠烈王在州欽其風味要與㳺處令講老子逺近名僧咸来赴集論難鋒起異端競至承先徐相酬答皆得所未聞忠烈王尤所欽重中大通三年廬山劉慧斐至荆州承先與之有舊往從之荆峡學徒因請承先講老子湘東王親命駕臨聴論議終日留連月餘乃還山王親祖道并贈篇什隠者美之其年卒刺史厚有贈賻門人黄士龍讓曰先師平素食不求飽衣不求輕凡有贈遺皆無所受臨終之日誡約家門薄棺周形巾褐為斂雖䝉賚及不敢輕承教㫖以違平生之操錢布輙付使反時論髙之陳馬樞字要理扶風郿人也祖靈慶齊竟陵王録事参軍樞數嵗而孤為其姑所養六嵗能誦孝經論語老子及長博極經史尤善佛經及周易老子義梁邵陵王綸為南徐州刺史素聞其名引為學士綸時自講大品經令樞講維摩老子周易同日發題道俗聴者二千人王欲極觀優劣乃謂衆曰與馬學士論義必使屈服不得空立客主於是數家學者各起問端樞乃依次剖判開其宗㫖然枝分派别轉變無窮論者拱黙聴受而已綸甚嘉之尋遇侯景之亂綸舉兵援臺乃留書二萬卷付樞樞肆志尋覽殆將周遍乃喟然歎曰吾聞貴爵位者以巢由為桎梏愛山林者以伊吕為管庫束名實則芻狗柱下之言翫清虚則糠粃席上之説稽之篤論亦各從其好也比求志之士望塗而息豈天之不惠髙尚何山林之無聞甚乎乃隠於茅山有終焉之志天嘉元年文帝徴為度支尚書辭不應命時樞親故並居京口每秋冬之際時往游焉及鄱陽王為南徐州刺史欽其髙尚鄙不能致乃卑辭厚意令使邀之樞固辭以疾門人勸請不已乃行王别築室以處之樞惡其崇麗乃於竹林間自營茅茨而居每以王公餽餉辭不獲已者率十分受一樞少屬亂離凡所居處盗賊不入依託者常數百家自精洞黄能視闇中物有白䴏一雙巢其庭樹馴狎櫩廡時至几案春来秋去㡬三十年大建十三年卒撰道覺論行於世後魏眭夸一名旭趙郡髙邑人也祖邁晉東海王越軍謀掾後没石勒為徐州刺史父邃字懐道慕容寳中書令夸少有大度不拘小節耽好書傳未嘗以世務經心好飲酒浩然物表年三十遭父䘮鬚鬢致白每一悲哭聞者為之流涕髙尚不仕寄情邱壑同郡李順願與之交夸拒而不許邦國少長莫不憚之少與崔浩為莫逆之交浩為司徒奏徴夸為中郎稱疾不赴州郡逼遣不得已乃入京師與浩相見延留數日唯飲酒談叙平生不及世利浩每欲論屈之竟不能發言其見敬憚如此浩後遂投詔書於夸懐亦不開口夸曰桃簡卿已為司徒何足以此勞國士也吾便於此将别桃簡浩小名也浩慮夸即還夸時乘一騾更無兼騎乃以夸騾内之廐中冀相縻縶夸遂託鄉人輸租者謬為御車乃得出闗浩知而歎曰眭夸獨行士本不應以小職辱之又使其人杖策復路吾當何辭以謝之也時朝法甚峻夸既私還將有私歸之咎浩仍相左右始得無坐經年送夸本騾兼以所乘馬為書謝之夸更不受其馬亦不復書及浩誅沒為之素服受鄉人弔唁經一時乃止歎曰崔公已死誰能更容眭夸乎婦父鉅鹿魏攀當時名達之士未嘗備翁壻之禮情同朋好或人謂夸曰吾聞有大才者必居貴位子何獨在桑榆乎遂著知命論以釋之夸又作朋友論篇辭義為時人所稱年七十五卒𦵏日赴者如市無子馮亮字靈通南陽人梁平北将軍蔡道恭之甥也少博覽諸書又篤好佛理隨道恭至義陽㑹中山王英平義陽獲焉英素聞其名以禮待接亮性清静後隠居嵩山感英之徳以時展覲及英亡亮奔赴盡其哀慟宣武嘗召以為羽林監領中書舎人将領侍講十地諸經固辭不許又欲使衣幘入見苦求以幅巾就朝遂不彊逼還山數年與僧徒禮誦為業蔬食飲水有終焉之志㑹逆人王敞事發連山中沙門既而亮被執赴尚書省十餘日詔特免雪亮不敢還山遂寓居景明寺敕給衣食及其從者數人後甚思舊居復還山室亮既雅愛山水又兼工思結築巖林甚得棲逰之適宣武聞之給其工力令與沙門統僧暹河南尹甄琛等同視嵩髙形勝之處遂造閑居佛寺林泉既竒營製又美曲盡山居之妙亮時出京師延昌二年冬因遇篤疾宣武敕以馬輿送令還山居嵩髙道塲寺數日而卒詔贈帛二百匹以供凶事遺誡兄子綜殮以衣幍左手持版右手執孝經一卷置尸盤石上去人居數里外積十餘日乃焚於山上以灰燼處起佛塔經藏初亮以盛冬䘮時連日驟雪窮山荒澗鳥獸饑窘僵尸山野無所防䕶時有夀春道人惠需每旦往看其屍拂去塵霰禽蟲之迹交横左右而初無侵毁衣服如本著唯風吹幍巾少側又以亮識舊南方法師遣信大栗十枚言期之将来十地果報開亮手以置把中經宿乃為蟲鳥盗食皮殻在地而亦不傷肌體焚燎之日有素霧蓊鬱回繞其傍自地屬天彌朝不絶山中道俗營助者百餘人莫不異焉李謐字永和涿郡人也祖祥河間太守父安世相州刺史皆有傳謐少而好學博通諸經周覽百氏初師事小學博士孔璠數年之後璠還就謐請業同門生為之語曰青成藍藍謝青師何常在明經謐以公子徴拜著作佐郎辭以授弟郁詔許之州再舉秀才公府二辟並不就唯以琴書為業有絶世之心覽考工記大戴禮盛徳篇以明堂之制不同遂著明堂制度論曰余謂論事辨物當取正於經典之真文援證定疑必有驗於周孔之遺訓然後可以稱凖的矣今禮文殘缺聖言靡存明堂之制靡使正之是以後人紛紏競興異論五九之説各信其習是非無凖得失相半故歴代紛紜靡所取正乃使裴頠云今羣儒紛紏互相倚摭就令其象可得而圖其所以居用之禮莫能通也為設虚器耳况漢氏所作四維之个復不能令各處其辰愚以為尊祖配天其義明著廟宇之制理據未分直可為殿屋以崇嚴父之祀其餘雜碎一皆除之斯豈不以羣儒舛互並乖其實據義求𠂻莫適可從哉但恨典文殘滅求之靡據而已矣乃復遂去室牖諸制施之於教未知其所隆政求之於情未可喻其所以必湏惜哉言乎仲尼有言曰賜也爾愛其羊我愛其禮余以為隆政必湏其禮豈彼一羊哉推此而論則聖人之於禮殷勤而重之裴頠之於禮任意而忽之是則頠賢於仲尼矣以斯觀之裴氏子以不達夫禮之㫖也余竊不自量頗有鄙意據理尋義以求其真貴合雅衷不茍偏信乃藉之以禮傳考之以訓注博採先賢之言廣捜通儒之説量其當否参其同異棄其所短收其所長推義察圖以折厥𠂻豈敢必善聊亦合其言志矣凡論明堂之制者雖衆然校其大畧則二途而已言五室者則據周禮考工之記以為本是康成之徒所執言九室者則案大戴盛徳之篇以為源是伯喈之倫所持此二書雖非聖言然是先賢之中博見洽通者也但各記所聞未能全正可謂既盡美矣未盡善也而先儒不能考其當否便各是所習卒相非毁豈達士之確論哉小戴氏傳禮事四十九篇號曰禮記雖未能全當然多得其𠂻方之前賢亦無愧矣而月令玉藻明堂三篇頗有明堂之義余故採掇二家参之月令以為明堂五室古今通則其室居中者謂之太室太室之東者謂之青陽當太室之南者謂之明堂太室之西者謂之總章當太室之北者謂之元堂四面之室各有夾房謂之左右个三十六户七十二牖矣室个之形今之殿前是其遺像耳个者即寝之房也但明堂與寢施用既殊故房个之名亦隨事而遷耳今粗書其像以見鄙意案圖察義略可騐矣故檢之五室則義明於考工校之戸牖則數協於盛徳考之施用則事著於月令求之閏也合周禮與玉藻既同夏殷又符周秦雖乖衆儒儻或在斯矣考工記曰周人明堂度以九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵室中度以几堂上度以筵余謂記得之於五室而謬於堂之修廣何者當以理推之令惬古今之情也夫明堂者盖所以告月朔布時令宗文王祀五帝者也然營構之範自當因宜剏制耳故五室者合於五帝各居一室之義且四時之祀皆據其方之正又聴朔布令咸得其月之辰可謂施政及祀二三俱允求之古義竊為當矣鄭康成漢末之通儒後學所取正釋五室之位謂土居中木火金水各居四維然四維之室既乖其正施令聴朔各失厥衷左右之个棄而不顧乃反文之以美説飾之以巧辭言水木用事交於東北木火用事交於東南火土用事交於西南金木用事交於西北既依五行當從其方用事之文出何經典可謂工於異端言非而博疑誤後學非所望於先儒也禮記玉藻曰天子聴朔於南門之外閏月則闔門左扉立於其中鄭元注曰天子之廟及路寝皆如明堂制明堂在國之陽每月就其時之堂而聴朔焉卒事反宿路寝亦如之閏月非常月聴其朔於明堂門下還處路寝門終月也而考工記周人明堂元注曰或舉王寝或舉明堂互言之以明其制同也其同制之言皆出鄭注然則明堂與寝不得異矣而尚書顧命篇曰逆子釗南門之外延入翼室此之翼室即路寝矣其下曰大貝賁鼓在西房垂之竹矢在東房此則路寝有左右房見於經史者也禮記䘮服大記曰君夫人卒於路寝小斂婦人髽帶麻於房中鄭元注曰此盖諸侯禮帶麻於房中則西南天子諸侯左右房見於注者也論路寝則明其左右言明堂則闕其左右个同制之説還相矛楯通儒之注何其然乎使九室之徒奮筆而争鋒者豈不由處室之不當哉記云東西九筵南北七筵五室凡室二筵置五室於斯堂雖使班倕構思王爾營度則不能令三室不居其南北也然則三室之間便居六筵之地而室壁之外裁有四尺五寸之堂焉豈有天子布政施令之所宗祀文王以配上帝之堂周公負扆以朝諸侯之處而室戸之外僅餘四尺而已哉假在儉約為陋過矣論其堂宇則偏而非制求之道理則未惬人情其不然一也余恐為鄭學者茍求必勝競生異端以相訾抑云二筵者乃室之東西耳南北則狭焉余故備論之曰若東西二筵則室户之外為丈三尺五寸矣南北戸外復如此則三室之中南北裁各丈二耳記云四旁兩夾忩若為三尺之户二尺之忩忩户之間裁盈一尺繩樞甕牖之室蓽門圭窬之堂尚不然矣假令復欲小廣之則四面之外闊狭不齊東西既深南北更淺屋宇之制不為通矣騐之衆塗略無算焉且凡室二筵丈八地耳然則戸牖之間不踰二尺也禮記明堂天子負斧扆南向而立鄭元注曰設斧於户牖之間而鄭氏禮圖説扆制曰從廣八尺畫斧文於其上今之屏風也以八尺扆置二尺之間此之叵通不待智者較然可見矣且若二筵之室為四尺之户則戸之兩頬裁各七尺耳全以置之猶自不容矧復戸牖之間哉其不然二也又復以世代驗之即虞夏尚朴殷周稍文制造之差每加崇飾而夏后世室堂修二七周人之制反更促狭豈是夏禹卑宮之意周監郁郁之美哉以斯察之其不然三也又云堂崇一筵便基髙九尺而壁戸之外裁四尺五寸於營制之法自不相稱其不然四也又云室中度以几堂上度以筵而復云凡室二筵而不以几還自相違其不然五也以此驗之記者之謬抑可見矣盛徳篇云明堂凡九室三十六戸七十二牖上員下方東西九仞南北七筵堂髙三尺也余謂盛徳篇得之於戸牖失之於九室何者五室之制傍有夹房面各有戸戸有兩牖此乃因事立則非拘異術戸牖之數固自然矣九室者論之五帝事既不合施之時令又失其辰左右之个重置一隅兩辰同處参差出入斯乃義無所據未足稱也且又堂之修廣裁六十三尺耳假使四尺五寸為外之基其中五十四尺便是五室之地計其一室之中僅可一丈置其戸牖則於何容之哉若必小而為之以容其數則令帝王側身出入斯為怪矣此匪直不合典制抑亦可哂之甚也余謂其九室之言誠亦有由然竊以為戴氏聞三十六戸七十二牖弗見其制靡知所置便謂一室有四戸之忩計其戸牖之數即以為九室耳或未之思也蔡伯喈漢末之時學士而見重於當時即識其修廣之不當而必未思其九室之為謬更修而廣之假其法象可謂因偽飾辭順非而澤諒可歎矣余今省彼衆家委心從善庶探其𠂻不為茍異但是古非今俗間之常情愛逺惡近世中之恒事而千載之下獨論古制驚俗之談固延多誚脱有深賞君子者覽而揣之儻或存焉謐不飲酒好音律愛樂山水髙尚之情長而彌固一遇其賞悠爾忘歸乃作神士賦以自見延昌四年卒年三十二遐邇悼惜之其年四門小學博士孔璠等學官四十五人上書曰竊見故處士趙郡李謐十嵗䘮父哀號罷鄰人之相㓜事兄瑒恭順盡友于之誠十三通孝經論語毛詩尚書歴數之術尤盡其長州閭鄉黨有神童之號年十八詣學受業時博士即孔璠也覽始要終論端究緒授者無不欣其言矣於是鳩集諸經廣校同異比三傳事例名春秋叢林十有二卷為璠等判析隠伏垂盈百條不茍言以違經弗飾辭而背理辭氣磊落觀者忘疲每曰丈夫擁書萬卷何假南面百城遂絶迹下帷杜門却埽棄産營書手自刪削卷無重複者四千有餘矣猶括次専家捜比黨議隆冬達曙盛暑通宵雖仲舒不窺園君伯之閉戸髙氏之遺漂張生之忘食方之斯人未足為喻謐嘗詣故太常卿劉芳推問音義語及中代興廢之由芳乃歎曰君若遇髙祖侍中太常非僕有也前河南尹黄門侍郎甄琛内贊近機朝野傾目于時親識有求官者答云趙郡李謐耽學守道不悶于時常欲致言伹未有次耳諸君何為輕自媒衒謂其子曰昔鄭元盧植不逺數千里詣扶風馬融今汝明師甚邇何不就業也又謂朝士曰甄琛行不媿時但未薦李謐以此負朝廷耳又結宇依巖憑崕鑿室方欲訓彼青衿宣揚墳典冀西河之教重興北海之風不墜而祐善空聞暴疾而卒邦國銜殄悴之哀儒生結摧梁之慕况璠等或服議下風或親承音㫖師儒之義其可黙乎事奏詔曰謐屢辭徴辟志守冲素儒隠之操深可嘉美可逺傍惠康近凖元晏諡曰貞静處士并表其門閭以旌髙節於是表其門曰文徳里曰孝義云鄭脩北海人也少隠於岐南几谷中依巖結宇不交世俗雅好經史専意元門前後州将每徴不至岐州刺史魏蘭根頻遣致命脩不得已暫出見蘭根尋還山谷蘭根申表奏脩明帝詔付雍州刺史蕭寳夤訪實以聞㑹寳夤作逆事不行隋李士謙字子約一名容郎涿郡人魏處士謐之子也士謙髫齓䘮父事母以孝聞母曽嘔吐疑中毒因跪嘗之伯父瑒深所嗟尚每稱此兒吾家顔子也年十二魏廣平王贊辟開府参軍事後丁母憂居䘮骨立有姊適宋氏不勝哀而死士謙服闋捨宅為伽藍脱身而出詣學請業研精不倦遂博覽羣籍善天文術數齊吏部尚書辛術召署員外郎趙郡王叡舉徳行皆稱疾不就和士開亦重其名将諷朝廷擢為國子祭酒固辭得免刺史髙元海以禮再致之稱為菩薩隋有天下畢志不仕自以少孤未嘗飲酒食肉無殺害之言親賔至輙陳罇爼對之危坐終日不倦李氏宗黨豪盛每春秋二社必髙㑹極宴無不沈醉諠亂嘗集士謙所盛饌盈前而先為設黍謂羣從曰孔子稱黍為五榖之長荀卿亦云食先黍稷古人所尚寜可違乎少長肅然無敢弛惰退而相謂曰既見君子方覺吾徒之不徳也士謙聞而自責曰何為人疎頓至於此家富於財躬處節儉每以振施為務州里有䘮事不均至相䦧訟士謙聞而出財補其少者令與多者相埓兄弟愧懼更相推讓卒為善士有牛犯其田者士謙牽置凉處飼之過於本主望見盗刈禾黍者黙而避之其家僮嘗執盗粟者士謙慰喻之曰窮困所致義無相責遽令放之其奴嘗與鄉人董震因醉角力震扼其喉斃於手下震懼請罪士謙謂曰卿本無殺心何為相謝然可速去無為吏拘性寛厚皆此類也後出粟萬石以貸鄉人屬比嵗不登責家無以償皆来致謝士謙曰吾家餘粟本圖賑贍豈求利哉於是悉召責家為設酒食對之燔契曰責了矣幸勿為念也各令罷去明年大熟責家争来償士謙拒之一無所受他年饑多有死者士謙罄家資為之糜粥頼以全活者萬計收埋骸骨所見無遺至春又出田糧種子分給貧乏趙郡農人徳之撫其子孫曰此李参軍遺惠也仁心感物羣犬生子交共相乳凶年散穀至萬餘石合諸藥以救疾癘如此積三十年或謂士謙子多隂徳士謙曰夫言隂徳其猶耳鳴已獨知之人無知者今吾所作吾子皆知何隂徳之有士謙善談元理嘗有客在坐不信佛家報應之義士謙喻之曰積善餘慶積惡餘殃豈非休咎邪佛經曰轉輪五道無復窮已此則賈誼所言千變萬化未始有極忽然為人之謂也佛道未来而賢者已知其然矣至若鮌為黄熊杜宇為鶗鴂襃君為龍牛哀為虎君子為鵠小人為猨彭生為豕如意為犬黄母為黿宣武為鼈鄧艾為牛徐伯為魚鈴下為烏書生為蛇羊祜前身李氏之子此非佛家變受異形之謂邪客曰邢子才云豈有松柏後身化為樗櫟僕以為然士謙曰此不類之談也變化皆由心作木豈有心乎客又問三教優劣士謙曰佛日也道月也儒五星也客亦不能難而止士謙平生時時為詠懐詩輙毁其本不示人又嘗論刑罰遺文不具其略曰帝王制法沿革不同自可損益無為頓改今之贓重者死是酷而不懲也語曰人不畏死不可以死恐之愚謂此罪宜從肉刑刖其一趾再犯者斷其左腕流刑刖去右手三指又犯者下其腕小盗宜黥又犯則落其所用三指又不悛則下其腕無不止也無頼之人竄之邉裔職為亂階適所以召戎矣非求安之道也博奕淫㳺盗之萌也禁而不止黥之則可有識者頗以為得政體開皇八年終於家趙州士女聞之莫不流淚曰我曹不死而令李参軍死乎㑹𦵏者萬餘人李景伯等以士謙道著邱園條其行状詣尚書請先生之諡事寝不行遂相與樹碑於墓其妻范陽盧氏亦有婦徳及夫終所有贈賻一無所受謂州里父老曰參軍平生好施今雖殞歿安可奪其志哉乃散粟五百石以賑窮乏免奴婢六十人以追其志云崔廓字士元博陵安平人也父子元齊燕州司馬廓少孤貧而母賤由是不為鄉族所齒初為里佐屢逢屈辱於是感激逃入山中遂博覽書籍多所通渉山東學者皆宗之既還鄉不應辟命與趙郡李士謙為忘年之友時稱崔李士謙死廓哭之慟為之作傳輸之秘府士謙妻盧氏寡居每有家事輙令人諮廓取定嘗著論言刑名之理其義甚精文多不載大業中卒於家年八十子頤字祖濬有記辯善著述知名當時累遷至越王府長史自有傳徐則東海郯人也㓜沈静寡嗜欲受業於周𢎞正善三元精於論議聲擅都邑則歎曰名者實之賔吾其為賔乎遂懐棲隠之操杖䇿入縉雲山從學者數百人苦請教授則謝而遣之不娶妻常服巾褐陳太建中應召来憩於至真觀期月又辭入天台山因絶粒養性所資惟松术而已雖隆冬沍寒不服綿絮太傅徐陵為之刋山立頌初在縉雲山太極真人徐君降而謂之曰汝年出八十當為王者師然後得道也時晉王廣鎮揚州聞其名手書召之則謂門人曰吾今年八十一王来召我徐君之㫖信而有徴矣遂詣揚州晉王将請受道法則辭以時日不便其後夕中命侍者取香火如平常朝禮之儀至於五更而死支體柔弱如生停留數旬顔色無變晉王下書贊歎遣使人送還天台安𦵏是時自江都至於天台在道人多見則徒歩云得放還至其舊居取經書道法分遺弟子仍令浄埽一房曰若有客至宜延之於此然後跨石梁而去不知所之湏㬰屍柩至方知其靈化時年八十二晉王聞而益異之贈物千段遣畫工圖其狀令栁訾為之讚時有建安宋玉泉㑹稽孔道茂丹陽王逺知等亦行辟榖道以松术自給皆為煬帝所重張文詡河東人也父琚開皇中為洹水令以清正聞文詡博覽羣書特精三禮髙祖方引致天下名儒碩學之士文詡時逰太學博士房暉逺等莫不推伏之書侍御史皇甫誕一時朝彦恒執弟子禮以所乘馬就學邀屈文詡遂每牽馬歩進意在不因人自致也右僕射蘇威聞而召之與語大悦勸令從官文詡固辭仁夀末學校廢文詡杖策而歸以灌園為業州郡頻舉皆不應命事母以孝聞每以徳化人鄉黨頗移風俗嘗有人夜中竊刈其麥者見而避之盗因感悟棄麥而謝文詡慰諭之自誓不言固令持去經數年盗者向鄉人説之始為逺近所悉鄰家築牆心有不直文詡因毁舊堵以應之文詡嘗有腰疾㑹醫者自言善禁文詡令禁之遂為刀所傷至於頓伏牀枕醫者叩頭請罪文詡遽遣之因為之隠謂妻子曰吾昨風發墮坑所致其掩人短皆此類也州縣以其貧素将加賑䘏輙辭不受嘗閑居無事從容歎曰老冉冉而将至恐修名之不立以如意擊几自樂其所擊皆有處所時人方之閔子騫原憲焉終於家時年四十鄉人為之立碑號曰張先生鄭翻字靈雀太原晉陽人也父紹元小字安都仕齊位太尉諮議趙郡太守翻少有器識學渉好文章齊武平末位司徒記室参軍尋遇齊亡歴周隋遂不仕隠居滎陽三窟山慠誕不自覊束或有所之造乘驢衣韀破敝而往逺近欽其髙名皆謂有異状觀者如堵及見其形乃甚短陋不副所聞然風神俊發無貴賤並敬服之納言楊素聞其名因使過滎陽迎與相見言談彌日深加禮重及歸言之朝廷累徴不至終於家通志卷一百七十八
