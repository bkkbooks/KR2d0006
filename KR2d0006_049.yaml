body:
  text: 通志卷四十四宋右迪功即鄭樵漁仲撰禮略第三嘉禮天子加元服皇太子冠皇子皇孫附諸侯大夫士冠天子納妃后册后附天子册妃嬪夫人皇太子納妃皇子諸王婚公主嫁附公侯大夫士婚禮元正冬至受朝賀讀時令册拜諸王侯三老五更鄉飲酒賔禮三恪二王後軍禮天子諸侯將出征類冝造禡並祭所過山川軷祭田獵講武命將出征宣露布大射鄉射合朔伐鼓祭馬祖時儺嘉禮天子加元服周制文王年十二而冠文王十三生伯邑考左傳曰冠而生子禮也成王十五而冠譙周五經然否論云古文尚書武王崩成王年十三推武王庚辰嵗崩周公以壬午嵗出居東癸未嵗反禮公冠記周公冠成王命史作祝辭告是除喪冠也周公未反成王冠辨開金縢之書時十六矣是成王十五周公冠之而後出也按禮傳天子之年近則十二逺則十五必冠矣將冠筮日筮賔行之於廟冠委貌於阼三加彌尊冠義曰冠於阼以著代也或曰三加彌尊士禮也大戴禮公冠篇曰公冠四加後加元冕天子亦四加後加袞冕祼享樂于廟左傳曰晉侯問魯大夫季武子襄公年曰君可冠矣武子對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之周公冠成王命史雍頌曰近於民逺於年逺於佞近於義嗇於時惠於財祿賢使能漢改皇帝冠為加元服惠帝加元服用正月甲子若丙子為吉後漢遵前制皆以正月甲子若丙子為吉日可加元服儀從冠禮乘輿初加緇布進賢次爵辨次武辨次通天冠冠訖皆於髙祖廟如禮謁見和帝冠以正月甲子乘金根車駕六元虬至廟成禮乃回軫反宫朝服以饗宴撞太蔟之鐘咸獻夀焉順帝以初月丙子加元服於髙廟獻帝興平元年正月甲子加元服司徒淳于嘉為賓加賜元纁駟馬賜貴人王公卿司𨽻校尉城門五校及侍中尚書給事黃門侍郎各一人為太子舍人魏氏天子冠一加其説曰古之士禮服必三加彌尊所以喻其志至於天子諸侯無加數之文者將以踐阼臨人尊極德成不復與士以加喻勉為義禮冠於廟自魏不復在廟矣東晉諸帝冠儀一加幘冕將冠金石宿設百僚陪位又先於殿上鋪大牀御府令奉冕幘簪導袞服以授侍中常侍太尉加幘太保加冕太尉讀祝文曰令月吉日始加元服皇帝穆穆思𢎞衮職欽若昊天六合是式率遵祖考永永無極眉夀惟祺介茲景福加冕訖侍中繫元紞脫帝絳紗服加衮服冠事畢太祝率羣臣奉觴上夀王公以下三稱萬嵗乃退成帝用三元吉日既加元服拜于太廟穆帝孝武將冠皆先以幣告廟訖事又廟見臺符問修服未畢吉凶不相干為可加元服與不太常王彪之議禮雖有喪冠當是應冠之年服制未終若須服終便失應冠之年故也今便準喪冠闕饗樂而行事不須修服畢按晉故事及兩漢亦不必三元當任時事之冝耳後魏正光元年秋孝明帝年十一加元服訖拜太廟大赦改元北齊制皇帝加元服以玉帛告圜丘方澤以幣告廟擇日臨軒皇帝著空頂介幘以出太尉盥訖升脫空頂幘以黑介幘奉加訖太尉進太保之右北面讀祝訖太保加冕侍中繫元紞脫綘紗袍加衮服事畢太保上夀羣官三稱萬嵗皇帝入溫室移御座而不上夀後日文武羣官朝服上禮酒十二鍾米十二囊牛十二頭又擇日親拜圜丘方澤謁廟唐制具開元儀皇太子冠皇子皇孫附周制天子元子猶士也天下無生而貴者也家語冠頌曰天子之元子之冠擬諸侯之冠四加漢宣帝冠太子以正月冠諸王遣使行事魏氏冠太子再加皇子王公嗣子乃三孫育以為一加再加皆非禮也冠諸王因漢遣使行事晉惠帝之為太子將冠武帝臨軒使兼司徒髙陽王圭加冠兼光祿大夫屯騎校尉華廙贊冠泰始六年南宫王承年十五依舊應冠有司奏議禮十五成童國君十五而生子以明可冠之義又漢魏遣使冠諸王非古典於是制儀王十五而冠遂革使命咸寧二年閏九月遣使冠汝南王柬惠帝以正月丙午冠太子訖乃廟見懷帝亦以正月冠皇太子宋冠皇太子及藩王以一加齊武帝孫南郡王昭業冠從尚書令王儉議使太常持節一加冠大鴻臚為贊醮酒之儀國官陪位拜賀如常其日內外二品清官以上詣公車門集賀并詣東宫南門通箋别日上禮宫臣亦詣門稱慶如上臺之儀既冠之後剋日謁廟祝辭曰皇帝使給事中太常武安侯蕭惠本加南郡王冠筮日戒賓肇加元服棄爾幼志從厥成德親賢使能克崇景福醮酒辭曰旨酒既清嘉薦既盈兄弟具在淑慎儀刑永永眉夀於穆斯寧明帝冠太子用正月梁武帝天監十三年正月冠太子於太極殿修前代之儀後魏孝文帝冠皇太子恂於廟詔曰司馬彪漢志漢帝有四加冠一緇布二進賢三武辨四通天朕見家語冠頌篇四加冠公也家語夫子之言與正經何異諸儒惑司馬彪志致使天子之子而行士冠朕以為有賓諸儒皆以為無賓孔氏所云斐然成章其斯之謂矣北齊制皇太子冠則太尉以制幣告七廟擇日臨軒有司供帳於崇正殿中嚴皇太子空頂幘公服出立東階之南西面使者入立西階之南東面太子受詔訖入室盥櫛出南面使者進揖詣冠席西面坐光祿卿盥訖詣太子前跪櫛使者又盥奉進賢三梁冠至太子前東面祝脫空頂幘加冠太子興入室更衣出又南就冠席光祿卿盥櫛使者又盥祝脫三梁冠再加逺逰冠太子入室更衣設席中楹之西使者揖就席南面光祿卿洗爵酌醴使者詣席前北面祝太子拜受醴即席坐祭之啐之奠爵降階復位西面三師三少及在位羣官拜事訖又擇日會宫臣又擇日謁廟隋制皇太子將冠前一日帝齋於大興殿太子與賔贊及預從官齋於正寢其日質明有司告廟各設筵於阼帝衮冕即御座賔揖太子進升筵西向坐贊冠者坐櫛設纚賔盥訖初加緇布冠贊進設頍邱癸切纓賔揖太子適東序衣元衣素裳以出贊者又坐櫛賔進加逺遊冠改服訖賔又授冕太子適東序改服以出賔揖太子南面立賔受醴進筵前北面立祝之又切太子拜受觶賔復位東面答拜贊者奉饌於筵前太子祭奠禮畢降筵進當御東面拜納言承詔詣太子戒訖太子拜贊者引太子降自西階賔少進字之贊者引太子進立於庭東面諸親拜訖贊者拜太子皆答拜與賔贊俱復位納言承詔降命令有司致禮賔贊又拜帝復降阼階下拜太子以下皆拜帝出更衣還宫太子從至閣因入見皇后而還唐貞觀五年正月有司上言皇太子將冠禮冝用二月為吉請追兵以備儀注太宗曰今東作方興恐妨農事令改用十月太子少保蕭瑀奏稱準隂陽家用二月為勝上曰隂陽拘忌朕所不行若動靜必依隂陽不顧禮義欲求福祐其可得乎若所行皆遵正道自然當與吉會且吉凶在人豈假隂陽拘忌農時甚要不可暫失開元六年侍中宋璟上表曰臣伏以太常狀準東宫典記有上禮之儀謹按上禮非古從南齊後魏方始有此事而垂拱神龍更扇其道羣臣斂錢獻食君上厚賜答之姑息施恩方便求利皇太子冠乃盛禮自然合有賜賚上臺東宫兩處宴會非不優厚其上禮冝停其儀具開元禮諸侯大夫士冠夏小正記二月冠子之時也周制繼世以立諸侯象賢也冠禮筮日筮賔冠於阼醮於客位三加彌尊已冠而字之見於母母拜之見於兄弟兄弟拜之成人而與為禮晉王堪冠禮儀云永平元年惠帝時正月戊子冠中外四孫立于步廣里舍之阼階設一席于東廂引冠者以長幼次于席南東上賔宗人立于西廂東面南上堪立于東軒西南面西上陳元服于席上宗人執儀以次呼冠者各應曰諾宗人申誡之曰以嵗之正以月之令兄弟具來咸加爾服棄爾幼志順爾成德克慎威儀惟民之則夀考惟祺永受景福冠者髙跪而冠各自著布興再拜從立于賔南上酌四杯酒各拜醮而飲事訖上堂向御史府君再拜訖冠者皆東面坐如常燕禮時賔宗人東平王隆叔祚王循道安王業建始此皆古禮也但以意斟酌從其簡者耳唐制具開元禮天子納妃后册后附伏羲氏制嫁娶以儷皮為禮夏氏親迎於庭殷迎於堂周制限男女之嵗定婚姻之時媒氏云令男三十而娶女二十而嫁婚姻之時即仲春之月親迎於戶六禮之儀始備一曰納采二曰問名三曰納吉四曰納徴五曰請期六曰親迎惟納徴用束帛他皆用鴈天子聘女納徴加穀圭漢惠帝納后納采鴈璧乘馬束帛聘黃金二萬斤馬十二匹吕氏為惠帝娶魯元公主女故特優其禮平帝立王莽納女為后以固權及莽所聘杜陵氏女皆侈大其事不足為法後漢桓帝立明年有司奏太后曰春秋迎皇后于紀在塗則稱后今大將軍冀女弟應紹聖善結婚之際有命既集冝備禮幣於是悉依孝惠皇帝納后故事聘黃金二百斤納采鴈璧乘馬束帛一如舊典靈帝册宋貴人為皇后天子御章德殿軒百官陪位太尉襲使持節奉璽紱皇后北面帝南面太尉立階下東向宗正大長秋西向宗正讀册畢皇后拜稱臣妾就位太尉授璽紱中常侍長秋太僕髙鄉侯覽長跪受璽紱奏於殿前女史以次受之至于昭儀受而長跪以帶皇后皇后伏起拜稱臣妾畢黃門鼓吹三通鳴鼓畢羣臣以次出后即位大赦天下魏制天子册后以皮馬庭實加穀圭齊王正始四年立后甄氏其儀不存晉武帝咸寧二年臨軒遣太尉賈充䇿立皇后楊氏因大赦賜王公已下各有差百僚上禮納悼后太康八年有司奏大婚納徴用元纁束帛加穀圭馬二駟羊鴈酒米如故尚書朱整議按魏婚故事天子以皮馬為庭實加以穀圭東晉成帝咸康二年臨軒遣使持節兼太保領軍諸葛恢兼太尉護軍孔愈六禮備物拜皇后杜氏即日入宫帝御太極殿羣臣畢賀康帝建元元年納后褚氏而儀注陛者不設旄頭殿中御史奏今迎皇后依昔成恭皇后入宫御物而儀注至尊衮冕升殿旄頭不設又按昔迎成恭皇后唯作青龍旗其餘皆即御物今當臨軒遣使而五牛旗旗旄頭畢罕並出即用舊置今闕詔曰今所以正法服升太極者以謹其始故備禮也今云何闕所重而撤法物邪又恭后神主入廟先帝詔后禮冝有降不冝建五牛旗既不設五旗則旄頭畢罕之物易具也又詔舊制既難凖且於今而備法服儀飾粗舉其兼副雜器停之穆帝永和十年臺符問六禮版文舊稱皇帝今太后臨朝當何稱博士曹耽云公羊傳婚禮不稱主人母命諸父為主太常王彪之云三傳異義不可全據今皇后臨朝稱制文告所達國之大典皆仰稟成命非無外事也豈婚聘獨不通乎六禮版文應稱皇太后詔符又問今太后還政不復臨朝當何稱彪之云當稱皇帝詔升平元年將納皇后何氏彪之正禮曰王者之於四海無不臣妾雖復父兄之親師友之賢皆純臣也夫崇三綱之始定乾坤之儀安有天艾之尊而稱臣下之命以納伉儷安有臣下之卑而稱天父之名以行大禮逺尋古禮於義不通按咸寧二年納悼皇后時𢎞訓太后臨天下而無命戚屬之臣為武皇父兄主婚之文考咸寧故事不稱父兄師友則當時華恆所上合於舊也謂今納后儀制一依咸寧故事從之華恆定六禮冝依舊唯娶婦之家三日不舉樂而咸康羣臣賀為失禮故但依咸康上禮不復賀其告廟六禮版文等皆彪之所定博士茍納云凡六禮版長尺二寸以應十二月博四寸以象四時厚八分以象八節皆真書后家答鮫腳書之納采問名納吉請期親迎皆用鴈白羊各一酒米各十二斛唯納徴用白羊一元纁帛三匹絳二匹絹二百匹獸皮二枚錢二百萬玉璧一枚酒米各十二斛馬六匹鄭康成所謂五鴈六禮也六禮之文皆稱皇帝咨后家稱糞土臣某頓首稽首再拜以答其䇿皇后之文曰惟升平元年八月皇帝使使持節兼太保侍中太宰武陵王晞册命故散騎侍即女何氏為皇后咨爾易本乾坤詩首關雎王化之本實由內輔是故皇英嬪虞帝道以光妊姒母周允嗣克崇皇后其祗朂厥德以肅承宗廟虔恭中饋盡其婦道帥導六宫作軌儀于四海皇天無親惟德是依可不慎歟北齊皇帝納后之禮納采問名納徴訖告圜丘方澤及廟是日皇帝臨軒命大尉為使司徒副之持節詣后行宫東向奉璽綬册以授中常侍皇后受册於行殿使者與公卿以下皆拜有司備迎禮太尉太保受詔而行主人公服迎拜於門使者入升自賔階東面主人升自阼階西面禮物陳於庭設席於兩楹間童子以璽書版升主人跪受送使者拜于大門外有司先於昭陽殿兩楹間供帳為同牢之具皇后服大嚴繡衣帶綬珮加幜音景女長御引出升畫輪四望車女侍中負璽陪乘鹵簿如大駕皇帝服衮冕出升御座皇后入門大鹵簿住門外小鹵簿入到東上閣施步幛降車席道以入昭陽殿前至席位姆去幜皇后先拜後起皇帝後拜先起升自西階詣同牢座與皇后俱坐各三飲訖又各酳二爵一巹奏禮畢后興南向立皇帝御太極殿王公以下拜表謝又明日以榛栗棗修見皇太后於昭陽殿擇日羣臣上禮又擇日謁廟皇帝使太尉先以太牢告而後遍見羣廟唐皇帝納后卜日告天地臨軒命太尉為使宗正卿為副並如開元禮天子册妃嬪夫人周制天子后立六宫三夫人九嬪二十七世婦八十一御女以聼天下之內治後漢獻帝建安十八年曹操進三女憲節華為夫人聘以束帛元纁五萬匹小者待年於國二十年並拜貴人晉武帝泰始十年將聘三夫人九嬪有司奏禮皇后聘以穀圭無妾媵禮贄之制詔曰拜授可依魏氏故事於是臨軒使使持節兼太常拜三夫人兼御史中丞拜九嬪皇太子納妃皇子諸王婚公主嫁附漢制皇太子納妃奉常迎時叔孫通定禮以天子無親迎之義皇太子以奉常迎也晉太康中有司奏太子婚納徴用元纁束帛加璧羊馬二駟東晉太子緍納徴禮用玉璧一虎皮二漢魏之禮公主居第尚公主者來第成婚司空王朗以為不可其後乃革魏公主嫁用絹百九十匹晉故事用絹三百匹太元中公主納徴以獸豹皮一宋文帝元嘉十五年四月皇太子納妃六禮文與納后不異百官上禮其月壬戍於太極殿西堂敘宴二宫隊主副司徒侍即以上諸二千石在都邑者並在會又詔令小會可停伎樂時有臨川曹太妃喪明帝太始五年有司奏按晉江左以來太子婚納徴用璧一獸皮二未詳合用獐豹皮及熊羆皮與不若應用者為各用一為用兩博士裴昭明按周禮納徴元纁束帛儷皮鄭康成曰束帛以致命兩皮庭實皮鹿皮晉納妃以虎皮二虎豹雖文禮所不用熊羆吉祥婚典不及圭璋之美為用各異今儲皇聘納冝準經誥兼太常丞孫詵議以為聘幣之典損益惟我禮稱束帛儷皮則圭璋數同璧熊羆文豹各應用二博士虞和議按儀禮直云元纁束帛儷皮禮記郊特牲云虎豹皮與玉璧非虛作也虎豹皮居然用兩璋冝仍舊各一參議詵和二議不異今加圭璋各一豹熊羆皮各二以和議為允詔可齊武帝永明中以婚禮奢貴敕諸王納妃上御及六宫依禮上棗栗腵修加以香澤花粉其餘衣物皆停唯公主降嫁則上儀舅姑北齊皇太子納妃禮皇帝遣使納采其次問名納吉並如納采禮納徴則使司徒及尚書令為使備禮物而行請期則以太常宗正卿為使如納采親迎以太尉為使三日妃朝皇帝於昭陽殿又朝皇后於宣光殿擇日羣臣上禮他日妃還又他日皇太子拜閣皇太子及王聘禮納采問名納吉請期親迎皆用羔一鴈一酒黍稷米麵各一斛納徴用元三匹纁二匹束帛十匹大璋一虎皮二錦綵六十匹絹二百匹羔一羊四犢二酒黍稷米麵各十斛從車百乘隋皇太子納妃禮皇帝臨軒使者受詔而行主人候於廟門使者執鴈主人迎拜於大門之東使者入升自西階立於兩楹間南面納采訖乃行問名儀事畢主人請致禮於從者禮有幣馬其次擇日納吉又擇日以玉帛乘馬納徴又擇日告期又擇日命有司以特牲告廟册妃皇太子將親迎皇帝臨軒醮而誡曰往迎爾相承我宗事朂帥以敬對曰謹奉詔既命羽儀而行主人几筵於廟妃服䄖翟立於東房主人迎於門外西面拜皇太子答拜主人揖皇太子先入主人升立於阼階西面皇太子辨進當房户前北面跪奠鴈俯伏興拜降出妃父少進西面戒之母於西階上施襟結帨及門內施鞶申之出門妃升輅乘以几姆加幜皇太子乃馭輪三周馭者代之皇太子出大門乘輅羽儀還宫妃三日雞鳴夙興以朝奠笲於皇帝皇帝撫之又奠笲於皇后皇后撫之席於戶牖間妃立於席西祭奠而出唐皇太子納妃禮臨軒命使行納采問名納吉納徴請期告廟臨軒醮戒親迎同牢朝見並如開元禮開元十九年四月敕於京城置禮會院屬司農寺其什物各令所司供院在崇仁坊南街建中元年十一月禮儀使顔真卿等奏郡縣主見舅姑請於禮會院過事明日早舅姑坐堂行執笲之禮其觀華燭非冝並請停障車下壻却扇等行禮之夕可以感思至於聲樂尤須禁斷初貞觀中侍中王圭之子尚太宗女南平公主圭請于帝乞存舅姑之義於是夫妻西向坐公主親行盥饋之禮自是公主有舅姑者皆備婦禮其後此禮陵遲故真卿建明之公侯大夫士婚禮周制婚禮其詳見於禮經漢平帝詔光祿大夫劉歆等雜定婚禮四輔公卿大夫博士郎吏家屬皆以禮娶迎立軺􅀈馬立乘小車也􅀈馬儷駕也新㝎此制也􅀈音步幸切後漢鄭衆百官六禮辭大略因於周制而禮物凡三十種各內有謁文外有贊文魏制諸侯娶妃以皮馬為庭實加以大璋王娶妃公主嫁用絹百九十匹晉太康八年有司奏王侯婚禮元纁束帛加璧乘馬大夫用元纁束帛加羊奏曰古者以皮馬庭實天子加穀圭諸侯加大璋可依周禮改璧用璋其羊鴈酒米元纁如故諸侯婚禮加納采告期親迎各帛五匹及納徴馬四匹皆令夫家自備唯璋官為具足尚書朱整議按魏氏故事王娶妃公主嫁之禮天子諸侯以皮馬為庭實天子加以穀圭諸侯加以大璋漢髙后制聘后黃金二萬斤馬十二匹聘夫人金五千斤馬四匹魏志娶妃公主嫁之禮用絹一百九十匹晉故事用絹三百匹北齊聘禮第一品以下至三品用元三匹纁二匹束帛十匹璧一四品以下皆無璧豹皮二六品以下至從九品用鹿皮錦綵四十匹二品三十匹三品二十匹四品雜綵十六匹五品十匹六品七品五匹絹百四十匹二品百二十匹三品百匹六品以下至九品遞降二十匹羔一羊二犢二酒黍稷稻米麵各四斛四品五品犢一酒黍以下各二斛六品以下無犢酒黍以下各一斛唐顯慶四年十月詔天子嫁女受財三品以上之家不得過絹三百匹四品五品不得過二百匹六品七品不得過一百匹八品以下不得過五十匹皆充所嫁女資裝等用其夫家不得受陪門之財李義府奏太極元年十一月左司即中唐紹上表曰士庶親迎之禮備諸六禮所以承宗廟事舅姑當須昏以為期詰朝謁見往者下俚庸鄙時有幛車邀其酒食以為戲樂近日此風轉盛上及王公乃廣奏音樂多集徒侣遮擁道路留滯淹時邀致財物動踰萬計遂使幛車禮貺過於聘財歌舞喧譁殊非助感既虧名教又蠧風猷請一切禁斷從之臣謹按後漢之俗聘禮三十物者以元纁羊鴈清酒白酒粳米稷米蒲葦卷柏嘉禾長命縷膠漆五色絲合歡鈴九子墨金錢祿得香草鳯凰含利獸鴛鴦受福獸魚鹿烏九子婦腸燧鑽凡二十八物又有丹為五色之榮青為東方之始共三十物皆有俗儀不足書臣又按杜佑議上古人食禽獸之肉而衣其皮毛周氏尚文去質元衣纁裳猶用皮為韠所以制婚禮納徴用元纁儷皮充當時之所服耳秦漢以降衣服制度與三代殊乃不合更以元纁及皮為禮物也又有用虎皮豹皮者王彪之云取威猛有斑彩尤臆説也人之常情非今是古不詳古今之異制禮數之從冝今時俗用五色信頗得禮之變也或曰近代所以尚循元纁儷皮之制男女配合教化大倫示存古儀務重其禮安可捨棄有類去羊答曰元纁及皮當時之要詳觀三代制度或沿或革皆貴適時並無虛事豈今百王之末畢循往古之儀如三代制天子諸侯至庶人祭則立尸秦漢廢之又天下列國唯事征伐志存於射建侯擇士皆主於斯秦漢以降改制郡縣戰爭既息射藝自輕唯祀與戎國之大事今並豈要復舊制乎其朝宗覲遇行朝享禮畢諸侯皆右肉袒于廟門之東乃入門右北面立告聽事今豈須行此禮乎賔禮甚重兩楹間有反爵之坫築土為之今會客豈須置坫乎又並安能復古道邪略舉數事其可知也易曰隨時之義其大矣哉先聖之言不可誣也元正冬至受朝賀漢髙帝十月定秦遂為嵗首七年長樂宫成叔孫通制諸侯羣臣朝賀儀先平明謁者治禮引以次入殿門庭中陳車騎設兵張旗幟功臣列侯諸將軍軍吏以下陳西方東向文官丞相以下陳東方西向於是皇帝輦出房諸侯王以下至吏六百石以次奉賀禮畢復置法酒諸侍坐殿上者皆伏抑首尊卑以次起上夀夀觴九行謁者言罷酒御史執法舉不如儀者輒引去羣臣莫不振肅武帝雖用夏正然每月朔朝至於十月朔猶常享會以髙祖定秦之月元年嵗首也其儀夜漏未盡七刻鐘鳴受賀及贄公侯璧二千石羔千石六百石鴈四百石以下雉百官賀正月決疑要注云古者朝會皆執贄侯伯執圭子男執璧孤執皮帛卿執羔大夫執鴈士執雉漢魏俱依其制正朝大會諸侯執玉璧薦以鹿皮公卿以下所執如古禮古者衣皮故用皮帛為幣玉以象德璧以稱事二千石以上上殿稱萬嵗舉觴御坐前司空奉羮大司農奉飯奏食舉樂百官受賜宴饗大作樂蔡質漢儀曰正月旦天子幸德陽殿臨軒公卿百官各陪位朝賀百蠻朝貢畢屬郡計吏皆覲庭燎宗室諸劉雜會萬人以上立西面位既定上夀計吏中庭北靣立太官賜酒食西入東出御史四人執法陛下虎賁羽林弧弓撮矢陛戟左右戎頭倡脛陪前向後左右中即將位東南羽林虎賁將位東北五官將位中央悉坐就賜作九賔徹樂含利獸從西方來戲於庭極乃畢入殿前激水化成比目魚跳躍漱水作霧障日畢化為黃龍長八丈出入遨逰炫耀日光又以絲繩係兩柱間相去數丈兩倡女對舞行於繩上相逢切肩不傾又踏局出身藏形斗中鐘磬倡樂畢作魚龍曼延小黃門鼓吹三通謁者引公卿以次拜徹行出卑官在前尊官在後其德陽殿周旋容萬餘人陛髙一丈文石作壇畫屋朱梁玉陛金柱刻鏤魏文帝受禪後修洛陽宫室權都許昌宫殿狹小元日於城南立氈殿青帷以為門設樂饗會後還洛陽依漢舊事其藩王不得朝覲明帝時有朝者皆由特恩不得為常晉氏受命武帝更定元會儀咸寧注云先正旦一日有司各宿設夜漏未盡十刻羣臣集庭燎起火上賀謁報又賀皇后還從雲龍東中華門入詣東閣下便坐漏未盡七刻百官及受贄郎官已下至計吏皆入立其次其陛衛者如臨軒儀漏未盡五刻謁者僕射大鴻臚各奏羣臣就位定漏盡侍中奏外辦皇帝出鐘鼓作百官皆拜伏太常導皇帝升御座鐘鼓止百官起大鴻臚跪奏請朝賀掌禮郎贊皇帝延王登大鴻臚跪贊藩王臣某等奉白璧各一再拜賀太常報王悉登謁者引上殿當御座皇帝興王再拜皇帝坐復再拜跪置璧御座前復再拜成禮訖謁者引下殿還故位掌禮郎贊皇帝延大尉等於是公特進胸奴南單于金紫將軍當大鴻臚西中二千石千石六百石當大行令西皆北面伏鴻臚跪贊太尉中二千石等奉璧皮帛羔鴈雉再拜賀太常贊皇帝延公等登掌禮郎引公至金紫將軍上殿皇帝興皆再拜皇帝坐又再拜跪置璧皮帛御座前復再拜成禮訖謁者引下殿還故位公置璧成禮時大行令並贊殿下中二千石以下同成禮訖以贄授贄郎郎以璧帛付諸謁者羔鴈雉付太官太樂令跪奏雅樂樂以次作乘黃令乃出車皇帝罷入百官皆坐晝漏上水六刻諸蠻夷外客以次入皆再拜訖坐御入後三刻又出鐘鼓作謁者僕射跪奏請羣臣上謁者引王公二千石上殿千石六百石停本位謁者引王詣樽酌夀酒跪授侍中侍中跪置御座前王還自酌置位前謁者跪奏藩王臣某等奉觴再拜上千萬嵗夀四廂樂作百官再拜已飲又再拜謁者引王等還本位陛者傳就席羣臣皆跪諾侍中中書令尚書令各於殿上上夀酒登歌樂升太官又行御酒御酒升階太官令跪授侍郎侍郎跪進御座前乃行百官酒太樂令跪奏登歌三終乃降太官令跪請具御飯到階羣臣皆起太官令持羮跪授司徒持飯跪授大司農尚食持案並授持節持節跪進御座前羣臣就席太樂令跪奏食舉樂太官行百官飯按遍食畢太樂令跪奏請進樂樂以次作鼓吹令又前跪奏請以次進衆妓乃詔諸郡計吏前受􅎁戒於階下宴樂畢謁者一人跪奏請罷退鐘鼓作羣臣北面再拜出然則夜漏未盡七刻謂之晨賀晝漏上十三刻更出百官奉夀酒謂之晝會别置女樂三十人於黃帳外奏房中之歌江左多虞不復晨賀夜漏未盡十刻開宣陽門至平旦開殿門晝漏上水五刻皇帝乃出受賀皇太子出會者則在三恪下王公上正旦元會設白虎樽於殿庭樽蓋上施白虎若有能獻直言者則發此樽飲酒案禮白虎樽乃杜舉之遺式也宋因晉制升皇太子在三恪上齊因之梁元會之禮雖有更革亦損益晉制也皇帝服通天冠王公上夀上食既畢之後二品以上尚書騶騎引計吏郡國各一人皆跪受詔侍中讀五條詔計吏更應諾訖令陳便冝者聼詣白虎樽皇太子朝則逺逰冠乘金輅鹵簿以行與會則劔履升座天監六年詔曰頃代以來元日朝畢次會羣臣則移就西壁下東向坐求之古義王者宴萬國唯應南面何更居東面於是御座南向以西方為上皇太子以下在北壁坐者悉西邉東向尚書令以下在南方坐者悉東邉西向陳制先元會十日百官並習儀注令僕以下悉公服監之設庭燎街闕城上殿前皆嚴兵百官各設部伍而朝宫人皆於東堂隔綺疏而觀宫門既無籍外人但綘衣者亦得入觀是日上事人發白虎樽自餘亦多依梁禮云隋制正朝及冬至文物充庭皇帝出西房即御座皇太子鹵簿至明陽門外入賀復詣皇后殿拜賀訖還宫皇太子朝訖羣官客使入就位再拜上公一人詣西階解劔升賀降階帶劔復位而拜有司奉諸州表羣臣在位者又拜而出皇帝入東房有司奏行事訖乃出西房坐定羣官入就位上夀訖上下俱拜皇帝舉酒上下舞蹈三稱萬嵗皇太子與會則設座於御東南西向羣臣上夀畢入位解劔以升會訖先興唐開元八年十一月中書門下奏曰伏以冬至一陽始生萬物潛動所以自古聖帝明王皆此日朝萬國觀雲物禮之大者莫逾是時其日亦祀圜丘皆令攝官行事質明既畢日出視朝國家以來更無改易緣修新格將畢其日祀圜丘還改用小冬日受朝伏請改正從之因敕自今以後冬至日受朝永為常式至天寶三載十一月五日甲子冬至敕伏以昊天上帝義在尊嚴恭惟祀典每用冬至既於是日有事圜丘更受朝賀實深兢愓自今以後冬至冝取以次日受朝仍永為常式讀時令後漢制太史每嵗上其年厯先立春立夏大暑立秋立冬常讀五時令皇帝所服各隨五時之色帝升御座尚書令以下就席位尚書三公郎中以令置案上奉以先入就席伏讀訖賜酒一巵魏明帝景初元年通事奏曰前後但見讀四時令至於服黃之時獨闕太史令髙堂隆以為黃屬土也土王四季各十八日土生於火故於火用事之末服黃三季則不其令則隨四時不以五行為令也是以服黃無令斯則魏代不讀大暑令也東晉成帝咸和五年有司奏讀秋令時侍中荀奕上議云武皇帝時光祿大夫華恆議以秋夏盛暑常闕不讀令在春冬則不廢也夫先王所以順時讀令者蓋後天而奉天時正時服尊嚴之所重今比熱炎赫服章多闕請如恆議詔可六年有司奏立夏日正服漸備祗迓天和冝讀夏令奏可宋文帝元嘉六年讀時令三公郎中每讀皇帝臨軒百僚備位多震悚失常儀唯孝武帝時劉協明帝時謝緯善於其事人主公卿並屬目稱歎北齊制立春日皇帝服通天冠青介幘青紗袍佩蒼玉青帶青袴青襪舄而受朝於太極殿西廂東向尚書令等坐定三公即中詣席跪讀時令訖典御酌巵酒置即中前即中拜還席伏飲禮成而出至立夏立秋則施御座於中楹南向立冬如春東向各以其時之色服儀並如春禮唐貞觀十一年復修四時讀令武太后聖厯元年臘月制每月一日於明堂行告朔之禮開元十六年命太常少卿韋縚每月進月令一篇是後孟月朔日御宣政殿側置一榻東西置案令韋縚坐而讀之諸司長官亦升殿列坐聽焉嵗除罷之餘並具開元禮册拜諸王侯後漢制拜諸王侯三公之儀百官會位定謁者引光祿勳前謁者引當拜者前當座伏殿下光祿勳前一拜舉手曰制詔其以某為某按丁孚儀安帝䇿夏勤文曰維元初六年三月甲子制詔以太鴻臚勤為司徒曰朕承天序維稽古建爾于位為漢輔往率舊職慎敷五教在寬允左右朕躬宣力四表保又皇家於戲秉國之鈞方祗厥序時亮天工可不慎歟勤其戒之此其例也讀䇿書畢拜者稱臣再拜尚書郎以璽印綬付侍御史侍御史前東面立授璽印綬當受策者再拜頓首三贊謁者曰某王臣某新封某公某初謝中謁者報謹謝贊者立曰皇帝為公興皆冠謝起就位供賜禮畢罷北齊䇿諸王以臨軒日上水一刻吏部令史乘馬齎召版詣王第王乘髙車鹵簿至東掖門止乘軺車既入至席尚書讀䇿訖以授王又授章綬事畢出乘軺車入鹵簿乘髙車詣閶闔門伏闕表謝報訖拜廟還第則鴻臚卿持節吏部尚書授册侍御史授節使者受而出乘軺持節詣王第入就西階東面王入立於東階西面使者讀册博士讀版王俯伏興進受䇿章綬茅土俯伏三稽首還本位謝如上儀在州鎮則使者授節册乘軺車至州如王第諸王三公儀同尚書令五等開國太妃公主恭拜册軸一枚長二尺以白練衣之用竹簡十二枚六枚與軸等六枚長尺二寸文出集書書皆篆字哀册贈册亦同諸王五等開國及鄉男恭拜以其封國所在取社壇方面土苞以白茅內青廂中函方五寸以青塗飾封授之以為社隋臨軒册命三師諸王三公並陳車輅餘則不百司定列內史令讀册訖受册者拜受出又引次受册者如上儀若册開國郊社令奉茅土立於仗南西面每授册訖授茅土焉唐之制如開元禮三老五更有虞氏深衣而飬老夏后氏燕衣而飬老商人縞衣而飬老周人元衣而養老天子父事三老兄事五更親袒割牲執醬而饋執爵而酳三公設几九卿正履祝鯁在前祝饐在後使者安車軟輪送迎至家天子獨拜于屏其明日三老詣闕謝以其禮遇太尊故也後漢明帝以李躬為三老桓榮為五更安帝以魯丕李充為三老靈帝又以袁逢為三老賜以玉杖魏髙貴鄉公即位幸太學命王祥為三老鄭小同為五更祥南面几杖以師道自居天子北面乞言祥陳明王聖帝君臣政化之要以訓之聞者莫不砥礪後魏孝文飬老於明堂以尉元為三老遊明根為五更帝再拜三老肅拜五更鄭衆云但俯下手今時撎拜是也撎音於志反即今之揖也給三老上公之祿五更元卿之祿後周武帝保定三年詔以太傅燕國公謹于謹為三老賜延年杖帝幸太學以食之三老入門皇帝迎拜門屏之間三老答拜有司設三老席於中楹南向太師晉國公護升階設几於席三老升席南面慿几而坐大司冦楚國公寧升階正舄皇帝升立於斧扆之前西面有司進饌皇帝跪授醬豆親自袒割三老食訖皇帝又親跪授爵以酳有司撤訖皇帝北面立訪道三老乃起立於席後皇帝曰猥當天下重任自惟不才不知政治之要公其誨之三老答曰木受繩則正后從諫則聖自古明王聖主皆虛心納諌以知得失天下用安惟陛下念之云云三老言畢皇帝再拜受之三老答拜禮成而出唐制仲秋吉辰皇帝親飬三老五更於太學其儀具開元禮臣謹按五更蔡雍云五叟是也叟字或作更今人於嫂字之叟亦或作更而為嫂其實一也鄉飲酒臣謹按鄉飲酒者王道之始也尚齒尊賢莫尚乎此自漢歷唐未嘗廢也惟宋家以淳化中講究未備遂爾因循近日緣明州舉行其事朝廷遂下明州會例而頒之天下未幾而廢以明州之士不識禮意不可以行也何哉鄉飲禮者惟儀禮詳明所以唐太宗但録其一卷而頒之明州之行不知本儀禮但取禮記鄉飲義不本全經何以行事臣為是作鄉飲禮三種書蓋本儀禮於古而參開元禮於今復取於厯代而損益之今此篇但記前代所行云後漢永平二年郡縣行鄉飲酒于學校祀先聖先師周公孔子牲以犬晉武帝泰始六年十二月帝臨辟雍行鄉飲酒之禮詔曰禮儀之廢久矣乃令復講肄舊典賜太常絹百匹丞博士及學生牛酒咸寧三年及惠帝元康九年復行其禮唐貞觀六年詔曰比年豐稔閭里無事乃有墮業之人不顧家産朋逰無度酣宴是耽危身敗德咸由於此自非澄源正本何以革兹弊俗可先録鄉飲酒禮一卷頒示天下每年令州縣長官親率長幼依禮行之庶乎時識亷耻人知禮節開元十八年宣州刺史裴耀卿上疏曰州牧縣宰所主者宣揚禮樂典校經籍所教者返古還淳上奉君親下安鄉族外州逺郡俗習未知徒聞禮樂之名不知禮樂之實竊見以鄉飲酒禮頒於天下比來唯貢舉之日略用其儀閭里之間未通其事臣在州之日率當州所管一一與父老百姓勸遵行禮奏樂歌至白華華黍南陔由庚等章言孝子飬親及物遂性之義或有泣者則人心有感不可盡誣但以州縣久絶雅聲不識古樂伏計太常具有樂器太常久備和聲請令天下三五十大州簡有性識人於太常調習雅聲仍付笙竽琴瑟之類各三兩事令比州轉次造習每年各備禮儀準令式行稍加勸奬以示風俗其儀具開元禮賔禮三恪二王後虞舜以堯子丹朱為賔曰虞賔而不臣之夏禹封丹朱於唐舜子啇均於虞皆有疆土以奉先祀服其車服用其禮樂加之以客禮不臣也周武王克商而封夏後於把殷後於宋皆公爵封舜後於陳侯爵以備三恪周得天下封夏商二王後又封舜後謂之恪恪恭也義取王之所恭禮司几筵延國賔于牖前左彤几王者立三恪二王之後者欲通師法之義以其前代之後使之郊天以天子禮祭其始祖受命之王自行正朔服色以此得通三正也魏文帝封後漢帝協為山陽縣公邑萬戶位在諸王侯上奏事不稱臣受詔不拜以天子車服郊祀天地宗廟臘如漢制都山陽濁鹿城青龍二年薨諡曰孝獻皇帝以漢天子禮儀葬于禪陵晉武帝泰始元年十二月遣太僕劉原告太廟封魏帝奐為陳留王詔曰明德昭融逺鑒天命欽象厯數用禪厥位敢咨詢故訓恭授青土于東國永為晉賓載天子旌旗乘五時副車行魏正朔郊祀天地禮樂制度皆如魏舊以承王顯祖之禋祀又詔王上書不稱臣答報不為詔一如賔禮二年詔陳留王操尚謙沖每事輒表非所以優崇之也主者諭意非大事皆使王官表上之三年博士祭酒劉喜等議漢魏為二王後衛公署於前代為二王後於大晉在三恪之數應降稱侯祭祀制度宜與五等公侯同有司奏陳留王山陽公為二代之後衛公備三恪之禮易稱有不速之客三人來此則以三為斷不及五代也東晉明帝太寧二年詔曰三恪二王世之所重興滅繼絶政之所先禋祀不傳甚用傷悼主者詳議立後以聞時曹勱為嗣陳留王以主魏祀升平元年陳留王勱表稱廢疾積年不可以奉祭祀求放罷太學博士曹耽議勱為祭主而無執祭之期冝與穆子孟縶事同太常王彪之云二王之後不冝輕廢立記傳未見有已為君而以疾罷者孟縶穆子是方應為君非陳留之比孝武帝太元十二年博士庾𢎞之等議陳留王前代之後遇以上賓之禮皇太子雖國之儲副在人臣之位今班次冝在王下宋武帝永初元年封晉恭帝為零陵王居于秣陵行晉正朔車旗服色一如其舊有其文而不備其禮文帝元嘉五年散騎常侍荀伯子上疏曰伏見百官位次陳留王在零陵王上按春秋次序諸侯宋居祀陳之上臣以零陵王位冝在陳留王上陳留王冝降爵為公十一年升在三恪隋封後周靜帝為介國公唐武德元年五月詔曰革命創制禮樂變於三正修廢繼絶德澤崇於二代其以莒之􅈶邑奉隋帝為􅈶公行隋正朔車旗服色一依舊章軍禮天子諸侯將出征類冝造禡並祭所過山川周制天子將出征類于上帝冝于社造于禰肆師為帝位帝位五德之帝所祭於南郊者類冝造皆祭名禡於所征之地禡師祭也受命於祖以遷廟主載于齋車以行無遷主以幣帛皮圭告于祖禰遂奉以出載于齋車以行每舍奠焉而後就舍以脯醢禮神乃敢即安也受成于學過大山川則用事焉令祝用祭事告之凡出必用牲幣反亦如之出征執有罪反釋奠于學以訊馘告諸侯將出征冝社造禰及無遷主以主命並如天子之制梁天監初陸璉定軍禮依古制類造等用牲幣帝曰冝者請征討之冝造者稟謀於廟類者奉天時以明伐並明不敢自専陳幣承命可也璉不能對嚴植之又爭之於是告用牲幣反亦如之北齊天子親征纂嚴則服通天冠文物充庭有司奏更衣乃入冠武辨左貂附蟬以出誓訖擇日備法駕乘木輅以造于廟載遷廟主於齋車以俟行次冝于社有司以毛血釁軍鼓載帝社祏主於車以俟行次擇日陳六軍備大駕類于上帝次擇日祈后土神州嶽鎮海瀆川源等乃為坎盟督將列牲於坎南北首有司於坎前讀盟文割牲耳承血皇帝受牲耳遍授大將乃置于坎又歃血歃遍又以置坎禮畢埋牲及盟書又卜日建牙旗於墠祭以太牢及所過名山大川使有司致祭將屆戰所卜剛日備元牲列軍容設柴於辰地為墠而禡祭大司馬奠矢有司奠毛血樂奏大濩之音禮畢徹牲柴燎戰前一日皇帝禱祖司空禱社戰勝則各報以太牢又用太牢賞用命于祖引功臣入旌門即神庭而授版焉又罰不用命于社即神庭行戮訖振旅而還格廟詣社訖擇日行飲至之禮文物充庭有司執簡紀年號月朔陳六師凱入格廟之事飲至䇿勳之美用述其功不替賞典焉隋制天子行幸有司祭所過嶽瀆以太牢山川以少牢若親征及巡狩則類上帝冝造社廟還禮亦如之唐制車駕行幸及親征有司類冝造禡如開元禮軷祭周制天子將出師太馭掌馭玉輅以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之行山曰軷犯之者封土為山象以菩芻棘柏為神主既祭之以車轢之而去喻無險難也後周迎太白出國門而軷祭隋制皇帝行幸親巡狩則軷祭其禮有司於國門外委土為山象設埋坎有司刳羊陳俎豆駕將至委奠幣薦脯加羊饌埋於坎駕至太僕祭兩軹及軌乃飲授爵遂轢軷上而行唐車駕親征如開元禮田獵周制天子諸侯無事則嵗行搜苗獮狩之禮漢晉以來有閲兵之制而史闕田獵之儀宋元嘉二十五年二月大搜于宣武場其法置行軍殿於幕府山南岡并設王公百官幕先獵一日遣馬騎布圍右領軍將軍督右左領軍將軍督左大司馬董正諸軍獵日侍中三奏一奏捶一鼓為一嚴三嚴訖引仗為小駕鹵簿皇帝乘馬戎服從者悉絳彩幘黃麾警蹕鼓吹如常儀獵訖宴會享勞比校多少戮一人以懲亂法會畢還宫梁陳因之北齊春搜禮有司規大防建獲旗以表獲車前一日命布圍領軍將軍一人督左甄護軍將軍一人督右甄大司馬一人居中節制諸軍天子陳小駕服通天冠乘木輅詣行宫將親禽服戎服鈒戟者皆嚴武衛張甄圍旗鼓相望銜枚而進甄常開一方以令三驅圍合吏奔騎令曰鳥獸之肉不登於爼者不射皮革齒牙骨角毛羽不登於器者不射甄合大司馬鳴鼓促圍衆軍鼓譟鳴角至期處而止大司馬屯北旌門二甄帥屯左右旌門天子乘馬從南旌門外親射禽謁者以獲車收禽載還陳於獲旗之北王公以下以次射禽皆送旗下事畢大司馬鳴鼓解圍復屯殿中即中率其屬收禽以實獲車天子還行宫命有司每禽擇取三十一曰乾豆二曰賓客三曰充君之庖其餘即於圍下量犒將士禮畢改服鈒者韜創而還夏苗秋獮冬狩禮皆同後周仲春教振旅大司馬建大麾於萊田之所鄉稍之官以旗物鼓鐸鉦鐃各帥其人而致誅其後至者建麾於後表之軍中集衆庶質明偃麾誅其不及者乃陳徒騎如戰之陳大司馬北面誓之軍中皆聽鼓角以為進止之節田之日於萊之北建旗為和門諸將帥徒騎序入其門有司居門以平其人既入而分其地險野則徒前而騎後易野則騎前而徒後既陳皆坐乃設驅逆騎有司表禡於陳前以太牢祭黃帝於狩地為墠建二旗列五兵於坐側行三獻禮遂搜田致禽以祭社仲夏教苃舍遂苖田仲秋練兵遂獮田仲冬大閲遂狩田其致禽礿祀享蒸教習之儀並如古周法隋大業三年煬帝在榆林突厥啓民及西域東夷君長並來朝貢帝欲示以甲兵之盛乃命有司陳冬狩之禮詔虞部量拔延山南北周二百里並立表記唐髙祖武德五年十二月幸涇陽之華池校獵謂羣臣曰今日畋樂乎諌議大夫蘇世長進曰陛下逰獵薄廢萬機不滿十旬未為大樂髙祖色變既而笑曰狂態發邪世長曰為臣私計即狂為陛下國計即忠貞觀十六年十二月狩于驪山時隂寒晦冥圍兵斷絶上乘髙遙見之欲捨其罰恐虧軍令乃廽轡入谷以避之永徽元年冬出獵在路遇雨因問諌議大夫谷那律曰油衣若為得不漏對曰能以瓦為之必不漏矣上大悅因此不復出獵先天元年十一月獵於驪山之下開元三年十月大搜于岐州鳯泉場屬夜雪天寒其圍兵並放散各賜布一端綿一屯搜狩之制具開元禮講武漢興設南北軍之備外命天下郡國選能引強蹶張材力武猛者以為輕車騎士材官樓船常以立秋後郊禮畢斬牲於東門以薦陵廟肄孫吳兵法六十四陳每十月都課試金革騎士各有員數如有冦警平地用車騎山阻用材官水泉用樓船孝文納鼂錯之䇿以為軍之勝負定於內有事則可以應於外頗祖周司馬法齊寓政之制管子寓軍令徙人於邉以起軍伍元帝用貢禹議始罷角觗戲後漢初立秋之日自郊禮畢始揚威武斬牲於郊東門以薦陵廟其儀乘輿御戎輅白馬朱鬛躬執弩射牲太宰令謁者各一人載以獲車馳駟送陵廟還宫遣使者齎束帛以賜武官武官肄兵習戰陳之儀斬牲之禮名曰貙劉兵官皆肄孫吳兵法六十四陳既還公卿以下陳雒陽前街乘輿到公卿已下拜天子下車公卿親識顔色然後還宫古語曰在車下車則唯此時施行漢代以為常靈帝中平五年以天下黃巾賊起大發四方兵講武耀兵於平樂觀以小黃門蹇碩為上軍校尉凡八校尉皆統於碩起大壇上十二重五采華蓋髙十丈壇東北為小壇復建九重華蓋髙九丈列步騎兵士數萬人結營為陳天子親出臨軍駐大華蓋下大將軍何進駐小華蓋下禮畢帝躬擐甲介馬稱無上將軍行陳三匝還獻帝建安二十一年有司奏古四時講武按漢西亰承制三時不講唯十月都試金革今兵戈未偃士衆素習可無四時講武但以立秋擇吉日大朝車騎號曰閲兵上合禮名下承漢制是冬閲兵魏王曺操親執金鼓以令進退延康元年曹丕嗣魏王其年秋閲兵于郊公卿相儀王御華蓋親執金鼓之節魏明帝太和二年十月閲兵於東郊晉武帝泰始四年九月咸寧元年太康四年六年冬皆自臨宣武大閲衆軍然不自令進退自惠帝以後其禮遂廢東晉太興元年詔左右衛及諸營教習依大習儀作鴈羽仗成帝咸平中詔內外諸軍戲兵於南郊之埸其地因名閲場晉志作自後藩鎮桓庾諸方伯往往閲習然朝廷無事焉宋文帝依故事肄習衆軍兼用漢魏之禮其後以時講武於講武堂後魏明元帝永興五年以九月十月之交親行貙劉之禮文成帝和平三年因嵗除大儺遂耀兵示武更為制令步兵陳於南騎士陳於北各擊鐘鼓以為節度其步兵所衣青赤黑黃别為部隊楯矟矛戟相次周廽轉易以相赴就有飛龍騰蛇之變為函箱魚鱗四門之陳凡十餘法跪起前却莫不應節陳畢南北二軍皆鳴鼓角衆盡大譟各令騎將六千人去來挑戰步兵更進退以相拒擊南敗北捷以為威觀自後以為常北齊常以季秋皇帝講武於都外有司先芟萊野為埸作二軍進止之節輿駕停觀遂命將教衆為戰場之法凡為陳少者在前長者在後其還則長者在前少者在後長者持弓矢短者持旌旗勇者持鉦鼓刀楯為前行戰士持槊者次之弓箭為後行將帥先教士目使習見旌旗指麾之蹤發起之意旗卧則跪次教士耳使習聽金鼓動止之節聲鼓則進鳴金則止次教士心使知刑罰之苦賞賜之利次教士手使習持五兵之便戰鬬之備次教士足使習跪起及行列嶮泥之塗前五日皆請兵嚴於場所依方色建旗為和門都墠之中及四角建五綵牙旗應講武者各集於其軍戒鼓一通軍士皆嚴備二通將士擐甲三通步軍各為直陳以相俟大將各處軍中立旗鼓下有司陳小駕鹵簿皇帝武辨乘革輅大司馬介胄乘馬奉引入行殿百司陪列位定二軍迭為客主先舉為客後舉為主從五行相勝法為陳以應之唐顯慶二年十一月講武於滍水之南行三驅之禮上設次於尚書臺以觀之時許州長史封道𢎞奏言後漢南郡太守馬融講尚書於此因以為名今請改為講武臺從之五年三月八日又講武於并州城北上御飛閣羣臣臨觀之左衛大將軍張延師為左軍左右驍武等六衛左羽林騎士屬焉左武候大將軍梁建方為右軍左右威領武候等六衛右羽林騎士屬焉一鼓而誓衆再鼓而整列三鼓而交前左為曲直圎鋭之陳右為方鋭直圓之陳三挑而五變步退而騎進五合而各復位許敬宗奏曰延師整而堅建方敢而鋭皆良將也上曰講閲者安不忘危之道也梁朝衣冠甚盛人物亦多侯景以數千人渡江一朝瓦解武不可黷人不可棄此之謂也武太后聖厯二年欲以季冬講武有司延入孟春時王方慶上疏曰孟春之月不可講兵者兵金也金性尅木春盛德在木孟春行冬令則水潦為敗雪霜大摰首種不入請至明年孟冬教習以順天道從之開元元年十月十二日講武於驪山之下調兵二十萬戈鋋金甲照耀天地列大陳於長川坐作進退以金鼓之聲莭之明皇親擐戎服持大鎗立於陳前兵部尚書郭元振以虧失軍容坐于纛下將斬之宰臣劉幽求張説跪于馬前諫曰元振翊戴上皇有大功於國雖違軍令不可加刑伏願寬宥乃捨之配流新州給事中知禮儀唐紹以草軍儀有失斬之薛訥為左軍莭度衆以元帥及禮官得罪諸莭部頗亦失序唯訥及解琬軍不動上令輕騎召訥等至軍門不得入禮畢特加慰勞命將出征漢髙帝初為漢王都漢中將還定三秦擇良日齊戒設壇埸具禮拜韓信為大將軍部署諸將東出陳倉收秦地魏故事遣將出征符莭郎授莭鉞跪而推轂北齊命將出征則太卜詣廟灼龜授鼓旗於廟皇帝陳法駕服衮冕至廟拜於太祖遍告訖降就中階引上將操鉞授柯曰從上至天將軍制之又操斧授柯曰從下至泉將軍制之將軍既授斧鉞對曰國不可從外理軍不可從中制臣既受命有鼓旗斧鉞之威願假一言之命於臣帝曰茍利社稷將軍裁之將軍就車載斧鉞而出皇帝推轂度閫曰從此以外將軍制之後周制大將出征遣太祝以羊一祭所過名山大川明帝武成元年吐谷渾冦邉帝戎服乘馬遣大司馬賀蘭祥討之告於太祖之廟司憲奉鉞進授大將大將拜受以授從者禮畢出受甲兵隋制皇太子親戎及將軍出師則以猳肫一釁鼓皆告社廟授斧鉞訖不得反宿於家開皇八年晉王廣將伐陳內史令李德林攝太尉告于太廟禮畢又命有司冝于社二十年太尉晉王廣又北伐突厥次河上禡祭軒轅黃帝以太牢制幣陳甲兵行三獻之禮唐之制如開元禮宣露布後魏每攻戰克捷欲天下聞知乃書帛建於漆竿上名為露布自此始也其後相因施行隋文帝開皇中詔太常卿牛𢎞撰宣露布禮及九年平陳元帥晉王以驛上露布兵部奏請依新禮集百官四方客使等並赴廣陽門外服朝衣各依其列內史令稱有詔在位者皆拜宣訖蹈舞者三又拜而罷唐每平蕩冦賊宣露布其日守宫量設羣臣次露布至兵部侍即奉以奏聞仍集文武羣官客使於東朝堂中書令宣布具如開元禮大射鄉射周制天子之大射天官司裘供虎侯熊侯豹侯設其鵠夏官射人以射法治射儀王以六耦射三侯三獲三容樂以騶虞九莭五正諸侯以四耦射二侯二獲二容樂以貍首七莭三正孤卿大夫以三耦射一侯一獲一容樂以采蘋五莭二正士以三耦射犴侯一獲一容樂以采蘩五莭二正若王大射則以貍步張三侯鄉射之禮地官鄉大夫各掌其鄉之政正月之吉受法于司徒退而以鄉射之禮五物詢其衆庶一曰和二曰容三曰主皮四曰和容五曰興舞漢宣帝甘露三年三月黃門侍郎臨失其姓奏經曰鄉射合樂大射不何也韋元成曰鄉射所以合樂者鄉人本無樂故合樂嵗時所以合和百姓以同其意也至諸侯當有樂傳曰諸侯不釋懸明用無時也故不云合樂晉咸康五年春征西庾亮行鄉射之禮依古周制親執其事洋洋然有洙泗之風宋武帝為宋公在彭城九月九日出項羽戲馬臺射其後相承以為舊凖北齊三月三日皇帝常服乘輿詣射所升堂即座皇太子及羣官坐定登歌進酒行爵皇帝入便殿更衣以出驊騮令進御馬有司進弓矢皇帝射訖還御座射懸侯又畢羣官乃射五埒一品三十發一發調馬十發射下十發射上三發射麞三發射帖三發射獸頭三品二十五發一發調馬五發射下十發射上三發射麞三發射帖二發射獸頭四品二十發一發調馬五發射下八發射上二發射麞二發射帖一發射獸頭五品十五發一發調馬四發射下五發射上二發射麞二發射帖一發射獸頭侍官御仗以上十發一發調馬四發射下五發射上季秋大射皇帝御七寶輦射七埒正三品已上第一埒一品五十發一發調馬十五發射下二十五發射上三發射麞三發射帖三發射獸頭二品三品四十五發一發調馬十五發射下二十五發射上二發射麞餘與三品以下同也從三品四品第二埒三品四十二發一發調馬十二發射下二十二發射上二發射麞二發射帖三發射獸頭四品三十七發一發調馬十一發射下十九發射上一發射麞二發射帖三發射獸頭五品第三埒三十二發一發調馬九發射下十七發射上一發射麞二發射帖二發射獸頭六品第四埒二十七發一發調馬八發射下十六發射上一發射麞一發射帖七品第五埒二十一發一發調馬六發射下十二發射上餘與六品同也八品第六埒十六發一發調馬四發射下九發射上餘同七品九品第七埒十發一發調馬三發射下四發射上餘與八品同也大將太尉公為之射司馬各一人録事二人七埒各置埒將射正參軍各一人埒士四人威儀一人乘白馬以導的别參軍一人懸侯下府參軍一人又各置令史將士等員以司其事唐之制皇帝射于射宫則張熊侯觀于射宫則張麋侯皆去殿九十步太樂令設宫懸之樂鼓吹令設十二案於殿之庭若逰宴射則不陳樂懸三月三日九月九日賜百僚射自貞觀至麟德七年行三月之射行九月之射其禮遂至景雲二年諌議大夫源乾曜上表請行射禮直至先天元年二年開元八年九月賜百官九日射給事中許景先駮奏曰近三九之辰頻賜宴射以著格令猶降綸言但古制雖在禮章多闕官員纍倍帑藏未充水旱相仍繼之師旅既不以觀德又未足威邉耗國損民且為不急夫古天子以射選諸侯以射飾禮樂以射觀容志故有騶虞貍首之奏采蘋采蘩之樂天子則以備官為莭諸侯以時會為莭卿大夫以循法為莭士以不失職為莭皆審志固行德美事成隂陽克和暴亂不作故諸侯貢士亦試於射宫容體有虧則黜其地是以諸侯君臣皆盡志於射射之禮也其大矣哉今則不然衆官既多鳴鏑亂下以茍獲為利以偶中為能素無五善之容頗失三侯之禮凡令一箭偶中是費一丁租調用之既無惻隱獲之固無慙色疏奏罷之至二十一年八月敕下大射展禮先王創儀雖沿革或殊而遵習無曠往有陳奏遂從廢寢永鑒大典無忘舊章將射侯以觀德豈愛羊而去禮緬惟古訓罔不率由自我而闕何以示後其三元射禮即冝依舊遵行以今年九月九日賜於安福樓下自此以後其禮又息其射侯儀具開元禮臣謹按貞觀元年太宗謂蕭瑀曰朕少好弓矢自謂能盡其妙近得良弓十數以示弓工乃曰皆非良材也朕問其故曰木心不正則脈理皆邪弓雖剛徑而遣箭不直非良弓也朕始悟焉朕以弧矢定天下四方用弓多矣而有天下之日淺得為治之意固未及乎弓弓猶失之何况于治自是遂延耆老問以政術合朔伐鼓夏書曰乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走周制日有蝕之天子不舉樂素服置五麾陳五鼓五兵及救日之弓矢又以朱絲縈社而伐鼓責之漢制天子救日蝕素服避正殿陳五鼓五兵以朱絲縈社內外嚴警太史登靈臺候日月有變便伐鼓祝史陳辭以責之聞鼓音侍臣皆著赤幘帶劔入侍三臺令史以上皆持劔立其戶前衛尉馳驅繞宫伺察守備日復常皆罷後漢建安中將元會而太史上言正朝當日蝕朝臣議應會不共咨尚書令荀彧時博平計吏劉邵在坐曰梓慎裨竈古之良史猶占水火錯失天時禮諸侯旅見天子入門不得終禮者四日蝕在一然則聖人垂制不為變異預廢朝禮或災消異伏或推術􅍝誤也時尚書令荀彧及衆人咸善而從之遂朝如舊日亦不蝕邵由此著名晉武帝咸寧三年四年並以正朝合朔却元會東晉元帝大興元年四月合朔有司奏議按春秋日有蝕之天子伐鼓于社攻諸隂也諸侯伐鼓於朝臣自攻也按尚書符若日有變便擊鼓於諸門有違舊典詔曰所陳有正義輒敕外改之至康帝建元元年太史上元日合朔後復疑應却會與不庾冰輔政寫劉邵議以示八座蔡謨著議非之曰邵論災消異伏又以竈慎猶有錯失太史上言亦不必審其理誠然也而云聖人垂制不為變異先廢朝禮此則謬矣災祥之發所以譴告人君王者之所重誡故素服廢樂退避正寢百官降物用幣伐鼓躬親救之夫警誡之事與其疑而廢之寧慎而行之禮記云諸侯入門不得終禮者謂日官不先言諸侯既入見蝕乃知耳非先聞當蝕而朝會不廢也邵引此文失其義旨於是衆議從之穆帝永和中殷浩輔政又欲從劉邵議不即會王彪之曰禮云諸侯旅見天子不得終禮而廢者四自謂卒暴有之非謂先存其事而僥幸史官推術錯􅍝故不豫廢朝禮又從彪之議宋因晉制齊武帝永明元年十二月有司奏今月三日臘祠太社稷一日合朔日蝕既在致齋內未審於社祠無疑不尚書令王儉議禮記曾子問天子嘗禘郊社五祀之祭簠簋既陳唯大喪乃廢至於當祭之日火及日蝕則停尋伐鼓用牲由來尚矣而簠簋初陳問所不及據此而言致齋初日乃值薄蝕則不廢祭按漢初平中博士孫瑞議以日蝕廢冠而不廢郊朝議從之王者父天親地郊社不殊此則前準謂不冝廢詔可北齊制日蝕則太極殿西廂東向東堂東廂西向各設御座羣官公服晝漏上水一刻內外皆嚴三門者閉中門單門者掩之蝕前三刻皇帝服通天冠即御座直衛如常不省事有變聞鼓音則避正殿就東堂服白夾單衣侍臣皆赤幘帶劔升殿侍諸司各於其所赤幘持劔出戶向日立有司各率官屬並行宫內諸門掖門屯衛太社鄴令以官屬圍社守四門以朱絲繩繞繫社壇三匝太祝令陳辭責社太史令二人走馬露版上尚書門司疾上之又告清都尹鳴鼓如嚴鼓法日光復乃止奏解嚴唐合朔伐鼓具開元禮祭馬祖周制春祭馬祖夏祭先牧秋祭馬社冬祭馬步隋制常以仲春用少牢祭馬祖於太澤諸合祭官皆於祭所致齋一日積柴於燎壇禮畢就燎仲夏祭先牧仲秋祭馬社仲冬祭馬步並於大澤皆以剛日牲用少牢如祭馬祖埋而不燎唐馬祭因隋之制其儀如開元禮時儺周制夏官方相氏掌蒙熊皮黃金四目元衣朱裳執戈揚盾帥百隸而時儺以索室驅疫月令季春命國儺九門磔攘以畢春氣仲秋天子乃儺以達秋氣季冬命有司大儺旁磔以送寒氣後漢季冬先臘一日大儺謂之逐疫漢舊儀曰顓帝有三子生而亡去為疫鬼一居江水為虎一居若水為罔兩蜮鬼一居人宫室區隅漚廋善驚人小兒月令章句曰日行北方之宿北方太隂恐為所抑故命有司作大儺所以扶陽抑隂也盧植禮記注云所以逐衰而迎新其儀選中黃門子弟年十嵗以上十二以下百二十人為侲子皆赤幘皂裳執大鼗侲音振方相氏黃金四目蒙熊皮元衣朱裳執戈揚盾十二獸有衣毛角中黃門行之冗從僕射將之以逐惡鬼于禁中夜漏上水朝臣會侍中尚書御史謁者虎賁羽林郎將執事皆赤幘陛衛乘輿御前殿黃門令奏曰侲子備請逐疫於是中黃門倡侲子和曰甲作食􅓇胇胃食虎雄伯食魅騰簡食不祥攬諸食咎伯竒食夢強梁祖明共食磔死寄生委隨食觀錯斷食巨窮奇騰根共食蠱凡使十二神追惡凶赫汝軀拉汝幹莭解汝肉抽汝肺腸汝不急去後者為糧東京賦曰捎魑魅斫獝狂斬委蛇腦方良囚耕父於清泠溺女魃於神潢踐夔魑與罔象殪野仲而殱逰光注曰魑魅山澤之神獝狂惡鬼委蛇大如車轂方良草澤神耕父女魃皆旱鬼惡水故囚溺於水中使不能為害夔魖與罔象木石之怪野仲逰光兄弟八人在人間作怪害也孔子曰木石之怪夔罔兩水之怪龍罔象劉昭曰木石山怪也夔一足越人謂山㺐罔兩山精好學人聲而迷感人龍神物也非所常見故曰怪罔象食人一名沐􅀈脾蒼曰獝狂無頭鬼因作方相與十二獸舞歡呼周遍前後省三過持炬火送疫出端門東京賦曰煌火馳而星流逐赤疫於四裔注曰煌火光煌如星馳逐驚走赤疫鬼惡者也侲子合三行從東序上西序下門外騶騎傳炬出宫司馬闕門門外五營騎士傳火棄雒水中東京賦注曰衛士千人在端門外五營千騎在衛士外為三部更送至雒水中凡三輩逐一鬼投雒水中仍上天池絶其橋梁使不復渡還百官官府各以木面獸能為儺人師訖設桃梗鬱壘葦茭畢執事陛者罷山海經曰東海中有度朔山上有大桃根蟠屈三千里其卑枝門曰東北鬼門萬鬼出入也上有二神人一曰神荼一曰鬱壘主閲領衆鬼之惡害人也執以葦索而用食虎於是黃帝法而象之驅除畢因立桃梗於門戶上畫鬱壘持葦索以御凶鬼畫虎於門當食鬼葦戟桃杖以賜公卿將軍諸侯云是月也立土牛六頭於國都郡縣城外丑地以送大寒月令章句曰是月之會建丑丑為牛寒將極是故出其物類形象以示送達之且以升陽也北齊制季冬晦選樂人子弟為侲子如漢法合二百四十人百二十人赤幘皂衣執鼗百二十人赤布袴褶執鞞角方相氏執戈揚盾又作窮竒祖明等十二獸皆有毛角鼓吹令率之中黃門行之冗從僕射將之以逐惡鬼于禁中其日戊夜三唱開諸里門儺者各集被服器仗以待事戊夜四唱開諸城門二衛皆嚴上水一刻皇帝常服即御座王公執事官一品以下六品以上陪列觀儺者鼓譟入殿西門遍於禁內分出二上閣作方相與十二獸舞戲喧呼周遍前後鼓譟出殿南門分為六道出於郭外隋制季春晦儺磔牲於宫門及城四門以禳隂氣秋分前一日禳陽氣季冬旁磔大儺亦如之其牲每門各用羝羊及雄雞一選侲子如北齊法令八隊二時儺則四隊問事十二人赤幘褠衣執皮鞭工人二十人其一人方相氏如周禮一人為唱師著皮衣執捧鼓角各十人有司預備雄雞羝羊及酒於宫門為次未明呼鼓譟以入方相氏執戈揚盾周呼鼓譟而出合趣明陽門分詣諸城門將出諸祝師執事與疈牲胸磔之於門酌酒禳祝舉牲并酒埋之唐制季冬大儺及州縣儺禮並如開元禮通志卷四十四
