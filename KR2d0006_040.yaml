body:
  text: 通志卷三十五宋右廸功郎鄭樵漁仲撰六書略第五起一成文圖衡為一從為丨音衮邪丨為丿房必切反丿為乀分勿切至乀而窮折一為音及反為呼早切轉為音隱反為居月切了从此見了部至而窮折一為者側也有側有正正折為即宀字也又音帝又音入轉為側加切側為音反為音泉至泉而窮一再折為五犯切轉為口犯切側為音方反為音播至而窮引一而繞合之方則為音圍圓則為音星至則環轉無異勢一之道盡矣音拄與一偶一能生不能生以不可屈曲又不可引引則成丨然與一偶一能生而不能生天地之道隂陽之理也因文成象圖有到取􅀢為丅下到饗為厚到子為他骨切到首為鳥到了為鳥有反取反恵為反人為化反化為殄反為呼懇切反止為撻反欠為旡音既反余制切為弋支反反可為普可反有向取向父為子向后為司司向左為右向几劇反為居玉反向爪為掌向丑亦反為丑玉反向刀為匕向身為衣向居桀反為居月反向為戕向永為􅏨音派向雲為雷有相向取户相向為門阜相向為音阜邑相向為鄉又音巷相向為鬬有相背取相背為蒲撥反臣相背為誑巳相背為弗楚危反相背為舛有相背向取向為音拱背為􅦁音攀向為為背為北向為門背為牖向為姐背為嫁有近取取天於乾體取地亦為坤字於坤體取水於坎體取火於離體取六於四取九於七取十於五取升於斗取耳於鼻取於目取烏於鳥取於佳有逺取取山於艮體取雷於震體取風於巽體取澤於兌體取四五六七八九十於一二三取千於百取萬於千取毛於髪取男於女有加取一加一為二二加一為三二加二為亖百加百為皕必力反爻加爻為㸚陟几反山加山為屾所臻反水加水為沝之壘反有減取減二十為廿音入減三十為卉縣沓反減四十為􅕊悉入反減三十年為世又有減川為澮減為畎亦是減法有微加減取加丿為延減丿為㢟丑連反加一為聿減一為尼輙反加丿為囱楚江反減丿為囟息進反加一為王于况切減一為土有上取上向左為禾向右為音稽向左為毛向右為手有下取下向右為少向左為子結反向右為訶向左為音考有中取中貫為毋不貫為母中交為交不交為有方圓取圓圍為音星又音槃方為有曲直取曲丨音衮為乙直為丨有離合取離人入為合為人有從衡取衡丨為一從一為丨有邪正取正乂為十邪十為乂有順逆取順理為从逆理為比有内外中間取相内為音雷又音回相外為鄰相間為環古今殊文圖黄帝貨貨作斤帝嚳貨貨作高陽貨貨作斤商貨貨作􅀈又作又作子貨金貨作周之圜法貨作京王大錢貨作齊公貨貨作齊刀别種貨作莒貨貨作北公貨刀貨作黄帝貨帝作人帝昊金帝作古文帝作二此古文常用者未悉起自何代師􅧟敦帝作古幣金作黄帝貨金作帝昊金金作帝嚳金金作全商鍾金作周鉦金作晉鼎金作堯泉泉作又作商泉莊布泉作彡巨泉泉作丿古尺斗柄泉作商貨布作又作齊公布布作大齊布布作商鍾惟作周敦惟作商鍾子作周敦子作古今殊文多矣以此六條亦足見焉一代殊文圖太昊金昊作復作高陽金高作復作復作復作復作復作堯泉堯作上復作又古文堯作垚又作開元文字堯作士夏貨夏作復作復作古文書禹作雲臺碑禹作商貨商作復作復作復作復作復作復作用商壺辛作商卣辛作祖辛爵辛作祖戊匜辛作齊刀齊作品復作復作􅌏敦又有作一代殊文多矣以此八條亦足見焉諸國殊文圖晉姜鼎通作虢姜鼎通作宋公鼎公作魯公鼎公作晉姜鼎文作周公鼎文作周敦文作屈生敦君作姬簠君作宋君鼎君作周敦在作尹彞在作父癸鼎在作父乙彝在作周公鼎作作晉姜鼎作作孔父鼎作作楚王彝作作諸國殊文多矣以此六條亦足見焉殊文總論觀古今殊文與一代殊文則知先儒以義理說文字者徒勞用心一貨可説也二貨何説乎二貨可説也三貨四貨至于十三貨何説乎既有十三文豈亦有十三義乎一高可説也二高何説乎二高可説也三高四高五高六高何説乎既有六文豈亦有六義乎况此文盡出聖人之手豈聖人之書無義而秦人史隸之書反有義乎大抵書以紀命為本豈在文義以義取文者書之失也後人之書附義成文古人之書舎義成文文而無義者皆古聖人之書也附義成文者皆是依緣意想而取象舎依緣則其意無所繫著此後人之用心也觀諸國殊文知三代之時諸國之書有同有異各隨所習而安不可彊之使同秦人無知欲使天下好惡趨避盡狥於我易天下之心而同吾之心易天下之面而同吾之面諧聲變體論急慢聲諧高下聲諧論急慢聲諧急慢聲諧者慢聲為二急聲為一也梵書謂二合聲是矣梵人尚音故有合二而成聲合三合四而成聲華人尚文惟存二合此於梵書中論之矣詩序曰聲成文謂之音知聲有急慢則發而為文抑揚合度鏗鏘中節箋釋之家全不及此至於語辭渾而無别但取言中之義不問句中之節故栁宗元極論語辭之義良由不知急慢之節所以辭與句不相當慢聲為者焉急聲為旃旃為者焉之應慢聲為者與急聲為諸諸為者與之應又如慢聲為而已急聲為耳慢聲為之矣急聲為只慢聲為者也急聲為者慢聲為也者急聲為也慢聲為嗚呼急聲為嗚慢聲為噫嘻急聲為噫皆是相應之辭也此並載籍中常語先儒不知考䆒又如語言之中慢聲為激搏急聲為郭慢聲為中央急聲為張者亦是也古艷歌曰蘭草自然香生於大道傍十月鈎䥥起并在束薪中此中央之為張也張平子西京賦云翔鶤仰而弗逮滉青鳥與黄雀伏櫺檻而俯聼聞雷霆之指激此則激搏之為郭也可以觸類而長論高下聲諧音讀附董正之董亦為督察之督者東董凍督故也改更之更亦為變革之革者更梗更去聲革故也伊之為已大誥曰已予惟小子已之為億易曰億䘮貝又曰億無䘮有事伊已意億故也非之為匪匪之為弗非匪沸弗故也眅即盻者攀眅盻故也儆類敬者京儆敬故也翻之為反庸之為用邪之為也之之為只者並此道也而之為爾爾之為汝汝之為若于之為於於之為與與之為與音譽亦此道也是皆一義之所起而發聲有輕重耳乃若父雖甫音讀若輔道雖杜老切讀若導禮記大昕昕音忻讀若希説文臑字音􅀈讀若襦􅀢字特一切讀若亭此為音讀之别無非聲之諧也論諧聲之惑左氏曰止戈為武武非从止凡沚芷齒耻之類从止武从戈从亾从戈以見義从亾以見聲古文歌舞之舞作􅀢振撫之撫作􅀈廊廡之廡作􅕆於古並从亾於今並从無而無於篆文亦从亾則武之从亾又何疑焉若曰武欲見止戈則古之武有作戊者又有作㦻者戊之前垂象執戈揚盾之義㦻之从習有習用干戈之義及戊為戊巳之戊㦻為襲敵之襲襲敵之字古作㦻今用衣襲字則戎事之武專用武也若曰武有止戈之義又何必曰偃武乎亾之與止易得相紊左氏所見止之訛也武於六書為諧聲武戈類也武之从亾亦猶戰之从單音善戮之从翏音六戢之从咠音緝戣之从癸皆聲之諧也禮記曰祖者且也祖非从且凡罝姐之類从且徂祖之類从且音徂祖無且義又曰㓝者􅀈也若㓝之从井而有􅀈之義則也阱也耕也亦可曰㓝乎又曰富也者福也若富之从畐芳伏切而有福之義則輻也幅也副也亦可曰福乎若曰角觸也商章也秋之為揫春之為蠢皆此類也凡此類是皆不識諧聲論象形之惑左氏曰反正為乏正無義也正乃射侯之正音征象其形焉正音征以受矢乏以藏矢是相反也反正為乏其義在此或曰反正為丐音沔丐蔽矢短墻也正以受矢丐以蔽矢是相反也此亦反正為乏之義邪正之正無所象故正用侯正之正邪用琅琊之邪並協音而借是為假借之書也韓子曰自營為厶音私厶非自營之義也厶於篆文作象男子之勢故又音鳥與即了字敵了者交脛之端也故厶勢下垂了状上縋並是象形之文若乃自營之厶與了絶之了並同音而借亦為假借之書疊古作曡祭肉之積在器也从宜祭器也从晶音精象積肉之形曡與豐同意豐亦爼豆之衍也揚雄以曡為古理官决罪三日得其宜乃行故从三日从宜此亦為不識象形者也何用識竒字之多乎能象熊之形許氏謂能熊屬則可矣又曰賢能之能何也出象花英之形許氏謂象草木益滋上出亦可矣又曰出進何也是皆惑象形於假借者也三代之前有左氏韓子三代之後有揚雄許愼猶不達六書之義况他人乎論一二之所生臣六書證篇實本説文而作凡許氏是者從之非者違之其同乎許氏者因畫成文文必有説因文成字字必有解其異乎許氏者每篇總文字之成而證以六書之義故曰六書證篇然許氏多虛言證篇惟實義許氏所説多滯於死證篇所説獨得其生葢許氏之義著於簡書而不能離簡書故謂之死證篇之義舎簡書之陳迹能飛行走動不滯一隅故謂之生今舉一二之義為説文之首篇者可以見矣説文於一則曰惟初太始道立於一造分天地化成萬物故於一之類則生元生天生丕生吏然元从上丕从地吏从又皆非一也惟天从一證篇於一則曰一數也又象地之形又象貫物之状在上為一故生天生百在中為貫故生母音貫生古文車在下為地故生旦生丕為貫為地者無音以無所麗則復為一矣是以無音説文於丄音上則曰丄高也此古文丄指事也故於丄之類則生帝生旁生下然帝夲象形旁則形兼聲下非从上而與上偶證篇於丄則曰二音貳又音上殺上者為上殺下者為下在物之中者象編連之形在物之上下者象覆載之位故於二則生竺生亝於上則生元生帝於下則生􅀢音鎭生􅀢良仞切於中則生冊生再於上下則生亟生亘在中在上下者無音以自不能成體必有所麗是以無音此臣所作證篇之㫖也論子母立類為母從類為子母主形子主聲説文眼學眼見之則成類耳聼之則不成類廣韻耳學耳聼之則成類眼見之則不成類故説文主母而役子廣韻主子而率母説文形也禮也廣韻聲也樂也説文以母綂子廣韻以子該母臣舊作象類書總三百三十母為形之主八百七十子為聲之主合千二百文而成無窮之字許氏作説文定五百四十類為字之母然母能生而子不能生今説文誤以子為母者二百十類且如説文有句類生拘生鉤有􅓒類生㮚生㮚有半類生胖生叛有菐類生僕生䑑據拘當入手類鉤當入金類則句為虛設㮚當入木類㮚當入米類則􅓒為虛設胖當入肉類叛當入反類則半為虛設僕當入人類䑑當入臣類則菐為虛設蓋句也􅓒也半也菐也皆子也子不能生是為虛設此臣所以去其二百十而取其三百三十也論子母所自或曰作文之始其實一也何以成母何以成子曰顯成母隱成子近成母逺成子約成母滋成子同成母獨成子用成母不用成子得勢成母不得勢成子來與麥同物麥顯而來隱牙與齒同物齒顯而牙隱故麥為母而來為子齒為母而牙為子龍與魚同物魚近而龍逺㲋丑略切與兎同物兎近而㲋逺故魚為母而龍為子兎為母而㲋為子胡感切與音同上同象約而滋豆與登同象豆約而登滋故為母而為子豆為母而登為子烏與鳥同體鳥同而烏獨易與豸同體豸同而易獨故鳥為母而烏為子豸為母而易為子睂與目相比目用而睂不用疋音疏與足相比足用而疋不用故目為母而睂為子足為母而疋為子左與右敵體得勢而不得勢音攀與音拱敵體得勢而不得勢故為母而為子為母而為子舉此六條可以觸類而長論省文凡省文有聲關於義者有義關於聲者甜之从舌者義也舌之所嗜者甘恬之从舌者非舌也謂之从甜省是之謂聲關於義營之从􅲉音熒者聲也以吕為主以􅲉為聲勞之从􅲉者非聲也謂之从營省是之謂義關於聲伊从人从尹謂伊尹能尹正天下如􅢤蝛之􅢤从伊省亦謂之聲關於義和謂調和之和如銛利之利从刀从和省易曰利者義之和此亦謂之義關於聲凡省文之類可以凖此論篆隸篆通而隸僻故有左無右有􅊟今作阝音阜無􅀈音阜於篆則左向右為左右向左為右獨向為􅊟相向為􅀈篆明而隸晦故有王無玉有未無朱於篆則中一近上為王中一居中為玉中一直為朱中一不直為未篆巧而隸拙故有冖音覔無冂音坰有音無丨音衮於篆則上冐為冂不冐為冖上加為主加丨為宀篆縱而隸拘故有刀無匕有禾無音稽於篆體向左為刀向右為匕首向左為禾向右為然則篆之於隸猶筮之於龜論創意炅昋炔右三字並音桂乃秦博士桂真之後避地别居各撰其姓之文而不殊夲者雨單音彎莔音迄􅀢音觥􅀢音礥壾音莽􅀢音舉音褒㷏音擁右八字孫亮命子據桂氏命姓孫氏命子制十一字惟炔猶得桂聲而又無義餘十字聲義兩途俱不通文而非文字而非字者也論變更􅣃音沽罪右二字秦人以市買多得為􅣃罪舊作辠始皇以其似皇字改而為罪代天埊代地代日代月又作匣代星􅖔代臣代載代初代年代正又作代照代證􅀢代聖代授代戴圀代國右武后更造十八字代舊十六字史臣儒生皆謂其草創無義以臣觀之天作日作並篆文也年作正作並古文行於世者授古文亦有作者國亦有作􅂒者地籕文或有作坔者星崔希裕纂古而作孰謂其草創而無所本與對舊作漢文以言多非誠故去口而作對隋舊作隨文帝以周齊不遑寧處故去辵而作隋疊舊作曡新室以三日太盛改為三田􅚷舊作騧宋明以咼音喎類禍改而為𤓰形影之影舊作景葛稚川加彡於右軍陣之陣舊作陳王逸少去東用車尼邱之山三倉合而為􅀈音章貢之水後人合而為贑音紺荒昬二義元次山謚隋煬帝合而為􅀈音荒鄗火各切本一名分而為高邑者漢光武也鄚嫌近鄭更而為莫豳嫌近幽更而為邠此並唐明皇所更也論遷革雅夲烏鴉之鴉借為雅頌之雅復有鴉矣故雅遂為雅頌之雅後人不知雅夲為鴉雇夲九鳸之鳸借為雇賃之雇復有鳸矣故雇遂為雇賃之雇後人不知雇夲為鳸頌夲顔容之容故从公从頁借為歌頌之頌今人見頌知歌頌之頌而已安知頌夲為容泉夲貨錢之錢故於篆象古刀文借為泉水之泉今人見泉知泉水之泉而已安知泉夲為錢論便從人與蟲魚禽獸同物同物者同為動物也天地之間一經一緯一從一衡從而不動者成經衡而往來者成緯草木成經為植物人與蟲魚禽獸成緯為動物然人為萬物之靈所以異於蟲魚禽獸者蟲魚禽獸動而俯人動而仰獸有四胑而衡行人有四胑而從行植物理從動物理衡從理向上衡理向下人動物也從而向上是以動物而得植物之體向上者得天向下者得地人生乎地而得天之道夲乎動物而得植物之理此人之所以靈於萬物者以其兼之也人之體理從故文字便從不便衡坎離坤衡卦也以之為字則必從故必從而後能成必從而後能成必從而後能成舟以衡濟車以衡運舟車衡器也作舟者必楹航而後能成作車者必弋軸而後能成車隹以衡飛魚以衡走隹魚衡物也作隹者必作縣隹之勢而後能成作魚者必作貫魚之勢而後能成鼻從竅目衡竅作鼻者必為從作目者亦為從此可知其務從也葢人理從從則起起則生衡則卧臥則尸論華梵上諸蕃文字不同而多夲於梵書流入中國代有大鴻臚之職譯經潤文之官恐不能盡通其㫖不可不論也梵書左旋其勢向右華書右旋其勢向左華以正錯成文梵以偏纒成體華則一音該一字梵則一字或貫數音華以直相隨梵以横相綴華有象形之文梵亦有之尾作有尾垂之形縛作有纒縛之象華有省文之字梵亦有之地夲作亦省作縳夲作亦省作䭾本作亦省作華有同聲而借之字梵亦有之野作而也亦作䭾作而陁亦作華有協聲而借之字梵亦有之微用而尾亦用薩用而散亦用華書有重二之義如舊漢書元元休息下元字只作二石鼓文嶧山碑重字皆作二梵書凡疊句重言則小作但華書每字之重皆作二梵書一字疊一言重者作一三字四字疊三言四言重者亦只作華葢以目傳故必詳於書梵以口傳如曲譜然書但識其大略華之讀别聲故就聲而借梵之讀别音故即音而借如史瑟同用者師史使瑟商音之和也帝嚲同用者低底帝嚲亦商音之和也娑薩同用亦商音之和誐孽同用是為角音之和論華梵中觀今七音韻鑑出自西域應絃七琴天籟所作故從衡正倒展轉成圖無非自然之文極是精微不比韻書但平上去入而已七音之學學者不可不究華有二合之音無二合之字梵有二合三合四合之音亦有其字華書惟琴譜有之葢琴尚音一音難可一字該必合數字之體以取數音之文二合者取二體也如娑作縛作二合娑縛則取縛之下體以合於娑而為字如囉作䭾作曩作三合囉䭾曩則上取囉中取䭾下取曩而為字如悉作底作哩作野亦作四合悉底哩野則取悉之上體以合於野之下體而包底哩為錯文不必具底哩故其字作然二合者是雙音合為單音也如雙為者焉單為旃雙為者與單為諸然則雙為娑縛單為索雙為娑嚲單為薩何不即一索足矣安用合娑縛一薩足矣安用合娑嚲哉曰華音論讀必以一音為一讀故雖者焉可以獨言旃雖者與可以獨言諸也梵音論諷雖一音而一音之中亦有抑揚高下故娑縛不可以言索娑嚲不可以言薩實有微引勾帶之状焉凡言二合者謂此音非一亦非二也言三合者謂此音非一非二亦非三也言四合者謂此音非一非二非三亦非四也但言二合者其音獨易言三合四合者其音轉難大抵華人不善音今梵僧咒雨則雨應咒龍則龍見頃刻之間隨聲變化華僧雖學其聲而無驗者寔音聲之道有未至也論華梵下梵人别音在音不在字華人别字在字不在音故梵書甚簡只是數个屈曲耳差别不多亦不成文理而有無窮之音焉華人苦不别音如切韻之學自漢以前人皆不識實自西域流入中土所以韻圖之學釋子多能言之而儒者皆不識起例以其源流出於彼耳華書制字極密㸃畫極多梵書比之實相遼邈故梵有無窮之音而華有無窮之字梵則音有妙義而字無文彩華則字有變通而音無錙銖梵人長於音所得從聞入故曰此方眞教體清淨在音聞我昔三摩提盡從聞中入有目根功悳少耳根功悳多之説華人長於文所得從見入故天下以識字人為賢智不識字人為愚庸通志卷三十五
