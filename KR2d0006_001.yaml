  text: 通志總目錄卷上别史類卷第一三皇紀太昊炎帝卷第二五帝紀帝少昊帝顓頊帝嚳帝堯帝舜卷第三上三王紀夏商卷第三下周卷第四秦紀秦卷第五上前漢紀髙祖惠帝髙后呂氏卷第五下文帝景帝武帝昭帝宣帝元帝成帝哀帝平帝卷第六上後漢紀光武明帝章帝和帝殤帝安帝卷第六下順帝沖帝質帝桓帝靈帝獻帝卷第七魏紀武帝文帝明帝齊王髙貴鄉公陳留王卷第八蜀紀先主後主卷第九呉紀孫堅策大帝㑹稽王景帝歸命侯卷第十上晉紀宣帝景帝文帝武帝惠帝懷帝愍帝卷第十下元帝明帝成帝康帝穆帝哀帝廢帝簡文帝孝武帝安帝㳟帝卷第十一宋紀武帝少帝文帝孝武帝前廢帝明帝後廢帝順帝卷第十二南齊紀髙帝武帝鬰林王海陵王明帝東昬侯和帝卷第十三梁紀武帝簡文帝元帝敬帝卷第十四陳紀武帝文帝廢帝宣帝後主卷第十五上後魏紀聖武帝神元帝思帝昭帝桓帝穆帝平文帝惠帝煬帝烈帝昭成帝道武帝明元帝太武帝文成帝獻文帝卷第十五下孝文帝宣武帝孝明帝孝莊帝節閔帝安定王孝武帝西魏文帝廢帝㳟帝東魏孝靜帝卷第十六北齊紀神武帝文襄帝文宣帝濟南王孝昭帝武成帝後主幼主附卷第十七後周紀文帝孝閔帝明帝武帝宣帝靜帝卷第十八隋紀文帝煬帝㳟帝卷第十九后妃傳前漢髙祖吕皇后戚夫人孝惠張皇后髙祖薄姬孝文竇皇后后兄長君弟少君孝景薄皇后孝景王皇后孝武陳皇后孝武衞皇后孝武尹倢伃邢夫人孝武鉤弋趙偼伃孝武李夫人孝昭上官皇后桀安衞太子史良娣史皇孫王夫人孝宣許皇后孝宣霍皇后孝宣王皇后孝元王皇后孝成許皇后孝成班倢伃孝成趙皇后孝元傅昭儀定陶丁姬孝哀傅皇后孝元馮昭儀中山衛姬孝平王皇后後漢公主附光武郭皇后光烈陰皇后明德馬皇后賈貴人章德竇皇后梁貴人和帝陰皇后和熹鄧皇后安思閻皇后順烈梁皇后虞美人陳夫人孝崇匽皇后桓懿獻梁皇后桓鄧皇后桓思竇皇后孝仁董皇后靈帝宋皇后靈思何皇后王美人姬𢎞農王獻帝伏皇后獻穆曹皇后魏武宣卞皇后文昭甄皇后文德郭皇后明悼毛皇后明元郭皇后蜀先主甘皇后先主穆皇后後主敬哀皇后後主張皇后呉孫破虜呉夫人呉景呉主權謝夫人謝承呉主權徐夫人徐琨呉主權歩夫人呉主權王夫人呉主權王夫人呉主權潘夫人孫亮全夫人孫休朱夫人孫和何姬孫皓滕夫人卷第二十晉宣穆張皇后景懷夏侯皇后景獻羊皇后文明王皇后武元楊皇后武悼楊皇后左貴殯葛胡貴嬪諸夫人惠賈皇后惠羊皇后謝夫人懷王皇太后元夏侯太妃元敬虞皇后荀豫章君明穆庾皇后成㳟杜皇后周太妃康獻禇皇后穆章何皇后哀靖王皇后廢帝孝庾皇后簡文宣鄭太后簡文順王皇后孝武文李太后孝武定王太后安德陳太后安僖王皇后㳟思禇皇后宋孝穆趙皇后孝懿蕭皇后武敬臧皇后武張夫人文章胡太后少帝司馬皇后文元袁皇后潘淑妃孝武昭路太后明宣沈太后孝武文穆王皇后宣貴妃前廢帝何皇后明㳟王皇后後廢帝陳太妃後廢帝江皇后順陳太妃順謝皇后齊宣孝陳皇后髙昭劉皇后武穆裴皇后蘭英文安王皇后鬱林王何妃海陵王王妃明敬劉皇后東昬禇皇后和王皇后梁文獻張皇后武德郗皇后武丁貴嬪武阮太后簡文王皇后元徐妃敬夏太后敬王皇后陳武宣章皇后文沈皇后廢帝王皇后宣柳皇后後主沈皇后張貴妃後魏神元竇皇后文帝封皇后桓惟皇后平文王皇后昭成慕容皇后獻明賀皇后道武慕容皇后道武宣穆劉皇后明元昭哀姚皇后明元宻杜皇后太武赫連皇后太武敬哀賀皇后景穆㳟郁久閭皇后文成文明馮皇后文成元李皇后獻文思李皇后孝文貞林皇后孝文廢馮皇后孝文幽馮皇后孝文昭髙皇后宣武順于皇后宣武髙皇后宣武靈胡皇后孝明胡皇后孝武髙皇后文帝文乙弗皇后文帝悼郁久閭皇后廢帝字文皇后㳟帝若干皇后孝靜髙皇后北齊神武明婁皇后蠕蠕公主郁久閭氏彭城爾朱太妃小爾朱氏上黨韓太妃馮翊鄭太妃髙陽游太妃馮娘李娘文襄敬元皇后琅邪公主文宣李皇后叚昭儀嬪王嬪薛孝昭元皇后武成胡皇后𢎞徳李夫人後主斛律皇后後主胡皇后後主穆皇后馮淑妃後周文元皇后文宣叱奴皇后孝閔元皇后明敬獨孤皇后武成阿史那皇后武李皇后宣楊皇后宣朱皇后宣陳皇后宣元皇后宣尉遲皇后靜司馬皇后隋文獻獨孤皇后宣華陳夫人容華蔡夫人煬愍蕭皇后卷第二十一年譜年譜序三皇五帝夏商周秦以上載稱世譜春秋以後始稱年譜卷第二十二七國秦末六國漢興諸王前漢後漢卷第二十三三國晉前凉成漢代東晉前趙後趙前燕蜀漢魏前秦後燕後秦西秦北魏後凉南凉北凉南燕西凉北燕夏卷第二十四宋齊梁北魏西魏東魏北齊後梁後周陳隋卷第二十五氏族序氏族目録總論十三篇卷第二十六以國為氏郡國附國古帝王氏姓周同姓國商周異姓周不得之國夏以前國漢夷狄之國郡國卷第二十七以邑為氏周邑邑魯邑邑晉邑邑衞邑邑鄭邑齊楚宋韓魏邑國趙邑漢秦邑諸邑魏邑以鄉為氏以亭為氏以地為氏所居附以姓為氏氏附以字為氏周人字魯人字晉人字人衛人字國鄭人字陳宋人字楚齊人字邾字諸人字人字人字字秦人附卷第二十八以名為氏古天子名人帝王名人古人名人周人名魯名晉名鄭名人呉人名人衛人名國齊人名名楚人名名宋名諸人名字未辨夏以次為氏親附以族為氏夷狄大姓以官為氏以爵為氏以凶德為氏以吉德為氏以技為氏以事為氏以諡為氏卷第二十九以爵系為氏以國系為氏以族系為氏以名氏為氏國邑鄉附以國爵為氏邑爵附以邑系為氏邑官附以官名為氏官氏附以邑諡