body:
  text: 通志卷三十宋右廸功郎鄭樵漁仲撰氏族畧第六同名異實第一唐氏有二堯之後為唐周以封晉此晉之唐也伊祁姓燮父之後封于唐為楚所并此楚之唐也姬姓虞氏有二姚姓之虞舜後也姬姓之虞仲雍之後也夏氏有二夏后之後以國為氏陳宣公之子子夏之後以字為氏商氏有二成湯之後為商衛鞅封商君其後亦為商周氏有五后稷之後為周氏又姬氏唐先天中避諱改為周氏又暨氏上元中准制改為周氏又代北賀魯氏普氏後魏並改為周氏秦氏有三秦國為秦氏魯有秦邑亦為秦氏秦非是也楚又有秦商燕氏有二有姬姓之燕有姞姓之燕管氏有二叔鮮之後以國為氏出自文王又齊管仲出自穆王畢氏有二畢公髙之後為畢後魏出連氏改為畢于氏有三周武王之子邘叔之後或去邑為于氏後魏萬紐于氏改為于又淳于氏避唐諱改為于胡氏有二周之胡國為胡氏後魏紇骨氏亦為胡氏齊氏有二太公之後以國為氏衛大夫齊子之後以字為氏楚氏有二鬻熊之後以國為氏魯林楚之後以名為氏陳氏有四舜之後以國為氏也又白氏隋初改為陳此萬年之陳也又魯相無子以外孫劉矯嗣此廣陵之陳也又侯莫陳之後亦改為陳氏朱氏有三邾子之後去邑為朱又渇燭渾氏可朱渾氏並改為朱婁氏有二邾婁之後也又疋婁氏改為婁氏兒氏有二郳氏去邑為兒又賀兒氏亦改為兒越氏有三句踐之後以國為氏又有越彊氏改為越氏又有越質詰氏改為越氏薛氏有三奚仲之後以國為氏又叱干氏改為薛又有遼西薛氏沈氏有二沈子逞之後以國為氏又楚荘王之子公子正封於沈鹿其後以邑為氏徐氏有二若木之後以國為氏又一族出於黄帝十四姓云氏有二䢵國之後去邑為云又後魏牒云氏改為云禹氏有二鄅國去邑為禹又夏禹之後以名為氏宿氏有二風姓之後以國為氏又有宿六斤氏改為宿羅氏有二妘姓之後以國為氏又有叱羅氏改為羅夔氏有二熊摯之後以國為氏又天竺亦有夔氏夷氏有四昔詭諸之後為夷氏又逸民夷逸齊大夫夷仲年邾大夫夷射姑之後皆以名字為氏湏氏有二宻須之後為須須句之後亦為須黎氏有三子姓之後以國為氏又齊大夫黎彌黎且以邑為氏又後魏素嵇氏改為黎氏申氏有二姜姓之後以國為氏又楚之申邑申公居之以邑為氏向氏有二祁姓之後以國為氏又宋公子肹字向以字為氏葛氏有三嬴姓之後以國為氏又葛天氏之後亦為葛氏後魏賀葛氏改為葛會氏有二鄶國去邑為氏又會乙之後亦為會氏辛氏有三莘氏訛為辛又計然本姓辛又周有項亶賜姓辛氏呂氏有五姜姓之後以國為氏又晉有呂氏出於魏氏又有叱邱氏副呂氏叱呂氏並改為呂譚氏有二子爵以國為氏又巴南六姓有譚氏冀氏有二冀國之後以國為氏晉滅冀以為邑郄氏食之為冀芮子孫以邑為氏鬲氏有二有鬲之國以國為氏又商人膠鬲以名為氏顧氏有二顧國夏商諸侯也又句踐之後别封顧余以邑為氏共氏有三共者商之侯國也其後以國為氏鄭公子叚曰共叔晉太子申生曰共君並以諡為氏龔氏有三恭國籕書作龔又晉大夫龔堅之後也又漢巴郡蠻酋有龔氏洪氏有三共氏改為洪氏又豫章𢎞氏避唐孝敬皇帝諱改為洪彭氏有二大彭之國為彭氏祝融之後八姓亦有彭氏者祭氏有二周公之後以國為氏又鄭有祭邑祭仲足其後也毛氏有二毛伯聃之後以國為氏又有北代之族世為酋長劉氏有五堯之後有劉累為劉氏成王封王季之子於劉邑亦為劉漢賜項氏婁氏並為劉氏又匈奴之族從母姓劉欒氏有二晉欒賔之後姬姓也以邑為氏齊子欒之後姜姓也以字為氏荀氏有二荀本侯國也又晉荀林父以邑為氏丙氏有二邴豫之後或去邑作丙又李陵降匈奴裔孫歸魏見丙殿因賜氏焉蒍氏有二薳章之後亦作蒍以邑為氏晉士蒍之後以字為氏裴氏有二秦非子支孫封裴鄉以鄉為氏又西域有裴氏孫氏有三衛公子恵孫之後以字為氏又楚有芈姓之孫齊有媯姓之孫皆以字為氏南氏有三衛公子郢字子南其後為南氏又楚有子南氏亦為南氏並以字為氏者晉有南氏以鄉為氏國氏有二鄭子國之後以字為氏姬姓也齊有國氏姜姓也孔氏有三宋孔父嘉之後也又衛有孔氏為世卿鄭亦有孔氏皆以字為氏者董氏有二董父之後以字為氏又有陸終之子参胡姓董以姓為氏成氏有二楚若敖之後以字為氏又周有成氏孟氏有二魯慶父之後為孟氏又衛公孟縶之後亦為孟氏仲氏有二魯慶父曰共仲之後為仲氏又宋荘公之子子仲之後亦為仲氏叔氏有四魯叔牙之後魯文公之子叔肹之後八凱叔達之後晉叔向之後並以叔為氏季氏有二魯公子季友之後也又陸終之子季連亦為季氏伯氏有二晉中行伯之後也或言伯益之後亦為伯氏士氏有二隰叔為晉士師以官為氏又有士季氏之後以字為氏山氏有二烈山氏以山為氏而周有山師之官以官為氏王氏有四有姬姓之王有媯姓之王有子姓之王有邊姓之王姬姓之王有二族媯姓之王有一族子姓之王有一族邊姓之王有四族任氏有三黄帝二十五子得姓為任者其後以姓為氏又顓帝少子陽封於任其後以國為氏又任為風姓之國太昊之後也亦以國為氏偃氏有二有偃氏之國後為偃氏又臯陶之後姓偃亦以姓為氏宣氏有二魯叔孫僑如諡宣伯與宋宣公之後並以諡為氏稷氏有二后稷之後有稷氏漢稷嗣君叔孫通支孫亦為稷氏改氏第二婁氏項氏漢並賜劉氏酈食其曽孫漢賜以食其為氏元孫武平帝時為侍中復改侍其晉州稽胡晉初賜呼延氏項氏後周賜辛氏獨孤屯本姓李從齊神武沙苑戰敗為柱國獨孤信所擒配為士伍賜獨孤氏章仇秃髪氏歸後魏太武賜源氏章仇大翼隋焬帝賜盧氏唐傅遊藝賜武氏唐徐氏以勣邴氏以元紘安氏以抱玉杜氏以伏威胡氏以大㤙𢎞氏以播郭氏以子和麻氏以延昌鮮于氏以叔眀安氏以元諒張氏以寶臣阿希布氏以懐遜阿跌氏以光進舍利氏以奉國董氏以忠臣羅氏以徳雋以藝朱邪氏以國昌並由立功賜李氏從國氏也桓庭昌唐上元准制改為姜暨佐時唐上元准制改為周媯氏改為姚氏袁氏改為衡氏裴氏改為壘氏羊舌氏改為吉氏姞氏改為羊氏閭氏改為盧氏辛氏改為計氏鐡伐氏赫連勃勃以其本宗支庶非正統並為鐡伐氏氏氏孔融謿氏儀以氏字民無上遂改為是氏梁鴻氏改為運期氏馬夭氏改為馬官氏渾沌氏改為屯氏去水屈全之裔孫仕後魏以自南方乃加南或作男謝服為鴻臚卿後漢末出征嫌其名姓不祥乃改為射咸京房本姓李吹律定姓改為京氏改惡氏第三蕭氏齊武帝以巴東王子響叛逆改為蛸氏馬氏以何羅逆誅馬后惡之改為莽氏梟氏隋焬帝誅楊元感改為梟氏勃氏梁武帝改豫章王綜為勃氏黥氏淮南王英布少時以罪被黥遂為黥氏蝮氏唐乾封元年改武惟良為蝮氏劉誕謀逆貶為留氏漢魏受氏第四臣謹按成周以國命氏漢則稱郡國者亦有之楚元王交之子劉富初封休侯更封紅侯其後遂為紅氏楚懐王孫心都郴其後遂為郴氏番音婆氏因呉芮封番君支孫氏焉櫟陽氏後漢景丹封櫟陽侯曽孫分避亂隴西因封為氏周陽氏漢淮南王舅趙兼封周陽侯子由為河東尉因封為氏東陵氏因邵平之封子孫遂以為氏廣武氏因李左車之封子孫遂以為氏冠軍氏者因霍去病之封也信都氏者因張敖之封也武彊氏者因後漢王梁之封也蘄氏者姓苑云蘄春侯之後鄮氏者姓纂云越人以郡為姓今眀州鄮縣是也如此之類是為以郡命氏者也春秋之時冀芮居冀地潁考叔居潁谷介之推燭之武並以地命氏者漢四皓亦然如綺里季居於綺里也其後有綺氏亦有綺里氏甪里先生居於甪里也其後有甪氏亦有甪里氏少康之後漢初徙居嵇山遂為嵇氏後漢鮭陽鴻為少府居鮭陽遂為鮭氏鮭音圭如此之類漢亦多矣是為以地命氏者也成周以邑命氏漢魏亦有之掲陽氏者因漢功臣安道侯掲陽定為掲縣令因氏焉泉氏因全琮之孫暉魏封南陽侯食封白水遂改為泉氏如此之類是為以邑命氏者也三代之時貴者有氏賤者有名無氏按漢郊祀志汾隂人無錦粤人勇之是亦有名無氏者葢錦為工技之賤勇之為粤人之賤也臣謹按亡氏之賤漢猶有之受氏之道漢魏猶𫝊略載一二以備考古漢魏之後無所聞惟用古姓氏耳變姓第五賀魯之為周賀葛之為葛是婁之為髙叱盧之為祝口引之為冠如稽之為緩去斤之為艾是賁之為封叱奴之為狼吐難之為山古引之為侯出連之為畢乞扶之為扶那婁之為婁是連之為連俟畿之為俟可單之為單紇骨之為骨沓盧之為沓莫干之為郃屈突之為屈俟亥之為亥俟畿之為畿賀兒之為兒叱利之為利叱李之為李柯抜之為柯叱羅之為羅那莫之為莫莫輿之為輿費連之為費費羽之為羽黜弗之為弗莫盧之為盧爾綿之為綿解毗之為解竒斤之為竒統萬之為萬統嵇之為嵇安遲之為安輾遲之為展馝邘之為邘如羅之為如薄奚之為古若干之為茍昝盧之為昝姒先之為姒渇侯之為紙拔略之為蘓紇干之為干乙弗之為乙歩鹿之為歩屋引之為房車焜之為車普周之為周髙護之為李茙眷之為茙又為眷莫蘆之為蘆或為盧邱林之為林又為邱邱敦亦為邱副呂之為副又為呂叱邱亦為呂就賴之為就莬賴亦為就温狐之為温温盆亦為温阿伏之為阿阿賀亦為阿紇單之為紇紇奚亦為紇羽真之為髙楚婁亦為髙是云之為是是奴亦為是葢婁之為婁疋婁亦為婁俟力之為鮑俟力代亦為鮑烏丸之為桓阿鹿桓亦為桓可地之為延可地延亦為延俟奴之為俟俟伏斤亦為俟費羽之為羽拂羽亦為羽黜弗之為弗燕弗亦為弗鐡弗亦為弗吐門之為門叱門亦為門庫門亦為門拓跋之為元紇骨亦為元是云亦為元景氏亦為元阿單之為單渇單亦為單悉雲之為雲宥連亦為雲賀蘭之為賀賴氏亦為賀右二字變姓吐谷渾之為渾俟呂隣之為呂没鹿回之為竇紇豆陵亦為竇萬紐于之為于勿忸于亦為于斛瑟羅之為羅破多羅亦為羅温石蘭之為石烏石蘭亦為石又為烏歩六孤之為陸邱穆陵之為穆阿伏干之為阿普陋茹之為茹㧞烈蘭之為梁烏落蘭之為蘭宿六斤之為宿庫若干之為干扈地干之為扈俟伏斤之為斤地駱拔之為駱郁原甄之為甄若口引之為冠破多羅之為潘破落郍之為郍歩鹿如之為鹿阿史郍之為史没路真之為路譬歴辰之為辰紇突隣之為隣骨咄祿之為禄大利稽之為郃俟力代之為俟大洛稽之為稽俟伏斤之為伏壹㪷眷之為明歩鹿斤之為歩獨孤渾之為杜庫傉官之為庫奚什盧之為盧渇燭渾之為朱莫胡盧之為陽右三字變姓臣謹按代北之人隨後魏遷河南者後魏獻帝為之定姓為複姓或為三字姓或為四字姓其音多似西域梵書有二合三合四合者皆指一字之音故孝文姓氏改易别以音義皆改為單字之姓又孝文詔南遷者死不得還即葬洛陽故别姓皆在河南又按其書曰河南官氏志者葢優代北之人随後魏南遷因作其書而為之志又按孝文之時咸改單姓惟賀若氏不改及乙旃氏改為叔孫拔拔氏改為長孫變氏姓第六閻慶之為大野氏辛威之為普屯氏韓裒之為俟吕隣氏李弼之為徒何氏田𢎞之為紇干氏王雄之為可頻氏王熊之為柘王氏蔡氏之為大利稽氏隂氏之為邱目陵氏張氏之為叱羅氏周氏之為車非氏南氏之為宇文氏臣謹按後周宇文氏以其起於邊人故欲改易姓氏以是為貴也然官制一遵三代而姓氏用邊人何相反之如是别族第七魯季氏自季孫行父以至季孫彊大宗也故稱季孫如季公鳥季子差季寤之類但稱季者所以别支庶叔氏之大宗亦稱叔孫其支庶稱叔仲氏又曰仲壬孟丙亦是也仲氏之大宗亦稱仲孫氏其支庶則稱南宫氏南氏子服氏臧氏之大宗稱臧氏至於臧㑹氏臧文氏皆支庶之别系其所自出之祖傅餘氏者傅氏餘子之族也韓餘氏者韓氏餘子之族也褐餘氏褐冠氏餘子之族也成湯之後為殷氏又有北殷氏后稷之後為周氏又有西周氏又有周生氏舒氏之族見於當時者一曰舒二曰羣舒三曰舒蓼四曰舒庸五曰舒鳩六曰舒鮑斟氏之族見於當時者一曰斟二曰斟鄩三曰斟灌四曰斟弋五曰介斟荀氏之族見於後世者有田氏有程氏有輔氏有智氏田氏之族見於後世者有第二有第五有第八顓臾之族三有顓臾有去臾為顓有去顓為臾宻須之族三有宻湏有去須為宻有去宻為湏葛氏居於諸邑者為諸葛里氏居於相城者為相里避諱第八宋以武公名司空改為司城氏晉以僖侯名司徒改為中軍氏籍氏避項羽諱改為席氏奭氏避漢元帝諱改為盛氏荘氏避漢明帝諱改為嚴氏慶氏避漢安帝父諱改為賀氏師氏避晉景帝諱改為帥氏姬氏避唐明皇諱改為周氏𢎞氏避唐孝敬皇帝諱改為洪氏淳于氏避唐憲宗諱改為于氏啖氏避唐武宗諱改為澹氏敬氏避宋諱改為文氏又為恭氏恒氏避宋諱改為常氏音訛第九陳氏為田氏韓氏為何氏莘氏為辛氏黨氏為掌氏歐氏為區氏戴氏為載氏蠻氏為暪氏虢氏為郭氏吕氏為甫氏郯氏為談氏姒氏為似氏苦氏為庫氏雷氏為盧氏恭氏為共氏共氏為洪氏王孫賈之後亦為古孫氏者賈近於古故也苦成子以成子食苦邑故以為氏後訛為古成又為庫成慕容氏為慕輿氏賀遂氏為賀恱氏夫餘氏為鳬臾氏吾邱氏為虞邱氏母邱氏為曼邱氏申徒氏為申屠氏鄫氏為繒氏穆氏為繆氏簡雍本姓耿幽州人以耿為簡遂為簡氏省文第十鄣之為章邴之為丙郲之為來鄟之為專鄩之為尋邵之為召郈之為后鄶之為會鄅之為禹䢵之為云鄫之為曽郳之為兒邾之為朱郕之為成郇之為荀去邑橋之為喬去木理之為里去王譚之為覃去言熊之為能去火省言第十一盧蒲之為盧閭邱之為閭即墨之為即鍾離之為鍾馬服之為馬褚師之為褚毋邱之為毋司冦之為寇宗伯之為宗褐冠之為冠主父之為主避仇第十二端木賜之後改為木氏又為沐氏墨台之後改為墨氏又改為怡氏刁氏之後改為伍氏之後改為五巴氏之後改為杷鞠氏之後改為麴譚氏之後改為覃仇氏之後改為求銅鞮氏之後改為遆馝邘氏之後改為邘滕氏之後改為騰秣氏之後改為末陸氏之後改為褥郜氏之後改為浩胙氏之後改為作把氏之後改為抱樓氏之後改為葢薛氏之後改為蘖棘氏之後改為棗凡氏之後改為汎鮮卑氏之後改為庫狄圈氏去口為卷氏章氏避仇為章仇氏䟱氏避王莽之難去足為束又云䟱廣之曽孫彦避王莽於太原改為太傅牛金之子逃難改為牢又改尞後又為牛氏臣謹按避仇之説多非或省文或訛音何必為避仇也據皇甫謐云凡氏遭秦亂避地添水為汎氏此何所憑哉凡氏者凡伯之後以國為氏汎者周之邑也其大夫食采於此其後之人以邑為氏自是兩家源流應知避地改姓之説多附會然䟱廣之後為束為太傅牛金之後為牢為尞此又為避地之事眀矣生而有文第十三武氏唐元和姓纂云周平王少子生而有文在手曰武遂以為氏南氏姓源韻譜云盤庚妃姜氏夢龍入懐孕十二月而生手把南字長封荆州號南赤龍鮮于氏鮮于血脉譜云子仲之子曰文生而有文在手左曰魚右曰羊及長封漁陽為燕附庸閻氏唐表云昭王少子生而有文在其手曰閻康王封於閻城臣謹按左氏謂季友生而有文在其手曰友因以命之每疑其誕也後人由此復廣其道焉且武氏者以諡為氏南氏者以字為氏鮮于者武王封箕子於朝鮮支子仲食采於于故有鮮于氏閻氏者武王封太伯曽孫仲奕於閻郷故有閻氏安得無稽之言流於後世太抵氏族之家言多誕博雅君子不可不審通志卷三十
