body:
  text: 通志卷一百五十三宋右迪功郎鄭樵漁仲撰列傳第六十六北齊封隆之子子繪孝子繡隆弟子孝琬孝琬弟琰之族父述李元忠子搔搔從姊法行繪元忠從祖弟渾渾弟繪弟緯崔暹子達拏崔㥄子贍仲㥄弟子仲文弟子侃侃弟子約孫騰高隆之司馬子如兄子膺之薛琡楊愔燕子獻鄭頤陽休之從祖弟斐斐從叔昭李稚廉李翥王昕弟晞皓崔昻崔季舒高德正尉瑾封隆之字祖裔小名皮勃海蓨人也父回魏殿中尚書莊帝初河隂遇害隆之性寬和有度量起家奉朝請延昌中道人法慶作亂冀方自號大乘衆五萬餘隆之以開府中兵參軍與大都督元遙往討之隆之擒獲法慶賜爵武城子爾朱兆據晉陽魏朝以河內要衝除隆之龍驤將軍河內太守屬爾朱兆入洛莊帝幽崩隆之以父回殞於爾朱氏常懷報雪因此遂持節東歸圗為義舉時高乾告隆之曰爾朱暴逆禍加至尊弟與兄等荷先帝殊眷豈不出身為主以報讎雪恥乎隆之對曰國恥家怨痛入骨髓乘機而動今實其時遂與乾定計夜襲冀州城尅之乾以隆之素為鄉里所信乃推為刺史隆之盡心慰撫衆情感悅尋聞神武自晉陽東出隆之遣子子繪奉迎於滏口神武嘉之既至信都集諸州郡督將僚吏等定議討爾朱氏隆之深贊之中興初拜驃騎將軍吏部尚書神武將擊爾朱兆等於韓陵留隆之鎮鄴城爾朱敗走召為侍中進位儀同三司封安德郡公于時朝議以爾朱榮冝配食眀帝廟庭隆之議曰榮為人臣親行弒逆安有害人之母而與子對食之理考古詢今未見其議詔隆之參議麟趾閣以定新制又贈其妻祖氏范陽郡君隆之表以先爵富城子及武城子轉授弟子孝琬等朝廷嘉而從之後為斛斯椿等構之於帝逃歸鄉里神武知其誣召赴晉陽天平初復入為侍中預遷都之議孝靜詔為侍講除吏部尚書元象初除冀州刺史加開府纍遷尚書右僕射及北豫州刺史高仲密將叛隂通消息於冀州豪望使為內應輕薄之徒頗相扇動詔隆之馳驛慰撫遂得安靜文襄密與隆之書云仲密枝黨同惡向西者宜悉收其家纍以懲將來隆之以為恩旨既行理無退改今若收治示民不信脫或警擾所虧益大乃啓神武事遂得停隆之自神武唱義首參經略竒謀祕策密以聞啓手書削藁罕知於外以本官為齊州刺史卒贈司徒神武以隆之勳追榮未盡復啓贈太保諡宣懿神武後至冀州北境次於交津追憶隆之顧謂司馬子如曰封公自出納軍國垂二十年契闊艱難始終如一以其忠信可憑方以後事託之何期報善無期奄從物化言念忠賢良可痛惜為之流涕令以太牢祭焉隆之歷事五帝以謹素見知凡四為侍中再為吏部尚書一為僕射四為冀州刺史每臨冀部州中舊齒咸曰我封公復來其得物情如此子子繪嗣子繪字仲藻小名搔性和理有器局釋褐祕書郎纍遷平陽太守加散騎常侍晉州北界霍山舊號十里徑者山坂高峻每大軍往來士馬勞苦子繪請於舊徑東谷别開一路神武從之仍令子繪修開旬日而就徵補大行臺吏部郎中神武崩祕未發喪文襄以子繪為勃海太守執其手曰誠知未允勳臣官望但須鎮撫且衣錦晝遊古人所貴冝善加經略不勞習常太守向州參也仍聽收集部曲一千人大寧三年為都官尚書高歸彥作逆命子繪參贊軍事事平敕子繪權行州事徵拜儀同三司右僕射卒諡曰簡子寶蓋襲子繪弟子繡位霍州刺史陳將吳明徹侵淮南子繡城陷送揚州齊亡後逃歸終於通州刺史子繡外貌儒雅而使氣難犯兄女壻司空婁定逺為瀛州刺史子繡為勃海太守定逺過之對妻及諸女宴集言戲微有褻慢子繡鳴鼓集衆將攻之定逺免冠拜謝久之乃釋隆之弟興之字祖胄經明行修恬素清靜位瀛冀二州刺史平北府長史所歷有當官譽卒以隆之佐命功贈殿中尚書雍州刺史諡曰文子孝琬字士蒨七歲而孤為隆之鞠養慈愛甚篤隆之啓以父爵富城子授焉位東宫洗馬卒贈太府少卿孝琬性恬靜頗好文詠太子少師邢邵七兵尚書王昕並先達高才與孝琬年位懸隔晚相逢遇分好遂深孝琬靈櫬言歸二人送於郊外悲哭悽慟有感路人孝琬弟孝琰字士光少修飾學尚有風儀位祕書丞散騎常侍聘陳使主在道遙授中書侍郎還坐受魏收囑牒其門客從行事發付南都獄決鞭二百除名後除并省吏部郎中南陽王友赴晉陽典機密和士開母喪託附者咸往奔哭鄴中冨商丁鄒嚴興等並為義孝有一士人亦在哭限孝琰入弔出謂人曰嚴興之南丁鄒之北有一朝士號呌甚哀聞者傳之士開知而大怒其後會黃門郎李瓌奏南陽王綽驕恣士開因譖之曰孝琰從綽出外乘其副馬捨離部伍别行戲語時孝琰女為范陽王妃為禮事因假入辭帝遂決馬鞭一百放出又遣高阿那肱重決五十幾死還鄴在集書省上下自此沈廢士開死後為通直散騎常侍後與周和好以為聘周使副祖珽輔政奏入文林館撰御覽孝琰文筆不高但以風流自立善談戲威儀間雅容止進退人皆慕之以祖珽好自矜大佞之云是衣冠宰相異於常人近習聞之大以為恨尋以本官兼尚書右丞其所彈射多承意旨時有道人曇獻者為皇太后所幸賞賜隆厚車服過度又乞為沙門統後主意不許但太后欲之遂得居任然後主嘗憾焉因僧尼他事訴者辭引曇獻上令有司推劾孝琰案其受賄致於極法其家珍異悉以沒官由是正授右丞仍奏門下事性頗簡傲不諧時俗意遇漸高彌自矜誕舉動舒遲無所降屈識者鄙之與崔季舒等以正諫同死子君確君靜二人徙北邊少子君嚴君贊下蠶室南安敗君確等二人皆坐死興之弟延之字祖業少明辨有世用封郯城子位青州刺史多所受納後行晉州事沙苑之敗延之棄城北走以隆之故免其死卒贈尚書左僕射司徒公諡文恭子纂嗣隆之族父述字君義父軌魏廷尉少卿述有幹用天平中為三公郎中時增損舊事為麟趾新格其名法科條皆述所刪定齊受禪纍遷大理卿清河三年敕與録尚書趙彥深僕射魏收尚書陽休之國子祭酒馬敬德等議定律令歷位度支五兵殿中三尚書述久為法官明解律令議斷平允深為時人所稱而厚積財産一無分饋雖至親密友貧病困篤亦絶於拯濟朝廷物論甚鄙之外貌方整而不免請謁回避進趣頗致嗤駭前妻河內司馬氏一息為娶隴西李士元女大輸財聘及將成禮猶競懸違述忽取所供養像對士元打像為誓士元笑曰封公何處嘗得應急像須誓便用一息娶范陽盧莊之女述又經府訴云送騾乃嫌腳跛評田則云鹵薄銅器又嫌古廢皆為財賄所及每致紛紜子元蒨位太子舍人述弟詢字景文窺涉經史頗以清素自持位尚書左丞濟南太守歷官皆有幹局才具臨郡甚著聲績隋開皇中卒李元忠趙郡平棘人也曾祖靈魏洛州刺史巨鹿公祖恢長安鎮副將贈定州刺史父顯甫豪俠知名集諸李數千家於殷州西山開李魚川方五六十里居之顯甫為其宗主以軍功賜爵平棘子位河南太守贈安州刺史諡曰安元忠少厲志操粗覽書史及陰陽術數有巧思居喪以孝聞襲爵平棘子魏清河王懌為營明堂大都督引為主簿遭母憂去任歸李魚川嘗亡二馬既獲盜即以與之在母喪哭泣哀動旁人而飲酒騎射不廢曰禮豈為我初元忠以母多患專心醫藥遂善方伎性仁恕無貴賤皆為救療家素冨在鄉多有出貸求利元忠焚契免責鄉人甚敬之孝莊時盜賊蜂起清河有五百人西戍還經南趙郡以路梗共投元忠奉絹千餘匹元忠唯受一匹殺五牛以食之遣奴為導曰若逢賊但道李元忠遣如言賊皆舍避及葛榮起元忠率宗黨作壘以自保坐於大槲樹下前後斬違命者凡三百人賊至元忠輒却之葛榮曰我自中山至此連為趙李所破則何以能成大事乃悉衆攻圍執元忠以隨軍賊平就拜南郡太守好酒無政績及莊帝幽崩元忠棄官潛圗義舉會神武東出元忠便乘露車載素筝濁酒以奉迎神武聞其酒客未即見之元忠下車獨坐酌酒擘脯食之謂門者曰本言公能招延俊傑今聞國士到門不能吐哺輟洗其人可知還吾刺勿復通也門者以告神武遽見引入觴再行元忠取筝鼓之長歌慷慨歌闋謂神武曰天下形勢可見明公猶欲事爾朱乎神武曰富貴皆由他安敢不盡節元忠曰非英雄也高乾雍兄弟曾來未是時高乾雍已見神武紿曰從叔輩粗何肯來元忠曰雖粗並解事神武曰趙郡醉使人扶出元忠不肯起孫騰進曰此君天遣來不可違也神武乃復留與言元忠慷慨流涕神武亦悲不自勝元忠進從橫之策深見嘉納又謂神武曰殷州小無糧仗不足以濟大事冀州大蕃若向冀州高乾雍兄弟必為明公主人殷州便以賜委冀殷合滄瀛幽定自然弭從唯劉誕黠胡或當乖拒然非明公之敵神武急握元忠手而謝焉時殷州刺史爾朱羽生阻兵據州元忠聚衆與大軍禽斬之神武即令行殷州事纍遷太常卿殷州大中正後以從兄瑾年長以中正讓之魏孝武納神武女為后詔元忠致聘於晉陽每宴席論舊事元忠曰昔日建義轟轟大樂比來寂寞無人問更欲覔建義處神武撫掌笑曰此人逼我起兵賜白馬一匹元忠戲曰若不與侍中當更覔建義處神武曰建義不慮無止畏如此老翁不可遇耳元忠曰止為此翁難遇所以不去因捋神武鬚大笑神武悉其雅意深重之後神武奉送皇后仍田於晉澤元忠馬倒良久乃蘇神武親自撫視封晉陽縣伯後為光州刺史時州境災儉人皆菜色元忠表求賑貸被報聽用萬石元忠以為少遂出十五萬石賑之事訖表陳朝廷嘉而不責徵拜侍中元忠雖處要任初不以物務干懷唯以聲酒自娛大率常醉家事大小了不關心園庭羅種果藥親朋尋詣必留連宴賞每挾彈攜壺遊遨里閈每言寧無食不可使我無酒阮步兵吾師也孔少府豈欺我哉後自中書令復求為太常卿以其有音樂而多美酒故神武欲用為僕射文襄言其放逹常醉不可委以臺閣其子搔聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射時宜勿飲酒每言於執事云年漸遲暮乞在間冗以養餘年乃除驃騎大將軍儀同三司曾貢文襄玉蒲桃一盤文襄報以百縑其見賞重如此孫騰司馬子如嘗詣元忠逢其方坐樹下葛巾擁被對壺獨酌庭室蕪曠使婢卷兩褥以質酒肉呼妻出衣不曵地二公相視歎息而去大餉米絹受而散之俄復以本官領衛尉卿卒有米三石酒數斛書籍藥物充滿架篋未及賻至以金蟬質絹乃得斂焉贈司徒諡曰敬惠初元忠將仕夢手執炬入其父墓中夜驚起甚惡之旦告其受業師師占云大吉可謂光照先人也竟如其占性甚工彈彈桐葉嘗出一孔擲棗栗而彈之十中七八嘗從文襄入謁靜帝有梟鳴殿上文襄命元忠彈之問得幾丸而落對曰一丸奉至尊威靈一丸承大將軍意氣兩丸足矣如其言而落之子搔嗣搔字德沈少聰明有才藝曽採諸聲别造一器號曰八絃時人稱有思理武定末自丞相記室除河內太守居數載流民盡復代至將還都父老號泣追送二百餘里生為立碑終於儀曹郎從姊曰法行幼好道截指自誓不嫁遂為尼所居去鄴三百里往來恆步在路或不得食飲水而已逢屠牽牛脫衣求贖泣而隨之雉兔馴狎入其山居房室齊亡後遭時大儉施糜粥於路異母弟宗侃與族人孝衡爭地相毁尼曰我有地二家欲得者任來取之何為輕致忿訟宗侃等慙遂讓為間田元忠從祖弟渾字季初祖綜行河間郡早卒父遵字良軌有業尚為魏冀州征東府司馬京兆王愈冀州起逆遵遇害贈幽州刺史諡曰簡渾以父死王事除給事中時四方多難仍謝病求為青州征東府司馬與河間邢邵北海王昕俱奉老母攜妻子同赴青齊未幾而爾朱榮入洛衣冠殲盡論者以為知幾時河北流移人聚青土衆踰二十萬共劫河間邢果為主起自北海襲東陽青州刺史元世俊欲謀誅之府人遂猜二渾乃與長史崔光韶具陳禍福由是軟血而盟上下還睦普泰中崔社客反於海岱攻圍青州詔渾為都官尚書東北道行臺赴援社客宿將多謀詐諸城各自保固堅壁清野時議有異同渾曰社客賊人之根本烏合之衆易離若揀練驍勇銜枚夜襲咄嗟之間便可禽殄如社客就禽則諸郡可傳檄而定諸將遲疑渾乃決行未明達城下賊徒驚散生禽社客斬首送洛海隅清定以功授光祿大夫天平初丁母憂行喪冢側殆將滅性武定初兼散騎常侍聘梁使主梁武謂之曰伯陽之後久而彌盛趙李人物今實居多常侍曾經將領今復充使文武不墜良屬斯人使還為東郡太守以贓賄徵還文襄使武士提以入置諸庭渾抗言曰將軍今日猶自禮賢邪文襄笑而舍之天保初除太子少保時邢邵為少師吏部尚書楊愔為少傅論者榮之以參禪代儀注賜爵涇陽縣男文宣以魏麟趾格未精詔渾與邢邵崔㥄魏收王昕李伯倫等修撰渾嘗謂魏收曰雕蟲小技我不如卿國典朝章卿不如我尋除海州刺史土民反共攻城城中多石無井常汲於外賊絶其路城內先有一池時旱久涸渾齋戒朝服祈請俄而天雨泉流涌溢賊皆駭散渾捕斬其渠帥傳首鄴都後以妾在州納賄坐免官卒于鄴子湛字處元涉獵文史有家風為太子舍人兼通直散騎常侍聘陳使副襲爵涇陽男渾與弟繪緯俱為聘梁使主湛又為使副是以趙郡人士目為四使之門繪字景文年六歲便求入學家人以偶年俗忌弗許繪輒竊其姊筆牘用之未踰晦朔遂通急就章內外異之及長儀貌端偉神情爽俊繪舅河間邢晏與繪清言歎其高逺謂若披雲霧如對珠玉宅相之寄良在此甥時敕祕書監常景選儒學十人緝撰五禮繪與太原王義同掌軍禮魏靜帝於顯陽殿講孝經禮記繪與從弟騫裴伯荗魏收盧元明等俱為録議繪素長筆札尤能傳受緝綴詞義簡舉可觀歷中書侍郎丞相司馬每霸朝文武總集對揚王庭繪嘗先發言端為羣僚之首音辭辨正風儀都雅聽者悚然文襄益加敬異又掌儀注武定初兼常侍為聘梁使主梁武問繪高相今在何處黑獺若為形容高相作何經略繪曰黑獺遊魂關右人神厭毒連歲凶災百姓懷土丞相竒略不世畜鋭觀時攻昧取亡勢必不逺梁武稱善繪與梁人泛言氏族袁狎曰未若我本出自黃帝姓在十四之限繪曰兄所出雖逺當近車千秋分一字耳一坐皆笑前後行人皆通啓求市繪獨守清尚梁人重其廉潔使還拜平南將軍高陽內史郡境舊有三虎民常患之繪欲修檻遂因鬬俱死咸以為化感所致皆請申上繪曰虎因鬬而斃自是偶然貪此為功人將窺我竟不聽高陽舊多陂淀繪至後淀水皆涸乃置農正專主勸課墾田倍增家給人足瀛州三郡人俱詣州請為繪立碑于郡街神武東巡郡國在瀛州城西駐馬久立使郎中陳元康喻慰之曰孤在晉陽知山東唯卿一人用意及入境觀風信如所聞但善始令終將位不次河間守崔諶恃其弟暹勢從繪乞麋角鴿羽繪答書曰鴿有六翮飛則沖天麋有四足走便入海下官膚體踈懶手足遲鈍不能近追飛走逺事佞人是時文襄使暹選司徒左長史暹薦繪既而不果咸謂由此書及文襄嗣業普代山東諸郡其特降書徵者唯繪與清河太守辛術二人而已至補大將軍從事中郎遷司馬文襄以前司徒侯景進賢冠賜繪曰卿但直心事孤當用卿為三公莫學侯景叛也及文宣嗣事仍為丞相司馬天保初除司徒右長史繪質性方重未嘗趣事權門以此久而沈屈卒贈南青州刺史諡曰景子君道有父風繪弟緯字乾經少聰慧有才學與舅子河間邢昕少相倫輩晚不逮之位中大夫聘梁使主侍中李神俊舉緯為尚書南主客郎緯前後接對凡十八人頗為稱職鄴下為之語曰學則渾繪緯口則緯繪渾文襄攝選以緯為司徒咨議參軍謂曰自郎署至此所謂不次以卿人才故有此舉耳梁謝藺來聘緯勞之藺問安平諸崔緯曰子玉以還雕龍絶矣崔暹聞之怒緯詣門謝之暹上馬不顧緯語人曰雖失要人意聘梁使不得舍我武定五年兼散騎常侍使梁緯嘗逸遊放達自號隱君蕭然有絶塵之意使還除太子家令卒贈北徐州刺史諡曰文崔暹字季倫博陵安平人漢尚書實之後魏光州刺史挺之族孫也世為北州著姓父穆州辟主簿暹少為書生避地渤海依高乾以妹妻其弟慎慎後臨滄光二州啓暹為長史委以郡事趙郡公琛鎮定州辟為開府咨議隨琛往晉陽神武與語悅之以兼丞相長史神武舉兵將入洛留暹佐琛知後事謂之曰丈夫相知豈在新舊軍戎事重留守急切家弟年少未間事冝凡百後事一以相屬握手殷勤至於三四琛後以罪被責暹亦黜免尉景為并州起暹為别駕文襄代景轉暹為開府咨議仍行别駕事從文襄鎮撫鄴都加散騎常侍遷左丞吏部郎領定州大中正主議麟趾格暹親遇日隆好薦人士言邢邵宜任府僚可以兼管機密文字文襄因以召邵甚見親重言論之際邵遂毁暹文襄不悅謂暹曰卿説子才之長子才專言卿短此癡人也暹曰子才言暹短暹説子才長皆是實事不可謂癡高慎之叛偽與暹有隙神武後知之欲發其事而殺暹文襄苦救得止武定初遷御史中丞選畢義雲盧潛宋欽道李愔崔瞻杜蕤嵇曄酈伯偉崔子武李廣皆為御史世稱其知人文襄欲假暹威勢諸公在坐朝令暹後通名因待以殊禮暹乃高視徐步兩人擎裾而入文襄分庭對揖暹不讓席而坐觴再行便辭退文襄曰下官薄有蔬食公少留暹曰適受敕在臺檢校遂不待食而去文襄降送之旬日後文襄與諸公出之東山遇暹在道前驅為赤棒所擊文襄回馬避之暹前後表彈尚書令司馬子如及尚書元羡殷州刺史慕容獻又彈太師司州牧咸陽王恆并州刺史可朱渾道元冀州刺史韓軌罪狀極筆並免官其餘死黜者甚衆神武書與鄴下諸貴曰崔暹昔事家弟為定州刺史後為吾兒開府咨議及遷左丞吏部郎吾未知其能也始居憲􅀢乃爾糾劾咸陽王司馬令並是吾對門布衣之舊尊貴親昵無過二人同時獲罪吾不能救諸君其慎之神武如鄴羣官迎迓於紫陌神武握暹手而勞之曰往前朝廷豈無法官而天下貪婪莫肯糾劾中尉盡心為國不避豪強遂使逺邇肅清羣公奉法小兒才輕任重非中尉何有今日榮華冨貴直是中尉自取高歡父子無以相報賜暹良馬使騎之以從且行且語暹下拜馬驚走神武親為擁之而授轡魏帝宴於華林園謂神武曰朝廷之中有用心公平直言彈劾不避親戚者王可勸酒神武降階跪而曰唯御史中尉崔暹一人謹奉明旨敢以酒勸并臣所射賜物千假乞回賜之帝曰崔中尉為法道俗齊整暹謝曰此自陛下風化所加大將軍臣澄勸奬之力於是文襄亦催暹酒神武親為之抃文襄退謂暹曰我尚畏羡何况餘人神武將還晉陽又以所乘馬加綵物賜暹由是威名日盛內外莫不畏服神武崩未發喪文襄以暹為度支尚書監國史兼僕射委以心腹之寄暹憂國如家以天下為己任文襄盛寵王昭儀欲立為正室暹諌曰天命未改魏室尚存公主無罪不容棄辱文襄意不悅苦請乃從之文襄車服過度誅戮變常言談進止或有虧失暹每厲色極言文襄亦為之止臨淮王孝友被文襄狎愛數歌舞戲謔於前顧見暹輒斂容而止有獄囚數百文襄盡欲誅之每催文帳暹故緩之不以時進文襄意釋獲免司州别駕司馬仲粲中從事陸士佩並被文襄歐擊付獄將餓殺暹送食藥為致言而釋之自出身從官嘗日晏乃歸侵曉則與兄弟問母之起居暮則嘗食視寢然後至外齋對親賔論事或與沙門辨元理夜久乃還一生不問家産魏梁通和要貴皆遣人隨聘使交易暹惟寄求佛經梁武帝聞之為繕寫以幡花寶蓋贊唄送至館焉然好大言調戲無莭嘗密令沙門明藏著佛性論而署己名傳之江表子逹拏年十三暹令儒者權會教其説周易兩字乃集朝貴名流命逹拏坐髙坐開講同郡眭仲讓陽為屈服暹喜擢仲讓為司徒中郎鄴下為之語曰講義兩行得中郎仲讓官至右丞此皆暹之短也文宣初嗣霸業司馬子如韓軌等挾舊怨言暹罪重髙隆之亦言宜寬政網去糾察法官黜崔暹則得逺近人意文宣從之及踐阼譖毁之者猶不息帝乃令都督陳山提舍人獨孤永業搜暹家甚貧匱唯得神武文襄與暹書千餘紙多論經國大事帝嗟賞之仍不免衆口乃流暹於馬城晝則負土供役夜則置諸地牢歲餘奴告暹謀反鎖赴晉陽窮驗無實先是文襄疑文宣佯愚慮其有後變將隂圖之以問暹暹曰嘗與二郎俱在行位試以手版拍其背而不瞋乃將犀手版換暹竹者自揩拭而玩視之以是知其實癡不足慮也帝既鎖暹責其往昔打背暹自陳所對文襄之言明已功以贖死帝悟曰我免禍乃暹之力釋而勞之使行太原郡事遷太常卿謂羣臣曰崔暹清正天下無雙卿等不及也初文襄欲以最小妹嫁與暹子逹拏會崩遂寢至是宴於宣光殿羣臣多在焉文宣謂暹曰賢子逹拏甚有才學亡兄長女樂安公主魏帝外甥勝朕諸妹思成大兄宿志故欲作婚姻乃以主降逹拏暹尋遷中書監兼并省右僕射是時法網已嚴官司難於剖決繫獄者千餘人暹初上省便大録囚旬月間斷雪略盡文襄時欲封暹神武亦欲封之暹並固辭文宣數出遊多至暹宅以暹女為皇太子妃李后不可乃止天保八年遷尚書右僕射儀同三司時調絹以七丈為匹暹言之乃依舊帝謂左右曰崔暹諌我飲酒過多然我飲酒何所廢恆山王私謂暹曰至尊威嚴多醉太后尚不能致言吾兄弟亦杜口僕射獨能犯顔內外深相感愧十年卒帝撫靈哭之贈開府儀同三司尚書左僕射定州刺史諡曰貞莭逹拏溫良亷謹有學識位儀同三司司農卿周御府大夫大象中使鄴屬尉遲迥起兵以為總管司馬迥平伏誅初文宣嘗問樂安公主逹拏於汝何似答云甚相敬唯阿家憎兒文宣令宫人召逹拏母入而殺之投漳水齊滅逹拏殺主以復讎崔㥄字長儒清河東武城人也父休魏七兵尚書㥄狀貌瓌偉善於容止少有名望為當時所知初為魏宣武挽郎解褐太學博士纍遷𣪚騎侍郎坐事免歸鄉里冀部豪桀之起召㥄兄弟㥄中立無所就髙敖曹以五百騎劫取之以為師友神武至信都以為開府咨議參軍歷給事黃門侍郎衛將軍神武入洛議定廢立太僕綦俊盛言節閔帝賢明可主社稷㥄作色而前曰若其賢明自可待我髙王徐登九五既為逆胡所立何得猶作天子若從俊言王師何名義舉由是節閔及中興主皆廢更立平陽王是為孝武以建義功封武功縣公領黃門加驃騎大將軍㥄居門下恃預建義旗頗自矜縱尋以貪汚為御史糾劾逃還鄉里時清河多盜文襄以石愷為太守令得専殺愷經㥄宅謂少年曰諸郎輩莫作賊太守打殺人㥄顧曰何不答府君下官家作賊止捉一天子牽臂下殿捉一天子推上殿不作偷驢摸犢賊及遇赦出復為黃門天平中授徐州刺史給廣宗部曲三百人清河部曲千人㥄性暴慢寵妾馮氏長且姣家人號曰成母朝士邢子才等多姦之至是假其威勢恣情取受風政不立初㥄為常侍求為修起居注或曰魏收可㥄曰收輕薄徒耳更引祖鴻勳為之既為樞要又欲陷收不孝之罪乃以盧元明代收為中書郎由是收銜之及收聘梁過徐州㥄備刺史鹵簿迎之使人相聞收曰勿怪儀衛多稽古力也收語謇急報曰崔徐州建義之勳何稽古之有㥄自以門伐素髙特不平此言收乘宿憾故以此挫之罷徐州除祕書監以母憂去官服終兼太常卿轉七兵尚書清河邑中正㥄有文學偉風貌寡言辭端嶷如神以簡貴自處神武言崔悛應作令僕恨其精神太遒趙郡李渾將聘梁名輩畢萃詩酒正歡㥄後到一坐無復談話鄭伯猷歎曰身長八尺靣如刻畫謦咳為洪鐘響胸中貯千卷書使人那得不畏服㥄以籍地自矜嘗與蕭祗明少遐等髙宴終日獨無言少遐晚謂㥄曰驚風飄白日忽然落西山㥄亦無言直曰爾每謂盧元明曰天下盛門惟我與爾傅崔趙李何為者哉崔暹聞而銜之神武葬後㥄又竊言黃頷小兒堪當重任不暹外兄李慎以告暹暹啓文襄絶㥄朝謁㥄要拜道左文襄發怒曰黃頷兒何足拜也於是鎖㥄赴晉陽訊之不服暹引邢子才為證子才執無此言㥄在禁謂邢曰卿知我意屬太邱不邢出告㥄子贍曰尊公意正應欲結姻陳元康贍有新生女乃許妻元康子元康為言於文襄曰崔㥄名望素重不可以私語殺之文襄曰若免其性命當徙之遐裔元康曰㥄若在邉或將外叛以英賢資寇敵非所宜也文襄曰既有季圭之罪還令輸作可乎元康曰元康嘗讀崔琰傳追恨魏武不𢎞㥄若在作所而殞後世豈道公不殺也文襄曰然則奈何元康曰㥄合死朝野皆知公誠能以寬濟猛特輕其罰則仁德彌著天下歸心假孝先亦言㥄舊勳乃捨之㥄進謁奉謝文襄猶怒曰我雖無堪忝當大任被卿以為黃頷小兒金石可銷此言難滅天保初除侍中監起居以禪代之際參掌儀禮别封新豐縣男回授第九子約㥄一門婚嫁皆衣冠美族吉凶儀範為當時所稱婁太后為博陵王納㥄妹為妃敇中使曰好作法用勿使崔家笑人婚夕文宣舉酒祝曰新婦宜男孝順冨貴㥄跪對曰孝順出自臣門富貴恩由陛下五年為東兖州刺史復擕馮氏之部為馮厭蠱頗失精爽尋遇偏風馮氏驕縱受納狼藉為御史所劾與㥄俱召詣付廷尉諸囚多姦焉獄中致競尋别詔斬馮於都市支解為九假㥄以疾卒於獄中㥄厯覽羣書兼有詞藻自魏中興之後迄於孝武帝詞誥表檄多㥄所為然率性豪侈溺於財色諸弟之間不能盡雍穆之美世論以此譏之㥄素與魏收不協後收既専典國史㥄恐被惡言乃恱之曰昔有班固今則魏子收縮鼻笑之憾不釋㥄子贍字彥通聰明強學有文情潔白善容止神采嶷然言不妄發才學風流為後來之秀初潁川荀濟自江南入洛贍學於濟故得經史有師法侍中李神俊雅有風譽晚年無子見贍歎謂邢邵曰昨見崔㥄兒便為後生第一我遂無此物見此使人傷懷年十五刺史髙昂召署主簿清河公髙嶽辟為開府西閣祭酒博陵崔暹為中尉啓除侍御史以父與暹隙俄而去官神武召與北海王晞為諸子賔友仍為相府中兵參軍轉主簿文襄崩祕未發喪文宣命贍兼相府司馬使鄴魏孝靜帝以人日發雲龍門與其父㥄俱侍宴又敕贍令近御坐亦有應詔詩詔問邢邵等曰今贍此詩何如其父咸云㥄博雅洪麗贍氣調清新並詩人之冠冕宴罷咸共嗟賞之云今日之宴併為崔贍父子楊愔欲引贍為中書侍郎時盧思道直中書省愔因問思道曰我比日多務都不見崔贍文藻卿與其親通理當相悉思道曰贍文思之美實有可稱但舉世重其風流所以才華見沒愔云此言有理其日便奏用之愔又曰昔裴瓚晉世為中書郎神情髙邁每於禁門出入宿衛者皆肅然動容崔生堂堂之貌亦當無愧裴子乎皇建元年除給事黃門侍郎與趙郡李概為莫逆之友概將東還贍遺之書曰仗氣使酒我之常弊詆訶指切在卿尤甚足下告歸吾於何聞過也贍患氣兼性遲重雖居二省多不堪敷奏除清河邑中正孝昭踐阼太子就傅受業詔除太子中庶子徵赴晉陽敕曰東宫弱年未陶訓義卿儀形風德人之師表故勞卿朝夕遊處開發幼蒙一物三善皆以相寄贍專在東宫調護講讀及進退禮度儀制一皆委焉太子納妃斛律氏敕贍與鴻臚卿崔劼撰定婚禮儀注仍面授别旨曰雖舊事恐未盡善可好定此儀以為後式時詔議三恪之禮太子少傅魏收為一議朝士莫不雷同贍别立異議收讀訖笑而不言贍正色曰聖上詔羣臣議國家大典少傅名位不輕贍議若是須贊其所長若非須詰其不允何容讀國士議文直此冷笑崔贍居聖朝顯職尚不免此疵草萊諸生欲云何自進贍容貌方嚴詞旨雄辨收慙遽竟無一言太寧元年除衛尉少卿尋兼散騎常侍聘陳使主行過彭城讀道旁碑文未畢而絶倒從者遙見以為中惡此碑乃贍父徐州時所立故哀感焉贍經熱病面多瘢痕然雍容可觀辭韻溫雅南人大相欽服陳舍人劉師知見而心醉乃言常侍前朝通好之日何意不來今日誰相對揚者其見重如此還襲爵武成公再遷吏部郎中因患耳請急十餘日不瘥舊式百日不上解官吏部尚書尉瑾性褊急以贍舉措舒緩曹務繁劇附驛奏聞因見代免歸鄉里天統末加驍騎大將軍就拜銀青光祿大夫卒贈大理卿濟州刺史諡曰文贍性簡傲以才地自矜所與周旋皆一時名望在御史臺常於宅中送食備珍羞别室獨餐處之自若有一河東人士姓裴亦為御史伺贍食便往造焉贍不交言又不命匕筯裴坐觀贍食罷而退明日裴自擕匕筯恣情飲噉贍方謂裴云我初不唤君食亦不共君語遂能不顧小節昔劉毅在京口冒食鵝炙豈異於是乎君定名士於是每與之同食性方重好讀書酒後清言聞者莫不傾耳自天保以後重吏事謂容止醖藉者為潦倒而贍終不改焉嘗見選曹以劉逖為縣令謂之曰官長止應子琮輩乃復屈名人馮子琮聞之大怒及其用事幾敗焉有集二十卷㥄弟仲文有文學太和中為丞相掾沙苑之敗仲文持馬尾渡河波中乍沒乍出神武望見曰崔掾也遽遣船赴接及至謂曰卿為君為親不顧萬死可謂家之孝子國之忠臣也後文襄欲使行青州聞其多醉乃止天保初㥄為侍中仲文為銀青光祿大夫同日受拜時云兩鳳連飛嘗被敕召宿酲未解文宣怒將罰之試使為觀射詩十韻操筆立成乃原之拜散騎常侍光祿大夫卒子偃太子洗馬尚書郎偃弟儦有文藻列在文苑傳中仲文弟叔仁輕俠重襟期仕魏為潁川刺史以貪汚為御史中丞髙仲密劾賜死於宅臨刑賦詩五絶與諸弟訣别不及其兄㥄以其不甚營救也子彥武有識用隋開皇中位魏州刺史叔仁弟叔義魏孝莊時為尚書庫部郎初叔義父休為青州刺史放盜魁令出其黨遂以為門客在洛陽與兄叔仁鑄錢事發合家逃逸叔義見執時城陽王徽為司州牧臨淮王彧以非其身罪驟為致言徽以求婚不得遂停赦書而殺之叔義弟子侃以寄名從軍竊級為中書郎為尚書左丞和子嶽彈紏失官性兼使氣後自修改閉門讀書當時稱為博洽後兼通直散騎常侍使梁為陽斐副恥居斐下自負才地呼斐為陽子語輒折之還卒於路子拯位太子僕武德郡守子侃弟子植位冀州别駕走馬從禽髮挂木而死子圭子植弟子聿位東莞太守子聿弟子約五嵗喪父不肯食肉後喪母居喪哀毁骨立人云崔九作孝風吹即倒禫月兄子度死又百日不入房長八尺餘姿神俊異潛觀梁使劉孝儀賔從見者駭目武定中為平原公開府祭酒與兄子贍俱詣晉陽寄居佛寺贍長於子約二嵗每退朝久立子約馮几對之儀望俱華儼然相映諸沙門竊窺之以為二天人也乾明中為考功郎病且卒謂贍曰自諸兄殁而門業頽替居家大唯吾與爾命之修短曾何足悲汝能免之吾不餧矣孫騰字龍雀咸陽石安人也祖通仕沮渠氏為中書舍人沮渠氏滅因徙居北邊及騰貴魏朝贈司徒父機贈太尉騰少質直明解吏事魏正光中北方擾亂歸爾朱榮尋為神武都督長史神武為晉州又引為長史封石安縣伯及起兵於信都騰以誠款預謀䇿纍遷郡公入為侍中尋兼尚書左僕射時魏京兆王愈女平原公主寡騰願尚之而公主欲侍中封隆之騰妬隆之遂相間構神武啓免騰官俄而復之與斛斯椿俱掌機密見忌慮禍奔晉陽神武入討椿留騰行并州事入為尚書左僕射內外之事騰咸知之兼司空除侍中兼尚書令時西魏攻南兗州詔騰率諸將討之騰性怯無威略失利而還又除司徒餘官如故初北境亂騰亡一女及貴推訪不得疑其為人婢及為司徒奴婢訴良者皆免之願免千人冀得其女神武知之大怒解司徒尋為尚書左僕射太保仍侍中遷太傅初博陵崔孝芬取貧家子賈氏為養女孝芬死其妻更適鄭伯獻擕賈於鄭氏賈有色騰納之為妾其妻袁死騰以賈有子正以為妻詔封丹陽郡君復請以袁氏爵回授其妾其違禮肆情多此類也騰早依神武神武深信待之置於魏朝寄以心腹遂志氣驕盈與奪自已納賄不知紀極官贈非財不行肴藏銀器盜為家物親狎小人専為聚斂與髙嶽髙隆之司馬子如號四貴非法專恣騰為甚焉神武文襄屢加誚讓終不悛改朝野深非笑之武定六年薨贈太師開府録尚書事諡曰文天保初以騰佐命詔祭告其墓皇建中配享神武廟庭子鳳珍嗣性庸暗卒於儀同三司髙隆之字延興洛陽人也為閹人徐成養子少時以賃升為事父幹魏白水郡太守或云幹為姑壻髙氏所養因從其氏隆之後有參定之功神武命為弟仍云勃海蓨人幹贈司徒公隆之身長八尺美鬚髯深沈有志氣初行臺于暉引為郎中與神武深相結託及神武起義山東以隆之為大行臺御史右丞從破四胡除驃騎大將軍封平涼公纍遷并州刺史後拜尚書右僕射時初給民田貴勢皆占良美貧弱咸受塉薄隆之啓神武悉更反易乃得均平及領營構大將以十萬夫徹洛陽宫殿運於鄴營構之制皆委隆之增築南城周二十五里以漳水近於帝城起長隄以防泛溢之患又鑿渠引漳水周流城郭造水碾磑並有利於時魏自孝昌以後天下多難刺史太守皆為當部都督雖無兵事皆立佐僚所在頗為煩擾隆之請非實在邊要掌兵馬者悉斷之又朝貴多假常侍以取貂蟬之飾隆之自表解侍中并陳諸假侍中服者請亦罷之詔皆如表自軍國多事冒名竊官者不可勝數隆之奏請檢括旬日獲五萬餘人而羣小囂然隆之懼而止詔監起居事進位司徒武定中除尚書令遷太保文襄作宰風俗肅清隆之時有受納文襄於尚書省大加責讓齊受禪進爵為王尋以本官録尚書事領大宗正卿監國史隆之性好小巧至於公家羽儀百戲服制時有改易不循典故時論非之於射棚上立三人像為壯勇之勢文宣曾至東山因射謂隆之曰棚上可作猛獸以存古義何為終日射人隆之無以對初文襄委任兼僕射崔暹黃門侍郎崔季舒等及文襄崩隆之啓文宣並欲害之不許文宣以隆之舊齒委以政事隆之子媱於楊遵彥前妻帝妹也故遵彥讒毀日至崔季舒等仍以前隙譖云隆之每見詞訟者輒加哀矜之意以示非己能裁文宣以其受任既久知有寃狀便宜申滌何過要名非大臣義天保五年禁止尚書省隆之曾與元昶宴語昶曰與王交遊當死生不相背人有密言之者又帝未登庸之日隆之意嘗侮帝帝將受魏禪大臣咸言未可隆之又在其中帝深銜之因此怒罵曰徐家老公令壯士築百餘拳放出渴將飲水人止之隆之曰今日何在遂飲之因從駕死於路中贈太尉太保陽夏王竟不得諡隆之雖不學涉而欽尚文雅搢紳名流必存禮接寡姊為尼事之如母訓督諸子必先文義世以此稱之文宣末年既多猜害追忿隆之執其子司徒中兵慧登等二十餘人於前慧登等言乞命帝曰不得已命左右一時梟首並投之漳水發隆之冢出其尸葬已積年貌猶不改斬截骸骨而焚之棄於漳流天下寃之隆之嗣遂絶乾明中詔其兄子子逺為隆之後襲爵陽夏王還其財産隆之初見信於神武性多隂毒睚眥之忿無不報焉儀同三司崔孝芬以結婚姻不果太府卿任集同知營構頗相乖異瀛州刺史元宴請託不遂並構成其罪誅害之終至家門殄滅論者謂有報應焉司馬子如字遵業自云河內溫人也八世祖模晉司空南陽王模世子保晉亂出奔涼州因家焉魏平姑臧徙居於雲中父興龍魏魯陽太守子如少機警有口辨好交遊豪桀初為懷朔鎮省事與神武相結託分義甚深孝昌中北州淪陷子如擕家口南奔肆州為爾朱榮所禮遇榮之向洛陽也以子如為司馬仍為大行臺郎榮以子如明辨能説時事數遣奉使詣闕多稱旨孝莊亦接待焉為武衛將軍榮之誅也子如知有變自宫內突出至榮宅棄家隨榮妻子與爾朱世隆等走出京城世隆便欲還北子如曰事貴應機兵不厭詐天下凶凶唯強是視於此際會不可以弱示人若必走北即恐變故隨起不如分兵守河橋回軍向京出其不意假不如心猶足示有餘力於是世隆還通京城節閔帝立以為侍中驃騎大將軍進封陽平郡公神武起義信都世隆知子如與神武有舊疑之出為南岐州刺史神武入洛陽子如赴京師以為大行臺尚書朝夕左右參知軍國天平初除尚書左僕射開府與侍中髙嶽侍中孫騰右僕射髙隆之等共知朝政號為四貴甚見信重神武鎮晉陽子如時往謁見待之甚厚並坐同食從旦達暮及當還神武與婁后俱有賚遺率以為常子如性既豪爽兼恃恩舊簿領之務與奪任情公然受納無所顧憚興和中以為北道行臺巡檢諸州守令已下委其黜陟子如至定州斬深澤令至冀州斬東光令皆以稽留時漏致之極刑有進退少不合旨者便令武士頓曵白刃臨頸士庶惶懼不知所為轉尚書令子如於建義之始身不參預直以神武故舊遂當委重意氣既髙聚斂不息時文襄入輔朝政子如以贓賄為御史中尉崔暹所劾禁止於尚書省一宿而髮皆白辭曰司馬子如本從夏州䇿一杖投相王王給露車一乘觠牸牛犢犢在道死唯觠角存此外皆人上取得神武書敕文襄曰司馬令是吾故舊汝宜寬之文襄駐馬行街以出子如脫其鎖子如懼曰非作事邪於是除削官爵神武後見之哀其憔悴以膝承其首親為擇蝨賜酒五百瓶羊五百口粳米五百石子如曰無事尚被囚幾死若受此豈有生路邪未幾起行冀州事子如能自改厲甚有聲譽詔復官爵别封野王縣男齊受禪以有翼贊之功别封須昌縣公除司空子如性滑稽不事檢裁言戲穢褻識者非之而事姊有禮撫諸兄子慈篤當時名士並加欽愛世復以此稱之然素無鯁正不能以平道處物文襄崩暹等赴晉陽子如以紏劾之釁乃啓文宣言其罪惡仍勸帝誅之其後子如以馬度關為有司所奏文宣引子如讓之曰崔暹季舒事朕先世有何大罪卿令我殺之因此免官久之猶以先帝之舊拜太尉以疾薨贈太師太尉懷州刺史諡曰文眀長子消難尚神武女文宣世為北豫州刺史叛入周列在周史子如兄纂纂長子世雲輕險無行纍遷潁州刺史肆行姦穢將見推懼遂從侯景文襄猶以子如恩舊免其諸弟死罪徙北邊世雲以侯景敗於渦陽復有異志為景所殺世雲弟膺之字仲慶美鬚髯有風貌好學厚自封植神氣甚高歷中書黃門侍郎天平中子如執鈞當軸膺之既宰相猶子兼又自有名望其所與遊集盡一時名流與邢子才王元景等並為莫逆之交及世雲陷於逆亂期親皆應誅膺之及諸弟並有人才為朝廷所惜文襄特減死徙近鎮文宣嗣業得還齊受禪子如以别封須昌縣公回授膺之子如撫愛甚慈膺之昆弟事之如父性方古不會俗舊與楊愔同為黃門郎至愔為尚書令抗禮如初愔嘗有從姊慘尚書卿尹皆跪弔膺之執手而出曽路逄愔威儀道引乃於樹下側避之愔於車望見令呼謂曰兄何故避弟膺之曰我自避赤棒本不避卿愔甚重之然以其疏簡慠物竟天保間淪滯不齒乾眀中除衛尉少卿遷國子祭酒河清末拜金紫光祿大夫患泄痢積年不起武平中就家拜儀同三司班台之貴近世專以賞勳勤膺之雖為猥雜而名器猶重初司徒趙彥深起自孤微為子如管記膺之甚相忽略不為之禮及彥深為宰相朝士輻湊膺之自念故被延請永不至門每與相見捧袂而已太常卿段孝言左丞相孝先之弟也位望甚隆嘗詣其弟幼之舉座傾敬時膺之牽疾在外齋馮几而坐不為動容直言我患痢久太常不得致怪黃門郎陸杳貴遊後進膺之嘗與碁杳忽後至寒溫而已碁遂輟園宅間素門無雜客性不飲酒而不愛重賓逰病久不復堪讀書或以奕碁永日名士有素懷者時相尋候無雜言唯論經史好讀太元經又注揚雄蜀都賦每云我與揚子雲周旋患痢十七年竟不愈亡嵗以痢疾終膺之弟子瑞為御史中丞正色舉察為朝廷所憚以疾去職就拜祠部尚書卒贈儀同三司瀛州刺史諡曰文節子瑞妻陸令萱妹及令萱得寵於後主重贈子瑞開府儀同三司中書監溫縣伯諸子亦並居顯職同逰給事黃門侍郎同回太常少卿同憲通直常侍同逰終為佳吏隋開皇中為尚書户部侍郎卒於遂州刺史子瑞弟幼之清真有行武平末為大理卿開皇中卒於眉州刺史薛琡字曇珍代人也父彪子魏徐州刺史自有傳琡形貌瓌偉以有幹用為典客令每引見時儀望甚美宣武帝謂曰卿風度峻整姿貌秀異後當升進何以處官琡答曰宗廟之禮不敢不謹朝廷之事不敢不忠自此以外非庸臣所及正光中行洛陽令部內肅然有犯法者未加考掠直以辭理窮核多得其情於是豪猾畏威事務簡靜時以久旱京師見囚悉召集華林理問寃滯洛陽繫獄唯有三人孝眀嘉之賜縑百匹琡本附於元義義廢憂懼由是政教廢弛坐免官李神軌有寵於靈太后琡復事之纍遷吏部郎中先是吏部尚書崔亮奏立停年之格不簡人才專問勞舊琡乃上書曰臣聞錦縠雖輕不委之以學割瑚璉任重豈寄之以弱力若使選曺唯取年勞不簡賢否使義均行鴈次若貫魚勘簿呼名一吏足矣數人而用何謂銓衡今黎元之命繫於守長若得其人則蘇息有地任非其器為患更深臣請郡縣之職吏部先盡擇才必學通今古曉達政職者以應其選不拘入職逺近年勳多少其積勞之中有才堪牧民者自在先用之限其餘不堪者既壯藉其力豈容老而棄之將佐丞尉去民稍逺小小當否未為多失宜依次補敘以酬其勞書奏不報後因引見復陳曰君相共治天下本屬百官是以漢朝常令三公大臣舉賢良方正有道直言之士以為長吏監撫黎元自晉末以來此風遂替今四方初定務在飬民臣請依漢氏更立四科令三公宰貴各薦時賢以補郡縣眀立條格防其阿黨之端庶令塗炭之餘戴仰有地詔下公卿議之事亦寢元天穆討邢杲以琡為行臺尚書軍次東郡時元皓已據酇城邢杲又逼歷下天穆議其所先衆議以杲強盛宜先經略唯琡以為邢杲聚衆無名雖強猶賊元皓皇室昵親來稱義舉自河隂之役人情駭怨今有際會易生感動杲鼠竊狗偷非有逺志宜先討皓待皓事決然後回師滅杲不難天穆以羣情所願遂先討杲杲降軍還至定陶天穆畹琡行西兖州事尋為元皓所陷皓執琡自隨爾朱榮破皓天穆謂琡曰不用君言乃至於此天平初拜七兵尚書神武引為丞相長史軍國之事多所關知琡亦推誠盡節屢進忠讜神武大舉西伐將度蒲津琡諌曰西賊連年飢饉故冒死來入陕州欲取倉粟今高司徒已圍陕城粟不得出但宜置兵諸道勿與野戰比及來年麥秋人民盡應餓死寶炬黑獺自然歸降願王無渡河也侯景亦曰今者之舉兵衆極大萬一不捷卒難收殿不如分為二軍相繼而進前軍若勝後軍合力前軍若敗後軍乘之神武皆不納遂有沙苑之敗後范陽盧仲禮反琡與諸軍討平之轉殷州刺史為政嚴酷吏民苦之後歷度支殿中二尚書天保元年遷尚書右僕射卒臨終敕其子斂以時服踰月便葬不聼干求贈官自置喪車不加雕飾但用麻為流蘇繩網絡而已明器等物並不令置琡久在省闥眀間簿領當官剖斷敏速如流然天性險忌情義不篤外似方格內實浮動受納貨賄曲理舞法深文刻薄多所傷害人士畏惡之魏東平王元匡妾張氏淫逸放恣琡初與姦通後納以為婦或有謗之遂棄其前妻于氏不認其子允由是室家內忿競相告列深為世論所譏鄙贈開府儀同三司尚書左僕射青州刺史諡曰威恭子允嗣楊愔字遵彥𢎞農華隂人父津魏司空前史有傳愔小名秦王兒童時口若不能言而風度深敏出入門閭未嘗戲㺯六歲學史書十一受詩易好左氏春秋幼而喪母曽詣舅源子恭子恭與之飲問曰汝比來讀何書答曰誦詩子恭因曰誦詩至渭陽未邪愔便號泣感噎子恭亦對之歔欷遂為之罷酒子恭後謂津曰嘗謂秦王兒不甚察慧從今已後更刮目而視之愔一門四世同居家甚隆盛昆季就學者三十餘人學庭前有奈樹其實落地羣兒咸爭之愔頽然獨坐其季父暐適入學館見之大用嗟異顧謂賔客曰此兒恬裕有我家風宅內有茂竹遂為愔於林邊别葺一室命獨處其中常銅盤具盛饌以飯之因以督厲諸子曰汝輩但如遵彥謹慎自得竹林别室銅盤重肉之食從父兄黃門侍郎昱特相器重曽謂人曰此兒駒齒未落已是我家龍文更十歲後當求之千里外昱嘗與十餘人賦詩愔一覽便誦無所遺失及長能清言美音制風神俊悟容止可觀人士見之莫不敬異有識者多以逺大許之正光中隨父之并州性既恬默又好山水遂入晉陽西縣甕山讀書孝昌初津為定州刺史愔亦隨父之職以軍功除羽林監賜爵魏昌男不拜及中山為杜洛周陷全家被囚縶未幾洛周滅又沒葛榮榮欲以女妻之又逼以偽職愔乃託疾密含牛血數合於衆中吐之仍陽喑不語榮以為信然乃止永安初還洛拜通直散騎侍郎年十八元皓入洛時愔從父兄侃為北中郎將鎮河梁愔適至侃處便屬乘輿失守夜至河侃雖奉迎車駕北度而潛南奔愔固諌止之遂相與扈從逹建州除通直散騎常侍愔以世故未夷志在潛退乃謝病與友人中書侍郎河間邢邵隱於嵩山及莊帝誅爾朱榮其從兄侃參贊帷幄朝廷以其父津為并州刺史北道大行臺愔隨之任有邯鄲人楊寬者求義從出藩愔請津納之俄而孝莊幽崩愔家以忠烈闔門塗炭愔時適還都行逹邯鄲過楊寬家為寬所執至相州見刺史劉誕誕以愔名家盛德甚相哀念付長史慕容白澤禁止焉遣隊主鞏榮貴防禁送都至安陽亭愔謂榮貴曰僕家世忠臣輸誠魏室家亡國破一至於此雖曰囚虜何復面目見君父之讐得自縊於一繩傳首而去是君之惠也榮貴深相矜感遂與愔俱逃愔乃投高昻兄弟既潛竄纍載屬神武起義至信都遂投刺轅門便蒙引見贊揚興運陳訴家禍言辭哀壯涕泗橫集神武為之改容即以為行臺郎中大軍南攻鄴歷楊寬村寬於馬前叩頭請罪愔謂曰人不識恩義蓋亦常理我不恨卿無假驚布時鄴未下神武命愔作祭天文燎畢而城陷由是轉大行臺右丞于時霸圗草創軍國務廣文檄教令皆自愔及崔㥄出愔遭罹家難嘗以喪禮自居所食唯鹽米而已哀毁骨立神武愍之常相開慰及韓陵之戰愔每陷陳先登朋僚咸共怪歎曰楊氏儒生今遂為武士仁者必勇定非虗論頃之表請解職還葬一門之內贈太師太傅丞相大將軍者二人太尉録尚書及尚書令者三人左僕射尚書五人刺史太守者二十餘人追榮之盛古今未之有也及喪柩進發吉凶儀衛亘二十餘里會葬者將萬人是日隆冬盛寒風雪嚴厚愔徒跣號哭見者無不哀之尋徴赴晉陽仍居本職愔從兄稚為岐州刺史以直言忤旨見誅愔悲懼疾發乃取急就鴈門溫湯療治郭秀害其能因致書恐之曰高王欲送卿於帝所仍勸其逃亡愔遂棄衣冠於水濵若自沉者變易姓名自稱劉士安入嵩高山與沙門曇謨徴等屏居削迹又潛之光州因東入田橫島以􅊰誦為業海隅之士謂之劉先生太守王元景隂祐之神武知愔猶在遣愔從兄寶猗齎書慰喻仍敕光州刺史奚思業令搜訪以禮發遣神武見之大恱除太原公開府司馬轉長史太原公即文宣帝也復授大行臺右丞封華隂縣侯遷給事黃門侍郎妻以庶女又兼散騎常侍為聘梁使主行逹碻磝州內有愔家舊佛寺入精廬禮拜見太傅容像感悲慟哭歐血數升遂發病不成行輿疾還鄴久之以本官兼尚書吏部郎中武定末以望實之美超拜吏部尚書加侍中衛將軍侍學典選如故天保初以本官領太尉少傅别封陽夏縣男又詔監太史遷尚書右僕射尚太原長公主即魏孝靜后也會有雉集其舍又拜開府儀同三司尚書右僕射改封華山郡公九年徙尚書令又拜特進驃騎大將軍十年封開封王文宣之崩百僚莫有下淚愔悲不自勝濟南嗣業任遇彌隆朝章國命一人而已推誠體道時無異議乾眀元年為孝昭所誅時年五十天統末追贈司空愔貴公子早有聲譽風表鑒裁為朝野所稱家門遇禍唯有二弟一妹及兄孫女數人撫飬孤幼慈旨溫顔咸出仁厚重分義輕貨財前後賜與多散之親族羣從弟姪十數人並待而舉火頻遭迍厄冒履危難一餐之惠酬答必重性命之讐捨而不問典選二十餘年奬擢人倫以為己任然取士徒以言貌時致謗言以為愔之用人如貧士市瓜取其大者愔聞不以為意其聰眀強識半面不忘每有所召或單稱姓名無有誤者後有選人魯漫漢自言猥賤獨不見識愔曰卿前在元子思坊騎禿尾草驢見我不下以方麴障面我何不識卿漫漢驚服又調之曰名以定禮漫漢果自不虛又令吏唱人名誤以盧士深為士琛士深自言愔曰盧即潤朗所以比玉自尚公主後衣紫羅袍金縷大帶遇李庶頗以為耻謂曰我此衣服都是內裁既見子將不能無愧及居端揆經綜機衡千端萬緒神無滯用自天保五年已後一人喪德維持匡救實有賴焉每天子臨軒公卿拜授發號施令宣揚詔册愔辭氣溫辨神儀秀發百僚觀聽莫不悚動自居大位門絶私交輕貨財重仁義前後賞賜積纍巨萬散之九族架篋之中唯有書數千卷太保平原王隆之與愔鄰宅嘗見其門外有富胡數人謂左右曰我門前幸無此物性周密畏慎恆若不足每聞後命愀然變色文宣大漸以恆山長廣二王位地親逼深以後事為念愔與左僕射平秦王歸彥侍中燕子獻黃門侍郎宋欽道領軍可朱渾天和中書侍郎鄭子默受遺詔輔政並以二王威望先重咸有猜忌之心初在晉陽以大行在殯天子諒暗議令恆山王在東館欲奏之事皆先咨決二旬而止仍欲以恆山隨梓宫之鄴留長廣鎮晉陽執政復生疑二兩王又俱從至於鄴子獻立計欲處太皇太后於北宫歸政皇太后又自天保八年以來爵賞多濫至是愔先自表解其開封王諸叨竊冒榮者皆從黜免由是嬖寵失職之徒盡歸心二叔高歸彥初雖同德後尋反動以疏忌之迹盡告兩王可朱渾天和又每云若不誅二王少主無自安之理宋欽道靣奏帝稱二叔威權既重宜速去之帝不許曰可與令公共詳其事愔等議欲出二王為刺史以帝仁慈恐不可所奏乃通啓皇太后具述安危有宫人李昌儀者北豫州刺史高仲密之妻坐仲密事入宫太后與昌儀宗情甚相昵愛太后以啓示之昌儀密白太皇太后愔等又議不可令二王俱出且出其一乃奏以長廣王為大司馬并州刺史恆山王為太師録尚書事及二王拜職於尚書省大會百僚愔等並將同赴子默止之云事不可量不可輕脫愔云吾等至誠體國豈有恆山拜職有不赴之理何為忽有此慮長廣旦伏家僮數十人於録尚書後室仍與席上諸貴數人相知并與諸勳胄約行酒至愔等我各勸雙杯彼必致辭我一曰捉酒二曰捉酒三曰何不捉爾輩即捉及宴如之愔大言曰諸王反逆欲殺忠貞邪尊天子削諸侯赤心奉國未應及此恆山王欲緩之長廣王曰不可於是愔及天和欽道皆被拳杖亂歐擊頭面血流各十人持之使薛孤延康買執子默於尚藥局子默曰不用智者言以至於此豈非命也二叔率高歸彥賀拔仁斛律金擁愔等唐突入雲龍門見都督叱利騷招之不進使騎殺之開府成休寧拒門歸彥喻之乃得入送愔等於御前長廣王及歸彥在朱華門外太皇太后臨昭陽殿太后及帝側立恆山王以磚叩頭進而言曰臣與陛下骨肉相連楊遵彥等欲擅朝權威福自己自王公以還皆重足屏氣共相唇齒以成亂階若不早圗必為宗社之害臣與湛等為國事重賀拔仁斛律金等惜獻皇帝業共執遵彥等領入宫未敢刑戮專輒之失罪合萬死帝時默然領軍劉桃枝之徒陛衛叩刀仰視帝不睨之太皇太后令却杖不肯又厲聲曰奴輩即今頭落乃却因問楊郎何在賀拔仁曰一目已出太皇太后愴然曰楊郎何所能使畹不好耶乃讓帝曰此等懷逆欲殺我二兒次及我奈何縱之帝猶不能言太皇太后怒且悲王公皆泣太皇太后曰豈可使我母子受漢老嫗斟酌太后拜謝恆山王叩頭不止太皇太后謂帝曰何不安慰汝叔帝曰天子不能與叔惜亦豈能惜此漢輩但願乞兒性命兒自下殿去此等任叔父處分遂皆斬之長廣王以子默昔讒已作詔書故先拔其舌截其手太皇太后臨愔喪哭曰楊郎忠而獲罪以御金為之一眼親納之曰以表吾意恆山王亦悔殺之先是童謡曰白羊頭毣秃羖䍽頭生角又曰羊羊喫野草不喫野草逺我道不逺打爾腦又曰阿嬤姑禍也道人姑夫死也羊謂愔也角文為用力道人謂廢帝小名太原公主嘗作尼故曰阿嬤姑愔子獻天和皆尚帝姑故曰道人姑夫云於是乃以天子之命下詔罪之罪止一身家口不問尋復簿録五家王晞固諌乃各沒一房孩幼盡死兄弟皆除名遵彥死仍以中書令趙彥深代總機務鴻臚少卿陽休之私謂人曰將涉千里殺騏驎而䇿蹇驢可悲之甚愔所著詩賦表奏書論甚多後散失門生鳩聚所得萬餘言燕子獻字季則廣漢下洛人少時相者謂曰使役在朝大富貴在齊趙後遇周文於關中創業用為典籖將命使蠕蠕子獻欲驗相者之言來歸神武神武見之大恱神武舊飬韓長之姑為女是為陽翟公主遂以嫁之甚被待遇文宣時官至侍中濟南即位委任彌重除尚書右僕射子獻素多力頭少髮當狼狽之際排衆走出省門斛律光逐而禽之子獻嘆曰丈夫為計遲遂至此天統五年追贈司空天和事見兄元傳鄭頥字子默彭城人高祖據魏彭城太守自滎陽徙焉頥聰敏頗涉文義而邪險不良初為太原公東閣祭酒天保世稍遷中書侍郎與宋欽道特相友愛欽道每師事之楊愔始輕宋鄭不為之禮俄而自結人主稍不可制欽道舊與濟南款狎共相引致無所不言乾眀初拜散騎常侍兼中書侍郎二人權將與愔相埒愔見害之時邢子才流涕曰楊令君雖善人死日恨不得一佳伴頥後與愔同詔追贈殿中尚書廣州刺史頥弟抗字子信頗有文學武平末兼左右郎中待詔文林館陽休之字子烈右北平無終人父固魏前將軍休之俊爽有風概少勤學愛文藻弱冠擅聲為後來之秀時人為之語曰能賦能詩陽休之初為州主簿孝昌中杜洛周陷薊城休之與宗室南奔章武轉至青州葛榮寇亂河北流人多湊青州休之知將有變請其族叔伯彥等潛歸京師避之多不能從休之垂涕别去俄而葛榮邢杲作亂伯彥等咸為土人所殺諸陽死者數十人惟休之兄弟免魏莊帝立纍遷太尉記室參軍李神俊監起居注啓休之與河東裴伯茂范陽盧元眀河間邢子才俱入撰次後與魏收李同軌等修國史後行臺賀拔勝經略樊沔請為南道軍司俄而魏孝武帝入關勝令休之奉表詣長安參謁時神武亦啓除休之太常少卿尋屬勝南奔仍隨勝至江南休之聞神武推奉靜帝乃白勝啓梁武求還文襄以為大行臺郎中天保中神武幸汾陽之天池池邉得一石上有隱起字其文曰六王三川神武以問休之曰此文字何義對曰六者是大王之字王當有天下此乃大王符瑞受命之祥既於天池得此石可謂天意命王也吉不可言神武又問三川何義休之曰河洛伊為三川此洛陽也而涇渭洛亦為三川此雍州也大王若受天命終應統於關右神武曰世人無事嘗道我欲反今若聞此更致紛紜慎莫妄言也元象初録荆州軍功封新泰縣伯武定二年除中書侍郎先是中書專掌綸誥魏宣武以來事移門下至是發詔依舊任遇甚顯時魏收為散騎常侍兼侍郎與休之參掌詔命世論以為中興時有人士戲嘲休之云有觸藩之羝羊乘連錢之驄馬從晉陽而向鄴懷屬書而盈把左丞盧斐以其文書請謁啓神武禁止會赦不問歷尚食典御太子中庶子給事黃門侍郎中軍將軍幽州大中正兼侍中持莭奉璽書詣并州敦喻文宣為相國齊王時將受魏禪發晉陽至平陽郡為人心未一旦還并州恐漏泄仍斷行人休之性疏放使還遂説其事鄴中悉知之高德正以聞文宣忿之而未發及受禪除散騎將軍積其前事也文宣郊天百寮咸從休之衣兩襠甲手持白棓時魏收為中書令嘲之曰義真服未休之曰我昔為常伯首戴蟬冕今處驍遊身被衫甲允文允武何必減卿談笑晏然議者服其夷曠以禪讓之際參定禮儀别封始平縣男後除中山太守先是韋道建宋欽道代為定州長史帶中山太守並立制監臨之官出行不得過百姓飲食有者即數錢酬之休之常以為非及至郡復相因循或問其故休之曰吾昔非之者為其失仁義今日行之者自欲避嫌疑豈是夙心直是處世難耳在郡三年再致甘露之瑞文宣崩徴休之至晉陽經紀喪禮與魏收俱至尚書令楊遵彥與休之等款狎相遇中書省言及喪事收掩淚收聲休之嚬眉而已他日遵彥謂曰昨聞韓魏少傅悲不自勝卿何容都不流涕休之曰天保之世魏侯時遇甚深鄙夫以衆人見待佞哀詐泣實非本懷皇建初兼度支尚書孝昭留心政道每訪以治術休之啓以眀賞罰慎官方禁淫侈恤民患為政教之先帝深納之大寧中歷都官七兵祠部三尚書河清三年出為西兖州刺史天統初徴為光祿卿監國史尋除吏部尚書休之多識故事諳悉氏族凡所遷用莫不才地俱允前國史助教熊安生當時碩儒因喪解職久不見調休之引為國子博士儒者以此歸之性間率不樂煩職每謂人曰此官實自清華但煩劇妨吾賞適真是樊籠矣武成崩後頻乞就間武平初除中書監尚書右僕射三年加位特進與朝士撰聖夀堂御覽六年正除尚書左僕射領中書監休之早得才名為人物所傾服外如疏放內實謹厚少年頗以峻急為纍晚莭以通美見稱重襟期好遊賞太常卿盧元眀人地華重罕所交接非一時名士不得與之逰休之始為行臺郎便坦然投分文酒會同相得甚款鄉曲人士莫不企羡焉太子中庶子平原眀少遐風流名士也梁亡奔鄴昔因通聘與休之同遊及少遐卒其妻窮敝休之經紀振恤恩分甚厚尚書僕射崔暹為文襄所親任勢傾朝列休之未嘗請謁暹子逹拏幼而聰敏年十餘已作五言詩梁國通和聘使在館暹持逹拏數首詩示諸朝士有才學者又欲示梁客餘人畏暹皆隨宜應對休之獨正言郎子聰眀方成偉器但小兒文藻恐未可以示逺人其方直如此元景每云當今直諌楊子烈其有焉晚節説祖珽撰御覽書成加特進又白珽令其子辟強預修御覽辟強無才藝為人所嗤鄙及珽被黜便布言于朝云先有嫌隙及鄧長顒顔之推奏立文林館之推本意不欲令耆舊故人知之休之便相附會與少年朝請參軍之徒同入待詔時論貶焉魏收監史之日立神武本紀取平四胡之歲為齊元收在齊州恐史官改奪其志上表論之及收還朝敕集朝賢議其事休之立議從天保為限斷魏收存日猶兩議未決收死後便諷動內外發詔從其議後領中書監便謂人云我已三為中書監用此何為隆化還鄴舉朝多有遷授封休之燕郡王又謂其所親云我非蠻奴何意忽有此授凡此諸事皆為時論所鄙好學不倦遂博綜經史文章雖不華靡亦為典正魏收在日深為收所輕收卒後以先逹見推位望雖髙虛懷接物為縉紳所愛重周武平齊休之與吏部尚書袁聿修衛尉卿李祖欽度支尚書元修伯大理卿司馬幼之司農卿崔逹拏祕書監源宗散騎常侍兼中書侍郎李若散騎常侍兼給事黃門侍郎李孝貞給事黃門侍郎盧思道給事黃門侍郎顔之推通直散騎常侍兼中書侍郎李德林通直散騎常侍兼中書舍人陸乂中書侍郎薛道衡中書舍人元行恭辛德源王劭陸開眀十八人同徴令隨駕後赴長安尋除開府儀同依例封臨澤縣男歷納言中大夫太子少保進位上開府除和州刺史隋開皇二年罷任終於洛陽所著文集四十卷又撰幽州人物志並行於世初休之在洛將仕夜夢見黃河北驛道上行從東向西道南有一冡極高大休之步登冡頭見一銅柱趺為蓮花形休之從西北登一柱礎上以手捉一柱柱遂右轉休之呪曰柱轉三匝吾至三公柱遂三匝而止休之尋寤意如在鄴城東南者其夢竟驗云子辟強字君大性疏脫無才藝休之亦引入文林館為時人所嗤鄙武平末為尚書水部郎中休之弟綝之天平中入關次俊之位兼通直常侍聘陳副尚書郎當文襄時多作六言歌辭淫蕩而拙世俗流轉名為陽五伴侣寫而賣之在市不絶俊之嘗過市取而改之言其字誤賣書者曰陽五古之賢人作此伴侣君何所知輕敢議論俊之大喜後待詔文林館自言有文集十卷家兄亦不知吾是才士也休之從祖弟斐字叔鸞父藻魏瀛州安東府長史斐魏孝莊時於西兖州督護流人有功賜爵方城伯歷廣平王開府中郎修起居注除起部郎中兼通直散騎常侍聘梁梁尚書羊侃魏之叛人也與斐舊故欲召斐至宅三致書斐不答梁人曰羊來已久經貴朝遷革李盧亦詣宅相見卿何致難斐曰桞下惠則可吾不可梁武帝又親謂斐曰侃極願相見今二國和好安得復論彼此斐終辭焉還除廷尉少卿石濟河溢橋壞斐移津於白馬中河起石灘兩岸造關城纍年乃就東郡太守陸士佩以黎陽關河形勝欲因山壑以為公家苑囿斐書答以國步始康人勞未息誠宜輕徭薄賦勤恤民隱不從天保中除都水使者詔斐監築長城纍遷殿中尚書以本官監瀛州事拜儀同三司卒贈中書監北豫州刺史諡曰簡子師孝中書舍人斐從叔昭字元景學涉史傳尤間案牘為文襄府墨曺參軍甚見親委與陳元康崔暹等參謀機密及崔㥄為崔暹所告昭劾成其獄賴邢子才為㥄申雪以免昭由是為時論所不與初文襄擇日將受魏禪令昭等定儀注草詔册并授官未畢而文襄殂罷府天保初除給事黃門侍郎後以風氣彌留不堪近侍出除青州高陽內史卒於郡文集十卷子靜立性淳孝摻履清方美詞令善尺牘仕齊位三公郎中隋開皇初州主簿李稚亷趙郡高邑人也父紹魏殷州别駕兄義深梁州刺史義深自有傳稚亷少而寡欲為兒童時初不從人有所求請家人故以金寶授之終不取強付之輒擲於地州牧以其蒙稚而亷故以名焉稚亷聰敏好學年十五頗尋覽五經章句釋褐奉朝請纍除文襄驃騎府長史文襄薦為濟州儀同府長史又遷瀛州長史神武行經冀州部總合河北六州文籍商𣙜户口增損神武親自部分多在馬上徴責文簿指影取偹事緒非一稚廉每應機立成當先期會莫不雅合深旨為諸州凖的神武嘗謂司馬子如曰觀稚亷處分快人意也因集文武數十人令郎中杜弼宣旨慰勞仍詰諸州刺史守令等曰碎卿等諸人作得李長史一腳指不足時諸人並謝罪稚廉獨前拜恩觀者咸歎美之賜以牛酒神武還并州以告文襄文襄喜謂人曰吾足知人矣文襄嗣事召詣晉陽除霸府椽文襄謂杜弼曰并州王者之基須好長史令各舉所知多不見納文襄後因大集乃謂陳元康曰我教君好長史處李稚廉即其人也遂命為并州長史常在文襄第內與隴西辛術等六人號為館客待以上賓之禮天保初為太原太守文宣嘗召見問以治方語及政刑寬猛帝終欲深文稚廉固以為非帝意不悅又與語及楊愔稚亷誤稱為楊公以應對失宜除濟隂太守纍遷太僕大司農二卿趙州大中正大理卿所在稱職後主時和士開權重百僚盡傾稚廉高揖而已由是出為南青州刺史州主簿徐乾富而暴橫歷政不能禁稚廉初至因其有犯收繫之乾密通疏奉黃金百挺婢妓二十人稚廉不受遂殺之罷還鄴祖孝徴執政求紫石英於稚亷以其南青州所出稚廉辭無好者固請乃與二兩孝徴有不平之言或以告稚廉稚廉抗聲曰李稚廉結髮從官誓不曲意求人天生德於豫孝徴其如豫何假欲挫頓不過遣向并州耳時已授并省都官尚書辭而未報遂發勑遣之齊末官至三品已上悉加儀同稚廉獨不霑此例語人曰我不為儀同更覺為榮耳卒贈吏部尚書稚廉族弟神威幼有風裁家業禮學又善音樂撰集樂書近百卷卒於尚書左丞又有李翥字彥鴻世居柏人弱冠以文章知名仕齊位東平太守後待詔文林館除通直散騎常侍聘於梁晚莭頗以貪酒為纍貧無居宅寄止佛寺中常著巾帔終日對酒招致賔客風調詳雅翥從父兄子朗翥之流亞兼有吏能位中書舍人王昕字元景北海劇人也六世祖猛秦苻堅丞相家於華山之鄜城祖嶷魏孝文世為內都大官父雲位南兖州刺史昕少篤學能誦書日以中疊舉手極上為率與太原王延業俱詣魏安豐王延眀延眀歎美之太尉汝南王悅辟為騎兵參軍舊事王出騎兵則武服持刀陪從昕耻之未嘗肯依行列恱好逸遊或馳騁信宿昕輒棄還恱乃令騎兵在前手為驅䇿昕舍轡高拱任馬所之左右言其誕慢恱曰府望惟在此賢不可責也恱數散錢於地令諸佐爭拾之昕獨不拾恱又散銀錢以目昕昕乃取其一恱與府僚飲酒起自移牀人爭進手昕獨執版却立恱於是作色曰我帝孫帝子帝弟帝叔今為宴通親起輿牀卿何人也獨為偃蹇對曰王元景位望微劣不足使殿下式瞻儀形安敢以親王寮寀從厮飬之役恱謝焉在坐皆引滿酣暢昕先起卧於間室頻召不至恱乃自詣呼之曰懷其才而忽府主可謂仁乎昕曰商辛沉湎其亡也忽諸府主自忽慠寮佐敢任其咎恱大笑而去後除著作佐郎以兵亂漸起將避地海隅侍中李琰之黃門侍郎王遵業惜其名士不容外任奏除尚書右外兵郎中出為光州長史故免河隂之難遷東萊太守於時年凶人多相食昕勤恤民隱多所全濟昕少時與河間邢邵俱為元羅賔友及守東萊邵舉室就之郡人以邵是邢杲從弟會兵將執之昕以身蔽伏其上呼曰欲執子才當先執我邵乃免太昌初還洛吏部尚書李神俊奏言比因多故常侍遂無員限今以王元景等為常侍定限八員加金紫光祿大夫孝武或時袒露與近臣戲狎每見昕即正冠而斂容焉昕體素肥遭喪後遂終身羸瘠楊愔重其德業以為人之師表元象元年兼散騎常侍聘梁魏收為副並為朝廷所重使還高隆之求貨不得諷憲臺劾昕收在江東大將商人市易並坐禁止文襄營救之纍遷祕書監昕雅好清談詞無淺鄙在東萊時獲殺其同行侣者詰之未服昕謂之曰彼物故不歸卿無恙而返何以自眀邢邵後見文襄言及此以為笑樂昕聞之故詣邵曰卿不識造化還謂人曰子才應死我罵之極深頃之以被謗左遷陽平太守在郡有稱績文襄謂人曰王元景殊獲吾力由吾數戲之其在吏事遂為良二千石文宣踐阼拜七兵尚書以參儀禮封宜君縣男嘗有鮮卑聚語崔昻戲問昕曰頗解此不昕曰樓羅樓羅實自難解時唱染干似道我輩文宣以昕踈誕非濟世才罵曰好門户惡人身又有讒之者云王元景每嗟水運不應遂絶帝愈怒乃下詔曰元景本自庸才素無勳行早霑纓紱遂履清途發自畿邦超居詹事俄佩龍文之劍仍啓帶礪之書語其器分何因到此誠宜清心勵已少酬萬一尚書百揆之本庶務攸歸元景豫奪任情威福在已能使直而為枉曲反成弦害政損公名義安在偽賞賔郎之味好吟輕薄之篇自謂模擬傖楚曲盡風制推此為長餘何足取此而不繩後將焉肅在身官爵宜從削奪於是徙幽州為百姓昕任運窮通不改其摻未幾徴還奉敕送蕭莊於梁為主除銀青光祿大夫判祠部尚書事帝怒臨漳令嵇曄及舍人李文師以曄賜薛豐洛文師賜崔士順為奴鄭子默私誘欣曰自古無朝士作奴昕曰箕子為之何言無也子默遂以昕言啓文宣仍曰王元景比陛下於商辛楊愔微為解之帝謂愔曰王元景是爾博士爾語皆元景所教帝後與群臣酣飲昕稱病不至帝遣騎執之見方搖膝吟詠遂斬於御前投尸漳水天保十年也天統末追贈吏部尚書有文集二十卷子顗嗣卒於燕郡太守昕母清河崔氏有學識風訓生九子並風流藴藉世傳王氏九龍昕弟暉昭晞晧最知名暉字元旭少與昕齊名兼多藝術卒於中書舍人贈兖州刺史昭字仲亮少好儒術又頗以武藝自許性敦篤以友悌知名卒於考功郎中晞字叔朗小名沙彌幼而孝謹淹雅有器度好學不倦美容儀有風則魏末隨母兄東適海隅與邢子良逰處子良愛其才悟與其在洛兩兄書曰賢弟彌郎意識深逺曠逹不虧簡於造次言必詣理吟詠情性麗絶當時恐足下方難為兄不假慮其不進也魏永安初第二兄暉聘梁啓晞釋褐除員外散騎侍郎徴署廣平王開府功曺史晞願飬母竟不受署母終之後仍屬遷鄴遨逰鞏洛樂其山水與范陽盧元眀魏季景結侣同契往天陵山浩然有終焉之志及西魏將獨孤信入洛署為開府記室晞稱先被犬傷困篤不赴有故人疑其所傷非猘書勸令赴晞復書曰辱告存念見令起疾循復眷旨似疑吾所傷未必是猘吾豈願其必猘但理契無疑耳就足下疑之亦有過説足下既疑其非猘亦可疑其是猘則疑半矣若疑其是猘而營護雖非猘亦無損疑其非猘而不療倘是猘則難救然則過療則至萬全過不療或至於死若王晞無可惜也則不足取既取之療是可惜奈何奪其萬全任其或死且將軍威德所被颷飛霧襲方掩八紘豈在一介若必從隗始先須濟其生靈足下何不從容為將軍言也於是方得見寬俄而信返晞遂歸鄴神武訪朝廷子弟忠孝謹密識達淹通者令與諸子遊晞與清河崔贍頓邱李度范陽盧正通首應此選文襄時為大將軍握晞等手曰吾弟並向成長志識未定近善狎惡不能不移吾弟不負義方卿祿位常亞吾弟若茍使回邪致用詿誤罪及門族非止一身晞隨神武到晉陽補中外府功曺參軍帶恆山王演友天保初行太原郡事及文宣昏逸恆山王演數諌爭帝疑王假辭於晞欲加大辟王私謂晞曰王博士眀日當作一條計事欲為相活亦圖自全宜深體勿怪乃於衆中杖晞二十帝正發怒聞晞得杖以故不殺髠鞭鉗配甲坊居三年王又固諌大被歐撻閉口不食太后極憂之帝謂左右曰儻小兒死奈我老母何於是每臨王疾謂王努力強食當以王晞還汝乃釋晞令往王第王抱晞曰吾氣息惙然恐不復相見晞流涕曰天道神眀豈令殿下遂斃此舍至尊親為人兄尊為人主安可與計殿下不食太后亦不食殿下縱不自惜不惜太后乎王於是強坐而飯晞由是得免徙還為王友王復録尚書事新除官者必詣王謝職去必辭晞言於王曰受爵天朝拜恩私第自古以為干紀朝廷文武出入辭謝宜一皆約絶主上顒顒賴殿下扶翼王深納焉王嘗從容謂晞曰主上起居不恆卿耳目所具吾豈得以前逄怒遂爾結舌卿宜撰諌草吾當伺間極諌晞遂條十餘事以呈因復切諌王曰比干強諌不量時之可否雖忘身於刳剖而致本朝以危亡今朝廷乃爾欲學介子匹夫輕一朝之命且狂藥令人不自覺刀箭豈復識親踈一旦禍出理外將奈殿下家業何奈皇太后何且乞將順日慎一日王歔欷不自勝曰乃至是乎眀日見晞曰吾長夜九思今便息意命火對晞焚之其後王見危機轉切承間苦諌遂致忤旨大被困辱帝使力士反接伏白刃注頸王曰臣不忍見宗廟阽危乞早行決帝罵之曰小子何知乃以吏才非我是誰教汝王曰天下噤口除臣誰敢有言帝催遣捶楚亂杖數十會醉卧得解爾後褻黷之好遍於宗族所在畹連俾晝作夜唯常山邸多無適而去及帝崩濟南嗣立王謂晞曰一人垂拱吾曺亦頗優間因言朝廷寬仁慈恕真守文之良主也晞曰天保享祚左右無柱石之才東宫委一胡人令習鞭轡自幼而長不聞雅正今卒覽萬幾駕馭雄桀如聖德幼沖未堪多難殿下宜朝夕承旨而勿使他姓貴戚出納詔命必致矯㺯權有所歸殿下雖欲守藩職樂為善其可得乎假令得遂沖退自審家祚保靈長不王默然思念久之曰何以處我晞曰周公抱成王以朝諸侯攝政七年然後復子眀辟幸有故事惟殿下慮之他日王又問晞曰外人有何議論對曰見源文宗云録王宜居內夾輔不可出外又陽休之亦云昔周公朝讀百篇書夕見七十士猶恐不得人録王何所嫌疑乃爾不接賔客王曰我安敢自擬周公晞曰殿下今日地望欲避周公得邪王不答帝臨發速王從駕除晞并州長史及王從至鄴誅楊燕等詔以王為大丞相都督中外諸軍事督攝文武選并州及至延晞內齋謂曰近人説我在京舉措何如晞曰伏聞殿下精誠感天誅五罪而天下服往日奉辭恐二儀奔墜何悟神武潛斷朝廷廓清王曰不早用卿言使群小㺯權幾至傾覆今君側雖清終當何以處我晞曰陛下將往時位地猶可以名教出處今日事勢遂關天時非復人理所及有頃奏趙郡王睿為左長史晞為司馬每夜載入晝則不與語以晞儒緩將不允武將之意後進晞密室曰比王侯諸貴每見煎迫言我違天不祥恐當或有變起吾正欲以正法繩之晞曰朝廷比者踈逺親戚寧思骨肉之重殿下倉卒所行非復人臣之事芒刺在背交戟入頸上下相疑何由可久天道不常虧盈迭至神機變化肸蠁斯集雖執謙挹粃粳神器便是違上元之意墜先人之基王曰卿何敢須發非所宜言須致卿於法晞曰竊謂天時人事同無異揆是以冒犯雷霆不憚斧鉞今日得披肝膽抑亦神眀攸贊王曰拯難匡時方俟聖哲吾何敢私議幸勿多言尋有詔以丞相任重普進府僚一班晞以司馬領吏部郎中丞相從事中郎陸杳將出使臨别握晞手曰相王功格區宇天下樂推歌謡滿道物無異望杳等伏𨽻願披赤心而忽奉外使無由面盡短誠寸心謹以仰白晞尋述杳言王曰若內外咸有異望趙彥深朝夕左右何因都無論自以卿意試密與言之晞以事隙問彥深彥深曰我比亦驚此音謡每欲陳聞則口噤身戰弟既發論吾亦欲昧死一披肝膽因亦同勸是時諸王公將相日日勸請四方嶽牧表陳符命乾眀元年八月孝昭帝踐阼除散騎常侍仍領兼吏部郎中後因奏事罷帝從容曰比日何為自同外客略不可見自今假非局司但有所懷隨宜作一牒候少隙即徑進也因敕尚書陽休之鴻臚卿崔劼等三人每日本職務罷並入東廊共舉録歷代廢禮墜樂職司廢置朝饗異同輿服增損或道德高俊久在沉淪或巧言眩俗妖邪害政爰及田市舟車徴稅通塞婚葬儀軌貴賤等衰有不便於時而古今行用不已者或自古利用而當今毁棄者悉令詳書以漸條奏未待頓偹遇憶續聞朝晡給典御食畢景聼還時百官請建東宫敕未許每令晞就東堂監視太子冠服導引趨拜尋為太子太傅晞以局司奉璽授皇太子太子釋奠又兼中庶子帝謂曰今既當劇職不得尋常舒慢也帝將北征敕問比何所聞晞曰道路傳言車駕將行帝曰庫莫奚南侵我未經親戎因此聊欲習武晞曰鸞駕巡狩為復何爾若輕有征戰恐天下失望帝曰此懦夫常慮吾自當臨時斟酌帝使齋帥裴澤主書蔡暉伺察群下好相誣枉朝士呼為裴蔡時二人奏車駕北征後陽休之王晞數與諸人遊宴不以公事在懷帝杖休之晞脛各四十帝斬人於前而問晞曰此人合死否晞曰罪實合死但恨其不得其地臣聞爵人於朝與士共之刑人於市與衆棄之殿廷非殺戮之所帝改容曰自今已後當為王公改之帝欲以晞為侍中苦辭不受或勸晞勿自踈晞曰我少年已來閲要人多矣充詘少時鮮不敗績且性實踈緩不堪時務人主恩私何由可保萬一披猖求退無地非不愛作熱宫但思之爛熟耳百官嘗賜射晞中的當得絹為不書箭有司不與晞陶陶然笑曰我今假可謂武有餘文不足矣晞無子帝將賜之妾使小黃門就宅宣旨皇后相聞晞妻晞令妻答妻終不言晞以手撩胸而退帝聞之笑孝昭帝崩晞哀慕殆不自勝因以羸敗武成本忿其儒緩由是彌嫌之因奏事大被呵叱而雅步晏然歷東徐州刺史祕書監武平初遷大鴻臚加儀同三司監修起居注待詔文林館晞性間淡寡欲雖王事鞅掌而雅􅍾不移久在并州戎馬闐閭未嘗以世務為纍良辰美景嘯詠遨遊登臨山水以談燕為事人士謂之方外司馬嘗詣晉祠賦詩曰日落應歸去魚鳥見留連忽有相王使召晞不時至眀日丞相西閣祭酒盧思道問晞曰昨被召已來頗得無以魚鳥致怪晞緩笑曰昨晚陶然頗以酒漿被責卿輩亦是留連之一物豈直魚鳥而已及晉陽陷敗與同志避周兵東北走山路險迥懼有土賊而晞溫酒服膏曽不一廢每不肯疾去行侣尤之晞曰莫尤我我行事若不悔作三公矣齊亡周武帝以晞為儀同大將軍太子諌議大夫隋開皇元年卒於洛陽年七十一贈儀同三司曺州刺史晧字季高少立名行為士友所稱遭母憂居喪有至性儒緩亦同諸兄嘗從文襄北征乘赤馬且蒙霜氣遂不復識自言失馬虞候為求覔不得須臾日出馬體霜盡繫在幕前自言我馬尚在為司徒椽在府聼午鼓蹀躞待去羣寮嘲之曰王七思歸何太疾季高曰大鵬始欲舉燕雀何啾唧嘲者曰誰家屋當頭鋪首浪遊逸於是喧笑季高不復得言大寧初兼散騎常侍聘陳使主天統末修國史尋除通直散騎常侍卒贈郢州刺史子伯奉朝請待詔文林館晧弟曄字季炎卒於滄州司馬崔昻字懷逺博陵安平人祖挺魏幽州刺史父孝偉趙郡太守挺自有傳昻年七嵗而孤伯父吏部尚書孝芬嘗謂所親曰此兒終當逺致是吾家千里駒也昻性端直少有智略頗綜文詞天平二年文襄引為記室參軍委以腹心之任及輔朝政召為開府長史并攝京畿長史時勳將親族賓客在都下放縱多行不軌孫騰司馬子如之門尤劇昻受文襄密旨以法繩之未幾之間內外齊肅尋遷司徒右長史時左府有陽平人吳賔為妄認繼嗣事披訴經久長史王昕即中鄭憑掾盧斐屬王敬寶等窮其獄始末積年鞫掠不獲實司徒婁昭付昻推問即日詰根緒獲其真狀昭歎曰左府都官數人不如右府一長史昕憑甚以為愧武定中文襄普令內外極言得失昻上書曰屯田之設由來尚矣曺魏破蜀業以興師馬晉平吳兵因取給朝廷頃以懷洛兩邑鄰接邉境創立營田儲糧果贍凖此而論龜鏡非逺其幽安二州控帶奚賊蠕蠕徐揚兖豫連接吳越強鄰實藉轉輸之資常勞私糴之費諸道别遣使營之每考其勤惰則人加勸勵倉廪充實供軍濟國實謂在兹其次法獄之重人命所懸頃者官司紏察多不審練乃聞緣淺入深未有雪大為小咸以畏避嫌疑共相殘劾至如錢絹粟麥其狀難分徑指為贓罪從此定乞敕群司務存獲實如此則有息將來必無枉濫文襄納之後除尚書左丞其年又兼度支尚書左丞之兼尚書近代未有朝野榮之度支水漕陸運昻設轉輸相入之差付給新陳之法有利於人遂為常式右僕射崔暹奏請海沂煮鹽有利軍國文襄以問昻昻曰亦既官煮須斷民竈官力雖多不及人廣請凖關市薄為竈稅私館官給彼此有宜朝廷從之武定六年甘露降宫闕文武同賀顯揚殿魏帝問僕射崔暹尚書楊愔崔㥄邢邵散騎常侍魏收御史中丞陸􅍾國子祭酒李澤等曰自古甘露為瑞漢魏多少可各言往代所降之處德化感致所由次至昻曰按瑞圗王者德至於天則甘露降吉凶兩門不由符瑞故桑雉之戒實啓中興小鳥孕大未聞福感所願陛下雖休勿休允答天意魏帝為斂容後攝都官尚書上勸田事七條尋兼太府卿齊受禪遷散騎常侍兼太府卿大司農卿二寺所掌世號繁劇昻校理有術下無姦偽又奏上橫市妄費事三十四條其年與太子少師邢邵議定國初禮式仍封華陽縣男又詔刪定律令損益禮樂令尚書右僕射薛琡等四十三人在領軍府議定帝尋幸晉陽將發敕遞相遵率不者令昻以聞昻部分科條校正今古所損增十有七八轉廷尉卿昻性清嚴見黷貨之輩嫉之如讐是以治獄文深世論不以平恕相許又與尚書盧斐别典京畿詔獄並有殘刻之聲至於推繩大事理可眀言是非不至寃酷有濮陽人沈子遐齎侯景鐡劵告徐州都督府長史畢義緒期舉兵應景又衛尉卿杜弼門生郝子寬告弼誹謗并與元子雄謀逆帝怒甚付昻窮鞫昻皆執正雪免告者引妄獲罪天保三年除度支尚書時有肴藏小吏因內臣投書告事又别有飛書告事者並付昻窮檢昻言笑問咸得情告者辭窮並引嫌狀於是飛書遂絶轉都官尚書仍兼都官事食濟北郡幹文宣嘗幸東山百官預宴升射堂帝召昻於御座前謂曰舊人多出為州我欲以臺閣相付當用卿為令僕勿望刺史卿六十外當與卿本州中間州不可得也後九卿已上陪集東宫帝指昻及尉瑾司馬子瑞謂太子曰此是國家柱石汝宜記之未幾復侍宴金鳳臺帝歷數諸人咸有罪負至昻則曰崔昻直臣魏收才士婦兄妹夫俱省罪過十年䇿拜儀同燕子獻百司陪列帝謂昻曰歷思群臣可綱紀省闥者惟卿一人耳遂除兼右僕射數日後昻因入奏事帝謂尚書令楊愔曰昨不與崔昻正者言其太速眀日即拜為真未幾還為兼楊愔少時與昻不平文宣崩後遂免昻右僕射除開府儀同三司光祿勳皇建元年轉太常卿河清元年兼御史中丞太常如故昻從甥李公統坐高歸彥事誅依律婦人年六十以上免配宫時公統母年始五十餘而稱六十公統舅宜寶求吏以免其姊昻弗知録尚書彭城王浟發其事竟坐除名三年復為五兵尚書還祠部天統元年卒贈趙州刺史昻有風調才識立朝有堅正剛直之名然好揣上意感激時主或陳便宜蠲省或列隂私罪失深為文宣所知賞發言奬護人莫之能毁議曺律令京畿密獄及朝之大事多以委之昻情尚嚴猛好行鞭撻雖苦楚萬端對之自若前則崔暹季舒為之親援後乃高德正是其中表常有挾持意色矜高以此不為名流歸服有五子第三子液字君洽頗習文藻有學涉風儀器局為時論所許以奉朝請待詔文林館隋開皇中為中書侍郎崔季舒字叔正昻從曽祖子瑜之子也子瑜仕魏位鴻臚少卿季舒少孤性眀敏涉獵經史長於尺牘有當世才具年十七為州主簿為大將軍趙郡公琛所器重言之神武神武親簡丞即補季舒大行臺都官即中文襄輔政轉大將軍中兵參軍甚見親寵以魏帝左右須置心腹擢拜中書侍郎文襄為中書監移門下機事總歸中書又季舒善音樂故內伎亦回𨽻焉內伎屬中書自季舒始也文襄每進書魏帝有所諌請或文辭繁雜季舒輒修飾通之得申勸誡而已靜帝報答霸朝恆與季舒論之云崔中書是我妳母轉給事黃門侍郎領主大都統雖迹在魏朝而心歸霸府密謀大計皆得預聞於是賔客輻湊傾身接禮甚得名譽勢傾崔暹暹嘗於朝堂屏人拜之曰暹若得僕射皆叔父之恩其權重如此時勳貴多不奉法文襄無所縱捨外議以季舒及崔暹等所為甚被怨嫉及文襄遇難文宣將赴晉陽黃門郎陽休之勸季舒從曰一日不朝其門容刀季舒性愛聲色心在間放遂不請行欲恣其行樂司馬子如緣宿憾及尚食典御陳山提等列其過狀由是季舒及暹各鞭二百徙北邉天保初文宣知其無罪追為將作大匠再遷侍中俄兼尚書左僕射儀同三司大被恩遇乾眀初楊愔以文宣遺旨停其僕射遭母喪解任起服除光祿勳兼中兵尚書出為齊州刺史坐遣人度淮互市亦有贓賄事為御史所劾會赦不問武成居蕃曽病文宣令季舒療病偹盡心力太寧初追還引入慰勉纍遷度支尚書開府儀同三司營昭陽殿敕令監造以判事式為胡長仁密言其短出為西兖州刺史為進典籖於吏部被責免官又以詣廣寧王宅決韋鞭數十及武成崩不得預於哭泣久之除膠州刺史遷侍中開府食新安河隂二郡幹加左光祿大夫待詔文林館監撰御覽加特進監國史季舒素好圗籍莫年轉更精勤兼推薦人士奬勸文學議聲翕然逺近稱美祖珽受委奏季舒總監內作珽被出韓長鸞以為珽黨亦欲出之屬車駕將適晉陽季舒與張雕議以為夀春被圍大軍出拒信使往還須稟節度兼道路小人或相驚恐云大駕向并州畏避南寇若不啓諌必動人情遂與從駕文官連名進諌時貴臣趙彥深唐雍段孝言等初亦同心臨時疑二季舒與爭未決長鸞遂奏云漢兒文官連名總署聲云諌止并州其實未必不反宜加誅戮後帝即召已署表官人集含章殿以季舒張雕劉逖封孝琰裴澤郭遵等為首並斬之殿廷長鸞令棄其尸於漳水自外同署將加鞭撻趙彥深執諌獲免季舒等家屬男女徙北邉妻女及子婦配奚官小男下蠶室沒入資産季舒本好醫術天保中於徙所無事更鋭意研精遂為名手多所全濟雖位望轉高未嘗懈怠縱貧賤厮飬亦為之療護庶子長君尚書右外兵即中次鏡元著作佐即並流於長城未幾季舒等六人妻以年老放出後南安王思好更稱朝廷罪惡以季舒等見害為辭悉召六人兄弟子姪隨軍趣晉陽事敗長君等並從戮六人之妻又追入宫周武帝滅齊詔斛律光與季舒等六人同被優贈季舒贈開府儀同大將軍定州刺史高德正渤海蓨人也曽祖祐魏光祿大夫祖和璧中書博士父皓輔國將軍朝散大夫祐附高允傳德正幼而敏慧有風神儀表文宣引為儀同開府參軍知管記事甚相親狎神武又擢為相府椽委以腹心遷黃門侍郎方雅周慎動見稱述文襄嗣業如晉陽文宣在鄴居守令德正參掌機密彌見親重文襄暴崩事出倉卒群情草草勳將等以纘戎事重勸帝早赴晉陽帝亦回遑不能自決夜中召楊愔杜弼崔季舒及德正等始定䇿焉以楊愔從令德正居守以為相府司馬專知門下事德正與文宣舊相昵愛言無不盡散騎常侍徐之才及館客宋景業先為典文圗讖之學又陳山提家客楊子術有所援引並因德正勸文宣行禪代之事德正又披心固請文宣便發晉陽至平城都召諸勳將入告以受禪之事諸將愕然莫敢答者時長史杜弼密啓文宣云關西是國家勍敵若今受魏禪恐其自稱義兵挾天子而東向王將何以待之徐之才云今若先受魏禪關西自應息心縱欲屈強止當逐我稱帝譬如逐滿市一人得之衆心皆定弼無以對文宣以衆人意未協又先得太后旨云汝父如龍汝兄如虎皆以帝王之重不敢妄據尚以人臣終汝何容欲行舜禹事此正是高德正教汝又説者以為昔周武王再駕盟津然後革命於是乃旋晉陽自是居常不恱徐之才宋景業等每言卜筮雜占隂陽緯候必宜以五月應天順人德正亦敦勸不已仍白帝追魏收收至令撰禪代詔册九錫建臺及勸進文表至五月初文宣發晉陽德正又録在鄴諸事條進於文宣文宣令陳山提馳驛齎事條并密書與楊愔山提於五月至鄴楊愔即召太常卿邢邵七兵尚書崔㥄度支尚書陸摻太子詹事王昕給事黃門侍郎陽休之中書侍郎裴讓之等議撰儀注六日要魏太傅咸陽王坦録尚書事濟隂王暉業等總集引入北宫留於東齋受禪後乃放還宅文宣發至前亭所乘馬忽倒意甚惡之至平城都便不復肯進德正與徐之才苦請曰山提先去恐其漏泄不果即命司馬子如杜弼馳驛續入觀察物情七日子如等至鄴衆人以事勢已決無敢異言九日文宣至城南頓所時既未行詔敕諸公文書唯云奉約束德正及楊愔宣署而已受禪日堯難宗染赤雀以獻帝尋知之亦弗責也是日即除德正為侍中又領宗正卿尋遷吏部尚書侍中如故封藍田縣公天保七年遷尚書右僕射兼侍中食渤海郡幹德正與尚書令楊愔綱紀朝政多有𢎞益文宣末年縱酒酣醉德正屢進忠言帝不恱又謂左右云高德正恆以精神陵逼人德正甚憂懼乃移疾屏居佛寺兼學坐禪為退身之計帝謂楊愔曰我大憂高德正其疾何似愔知帝內忌之由是答云陛下若用作冀州刺史病即自瘥帝從之德正見除書而起帝大怒謂曰聞爾病我為爾針親以刀子刺之血流霑地又使曵下斬去其趾劉桃枝捉刀不敢下帝起臨陛切責桃枝桃枝乃斬足之三趾帝怒不解禁德正於門下省其夜開城門以氊輿送還家且日德正妻出寶物滿四牀欲以寄人帝奄至其宅見而怒曰我府藏猶無此物詰其所從得皆諸元賂之也遂曵出斬之妻出拜謝又斬之并其子司徒東閣祭酒伯堅亦見害後文宣謂羣臣曰高德正常言宜用漢人除鮮卑此即合死又教我誅諸元我今殺之為諸元報讎也帝後悔贈太保冀州刺史諡曰康嫡孫王臣龍爵藍田縣公給事中通直散騎侍郎德正次子仲武京畿司馬太原太守尉瑾代人也父慶賓魏光祿大夫贈司空瑾少而敏悟好學慕善以國姓門資稍遷直後司馬子如執政瑾娶其甥皮氏為妻由此除中書舍人後除吏部郎中文襄崩文宣命瑾在鄴北宫與高德正典機密天保中纍遷七兵尚書侍郎孝昭輔政除吏部尚書武成踐阼趙彥深本子如賔僚元文遙和士開並帝鄉故舊共相薦逹任遇彌重又吏部銓衡所歸事多祕密由是朝之機事頗亦預聞後為尚書右僕射卒武成方在三臺饗宴文遙奏聞遂命徹樂罷飲瑾外雖通顯內闕風訓閨行穢雜為世所鄙有女在室忽從奔誘瑾遂以適婦姪皮逸人瑾又通寡嫂元氏瑾嘗譏吏部即中頓邱李構云即不稽古構對令史云我誠不稽古未知通嫂得作稽古不瑾聞大慙然亦能折節下士意在引接名流但不之别也有賈彥始者儀望雖是儒生瑾稱堪充聘使司徒户曺祖崇儒文辨俱劣瑾言將為當世莫及好學吳人搖脣振足為人所哂見人好笑時論比之寒蟬又少威儀子德載以蒲鞭責之便自投井瑾自臨井上呼云兒出聞者皆笑及位任重便大􅀈急省內郎中將論事者逆即嗔罵既居大選彌自驕狠皮子賤恃其親通多所談薦大有受納瑾死後其弟靜忿而發之子賤坐決鞭二百配北營州瑾初為聘梁使梁人陳昭善相謂瑾曰二十年後當為宰相瑾出昭謂人曰此公宰相不過三年當死昭後為陳使主兼散騎常侍至齊瑾時兼右僕射鳴騶鐃吹昭復謂人曰二年當死果如言焉德載位通直散騎侍郎通志卷一百五十三
