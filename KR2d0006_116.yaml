body:
  text: 通志巻一百二下宋右廸功郎鄭樵漁仲撰列傳第十五下谷永字子雲長安人也父吉爲衛司馬使送郅支單于侍子爲郅支所殺語在陳湯傳永少爲長安小史後博學經書建昭中御史大失繁延壽聞其有茂材除補屬舉爲太常丞數上疏言得失建始三年冬日食地震同日俱發詔舉方正直言極諫之士太常陽城侯劉慶忌舉永待詔公車對曰臣聞明王卽位正五事建大中以承天心則庶徴序於下日月理於上如人君淫溺後宮般樂游田五事失於躬大中之道不立則咎徴降而六極至凡災異之發各象過失以類告人乃十二月朔戊申日食婺女之分地震蕭墻之内二者同日俱發以丁寧陛下厥咎不遠宜厚求諸身意豈陛下志在閨門未卹政事不愼舉錯婁失中與内寵大盛女不遵道嫉妬專上妨繼嗣與古之王者廢五事之中失夫婦之紀妻妾得意謁行於内埶行於外至覆傾國家或亂隂陽昔襃姒用國宗周以喪閻妻驕扇日以不臧此其效也經曰皇極皇建其有極傳曰皇之不極是謂不建時則有日月亂行陛下踐至尊之祚爲天下主奉帝王之職以統羣生方内之治亂在陛下所執誠留意於正身勉彊於力行損燕私之間以勞天下放去淫溺之樂罷去倡優之笑絶郤不享之義愼節游田之虞起居有常循禮而動躬親政事致行無倦安服若性經曰繼自今嗣王其毋淫于酒毋逸于游田惟正之共未有身治正而臣下邪者也夫妻之際王事綱紀安危之機聖王所致愼也昔舜飭正二女以崇至德楚莊忍絶丹姬以成伯功幽王惑於襃姒周德降亡魯桓脅於齊女社稷以傾誠修後宮之政明尊卑之序貴者不得嫉妬專寵以絶驕嫚之端抑襃閻之亂賤者咸得秩進各得厥職以廣繼嗣之統息白華之怨後宮親屬饒之以財勿與政事以遠皇父之類損妻黨之權未有閨門治而天下亂者也治遠自近始習善在左右昔龍筦納言而舜命惟允四輔旣備成王靡有過事誠勅正左右齊栗之臣戴金貂之飾執常伯之職者皆使學先王之道知君臣之義濟濟謹孚無敖戲驕恣之過則左右肅艾群僚仰法化流四方經曰亦惟先正克左右未有左右正而百官枉者也治天下者尊賢考功則治簡賢違功則亂誠審思治人之術歡樂得賢之福論材選士必誠於職明度量以程能考功實以定德無用比周之虛譽毋聽濅潤之譖愬則抱功修職之吏無蔽傷之憂比周邪僞之徒不得卽工小人日銷俊乂日隆經曰三載考績三考黜陟幽明又曰九德咸事俊艾在官未有功賞得於前衆賢布於官而不治者也尭遭洪水之災天下分絶爲十二州制遠之道㣲而無乖畔之難者德厚恩深無怨於下也秦居平土一夫大呼而海内崩析者刑罰深酷吏行殘賊也夫違天害德爲上取怨於下莫甚乎殘賊之吏誠放退殘賊酷暴之吏錮廢勿用益選溫良上德之士以親萬姓平刑釋寃以理民命務省繇役毋奪民時薄收賦税毋殫民財使天下黎元咸安家樂業不苦踰時之役不患苛暴之政不疾酷烈之吏雖有唐尭之大災民無離上之心經曰懷保小人惠于鰥寡未有德厚吏良而民畔者也臣聞災異皇天所以譴告人君過失猶嚴父之明誡畏懼敬改則禍銷福降忽然簡易則咎罰不除經曰饗用五福畏用六極傳曰六沴作見若不共御六罰既侵六極其下今三年之間災異鋒起小大畢具所行不享上帝上帝不豫炳然甚著不求之身無所改正疏舉廣謀又不用其言是循不享之迹無謝過之實也天責愈深此五者王事之綱紀南面之急務唯陛下留神對奏天子異焉特召見永其夏皆令諸方正對䇿語在杜欽傳永對畢因曰臣前幸得條對災異之效禍亂所極言闗於聖聰書陳於前陛下棄委不納而更使方正對䇿背可懼之大異問不急之常論廢承天之至言角無用之虛文欲末殺災異滿讕誣天是故皇天勃然發怒甲巳之間暴風三溱㧞樹折木此天至明不可欺之效也上特復問永永對曰日食地震皇后貴妾專寵所致是時上初卽位謙讓委政元舅大將軍王鳯議者多歸咎焉永知鳯方見柄用陰欲自託乃復曰方今四夷賔服皆爲臣妾北無薰粥冐頓之患南無趙佗呂嘉之難三垂晏然靡有兵革之警諸侯大者乃食數縣漢吏制其權柄不得有爲亡吳楚燕梁之埶百官盤互親踈相錯骨肉大臣有申伯之忠洞洞屬屬小心畏忌無重合安陽博陸之亂三者無毛髮之辜不可歸咎諸舅此欲以政事過差丞相父子中尚書宦官檻塞大異皆瞽説欺天者也竊恐陛下舍昭昭之白過忽天地之明戒聽晻昧之瞽説歸咎乎無辜倚異乎政事重失天心不可之大者也陛下卽位委任遵舊未有過政元年正月白氣較然起乎東方至其四月黄濁四塞覆冐京師申以大水著以震蝕各有占應相爲表裏百官庶士無所歸倚陛下獨不怪與白氣起東方賤人將興之表也黄濁冐京師王道微絶之應也夫賤人當起而京師道微二者已醜陛下誠深察愚臣之言致懼天地之異長思宗廟之計改往反過抗湛溺之意解偏駁之愛奮乾綱之威平天覆之施使列妾得人人更進猶尚未足也急復益納宜子婦人毋擇好醜毋避嘗字毋論年齒推法言之陛下得繼嗣於微賤之間乃反爲福得繼嗣而已母非有賤也後宮女史使令有直意者廣求於微賤之間以遇天所開右慰釋皇太后之憂慍解謝上帝之譴怒則繼嗣蕃滋災異訖息陛下則不深察愚臣之言忽於天地之戒咎根不除水雨之災山石之異將發不久𤼵則災異已極天變成形臣欲捐身關東不及事已疎賤之臣至敢直陳天意斥譏帷幄之私欲間離貴后盛妾自知忤心逆耳必不免於湯鑊之誅此天保右漢家使臣敢直言也三上封事然後得召待詔一旬然後得見夫由疏賤納至忠甚苦由至尊聞天意甚難語不可露願具書所言因侍中奏陛下以示腹心大臣以爲非天意臣當伏妄言之誅則以爲誠天意也奈何忘國家大本背天意而從欲唯陛下省察熟念厚爲宗廟計時對者數十人永與杜欽爲上第焉上皆以其書示後宮後上嘗賜許皇后書采永言以責之語在外戚傳永旣陰爲大將軍鳳説矣能實最高由是擢爲光禄大夫永奏書謝鳯曰永斗筲之材質薄學朽無一日之雅左右之介將軍説其狂言擢之皂衣之吏厠之争臣之末不聽浸潤之譖不食膚受之愬雖齊桓晉文用士篤密察父悊兄覆育子弟誠無以加昔豫子吞炭壞形以奉見異齊客隕首公門以報恩施知氏孟嘗猶有死士何况將軍之門鳯遂厚之數年出爲安定太守時上諸舅皆修經書任政事平阿侯譚年次當繼大將軍鳯輔政尤與永善陽朔中鳯病困薦從弟御史大夫音以自代上從之以音爲大司馬車騎將軍領尚書事而平阿侯譚位特進領城門兵永聞之與譚書勸令辭職闔門高枕爲智者首譚感永言遂辭讓不受領城門職由是譚音相與不平永遠爲郡吏恐爲音所危病滿三月免音奏請永補營軍司馬永數謝罪自陳得轉爲長史音用從舅越親輔政威權損於鳯時永復説音曰將軍履上將之位食膏腴之都任周召之職擁天下之樞可謂富貴之極人臣無二天下之責四面至矣將何以居之宜夙夜孳孳執伊尹之彊德以守職匡上誅惡不避親愛舉善不避仇讐以章至公立信四方篤行三者乃可以長堪重任久享盛寵太白出西方六十日法當參天今已過期尚在桑榆之間質弱而行遲形小而光微熒惑角怒明大逆行守尾其逆常也守尾變也意豈將軍忘湛漸之義委曲從順所執不彊不廣用士尚有好惡之忌蕩蕩之德未純方與將相大臣乖離之萌也何故始襲司馬之號俄而金火並有此變上天至明不虛見異唯將軍畏之愼之深思其故改求其路以享天意音猶不平薦永爲䕶菀使者音薨成都侯商代爲大司馬衛將軍永乃遷爲涼州刺史奏事京師訖當之郡時有黒龍見東萊上使尚書問永受所欲言永對曰臣竊見漢家行夏正夏正色黒黒龍同姓之象也龍陽德由小之大故爲王者瑞應未知同姓有見本朝無繼嗣之慶多危殆之隙欲因擾亂舉兵而起者邪將動心冀爲後者殘賊不仁若廣陵昌邑之類臣愚不能處也元年九月黑龍見其晦日有食之今年二月己未夜星隕乙酉日有食之六月之間大異四發二而同月三代之末春秋之亂未嘗有也臣聞三代所以隕社稷喪宗廟者皆由婦人與羣惡沈湎於酒書曰乃用婦人之言自絶于天四方之逋逃多罪是宗是長是信是使詩云燎之方陽寜或滅之赫赫宗周襃姒烕之易曰濡其首有孚失是秦所以二世十六年而亡者養生泰奢奉終泰厚也二者陛下兼而有之臣請略陳其效易曰在中餽無攸遂言婦人不得與政事也詩云懿厥哲婦爲梟爲䲭匪降自天生自婦人建始河平之際許班之貴傾動前朝熏灼四方賞賜無量空虚内臧女寵至極不可上矣今之後起天所不饗什倍于前廢先帝法度聽用其言官秩不當縱釋王誅驕其親屬假之威權從横亂政刺舉之吏莫敢奉憲又以掖庭獄大爲亂阱榜箠㿊於炮烙絶滅人命主爲趙李報德復怨反除白罪建治正吏多繫無辜掠立廹恐至爲人起責分利受謝生入死出者不可勝數是以日食再旣以昭其辜王者必先自絶然後天絶之陛下棄萬乗之至貴樂家人之賤事厭高美之尊號好匹夫之卑字崇聚僄輕無義小人以爲私客數離深宮之固挺身晨夜與羣小相隨烏集雜會飲醉吏民之家亂服共坐流湎媟嫚溷殽無别閔免遁樂晝夜在路典門户奉宿衛之臣執干戈而守空宮公卿百僚不知陛下所在積數年矣王者以民爲基民以財爲本財竭則下畔下畔則上亡是以明王愛養基本不敢窮極使民如承大祭今陛下輕奪民財不愛民力聽邪臣之計去高敞初陵捐十年功緒改作昌陵反天地之性因下爲高積土爲山發徒起邑並治宮館大興繇役重增賦斂徵發如雨役百乾谿費擬驪山靡敝天下五年不成而後反故又廣盱營表發人冢墓斷截骸骨暴揚尸柩百姓財竭力盡愁恨感天災異婁降饑饉仍臻流散冗食餧死於道以萬數公家無一年之畜百姓無旬日之儲上下俱匱無以相救詩云殷監不遠在夏后之世願陛下追觀夏商周所以失之以鏡考己行有不合者臣當伏妄言之誅漢興九世百九十餘載繼體之主七皆承天順道遵先祖法度或以中興或以治安至於陛下獨違道縱欲輕身妄行當盛壯之隆無繼嗣之福有危亡之憂積失君道不合天意亦已多矣爲人後嗣守人功業如此豈不負哉方今社稷宗廟福禍安危之機在於陛下陛下誠肯發明聖王之德昭然遠寤畏此上天之威怒深懼危亡之徴兆蕩滌邪辟之惡志厲精致政專心反道絶羣小之私客免不正之詔除悉罷北宮私奴車馬媠出之具克己復禮毋貳㣲行出飮之過以防迫切之禍深惟日食再旣之意抑損椒房玉堂之盛寵毋聽後宮之請謁除掖庭之亂獄去炮烙之䧟阱誅戮佞邪之臣及左右執左道以事上者以塞天下之望且寢初陵之作止諸繕治宮室闕更減賦盡休力役存䘏振捄困乏之人以弭遠方崇厲忠直放退殘賊無使素餐之吏久尸厚禄以次貫行固執無違夙夜孳孳婁省無怠舊愆畢改新德旣章纎介之邪不復載心則赫赫大異庶幾可銷天命去就庶幾可復社稷宗廟庶幾可保矣成帝性寛而好文辭又久無繼嗣數爲微行多近幸小臣趙李從微賤專寵皆皇太后與諸舅夙夜所常憂至親難數言故推永等使因天變而切諫勸上納用之永自知有内應展意無所依違每言事輙見答禮至上此對上大怒衛將軍商密擿永令發去上使侍御史收永勅過交道廐者勿追御史不及永還上意亦解自悔明年徴永爲太中大夫遷光禄大夫給事中元延元年爲北地太守時災異尤數永當之官上使衛尉淳于長受永所欲言永對曰臣聞王者躬行道德承順天地博愛仁恕恩及行葦籍税取民不過常法宮室車服不踰制度事節財足黎庶和睦則卦氣理效五徴時序百姓壽考庶草蕃滋符瑞並降以昭保右失道妄行逆天暴物窮奢極欲湛湎荒淫婦言是從誅逐仁賢離逖骨肉羣小用事峻刑重賦百姓愁怨則卦氣悖亂咎徵著郵上天震怒災異婁降日月薄食五星失行山崩川潰水泉踊出妖孽並見茀星耀光饑饉荐臻百姓短折萬物夭傷終不改寤惡洽變備不復譴告更命有德詩云乃眷西顧此惟予宅夫去惡奪弱遷命賢聖天地之常經百王之所同也加以功德有厚薄期質有修短時世有中季天道有盛衰陛下承八世之功業當陽數之標季渉三七之節紀遭無妄之卦運直百六之災阨三難異科雜焉同會建始元年以來二十載間羣災大異交錯鋒起多於春秋所書八世著記久不塞除重以今年正月己亥朔日有食之三朝之會四月丁酉四方衆星白晝流隕七月辛未彗星横天乘三難之際會畜衆多之災異因之以饑饉接之以不贍彗星極異也土精所生流隕之應出於饑變之後兵亂作矣厥期不久隆德積善懼不克濟内則爲深宮後庭將有驕臣悍妾醉酒狂悖卒起之敗北宮苑囿街巷之中臣妾之家幽閒之處徵舒崔杼之亂外則爲諸夏下土將有樊並蘇令陳勝項梁奮臂之禍内亂朝暮日戒諸夏舉兵以火角爲期安危之分界宗廟之至憂臣永所以破膽寒心豫言之累年下有其萌然後變見於上可不致愼禍起細微姦生所易願陛下正君臣之義無復與羣小媟黷燕飮中黄門後庭素驕慢不謹嘗以醉酒失臣禮者悉出勿留勤三綱之嚴修後宮之政抑遠驕妬之寵崇近婉順之行加惠失志之人懷柔怨恨之心保至尊之重秉帝王之威朝覲法出而後駕陳兵清道而後行無復輕身獨出飮食臣妾之家三者旣除内亂之路塞矣諸夏舉兵萌在民饑饉而吏不䘏興於百姓困而賦斂重發於下怨離而上不知易曰屯其膏小貞吉大貞凶傳曰饑而不損兹謂泰厥災水厥咎亡訞辭曰關動牡飛辟爲無道臣爲非厥咎亂臣謀簒王者遭衰難之世有饑饉之災不損用而大自潤故凶百姓困貧無以共求愁悲怨恨故水城關守國之固固將去焉故牡飛往年郡國二十一傷於水災禾黍不入今年蠶麥咸惡百川沸騰江河溢決大水泛濫郡國十五有餘比年喪稼時過無宿麥百姓失業流散羣軰守關大異較炳如彼水災浩浩黎庶窮困如此宜損常税小自潤之時而有司奏請加賦甚繆經義逆於民心布怨趨禍之道也牡飛之狀殆爲此發古者榖不登虧膳災婁至損服凶年不墍塗明王之制也詩云凡民有喪扶服捄之論語曰百姓不足君孰與足臣願陛下勿許加賦之奏益減太官導官中御府均官掌畜廪犧用度止尚方織室京師郡國工服官發輸造作以助大司農流恩廣施振贍困乏開關梁内流民恣所欲之以救其急立春遣使者循行風俗宣布聖德存䘏孤寡問民所苦勞二千石勅勸耕桑毋奪農時以慰綏元元之心防塞大姦之隙諸夏之亂庶幾可息矣永對奏天子甚感其言永於經書汎爲疏逹與杜欽杜鄴略等不能洽浹如劉向父子及揚雄其於天官京氏易最密故善言災異前後所上四十餘事畧相反覆專攻上身與後宮而已黨於王氏上亦知之不甚親信永所居任職爲北地太守歳餘衛將軍商薨曲陽侯根爲驃騎將軍薦永徴入爲大司農歲餘永病二月有司奏請免故事公卿病輙賜告至永獨即時免數月卒於家本名並以尉氏樊並反更名永云杜鄴字子夏本魏郡繁陽人也祖父及父積功勞皆至郡守武帝時徙於茂陵鄴少孤其母張敞女鄴壯從敞子吉學問得其家書以孝亷爲郞與車騎將軍王音善平阿侯譚不受城門職後薨上閔悔之乃復令譚弟成都侯商位特進領城門兵得舉吏如將軍府鄴見音前與平阿有隙卽説音與商親密音從其言由是二人皆重鄴後以病去郞及商爲大司馬衛將軍除鄴主簿以爲腹心舉侍御史哀帝卽位遷爲涼州刺史鄴居職寛舒少威嚴數年以病免是時帝祖母定陶傅太后稱太皇太后帝母丁姬稱帝太后而皇后即傅太后從弟子也傅氏侯者三人丁氏侯者二人又封傅太后同母弟子鄭業爲陽信侯傅太后尤與政專權元壽元年正月朔上以后父孔鄉侯傅晏爲大司馬衛將軍而帝舅陽安侯丁明爲大司馬驃騎將軍臨拜日食詔舉方正直言扶陽侯韋育舉鄴方正鄴對曰臣聞陽尊陰卑卑者隨尊尊者兼卑天之道也是以男雖賤各爲其家陽女雖貴猶爲其國陰故禮明三從之義雖有文德之母必繫於子春秋不書紀侯之母陰義殺也昔鄭伯隨姜氏之欲終有叔叚簒國之禍周襄王内廹惠后之難而遭居鄭之危漢興呂太后權私親屬又以外孫爲孝惠后是時繼嗣不明凡事多晻晝昬冬雷之變不可勝載竊見陛下行不偏之政每事儉約非禮不動誠欲正身與天下更始也然嘉瑞未應而日食地震民訛言行籌傳相驚恐案春秋災異以指象爲言語故在於得一類而逹之也日食明陽爲陰所臨坤卦乘離明夷之象也坤以法地爲土爲母以安静爲徳震不陰之效也占象甚明臣敢不直言其事昔曾子問從令之義孔子曰是何言歟善閔子騫守禮不茍從親所行無非禮者故無可閒也前大司馬新都侯莽退伏第家以詔策決復遣就國高昌侯宏去蕃自絶猶受封土制書侍中駙馬都尉遷不忠巧佞免歸故郡間未旬月則有詔還大臣奏正其罰卒不得遣而反兼官奉使顯寵過故及陽信侯業皆緣私君國非功義所止諸外家昆弟無賢不肖並侍帷幄布在列位或典兵衛或將軍屯寵意并於一家積貴之埶世所希見所希聞也至乃並置大司馬將軍之官皇甫雖盛三桓雖隆魯爲作三軍無以甚此當拜之日晻然日蝕不在前後臨事而發者明陛下謙遜無專承指非一所言輙聽所欲輙隨有罪惡者不坐辜罰無功能者畢受官爵流漸積猥正尤在是欲令昭昭以覺聖朝昔詩人所刺春秋所譏指象如此殆不在他由後視前忿邑非之逮身所行不自鏡見則以爲可計之過者疏賤獨偏見疑内亦有此類天變不空保右世主如此之至奈何不應臣聞野雞著怪高宗深動大風暴過成王怛然願陛下加致精誠事稽諸古以收帝怒以厭下心禎祥福禄何嫌不報鄴未拜病卒鄴言民訛言行籌及谷永言王者買私田彗星隕石牡飛之事皆爲時所稱初鄴從張吉學吉子竦又孤㓜從鄴學問亦著於世尤長小學小學文字之學也周禮八歳入小學保氏教國子以六書故因名云鄴子林清靜好古亦有雅材建武中歴位列卿至大司空其正文字過於鄴竦故世言小學者由杜公何武字君公蜀郡郫縣人也宣帝時天下和平四夷賔服神爵五鳳之間婁䝉瑞應而益州刺史王襄使辯士王襃頌漢德作中和樂職宣布詩三篇武年十四五與成都楊覆衆等共習歌之是時宣帝循武帝故事求通逹茂異士召見武等於宣室上曰此盛德之事吾何足以當之哉以襃爲待詔武等賜帛罷武詣博士受業治易以射策甲科爲即與翟方進交志相友光禄勲舉四行遷爲鄠令坐法免歸武兄弟五人皆爲郡吏郡縣敬憚之武弟顯家有市籍租常不入縣數負其課市嗇夫求商捕辱顯家顯怒欲以吏事中商武曰以吾家租賦繇役不爲衆先奉公吏不亦宜乎武卒白太守召商爲卒吏州里聞之皆服焉久之太僕王音舉武賢良方正徴對䇿拜爲諌大夫遷揚州刺史所舉奏二千石長吏必先露章服罪者爲虧除免之而已不服極法奏之抵罪或至死九江太守戴聖禮經號小戴者也行治多不法前刺史以其大儒優容之及武爲刺史行部錄囚徒有所舉以屬郡聖曰後進生何知廼欲亂人治皆無所決武使從事亷得其罪聖懼自免後爲博士毁武於朝廷武聞之終不揚其惡而聖子賔客爲羣盜得爲盜吏捕得之繫廬江聖自以子必死武平心決之卒得不死自是後聖慙服武每奏事至京師聖未嘗不造門謝恩武爲刺史二千石有罪應時舉奏其餘賢不肖敬之如一是以郡國各重其守相州中清平行郡必先卽學宮見諸生試其誦論問以得失然後入傳舍出記問墾田頃畝五榖美惡已乃見二千石以爲常初武爲郡吏時事太守何壽壽知武有宰相器以其同姓故厚之後壽爲大司農其兄子爲廬江長史時武奏事在邸壽兄子適在長安壽爲具召武弟顯及故人楊覆衆等酒酣見其兄子曰此子揚州長史材能駑下未嘗省見顯等甚慙退以謂武曰刺史古之方伯上所委任一州表率也職在進善退惡吏治行有茂異民有隱逸廼當召見不可有所私問顯覆衆彊之不得已召見賜巵酒歲中廬江太守舉之其守法見憚如此爲刺史五歳入爲丞相司直丞相薛宣敬重之出爲清河太守數歳坐郡中被災害什四以上免久之大司馬曲陽侯王根薦武徵爲諫大夫遷兖州刺史入爲司𨽻校尉徙京兆尹二歳坐舉方正所舉者召見槃辟雅拜有司以爲詭衆虛僞武坐左遷楚内史遷沛郡太守復入爲廷尉綏和元年御史大夫孔光左遷廷尉武爲御史大夫成帝欲修辟雍通三公官卽改御史大夫爲大司空武更爲大司空封汜鄉侯食邑千戸汜鄉在琅邪不其哀帝初卽位襃賞大臣更以南陽犫之博望鄉爲汜鄉侯國增户千邑武爲人仁厚好進士奬稱人之善爲楚内史厚兩龔在沛郡厚兩唐及爲公卿薦之朝廷此人顯於世者何侯力也世以此多焉然疾朋黨問文吏必於儒者問儒者必於文吏以相參檢欲除吏先爲科例以防請託其所居亦無赫赫名去後常見思及爲御史大夫司空與丞相方進共奏言往者諸侯王斷獄治政内史典獄事相總綱紀輔王中尉備盜賊今王不斷獄與政中尉官罷職并内史郡國守相委任所以壹統信安百姓也今内史位卑而權重威職相踰不統尊者難以爲治臣請相如太守内史如都尉以順尊卑之序平輕重之權制曰可以内史爲中尉初武爲九卿時奏言宜置三公官又與方進共奏罷刺史更置州牧後皆復復故語在朱博傳唯内史事施行多所舉奏號爲煩碎不稱賢公功名略比薛宣其材不及也而經術正直過之武後母在郡遣吏歸迎會成帝崩吏恐道路有盜賊後母留止左右或譏武事親不篤哀帝亦欲改易大臣遂以此䇿免武令上大司空印綬罷歸就國後五歳諫大夫鮑宣數稱寃之天子感丞相王嘉之對而高安侯董賢亦薦武由是復徵爲御史大夫月餘徙爲前將軍先是新都侯王莽就國數年上以太皇太后故徴莽還京師莽從弟成都侯王邑爲侍中矯稱太皇太后指白哀帝爲莽求特進給事中哀帝復請之事發覺太后爲謝上以太后故不忍誅之左遷邑爲西河屬國都尉削千户後有詔舉太常莽私從武求舉武不敢舉後數月哀帝崩太后卽日引莽入收大司馬董賢印綬詔有司舉可大司馬者莽故大司馬辭位辟丁傅衆庶稱以爲賢又太后近親自大司徒孔光以下舉朝皆舉莽武爲前將軍素與左將軍公孫祿相善二人獨謀以爲往時孝惠孝昭少主之世外戚呂霍上官持權幾危社稷今孝成孝哀比世無嗣方當選立親近輔㓜主不宜令異姓大臣持權親疏相錯爲國計便於是武舉公孫祿可大司馬而祿亦舉武太后竟自用莽爲大司馬莽風有司劾奏武公孫祿互相稱舉皆免武就國後莽濅盛爲宰衡陰誅不附己者元始三年呂寛等事起時大司空甄豐承莽風指遣使者乘傳案治黨與連引諸所欲誅者上黨鮑宣南陽彭偉杜公子郡國豪傑坐死者數百人武在見誣中大理正檻車徴武武自殺人多寃之莽欲厭衆意令武子况嗣爲侯諡武曰刺侯莽簒位免况爲庶人王嘉字公仲平陵人也以明經射䇿甲科爲郞坐户殿門失䦨免光祿勲于永除爲掾察亷爲南陵丞復察亷爲長陵尉鴻嘉中舉敦朴能直言者召見宣室對政事得失超遷太中大夫出爲九江河南太守治甚有聲徴入爲大鴻臚徙京兆尹遷御史大夫建平三年代平當爲丞相封新甫侯加食邑千一百户嘉爲人剛直嚴毅有威重上甚敬之哀帝初立多變更成帝之政嘉上疏以爲聖王之功在於得人因薦儒者公孫光滿昌及能吏蕭咸薛脩等皆故二千石有名稱者天子納而用之會息夫躬孫寵等因中常侍宋𢎞上書告東平王雲祝詛又與后舅伍宏謀弑上爲逆雲等伏誅躬寵擢爲二千石是時侍中董賢愛幸於上上欲侯之而未有所緣傅嘉勸上因東平事以封賢上於是定躬寵吿東平本章掇去宋𢎞更言由董賢以聞欲以其功侯之皆先賜爵關内侯頃之欲封賢等上心憚嘉乃先使皇后父孔鄉侯傅晏持詔書視丞相御史於是嘉與御史大夫賈延上封事言竊見董賢等三人始賜爵衆庶匈匈咸曰賢貴其餘并䝉恩至今流言未解陛下仁恩於賢等不已宜暴賢等本奏語言延問公卿大夫博士議郞考合古今明正其義然後乃加爵土不然恐大失衆心海内引領而議暴下其事必有言當封者在陛下所從天下雖不説咎有所分不獨在陛下前定陵侯淳于長初封其事亦議大司農谷永以長當封衆人歸咎於永先帝不獨䝉其譏臣嘉臣延材駑不稱死有餘責知順指不迕可得容身須臾所以不敢者思報厚恩也上感其言止數月遂下詔切責公卿封賢爲高安侯南陽太守寵爲方陽侯左曹光祿大夫躬爲宜陵侯後數月日食舉直言嘉復奏封事曰臣聞咎繇戒帝舜曰亡傲逸欲有國兢兢業業一日二日萬幾箕子戒成王曰臣無有作威作福亡有玉食臣之有作福作威玉食害于而家凶于而國人用側頗僻民用僭慝言如此則逆尊卑之序亂陰陽之統而害及王者其國極危國人傾仄不正民用僭差不壹此君不由法度上下失序之敗也武王躬履此道隆至成康自是以後縱心恣欲法度陵遲至於臣弑君子弑父父子至親失禮患生何况異姓之臣孔子曰道千乘之國敬事而信節用而愛人使民以時孝文皇帝備行此道海内䝉恩爲漢太宗孝宣皇帝賞罰信明施與有節記人之功忽於小過以致治平孝元皇帝奉承大業溫㳟少欲都内錢四十萬萬水衡錢二十五萬萬少府錢十八萬萬嘗幸上林後宮馮貴人從臨獸圈猛獸驚出貴人前當之元帝嘉美其義賜錢五萬掖庭見親有加賞賜屬其人勿衆謝示平惡偏重失人心賞賜節約是時外戚貲千萬者少耳故少府水衡見錢多也雖遭初元永光凶年饑饉加有西羌之憂外奉師旅内振貧民終無傾危之憂以府藏内充實也孝成皇帝時諫臣多言燕出之害及女寵專愛耽於酒色損德傷年其言甚切然終不怨怒也寵臣淳于長張放史育育數貶退家貲不滿千萬放斥逐就國長榜死於獄不以私愛害公義故雖多内譏朝廷安平傳業陛下陛下在國之時好詩書上節儉徵來所過道上稱誦德美此天下所以回心也初卽位易帷帳去錦繡乘輿席緣綈繒而已共皇寢廟比比當作憂閔元元唯用度不足以義割恩輙且止息今始作治而駙馬都尉董賢亦起官寺上林中又爲賢起大第開門鄉北闕引王渠灌園池使者䕶作賞賜吏卒甚於治宗廟賢母病長安厨給祠具道中過者皆飲食爲賢治器器成奏御廼行或物好特賜其工自貢獻宗廟三宮猶不至此賢家有賔㛰及見親諸官並共賜及倉頭奴婢人十萬錢使者䕶視發取市物百賈震動道路諠譁羣臣惶惑詔書罷苑而以賜賢二千餘頃均田之制從此墮壞奢僭放縱變亂陰陽災異衆多百姓訛言持籌相驚被髪徒跣而走乘馬者馳夭惑其意不能自止或以爲籌者策失之戒也陛下素仁智愼事今而有此大譏孔子曰危而不持顛而不扶則將焉用彼相矣臣嘉幸得備位竊内悲傷不能通愚忠之信身死有益於國不敢自惜唯陛下愼己之所獨鄉察衆人之所共疑往者寵臣鄧通韓嫣驕貴失度逸豫無厭小人不勝情慾卒陷罪辜亂國亡軀不終其祿所謂愛之適足以害之也宜深覽前世以節賢寵全安其命於是上􅎊不悦而愈愛賢不能自勝會祖母傅太后薨上因託傅太后遺詔令成帝母王太后下丞相御史益封賢二千户及賜孔鄉侯汝昌侯陽新侯國嘉封還詔書因奏封事諫上及太后言王者代天爵人不可不愼比者山崩地動日食於三朝皆陰盛侵陽之戒前賢己再封晏商再易邑業緣私横求恩己過厚求索自恣不知厭足甚傷尊尊之義不可以示天下臣謹封上詔書不敢露見非愛死而不自法恐天下聞之故不敢自劾愚戅數犯忌諱唯陛下省察初廷尉梁相與丞相長史御史中丞及五二千石雜治東平王雲獄時冬月未盡二旬而相心疑雲寃獄有飾辭奏欲傳之長安更下公卿覆治尚書令鞫譚僕射宗伯鳳以爲可許天子以相等皆見上體不平外内顧望操持兩心幸雲踰冬無討賊疾惡主讐之意制詔免相等皆爲庶人後數月大赦嘉奏封事薦相等明習治獄相計謀深沉譚頗知文雅鳳經明行修聖主有計功除過臣竊爲朝廷惜此三人書奏上不能平後二十餘日嘉封還益董賢户事上乃發怒召嘉詣尚書責問以相等前坐在位不盡忠誠外附諸侯操持兩心背人臣之義今所稱相等材美足以相計除罪君以道德位在三公以總方略一統萬類分明善惡爲職知相等罪惡陳列著聞天下時輙以自劾今又稱譽相等云爲朝廷惜之大臣舉錯恣心自在迷國罔上近由君始將謂遠者何對狀嘉免冠謝罪事下將軍中朝者光祿大夫孔光左將軍公孫祿右將軍王安光祿勲馬宮光祿大夫龔勝劾嘉迷國罔上不道請與廷尉雜治勝獨以爲嘉備宰相諸事並廢咎由嘉生嘉坐薦相等微薄以應迷國罔上不道恐不可以示天下遂可光等奏光等請謁者召嘉詣廷尉詔獄制曰驃騎將軍御史大夫中二千石諸大夫博士議郎雜議衛尉雲等十五人以爲如光等言可許議郎龔等以爲嘉言事前後相違無所執守不任宰相之職宜奪爵土免爲庶人永信少府猛等十人以爲聖王斷獄必先原心定罪探意立情故死者不抱恨而入地生者不衘怨而受罪明主躬聖德重大臣刑辟廣延有司議欲使海内咸服嘉罪名雖應法聖王之於大臣在輿爲下御坐則起疾病視之無數死則臨吊之廢宗廟之祭進之以禮退之以義誄之以行案嘉本以相等爲罪罪惡雖著大臣括髮關械裸躬就笞非所以重國襃宗廟也今春月寒氣錯繆霜露數降宜示天下以寛和臣等不知大義唯陛下察焉有詔假謁者節召丞相詣廷尉詔獄使者旣到府掾史涕泣共和藥進嘉嘉不肯服主簿曰將相不對理陳寃相踵以爲故事君侯宜引決使者危坐府門上主簿復前進藥嘉引藥杯以擊地謂官屬曰丞相幸得備位三公奉職負國當伏刑都市以示萬衆丞相豈兒女子邪何謂咀藥而死嘉遂裝出見使者再拜受詔乘吏小車去蓋不冠隨使者詣廷尉廷尉收嘉丞相新甫侯印綬縛嘉載致都船詔獄上聞嘉生自詣吏大怒使將軍以下與五二千石雜治吏詰問嘉嘉對曰案事者思得實竊見相等前治東平王獄不以雲爲不當死欲關公卿示重愼置驛馬傳囚勢不得踰冬月誠不見其外内顧望阿附爲雲驗復幸得䝉大赦相等皆良善吏臣竊爲國惜賢不私此三人獄吏曰茍如此則君何以爲罪猶當有以負國不空入獄矣吏稍侵辱嘉嘉喟然仰天嘆曰幸得充備宰相不能進賢退不肖以是負國死有餘責吏問賢不肖主名嘉曰賢故丞相孔光故大司空何武不能進惡高安侯董賢父子佞邪亂朝而不能退罪當死死無所恨嘉繫獄二十餘日不食嘔血而死帝舅大司馬驃騎將軍丁明素重嘉而憐之上遂免明以董賢代之語在賢傳嘉爲相二年誅國除死後上覽其對而思嘉言復以孔光代嘉爲丞相徴用何武爲御史大夫元始四年詔書追錄忠臣封嘉子崇爲新甫侯追諡嘉爲忠侯師丹字仲公琅邪東武人也治詩事匡衡舉孝亷爲郎元帝末爲博士免建始中州舉茂才復補博士出爲東平王太傅丞相翟方進御史大夫孔光舉丹議論深博亷正守道徴入爲光祿大夫丞相司直數月復爲光祿大夫給事中由是爲少府光祿勲侍中甚見尊重成帝末年立定陶王爲皇太子以丹爲太子太傅哀帝卽位爲左將軍賜爵關内侯食邑領尚書事遂代王莽爲大司馬封高樂侯月餘徙爲大司空上少在國見成帝委政外家王氏僭盛常内邑邑及卽位多欲有所匡正封拜丁傅奪王氏權丹自以師傅居三公位得信於上上書言古者諒闇不言聽於冢宰三年無改於父之道前大行尸柩在堂而官爵臣等以及親屬赫然皆貴寵封舅爲陽安侯皇后尊號未定豫封父爲孔鄉侯出侍中王邑射聲校尉王邯等詔書比下變動政事卒暴無漸臣縱不能明陳大義復曾不能牢讓爵位相隨空受封侯增益陛下之過閒者郡國多動地水出流殺人民日月不明五星失行此皆舉錯失中號令不定法度失理陰陽溷濁之應也臣伏惟人情無子年雖六七十猶博取而廣求孝成皇帝深見天命燭知至德以壯年克己立陛下爲嗣先帝暴棄天下而陛下繼體四海安寧百姓不懼此先帝聖德當合天人之功也臣聞天威不違顔咫尺願陛下深思先帝所以建立陛下之意且克己躬行以觀羣下之從化天下者陛下之家也肺腑何患不富貴不宜倉卒先帝不量臣愚以爲太傅陛下以臣託師傅故亡功德而備鼎足封大國加賜黄金位爲三公職在左右不能盡忠補過而令庶人竊議災異數見此臣之大罪也臣不敢言乞骸骨歸於海濵恐嫌於僞誠慙負重責義不得不盡死書數十上多切直之言初哀帝卽位成帝母稱太皇太后成帝趙皇后稱皇太后而上祖母傅太后與母丁后皆在國邸自以定陶共王爲稱高昌侯董宏上書言秦莊襄王母本夏氏而爲華陽夫人所子及卽位後俱稱太后宜立定陶共王后爲皇太后事下有司時丹以左將軍與王莽共劾奏宏知皇太后至尊之號天下一統而稱引亡秦以爲比喻詿誤聖朝非所宜言大不道上新立謙讓納用莽丹言免宏爲庶人傅太后大怒要上必欲稱尊號上於是追尊定陶共王爲共皇帝尊傅太后爲共皇太后丁后爲共皇后郎中令冷襃黄門郎叚猶等復奏言定陶共皇太后共皇后皆不宜復引定陶蕃國之名以冠大號車馬衣服宜皆稱皇之意置吏二千石以下各共厥職又宜爲共皇立廟京師上復下其議有司皆以爲宜如襃猶言丹議獨曰聖王制禮取法於天地故尊卑之禮明則人倫之序正人倫之序正則乾坤得其位而陰陽順其節人主與萬民俱䝉福祐尊卑者天地定位不可亂也今定陶共皇太后共皇后以定陶共爲號者母從子妻從夫之義也欲立官置吏車服與太皇太后並非所以明尊卑無二上之義也定陶共皇號諡已前定義不得復改禮父爲士子爲天子祭以天子其尸服以士服子亡爵父之義尊父母也爲人後者爲之子故爲所後服斬衰三年而降其父母朞明尊本祖而重正統也孝成皇帝聖恩深遠故爲共王立後奉承祭祀令共皇長爲一國太祖萬世不毁恩義已備陛下旣繼體先帝持重太宗承宗廟天地社稷之祀義不得復奉定陶共皇祭入其廟今欲立廟於京師而使臣下祭之是無主也又親盡當毁空去一國太祖不墮之祀而就無主當毁不正之禮非所以尊厚共皇也丹由是浸不合上意會有上書言古者以龜貝爲貨今以錢易之民以故貧宜可改幣上以問丹丹對言可改章下有司議皆以爲行錢以來久矣難卒變易丹老人忘其前語後從公卿議又丹使吏書奏吏私冩其草丁傅子弟聞之使人上書告丹上封事行道人徧持其書上以問將軍中朝臣皆對曰忠臣不顯諫大臣奏事不宜漏泄令吏民傳冩流聞四方臣不密則失身宜下廷尉事下廷尉廷尉劾丹大不敬事未決給事中博士申咸炔欽上書言丹經行無比自近世大臣能若丹者少發憤懣奏封事不及深思遠慮使主簿書漏泄之過不在丹以此貶黜恐不厭衆心尚書劾咸欽幸得以儒官選擢備腹心上所折中定疑知丹社稷重臣議罪處罰國之所愼咸欽初傳經義以爲當治事以暴列乃復上書妄稱譽丹前後相違不敬上貶咸欽秩各二等遂策免丹令上大司空高樂侯印綬罷歸後尚書令唐林上疏爲丹訟寃上從林言復賜丹爵關内侯食邑三百户丹旣免數月上用朱博議尊傅太后爲皇太太后丁后爲帝太后與太皇太后及皇太后同尊又爲共皇立廟京師儀如孝元皇帝博遷爲丞相復與御史大夫趙元以前事奏免丹爲庶人丹於是廢歸卿里者數年平帝卽位新都侯王莽白太皇太后發掘傅太后丁太后冢奪其璽綬更以民禮葬之定陶隳廢共皇廟諸造議冷襃叚猶等皆徙合浦復免高昌侯宏爲庶人徴丹詣公車賜爵關内侯食故邑數月太皇太后詔封丹爲義陽侯月餘薨諡曰節侯子業嗣王莽敗廼絶揚雄字子雲蜀郡成都人也其先出自有周伯僑者以支庶食采於晉之揚因氏焉不知伯僑周何别也揚在河汾之間周衰而揚氏或稱侯號曰揚侯會晉六卿争權韓趙魏興而范中行知伯斃當是時偪揚侯揚侯逃于楚巫山因家焉楚漢之興也揚氏遡江上處巴江州而揚季官至廬江太守漢元鼎間避仇復遡江上處㟭山之陽曰郫有田一壥有宅一區世世以農桑爲業自季至雄五世而傳一子故雄無他揚於蜀雄少而好學不爲章句訓詁通而已博覽無所不見爲人簡易佚蕩口吃不能劇譚黙而好深湛之思清靜無爲少嗜欲不汲汲於富貴不戚戚於貧賤不修亷隅以徼名當世家産不過十金乏無儋石之儲晏如也自有大度非聖哲之書不好也非其意雖富貴不事也顧嘗好辭賦先是時蜀有司馬相如作賦甚𢎞麗溫雅雄心壯之每作賦常擬之以爲式又怪屈原文過相如至不容作離騷自投江而死悲其文讀之未嘗不流涕也以爲君子得時則大行不得時則龍蛇遇不遇命也何必湛身哉乃作書徃徃摭離騷文而反之自㟭山投諸江流以弔屈原名曰反離騷又旁離騷作重一篇名曰廣騷又旁惜誦以下至懷沙一卷名曰畔牢愁畔離也牢聊也與君相離愁而無聊也文多皆不載孝成帝時客有薦雄文似相如者上方郊祠甘泉泰畤汾陰后土以求繼嗣召雄待詔承明之庭正月從上幸甘泉還奏甘泉賦以風其辭曰惟漢十世將郊上元定泰畤雍神休尊明號同符三皇錄功五帝䘏允錫羡拓迹開統於是廼命羣僚歴吉日恊靈辰星陳而天行詔招摇與泰陰兮伏鈎陳使當兵屬堪輿以壁壘兮梢䕫魖而抶獝狂八神奔而警蹕兮振殷轔而軍裝蚩尤之倫帯干將而秉玉戚兮飛䝉茸而走陸梁齊總總撙撙其相膠葛兮焱駭雲訊奮以方攘駢羅列布鱗以雜沓兮柴虒參差魚頡而鳥䀪翕赫曶霍霧集䝉合兮半散照爛粲以成章於是乘輿廼登夫鳳凰兮翳華芝駟蒼螭兮六素蚪蠖略㽔綏灕虖幓纚帥爾陰閉霅然陽開騰清霄而軼浮景兮夫何旟旐郅偈之旖旎也流星旄以電燭兮咸翠蓋而鸞旗敦萬騎於中營兮方玉車之千乘聲駍隱以陸離兮輕先疾雷以馺遺風陵高衍之嵱嵷兮超紆譎之清澄登椽欒而羾天門兮馳閶闔而入凌兢是時未轃夫甘泉也廼望通天之繹繹下陰潛以慘廪兮上洪紛而相錯直嶢嶢以造天兮厥高慶而不可虖疆度平原唐其壇曼兮列新雉於林薄攢并閭與茇䒷兮紛被麗其亡鄂崇邱陵之駊騀兮深溝嶔巖而爲谷􅉨􅉨離宮殿以相燭兮封巒石關施靡虖延屬於是大夏雲譎波詭嶊嗺而成觀仰撟首以高視兮目㝠眴而亡見正瀏濫以𢎞惝兮指東西之漫漫徒回回以徨徨兮魂固渺渺而昬亂據軨軒而周流兮忽軮軋而亡垠翠玉樹之青葱兮壁馬犀之瞵㻞金人仡仡其承鐘虡兮嵌巖巖其龍鱗揚光矅之燎燭兮乘景炎之炘炘配帝居之縣圃兮象泰壹之威神洪臺掘其獨出兮㨖北極之嶟嶟列宿乃施於上榮兮日月纔經於柍桭雷鬱律而巖突兮電倐忽於牆藩鬼魅不能自逮兮半長途而下顚歴倒景而絶飛梁兮浮蔑蠓而撇天左攙搶而右元㝠兮前熛闕而後應門蔭西海與幽都兮涌醴汨以生川蛟龍連蜷於東厓兮白虎敦圉虖昆侖覽樛流於高光兮溶方皇於西清前殿崔巍兮和氏瓏玲炕浮柱之飛榱兮神莫莫而扶傾閌閬閬其寥廓兮似紫宮之崢嶸駢交錯而曼衍兮㟎􅟬隗虖其相嬰乘雲閣而上下兮紛䝉籠以棍成曵紅采之流離兮颺翠氣之宛延襲琁室與傾宮兮若登高眇遠肅虖臨淵回焱肆其碭駭兮翍桂椒而鬱栘楊香芬茀以穹隆兮擊薄櫨而將榮薌呹肸以棍根兮聲駍隱而歴鐘排玉户而颺金鋪兮發蘭蕙與芎藭惟弸彋其拂汨兮稍暗暗而靚深陰陽清濁穆羽相和兮若䕫牙之調琴般倕弃其剞劂兮王爾投其鈎繩雖方征僑與偓佺兮猶仿佛其若夢於是事變物化目駭耳回蓋天子穆然珍臺閒館璇題玉英蜵蜎蠖濩之中惟夫所以澄心清魂儲精垂思感動天地逆釐三神者廼搜逑索耦臯伊之徒冠倫魁能函甘棠之惠挾東征之意相與齊乎陽靈之宮靡薜荔而爲席兮折瓊枝以爲芳噏清雲之流霞兮飮若木之露英集虖禮神之囿登虖頌祗之堂建光耀之長旓兮昭華覆之威威攀璇璣而下視兮行遊目虖三危陳衆車於東阬兮肆玉車犬而下馳漂龍淵而還九垠兮窺地底而上回風傱傱而扶轄兮鸞鳳紛其衘㽔梁弱水之濎濙兮躡不周之逶蛇想西王母欣然而上壽兮屏玉女而卻虙妃玉女無所眺其清矑兮虙妃曾不得施其蛾眉方擥道德之精剛兮侔神明與之爲資於是欽祡宗祈燎熏皇天招摇泰壹舉洪頥樹靈旗樵蒸焜上配藜四施東燭滄海西燿流沙北爌幽都南煬丹厓元瓚觩䚧秬鬯泔淡肸蠁豐融懿懿芬芬焱感黄龍兮熛訛碩鱗選巫咸兮呌帝閽開天庭兮延羣神儐暗藹兮降清壇瑞穰穰兮委如山於是事畢功𢎞回車而歸度三巒兮偈棠棃天閫決兮地垠開八荒恊兮萬國諧登長平兮雷鼓􅐀天聲起兮勇士厲雲飛揚兮雨滂沛于胥德兮麗萬世亂曰崇崇圜丘隆隱天兮登降峛崺單埢垣兮增宮㠁差駢嵯峩兮岭巆嶙峋洞亡厓兮上天之縡杳旭卉兮聖皇穆穆信厥對兮徠祗郊禋神所依兮徘徊招摇靈遟遟兮輝光眩燿降厥福兮子子孫孫長亡極兮甘泉本因秦離宮既奢泰而武帝復增通天高光迎風宮外近則洪厓旁皇儲胥弩阹遠則石關封巒枝鵲露寒棠棃師得遊觀屈竒瑰偉非木摩而不彫牆塗而不畫周宣所考盤庚所遷夏卑宮室唐虞棌椽三等之制也且其爲已久矣非成帝所造欲諫則非時欲黙而不能已故遂推而隆之乃上比於帝室紫宮若曰此非人力之所爲黨鬼神可也又是時趙昭儀方大幸每上幸甘泉當法從在屬車閒豹尾中故雄聊盛言車騎之衆參麗之駕非所以感動天地逆釐三神又言屏玉女郤宓妃以微戒齊肅之事賦成奏之天子異焉其三月將祭后土上廼帥羣臣横大河湊汾陰旣祭行游介山囬安邑顧龍門覽鹽池登歴觀陟西岳以望八荒迹殷周之虛眇然以思唐虞之風雄以爲臨川羡魚不如歸而結網還上河東賦以勸其辭曰伊年暮春將瘞后土禮靈祗謁汾陰于東郊因兹以勒崇垂鴻發祥隤祉欽若神明者盛哉鑠乎越不可載己於是命羣臣齊法服整靈輿廼撫翠鳳之駕六先景之乘棹犇星之流旃彏天狼之威弧張燿日之元旄揚左纛被雲梢奮電鞭驂雷輜鳴洪鐘建五旗羲和司日顔倫奉輿風發颷拂神騰鬼趡千乘霆亂萬騎屈橋嘻嘻旭旭天地稠㟼簸邱跳巒涌渭躍涇秦神下讋跖魂負沴河靈矍踢音掌華蹈衰遂臻陰宮穆穆肅肅蹲蹲如也靈祗旣鄉五位時叙絪緼元黄將紹厥後於是靈輿安歩周流容與以覽虖介山嗟文王而愍推兮勤大禹於龍門灑沈菑於豁瀆兮播九河於東瀕登歴觀而遥望兮聊浮流以經營樂往昔之遺風兮喜虞氏之所耕瞰帝唐之嵩高兮眽隆周之大寧汨低囬而不能去兮行睨陔下與彭城濊南巢之坎坷兮易豳岐之夷平乘翠龍而超河兮陟西岳之嶢崝雲䬠䬠而來迎兮澤滲灕而下降鬱蕭條其幽藹兮滃汎沛以豐隆叱風伯於南北兮呵雨師於西東參天地而獨立兮廓蕩蕩其亡䨇遵逝虖歸來以函夏之大漢兮彼曾何足與比功建乾坤之貞兆兮將悉總之以羣龍麗鈎芒與驂蓐收兮服元㝠及祝融敦衆神使式道兮奮六經以攄頌隃於穆之輯熈兮過清廟之雝雝軼五帝之遐迹兮躡三皇之高蹤旣𤼵軔於平盈兮誰謂路逺而不能從其十二月羽獵雄從以爲昔在二帝三王宮館臺榭沼池苑囿林麓藪澤財足以奉郊廟御賔客充庖廚而已不奪百姓膏腴榖土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其唐鳳凰巢其樹黄龍遊其沼麒麟臻其囿神爵棲其林昔者禹任益虞而上下和屮木茂成湯好田而天下用足文王囿百里民以爲尚小齊宣王囿四十里民以爲大裕民之與奪民也武帝廣開上林南至宜春鼎湖御宿昆吾旁南山而西至長楊五柞北繞黄山瀕渭而東周袤數百里穿昆明池象滇河營建章鳳闕神明馺娑漸臺泰液象海水周流方丈瀛洲蓬萊游觀侈靡窮妙極麗雖頗割其三垂以贍齊民然至羽獵田車戎馬器械儲偫禁籞所營尚泰奢麗誇詡非尭舜成湯文王三驅之意也又恐後世復修前好不折中㠯泉臺故聊因校獵賦以風其辭曰或稱戲農豈或帝王之彌文哉論者云否亦各並時而得宜奚必同條而共貫則泰山之封烏得七十而有二儀是以創業垂統者俱不見其爽遐邇五三孰知其是非遂作頌曰麗哉神聖處於元宮富旣與地虖侔訾貴正與天虖比崇齊桓曾不足使扶轂楚嚴未足以爲驂乘陿三王之阨薜嶠高舉而大興歴五帝之寥廓渉三皇之登閎建道德以爲師友仁義與爲朋於是元冬季月天地隆烈萬物權輿於内徂落於外帝將唯田于靈之囿開北垠受不周之制以終始顓頊元㝠之統廼詔虞人典澤東延昆鄰西馳闛闔儲積共偫戍卒夾道斬叢棘夷野草禦自汧渭經營酆鎬章皇周流出入日月天與地杳爾廼虎路三嵕以爲司馬圍經百里而爲殿門外則正南極海邪界虞淵鴻濛沆茫碣以崇山營合圍會然後先置虖白楊之南昆明靈沼之東賁育之倫䝉盾負羽杖鏌邪而羅者以萬計其餘荷垂天之畢張竟壄之罘靡日月之朱竿曵彗星之飛旗青雲爲紛紅蜺爲繯屬之虖崑崙之虛渙若天星之羅浩如濤水之波淫淫與與前後要遮欃槍爲闉明月爲候熒惑司命天弧發射鮮扁陸離駢衍佖路徽車式武鴻絧緁獵殷殷軫軫被陵緣阪窮㝠極遠者相與迾虖高原之上羽騎營營昈分殊事繽紛往來轠轤不絶若光若滅者布虖青林之下於是天子乃以陽鼂始出乎元宮撞鴻鍾建九旒六白虎載靈輿蚩尤並轂䝉公先驅立歴天之旂曵捎星之旃霹靂列缺吐火施鞭萃傱允溶淋灕廓落戲八鎭而開關飛亷雲師吸嚊潚率鱗羅布列攢以龍翰秋秋蹌蹌入西園切神光望平樂徑竹林蹂蕙圃踐蘭唐舉㶻烈火轡者施披方馳千駟校騎萬師虓虎之陳從横膠􅠽焱泣雷厲驞駍駖礚洶洶旭旭天動地岋羡漫半散蕭條數千萬里外若夫壯士忼慨殊鄉别趣東西南北騁耆奔欲拕蒼狶䟦犀犛厥浮麋斮巨狿搏元蝯騰空虛距連卷踔夭蟜娭澗門莫莫紛紛山谷爲之風猋林叢爲之生塵及至獲夷之徒蹶松栢掌蒺黎獵䝉籠轔輕飛履般首帯脩蛇鈎赤豹摼象犀跇巒阬超唐陂車騎雲會登降闇藹泰華爲旒熊耳爲綴木仆山還漫若天外儲與虖大溥聊浪虖宇内於是天清日晏逢䝉列眥羿氏控弦皇車幽輵光純天地望舒彌轡翼乎徐至於上蘭移圍徙陳浸滛蹵部曲隊堅重各按行伍壁壘天旋神抶電擊逢之則碎近之則破鳥不及飛獸不得過軍驚師駭刮野掃地及至䍐車飛揚武騎聿皇蹈飛豹絹嘄陽追天寳出一方應駍聲擊流光埜盡山窮囊括其雌雄沈沈容容遥噱虖紭中三軍芒然窮冘閼與亶觀夫票禽之紲隃犀兕之抵觸熊羆之拏攫虎豹之凌遽徒角搶題注䠞竦讋怖魂亡魄失觸輻關脰妄發期中進退履獲創淫輪夷邱累陵聚於是禽殫中衰相與集於靖㝠之館以臨珍池灌以岐梁溢以江河東瞰目盡西暢亡厓隨珠和氏焯爍其陂玉石嶜崟眩燿青熒漢女水潛怪物暗㝠不可殫形元鸞孔雀翡翠垂榮王雎關關鴻鴈嚶嚶羣娭虖其中噍噍昆鳴鳬鷖振鷺上下砰磕聲若雷霆乃使文身之技水格鱗蟲凌堅氷犯嚴淵探巖排碕薄索蛟螭蹈獱獺據黿鼉抾靈蠵入洞穴出蒼梧乘鉅鱗騎京魚浮彭蠡目有虞方椎夜光之流離剖明月之珠胎鞭洛水之虙妃餉屈原與彭胥於兹虖鴻生鉅儒俄軒冕雜衣裳脩唐典匡雅俗揖讓於前昭光振燿蠁曶如神仁聲惠於北狄武義動於南鄰是以旃裘之王胡貉之長移珍來享抗手稱臣前入圍口後陳盧山羣公常伯楊朱墨翟之徒喟然稱曰崇哉乎德雖有唐虞大夏成周之隆何以侈兹大古之覲東嶽禪梁基舍此世也其誰與哉上猶謙讓而未俞也方將上獵三靈之流下決醴泉之滋發黄龍之穴窺鳳凰之巢臨麒麟之囿幸神雀之林奢雲夢侈孟諸非章華是靈臺罕徂離宮而輟觀游土事不飾木功不彫承民乎農桑勸之以弗迨儕男女使莫違恐貧窮者不徧被洋溢之饒開禁苑散公儲創道德之囿𢎞仁惠之虞馳弋乎神明之囿覽觀乎羣臣之有亡放雉菟收罝罘麋鹿芻蕘與百姓共之蓋所以臻兹也於是醇洪鬯之德豐茂世之規加勞三皇朂勤五帝不亦至乎乃祗莊雍穆之徒立君臣之節崇賢聖之業未皇苑囿之麗游獵之靡也因囬軫還衡背阿房反未央明年上將大誇胡人以多禽獸秋命右扶風發民入南山西自襃斜東至𢎞農南敺漢中張羅罔置罝罘捕熊羆豪猪虎豹狖􅀈狐菟麋鹿載以檻車輸長楊射熊館以罔爲周阹縱禽獸於其中令胡人手搏之自取其獲上親臨觀焉是時農民不得收斂雄從至射熊館還上長楊賦聊因筆墨之成文章故藉翰林以爲主人子墨爲客卿以風其辭曰子墨客卿問於翰林主人曰蓋聞聖主之養民也仁霑而恩洽動不爲身今年獵長楊先命右扶風左太華而右襃斜㭬嶻嶭而爲弋紆南山以爲罝羅千乘於林莽列萬騎於山隅帥軍踤阹錫戎獲胡搤熊羆拕豪豬木雍槍纍以爲儲胥此天下之窮覽極觀也雖然亦頗擾乎農民三旬有餘其厪至矣而功不圖恐不識者外之則以爲娛樂之遊内之則不以爲乾豆之事豈爲民乎哉且人君以元黙爲神澹泊爲德今樂遠出以露威靈數摇動以罷車甲本非人主之急務也䝉竊惑焉翰林主人曰吁謂之兹邪若客所謂知其一未睹其二見其外不識其内者也僕嘗倦談不能一二其詳請略舉凡而客自覽其切焉客曰唯唯主人曰昔有彊秦封豕其士窫窳其民鑿齒之徒相與摩牙而爭之豪俊麋沸雲擾羣黎爲之不康於是上帝眷顧高祖高祖奉命順斗極運天關横鉅海票崑崙提劒而叱之所麾城搟邑下將降旗一日之戰不可殫記當此之勤頭蓬不暇疏飢不及餐鞮鍪生蟣虱介胄被霑汗以爲萬姓請命虖皇天廼展民之所詘振民之所乏規億載恢帝業七年之間而天下密如也逮至聖文隨風乘流方垂意於志寧躬服節儉綈衣不敝革鞜不穿大夏不居木器無文於是後宮賤瑇瑁而疎珠璣郤翡翠之飾除雕瑑之巧惡麗靡而不近斥芬芳而不御抑止絲竹晏衍之樂憎聞鄭衛幼眇之聲是以玉衡正而太階平也其後熏鬻作虐東夷横畔羌戎睚眦閩越相亂遐萌爲之不安中國䝉被其難於是聖武勃怒爰整其旅廼命驃衛汾沄沸渭雲合電𤼵猋騰波流機駭蠭軼疾如奔星擊如震霆砰轒轀破穹廬腦幕沙䯝余吾遂獵乎王庭敺橐它燒􅀈蠡分梨單于磔裂屬國夷阬谷拔鹵莽刋山石蹂屍輿厮係累老弱兖鋋瘢耆金鏃淫夷者數十萬人皆稽首樹頷扶服蛾伏二十餘年矣尚不敢惕息夫天兵四臨幽都先加囬戈邪指南越相夷靡節西征羌僰東馳是以遐方疏俗殊鄰絶黨之域自上仁所不化茂德所不綏莫不蹻足抗手請獻厥珍使海内澹然永亡邊城之災金革之患今朝廷純仁遵道顯義并包書林聖風雲靡英華浮沈洋溢八區普天所覆莫不沾濡士有不談王道者則樵夫笑之故意者以爲事罔隆而不殺物靡盛而不虧故平不肆險安不忘危廼時以有年出兵整輿竦戎振師五莋習馬長楊簡力狡獸校武驃禽廼崒然登南山瞰烏弋西厭月􅒸東震日域又恐後世迷於一時之事常以此爲國家之大務淫荒田獵陵夷而不禦也是以車不安軔日未靡旃從者彷彿骫屬而還亦所以奉太宗之烈遵文武之度復三王之田反五帝之虞使農不輟耰工不下機㛰姻以時男女莫違出愷悌行簡易矜劬勞休力役見百年存孤弱帥與之同苦樂然後陳鐘鼓之樂鳴鞀磬之和建碣磍之虡拮隔鳴球掉八列之舞酌允鑠肴樂胥聽廟中之雍雍受神人之福祐歌投頌吹合雅其勤若此故眞神之所勞也方將俟元符以禪梁甫之基增泰山之高延光于將來比榮乎往號豈徒欲淫覽浮觀馳騁稉稻之地周流棃栗之林蹂踐芻蕘誇詡衆庶盛狖玃之收多麋鹿之獲哉且盲者不見咫尺而離婁燭千里之隅客徒愛胡人之獲我禽獸曾不知我亦已獲其王侯言未卒墨客降席再拜稽首曰大哉體乎允非小子之所能及也廼今日發矇廓然已昭矣哀帝時丁傅董賢用事諸附離之者或起家至二千石時雄方草太元有以自守泊如也或謿雄以元尚白而雄解之號曰解謿其辭曰客謿揚子曰吾聞上世之士人綱人紀不生則已生則上尊人君下榮父母析人之圭儋人之爵懷人之符分人之禄紆青拕紫朱丹其轂今子幸得遭明盛之世處不諱之朝與羣賢同行歴金門上玉堂有日矣曾不能畫一竒出一䇿上説人主下談公卿目如燿星舌如電光壹縱壹横論者莫當顧而作太元五千文支葉扶疎獨説十餘萬言深者入黃泉高者出蒼天大者含元氣纎者入無倫然而位不過侍郎擢纔給事黄門意者元得毋尚白乎何爲官之拓落也揚子笑而應之曰客徒欲朱丹吾轂不知一跌將赤吾之族也往者周罔解結羣鹿争逸離爲十二合爲六七四分五剖並爲戰國士無常君國無定臣得士者富失士者貧矯翼厲翮恣意所存故士或自盛以橐或鑿坏以遁是故騶衍以頡亢而取世資孟軻雖連蹇猶爲萬乘師今大漢左東海右渠捜前番禺後陶塗東南一尉西北一候徽以紏墨制以質鈇散以禮樂風以詩書曠以歳月結以倚廬天下之士雷動雲合魚鱗雜襲咸營乎八區家家自以爲稷契人人自以為咎繇戴縰垂纓而談者皆擬於阿衡五尺童子羞比晏嬰與夷吾當塗者入青雲失路者委溝渠旦握權則爲卿相夕失埶則爲匹夫譬若江湖之雀勃解之鳥乘鴈集不爲之多雙鳬飛不爲之少昔三仁去而殷虛二老歸而周熾子胥死而吳亡種蠡存而粤伯五羖入而秦喜樂毅出而燕懼范雎以折摺而危穰侯蔡澤雖噤吟而笑唐舉故當其有事也非蕭曹子房平勃樊霍則不能安當其亡事也章句之徒相與坐而守之亦亡所患故世亂則聖哲馳騖而不足世治則庸夫高枕而有餘夫上世之士或解縛而相或釋褐而傅或倚夷門而笑或横江潭而漁或七十説而不遇或立談間而封侯或枉千乘於陋巷或擁帚彗而先驅是以士頗得信其舌而奮其筆窒隙蹈瑕而無所詘也當今縣令不請士郡守不迎師羣卿不揖客將相不俛眉言竒者見疑行殊者得辟是以欲談者宛舌而固聲欲行者擬足而投迹鄉使上世之士處虖今䇿非甲科行非孝廉舉非方正獨可抗疏時道是非高得待詔下觸聞罷又安得青紫且吾聞之也炎炎者滅隆隆者絶觀雷觀火爲盈為實天收其聲地藏其熱高明之家鬼瞰其室攫拏者亡黙黙者存位極者宗危自守者身全是故知元知黙守道之極爰清爰靜游神之廷惟寂惟寞守德之宅世異事變人道不殊彼我易時未知何如而子廼以鴟梟而笑鳳凰執蝘蜓而謿龜龍不亦病乎子徒笑我元之尚白吾亦笑子之病甚不遭臾跗扁鵲悲夫客曰然則靡元無所成名乎范蔡以下何必元哉揚子曰范雎魏之亡命也折脅拉髂免於徽索翕肩蹈背扶服入橐激卬萬乘之主界涇陽抵穰侯而代之當也蔡澤山東之匹夫也顉頥折頞涕涶流沫西揖彊秦之相搤其咽炕其氣拊其背而奪其位時也天下已定金革已平都於雒陽婁敬委輅脱輓掉三寸之舌建不拔之䇿舉中國徙之長安適也五帝垂典三王傳禮百世不易叔孫通起於桴鼓之間解甲投戈遂作君臣之儀得也甫刑靡敝秦法酷烈聖漢權制而蕭何造律宜也故有造蕭何律於唐虞之世則誖矣有作叔孫通儀於夏殷之時則惑矣有建婁敬之䇿於成周之世則謬矣有談范蔡之説於金張許史之間則狂矣夫蕭規曹隨留侯畫䇿陳平出竒功若泰山嚮若阺隤唯其人之贍知哉亦會其時之可爲也故爲可爲於可爲之時則從爲不可爲於不可爲之時則凶夫藺先生收功於章臺四皓采榮於南山公孫創業於金馬驃騎發迹於祁連司馬長卿竊訾於卓氏東方朔割名於細君僕誠不能與此數公者並故黙然獨守吾太元雄以爲賦者將以風之必推類而言極麗靡之辭閎侈鉅衍競於使人不能加也旣廼歸之於正然覽者已過矣往時武帝好神仙相如上大人賦欲以風帝反縹縹有陵雲之志繇此言之賦勸而不止明矣又頗似俳優淳于髠優孟之徒非法度所存賢人君子詩賦之正也於是輟不復為而大覃思渾天參摹而四分之極於八十一旁則三摹九据極之七百二十九贊亦自然之道也故觀易者見其卦而名之觀元者數其畫而定之元首四重者非卦也數也其用自天元推一晝一夜陰陽數度律厯之紀九九大運與天終始故元三方九州二十七部八十一家二百四十三表七百二十九贊分爲三卷曰一二三與泰初厯相應亦有顓頊之厯焉􅨸之以三䇿開之以休咎絣之以象類播之以人事文之以五行擬之以道德仁義禮知無主無名要合五經茍非其事文不虛生爲其泰曼漶而不可知故有首衝錯測攡瑩數文掜圖告十一篇皆以解剝元體離散其文章句尚不存焉元文多故不著觀之者難知學之者難成客有難元太深衆人之不好也雄解之號曰解難其辭曰客難揚子曰凡著書者衆人之所好也美味期乎合口工聲調於比耳今吾子乃抗辭幽説閎意眇指獨馳騁於有亡之際而陶冶大鑪㫄薄羣生歴覽者滋年矣而殊不寤亶費精神於此而煩學者於彼譬畫者畫於無形弦者放於無聲殆不可乎揚子曰俞若夫閎言崇議幽㣲之塗蓋難與覽者同也昔人有觀象於天視度於地察法於人者天麗且彌地普而深昔人之辭廼玉廼金彼豈好爲艱難哉埶不得已也獨不見夫翠蚪絳螭之將登虖天必聳身於蒼梧之淵不階浮雲翼疾風虛舉而上升則不能撠膠葛騰九閎日月之經不千里則不能燭六合耀八紘泰山之高不嶕嶢則不能浡滃雲而散歊烝是以宓犧氏之作易也緜絡天地經以八卦文王附六爻孔子錯其象而彖其辭然後發天地之藏定萬物之基典謨之篇雅頌之聲不溫純深潤則不足以揚鴻烈而章緝熈蓋胥靡爲宰寂寞爲尸大味必淡大音必希大語呌呌大道低囬是以聲之眇者不可同於衆人之耳形之美者不可混於世俗之目辭之衍者不可齊於庸人之聽今夫弦者高張急徽追趨逐耆則坐者不期而附試為之施咸池揄六莖發蕭韶詠九成則莫有和也是故鍾期死百牙絶弦破琴而不肯與衆鼓􅚽人亡則匠石輟斤而不敢妄斵師曠之調鍾竢知音者之在後也孔子作春秋幾君子之前睹也老𥅆有遺言貴知我者希此非其操與雄見諸子各以知其舛馳大氐詆訾聖人卽爲怪迂析辯詭辭以撓世事雖小辯終破大道而惑衆使溺於所聞而不自知其非也及太史公記六國歴楚漢訖麟止不與聖人同是非頗謬於經故人有問雄者常用法應之譔以爲十三卷象論語號曰法言文多不錄史氏著其目云漢史贊曰雄之自序云爾自號曰法言之前皆是雄本自序之文也初雄年四十餘自蜀來游京師大司馬車騎將軍王音竒其文雅召以爲門下史薦雄待詔歳餘奏羽獵賦除爲郎給事黄門與王莽劉歆並哀帝之初又與董賢同官當成哀平間莽賢皆爲三公權傾人主所薦莫不拔擢而雄三世不徙官及莽簒位談説之士用符命稱功德獲封爵者甚衆雄復不侯以耆老久次轉爲大夫恬於埶利乃如是實好古而樂道其意欲求文章成名於後世以爲經莫大於易故作太元傳莫大於論語作法言史篇莫善於蒼頡作訓纂箴莫善於虞箴作州箴賦莫善於離騷反而廣之辭莫善於相如作四賦皆斟酌其本相與放依而馳騁云用心於内不求於外於時人皆忽之惟劉歆及范逡重焉而桓譚以爲絶倫王莽時劉歆甄豐皆爲上公莽既以符命自立卽位之後欲絶其原以神前事而豐子尋歆子棻復獻之莽誅豐父子投棻四裔辭所連及便收不請時雄校書天禄閣上治獄事使者來欲收雄雄恐不能自免乃從閣上自投下幾死莽聞之曰雄素不與事何故在此間請問其故乃劉棻嘗從雄學作竒字雄不知情有詔勿問然京師爲之語曰惟寂寞自投閣爰清靜作符命雄以病免復召爲大夫家貧耆酒人希至其門時有好事者載酒肴從游學而鉅鹿侯芭常從雄居受其太元法言焉劉歆亦嘗觀之謂雄曰空自苦今學者有禄利然尚不能明易又如元何吾恐後人用覆醬瓿也雄笑而不應年七十一天鳳五年卒侯芭爲起墳喪之三年時大司空王邑納言嚴尤聞雄死謂桓譚曰子常稱揚雄書豈能傳於後世乎譚曰必傳顧君與譚不及見也凡人賤近而貴遠親見揚子雲禄位容貌不能動人故輕其書昔老聃著虛無之言兩篇薄仁義非禮學然後世好之者尚以爲過於五經自漢文景之君及司馬遷皆有是言今揚子之書文義至深而論不詭於聖人若使遭遇時君更閲賢知爲所稱善則必度越諸子矣諸儒或譏以爲雄非聖人而作經猶春秋吳楚之君僭號稱王蓋誅絶之罪也自雄之没至今四十餘年其法言大行而元終不顯然篇籍具存通志卷一百二下
