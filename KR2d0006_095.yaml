body:
  text: 通志卷八十四下宋右迪功郎鄭樵漁仲撰宗室傳第七下景穆十二王景穆皇帝十四男恭皇后生文成皇帝袁椒房生陽平幽王新成尉椒房生京兆康王子推濟隂王小新成陽椒房生汝隂靈王天賜樂良厲王萬夀廣平殤王洛侯母並闕孟椒房生任城康王雲劉椒房生南安惠王楨城陽康王長夀慕容椒房生章武敬王太洛尉椒房生樂陵康王胡兒孟椒房生安定靖王休趙王深早薨無傳母闕魏舊太子後庭未有位號文成即位景穆宫人有子者並號為椒房陽平王新成太安三年封後為內都大官薨諡曰幽長子安夀襲爵孝文後賜名頤纍遷懷朔鎮大將都督三道諸軍事太和中北討蠕蠕詔徴赴亰朂以戰伐之事對曰當仰仗廟算使呼韓同渭橋之禮帝歎曰壯哉王言朕所望也未發遭母憂詔侍臣以金革敦喻既殯而發與左僕射陸睿集三道諸將議軍途所詣於是中道出黑山東道趣士盧河西道向侯延河軍過大磧大破蠕蠕頤入朝詔曰王之前言果不虛也後除朔州刺史及恆州刺史穆泰謀反遣使推頤為主頤密以狀聞泰等伏誅帝甚嘉之宣武景眀元年薨於青州刺史諡曰莊王傳國至孫宗允眀帝時坐殺叔父賜死爵除頤弟衍字安樂賜爵廣陵侯位梁州刺史表請假王以崇威重詔責之轉徐州刺史至州病重帝敕徐成伯乘傳療之疾差成伯還帝曰卿定名醫賚絹三千匹成伯辭請受一千帝曰詩云人之云亡邦國殄瘁以是而言豈惟三千匹乎其為帝所重如此後所生母雷氏卒表請解州詔曰先君餘尊之所厭禮之明文季末陵遲斯典或廢侯既親王之子宜從餘尊之義便可大功後卒於雍州刺史諡曰康侯衍性清慎所在亷潔又不營産業歷牧四州皆有稱績亡日無斂尸之具子暢字叔暢從孝武入關拜鴻臚封博陵王大統三年東討沒於陳子敏嗜酒多費家為之貧其壻柱國乙弗貴大將軍大利稽祏家資皆千萬每營給之敏隨即散盡而帝不之責貴祏後遂絶之位儀同三司改封南武縣公暢弟融字叔融貌甚短陋驍武過人莊帝謀殺爾朱榮以融為直閣將軍及爾朱兆入洛融逃人間後從孝武入關封魏興王位侍郎殿中尚書衍弟欽字思若位中書監尚書右僕射儀同三司欽色尤黑故時人號為黑面僕射欽淫從兄麗妻崔氏為御史中尉封回劾奏遇赦免尋除司州牧欽少好學早有令譽時人語曰皇宗略略夀安思若及晚年貴重不能有所匡益論者輕之欽性吝遇客甚薄嘗託青州人髙僧夀為子求師師至未幾逃去欽以讓僧夀僧夀性滑稽反謂欽曰凡人絶粒七日乃死始經五朝便爾逃遁去食就信實有所闕欽乃大慙於是待客稍厚後除司空公封巨平縣公於河隂遇害贈假黃鉞太師太尉公子子孝字季業早慧年八嵗司徒崔光見而異之曰後生領袖必此人也孝武入關不及從駕後赴長安封義陽王子孝美容儀善戲謔好酒愛士縉紳歸之賓客滿座終日無倦性又寬慈敦睦親族乃置學館於私第集羣從子弟晝夜講讀并給衣食與諸子同後歷尚書令柱國大將軍子孝以國運漸移深自貶晦日夜縱酒後例降為公復姓拓拔氏未幾卒子贇嗣亰兆王子推太安五年封位侍中征南大將軍長安鎮大將子推性沈雅善於綏接秦雍之人服其威惠入為中都大官察獄有稱獻文將禪位於子推以大臣固諌乃傳孝文孝文即位拜侍中本將軍開府儀同三司青州刺史未至道薨子太興襲拜長安鎮大將以黷貨削除官爵後除祕書監還復前爵改封西河轉守衛尉卿初太興遇奇疾醫言不可為遂日供諸沙門冀以愈病他日齋罷庭空有一沙門方至云丐餘食太興戲之曰蔬茹俱盡獨有酒肉耳命取酒一斗羊一臠薦之沙門欣然曰固所欲也引滿大嚼無餘既出侍人徹器而所獻酒肉故具在太興驚噩遽命左右追之四向無所見乃於佛前乞願曰向者天人肉眼不辨若此疾遂已當舍王爵入道已而所患灑然遂表請為僧章十餘上乃見許時孝文南討在軍詔皇太子於四月八日下髮施帛二千匹既為沙門名僧懿居嵩山太和二十二年終子昻字伯暉襲薨昻子悰字魏慶襲孝靜時纍遷太尉録尚書事司州牧青州刺史薨於州詔贈假黃鉞太傅司徒公諡曰文悰寬和有度量美容貌風望儼然得喪之間不見於色性清儉不營産業身死之日家無餘財昻弟仲景性嚴峭孝莊時兼御史中尉京師肅然每向臺恆駕赤牛時人號赤牛中尉太昌初為河南尹奉法無私時吏部尚書樊子鵠部下縱橫又為盜竊仲景密加收捕悉獲之咸即行決於是豪貴寒心孝武帝將入關授仲景中軍大都督留亰師齊神武欲至洛陽仲景遂棄妻子追駕至長安仍除尚書右僕射封順陽王仲景既失妻子乃娶故爾朱天光妻也列氏也列氏本倡也有美色仲景惑之後數嵗故妻叔袁紇氏自洛陽間行詣仲景也列遂徙居别宅久之有姦事露詔仲景殺之仲景寵情逾至謬殺一婢蒙其尸而葬焉潛匿也列僻處人無知者叔袁紇所生三子濟鍾奉皆以宗室早歷清官仲景以也列尚在終為妻子漏言乃謀殺叔袁紇以滅口叔袁紇知之欲先手也列也列謂其從奴曰誠使叔袁紇殺我必投我圊溷中汚穢我儻告宇文丞相冀或不死就令不理首愆猶埋我好地得骨肉親土爾為我告之奴遂告於周文周文依奏詔笞仲景一百免右僕射以王歸第也列以自告免死而逐之仲景猶私不已又有告者詔重笞一百付宗正官爵盡除既而仲景仍通焉周文以其歷仕有令名且杖䇿隨駕乃奏復官爵令叔袁紇與也列同居大統五年除幽州刺史仲景後復多內亂就州賜死仲景弟退字叔照孝莊初除南兖州刺史在州猛暴多所殺害元皓入洛退據州不屈莊帝還宫封汝陽王纍遷秦州刺史先是秦人屢為反覆退盡誅之存者十一二普泰元年除涼州刺史貪暴無極欲規府人及商賈富人財物詐為臺符請諸豪等云欲加賞及至一時屠戮所有資財生口悉沒自入孝靜時位侍中録尚書事薨贈太師子沖襲無子國絶太興弟遙字太原有器望以左衛將軍從孝文南征賜爵饒陽男宣武初遭所生母憂表請解任詔以餘尊所厭不許眀帝初纍遷左光祿大夫仍領護軍時冀州沙門法慶為妖幻説渤海人李歸伯歸伯合家從之招率鄉人推法慶為主法慶以歸伯為十住菩薩平魔軍司定漢王自號大乘殺一人者為一住菩薩殺十人者為十住菩薩又合狂藥令人服之父子兄弟不相知識唯以殺害為事刺史蕭寶夤遣兼長史崔伯驎討之敗於煮棗城伯驎戰沒凶衆遂盛所在屠滅寺舍斬戮僧尼焚燒經像云新佛出世除去衆魔明帝詔以遙為使持節都督北征諸軍事討破之禽法慶并其妻尼惠暉等斬法慶傳首亰師其黨戮於都市初遙大功昆弟皆是景穆之孫至眀帝而本服絶故除遙等屬籍遙表曰竊聞聖人所以南面而聽天下其不可得變革者則親也尊也四世而緦服窮五世而袒免六世而親屬竭矣去茲以往猶繫之以姓而弗别綴之以食而弗殊又律云議親者非唯當世之屬親歷謂先帝之五世謹尋斯旨將以廣帝宗重磐石先帝所以變諸事條為此别制者太和之季方有意於吳蜀經始之費慮深在初割減之起暫出當時也且臨淮王提分屬籍之始髙祖賜帛三千匹所以重分離樂良王長命亦賜縑二千匹所以存慈眷此皆先朝殷勤克念不得已而然者也古人有言百足之蟲至死不僵者以其輔己者衆臣誠不欲妄親太階茍求潤屋但傷大宗一分則天子屬籍不過十數人而已在漢親王之子不限多少皆别土而封謂之王子侯至于魏晉莫不廣胙山河稱之曰公者蓋惡其大宗之不固骨肉之恩疏矣臣去皇上雖是五世之逺於先帝便是天子之孫髙祖所以國秩祿賦復給衣食后族唯給其賦不與衣食者欲以别內外限異同也今諸廟之感在心未忘行道之悲倐然已及其諸封者身亡之日三年服終然後改奪今朝廷猶在遏密之中便議此事實用未安詔付尚書博議以聞尚書令任城王澄尚書左僕射元暉奏同遙表靈太后不從卒諡曰宣公遙弟恆字景安粗涉書史恆以春秋之義為名不以山川表求改名芝歷位太常卿中書監侍中後於河隂遇害贈太傅司徒公諡曰宣穆濟隂王小新成和平二年封頗有武略庫莫奚侵擾詔新成討之新成乃多為毒酒賊逼便棄營而去賊至競飲遂簡輕騎縱擊俘馘甚多後位外都大官薨贈大將軍諡曰惠子鬱字伏生襲位開府為徐州刺史以黷貨賜死國除長子弼字雍眀剛正有文學位中散大夫以世嫡應襲先爵為季父尚書僕射麗用于氏親寵橫奪弼王爵授同母兄子誕弼於是謝絶人事託疾還第宣武徴為侍中弼上表固讓入嵩山以穴為室布衣蔬食卒建義元年子暉業訴復王爵永安三年追贈尚書令司徒公諡曰文獻初弼嘗夢人謂之曰君身不得傳世封其紹先爵者君長子紹逺也弼覺即告暉業終如其言暉業少險薄多與寇盜交通長乃變節涉獵子史亦頗屬文而慷慨有志節歷位司空太尉加特進領中書監録尚書事齊文襄嘗問之曰比何所披覽對曰數尋伊霍之傳不讀曹馬之書文襄銜之暉業以時運漸謝不復圖全唯事飲噉一日三羊二日一犢又嘗賦詩云昔居王道泰濟濟富羣英今逢世路阻狐鬱縱橫齊初降封美陽縣公開府儀同三司特進暉業之在晉陽也無所交遊居常間暇乃撰魏藩王家世號為辨宗録四十卷行於世位望隆重又以性氣不倫每被猜忌天保二年從駕至晉陽於宫門外罵元韶曰爾不及一老嫗背負璽與人何不打碎之我出此言知即死然爾亦詎能幾時文宣聞而殺之并斬臨淮公孝友孝友臨刑驚惶失措暉業神色自若仍鑿氷沈其尸暉業弟昭業頗有學尚位諌議大夫遷給事黃門侍郎衛將軍右光祿大夫卒諡曰文侯鬱弟偃位太中大夫子誕字曇首初誕伯父鬱坐貪汚賜死爵除詔以誕偃正妃子立為嫡孫特聽紹封纍遷齊州刺史在州貪暴人有牛馬騾驢無不見奪奴隸悉逼取良人為婦有沙門為誕採藥還見誕問外議云何對曰唯言王貪願王早代誕曰齊州七萬家吾蒞州家未得三十錢詎得此謗邪後為御史中尉元纂所紏會赦免薨諡曰靜王子撫字伯懿襲莊帝初為從兄暉業訴奪王爵偃弟麗字寶掌位兼宗正卿右衛將軍遷光祿勳宗正右衛如故時秦州屠客王法智推州主簿吕苟兒為主號建明元年置立百官攻逼州郡涇州人陳瞻亦聚衆稱王號聖明元年詔以麗為使持節都督與楊椿討之苟兒率衆十餘萬屯孤山别遣將據諸險要圍逼州城麗出擊大破之遂進軍永洛賊徒逆戰麗夜擊走之行秦州事李韶破茍兒于孤山乘勝追掩獲其父母妻子諸城之圍亦悉奔散茍兒率其王公三十餘人詣麗請罪麗因平賊之勢掠平民七百餘人以為俘宣武嘉其功詔有司不聽追檢拜雍州刺史為政嚴酷吏民患之其妻崔氏誕男麗出死囚及徒流罪者一時放免遷冀州刺史多行殘虐入為尚書左僕射帝問曰聞公在州濫刑非一又多殺道人寧有之乎對曰臣在冀州可殺道人二百許亦復何多帝曰一物不得其所若納諸隍況殺道人二百而言不多乎麗脫冠謝卒諡曰威子顯和少有節操歷司徒記室參軍除徐州安東府長史刺史元法僧叛顯和與戰被禽法僧執手命與連坐顯和曰顯和與阿翁同源别𣲖皆是磐石之宗一朝以地外叛若遇董狐能無慙德遂不肯坐法僧猶欲慰喻顯和曰乃可死作惡鬼不能生為叛臣及將殺之神色自若建義初贈秦州刺史汝隂王天賜和平三年封後為內都大官孝文初殿中尚書胡莫寒簡西部敕勒豪富兼丁者為殿中武士而大納財貨衆怒殺莫寒及髙平假鎮將奚陵於是諸部敕勒悉叛詔天賜與給事中羅雲討之前鋒敕勒詐降雲信之敕勒遂襲殺雲天賜僅得自全纍遷懷朔鎮大將坐貪殘恕死削除官爵卒孝文哭於思政觀贈本爵葬從王禮諡曰靈王子逞字萬安卒於齊州刺史諡曰威逞子慶和東豫州刺史為梁將所攻舉城降之梁武以為北道總督魏王至項城朝廷出師討之望風退走梁武責之曰言同百舌膽若鼷鼠徙於合浦逞弟泛字普安自元士稍遷營州刺史性貪殘人不堪命相率逐之泛走平州後除光祿大夫宗正卿封東燕縣男於河隂遇害泛弟修義字夀安頗有文才自元士稍遷齊州刺史修義以齊州頻喪刺史纍表固辭詔不許聽隨便立治所修義乃移治東城為政寬和遷秦州刺史明帝初表陳庶人禧庶人愈等請宥前愆賜葬陵域靈太后詔曰收葬之恩事由上旨藩嶽何得越職干陳在州多受納纍遷吏部尚書及在銓衡惟事貨賄授官大小並有定價時中散大夫髙居者例合先敘上黨郡缺居遂求之修義私已許人抑居不與居大言不遜修義命左右牽曵之居大聲呼曰有賊在人問居曰白晝公庭賊何許來居指修義曰此坐上者盜天子名器私貨於人而多收其直非賊乎豈必入市攫金而後為賊也修義失色居行罵而去後欲邀駕論修義罪左僕射蕭寶夤喻止之三秦反假修義兼尚書右僕射西道行臺行秦州事為諸軍節度修義性好酒每飲連日遂遇風病神眀昏喪雖至長安竟無部分之益元志敗沒賊東至黑水更遣蕭寶夤討之以修義為雍州刺史卒於州追贈司空諡曰文子均位給事黃門侍郎後入西魏封安昌王位開府儀同三司薨諡曰平子則字孝規襲爵位義州刺史仕周為小冢宰江陵總管子文都性梗直仕周為右侍上士隋開皇初授內史舍人煬帝即位纍遷御史大夫坐事免未幾授太府卿甚有當時譽大業十三年帝幸江都宫詔文都與段達皇甫無逸韋津等同為東都留守帝遇害文都與達津等共推越王侗為帝侗署文都為內史令開府儀同三司光祿大夫左驍衛大將軍攝右翊將軍魯國公既而宇文化及立秦王浩為帝擁兵至彭城所在響應文都諷侗遣使通於李密以拒化及密請效命因授密官爵王世充不悅深忌文都侗以文都領御史大夫世充固執而止盧楚説文都誅世充文都懷奏入殿或以告世充世充馳還含嘉城至夜攻東太陽門而入拜於紫微觀下曰請斬文都歸罪司寇侗見兵勢盛遣將軍楊桃樹執文都以出文都顧謂侗曰臣今朝亡陛下亦當夕及侗慟哭遣之左右莫不閔默出至興教門世充令左右亂斫之諸子並見害則弟矩字孝矩西魏時襲賜爵始平縣公拜南豐州刺史時見元氏將危隂謂昆季曰宇文之心路人所見顛而不扶焉用宗子為兄則所遏乃止後周文為兄子晉公護娶其妹為妻情好甚密及護誅坐徙蜀後拜司獻大夫隋文帝重其門第娶其女為房陵王妃及為丞相拜少冢宰位柱國賜爵洵陽郡王及房陵立為皇太子立其女為皇太子妃親禮彌厚拜夀州總管時陳將任蠻奴等屢寇江北復以孝矩領行軍總管屯兵江上後以年老上表乞骸骨轉涇州刺史卒官諡曰簡子無竭嗣矩次弟雅字孝方有文武幹用開皇中歷左右領軍將軍集沁二州刺史封順陽郡公雅弟褒字孝整幼有成人量年十嵗而孤為諸兄所愛養善事諸兄諸兄議欲别居褒泣諌不從家素富多金寶褒一無所受脫身而出仕周位開府北平縣公趙州刺史從韋孝寬平尉遲迥以功拜柱國進封河間郡公隋開皇中拜原州總管有商人遇劫疑同宿者所為執以詣州褒察其色寃而辭正即舍之商人詣闕訟褒受金縱賊文帝遣使窮治使者簿責褒褒引咎無異辭使者將褒詣亰師坐免官其盜尋發他所上謂曰何至自誣褒曰臣受委一州不能息盜罪一也百姓為人所誣不付法司旋即放免罪二也不顧形迹至令為物所疑罪三也臣有三罪何所逃責臣又不言受賂使者復將有所窮究然則縲紲橫及良善又重臣之罪是以自誣上歎異之稱為長者煬帝即位拜齊郡太守及遼東之役郡官督事者前後相屬有西曹掾當行詐疾褒杖之掾大言曰我將詣行在欲有所告褒大怒因杖百餘數日死坐免官卒于家樂良王萬夀和平三年封拜征東大將軍鎮和龍性貪暴徴還道憂薨諡曰厲王子康王樂平襲薨子長命襲坐殺人賜死國除子忠明帝時復前爵位太常少卿孝武帝泛舟天泉池令宗室諸王陪宴忠愚而無智性好衣服遂著紅羅襦繡作領碧紬袴錦為緣帝謂曰朝廷衣服應有常式何為著百戲衣忠曰臣少來所愛帝曰人之無良乃至此乎廣平王洛侯和平二年封薨諡曰殤無子後以陽平幽王第五子匡後之匡字建扶性耿介有氣節孝文器之謂曰叔父必能儀刑社稷匡弼朕躬今可改名為匡以成克終之美宣武即位纍遷給事黃門侍郎時茹皓始有寵百僚微憚之帝嘗於山陵還詔匡陪乘又命皓登車皓褰裳將上匡諫帝推之令下皓恨匡失色當時壯其忠謇宣武親政除肆州刺史匡既忤皓懼為所害亷慎自修甚有聲績遷恆州刺史徴為大宗正卿河南邑中正匡奏親王及始藩二藩王妻悉有妃號而三藩以下皆謂之妻上不得同為妃名而下不及五品以上有命婦之號竊以為疑請賜三藩王妻亦從妃例詔從之後除度支尚書匡表引樂陵章武王例求紹洛侯封詔付尚書議尚書奏聽襲封以明興絶之義時宣武委政於髙肇宗室傾憚唯匡與肇抗衡先自造棺置於聽事常言當輿此詣闕論肇罪惡然後自殺肇聞而惡之後因與太常卿劉芳議爭權量遂與肇聲色御史中尉王顯奏匡曰自金行失御羣偽競興禮壞樂崩彛倫攸斁髙祖孝文皇帝以睿聖統天克復舊典乃命故中書監髙閭廣旌儒林推尋樂府以黍裁寸將均周漢舊章屬雲構中遷尚未云就髙祖睿思元深參考經記以一黍之大用成分體準之為尺宣布施行暨正始中故太樂令公孫崇輒自立意以黍十二為寸别造尺度定律刋鐘皆向成訖表求觀試時敕太常卿臣芳以崇造既成請集朝英議其得否芳疑崇尺度與先朝不同察其作者於經史復異推造鮮據非所宜行時尚書令臣肇清河王懌等以崇造乖繆與周禮不同遂奏臣芳依周禮更造成訖量校從其善者而芳以先朝尺度事合古典乃依前詔書以黍刋寸並呈朝廷用裁金石于時議者多云芳是唯黃門侍郎臣孫惠蔚與崇扶同二途參差頻經考議而尚書令臣肇以芳造崇物故之後而惠蔚亦造一尺仍云扶以比崇尺自相乖背量省二三謂芳一尺為得而尚書臣匡表云劉孫二尺長短相傾稽考兩律所容殊異言取中黍校彼二家云並參差折中無所自立一途請求議判當時議者或是於匡兩途舛駮未即時定肇又云權斛斗尺班行已久今者所論豈踰先旨宜仰依先朝故尺為定自爾以後而匡與肇厲言都坐聲色相加髙下失其常倫噂競無復彛序匡更表列據已十是云芳十非又云肇前被敕旨共芳營督規立鐘石之名希冀制作之譽乃憑樞衡之尊藉舅氏之勢與奪任心臧否自已阿黨劉芳遏絶臣事望勢雷同者接以恩言依經案古者即被怒責雖未指鹿化馬移天徙日實使藴藉之士聳氣坐端懷道之夫結舌筵次又言芳昔與崇競恆言自作今共臣論忽稱先朝豈不前謂可行輒欲自取後知錯謬便推先朝殊非大臣之體深失為下之義復考校勢臣之前量度偏頗之手臣必刖足內朝抱璞人外囂言肆意彰於朝野然匡職當出納獻朁所在斗尺權度正是所司若已有所見能練臧否宜應首唱義端早辨諸惑何故默心隨從不關一言見芳成事方出此語計芳才學與匡殊懸所見淺深不應相匹今乃始發恐此由心借智於人規成虛譽況匡表云所據銅權形如古志眀是漢作非莽别造及案權銘黃帝始祖德布於虞虞帝始祖德布於新若莽佐漢時事寧有銘偽新之號哉又尋莽傳云莽居攝即變漢制度考校二證非漢權眀矣復云芳之所造又短先朝之尺臣既比之與權相合更云芳尺與千金堰不同臣復量比因見其異二三浮濫難可據準又云共構虛端妄為疑似託以先朝云非己製臣案此欺詐乃在於匡不在於芳何以言之芳先被敕專造鍾律管籥優劣是其所裁權斛尺度本非其事比前門下索芳尺度而芳牒報云依先朝所班新尺復應下黍更不增損為造鍾律調正分寸而已檢匡造時在牒後一嵗芳於爾日匡未共爭已有此牒豈為詐也計崇造寸積黍十二羣情共知而芳造寸唯止十黍亦俱見先朝詔書以黍成寸首尾歷然寧有輒欲自取之理肇任居端右百寮是望言行動靜必副具瞻若恃勢阿黨詐託先詔將指鹿化馬徙日移天即是魏之趙髙何以宰物肇若無此匡既誣毁宰相訕謗時政阻惑朝聽不敬至甚請以肇匡並禁尚書推窮其原付廷尉定罪詔曰可有司奏匡誣肇處匡死刑宣武恕死降為光祿大夫又兼宗正卿出為兖州刺史匡臨發帝引見於東堂勞勉之匡猶以尺度金石之事國之大經雖前為南臺所彈然猶請更議若議之日願聽臣暫赴帝曰劉芳學髙一時深眀典故其所據者與先朝尺乃寸過一黍何得復云先朝之意也兗州既所執不經後議之日何待赴都也眀帝初入為御史中尉匡首奏于忠次彈髙聰等免官靈太后並不許又重違其糾惡之心進號安南將軍以慰安之後加鎮東將軍匡屢請更權衡不已於是詔令匡更集儒貴以時驗決必務權衡得𠂻令寸籥不舛又詔匡特襲廣平王洛侯爵封東平郡王匡所制尺度訖請集朝士議定是非詔付門下尚書三府九列議定以聞太師髙陽王雍等議以為晉中書監荀朂所造之尺與髙祖所定毫釐略同侍中崔光得古象尺于時亦準議令施用臣等仰惟孝文皇睿眀髙古所造宜為不刋之式事難改變請停匡議詔從之匡每有奏請尚書令任城王澄時致執奪匡剛隘不平先所造棺猶在僧寺乃復修事將輿入攻澄澄頗知之後赴省與匡遇騶卒相撾朝野駭愕澄因罪狀匡三十餘條廷尉處以死刑詔付八議特加原宥削爵除官三公郎中辛雄奏理之後特除平州刺史徙青州刺史尋為關右都督兼尚書行臺遇疾還亰孝昌初卒諡曰文貞後追復本爵改封濟南王第四子獻襲薨子祖育襲武定初墜馬薨子勒義襲齊禪爵例降任城王雲和平五年封少聰慧年五嵗景穆崩號哭不絶聲太武抱之泣曰汝何知而有成人意也獻文時拜都督中外諸軍事中都大官聽訟甚得時譽及獻文欲禪位於亰兆王子推王公卿士莫敢先言雲進曰父子相傳久矣皇魏未之有革太尉源賀曰願陛下深思任城言帝竟傳位於孝文後蠕蠕犯塞雲為中軍大都督從獻文討之過大磧雲言於帝曰夷狄之馬未嘗識虎頭楯誠令居前彼馬見之必大辟易因以大衆乘之蔑不破矣帝從之遂大敗蠕蠕獲其酋帥後仇池氏反又命雲討平之除開府徐州刺史雲以太妃蓋氏薨表求解任獻文不許雲悲號成疾乃許之性善撫接深得徐方之心百姓追戀送遺一無所受再遷冀州刺史甚得下情州人請戶輸絹五尺粟五升以報恩德孝文嘉之詔宣告天下使知勸勵遷長安鎮都大將雍州刺史雲亷謹自修留心庶獄挫抑豪強劫盜大息州民頌德者千餘人太和五年薨於州遺令薄葬勿受贈襚諸子奉遵其旨諡曰康陪葬雲中之金陵長子澄字道鏡少好學美鬢髮善舉止言辭清辨響若懸鐘康王薨居喪以孝聞襲封加征北大將軍以氐羌反叛除征南大將軍梁州刺史文眀太后引見誡厲之顧謂中書令李沖曰此兒風神吐發當為宗室領袖是行當不辱命我不妄談也澄至州誘導懷附西南𣢾順加侍中賜衣一襲乘黃馬一匹以旌其能轉開府徐州刺史甚著聲績朝亰師引見於皇信堂孝文詔澄曰昔鄭子産鑄刑書而晉叔向非之此二人皆賢士得失竟誰對曰鄭國寡弱懾於強鄰人情去就非刑莫制故鑄刑書以示威雖乖古典實合權宜帝方謀革變深善其對笑曰任城當欲為魏子産也朕方創改朝制當與任城共萬世之功後徴為中書令改授尚書令齊庾蓽來朝見澄音韻遒雅風儀秀逸謂主客郎中張彛曰往魏任城以武著稱今魏任城乃以文見美也時詔延四廟之子下逮元孫之胄申宗宴於皇信堂不以爵秩為列悉敘昭穆為次用家人之禮帝令宗室各賦詩言志特命澄為七言聨韻與相賡酬遂至極歡際夜乃罷後帝謀遷洛外示南討齋於眀堂左個詔太常王諶命龜卜易其兆遇革澄曰易言革者更也湯武革夏商之命故得之為吉陛下既帝有天下卜征而云革命豈得言吉邪帝厲聲曰此象云大人虎變何言不吉駕還宫即召澄澄至未及升階帝遙謂之曰向者之革今更欲論之眀堂之忿懼衆人競言沮我大計故厲色怖文武耳乃獨謂澄曰國家興自北土徙居平城雖富有四海文軌未一此間用武之地非可興文崤函帝宅河洛王里因茲大舉光宅中原任城意以為何如澄深贊成其事帝曰任城我之子房也加撫軍大將軍太子少保又兼尚書左僕射及車駕幸洛陽定遷都之䇿詔澄馳馹向代開曉百司澄至代都衆聞遷詔莫不驚駭澄援引古今徐以譬之衆皆悅服還報會帝於滑臺帝大喜從幸鄴宫除吏部尚書及車駕自代北巡留澄銓簡舊臣初魏自公侯以下動有萬數冗散無事澄品為三等量其優劣盡其能否之用咸無怨者駕還洛亰復兼右僕射帝至北芒遂幸洪池命澄侍升龍舟帝曰朕昨夢一老公拜立路左稱晉侍中嵇紹奉迎神爽卑懼如有所求何邪澄曰陛下經商墟而弔北干至洛陽而遺嵇紹豈延祖以不得齒録於三仁之列故託諸夢寐冀一慰藉其忠精義魄耳帝感悟即命有司求紹兆域遣使弔祭焉齊明帝廢弒自立其雍州刺史曹虎請以襄陽內附車駕將自赴之引澄及咸陽王禧彭城王協司徒馮誕司空穆亮鎮南李沖等議之禧等或云宜行或言宜止帝曰衆人意見不等宜有客主共相起發任城與鎮南為應留之議朕當為宜行之論諸公坐聽長者從之於是帝往復數交駕遂南征不從澄及李沖等言後從征至懸瓠帝以疾篤還亰初帝之營洛也其宫室有清徽堂流化渠洗煩池觀德殿凝間堂茅茨堂有步元遊凱等廡及是還宫引澄及王公侍臣宴樂其間帝每經一堂一殿輒尋名繹義以示公卿澄亦旁譬逺引求暢上旨帝大悅命黃門侍郎崔光郭祚通直郎邢巒崔休等賦詩羣臣既辭帝復命澄與諸王夜飲極醉而罷後坐公事免官尋兼吏部尚書恆州刺史穆泰在州謀反授澄節銅虎竹使符御仗左右仍行恆州事行達鴈門遣書侍御史李煥先赴至即禽泰窮其黨與巨鹿公陸睿安樂侯元隆等罪人皆得具狀表聞帝覽表大悅曰任城可謂社稷臣正復臯陶斷獄豈能過此顧謂咸陽王等曰汝等脫當其處不能辦此也車駕尋幸平城勞澄引見逆徒無一人稱枉帝曰必也無訟今日見之以澄正尚書車駕南伐留澄居守復兼右僕射澄表請以國秩一嵗租帛助軍詔受其半帝時鋭意改定冠服其後幸鄴見城中車上婦人猶有冠帽而著小襦者以責澄澄曰著者固少帝怒曰任城意欲令全著乎一言而喪邦其是之謂歟又曰王者不降佐於蒼旻朕失於簡授而令任城輩居尚書任城其當佐朕舉天下綱維邪抑但署事而已澄曰臣實署事耳帝曰若爾只一令史足矣何必令僕為哉澄拜謝不已帝怒少解久之遷尚書左僕射從征鍾離帝崩豫受顧命宣武初有降人嚴叔懋告尚書令王肅遣孔思達潛通於齊澄信之以狀聞輒禁止肅咸陽北海二王奏澄擅禁宰輔免官歸第尋除開府揚州刺史下車封孫叔敖之墓毁蔣子文之廟表請修復皇宗之學開四門之教詔從之先是朝議有南伐之謀以蕭寶夤為東揚州刺史據東城陳伯之為江州刺史戍陽石以澄總督二鎮授之節度澄於是遣統軍傅豎眼王神念等進次大峴東關九山淮陵皆分部諸將倍道據之澄總勒大衆駱驛相接所在克捷詔書褒美既而遇雨淮水暴長澄狼狽引歸夀春失亡四千餘人有司奏奪開府降二階澄頻表解州帝不許尋轉鎮北大將軍定州刺史到州眀黜陟賞罰之法蠲除百姓橫調表請公地以賦無業貧人民間布帛不任衣者禁不聽造境內大治澄母孟太妃薨居喪過毁士論稱之服闋除太子太保時髙肇專政猜忌賢戚澄常恐不全乃率意麴蘖以示荒敗所作詭越時謂為狂宣武夜崩事出倉卒髙肇擁兵於外眀帝沖幼朝野不安澄雖疏斥然朝望所屬領軍于忠侍中崔光等奏澄為尚書令於是衆心欣賴尋遷司空加侍中俄詔領尚書令澄表上皇誥宗制并訓詁各一卷欲以勸誡太后又奏時務所宜振舉者十條一曰律度量衡公私不同所宜一之二曰興立學校以眀黜陟之法三曰興滅繼絶各舉所知四曰五調之外一不煩人任人之力不過三日五曰臨民之官皆須黜陟以旌賞罰六曰逃戶代輸去來年久者若非伎作任聽即住七曰邊兵逃亡或實陷沒皆須精檢三長及近親若實隱之徴其代輸不隱勿論八曰工商世業之家毋得復徴租調使專其業九曰三長禁姦不得隔越相領戶不滿者隨近并合十曰羽林虎賁邊民有事暫可赴戰常戍宜遣番兵代之靈太后下其奏議多異同時四中郎將兵數寡弱不足以襟帶亰師澄奏宜以東中帶滎陽郡南中帶魯陽郡西中帶恆農郡北中帶河內郡選二品三品親賢兼稱者居之省非急之作配以強兵斯實深根固本強幹弱枝之義太后善之復以朝議不同而止尋以疾表求解任不許澄以北邊鎮將選舉彌輕奏求重鎮將之選嚴邊防之備朝廷不以為意其後北人入寇舊都鎮將多非其人所在叛亂如澄所慮澄又奏都城府寺猶未周悉今軍旅初寧無宜動衆請取諸職人及司州郡縣犯十杖以上百鞭以下收贖之物絹一匹輸磚二百以漸修造詔從之太傅清河王懌表駁其事因寢不行澄當官無所回避嘗奏司州牧髙陽王臣雍掠殺奉朝請韓元昭前門下録事姚敬賢專虐無君罪至不敬請付廷尉朝野憚之又奏墾田授受之制八條甚有條貫皆有益於政治者而卒不見施用西域嚈達波斯諸國各因入貢並遺澄駿馬一匹澄請付太僕以充國間詔曰王亷貞之德有過楚相可敕付廄以成君子之美御史中尉東平王匡奏請取景眀元年以來內外考簿吏部除書中兵勳案并諸殿最欲以案校竊階盜官之人靈太后許之澄表以為御史之體風聞是司至於冒勳妄階皆有處别若一處有風謠即應攝其一簿研檢虛實茍差殊不同情偽自露然後繩以典刑人誰不服豈有移一省之事窮革世之尤吹毛求疵誠非聖朝盛德之事靈太后納之而止後遷司徒公侍中尚書令如故政無大小皆引澄參預神龜元年詔加女侍中貂蟬澄諌曰高祖世宗朝皆有女侍中官未聞其有同外侍中之飾江南偽晉穆后有女尚書而加貂璫此衰亂之世妖妄之服何足為法且婦人而服男子之服化隂為陽故自穆哀以降國統三絶劉裕因以篡代禮容舉措風化之本不可不慎請依常儀追還前詔從之時太后於亰師起永寧太上公等佛寺外州復各造五級浮圗又數為一切齋會施物動至萬計兼曲賚左右日有數千百姓疲弊帑藏虛竭至削奪百官祿力以給之澄上表極言得失雖卒不從常優答之故為內外所敬憚二年薨贈假黃鉞使持節都督中外諸軍事太傅領太尉公加以殊禮備九錫依晉大司馬齊王攸故事諡曰文宣王澄之葬也凶飾甚盛靈太后親送郊外停輿悲哭哀慟左右百官會赴千餘人莫不歔欷當時以為哀榮之極第四子彛襲彛字子倫繼室馮氏所生頗有父風拜通直散騎常侍及元義專權而彛恥於附託故不得顯職莊帝初於河隂遇害贈儀同三司青州刺史諡曰文彛庶長兄順字子和年九嵗師事樂安陳豐初書王羲之小學篇數千言晝夜誦之旬有五日一皆通徹豐奇之白澄曰豐十五從師迄于白首耳目所經未見此比江夏黃童不得無雙也澄笑曰藍田生玉何容不爾十六通杜氏春秋下帷讀書篤志愛古性謇愕淡於榮利好飲酒解鼓琴每長吟永歎吒詠虛室宣武時上魏道頌文多不載起家為給事中時髙肇權重天下人士望塵拜伏順嘗懷刺詣肇門者以其年少云坐有貴客不肯為通順叱之曰任城王兒可是賤也及見直往登牀捧手抗禮王公先達莫不怪懾而順辭吐慠然若無所覩肇謂衆賓曰此兒豪氣尚爾況其父乎及去肇加禮送之澄聞之大怒杖之數十後拜太常少卿以父憂去職哭泣歐血身自負土時年二十五頓有白髮免喪抽去不復更生世以為孝思所致尋除給事黃門侍郎時領軍元義威勢尤盛凡有遷授莫不造門謝謁順拜表而已初不詣義義謂順曰卿何得聊不見我順正色曰天子富於春秋委政宗翰叔父宜以至公為心舉士報國如何賣恩責人私謝豈所望也至於朝論得失順嘗鯁言正議曽不阿旨由此見憚出除恆州刺史順謂義曰北鎮紛紜方為國梗請假都督為國屏捍義心疑順不欲授以兵官謂順曰此朝廷之事非我所裁順曰叔父既生殺任已自言天歷應在我躬何得復有朝廷義彌忿憚之轉齊州刺史順自負有才不得居內每懷鬱怏形於言色遂縱酒自娛不親政事義解領軍徴為給事黃門侍郎親友郊迎賀其得入順曰不患不入正恐入而復出耳俄兼殿中尚書轉侍中初中山王熙起兵討元義不果而誅及靈太后反政方得改葬順侍坐西遊園因奏太后曰臣昨往會中山家葬非唯宗親哀其寃酷行路士庶見其一家十喪皆為青旐莫不酸泣義妻時在太后側順指之曰陛下奈何以一妹之故不伏元義之罪使天下懷寃太后默然就德興反於營州使尚書盧同往討之大敗而還屬侍中穆紹與順侍坐因論同之罪同先有近宅借紹紹頗欲為言順勃然曰盧同終將無罪太后曰何得如侍中之言順曰同有好宅與要勢侍中豈慮罪也紹慙不敢復言靈太后頗事粧飾數出遊幸順面諍之曰禮婦人喪夫自稱未亡人首去珠珥衣不被綵陛下母臨天下年垂不惑過修容飾何以示後世靈太后慙而還入召順責之曰千里相徴豈欲衆中見辱也順曰陛下盛服炫容不畏天下所笑何恥臣之一言乎初城陽王徽慕順才名偏相賞納而廣陽王深通徽妻于氏大為嫌隙及深自定州被徴入為吏部尚書兼中領軍順為詔書辭頗優美徽疑順為深左右由是與徐紇間順於靈太后出順為護軍將軍太常卿順奉辭於西遊園徽紇侍側順指紇謂太后曰此人魏之宰嚭魏國不滅終不死亡紇脅肩而出順抗聲止之曰一介刀筆小人正堪為機案之吏寧應忝茲執戟虧我彛倫遂振衣而起太后默而不言時追論順父顧託之功增任城王彛邑二千戶又析彛邑五百戶以封順為東阿縣公順疾徽等間之遂為蒼蠅賦以見風屬疾在家杜絶慶弔後除吏部尚書兼右僕射與城陽王徽同日拜職舍人鄭儼於止車門外先謁徽後拜順順怒曰卿是佞人當拜佞王我是直人不受曲拜儼深愧謝順曰卿髙門子弟而為北宫幸臣僕射李思沖嘗與王洛誠同傳以此度之卿亦應繼其卷下見者為之震動順安然自得及上省登階向榻見榻弊故以問吏吏曰此榻曽經先王坐順哽塞流涕遽令易之時參軍曹令史朱暉素事録尚書髙陽王雍雍欲以為廷尉評頻煩託順順不為用雍遂下命用之順投之於地雍大怒昧爽至都聽召尚書及丞郎畢集欲衆辱順順至雍攘袂撫几而言曰身天子之子天子之弟天子之叔天子之相四海之內親尊莫二元順何人以身成命投棄於地順鬚鬢俱張仰視屋極憤氣奔湧長歔不言者久之徐謂雍曰髙祖遷宅中土創定九流官方清濁軌儀萬古而朱暉闒冗省吏何容塵玷廷尉清班殿下既先皇同氣誠宜遵旨自有恆規而復踰之也雍曰宰相黜陟百寮顧不得用一人為官順曰庖人雖不治庖尸祝不越樽俎而代順但知殿下録尚書未聞有别旨令參選事殿下必如是順當隨事奏聞雍理屈遂遜辭呼順入室與飲不敢復言暉事順之方毅不撓皆此類也後兼左僕射爾朱榮之奉莊帝召百官悉至河隂素聞順數諌諍惜其亮直謂朱瑞曰可語元僕射但在省不須來順不達其旨聞害衣冠遂便出走為陵戶鮮于康奴所害家徒四壁無以附身止有書數千卷而已門下通事令史王才達裂裳覆之莊帝還宫遣黃門侍郎山偉巡喻亰邑偉臨順喪悲慟無已既還莊帝怪其聲散偉以狀對莊帝敕侍中元祉曰宗室喪亡非一不可盡贍元僕射清苦之節死乃益彰特賜絹百匹餘不得為例贈尚書令司徒公諡曰文烈初莊帝在藩順夢黑雲從西北來直觸東南日月俱破衆星散落天地斗暗有頃雲却有日出自西南隅甚眀淨見者云此長樂王日也尋見莊帝入自閶闔門登太極殿殿下呼萬嵗者三百官咸加朝服唯已獨脫衣冠卧集書省步廊西槐樹下既寤以所夢告元暉業曰此於我殊不佳因語之曰黑雲者北方之沴氣日君象也月后象也衆星百官象也以事推之得無北虜亂亰邑害二宫戕百僚之事乎彭城王有功德於天下今夢其兒為帝積善必報恐或然矣但惜其得之不久所以然者出自西南以時易年不過三載耳我時卧槐樹下槐字之文從木從鬼身與鬼并復解冠冕寧能不死乎然死後乃得三公贈耳已而皆如其占順嘗撰帝録十七卷詩賦表頌數十篇並多亡失長子朗時年十七枕戈潛伏積年乃手刃康奴以首祭順墓然後詣闕請罪朝廷嘉而不問朗位司徒屬天平中為奴所害贈尚書右僕射順弟紀字子綱隨孝武入關位尚書左僕射華山郡王澄弟嵩字道嶽孝文時位步兵校尉大司馬安定王休薨休於嵩為叔父未及卒哭嵩便遊田帝聞而大怒詔免官後兼武衛將軍孝文南伐齊將陳顯達率衆拒戰嵩身備三仗免胄直前勇冠三軍將士從之顯達奔潰帝大悅曰任城康王大有福德文武頓出其門以功賜爵髙平縣侯初孝文之發洛也馮皇后以罪幽于宫內既平顯達回次榖唐原帝疾甚將賜后死曰使人不易可得顧謂任城王澄曰任城必不負我嵩亦當不負任城可使嵩也於是引嵩入內親詔遣之宣武即位出為揚州刺史威名大震後并妻穆氏為蒼頭李太伯等所害諡曰剛第二子世雋襲世雋頗有幹用而無行業孝莊時遷吏部尚書爾朱兆寇亰師詔世雋以本官都督守河橋及兆至世雋隔岸遙拜即敕所領艘迎兆度河亰師破殘時論疾之尤為爾朱世隆所昵孝武初改封武陽縣子世雋居選曹不能厲心多所受納為中尉彈糾坐免官孝靜時位尚書令世雋輕薄好去就興和中薨贈太尉諡曰躁戾南安王楨皇興二年封孝文時纍遷長安鎮都大將雍州刺史楨性忠謹其母疾篤憂毁異常時有白雉遊其庭前帝聞其致感賜帛千匹以褒美之徴赴講武引見於皇信堂誡之曰公孝行既著令問復彰然宜慎者略有三事一者恃親驕矜違禮僭度二者傲慢貪奢不恤政事三者飲酒遊逸不擇交友三者不去患禍將生而楨不能遵奉乃聚斂肆情孝文以楨孝養聞名內外特加原恕削除封爵以庶人歸第禁錮終身以預議定遷都復封南安王太和二十年遷鎮北大將軍相州刺史楨以五月至鄴上日暴風大雨凍死者數十人是嵗鄴中旱楨禱于羣祀鄴舊有石虎廟楨告神像云三日不雨當以鞭罰既而不雨遂鞭像一百未幾疽發背薨諡曰惠及恆州刺史穆泰謀反楨坐知而不告追奪封爵國除子英性識聰敏善騎射解音律微曉醫術孝文時為梁州刺史帝南伐為漢中别道都將後大駕臨鍾離英以大駕親動勢傾東南漢中有可乘之會表求追討帝許之以功遷安南大將軍賜爵廣武伯宣武即位拜吏部尚書以前後軍功進爵恆山侯尋詔英率衆南討大破梁將曹景宗軍梁司州刺史蔡道恭憂死三關戍棄城而走初孝文平漢陽英有戰功許復其封及為陳顯達所敗遂寢是役也宣武大悅乃復之改封中山王既而梁入寇肥水詔英率衆十萬討之所在皆以便宜從事英表陳事機乃擊破梁衆斬梁將二十五人及斬首五千餘級又頻破梁軍於梁城斬其支將四十二人殺獲及溺死者將五萬梁中軍大將軍臨川王蕭宏尚書僕射栁惔等大將五人沿淮東走凡收米四十萬石英追奔至馬頭梁馬頭戍主委城遁走遂圍鍾離詔以師行既久命英為振旅之意英表期至二月將末三月之初理在必尅但自此月一日以來霖雨連并可謂天違人願然王者行師舉動不易不可以少致暌淹便生異議願聞朝廷特開逺略少復賜寬假以日月無使為山之功中途而廢及四月水盛破橋英及諸將狼狽奔退士衆沒者十五六英至揚州遣使請罪送所授節及衣冠貂蟬章綬等詔以付典有司奏英經算失圗案劾處死詔恕死為民後亰兆王愈反復英王封除使持節假征東將軍都督冀州諸軍事英未發而冀州已平時郢州中從事督榮祖潛引梁軍以義陽應之三關之戍並據城降梁郢州刺史婁悅嬰城自守懸瓠人白早生等殺豫州刺史司馬悅據城南叛梁將齊茍兒率衆守懸瓠悅子尚華陽公主并為所劫宣武詔英使持節都督南征諸軍事假征南將軍出自汝南時帝以都督邢巒頻破早生詔英南赴義陽英以衆少纍拜請軍帝不許而英輒與邢巒分兵共攻懸瓠尅之乃引軍而南既次義陽將取三關英䇿之曰三關相須如左右手若剋一關則二關不待攻而定攻難不如攻易東關易攻宜須先取即黃石公所謂戰如風發攻如河決也英恐其并力於東乃使長史李華率五統向西關分其兵勢身督諸軍向東關果如英䇿凡禽其大將六人支將二十人卒七千米四十萬石軍資稱是還朝除尚書僕射薨贈司徒公諡獻武王英子熙字真興好學俊爽有文名然性輕躁浮動英深慮其非保家之主欲立第四子略略固請乃止纍遷光祿勳時領軍于忠執政熙忠之壻也故嵗中驟遷後授相州刺史以七月上官其日大風寒雨凍死者二十餘人驢馬數十匹熙聞其祖父前事又有蛆生于其庭心忌之初熙兄弟並為清河王懌所昵及劉騰元義隔絶二宫矯詔殺懌熙自州起兵討之兵起甫十日為其長史栁元章别駕遊荆魏郡太守李孝怡所執并其妻子義遣盧同斬之於鄴傳首亰師熙妃于氏前知其必敗苦諌不從自舉事哭泣不絶聲至於熙死熙既藩王加有文學其赴鎮也知友才名之士袁翻李琰之李神雋王誦兄弟裴敬憲等咸餞於河梁賦詩告别及將死復與知故書述志意不遂時人憐之先是任城王澄之未薨也熙夢有人告之曰任城當死死後二百餘日君亦不免謂豫不信試望任城家其居既毁之矣熙夢中顧瞻任城第四壁隤落無完堵焉覺而惡之以告所親既而任城薨熙亦尋敗皆如夢云始熙兄弟每從英征伐在軍貪暴或同迎降逐北至有斬殺無辜多增首級以為功狀又于忠之誣郭祚裴植也忠未決意害之由熙勸奬遂至極法世以為寃及熙之禍識者以為報應焉靈太后反政贈太尉公諡曰文莊王熙弟略字雋興位給事黃門侍郎熙敗略潛行自託故人河內司馬始賓始賓為荻筏夜與略俱度盟津詣上黨屯留栗法光家法光素敦信義欣而納之略舊識刁雙時為河西太守略復歸之停止經年雙乃令從子昌送略潛遁江左梁武甚禮敬之封中山王宣城太守俄而徐州刺史元法僧據城南叛梁以略為大都督詣彭城接誘初附尋徴略與法僧同還略在江南自以家禍晨夜哭泣身若居喪又惡法僧為人與之言未嘗一笑梁復除略衡州刺史未行會其豫章王綜以城歸國綜長史江革司馬祖暅將士五千人悉見禽虜明帝敕有司悉遣革等還南因以徴略梁武備禮遣之刁雙時為光祿大夫帝詔雙境首問勞除略侍中義陽王還達石人驛亭詔宗室親黨內外百官先相識者迎之近郊其司馬始賓除給事中領直候栗法光本縣令刁昌東平太守刁雙西兗州刺史略所經一食一宿處無不霑賞尋改封東平王後為尚書令靈太后甚寵任之其見委信殆與城陽王徽相埓於時天下多事軍國萬端略守常自保無他裨益具臣而已爾朱榮略之姑夫略素所輕忽略又黨於鄭儼徐紇榮兼御之業之入洛也見害於河隂加贈太保司徒公諡曰文貞英弟怡位鄯善鎮將在鎮貪暴為有司所糾逃免卒莊帝初以爾朱榮婦兄贈太尉扶風王子肅封魯郡王肅弟曄字華興小字盆子性輕躁有膂力莊帝初封長廣王爾朱榮死世隆等推曄為主年號建眀尋為世隆所廢節閔立封為東海王孝武初被殺城陽王長壽皇興二年封位沃野鎮都大將甚有威名薨諡康王子鸞襲鸞字宣明身長八尺腰帶十圍以武藝稱頻為北都大將孝文初除使持節征南大將軍與安南將軍盧陽烏李佐攻赭陽不剋敗退降為定襄縣王後以留守功復還本封宣武時為定州刺史鸞愛佛道繕起佛寺大為百姓之擾宣武聞之詔奪祿一周薨諡懷王子徽字顯順粗涉文史頗有吏才宣武時襲封為河內太守在郡清整有時譽明帝時為并州刺史先是州界夏霜安業者少徽輒開倉振之明帝嘉而不罪加安北將軍汾州山胡舊多劫掠自徽為郡羣胡自相戒勿得侵擾鄰州汾肆之人多來詣徽投訴願得口判除秦州刺史還都吏民涕泣攀車不能自已徽車馬羸弊皆亰來舊物見者莫不歎其清儉改授度支尚書兼吏部尚書尋為正徽以選舉法期在得人限以停年有乖舊體但行之日久難以頓革以德同者書年勞等者進德于時稱為中平除侍中餘官如故徽表乞守一官天下士子莫不歎息咸曰城陽離選貧者復何所希怨嗟之聲俄然上徹還令兼吏部尚書纍遷尚書令時靈太后專制朝綱頽褫徽既居寵任無所匡弼與鄭儼徐紇之徒更相阿黨外似柔謹內多猜忌睚眥之忿必思報復識者疾之又不能防間其妻于氏遂與廣陽王深通及深受任軍府每有表啓論徽罪過雖涉誣毁頗亦實焉莊帝踐阼拜司州牧尋除司徒仍領牧元皓之入洛也從莊帝北巡及車駕還宫以與謀之功除侍中大司馬太尉公加羽葆鼓吹增邑通前二萬戶徽表辭官封前後屢上徽為莊帝親待內懼爾朱榮故有此辭莊帝識其意聽其辭封不許讓官徽後妻莊帝舅女侍中李彧帝之姊壻徽性佞媚善自取容挾內外之意宗室親寵莫與比焉遂與彧等勸帝圗榮莊帝亦先有意榮死世隆等屯據不解除徽太保仍大司馬宗師録尚書事總統內外徽本意謂榮死後枝葉散亡及爾朱宗族聚結謀難徽算略無出憂怖而已性多嫉妬不欲人居其前每入參謀議獨與帝決朝臣有上軍國籌䇿者並勸帝不納乃云小賊何慮不除又惜財用於時有所賞錫咸出薄少或多而中減或與而復追莊帝雅自約狹尤亦徽所贊成太府少卿李苖徽司徒時司馬也徽待之頗厚苖每致忠言徽多不采納苖謂人曰城陽本自蜂目而豺聲復將露也及爾朱兆之入禁衛奔散莊帝步出雲龍門徽乘馬奔度帝頻呼之徽不顧而去遂走南山至故吏寇彌宅彌外雖容納內不自安乃怖徽云官捕將至令避他所使人於路邀害之送尸於爾朱兆孝武初贈使持節侍中太師録尚書事司州牧諡曰文獻子延襲爵齊受禪國除章武王太洛皇興二年薨追贈征北大將軍章武郡王諡曰敬無子孝文初以南安惠王第二子彬為後彬字豹兒勇健有將材為夏州刺史以貪婪削封後除汾州刺史胡六百餘人保險謀反彬請兵二萬帝大怒曰必須大衆者則先斬刺史然後發兵彬奉詔大懼身先將士討胡平之卒贈散騎常侍子融字永興儀貌壯麗性通率有豪氣宣武初復先爵纍遷河南尹融性尤貪欲恣情聚斂為中尉糾彈削除官爵汾夏山胡叛逆連結正平平陽詔復融前封為征東將軍持節都督以討之融寡於經略為胡所敗後賊帥鮮于修禮寇瀛定二州長孫承業等討之失利除融車騎將軍為前驅左軍都督與廣陽王深等共討修禮師度交津葛榮殺修禮而自立轉營至白牛邏輕騎擊融於陳見殺贈司空尋以融死王事進贈司徒公加前後部鼓吹諡莊武子景哲襲景哲弟朗即後廢帝也樂陵王胡兒和平四年薨追封樂陵王諡曰康無子獻文詔胡兒兄汝隂王天賜之第二子永全後之襲封改名思譽孝文時為鎮北大將軍穆泰隂謀不軌思譽知而不告削封為庶人太和末復王封薨諡密王子景略襲位幽州刺史薨諡惠王安定王休皇興二年封少聰敏為外都大官斷獄有稱孝文南伐領大司馬休嚴而執法六軍肅然及定都洛邑休從駕幸鄴命休率從駕文武迎家于平城帝親餞休於漳水之北十八年休寢疾帝幸其第流涕問疾中使醫藥相望於路及薨至殯車駕三臨帝至其門改服鍚衰素辨加絰皇太子百官皆從行弔禮諡曰靖王詔贈假黃鉞加羽葆鼓吹悉準三老尉元之儀帝親送出郭慟哭而返諸王恩禮莫比焉宣武世配饗廟庭次子燮襲拜太中大夫除華州刺史州舊居李潤堡燮表移於馮翊古城詔從之燮薨於州贈朔州刺史子超字化生襲時以胡國珍封安定公改封北平王後復本封爾朱榮入洛避難見害超弟琰字伏寶大統中封宋安王薨諡曰懿子景山字寶嶽少有器局幹略過人周閔帝時以軍功纍遷開府儀同三司從武帝平齊以功拜大將軍平原郡公豪州總管法令明肅盜賊屛迹部內大清徴為候正宣帝嗣位從上柱國韋孝寬經略淮南鄖州總管宇文亮反以輕兵襲孝寬孝寬為亮所薄景山擊破之以功拜亳州總管隨文帝為丞相尉遲迥作亂榮州刺史宇文胄與迥通謀隂以書諷景山景山執使封書詣相府進位上大將軍以軍功遷安州總管進柱國隨文帝受禪拜上柱國明年大舉伐陳以景山為行軍元帥出漢口將濟江會陳宣帝殂有詔班師景山大著威名甚為敵人所憚後數嵗坐事免卒于家贈梁州總管諡曰襄子成壽嗣成夀便弓馬為秦王庫直大業中為西平郡通守燮弟願平清狂無行宣武初為給事中悖惡日甚殺人劫盜公私咸患帝以戚近不忍致法免官禁之别館館名愁思堂冀其克念帝崩乃得出靈太后臨朝以其不悛還於别館依前禁錮久之離禁還家付宗師嚴加誨奬後拜通直散騎常侍前將軍坐裸其妻王氏於其男女前又強姦妻妹於妻母之側御史中尉侯剛案以不道處絞刑會赦免黜為員外常侍卒文成五王文成皇帝七男孝元皇后生獻文皇帝李夫人生安樂厲王長樂曹夫人生廣川莊王略沮渠夫人生齊郡順王簡乙夫人生河間孝王若悅夫人生安豐匡王猛元夫人生韓哀王安平早薨無傳安樂王長樂皇興四年封建昌王後改封安樂王長樂性凝重獻文器愛之承明元年拜太尉出為定州刺史頓辱衣冠多不奉法百姓詣闕訟之孝文罰杖三十貪暴彌甚以罪徴詣亰師後謀不軌事發賜死於家葬以王禮諡曰厲子詮字搜賢襲宣武初為涼州刺史在州貪穢政以賄成後除定州刺史及亰兆王愈之反詐言國變在北州鎮咸疑朝廷有釁遣使觀詮動靜詮具以狀告州鎮帖然愈奔信都詮與李平髙殖等討愈平之尋除侍中兼以首告之功除尚書左僕射薨諡曰武康子鑒字長文襲後除相州刺史北討大都督討葛榮仍兼尚書左僕射北道行臺尚書令與都督裴衍共攻信都鑒既庸才見天下多事遂謀反降附葛榮都督源子雍與裴衍合圍鑒斬首傳洛詔改姓元氏莊帝初許復本族又特復鑒王爵贈司空鑒弟斌之字子爽性險無行與鑒同反敗遂奔葛榮榮滅得還孝武帝時封潁川郡王委以腹心之任帝入關斌之奔梁大統二年還長安位尚書令薨贈太尉諡曰武襄廣川王略延興二年封位中都大官性明敏鞫獄稱平太和四年薨諡曰莊子諧字仲和襲十九年薨將大斂帝素委貌深衣哭之入室哀慟撫尸而出有司奏廣川王妃薨於代亰未審以新尊從於卑舊為宜卑舊來就新尊詔曰遷洛之人自茲厥後悉可歸骸芒嶺皆不得就塋恆代其有夫先葬北婦今喪在南婦人從夫宜還代葬若欲移父就母亦得任之其有妻墳於恆代夫死於洛不得以尊就卑欲移母就父宜亦從之若異葬亦從之若不在葬限身在代喪葬之彼此皆得任之其戶屬恆燕身居亰洛去留之宜亦從所擇其屬諸州者各得任意詔贈諧武衛將軍諡曰剛及葬帝親臨送之子靈道襲卒贈悼王齊郡王簡字叔亮太和五年封位中都大官簡母沮渠牧犍女也簡性貌特類外祖後為內都大官孝文嘗與簡俱朝文明太后于皇信堂簡居帝之右行家人禮遷太保孝文仁孝以諸父零落存者唯簡每見立以待之俟坐致敬問起居停簡拜伏簡性好酒不能理公私之事妻常氏燕郡公喜女也文明太后以賜簡幹綜家事頗節簡酒簡乃至盜竊求乞侍婢卒不能禁薨諡靈王宣武時改諡曰順子祐字伯授母常氏孝文以納不以禮不許其為妃宣武以母從子貴詔特拜為齊國太妃祐位涇州刺史薨諡曰敬河間孝王若字叔儒未封而薨追封河間諡曰孝詔亰兆康王子推子太安為後太安於若為從弟非相後之義廢之以齊郡王子琛繼琛字曇寶幼敏慧孝文愛之宣武時拜定州刺史琛妃宣武舅女髙皇后妹琛憑恃內外在州貪婪及還朝靈太后詔曰琛在定州唯不將中山宫來自餘無所不致何可敘用由是廢于家琛以眀帝始學獻金字孝經又無方自達乃與劉騰為養息賂騰金寶巨萬計騰為言乃得兼都官尚書出為秦州刺史在州聚斂百姓吁嗟東益南秦二州氐反詔琛為行臺仍充都督還攝州事琛既總軍省求欲無厭進討氐羌大被摧破內恃劉騰無所畏憚為中尉彈糾會赦除名還復王爵後討鮮于修禮敗免官爵後討汾晉胡蜀卒於軍追復王爵安豐王猛字季烈太和五年封加侍中出為柔元鎮都大將營州刺史猛寬仁雄毅甚有威略戎夷畏愛之薨于州贈太尉諡曰匡子延眀襲宣武時授大中大夫延昌初嵗大飢延眀乃減家財以拯賓客數十人并贍其家至明帝初為豫州刺史甚有政績纍遷博士黃門侍郎延眀既博極羣書兼有文藻鳩集圗籍萬有餘卷性清儉不營産業與中山王熙及臨淮王彧等並以才學令望有名於世雖風流造次不及熙彧而稽古淳篤過之遷侍中詔與侍中崔光撰定服制後兼尚書右僕射以延眀博識多聞敕監金石事及元法僧反詔為東道行臺徐州大都督節度諸軍事與都督臨淮王彧尚書李憲等討法僧梁遣其豫章王綜鎮徐州延明先牧徐方甚得人譽招懷舊士逺近歸之綜既降延明因以軍乘之復東南之境至宿豫而還遷都督徐州刺史徐州頻經師旅人物凋弊延眀招㩗新故人悉安業百姓咸附莊帝時兼大司馬元皓入洛延明受皓委寄皓敗奔梁死於江南莊帝末喪還孝武初贈太保王如故諡曰文宣所著詩賦讚頌銘誄三百餘篇又撰五經宗略詩禮别義注帝王世紀及列仙傳又以河間人信都芳工算圗乃集器凖九篇芳别為之注皆行於世孫長孺孝靜時襲祖爵獻文六王獻文帝七男思皇后生孝文皇帝封昭儀生咸陽王禧韓貴人生趙郡靈王幹髙陽文穆王雍孟椒房生廣陵慧王羽潘貴人生彭城武宣王協髙椒房生北海王詳咸陽王禧字思永太和九年封加侍中驃騎大將軍中都大官文眀太后令皇子皇孫於靜所别置學選忠信博聞之士為之師傅以作成之孝文帝以諸弟典三都職謂禧曰弟等皆幼年任重三都折獄特宜用心夫未能操刀而使割錦非傷錦之尤實授刀之責文明太后亦致誡朂出為使持節開府冀州刺史後禧朝亰師詔以廷尉卿李沖為禧師時王國舍人應取八族及清修之門禧取任城王𨽻戶為之深為帝責帝以諸王婚多猥濫於是為禧聘故潁川太守隴西李輔女自河南王幹以下皆取望族賢淑者配之有司奏冀州人蘇僧瓘等三千人稱禧清明有惠政請世胙冀州詔曰畫野由君理非下請入除司州牧詔以禧元弟之重食邑三千戶自餘五王皆食邑二千孝文引見朝臣詔斷北音一從正字禧贊成其事於是詔年三十以上習性已久容或不可卒革三十已下見在朝廷之人語音不聽仍舊若有故為當議降黜先是帝嘗與僕射李沖論語音事沖曰四方之語竟知誰是帝者之言即為正音帝曰若如卿言將見伊洛之間復成被髮之俗卿此論實負社稷罪合萬死沖免冠謝良久乃已至是帝復追向所責沖者以厲羣臣且曰朕見婦女之服仍為夾領小袖意詔書不可用乎禧對曰陛下光宅中華移風易俗皆由臣等不能率先以致愚夫愚婦屢格眀詔無所逃刑帝曰若朕言非卿等當抗臂廷論何乃入則順旨出則異辭書曰汝無面從退有後言卿等之謂乎尋以禧長兼太尉公帝篤於兄弟以禧次長禮遇甚隆然亦知其貪鄙每加切戒而終不能改後加侍中正太尉及帝崩禧受遺輔政雖為宰輔之首而潛受賄賂姬妾數十意尚未巳猶欲逺有簡聘以恣其情宣武頗惡之景眀二年春召禧等入光極殿詔曰朕比纒尫疾實憑諸父今便親攝百揆宜還府司當别處分尋詔進位太保領太尉帝既覽政禧意不安遂與其妃兄兼給事黃門侍郎李伯尚等謀反帝時幸小平禧在城西小宅初欲勒兵直入金墉衆懷沮異禧心少緩自旦達晡計不決而罷是日帝息於芒山假寐浮圗隂下直寢郎苻承祖薛魏孫皆預禧謀欲乘便害帝承祖私言於魏孫曰吾聞殺天子者身癩魏孫遂止帝亦尋寤有武興王楊集始者知其事馳告變禧未知事露乃與臣妾向洪池别墅遣其齋帥劉小茍奉啓云檢行田牧遂宿於洪池其夜將士所在追禧禧自洪池東南走左右盡散唯兼防閣尹龍武獨從禧渡洛水至柏塢被禽送華林都亭著千斤鎖格龍武羽林掌衛之時熱甚禧渴悶垂死勑斷水漿侍中崔光令左右送酪漿升餘禧一飲而盡初孝文觀台宿有逆氣言於禧元象示變汝終為逆謀會無所成但受惡而已至是果如所言禧臨盡與諸妹公主等訣以一二愛妾為託公主哭且罵之曰兄正坐多取此輩貪逐財物致有今日何用見囑禧愧而無言遂賜死私第絶其諸子屬籍禧之諸女微給資産奴婢自餘家財悉以賚髙肇趙修二家其餘賜內外百官逮于流外多者百匹下至十匹其積聚若此其宫人為之歌曰可憐咸陽王奈何作事誤金牀玉几不能眠夜踏霜與露洛水湛湛彌岸長行人那得度其歌遂流至江表北人之在南者聞絃管奏之莫不灑泣禧八子長子通字曇和竊入河內太守陸琇家琇初與通情既聞禧敗乃殺之通弟翼字仲和後會赦詣闕上書求葬父不許乃與二弟昌煜奔梁正光中詔咸陽亰兆二王諸子並聽附屬籍後復禧王爵葬以王禮詔曄弟坦襲翼與昌申屠氏出曄李妃所出也翼容貌魁壯風制可觀梁武甚重之封為咸陽王翼讓其嫡弟煜梁武不許後為青冀二州刺史鎮郁州翼謀舉州入國為梁武所殺翼弟樹字秀和一家獨立美姿貌善吐納兼有將略位宗正卿年十五奔梁梁武尤器之封為魏郡王後改封鄴王數為將領窺覦邊服爾朱榮之害百官也樹時為郢州刺史請討榮梁武資其士馬侵擾境上孝武初御史中尉樊子鵠為行臺率徐州刺史杜德舍人李昭等討之樹城守不下子鵠使金紫光祿大夫張安期説之樹請委城南歸子鵠許之殺白馬為盟樹恃誓不為戰備與杜德别還南德不許送洛陽置景眀寺樹在洛見嵩山雲南向未嘗不引領歔欷其始發梁也取愛姫玉兒金指環以為别其後密以寄姫示必還之意為人所告賜死未幾杜德暴得狂疾云元樹擊我如此者不絶聲遂死李昭奉使秦州至潼關驛夜夢樹云我得請於帝俟卿至隴然後相取昭覺而惡之及至隴口為賀拔嶽所殺子鵠尋亦為達野拔所害孝靜時樹子貞自建業求隨聘使崔長謙赴鄴葬父梁武許之詔贈樹太師司徒尚書令貞既葬還江南位太子舍人及侯景南奔梁武以貞為咸陽王送景使為魏主未幾景反煜字世茂梁封為桑乾王卒於南坦一名穆字延和慠狠酗酒每於洛橋左右頓辱行人為道路所患從叔安豐王延明每切責之曰汝凶悖性與身長昔宋有東海王禕志性凡劣時人號曰驢王恐汝亦不免此號當時聞者遂號為驢王禧誅後坦兄翼樹等五人相繼南奔故坦得承襲改封敷城王永安初復本封咸陽郡王纍遷侍中莊帝從容謂曰王才非荀蔡中嵗纍遷當由少長朕家故有超授初禧死後諸子貧乏坦兄弟為彭城王協所收養故云孝武初其兄樹見禽坦見樹長且賢慮其代已密勸朝廷除之樹知之泣謂坦曰汝腰背雖偉無善可聞我昔因家難不能死亡寄食江湖受其爵命今者之來非由義至茍活而已豈望榮祿汝何肆其猜忌忘在原之義邪坦作色而去樹死竟不臨哭後歷司徒太尉太傅加侍中太師録尚書事宗師司州牧雖祿厚位尊貪求滋甚賣獄鬻官不知紀極為御史劾奏免官以王歸第尋起為特進出為冀州刺史復專聚斂每百姓納賦除常例先責絹五匹然後為受性好佃漁無日不出秋冬獵雉兔春夏捕魚蟹自言寧三日不食不能一日不獵入為大傅齊天保初凖例降爵封新豐縣公除特進開府儀同三司坐子世寶與通直散騎侍郎彭貴平誹謗妄説圗讖有司奏當死詔並宥之坦配北營州死配所趙郡王幹字思直太和九年封河南王位大將軍孝文篤愛諸弟以幹總戎别道誡之曰司空穆亮年器可師散騎常侍盧陽烏才堪詢訪汝其師之遷洛改封趙郡王除都督冀州刺史詔以李憑為長史唐茂為司馬盧尚之為咨議參軍以匡弼之而憑等諌幹殊不納州表斬盜馬人於律過重尚書以幹初臨縱而不劾詔切責之後轉特進司州牧車駕南討詔幹都督中外諸軍事給鼓吹一部甲士三百人出入殿門幹貪淫不遵政典御史中尉李彪將糾劾之會遇幹於尚書下省屏左右誡之而幹悠然不以為意彪遂表彈之詔幹與北海王詳俱隨太子詣行在所及至帝密使左右察其意色無有憂悔乃親數其過杖之一百免所居官以王還第薨諡曰靈陪葬長陵子謐襲幹妃穆氏表謐及謐母趙等悖禮愆常詔付宗正依禮正罪謐後在母喪聽聲樂為御史中尉李平所彈遇赦復封後為岐州刺史謐性暴虐明帝初臺使元延到其州界以驛邏蕪兵攝帥檢核隊主髙保願列言所有之兵王皆私役謐聞大怒鞭保願等五人各二百後數日謐召近州人夫閉門內外嚴固搜掩城人楚􅀈備至又無事而斬六人城中凶懼衆遂大呼屯門謐怖登樓毁梯以自固士人散走城人分守四門靈太后遣遊擊將軍王崢馳馹喻之城人既見崢至開門謝罪乃罷謐州除大司農卿遷幽州刺史謐妃胡氏靈太后從女也未發坐毆其妃免官後除都官尚書車駕出拜圜丘謐與妃乘赤馬犯鹵簿為御史所彈靈太后特不問薨髙陽王雍幹之母弟啓論謐贈假侍中司州牧諡貞景謐兄諶字興伯性平和位都官尚書爾朱榮之入洛陽啓莊帝欲遷晉陽帝以問諶諶爭之以為不可榮怒曰何關君事而固執也且河隂之役君忘之乎諶曰天下之事天下論之何以河隂之酷而恐元諶諶宗室戚屬位居常伯生既蕪益死復何損正使今日碎首流腸亦無所懼榮大怒欲罪諶其從弟世隆固諌乃止見者莫不震悚諶顔色自若居數日帝與榮登髙見宫闕壯麗列樹成行乃歎曰臣一昨愚志有遷亰之意今見皇居壯觀亦何必去河洛而就晉陽也臣熟思元尚書言深不可奪由是遷都議革永安元年拜尚書左僕射封魏郡王諶本年長應襲王封為其父靈王愛其弟謐以為世子故也莊帝詔復諶趙郡王歷位司空太保太尉録尚書事孝靜初拜大司馬薨諡孝懿諶無他才識歷位雖重時人略之謐弟談頗強立少為宗室所推敬卒於秦州刺史談弟讞貪暴無禮位太中大夫封平鄉男河隂遇害廣陵王羽字叔翻太和九年封加侍中為外都太官羽少聰慧有斷獄之稱後罷三都以羽為大理典決亰師獄訟遷特進尚書右僕射又為太子太保録尚書事孝文將南討遣羽持節安撫六鎮發其突騎夷夏寧悅還領廷尉卿及車駕發羽與太尉元丕等留守代都並加使持節十八年羽表辭廷尉不許羽奏外考令文每嵗終州鎮列牧守績狀及至再考隨其品第以彰黜陟雖外有成令而內令未班內外考察理應同等臣輒推凖外考以定京官績行詔曰論考之事理在不輕問績之方應關朕聽輒爾輕發殊為躁也後孝文臨朝堂考羣臣顧謂羽曰上下二等可為三品中等但為一品所以然者上下是黜陟之科故旌絲髮之美中等守本事可大通帝又謂羽曰汝功勤之績不聞於朝阿黨之音頻干朕聽今黜汝録尚書廷尉但居特進太保又謂尚書令陸睿曰叔翻在省之初甚著善稱自近以來偏頗懈怠豈不由卿等隨其邪偽之心今奪卿尚書令祿一周謂左僕射元贊曰計叔翻之黜卿應大辟但以咎歸一人不復相罪今解卿少師之任削祿一周詔吏部尚書澄曰觀叔父神志驕傲可解少保又謂長兼尚書于果曰卿不能勤謹夙夜數辭以疾今解卿長兼可光祿大夫守尚書削祿一周又謂守尚書尉羽曰卿恭勤在集書殊無憂存左史之事今降為長兼常侍亦削祿一周又謂守尚書盧陽烏曰卿在集書雖非髙功為一省文學之士常不以左史在意今降卿長兼王師守常侍尚書如故奪常侍祿一周謂左丞公孫良右丞乞伏義受曰卿等不能正心直言罪應大辟但以事鍾叔翻故不能别致貶二丞可以白衣守本官冠服祿恤盡皆削奪若三年有成還復本任如其蕪成則永歸南畝謂散騎常侍元景曰卿等自任集書合省逋墮致使王言遺滯起居不修今降為中大夫守常侍奪祿一周又謂諌議大夫李彥曰卿實不稱職可去諌議退為元士又謂中庶子遊肇及中書舍人李平識學可觀可為中第帝復引陸睿元贊等前曰朕為天子何假中原欲令卿等子孫博見多知若永居恆北遇不好文主卿等子弟不免面牆也陸睿對曰實如明詔金氏若不入仕漢朝七葉知名亦不可得也帝大悅車駕南伐除羽開府青州刺史詔曰海服之寄故唯宗良唯酒唯田可不誡與宣武即位遷司州牧及帝覽政引入內面授司徒請為司空許之羽先淫員外郎馮俊興妻夜私遊為俊興所擊積日祕匿薨於府宣武親臨哀贈司徒諡曰慧子恭襲是為節閔帝恭兄欣字慶樂性粗率好鷹犬孝莊初封沛郡王後封淮陽王孝武時加太師開府復封廣陵王太傅司州牧尋除大司馬孝武入關欣投託人使達長安為太傅録尚書事欣於中興宗室禮遇最隆自廣平諸王悉居其下又為大宗師進大冢宰中軍大都督大統中為柱國大將軍太傅文帝謂欣曰王三為太傅再為太師自古人臣未聞此例欣遜謝而已後拜司徒恭帝初遷大丞相薨諡曰容欣好營産業多所樹藝亰師名果皆出其園所汲引及僚佐咸非長者為世所鄙髙陽王雍字思穆少俶儻不恆孝文曰吾亦未能測此兒之淺深然觀其任真率素或年器晚成太和九年封潁川王或説雍待士以營聲譽雍曰吾天子之子位為諸王用聲名何為改封髙陽後為相州刺史帝誡曰為牧之道亦易亦難其身正不令而行故曰易其身不正雖令不從故曰難宣武初遷冀州刺史雍之臨二州也留心政事微有聲稱頃之入拜司州牧帝時幸雍第皆盡家人之禮遷司空轉太尉加侍中尋除太保領太尉侍中如故眀帝初詔雍入居太極西柏堂咨決大政給親信二十人又詔雍為宗師進太傅侍中領太尉公别敕將作營國子監學寺給雍居之領軍于忠擅權專恣僕射郭祚勸雍出之忠矯詔殺祚及尚書裴植廢雍以王歸第朝有大事使黃門就咨訪之忠尋復矯詔將殺雍以問侍中崔光光拒之乃止未幾靈太后臨朝出忠為冀州刺史雍表暴忠罪陳已不能匡正請返私門靈太后感忠保護之勳不問其罪除雍侍中太師領司州牧雍表請王公已下賤妾悉不聽用織成錦繡金玉珠璣違者以違旨論奴婢悉不得衣綾錦纈止於縵繒而已奴則布服並不得以金銀為叉帶犯者鞭一百太后從之而不能久也詔雍乘步挽出入掖門又以本官録尚書事朝晡侍講眀帝覽政詔雍乘車出入大司馬門進位丞相又詔依齊郡順王簡太和故事朝訖侍坐特優拜伏之禮總攝內外與元義同決庶政嵗祿粟至四萬石伎侍盈房榮貴之盛昆弟莫及元妃盧氏薨後更納慱陵崔顯妹欲以為妃宣武初以崔顯世號東崔地寒望劣難之久乃聽許延昌已後踈棄崔氏僅給衣食而已未幾暴薨或云雍殺之也靈太后許賜其女伎未及遺雍遣其閹豎丁鵝自至宫內料簡四人冒以還第太后責其專擅追停之孝莊初於河隂遇害贈假黃鉞相國諡文穆雍識懷短淺又無學業雖居朝首不為時情所推自熙平以後朝政褫落及清河王懌之死元義專政天下大責歸焉嫡子泰字伯昌頗有時譽位太常卿與雍同時遇害贈太尉公髙陽王諡曰文子斌襲斌字善集歷位侍中尚書左僕射斌美儀貌性寬和居官重慎頗為齊文襄愛賞天保初凖例降爵為髙陽縣公拜右光祿大夫二年從文宣討契丹還至白狼河以罪賜死彭城王協字彥和幼而岐嶷姿性不羣太和九年封始平王加侍中協生而母潘氏卒其年獻文崩及有所知啓求追服文眀太后不許乃毁容憔悴心喪三年不參吉慶孝文大奇之壯而耽學雅好屬文長直禁內參決軍國大政萬機之事無不預焉及車駕南伐領宗子軍宿衛左右轉中書令侍中如故改封彭城王帝升金墉城顧見堂後梧竹曰鳯凰非梧桐不栖非竹實不食今梧竹並茂詎能降鳯乎協曰鳯凰應德而來豈梧竹所能降也帝善其言嘗侍內宴帝命羣臣賦詩協既應制帝為改一字賞之曰中令之作雖經雕刋猶是玉之本體不見其為疵也從幸代都經上黨銅鞮山協去帝十許步帝指道間松命協賦詩云比至吾間當就協應口而成帝大喜後頻表解侍中不允詔贈協所生母潘氏為彭城國太妃又除中書監侍中如故帝南討漢陽假協中軍大將軍加鼓吹一部協以寵授頻煩乃面陳曰臣聞兼親踈而兩並異同而建此既成文於昔臣願誦之於後陳思求而不允愚臣不請而得豈今古云殊實遇否大異帝大笑執協手曰二曹才名相忌吾與汝以道德相親緣此而言無慙前烈帝親講喪服於清徽堂從容謂羣臣曰彥和季豫等年在沖蒙早登纓紱失過庭之訓並未習禮每欲令我一解喪服自審義解浮疏抑而不許頃因醉坐脫爾言從故屈朝彥遂親傳説御史中尉李彪對曰自古及今未有天子講禮臣下親承音旨可謂千載一時者也從征沔北除使持節都督南征諸軍事正中軍大將軍開府協親勒大衆時有二大鳥自南方來一向行宫一向幕府各為人所獲協以為祥言之於帝帝戲之曰鳥之畏威豈獨中軍之略朕亦分其一爾眀日果大破崔景蕭衍等軍帝令協為露布既就殊類帝文見者咸謂御筆及至豫州帝為家人書與協曰每欲立一宗師肅我九族汝親則宸極官則中監風標才器實足軌範宗制之重捨汝誰寄有不遵教典隨事以聞帝不豫協內侍醫藥外總軍國之務有國醫徐謇者告歸洛陽協急召至在所泣涕祈請悲感左右乃密為壇於汝水之濱用周公故事為帝請命帝疾稍瘳自懸瓠幸鄴協常侍坐輿輦晝夜不離其側飲食必先嘗之而後手自進御車駕還亰會百僚於宣極堂行飲至䇿勳之禮以協功為最尋以協為司徒太子太傅侍中如故俄而齊將陳顯達內寇帝復親討之詔協持節都督中外諸軍事總攝六師帝仍不豫至馬圈疾甚謂協曰霍子孟以異姓受託汝既親賢不可不勉也協泣曰士於布衣猶為知已盡命况臣託靈先皇誠應竭股肱之力但臣出入喉膂每跨時要此乃周旦遁逃成王疑惑之日臣非所以辭勤請免正欲仰成陛下日鏡之明下令愚臣獲避退之福帝久之曰吾思汝言理實難奪乃手詔宣武曰汝第六父協清規懋賞厭榮辭紱吾百嵗後當聽其遂沖挹之性也帝崩于行宫祕遏喪事協獨與右僕射任城王澄及左右數人為計舉喪於安車中協等視疾進膳可決外奏如常時既達宛城乃夜進安車於郡聽事得斂襯還載卧輿六軍內外莫有知者遣中書舍人張儒奉詔徴宣武會駕梓宫至魯陽乃發喪行服宣武即位協跪授遺敕數紙咸陽王禧疑協為變停於魯陽郡外久之乃入謂協曰汝非但辛勤亦危險至極協恨之對曰兄識髙年長故知有夷險彥和握蛇騎虎不覺艱難禧曰汝恨吾後至耳自孝文不豫協常居中侍醫至於衣不解帶亂首垢面帝患久多忿因之遷怒協每被誚詈言至厲切威責近侍動將誅斬協承顔悉心多所匡濟及帝升遐齊將陳顯逹奔遁始爾慮凶問泄漏致有逼迫協內雖悲慟外示吉容出入俯仰神貌無異及至魯陽東宫官屬多疑協有異志竊懷防懼而協推誠盡禮卒無纎介之過協上諡議協時肇享曰孝五宗安之曰孝道德博聞曰文經天緯地曰文上尊號為孝文皇帝廟號髙祖陵曰長陵帝從之既葬帝固以協為宰輔協頻口陳遺旨請遂素懷帝對協悲慟每不許之頻表懇切帝難違遺勑欲遂其雅情猶逼以外任乃以協為都督定州刺史協仍陳讓帝不許乃述職帝與協書極家人敬請協入亰景明初齊豫州刺史裴叔業以夀春內屬詔協都督南征諸軍事與尚書令王肅迎接夀春復授司徒又詔以本官領揚州刺史進位大司馬領司徒齊將陳伯之屯於肥口胡松又據梁城協部分將士頻戰破之淮南平徴協還朝初協之定夀春獲齊汝隂太守王果豫州中從事庾稷等數人協傾意禮之常參坐席果承間求還江外協矜而許之果又謝曰果等今還仰負慈澤請俟仁駕振旅然後反迹其為逺人所懷如此協至亰師頻表辭大司馬領司徒及所增邑乞還中山有詔不許乃除録尚書侍中司徒如故固辭不允時咸陽王禧驕矜不法北海王詳隂言於帝又言協大得人情不宜久在宰輔勸帝遵遺勑禧等又出領軍于烈為恆州烈深以為忿烈子忠常在左右密令忠言於帝宜早自攬政時初祭王公並齋於廟東坊帝遣于烈將壯士六十人召協禧詳等引見帝謂協曰頃南北務殷不容仰遂沖操朕何敢久違先敕今遂叔父髙蹈之志協等拜謝詔為協造宅務從簡素以遂其心協知見讒作蠅賦以自喻又以協為太師協固辭詔侍中敦喻帝又為書於協崇家人之禮協不得已應命及亰兆廣平王暴虐不法制宿衛隊主率羽林虎賁幽守諸王於其第協表切諌帝不納時議定律令協與髙陽王雍八座朝士有才學者五日一集參論軌制應否之宜凡所裁決時彥歸仰又加侍中協敦尚文史撰自古帝王賢達至於魏世子孫族從為三十卷名曰要略上之尚書令髙肇性凶愎其兄女入為夫人順皇后崩帝欲以為后協固執以為不可肇憾之初協嘗任其舅潘僧固為長樂太守亰兆王愈構逆僧固見逼在其黨中至是肇慮言僧固之參逆謀協實使之協國郎中令魏偃前防閣髙祖珍希肇提㩗構成其事肇初令侍中元暉以奏暉不從又令左衛元珍言之帝訪暉暉眀協無此帝更以問肇肇以偃祖珍為證帝信之永平元年九月召協及髙陽王雍廣陽王嘉清河王懌廣平王懷及髙肇等入時協妃方産固辭不得已與妃訣而登車入東掖門度橋牛傷心惡之宴於禁中夜皆醉各就别所消息俄而元珍將武士齎毒酒至協曰一見至尊死無恨也珍曰至尊何可復見武士以刀鐶築之協乃飲武士就殞之向晨以祳裹尸輿歸其第云過醉而薨協妃李氏司空沖之女也號哭曰髙肇枉害忠良如使天道有靈汝亦行當如我及肇誅復於此室論者知有報應焉協既有功於國無罪見害舉朝喪氣行道士女莫不掩泣景明報德二寺千餘僧鳴鐘將齋聞協薨皆嗟痛不食飲水而罷帝為舉哀東堂追贈假黃鉞使持節都督中外諸軍事司徒公太師給鸞輅九旒虎賁班劒百人前後部羽葆鼓吹輼輬車有司奏太常卿劉芳議諡保定大功曰武善問周逹曰宣宜諡武宣王詔可及莊帝即位追號文穆皇帝妃李氏為文穆皇后遷神主於太廟稱肅祖節閔帝時去其神主嫡子劭字子訥襲封劭善武藝少有氣節明帝初梁將寇邊劭表上粟九千斛資絹六百匹國吏二百人以充軍用靈太后嘉其至意不許纍遷雍州刺史孝昌末靈太后失德四方紛擾劭遂有異志為安豐王延明所啓徴入為御史中尉莊帝即位尊為無上王尋遇害河隂追諡曰孝宣皇帝妻李氏為文恭皇后子韶字世胄好學美容儀初爾朱榮將入洛父劭以韶寄所親滎陽太守鄭仲明仲眀尋為城人所殺韶因亂遇盜幾見害賴仲眀兄子僧副拒賊脫之於難次值一老嫗匿之居十餘日莊帝訪而獲焉襲封彭城王齊神武後以孝武帝后配之魏室奇寶多隨后入韶家有二玉鉢相盛轉而不可出馬腦榼容三升玉縫之皆稱西域鬼作也歷位太尉侍中録尚書事司州牧特進太傅齊天保元年降爵為縣公韶性行溫裕以髙氏壻頗膺時寵能自謙退臨人有惠政好儒學禮致才彥愛林泉修第宅華而不侈文宣嘗剃韶鬢鬚加以粉黛衣婦人服以自隨曰我以彭城為嬪御譏元氏微弱比之婦女十年太史奏云今年當除舊布新文宣謂韶曰漢光武何故中興韶曰為誅諸劉不盡於是乃誅諸元以厭之遂以五月誅元世哲景武等二十五家餘十九家並禁止之韶幽於京畿地牢絶食啖衣袖而死及七月大誅元氏自昭成已下並無遺焉或父祖為王或身常貴顯或兄弟強壯皆斬東市其嬰兒投於空中承之以矟前後死者凡七百二十一人悉投尸漳水割魚者多得爪甲都下為之久不食魚世哲從弟黃頭使與諸囚自金鳯臺各乘紙鴟以飛黃頭獨能至紫陌乃墜仍付御史獄畢義雲餓殺之協弟三子子攸是為孝莊帝北海王詳字季豫美姿容善舉止太和九年封加侍中孝文自洛北巡詳常與侍中彭城王協並在輿輦陪侍左右至文成射銘所帝停駕詔諸弟及侍臣皆試射逺近諸人皆去一二十步唯詳箭及之帝拊掌欣笑遂詔勒銘親自為制車駕南伐詳行中領軍留守孝文臨崩顧命詳為司空輔政宣武攬政為中大將軍録尚書事及咸陽王禧之謀反詳表求解任制不許除太傅領司徒侍中録尚書事如故詳之拜命其夜暴風雷電拔其庭中桐樹大十圍倒立本處初宣武之攬政詳聞彭城王協有震主之慮而欲奪其司徒大懼物議故為大將軍至是乃居之識者以天威如此知其必不終詳既以季父崇寵位望兼極貪冒無厭公私營販又於東掖門外規占第宅至有喪柩在室請延至葬而不見許輿櫬巷次行路哀嗟詳母髙太妃頗助威虐怨響嗷然妃宋王劉昶女不見答禮寵妾范氏愛等伉儷及死葬訖猶毁隧視之又蒸於安定王燮妃髙氏即茹皓妻姊詳既素附於皓又緣淫好往來綢密詳雖貪侈宣武禮敬尚隆常别住華林園西隅與都亭宫館相接帝每潛幸其所肆飲終日與髙太妃相見呼為阿母伏而上酒禮若家人臨出髙每拜送舉觴祝言願官家千萬年夀嵗一入妾母子舍也初宣武之親政詳與咸陽王禧彭城王協並被召入共乘犢車防衛嚴固髙時惶迫以為必死亦乘車傍路哭送至金墉及詳得免髙云自今以後不願富貴但令母子相保共汝掃市作活也至此貴寵榮盛不復言有禍敗之理後為髙肇所譖云詳與皓等謀逆時詳在南第帝召中尉崔亮入禁糾詳貪淫及茹皓劉胄常季賢陳掃靜等專恣之狀夜即收禁南臺又命虎賁百人圍守詳第夜中慮其驚懼奔逸遣左右郭翼開金墉門馳出喻之示以中尉彈狀詳母髙見翼頓首號泣不能自勝詳言審如中尉所糾何憂也人奉我珍異貨物我實受之果為取受吾何憂乎至眀皓等皆賜死引髙陽王雍等五王入議詳罪單車防守還華林館母妻相與哭入所居小奴弱婢數人隨從防援甚嚴徙就太府寺免為庶人别營坊館於洛陽縣東北隅如法禁衛限以終身名曰思善堂將徙詳居之會其家奴隂結黨輩欲攻劫出之密抄名字潛託侍婢通於詳詳始得執省而門防主司遙見突入就詳手中覽得呈奏帝密令害之詳自至太府寺令其母妻還居南宅五日一來後夜母妻不來死於奴婢手中詔喪還南宅諸王皇宗悉令奔赴賵物一依廣陵故事詳之初禁乃以淫髙事告母母大怒詈之曰汝自有妻妾侍婢何共髙麗婢姦令致此罪我得髙麗婢當噉其肉乃杖詳背及兩脛百餘下自行杖力疲乃使奴代髙氏素嚴詳每有微罪常加責罰以絮裏杖至是去絮撻之又杖其妃劉數十云新婦大家女門戶匹敵何所憚而不檢校夫壻劉笑而受罰卒無所言詳貪淫之失雖聞而死罪無定名逺近歎之永平元年十月詔追復王爵諡曰平王子皓襲皓字子眀少慷慨有壯氣為徐州刺史尋為御史彈劾除名後賊帥宿勤眀逺叱干騏驎等寇亂豳華等州乃復皓王爵兼左僕射西道行臺以討眀逺頻破賊解豳華之圍後蕭寶夤等大敗於平涼皓亦奔還亰師武泰初為相州刺史以禦葛榮屬爾朱榮入洛推立莊帝授皓太傅皓以葛榮南侵爾朱縱害遂盤桓顧望圖自安之䇿事不諧遂與子冠受奔梁梁武以為魏主假之兵將令其北入永安二年四月於梁國城南登壇燔燎年號孝基莊帝詔濟隂王暉業於考城拒之為皓所禽莊帝北幸皓遂入洛改稱建武元年皓以數千之衆轉戰屢克據有都邑號令自己天下人情想望風政自謂天之所授頗懷驕怠宿昔賓客近習之徒咸見寵待干擾政事又日夜縱酒不恤軍國所統南兵陵竊市里朝野失望莊帝與爾朱榮還師討皓皓自於河梁拒戰冠受戰敗被禽皓自轘轅出至臨潁為臨潁縣卒所斬初皓入洛其日暴風欲入閶闔門馬大驚不進令人執轡乃入有恆農楊曇華告人曰皓必無成假服衮冕不過六十日又諌議大夫元昭業曰昔更始自洛陽而西初發馬驚奔觸北宫鐵柱三馬皆死而更始卒不成帝位以古譬今其兆一也至七月果敗孝武初贈大師大司馬皓弟頊莊帝初封東海王位中書監及皓入洛成敗未分便以意氣自得為時人所笑皓敗潛竄為人執送斬於都市孝武初贈太尉孝文六王孝文皇帝七男林廢后生廢太子恂文昭皇后生宣武皇帝廣平文穆王懷袁貴人生亰兆王愈羅夫人生清河文獻王懌汝南文宣王悅鄭充華生皇子恌未封早夭廢太子庶人恂字元道生而母死文眀太后撫視之常置左右年四嵗太后親為立名於是大赦太和十七年七月癸丑立為皇太子及冠於廟孝文臨光極東堂引恂入見誡以冠義曰字汝元道所寄不輕汝當尋名求義以順吾旨二十年改字宣道遷洛詔恂詣代都其進止禮儀帝皆為定及恂入辭帝曰今汝不應向代但太師薨於恆壤朕既居皇極之重不容輕赴舅氏之喪欲使汝展哀舅氏拜汝母墓一寫為子之情山陵在彼汝至彼太師事畢後日宜一拜山陵拜訖汝族祖南安可一就問訊在途當溫讀經籍如日親見吾也後帝每嵗征幸恂常留守主執廟祀恂不好讀書體貌肥大深忌河洛暑熱意每追樂北方中庶子髙道悅數苦言致諌恂甚䘖之孝文幸嵩嶽恂留守金墉謀欲召牧馬輕騎奔代手刃道悅於禁中領軍元徽勒門防遏夜得寧靜帝聞之駭惋外寢其事仍至汴口而還引恂數罪與咸陽王禧等親杖恂又令禧等更代百餘下扶曵出外不起者月餘拘於城西别館引見羣臣於清徽堂議廢之司空太子太傅穆亮尚書僕射少保李沖並免冠稽首而謝帝曰古人有言大義滅親此小兒今日不滅乃是國家大禍脫待我無後恐有永嘉之亂乃廢為庶人置之河陽服食所供粗免飢寒而已帝幸代遂如長安中尉李彪承間密表告恂復與左右謀逆帝在長安使中書侍郎邢巒與咸陽王禧奉詔齎椒酒詣河陽賜恂死時年十五嵗斂以粗棺常服瘞於河陽城二十二年冬御史臺令史龍文觀坐法當死告廷尉稱恂前後被攝左右之日有手書自理不知狀而中尉李彪侍御史賈尚寢不為聞尚坐繫廷尉時彪免歸帝在鄴尚書表收彪付洛會赦遂不窮其本末賈尚出繫纍疾數日死初帝將為恂娶司徒馮誕長女以女幼待年長先為聘彭城劉長文滎陽鄭懿女為左右孺子時恂年十三四帝嘗謂郭祥崔光宋辨曰人生須自放不可終朝讀書我欲使恂旦出省經傳食後還內晡時復出日夕而罷卿等以為如何光曰孔子稱血氣未定戒之在色太子尚以幼年涉學之日不宜於正晝之時捨書御內又非所以安柔弱之體固永年之命帝以光言為然乃不令恂晝入內無子京兆王愈字宣德太和二十一年封拜都督徐州刺史以彭城王中軍長史盧陽烏兼長史州事巨細委之陽烏宣武初為護軍將軍帝留愛諸弟愈等常出入宫掖晨昏寢處若家人焉遷中書監為納順皇后妹為妃不見禮答愈在徐州納妾李氏本姓楊東郡人夜聞其歌悅之遂被寵嬖罷州還亰欲進貴之託右中郎將趙郡李時顯為之養父就之禮迎産子寶月順皇后召李入宫毆擊之強令為尼於內以子付妃養之嵗餘后父于徑以后久無所誕乃表勸廣嬪御因令后歸李於愈愈寵愛更甚愈好文章頗著詩賦時引才人宋世景李神雋祖瑩邢晏王遵業張始均等共申宴喜招四方儒學賔客嚴懷真等數十人館而禮之所得榖帛率多散施又崇信佛道用度常至不接與弟廣平王懷頗相誇尚競慕奢麗貪縱不法於是宣武攝愈禁中推案杖愈五十出為冀州刺史始愈自以職非親要勢劣二弟潛懷愧恨頗見言色又以幸妾屢被頓辱內外離抑及在州謀逆遂殺長史羊靈引及司馬李遵稱得清河王密疏云髙肇篡殺主上遂為壇於信都之南柴燎告天即皇帝位赦天下號建平元年立李氏為皇后宣武詔尚書李平討愈愈出拒王師頻敗遂嬰城自守愈知事窮攜李及四子數十騎出門諸軍追之見執以送平詔徴赴亰師申以家人之訓愈每止宿亭傳必㩗李氏盡其私情雖鎖縶之中飲賞自若略無愧懼之色至野王愈語人曰雖主上慈深不忍殺我吾亦何面目以見至尊於是歔欷流涕絶氣而死時年二十一或云髙肇令人殺之斂以小棺瘞之諸子至洛皆見殺後靈太后令愈四子皆附屬籍追封愈臨洮王寶月乃改葬父母追服三年寶月弟寶炬是為文帝清河王懌字宣仁幼而敏慧美姿貌孝文與彭城王協甚器異之並曰此兒風神外偉黃中內潤若天假之年則方二南矣博涉經史兼綜羣言有文才善談理寬仁容裕喜怒不形於色太和二十一年封宣武初拜侍中轉尚書僕射懌才長從政眀於斷決剖判衆務甚有聲名司空髙肇以帝舅寵任既擅威權謀去良宗屢譖懌及亰兆王愈等愈不勝其忿怒遂舉逆冀州肇因愈之逆又譖殺彭城王協懌恐不免肇又録囚徒以立私惠懌因侍宴酒酣乃謂肇曰天子兄弟詎有幾人而炎炎不息昔王莾頭禿亦藉渭陽之資遂篡漢室今君曲形見矣恐復終成亂階又言於宣武曰臣聞唯器與名不可以假人是故季氏旅泰宣尼以為深譏仲叔軒懸邱眀以為至誡諒以天尊地卑君臣道别宜杜漸防萌無相僭越至於減膳録囚人君之事今乃司徒行之詎是人臣之義且陛下修政教解獄訟則時雨可降玉燭自和何使眀君失之於上姦臣竊之於下長亂之基於此在矣宣武笑而不應孝眀熙平初遷太尉侍中如故詔懌裁門下之事又典經義注時有沙門惠憐者自云呪水飲人能差諸病病人就之者日有千數靈太后詔給衣食使於城西南治療百姓懌表諌曰臣聞律深惑衆之科禮絶妖淫之禁皆所以大眀居正防遏姦邪昔在漢末有張角者亦以此術熒惑當時論其所行與今不異遂能眩誘生人卒致黃巾之禍天下塗炭數十年間角之由也昔新垣姦不登於眀堂五利僥終嬰於顯戮此事可為至鑒靈太后深納之太后以懌孝眀懿叔德先具瞻委以朝政事擬周霍懌亦竭力匡輔以天下為己任領軍元義太后之妹夫也恃寵驕盈懌裁之以法每欲黜之為義所疾義黨人通直郎宋準等希義旨告懌謀反禁懌門下訊問左右及朝貴無驗乃釋焉懌以忠而獲謗乃鳩集昔忠烈之士為顯忠録二十卷以見志焉正光元年七月義與劉騰逼孝眀於顯陽殿閉靈太后於後宫囚懌於門下省懌誣伏遂害之時年三十四朝野貴賤知與不知含悲喪氣驚振逺近夷人在亰及歸聞懌之喪為之剺面者數百人神龜三年追封范陽王諡曰文獻以禮加葬後更追復為河間王子亶襲亶子善見是為孝靜帝廣平王懷太和二十一年封纍遷驃騎大將軍孝眀即位拜司空尋進太保領司徒二年薨諡曰文穆長子誨孝昌二年封范陽王第三子修是為孝武帝汝南王悅景眀四年封悅好讀佛經覽書史為性不倫俶儻難測纍遷開府儀同三司熙平二年坐殺人免官以王還第悅妃閭氏即東海公之女也生一子不見禮答有崔延夏者以左道干悅教服松术之劑冀以得仙悅惑之輕與出外採藥暴露原野遂斷酒肉粱稻唯啖麥飯又絶房中而更好男色輕忿妃妾動加捶撻悅嘗野宿靈太后敕檢問其妃引入窮悅事故妃病杖牀褥瘡尚未愈太后因令自今諸王及三藩正妃病百日已上者皆遣奏聞若有猶行捶撻就削封位及清河王懌為元義所害悅了無讎恨之意乃以桑落酒候伺義盡其私佞之情義大喜以悅為侍中太尉臨拜日就懌子亶求懌服玩之物不時稱旨乃召亶杖之百下亶居廬未葬形氣嬴弱暴加威撻殆至不濟悅仍呼阿兒親自拊循尋遷太保出為徐州刺史至州乃為大銼碓置於州門云有盜者即斬其腕姦偷懼其無常能行異事為之暫息孝昌二年復領太尉及爾朱榮舉兵向洛悅遂奔梁梁武甚相資待莊帝崩遂立為魏主年號更興節閔初遣兵送悅置於境上以覬侵逼及齊神武誅爾朱以悅孝文子宜承大業乃令人示意悅既至清狂如故動為罪失乃止孝武初除大司馬開府孝武以廣陵頗有德望以悅屬尊地近內懷畏忌故前後害之贈假黃鉞太師司州牧大司馬王如故諡曰文宣子頴與父奔梁卒於江左皇子恌年七嵗景眀元年薨葬文昭皇后陵東後以增廣文昭后墳塋徙窆北岡李延壽曰魏自西遷之後權移周室周文天縱寬仁性罕猜忌元氏戚屬並見保全內外任使布於列職孝閔踐阼無替前緒眀武纘業亦遵先志雖天厭魏德鼎命已遷枝葉榮茂足以愈於前代矣通志卷八十四下
