body:
  text: 通志卷一百八十宋右迪功郎鄭樵漁仲撰遊俠傳第一附刺客滑稽貨殖遊俠前漢朱家劇孟郭解萬章樓護陳遵原涉刺客史記豫讓聶政荆軻滑稽史記淳于髠優孟優旃郭舍人東郭先生王先生西門豹貨殖前漢范蠡子贛白圭猗頓烏氏螺巴寡婦清蜀卓氏程鄭孔氏丙氏刁間師史任氏遊俠朱家魯人髙祖同時也魯人皆以儒教而朱家用俠聞所藏活豪士以百數其餘庸人不可勝言然終不伐其能歆其德諸所常施唯恐見之振人不贍先從貧賤始家亡餘財衣不兼采食不重味乘不過軥牛専趨人之急甚於己私既隂脫季布之厄及布尊貴終身不見自關以東莫不延頸願交楚田仲以俠聞父事朱家自以為行弗及也田仲死後有劇孟劇孟者洛陽人也周人以商賈為資劇孟以俠顯吳楚反時條侯為大尉乘傳東將至河南得劇孟喜曰吳楚舉大事而不求劇孟吾知其無能為已天下騷動大將軍得之若一敵國云劇孟行大類朱家而好博多少年之戲然孟母死自逺方送喪蓋千乘及孟死家無十金之財而符離王孟亦以俠稱江淮之間是時濟南瞷音間氏陳周膚亦以豪聞景帝聞之使使盡誅此屬其後代諸白梁韓母辟陽翟薛况陕寒孺紛紛復出焉郭解河內軹人也字翁伯溫善相人者許負外孫也解父任俠孝文時誅死解為人靜悍不飲酒少時隂賊感槩不快意身所殺甚衆以軀藉友報仇臧命作姦剽攻休乃鑄錢掘冢不可勝數適有天幸窘急常得脫若遇赦及解年長更折節為儉以德報怨厚施而薄望然其自喜為俠益甚既已振人之命不矜其功其隂賊著於心本發於睚眥如故云而少年慕其行亦輒為報讐不使知也解姊子負解之藝與人飲使之釂非其任強灌之人怒刺殺解姊子去亡解姊怒曰以翁伯時人殺吾子賊不得棄其尸道旁弗葬欲以辱解解使人微知賊處賊窘自歸具以實告解解曰公殺之當吾兒不直遂去其賊罪其姊子收而葬之諸公聞之皆多解之義益附焉解出人皆避有一人獨箕踞視之解問其姓名客欲殺之解曰居邑屋不見敬是吾德不修也彼何罪乃隂請尉史曰是人吾所重至踐更時脫之每至直更數過吏弗求怪之問其故解使脫之箕踞者乃肉袒謝罪少年聞之愈益慕解之行洛陽人有相仇者邑中賢豪居間以十數終不聽客乃見解解夜見仇家仇家曲聽解謂仇家吾聞洛陽諸公在間多不聽今子幸而聽解解奈何從他縣奪人邑賢大夫權乎乃夜去不使人知曰且毋庸待我去令洛陽豪居間乃聽解為人短小恭儉出未嘗有騎不敢乘車入其縣庭之旁郡國為人請求事事可出出之不可者各令厭其意然後乃敢嘗酒食諸公以此嚴重之爭為用邑中少年及旁近縣豪夜半過門常十餘車請得解客舍養之及徙豪茂陵也解家貧不中訾吏恐不敢不徙衛將軍為言郭解家貧不中徙上曰解布衣權至使將軍此其家不貧解徙諸公送者出千餘萬軹人楊季主子為縣掾鬲之解兄子斷楊掾頭解入關關中賢豪知與不知聞聲爭交歡邑人又殺楊季主季主家上書人又殺闕下上聞乃下吏捕解解亡置其母家室夏陽身至臨晉臨晉籍少翁素不知解因出關籍少翁已出解解傳太原所過輒告主人處吏逐迹至籍少翁少翁自殺口絶久之得解窮治所犯為而解所殺皆在赦前軹有儒生侍使者坐客譽郭解生曰解専以姦犯公法何謂賢解客聞之殺此生斷舌吏以責解解實不知殺者殺者亦竟莫知為誰吏奏解無罪御史大夫公孫𢎞議曰解布衣為任俠行權以睚眥殺人解不知此罪甚於解知殺之當大逆無道遂族解自是之後俠者極衆而無足數者然關中長安樊中子槐里趙王孫長陵髙公子西河郭翁中太原魯翁孺臨淮兒長卿東陽陳君孺雖為俠而恂恂有退讓君子之風至若北道姚氏西道諸杜南道仇景東道他羽公子南陽趙調之徒盜跖而居民間者耳曷足道哉此乃鄉者朱家所羞也萭音矩章字子夏長安人也長安熾盛街閭各有豪俠章在城西栁市號曰城西萭子夏為京兆尹門下督從至殿中侍中諸侯貴人爭欲揖章莫與京兆尹言者章逡循甚懼其後京兆不復疑也與中書令石顯相善亦得顯權力門車常接轂至成帝初石顯坐専權擅藝免官歸故郡顯資巨萬當去留牀席器物數百萬直欲以與章章不受賔客或問其故章歎曰吾以布衣見哀於石君石君家破不能有以安也而受其財物此為石氏之禍萭氏反當以為福邪諸公以是服而稱之河平中王尊為京兆尹捕擊豪俠殺章及箭張回酒市趙君都賈子光皆長安名豪報仇怨養刺客者也樓護字君卿齊人父世醫也護少隨父為醫長安出入貴戚家護誦醫經本草方術數十萬言長者咸愛重之共謂曰以君卿之材何不官學乎繇是辭其父學經傳為京兆吏數年甚得名譽是時王氏方盛賔客滿門五侯兄弟爭名其客各有所厚不得左右唯護盡入其門咸得其歡心結士大夫無所不傾其交長者尤見親而敬衆以是服為人短小精辨論議常依名節聽之者皆竦與谷永俱為五侯上客長安號曰谷子雲筆札樓君卿唇舌言其見信用也母死送葬者致車二三千兩閭里歌之曰五侯治喪樓君卿久之平阿侯舉護方正為諫大夫使郡國護假貸多持幣帛過齊上書求上先人冢因會宗族故人各以親疏與束帛一日散百金之費使還奏事稱意擢為天水太守數嵗免家長安中時成都侯商為大司馬衛將軍罷朝欲候護其主簿諫將軍至尊不宜入閭巷商不聽遂往至護家家狹小官屬立車下久住移時天欲雨主簿謂西曹諸掾曰不肯強諫反雨立閭巷商還或白主簿語商恨以他職事去主簿終身廢錮後護復以薦為廣漢太守元始中王莽為安漢公専政莽長子宇與妻兄吕寬謀以血塗莽第門欲懼莽令歸政發覺莽大怒殺宇而吕寬亡寬父素與護相知寬至廣漢過護不以事實語也到數日名捕寬詔書至護執寬莽大喜徴護入為前輝光封息鄉侯列於九卿莽居攝槐里大賊趙朋霍鴻等羣起延入前輝光界護坐免為庶人其居位爵祿賂遺所得亦緣手盡既退居里巷時五侯皆已死年老失勢賔客益衰至王莽篡位以舊恩見召護封為樓舊里附城而成都侯商子邑為大司空貴重商故人皆敬事邑唯護自安如舊節邑亦父事之不敢有闕時請召賔客邑居樽下稱賤子上夀坐者百數皆離席伏護獨東鄉正坐字謂邑曰公子貴如何初護有故人吕公無子歸護護身與吕公妻與吕嫗同食及護家居妻子頗厭吕公護聞之流涕責其妻子曰吕公以故舊窮老託身於我義所當奉遂養吕公終身護卒子嗣其爵陳遵字孟公杜陵人也祖父遂字長子宣帝微時與有故相隨博奕數負進及宣帝即位用遂稍遷至太原太守乃賜遂璽書曰制詔太原太守官尊祿厚可以償博進矣妻君寧時在旁知狀遂於是辭謝因曰事在元平元年赦令前其見厚如此元帝時徴遂為京兆尹至廷尉遵少孤與張竦伯松俱為京兆史竦博學通達以亷儉自守而遵放縱不拘操行雖異然相親友哀帝之末俱著名字為後進冠並入公府公府掾史率皆羸車小馬不上鮮明而遵獨極輿馬衣服之好門外車騎交錯又日出醉歸曹事數廢西曹以故事適之侍曹輒詣寺舍白遵曰陳卿今日以某事適遵曰滿百乃相聞故事有百適者斥滿百西曹白請斥大司徒馬宫大儒優士又重遵謂西曹此人大度士奈何以小文責之乃舉遵能治三輔劇縣補郁夷令久之與扶風相失自免去槐里大賊趙朋霍鴻等起遵為校尉擊朋鴻有功封嘉威侯居長安中列侯近臣貴戚皆貴重之牧守當之官及郡國豪桀至京師者莫不相因到遵門遵耆酒每大飲賔客滿堂輒關門取客車轄投井中雖有急終不得去嘗有部刺史奏事過遵值其方飲刺史大窮候遵霑醉時突入見遵母叩頭自白當對尚書有期會狀母乃令從後閣出去遵大率常醉然事亦不廢長八尺餘長頭大鼻容貌甚偉略涉傳記贍於文辭性善書與人尺牘主皆臧去以為榮請求不敢逆所到衣冠懷之唯恐在後時列侯有與遵同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚座云王莽素竒遵材在位多稱譽者由是起為河南太守既至官當遣從史西召善書吏十人於前治私書謝京師故人遵憑几口占書吏且省官事書數百封親疏各有意河南大驚數月免初遵為河南太守而弟級為荆州牧當之官俱過長安富人故淮陽王外家左氏飲食作樂後司直陳崇聞之劾奏遵兄弟幸得蒙恩超第歷位遵爵列侯備郡守級州牧奉使皆以舉直察枉宣揚聖化為職不正身自慎始遵初除乘藩車入閭巷過寡婦左阿君置酒歌謳遵起舞跳梁頓仆坐上暮因留宿為侍婢扶卧遵知飲酒飫宴有節禮不入寡婦之門而湛酒溷肴亂男女之别輕辱爵位羞汙印韍惡不可忍聞臣請皆免遵既免歸長安賔客愈盛飲食自若久之復為九江及河內都尉凡三為二千石而張竦亦至丹陽太守封淑德侯後俱免官以列侯歸長安竦居貧無賔客時時好事者從之質疑問事論道經書而已而遵晝夜呼號車騎滿門酒肉相屬先是黃門郎揚雄作酒針以諷諫成帝其文為酒客難法度士譬之於物曰子猶瓶矣觀瓶之居居井之眉處髙臨深動常近危酒醪不入口臧水滿懷不得左右牽於纆徽一且叀礙為瓽所轠身提黃泉骨肉為泥自用如此不如鴟夷鴟夷滑稽腹如大壺盡日盛酒人復借酤常為國器託於屬車出入兩宫經營公家繇是言之酒何過乎遵大喜之常謂張竦吾與爾猶是矣足下諷誦經書苦身自約不敢差跌而我放意自恣浮湛俗間官爵功名不減於子而差獨樂顧不優邪竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣雖然學我者易持效子者難將吾常道也及王莽敗二人俱客於池陽竦為賊兵所殺更始至長安大臣薦遵為大司馬護軍與歸德侯劉颯俱使胸奴單于欲脅詘遵遵陳利害為言曲直單于大竒之遣還會更始敗遵留朔方為賊所敗時醉見殺原涉字巨先祖父武帝時以豪桀自陽翟徙茂陵涉父哀帝時為南陽太守天下殷富大郡二千石死官賦斂送喪皆千萬以上妻子通共受之以定産業時又少行三年喪者及涉父死讓還南陽賻送行喪冢廬三年由是顯名京師禮畢扶風謁請為議曹衣冠慕之輻輳大司徒史丹舉能治劇為谷口令時年二十餘谷口聞其名不言而治先是涉季父為茂陵秦氏所殺涉居谷口半嵗所自劾去官欲報仇谷口豪桀為殺秦氏亡命嵗餘逢赦出郡國諸豪長安五陵諸為氣節者皆歸慕之涉遂傾身與相待人無賢不肖闐門在所閭里盡滿客或譏涉曰子本吏二千石之世結髮自修以行喪推財禮讓為名正復讐取仇猶不失仁義何故遂自放縱為輕俠之徒乎涉應曰子獨不見家人寡婦邪始自約敕之時意乃慕宋伯姬及陳孝婦不幸一為盜賊所汚遂行淫失知其非禮然不能自還吾猶此矣涉自以為前讓南陽賻送身得其名而令先人墳墓儉約非孝也乃大治起冢舍周閣重門初武帝時京兆尹曹氏葬茂陵民謂其道為京兆阡涉慕之乃買地開道立表署曰南陽阡人不肯從謂之原氏阡費用皆卬富人長者然身衣服車馬才具妻子內困専以振施貧窮赴人之急為務人嘗置酒請涉涉入里門客有道涉所知母病避疾在里宅者涉即往候叩門家哭涉因入弔問以喪事家無所有涉曰但潔掃除沐浴待涉還至主人對賔客歎息曰人親臥地不收涉何心鄉此願徹去酒食賔客爭問所當得涉乃側席而坐削牘為疏具記衣被棺木下至飯含之物分付諸客諸客奔走市買至日昳皆會涉親閲視已謂主人願受賜矣既共飲食涉獨不飽乃載棺物從賔客往至喪家為棺斂勞來畢葬其周急待人如此後人有毁涉者曰姦人之雄也喪家子即時刺殺言者賔客多犯法罪過數上聞王莽數收繫欲殺輒復赦出之涉懼求為卿府掾史欲以避客文母太后喪時守復土校尉已為中郎後免官涉欲上冢不欲會賔客密獨與故人期會涉單車驅上茂陵投暮入其里宅因自匿不見人遣奴至市買肉奴乘涉氣與屠者爭言斫傷屠者亡是時茂陵守令尹公新視事涉未謁也聞之大怒知涉名豪欲以示衆厲俗遣兩吏脅守涉至日中奴不出吏欲便殺涉去涉迫窘不知所為會涉所與期上冢者車數十乘到皆諸豪也共説尹公尹公不聽諸豪則曰原巨先奴犯法不得使肉袒自縛箭貫耳詣廷門謝罪於君威亦足矣尹公許之涉如言謝復服遣去初涉與新豐富人祁大伯為友大伯同母弟王遊公素嫉涉時為縣門下掾説尹公曰君以守令辱原涉如是一旦真令至君復單車歸為府吏涉刺客如雲殺人皆不知主名可為寒心涉治冢舍奢僣踰制罪惡暴著主上知之今為君計莫若墮壞涉冡舍條奏其舊惡君必得真令如此涉亦不敢怨矣尹公如其計莽果以為真令涉由此怨王遊公選賔客遣長子初從車二十乘劫王遊公家遊公母即祁大伯母也諸客見之皆拜傳曰無驚祁夫人遂殺遊公父及子斷兩頭去涉性略似郭解外溫仁謙遜而內隱好殺睚眥於塵中獨死者甚多王莽末東方兵起諸王子弟多薦涉能得士死可用莽乃召見責以罪惡赦貰拜鎮戎大尹天水太守涉至官無幾長安敗郡縣諸假號起兵攻殺二千石長吏以應漢諸假號素聞涉名爭問原尹何在拜謁之時莽州牧使者依附涉者皆得活傳送致涉長安更始西屏將軍申徒建請涉與相見大重之故茂陵令尹公壞涉冡舍者為建主簿涉本不怨也涉從建所出尹公故遮拜涉謂曰易世矣宜勿復相怨涉曰尹君何一魚肉涉也涉用是怒使客刺殺主簿涉欲亡去申徒建內恨恥之陽言吾欲與原巨先共鎮三輔豈以一吏易之哉賔客通言令涉自繫獄謝建許之賔客車數十乘共送涉至獄建遣兵道徼取涉於車上送車分散馳遂斬涉縣之長安市自哀平間郡國處處有豪桀然莫足數其名聞州郡者霸陵杜君敖池陽韓幼孺馬領繡君賔西河漕中叔皆有謙退之風王莽居攝誅鉏豪俠名捕漕中叔不能得中叔素善強弩將軍孫建莽疑建藏匿之泛以問建建曰臣名善之誅臣足以塞責莽性果賊無所容忍然重建不竟問遂不得也中叔之子少遊復以俠見稱刺客史記取曹沫専諸豫讓聶政荆軻五人為編第今以曹沫在春秋傳専諸在吳世家故不復録豫讓者晉人也故嘗事范氏中行氏而無所知名去而事智伯智伯甚尊寵之及智伯伐趙襄子趙襄子與韓魏合謀滅智伯滅智伯之後而三分其地趙襄子最怨智伯漆其頭以為飲器讓逃遁山中曰嗟乎士為知己者死女為説己者容今智伯知我我必為報讐而死以報智伯則吾魂魄不愧矣乃變名姓為刑人入宫塗厠中挾匕首欲以刺襄子襄子如厠心動執問塗厠之刑人則豫讓內持刀兵曰欲為智伯報仇左右欲誅之襄子曰彼義人也吾謹避之耳且智伯亡無後而其臣欲為報仇此天下之賢人也卒釋去之居頃之豫讓又漆身為厲音賴吞炭為啞使形狀不可知行乞於市其妻不識也行見其友識之曰汝非豫讓邪曰是也其友為泣曰以子之才委質而臣事襄子襄子必近幸子近幸子乃為所欲顧不易邪何乃殘身苦形欲以求報襄子不亦難乎豫讓曰既已委質臣事人而求殺之是懷二心以事其君也且吾所為者極難耳然所以為此者將以愧天下後世之為人臣懷二心以事其君者也既去頃之襄子當出豫讓伏於所當過之橋下襄子至橋馬驚襄子曰此必是豫讓也使人問之果豫讓也於是襄子乃數豫讓曰子不嘗事范中行氏乎智伯盡滅之而子不為報仇而反委質臣於智伯智伯亦已死矣而子獨何以為之報讐之深也豫讓曰臣事范中行氏范中行氏皆衆人遇我我故衆人報之至於智伯國士遇我我故國士報之襄子喟然歎息而泣曰嗟乎豫子子之為智伯名既成矣而寡人赦子亦已足矣子其自為計寡人不復釋子使兵圍之豫讓曰臣聞明主不掩人之美而忠臣有死名之義前君已寬赦臣天下莫不稱君之賢今日之事臣固伏誅然願請君之衣而擊之焉以致報讐之意則雖死不恨非所敢望也敢布腹心於是襄子大義之乃使使持衣與豫讓豫讓拔劍三躍而擊之曰吾可以下報智伯矣遂伏劍自殺死之日趙國志士聞之皆為涕泣其後四十餘年而軹有聶政之事聶政者軹深井里人也殺人避仇與母姊如齊以屠為事久之濮陽嚴仲子事韓哀侯與韓相俠纍有隙嚴仲子恐誅亡去遊求人可以報俠纍者至齊齊人或言聶政勇敢士也避仇隱於屠者之間嚴仲子至門請數反然後具酒自暢聶政母前酒酣嚴仲子奉黃金百鎰前為聶政母夀聶政驚怪其厚固謝嚴仲子嚴仲子固進而聶政謝曰臣幸有老母家貧客逰以為狗屠可以旦夕得甘毳以養親親供養備不敢當仲子之賜嚴仲子辟人因為聶政言曰臣有仇而行遊諸侯衆矣然至齊竊聞足下義甚髙故進百金者將用為夫人粗糲之費得以交足下之歡豈敢以有求望邪聶政曰臣所以降志辱身居市井屠者徒幸以養老母老母在政身未敢以許人也嚴仲子固讓聶政竟不肯受也然嚴仲子卒備賔主之禮而去久之聶政母死既已葬除服聶政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯卿相也不逺千里枉車騎而交臣臣之所以待之至淺鮮矣未有大功可以稱者而嚴仲子奉百金為親夀我雖不受然是者徒深知政也夫賢者以感忿睚眥之意而親信窮僻之人而政獨安得默然而已乎且前日要政政徒以老母老母今以天年終政將為知己者用乃遂西至濮陽見嚴仲子曰前日所以不許仲子者徒以親在今不幸而母以天年終仲子所欲報仇者為誰請得從事焉嚴仲子具告曰臣之仇韓相俠纍又韓君之季父也宗族盛多居處兵衛甚設臣欲使人刺之衆終莫能就今足下幸而不棄請益其車騎壯士可為足下輔翼者聶政曰韓之與衛相去中間不甚逺今殺人之相相又國君之親此其勢不可以多人多人不能無生得失生得失則語泄語泄是舉韓國而與仲子為讐豈不殆哉遂謝車騎人徒聶政乃辭獨行杖劍至韓韓相俠纍方坐府上持兵戟而衛侍者甚衆聶政直入上階刺殺俠纍左右大亂聶政大呼所擊殺者數十人因自皮面決眼自屠出腸遂以死韓取聶政尸暴於市購問莫知誰子於是韓購縣之有能言殺相俠纍者豫千金久之莫知也政姊榮聞人有刺殺韓相者賊不得國不知其名姓暴其尸而縣之千金乃於邑曰其是吾弟與嗟乎嚴仲子知吾弟立起如韓之市而死者果政也伏尸哭極哀曰是軹深井里所謂聶政者也市行者諸衆人皆曰此人暴虐吾國相王購其名姓千金夫人不聞與何敢來識之也榮應之曰聞之然政所以蒙汙辱自棄於市販之間者為老母幸無恙妾未嫁也親既以天年不世妾已嫁夫嚴仲子乃察舉吾弟困汙之中而交之澤厚矣可奈何士固為知己者死今乃以妾尚在之故重自刑以絶從妾其奈何畏殁身之誅終滅賢弟之知大驚韓市人乃大呼天者三卒於邑悲哀而死政之旁晉楚齊衛聞之皆曰非獨政能也乃其姊亦烈女也鄉使政誠知其姊無濡忍之志不重暴骸之難必絶險千里以列其名姊弟俱僇於韓市者亦未必敢以身許嚴仲子也嚴仲子亦可謂知人能得士矣其後二百二十餘年秦有荆軻之事荆軻者衛人也其先乃齊人徙於衛衛人謂之慶卿而之燕燕人謂之荆卿荆卿好讀書擊劍以術説衛元君衛元君不用其後秦伐魏置東郡徙衛元君之支屬於野王荆軻嘗遊過榆次與蓋聶論劍蓋聶怒而目之荆軻出人或言復召荆軻蓋聶曰曩者吾與論劍有不稱者吾目之試往是宜去不敢留使使往之主人荆卿則已駕而去榆次矣使者還報蓋聶曰固去也吾曩者目懾之荆卿遊於邯鄲魯句踐與荆軻博爭道魯句踐怒而叱之荆軻默之逃去遂不復會荆軻既至燕愛燕之狗屠及善擊築者髙漸離荆軻嗜酒日與狗屠及髙漸離飲於燕市酒酣以往髙漸離擊築荆軻和而歌於市中相樂也已而相泣旁若無人者荆軻雖逰於酒人乎然其為人沈重好書其所逰諸侯盡與其賢豪長者相結其之燕燕之處士田光先生亦善待之知其非庸人也居頃之會燕太子丹質秦亡歸燕燕太子丹者故嘗質於趙而秦王政生於趙其少時與丹歡及政立為秦王而丹質於秦秦王之遇燕太子丹不善故丹怨而亡歸歸而求為報秦者國小力不能其後秦日出兵山東以伐齊楚三晉稍蠶食諸侯且至於燕燕君臣皆恐禍之至太子丹患之問其傅鞠武武對曰秦地遍天下威脅韓魏趙氏北有甘泉谷口之固南有涇渭之沃擅巴蜀之饒右隴蜀之山左關殽之險民衆而士厲兵革有餘意有所出則長城之南易水以北未有所定也奈何以見陵之怒欲批其逆鱗哉丹曰然則何由對曰請入圖之居有間秦將樊於期得罪於秦王亡之燕太子受而舍之鞠武諫曰不可夫以秦王之暴而積怒於燕足為寒心又况聞樊將軍之所在乎是謂委肉當餓虎之蹊也禍必不振矣雖有管晏不能為之謀也願太子疾遣樊將軍入胸奴以滅口請西約三晉南連齊楚北購於單于其後乃可圖也太子曰太傅之計曠日彌久心惛然恐不能須臾且非獨於此也夫樊將軍窮困於天下歸身於丹丹終不以迫於強秦而棄所哀憐之交置之胸奴是固丹命卒之時也願太傅更慮之鞠武曰夫行危欲求安造禍而求福計淺而怨深連結一人之後交不顧國家之大害此謂資怨而助禍矣夫以鴻毛燎於爐炭之上必無事矣且以雕鷙之秦行暴怨之怒豈足道哉燕有田光先生其為人智深而勇沈可與謀太子曰願因太傅而得交於田先生可乎鞠武曰敬諾出見田先生道太子願圖國事於先生也田光曰敬奉教乃造焉太子進迎却行為導跪而蔽席田光坐定左右無人太子避席而請曰燕秦不兩立願先生留意也田光曰臣聞騏驥盛壯之時一日而馳千里至其衰老駑馬先之今太子聞光盛壯之時不知臣精已消亡矣雖然光不敢以圖國事所善荆軻可使也太子曰願因先生得結交於荆卿可乎田光曰敬諾即起趨出太子送至門戒曰丹所報先生所言者國之大事也願先生勿泄也田光俯而笑曰諾僂行見荆卿曰光與子相善燕國莫不知今太子聞光壯盛之時不知吾形已不逮也幸而教之曰燕秦不兩立願先生留意也光竊不自外言足下於太子也願足下過太子於宫荆軻曰謹奉教田光曰吾聞之長者為行不使人疑之今太子告光曰所言者國之大事願先生勿泄是太子疑光也夫為行而使人疑之非節俠也欲自殺以激荆卿曰願足下急過太子言光已死明不言也因遂自刎而死荆軻遂見太子言田光已死致光之言太子再拜而跪席膝行流涕有頃而后言曰丹所以誡田先生毋言者欲以成大事之謀也今田先生以死明不言豈丹之心哉荆軻坐定太子避席頓首曰田先生不知丹之不肖使得至前敢有所道此天所以哀燕而不棄其孤也今秦有貪利之心而欲不可足也非盡天下之地臣海內之王者其意不厭今秦已虜韓王盡納其地又舉兵南伐楚北臨趙王翦將數十萬之衆距漳鄴而李信出太原雲中趙不能支秦必入臣入臣則禍至燕燕小弱數困於兵今計舉國不足以當秦諸侯服秦莫敢合從丹之私計愚以為誠得天下之勇士使於秦窺以重利秦王貪其勢必得所願矣誠得劫秦王使悉反諸侯侵地若曹沫之與齊桓公則大善矣則不可因而刺殺之彼秦大將擅兵於外而內有亂則君臣相疑以其間諸侯得合從其破秦必矣此丹之上願而不知所委命唯荆卿留意焉久之荆軻曰此國之大事也臣駑下恐不足任使太子前頓首固請毋讓然後許諾於是尊荆卿為上卿舍上舍太子日造門下供太牢具異物間進車騎美女恣荆軻所欲以順適其意久之荆軻未有行意秦將王翦破趙虜趙王盡收入其地進兵北略地至燕南界太子丹恐懼乃請荆軻曰秦兵旦暮渡易水則雖欲長侍足下豈可得哉荆軻曰微太子言臣願謁之今行而無信則秦未可親也夫樊將軍秦王購之金千斤邑萬家誠得樊將軍首與燕督亢之地圖奉獻秦王秦王必説見臣臣乃得有以報太子曰樊將軍窮困而歸丹丹不忍以己之私而傷長者之意願足下更思之荆軻知太子不忍乃遂私見樊於期曰秦之遇將軍可謂深矣父母宗族皆為戮沒今聞購將軍首金千斤邑萬家將奈何於期仰天大息流涕曰於期每念之常痛於骨髓顧計不知所出耳荆軻曰今有一言可以解燕國之患報將軍之仇何如於期乃前曰為之奈何荆軻曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手揕其胸然則將軍之仇報而燕見陵之愧除矣將軍豈有意乎樊於期偏袒扼捥而進曰此臣之日夜切齒腐心也乃今得聞教遂自剄太子聞之馳往伏尸而哭極哀既已不可奈何乃遂盛樊於期首函封之於是太子豫求天下之利匕首得趙人徐夫人匕首取之百金使工以藥焠之以試人血濡縷人無不立死者乃裝為遣荆軻燕國有勇士秦舞陽年十三殺人人不敢忤視乃令秦舞陽為副荆軻有所待欲與俱其人居逺未來而為治行頃之未發太子遲之疑其改悔乃復請曰日已盡矣荆卿豈有意哉丹請得先遣舞陽荆軻怒叱太子曰何太子之遣往而不反者豎子也且提一匕首入不測之強秦僕所以留者待吾客與俱今太子遲之請辭決矣遂發太子及賔客知其事者皆白衣冠以送之至易水之上既祖取道髙漸離擊築荆軻和而歌為變徴之聲士皆垂淚涕泣又前而為歌曰風蕭蕭兮易水寒壯士一去兮不復還復為羽聲慷慨士皆瞋目髮盡上指冠於是荆軻就車而去終已不顧遂至秦持千金之資幣物厚遺秦王寵臣中庶子蒙嘉嘉為先言於秦王曰燕王誠振怖大王之威不敢舉兵以逆軍吏願舉國為內臣比諸侯之列給貢職如郡縣而得奉守先王之宗廟恐懼不敢自陳謹斬樊於期之頭及獻燕督亢之地圖函封燕王拜送於庭使使以聞大王唯大王命之秦王聞之大喜乃朝服設九賔見燕使者咸陽宫荆軻奉樊於期頭函而秦舞陽奉地圖匣以次進至陛秦舞陽色變震恐羣臣怪之荆軻顧笑舞陽前謝曰北蕃蠻夷之鄙人未嘗見天子故震懾願大王少假借之使得畢使於前秦王謂軻曰取舞陽所持地圖軻既取圖奏之秦王發圖圖窮而匕首見因左手把秦王之袖而右手持匕首揕之未至身秦王驚自引而起袖絶拔劍劍長操其室時惶急劍堅故不可立拔荆軻逐秦王秦王環柱而走羣臣皆愕卒起不意盡失其度而秦法羣臣侍殿上者不得持尺寸之兵諸郎中執兵陳殿下非詔召不得上方急時不及召下兵以故荆軻乃逐秦王而卒惶急無以擊軻而以手共搏之是時侍醫夏無且以其所奉藥囊提荆軻也秦王方環柱走卒惶急不知所為左右乃曰王負劍遂拔以擊荆軻斷其左股荆軻廢乃引其匕首以擲秦王不中中銅柱秦王復擊軻軻被八創自知事不就倚柱而笑箕踞以罵曰事所以不成者以欲生劫之必得約契以報太子也於是左右既前殺軻秦王不怡者良久已而論功賞羣臣及當坐者各有差而賜夏無且黃金二百鎰曰無且愛我乃以藥囊提荆軻也於是秦王大怒益發兵詣趙詔王翦軍以伐燕十月而拔燕薊城燕王喜太子丹等盡率其精兵東保於遼東秦將李信追擊燕王急代王嘉乃遺燕王喜書曰秦所以尤追燕急者以太子丹故也今王誠殺丹以獻秦王秦王必解而社稷幸得血食其後李信追丹丹匿衍水中燕王乃使使斬太子丹欲獻之秦秦兵復進攻之後五年秦卒滅燕虜燕王喜其明年秦并天下立號為皇帝於是秦逐太子丹之客皆亡髙漸離變名姓為人庸保匿作於宋子久之作苦聞其家堂上客擊築傍徨不能去每出言曰彼有善有不善從者以告其主曰彼庸乃知音竊言是非家丈人召使前擊築一坐稱善賜酒而髙漸離念久隱畏約無窮時乃退出其裝匣中築與其善衣更容貌而前舉坐客皆驚下與抗禮以為上客使擊築而歌客無不流涕而去者宋子傳客之聞於秦始皇秦始皇召見人有識者乃曰髙漸離也秦皇帝惜其善擊築重赦之乃矐其目使擊築未嘗不稱善稍益近之髙漸離乃以鉛置築中復進得近舉築撲秦皇帝不中於是遂誅髙漸離終身不復近諸侯之人魯句踐己聞荆軻之刺秦王私曰嗟乎惜哉其不講於刺劍之術也甚矣吾不知人也曩者吾叱之彼乃以我為非人也太史公曰世言荆軻其稱太子丹之命天雨粟馬生角也太過又言荆軻傷秦王皆非也始公孫季功董生與夏無且遊具知其事為余道之如是自曹沫至荆軻五人此其義或成或不成然其意較然不欺其志名垂後世豈妄也哉滑稽史記淳于髠者齊之贅壻也長不滿七尺滑稽多辨數使諸侯未嘗屈辱齊威王之時喜隱好為淫樂長夜之飲沈湎不治委政卿大夫百官荒亂諸侯並侵國且危亡在於旦暮左右莫敢諫淳于髠説之以隱曰國中有大鳥止王之庭三年不蜚又不鳴王知此鳥何也王曰此鳥不蜚則已一蜚沖天不鳴則己一鳴驚人於是乃朝諸縣令長七十二人賞一人誅一人奮兵而出諸侯震驚皆還齊侵地威行三十六年語在田完世家中威王八年楚大發兵加齊齊王使淳于髠之趙請救兵齎金百斤車馬十駟淳于髠仰天大笑冠纓索絶王曰先生少之乎髠曰何敢王曰笑豈有説乎髠曰今者臣從東方來見道旁有禳田者操一豚蹄酒一盂祝曰甌窶滿篝汙邪滿車五榖蕃熟穰穰滿家臣見其所以持者狹而所欲者奢故笑之於是齊威王乃益齎黃金千鎰白璧十雙車馬百駟髠辭而行至趙趙王與之精兵十萬革車千乘楚聞之夜引兵而去威王大説置酒後宫召髠賜之酒問曰先生能飲幾何而醉髠對曰臣飲一斗亦醉一石亦醉威王曰先生飲一斗而醉惡能飲一石哉其説可得聞乎髠曰賜酒大王之前執法在旁御史在後髠恐懼俯伏而飲不過一斗徑醉矣若親有嚴客髠帣韝鞠􅎽侍酒於前時賜餘瀝奉觴上夀數起飲不過二斗徑醉矣若朋友交遊久不相見卒然相覩歡然道故私情相語飲可五六斗徑醉矣若乃州閭之會男女雜坐行酒稽留六博投壺相引為曹握手無罰目眙不禁前有墮珥後有遺簮髠竊樂此飲可八斗而醉二參日暮酒闌合尊促坐男女同席履舄交錯杯盤狼藉堂上燭滅主人留髠而送客羅襦襟解微聞薌澤當此之時髠心最歡能飲一石故曰酒極則亂樂極則悲萬事盡然言不可極極之而衰以諷諫焉齊王曰善乃罷長夜之飲以髠為諸侯主客宗室置酒髠常在側焉王嘗使髠獻鵠於楚出邑門道飛其鵠徒揭空籠造詐成辭往見楚王曰齊王使臣來獻鵠過於水上不忍鵠之渴出而飲之去我飛亡吾欲刺腹絞脛而死恐人之議吾王以鳥獸之故令士自傷殺也鵠毛物多相類者吾欲買而代之是不信而欺吾王也欲赴他國奔亡痛吾兩主使不通故來服過叩頭受罪大王楚王曰善齊有信士若此哉厚賜之財倍鵠在也其後百餘年而有優孟優孟者故楚之樂人也長八尺多辨常以談笑諷諫楚莊王之時有所愛馬衣以文繡置之華屋之下席以露牀啖以棗脯馬病肥死使羣臣喪之欲以棺槨大夫禮葬之左右爭以為不可王下令曰有敢以馬諫者罪至死優孟聞之入殿門仰天大哭王驚而問其故優孟曰馬者王之所愛也以楚國堂堂之大何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如對曰臣請以雕玉為棺文梓為槨楩楓豫章為題楱發甲卒為穿壙老弱負土齊趙陪位於前韓魏翼衛其後廟食太牢奉以萬戶之邑使諸侯聞之皆知大王賤人而貴馬也王曰寡人之過一至此乎為之奈何孟曰請為大王六畜葬之以壠竈為椁銅歷為棺齎以薑棗薦以木蘭祭以粳稻衣以火光葬之於人腹腸於是王乃使以馬屬太官無令天下久聞也相國孫叔敖知其賢人也善待之病且死屬其子曰我死汝必貧困若往見優孟言我孫叔敖之子也居數年其子窮困負薪逢優孟與言曰我孫叔敖子也父且死時屬我貧困往見優孟優孟曰若無逺有所之即為孫叔敖衣冠抵掌談語嵗餘象孫叔敖楚王及左右不能别也莊王置酒優孟前為夀王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相莊王許之三日後優孟復來王曰婦言謂何孟曰婦言慎無為楚相不足為也如孫叔敖之為楚相盡忠為亷以治楚楚王得以霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺因歌曰山居耕田苦難以得食起而為吏身貪鄙者餘財不顧恥辱身死家室富又恐受賕枉法為姦觸大罪身死而家滅貪吏安可為也念為亷吏奉法守職竟死不敢為非亷吏安可為也孫叔敖相楚持亷至死方今妻子窮困負薪而食不足為也於是莊王謝優孟乃召孫叔敖子封之寢邱四百户以奉其祀後十世不絶此知可以言時矣其後二百餘年秦有優旃優旃者秦倡朱儒也善為笑言然合於大道秦始皇時置酒而天雨陛楯者皆沾寒優旃見而哀之謂之曰汝欲休乎陛楯者皆曰幸甚優旃曰我即呼汝汝疾應曰諾居有頃殿上上夀呼萬嵗優旃臨檻大呼曰陛楯郎郎曰諾優旃曰汝雖長何益幸雨立我雖短也幸休居於是始皇使陛楯者得半相代始皇嘗欲大苑囿東至函谷關西至雍陳倉優旃曰善多縱禽獸於其中寇來令麋鹿觸之足矣始皇以故輟止二世立又欲漆其城優旃曰善主上雖無言臣固將請之漆城雖於百姓愁費然佳哉漆城蕩蕩寇來不能上即欲就之易為漆耳顧難為蔭室於是二世笑之以其故止居無何二世殺死優旃歸漢數年而卒郭舍人者武帝幸倡也性滑稽發言陳辭雖不合大道然令人主和説武帝少時東武侯母常養帝帝壯時號之曰大乳母率一月再朝朝奏入有詔使幸臣馬遊卿以帛五十匹賜乳母又奉飲糒飱養乳母上書曰某所有公田願得假倩之帝順適其意曰乳母誠欲得之乎以賜乳母乳母所言未嘗不聽有詔得令乳母乘車行馳道中當此之時公卿大臣皆敬重乳母乳母家子孫奴從者橫暴長安中當道掣頓人車馬奪人衣服聞於中不忍致之法有司請徙乳母家室處之邉奏可乳母當入至前面見辭乳母先見郭舍人為下泣舍人曰即入見辭去疾步數還顧乳母如其言謝去疾步數還顧郭舍人疾言罵之曰咄老女子何不疾行陛下已壯矣寧尚須汝乳而活邪尚何還顧於是人主憐焉悲之乃下詔止無徙乳母罰謫譖之者東郭先生者齊人也以方士待詔公車時大將軍衛青擊胸奴有功來歸詔賜金千斤將軍出宫門東郭先生當道遮衛將軍車拜謁曰願白事將軍止車前東郭先生旁車言曰王夫人新得幸於上家貧今將軍得金千斤誠以半賜王夫人之親人主聞之必喜此所謂竒策便計也衛將軍謝之曰先生幸告之以便計請奉教於是衛將軍乃以五百金為王夫人之親夀王夫人以聞武帝帝曰大將軍不知為此問之將安所受計策對曰受之待詔者東郭先生詔召東郭先生拜以為郡都尉東郭先生久待詔公車貧困飢寒衣敝履不完行雪中履有上無下足盡踐地道中人笑之東郭先生應之曰誰能履行雪中令人視之其上履也其履下處乃似人足者乎及其拜為二千石佩青緺出宫門行謝主人故所以同官待詔者等比祖道於都門外榮華道路立名當世此所謂衣褐懷寶者也當其貧困時人莫省視至其貴也乃爭附之諺曰相馬失之瘦相士失之貧其此之謂邪王夫人病甚人主至自往問之曰子當為王當安所置之對曰願居洛陽人主曰不可洛陽有武庫敖倉當關口天下咽喉自先帝以來傳不置王然聞東國莫大於齊可以為齊王夫人以手擊頭呼幸甚王夫人死號曰齊王太后王先生者北海太守文學卒史也武帝徴北海太守詣行在所王先生自請與太守俱吾有益於君君許之諸府掾功曹白云王先生嗜酒多言少實恐不可與俱太守曰先生意欲行不可逆遂與俱行至宫下待詔宫府門王先生徒懷錢沽酒與衛卒僕射飲日醉不視其太守太守入跪拜王先生謂戶郎曰幸為我呼吾君至門內遙語户郎為呼太守太守來望見王先生先生曰天子即問君何以治北海令無盜賊君對曰何哉對曰選擇賢材各任之以其能賞異等罰不肖王先生曰對如是是自譽自伐功不可也願君對言非臣之力盡陛下神靈威武所變化也太守曰諾召入至於殿下有詔問之曰何以治北海令盜賊不起叩頭對言非臣之力盡陛下神靈威武之所變化也武帝大笑曰於乎安得長者之語而稱之安所受之對曰受之文學卒史帝曰今安在對曰在宫府門外有詔召拜王先生為水衡丞以北海太守為水衡都尉傳曰美言可以市尊行可以加人君子相送以言小人相送以財西門豹者魏文侯時為鄴令豹往到鄴召長老問民之所疾苦長老曰苦為河伯娶婦以故貧豹問其故對曰鄴三老廷掾常嵗賦斂百姓收取其錢得數百萬用二三十萬為河伯娶婦與巫祝共分其餘錢持歸當其時巫行視小家女好者曰是當為河伯婦即聘取洗沐之為治新繒綺縠衣間居齋戒為治齋宫河上張緹絳帷女居其中為具牛酒飯食行十餘日共粉飾之如嫁女牀席令女居其上浮之河中始浮行數十里乃沒其人家有好女者恐大巫祝為河伯取之以故多持女逺逃亡以故城中益空無人又困貧所從來久逺矣民人俗語曰即不為河伯娶婦水來漂沒溺其人民云西門豹曰至為河伯娶婦時願三老巫祝父老送女河上幸來告語之吾亦往送女皆曰諾至其時西門豹往會之河上三老官屬豪長者里父老皆會以人民往觀之三二千人其巫老女子也已年七十從弟子女十人所皆衣繪單衣立大巫後西門豹曰呼河伯婦來視其好醜即將女出帷中來至前豹視之顧謂三老巫祝父老曰是女不好煩大巫婦為入報河伯得更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃曰巫嫗何久也弟子趣之復以弟子一人投河中有頃曰弟子何久也復使一人趣之復投一弟子河中凡投三弟子西門豹曰巫嫗弟子是女子也不能白事煩三老為入白之復投三老河中西門豹簪筆磬折嚮河立待良久長老吏傍觀者皆驚恐西門豹顧曰巫嫗三老不來還奈之何欲復使廷掾與豪長者一人入趣之皆叩頭叩頭且破額血流地色如死灰西門豹曰諾且留待之須臾須臾豹曰廷掾起矣狀河伯留客之久若皆罷去歸矣鄴吏民大驚恐從是以後不敢復言為河伯娶婦西門豹即發民鑿十二渠引河水灌民田田皆溉當其時民治渠少煩苦不欲也豹曰民可與樂成不可與慮始今父老子弟雖患苦我然百嵗後期令父老子孫思我言至今皆得水利民人以給足富十二渠經絶馳道到漢之立而長吏以為十二渠橋絶馳道相比近不可欲合渠水且至馳道合三渠為一橋鄴民人父老不肯聽長吏以為西門君所為也賢君之法式不可更也長吏終聽置之故西門豹為鄴令名聞天下澤流後世無絶已時幾可謂非賢大夫哉傳曰子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺三子之才能誰最賢哉辨治者當能别之貨殖計然者濮上人也博學無所不通尤善計算嘗南遊越范蠡卑身事之粵王句踐困於會稽之上乃用范蠡計然計然曰知鬪則修備時用則知物二者形則萬貨之情可得見矣故旱則資舟水則資車物之理也推此類而修之十年國富厚賂戰士遂報強吳刷會稽之恥范蠡歎曰計然之策十用其五而得意既以施國吾欲施之家乃乘扁舟浮江湖變名姓適齊為鴟夷子皮之陶為朱公以為陶天下之中諸侯四通貨物所交易也乃治産積居與時逐而不責其人故善治産者能擇人而任時十九年之間三致千金而再散分與貧友昆弟後年衰老聽子孫修業而息之遂至巨萬故言富稱陶朱子贛孔子弟子也既學於孔子退而仕衛發貯鬻財曹魯之間七十子之徒賜最為饒而顔淵簞食瓢飲在於陋巷子贛結駟連騎束帛之幣聘於諸侯所至國君無不分庭與之亢禮然孔子賢顔淵而譏子貢曰回也其庶乎屢空賜不受命而貨殖焉億則屢中白圭周人也當魏文侯時李克務盡地力而白圭樂觀時變故人棄我取人取我豫能薄飲食忍嗜欲節衣服與用事僮僕同苦樂趨時若猛獸鷙鳥之發故曰吾治生猶伊尹吕尚之謀孫吳用兵商鞅行法是也故智不足與權變勇不足以決斷仁不能以取豫強不能以有守雖欲學吾術終不告也蓋天下言治生者祖白圭猗頓用盬鹽起邯鄲郭縱以鑄冶成業與王者埒富烏氏螺畜牧及衆斥賣求竒繒物間獻戎王戎王十倍其償豫畜畜至用谷量牛馬秦始皇令螺比封君以時與列臣朝請巴寡婦清其先得丹穴而擅其利數世家亦不訾清寡婦能守其業用財自衛人不敢犯始皇以為貞婦而客之為築女懷清臺秦漢之制列侯封君食租稅嵗率戶二百千户之君則二十萬朝覲聘享出其中庶民農工商賈率亦嵗萬息二千百萬之家即二十萬而更繇租賦出其中衣食好美矣故曰陸地牧馬二百蹄牛千蹄角千足羊澤中千足彘水居千石魚波山居千章之萩安邑千樹棗燕秦千樹栗蜀漢江陵千樹橘淮北榮南河濟之間千樹萩陳夏千畝漆齊魯千畝桑麻渭川千畝竹及名國萬家之城帶郭千畝畝鍾之田若千畝巵茜千畦薑韭此其人皆與千户侯等諺曰以貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也通邑大都酤一嵗千釀醯醬千瓨漿千儋屠牛羊彘千皮榖糴千鍾薪稿千車船長千丈木千章竹竿萬個軺車百乘牛車千兩木器黍者千枚銅器千鈞素木鐵器若巵茜千石馬蹄噭千牛千足羊彘千雙童手指千筋角丹沙千斤其帛絮細布千鈞文采千匹答布皮革千石黍千大斗蘖麴鹽豉千合鮐鮆千斤鯫鮑千鈞棗栗千石者三之狐貂裘千皮羔羊裘千石旃席千具它果菜千種子貸金錢千貫節駔儈貪賈三之亷賈五之亦比千乘之家此其大率也蜀卓氏之先趙人也用鐵冶富秦破趙遷卓氏之蜀夫妻推輦行諸遷虜少有餘財爭與吏求近處處葭萌唯卓氏曰此地狹薄吾聞汶山之下沃壄下有踆鴟至死不飢民工作布易賈乃求逺遷致之臨卭大喜即鐵山鼓鑄運籌算賈滇蜀民富至童八百人田池射獵擬於人君程鄭山東遷虜也亦冶鐵賈魋結民富埒卓氏程卓既衰至成哀間成都羅裒訾至巨萬初裒賈京師隨身數十百萬為平陵石氏持錢其人強力石氏訾次如苴親信厚資遣之令往來巴蜀數年間致千餘萬裒舉其半賂遺曲陽定陵侯依其權力賖貸郡國人莫敢負擅鹽井之利期年所得自倍遂殖其貨宛孔氏之先梁人也用鐵冶為業秦滅魏遷孔氏南陽大鼓鑄規陂田連騎遊諸侯因通商賈之利有遊間公子之名然其贏得過愈於纎嗇家致數千金故南陽行賈盡法孔氏之雍容魯人俗儉嗇而丙氏尤甚以鐵冶起富至巨萬然家自父子兄弟約俯有拾卬有取貰貸行賈遍郡國鄒魯以其故多去文學而趨利齊俗賤奴虜而刁間獨愛貴之桀黠奴人之所患唯刁間收取使之逐魚鹽商賈之利或連車騎交守相然愈益任之終得其力起數千萬故曰寧爵無刁言能使豪奴自饒而盡其力也刁間既衰至成哀間臨災姓偉訾五千萬周人既纎而師史尤甚轉轂百數賈郡國無所不至雒陽街居在齊秦楚趙之中富家相矜以久賈過邑不入門設用此等故師史能致十千萬師史既衰至成哀王莽時雒陽張長叔薛子仲訾亦至十千萬莽皆以為納言士欲法武帝然不能得其利宣曲任氏其先為督道倉吏秦之敗也豪桀爭取金玉任氏獨窖倉粟楚漢相距滎陽民不得耕種米石至萬而豪桀金玉盡歸任氏任氏以此起富富人奢侈而任氏折節為力田畜人爭取賤賈任氏獨取貴善富者數世然任公家約非田畜不衣食公事不畢則不得飲酒食肉以此為閭里率故富而主上重之塞之斥也唯橋姚以致馬千匹牛倍之羊萬榖以萬鍾計吳楚兵之起長安中列侯封君行從軍旅齎貣子錢家子錢家以關東成敗未決莫肯豫唯毋鹽氏出捐千金貸其息十之三月吳楚平一嵗之中則母鹽氏息十倍用此富關中關中富商大賈大抵盡諸田田嗇田蘭韋家栗氏安陵杜氏亦巨萬前富者既衰自元成訖王莾京師富人杜陵樊嘉茂陵摯網平陵如氏苴氏長安丹王君房豉樊少翁王孫大卿為天下髙訾樊嘉五千萬其餘皆巨萬矣王孫卿以財養士與雄桀交王莽以為京司市師漢司東市令也此其章章尤著者也其餘郡國富民兼業顓利以貨賂自行取重於鄉里者不可勝數故秦楊以田農而甲一州翁伯以販脂而傾縣邑張氏以賣醬而踰侈質氏以灑削而鼎食濁氏以胃脯而連騎張里以馬醫而擊鐘皆越法矣然常循守事業積纍贏利漸有所起至於蜀卓宛孔齊之刁間公擅山川銅鐵魚鹽市井之入運其籌策上爭王者之利下錮齊民之業皆陷不軌奢僭之惡又况掘冡搏掩犯姦成富曲叔稽發雍樂成之徒猶復齒列傷化敗俗大亂之道也通志卷一百八十
