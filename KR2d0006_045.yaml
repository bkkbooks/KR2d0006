body:
  text: 通志卷四十宋右廸功即鄭樵漁仲撰地理略第一序四瀆厯代封畛開元十道圗地理序州縣之設有時而更山川之形千古不易所以禹貢分州必以山川定經界使兖州可移而濟河之兖不能移使梁州可遷而華陽黒水之梁不能遷是故禹貢為萬世不易之書後之史家主於州縣州縣移易其書遂廢今之地里以水為主水者地之脉絡也郡縣碁布州道𤓰分皆由水以别焉中國之水則江河淮濟為四瀆諸水所歸茍明乎此則天下可運於掌四瀆湔若淹涪羌巴白潛水禹貢沱潛既道者此也舊云出巴郡宕渠縣南入于江今宕渠省入蓬州伏虞渝巫溪沮水亦作睢出房州房陵縣景山景山在荆山西百餘里即荆山首也一名𤼵阿山故杜云出新城郡之西南發阿山東南至當陽漳水入焉又東南至枝江入江枝江近并入松滋𨽻江陵此水在郢都之西故楚昭王西走渉沮漳水出臨沮縣東荆山臨沮今襄陽南漳縣東南至當陽縣右入于沮當陽今𨽻荆門軍襃文旬淯淮敖臼水杜云江夏景陵縣西有臼水出聊屈山西南入漢按景陵今復州景陵溠水舊云出義陽厥縣西北黄山厥縣後為厥西隋廢入隋縣其水南入于溳溳水舊云出蔡陽縣大洪山蔡陽今隋州唐城其水東南至隋縣有溠水入焉又南過安陸入于夏水漢水名雖多而實一水說者紛然其原出興元府西縣嶓冡山為漾水東流為沔水故地曰沔陽又東至南鄭為漢水有襃水從武功來入焉南鄭興元治興元故漢中郡也又東左與文水㑹又東過西城旬水入焉又東過鄖鄉縣南又屈而東南過武當縣又東過順陽縣有淯水自虢州盧氏縣北來入焉又東過中廬别有淮水自房陵淮山東流入焉又東過南漳荆山而為滄浪之水或云在襄陽即為滄浪之水又東南過宜城有鄢水入焉又東過鄀敖水入焉又東南臼水入焉又東過雲杜而為夏水有溳水入焉雲杜後并入安州安陸舊屬江夏郡又東至漢陽觸大别山南入于江漢陽故夏口之地班云行二千七百六十里鄢水夲夷水亦謂之蠻水出房陵今房州治也東南至宜城縣羅川城謂之鄢水又東至蠻城謂之湛水又東入漢蠻城在宜城東三十里靈王沿夏將入鄢杜云順漢水南至鄢彭水杜云出新城昌魏邗溝水一名韓江一名邗溟溝吳將伐齊霸中國故於廣陵城東南築邗城城下掘深溝東北通射陽湖西北至末口入淮通江於淮以便糧道邗城今在揚州江都末口在楚州山陽而射陽湖亦在楚州然此乃舊通江淮之道後來以湖道多風晉永和中陳敏更由津湖興寜中復以津湖多風又自湖之南沿東岸二十里穿渠入北口北口即末口自後行者不復由湖然自末口入淮又自彼泝淮逹盱眙然後入汴猶有淮患宋朝復穿令徑達盱眙入汴江水出岷山一名瀆山一名汶阜山今屬茂州汶山縣發源不一亦甚㣲所謂發源濫觴者也東南百餘里至天彭山亦謂之天谷亦謂之天彭門兩山相對水徑其間其山屬今彭州又東南過成都郫縣又東南過江陽有湔水從西北來入焉江陽隋并入隆山唐改為彭山今屬眉州又南過嘉州犍為又南過戎州僰道縣北若水淹水從西來入焉又東南至巴郡江州縣有羌水涪水巴水白水潛水渝水合流入焉故庾仲雍謂江州縣對二水口右則涪内水左則巴内水是也江州縣今渝州江津縣是又東過涪州忠州萬州又東過雲安軍雲安故胊䏰縣後周改名又東過魚復魚復今䕫州奉節也逕永安宫及諸葛亮圗壘南又東南過赤岬城又東過巫峡巫溪水入焉又東過秭歸又東過夷陵又東過宜都又東過禹斷江又東過枝江有沮水入焉又東過石首又東過華容有涌水入焉又東至巴陵合于洞庭之陂其陂有澧水從西來入焉次有沅水從西南來入焉次有湘水從南來入焉共而東出由武昌出與漢水合而為大江東過九江有九江水合而為彭蠡陂從南來入焉又東右過江寜有丹陽水從南來入焉又東左過江都邗溝出焉又東過江隂許浦入海班云行二千六百六十里謬矣丹陽桐水出廣徳軍西南白石山西北入丹陽湖彭蠡湘沅澧涌水在華容縣入江樂史云涌水在江陵府監利縣界沱水禹貢文謂岷山導江東别為沱班固謂從郫縣分而東流至枝江入江今詳之不然疑禹貢之文有衍闕汝水出汝州魯山縣大盂山其地與𢎞農盧氏接界故許慎誤謂出盧氏也其水東南過故定陵縣滍水及昆水入焉又有汦水湛水入焉定陵今許州舞陽又東南過上蔡至襃信縣汝口南入于淮班云行千三百四十里湛水舊云出犨縣魚齒山東至定陵入汝疑犨後來并入葉而定陵乃舞陽汦水舊云出魯陽東經襄城定陵入汝魯陽今汝州魯山定陵今許州舞陽滍水出汝州魯山縣堯山東過犨縣故城北魚齒山下疑犨縣後來并入葉縣東過定陵縣西不羮亭又東入汝定陵今許州舞陽溱水一名潧水一名澮水出滎陽澮城西北鷄絡塢下東南入洧黄水宛陵縣西有黄水西南至新鄭城西入洧黄崖者是其水之側洧水出滎陽密縣西馬嶺山密今𨽻河南其水東南有溱水入焉又過新鄭有黄水入焉又東南至長平入潁長平今陳州西華縣班云行五百里潁水舊云出潁川陽城縣西北少室山今陽城縣省入河南登封矣東南至長平縣洧水入焉長平隋改曰西華今陳州又東南過南頓縣㶏水入焉又東南至下蔡入淮下蔡今夀州治班云行千五百里決肥水出合肥縣鷄鳴山北流二十里許分為二其一東流經合肥縣南又東南入巢湖其一西北流二百里出夀春西投于淮爾雅出同歸異曰肥今謂之合肥者以其雖二流而合於一源也應劭闞駰皆謂夏水出城父東南與此肥合故曰合肥謬矣此唐人盧潘云豪旃然水杜云出滎陽成臯縣東入汴又按酈道元云與索水合汴水一名鴻溝一名官度水一名通濟渠一名蒗蕩渠或云蒗蕩渠别汴首受河水自汜水縣東南過滎陽陳留睢陵符離至泗州入淮洙水杜云出魯城北下合泗桑欽云出泰山盖縣臨樂山西南至卞入泗許慎又云北入泗當以杜為確小沂沂水舊云出盖縣艾山今其地在泗水奉符間南流有小沂水從東北來入焉又南過臨沂至下邳入泗班云行六百里泗水舊云出卞縣故城東南桃虛西北卞縣今兖州泗水縣是說文云泗水受濟水桑欽亦云濟水至濟隂乗氏縣分為二一水東北流為北濟一水南流為南濟按今此水與濟已不通矣其源出泗水縣西南流有洙水入焉又西南至方與縣菏水入焉其水出乘氏班固亦謂之泗水方與今單州魚臺又云有漷水至髙平湖陸入泗水又南至彭城名曰沛水有睢水入焉又西南至下邳沂水入焉又南至楚州山陽入淮此水今人謂之清河或云泗水出鄆州梁山泊睢水杜云首受汴水班云首受蒗蕩水疑蒗蕩即汴也自浚儀縣東經陳留梁譙沛彭城縣入泗水浚儀近改為祥符班云行千三百六十里漷水杜云出東海合鄉縣西南經魯國至髙平湖陸入泗按合鄉當在鄒縣東南湖陸當在滕縣薛城之西然樂史云漷出沂州費縣連青山下菏水首受濟東南入泗淮水出唐州桐柏縣大復山東過義陽今信陽也又東過襃信汝水自西北來入焉又東過安豐決水自南來入焉又東北有窮水從北來入焉又東過下蔡潁水從西北來入焉又東過夀春有肥水從東南來入焉又東北豪水入焉又北汴水入焉酈道元云汴即蒗蕩渠也又東過鍾離又東過盱眙有汴水從北來入焉又東至山陽通邗溝又東泗水自東北來入焉又東至海州東海入海班云行三千二百四十里濮水自酸棗縣傍河東北過濮陽又東至濟隂鉅野入濟或云首受河馬頰水濟水從滎陽縣北又東過敖山北又東合滎瀆滎瀆今無水又東索水入焉又東過陽武縣北又東過封邱縣又東過酸棗縣之烏巢澤北又東過乘氏縣南分為菏水又東北過鉅野濮水入焉又東北過夀張汶水從東北來入焉又北過湏城漁山之東左合馬頰水又北過臨邑又東北過故盧城北又東北濼水入焉又東北過華不注山華水入焉又東北過蒲臺縣北又東北過鄒平時水入焉又東北過樂安故城南又東北過利縣西地里志曰利縣在濟城北五十里又東北過甲下邑河分一枝入焉又東北入于海聞今濟水多涸竭澠水杜云出臨淄縣北經樂安博昌縣南界入時水其流急故諺云瘦馬不渡澠水時水一名耏春秋襄三年齊晉盟于耏是也一名如水一名澅水其上源岐淺多涸竭故又名乾時從臨淄縣西北至博昌澠水入焉博昌今青州博興又西北過髙苑至梁鄒縣入濟髙苑舊宣化軍今𨽻淄州梁鄒疑淄州鄒平是濼水出齊州厯城縣西北入于濟謂之濼口華水出厯城縣華不住山北入于濟淄水杜云出泰山梁父縣西入汶按梁父今𨽻兖州奉符班云出萊蕪縣原山東至博昌入濟按博昌今青州博興桑欽云出萊蕪原山東北入海按三說異同考其形勢當以杜言為正汶水出萊蕪縣西南經濟北至東平夀張縣入濟萊蕪今𨽻兖州在州東北一云出奉符原山西北黄水出京縣故亦謂之京水東北流入于濟索水出京縣西南嵩渚山後齊省京入滎陽京故城在縣東南二十里東逕大索城又北逕滎陽城東入于濟離水出西塞外東至枹罕入河湟水出臨羌北東至允吾入河晉水出晉陽縣西懸甕山晉陽宋朝改為平晉熈寜中省入陽曲晉水過其縣南又東入汾文澮水出絳州翼城澮髙山又西南過絳與絳水合又西過虒祈宫南又西入汾絳水出絳縣西南入澮汾水出太原汾陽縣北管涔山汾陽今太原治陽曲也東南過晉陽縣東晉水從縣南東流入焉又南與文水合又西南過髙梁髙梁今屬洪洞遂西行過臨汾又西過絳縣西四十里虒祈宫北又西過王澤有澮水從東來入焉又西至汾隂縣北西入于河汾隂今河中滎河縣也班云汾水西南行千三百四十里冀州寖也涑水一名洮水出觧州聞喜縣黍葭谷俗謂之華谷西南流至蒲阪縣入河蒲阪今河中治河東縣桑欽云涑水南過觧縣東又西南注于張陽池湛水出河内軹縣西北山軹縣唐省入河陽濟源縣南行至絳州垣曲縣南入河沮水出河内軹縣東南至温入河軹唐省入濟源縣𨽻河陽軹故城在懐州河内縣西北二十七里沇水出河東垣縣界王屋山垣今為垣曲𨽻絳州其水東至温縣為濟水又東南至鞏成臯間南入河沁水一名少水出上黨故榖逺縣羊頭山南過沁水縣北又東過河内縣又東過武徳縣又東南至滎陽北東入河洹水杜云出汲郡林慮縣東北至魏郡長樂縣入清水按林慮今𨽻相州長樂今大名洹水是也桑欽謂洹水出上黨泫氏縣酈道元謂出長子謬矣按此水今名安陽河清水即淇水也淇水一名清水鄭元云即降水也出衛州共城縣北山或云出林慮東至湯隂又東至黎陽入河屯氏河鳴犢河濁漳水出潞州長子縣鹿谷山一云發鳩山東過壺闗又東至武安縣東合于清漳清漳水班云出上黨沾縣大谷東北過磁州武安與濁漳合而横流故名曰衡漳又東北過洺州曲周平恩縣又東北過冀州武邑又東北過弓髙縣弓髙今為鎮𨽻永静東光又東北過成平成平今為景城鎮𨽻瀛州樂夀又東北過故平舒縣東入海入海者桑欽說也班云至邑成入河行千六百八十里易水出北新城東至文安入滱新城今𨽻涿州濡水杜云出髙陽縣東北至河間鄚縣入易水按髙陽順安軍治鄚莫州治正義謂髙陽今無此水平地趙燕之界無泉出者未知杜言何據然臣聞水泉古有處今涸竭者何限杜子之言豈妄哉滱水出靈邱縣髙氏山靈邱今𨽻蔚州班云東至文安入大河過郡五行九百四十里按文安今𨽻霸州滹沱水班云出代郡鹵城東至文安入海過郡六行千三百七十里按鹵城今代州繁畤縣其水東經定州深澤縣東南即光武所度處