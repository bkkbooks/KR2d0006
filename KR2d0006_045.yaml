入焉又東北過富平縣漆水入焉又東洛水入焉又東過臨潼縣灞水入焉又東至船司空縣入河船司空後省入華隂今𨽻華州班云渭水行千八百七十里灞水出永興藍田縣終南山金谷東經臨潼縣北流入渭然長安志云灞水從上洛界入漢滻水出永興藍田谷北入于灞灃水出永興鄠縣終南山豐谷北至咸陽入渭鎬水出鄠縣界至長安入清渠斜洮水出臨洮西羌中北至枹罕東入河厯代封畛臣謹按杜佑之序曰昔黄帝方制天下立為萬國易稱首出庶物萬國咸寜及少皥氏之衰其後制度無聞矣若顓帝之所建帝嚳受之創制九州統領萬國雍荆豫梁冀青徐兖揚至堯遭洪水而天下分絶使禹平水土還為九州如舊制也舜攝帝位分為十二州雍荆豫梁冀幽并青營徐兖揚故虞書云肇十有二州是也夏氏革命又為九州塗山之㑹亦云萬國四百年間遞相兼并商湯受命其能存者二千餘國亦為九州分統天下冀荆豫雍揚兖徐幽營營則禹貢青州也載祀六百及乎周初尚有千八百國而分天下為九畿方千里曰王畿其外曰侯畿亦曰服又外曰甸畿又外曰男畿又外曰采畿又外曰衛畿又外曰蠻畿又外曰夷畿要服也又外曰鎮畿又外曰藩畿藩服也侯甸男采衛蠻夷鎮藩即九畿也各相去五百里為限至成王時亦曰九州屬職方氏揚荆豫青兖雍幽冀并其後諸侯相并有千二百國及平王東遷迄于獲麟之末二百四十有二年諸侯擅兵征伐更相吞滅不可勝數而見於春秋經𫝊者百有七十國爾百三十九國知土地所在其三十一國不知其處也其蠻夷諸國復不在其數逮乎下分地里上配天象而所定躔次總標為一十二焉及周之末唯有七國秦昭王時西周盡獻其地邑三十六口三萬受獻而歸其人至莊襄王滅東西周國七城而已秦制天下為四十郡其地則西臨洮而北沙漠東縈南帶皆臨大海漢興以秦地太大更加置郡國其後開越攘胡土宇彌廣改雍曰涼梁曰益又置徐州復禹舊號置交初為交趾後為交州北有朔方初為朔方後為并州凡為十三州部刺史司𨽻并荆兖豫揚冀幽青徐益交涼而不常所治至哀平之際凡新置郡國六十三與秦四十合百三縣邑千三百一十四道三十二侯國二百四十一地東西九千三百二里南北萬三千三百六十八里此漢之極盛也後漢光武以官多役煩乃併省郡國十縣道侯四百餘所其後亦為十三州部司𨽻治河南今河南府豫治譙今酇縣兖治昌邑今魯郡金鄉縣徐治郯郯音談今臨淮郡下邳縣青治臨淄今北海郡縣涼治隴今天水郡隴城縣并治晋陽今太原府冀治鄗許各反今趙郡髙邑縣幽治薊今范陽縣揚治厯陽今郡縣益治雒今永昌郡荆治漢夀今武陵郡武陵縣交治廣信今蒼梧郡蒼梧縣漸復加置郡國至於靈獻凡百有五焉縣道侯國千一百八十桓帝永興初有鄉三千六百八十二亭萬二千四百二十東樂浪郡西敦煌郡南日南郡北鴈門郡西南永昌郡四履之盛亦如前漢魏氏據中原有州十二司𨽻荆豫兖青徐涼秦冀幽并揚雍分涼州置秦州治上邽今天水郡揚治夀春今郡徐治彭城今郡荆治襄陽今郡兖治武威今郡餘並因前代有郡國六十八東自廣陵文帝黄初六年親征幸廣陵故城及旋師留張遼屯江都齊王嘉平後屬吴即今郡夀春毌邱儉諸葛誕皆鎮之合肥明帝青龍元年滿寵於合肥西北三十里築新城吴軍頻攻不㧞即今廬江郡故魏明帝云先帝東置合肥南守襄陽西固祈山賊來輒破於三城之下者地有所必争是也沔口建安十五年文聘為江夏太守鎮焉其後吴軍頻攻不㧞青龍後屬吴即今漢陽郡西陽黄初中滿寵令將守之今齊安郡襄陽建安二十四年徐晃守之蜀將闗羽攻不下重兵以備吴是時江淮間除鎮兵之處更無人居明帝青龍中吴孫權遣數千家佃於江北為滿寵破之西自隴西今郡是南安今隴西郡隴西縣齊王嘉平五年蜀將姜維來伐攻隴西南安皆不剋祈山明帝太和二年蜀將諸葛亮攻祈山城不㧞今同谷郡長道縣東十里漢陽明帝青龍二年蜀將諸葛亮來伐遣兵備此即今天水郡陳倉建安二十四年蜀將破夏侯妙才於漢中遂令張郃守陳倉太和二年諸葛亮以大衆攻之將軍郝昭以千人守亮攻二旬餘不㧞故城今在縣東二十里亮攻郿又不剋郿故城在今縣東北十五里並今扶風郿縣重兵以備蜀蜀全制巴蜀置益治成都今郡梁治漢中今郡二州有郡二十二以漢中建安末破夏侯妙才遂有漢中以魏延鎮此後蔣琬姜維繼守即今郡地興勢後主延熈七年將軍王平守之魏大將軍曹爽攻不剋今洋州郡興道縣白帝先主章武元年屯之遂為重鎮後主建興十五年吴將全琮來攻不剋即今雲安郡並為重鎮吴主北據江南盡海置交治龍編今安南府廣孫權置治番禺今南海郡荆治南郡今江陵郤郢治江夏即今郡揚治逢業今丹陽郡江寜縣五州有郡四十有三以建平自孫權黄武初破蜀先主後得之孫皓天紀四年晋軍沿流來伐守将吾彦請増兵皓不從今巴東郡西陵建安二十四年蜀將闗羽北討魏將于禁等于㐮陽陸遜為宜都守鎮此黄武初蜀先主來伐遜大破之後歩闡陸抗並鎮焉即今夷陵郡樂鄉吴孫皓建衡三年陸抗所築樂鄉城後朱然脩之戍焉晋王潛攻樂鄉獲水軍督陸景平西將軍施洪以城降在今江陵郡松滋縣東南郡自建安末剋闗羽後蜀將麋芳來降遂得之孫皓鳳皇元年督將伍延守此晋軍平吴當陽侯杜元凱赴之斬伍延即今江陵郡也巴邱建安十九年魯肅剋之孫皓寳鼎元年萬彧並鎮守即今巴陵郡夏口建安十三年孫權征黄祖剋之後遂置兵鎮孫皓天紀元年孫慎守之及晋平吴將軍胡奮赴於此即今江夏郡武昌孫權甘露元年城武昌陸遜諸葛恪鎮守及晋平吴將軍王戎赴於此即今江夏郡是皖城建安十九年孫權剋之赤烏四年諸葛恪屯此今同安郡皖音患牛渚圻孫皓天紀末何植鎮守晋平吴大將王渾赴於此即今宣城郡當塗縣採石也濡湏塢建安十七年築後曹公頻來攻不剋在今厯陽縣西南百八十里並為重鎮其後得沔口孫權嘉禾後陸遜諸葛瑾屯守邾城赤烏四年陸遜常以三萬兵戍之今齊安郡東西界臨江與江夏郡武昌相對廣陵孫亮建興三年衛尉馮朝城廣陵自三國鼎立更相侵伐互有勝負疆境之守彼此不常纔得遽失則不暇存也今畧紀其久經屯鎮及要害之地焉其守將亦畧紀其知名者餘不可徧舉他亦類此晉武帝太康元年平吴分為十九州部置司州治洛陽今河南府兖治廩邱今濮陽郡雷澤縣是豫治項今淮陽郡項城是冀治房子今趙郡縣并治晉陽青治臨淄徐治彭城荆初治襄陽後治江陵今郡揚初治夀春後治建業涼治武威分三輔為雍治京兆今府分隴山之西為秦治上邽今天水郡縣益治成都分巴漢之地為梁治南鄭今漢中郡縣分雲南為寜治雲南今郡幽治涿今范陽郡范陽縣分遼東為平治昌黎今安東府交治龍編今安南府分合浦之北為廣治番禺又増置郡國二十有二凡州百五十有六縣千一百有九以為冠帶之國盡秦漢之土及永嘉南渡境宇殊狹九州之地有其二焉初元帝命祖逖鎮雍邱建武初逖北伐便屯雍邱今陳留郡縣逖死北境漸蹙大興四年逖死於是荆豫自淮北今汝南汝隂南陽等郡以北青兖四州今東萊東牟髙宻北海淄川濟南等郡之地及徐州之半今彭城琅邪等郡䧟劉曜石勒以合肥戴若思鎮守之淮隂劉隗鎮守即今山陽郡縣夀陽祖約鎮守後又䧟於石勒石虎死後復之即今夀春郡地泗口劉遐鎮守即今臨淮郡宿遷縣界角城安帝義熈中置亦在宿遷縣界為重鎮成帝時酇守將退屯襄陽咸和初魏該屯酇為劉曜將黄秀所逼而退守襄陽後亦䧟石勒尋復之廋翼朱序皆鎮於此又為苻堅將苻丕所䧟尋又復之即今郡穆帝時平蜀漢永和三年桓溫西討擒李勢復梁孟之地梁州則漢川益則蜀川是又遣軍西入闗至灞上十年桓溫討苻健於今京兆府萬年縣白鹿原戰敗再北伐一至洛陽永和十二年桓溫討燕慕容雋大破其將姚襄於伊水時襄已降一至枋頭廢帝太和三年桓溫又討慕容暐敗還今汲郡衛縣界枋音方所得郡縣軍旋又失洎苻堅東平慕容暐太和五年西南䧟蜀漢西北剋姑臧孝武太和五年平張天錫今武威郡則漢水長淮以北悉為堅有及堅敗太和八年再復梁九年將郭寳平梁州益蜀郡太守任權斬苻堅益州刺史李平益州平青徐兖豫司之地其後青兖䧟於慕容徳安帝隆安三年徳據之殺幽州刺史辟閭渾時鎮廣固即今北海郡也豫司䧟於姚興隆安三年以彭城為北境藩扞朱序鎮守後益梁䧟於譙縱義熈初䧟每因劉石苻姚衰亂之際則進兵屯戌在於漢中襄陽彭城然大抵上明今江陵郡松滋縣江陵夏口武昌合肥夀陽淮隂常為晉氏鎮守其刺史所治皆置州兵雖有不經攻圍互是重鎮他皆類此義熈以後又復青兖司豫梁益之地而政移於宋矣武帝北平廣固時晉安帝義熈六年平慕容超得青州之地廣固即今北海西定梁益九年朱齡石平譙縱又剋長安十三年親征平姚泓盡得河南之地長安尋為赫連勃勃所䧟至廢帝滎陽王景平中武牢以西復䧟後魏今大較以孝武大明為正凡二十有二州揚治建業南徐治京口今丹陽郡丹徒縣徐治彭城南兖治廣陵兖治瑕今魯郡縣南豫治厯陽荆治汝南今汝南郡汝陽縣江治尋陽今郡縣青治臨淄初治厯城今濟南郡縣後治廣固後又移治臨淄即今縣是冀治厯城司治義陽荆治南郡郢治江夏今郡湘治臨湘今長沙郡雍治襄陽今郡梁治南鄭秦亦治南鄭益治成都今蜀郡寜治建寜今雲南郡廣治南海交治龍編越治臨鄣今合浦郡自東晋成帝時中原流民多南渡遂於江漢淮之間僑立州郡以撫其民中間併省廢置離合非一不能詳制焉今紀其所治經久者他皆類此郡凡二百三十有八縣千一百七十有九初文帝元嘉中遣將北伐水軍入河剋魏碻磝滑臺虎牢洛陽四城碻磝即今濟陽郡城滑臺今靈昌郡城虎牢今汜水縣洛陽今故洛陽城碻音口交反磝音敖其後又失又分軍北伐西軍剋𢎞農開方二城並今𢎞農郡以東攻滑臺不剋而平碻磝守之尋皆敗退元嘉二十七年王元謨於滑臺敗歸時栁元景㧞𢎞農開方及元謨敗亦棄而遁於是後魏主太武總師經彭城臨江屯於𤓰歩今廣陵郡六合縣東退攻盱眙不㧞而旋臧質守之魏師攻圍三旬不㧞今淮陽郡縣明帝時後魏又南侵淮北青冀徐兖四州及豫州西境悉䧟沒泰始二年徐州刺史薛安都引魏軍自是沈文秀東陽城崔道固厯城並為魏將慕容白曜所䧟安都以彭城常珍竒以懸瓠並降魏懸瓠今汝南郡城則長淮為北境僑徐兖於淮南淮隂立兖州鍾離立徐州立青冀二州寄治贑榆今東海郡東海縣贑古淡反其後十年餘而宋亡然初彊盛也南鄭襄陽懸瓠元嘉二十六年後魏主太武率兵攻圍汝南太守陳憲等距四十餘日魏人積屍與城齊不㧞而退彭城厯城東陽滎陽王景平初竺䕫鎮守後魏攻圍數旬不剋即今北海郡治東城皆為宋氏藩扞齊氏淮北之地所以全少青州治胊山今東海郡朐音衢冀治渦口今臨淮郡漣水縣豫治夀春北豫州自淮北不常晋以後或治淮南或治所今舉其要害之地北兖治淮隂北徐治鍾離又置巴東治巴今雲南郡其餘州郡悉因宋代州二十有三郡三百九十有五縣千四百七十有四其後頻為後魏所侵至東昬永元初沔北諸郡相繼敗沒今南陽郡地又遣軍北伐敗於馬圈退屯盆城魏馬圈城去襄陽三百里時陳顯逹攻圍四十餘日不㧞魏援師至敗還在今丹陽郡界又失夀春永元二年豫州刺史裴叔業以城叛入魏後三年齊亡齊氏七主凡二十四年内難繁興不遑外畧及東昬暴虐北境彌蹙始全盛也南鄭明帝建武二年後魏大將元英來伐梁州刺史蕭懿守拒攻圍百餘日不下樊城今襄陽郡安飬縣建武中後魏主孝文率兵十萬數旬攻圍將曹虎拒守不下襄陽義陽夀春髙帝遣垣崇祖鎮之謂曰兵衝要地宜備魏師俄而魏將王肅以大軍來攻敗而歸淮陽角城明帝初後魏南侵以李安仁戍之漣口朐山為重鎮梁氏州郡多沿舊制天監中州二十有三郡三百五十縣千二十有五其後更有析置大同中州百有七郡縣亦稱於此自侯景逆亂建康傾䧟墳籍散逸不可得而詳焉初武帝受禪數年即失漢川及淮西之地天監三年梁州刺史夏侯道遷以夲部叛降後魏自劍閣以北並䧟沒又魏將元英破將軍馬仙琕於義陽失地其後諸將頻年與魏軍交戰於淮南淮北互有勝負自天監四年以後將張恵紹剋魏宿遷城韋叡剋合肥裴邃剋翟邱城朐山城尋皆敗唯合肥獨存雖得懸瓠彭城俄而又失天監六年魏軍主白早生豫州刺史胡遜以懸瓠普通六年徐州刺史元法興以彭城並内屬無何悉復於魏又剋夀春普通七年將夏侯亶元植等剋之獲魏揚州刺史李憲自齊東昬永元二年䧟後魏至是凡二十七年南朝始復大通初大舉北伐城鎮相次剋平直至洛陽蹔為梁有大通元年魏將爾朱榮害胡太后及少主魏朝大亂遣將陳慶之率軍送元顥為魏主入河陽六旬五日渡河守北中府城數日爾朱榮來攻數日顥敗慶之亦奔退所得之地尋亦失之中府地即今河陽北城是其後又復漢中大同中將蘭欽剋之自天監二年失漢川凡經四十三年却復至東魏將侯景以河南地降逆亂相尋有名無實及景平後江北之地悉䧟髙齊漢川蜀川沒于西魏太清初侯景以十三州來降旋為東魏將慕容紹宗所敗二年景舉兵反圍建康䧟之及景平後元帝承聖初齊將辛術南伐盡取淮南江北之地得𫝊國璽反於齊三年西魏將達奚武䧟漢川尉遲迥䧟蜀川其漢川經九年復失大抵雍州今襄州下溠音􅀈戍漢東郡棗陽縣東南夏口白茍堆大同中東魏静帝遣將堯雄為南境守將雄曰白茍堆梁之北面重鎮請備之在今汝南郡真陽縣硤石城今汝隂郡下蔡縣合州即合肥鍾離將康絢鎮守之淮隂胊山為重鎮天監三年角城戌主柴慶宗以角城十一年東莞太守劉晰以朐山並降入魏陳氏比於梁代土宇彌蹙西不得蜀漢北失淮肥以長江為境文帝天嘉初湘川之地為周軍所䧟二年侯瑱剋平之湘川今澧陽武陵長沙衡陽等郡之地也有州四十有二地轉狹而州益多暨後州郡又數倍多於前代故不可詳郡百有九縣四百三十有八宣帝大建中頻年北伐諸將累㨗盡復淮南之地將吴明徹於夀春城斬髙齊將王琳更經畧淮北大破齊軍於吕梁及旋師屬髙齊國亡又總軍北伐至吕梁周軍來拒又大破之自大建五年北伐七年破齊軍九年又破周將梁士彦悉得梁淮北地以兵鎮下邳朐山旋為周軍所敗悉虜其衆時梁士彦守彭城明徹來攻未下十年周將王軌來伐明徹退師全軍沒於清口自是江北之地盡沒於周又以長江為界十二年周大將司馬消難以淮西地來降又遣將周羅侯攻剋新野尋並失之及隋軍來伐遣將守狼尾灘後主禎明三年戚昕守之今夷陵郡宜都縣界荆門將仲肅據之亦宜都界安蜀城將顧覺鎮之亦夷陵郡公安將陳紀鎮之今江陵郡縣巴陵已下並風靡退散信州道大總管清河公楊素自峽中舟師東下東方守將相繼而破信州即今雲安郡也隋軍自採石隋將韓擒虎襲䧟之京口賀若弼襲䧟之渡江而平之後魏起自北方至道武率兵下山東攻㧞慕容寳中山今博陵郡唐昌縣遂有河北之地於是遷都平城今雲中郡慕容氏䘮敗遣將南畧地至于滑臺許昌今潁川郡彭城明元帝太恒中始於滑臺許昌置兵鎮守道武天興中長孫肥等剋滑臺許昌尋不能守至是始有之太武帝時又得蒲阪今河東郡長安統萬始光中遣軍伐赫連昌剋蒲阪及長安又剋統萬遂滅赫連氏統萬即赫連所都今朔方郡是神䴥中宋師來伐碻磝今濟陽郡城滑臺虎牢今河南府汜水縣是戍將皆不守尋並復之神䴥三年宋將到彦之王仲徳等䧟滑臺虎牢洛陽遣安頡叔孫建等擊敗走之太延以後東平遼東西平姑臧三年東伐馮氏五年西伐沮渠並滅之於是西至流沙東接髙麗所未得者漢中及南陽懸瓠彭城青州之南而已其後帝自南征遂臨𤓰歩宋淮北城鎮守將多有敗沒太平真君十二年因宋將王元謨來侵剋碻磝城戌將濟州刺史王買得棄城而走宋師至滑臺敗帝乘勝至江上獻文天安初自河之南長淮之北皆為魏有時因宋晉安王子勛之亂遣將慕容白曜畧地破宋將沈文秀畢衆敬薛安都崔道固常珍等遂有其地孝文遷都洛陽太和十九年徙都頻歳親征皆渡淮沔二十年屯八公山三十一年屯新野及樊城宣武初又得夀春景明初齊將裴叔業以夀春來降後至明帝孝昌二年又䧟入梁續收漢川至于劒閣兼得淮西之地正始初梁將夏侯道遷以漢中降又元英破梁將馬仙琕於義陽遂有其地莊帝時梁軍洛陽數旬敗走永安初因爾朱榮害胡太后少帝之亂梁將陳慶之送元顥為魏主爾後内難相繼不暇外畧三四年後分為東西魏矣皆權臣擅命詳周齊事中自永安末年爾朱世隆稱兵入洛圗籍散亡不可詳紀今按舊史云管州百十有一郡五百十有九縣千三百五十有二按魏收史所載州郡見東魏静帝武定中其時洛陽以西及闗中梁益之地悉屬西魏收猶總而編之自太武以後漸更強盛東征西伐剋定中原屬宋明以後及於齊梁國土漸蹙自守不暇雖時有侵掠而退不旋踵故魏之城鎮少被攻圍因利進取不常所守也北齊神武東魏天平末大舉西伐至蒲津静帝天平四年三道伐西魏齊神武自總大衆至蒲津寳泰自風陵濟河至潼闗髙敖曹入武闗䧟上洛以泰軍敗沒並旋師風陵在潼闗北岸相對西魏乘勝攻䧟陜州周文帝率李弼等東征下陜州禽刺史李祥伯即今陜郡神武西至沙苑其年冬大敗而歸今馮翊郡界西軍又乘勝襲䧟洛陽西魏將獨孤如願據金墉明年西師又至於河隂今洛陽縣北時拒守河陽城潘相樂守北城即舊城髙永樂守南城即今城後周文帝親征不剋西師敗歸大象元年周文帝親征敗還如願亦棄金墉遁走神武遂毁其城其後神武攻圍西魏玉壁不剋興元四年西魏將王思政守之今絳郡稷山縣西師來伐至於邙山武定初周文帝親征神武禦之敗殺周將王雄後神武又圍玉壁不剋武定四年西魏將韋孝寛守之文襄遣將圍潁川㧞之自武定五年冬攻圍至明年六月城䧟於是河南自洛陽之西河北自晉之西今平陽郡悉入西魏文宣之世命將畧地南際于江矣天保二年屬侯景亂梁遣辛術南討遂得𫝊國璽又過江得梁夏口後二國通和旋師矣武成河清中築戍於軹闗河清二年遣斛律光築之今河南府濟源界其年周軍至洛陽敗還晋公䕶統軍将揚檦等至軹闗敗走後主武平中陳軍來侵盡失淮南之地武平五年以後陳將吴明徹頻嵗來侵淮南城鎮皆不守諸將累敗周師攻㧞河隂大城周武親征有疾班師後主隆化末西師攻㧞晉州今平陽郡因之國滅齊都於鄴即今郡縣自東魏之後天下三分梁陳有江東宇文有闗西髙氏據河北有州九十有七郡百六十縣三百六十有五文宣天保七年已併省州三郡百五十三縣五百八十九鎮二戌二十六當齊神武之時與周文帝抗敵十三四年間凡四出師大舉西伐周師東討者三焉畧舉齊神武周文帝統師親征諸將攻戰則不復紀自文宣之後纔守境而已大抵西則姚襄城今文城郡西城姚襄所築西臨黄河控帶龍門之險周齊交争之地後主武平二年大將斛律光破周兵於此遂立鎮焉洪洞今平陽郡縣北故城控據要險崇化末周師既剋晋州其城主張元静以城降周晉州武平闗三闗並今絳都正平縣界柏崖城侯景所築今河清縣西軹闗河陽南則虎牢陸子章增築城守洛陽北荆門今陸渾縣東北故城是孔城防今伊闕縣東南故城是汝南郡今臨汝郡梁縣南魯城今汝南郡魯山縣東北置兵以防周寇自洛陽之南襄城汝隂汝南以北皆齊有及陳師侵軼數嵗齊亡南境要害未遑制置也周文帝西魏大統中東魏師至蒲津文帝大統二年齊神武親征至蒲津以竇泰死退軍文帝東征剋陜州兼得宜陽郡邰郡邰郡今絳郡常縣宜陽郡今福昌郡東師又至沙苑其年冬齊神武親征大敗走後文帝東征至河隂先勝後敗大統四年殺魏將髙敖曹也築城於玉壁大統八年將王思政築之齊神武攻圍不剋至十二年韋孝寛守之齊神武又攻圍六旬不剋文帝又至邙山先勝後敗大統九年得梁雍州十六年梁雍州刺史岳陽王詧舉州内附廢帝初剋平漢中自梁侯景逆亂遣將逹奚武剋之又遣軍平蜀將尉遲迥剋之文帝西征至姑臧後又平江陵齊王廓後元初于謹平之殺梁元帝自是疆理西有姑臧西南有全蜀南至于江矣明帝武成二年將賀若敦剋陳湘州之地三年失之今澧陽武陵長沙衡陽等地是其河南自洛陽之東之北河東自平陽之界屬于髙齊至武帝建徳中東征㧞齊晉州城尋又東征破齊師於晉州城下建徳五年攻㧞晉州使梁士彦守之齊後主來攻三旬餘不㧞六年又破齊後主軍乘勝平齊後遣軍破陳軍於吕梁將王軌破陳將吴明徹悉虜其衆也其東南之境盡于長沙通計州二百十有一郡五百八縣千二十有四當全盛戰争之際則玉壁初王思政守後韋孝寛守東軍攻不㧞遂置勲州邵郡齊子嶺今王屋縣東二十里周齊分界處通洛防故函闗城武帝保定中改名今在新安縣東黄櫨三城今永寜縣西北宜陽郡陜州土剗今長水郡西北二十五里三荆將獨孤信畧定北荆州今即伊陽縣東荆州後改曰淮州今淮安郡荆州今南陽郡三鵶鎮今汝州魯山縣西南名平髙城置兵以備東軍隋文帝開皇三年遷都大興城即今城遂廢諸郡以州治民自三代以前為九州两漢加置十三州晋宋之後分析漸多至于魏齊後周雖割據鼎立天下分裂其於州郡乃倍两漢之地隋氏以官繁民弊遂廢五百餘郡而以州治民名則因循職事同於郡守無復刺舉之任自九載廓定江表尋以戸口滋多析置州縣煬帝大業初移洛陽城即今城又征林邑更置三州既而併省諸州三年改州為郡乃置司𨽻刺史分部廵察本史不分别所置諸郡五年平定吐谷渾更置四部大凡郡百九十縣千二百五十五東西九千三百里南北萬四千八百一十五里東南皆至于海西至且末隋氏西境唯得今燉煌郡以東且子余反北至五原即今九原郡按隋氏北境唯至于河隋氏之盛盖極於此矣及唐髙祖武徳初又改郡為州太守為刺史其邉鎮及襟帶之地置總管府以領軍戎至七年改總管府為都督府自因隋季分割州府倍多前代貞觀初并省州縣始於山河形便分為十道一曰闗内道二曰河南道三曰河東道四曰河北道五曰山南道六曰隴右道七曰淮南道八曰江西道九曰劒南道十曰嶺南道既北殄突厥頡利西平髙昌東西九千五百十里南北萬六千九百十八里髙宗平髙麗百濟得海東數千餘里旋為新羅靺鞨所侵失之又開四鎮即西境拓數千里至于闐疎勒龜兹焉耆諸國矣景雲二年又分置二十四都督府分統諸州時議以權重不便尋罷之開元二十一年分為十五道置採訪使以檢察非法京畿治西京城内都畿治東郡闗内多以京官遥領河南治陳留郡河東治河東郡河北治魏郡隴右治西平郡山南東治㐮陽郡山南西治漢中郡劒南治蜀郡淮南治廣陵郡江南東治吴郡江南西治豫章郡黔中治黔中郡嶺南治南海郡又於邉境置節度經略使式遏四夷節度使十經略守捉使三大凡鎮兵四十九萬人戎馬八萬餘匹每嵗經費衣賜則千二十萬疋叚軍倉則百九十萬石大凡千二百十萬開元天寳每嵗邉用不過二百萬其地東至安東都䕶府西至安西都䕶府南至日南郡北至單于都䕶府南北如前漢之盛東則不及西則過之漢之東境有樂浪郡西境有燉煌郡今東極安東府則漢遼東郡也其漢之元莬樂浪二郡並在遼東郡之東今悉為東夷之地矣今西極安西府其伊吾交河北庭安西則漢代戎胡所據皆未得而詳九州之區域在昔顓帝及于陶唐分而為九其制最大顓帝置九州堯時洪水使禹治水還為九州舜分為十二州夏商並為九州按周之本制起於顓帝辨其疆界始於禹貢今分别地里故以為首雍州西據黒水東距西河黒水今張掖郡西河則龍門之河今京兆華隂馮翊扶風汧陽新平安定彭原安化平涼靈武五原寕朔洛交中部延安咸寕上郡銀川新秦朔方九原榆林安北天水隴西金城㑹寕安鄉臨洮和政寕塞西平武威張掖酒泉晉昌燉煌等郡也豫州西南至荆山北距河荆山在今襄陽郡南其北境至于河今河南府陜郡之南境𢎞農臨汝滎陽陳留睢陽濟隂譙郡潁川淮陽汝隂汝南淮安襄陽武當漢東等郡也冀州唐虞之都以餘州所至則是其境西境雍州南境豫州東境兖州皆以河為界河自今文城絳郡西龍門南流至華隂東過今汲郡黎陽縣東大岯山又東入于海今河内汲郡鄴都廣平鉅鹿信都趙郡常山博陵河間文安饒陽上谷范陽順義歸化歸徳媯川漁陽宻雲北平桞城河東絳郡陜郡之北境平陽髙平上黨樂平陽城大寕文城西河太原昌化樓煩鴈門定襄安邉馬邑雲中單于等郡地兖州舊為濟河之間孔安國云東南據濟西北距河今靈昌濮陽濟陽東郡清河魏郡博平東平平原樂安景城等郡地是也青州東北據海西距岱岱㤗山也今在魯郡界自泰山之東至于海今北海濟南淄川東萊東牟髙宻安東等郡是也徐州東據海北至岱南及淮自泰山之南淮之北海之西也今彭城臨淮魯郡東海琅邪等郡地是也梁州東據華山之陽西距黒水華山之陽今華隂之西南黒水出張掖郡南流北海即巴蜀之地皆是也今上洛漢中洋川安康房陵通川潾山南平涪陵南川瀘川清化始寕成安苻陽巴川南賔南浦閬中南兖安岳盛山雲安犍為陽安仁夀通義和義資陽南溪河池武都同谷順政懐道同昌隂平江油交川合川益昌普安巴西梓潼遂寕蜀郡徳陽濛陽唐安臨卭盧山通化越嶲雲南洪源等郡地揚州北據淮東南距海北自淮之南東南距于海閩中以北地今廣陵淮隂鍾離夀春永陽厯陽廬江同安蘄春弋陽宣城丹陽晋陵吴郡餘杭新定新安㑹稽餘姚臨海縉雲永嘉東陽信安鄱陽尋陽之東境豫章臨川盧陵宜春南康建安長樂清源漳浦臨汀潮陽郡地自晋以後厯代史皆云五嶺之南至于海並是禹貢揚州之地按禹貢物産貢賦職方山藪川浸皆不及五嶺之外又按荆州南境至衡山之陽若五嶺之南在九州封域則以隣接宜屬荆州豈有捨荆而屬揚斯不然矣此則近史之誤然則嶺南之地非九州之境荆州北據荆山南及衡山之陽荆山在今襄陽郡界南至今衡陽郡桂嶺之北皆是也今江陵夷陵巴東景陵富水安陸齊安漢陽江夏義陽尋陽之西境長沙巴陵衡陽零陵江華桂陽連山邵陽武陵澧陽黔中寕夷涪川盧溪盧陽靈溪潭陽清江播川義泉夜郎龍溪等郡地其雍州西境流沙之西荆州南境五嶺之南所置郡縣並非九州封域之内也凡郡之土宇秦氏分制罷侯置守列為四十其境可知内史雍州之域今京兆華隂馮翊扶風汧陽新平及梁州之域上雒郡地皆是北地雍州之域今安定彭原安化平凉靈武五原寕朔等郡地隴西雍州之域今天水隴西㑹寕安鄉和政及梁州之域河池郡地皆是上郡雍州之域今洛交中部延安咸寕上郡銀川新秦朔方等郡皆是九原雍州之域今九原安北皆是三川荆河之域今河南府陜郡之河南地𢎞農臨汝滎陽陳留及冀州之域河内汲郡地是也碭郡豫州之域今睢陽譙郡濟隂及兖州之域東平郡地是也潁川豫州之域今潁川淮陽汝南等郡地是也南陽豫州之域今南陽淮安漢東武當及荆州之域義陽郡地是也邯鄲冀州之域今廣平鄴信都之西南境鉅鹿之南境上谷冀州之域今上谷范陽文安河間媯川順義歸化歸徳博陵之東境饒陽之北境及兖州之域景城之北境皆是也鉅鹿冀州之域今常山趙郡之東北境愽陵之西境鉅鹿之北境饒陽之南境兼兖州之域今清河景城之南境是漁陽冀州之域今漁陽宻雲郡地皆是也右北平冀州之域今北平郡之西境遼西冀州之域今桞城及北平郡之東境皆是遼東青州之域今安東府是也河東冀州之域今河東絳郡陜郡之北境平陽大寕文城等郡是也上黨冀州之域今上黨髙平樂平陽城等郡地太原冀州之域今太原西河昌化定襄鴈門之南境樓煩等郡是也代郡冀州之域今安邉馬邑之北境是也鴈門冀州之域今為鴈門郡之北境馬邑之南境是也雲中冀州之域今雲中單于府及雍州之域榆林郡是也東郡兖州之域今靈昌濮陽濟陽魏郡愽平及冀州之域汲郡之東南境是也齊郡兖州之域今平原樂安及青州之域北海濟南淄川東萊東牟郡是薛郡徐州之域今魯郡東海郡是也琅邪青州之域今髙宻及徐州之域琅邪郡地皆是泗水徐州之域今彭城臨淮郡是也漢中梁州之域今漢中洋川安康房陵郡地皆是也巴郡梁州之域今通川隣山南平涪陵南川瀘川清化始寕咸安符陽巴川南賔南浦閬中南兖盛山雲安及安岳郡之東境皆是蜀郡梁州之域今巴西普安梓潼遂寕益昌蜀郡徳陽濛陽唐安臨卭盧山郡地是㑹稽揚州之域今晋陵吴郡餘杭㑹稽