body:
  text: 通志卷第一百五宋右廸功郎鄭樵漁仲撰列傳第十八後漢李通王常鄧晨來歙曽孫歴鄧禹禹孫康禹子訓訓子騭朱騭兄宏寵寇恂曾孫榮馮異岑彭元孫熙賈復子宗吳漢蓋延陳俊臧宫李通字次元南陽宛人也世以貨殖著姓父守身長九尺容貌絶異為人嚴毅居家如官廷初事劉歆好星歴䜟記為王莽宗卿師通亦為五威將軍從事出補巫丞有能名莽末百姓愁怨通素聞守説䜟云劉氏復興李氏為輔私常懷之且家居富逸為閭里雄以此不樂為吏乃自免歸及下江新市兵起南陽騷動通從弟軼亦素好事乃共計議曰今四方擾亂新室且亡漢當更興南陽宗室獨伯升兄弟汎愛容衆可與謀大事通笑曰吾意也㑹光武避事在宛通聞之即遣軼徃迎光武光武初以通士君子相慕也故徃答之及相見共語移日握手極歡通因具言䜟文事光武初殊不意未敢當之時守在長安光武乃微觀通曰即如此當如宗卿師何通曰己自有度矣因復備言其計光武既深知通意乃遂相結約定謀議期以材官都試騎士日欲劫前隊大夫及屬正因以號令大衆乃使光武與軼歸舂陵舉兵以相應遣從兄子季之長安以事報守季於道病死守宻知之欲亡歸素與邑人黄顯相善時顯為中郎將聞之謂守曰今闗門禁嚴君壯貌非凡將以此安之不如詣闕自歸事既未然脱可免禍守從其計即上書歸死章未及報留闕下㑹事發覺通得亡走莽聞之乃繋守於獄而黄顯為請曰守聞子無狀不敢逃亡守義自信歸命宫闕臣顯願質守俱東曉說其子如遂悖逆令守北向刎首以謝大恩莽然其言㑹前隊復上通起兵之狀莽怒欲殺守顯争之遂并被誅及守家在長安者盡誅之南陽亦誅通兄弟門宗六十四人皆焚屍宛市時漢兵亦已大合通與光武李軼相遇棘陽遂共破莽前隊殺甄阜梁邱賜更始立以通為柱國大將軍輔漢侯從至長安更拜為大將軍西平王軼為舞隂王通從弟松為丞相更始使通持節還鎮荆州通因娶光武女弟伯姬是為寜平公主光武即位徴通為衛尉建武二年封固始侯拜大司農帝每征討四方常令通居守京師鎮撫百姓修宫室起學官五年春代王梁為前將軍六年夏領破姦將軍進捕虜將軍王霸等十營擊漢中賊公孫述遣兵赴救通等與戰於西城破之還屯田順陽時天下畧定通思欲避榮寵以病上書乞身詔下公卿羣臣議大司徒侯霸等曰王莽簒漢傾亂天下通懷伊吕蕭曹之謀建造大策扶助神靈輔成聖徳破家為國忘身奉主有扶危存亡之義功徳最高海内所聞通以天下平定謙讓辭位夫安不忘危宜令通居職療疾欲就諸侯不可聽於是詔通勉致醫藥以時視事其夏引拜為大司空通布衣唱義助成大業重以寧平公主故特見親重然性謙恭常欲避權埶素有消疾自為宰相謝病不視事連年乞骸骨每優寵之令以公位歸第養疾通復固辭積二嵗乃聽上大司空印綬以特進奉朝請有司奏請封皇子帝感通首創大謀即日封通少子雄為召陵侯帝每幸南陽常遣使者以太牢祠通父冡十八年卒諡曰恭侯帝及皇后親臨弔送葬子音嗣音卒子定嗣定卒子黃嗣黃卒子壽嗣李軼後為朱鮪所殺更始之敗李松戰死惟通能以功名終永平中顯宗幸宛詔諸李隨安衆宗室會見並受賞賜恩寵篤焉王常字顔卿頴川武陽人也王莽末為弟報仇亡命江夏久之與王鳳王匡等起兵雲杜緑林中聚衆數萬人以常為偏禆攻傍縣後與成丹張卬别入南郡藍口號下江兵王莽遣嚴尤陳茂擊破之常與丹卬收散卒入蔞谿劫畧鍾龍間衆復振引軍與荆州牧戰於上唐大破之遂北至宜秋是時漢兵與新市平林兵衆俱敗於小長安各欲解去伯升聞下江軍在宜秋即與光武及李通俱造常壁白願見下江一賢將議大事成丹張卬共推遣常伯升見常説以合從之利常大悟曰王莽簒弑殘虐天下百姓思漢故豪傑並起今劉氏復興即眞主也誠思出身為用輔成大功伯升曰如事成豈敢獨饗之哉遂與常深相結而去常還具謂丹卬言之丹卬負其衆皆曰大丈夫既起當各自為主何故受人制乎常心獨歸漢乃稍曉説其將帥曰往者成哀衰微無嗣故王莽得乗間簒位既有天下而政令苛酷積失百姓之心民之謳歌思漢非一日也故使吾屬因此得起夫民所怨者天所去也民所思者天所與也舉大事必當下順民心上合天意功乃可成若負彊恃勇觸情恣欲雖得天下必復失之以秦項之勢尚至夷覆况今布衣相聚草澤以此行之滅亡之道也今南陽諸劉舉宗起兵觀其來議事者皆有深計大慮王公之才與之并合必成大功此所以祐吾屬也下江諸將雖屈彊少識然素敬常乃皆謝曰無王將軍吾屬幾陷於不義願敬受教即引兵與漢軍及新市平林合於是諸部齊心同力鋭氣益壯遂俱進破殺甄阜梁邱賜及諸將議立宗室唯常與南陽士大夫同意欲立伯升而朱鮪張卬等不聽及更始立以常為廷尉大將軍封知命侯别徇汝南沛郡還入昆陽與光武共擊破王尋王邑更始西都長安以常行南陽太守事令専命誅賞封為鄧王食八縣賜姓劉氏常性恭儉遵法度南方稱之更始敗建武二年夏常將妻子詣洛陽肉袒自歸光武見常甚歡勞之曰王廷尉良苦每念往時共更難戹何日忘之莫往莫來豈違平生之言乎常頓首謝曰臣蒙大命得以鞭䇿託身陛下始遇宜秋後會昆陽幸頼靈武輒成斷金更始不量愚臣任以南州赤眉之難喪心失望以為天下復失綱紀聞陛下即位河北心開目明今得見闕庭死無遺恨帝笑曰吾與廷尉戲耳吾見廷尉不憂南方矣乃召公卿將軍以下大會具為羣臣言常以匹夫興義兵明于知天命故更始封為知命侯與吾相遇兵中尤相厚善特加賞賜拜為左曹封山桑侯後帝於大會中指常謂羣臣曰此家率下江諸將輔翼漢室心如金石真忠臣也是日遷常為漢忠將軍遣南擊鄧奉董訢令諸將皆屬焉又詔北擊河間漁陽平諸屯聚五年秋攻㧞湖陵又與帝會任城因從破蘇茂龐萌進攻下邳常部當城門戰一日數合賊反走入城常追廹之城上射矢雨下帝從百餘騎自城南高處望常戰力甚馳遣中黃門詔使引還賊遂降又别率騎都尉王霸共平沛郡賊六年春徴還洛陽令夫人迎常於舞陽歸家上冡西屯長安拒隗囂七年使使者持璽書即拜常為橫野大將軍位次與諸將絶席常别擊破隗囂將高峻於朝那囂遣將過烏氏常要擊破之轉降保塞羌諸營壁皆平之九年擊内黃賊破降之後北屯故安拒盧芳十二年薨于屯所諡曰節侯子廣嗣三十年徙封石城侯永平十四年坐與楚事相連國除鄧晨字偉卿南陽新野人也世吏二千石父宏豫章都尉晨初娶光武姊元王莽末世祖嘗與兄伯升及晨俱之宛與穰人蔡少公等讌語少公頗學圖䜟言劉秀當為天子或曰是國師公劉秀乎光武戲曰何用知非僕邪坐者皆大笑晨心獨喜及光武與家屬避吏新野舎晨廬甚相親愛晨因謂光武曰王莽悖暴盛夏斬人此天亡之時也往時會宛獨當應邪光武笑不答及漢兵起晨將賔客㑹棘陽漢兵敗小長安諸將多亡家屬光武單馬遁走遇女弟伯姬與共騎而奔前行復見元趣令上馬元以手撝曰行矣不能相救無為兩没也會追兵至元及三女皆遇害漢兵退保棘陽而新野宰乃汙晨宅焚其冢墓宗族皆恚怒曰家自富足何故隨婦家人入湯鑊中晨終無恨色更始立以晨為偏將軍與光武畧地頴川俱夜出昆陽城擊破王尋王邑又别徇陽翟以東至京宻皆下之更始北都洛陽以晨為常山太守會王郎反光武自薊走信都晨亦間行會於鉅鹿下自請從擊邯鄲光武曰偉卿以一身從我不如以一郡為我北道主人乃遣晨歸郡光武追銅馬高胡賊於冀州晨發積射士千人又遣委輸給軍不絶光武即位封晨房子侯帝又感悼姊没於亂兵追封諡元為新野節義長公主立廟于縣西封晨長子汎為吳房侯以奉公主之祠建武三年徴還京師數讌見説故舊平生為歡晨從容謂帝曰僕竟辯之帝大笑從幸章陵拜光禄大夫使持節監執金吾賈復等平邵陵新息賊四年從幸壽春留鎮九江晨好樂郡職由是復拜為中山太守吏民稱之常為冀州高第十三年更封南䜌侯入奉朝請復為汝南太守十八年行幸章陵徴晨行廷尉事從至新野置酒酣讌賞賜數百十萬復遣歸郡晨興鴻郤陂數千頃田汝土以殷魚稻之饒流衍他郡明年定封西華侯復徴奉朝請二十五年卒詔遣中謁者備公主官屬禮儀招迎新野主魂與晨合葬於北邙乗輿與中宫親臨送葬諡曰惠侯小子棠嗣後徙封武當棠卒子固嗣固卒子國嗣國卒子福嗣永建元年卒無子國除來歙字君叔南陽新野人也六世祖漢有才力武帝時以光禄大夫副樓船將軍楊僕擊破南越朝鮮父仲哀帝時為諫議大夫娶光武祖姑生歙光武甚親敬之數共往來長安漢兵起王莽以歙劉氏外屬乃收繫之賔客共簒奪得免更始即位以歙為吏從入闗數言事不用以病去歙女弟為漢中王劉嘉妻嘉遣人迎歙因南之漢中更始敗歙勸嘉歸光武遂與嘉俱東詣洛陽帝見歙大歡即解衣以衣之拜為太中大夫是時方以隴蜀為憂帝謂歙曰今西州未附子陽稱帝道里阻逺諸將方務闗東西州方畧未知所任其謀若何歙因自請曰臣嘗與隗囂相遇長安其人始起以漢為名今陛下聖徳隆興臣願得奉威命開以丹青之信囂必束手自歸則述自亡之勢不足圖也帝然之建武三年歙始使隗囂五年復持節送馬援因奉璽書於囂既還復往説囂囂遂遣子恂隨歙入質拜歙為中郎將山東畧定帝謀西收囂兵與俱伐蜀復使歙諭㫖囂將王元説囂多設疑故乆猶豫不決歙素剛毅遂發憤責囂曰國家以君知臧否識廢興故以手書暢意足下推忠誠遣伯春委質是臣主之交信也今反用佞惑之言為族滅之計叛主負子違背忠信乎吉凶之決在於今日欲前刺囂囂起入部糾兵將殺歙歙徐杖節就車而去囂愈怒王元勸囂殺歙使牛邯將兵圍守之囂將王遵諫曰愚聞為國者慎器與名為家者畏怨重禍俱慎名器則下服其命輕用怨禍則身受其殃今將軍遣子質漢内懷他志名器逆矣外人有議欲謀漢使䡖怨禍矣古者列國兵交使在其間所以重信貴和而不任戰也何况承王命籍重質而犯之哉君叔以單車逺使而陛下之外兄也害之無損於漢而隨以族滅昔宋執楚使遂有析骸易子之禍小國猶不可辱况於萬乗之主重以伯春之命哉歙有信義言行不違及往來陳説皆可案覆西州士大夫信重之多為其言故得免而東歸八年歙與征虜將軍祭遵襲畧陽遵道病還分遣精兵隨歙合二千餘人伐山開道從番須回中徑至畧陽斬囂守將金梁因保其城囂大驚曰何其神也乃悉兵數萬人圍畧陽斬山築隄激水灌城歙與將士死守矢盡乃發屋斷木以為兵囂盡鋭攻之自春至秋其士卒疲弊帝乃大發闗東兵自將上隴囂衆潰走圍解於是置酒高會勞賜歙班坐絶席在諸將之右賜歙妻縑千疋詔使留屯長安悉監護諸將歙因上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧昔趙之將帥多賈人高帝懸之以重賞今西州新破兵人饑饉若招以財榖則其衆可集臣知國家所給非一用度不足然有不得已也帝然之於是大轉糧運詔歙率征西大將軍馮異建威大將軍耿弇虎牙大將軍蓋延揚武大將軍馬成武威將軍劉尚入天水擊敗述将田弇趙匡明年攻㧞落門隗囂支黨周宗趙恢及天水屬縣皆降初王莽世羌虜多背叛而隗囂招懷其酋豪遂得為用及囂亡後五谿先零諸數數為寇掠皆營塹自守州郡不能討歙乃大修攻具率蓋延劉尚及太中大夫馬援等進擊羌於金城大破之斬首虜數千級獲牛羊萬餘頭榖數十萬斛又擊破襄武賊傅栗卿等隴西雖平而人饑流者相望歙乃傾倉廪轉運諸縣以賑贍之於是隴西遂安而涼州流通焉十一年歙與蓋延馬成進攻公孫述將王元環安於河池下辯陷之乗勝入蜀蜀人大懼使刺客刺歙未殊馳召蓋延延見歙因伏悲哀不能仰視歙叱延曰虎牙何敢然今使者中刺客無以報國故呼巨卿欲相屬以兵事而反效兒女子涕泣乎刃雖在身不能勒兵斬公邪延收淚彊起受所誡歙自書表曰臣夜人定後為何人所賊傷中臣要害臣不敢自惜誠恨奉職不稱以為朝廷羞夫理國以得賢為本太中大夫叚襄骨鯁可任願陛下裁察又臣兄弟不肖終恐被罪陛下哀憐臣數賜教督投筆抽刃而絶帝聞大驚省書覽涕使太中大夫贈歙中郎將征羌侯印綬諡曰節侯謁者護喪事喪還洛陽乗輿縞素臨弔送葬以歙有羌隴之功故改汝南之當鄉縣為征羌國焉子褒嗣十三年帝嘉歙忠節復封歙弟由為宜西侯褒子稜尚顯宗女武安公主稜早没褒卒以稜子歴為嗣厯字伯珍少襲爵以公主子永元中為侍中監羽林右騎永初三年遷射聲校尉永寧元年代馮石為執金吾延光元年尊厯母為長公主二年遷歴太僕明年中常侍樊豐與大將軍耿寶侍中周廣謝惲等共譖陷太尉楊震震遂自殺歴謂御史虞詡曰耿寳託元舅之親榮寵過厚不念報國恩而傾側姦臣誣奏楊公傷害忠良其天禍亦將至矣遂絶周廣謝惲不與交通時皇太子驚病不安避幸安帝乳母野王君王聖舎太子乳母王男厨監邴吉等以為聖舎新繕修犯土禁不可乆御聖及其女永與大長秋江京及中常侍樊豐王男邴吉等互相是非聖永遂誣譖男吉皆幽囚死家屬徙北景太子思男等數為歎息京豐懼有後害妄造虛無構讒太子及東宫官屬帝怒召公卿以下會議廢立耿寳等承㫖皆以為太子當廢歴與太常桓焉廷尉張皓議曰經説年未滿十五過惡不在其身且男吉之謀皇太子容有不知宜選忠良保傅輔以禮義廢置事重此誠聖恩所宜宿留帝不從是日遂廢太子為濟陰王時監太子家小黃門籍建中傅高梵等皆以無罪徙朔方厯乃結光禄勲祋諷宗正劉禕將作大匠薛皓侍中閭邱𢎞陳光趙代施延太中大夫朱倀第五頡中散大夫曹成諫議大夫李尤符節令張敬持書侍御史龔調羽林右監孔顯城門司馬徐崇衛尉守丞樂闈長樂未央廐令鄭安世等十餘人俱詣鴻都門證太子無過龔調據法律明之以為男吉犯罪皇太子不當坐帝與左右患之乃使中常侍奉詔脅羣臣曰父子一體天性自然以義割恩為天下也歴諷等不識大典而與羣小共為讙譁外見忠直而内希後福飾邪違義豈事君之禮朝廷廣開言事之路故且一切假貸若懷迷不反當顯明刑書諫者莫不失色薛皓先頓首曰固宜如明詔歴怫然廷詰皓曰屬通諫何言而今復背之大臣乗朝車處國事固得輾轉若此乎乃各稍自引起歴獨守闕連日不肯去帝大怒乃免歴兄弟官削國租黜公主不得㑹見厯遂杜門不與親戚通時人為之震慄及帝崩閻太后起厯為將作大匠順帝即位朝廷咸稱社稷臣於是遷為衛尉祋諷劉禕閭邱𢎞等先卒皆拜其子為郎朱倀施延陳光趙代等並為公卿任職徴王男邴吉家屬還京師厚加賞賜籍建高梵等悉蒙顯擢永建元年拜厯車騎將軍弟祉為歩兵校尉超為黃門侍郎三年母長公主薨厯稱病歸第服闋復為大鴻臚陽嘉二年卒官子定嗣定尚安帝妹平氏長公主順帝時為虎賁中郎將定卒子虎嗣桓帝時為屯騎校尉弟豔字季徳少好學下士開館養徒少歴顯位靈帝時再遷司空鄧禹字仲華南陽新野人也年十三能誦詩受業長安時光武亦遊學京師禹雖幼而見光武知非常人遂相親附數年歸家及漢兵起更始立豪傑多薦舉禹禹不肯從及聞光武安集河北即杖䇿北渡追及於鄴光武見之甚歡謂曰我得専封拜生逺來寧欲仕乎禹曰不願也光武曰即如是何欲為禹曰但願明公威徳加於四海禹得效其尺寸垂功名於竹帛耳光武笑因留宿間語禹乃進説曰更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號往往羣起更始既未有所挫而不自聽斷諸將皆庸人屈起志在財幣爭用威力朝夕自快而已非有忠良明智深慮逺圗欲尊主安民者也四方分崩離析形勢可見明公雖建藩輔之功猶恐無所成立於今之計莫若延攬英雄務悦民心立高祖之業救萬民之命以公而慮天下不足定也光武大悦因令左右號禹曰鄧將軍常宿於中與定計議及王郎起兵光武自薊至信都使禹發奔命得數千人令自將之别攻㧞樂陽從至廣阿光武舎城數上披輿地圗指示禹曰天下郡國如是今乃始得其一子前言以吾慮天下不足定何也禹曰方今海内殽亂人思明君猶赤子之慕慈母也古之興者在徳薄厚不以大小光武悦時任使諸將多訪於禹禹每有所舉皆當其材光武以為知人使别將騎與蓋延等擊銅馬於清陽延等先至戰不利還保城為賊所圍禹遂進與戰大破之生獲其大將從光武追賊至滿陽連大克獲北州畧定及赤眉西入關更始使定國上公王匡襄邑王成丹抗威將軍劉均及諸將分據河東𢎞農以拒之赤眉衆大集王匡等莫能當光武籌赤眉必破長安欲乗釁并關中而方有事山東未知所寄以禹沈深有大度故授以西討之畧乃拜為前將軍持節中分麾下精兵二萬人遣西入關令自選偏裨以下可與俱者於是以韓歆為軍師李文李春程慮為祭酒馮愔為積弩將軍樊宗為驍騎將軍宗歆為車騎將軍鄧尋為建威將軍耿訢為赤眉將軍左于為軍師將軍引而西建武元年正月禹自箕關將入河東河東都尉守關不開禹攻十日破之獲輜重千餘乗進圍安邑數月未能下更始大將軍樊參將萬人度大陽欲攻禹禹遣諸將逆擊於解南大破之斬參首於是王匡成丹劉均等合軍十餘萬復共擊禹禹軍不利樊崇戰死會日暮戰罷軍師韓歆及諸將見兵勢已摧皆勸禹夜去禹不聽明日癸亥匡等以六甲窮日不出禹因得更理兵勒衆明旦匡悉軍出攻禹禹令軍中無得妄動既至營下因𫝊發諸將鼓而並進大破之匡等皆棄軍亡走禹率䡖騎急追獲劉均及河東太守楊寶持節中郎將弭疆皆斬之收得節六印綬五百兵器不可勝數遂定河東承制拜李文為河東太守悉更置屬縣令長以鎮撫之是月光武即位於鄗使使者持節拜禹為大司徒封酇侯食邑萬户禹時年二十四遂渡汾陰河入夏陽更始中郎將左輔都尉公乗歙引其衆十萬與左馮翊兵共拒禹於衙禹復破走之而赤眉遂入長安是時三輔連覆敗赤眉所過殘賊百姓不知所歸聞禹乗勝獨剋而師行有紀皆望風相攜負而迎軍降者日以千數衆號百萬禹所止輒停車住節以勞來之父老童稚垂髪戴白滿其車下莫不感悦於是名震關西帝嘉之數賜書褒美諸將豪傑皆勸禹徑攻長安禹曰不然今吾衆雖多能戰者少前無可仰之積後無轉餽之資赤眉新拔長安財富充實鋒鋭未可當也夫盜賊羣起無終日之計財榖雖多變故萬端寕能堅守者也上郡北地安定三郡土廣人稀饒榖多畜吾且休兵北地就糧養士以觀其弊乃可圖也遂引軍至栒邑禹所到擊破赤眉别將諸營保郡邑皆開門歸附西河太守宗育遣子奉檄降禹遣詣京師帝以闗中未定而禹久不進兵下勑曰司徒堯也亡賊桀也長安吏民遑遑無所依歸宜以時進討鎭慰西京繫百姓之心禹猶執前意乃分遣將軍别攻上郡諸縣更徴兵引榖歸至大要遣馮愔宗歆守栒邑二人爭權相攻愔遂殺歆因反擊禹禹遣使以聞帝問使人愔所親愛為誰對曰護軍黃防帝度愔防不能久和埶必相忤因報禹曰縳馮愔者必黃防也乃遣尚書宗廣持節降之後月餘防果執愔將其衆歸罪更始諸將王匡胡殷成丹等皆詣廣降與共東歸至安邑道欲亡廣悉斬之愔至洛陽赦不誅二年春遣使者更封禹為梁侯食四縣時赤眉西走扶風禹至長安軍昆明池謁高廟遣使奉十一帝主詣洛陽循行園陵置吏士奉守焉禹引兵與延岑戰於藍田不克復就榖雲陽漢中王劉嘉詣禹降嘉相李寶倨慢無禮禹斬之寳弟收寳部曲擊禹殺將軍耿訢自馮愔反後禹威稍損又乏食歸附者離散而赤眉復入長安禹與戰敗走至高陵軍士饑餓者皆食棗菜帝乃徴禹還勑曰赤眉無榖自當來東吾折箠笞之非諸將所憂也無得復妄進禹慙於受任而功不遂數以饑䘚徼戰輒不利三年春與車騎將軍鄧𢎞擊赤眉遂為所敗衆皆死散獨與二十四騎還詣宜陽謝上大司徒梁侯印綬有詔歸侯印綬數月拜右將軍延岑自敗於東陽遂與秦豐合四年春復寇順陽間遣禹護復漢將軍鄧曄輔漢將軍于匡擊破岑於鄧追至武當復破之岑奔漢中餘黨悉平十三年天下平定諸功臣皆增户邑定封禹為高宻侯食高密昌安夷安淳于四縣帝以禹功高封弟寛為明親侯其後左右將軍官罷以特進奉朝請禹内文明篤行淳備事母至孝天下既定常欲逺名勢有子十三人各使守一藝修整閨門教養子孫可為後世法資用國邑不修産利帝益重之中元元年復行司徒事從東巡狩封岱宗顯宗即位以禹為先帝元功拜為太傅進見東向甚尊寵之居歳餘寢疾帝數自臨問以子男二人為郎永平元年年五十七薨諡曰元侯帝分禹封為三國長子震為高密侯襲為昌安侯珍為夷安侯禹少子鴻好籌策永平中以為小侯引入與議邊事帝以為能拜將兵長史率五營士屯鴈門肅宗時為度遼將軍永元中與大將軍竇憲俱出擊匈奴有功徴行車騎將軍出塞追畔胡逢侯坐逗留下獄死高密侯震卒子乾嗣乾尚顯宗女沁水公主永元十四年陰皇后巫蠱事發乾從兄奉以后舅被誅乾從坐國除元興元年和帝復封乾本國拜侍中乾卒子成嗣成卒子褒嗣尚安帝妹舞陰長公主桓帝時為少府褒卒長子某嗣少子昌襲母爵為舞陰侯拜黃門侍郎昌安侯襲嗣子藩亦尚顯宗女平臯長公主和帝時為侍中夷安侯珍子康少有操行兄良襲封無後永初六年紹封康為夷安侯時諸紹封者皆食故國半租康以皇太后戚屬獨三分食二以侍祠侯為越騎校尉康以太后久臨朝政宗門盛滿數上書長樂宫諫爭宜崇公室自損私權言甚切至太后不從康心懷憂懼永寧元年遂謝病不朝太后使内侍者問之時宫人出入多能有所毁譽其中耆宿皆稱中大人所使者乃康家先婢亦自通中大人康聞詬之曰汝我家出亦敢爾邪婢怨恚還説康詐疾而言不遜太后大怒遂免康官遣歸國絶屬籍及從兄騭誅安帝徴康為侍中順帝立為太僕有方正稱名重朝廷以病免加位特進陽嘉三年卒諡曰義侯禹第六子訓字平叔少有大志不好文學禹常非之顯宗初即位以為郎中樂施下士士大夫多歸之永平中治滹沱石臼河從都慮至羊腸倉欲令通漕太原吏民苦役連年無成轉運所經三百八十九隘前後溺死者不可勝筭建初三年拜訓謁者使監領其事訓考量隱括知大功難立具以上言肅宗從之遂罷其役更用驢輦歳省費億萬計全活徒士數千人會上谷太守任興欲誅赤沙烏桓怨恨謀反詔訓將黎陽營兵屯狐奴以防其變訓撫綏邊民為幽部所歸六年遷護烏桓校尉黎陽故人多攜將老幼樂隨訓徙邊鮮卑聞其威恩皆不敢南近塞下八年舞陰公主子梁扈有罪訓坐私與扈通書徴免歸閭里元和三年盧水胡反畔以訓為謁者乗𫝊到武威拜張掖太守章和二年護降校尉張紆誘誅燒當種羌迷吾等由是諸羌大怒謀欲報怨朝廷憂之公卿舉訓代紆為校尉諸羌激忿遂相與解仇結㛰交質盟詛衆四萬餘人期冰合度河攻訓先是小月氏胡分居塞内勝兵者二三千騎皆勇健富彊每與羌戰常以少制多雖首施兩端漢亦時收其用時迷吾子迷唐别與武威種羌合兵萬騎至塞下未敢攻訓先欲脅月氏胡訓擁衛稽故令不得戰議者咸以羌胡相攻縣官之利以夷伐夷不宜禁護訓曰不然今張紆失信衆羌大動經常屯兵不下二萬轉運之費空竭府帑涼州吏民命縣絲髪原諸胡之所以難得其意者皆恩信不厚耳今因其廹急以徳懷之庶能有用遂今開城及所居園門悉驅羣胡妻子内之嚴兵守衛羌掠無所得又不敢逼諸胡因即解去由是湟中諸胡皆言漢家常欲鬭我遭今鄧使君待我以恩信開門内我妻子乃得父母咸歡喜叩頭曰唯使君所命訓遂撫養其中少年勇者數百人以為義從羌胡俗恥病死每病臨困輒以刀自刺訓聞有疾困輒拘持縳束不與兵刃使醫藥療之愈者非一大小咸悦於是賞賂諸羌使相招誘迷唐伯父號迷吾乃將其母及種人八百户自塞外來降訓因發湟中秦胡羌兵四千人出塞掩擊迷唐於寫谷斬首虜六百餘人得馬牛羊萬餘頭迷唐乃去大小榆居頗巖谷衆悉破散其春復欲歸故地就田業訓乃發湟中六千人令長史任尚將之縫革為船置於箄中以度河掩擊迷唐廬落大豪多所斬獲復追逐奔北㑹尚等夜為羌所攻於是義從羌胡并力破之斬首前後一千八百餘級獲生口二千人馬牛羊三萬餘頭一種殆盡迷唐遂收其餘部逺徙廬落西行千餘里諸附落小種皆背畔之燒當豪帥東號稽顙歸死餘皆款塞納質於是綏接歸附威信大行遂罷屯兵各令歸郡唯置弛刑徒三千餘人分以屯田為貧人耕種修理城郭塢壁而已永元二年大將軍竇憲將兵鎭武威憲以訓曉羌胡方畧上求偕行訓初厚於馬氏不為諸竇所親及憲誅故不離其禍訓雖寛中容衆而於閨門甚嚴兄弟莫不敬憚諸子進見未嘗賜席接以温色四年冬病卒官時年五十三吏人羌胡愛惜旦夕臨者日數千人戎俗父母死恥悲泣皆騎馬歌呼至聞訓卒莫不咷號或以刀自割又刺殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳前烏桓吏士皆奔走道路至空城郭吏執不聽以狀白校尉徐傿傿歎息曰此義也乃釋之遂家家為訓立祠每有疾病輒此請禱求福元興元年和帝以訓皇后之父使謁者持節至訓墓賜策追封諡曰平壽敬侯中宫自臨百官大㑹訓五子騭京悝𢎞閶騭字昭伯少辟大將軍竇憲府及女弟為貴人騭兄弟皆除郎中及貴人立是為和熹皇后騭三遷虎賁中郎將京悝𢎞閶皆黃門侍郎京卒於官延平元年拜騭車騎將軍儀同三司始自騭也悝虎賁中郎將𢎞閶皆侍中殤帝崩太后與騭等定策立安帝悝遷城門校尉𢎞虎賁中郎將自和帝崩後騭兄弟常居禁中騭謙遜不欲乆在内連求還第歳餘太后乃許之永初元年封騭上蔡侯悝葉侯𢎞西平侯閭西華侯食邑各萬户騭以定策功增邑三千户騭等辭讓不獲遂逃避使者間關詣闕上疏自陳至誠太后不聽騭頻上疏至於五六乃許之其後涼部畔羌摇蕩西州朝廷憂之於是詔騭將左右羽林北軍五校士及諸部兵擊之車駕幸平樂觀餞送騭西屯漢陽使征西校尉任尚從事中郎司馬鈞與羌戰大敗時以轉輸疲弊百姓苦役冬徵騭班師朝廷以太后故遣五官中郎將迎拜騭為大將軍軍到河南使大鴻臚親迎中常侍齎牛酒郊勞王主以下候望於道既至大會羣臣賜束帛乗馬寵靈顯赫光震都鄙時遭元二之災人士荒饑死者相望盗賊羣起四夷侵畔騭等崇節儉罷力役推進天下賢士何熙祋諷羊浸李郃陶敦等列於朝廷辟楊震朱寵陳禪置之幕府故天下復安四年母新野君寢病騭兄弟並上書求還侍養太后以閶最少孝行尤著特聽之賜安車駟馬及新野君薨騭等復乞身行服章連上太后許之騭等既還里第並居家次閶至孝骨立有聞當時及服闋詔諭騭還輔朝政更授前封騭等叩頭固讓乃止於是並奉朝請位次在三公下特進侯上其有大議乃詣朝堂與公卿參謀元初三年𢎞卒太后服齊衰帝絲麻並宿幸其第𢎞少治歐陽尚書授帝禁中諸儒多歸附之初疾病遺言悉以常服不得用錦衣玉匣有司奏贈𢎞驃騎將軍位特進西平侯太后追思𢎞意不加贈位衣服但賜錢千萬布萬匹騭等復辭不受詔大鴻臚持節即𢎞殯封子廣徳為西平侯將葬有司復奏發五營輕車騎士禮儀如霍光故事太后皆不聽但白蓋雙騎門生輓送後以帝師之重分西平之都鄉封廣徳弟甫徳為都鄉侯四年又封京子黃門侍郎珍為陽安侯邑三千五百户五年悝閶相繼並卒並遺言薄葬不受爵贈太后並從之乃封悝子廣宗為葉侯閶子忠為西華侯自祖父禹教訓子孫皆遵法度深戒竇氏檢勑宗族闔門靜居騭子侍中鳳嘗與尚書郎張龕書屬郎中馬融宜在臺閣又中郎將任尚嘗遺鳯馬後尚坐斷盜軍糧檻車徵詣廷尉鳳懼事泄先自首於騭騭畏太后遂髠妻及鳳以謝天下稱之建光元年太后崩未及大斂帝復申前命封騭為上蔡侯位特進帝少號聰敏及長多不徳而乳母王聖見太后久不歸政慮有廢置常與中黃門李閨候伺左右及太后崩宫人先有受罰者懐怨恚因誣告悝𢎞閶先從尚書鄧訪取廢帝故事謀立平原王得帝聞追怒令有司奏悝等大逆無道遂廢西平侯廣徳葉侯廣宗西華侯忠陽安侯珍都鄉侯甫徳皆為庶人騭以不與謀但免特進遣就國宗族皆免官歸故郡没入騭等貲財田宅徙鄧訪及家屬於逺郡郡縣逼廹廣宗及忠皆自殺又徙封騭為羅侯騭與子鳳並不食而死騭從弟河南尹豹度遼將軍舞陽侯遵將作大匠暢皆自殺唯廣徳兄弟以母閻氏戚屬得留京師大司農朱寵痛騭無罪遇禍乃肉袒輿櫬上疏追訟騭曰伏惟和熹皇后聖善之徳為漢文母兄弟忠孝同心憂國宗廟有主王室是頼功成身退讓國遜位聖世外戚無與為比當享積善履謙之祐而橫為宫人單辭所陷利口傾險反亂國家罪無申證獄不訊鞫遂令騭等罹此酷濫一門七人並不以命屍骸流離怨魂不反逆天感人率土喪氣宜收還冡次寵樹遺孤宗承血祀以謝亡靈寵知其言切自致廷尉詔免官歸田里衆庶多為騭稱枉帝意頗悟乃譴讓州郡還葬洛陽北芒舊塋公卿皆㑹喪莫不悲傷之詔遣使者祠以中牢諸從昆弟皆歸京師及順帝即位追感太后恩訓愍騭無辜乃詔宗正復故大將軍鄧騭宗親内外朝見皆如故事除騭兄弟子及門從十二人悉為郎中擢朱寵為太尉録尚書事寵字仲威京兆人初辟騭府稍遷潁川太守有治聲及拜太尉封安鄉侯甚加優禮廣徳早卒甫徳更召為開封令學𫝊父業喪母遂不仕閶妻耿氏有節操痛鄧氏誅廢子忠早卒乃養河南尹豹子嗣為閶後耿氏教之書學遂以通博稱永壽中與伏無忌延篤著書東觀官至屯騎校尉禹曾孫香子女為桓帝后帝又紹封度遼將軍遵子萬世為南鄉侯拜河南尹及后廢萬世下獄死其餘宗親皆復歸故郡鄧氏自中興後累世寵貴凡侯者二十九人公二人大將軍以下十三人中二千石十四人列校二十二人州郡牧守四十八人其餘侍中將大夫郎謁者不可勝數東京莫與為比寇恂字子翼上谷昌平人也世為著姓恂初為郡功曹太守耿況甚重之王莽敗更始立使使者徇郡國曰先降者復爵位恂從耿況迎使者於界上況上印綬使者納之一宿無還意恂勒兵入見使者就請之使者不與曰天王使者功曹欲脅之邪恂曰非敢脅使君切傷計之不詳也今天下粗定國信未宣使君建節銜命以臨四方郡國莫不延頸傾耳望風歸命今始至上谷而先墮大信沮向化之心生離畔之隙將何以號令他郡乎且耿府君在上谷乆為吏民所親今易之得賢則造次未安不賢則祗更生亂為使君計莫若復之以安百姓使者不應恂叱左右以使者命召況況至恂進取印綬帶況使者不得已乃承制授之況受而歸及王郎起遣將徇上谷急況發兵恂與門下掾閔業共説況曰邯鄲㧞起難可信向昔王莽時所難獨有劉伯升耳今聞大司馬劉公伯升母弟尊賢下士士多歸之可攀附也況曰邯鄲方盛力不能獨拒如何恂曰今上谷完實控弦萬騎舉大郡之資可以詳擇去就恂請東約漁陽齊心合衆邯鄲不足圗也況然之乃遣恂到漁陽結謀彭寵恂還至昌平襲擊邯鄲使者殺之奪其軍遂與況子弇等俱南及光武於廣阿拜恂為偏將軍號承義侯從破羣賊數與鄧禹謀議禹竒之因奉牛酒共交歡光武南定河内而更始大司馬朱鮪等盛兵據洛陽又并州未安光武難其守問於鄧禹曰諸將誰可守河内者禹曰昔高祖任蕭何於關中無復西顧之憂所以得専精山東終成大業今河内帶河為固户口殷實北通上黨南廹洛陽宼恂文武備足有牧人御衆之才非此子莫可使也光武乃拜恂河内太守行大將軍事光武謂恂曰河内完富吾將因是而起昔高祖留蕭何於關中今吾委公以河内堅守轉運給足軍糧率厲士馬防遏他兵勿令北度而已光武於是復北征燕代恂移書屬縣講兵肄射伐淇園之竹為矢百萬餘養馬二千疋收租四百萬斛轉以給軍朱鮪聞光武北而河内孤使討難將軍蘇茂副將賈彊將兵三萬餘人渡鞏河攻温檄書至恂即勒軍馳出移告屬縣發兵㑹於温下軍吏皆諫曰今洛陽兵度河前後不絶宜待衆軍畢集乃可出也恂曰温郡之藩蔽失温則郡不可守遂馳赴之旦日合戰而偏將軍馮異遣救及諸縣兵適至士馬四集幡旗蔽野恂乃令士卒乗城鼔譟大呼言曰劉公兵到蘇茂軍聞之陣動恂因奔擊大破之追至洛陽遂斬賈彊茂兵自投河死者數千生獲萬餘人恂與馮異過河而還自是洛陽震恐城門晝閉時光武𫝊聞朱鮪破河内有頃恂檄至大喜曰吾知寇子翼可任也諸將軍賀因上尊號於是即位時乏軍食恂以輦車驪駕轉輸前後不絶尚書升斗以禀百官帝數策書勞問恂同門生茂陵董崇説恂曰上新即位四方未定而君侯以此時據大郡内得人心外破蘇茂威震鄰敵此讒人側目怨禍之時也昔蕭何守關中悟鮑生之言而高祖悦今君所將皆宗族昆弟也無乃當以前人為鏡戒恂然其言稱疾不視事帝將攻洛陽先至河内恂求從軍帝曰河内未可離也數固請不聽乃遣兄子宼張姊子谷崇將突騎願為軍鋒帝善之皆以為偏將軍建武二年恂坐繫考上書者免是時潁川人嚴終趙敦聚衆萬餘人與密人賈期連兵為宼恂免數月復拜潁川太守與破姦將軍侯進俱擊之數月斬期首郡中悉平定封恂雍奴侯邑萬户執金吾賈復在汝南部將殺人於潁川恂捕得繫獄時尚草創軍營犯法率多相容恂乃戮之於市復以為耻還過潁川謂左右曰吾與宼恂並列將帥而今為其所陷大丈夫豈有懷侵怨而不决之者乎今見宼恂必手劒之恂知其謀不欲與相見谷崇曰崇將也得帶劔侍側卒有變足以相當恂曰不然昔藺相如不畏秦王而屈於亷頗者為國也區區之趙尚有此義吾安可以亡之乎乃勑屬縣盛供具儲酒醪執金吾至界一人皆兼二人之饌恂乃出迎於道稱疾而還賈復勒兵欲追之而吏士皆醉遂過去恂遣谷崇以狀聞帝乃徴恂恂至引見時復先在坐欲起相避帝曰天下未定兩虎安得私鬭今日朕分之於是並坐極歡遂共車同出結友而去恂歸潁川三年遣使者即拜為汝南太守又使驃騎將軍杜茂將兵助恂討盜賊盗賊清靜郡中無事恂素好學乃修鄉校教生徒聘能為左氏春秋者親受學焉七年代朱浮為執金吾明年從車駕擊隗囂而潁川盜賊羣起帝乃引軍還謂恂曰潁川迫近京師當以時定惟念獨卿能平之耳從九卿復出以憂國可知也恂對曰潁川剽輕聞陛下逺踰阻險有事隴蜀故狂狡乗間相詿誤耳如聞乗輿南向賊必惶怖歸死臣願執鋭前驅即日車駕南征恂從至潁川盗賊悉降而竟不拜郡百姓遮道曰願從陛下復借寇君一年乃留恂長社鎮撫吏民受納餘降初隗囂將安定高峻擁兵萬人據高平第一帝使待詔馬援招降峻由是河西道開中郎將來歙承制拜峻通路將軍封關内侯後屬大司馬吳漢共圍囂於冀及漢軍退峻亡歸故營復助囂拒隴坻及囂死峻據高平畏誅堅守建威大將軍耿弇率太中大夫竇士武威太守梁統等圍之一歳不抜十年帝入闗將自征之恂時從駕諫曰長安道里居中應接近便安定隴西必懷震懼此從容一處可以制四方也今士馬疲倦方履險阻非萬乗之固前年潁川可謂至戒帝不從進軍及汧峻猶不下帝議遣使降之乃謂恂曰卿前止吾此舉今為吾行也若峻不即降即引耿弇等五營擊之恂奉璽書至第一峻遣軍師皇甫文出謁辭禮不屈恂怒將誅文諸將諫曰高峻精兵萬人率多彊弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也遂𫝊峻還洛陽恂經明行修名重朝廷所得秩奉厚施朋友故人及從吏士常曰吾因士大夫以致此其可獨享之乎時人歸其長者以為有宰相器十二年卒諡曰威侯子損嗣恂同産弟及兄子姊子以軍功封列侯者凡八人終其身不𫝊於後初所與謀閔業者恂數為帝言其忠賜爵闗内侯官至遼西太守十三年復封損庶兄壽為洨侯後徙封損扶柳侯損卒子釐嗣徙封商鄉侯釐卒子襲嗣恂女孫為大將軍鄧騭夫人由是寇氏得志於永初間恂曾孫榮少知名桓帝時為侍中性矜㓗自貴於人少所與以此見害於權寵而從兄子尚帝妹益陽長公主帝又聘其從孫女於後宫左右益惡之延熹中遂陷以罪辟與宗族免歸故郡吏承望風㫖持之寖急榮恐不免奔闕自訟未至刺史張敬追劾榮以擅去邊有詔捕之榮逃竄數年會赦令不得除積窮困乃自亡命中上書自訟辭語怨忿帝省章愈怒遂誅榮寇氏由是遂衰馮異字公孫潁川父城人也好讀書通左氏春秋孫子兵法漢兵起異以郡掾監五縣與父城長苗萌共城守為王莽拒漢光武畧地潁川攻父城不下屯兵巾車鄉異間出行屬縣為漢兵所執時異從兄孝及同郡丁綝吕晏並從光武因共薦異得召見異曰異一夫之用不足為彊弱有老母在城中願歸據五城以効功報徳光武曰善異歸謂苖萌曰今諸將皆壯士屈起多暴橫獨有劉將軍所到不虜掠觀其言語舉止非庸人也可以歸身苗萌曰死生同命敬從子計光武南還宛更始諸將攻父城者前後十餘軰異堅守不下及光武為司𨽻校尉道經父城異等即開門奉牛酒迎光武署異為主簿苖萌為從事異因薦邑子銚期叔壽叚建左隆等光武皆以為掾史從至洛陽更始數欲遣光武徇河北諸將皆以為不可是時左丞相曹竟子詡為尚書父子用事異勸光武厚結納之及度河北詡有力焉自伯升之敗光武不敢顯其悲戚每獨居輒不御酒肉枕席有涕泣處異獨叩頭寛譬哀情光武止之曰卿勿妄言異復因間進説曰天下同苦王氏思漢久矣今更始諸將從橫暴虐所至虜掠百姓失望無所依戴今公專命方面施行恩徳夫有桀紂之亂乃見湯武之功民久饑渴易為充飽宜急分遣官屬徇行郡縣理寃結布恩澤光武納之至邯鄲遣異與銚期乗𫝊撫循屬縣錄囚徒存鰥寡亡命自詣者除其罪陰條二千石長吏同心及不附者上之及王郎起光武自薊東南馳晨夕草舎至饒陽無蔞亭時天寒烈衆皆饑疲異上豆粥明旦光武謂諸將曰昨得公孫豆粥饑寒俱觧及至南宫遇大風雨光武引車入道傍空舎異抱薪鄧禹爇火帝對竈燎衣異復進麥飯莵肩因復渡虖沱河至信都使異别收河間兵還拜偏將軍從破王郎封應侯異為人謙退不伐行與諸將相逢輒引車避道進止皆有表識軍中號為整齊每所止舎諸將並坐論功異常獨屏樹下軍中號曰大樹將軍及破邯鄲乃更分部諸將各有配𨽻軍士皆言願屬大樹將軍光武以此多之别擊破鐡脛於北平又降匈奴于林闟頓王因從平河北時更始遣舞陰王李軼廪邱王田立大司馬朱鮪白虎公陳僑將兵號三十萬與河南太守武勃共守洛陽光武將北徇燕趙以魏郡河内獨不逢兵而城邑完全倉廪實乃拜寇恂為河内太守異為孟津將軍統二郡兵河上與寇恂合勢以拒朱鮪等異乃遺李軼書曰愚聞明鏡所以照形往事所以知今昔微子去殷而入周項伯畔楚而歸漢周勃迎代王而黜少帝霍光尊孝宣而廢昌邑彼皆畏天知命覩存亡之符見廢興之事故能成功於一時垂業於萬世也茍令長安尚可扶助延期歳月疏不間親逺不踰近季文豈能居一隅哉今長安壞亂赤眉臨郊王侯搆難大臣乖離綱紀已絶四方分崩異姓並起是故蕭王䟦渉霜雪經營河北今英俊雲集百姓風靡雖邠岐慕周不足以喻季文誠能覺悟成敗亟定大計論功古人轉禍為福在此時矣如猛將長驅嚴兵圍城雖有悔恨亦無及矣初軼與光武首結謀約加相親愛及更始立反共陷伯升雖知長安已危欲降又不自安乃報異書曰軼本與蕭王首謀造漢結死生之約同榮枯之計今軼守洛陽將軍鎭孟津俱據機軸千載一會思成斷金唯深逹蕭王願進愚策以佐國安人軼自通書之後不復與異爭鋒故異因此得北攻天井關抜上黨二城又南下河南成臯已東十三縣及諸屯聚皆平之降者十餘萬武勃將萬餘人攻諸畔者異引軍度河與勃戰於士鄉下大破斬勃獲首五千餘級軼又閉門不救異見其信効具以奏聞光武故宣露軼書令朱鮪知之鮪怒使人刺殺軼由是城中乖離多有降者鮪乃遣討難將軍蘇茂將數萬人攻温鮪自將數萬人攻平陰以綴異異遣校尉護軍將軍將兵與寇恂合擊茂破之異因渡河擊鮪鮪走異追至洛陽環城一匝而還移檄上狀諸將皆入賀并勸光武即帝位光武乃召異詣鄗問四方動靜異曰三王反叛更始敗亡天下無主宗廟之憂在於大王宜從衆議上為社稷下為百姓光武曰我昨夜夢乘赤龍上天覺悟心中動悸異因下席再拜賀曰此天命發於精神心中動悸大王重慎之性也異遂與諸將定議上尊號建武二年春定封異陽夏侯引擊陽翟賊嚴終趙根破之詔異歸家上冢使太中大夫齎牛酒令二百里内太守都尉以下及宗族會焉時赤眉延岑暴亂三輔郡縣大姓各擁兵衆大司徒鄧禹不能定乃遣異代禹討之車騎送至汝南賜以乗輿七尺具劒勑異曰三輔遭王莽更始之亂動以赤眉延岑之酷元元塗炭無所依訴今之征伐非必畧地屠城要在平定安集之耳諸將非不健鬬然好虜掠卿本能御吏士念自修勑無為郡縣所苦異頓首受命引而西所至皆布威信𢎞農羣盗稱將軍者十餘軰皆率衆降異異與赤眉遇於華隂相拒六十餘日戰數十合降其將劉始王宣等五千餘人三年春光武遣使者即拜異征西大將軍會鄧禹率車騎將軍鄧𢎞等引歸與異相遇禹𢎞要異共攻赤眉異曰異與賊相拒且數十日雖屢獲雄將餘衆尚多可稍以恩信傾誘難卒用兵破也上今使諸將屯澠池要其東而異擊其西一舉取之此萬成計也禹𢎞不從𢎞遂大戰移日赤眉陽敗棄輜重走車皆載土以豆覆其上士卒饑爭取之赤眉引還擊𢎞𢎞軍潰亂異與禹合兵救之赤眉小却異以士卒饑倦可且休禹又不聽復戰大為所敗死傷者三千餘人禹得脱歸宜陽異棄馬歩走上回谿阪與麾下數人歸營復堅壁收其散卒招集諸營保數萬人與賊約期㑹戰使壯士變服與赤眉同伏于道側旦日赤眉使萬人攻異前部異裁出兵以救之賊見勢弱悉衆攻異異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識别衆遂驚潰追擊大破於崤底降男女八萬人餘衆尚十餘萬東走宜陽降璽書勞異曰赤眉破平士吏勞苦始雖垂翅回谿終能奮翼澠池可謂失之東隅收之桑榆方論功賞以答大勲時赤眉雖降衆寇猶盛延岑據藍田王歆據下邽芳丹據新豐蔣震據霸陵張邯據長安公孫守據長陵楊周據谷口吕鮪據陳倉角閎據汧駱蓋延據盩厔任良據鄠汝章據槐里各稱將軍擁兵多者萬餘少者數千人轉相攻擊異且戰且行屯軍上林苑中延岑既破赤眉自稱武安王拜置牧守欲據關中引張邯任良共攻異異擊破之斬首千餘級諸營保守附岑者皆來降歸異岑走攻析異遣復漢將軍鄧曄輔漢將軍丁匡要擊岑大破之降其將蘇臣等八千餘人岑遂自武關走南陽時百姓饑餓人相食黃金一斤易豆五升道路斷隔委輸不至軍士悉以果食為糧詔拜南陽趙匡為右扶風將兵助異并送縑榖軍中皆稱萬嵗異兵食漸盛乃稍誅擊豪傑不從令者褒賞降附有功勞者悉遣其渠帥詣京師散其衆歸本業威行關中唯吕鮪張邯蔣震遣使降蜀其餘悉平明年公孫述遣將程焉將數萬人就吕鮪出屯陳倉異與趙匡迎擊大破之焉退走漢川異追戰於箕谷復破之還擊破吕鮪營保降者甚衆其後蜀復數遣將間出異輒摧挫之懷來百姓申理枉結出入三歳上林成都異自以久在外不自安上書思慕闕庭願親帷幄帝不許後人有章言異専制關中斬長安令威權至重百姓歸心號為咸陽王帝以章示異異惶懼上書謝曰臣本諸生遭遇受命之會充備行伍過䝉恩私位大將爵通侯受任方面以立微功皆自國家謀慮臣無所能及臣伏自思惟以詔勑戰功每輒如意時以私心斷決未嘗不有悔國家獨見之明久而益逺乃知性與天道不可得而聞也當兵革始起擾攘之時豪傑競逐迷惑千數臣以遭遇託身聖明在傾危溷殽之中尚不敢過差而況天下平定上尊下卑而臣爵位所蒙巍巍不測乎誠冀以謹勑遂自終始見所示臣章戰慄怖懼伏念明主知臣愚性固敢因縁自陳詔報曰將軍之於國家義為君臣恩猶父子何嫌何疑而有懼意六年異朝京師引見帝謂公卿曰是我起兵時主簿也為吾披荆棘定關中既罷使中黃門賜以珍寶衣服錢帛詔曰倉卒無蔞亭豆粥虖沱河麥飯厚意久不報異稽首謝曰臣聞管仲謂桓公曰願君無忘射鉤臣無忘檻車齊國頼之臣今亦願國家無忘河北之難小臣不敢忘巾車之恩後數引讌見定議圖蜀留十餘日令異妻子隨異還西夏遣諸將上隴為隗囂所敗乃詔異軍栒邑未及至隗囂乗勝使其將王元行巡將二萬餘人下隴因分遣巡取栒邑異即馳兵欲先據之諸將皆曰虜兵盛而新乘勝不可與爭宜止軍便地徐思方畧異曰虜兵臨境忸􅏸小利遂欲深入若得栒邑三輔動揺是吾憂也夫攻者不足守者有餘今先據城以逸待勞非所以爭也潛往閉城偃旗鼓行巡不知馳赴之異乗其不意卒擊鼓建旗而出巡軍驚亂奔走追擊數十里大破之祭遵亦破王元於汧於是北地諸豪長耿定等悉畔隗囂降異上書言狀不敢自伐諸將或欲分其功帝患之乃下璽書曰制詔大司馬虎牙建威漢中捕虜武威將軍虜兵猥下三輔驚恐栒邑危亡在於旦夕北地營保按兵觀望今偏城獲全虜兵挫折使耿定之屬復念君臣之義征西功若邱山猶自以為不足孟之反奔而殿亦何異哉今遣太中大夫賜征西吏士死傷者醫藥棺斂大司馬已下親弔死問疾以崇謙讓於是使異進軍義渠并領北地太守事青山胡率萬餘人降異異又擊盧芳將賈覽匈奴薁鞬日逐王破之上郡安定皆降異復領安定太守事九年春祭遵卒詔異守征虜將軍并將其營及隗囂死其將王元周宗等復立囂子純猶總兵據冀公孫述遣將趙匡等救之帝復令異行天水太守事攻匡等且一年皆斬之諸將攻冀不能拔欲且還休兵異固持不動常為衆軍鋒明年夏與諸將攻落門未拔病發薨於軍諡曰節侯長子彰嗣明年帝思異功復封彰弟訢為析鄉侯十三年更封彰東緡侯食三縣永平中徙封平鄉侯彰卒子普嗣有罪國除永初六年安帝追惟建武元功二十八將乃下詔令條其無嗣絶世若犯罪奪國其子孫應當統後者分别署狀上於是紹封普子晨為平鄉侯明年二十八將絶國者皆紹封焉岑彭字君然南陽棘陽人也王莽時守本縣長漢兵起攻拔棘陽彭將家屬奔前隊大夫甄阜阜怒彭不能固守拘彭母妻令効功自補彭將賔客戰鬭甚力及甄阜死彭被創亡歸宛與前隊貳嚴説共城守漢兵攻之數月城中糧盡人相食彭乃與説舉城降諸將欲誅之大司徒伯升曰彭郡之大吏執心堅守是其節也今舉大事當表義士不如封之以勸其後更始乃封彭為歸徳侯令屬伯升及伯升遇害彭復為大司馬朱鮪校尉從鮪擊王莽揚州牧李聖殺之定淮陽城鮪薦彭為淮陽都尉更始遣立威王張卬與將軍徭偉鎮淮陽偉反擊走卬彭引兵攻偉破之遷潁川太守會舂陵劉茂起兵畧下潁川彭不得之官乃與麾下數百人從河内太守邑人韓歆會光武徇河内歆議欲城守彭止不聽既而光武至懷歆迫急迎降光武知其謀大怒收歆置鼓下將斬之召見彭彭因進説曰今赤眉入關更始危殆權臣放縱矯稱詔制道路阻塞四方蜂起羣雄競逐百姓無所歸命切聞大王平河北開王業此誠皇天祐漢士民之福也彭幸蒙司徒公所見全濟未有報徳旋被禍難永恨於心今復遭遇願出身自效光武深接納之彭因言韓歆南陽大人可以為用乃貰歆以為鄧禹軍師更始大將軍吕植將兵屯淇園彭説降之於是拜彭為刺姦大將軍使督察衆營授以常所持節從平河北光武即位拜彭廷尉歸徳侯如故行大將軍事與大司馬吳漢大司空王梁建義大將軍朱祐右將軍萬修執金吾賈復驍騎將軍劉植揚化將軍堅鐔積射將軍侯進偏將軍馮異祭遵王霸等圍洛陽數月朱鮪等堅守不肯下帝以彭嘗為鮪校尉令往説之鮪在城上彭在城下相勞苦歡語如平生彭因言曰彭往者得執鞭侍從蒙薦舉拔擢常思有以報恩今赤眉已得長安更始為三王所反皇帝受命平定燕趙盡有幽冀之地百姓歸心賢俊雲集親率大兵來攻洛陽天下之事逝其去矣公雖嬰城固守將何待乎鮪曰大司徒被害時鮪與其謀又諫更始無遣蕭王北伐誠自知罪深彭還具言於帝帝曰夫建大事者不忌小怨鮪今若降官爵可保況誅罰乎河水在此吾不食言彭復往告鮪鮪從城上下索曰必信可乗此上彭輒索欲上鮪見其誠即許降後五日鮪將輕騎詣彭顧勑諸部將曰堅守待我我若不還諸軍徑將兵大上轘轅歸郾王尹尊也乃面縳與彭俱詣河陽帝即解其縳召見之復令彭夜送鮪歸城明旦悉其衆出降拜鮪為平狄將軍封扶溝侯鮪淮陽人後為少府傳封累世建武二年使彭擊荆州下犨葉等十餘城是時南方猶亂南郡人秦豐據黎邱自稱楚黎王畧有十二縣董訢起堵鄉許邯起杏又更始諸將各擁兵據南陽諸城帝遣吳漢代之漢軍所過多侵暴時破虜將軍鄧奉謁歸新野怒吳漢掠其鄉里遂返擊破漢軍獲其輜重屯據淯陽與諸賊合從秋彭破杏降許邯遷征南大將軍復遣朱祐賈復及建威大將軍耿弇漢中將軍王常武威將軍郭守越騎將軍劉宏偏將軍劉嘉耿植等與彭并力討鄧奉先擊堵鄉而奉將萬餘人救董訢訢奉皆南陽精兵彭等攻之連月不剋三年夏帝自將南征至葉董訢别將將數千人遮道車騎不得前彭奔擊大破之帝至堵陽鄧奉夜逃歸淯陽董訢降彭復與耿弇賈復及積弩將軍傅俊騎都尉臧宫等從追鄧奉於小長安帝率諸將親戰大破之奉迫急乃降帝憐奉舊功臣且釁起吳漢欲全宥之彭與耿弇諌曰鄧奉背恩反逆暴師經年致賈復傷夷朱祐見獲陛下既至不知悔善而親在行陣兵敗乃降若不誅奉無以懲惡於是斬之奉者西華侯鄧晨兄之子也車駕引還令彭率傅俊臧宫劉宏等三萬餘人南擊秦豐拔黃郵豐與其大將蔡宏拒彭等於鄧數月不得進帝怪以讓彭彭懼於是夜勒兵馬申令軍中使明旦西擊山都乃緩所獲令得逃亡歸以告豐豐即悉其軍西邀彭彭乃潛兵度沔水擊其將張楊於阿頭山大破之從川谷間伐木開道直襲黎邱擊破諸屯兵豐聞大驚馳歸救之彭與諸將依東山為營豐與蔡宏夜攻彭彭豫為之備出兵逆擊之豐敗走追斬蔡宏更封彭為舞陰侯秦豐相趙京舉宜城降拜為成漢將軍與彭共圍豐於黎邱時田戎擁衆夷陵聞秦豐被圍懼大兵方至欲降而妻兄辛臣諌戎曰今四方豪傑各據郡國洛陽地如掌耳不如按甲以觀其變戎曰以秦王之疆猶為征南所圍豈況吾邪降計决矣四年春戎乃留辛臣守夷陵自將兵㳂江沂沔止黎邱刻期日當降而辛臣於後盜戎珍寳從間道先降於彭而以書招戎戎疑必賣已遂不敢降而反與秦豐合彭出兵攻戎數月大破之其大將伍公詣彭降戎亡歸夷陵帝幸黎邱勞軍封彭吏士有功者百餘人彭攻秦豐三嵗斬首九萬餘級豐餘兵裁千人又城中食且盡帝以豐轉弱令朱祐代彭守之使彭與傅俊南擊田戎大破之遂拔夷陵追至秭歸戎與數十騎亡入蜀盡獲其妻子士衆數萬人彭以將伐蜀漢而夾川谷少水險難漕運留威虜將軍馮駿軍江州都尉田鴻軍夷陵領軍李元軍夷道自引兵還屯津鄉當荆州要會喻告諸蠻夷降者奏封其君長初彭與交趾牧鄧讓厚善與讓書陳國家威徳又遣偏將軍屈充移檄江南班行詔命於是讓與江夏太守侯登武陵太守王堂長沙相韓福桂陽太守張隆零陵太守田翕蒼梧太守杜穆交趾太守鍚光等相率貢獻悉封為列侯或遣子將兵助彭征伐於是江南之珍始流通焉六年冬徴詣京師數召讌見厚加賞賜復南還津鄉有詔過家上冢大長秋以朔望問太夫人起居大長秋皇后屬官漢法列侯之母方稱太夫人八年彭引兵從車駕破天水與吳漢圍隗囂於西城時公孫述遣將李育將兵救囂守上邽帝留蓋延耿弇圍之而車駕東歸勑彭書曰兩城若下便可將兵南擊蜀虜人苦不自知足既平隴復望蜀每一發兵頭鬚為白彭遂壅谷水灌西城城未没丈餘囂將行巡周宗將蜀救兵到囂得出還冀漢軍食盡燒輜重引兵下隴延弇亦相隨而退囂出兵尾擊諸營彭殿為後拒故諸將能全師東歸彭還津鄉九年公孫述遣其將任滿田戎程汎將數萬人乗枋箄下江闗擊破馮駿及田鴻李元等遂拔夷道夷陵據荆門虎牙橫江水起浮橋闗樓立攢柱絶水道結營山上以拒漢兵彭數攻之不利於是裝直進樓船冒突露橈數千艘十一年春彭與吳漢及誅虜將軍劉隆輔威將軍臧宫驍騎將軍劉歆發南陽武陵南郡兵又發桂陽零陵長沙委輸棹卒凡六萬餘人騎五千匹皆會荆門吳漢以三郡棹卒多費糧榖欲罷之彭以蜀兵盛不可遣上書言狀帝報彭曰大司馬習用歩騎不曉水戰荆門之事一由征南公為重而已彭乃令軍中募攻浮橋先登者上賞於是偏將軍魯竒應募而前時天風狂急彭竒船逆流而上直衝浮橋而攢柱鈎不得去竒乗勢殊死戰因飛炬焚之風怒火盛橋樓崩燒彭復悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程汎而田戎亡保江州彭上劉隆為南郡太守自率臧宫劉歆長驅入江闗令軍中無得虜掠所過百姓奉牛酒迎勞彭見諸耆老為言大漢哀愍巴蜀久見虜役故興師逺伐以討有罪為民除害讓不受牛酒百姓皆大喜悦爭開門降詔彭守益州牧所下郡輒行太守事彭到江州以田戎食多難卒拔留馮駿討之自引兵乗利直指墊江攻破平曲收其米數十萬石公孫述使其將延岑吕鮪王元及其弟恢悉兵拒廣漢及資中又遣將侯丹率二萬餘人拒黃石彭乃多張疑兵使䕶軍楊翕與臧宫拒延岑等而自分兵浮江下還江州泝都江而上襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽使精騎馳廣都去成都數十里勢若風雨所至皆奔散初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大驚以杖擊地曰是何神也時彭所營地名彭亡聞而惡之欲徙會日暮蜀刺客詐為亡奴降夜刺殺彭彭首破荆門長馳武陽持軍整齊秋毫無犯卭榖王任貴聞彭威信數千里遣使迎降㑹彭已薨帝盡以任貴所獻賜彭妻子諡曰壯侯蜀人憐之為立廟武陽嵗時祀焉子遵嗣徙封細陽侯十三年帝思彭功復封遵弟淮為榖陽侯遵永平中為屯騎校尉遵卒子伉嗣伉卒子杞嗣元初二年坐事失國延光元年安帝復封杞細陽侯順帝時為光禄勲杞卒子熈嗣尚安帝妹湼陽長公主少為侍中虎賁中郎將朝廷多稱其能遷魏郡太守招聘隠逸與參政事無為而化視事二年輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶災我喜我生獨丁斯時美矣岑君於戱休兹熙卒子福嗣為黃門侍郎賈復字君文南陽冠軍人也少好學習尚書事舞隂李生李生竒之謂門人曰賈君之容貌志氣如此而勤於學將相之器也王莽末為縣掾迎鹽河東㑹遇盗賊等比十餘人皆放散其鹽復獨完以還縣縣中稱其信時下江新市兵起復亦聚衆數百人於羽山自號將軍更始立乃將其衆歸漢中王劉嘉以為校尉復見更始政亂諸將放縱乃説嘉曰臣聞圖堯舜之事而不能至者湯武是也圖湯武而不能至者桓文是也圖桓文而不能至者六國是也定六國之規欲安守之而不能至者亡六國是也今漢室中興大王以親戚為藩輔天下未定而安守所保所保得無不可保乎嘉曰卿言大非吾任也大司馬劉公在河北必能相施苐持我書往復遂辭嘉受書北渡河及光武於栢人因鄧禹得召見光武竒之禹亦稱有將帥節於是署復為破虜將軍督盗賊復馬羸帝解左驂以賜之官屬以復後來而好陵折等輩補調鄗尉光武曰賈督有折衝千里之威方任以職勿得擅除光武至信都以復為偏將軍及㧞邯鄲遷都䕶將軍從擊青犢於射犬大戰至日中賊陳堅不卻光武傳召復曰吏士皆饑可且朝飯復曰先破之然後食耳於是被羽先登所向皆靡賊乃敗走諸將咸服其勇又北與五校戰於眞定大破之復傷創甚光武大驚曰我所以不令賈復别將者為其䡖敵也果然失吾名將聞其婦有孕生女邪我子娶之生男邪我女嫁之不令其憂妻子也復尋病愈追及光武於薊相見甚歡大享士卒令復居前擊鄴賊破之光武即位拜為執金吾封冠軍侯先渡河攻朱鮪於洛陽與白虎公陳僑戰連破降之建武二年益封穰朝陽二縣更始郾王尹尊及諸大將在南方未降者尚多帝召諸將議兵事未有言沈吟久之乃以檄叩地曰郾最彊宛為次誰當擊之復率然對曰臣請擊郾帝笑曰執金吾擊郾吾復何憂大司馬當擊宛遂遣復與騎都尉隂識驍騎將軍劉植南度五社津擊郾連破之月餘尹尊降盡定其地引東擊更始淮陽太守暴汜汜降屬縣悉定其秋南擊召陵新息平定之明年春遷左將軍别擊赤眉於新城澠池間連破之與帝會宜陽降赤眉復每從征伐未嘗喪敗數與諸將潰圍解急身被十二創帝以復敢深入希令逺征而壯其勇節常自從之故復少方面之勲諸將每論功自伐復未嘗有言帝曰賈君之功我自知之十三年定封膠東侯食郁秩壯武下密即墨梃胡觀陽凡六縣復知帝欲偃干戈修文徳不欲功臣擁衆京師乃與髙密侯鄧禹並剽甲兵敦儒學帝深然之遂罷左右將軍復以列侯就第加特進復為人剛毅方直多大節既還私第闔門養威重朱祐等薦復宜為宰相帝方以吏事責三公故功臣並不用是時列侯惟髙密固始膠東三侯與公卿參議國家大事恩遇甚厚三十一年卒諡曰剛侯子忠嗣忠卒子敏嗣建初元年坐誣告母殺人國除肅宗更封復少子邯為膠東侯邯弟宗為即墨侯各一縣邯卒子育嗣育卒子長嗣宗字武孺少有操行多智畧初拜郎中稍遷建初中為朔方太守舊内郡徙在邊者率多貧弱為居人所僕役不得為吏宗擢用其任職者與邊吏參選轉相監司以擿發其姦或以功次補長吏故各願盡死匈奴畏之不敢入塞徴為長水校尉宗兼通儒術每讌見常使與少府丁鴻等論議於前章和二年卒朝廷愍惜焉子參嗣參卒子建嗣元初元年尚和帝女臨潁長公主兼食潁隂許合三縣數萬户時鄧太后臨朝光寵最盛以建為侍中順帝時為光禄勲吳漢字子顔南陽宛人也家貧給事縣為亭長王莽末以賓客犯法乃亡命至漁陽資用乏以販馬自業往來燕薊間所至皆交結豪傑更始立使使者韓鴻徇河北或謂鴻曰吳子顔竒士也可與計事鴻召見漢甚悦之遂承制拜為安樂令㑹王郎起北州擾惑漢素聞光武長者獨欲歸心乃說太守彭寵曰漁陽上谷突騎天下所聞也君何不合二郡精鋭附劉公擊邯鄲此一時之功也寵以為然而官屬皆欲附王郎寵不能奪漢乃辭出止外亭念所以譎衆未知所出望見道中一人似儒生者漢使人召之為具食問以所聞生因言劉公所過為郡縣所歸邯鄲舉尊號者實非劉氏漢大喜即詐為光武書移檄漁陽使生齎以詣寵令具以所聞説之漢復隨後入寵甚然之於是遣漢將兵與上谷諸將并軍而南所至擊斬王郎將帥及光武於廣阿拜漢為偏將軍既㧞邯鄲賜號建策侯漢為人質厚少文造次不能以辭自達鄧禹及諸將多知之數相薦舉乃得召見遂見親信常居門下光武將𤼵幽州兵夜召鄧禹問誰可使行者禹曰間數與吳漢言其人勇鷙有智謀諸將鮮能及者即拜為大將軍持節北𤼵十郡突騎更始幽州牧苗曽聞之隂勑諸郡不肯應調漢乃將二十騎先馳至無終曽以漢無備出迎於路漢即撝兵騎收曽斬之而奪其軍北州震駭城邑莫不望風弭從遂悉𤼵其兵引而南與光武㑹清陽諸將望見漢還士馬甚盛皆曰是寧肯分兵與人邪及漢至莫府上兵簿諸將人人多請之光武曰屬者恐不與人今所請又何多也請將皆慚初更始遣尚書令謝躬率六將軍攻王郎不能下㑹光武至共定邯鄲而躬裨將虜掠不相承禀光武深忌之雖俱在邯鄲遂分城而處然每有以慰安之躬勤於職事光武常稱曰謝尚書真吏也故不自疑躬既而率其兵數萬還屯於鄴時光武南擊青犢謂躬曰我追賊於射犬必破之尤來在山陽者勢必當驚走若以君威力擊此散虜必成禽也躬曰善及青犢破而尤來果北走隆慮山躬乃留大將軍劉慶魏郡太守陳康守鄴自率諸將軍擊之窮冦死戰不顧躬遂大敗死者數千人光武因躬在外乃使漢與岑彭襲其城漢先令辯士説陳康曰蓋聞上智不處危以僥倖中智能因危以成功下愚安於危以自亡危亡之至在人所由不可不察今據師敗亂四方雲擾公所聞也蕭王兵彊士附河北歸命公所見也謝躬内背蕭王外失衆心公所知也公今據孤危之城待滅亡之禍義無所立節無所成不若開門内軍轉禍為福免下愚之敗收中智之功此計之至者也康然之於是康收劉慶及躬妻子開門内漢等及躬從隆慮歸鄴不知康已反之乃與數百騎䡖入城漢伏兵收之手擊殺躬其衆悉降躬字子張南陽人初其妻知光武不平之常戒躬曰吾與劉公積不相能而信其虚談不為之備終受制矣躬不納故及於難光武北擊羣賊漢常將突騎五千為軍鋒數先登䧟陣及河北平漢與諸將奉圖書上尊號光武即位拜漢大司馬封舞陽侯建武二年春漢率大司空王梁建義大將軍朱祐大將軍杜茂執金吾賈復揚化將軍堅鐔偏將軍王霸騎都尉劉隆馬武隂識共擊檀鄉賊於鄴東漳水上大破之降者十餘萬人帝使使者璽書定封漢為廣平侯食廣平斥漳曲周廣平凡四縣復率諸將擊鄴西山賊黎伯卿等及河内修武悉破諸屯聚車駕親幸撫勞復遣漢進兵南陽擊宛湼陽酈穰新野諸城皆下之引兵南與秦豐戰黃郵水上破之又與偏將軍馮異擊昌城五樓賊張文等又攻銅馬五幡於新安皆破之眀年春率建威大將軍耿弇虎牙大將軍蓋延擊青犢於軹西大破降之又率驃騎大將軍杜茂彊弩將軍陳俊等圍蘇茂於廣樂劉永將周建别招聚收集得十萬餘人救廣樂漢將䡖騎迎與之戰不利墮馬傷膝還營建等遂連兵入城諸將謂漢曰大敵在前而公傷臥衆心懼矣漢乃勃然裹創而起椎牛享士令軍中曰賊衆雖多皆刼掠羣盗勝不相讓敗不相救非有仗節死義者也今日封侯之秋諸君勉之於是軍士激怒人倍其氣旦日建茂出兵圍漢漢選四部精兵黄頭吳河等及烏桓突騎三千餘人齊鼓而進建軍大潰反還奔城漢長驅追擊争門並入大破之茂建突走漢留杜茂陳俊等守廣樂自將兵助蓋延圍劉永於睢陽永既死二城皆降眀年又率陳俊及前將軍王梁擊破五校賊於臨平追至東郡箕山大破之北擊清河長直及平原五里賊皆平之時鬲縣五姓共逐守長據城反諸將争欲攻之漢不聼曰使鬲反者皆守長罪也敢䡖冐進兵者斬乃檄告郡使收守長而使人謝城中五姓大喜即相率而降諸將乃服曰不戰而下城非衆所及也冬漢率建威大將軍耿弇漢中將軍王常等擊富平獲索二賊於平原眀年春賊率五萬餘人夜攻漢營軍中驚亂漢堅臥不動有頃乃定即夜發精兵出營突擊大破其衆因追討餘黨遂至無鹽進擊勃海皆平之又從征董憲圍朐城眀年春㧞朐斬憲事已見劉永𫝊東方悉定振旅還京師會隗囂畔夏復遣漢西屯長安八年從車駕上隴圍隗囂於西城帝勑漢曰諸郡甲卒俱坐費糧食若有逃亡則沮敗衆心宜悉罷之漢等貪并力攻囂遂不能遣糧食日少吏士疲役逃亡者多及公孫述救至漢遂退敗十一年春率征南大將軍岑彭等伐公孫述及彭破荆門長驅入江關漢留夷陵裝露橈船將南陽兵及弛刑募士三萬人泝江而上會岑彭為刺客所殺漢并將其軍十二年春與公孫述將魏黨公孫永戰於魚涪津大破之遂圍武陽述遣子壻史興將五千人救之漢迎擊興盡殄其衆因入犍為界諸縣皆城守漢乃進軍攻廣都㧞之使輕騎燒成都市橋武陽以東諸小城皆降帝戒漢曰成都十餘萬衆不可䡖也但堅據廣都待其來攻勿與爭鋒若不敢來公轉營廹之須其力疲乃可擊也漢乗利遂將歩騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副將武威將軍劉尚將萬餘人屯於江南相去二十餘里帝聞大驚讓漢曰比勑公千條萬端何意臨事悖亂既䡖敵深入又與尚别營事有緩急不復相及賊若出兵綴公以大衆攻尚尚破公即敗矣幸無他者急引兵還廣都詔書未到述果使其將謝豐袁吉將衆十許萬分為二十營并出攻漢使别將萬餘人刼劉尚令不得相救漢與大戰一日兵敗走入壁豐因圍之漢召諸將厲之曰吾共諸君踰越險阻轉戰千里所在斬獲遂深入敵地至其城下而今與劉尚二處受圍勢既不接其禍難量欲潛師就尚於江南并兵禦之若能同心一力人自為戰大功可立如其不然敗必無餘成敗之機在此一舉諸將皆曰諾於是饗士秣馬閉營三日不出乃多樹幡旗使煙火不絶夜銜枚引兵與劉尚合軍豐等不覺眀日乃分兵拒水北自將攻江南漢悉兵迎戰自旦至晡大破之斬謝豐袁吉獲甲首五千餘級於是引還廣都留劉尚拒述具以狀上而深自譴責帝報曰公還廣都其得其宜述必不敢略尚而擊公也若先攻尚公從廣都五十里悉歩騎赴之適當値其危困破之必矣自是漢與大戰於廣都成都之間八戰八剋遂軍于其郭中述自將數萬人出城大戰漢使䕶軍髙午唐邯將數萬鋭卒擊之述兵敗走髙午奔陳刺述殺之事已見述𫝊旦日城降斬述首𫝊送洛陽眀年正月漢振旅浮江而下至宛詔令過家上冡賜榖二萬斛十五年復率揚武將軍馬成捕虜將軍馬武北擊匈奴徙鴈門代郡上谷吏民六萬餘口置居庸常關以東十八年蜀郡守將史歆反於成都自稱大司馬攻太守張穆穆踰城走廣都歆遂移檄郡縣而宕渠楊偉朐䏰徐容等起兵各數千人以應之帝以歆昔為岑彭䕶軍曉習兵事故遣漢率劉尚及太中大夫臧宮將萬餘人討之漢入武都乃發廣漢巴蜀三郡兵圍成都百餘日城破誅歆等漢乃乘桴㳂江下巴郡楊偉徐容等惶恐解散漢誅其渠帥二百餘人徙其黨與數百家於南郡長沙而還漢性彊力每從征伐帝未安恒側足而立諸將見戰陳不利或多惶懼失其常度漢意氣自若方整厲器械激揚士吏帝時遣人觀大司馬何為還言方修戰攻之具乃歎曰吳公差彊人意隱若一敵國矣每當出師朝受詔夕即引道初無辦嚴之日故能常任職以功名終及在朝廷斤斤謹質形於體貌漢常出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂盡以分與昆弟外家二十年漢病篤車駕親臨問所欲言對曰臣愚無所知識唯願陛下慎無赦而已及薨有詔悼愍賜諡曰忠侯詔發北軍五校䡖車介士送葬如大將軍霍光故事子哀侯成嗣為奴所殺二十八年分漢封為三國成子旦為灈陽侯以奉漢嗣旦弟盱為筑陽侯成弟國為新蔡侯旦卒無子國除建初八年徙封盱為平春侯以奉漢後盱卒子勝嗣初漢兄尉為將軍従征戰死封尉子彤為安陽侯帝以漢功大復封弟翕為襃親侯吳氏侯者凡五國初漁洋都尉嚴宣與漢俱㑹光武於廣阿光武以為偏將軍封建信侯蓋延字巨卿漁陽要陽人也身長八尺彎弓三百斤邊俗尚勇力而延以氣聞歴郡列掾州從事所在職辦彭寵為太守召延署營尉行䕶軍及王郎起延與吳漢同謀歸光武延至廣阿拜偏將軍號建功侯從平河北光武即位以延為虎牙將軍建武二年更封安平侯遣南擊敖倉轉攻酸棗封邱皆㧞其夏督駙馬都尉馬武騎都尉劉隆䕶軍都尉馬成偏將軍王霸等南伐劉永攻㧞襄邑進取麻鄉遂圍永於睢陽數月盡收野麥夜梯其城入永驚懼引兵走出東門延追擊大破之永棄軍走譙延進攻㧞薛斬其魯郡太守而彭城扶陽杼秋蕭皆降又破永沛郡太守斬之永將蘇茂佼彊周建等三萬餘人救永共攻延與戰於沛西太破之永軍亂遁沒溺死者大半永棄城走湖陵茂奔廣樂延遂㝎沛楚臨淮修髙祖廟置嗇夫祝宰樂人三年雎陽復反城迎劉永延復率諸將圍之百日收野榖永乏食突走延追擊盡得輜重永為其將所殺永弟防舉城降四年春延又擊蘇茂周建於蘄進與董憲戰留下皆破之因率平敵將軍龎萌攻西防㧞之復追敗周建蘇茂於彭城茂建亡奔董憲將賁休舉蘭陵城降憲聞之自郯圍休時延及龐萌在楚請往救之帝勑曰可直往𢷬郯則蘭陵必自解延等以賁休城危遂先赴之憲逆戰而陽敗延等遂逐退因㧞圍入城眀日憲大出兵合圍延等懼遽出突走因往攻郯帝讓之曰間欲先赴郯者以不意故耳今既奔走賊計已立圍豈可解乎延等至郯果不能克而董憲遂㧞蘭陵殺賁休延等往來要擊憲别將於彭城郯邳之間戰或日數合頗有剋獲帝以延䡖敵深入數以書誡之及龐萌反攻殺楚郡太守引軍襲敗延延走北度泗水破舟楫壊津梁僅而得免帝自將而東徴延與大司馬吳漢漢忠將軍王常前將軍王梁捕虜將軍馬武討虜將軍王霸等㑹任城討龐萌於桃鄉又從征董憲於昌慮皆破平之六年春遣屯長安九年隗囂死延西擊街泉略陽清水諸屯聚皆定十一年與中郎將來歙攻河池未剋以病引還拜為左馮翊將軍如故十三年増封定食萬户十五年薨於位子扶嗣扶卒子側嗣永平十三年坐與舅王平謀反伏誅國除永初七年鄧太后紹封延曽孫恢為盧亭侯恢卒子遂嗣陳俊字子昭南陽西鄂人也少為郡吏更始立以宗室劉嘉為太常將軍俊為長史光武徇河北嘉遣書薦俊光武以為安集掾從擊銅馬於清陽進至滿陽拜彊弩將軍與五校戰於安次俊下馬手接短兵所向必破追奔二十餘里斬其渠帥而還光武望而歎曰戰將盡如是豈有憂哉五校引退入漁陽所過虜掠俊言於光武曰宜令䡖騎出城前使百姓各自堅守壁以絶其食可不戰而殄也光武然之遣俊將䡖騎馳出賊前視人保壁堅完者勑令固守放散在野者因掠取之賊至無所得遂散敗及軍還光武謂俊曰困此虜者將軍策也及即位封俊為列侯建武二年春攻匡賊下四縣更封新處侯引擊頓邱降三城其秋大司馬吳漢承制拜俊為彊弩大將軍别擊金門白馬賊於河内皆破之四年轉徇汝陽及項又㧞南武陽是時太山豪傑多擁衆與張歩連兵吳漢言於帝曰非陳俊莫能定此郡於是拜俊太山太守行大將軍事張歩聞之遣其將擊俊戰於嬴下俊大破之追至濟南收得印綬九十餘稍攻下諸縣遂定太山五年與建威大將軍耿弇共破張歩事在弇𫝊時琅琊未平乃徙俊為琅琊太守領將軍如故盗賊皆解散俊將兵擊董憲於贛榆進破朐賊孫陽平之八年張歩畔還琅琊俊追討斬之帝羙其功詔俊得専征青徐俊得撫貧弱表有義檢制軍吏不得與郡縣相干百姓歌之數上書自請願奮擊隴蜀詔報曰東州新平大將軍之功也負海猾夏盗賊之處國家以為重憂且勉鎮撫之十三年増邑定封祝阿侯明年徴奉朝請二十三年卒子浮嗣徙封鄿春侯浮卒子専諸嗣専諸卒子篤嗣臧宮字君翁潁川郟人也少為縣亭長游徼後率賓客入下江兵中為校尉因從光武征戰諸將多稱其勇光武察宮勤力少言甚親納之及至河北以為偏將軍從破羣賊數陷陣卻敵光武即位以為侍中騎都尉建武二年封成安侯明年將突騎與征虜將軍祭遵擊更始將左防韋顔於沮陽酈悉降之三年將兵徇江夏擊代鄉鍾武竹里皆下之帝使大中大夫持節拜宫為輔威將軍七年更封期思侯擊梁郡濟隂皆平之十一年將兵至中盧屯駱越是時公孫述將田戎任滿與征南大將軍岑彭相拒於荆門彭等數戰不利越人謀畔從蜀宮兵少力不能制㑹屬縣送委輸車數百乗至宮夜使鋸斷城門限令車聲回轉出入至旦越人侯伺者聞車聲不絶而門限斷相告以漢兵大至其渠帥乃奉牛酒以勞軍營宮陳兵大會擊牛釃酒享使慰納之越人由是遂安宮與岑彭等破荆門别至垂鵲山通道出秭歸至江州岑彭下巴郡使宮將降卒五萬從涪水上平曲公孫述將延岑盛兵於沅水時宮衆多食少轉輸不至而降者皆欲散畔郡邑復更保聚觀望成敗宮欲引還恐為所反㑹帝遣謁者將兵詣岑彭有馬七百匹宮矯制取以自益晨夜進兵多張旗幟登山鼓譟右歩左騎挾船而引呼聲動山谷岑不意漢軍卒至登山望之大震恐宮因縱擊大破之斬首溺死者萬餘人水為之濁流延岑奔成都其衆悉降盡獲其兵馬珍寳自是乗勝追北降者以十萬數軍至平陽鄉蜀將王元舉衆降進㧞綿竹破涪城斬公孫述弟恢復攻㧞繁郫前復收節五印綬千八百是時大司馬吳漢亦乗勝進營逼成都宮連屠大城兵馬旌旗甚盛乃乘兵入小雒郭門歴成都城下至吳漢營飲酒髙㑹漢見之甚歡謂宮曰將軍向者經虜城下震揚威靈風行電照然窮寇難量還營願從他道矣宮不聼復路而歸賊亦不敢近之進軍咸門與吳漢並滅公孫述帝以蜀新定拜宮為廣漢太守十三年増邑更封酇侯十五年徴還京師以列侯奉朝請定封朗陵侯十八年拜太中大夫十九年妖巫維氾弟子單臣傅鎮等復妖言相聚入原武城刼吏人自稱將軍於是遣宮將北軍及黎陽營數千人圍之賊榖食多數攻不下士卒死傷帝召公卿諸侯王問方畧皆曰宜重其購賞時顯宗為東海王獨對曰妖巫相刼埶無久立其中必有悔欲亡者但外圍急不得走耳宜少挺緩令得逃亡逃亡則一亭長足以禽耳帝然之即勑宮徹圍緩賊賊衆分散遂斬臣鎮等宮還遷城門校尉復轉左中郎將擊武谿賊至江陵降之宮以謹信質朴故常見任用後匈奴饑疫自相分爭帝以問宮宮曰願得五千騎以立功帝笑曰常勝之家難與慮敵吾方自思之二十七年宮與揚虚侯馬武上書曰匈奴貪利無有禮信窮則稽首安則侵盗縁邊被其毒害内國憂其抵突虜今人畜疫死旱蝗赤地疫困之力不當中國一郡萬里死命縣在陛下福不再來時或易失豈宜固守文徳而墮武事乎今命將臨塞厚縣購賞喻告髙句驪烏桓鮮卑攻其左發河西四郡天水隴西羌胡擊其右如此北虜之滅不過數年臣恐陛下仁恩不忍謀臣狐疑令萬世刻石之功不立於聖世詔報曰黄石公記曰柔能制剛弱能制彊柔者徳也剛者賊也弱者仁之助也彊者怨之歸也故曰有徳之君以所樂樂人無徳之君以所樂樂身樂人者其樂長樂身者不久而亡舎近謀逺者勞而無功舎逺謀近者逸而有終逸政多忠臣勞政多亂人故曰務廣地者荒務廣徳者彊有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復欲逺事邊外乎孔子曰吾恐季孫之憂不在顓臾且北狄尚彊而屯田警備傳聞之事恒多失實誠能舉天下之半以滅大寇豈非至願茍非其時不如息人自是諸將莫敢復言兵事者宮永平元年卒諡曰愍侯子信嗣信卒子震嗣震卒子松嗣元初四年與母别居國除永寧元年鄧太后紹封松弟由為朗陵侯通志卷一百五
