body:
  text: 通志卷七十五宋右迪功郎鄭樵漁仲撰昆蟲草木略第一序草類蔬類稻粱類序學者操窮理盡性之説以虛無為宗實學置而不問仲尼時已有此患曰小子何莫學夫詩興觀羣怨事父事君多識於鳥獸草木之名其曰小子者無所識之辭也其曰何莫者苦口之辭也故又曰人而不為周南召南其猶正牆面而立此苦口之甚也一部論語言他書不過一再惟詩則言之又言凡十二度言焉門弟子有能學詩者則深喜之子貢子夏在孔門未為高弟至於論詩則與之至子夏又發起豫之歎者深嘉之也夫樂之本在詩詩之本在聲竊觀仲尼初亦不達聲至哀公十一年自衛反魯質正於太師氏而後知之故曰吾自衛反魯然後樂正雅頌各得其所此言詩為樂之本而雅頌為聲之宗也其曰師摯之始關雎之亂洋洋乎盈耳哉此言其聲之盛也又曰關雎樂而不淫哀而不傷此言其聲之和也人之情聞歌則感樂者聞歌則感而為淫哀者聞歌則感而為傷惟關雎之聲和而平樂者聞之而樂其樂不至於淫哀者聞之而哀其哀不至於傷此關雎所以為美也緣漢人立學官講詩專以義理相傳是致衛宏序詩以樂為樂得淑女之樂淫為不淫其色之淫哀為哀窈窕之哀傷為無傷善之傷如此説關雎則洋洋盈耳之旨安在乎臣之序詩於風雅頌曰風土之音曰風朝廷之音曰雅宗廟之音曰頌而不曰風風者教也雅者正也言王政之所由廢興也頌者美盛德之形容也於二南則曰周為河洛召為岐雍河洛之南瀕江岐雍之南瀕漢江漢之間二南之地詩之所起在於此屈宋以來騷人墨客多生江漢故仲尼以二南之地為作詩之始而不曰南言化自北而南於王黍離豳七月則曰王為王城東周之地豳為豳豐西周之地七月者西周之風黍離者東周之風而不曰黍離降國風臣之序詩專為聲歌欲以明仲尼之正樂臣之釋詩深究鳥獸草木之名欲以明仲尼教小子之意然兩漢之言詩者惟儒生論義不論聲而聲歌之妙猶傳於瞽史經董卓赤眉之亂禮樂淪亡殆盡魏人得漢雅樂朗僅能歌文王鹿鳴騶虞伐檀四篇而已太和之末又亡其三惟有鹿鳴至晉又亡自鹿鳴亡後聲詩之道絶矣夫詩之本在聲而聲之本在興鳥獸草木乃發興之本漢儒之言詩者既不論聲又不知興故鳥獸草木之學廢矣若曰關關雎鳩在河之洲不識雎鳩則安知河洲之趣與關關之聲乎凡鴈鶩之類其喙𥚹者則其聲關關雞雉之類其喙鋭者則其聲鷕鷕此天籟也雎鳩之喙似鳬鴈故其聲如是又得水邊之趣也小雅曰呦呦鹿鳴食野之蘋不識鹿則安知食蘋之趣與呦呦之聲乎凡牛羊之屬有角無齒者則其聲呦呦駝馬之屬有齒無角者則其聲蕭蕭此亦天籟也鹿之喙似牛羊故其聲如是又得蔞蒿之趣也使不識鳥獸之情狀則安知詩人關關呦呦之興乎若曰有敦瓜苦蒸在栗薪者謂瓜苦引蔓於籬落間而有敦然之繫焉若曰桑之未落其葉沃若者謂桑葉最茂雖未落之時而有沃若之澤使不識草木之精神則安知詩人敦然沃若之興乎陸璣者江左之騷人也深為此患為毛詩作鳥獸草木蟲魚疏然璣本無此學但加採訪其所傳者多是支離自陸璣之後未有以此明詩者惟爾雅一種為名物之宗然孫炎郭璞所得既希張揖孫憲所記徒廣大抵儒生家多不識田野之物農圃人又不識詩書之旨二者無由參合遂使鳥獸草木之學不傳惟本草一家人命所係凡學之者務在識真不比他書只求説也神農本經有三百六十以應周天之數陶𢎞景隱者也得此一家之學故益以三百六十以應周天之數而兩之臣少好讀書無涉世意又好泉石有慕𢎞景心結茅夾漈山中與田夫野老往來與夜鶴曉猿雜處不問飛潛動植皆欲究其情性於是取陶隱居之書復益以三百六十以應周天之數而三之已得鳥獸草木之真然後傳詩已得詩人之興然後釋爾雅今作昆蟲草木略為之會同庶幾衰晚少備遺忘豈敢論實學也夫物之難明者為其名之難明也名之難明者謂五方之名既已不同而古今之言亦自差别是以此書尤詳其名焉草類芝曰菌其類有五色加以紫是為六芝青曰龍芝赤曰丹芝黃曰金芝白曰玉芝黑曰元芝紫曰木芝瑞草也生則有雲氣及禽獸之異蓍如蒿華如菊生上蔡白龜祠旁一叢之幹二三十或四五十髙五六尺禇先生云蓍滿百莖者其下有神龜守之其上有青雲以覆之傳曰天下和平王道得蓍莖長丈叢滿百蘭即蕙蕙即薰薰即零陵香楚辭云滋蘭九畹植蕙百畝互言也古方謂之薰草故名醫别録出薰草條近方謂之零陵香故開寶本草出零陵香條神農本經謂之蘭臣昔修本草以二條貫於蘭後明一物也臣謹案蘭舊名煎澤草婦人和油澤頭故以名焉南越志云零陵香一名燕草又名薰草即香草生零陵山谷今湖嶺諸州皆有又别録云薰草一名蕙草明薰蕙之為蘭也以其質香故可以為膏澤可以塗宫室近世一種草如茅葉而嫩其根謂之土續斷其花馥郁故得蘭名誤為人所賦詠芎藭曰胡藭曰香果關中者曰京藭蜀道者曰川芎其葉曰蘼蕪亦曰蘄茝故爾雅蘄茝蘼蕪亦曰茳蘺以其芬香故多蒔於園庭苖似芹胡荽蛇牀輩故淮南子云亂人者若芎藭之與藁本蛇牀之與蘼蕪也蛇牀曰蛇粟曰蛇米曰虺牀曰思益曰繩毒曰棗棘曰牆蘼曰旴曰馬牀爾雅所謂盱虺牀也花白子如黍粒葉似芎藭而細亦香故有牆蘼之名焉茜亦作蒨可以染緋故曰地血亦曰茹蘆曰茅搜齊人謂之茜徐人謂之牛蔓詩所謂茹藘在阪爾雅所謂茹藘茅搜莖葉粗澀而根紅故許愼謂人血所生周禮庶氏掌除蟲毒以嘉草攻之陳藏器以蘘荷與茜為嘉草杜若曰杜蘅曰杜連曰白蓮曰白苓曰若芝曰楚衡根葉似山薑花似豆蔲騷人多取喻焉故楚詞云山中人兮芳杜若九歌云採芳洲兮杜若又離騷云雜杜蘅與芳芷唐貞觀中勑下度支求杜若省郎以謝元暉詩云芳洲採杜若乃責坊州貢之當時以為嗤笑決明曰芵茪曰菱關西曰薢茩故爾雅云薢茩芵茪共有三種其一則山決明也相似而不可食其二曰馬蹄決明實似馬蹄尤良天名精曰麥句薑曰蝦蟇藍曰豕首曰天門精曰彘顱曰蟾蜍蘭曰覲曰茢薽曰豨首曰天蔓精曰鹿活草曰劉㦎草爾雅云茢薽豕首俗曰豨蘞又云火杴又云地菘異苑云宋元嘉中青州劉㦎射中一麞既剖五藏以此草塞之蹶然而起去之則仆如此者三是以知其治折傷故其草得劉㦎之名莵絲曰莵蘆曰莵縷曰唐蒙曰玉女曰赤網曰莵纍曰女羅爾雅曰唐蒙女蘿女蘿莵絲又曰蒙玉女詩曰蔦與女蘿施于松上草經曰蔓延草木之上色黃而細曰赤網色淺而大曰莵纍淮南子注云莵絲生茯苓上故世言下有茯苓上有莵絲又言莵絲初生之根其形似兔掘取割其血和丹服之立變化今皆不然茯苓生山谷莵絲生人間清濁異趣何由同居薊曰虎薊曰刺薊曰山牛蒡爾雅蘻狗毒蘻即薊也又有一種小薊曰貓薊曰青刺薊北方曰千針草以其莖葉多刺故也華如紅藍華而青紫色多生於燕地故曰薊門垣衣曰昔邪曰烏韭曰垣嬴曰天韭曰鼠韭有數種生於屋上曰屋遊生於屋隂曰垣衣在石上謂之烏韭在地上謂之地衣在井中謂之井中苔在牆上抽起茸茸然者謂之土馬騣生於水中謂之陟釐水中苔也生海中者可食又有生於石上連緣作暈者謂之石花石花生於海中石上謂之紫䓴即紫菜也松上之衣曰艾納香以和香燒則煙氣直上海藻類紫䓴而粗惡曰落首曰藫曰石衣曰海蘿爾雅云藫石衣郭氏云石髮也又云􅙛海薻郭氏云如亂髮其説無别致誤後人引據且藫與􅙛藻與薻皆無異義何得為二物海藻形如弊衣石髮形如亂髮自是二物凡此之類易得渾殽又有石帆之於水松亦能相亂故陶𢎞景云石帆如柏療石淋水松如松療溪毒吳都賦所謂石帆水松是也又有海帶似帶昆布似布爾雅云綸似綸組似組東海有之綸即鹿角菜組即海中苔藻生乎水中萍生乎水上萍之名類亦多易相紊也爾雅云蘋萍其大者蘋又云蘋藾蕭足以惑人蓱者水中浮萍也江東謂之薸是也蘋水菜也葉似車前詩所謂于以采蘋是也蘋蔞蒿也即藾蕭詩所謂呦呦鹿鳴食野之蘋是也按萍亦曰水花亦曰水白肉蓯蓉曰肉松容舊曰馬精化為蓯蓉人血化為茹藘故蓯蓉生於沙中在西方多馬處然亦有生於大木間及土塹上者地膚曰地葵曰地麥曰益明曰落帚子曰鴨舌即獨掃也亦曰地掃爾雅云荓馬帚即此也今人亦用為帚蒺䔧曰旁通曰屈人曰止行曰豺羽曰升推曰即䔧曰茨故爾雅謂茨蒺䔧詩謂牆有茨也其實有芒刺行軍之家以鐵象之而布地焉又有白蒺䔧者同名而異實防風曰銅藝曰茴草曰百枝曰屛風曰蕳根曰百蜚葉如青蒿嫩苖可茹石龍芻曰龍須曰草續斷曰龍朱曰龍華曰懸莞曰草毒曰方賔爾雅所謂鼠莞也生被崖垂下故得龍須之名可以為席絡石曰石鯪曰石蹉曰略石曰明石曰領石曰懸石如薜荔而小絡石以生千嵗藟曰藟蕪陸璣云一名巨苽連蔓而生幽州人謂之推纍此草藤生大者盤礴故有千嵗藟之名唐薑撫言服常春藤使白髮還鬒明皇使取以賜中朝老臣又言終南山有旱藕食之延年狀類葛粉帝作湯餅以賜大臣右驍騎將軍甘守誠能名藥石曰常春藤者千嵗藟也旱藕者牡蒙也黃連曰王連曰支連沙參葉如枸杞根如葵曰苦心曰志取曰虎須曰白參曰識美曰文希亦曰知母而得五參之名丹參葉如薄荷花如蘇曰却蟬草曰赤參曰木羊乳曰山苓本草作參曰奔馬俗謂之逐馬言驅風之駃也赤箭曰離母曰鬼督郵曰合離曰獨搖曰定風有風不動無風自搖蘠蘼曰滿冬曰地門冬曰筵門冬在東嶽名淫羊霍抱朴子作淫羊食在中嶽名天門冬在西嶽名管松在北嶽名無不愈在南嶽名百部在京陸山阜名顛棘今曰天門冬爾雅蘠蘼虋冬葉如絲縷禹葭曰禹餘糧曰烏韭曰㸑火冬曰忍冬曰忍陵曰不死藥曰僕壘曰隨脂秦名羊韭齊名愛韭楚名馬韭越名羊蓍今曰麥門冬其葉如韭所以多得韭名山薊曰术爾雅术山薊蒼术也枹薊曰楊爾雅楊枹薊有兩種赤术白术也生平地曰薊生山中曰术曰山連亦曰山精亦曰天蘇亦曰山芥亦曰乞力伽曰華子作吃力伽萎㽔曰熒曰地節曰玉竹曰馬薰曰黃芝曰玉女萎黃精曰重樓曰兔竹曰雞格曰救窮曰鹿竹曰龍銜曰萎蕤曰狗格本草作茍格曰埀珠曰馬箭曰白及陶𢎞景謂似鈎吻非也似蘘荷苄曰芑地黃也􅀢曰屋菼曰起實交州曰􅗰珠薏苡也芣苡曰當道曰蝦蟇衣曰牛遺曰勝舄曰馬舄車前也昌陽曰堯韭菖蒲也蕀蒬曰葽繞曰細草葉曰小草逺志也蕍曰蕮曰藚曰芒芋曰鵠㵼曰及㵼澤㵼也詩云言采其藚爾雅云蕍蕮薯蕷曰山蕷曰修脆曰薯蕷曰兒草秦楚名玉延鄭越名土薯齊名山芋菊花曰日精曰節華曰女節曰女華曰女莖曰更生曰周盈曰傅延年曰隂成曰治蘠其白花者潁川曰回峯汝南曰茶苦蒿河內曰地薇蒿上黨曰羊歡草甘草曰蕗草曰蜜甘曰美草或曰大苦即此也凡草屬惟甘草為國老大黃為將軍不言君臣佐使也茺蔚曰益母曰益明曰大札曰貞蔚曰萑曰負簷曰夏枯曰鬱臭草曰苦低草曰蓷葉似荏方莖白華詩所謂中谷有蓷也人參曰人銜曰鬼蓋曰神草曰人微曰土精曰血參如人形者則神故多得人名朝鮮之人贊云三丫五葉背陽向隂欲來求我椵樹相尋石斛曰林蘭曰禁生曰杜蘭曰石蓫生于隂崖莖如叉股其生于櫟者木斛石斛之莖如金叉故謂之金叉牛膝之節如牛膝故謂之牛膝卷柏曰萬嵗曰豹足曰求股曰交時葉如柏狀如雞足生於隂崖細辛曰小辛曰細草而世以杜蘅亂其真獨活曰羌青曰護羌使者曰胡王使者曰獨搖草得風不搖無風自動雖與羌活異條而亦曰羌活升麻曰周麻曰落新婦茈胡曰地薰曰山菜曰茹草葉曰藝蒿辛香可食生於銀夏者芬馨之氣射於雲間多白鶴青鶴翺翔其上防葵曰梨蓋曰旁慈曰爵離曰農果曰利茹曰方蓋而狼毒能亂其真菴䕡狀如蒿艾駏驉食之仙白蒿即茵陳蒿白兔食之仙菥蓂曰薎析曰大蕺曰馬辛爾雅曰姚莖塗薺又曰菥蓂大薺以似薺而大也龍膽曰陵遊莖如小竹根似牛膝王不留行曰禁宫花曰翦金花葉似槐實作房茵陳蒿南人所用者似香薷北人所用者似青蒿即白蒿也南北所用俱有山茵蔯之名同名異實又有石香葇亦名山茵蔯而香薷亦名茵陳四種足相紊也漏蘆曰野蘭而飛廉曰漏蘆亦能相紊飛廉曰漏蘆曰天薺曰伏豬曰飛輕曰伏兔曰飛雉曰木禾似苦芙而葉下附莖有皮起似箭羽刻缺牆薇曰營實曰牆牀本草作牆麻曰牛棘曰牛勒曰薔蘼曰山棘薇銜曰承膏曰承肌曰無心曰無顚曰鹿銜曰吳風草葉似茺蔚叢生有毛五味子曰菋曰荎藸故爾雅云菋荎藸引蔓實如珠而赤旋花曰鼓子花曰筯根花曰金沸曰美草曰肫腸草蔓生花不作瓣故謂之旋也此草一名金沸而旋覆花亦名金沸旋花正謂之葍旋旋覆正謂之旋復易相紊也然方家所用者葍旋用根旋復用花白莵藿曰白葛蔓生葉圓如蓴鬼督郵曰獨搖草莖如箭簳葉如繖蓋花生葉心根橫而不生須徐長卿赤箭俱有鬼督郵之名而實異藍有三種蓼藍如蓼染緑大藍如芥染碧槐藍如槐染青三藍皆可作澱色成勝母故曰青出於藍而青於藍景天曰戒火曰火母曰救火曰據火曰愼火今人皆謂之愼火草植弱而葉嫩種之階庭能辟火續斷曰龍豆曰屬折曰接骨曰南草曰槐曰大薊曰馬薊蜀本圖經云莖方葉似苧花似益母根如大薊此北續斷也范汪云即馬薊也與小薊相似葉如蒡翁菜兩邊有刺花紫會稽者正爾此南續斷也雲實曰員實曰雲英曰天豆曰馬豆曰臭草曰羊石子葉如苜蓿花黃白莢如大豆實若大麻能殺精物燒之致鬼黃耆有白水耆赤水耆木耆三種其莖葉曰戴糝曰戴椹曰芰草曰蜀脂曰百本曰王孫徐長卿曰别仙蹤曰鬼督郵苖如小麥子似蘿摩薜曰山蘄曰白蘄曰乾歸曰文無爾雅謂薜山蘄又謂薜白蘄即當歸也葉似芎藭有兩種大葉者謂之馬尾當歸細葉者謂之蠶頭當歸此方家之别也鋋曰何離曰解倉曰犁食曰餘容曰白术即芍藥也以有何離之名所以贈别用焉古今言木芍藥是牡丹崔豹古今注云芍藥有二種有草芍藥有木芍藥木者花大而色深俗呼為牡丹非也安期生服鍊法云芍藥有二種有金芍藥有木芍藥金者色白多脂木者色紫多脈此則驗其根也然牡丹亦有木芍藥之名其花可愛如芍藥宿枝如木故得木芍藥之名芍藥著於三代之際風雅之所流詠也牡丹初無名故依芍藥以為名亦如木芙蓉之依芙蓉以為名也牡丹晚出唐始有聞貴遊趨競遂使芍藥為落譜衰宗藁本曰鬼卿曰地新曰微莖葛曰雞齊根曰鹿藿曰黃斤而蔨亦謂之鹿藿知母曰蚳母曰連母曰野蓼曰地參曰水參曰水浚曰貨母曰蝭母曰女雷曰女理曰兒草曰鹿列曰韭逢曰兒踵草曰東根曰水須曰莐藩曰􅙛曰昌支爾雅曰􅙛莐藩貝母曰空草曰藥實曰苦花曰苦菜曰啇草曰勤母曰􅔾爾雅曰􅔾貝母詩云言采其虻栝樓曰地樓曰果裸曰天瓜曰澤姑曰白藥其實曰黃瓜詩云果裸之實爾雅云果裸之實栝樓元參曰重臺曰元臺曰鹿腸曰正馬曰咸曰端曰逐馬曰馥草苦參曰水槐曰苦􅀢曰地槐曰莵槐曰驕槐曰白莖曰虎麻曰岑莖曰祿白曰陵郎石龍芮曰魯果能曰地椹曰石能曰彭根曰天豆沈括云有兩種水中生者葉光而末圓陸生者葉毛而末鋭石韋曰石䩾曰石皮生於石崖其生瓦上者曰瓦韋皆感隂濕而生每莖抽一葉背有毛而斑點其狀如皮故得韋名狗脊曰百枝曰強膂曰扶蓋曰扶筋葉類蕨根類菝葜萆薢萆薢曰赤節菝葜曰金剛根謂其根堅曰王瓜草謂其苖葉與王瓜相近通草曰附支曰丁翁曰王翁萬年方書亦謂之木通爾雅曰離南活莌以活莌亦謂之離南今人謂之通草其瓤白可愛婦人取以為首飾其實曰燕􅦣子曰烏􅦣曰桴棪子曰拏子瞿麥曰巨句麥曰大菊曰大蘭曰茈萎曰杜母草曰燕麥曰蘥麥曰雀麥曰石竹故爾雅云大菊蘧麥其葉細嫩花如錢可愛唐人多像此為衣服之飾所謂石竹繡羅衣敗醬曰鹿腸曰鹿首曰馬草曰澤敗曰鹿醬葉似狶蘞根似柴胡作敗醬氣故以得名澤芬曰白芷曰白茝曰􅀢曰莞曰苻蘺楚人謂之藥其葉謂之蒚麻與蘭同德俱生下濕故蘭茝之香為騷人所諷詠杜蘅曰杜曰土鹵能香人衣體南人以亂細辛其葉似馬蹄故亦名馬蹄香爾雅云杜土鹵白薇曰白幕曰薇草曰春草曰骨美葈耳曰苓耳曰羊負來曰唱起草曰白胡荽江東曰常葈幽州曰爵耳爾雅菤耳苓耳舊説即蒼耳也其實似鼠耳而有澀刺易黏人衣中原本無此草因羊自蜀來其實帶毛而至故有羊負來之名然詩云采采卷耳以其可茹也即今卷菜葉如連錢者是也若蒼耳但堪入藥不可食茅之根曰蘭根曰姑根曰地筋曰兼杜茅之類甚多惟白茅擅名其苖初出地者曰茅針爾雅云蒤委葉詩云以薅荼蓼皆謂茅針也茅之花曰茅秀爾雅蔈荂荼是也茅之葉如菅故亦名地菅詩云白茅菅兮又云露彼菅茅強瞿曰重邁曰中庭曰重箱曰摩羅曰中逢花即百合也俗呼強瞿根如葫蒜根美食花美觀舊云蚯蚓化成有二種白花者良其紅花者一名山丹一名連珠俗呼川強瞿莖上抽花葉間結子酸漿曰寒漿曰醋漿江東曰苦葴俗謂之三葉酸漿沈括云即苦耽也其實如撮口袋中有珠子熟則紅關中謂之洛神珠亦曰王母珠亦曰皮辨草以其實又似辨也又有一種小者名苦蘵牡蒙曰衆戎曰童腸曰馬行即紫參也唐明皇令方士薑撫採終南山之旱藕作湯餅賜大臣者即此草根也淫羊霍曰剛前曰黃連祖曰千兩金曰乾雞筯曰放杖草曰棄杖草關中曰三枝五葉草舊云西川北部有淫羊食此草一日百交今通謂之仙靈脾蠡實曰荔實曰劇草曰三堅曰豕首曰馬薤即馬藺子也北人呼為馬棟子江東呼為旱蒲多植於階庭説文云荔似蒲而小根可作刷月令云荔挺生欵冬曰槖吾曰顆東曰虎須曰莵奚曰氐冬藥家用花如枇杷舊云花冬月在氷下生緣此花傍莖近根生故在氷下爾雅以顆東為顆凍注又以欵冬作欵凍牡丹曰鹿韭曰鼠姑宿枝其花甚麗而種類亦多諸花皆用其名惟牡丹獨言花故謂之花王文人為之作譜記此不復區别然今人貴牡丹而賤芍藥獨不言牡丹本無名依芍藥得名故其初曰木芍藥古亦無聞至唐始著澤蘭曰虎蘭曰龍棗曰虎蒲曰水香曰都梁香如蘭而莖方葉不潤生於水中故曰水香荆州記都梁縣有山山下有水清淺其中生蘭草因以為名馬蘭生澤傍如澤蘭氣臭楚辭所喻惡草即此也王孫曰黃孫曰黃昏曰海孫曰蔓延又楚曰王孫齊曰長孫方家謂之牡蒙百部曰婆婦草能去諸蟲可以殺蠅蠓其葉似薯蕷根似天門冬故天門冬亦有百部之名二物足以相紊王瓜曰土瓜曰􅀈姑曰鉤􅕕曰菲芴均房間曰老鴉瓜又曰莵瓜其根可生食類瓜故得瓜名月令王瓜生即此也而鄭元以為菝葜誤矣爾雅言鉤􅀈姑郭云鉤􅕕一名王瓜是矣又言菲芴又言蔩莵瓜皆謂此也薺苨之根能亂人參而解藥毒以其與毒藥共處而毒皆自然歇爾雅曰氷臺莵葵曰天葵又曰莃莵葵雷公炮炙所用紫背天葵是矣葉如錢而厚嫩背微紫生於崖石凡丹石之類得此而後能神所以雷公一書汲汲於天葵恨世人不識之臣近得之於天台僧鱧腸曰蓮子草曰旱蓮子曰金陵草生園圃葉似柳莖似馬齒莧其蓮翹亦曰旱蓮植於庭院其花可愛非鱧腸也蒟醬曰浮留劉淵林蜀都賦注云蒟醬緣木而生其子如桑椹熟時正青以蜜藏而食之辛香生巴蜀嶺南司馬相如使蜀而求之也其狀似蓽撥故有土蓽撥之號今嶺南人但取其葉及藤合檳榔食之謂之蓼而不用其實蘿摩曰芃蘭曰苦丸幽州人曰雀瓢東人曰白環藤可作菜茹能補精益氣故諺云去家千里莫食蘿摩狗杞剪草之根曰白藥蘹香即茴香鬱金即薑黃周禮鬱人和鬱鬯注云煮鬱金以和鬯酒又云鬱為草若蘭今之鬱金作燖潘臭其若蘭之香乃鬱金香生大秦國花如紅藍花四五月採之即香陳藏器謂説文云鬱芳草也十葉為貫捋以煮之用為鬯為百草之英合而釀酒以降神也然大秦國去長安四萬里至漢始通不應三代時得此草也或云鬱金與薑黃自别亦芬馨恨未識耳紅藍亦曰黃藍蓽澄茄亦曰毗陵茄子蓬莪茂似薑黃而不黃廉薑似山薑而根大一名葰胡黃連似黃連而心黑一名割孤露澤大黃曰黃良常山曰互草桔梗曰利如曰房圖曰白藥曰梗草曰薺苨以其能亂薺苨故亦有其名葉曰隱忍甘遂曰甘藁曰陵藁曰陵澤曰重澤曰主田曰葶藶曰丁藶曰蕇蒿曰狗薺曰大室曰大適爾雅蕇亭歷大戟曰卭巨曰女术曰蕎曰髦爾雅髦顛棘其苖曰澤漆曰漆莖旋覆花曰金沸草曰戴椹曰盛椹曰盜庚爾雅蕧盜庚似菊俗呼金錢花鉤吻曰除辛曰毒根折之青煙出者名固活即野葛也藜蘆曰蔥苒曰蔥菼曰山蔥曰蔥葵曰豐蘆曰蕙葵赭魁俗呼禹餘糧葉如薯蕷根如何首烏儉嵗人採之以療飢陳藏器謂禹會諸侯棄糧於地化為此草芨爾雅云堇草即烏頭也其類即别而説者紛紜初種之毋曰烏頭如芋魁是也其形似烏鳥之首故以為名兩岐如鳥開口者曰烏喙亦取其似也烏頭傍生者為附子附子傍生者為側子烏頭不生附子者為天雄極長大故草經云長三寸以上也蜀人種之最忌生此草經云春採為烏頭冬採為附子廣雅又云一嵗為側子二嵗為烏喙三嵗為附子四嵗為烏頭五嵗為天雄今皆不然但一嵗下種而有此五物皆以冬至前布種至八月採出於蜀中而綿州彰明縣猶多附子為百藥之長一名奚毒世以烏頭天雄附子為三建者以此三物舊皆出建平故也又宜都佷仙者謂之西建殊佳錢塘間者謂之東建不及故曰西氷猶勝東白烏頭曰奚毒曰即子曰茛曰堇曰千秋曰毒公曰果負曰耿子取其汁日煎為膏曰射罔射生者以傳矢慘毒羊躑躅曰玉支茵芋曰莞草曰卑共射干曰烏扇曰烏蒲曰烏翣曰烏吹曰草薑曰鳯翼射亦作夜射干有三物佛書云射干貂􅀈乃是惡獸似青黃狗食人荀子云西方有木名射干莖長四寸生於髙山之上而臨百仞之淵其花白莖長似射人執竿故阮公詩云射干臨層城此則草類狀如鹿蔥葉稍大邪張作扇如翅狀故有烏扇烏翣鳯翼之名貫衆曰貫節曰貫渠曰百頭曰虎卷曰扁苻曰伯萍曰藥藻曰濼曰草鴟頭爾雅云濼貫衆半夏曰守田曰地文曰水玉曰示姑莨菪曰橫塘曰行塘其實作小罌子謂之天仙子常山曰互草青葙曰草蒿曰萋蒿曰草藁花似後庭花實如莨菪子俗呼牛尾蒿其主療與決明子同故亦有草決明之名牙子曰狼牙曰狼子曰犬牙今皆謂之狼牙子以其根之萌若獸牙也葉似蛇莓而大白斂曰莵核曰白草曰白根曰崑崙藤生葉如小桑根如雞卵白芨曰甘根曰連及葉如初生栟櫚根如菱米蛇全曰蛇銜曰威蛇曰小龍牙草蒿曰方潰曰菣江東曰犱蒿即青蒿也爾雅云蒿菣雚菌曰雚蘆生於蘆葦中云鸛矢所化故曰鸛菌連翹曰異翹曰蘭華曰折根曰軹曰三廉曰連苕曰連草爾雅云連異翹即旱蓮也葉似當歸華似菡蓞白頭翁曰野丈人曰胡王使者曰奈何草狀似白薇葉生莖端上有白毛近根處有白茸正似垂白之翁䕡茹曰屈據曰離婁葉似大戟根如蘿葍黃色初斷時汁出凝黑如漆故云漆頭羊桃詩曰萇楚爾雅曰銚弋亦曰鬼桃曰羊腸曰御弋葉花似桃子如棗核劎南人名細子根羊蹄曰東方宿曰連蟲陸曰牛蘈曰菲詩曰言采其蓫爾雅曰菲蒠菜又曰藬牛蘈今人呼為秃菜蓫禿音訛耳鹿藿爾雅曰蔨鹿藿其實莥田野呼為鹿豆藎草曰菉蓐曰王芻曰鴟腳莎爾雅曰菉王芻又曰竹萹蓄詩云緑竹猗猗即此是也今人謂之萹竹葉似竹而細薄荆襄人煮以染黃極鮮麗故草經云可染黃作金色夏枯草曰夕句曰乃東曰燕面蚤休曰蚩休曰螫休曰重樓金線曰重臺曰草甘遂今人謂之紫河車服食家所用而莖葉亦可愛多植庭院間虎杖曰枯杖曰苦杖曰大蟲杖曰酸杖曰斑杖曰蒤故爾雅曰蒤虎杖莖葉斑赤似馬蓼而無毛鼠尾草曰葝曰陵翹曰烏草曰水青可以染皂爾雅葝鼠尾苧野生者曰薜爾雅云薜山麻菰曰蓬今人謂之茭爾雅曰齧雕蓬薦黍蓬雕蓬者米茭也其米謂之雕胡可作飯故曰齧黍蓬者野茭也不能結實惟堪薦藉故曰薦葑菰根也亦名須故爾雅曰須葑蓯又名蓯焉劉寄奴曰金寄奴即烏藤菜故江東人云烏藤菜劉寄奴因宋武帝而得名帝微時伐荻薪洲遇大蛇射之明日往見羣兒搗藥問之乃曰我王為劉寄奴所射今搗此藥傅之帝呵之羣兒忽不見遂收其藥還以傅金瘡無不愈者帝姓劉小名寄奴江南人姓劉者或呼為金是以又有金寄奴之名牽牛子曰草金鈴曰盆甑草陶𢎞景云以療水腫有功田野人牽牛以易之故得名豬膏莓曰虎膏曰狗膏亦曰狶蘞能亂天名精葎曰來莓草曰葛􅀢蔓葉似萆麻子似大麻獨行根曰雲南根曰兜零根山南人謂之土青木香其實曰馬兜零狼毒曰續壽藥家以此與麻黃橘皮吳茱萸半夏枳實為六陳鬼臼曰雀犀曰馬目毒公曰九臼曰天臼曰解毒葉如荷葉形似鳥掌年長一莖莖枯則根為一臼服食家用之以九臼相連者為佳亦名八角盤以其葉然也蘆爾雅曰葭蘆又曰蒹葭又曰菼薍蘆之大者曰葭小者曰荻蒹即荻也可為簾箔故曰蒹其小而實者曰葦菼即葦也其萌曰虇虇蘆筍也其榮曰芀芀蘆花也故曰葦醜芀亦謂之葭故曰葭華萹蓄即篇竹也衛風云緑竹猗猗緑藎草竹萹蓄酢漿草曰醋母草曰鳩酸草曰小酸茅南人曰孫施去銅鍮垢啇陸曰蓫薚曰䓪根曰夜呼曰馬尾曰莧陸曰章陸曰章柳根曰葍曰葍詩云言采其葍爾雅云葍葍又云蓫薚馬尾皆此也或言爾雅拜商藋亦為此耳根如人形者有神道家以為脯謂之鹿脯有赤白二種白者服食所須赤者爾雅謂之藑茅灰藋曰金瑣天葉心有粉如鹽而不鹹灰藋與藜亦是同類但藜大可為杖也瓦松曰昨葉何草骨碎補曰石菴䕡曰骨碎布曰石毛薑江南曰胡孫薑根著木石上有毛葉如菴䕡俗呼猴薑唐明皇以其主折傷補骨碎有竒功故賜名雀麥曰蘥曰燕麥曰牡姓草似麥而小故得其名天南星曰鬼蒟蒻而有毒蒟其實曰蒟蒻生於葉下與天南星班杖相似其根生時可為糊黏熟之可食續隨子曰拒冬曰千金子曰聯步曰千兩金曰菩薩豆人家多種於園亭其花似大戟秋種冬長春秀夏實榖精草生於榖田中亦曰戴星草欲人早耕也列當曰栗當曰草蓯蓉生巖石上根如藕能亂蓯蓉威靈仙曰能消惡聞水聲能治痿弱唐貞元中周君巢為之作傳何首烏曰野苖曰交藤曰夜合曰地精曰陳知白曰桃柳藤有赤白二種赤者雄白者雌雌雄異本而能相交何首烏者順州南河人初名田兒生而閹弱年五十八無妻子臥田野中見田中之藤兩本異生而能相交久乃解解而復合如此數四田兒異之斸根而服七日而思人道十年而生數男頭白變黑遂以名此草其人年百三十子庭服之年百六十唐元和間事也預知子曰仙沼子曰聖知子曰聖先子曰盍合子實如皂莢子傳云取二枚綴衣領上遇蟲毒初則聞其有聲故有預知之名蜀人貴重之仙茅曰獨茅根曰茅瓜子曰婆羅門參傳云十斤石乳不及一斤仙茅萱草曰合歡草曰無憂草言能令人樂而忘憂花曰宜男婦人喜佩之風土記云孕婦佩其花則生男金星草生於隂崖或瓦木上葉背有金星相對爐火家所用也薇生水傍葉如萍爾雅云薇垂水三秦記夷齊食之三年顔色不變武王戒之乃食而死然詩云采薇者金櫻芽也無風獨搖草頭如彈子尾若鳥尾兩片開合見人自動石蘂生太山石上如花蘂王隱晉書云庾衮入林慮山餌石蘂得長年孝文韭人多食之能行後魏孝文帝好食此故得名陳家白曰吉利菜葉如錢根如防已又有婆羅門白甘家白三白相似孟娘菜曰孟母菜曰厄菜葉似升麻方莖越王餘算生南海水中如竹算子長尺許異苑云越王行海作籌有餘棄於水中而生風延母細葉蔓生纓繞草木南都賦云風衍蔓延於衡臯是也㹿菜字林云味辛南人食之去冷氣優殿南方草木狀曰合浦人種之用醬汁而食芳香宜男草廣州記云小男女佩之臂上辟惡止驚生廣南朝至暮落花生糞穢處頭如筆紫色朝生暮謝小兒呼為狗溺臺又名鬼筆菌類也非槿蕕草曰軒于爾雅云莤蔓于臭草也生水中江東人呼為􅀢證俗云蕕水草也𦾰蒿先於百草而生爾雅云莪蘿注云𦾰蒿也小雅云菁菁者莪陸璣云莪蒿也一名蘿蒿麗春草河南曰龍芉草河北曰蘭艾生上黨者曰定參草亦曰仙女蒿此草主黃疸之疾唐天寶中始有聞焉蔬類白瓜曰水芝曰地芝即白冬瓜也葵之類多爾雅曰菺戎葵即蜀葵一名菺又曰荍蚍衃注云荆葵也一名荍一名蚍衃又曰蔠葵蘩露注云落葵也一名承露一名藤葵一名胡煙脂蔓生繞籬落葉圓而厚子如豆生青熟黑挼之則色紫女人以漬粉傅顔為假色又有龍葵一名苦葵葉圓似排風而無毛羅勒俗呼西王母菜北人呼為蘭香為石勒諱也胡荽曰胡葈并州人呼為香荽苦菜曰荼曰選曰遊冬爾雅云荼苦菜詩谷風云誰謂荼苦其甘如薺月令云苦菜秀萊服一名雹葖一名溫菘一名紫花菘吳名楚菘嶺南名秦菘河朔名蘆蔔爾雅曰葖蘆蔔俗呼蘿蔔鎮州者一根可重十六斤薤與韭同類雖辛而不葷五藏所以學道之人服之有赤白二種白者補而美赤者主金創不結子一名鴻薈爾雅云薤鴻薈韭之性溫故謂之草鍾乳易稽覽圖云政道得則隂物變為陽鄭元注謂若蔥變為韭是也可知蔥冷而韭溫然葷臭非養性所宜多食亦昏神蘇爾雅曰蘇桂荏此紫蘇也葉實俱良水蘇曰雞蘇曰勞祖曰芥蒩曰芥苴曰臭蘇曰青白蘇今人皆呼雞蘇亦呼水蘇不可食荏曰䔡似蘇而髙大葉不可食惟子可壓油及雜米作蘪甚肥美蕨一名􅣀莽牙也四皓食之而壽夷齊食之而夭搜神記曰郗鑒鎮丹徒二月出獵有甲士折一枝食之覺心中淡淡成病後吐一小蛇垂之屋前漸乾成蕨明此物不可生食爾雅云蕨􅣀又有一種大蕨亦可食謂之藄蕨爾雅云藄月爾藝臺亦作雲臺爾雅云臺夫須蘩蔞曰蔜爾雅云蔜􅫄􅘚生於園圃蔓細弱田野人食之可作牙藥雞腸似蓼而小不辛本草以合於蘩蔞共條故蘇恭誤謂即蘩蔞也堇曰齧曰苦堇爾雅云齧苦堇今人亦謂之堇菜野出味雖苦而甘黃花者殺人唐武后置諸食中以毒賀蘭氏暴死者蓋此種也蕺曰蘵爾雅云蘵黃蒢葉似蒟醬蔓生田野隂濕處關中曰葅菜以其生可為葅也馬藍田野人以為菜茹爾雅云葴馬藍苦苣野生者曰褊苣人家常食者曰白苣薺之菜甚小自生園圃其實曰蒫爾雅云蒫薺實詩云其甘如薺謂此菜之美也或以薺為薺苨芹亦作靳爾雅曰芹楚葵詩曰言采其芹一名水英一名楚葵馬芹爾雅曰茭牛蘄俗謂胡芹其根葉不可食惟子香美可調飲食所謂野人快炙背而美芹子是也莪莪蒿也一名蘿故又謂之蘿蒿爾雅云莪蘿詩云菁菁者莪本草謂𦾰蒿荇曰接余爾雅云莕接余其葉苻詩云參差荇菜今謂之水荇蔓鋪水上故杜詩水荇牽風翠帶長蕪菁亦作蔓菁塞北名九英此菜多生邊塞一名須一名薞蕪一名葑蓯見爾雅春食苖夏食心秋食莖冬食根菜之最益人者惟此爾多種可以備飢嵗昔諸葛孔明所止輒令兵士種蔓菁云取其才出甲可生啖一也葉舒可煮食二也久居則隨以滋長三也棄不令惜四也回則易尋而採之五也冬有根可斸而食六也比諸􅀢屬其利博乎今三蜀江陵人猶呼此為諸葛菜大槩似菘而有頭南人取而種之初年相類至二三嵗則變為菘矣惟河朔最多詩谷風云采葑采菲此即葑也蓼有三種按陶𢎞景云一種紫蓼一種青蓼一種香蓼其葉有圓有尖以圓者為勝入藥用蓼實有一種馬蓼亦可入藥其最大者謂之葒草亦謂之蘢葒爾雅云紅蘢古其大者蘬蘘荷有白赤二種陶𢎞景云今人赤者為蘘荷白者為覆葅食用赤者藥用白者其性好隂在木下者尤美故潘嶽間居賦云蘘荷依隂時藿向陽也搜神記云蔣士先得疾下血言中蟲家人密以蘘荷置其席下忽大笑曰蟲我者張小也乃收小故以此為治蟲之最周禮庶氏掌除蟲毒以嘉草攻之宗凛謂嘉草即此也蓴滑而美所以張翰思蓴羮而歸也二月至八月採者名絲蓴味甘而體軟霜降以後名瑰蓴味苦而體澀葫大蒜也蒜小蒜也小蒜一名薍子馬齒莧一名馬莧可煮丹砂結汞又名五行草以其葉青梗赤花黃根白子黑也其葉間有水銀可燒取雍菜主解野葛毒南人先食雍菜後食野葛自然無苦又取汁滴野葛苖當時煙死張司空云魏武帝噉野葛至一赤應是先食此也菠薐菜本出頗陵國張騫帶來語訛為菠茭首茭草之首有一種可食一名茭白一名菰首一名須爾雅云須葑蓯稻粱類稷苖穗似蘆而米可食為五榖之長五榖不可遍祭故祀其長以配社今人謂之穄關西謂之糜冀州謂之䵖粢粱也爾雅云以粢為稷誤也胡麻曰巨勝曰狗蝨曰方莖曰鴻藏曰方金曰藤苰其葉曰青蘘今之油麻也亦曰脂麻本出大宛張騫傳來故名胡麻沈活靈苑方中論之矣今醫家認黃麻子作胡麻用其子極苦能殺人毒鼠此豈可服食哉陶𢎞景云八榖之中惟此為良而純黑者名巨勝是為大勝此斷榖長生充飢之藥故云胡麻好種無人種正是歸時君不歸麻子者大麻子也脂麻為胡麻此為漢麻脂麻為細麻此為大麻亦謂之枲然有牝牡其牡者生花曰麻黂亦曰麻勃吐出茸茸然蘇恭謂爾雅云黂枲實以麻黂即麻子不知爾雅之誤粱之類多爾雅芑白苖白粱也又曰虋赤苖赤粱也又有青粱有黃粱汜勝之書粱是􅐕粟今俗謂之粱古祭祀所用粢盛是也可作餈食及釀酒亦如糯米或云粱亦有粳者其謂糵米亦曰黃子黍本草丹黍爾雅云秬黍秠一稃二米秠是黑黍之有二米者黍之糯者謂之秫一名黃糯童粱曰稂曰守田曰皇爾雅云狼童粱又曰皇守田今人謂之鬼稻一穗未有數粒易落在田中明年復生故有守田之名亦能亂稼稻有粳糯二種古人謂糯為稻五榖之類皆有粳糯粟之糯曰粱曰粢黍之糯曰秫曰衆爾雅云衆秫是也顔師古刋謬正俗曰本草所謂稻米者今之糯米也又説文云沛國謂稻為糯雕胡菰蔣米也爾雅云齧雕蓬罌子粟曰象榖曰米囊曰御米豆之類多爾雅云蔨鹿靃其實莥今之鹿豆也苖似豌豆蔓生亦可為菜根黃而香本草大豆之蘖謂之黃卷亦謂之卷蘖小豆之花謂之腐婢通志卷七十五
