body:
  text: 通志卷九十四宋右廸功郎鄭樵漁仲撰列傳第七戰國孟嘗君平原君虞卿樂毅亷頗藺相如趙奢李牧信陵君春申君屈原秦呂不韋李斯蒙恬戰國孟嘗君姓田氏名文父曰靖郭君田嬰嬰者齊威王少子而宣王庶弟也嬰自威王時任職用事及宣王九年以嬰為相嬰相齊十一年宣王卒湣王即位即位三年而封嬰於薛初田嬰有子四十餘人文以五月五日生嬰告其母曰勿舉也其母竊舉生之及長其母因兄弟而見其子文於嬰嬰怒其母曰吾令若去此子而敢生之何也文頓首因曰君所以不舉五月子者何故嬰曰五月子者長與户齊將不利其父母文曰人生受命於天乎將受命於户邪嬰默然文曰必受命於天君何憂焉必受命於户則可髙其户耳誰能至者嬰曰子休矣乆之文承閒問其父嬰曰子之子為何曰為孫孫之孫為何曰為元孫元孫之孫為何曰不能知也文曰君用事相齊至今三王矣齊不加廣而君私家富累萬金門下不見一賢者文聞將門必有將相門必有相今君後宫蹈綺縠而士不得裋褐僕妾餘梁肉而士不厭糟糠今君又尚厚積餘蔵欲以遺所不知何人而忘公家之事日損文竊怪之於是嬰乃禮文使主家待賔客賔客日進名聲聞於諸侯諸侯皆使人請薛公嬰以文為太子嬰許之嬰卒諡為靖郭君而文代立是為孟嘗君孟嘗君在薛招致諸侯賔客及亡人有罪者皆歸孟嘗君孟嘗君舍業厚遇之以故傾天下之士食客數千人無貴賤一與文等孟嘗君待客坐語而屏風後常有侍史主記君所與客語問親戚居處客去孟嘗君已使使存問獻遺其親戚孟嘗君曾待客夜食有一人蔽火光客怒以為飰不等輟食辭去孟嘗君起自持其飯比之客慙自剄士以此多歸孟嘗君孟嘗君於客無所擇皆善遇之人人各自以為孟嘗君親已秦昭王聞其賢乃先使涇陽君為質於齊以求見孟嘗君孟嘗君將入秦賔客莫欲其行諫不聼蘓代謂曰今旦代從外來見木偶人與土偶人相與語木偶人曰天雨子將敗矣土偶人曰我生於土敗則歸土今天雨流子而行未知所止息也今秦虎狼之國也而君欲往如有不得還君得無為土偶人所笑乎孟嘗君乃止齊湣王二十五年復卒使孟嘗君入秦昭王即以為秦相人或說秦昭王曰孟嘗君賢而又齊族也今相秦必先齊後秦秦其危矣於是昭王乃止囚孟嘗君謀欲殺之孟嘗君使人抵昭王幸姬求解幸姬曰妾願得君狐白裘此時孟嘗君有一狐白裘直千金天下無䨇入秦已獻昭王更無他裘孟嘗君患之徧問客莫能對最下坐有能為狗盗者曰臣能得狐白裘乃夜為狗以入秦宫蔵中取所獻狐白裘至以獻幸姬姬為言昭王釋之孟嘗君得出即馳去更封傳變名姓以出闗夜半至函谷闗秦昭王後悔出孟嘗君求之已去即使人馳傳逐之孟嘗君至闗闗法雞鳴而出客孟嘗君恐追至客之居下坐者有能為雞鳴而雞盡鳴遂發傳出出如食頃秦追果至闗已後孟嘗君出乃還始孟嘗君列此二人於賔客賔客盡羞之及二人拔孟嘗君於難客皆服孟嘗君過趙趙平原君客之趙人聞孟嘗君賢出觀之皆笑曰始以薛公為魁梧然也今視之乃𦕈小丈夫耳孟嘗君聞之怒客與俱者下斫擊殺數百人遂滅一縣以去齊湣王不自得以其遣孟嘗君孟嘗君至則以為齊相任政孟嘗君怨秦將以齊為韓魏攻秦而借兵食於西周蘇代為西周謂曰君以齊為韓魏攻楚九年取宛葉以北以彊韓魏今復攻秦以益之韓魏南無楚憂西無秦患則齊危矣韓魏必輕齊畏秦臣為君危之君不如令弊邑深合於秦而君無攻又無借兵食君臨函谷而無攻令弊邑以君之情謂秦昭王曰薛公必不破秦以彊韓魏其攻秦也欲王令楚王割東國以與齊而秦出楚懐王以為和君令弊邑以此患秦秦得無破而以東國自免也秦必欲之楚王得出必徳齊齊得東國益彊而薛世世無患矣秦不大弱而處三晋之西三晋必重齊薛公曰善因令韓魏賀秦使三國無攻而不借兵食於西周矣是時楚懐王入秦秦留之故欲必出之秦不果出楚懐王孟嘗君相齊其舍人魏子為孟嘗君收邑入三反而不致一入孟嘗君問之對曰有賢者竊假與之以故不致入孟嘗君怒而退魏子居數年人或毁孟嘗君於湣王曰孟嘗君將為亂及田甲刼湣王湣王意疑孟嘗君乃奔魏子所與粟賢者聞之上書言孟嘗君不作亂請以身為盟遂自剄宫門以明孟嘗君湣王乃驚而蹤跡驗問孟嘗君果無反謀乃復召孟嘗君孟嘗君因謝病歸老於薛湣王許之其後秦亡將吕禮來相齊欲困蘇代蘇代乃謂孟嘗君曰周最於齊至厚也而齊王逐之而聼親弗親弗人姓名相吕禮者欲取秦也齊秦合則親弗與吕禮重矣有用齊秦必輕君君不如急北兵趨趙以和秦魏收周最以厚行且反齊王之信又禁天下之變齊無秦則天下集齊親弗必走則齊王孰與為其國也於是孟嘗君從其計而吕禮嫉害於孟嘗君孟嘗君懼乃遺秦相穣侯魏冉書曰吾聞秦欲以吕禮收齊齊天下之彊國也子必輕矣齊秦相取以臨三晋吕禮必并相矣是子通齊以重吕禮也若齊免於天下之兵其讐子必深矣子不如勸秦王伐齊齊破吾請以所得封子齊破秦畏晋之彊秦必重子以取晋晋國弊於齊而畏秦晋必重子以取秦是子破齊以為功挾晋以為重是子破齊定封秦晋交重子若齊不破吕禮復用子必大窮於是穣侯言於秦昭王伐齊而吕禮亡後齊湣王滅宋益驕欲去孟嘗君孟嘗君乃如魏魏昭王以為相西合於秦趙與燕共伐破齊湣王亡在莒遂死焉齊襄王立而孟嘗君中立為諸侯無所屬齊㐮王新立畏孟嘗君與連和復親薛公文卒諡為孟嘗君諸子爭立而齊魏共滅薛孟嘗君絶嗣無後也初馮驩聞孟嘗好客躡屩而見之孟嘗君曰先生逺辱何以教文也馮驩曰聞君好士以貧身歸於君孟嘗置傳舍十日孟嘗問傳舍長曰客何所為答曰馮先生甚貧猶有一劍耳又蒯緱彈其劍而歌曰長鋏歸來乎食無魚孟嘗君遷之幸舍食有魚矣五日又問傳舍長答曰客復彈劍而歌曰長鋏歸來乎出無輿孟嘗君遷之代舍出入乗輿車矣五日孟嘗君復問傳舍長舍長答曰先生又嘗彈劍而歌曰長鋏歸來乎無以為家孟嘗君不悅居朞年馮驩無所言孟嘗君時相齊封萬户於薛其食客三千餘人邑入不足以奉客使人出錢於薛嵗餘不入貸錢者多不能與其息客奉將不給孟嘗君憂之問左右何人可使收債於薛者傳舍長曰代舍客馮公形容狀貎甚辯長者無他伎能宜可令收債孟賞君乃進驩而請之曰賓客不知文不肖幸臨文者三千餘人邑入不足以奉賓客故出息錢於薛嵗不入民頗不與其息今恐食客不給願先生責之驩曰諾辭行至薛召取孟嘗君錢者皆㑹得息錢十萬乃多醸酒肥牛召諸取錢者能與息者皆來不能與息者亦來皆持取錢之劵書合之齊為㑹日殺牛置酒酒酣乃持劵如前合之能與息者與為期貧不能與息者取其劵而燒之曰孟嘗君所以貸錢者為民之無者以為本業也所以求息者為無以奉客也今富給者以要期貧窮者燔劵書以捐之諸君彊飲食有君如此豈可負哉坐者皆起再拜孟嘗君聞馮驩燒劵書怒而使使召驩驩至孟嘗君曰文食客三千人故貸錢於薛文奉邑少而民尚多不以時與其息客食恐不足故請先生收責之聞先生得錢即以多具牛酒而燒劵書何馮驩曰然不多具牛酒即不能畢㑹無以知其有餘不足有餘者為要期不足者雖守而責之十年息愈多急即以逃亡自捐之若急終無以償上則為君好利不愛士民下則有離上抵負之名非所以厲士民彰君聲也焚無用虚債之劵捐不可得之虚計令薛民親君而彰君之善聲也君何疑焉孟嘗君乃拊手而謝之時齊王惑於秦楚之毁以孟嘗君名髙其主而擅齊國之權於是廢之諸客見孟嘗君廢皆去馮驩曰借臣車一乗可以入秦者必令君重於國而奉邑益廣可乎孟嘗君乃約車幣而遣之馮驩乃西說秦王曰天下之游士憑軾結靷西入秦者無不欲彊秦而弱齊憑軾結靷東入齊者無不欲彊齊而弱秦此雌雄之國也勢不兩立為雄雄者得天下矣秦王跽而問之曰何以使無雌而可驩曰王亦知齊之廢孟嘗君乎秦王曰聞之驩曰使齊重於天下者孟嘗君也今齊王以毁廢之其心怨必背齊背齊入秦則齊國之情人事之誠盡委之秦齊地可得也豈直為雄哉君急使使載幣隂迎孟嘗君不可失時也如有齊覺悟復用之則雌雄之所在未可知也秦王大悅乃遣車十乗黄金百鎰以迎孟嘗君馮驩辭以先行至齊說齊王曰天下之游士憑軾結靷東入齊者無不欲彊齊而弱秦者憑軾結靷西入秦者無不欲彊秦而弱齊者夫秦齊雌雄之國秦彊則齊弱矣此勢不兩雄今臣竊聞秦遣使車十乗載黄金百鎰以迎孟嘗君孟嘗君不西則已西入相秦則天下歸之秦為雄而齊為雌雌則臨淄即墨危矣王何不先秦使未到復孟嘗君而益與之邑以謝之孟嘗君必喜而受之秦雖彊國豈可以請人相而迎之哉折秦之謀而絶其霸彊之畧齊王曰善乃使人至境候秦使秦使車適入齊境使還馳告之王召孟嘗君而復其相位而與其故邑之地又益以千户秦之使者聞孟嘗君復相齊還車而去矣自孟嘗君廢諸客皆去後召而復之馮驩迎之未至孟嘗君太息曰文常好客遇客無所敢失食客三千餘人先生所知也客見文一日廢皆背文而去莫相顧者今賴先生得復其位客亦有何面目復見文乎如復見文者必唾其面而大辱之驩結轡下拜孟嘗君下車接之曰先生為客謝乎驩曰非為客謝也為君之言失夫物有必至事有固然君知之乎孟嘗君曰愚不知所謂也曰夫生者必有死物之必至也富貴多士貧賤寡友事之固然也君獨不見夫朝趨市者乎明旦側肩爭門而入日暮之後過市門者掉臂而不顧非好朝而惡暮也所期物忘其中今君失位而賓客皆去不足以怨士而徒絶賔客之路願君遇客如故孟嘗君再拜曰敬從命矣聞先生之言敢不奉敎焉平原君趙勝趙之諸公子也魏公子傳曰趙惠文王弟諸子中勝最賢喜賓客賓客蓋至者數千人平原君相趙恵文王及孝成王三去相三復位封於東武城平原君家樓臨民家民家有躄者槃跚行汲平原君羙人居樓上臨見大笑之明日躄者至平原君門請曰臣聞君之喜士士不逺千里而至者以君能貴士而賤妾也臣不幸有罷癃之病而君之後宫臨而笑臣臣願得笑臣者頭平原君笑應曰諾躄者去平原君笑曰觀此豎子乃欲以一笑之故殺吾羙人不亦甚乎終不殺嵗餘賓客門下舍人稍稍引去者過半平原君怪之曰勝所以待諸君未嘗敢失禮而去者何多也門下一人前對曰以君之不殺笑躄者以君為愛色而賤士士即去於是平原君乃斬笑躄者羙人頭自造門進躄者因謝焉其後門下乃復稍稍來是時齊有孟嘗魏有信陵楚有春申故爭相傾以待士秦之圍邯鄲趙使平原君求救合從於楚約與食客門下有勇力文武備具者二十人偕平原君曰使文能取勝則善矣文不能取勝則㰱血於華屋之下必得定從而還士不必外索取於食客門下足矣得十九人餘無可取者無以滿二十人門下有毛遂者前自贊於平原曰請備員而行平原居曰先生處勝之門下幾年於此矣遂曰三年於此矣平原君曰夫賢士之處世譬若錐之處嚢中其末立見今先生處勝門下三年左右未有所稱誦勝未有所聞是先生無所有也先生不能先生留遂曰臣乃今日請處嚢中耳使遂蚤得處嚢中乃頴脫而出非特其末見而已平原君竟與遂偕十九人相與目笑之而未發也毛遂比至楚與十九人論議十九人皆服平原君與楚王言合從之利害日出而言之日中不決十九人謂毛遂曰先生上毛遂案劍厯階而上謂平原君曰從之利害兩言而决耳今日出而言日中不决何也楚王謂平原君曰客何為者也平原君曰是勝之舍人也楚王叱曰胡不下吾乃與而君言汝何為者也毛遂案劍而前曰王之所以叱遂者以楚國之衆也今十歩之内王不得恃楚國之衆矣王之命懸於遂手吾君在前叱者何也且遂聞湯以七十里之地王天下文王以百里之壌而臣諸侯豈其士卒衆多哉誠能據其勢而奮其威今楚地方五千里持㦸百萬此霸王之資也以楚之彊天下不能當白起小豎子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王不知惡焉合從者為楚非為趙也吾君在前叱者何也楚王曰唯唯誠若先生之言謹奉社稷而以從毛遂曰從定乎楚王曰定矣毛遂謂楚王左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王曰王當㰱血而定從次者吾君次者遂遂定從於殿上毛遂左手持盤血而右手招十九人曰公相與㰱此血於堂下公等録録音祿所謂因人成事者也平原君已定從而歸歸至於趙曰勝不敢復相士勝相士多者千人寡者百數自以為不失天下之士今乃於毛先生而失之也毛先生一至楚而使趙重於九鼎大吕毛先生以三寸之舌彊於百萬之師勝不敢復相士遂以為上客平原君既返趙楚使春申君將兵赴救趙魏信陵君亦矯奪晋鄙軍往救趙皆未至秦急圍邯鄲邯鄲急且降邯鄲傳舍長子李同說平原君曰君不憂趙亡邪平原君曰趙亡則勝為虜何為不憂乎李同曰邯鄲之民炊骨易子而食可謂急矣而君之後宫以百數婢妾被綺縠餘梁肉而民衣褐不完糟糠不厭民困兵盡或剡木為矛矢而君噐物鐘磬自若使秦破趙君安得有此使趙得全君何患無有今君誠能令夫人以下編於士卒之間分功而作家之所有盡散以享士士方其危苦之時易徳耳於是平原君從之遂得敢死之士三千人李同遂與三千人赴秦軍秦軍為之却三十里亦㑹楚魏救至秦兵遂罷邯鄲復存李同戰死封其父為李侯虞卿欲以信陵君之存邯鄲為平原君請封公孫龍聞之夜駕見平原君曰龍聞虞卿欲以信陵君之存邯鄲為君請封有之乎平原君曰然龍曰此甚不可且王舉君而相趙者非以君之智能為趙國無有也割東武城而封君者非以君為有功也而以國人無勲乃以君為親戚故也君受相印不辭無能割地不言無功者亦自以為親戚故也今信陵君存邯鄲而請封是親戚受城而國人計功也此甚不可且虞卿操其兩權事成操右劵以責事不成以虚名徳君君必勿聼也平原君遂不聼虞卿平原君以趙孝成王十五年卒子孫代後竟與趙俱亡平原君厚待公孫龍公孫龍善為堅白之辯及鄒衍過趙言至道乃絀公孫龍虞卿者游說之士也躡蹻擔簦蹻草履也簦長柄笠說趙孝成王一見賜黄金百鎰白璧一䨇再見為趙上卿故號虞卿食邑於虞秦趙戰於長平趙不勝亡一都尉趙王召樓昌與虞卿曰軍戰不勝尉復死寡人使束甲而趨之何如樓昌曰無益也不如發重使為媾虞卿曰昌言媾者以為不媾軍必破也而制媾者在秦且王之論秦也欲破趙之軍乎不邪王曰秦不遺餘力矣必且欲破趙軍虞卿曰王聼臣發使出重寳以附楚魏楚魏欲得王之重寳必内吾使趙使入楚魏秦必疑天下之合從且必恐如此則媾乃可為也趙王不聼與平陽君為媾發鄭朱入秦秦内之趙王召虞卿曰寡人使平陽君為媾於秦秦已内鄭朱矣卿以為奚如虞卿對曰王不得媾軍必破矣天下賀戰勝者皆在秦矣鄭朱貴人也入秦秦王與應侯必顯重以示天下楚魏以趙為媾必不救王秦知天下不救王則媾不可得成也應侯果顯鄭朱以示天下賀戰勝者終不肯媾長平大敗遂圍邯鄲為天下笑秦既解邯鄲圍而趙王入朝使趙郝約事於秦割六縣而媾虞卿謂趙王曰秦之攻王也倦而歸乎王以其力尚能進愛王而弗攻乎王曰秦之攻我也不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取以送之是助秦自攻也來年秦復攻王王無救矣王以虞卿之言告趙郝趙郝曰虞卿誠能盡秦力之所至乎誠知秦力之所不能進此彈丸之地弗予令秦來年復攻王王得無割其内而媾乎王曰請聼子割矣子能必使來年秦之不復攻我乎趙郝對曰此非臣之所敢任也他日三晋之交於秦相善也今秦善韓魏而攻王王之所以事秦必不如韓魏也今臣為足下解負親之攻開關通幣齊交韓魏至來年而王獨取攻於秦此王之所以事秦必在韓魏之後也此非臣之所敢任也王以告虞卿虞卿對曰郝言不媾來年秦復攻王王得無割其内而媾乎今媾郝又以不能必秦之不復攻也今雖割六城何益來年復攻又割其力之所不能取而媾此自盡之術也不如無媾秦雖善攻不能取六縣趙雖不能守終不失六城秦倦而歸兵必罷我以六城收天下以攻罷秦是我失之於天下而取償於秦也吾國尚利孰與坐而割地自弱以彊秦哉今郝曰秦善韓魏而攻趙者必以為韓魏不救趙也而王之軍必孤有以王之事秦不如韓魏也是使王嵗以六城事秦也即坐而城盡來年秦復求割地王將與之乎弗與是棄前功而挑秦禍也與之則無地而給之語曰彊者善攻弱者不能守今坐而聼秦秦兵不弊而多得地是彊秦而弱趙也以益彊之秦而割愈弱之趙其計故不止矣且王之地有盡而秦之求無已以有盡之地給無已之求其勢必無趙矣趙王計未定樓緩從秦來趙王與樓緩計之曰予秦地何如毌予孰吉緩辭譲曰此非臣之所能知也王曰雖然試言公之私樓緩對曰王亦聞夫公甫文伯母乎公甫文伯仕於魯病死女子為自殺於房中者二人其母聞之弗哭也其相室曰焉有子死而弗哭者乎其母曰孔子賢人也逐於魯而是人不隨也今死而婦人為之自殺者二人若是者必其於長者薄而於婦人厚也故從母言之是為賢母從妻言之是必不免為妬妻故其言一也言者異則人心變矣今臣新從秦來而言勿予則非計也言予之恐王以臣為為秦也故不敢對使臣得為大王計不如予之王曰諾虞卿聞之入見王曰此飾說也王眘勿予樓緩聞之往見王王又以虞卿之言告樓緩樓緩對曰不然虞卿得其一不得其二夫秦趙搆難而天下皆說何也曰吾且因彊而乗弱矣今趙兵困於秦天下之賀戰勝者則必盡在於秦矣故不如亟割地為和以疑天下而慰秦之心不然天下將因秦之彊怒乗趙之弊𤓰分之趙且亡何秦之圖乎故曰虞卿得其一不得其二願王以此决之勿復計也虞卿聞之往見王曰危哉樓子之所以為秦者是愈疑天下而何慰秦之心哉獨不言其示天下弱乎且臣言勿予者非固勿予而已也秦索六城於王而王以六城賂齊齊秦之深讎也得王之六城并力西擊秦齊之聼王不待辭之畢也則是王失之於齊而取償於秦也而齊趙之深讐可以報矣而示天下有能為也王以此發聲兵未窺於境臣見秦之重賂至趙而反媾於王也從秦為媾韓魏聞之必盡重王重王必出重寳以先於王則是王一舉而結三國之親而與秦易道也趙王曰善則使虞卿東見齊王與之謀秦虞卿未返秦使者已在趙矣樓緩聞之亡去趙於是封虞卿以一城居頃之而魏請為從趙孝成王召虞卿謀過平原君平原君曰願卿之論從也虞卿入見王王曰魏請為從對曰魏過王曰寡人固未有許對曰王過王曰魏請從卿曰魏過寡人未之許又曰寡人過然則從終不可乎對曰臣聞小國之與大國從事也有利則大國受其福有敗則小國受其禍今魏以小國請其禍而王以大國辭其福臣故曰王過魏亦過竊以為從便王曰善乃合魏為從虞卿既以魏齊之故不重萬户侯卿相之印與魏齊間行卒去趙困於梁魏齊已死不得意乃著書上採春秋下觀近世曰節義稱號揣摩政謀凡八篇以刺譏國家得失世傳之曰虞氏春秋樂毅者其先祖曰樂羊樂羊為魏文侯將伐取中山魏文侯封樂羊以靈夀樂羊死葬於靈夀其後子孫因家焉中山復國至趙武靈王時復滅中山而樂氏後有樂毅樂毅賢好兵趙人舉之及武靈王有沙邱之亂乃去趙適魏聞燕昭王以子之之亂而齊大敗燕燕昭王怨齊未嘗一日而忘報齊也燕國小僻逺力不能制於是屈身下士先禮郭隗以招賢者樂毅於是為魏昭王使於燕燕王以客禮待之樂毅辭譲遂委質為臣燕昭王以為亞卿乆之當是時齊湣王彊南敗楚相唐昧於重邱西摧三晋於觀津遂與三晋擊秦助趙滅中山破宋廣地千餘里與秦昭王爭重為帝已而復歸之諸侯皆欲背秦而服於齊湣王自矜百姓不堪於是燕昭王問伐齊之事樂毅對曰齊霸國之餘業也地大人衆未易獨攻也王必欲伐之莫如與趙及楚魏於是使樂毅約趙恵文王别使連楚魏令趙嚪秦以伐齊之利諸侯害齊湣王之驕暴皆爭合從與燕伐齊樂毅還報燕昭王燕趙起兵使樂毅為上將軍趙恵文王以相國印授樂毅樂毅於是并護趙楚韓魏燕之兵以伐齊破之濟西諸侯兵罷歸而燕軍樂毅獨追于臨菑齊湣王之敗濟西亡走保於莒樂毅獨留徇齊皆城守樂毅攻入臨菑盡取齊寳財物祭噐輸之燕燕昭王大悅親至濟上勞軍行賞饗士封樂毅於昌國號為昌國君於是燕昭王收齊鹵獲以歸而使樂毅復以兵平齊城之不下者樂毅留徇齊五嵗下齊七十餘城皆為郡縣以屬燕唯獨莒即墨未服㑹燕昭王死子立為燕恵王恵王自為太子時嘗不快於樂毅及即位齊之田單聞之乃縱反間於燕曰齊城不下者特兩城耳然所以不早拔者聞樂毅與燕新王有隙欲連兵且留齊南面而王齊齊之所患唯恐他將之來於是燕恵王固已疑樂毅得齊反間乃使騎劫代將而召樂毅樂毅知燕惠王之不善代之果誅遂西降趙趙封樂毅於觀津號曰望諸君尊寵樂毅以警動於燕齊齊田單後與騎劫戰果設詐誑燕軍遂破騎劫於即墨下而轉戰逐燕北至河上盡復得齊城而迎襄王於莒入于臨菑燕恵王後悔使騎劫代樂毅以故破軍殺將失齊又怨樂毅之降趙恐趙用樂毅而乗燕之弊以伐燕燕恵王乃使人譲樂毅且謝之曰先王舉國而委將軍將軍為燕破齊報先王之讐天下莫不震動寡人豈敢一日而忘將軍之功哉㑹先王棄羣臣寡人新即位左右誤寡人寡人之使騎刼代將軍為將軍乆暴露於外故召將軍休且計事將軍過聼以與寡人有隙遂捐燕歸趙將軍自為計則可矣而亦何以報先王之所以遇將軍之意乎樂毅報遺燕恵王書曰臣不佞不能奉承王命以順左右之心恐傷先王之明有害足下之義故遁逃走趙今足下使人數之以罪臣恐侍御者不察先王之所以畜幸臣之理又不白臣之所以事先王之心故敢以書對臣聞賢聖之君不以禄私親其功多者賞之其能當者處之故察能而授官者成功之君也論行而結交者立名之士也臣竊觀先王之舉也見有髙世之心故假節於魏以身得察於燕先王過舉厠之賔客之中立之羣臣之上不謀父兄以為亞卿臣竊不自知自以為奉令承教可幸無罪故受令而不辭先王命之曰我有積怨深怒於齊不量輕弱而欲以齊為事臣曰夫齊霸國之餘業而最勝之遺事也練於兵甲習於戰攻王若欲伐之必與天下圖之與天下圖之莫若結於趙且又淮北宋地楚魏之所欲也趙若許而約四國攻之齊可大破也先王以為然具符節南使臣於趙顧反命起兵擊齊以天之道先王之靈河北之地隨先王而舉之濟上濟上之軍受命擊齊大敗齊人輕卒銳兵長驅至國齊王遁而走莒僅以身免珠玉財寳車甲珍噐盡收入于燕齊噐設於寜䑓大吕陳於元英故鼎反乎磨室薊邱之植植於汶湟自五伯以來功未有及先王者也先王以為慊於志故裂地而封之使得比小國諸侯臣竊不自知自以為奉命承教可幸無罪是以受命不辭臣聞賢聖之君功立而不廢故著於春秋蚤知之士名成而不毁故稱於後世若先王之報怨雪耻夷萬乗之彊國收八百嵗之蓄積及至棄羣臣之日餘教未衰執政任事之臣修法令慎庶孽施及乎萌隸皆可以教後世臣聞之善作者不必善成善始者不必善終昔伍子胥說聼於闔閭而吳王逺迹至郢夫差弗是也賜之鴟夷而浮之江吳王不寤先論之可以立功故沈子胥而不悔子胥不蚤見主之不同量是以至於入江而不化夫免身立功以明先王之迹臣之上計也離毁辱之誹謗墮先王之名臣之所大恐也臨不測之罪以幸為利義之所不敢出也臣聞古之君子交絶不出惡聲忠臣去國不潔其名臣雖不佞數奉教於君子矣於是燕王復以樂毅子樂間為昌國君而樂毅往來復通燕趙以為客卿樂毅卒於趙樂間居燕三十餘年燕王喜用其相栗腹之計欲攻趙而問昌國君樂間樂間曰趙四戰之國其民習兵伐之不可燕王不聼遂伐趙趙使亷頗擊之大破栗腹之軍於鄗禽栗腹樂乗樂乗者樂間之宗也於是樂間奔趙趙遂圍燕燕重割地以與趙和趙乃解而去燕王恨不用樂間樂間既在趙乃遺樂間書曰紂之時箕子不用犯諫不怠以冀其聼商容不達身祗辱焉以冀其變及民志不入獄囚自出然後二子退隠故紂負桀暴之累二子不失忠聖之名何者其憂患之盡矣今寡人雖愚不若紂之暴也燕民雖亂不若殷民之甚也室有語不相盡以告鄰里二者寡人不為君取也樂間樂乗怨燕不聼其計二人卒留趙趙封樂乗為武㐮君其明年樂乗亷頗為趙圍燕燕重禮以和乃解後五嵗趙孝成王卒㐮王使樂乗代亷頗亷頗攻樂乗樂乗走廉頗亡入魏其後十六年而秦滅趙其後二十餘年髙帝過趙問樂毅有後乎對曰有樂叔髙帝封之樂鄉號曰華成君樂毅之孫也而樂氏之族有樂瑕公樂臣公趙且為秦所滅亡之齊髙宻樂臣公善修黄帝老子之言顯聞於齊稱賢師亷頗者趙之良將也以勇氣聞於諸侯惠文王之十六年亷頗為趙將兵伐齊大破之取晋陽拜為上卿二十年秦王使使者要趙王為澠池之㑹趙王不敢不行以藺相如從亷頗送王至境而與王訣曰王行度道里㑹遇之禮畢還不過三十日過三十日不還則請立太子為王以絶秦望王許之是嵗亷頗東攻齊破其一軍居二年頗伐魏之幾邑拔之後三年攻魏之防陵安陽拔之孝成王五年秦左庶長王齕攻韓因攻趙趙使亷頗距之於長平四月頗犯秦斥兵趙禆將茹為斥兵所斬六月秦䧟趙軍取其二將四尉七月趙軍築壘以守之秦又攻其二壘取二尉奪其西壁頗乃堅壁以待之秦數挑戰趙兵不出秦人患之六年秦相應侯行千金於趙為反間曰秦之所患獨畏馬服君子趙括將耳亷頗易與且降矣趙王既怒頗軍數敗亡而又堅壁不敢戰復聼間言故以括代頗秦使白起為將於是殺括趙喪兵衆四十五萬於長平自後燕人用栗腹之謀曰趙壯者盡於長平其孤未壯可舉趙矣遂擊趙趙使亷頗距之大破燕軍於鄗殺栗腹遂圍燕燕割五城以和乃聼之趙即以尉文邑名封亷頗為信平君為假相國亷頗之免長平歸也失勢之時故客盡去及復用為將客又復至頗曰客退矣客曰吁君何見之晚也夫天下以市道交君有勢我則從君君無勢則去此固其理也有何怨乎居六年趙使亷頗伐魏之繁陽㧞之趙孝成王卒子悼㐮王立使樂乗代亷頗頗怒攻樂乗樂乗走頗遂奔魏之大梁其明年趙乃以李牧為將而攻燕拔武遂方城亷頗居梁乆之魏不能信用趙以數困於秦兵趙王思復得亷頗頗亦思復用於趙趙王使使者視亷頗尚可用否頗之仇郭開多與使者金令毁之趙使者既見亷頗頗為之一飯斗米肉十斤被甲上馬以示尚可用趙使還報王曰亷將軍雖老尚善飯然與臣坐頃之三遺矢矣趙王以為老也遂不召楚聞亷頗在魏隂使人迎之亷頗一為楚將無功曰我思用趙人頗卒死于夀春藺相如趙人也為趙宦者令繆賢舍人趙恵文王時得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王與大將軍亷頗諸大臣謀欲予秦秦城恐不可得徒見欺欲勿予即患秦兵之來計未定求人可使報秦者未得繆賢曰臣舍人藺相如可使王問何以知之對曰臣嘗有罪竊計欲亡走燕相如止臣曰君何以知燕王臣語曰臣嘗從大王與燕王㑹境上燕王私握臣手曰願結友以此知之故欲往相如謂臣曰夫趙彊而燕弱而君幸於趙王故燕王欲結於君今君乃亡趙走燕燕畏趙其勢必不敢留君而束君歸趙矣君不如肉袒伏斧鑕請罪則幸得脫矣臣從其計大王亦幸赦臣臣竊以為其人勇士有智謀宜可使於是王召見問相如曰秦王以十五城請易寡人之璧可予不相如曰秦彊而趙弱不可不許王曰取吾璧不予我城柰何相如曰秦以城求璧而趙不許曲在趙趙予璧而秦不予趙城曲在秦均之二策寜許以負秦曲王曰誰可使者相如曰王必無人臣願奉璧往使城入趙而璧留秦城不入臣請完璧歸趙趙王於是遂遣相如奉璧西入秦秦王坐章臺見相如相如奉璧奏秦王秦王大喜傳以示羙人及左右左右皆呼萬嵗相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧却立倚柱怒髪上衝冠謂秦王曰大王欲得璧使人發書至趙王趙王悉召羣臣議皆曰秦貪負其彊以空言求璧償城恐不可得議不欲予秦璧臣以為布衣之交尚不相欺况大國乎且以一璧之故逆彊秦之驩不可於是趙王乃齋戒五日使臣奉璧拜送書於庭何者嚴大國之威以修敬也今臣至大王見臣列觀禮節甚倨得璧傳之羙人以戲弄臣臣觀大王無意償趙王城邑故臣復取璧大王必欲急臣臣頭今與璧俱碎於柱矣相如持其璧睨柱欲以擊柱秦王恐其破璧乃辭謝固請召有司案圖指從此以往十五都予趙相如度秦王特以詐詳為予趙城實不可得乃謂秦王曰和氏璧天下所共傳寳也趙王恐不敢不獻王送璧時齋戒五日今大王亦宜齋戒五日設九賔於廷臣乃敢上璧秦王度之終不可彊奪遂許齋戒五日舍相如廣成傳舍相如度秦王雖齋決負約不償城乃使其從者衣褐懐璧從徑道亡歸璧于趙秦王齋五日後設九賔禮於廷引趙使者藺相如相如至謂秦王曰秦自穆公以來二十餘君未嘗有堅明約束者也臣誠恐見欺於王而負趙故令人持璧歸間至趙矣且秦彊而趙弱大王遣一介之使至趙趙立奉璧來今以秦之彊而先割十五都予趙趙豈敢留璧而得罪於大王乎臣知欺大王之罪當誅臣請就湯鑊唯大王與羣臣熟計議之秦王與羣臣相見而嘻左右或欲引相如去秦王因曰今殺相如終不能得璧也而絶秦趙之驩不如因而厚遇之使歸趙趙王豈以一璧之故欺秦邪卒廷見相如畢禮而歸之相如既歸趙王以為賢大夫使不辱於諸侯拜相如為上大夫秦亦不以城予趙趙亦終不予秦璧其後秦伐趙㧞石城明年復攻趙殺二萬人秦王使使者告趙王欲與王為好㑹於西河外澠池趙王畏秦欲毋行亷頗藺相如計曰王不行示趙弱且怯也趙王遂行以相如從遂與秦王㑹澠池秦王飲酒酣曰寡人竊聞趙王好音請秦瑟趙王鼓瑟秦御史前書曰某年月日秦王與趙王㑹飲令趙王鼓瑟相如前曰趙王竊聞秦王善為秦聲請奉盆缻秦王以相娱樂秦王怒不許於是相如前進缻因跪請秦王秦王不肯擊缻相如曰五步之内相如請得以頸血濺大王矣左右欲刅相如相如張目叱之左右皆靡於是秦王不懌為一擊缻相如顧召趙御史書曰某年月日秦王為趙王擊缻秦羣臣曰請以趙十五城為秦王夀相如亦曰請以秦之咸陽為趙王夀秦王竟酒終不能加勝於趙趙亦盛設兵以待秦秦不敢動既罷歸國以相如功大拜為上卿位在亷頗之右亷頗曰我為趙將有攻城野戰之大功而相如徒以口舌為勞而位居我上且相如素賤人吾羞不忍為之下宣言曰我見相如必辱之相如聞不肯與㑹相如每朝時常稱病不欲與亷頗爭列已而相如出望見亷頗相如引車避匿於是舍人相與諫曰臣所以去親戚而事君者徒慕君之髙義也君與亷頗同列今亷君宣惡言而君畏匿之恐懼殊甚且庸人尚羞之況於將相乎臣等不肖請辭去相如固止之曰公之視亷將軍孰與秦王曰不若也相如曰夫以秦王之威而相如廷叱之辱其羣臣相如雖駑弱獨畏亷將軍哉顧吾念之彊秦之所以不敢加兵於趙者徒以吾兩人在也今兩虎共鬭其勢不俱生吾所以為此者以先國家之急而後私讐也亷頗聞之肉袒負荆因賔客至藺相如門謝罪曰鄙賤之人不知將軍寛之至此也卒相與驩為刎頸之交恵文王二十八年相如為將攻齊至平邑而罷其明年趙奢破秦軍閼與下趙奢者趙之田部吏也收租稅而平原君家不肯出奢以法治之殺其用事者九人平原君怒將殺奢奢因説曰君於趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵諸侯加兵是無趙也君安得有此富乎以君之貴奉公如法則上下平上下平則國彊國彊則趙固而君為貴戚豈輕於天下邪平原君以為賢言之於王王用之治國賦國賦大平民富而府庫實趙惠文王二十九年秦伐韓軍於閼與王召亷頗而問曰可救不對曰道逺險狹難救又召問樂乗乗對如頗言又召問奢奢對曰其道逺險狹譬之猶兩䑕鬭於穴中將勇者勝王乃令奢救之兵去邯鄲三十里而令軍中曰有以軍事諫者死秦軍軍武安西秦軍鼓譟勒兵武安屋瓦盡震軍中候有一人言急救武安奢立斬之堅壁留二十八日不行復益增壘秦間來入奢善食而遣之間以報秦將秦將大喜曰夫去國三十里而軍不行乃増壘閼與非趙地也奢既遣秦間乃卷甲而趨之二日一夜至令善射者去閼與五十里而軍軍壘成秦人聞之悉甲而至軍士許歴請以軍事諫奢曰内之許歴曰秦人不意趙師至此其來氣盛將軍必厚集其陳以待之不然必敗奢曰請受令許歴曰請受鈇鑕之誅奢曰胥後令邯鄲許歴復請諫曰先據北山上者勝後至者敗奢許諾即發萬人趨之秦兵後至爭山不得上奢縱兵擊之大破秦軍秦軍解而走遂解閼與之圍而歸王賜奢號為馬服君以許歴為國尉奢於是與亷頗藺相如同位後四年趙惠文王卒子孝成王立七年秦與趙相距於長平時奢已死而藺相如病篤趙使亷頗將攻秦秦數敗趙軍趙軍固壁不戰秦數挑戰亷頗不肯趙王信秦間之言曰秦之所惡獨畏馬服君趙奢之子趙括為將耳趙王信之遂以括為將代亷頗藺相如曰王以名使括若膠柱而鼔瑟耳括徒能讀其父書傳不知合變也王不聼遂將之括自少時學兵法言兵事以天下莫能當嘗與其父奢言兵事奢不能難然不謂善括母問奢其故奢曰兵死地也而括易言之使趙不將括則已若必將之破趙軍者必括也及括將行其母上書言於王曰括不可使將王曰何以對曰始妾事其父時為將身所奉飯飲而進食者以十數所友者以百數大王及宗室所賞賜者盡以予軍吏士大夫受命之日不問家事今括一旦為將東向而朝軍吏無敢仰視之者王所賜金帛歸蔵於家而日視便利田宅可買者買之王以為何如其父父子異心願王勿遣王曰母置之吾已決矣括母因曰王終遣之即有如不稱妾得無隨坐乎王許諾括既代亷頗悉更約束易置軍吏秦將白起聞之縱奇兵佯敗走而絶其糧道分斷其軍為二士卒離心四十餘日軍饑相食括出銳卒自搏戰秦軍射殺趙括括軍敗數十萬之衆遂降秦秦悉阬之趙前後所亡凡四十五萬明年秦兵遂圍邯鄲嵗餘幾不得脫頼楚魏諸侯來救圍乃得解趙王以括母先言竟不誅也李牧者趙之北邉良將也趙孝成王時常居代鴈門備匈奴以便宜置吏市租皆輸入莫府為士卒費日擊數牛饗士習騎射謹烽火多閒諜厚遇戰士為約曰匈奴即入盗急入收保有敢捕虜者斬匈奴每入烽火謹輙入收保不敢戰如是數嵗亦不亡失然匈奴以李牧為怯雖趙邊兵亦以為吾將怯趙王譲牧牧如故趙王怒召之使他人代將嵗餘匈奴每來出戰數不利失亡多邊不得田畜復請牧牧杜門不出固稱疾王彊起之牧曰王必用臣臣如前乃敢奉令王許之牧至如故約匈奴數嵗無所得終以為怯邊士日得賞賜而不用皆願一戰於是乃具選車得千三百乗選騎得萬三千匹百金之士五萬人彀者十萬人悉勒習戰大縱畜牧人民滿野匈奴小入佯北不勝以數千人委之單于聞之大率衆來入牧多為竒陣張左右翼擊之大破殺匈奴十餘萬騎滅襜襤破東胡降林胡單于奔走其後十餘嵗匈奴不敢近趙邊城悼㐮王元年亷頗亡入魏趙使牧攻燕拔武遂方城居二年龐煖破燕軍殺劇辛後七年秦攻趙殺其將扈輙於武遂城斬首十萬趙乃以牧為大將軍擊秦軍於宜安大破之走其將桓齮封李牧為武安君居三年秦攻番吾牧擊破秦軍南距韓魏趙王遷七年秦使王翦攻趙趙使李牧司馬尚禦之秦多與趙寵臣郭開金為反閒言李牧司馬尚欲反趙王使趙葱及齊將顔聚代牧牧不受命趙使人徴捕得牧斬之廢司馬尚後三月王翦因急擊趙大破殺趙葱虜王遷及顔聚遂滅趙信陵君無忌者魏昭王少子而安釐王異母弟也故謂之魏公子昭王薨安釐王即位封公子為信陵君是時范睢亡魏相秦以怨魏齊故秦兵圍大梁破魏華陽下軍走芒卯魏王及公子患之公子為人仁而下士士無賢不肖皆謙而禮交之不敢以其富貴驕士士以此方數千里爭往歸之致食客三千人當是時諸侯以公子賢多客不敢加兵謀魏十餘年公子與魏王博而北境傳舉烽言趙寇至且入界王釋博欲召大臣謀公子止王曰趙王田獵耳非為寇也復博如故王恐心不在博居頃復從北方來傳言曰趙王獵耳非為寇也魏王大驚曰公子何以知之對曰臣之客有能探得趙王隂事者趙王所為客輙以報臣臣是以知之是後魏王畏公子之賢能不敢任以國政魏有隠士曰侯嬴年七十家貧為大梁夷門監者公子聞之往請欲厚遺之不肯受曰臣修身潔行數十年終不以監門困故而受公子財公子於是乃置酒大㑹賓客坐定公子從車騎虚左自迎夷門侯生侯生攝弊衣冠直上載於公子上坐不譲欲以觀公子公子執轡愈恭侯生又謂公子曰臣有客在市屠中願枉車騎過之公子引車入市侯生下見其客朱亥睥睨故乆立與其客語微察公子公子顔色愈和當是時魏將相宗室賓客滿堂待公子舉酒市人皆觀公子執轡從騎皆竊罵侯生侯生視公子色終不變乃謝客就車至家公子引侯生坐上坐徧贊賓客賓客皆驚酒酣公子起為夀侯生前侯生因謂公子曰今日嬴之為公子亦足矣嬴乃夷門抱闗者也而公子親枉車騎自迎嬴於稠人廣坐之中不宜有所過今公子故過之然嬴欲就公子之名故乆立公子車騎市中過客以觀公子公子愈恭市人皆以嬴為小人以公子為長者能下士也於是罷酒侯生遂為上客侯生謂公子曰臣所過屠者朱亥此子賢者世莫能知故隠於屠間耳公子往數請之朱亥故不復謝公子怪之安釐王二十年秦破趙長平進兵圍邯鄲公子姊為趙平原君夫人數遺魏王及公子書請救於魏魏王使將軍晋鄙將十萬衆救趙秦王使使告魏曰吾攻趙旦暮且下而諸侯敢救者已㧞趙必移兵先擊之魏王恐使人止晋鄙留軍壁鄴名為救趙實持兩端以觀望平原君使者冠蓋相屬於魏譲公子曰勝所以自附為婚姻者以公子之髙義為能急人之困今邯鄲旦暮降秦而魏救不至安在公子能急人之困也且公子縱輕勝棄之降秦獨不憐公子姊邪公子患之數請魏王及賓客辯士説王萬端魏王畏秦終不聼公子公子自度終不能得之於王計不獨生而令趙亡乃請賓客約車騎百餘乗欲以客往赴秦軍與趙俱死行過夷門見侯生具告所以欲死秦軍狀辭訣而行侯生曰公子勉之矣老臣不能從公子行數里心不快曰吾所以待侯生者備矣天下莫不聞今吾且死而侯生曾無一言半辭送我我豈有所失哉復引車還問侯生侯生笑曰臣固知公子之還也曰公子喜士名聞天下今有難無他端而欲赴秦軍譬若以肉投餒虎何功之有哉尚安事客然公子遇臣厚公子往而臣不送以是知公子恨之復返也公子再拜因問侯生乃屏人間語曰嬴聞晋鄙之兵符常在王卧内而如姬最幸力能竊之嬴聞如姬父為人所殺自王以下欲求報其父仇莫能得如姬為公子泣公子使客斬其仇頭進如姬如姬之欲為公子死無所辭顧未有路耳公子誠一開口請如姬如姬必許諾則得虎符奪晋鄙軍北救趙而西却秦此五霸之伐也公子從其計請如姬如姬果盗晋鄙兵符予公子公子行侯生曰將在外主令有所不受以便國家公子即合符而晋鄙不授公子兵而復請之則事危矣臣客屠者朱亥可與俱此人力士晋鄙聼大善不聼可使擊之於是公子泣侯生曰公子畏死邪何泣也公子曰晋鄙嚄唶宿將往恐不聼必當殺之是以泣耳豈畏死哉於是公子請朱亥朱亥笑曰臣乃市井鼔刀屠者而公子親數存問之所以不報謝者以為小禮無所用今公子有急此乃臣効命之秋也遂與公子俱公子過謝侯生侯生曰臣宜從老不能請數公子行日以至晋鄙軍之日北鄉自剄以送公子公子遂行至鄴矯魏王令代晋鄙晋鄙合符疑之舉手視公子曰今吾擁十萬之衆屯於境上國之重任今單車來代之何如哉欲無聼朱亥袖四十斤鐡椎椎殺晋鄙公子遂將晋鄙軍勒兵下令軍中曰父子俱在軍中父歸兄弟俱在軍中兄歸獨子無兄弟歸養得選兵八萬人進兵擊秦軍秦軍解去遂救邯鄲存趙趙王及平原君自迎公子於界平原君負韊矢為公子先引趙王再拜曰自古賢人未有及公子者也當此之時平原君不敢自比於人公子與侯生訣至軍侯生果北鄉自剄魏王怒公子之盗兵符矯殺晋鄙公子亦自知也已却秦存趙使將將其軍歸魏而獨與客留趙趙孝成王徳公子乃與平原君計以五城封之公子聞之意驕矜而有自功之色客有說公子曰物有不可忘或有不可不忘夫人有徳於公子公子不可忘也公子有徳於人願公子忘之也且矯魏王令奪晋鄙兵以救趙於趙則有功矣於魏則未得為忠臣也公子乃自驕而功之竊為公子不取也於是公子立自責似若無所容者趙王埽除自迎執主人之禮引公子就西階公子側行辭譲從東階上自言􅓧過以負於魏無功於趙趙王侍酒至暮口不忍獻五城以公子退譲也公子竟留趙趙王以鄗為公子湯沐邑魏亦復以信陵奉公子公子聞趙有處士毛公蔵於博徒薛公蔵於賣漿家公子欲見兩人兩人自匿不肯見公子公子聞所在乃間歩從此兩人游甚驩平原君聞之謂其夫人曰始吾聞夫人弟公子天下無䨇今吾聞之乃妄從博徒賣漿者游公子妄人耳夫人以告公子公子乃謝夫人去曰始吾聞平原君賢故負魏王而救趙以稱平原君平原君之游徒豪舉耳不求士也無忌自在大梁時嘗聞此兩人賢至趙恐不得見以無忌從之游尚恐其不我欲也今平原君乃以為羞其不足從游乃裝為去夫人具以語平原君平原君乃免冠謝固留公子平原君門下聞之半去平原君歸公子天下士復往歸公子公子傾平原君客公子留趙十年不歸秦聞公子在趙日夜出兵東伐魏魏王患之使使請公子公子恐其怒之乃誡門下有敢通魏使者死賓客皆背魏之趙莫敢勸公子歸毛公薛公兩人往見公子曰公子所以重於趙名聞諸侯者徒以有魏也今秦攻魏魏急而公子不恤使秦破大梁而夷先王之宗廟公子何面目立天下乎語未卒公子立變色告車趣駕歸救魏魏王見公子相與泣而以上將軍印授公子公子遂將安釐王三十年公子使使徧告諸侯諸侯聞公子將各遣兵救魏公子率五國之兵破秦軍於河外走䝉驁遂乗勝逐秦軍至函谷闗抑秦兵秦兵不敢出當是時公子威振天下諸侯之客進兵法公子皆名之故世俗稱魏公子兵法秦王患之乃行金萬斤於魏求晋鄙客令毁公子於魏王曰公子亡在外十年矣今為魏將諸侯將皆屬諸侯徒聞公子不聞魏王公子亦欲因此時定南面而王諸侯畏公子之威方欲共立之秦數使反間偽賀公子得立為魏王未也魏王日聞其毁不能不信後王果使人代公子將公子自知再以毁廢乃謝病不朝與賔客為長夜飲飲醇酒多近婦女日夜為樂飲者四嵗竟病酒而卒是嵗安釐王亦薨秦聞公子死使䝉驁攻魏抜二十城初置東郡其後秦稍蠶食魏十八年而虜魏王屠大梁髙祖始微少時數聞公子賢及即天子位每過大梁常祠公子髙祖十二年從擊黥布還為公子置守冢五家世世嵗以四時奉祠公子春申君楚人也姓黄氏名歇游學博聞事楚頃㐮王頃㐮王以歇為辯使於秦秦昭王使白起攻韓魏敗之於華陽禽魏將芒卯韓魏服而事秦秦昭王方令白起與韓魏共伐楚未行而黄歇適至於秦聞秦之計當是時秦已前使白起攻楚取巫黔中之郡拔鄢郢東至竟陵楚頃㐮王東徙治於陳縣歇見楚懐王為秦所誘而入朝留死於秦頃㐮王其子也秦輕之恐秦一舉兵而滅楚歇乃上書說秦昭王曰天下莫彊於秦楚今聞大王欲伐楚此猶兩虎相與鬭兩虎相與鬭而駑犬受其弊不如善楚臣請言其說臣聞物至則反冬夏是也致至則危累碁是也今大國之地徧天下有其二垂此從生民已來萬乗之地未嘗有也先帝文王莊王之身三世不忘接地於齊以絶從親之要今王使盛橋守事於韓盛橋以其地入秦是王不用甲不信威而得百里之地王可謂能矣王又舉甲而攻魏杜大梁之門舉河内拔燕酸棗虛桃入邢魏之兵雲翔而不敢捄王之功亦多矣王休甲息衆二年而後復之又并蒲衍首垣以臨仁平邱黄濟陽嬰城而魏氏服王又割濮磨之北注齊秦之要絶楚魏之脊天下五合六聚而不敢救王之威亦單矣王若能持功守威絀攻取之心而肥仁義之地使無後患三王不足四五伯不足六也王若負人徒之衆仗兵革之彊乗毁魏之威而欲以力臣天下之主臣恐其有後患也詩曰靡不有初鮮克有終易曰狐渉水濡其尾此言始之易終之難也何以知其然也昔智氏見伐趙之利而不知榆次之禍吳見伐齊之便而不知干隧之敗此二國者非無大功也沒利於前而易患於後也吳之信越也從而伐齊既勝齊人於艾陵還為越王禽三渚之浦智氏之信韓魏也從而伐趙攻晋陽城勝有日矣韓魏叛之殺智伯瑶於鑿臺之下今王妬楚之不毁也而忘毁楚之彊韓魏也臣為王慮而不取也詩曰大武逺宅而不渉從此觀之楚國援也鄰國敵也詩云趯趯毚兎遇犬獲之他人有心余忖度之今王中道而信韓魏之善王也此正吳之信越也臣聞之敵不可假時不可失臣恐韓魏卑辭除患而實欲欺大國也何則王無重世之徳於韓魏而有累世之怨焉夫韓魏父子兄弟接踵而死於秦者將十世矣本國殘社稷壞宗廟毁刳腹絶腸折頸摺頤首身分離暴骸骨於草澤頭顱僵仆相望於境父子老弱繫脰束手為羣虜者相及於路鬼神孤傷無所血食人民不聊生族類離散流亡為僕妾盈滿海内矣故韓魏之不亡秦社稷之憂也今王資之與攻楚不亦過乎且王攻楚將惡出兵王將借路於仇讐之韓魏乎兵出之日而王憂其不返也是王以兵資於仇讐之韓魏也王若不借路於仇讐之韓魏必攻隨水右壌隨水右壌此皆廣川大水山林谿谷不食之地也王雖有之不為得地是王有毁楚之名而無得地之實也且王攻楚之日四國必悉起兵以應王秦楚之兵構而不離魏氏將出而攻留方與銍湖陵碭蕭相故宋必盡齊人南面攻楚泗上必舉此皆平原四達膏腴之地而使獨攻王破楚以肥韓魏於中國而勁齊韓魏之彊足以校於秦齊南以泗水為境東負海北倚河而無後患天下之國莫彊於齊魏齊魏得地葆利而詳事下吏一年之後為帝未能其於禁王之為帝有餘矣夫以王壌土之博人徒之衆兵革之彊壹舉事而樹怨於楚遲令韓魏歸帝重於齊是王之失計也臣為王慮莫若善楚秦楚合而為一以臨韓韓必斂手王施以東山之險帯以曲河之利韓必為闗内之侯若是而王以十萬戍鄭梁氏寒心許鄢陵嬰城而上蔡召陵不往來也如此而魏亦闗内侯矣王一善楚而闗内兩萬乗之主注地於齊齊右壌可拱手而取也王之地一經兩海要約天下是燕趙無齊楚齊楚無燕趙也然後危動燕趙直揺齊楚此四國者不待痛而服矣昭王曰善乃止白起而謝韓魏發使賂楚約為與國歇受約歸楚楚使歇與太子完入質於秦秦留之數年頃襄王病太子不得歸而與秦相應侯善於是歇乃說應侯曰相國誠善楚大子乎應侯曰然歇曰今楚王恐不起疾秦不如歸其太子太子得立其事秦必重而徳相國無窮是親與國而得儲萬乗也若不歸則咸陽一布衣矣楚更立太子必不事秦夫失與國而絶萬乗之和非計也願相國熟慮之應侯以聞秦王王曰令楚太子之傅先往問楚王之疾返而後圗之歇為太子計曰秦之留太子也欲以求利也今太子力未能有以利秦也歇憂之甚而陽文君子二人在中王若卒大命太子不在陽文君子必立為後太子不得奉宗廟矣不如亡秦與使者俱出臣請止以死當之太子因變衣服為楚使者御以出闗而歇守舍常為謝病度太子已逺秦不能追歇乃自言秦昭王曰楚太子已歸出逺矣歇當誅願賜死昭王大怒欲聼其自殺應侯曰歇為人臣出身以徇其主太子立歇必用不如無罪而歸之以親楚遂遣歇歇至楚三月頃㐮王卒太子完立是為考烈王元年以黄歇為相封為春申君賜淮北地十二縣後十五載歇言於王曰淮北地邊齊其事急請以為郡因并獻淮北地十二縣請徙封於江東王許之春申君因城故吳墟以自為郡邑春申君既相楚是時齊有孟嘗君趙有平原君魏有信陵君方爭下士招致賓客以相傾奪輔國持權春申君相楚四年秦破趙之長平軍四十餘萬五年秦圍趙邯鄲趙告急於楚春申君將兵救之秦兵罷去八年為楚北伐滅魯以荀卿為蘭陵令當是時楚復彊趙平原君使人於春申君春申君舍之於上舍趙使欲誇楚為玳瑁簪刀劍室以珠玉飾之請命春申君客春申君客三千餘人其上客皆躡珠履以見趙使趙使大慙春申君相十四年秦莊㐮王立以呂不韋為相封文信侯取東周春申君相楚二十二年諸侯患秦攻伐無已時乃相與合從西伐秦而楚王為從長春申君用事至函谷闗秦出兵攻諸侯兵皆敗走考烈王以咎春申君春申君以此益䟱客有觀津人朱英謂春申君曰人皆以楚為彊而君用之弱其於英不然先君時善秦二十年而不攻楚何也秦踰黽隘之塞而攻楚不便假道於兩周背韓魏而攻楚不可今則不然魏旦暮亡不能愛許鄢陵其許魏割以與秦秦兵去陳百六十里在許東南臣之所觀者見秦楚之日鬭也楚於是去陳徙夀春而秦徙衛野王作置東郡春申君遂就封於吴行相事考烈王無子春申君患之求婦人宜子者進之甚衆卒無子趙人李園持其女弟欲進之楚王聞其不宜子恐乆毋寵李園乃求事春申君為舍人已而謁歸故失期還謁春申君問之狀對曰齊王使使求臣女弟與其使者飲故失期春申君曰聘入乎對曰未也春申君曰可得見乎曰可於是李園乃進其女弟即幸於春申君知其有身李園乃與其女弟謀園女弟承間說春申君曰楚王之貴幸君雖兄弟不如也今君相楚二十餘年而王無子即百嵗後將更立兄弟則楚更立君後亦各貴其故所親君又安得長有寵乎非徒然也君貴用事乆多失禮於王兄弟兄弟誠立禍且及身何以保相印江東之封乎今妾自知有身而人莫知君妾幸君未乆誠以君之重而進妾於楚王王必幸妾妾賴天有子男則是君之子為王也楚國盡可得孰與身臨不測之罪乎春申君大然之乃出李園女弟謹舍而言之楚王楚王召入幸之遂生子男立為太子以李園女弟為王后楚王貴李園園用事益驕恐春申君語泄隂養死士欲殺春申君以滅口而國人頗有知之者春申君相二十五年考烈王病朱英謂春申曰世有毋望之福又有毋望之禍今君處毋望之世事毋望之王安可以無毋望之人乎春申曰何謂毋望之福曰君相楚二十餘年矣雖名相國實楚王也今楚王病旦暮且卒而君相少主因而代立當國如伊尹周公王長而反政不即遂南面稱孤而有楚國此所謂毋望之福也春申君曰何謂毋望之禍曰李園不治國而君之仇也不為兵而養死士之日乆矣楚王卒李園必先入據權而殺君以滅口此所謂毋望之禍也春申君曰何謂毋望之人曰君置臣郎中王卒李園必先入臣為君殺李園此所謂毋望之人也春申君曰足下置之李園弱人也僕又善之且又何至此英知言不用恐禍及身乃亡去後十七日考烈王卒李園果先入伏死士於棘門之内春申君入棘門園死士俠刺春申君斬其頭投之棘門外遂使吏盡滅春申君之家而李園弟初幸春申君有身而入之王所生者遂立是為幽王是嵗也秦始皇立九年矣嫪毐亦為亂於秦覺夷其三族而吕不韋廢屈原名平楚之同姓也為楚懐王左徒博聞彊志明於治亂㛠音閑於辭令入則與王圗議國事以出號令出則接遇賓客應對諸侯王甚任之上官大夫與之同列爭寵而心害其能懐王使屈原造為憲令屈平屬草藁未定上官大夫見而欲奪之屈平不與因讒之曰王使屈平為令衆莫不知每一令出平伐其功曰以為非我莫能為也王怒而疏屈平屈平疾王聼之不聰也讒諂之蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷離騷者猶離憂也夫天者人之始也父母者人之本也人窮則反本故勞苦倦極未嘗不呼天也疾痛慘怛未嘗不呼父母也屈平正道直行竭忠盡智以事其君讒人間之可謂窮矣信而見疑忠而被謗能無怨乎屈平之作離騷蓋自怨生也國風好色而不滛小雅怨誹而不亂若離騷者可謂兼之矣上稱帝嚳下道齊桓中述湯武以刺世事明道徳之廣崇治亂之條貫靡不畢見其文約其辭微其志潔其行亷其稱文小而其指極大舉類邇而見義逺其志潔故其稱物芳其行亷故死而不容自䟱濯音濁淖音閙汙音烏泥怒計之中蟬蛻於濁穢以浮游塵埃之外不獲世之滋垢皭自若然泥音湼而不滓音淄者也推此志也雖與日月爭光可也屈平既絀其後秦欲伐齊齊與楚從親恵王患之乃令張儀詳去秦厚幣委質事楚曰秦甚憎齊齊與楚從親楚誠能絶齊秦願獻商於之地六百里楚懐王貪而信張儀遂絶齊使使如秦受地張儀詐之曰儀與王約六里不聞六百里楚使怒去歸告懐王懐王怒大興師伐秦秦發兵擊之大破楚師於丹浙斬首八萬虜楚將屈丐遂取楚之漢中地懐王乃悉發國中兵以深入擊秦戰於藍田魏聞之襲楚至鄧楚兵懼自秦歸而齊竟怒不救楚楚大困明年秦割漢中地與楚以和楚王曰不願得地願得張儀而甘心焉張儀聞乃曰以一儀而當漢中地臣請如楚如楚又因厚幣用事者臣靳尚而設詭辯於懐王之寵姬鄭袖懐王竟聼鄭袖復釋去張儀是時屈平既疏不復在位使於齊顧反諫懐王曰何不殺張儀懐王悔追張儀不及其後諸侯共擊楚大破之殺其將唐昧時秦昭王與楚婚欲與懐王㑹懐王欲行屈平曰秦虎狼之國不可信不如無行懐王穉子子蘭勸王行奈何絶秦歡懐王卒行入武闗秦伏兵絶其後因留懐王以求割地懐王怒不聼亡走趙趙不内復之秦竟死於秦而歸葬長子頃㐮王立以其弟子蘭為令尹楚人既咎子蘭以勸懐王入秦而不反也屈平既嫉之雖放流睠顧楚國繫心懐王不忘欲反冀幸君之一悟俗之一改也其存君興國而欲反覆之一篇之中三致志焉然後無可奈何故不可以反卒以此見懐王之終不悟也人君無愚智賢不肖莫不欲求忠以自為舉賢以自佐然亡國破家相隨屬而聖君治國累世而不見者其所謂忠者不忠而所謂賢者不賢也懐王以不知忠臣之分故内惑於鄭袖外欺於張儀疏屈平而信上官大夫令尹子蘭兵挫地削亡其六郡身客死於秦為天下笑此不知人之禍也易曰井渫不食為我心惻可用汲王明並受其福王之不明豈足福哉令尹子蘭聞之大怒卒使上官大夫短屈原於頃㐮王頃㐮王怒而遷之屈原至於江濱被髪行吟澤畔顔色憔悴形容枯槁漁父見而問之曰子非三閭大夫歟何故而至此屈原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人者不凝滯於物而能與世推移舉世混濁何不隨其流而揚其波衆人皆醉何不餔其糟而啜其醨何故懐瑾握瑜而自令見放為屈原曰吾聞之新沐者必彈冠新浴者必振衣人又誰能以身之察察受物之汶汶者乎寜赴湘流而葬乎江魚腹中耳又安能以皓皓之白而䝉世之温蠖乎乃作懐沙之賦其辭曰陶陶孟夏兮草木莽莽傷懐永哀兮汨徂南土眴兮窈窈孔靜幽墨寃結紆軫兮離愍之長鞠撫情効志兮俛詘以自抑刓方以為圜兮常度未替易初本由兮君子所鄙章畫職墨兮前度未改内直質重兮大人所盛巧匠不斵兮孰察其揆正元文幽處兮矇謂之不章離婁微睇兮瞽以為無明變白而為黑兮倒上以為下鳳皇在笯兮雞雉翔舞同糅玉石兮一槩而相量夫黨人之鄙妬兮羌不知吾所臧任重載盛兮䧟滯而不濟懐瑾握瑜兮窮不得余所示邑犬羣吠兮吠所怪也誹駿疑桀兮固庸態也文質疎内兮衆不知吾之異采材樸委積兮莫知余之所有重仁襲義兮謹厚以為豐重華不可牾兮孰知余之從容古固有不並兮豈知其故也湯禹乆逺兮邈不可慕也懲違改忿兮抑心自彊離湣而不遷兮願志之有象進路北次兮日昧昧其將暮含憂虞哀兮限之以大故亂曰浩浩沅湘兮分流汩兮脩路幽拂兮道逺忽兮曾吟恒悲兮永歎慨兮世既莫吾知兮人心不可謂兮懐情抱質兮獨無匹兮伯樂既殁兮驥將焉程兮人生有命兮各有所錯兮定心廣志余何畏懼兮曾傷爰哀永歎喟兮世溷不吾知心不可謂兮知死不可譲兮願勿愛兮明以告君子兮吾將以為類兮於是懐石遂自投汨羅以死屈原既死之後楚有宋玉唐勒景差之徒者皆好辭而以賦見稱然皆祖屈原之從容辭令終莫敢直諫焉秦吕不韋者陽翟大賈人也往來販賤賣貴家累千金秦昭王四十年太子死後二年以次子安國君為太子安國君有子二十餘人安國君有所甚愛姬立以為正夫人號曰華陽夫人華陽夫人無子安國君中男名子楚其母曰夏姬無寵故子楚為質於趙秦數攻趙趙不甚禮子楚子楚秦諸庶孽孫質於諸侯車騎進用不饒居處困不得意不韋賈邯郸見而憐之曰此竒貨可居乃往見子楚説曰吾能大子之門子楚笑曰且自大君之門而乃大吾門不韋曰子不知也吾門待子門而大子楚心知所謂乃引與坐深語不韋曰秦王老矣安國君為太子最愛幸華陽夫人而夫人無子立適嗣者獨華陽夫人耳今子兄弟二十餘人子又居中不甚見幸乆質諸侯即大王薨安國君立為王則子無幾得與長子及諸子旦暮在前者争為太子矣子楚曰然為之柰何不韋曰子貧客於此非有以奉獻於親及結賔客也不韋雖貧請以千金為子西游事安國君及華陽夫人立子為適嗣子楚乃頓首曰必如君策請得分秦國與君共之不韋乃以五百金與子楚為進用結賔客而復以五百金買竒物玩好自奉而西游秦求見華陽夫人姊而皆以其物獻華陽夫人因言子楚賢智結諸侯賔客徧天下常曰楚也以夫人為天日夜泣思太子及夫人夫人大喜不韋因使其姊説夫人曰吾聞之以色事人者色衰而愛弛今夫人事太子甚愛而無子不以此時蚤自結於諸子中賢而孝者舉立以為適而子之夫在則尊重夫百嵗之後所子者為王終不失勢此所謂一言而萬世之利也不以繁華時樹本即色衰愛弛後雖欲開一語尚可得乎今子楚賢而自知中男也次不得為適其母又不得幸自附夫人夫人誠以此時抜以為適則夫人竟世而有寵於秦矣華陽夫人以為然承太子間從容言子楚質於趙者絶賢來徃者皆稱譽之因泣曰妾幸得充後宫不幸無子願得子楚立以為適嗣以託妾身太子許之乃與夫人刻玉符約以為適嗣安國君及夫人因厚餽遺子楚而請不韋傅之子楚以此名譽益盛於諸侯不韋取邯郸諸姬絶好善舞者與居知有身子楚從不韋飲見而説之因起為夀請之不韋怒念業已破家為子楚欲以釣竒乃遂獻其姬姬自匿有身至大期時生子政子楚遂立姬為夫人秦昭王五十年使王齮圍邯郸急趙欲殺子楚子楚與不韋謀行金六百斤與守者吏得脫亡赴秦軍遂以得歸趙欲殺子楚妻子子楚夫人趙豪家女也得匿以故母子竟得活秦昭王五十六年薨太子安國君立為王華陽夫人為王后子楚為太子趙亦奉子楚夫人及子政歸秦秦王立一年薨是為孝文王太子子楚立是為莊㐮王所養母華陽后為華陽太后真母夏姬尊以為夏太后莊㐮王元年以吕不韋為丞相封文信侯食河南雒陽十萬户莊㐮王立三年薨太子政立為王尊不韋為相國號稱仲父秦王年少太后時時竊私通吕不韋不韋家僮萬人當是時魏有信陵君楚有春申君趙有平原君齊有孟嘗君皆下士喜賔客以相傾不韋以秦之彊羞不如亦招致士厚遇之至食客三千人是時諸侯多辯士如荀卿之徒著書布天下不韋乃使其客人人著所聞集論以為八覽六論十二紀二十餘萬言以為備天地萬物古今之事號曰吕氏春秋布咸陽市門懸千金其上延諸侯游士賔客有能増損一字者與千金始皇益壯太后滛不止不韋恐覺禍及已乃私求大隂人嫪毐以為舍人時縱娼樂使毐以其隂闗桐輪而行令太后聞之以㗖太后太后聞果欲私得之不韋乃進嫪毐詐令人以腐罪告之不韋又隂謂太后曰可事詐腐則得給事中太后乃隂厚賜主腐者吏詐論之拔其鬚眉為宦者遂得侍太后太后私與通絶愛之已而有身恐人知之詐卜當避時徙宫居雍嫪毐常從賞賜甚厚事皆決於嫪毐嫪毐家僮數千人諸客求宦為嫪毐舍人千餘人始皇七年莊㐮王母夏太后薨華陽太后與孝文王㑹葬夀陵莊㐮王葬芷陽故大后獨别葬杜東曰東望吾子西望吾夫後百年旁當有萬家邑始皇九年有告嫪毐實非宦者常與太后私亂生子二人皆匿之與太后謀曰王即薨以子為後毐與左右貴臣博飲酒醉争言而鬭瞋目叱曰吾乃皇帝假父窶人子何敢與我抗所與鬭者白始皇於是秦王下吏治具得情實事連相國不韋九月夷嫪毐三族殺太后所生兩子遂遷太后於雍王欲誅相國為其奉先王功大及賔客辯士為游説者衆王不忍致法始皇十年十月免相國不韋及齊人茅焦説始皇始皇乃迎太后於雍復歸咸陽而出文信侯就國河南嵗餘諸侯賔客使者相望於道請文信侯秦王恐其為變乃賜文信侯書曰君何功於秦秦封君河南食十萬户君何親於秦號稱仲父其與家屬徙蜀不韋自度稍侵恐誅乃飲酖死太后以始皇十九年薨號帝太后與莊㐮王㑹葬芷陽李斯楚上蔡人年少時為郡小吏見吏舍厠中䑕食不潔近人犬數驚恐之斯入倉觀倉中䑕食積粟居大廡之下不見人犬之憂斯乃歎曰人之賢不肖譬如䑕矣在所自處耳乃從荀卿學帝王之術學成度楚王不足事而六國皆弱無可為建功者欲西入秦辭於荀卿曰斯聞得時無怠今萬乗方争時游者主事今秦王欲吞天下稱帝而治此布衣馳騖之時而游説者之秋也處卑賤之位而計不為者此禽鹿視肉人面而能彊行者耳故詬莫大於卑賤而悲莫甚於困窮乆處卑賤之位困苦之地非世而惡利自託於無為此非士之情也故斯將西説秦王矣至秦㑹莊㐮王卒斯乃求為秦相文信侯吕不韋舍人不韋賢之任以為郎斯因以得説秦王曰胥人者去其幾也成大功者在因瑕釁而遂忍之昔穆公之霸終不東并六國者何也諸侯尚衆周徳未衰故五伯迭興更尊周室自孝公以來周室卑微諸侯相兼闗東為六國秦之乘勝役諸侯蓋六世矣今諸侯之服秦譬如郡縣夫以秦之彊大王之賢由竈上騷音埽除足以滅諸侯成帝業為天下一統此萬世之一時也今怠而不急就諸侯復彊相聚約從雖有黄帝之賢不能并也秦王乃拜斯為長史聼其計法隂遣謀士齎持金玉以游説諸侯諸侯名士可下以財者厚遺結之不肯者利劍刺之離其君臣之計秦王乃使良將隨其後秦王拜斯為客卿㑹韓人鄭國來間秦以作注溉渠已而覺秦宗室大臣皆言秦王曰諸侯人來事秦者大扺為其主游間於秦耳請一切逐客李斯議亦在逐中斯乃上書曰臣聞吏議逐客竊以為過矣昔穆公求士西取由余於戎東得百里奚於宛迎蹇叔於宋來丕豹公孫支於晋此五子者不産於秦而穆公用之并國二十遂霸西戎孝公用商鞅之法移風易俗民以殷盛國以富彊百姓樂用諸侯親服獲楚魏之師舉地千里至今治彊惠王用張儀之計拔三川之地西并巴蜀北收上郡南取漢中包九夷制鄢郢東據成臯之險割膏腴之壌遂㪚六國之從使之西面事秦功施到今昭王得范雎廢穣侯逐華陽彊公室杜私門蠶食諸侯使秦成帝業此四君者皆以客之功由此觀之客何負於秦哉向使四君却客而不内疏士而不用是使國無富利之實秦無彊大之名也今陛下致昆山之玉有隨和之寳垂明月之珠服太阿之劍乗纎離之馬建翠鳳之旗樹靈鼉之鼓此數寶者秦不生一焉而陛下說之何也必秦國之所生然後可則是夜光之璧不飾朝廷犀象之噐不為玩好鄭衛之女不充後宫而駿良駃騠不實外廐江南金錫不為用西蜀丹青不為采所以飾後宫充下陳娱心意説耳目者必出於秦然後可則是宛珠之簪𫝊璣之珥阿縞之衣錦繡之飾不進於前而隨俗雅化佳冶窈窕趙女不立於側也夫擊甕叩缻彈筝搏髀而歌呼嗚嗚快耳目者真秦之聲也鄭衛桑間昭虞武象者異國之樂也今棄擊甕叩缻而就鄭衛退彈筝而取昭虞若是者何也快意當前適觀而已矣今取人則不然不問可否不論曲直非秦者去為客者逐然則是所重者在乎色樂珠玉而所輕者在乎人民也此非所以跨海内制諸侯之術也臣聞地廣者粟多國大者人衆兵彊則士勇是以泰山不譲土壌故能成其大河海不擇細流故能就其深王者不却衆庶故能明其徳是以地無四方民無異國四時充羙鬼神降福此五帝三王之所以無敵也今乃棄黔首以資敵國却賔客以業諸侯使天下之士退而不敢西向裹足不入秦此所謂藉寇兵而齎盗糧者也夫物不産於秦而可寳者多士不産於秦而願忠者衆今逐客以資敵國損民以益讐内自虛而外樹怨於諸侯求國無危不可得也秦王乃除逐客之令復李斯官卒用其計謀官至廷尉二十餘年竟并天下尊王為皇帝以斯為丞相夷郡縣城銷其兵刃示不復用無尺土之封不立子弟為王功臣為諸侯者使後無戰攻之患始皇三十四年置酒咸陽宫博士僕射周青臣等頌稱始皇威徳齊人淳于越進諫曰臣聞之殷周之王千餘嵗封子弟功臣自為支輔今陛下有海内而子弟為匹夫卒有田恒六卿之患臣無輔弼何以相救哉事不師古而能長乆者非所聞也今臣青等又面諛以重陛下過非忠臣也始皇下其議丞相丞相謬其説絀其辭乃上書曰古者天下散亂莫能相一是以諸侯並作語皆道古以害今飾虛言以亂實人善其所私學以非上所建立今陛下并有天下辨白黑而定一尊而私學乃相與非法教之制聞令下即各以其私學議之入則心非出則巷議非主以為名異趣以為髙率羣以造謗如此不禁則主勢降乎上黨與成乎下禁之便臣請諸有文學詩書百家語者蠲除去之令到滿三十日弗去黥為城旦所不去者醫藥卜筮種樹之書若有欲學者以吏為師始皇可其議收去詩書百家之語以愚百姓使天下無以古非今明法度定律令皆以始皇起同文書治離宫别館周徧天下明年又廵狩外攘四夷斯皆有力焉斯長男由為三川守諸男皆尚秦公主女悉嫁秦諸公子李由告歸咸陽斯置酒於家百官長皆前為夀門庭車騎以千數斯喟然歎曰嗟乎吾聞之荀卿曰物禁太盛夫斯乃上蔡布衣閭巷之黔首王不知其駑下遂擢至此當今人臣之位無居臣上者可謂富貴極矣物極則衰吾未知所稅駕也始皇三十七年十月行出游㑹稽並海上北抵琅邪丞相斯中車府令趙髙兼行符璽令事皆從始皇有二十餘子長子扶蘇以數直諫上上使監兵上郡䝉恬為將少子胡亥愛請從上許之餘子莫從辯士隠姓名遺秦將章邯書曰李斯為秦王死廢十七兄而立今王也然則二世是秦始皇第十八子此書在善文中其年七月始皇帝至沙邱病甚令趙高為書賜公子扶蘇曰以兵屬䝉恬與喪㑹咸陽而葬書已封未授使者始皇崩書及璽皆在趙髙所獨胡亥丞相斯趙髙及幸宦者五六人知始皇崩餘羣臣皆莫知也李斯以上在外崩無真太子故祕之置始皇居輼輬車中百官奏事上食如故宦者輙從輼輬車中可諸奏事初趙髙嘗坐事始皇命䝉恬兄毅治之當死始皇赦之故趙髙深怨䝉氏而胡亥素從趙髙習書及律令髙雅得幸於胡亥至是趙髙因留所賜扶蘇璽書與胡亥謀詐以始皇命誅扶蘇而立胡亥為太子胡亥然之趙髙曰不與丞相謀恐事無成乃見李斯曰上賜長子書及符璽皆在胡亥所定太子在君侯與髙之口耳事將如何李斯曰安得亡國之言此非人臣之所當議也趙髙曰君侯自料材能智慮功名與無怨於天下及長子信之孰與䝉恬斯曰是五者皆不及也髙曰長子即位必用䝉恬為丞相君侯必不懐通侯之印歸鄉里明矣胡亥慈仁篤厚可以為嗣願君審計而定之斯固拒不聼高反復説之斯患失權位執志不堅竟從髙議乃相與矯詔立胡亥為太子更為書賜扶蘇及䝉恬死語在宦者𫝊趙髙事中胡亥立為二世皇帝法令誅罰日益刻深甚於始皇時羣臣人人自危欲畔者衆又作阿房之宫治直馳道賦斂愈重戍徭無已於是楚戍卒陳勝吴廣等作亂起於山東俊傑相立自置為侯王叛秦兵至鴻門而却李斯數欲請間諫二世不許而二世責問李斯曰吾有私議而有所聞於韓子也曰堯之有天下也堂高三尺采椽不斵茅茨不翦雖逆旅之宿不勤於此矣冬日鹿裘夏日葛衣粢糲之食藜藿之羮飯土匭啜上鉶雖監門之養不觳於此矣禹鑿龍門通大夏疏九河曲九防決淳水致之海而股無胈脛無毛手足胼胝面目黎黑遂以死于外葬於㑹稽臣虜之勞不烈於此矣然則夫所貴於有天下者豈欲苦形勞神身處逆旅之宿口食監門之養手持臣虜之作哉此不肖人之所勉也非賢者之所務也彼賢人之有天下也專用天下適已而已矣此所以貴於有天下也夫所謂賢人者必能安天下而治萬民今身且不能利將惡能治天下哉故吾願肆志廣欲長享天下而無害為之奈何李斯子由為三川守羣盗吳廣等西畧地過去弗能禁章邯以破逐廣等兵使者復案三川相屬誚譲斯居三公位如何令盗如此李斯恐懼重爵禄不知所出乃阿二世意欲求容以書對曰夫賢主者必且能全道而行督責之術者也督責之則臣不敢不竭能以徇其主矣此臣主之分定上下之義明則天下賢不肖莫敢不盡力竭任以徇其君矣是故主獨制於天下而無所制也能窮樂之極矣賢明之主也可不察焉故申子曰有天下而不恣睢命之曰以天下為桎梏者無他焉不能督責而顧以其身勞於天下之民若堯禹然故謂之桎梏也夫不能修申韓之明術行督責之道專以天下自適也而徒務苦形勞神以身徇百姓則是黔首之役非畜天下者也何足貴哉夫以人徇已則已貴而人賤以已徇人則已賤而人貴故徇人者賤而人所徇者貴自古及今未有不然者也凡古之所為尊賢者為其貴也而所為惡不肖者為其賤也而堯禹以身徇天下者也因隨而尊之則亦失所為尊賢之心矣夫可謂大繆矣謂之為桎梏不亦宜乎不能督責之過也故韓子曰慈母有敗子而嚴家無格虜者何也則能罰之加焉必也故商君之法刑棄灰於道者夫棄灰薄罪也而被刑重罰也彼唯明主為能深督輕罪夫罪輕且督深而况有重罪乎故民不敢犯也是故韓子曰布帛尋常庸人不釋鑠金百鎰盗跖不搏者非庸人之心重尋常之利深而盗跖之欲淺也又不以盗跖之行為輕百鎰之重也搏必隨手刑則盗跖不搏百鎰而罰不必行也則庸人不釋尋常是故城高五丈而樓季不輕犯也泰山之髙百仭而跛䍧牧其上夫樓季也而難五丈之限豈跛䍧也而易百仭之髙哉陗壍之勢異也明主聖王之所以能乆處尊位長執重勢而獨擅天下之利者非有異道也能獨斷而審督責必深罰故天下不敢犯也今不務所以不犯而事慈母之所以敗子也則亦不察於聖人之論矣夫不能行聖人之術則舍為天下役何事哉可不哀邪且夫儉節仁義之人立於朝則荒肆之樂輟矣諫説論理之臣開於側則流漫之志詘矣烈士死節之行顯於世則滛康之虞廢矣故明主能外此三者而獨操主術以制聼從之臣而脩其明法故身尊而勢重也凡賢主者必將能拂世摩俗而廢其所惡立其所欲故生則有尊重之勢死則有賢明之諡也是以明君獨斷故權不在臣也然後能滅仁義之塗掩馳説之口困烈士之行塞聰揜明内獨視聼故外不可傾以仁義烈士之行而内不可奪以諫説忿爭之辯故能犖然獨行恣睢之心而莫之敢逆若此然後可謂能明申韓之術而修商君之法法修術明而天下亂者未之聞也故曰王道約而易操也唯明主為能行之若此則謂督責之誠則臣無邪臣無邪則天下安天下安則主嚴尊主嚴尊則督責必督責必則所求得所求得則國家富國家富則君樂豐故督責之術設則所欲無不得矣羣臣百姓救過不給何變之敢圗若此則帝道備而可謂能明君臣之術矣雖申韓復生不能加也書奏二世悦於是行督責益嚴税民深者為明吏二世曰若此則可謂能督矣刑者相半於道而死人日成積於市殺人衆者為忠臣二世曰若此可謂能責矣時趙髙為郎中令所殺及報私怨者甚衆恐大臣入朝毁惡之乃説二世深居禁中毋延見大臣而已得以用事專決於内李斯以為言趙髙聞之乃見丞相曰闗東羣盗多今上急益發繇治阿房宫聚狗馬無用之物臣欲諌為位賤此真君侯之事君何不諫斯曰吾固欲諫之乆矣以上不坐朝欲見無間趙髙曰君誠能諫請為君候上間語君高候二世居内與婦女燕樂使人告丞相可入奏事丞相至宫門上謁二世以為掩其燕私也大怒高因告丞相怨望及其子三川守由與楚盗通狀二世以為然未欲案丞相先使人往三川案驗由是時二世在甘泉方作觳抵優俳之觀李斯不得見因上書言趙髙之短曰臣聞之臣疑其君無不危國妾疑其夫無不危家今有大臣於陛下擅利擅害與陛下無異此甚不便昔者司城子罕相宋身行刑罰以威行之朞年遂却其君田恒為簡公臣爵列無敵於國私家之富與公家均布惠施徳下得百姓上得羣臣隂取齊國殺宰予於庭即弑簡公於朝遂有齊國此天下所明知也今髙有邪佚之志危反之行如子罕相宋也私家之富若田氏之於齊也兼行田恒子罕之逆道而刼陛下之威信其志若韓玘為韓安相也陛下不圖臣恐其為變也二世不聼反以其書示高高曰丞相所患者獨高耳高已死丞相即欲為田恒等所為語在高傳中於是二世曰其以李斯屬郎中令趙髙案治李斯李斯拘執束縛囹圄中仰天而歎曰嗟乎悲夫不道之君何可為計哉昔者桀殺闗龍逢紂殺王子比干吳王夫差殺伍子胥此三臣者豈不忠哉然而不免於死身死而所忠者非也今吾智不及三子而二世之無道過於桀紂夫差吾以忠死宜矣且二世之治豈不亂哉日者夷其兄弟而自立也殺忠臣而貴賤人作為阿房之宫賦斂天下吾非不諫也而不吾聼也凡古聖王飲食有節車噐有數宫室有度出令造事加費而無益於民利者禁故能長乆治安今行逆於昆弟不顧其咎侵殺忠臣不思其殃大為宫室厚賦天下不愛其費三者已行天下不聼今反者已有天下之半矣而心尚未寐也而以趙髙為佐吾必見寇至咸陽麋鹿游於朝矣於是二世乃使高案丞相獄治罪責斯與子由謀反狀皆收捕宗族賔客趙高治斯榜掠千餘不勝痛自誣服斯所以不死者自負其辯有功實無反心幸得上書自陳幸二世之寤而赦之李斯乃從獄中上書曰臣為丞相治民三十餘年矣逮秦地之陜隘先王之時秦地不過千里兵數十萬臣盡薄材謹奉法令隂行謀臣資之金玉使游説諸侯隂脩甲兵飭政教官鬭士尊功臣盛其爵禄故終以脅韓弱魏破燕趙夷齊楚卒兼六國虜其王立秦為天子罪一矣地非不廣又北逐胡貉南定百越以見秦之彊罪二矣尊大臣盛其爵位以固其親罪三矣立社稷脩宗廟以明主之賢罪四矣更剋畫平斗斛度量文章布之天下以樹秦之名罪五矣治馳道興游觀以見主之得意罪六矣緩刑罰薄賦斂以遂主得衆之心萬民戴主死而不忘罪七矣若斯之為臣者罪足以死固乆矣上幸盡其能力乃得至今願陛下察之書上趙髙使吏棄去不奏曰囚安得上書髙使其客十餘輩詐為御史謁者侍中更往覆訊斯斯更以其實對輙使人復榜之後二世使人驗斯斯以為如前終不敢更言辭服奏當上二世喜曰微趙君幾為丞相所賣及二世所使案三川之守至則項梁已擊殺之使者來㑹丞相下吏趙髙皆妄為反辭二世二年七月具斯五刑論腰斬咸陽市斯出獄與其中子俱執顧謂其中子曰吾欲與若復牽黄犬俱出上蔡東門逐狡兔豈可得乎遂父子相哭而夷三族䝉恬者其先齊人也恬大父䝉驁自齊事秦昭王官至上卿秦莊㐮王元年䝉驁為將伐韓取成臯滎陽作置三川郡二年䝉驁攻趙取三十七城始皇三年䝉驁攻韓取十三城五年䝉驁攻魏取二十城作置東郡始皇七年䝉驁卒驁子曰武武子曰恬恬嘗書獄典文學始皇二十三年䝉武為秦裨將軍與王翦攻楚大破之殺項燕二十四年䝉武攻楚虜楚王䝉恬弟毅始皇二十六年䝉恬因家世得為秦將攻齊大破之拜為内史秦已并天下乃使䝉恬將三十萬衆北逐戎狄收河南築長城因地形用制險塞起臨洮至遼東延袤萬餘里於是渡河據陽山逶虵而北暴師於外十餘年居上郡是時䝉恬振威匈奴始皇甚尊寵䝉氏信任賢之而親近䝉毅位至上卿出則參乗入則御前恬任外事而毅常為内謀名為忠信故雖諸將相莫敢與之爭焉趙高者宦人也秦王聞其彊力通於獄法舉以為中車府令高即私事公子胡亥喻之決獄高有大罪秦王令䝉毅法治之毅不敢阿法當髙罪死除其宦籍帝以髙之敦於事也赦之復其官爵始皇欲游天下道九原直抵甘泉乃使䝉恬通道自九原抵甘泉壍山堙谷千八百里道未就始皇三十七年冬行出游㑹稽並海上北走琅邪道病使䝉毅還禱山川未反始皇至沙邱崩秘之羣臣莫知是時丞相李斯少子胡亥中車府令趙髙常從髙雅得幸於胡亥欲立之又怨䝉毅法治之而不為已也因有賊心乃與丞相李斯公子胡亥隂謀立胡亥為太子太子已立遣使者以罪賜公子扶蘇䝉恬死扶蘇已死䝉恬疑而復請之使者以䝉恬屬吏更置胡亥以李斯舍人為護軍使者還報胡亥已聞扶蘇死即欲釋䝉恬趙髙恐䝉氏復貴而用事怨之毅還至趙高因為胡亥忠計欲以滅䝉氏乃言曰臣聞先帝欲舉賢立太子乆矣而毅諫曰不可若知賢而愈不立則是不忠而惑主也以臣愚意不如誅之胡亥聼而繫䝉毅於代前已囚䝉恬於陽周喪至咸陽已葬太子立為二世皇帝而起髙親近日夜毁惡䝉氏求其罪過舉劾之子嬰進諫日臣聞故趙王遷殺其良臣李牧而用顔聚燕王喜隂用荆軻之謀而倍秦之約齊王建殺其故世忠臣而用后勝之議此三君者皆各以變古者失其國而殃及其身今䝉氏秦之大臣謀士也而王欲一旦棄去之臣竊以為不可臣聞輕慮者不可以治國獨智者不可以存君誅殺忠臣而立無節行之人是内使羣臣不相信而外使鬭士之意離也臣竊以為不可胡亥不聼而遣御史曲宫乗傳之代令䝉毅曰先王欲立太子而卿難之今丞相以卿為不忠罪及其宗朕不忍乃賜卿死亦甚幸矣卿其圖之毅對曰以臣不能得先王之意則臣少宦順幸沒世可得知意矣以臣不知太子之能則太子獨從周旋天下去諸公子絶逺臣無所疑矣夫先王之舉用太子數年之積也臣乃何言之敢諫何慮之敢謀非敢飾辭以避死也為羞累先王之名願大夫為慮焉使臣得死情實且夫順成全者道之所貴也刑殺者道之所卒也昔者秦穆公殺三良而死罪百里奚而非其罪也故立號曰繆昭㐮王殺武安君白起楚平王殺伍奢吳王夫差殺伍子胥此四君者皆為大失而天下非之以其君為不明以是籍於諸侯故曰用道治者不殺無罪而罰不加於無辜唯大夫留心使者知胡亥之意不聼䝉毅之言遂殺之二世又遣使者之陽周令䝉恬曰君之過多矣而卿弟毅有大罪法及内史恬曰自吾先人及至子孫積功信於秦三世矣今臣將兵三十餘萬身雖囚繫其勢足以倍畔然自知必死而守義者不敢辱先人之敎以不忘先王也昔周成王初立未離襁褓周公旦負王於朝卒定天下及成王有病甚殆公旦自揃其爪以沈於河曰王未有識是旦執事有罪殃旦受其不祥乃書而藏之記府可謂信矣及王能治國有賊臣言周公旦欲為亂乆矣王若不備必有大事王乃大怒周公旦走而奔於楚成王觀於記府得周公旦沈書乃流涕曰孰謂周公旦欲為亂乎殺言之者而反周公旦故周書曰必參而伍之今恬之宗世無二心而事卒如此是必孽臣逆亂内陵之道也夫成王失而復振則卒昌桀殺闗龍逢紂殺王子比干而不悔身死則國亡臣故曰過可振而諫可覺也察於參伍上聖之法也凡臣之言非以求免於咎也將以諫而死願陛下為萬民思從道也使者曰臣受詔行法於將軍不敢以將軍言聞於上也䝉恬喟然太息曰我何罪於天無過而死乎良乆徐曰恬罪固當死矣起臨洮屬之遼東城壍萬餘里此其中不能無絶地胍哉此乃恬之罪也乃吞藥自殺通志卷九十四
