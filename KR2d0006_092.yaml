body:
  text: 通志卷八十三上宋右廸功郎鄭樵漁仲撰宗室傳第六上梁吳平侯景子勵勸勔勃弟昌昻昱文帝十男長沙宣武王懿子業韶孫孝儼猷業弟藻淵猷猷子駿弟朗明永陽昭王敷衡陽宣王暢桂陽簡王融子象象子慥臨川靜惠王宏宏子正仁徳子見理正義弟正徳正徳正則正正則弟正立正正立子賁正立弟表正信安成康王秀秀子機推機弟推子撝南平元襄王偉偉子恪恭子靜恪弟恭恭弟祗鄱陽忠烈王恢恢子範諮弟修範子嗣修弟泰範弟諮泰弟退始興忠武王憺憺子亮弟亮弟映映煜梁吳平侯景字子照武帝從父弟也祖道賜以禮讓稱居鄉有爭訟專賴平之又周其疾急鄉里號曰墟主皆竊言曰其後必大仕宋終于書侍御史齊末追贈左光祿大夫三子長曰尚之次曰文帝次曰崇之尚之敦厚有器業為司徒建安王中兵參軍一府稱為長者遷歩兵校尉卒官天監初追諡曰文宣侯子靈鈞嗣仕齊為廣徳令武帝起兵行會稽郡事頃之卒追封東昌縣侯子謇嗣崇之仕齊官至東陽太守以幹能顯政尚嚴厲永明中錢唐唐瑀之反别衆破東陽崇之遇害天監初追諡曰忠簡侯景崇之子也八歲隨父在郡居喪以毁聞及長好學才辯有識斷仕齊為永寧令政為百城最永嘉太守范述曾居郡號稱廉平雅服景為政乃牓郡門曰諸縣有凝滯者可就永寧令決以疾去官永嘉人胡仲宣等千人詣闕表請景為郡不許永元二年以長沙宣武王懿勲除歩兵校尉是冬懿遇害景亦逃難武帝起兵以景行南兖州事時天下未定沔北傖楚各據塢壁景示以威信渠師相率面縛請罪旬日境内皆平武帝踐阼封吳平縣侯南兖州刺史加都督景居州清恪有威裁明解吏職文案無壅下不敢欺吏民敬畏如神明會年荒計口振恤又為饘粥於路以賦之死者給以棺具人甚賴焉天監七年為左驍騎將軍兼領軍將軍領軍管天下兵要宋孝建已來制局用事與領軍分權典事以上皆得呈奏領軍垂拱而已及景在職峻切官曹肅然制局監皆近倖頗不堪命以是不得久留中尋出為寧蠻校尉荆州刺史加都督八年魏荆州刺史元志攻潺溝驅廹羣蠻羣蠻悉度漢水來降議者以為蠻累為邊患可因此除之景曰窮來歸我誅之不祥且魏人來侵每為矛楯若悉誅蠻則魏軍無礙非長策也乃開樊城受降因命司馬朱思遠寧蠻長史曹義宗中兵參軍孟惠雋擊志於潺溝大破之景初到州省除三迎羽儀器服不得煩擾吏民修葺城壘申警邊備理詞訟勸農桑郡縣皆改節自勵州内清靜抄盗絶迹十三年復為領軍將軍直殿省知十州損益事月加祿五萬景為人雅有風力長於辭令其在朝廷為衆所瞻仰於武帝雖屬為從弟而禮寄甚隆軍國大事皆與議決十五年加侍中及太尉揚州刺史臨川王宏坐法免詔景以為安右將軍監揚州置佐史即宅為府景越親居揚州固辭至于流涕帝弗許在州尤稱明斷符教嚴整有田舎老姥訴得符還至縣縣吏未即發姥語曰蕭監州符如火汝手何敢留之其為人所畏敬如此遷都督郢州刺史將發帝幸建興苑餞别為之流涕在州復有能名齊安竟陵郡接魏界多盗賊景移書告示魏即焚塢戍保境不復侵略卒于州贈開府儀同三司諡曰忠子勵嗣勵字文約弱不好弄喜愠不形於色位太子洗馬母憂去職殆不勝喪每一思至必徒歩至墓或遇風雨仆卧中路坐地號慟起而復前家人不能禁景特所鍾愛曰吾百年後其無此子乎使左右節哭服闋除太子舎人景薨勵不進水漿者七日廬于墓所親友隔絶會叔父曇下詔獄勵乃率昆弟羣從同詣大理雖門生故吏莫能識之後襲封吳平侯對揚王人悲慟嗚咽傍人亦為隕涕除淮南太守以善政稱遷宣城内史郡多猛獸常為人患及勵在任獸暴為息又遷豫章内史道不拾遺男女異路徙廣州刺史去郡之日吏民悲泣數百里中舟乗填塞各齎酒肴以送勵勵人為納受隨以錢帛與之至新淦縣岓山村有一老姥以盤擎鰌魚自送舟側奉上之童兒數十人入水扳舟或歌或泣廣州邊海舊饒外國舶至多為刺史所侵每年舶至不過三數人勵至纎毫不犯歲十餘至俚人不賓多為海暴勵征討所獲生口寶物軍賞之外悉送還臺前後刺史皆營私蓄方物之貢少登天府自勵在州歲中數獻軍國所須相繼不絶武帝歎曰朝廷便是更有廣州有詔以本號還朝而江西俚帥陳文徹出冦高要又詔勵重申蕃任未幾文徹降附勵以南江危險宜立重鎮乃表臺於高涼郡立為高州以西江督䕶孫固為刺史徴為太子左衛率勵性率儉而器度寛裕左右嘗將羮正胷前翻之顔色不異徐呼更衣聚書至三萬卷披翫不倦尤好東觀漢記略能誦憶劉顯執卷策勵酬應如流乃至卷次行數亦不差失少交結唯與河東裴子野范陽張纘善卒於道贈侍中諡曰光侯勵弟勸字文肅少以清靜自立封西鄉侯位南康内史太府卿大寶元年與南康王會理謀誅侯景事發遇害勸弟勔字文祗封東鄉侯位太子洗馬及勸同見害勔弟勃位定州刺史封曲江鄉侯大寶初廣州刺史元景仲將謀應侯景西江督䕶陳霸先攻景仲迎勃為刺史時湘東王繹在荆州雖承制授職力不能制遂從之勃乃鎮嶺南為廣州刺史後定江表以王琳代為廣州以勃為晉州刺史魏克江陵勃復據廣州敬帝承制加司徒紹泰中為太尉尋進為太保及陳武禪代之際舉兵不從尋敗遇害景弟昌字子建位衡州刺史性好酒在州每醉徑出人家或獨詣草野刑戮頗無期度醉時所殺醒或求焉亦無悔也累遷兼宗正卿屢為有司所劾久留都忽忽不樂遂縱酒虚悸在石頭東齋引刀自刺而卒昌弟昻字子明位輕車將軍監南兖州初兄景再為兖州徳惠在人及昻來代時人方之馮氏徴為琅邪彭城二郡太守時有女子年二十許散髪黃衣在虎窟山石室中無所修行唯不甚食或出人間時飲少酒鵝卵一兩枚人呼為聖姑就求子往往有效造者充滿山谷昻呼問無所對以為祅惑鞭之二十創即差失所在中大通元年為領軍將軍久之封湘隂侯出為江州刺史卒諡曰恭侯昻弟昱字子真少而狂狷不拘禮度異服危冠交游冗雜尤善屠牛業以為常於宅内酤酒好騎射歴位中書侍郎每求試邊武帝以其輕脫無威望抑而不許遷給事黃門侍郎上表請自解帝手詔責之坐免官因此杜門絶朝覲普通五年坐於宅内鑄錢為有司所奏下廷尉得免死徙臨海郡行至上虞有勅追還令受菩薩戒既至恂恂盡禮改意蹈道持戒又精潔帝甚嘉之為晉陵太守下車勵名迹除煩苛明法憲嚴於奸吏旬日之間郡中大安俄而暴卒百姓行號巷哭市里為之諠沸設祭奠於郡庭者四百餘人有田舍婦夏氏年百餘歲扶曾孫出郡悲泣不自勝其惠化所感如此百姓相率為立廟建碑以紀其徳又詣都表求贈諡詔贈湘州刺史諡曰恭子文帝十男文帝十男張皇后生長沙宣武王懿永陽昭王敷武帝衡陽宣王暢李太妃生桂陽簡王融融為東昬所害敷暢齊建武中卒武帝踐阼並封郡王陳太妃生臨川靜惠王宏南平元襄王偉吳太妃生安成康王秀始興忠武王憺費太妃生鄱陽忠烈王恢長沙宣武王懿字元達文帝長子也少有令譽解褐齊邵陵王行參軍襲爵臨湘縣侯歴位晉陵太守以善政稱永明末為梁南秦二州刺史加都督是歲魏軍入漢中遂圍南鄭懿隨機拒擊乃解圍遁去又遣氐帥楊元秀攻取魏歴城等六戍魏人震懼邊境遂寧永元二年裴叔業據豫州反懿以豫州刺史領歴陽南譙二郡太守討之叔業懼遂降魏武帝時在雍州遣典籖趙景悅說懿興晉陽之甲誅君側之惡懿不答既而平西將軍崔慧景入冦奉江夏王寶元圍城齊室大亂馳信召懿懿時方食投箸而起率銳卒三千人入援武帝馳遣虞安福下都說懿曰誅賊之後則有不賞之功當明君賢主尚或難立况於亂朝何以自免若賊滅己宜勒兵入宫行伊霍故事此萬世一時若不欲爾便合表還歴陽託以外拒為事則威震内外誰敢不從如一朝放兵受其厚爵高而無人必生後悔懿長史徐曜甫亦以為勸懿並不聽慧景遣其子覺來拒懿擊大破之乗勝而進追斬慧景授中書令都督征討水陸諸軍事時東昬肆虐茹法珍王咺之等執政宿臣舊將並見誅夷懿既勲高獨居朝右深為法珍等所憚乃說東昬將加酷害長史徐曜甫知之密具舟江渚勸令西奔懿不從曰古皆有死豈有叛走中書令邪尋見留省賜藥與弟融俱殞謂使者曰家弟在雍州深為朝廷憂之中興元年贈司徒宣徳太后臨朝改贈太傅天監元年追崇丞相封長沙郡王諡曰宣武給九旒鸞輅黃屋左纛葬禮依晉安平王故事懿名望功業素重武帝本所崇敬帝以天監元年四月丙寅即位是日即見襃崇戊辰乃始贈第二兄敷第四弟暢第五弟融至五月有司方奏追皇考妣尊號遷神主于太廟帝不親奉命臨川王宏侍從七月帝臨軒遣兼太尉散騎常侍王份奉策上太祖文皇帝獻皇后及徳皇后尊號既先卑後尊又臨軒命冊識者頗致譏議焉懿子業字靜曠幼而明敏仕齊為太子舎人宣武之難與二弟藻象俱逃匿於王嚴秀家東昬知之收嚴秀付建康獄考掠備極乃以鉗㧞手爪至死不言竟以免禍天監二年襲封長沙王歴位祕書監侍中都督南兖州刺史運私邸米僦人作甓以砌城武帝善之徙湘州尤著善政零陵舊有二猛獸為暴無故相枕而死郡人唐睿見猛獸傍一人曰刺史徳感神明所以兩猛獸自斃言訖不見衆並異之業性敦篤所在留意普通四年為侍中金紫光祿大夫薨諡曰元王文集行於世子孝儼嗣孝儼字希莊射策甲科除祕書郎太子舎人從幸華林園於坐獻相風烏華光殿景陽山等頌其文甚美帝深異之薨諡曰章子眘嗣業弟藻字靖藝仕齊位著作佐郎天監元年封西昌縣侯為益州刺史時鄧元起在蜀自以有克劉季連功恃宿將輕少藻藻怒乃殺之既天下草創邊徼未安州人焦僧䕶聚衆數萬據郫繁作亂藻年未弱冠集僚佐議欲自擊之或陳不可藻斬之階側乃乗平肩輿廵行賊壘賊弓亂射矢下如雨從者舉楯禦箭又命除之由此人心大安賊乃夜遁藻命騎追擊平之九年徴為太子中庶子初鄧元起之在蜀也崇於聚斂財貨山積金玉珍帛為一室名為内藏綺縠錦罽為一室號曰外府藻以外府賜將帥内藏歸王府不有私焉及是還朝輕裝就路再遷侍中藻性謙退不求聞達善屬文尤好古體自非公宴未嘗妄有所為縱有小文成輙棄本歴雍兖二州刺史頻莅州鎮民吏咸稱之推善下人常如弗及普通六年為軍師將軍與西豐侯正徳北侵渦陽輙班師為有司奏免官削爵土八年復封爵中大通三年為中軍將軍太子詹事出為丹陽尹帝每稱其小字歎曰子弟並如迦葉吾復何憂入為尚書左僕射加侍中固讓不許大同五年遷中衛將軍開府儀同三司中書令侍中如故藻性恬靜獨處一室牀有膝㾗宗室衣冠莫不楷則常以爵祿太過每思屏退門庭閑寂賓客罕通簡文尤愛重之自遭家禍恒布衣蒲席不食鮮禽非公庭不聽音樂武帝每以此稱之出為南徐州刺史侯景亂藻遣世子彧率兵入援及城開加散騎常侍侯景遣其儀同蕭邕代之據京口藻因感氣疾或勸奔江北藻曰吾國之台鉉任寄特隆既不能誅翦逆賊正當同死朝廷耳因不食而薨藻弟猷封臨汝侯為吳興郡守性倜儻與楚王廟神交飲至一斛每酹祀盡歡極醉神影亦有酒色所禱必從後為侍中中䕶軍益州刺史時江陽人齊茍兒反衆十萬攻州城猷兵糧俱盡人有異心乃遥禱請救是日有田老逢一騎浴鐵從東方來問去城幾里曰百四十時日己晡騎舉矟曰後人來可令之疾馬欲及日破賊俄有數百騎如風一騎過請飲田老問為誰曰吳興楚王來救臨汝侯當此時廟中請祈無驗十餘日乃見侍衛土偶皆泥濕如汗者是日猷大破茍兒猷在州頗僭濫客筵内遂有香橙不置連榻武帝末知之以此為愆還都以憂愧成疾卒諡曰靈以與神交也猷子韶初封上甲縣都鄉侯太清初為舎人城陷奉詔西奔及至江陵人士多往尋覔令韶說城内事韶不能人人為說乃疏為一卷客問者便示之湘東王聞而取看謂曰昔王韶之為隆安紀十卷說晉末之亂離今之蕭韶亦可為太清紀十卷矣韶乃更為太清紀其諸議論多謝吳為之韶既承㫖撰著多所實錄湘東王徳之改韶繼宣武王封長沙王遂至郢州刺史韶昔為幼童庾信愛之有斷袖之歡衣食所資皆信所給遇客韶亦為信傳酒後為郢州信西上江陵途經江夏韶接信甚薄坐青油幕下引信入宴坐信别榻有自矜色信稍不堪因酒酣乃徑上韶牀踐蹈肴饌直視韶面謂曰官今日形容大異昔時賓客滿坐韶甚慙恥韶弟駿字徳頴善草𨽻工文章晚更習武旅力絶人與永安侯確相類位尚書殿中郎超武將軍封南安侯城陷為賊任約所禮謀召鄱陽嗣王範襲約為約所害猷弟朗字靖徹天監五年例以王子封侯歴太子洗馬桂州刺史加都督性倨而虐羣下患之記室庾丹以忠諫見害帝聞之使於嶺表以功自効丹父景休位御史中丞丹少有雋才與伏挺何子朗俱為周捨所狎初景休罷巴東郡頗有資産丹負錢數百萬責者填門景休怒不為之償俄而朝賢之丹不之景休景休悅乃悉為還之後為建康正坐事流廣州朗弟淵明字靖通少被武帝親愛受封貞陽侯太清元年為豫州刺史百姓詣闕拜表言其徳政樹碑于州門内及碑匠採石出自肥陵淵明乃廣營厨帳多召人物躬自率領牽至州識者笑之曰王自立碑非州人也武帝既納侯景大舉北侵使南康王會理總兵淵明乃拜表求行固請乃許之會理己至宿預詔改以淵明代為都督水陸諸軍趣彭城勑衆軍止於寒山築堰引清水以灌彭城使城自殄慎勿妄動淵明師次吕梁十八里作寒山堰以灌彭城水及于堞不没者三版魏遣將慕容紹宗赴救淵明素無謀略號令莫行諸將各掠居人淵明亦不能制唯禁其一軍無所侵掠紹宗至決堰水淵明命將救之莫肯出魏軍轉廹人情大駭胡貴孫謂趙伯超曰不戰何待伯超懼不能對貴孫乃入陣苦戰伯超擁衆弗敢救曰與戰必敗不如全軍早歸乃使具良馬載其愛妾自隨貴孫遂没伯超子威方將赴戰伯超懼其出使人召之遂相與南還淵明醉不能興衆軍大敗淵明見俘執北人懷其不侵掠謂之義王及至魏魏帝引見淵明及諸將帥釋其禁送晉陽勃海王高澄禮淵明甚重謂曰先王與梁主和好十有餘年聞彼禮佛文常云奉為魏主并及先王此甚是梁主厚意不謂一朝失信致此紛紜因欲與梁通和使人以淵明書告武帝方致書以慰高澄東魏除淵明散騎常侍及聞社稷淪蕩哀泣不捨晝夜魏平江陵齊文宣使送淵明至梁并前所獲梁將湛海珍等皆聽從淵明歸令上黨王渙率衆送之是時太尉王僧辯司空陳霸先在建康推晉安王方智為太宰都督中外諸軍事承制置百官渙軍漸進淵明與僧辯書求迎僧辯不從及渙破東關斬裴之橫僧辯懼乃納淵明於是梁輿東度齊師北反淵明至望朱雀門便長慟迄至所止道俗參問皆以哭對之及稱尊號改承聖四年為天成元年大赦境内以方智為太子授王僧辯為大司馬及陳霸先襲殺僧辯復奉晉安王是為敬帝而以淵明為太傅建安王報齊云僧辯隂謀簒逆故誅之仍請稱臣于齊永為蕃國齊遣行臺司馬恭及梁人盟于歴陽明年齊人徴淵明霸先猶稱蕃將遣使送淵明疽發背死時王琳與霸先相抗齊文宣遣兵納永嘉王莊主梁祀追諡淵明曰閔皇帝永陽昭王敷字仲達文帝第二子也少有學業仕齊為隨郡内史招懷遠近士庶安之以為前後之政莫及明帝謂徐孝嗣曰學士舊聞例不解理官聞蕭隨郡唯置酒清言而路不拾遺行何風化以至於此答曰古者修文徳以來遠人况止郡境而已帝稱善召為廬陵王諮議參軍卒武帝即位贈司空封永陽郡王諡曰昭天監二年子伯游嗣伯游字士仁位會稽太守薨諡曰恭衡陽宣王暢文帝第四子也有美名仕齊位太常封江陵縣侯卒天監元年追贈開府儀同三司封衡陽郡王諡曰宣三年子元簡位郢州刺史卒於官諡曰孝葬將引柩有聲議者欲開視王妃柳氏曰晉文已有前例不聞開棺無益亡者之生徒增生者之痛遂止子獻嗣桂陽簡王融文帝第五子也仕齊位太子洗馬與宣武王懿俱遇害天監元年贈撫軍大將軍封桂陽郡王諡曰簡無子詔以長沙宣武王第九子象嗣象字世翼容止閑雅簡於交游事所生母以孝聞位丹陽尹象生長深宫始親庶政舉無失徳朝廷稱之再遷湘州刺史加都督湘州舊多猛獸為暴及象任州日四猛獸死于郭外自此靜息父老咸稱徳政所感歴位太常卿加侍中兼遷祕書監薨諡曰敦子慥嗣慥字元貞位信州刺史有威惠太清二年赴援臺城遇勑還蕃尋為張纘所構書報湘東王曰河東桂陽二蕃掎角欲襲江陵湘東乃水歩兼行至荆鎮慥尚軍江津不以為意湘東至乃召慥深加慰喻慥心乃安後留止省内慥心知禍及遂肆醜言湘東大怒付獄殺之臨川靜惠王宏字宣遠文帝第六子也長八尺美鬚眉容止可觀仕齊為北中郎桂陽王功曹及宣武之難兄弟皆被收道人釋惠思藏宏及武帝師下宏至新林奉迎建康平為中䕶軍領石頭戍事天監元年封臨川郡王位揚州刺史加都督四年武帝詔宏都督諸軍侵魏宏以帝之介弟所領皆器械精新軍容甚盛北人以為百數十年所未之有軍次洛口前軍克梁城宏部分乖方多違朝制諸將欲乗勝深入宏聞魏援近畏懦不敢進召諸將欲議旋師吕僧珍曰知難而退不亦善乎宏曰我亦以為然柳惔曰自我大衆所臨何城不服何謂難乎裴邃曰是行也固敵是求何難之避馬仙琕曰王安得亡國之言天子掃境内以屬王有前死一尺無却生一寸昌義之怒鬚盡磔曰吕僧珍可斬也豈有百萬之師輕言可退何面目得見聖主乎朱僧勇胡辛生㧞劒而起曰欲退自退下官當前向取死議者已罷僧珍謝諸將曰殿下昨來風動意不在軍深恐大致沮喪欲使全師而還又私謂裴邃曰王非止全無經略庸怯過甚吾與言軍事都不相入覩此形勢豈能成功宏不敢便違羣議停軍不前魏人知其不武遺以巾幗北軍歌曰不畏蕭娘與吕姥但畏合肥有韋虎虎謂韋叡也僧珍歎曰使始興吳平為元帥我相毗輔中原不足平今遂為敵人見欺如此乃欲遣裴邃分軍取壽陽大衆停洛口宏固執不聽乃令軍中曰人馬有前行者斬自是軍政不和人懷憤怒魏奚康生馳遣楊大眼謂元英曰梁人自克梁城已後又不進軍其勢可見當是懼我王若進據洛水彼自奔敗元英曰蕭臨川雖騃其下有好將韋裴之屬亦未可當望氣者言九月賊退今且觀形勢未可便與交鋒張惠紹次下邳號令嚴明所至獨克下邳人多有欲來降惠紹曰我若得城諸卿皆是國人若不能破賊徒令公等失鄉非朝廷弔民本意也今且安堵復業勿妄自辛苦降人咸悅九月洛口軍潰宏棄衆走其夜暴風雨軍驚宏與數騎逃亡諸將求宏不得衆散而歸棄甲投戈填滿水陸捐棄病者彊壯僅得脫宏乘小船濟江夜至白石壘欵城門求入臨汝侯登城謂曰百萬之師一朝奔潰國之存亡未可知也恐奸人乗間為變城門不可夜開宏無辭以對乃縋食饋之惠紹聞洛口敗亦退軍六年遷司徒領太子太傅八年為司空揚州刺史十一年正月為太尉其年冬以公事左遷驃騎大將軍開府儀同三司未拜遷揚州刺史所生母陳太妃薨去職尋起為中書監驃騎大將軍揚州刺史如故宏妾弟吳法壽殺人有勑嚴討法壽在宏府内無如之何武帝制宏出之即日償辜南司奏免宏司徒驃騎揚州刺史武帝注曰愛宏者兄弟私親免宏者王者正法所奏可宏自洛口之敗常懷愧憤都下每有竊發輙以宏為名屢為有司所奏帝每貰之十七年帝將幸光宅寺有士伏於驃騎航待帝夜出帝將行心動乃於朱雀航過事發稱為宏所使帝泣謂宏曰我人才勝汝百倍當此猶恐顛墜汝何為者我非不能為周公漢文念汝愚故宏頓首曰無是無是乃以罪免而縱恣不悛奢侈過度第宅擬於帝宫後庭數百千人皆極天下之選所幸江無畏服玩侔於齊東昬潘妃寶屧直千萬好食鰿魚頭常日進三百其他珍膳盈溢後房食之不盡棄諸道路江本吳氏女也世有國色親從子女徧於王侯後宫兄弟縱橫都下宏未幾復為司徒普通九年遷太尉揚州刺史侍中如故七年四月薨帝篤於友于自疾至薨輿駕七出臨視及薨詔贈侍中大將軍揚州牧假黃鉞并給羽葆鼔吹一部增班劒為六十人諡曰靖惠宏以介弟之貴無他才能恣意聚斂庫室垂有百間在内堂之後關籥甚嚴有疑是鎧仗者密以聞武帝殊不悅宏愛妾江氏寢膳不能暫離上他日送盛饌與江曰當來就汝懽宴唯攜布衣之舊射聲校尉邱佗卿往與宏及江大飲半醉後謂曰我今欲履行汝後房便呼後閤輿徑往屋所宏恐上見其賄貨顔色怖懼上意彌信是仗屋屋檢視宏性愛錢百萬一聚黃榜標之千萬一庫懸一紫標如此三十餘間帝與佗卿屈指計見錢三億餘萬餘屋貯布絹絲綿漆蜜紵蠟朱砂黃屑雜貨但見滿庫不知多少帝始知非仗大悅謂曰阿六汝生活大可方更劇飲至夜舉燭而還宏都下有數十邸出懸錢立劵每以田宅邸店懸上文劵期訖便驅劵主奪其宅都下東土百姓失業非一帝後知之制懸劵不得復驅奪自是之後貧庶不復失居業晉時有錢神論豫章王綜以宏貪吝遂為錢愚論其文甚切帝知以激宏宣㫖與綜天下文章何限何忽作此雖令急毁而流布已遠宏深病之聚斂稍改宏又與帝女永興主私通因是遂謀弑逆許事捷以為皇后帝常為三日齋諸主並豫永興乃使一僮衣以婢服僮踰閾失屨閤帥疑之密言於丁貴嬪欲上言恐或不信乃使宫帥圖之帥令内輿人八人纒以純綿立於幕下齋坐散主果請間帝許之主升階而僮先趣帝後八人抱而禽之帝驚墜於扆捜僮得刀辭為宏所使帝祕之殺二僮於内以漆車載主出主恚死帝竟不臨哭帝諸女臨安安吉長城三主並有文才而安吉最得令稱宏子十人許可知者七人長子正仁字公業位祕書丞早卒諡哀世子正仁弟正義嗣正義字公威初以王子封平樂侯位太常卿南徐州刺史屬武帝幸朱方正義修廨宇以待輿駕初京口城西有别嶺入江高數十丈三面臨水號曰北固蔡謨起樓其上以置軍實是後崩壞其頂猶有小亭登降甚狹及上升之下輦歩進正義乃廣其路傍施欄楯翌日上再臨幸遂通小輿帝大悅登望久之勑曰此嶺不足須固守然京口實乃壯觀乃改曰北顧賜正義束帛後為東揚州刺史薨正義弟正徳字公和少而凶慝招聚亡命破冡屠牛兼好弋獵齊建武中武帝允嗣未立養以為子及平建康生昭明太子正徳還本天監初封西豐縣侯累遷吳郡太守正徳自謂應居儲嫡心常怏怏每形於言普通三年以黃門侍郎為輕車將軍置佐史頃之奔魏去之日詠竹火籠詩一絶内火籠中以自譬曰楨幹屈曲盡蘭麝氤氲銷欲知懷炭日正是履冰朝至魏自稱梁被廢太子時齊蕭寶夤先在魏表魏帝曰豈有伯為天子父為揚州棄彼密親遠投他國不若殺之魏既不禮之正徳乃殺一小兒稱為己子遠營葬地魏人不疑又自魏逃歸見於文徳殿至庭叩頭武帝泣而誨之特復本封正徳志行無悛公行剽掠時東府有正徳及樂山侯正則潮溝則有董黃門子暹世謂之董世子者也南岸則有夏侯夔世子洪此四凶者為百姓巨蠧多聚亡命黃昏多殺人於道謂之打稽時勲豪子弟多縱恣以淫盗屠殺為業父祖皆不能禁尉邏亦莫能禦車服牛馬各有標號謂之西豐駱馬樂山烏牛董暹金帖織成戰袍直七百萬後正則為刧殺沙門徙嶺南死洪為其父䕫奏繫東冶死於徒暹坐與永陽王妃王氏亂誅三人既除百姓少安正徳淫虐不革尋除給事黃門侍郎六年為輕車將軍隨豫章王北侵正徳輙棄軍走為有司所奏下獄帝切詔責其過失免官削爵土徙臨海郡未至徙所道追赦之八年復封爵正徳北還求交朱异帝既封昭明諸子异言正徳失職大通四年特封臨賀郡王後為丹陽尹坐所部多刧盗復為有司所奏去職出為南兖州在任苛刻人不堪命廣陵沃壤遂為之荒至人相食噉既累試無能從是黜廢轉增憤恨乃隂養死士常思國釁聚蓄米粟宅内五十間室並以為倉自征虜亭至于方山悉略為墅蓄奴僮數百皆黥其面太清二年秋侯景反知其有奸心景黨徐思王在北經與正徳相知至是景遣思王至建業具以事告又與正徳書曰今天子年尊奸臣亂國以景觀之計日必敗大王屬當儲貳中被廢黜天下義士竊所忿慨大王豈得顧此私情棄兹億兆景雖不武實思自奮正徳得書大喜曰侯景之意暗與人同天贊我也遂許之及景至正徳潛運空舫詐稱迎荻以濟景焉朝廷未知其謀以正徳為平北將軍屯朱雀舫景至正徳乃北向望闕三拜跪辭歔欷流涕引賊入宣陽門與景交揖馬上退據左衞府先是其軍並着絳袍袍裏皆碧至是悉反之賊以正徳為天子號曰正平元年初童謡有之故以應也又世人相佷必稱正平耳正徳乃以長子見理為太子以女妻景景為丞相與約曰平城之日不得全二宫又令畿内王侯三日不出者誅之及臺城開正徳率衆揮刀欲入賊先使其徒守門故正徳不果乃復太清之號降正徳為侍中大司馬正徳入問訊拜且泣武帝曰啜其泣矣何嗟及矣正徳知為賊所賣深自咎悔密書與鄱陽嗣王契令以兵入賊遮得書乃矯詔殺之先是正徳妹長樂主適陳郡謝禧正徳姦之燒主第縛一婢加玉釧於手以金寶附身聲云主被燒死檢取婢屍并金玉葬之仍與主通呼為柳夫人生二子焉日月稍久風聲漸露後黃門張凖有一雉媒正徳見而奪之尋會重雲殿為淨供皇儲以下莫不畢集凖於衆中託罵曰張凖雉媒非長樂主何可略奪皇太子恐帝聞之令武陵王和止之乃休及出送雉媒還之其後梁室傾覆既由正徳百姓至聞臨賀名亦不欲道童謡云寧逢五虎入市不欲見臨賀父子其惡之如是見理字孟節性甚凶麤長劒短衣出入㕓里不為宗室所齒及肆逆甚得志焉招集羣盗每夜輙掠刧於大航為流矢所中死正徳弟正則字公衡天監初以王子封樂山侯累遷太子洗馬舎人恒於第内私械百姓令養馬又盗鑄錢大通二年坐匿刧盗削爵徙鬱林帝勑廣州日給酒食南中官司猶處以侯禮正則滋怨諸父與西山督䕶靳山顧通室招誘亡命將襲番禺未及期而事發遂鳴鼓會將攻州城刺史元景仲命長史元孝深討之正則敗逃于厠村人縛送之詔斬於南海有司請絶屬籍收妻子詔聽絶屬籍妻子特原正則弟正立字公山初封羅平侯母江有寵初正仁之亡宏溺情曲制以正立為世子正立微有學宏薨後知非朝議表求讓兄帝甚嘉焉諸侯例封五百戸正立改封實土建安縣侯食邑一千戸後位丹陽尹薨諡曰敏子賁嗣賁字世文性躁薄正徳為侯景所立賁出投之專監造攻具以攻臺城常為賊耳目南康嗣王會理謀襲景賁與中宿世子子邕告之賊矯封賁竟陵王子邕隨郡王並改姓侯氏賁為宗正卿子邕都官尚書專權陵蔑朝士居嘗晝卧見柳敬禮蕭勸入室敺之賁驚起乞恩俄而賊惡其翻覆殺之正立弟正表字公儀封封山縣侯位北徐州刺史鎮鍾離正表長七尺九寸雖質貌豐美而性理短闇知正徳附賊遂盤桓不赴援賊尋以正表為南兖州刺史封南郡王正表於歐陽立柵斷截援軍南康王遣軍擊破之正表走還鍾離據州降于東魏魏封為蘭陵郡王後除侍中太子太保開府儀同三司卒贈司空公諡曰昭烈子廣壽嗣正表弟正信字公理封武化縣侯與正立同生亦被宏鍾愛然幼不慧常執白團扇湘東王取題八字銘以譏之正信不悟揺玩自若位給事中安成康王秀字彦達文帝第七子也年十三吳太妃亡秀母弟始興王憺時年九歲與秀並以孝聞居喪累日不進飲文帝親取粥授之哀其早孤命側室陳氏并母二子陳亦無子有母徳視二子如己生秀美風儀性方靜雖左右近侍非正衣冠弗之見仕齊為太子舎人長沙王懿之難臨川王宏以下諸弟姪皆匿人間武帝兵至新林秀及諸親並自㧞赴軍建康平為南徐州刺史天監元年封安成郡王京口自崔慧景亂後累被兵革人戸流散秀招懷撫納惠愛大行仍屬饑年以私財贍百姓所濟甚多六年為江州刺史將發主者求堅船以為齋舫秀曰吾豈愛財而不愛士乃教以牢者給參佐下者載齋物既而遭風齋舫遂破及至州聞前刺史取徴士陶潛曾孫為里司歎曰陶潛之徳豈可不及後允即日辟為西曹時夏水汎長津梁斷絶外司請依舊僦度收其價秀教曰刺史不徳水潦為患可利之乎給船而已七年遭慈母陳太妃憂詔起視事尋遷荆州刺史加都督立學校招隱逸辟處士河東韓懷明南平韓望南郡庾承先河東郭麻等是歲魏縣瓠城人反殺豫州刺史司馬懷悅引司州刺史馬仙琕仙琕籖荆州求應赴衆咸謂宜待臺報秀曰彼待我為援援之宜速待勑非應急也即遣兵赴之及沮水暴長頗敗民田秀以穀二萬斛贍之使長史蕭琛簡州貧老單丁吏一日散遣百餘人百姓大悅荆州嘗苦旱咸欲徙市開渠秀乃責躬親祈楚望俄而雨降遂獲有年又武寧太守為弟所殺乃偽云土反秀照其姦慝望風首欵咸謂之神於荆州起天居寺以武帝游梁館也十三年為郢州刺史加都督郢州地居衝要賦斂殷煩人力不堪至以婦人供作秀務在約己省去游費百姓安堵境内晏然夏口常為戰地多暴露骸骨秀於黃鶴樓下祭而埋之一夜夢數百人拜謝而去每冬月常作襦袴以賜凍者時司州叛蠻田魯生魯賢超秀據䝉籠來降武帝以魯生為北司州刺史魯賢為北豫州刺史超秀定州刺史為北境捍蔽而魯生超秀互相讒毁有去就心秀撫喻懷納各得其用當時賴之遷雍州刺史在路薨武帝甚痛悼焉初秀之西也郢州人相送出境聞其疾百姓商賈咸為請命及薨四州人裂裳為白帽哀哭以迎送之雍州蠻迎秀聞薨祭哭而去喪至都贈司空諡曰康秀美容儀每在朝百寮屬目性仁恕喜慍不形於色左右嘗以石擲殺所養鵠齋帥請按其罪秀曰吾豈以鳥傷人在都旦臨公事厨人進食誤覆之去而登車終朝不飯亦弗之誚也時諸王並下士建安安成二王尤好人物世以二安重士方之四豪秀精意學術捜集經記招學士平原劉孝標使撰類苑書未及畢而已行於世秀於武帝布衣昆弟及為君臣小心謹畏過於踈賤者帝益以此賢之少偏孤於始興王憺尤篤憺久為荆州刺史常以所得俸中分秀秀稱心受之不辭多也昆弟之睦時議歸之佐史夏侯亶等表立墓碑誌銘許焉當世高才遊王門者東海王僧孺吳郡陸倕彭城劉孝綽河東裴子野各製其文欲擇用之而咸稱實錄遂四碑並建子機嗣機字智通位湘州刺史薨於州機美姿容善吐納家既多書博學彊記然而好弄尚力遠士子邇小人為州專意聚斂無政績頻被案劾將葬有司請諡詔曰王好内怠政宜諡曰煬所著詩賦數千言元帝集而序之子操嗣機弟推字智進少清敏好屬文深為簡文所親賞普通六年以王子封南浦侯歴淮南晉陵吳郡太守所臨必赤地大旱吳人號為旱母焉侯景之亂守東府城陷推握節死之推弟撝字智遐性溫裕有儀表封永豐縣侯東魏遣李諧盧元明來聘武帝以撝辭令可觀令兼中書侍郎受幣於賔館歴黃門侍郎累遷東巴西梓潼二郡守及侯景作亂武陵王紀僭稱尊號時宗室在蜀唯撝一人紀封撝秦郡王紀率衆東下以撝為尚書令征西大將軍都督益州刺史守成都又令梁州刺史楊乾運守潼州魏遣大將軍尉遲迥乗虚伐蜀迥入劒閣長驅至成都撝見兵不滿萬人而倉庫空竭於是率文武於益州城北共迥升壇歃血立盟以城歸魏魏授撝開府儀同三司封歸善縣公周閔帝踐阼進爵黃臺郡公武成中明帝令諸文儒於麟趾殿校定經史仍撰世譜撝亦豫焉尋以母老兼有疾疹請在外著書詔許之保定元年授禮部中大夫又以歸欵功别賜食多陵縣五百戸三年出為上州刺史為政以禮讓為本嘗至元日獄中囚繫悉放歸家聽三日然後赴獄主者爭之撝曰昔王長虞延見稱前史吾雖寡徳竊懷景行以之獲罪彌所甘心諸囚荷恩並依限而至吏民稱其惠化秩滿將還部人李漆等三百餘人上表乞留更兩載詔雖不許甚嘉美之及撝入朝屬置露門學武帝以撝與唐瑾元偉王襃等四人俱為文學博士撝以母老表請歸養私門帝弗許尋以母憂去職歴少保少傅改封蔡陽郡公卒武帝舉哀於正武殿贈使持節大將軍大都督少傅益州刺史諡曰襄撝善草𨽻書名亞王襃筭數醫方咸亦留意所著詩賦雜文數萬言頗行於世子濟字徳成少仁厚頗好屬文為東中郎將從撝入魏周孝閔帝踐阼除中外府記室後至蒲陽郡守南平元襄王偉字文達文帝第八子也幼清警好學仕齊為晉安王驃騎外兵參軍武帝為雍州慮天下將亂來迎偉及始興王憺俄聞己入沔帝欣然謂佐史曰阿八十一行至吾無憂矣及起兵留偉行雍州府事及帝克郢魯下尋陽圍建業而巴東太守蕭惠訓子璝及巴西太守魯休烈起兵逼荆州蕭頴胄憂憤暴卒西朝兇懼徴兵於偉偉乃割州府將吏配始興王憺往赴之憺至璝等皆降齊和帝詔以偉為都督雍州刺史天監元年封建安王初武帝軍東下用度不足偉取襄鄉寺銅佛毁以為錢富僧藏鏹多加毒害後遂致惡疾十三年累遷為左光祿大夫加親信四十人歲給米萬斛藥直二百四十萬厨供月二十萬并二衞兩營雜役二百人陪先置防閤白直左右職局一百人以疾甚故不復出蕃而但加奉秩十五年所生母陳太妃薨號頓過禮水漿不入口累日由是惡疾轉增因求改封十七年改封南平郡位侍中左光祿大夫開府儀同三司大通四年為中書令大司馬薨贈侍中太宰諡曰元襄偉性端雅持軌度少好學篤誠趨賢重士四方游士知名者莫不畢至疾亟喪明便不復出齊世青溪宫改為芳林苑天監初賜偉為第又加穿築果木珍奇窮極雕靡有侔造化立游客省於其中梁蕃邸之盛無過焉而性多恩惠尤愍窮乏常遣腹心左右歴訪閭里人士有貧困吉凶不舉者即遣贍恤之平原王曼頴卒家貧無以殯友人江革往哭之其妻子對革號訴革曰建安王當必為營理言未訖而偉使至給其喪事得周濟焉每祈寒積雪則遣人載薪米隨乏絶者賦給之晚年崇信佛理尤精元學著二暗義製情性幾神等論義僧寵及周捨殷鈞陸倕並名精解而不能屈朝廷得失時有匡正子姪邪僻訓以義方斯人斯疾而不得助主興化梁政漸替自公薨云世子恪嗣恪字敬則𢎞雅有風則姿容端麗位雍州刺史年少未閑庶務委之羣下百姓每通一辭數處輸錢方得聞徹賔客有江仲舉蔡薳王臺卿庾仲容四人俱被接遇並有蓄積故人間歌曰江千萬蔡五百王新車庾大宅遂達武帝帝接之曰主人憒憒不如客尋以廬陵王代為刺史恪還奉見武帝帝以人間語問之恪大慙不敢一言後折節學問所歴以善政稱太清中為郢州刺史及亂邵陵王至郢恪郊迎之讓位焉邵陵不受及王僧辯至郢恪歸荆州元帝以為尚書令司空賊平為揚州刺史時帝未還都以恪宗室令譽故先使歸鎮社稷大寶三年薨于長沙未之鎮也贈太尉諡曰靖節恪弟恭字敬範天監八年封衡山縣侯初樂山侯正則有罪勑讓諸王獨謂元襄王曰汝兒非直無過並有義方歴位監南徐州事時衡州刺史武會超在州子姪縱暴州人朱朗聚黨反武帝以恭為刺史時朗已圍始興恭至緩服徇賊示以恩信羣賊伏其勇氣夜退三舎以避軍吏請追恭曰賊以政苛致叛非有陳吳之心緩之則自潰急之則迸力諸君置之明日朗遣使請降恭杖節受之一無所問即日收始興太守張寶生及會超弟之子子仁斬之軍門以其賄而虐也有司奏恭縱罪人專戮二千石有詔宥之遷湘州刺史善解吏事所在見稱而性尚華侈廣營第宅重齋歩閣模寫宫殿尤好賔友酣宴終辰坐客滿筵言談不倦時元帝居蕃頗事聲譽勤心著述巵酒未嘗妄進恭每以為勞神不如己之肆意也尋除寧蠻校尉雍州刺史恭至州政績有聲百姓請於城南立碑頌徳詔許焉名為政徳碑是夜聞數百人大呌碑石下明旦視之碑涌起一尺恭命以大柱置于碑上使力士數十人抑之不下又以酒脯祭之使人守視俄而自復視者竟無所見恭聞而惡焉先是武帝以雍為邊鎮運數州粟以實儲倉恭乃多取官米還贍私宅又典籖陳保印侵剋百姓為荆州刺史廬陵王所啓被詔徴還削爵土在都朝謁白服隨列帝問白衣者為誰對曰前衡山侯恭帝厲色曰不還我陳保印吾當白汝未已而保印實投湘東王王改其姓名曰袁逢恭竟不敘用侯景亂卒於城中詔特復本封元帝追諡曰僖侯子靜嗣靜字安仁少有美名號為宗室後進有文才而篤志好學既内足於財多聚經史散書滿席手自讐校何敬容欲以女妻之靜忌其太盛拒而弗納時論服焉然好戲笑輕論人物時以此少之位給事黃門侍郎深為簡文所愛賞太清三年卒贈侍中恭弟祇字敬謨美風儀幼有令譽天監中封定襄縣侯位東揚州刺史于時江左承平政寛人慢祇獨莅以嚴厲武帝悅之遷北兖州刺史太清三年侯景圍建業祇與從弟湘潭侯退謀起兵入援會州人反城應景遂奔東魏歴位太子少傅領平陽王師封清河郡公齊天保初授右光祿大夫領國子祭酒時元帝平侯景與齊通好齊文宣欲放祇等還南俄而西魏克江陵祇遂留鄴卒贈中書監車騎大將軍揚州刺史子放字希逸隨祇至鄴祇卒放居喪以孝聞服闋襲爵武平中待詔文林館放性好文詠頗善丹青多在宫中遂被寵待遷太子中庶子散騎常侍鄱陽忠烈王恢字𢎞達文帝第十子也幼聰頴七歲能通孝經論語義發摘無遺及長美風儀渉獵史籍仕齊位北中郎外兵參軍前軍主簿宣武王之難逃在都下武帝起兵恢藏伏得免大軍至新林乃奉迎天監元年封鄱陽郡王除郢州刺史加都督初郢城内疾疫死者甚多不及藏殯恢下車遽命埋瘞又遣四使廵行州郡境内大寧時有進筒中布者恢以奇貨異服即命焚之於是百姓仰徳累遷都督益州刺史成都去新城五百里陸路往來悉訂私馬百姓患焉累政不能改恢乃市馬千匹以付所訂之家須則以次發之百姓賴焉再遷開府儀同三司都督荆州刺史普通七年薨於州詔贈侍中司徒諡曰忠烈恢美容質善談笑愛文章有士大夫風則所在雖無皎察亦不傷物後有目疾久廢視瞻有道人慧龍得療眼術恢請之及至空中忽見聖僧及慧龍下針豁然開朗咸謂精誠所致恢性通恕輕財好施凡歴四州所得奉祿隨而散之在荆州嘗從容問賔僚曰中山好酒趙王好吏二者孰愈衆未有答者恢顧謂長史蕭琛曰漢時王侯蕃屏而已視事親民自有其職中山聽樂可得任性彭祖代吏近於侵官今之王侯不守蕃國當佐天子臨民清白其優乎坐者咸服有男女百人男封侯者三十九人女主三十八人世子範嗣範字世儀溫和有器識為衞尉卿每夜自廵警武帝嘉其勞苦出為益州刺史行至荆州而忠烈王薨因停自解武帝不許詔權監荆州及湘東王至範依舊述職遣弟湘潭侯退隨喪而下大同元年以開通劒道克復華陽增封尋徴為領軍將軍侍中範雖無學術而以籌略自命愛奇翫古招集文才率意題詠亦時有奇致後為都督雍州刺史作牧莅人甚得時譽撫循將士盡獲歡心於是養士馬修城郭聚軍糧於私邸時廬陵王為荆州既是都督府又素不相能乃啓稱範謀亂範亦馳啓自理武帝怒焉時論者猶謂範欲為賊又童謡云莫怱怱且寛公誰當作天子草覆車邊己時武帝年高諸王莫肯相服簡文雖居儲貳亦不自安而與司徒邵陵王綸特相疑阻綸時為丹陽尹威震都下簡文乃選精兵以衞宫内兄弟相貳聲聞四方範以名應謡言而求為公未幾加開府儀同三司範心密喜以為謡驗武帝若崩諸王必亂己既得衆又有重名謂可因機以定天下乃更收士衆希望非常太清元年大舉北侵初謀元帥帝欲用範時朱异取急外還聞之遽入白曰嗣王範雄豪蓋世得人死力然所至殘暴非弔民之材昔陛下登北顧亭以望謂江右有反氣骨肉為戎首今日之事尤宜詳擇帝黙然曰會理何如异對曰陛下得之臣無恨矣會理懦而無謀所乗􅀈輿施版屋冠以牛皮帝聞不悅行至宿豫貞陽侯淵明請行又以淵明代之而以範為征北大將軍總督漢北征討諸軍事尋遷南豫州刺史侯景敗於渦陽退保壽陽乃改範為合州刺史鎮合肥時景不臣之迹已露範屢啓言之朱异每抑而不奏及景圍都城範遣世子嗣與裴之高等入援遷開府儀同三司臺城不守範乃棄合肥出東關請兵于魏遣二子為質魏人據合肥竟不助範範進退無計乃泝流西上軍于嶷陽遣信告尋陽王大心大心要還九江欲共兵西上範得書大喜乃引軍至盆城以晉熙為晉州遣子嗣為刺史江州郡縣輙更改易於是尋陽政令所行唯在一郡又疑畏範市糴不通範乃復遣其弟觀寧侯永將兵通南川助莊鐵時二鎮相猜無復圖賊之意範數萬之衆皆無復食人多餓死範竟發背而薨衆祕不發喪奉弟南安侯恬為主有衆數千範將侯瑱襲莊鐵於豫章殺之盡併其軍乃迎喪往郡於松門遇風柩沉于水鈎求得之及于慶之逼豫章侯瑱以範子十六人降賊賊盡於石頭阬殺之世子嗣字長允容貌豐偉腰帶十圍性驍果有膽略倜儻不䕶細行而復傾身養士皆得死力範之薨也嗣猶據晉熙城中食盡將士皆乏絶侯景遣任約攻嗣時賊方盛咸勸且止戰嗣按劒叱之曰今日之戰乃蕭嗣効命死節之秋也及戰遇流矢中頸不許拔帶箭手殺數人賊退方命拔之應時氣絶妻子為任約所禽初範既與尋陽王大心相持及嗣之死猶未敢發範喪範弟諮字世恭位衞尉卿封武林侯簡文即位之後景周衞轉嚴外人莫得見唯諮及王克殷不害並以文弱得出入卧内晨昏左右天子與之講論六藝不輟於時及南康王會理事敗克不害懼禍乃自疏諮不忍離帝朝覲無絶賊惡之令人刺殺諮於廣莫門外諮弟修字世和封宜豐侯筋力貞固風儀嚴整九歲通論語十一能屬文鴻臚卿裴子野見而賞之性至孝年十二丁所生徐氏艱自荆州反葬中江遇風前後部伍多致沉溺修抱柩長號血淚俱下隨波揺蕩終得無他葬訖因廬墓次先是山中多猛獸至是絶跡野鳥馴狎棲宿簷宇武帝嘉之以班告宗室為兼衞尉卿初修兄嗣王範為衞尉夜中行城常因風便鞭箠宿衞欲令帝知其勤及修在職夜必再廵而不欲人知或問其故曰夜中警逴實有其勞主上慈愛聞之容或賜止違詔則不可奉詔則廢事且胡質之清尚畏人知此職司之常何足自顯聞者歎服時王子侯多為近畿小郡歴試有績乃得出為邊州帝以修識量宏達自衞尉出鎮鍾離徙為梁秦二州刺史在漢中七年移風改俗人號慈父長史范洪胄有田一頃將秋遇蝗修躬至田所深自咎責功曹史琅邪王廉勸修捕之修曰此由刺史無徳所致捕之何補言卒忽有飛鳥千羣蔽日而至瞬息之間食蟲盡而去莫知何鳥適有臺使見之具言於帝璽書勞問手詔曰犬牙不入無以過也州人表請立碑頌徳嗣王範在湓城頗有異論武陵王大生疑防流言噂􅊱修深自分釋求送質子并請助防武陵王乃遣從事中郎蕭固諮以當世之事具觀修意修泣涕為言忠臣孝子之節王敬納之故終修之時不為不義一夕忽有狗據修所卧牀而卧修曰此其戎乎因大修城壘承聖元年魏將達奚武來攻修遣記室參軍劉璠至益州求救於武陵王紀紀遣將楊乾運救之拜修隨郡王璠還至璠冢乃降于魏乾運班師璠至城下說城中降魏修數之曰卿不能死節反為說客邪命射之間信遣至荆州元帝遣與相聞修中直兵參軍陳晷甚勇有口求為覘候見獲以辭語被害乃遣諮議虞馨致武牛酒武謂曰梁已為侯景所敗王何為守此孤城修答守之以死誓為斷頭將軍魏相安定公宇文泰遣書喻之力屈乃降安定公禮之甚厚未幾令還江陵厚遣之以文武千家為紀綱之僕元帝慮其為變中使覘伺不絶於道至之夕命劫竊之及旦修表輸馬仗而後帝安修入覲望閤悲不自勝元帝亦慟盡朝皆泣尋拜湘州刺史長沙頻遇兵荒人戸凋弊修勸穡務本未期流人至者三千餘家元帝多忌宗室有問望者動加誅翦修靜恭自守埋聲晦迹元帝亦以宗屬長年深相敬禮及聞江陵被圍即日登舟赴救至巴陵西而江陵覆滅恭帝立遥授修太尉遷太保時梁室寢微修雖心圖義舉而力弱不能自振遂發背嘔血而薨時年五十二修弟泰字世怡封豐城縣侯歴位中書舎人傾財竭産以事時要遂得超遷為譙州刺史江北人情獷彊前後刺史並撫綏之泰至州徧發人丁使擔腰輿扇繖等物不限士庶有恥為之者即加杖責其多輸財者隨放免之於是人皆思亂及侯景至人無戰心城陷被執尋逃至江陵元帝平景以泰為兼太常卿桂陽内史未至郡屬于謹平江陵遂隨兄修於郢州及修卒即以泰為刺史湘州刺史王琳襲泰泰以州輸琳時陳武帝執政徴為侍中不就乃奔于齊齊用為永州刺史陳天嘉五年周大將軍權景宣畧地河南泰遂歸長安以名犯周文帝諱稱字焉拜開府儀同三司封義興郡公授蔡州刺史政存簡惠深為吏民所安卒官子寶嗣寶字季珍美風儀善談笑未弱冠名重一時隋文帝輔政引為丞相府典籖開皇中至吏部侍郎坐太子勇事誅泰弟退封湘潭縣侯位青州刺史建業陷與從兄定襄侯祗俱入東魏齊天保中位金紫光祿大夫卒子慨深沉有體量北人於南士中稱慨為長者好學善草隸書歴位著作佐郎待詔文林館卒於司徒從事中郎始興忠武王憺字僧達文帝第十一子也仕齊為西中郎外兵參軍武帝起兵憺為相國從事中郎與南平王偉留守齊和帝即位以憺為給事黃門侍郎時巴東太守蕭惠訓子璝等兵逼荆州蕭頴胄暴卒尚書僕射夏侯詳議迎憺行荆州事憺率雍州將吏赴之以書喻璝等皆降是冬武帝平建業明年和帝詔以憺為都督荆州刺史天監元年加安西將軍封始興郡王時軍旅之後公私匱乏憺厲精為政廣闢屯田減省力役存問兵死之家供其窮困人甚安之是歲嘉禾生一莖六穗甘露降于黃閤四年荆州大旱憺使祠于天井有巨蛇長二丈出遶祠壇俄而注雨歲大豐憺自以少年始居重任開導物情辭訟者皆立待符教决於俄頃曹無留事下無滯獄六年州大水江溢隄壞憺親率將吏冒雨賦丈尺築之而雨甚水壯衆皆恐或請避焉憺曰王尊尚欲身塞河隄我獨何心以免乃登隄歎息終日輟膳刑白馬祭江神酹酒於流以身為百姓請命言終而水退隄立邴洲在南岸數百家見水長驚走登屋緣樹憺募人救之一口賞一萬估客數十人應募洲人皆得以免吏民歎服咸稱神勇又分遣諸郡遭水死者給棺槥失田者與糧種是歲嘉禾生于州界吏民歸美焉七年慈母陳太妃薨水漿不入口六日居喪過禮武帝優詔勉之使攝州任是冬詔以本號還朝人歌曰始興王人之爹徒我反赴人急如水火何時復來哺乳我荆土方言謂父為爹故云後為中衞將軍中書令領衞尉卿憺性好謙降意接士常與賓客連榻坐時論稱之九年拜都督益州刺史舊守宰丞尉歲時乞丐躬歴村里百姓苦之習以為常憺至州停斷嚴切百姓以蘇又興學校祭漢蜀郡太守文翁由是人多向學者十四年遷都督荆州刺史同母兄安成王秀將之雍州薨于道憺聞之自投于地席藁哭泣不飲不食者數日傾財産贈送部伍大小皆取足焉天下稱其悌十八年徴為侍中中撫軍將軍開府儀同三司領軍將軍即開府黃閤薨二宫悲惜輿駕臨幸者七焉贈司徒諡曰忠武憺未薨前夢改封中山王策授如他日意頗惡之數旬而卒憺有惠西土荆州人聞其薨皆哭於巷嫁娶有吉日移以避哀子亮嗣亮弟暎字文明年十二為國子生天監十七年詔諸生口策宗室可否帝知暎聰解特令問策又口對並見奇謂祭酒袁昻曰此吾家千里駒也起家淮南太守以諸兄未有除命乃抗表讓焉暎美容儀普通二年封廣信縣侯丁父憂隆冬席地哭不絶聲不嘗榖粒唯飲冷水因患癥結除太子洗馬詔以憺艱難王業追贈國封嗣王陳讓既不獲許乃乞頒邑諸弟帝許之改封新渝縣侯後居太妃憂泣血三年服闋為吳興太守郡累不稔中大通三年野榖生武康凡二十二處自此豐穰暎製嘉榖頌以聞中詔稱美後為北徐州刺史在任𢎞恕民吏懷之常載粟帛遊於境内遇貧者即以振焉勝境名山多所尋履及徴將還鍾離人顧思遠挺义行部伍中暎見其甚老使人問之對曰年一百一十二歲凡七娶有子十二死亡畧盡今唯小者已六十又無孫息家闕養乏是以行役暎大異之召賜之食食兼於人檢其頭有肉角長寸遂命後舟載還都謁見天子與之言往事多異所傳擢為散騎侍郎賜以俸宅朝夕進見年百二十卒又普通中北侵攻穰城城内有人年二百四十歲不復能食榖唯飲曾孫婦乳簡文帝命勞之賜以束帛荆州上津鄉人張元始年一百一十六歲旅力過人進食不異至年九十七方生兒兒遂無影將亡人人告别乃至山林樹木處處履行少日而終時人以為知命湘東王愛奇重異遂留其枕暎後歴給事黃門侍郎衞尉卿廣州刺史卒官諡寛侯暎弟煜字通明美姿容善談吐初封安陸侯憺特所鍾愛及憺不豫煜侍疾衣不釋帶言與淚并憺薨扶而後起服闋改封上黃侯位兼宗正卿簡文入居監撫煜獻儲徳頌遷給事黃門侍郎出為晉陵太守美才仗氣言多激揚常乘折角牛榖木履被服必於儒者名盛海内為宗室推重特被簡文友愛與新渝建安南浦並豫密宴號為東宫四友簡文日有五六使來往煜初至郡屬旱躬自祈禱果獲甘潤郡雀林村舊多猛獸為害煜在政六年此暴遂息卒于郡初寢疾歴年官曹壅滯有司案諡法言行相違曰替乃諡替侯通志卷八十三上
