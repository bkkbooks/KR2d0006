body:
  text: 通志卷三十二宋右迪功郎鄭樵漁仲撰六書略第二會意第三上序曰象形指事文也會意字也文合而成字文有子母母主義子主聲一子一母為諧聲諧聲者一體主義一體主聲二母合為會意會意者二體俱主義合而成字也其别有二有同母之合有異母之合其主意則一也社説文地主也春秋傳曰共工之子句龍為社神一曰周禮二十五家為社各植其土所宜之木祟雖遂切神之變也又説律切祝職救切詛也又之六切告神之語瑞説文以玉為信也從玉專徐鍇曰專諦也班分瑞玉也故從刀斑駁文也􅕈房六切説文車軨間皮篋古者使奉玉以藏之又筆力切又蒲蒙切毒徒沃切厚也害人之草從草從毒熏篆作􅝪説文火煙上出也從草從黑草黑􅝪象也又吁運切灼也搜草名説文茅搜茹藘人血所生可以染綘芟除草也春篆作萅説文推也從草從日草春時生屯聲苗稼生曰苗又説文草生於田者若説文擇菜也從草右右手也尖壯咸切鋭也火形鋭鮮思淺切説文是少也又宣遇切或作鮮􅀢乃后切乳子也􅀢思嗟切少也番符袁切又補過切獸足謂之番從采從田象足履於田也寀式荏切説文悉也寀寀諦也徐鍇曰宀覆也采别也包覆而深别之篆文作審悉息七切盡也古作息􅠅樞玉切抵也古作牪奔逋昆切牛羣走也郎刀切間養牛馬圈也此象圈養之狀説文謂從牛冬省取其四周匝之説謬矣或從穴告牛觸人角著橫木也吹吹氣也吽於金切牛鳴咶火夬切又呼刮切息也又胡化切言也喜許已切又許記切悅也或作憘歖名説文自命也從口從夕夕者冥也冥不相見故以口自名臣按此説非也大凡義理但見其説不徑直即不為實義名從口見義從夕見聲啓遣禮切説文開也咸説文皆也從口從戌戌悉也各説文異辭也從口夂夂者有行而止之不相繼也臣按在上為夂陟紀切在下為夂音綏則有行義吉善也從士從口士君子之口無非善言咠即入切咠咠語也或作又七入切詩咠咠幡幡又一入切哲今作哲智也古亦作嚞牛刀切喧也或作囂又虛嬌切息郎切從哭亡𨽻作喪又四浪切企遣爾切舉踵也整齊也從敕從正連説文負連也一曰連屬又力展切難也易往蹇來連又連彥切及也道説文所行道也一達謂之道又大到切逐追也又亭厯切速也易其欲逐逐又直祐切奔也山海經夸父與日逐一曰牝牡合今作遠御諒文使馬也徐鍇曰卸解車馬也或彳或卸皆御者之職古作又魚駕切相迎也衟杜皓切所行道也又大到切導引也熒絹切説文行且賣也或從元齔楚引切博雅毁齒謂之齔又初堇切説文男八月生齒八歲而齔女七月生齒七嵗而齔以齒從匕或作齓符轅切説文獸足謂之􅀢蒲孟切􅀢踏地聲從鼓聲也扁補典切説文署也從戶册戶册者署門戶之文也一曰不圓為扁甜徒兼切美也􅀈託盍切啜也或從習又託協切犬小郤乞約切説文節欲也一曰退也或作却協胡頰切説文衆之和同也從劦從十徐鉉曰十衆也古作協或作叶幵子元切事之制也話説文合會善言也傳曰告之話言或作話設式别切説文施陳也從言從殳殳使人也乙力切説文快也信信無所立惟馮人言誓時制切説文約束也蓋誓之以言謠餘招切説文徒歌或作謠謠又夷周切或書作􅀈計説文會也又吉屑切畫也討從言從寸言責也寸法度也責以法度訥奴骨切言不出唬虛訝切誑也又乎刀切號也諰想止切又所佳切思意一曰語失競渠慶切言之爭也古作篆作𨽻作競譶直立切譅言不止也又達合切説文直言也叢徂聰切聚也從聚省又徂外切從最省叢木灌木也舁以諸切並舉也又茍許切興虛陵切説文起也從羿從同同力也與演女切説文黨與也或作又羊茹切及也渠容切説文所以支鬲者從爨省從鬲省又古勇切又茍許切䨣匹各切説文雨濡革也􅀈人移切有骨醢也鬲狼狄切鼎屬實五觳斗二升象腹交文三足􅀢居行切五味香鬻也從羮省孚芳無切説文卵孚也從爪從子説者鳥伏子常以爪反覆其卵古作􅀢又方遇切育也方言雞伏卵而未孚􅣃胡畎切試力士鑄也閙擾也或作取説文捕取也周禮獲者取左耳故從又從耳司馬法載獻聝聝耳也秉説文禾束也從又持禾或曰粟十六斛曰秉友説文同志為友從二又相交友也篆作㕛叒日灼切二又為友三又為叒所助者多故為順也肅説文持事振敬也從聿在􅘢上戰戰兢兢也􅩎對鄰切筆飾也俗以書好為􅩎從彡有文也臤苦間切又邱寒切説文堅也即古文賢字從臣從又臣能致力也臥吾貨切説文休也從人臣取其伏也或作卧㲃居又切揉屈也從殳從古文叀字祋丁外切説文殳也或説城郭市里髙挂羊皮有不當入而欲入者暫下以驚牛馬曰祋故從示殳引詩何戈與祋役説文戍邉也古文道字􅵘方斂切説文傾覆也從寸從巢省寸人手也或曰即貶損之貶得牛代切止也出浮屠書又有得音從旦從寸攸説文行水也又以九切從支從人水省徐鍇曰支入水所杖也敗毁也古作贁寇説文暴也從支從完敬説文肅也牧養牛人也平祕切説文具也從用苟省徐鉉曰苟急敕也𨽻作􅀢火劣切舉目使人也又莫結切又七役切目小動又忽域切況晚切説文大視也從大􅀢取委逺切從目也又塢管切烏括切説文捾目也從目叉聑昵格切耳目不相信也相思將切説文省視也引易地可觀者莫可觀於木詩曰相鼠有皮又息亮切眀眉兵切視瞭也盲目亡眸子達合切説文目相及也從目從隸省聅式荏切視也又舒閏切開闔目數搖也窅伊鳥切又音於交切深目也音域輒切説文光也𨽻作曄􅀈古冗切又一決切説文目深貌䁊女利切又烏括切説文深目貌一曰塞也瞐黑角切美目一曰目深􅀢舒仁切引目煛畎逈切大目也許尤切目多汁省息井切目翳也與眚同又視也又所景切簡也説文從眉省􅚛扶發切盾也䫁毗志切犬初生子一曰首子臭尺救切説文禽走臭而知其迹者犬也或作臰臰腐氣也皆居諧切説文俱詞也從比從自或省迄洽切息或從夾從合䶎􅦃也研計切説文羽之風亦古諸侯一曰射師臣按從幵音堅堅也射所以破堅也從羽箭必以羽有窮國君翟直格切矩名又直角切鳥名莫大羽託盍切説文飛盛貌從曰曰即冒也瞢木空切説文目不明也從首從眴眴目數搖也又眉耕切無眸子也蔑莫結切説文勞目無精也從首人勞則蔑羶尸連切羊臭也又羊間切羶牛間切羊臭羌説文西戎牧羊人也從人從羊南方蠻閩從蟲北方狄從犬東方貉從豸西方羌從羊此六種也西南僰人僬僥從人蓋在坤地頗有順理之性東夷從大大人也夷俗仁仁者夀有君子不死之國孔子曰道不行欲之九夷乘桴浮於海有以也古作羮五味􅀢鬻也􅀈寵戀切羊長尾一曰羊棧也羼初限切羊相厠也一曰相出前也又初莧切一曰傍入曰羼從屋省羸力為切羊瘦者也靃呼郭切説文飛聲也兩而雙飛者其聲靃然雙隹二枚也從又持之也雧秦入切説文羣鳥在木上也或省鳴鳥聲也又眉病切相呼也瞗當侯切瞗瞗鳥名人面鳥喙有翼不能飛又丁聊切目熟視也雀即約切説文鵂鶹别名􅖨於蚪切説文微從􅖨二么又津之切黑也兹古作􅖨兹説文黑也引春秋傳何故使吾水兹幾説文微也殆也從􅖨從戌戍兵守也􅖨而兵守者危也古作幽説文隱也舉起切問數也幾古作龍都切黑弓也妙于達切小意魯果切説文畜産疫病也昨間切禽獸所食餘也側八切字林天死也或作又子列切死從歹從人人之殘也或曰從匕聲别皮列切分解也肥説文多肉也徐鉉曰肉不可過多故從卪脆此芮切説文小耎易斷也從肉從絶省或作膬財于切禽獸食餘也肰如延切説文犬肉也俎説文禮俎也從半肉在且上肘説文臂節也刕憐題切裂也初裁衣之始利説文銛也從刀和然後利從和省引易利者義之和臣按從刀從禾二母相合以刀取禾也古作則説文等畫物也從刀從貝貝古之物貨也按今人稱金之劑曰則一曰法也古作籕從鼎刪師姦切説文剟也從刀從册以刀削書也罰説文罪之小者從刀從詈未以刀有所賊但持刀罵詈則應罰釗之遙切説文刓也周康王名又弩機魝古屑切楚人謂治魚人刓吾官切説文剸也或作刓胡瓜切舟進竿謂之划又古火切割也又古卦切鎌也觲思營切説文用角低昻便也引詩觲觲角弓或少省解舉蟹切説文判也從刀判牛角􅠅今作觸説文抵也亦作􅀈等得肯切説文齊簡也從竹從寺寺官曹之等平也筮時制切説文易卦用蓍也從竹從古巫字簋矩鮪切説文黍稷方器也從竹從皿從艮算蘇貫切説文長六寸計厯數者從竹從弄常弄乃不誤也筋説文肉之力也臣按從竹從肋惟竹肋多筋絲所以為筋之主故説文曰竹物之多筋者典説文五帝之書也從册在丌上尊閣之也莊都説典大册古作􅥯奠堂練切説文置祭也從酋酋酒也下其丌也禮有奠祭者覡胡狄切説文能齋肅事神也男曰覡女曰巫從見見音睍甚食荏切説文尤安樂也從甘匹匹耦也古作􅀢沓達合切語多沓沓也遼東有沓縣一曰合也從水者象多言之人口出涎沫暜今作替説文廢一偏下也按從並一上而一下也從曰告也尌上主切説文立也從壴從寸持之也鼓説文從壴支象其手擊之也臣按從𠬢土刀切説文於弓韜則曰從𠬢𠬢垂飾與鼓同意􅀢補蒙切鼓舞􅀢徒東切鼓聲從角者鼓作而角鳴也䥢虛冬切鼓聲從金者鼓作金止託合切鼓鼙聲從缶擊鼓擊缶聲為同類𨽻作登説文禮器也從廾持肉在豆上篆作從􅀈象肉在豆中之形豑直質切説文爵之次第也故從書平豑東作或從失虔説文虎行貌按此從文當有虎文之義暴薄報切強侵也周官有司暴覤乞逆切覤覤驚懼貌贙胡犬切説文分别也從虤對爭貌也一曰獸名出西海大秦國似狗多力獷惡也又熒絹切盈説文滿器也從􅣃􅣃音姑古者以買物多得為􅣃益説文饒也從水皿皿益之意也女六切説文出血也盩張流切説文引擊也從羍支見血也轄臘切説文覆也一曰何不也𨽻作盍􅀈他官切黃色靗癡貞切從穴中正見也青光者隙穴之明也或作靗靘千定切􅀈靘青黑色阱疾正切陷也或作汬食説文一米也從皀集聲或説從皀也􅀈居夷切餓也飼祥吏切説文糧也從人食餐七安切説文吞也又蘇昆切水沃飯也飱蘇昆切説文餔也謂晡時食或作餐餐又千安切説文吞也􅕆求位切説文餉也饋古作􅕆􅀈牛據切餞也蝕實職切敗食也侖龍春切説文思也從集從册籕作籥􅀢僉説文皆也從集從口從從引虞書僉曰伯夷按此吅從無義但集人口之多耳佱方合切古文法字從集從正合曷閣切説文合口也巨險切約也好合人也故未成僉會合也從人從曾省曾益也倉説文榖藏也從食省從口奇字作全屳相然切山居長往也又虛然切輕舉也㞥徂針切説文入山之深也䍃餘招切廣雅瓶也又夷周切説文瓦器也按從肉藏肉器􅯐去冀切皿也器或作􅯐從器省是時也從日從正日辰也正其辰也篆作是又田黎切醯呼雞切説文酸也作醯以以酒從酒並省射説文弓弩發於身而中於遠也篆作射從寸寸法度也食亦切又寅謝切􅀢昨木切矢鋒也或作􅀢􅀢虛交切灌也髜輕皎切高也􅀢余封切從享從自自鼻也知臭香所食也按此與同體即烹飪調庸之義或作庸從庚庚乃烹飪器􅀢以烹為主借為庸用之庸後人不知但識借義而已􅙯常侍切説文熟也從享從芈按從享普庚切一曰鬻也篆文作徒南切説文長味也引詩實覃實訏從鬲從鹹省或不省古作􅀢􅀢厚𨽻作厚説文邱陵之厚也從􅫇從廠嗇𨽻作嗇説文愛澀也從來麥也從廩受麥之府也故田夫謂之嗇夫古作嗇啚補美切説文嗇也從口廩廩受也夌閭承切説文越也從冬從􅀢􅀢高也竷苦感切説文繇也舞也樂有章從章從降從夂引詩竷竷舞我􅀢烏代切夂行也心之行也畟初力切説文治稼畟畟進也引詩畟畟良耜按此從夊從界省説文從田從人夂誤矣又節力切㯥臧曹切月出門也從二東曹字從此梟堅堯切説文不孝鳥也日至捕梟磔之從鳥首在木上休息止也從人依木臬五結切射凖的也從木從劓省又九芮切采取也柝破木也床説文安身之坐者杏説文果也從木可省聲按從可亦不得聲從口木實之可食者林從二木木多為林説文平土有叢木曰林森説文木多貌從林從木彬悲巾切説文文質備也又逋還切采明也梵房丸切木得風也疑從風省野以者切郊外也古作壄􅷺虛檢切􅷺􅷺蔭也􅀢盧感切悲愁兒一説林木君子所感故宋玉曰入林悲心或從心敖牛刀切説文出遊也從出從放篆作敫􅀢莫懈切説文出物貨也從出從買𨽻作賣􅀢戈灼切岸上出見貌􅀈博蓋切行兒詩赤芾在股今二芾相從自為行也索昔各切説文草有莖葉可作繩從􅜨系孛蒲妹切説文也從􅜨人色也從子引論語色孛如也又薄沒切色惡也甡疏臻切説文衆生並立之兒引詩甡甡其鹿眚古文姓字華户瓜切説文榮也從草從􅒧𨽻作華剌郎逹切説文戾也從束從刀刀者刺之也囚徐由切説文繫也從人在口中囷區倫切説文廩之圜者圜謂之囷方謂之京􅂒女蟹切博雅母也圂胡囷切説文厠也從口象豕在口中也困苦悶切説文故廬也從木在口中囚昵立切囚囚私取物又昵洽切説文下取物縮藏之囝九件切閩人呼兒曰囝又魚厥切闕也太隂之精圉魚舉切説文囹圄所以拘罪人從㚔從口買毋蟹切説文市也從网貝引孟子登龍斷而网市利賵撫鳳切贈死之物贄脂利切説文至也引周書大命不􅧈亦作贄員于權切物數也徐鍇曰古以貝為貨故數之𨽻作貟籕作郵説文境上行書舍從邑垂垂邊也􅣑從邑相向説文鄰道也𨽻作卶胡降切􅀈胡降切説文里中道也篆省作巷𨽻省作巷昍許元切明也昆公渾切説文同也昏呼昆切説文日冥從氏省昌尺良切説文美言也從日從曰一曰日光也引詩東方昌矣籕作昌曇徒南切雲布謂之曇暔那含切國名唐天寶中封其王為懷寧王暹思廉切日光升也普滂古切説文日無光徐鍇曰無光則逺近皆同故從並昶丑兩切通也又丑亮切達也昢普罪切日未明兒又普沒切顯呼典切説文衆微杪也從日中視絲一曰頭明飾也又五合切㫐伊鳥切説文望逺合也從日匕匕合也􅀢子皓切説文晨也從日在甲上𨽻作早炅畎逈切見也或作昋又音涓惠切戈笑切光也或從光晉即刃切易明出地上晉説文進也日出萬物進從日從臸𨽻作晉暴薄報切説文晞也從日從出從收從米或作暴是夏古作是言曰於是乎正也㫘莫筆切説文不見也昔𨽻作昔説文乾肉也從殘肉日以晞之旋旬宣切説文周旋旌旗之指麾也從偃從匹匹足也斿亦作遊旌旗之旓旅説文軍之五百人為旅從偃從久從俱也古作􅨞族説文矢鋒也束之族族也從偃從矢一曰聚也晶説文精光也從三日古作品子盈切又為古文日字朏普乃切又芳尾切説文月未盛之明從月引周書丙午朏明照也明古作明奣苦礦切明也又古猛切卯於阮切説文轉卧也從夕從卪臥有卪也今作夙説文早敬也從持事多説文重也從重夕夕者相繹也故為多􅰲𨽻作粟説文嘉穀實也栗力質切説文木也其實下垂故從􅓒􅀈𨽻作兼并也從又持秝兼持二禾秉持一禾􅔋忙皮切􅔋穰地名在今秦州秦説文伯益之後所封國地冝禾從禾舂省一曰秦禾名籕作􅀢科説文程也從禾從斗斗者量也䆀母罪切禾傷雨􅣴徐醉切説文禾成秀也人所以收從爪禾鞂訖黠切禾稿去其皮祭天􅀢説文芳也從黍從甘春秋傳黍稷馨香𨽻省作香䊆巨九切説文舂糗也􅀢郎逹切博雅研也􅤖蘇旰切説文分離也從支林林分散之意古作救又顙旱切麻分也麻説文與林同人所治也從廣在屋下宗説文尊祖廟也容説文盛也從宀谷徐鉉曰屋與谷皆所以盛受也安説文靜也從女在宀下家説文居也從穴豭省臣按説文從豭省疑非也家與牢同意家豕居後人用為室家之家牢牛屋後人用為牢獄之牢寧奴丁切説文安也從宀心在皿上人之飲食器所以安人冗乳勇切説文散也從宀人在屋下無田事引周書宮中之冗食寡説文少也從宀從頒頒分賦也故為少宰子亥切説文罪人在屋下執事者從宀從辛辛罪也守始九切説文寺官也從宀從寸寺府之事者從寸寸法度也宦胡慣切説文仕也一曰閹人虛訝切也亦作罅向説文比出牖也從宀從口引詩塞向墐户徐鍇曰牖所以通人氣故從口定説文安也從宀從正古作正實説文富也從宀貫貫貨貝也宋説文居也一曰木者所以成室以居人也故從宀從木竄七丸切穴兒又取亂切匿也穿説文通也從牙在穴中或從身窔一呌切深也突陀沒切説文犬從穴中暫出也從犬在穴中方言江湘卒相見曰突一曰出貌􅀢烏八切穿也餘招切痤疾名疢丑刃切熱病㿓訖洽切創也一曰獸足病謂之㿓又乞洽切按此從足從瘞省最祖外切説文犯而取也從日從取𨽻作冒説文蒙而前也從冃從目同説文合會也從目從口徐鉉曰同爵名也引周書太保受同嚌故從口冡莫紅切説文覆也從􅜪豕羅説文以絲罟鳥也從网從維古者芒氏初作羅罪説文捕魚竹网從网非秦以罪為罪字詈説文罵也從网從言网罪人簾鋤臻切幕也又離鹽切酒家幟又一呌切􅀢脂利切博雅鞶􅀢巾也又輸芮切皎吉了切白也又薄陌切皛烏鳥切説文顯也從三白陟几切説文針縷所紩衣從丵省徐鉉曰丵衆多也言針縷之工不一伊説文商聖人阿衡尹治天下者擬魚其切感也又偶起切説文僭也一曰相疑㚢農都切奴婢皆古之罪人古文奴從人或作僅信思晉切説文誠也仁從人從二徐鉉曰仁者兼愛故從二古作忎真説文仙人變形臣按從匕從具變化之具也仚馨煙切説文人在山上又虛延切輕舉也又虞為切危也件説文分也牛大物故可分咎其九切説文災也從人從各者相違也企去智切説文舉踵也或從足位于纍切説文列中庭之左右謂之位付方遇切説文與也從寸持物對人債側賣切逋財也信思晉切説文誠也信古作侃墟旴切剛直也伏房六切伺也儥徒谷切又余六切説文賣也又他督切買也佩蒲妹切説文大帶佩也從人從凡從巾佩必有巾巾謂之飾便毗連切説文安也人不便更之卬五剛切説文望欲有庶及也從從卩詩曰高山卬止今作仰頃去營切説文頭不正也臣按從頁從匕飯匕之匕其形不正卓篆作説文高也早匕為卓匕口為卬皆同義衆説文多也從豕目衆意䠳癡鄰切走兒殷説文作樂之盛稱從㐆從殳易曰殷薦之上帝孝説文善事父母者從老省從子子承老也耊徒結切説文年八十曰耊從老省從至筆逋密切所以書説文秦謂之筆或作筆敮俱為切臿也尸升脂切説文終主從尸從死一曰在牀曰尸㞋人善切説文柔皮也按此從皮省從又又者以手柔之也莫白切履也青絲頭履從履省從糸屋説文居也從尸尸所主也一曰尸象屋形從至至所至止屋室皆從至籕作屋或作臺尿今作尿人小便也從尾從水奴弔切般逋潘切説文辟也象舟之旋從舟從殳殳所以旋也俞容朱切説文空中木為舟也從集從巜從水也􅀈五忽切説文船行不安也從舟從則省兄呼榮切説文長也從口從兒臣謂從口所以訓子弟也又訏放切古況作兄也先蘇前切説文前進也從兒從之見説文視也從兒從目莫逄切説文突前也徐鉉曰􅜪重覆也􅀈􅜪而見是空前也又莫報切觸也䙷的則切説文取也從見從寸寸度之亦手也𨽻作得䨳虛器切見雨止息也規居隨切説文有法度也從夫從見覞弋笑切説文並視也從二見古作􅀈款説文意有所欲也從欠窾省徐鉉曰窾塞也意有所欲而猶塞款款然許其切説文卒喜也從欠從喜涎徐連切説文慕欲口液也從欠從水盜大到切説文私利物也從涎涎欲皿也􅀈須衮切選具也又蘇囷切煩符袁切説文熱頭痛也俯匪矩切説文低頭也從頁逃省太史卜書俯仰字如此徐鉉曰俯首逃亡之貌䐓而由切説文面和也皓下老切説文白貌從頁從景引楚詞天白皓皓商山四皓白首人徐鉉曰景日月之光明白也頪盧時切説文難曉也從頁米一曰鮮白貌從粉省奤普伴切面大􅀈呼內切面多肉稽康禮切下首也説文謂從首旨非也從詣省􅀈耳由切面和也從肉從百縣胡涓切繫也從系持大凡切説文􅎒也從首從斷又旨沇切􅀈彼眷切更也變古作􅀈髟説文長髮猋猋也從長從彡彡師銜切􅀢陟賄切假髻巵説文圜器也一名􅀈所以節飲食象人卪在其下也引易君子節飲食印説文執政所持信也從從卩乙力切與印相向成文説文按也𨽻作抑艷麗而豐也危説文在高而懼也從厃自卪止之説文少也從包一旬説文遍也十日為旬從包日勽薄皓切説文覆也從包覆人掬説文在手曰掬從包米俗作掬昜與章切從旦從勿謂太陽自朝而升勿勿然而渙散嵩思融切中嶽嵩高山古作崇刷所劣切説文拭也從又持巾在尸下畫篆作畫胡麥切説文界也象田四界聿所畫之􅀈今省作虐説文殘也從虎足反爪人也殸籕文磬字從殳擊之乃有聲焉矗初六切直兒幵古賢切説文平也象二干相對上平也冤於袁切説文屈也從兔從坰兔在坰下不得走益屈折也戾説文曲也從犬出戶下戾者身曲戾也今作糞説文棄除也從廾推華棄采也官溥説似米而非米者矢字華北潘切龍輟切説文撮也從􅗸從已徐鉉曰已者物也又爪撮取之陟刃切登也從下從門下其門所以為登也臦音誑説文乖也從二臣相違看邱間切説文睎也從手下目臣按今人視遠物多以手掌於目上蔽日曜右四百五十二會意第三下庫説文兵車藏也從車在廣下廛説文一畝半一家之居臣按此從廣從里從坴省説文從廣里八士誤矣庶之奢切篆作庶厨也遏也從廣從炗炗即光字謂光為廣所蔽也又傷注切説文屋下衆也釐澄延切一畝半一家之居砅鄰知切履石渡水也又力制切詩深則砅􅀢蒲孟切􅀢石聲或從彭沯子末切水激石貌豦求於切説文鬪相丮不解也從豕虍豕虍之鬪不相捨引司馬相如説豦封豕之屬一曰虎兩足舉又居御切獸名爾雅豦迅頭大如狗似獮猴黃黑色多髯鬛好奮迅其頭䖶呼回切豕發土也􅔀丁候切又竹角切龍尾星東方星也從龍省􅀈株玉切豕絆足行貌又丑玉切豚小豕也今作肆説文屬引虞書類于上帝豕走也從從豕省驫悲幽切説文衆馬也又卑遙切衆走又仕戢切􅀈丑郢切今作騁説文直馳也古作􅀈􅀈莫後切畜父也闖丑甚切馬出門貌又丑禁切馭使馬也粗食胡切説文行超逺也從三鹿又作麁􅀈盧谷切獸皮有文貌薦作甸切説文獸之所食草古者神人以薦遺黃帝帝曰何食何處曰食薦夏處水澤冬處松柏或從豕法方乏切説文刑也平之如水從豸所以觸不直者去之從去省文作法􅀢池鄰切説文鹿行楊土也或省作塵毚士咸切説文狡兔也兔之駿者從㲋兔芳遇切説文疾也從三兔又匹陌切婏芳萬切説文兔子也婏疾也從女兔逸夷質切説文失也從辵兔猋卑遙切説文犬走貌居六切説文㺒也從犬狧甚爾切以舌取物又訖合切説文犬食也獄説文確也從㹜從言二犬所以守也古作圁狺魚巾切犬吠聲楚辭猛犬狺狺猇虛交切虎聲又乎包切犬聲吠房廢切犬鳴也􅀢鄰蕭切又力照切説文柴祭天也從火從眘眘古愼字祭天所以愼灰呼回切説文死火餘㶳從火從又又手也火既滅可以執持紆冒切又音紆勿切説文從上案下也從􅊂又持火以尉申繒𨽻作尉􅀢兹消切説文灼龜不兆也引春秋傳龜􅀢不兆或書作􆀻㶾卑遙切説文火飛也篆作爂從與􅞳同意㶴敞爾切説文盛火也逹員切蟲入火貌爂卑遙切輕脆也從火爨省滅翾劣切説文滅從火戌火死於戌陽氣至戌而盡引詩赫赫宗周褒姒滅之臣按從火從戌戌聲也未必有義杰巨列切􅀈杰梁四公子名焸火逈切火光焚符分切火灼物也或作樊符袁切説文燒田也狊扄閴切説文視貌一曰大視光説文明也從火在人上光明意也古作熒燅徐鹽切於湯中瀹肉從炎從熱省又徐心切黑説文火所熏之色也從炎上出古窗字篆作黑炙説文炮肉也從肉在火上之石切􅀈徐廉切湯中瀹肉從熱省赫説文火赤貌奄説文覆也大有餘也又欠也從大從申展也又於瞻切精氣閉藏也夷説文平也從大從弓東方之人也㚚口觚切大也􅀢土皓切長大也又叨號切奓今作奢張也籕從多奓又敞爾切契説文木約也引易後代聖人易之以書契篆作報説文當罪人從㚔服罪􅀢下耿切説文吉而免凶也從屰從夭夭死之事故死謂之不􅀢𨽻作幸一今作緼説文一一也從凶從壷不得泄凶也引易曰天地絪緼奏説文奏進也從􅀢從廾從屮屮上進之義澤古老切説文大白澤也從大從白古文以為澤字平祕切説文壯大也從三大三目二目為三目為益大也一曰迫也詩曰不醉而怒謂之惢寸規切又寸纍切又損果切説文心疑也從三心又將支切善也慶説文行賀人也從心從夂吉禮以鹿皮為贄故從鹿省􅧴師姦切又思廉切説文嫉利口也從心册引商書相時􅧴民徐鍇曰册言衆也意説文從心從音察言而知意也悶母本切煩也怣于求切異也尤古作怣盧感切悲愁貌一説林木君子所感故宋玉曰入林悲心忍魚記切説文怒也息説文喘也按此從心從自自即鼻也順殊閠切説文理也順古作順􅀈子宋切水激石貌涉徒行厲水也水行也從水㐬㐬音突忽也篆文從水􅀢色入切不滑也或作澀澀溺昵角切沒也莊子大浸稽天而不溺溺或作溺又乃歷切􅀈須閠切從水谷通川也須呼內切説文灑面也或作頮溼失入切説文幽溼也從水一所以覆也覆而有土故溼也雍於容切説文四方有水自雍城池者籕作􅳓又巨勇切揭塞也灥詳遵切又從緣切又取絹切雨而泉出􅀈莫獲切説文血理分邪行體者籕作􅀈亦作脈覛莫狄切説文邪視也籕作􅀈或作覓濬私閠切深通川也從谷從殘地坑坎意也虞書曰濬畎澮距川又逵員切冰筆陵切水堅也冬都宗切説文四時盡也從仌從夂夂古文終字古作􅀢屚郎豆切説文屋穿水下從從雨從屋省霍忽郭切飛聲也一曰揮霍猝遽也䨣匹各切説文雨濡革也霅直甲切説文霅霅震雷貌一曰衆言也䨳虛器切見雨而止息􅦏語居切二魚也又訛胡切魚之大者𩼋逆怯切魚盛貌魝語計切又吉削切説文楚人謂治魚人鮮相然切説文新魚精也從三魚不變魚按今人以小魚為鮮從魚之多也漁牛居切捕魚也龖徒合切飛龍也從二龍䨿疾盍切惡也孔説文通也從乙從子乙請子之候鳥也乙至而得子嘉美之也古人名嘉字子孔乳而主切説文人及鳥生子曰乳獸曰産從孚從乙乙者元鳥也明堂月令元烏至之日祠于高禖以請子故乳從乙請子必以乙至之日者元鳥春分來秋分去開生之候鳥帝少昊分司之官也又儒遇切育者也乿澄之切理也臸人質切到也從二至􅀢丑利切忿戾也從至至而復遜遜遁也周書曰有夏氏之民叨􅀢古作􅀢又質利切肁治小切説文始開也從戶從聿徐鉉曰聿者始也扇説文扉也從戶從翅省一曰竹曰扇又尸連切搖翣也開𨽻作開説文張也篆從幵間居間切説文隟也從門從月徐鍇曰門夜閉閉而見月光是有間隟也閃失冉切説文窺頭門中也從人在門中閉説文闔門也從門才所以拒門闑魚列切説文門梱也閦初六切衆在門中聮陵延切説文連也從耳耳連於類也從絲絲連不絶之貌也耿古幸切説文耳著頰也從耳烓省杜林説耿光也從光聖省耷德蓋切大耳曰耷􅀈仍吏切聽音也聅刺列切説文軍法以矢貫耳也引司馬法小罪聅中罪刖大罪剄聶昵輒切説文附耳私語也聑的協切説文安也又陟膈切耳堅貌拜布怪切説文首至地也楊容説拜從兩手下摯脂利切説文握持也承辰陵切説文奉也受也從手從卩從收折之列切又食列切説文斷也奻居還切説文訟也從二女又音女患切喧詔也姦私也威説文姑也從女從戍引漢律文曰婦告威姑一曰有威可畏也如説文曰隨也按從女從口女子之口惟從命奴説文奴婢皆古之罪人也引周禮其奴男子入于罪𨽻女子入于舂藁妿於何切説文女師也杜林説加教於女婁郎侯切説文空也從母中女空之意也一曰婁務也臣按此與孟子摟則得妻之摟同婁是本文桃婦人也好許皓切説文美也從女子通作􅀈婦説文服也從女持帚灑掃也愧齒九切説文可惡也古作愧又基位切説文慙也委説文委隨也從女從禾妻説文婦與夫齊者也從女從卜從又又持事妻職也嫋乃了切説文娟也又回灼切弱也毐遏在切人無行也從土從母賈侍中説秦太后與嫪毐淫坐誅故世罵淫曰嫪毐又鋪枚切又於開切戔昨千切説文賊也從二戈周書曰戔戔巧言又楚限切搗傷也􅞯今作戎説文兵也找胡瓜切舟進竿謂之划或從手􅚛房越切盾也戛訖黠切説文戟也從戈從􅔣訖逆切説文有枝兵也引周禮長丈六尺從戈從幹省或作戟我五可切説文施身自謂也或説我頃頓也從戈從或説古垂字一曰古殺字臣按許氏如此之説不知我之於六書為何義乎我也戌戚也戊也皆從戈有殺伐之意説文不知會同取義而其説枝離況我既從殺古文成又從刀此為殺之義何疑又借為吾我之我許氏惑於借義朚眉耕切目無眸子或作􅀢又莫更切朚倀失道貌丐古代切説文氣也逯安説亡人為丐或作丐丐又居謁切求也匠説文木工也從匚從斤斤所以作器也􅛩吾化切施瓦於屋也韜他刀切説文弓衣也弜其兩切説文強也從二弓又翹移切􅀈徒案切説文行丸也彈或作􅀈從弓持丸或作弓醫於計切盛弓弩矢器也國語曰兵不解醫盩郎計切戾也從絃省從盩又力結切綿説文聫微也從系從帛孫説文子之子曰孫從系從子系續也繭説文蠶衣也從系從蟲從薾省古作絸俗作繭綏宣隹切説文車中把也從系從妥徐鍇曰禮升車必正立執綏所以安也當從爪從女省説文無妥字甸説文天子五百里地從田包省又石證切六十四井為甸覩敢切蔭也畜敕六切説文田畜也引淮南子曰元田為畜又曰魯郊禮畜或作􅀢從兹兹益也里説文居也從田從土臣按埋􅀈之字並從里則知里字復有霾音又按􅔨悝之字並從里則知里字又有恢音也胡光切又美辨切卵中之黃也嬲乃了切戲相擾也􅀈數省切一乳兩子也又乃了切戲相擾也鈲攻乎切鐵鈲銜説文馬勒口中從金從行銜行馬者也凥九魚切説文處也從尸從几尸得几而止引孝經曰仲尼凥謂間居如此故或作居憑皮冰切説文依几也引周書憑玉几或從馮又部孕切處昌與切止也得几而止或從虍耐乃代切説文罪不至髠曰耐字或從寸諸法度字皆從寸也亦作耐又人之切舋許愼切殺牲釁其血而後薦其肉故從且從釁省斷凡有三音音覩暖切者絶也音都玩切者決也音徒玩切者説文截也斬説文截也從車從斤古者斬人以車裂之也斫竹角切斫也從斤從音斗或從畫料洛蕭切説文量也從斗從米米在斗中春秋傳臣料虞君又力弔切􅧿刑狄切矛屬長􅧿謂之勃盧軍説文圜圍也四千人為軍從車從包省軍兵車周制萬二千五百人為軍輦説文挽車也從車從㚘在車前引之者䜌盧官切亂也理也又龍眷切言不絶絲説文蠶所吐也從二系顯渠飲切絮中小繭師説文二千五百人為師從匝從􅎧􅎧四匝衆意也今作官説文吏事君也從宀從􅎧􅎧猶衆也去演切説文云小塊也從臾從􅊟臾古貴字𨽻省作陟説文登也隉倪結切説文危也從􅊟從毁省徐巡以為隉凶也賈侍中説隉法度也班固説不安也引周書邦之杌隉獸説文守備者也辭説文不受也從辛從受受辛冝辭辭説文訟也從􅜆􅜆猶理辜也􅜆理也悉協切火熟也從又持炎辛辛者物熟味也辟鼻益切法也從辛罪也從命省出令以治人罪也説文謂從卩從口誤矣􅀈必益切君也辟君之辟或從官也孨只兖切説文謹也從三子又昵立切衆兒孱士連切説文迮也一曰呻吟也從孨在尸下徐鉉曰尸屋也孴魚記切説文盛兒從孨從日籕作􅀢或作􅀈孴又為奇字醯説文酸也作醯以以酒從酒並省從皿皿器也俗作􅀈非是􅀈許亥切酒器醉説文醉卒也各卒其度量不至於亂也􅷬租昆切説文酒器也從酋廾以奉之引周禮六尊犧尊象尊著尊壺尊大尊山尊以待祭祀賔客之禮或從寸古作􅕆愚原切説文水泉本也從灥出廠下篆作原今作源戍舂遇切説文守邊也從人持戈伐説文擊也從人持戈藝倪祭切説文種也從坴持而種之引詩我藝黍稷􅀈竹角切説文斫也斫或從丮書卟堅奚切説文卜以問疑也書稽疑舊作卟亦作乩唐開元改用稽無義占説文視兆問也希疏巾也從爻從巾樊附袁切藩也從爻從林象林薄交加有藩籬之狀隼聳尹切説文祝鳩也隹從十象射隼之形雋徂兖切説文肥肉從弓所以射隹罩陟教切覆鳥之具隻之石切鳥一枚也雀即約切説文依人小鳥也奎息遺切説文鳥張毛羽自奮也從大從隹奮説文翬也從隹在田上一曰振也奪説文手持隹失之也臣今按從寸者攘人不顧法度如奎攫然蒦乙虢切説文規蒦商也從又持萑一曰視遽兒睿俞芮切説文深明也通也臣按此從目從睿省或言從谷省非古作睿壑黑各切深溝也或從土飍必幽切風也􅔨許勿切疾風也圭説文瑞玉也上圜下方公執桓圭九寸侯執信圭伯執躬圭皆七寸子執榖璧男執蒲璧皆五寸以封諸侯以重土楚爵有執圭掃蘇老切説文棄也又先到切聖苦骨切説文汝潁之間謂致力於地曰聖堯説文高也從壵在几上高遠也臣按堯當從壵從几因帝堯以壵為名故又加几焉古文作􅀈亦從二几可知也堇巨斤切説文黏土也從土從黃省埾從遇切説文土積也或作􅀢封方容切説文爵諸侯之土也從之從土從寸守其制度也公侯百里伯七十里子男五十里徐鍇曰各之其土也加説文語相增加也從力從口勞説文劇也從力熒省熒火燒門用力者勞臣按從力從營省言用力經營也又郎到切劦胡頰切説文同力也從三力引山海經惟號之山其風苦劦協説文同心之和從劦從心協胡頰切説文同思之和從劦從思劣説文弱也絶翾劣切拽也勗許六切勉也臣按從力從冒會意説文謂聲誤矣右二百四十六三體會意序曰二母之合為會意二母者二體也有三體之合者非常道也故别之今作退字從彳從日從夂後遲也從彳么攴者後也徐鍇曰么猶繯躓之也􅀈託盍切啜也從舌從水從口籥音藥從集從􅮎册樂之竹管三孔以和衆樂聲丞翊也從從卩從山山高奉承之義刷從又持巾在尸下尸屋也攸行水也從支從人水省徐鍇曰支入水所杖也秦刻石作􅀈􅀢音糞棄除也從廾推華棄采也官法説似米而非米者矢字今作棄從廾推華棄之從逆子也觲息營切用角低昂便也從羊牛角詩觲觲角弓解佳買切判也從刀判牛角簋黍稷方器從竹從皿從皀箕亦作箕從竹其象形下其丌也或越逼切邦也從口從戈以守一一地也廛從廣從里從坴省即陸而居帚止酉切糞也從又持中掃門內法刑也從水平凖也從􅀢觸不直者去之尉以上案下也從􅊂又持火以尉申繒也􅮼音隙際見之白也從白上下小見舂從廾持杵臨臼上午杵省象爵之形中有鬯酒又持之也迃勿切上體與爨同意象煮之形從彡所以飾鬯也僉皆也從集從吅從從鬯從凵凵器也象米匕所以投之盥澡手也從臼水臨皿都騰切禮器也從廾持肉在豆上􅀈亦省作虐從虎足反爪人竷音坎繇也舞也樂也樂有章從章從降從夊詩竷竷舞我張流切引擊也從羍支見皿醯呼雞切作醯以以酒從酒並省從皿皿器也㠭知衍切極巧而視之也從四工祭從示從又手持肉祝從示從人口從肉從酒省酒以和醬望音妄月滿與日相望以朝君從月從臣從壬壬朝廷直從􅡊從十從目從又持炎辛辛者物熟味盧感切君子所感也宋玉曰入林悲心寒從人在宀下以茻薦覆之下有仌封爵諸侯之土也從之從土從寸守其制度也斝舉下切玉爵也從吅從冖從斗冠辨冕之總名從坰從元冠有法制從寸右四十二凡會意類計七百四十轉注第四序曰諧聲轉注一也役它為諧聲役已為轉注轉注也者正其大而轉其小正其正而轉其偏者也建類主義轉注序曰立類為母從類為子母主義子主聲主義者是以母為主而轉其子主聲者是以子為主而轉其母􅕆耆考耇􅹀孝􅫎耊履履屣屨屜屩屐屧夢寢夢寎寐寱寣瞢蘉􅬤八四六右并注五十建類主聲轉注一二弎鳳凰糴糶弦紗盩䋵􅀈􅀈虒􅕆右并注二十互體别聲轉注序曰諧聲轉注皆以聲别聲異而義異者曰互體别聲義異而聲不異者曰互體别義杲東杳本末朱易明尖夵粗􅠅告吽㕦􅀈古叶卟占聽􅀢啼啻唯售吥否呅吝含吟嗼􅀢啁􅀢叨召􅀢躘躗􅀈䜏諅諆􅀢􅀈􅬢􅵔眇省晣䀸眂􅀢盳盲相􅀈􅀈晟䳡隼鶘鶦鸛􅀈鸞􅀈􅪦鶄􅀈􅀈胔􅀢胡􅨨槩概􅀢欇棸棷朵㭁楪枼根􅀢柅􅀢某柑刊枅架枷森􅀢暑暏耔季􅓱􅀈襱襲袲袳袍􅀢衾襟裹裸袔褻褹􅀈􅀢沯砅􅠝滅􅀈溪豀擘劈摲㨻􅀢􅝷奻姣娶娵嬎娎􅀈媨􅀈壀壁􅀢􅀈垢垕鏨鏩􅀢㠱醔恭㤨愾忥悲悱惎惎怤怤愈愈忘忙怢怣􅡣順愔意怗怗怘怙憞憝怡怠慲悍􅀢悺悹懬懭忉忍忠忡􅀢􅀈􅜜怫怓怒忦􅢚慎愼忍忍惋惌戚戚􅀢恤惵􅀢惐惑􅀢恰愀愁感􅢯悆悇嶜岑岒嶵嶵嵬嵬汬阱澼㵨沸􅀢􅀢蜱蛋蜒蜃蜄蠆蠇蜇􅔼右并注二百五十四互體别義轉注聲同義異蕊􅀈旻旻期期猶猷獒獓􅀢𢤱愚㥥㥳願懰􅀢􅀈􅀢揧揦􅀢忔繴䌟蜊䖽􅀢螈􅀢蚥坒坒䥒鏹嚨􅀢􅕆唁攏􅀢憚􅓆櫳櫳㯕􅀢右并注四十八凡轉注類計三百七十二轉注音義建類主義轉注音義老説文七十曰老從匕毛匕音化言須髮變白也老去其下體而成字耆渠脂切説文老也考説文老也耇古厚切説文老人面凍黎若垢􅹀常句切説文老人行才相逮從老省易省行象孝説文善事父母者從老省從子子承老也􅫎丁念切説文老人面如點也耊徒結切説文年八十曰耊履從尸聲也從舟象其形也從彳從夂行而曵者其惟履乎履舉履切赤舄徂回切粗履也呼􅀈切鞮屬徐呂切履屬屣所寄切履不躡跟也屨履也一曰鞮也遲據切履也屜他計切履中薦屩居酌切屐也屐屩也音歷履下也屧施協切履中薦夢音夢説文寐而有覺也從宀從疒夢聲引周禮以日月星辰占六夢之吉凶或作􅬤綿批切夢驚又毋禮切寐而未厭披尤切寐聲呼含切寢不褫衣人余切假寐寢七稔切説文病臥也或作其季切説文熟寐也依據切楚人謂寐曰母亘切眠寤也思鄧切眠寤也謨郎切寐言也亦是從省吾含切寐聲寎皮命切説文卧驚病也七稔切視貌寐密二切説文卧也寤五故切説文寐覺而有信曰寤一曰晝見而夜夢也寱倪祭切説文瞑言也寣呼八切説文卧驚也一曰小貌號寣寣一曰河內相評也瞢木空切説文目不明也從首從旬旬目數搖也又眉耕切無眸子也徒登切瞢日暗郎鄧切卧初起貌蘉謨郎切勉也又彌登切􅬤莫鳯切寐而有覺也暮葛切食馬穀也謨中切寐言從眠從瞢省八數也四脈八之數未能上徹六與四同體而有加焉建類主聲轉注音義一從一數也從弋聲也二弎二弎從弋無聲以一為類之聲故可以轉二三而為注鳳從鳥義也從几聲也凰從几無聲以鳳為建類糴從䊮聲也從入義也糶從䊮無聲以糴為建類胡南切舌也象形從弓舌體弓又戶感切口上曰臄下曰曷合切從省亦聲也都黎切又田黎切説文不能行為人所引音提從允從提省以為建類之聲故又從奚省音擕説文也從尢從攜省以為建類之聲故又從奚省弦説文弓弦也從弓象絲軫之形凡字母主義子主聲未有省母而立子者惟弦省母以子主類故為建類主聲之注也紗於霄切急戾也從絃省少聲盩音戾戾也從弦省盩䋵於罽切不成遂急戾也從弦省曷聲􅙚邱召切􅙚􅚤􅚤牛召切􅙚􅚤不安也􅙚從亢義也從喬聲也􅚤從亢無聲以􅙚為建類之聲虒相支切説文委虒虎之有角者從虎義也從􅛣聲也􅛣音移又大耳切􅕆補典切􅕆虒薄貌􅕆從廠無聲以虒為建義之聲互體别聲轉注音義杲古老切明也從日在木上東從日在木中杳冥也從日在木下木若木也日之所升降本説文木下曰本本朱末同意一在下為本在中為朱在上為末一無義也但記其别耳末木上曰末朱説文赤心木松柏屬一曰丹也易羊益切祕書説日月為易象隂陽也明日月並明尖子廉切鋭也夵以冉切本廣末狹粗坐五切牛角直貌􅠅樞玉切抵也古作牪告牛觸人角著橫木所以告人也吽於金切牛鳴㕦胡化切口大貌􅀈音大嘗也古説文故也從十口識前言者也叶音協衆口同也卟堅奚切説文卜以明疑也占之廉切説文視兆問卜也聽魚其切聽咨口開貌􅀢陟列切博雅塞也啼説文號也啻説文語時不啻也唯夷隹切專辭又愈水切諾也售承呪切賣去手也吥普溝切吸也否不可也呅武粉切説文口邊也吝説文恨惜也含嗛也吟説文呻也又宜禁切長詠也嘆末各切説文􅀈嗼也一曰定也􅀢蒙晡切謀議也啁陟交切説文啁嘐也􅀢時流切噟也叨貪也召呼也􅀢盧東切􅀢蹈行貌躘盧鍾切躘踵行貌躗于歲切過也􅀈姑衛切僵也一曰跳也䜏翾規切説文相毁也一曰諉也䜏土禾切方言慧也楚謂之䜏或省諅居之切忌也又渠記切説文忘也引周書上不諅于凶德諆邱其切説文欺也􅀢咨邪切咨也􅀈楚懈切異言􅬢一計切博雅譍也又戶禮切誠言也􅵔於其切恨聲眇説文一目小也省察也􅀈之列切目明也䀸征例切目美也眂章移切視也又時利切􅀢呼昆切目暗也盳蒲光切盳洋仰視貌盲眉耕切説文目無眸子相思將切説文省視也引易地可觀者莫可觀於木詩曰相鼠有皮􅀈莫目切目不明也􅀈翾劣切説文視高貌􅀢休必切目深貌䳡於諫切鴽屬隼朱惟切鳥名小鳩也一名鳺鴀鶘洪孤切鵜鶘好羣飛沈水食魚鶦洪孤切雞鶦似鴙青身白頭鸛古玩切説文小雀也詩鸛鳴于垤今按鸛水鳥之大者􅀈呼官切爾雅􅀈鷒鶝鶔如鵲短尾射之銜矢射人鸞鳥名説文亦神靈之精赤色五采雞形鳴中五音頌聲作則至周成王時氐羌獻之也􅀈謨還切山海經有鳥如鳬一翼一目相得乃飛名曰􅀈或省􅪦咨盈切􅀈􅪦也鶄倉經切鶄鶴鳥名畜之以厭火􅀈蒲木切鳥名􅀈説文鳥􅀈也􅀈薄報切又北角切水鳥似鶂而短頸胔才枝切又疾智切説文鳥獸殘骨胔胔可惡引明堂月令掩骼埋胔􅀢蔣氏切鳥骨一曰骨有肉也胡牛垂也􅨨空胡切博雅􅨨䐧𦢊也槩許既切平斗木又居代切概古外切杖也又巨列切杙也􅀢質涉切説文木葉搖白也欇失涉切博雅枝也棸災尤切木名棷將侯切􅚛謂之棷又災尤切説文木薪也朵都果切説文木垂朵朵也㭁人枝切木名又如證切一曰止車木枻以制切楫謂之枻枼弋涉切説文楄也從丗聲徐鉉謂從丗非聲改而為卉卉蘇合切臣按此即木葉象形非聲也根説文木株也􅀢下簡切閾也柅女夷切絡杙又女履切説文木也實如梨一曰止車木又乃禮切􅀢丑二切篗柄也某謨杯切果名説文柟也又莫後切酸果也柑果名似橘又其淹切以木銜馬口也春秋傳柑馬而秣之刊邱寒切又稽延切入山刋木以識道也枅經天切屋櫨也架居迓切杙也所以舉物或作嫁枷居牙切説文柫也淮南謂之柍森木多貌􅀢居蔭切承樽案暑熱也暏董五切説文旦明也耔祖似切説文壅禾本季説文少稱也􅓱忙皮切説文穄也􅀈謨加切廣雅䅸也襱盧東切方言齊魯謂之襱關西謂之袴一曰裙也又柱勇切説文袴踦也襲説文左衽袍也從衣龖省聲籕作袲乃可切裒袲衣貌袳敞含切説文衣張也袍説文也引論語衣敝緼袍又薄報切前襟袌薄皓切説文褱也衾袪音切説文文大被也襟居吟切衣系也又其淹切裹包束也裸袒也倚可切袲衣貌袔口箇切夾衣又何佐切博雅𧜥補也褻説文私服引詩是褻袢也褹倪祭切方言復𥜗謂之䇶褹􅀈彼小切説文上衣也從衣從毛古者衣裘以毛為表篆作􅀢薄報切衣前襟一曰褱也沯子末切水激石貌砅鄰知切履石渡水也又力智切詩深則砅􅠝九勿切結􅠝西域獸名食香無毛但自􅀢有毛廣寸至尾燒刺不能傷渠勿切埤倉短尾犬也滅翾劣切説文滅也從火戌火死於戌陽氣至戌而盡引詩赫赫宗周褒姒威之臣按從火從戌戌聲也未必有義又莫列切􅀈休必切狂也齊人語溪説文山瀆無所通者豀弦雞切反戾也莊子曰婦姑勃豀擘博厄切説文撝也一曰大指劈毗亦切撫也摲師咸切芟也禮有摲而播㨻在敢切擊也􅀢昨木切劒也􅝷仕角切刺也奻居還切説文訟也姣古巧切好也娶逡遇切説文取婦也娵遵須切星名爾雅娵觜之口營室東壁也又災尤切嬎芳遇切兔子又孚袁切孚萬切説文生子齊均也娎許列切説文娎㛍也又顯計切喜也􅀈之列切女字媨在九切博雅好也又以九切醜也􅀈七六切説文醜也一曰老女壀普米切壀堄陴也壁必歷切説文垣也􅀢祖果切篆作􅀢説文止也從土從丣古作坐並象人據坐之形又並徂卧切􅀈於九切邑名垢説文濁也一曰塵也或作坸垕狠口切説文山陵之厚也鏨財甘切鑿也又在敢切鏩鋤咸切鏩鏩鋭進貌又疾染切􅀢居之切疾恚也㠱墍已切長踞也􅀈初尤切漉取酒也醔字秋切説文繹酒也從酉水半見其上恭居容切肅也㤨胡公切戰栗也愾聲夷切喜貌忥許既切癡貌悲逋眉切説文痛也悱憤也惎渠之切心有所繫也惎渠記切説文毒也怤芳無切説文思也一曰悅也怤扶遇切心附也愈勝也瘳也愈容朱切説文薄也引論語私覿愈愈一曰樂也和也忘武方切説文不識也又無放切棄忘也忙謨郎切心迫也怢吐內切緩也忘也怣于求切異也尤古作怣􅡣於求切説文愁也順古文順字愔伊淫切愔愔安和也意説文從心從音察言而知意怗多忝切靜也一曰服也又託協切怗癡廉切怗懘樂音不和怘音固專也怙後五切説文恃也憞他昆切憞惃心不明也憝杜罪切恨也怡悅也怠慢也母本切煩也慲謨官切忘也悍性急也􅀢音姦偽也悺塢版切人名漢有左悺悹古丸切又古緩切悹悹無依也懬口黨切大意又苦謗切懭苦晃切懭恨意不得也又古猛切忉都勞切忉忉憂勞也忍魚既切説文怒也忠説文欽也忡説文憂也􅜜音弼輔也怫芳未切忿貌怓尼交切亂也怒恚也忦若怪切恨也又牛戒切説文憂也􅢚許介切説文忽也引孟子孝子之心不若是􅢚慎音嗔怒也愼時刃切説文謹也忍説文能也忍而振切心能於事也惋烏貫切驚歎也於袁切讎也恚也戚含歷切憂也戚子六切慙也􅀢呼弦切急也恤雪律切憂也惵託協切靜也􅀢私列切不安貌惐乙六切痛心也惑説文亂也􅀢迄及切合也太元瘱而􅀢之又乞洽切恰乞洽切説文用心也愀千遙切色變也莊子愀然變容又七小切愁鋤尤切説文憂也又財勞切揚雄有畔牢愁􅀈居尤切聚也􅀢巨九切説文怨仇也感不忘於心也􅢯邱廉切􅢯㥓意不安貌悆羊茹切説文忘也嘾也引周書有疾不悆悆喜也悇同都切苦憂也嶜容林切山高大貌􅀈鉏簪切岑高鋭貌崖説文高邊也崕魚羈切崎崕石危貌岑鉏簪切説文山小而髙岒其淹切山名嶵祖回切説文大髙也嶵祖猥切山兒嵬五灰切説文髙不平也嵬塢毁切山兒汬疾郢切陷也阱棄挻切阱涏小水貌澼匹辟切腸間水也㵨匹智切水中洲也沸方未切涫也􅀢敷勿切灑也􅀢紕招切螵蛸也或作螵蜱賔彌切又部回切蜃屬蛋蕩旱切蠻屬蜒夷然切蟲名方言燕北謂析易曰祝蜒蜃是忍切蛤也説文雉入海化為蜃蜄之刃切動也又時刃切蛟屬蠆丑邁切説文毒蟲也蠇力制切説文蚌屬似螊微大出海中民食之一曰雕百嵗化為蠇或作蠇蜇陟列切螫也􅔼似絶切䰸蜇魚名似蝤蛑生海中互體别義轉注音義蕊乳捶切垂也􅀈木名旻眉貧切説文秋天也旻旻旻和也期居之切説文復其時也期説文會也猶説文玃屬一曰隴西謂犬子為猶一曰似麑居山中聞人聲豫登木無人乃下世謂不決曰猶豫猷道也獒牛刀切説文犬知人心可使者引春秋傳公嗾夫獒獓山海經三危之山有獸焉牛身四角豪如被簑名曰獓􅀢盧東切􅀢匆遽貌𢤱𢤱悷多惡貌愚元俱切説文戇也從心從禺禺猴屬獸之愚者㥥説文歡也琅邪朱虛有㥥亭㥳愚袁切測量也願慤愼也周禮上願紏暴劉昌宗讀懰力求切懰慓憂貌一曰怨也或從留􅀢定意􅀈下介切忖度也􅀢傾心也忥許訖切癡貌愾喜也􅀢郎逹切博雅擘也揦撥揦手披也繴博尼切説文繴謂之罿罿謂之罬罬謂之罦捕鳥覆車也䌟織絲帶也蜊良脂切蛤蜊海蚌也䖽螏䖽蟲名似蝗大腹長角食蛇腦􅀢愚轅切重蠶為􅀢螈説文榮蚖蛇醫以注鳴者即蜥蜴也􅀢匪父切蟲名食瓜者蚥王蚥蟲名蟾諸也爾雅不蜩王父坒毗至切説文地相次坒也坒配合也太元隂陽坒參䥒巨兩切鉛屬鏹以繦貫錢嚨盧東切喉也􅀢大聲也􅕆魚戰切傳言唁吊失國曰唁攏盧東切理也􅀢擊也憚徒案切説文忌難也􅓆􅓆狐邑名在洛南百五十里秦遷周赧王於此櫳盧東切檻也一曰養獸圈櫳房室之疏也又盧鍾切㯕相支切博雅木下枝謂之椑㯕􅀢木薪通志卷三十二
