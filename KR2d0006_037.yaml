body:
  text: 通志卷三十二宋右廸功郎鄭樵漁仲撰六書略第二會意第三上序曰象形指事文也會意字也文合而成字文有子母母主義子主聲一子一母為諧聲諧聲者一體主義一體主聲二母合為會意會意者二體俱主義合而成字也其别有二有同母之合有異母之合其主意則一也社説文地主也春秋傳曰共工之子句龍為社神一曰周禮二十五家為社各植其土所宜之木祟雖遂切神之變也又説律切祝職救切詛也又之六切告神之語瑞説文以玉為信也从玉耑徐鍇曰耑諦也班分瑞玉也故从刀斑駁文也􅕈房六切説文車軨間皮箧古者使奉玉以藏之又筆力切又蒲䝉切毒徒沃切厚也害人之草从草从毒熏篆作􅝪説文火煙上出也从草从黑草黑􅝪象也又吁運切灼也蒐草名説文茅蒐茹藘人血所生可以染綘芟除草也春篆作萅説文推也从草从日草春時生屯聲苗稼生曰苗又説文草生於田者若説文擇菜也从草右右手也尖壮咸切鋭也火形鋭尟思淺切説文是少也又宣遇切或作尠􅀢乃后切乳子也􅀢思嗟切少也番符袁切又補過切獸足謂之番从采从田象足履於田也寀式荏切説文悉也寀寀諦也徐鍇曰宀覆也采别也包覆而深别之篆文作審悉息七切盡也古作息􅠅樞玉切牴也古作牪犇逋昆切牛羣走也郎刀切閑養牛馬圈也此象圈養之狀説文謂从牛冬省取其四周帀之説謬矣或从穴告牛觸人角著横木也吹吹氣也吽於金切牛鳴咶火夬切又呼刮切息也又胡化切言也喜許已切又許記切悦也或作憘歖名説文自命也从口从夕夕者冥也冥不相見故以口自名臣按此説非也大凡義理但見其説不徑直即不為實義名从口見義从夕見聲启遣禮切説文開也咸説文皆也从口从戌戌悉也各説文異辭也从口夂夂者有行而止之不相繼也臣按在上為夂陟紀切在下為夂音綏則有行義吉善也从士从口士君子之口無非善言咠即入切咠咠語也或作又七入切詩咠咠幡幡又一入切喆今作哲智也古亦作嚞牛刀切諠也或作囂又虛嬌切息郎切从哭亡𨽻作喪又四浪切企遣爾切舉踵也整齊也从敕从正連説文負連也一曰連屬又力展切難也易往蹇來連又連彦切及也道説文所行道也一達謂之道又大到切逐追也又亭厯切速也易其欲逐逐又直祐切奔也山海經夸父與日逐一曰牝牡合今作遠御諒文使馬也徐鍇曰卸觧車馬也或彳或卸皆御者之職古作又魚駕切相迎也衟杜皓切所行道也又大到切導引也熒絹切説文行且賣也或从元齔楚引切博雅毁齒謂之齔又初菫切説文男八月生齒八歳而齔女七月生齒七嵗而齔以齒从匕或作齓符轅切説文獸足謂之􅀢蒲孟切􅀢蹋地聲从鼓聲也扁補典切説文署也从戸冊戸冊者署門戸之文也一曰不圓為扁甜徒兼切美也􅀈託盍切歠也或从習又託協切犬小郤乞約切説文節欲也一曰退也或作却協胡頬切説文衆之和同也从劦从十徐鉉曰十衆也古作旪或作叶幵子元切事之制也䛡説文合會善言也傳曰告之䛡言或作話設式别切説文施陳也从言从殳殳使人也乙力切説文快也信信無所立惟馮人言誓時制切説文約束也盖誓之以言䚻餘招切説文徒歌或作謠䚻又夷周切或書作􅀈計説文會也又吉屑切畫也討从言从寸言責也寸法度也責以法度訥奴骨切言不出諕虛訝切誑也又乎刀切號也諰想止切又所佳切思意一曰語失誩渠慶切言之争也古作篆作𨽻作競譶直立切譅言不止也又達合切説文直言也叢徂聰切聚也从聚省又徂外切从最省叢木灌木也舁以諸切並舉也又茍許切興虚陵切説文起也从羿从同同力也與演女切説文黨與也或作又羊茹切及也渠容切説文所以支鬲者从爨省从鬲省又古勇切又茍許切䨣匹各切説文雨濡革也􅀈人移切有骨醢也䰛狼狄切鼎属實五觳斗二升象腹交文三足􅀢居行切五味香鬻也从羮省孚芳無切説文卵孚也从爪从子説者鳥伏子常以爪反覆其卵古作􅀢又方遇切育也方言雞伏卵而未孚􅣃胡畎切試力士鑄也閙擾也或作取説文捕取也周禮獲者取左耳故从又从耳司馬法載獻聝聝耳也秉説文禾束也从又持禾或曰粟十六斛曰秉友説文同志為友从二又相交友也篆作㕛叒日灼切二又為友三又為叒所助者多故為順也肅説文持事振敬也從聿在􅘢上戰戰兢兢也􅩎對鄰切筆餙也俗以書好為􅩎从彡有文也臤苦閑切又邱寒切説文堅也即古文賢字从臣从又臣能致力也臥吾貨切説文休也从人臣取其伏也或作卧㲃居又切揉屈也从殳从古文叀字祋丁外切説文殳也或説城郭市里髙掛羊皮有不當入而欲入者暫下以驚牛馬曰祋故从示殳引詩何戈與祋役説文戍邉也古文道字􅵘方斂切説文傾覆也从寸从巢省寸人手也或曰即貶損之貶㝵牛代切止也出浮屠書又有得音从旦从寸攸説文行水也又以九切从支从人水省徐鍇曰支入水所杖也敗毁也古作贁宼説文暴也从支从完敬説文肅也牧養牛人也平祕切説文具也从用苟省徐鉉曰苟急敕也𨽻作􅀢火劣切舉目使人也又莫結切又七役切目小動又忽域切況晚切説文大視也从大􅀢取委逺切从目也又鄔管切烏括切説文捾目也从目叉聑昵格切耳目不相信也相思將切説文省視也引易地可觀者莫可觀於木詩曰相䑕有皮又息亮切眀眉兵切視瞭也盲目亡眸子達合切説文目相及也从目从隶省聅式荏切視也又舒閏切開闔目數揺也窅伊鳥切又音於交切深目也音域輙切説文光也𨽻作曄􅀈古宂切又一決切説文目深皃䁊女利切又烏括切説文深目皃一曰塞也瞐黒角切美目一曰目深􅀢舒仁切引目煛畎逈切大目也許尤切目多汁省息井切目瞖也與眚同又視也又所景切簡也説文从眉省􅚛扶發切盾也䫁毗志切犬初生子一曰首子臭尺救切説文禽走臭而知其迹者犬也或作臰臰腐氣也皆居諧切説文俱詞也从比从自或省迄洽切息或从夾从合䶎􅦃也研計切説文羽之風亦古諸侯一曰射師臣按从幵音堅堅也射所以破堅也从羽箭必以羽有窮國君翟直格切矩名又直角切鳥名莫大羽託盍切説文飛盛皃从曰曰即冒也瞢木空切説文目不明也从首从䀏䀏目數揺也又眉耕切無眸子也蔑莫結切説文勞目無精也从首人勞則蔑羴尸連切羊臭也又羊閑切䍹牛閑切羊臭羌説文西戎牧羊人也从人从羊南方蠻閩从虫北方狄从犬東方貉从豸西方羌从羊此六種也西南僰人僬僥从人盖在坤地頗有順理之性東夷从大大人也夷俗仁仁者夀有君子不死之國孔子曰道不行欲之九夷乘桴浮於海有以也古作羮五味􅀢鬻也􅀈寵戀切羊長尾一曰羊棧也羼初限切羊相厠也一曰相出前也又初莧切一曰傍入曰羼从屋省羸力為切羊瘦者也靃呼郭切説文飛聲也兩而雙飛者其聲靃然雙隹二枚也从又持之也雧秦入切説文羣鳥在木上也或省鳴鳥聲也又眉病切相呼也瞗當侯切瞗瞗鳥名人面鳥喙有翼不能飛又丁聊切目熟視也䲵即約切説文鵂鶹别名􅖨於蚪切説文㣲从􅖨二幺又津之切黒也兹古作􅖨兹説文黒也引春秋傳何故使吾水兹幾説文㣲也殆也从􅖨从戌戍兵守也􅖨而兵守者危也古作幽説文隐也舉起切問數也幾古作龍都切黒弓也玅于達切小意魯果切説文畜産疫病也昨間切禽獸所食餘也側八切字林天死也或作又子列切死从歺从人人之殘也或曰从匕聲别皮列切分觧也肥説文多肉也徐鉉曰肉不可過多故从卪脃此芮切説文小耎易斷也从肉从絶省或作膬財于切禽獸食餘也肰如延切説文犬肉也俎説文禮俎也从半肉在且上肘説文臂節也刕憐題切裂也初裁衣之始利説文銛也从刀和然後利从和省引易利者義之和臣按从刀从禾二母相合以刀取禾也古作則説文等畫物也从刀从貝貝古之物貨也按今人稱金之劑曰則一曰法也古作籕从鼎刪師奸切説文剟也从刀从冊以刀削書也罰説文辠之小者从刀从詈未以刀有所賊但持刀罵詈則應罰釗之遙切説文刓也周康王名又弩機魝古屑切楚人謂治魚人刓吾官切説文剸也或作㝴胡𤓰切舟進竿謂之划又古火切割也又古卦切鎌也觲思營切説文用角低昻便也引詩觲觲角弓或少省解舉蟹切説文判也从刀判牛角􅠅今作觸説文牴也亦作􅀈等得肯切説文齊簡也从竹从寺寺官曹之等平也筮時制切説文易卦用蓍也从竹从古巫字簋矩鮪切説文黍稷方器也从竹从皿从艮筭蘇貫切説文長六寸計厯數者从竹从弄常弄乃不誤也筋説文肉之力也臣按从竹从肋惟竹肋多筋絲所以為筋之主故説文曰竹物之多筋者典説文五帝之書也从冊在丌上尊閣之也荘都説典大冊古作􅥯奠堂練切説文置祭也從酋酋酒也下其丌也禮有奠祭者覡胡狄切説文能齋肅事神也男曰覡女曰巫从見見音睍甚食荏切説文尤安樂也从甘匹匹耦也古作􅀢沓達合切語多沓沓也遼東有沓縣一曰合也从水者象多言之人口出涎沫暜今作替説文廢一偏下也按从竝一上而一下也从曰告也尌上主切説文立也从壴从寸持之也鼓説文从壴支象其手擊之也臣按从㞵土刀切説文於弓弢則曰从㞵㞵垂飾與鼓同意􅀢補䝉切鼓舞􅀢徒東切鼓聲从角者鼓作而角鳴也䥢虚冬切鼓聲从金者鼓作金止託合切鼓鼙聲从缶擊鼔擊缶聲為同類𨽻作登説文禮器也从廾持肉在豆上篆作从􅀈象肉在豆中之形豑直質切説文爵之次第也故从書平豑東作或从失虔説文虎行貌按此从文當有虎文之義虣薄報切彊侵也周官有司虣覤乞逆切覤覤驚懼皃贙胡犬切説文分别也从虤對争貌也一曰獸名出西海大秦國似狗多力獷惡也又熒絹切盈説文滿器也从􅣃􅣃音姑古者以買物多得為􅣃益説文饒也从水皿皿益之意也女六切説文出血也盩張流切説文引擊也从羍支見血也轄臘切説文覆也一曰何不也𨽻作盍􅀈他官切黄色靗癡貞切从穴中正見也青光者隙穴之明也或作靗靘千定切􅀈靘青黑色阱疾正切陷也或作汬食説文一米也从皀亼聲或説从皀也􅀈居夷切餓也飤祥吏切説文糧也从人食湌七安切説文吞也又蘇昆切水沃飯也飱蘇昆切説文餔也謂晡時食或作餐餐又千安切説文吞也􅕆求位切説文餉也饋古作􅕆􅀈牛據切餞也蝕實職切敗食也侖龍春切説文思也从亼从冊籕作龠􅀢僉説文皆也从亼从口从从引虞書僉曰伯夷按此吅从無義但亼人口之多耳佱方合切古文灋字从亼从正合曷閤切説文合口也巨險切約也好合人也故未成僉會合也从人从曾省曾益也倉説文榖藏也从食省从口奇字作全屳相然切山居長往也又虚然切輕舉也㞥徂箴切説文入山之深也䍃餘招切廣雅瓶也又夷周切説文瓦器也按从肉藏肉器􅯐去冀切皿也器或作􅯐从器省是時也从日从正日辰也正其辰也篆作昰又田黎切醯呼雞切説文酸也作醯以以酒从酒並省䠶説文弓弩發於身而中於遠也篆作射从寸寸法度也食亦切又寅謝切􅀢昨木切矢鋒也或作􅀢􅀢虚交切灌也髜輕皎切高也􅀢余封切从亯从自自鼻也知臭香所食也按此與同體卽烹飪調庸之義或作庸从庚庚乃烹飪器􅀢以烹爲主借爲庸用之庸後人不知但識借義而已􅙯常侍切説文熟也从亯从芈按从亯普庚切一曰鬻也篆文作徒南切説文長味也引詩實覃實訏从鬲从鹹省或不省古作􅀢􅀢厚𨽻作厚説文邱陵之厚也从􅫇从厂嗇𨽻作嗇説文愛濇也从來麥也从㐭受麥之府也故田夫謂之嗇夫古作嗇啚補美切説文嗇也从口㐭㐭受也夌閭承切説文越也从冬从􅀢􅀢高也竷苦感切説文繇也舞也樂有章从章从夅从夂引詩竷竷舞我􅀢烏代切夂行也心之行也畟初力切説文治稼畟畟進也引詩畟畟良耜按此从夊从界省説文从田从人夂誤矣又節力切㯥臧曹切月出門也从二東曹字从此梟堅堯切説文不孝鳥也日至捕梟磔之从鳥首在木上休息止也从人依木臬五結切射凖的也从木从劓省又九芮切采取也柝破木也床説文安身之坐者杏説文果也从木可省聲按从可亦不得聲从口木實之可食者林从二木木多爲林説文平土有叢木曰林森説文木多貌从林从木彬悲巾切説文文質備也又逋還切采明也梵房丸切木得風也疑从風省埜以者切郊外也古作壄􅷺虛檢切􅷺􅷺䕃也􅀢盧感切悲愁兒一説林木君子所感故宋玉曰入林悲心或从心敖牛刀切説文出游也从出从放篆作敫􅀢莫懈切説文出物貨也从出从買𨽻作賣􅀢戈灼切岸上出見皃􅀈愽蓋切行兒詩赤芾在股今二芾相從自爲行也索昔各切説文草有莖葉可作䋲从􅜨系孛蒲妹切説文也从􅜨人色也从子引論語色孛如也又薄没切色惡也甡疏臻切説文衆生竝立之兒引詩甡甡其鹿眚古文姓字華户𤓰切説文榮也从草从􅒧𨽻作華剌郎逹切説文戾也从束从刀刀者刺之也囚徐由切説文繫也从人在口中囷區倫切説文廩之圜者圜謂之囷方謂之京􅂒女蟹切愽雅母也圂胡囷切説文厠也从口象豕在口中也困苦悶切説文故廬也从木在口中㘝昵立切㘝㘝私取物又昵洽切説文下取物縮藏之囝九件切閩人呼兒曰囝又魚厥切闕也太隂之精圉魚舉切説文囹圄所以拘罪人从㚔从口買毋蟹切説文市也从网貝引孟子登龍斷而网市利賵撫鳳切贈死之物贄脂利切説文至也引周書大命不􅧈亦作贄員于權切物數也徐鍇曰古以貝爲貨故數之𨽻作貟籕作郵説文境上行書舍从邑垂垂邊也􅣑从邑相向説文鄰道也𨽻作卶胡降切􅀈胡降切説文里中道也篆省作䢽𨽻省作巷昍許元切明也昆公渾切説文同也昏呼昆切説文日冥从氏省昌尺良切説文美言也从日从曰一曰日光也引詩東方昌矣籕作昌曇徒南切雲布謂之曇暔那含切國名唐天寶中封其王爲懷寧王暹思廉切日光升也普滂古切説文日無光徐鍇曰無光則逺近皆同故從並昶丑兩切通也又丑亮切達也昢普罪切日未明兒又普没切㬎呼典切説文衆微杪也从日中視絲一曰頭明飾也又五合切㫐伊鳥切説文望逺合也从日匕匕合也􅀢子皓切説文晨也从日在甲上𨽻作早炅畎逈切見也或作昋又音涓惠切戈笑切光也或从光㬜即刃切易明出地上㬜説文進也日出萬物進从日从臸𨽻作晉㬥薄報切説文晞也从日从出从收從米或作暴昰夏古作昰言曰於是乎正也㫘莫筆切説文不見也㫺𨽻作昔説文乾肉也从殘肉日以晞之旋旬宣切説文周旋旌旗之指麾也从㫃从疋疋足也斿亦作游旌旗之旓旅説文軍之五百人爲旅从㫃从久从俱也古作􅨞族説文矢鋒也束之族族也从㫃从矢一曰聚也晶説文精光也从三日古作品子盈切又爲古文日字朏普乃切又芳尾切説文月未盛之明从月引周書丙午朏朙照也朙古作明奣苦礦切明也又古猛切夗於阮切説文轉卧也从夕從卪臥有卪也今作夙説文早敬也从持事多説文重也从重夕夕者相繹也故爲多􅰲𨽻作粟説文嘉糓實也㮚力質切説文木也其實下垂故从􅓒􅀈𨽻作兼并也从又持秝兼持二禾秉持一禾􅔋忙皮切􅔋穰地名在今秦州秦説文伯益之後所封國地冝禾从禾舂省一曰秦禾名籕作􅀢科説文程也从禾从斗斗者量也䆀母罪切禾傷雨􅣴徐醉切説文禾成秀也人所以收从爪禾鞂訖黠切禾槀去其皮祭天􅀢説文芳也从黍从甘春秋傳黍稷馨香𨽻省作香䊆巨九切説文舂糗也􅀢郎逹切博雅揅也􅤖蘇旰切説文分離也从支林林分散之意古作救又顙旱切麻分也麻説文與林同人所治也从广在屋下宗説文尊祖廟也容説文盛也从宀谷徐鉉曰屋與谷皆所以盛受也安説文静也从女在宀下家説文居也从穴豭省臣按説文从豭省疑非也家與牢同意家豕居後人用爲室家之家牢牛屋後人用爲牢獄之牢寍奴丁切説文安也从宀心在皿上人之飲食器所以安人宂乳勇切説文散也从宀人在屋下無田事引周書宮中之宂食寡説文少也从宀从頒頒分賦也故爲少宰子亥切説文辠人在屋下執事者从宀从辛辛辠也守始九切説文寺官也从宀从寸寺府之事者从寸寸法度也宦胡慣切説文仕也一曰閹人虚訝切也亦作㙤向説文比出牖也从宀从口引詩塞向墐户徐鍇曰牖所以通人氣故从口定説文安也从宀从正古作正實説文富也从宀貫貫貨貝也宋説文居也一曰木者所以成室以居人也故从宀从木竄七丸切穴兒又取亂切匿也穿説文通也从牙在穴中或从身窔一呌切深也突陁没切説文犬從穴中暫出也从犬在穴中方言江湘卒相見曰突一曰出皃􅀢烏八切穿也餘招切痤疾名疢丑刃切熱病㿓訖洽切創也一曰獸足病謂之㿓又乞洽切按此从足从瘞省最祖外切説文犯而取也从日从取𨽻作冒説文䝉而前也从冃从目同説文合㑹也从目从口徐鉉曰同爵名也引周書太保受同嚌故从口冡莫紅切説文覆也从􅜪豕羅説文以絲罟鳥也从网从維古者芒氏初作羅罪説文捕魚竹网从网非秦以罪爲辠字詈説文罵也从网从言网辠人帘鋤臻切幕也又離鹽切酒家幟又一呌切􅀢脂利切博雅鞶􅀢巾也又輸芮切㿟吉了切白也又薄陌切皛烏鳥切説文顯也从三白陟几切説文箴縷所紩衣从丵省徐鉉曰丵衆多也言箴縷之工不一伊説文商聖人阿衡尹治天下者儗魚其切感也又偶起切説文僭也一曰相疑㚢農都切奴婢皆古之罪人古文奴从人或作仅信思晉切説文誠也仁从人从二徐鉉曰仁者兼愛故从二古作忎眞説文僊人變形臣按从匕从具變化之具也仚馨煙切説文人在山上又虚延切輕舉也又虞爲切危也件説文分也牛大物故可分咎其九切説文灾也从人从各者相違也企去智切説文舉踵也或从足位于累切説文列中庭之左右謂之位付方遇切説文與也从寸持物對人債側賣切逋財也㐰思晉切説文誠也信古作偘墟旴切剛直也伏房六切伺也儥徒谷切又余六切説文賣也又他督切買也佩蒲妹切説文大帯佩也从人从凡从巾佩必有巾巾謂之飾便毗連切説文安也人不便更之卬五剛切説文望欲有庶及也从从卩詩曰高山卬止今作仰頃去營切説文頭不正也臣按从頁从匕飯匕之匕其形不正卓篆作説文高也早匕爲卓匕口爲卬皆同義衆説文多也从豕目衆意䠳癡鄰切走兒殷説文作樂之盛稱从㐆从殳易曰殷薦之上帝孝説文善事父母者从老省从子子承老也耊徒結切説文年八十曰耊从老省从至笔逋密切所以書説文秦謂之筆或作笔敮俱爲切臿也屍升脂切説文終主从尸从死一曰在牀曰屍㞋人善切説文柔皮也按此从皮省从又又者以手柔之也莫白切履也青絲頭履从履省从糸屋説文居也从尸尸所主也一曰尸象屋形从至至所至止屋室皆从至籕作屋或作臺㞙今作尿人小便也从尾从水奴弔切般逋潘切説文辟也象舟之旋从舟从殳殳所以旋也俞容朱切説文空中木爲舟也从亼从巜从水也􅀈五忽切説文船行不安也从舟从則省兄呼榮切説文長也从口从儿臣謂从口所以訓子弟也又訏放切古況作兄也先蘇前切説文前進也从儿从之見説文視也从儿从目莫逄切説文突前也徐鉉曰􅜪重覆也􅀈􅜪而見是空前也又莫報切觸也䙷的則切説文取也从見从寸寸度之亦手也𨽻作㝵䨳虚器切見雨止息也規居隨切説文有法度也从夫从見覞弋笑切説文竝視也从二見古作􅀈款説文意有所欲也从欠窾省徐鉉曰窾塞也意有所欲而猶塞款款然許其切説文卒喜也从欠从喜㳄徐連切説文慕欲口液也从欠从水盜大到切説文私利物也从㳄㳄欲皿也􅀈須衮切選具也又蘇囷切煩符袁切説文熱頭痛也頫匪矩切説文低頭也从頁逃省太史卜書頫仰字如此徐鉉曰頫首逃亡之皃䐓而由切説文面和也顥下老切説文白皃从頁从景引楚詞天白顥顥商山四顥白首人徐鉉曰景日月之光明白也頪盧時切説文難曉也从頁米一曰鮮白皃从粉省奤普伴切面大􅀈呼内切面多肉䭬康禮切下首也説文謂从首㫖非也从詣省􅀈耳由切面和也从肉从百縣胡涓切繫也从系持大凡切説文􅎒也从首从斷又㫖沇切􅀈彼眷切更也變古作􅀈髟説文長髪猋猋也从長从彡彡師銜切􅀢陟賄切假髻巵説文圜器也一名􅀈所以節飲食象人卪在其下也引易君子節飲食印説文執政所持信也从从卩乙力切與印相向成文説文按也𨽻作抑艷麗而豐也危説文在高而懼也从厃自卪止之説文少也从勹一旬説文徧也十日爲旬从勹日勽薄皓切説文覆也从勹覆人匊説文在手曰匊从勹米俗作掬昜與章切从旦从勿謂太陽自朝而升勿勿然而渙散嵩思融切中岳嵩高山古作崇㕞所劣切説文拭也从又持巾在尸下畫篆作畵胡麥切説文界也象田四界聿所畫之􅀈今省作虐説文殘也从虎足反爪人也殸籕文磬字从殳擊之乃有聲焉矗初六切直兒幵古賢切説文平也象二干相對上平也冤於袁切説文屈也从兔从冂兔在冂下不得走益屈折也戾説文曲也从犬出戸下戾者身曲戾也今作糞説文棄除也从廾推華棄采也官溥説似米而非米者矢字華北潘切龍輟切説文撮也从􅗸从已徐鉉曰已者物也又爪撮取之陟刃切登也从下从門下其門所以爲登也臦音誑説文乖也从二臣相違看邱閑切説文睎也从手下目臣按今人視遠物多以手掌於目上蔽日曜右四百五十二會意第三下庫説文兵車藏也从車在广下廛説文一畝半一家之居臣按此从广从里从坴省説文从广里八士誤矣庶之奢切篆作庶厨也遏也从广从炗炗即光字謂光爲广所蔽也又傷注切説文屋下衆也厘澄延切一畝半一家之居砅鄰知切履石渡水也又力制切詩深則砅􅀢蒲孟切􅀢石聲或从彭沯子末切水激石皃豦求於切説文闘相丮不解也从豕虍豕虍之闘不相捨引司馬相如説豦封豕之屬一曰虎兩足舉又居御切獸名爾雅豦迅頭大如狗似獮猴黄黒色多髯鬛好奮迅其頭䝅呼回切豕發土也􅔀丁候切又竹角切龍尾星東方星也从龍省􅀈株玉切豕絆足行皃又丑玉切豚小豕也今作肆説文屬引虞書類于上帝豕走也从从豕省驫悲幽切説文衆馬也又卑遥切衆走又仕戢切􅀈丑郢切今作騁説文直馳也古作􅀈􅀈莫後切畜父也闖丑甚切馬出門皃又丑禁切馭使馬也麤食胡切説文行超逺也从三鹿又作麁􅀈盧谷切獸皮有文皃薦作甸切説文獸之所食草古者神人以薦遺黄帝帝曰何食何處曰食薦夏處水澤冬處松柏或从豕灋方乏切説文刑也平之如水从廌所以觸不直者去之从去省文作法􅀢池鄰切説文鹿行楊土也或省作塵毚士咸切説文狡兔也兔之駿者从㲋兔芳遇切説文疾也从三兔又匹陌切婏芳萬切説文兔子也婏疾也从女兔逸夷質切説文失也从辵兔猋卑遥切説文犬走皃居六切説文㺒也从犬狧甚爾切以舌取物又訖合切説文犬食也獄説文确也从㹜从言二犬所以守也古作圁狺魚巾切犬吠聲楚辭猛犬狺狺猇虚交切虎聲又乎包切犬聲吠房廢切犬鳴也􅀢鄰蕭切又力照切説文柴祭天也从火从眘眘古愼字祭天所以愼灰呼回切説文死火餘㶳从火从又又手也火既滅可以執持紆冒切又音紆勿切説文從上案下也从􅊂又持火以尉申繒𨽻作尉􅀢兹消切説文灼龜不兆也引春秋傳龜􅀢不兆或書作􆀻㶾卑遥切説文火飛也篆作爂从與􅞳同意㶴敞尒切説文盛火也逹員切蟲入火皃爂卑遥切輕脆也从火爨省烕翾劣切説文烕从火戌火死於戌陽氣至戌而盡引詩赫赫宗周褒姒烕之臣按从火从戌戌聲也未必有義杰巨列切􅀈杰梁四公子名焸火逈切火光焚符分切火灼物也或作樊符袁切説文燒田也狊扄閴切説文視皃一曰大視光説文明也从火在人上光明意也古作荧燅徐鹽切於湯中瀹肉从炎从熱省又徐心切黑説文火所熏之色也从炎上出古䆫字篆作黑炙説文炮肉也从肉在火上之石切􅀈徐廉切湯中瀹肉从熱省赫説文火赤皃奄説文覆也大有餘也又欠也从大从申展也又於瞻切精氣閉藏也夷説文平也从大从弓東方之人也㚚口觚切大也􅀢土皓切長大也又叨號切奓今作奢張也籕从多奓又敞爾切契説文木約也引易後代聖人易之以書契篆作報説文當罪人从㚔服罪􅀢下耿切説文吉而免凶也从屰从夭夭死之事故死謂之不􅀢𨽻作幸㚃今作緼説文壹㚃也从凶从壷不得泄凶也引易曰天地絪緼奏説文奏進也从􅀢从廾从屮屮上進之義㚖古老切説文大白澤也从大从白古文以爲澤字平秘切説文壮大也从三大三目二目爲三目爲益大也一曰廹也詩曰不醉而怒謂之惢寸規切又寸累切又損果切説文心疑也从三心又將支切善也慶説文行賀人也从心从夂吉禮以鹿皮爲贄故从鹿省􅧴師姦切又思廉切説文嫉利口也从心冊引商書相時􅧴民徐鍇曰冊言衆也意説文从心从音察言而知意也懣母本切煩也怣于求切異也尤古作怣盧感切悲愁皃一説林木君子所感故宋玉曰入林悲心忍魚記切説文怒也息説文喘也按此从心从自自卽鼻也㥧殊閠切説文理也順古作㥧􅀈子宋切水激石皃渉徒行厲水也水行也从水㐬㐬音突忽也篆文从水􅀢色入切不滑也或作澀澁㲻昵角切没也荘子大浸稽天而不溺溺或作㲻又乃歴切􅀈須閠切从水谷通川也須呼内切説文洒面也或作頮溼失入切説文幽溼也从水一所以覆也覆而有土故溼也邕於容切説文四方有水自邕城池者籕作􅳓又巨勇切揭塞也灥詳遵切又從緣切又取絹切雨而泉出􅀈莫獲切説文血理分衺行體者籕作􅀈亦作脉覛莫狄切説文衺視也籕作􅀈或作覓䜭私閠切深通川也从谷从殘地阬坎意也虞書曰䜭畎澮距川又逵員切冰筆陵切水堅也冬都宗切説文四時盡也从仌从夂夂古文終字古作􅀢屚郎豆切説文屋穿水下从从雨从屋省霍忽郭切飛聲也一曰揮霍猝遽也䨣匹各切説文雨濡革也霅直甲切説文霅霅震雷皃一曰衆言也䨳虚器切見雨而止息􅦏語居切二魚也又訛胡切魚之大者䲜逆怯切魚盛皃魝語計切又吉削切説文楚人謂治魚人鱻相然切説文新魚精也从三魚不變魚按今人以小魚爲鱻从魚之多也䰻牛居切捕魚也龖徒合切飛龍也从二龍䨿疾盍切惡也孔説文通也从乙从子乙請子之候鳥也乙至而得子嘉美之也古人名嘉字子孔乳而主切説文人及鳥生子曰乳獸曰産从孚从乙乙者元鳥也明堂月令元烏至之日祠于高禖以請子故乳从乙請子必以乙至之日者元鳥春分來秋分去開生之候鳥帝少昊分司之官也又儒遇切育者也乿澄之切理也臸人質切到也从二至􅀢丑利切忿戾也从至至而復遜遜遁也周書曰有夏氏之民叨􅀢古作􅀢又質利切肁治小切説文始開也從戸從聿徐鉉曰聿者始也扇説文扉也从戸从翄省一曰竹曰扇又尸連切搖翣也開𨽻作開説文張也篆从幵閒居閑切説文隟也从門从月徐鍇曰門夜閉閉而見月光是有閒隟也閃失冉切説文闚頭門中也从人在門中閉説文闔門也从門才所以拒門闑魚列切説文門梱也閦初六切衆在門中聮陵延切説文連也从耳耳連於類也从絲絲連不絶之貌也耿古幸切説文耳著頰也从耳烓省杜林説耿光也从光聖省耷德蓋切大耳曰耷􅀈仍吏切聽音也聅刺列切説文軍法以矢貫耳也引司馬法小罪聅中罪刖大罪剄聶昵輙切説文附耳私語也聑的協切説文安也又陟膈切耳堅皃拜布怪切説文首至地也楊容説拜从兩手下摯脂利切説文握持也承辰陵切説文奉也受也从手从卩从收折之列切又食列切説文斷也奻居還切説文訟也从二女又音女患切諠詔也姦私也威説文姑也从女从戍引漢律文曰婦告威姑一曰有威可畏也如説文曰隨也按从女从口女子之口惟从命奴説文奴婢皆古之辠人也引周禮其奴男子入于罪𨽻女子入于舂藁妿於何切説文女師也杜林説加教於女婁郎侯切説文空也从母中女空之意也一曰婁務也臣按此與孟子摟則得妻之摟同婁是本文桃婦人也好許皓切説文美也从女子通作􅀈婦説文服也从女持帚灑掃也媿齒九切説文可惡也古作媿又基位切説文慙也委説文委隨也从女从禾妻説文婦與夫齊者也从女从卜从又又持事妻職也嫋乃了切説文娟也又囬灼切弱也毐遏在切人無行也从土从母賈侍中説秦太后與嫪毐滛坐誅故世罵滛曰嫪毐又鋪枚切又於開切戔昨千切説文賊也从二戈周書曰戔戔巧言又楚限切擣傷也􅞯今作戎説文兵也找胡𤓰切舟進竿謂之划或从手􅚛房越切盾也戛訖黠切説文㦸也从戈从􅔣訖逆切説文有枝兵也引周禮長丈六尺从戈从榦省或作㦸我五可切説文施身自謂也或説我頃頓也从戈从或説古垂字一曰古殺字臣按許氏如此之説不知我之於六書爲何義乎我也戌戚也戊也皆从戈有殺伐之意説文不知會同取義而其説枝離況我既从殺古文成又从刀此爲殺之義何疑又借爲吾我之我許氏惑於借義朚眉耕切目無眸子或作􅀢又莫更切朚倀失道貌匃古代切説文氣也逯安説亡人爲匃或作丐匃又居謁切求也匠説文木工也从匚从斤斤所以作器也􅛩吾化切施瓦於屋也弢他刀切説文弓衣也弜其兩切説文彊也从二弓又翹移切􅀈徒案切説文行丸也彈或作􅀈从弓持丸或作弓医於計切盛弓弩矢器也國語曰兵不解医盭郎計切戾也从絃省从盩又力結切緜説文聫微也从系从帛孫説文子之子曰孫从系从子系續也繭説文蠶衣也从系从虫从薾省古作絸俗作蠒綏宣隹切説文車中把也从系从妥徐鍇曰禮升車必正立執綏所以安也當从爪从女省説文無妥字甸説文天子五百里地从田包省又石證切六十四井爲甸覩敢切䕃也畜勅六切説文田畜也引淮南子曰元田爲畜又曰魯郊禮畜或作􅀢从兹兹益也里説文居也从田从土臣按埋􅀈之字並从里則知里字復有霾音又按􅔨悝之字並从里則知里字又有恢音也胡光切又美辨切卵中之黄也嬲乃了切戲相擾也􅀈數省切一乳兩子也又乃了切戲相擾也鈲攻乎切鐵鈲銜説文馬勒口中从金从行銜行馬者也凥九魚切説文處也从尸从几尸得几而止引孝經曰仲尼凥謂間居如此故或作㞐凭皮冰切説文依几也引周書凭玉几或从馮又部孕切処昌與切止也得几而止或从虍耏乃代切説文罪不至髠曰耏字或从寸諸法度字皆从寸也亦作耏又人之切舋許愼切殺牲釁其血而後薦其肉故从且从釁省斷凡有三音音覩暖切者絶也音都玩切者決也音徒玩切者説文截也斬説文截也从車从斤古者斬人以車裂之也斵竹角切斫也从斤从音斗或从畫料洛蕭切説文量也从斗从米米在斗中春秋傳臣料虞君又力弔切􅧿刑狄切矛屬長􅧿謂之勃盧軍説文圜圍也四千人爲軍从車从包省軍兵車周制萬二千五百人爲軍輦説文輓車也从車从㚘在車前引之者䜌盧官切亂也理也又龍眷切言不絶絲説文蠶所吐也从二系㬎渠飲切絮中小繭師説文二千五百人爲師从帀从􅎧􅎧四帀衆意也今作官説文吏事君也从宀从􅎧􅎧猶衆也去演切説文云小塊也从臾从􅊟臾古貴字𨽻省作陟説文登也隉倪結切説文危也从􅊟从毁省徐廵以爲隉凶也賈侍中説隉法度也班固説不安也引周書邦之杌隉獸説文守備者也辤説文不受也从辛从受受辛冝辤辭説文訟也从􅜆􅜆猶理辜也􅜆理也悉協切火熟也从又持炎辛辛者物熟味也辟鼻益切法也从辛辠也从命省出令以治人辠也説文謂从卩从口誤矣􅀈必益切君也辟君之辟或从官也孨只兖切説文謹也从三子又昵立切衆兒孱士連切説文迮也一曰呻吟也从孨在尸下徐鉉曰尸屋也孴魚記切説文盛兒从孨从日籕作􅀢或作􅀈孴又爲奇字醯説文酸也作醯以以酒从酒並省從皿皿器也俗作􅀈非是􅀈許亥切酒器醉説文醉卒也各卒其度量不至於亂也􅷬租昆切説文酒器也从酋廾以奉之引周禮六尊犧尊象尊著尊壺尊大尊山尊以待祭祀賔客之禮或从寸古作􅕆愚原切説文水泉本也从灥出厂下篆作原今作源戍舂遇切説文守邊也从人持戈伐説文擊也从人持戈埶倪祭切説文種也从坴持而種之引詩我埶黍稷􅀈竹角切説文斫也斵或从丮書卟堅奚切説文卜以問疑也書稽疑舊作卟亦作乩唐開元改用稽無義占説文視兆問也希疏巾也从爻从巾棥附袁切藩也从爻从林象林薄交加有藩籬之状隼聳尹切説文祝鳩也隹从十象射隼之形雋徂兖切説文肥肉从弓所以射隹䍜陟敎切覆鳥之具隻之石切鳥一枚也雀卽約切説文依人小鳥也奞息遺切説文鳥張毛羽自奮也从大从隹奮説文翬也从隹在田上一曰振也奪説文手持隹失之也臣今按从寸者攘人不顧法度如奞攫然蒦乙虢切説文規蒦商也从又持萑一曰視遽兒叡俞芮切説文深明也通也臣按此从目从叡省或言从谷省非古作睿㕡黒各切深溝也或从土飍必幽切風也􅔨許勿切疾風也圭説文瑞玉也上圜下方公執桓圭九寸侯執信圭伯執躬圭皆七寸子執榖璧男執蒲璧皆五寸以封諸侯以重土楚爵有執圭埽蘇老切説文棄也又先到切圣苦骨切説文汝潁之間謂致力於地曰圣堯説文高也從壵在几上高遠也臣按堯當从壵从几因帝堯以壵爲名故又加几焉古文作􅀈亦从二几可知也菫巨斤切説文黏土也从土从黄省埾從遇切説文土積也或作􅀢封方容切説文爵諸侯之土也从之从土从寸守其制度也公侯百里伯七十里子男五十里徐鍇曰各之其土也加説文語相増加也从力从口勞説文劇也从力熒省熒火燒門用力者勞臣按从力从營省言用力經營也又郎到切劦胡頰切説文同力也从三力引山海經惟號之山其風苦劦恊説文同心之和从劦从心勰胡頰切説文同思之和从劦从思劣説文弱也㔢翾劣切拽也勖許六切勉也臣按从力从冒㑹意説文謂聲誤矣右二百四十六三體會意序曰二母之合爲㑹意二母者二體也有三體之合者非常道也故别之今作退字从彳从日从夂後遲也从彳幺攵者後也徐鍇曰幺猶繯躓之也􅀈託盍切歠也从舌从水从口龠音藥从亼从􅮎冊樂之竹管三孔以和衆樂聲丞翊也从从卩从山山高奉承之義㕞从又持巾在尸下尸屋也攸行水也从支从人水省徐鍇曰支入水所杖也秦刻石作􅀈􅀢音糞棄除也從廾推華棄采也官灋説似米而非米者矢字今作棄从廾推華棄之从逆子也觲息營切用角低昂便也从羊牛角詩觲觲角弓解佳買切判也从刀判牛角簋黍稷方器从竹从皿从皀箕亦作箕从竹其象形下其丌也或越逼切邦也从口从戈以守一一地也廛从广从里从坴省卽陸而居帚止酉切糞也从又持中埽門内灋刑也从水平凖也从􅀢觸不直者去之尉以上案下也从􅊂又持火以尉申繒也􅮼音隙際見之白也从白上下小見舂从廾持杵臨臼上午杵省象爵之形中有鬯酒又持之也迃勿切上體與爨同意象煑之形从彡所以飾鬯也僉皆也从亼从吅从从鬯从凵凵器也象米匕所以投之盥澡手也从臼水臨皿都騰切禮器也从廾持肉在豆上􅀈亦省作虐从虎足反爪人竷音坎繇也舞也樂也樂有章从章从夅从夊詩竷竷舞我張流切引擊也从羍支見皿醯呼雞切作醯以以酒從酒並省從皿皿器也㠭知衍切極巧而視之也从四工祭从示从又手持肉祝从示从人口从肉从酒省酒以和醬朢音妄月滿與日相朢以朝君从月从臣从壬壬朝廷直从􅡊从十从目从又持炎辛辛者物熟味盧感切君子所感也宋玉曰入林悲心寒從人在宀下以茻薦覆之下有仌封爵諸侯之土也从之从土从寸守其制度也斝舉下切玉爵也从吅从冖从斗冠弁冕之總名从冂从元冠有法制从寸右四十二凡會意類計七百四十轉注第四序曰諧聲轉注一也役它爲諧聲役已爲轉注轉注也者正其大而轉其小正其正而轉其偏者也建類主義轉注序曰立類爲母從類爲子母主義子主聲主義者是以母爲主而轉其子主聲者是以子爲主而轉其母􅕆耆考耇􅹀孝􅫎耊履㞛屣屨屜屩屐屧㝱㝲㝱寎寐寱寣瞢蘉􅬤八四六右并注五十建類主聲轉注弌弍弎鳳凰糴糶弦紗盭䋵􅀈􅀈虒􅕆右并注二十互體别聲轉注序曰諧聲轉注皆以聲别聲異而義異者曰互體别聲義異而聲不異者曰互體别義杲東杳本末朱易明尖夵觕􅠅告吽㕦􅀈古叶卟占听􅀢啼啻唯售吥否呅吝含吟嗼􅀢啁􅀢叨召􅀢躘躗􅀈䜐諅諆􅀢􅀈􅬢􅵔眇省䀿䀸眂􅀢盳盲相􅀈􅀈晟䳡鵻鶘鶦鸛􅀈鸞􅀈􅪦鶄􅀈􅀈骴􅀢胡􅨨槩槪􅀢欇棸棷朶㭁楪枼根􅀢柅􅀢某柑栞枅架枷森􅀢暑暏秄季􅓱􅀈襱襲袲袳袍􅀢衾衿裹裸袔䙝褹􅀈􅀢沯砅􅠝烕􅀈谿豀擘擗摲㨻􅀢􅝷奻㚣娶娵嬎娎􅀈媨􅀈壀壁􅀢􅀈垢垕鏨鏩􅀢㠱醔恭㤨忾忥悲悱㥍惎怤㤔愈愉忘忙怢怣􅡣㥧愔意怗㤐怘怙憞憝怡怠慲悍􅀢悺悹懬懭忉忍忠忡􅀢􅀈􅜜怫怓怒忦􅢚㥲愼忍㣼惋惌慽慼􅀢恤惵􅀢惐惑􅀢恰愀愁感􅢯悆悇嶜岑岒㠑嶵嵬㟴汬汫澼㵨沸􅀢􅀢蜱蜑蜒蜃蜄蠆蠇蜇􅔼右并注二百五十四互體别義轉注聲同義異橤􅀈旻旼朞期猶猷獒獓􅀢𢤱愚㥥㥳愿懰􅀢􅀈􅀢揧揦􅀢忔繴䌟蜊䖽􅀢螈􅀢蚥坒㘩䥒鏹嚨􅀢􅕆喭攏􅀢憚􅓆櫳㰍㯕􅀢右并注四十八凡轉注類計三百七十二轉注音義建類主義轉注音義老説文七十曰老从匕毛匕音化言須髪變白也老去其下體而成字耆渠脂切説文老也考説文老也耇古厚切説文老人面凍黎若垢􅹀常句切説文老人行才相逮从老省易省行象孝説文善事父母者从老省从子子承老也􅫎丁念切説文老人面如㸃也耊徒結切説文年八十曰耊履从尸聲也从舟象其形也从彳从夂行而曵者其惟履乎㞛舉履切赤舄徂回切粗履也呼􅀈切鞮屬徐呂切履屬屣所寄切履不躡跟也屨履也一曰鞮也遲據切履也屜他計切履中薦屩居酌切屐也屐屩也音歴履下也屧施協切履中薦㝱音夢説文寐而有覺也从宀从疒夢聲引周禮以日月星辰占六㝱之吉凶或作􅬤緜批切㝱驚又毋禮切寐而未厭披尤切寐聲呼含切寢不褫衣人余切假寐㝲七稔切説文病臥也或作其季切説文熟寐也依據切楚人謂寐曰母亘切眠寤也思鄧切眠寤也謨郎切寐言也亦是从省吾含切寐聲寎皮命切説文卧驚病也七稔切視皃寐密二切説文卧也寤五故切説文寐覺而有信曰寤一曰晝見而夜夢也寱倪祭切説文瞑言也寣呼八切説文卧驚也一曰小皃號寣寣一曰河内相評也瞢木空切説文目不明也从首从旬旬目數揺也又眉耕切無眸子也徒登切瞢日暗郎鄧切卧初起皃蘉謨郎切勉也又彌登切􅬤莫鳯切寐而有覺也暮葛切食馬穀也謨中切寐言从眠从瞢省八數也四脉八之數未能上徹六與四同體而有加焉建類主聲轉注音義弌从一數也从弋聲也弍弎弍弎从弋無聲以弌爲類之聲故可以轉二三而爲注鳳从鳥義也从几聲也凰从几無聲以鳳爲建類糴从䊮聲也从入義也糶从䊮無聲以糴爲建類胡南切舌也象形从弓舌體弓又戸感切口上曰臄下曰曷合切从省亦聲也都黎切又田黎切説文不能行爲人所引音提从允从提省以爲建類之聲故又从奚省音擕説文也从尣从攜省以爲建類之聲故又从奚省弦説文弓弦也从弓象絲軫之形凡字母主義子主聲未有省母而立子者惟弦省母以子主類故爲建類主聲之注也紗於霄切急戾也从絃省少聲盭音戾戾也从弦省盩䋵於罽切不成遂急戾也从弦省曷聲􅙚邱召切􅙚􅚤􅚤牛召切􅙚􅚤不安也􅙚从亢義也从喬聲也􅚤从亢無聲以􅙚爲建類之聲虒相支切説文委虒虎之有角者从虎義也从􅛣聲也􅛣音移又大耳切􅕆補典切􅕆虒薄皃􅕆从厂無聲以虒爲建義之聲互體别聲轉注音義杲古老切明也从日在木上東从日在木中杳冥也从日在木下木若木也日之所升降本説文木下曰本本朱末同意一在下爲本在中爲朱在上爲末一無義也但記其别耳末木上曰末朱説文赤心木松栢屬一曰丹也易羊益切祕書説日月爲易象隂陽也明日月並明尖子㢘切鋭也夵以冉切本廣末狹觕坐五切牛角直皃􅠅樞玉切牴也古作牪告牛觸人角著横木所以告人也吽於金切牛鳴㕦胡化切口大皃􅀈音大嘗也古説文故也从十口識前言者也叶音恊衆口同也卟堅奚切説文卜以明疑也占之廉切説文視兆問卜也听魚其切听嗞口開皃􅀢陟列切博雅塞也啼説文號也啻説文語時不啻也唯夷隹切專辭又愈水切諾也售承呪切賣去手也吥普溝切吸也否不可也呅武粉切説文口邊也吝説文恨惜也含嗛也吟説文呻也又宜禁切長詠也嘆末各切説文􅀈嗼也一曰定也􅀢䝉晡切謀議也啁陟交切説文啁嘐也􅀢時流切噟也叨貪也召呼也􅀢盧東切􅀢蹈行皃躘盧鍾切躘踵行皃躗于歳切過也􅀈姑衛切僵也一曰跳也䜐翾規切説文相毁也一曰諉也䜏土禾切方言慧也楚謂之䜏或省諅居之切忌也又渠記切説文忘也引周書上不諅于凶德諆邱其切説文欺也􅀢咨邪切咨也􅀈楚懈切異言􅬢壹計切博雅譍也又戸禮切誠言也􅵔於其切恨聲眇説文一目小也省察也􅀈之列切目明也䀸征例切目美也眂章移切視也又時利切􅀢呼昆切目暗也盳蒲光切盳洋仰視皃盲眉耕切説文目無眸子相思將切説文省視也引易地可觀者莫可觀於木詩曰相䑕有皮􅀈莫目切目不明也􅀈翾劣切説文視高皃􅀢休必切目深皃䳡於諫切鴽屬鵻朱惟切鳥名小鳩也一名鳺鴀鶘洪孤切鵜鶘好羣飛沈水食魚鶦洪孤切雞鶦似鴙青身白頭鸛古玩切説文小雀也詩鸛鳴于垤今按鸛水鳥之大者􅀈呼官切爾雅􅀈鷒鶝鶔如鵲短尾射之銜矢射人鸞鳥名説文亦神靈之精赤色五采雞形鳴中五音頌聲作則至周成王時氐羌獻之也􅀈謨還切山海經有鳥如鳬一翼一目相得乃飛名曰􅀈或省􅪦咨盈切􅀈􅪦也鶄倉經切鶄鶴鳥名畜之以厭火􅀈蒲木切鳥名􅀈説文鳥􅀈也􅀈薄報切又北角切水鳥似鶂而短頸骴才枝切又疾智切説文鳥獸殘骨骴骴可惡引明堂月令掩骼埋骴􅀢蔣氏切鳥骨一曰骨有肉也胡牛垂也􅨨空胡切博雅􅨨䐧𦢊也槩許旣切平斗木又居代切槪古外切杖也又巨列切杙也􅀢質渉切説文木葉揺白也欇失渉切博雅枝也棸甾尤切木名棷將侯切􅚛謂之棷又甾尤切説文木薪也朶都果切説文木垂朶朶也㭁人枝切木名又如證切一曰止車木枻以制切楫謂之枻枼弋涉切説文楄也从丗聲徐鉉謂从丗非聲改而爲卉卉蘇合切臣按此卽木葉象形非聲也根説文木株也􅀢下簡切閾也柅女夷切絡杙又女履切説文木也實如梨一曰止車木又乃禮切􅀢丑貳切篗柄也某謨杯切果名説文柟也又莫後切酸果也柑果名似橘又其淹切以木銜馬口也春秋傳柑馬而秣之栞邱寒切又稽延切入山刋木以識道也枅經天切屋櫨也架居迓切杙也所以舉物或作嫁枷居牙切説文柫也淮南謂之柍森木多皃􅀢居䕃切承樽案暑熱也暏董五切説文旦明也秄祖似切説文壅禾本季説文少稱也􅓱忙皮切説文穄也􅀈謨加切廣雅䅸也襱盧東切方言齊魯謂之襱闗西謂之袴一曰裙也又柱勇切説文袴踦也襲説文左衽袍也从衣龖省聲籕作袲乃可切裒袲衣皃袳敞含切説文衣張也袍説文也引論語衣敝緼袍又薄報切前襟袌薄皓切説文褱也衾袪音切説文文大被也衿居吟切衣系也又其淹切裹包束也裸袒也倚可切袲衣皃袔口箇切夾衣又何佐切博雅䘸補也褻説文私服引詩是䙝袢也褹倪祭切方言複𥜗謂之䇶褹􅀈彼小切説文上衣也从衣从毛古者衣裘以毛爲表篆作􅀢薄報切衣前襟一曰褱也沯子末切水激石皃砅鄰知切履石渡水也又力智切詩深則砅􅠝九勿切結􅠝西域獸名食香無毛但自􅀢有毛廣寸至尾燒刺不能傷渠勿切埤倉短尾犬也烕翾劣切説文㓕也从火戌火死於戌陽氣至戌而盡引詩赫赫宗周褒姒威之臣按从火从戌戌聲也未必有義又莫列切􅀈休必切狂也齊人語谿説文山瀆無所通者豀弦雞切反戾也莊子曰婦姑勃豀擘博厄切説文撝也一曰大指擗毗亦切撫也摲師咸切芟也禮有摲而播㨻在敢切擊也􅀢昨木切劒也􅝷仕角切刺也奻居還切説文訟也㚣古巧切好也娶逡遇切説文取婦也娵遵須切星名爾雅娵觜之口營室東壁也又菑尤切嬎芳遇切兔子又孚袁切孚萬切説文生子齊均也娎許列切説文娎㛍也又顯計切喜也􅀈之列切女字媨在九切博雅好也又以九切醜也􅀈七六切説文醜也一曰老女壀普米切壀堄陴也壁必歴切説文垣也􅀢祖果切篆作􅀢説文止也从土从丣古作坐並象人據坐之形又並徂卧切􅀈於九切邑名垢説文濁也一曰塵也或作坸垕狠口切説文山陵之厚也鏨財甘切鑿也又在敢切鏩鋤咸切鏩鏩鋭進貌又疾染切􅀢居之切疾恚也㠱墍已切長踞也􅀈初尤切漉取酒也醔字秋切説文繹酒也从酉水半見其上恭居容切肅也㤨胡公切戰慄也忾聲夷切喜皃忥許旣切癡皃悲逋眉切説文痛也悱憤也㥍渠之切心有所繫也惎渠記切説文毒也怤芳無切説文思也一曰悦也㤔扶遇切心附也愈勝也瘳也愉容朱切説文薄也引論語私覿愉愉一曰樂也和也忘武方切説文不識也又無放切棄忘也忙謨郎切心廹也怢吐内切緩也忘也怣于求切異也尤古作怣􅡣於求切説文愁也㥧古文順字愔伊滛切愔愔安和也意説文从心从音察言而知意怗多忝切静也一曰服也又託協切㤐癡廉切㤐懘樂音不和怘音固專也怙後五切説文恃也憞他昆切憞惃心不明也憝杜罪切恨也怡悦也怠慢也母本切煩也慲謨官切忘也悍性急也􅀢音奸僞也悺鄔版切人名漢有左悺悹古丸切又古緩切悹悹無依也懬口黨切大意又苦謗切懭苦晃切懭恨意不得也又古猛切忉都勞切忉忉憂勞也忍魚旣切説文怒也忠説文欽也忡説文憂也􅜜音弼輔也怫芳未切忿皃怓尼交切亂也怒恚也忦若怪切恨也又牛戒切説文憂也􅢚許介切説文忽也引孟子孝子之心不若是􅢚㥲音嗔怒也愼時刃切説文謹也忍説文能也㣼而振切心能於事也惋烏貫切驚歎也於袁切讎也恚也慽含歴切憂也慼子六切慙也􅀢呼弦切急也恤雪律切憂也惵託恊切静也􅀢私列切不安皃惐乙六切痛心也惑説文亂也􅀢迄及切合也太元㥷而􅀢之又乞洽切恰乞洽切説文用心也愀千遥切色變也莊子愀然變容又七小切愁鋤尤切説文憂也又財勞切揚雄有畔牢愁􅀈居尤切聚也􅀢巨九切説文怨仇也感不忘於心也􅢯邱廉切􅢯㥓意不安皃悆羊茹切説文忘也嘾也引周書有疾不悆悆喜也悇同都切苦憂也嶜容林切山高大皃􅀈鉏簪切岑高鋭皃崖説文高邊也崕魚羈切崎崕石危皃岑鉏簪切説文山小而髙岒其淹切山名㠑祖囬切説文大髙也嶵祖猥切山兒嵬五灰切説文髙不平也㟴鄔毁切山兒汬疾郢切陷也汫棄挻切汫涏小水皃澼匹辟切腸間水也㵨匹智切水中洲也沸方未切涫也􅀢敷勿切灑也􅀢紕招切螵蛸也或作螵蜱賔彌切又部廻切蜃屬蜑蕩旱切蠻屬蜒夷然切蟲名方言燕北謂析易曰祝蜒蜃是忍切蛤也説文雉入海化爲蜃蜄之刃切動也又時刃切蛟屬蠆丑邁切説文毒蟲也蠇力制切説文蚌屬似螊微大出海中民食之一曰雕百嵗化爲蠇或作蠇蜇陟列切螫也􅔼似絶切䰸䱑魚名似蝤蛑生海中互體别義轉注音義橤乳捶切垂也􅀈木名旻眉貧切説文秋天也旼旼旼和也朞居之切説文復其時也期説文會也猶説文玃屬一曰隴西謂犬子爲猶一曰似麑居山中聞人聲豫登木無人乃下世謂不決曰猶豫猷道也獒牛刀切説文犬知人心可使者引春秋傳公嗾夫獒獓山海經三危之山有獸焉牛身四角豪如被簑名曰獓􅀢盧東切􅀢怱遽皃𢤱𢤱悷多惡皃愚元俱切説文戇也从心从禺禺猴屬獸之愚者㥥説文懽也琅邪朱虚有㥥亭㥳愚袁切測量也愿慤愼也周禮上愿紏暴劉昌宗讀懰力求切懰慓憂皃一曰怨也或从留􅀢定意􅀈下介切忖度也􅀢傾心也忥許訖切癡皃忾喜也􅀢郎逹切博雅擘也揦撥揦手披也繴博尼切説文繴謂之罿罿謂之罬罬謂之罦捕鳥覆車也䌟織絲帯也蜊良脂切蛤蜊海蚌也䖽螏䖽蟲名似蝗大腹長角食蛇腦􅀢愚轅切重蠶爲􅀢螈説文榮蚖蛇醫以注鳴者卽蜥蜴也􅀢匪父切蟲名食𤓰者蚥王蚥蟲名蟾諸也爾雅不蜩王父坒毗至切説文地相次坒也㘩配合也太元隂陽㘩參䥒巨兩切鉛屬鏹以繦貫錢嚨盧東切喉也􅀢大聲也􅕆魚戰切傳言喭吊失國曰喭攏盧東切理也􅀢擊也憚徒案切説文忌難也􅓆􅓆狐邑名在洛南百五十里秦遷周赧王於此櫳盧東切檻也一曰養獸圈㰍房室之疏也又盧鍾切㯕相支切博雅木下枝謂之椑㯕􅀢木薪通志卷三十二
