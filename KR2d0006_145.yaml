body:
  text: 通志卷一百二十四上宋右廸功郎鄭樵漁仲撰列傳第三十七上晉皇甫謐子方囘摯虞束晢王接郤詵阮种華譚袁甫陸機孫拯弟耽弟雲兄雲從父喜夏侯湛弟淳承淳子潘岳從子尼張載弟協江統子虨惇孫楚子衆子洵纂統纂統弟綽羅憲兄子尚滕脩馬隆胡奮陶璜吾彥張光趙誘周處子玘弟札玘子勰筵玘札兄子周訪子撫子虓撫子楚撫弟光楚子瓊孫瓊光子仲皇甫謐字士安㓜名静安定朝那人漢太尉嵩之曾孫也出後叔父徙居新安年二十不好學遊蕩無度咸以為癡嘗得𤓰果時新輙進所後叔母任氏任氏曰孝經云三牲之養猶為不孝汝今年餘二十目不存敎心不入道無以慰我因歎曰昔孟母三徙以成仁曾父烹豕以存敎豈我居不卜鄰敎有所闕何爾魯鈍之甚也脩身篤學自汝得之於我何有因對之流涕謐乃感激就鄉人席坦受書勤力不怠居貧躬自稼穡帶經而農遂博綜典籍百家之言沉静寡慾始有高尚之志以著述為務自號元晏先生著禮樂聖真之論後得風痺疾猶手不輟卷或勸謐修名廣交謐以為非聖人孰能兼存出處居田里之中亦可樂堯舜之道何必崇接世利事官鞅掌然後為名乎乃作元守論以答之其要在於守道全真而已遂不仕躭翫典籍忘寢與食時人謂之書滛或箴其過篤將損耗精神謐曰朝聞道夕死可矣况命之修短分定懸天乎叔父有子既冠謐年四十喪所生後母遂還本宗城陽太守梁栁謐從姑子也當之官人或勸謐餞之謐曰栁為布衣時過吾吾送迎不出門食不過鹽菜貧者不以酒肉為禮今作郡而送之是貴城陽太守而賤梁栁豈中古人之道是非吾心所安也魏郡召上計掾舉孝廉景元初相國辟皆不行其後鄉親勸令應命謐為釋勸論以通志焉其後武帝頻下詔敦逼不已謐稱草莾臣上疏自陳抱病困劣不任進路辭切言至遂見聽許歳餘又舉賢良方正並不起自表就帝借書帝送一車書與之謐雖羸疾而披閲不怠初服寒食散而性與之忤毎委頓不倫嘗悲恚叩刃欲自殺叔母諫之而止時濟隂太守蜀人文立表以命士有贄為煩請絶其禮幣詔從之謐聞而歎曰亡國之大夫不可與圖存而以革歴代之制其可乎夫束帛戔戔易之明義元纁之贄自古之舊也故孔子稱夙夜彊學以待問席上之珍以待聘士於是乎三揖乃進明致之難也一讓而退明去之易也若殷湯之於伊尹文王之於太公或身即莘野或就載以歸唯恐禮之不重豈吝其煩費哉且一禮不備貞女耻之况命士乎孔子曰賜也爾愛其羊我愛其禮棄之如何政之失賢於此乎在矣咸寧初又詔曰男子皇甫謐沉静履素守學好古與流俗異趣其以謐為太子中庻子謐固稱疾篤帝初雖不奪其志尋復發詔徵為議郎又召補著作郎司𨽻校尉劉毅請為功曹並不應著論為𦵏送之制名曰篤終曰元晏先生以為存亡天地之定制人理之必至也故禮六十而制壽至于九十各有等差防終以素豈流俗之多忌者哉吾年雖未制壽然嬰疢彌紀仍遭喪難神氣損劣困頓數矣常懼夭隕不期慮終無素是以畧陳至懷夫人之所貪者生也所惡者死也雖貪不得越期雖惡不可逃遯人之死也精歇形散魂無不之故氣屬於天寄命終盡窮體反真故尸藏于地是以神不存體則與氣升降尸不乆寄與地合形形神不隔天地之性也尸與土并反真之理也今生不能保七尺之軀死何故隔一棺之土然則衣衾所以穢尸棺椁所以隔真故桓司馬石椁不如速朽季孫璵璠比之暴骸文公厚𦵏春秋以為華元不臣楊王孫親土漢書以為賢於秦始皇如令魂必有知則人鬼異制黄泉之親死多於生必將備其器物用待亡者今若以存况終非即靈之意也如其無知則空奪生用損之無益而啓姦心是招露形之禍增亡者之毒也夫𦵏者藏也藏也者欲人之不得見也而大為棺椁備贈存物無異於埋金路隅而書表於上也雖甚愚之人必將笑之豐財厚𦵏以啓姦心或剖破棺椁或牽曵形骸或剝臂捋金環或捫腸求珠玊焚如之刑不痛於是自古及今未有不死之人又無不𤼵之墓也故張釋之曰使其中有欲雖錮南山猶有隙使其中無欲雖無石椁又何戚焉斯言逹矣吾之師也夫贈終加厚非厚死也生者自為也遂生意於無益棄死者之所屬知者所不行也易稱古之𦵏者衣之以薪𦵏之中野不封不樹是以死得歸真亡不損生故吾欲朝死夕𦵏夕死朝𦵏不設棺椁不加纒歛不修沭浴不造新服殯唅之物一皆絶之吾本欲露形入阬以身親土或恐人情染俗來乆頓革理難今故觕為之制奢不石椁儉不露形氣絶之後便即時服幅巾故衣以蘧蒢裹尸麻約二頭置尸牀上擇不毛之地穿阬深十尺長一丈五尺廣六尺阬訖舉牀就阬去牀下尸平生之物皆無自随唯齎孝經一卷示不忘孝道蘧蒢之外便以親土土與地平還其故草使生其上無種樹木削除使生跡無處自求不知不見可欲則姦不生心終始無怵惕千載不慮患形骸與后土同體魂爽與元氣合靈真篤愛之至也若亡有前後不得移祔祔𦵏自周公來非古制也舜𦵏蒼梧二妃不從以為一定何必周禮無問師工無信卜筮無拘俗言無張神坐無十五日朝夕上食禮不墓祭但月朔於家設席以祭百日而止臨必昬明不得以夜制服常居不得墓次夫古不崇墓智也今之封樹愚也若不從此是戮尸地下死而重傷魂而有靈則寃悲沒世長為恨鬼王孫之子可以為誡死誓難違幸無改焉而竟不仕太康三年卒時年六十八子童靈方囘等遵其遺命謐所著詩賦誄頌論難甚多又撰帝王世紀年厯高士逸士烈女等傳元晏春秋並重於世門人摯虞張軌牛綜席純皆為晉名臣方囘少遵父操兼有文才永嘉初博士徵不起避亂荆州閉門閑居未嘗入城府蠶而後衣耕而後食先人後已尊賢愛物南士人士咸崇敬之刺史陶侃禮之甚厚侃毎造之著素士服望門輙下而進王敦遣從弟廙代侃侃遷為廣州刺史侃將詣敦方囘諫曰吾聞敵國滅功臣亡足下新破杜弢功莫與二欲無危其可得乎侃不從而行敦果欲殺侃頼周訪獲免廙既至荆州大失物情百姓叛廙迎杜弢廙大行誅戮以立威以方囘為侃所敬責其不來詣已乃收而斬之荆土華夷莫不流涕摯虞字仲治京兆長安人也父模魏太僕卿虞少事皇甫謐才學通博著述不倦郡檄主簿虞嘗以死生有命富貴在天天之所祐者順也人之所助者信也履信思順所以延福違此而行所以速禍然道長世短禍福舛錯怵迫之徒不知所守蕩而貢憤或迷或放故借之以身假之以事先陳處世不遇之難遂棄彛倫輕舉逺遊以極常人罔惑之情而後引之以正反之以義推神明之應於視聽之表崇否泰之運於智力之外以明天任命之不可違故作思遊賦其辭超詣為世所稱舉賢良與夏侯湛等十七人策為下第拜中郎武帝詔諸賢良方正直言㑹東堂親策之虞對切直擢為太子舍人除聞喜令時天子留心政道又吳寇新平天下乂安虞上太康頌以羙晉德帝嘉之以母憂去職乆之召補尚書郎將作大匠陳勰掘地得古尺尚書奏今尺長於古尺宜以古為正潘岳以為習用已乆不宜復改虞駁曰昔聖人有以見天下之賾而擬其形容象物制器以存時用故參天兩地以正算數之紀依律計分以定長短之度其作之也有則故用之也有徵考歩兩儀則天地無所隱其情凖正三辰則懸象無所容其謬施之金石則音韻和諧措之規矩則器用合宜一本不差而萬物皆正及其差也事皆反是今尺長於古尺幾於半寸樂府用之律呂不合史官用之歴象失占醫署用之孔穴乖錯此三者度量之所由生得失之所取徵皆絓閡而不得通故宜改今而從古也唐虞之制同律度量衡仲尼之訓謹權審度今兩尺並用不可謂之同知失而行不可謂之謹不同不謹是謂謬法非所以軌物垂則示人之極凡物有多而易改有少而難變亦有改而致煩有變而之簡度量是人所常用而長短非人所戀惜是多而易改者也正失於得反邪於正一時之變永世無二是變而之簡者也憲章成式不失舊物季末茍合之制異端雜亂之用當以時釐改貞夫一者也臣以為宜如所奏又表論封禪事儀典甚悉虞又以漢末喪亂譜傳多亡失雖其子孫不能言其先祖撰族姓昭穆十卷上疏進之以為足以備物致用廣多聞之益以定品違法為司徒所劾詔原之時太廟初建詔普增位一等後以主者承詔失㫖改除之虞上表曰臣聞昔之聖明不愛千乘之國而惜桐葉之信所以重至尊之命而逹於萬國之誠也前乙巳詔書逺稱先帝遺惠餘澤普增位一等以酬四海欣戴之心驛書班下被于逺近莫不鳥騰魚躍喜蒙徳澤今一旦更以主者思文不審收既往之詔奪已澍之恩臣愚竊以為不可詔從之元康中遷吳王友時荀顗撰新禮使虞討論得失而後施行元皇后崩杜預奏諒闇之制乃自上古是以高宗無服䘮之文而唯文稱不言漢文限三十六日魏氏以降既虞為節皇太子與國為體理宜釋服卒哭便除虞答預書曰唐稱遏宻殷云諒闇各舉事以為名非既𦵏有殊降周室以來謂之喪服喪服者以服表喪今帝者一日萬機太子監撫之重以宜奪禮𦵏訖除服變制通理垂典將來何必附之於古使老儒致爭哉皇太孫尚薨有司奏御服齊衰朞詔令博士議虞曰太子生舉以成人之禮則殤理除矣太孫亦體君傳重由位成而服全非以年也從之虞又議玉輅兩社事皆有依據後歴祕書監衞尉卿從恵帝幸長安及東軍來迎百官奔散遂流離鄠杜之間轉入南山中糧絶饑甚拾橡實而食之後得歸洛陽歴光祿勲太常卿時懷帝親郊自元康已來不親郊祀禮儀弛廢虞考正舊典法物粲然及洛京荒亂盗竊縱横人饑相食虞素清貧遂以餒卒虞撰文章志四卷注觧三輔决錄又撰古文章類聚區分為三十卷名曰流别集各為之論辭理愜當為時所重虞善觀元象嘗謂友人曰今天下方亂避難之國其唯涼土乎性愛士人有表薦者常為其辭東平太叔廣樞機清辯廣談虞不能對虞筆廣不能答更相嗤笑紛然於世云束晢字廣微陽平元城人漢太子太𫝊疎廣之後也王莽末廣曾孫孟逹避難自東海徙居沙鹿山南因去疎之足遂改姓焉祖混隴西太守父龕馮翊太守並有名譽晢博學多聞與兄璆俱知名少遊國學或問博士曹志曰當今好學者誰乎志曰陽平束廣微好學不倦人莫及也還鄉里察孝廉舉茂才皆不就璆娶石鑒從女棄之鑒以為憾諷州郡公府不得辟故晢等乆不得調太康中郡界大旱晢為邑人請雨三日而雨注衆謂晢誠感為作歌曰束先生通神明請天三日甘雨零我黍以育我稷以生何以醻之報束長生晢與衞恒厚善聞恒遇禍自本郡赴喪嘗為勸農及䴵諸賦文頗鄙俗時人薄之而性沉退不慕榮利作元居釋以擬客難張華見而竒之石鑒卒王戎乃辟璆華召晢為掾又為司空下邳王晃所辟華為司空復以為賊曹屬時欲廣農晢上議曰伏見詔書以倉廪不實關右饑窮欲大興田農以播嘉榖此誠有虞戒大禹盡力之謂然農穰可致所由者三一曰天時不諐二曰地利無失三曰人力咸用若必春無霡霂之潤秋繁滂沱之患水旱失中雩禳有請雖使羲和平秩后稷親農理彊甽於原隰勤藨蓘於中田猶不足以致倉庾盈億之積也然地利可以計生人力可以課致詔書之㫖亦將欲盡此理乎今天下千城人多游食廢業占空無田課之實較計九州數過萬計可申嚴此防令嚴司精察一人失課負及郡縣此人力之可致也又司州十郡土狹人繁三魏尤甚而猪羊馬牧布其境内宜悉破廢以供無業業少之人雖頗割徙在者猶多田諸菀牧不樂曠野貪在人間故謂北土不宜畜牧此誠不然案古今之語以為馬之所生實在冀北大賈䍧羊取之清渤放豕之歌起於鉅鹿是其效也可悉徙諸牧以充其地使馬牛猪羊齕草於空虚之田游食之人受業於賦給之塲此地利之可致者也昔騅駓在坰史克所以頌魯僖却馬牧田老氏所以稱有道豈利之所以會哉又如汲郡之吳澤良田數千頃泞水停洿人不墾植聞其國人皆謂通泄之功不足為難舄鹵成原其利甚重而豪彊大族惜其魚捕之饒構説官長終於不破此亦谷口之謠載在史篇謂宜復下郡縣以詳當今之計荆揚充豫汙泥之土渠塢之宜必多此類最是不待天時而豐年可獲者也以其雲雨生於畚臿多稌生於決泄不必望朝隮而黄潦臻禜山川而霖雨息是故兩周爭東西之流史起惜漳渠之浸明地利之重也宜詔四州刺史使謹案以聞又昔魏氏徙三郡人在陽平頓邱界今者繁甚合五六千家二郡田地逼狭謂可徙還西州以充邊土賜其十年之復以慰重遷之情一舉兩得外實内寛增廣窮人之業以闢西郊之田此又農事之大益也轉佐著作郎撰晉書帝紀十志遷博士著作如故初太康二年汲郡人不凖盗發魏襄王墓或言安釐王冢得竹書數十車其紀年十三篇記夏已來至周幽王為犬戎所滅以事接之三家分仍述魏事至安釐王之二十年蓋魏國之史書大畧與春秋皆多相應其中經傳大異則云夏年多殷益干啓位啓殺之太甲殺伊尹文王殺季歴自周受命至穆王百年非穆王壽百歳也幽王既亡有共伯和者攝行天子事非二相共和也其易經二篇與周易上下經同易繇隂陽卦二篇與周易畧同繇辭則異卦下易經一篇以説卦而異公孫段二篇公孫段與邵陟論易國語三篇言楚晉事名三篇似禮記又似爾雅論語師春一篇書左傳諸卜筮師春似是造書者姓名也𤨏語十一篇諸國卜夢妖怪相書也梁邱藏一篇先叙魏之世數次言邱藏金玉事繳書二篇論弋射法生封一篇帝王所封大歴二篇鄒子談天類也穆天子傳五篇言周穆王遊行四海見帝臺西王母圖詩一篇畫贊之屬也又雜書十九篇周食田法周書論楚事周穆王羙人盛姬死事大凡七十五篇七篇簡書折壞不識名題冢中又得銅劒一枚長二尺五寸漆書皆科斗字初發冢者燒策照取寶物及官收之多燼簡斷札文既殘缺不復銓次武帝以其書付祕書校綴次第尋考指歸而以今文寫之晢在著作得觀竹書随疑分釋皆有義證遷尚書郎武帝嘗問摯虞三日曲水之義虞對曰漢章帝時平原徐肇以三月初生三女至三日俱亡村人以為怪乃招擕之水濵洗祓遂因水以泛觴其義起此帝曰必如所談便非好事晢進曰虞小生不足以知臣請言之昔周公城洛邑因流水以泛酒故逸詩云羽觴随波又秦昭王以三日置酒河曲見金人奉水心之劍曰令君制有西夏乃霸諸侯因此立為曲水二漢相承皆為盛集帝大悦賜晢金五十斤時有人於嵩髙山下得簡一枚上兩行科斗書傳以相示莫有知者司空張華以問晢晢曰此漢明帝顯節陵中策文也檢驗果然時人服其博識趙王倫為相國請為記室晢辭疾罷歸敎授門徒年四十卒元城市里為之廢業門生故人為立碑墓側晢才學通博所著三魏人士傳七代通記晉書紀志遇亂亡失其五經通論發䝉記補亡詩文集數十篇行於世云王接字祖游河東猗氏人漢京兆尹尊十世孫也父蔚世脩儒史之學魏中領軍曹羲作至公論蔚善之而著至機論辭義甚美官至夏陽侯相接幼喪父哀毁過禮鄉親皆歎曰王氏有子哉渤海劉原為河東太守好竒以旌才為務同郡馮收試經為郎七十餘薦接於原原即禮命之接不受原乃呼見曰君欲慕肥遯之高邪對曰接薄祐少孤而無兄弟母老疾篤故無心為吏及母終柴毁骨立居墓次積年備覽衆書多出異義性簡率不脩俗操鄉里大族多不能善之唯裴頠雅知焉平陽太守栁澹散騎侍郎裴遐尚書僕射鄧攸皆與接友善後為郡主薄迎太守温宇宇竒之轉功曹史州辟部平陽從事時泰山羊亮為平陽太守薦之於司𨽻校尉王堪出補都官從事永寧初舉秀才友人滎陽潘㴞遺接書曰摯虞卞元仁並謂足下應和鼎味可無以應秀才行接報書曰今世道交喪將遂剝亂而識智之士鉗口韜筆禍敗曰深如火之燎原其可救乎非榮斯行欲極陳所見冀有覺悟耳是歳三王義舉惠帝復阼以國有大慶天下秀孝一皆不試接以為恨除中郎補征虜將軍司馬蕩陰之役侍中嵇紹為亂兵所害接議以為宜依春秋褒三累之義加紹致命之賞朝廷從之河間王顒欲遷駕長安與關東乖異以接成都王佐難之表轉臨汾公相國及東海王越率諸侯討顒尚書令王堪統行臺上請接補尚書殿中郎未至而卒年三十九接雖博通特精禮傳常謂左氏亂義贍富自是一家書不主為經發公羊附經立傳經所不書傳不妄起於文為儉通經為長任城何休訓釋甚詳而黜周王魯大體乖硋且志通公羊而往往還為公羊疾病接乃更注公羊春秋多有新義時祕書丞衞恒考正汲冢書未訖而遭難佐著作郎束晢述而成之事多證異義時東萊太守陳留王庭堅難之亦有證據晢又釋難而庭堅已亡散騎侍郎潘滔謂接曰卿才學理識足觧二子之紛可試論之接遂詳其得失摯虞謝衡皆博物多聞咸以為允當又撰烈女後傳七十二人雜論議詩賦碑頌駁難十餘萬言喪亂盡失長子愆期流寓江南緣父意更注公羊又集烈女後傳云郤詵字廣基濟陰單父人也父晞尚書左丞詵博學多才瓌偉倜儻不拘細行州郡禮命並不應泰始中詔天下舉賢良直言之士太守文立舉詵應選詵對策上第拜議郎母憂去職詵母病苦無車及亡不欲車載柩家貧無以市馬乃於所住堂北壁外假𦵏開戸朝夕拜哭養鷄種蒜竭其方術喪過三年得馬八匹輿棺至冢負土成墳未畢召為征東參軍徙尚書郎轉車騎從事中郎吏部尚書崔洪薦詵為左丞及在職嘗以事劾洪洪怨詵詵以公正拒之語在洪傳洪聞而慙服累遷雍州刺史武帝於東堂㑹送問詵曰卿自以為何如詵對曰臣舉賢良對策為天下第一猶桂林之一枝崑山之片玉帝笑侍中奏免詵官帝曰吾與之戲耳不足爾詵在任威嚴明斷甚得四方聲譽卒於官子延登為州别駕阮种字徳猷陳留尉氏人漢侍中胥卿八世孫也弱冠有殊操為嵇康所重康著養生論所稱阮生即种也察孝廉為公府掾是時西虜内侵災眚屢見百姓饑饉詔王公卿尹常伯牧守各舉賢良方正直言之士於是太保何曾舉种應詔种對策與濟陰郤詵東平王康俱居上第即除尚書郎然毁譽之徒或言對者因緣假託帝乃更延羣士庭以問之种對策奏帝親覽焉又擢為第一轉中書郎進止有方正已率下朝廷咸憚其威容毎為駮議事皆施用遂為楷則遷平原相時襄邑衞京自南陽太守遷于河内與种俱拜帝望而難曰二千石皆若此朕何憂乎种為政簡惠百姓稱之卒於郡華譚字令思廣陵人也祖融吳左將軍錄尚書事父諝吳黄門郎譚朞歳而孤母年十八便守節鞠養勤勞備至及長好學不倦爽慧有口辯為鄰里所重刺史周浚引為從事史愛其才器待以賓友之禮太康中刺史嵇紹舉秀才譚至洛武帝親策之七科譚對擢上第時九州秀孝策無逮譚者譚素以才學為東土所推同郡劉頌時為廷尉見之歎息曰不悟鄉里乃有如此才也博士王濟於衆中嘲之曰五府初開羣公辟命採英竒於仄陋拔賢才於巖穴君吳楚之人亡國之餘有何秀異而應斯舉譚答曰秀異固產於方外不出於中域也是以明珠文貝生於江鬱之濱夜光之璞出於荆藍之下故以人求之文王生於東夷大禹生於西羌子不聞乎昔武王克商遷殷頑民於洛邑諸君得非其苗裔乎濟又曰夫危而不扶顛而不持至於君臣失位國亡無主凡在冠帶將何所取哉答曰吁存亡有運興衰有期天之所廢人不能支徐偃修仁義而失國仲尼逐魯而逼齊叚干偃息而成名諒否泰有時曷人力之所能哉濟甚禮之尋除郎中遷太子舍人本國中正以母憂去職服闋為鄄城令過濮水作莊子贊以示功曹而廷掾張延為作答敎其文甚羙譚異而薦之遂見陞擢及譚為廬江延已為淮陵太守又舉寒族周訪為孝廉訪果立功名時以譚為知人以父墓毁去官尋除尚書郎永寧初出為郟令于時兵亂之後境内饑饉譚傾心撫䘏司徒王戎聞而善之出榖三百斛以助之譚甚有政績再遷廬江内史加綏逺將軍時石氷之黨陸珪等屯據諸縣譚遣司馬諸敦討平之又遣别軍擊冰都督孟徐獲其驍率以功封都亭侯食邑千戸賜絹千匹陳敏之亂吳士多為其所逼顧榮先受敏官而潛謀圖之譚不悟榮㫖露檄逺近極言其非由此為榮所怨又在郡政嚴而與上司多忤揚州刺史劉陶素與譚不善因法收譚下壽陽獄鎮東將軍周馥與譚素相親善理而出之及甘卓討馥百姓奔散馥謂譚已去遣人視之而更移近馥馥歎曰吾嘗謂華令思是臧子源之儔今果效矣甘卓嘗為東海王越所捕下令敢有匿者誅之卓投譚而免及此役也卓遣人求之曰華侯安在吾甘揚威使也譚答不知遺絹二匹以遣之使反告卓卓曰此華侯也復求之譚已亡矣後為紀瞻所薦而為顧榮所止遏遂數年不得調建興初元帝命為鎮東軍諮祭酒譚博學多通在府無事乃著書三十卷名曰辯道上牋進之帝親自覽焉轉丞相軍諮祭酒領郡大中正譚薦干寳范珧於朝乃上牋求退奉還所假左丞相軍諮祭酒版不聽建武初授祕書監固讓不拜太興初拜前軍將軍以疾復轉祕書監自負宿名恒怏怏不得志時晉陵朱鳳吳郡吳震並學行清脩老而未調譚皆薦為著作佐郎或問譚曰諺言人之相去如九牛毛寧有此理乎譚曰昔許由巢父讓天子之貴市道小人爭半錢之利此之相去何啻九牛毛也聞者稱善戴若思弟邈則譚女壻也譚平生時常抑若思而進邈若思毎銜之及用事常毁譚於帝由是官塗不至譚毎懐觖望常從容言於帝曰臣已老矣將待死祕閣汲黯之言復存於今帝不懌乆之加散騎常侍屬以疾辭及王敦作逆譚疾甚不能入省坐免卒於家贈光祿大夫金章紫綬加散騎常侍諡曰胡二子化茂化字長風為征虜司馬討汲桑戰沒茂嗣爵始淮南袁甫字公胄亦好學與譚齊名以辭辯稱常詣中領軍何朂自言能為劇縣朂曰唯欲宰縣不為臺閣職何也甫曰人各有能有不能譬繪中之好莫過錦錦不可以為㡊榖中之羙莫過稲稲不可以為虀是以聖主使人必先以器茍非周材何能悉長黄覇馳名於州郡而息譽於京邑廷尉之材不為三公自昔然也朂善之除松滋令轉淮南國大農郎中令石珩問甫曰卿名能辯豈知壽陽已西何以恒旱壽陽已東何以恒水甫曰壽陽已東皆呉人夫亡國之音哀以思鼎足彊邦一朝失職憤歎甚積積憂成隂隂積成雨雨乆成水故其域恒澇也壽陽已西皆是中國新平彊呉羙寳皆人志盈心滿用長歡娛公羊有言魯僖甚悦故致旱京師若能抑彊扶弱先疎後親則天下和平災害不生觀者歎其敏㨗卒於家年八十餘陸機字士衡吳郡人也祖遜呉丞相父抗呉大司馬機身長七尺其聲如鐘少有異才文章冠世伏膺儒術非禮不動抗卒領父兵為牙門將年二十而吳滅退居舊里閉門勤學積有十年以孫氏在吳而祖父世為將相有大勲於江表深慨孫皓舉而棄之乃論權所以得皓所以亡又欲述其祖父功業遂作辯亡論二篇其上篇曰昔漢氏失御姦臣竊命禍基京畿毒徧宇内皇綱弛頓王室遂卑於是羣雄鋒駭義兵四合吳武烈皇帝慷慨下國電發荆南權畧紛紜忠勇伯世威稜則夷羿震盪兵交則醜虜授馘遂掃清宗祊蒸禋皇祖于時雲興之將帶州焱起之師跨邑哮闞之羣風驅熊羆之族霧合雖兵以義動同盟勠力然皆苞藏禍心阻兵怙亂或師無謀律喪威稔冦忠規武節未有如此其著者也武烈既沒長沙桓王逸才命世弱冠秀發招攬遺老與之述業神兵東驅奮寡犯衆攻無堅城之將戰無交鋒之虜誅叛柔服而江外底定飭法脩師則威德翕赫賓禮名賢而張公為之雄交御豪俊而周瑜為之傑彼二君子皆𢎞敏而多竒雅達而聰哲故同方者以類附等契者以氣集江東蓋多士矣將北伐諸華誅鉏于紀旋皇輿於夷庚反帝坐於紫闥挾天子以令諸侯清天歩而歸舊物戎車旣次羣凶側目大業未就中世而殞用集我大皇帝以竒蹤襲逸軌叡心因令圖從政咨於故實播憲稽乎遺風而加之以篤敬申之以節儉疇諮俊茂好謀善斷束帛旅於邱園旌命交乎塗巷故豪彥尋聲而響臻志士晞光而景騖異人輻輳猛士如林於是張公為師𫝊周瑜陸公魯肅呂蒙之疇入為心腹出作股肱甘寧凌統程普賀齊朱桓朱然之徒奮其威韓當潘璋黄蓋蔣欽周泰之屬宣其力風雅則諸葛瑾張承歩騭以名聲光國政事則顧雍潘濬呂範呂岱以器任幹職竒偉則虞翻陸績張惇以風義舉政奉使則趙咨沈珩以敏達延譽術數則吳範趙逹以禨祥協德董襲陳武殺身以衞主駱統劉基彊諌以補過謀無遺諝舉不失策故遂割據山川跨制荆吳而與天下爭衡矣魏氏嘗藉戰勝之威率百萬之師浮鄧塞之舟下漢隂之衆羽楫萬計龍躍順流鋭師千旅虎歩原隰謨臣盈室武將連衡喟然有吞江滸之志壹宇宙之氣而周瑜驅我偏師黜之赤壁喪旗亂轍僅而獲免收迹逺遁漢王亦憑帝王之號帥巴漢之人乘危騁變結壘千里志報關侯之敗圖收湘西之地而我陸公亦挫之西陵覆師敗績困而後濟絶命永安績以濡須之寇臨川摧鋭蓬龍之戰子輪不反由是二邦之將喪氣挫鋒勢衂財匱而吳莞然坐乘其弊故魏人請好漢氏乞盟遂躋天號鼎跱而立西界庸益之郊北裂淮漢之涘東苞百越之地南括羣蠻之表於是講八代之禮蒐三王之樂告類上帝拱揖羣后武臣毅卒循江而守長棘勁鎩望焱而奮庶尹盡規於上黎元展業于下化協殊裔風衍遐圻乃俾一介行人撫廵外域巨象逸駿擾於外閑明珠瑋寳耀於内府珍瑰重迹而至竒玩應響而赴輶軒騁於南荒衝輣息於朔野黎庶免干戈之患戎馬無晨服之虞而帝業固矣大皇既沒㓜主莅朝姦囘肆虐景皇聿興䖍脩遺憲政無大闕守文之良主也降及歸命之初典刑未滅故老猶存大司馬陸公以文武熙朝左丞相陸凱以謇諤盡規而施績范慎以威重顯丁奉鍾離斐以武毅稱孟宗丁固之徒為公卿樓元賀邵之屬掌機事元首雖病股肱猶良爰逮末葉羣公既喪然後黔首有瓦解之患皇家有土崩之釁歴命應化而微王師躡運而發卒散於陣衆奔于邑城池無藩籬之固山川無溝阜之勢非有工輸雲梯之械智伯灌激之害楚子築室之圉燕人濟西之隊軍未浹辰而社稷夷矣雖忠臣孤憤烈士死節將奚救哉夫曹劉之將非一世所選向時之師無曩日之衆戰守之道抑有前符險阻之利俄然未改而成敗貿理古今詭趣何哉彼此之化殊授任之才異也其下篇曰昔三方之王也魏人據中夏漢氏有岷益吳制荆揚而掩有交廣曹氏雖功濟諸華虐亦深矣其人怨劉翁因險以飾智功已薄矣其俗陋夫吳桓王基之以武太祖成之以徳聰明叡逹懿度𢎞逺矣其求賢如弗及䘏人如稚子接士盡盛徳之容親仁罄丹府之愛抜呂䝉於戎行試潘濬於係虜推誠信士不恤人之我欺量能授器不患權之我偪執鞭鞠躬以重陸公之威悉委武衞以濟周瑜之師卑宮菲食豐功臣之賞披懐虚已納謨士之算故魯肅一靣而自託士燮䝉險而效命高張公之德而省游田之娛賢諸葛之言而割情欲之歡感陸公之規而除刑法之煩奇劉基之議而作三爵之誓屏氣跼蹐以伺子明之疾分滋損甘以育凌統之孤登壇忼愾歸魯子之功削投怨言信子瑜之節是以忠臣競盡其謨志士咸得肆力洪規遠畧固不厭夫區區者也故百官茍合庶務未遑初都建鄴羣臣請備禮秩天子辭而弗許曰天下其謂朕何宮室輿服蓋慊如也爰及中葉天人之分既定故百度之缺粗脩雖醲化懿綱未齒乎上代抑其體國經邦之具亦足以為政矣地方幾萬里帶甲將百萬其野沃其兵練其器利其財豐東負滄海西阻險塞長江制其區宇峻山帶其封域國家之利未巨有𢎞於兹者也借使守之有道御之有術敦率遺典勤人謹政脩定策守常險則可以長世永年未有危亡之患也或曰吳蜀脣齒之國也夫蜀滅吳亡理則然矣夫蜀蓋藩援之與國而非吳人之存亡也其郊境之接重山積險陸無長轂之徑川阨流迅水有驚波之艱雖有鋭師百萬啓行不過千夫舳艫千里前驅不過百艦故劉氏之伐陸公喻之長虵其勢然也昔蜀之初亡朝臣異謀或欲積石以險其流或欲機械以禦其變天子總羣議而諮之大司馬陸公公以四瀆天地之所以節宣其氣固無可遏之理而機械則彼我所共彼若棄長技以就所屈即荆楚而爭舟檝之用是天贊我也將謹守峽口以待擒耳逮歩闡之亂憑寳城以延彊寇資重幣以誘羣蠻于時大邦之衆雲翔電發懸於江介築壘遵渚衿帶要害以止吳人之西巴漢舟師沿江東下陸公偏師三萬北據東坑深溝高壘按甲飬威反虜踠迹待戮而不敢北窺生路彊寇敗績宵遁喪師太半分命鋭師五千西禦水軍東西同㨗獻俘萬計信哉賢人之謀豈欺我哉自是烽燧罕驚封域寡虞陸公沒而潛謀兆吳釁深而六師駭夫太康之役衆未盛乎曩日之師廣州之亂禍有愈乎向時之難而邦家顛覆宗廟為墟嗚呼人之云亡邦國殄瘁不其然歟易曰湯武革命順乎天或曰亂不極則治不形言帝王之因天時也古人有言曰天時不如地利易曰王侯設險以守其國言為國之恃險也又曰地利不如人和在德不在險言守險之在人也吳之興也參而由焉孫卿所謂合其參者也及其亡也恃險而已又孫卿所謂舍其參者也夫四州之萌非無衆也大江以南非乏俊也山川之險易守也勁利之器易用也先政之策易脩也功不興而禍遘何哉所以用之者失也故先王達經國之長規審存亡之至數謙已以安百姓敦恵以致人和寛冲以誘俊乂之謀慈和以結士庶之愛是以其安也則黎元與之同慶及其危也則兆庶與之共患安與衆同慶則其危不可得也危與下同患則其難不足䘏也夫然故能保其社稷而固其土宇麥秀無悲殷之思黍離無愍周之感矣至太康末與弟雲俱入洛造太常張華華素重其名如舊相識曰伐吳之役利獲二俊又嘗詣侍中王濟濟指羊酪謂機曰卿吳中何以敵此答曰千里蓴羮未下鹽豉時人稱為名對張華薦之諸公後太傅楊駿辟為祭酒會駿誅累遷太子洗馬著作郎范陽盧志於衆中間機曰陸抗於君逺近機曰如君於盧毓盧珽志黙然既起雲謂機曰殊邦遐逺容不相悉何至於此機曰我父祖名播四海寧不知邪議者以此定二陸之優劣吳王晏出鎮淮南以機為郎中令遷尚書中兵郎轉殿中郎趙王倫輔政引為相國參軍豫誅賈謐功賜爵關内侯倫將簒位以為中書侍郎倫之誅也齊王冏以機職在中書九錫文及禪詔疑機與焉遂收機等九人付廷尉頼成都王頴吳王晏並救理之得減死徒邉遇赦而止初機有駿犬名曰黄耳甚愛之既而覊寓京師乆無家問笑語犬曰我家絶無書信汝能齎書取消息不犬搖尾作聲機乃為書以竹筩盛之而繫其頸犬尋路南走遂至其家得報還洛其後因以為常時中國多難顧榮戴若思等咸勸機還吳機負其才望而志匡世難故不從冏既矜功自伐受爵不讓機惡之作豪士賦以刺焉其序曰夫立德之基有常而建功之路不一何則脩心以為量者存乎我因物以成務者係乎彼存乎我者隆殺止乎其域係乎彼者豐約惟所遭遇落葉俟微飈以隕而風之力蓋寡孟嘗遭雍門以泣而琴之感以末何哉欲隕之葉無所假烈風將墜之泣不足煩哀響也是故茍時啓於天理盡於人庸夫可以濟聖賢之功斗筲可以定烈士之業故曰才不半古功已倍之蓋得之於時世也歴觀今古徼一時之功而居伊周之位者有矣夫我之自我智士猶嬰其累物之相物昆蟲皆有此情夫以自我之量而挾非常之勲神器暉其顧眄萬物随其俯仰心玩居常之安耳飽從諛之説豈識乎功在身外任出才表者哉且好榮惡辱有生之大期忌盈害上鬼神猶且不免人主操其常柄天下服其大節故曰天可讎乎而時有袨服荷㦸立乎廟門之下援旗誓衆奮於阡陌之上况乎世主制命自下裁物者乎廣樹恩不足以敵怨勤興利不足以補害故曰代大匠斵者必傷手且夫政由寗氏忠臣所以慷慨祭則寡人人主所不乆堪是以君奭怏怏不悦公旦之舉高平師師側目博陸之勢而成王不遣嫌吝於懷宣帝若負芒刺於背非其然者歟嗟乎光于四表德莫富焉王曰叔父親莫昵焉登帝天位功莫厚焉守節沒齒忠莫至焉而傾側顛沛僅而自全則伊生抱明允以嬰戮文子懐忠敬而齒劒固其所也因斯以言夫以篤聖穆親如彼之懿大德至忠如此之盛尚不能取信於人主之懷止謗於衆多之口過此以往惡覩其可安危之理斷可識矣又况乎饕大名以冐道家之忌運短才而易聖哲所難者哉身危由於勢過而不知去勢以求安禍積起於寵盛而不知辭寵以招福見百姓之謀已則申宮警守以崇不畜之威懼萬方之不服則嚴刑峻制以賈傷心之怨然後威窮乎震主而怨行乎上下衆心日陊危機將發而方偃仰瞪眄謂足以夸世笑古人之未工忘已事之已拙知曩勲之可矜闇成敗之有㑹是以事窮運盡必於顚仆風起塵合而禍至常酷也聖人忌功名之過已惡寵祿之踰量蓋為此也夫惡欲之大端賢愚所共有而遊子殉髙位於生前志士思垂名於身後受生之分惟此而已夫蓋世之業名莫盛焉率意無違欲莫順焉借使伊人頗覽天道知盡不可益盈難乆持超然自引髙揖而退則巍巍之盛仰邈前賢洋洋之風俯觀來籍而大欲不止於身至樂無愆乎舊節彌效而德彌廣身逾逸而名逾劭此之不為而彼之必昧然後河海之迹堙為窮流一匱之釁積成山嶽名編凶頑之條身厭荼毒之痛豈不謬哉故聊為賦焉庶使百世少有悟云冏不之悟而竟以敗機又以聖王經國義在封建因採其遠指著五等論曰夫體國經野先王所慎創制垂基思隆後葉然而經畧不同長世異術五等之制始於黄唐郡縣之治創於秦漢得失成敗備在典謨是以其詳可得而言夫王者知帝業至重天下至廣廣不可以偏制重不可以獨任任重必於借力制廣終乎因人故設官分職所以輕其任也並建伍長所以宏其制也於是乎立其封疆之典裁其親疏之宜使萬國相維以成磐石之固宗庶雜居而定維城之業又有以見綏世之長御識人情之大方知其為人不如厚已利物不如圖身安上在於悦下為已存乎利人故易曰悦以使人人忘其勞孫卿曰不利而利之不如利而後利之利也是以分天下以厚樂而已得與之同憂饗天下以豐利而已得與之共害利博而思篤樂逺則憂深故諸侯享食土之實萬國受傳世之祚夫然則南面之君各務其政九服之内知有定主上之子愛於是乎生下之禮信於是乎結世平足以敦風道衰足以禦暴故彊毅之國不能擅一時之勢雄俊之人無所寄霸王之志然後國安由萬邦之思化王尊頼羣后之圖身譬猶衆目營方則天綱自昶四體辭難而心膂獲乂蓋三代所以直道四王所以垂業也夫盛衰隆弊理所固有敎之廢興繫乎其人原法期於必諒明道有時而闇故世及之制弊於彊禦厚下之典漏於末折侵弱之釁遘自三季陵夷之禍終乎七雄昔成湯親照夏后之鑒公旦目渉商人之戒文質相濟損益有物然五等之禮不革于時封畛之制有隆爾者豈玩二王之禍而闇經世之算乎固知百世非可懸御善制不能無弊而侵弱之辱愈於殄祀土崩之困痛於陵夷也是以經始獲其多福慮終取其少禍非謂侯伯無可亂之符郡縣非興化之具故國憂頼其釋位主弱慿於翼戴及承微積弊王室遂卑猶保名位祚垂後嗣皇統幽而不輟神器否而必存者豈非事勢使之然歟降及亡秦棄道任術懲周之失自矜其得尋斧始於所庇制國昧於弱下國慶獨饗其利主憂莫與共害雖速亡趨亂不必一道顛沛之釁實由孤立是蓋思五等之小怨亡萬國之大德知陵夷之可患闇土崩之為痛也周之不競有自來矣國乏令主十有餘世然片言勤王諸侯必應一朝振矜逺國先叛故彊晉收其請隧之圖暴楚頓其觀鼎之志豈劉項之能窺關勝廣之敢號澤哉借使秦人因循其制雖則無道有與共亡覆滅之禍豈在曩日漢矯秦枉大啓王侯境土踰溢不遵舊典故賈生憂其危鼂錯痛其亂是以諸侯岨其國家之富憑其士庶之力勢足者反疾土狹者逆遲六臣犯其弱綱七子衝其漏網皇祖夷於黔徒西京病於東帝是蓋過正之災而非建侯之累也然呂氏之難朝士外顧宋昌策漢必稱諸侯逮至中葉忌其失節割削宗子有名無實天下曠然復襲亡秦之軌矣是以五侯作威不忌萬國親都襲漢易於拾遺也光武中興纂隆皇統而由遵覆車之遺轍養喪家之宿疾僅及數世姦宄充斥卒有彊臣專朝則天下風靡一夫從衡而城池自夷豈不危哉在周之衰難興王室放命者七臣干位者三子嗣王委其九鼎凶族據其天邑鉦鼙震於閫宇鋒鏑流於絳闕然禍止幾甸害不覃及天下晏然以安待危是以宣王興於共和襄惠振於晉鄭豈若二漢階闥暫擾而四海已沸嬖臣朝入而九服夕亂哉遠惟王莽篡逆之事近覽董卓擅權之際億兆悼心愚智同痛然周以之存漢以之亡夫何故哉豈世乏曩時之臣士無匡合之志歟蓋逺績屈於時異雄心挫於卑勢耳故烈士扼腕終委寇讐之手忠人變節以助虐國之桀雖復時有鳩合同志以謀王室然上非奥主下皆市人師旅無先定之班君臣無相保之志是以義兵雲合無救刼殺之禍衆望未改而已見大漢之滅矣或以諸侯世位不必常全昬主暴君有時比迹故五等所以多亂今之牧守皆官方庸能雖或失之其得固多故郡縣易以為政夫德之休明黜陟日用長率連屬咸述其職而淫昬之君無所容過何則其不治哉故先代有以之興矣茍或衰陵百度自悖鬻官之吏以貨凖才則貪殘之萌皆羣后也安在其不亂哉故後王有以之廢矣且要而言之五等之君為已思政郡縣之長為吏圖物何以徵之蓋企及進取仕子之常志脩已安人良士所希及夫進取之情鋭而安人之譽遲是故侵百姓以利已者在位所不憚損實事以養名者官長所夙夜也君無卒歲之圖臣挾一時之志五等則不然知國為已土衆皆我民民安已受其利國傷家嬰其病故前人欲以垂後後嗣思其堂構為上無茍且之心羣下知膠固之義使其並賢居政則功有厚薄兩愚處亂則過有深淺然則八代之制幾可以一理貫秦漢之典殆可以一言蔽也時成都王頴推功不居勞謙下士機既感其全濟之恩又見朝廷屢有變難謂頴必能康隆晉室遂委身事焉頴以機參大將軍事表為平原内史太安初頴與河間王顒起兵討長沙王乂假機後將軍河北大都督督北中郎將王粹冠軍牽秀等諸軍二十餘萬人機以三世為將道家所忌又覊旅入宦頓居羣士之右而王粹牽秀等皆有怨心固辭都督頴不許機鄉人孫惠亦勸機讓都督於粹機曰將為吾為首䑕避賊適所以速禍也遂行頴謂機曰若功成事定當爵為郡公位以台司將軍勉之矣機曰昔齊桓任夷吾以建九合之功燕惠疑樂毅以失垂成之業今日之事在公不在機也頴左長史盧志心害機寵言於頴曰陸機自比管樂擬君闇主自古命將遣師未有臣陵其君而可以濟事者也頴黙然機始臨戎而牙旗折意惡之列軍自朝歌至于河橋鼓聲聞數百里漢魏以來出師之盛未嘗有也長沙王乂奉天子與機戰於鹿苑機軍大敗赴七里澗而死者如積焉水為之不流將軍賈稜皆死之初宦人孟玖弟超並為頴所嬖寵超領萬人為小都督未戰縱兵大掠機錄其主者超將鐵騎百餘人直入機麾下奪之顧謂機曰貉如能作督不機司馬孫拯勸機殺之機不能用超宣言於衆曰陸機將反又還書與玖言機持兩端軍不速決及戰超不受機節度輕兵獨進而沒玖疑機殺之遂譖機於頴言其有異志將軍王闡郝昌公師藩等皆玖所用與牽秀等共證之頴大怒使牽秀密收機其夕機夢黑幰繞車手决不開天明而秀兵至機釋戎服著白帢與秀相見神氣自若謂秀曰自吳朝傾覆吾之兄弟家族蒙國重恩入侍帷幄出剖符竹成都命吾以重任辭不獲已今日受誅豈非命也因與頴牋詞甚悽惻既而歎曰華亭鶴唳豈可復聞乎遂遇害於軍中時年四十三二子蔚夏亦同被害機既死非其罪士卒痛之莫不流涕是日昬霧晝合大風折木平地尺雪議者以為陸氏之寃機天才秀逸詞藻宏麗張華嘗謂之曰人之為文常恨才少而子更患其多弟雲嘗與書曰君苗見兄文轍欲燒其筆硯後葛洪著書稱機文猶元圃之積玉無非夜光焉五河之吐流泉源如一焉其𢎞麗妍瞻英鋭飄逸亦一代之絶乎其為人所推服如此然好游權門與賈謐親善以進趣獲譏所著文章凡三百餘篇並行於世孫拯者字顯世吳郡富春人也能屬文仕吳為黄門郎孫皓世侍臣多得罪惟拯與顧榮以智全吳平後為涿令有稱績機既為孟玖所誣收拯考掠兩踝骨見終不變辭門生費慈宰意二人詣獄明拯拯譬遣之曰吾義不可誣枉知故卿何宜復爾二人曰僕亦安得負君拯遂死獄中而慈意亦死雲字士龍年六歳能屬文性清正有才理少與兄機齊名雖文章不及機而持論過之號曰二陸幼時吳尚書廣陵閔鴻見而竒之曰此兒若非龍駒當是鳳雛後舉雲賢良時年十六吳平入洛機初詣張華華問雲何在機曰雲有笑疾未敢自見俄而雲至華為人多姿致又好帛繩纒鬚雲見而大笑不能自己先是嘗著縗絰上舡於水中顧見其影因大笑落水人救獲免雲與荀隱素未相識嘗會華坐華曰今日相遇可勿為常談雲抗手曰雲間陸士龍隱曰日下荀鳴鶴鳴鶴隱字也雲又曰既開青雲覩白雉何不張爾弓挾爾矢隱曰本謂是雲龍騤騤乃是山鹿野麋獸微弩彊是以發遲華撫手大笑刺史周浚召為從事謂人曰陸士龍當今之顔子也俄以公府掾為太子舍人出補浚儀令縣居都會之要名為難理雲到官肅然下不能欺市無二價人有見殺者主名不立雲錄其妻而無所問十許日遣出密令人隨後謂曰其去不出十里當有男子候之與語便縛來既而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故逺相要候於是一縣稱為神明郡守害其能屢譴責之雲乃去官百姓追思之圖畫形像配食縣社尋拜吳王晏郎中令晏於西園大營第室雲上書諫之辭甚懇切時晏任用部曲將李咸馮南司馬吳定給使徐泰等使覆校諸官市買錢帛簿雲以為既非開國勿用之義又傷推誠曠蕩之量復上書陳之晏不能用雲愛才好士多所貢逹移書太常府薦同郡張贍盛稱其才不以溢美為嫌入為尚書郎侍御史太子中舍人中書侍郎成都王頴表為内史頴將討齊王冏以雲為前鋒都督會冏誅轉大將軍右司馬頴晚節政衰雲屢以正言忤㫖孟玖欲用其父為邯鄲令左長史盧志等並阿意從之而雲固執不許曰此縣皆公府掾資豈有黄門父居之邪玖深忿怨張昌為亂頴上雲為使持節大都督前鋒將軍以討昌會伐長沙王乃止機之敗也并收雲頴官屬江統蔡克棗嵩等上疏救之頴不納統等重請頴遲廻者三日盧志又曰昔趙王殺中䕶軍趙浚赦其子驤驤詣明公而擊趙即前事也蔡克入至頴前叩頭流血曰雲為孟玖所怨逺近莫不聞今果見殺罪無彰驗將令羣心疑惑竊為明公惜之僚屬随克入者數十人流涕固請頴惻然有宥雲之色孟玖扶頴入催令殺雲時年四十二有二女無男雲門生故吏迎喪𦵏清河脩墓立碑四時祠祭所著文章三百四十九篇又撰新書十篇並行於世初雲嘗行逗宿故人家夜闇迷路莫知所從忽見草中有火光於是趣之至一家便寄宿見一年少羙風姿共談老子辭致深逺向曉辭去行十許里至故人家云此數十里中無人居雲意始悟尋昨所宿處乃王弼冢也雲本無元學自此談老殊進雲弟耽為平東祭酒亦有聲譽與雲同遇害大將軍參軍孫恵與淮南内史朱誕書曰不意三陸相攜闇朝一旦湮滅道業淪喪痛哭之深荼毒難言國喪雋望悲豈一人其為州里所痛悼如此後東海王越討頴移檄天下亦以機雲兄弟枉害罪狀頴云機從弟喜字恭仲父瑁吳吏部尚書喜仕吳累遷吏部尚書少有聲名好學有才思常為自叙其畧曰劉向省新語而作新序桓譚詠新序而制新論余不自量感子雲之法言而作言道覩賈子之羙才而作訪論觀子政洪範而作古今歴覽蔣子通萬機而作審機讀幽通思元四愁而作娛賓九思真所謂忍愧者也其書近百篇吳平又作西州清論傳於世借稱諸葛孔明以行其書也有較論品格篇曰或問予薛瑩最是國士之第一者乎答曰以理推之在乎四五之間問者愕然請問答曰夫孫皓無道肆其暴虐若龍虵其身沉黙其體潛而勿用趣不可測此第一人也避尊居卑禄代耕養元静守約冲退澹然此第二人也侃然體國思治心不辭貴以方見憚執正不懼此第三人也斟酌時宜在亂猶顯意不忘忠時獻微益此第四人也温恭脩慎不為諂首無所云補從容保寵此第五人也過此已往不足復數故第二已上多淪沒而遠悔吝第三已下有聲譽而近咎累是以深識君子晦其明而履柔順也問者曰始聞髙論終年啓寤矣太康中下詔曰偽尚書陸喜等十五人南士歸稱並以貞㓗不容皓朝或忠而獲罪或退身脩志放在草野主者皆可隨本位就下拜除勑所在以禮發遣須到隨才受用乃以喜為散騎常侍尋卒子育為尚書郎弋陽太守夏侯湛字孝若譙國譙人也祖威魏充州刺史父莊淮南太守湛幼有盛才文章宏富善構新詞而羙容觀與潘岳友善每行止則同輿接茵京師謂之連璧少為太尉掾泰始中舉賢良對策中第拜郎中累年不調乃作抵疑以自廣辭㫖可觀後選補太子舍人轉尚書郎出為野王令以䘏隱為急而緩於公調政清務閑優游多暇湛有六弟淳琬瑫謨總瞻湛乃凖尚書都俞之言而作昆弟誥世多稱之居邑累年朝野多嘆其屈除中書侍郎出補南陽相遷太子僕未就命而武帝崩惠帝即位以為散騎常侍元康初卒年四十九著論三十餘篇别為一家之言初湛作周詩成以示潘岳岳曰此文非徒温雅乃别見孝悌之性岳因此遂作家風詩湛族為盛門性頗豪侈侯服玉食窮滋極珍及將沒遺命小棺薄斂不脩封樹論者謂湛雖生不砥礪名節死則儉約令終是深逹存亡之理淳字孝冲亦有文藻與湛俱知名官至弋陽太守遭中原傾覆子姪多沒胡寇唯息承渡江承字文子參安東軍事稍遷南平太守太興末王敦舉兵内向承與梁州刺史甘卓巴東監軍栁純宜都太守譚該等並露檄逺近列敦罪狀會甘卓懷疑不進王師敗績敦悉誅滅異已者收承欲殺之承外兄王廙苦請得免尋為散騎常侍潘岳字安仁滎陽中牟人也祖瑾安平太守父芘琅邪内史岳少以才頴見稱鄉邑號為竒童謂終賈之儔也早辟司空太尉府舉秀才泰始中武帝躬耕籍田岳作賦以羙其事曰伊晉之四年正月丁未皇帝親率羣后籍于千畝之甸禮也於是乃使甸師清畿野廬埽路封人壝宮掌舍設枑青壇鬱其嶽立兮翠幕黕以雲布結崇基之靈阯兮啓四塗之廣阼沃野墳腴膏壤平砥清洛濁渠引流激水遐阡繩直邇陌如矢葱犗服于縹軛兮紺轅綴於黛耜儼儲駕於廛左兮俟萬乘之躬履百寮先置位以職兮自上下下具惟命臣襲春服之萋萋兮接游車之轔轔微風生於輕幰兮纎埃起乎朱輪森奉璋以偕列兮望皇軒而肅震若湛露之晞朝陽兮衆星之拱北辰也於是前驅魚麗屬車鱗萃閶闔洞啓參塗方駟常伯陪乘太僕執轡后妃獻穜稑之種司農撰播殖之器挈壺掌升降之節宮政設門閭之蹕天子乃御玉輦䕃華蓋衝牙錚鎗綃紈綷䌨金根照耀以烱晃兮龍驥騰驤而沛艾表朱元於離坎兮飛靑縞於震兑中黄曄以發輝兮方綵紛其繁會五路鳴鑾九旗揚斾瓊鈒入蘂雲􅀢晻藹簫管嘲􅑜以啾嘈兮鼓鼙硡􅥀以砰礚筍簴嶷以軒翥兮洪鐘越乎區外震震填填塵霧連天以幸乎籍田蟬冕熲以灼灼兮碧色肅其千千似夜光之剖荆璞兮若茂松之依山巔也於是我皇乃降靈壇撫御耦游埸染屨洪縻在手三推而舍庶人終畝貴賤以班或五或九于斯時也居靡都鄙人無華裔長幼雜遝以交集士女頒斌而咸戾被褐振裾垂髫總髻躡踵側肩掎裳連􅀈黄塵為之四合陽光為之潛翳動容發音而觀者莫不抃舞乎康衢謳吟乎聖世情欣樂乎昏作慮盡力乎樹蓻靡推督而常勤兮莫之課而自厲躬先勞而悦使兮豈嚴刑而猛制哉有邑老田父或進而稱曰蓋損益隨時理有常然髙以下為基人以食為天正其末者端其本善其後者慎其先夫九土之宜弗任四業之務不壹野有菜蔬之色朝乏代耕之秩無儲蓄以虞災徒望歳以自必三代之衰皆此物也今聖上昧旦丕顯夕惕若慄圖匱於豐防儉於逸欽哉欽哉惟榖之恤展三時之𢎞務致倉廪於盈溢固堯湯之用心而存救之要術也若乃廟祧有事祝宗諏日簠簋普淖則此之自實縮鬯蕭茅又於是乎出黍稷馨香㫖酒嘉栗宜其時和年登而神降之吉也古人有言曰聖人之德無以加於孝乎夫孝者天之性人之所由靈也昔者明王以孝治天下其或繼之者尠哉希矣逮我皇晉實光斯道儀刑孚于萬國愛敬盡於祖考故躬稼以供粢盛所以致孝也勸穡以足百姓所以固本也能本而孝盛徳大業至矣哉此一役也二羙顯焉不亦逺乎不亦重乎敢作頌曰思樂甸畿薄採其芳大君戾止言籍其農其農三推萬國以祗耨我公田遂及我私我簠斯盛我簋斯齊我倉如陵我庾如坻念兹在兹永言孝思人力普存祝史正辭神祗攸歆逸豫無期一人有慶兆民頼之岳才名冠世為衆所疾遂栖遲十年出為河陽令負其才而鬱鬱不得志時尚書僕射山濤領吏部王濟裴楷等並為帝所親遇岳内非之乃題閣道為謡曰閣道東有大牛王濟鞅裴楷鞧和嶠刺促不得休轉懷令時以逆旅逐末廢農姦滛亡命多所依湊敗亂法度勑當除之十里一官㰚使老小貧户守之又差吏掌主依客舍收錢岳議曰謹案逆旅乆矣其所由來也行者頼以頓止居者薄收其直交易貿遷各得其所官無役賦因人成利惠加百姓而公無末費語曰許由辭帝堯之命而舍於逆旅外傳曰晉陽處父過寗舍於逆旅魏武皇帝亦以為宜其詩曰逆旅整設以通商賈然則自唐到今未有不得客舍之法秦商鞅尤之固非聖世之所言也今四海會同九服納貢八方翼翼公私滿路近畿輻輳客舍亦稠冬有温廬夏有涼䕃芻秣成行器用取給疲牛必投乘涼近進發槅寫鞍皆有所憇又諸刼盗皆起於逈絶止乎人衆十里蕭條則姦軌生心連陌接館則寇情震懾且聞聲有救已發有追不救有罪不追有戮禁暴捕亡恒有司存凡此皆客舍之益而官㰚之所乏也又行者貪路告糴炊爨皆以昬晨盛夏晝熱又兼星夜既限早閉不及㰚門或避晚關迸逐路隅祗長慢藏誨盗之原茍以客舍多敗法敎官守棘㰚獨復何人彼河橋孟津解劵輸錢髙第督察數入校出品郎兩岸相檢猶懼或失之故懸以禄利許以功報今賤吏疲人獨專㰚税管開閉之權籍不校之勢此道路之蠹姦利所殖也率歴代之舊俗獲行留之懽心使客舍洒埽以待征旅擇家而息豈非衆庶顒顒之望請曹列上朝廷從之岳頻宰二邑勤於政績調補尚書度支郎遷廷尉評以公事免楊駿輔政髙選吏佐引岳為太傅主簿駿誅除名初譙人公孫宏少孤貧客田於河陽善鼓琴頗能屬文岳之為河陽愛其才蓺待之甚厚至是宏為楚王瑋長史專殺生之政時駿綱紀皆當從坐同署主簿朱振已就戮岳其夕取急在外宏言之瑋謂之假吏故得免未幾選為長安令作西征賦述所經人物山水文清㫖詣辭多不錄徴補博士未召以母疾輙去官免尋為著作郎轉散騎侍郎遷給事黄門侍郎岳性輕躁趨世利與石崇等諂事賈謐毎候其出與崇輙望塵而拜構愍懐之文岳之辭也謐二十四友岳為其首謐晉書限斷亦岳之辭也其母數誚之曰爾當知足而乾沒不已乎而岳終不能改既仕官不逹乃作閑居賦曰岳讀汲黯傳至司馬安四至九卿而良史書之題以巧宦之目未曾不慨然廢書而歎也曰嗟乎巧誠有之拙亦宜然顧常以為士之生也非至聖無軌微妙元通者則必立功立事效當年之用是以資忠履信以進徳脩辭立誠以居業僕少竊鄉曲之譽忝司空太尉之命所奉之主即太宰魯武公其人也舉秀才為郎逮事世祖武皇帝為河陽懷令尚書郎廷尉評令天子諒闇之際領太傅主簿府誅除名為民俄而復官除長安令遷博士未召拜親疾輙去官免自弱冠渉乎知命之年八徙官而一進階再免一除名一不拜職遷者三而已矣雖通塞有遇抑亦拙之効也昔通人和長輿之論余也固曰拙於用多稱多者吾豈敢言拙則信而有徴方今俊乂在官百工惟時拙者可以絶意乎寵榮之事矣太夫人在堂有羸老之疾尚何能違膝下色飬而屑屑從斗筲之役乎於是覽止足之分庶浮雲之志築室種樹逍遥自得池沼足以漁釣舂税足以代耕灌園鬻蔬供朝夕之饍牧羊酤酪俟伏臘之費孝乎惟孝友于兄弟此亦拙者之為政也乃作閑居賦以歌事遂情焉其辭曰遨墳素之長圃歩先哲之髙衢雖吾顔之云厚猶内愧於寗蘧有道予不仕無道吾不愚何巧智之不足而拙艱之有餘也於是退而閑居于洛之涘身齊逸民名綴下士背京泝伊面郊後市浮梁黝以逕度靈臺傑其高時闚天文之祕奥覩人事之終始其西則有元戎禁營元幕緑徽谿子巨黍異絭同歸礟石雷駭激矢蝱飛以先啓行耀我皇威其東則有明堂辟雍清穆敞閑環林縈映圓海回泉聿追孝以嚴父宗文考以配天祗聖敬以明順飬更老以崇年若乃背冬渉春隂謝陽施天子有事于柴燎以郊祖而展義張鈞天之廣樂備千乘之萬騎服桭桭以齊元管啾啾而並吹煌煌乎隱隱乎兹禮容之壯觀而王制之巨麗也两學齊列雙宇如一右延國胄左納良逸祁祁生徒濟濟儒術或升之堂或入之室敎無常師道則在是故髦士投紱名王懷璽訓若風行應猶草靡此里仁所以為羙孟母所以三徙也爰定我居築室穿池長楊映沼芳枳樹㰚遊鱗瀺灂菡蓞敷披竹木蓊藹靈果參差張公大谷之梨梁侯烏椑之柿周文弱枝之棗房陵朱仲之李靡不畢殖三桃表櫻胡之别二柰耀丹白之色石榴蒲桃之珍磊落蔓衍乎其側梅杏郁棣之屬繁榮藻麗之飾華實照爛言所不能極也菜則葱韮蒜芋青荀紫薑堇薺甘㫖蓼荾芬芳蘘荷依陰時藿向陽綠葵含路白薤負霜於是凜秋暑退熙春寒往微雨新晴六合清朗太夫人乃御版輿升輕軒逺覽王畿近周家園體以行和藥以勞宣常膳載加舊痾有痊於是席長筵列孫子栁垂蔭車結軌陸摘紫房水挂赬鯉或宴于林或褉于氾昆弟斑白兒童稚齒稱萬壽以獻觴咸一懼而一喜壽觴舉慈顔和浮杯樂飲絲竹駢羅頓足起舞抗音髙歌人生安樂孰知其他退求已而自省信用薄而才劣奉周任之格言敢陳力而就列幾陋身之不保而奚擬乎明哲仰衆妙而絶思終優游以飬拙初芘為琅邪内史孫秀為小史給岳而狡黠自喜岳惡其為人數撻辱之秀常銜忿及趙王倫輔政秀為中書令岳於省内謂秀曰孫令猶憶疇昔周旋不答曰中心藏之何日忘之岳於是自知不免俄而秀遂誣岳及石崇歐陽建謀奉淮南王允齊王冏為亂誅之夷三族岳將詣市與母别曰負阿母初被收俱不相知石崇已送在市岳後至崇謂之曰安仁卿亦復爾邪岳曰可謂白首同所歸岳金谷詩云投分寄石友白首同所歸乃成其䜟岳母及兄侍御史釋弟燕令豹司徒掾據據弟詵兄弟之子已出之女無長幼一時被害唯釋子伯武逃難得免而豹女與其母相抱號呼不可觧會詔原之岳羙姿儀辭藻絶麗尤善為哀誄之文少時常挾彈出洛陽道婦人遇之者皆連手縈繞投之以果遂滿車而歸時張載醜每行小兒以瓦石擲之委頓而反岳從子尼字正叔祖朂漢東海相父滿平原内史並以學行稱尼少有清才與岳俱以文章見知性静退不競唯以勤學著述為事著安身論以明所守初應州辟後以父老辭位致飬太康中舉秀才為太常博士歴髙陸令淮南王允鎮東參軍元康初拜太子舍人上釋奠頌帝甚善之後出為宛今在任寛而不縱恤隱勤政厲公平而遺人事入補尚書郎俄轉著作郎復為乘輿箴上之極盡風諫之羙及趙王倫簒位孫秀專政忠良之士咸羅酷烈尼遂稱疾篤取假拜埽墳墓聞齊王冏起義乃赴許昌冏引為參軍與謀時務兼管書記事平封安昌公歴黄門侍郎散騎常侍侍中祕書監永興末為中書令時三王戰爭皇家多故尼職居顯要從容而已雖憂虞不及而備嘗艱難永嘉中遷太常卿洛陽將沒攜家屬東出成臯欲還鄉里道遇賊不得前病卒於塢壁年六十餘張載字孟陽安平人也父收蜀郡太守載性閑雅博學有文章太康初至蜀省父道經劔閣載以蜀人恃險好亂因著銘以作誡曰巖巖梁山積石峨峨逺屬荆衡近綴岷嶓南通邛僰北逹襃斜狹過彭碣髙踰嵩華惟蜀之門作固作鎮是曰劍閣壁立千仭窮地之險極路之峻世濁則逆時清斯順閉由往漢開自有晉秦得百二并吞諸侯齊得十二田生獻籌矧兹狹隘土之外區一人荷㦸萬夫趑趄形勝之地非親勿居昔在武侯中流而喜河山之固見屈吳起洞庭孟門二國不祀興實由德險亦難恃自古及今天命不易憑阻作昬斟不敗績公孫既沒劉氏衘璧覆車之軌無或重跡勒銘山阿敢告梁益益州刺史張敏見而竒之乃表其文武帝遣使鐫之於劔閣山焉載又為𣙜論言賢人君子將立天下之功成天下之名非遇其時無由而致其用辭㫖髙邁世多稱之又為濛氾賦司𨽻校尉傅元見而嗟歎以車迎之言談盡日為之延譽遂知名起家佐著作郎出補肥鄉令復為著作郎轉太子中舍人遷樂安相𢎞農太守長沙王乂請為記室督拜中書侍郎復領著作載見世方亂無復進仕意遂稱疾篤告歸卒於家載二弟協亢協字景陽少有雋才與載齊名辟公府掾轉祕書郎補華隂令征北大將軍從事中郎遷中書侍郎轉河間内史在郡清簡寡欲于時天下已亂所在寇盗協遂棄絶人事屏居草澤守道不競以屬詠自娱擬諸文士作七命其辭曰冲漠公子含華隱曜嘉遯龍蟠超世髙蹈遊心於浩然玩志乎衆妙絶景乎大荒之遐阻吞響乎幽山之窮奥於是徇華大夫聞而造焉乃整雲輅驂飛黄越奔沙輾流霜陵扶摇之風躡堅冰之津旌拂霄崿軌出蒼垠天清冷而無霞野曠朗而無塵臨重岫而攬轡顧石室而廻輪遂適冲漠公子之所居其居也崢嶸幽藹蕭瑟虚元溟海渾濩涌其後嶰谷㟹嶆張其前尋竹竦莖䕃其壑百籟羣鳴籠其山衝飈發而回日飛礫起而灑天於是登絶巘愬長風陳辯惑之辭命公子於巖中曰蓋聞聖人不卷道而背時智士不遺身而匿跡生必耀華名於玉牒沒則勒鴻伐於金冊今公子違世陸沉避地獨竄有生之懽滅資父之義廢愁洽百年苦溢千載何異促鱗之遊汀濘短羽之栖翳薈今將榮子以天人之大實悦子以縱性之至娛窮地而遊中天而居傾四海之歡殫九州之腴鑽屈榖之瓠解疏屬之拘子欲之乎公子曰大夫不遺來萃荒外雖在不敏敬聽嘉話大夫曰寒山之桐出自太冥含黄鐘以吐榦據蒼岑而孤生既乃瓊巘層陵金岸崥崹右當風谷左臨雲谿上無陵虚之巢下無跖實之蹊搖則峻挺苕邈嶕嶢晞三春之溢露愬九秋之鳴飈零雪寫其根霏霜封其條木既繁而後緣草未素而先凋於是構雲梯陟崢嶸翦㽔賓之陽柯剖大呂之隂莖營匠斵其樸伶倫均其聲器舉樂奏促調髙張音朗號鐘韻清繞梁追逸響於八風採竒律於歸昌啓中黄之妙宫發蓐收之變商若乃龍火西頽暄氣初收飛霜迎節髙風送秋覊旅懷土之徒流宕百罹之儔撫促柱則酸鼻揮危弦則涕流若乃追清哇赴嚴節奏淥水吐白雪激楚廻流風結悲蓂莢之朝落悼望舒之夕缺煢嫠為之擗摽孀老為之嗚咽王子拂纓而傾耳六馬嘘天而仰秣此蓋音曲之至妙子豈能從我而聽之乎公子曰余病未能也大夫曰蘭宮祕宇雕堂綺櫳雲屏爛旰瓊壁青葱應門八襲璇臺九重表以百常之闕闤以萬雉之墉爾乃嶢榭迎風秀出中天翠觀岑靑彤閣霞連長翼臨雲飛陛陵山望玉繩而結極承倒景而開軒頳素煥爛枌拱嵯峨隂虬負檐陽馬承阿錯以瑶英鏤以金華方疏含秀圎井吐葩重殿叠起交綺對榥幽堂晝密明室夜朗焦𡨕飛而風生尺蠖動而成響若乃目厭常玩體倦帷幄擕公子而雙遊時娛觀於林麓登翠阜臨丹谷華草錦繁飛采星燭陽葉春青隂條秋綠華實代新承意恣觀仰折神䖀俯採朝蘭愬惠風於蘅薄眷椒塗於瑶壇爾乃浮三翼戲中沚潛鰓駭驚翰起沈絲結飛矰理挂歸翮於赤霄之表出華鱗於紫潭之裏然後縱擢隨風弭楫乘波吹孤竹撫雲和川客唱淮南之曲榜人奏採菱之歌歌曰乘鷁舟兮為水嬉臨芳洲兮拔靈芝樂以忘戚遊以卒時窮夜為日畢歳為期此蓋宴居之浩麗子豈能從我而處之乎公子曰余病未能也大夫曰若乃白商素節月既授衣天凝地閉風厲霜飛柔條夕勁密葉晨稀將因氣以効殺臨金郊而講師爾乃列輕武整戎剛建雲髦啟雄芒駕紅陽之飛燕驂唐公之驌驦屯羽隊於外林縱輕翼於中荒爾乃張脩罠布飛羅凌黄岑挂青巒畫長壑以為限帶流谿以為闗既乃内無疏蹊外無漏跡叩鉦散校舉麾贊獲彀全機馳鳴鏑翦剛豪落勁翮連騎競騖駢武齊轍翕忽揮霍雲廻風烈聲動響飛形移影發舉戈林聳揮鋒電滅仰傾雲巢俯殫地穴乃有圎文之豜斑題之豵鼓鬛風生怒目電瞛口齩霜刄足撥飛鋒齀林蹶石扣拔幽叢於是飛黄奮鋭賁育逞伎䠞封狶㩌馮豕拉甝虪挫解􅀈鉤𤓰摧踞牙擺瀾漫狼籍傾榛倒壑隕胔挂山僵踣掩澤藪為毛林隰為丹薄於是徹圍頓網卷斾收鳶虞人數獸林衡計鮮論最犒勤息馬韜弦肴駟連䮽酒駕方軒千鐘電釂萬燧星繁陵阜沾流膏谿谷厭芳烟歡極樂殫廻節而旋此亦畋遊之壯觀子豈能從我而為之乎公子曰余病未能也大夫曰楚之陽劔歐冶所營邪谿之鋌赤山之精銷踰羊頭鐷越鍜成乃錬乃鑠萬辟千灌豐隆奮椎飛㢘扇炭神器化成陽文隂漫既乃流綺星連浮采豔發光如散電質如耀雪霜鍔水凝冰刄露㓗形冠豪曹名珍巨闕指鄭則三軍白首麾晉則千里流血豈徒水截蛟鴻陸灑奔駟斷浮翮以為工絶重甲而稱利云爾而已哉若其靈寶則舒辟無方竒鋒異模形震薛燭光駭風胡價兼三鄉聲貴二都或馳名傾秦或夜飛去吳是以功冠萬戰威曜無窮揮之者無前擁之者身雄可以從服九國横制八戎爪牙景附函夏承風此蓋希世之神兵子豈能從我而服之乎公子曰余病未能也大夫曰天驥之駿逸態超越禀氣靈川受精皎月眸瞷黒照元采紺發沬如揮紅汗如振血秦青不能識其衆尺方堙不能覩其若滅爾乃巾雲軒踐朝霧赴春衢整秋御虬蛹螭騰麟超龍翥望山載奔視林載赴氣盛怒發星飛電駭志陵九州勢越四海影不及形塵不暇起浮箭未移再踐千里爾乃踰天根越地隔適汗漫之所不遊躡章亥之所未跡陽烏為之頓羽夸父為之投策斯蓋天下之雋乘子豈能從我而御之乎公子曰余病未能也大夫曰大梁之黍瓊山之禾唐稷播其根農帝嘗其華爾乃六禽殊珍四膳異肴窮海之錯極陸之毛伊公爨鼎庖子揮刀味重九沸和兼芍藥晨鳬露鵠霜鵽黄雀圓案星亂方丈華錯封熊之蹯翰音之跖燕髀猩脣髦殘象白靈川之龜萊黄之鮐丹穴之鷚元豹之胎燀以秋橙酤以春梅接以商王之箸承以帝辛之杯范公之鱗出自九谿頳尾丹腮紫翼靑鬐爾乃命支離飛霜鍔紅肌綺散素膚雪落婁子之毫不能厠其細秋蟬之翼不足擬其薄繁肴既闋亦有嘉羞商山之果漢臯之楱析龍眼之房剖㭨子之殻芳㫖萬選承意代奏乃有荆南烏程豫北竹葉浮蟻星沸飛華萍接元石嘗其味儀氏進其法傾罍一朝可以流湎千日單醪投川可使三軍告捷斯人神之所歆羡觀聴之所煒曄也子豈能彊起而御之乎公子曰耽爽口之饌甘腊毒之味服腐腸之藥御亡國之器雖子大夫之所榮顧亦吾人之所畏余病未能也大夫曰蓋有晉之融皇風也金華啓徴大人有作繼明代照配天光宅其基徳也隆於姬公之處岐其垂仁也富乎有殷之在亳南箕之風不能暢其化離畢之雲無以豐其澤皇道昭煥帝載緝熙導氣以樂宣德以詩敎清乎雲官之世政穆乎鳥紀之時王猷四塞函夏寧謐丹𡨕投鋒靑徼釋警却馬於糞車之轅銘德於昆吾之鼎羣萌反素時人載郁耕父推畔漁豎讓陸樵夫耻危冠之飾輿臺笑短後之服六合時雍巍巍蕩蕩元髫巷歌黄髮撃壤解皇羲之繩錯陶唐之象若乃華裔之夷流荒之貊語不傳於輶軒地未被乎正朔莫不駿奔稽顙委質重譯于時昆蚑感惠無思不服苑戲九尾之禽囿棲三足之鳥鳴鳳在林夥於黄帝之園有龍游川盈於孔甲之沼萬物烟煴天地交泰義懐靡内化感無外林無被褐山無韋帶皆象刻於百工兆發乎靈蔡縉紳濟濟軒冕藹藹功與造化爭流德與二儀比大言未終公子蹶然而興曰鄙夫固陋守兹狂狷蓋理有毁之而爭寶之訟解言有怒之而齊王之疾痊向子誘我以聾耳之樂栖我以蔀家之屋田游馳蕩利刄駿足既老氏之攸戒非吾人之所欲故靡得而應子至聞皇風載韙時聖道醇舉實為秋摛藻為春下有可封之人上有大哉之君余雖不敏請從後塵世以為工永嘉初復徴為黄門侍郎託疾不就終於家亢字季陽才藻不逮二昆亦有屬綴又觧音樂伎術時人謂載協亢陸機雲曰二陸三張中興初過江拜散騎侍郎祕書監荀崧舉亢領著作郎出補烏程令入為散騎常侍復領佐著作述歴贊一篇行於世通志卷一百二十四上
