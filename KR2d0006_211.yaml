body:
  text: 通志卷一百八十七宋右廸功郎鄭樵漁仲撰載記第二後趙石勒𢎞虎世遵鑒張賔魏冉閔後趙石勒字世龍初名㔨上黨武鄉羯人也其先匈奴别部羌渠之胄祖耶奕于父周曷朱一名乞翼加並為部落小率勒生時赤光滿室白氣自天屬于中庭見者咸異之年十四隨邑人行販洛陽倚嘯上東門王衍見而異之顧謂左右曰向者胡雛吾觀其聲視有竒志恐将為天下之患馳遣收之㑹勒已去長而壯健有膽力雄武好騎射曷朱性凶麤不為羣胡所附每使勒代已督攝部胡愛信之所居武鄉北原山上草木皆有鐵騎之象家園中生人參花葉甚茂悉成人状父老及相者皆曰此胡状貌竒異志度非常其終不可量也勸邑人厚遇之時多嗤笑唯鄔人郭敬陽曲寗驅以為信然並加資贍勒亦感其恩為之力耕每聞鞞鐸之音歸以告其母母曰作勞耳鳴非不祥也太安中并州饑亂勒與諸小胡亡散乃自鴈門還依寗驅北澤都尉劉監欲縛賣之驅匿之獲免勒於是潛詣納降都尉李川路逢郭敬泣拜言饑寒敬對之流涕以帶貨鬻食之并給以衣服勒謂敬曰今者大餓不可守窮諸胡饑甚宜誘将冀州就榖因執賣之可以兩濟敬深然之㑹建威将軍閻粹説并州刺史東瀛公騰執諸胡於山東賣充軍實騰使将軍郭陽張隆虜羣胡将詣冀州兩胡一枷勒時年二十餘亦在其中數為隆所敺辱敬先以勒屬郭陽及兄子時陽敬族兄也是以陽時每為解請道路饑病賴陽時而濟既而賣與荏平人師懽為奴有一老父謂勒曰君魚龍髪際上四道已成當貴為人主甲戌之嵗王彭祖可圖勒曰若如公言弗敢忘徳忽然不見每耕作於野常聞鼓角之聲勒以告諸奴諸奴亦聞之因曰吾幼来在家恒聞如是諸奴歸以告懽懽亦竒其状貌而免之懽家鄰於馬牧與牧率魏郡汲桑往来勒以能相馬自託於桑嘗傭於武安臨水為逰軍所囚㑹有羣鹿傍過軍人競逐之勒乃獲免俄而又見一父老謂勒曰向羣鹿者我也君應為中州主故相救爾勒拜而受命遂招集王陽䕫安支雄冀保吳豫劉膺桃豹逯明等八騎為羣盗後郭敖劉徴劉寳張曀僕呼延莫郭黒略張越孔豚趙鹿支屈六等又赴之號為十八騎復東如赤龍騄驥諸苑中乘苑馬逺掠繒寳以賂汲桑及成都王頴敗乗輿于蕩隂逼帝如鄴宫王浚以頴陵辱天子使鮮卑擊之頴懼挟恵帝南奔洛陽帝復為張方所逼遷于長安關東所在兵起皆以誅頴為名河間王顒懼東師之盛欲輯懐東夏乃奏議廢頴是嵗劉淵稱漢王于黎亭頴故将陽平人公師藩等自稱将軍起兵趙魏衆至數萬勒與汲桑帥牧人乗苑馬數百騎以赴之桑始命勒以石為姓勒為名焉藩拜勒為前隊督從攻平昌公模於鄴模使将軍馮嵩逆戰敗之藩濟自白馬而南濮陽太守茍晞討藩斬之勒與桑亡潛苑中桑以勒為伏夜牙門帥牧人刼掠郡縣繫囚又招山澤亡命多附勒勒率以應之桑乃自號大将軍稱為成都王頴誅東海王越東瀛公騰為名桑以勒為前驅屢有戰功署為埽虜将軍忠明亭侯桑進軍攻鄴以勒為前鋒都督大敗騰将馮嵩因長驅入鄴遂害騰殺萬餘人掠婦女珍寳而去濟自延津南擊兖州越大懼使茍晞王讃等討之桑勒攻幽州刺史石尠於樂陵尠死之乞活田禋帥衆五萬救尠勒逆戰敗禋與晞等相持于平原陽平間數月大小三十餘戰互有勝負越懼次于官渡為晞聲援桑勒為晞所敗死者萬餘人乃收餘衆将奔劉淵冀州刺史丁紹要之于赤橋又大敗之桑奔馬牧勒奔樂平王師斬桑于平原時胡部大張㔨督馮突莫等擁衆數千壁于上黨勒往從之深為所眤因説㔨督曰劉單于舉兵誅晉部大距而不從豈能獨立乎曰不能勒曰如其不能者兵馬當有所屬今部落皆已被單于賞募往往聚議欲叛部大而歸單于矣宜早為之計㔨督等素無智略懼部衆之貳已也乃潛隨勒單騎歸淵淵署㔨督為親漢王莫突為都督部大以勒為輔漢将軍平晉王以統之勒於是命㔨督為兄賜姓石氏名之曰㑹言其遇已也烏丸張伏利度亦有衆二千壁于樂平淵屢招而不能致勒偽獲罪於淵因奔伏利度伏利度大悦結為兄弟使勒率諸胡㓂掠所向無前諸胡畏服勒知衆心之附已也乃因㑹執伏利度告諸胡曰今起大事我與伏利度孰堪為主諸胡咸以推勒勒於是釋伏利度率其部衆歸淵淵加勒督山東征討諸軍事以伏利度衆配之淵使劉聰攻壺關命勒率所統七千為前鋒都督劉琨遣䕶軍黄秀等救壺關勒敗秀於白田秀死之勒遂陷壺關淵命勒與劉零閻羆等七将率衆三萬㓂魏郡頓邱諸壘壁多陷之假壘主将軍都尉簡彊壮五萬為軍士老弱安堵如故軍無私掠百姓懐之及淵僭號遣使授勒持節平東大将軍校尉都督王如故勒并軍㓂鄴鄴潰和郁奔於衛國執魏郡太守王粹于三臺進攻趙郡害冀州西部都尉馮冲攻乞活赦亭田禋於中邱皆殺之淵授勒安東大将軍開府置左右長史司馬從事中郎進軍攻鉅鹿常山害二郡守将陷冀州郡縣堡壁百餘衆至十餘萬其衣冠人物集為君子營乃引張賔為謀主始署軍功曹以刁膺張敬為股肱䕫安孔萇為爪牙支雄呼延莫王陽桃豹逯明吳豫等為将率使其将張斯率騎詣并州山北諸郡縣説諸胡羯暁以安危諸胡懼勒威名多有附者進軍常山分遣諸将攻中山博陵髙陽諸縣降之者數萬人王浚使其将祁𢎞帥鮮卑叚務塵等十餘萬騎討勒大敗勒于飛龍山死者萬餘勒退屯黎陽分命諸将攻諸未下及叛者降三十餘壁置守宰以撫之進㓂信都害冀州刺史王斌於是車騎将軍王堪北中郎将裴憲自洛陽率衆討勒勒燒營并糧廽軍距之次於黄牛壘魏郡太守劉矩以郡附於勒勒使矩統其壘衆為中軍左翼勒至黎陽裴憲棄其軍奔於淮南王堪退保倉垣淵授勒鎭東大将軍封汲郡公持節都督王如故勒固讓公不受與閻羆攻猪圈苑帀二壘陷之羆中流矢死勒并統其衆潛自石橋濟河攻陷白馬坑男女三千餘口東襲鄄城害兖州刺史袁孚因攻倉垣陷之遂害堪渡河攻廣宗清河平原陽平諸縣降勒者九萬餘口復南濟河滎陽太守裴統奔于建業時劉聰攻河内勒率騎㑹之攻冠軍将軍梁巨於武徳懐帝遣兵救之勒留諸将守武徳與王桑逆巨於長陵巨請降勒弗許巨踰城而遁軍人執之勒馳如武徳坑降卒萬餘數梁巨罪而害之王師退還河北諸堡壁大震皆請降送任于勒及淵死劉聰授勒征東大将軍并州刺史汲郡公持節開府都督校尉王如故勒固辭将軍乃止劉粲率衆四萬㓂洛陽勒留輜重于重門率騎二萬㑹粲於大陽大敗王師於澠池遂至洛川粲出轘轅勒出成臯關圍陳留太守王讚於倉垣為讚所敗退屯文石津将北攻王浚㑹浚将王甲始率遼西鮮卑萬餘騎敗趙固于津北勒乃燒船棄營引軍向栢門迎重門輜重至于石門濟河攻襄城太守崔曠於繁昌害之先是雍州流人王如侯脱嚴嶷等起兵江淮間聞勒之来也懼遣衆一萬屯襄城以距勒擊敗之盡俘其衆勒至南陽屯于宛北山如懼勒之攻穰也使送珍寳車馬犒師結為兄弟勒納之如與侯脱不平説勒攻脱勒夜令三軍鷄鳴而駕晨壓苑門攻之旬有二日而克嚴嶷率衆救脱至則無及遂降于勒勒斬脱囚嶷送于平陽盡并其衆軍勢彌盛勒南㓂襄陽攻陷江西壘壁三十餘所留刁膺守襄陽躬帥精騎三萬還攻王如憚如之盛遂趣襄城如知之遣弟璃率騎二萬五千詐言犒軍實欲襲勒勒逆擊滅之復屯江西葢欲有雄據江漢之志也張賔以為不可勸勒北還弗從以賔為參軍都尉領記室位次司馬專居中總事元帝慮勒南㓂使王導率衆討勒勒軍糧不接死疫大半納張賔䇿焚輜重裹糧卷甲渡沔㓂江夏太守楊岠棄郡走北㓂新蔡害新蔡王確于南頓朗陵公何襲廣陵公陳軫上黨太守羊綜廣平太守邵肇等率衆降于勒勒進陷許昌害平東将軍王康先是東海王越率洛陽之衆二十餘萬討勒越薨于軍衆推太尉王衍為主率衆東下勒輕騎追及之衍遣將軍錢端與勒戰為勒所敗端死之衍軍大潰勒分騎圍而射之相登如山無一免者於是執衍及襄陽王範任城王躋西河王喜梁王禧齊王韶吏部尚書劉望豫州刺史劉喬太傅長史庾敳等坐之於幕下問以晉故衍躋等懼死多自陳説唯範神色儼然意氣自若顧呵之曰今日之事何復紛紜勒甚竒之勒於是引諸王公卿士於外害之死者甚衆勒重衍清辯竒範神氣不能加之兵刅夜使人排牆塡殺之左衛何倫右衛李惲聞越薨奉越妃裴氏及越世子毗出自洛陽勒逆毗於洧倉軍復大潰執毗及諸王公卿士皆害之死者甚衆因率精騎三萬入自成臯關㑹劉曜王彌㓂洛陽洛陽既陷勒歸攻彌曜遂出轘轅屯于許昌劉聰署勒征東大将軍勒固辭不受先是平陽人李洪有衆數千壘于舞陽荀晞假洪雍州刺史勒進㓂榖陽害冠軍将軍王兹破王讚于陽夏獲讚以為從事中郎襲破大将軍茍晞于蒙城執晞署為左司馬劉聰授勒征東大将軍幽州牧固辭将軍不受先是王彌納劉暾之説将先誅勒東王青州使暾徵其将曹嶷於齊勒遊騎獲暾得彌所與嶷書勒殺之密有圖彌之計矣㑹彌将徐邈輙引部兵去彌彌漸削弱及勒之獲茍晞也彌惡之偽卑辭使謂勒曰公獲茍晞而赦之何其神也使晞為公左彌為公右天下不足定勒謂張賔曰王彌位重言卑恐其遂成前狗意也賔曰觀王公有青州之心桑梓本邦固人情之所樂明公獨無并州之思乎王公遲迴未發者懼明公踵其後已有規明公之志但未獲便爾今不圖之恐曹嶷復至共為羽翼後雖欲悔何所及邪徐邈既去軍勢稍弱觀其控御之懐猶盛可誘而滅之勒以為然勒時與陳午相攻於蓬關王彌亦與劉瑞相持甚急彌請救於勒勒未之許張賔進曰明公常恐不得王公之便今天以其便授我矣陳午小䜿何能為㓂王彌人傑将為我害勒因廻軍擊瑞斬之彌大悅謂勒深心推奉無復疑也勒引師攻陳午于肥澤午司馬上黨李頭説勒曰公天生神武當平定四海四海士庶皆仰屬明公望濟于塗炭有與公爭天下者公不早圖之而返攻我曹流人我曹鄉黨終當奉戴何遽見逼乎勒心然之詰朝引退詭請王彌讌于已吾彌長史張嵩諫彌勿就恐有専諸孫峻之禍彌不從既入酒酣勒手斬彌而并其衆啟聰稱彌叛逆之状聰署勒鎮東大将軍督并幽二州諸軍事領并州刺史持節征討都督校尉開府幽州牧公如故苟晞王讚謀叛勒勒害之以将軍左伏肅為前鋒都尉攻掠豫州諸郡臨江而還屯于葛陂降諸夷楚署将軍二千石以下税其義榖以供軍士初勒被鬻平原與母王相失至是劉琨遣張儒送王于勒遺勒書曰将軍發迹河朔席卷兖豫飲馬江淮折衝漢沔雖自古名将未足為諭所以攻城而不有其人略地而不有其土翕爾雲合忽復星散将軍豈知其然哉存亡决在得主成敗要在所附得主則為義兵附逆則為賊衆義兵雖敗而功業必成賊衆雖克而終歸殄滅昔赤眉黄巾横逸宇宙所以一旦敗亡者正以兵出無名聚而為亂将軍以天挺之質威振宇宙擇有徳而推崇隨時望而歸之勲義堂堂長享遐貴背聰則禍除向主則福至採納往誨翻然改圖天下不足定螘冦不足掃今相授侍中持節車騎大将軍領䕶匈奴中郎将襄城郡公總内外之任兼華戎之號顯封大郡以表殊能将軍其受之副逺近之望也自古已来誠無戎人而為帝王者至於名臣建功業者則有之矣今之遲想葢以天下大亂當須雄才遥聞将軍攻城野戰合於機神雖不視兵書闇與孫吳同契所謂生而知之者上學而知之者次但得精騎五千以将軍之才何向不摧至心實事皆張儒所具勒報琨曰事功殊途非腐儒所聞君當逞節夲朝吾自夷難為效遺琨名馬珍寳厚賔其使謝歸以絶之勒於葛陂繕室宇課農造舟将㓂建鄴㑹霖雨歴三月不止元帝使諸将率江南之衆大集夀春勒軍中饑疫死者大半檄書朝夕繼至勒㑹諸将計之右長史刁膺諌勒先送欵於帝求掃平河朔待軍退之後徐更計之勒愀然長嘯中堅䕫安勸勒就髙避水勒曰将軍何其怯乎孔萇支雄等三十餘将進曰及吳軍未集萇等請各将三百歩卒乘船三十餘道夜登其城斬吳将頭得其城食其倉米今年要當破丹陽定江陵盡生縳取司馬家兒軰勒笑曰是勇将之計也各賜鎧馬一匹顧問張賔曰於君計何如賔曰将軍攻陷帝都囚執天子殺害王侯妻略妃主擢将軍之髮不足以數将軍之罪奈何復還相臣奉乎去年誅王彌之後不宜於此營建天降霖雨方數百里中示将軍不宜留也鄴有三臺之固西接平陽四塞山河有喉衿之勢宜北徙據之伐叛懐服河朔既定莫有處将軍之右者晉之保夀春懼将軍之往擊爾今卒聞廻軍必欣於敵去未遑竒兵掎擊也輜重逕從北道大軍向夀春輜重既過大軍徐廻何懼進退無地乎勒攘袂鼓髯曰賔之計是也責刁膺曰君共相輔佐當規成功業如何便相勸降此計應斬然相明性怯所以宥君於是退膺為将軍擢賔為右長史加中壘将軍號曰右侯發自葛陂遣石虎率騎二千距夀春㑹江南運船至獲米布數十艘将士爭之不設備晉伏兵大發敗虎于巨靈口赴水死者五百餘人奔退百里及于勒軍軍中震擾謂王師大至勒陣以待之晉懼有伏兵退還夀春勒所過路次皆堅壁清野採掠無所獲軍中大饑士衆相食行逹東燕聞汲郡向冰有衆數千壁于枋頭勒将扵棘津北渡懼冰邀之㑹諸将問計張賔進曰如聞冰船盡在瀆中未上枋内可簡壮勇者千人詭道潛渡襲取其船以濟大軍大軍既濟冰必可擒也勒從之使支雄孔萇等從文石津縛筏潛渡勒引其衆自酸棗向棘津冰聞勒軍至始欲内其船㑹雄等已渡屯其壘門下船三十餘艘以濟其軍令主簿鮮于豐挑戰設三伏以待之冰怒乃出軍将戰而三伏齊發夾擊攻之又因其資軍遂豐振長驅㓂鄴攻北中郎将劉演于三臺演部将臨深牟穆等率衆數萬降于勒時諸将佐議欲攻取三臺以據之張賔進曰劉演衆猶數千三臺險固攻守未可卒下舍之則能自潰王彭祖劉越石大敵也宜及其未有備密規進據罕城廣運糧儲西禀平陽埽定并薊桓文之業可以濟也且今天下鼎沸戰爭方始逰行羈旅人無定志難以保萬全制天下也夫得地者昌失地者亡邯鄲襄國趙之舊都依山憑險形勝之國可擇此二邑而都之然後命将四出授以竒略推亡固存兼弱攻昧則羣凶可除王業可圖矣勒曰右侯之計是也於是進據襄國賔又言於勒曰今我都此越石彭祖深所忌也恐及吾城池未固資儲未廣送死於我聞廣平諸縣秋稼大成可分遣諸将收掠野榖遣使平陽陳宜鎭此之意勒又然之於是上表於劉聰分命諸将攻冀州郡縣壘壁率多降附運糧以輸勒劉聰署勒使持節散騎常侍都督冀幽并營四州雜夷征討諸軍事冀州牧進封夲國上黨郡公邑五萬戸開府幽州牧東夷校尉如故廣平㳺綸張豺擁衆數萬受王浚假署保據苑鄉勒使䕫安攴雄等七将攻之破其外壘浚遣督䕶王昌及鮮卑叚就六眷末柸匹磾等部衆五萬餘以討勒時城隍未修乃於襄國築隔城重栅設鄣以待之就六眷屯于渚陽勒分遣諸将連出挑戰頻為就六眷所敗又聞其大造攻具勒顧謂其将佐曰今㓂来轉逼彼衆我寡恐攻圍不解外救不至内糧罄絶縱孫吳重生亦不能固也吾将簡練将士大陣於野以决之何如諸将皆曰宜固守以疲宼彼師老自退追而擊之蔑不克矣勒顧謂張賔孔萇曰君以為何如賔萇俱曰聞就六眷尅来月上旬送死此城其大衆逺来戰守連日以我軍勢寡弱謂不敢出戰意必懈怠今叚氏種衆之悍末柸尤最其卒之精勇悉在末柸所可勿復出戰示之以弱速鑿北壘為突門二十餘道候賊列守未定出其不意直衝末柸帳敵必震惶計不及設所謂迅雷不及掩耳末柸之衆既奔餘自摧散擒末柸之後彭祖可指辰而定勒笑而納之即以萇為攻戰都督造突門于北城鮮卑入屯北壘勒候其陣未定躬率将士鼓譟于城上㑹孔萇督諸突門伏兵俱出擊之生擒末柸就六眷等衆遂奔散萇乘勝追擊枕尸三十餘里獲鎧馬五千匹就六眷收其遺衆屯于渚陽遣使求和送鎧馬金銀并以末柸三弟為質而請末柸諸将並勸勒殺末柸以挫之勒曰遼西鮮卑健國也與我素無怨讐為王浚所使耳今殺一人結怨一國非計也放之必悦不復為浚用矣於是納其質遣石虎盟就六眷于渚陽結為兄弟就六眷等引還使參軍閻綜獻㨗於劉聰於是㳺綸張豺請降稱藩勒将襲幽州務養將士權宜許之皆就署将軍於是遣衆宼信都害冀州刺史王象王浚復以邵舉行冀州刺史保于信都建興元年石虎攻鄴三臺鄴潰劉演奔于廪邱将軍謝胥田青郎牧等率三臺流人降于勒勒以桃豹為魏郡太守以撫之命叚末柸為子署為使持節安北将軍北平公遣還遼西末柸感勒厚恩在途日南面而拜者三叚氏遂專心歸附自是王浚威勢漸衰勒襲苑鄉執游綸以為主簿攻乞活李惲于上白斬之将坑其降卒見郭敬而識之曰汝郭季子乎敬叩頭曰是也勒下馬執其手泣曰今日相遇豈非天邪賜衣服車馬署敬上将軍悉免降者以配之其将孔萇㓂定陵害兖州刺史田徽烏丸薄盛執渤海太守劉既率戸五千降于勒劉聰授勒侍中征東大将軍餘如故拜其母王氏為上黨國太夫人妻劉氏上黨國夫人章綬首飾一同王妃叚末柸任弟亡歸遼西勒大怒所經令尉皆殺之烏丸審廣漸裳郝襲背王浚密遣使降于勒勒厚加撫納司冀漸寜人始租賦立太學簡明經善書吏署為文學掾選将佐子弟三百人教之勒母王氏死潛窆山谷莫詳其所既而備九命之禮虚葬于襄國城南勒謂張賔曰鄴魏之舊都吾将營建既風俗殷雜須賢望以綏之誰可任也賔曰晉故東莱太守南陽趙彭忠亮篤敏有佐時良幹将軍若任之必能允副神規勒於是徵彭署為魏郡太守彭至入泣而辭曰臣往䇿名晉室食其禄矣犬馬戀主竊不敢忘誠知晉之宗廟鞠為茂草亦猶洪川東逝往而不還明公應符受命可謂攀龍之㑹但受人之榮復事二姓臣志所不為恐亦明公之所不許若賜臣餘年全臣一介之願者明公大造之恵也勒黙然張賔進曰自将軍神旗所經衣冠之士靡不變節未有能以大義進退者至如此賢以将軍為髙祖自擬為四公所謂君臣相知此亦足成将軍不世之髙何必吏之勒大悦曰右侯之言得孤心矣於是賜安車駟馬養以卿祿辟其子明為參軍勒以石虎為魏郡太守鎭鄴三臺虎篡奪之萌兆于此矣時王浚署置百官奢縱滛虐勒有吞并之意欲先遣使以觀察之議者僉曰宜如羊祜與陸抗書相聞時張賔有疾勒就而謀之賔曰王浚假三部之力稱制南面雖曰晉藩實懐僭逆之志必思恊英雄圖濟事業将軍威聲震于海内去就為存亡所在為輕重浚之欲将軍猶楚之招韓信也今權譎遣使無誠欵之形脱生猜疑圖之兆露後雖竒略無所設也夫立大事者必先為之卑當稱藩推奉尚恐未信羊陸之事臣未見其可勒曰右侯之計是也乃遣其舍人王子春董肇等多齎珍寳奉表推崇浚為天子曰勒本小胡出自戎裔値晉綱弛御海内饑亂流離屯厄竄命冀州共相帥合以救性命今晉祚淪夷逺播吳㑹中原無主蒼生無繫伏惟明公殿下州鄉貴望四海所宗為帝王者非公復誰勒所以捐軀命興義兵誅暴亂者正為眀公驅除爾伏願殿下應天順時踐登皇阼勒奉戴明公如天地父母明公當察勒微心慈眄如子也亦遺棗嵩書而厚賂之浚謂子春等曰石公一時英武據趙舊都成鼎峙之勢何為稱藩于孤其可信乎子春對曰石将軍英才儁㧞士馬雄盛實如聖㫖仰惟眀公州鄉貴望累葉重光出鎮藩嶽威聲播于八表固以胡越欽風戎夷歌徳豈惟區區小府而敢不斂袵神闕者乎昔陳嬰豈其鄙王而不王韓信薄帝而不帝者哉但以知帝王不可以智力爭故也石将軍之擬明公猶隂精之比太陽江河之比洪海爾項籍子陽覆車不逺是石将軍之明鑒明公亦何怪乎且自古誠胡人而為名臣者實有之帝王則未之有也石将軍非所以惡帝王而讓明公也顧取之不為天人之所許耳願公勿疑浚大悦封子春等為列侯遣使報勒答以方物浚司馬游統時鎮范陽隂叛浚馳使降于勒勒斬其使送于浚以表誠實浚雖不罪統彌信勒之忠誠無復疑矣子春等與王浚使至勒命匿勁卒精甲虚府羸師以示之北面拜使而受浚書浚遺勒麈尾勒偽不敢執懸之于壁朝夕拜之云我不得見王公見王公所賜如見公也復遣董肇奉表于浚期親詣幽州奉上尊號亦修牋于棗嵩乞并州牧廣平公以見必信之誠也勒将圖浚引子春問之子春曰幽州自去嵗大水人不粒食浚積粟百萬不能贍恤刑政苛酷賦役殷煩賊害賢良誅斥諫士下不堪命流叛略盡鮮卑烏丸離貳于外棗嵩田矯貪暴于内人情沮擾甲士羸弊而浚猶置立臺閣布列百官自言漢髙魏武不足並也又幽州謡怪特甚聞者莫不為之寒心浚意氣自若曾無懼容此亡期之至也勒撫几笑曰王彭祖眞可擒也浚使逹幽州具陳勒形勢寡弱款誠無二浚大悦以為信然勒纂兵戒期将襲浚而懼劉琨及鮮卑烏丸為其後患沉吟未發張賔進曰夫襲敵國當出其不意軍嚴經日不行豈顧有三方之慮乎勒曰然為之奈何賔曰彭祖之據幽州唯仗三部今皆離叛還為宼讐此則外無聲援以抗我也幽州饑儉人皆蔬食衆叛親離甲旅寡弱此則内無以彊兵禦我也若大軍在郊必土崩瓦解今三方未謂将軍便能懸軍千里以征幽州也輕軍往返不出二旬就使三方有動勢足旋趾宜應機電發勿後時也且劉琨王浚雖同名晉藩其實仇敵若修牋于琨送質請和琨必欣于得我喜于浚滅終不救浚而襲我也勒曰吾所未了右侯已了復何疑哉於是輕騎襲幽州以火宵行至栢人殺主簿游綸以其兄統在范陽懼聲軍計故也遣張慮奉牋于劉琨陳已過深重求討浚以自效琨既素疾浚乃檄諸州郡説勒知命思愆收累年之咎求㧞幽都效善将来今聽所請受任通和軍逹易水浚督䕶孫緯馳遣白浚将引軍距勒游統禁之浚将佐咸請出擊勒浚怒曰石公来正欲奉戴我也敢言擊者斬乃命設饗以待之勒晨至薊叱門者開門疑有伏兵先驅牛羊數千頭聲言上禮實欲塡諸街巷使兵不得發浚乃懼或坐或起勒升其聽事命甲士執浚立之于前使徐光讓浚曰君位冠元台爵列上公據幽都驍悍之國跨全燕突騎之鄉手握彊兵坐觀京師傾覆不救天子而欲自尊又專任姧暴殺害忠良肆情恣欲毒徧燕壤自貽于此非為天也使其将王洛生驛送浚襄國市斬之於是分遣流人各還桑梓擢荀綽裴憲資給車服數朱碩棗嵩田矯等以賄亂政責游統以不忠于浚皆斬之遷烏丸審廣漸裳郝襲靳市等于襄國焚燒浚宫殿以晉尚書劉翰為寜朔将軍行幽州刺史戍薊置守宰而還遣其東曹掾傅遘兼左長史封王浚首獻㨗于劉聰勒既還襄國劉翰叛勒奔叚匹磾襄國大饑榖二升直銀一斤肉一斤直銀一兩劉聰以平幽州之勲乃遣其使人栁純持節署勒大都督陕東諸軍事驃騎大将軍東單于侍中使持節開府校尉二州牧公如故加金鉦黄鉞前後鼓吹二部增封十二郡勒固辭受二郡而已勒封左長史張敬等十一人為伯子侯文武進位有差勒将支雄攻劉演於廩邱為演所敗演遣其将韓𢎞潘良襲頓邱斬勒所署太守卲攀支雄追擊𢎞等害潘良于廩邱劉琨遣樂平太守焦球攻勒常山斬其太守邢秦琨司馬温嶠西討山胡勒将逯明要之敗嶠于潞城勒以幽冀漸平始下州郡閲實人戸户貲二匹租二斛勒将陳午以浚儀叛于勒逯明攻寗黒于茌平降之因破東燕酸棗而還徙降人二萬餘户于襄國勒使其将葛薄㓂濮陽陷之害太守韓𢎞劉聰遣其使人范龕持節䇿命勒賜以弓矢加崇為陕東伯得專征伐拜封刺史将軍守宰列侯嵗盡集上署其長子興為上黨國世子加翼軍将軍為驃騎副貳劉琨遣王旦攻中山逐勒所署太守秦固勒将劉勔距旦敗之執旦于望都關勒襲邵續于樂陵續盡衆逆戰大敗而還章武人王脊起兵于科斗壘擾亂勒河間渤海諸郡勒以揚武張夷為河間太守參軍臨深為渤海太守各率步騎三千以鎭靜之使長樂太守程遐屯于昌亭為之聲勢徙平原烏丸展廣劉哆等部落三萬餘户于襄國使石虎襲乞活王平于梁城敗績而歸又攻劉演于廪邱支雄逯眀擊寗黒于東武陽陷之黑赴河而死徙其衆萬餘于襄國卲續使文鴦救演虎退止盧闗津避之文鴦弗能進屯于景亭兖豫豪右張平等起兵救演虎夜棄營設伏于外揚聲将歸河北平等以為信然入于空營虎迴擊敗之遂陷廪邱演奔文鴦軍獲演弟啓送于襄國演即劉琨之兄子也勒以琨撫存其母徳之賜啓田宅令儒官授其經時大蝗中山常山尤甚中山丁零翟䑕叛勒攻中山常山勒率騎討之獲其母妻而還䑕保于胥闗遂奔代郡勒攻樂平太守韓據于坫城劉琨遣将軍姬澹率衆十餘萬討勒琨次廣牧為澹聲援勒将距之或諫曰澹兵馬精盛其鋒不可當宜深溝高壘以挫其鋭攻守勢異必獲萬全勒曰澹大衆逺来體疲力竭犬羊烏合號令不齊可一戰而擒之何彊之有㓂已垂至胡可捨去大軍一動豈易中還若澹乗我之退顧乃無暇焉得深溝髙壘乎此為不戰而自滅亡之道立斬諫者以孔萇為前鋒都督令三軍後出者斬設疑兵於山上分為二伏勒輕騎與澹戰偽收衆而北澹縦兵追之勒前後伏發夹擊澹軍大敗獲鎧馬萬匹澹奔代郡據奔劉琨琨長史李𢎞以并州降于勒琨遂奔于叚匹磾勒遷陽曲樂平戸于襄國置守宰而還孔萇追姬澹于桑乾勒遣兼左長史張敷獻㨗于劉聰勒之征樂平也其南和令趙領招合廣川平原渤海數千户叛勒奔于卲續河間邢嘏累徵不至亦聚衆數百以叛勒廵下冀州諸縣以右司馬程遐為寜朔将軍監冀州七郡諸軍事勒姊夫廣威張越與諸将蒱博勒親臨觀之越戲言忤勒勒大怒叱力士折其脛而殺之孔萇攻代郡澹死之時司冀并兖州流人數萬户在于遼西迭相招引人不安業孔萇等攻馬嚴馮䐗久而不克勒問計于張賔賔對曰馮䐗等夲非明公之深仇遼西流人悉有戀本之思今宜班師息甲差選良守任之以龔遂之事不拘常制奉宣仁澤奮揚威武幽冀之冦可翹足而靜遼西流人可指望而至勒曰右侯之計是也召萇等歸署武遂令李囬為易北督護振武将軍髙陽太守馬嚴士衆多李潛軍人回先為潛府長史素服回威徳多叛嚴歸之嚴以部衆離貳懼奔于幽州溺水而死馮䐗率衆降于勒囬移居易凉流人降者嵗常數千勒甚嘉之封囬弋陽子邑三百户加賔封一千户進賔位前将軍固辭不受河朔大蝗初穿地而生二旬則化状若蠶七八日而卧四日蜕而飛彌亘百草唯不食三豆及麻并冀尤甚石虎濟自長夀津宼梁國害内史荀闔劉琨與叚匹磾渉復辰疾六眷叚末柸等㑹于固安将謀討勒勒使參軍王續齎金寳遺末柸以間之末柸既思有以報勒恩又忻於厚賂乃説辰眷等引還琨匹磾亦退如薊城邵續使兄子濟攻勒渤海虜三千餘人而還劉聰将趙固以洛陽歸順恐勒襲之遣參軍髙少奉書推崇勒請師討聰勒以大義讓之固深恨恚與郭黙攻掠河内汲郡叚末柸殺鮮卑單于截附眞立忽跋鄰為單于叚匹磾自幽州攻末柸末柸逆擊敗之匹磾奔還幽州因害太尉劉琨琨将位相繼降勒末柸遣弟騎督擊匹磾于幽州匹磾率其部衆數千将奔邵續勒将石越要之于鹽山大敗之匹磾退保幽州越中流矢死勒為之屏樂三月贈平南将軍初曹嶷據有青州既叛劉聰南禀王命以建鄴懸逺勢援不接懼勒襲之故遣通和勒授嶷東州大将軍青州牧封琅邪公劉聰疾甚驛召勒為大将軍錄尚書事受遺詔輔政勒固辭乃止聰又遣其使人持節署勒大将軍持節鉞都督侍中校尉二州牧公如故增封十郡勒不受聰死其子粲襲偽位其大将軍靳凖殺粲於平陽勒命張敬率騎五千為前鋒以討凖勒統精鋭五萬繼之據襄陵北原𦍑羯降者四萬餘落凖數挑戰勒堅壁以挫之劉曜自長安屯于蒲阪曜復僭號署勒大司馬大将軍加九錫增封十郡并前十三郡進爵趙公勒攻凖于平陽小城平陽大尹周置等率雜户六千降于勒巴師及諸𦍑羯降者十餘萬落徙之司州諸縣凖使卜泰送乗輿服御請和勒與劉曜競有招懐之計乃送泰于曜使知城内無歸曜之意以挫其軍勢曜潛與泰結盟使還平陽宣慰諸屠各勒疑泰與曜有謀欲斬泰以速降之諸将皆曰今斬卜泰凖必不復降就令泰宣漠要盟於城中使相率誅靳凖凖必懼而速降矣勒久乃從諸将議遣之泰入平陽與凖将喬泰馬忠等起兵攻凖殺之推靳明為盟主遣泰及卜元奉傳國六璽送于劉曜勒大怒遣令史羊升使平陽責明殺凖之状明怒斬升勒怒甚進軍攻明明出戰勒擊敗之枕尸二里明築城門堅守不復出戰勒遣其左長史王修獻㨗于劉曜晉彭城内史周堅害沛内史周黙以彭沛降于勒石虎率幽冀州兵㑹勒攻平陽劉曜遣征東劉暢救明勒命舎師于蒲上靳明率平陽之衆奔于劉曜曜西奔粟邑勒焚平陽宫室使裴憲石㑹修復淵聰二墓收劉粲已下百餘尸葬之徙渾儀樂器于襄國劉曜又遣其使人郭氾等持節署勒太宰領大将軍進爵趙王增封七郡并前二十郡出入警蹕冕十有二旒乗金根車駕六馬如曹公輔漢故事夫人為王后世子為王太子勒舎人曹平樂因使留仕於曜言於曜曰大司馬遣王修等来外表至䖍内覘大駕彊弱謀待修之返将輕襲乗輿時曜勢實殘弊懼修宣之曜大怒追汜等還斬修于粟邑停太宰之授劉茂逃歸言王修死故勒大怒誅平樂三族贈修太常又知停殊禮之授怒甚下令曰孤兄弟之奉劉家人臣之道過矣若微孤兄弟豈能南靣稱朕哉根基既立便欲相圖天不助惡使假手靳凖孤惟事君之體當資舜求瞽瞍之義故復推崇令主齊好如初何圖長惡不悛殺奉誠之使帝王之起復何常邪趙王趙帝孤自取之名號大小豈其所節邪於是置太醫尚方御府諸令命參軍鼂讚成正陽門俄而門崩勒大怒斬讚既怒刑倉卒尋亦悔之賜以棺服贈大鴻臚平西将軍祖逖攻陳川于蓬關石虎救川逖退屯梁國虎使揚武左伏肅攻之勒增置宣文宣教崇儒崇訓十餘小學于襄國四門簡将佐豪右子弟百餘人以教之且備擊柝之衛置挈壺署鑄豐貨錢河西鮮卑日六延叛于勒石虎討之敗延于朔方斬首二萬級俘三萬餘人獲牛馬十餘萬孔萇討平幽州諸郡時叚匹磾部衆饑散棄其妻子匹磾奔邵續曹嶷遣使来聘獻其方物請以河為斷桃豹至蓬關祖逖退如淮南徙陳川部衆五千餘户于廣宗石虎與張敬張賔及諸将佐百餘人勸勒稱尊號勒下書曰孤猥以寡徳沗荷崇寵夙夜戰惶如臨深薄豈可假尊竊號取譏四方昔周文以三分之重猶服事殷朝小白居一匡之盛而尊崇周室况國家道隆殷周孤徳卑二伯哉其亟止斯議勿復紛紜自今敢言刑兹無赦乃止勒又下書曰今大亂之後律令滋煩其採集律令之要為施行條制於是命法曹令史貫志造辛亥制度五千文施行十餘嵗乃用律令晉太山太守徐龕叛降于勒石虎及張敬張賔左右司馬張屈六程遐文武等一百二十九人上疏稱頌功徳請依劉備在蜀魏王在鄴故事以河内魏汲頓邱平原清河鉅鹿常山中山長樂樂平十一郡并前趙國廣平陽平章武渤海河間上黨定襄范陽漁陽武邑燕國樂陵十三郡合二十四郡户二十九萬為趙國封内依舊改為内史凖禹貢魏武復冀州之境南至盟津西逹龍門東至于河北至于塞垣以大單于鎭撫百蠻罷并朔司三州通置部司以監之伏願欽若昊天垂副羣望也勒西面而讓者五南面而讓者四百寮皆叩頭固請勒乃許之太興二年勒偽稱趙王赦殊死已下均百姓田租之半賜孝悌力田死義之孤帛各有差孤老鰥寡榖人三石大酺七日依春秋列國漢初侯王每世稱元改稱趙王元年始建社稷立宗廟營東西宫署從事中郎裴憲參軍續咸庾景為律學祭酒任播崔濬為史學祭酒中壘支雄游擊王陽並領門臣祭酒專明胡人辭訟以張離張良劉羣劉謨等為門生主書司典胡人出内重其禁法不得侮易衣冠華族號胡為國人遣使循行州郡勸課農桑加張賔大執法專總朝政位冠寮首署石虎為單于元輔都督禁衛諸軍事署前将軍李寒領司兵勲教國子擊刺戰射之法命記室佐明楷程機撰上黨國記中大夫傅彪賈蒲江軌撰大将軍起居注參軍石泰石同石謙孔隆撰大單于志自是朝㑹常以天子禮樂饗其羣下威儀冠冕從容可觀矣羣臣議請論功勒曰自孤起軍十六年于兹矣文武将士從孤征伐者莫不蒙犯矢石備嘗艱阻其在葛陂之役厥功尤著宜為賞之先也若身見存爵封輕重隨功位為差死事之孤賞加一等庶足以慰答存亡申孤之心也又下書禁國人不聼報嫂及在喪婚娶其燒葬令如夲俗孔萇攻邵續别營十一皆下之續尋為石虎所獲送于襄國劉曜将尹安宋始據洛陽降于勒晉徐州刺史蔡豹敗徐龕于檀邱龕遣使詣勒陳討豹之計勒遣将王步都為龕前鋒使張敬率騎繼之敬逹東平龕疑敬之襲已也斬步都三百餘人復降于晉勒大怒命張敬據其襟要以守之大雨霖中山常山尤甚滹沲汎溢衝陷山谷巨松僵抜浮于滹沱東至渤海原隰之間皆如山積孔萇攻陷文鴦十餘營萇不設備鴦夜擊之大敗而歸勒始制軒懸之樂八佾之舞為金根大輅黄屋左纛天子車旗禮樂備矣使石虎率步騎四萬討徐龕龕遣長史劉霄詣勒乞降送妻子為質納之時蔡豹屯于譙城虎攻豹豹夜遁虎引軍城封邱而旋徙朝臣掾屬已上士族者三百户于襄國崇仁里置公族大夫以領之勒宫殿及諸門始就制法令甚嚴諱胡尤峻有醉胡乗馬突入止車門勒大怒謂宫門小執法馮翥曰夫人君為令尚望威行天下况宫闕之間乎向馳馬入門為是何人而不彈白邪翥惶懼忘諱對曰向有醉胡乗馬馳入甚呵禦之而不可與語勒笑曰胡人正自難與言怒而不罪使石虎擊託候部掘咄哪於岍北大破之俘獲牛馬二十餘萬勒清定五品以張賔領選復續定九品署張班為左執法郎孟卓為右執法郎典定士族副選舉之任令羣寮及州郡嵗各舉秀才至孝亷清賢良直言武勇之士各一人置都部從事各一部一州秩二千石職凖丞相司直勒下令曰去年水出巨材所在山積将皇天欲孤繕修宫宇也其擬洛陽之太極起建徳殿遣從事中郎任汪帥使工匠五千採木以供之黎陽人陳武妻一産三男一女武擕其妻子詣襄國上書自陳勒下書以為二儀諧暢和氣所致賜其乳婢一口榖一百石雜綵四十疋石虎攻段匹磾於厭次孔萇討匹磾部内諸城陷之匹磾勢窮乃率其臣下輿櫬出降虎送之襄國勒署匹磾為冠軍将軍以其弟文鴦亞将衛麟為左右中郎将皆金章紫綬散諸流人三萬餘户復其本業置守宰以撫之於是冀并幽州遼西巴西諸屯結皆陷於勒時晉征北将軍祖逖據譙将平中原逖善於撫納自河以南多背勒歸順勒憚之不敢為宼乃下書曰祖逖屢為邊患逖北州士望也儻有首邱之思其下幽州修祖氏墳墓為置守冡二家冀逖如趙佗感恩輟其宼暴逖聞之甚悦遣參軍王愉使於勒贈以方物修結和好勒厚賔其使遣左常侍董樹報聘以馬百匹金五十斤答之自是兖豫乂安人得休息矣從事中郎劉奥坐營建徳殿井木斜縮斬於殿中勒悔之贈太常建徳校尉王和掘得員石銘曰律權石重四鈞同律度量衡有新氏造議者未詳或以為瑞參軍續咸曰王莽時物也其時兵亂之後典度堙滅遂命下禮官為凖程定式又得一鼎容四斗中有大錢三十文曰百當千千當萬鼎銘十三字篆書不可曉藏之於永豊倉因此令公私行錢而人情不樂乃出公絹市錢限中絹疋一千二百下絹八百然百姓私買中絹四千下絹二千巧利者賤買私錢貴賣於官坐死者十數人而錢終不行勒徙洛陽銅馬翁仲二於襄國列之永豐門祖逖牙門童建害新蔡内史周密遣使降於勒勒斬之送首於祖逖曰天下之惡一也叛臣逃吏吾之深仇将軍之惡猶吾惡也逖遣使報謝自是兖豫間壘壁叛者逖皆不納二州之人率多兩屬矣勒令武鄉耆舊赴襄國既至勒親與鄉老齒坐歡飲語及平生初勒與李陽鄰居嵗常爭麻池迭相毆擊至是謂父老曰李陽壮士也何以不来漚麻是布衣之恨孤方崇信於天下寧讐匹夫乎乃使召陽既至勒與酣謔引陽臂笑曰孤往日厭卿老拳卿亦飽孤毒手因賜甲第一區拜參軍都尉令曰武鄉吾之豐沛萬嵗之後魂靈當歸之其復之三世勒以百姓始復業資儲未豐於是重制禁釀郊祀宗廟皆以醴酒行之數年無復釀者尋署石虎爲車騎将軍率騎三萬討鮮卑鬱粥於離石俘獲及牛馬十餘萬鬱粥奔烏丸悉降其衆城先是勒世子興死至是立子𢎞為世子領中領軍遣石虎統中外精卒四萬討徐龕龕堅守不戰於是築室返耕列長圍以守之晉鎭北将軍劉隗降於勒拜鎭南将軍封列侯石虎攻陷徐龕送之襄國勒囊盛於百尺樓自上㩧殺之令步都等妻子刳而食之坑龕降卒三千晉兖州刺史劉遐懼自鄒山退屯於下邳琅邪内史孫黙以琅邪叛降於勒徐兖間壘壁多送任請降皆就拜守宰清河張披為程遐長史遐甚委昵之張賔舉為别駕引參政事遐疾披去已又惡賔之權盛勒世子𢎞即遐之甥也自以有援欲收威重於朝乃使𢎞之母譖之曰張披與張賔為遊侠門客日百餘乗物望皆歸之非社稷之利也宜除披以便國家勒然之至是披取急召不時至因此遂殺之賔知遐之間已遂弗敢請無㡬以遐為右長史總執朝政自是朝臣莫不震懼赴於程氏矣時祖逖卒勒始侵㓂邊戍勒征虜石他敗王師於酇西執将軍衛榮而歸征北将軍祖約懼退如夀春勒境内大疫死者十二三乃罷徽文殿作遣其将王陽屯於豫州有闚𨵦之志於是兵難日尋梁鄭之間騷然矣又遣石虎統中外步騎四萬討曹嶷先是嶷議欲徙海中保根余山㑹疾疫甚計未及就虎進兵圍廣固東莱太守劉巴長廣太守吕披皆以郡降以石他為征東将軍擊羌胡於河西左軍石挺濟師於廣固曹嶷降送於襄國勒害之坑其衆三萬虎将盡殺嶷衆其青州刺史劉徵曰今留徵使牧人也無人焉牧徵将歸矣虎乃留男女七百口配徵鎭廣固青州諸郡縣壘壁盡陷勒司州刺史石生攻晉揚武将軍郭誦于陽翟不克進宼襄城俘獲千餘而還勒以參軍樊坦清貧擢授章武内史既而入辭勒見坦衣冠弊壊大驚曰樊參軍何貧之甚也坦性誠朴率然而對曰頃遭羯賊無道資財蕩盡勒笑曰羯賊乃爾暴掠邪今當相償耳坦大懼叩頭泣謝勒曰孤律自防俗士不關卿輩老書生也賜車馬衣服装錢三百萬以勵貪俗勒将兵都尉石瞻宼下邳敗晉将軍劉長遂㓂蘭陵又敗彭城内史劉續東莞太守竺珍東海太守蕭誕以郡叛降於勒勒親臨大小學考諸學生經義尤髙者賞帛有差勒雅好文學雖在軍旅常令儒生讀史書而聴之毎以其意論古帝王善惡朝賢儒士聴者莫不歸羙焉嘗使人讀漢書聞酈食其勸立六國後大驚曰此法當失何得遂成天下至留侯諫乃曰賴有此耳其天姿英逹如此勒徵徐揚州兵㑹石瞻於下邳劉遐懼又自下邳奔於泗汭石生攻劉曜河南太守尹平於新安斬之克壘壁十餘降掠五千餘户而歸自是劉石禍結兵戈日交河東𢎞農間百姓無聊矣以右常侍霍皓為勸課大夫與典農使者朱表典勸都尉陸充等循行州郡核定户籍勸課農桑農桑最修者賜爵五大夫使石生自延夀關出宼許潁俘獲萬餘降者二萬生遂攻陷康城晉将軍郭誦追生生大敗死者千餘生收散卒屯於康城勒汲郡内史石聰聞生敗馳救之進攻郭黙俘獲男女二千餘人石聰攻敗晉将李矩郭黙等勒将狩於近郊主簿程琅諫曰劉馬刺客離布如林變起倉卒帝王亦一夫之敵耳孫策之禍可不慮乎且枯木朽株盡能為害馳騁之弊今古戒之勒勃然曰吾幹力自可足能裁量但知卿文書事不須白此輩也是日逐獸馬觸木而死勒亦㡬殆乃曰不用忠臣言吾之過也乃賜琅朝服錦絹爵關内侯於是朝臣謁見忠言競進矣晉都尉魯潛叛以許昌降於勒石瞻攻陷晉兖州刺史檀斌于鄒山斌死之勒西夷中郎将王騰襲殺并州刺史崔琨上黨内史王眘以并州叛於勒先是石虎攻劉曜将劉岳于石梁至是石梁潰執岳送襄國虎又攻王騰于并州斬之李矩以劉岳之敗也懼自滎陽遁歸矩長史崔宣率矩衆二千降于勒於是盡有司兖之地徐豫濵淮諸郡縣皆降之勒命徙洛陽晷影于襄國列之單于庭銘佐命功臣三十九人于石函置于建徳前殿立桑梓苑于襄國勒嘗夜微行檢察營衛齎繒帛金銀以賂門者求出永昌門門候王假欲收捕之從者至乃止旦召假以為振忠都尉爵關内侯勒如苑鄉召記室參軍徐光光醉不至以光物情所湊常不平之因此發怒退為牙門勒自苑鄉如鄴徐光侍直愠然攘袂振紛仰視不顧勒因而惡之讓光曰何負卿而敢怏怏邪於是幽光并其妻子於獄勒既将營鄴宫又欲以其世子𢎞為鎭密與程遐謀之石虎自以勲效之重仗鄴為基雅無去意及修構三臺遷其家室虎深恨遐遣左右數十人夜入遐宅姦其妻女掠衣物而去勒以𢎞鎭鄴配禁兵萬人車騎所統五十四營悉配之以驍騎領門臣祭酒王陽專統六夷以輔之石聰攻夀春不克遂宼逡遒阜陵殺掠五千餘人京師大震濟岷太守劉闓将軍張闔等叛害下邳内史夏嘉以下邳降于石生石瞻攻河南太守王羡于邾陷之龍驤将軍王國叛以南郡降于勒晉彭城内史劉續復據蘭陵石城石瞻攻陷之勒令州郡有墳發掘不掩覆者推劾之骸骨暴露者縣為備棺衾之具以牙門将王波為記室參軍典定九流始立秀孝試經之制茌平令師懽獲黑兎獻之於勒程遐等以為勒龍飛革命之祥於晉以水承金兎隂精之獸元為水色此示殿下宜速副天人之望也於是大赦以咸和三年改年曰太和石堪攻晉豫州刺史祖約于夀春屯師淮上晉龍驤将軍王國以南郡叛降于堪南陽都尉董幼叛率襄陽之衆又降于堪祖約諸将佐皆隂遣使附于勒石聰與堪濟淮陷夀春祖約奔歴陽夀春百姓陷于聰者二萬餘户劉曜敗石虎于髙候遂圍洛陽勒滎陽太守尹矩野王太守張進等皆降之襄國大震勒将親救洛陽左右長史司馬郭敖程遐等固諫曰劉曜乗勝雄盛難與爭鋒金墉糧豐攻之未可卒㧞曜懸軍千里勢不支乆不可親動動無萬全大業去矣勒大怒按劒叱遐等出於是赦徐光召而謂之曰劉曜乗髙候之勢圍守洛陽庸人之情皆謂其鋒不可當也然曜帶甲十萬攻一城而百日不尅師老卒殆以我初銳擊之可一戰而擒若洛陽不守曜必送死冀州自河已北席卷南向吾事去矣程遐等不欲吾親行卿以為何如光對曰劉曜乗髙候之勢而不能進臨襄國更守金墉此其無能為也懸軍三時亡攻戰之利若鸞旗親駕必望旌奔敗定天下之計在今一舉今此機㑹所謂天授授而弗應禍之攸集勒笑曰光之言是也佛圖澄亦謂勒曰大軍若出必擒劉曜勒尤悦使内外戒嚴有諫者斬命石堪石聰及豫州刺史桃豹等各統見衆㑹滎陽使石虎進據石門以左衛石邃都督中軍事勒統步騎四萬赴金墉濟自大堨先是流澌風猛軍至氷泮清和濟畢流澌大至勒以為神靈之助也命曰靈昌津勒顧謂徐光曰曜盛兵成臯關上計也阻洛水其次也坐守洛陽者成擒也諸軍集于成臯歩卒六萬騎二萬七千勒見曜無守軍大悦舉手指天又自指額曰天也乃卷甲銜枚詭道兼路出于鞏訾之間知曜陳其軍十餘萬于城西彌悦謂左右曰可以賀我矣勒統步騎四萬入自宣陽門升故太極前殿虎率步卒三萬自城北而西攻其中軍石堪石聰等各以精騎八千自城西而北擊其前鋒大戰於西陽門勒躬貫甲胄出自閶闔夹擊之曜軍大潰石堪執曜送之以徇於軍斬首五萬餘級枕尸於金谷勒下令曰所欲擒者一人耳今已獲之其𠡠将士抑鋒止鋭縱其歸命之路乃旋師使征東石邃等帥騎衛曜而北及是祖約舉兵敗降于勒勒使王波讓之曰卿逆極勢窮方来歸命吾朝豈逋逃之藪邪而卿敢有靦面目也示之以前後檄書乃赦之劉曜子熈等去長安奔于上邽遣石虎討之勒廵行冀州諸郡引見髙年孝悌力田文學之士班賜榖帛有差令逺近牧守宣言屬城諸所欲言靡有隱諱使知區區之朝虚渇讜言也虎克上邽遣主簿趙封送傳國玉璽金璽太子玉璽各一于勒虎進攻集木且羌于河西克之俘獲數萬秦隴悉平凉州牧張駿大懼遣使稱藩貢方物于勒徙氐羌十五萬落于司冀州勒羣臣議以勒功業既隆祥符並萃宜時革徽號以答乾坤之望於是石虎等奉皇帝璽綬上尊號于勒勒弗許羣臣固請勒乃以咸和五年僭號趙天王行皇帝事尊其祖邪曰宣王父周曰元王立其妻劉氏為王后世子𢎞為太子署其子宏為持節散騎常侍都督中外諸軍事驃騎大将軍大單于封秦王左衛将軍斌太原王小子恢為輔國将軍南陽王中山公虎為太尉守尚書令中山王石生河東王石堪彭城王以虎子邃為冀州刺史封齊王加散騎常侍武衛将軍宣左将軍挺侍中梁王署左長史郭敖為尚書左僕射右長史程遐為右僕射領吏部尚書左司馬䕫安右司馬郭殷從事中郎李鳳前郎中令裴憲為尚書署參軍事徐光為中書令領祕書監論功封爵開國郡公文武二十一人侯二十四人縣公二十六人侯二十二人其餘文武各有差侍中任播等參議以趙承金為水徳旗幟尚元牲牡尚白子社丑臘勒從之勒下書曰自今有疑難大事八坐及委丞郎齎詣東堂詮詳平决其有軍國要務須啓有令僕尚書隨局入陳勿避寒暑昏夜也勒以祖約不忠於本朝誅之及其諸子姪親屬百餘人羣臣固請勒宜即尊號勒乃僭即皇帝位大赦境内改元曰建平自襄國都臨漳追尊其髙祖曰順皇曾祖曰威皇祖曰宣皇父曰世宗元皇帝妣曰元昭皇太后文武封進各有差立其妻劉氏為皇后又定昭儀夫人位視上公貴嬪貴人視列侯員各一人三英九華視伯淑媛淑儀視子容華羙人視男務簡賢淑不限員數勒荆州監軍郭敬南蠻校尉董幼宼襄陽勒驛勑敬退屯樊城戒之使偃藏旗幟寂若無人彼若使人觀察則告之曰自愛堅守後七八日大騎将至相䇿不復得走矣敬使人浴馬於津周而復始晝夜不絶偵諜還告南中郎将周撫撫以為勒軍大至懼而奔武昌敬入襄陽軍無私掠百姓安之晉平北将軍魏該弟遐等率該部衆自石城降于敬敬毁襄陽遷其百姓于沔北城樊城以戍之秦州休屠王羌叛于勒刺史臨深遣司馬管光帥州軍討之為羌所敗隴右大擾氐羌悉叛勒遣石生進據隴城王羌兄子擢與羌有仇生乃賂擢與掎擊之羌敗奔凉州徙秦州夷豪五千餘户于雍州勒下書曰自今諸有處法悉依科令吾所忿戮怒發中㫖者若徳位已髙不宜訓罰或服勤死事之孤邂逅罹譴門下皆各列奏之吾當思擇而行也堂陽人陳豬妻一產三男賜其衣帛廪食乳婢一口復三嵗勿事時髙句麗肅愼致其楛矢宇文屋孤並獻名馬于勒凉州牧張駿遣長史馬詵奉圖送髙昌于寘鄯善大宛使獻其方物晉荆州牧陶侃遣兼長史王敷聘于勒致江南之珍寳竒獸秦州送白虎白鹿荆州送白雉白兎濟隂木連理甘露降苑鄉勒以休瑞並臻遐方慕義赦三嵗刑已下均百姓去年逋調特赦凉州殊死凉州計吏皆拜郎中賜絹十疋緜十斤勒南郊有白氣自壇屬天勒大悦還宫赦四嵗刑遣使封張駿武威郡公食凉州諸郡勒親耕籍田還宫赦五嵗刑賜其公卿已下金帛有差勒以日蝕避正殿三日令羣公卿士各上封事禁州郡諸祠堂非正典者皆除之其能興雲致雨有益於百姓者郡縣更為立祠堂殖嘉樹凖嶽瀆已下為差等勒将營鄴宫廷尉續咸上書切諫勒大怒曰不斬此老臣朕宫不得成也勑御史收之中書令徐光進曰陛下天資聰睿超邁唐虞而更不欲聞忠臣之言豈夏癸商辛之君邪其言可用用之不可用故當容之奈何一旦以直言而斬列卿乎勒歎曰為人君不得自專如是豈不識此言之忠乎向戲之耳人家有百疋資尚欲市别宅况有天下之富萬乗之尊乎終當繕之耳且勑停作成吾直臣之氣也因賜咸絹百疋稻百斛又下書令公卿百寮嵗薦賢良方正直言秀異至孝亷清各一人答䇿上第者拜議郎中第中郎下第郎中其舉人得遞相薦引廣招賢之路起明堂辟雍靈臺于襄國城西時大雨霖中山西北暴水流漂巨木百餘萬根集于堂陽勒大悦謂公卿曰諸卿知不此非為災也天意欲吾營鄴都耳於是令少府任汪都水使者張漸等監營鄴宫勒親授規模蜀梓潼建平漠固三郡蠻巴降于勒勒以成周土中漢晉舊京復欲有移都之意乃命洛陽為南都置行臺治書侍御史于洛陽勒因饗髙句麗宇文屋孤使酒酣謂徐光曰朕方自古開基何等主也對曰陛下神武籌略邁于髙皇雄藝卓犖超絶魏祖自三王已来無可比也其軒轅之亞乎勒笑曰人豈不自知卿言亦以太過朕若逢髙皇當北面而事之與韓彭競鞭而爭先耳脫遇光武當並驅于中原未知鹿死誰手大丈夫行事當礌礌落落如日月皎然終不能如曹孟徳司馬仲逹父子欺他孤免寡婦狐媚以取天下也朕當在二劉之間耳軒轅豈所擬乎其羣臣皆頓首稱萬嵗晉将軍趙允攻克馬頭石堪遣将軍韓雍救之至則無及遂宼南沙海虞俘獲五千餘人初郭敬之退據樊城也王師復戌襄陽至是敬又攻陷之留戍而歸暴風大雨震雹建徳殿端門襄國市西門殺五人雹起西河界山大如雞子平地三尺洿下丈餘行人禽獸死者萬數歴太原樂平武鄉趙郡廣平鉅鹿千餘里樹木摧折禾稼蕩然勒正服于東堂以問徐光曰歴代已来有斯災幾也光對曰周漢魏晉皆有之雖天地之常事然明主未始不為變所以敬天之怒也去年禁寒食介推帝鄉之神也歴代所尊或者以為未宜替也一人吁嗟王道尚為之虧况羣神怨憾而不怒動上帝乎縦不能令天下同爾介山左右晉文之所封也宜任百姓奉之勒下書曰寒食既并州之舊風朕生其俗不能異也前者外議以子推諸侯之臣王者不應為忌故從其議儻或由之而致斯災乎子推雖朕鄉之神非法食者亦不得亂也尚書其促檢舊典定議以聞有司奏以子推歴代攸尊請普復寒食更為殖嘉樹立祠堂給戸奉祀勒黄門郎韋謏駁曰按春秋藏冰失道隂氣發泄為雹自子推以前雹者復何所致此自隂陽乖錯所為耳且子推賢者曷為暴害如此求之㝠趣必不然矣今雖為氷室懼所藏之氷不在固隂沍寒之地多皆川池之側氣泄為雹也以子推忠賢令緜介之間奉之為允於天下則不通矣勒從之於是遷冰室於重隂凝寒之所并州復寒食如初勒令其太子省可尚書奏事使中常侍嚴震參綜可否征伐刑斷大事乃呈之自是震威權之盛過于主相矣石虎之門可設雀羅虎愈怏怏不恱郭敬南掠江西晉南中郎将桓宣承其虚攻樊城取城中之衆而去敬旋師救樊追戰于涅水敬前軍大敗宣亦死傷大半盡收所掠而止宣遂南取襄陽留軍戌之勒如鄴臨石虎第謂之曰功力不可並興待宫殿成後當為王起第勿以卑小悒悒也虎免冠拜謝勒曰與王共有天下何所謝也有流星大如象尾足蛇形自北極西南流五十餘丈光明燭地墜于河聲聞九百餘里黑龍見鄴井中勒觀龍有喜色朝其羣臣于鄴命郡國立學官每郡置博士祭酒二人弟子百五十人三考修成顯升台府於是擢拜太學生五人為佐著作郎錄述時事時大旱勒親臨廷尉錄囚徒五嵗刑已下皆輕决遣之重者賜酒食聽沐浴一須秋論還未及宫澍雨大降勒如其澧水宫因疾甚而還召石虎與太子𢎞中常侍嚴震等侍疾禁中虎矯命絶𢎞震及内外羣臣親戚勒疾之增損莫有知者詐召石宏石堪還襄國勒疾小瘳見宏驚曰秦王何故来邪使王藩鎭正備今日有呼者邪自来也有呼者誅之虎大懼曰秦王思慕暫還耳今謹遣之數日復問之虎曰奉詔即遣今已半路矣更諭宏在外遂不遣之廣阿蝗虎密遣其子邃率騎三千遊于蝗所熒惑入昴星隕于鄴東北六十里初赤黑黄雲如幕長數十疋交錯聲如雷震墜地氣熱如火塵起連天時有耕者往視之土猶燃沸見有一石方尺餘青色而輕擊之音如磬勒疾甚遺令三日而葬内外百寮既葬除服無禁婚娶祭祀飲酒食肉征鎭牧守不得輙離所司以奔䘮斂以時服載以常車無藏金寳無内器玩大雅冲幼恐非能構荷朕志中山已下其各司所典無違朕命大雅與斌宜善相維持司馬氏汝等之殷鑒其務於敦穆也中山王深可三思周霍勿為将来口實以咸和七年死時年六十在位十五年夜瘞山谷莫知其所備文物虛葬號髙平陵偽諡明皇帝廟號髙祖𢎞字大雅勒之第二子也幼有孝行以恭謙自守受經於杜嘏誦律於續咸勒曰今世非承平不可専以文業敎也於是使劉徵任播授以兵書王陽敎之擊刺立為世子領中領軍尋署衛将軍使領開府辟召後鎮鄴勒僭位立為太子虚襟愛士好為文詠其所親昵莫非儒素勒謂徐光曰大雅愔愔殊不似将家子光曰漢祖以馬上取天下孝文以元黙守之聖人之後必世勝殘天之道也勒大悦光因曰皇太子仁孝温恭中山王雄暴多詐陛下一旦不諱臣恐社稷必危宜漸奪中山威權使太子早參朝政勒納之程遐又言於勒曰中山王勇武權智羣臣莫有及者觀其志也自陛下之外視之蔑如兼荷專征嵗乆威振内外性又不仁殘忍無賴其諸子並長皆豫兵權陛下在自當無他恐其怏怏不可輔少主也宜早除之以便大計勒曰今天下未平兵難未已大雅冲幼宜任彊輔中山佐命功臣親同魯衛方委以伊霍之任何至如卿言也卿當恐輔幼主之日不得獨擅帝舅之權故耳吾亦當參卿於顧命勿為過懼也遐泣曰臣所言者至公陛下以私賜距豈明主開襟納説忠臣必盡之義乎中山雖為皇太后所飬非陛下天屬不可以親義期也仗陛下神規微建鷹犬之効陛下酬其父子以恩榮亦以足矣魏任司馬懿父子終於鼎祚淪移以此而觀中山豈将来有益者乎臣因緣多幸託𤓰葛於東宫臣而不竭言於陛下而誰言之陛下若不除中山臣已見社稷不復血食矣勒不聽遐退告徐光曰主上向言如是太子必危将若之何光曰中山常切齒於吾二人恐非但國危亦為家禍當為安國寜家之計不可坐而受禍也光復承間言於勒曰陛下廓平八州帝有海内而神色不悦者何也勒曰吳蜀未平書軌不一司馬家猶不絶於丹陽恐後之人将以吾為不應符籙每一思之不覺見於神色光曰臣以陛下為憂腹心之患而何暇更憂四支乎何則魏承漢運為正朔帝王劉備雖紹興巴蜀亦不可謂漢不滅也吳雖跨江東豈有虧魏羙陛下既苞括二都為中國帝王彼司馬家免復何異元徳李氏亦猶孫權符籙不在陛下竟欲安歸此四支之輕患耳中山王藉陛下指授神畧天下皆言其英武亞於陛下兼其殘暴多姦見利忘義無伊霍之忠父子爵位之重勢傾王室觀其耿耿常有不滿之心近於東宫曲讌有輕皇太子之色陛下隱忍容之臣恐陛下萬年之後宗廟必生荆棘此心腹之重疾也惟陛下圖之勒黙然而竟不從及勒死虎執𢎞使臨軒命收程遐徐光下廷尉召其子邃率兵入宿衛文武靡不奔散𢎞大懼讓位于虎虎曰君薨而世子立臣安敢亂之𢎞泣而固讓虎怒曰若其不堪天下自當有大議何足豫論遂以咸和七年逼立之改年曰延熙文武百寮進位一等誅程遐徐光𢎞䇿拜虎為丞相魏王大單于加九錫以魏郡等十三郡為邑摠攝百揆虎偽固讓久乃受命赦其境内殊死已下立虎妻鄭氏為魏王后子邃為魏太子加使持節侍中大都督中外諸軍事大将軍錄尚書事宣為使持節車騎大将軍冀州刺史封河間王韜為前鋒将軍司隸校尉封樂安王遵齊王鑒代王苞樂平王徙太原王斌為章武王勒文武舊臣皆補左右丞相閑任虎府寮舊昵悉署臺省禁要命太子宫曰崇訓宫勒妻劉氏已下皆徙居之簡其羙淑及勒車馬珍寳服御之上者皆入于已署鎭軍䕫安領左僕射尚書郭殷為右僕射劉氏謂石堪曰皇祚之滅不復久矣王将何以圖之堪曰先帝舊臣皆已斥外衆旅不復由人宫殿之内無所措籌臣請出奔兖州據廩邱挟南陽王為盟主宣太后詔於諸牧守征鎭令各率義兵同討桀逆蔑不濟也劉氏曰事急矣便可速發恐事淹變生堪許諾微服輕騎襲兖州失期不克遂南奔譙城虎遣其将郭太等追擊之獲堪于城父送襄國炙而殺之徵石恢還于襄國劉氏謀泄虎殺之尊𢎞母程氏為皇太后時石生鎭關中石朗鎮洛陽皆起兵于二鎭虎留子邃守襄國統歩騎七萬攻朗于金墉金墉潰獲朗刖而斬之進師攻長安以石挺為前鋒大都督生遣将軍郭權率鮮卑渉璝部衆二萬為前鋒距之生統大軍繼發次蒲阪前鋒及挺大戰潼關敗績挺及丞相左長史劉隗皆戰死虎退奔澠池枕尸三百餘里鮮卑密通于虎背生而擊之生時停蒲阪不知挺之死也懼單馬奔長安郭權乃復收衆三千與越騎校尉石廣相持于渭汭生遂去長安潛于雞頭山将軍蒋英固守長安虎聞生之奔也進師入關進攻長安旬餘㧞之斬蒋英等分遣諸将屯于汧徙雍秦州華戎十餘萬户于關東生部下斬生于雞頭山虎還襄國大赦諷𢎞命已建魏臺一如魏輔漢故事郭權以生敗據上邽以歸順詔以權為鎭西将軍秦州刺史於是京兆新平扶風馮翊北地皆應之𢎞鎮西石廣與權戰敗績虎遣郭敖及其子斌等率歩騎四萬討之次于華隂上邽豪族害權以降徙秦州三萬餘户于青并二州諸郡南氐楊難敵等送任通和長安陳良夫奔于黑羌招誘北羌四角王薄句大等擾北地馮翊與石斌相持石韜等率騎掎句大之後與斌夹擊敗之句大奔于馬蘭山郭敖等懸軍追北為羌所敗死者十七八斌等收軍還于三城虎聞而大怒遣使殺郭敖石宏有怨言虎幽之𢎞齎璽綬親詣虎諭禪位意虎曰天下人自當有議何為自論此也𢎞還宫對其母流涕曰先帝眞無復遺矣俄而虎遣丞相郭殷持節入廢𢎞為海陽王𢎞安歩就車容色自若謂羣臣曰不堪纂承大統顧慚羣后此亦天命去矣又何言百官莫不流涕宫人慟哭咸康元年幽𢎞及程氏并宏恢于崇訓宫尋殺之在位二年時年二十二石虎字季龍勒之從子也祖曰㔨邪父曰宼覔勒父朱幼而子虎故或稱勒弟焉年六七嵗有善相者曰此兒貌竒有壮骨貴不可言永興中與勒相失後劉琨送勒母王及虎于葛陂時年十七矣性殘忍好馳獵游蕩無度尤善彈數彈人軍中以為毒患勒白王将殺之王曰快牛為犢子時多能破車汝當小忍之年十八稍折節身長七尺五寸趫㨗便弓馬勇冠當時将佐親戚莫不敬憚勒深嘉之拜征虜将軍為聘将軍郭榮妹為妻虎惑優僮鄭櫻桃而殺郭氏更納清河崔氏女櫻桃又譖而殺之所為酷虐軍中有勇幹䇿略與已侔者輙方便害之前後所殺甚衆至於降城陷壘不復斷别善惡坑斬士女尠有遺類勒雖屢加責誘而行意自若然御衆嚴而不煩莫敢犯者指授攻討所向無前故勒寵之信任彌隆仗以專征之任勒之居襄國署為魏郡太守鎭鄴三臺後封繁陽侯勒即大單于趙王位署為單于元輔都督禁衛諸軍事遷侍中開府進封中山公及勒僭號授太尉守尚書令進封為王邑萬户虎自以勲髙一時謂勒即位之後大單于必在已而更以授其子𢎞虎深恨之私謂其子邃曰主上自都襄國以来端拱指授而以吾躬當矢石二十餘年南擒劉岳北走索頭東平齊魯西定秦雍尅殄十有三州成大趙之業者我也大單于之望實在于我而授黄吻婢兒每一憶此令人不復能寝食待主上晏駕之後不足復留種也咸康元年虎廢勒子𢎞羣臣已下勸其稱尊號虎下書曰王室多難海陽自棄四海業重故俛從推逼朕聞道合乾坤者稱皇徳協人神者稱帝皇帝之號非所敢聞且可稱居攝趙天王以副天人之望於是赦其境内改年曰建武以䕫安為侍中太尉守尚書令郭殷為司空韓晞為尚書左僕射魏概馮莫張崇曹顯為尚書申鍾為侍中郎闓為光禄大夫王波為中書令文武封拜各有差立其子邃為太子虎以讖文天子當從東北来於是備法駕行自信都而還以應之分癭陶之栁鄉立停駕縣虎徐州從事朱縱殺刺史郭祥以彭城歸順虎遣将王朗擊之縱奔淮南虎荒游廢政多所營繕使邃省可尚書奏事選牧守祀郊廟唯征伐刑斷乃親覽之觀雀臺崩殺典匠少府任汪復使修之倍於常度虎自率衆南宼歴陽臨江而旋京師大震遣其征虜石遇宼中廬遂圍平北将軍桓宣于襄陽輔國将軍毛寳南中郎将王國征西司馬王愆期等率荆州之衆救之屯于章山遇攻守二旬軍中饑疫而還虎以租入殷廣轉輸勞煩令中倉嵗入百萬斛餘皆儲之水次晉将軍淳于安攻其琅邪費縣俘獲而歸石邃保母劉芝初以巫術進既養邃邃有深寵通賄賂豫言論權傾朝廷親貴多出其門遂封芝為宜城君虎下書令刑贖之家得以錢代財帛無錢聽以榖麥皆隨時價輸水次倉冀州八郡雨雹大傷秋稼下書深自咎責遣御史所在發水次倉麥以給秋種尤甚之處差復一年虎将遷于鄴尚書請太常告廟虎曰古者将有大事必告宗廟而不列社稷尚書可詳議以聞公卿乃請使太尉告社稷從之及入鄴宫澍雨周洽虎大恱赦殊死已下尚方令解飛作司南車成虎以其構思精微賜爵關内侯賞賜甚厚始制散騎常侍已上得乗軺軒王公郊祀乗副車駕四馬龍旂八旒朔望朝㑹即乗軺軒時羌薄句大猶保險未賔遣其子章武王斌帥精騎二萬并秦雍二州兵以討之虎如長樂衛國有田疇不闢桑業不修者貶其守宰而還咸康二年使牙門将張彌徙洛陽鐘虡九龍翁仲銅駝飛㢘于鄴鐘一没於河募浮没三百人入河繫以竹絙牛百頭鹿櫨引之乃出造萬斛舟以渡之以四輪纒輞車轍廣四尺深二尺運至鄴虎大悦赦二嵗刑賫百官榖帛百姓爵一級下書曰三載考績黜陟幽明斯則先王之令典政道之通塞魏始建九品之制三年一清定之雖未盡𢎞羙亦搢紳之清律人倫之明鏡從爾以来遵用無改先帝創臨天下黄紙再定至於選舉銓為首格自不清定三載于兹主者其更銓論務揚清激濁使九流咸允也吏部選舉可依晉氏九班選制永為揆法選畢經中書門下宣示三省然後行之其著此詔書于令銓衡不奉行者御史彈坐以聞索頭郁鞠率衆三萬降于虎署鞠等十三人親通趙王皆封列侯散其部衆于冀青等六州時衆役煩興軍旅不息加以久旱榖貴金一斤直米二斗百姓嗷然無生賴矣又納解飛之説於鄴正南投石於河以起飛橋功費數千億萬而橋竟不成役夫饑甚乃止使令長率丁壮隨山澤采橡捕魚以濟老弱而復為權豪所奪人無所得焉又料殷富之家配饑人以食之公卿已下出榖以助振給姦吏因之侵割無已雖有貸贍之名而無其實改直盪為龍騰冠以絳幘於襄國起太武殿於鄴造東西宫至是皆就太武殿基髙二丈八尺以文石綷之下穿伏室置衛士五百人於其中東西七十五步南北六十五步皆漆瓦金鐺銀楹金柱珠簾玉壁窮極伎巧又起靈風臺九殿于顯陽殿後選士庶之女以充之後庭服綺縠玩珍奇者萬餘人内置女官十有八等敎宫人星占及馬步射置女太史于靈臺仰觀災祥以考外太史之虚實又置女鼓吹羽儀雜伎工巧皆與外侔禁郡國不得私學星讖敢有犯者誅左校令成公遐造庭燎于崇杠之末髙十餘丈上盤置燎下盤置人絙繳上下虎試而悦之其太保䕫安等文武五百九人勸虎稱尊號安等方入而庭燎油灌下盤死者七人虎惡之大怒軒成公遐于閶闔門於是依殷周之制以咸康三年僭稱大趙天王即位于南郊大赦殊死已下追尊祖㔨邪武皇帝父㓂覔為太宗孝皇帝立其鄭氏為天王皇后以子邃為天王皇太子親王皆貶封郡公藩王為縣侯百官封署各有差太原徙人五百餘户叛入黑羌武鄉長城徙人韓彊獲元玉璽方四寸七分龜紐金文詣鄴獻之拜彊騎都尉復其一門䕫安等又勸進曰臣等謹案大趙水徳元龜者水之精也玉者石之寳也分之數以象七政寸之紀以凖四極昊天成命不可久違輙下史官擇吉日具禮儀謹昧死上皇帝尊號虎下書曰過相褒羙猥見推逼覽増恧然非所望也其亟止兹議今東作告始自非京城内外皆不得表慶中書令王波上元璽頌以羙之虎以石𢎞時造此璽彊遇而獻之邃自總百揆之後荒酒淫色驕恣無道或盤游于田懸管而入或夜出于宫臣家淫其妻妾粧飾宫人羙淑者斬首洗血置於盤上傳共視之又内諸比丘尼有姿色者與其交䙝而殺之合牛羊肉煮而食之亦賜左右欲以識其味也河間公宣樂安公韜有寵於虎邃疾之如仇虎荒耽内游威刑失度邃以事為可呈呈之虎恚曰此小事何足呈也時有所不聞復怒曰何以不呈誚責杖捶月至再三邃甚恨私謂常從無窮長生中庶子李顏等曰官家難稱吾欲行冐頓之事卿從我乎顔等伏不敢對邃稱疾不省事率宫臣文武五百餘騎宴于李顏别舍謂顔等曰我欲至冀州殺石宣有不從者斬行數里騎皆逃散李顔叩頭固諫邃亦昏醉而歸邃母鄭氏聞之私遣中人責邃邃怒殺其使虎聞邃有疾遣所親任女尚書察之邃呼前與語抽劒擊之虎大怒收李顔等詰問顔具言始末誅顔等三十餘人幽邃于東宫既而赦之引見太武東堂邃朝而不謝俄而便出虎遣使謂邃曰太子應入朝中宫何以便去邃徑出不顧虎大怒廢邃為庶人其夜殺邃及妻張氏并男女二十六人同埋於一棺之中誅其宫臣支黨二百餘人廢鄭氏為東海太妃立其子宣為天王皇太子宣母杜昭儀為天王皇后安定人侯子光弱冠羙姿儀自稱佛太子從大秦國来當王小秦國易姓名為李子楊游于鄠縣爰赤睂家頗見其妖状事微有驗赤睂敬信之妻以二女轉相扇惑京兆樊經竺龍嚴諶謝樂子等聚衆數千人於杜南山子楊稱大黄帝建元曰龍興赤睂與經為左右丞相龍諶為左右大司馬樂子為大将軍鎭西石廣擊斬之子楊頸無血十餘日而面色無異於生虎将伐遼西鮮卑叚遼募有勇力者三萬人皆拜龍騰中郎遼遣從弟屈雲襲幽州刺史李孟退奔易京虎以桃豹為横海将軍王華為渡遼将軍統舟師十萬出漂渝津支雄為龍驤大将軍姚弋仲為冠軍将軍統步騎十萬為前鋒以伐叚遼虎衆次金臺支雄長驅入薊遼漁陽太守馬鮑代相張牧北平相陽裕上谷相侯龕等四十餘城並率衆降于虎支雄攻安次斬其部大夫那樓竒遼懼棄令支奔于密雲山遼左右長史劉羣盧諶司馬崔悦等封其府庫遣使請降虎遣将軍郭太麻秋等輕騎二萬追遼及之戰于密雲獲其母妻斬級三千遼單馬竄險遣子乞特眞送表及名馬虎納之乃遷其户二萬餘于雍司兖豫四州之地諸有才行者皆擢叙之先是北單于乙回為鮮卑敦那所逐既平遼西遣其将李穆擊那破之復立乙回而還虎入遼宫論功封賞各有差初慕容皝與段遼有隙遣使稱藩于虎陳遼宜伐請盡衆来㑹及軍至令支皝師不出虎将伐之天竺佛圖澄進曰燕福徳之國未可加兵虎作色曰以此攻城何城不克以此衆戰誰能禦之區區小豎何所逃也太史令趙攬固諫曰燕地嵗星所守行師無功必受其禍虎怒鞭之黜為肥如長進師攻棘城旬餘不克皝遣子恪帥胡騎二千晨出挑戰諸門皆若有師出者四面如雲虎大驚棄甲而遁於是召趙攬復為太史令虎旋自令支過易京惡其固而毁之還謁石勒墓朝其羣臣於襄國建徳前殿復從征文武有差至鄴設飲至之禮賜俘徧於丞郎虎謀伐昌黎遣渡遼曹伏将青州之衆渡海戍蹋頓城無水而還因戌于海島運榖三百萬斛以給之又以船三百艘運榖三十萬斛詣髙句麗使典農中郎将王典率衆萬餘屯田于海濵又令青州造船千艘使石宣率步騎二萬擊朔方鮮卑斛摩頭破之斬首四萬餘級冀州八郡大蝗司𨽻請坐守宰虎曰此政之失和朕之不徳而欲委咎守宰豈禹湯罪已之義邪司隸不進讜言佐朕不逮而歸咎無辜所以重吾之責可白衣領司𨽻加其子司徒韜金鉦黄鉞鑾輅九旒先是使襄城公涉歸上庸公曰歸率衆戌長安二歸告鎮西石廣私樹恩澤潛謀不軌虎大怒追廣至而殺之叚遼於密雲山遣使詐降虎信之使征東麻秋百里郊迎勑秋曰受降如待敵将軍愼之遼又遣使降于慕容皝曰胡貪而無謀吾今請降求迎彼終不疑也若伏重軍以要之可以得志皝遣子恪伏兵於密雲麻秋統衆三萬迎遼為恪所襲死者十六七秋步遁而歸虎聞之驚怒方食吐餔乃削秋官爵下書令諸郡國立五經博士初勒置大小學博士至是復置國子博士助敎虎以吏部選舉斥外耆徳而勢門童幼多為羙官免郎中魏㚟為庶人以其太子宣為大單于建天子旌旗以䕫安為征討大都督統五将步騎七萬宼荆揚北鄙石閔敗王師于沔隂将軍蔡懐死之宣将朱保又敗王師于白石将軍鄭豹談元郝荘隨相蔡熊皆遇害虎将張賀度攻陷邾城敗晉将毛寳于邾西死者萬餘人䕫安進據胡亭晉将軍黄沖歴陽太守鄭進皆降之安於是掠七萬戸而還時豪戚侵恣賄託公行虎患之擢殿中御史李巨為御史中丞特親任之自此百僚震懾州郡肅然虎曰朕聞良臣如猛虎髙步通衢而豺狼避路信矣哉鎭逺王擢表雍秦二州望族自東徙已来遂在戍役之例既衣冠華胄宜䝉優免從之自是皇甫胡梁韋杜牛辛等十有七姓蠲其兵貫一同舊族隨才銓叙思欲分還桑梓者聽之其非此等不得為例以其撫軍李農為使持節監遼西北平諸軍事征東将軍營州牧鎭令支于時大旱白虹經天虎下書曰朕在位六載不能上和乾象下濟黎元以致星虹之變其令百僚各上封事解西山之禁蒲葦魚鹽除嵗供之外皆無所固公侯卿牧不得規占山澤奪百姓之利又下書曰前以豐國澠池二治初建徙刑徒配之權救時務而主者循為恒法致起怨聲自今罪犯流徒皆當申奏不得輙配也京獄見囚非手殺人一皆原遣其日澍雨虎将討慕容皝令司冀青徐幽幷雍兼復之家五丁取三四丁取二合鄴城舊軍滿五十萬具船萬艘自河通海運榖豆千一百萬斛于安樂城以備征軍之調徙遼西北平漁陽萬餘戸于兖豫雍洛四州之地虎僭位之後有所調用皆選司擬官經令僕而後奏行不得其人案以為令僕之負尚書及郎不坐至是吏部尚書劉真以為失銓考之體而言之虎責怒主者加眞光禄大夫金章紫綬虎如宛陽大閲於曜武場慕容皝襲幽冀畧三萬餘家而去幽州刺史石光坐愞弱徵還賜徴士辛謐几杖衣服榖五百斛勑平原為起甲第先是李夀将李宏自晉奔于虎夀致書請之題曰趙王石君虎不悦付外議之多有異同中書監王波議曰今李宏以死自誓若得反魂蜀漢當鳩率宗族混同王化若遣而果也則不煩一旅之師而坐定梁益就有進退豈在逃命一夫夀既號並日月跨僭一方今若制詔或敢酬反則取誚戎裔宜書答之并贈以楛矢使夀知我遐方必臻也於是遣宏備物以酬之以石韜為太尉與太子宣迭日省可尚書奏事自幽州東至白狼大興屯田張駿憚虎之盛遣其别駕馬詵朝之虎初大悦及覽其表辭頗蹇傲虎大怒将斬詵侍中石璞進曰為陛下之患者丹陽也區區河右焉能為有無今斬馬詵必征張駿則南討之師勢分為二建鄴君臣延其數年之命矣勝之不為武弗克為四夷所笑不如因而厚之彼若改圖謝罪率其臣職者則我又何求迷而不悟討之未後也虎乃止李宏既至蜀漢李夀欲誇其境内下令云羯使来庭獻其楛矢虎聞之怒甚黜王波以白衣守中書監虎志在窮兵以其國内少馬乃禁畜私馬匿者腰斬收百姓馬四萬餘匹以入于公兼盛興宫室於鄴起臺觀四十餘所營長安洛陽二宫作者四十餘萬人又勑河南四州具南師之備并朔秦雍嚴西討之資青冀幽州三五發卒諸州造甲者五十萬人兼公侯牧宰競興私利百姓失業十室而七船夫十七萬人為水所没猛虎所害三分而一貝邱人李𢎞因衆心之怨自言姓名應讖遂連結姦黨署置百僚事發誅之連坐者數千家虎畋獵無度晨出夜歸又多微行躬察作役之所侍中韋謏入諌其辭切直虎省而善之賜以榖帛而興繕滋繁游察自若右僕射張離領五兵尚書専總兵要而欲求媚于石宣因説之曰今諸公侯吏兵過限宜漸削弱以盛儲威宣素疾石韜之寵甚説其言乃使離奏奪諸公府吏秦燕義陽樂平四公聽置吏一百九十七人帳下兵二百人自此已下三分置一餘兵五萬悉配東宫於是諸公咸怨為大釁之漸矣遣征北張舉自鴈門討索頭郁鞠克之制征士五人車一乗牛二頭米各十五斛絹十疋調不辦者以斬論将以圖江表於是百姓窮窘鬻子以充軍制猶不能赴自經于道路死者相望而求發無已㑹青州言濟南平陵城北石虎一夜中忽移在城東南善石溝上有狼狐千餘迹隨之迹皆成路虎大悦曰虎者朕也自平陵城北而東南者天意将使朕平蕩江南之徵也天命不可違其勑諸州兵明年悉集朕當親董六軍以副成路之祥羣臣皆賀上皇徳頌者一百七十時祅怪尤多石然于泰山八日而滅東海有大石自立旁有血流鄴西山石間血流出長十餘步廣二尺餘太武殿畫古賢悉變為胡旬餘頭悉縮入肩中虎大惡之佛圖澄對之流涕寜逺劉寜攻武都狄道陷之使石宣討鮮卑斛榖提大破之斬首三萬級中謁者令申扁有寵於虎而宣亦昵之扁聰辯明斷専綜機密之任虎既不省奏案宣荒酒内游石韜沉湎好獵生殺除拜皆扁所决於是權傾内外刺史二千石多出其門九卿已下望塵而拜唯侍中鄭系王謨常侍盧諶崔約等十餘人與之抗禮虎又取州郡吏馬一萬四千餘匹以配曜武關将馬主皆復一年鎭北宇文歸執送叚遼之子蘭降于虎獻駿馬萬疋虎以平西張伏都為使持節都督征討諸軍事帥步騎三萬擊凉州既濟河與張駿将謝艾大戰于河西伏都敗績虎雖昬虐無道而頗慕經學遣國子博士詣洛陽寫石經校中經于祕書國子祭酒聶熊注榖梁春秋列于學官燕公石斌淫湎荒獵常懸管而入征北張賀度以邉防宜警每裁諫之斌怒辱賀度虎聞之大怒杖斌一百遣主書禮儀持節監之斌行意自若儀持法呵禁斌怒殺之欲殺賀度賀度嚴衛馳白之虎遣尚書張離持節帥騎追斌鞭之三百免官歸第誅其親任十餘人建元初虎饗羣臣于太武前殿有白鴈百餘集于馬道南虎命射之無所獲既将討三方諸州兵至者百餘萬太史令趙攬私於虎曰白鴈集殿庭宫室将空不宜行也虎納之臨宣武觀大閲而解嚴以燕公斌為使持節侍中大司馬錄尚書事置左右戎昭曜武将軍位在左右衛上東宫置左右統将軍位在四率上置上中光禄大夫在左右光禄上置鎭衛将軍在車騎将軍上時石宣淫虐日甚而莫敢以告領軍王朗言之於虎曰今隆冬雪寒而皇太子使人斫伐宫材引於漳水功役數萬士衆吁嗟陛下宜因游觀而罷之也虎如其言既而宣知朗所為怒欲殺之而無因㑹熒惑守房趙攬承宣㫖言於虎曰昴者趙之分也熒惑所在其主惡之房為天子此殃不小宜以貴臣姓王者當之虎曰誰可當者攬久而對曰無復貴於王領軍也虎既惜朗且猜之曰更言其次攬曰其次唯中書監王波耳虎乃下書追波前議遣李宏及荅楛矢之愆腰斬之及其四子投于漳水以厭熒惑之變尋愍波之無罪追贈司空封其孫為侯平北尹農攻慕容皝凡城不克而還黜農為庶人時白虹出自太社經鳯陽門東南連天十餘刻乃滅虎下書切責台輔百司令各上封事指陳變眚極言無隠於是閉鳯陽門唯元日乃開立二畤于靈昌津祠天及五郊李夀以建寜上庸漢固巴徵梓潼五郡降于虎先是虎起河橋於靈昌津采石為中濟石無大小下輙隨流用功五百餘萬而不成虎遣使致祭沉璧于河俄而所沉璧流于渚上地震水波騰上津所殿觀莫不傾壊壓死者百餘人虎恚甚斬工匠而止作焉命石宣石韜生殺拜除皆迭日省决不復啓也司徒申鍾諌曰慶賞刑威后皇攸執名器至重不可以假人皆以防姦杜漸以示軌儀太子國之儲貳朝夕視膳而不及政也庶人邃往以聞政致敗殷鑒不逺宜革而弗遵且二政分權尠不及禍周有子頽之釁鄭有叔叚之難此皆由寵之不道所以亂國害親惟陛下覽之虎不從太子詹事孫珍問侍中崔約曰吾患目疾何方療之約素狎珍戯之曰溺中則愈珍曰目何可溺約曰卿目睕睕正耐溺中珍恨之以白宣宣諸子中最胡状目深聞之大怒誅約父子珍有寵于宣頗豫朝政自誅約之後公卿已下憚之側目虎子義陽公鑒時鎮關中役煩賦重失關右之和其友李松勸鑒文武有長髪者抜為冠纓餘以給宫人長史取髪白之虎大怒以其右僕射張離為征西左長史龍驤将軍雍州刺史以察之信然徵鑒還鄴收松下廷尉以石苞代鎭長安發雍洛秦并州十六萬人城長安未央宫虎性既好獵其後體重不能跨鞍乃造獵車千乗轅長三丈髙一丈八尺罝髙一丈七尺格獸車四十乗立三級行樓二層於其上尅期将校獵自靈昌津南至滎陽東極陽都使御史監察其中禽獸有犯者罪至大辟御史因之擅作威福百姓有羙女好牛馬者求之不得便誣以犯獸論死者百餘家海岱河濟間人無寧志矣又發諸州二十六萬人修洛陽宫發百姓牛二萬餘頭配朔州牧官增置女官二十四等東宫十二等諸公侯七十餘國皆為置女官九等先是大發百姓女二十已下十三已上三萬餘人為三等之第以分配之郡縣要媚其㫖務於羙淑奪人婦者九千餘人百姓妻有羙色豪勢因而脅之率多自殺石宣及諸公又私令采發者亦垂一萬總㑹鄴宫虎臨軒簡第諸女大悦封使者十二人皆為列侯自初發至鄴誅殺其夫及奪而遣之縊死者三千餘人荆楚揚徐間流叛畧盡宰守坐不能綏懐下獄誅者五十餘人金紫光祿大夫逯明因侍切諌虎大怒遣龍騰拉而殺之自是朝臣杜口相招為禄仕而已虎常以女騎一千為鹵簿皆著紫綸巾熟錦袴金銀鏤帶五文織成鞾游于戲馬觀觀上安詔書五色紙在木鳯之口鹿盧廻轉状若飛翔焉遣涼州刺史麻秋等伐張重華尚書朱軌與中黄門嚴生不協㑹大雨霖道路䧟滯不通生因而譖軌不修道又訕謗朝政虎遂殺之於是立私論之條偶語之律聽吏告其君奴告其主威刑日濫公卿已下朝㑹以目吉凶之問自此而絶軌之囚也冠軍苻洪上疏為之申理且乞止長安洛陽作徒及休宫女辭㫖訐直虎省之不悦憚其彊但寝而不納弗之罪也乃停二京作役焉永和三年虎親耕籍田于其桑梓苑其妻杜氏嗣先蠶于近郊遂如襄國謁勒墓以中書監石寧為征西将軍率并司州兵二萬餘人為麻秋等後繼張重華将宋秦等率户二萬来降河湟間氐羌十餘萬落與張璩相首尾麻秋憚之不進重華金城太守張沖又以郡降石寜麻秋等次曲栁劉寧王擢進攻始興武街重華将楊康等與寜戰于沙阜寜敗績乃引還金城王擢克武街執重華護軍曹權胡宣徙七千餘户于雍州虎又以孫伏都為征西将軍與麻秋率歩騎三萬長驅濟河且城長最重華大懼遣将謝艾逆擊敗之秋退歸金城勒及虎並貪而無禮既王有十州之城金帛珠玉及外國珍竒異貨不可勝紀而猶以為不足曩代帝王及先賢陵墓靡不發掘而取其寳貨焉邯鄲城西石子堈上有趙簡子墓至是虎令發之初得炭深丈餘次得木版厚一尺積版厚八尺乃及泉其水清泠非常作絞車以牛皮囊汲之月餘而水不盡不可發而止又使掘秦始皇冡取銅柱鑄以為器時沙門吳進言于虎曰胡運將衰晉當復興宜苦役晉人以厭其氣虎於是使尚書張羣發近郡男女十六萬車十萬乗運土築華林苑及長墻于鄴北廣長數十里趙攬申鍾石璞等上疏陳天文錯亂蒼生凋弊及因引見又面諫辭㫖甚切虎大怒曰牆朝成夕没吾無恨矣乃促張羣以燭夜作起三觀四門三門通漳水皆為鐵扉暴風大雨死者數萬人揚州送黄鵠雛五頸長一丈聲聞十餘里泛之于元武池郡國前後送蒼麟十六白鹿七虎命司虞張曷柱調之以駕芝葢列于充庭之乗鑿北城引水于華林園城崩壓死者百餘人命石宣祈于山川因而游獵乗大輅羽葆華葢建天子旌旗十有六軍戎卒十八萬出自金明門虎從其後宫升陵霄觀望之笑曰我家父子如是自非天崩地陷當復何愁但抱子弄孫日為樂耳宣既馳逐無厭所在陳列行宫四面各以百里為度驅圍禽獸皆暮集其所文武跪立圍守重行烽炬星羅光燭如晝命勁騎百餘馳射其中宣與嬖姬顯徳羙人乗輦觀之嬉娛忘反獸殫乃止其有禽獸奔逸當之者坐有爵者奪馬歩驅一日無爵者鞭之一百峻制嚴刑文武戰慄士卒饑凍而死者萬有餘人宣弓馬衣食皆號為御有亂其間者以冒禁罪罪之所過三州十五郡資儲靡有孑遺虎復命石韜亦如之出自幷州游于秦晉宣素惡韜寵是行也嫉之彌甚宦者趙生得幸于宣而無寵于韜微勸宣除之於是相圖之計起矣麻秋又襲張重華将張瑁於河峡敗之斬首三千餘級枹罕護軍李逵率衆七千降于虎自河已南氐羌皆降石韜起堂于太尉府號曰宣光殿梁長九丈宣視而大怒斬匠截梁而去韜怒増之十丈宣聞之恚甚謂所幸楊杯牟成曰韜凶豎悖逆敢違我如是汝能殺之者吾入西宫當盡以韜之國邑分封汝等韜既死主上必親臨䘮因行大事蔑不濟矣杯等許諾時東南有黄黒雲大如數畆稍分為三状若匹布東西經天色黒而青酉時貫日日沒後分為七道每相去數十丈間有白雲如魚鱗子時乃滅韜素解天文見而惡之顧謂左右曰此變不小當有刺客起于京師不知誰定當之是夜韜讌其寮屬于東明觀樂奏酒酣愀然長歎曰人居世無常别易㑹難各付一杯開意為吾飲令必醉知後㑹復何期而不飲乎因泫然流涕左右莫不歔欷因宿于佛精舍宣使楊杯牟皮牟成趙生等緣獼猴梯而入殺韜置其刀箭而去旦宣奏之虎哀驚氣絶久之方蘇将出臨之其司空李農諫曰害秦公者恐在蕭牆之内慮生非常不可以出虎乃止嚴兵發哀于太武殿宣乗素車從千人臨韜喪不哭直言呵呵使舉衾看尸大笑而去收大将軍記室參軍鄭靖尹武等将委之以罪虎疑宣之害韜也謀召之懼其不入乃偽言其母哀過危惙宣不虞己之見疑也入朝中宫因而止之建興人史科告稱韜死夜宿東宫長上楊杯家杯夜與五人從外来相與語曰大事已定但願大家老夀吾等何患不富貴語訖便入科寝暗中杯不見也科尋出逃匿俄而杯與二人出求科不得杯曰宿客聞人向語當殺之斷口舌今而得去作大事矣科踰牆獲免虎馳使收之獲楊杯牟皮趙生等杯皮尋皆亡去執趙生而詰之生具首服虎悲怒彌甚幽宣於席庫以鐵環穿其頷而鏁之作數斗木槽和羮飯以䐗狗法食之取害韜刀箭舐其血哀號震動宫殿積柴鄴北樹摽於其上摽末置鹿盧穿之以繩倚梯柴積送宣於摽所使韜所親宦者郝稚劉覇㧞其髪抽其舌牽之登梯上於柴積郝稚以繩貫其頷鹿盧絞上劉覇斷其手足斫眼潰腹如韜之傷四面縱火煙炎際天虎從昭儀已下數千登中臺以觀之火滅取灰分置諸門交道中殺其妻子九人宣小子年數嵗虎甚愛之抱之而泣兒曰非兒罪虎欲赦之其大臣不聼遂於抱中取而戮之兒猶挽虎衣而大呌時人莫不為之流涕虎因此發病又誅其四率已下三百人宦者五十人皆車裂節解棄之漳水洿其東宫養䐗牛東宫衛士十餘萬人皆謫戌涼州先是散騎常侍趙攬言於虎曰中宫将有變宜防之及宣之殺韜也虎疑其知而不告亦誅之廢宣母杜氏為庶人貴嬪栁氏尚書耆之女也以才色特幸坐其二兄有寵于宣亦殺之虎追其姿色復納耆少女于華林園虎議立太子其太尉張舉進曰燕公斌彭城公遵並有武藝文徳陛下神齒已衰四海未一請擇二公而樹之初戎昭張豺之破上邽也獲劉曜幼女年十二有殊色虎得而嬖之生子世封齊公至是豺以虎年長多疾規立世為嗣劉當為太后已得輔政説虎曰陛下再立儲宫皆出自倡賤是以禍亂相尋今宜擇母貴子孝者立之虎曰卿且勿言吾知太子處矣又議于東堂虎曰吾欲以純灰三斛洗吾腹腸穢惡故生凶子兒年二十餘便欲殺公今世方十嵗比其二十吾已老矣於是與張舉李農定議勅公卿上書請立世大司農曹莫不署名虎使張豺問其故莫頓首曰天下業重不宜立少是以不敢署也虎曰莫忠臣也然未逹朕意張舉李農知吾心矣其令諭之遂立世為皇太子劉氏為皇后虎召太常條攸光禄勲杜嘏謂之曰煩卿傅太子實希改轍吾之相託卿宜明之署攸太傅嘏為少傅虎時疾瘳以永和五年僭即皇帝位于南郊大赦境内建元曰太寜百官增位一等諸子進爵郡王以尚書張良為右僕射故東宫謫卒髙力等萬餘人當戍涼州行逹雍城既不在赦例又勑雍州刺史張茂送之茂皆奪其馬令步推鹿車致糧戍所髙力督定陽梁犢等因衆心之怨謀起兵東還隂令胡人頡獨鹿微告戍者戍者皆踊抃大呼梁犢乃自稱晉征東大将軍率衆攻陷下辦逼張茂為大都督大司馬載以軺車安西劉寜自安定擊之大敗而還秦雍間城戌無不摧陷斬二千石長史長驅而東髙力等皆多力善射一當十餘人雖無兵甲所在掠百姓大斧施一丈柯攻戰若神所向崩潰戍卒皆隨之比至長安衆已十萬其樂平王石苞時鎭長安盡鋭距之一戰而敗犢遂東出潼關進如洛川虎以李農為大都督行大将軍事統衛軍張賀度征西張良征虜石閔等率步騎十萬討之戰于新安農師不利又戰于洛陽農師又敗乃退壁成臯犢東掠滎陽陳留諸郡虎大懼以燕王石斌為大都督中外諸軍事率精騎一萬統姚弋仲苻洪等擊犢于滎陽東大破之斬犢首而還討其餘黨盡滅之俄而晉将軍王龕㧞其沛郡始平人馬勗起兵於洛氏葛谷自稱将軍石苞攻滅之誅三千餘家時熒惑犯積尸又犯昴月及熒惑北犯河鼓未㡬虎疾甚以石遵為大将軍鎭關右石斌為丞相錄尚書事張豺為鎭衛大将軍領軍将軍吏部尚書並受遺輔政劉氏懼斌之輔政也害世與張豺謀誅之斌時在襄國乃遣使詐斌曰主上患已漸損王須獵者可小停也斌性好酒耽獵遂游畋縱飲劉氏矯命稱斌無忠孝之心免斌官以王歸第使張豺弟雄率龍騰五百人守之石遵自幽州至鄴勑朝堂受拜配禁兵三萬遣之遵慟泣而去是日虎疾小瘳問曰遵至未左右答言久已去矣虎曰恨不見之虎臨於西閣龍騰将軍中郎二百餘人列拜于前虎曰何所求也皆言聖躬不和宜令燕王入宿衛典兵馬或言乞為皇太子虎不知斌之廢也責曰燕王不在内邪呼来左右言王酒病不能入虎曰促持輦迎之當付其璽綬亦竟無行者尋惽眩而入張豺使弟雄等矯虎命殺斌劉氏又矯命以豺為太保都督中外諸軍錄尚書事加千兵百騎一依霍光輔漢故事侍中徐統歎曰禍将作矣吾無為豫之乃仰藥而死俄而虎亦死虎始以咸康元年僭位至此太和六年凡在位十五嵗於是世即偽位尊劉氏為皇太后臨朝進張豺為丞相豺請石遵石鑒為左右丞相以慰其心劉氏從之豺與張舉謀誅李農而舉與農素善以豺謀告之農懼率騎百餘奔廣宗率乞活數萬家保于上白劉氏使張舉等統宿衛精卒圍之豺以張離為鎭軍大将軍監中外諸軍事司𨽻校尉為己之副鄴中羣盗大起迭相刼掠石遵聞虎之死屯于河内姚弋仲苻洪石閔劉寜及武衛王鸞寧西王午石榮王鐵立義将軍叚勤等既平秦洛班師而歸遇遵于李城説遵曰殿下長而且賢先帝亦有意于殿下矣但以末年惽惑為張豺所誤今上白相持未下京師宿衛空虚若聲張豺之罪鼔行而討之孰不倒戈開門而迎殿下者邪遵從之洛州刺史劉國等亦率洛陽之衆至于李城遵檄至鄴張豺大懼馳召上白之軍遵次于蕩隂戎卒九萬石閔為前鋒豺将出距之耆舊羯士皆曰天子兒来奔喪吾當出迎之不能為張豺戍也踰城而出豺斬之不能止張離率龍騰二千斬關迎遵劉氏懼引張豺入對之悲哭曰先帝梓宫未殯而禍難繁興今皇嗣冲㓜託之于将軍将軍何以匡濟邪加遵重官可以弭不豺惶怖失守無復籌計但言唯唯劉氏以遵為丞相領大司馬大都督中外諸軍録尚書事加黄鉞九錫增封十郡委以阿衡之任遵至安陽亭張豺懼而出迎遵命執之於是貫甲曜兵入自鳯陽門升于太武前殿擗踴盡哀退如東閣斬張豺于平樂市夷其三族假劉氏令曰嗣子幼冲先帝私恩所授皇業至重非所克堪其以遵嗣位遵偽讓至于再三羣臣敦勸乃受之僭即尊位于太武前殿大赦殊死已下罷上白圍封世為譙王邑萬戸待以不臣之禮廢劉氏為太妃尋皆殺之世凡立三十三日於是李農歸請罪遵復其位待之如初尊其母鄭氏為皇太后其妻張氏為皇后以石斌子衍為皇太子石鑒為侍中石冲為太保石苞為大司馬石琨為大将軍石閔為中外諸軍事輔國大将軍錄尚書事輔政暴風抜樹震雷雨雹大如盂升太武暉華殿災諸門觀閣蕩然其乗輿服御燒者大半光燄照天金石皆盡火月餘乃滅雨血周遍鄴城石冲時鎭于薊聞遵殺世而自立乃謂其寮佐曰世受先帝之命遵輙廢殺罪逆莫大其勑内外戒嚴孤将親討之於是留寧北沐堅戍幽州帥衆五萬自薊討遵傳檄燕趙所在雲集比及常山衆十餘萬次于苑鄉遇遵赦書謂左右曰吾弟一也死者不可復追何為復相殘乎吾将歸矣其将陳暹進曰彭城篡弑自尊為罪大矣王雖北斾臣将南轅平京師擒彭城然後奉迎大駕冲從之遵馳遣王擢以書喻冲冲弗聽遵假石閔黄鉞金鉦與李農等率精卒十萬討之戰于平棘冲師大敗獲冲于元氏賜死坑其士卒三萬餘人始葬虎號其墓為顯原陵偽諡武皇帝廟號太祖遵揚州刺史王浹以淮南歸順晉西中郎将陳逵進據夀春征北将軍禇裒帥師伐遵次于下邳遵以李農為南討大都督率騎二萬来距裒不能進退屯廣陵陳逵聞之懼遂焚夀春積聚毁城而還石苞時鎭長安謀帥關中之衆攻鄴左長史石光司馬曹曜等固諫苞怒誅光等百餘人苞性貪而無謀雍州豪右知其無成並遣使告晉梁州刺史司馬勲勲於是率衆赴之壁于懸鉤去長安二百餘里使治中劉煥攻京兆太守劉秀離斬之三輔豪右多殺其令長擁三十餘壁有衆五萬以應勲苞輟攻鄴之謀使麻秋姚國等率騎距勲遵遣車騎王朗率精騎二萬外以討勲為名因劫苞送之于鄴勲又為朗所距釋懸鈎抜宛城殺遵南陽太守袁景而還初遵之發李城也謂石閔曰努力事成以爾為儲貳既而立衍閔甚失望自以勲髙一時規專朝政遵忌而不能任閔既為都督總内外兵權乃懐撫殿中将士及故東宫髙力萬餘人皆奏為殿中員外将軍爵關外侯賜以宫女樹已之恩遵弗之猜也而更題名善惡以挫抑之衆咸怨矣而又納中書令孟凖左衛将軍王鸞之計頗疑憚於閔稍奪兵權閔益有恨色凖等咸勸誅之遵召石鑒等入議于其太后鄭氏之前皆請誅之鄭氏曰李城廻師無棘奴豈有今日小驕縱之不可便殺也鑒出遣宦者楊環馳以告閔閔遂刼李農及右衛王基密謀廢遵使将軍蘇亥周成率甲士三十執遵于如意觀遵時方與婦人彈碁問成等曰反者誰也成曰義陽王鑒當立遵曰我尚如是汝等立鑒復能㡬時乃殺之于琨華殿誅鄭氏及其太子衍上光禄張斐中書令孟凖左衛王鸞等遵凡在位一百八十三日鑒乃僭位大赦殊死已下以石閔為大将軍封武徳王李農為大司馬並錄尚書事郎闓為司空秦州刺史劉羣為尚書左僕射侍中盧諶為中書監鑒使石苞及中書令李松殿中将軍張才等夜誅閔農於琨華殿不克禁中擾亂鑒恐閔為變偽若不知者夜斬松才於西中華門并誅石苞時石祗在襄國與姚弋仲苻洪等通和連兵檄誅閔農鑒遣石琨為大都督與張舉及侍中呼延盛率步騎七萬分討祗等中領軍石成侍中石啓前河東太守石暉謀誅閔農閔農殺之龍驤孫伏都劉銖等結羯士三千伏于胡天亦欲誅閔等時鑒在中臺伏都率三十餘人将升臺挟鑒以攻之鑒見伏都毁閣道臨問其故伏都曰李農等反已在東掖門臣嚴率衛士謹先啓知鑒曰卿是功臣好為官陳力朕從臺觀卿勿慮無報也於是伏都及銖率衆攻閔農不克屯於鳯陽門閔農率衆數千毁金明門而入鑒懼閔之誅已也馳招閔農開門内之謂曰孫伏都反卿宜速討之閔農攻斬伏都等自鳳陽至琨華横尸相枕流血成渠宣令内外六夷敢稱兵杖者斬之胡人或斬關或踰城而出者不可勝數使尚書王簡少府王鬱帥衆數千守鑒于御龍觀懸食給之令城内曰與官同心者住不同心者各任所之勑城門不復相禁於是趙人百里内悉入城胡羯去者塡門閔知胡之不為己用也班令内外趙人斬一胡首送鳯陽門者文官進位三等武職悉拜牙門一日之中斬首數萬閔躬率趙人誅諸胡羯無貴賤男女少長皆斬之死者二十餘萬尸諸城外悉為野犬豺狼所食屯據四方者所在承閔書誅之于時高鼻多須至有濫死者半太宰趙鹿太尉張舉中軍張春光禄石岳撫軍石寜武衛張季及諸公侯卿校龍騰等萬餘人出奔襄國石琨奔據冀州撫軍張沉屯滏口張賀度據石瀆建義叚勤據黎陽寜南楊羣屯桑壁劉國據陽城叚龕據陳留姚弋仲據混橋苻洪據枋頭衆各數萬王朗麻秋自長安奔于洛陽秋承閔書誅朗部胡千餘朗奔于襄國麻秋帥衆奔于苻洪石琨及張舉王朗率衆七萬伐鄴石閔率衆千餘距之城北閔執兩刃矛馳騎擊之皆應鋒推潰斬級三千琨等大敗遂歸于冀州閔與李農率騎三萬討張賀度于石瀆鑒密遣宦者齎書召張沉等使承虚襲鄴宦者以告閔農閔農馳還廢鑒殺之誅虎孫三十八人盡殪石氏鑒在位一百三日虎小男混永和八年将妻妾數人奔京師勑收付廷尉俄而斬之於建康市虎十三子五人為冉閔所殺八人自相殘害混至此又死初讖言滅石者陵尋而石閔徙封蘭陵公虎惡之改蘭陵為武興郡至是終為閔所滅始勒以成帝咸和三年僭立二主四子凡二十三年以穆帝永和五年滅張賔字孟孫趙郡中邱人也父瑶中山太守賔少好學博涉經史不為章句闊逹有大節常謂昆弟曰吾自言智算鑒識不後子房但不遇髙祖耳為中邱王帳下都督非其好也病免及永嘉大亂石勒為劉淵輔漢将軍與諸将下山東賔謂所親曰吾歴觀諸将多矣獨胡将軍可與共成大事乃提劒軍門大呼請見勒亦未之竒也後漸進規模乃異之引為謀主機不虚發算無遺䇿成勒之基業皆賔之勲也又為右長史大執法封濮陽侯任遇優顯寵冠當時而謙虚敬愼開襟下士士無賢愚造之者莫不得盡其情焉肅清百寮屏絶私昵入則格言出則歸羙勒甚重之每朝常為之正容貌簡辭令呼曰右侯而不名之勒朝莫與為比也及卒勒親臨哭之哀慟左右贈散騎常侍右光禄大夫儀同三司諡曰景将葬送于正陽門望之流涕顧左右曰天欲不成吾事邪何奪吾右侯之早也程遐代為右長史勒每與遐議有所不合輙歎曰右侯捨我去令我與此輩共事豈非酷乎因流涕彌日魏冉閔字永曾小字棘奴虎之養孫也父瞻字𢎞武夲姓冉名良魏郡内黄人也其先漢黎陽騎都督累世牙門勒破陳午獲瞻時年十二命虎子之驍猛多力攻戰無前歴位左積射将軍西華侯閔幼而果鋭虎撫之如孫及長身長八尺善謀䇿勇力絶人拜建節将軍徙封修成侯歴位北中郎将游擊将軍虎之敗於昌黎閔軍獨全由此功名大顯及敗梁犢之後威聲彌振胡夏宿将莫不憚之永和六年殺石鑒其司徒申鍾司空郎闓等四十八人上尊號于閔閔固讓李農農以死固請於是僭即皇帝位于南郊大赦改元曰永興國號大魏復姓冉氏追尊其祖隆元皇帝考瞻烈祖髙皇帝尊母王氏為皇太后立妻董氏為皇后子智為皇太子以李農為太宰領太尉錄尚書事封齊王農諸子皆封為縣公封其子允眀裕皆為王文武進位三等封爵有差遣使者持節赦諸屯結皆不從石祗聞鑒死僭稱尊號于襄國諸六夷據州郡擁兵者皆應之閔遣使臨江告晉曰胡逆亂中原今已誅之若能共討者可遣軍来也朝廷不荅閔誅李農及其三子并尚書令王謨侍中王衍中常侍嚴震趙昇等晉廬江太守袁眞攻其合肥執南蠻校尉桑坦遷其百姓而還石祗遣其相國石琨率衆十萬伐鄴進據邯鄲祗鎭南劉國自繁陽㑹琨閔大敗琨于邯鄲死者萬餘劉國還屯繁陽苻健自枋頭入關張賀度叚勤與劉國靳豚㑹于昌城将攻鄴閔遣尚書左僕射劉羣為行臺都督使其将王泰崔通周成等帥步騎十二萬次于黄城閔躬統精卒八萬繼之戰于蒼亭賀度等大敗死者二萬八千追斬靳豚于隂安鄉盡俘其衆振旅而歸戎卒三十餘萬旌旗鐘鼔緜亘百餘里雖石氏之盛無以過之閔至自蒼亭行飲至之禮清定九流準才授任儒學後門多䝉顯進于時翕然方之為魏晉之初閔率步騎十萬攻石祗于襄國署其子太原王允為大單于驃騎大将軍以降胡一千配為麾下光禄大夫韋謏啟諫甚切閔覽之大怒誅謏及其子孫閔攻襄國百餘日為土山地道築室反耕祗大懼去皇帝之號稱趙王遣使詣慕容儁姚弋仲以乞師㑹石琨自冀州援祗弋仲復遣其子襄率騎三萬八千至自滆頭儁遣将軍悦綰率甲卒三萬自龍城三方勁卒合十餘萬閔遣車騎胡睦距襄于長蘆将軍孫威候琨于黄邱皆為敵所敗士卒畧盡睦威單騎而還琨等軍且至冉閔将出擊之衛将軍王泰諫曰窮㓂固迷希望外援今彊救雲集欲吾出戰腹背擊我宜固壘勿出觀勢而動以挫其謀今陛下親戎如失萬全大事去矣請愼無出臣請率諸将為陛下滅之閔将從之道士法饒進曰太白經昴當殺胡王一戰百尅不可失也閔攘袂大言曰吾戰决矣敢諫者斬於是盡衆出戰姚襄悦綰石琨等三靣攻之祗衝其後閔師大敗閔潛于襄國行宫與十餘騎奔鄴降胡栗特康等執冉允及左僕射劉琦等送于袛盡殺之司空石璞尚書令徐機車騎胡睦侍中李綝中書監盧諶少府王鬱尚書劉欽劉休等及諸将士死者十餘萬人於是人物殱矣賊盗蜂起司冀大饑人相食自虎末年而閔盡散倉庫以樹私恩與羌胡相攻無月不戰青雍幽荆州徙戸及諸氐羌胡蠻數百餘萬各還夲土道路交錯互相殺掠且饑疫死亡其能逹者十有二三諸夏紛亂無復農者閔悔之誅法饒父子支解之贈韋謏大司徒石祗使劉顯帥衆七萬攻鄴時閔潛還莫有知者内外兇兇皆謂閔已沒矣射聲校尉張艾勸閔親郊以安衆心閔從之訛言乃止劉顯次于明光宫去鄴二十三里閔懼召衛将軍王泰議之泰恚其謀之不從辭以瘡甚閔親臨問之固稱疾篤閔怒還宫顧謂左右曰巴奴乃公豈假汝為命邪要将先滅羣胡却斬王泰於是盡衆而戰大敗顯軍追奔及于陽平斬首三萬餘級顯懼密使請降求殺祗為效閔振旅而歸㑹有告王泰招集秦人将奔關中閔怒誅泰夷其三族劉顯果殺祗及其太宰趙鹿等十餘人傳首于鄴送質請命驃騎石寜奔于柏人閔命焚祗首于通衢閔兖州刺史劉啓以鄄城歸順劉顯復率衆伐鄴閔擊敗之還稱尊號于襄國閔徐州刺史周成兖州刺史魏統豫州牧冉遇荆州刺史樂𢎞皆以城歸順平南髙崇征虜吕護執洛州刺史鄭系以三河歸順慕容彪攻陷中山殺閔寜北白同幽州刺史劉凖降于慕容儁時有雲黄赤色起東北長百餘丈一白鳥從雲間西南去占者惡之劉顯率衆伐常山太守蘇亥告難于閔閔留其大将軍蒋幹等輔其太子智守鄴親率騎八千救之顯所署大司馬清河王寜以棗彊降于閔收其餘衆擊顯敗之追奔及于襄國顯大将曹伏駒開門為應遂入襄國誅顯及其公卿已下百餘人焚襄國宫室遷其百姓于鄴顯領軍范路帥衆千餘斬關奔于枋頭時慕容儁已克幽薊畧地至于冀州閔帥騎距之與慕容恪相遇於魏昌城閔大将軍董閏車騎張温言於閔曰鮮卑乗勝氣勁不可當也請避之以溢其氣然後濟師以擊之可以捷也閔怒曰吾成師以出将平幽州斬慕容儁今遇恪而避之人将侮我矣乃與恪遇十戰皆敗之恪乃以鐵鏁連馬簡善射鮮卑勇而無剛者五千方陣而前閔所乗赤馬曰朱龍日行千里左杖䨇刄矛右執鉤㦸順風擊之斬鮮卑三百餘級俄而燕騎大至圍之數周閔衆寡不敵躍馬潰圍東走行二十餘里馬無故而死為恪所擒及董閏張温等送之于薊儁立閔而問之曰汝奴僕下才何自妄稱天子閔曰天下大亂爾曹夷人人靣獸心尚欲篡逆我一時英雄何為不可作帝王邪儁怒鞭之三百送于龍城告廆皝廟遣慕容評率衆圍鄴劉寜及弟崇帥胡騎三千奔于晉陽蘇亥棄常山奔于新興鄴中饑人相食虎時宫人被食畧盡冉智尚幼蒋幹遣侍中繆嵩詹事劉猗奉表歸順且乞師于晉濮陽太守戴施自倉垣次于棘津止猗不聽進責其傳國璽猗使嵩還鄴復命幹沉吟未决施乃率壮士百餘人入鄴助守三臺譎之曰且出璽付我今凶㓂在外道路不通未敢送也須得璽當馳白天子耳天子聞璽已在吾處信卿至誠必遣軍糧厚相救餉幹以為然乃出璽付之施宣言使督護何融迎糧隂令懐璽送于京師長水校尉馬願龍驤田香開門降評施融蒋幹懸縋而下奔於倉垣評送閔妻董氏太子智太尉申鍾司空條攸中書監聶熊司𨽻校尉籍羆中書令李垣及諸王公卿士于薊尚書令王簡左僕射張乾右僕射郎肅自殺儁送閔既至龍城斬于遏陘山山左右七里草木悉枯蝗蟲大起五月不雨至于十二月儁遣使者祀之諡曰武悼天王其日大雪是嵗太和八年也通志卷一百八十七
