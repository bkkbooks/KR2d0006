body:
  text: 通志卷三十六宋右迪功郎鄭樵漁仲撰七音略第一七音序天地之大其用在坎離人之為靈其用在耳目人與禽獸視聼一也聖人制律所以導耳之聰制字所以擴目之明耳目根於心聰明發於外上智下愚自此分矣雖曰皇頡制字伶倫制律歷代相承未聞其書漢人課籕隸始為字書以通文字之學江左競風騷始為韻書以通聲音之學然漢儒識文字而不識子母則失制字之旨江左之儒識四聲而不識七音則失立韻之源獨體為文合體為字漢儒知以説文解字而不知文有子母生字為母從母為子子母不分所以失制字之旨四聲為經七音為緯江左之儒知縱有平上去入為四聲而不知衡有宫商角徵羽半徵半商為七音縱成經衡成緯經緯不交所以失立韻之源七音之韻起自西域流入諸夏梵僧欲以其教傳之天下故為此書雖重百譯之逺一字不通之處而音義可傳華僧從而定之以三十六為之母重輕清濁不失其倫天地萬物之音備於此矣雖鶴唳風聲雞鳴狗吠雷霆驚天蚊虻過耳皆可譯也況於人言乎所以日月照處甘傳梵書者為有七音之圖以通百譯之義也今宣尼之書自中國而東則朝鮮西則涼夏南則交址北則朔易皆吾故封也故封之外其書不通何瞿曇之書能入諸夏而宣尼之書不能至跋提河聲音之道有障閡耳此後學之罪也舟車可通則文義可及今舟車所通而文義所不及者何哉臣今取七音編而為志庶使學者盡傳其學然後能周宣宣尼之書以及人面之域所謂用夏變夷當自此始臣謹按開皇二年詔求知音之士參定音樂時有柱國沛公鄭譯獨得其義而為議曰考尋樂府鍾石律吕皆有宫商角徵羽變宫變徵之名七聲之內三聲乖應每加詢訪終莫能通先是周武帝之時有龜兹人曰蘇祗婆從突厥皇后入國善胡琵琶聼其所奏一均之中間有七聲問之則曰父在西域號為知音世相傳習調有七種以其七調校之七聲冥若合符一曰娑陀力華言平聲即宫聲也二曰雞識華言長聲即南呂聲也三曰沙識華言質直聲即角聲也四曰沙侯加濫華言應聲即變徵聲也五曰沙臘華言應和聲即徵聲也六曰般贍華言五聲即羽聲也七曰俟利箑華言斛牛聲即變宫也譯因習而彈之始得七聲之正然其就此七調又有五旦之名旦作七調以華譯之旦即均也譯遂因琵琶更立七均合成十二應十二律律有七音音立一調故成七調十二律合八十四調旋轉相交盡皆和合仍以其聲考校太樂鍾律乖戾不可勝數譯為是著書二十餘篇太子洗馬蘇夔駁之以五音所從來久矣不言有變宫變徵七調之作實所未聞譯又引古以為據周有七音之律漢有七始之志時何妥以舊學牛𢎞以巨儒不能精通同加沮抑遂使隋人之耳不聞七調之音臣又按唐楊收與安涗論琴五絃之外復益二絃因言七聲之義西京諸儒惑圜鍾函鍾之説故其郊廟樂惟用黃鍾一均章帝時太常丞鮑業始旋十二宫夫旋宫以七聲為均均言韻也古無韻字猶言一韻聲也宫商角徵羽為五聲加少宫少徵為七聲始得相旋為宫之意琴者樂之宗也韻者聲之夲也皆主於七名之曰韻者蓋取均聲也臣初得七音韻鑑一唱而三歎胡僧有此妙義而儒者未之聞及乎研究制字考證諧聲然後知皇頡史籕之書已具七音之作先儒不得其傳耳今作諧聲圖所以明古人制字通七音之妙又述內外轉圖所以明胡僧立韻得經緯之全釋氏以參禪為大悟通音為小悟雖七音一呼而聚四聲不召自來此其粗淺者耳至於紐躡杳冥盤旋寥廓非心樂洞融天籟通乎造化者不能造其閫字書主於母必母權子而行然後能别形中之聲韻書主於子必子權母而行然後能别聲中之形所以臣更作字書以母為主亦更作韻書以子為主今兹內外轉圖用以别音聲而非所以主子母也諧聲制字六圖諧聲者六書之一書也凡諧聲之道有同聲者則取同聲而諧無同聲者則取協聲而諧無協聲者則取正音而諧無正音者則取旁音而諧所謂聲者五聲也音者七音也制字之夲或取聲以成字或取音以成字不可備舉今取其要以證所諧兹所不載觸類而長正聲協聲同諧圖第一音諧聲不諧圖第三通志卷三十六
