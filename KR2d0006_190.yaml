body:
  text: 通志卷一百六十六宋右迪功郎鄭樵漁仲撰忠義傳第一晉史始立忠義傳後魏曰節義隋曰誠節今總曰忠義魏魏不立此傳今取典韋等四人以為編典韋龎德龎淯母娥閻溫張恭就恭子晉嵇紹從子含王豹劉沉麴允焦嵩賈渾王育韋忠辛勉族弟賔劉敏元周該叔父級桓雄韓階周﨑易雄樂道融虞悝沈徑吉挹祖朗王諒宋矩車濟丁穆辛恭靖羅企生張褘宋宋不立此傳以龔頴張進之卜天與三人附孝義今析置此仍取袁淑袁粲二人冠之于首袁淑袁粲子最祖莫嗣龔頴張進之卜天與子伯宗欽弟天生朱道陳滿齊齊不立此傳以邱冠先附孝義今析置此又取張沖一傳附于其下丘冠先張沖房僧寄梁梁不立此傳今檢張嵊等四人為編張嵊江子一沈浚韋粲陳陳不立此傳今以魯廣達充之魯廣達楊孝辨後魏于簡假進汲固王元威婁提劉渴侯朱長生于提眺清劉侯仁王榮世鄧元興胡小彪孫道登宗靈恩宗女郭琰沓龍超乙速孤佛保周周書有孝節傳以李棠杜叔毗為編今析杜叔毗列在孝友復取桞檜一人與李棠置於此李棠桞檜隋劉𢎞遊元馮慈明張須陀楊善會獨孤盛盧楚元文都劉子翊堯君素陳孝意張季珣幼季珣弟仲琰仲琰弟琮杜松贇魏魏不立此傳今取典韋等四人以為編典韋陳留已吾人也形貌魁梧旅力過人有志節任俠襄邑劉氏與睢陽李永為讎韋為報之永故富春長備衛甚謹韋乘車載雞酒偽為候者門開懷匕首入殺永并殺其妻徐出取車上刀戟步出永居近市一市驚駭追者數百莫敢近行四五里遇其伴轉戰得脫由是為豪傑所識初平中張邈舉義兵韋為士屬司馬趙寵牙門旗長大人莫能勝韋一手建之寵異其才力後屬夏侯惇數斬首有功拜司馬太祖討吕布於濮陽布有别屯在濮陽西四五十里太祖夜襲其屯比明破之未及還會布救兵至三面捍戰時布身自搏戰自旦至日昳數十合相持急太祖募陷陳韋先占將應募者數千人皆重衣兩鎧棄楯但持長矛撩戟時西面又急韋進當之賊弓弩亂發矢至如雨韋不視謂等人曰虜來十步乃白之等人曰十步矣又曰五步乃白等人懼疾言虜至矣韋手持十餘戟大呼起所抵無不應手倒者布衆退會日暮太祖乃得引去拜韋都尉引置左右將親兵數百人常繞太祖帳韋既壯武其所將皆選卒每戰鬬韋先登陷陳遷為校尉性忠至謹重常晝立侍終日夜宿帳左右稀歸私寢好酒食飲噉兼人每賜食於前大飲長啜左右相屬數人益乃供太祖壯之韋好持大雙戟與長刀等軍中為之語曰帳下壯士有典君提一雙戟八十斤太祖征荆州至宛張繡迎降太祖大悅延繡及其將帥置酒髙會太祖行酒韋持大斧立後刃徑尺太祖所至之前韋輒舉斧目之竟酒繡及其將帥莫敢仰視後十餘日繡反襲太祖營太祖出戰不利輕騎引去韋戰於門中賊不得入兵遂散從他門並入時韋校尚有十餘人皆殊死戰無不一當十賊前後至稍多韋以長戟左右擊之一義入輒十餘矛摧左右死傷者略盡韋被數十創短兵接戰賊前搏之韋雙挾兩賊擊殺之餘賊不敢前韋復突賊殺數人創重發瞋目大罵而死賊乃敢前取其頭傳觀之覆軍就視其軀太祖退往舞隂聞韋死為流涕募間取其喪親自臨哭之遣歸葬襄邑拜子滿為郎中車駕每過常祀以中牢太祖思韋功拜滿為司馬引自近文帝即王位以滿為都尉賜爵關內侯龎德字令明南安狟道人也少為郡吏州從事初平中從馬騰擊反羌叛氐數有功稍遷至校尉建安中太祖討袁談尚於黎陽談遣郭援髙幹等略取河東太祖使鍾繇率關中諸將討之德隨騰子超拒援幹於平陽德為軍鋒進攻援幹大破之親斬援首拜中郎將封都亭侯後張白騎叛於𢎞農德復隨騰征之破白騎於兩殽間每戰常陷陳却敵勇冠騰軍後騰徴為衛尉德留屬超太祖破超於渭南德隨超亡入漢陽保冀城後復隨超奔漢中從張魯太祖定漢中德隨衆降太祖素聞其驍勇拜立義將軍封關門亭侯邑三百户侯音衛開等以宛叛德將所領與曹仁共攻拔宛斬音開遂南屯樊討關侯於樊下諸將以德兄在漢中頗疑之德常曰我受國恩義在效死我欲身自擊之今年我不殺彼彼當殺我後親與之交戰射之中額德常乘白馬蜀軍謂之白馬將軍皆憚之仁使德屯樊北十里會天霖雨十餘日漢水暴溢樊下平地五六丈德與諸將避水隄上侯乘船攻之以大船四面射隄上德乃被甲持弓箭不虛發將軍董衡部曲將董超欲降德皆收斬之自平旦力戰至日過中侯攻益急矢盡短兵接戰德謂督將成何曰吾聞良將不怯死以苟免烈士不毁節以求生今日我死日也戰益怒氣益壯而水浸盛吏士皆降德與麾下將一人伍伯二人彎弓傅矢乘小船欲還仁營水盛船覆失弓矢獨抱船覆水中為侯所得立而不跪侯謂曰卿兄在漢中我欲以卿為將不早降何為德罵侯曰竪子何謂降也魏王帶甲百萬威振天下汝劉備庸才耳豈能敵邪我寧為國家鬼不為賊將也遂為侯所殺太祖聞而悲之為之流涕封其二子為列侯文帝即王位乃遣使就德墓賜諡䇿曰昔先軫喪元王蠋絶脰隕身徇節前代美之惟侯戎昭果毅蹈難成名聲溢當時義髙在昔寡人愍焉諡曰壯侯又賜子會等四人爵關內侯邑各百户會勇烈有父風官至中衛將軍封列侯龎淯字子異酒泉表是人也初以涼州從事守破羌長會武威守張猛反殺刺史邯鄲商猛令曰敢有臨商者死不赦淯聞之棄官奔走號哭喪所訖詣猛門衷匕首欲因見以殺猛猛知其義士勑遣不殺由是以忠烈聞太守徐揖請為主簿後郡人黃昻反圍城淯棄妻子夜踰城出圍告急於張掖敦煌二郡初疑未肯發兵淯欲伏劍二郡感其義遂為興兵軍未至而郡城邑已陷揖死淯乃收斂揖喪送還本郡行服三年太祖聞之辟為掾屬文帝踐阼拜駙馬都尉遷西海太守賜爵關內侯後徴拜中散大夫薨子曾嗣初淯外祖父趙安為同縣李夀所殺淯舅兄弟三人同時病死壽家喜淯母娥為父報讎白日刺殺夀在列女傳閻溫字伯儉天水西城人也以涼州别駕守上邽令馬超亡奔上邽郡人任飬等舉衆迎之溫止之不能禁乃馳還州超復圍州所治冀城甚急州乃遣溫密出告急於夏侯淵賊圍數重溫夜從水中出明日賊見其迹遣人追遮之於顯親界得溫執還詣超超解其縛謂曰今成敗可見足下為孤城請救而執於人手義何所施若從吾言反謂城中東方無救此轉禍為福之計也不然今為戮矣溫偽許之超乃載溫詣城下溫向城大呼曰大軍不過三日至勉之城中皆泣稱萬嵗超怒數之曰足下不為命計邪溫不應時超攻城久不下故徐誘溫冀其改意復謂溫曰城中故人有欲與吾同者不溫又不應遂切責之溫曰夫事君有死無二而卿乃欲令長者出不義之言吾豈茍生者乎超遂殺之先是河右擾亂隔絶不通敦煌太守馬艾卒官府又無丞功曹張恭素有學行郡人推行長史事恩信甚著乃遣子就東詣太祖請太守時酒泉黃華張掖張進各據其郡欲與恭并勢就至酒泉為華所拘執劫以白刃就終不回私與恭疏曰大人率勵敦煌忠義顯然豈以就在困厄之中而替之哉昔樂羊食子李通覆家經國之臣寧懷妻孥邪今大軍垂至但當促兵以掎之耳願不以下流之愛使就有恨於黃壤也恭即遣從弟華攻酒泉沙頭乾齊二縣恭又連兵尋繼華後以為首尾之援别遣鐵騎二百迎吏官屬東緣酒泉北塞徑出張掖北河逢迎太守尹奉於是張進須黃華之助華欲救進西顧恭兵恐急擊其後遂詣金城太守蘇則降就竟平安奉得之官黃初二年下詔褒揚賜恭爵關內侯拜西域戊巳校尉數嵗徴還將授以侍臣之位而以子就代焉恭至燉煌固辭疾篤太和中卒贈執金吾就後為金城太守父子著稱於西州晉嵇紹字延祖魏中散大夫康之子也十嵗而孤事母孝謹以父得罪靖居私門山濤領選啓武帝曰康誥有言父子罪不相及嵇紹賢侔郤缺宜加旌命請為祕書郎帝謂濤曰如卿所言乃堪為丞何但郎也乃發詔徴之起家為祕書丞紹始入洛或謂王戎曰昨於稠人中始見嵇紹昻昻然若野鶴之在雞羣戎曰君復未見其父耳纍遷汝隂太守尚書左僕射裴頠亦深器之每曰使延祖為吏部尚書可使天下無復遺才矣沛國戴晞少有才智與紹從子含相友善時人許以逺致紹以為必不成器晞後為司州主簿以無行被斥州黨稱紹有知人之明轉豫章內史以母憂不之官服闋拜徐州刺史時石崇為都督性雖驕奢而紹將之以道崇甚親敬之後以長子喪去職元康初為給事黃門侍郎時侍中賈謐以外戚之寵年少居位潘嶽杜斌等皆附託焉謐求交於紹紹距而不答及謐誅紹時在省以不阿比凶族封弋陽子遷散騎常侍領國子博士太尉廣陵公陳準薨太常奏諡紹駁曰諡號所以垂之不朽大行受大名細行受細名文武顯於功德幽厲表於暗蔽自頃禮官協情諡不依本準諡為過宜諡曰繆事下太常時雖不從朝廷憚焉趙王倫篡位署為侍中惠帝復阼遂居其職司空張華為倫所誅議者追理其事欲復其爵位紹又駁之曰華歷位內外雖粗有善事然闔棺之責著于逺近兆禍始亂華實為之故鄭討幽公之亂斫子家之棺魯戮隱罪終篇貶翬未忍重戮事已𢎞矣謂不宜復其爵位理其無罪時帝初反正紹又上疏曰臣聞改前轍者則車不傾革往弊者則政不爽太一統於元首百司役於多士故周文興於上成康穆於下也存不忘亡易之善義願陛下無忘金墉大司馬無忘潁上大將軍無忘黃橋則禍亂之萌無由而兆矣齊王冏既輔政驕奢滋甚紹以書切諫之冏雖謙順以報其意然卒不能用紹嘗詣冏咨事遇冏宴會召董艾葛旟等共論時政艾言於冏曰嵇侍中善於絲竹公可令操之左右進琴紹推不受冏曰今日為歡卿何吝此邪紹對曰公匡復社稷當軌物作則垂之於後紹雖虛鄙忝備常伯腰紱冠冕鳴玉殿省豈可操執絲竹為伶人之事若釋公服從私宴所不敢辭也冏大慙艾等不自得而退頃之以公事免冏以為左司馬旬日冏被誅初兵交紹奔散赴宫有持弩在東閣下者將射之遇有殿中將兵蕭隆見紹姿容長者疑非凡人輒前拔箭於此得免遂還滎陽舊宅尋徴為御史中丞未拜復為侍中河間王顒成都王頴舉兵向京都以討長沙王乂大駕次于城東乂宣言於衆曰今日西討欲誰為都督乎六軍之士皆曰願嵇侍中勠力前驅死猶生也遂拜紹使持節平西將軍屬乂被執紹復為侍中公王以下皆詣鄴謝罪於頴紹等咸見廢黜免為庶人尋而朝廷復有北征之役徴紹復其爵位紹以天子蒙塵承詔馳詣行在所值王師敗績於蕩隂百官及侍衛者莫不潰散惟紹儼然端冕以身捍衛兵交御輦飛箭雨集紹遂被害於帝側血濺御服天子深哀歎之及事定左右欲浣衣帝曰此嵇侍中血勿去初紹之行也侍中秦準謂曰今日向難卿有佳馬否紹正色曰大駕親征以正伐逆理必有征無戰若使皇輿失守臣節有在駿馬何為聞者莫不歎息及張方逼帝遷長安河間王顒表贈紹司空進爵為公會帝還洛陽事遂未行東海王越屯許路經滎陽過紹墓哭之悲慟刋石立碑又表贈官爵帝乃遣使册贈侍中光祿大夫加金章紫緩進爵為侯賜墓田一頃客十户祠以少牢元帝為左丞相承制以紹死節事重而贈禮未副勳德更表贈太尉祠以太牢及帝即位賜諡曰忠穆復加太牢之祠紹誕於行己不飾小節然曠而有檢通而不雜與從子含等五人共居撫恤如所同生門人故吏思慕遺愛行服墓次畢三年者三十餘人長子􅀈有父風早卒以從孫翰襲封成帝時追述紹忠以翰為奉朝請翰以無兄弟自表還本宗太元中孝武帝詔訪紹宗族襲爵主祀於是復以翰孫曠為弋陽侯含字君道祖喜徐州刺史父蕃太子舍人含好學能屬文家在鞏縣亳邱自號亳邱子門曰歸厚之門室曰慎終之室楚王瑋辟為掾瑋誅坐免舉秀才除郎中時𢎞農王粹以貴公子尚主館宇甚盛圖莊周於室廣集朝士使含為之讃含援筆為弔文文不加點其序曰帝壻王𢎞逺華池豐室廣延賢彥圖莊生垂綸之像記先達辭聘之事畫真人於刻桷之室載退士於進趣之堂可謂託非其所可弔不可讃也其辭曰邁矣莊周天縱特放大塊授其生自然資其量器虛神清窮元極曠人偽俗季真風既散野無訟屈之聲朝有爭寵之歎上下相陵長幼失貫於是借元虛以助溺引道德以自奬户詠恬曠之辭家畫老莊之像今王生沉淪名利身尚帝女連耀三光有出無處池非巖石之溜宅非茅茨之宇馳屈産於皇衢畫兹像其焉取嗟乎先生髙迹何局生處巖岫之居死寄雕楹之屋託非其所沒有餘辱悼大道之湮晦遂含悲而吐曲粹有愧色齊王冏辟為征西參軍襲爵武昌縣侯長沙王乂召為驃騎記室督尚書郎乂與成都王頴交戰頴軍轉盛尚書郎旦出督戰夜還理事含言於乂曰昔魏武每有軍事增置掾屬青龍三年尚書令陳矯以有軍務亦奏增郎今姦逆四逼王路擁塞倒懸之急不復過此但居曹理事尚須增郎况今都官中騎三曹晝出督戰夜還理事一人兩役內外廢乏含謂今有十萬人都督各有主帥推轂授綏委付大將不宜復令臺僚雜與其間乂從之乃增郎及令史懷帝為撫軍將軍以含為從事中郎惠帝北征轉中書侍郎及蕩隂之敗含走歸滎陽永興初除太弟中庶子西道阻閡未得應召范陽王虓為征西將軍屯許昌復以含為從事中郎尋授振威將軍襄城太守虓為劉喬所破含奔鎮南將軍劉𢎞於襄陽𢎞待以上賔之禮含性通敏好薦達賢才常欲崇趙武之諡加臧文之罪屬陳敏作亂江揚震蕩南越險逺而廣州刺史王毅病卒𢎞表含為平越中郎將廣州刺史假節未發會𢎞卒時或欲留含領荆州含性剛躁素與𢎞司馬郭勵有隙勵疑含將為己害夜掩殺之時年四十四懷帝即位諡曰憲王豹順陽人也少而抗直初為豫州别駕齊王冏為大司馬以豹為主簿冏驕縱失天下心豹致箋於冏曰豹伏思晉政漸缺始自元康以來宰相在位未有一人獲終乃事勢使然未為輒有不善也今公剋平禍亂安國定家故復因前傾覆之法尋中間覆車之轍欲冀長存非所敢聞今河間樹根於關右成都盤桓於舊魏新野大封於江漢三面貴王各以方剛強盛並典戎馬處險害之地且明公興義討逆功蓋天下聖德光茂名振當世今以難賞之功挾震主之威獨據京都專執大權進則亢龍有悔退則蒺藜生庭冀此求安未知其福敢以淺見陳寫愚情昔武王伐紂封建諸侯為二伯自陜以東周公主之自陜以西召公主之及至其未霸國之世不過數州之地四海強兵不敢入窺九鼎所以然者天下習於所奉故也今誠能尊用周法以成都為北州伯統河北之王侯明公為南州伯以攝南土之官長各因本職出居其方樹德於外盡忠於內嵗終率所領而貢於朝簡良才命賢俊以為天子百官則四海長寧萬國幸甚明公之德當與周召同其至美危敗路塞社稷可保願明公思髙祖納婁敬之䇿悟張良履足之謀逺臨深之危保泰山之安若合聖思宛許可都也書入無報豹重箋曰昔周公以武王為兄成王為君伐紂有功以親輔政執德𢎞深聖思博逺至忠至仁至孝至敬而攝事之日四國流言離主出奔居東三年賴風雨之變成王感悟若不遭皇天之應神人之察恐公旦之禍未知所恨也至於執政猶與召公分陜為伯今明公自視功德孰如周公且元康以來宰相之患危機竊發不及容思密禍潛起輒在呼吸豈復晏然得全生計前鑒不逺公所親見也君子不有逺慮必有近憂憂至乃悟悔無所及也今若從豹此䇿皆遣王侯之國北與成都分河為伯成都在鄴明公都宛規方千里以與圻內侯伯子男小大相率結好要盟同奬皇家貢御之法一如周典若合聖規可先旨與成都共論雖以小才願備行人昔厮養燕趙之微者耳百里奚秦楚之商人也一開其説兩國以寧况豹雖陋大州之綱紀加明公起事險難之主簿也故身雖輕其言未必否也冏令曰得前後白事具意輒别思量也會長沙王乂至於冏案上見豹箋謂冏曰小子離間骨肉何不銅駝下打殺冏既不能嘉豹之䇿遂納乂言乃奏豹曰臣忿姦凶肆逆皇祚顛墜與成都長沙新野共興義兵安復社稷唯欲勠力皇家與親親宗室腹心從事此臣夙夜自誓無負神明而主簿王豹比有白事敢造異端謂臣忝備宰相必遘危害慮在一旦不祥之聲可蹻足而待欲臣與成都分陜為伯盡出蕃王上誣聖朝鑒御之威下長妖惑疑阻衆心噂􅊱背憎巧賣百端訕上謗下讒內間外遘惡導姦坐生猜嫌昔孔丘匡魯而誅少正子産相鄭先戮鄧析誠以交亂名實若趙髙詭怪之類也豹為臣不忠不順不義輒敕都街考竟以明邪正豹將死曰懸吾頭大司馬門見兵之攻齊也衆庶冤之俄而冏敗劉沉字道真燕國薊人也世為北州名族少仕州郡博學好古太保衛瓘辟為掾領本邑大中正敦儒道愛賢能進霍原為二品及申理張華皆辭旨明峻為當時所稱齊王冏輔政引為左長史遷侍中于時李流亂蜀詔沉以侍中假節統益州刺史羅尚梁州刺史許雄等以討流行次長安河間王顒請留沉為軍司遣席薳代之後領雍州刺史及張昌作亂詔顒遣沉將州兵萬人并征西府五千人自藍田關以討之顒不奉詔沉自領州兵至藍田顒又逼奪其衆長沙王乂命沉將武吏四百人還州張方既逼京都王師屢敗王湖祖逖言於乂曰劉沉忠義果毅雍州兵力足制河間宜啓上詔與沉使發兵襲顒顒窘急必召張方以自救此計之良也乂從之沉奉詔馳檄四境合七郡之衆及守防諸軍塢壁甲士萬餘人以安定太守衛博新平太守張光安定功曹皇甫淡為先登襲長安顒時頓于鄭縣之髙平亭為東軍聲援聞沉兵起還鎮渭城遣督護虞夔率步騎萬餘人逆沉於好畤接戰夔衆敗顒大懼退入長安果急呼張方沉渡渭而壘顒每遣兵出鬬輒不利沉乘勝攻之使淡博以精甲五千從長安門而入力戰至顒帳下沉軍來遲顒軍見淡等無繼氣益倍馮翊太守張輔率衆救顒橫擊之大戰於府門博父子皆死之淡又被擒顒竒淡壯勇將活之淡不為之屈於是見殺沉軍遂敗率餘卒屯于故營張方遣其將敦煒夜至沉軍大驚而潰與麾下百餘人南遁為陳倉令所執沉謂顒曰夫知己之顧輕在生之節重不可違君父之詔量強弱以茍全投袂之日期之必死葅醢之戮甘之如薺辭義慷慨見者哀之顒怒鞭之而後腰斬有識者以顒干上犯順虐害忠義知其滅亡不久也麴允金城人也與遊氏世為豪族西州為之語曰麴與遊牛羊不數頭南開朱門北望青樓洛陽傾覆閻鼎等立秦王為皇太子於長安鼎總攝百揆允時為安夷護軍始平太守心害鼎功且規權勢因鼎殺京兆太守梁綜乃與綜弟馮翊太守緯等攻鼎走之會雍州刺史賈匹為屠各所殺允代其任愍帝即尊位以允為尚書左僕射領軍持節西戎校尉録尚書事雍州如故時劉曜殷凱趙染數萬衆逼長安允擊破之擒凱於陳曜復攻北地允為大都督驃騎將軍次于青白城以救之曜聞而轉冦上郡允軍于靈武以兵弱不敢進曜後復圍北地太守麴昌遣使求救允率步騎赴之去城數十里羣賊繞城放火煙塵蔽天縱反間詐允曰郡城已陷焚燒向盡無及矣允信之衆懼而潰後數日麴昌突圍赴長安北地遂陷允性仁厚無威斷吳皮王隱之徒無賴凶人皆加重爵新平太守竺恢始平太守楊像扶風太守竺爽安定太守焦嵩皆征鎮杖節加侍中常侍村塢主帥小者猶假銀青將軍之號欲以撫結衆心然諸將驕恣恩不及下人情頗離由是羌胡因此跋扈關中淆亂劉曜復攻長安百姓飢甚死者大半久之城中窘逼帝將出降歎曰誤我事者麴索二公也帝至平陽為劉聰所幽辱允伏地號哭不能起聰大怒幽之於獄允發憤自殺聰嘉其忠烈贈車騎將軍諡節愍侯焦嵩安定人初率衆據雍曜之逼京都允告難於嵩嵩素侮允曰須允困當救之及京都敗嵩亦尋為冦所滅賈渾不知何郡人也太安中為介休令及劉淵作亂遣其將喬晞攻陷之渾抗節不降曰吾為晉守不能全之豈茍求生以事賊虜何面目以視息世間哉晞怒執將殺之晞將尹菘曰願將軍舍之以勸事君者晞不聽遂害之王育字伯春京兆人也少孤貧為人傭牧羊每過小學必歔欷流涕時有暇節即折蒲學書忘而失羊為羊主所責育將鬻已以償之同郡許子章敏達之士也聞而嘉之代育償羊給其衣食使與子同學遂博通經史身長八尺餘鬚長三尺容貌絶異音聲動人子章以兄之子妻之為立别宅分之資業育受之無愧色然行已任性頗不偶俗及妻喪弔之者不過四五人然皆鄉閭名士太守杜宣命為主簿俄而宣左遷萬年令杜令王攸詣宣宣不迎之攸怒曰卿往為二千石吾所敬也今吾儕耳何故不見迎欲以小雀遇我使我畏死鷂乎育執刀叱攸曰君辱臣死自昔而然我府君以非罪黜降如日月之蝕耳小縣令敢輕辱吾君汝謂吾刀鈍邪敢如是乎前將殺之宣懼跣下抱育乃止自此知名司徒王渾辟為掾除南武陽令為政清約宿盜逃奔他郡遷并州督護成都王頴在鄴又以育為振武將軍劉淵之為北單于育説頴曰劉淵今去育請為殿下促之不然懼不至也頴然之以育為破虜將軍淵遂拘之其後以為太傅韋忠字子節平陽人也少慷慨有不可奪之志好學博通性不虛諾閉門修已不交當世每至吉凶親表贈遺一無所受年十三喪父哀慕毁悴杖而後起司空裴秀弔之匍匐號訴哀慟感人秀出而告人曰此子長大必為佳器歸而命子頠造焉服闋遂廬於墓所頠慕而造之皆託行不見家貧藜藿不充人不堪其憂而忠不改其操頠為僕射數言之於司空張華華辟之辭病不起人問其故忠曰吾茨簷賤士本無宦情且茂先華而不實裴頠欲而無厭棄典禮而附賊后此豈丈夫之所宜行邪裴常有心託我常恐洪濤蕩嶽餘波見漂況可臨尾閭而窺沃焦哉太守陳楚辟為功曹會山羌破郡楚攜子出走賊射之中三創忠冒刃伏楚以身捍之泣曰韋忠願以身代使君乞諸君哀之亦遭五矢賊相謂曰義士也舍之忠於是負楚以歸後仕劉聰為鎮西大將軍平羌校尉討叛羌矢盡不屈節而死辛勉字伯力隴西狄道人也父洪左衛將軍勉博學有貞固之操懷帝世纍遷為侍中及洛陽陷隨帝至平陽劉聰將署為光祿大夫勉固辭不受聰遣其黃門侍郎喬度齎藥酒逼之勉曰大丈夫豈以數年之命而虧髙節事二姓下見武皇帝哉引藥將飲度遽止之曰主上相試耳君真髙士也歎息而去聰嘉其貞節深敬異之為築室於平陽西山月致酒米勉亦辭而不受年八十卒族弟賔愍帝時為尚書郎及帝蒙塵於平陽劉聰使帝洗爵行酒欲觀晉臣在朝者意賔起抱帝大哭聰曰前殺庾珉輩故不足為戒邪引出遂加害焉劉敏元字道光北海人也厲已修學不以險難改心好星厯隂陽術數潛心易太元不好讀史常謂同志曰誦書當味義根何為費功於浮辭之文易者義之源太元理之門能明此者即吾師之永嘉之亂自齊西奔同縣管平年七十餘隨敏元而西行及滎陽為盜所劫敏元已免乃還謂賊曰此公孤老餘年無幾敏元請以身代願諸公舍之賊曰此公於君何親敏元曰同邑人也窮窶無子依敏元為命諸公若欲役之老不堪使若欲食之復不如敏元乞諸君哀也有一賊瞋目叱敏元曰吾不放此公憂不得汝乎敏元奮劍曰吾豈望生邪當殺汝而後死此公窮老神祇尚當哀矜之吾親非骨肉義非師友但以見投之故乞以身代諸大夫慈惠皆有聽吾之色汝何有靦面目而發斯言顧謂諸盜長曰夫仁義何常寧可失諸君子上當為髙皇光武之事下豈失為陳項乎當取之由道使所過稱詠威德奈何容畜此人以損盛美當為諸君除此人以成諸君霸王之業前將斬之盜長遽止之而相謂曰義士也害之犯義乃俱免之後仕劉曜為中書侍郎太尉長史周該天門人也性果烈以義勇稱雖不好學而率由名教叔父級為宜都內史亦忠節士也聞譙王承立義湘州甘卓又不同王敦之舉而書檄不至級謂該曰吾常疾王敦挾陵上之心今稱兵構逆有危社稷之勢譙王宗室之望據方州之重建旗誓重圖襲武昌甘安南少著勇名士馬器械當今為盛聞譙王尅期舉義此乃烈士急病之秋吾致死之時也汝其成吾之志申欵於譙王乎該欣然奉命潛至湘州與承相見口陳至誠承大悅會王敦遣其將魏乂圍承甚急該乃與湘州從事周﨑間出反命俱為乂所執考之至死竟不言其故級由是獲免王敦之難桓雄長沙人也少仕州郡譙王承為湘州刺史命為主簿王敦之逆承為敦將魏乂所執佐吏奔散雄與西曹韓階從事武延並毁服為僮豎隨承向武昌乂見雄姿貌長者進退有禮知非凡人有畏憚之色因害之韓階長沙人也性亷謹篤愼為閭里所敬愛刺史譙王承辟為議曹祭酒轉西曹書佐及承為魏乂所執送武昌階與武延等同心隨從在承左右桓雄被害之後二人執志愈固及承遇禍階延親營殯殮送柩還都朝夕哭奠俱葬畢乃還周﨑邵陵人也為湘州從事王敦之難譙王承使﨑求救于外與周該俱為魏乂偵人所執乂責﨑辭情臨以白刃﨑曰州將使求援于外本無定指隨時制宜耳乂謂﨑曰汝為我語城中稱大將軍已破劉隗戴若思甘卓住襄陽無復異議三江州郡萬里肅清外援理絶如是者我當活汝﨑偽許之既到城下大呼曰王敦軍敗於于湖甘安南已尅武昌即日分遣大衆來赴此急努力堅守賊今散矣乂於是數而殺之易雄字興長長沙瀏陽人也少為縣吏自念卑賤無由自達乃脫幘挂縣門而去因習律令及施行故事交結豪右州里稍稱之仕郡為主簿張昌之亂也執太守萬嗣將斬之雄與賊爭論曲直賊怒叱使牽雄斬之雄趨出自若賊又呼問之雄對如初如此者三賊乃舍之嗣由是獲免雄遂知名舉孝亷為州主簿遷别駕自以寒門不宜久處上綱謝職還家後為舂陵令刺史譙王承既距王敦將謀起兵以赴朝廷雄承符馳檄逺近列敦罪惡宣募縣境數日之中有衆千人負糧荷戈而從之承既固守而湘中殘荒之後城池不完兵資又闕敦遣魏乂李恆攻之雄勉厲所統扞禦纍旬士卒死傷者相枕力屈城陷為乂所虜意氣慷慨神無懼色送到武昌敦遣人以檄示雄而數之雄曰此實有之惜雄位微力弱不能救國之難王室如燬雄安用生為今日即戮得作忠魂乃所願也敦憚其辭正釋之衆人皆賀雄笑曰昨夜夢乘車挂肉其傍夫肉必有筋筋者斤也車傍有斤吾其戮乎尋而敦遣殺之當時見者莫不傷惋樂道融丹陽人也少有大志好學不倦與朋友信每約已而務周給有國士之風為王敦參軍敦將圖逆謀害朝賢以告甘卓卓以為不可遲留不赴敦遣道融召之道融雖為敦佐忿其逆節因説卓曰主上躬統萬機非專任劉隗今慮七國之禍故割湘州以削諸侯而王氏擅權日久卒見分政便謂被奪耳王敦背恩肆逆舉兵伐主國家待君至厚今若同之豈不負義生為逆臣死為愚鬼永成宗黨之恥邪君當偽許應命而馳襲武昌敦衆聞之必不戰自散大勳可就矣卓大然之乃與巴東監軍栁純等露檄陳敦過逆率所統致討又遣齎表詣臺卓性不果決且年老多疑遂待諸方同進出軍稽遲至豬口敦聞卓已下兵卓兄子卭時為敦參軍使卭求和於卓令其旋軍卓信之將旋主簿鄧騫與道融勸卓曰將軍起義兵而中廢為敗軍之將竊為將軍不取今將軍之下士卒各求其利一旦而還恐不可得也卓不從道融晝夜流涕諫卓憂憤而死虞悝長沙人也弟望字子都並有士操孝悌亷信為鄉黨所稱而俱好臧否以人倫為己任少仕州郡兄弟更為治中别駕元帝為丞相招延四方之士多辟府掾時人謂之百六掾望亦被召恥而不應譙王承臨州知其名檄悝為長史未到遭母喪會王敦作逆承往弔悝因留與語曰吾前被詔遣鎮此州正以王敦專擅防其為禍今敦果為逆謀吾受任一方欲率所領馳赴朝廷而衆少糧乏且始到貴州恩信未著卿兄弟南夏之翹俊而智勇逺聞古人墨衰即戎況今鯨鯢塞路王室危急安得遂罔極之情忘忠義之節乎如今起事將士器械可以濟不悝望對曰王敦居分陜之任一旦構逆圖危社稷此天地所不容人神所共嫉大王不以猥劣枉駕訪及悝兄弟並受國恩敢不自奪今天朝中興人思晉德大王以宗子之親奉信順而誅有罪孰不荷戈致命但鄙州荒弊糧器空竭舟艦寡少難以進討宜且收衆固守傳檄四方其勢必分然後圖之事可捷也承以為然乃命悝為長史望為司馬督護諸軍湘東太守鄭淡敦之姊夫也不順承旨遣望討之望率衆一旅直入郡斬淡以徇四境及魏乂來攻望每先登力戰而死城破悝復為乂所執將害之子弟對之號泣悝謂曰人生有死闔門為忠義鬼亦何悵哉及王敦平贈悝襄陽太守望滎陽太守遣謁者至墓祭以少牢沈徑字世堅吳康武興人也父充與王敦為逆衆敗而逃為部曲將吳儒所殺徑當坐誅鄉人錢舉匿之得免其後竟殺讎人徑少有節操哀父死於非義欲立勳以雪前恥年三十餘以刑家不得仕進郡將王胡之深異之及遷平北將軍司州刺史將鎮洛陽上疏曰臣當藩衛山陵式遏戎狄雖義督羣心人思自百然方翦荆棘奉宣國恩艱難急病非才不濟吳興男子沈徑清操著於鄉邦貞固足以幹事且臣今西文武義故吳興人最多若令徑參臣府事者見人既悅義附亦衆徑父充昔雖得罪先朝然其門户纍經曠蕩不審可得特垂沛然許臣所上否詔聽之徑既應命胡之以疾病解職升平中慕容恪侵逼山陵時冠軍將軍陳祐守洛陽衆不過二千徑自表求配祐效力因以徑補冠軍長史令自募壯士得千餘人以助祐擊賊頻以寡制衆而糧盡援絶祐懼不能保全會賊冦許昌祐因以救許昌為名興寧三年留徑以五百人守城祐率衆而東會許昌已沒祐因奔崖塢徑志欲致命欣獲死所尋為恪所攻城陷被執神氣自若恪竒而將宥之其中軍將軍慕容虔曰徑雖竒士觀其志度終不為人用今若赦之必為後患遂遇害恪還從容言於慕容暐曰前平廣固不能濟辟閭今定洛陽而殺沈徑實有愧於四海朝廷聞而嘉之贈東陽太守子赤黔為大長秋赤黔子叔任義熙中為益州刺史吉挹字祖沖馮翊蓮芍人也祖朗愍帝時為御史中丞西朝不守朗歎曰吾智不能謀勇不能死何忍君臣相隨北面事賊虜乎乃自殺挹少有志節孝武帝初苻堅陷梁益桓豁表挹為魏興太守尋加輕車將軍領晉昌太守以距堅之功拜員外散騎侍郎苻堅將韋鐘攻魏興挹遣將距之斬七百餘級加督五郡軍事鐘率衆欲趣襄陽挹又邀擊斬五千餘級鐘怒回軍圍之挹又屢挫其鋭其後賊衆繼至挹力不能抗城將陷引刀欲自殺其友止之曰且茍存以展他計為計不立死未晚也挹不從友人逼奪其刀會賊執之挹閉口不言不食而死車騎將軍桓沖上言曰故輕車將軍魏興太守吉挹祖朗西臺傾覆隕身守節挹世篤忠孝乃心本朝臣亡兄溫昔伐咸陽軍次灞水挹携將二弟單馬來奔録其此誠仍加擢授自新野太守轉在魏興久處兵任委以邊戍疆埸歸懷著稱所蒞前年狡氐縱逸浮河而下挹孤城獨立衆無一旅外摧凶鋭內固津要虜賊舟船俘馘千計而賊并力攻圍經歷時月會襄陽失守邊情沮喪加衆寡勢殊以至陷沒挹辭氣慷慨志在不辱杖刃推戈期之以隕將吏持守用不即斃遂乃杜口無言絶粒而死挹參軍史頴近於賊中得還齎挹臨終手疏并具説意狀挹之忠志猶在可録若蒙天施垂曲宥之恩則榮加枯朽惠隆泉壤矣帝嘉之追贈益州刺史王諒字幼成丹陽人也少有幹略為王敦所擢參其府事稍遷武昌太守初新昌太守梁碩專威交土迎立陶咸為刺史咸卒王敦以王機為刺史碩發兵距機自領交趾太守乃迎前刺史修則子湛行州事永興三年敦以諒為交州刺史諒將之任敦謂曰修湛梁碩皆國賊也卿至便收斬之諒既到境湛退還九真廣州刺史陶侃遣人誘湛來詣諒所諒敕從人不得入閣既前執之碩時在坐曰湛故州將之子有罪可遣不足殺也諒曰是君義故無豫我事即斬之碩怒而出諒隂謀誅碩使客刺之弗尅碩遂率衆圍諒於龍編陶侃遣軍救之未至而諒敗碩逼諒奪其節諒固執不與遂斷諒右臂諒正色曰死且不畏臂斷何有十餘日憤恚而卒碩據交州凶暴酷虐一境患之竟為侃軍所滅傳首京師宋矩字處規敦煌人也慷慨有志節張重華據涼州也以矩為宛戍都尉石虎遣將麻秋攻大夏護軍梁彧執太守宋晏以城應秋秋遣晏以書致矩矩既至謂秋曰辭父事君當立功與義茍功義不立當守名節矩終不肯背主覆宗偷生於世先殺妻子自刎而死秋曰義士也命葬之重華嘉其誠節贈振威將軍車濟字萬度敦煌人也果毅有大量張重華以為金城令為石虎將麻秋所陷濟不為秋屈秋必欲降之乃臨之以兵濟辭色不撓曰吾雖才非龎德而受任同之身可殺志不可移乃伏劍而死秋歎其忠節以禮葬之後重華迎致其喪親臨慟哭贈宜禾都尉丁穆字彥逺譙國人也積功勞封真定侯纍遷為順陽太守太元四年除振武將軍梁州刺史受詔未發會苻堅遣衆冦順陽穆戰敗被執至長安稱疾不仕偽朝堅又傾國南冦穆與關中人士唱義謀襲長安事泄被害臨死作表以付其妻周其後周得至京師詣闕上之孝武帝詔曰故順陽太守真定侯丁穆力屈身陷而誠節彌固直亮壯徑義貫古烈其喪柩始反言尋傷悼可贈龍驤將軍雍州刺史賻賜一依周虓故事為立屋宅并給其妻衣食以終厥身辛恭靖隴西狄道人也少有器幹才量過人隆安中為河南太守會姚興來冦恭靖固守百餘日以無救而陷被執至長安興謂之曰朕將任卿以東南之事可乎恭靖厲色曰我寧為國家鬼不為羌賊臣興怒幽之别室經三年至元興中誑守者乃踰垣而遁歸于江東安帝嘉之桓元請為咨議參軍置之朝首尋而病卒羅企生字宗伯豫章人也多才藝初拜著作佐郎以家貧親老求補臨安令刺史王凝之請為别駕殷仲堪之鎮江陵引為功曹纍遷武陵太守未之郡而桓元攻仲堪仲堪更以企生為咨議參軍仲堪多疑少決企生深憂之謂弟遵生曰殷侯仁而無斷事必無成成敗天也吾當死生以之仲堪果走文武無送者唯企生從焉路經家門其弟遵生曰作如此分離何可不執手企生回馬授手遵生有勇力便牽下之謂曰家有老母將欲何之企生揮淚曰今日之事我必死之汝等奉飬不失子道一門之中有忠與孝亦復何恨遵生抱之愈急仲堪於路待之企生遙呼曰生死是同願少見待仲堪見企生無脫理䇿馬而去元至荆州人士無不詣者企生獨不往而營理仲堪家或謂之曰元猜忍之性未能取卿誠節若遂不詣禍必至矣企生正色曰我是殷侯吏見遇以國士為弟以力見制遂不我從不能共殄醜逆致此奔敗亦何面目復就桓第求生乎元聞之大怒然素待企生厚先遣人謂曰若謝我當釋汝企生曰為殷荆州吏荆州奔亡存亡未判何顔復謝元即收企生遣人問欲何言答曰文帝殺嵇康嵇紹為晉忠臣從公乞一弟以養老母元許之又引企生於前謂曰吾相遇甚厚何以見負今者死矣企生對曰使君既興晉陽之甲軍次潯陽並奉王命各還所鎮升壇盟誓口血未乾而生姦計自傷力劣不能翦滅凶逆恨死晚也元遂害之時年三十七衆咸悼焉先是元以羔裘遺企生母胡氏及企生遇害母即日焚裘張褘吳郡人也少有操行恭帝為琅邪王以褘為郎中令及帝踐阼劉裕以褘帝之故吏素所親信封藥酒一罌付褘密令鴆帝褘既受命而歎曰鴆君而求生何面目視息世間哉不如死也因自飲之而死宋宋書不立忠義傳以龔穎張進之卜天與三人附孝義傳今析置此仍取袁淑袁粲二人冠於其首袁淑字陽源陳郡陽夏人也父豹丹陽尹太尉長史淑少有風氣年數嵗伯父湛謂家人曰此非凡兒至十餘嵗為姑夫王𢎞所賞不為章句之學而博涉多通文彩遒豔縱橫有才辨本州命主簿著作佐郎太子舍人並不就彭城王義康命為司徒軍司祭酒義康不好文學雖外相禮接意好甚疏劉湛淑從母兄也欲其附已而淑不以為意由是大相乖失淑乃為詩曰種蘭忌當門懷璧莫向楚楚少别玉人門非植蘭所尋以久疾免官元嘉二十六年纍遷尚書吏部郎其秋大舉北伐淑侍坐從容曰今當席卷趙魏檢玉岱宗臣逢千載之會願上封禪書一篇文帝曰盛德之事我何足以當之出為始興王濬征北長史南東海太守還為御史中丞時魏軍南侵至瓜步文帝使百官議防禦之術淑上議擊之其言甚誕淑喜為誇侈每為時人所嘲始興王濬常送錢三萬餉淑一宿復遣追取謂為使人謬誤欲以戲淑淑與濬書云聞之前志曰七年之中一與一奪義士猶或非之況密邇旬次何其裒益之亟也竊恐二三諸侯有以觀大國之政是用敢布腹心遷太子左衛率元凶將為逆其夜淑在直二更許劭呼淑及蕭斌等流涕謂曰主上信讒將見罪廢內省無過不能受枉明旦便當行大事望相與勠力淑及斌並曰自古無此願加善思劭怒變色左右皆聳動斌懼曰謹奉令淑叱之曰卿便謂殿下真有是邪殿下幼時常患風或是疾動耳劭愈怒因問曰事當尅不淑曰居不疑之地何患不尅但既尅之後為天地所不容大禍亦旋至耳劭左右引淑衣曰此是何事而可言罷劭因起賜淑等袴褶又就主衣取錦裁三尺為一假又中裂之分斌與淑及左右使以縛袴褶淑出還省繞牀至四更乃寢劭將出已與蕭斌同載呼淑甚急淑眠終不肯起劭停車奉化門外催之相續徐起至車後劭使登車辭不上劭命殺之於奉化門外槐樹下時年四十六劭即位追贈太常孝武即位詔贈侍中太尉諡曰忠憲公又詔淑及徐湛之江湛王僧綽卜天與家長給廪袁粲字景倩淑兄子也父濯揚州秀才早卒粲幼孤其祖哀之名之曰愍孫伯叔並當世榮顯而愍孫飢寒不足母琅邪王氏太尉長史誕女也躬事績紡以供朝夕愍孫少好學有清才隨伯父洵為吳郡擁弊裘讀書足不踰户其從兄顗出遊要愍孫愍孫輒稱疾不動叔父淑雅重之語子弟曰我門不乏賢愍孫必當復為三公或有欲與顗婚者顗父洵曰顗不堪正可與愍孫婚耳時愍孫在坐流涕起出早以行操見知初為揚州從事文帝安北參軍孝武即位稍遷尚書吏部郎太子右衛率孝建元年文帝諱日羣臣並於中興寺入關齋中食竟愍孫與黃門郎張淹更進魚肉食尚書令何尚之密以白孝武孝武使御史中丞王謙之糾奏並免官二年起為廷尉大明元年復為侍中領射聲校尉封與平縣子三年坐納山隂民丁承文貨舉為會稽郡孝亷免官五年為左衛將軍加給事中七年轉吏部尚書左衛如故其年皇太子冠上臨宴東宫與顔師伯栁元景沈慶之等並摴蒱愍孫勸師伯酒師伯不飲愍孫因折辱之曰不能與佞人周旋師伯見寵於上上常嫌愍孫以寒素陵之因此發怒曰袁濯兒不逢朕員外郎未可得也而敢以寒士遇物將手刃之命引下席愍孫色不變沈柳並起為謝久之得釋出為海陵太守廢帝即位愍孫在郡夢日墮其胸上因驚尋被徴管機密歷吏部尚書侍中驍騎將軍愍孫峻於儀範廢帝裸之逼使走愍孫雅步如常顧而言曰風雨如晦雞鳴不已明帝泰始元年為司徒左長史南東海太守愍孫清整有風操自遇甚髙嘗著妙德先生傳以續嵇康髙士傳後以自況曰有妙德先生陳國人也氣志深虛姿神清映性孝履順棲沖業簡有舜之遺風先生幼夙多疾性疏懶無所營尚然九流百氏之言雕龍談天之藝皆泛識其大歸而不以成名家貧嘗仕非其好也混其聲迹晦其心用席門常掩三徑裁通雖揚子寂寞嚴叟沈冥不是過也修道遂志終無得而稱焉又嘗謂周旋人曰昔有一國國中有水號曰狂泉國人飲此水無不狂惟國君穿井而汲獨得無恙國人既並狂反謂國主之不狂為狂於是聚謀共執國主療其狂疾火艾針藥莫不畢具國主不任其苦於是到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃歡然我既不狂難以獨立比亦欲試飲此水矣愍孫幼慕荀奉倩之為人白孝武求改名為粲不許至明帝立乃請改為粲字景倩其外孫王筠又云明帝多忌諱以反語袁愍為殞門帝意惡之故令改焉二年遷領軍將軍仗士三十人入六門其年徙中書令領太子詹事三年轉尚書僕射尋領吏部五年加中書令又領丹陽尹上於華林園茅堂講周易粲為執經又知東宫事粲負才尚氣愛好虛逺雖位任隆重不以事務經懷獨步園林詩酒自適家居負郭每杖䇿逍遙當其意得悠然忘反郡南一家頗有竹石粲率爾步往亦不通主人直造竹所嘯詠自得主人出語笑欵然俄而車騎羽儀併至門方知是袁尹又嘗步屧白楊郊野間道遇一士大夫便呼與酣飲明日此人謂被知顧到門求進粲曰昨飲酒無偶聊相要耳竟不與相見嘗作五言詩曰訪迹雖中宇循寄乃滄洲蓋其志也七年為尚書令初粲忤於孝武其母候乘輿出負磚叩首流血磚碎傷目自此後粲與人語有誤道眇目者輒涕泣彌日嘗疾母憂念晝寢夢見父容色如平生與母語曰愍孫無憂將為國家器不患沈沒但恐富貴終當傾滅耳母未嘗言及粲貴重恆懼傾滅乃以告之粲故自挹損明帝臨崩粲與褚淵劉勔並受顧命加班劍二十人給鼓吹一部後廢帝即位未親朝政加粲兵五百人元徽元年粲丁母憂葬竟攝令親職加衛將軍不受中使敦逼相望粲終不受性至孝居喪毁甚祖日及祥詔衛將軍斷客二年桂陽王休範為逆粲扶曵入殿詔加兵自隨府置佐吏時兵難危急賊已至南掖門諸將意沮咸莫能奮粲慷慨謂諸將帥曰冦賊已逼而衆情離沮孤子受先帝顧託本以死報今日當與諸護軍同死社稷因命左右被馬辭色哀壯於是陳顯達等感激出戰賊即平殄事寧授中書監即本號開府儀同三司領司徒以揚州解為府固不肯移三年徙尚書令衛軍開府如故並固辭服終乃受命加侍中進爵為侯又不受時粲與齊髙帝褚淵劉秉遞日入直平決萬機時謂之四貴粲默然寡言不肯當事主書每往咨決或髙詠對之時立一意則衆莫能改宅宇率素器物取給好飲酒善吟諷獨酌園庭以此自適居負南郭時杖䇿獨遊素寡往來門無雜客間居髙卧一無所接談客文士所見不過一兩人順帝即位遷中書監司徒侍中如故時齊髙帝居東府故使粲鎮石頭粲素靜退每有朝命多不即從逼切不得已然後方就及詔移石頭即便順旨有周旋人解望氣謂粲曰石頭氣甚乖往必有禍粲不答又給油絡通幰車仗士五十人入殿時齊髙帝方謀革命粲自以身受顧託不欲事二姓密有異圖丹陽尹劉秉宋氏宗室前湘州刺史王藴太后兄子素好武事並慮不見容於齊髙帝皆與粲相結諸將帥黃回任候伯孫曇瓘王宜興彭文之卜伯興等並與粲合升平元年荆州刺史沈攸之舉兵齊髙帝自詣粲粲稱疾不見粲宗人袁達以為不宜示異同粲曰彼若劫我入臺便無辭以拒一如此不復得出矣時齊髙帝入屯朝堂秉從父弟領軍將軍韞入直門下省卜伯興為直閣黃回諸將皆率軍出新亭粲謀尅日矯太后令使藴伯興率宿衛兵攻齊髙帝於朝堂回率軍來應秉候伯等並赴石頭本期夜發其日秉憂懼不知所為晡後便束裝未暗載婦女就粲由此事泄先是齊髙帝遣將薛淵蘇烈王天生等領兵戍石頭云以助粲實禦之也又令腹心王敬則為直閣與伯興共總禁兵王藴聞秉已奔歎曰今年事敗矣時齊髙帝使藴募人已得數百乃狼狽率部曲向石頭本期開南門時已暗夜薛淵等據門射之藴謂粲已敗即便散走齊髙帝已報敬則敬則率所領收藴殺之并誅伯興又遣軍主戴僧靜向石頭助薛淵自倉門入時粲與秉等列兵登東門僧靜分兵攻府西門粲與秉欲還赴府既下城列燭自照謂其子最曰本知一木不能止大厦之崩但以名義至此耳僧靜挺身暗往奮刀直前欲斬之粲子最覺有異大呌抱父乞先死兵士人人莫不隕涕粲曰我不失為忠臣汝不失為孝子仍求筆作啓云臣義奉大宋䇿名兩畢今便歸魂墳壠永就山邱僧靜乃并斬之初粲大明中與蕭惠開周朗同車行逢大􅟘開駐車惠開自照鏡曰無年可仕朗執鏡良久曰視死如歸粲最後曰當至三公而不終至是如言最字文髙時年十七既父子俱殞左右分散任候伯等其夜並自新亭赴石頭其後皆誅粲小兒數嵗乳母將投粲門生狄靈慶靈慶曰吾聞出郎君者有厚賞今袁氏已滅汝匿之尚誰為乎遂抱以首乳母號泣呼天曰公昔於汝有恩故冒難歸汝奈何欲殺郎君以求小利若天地鬼神有知我見汝滅門此兒死後靈慶常見兒騎大㲰狗戲如平常經年餘鬬場忽見一狗走入其家遇靈慶於庭噬殺之少時妻子皆沒此狗即袁郎所常騎者也齊永明元年武帝始下詔命袁粲劉秉改葬粲省事莫嗣祖粲常所委信與劉秉等宣密謀至是齊髙帝謂曰汝知袁粲密謀逆何以不啓嗣祖曰小人無識曲蒙袁公厚恩不忍仰負今日就死分甘官若賜性命亦不忍背粲而獨生也戴僧靜勸殺之髙帝曰彼各為其主遂赦焉用為省事歷朝所賞後為梁豫章王師龔頴遂寧人也少好學益州刺史毛璩辟為勸學從事璩為譙縱所殺故佐吏並逃亡頴號哭奔赴殯送以禮縱後設宴延頴不獲已乃至樂奏頴流涕起曰北面事人亡不能死何忍舉觴聞樂蹈迹逆亂乎縱大將譙道福引出將斬之道福母即頴姑也跣出救之得免及縱僭號備禮聘之又不至乃收頴付獄脅以兵刃執志彌堅終無回改至于蜀平遂不屈節其後刺史至輒加辟引歷府參軍州别駕從事史元嘉二十四年刺史陸徽表頴節義竟不被朝命終于家張進之永嘉安固人也為郡大族少有志行歷五官主簿永寧安固二縣校尉家世富足經荒年散財贍鄉里遂以貧罄全濟者甚多太守王味之有罪當見收逃避進之家供奉經時盡其誠力味之嘗避地墮水沈沒進之投水拯救相與沈淪久而得免時劫略充斥每入村縱暴至進之門輒相約勒不得侵害其信義所感如此元嘉初詔在所蠲其徭役孫恩之亂永嘉太守司馬逸之被害妻子並死兵冦之際莫敢收藏郡吏俞僉以家財冒難棺斂逸之等六喪送至都葬畢乃歸鄉里元嘉中老病卒卜天與吳興餘杭人也父名祖武帝聞其有幹力召補隊主從征伐封關中侯歷二縣令天與善射弓力兼倍容貌嚴毅笑不解顔文帝以其舊將子使教皇子射元嘉二十九年為廣威將軍領左細仗元凶入弒事變倉卒舊將羅訓徐牢皆望風屈謝天與不暇被甲執刀持弓疾呼左右出戰徐牢曰殿下入汝欲何為天與罵曰殿下常來去云何即時方作此語只汝是賊手射劭於東堂幾中逆徒擊之臂斷乃見殺其隊將張𢎞之朱道欽陳滿與天與同出拒戰並死孝武即位贈天與龍驤將軍益州刺史諡曰壯侯車駕臨哭𢎞之等各贈郡守給天與家長稟子伯宗殿中將軍明帝泰始初領幢擊南賊於赭圻戰沒伯宗弟伯興官至南平昌太守直閣領細仗隊主升明元年與袁粲同謀伏誅天與弟天生少為隊將十人同火屋後有一坑廣二丈餘十人共跳之皆度唯天生墜天生乃取實中苦竹剡其端使利交橫布坑內更呼等類共跳並懼不敢天生乃復跳之往反十餘曽無留礙衆並歎服以兄死節為孝武所留心大明末為弋陽太守明帝泰始初與殷琰同逆被斬齊齊不立忠義傳以邱冠先一人附孝義傳今析置此仍以張沖一人附其下邱冠先字道元吳興烏程人也少有節義永明中位給事中時求使蠕蠕國尚書令王儉言冠先雖名位未升而義行甚重若為行人則蘇武鄭衆之流也於是使蠕蠕蠕蠕逼令拜冠先執節不從以刃臨之冠先曰能殺我者蠕蠕也不能以天子使拜戎狄者我也遂見殺武帝以冠先不辱命賜其子雄錢一萬布三千匹雄不受詣闕上書曰臣父執節如蘇武守節如谷吉遂不書之良史甄之褒䇿萬代之後誰死社稷建元四年車僧朗銜使不異抗節是同詔贈正員外郎此天朝舊準臣父成例也今僧朗反葬冢塋臣父湮棄絶域語忠烈則亦不謝車論荼苦則彼優而此劇名位不殊禮數宜等乞申哀贈書奏不省張沖字思約吳郡吳人也祖邵宋吳興太守封臨沮伯父柬襲封位通直郎柬勇力手格猛虎元凶弒立以為輔國將軍孝武至新亭柬出奔墜淮死長子式嗣沖出繼伯父敷沖母戴顒女有儀範張氏內取則焉沖少有至性隨從叔永為將帥除盱台太守永征彭城遇寒軍人手脛凍折者十七八沖足指皆墮永明八年為假節監青冀二州行刺史事沖父初卒遺令祭我必以鄉土所産無用他物沖在鎮四時還吳國取果菜每至蒸嘗輒流涕薦焉仍轉刺史永元二年為南兖州刺史遷司州裴叔業以夀春降魏又遷沖南兖州刺史並未拜崔慧景事平徴建安王寶夤還都以沖為舒州刺史一嵗之中頻授四州刺史至是乃受任封定襄侯梁武帝起兵手書喻意又遣辨士説之沖確然不回東昏遣驍騎將軍薛元嗣制局監暨榮伯領兵及糧運送沖使拒西師元嗣等懲劉山陽之敗疑沖不敢進停住夏首浦聞梁武帝將至元嗣榮伯相率入郢城時竟陵太守房僧寄被代還至郢東昏敕僧寄留守魯山除驍騎將軍僧寄謂沖曰下官雖未荷朝廷深恩實蒙先帝厚澤蔭其樹者不折其枝實欲微立塵效沖深相許諾共結盟誓分部拒守遣軍主孫樂祖率數千人助僧寄援魯山岸立城壘明年二月梁武帝圍魯山城遣軍主曹景宗等過江攻郢城沖中兵參軍陳光靜等間出擊之光靜戰死沖固守不屈病將死厲府僚以誠節言終而卒元嗣榮伯與沖子孜及長史江夏程茂固守東昏詔贈沖散騎常侍護軍將軍元嗣等處圍城之中無他經略唯迎蔣子文及蘇侯神每日禺中於州聽事上祀以求福鈴鐸之聲晝夜不止又使子文導從登陴巡行旦日輒復如之識者知其將亡僧寄病死孫樂祖以城降郢破圍二百餘日士庶病死者七八百家魯山陷後二日程茂及元嗣等議降使孜為書與梁武帝沖故吏青州中從事房長瑜謂孜曰前使君忠貫昊天操逾松竹郎君但當端坐畫一以荷析薪若天運不與幅巾待命以下從使君今若隨諸人之計非惟郢州士女失髙山之望亦恐彼所不取也不從卒以郢城降時以沖及房僧寄比臧洪之被圍也贈僧寄益州刺史梁梁不立忠義傳今録張嵊江子一沈峻韋粲四人以為編張嵊字四山吳郡吳人也祖永宋南兖州刺史父稷尚書左僕射稷初為剡令至嵊亭生之因名嵊字四山嵊少敦孝行年三十餘猶班衣受稷杖動至數百收淚歡然雅有志操能清言初父稷為青冀二州刺史州人徐道角等夜襲城稷遂見害嵊感家禍終身蔬食布衣手不執刀刃不聽音樂弟淮言氣不倫嵊垂泣訓誘起家祕書郎纍遷鎮南湘東王長史尋陽太守王暇日元言因為之筮謂嵊曰卿後當東入為郡恐不得終其天年嵊曰貴得其所耳時伏珽在坐曰君王可畏人也還為太府卿吳興太守侯景圍建鄴遣弟伊率郡兵赴援城陷御史中丞沈峻違難東歸嵊往見之謂曰賊臣慿陵人臣效命之日今欲收集兵刃保據貴鄉雖復萬死誠亦無恨峻固勸嵊舉義時邵陵王綸東奔至錢塘聞之遣前舍人陸邱公版授嵊征東將軍嵊曰天子蒙塵今日何情復受榮號留版而已賊行臺劉神茂攻破義興遣使説嵊嵊斬其使仍遣軍破神茂侯景乃遣其中軍侯子鑒助神茂擊嵊嵊軍敗乃釋戎服坐於聽事賊臨以刃終不屈執以送景景將舍之嵊曰速死為幸乃殺之子弟遇害者十餘人景欲存其一子嵊曰吾一門已在鬼録不在爾處求恩於是皆死賊平元帝追贈侍中中衛將軍開府儀同三司諡忠貞江子一字元亮濟陽考城人晉散騎常侍統之七世孫也父法成奉朝請子一少慷慨有大志家貧以孝聞苦侍養多闕因蔬食終身起家王國侍郎奉朝請上書言事為當軸所排乃拜表求入北為刺客武帝異之又啓求觀書祕閣武帝許之有敕直華林省其姑夫左衛將軍朱異權要當朝休暇之日賔客輻湊異不為物議所歸欲引子一為助子一未嘗造門其髙潔如此為遂昌曲阿令皆著美績後為南津校尉弟子四歷尚書金部郎大同初遷右丞兄弟性並剛烈子四自右丞上封事極言得失武帝甚善之詔曰屋漏在上知之在下其令尚書詳擇施於時政左戶郎沈炯少府丞顧璵嘗奏事不允帝厲色呵責之子四乃趨前代炯等對言甚激切帝怒呼縛之子四據地不受帝怒亦歇乃釋之猶坐免職及侯景攻陷歷陽自橫江將度子一率舟師千餘人於下流欲邀之其副董桃生走子一乃退還南洲收餘衆步赴建鄴見於文德殿帝怒之具以事對且曰臣以身許國常恐不得其死今日之事何所復惜不死闕前終死闕後耳及城被圍開承明門出戰子一及弟尚書左丞子四東宫直殿主帥子五並力戰直前賊坐甲不起子一引矟撞之賊縱突騎衆並縮子一刺其騎騎倒矟折賊解其肩時年六十二弟曰與兄俱出何面獨旋乃免胄赴敵子四矟洞胸死子五傷脰還至塹一慟而絶賊義子一之勇歸之面如生詔贈子一給事黃門侍郎子四中書侍郎子五散騎侍郎侯景平元帝又追贈子一侍中諡義子子四黃門侍郎諡毅子子五中書侍郎諡烈子子一續黃圖及班固九品并詞賦文章數十篇行於世沈浚字叔源吳興武康人也祖憲齊冠軍長史廣陵太守浚少涉學有才幹仕梁歷山隂吳建康三縣並有能名太清二年纍遷御史中丞時臺城為侯景所圍外援並至景表請和求解圍還江北詔許之遣右衛將軍栁津對景盟歃景知城內疫疾稍無守備因緩去期城內知其背盟復舉烽鼓譟後數日景復進表請和簡文使浚往景所景曰即日向熱非復行時政欲立效求停君可見為申聞浚曰大將軍此意意在得城下風所聞久已乏食城內雖困尚有兵糧朝廷恐和好乖二已密敕外軍若臺城傾覆勿以二宫為念當以死雪耻若不能決戰當深壁自守大將軍十萬之衆將欲何資景橫刀於膝瞋目叱之浚正色責景曰河南王親是人臣舉兵向闕今朝廷已赦王罪結盟口血未乾而復翻背沈浚六十之年死生有命豈畏逆臣之刀乎不顧而出景歎曰是真司直也然密銜之又勸張嵊立義景後得殺之韋粲字長倩京兆杜陵人車騎將軍睿之孫北徐州刺史放之子也少有父風好學仗氣身長八尺容貌甚偉初為雲麾晉安王行參軍後為外兵參軍兼中兵時潁川庾仲容吳郡張率前輩才名與粲同府並忘年交好及王為皇太子粲自記室遷步兵校尉入為東宫領直後襲爵永昌縣侯纍遷右衛率領直以舊恩任寄綢密雖居職屢徙而常留宿衛頗擅權勢誕倨不為時輩所平右衛朱異嘗於酒席厲色謂粲曰卿何得已作領軍面向人大同中帝嘗不豫一日暴劇皇太子以下並入侍疾內外咸云帝崩粲將率宫甲度臺微有喜色問所由那不見辦長梯以為大行幸前殿須長梯以復也帝後聞之怒曰韋粲願我死有司奏推之帝曰各為其主不足推也太清元年出為安逺將軍衡州刺史皇太子出餞新亭執粲手曰與卿不為久别二年召為散騎常侍還至廬陵聞侯景作逆便簡閲部下得精卒五千馬五百匹倍道赴援至豫章即就內史劉孝儀謀之孝儀曰必如此當有敕安可輕信單使妄相驚動或恐不然時孝儀置酒粲怒以杯抵地曰賊已渡江便逼宫闕水陸阻斷何暇有報假令無敕豈得自安今日何情飲酒即馳馬出部分將發會江州刺史當陽公大心遣使要粲粲乃分麾下配第八弟助第九弟警為前軍粲馳往見大心曰上遊蕃鎮江州去都最近殿下情計實宜在先但中流任重當須應接不可闕鎮今宜張軍勢移鎮盆城遣偏將賜隨於事便足大心然之遣中兵栁昕率兵二千隨粲粲悉留家纍於江州以輕舸就路至南洲粲外弟司州刺史栁仲禮亦帥步騎萬餘人至橫江粲即送糧仗贍給之并散私金帛以賞其戰士先是安北鄱陽王範亦自合肥遣西豫州刺史裴之髙與其長子嗣帥江西之衆赴都屯于張公洲待上流諸軍至是遣船度仲禮與粲合軍進屯新林王遊苑粲建議推仲禮為大都督報下流衆軍裴之髙自以年位髙耻居其下乃曰栁節下已是州將何須我復鞭杖纍日不決粲乃抗言於衆曰今同赴國難義在除賊所推栁司州者政以久捍邊疆先為侯景所憚且士馬精鋭無出其前若論位次栁在粲下語其年齒亦少於粲直以社稷之計不得復論今日貴在將和若人心不同大事去矣裴公朝之舊齒豈應復挾私以沮大計粲請為諸君解釋之乃單舸至之髙營切讓之之髙泣曰吾荷國榮自應率先士卒顧恨衰老不能效命企望栁使君共平凶逆前謂衆議已定無俟老夫爾若必有疑當剖心相示於是諸將定議仲禮方得進軍次新亭賊列陳於中興寺相持至晚各解歸是夜仲禮入粲營部分衆軍旦日將戰諸將各有據守令粲屯青塘當石頭中路粲慮柵壘未立為賊所爭頗以為憚謂仲禮曰下官才非禦侮直欲以身徇國節下善量其宜不可致有虧喪仲禮曰青塘立營逼近淮渚欲以糧儲船乘盡就泊之此事大非兄不可若疑兵少當更差軍相助粲率所部水陸俱進時昏霧軍人失道比及青塘夜已過半壘柵至曉猶未合景登禪靈寺門閣望粲營未立便率鋭卒來攻軍副王長茂勸據柵待之粲不從令軍主鄭逸逆擊之軍敗賊遂入營左右髙馮牽粲避賊粲不動猶叱子弟力戰兵死略盡遂見害年五十四粲子尼及三弟助警構從弟昻皆戰死親戚死者數百人賊傳粲首闕下以示城內簡文聞之流涕謂御史中丞蕭愷曰社稷所寄唯在韋公如何不幸先死行陳詔贈護軍將軍元帝平侯景追諡忠貞子諒以學業為陳始興王叔陵所引為中録事參軍兼記室叔陵敗伏誅陳陳不立忠義傳今取魯廣達一人以備其篇魯廣達字遍覽扶風郿人安南將軍吳州刺史悉達之弟也悉達自有傳廣逹少慷慨志立功名虛心愛士賔客自逺而至時江表將帥各領部曲動以千數而魯氏尤為多仕梁為平南當陽公府中兵參軍侯景之亂與兄悉達聚衆保新蔡梁元帝承制授晉州刺史王僧辨之討侯景廣達出境接候資奉軍儲僧辨謂沈炯曰魯晉州亦是王師東道主人仍率衆隨僧辨景平加員外散騎常侍武帝受禪授東海太守後代兄悉達為吳州刺史封中宿縣侯光大元年遷南豫州刺史華皎稱兵上流詔司空淳于量進討軍至夏口見皎舟師強盛莫敢進廣達首率驍勇直衝賊軍廣達墮水沈溺久之因救獲免皎平授巴州刺史太建初與儀同章昭達入硤口招定安蜀等諸州鎮時周圖江左大造舟艦於蜀并運糧青泥廣達與錢道戢等將兵掩襲縱火焚之仍還本鎮廣達為政簡要推誠任下吏民便之及秩滿皆詣闕表請於是詔留二年衆軍北伐略淮南舊地廣達與齊軍戰於大峴大破之斬其敷城主張元範進尅北徐州仍授北徐州刺史十年授都督合州刺史十一年周將梁士彥圍夀春詔遣中領軍樊毅左衛將軍任忠等分部趣陽平秦郡廣達率衆入淮為掎角以擊之周軍攻陷豫霍二州南北兖晉等各自拔諸將並無功遂盡失淮南之地廣達因免官以侯還第十二年與南豫州刺史樊毅北討尅郭默城尋授平西將軍都督郢州以上七州諸軍事頓兵江夏周安州總管元景征江外廣達命偏師擊走之至德二年為侍中改封綏越郡公尋為中領軍及隋將賀若弼進軍鐘山廣達於白土岡置陳與弼旗鼓相對廣達躬擐甲胄手執桴鼓率勵敢死冒刃而前隋軍退走逐北至營傷殺甚衆如是者數四及弼攻諸軍乘勝至宫城燒北掖門廣達猶督餘兵苦戰不息會日暮乃解甲面臺再拜慟哭謂衆曰我身不能救國負罪深矣士卒皆涕泣歔欷遂就執禎明三年依例入隋廣達追愴本朝淪覆遇疾不療尋以憤慨卒尚書令江總撫柩慟哭乃命筆題其棺頭為詩曰黃泉雖抱恨白日自留名悲君感義死不作負恩生又製廣達墓銘述其忠概初隋將韓擒虎之濟江廣達長子世真在新蔡乃與其弟世雄及所部奔擒虎擒虎遣使致書招廣達廣達時屯兵都下乃自劾廷尉請罪後主謂曰世真雖異路中大夫公國之重臣吾所恃賴豈得自同嫌疑之間乎加賜黃金即日還營廣達有隊主楊孝辨時從廣達在軍中力戰陷陳其子亦隨孝辨揮刀殺隋兵十餘人力窮父子俱死後魏于簡字什門代人也明元時為謁者使喻馮跋及至和龍住外不入使謂跋曰大魏皇帝有詔須馮主出受然後敢入跋使人牽逼令入見跋不拜跋令人按其項什門曰馮主拜受詔吾自以賔主致敬何須苦見逼也與跋往復聲氣厲甚既而跋止什門什門於羣衆之中回身背跋披袴後襠以辱之拘留之後隨身衣裳敗壞略盡蟣蝨被體跋遺以衣服什門拒而不受和龍人皆歎曰雖古烈士無以過也歷二十四年後馮𢎞上表稱臣乃送什門歸拜治書侍御史太武下詔曰什門奉使和龍值狂虜肆虐勇志壯厲不為屈節雖蘇武何以加之賜羊千口帛千匹進為上大夫䇿告宗廟班示天下假進不知何許人也太武初為白道守將蠕蠕大檀入塞圍之力屈被執進抗聲大罵遂為賊所殺帝追愍之贈安北將軍賜爵顯美侯諡曰莊汲固東郡梁城人也為兖州從事刺史李式坐事被收吏民皆送之至河上時式子憲生始滿月式大言於衆曰程嬰杵臼何如人也固曰今古豈殊遂便潛還不顧徑於式婦閨抱憲匿藏及捕者收憲屬有一婢産男以婢兒授之事尋泄固乃擕憲逃遁遇赦始歸憲即為固長育至十餘嵗恆呼固夫婦為郎婆後髙祐為兖州刺史嘉固節義以為主簿王元威恆農北陜人也獻文崩元威立草廬於州城門外衰裳蔬粥哭踊無時刺史茍頺以事表聞詔令問狀云先帝澤被蒼生元威不勝悲慕戀心如此不知禮式詔問元威欲有所訴聽為表列元威云聞諱悲號竊謂臣子同例無所求謁及至百日乃自竭家財設四百人齋會忌日又設百僧供至大除日詔送白紬袴褶一具與元威釋服下州令表異焉婁提代人也獻文時為內三郎獻文暴崩提謂人曰聖主升遐安用活為遂引佩刀自刺幾死文明太后詔賜帛二百匹時有敕勒部人蛭拔寅兄地于坐盜食官馬依制命死拔寅自誣已殺兄又云實非弟殺兄弟爭死辭不能定孝文詔原之劉渴侯不知何許人也稟性剛烈大和中為徐州後軍以力死戰衆寡不敵遂被擒瞋目大罵終不降屈為賊所殺孝文贈立忠將軍平州刺史上庸侯賜絹千匹榖千斛有嚴季者亦為軍校尉與渴侯同殿勢窮被執終不降屈後尋逃還除立節將軍賜爵五等男朱長生于提者並代人也孝文時以長生為員外散騎常侍與提俱使髙車既至髙車王阿伏至羅責長生等拜長生拒之阿伏至羅乃不以禮待長生長生以金銀寶器奉之阿伏至羅既受獻長生曰為臣內附宜盡臣禮何得口云再拜而實不拜呼出帳命衆中拜阿伏至羅慙其臣下大怒曰帳中何不教我而辱我於大衆奪長生等獻物內之叢石之中脅以兵曰汝能為我臣則活不降則死二人皆瞋目厲聲曰豈有天子使人拜汝夷狄我寧為魏死不為汝臣阿伏至羅彌怒絶其飲食從行者三十人皆求哀阿伏至羅乃給以肉酪唯長生與提又不從乃各分徙之積三嵗乃得還孝文以長生等守節逺同蘇武甚嘉之拜長生河內太守提隴西太守並賜爵五等男從者皆為令長朝清遼東人也祖暉濟州刺史潁川公清襲祖爵例降為伯為梁城戍將梁師攻圍糧盡城陷清抗節不屈為賊所殺宣武褒美贈樂陵太守諡曰忠子榮賔襲劉侯仁豫州人也城人白早生殺刺史司馬悅據城南叛悅息朏走投侯仁賊雖重加購募又嚴其捶撻侯仁終無漏泄朏遂免禍事寧有司奏其操行請免府籍敘一小縣詔可王榮世陽平館陶人也為三城戍主方城縣子梁師攻圍力窮知不可全乃先焚府庫後殺妻妾及賊陷城與戍副鄧元興等俱以不屈被害明帝下詔褒美忠節進榮世爵為伯贈齊州刺史元興開國子贈洛州刺史胡小彪河南河隂人也少有武氣正光末為統軍於晉夀孝昌中梁將樊文熾等冦邊益州刺史邴蚪遣長史和安固守小劍文熾圍之蚪命小彪與統軍崔珍寶同往防拒文熾掩襲小彪珍寶並禽之文熾攻小劍未陷乃將珍寶至城下使謂和安曰南軍強盛北救不來豈若歸欵取其富貴和安命射之乃退復逼小彪與和安交言小彪乃慷慨謂安曰我柵不防為賊所虜觀其兵士勢不足言努力堅守魏行臺傳梁州遣將已至賊以刀歐擊言不得終遂害之三軍莫不歎其壯節哀其死亡文熾尋奔敗禽其次將蕭世澄陳文緒等一十一人行臺魏子建壯其氣概啓以世澄購其尸柩乃獲骸骨歸葬之孫道登彭城吕縣人也永安初為梁將韋休等所虜面縛臨刃巡達村塢令其招降鄉曲道登厲聲唱呼但當努力賊無所能賊遂屠戮之又荆州被圍行臺宗靈恩遣使宗女等四人入城曉喻為賊將所獲執女等巡城令其改辭女等大言天軍垂至堅守莫降賊忿各刳其腹然後斬首二州表其節義道登等並賜五品郡五等子爵聽子弟襲爵遣使詣所在弔祭郭琰字神寶京槃人也少喪父事母以孝聞孝武帝之居藩邸琰以通俠被知及即位封新豐縣公除洛州刺史孝武西入改封馮翊郡公授行臺尚書潼關大都督大統中齊神武遣大都督竇泰襲恆農時琰為行臺衆少戰敗乃奔洛州與刺史泉企城守力窮城將陷乃仰天哭曰天乎天乎何由縱此長蛇而不助順也言發涕流不能自止兵士見之咸自厲憤竟為東魏將髙敖曹所禽復謂敖曹曰天子之臣乃為賊所執敖曹素聞其名義不殺之送於并州見齊神武言色不屈見害沓龍超晉夀人也性尚義俠少為鄉里所重永熙中梁將樊文熾來冦益州刺史傅和孤城固守龍超每出戰輒破之時攻圍既久糧矢方盡刺史遣龍超夜出請援於漢中遂為文熾所得許以封爵使告城中曰外無援軍宜早降乃置龍超於攻樓上龍超乃告刺史曰援軍數萬近在大寒文熾大怒火炙殺之至死辭氣不撓大統二年詔贈龍驤將軍巴州刺史乙速孤佛保北秀容胡酋也少驍武善射孝武帝時為直閣將軍從入關封蒲子縣公并賜弓矢大統初梁將蘭欽來冦遂陷漢中佛保時為都督統兵力戰知將敗乃先城未陷仰天大哭曰此馬吾常所乘此弓矢天恩賜我豈可令賊得吾弓馬乎遂斬馬及弓自刎而死三軍莫不壯之黃門郎趙僧慶時使漢中聞之乃收送其尸致長安天子感歎詔著作録之周周有孝節傳取李棠杜叔毗二人為編今析杜叔毗附於孝友仍以栁檜與李棠置此李棠字長卿渤海蓨人也祖伯貴魏宣武時官至魯郡守有孝行居父喪哀戚過禮遂以毁卒宣武嘉之贈渤海相父元胄員外散騎侍郎棠幼孤好學有志操年十七與髙乾兄弟舉兵信都以軍功除征虜將軍後仕東魏及髙仲密為北豫州刺史請棠為掾先是仲密與崔暹有隙暹時為齊文襄委任仲密恐其間已每不自安將圖西附時東魏又遣鎮城奚夀興典兵事仲密但知民務而已遂與棠謀殺夀興率其衆據城遣棠詣關中歸欵文帝嘉之拜棠武衛將軍封廣宗縣公位給事黃門侍郎加車騎大將軍儀同三司散騎常侍從魏安公尉遲迥伐蜀棠應募先入蜀喻之至成都蕭撝問迥軍中委曲棠不對撝乃笞辱之冀獲其實棠曰爾亡國餘燼不識安危奉命喻爾反見躓頓我王者忠臣有死而已義不為爾移志也撝不得其要指遂害之子敞嗣栁檜字季華河東解人也五世祖恭仕後趙趙亂徙居汝潁間遂仕江表父僧習與豫州刺史裴叔業歸魏歷北地潁川二郡守檜性剛簡任氣少文善騎射果於斷決年十八起家奉朝請居父喪毁瘠骨立服闋除陽城郡丞防城都督大統四年從文帝戰於河橋先登有功授都督鎮鄯州八年拜河湟郡守仍典軍事尋加平東將軍太中大夫吐谷渾入冦郡境時檜兵少人懷憂懼檜撫而勉之衆心乃安因率數十人先擊之賊潰亂餘衆乘之遂大敗而走以功封萬年縣子時吐谷渾強盛數侵疆埸自檜鎮鄯州屢戰破之數年不敢為冦十四年遷河州别駕轉帥都督俄拜使持節撫軍將軍大都督居三載徴還京師時檜兄虬為祕書丞弟慶為尚書左丞檜常謂兄弟曰兄則職典簡牘褒貶人倫弟則管轄羣司股肱朝廷可謂榮寵矣然而四方未靜車書不一檜唯當蒙矢石履危難以報國恩耳文帝謂檜曰卿昔在鄯州忠勇顯著今西境肅清無勞經略九曲國之東鄙勞君守之遂令檜鎮九曲尋從大將軍王雄討上津魏興平之即除魏興華陽二郡太守安康人黃衆寶謀反連結黨與將圍州城乃相謂曰嘗聞栁府君勇悍有餘不可當今既在外方為吾徒腹心之疾也不如先擊之遂圍檜郡郡城卑下士衆寡弱又無守禦之備連戰積十餘日士卒僅有存者於是力屈城陷身被十數創遂為賊所獲既而衆寶等進圍東梁州乃縛檜置城下欲令誘説城中檜乃大呼曰羣賊烏合糧食已罄行即退散各宜勉之衆寶大怒乃臨檜以兵曰速更汝辭不爾便就戮矣檜守節不變遂害之棄尸水中城中人皆為流涕衆寶解圍之後檜兄子止戈方收檜尸還長安贈東梁州刺史子斌嗣斌字伯達年十七齊王憲召為記室早卒斌弟雄亮字信誠父檜在華陽見害雄亮時年十四哀毁過禮隂有復讐之志武帝時衆寶率其部歸長安帝待之甚厚雄亮手斬衆寶於城中請罪闕下帝特原之後纍遷內史中大夫賜爵汝陽縣子隋文帝受禪拜尚書考功侍郎遷給事黃門侍郎尚書省凡有奏事多為駮正深為公卿所憚俄以本官檢校太子左庶子進爵為伯秦王俊鎮隴右出為秦州總管府司馬領山南道行臺左丞卒子贊嗣隋劉𢎞字仲逺彭城叢亭里人魏太常卿芳之孫也少好學有羈檢重節概仕齊楚州刺史齊亡歸周武帝以為本郡太守髙祖平陳以行軍長史從總管吐萬緒度江加上儀同封濩澤縣公拜泉州刺史會髙智慧作亂以兵攻州𢎞城守救不至糧盡無所食與士卒煮犀甲腰帶及剝樹皮食之一無離叛賊欲降之抗節彌厲城陷遂為賊所害髙祖聞而嘉歎者久之賜物二千段長子信襲其官爵遊元字楚客廣平任城人魏五更明根之元孫也父寶藏位至郡守元少聰敏仕周歷夀春令譙州司馬俱有能名開皇中為殿內侍御史煬帝嗣位遷度支郎遼東之役領左驍衛長史為蓋牟道監軍拜朝請大夫兼書侍御史宇文述等九軍敗績帝令元主其獄述時貴幸勢傾朝廷遣家僮造元有所請屬元不之見他日按述逾急仍以屬請狀劾之帝嘉其公正賜服一襲後奉使黎陽督運楊元感作逆謂元曰獨夫肆虐天下士大夫肝腦塗地我今親率義兵誅無道卿意如何元正色曰尊公荷國寵靈功參佐命髙位重祿近古莫儔當謂竭誠盡節上答鴻恩豈意墳土未乾親圖反噬僕有死而已不敢聞命元感怒脅以兵元竟不屈節於是遂見害帝甚嘉歎贈銀青光祿大夫拜其子仁宗為正議大夫弋陽郡通守馮慈明字無佚信都人也父子琮仕齊至左僕射慈明在齊為中書舍人開皇中兼內史舍人大業中位尚書兵部郎加朝請大夫十三年攝江都郡丞事李密之逼東都也詔慈明令安集瀍洛至鄢陵為密黨崔樞所執密延於坐而謂之曰吾欲率四方之衆問罪於江都卿以為如何慈明曰慈明直道事人有死而已不義之言非所敢對密不悅冀其後改乃加禮焉慈明潛使人奉表江都及致書東都留守論賊形勢密知其狀義而釋之出至營門為賊帥翟讓所瞋責慈明勃然曰天子使我來正欲除爾輩不圖為賊黨所獲我豈從汝求活邪須殺但殺何須罵詈讓益怒於是亂刀斬之時年六十八梁郡通守楊汪上狀煬帝歎息之贈銀青光祿大夫拜其二子怦惇俱為尚書承務郎王世充推越王侗為主重贈柱國戶部尚書黎陽郡公諡曰壯武長子忱先在東都王世充破李密忱亦在軍中遂遣奴負父尸柩詣東都身不自送未幾又盛華燭納室時論醜之張須陀𢎞農閿鄉人也性剛烈有勇略弱冠從史萬嵗討西爨以功授儀同後從楊素擊平漢王諒加開府大業中為齊郡贊務會興遼東之役嵗飢須陀將開倉賑給官屬咸曰須待詔敕須陀曰如待報至當委溝壑吾若以此獲罪死無所恨先開倉而後上狀帝嘉而不責時天下承平日久多不習兵須陀獨勇決善戰又長於撫馭得士卒心論者號為名將時賊帥王薄北連豆子􅀈賊孫宣雅石祗闍郝孝德等衆十餘萬攻章邱須陀大破之露布以聞帝大悅優詔褒揚令使者圖畫其形容奏之其年賊裴長才石子河等奄至城下須陀與戰長才敗走後數旬賊帥秦君𢎞郭方預等圍北海須陀倍道而進大破之司𨽻刺史裴操之上狀帝遣使勞問之十年賊左孝友屯蹲狗山須陀列八營以逼之孝友窘逼面縛來降其黨解散又有王良鄭大彪李脘等衆各萬計須陀悉平之威震東夏以功遷齊郡通守領河南道十二郡黜陟討捕大使俄而賊盧明月衆十餘萬將冦河北次祝阿須陀邀擊殺數千人賊吕明星師仁泰霍小漢等衆各萬餘擾濟北須陀擊走之尋將兵拒東郡賊翟讓前後三十餘戰每破走之轉滎陽通守時李密説讓取洛口倉遂率兵逼滎陽須陀拒之讓懼而退走須陀逐北李密先伏兵數千人邀須陀遂與讓合軍圍之須陀敗潰圍輒出左右不能盡出復躍馬入救之往來數四衆皆敗乃仰天歎曰兵敗如此何面見天子乎乃下馬戰死其所部兵晝夜號哭數日不止帝令其子元備總父兵元備時在齊郡遇賊竟不果行越王侗遣裴仁基招其衆移鎮虎牢楊善會字敬仁𢎞農華隂人也父初位毗陵太守善會大業中為鄃令以清正聞俄而百姓聚起為盜善會討之往皆尅捷後賊帥張金稱屯于縣界善會每挫其鋒煬帝遣將軍假達討金稱善會進計於達達不能用軍竟敗後進止一以謀之乃大尅金稱復引勃海賊孫宣雅髙士達等破黎陽而還善會邀破之擢拜朝請大夫清河郡丞于時山東思亂從盜如市郡縣微弱陷沒相繼能抗賊者善會而已前後七十餘陳未嘗負敗每恨衆寡相殊未能滅賊會太僕楊義臣討金稱見敗取善會定策善會遂與金稱戰賊乃退走善會捕斬之傳首行在所帝賜以上方甲矟弓劒進拜清河通守復從楊義臣斬漳南賊帥髙士達傳首江都宫帝下詔褒揚之後為竇建德所圍城陷建德釋而禮之用為貝州刺史善會罵之曰老賊何敢擬議國士建德知終不為己用遂害之清河士庶莫不傷痛獨孤盛不知何許人也父屯本姓李氏仕周賜姓獨孤兄楷長平太守自有傳盛性剛烈有膽略以煬帝藩邸之舊纍遷右屯衛將軍宇文化及之亂裴虔通引兵至成象殿宿衛者皆釋仗走盛謂虔通曰何物兵勢太異虔通曰事已然不預將軍事盛罵曰老賊何物語不及被甲與左右十餘人逆拒之為亂兵所殺越王侗稱制贈光祿大夫紀國公諡曰武節盧楚涿郡范陽人也祖景祚魏司空掾楚少有才學性鯁急口吃言語澀難大業中為尚書左司郎當朝正色甚為公卿所憚及帝幸江都東都官僚多不奉法楚每存糾舉無所回避越王侗稱尊號以楚為內史令左備身將軍尚書左丞右光祿大夫封涿郡公與元文都等同心勠力以輔侗文都將誅王世充以靖亂楚與其謀及文都為人所告世充以兵入犯太陽門武衛將軍皇甫無逸斬關逃難呼楚同去楚曰僕與元公有約若社稷有難誓以俱死今捨去不義及世充入楚匿太官署尋被執世充奮袂令斬於是鋒刃交下支體糜碎元文都者魏宗室也父矩周小冢宰元都事在魏汝隂王天賜傳中劉子翊彭城叢亭里人也父遍齊徐州司馬子翊少好學頗解屬文性剛謇有吏幹開皇中為秦州司法參軍因入考楊素奏為侍御史時永寧縣令李公孝四嵗喪母九嵗外繼其後父更别娶後妻至是而亡河間劉炫以為無撫育之恩議不解任子翊駮之曰傳云繼母同母也當以配父之尊居母之位齊杖之制皆如親母又為人後者為其父母期服者自以本生非殊親之與繼也父雖自處傍尊之地於子之情猶須隆其本重是以令云為人後者其父母並解官申其心喪父卒母嫁為父後者雖不服亦申心喪其繼母嫁不解官此専據嫁者主文耳將知繼母在父之室則制同親母若謂非有撫育之恩同之行路何服之有乎服既有之心喪焉可獨異三省令旨其義甚明今言令許不解何其甚謬且後人者為其父母期未有變隔以親繼親既等故心喪不得有殊服問云母出則為繼母之黨服豈不以出母族絶推而逺之繼母配父引而親之乎子思曰為伋也妻者是為白也母不為伋也妻者是不為白也母是知服以名重情以父親所以聖人敦之以孝慈𢎞之以名義是使子以名服同之親母繼母以義報等之已生如謂繼母之來在子出之後制有淺深者考之經傳未見其文譬出後之人所後者初亡後之者至此後可以無撫育之恩而不服重乎昔長沙人王毖漢末為上計詣京師既而吳魏隔絶毖在內國更娶生子昌毖死後昌為東平相始知吳之母亡便情繫居重不攝職事于時議者不以為非然則繼之與前於情無别若要以撫育始生服制王昌復何足云乎又晉鎮南將軍羊祜無子取弟子伊為子祜薨伊不服重祜妻表聞伊辭曰伯生存養己伊不敢違然無父命故還本生尚書彭權議子之出養必由父命無命而出是為叛子於是下詔從之然則心服之制不得緣恩而生也論云禮者稱情而立文杖義而設教還以此義諭彼之情稱情者如母之情杖義者為子之義分定然後能尊父順名崇禮篤敬茍以姆養之恩始成母子則恩由彼至服自己來則慈母如母何待父令又云繼母慈母本實路人臨已養已同之骨血若如斯言子不由父縱有恩育得如母乎其慈繼雖在三年之下而居齊期之上禮有倫例服以稱情繼母本以名服豈藉恩之厚薄也至於兄弟之子猶子也私昵之心實殊禮服之制無二彼言以輕如重因以不同此謂如重之辭即同重法若使輕重不等何得為如律云準枉法者但準其罪以明法論者即同真法律以弊刑禮以設教準者準擬之名以者即真之稱如以二字義用不殊禮律兩文所防是一將此明彼足見其義取譬伐柯何逺之有論云取子為後者將以供承祧廟奉養己身不得使宗子歸其故宅以子道事本父之後妻也然本父後妻因父而得母稱若如來旨本父亦可無心喪乎何直父之後妻也論又云禮言舊君其尊豈復君乎已去其位非復純臣須言舊以别之别有所重非復純孝故言其已見之日以其父之文是名異也此又非通論何以言之其舊訓殊所用亦别舊者易新之稱其者因彼之辭安得以相類哉至如書云其父析薪其子不克負荷傳云衛雖小其君在焉若其父而有異其君復有異乎斯不然矣今炫敢違禮乖令侮聖干法使出後之子無情於本生名義之分有虧於風俗茍飾非於明世強媒蘖於禮經雖欲揚已露才不覺言之傷理事奏竟從子翊之議歷新豐令大理正並有能名擢授書侍御史每朝廷疑議子翊為之辨析多出衆人意表從幸江東屬天下大亂帝猶不悟子翊因侍切諫由是忤旨令子翊為丹陽留守尋遣於上江督運為賊吳碁子所虜子翊説之因以衆降復遣首領賊渡江遇煬帝被弒知而告之子翊弗信斬所言者賊又請以為主不從因執至臨川城下使告城中云帝崩子翊乃易其言於是見害堯君素魏郡蕩隂人也煬帝為晉王時君素以左右從及嗣位纍遷鷹揚郎將大業末從驍衛大將軍屈突通拒唐兵於河東俄而通引兵南遁以君素有膽略署領河東通守唐遣吕紹宗韋儀節等攻之不克及通軍敗歸唐至城下呼之君素見通歔欷流涕悲不自勝左右皆哽咽通亦泣下因謂君素曰吾軍已敗義旗所指莫不響應事勢如此卿當早降以取富貴君素答曰公當爪牙之寄為國大臣主上委公以關中代王付公以社稷國祚隆替屬之於公奈何不思報效以至於此縱不能逺慚主上公所乘馬即代王所賜也公何面目乘之哉通曰吁君素我力屈而來君素曰我今力猶未屈何用多言通慚而退時圍甚急行李斷絶君素乃為木鵝置表於頸具論事勢浮之黃河沿流而下河陽守者得之達于東都越王侗見而歎息及承制拜君素為金紫光祿大夫密遣行人勞之監門直閣龎玉武衛將軍皇甫無逸前後自東都歸唐俱造城下為陳利害唐又賜金劵待以不死君素卒無降心其妻又至城下謂之曰隋室已亡天下有所屬君何自苦身取戮辱君素曰天下事非婦人所知引弓射之應弦而倒君素自知事必不濟每言及隋國未嘗不歔欷流涕常謂將士曰吾是藩邸舊臣義不得不死今榖足支數年食盡此榖足知天下事必若隋室傾敗天命有歸吾當斷頭以付諸君也時百姓苦隋日久及唐兵起人有息肩之望又頗得江都傾覆消息兼糧食絶男女相食衆心離駭白虹降於府門兵器之端夜皆光見月餘君素為左右所害陳孝意張季珣杜松贇並以誠節顯孝意河東人大業初為魯郡司法書佐郡內號為亷平太守蘇威嘗欲殺一囚孝意固諫不許孝意因解衣請先受死良久威意乃解謝而遣之漸加禮敬及威為納言奏孝意為侍御史後以父憂去職居喪過禮有白鹿馴擾其廬時人以為孝感尋起授鴈門郡丞在郡菜食齋居朝夕哀臨每一發聲未嘗不絶倒柴毁骨立見者哀之時長吏多贓汚孝意清節彌厲發姦擲伏動若有神吏民稱之煬帝幸江都馬邑劉武周殺太守王仁恭作亂前郡丞楊長仁鴈門令王確等謀應賊孝意知之族滅其家郡中戰栗俄而武周來攻孝意拒之每致尅捷但孤城無援而孝意誓以必死亦知帝必不反每旦夕向詔敕庫俯伏涕流悲慟左右糧盡為校尉張世倫所殺以歸武周張季珣京兆人父祥少為隋文帝所知引為丞相參軍纍遷并州司馬及漢王諒反遣其將劉建攻之縱火燒其郭下祥見百姓驚駭其城西有王母廟登城望之再拜號泣曰百姓何罪致此焚燒神其有靈可降雨相救言訖廟上雲起雨降其火遂滅士卒感其至誠莫不用命援軍至賊退以功授開府後卒於都水監季珣少慷慨有志節大業末為鷹揚郎將所居據箕山為固與洛口接及李密陷倉城遣呼之季珣大罵密怒攻之連年不能尅經三年資用盡無薪徹屋而爨人皆穴處季珣撫之一無離叛後士卒飢羸為密所陷季珣坐聽事顔色自若密遣兵禽送之羣賊曵令拜密季珣曰吾雖敗軍將猶是天子爪牙臣何容拜賊密壯而釋之翟讓從求金不得殺之其弟仲琰為上洛令及唐兵起城守部下殺之以歸唐仲琰弟幼宗為千牛左右宇文化及亂遇害季珣家世忠烈兄弟俱死國難論者賢之杜松贇北海人性剛烈重名義為石門府隊正大業末賊楊厚來攻北海縣松贇覘賊被執使謂城中云郡兵已破宜早歸降松贇偽許之既至城下大呼曰我邂逅被執非力屈也官軍大來賊旦暮禽翦賊以刀築其口引之去松贇罵厚曰老賊何敢辱賢良言未卒賊斷其腰城中望之莫不流涕扼腕鋭氣益倍北海卒完優贈朝請大夫本郡通守通志卷一百六十六
