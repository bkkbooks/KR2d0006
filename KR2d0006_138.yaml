body:
  text: 通志卷一百十八下宋右迪功郎鄭樵漁仲撰列傳第三十一下廖立字公淵武陵臨沅人先主領荆州牧辟為從事年及三十擢為長沙太守先主入蜀諸葛亮鎮荆土孫權遣使通好於亮因問士人有誰相經緯者亮答曰龐統廖立椘之良才當贊興世業者也建安二十年權遣吕蒙奄襲南三郡立脫身走自歸先主先主素識待之不深責也以為巴郡太守二十四年先主為漢中王徴立為侍中後主襲位徙長水校尉立本意自謂才名宜為諸葛亮之二而更遊散在李嚴等下常懷怏怏後丞相掾李郃蔣琬至立所立謂曰軍當逺出卿諸人好諦其事昔先主不取漢中走與吳人爭南三郡卒以三郡與吳人徒勞役吏士無益而還既亡漢中使夏侯淵張郃深入於巴幾喪一州後至漢中使關侯身死無孑遺上庸覆敗徒失一方是關怙恃勇名作軍無法直以意突耳故前後數喪師衆也如向朗文恭凡俗之人耳恭作治中無綱紀朗昔奉馬良兄弟謂為聖人今作長史素能合道中郎郭演長從人者耳不足與經大事而作侍中今弱世也欲任此三人為不然也王連流俗茍作掊克使百姓疲弊以致今日郃琬具白其言於諸葛亮亮表立曰長水校尉廖立坐自貴大臧否羣士公言國家不任賢達而任俗吏又言萬人率者皆小子也誹謗先帝疵毁衆臣人有言國家兵衆簡練部伍分明者立舉頭視屋憤吒作色曰何足言凡如是者不可勝數羊之亂羣猶能為害况立託在大位中人以下識真偽邪於是廢立為民徙汶山郡立躬率妻子耕殖自守聞諸葛亮卒垂泣歎曰吾終為左袵矣後監軍薑維率偏軍經汶山往詣立稱立意氣不衰言論自若立遂終於徙所妻子還蜀李嚴字正方南陽人也少為郡職吏以才幹稱荆州牧劉表使歷諸郡縣曹操入荆州時嚴宰秭歸遂西詣蜀劉璋以為成都令復有能名建安十八年署嚴為護軍拒先主於綿竹嚴率衆降先主先主拜嚴裨將軍成都既定為犍為太守興業將軍二十三年盜賊馬秦高勝等起事於郪合聚部伍數萬人到資中縣時先主在漢中嚴不更發兵但率將郡士五千人討之斬秦勝等首枝黨星散悉復民籍又越嶲夷率高定遣軍圍新道縣嚴馳赴救賊皆破走加輔漢將軍領郡如故章武二年先主徴嚴詣永安宫拜尚書令二年先主疾病嚴與諸葛亮並受遺詔輔少主以嚴為中都護統內外軍事留鎮永安建興元年封都鄉侯假莭加光祿勳四年轉為前將軍以諸葛亮欲出軍漢中嚴當知後事移屯江州留護軍陳到駐永安皆統屬嚴嚴與孟達書曰吾與孔眀俱受寄託憂深責重思得良伴亮亦與達書曰部分如流趣捨罔滯正方性也其見貴重如此八年遷驃騎將軍以曹真欲三道向漢川亮命嚴將二萬人赴漢中亮表嚴子豐為江州都督督軍典嚴後事亮以明年當出軍命嚴以中都護署府事嚴改名為平九年春亮軍祁山平督運事值秋夏之際霖雨運糧不繼平遣參軍狐忠督軍成藩喻指呼亮還亮承以退軍平聞軍退乃更陽驚説軍糧饒足何以便歸欲以解已不辦之責顯亮不進之愆也又表後主説軍偽退欲以誘賊與戰亮具出其前後手筆書疏本末平違錯章灼平辭窮情竭首謝罪負於是亮表廢平為民徙梓潼郡十二年平聞亮卒發病死平常冀亮當自補復䇿後人不能故以激憤也豐官至朱提太守劉琰字威碩魯國人也先主在豫州辟為從事以其宗姓風流善談論厚親待之遂隨從周旋常為賔客先主定益州以琰為固陵太守後主立封都鄉侯班位每亞李嚴為衛尉中軍師後將軍遷車騎將軍然不豫國政但領兵千餘隨丞相亮諷議而已車服飲食號為侈靡侍婢數十皆能為聲樂又悉教誦讀魯靈光殿賦建興十年與前軍師魏延不和言語虛誕亮責讓之琰與亮箋陳謝深自懲責於是亮遣琰還成都官位如故琰失志慌惚十二年春琰妻胡氏入賀太后太后令特留胡氏經月乃出胡氏有美色琰疑其與後主有私呼卒五百撾胡至於以履搏面而後棄遣胡具以告琰坐下獄有司議曰卒非撾妻之人面非受履之地琰竟棄市自是大臣妻母朝慶遂絶魏延字文長義陽人也以部曲隨先主入蜀數有戰功遷牙門將軍先主為漢中王遷治成都當得重將以鎮漢川衆論以為必在張飛飛亦以心自許先主乃拔延為督漢中鎮逺將軍領漢中太守一軍盡驚先主大會羣臣問延曰今委卿以重任卿居之欲云何延對曰若曹操舉天下而來請為大王拒之偏將十萬之衆至請為大王吞之先主稱善衆咸壯其言先主踐尊號進拜鎮北將軍建興元年封都亭侯五年諸葛亮駐漢中更以延為督前部領丞相司馬涼州刺史八年使延西入羌中魏後將軍費瑶雍州刺史郭淮與延戰于陽溪延大破淮等遷為前軍師征西大將軍假節進封南鄭侯延每隨亮出輒欲請兵萬人與亮異道會於潼關如韓信故事亮制而不許延常謂亮為怯嘆恨己才用之不盡延既善飬士卒勇猛過人又性矜高當時皆避下之唯楊儀不假借延延以為至忿有如水火十二年亮出北谷口延為前鋒去亮營十里延夢頭上生角以問占夢趙直直詐延曰夫麒麟有角而不用此不戰而賊欲自破之象也退而告人曰角之為字刀下用也頭上用刀其凶甚矣秋亮病困密與長史楊儀司馬費禕護軍薑維等作身歿之後退軍莭度令延斷後薑維次之若延或不從命軍便自發亮適卒祕不發喪儀令禕往揣延意指延曰丞相雖亡吾自見在府親官屬便可將喪還葬吾自當率諸軍擊賊云何以一人死而廢天下之事邪且魏延何人當為楊儀所部勒作斷後將乎因與禕共作留部分令禕手書與已連名告下諸將禕紿延曰當為君還解楊長史長史文吏稀更軍事必不違命也禕出門馳馬而去延尋悔追之已不及矣延遣人覘儀等遂便欲案亮成規諸營相次引軍還延大怒攙儀未發率所領徑先南歸所過燒絶閣道延儀各相表叛逆一日之中羽檄交至後主以問侍中董允留府長史蔣琬琬允咸保儀疑延儀等槎山通道晝夜兼行亦繼延後延先至據南谷口遣兵逆擊儀等儀等令何平在前禦延平叱延先登曰公亡身尚未寒汝輩何敢乃爾延士衆知曲在延莫為用命軍皆散延獨與其子數人逃亡奔漢中儀遣馬岱追斬之致首於儀儀起自踏之曰庸奴復能作惡不遂夷延三族初蔣琬率宿衛諸營赴難北行行數十里延死問至乃旋原延意不北降魏而南還者但欲除殺儀等平日諸將素不同者冀時論必當以代亮本指如此不便背叛楊儀字威公襄陽人也建安中為荆州刺史傅羣主簿背羣而詣襄陽太守關侯侯命為功曹遣奉使西詣先主先主與語論軍國計䇿政治得失大悅之因辟為左將軍兵曹掾及先主為漢中王拔儀為尚書先主稱尊號東征吳儀與尚書令劉巴不睦左遷遙署𢎞農太守建興三年丞相亮以為參軍署府事將南行五年隨亮漢中八年遷長史加綏軍將軍亮數出軍儀常規畫分部籌度糧穀不稽思慮斯須便了軍戎莭度取辦於儀亮深惜儀之才幹慿魏延之驍勇常恨二人之不平不忍有所偏廢也十二年隨亮出屯谷口亮卒於敵場儀既領軍還又誅討延自以為功勳至大宜當代亮秉政呼都尉趙正以周易筮之卦得家人默然不悅而亮平生密指以儀性狷狹意在蔣琬琬遂為尚書令益州刺史儀至拜為中軍師無所統領從容而已初儀為先主尚書琬為尚書郎後雖俱為丞相參軍長史儀每從行當其勞劇自為年宦先琬才能踰之於是怨憤形于聲色嘆吒之音發于五內時人畏其言語不莭莫敢從也惟後軍師費禕往慰省之儀對禕恨望前後云云又語禕曰往者丞相亡沒之際吾若舉軍以就魏氏處世寧當落度如此邪令人追悔不可復及禕密表其言十三年廢儀為民徙漢嘉郡儀至徙所復上書誹謗辭指激切遂下郡收儀儀自殺其妻子還蜀霍峻字仲邈南郡枝江人也兄篤於鄉里合部曲數百人篤卒荆州牧劉表令峻攝其衆表卒峻率衆歸先主先主以峻為中郎將先主自葭萌南還襲劉璋留峻守葭萌城張魯遣將楊帛誘峻求共守城峻曰小人頭可得城不可得帛乃退去後璋將扶禁向存等帥萬餘人由閬水上攻圍峻且一年不能下峻城中兵才數百人伺其怠隙選精鋭出擊大破之即斬存首先主定蜀嘉峻之功乃分廣漢為梓潼郡以峻為梓潼太守禆將軍在官三年年四十卒還葬成都先主甚悼惜乃詔諸葛亮曰峻既佳士加有功於國欲行酹遂親率羣僚臨會弔祭因留宿墓上當時榮之子弋字紹先先主末年為太子舍人後主踐阼除謁者丞相諸葛亮北駐漢中請為記室使與子喬共周旋遊處亮卒為黃門侍郎後主立太子璿以弋為中庶子璿好騎射出入無度弋援引古義盡言規諌甚得切磋之體後為參軍庲降屯副二都督又轉護軍統事如前時永昌郡夷獠恃險不賔數為寇害乃以弋領永昌太守率偏軍討之遂斬其豪率破壞邑落郡界寧靜遷監軍翊軍將軍領建寧太守還統南郡事景耀六年進拜安南將軍是嵗蜀并于魏初弋聞有魏師欲赴成都後主以備敵既定不聽及成都不守弋素服號哭大臨三日諸將咸勸宜速降弋曰今道路隔塞未知主上安危大故去就不可茍也若主上與魏和見遇以禮則保境而降不晚也若萬一危辱吾將以死拒之何論遲速邪及得後主東遷之問始率六郡將守上表納質魏相國司馬昭嘉其義就拜南中都督委以本任遣將兵救吕興平交址日南九真三郡以功封列侯弋孫彪為晉越嶲太守王連字文儀南陽人也劉璋時入蜀為梓潼令先主起事葭萌進軍來南連閉城不降先主義之不強逼也及成都既平以連為什邡令轉任廣都所居有績遷司鹽校尉較鹽鐡之利利入甚多有禆國用於是簡取良才以為官屬若吕乂杜祺劉幹等終皆至大官自連所拔也遷蜀郡太守興業將軍領鹽府如故建興元年拜屯騎校尉領丞相長史封平陽亭侯時南方諸郡不賔諸葛亮將自征之連諌以為此不毛之地疫癘之鄉不宜以一國之望冒險而行亮慮諸將才不及已意欲必往而連言輒懇至故停留者久之會連卒子山嗣官至江陽太守向朗字巨達襄陽宜城人也荆州牧劉表以為臨沮長表卒歸先主先主定江南使朗督秭歸夷道巫山夷陵四縣軍民事蜀既平以朗為巴西太守頃之轉任牂牱又徙房陵後主踐阼為步兵校尉代王連領丞相長史丞相亮南征朗留統後事五年隨亮漢中朗素與馬謖善謖逃亡朗知情不舉亮恨之免官還成都數年為光祿勳亮卒後徙左將軍追論舊功封顯明亭侯位特進初朗少時雖涉獵文學然不治素檢以吏能見稱自去長史優遊無事垂二十年乃更潛心典籍孜孜不倦年踰八十猶手自校書刋定謬誤積聚篇卷於時最多開門接賔誘納後進但講論古義不干時事以是見稱上自執政下及童冠皆敬重焉延熙十年卒子條嗣景耀中為御史中丞朗兄子寵先主時為牙門將秭歸之敗寵營特完建興元年封都亭侯後為中部督典宿衛兵諸葛亮當北行表與後主曰將軍向寵性行均淑曉暢軍事試用於昔先帝稱之曰能是以衆論舉寵為督愚以為營中之事悉以咨之必能使行陳和睦優劣得所也遷中領軍延熙三年征漢嘉蠻夷遇害寵弟充歷射聲校尉尚書張裔字君嗣蜀郡成都人也治公羊春秋博涉史漢汝南許文休入蜀謂裔幹理敏捷是中夏鍾元常之倫也劉璋時舉孝廉為魚復長還州署從事領帳下司馬張飛自荆州由墊江入璋授裔兵拒張飛於德陽陌下軍敗還成都為璋奉使詣先主先主許以禮其君而安其人也裔還城門乃開先主以裔為巴郡太守還為司金中郎將典作農戰之器先是益州郡殺太守正昻耆率雍闓恩信著於南土使命周旋逺通孫權至是先主乃以裔為益州太守徑往至郡闓遂趦趄不賔假鬼教曰張府君如瓠壺外雖澤而內實粗不足殺令縛與吳于是遂送裔於權會先主薨諸葛亮遣鄧芝使吳亮令芝言次可從權請裔裔自至吳數年流徙伏匿權未之知也故許芝遣裔裔臨發權乃引見問裔曰蜀卓氏寡女亡奔司馬相如貴土風俗何以乃爾乎裔對曰愚以為卓氏之寡女猶賢於買臣之妻權又謂裔曰君還必用事西朝終不作田父於閭里也將何以報我裔對曰裔負罪而歸將委命有司若蒙徼幸得全首領五十八已前父母之年也自此已後大王之賜也權言笑歡悅有器裔之色裔出閣深悔不能陽愚即便就船倍道兼行權果追之裔已入永安界數十里追者不能及既至蜀丞相亮以為參軍署府事又領益州治中從事亮出駐漢中裔以射聲校尉領留府長史常稱曰公賞不遺逺罰不阿近爵不可以無功取刑不可以貴勢免此賢愚之所以僉忘其身者也其眀年北詣亮咨事送者數百車乘盈路裔還書與所親曰近者涉道晝夜接賔不得寧息人自敬丞相長史男子張君嗣附之疲倦欲死其談啁流速皆此類也少與犍為楊恭友善恭早死遺孤未數嵗裔迎留與分屋而居事恭母如母恭之子息長大為之娶婦買田宅産業使立門户撫恤故舊振贍衰宗行義甚至加輔漢將軍領長史如故建興八年卒子毣音忙角反嗣歷三郡守監軍毣弟郁太子中庶子楊洪字季休犍為武陽人也劉璋時歷部諸郡先主定蜀太守李嚴命為功曹嚴欲徙郡治舍洪固諌不聽遂辭功曹請退嚴欲薦洪於州為蜀部從事先主爭漢中急書發兵軍師將軍諸葛亮以問洪洪曰漢中則益州咽喉存亡之機會若無漢中則無蜀矣此家門之禍也方今之事男子當戰女子當運發兵何疑時蜀郡太守法正從先主北行亮於是表洪領蜀郡太守衆事皆辦遂使即真頃之轉為益州治中從事先主既稱尊號征吳不克還住永安漢嘉太守黃元素為諸葛亮所不善聞先主病疾懼有後患舉郡反燒臨卭城時亮東行省疾成都單虛是以元益無所憚洪即啓太子遣其親兵使將軍陳曶鄭綽討元衆議以為元若不能圍成都當由越嶲據南中洪曰元性素凶暴無他恩信何能辨此不過乘水東下冀主上平安面縳歸死如其有異奔吳求活耳敕曶綽但於南安峽口遮即便得矣曶綽承洪言果生獲元洪建興元年賜爵關內侯復為蜀郡太守忠莭將軍後為越騎校尉領郡如故五年丞相亮北駐漢中欲用張裔為留府長史問洪何如洪對曰裔天姿明察長於治劇才誠堪之然性不公平恐不可専任不如留向朗朗情偽差少裔隨從目下效其器能於事兩善初裔與洪親善裔流放在吳洪臨裔郡裔子郁給郡吏以微過受罰洪不原假裔後還聞深以為恨與洪情好有損及洪見亮出至裔所具説所言裔答洪曰公留我了矣明府不能止時人或疑洪意自欲作長史或疑洪知裔自嫌不願裔處要職典後事也後裔與司鹽校尉岑述不和至於忿恨亮與裔書曰君昔在陌下營壞吾之用心食不知味後流迸南海相為悲歎寢不安席及其來還委付大任同奬王室自以為與君古之石交也石交之道舉讐以相益割骨肉以相明猶不相謝也况吾但委意於元儉而君不能忍邪論者由是明洪無私洪少不好學問而忠清款亮憂公如家事繼母至孝六年卒官始洪為李嚴功曹嚴未至犍為而洪已為蜀郡洪迎門下書佐何祗有才䇿功幹舉郡吏數年為廣漢太守時洪亦在蜀郡是以西土咸服諸葛亮能盡時人之器用也祗字君肅少寒貧為人寬厚通濟體甚壯大又能飲食好聲色不持莭儉故時人少貴之者嘗夢井中生桑以問占夢趙直直曰桑非井中之物會當移植然桑字四十下八君壽恐不過此祗笑言得此足矣初仕郡後為督軍從事時諸葛亮用法峻密隂聞祗遊戲放縱不勤所職當奄往録獄衆人咸為祗懼祗密聞之夜張燈火見囚讀諸解狀亮果晨往祗悉已暗誦答對解釋無所凝滯亮甚異之出補成都令時郫縣令缺以祗兼二縣二縣户口猥多切近都邑饒諸姦穢每比常入眠睡值其覺寤輒得姦詐衆咸畏祗之發擲故以為有術無敢欺者祇嘗使人投算聽其讀而心計之不差升合其精如此汶山夷不安以祗為汶山太守民夷服信遷廣漢太守後夷反畔辭令得前何府君乃能安我耳時難屈祗拔祗族人為汶山太守夷復得安轉祗為犍為年四十八卒如趙直所言費詩字公舉犍為南安人也劉璋時為綿竹令先主攻綿竹時詩先舉城降成都既定先主領益州牧以詩為督軍從事出為牂牱太守還為州前部司馬先主為漢中王遣詩拜關侯為前將軍侯聞黃忠為後將軍侯怒曰大丈夫終不與老兵同列不肯受拜詩謂侯曰夫立王業者所用非一昔蕭曹與高祖少小親舊而陳韓亡命後至論其班列韓最居上未聞蕭曹以此為怨今漢王以一時之功隆崇於漢升然意之輕重寧當與君侯齊乎且王與君侯譬猶一體同休等戚禍福共之愚謂君侯不宜計官號之高下爵祿之多少為意也僕一介之使銜命之人君侯不受拜如是便還但相為惜此舉動恐有後悔耳侯大感悟遽即受拜後羣臣議欲推漢中王稱尊號詩上疏曰殿下以曹操父子逼主篡位故乃羈旅萬里糾合士衆將以討賊今大敵未死而先自立恐人心疑惑昔高祖與椘約先破秦者王及屠咸陽獲子嬰猶懷推讓况今殿下未出門􅒉便欲自立邪愚臣實不為殿下取也由是忤旨左遷部永昌從事建興三年隨諸葛亮南征歸至漢陽適降人李鴻來詣亮亮見鴻時蔣琬與詩在坐鴻曰間過孟達許適見王沖從南來言往者達之去就明公切齒欲誅達妻子賴先主不聽耳達曰諸葛亮見顧有本末終不爾也盡不信沖言委仰明公無復己巳亮謂琬詩曰還都當有書與子度相聞詩進曰孟達小子昔事振威不忠後又背叛先主反覆之人何足與書邪亮默然不答亮欲誘達以為外援竟與達書曰往年南征嵗未及還適與李鴻會於漢陽承知消息慨然永嘆以存足下平素之志豈徒空託名榮貴為乖離乎嗚呼孟子斯實劉封侵陵足下以傷先主待士之義又鴻道王沖造作虛語云足下量度吾心不受沖説尋表明之言追平生之好依依東望故遣此書達得亮書數相交通辭欲叛魏魏遣司馬懿征之即斬滅達亮亦以達無欵誠之心故不救助也蔣琬秉政以詩為諌議大夫卒於家王沖者廣漢人為牙門將統屬江州督李嚴為嚴所疾懼罪降魏魏以為樂陵太守詩子立晉散騎常侍杜微字國輔梓潼涪人也少受學於廣漢任安劉璋辟為從事以疾去官及先主定蜀微常稱聾閉門不出建興二年丞相亮領益州牧選迎皆妙簡舊德以秦宓為别駕五梁為功曹微為主簿微固辭輿而致之既至亮引見微微自陳謝亮以微不聞人語於坐上與書曰服聞德行飢渴歷時清濁異流無緣咨覯王元泰李伯仁王文儀楊李休丁君幹李永南兄弟文仲寶等每嘆高志未見如舊猥以空虛統領貴州德薄任重慘慘憂慮朝廷主公今年始十八天姿仁敏愛德下士天下之人思慕漢室欲與君因天順民輔此明主以隆季興之功著勳於竹帛也以謂賢愚不相為謀故自割絶守勞而已不圗自屈也微自乞老病求歸亮又與書答曰曹丕篡弒自立為帝是猶土龍芻狗之有名也欲與羣賢因其邪偽以正道滅之怪君未有相誨便欲求還於山野丕又大興師役以向吳椘今因丕多務且以閉境勤農育飬人物並治甲兵以待其挫然後伐之可使兵不戰民不勞而天下定也君但當以德輔時耳不責君軍事何為汲汲欲求去乎其敬微如此拜為諌議大夫以從其志五梁者字德山犍為南安人也以儒學莭操稱從議郎遷諌議大夫五官中郎將杜瓊字伯瑜蜀郡成都人也少受學於任安精究安術劉璋時辟為從事先主定益州領牧以瓊為議曹從事後主踐阼拜諌議大夫遷左中郎將大鴻臚太常為人靜默少言闔門自守不與世事蔣琬費禕等皆器重之雖學業入深初不視天文有所論説後進通儒譙周常問其意瓊答曰欲眀此術甚難須當身視識其形色不可信人也晨夜苦劇然後知之復憂漏泄不如不知是以不復視也周因問曰昔周徴君舒以為當塗髙者魏也其義何也瓊答曰魏闕名也當塗而髙聖人取類而言耳又問周曰寧復有所怪邪周曰未達也瓊又曰古者名官職不言曹始自漢以來名官盡言曹吏言屬曹卒言侍曹此殆天意也瓊年八十餘延熙十三年卒著韓詩章句十餘萬言不教諸子內學無傳業者周緣瓊言乃觸類而長之曰春秋傳著晉穆侯名太子曰仇弟曰成師師服曰異哉君之名子也嘉耦曰妃怨耦曰仇今君名太子曰仇弟曰成師始兆亂矣兄其替乎其後果如服言及漢靈帝名二子曰史侯董侯既立為帝後皆免為諸侯與師服言相似也先主諱備其訓具也後主諱禪其訓授也如言劉已具當授與人也意者甚於穆侯靈帝之名子後宦人黃皓弄權於內景耀五年宫中大樹無故自折周深憂之無所與言乃書柱曰衆而大期之會具而授若何復言曹者衆也魏者大也衆而大天下其當會也具而授如何復有立者乎蜀既亡咸以周言為驗周曰此雖已所推尋然有所因由杜君之辭而廣之耳殊無神思獨至之異也許慈字仁篤南陽人也師事劉熙善鄭氏學治易尚書三禮毛詩論語建安中與許靖等俱自交州入蜀時又有魏郡胡潛字公興不知其所以在益土潛雖學不沾洽然卓犖強識祖宗制度之儀喪紀五服之數皆指掌畫地舉手可采先主定蜀承喪亂之餘歷紀學業衰廢乃鳩合典籍沙汰衆學慈潛並為博士與孟光來敏等典掌舊文值庶事草創動多疑議慈潛更相克伐謗讟忿爭形於聲色書籍有無不相通借時尋楚撻以相震攇攇許晚反其矜已妬彼乃至於此先主愍其若斯羣僚大會使倡家假為二子之容效其訟鬩之狀酒酣樂作以為嬉戲初以辭義相難終以刀杖相屈用感切之潛先歿慈後主世稍遷至大長秋卒子勛傳其家業復為博士孟光字孝裕河南洛陽人漢太尉孟郁之族靈帝末為講部吏獻帝遷都長安遂逃入蜀劉焉父子待以客禮博物識古無書不覽尤鋭意三史長於漢家舊典好公羊春秋而譏呵左氏每與來敏爭此二義光常譊譊歡咋先主定益州拜為議郎與許慈等並掌制度後主踐阼為符莭令屯騎校尉長樂少府遷大司農延熙九年秋大赦光於衆中責大將軍費禕曰夫赦者偏枯之物非明世所宜有也衰弊窮極必不得已然後乃可權而行之耳今主上仁賢百僚稱職有何旦夕之危倒縣之急而數施非常之恩以惠姦宄之惡乎又鷹隼始擊而更原宥有罪上犯天時下違人理老夫耄朽不達治體竊謂斯法難以經久豈具瞻之高美所望於明德哉禕但顧謝踧踖而已光之指擲痛癢多如是類故執政重臣心不能悅爵位不登每直言無所回避為代所嫌太常廣漢鐔承光祿勳河東裴雋年資皆在光後而登據上列處光之右蓋以此也後進文士祕書郎郤正數從光咨訪光問正太子所習讀并其情性好尚正答曰奉親虔恭夙夜匪懈有古世子之風接待羣僚舉動出於仁恕光曰如君所道皆家户所有耳吾今所問欲知其權略智調何如也正曰世子之道在於承志竭歡既不得妄有施為且智調藏於胸懷權略應時而發此之有無焉可豫設也光解正慎宜不為放談乃曰吾好直言無所回避每彈射利病為世人所譏嫌疑省君意亦不甚好吾言然語有次今天下未定智意為先智意雖有自然然不可力強致也此儲君讀書寧當效吾等竭力博識以待訪問如博士探䇿講試以求爵位邪當務其急者正深謂光言為然後光坐事免官年九十餘卒來敏字敬達義陽新野人來歙之後也父艷為漢司馬漢末大亂敏隨姊夫奔荆州姊夫黃琬是劉璋祖母之姪故璋遣迎琬妻敏遂俱與姊入蜀常為璋賔客涉獵書籍善左氏春秋尤精於倉雅訓詁好是正文字先主定益州署敏典學校尉及立太子以為家令後主踐阼為虎賁中郎將丞相亮住漢中請為軍祭酒輔軍將軍坐事去職亮卒後還成都為大長秋又免後纍遷為光祿大夫復坐過黜前後數貶削皆以言語不莭舉動違常也時孟光亦以樞機不慎論議于時然猶愈於敏俱以其耆宿學士見禮於世而敏荆椘名族東宫舊臣特加優待是故廢而復起後以敏為執慎將軍欲令以官重自警戒也年九十七景耀中卒子忠亦博覽經學有敏風與尚書向充等並能協贊大將軍薑維維善之以為參軍尹默字思潛梓潼涪人也益部多貴今文而不崇章句默知其不博乃逺遊荆州從司馬德操宋仲子等受古學皆通諸經史又専精於左氏春秋自劉歆條例鄭衆賈逵父子陳元方服虔注説咸略誦述不復按本先主定益州領牧以為勸學從事及立太子以默為僕射以左氏傳授後主後主踐阼拜諌議大夫丞相亮住漢中請為軍祭酒亮卒還成都拜大中大夫卒子宗傳其業為博士李撰字欽仲梓潼涪人也父仁字德賢與同縣尹默俱遊荆州從司馬徽宋忠等學撰具傳其業又從默講論義理五經諸子無不該覽加博好技藝算術卜數醫藥弓弩機械之巧皆致思焉始為州書佐尚書令史延熙元年後主立太子以撰為庶子遷為僕射轉中散大夫右中郎將猶侍太子太子愛其多知甚悅之然體輕脫好啁戲故世不能重也著古文易尚書毛詩三禮左氏傳太元指歸皆依凖賈馬異於鄭元與王氏殊隔初不見其所述而意歸多同景耀中卒時又有漢中陳術字申伯亦博學多聞著釋問七篇益部耆舊傳及志位歷三郡太守譙周字允南巴西西充國人也父􅀈字榮始治尚書兼通諸經及圗緯州郡辟請皆不應州就假師友從事周幼孤與母兄同居既長耽古篤學家貧未嘗問産業誦讀典籍欣然獨笑以忘寢食研精六經尤善書禮頗曉天文而不以留意諸子文章非心所存不悉遍視也身長八尺體貌素朴推誠不飾無造次辨論之才然潛識內敏建興中丞相亮領益州牧命周為勸學從事周初見亮左右皆笑既出有司請推笑者亮曰孤尚不能忍况左右乎亮卒於敵庭周在家聞問即便奔赴尋有詔書禁斷惟周以速得達大將軍蔣琬領刺史徙為典學從事總州之學者後主立太子以周為僕轉家令時後主頗出遊觀增廣聲樂周上疏諌曰昔王莾之敗豪桀並起跨州據郡欲㺯神器於是賢才智士思望所歸未必以其勢之廣狹惟其德之厚薄也是故於時更始公孫述及諸有大衆者多已廣大然莫不快情恣欲怠於為善遊獵飲食不恤民物世祖初入河北馮異等勸之曰當行人所不能為遂務理寃獄莭儉飲食動遵法度故北州歌歎聲布四逺於是鄧禹自南陽追之吳漢寇恂未識世祖遙聞德行遂以權計舉漁陽上谷突騎迎于廣阿其餘望風慕德者邳彤耿純劉植之徒至于輿病齎棺繦負而至者不可勝數故能以弱為強屠王郎吞銅馬折赤眉而成帝業也及在洛陽嘗欲小出車驅已御銚期諌曰天下未寧臣誠不願陛下微行數出即時還車及征隗嚻潁川盜起世祖還洛陽但遣寇恂往恂曰潁川以陛下逺征故姧猾起叛未知陛下還恐不時降陛下自臨潁川賊必即降遂至潁川竟如恂言故非急務欲小出不敢至於急務欲自安不為故帝者之欲善也如此故傳曰百姓不徒附誠以德先之也今漢遭厄運天下三分正雄哲之士思望之時也陛下天姿至孝喪踰三年言及隕涕雖曾閔不過也敬賢任才使之盡力有踰成康故國內和一大小戮力臣所不能陳然臣不勝大願願復廣人所不能者夫挽大重者其用力苦不衆拔大難者其善術苦不廣且承事宗廟者非徒求福祐所以率民尊上也至於四時之祀或有不臨池苑之觀或有仍出臣之愚滯私不自安夫憂責在身者不暇盡樂先帝之志堂構未成誠非盡樂之時願省減樂官後宫所增造但奉修先帝所施下為子孫莭儉之教徙為中散大夫猶侍太子于時軍旅數出百姓雕瘁周與尚書令陳祗論其利害退而書之謂之仇國論其辭曰因餘之國小而肇建之國大並爭於世而為仇敵因餘之國有高賢卿者問於伏愚子曰今國事未定上下勞心往古之事能以弱勝強者其術何如伏愚子曰吾聞之處大無患者恆多慢處小有憂者恆思善多慢則生亂思善則生治理之常也故周人養民以少取多句踐恤衆以弱斃強此其術也賢卿曰曩者項強漢弱相與戰爭無日寧息然項羽與漢約分鴻溝為界各欲歸息民張良以為民志既定則難動也尋帥追羽終斃項氏豈必由文王之事乎肇建之國方有疾疢我因其隙陷其邊陲覬增其疾而斃之也伏愚子曰昔殷周之世王侯世尊君臣久固民習所専深根者難拔據固者難遷當此之時雖漢祖安能杖劍鞭馬取天下乎當秦罷侯置守之後民疲秦役天下土崩或嵗改主或月易公鳥驚獸駭莫知所從於是豪強並爭虎裂狼分疾搏者獲多遲後者見吞今我與肇建皆傳國易世矣既非秦末鼎沸之時實有六國並據之勢故可為文王難為漢祖夫民疲勞則騷擾之兆生上慢下暴則瓦解之形起諺曰射幸數跌不如審發是故智者不為小利移目不為意似改步時可而後動數合而後舉故湯武之師不再戰而克誠重民勞而度時審也如遂極武黷征土崩勢生不幸遇難雖有智者將不能謀之矣若乃竒變縱橫出入無間衝波截轍超谷越山不由舟楫而濟盟津者我愚子也實所不及後遷光祿大夫位亞九列周雖不與政事而以儒行見禮時訪大議輒據以對而後生好事者亦咨問所疑焉景耀六年冬魏大將軍鄧艾克江由遂長驅而前而蜀本謂敵不便至不作城守調度及聞艾已入隂平百姓擾擾皆迸山野不可禁制後主使羣臣會議計無所出或以為蜀之與吳本為和國宜可奔吳或以為南中七郡險阻斗絶易以自守宜可奔南惟周以為自古以來無寄他國為天子者也今若入吳固當臣服且政理不殊則大能吞小此數之自然也由此言之則魏能并吳吳不能并魏明矣等為稱臣為小孰與為大再辱之恥何與一辱且若欲奔南則當早為之計然後可果今大敵已近羣小之心無一可保恐發足之日其變不測何至南之有乎羣臣咸難周曰今艾已不逺恐不受降如之何周曰方今東吳未賔事勢不得不受受之之後不得不禮若陛下降魏魏不裂土以封陛下者周請身詣京師以古義爭之衆人無以易周之理後主猶疑於入南周上疏曰或説陛下以北兵深入有欲適南之計臣愚以為不安何者南方逺夷之地平常無所供役猶數反叛自丞相亮南征兵勢逼之窮乃幸從是後供出官賦取以給兵以為愁怨此患國之人也今以窮迫欲往依恃恐必復反叛一也北兵之來非但取蜀而已若奔南方必因人勢衰及時追赴二也若至南方外當拒敵內供服御費用張廣無他所取耗損諸夷必甚甚必速叛三也昔王郎以邯鄲僭號時世祖在信都畏迫於郎欲棄還關中邳彤諌曰明公西還則邯鄲城民不肯捐父母背城主而千里送公其亡叛可必也世祖從之遂破邯鄲今北兵至陛下南行誠恐邳彤之言復信於今四也願陛下早為之圗可獲爵土若遂適南勢窮乃服其禍必深易曰亢之為言知得而不知喪知存而不知亡知得失存亡而不失其正者其唯聖人乎言聖人知命而不茍必也故堯舜以子不善知天有授而求授人子雖不肖禍尚未萌而逆授與人况禍已至乎昔微子以殷王之昆面縛銜璧而歸武王豈所樂哉不得已也於是遂從周䇿劉氏無虞一邦蒙賴周之謀也時晉王司馬昭為魏相國以周有全國之功封陽城亭侯又下書辟周周至漢中固稱疾不進咸熙二年夏巴郡文立從洛還蜀過見周周語次因書版示立曰典午忽兮月酉沒兮典午者謂司馬也月酉者謂八月也至八月而昭果薨晉室踐阼纍下詔所在發遣周周遂輿疾詣洛泰始三年至以疾不起就拜騎都尉周乃自陳無功而封求還爵土皆不聽許五年陳壽為本郡中正求休還家往與周别周謂壽曰孔子七十二劉向揚雄七十一而沒今吾年過七十庶慕孔子遺風可與劉揚同軌恐不出後嵗必便長逝不復相見矣六年秋為散騎常侍疾篤不拜至冬卒凡所著述撰定法訓五經論古史考書之屬百餘篇周三子熙賢同少子同頗好周業亦以忠篤質素為行舉孝廉除錫令東宫洗馬召不就周長子熙熙子秀字元彥李雄盜蜀安車徴秀又雄叔父驤驤子壽辟命皆不就晉安西將軍桓溫平蜀嘗表薦焉年九十餘卒郤正字令先河南偃師人也祖父儉靈帝末為益州刺史為盜賊所殺會天下大亂故正父揖因留蜀揖為大將軍孟達營都督隨達降魏為中書令史正本名纂少以父死母嫁單煢隻立而安貧好學博覽羣籍弱冠能屬文入為祕書吏轉為令史遷郎至令性淡於榮利而尤耽意文章自司馬王揚班傅張蔡之儔遺文篇賦及當世美書善論益部有者則鑽鑿推求略皆寓目自在內職與宦人黃皓比屋周旋經三十年皓從微至貴操㺯威權正既不為皓所愛亦不為皓所憎是以官不過六百石而免於憂患依則先儒假文見意號曰釋譏其文繼崔駰達旨其辭曰或有譏豫者曰聞之前記夫事與時並名與功偕然則名之與事前哲之急務也是故創制作範匪時不立流稱垂名匪功不記名必須功而乃顯事亦俟時以行止身沒名滅君子所恥是以達人研道探賾索微觀天運之符表考人事之盛衰辨者馳説智者應機謀夫演略武士奮威雲合霧集風激電飛量時揆宜用取世資小屈大伸存公忽私雖尺枉而尋直終揚光以發輝也今三方鼎峙九有未乂悠悠四海嬰丁禍敗嗟道義之沈塞愍民生之顛沛此誠聖賢拯救之秋烈士樹功之會也吾子以高朗之才圭璋之質兼覽博窺留心道術無逺不致無幽不悉挺身取命斡兹奧祕躊躇紫閣喉舌是執九考不移有入無出究古今之真偽計時務之得失雖時獻一策偶進一言釋彼官責慰此素飱固未能輸竭忠款盡瀝胸肝排方入直惠彼黎元俾吾徒草鄙並有聞焉也盍亦綏衡緩轡回軌易塗輿安駕肆思馬斯徂審厲揭以投濟要夷庚之赫憮播秋蘭以芳世副吾徒之彼圗不亦盛與豫聞而歎曰嗚呼有若云乎邪夫人心不同實如其面子雖光麗既美且豔管窺筐舉守厥所見未可以言八紘之形埓信萬事之精練也或人率爾仰而揚衡曰是何言與是何言與豫應之曰虞帝以面從為戒孔聖以悅己為尤若子之言良我所思將為吾子論而釋之昔在鴻荒朦昧肇初三皇應籙五帝承符爰暨夏商前典攸書姬衰道缺霸者翼扶嬴氏慘虐吞嚼八區於是從橫雲起狙詐如星竒邪蜂動智故萌生或飾真以讎偽或挾邪以干榮或詭道以要上或鬻技以自矜背正崇邪棄直就佞忠無定分義無常經故鞅法窮而慝作斯義敗而姦成吕門大而宗滅韓辨立而身刑夫何故哉利回其心寵曜其目赫赫龍章鑠鑠車服偷幸茍得如反如仄淫邪荒迷恣睢自極和鸞未調而身在轅側庭寧未踐而棟折榱覆天收其精地縮其澤人弔其躬鬼芟其額初升高岡終隕幽壑朝含榮潤夕為枯魄是以賢人君子深圗逺慮畏彼咎戾超然高舉寧曳尾於塗中穢濁世之休譽彼豈輕生慢民而忽於時務哉蓋易著行止之戒詩有靖恭之嘆乃神之聽之而道使之然也自我大漢應天順民政治之隆晧若陽春俯憲坤典仰式乾文播皇澤以熙世揚茂化之醲醇君臣履度各守厥真上垂詢納之𢎞下有匡救之責士無虛華之寵民有一行之迹粲乎亹亹尚此忠益然而道有隆窳物有興廢有聲有寂有光有翳朱陽否於素秋元隂抑於孟春羲和逝而望舒係運氣匿而耀靈陳沖質不永桓靈墜敗英雄雲布豪傑蓋世家挾殊議人懷異計故從橫者歘披其胸狙詐者暫吐其舌也今大綱已綴德樹西鄰丕顯祖之宏規縻好爵於士人興五教以訓俗豐九德以濟民肅明祀以礿祭幾皇道以輔真雖峙者未一偽者未分聖人垂戒蓋均無貧故君臣協美於朝黎庶欣戴於野動若重規靜若疊矩濟濟偉彥元凱之倫也有過必知顏子之仁也侃侃庶政冉季之治也鷹揚鷙騰伊望之事也總羣俊之上略含薛氏之三計敷張陳之祕䇿故力征以勤世援華英而不遑豈暇修枯籜於榛穢哉然吾不才在朝纍紀託身失所天心焉恃樂滄海之廣深歎嵩嶽之髙峙聞仲尼之贊商感鄉校之益已彼平仲之和羮亦進可而替否故矇冒瞽説時有攸獻譬道人之有采於市閭遊童之吟詠乎疆畔庶以增廣福祥輸力規諌若其合也則以暗協明進應靈符如其違也自我常分退守已愚進退任數不矯不誣循性樂天夫何恨諸此其所以既入不出有而若無者也挾屈氏之常醒濁漁父之必醉溷栁季之卑辱褊夷叔之髙懟合不以得違不以失得不充詘失不慘悸不樂前以顧軒不就後以慮輊不粥譽以干澤不辭愆以忌絀何責之釋何飱之恤何方之排何直之入九考不移固其所執也方今朝士山積髦俊成羣猶鱗介之潛乎巨海毛羽之集乎鄧林遊禽逝不為之鮮浮魴臻不為之殷且陽靈幽於唐葉隂精應於商時陽盱請而洪災息桑林禱而甘澤滋行止有道啓塞有期我師遺訓不怨不尤委命恭已我又何辭辭窮路單將返初莭綜墳典之流芳尋孔氏之遺藝綴微辭以存道憲先軌而投制韙叔肹之優遊美疏氏之遐逝收止足以言歸泛晧然以容裔欣環堵以恬娛免咎悔於斯世顧兹心之未泰懼末塗之泥滯仍求激而增憤肆中懷以告誓昔九方考精於至貴秦牙沈思於殊形薛燭察寶以飛譽瓠梁託弦以流聲齊隸拊髀以濟文椘客潛寇以保荆雍門援琴而挾説韓哀乘轡而馳名盧敖翺翔乎元闕若士竦身於雲清余實不能齊技於數子故乃靜然守已而自寧景耀六年後主從譙周之計遣使請降於鄧艾其書正所造也明年正月鍾會作亂成都後主東遷洛陽時擾攘倉卒蜀之大臣無翼從者惟正及殿中督汝南張進捨妻子單身隨侍後主賴正相導宜適舉動無闕乃慨然歎息恨知正之晚時論嘉之賜爵關內侯泰始中除安陽令遷巴西太守咸寧四年卒正所著述詩論賦之屬垂百篇黃權字公衡巴西閬中人也少為郡吏州牧劉璋召為主簿時别駕張松建議宜迎先主使伐張魯權諌曰左將軍有驍名今請到欲以部曲遇之則不滿其心欲以賔客禮待則一國不容二君若客有泰山之安則主有纍卵之危可但閉境以待河清璋不聽竟遣使迎先主出權為廣漢長及先主襲取益州將帥分下郡縣郡縣望風景附權閉城堅守頃之劉璋稽服乃詣降先主先主假權偏將軍及曹操破張魯魯走入巴中權進曰若失漢中則三巴不振此為割蜀之股臂也於是先主以權為護軍率諸將迎魯魯以還南鄭北降曹操然卒破杜濩朴胡殺夏侯淵據漢中皆權本謀也先主為漢中王猶領益州牧以權為治中從事及稱尊號將東伐吳權諌曰吳人悍戰又水軍順流進易退難臣請為先驅以嘗寇陛下宜為後鎮先主不從以權為鎮北將軍督江北軍以防魏師先主自任江南及吳將軍陸議乘流斷圍南軍敗績先主引退而道隔絶權不得還故率將所領降於魏有司執法白收權妻子先主曰孤負黃權權不負孤也待之如初魏文帝謂權曰君捨逆效順欲追蹤陳韓邪權對曰臣過受劉主殊遇降吳不可還蜀無路是以歸命且敗軍之將免死為幸何古人之可慕也文帝善之拜為鎮南將軍封育陽侯加侍中使之陪乘蜀降人或云誅權妻子權知其虛言未便發喪後得審問果如所言及先主薨問至魏羣臣咸賀而權獨否文帝察權有局量欲試驚之遣左右詔權未至之間纍催相屬馬使奔馳交錯於道官屬侍從莫不碎魄而權舉止顔色自若後領益州刺史徙占河南大將軍司馬懿深器之問權曰蜀中有卿輩幾人權笑而答曰不圗明公見顧之重也後懿與諸葛亮書曰黃公衡快士也每坐起歎述足下不去口實景初三年蜀延熙二年權遷車騎將軍儀同三司明年卒諡曰景侯子雍嗣雍無子絶權留蜀子崇為尚書郎隨衛將軍諸葛瞻拒鄧艾到涪縣瞻盤桓未進崇屢勸瞻宜速行據險無令敵得入平地瞻猶豫未納崇至於流涕會艾長驅而前瞻却戰至綿竹崇帥厲軍士期於必死臨陳見殺李恢字德昻建寧俞元人也仕郡督郵姑夫爨習為建伶令有違法之事恢坐習免官太守董和以習方土大姓寢而不許後貢恢於州涉道未至聞先主自葭萌還攻劉璋恢知璋之必敗先主必成也乃託名郡使北詣先主遇於綿竹先主嘉之從至雒城遣恢至漢中交好馬超超遂從命成都既定先主領益州牧以恢為功曹書佐主簿後為亡虜所誣引恢謀反有司執送先主明其不然更遷恢為别駕從事章武元年庲降都督鄧方卒先主問恢誰可代者恢對曰人之才能各有長短故孔子曰其使人也器之且夫明主在上則臣下盡情是以西零之役趙充國曰莫若老臣臣竊不自量惟陛下察之先主笑曰孤之本意亦已在卿矣遂以恢為庲降都督使持莭領交州刺史住平夷縣先主薨高定恣睢於越嶲雍闓跋扈於建寧朱褒反叛於牂牱丞相亮南征先由越嶲而恢案道向建寧諸縣大相糾合圍恢軍於昆明時恢衆少敵倍又未得亮聲息紿謂南人曰官軍糧盡欲規退還吾中間久斥鄉里乃今得旋不能復北欲還與汝等同計謀故以誠相告南人信之故圍守怠緩於是恢出擊大破之追奔逐北南至槃江東接牂牱與亮聲勢相連南土平定恢軍功居多封漢興亭侯加安漢將軍後軍還南夷復叛殺害守將恢身往撲討鉏盡惡類徙其豪帥于成都賦出叟濮耕牛戰馬金銀犀革充繼軍資于時費用不乏建興七年以交州屬吳解恢刺史更領建寧太守以還居本郡徙居漢中九年卒子遺嗣恢弟子球羽林右部督隨諸葛瞻拒鄧艾臨陳授命死于綿竹呂凱字季平永昌不韋人也仕郡五官掾功曹時雍闓等聞先主薨於永安驕黠滋甚逺降於吳吳遙署闓為永昌太守永昌既在益州郡之西道路壅塞與蜀隔絶而郡太守改易凱與府丞蜀郡王伉帥厲吏民閉境拒闓闓數移檄永昌誘説凱等凱答闓檄責以大義辭旨憤切闓甚憚之凱恩威逺著為郡中所信故能全其莭及丞相亮南征討闓既發在道而闓已為高定部曲所殺亮至南上表曰永昌郡吏吕凱府丞王伉等執忠絶域十有餘年雍闓高定逼其東北而凱等守義不與交通臣不意永昌風俗敦直乃爾以凱為雲南太守封陽遷亭侯會為叛夷所害子祥嗣而王伉亦封亭侯為永昌太守馬忠字德信巴西閬中人也少養外家姓狐名篤後乃復姓改名忠為郡吏建安末舉孝廉除漢昌長先主東征敗績猇亭巴西太守閻芝發諸縣兵五千人以補遺闕遣忠送往先主已還永安見忠與語謂尚書令劉巴曰雖亡黃權復得狐篤此為世不乏賢也建興元年丞相亮開府以忠為門下督三年亮入南拜忠牂牱太守郡丞朱褒反叛亂之後忠撫育恤理甚有威惠八年召為丞相參軍副長史蔣琬署留府事又領州治中從事明年亮出祁山忠詣亮所經營戎事軍還督將軍張嶷等討汶山郡叛羌十一年南夷豪帥劉胄反擾亂諸郡徴庲降都督張翼還以忠代翼忠遂斬胄平南土加忠監軍奮威將軍封博陽亭侯初建寧郡殺太守正昻縛太守張裔於吳故都督常駐平夷縣至忠乃移治味縣處民夷之間又越嶲郡亦久失土地忠率將太守張嶷開復舊郡由此就加安南將軍進封彭鄉亭侯延熙五年還朝因至漢中見大司馬蔣琬宣傳詔旨加拜鎮南大將軍七年春大將軍費禕北禦魏敵留忠成都平尚書事禕還忠乃歸南十二年卒子修嗣忠為人寬濟有度量但詼啁大笑忿怒不形於色然處事能斷威恩並立是以蠻夷畏而愛之及卒莫不自致喪庭流涕盡哀為之立廟祀焉時張表名士清望踰忠閻宇宿有功幹於事精勤繼踵在忠後其威風稱迹皆不及忠云王平字子均巴西宕渠人也本養外家何氏後復姓王隨杜濩朴胡詣洛陽假校尉從曹操征漢中因降先主拜牙門將裨將軍建興六年屬參軍馬謖先鋒謖舍水上山舉措煩擾平連規諌謖謖不能用大敗於街亭衆盡星散惟平所領千人鳴鼓自持魏將張郃疑其伏兵不往逼也於是平徐徐收合諸營遺迸率將士而還丞相亮既誅馬謖及將軍張休李盛奪將軍黃襲等兵平特見崇顯加拜參軍統五部兼當營事進位討寇將軍封亭侯九年亮圍祁山平别守南圍魏大將軍司馬懿攻亮張郃攻平平堅守不動郃不能克十二年亮卒於武功軍退還魏延作亂一戰而敗平之功也遷後典軍安漢將軍副車騎將軍吳一住漢中又領漢中太守十五年進封安漢侯代一督漢中延熙元年大將軍蔣琬住沔陽平更為前護軍署琬府事六年琬還住涪拜平前監軍鎮北大將軍統漢中七年春魏大將軍曹爽率步騎十餘萬向漢川前鋒已在駱谷時漢中守兵不滿三萬諸將大驚或曰今力不足以拒敵聽當固守漢樂二城遇賊令入比爾間涪軍足得救關平曰不然漢中去涪垂千里賊若得關便為禍也今宜先遣劉護軍杜參軍據興勢平為後拒若賊分向黃金平率千人下自臨之比爾間涪軍行至此計之上也惟將軍劉敏與平意同即便施行涪諸軍及大將軍費禕自成都相繼而至魏軍退還如平本策是時鄧艾在東馬忠在南平在北境咸著名迹平生長戎旅手不能書而所識不過十字而口授作書皆有意理使人讀史漢諸記傳聽之備知其大義往往論説不失其指遵履法度言不戲謔從朝至夕端坐徹日㦎無武將之體然性狹侵疑為人自輕以此為損焉十一年卒子訓嗣初平同郡漢昌句句音笞侯切扶忠勇寬厚數有戰功名位亞於平官至左將軍封宕渠侯張嶷字伯岐巴西郡南充國人也弱冠為縣功曹先主定蜀之際山寇攻縣縣長捐家逃亡嶷冒白刃携負夫人夫人得免由是顯名州召為從事時郡內士人襲祿姚胄位二千石當世有聲名皆與嶷友善建興五年丞相亮北住漢中廣漢綿竹山賊張慕等鈔盜軍資劫略吏民嶷以都尉將兵討之嶷度其鳥散難以戰禽乃詐與和親克期置酒酒酣嶷身率左右因斬慕等五十餘級渠帥悉殄尋其餘類旬日清泰後得疾病困篤家素貧匱廣漢太守蜀郡何祗名為通厚嶷宿與疏濶乃自輿詣祗託以治疾祗傾財醫療數年除愈其黨道信義皆此類也拜為牙門郎屬馬忠北討汶山羌南平四郡蠻夷輒有籌畫戰克之功十四年武都氐王苻健請降遣將軍張尉往迎過期不到大將軍蔣琬深以為念嶷平之曰苻健求附款至必無他變素聞健弟狡黠又夷狄不能同功將有乖離是以稽留耳數日問至健弟果將四百户就魏獨健來從初越嶲郡自丞相亮討高定之後叟夷數反殺太守龔祿焦璜是後太守不敢之郡只住安定縣去郡八百餘里其郡徒有名而已時論欲復舊郡除嶷為越嶲太守嶷蔣所領往之郡誘以忠信蠻夷皆服頗來降附北徼捉馬最驍徑不承莭度嶷乃往討生縳其帥魏狼又解縱告喻使招懷餘類表拜狼為邑侯種落三千餘户皆安土供職諸種聞之多漸降服嶷以功賜爵關內侯蘇祁邑君冬逢逢弟隗渠等已降復反嶷誅逢逢妻旄牛王女嶷以計原之而渠逃入西徼渠剛猛捷捍為諸種深所畏憚遣所親二人詐降嶷實取消息嶷覺之許以重賞使為反間二人遂合謀殺渠渠死諸種皆安又斯都耆帥李求承昔手殺龔祿嶷求募捕得數其宿惡而誅之始嶷以郡郛宇頺壞更築小塢在官三年徙還故郡繕治城郭夷種男女莫不致力定莋臺登卑水三縣去郡三百餘里舊出鹽鐡及漆而夷徼久自固食嶷率所領奪取署長吏焉嶷之到定莋定莋率豪狼岑槃木王舅甚為蠻夷所信任忿嶷自侵不自來詣嶷使壯士數十直往收致撻而殺之持尸還種厚加賞賜喻以狼岑之惡且曰無得妄動動即殄矣種類咸面縛謝過嶷殺牛饗宴重申恩信遂獲鹽鐡器用周贍漢嘉郡界旄牛夷種類四千餘户其率狼路欲為姑壻冬逢報怨遣叔父離將逢衆相度形勢嶷逆遣親近齎牛酒勞賜又令離姊逆逢妻宣暢意旨離既受賜并見其姊姊弟歡悅悉率所領將詣嶷嶷厚加賞待遣還旄牛由是輒不為患郡有舊道經旄牛中至成都既平且近自旄牛絶道已百餘年更由安上既險且逺嶷遣左右齎貨幣賜路重令路姑喻意路乃率兄弟妻子悉詣嶷嶷與盟誓開通舊道千里肅清復古亭驛奏封路為旄牛㽛毗王遣使將路朝貢後主於是加嶷撫戎將軍領郡如故嶷初見費禕為大將軍恣性泛愛待信新附太過嶷書戒之曰昔岑彭率師來歙仗莭咸見害於刺客今明將軍位尊權重宜鑒前事少以為警後禕果為魏降人郭修所害吳太傅諸葛恪以初破魏軍大興兵衆以圗攻取侍中諸葛瞻丞相亮之子恪從弟也嶷與瞻書使轉告恪旋軍不宜黷武將致禍敗既而恪竟以此夷滅如嶷所言嶷在郡十五年邦域寧靜屢乞還朝乃徴詣成都吏民戀慕扶轂泣涕過旄牛邑邑君襁負來迎及追尋至蜀郡界其督相率隨嶷朝貢者百餘人嶷至拜蕩寇將軍慷慨壯烈士人咸多貴之然放蕩少禮人亦以此譏焉是嵗延熙十七年也魏狄道長李簡密書請降衛將軍薑維率嶷等因簡之資以出隴西既到狄道簡悉率城中吏民出迎軍軍前與魏將徐質交鋒嶷臨陳隕身然其所殺傷亦過倍既亡封長子瑛西鄉侯次子護雄襲爵南土越嶲民夷聞嶷死無不悲泣為嶷立廟四時水旱輒祀之蔣琬字公琰零陵湘鄉人也弱冠與外弟泉陵劉敏俱知名琬以州書佐隨先主入蜀除廣都長先主嘗因遊觀奄至廣都見琬衆事不理時又沈醉先主大怒將加罪戮軍師將軍諸葛亮請曰蔣琬社稷之器非百里之才也其為政以安民為本不以修飾為先願主公重加察之先主雅敬亮乃不加罪倉卒但免官而已琬見推之後夜夢有一牛頭在門前流血滂沱意甚惡之呼問占夢趙直直曰夫見血者事分明也牛角及鼻公字之象君位必當至公大吉之徴也頃之為什邡令先主為漢中王琬入為尚書郎建興元年丞相亮開府辟琬為東曹掾舉茂才琬固讓劉雍隂化龐延廖淳亮教答曰思惟背親捨德以殄百姓衆人既不隱於心實又使逺近不解其義是以君宜顯其功舉以明此選之清重也遷為參軍五年亮住漢中琬與長史張裔統留府事八年代裔為長史加撫軍將軍亮數外出琬常足食足兵以相供給亮每言公琰託志忠雅當與吾共贊王業者也密表後主曰臣若不幸後事宜以付琬亮卒以琬為尚書令俄而加行都護假莭領益州刺史遷大將軍録尚書事封安陽亭侯時新喪元帥逺近危悚琬出類拔萃處羣僚之右既無戚容又無喜色神守舉止有如平日由是衆望漸服延熙元年詔琬伐魏總帥諸軍屯住漢中須吳舉動東西掎角以乘其釁又命琬開府眀年就加為大司馬東曹掾楊戲素性簡略琬與言論時不應答或欲搆戲於琬曰公與戲言而不見應戲之慢上不亦甚乎琬曰人心不同各如其面面從後言古人之所誡也戲欲贊吾是邪則非其本心欲反吾言則顯吾之非是以默然是戲之快也又督農楊敏曾毁琬曰作事憒憒誠非及前人或以白琬主者請推治敏琬曰吾實不如前人無可推也主者重據聽不推則乞問其憒憒之狀琬曰茍其不如則事不當理事不當理則憒憒矣復何問邪後敏坐事繫獄衆人猶懼其必死琬心無適莫得免重罪其好意存道皆此類也琬以為昔諸葛亮數窺秦川道險運艱竟不能克不若乘水東下乃多作舟船欲由漢沔襲魏興上庸會舊疾連動未得時行而衆論咸謂如不克捷還路甚難非長策也於是遣尚書令費禕中監軍薑維等喻指琬承命上疏曰芟穢弭難臣職是掌自臣奉辭漢中已經六年臣既暗弱加嬰疾疢規方無成夙夜憂慘今魏跨帶九州根蒂滋蔓平除未易若東西并力首尾掎角雖未能速得如志且當分裂蠶食先摧其支黨然吳期二三連不克果俯仰惟艱實忘寢食輒與費禕等議以涼州胡塞之要進退有資賊之所惜且羌胡乃心思漢如渴又昔偏軍入羌郭淮破走算其長短以為事首宜以薑維為涼州刺史若維征行銜持河右臣當率軍為維鎮繼今涪水陸四通惟急是應若東北有虞赴之不難由是琬遂還住涪疾轉增劇至九年卒諡曰恭子斌嗣為綏武將軍漢城護軍魏大將軍鍾會至漢城與斌書曰巴蜀賢知文武之士多矣至於足下諸葛思逺譬諸草木吾臭類也桑梓之敬古今所敦西到欲奉瞻尊大君恭侯墓當灑掃墳塋奉祠致敬願告其所在斌答書曰知惟臭味意眷之隆雅託通流未拒來謂也亡考昔遭疾疢亡於涪縣卜云其吉遂安厝之知君西邁乃欲屈駕修敬墳墓視豫猶父顔子之仁也聞命感愴以增情思會得斌書報嘉歎意義及至涪如其書云後主既降鄧艾斌詣會於涪待以交友之禮隨會至成都為亂兵所殺斌弟顯為太子僕會亦愛其才學與斌同時死劉敏為左護軍揚威將軍與鎮北大將軍王平俱鎮漢中魏遣大將軍曹爽襲蜀時議者或謂但可守城不出拒敵必自引退敏以為男女布野農穀栖畝若聽敵入則大事去矣遂帥所領與平據興勢多張旗幟彌亘百餘里會大將軍費禕從成都至魏軍即退敏以功封雲亭侯費禕字文偉江夏鄳人也少孤依族父伯仁伯仁姑益州牧劉璋之母也璋使迎仁仁將禕逰學入蜀會先主定蜀禕遂留益土與汝南許叔龍南郡董允齊名時許靖喪子允與禕欲共會其葬所允白父和請車和遣開後鹿車給之允有難載之色禕便從前先上及至喪所諸葛亮及諸貴人悉集車乘甚鮮允猶神色未泰而禕晏然自若持車人還和問之知其如此乃謂允曰吾常疑汝於文禕優劣未别也而今而後吾意了矣先主立太子禕與允俱為舍人遷庶子後主踐位為黃門侍郎丞相亮南征還羣僚於數十里逢迎年位多在禕右而亮特命禕同載由是衆人莫不易觀亮以初從南歸以禕為昭信校尉使吳孫權性既滑稽嘲啁無方諸葛恪羊衜等才博果辨論難鋒至禕辭順義篤據理以答終不能屈權甚器之謂禕曰君天下淑德必當股肱蜀朝恐不能數來也還遷為侍中亮北住漢中請禕為參軍以奉使稱旨頻煩至吳建興八年轉為中護軍後又為司馬值軍師魏延與長史楊儀相憎惡每至並坐爭論延或舉刃擬儀儀涕泣橫集禕常入其坐間諌喻分别終亮之世各盡延儀之用者禕匡救之力也亮卒禕為後軍師頃之代蔣琬為尚書令琬自漢中還涪禕遷大將軍録尚書事延熙七年魏軍次於興勢假禕莭率衆往禦之光祿大夫來敏至禕許别求共圍棊于時羽檄交馳人馬擐甲嚴駕已訖禕與敏留意對戲色無厭倦敏曰向聊觀試君耳君信可人必能辦賊者也禕至敵遂退封成鄉侯琬固讓州職禕復領益州刺史禕當國功名略與琬比十一年出住漢中自琬及禕雖自身在外慶賞威刑皆遙先咨斷然後乃行其推任如此後十四年夏還成都望氣者云都邑無宰相位故冬復北屯漢壽延熙十五年命禕開府十六年嵗首大會魏降人郭循在坐禕歡飲沈醉為循手刃所害諡曰敬侯子承嗣為黃門侍郎承弟恭尚公主禕長女配太子璿為妃薑維字伯約天水冀人也少孤與母居好鄭氏學仕郡上計掾州辟為從事以父冏昔為郡功曹值羌戎叛亂身衛郡將沒於戰場賜維官中郎參本郡軍事建興六年丞相諸葛亮軍向祁山時天水太守適出案行維及功曹梁緒主簿尹賞主記梁虔等從行太守聞蜀軍垂至而諸縣響應疑維等皆有異心於是夜往保上邽維等覺太守去追遲至城門城門已閉不納維等相率還冀冀亦不入維維等乃俱詣諸葛亮會馬謖敗於街亭亮拔將西縣千餘家及維等還故維遂與母相失亮辟維為倉曹掾加奉義將軍封當陽亭侯時年二十七亮與留府長史張裔參軍蔣琬書曰薑伯約忠勤時事思慮精密考其所有永南季常諸人不如也其人涼州上士也又曰須先教中虎步兵五六千人薑伯約甚敏於軍事既有膽義深解兵意此人心存漢室而才兼於人畢教軍事當遣詣宫覲見主上後遷中監軍征西將軍十二年亮卒維還成都為右監軍輔漢將軍統諸軍進封平襄侯延熙元年隨大將軍蔣琬住漢中琬既遷大司馬以維為司馬數率偏軍西入六年遷鎮西大將軍領涼州刺史十年遷衛將軍與大將軍費禕共録尚書事是嵗汶山平康夷反維率衆討定之又出隴西南安金城界與魏大將軍郭淮夏侯霸等戰於洮西胡王治無戴等舉部落降維將還安處之十二年假維莭復出西平不克而還維自以練西方風俗兼負其才武欲誘諸羌胡以為羽翼謂自隴以西可斷而有也每欲興軍大舉費禕常裁制不從與其兵不過萬人十六年春禕卒夏維率將數萬人出石營經董亭圍南安魏雍州刺史陳泰解圍至洛門維糧盡退還明年加督中外軍事復出隴西守狄道長李簡舉城降進圍襄武與魏將徐質交鋒斬首破敵魏軍敗退維乘勝多所降下拔河間狄道臨洮三縣民還後十八年復與車騎將軍夏侯霸等俱出狄道大破魏雍州刺史王經於洮西經衆死者數萬人經退保狄道城維圍之魏征西將軍陳泰進兵解圍維却住鐘題十九年春就遷維為大將軍更整勒戎馬與鎮西大將軍胡濟期會上邽濟失誓不至故維為魏大將鄧艾所破於假谷星散流離死者甚衆衆庶由是怨讟而隴已西亦騷動不寧維謝過引負求自貶削為後將軍行大將軍事二十年魏征東大將軍諸葛誕反於淮南分關中兵東下維欲乘虛向秦川復率數萬人出駱谷徑至沈嶺時長城積穀甚多而守兵乃少聞維方到衆皆惶懼魏大將軍司馬望拒之鄧艾亦自隴右皆軍於長城維前住亡水皆倚山為營望艾傍渭堅圍維數下挑戰望艾不應景耀元年維聞誕破敗乃還成都復拜大將軍初先主留魏延鎮漢中皆實兵諸圍以禦外敵敵若來攻使不得入及興勢之役王平捍拒曹爽皆承此制維建議以為錯守諸圍雖合周易重門之義然適可禦敵不獲大利不若使聞敵至諸圍皆斂兵聚穀退就漢樂二城使敵不得入平且重關鎮守以捍之有事之日令遊軍並進以伺其虛敵攻關不克野無散穀千里縣糧自然疲乏引退之日然後諸城並出與遊軍並力搏之此殄敵之術也於是令督漢中胡濟却住漢夀監軍王含守樂城護軍蔣斌守漢城又於西安建威武衛石門武城建昌臨逺皆立圍守五年維率衆出漢侯和為鄧艾所破還住沓中維本羈旅託國纍年攻戰功績不立而宦臣黃皓等㺯權於內右大將軍閻宇與皓協比而皓隂欲廢維樹宇維亦疑之故自危懼不復還成都六年維表後主聞鍾會治兵關中欲規進取宜並遣張翼廖化督諸軍分護陽安關口隂平橋頭以防未然皓徴信鬼巫謂敵終不自致啓後主寢其事而羣臣不知及鍾會將向駱谷鄧艾將入沓中然後乃遣右車騎廖化詣沓中為維援左車騎將軍張翼輔國大將軍董厥等詣陽安關口以為諸圍外助比至隂平聞魏將諸葛緒向建威故住待之月餘維為鄧艾所摧還住隂平鍾會攻圍漢樂二城遣别將進攻關口蔣舒開城出降傅僉格鬬而死會攻樂城不能克聞關口已下長驅而前翼厥甫至漢夀維化亦舍隂平而退適與翼厥合皆還保劒閣以拒會會與維書曰公侯以文武之德懷邁世之略功濟巴漢聲暢華夏逺近莫不歸名每惟疇昔嘗同大化吳札鄭僑能喻斯好維不答書列營守險會不能克糧運縣逺將議還歸而鄧艾自隂平由景谷道傍入遂破諸葛瞻於綿竹後主請降於鄧艾艾前據成都維等初聞瞻破或聞後主欲固守成都或聞欲南入建寧於是引軍由廣漢郪道以審虛實尋被後主敕令乃投戈放甲詣會於涪軍前將士咸怒拔刀斫石會厚待維等皆權還其印號莭蓋會與維出則同輿坐則同席謂長史杜預曰以伯約比中土名士公休太初不能勝也會既構鄧艾艾檻車徴因將維等詣成都自稱益州牧以叛欲授維兵五萬人使為前驅魏將士憤發殺會及維維妻子皆伏誅維死時見剖膽如斗大維昔所俱至蜀梁緒官至大鴻臚尹賞執金吾梁虔大長秋皆先蜀亡歿鄧芝字伯苗義陽新野人漢司徒禹之後也漢末入蜀未見知待時益州從事張裕善相芝往從之裕謂芝曰君年過七十位至大將軍封侯芝聞巴西太守龎羲好士往依焉先主定益州芝為郫邸閣督先主出至郫與語大竒之擢為郫令遷廣漢太守所在清嚴有治績入為尚書先主薨於永安先是吳王孫權請和先主纍遣宋瑋費禕等相與報答丞相諸葛亮深慮權聞先主殂隕恐有異計未知所出芝見亮曰今主上幼弱初在位宜遣大使重申吳好亮答之曰吾思之久矣未得其人耳今日始得之芝問其人為誰亮曰即使君也乃遣芝修好於權權果狐疑不時見芝芝乃自表請見權曰臣今來亦欲為吳非但為蜀也權乃見之語芝曰孤誠願與蜀和親然恐蜀主幼弱國小勢迫為魏所乘不自保全以此猶豫耳芝對曰吳蜀二國四州之地大王命世之英諸葛亮亦一時之傑也蜀有重險之固吳有三江之阻合此二長共為脣齒進可兼并天下退可鼎足而立此理之自然也大王今若委質於魏魏必上望大王之入朝下求太子之內侍若不從命則奉辭伐叛蜀必順流見可而進如此江南之地非復大王之有也權默然良久曰君言是也遂自絶魏與蜀連和遣張溫報聘於蜀蜀復令芝重往權謂芝曰若天下太平二主分治不亦樂乎芝對曰夫天無二日土無二王如并魏之後大王未深識天命者也君各茂其德臣各盡其忠將提枹鼓則戰爭方始耳權大笑曰君之誠欵乃當爾邪權與亮書曰丁肱掞張隂化不盡和合二國唯有鄧芝及亮北住漢中以芝為中監軍揚武將軍亮卒遷前軍師前將軍領兖州刺史封陽武亭侯頃之為督江州權數與相聞餽遺優渥延熙六年就遷為車騎將軍後假莭十一年涪陵國人殺都尉反叛芝率軍征討即梟其渠帥百姓安堵十四年卒芝為大將軍二十餘年賞罰明斷善恤卒伍身之衣食資仰於官不茍素儉然終不治私産妻子不免飢寒死之日家無餘財性剛簡不飾意氣不得士類之和於時人少與敬貴唯器異薑維云子良襲爵景耀中為尚書左選郎晉朝廣漢太守張翼字伯恭犍為武陽人也髙祖父司空浩曾祖父廣陵太守綱皆有名迹先主定益州領牧翼為書佐建安末舉孝廉為江陽長徙涪陵令遷梓潼太守纍遷至廣漢蜀郡太守建興九年為庲降都督綏南中郎將翼性持法嚴不得殊俗之歡心耆率劉胄背叛作亂翼舉兵討胄胄未破會徴當還羣下咸以為宜便馳騎即罪翼曰不然吾以蠻夷蠢動不稱職故還耳然代人未至吾方臨戰場當運糧積穀為滅賊之資豈可以黜退之故而廢公家之務乎於是統攝不懈代到乃發馬忠因其成基以破殄胄丞相亮聞而善之亮出武功以翼為前將軍都督領扶風太守亮卒拜前領軍追論討劉胄功賜爵關內侯延熙元年入為尚書稍遷督建威假莭進封都亭侯征西大將軍十八年與衛將軍薑維俱還成都維議復出軍唯翼廷爭以為國小民勞不宜黷武維不聽將翼等行進翼位鎮南大將軍維至狄道大破魏雍州刺史王經經衆死於洮水者以萬計翼曰可止矣不宜復進進或毁此大功維大怒曰為蛇畫足維竟圍經於狄道城不能克自翼建異論維心與翼不善然常牽率同行翼亦不得已而往景耀二年遷左車騎將軍領冀州刺史六年與維咸在劍閣共詣降鍾會於涪明年正月隨會至成都為亂兵所殺宗預字德豔南陽安衆人也建安中隨張飛入蜀建興初丞相亮以為主簿遷參軍右中郎將及亮卒吳慮魏或承衰取蜀增巴邱守兵萬人一欲以為救援二欲以事分割也蜀聞之亦益永安之守以防非常預將命使吳孫權問預曰東之與西譬猶一家而聞西更增白帝之守何也預對曰臣以為東益巴邱之戍西增白帝之守皆事勢宜然俱不足以相問也權大笑嘉其抗盡甚愛待之見敬亞於鄧芝費禕遷為侍中徙尚書延熙十年為屯騎校尉時車騎將軍鄧芝自江州還來朝謂預曰禮六十不服戎而卿甫受兵何也預答曰卿七十不還兵我六十何為不受邪芝性驕傲自大將軍費禕等皆避下之而預獨不為屈預復東聘吳孫權捉預手涕泣而别曰君每銜命結二國之好今君年長孤亦衰老恐不復相見遺預大珠一斛及還遷後將軍督永安就拜征西大將軍賜爵關內侯景耀元年以疾徴還成都後為鎮軍大將軍領兖州刺史時都護諸葛瞻初統朝事廖化過預欲與預共詣瞻許預曰吾等年踰七十所竊已過但少一死耳何求於年少輩而屑屑造門邪遂不往廖化字元儉本名淳襄陽人也為前將軍關羽主簿羽敗屬吳思歸先主乃詐死時人謂為信然因擕持老母晝夜西行會先主東征遇於秭歸先主大悅以化為宜都太守先主薨為丞相參軍後為督廣武稍遷至右車騎將軍假莭領并州刺史封中鄉侯以果烈稱官位與張翼齊而在宗預之右咸熙元年春化預俱內徙洛陽道病卒楊戲字文然犍為武陽人也少與巴西程祁公𢎞巴郡楊汰季儒蜀郡張表伯達並知名戲每推祁以為冠首丞相亮深識之戲年二十餘從州書佐為督軍從事職典刑獄論法決疑號為平當府辟為屬主簿亮卒為尚書右選部郎刺史蔣琬請為治中從事史琬以大將軍開府又辟為東曹掾遷南中郎參軍副二庲降都督領建寧太守以疾徴還成都拜護軍監軍出領梓潼太守入為射聲校尉所在清約不煩延熙二十年隨大將軍薑維出軍至亡水戲素心不服維酒後言笑每有慠弄之辭維外寬內忌意不能堪軍還有司承旨奏戲免為庶人後景耀四年卒戲性雖簡惰省略未嘗以甘言加人過情接物書符指事希有盈紙然篤於舊故居誠存厚與巴西韓儼黎韜童幼相親厚後儼痼疾發頓韜無行見損戲經紀振恤恩好如初又時人謂譙周無當世才少歸敬者唯戲重之嘗曰吾等後世終不如此長兒也有識以此貴戲張表有威儀風規始名位與戲齊後至尚書督庲降後將軍先戲沒祁汰皆早死戲以延熙四年著季漢輔臣贊三十餘首其所頌述世多稱之衛繼字子業漢嘉嚴道人也兄弟五人繼父為縣功曹繼為兒時與兄弟隨父遊戲庭寺中縣長蜀郡成都張君無子數命功曹呼其子省㺯甚愛憐之張因言宴之間語功曹欲乞繼功曹即許之遂飬為子繼敏達夙成學識通博進仕州郡歷職清顯而其餘兄弟四人各無堪當世者父恆言已之將衰張明府將盛也時法禁以異姓為後故復為衛氏屢遷拜奉車都尉大尚書忠篤信厚為衆所敬鍾會之亂遇害成都通志卷一百十八下
