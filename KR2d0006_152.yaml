body:
  text: 通志卷一百二十九下宋右迪功郎鄭樵漁仲撰列傳第四十二下虞預字叔寧徴士喜之弟也本名茂犯明穆皇后母諱故改焉預十二而孤少好學有文章餘姚風俗各有朋黨宗人共薦預為縣功曺欲使沙汰穢濁預書與其從叔父曰近或聞諸君以預入寺便應委質則當親事不得徒已然預下愚過有所懷邪黨互瞻異同蜂至一旦差跌衆鼓交鳴毫釐之失差以千里此古人之炯戒而預所大恐也卒如預言未半年遂見斥退太守庾琛命為主簿預上記陳時政所失琛善之即皆施行太守紀瞻到預復為主簿轉功曺史察孝亷不行安東從事中郎諸葛恢參軍庾亮等薦預召為丞相行參軍兼記室遭母憂服竟除佐著作郎太興二年大旱詔求讜言直諌之士預上書言為國之要在於得才得才之術在於抽引茍其可用讎賤必舉高宗文王思佐發夢拔巖徒以為相載釣老而師之下至列國亦有斯事故燕重郭隗而三士競至魏式干木而秦兵退舍今天下雖弊人士雖寡十室之邑必有忠信世不乏驥求則可致而束帛未賁於邱園蒲輪頓轂而不駕所以大化不洽而雍熙有闕者也預又以寇賊未平當須良將上疏請明加簡擇轉琅邪國常侍遷祕書丞著作郎咸和初夏旱詔衆官各陳致雨之意預議以刑獄轉繫感傷和氣災患之來實在於是多見納焉從平王含賜爵西鄉侯蘇峻作亂預先假歸家太守王舒請為咨議參軍峻平進爵平康縣侯遷散騎侍郎著作如故除散騎常侍仍領著作以年老卒於家預雅好經史憎嫉元虛其論阮籍祼袒比之伊川被髮所以胡虜遍於中國以為過衰周之時著晉書四十餘卷會稽典録二十餘篇諸虞傳十二篇行於世所著詩賦碑誄論難數十篇孫盛字安國太原中都人祖楚馮翊太守父恂頴川太守恂在郡遇賊被害盛年十嵗避難渡江及長博學善言名理於時殷浩擅名一時所與抗論者惟盛而已盛嘗詣浩談論對食奮擲塵尾毛悉落飰中食冷而復暖者數四至暮忘飱理竟不定盛又著醫卜及易象妙於見形論浩等竟無以難之由是遂知名起家佐著作郎以家貧親老求為小邑出補瀏陽令太守陶侃請為參軍庾亮代侃引為征西主簿轉參軍時丞相王導執政亮以元舅居外南蠻校尉陶稱讒構其間導亮頗懷疑二盛密諫亮曰王公神情朗逹常有世外之懷豈肯為凡人事邪此必邪倿之徒欲間內外耳亮納之庾翼代亮以盛為安西咨議參軍尋遷廷尉正會桓溫代翼留盛為參軍與俱伐蜀軍次彭模溫自以輕兵入蜀盛領羸老輜重在後賊數千忽至衆皆遑遽盛部分諸將并力拒之應時敗走蜀平賜爵安懷縣侯纍遷溫從事中郎從入關平洛以功進封吳昌縣侯出補長沙太守以家貧頗營資貨部從事至郡察知之服其高名而不劾之盛乃與桓溫箋而辭旨放蕩稱州遣從事觀採風聲進無威鳯來儀之美退無鷹鸇搏擊之用徘徊湘川將為怪鳥溫得箋復遣從事重按之贓私狼籍檻車收盛到州捨而不罪纍遷祕書監加給事中年七十二卒盛篤學不倦自少至老手不釋卷著魏氏春秋晉陽秋并造詩賦論難復數十篇晉陽秋詞直而理正咸稱良史焉既而桓溫見之怒謂盛子曰枋頭誠為失利何至乃如尊君所説若此史遂行自是關君門户事其子遽拜謝因請刪改之盛時年老還家性方嚴有軌憲雖子孫班白而庭訓愈峻至此諸子乃共號泣稽顙請為百口切計盛大怒諸子遂爾改之盛寫定兩本寄於慕容俊太元中孝武帝博求異聞始於遼東得之以相考校多有不同書遂兩存子潛字齊由為豫章太守殷仲堪之討王國寶也潛時在郡仲堪逼以為咨議參軍固辭不就以憂卒次子放字齊莊幼稱令慧年七八嵗在荆州與父俱從庾亮獵亮謂曰君亦來邪應聲答曰無小無大從公於邁亮又問欲齊何莊邪放曰欲齊莊周亮曰不慕仲尼邪答曰仲尼生而知之非希企所及亮大竒之曰王輔嗣弗過也庾翼子爰客嘗候盛見放而問曰安國何在放答曰庾稚恭家爰客大笑曰諸孫大盛有兒如此也放又曰未若諸庾翼翼既而語人曰我故得重呼奴父也終於長沙相干寶字令升新蔡人也祖統吳奮武將軍都亭侯父瑩丹陽丞寶少勤學博覽書記以才器召為著作郎平杜韜有功賜爵關內侯中興草創未置史官中書監王導上疏薦寶冝備史官於是以寶領國史寶以家貧求補山隂令遷始安太守王導請為司徒右長史遷散騎常侍著晉紀自宣帝迄於愍帝五十三年凡二十卷奏之其書簡略直而能婉咸稱良史性好隂陽術數留思京房夏侯勝等傳寶父先有所寵侍婢母甚妬忌及父亡母乃生推婢於墓中寶兄弟年小不之審也後十餘年母喪開墓而婢伏棺如生載還經日乃蘇言其父常取飲食與之恩情如生在家中吉凶輒語之考校悉驗地中亦不覺為惡既而嫁之生子又寶兄嘗病氣絶積日不冷後遂悟云見天地間鬼神事如夢覺不自知死寶以此遂撰集古今神祗靈異人物變化名為搜神記凡三十卷以示劉惔惔曰卿可謂鬼之董狐寶既博採異同遂混虛實因作序以陳其志曰雖考先志於載籍收遺逸於當時蓋非一耳一目之所聞覩也亦安敢謂無失實者哉衛朔失國二傳互其所聞吕望事周子長存其兩説若此比類往往有焉從此觀之聞見之難一由來尚矣夫書赴告之定辭據國史之方䇿猶尚若兹况仰述千載之前記殊俗之表綴片言於殘缺訪行事於故老將使事不二迹言無異塗然後為信者固亦前史之所病然而國家不廢注記之官學士不絶誦覽之業豈不以其所失者小所存者大乎今之所集設有承於前載者則非余之罪也若使采訪近世之事茍有虛錯願與先賢前儒分其譏謗及其著述亦足以明神道之不誣也羣言百家不可勝覽耳目所受不可勝載今粗取足以演八略之旨成其微説而已幸將來好事之士録其根體有以遊心寓目而無尤焉寶又為春秋左氏義外傳注周易周官凡數十篇及雜文集皆行於世鄧粲長沙人少以高潔著名與南陽劉驎之南郡劉尚公同志友善並不應州郡辟命荆州刺史桓沖卑辭厚禮請粲為别駕粲嘉其好賢乃起應召驎之尚公謂粲曰卿道廣學深衆所推懷忽然改節誠失所望粲笑答曰足下可謂有志於隱而未知隱夫隱之為道朝亦可隱市亦可隱隱初在我不在於物尚公等無以難之粲亦於此名譽減半矣後患足疾不能朝拜求去職不聼令卧視事後以病篤乞骸骨許之粲以父騫有忠信言而世無知者乃著元明紀十篇注老子並行於世謝沈字行思會稽山隂人也曽祖斐吳豫章太守父秀吳翼正都尉沈少孤事母至孝博學多識明練經史郡命為主簿功曺察孝廉太尉郗鑒辟並不就會稽內史何充引為參軍以母老去職平西將軍庾亮命為功曺征北將軍蔡謨版為參軍皆不就間居飬母不交人事耕耘之暇研精墳籍康帝即位朝議疑七廟迭毁乃以太學博士徴以質疑滯以毋憂去職服闋除尚書度支郎何充庾冰並稱沈有史才遷著作郎撰晉書三十餘卷會卒時年五十二沈先著後漢書百卷及毛詩漢書外傳所著述及詩賦文論皆行於世其才學在虞預之右云習鑿齒字彥威襄陽人也家族富盛世為鄉豪鑿齒少有志氣博學洽聞以文筆著稱荆州刺史桓溫辟為從事江夏相袁喬深器之數稱其才於溫轉西曺主簿親遇隆密時溫有大志追蜀人知天文者至夜執其手問國家運祚修短答云世祀方永溫疑其難言乃飾辭云如君言豈獨吾福乃蒼生之幸然今日之語自可令盡必有小小厄運亦冝説之星人曰太微紫微文昌三宫氣候如此決無憂虞至五十年外不論耳溫不悅乃止異日送絹一匹錢五千文以與之星人乃馳詣鑿齒曰家在益州被命逺下今受旨自裁無由致其骸骨緣君仁厚乞為摽揭棺木耳鑿齒問其故星人曰賜絹一匹令僕自裁惠錢五千以買棺耳鑿齒曰君幾誤死公嘗聞子知星宿有不覆之義乎此以絹戲君以錢供道中資是聼君去耳星人大喜明便詣溫别溫問去意以鑿齒言答溫笑曰鑿齒憂君誤死君定是誤活然徒三十年看儒書不如一詣習主簿纍遷别駕溫出征伐鑿齒或從或守所在任職每處機要涖事有績善尺牘論議溫甚器遇之時清談文章之士韓伯伏滔等並相友善後使至京師簡文亦雅重焉既遷溫問相王何似答曰生年所未見以此大忤溫旨左遷户曺參軍時有桑門釋道安俊辨有高才自北至荆州與鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒時人以為佳對初鑿齒與其二舅羅崇羅友俱為州從事及遷别駕以坐越舅右屢經陳請溫後激怒既盛乃超拔其二舅相繼為襄陽都督出鑿齒為榮陽太守溫弟祕亦有才氣素與鑿齒相親善鑿齒既罷郡歸與祕書曰吾以去五月三日來逹襄陽觸目悲感略無歡情痛惻之事故非書言之所能具也每定省家舅從北門入西望隆中想卧龍之吟東眺白沙思鳯雛之聲北臨樊墟存鄧老之高南眷城邑懷羊公之風縱目檀溪念崔徐之友肆睇魚梁追二德之逺未嘗不徘徊移日惆悵極多撫乘躊躇慨爾而泣曰若乃魏武之所置酒孫堅之所隕斃裴杜之故居繁王之舊宅遺事猶存星列滿目璅璅常流碌碌凡士焉足以感其方寸哉夫芬芳起於椒蘭清響生乎琳琅命世而作佐者必垂可大之餘風高尚而邁德者必有明勝之遺事若向八君子者千載猶使義想其為人况相去之不逺乎彼一時也此一時也焉知今日之才不如疇辰百年之後吾與足下不並為景升乎其風期俊邁如此是時溫覬覦非望鑿齒在郡著漢晉春秋以裁正之起漢光武終於晉愍帝於三國之時蜀以宗室為正魏武雖受漢禪晉尚為篡逆至文帝平蜀乃為漢亡而晉始興焉引世祖諱炎興而為禪授明天心不可以勢力強也凡五十四卷後以腳疾遂廢於里巷及襄陽陷於苻堅堅素聞其名與道安輿而致焉既見與語大悅之賜遺甚厚又以其蹇疾與諸鎮書稱昔晉氏平吳利在二陸今破漢南獲士裁一人有半耳俄以疾歸襄陽尋而襄鄧反正朝廷欲召鑿齒使典國史會卒不果臨終上疏謂晉冝越魏繼漢不應以魏後為三恪并著論一篇上之其説以晉越魏繼漢猶漢越秦繼周反覆辨難識者惑焉子辟強才學有父風位至驃騎從事中郎顧和字君孝侍中衆之族子也曾祖容吳荆州刺史祖相臨海太守和二嵗喪父總角便有清操族叔榮雅重之曰此吾家騏驎興吾宗者必此子也時宗人球亦有令聞為州别駕榮謂之曰卿速步君孝超卿矣王導為揚州辟為從事月旦當朝未入停車門外周顗遇之和方擇蝨夷然不動顗既過顧指和心曰此中何所有和徐應曰此中最是難測地顗入謂導曰卿州吏中有一令僕才導亦以為然和嘗詣導導小極對之疲睡和欲叩會之因謂同坐曰昔每聞族叔元公道公叶贊中宗保全江表體小不安令人喘息導覺之謂和曰卿圭璋特逹機警有鋒不徒東南之美實為海內之俊由是知名既而導遣八部從事之部和為下傳還同時俱見諸從事各言二千石官長得失和獨無言導問和卿何所聞答曰明公作輔寧使網漏吞舟何緣採聼風聞以察察為政導咨嗟稱善纍遷司徒掾時東海王沖為長水校尉妙選僚屬以沛國劉耽為司馬和為主簿永昌初除司徒左曺掾太寧初王敦請為主簿遷太子舍人車騎參軍護軍長史王導為揚州請為别駕所歷皆著稱遷散騎侍郎尚書吏部司空郗鑒請為長史領晉陵太守咸康初拜御史中丞劾奏尚書左丞戴抗贓汚百萬付法議罪并免尚書傅玩郎劉傭官百僚憚之遷侍中初中興東遷舊章多闕而冕旒飾以翡翠珊瑚及雜珠等和奏舊冕十有二旒皆用玉珠今用雜珠非禮若不能用玉可用白璇成帝於是始下太常改之先是帝以保母周氏有阿保之勞欲假其名號內外皆奉詔和獨上疏以為周保祐聖躬不遺其勳第舍供給擬於戚屬恩澤所加已為過隆若假名號記籍未見明比唯漢靈帝以乳母趙嬈為平氏君此末代之私恩非先代之令典且君舉必書將軌物垂則書而不法後嗣何觀帝從之轉吏部尚書頻徙領軍將軍太常卿國子祭酒康帝即位將祀南北郊和議以為車駕冝親行帝從之皆躬親行禮遷尚書僕射以母老固辭詔書敕諭特聼暮出朝還其見優遇如此尋朝議以端右之副不冝處外更拜銀青光祿大夫領國子祭酒頃之母憂去職居喪以孝聞既練衛將軍禇裒上疏薦和起為尚書令遣散騎郎喻旨和每見催逼輒號咷慟絶謂所親曰古人或有釋其憂服以祗王命蓋以才足幹時故不得不體國殉義吾在常日猶不如人况今中心荒亂將何以補於萬分祗足以示輕忘孝道貽素冠之譏耳帝又下詔曰百揆務殷端右總要而曠職經久甚以悒然昔先朝政道休明中夏隆盛山賈諸公皆釋服從時不獲遂其情禮况今日艱難百王之弊尚書令禮已過祥練豈得聼不赴急疾而遂罔極之情乎和表疏十餘上遂不起服闋然後視職時南中郎將謝尚領宣城內史收涇令陳幹殺之有司以尚違法紏黜詔原之和重奏尚挾憾肆虐冝正刑辟尚皇太后舅故寢其奏時汝南王統江夏公衛崇並為庶母制服三年和乃奏曰禮所以軌物成教故有國家者莫不崇正明本以一其統斯人倫之紀不二之道也為人後者降其所出奪天屬之性顯至公之義降殺節文著於周典按汝南王統為庶母居廬服重江夏公衛崇本由疏屬開國之緒近喪所生復行重制違冒禮度肆其私情閭閻許其過厚談者莫以為非則政道陵遲由乎禮廢憲章頺替始於容違若弗紏正無以齊物皆可下太常奪服若不祗王命應加貶黜詔從之和居任多所獻納雖權臣不茍阿附永和七年以疾篤辭位拜左光祿大夫儀同三司加散騎常侍尚書令如故其年卒年六十四追贈侍中司空諡曰穆子淳歷尚書吏部郎給事黃門侍郎左衛將軍袁瓌字山甫陳郡陽夏人魏郎中令煥之曽孫也祖父並早卒瓌與弟猷欲奉母避亂求為江淮間縣拜吕令轉江都因南渡元帝以為丹陽令中興建拜奉朝請遷治書御史時東海王越尸既為石勒所焚妃裴氏求招魂葬越朝廷疑之瓌與博士傅純議以為招魂葬是謂埋神不可從也帝然之雖許裴氏招魂葬越遂下詔禁之尋除廬江太守大將軍王敦引為咨議參軍俄為臨川太守敦平為鎮南將軍卞敦軍司尋自解還都遊於會稽蘇峻之難與王舒共起義軍以功封長合鄉侯徴補散騎常侍徙大司農尋除國子祭酒頃之加散騎常侍於時喪亂之後禮教陵遲瓌上疏請興國學成帝從之瓌以年在懸車上疏告老尋卒追贈左光祿大夫諡曰恭子喬嗣喬字彥叔初拜佐著作郎輔國將軍桓溫請為司馬除司徒左西屬不就拜尚書郎桓溫鎮京口復引為司馬領廣陵相初喬與禇裒友善及康獻皇后臨朝喬以裒后父禮數懸絶不冝以平昔故友之道相遇以書致辭於裒且勉以親賢納善為先論者以為得體遷安西咨議參軍長沙相不拜尋督沔中諸戍江夏隨義陽三郡軍事建武將軍江夏相時桓溫謀伐蜀衆以為不可喬勸溫曰夫經略大事故非常情所具智者了於心胸然後舉無遺算耳今天下之難二寇而已蜀雖險固方胡為弱將欲除之先從易也今泝流萬里經歷天險彼或有備不必可克然蜀人自以斗絶一方恃其完固不修攻戰之具若以精卒一萬輕軍速進比彼聞之我已入其險要李勢君臣不過自力一戰擒之必矣論者恐大軍既西胡必窺覦此又似是而非何者胡聞萬里征伐以為內有重備必不敢動縱復越逸江渚諸軍足以守境此無憂矣蜀土冨實號稱天府昔諸葛武侯欲以抗衡中國今誠不能為害然勢據上流易為寇盜若襲而取之者有其人衆此國之大利也溫從之使喬以江夏相領二千人為軍鋒師次彭模去賊已近議者欲兩道並進以分賊勢喬曰今深入萬里置之死地士無反顧之心所謂人自為戰者也今分為兩軍軍力不一萬一偏敗則大事去矣不如全軍而進棄去釡甑齎三日糧勝可必矣溫以為然即一時俱進去成都十里與賊大戰前鋒失利喬軍亦退矢及馬首左右失色喬周麾而進聲氣愈厲遂大破之長驅至成都李勢既降勢將鄧定隗文以其屬反衆各萬餘溫自擊定喬擊文破之進號龍驤將軍封湘西伯尋卒年三十六溫甚悼惜之追贈益州刺史諡曰簡喬博學有文才注論語及詩并諸文筆皆行於世子方平嗣亦以軌素自立辟大司馬掾歷義興琅邪太守卒子山松嗣山松少有才名博學有文章著後漢書百篇襟情秀發善音樂舊歌有行路難曲辭頗踈質山松好之乃文其辭句婉其節制每因酣醉縱歌之聼者莫不流涕初羊曇善唱樂桓伊能挽歌及山松行路難繼之時人謂之三絶時張湛好於齋前種松柏而山松每出遊好令左右作挽歌人謂湛屋下陳尸山松道上行殯山松歷顯位為吳郡太守孫恩作亂山松守滬瀆城城陷被害瓌弟猷字申甫少與瓌齊名代瓌為吕令復相繼為江都令由是俱渡江瓌為丹陽猷為武康兄弟列宰名邑論者美之歷位侍中衛尉卿猷孫宏見文苑傳瓌從祖準字孝尼以儒學知名注喪服經官至給事中凖子沖字景元光祿勳沖子耽字彥道少有才氣俶儻不羈為士類所稱桓溫少時遊於博徒資産俱盡尚有負進思自振之方莫知所出欲求濟於耽而耽在艱試以告焉耽略無難色遂變服懷布帽隨溫與債主戲耽素有藝名債者聞之而不相識謂之曰卿當不辦作袁彥道也遂就局十萬一擲直上百萬耽投馬絶呌探布帽擲地曰竟識袁彥道不其通脫若此蘇峻之役王導引為參軍隨導在石頭初路永匡術賈寧等皆峻心腹聞祖約奔敗懼事不立迭説峻誅大臣峻既不納永等慮必敗隂結於導導使耽潛説路永使歸順峻平封稊歸男拜建威將軍歷陽太守咸康初石虎遊騎十餘匹至歷陽耽上列不言騎少時胡寇強盛朝野危懼王導以宰輔之重請自討之既而賊騎不多又已退散導止不行朝廷以耽失於輕妄黜之尋復為導從事中郎方加大任會卒時年二十五子質字道和自渙至質五世並以道素繼業惟其父耽以雄豪著及質又以孝行稱官歷琅邪內史東陽太守質子湛湛弟豹列在宋史江逌字道載陳留圉人也曾祖㽔譙郡太守祖允蕪湖令父濟安東參軍逌少孤與從弟灌共居甚相友悌由是獲當時之譽避蘇峻之亂屛居臨海絶棄人事翦茅結宇耽玩載籍有終焉之志本州辟從事除佐著作郎並不就征北將軍蔡謨命為參軍何充復引為驃騎功曺以家貧求試守為太末令縣界深山中有亡命數百家恃險為阻前後守宰莫能平逌到官召其魁帥厚加撫接諭以禍福旬月之間襁負而至朝廷嘉之州檄為治中轉别駕遷吳令中軍將軍殷浩將謀北伐請為咨議參軍浩甚重之遷長史浩方修復洛陽經營荒梗逌為上佐甚有匡弼之益軍中書檄皆以委逌時羌及丁零叛浩軍震懼姚襄去浩十里結營以逼浩浩令逌擊之逌進兵至襄營謂將校曰今兵非不精而衆少於羌且其塹柵甚固難與校力吾當以計破之乃取數百雞以長繩連之繫火於足羣雞駭散飛集襄營襄營火發因其亂隨而擊之襄遂小敗及桓溫奏廢浩佐吏逌遂免頃之除中書郎升平中遷吏部郎長兼侍中穆帝將修後池起閣道逌上疏諫之帝乃止復領本州大中正升平末遷太常逌纍讓不許穆帝崩山陵將用寶器逌諌曰以宣皇顧命終制山陵不設明器以貽後則景帝奉遵遺制逮文明皇后崩武皇帝亦承前制無所施設惟脯糒之奠瓦器而已昔康皇帝元宫始用寶劔金舄此蓋太妃罔已之情實違先旨纍世之法今外𣣔以為故事臣請述先旨停此二物書奏從之哀帝以天文失度欲依尚書洪祀之制於太極前殿親執虔肅冀以免咎使太常集博士草其制逌上疏諌曰臣尋史漢舊事藝文志劉向五行傳洪祀出於其中然自前代以來莫有用者又其文唯説為祀而不載儀注此蓋久逺不行之事非常人所參校按漢儀天子所親之祠惟宗廟而已祭天於雲陽祭地於汾隂在於别宫遙拜不詣壇所其餘羣祀之所必在幽靜是以圜丘方澤列於郊野今若於承明之庭正殿之前設羣神之坐行躬親之禮凖之舊典有乖常式臣聞妖眚之發所以鑒悟時主故夤畏上通則宋災退度德禮增修則殷道以隆此往代之成驗不易之定理頃者星辰頗有變異陛下祗戒之誠逹於天人在豫之懼忘寢與食仰虔元象俯凝庶政嘉祥之應實在今日而猶乾乾夕惕思廣兹道誠實聖懷殷勤之至然洪祀有書無儀不行於世詢訪時學莫識其禮且其文曰洪祀大祀也陽曰神隂曰靈舉國相率而行祀順四時之序無令過差今按文而言皆漫而無適不可得詳若不詳而修其失不小帝不納逌又上疏曰臣謹更思尋參之時事今強戎據於關雍桀狄縱於河朔封豕四逸虔劉神州長旌不卷鐘鼓曰戒兵疲人困嵗無休已人事弊於下則七曜錯於上災沴之作固其冝然又頃者以來無乃大異彼月之蝕義見詩人星辰莫同載於五行故洪範不以為沴陛下今以晷度之失同之六沴引其輕變方之重眚求已篤於禹湯憂勤踰乎日昃將修大祀以禮神祗傳曰外順天地時氣而祭其鬼神然則神必有號祀必有義按洪祀之文惟神靈大略而無所祭之名稱舉國行祀而無貴賤之阻有赤黍之盛而無牲體之奠儀法所用闕略非一若率文而行則舉義皆閡有所施補則不統其源漢侍中盧植時之逹學受法不究則不敢厝心誠以五行深逺神道幽昧探責之求難以常思錯綜之理不可一數臣非至精孰能與此帝猶敕撰定逌又陳古義帝乃止逌在職多所匡諌著阮籍序贊逸士針及詩賦奏議數十篇行於世病卒時年五十八子蔚吳興太守逌從弟灌字道羣父瞢尚書郎灌少知名才識亞於逌州辟主簿舉秀才為治中轉别駕歷司徒屬北中郎長史領晉陵太守簡文帝引為撫軍從事中郎後遷吏部郎時謝奕為尚書銓敘不允灌每執正不從奕託以他事免之受黜無怨色頃之簡文帝又以為撫軍司馬甚相賔禮遷御史中丞轉吳興太守灌性方正視權貴蔑如也為大司馬桓溫所惡溫欲中傷之徴拜侍中以在郡時公事有失追免之後為祕書監尋復解職時溫方執權朝廷希旨故灌積年不調溫末年以為咨議參軍會溫薨遷尚書中護軍復出為吳郡太守加秩中二千石未拜卒子績字仲元有志氣除祕書郎以父與謝氏不穆故謝安之世辟召無所從論者多之安薨始為會稽王道子驃騎主簿多所規諌歷咨議參軍出為南郡相會荆州刺史殷仲堪舉兵以應王恭仲堪要績與南蠻校尉殷顗同行並不從仲堪等屢以為言績終不為之屈顗慮績及禍乃於仲堪坐和解之績曰大丈夫何至以死相脅江仲元行年六十但未知獲死所一坐皆為之懼仲堪憚其堅正以楊佺期代之朝廷聞而徴績為御史中丞奏劾無所屈撓會稽世子元顯専政夜開六門績密啓會稽王道子欲以奏聞道子不許車允亦曰元顯驕縱冝禁制之道子默然元顯聞而謂衆曰江績車允間我父子遣人密讓之俄而績卒朝野悼之車允字武子南平人也曾祖浚吳會稽太守父育郡主簿太守王胡之名知人見允於童幼之中謂允父曰此兒當大興卿門可使専學允恭勤不倦博覽多通家貧不常得油夏月則綀囊盛數十螢火以照書以夜繼日焉及長風姿美劭機悟敏速甚有鄉曲之譽桓溫在荆州辟為從事以辨識義理深重之引為主簿稍遷别駕征西長史遂顯於朝廷時唯允與吳隱之以寒素博學知名於世又善於賞會當時每有盛坐而允不在皆云無車公不樂謝安遊集之日輒開筵待之寧康初以允為中書侍郎關內侯孝武帝常講孝經僕射謝安侍坐尚書陸納侍講侍中卞耽執讀黃門侍郎謝石吏部侍郎袁宏執經允與丹陽尹王混擲句時論榮之纍遷侍中太元中增置太學生百人以允領國子博士其後年議郊廟明堂之事允以明堂之制既甚難詳且樂主於和禮主於敬故質文不同音器亦殊既茅茨廣厦不一其度何必守其形範而不𢎞本順時乎九服咸寧四野無塵然後明堂辟雍可光而修之時從其議又遷驃騎長史太常進爵臨湘侯以疾去職俄為護軍將軍時王國寶諂於會稽王道子風八座啓以道子為丞相加殊禮允曰此乃成王所以尊周公也今主上當陽非成王之地相王在位豈得為周公乎望實二三並不冝耳必大忤上意乃稱疾不署其事疏奏帝大怒而甚嘉允隆安初為吳興太守秩中二千石辭疾不拜加輔國將軍丹陽尹頃之遷吏部尚書元顯有過允與江績密言於道子將奏之事泄元顯逼令自裁俄而允卒朝廷傷之殷覬字伯通陳郡人也祖融太常卿父康吳興太守覬性通率有才器少與從弟仲堪俱知名太元中以中書郎擢為南蠻校尉涖職清名政績肅舉及仲堪得王恭書將興內伐告覬欲同舉覬不平之曰夫人臣之義慎保所守朝廷是非宰輔之務豈藩屛之所圖也晉陽之事冝所不豫仲堪要之轉切覬怒曰吾進不敢同退不敢異仲堪甚以為恨猶密諌仲堪辭甚切至仲堪既貴素情亦殊而志望無厭謂覬言為非覬見江績亦以正直為仲堪所斥知仲堪當逐異已樹置所親因出行散託疾不還仲堪聞其病出省之謂覬曰兄病殊為可憂覬曰我病不過身死但汝病在滅門幸熟為慮勿以我為念也仲堪不從卒與楊佺期桓元同下覬遂以憂卒隆安中詔曰故南蠻校尉殷覬忠績未融奄焉隕喪可贈冠軍將軍弟仲文叔獻别有傳王雅字茂逹東海郯人魏衛將軍肅之曾孫也祖隆後將軍父景大鴻臚雅少知名州檄主簿舉秀才除郎中出補永興令以幹理著稱纍遷尚書左右丞歷廷尉侍中左衛將軍丹陽尹領太子左衛率雅性好接下敬慎奉公孝武帝深加禮遇雖在外職侍見甚數朝廷大事多參謀議帝每置酒宴集雅未至不先舉觴其見重如此然任遇有過其才時人以倿幸目之帝起清暑殿於後宫開北上閣出華林園與美人張氏同遊止惟雅豫焉會稽王道子領太子太傅以雅為太子少傅時王恂兒婚賔客車騎甚衆會聞雅拜少傅回詣雅者過半時風俗頽弊無復廉恥少傅之任朝望屬珣珣亦頗以自許及中詔用雅衆遂赴雅將拜遇雨請以繖入王恂不許之因冒雨而拜雅既貴幸威權甚震門下車騎常數百而善應接傾心禮之帝以道子無社稷器幹慮晏駕之後皇室傾危乃選時望以為藩屛將擢王恭殷仲堪等先以訪雅雅以恭等無當世之才不可大任乃從容曰王恭風神簡貴志氣方嚴既居外戚之重當負親賢之寄然其稟性峻隘無所苞容執自是之操無守節之志仲堪雖謹於細行以文義見稱亦無𢎞量且幹略不長若委以連率之重據形勢之險今四海無事足能守職若道不常隆必為亂階矣帝以恭等為當時秀望謂雅疾其勝已故不從二人皆被升用其後竟敗有識之士稱其知人遷領軍尚書散騎常侍方大崇進之將參副相之重而帝崩倉卒不復顧命雅素被優遇一旦失權而朝廷方亂內外擕離但慎默而已無所辨正雖在孝武世亦不能犯顔廷爭凡所謀謨唯唯而已尋遷左僕射隆安四年卒時年六十七追贈光祿大夫儀同三司長之準之散騎侍郎次協之黃門次少卿侍中並有士操立名於世云王恭字孝伯光祿大夫藴子定皇后之兄也少有美譽清操過人自負材地高華恆有宰輔之望與王忱齊名友善慕劉惔之為人謝安常曰王恭人地可以為將來伯舅嘗從其父自會稽至都忱訪之見恭所坐六尺簟忱謂其有餘因求之恭輒以送焉遂坐薦上忱聞而大驚恭曰吾平生無長物其簡率如此起家為佐著作郎歎曰仕宦不為宰相才志何足以騁因以疾辭俄為祕書丞轉中書郎未拜遭父喪服闋除吏部郎授建威將軍太元中代沈嘉為丹陽尹遷中書令領太子詹事孝武帝以恭后兄深相欽重時陳郡袁悅以傾巧事會稽王道子恭言之於帝遂誅之道子常集朝士置酒於東府尚書令謝石因醉為委巷之歌恭正色曰居端右之重集藩王之第而肆淫聲欲令羣下何所取則石深銜之淮陵內史虞珧子妻裴氏有服食之術常衣黃衣狀如天師道子甚悅之令與賔客談論時人皆為降節恭抗言曰未聞宰相之坐有失行婦人坐賔莫不反側道子甚愧之其後帝將擢時望以為藩屛乃以恭為都督兖青冀幽并徐州晉陵諸軍事平北將軍兖青二州刺史假節鎮京口初都督以北為號者纍有不祥故桓沖王坦之刁彞之徒不受鎮北之號恭表讓軍號以超受為辭而實惡其名於是改號前將軍慕容垂入青州恭遣偏師禦之失利降號輔國將軍及帝崩會稽王道子執政寵昵王國寶委以機權恭每正色直言道子深憚而忿之及赴山陵罷朝歎曰榱棟雖新便有黍離之歎矣時國寶從弟緒説國寶因恭入覲相王伏兵殺之國寶不許而道子亦欲輯和內外深布腹心於恭冀除舊惡恭多不順每言及時政輒厲聲色道子知恭不可和協王緒之説遂行於是國難始結或勸恭因入朝以兵誅國寶而庾楷黨於國寶士馬甚盛恭憚之不敢發遂還鎮臨别謂道子曰主上諒暗冢宰之任伊周之所難願大王親萬機納直言逺鄭聲放倿人辭色甚厲故國寶等愈懼以恭為安北將軍不拜乃謀誅國寶遣使與殷仲堪桓元相結仲堪偽許之恭得書大喜乃抗表京師以誅國寶為名表至內外戒嚴國寶及緒惶懼不知所為用王珣計請解職道子收國寶賜死斬緒於市深謝愆失恭乃還京口恭之初抗表也慮事不捷乃版前司徒左長史王廞為吳國內史令起兵於東會國寶死令廞解軍去職廞怒以兵伐恭恭遣劉牢之擊滅之上疏自貶詔不許譙王尚之復説道子以藩伯強盛宰相權弱冝多樹置以自衛道子然之乃以其司馬王愈為江州刺史割庾楷豫州四郡使愈督之由是楷怒遣子鴻説恭曰尚之兄弟専㺯相權欲假朝威貶削方鎮懲警前事勢轉難測及其議未成冝早圖之恭以為然復以謀告殷仲堪桓元元等從之推恭為謀主尅期同赴京師時內外離阻津邏嚴急仲堪之信因庾楷逹之以斜絹為書內箭簳中合鏑漆之楷送於恭恭發書絹文角戾不復可識謂楷為詐又料仲堪去年已不赴盟今無動理乃先期舉兵司馬劉牢之諌曰將軍今動以伯舅之重執忠貞之節相王以姬旦之尊時望所係昔年已戮寶緒送王廞書是深伏將軍也頃所授用雖非皆允未為大失割庾楷四郡以配王愈於將軍何損晉陽之師其可再乎恭不從乃上表以討王愈司馬尚之兄弟為辭朝廷使元顯及王恂謝琰等距之恭夢牢之坐其處旦謂牢之曰事克即以卿為北府遣牢之率帳下督顔延先據竹里元顯使説牢之啖以重利牢之乃斬顔延以降是日牢之遣其壻高雅之子敬宣因恭曜軍輕騎擊恭恭敗將還雅之已閉城門恭遂與弟履單騎奔曲阿恭久不騎乘髀生瘡不復能去曲阿人殷確恭故參軍也以船載之藏於葦席之下將奔桓元至長塘湖遇啇人錢強強宿憾於確以告湖浦尉尉收之以送京師道子聞其將至欲出與語靣折之而未之殺也時桓元等已至石頭懼其有變即於建康之倪塘斬之恭五男及弟爽爽兄子祕書郎和及其黨孟璞張恪等皆殺之恭性抗直深存節義讀左傳至奉王命討不庭每輟卷而歎為性不𢎞以暗於機會自在北府雖以簡惠為政然自矜貴與下殊隔不間用兵尤信佛道調役百姓修營佛事務在壯麗士庶怨嗟臨刑猶誦佛經自理鬚鬢神無懼容謂監刑者曰我暗於信人所以致此原其本心豈不忠於社稷但令百代之下知有王恭耳家無財帛唯書籍而已為識者所傷恭美姿儀人多愛悅或目之云濯濯如春月柳嘗被鶴氅裘涉雪而行孟昶窺見之歎曰此真神仙中人也初見執遇故吏戴耆之為湖孰令恭私告曰我有庶兒未舉在乳母家卿為我送寄桓南郡耆之遂送之於夏口桓元撫飬之為立喪庭弔祭焉及元執政上表理恭詔贈侍中太保諡曰忠簡爽贈太常和及子簡並通直散騎郎殷確散騎侍郎腰斬湖浦尉及錢強等恭庶子曇亨義熙中為給事中庾楷征西將軍亮之孫會稽內史羲小子也初拜侍中代兄凖為西中郎將豫州刺史假節鎮歷陽隆安初進號左將軍時會稽王道子憚王恭殷仲堪等擅兵故出王愈為江州督豫州四郡以為形援楷上疏以江州非險塞之地而西府北帶冦戎不應使愈分督詔不許時楷懷恨使子鴻説王恭以譙王尚之兄弟復握機權勢過國寶恭亦素忌尚之遂連謀舉兵事在恭傳詔使尚之討楷楷遣汝南太守假方逆尚之戰於慈湖方大敗被殺楷奔於桓元及元等盟於柴桑連名上疏自理詔赦元等而不赦恭楷楷遂依元元用為武昌太守楷後懼元必敗密遣使結會稽世子元顯若朝廷討元當為內應及元得志楷以謀泄為元所誅劉牢之字道堅彭城人也曾祖羲以善射事武帝歷北地鴈門太守父建有武幹為征虜將軍世以勇壯稱牢之靣紫赤色鬚目驚人而沈毅多計畫太元初謝元北鎮廣陵時苻堅方盛元多募徑勇牢之與東海何謙琅邪諸葛侃樂安高衡東平劉軌西河田洛晉陵孫無終等以驍猛應選元以牢之為參軍領精鋭為前鋒百戰百勝號為北府兵敵人畏之及堅將句難南侵元率何謙等距之牢之破難輜重於旴眙獲其運船遷鷹揚將軍廣陵相時車騎將軍桓沖擊襄陽宣城內史胡彬率衆向壽陽以為沖聲援牢之領卒二千為彬後繼淮肥之役苻堅遣其弟融及驍將張蚝攻陷壽陽謝元使彬與牢之距之師次硤石不敢進堅將梁成又以二萬人屯洛澗元遣牢之以精卒五千距之去賊十里成阻澗列陳牢之率參軍劉襲諸葛求等直進渡水臨陳斬成及其弟雲又分兵斷其歸津賊步騎崩潰爭赴淮水殺獲萬餘人盡收其器械堅尋亦大敗歸長安餘黨所在屯結牢之進平譙城使安豐太守戴寶戍之遷龍驤將軍彭城內史以功賜爵武岡縣男食邑五百户牢之進屯鄄城討諸未服河南城堡承風歸順者甚衆時苻堅子丕據鄴為慕容垂所逼請降牢之引兵救之垂聞軍至出新興城北走牢之與沛郡太守田次之追之行二百里至五橋澤中爭趣輜重稍亂為垂所擊牢之敗績士卒殱焉牢之䇿馬跳五丈澗得脫會丕救至因入臨漳集亡散兵復少振牢之以軍敗徴還頃之復為龍驤將軍守淮隂後進戍彭城復領太守妖賊劉黎僭尊號於皇邱牢之討滅之苻堅將張遇遣兵擊破金鄉圍太山太守羊邁牢之遣參軍向欽之擊走之會慕容垂叛將翟釗救遇牢之引還釗還牢之進平太山追釗於鄄城釗走河北因獲張遇以歸之彭城妖賊司馬徽聚衆黨馬頭山牢之遣參軍竺朗之討滅之時慕容氏掠廪邱高平太守徐含逺告急牢之不能救坐畏懦免及王恭將討王國寶引牢之為府司馬領南彭城內史加輔國將軍恭使牢之討破王廞以牢之領晉陵太守恭本以才地陵物及檄至京師朝廷戳國寶王緒自謂威德已著雖杖牢之為瓜牙但以行陳武將相遇禮之甚薄牢之負其才能深懷恥恨及恭之後舉元顯遣廬江太守高素説牢之使叛恭事成當即其位號牢之許焉恭參軍何淡之以其謀告恭牢之與淡之有隙故恭疑而不納乃置酒請牢之於衆中拜牢之為兄精兵利器悉以配之使為前鋒行至竹里牢之背恭歸朝廷恭既死遂代恭為都督兖青冀幽并徐掦州晉陵軍事牢之本自小將一朝據恭位衆情不悅乃樹用腹心徐謙之等以自強時楊佺期桓元將兵逼京師上表理王恭求誅牢之牢之率北府之衆馳赴京師次於新亭元等受詔退兵牢之還鎮京口及孫恩攻陷會稽牢之遣將桓寶率師救三吳復遣子敬宣為寶後繼比至曲阿吳郡內史桓謙已棄郡走牢之乃率衆東討拜表輒行至吳與衛將軍謝琰擊賊屢勝殺傷甚衆徑臨浙江進拜前將軍都督吳郡諸軍事時謝琰屯烏程遣司馬高素助牢之牢之率衆軍濟浙江恩懼逃於海牢之還鎮恩復入會稽害謝琰牢之進號鎮北將軍都督會稽五郡率衆東征屯上虞分軍戍諸縣恩復攻破吳國殺內史袁山松牢之使參軍劉裕討之恩復入海頃之恩浮海奄至京口戰士十萬樓船千餘牢之在山隂使劉裕自海盬赴難牢之率大衆而還裕兵不滿千人與賊戰破之恩聞牢之已還京口乃走郁州又為敬宣劉裕等所破及恩死牢之威名轉振元興初朝廷將討桓元以牢之為前鋒都督征西將軍領江州事元顯遣使以討元事咨牢之牢之以元少有雄名仗全楚之衆懼不能制又慮平元之後功蓋天下必不為元顯所容深懷疑異不得已率北府文武屯洌洲桓元遣何穆説牢之曰自古亂世君臣相信者有燕昭樂毅元德孔明然皆勳業未卒而二主早世設使功成事遂未保二臣之禍也鄙語有之高鳥盡良弓藏狡兔殫獵犬烹故文種誅於句踐韓白戮於秦漢彼皆英雄霸王之主猶不敢信其功臣况凶愚凡庸之流乎自開闢以來戴震主之威挾不賞之功以見容於暗世者而誰至如管仲相齊雍齒侯漢則往往有之况君見與無射鉤屢逼之仇邪今君戰敗則傾宗戰勝亦覆族欲以安歸乎孰若翻然改圖保其冨貴則身與金石等固名與天壤無窮就若頭足異處身名俱滅為天下笑哉唯君圖之牢之自謂握強兵才能算略足以經綸江表時譙王尚之已敗人情轉阻乃頗納穆説遣使與元交通其甥何無忌與劉裕固諌之並不從俄令敬宣降元元大喜與敬宣置酒宴集隂謀誅之陳法書圖畫與敬宣共觀以安悅其志敬宣不之覺元佐吏莫不相視而笑元顯既敗元以牢之為征東將軍會稽太守牢之歎曰始爾便奪我兵禍將至矣時元屯相府敬宣勸牢之襲元猶豫不決移屯班瀆將北奔廣陵相高雅之欲據江北以距元集衆大議參軍劉襲曰事不可者莫大於反而將軍往年反王衮州近日反司馬郎君今復欲反桓公一人而三反豈得立也語畢趨出佐吏多散走而敬宣先還京口拔其家失期不到牢之謂其為劉襲所殺乃自縊而死俄而敬宣至不遑哭奔於高雅之將吏共殯斂牢之喪還丹徒元令斫棺斬首暴尸於市及劉裕建義追理牢之乃復本官敬宣列在宋史殷仲堪陳郡人也祖融太常吏部尚書父師驃騎咨議參軍晉陵太守沙陽男仲堪能清言善屬文每云三日不讀道德論便覺舌本間強其談理與韓康伯齊名名士咸愛慕之調補佐著作郎冠軍謝元鎮京口請為參軍除尚書郎不拜元以為長史厚任遇之仲堪致書於元曰胡亡之後中原子女鬻於江東者不可勝數骨肉星離荼毒終年怨苦之氣感傷和理誠喪亂之常足以懲戒復非王澤廣潤愛育蒼生之意也當世大人既慨然經略將以救其塗炭而使理至於此良可歎息願節下𢎞之以道德運之以神明隱心以及物垂理以禁暴使足踐晉境者必無懷戚之心枯稿之類莫不同漸天潤仁義與干戈並運德心與功業俱隆實所期於明德也頃聞抄掠所得多皆採梠飢人壯者欲以救子少者志在存親行者傾筐以顧念居者吁嗟以待延而一旦幽縶生離死絶求之於情可傷之甚昔孟孫獵而得麑使秦西以之歸其母隨而悲鳴不忍而放之孟孫赦其罪以傅其子禽獸猶不可離况於人乎夫飛梟惡鳥也食桑椹猶懷好音雖曰戎狄其無情乎茍感之有物非難化也必使邉界無貪小利強弱不得相陵德音一發必聲振沙漠二寇之黨將靡然向風何憂黃河之不濟函谷之不開哉元深然之領晉陵太守居郡禁産子不舉久喪不葬録父母以質亡叛者所下條教甚有義理父病積年仲堪衣不解帶躬學醫術究其精妙執藥揮淚遂眇一目居喪哀毁以孝聞服闋孝武帝召為太子中庶子甚相親愛仲堪父常患耳聰聞牀下蟻動謂之牛鬭帝素聞之而不知其人至是從容問仲堪曰患此者謂誰仲堪流涕而起曰臣進退惟谷帝有愧焉復領黃門郎寵任轉隆帝嘗示仲堪詩乃曰勿以已才而笑不才帝以會稽王非社稷之臣擢所親幸以為藩捍乃授仲堪都督荆益寧三州軍事振威將軍荆州刺史假節鎮江寧將之任又詔曰卿去有日使人酸然嘗謂永為廊廟之寶而忽為荆楚之珍良以慨恨其恩狎如此仲堪雖有英譽議者未以分陜許之既受腹心之任居上流之重朝野屬想謂有異政及在州綱目不舉而好行小惠夷夏頗安附之先是仲堪遊於江濵見流棺接而葬焉旬日之間門前之溝忽起為岸其夕有人通仲堪自稱徐伯元云感君之惠無以報也仲堪因問門前之岸是何祥乎對曰水中有岸其名為洲君將為州言終而沒至是果臨荆州桂陽人黃欽生父沒已久詐服衰麻言迎父喪府曺先依律詐取父母卒棄市仲堪乃曰律詐取父母寧依毆詈法棄市原此之旨當有二親生存而橫言死沒情事悖逆忍所不當故同之毆詈之科正以大辟之刑今欽生父實終殁墓在舊邦積年久逺方詐服迎喪以此為大妄耳比之於父存而言亡相殊逺矣遂活之又以異姓相飬禮律所不許子孫繼親族無後者唯令主其蒸嘗不聼别籍以避役也佐史咸服之時朝廷徴益州刺史郭銓犍為太守卞苞於坐勸銓以蜀反仲堪斬之以聞朝廷以仲堪事不預察降號鷹揚將軍尚書下以益州所統梁州三郡人丁一千番戍漢中益州未肯承遣仲堪乃奏之曰夫制險分國各有攸冝劍閣之隘實蜀之關鍵巴西梓潼宕渠三郡去漢中遼逺在劒閣之內成敗與蜀為一而統屬梁州蓋定鼎中華慮在後伏所以分斗絶之勢開荷戟之路自皇居南遷守在岷卭襟帶之形事異曩昔是以李勢初平割此三郡配𨽻益州將欲重復上流為習坎之防事經英略歷年數紀梁州以統接曠逺求還三郡忘王侯設險之義背地勢內外之實盛陳事力之寡弱飾哀矜之苦言令華陽乂清汧隴順軌關中餘燼自想魚肉梁州以論求三郡益州以本統有定更相牽制莫知所從致令巴宕二郡為羣獠所覆城邑空虛士庶流亡要害膏腴皆為獠有今逺慮長規冝保全險塞又蠻獠熾盛兵力寡弱如遂經理乖繆號令不一則劔閣非我保醜類轉難制此乃藩扞之大機上流之至要昔三郡全實正差文武三百以助梁州今俘沒蠻獠十不遺二加逐食烏散資生未立茍順符旨以副梁州恐公私困弊無以堪命則劍閣之守無擊柝之儲號令選用不専於益州虛有監統之名而無制馭之實懼非分位之本旨經國之逺術謂今正可更加梁州文武五百合前為一千五百自此之外一仍舊貫設梁州有急蜀當傾力救之書奏朝廷許焉桓元在南郡論四皓來儀漢庭失素履終吉之義以其文贈仲堪仲堪答書稱四公得出處之正元屈之仲堪自在荆州連年水旱百姓飢饉仲堪食常五碗盤無餘肴飯粒落席間輒拾以噉之雖欲率物亦緣其性真素也每語子弟云人物見我受任方州謂我豁乎昔時意今吾處之不易貧者士之常焉得登枝而忘其本爾其存之其後蜀水大出漂浮江陵數千家以隄防不嚴復降為寧夏將軍安帝即位進號冠軍將軍固讓不受初桓元將應王恭乃説仲堪推恭為盟主共興晉陽之舉立桓文之功仲堪然之仲堪以王恭在京口去都不盈二百自荆州道逺連兵勢不相及乃偽許恭而實不欲下聞恭已誅國寶等始抗表興師遣龍驤將軍楊佺期次巴陵會稽王道子遣書止之仲堪乃還初桓元棄官歸國仲堪憚其才地深相交結元亦欲假其兵勢誘而悅之國寶之役仲堪既納元之誘乃外結雍州刺史郗恢內要從兄南蠻校尉覬南郡相江績等恢覬績並不同之乃以佺期代績覬自遜位會王恭復與豫州刺史庾楷舉兵討江州刺史王愈及譙王尚之等仲堪因集議以為朝廷去年自戮國寶王恭威名已震今其重舉勢無不克而我去年緩師已失信於彼今可整棹晨征參其霸功於是使佺期舟師五千為前鋒桓元次之仲堪率兵二萬相繼而下佺期元至湓口王愈奔於臨川元遣偏軍追獲之佺期等進至橫江庾楷敗奔於元譙王尚之等退走尚之弟恢之所領水軍皆沒元等至石頭仲堪至蕪湖忽聞王恭已死劉牢之反恭領北府兵在新亭元等三軍失色無復固志回師屯於蔡洲時朝廷新平恭楷且不測西方人心仲堪等擁衆數萬充斥郊畿內外憂逼元從兄修告會稽王道子曰西軍可説而解也修知情矣若許佺期以重利無不倒戈於仲堪者道子納之乃以元為江州佺期為雍州黜仲堪為廣州以桓修為荆州遣仲堪叔父太常茂宣詔回軍仲堪恚被貶退以王恭雖敗已衆亦足以立事令元等急進軍元等喜於寵授並欲順朝命猶豫未決會仲堪弟遹為佺期司馬夜奔仲堪説佺期受朝命納桓修仲堪遑遽即於蕪湖南歸使徇於元等軍曰若不各散而歸大軍至江陵當悉戳餘口仲堪將劉系先領二千人𨽻於佺期輒率衆而歸元等大懼狼狽追仲堪至尋陽及之於是仲堪失職倚元為援元等又資仲堪之兵雖互相疑阻亦不得異仲堪與佺期以子弟交質遂於尋陽結盟推元為盟主臨壇歃血並不受詔申理王恭求誅劉牢之譙王尚之等朝廷深憚之於是詔仲堪曰間以將軍憑寄失所朝野懷憂然既往之事冝其兩忘用乃班師回斾祗順朝旨所以改授方任蓋隨時之冝將軍大義誠感朕心今還復本位即撫所鎮釋甲休兵則內外寧一故遣太常茂具宣乃懷仲堪等並奉詔各旋所鎮頃之桓元將討佺期先告仲堪云今當入沔討除佺期已頓兵江口若見與無二可殺楊廣若其不然便當率兵入江仲堪乃執元兄偉遣從弟遹等水軍七千至西江口元使郭銓苻宏擊之遹等敗走元頓巴陵而館其榖元又破楊廣於夏口仲堪既失巴陵之積又諸將皆敗江陵震駭城內大飢以胡麻為廪仲堪召佺期佺期率衆赴之直濟江擊元為元所敗走還襄陽仲堪出奔酇城為元追兵所獲逼令自殺死於柞溪弟子道護恭軍羅企生等並被殺仲堪少奉天師道又精心事神不吝財賄而怠行仁義嗇於周急及元來攻猶勤請禱然善取人情病者自為診脈分藥而用計倚伏煩密少於鑒略以至於敗子簡之載喪下都葬於丹徒遂居墓側義旗建率私僮客隨義軍躡桓元元死簡之食其肉桓振之役義軍失利簡之沒陳弟曠之有父風仕至剡令楊佺期𢎞農華隂人漢太尉震之後也曾祖凖太常自震至凖七世有名德祖林少有才望值亂沒胡父亮少仕偽朝後歸國終於梁州刺史以貞幹知名佺期沈勇果徑而兄廣及弟思平等皆強獷粗暴自云門户承籍江表莫比有以其門地比王珣者猶恚恨而時人以其晚過江婚宦失類每排抑之嘗慷慨切齒欲因事際以逞其志佺期少仕軍府咸康中率衆屯城固苻堅將潘猛距守康回壘佺期擊走之其衆悉降拜廣威將軍河南太守戍洛陽苻堅將竇衝率衆攻平陽太守張元熙於皇天塢佺期擊走之佺期自湖城入潼關纍戰皆捷斬獲千計降九百餘家歸於洛陽進號龍驤將軍以疾改為新野太守領建威司馬遷唐邑太守督石頭軍事以疾去職荆州刺史殷仲堪引為司馬代江績為南郡相仲堪與桓元舉衆應王恭庾楷仲堪素無戎略軍旅之事一委佺期兄弟以兵五千人為前鋒與桓元相次而下至石頭恭死楷敗朝廷未測元軍乃以佺期代郗恢為都督梁雍秦三州諸軍事雍州刺史仲堪元皆有遷换於是俱還尋陽結盟不奉詔俄而朝廷復仲堪本職乃各還鎮初元未奉詔欲自為雍州以郗恢為廣州恢懼元之來問於衆咸曰佺期來者誰不戮力若桓元來恐難與為敵既知佺期代已乃謀於南陽太守閭邱羡稱兵距守佺期慮事不濟乃聲言元來入沔而佺期為前驅恢衆信之無復固志恢軍散請降佺期入府斬閭邱羡放恢還都撫將士恤百姓繕修城池簡練甲卒甚得人情佺期仲堪與桓元素不睦佺期屢欲相攻仲堪每抑止之元以是告執政求廣其所統朝廷亦欲成其釁隙故以桓偉為南蠻校尉佺期內懷忿懼勒兵建牙聲云援洛欲與仲堪襲元仲堪雖外結佺期內疑其心苦止之又遣從弟遹屯北塞以駐之佺期勢不獨舉乃解兵隆安三年元遂舉兵討佺期先攻仲堪初仲堪得元書急召佺期佺期曰江陵無食當何以待敵可來見就共守襄陽仲堪自以保境全軍無緣棄城逆走憂佺期不赴乃紿之曰比來收集已有儲矣佺期信之乃率衆赴焉步騎八千精甲耀日既至仲堪唯以飯餉其軍佺期大怒曰今兹敗矣乃不見仲堪時元在零田佺期與兄廣擊元元畏佺期之鋭乃渡軍馬頭明日佺期率殷道護等精鋭萬人乘艦出戰元距之不得進佺期乃率其麾下數十艦直濟江徑向元船俄而回擊郭銓殆獲銓會元諸軍至佺期退走餘衆盡沒單馬奔襄陽元追軍至佺期與兄廣皆死之傳首京師梟於朱雀門弟思平從弟尚保孜敬俱逃於蠻劉裕起義始歸國歷位州郡孜敬為人剽鋭果於行事昔與佺期勸殷仲堪殺殷覬仲堪不從孜敬拔刃而起欲自出取之仲堪苦禁乃止及為梁州刺史常怏怏不滿其志經襄陽見魯宗之侍衛皆佺期之舊也孜敬愈憤見於辭色宗之參軍劉千期於坐靣折之因大發怒抽劒刺千期立死宗之表而斬之思平尚保後亦以罪誅楊氏遂滅劉毅字希樂彭城沛人也曾祖距廣陵相叔父鎮左光祿大夫毅少有大志不修家人産業仕為州從事桓𢎞以為中兵恭軍屬桓元篡位毅與劉裕何無忌魏詠之等起義兵密謀討元毅討徐州刺史桓修於京口青州刺史桓𢎞於廣陵裕率毅等至竹里元使其將皇甫敷吳甫之北距義軍遇之於江乘臨陳斬甫之進至羅落橋又斬敷首元大懼使桓謙何淡之屯覆舟山毅等軍至蔣山裕使羸弱登山多張旗幟元不之測益以危懼謙等士卒多北府人素懾伏裕莫敢出鬬裕與毅等分為數隊進突謙陳皆殊死戰無不一當百時東北風急義軍放火煙塵張天鼓譟之音震駭京邑謙等諸軍一時奔散元既西走裕以毅為冠軍將軍青州刺史與何無忌劉道規躡元元逼帝及琅邪王西上毅與道規及下邳太守孟懷玉等追及元戰於崢嶸洲毅乘風縱火盡鋭爭先元衆大潰燒輜重夜走元將郭銓劉雅等襲陷尋陽毅遣威武將軍劉懷肅討平之及元死桓振桓謙復聚衆距毅於靈溪元將馮該以兵會於振毅進擊為振所敗退次尋陽坐免官尋原之劉裕命何無忌受毅節度無忌以督攝為煩輒便解統毅疾無忌専擅免其琅邪內史以輔國將軍攝軍事無忌遂與毅不平毅惟自引咎時論韙之毅復與道規發尋陽桓亮自號江州刺史遣劉敬宣擊走之毅軍次夏口時振黨馮該戍大岸孟山圖據魯城桓山客守偃月壘衆合萬人連艦二岸水陸相援毅督衆軍進討未至夏口遇風飄沒千餘人毅與劉懷肅素邈等攻魯城道規攻偃月壘何無忌與檀祗列艦於中流以放越逸毅躬貫甲胄陵城半日而二壘俱潰生禽山客而馮該遁走毅進平巴陵以毅為使持節兖州刺史將軍如故毅號令嚴整所經墟邑百姓安悅南陽太守魯宗之起義襲襄陽破桓蔚毅等諸軍次江陵之馬頭振擁乘輿出營江津宗之又破偽將桓楷振自擊宗之毅率無忌道規等諸軍破馮該於豫章口推鋒而進遂入江陵振聞城陷與謙北走乘輿反正毅執元黨卞範之羊僧壽夏侯崇之桓道恭等斬之桓振復與苻宏自鄖城襲陷江陵與劉懷肅相持毅部將擊振殺之并斬偽輔國將軍桓珍毅又攻拔遷陵斬元太守劉叔祖於臨嶂其餘擁衆假號以十數皆討平之二州既平以毅為撫軍將軍時刁預等作亂屯於湘中毅遣將分討皆滅之初毅丁憂在家及義旗初興遂墨絰從事至是軍役漸寧上表乞還京口以終喪禮不許詔以毅為都督豫州揚州之淮南歷陽廬江安豐堂邑五都諸軍事豫州刺史持節將軍常侍如故其本府文武悉令西屬以匡復功封南平郡開國公兼都督宣城軍事給鼓吹一部梁州刺史劉稚反毅遣將討擒之初桓元於南州起齋悉畫盤龍於其上號為盤龍齋毅小字盤龍至是遂居之俄進拜衛將軍開府儀同三司及何無忌為盧循所敗賊軍乘勝而進朝廷震駭毅具舟船討之將發而疾篤內外失色朝議欲奉乘輿北就中軍劉裕會毅疾瘳將率軍南征裕與毅書曰吾往與妖賊戰曉其變態今修船垂畢將居前撲之克平之日上流之任皆以相委又遣毅從弟藩往止之毅大怒謂藩曰我以一時之功相推耳汝便謂我不及劉裕也投書於地遂以舟師二萬發姑熟徐道覆聞毅將至建鄴報盧循曰劉毅兵重成敗係此一戰冝併力距之循乃引兵發巴陵與道覆連旗而下毅次於桑落洲與賊戰敗績棄船以數百人步走餘衆皆為賊所虜輜重盈積皆棄之毅走經涉蠻晉飢困死亡至者十二三恭軍茅邃竭力營護之僅而獲免劉裕深慰勉之復其本職毅乃以邃為咨議參軍及裕討循詔毅知內外留事毅以喪師乞解任降為後將軍尋轉衛將軍開府儀同三司江州都督毅表求移鎮豫章朝廷許之時庾悅為江州刺史詔解其任毅遂移鎮豫章遣其親將趙恢領千兵守尋陽俄進毅為都督荆寧秦雍四州之河東河南廣平揚州之義城四郡諸軍事衛將軍開府儀同三司荆州刺史持節公如故毅表荆州編户不盈十萬器械索然廣州雖凋殘猶出丹漆之用請依先凖於是加督交廣二州毅至江陵乃輒取江州兵及豫州西府文武萬餘留而不遣又告疾困請藩為副劉裕以毅二於已乃奏之安帝下詔罪狀毅遂誅藩及尚書左僕射謝混以混黨於毅故也劉裕自率衆討毅命王𢎞王鎮惡蒯思等率軍至豫章口於江津燔舟而進毅參軍朱顯之逢鎮惡以所統千人赴毅鎮惡等攻陷外城毅守內城精鋭尚數千人戰至日昃鎮惡以裕書示城內毅怒不發書而焚之毅冀有外救督士卒力戰衆知裕至既暮鎮惡焚諸門齊力功之毅衆乃散毅至北門單騎而走去江陵二十里而縊經宿居人以告乃斬於市子姪皆伏誅毅兄模奔於襄陽魯宗之斬送之毅剛猛沉斷而専肆狠愎與劉裕協成大業而功居其次深自矜伐不相推伏及居方嶽常怏怏不得志裕每柔而順之毅驕縱滋甚每覽史籍至藺相如降屈於廉頗輒絶歎以為不可能也嘗云恨不遇劉項與之爭中原又謂其將郗僧施曰昔昭烈之有孔明猶魚之有水今吾與足下雖才非古賢而事同斯言衆咸惡其陵傲不遜及敗於桑落知物情去已彌復憤激初裕征盧循凱歸帝大宴於西池有詔賦詩毅詩云六國多雄士正始出風流自知武功不競故示文雅有餘也後於東府聚摴蒲大擲一判應至數百萬餘人並黑犢以還唯劉裕及毅在後毅次擲得雉大喜褰衣燒牀呌謂同坐曰非不能盧不事此耳因挼五木久之曰老兄試為卿答既而四子俱黑其一子轉躍未定裕厲聲喝之即成盧焉毅意殊不快然素黑其靣如鐡色焉而乃和其言曰亦知公不能以此見借既出西藩雖上流分陜而頓失內權又頗自嫌事計故欲擅其威強伺隙圖裕以至於敗初江州刺史庾悅隆安中為司徒長史曽至京口毅時甚屯窶先就府借東堂與親故出射而悅後與僚佐徑來詣堂毅告之曰毅輩屯否之人合一射甚難君於諸堂並可望以今日見讓悅不許射者皆散惟毅留射如故既而悅食鵝毅求其餘悅又不答毅常銜之義熙中故奪悅豫章解其軍府使人微示其旨悅忿懼而死毅之𥚹躁如此毅兄邁字伯羣少有才幹為殷仲堪中兵恭軍桓元之在江陵甚豪橫士庶畏之過於仲堪元曾於仲堪廳事前戲馬以矟擬仲堪邁時在坐謂元曰馬矟有餘精理不足元自以才雄冠世而心知外物不許之仲堪為之失色元出仲堪謂邁曰卿乃狂人也元夜遣殺卿我豈能相救邁以正辭折仲堪而不以為悔仲堪使邁下都避之元果令追之邁僅而免禍後元得志邁詣門稱謁元謂邁曰安知不死而敢相見邁對曰射鉤斬祛與邁為三故知不死元甚喜以為刑獄恭軍後為竟陵太守及毅與劉裕等同謀起義邁將應之事泄為元所害諸葛長民者琅邪陽都人也有文武幹用然不持行檢無鄉曲之譽桓元引為參軍平西軍事尋以貪刻免及劉裕建義與之定謀為揚武將軍從裕討桓元以功拜輔國將軍宣城內史於時桓歆聚衆向歷陽長民擊走之又與劉敬宣破歆於芍陂封新淦縣公食邑二千五百户以本官督淮北諸軍事鎮山陽義熙初慕容超寇下邳長民遣部將徐琰擊走之進位使持節都督青揚二州諸軍事青州刺史領晉陵太守鎮丹徒本號及公如故及何無忌為徐道覆所害賊乘勝逼京師朝廷震駭長民率衆入衛京都因表曰妖賊伐船集木而南康相郭澄之隱蔽經年又深相保明屢欺無忌罪合斬刑詔原澄之及盧循之敗劉毅也循與徐道覆連旗而下京師危懼長民勸劉裕權移天子過江裕不聼令長民與劉毅屯於北陵以備石頭事平轉督豫州揚州之六郡諸軍事豫州刺史領淮南太守及裕討毅以長民監太尉留府事詔以甲仗五十人入殿長民驕縱貪侈不恤政事多聚珍寶美色營建第宅不知紀極所在殘虐為百姓所苦自以多行無禮恆懼國憲及劉毅被誅長民謂所親曰昔年醢彭越前年殺韓信禍其至矣謀欲為亂問劉穆之曰人間論者謂太尉與我不平其故何也穆之曰相公西征老母弱弟委之將軍何謂不平長民弟黎民輕狡好利因勸之曰黥彭異體而勢不偏全劉毅之誅亦諸葛氏之懼可因裕未還以圖之長民猶豫未發既而歎曰貧賤常思富貴富貴必履危機今日欲為丹徒布衣豈可得也裕深疑之駱驛繼遣輜重兼行而下前尅至日百司於道候之輒差其期既而輕舟徑進潛入東府明旦長民聞之驚而至門裕伏壯士丁旿於幕中引長民進語素所未盡皆説焉長民悅旿自後拉而殺之輿尸付廷尉使收黎民黎民驍勇絶人與捕者苦戰而死小弟幼民為大司馬恭軍逃於山中追禽戮之諸葛氏之誅也士庶咸恨正刑之晚若釋桎梏焉初長民冨貴之後常一月中輒十數夜眠中驚起跳踉如與人相打毛修之常與同宿見之駭愕問其故長民曰正見一物甚黑而有毛腳不分明寄健非我無以制之其後來轉數屋中柱及椽桷間悉見有蛇頭令人以刀懸斫應刃隱藏去輒復出又搗衣杵相與語如人聲不可解於壁見有巨手長七八尺臂大數圍令斫之豁然不見未幾伏誅何無忌東海郯人也少有大志忠亮任氣人有不稱其心者轉形於言色州辟從事轉太學博士鎮北將軍劉牢之即其舅也時鎮京口每有大事常與恭議之會稽世子元顯子彥章封東海王以無忌為國中尉加廣武將軍及桓元害彥章於市無忌入市慟哭而出時人義焉隨牢之南征桓元牢之將降於元也無忌屢諫辭旨甚切牢之不從及元篡位無忌與元吏部郎曺靖之有舊請位小縣靖之白元元不許無忌乃還京口初劉裕常為牢之參軍與無忌素相親結至是因密共圖元劉毅家在京口與無忌素善言及興復之事無忌曰桓氏強盛其可圖乎毅曰天下自有強弱雖強易弱正患事主難得耳無忌曰天下草澤之中非無英雄也毅曰所見唯劉下邳無忌笑而不答還以告裕因共要毅與相推結遂與舉義兵襲京口無忌偽著傳詔服稱敕使城中無敢動者初桓元聞裕等及無忌之起兵也甚懼其黨曰劉裕烏合之衆勢必無成願不以為慮元曰劉裕勇冠三軍當今無敵劉毅家無儋石之儲樗蒱一擲百萬何無忌劉牢之之甥酷似其舅共舉大事何謂無成其見憚如此及元敗走武陵王遵承制以無忌為輔國將軍琅邪內史以會稽王道子所部精兵悉配之南追桓元與振武將軍劉道規俱受冠軍將軍劉毅節度元留其龍驤將軍何淡之前將軍郭銓江州刺史郭昶之守湓口無忌等次桑落洲淡之等率軍來戰淡之常所乘舫旌旗甚盛無忌曰賊帥必不居此欲詐我耳冝亟攻之衆咸曰淡之不在其中其徒得之無益無忌謂道規曰今衆寡不敵戰無全勝淡之雖不居此舫取則易獲因縱兵騰之可一鼓而敗也遂獲賊舫因傳呼曰已得何淡之矣賊中驚擾無忌之衆亦謂為然道規乘勝徑進無忌又鼓譟赴之淡之遂潰進據尋陽遣使奉送宗廟主祏及武康公主琅邪王妃還京都又與毅道規破走元於崢嶸洲無忌進據巴陵元從兄謙從子振乘間陷江陵無忌道規進攻謙於馬頭攻桓蔚於龍泉皆破之既而為桓振所敗退還尋陽無忌與毅道規復進討振克夏口三城遂平巴陵進次馬頭桓謙請割荆江二州奉送天子無忌不許進軍破江陵謙等敗走無忌侍衛安帝還京師以無忌督豫州揚州淮南盧江安豐歷陽堂邑五郡軍事右將軍豫州刺史加節甲仗五十人入殿未之職遷會稽內史督江東五郡軍事持節將軍如故給鼓吹一部義熙二年遷都督江荆二州江夏隨義陽綏安豫州西陽新蔡汝南潁川八郡軍事江州刺史將軍持節如故以興復之功封安城郡開國公食邑三千户增督司州之𢎞農揚州之松滋加散騎侍郎進鎮南將軍盧循遣將徐道覆順流而下舟艦皆重樓無忌將率衆拒之長史鄧潛之諌曰今以神武之師抗彼逆衆回山壓卵未足為譬然國家之計在此一舉聞其舟艦大盛勢居上流蜂蠆之毒邾魯成鑒冝決破南塘守二城以待之其必不敢捨我逺下蓄力以俟其疲老然後擊之若棄萬全之長䇿而決成敗於一戰如其失利悔無及矣無忌不從遂以舟師拒之既及賊令強弩數百登西岸小山以邀射之而薄於山側俄而西風暴起無忌所乘小艦被飄東岸賊乘風以大艦逼之衆遂奔敗無忌尚厲聲曰取我蘇武節來節至乃躬執以督戰賊衆雲集登艦者數十人無忌辭色無撓遂握節死之詔書傷悼贈侍中司空諡曰忠肅子雍嗣初桓元克京邑劉裕東征無忌密至裕軍所潛謀舉義勸裕於山隂起兵裕以元大逆未彰恐在逺舉事克濟為難若元遂竊天位然後於京口圖之事未晚也無忌乃還及義師之舉參贊大勳皆以算略攻取為效而此舉敗於輕脫朝野痛之檀憑之字慶子高平人也少有志力閨門雍肅為世所稱從兄子韶兄弟五人皆稚弱而孤憑之撫飬若已所生初為會稽王驃騎行參軍轉桓修長流恭軍領東莞太守加寧逺將軍與劉裕有州閭之舊又數同東討情好甚密義旗之建憑之與劉毅俱以私艱墨絰而赴雖才望居毅之後而官次及威聲過之故裕以為建武將軍裕將舉義也嘗與何無忌魏詠之同會憑之所會善相者晉陵韋叟見憑之大驚曰卿有急兵之厄其候不過三四日耳宜深藏以避之不可輕出及桓元將皇甫敷之至羅落橋也憑之與裕各領一隊而戰軍敗為敷軍所害贈冀州刺史義熙初詔加贈散騎常侍本官如故追封曲阿縣公邑三千户魏詠之字長道任城人也家世貧素而躬耕為事好學不倦生而兔缺有善相者謂之曰卿當冨貴年十八聞荆州刺史殷仲堪帳下有名醫能療之貧無行裝謂家人曰殘醜如此何用活為遂齎數斛米西上以投仲堪既至造門自通仲堪與語嘉其盛意召醫視之醫曰可割而補之但須百日進粥不得語笑詠之曰半生不語而有半生亦當療之况百日邪仲堪於是處之别屋令醫善療之詠之遂閉口不言唯食薄粥其厲志如此及差仲堪厚資遣之初為州主薄嘗見桓元既出元鄙其精神不雋謂坐客曰庸神而宅偉幹不成令器竟不調而遣之詠之早與劉裕遊欵及元篡位協贊義謀元敗授建威將軍豫州刺史桓欽寇歷陽詠之率衆擊走之義熙初進征虜將軍吳國內史尋轉荆州刺史持節都督六州領南蠻校尉詠之初在布衣不以貧賤為恥及居顯位亦不以冨貴驕人始為殷仲堪之客未幾竟踐其位論者稱之尋卒於官詔贈太常加散騎常侍其後録其贊義之功追封江陵縣公食邑二千五百户諡曰桓弟順之至琅邪內史通志卷一百二十九下
