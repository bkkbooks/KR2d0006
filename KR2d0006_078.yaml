body:
  text: 通志卷七十三宋右迪功郎鄭樵漁仲撰金石略第一上代文字錢譜三代欵識秦兩漢三國晉兩朝隋唐唐六帝唐名家金石序序曰方册者古人之言語款識者古人之面貌以後學跂慕古人之心使得親見其面而聞其言何患不與之俱化乎所以仲尼之徒三千皆為賢哲而後世曠世不聞若人之一二者何哉良由不得親見聞於仲尼耳蓋間習禮度不若式瞻容儀諷誦遺言不若親承音旨今之方册所傳者已經數千萬傳之後其去親承之道逺矣惟有金石所以垂不朽今列而為略庶幾式瞻之道猶存焉且觀晉人字畫可見晉人之風猷觀唐人書蹤可見唐人之典則此道後學安得而舍諸三代而上惟勒鼎彛秦人始大其制而用石鼓始皇欲詳其文而用豐碑自秦迄今惟用石刻散佚無紀可為太息故作金石略厯代金石蒼頡石室記有二十八字在蒼頡北海墓中土人呼為藏書室周時自無人識逮秦李斯始識八字曰上天作命皇辟迭王漢叔孫通識十二字夏禹書十二字見法帖未詳出處比干銅盤銘十六字西京史籕六字見法帖未詳出處孔子書季札墓十字潤州周穆王東巡四字邢州右上代文字見於模刻太昊金尊盧氏幣神農氏金黃帝貨金軒轅貨金帝昊金帝嚳金髙陽金堯泉舜䇿乘馬幣舜䇿幣貨金夏貨金商貨莊布商貨四布商連幣商湯金商子貨金周圜法貨周圜法别種齊公貨齊刀别種齊梁山幣莒刀齊布齊刀右見錢譜兵火以來今贑州尚有本晉薑鼎虢薑鼎鄭伯姬鼎宋君鼎周薑鼎文王鼎孔文父鼎魯公鼎宋公鼎周公鼎單冏鼎伯姬鼎宋君夫人鼎東宫方鼎商鼎得鼎庚鼎乙鼎大鼎始鼎欒鼎趠鼎辛鼎癸鼎尨鼎陀鼎東宫鼎盤鼎公誠鼎丁斯鼎王子吳鼎師寏鼎父乙鼎叔夜鼎􅀈氏鼎公癸鼎父甲鼎父丁鼎蟬文鼎尨生鼎召夫鼎師鼎師毛鼎師􅔨鼎周薑敦周虞敦雁侯敦屈生敦仲駒敦孟金敦刺公敦叔􅥡敦虢薑敦散季敦伯百父敦冀師敦尨敦敦始敦何敦尹敦戠敦周敦􅌏敦牧郭周公彛召公彛曹侯彛司空彛內史彛楚公彛沈子彛􅕆彛單冏彛伯宋彛仲舉彛單從彛品伯彛李娟彛敆姬彛楚王盞彛祖戊彛商兄癸彛父癸彛交父彛祖乙彛父乙彛父丁彛父已彛父辛彛母乙彛師艅彛仲父彛商彛五彛伯彛敆彛甗彛形彛尹彛應彛亞彛伊彛仲父彛小子師彛庚午鬲髙薑鬲書鬲丁父鬲父已鬲毛乙鬲乃子鬲母鬲虢叔鬲諸旅鬲莫敖鬲竇德鬲聿逺鬲伯鬲慧季鬲許子鐘􆃦鐘商鐘元子鐘走鐘遲父鐘南和鐘分寧鐘許子小鐘盄和鐘召公尊朝事尊韋子尊魚尊叔寶尊虎尊父戊尊祖戊尊商從尊中爵夫甲爵父丁爵祖辛爵父癸爵父辛爵大田爵父庚爵庚爵丁青爵商爵父戊爵祖已爵父已爵已舉爵已爵舉爵篆帶爵父乙爵祖乙爵伯爵飲爵觶爵父甲爵主人舉爵癸舉父辛舉寅簋左父簋叔髙簋師寏簋師奕簋弡中劉公􅔆太公缶子斯􅔆史㓿􆆲姬寏􅔆姬寏豆單疑豆仲虔洗仲虞洗田季匜寒戊匜叔匜杞公匜義母匜弡伯匜季姬匜季毫匜祖戊匜齊侯匜卭仲盤伯盞盤夀盤史孫􅸜盤卭仲盫伯戔應婦甗周陽侯甗仲信甗䣄甗孟嬭甗父已甗庚甗飲甗伯溫甗冀師舟師淮卣周卣冀卣商卣兄癸卣母辛卣母乙卣父甲卣祖癸卣父已卣祖戊卣伯王齍趠齍諸友盉伯王􅾤盉沈子盉盉豪盉父丁盉兹女觚象觚父庚觚甲子觚平周鉟􆀫罄丁舉甌伯索盂熙之戟銅角武安釡軹家釡右三代之款識見於博古圖等石鼓文秦鳳翔府宣和間移置東宫臣冇石鼓辨明為秦篆秦封泰山碑兖州嶧山頌德碑李斯篆鄭文寶模兖州秦相李斯等請刻始皇詔書兖州之罘山刻石可辨者十九字登州之罘大篆可辨者六十字登州始皇朐山碑潞州稽山頌德碑李斯篆疑在越州刻二世詔文李斯篆密州殘碑二十字李斯篆登州州衙祀巫咸大湫文俗呼咀楚文李斯篆鳳翔府又渭州州學本與鳳翔小異右秦陳留太守程封碑東京酸棗令劉熊紀績碑有碑隂東京執金吾髙褒碑東京太保髙峻碑東京丞相陳平碑東京三老袁貢碑永建六年東京袁騰碑貢之子在東京西平令楊期碑東京征西大將軍楊僅碑東京大司農陳君碑中平四年有四碑在東京邉讓碑東京董襲碑東京八都神廟碑鎮州封龍山碑鎮州藳城長蔡湛碑有碑隂光和四年鎮州無極山碑光和八年鎮州上谷太守張􅱨碑定州孝子王立碑定州譙敏碑蔡雍文冀州賈敏碑冀州李固碑懷州左伯桃碑安肅軍蘇武碑京兆府乞復華下民田租狀華州西嶽石闕銘永和元年華州西嶽和山亭碑華州司徒劉竒碑華州西嶽華山廟碑華州劉黨碑華州立教院君神祠碑華州太尉楊震碑并碑隂題名華州髙陵令楊君碑及碑隂華州繁隂令楊尋碑熹平中華州金城太守楊統碑華州郭有道碑蔡雍文并書太原府郭林宗碑汾州山陽太守祝睦二碑延熹七年南京陽翟令許叔臺碑南京兗州從事丁仲禮墓碑南京太尉掾橋君墓碑南京宋國縣繹幕令碑南京漢橋元碑南京慎令劉君墓碑建寧四年南京光祿勳劉耀碑鄆州袁安碑徐州太傅龔勝碑徐州劉熙碑及碑隂徐州漢髙祖感應碑延熹十年徐州髙祖廟碑徐州太尉陳球碑蔡雍文并書光和元年徐州太尉陳球後碑徐州陳球碑隂御史大夫鄭宫碑卜式墓碑兗州鮑宣碑兗州魯相史晨等奏出王家榖祠孔子碑建寧二年兗州司徒吳雄等奏孔子廟置卒史碑元嘉三年兗州魯相復顔氏繇發碑永嘉三年兗州太山太守孔宙碑延熹六年兗州孔彪碑及碑隂建寧四年兗州漢碑永夀三年婺州從事孔君德立於孔子墓壇前兗州小篆碑蔡雍書兗州河東太守孔雄碑建寧四年兗州司農孔峽碑建寧元年兗州魯相韓叔節修孔子廟碑永年夀二兗州博士孔志碑兗州御史孔翊碑兗州博士逢汾墳前石柱碑篆濰州竹邑侯相張夀碑建寧元年單州侯伯