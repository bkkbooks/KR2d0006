body:
  text: 通志卷一百九十一宋右廸功郎鄭樵漁仲撰載記第六後燕慕容垂寳盛熙髙雲西秦乞伏國仁乾歸熾磐慕末北燕馮䟦𢎞馮素弗後燕慕容垂字道眀皝之第五子也少岐嶷有器度身長七尺七寸手垂過膝皝甚寵之常目而謂諸弟曰此免闊逹好竒終能破人家或能成人家故名覇字道業恩遇踰于世子儁故儁不能平之以滅宇文之功封都鄊侯石虎来伐既還猶有兼并之志遣将鄧恒率衆數萬屯于樂安營攻取之備垂戍徒河與恒相持恒憚而不敢侵垂少好畋㳺因獵墜馬折齒慕容儁僭即王位改名缺外以慕郤缺為名内實惡而改之尋以䜟記之文乃去夬以垂為名焉石虎之死也趙魏亂垂謂儁曰時来易失赴機在速兼弱攻昧今其時矣儁以新遭大喪不許慕輿根言扵儁曰王子之言千載一時不可失也儁乃從之以垂為前鋒都督儁既尅幽州将坑降卒垂諫曰弔伐之義先代常典今方平中原宜綏懐以徳坑戮之刑不可為王師之先聲儁従之及儁僭稱尊號封垂吴王徙鎮信都以侍中右禁将軍録留臺事大収東北之和又為征南将軍荆兖二州牧有聲于梁楚之南再為司𨽻偽王公已下莫不累迹時慕容暐嗣偽位慕容恪為太宰恪甚重垂常謂暐曰吴王将相之才十倍扵臣先帝以長㓜之次以臣先之臣死之後願陛下委政吴王可謂親賢兼舉及敗桓温于枋頭威名大振慕容評深忌惡之乃謀誅垂垂懼禍及已與世子全奔于苻堅自恪卒後堅密有圗暐之謀憚垂威名而未發及聞其至堅大悦郊迎執手禮之甚重堅相王猛惡垂雄畧勸堅殺之堅不従以為冠軍将軍封賓都侯食華隂之五百户王猛伐洛引全為㕘軍猛乃命人詭傳垂語扵全曰吾已東還汝可為計也全信之乃奔暐猛表全叛状垂懼而東奔及藍田為追騎所獲堅引見東堂慰勉之曰卿國家失和委身投朕賢子志不亡夲猶懐首邱書不云乎父父子子無相及也卿何為過懼而狼狽若斯也扵是復垂爵位恩待如初及堅擒暐垂随堅入鄴收集諸子對之悲慟見其故吏有不悦之色前郎中令髙弼私扵垂曰大王以命世之姿遭無妄之運迍邅棲伏艱亦至矣天啓嘉會靈命蹔遷此乃鴻漸之始龍變之初深願仁慈有以慰之且夫髙世之畧必懐遺俗之規方圗網漏吞舟以𢎞苞養之義收納舊臣之胄以成為山之功柰何以一怒捐之竊為大王不取垂深納之垂在堅朝歴位京兆尹進封泉州侯所在征伐皆有大功堅之敗扵淮南也垂軍獨全堅以千餘騎奔垂垂世子寳言扵垂曰家國傾喪皇綱廢弛至尊眀命著之圗籙當隆中興之業建少康之功但時来之運未至故韜光俟奮耳今天厭亂徳凶衆土崩可謂乾唘神機授之于我千載一時今其㑹也宜恭承皇天之意因而取之且夫立大功者不顧小節行大仁者不念小恵秦既蕩覆三京竊辱神器仇耻之深莫甚扵此願不以意氣㣲恩而忘社稷之重五木之祥今其至矣垂曰汝言是也然彼以赤心投命若何害之茍天所棄圗之多便且縦令北還更待其釁既不負宿心可以義取天下垂弟徳進曰夫鄰國相吞有自来矣秦彊而并燕秦弱而圗之此為執仇雪辱豈所謂負宿心也昔鄧祁侯不納三甥之言終為楚所滅吴王夫差違子胥之諫取禍句踐前事之不忘後事之師表也願不棄湯武之成蹤追韓信之敗迹乗彼土崩恭行天罰斬逆氐復宗祀建中興繼洪烈天下大機弗宜失也若釋數萬之衆授干将之柄是却天時而待後害非至計也語曰當斷不斷反受其亂願兄無疑垂曰吾昔為太傅所不容投身扵秦主又為王猛所譖復見昭亮國士之禮每深報徳萬分未一如使秦運必窮厯數歸我者授首之便何慮無之闗西之帝會非吾有自當有擾之者吾可端拱而定闗東君子不怙亂不為禍先且可觀之乃以兵屬堅初寳在長安與韓黄李根等因讌摴蒱寳危坐整容誓之曰世云摴蒱有神豈虚言㢤若富貴可期頻得三盧扵是三擲盡盧寳拜而受賜故云五木之祥堅至澠池垂請至鄴展拜陵墓因張國威刑以安戎狄堅許之權翼諫曰垂爪牙名将所謂今之韓白世豪東夏志不為人用頃以避禍歸誠非慕徳而至列土干城未可以滿其志冠軍之號豈足以稱其心且垂猶鷹也饑則附人飽便髙颺遇風塵之㑹必有陵霄之志惟宜急其羈靽不可任其所欲堅不従遣其将李蠻閔亮尹國率衆三千送垂又遣石越戍鄴張蚝戍并州時堅子丕先在鄴及垂至丕館之于鄴西垂具説淮南敗状㑹堅将苻暉告丁零翟斌聚衆謀逼洛陽丕謂垂曰翟斌兄弟因王師小失敢肆凶勃子母之軍殆難為敵非冠軍英畧莫可以滅也欲相煩一行可乎垂曰下官殿下之鷹犬敢不惟命是聼扵是大賜金帛一無所受惟請舊田園丕許之配垂兵二千遣其将苻飛龍率氐騎一千為垂之副丕戒飛龍曰卿王室胏腑年秩雖卑其實帥也垂為三軍之統卿為謀垂之主用兵制勝之權防微杜貳之略委之扵卿卿其勉之垂請入鄴城拜廟丕弗許乃潛服而入亭吏禁之垂怒斬吏燒亭而去石越言扵丕曰垂之在燕破國亂家及投命聖朝䝉超常之遇忽敢輕侮方鎮殺吏焚亭反形已露終為亂階将老兵疲可襲而取之矣丕曰淮南之敗衆散親離而垂侍衛聖躬誠不可忘越曰垂既不忠扵燕其肯盡忠扵我乎且其亡虜也主上寵同功舊不能銘澤誓忠而首謀為亂今不撃之必為後害丕不従越退而告人曰公父子好存小人不顧天下大計吾屬終當為鮮卑虜矣垂至河内殺飛龍悉誅氐兵召募逺近衆至三萬濟河焚橋令曰吾夲外假秦聲内規興復亂法者軍有常刑奉命者賞不踰日天下既定封爵有差不相負也翟斌聞垂之将濟河也遣使推垂為盟主垂距之曰吾父子寄命秦朝危而獲濟荷主上不世之恩䝉更生之惠雖曰君臣義深父子豈可因其小隙便懐二三吾夲救豫州不赴君等何為斯議而及扵我垂進欲襲據洛陽故見苻暉以臣節退又未審斌之誠款故以此言距之垂至洛陽暉閉門距守不與垂通斌又遣長史河南郭通説垂乃許之斌率衆㑹垂勸稱尊號垂曰新興侯國之正統孤之君也若以諸君之力得平闗東當以大義喻秦奉迎返正無上自尊非孤心也謀于衆曰洛陽四面受敵北阻大河至扵控馭燕趙非形勝之便不如北取鄴都據之而制天下衆咸以為然乃引師而東遣建威将軍王騰起浮橋于石門初垂之發鄴中子農及兄子楷紹弟子宙為苻丕所留及誅飛龍遣田生密告農等使起兵趙魏以相應扵是農宙奔列人楷紹奔辟陽衆咸應之農西招庫辱官偉于上黨東引乞特歸于東阿各率衆數萬赴之衆至十餘萬丕遣石越討農為農所敗斬越扵陣垂引兵至滎陽以太元八年自稱大都督燕王承制行事建元曰燕元令稱統府府置四佐王公以下稱臣凡所封拜一如王者以翟斌為建義大将軍封河南王翟檀為柱國大将軍𢎞農王弟徳為車騎大将軍范陽王兄子楷征西大将軍太原王衆至二十餘萬濟自石門長驅攻鄴農楷紹宙等率衆㑹垂立子寳為燕王太子封功臣為公侯伯子男者百餘人苻丕乃遣侍郎姜讓謂垂曰往嵗大駕失據君保衛鑾輿勤王誠義邁蹤前烈宜述修前規終忠貞之節柰何棄崇山之功為此過舉過貴能改先賢之嘉事也深宜詳思悟猶未晚垂謂譲曰孤受主上不世之恩故欲安全長樂公使盡衆赴京師然後修復家國之業與秦永為鄰好何故闇扵機運不以鄴見歸也大義滅親况扵意氣之顧公若迷而不返者孤亦欲窮兵勢耳今事已然恐單馬乞命不可得也譲厲色責垂曰将軍不容扵家國投命扵聖朝燕之尺土将軍豈有分乎主上與将軍風殊類别臭味不同竒将軍扵一見託将軍以斷金寵踰宗舊任齊懿藩自古君臣冥契之重豈甚此耶方付将軍以六尺之孤萬里之命柰何王師小敗便有二圗夫師起無名終則弗成天之所廢人不能支将軍起無名之師而欲興天所廢竊未見其可長樂公主上之元子聲徳邁扵唐衛居陜東之任為朝廷維城其可束手輸将軍以百城之地大夫死王事國君死社稷将軍欲裂冠毁冕拔夲塞源者自可任将軍兵勢何復多云但念将軍以七十之年懸首白旗髙世之忠忽為逆鬼竊為将軍痛之垂黙然左右勸垂殺之垂曰古者兵交使在其間犬各吠非其主何所問也乃遣譲歸垂上表扵苻堅曰臣才非古人致禍起蕭墻身要時難歸命聖朝陛下恩深周漢猥叨微顧之遇位為列将爵忝通侯誓在勠力輸誠常懼不及去夏桓冲送死一擬雲消廻討鄖城俘馘萬計斯誠陛下神筭之竒頗亦愚臣忘死之效方将飲馬桂洲懸旌閩㑹不圗天助亂徳大駕班師陛下單馬奔臣臣奉衛匪貳豈陛下聖眀鑒臣單心皇天后土實亦知之臣奉詔北廵受制長樂然丕外失衆心内多猜忌令臣野次外庭不聼謁廟丁零逆豎宼逼豫州丕廹臣單赴限以師程惟給弊卒二千盡無兵杖復令飛龍潛為刺客及至洛陽平原公暉復不信納臣竊惟進無淮隂功髙之慮退無李廣失利之愆懼有青蠅交亂白黑丁零夷夏以臣忠而見疑乃推臣為盟主臣受託善始不遂令終泣望西京揮涕即邁軍次石門所在雲赴雖復周武之㑹扵孟津漢祖之集扵垓下不期之衆實有甚焉欲令長樂公盡衆赴難以禮發遣而丕固守匹夫之志不逹變通之理臣息農收集故營以備不虞而石越傾鄴城之衆輕相掩襲兵陣未交越已隕首臣既單車懸軫歸者如雲斯實天符非臣之力且鄴者臣國舊都應即惠及然後西向受制永守東藩上成陛下遇臣之意下全愚臣感報之誠今進師圍鄴并喻丕以天時人事而丕不察機運杜門自守時出挑戰鋒戈屢交恒恐飛矢誤中以傷陛下天性之念臣之此誠未簡神聼輙遏兵止鋭不敢窮攻夫運有推移去来常事惟陛下察之堅報曰朕以不徳忝承靈命君臨萬邦三十年矣遐方幽裔莫不来庭惟東南一隅敢違王命朕爰奮六師恭行天罰而元機不弔王師敗績賴卿忠誠之至輔翼朕躬社稷之不隕卿之力也詩云中心蔵之何日忘之方任卿以元相爵卿以郡侯庶𢎞濟艱難敬酬勲烈何圗伯夷忽毁冰操栁惠倐為淫夫覽表惋然有慚朝士卿既不容扵夲朝匹馬而投命朕則寵卿以将位禮卿以上賓任同舊臣爵齊勲輔㰱血斷金披心相付謂卿食椹懐音保之偕老豈意畜水覆舟養虎返害悔之噬臍将何所及誕言駭衆誇擬非常周武之事豈卿庸人所可論㢤失籠之鳥非羅所覊脱網之鯨豈罟所制翹陸任懐何煩聞也念卿垂老老而為賊生為叛臣死為逆鬼侏張幽顯布毒存亡中原士女何痛如之朕之歴運興喪豈復由卿但長樂平原以未立之年遇卿扵兩都慮其經略未稱朕心所恨者此焉而已垂攻拔鄴郛丕固守中城垂塹而圍之分遣老弱扵魏郡肥郷築新興城以置輜重壅漳水以灌之翟斌潛諷丁零及西人請斌為尚書令垂訪之羣僚其安東将軍封衡厲色曰馬能千里不免覊靽眀畜生不可以人御也斌戎狄小人遭時際㑹兄弟封王自驩兠已来未有此福忽履盈忘止復有斯求魂爽錯亂必死不出年也垂猶隐忍容之令曰翟王之功宜居上輔但臺既未建此官不可便置待六合廓清更當議之斌怒密應苻丕潛使丁零决防潰水事洩垂誅之斌兄子真率其部衆北走邯鄲引兵向鄴欲與丕為内外之勢垂令其太子寳冠軍慕容隆撃破之真自邯鄲北走又使慕容楷率騎追之戰于下邑為眞所敗真遂屯于承營垂謂諸将曰苻丕窮宼必守死不降丁零叛擾乃我腹心之患吾欲遷師新城開其逸路進以謝秦王疇昔之恩退以嚴撃真之備扵是引師去鄴北屯新城慕容農進攻翟嵩于黄泥破之垂謂其范陽王徳曰苻丕吾縦之不能去方引晋師規固鄴都不可置也進師又攻鄴開其西奔之路垂将有北都中山之意農率衆數萬迎之羣僚聞慕容暐為苻堅所殺勸垂僭位垂以慕容冲稱號闗中不許晋龍驤将軍劉牢之率衆救苻丕至鄴垂逆戰敗績遂徹鄴圍退屯新城垂自新城北走牢之追垂連戰皆敗又戰于五橋澤王師敗績徳及隆引兵要之于五丈橋牢之馳馬跳五丈澗㑹苻丕救至而免翟真去承營徙屯行唐真司馬鮮于乞殺真盡誅翟氏自稱趙王營人攻殺乞迎立真從弟成為王真子遼奔黎陽髙句驪寇遼東垂平北慕容佐遣司馬郝景率衆救之為髙句驪所敗遼東元莬遂沒建節将軍徐巖叛于武邑驅掠四千餘人北走幽州垂馳勑其将平規曰但固守勿戰比破丁零吾當自討之規違命距戰為巖所敗巖乗勝入薊掠千餘户而去所過宼暴遂據令支翟成長史鮮于得斬成而降垂入行唐悉坑其衆苻丕棄鄴城奔于并州慕容農攻尅令支斬徐巖兄弟進伐髙句驪復遼東元莬二郡還屯龍城垂定都中山羣僚勸即尊號具典儀修郊燎之禮垂従之以太元十一年僭即位赦其境内改元曰建興置百官繕宗廟社稷立寳為太子以其左長史庫辱官偉右長史叚崇龍驤張崇中山尹封衡為吏部尚書慕容徳為侍中都督中外諸軍事領司𨽻校尉撫軍慕容麟為衛大将軍其餘拜授有差追尊母蘭氏為文昭皇后遷皝后叚氏以蘭氏配饗博士劉詳董謐議以堯母妃位第三不以貴陵姜嫄眀聖王之道以至公為先垂不従遣其征西慕容楷衛軍慕容麟鎮南慕容紹征虜慕容宙等攻苻堅冀州牧苻定鎮東苻紹幽州牧苻謨鎮北苻亮楷與定等喻以禍福定等悉降垂留其太子寳守中山率諸将南攻翟遼以楷為前鋒都督遼之部衆皆燕趙人咸曰太原王之子吾之父母相率歸附遼懼遣使請降垂至黎陽遼肉袒謝罪垂厚撫之為其太子寳起承華觀以寳録尚書政事巨細皆委之垂總大綱而已立其夫人叚氏為皇后又以寳領侍中大單于驃騎大将軍幽州牧建留臺于龍城以髙陽王慕容隆録留臺尚書事時慕容暐及諸宗室為苻堅所害者並招魂𦵏之清河太守賀耕聚衆定陵以叛南應翟遼慕容農討斬之毁定陵城進師入鄴以鄴城廣難固築鳳陽門大道之東為隔城其尚書婁㑹上疏請以吏遭大喪聼終三年之制垂不従翟遼死子釗代立攻逼鄴城慕容農擊走之垂引師伐釗于滑臺次于黎陽津釗扵南㟁距守諸将惡其兵精咸諌不宜濟河垂笑曰豎子何能為吾今為卿等殺之遂徙營就西津為牛皮船百餘艘載疑兵列杖溯流而上釗先以大衆備黎陽見垂向西津乃棄營西距垂潜遣其桂林王慕容鎮驍騎慕容國扵黎陽津夜濟壁于河南釗聞而奔還士衆疲渴走歸滑臺釗擕妻子率數百騎北趣白鹿山農追擊盡擒其衆釗單騎奔長子釗所統七郡户三萬八千皆安堵如故徙徐州流人七千餘户于黎陽扵是議征長子諸将咸諫以慕容永未有釁連嵗征役士卒疲怠請俟他年垂将従之及聞慕容徳之策笑曰吾計决矣且吾投老扣囊底智足以尅之不復留逆賊以累子孫也乃發歩騎七萬遣其丹陽王慕容瓉龍驤張崇攻永弟支于晋陽永遣其将刁雲慕容鐘率衆五萬屯潞州垂遣慕容楷出自滏口慕容農入自壺闗垂頓于鄴之西南月餘不進永謂垂詭道伐之乃攝諸軍還杜太行軹闗垂進師入自天井闗至于壺壁永率精卒五萬来距阻河曲以自固馳使請戰垂列陣于壺壁之南農楷分為二翼慕容國伏千兵于深澗與永大戰垂引軍偽退永追奔數里國發伏兵馳斷其後楷農夹擊之永師大敗斬首八千餘級永奔還長子慕容瓉攻尅晋陽垂進圍長子永将賈韜等潜為内應垂進軍入城永奔北門為前驅所獲扵是數而戮之并其所署公卿刁雲等三十餘人永所統新舊八郡户七萬六千八百及乗輿服御伎樂珍寳悉獲之扵是品物具矣使慕容農略地河南攻廪邱陽城皆尅之太山琅邪諸郡皆委城奔潰農進師臨海置守宰而還垂告㨗于龍城之廟遣其太子寳及農與慕容麟等率衆八萬伐魏慕容徳慕容紹以歩騎一萬八千為寳後繼魏聞寳将至徙往河西寳進師臨河懼不敢濟還次參合忽有大風黑氣状若隄防或髙或下臨覆軍上沙門支曇猛言扵寳曰風氣暴迅魏軍将至之候宜遣兵禦之寳笑而不納曇猛固以為言乃遣麟率騎三萬為後殿以禦非常麟以曇猛言為虚縦騎㳺獵俄而黄霧四塞日月晦㝠是夜魏師大至三軍奔潰寳與徳等數千騎奔免士衆還者十一二紹死之初寳至幽州所乗車軸無故自折術士靳安以為大凶固勸寳還寳怒不從故及扵敗寳恨參合之敗屢言魏有可乗之機慕容徳亦曰魏人狃于參合之役有陵太子之心宜及聖畧摧其鋭志垂從之留徳守中山自率大衆出參合鑿山開道次于獵領遣寳與農出天門征北慕容隆征西慕容盛踰青山襲魏陳留公泥于平城䧟之收其衆三萬餘人而還垂至參合見往年戰處積骸如山設弔祭之禮死者父兄一時號哭軍中皆慟垂慚憤歐血因而寝疾乗馬輿而進過平城北三十里疾篤築燕昌城而還寳等至雲中聞垂疾皆引歸及垂至于平城或有叛者奔告魏曰垂病已亡輿尸在軍魏又聞參合大哭以為信然乃進兵追之知平城已陷而退還館隂山垂至上谷之俎陽以太元二十一年死時年七十一凡在位十三年遺令曰方今禍難尚殷喪禮一従簡易朝終夕殯事訖成服三日之後釋服從政彊宼伺隙祕勿發喪至京然後舉哀行服寳等遵行之偽諡成武皇帝廟號世祖墓曰宣平陵慕容寳字道祐垂之第四子也少輕果無志操好人佞已苻堅時為太子洗馬萬年令堅淮肥之役以寳為陵江将軍及為太子砥礪自修敦崇儒學工談論善屬文曲事垂左右小臣以求美譽垂之朝士翕然稱之垂亦以為克保家業甚賢之垂死其年寳嗣偽位大赦境内改元為永康以其太尉庫辱官偉為太師左光禄大夫叚崇為太保其餘拜授各有差遵垂遺令校閱户口罷諸軍營分屬郡縣定士族舊籍眀其官儀而法峻政嚴上下離徳百姓思亂者十室而九焉初垂以寳冡嗣未建每憂之寳庶子清河公㑹多材藝有雄畧垂深竒之及寳之北伐使㑹代攝官事縂録禮遇一同太子所以見定旨也垂之伐魏以龍城舊都宗廟所在復使㑹鎮幽州委以東北之重髙選僚屬以崇威望臨死顧命以㑹為寳嗣而寳寵愛少子濮陽公䇿意不在㑹寳庶長子長樂公盛自以同生年長耻㑹先之乃盛稱䇿宜為儲貳而非毁㑹焉寳大悦乃訪其趙王麟髙陽王隆麟等咸希旨賛成之寳遂與麟等定計立䇿母叚氏為皇后䇿為皇太子盛㑹進爵為王䇿字道符年十一美姿貌而惷弱不慧魏伐并州驃騎李農逆戰敗績還于晋陽司馬慕輿嵩閉門距之農率騎數千奔歸中山行及潞川為魏追軍所及餘騎盡沒單馬遁還寳引羣臣于東堂議之中山尹苻謨曰魏軍彊盛千里轉鬭乗勝而来勇氣兼倍若逸騎平原形勢彌盛殆難為敵宜杜險距之中書令眭邃曰魏軍多騎師行剽鋭馬上齎糧不過旬日宜令郡縣聚千家為一堡深溝髙壘清野待之至無所掠資食無出不過六旬自然窮退尚書封懿曰今魏師十萬天下之勍敵也百姓雖欲營聚不足自固是則聚糧集兵以資彊寇且動衆心示之以弱阻闗距戰計之上也慕容麟曰魏今乗勝氣鋭其鋒不可當宜自完守設備待其弊而乗之於是修城積粟為持久之備魏攻中山不剋進據博陵魯口諸将望風奔退郡縣悉降于魏寳聞魏有内難乃盡衆出距歩卒十二萬騎三萬七千次于曲陽栢津魏軍進至新梁寳憚魏師之鋭乃遣征北隆夜襲魏軍敗績而還魏軍方軌而至對營相持上下兇懼三軍奪氣農麟勸寳還中山乃引歸魏軍追撃之寳農等棄大軍率騎二萬奔還時大風雪凍死者相枕扵道寳恐為魏軍所及命去袍杖戎器寸刄無返魏軍進攻中山屯于芳林園其夜尚書慕容皓謀殺寳立慕容麟皓妻兄蘇泥告之寳使慕容隆收皓皓與同謀數十人斬闗奔魏麟懼不自安以兵刼左衛将軍北地王精謀率禁旅弑寳精以義距之麟怒殺精出奔丁零初寳聞魏之来伐也使慕容㑹率幽并之衆赴中山麟既叛寳恐其逆奪㑹軍将遣兵迎之麟侍郎叚平子自丁零奔還說麟招集丁零軍衆甚盛謀襲㑹軍東據龍城寳與其太子䇿及農隆等萬餘騎迎㑹于薊以開封公慕容詳守中山㑹傾身誘納繕甲厲兵歩騎二萬列陣而進迎寳薊南寳分其兵給農隆遣西河公庫辱官驥率衆三千助守中山㑹以䇿為太子有恨色寳以告農隆俱曰㑹一年少専任方事習驕所致豈有他也臣當以禮責之幽平之士皆懐㑹威徳不樂去之咸請曰清河王天資神武權略過人臣等與之誓同生死感王恩澤皆勇氣自倍願陛下與皇太子諸王止駕薊宫使王統臣等進解京師之圍然後奉迎車駕寳左右皆害其勇略譖而不許衆咸有怨言左右勸寳殺㑹侍御史仇尼歸聞而告㑹曰左右密謀如是主上将從之大王所恃唯父母也父已異圖所仗者兵也兵已去手進退路窮恐無自全之理盍誅二王廢太子大王自處東宫兼領将相以匡杜稷㑹不從寳謂農隆曰觀㑹為變事當必然宜早殺之不爾恐成大禍農曰宼賊内侮中州紛亂㑹鎮撫舊都安衆寜境及京師有難萬里星赴威名之重可以振服戎狄又逆跡未彰宜且隐忍今社稷之危若綴旒然復内相誅戮有損威望寳曰㑹逆心已成而王等仁慈不欲去之恐一旦釁發必先害諸父然後及吾事敗之後當思朕言農等固諫乃止㑹聞之彌懼奔于廣都黄榆谷㑹遣仇尼歸等率壮士二十餘人分襲農隆隆是夜見殺農中重創既而㑹歸于寳寳意在誅㑹誘而安之潜使左衛慕容騰斬㑹不能傷復奔其衆扵是勒兵攻寳寳率數百騎馳如龍城㑹率衆追之遣使請誅左右佞臣并求太子寳弗許㑹圍龍城侍御郎髙雲夜率敢死士百餘人襲㑹敗之衆悉逃散單馬奔還中山乃踰圍而入為慕容詳所殺詳僭稱尊號置百官改年號荒酒淫奢殺戮無度誅其王公以下五百餘人内外震局莫敢忤視城中大饑公卿餓死者數十人麟率丁零之衆入中山斬詳及其親黨三百餘人復僭稱尊號中山饑甚麟出據新市與魏師戰于義臺麟軍敗績魏師遂入中山麟乃奔鄴慕容徳遣侍郎李延勸寳南伐寳大悦慕容盛切諌以為兵疲師老魏新平中原宜養兵觀釁更俟他年寳将從之撫軍慕輿騰進曰今衆旅已集宜乗新定之機以成進取之功人可使由之而難與圗始惟當獨决聖慮不足廣採異同以沮亂軍議也寳曰吾計决矣敢諌者斬寳發龍城以慕輿騰為前軍大司馬慕容農為中軍寳為後軍歩騎三萬次于乙連長上叚速骨宋赤眉因衆軍之憚役也殺司空樂浪王宙逼立髙陽王崇寳單騎奔農仍引軍討速骨衆咸憚征幸亂投杖奔之騰衆亦潰寳農馳還龍城蘭汗潛與速骨通謀速骨進師攻城農為蘭汗所譎潛出赴賊為速骨所殺衆皆奔𣪚寳與慕容盛慕輿騰等南奔蘭汗奉太子䇿承制遣使迎寳及于薊城寳欲還北盛等咸以汗之忠款虚實未眀今單馬而還汗有貳志者悔之無及寳從之乃自薊而南至黎陽聞慕容徳稱制懼而退遣慕輿騰招集散兵于鉅鹿慕容盛結豪桀于冀州叚儀叚温收部曲于内黄衆皆響㑹尅期将集㑹蘭汗遣左将軍蘇超迎寳寳以汗垂之季舅盛又汗之壻也必謂忠款無貳乃還至龍城汗引寳入于外邸弑之時年四十四在位三年即隆安三年也汗又殺其太子䇿及王公卿士百餘人汗自稱大都督大将軍大單于昌黎王盛僭位偽諡寳惠愍皇帝廟號烈宗皝之遷于龍城也植松為社主及秦滅燕大風吹㧞之後數年社處忽有桑二根生焉先是遼川無桑及廆通于晋求種江南平州桑悉由吴来廆終而垂以吴王中興寳之将敗大風又拔其一盛字道運寳之庶長子也少沉敏多謀畧苻堅誅慕容氏盛潜奔于沖及沖稱尊號有自得之志賞罰不均政令不眀盛年十二謂叔父柔曰今中山王智不先衆才不出下恩未施人先自驕大以盛觀之鮮不覆敗俄而沖為叚木延所殺盛随慕容永東如長子謂柔曰今﨑嶇扵鋒刄之間在疑忌之際愚則為人所猜智則危甚巢幕當如鴻鵠髙飛一舉萬里不可坐待罟網也扵是與柔及弟㑹間行東歸于慕容垂遇盗陕中盛曰我六尺之軀入水不溺在火不焦汝欲當吾鋒乎試竪爾手中箭百歩我若中之宜慎爾命如其不中當束身相授盗乃竪箭盛一發中之盗曰郎貴人之子故相試耳資而遣之嵗餘永誅儁垂之子孫男女無遺盛既至垂問以西事畫地成圗垂笑曰昔魏武撫眀帝之首遂乃侯之祖之愛孫有自来矣扵是封長樂公驍勇剛毅有伯父全之風烈寳即偽位進爵為王寳自龍城南伐盛留統後事及叚速骨作亂馳出迎衛寳㡬為速骨所獲頼盛以免盛屢進竒䇿扵寳寳不能從是以屢敗寳既如龍城盛留在後寳為蘭汗所殺盛馳進赴哀将軍張真固諌以為不可盛曰我今投命告以哀窮汗性愚近必顧念婚姻不忍害我旬月之間足展吾志遂入赴喪汗妻乙氏泣涕請盛汗亦哀之遣其子穆迎盛舍之宫内親敬如舊汗兄提弟難勸汗殺盛汗不從慕容竒汗之外孫也汗亦宥之竒入見盛遂相與謀盛遣竒起兵于外衆至數千汗遣蘭提討竒提驕佷滛荒事汗無禮盛因間之扵汗曰竒小兒也未能辦此必内有應之者提素驕不可委以大衆汗因發怒收提誅之遣其撫軍仇尼慕率衆討竒汗兄弟見提之誅莫不危懼皆阻兵背汗襲敗慕軍汗大懼遣其子穆率衆討之穆謂汗曰慕容盛我之仇也竒今起逆盛必應之兼内有蕭墻之難不宜飬心腹之疾汗将誅盛引見察之盛妻以告扵是偽稱疾篤不復出入汗乃止有李旱衛䨇劉志張豪張真者皆盛之舊昵蘭穆引為腹心旱等屢入見盛潜結大謀㑹穆討蘭難等斬之大饗将士汗穆皆醉盛夜因如厠袒而踰墻入于東宫與李旱等誅穆衆皆踴呼進攻汗斬之汗二子魯公和陳公楊分屯令支白狼遣李旱張真襲誅之扵是内外帖然士女咸悦盛謙揖自卑不稱尊號其年以長樂王稱制赦其境内改元曰建平諸王降爵為公文武各復舊位初慕容竒聚衆于建安将討蘭汗百姓翕然従之汗遣兄子全討竒竒擊滅之進屯乙連盛既誅汗命竒罷兵竒遂與丁零嚴生烏丸王龍之阻兵叛盛引軍至横溝去龍城十里盛出兵擊敗之執竒而還斬龍生等百餘人盛扵是僭即尊位大赦殊死已下追尊伯考獻荘太子全為獻荘皇帝尊寳后叚氏為皇太后全妃丁氏為獻荘皇后諡太子䇿為獻哀太子盛幽州刺史慕容豪尚書左僕射張通昌黎尹張順謀叛盛皆誅之改年為長樂有犯罪者十日一自决之無撾捶之罰而獄情多實髙句驪王安遣使貢方物有雀素身緑首集于端門栖翔東園二旬而去改東園為白雀園盛好為竒詭之論嘗聼詩歌周公之事顧謂羣臣曰周公輔成王不能以至誠感上下誅兄弟以杜流言猶擅美經傳歌徳扵管弦不如吾太宰桓王輔少主勲道之茂乃命中書更為燕頌桓王慕容恪也又引中書令常忠尚書陽璆祕書監郎敷于東堂論難言周公權詐未為忠聖伊尹挟智蔵仁成君之惡辭語不經故畧之遼西太守李朗在郡十年威制境内盛疑之累徴不赴以母在龍城未敢顯叛乃隂引魏軍将為自安之計因表請發兵以距宼盛曰此必詐也召其使而詰之果驗盡滅其族遣輔國将軍李旱率騎討之師次建安召旱旋師朗聞其家被誅也擁二千餘户以自固及聞旱中路而還謂有内變不復為備留其子養守令支躬迎魏師于北平旱候知之襲剋令支遣廣威孟廣平率騎追朗及于無終斬之初盛之追旱還也羣臣莫知其故旱既斬朗盛謂羣臣曰前以追旱還者正為此耳朗新為叛逆必忌官威一則鳩合同類劫害良善二則亡竄山澤未可卒平故非意而還以盈怠其志卒然掩之必剋之理也羣臣皆曰非所及也李旱自遼西還聞盛殺其将衛䨇懼棄軍奔走既而歸罪復其爵位盛謂侍中孫勍曰旱總三軍之任荷専征之重不能杖節死綏無故逃亡考之軍正不赦之罪也然當先帝之避難衆情離異骨肉忘其親股肱失其節旱以刑餘之體効力盡命忠款之至精貫白日朕故錄其忘身之功免其邱山之罪耳盛去皇帝之號稱庶人大王魏襲幽州執刺史盧溥而去遣孟廣平援之無及盛率衆二萬伐髙句驪襲其新城南蘇皆剋之散其積聚徙其五千餘户于遼西盛引見百僚于東堂考詳器藝超拔十有二人命百司舉文武之士才堪佐世者各一人立其子遼西公定為太子大赦殊死已下讌其羣臣于新昌殿盛曰諸卿各言其志朕将覽之七兵尚書丁信年十五盛之舅子也進曰在上不驕髙而不危臣之願也盛笑曰丁尚書年少安得長者之言乎盛以威嚴馭下驕暴少親多所猜忌故信言及之盛討庫莫奚大虜獲而還左将軍慕容國與殿中将軍秦輿叚讃等謀率禁兵襲盛事覺誅之死者五百餘人前将軍思悔侯叚璣與子興讃子泰等因衆心動摇夜扵禁中鼓譟大呼盛聞變率左右出戰衆皆披潰俄而有一賊從闇中擊傷盛遂輦升前殿申約禁衛召叔父河間公熙屬以後事熙未至而盛死時年二十九在位三年偽諡昭武皇帝墓號興平陵廟號中宗盛㓜而羈賤流漂長則遭家多難夷險安危備嘗之矣懲寳闇而不斷遂峻極威刑纎介之嫌莫不裁之扵未萌防之扵未兆扵是上下振局人不自安雖忠誠親戚亦皆離貳舊臣靡不夷滅安忍無親所以卒扵不免是嵗隆安五年也熙字道文垂之少子也初封河間王叚速骨之難諸王多被其害熙素為髙陽王崇所親愛故得免焉蘭汗之篡也以熙為遼東公備宗祀之義盛初即位降爵為公拜都督中外諸軍事驃騎大将軍尚書左僕射領中領軍従征髙句驪契丹皆勇冠諸将盛曰叔父雄果英壮有世祖之風但𢎞畧不如耳及盛死其太后丁氏以國多難宜立長君羣望皆在平原公元而丁氏意在扵熙遂廢太子定迎熙入宫羣臣勸進熙以讓元元固以讓熙熙遂僭即尊位誅其大臣叚璣秦興等並夷三族元以嫌疑賜死元字道光寳之第四子也赦殊死已下改年曰光始改北燕臺為大單于臺置左右輔位次尚書初熙烝于丁氏故為所立及寵幸苻貴人丁氏怨恚呪詛與兄子七兵尚書信謀廢熙熙聞之大怒逼丁氏令自殺𦵏以后禮誅丁信熙狩于北原石城令髙和殺司𨽻校尉張顯閉門距熙熙率騎馳返和衆皆投杖熙入誅之扵是引見州郡及單于八部耆舊于東宫問以疾苦大築龍騰苑廣袤十餘里役徒二萬人起景雲山于苑内基廣三百歩峯髙十七丈又起逍遥宫甘露殿連房數百觀閣相交鑿天河渠引水入宫又為其昭儀苻氏鑿曲光海清涼池季夏盛暑士卒不得休息暍死者大半熙游于城南止大栁樹下若有人呼曰大王且止熙惡之伐其樹乃有虵長丈餘從樹中而出立其貴嬪苻氏為皇后赦殊死已下熙北襲契丹大破之昭儀苻氏死偽諡愍皇后贈苻謨太宰諡文獻公二苻並美而豔好微行游讌熙弗之禁也請謁必從刑賞大政無不由之初昭儀有疾龍城人王温稱能療之未㡬而卒熙忿其妄也立扵公車門支解温而焚之其后好㳺田熙従之北登白鹿山東過青嶺南臨滄海百姓苦之士卒為豺狼所害及凍死者五千餘人矣㑹髙句驪宼燕郡殺畧百餘人熙伐髙句驪以苻氏從為衝車地道以攻遼東熙曰待剗平寇城朕當與后乗輦而入不聼将士先登扵是城内嚴備攻之不能下㑹大雨雪士卒多死乃引歸擬鄴之鳳陽門作𢎞光門累級三層熙與苻氏襲契丹憚其衆盛将還苻氏弗聼遂棄輜重輕襲髙句驪周行三千餘里士馬疲凍死者屬路攻木底城不剋而還盡殺寳諸子大城肥如及宿軍以仇尼倪為鎮東大将軍營州刺史鎮宿軍上庸公懿為鎮西将軍幽州刺史鎮令支尚書劉木為鎮南大将軍冀州刺史鎮肥如為苻氏起承華殿髙承光一倍負土扵北門土與榖同價典軍杜静載棺詣闕上書極諌熙大怒斬之苻氏嘗季夏思凍魚膾仲冬湏生地黄皆下有司切責不得加以大辟其虐也如此苻氏死熙悲號躃踴若䘮考妣擁其尸而撫之曰體已就冷命遂斷矣扵是僵仆氣絶久而乃蘇大斂既訖復唘其棺而與交接服斬縗食粥制百僚扵宫内哭臨令沙門素服使有司案檢哭者有淚以為忠孝無則罪之扵是羣臣震懼莫不含辛以為淚焉慕容隆妻張氏熙之嫂也美姿容有巧思熙将以為苻氏之殉欲以罪殺之乃毁其襚鞾中有弊氊遂賜死三女叩頭求哀熙不許制公卿已下至于百姓率户營墓費殫府藏下錮三泉周輪數里内則圖畫尚書八座之象熙曰善為之朕将随后入此陵識者以為不祥其右僕射韋璆䓁並懼為殉沐浴而待死焉號苻氏墓曰徽平陵熙被髪徒跣歩従苻氏喪轜車髙大毁北門而出長老竊相謂曰慕容氏自毁其門将不久也衛中将軍馮跋左衛将軍張興先皆坐事亡奔以熙政之虐也與跋従兄萬泥等二十一人結盟推慕容雲為主發尚方徒五千餘人閉門距守中黄門趙洛生奔告之熙曰此鼠盗耳朕還當誅之乃収髪貫甲馳還赴難夜至龍城攻北門不剋遂敗走入龍騰苑微服隐于林中為人所執雲得而殺之及其諸子同殯城北時年二十三在位六年雲𦵏之于苻氏墓偽諡昭文皇帝垂以孝武帝太元八年僭立至熙四世凡二十四年以安帝義熙二年滅初童謡曰一束藁兩頭然秃頭小免来滅燕藁字上有草下有禾兩頭然則禾草俱盡而成髙字雲父名拔小字秃頭三子而雲季也熙竟為雲所滅如謡言焉髙雲字子雨寳之養子也祖父和髙句驪之支庶自云髙陽氏之苖裔故以髙為氏焉雲沉深有局量厚重希言時人咸以為愚唯馮跋竒其志度而友之寳之為太子雲以武藝給事侍東宫拜侍御郎襲敗慕容㑹軍寳子之賜姓慕容氏封夕陽公熙之𦵏苻氏也馮跋詣雲告之以謀雲懼曰吾嬰疾厯年卿等所知願改圗之跋逼之曰慕容世衰河間虐暴惑妖淫之女而逆亂天常百姓不堪其害思亂者十室九焉此天亡之時也公自髙氏名家何能為他養子機運難邀千嵗一時公焉得辭也扶之而出雲曰吾疾苦日久廢絶世務卿今興建大事謬見推逼所以俳徊非為身也實惟否徳不足以濟元元故耳跋等彊之雲遂即天王位復姓髙氏大赦境内殊死已下改元曰正始國號大燕署馮跋侍中都督中外諸軍事征北大将軍開府儀同三司録尚書事武邑公封伯子男鄉亭侯者五十餘人士卒賜榖帛有差熙之羣官復其爵位立妻李氏為天王后子彭為太子越騎校尉慕輿良謀叛雲誅之雲臨東堂幸臣離班桃仁懐劔執紙而入稱有所唘拔劔撃雲雲以几距班桃仁進而弑之馮跋遷雲尸于東宫偽諡惠懿皇帝雲自以無功徳而為豪桀所推常内懐懼故寵養壮士以為腹心離班桃仁等專典禁衛委之以爪牙之任賞賜日至數千萬衣食卧起皆與之同終以此致敗云西秦乞伏國仁隴西鮮卑人也在昔有如弗斯出連叱盧三部自漠北南出大隂山遇一巨蟲扵路状若神龜大如陵阜乃殺馬而祭之祝曰若善神也便開路惡神也遂塞不通俄而不見乃有一小免在焉時又有乞伏部有老父無子者請養為子衆咸許之老父欣然自以有所依憑字之曰紇于紇于者夏言依倚也年十嵗驍勇善騎射彎弓五百斤四部服其雄武推為統主號之曰乞伏可汗託鐸莫何託鐸者言非神非人之稱也其後有祐鄰者即國仁五世祖也泰始初率户五千遷于夏緣部衆稍盛鮮卑鹿結七萬餘落屯于髙平川與祐鄰迭相攻擊鹿結敗南奔畧陽祐鄰盡并其衆因居髙平川祐鄰死子結權立徙于牽屯結權死子利那立擊鮮卑吐頼于烏樹山討尉遅渴權于大非川收衆三萬餘落利那死弟祁埿立祁埿死利那子述延立討鮮卑莫侯于苑川大破之降其衆二萬餘落因居苑川以叔父軻埿為師傅委以國政斯引烏埿為左輔将軍鎮蔡園川出連髙胡為右輔将軍鎮至便川叱盧那胡為率義将軍鎮牽屯山述延死子傉大寒立㑹石勒滅劉曜懼而遷于麥田無孤山大寒死子司繁立始遷于度堅山尋為苻堅将王統所襲部衆叛降扵統司繁歎謂左右曰智不距敵徳不撫衆劒騎未交而夲根已敗見衆分散勢亦難全若奔諸部必不我容吾将為呼韓邪之計矣乃詣統降于堅堅大悦署為南單于留之長安以司繁叔父吐雷為勇士䕶軍撫其部衆俄而鮮卑勃寒侵斥隴右堅以司繁為使持節都督討西胡諸軍事鎮西将軍以討之勃寒懼而請降司繁遂鎮勇士川甚有威惠司繁卒國仁代鎮及堅興夀春之役徴為前将軍領先鋒騎㑹國仁叔父歩頽叛扵隴西堅遣國仁還討之歩頽聞而大悦迎國仁扵路國仁置酒髙㑹攘袂大言曰苻氏往因趙石之亂遂妄竊名號窮兵極武跨僭八州疆宇既寜宜綏以徳方虛廣威聲勤心逺畧騷動蒼生疲弊中國違天怒人将何以濟且物極則虧禍盈而覆者天之道也以吾量之是役也難以免矣當與諸君成一方之業及堅敗歸乃招集諸部有不附者討而并之衆至十餘萬及堅為姚萇所殺國仁謂其豪帥曰苻氏以髙世之姿而困於烏合之衆可謂天也夫守常迷運先達耻之見機而作英豪之舉吾雖薄徳藉累世之資豈可覩時来之運而不作乎以孝武太元十年自稱大都督大将軍大單于領秦河二州牧建元曰建義以其将乙旃音埿為左相屋引出支為右相獨孤匹蹄為左輔武羣勇士為右輔弟乾歸為上将軍自餘拜授各有差置武城武陽安固武始漢陽天水畧陽漒川甘松匡朋白馬苑川十二郡築勇士城以居之鮮卑匹蘭率衆五千降眀年南安祕宜及諸𦍑虜来擊國仁四面而至國仁謂諸将曰先人有奪人之心不可坐待其至宜抑威餌敵羸師以張之軍法所謂怒我而怠寇也於是勒衆五千襲其不意大敗之祕宜奔還南安尋與其弟莫侯悌率衆三萬餘户降扵國仁各拜将軍刺史苻登遣使者署國仁使持節大都督雜夷諸軍事大将軍大單于苑川王國仁率騎三萬襲鮮卑大人密貴裕茍提倫等三部于六泉髙平鮮卑沒奕于東胡金熙連兵来襲相遇于渴渾川大戰敗之斬級二千獲馬五千匹沒奕于及熙奔還三部震懼率衆迎降署密貴建義将軍六泉侯裕茍建忠将軍蘭泉侯提倫建節将軍鳴泉侯國仁建威将軍叱盧烏孤跋擁衆叛保牽屯山國仁率騎七千討之斬其部将叱羅侯降者千餘户跋大懼遂降復其官位因討鮮卑越質叱黎于平襄大破之獲其子詰歸弟子復半及部落五千餘人而還太元十三年國仁死在位四年偽諡宣烈王廟號烈祖乾歸國仁弟也雄武英傑沉雅有度量國仁之死也其羣臣咸以國仁子公府冲㓜宜立長君乃推乾歸為大都督大将軍大單于河南王赦其境内改元曰太初立其妻邉氏為王后以出連乞都為丞相鎮南将軍南梁州刺史悌眷為御史大夫自餘封拜各有差遂遷于金城太元十四年苻登遣使署乾歸大将軍大單于金城王南羌獨如率衆七千降之休官阿敦侯年二部各擁五千餘落據牽屯山為其邉害乾歸討破之悉降其衆扵是聲振邉服吐谷渾大人視連遣使貢方物鮮卑豆留䩭叱豆渾及南邱鹿結并休官曷呼奴盧水尉地拔並率衆降于乾歸皆署其官爵隴西太守越質詰歸以平襄叛自稱建國将軍右賢王乾歸撃敗之詰歸東奔隴山既而擁衆来降乾歸妻以宗女署立義将軍苻登将沒奕于遣使結好以二子為質請討鮮卑大兠國乾歸乃與沒奕于攻大兠扵安陽城大兠退固鳴蟬堡乾歸攻陷之遂還金城為呂光弟寳所攻敗扵鳴雀峡退屯青㟁寳進追乾歸使其将彭奚念斷其歸路躬貫甲胄連戰敗之寳及将士投河死者萬餘人苻登遣使署乾歸假黄鉞大都督隴右河西諸軍事左丞相大将軍河南王領秦梁益涼沙五州牧加九錫之禮時登為姚興所逼遣使請兵進封乾歸梁王命置官司納其妹東平長公主為梁王后乾歸遣其前将軍乞伏益州冠軍翟瑥率騎二萬救之㑹登為興所殺乃還師氐王楊定率歩騎四萬伐之乾歸謂諸将曰楊定以勇虐聚衆窮兵逞欲兵猶火也不戢将自焚定之此役殆天以之資我扵是遣其涼州牧乞伏軻殫秦州牧乞伏益州立義将軍詰歸距之定敗益州扵平川軻殫詰歸引衆而退翟瑥奮劔責軻殫等以不赴救之罪軻殫懼率騎赴之益州詰歸亦勒衆而進大敗定斬定及首虜萬七千級扵是盡有隴西巴西之地太元十七年赦其境内殊死已下署其長子熾磐領尚書令左長史邉芮為尚書左僕射右長史祕宜為右僕射翟瑥為吏部尚書翟勍為主客尚書杜宣為兵部尚書王松夀為民部尚書樊謙為三公尚書方𢎞麴景為侍中自餘拜授一如魏武晋文故事猶稱大單于大将軍楊定之死也天水羌乳襲據上邽至是遣乞伏益州討之益州狃扵累勝不為備為乳所敗諸将請罪乾歸引過歸已皆赦之索虜秃髪如茍率户二萬降之乾歸妻以宗女吕光率衆十萬将伐乾歸左輔密貴周左衛莫者叛羝勸乾歸遣愛子以退光師乾歸従之乃稱藩扵光遣子勑勃為質既而悔之遂誅周等乞伏軻殫與乞伏益州不平奔于吕光光又伐之咸勸其東奔成紀乾歸不従謂諸将曰昔曹孟徳敗袁夲初扵官渡陸伯言摧劉元徳扵白帝皆以權畧取之豈在衆乎光雖舉全州之軍而無經逺之算不足憚也且其精卒盡在吕延延雖勇而愚易以竒䇿制之延軍若敗光亦遁還乗勝追奔可以得志衆咸曰非所及也隆安元年光遣其子纂伐乾歸使吕延為前鋒乾歸泣謂衆曰今事勢窮踧逃命無所死中求生正在今日涼軍雖四面而至然相去遼逺山河既阻力不周接敗其一軍而衆軍自退乃縦反間稱秦王乾歸衆潰東奔成紀延信之引師輕進果為乾歸所敗遂斬之秃髮烏孤遣使来結和親使乞伏益州攻剋支陽鸇武允吾三城俘獲萬餘人而還又遣益州與武衛慕容允冠軍翟瑥率騎二萬伐吐谷渾視羆至于度周川大破之視羆遁堡白蘭山遣使謝罪貢其方物以子宕豈為質鮮卑疊掘河内率户五千自魏降乾歸乾歸所居南景門崩惡之遂遷于苑川姚興将姚碩徳率衆五萬伐之入自南安峡乾歸次于隴西以距碩徳興潜師繼發乾歸聞興将至謂諸将曰吾自開建以来屢摧勍敵乗機藉算舉無遺䇿今姚興盡中國之師軍勢甚盛山川阻狭無縦騎之地宜引師平川伺其殆而擊之存亡之機在斯一舉卿等勠力勉之若梟翦姚興闗中之地盡吾有也扵是遣其衛軍慕容允率中軍二萬遷于栢陽鎮軍羅敦将外軍四萬遷于侯辰谷乾歸自率輕騎數千候興軍勢俄而大風昏霧遂與中軍相失為興追騎所逼入于外軍旦而交戰為興所敗乾歸遁還苑川遂走金城與諸豪帥大哭而别乃率騎數百馳至允吾秃髪利鹿孤遣弟傉檀迎乾歸處之扵晋興南羌梁弋等遣使招之乾歸将叛謀洩利鹿孤遣弟吐雷屯于捫天嶺乾歸懼為利鹿孤所害謂其子熾磐曰吾不能負荷大業致兹顛覆以利鹿孤義兼姻好冀存脣齒之援方乃忘義背親謀人父子忌吾威名勢不全立姚興方盛吾将歸之若其俱去必為追騎所及今送汝兄弟及汝母為質彼必不疑吾既在秦終不害汝扵是送熾磐兄弟扵西平乾歸遂奔長安姚興見而大悦署乾歸持節都督河南諸軍事鎮逺将軍河州刺史歸義侯遣乾歸還鎮苑川盡以部衆配之乾歸既至苑川以邉芮為長史王松夀為司馬公卿大将已下悉降號為偏裨元興元年熾磐自西平奔長安姚興以為振忠将軍興晋太守尋遣使者加乾歸𣪚騎常侍左賢王遣随興将齊難迎吕隆于河西討叛羌党龍頭于滋川攻楊盛将苻帛于皮氏堡並剋之又破吐谷渾将大孩俘獲萬餘人而還尋復率衆攻楊盛将楊玉于西陽堡剋之既而苑川地震裂生毛狐雉入于寝内乾歸甚惡之姚興慮乾歸終為西州之患因其朝也興留署主客尚書以熾磐為建武将軍行西夷校尉監撫其衆熾磐以長安兵亂将始乃招結諸部二萬七千築城于嵻㟍山以據之熾磐攻剋枹罕遣使告之乾歸奔還苑川鮮卑悦大堅有衆五千自龍馬苑降乾歸乾歸遂如枹罕留熾磐鎮之乾歸收衆三萬遷于度堅山羣下勸乾歸稱王乾歸以寡弱弗許固請乃従之義熙三年僭稱秦王赦其境内改元更始置百官公卿已下皆復夲位遣熾磐討諭薄地延師次煩于地延率衆出降署為尚書徙其部落于苑川又遣隴西羌昌何攻剋姚興金城郡以其驍騎乞伏務和為東金城太守乾歸復都苑川又攻剋興畧陽南安隴西諸郡徙二萬五千户扵苑川枹罕姚興力未能西討恐更為邉害遣使署乾歸使持節散騎常侍都督隴西嶺北匈奴雜胡諸軍事征西大将軍河州牧大單于河南王乾歸方圗河右權宜受之遂稱藩扵興遣熾磐與其次子中軍審䖍率騎一萬伐秃髮傉檀師濟河敗傉檀太子武臺于嶺南獲牛馬十餘萬而還又攻剋興别将姚龍于伯陽堡王憬于永洛城徙四千餘户扵苑川三千餘户于譚郊乾歸率歩騎三萬征西羌彭利髮于枹罕師次于奴葵谷利髮棄其部衆南奔乾歸遣其将公府追及于清水斬之乾歸入枹罕收羌户一萬三千因率騎二萬討吐谷渾支統阿若干于赤水大破降之乾歸畋于五谿有梟集于其手甚惡之六年為兄子公府所弑并其諸子十餘人公府奔固大夏熾磐與乾歸弟廣武智達陽武木奕于討之公府走逹等追擒于嵻㟍南山并其四子轘之扵譚郊𦵏乾歸于枹罕偽諡武元王在位二十四年熾磐乾歸長子也性勇果英毅臨機能斷權略過人初乾歸為姚興所敗熾磐質扵秃髮利鹿孤後自南平逃而降興興以為振忠将軍興晋太守又拜建武将軍行西夷校尉留其衆鎮苑川及乾歸返政復立熾磐為太子領冠軍大将軍都督中外諸軍録尚書事後乾歸稱藩于姚興興遣使署熾磐假節鎮西将軍左賢王平昌公尋進號撫軍大将軍乾歸死義熙六年熾磐襲偽位大赦改元曰永康署翟勍為相國麴景為御史大夫叚暉為中尉弟延祚為禁中録事樊謙為司直罷尚書令僕射尚書六卿侍中𣪚騎常侍黄門郎官置中左右常侍侍郎各三人義熙九年遣其龍驤乞伏智達平東王松夀討吐谷渾樹洛于扵澆河大破之獲其将呼那烏提虜三千餘户而還又遣其鎮東曇逹與松夀率騎一萬東討破休官權小郎吕破胡于白石川虜其男女萬餘口進據白石城休官降者萬餘人後顯親休官權小成吕奴迦等叛保白坑曇達謂将士曰昔伯珪憑嶮卒有滅宗之禍韓約肆暴終受覆族之誅今小成等逆命白坑宜在除滅王者之師有征無戰粤爾輿人戮力勉之衆咸拔劒大呼扵是進攻白坑斬小成奴迦及首級四千七百隴右休官悉降遣安北烏地延冠軍翟紹討吐谷渾别統句旁于泣勤川大破之俘獲甚衆熾磐率諸将討吐谷渾别統支旁于長栁川掘達于渴渾川皆破之前後俘獲男女二萬八千僭立十年有雲五色起于南山熾磐以為已瑞大悦謂羣臣曰吾今年應有所定王業成矣扵是繕甲整兵以待四方之隙聞秃髪傉檀西征乙弗投劒而起曰可以行矣率歩騎二萬襲樂都秃髪武臺憑城距守熾磐攻之一旬而剋遂入樂都論功行賞各有差遣平逺犍䖍率騎五千追傉檀徙武臺與其文武及百姓萬餘户于枹罕傉檀遂降署為驃騎大将軍左南公随傉檀文武依才銓擢之熾磐既兼傉檀兵彊地廣置百官立其妻秃髪氏為王后十一年熾磐攻剋沮渠䝉遜河湟太守沮渠漢平以其左衛匹達為河湟太守因討降乙弗窟乾而還遣其将曇達王松夀等討南羌彌姐康薄于赤水降之熾磐攻漒川師次沓中沮渠䝉遜率衆攻石泉以救之熾磐聞而引還遣曇逹與其将出連䖍率騎五千赴之䝉遜聞曇達至引歸遣使聘于熾磐遂結和親又遣曇達王松夀等率騎一萬伐姚艾于上邽曇達進據蒲水艾距戰大敗之艾奔上邽曇達進屯大利破黄石大羌二戍徙五千餘户于枹罕令其安東木奕于率騎七千討吐谷渾樹洛于于塞上破其弟阿柴扵堯扞川俘獲五千餘口而還洛于奔保白蘭山而死熾磐聞而喜曰此虜矯矯所謂有豕白蹢往嵗曇達東征姚艾敗走今木奕于西討黠虜逺逃境宇稍清姦凶方殄股肱惟良吾無患矣扵是以曇達為左丞相其子元基為右丞相麴景為尚書令翟紹為左僕射遣曇達元基東討姚艾降之至是乙弗鮮卑烏地延率户二萬降扵熾磐署為建義将軍地延尋死弟他子立以子軻蘭質于西平他子従弟提孤等率户五千以西遷叛于熾磐涼州刺史出連䖍遣使喻之提孤等歸降熾磐以提孤姦猾終為邉患税其部中戎馬六萬匹後二嵗而提孤等扇動部落西奔出塞他子率户五千入居西平先是姚艾叛降䝉遜䝉遜率衆迎之艾叔父儁言於衆曰秦王寛仁有雅度自可安土事之何為従涼主西遷衆咸以為然相率逐艾推儁為主遣使請降熾磐大悦徴儁為侍中中書監征南将軍封隴西公邑一千户使征西他子討吐谷渾覔地于弱水南大破之覔地率衆六千降扵熾磐署為弱水護軍遣其左衛匹達建威梯君等討彭利和于漒川大破之利和單騎奔仇池獲其妻子徙羌豪三千户于枹罕漒川羌三萬餘户皆安堵如故元熙元年立其第二子慕末為太子領撫軍大将軍都督中外諸軍事大赦境内改元曰建𢎞其臣佐等多所封授熾磐在位七年而宋氏受禪以宋元嘉五年死子慕末字安石跋慕末即位改年永𢎞立其妻梁氏為王后子萬載為王太子初尚書隴西辛進嘗随熾磐逰後園進彈鳥丸誤傷慕末母面至是慕末誅進五族二十七人慕末弟殊羅烝熾磐左夫人秃髪氏慕末知而禁之殊羅與叔父什夤謀殺慕未使禿髪氏盗門籥籥誤門不開門者以告慕末收其黨盡殺之欲鞭什夤什夤曰我負汝死不負汝鞭慕末怒刳其腹投屍扵河什夤母弟曰養及去列頗有怒言又殺之政刑酷濫内外崩離部人多叛元嘉七年慕末為赫連定所攻遣其中書侍郎王愷従事中郎烏訥闐間道請迎扵魏太武太武許以安定以西平涼以東封之慕末乃焚城邑毁寳器率户萬五千至髙田谷為赫連定所拒遂保南安其故地皆入于吐谷渾魏人遣師迎之慕末衛将軍吉毗固諫以為不宜内徙慕末從之八年赫連定遣其叔父北平公韋伐率衆萬人攻南安城内大饑人相食侍中出連輔政等奔赫連定師慕末窮蹙輿櫬出降韋伐送于上邽慕末太子司直焦楷奔廣寜泣謂其父遺曰大人荷國寵靈居藩鎮重任今夲朝顛覆豈得不帥見衆唱大義以殄寇讐遺曰今主上已陷賊庭吾非愛死而忘義顧以大兵追之是趣絶其命也不如擇王族之賢者奉以為主而伐之庶有濟也楷乃築壇誓衆二旬之間衆至萬餘人㑹遺病卒楷不能獨舉事亡奔河西赫連定遂殺慕末夷其族慕末在位四年始國仁以晋孝武太元十年僭位至慕末四世凡四十有七載而滅北燕馮跋字文起長樂信都人也小字乞直伐其先畢萬之後畢萬之子孫有食采馮鄉者因以氏焉永嘉之亂跋祖父和避地上黨父安雄武有器量慕容永時為将軍永滅跋東徙和龍家于長谷㓜而懿重少言寛仁有大度飲酒一石不亂三弟皆任俠不修行業惟跋恭慎勤扵家産父母器之所居上每有雲氣若樓閣時咸異之嘗夜見天門開神光赫然燭扵庭内及慕容寳僭號署中衛将軍初跋弟素弗與從兄万泥及諸少年㳺于水濵有一金龍浮水而下素弗謂万泥曰頗有見不万泥等皆曰無所見也乃取龍而示之咸以為非常之瑞慕容熙聞而求焉素弗祕之熙怒及即偽位密欲誅跋兄弟其後跋又犯熙禁懼禍乃與其諸弟逃于山澤每夜獨行猛虎常為避路時賦役繁數人不堪命跋兄弟謀曰熙今昏虐兼忌吾兄弟既還首無路不可坐受誅滅當及時而起立王侯之業事若不成死其晚乎遂與万泥等二十二人結謀跋與二弟乗車使婦人御潜入龍城匿于北部司馬孫護之室遂殺熙立髙雲為主雲署跋為使持節侍中都督中外諸軍事征北大将軍開府儀同三司録尚書事武邑公跋讌羣僚忽有血流其左臂跋惡之従事中郎王垂因說符命之應跋戒其勿言雲為其幸臣離班桃仁所殺跋升洪光門以觀變帳下督張泰李桑謂跋曰此豎勢何所至請為公斬之扵是奮劒而下桑斬班于西門泰殺仁于庭中衆推跋為主跋曰范陽公素弗才畧不恒志扵靖亂埽除凶桀皆公勲也素弗辭曰臣聞父兄之有天下傳之於子弟未聞子弟藉父兄之業而先之今鴻基未建危甚綴旒天工無曠業係大兄願上順皇天之命下副元元之心羣臣固請乃許之扵是以晋義熙五年乃僭稱天王于昌黎而不徙舊號即國曰燕赦其境内建元曰太平分遣使者廵行郡國觀察風俗追尊祖和為元皇帝父安為宣皇帝尊母張氏為太后立妻孫氏為王后子永為太子署弟素弗為侍中車騎大将軍録尚書事𢎞為侍中征東大将軍尚書右僕射汲郡公從兄万泥為驃騎大将軍幽平二州牧務銀提為上大将軍遼東太守孫䕶為侍中尚書令陽平公張興為衛将軍尚書左僕射永寜公郭生為鎮東大将軍領右衛将軍陳留公従兄子乳陳為鎮西大将軍并青二州牧上谷公姚昭為鎮南大将軍司𨽻校尉上黨公馬弗勤為吏部尚書廣宗公王難為侍中撫軍将軍潁川公自餘拜授文武進位各有差尋而万泥抗表請代跋不許仍加開府儀同三司眀年跋以禮𦵏髙雲及其妻子立雲廟于韮町置園邑二十家四時供薦初跋之立也万泥乳陳自以親而有大功謂當入為公輔跋以二藩任重因而弗徴並有憾焉乳陳性麤獷勇氣過人密遣告万泥曰乳陳有至謀願與叔父圗之万泥遂奔白狼阻兵以叛跋遣馮𢎞與将軍張興将歩騎二萬討之𢎞遣使喻万泥万泥欲降乳陳按劒怒曰大丈夫死生有命决之于今何謂降也遂剋期出戰是夜乳陳遣壮士千餘人来斫營衆火俱起伏兵邀撃俘斬無遺乳陳等懼而出降𢎞皆斬之署素弗為大司馬改封遼西公馮𢎞為驃騎大将軍改封中山公跋下書悉除前朝苛政令守宰無得侵害百姓蘭臺都官眀加澄察初慕容熙之敗也工人李訓竊寳而逃貲至巨萬行貨於馬弗勤弗勤以訓為方畧令既而失志之士書之扵闕下碑馮素弗言之扵跋請免弗勤官仍推罪之跋曰大臣無忠清之節貨財公行扵朝雖由吾不眀所置弗勤宜肆諸朝市以正刑憲但大業草創彛倫未叙弗勤拔自寒㣲未有君子之志其特原之李訓小人汗辱朝士可東市考竟扵是上下肅然請賕路絶蝚蠕勇斛律遣使求跋女偽樂浪公主獻馬三千匹跋許之遣其㳺擊秦都率騎二千送其女歸于蝚蠕庫莫奚虞出庫真率三千餘落請交市獻馬千匹許之處之扵營邱分遣使者廵行郡國孤老久疾不能自存者振榖帛有差孝弟力田閨門和順者皆襃顯之昌黎郝越營邱張買成周刁温建徳何纂以賢良皆擢叙之遣其太常丞劉軒徙北部人五百户于長谷為祖父園邑以其太子永領大單于置四輔跋勵意農桑勤心政事乃下書省傜薄賦墯農者戮之力田者襃賞命尚書紀達為之條制每遣守宰必親見東堂問為政事之要令極言無隐以觀其志扵是朝野競勸焉河間人褚匡請迎跋舊邦宗族跋許之署匡㳺擊将軍中書侍郎厚加資遣匡尋與跋従兄買従弟暏自長樂率五千餘户来奔署買為衛尉封城陽伯暏為太常髙城伯契丹庫莫奚降署其大人為歸善王跋又下書督人植桑柘及禁境内厚𦵏申𠡠有司令奉行之魏使耿貳至其國跋怒其不稱臣留貳不遣是時井竭三日而復其尚書令孫䕶里有犬與豕交䕶見而惡之召太史令閔尚筮之尚曰犬豕異類而交違性失夲其扵洪範為犬禍将勃亂失衆以至敗亡眀公位極冡宰遐邇具瞻諸弟並封列侯貴傾王室妖見里庭不為他也願公戒滿盈之失修尚恭儉則妖怪可消永享元吉䕶黙然不悦昌黎尹孫伯仁䕶弟叱支叱支弟乙拔等俱有才力以驍勇聞跋之立也並冀開府而跋未之許也由是有怨言每扵朝饗之際常拔劒擊柱曰興建大業有功力焉而滯扵散将豈是漢祖河山之義乎跋怒誅之進䕶左光禄大夫開府儀同三司録尚書事以慰之䕶自三弟誅後常怏怏有不悦之色跋怒酖之尋而遼東太守務銀提自以功在孫䕶張興之右而出為邉郡抗表有恨言密謀外叛跋怒殺之跋下書營建太學以長樂劉軒營邱張熾成周翟崇為博士郎中簡二千石已下子弟年十五已上教之跋弟丕先是因亂投扵髙句驪跋迎致之至龍城以為左僕射常山公蝚蠕斛律為其弟大但所逐盡室奔跋乃館之于遼東郡待之以客禮跋納其女為昭儀時三月不雨至于夏五月斛律上書請還塞北跋遣單于前輔萬陵率騎三百送之陵憚逺至黑山殺斛律而還晋青州刺史申永遣使浮海来聘跋乃使其中書郎李扶報之蝚蠕大但遣使獻馬三千匹羊萬口義熙十三年和龍城有赤氣蔽天自寅至申跋太史令張穆以為兵氣勸跋還魏使奉職貢跋不從魏眀元詔征東大将軍長孫道生討之跋嬰城固守道生不剋而還跋境地震山崩洪光門鸛雀折又地震右寝壞跋問閔尚曰比年屢有地動之變卿可眀言其故尚曰地隂也主百姓震有左右比震皆向右臣懼百姓将西移跋曰吾亦甚慮之分遣使者廵行郡國問民所疾苦孤老不能自存者賜以帛榖有差跋立十二年而宋氏受禪元嘉七年跋有疾跋長子永前死立次子翼為太子至是跋輦而臨軒命翼攝國事勒兵聼政以備非常跋妾宋夫人規立其子受居深忌翼謂之曰上疾将瘳柰何遽欲代父乎翼性仁弱遂還東宫日三往省疾宋夫人矯絶内外遣閽寺傳問而已翼及跋諸子大臣並不得省疾唯中給事朝福獨得出入専掌禁衛慮宋夫人遂成其謀乃言扵中山公𢎞𢎞與壮士數十人被甲入禁中宿衛皆不戰而散宋夫人命閉東閤𢎞家僮踰閤而入射殺女御數人跋驚遽而死𢎞遂即偽天王位太子翼帥東宫兵出戰而𣪚兵皆潰去𢎞遂殺翼及跋諸子百餘人跋在位二十二年𢎞立偽諡文成皇帝廟號太祖墓曰長谷陵𢎞字文通跋之少弟也跋立授侍中征西大将軍尚書右僕射汲郡公遷驃騎大将軍改封中山公領中領軍内掌禁衛外總朝政厯位司徒既殺翼自立乃與宋氏通和眀年改年大興立其夫人慕容氏為王后元嘉九年秋魏太武親討之石城太守李崇等十郡降魏發其民三萬穿圍塹以守和龍𢎞嬰城固守八月𢎞使數萬人出戰魏擊破之攻羌胡固帶方建徳冀陽郡皆拔之九月太武引兵西還徙成周營邱遼東樂浪帯方元莵六郡民三萬家扵幽州𢎞尚書郭淵勸𢎞送欵獻女於魏乞為附庸保守宗廟𢎞曰負釁在前結忿已深降附取死不如守志更圖所適初𢎞元妻王氏生子崇封長樂公崇扵兄弟最長及即位立慕容氏為后而王氏不得立至是復立慕容氏子王仁為太子黜崇使鎮肥如崇母弟廣平公朗及樂陵公邈相與亡奔遼西說崇降魏㑹魏主使給事中王徳陳示成敗崇遣邈如魏請舉郡降魏主封崇遼西王録其國尚書事遼西十郡承制假授文官尚書武官征虜已下𢎞聞之遣其将封羽率衆圍崇魏主詔永昌王健督諸軍救之封羽又以九城降魏徙其人三千餘家而還十一年𢎞遣其尚書髙顯稱藩請罪于魏乞以季女充掖庭魏主許之徴其子王仁入朝𢎞不遣其𣪚騎常侍劉訓諌𢎞𢎞大怒殺之復遣使詣建康稱藩奉貢文帝封𢎞為燕王江南謂之黄龍國魏主又詔樂平王丕等討𢎞𢎞日就蹙削上下危懼太常楊崏復勸𢎞速遣王仁入侍𢎞不聼乃密遣其臣陽伊求迎扵髙䴡十三年魏遣平東将軍娥清安西将軍古弼討𢎞攻白狼城克之髙䴡王璉遣将葛居盧等率衆數萬随陽伊迎𢎞𢎞尚書令郭生因民之憚遷開城門納魏兵魏人疑之不入生遂勒兵攻𢎞𢎞引髙䴡兵入與生戰殺之髙䴡兵因大掠城中夏五月𢎞帥龍城見户東徙方軌而進前後八十里焚宫殿火一旬不滅𢎞之出城也古弼部将髙茍子帥騎欲追之弼醉拔刀止之故𢎞得逸去魏主聞之怒檻車徴弼及娥清至平城皆黜為門卒先是𢎞國有狼夜繞城羣嘷如是終嵗又有䑕集扵城西闐滿數里西行至水則在前者衘馬尾迭相齧尾而度宿軍地然一旬而滅觸地生蛆月餘乃止和龍城生白毛一尺二寸其妖異如此𢎞至遼東髙䴡王璉遣使勞之曰龍城王馮君爰適野次士馬勞乎𢎞慙怒稱制答讓之髙䴡乃處之扵平郭尋徙北豐𢎞素侮髙䴡政刑賞罰猶如其國髙䴡乃奪其侍人質任其太子王仁𢎞怨忿之遣使求迎于宋十五年魏主徴𢎞扵髙䴡髙䴡乃殺𢎞扵北豐并其子孫十餘人偽諡曰燕昭成皇帝始跋以晋安帝義熙五年僭號至𢎞三世凡二十有八載而滅𢎞子朗邈邈子熙在魏外戚傳馮素弗跋之長弟也慷慨有大志姿貌魁偉雄傑不羣任侠放蕩不修小節故時人未之竒惟王齊異焉曰撥亂才也惟交結時豪為務不以産業經懐弱冠自詣慕容熙尚書左丞韓業請婚業怒而距之復求尚書郎髙邵女邵亦弗許南宫令成藻豪俊有髙名素弗造焉藻命門者勿納素弗逕入與藻對坐旁若無人談飲連日藻始竒之曰吾逺求騏驥不知近在東鄰何識子之晚也當世侠士莫不歸之及熙僭號為侍御郎小帳下督跋之偽業素弗所建也及為宰輔謙虚恭慎非禮不動雖厮養之賤皆與之抗禮車服屋宇務扵儉約修已率下百僚憚之初為京尹及鎮營邱百姓歌之嘗謂韓業曰君前既不顧今将自取何如業拜而陳謝素弗曰既往之事豈復與君計之然待業彌厚好存亡繼絶申拔舊門問侍中陽哲曰秦趙勲臣子弟今何在乎哲曰皆在中州惟桃豹孫鮮在焉素弗召為左常侍論者歸其有宰衡之度跋之七年死跋哭之慟比𦵏七臨之通志卷一百九十一
