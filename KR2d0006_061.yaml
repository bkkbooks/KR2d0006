body:
  text: 通志卷五十六宋右廸功郎鄭樵漁仲撰職官略第六王侯第十歴代王侯封爵公主并官屬附昔黄帝旁行天下分建萬國至于唐虞别為五等曰公侯伯子男則虞書所謂輯五瑞脩五玉是其制也夏與唐虞同商制天子之田方千里公侯百里伯七十里子男五十里不能五十里者不合於天子附於諸侯鄭元云此乃商所因夏爵三等之制凡四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸閒田凡九州千七百七十三國千里之外設方伯五國為屬屬有長十國為連連有帥三十國為卒卒有正二百一十國為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯千里之内曰甸千里之外曰采周制封王者後凡有功之諸侯大者地方五百里侯四百里伯三百里子二百里男百里方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衞服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎭服又其外方五百里曰藩服周之初列爵惟五公侯伯子男分土惟三公侯方百里伯方七十里子男方五十里並因商制至周公居攝制禮作樂列爵分土皆五等焉公五百里侯四百里伯三百里子二百里男一百里凡諸侯世子世國大夫不世爵使人以德爵人以功謂縣内及列國諸侯為天子大夫者不世爵而世禄所以避賢也諸侯有上大夫卿下大夫上士中士下士凡五等諸侯之大夫不世爵祿公國孤一人公之孤四命大國三卿皆命於天子次國三卿二卿命於天子一卿命於其君左傳曰管仲受下卿之禮避天子之二守國高故也明國高是天子之命卿也小國三卿一卿命於天子二卿命於其君每國下大夫五人上士二十七人大國之卿不過三命下卿再命小國之卿與大夫一命其士不命次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫至於周衰諸侯失制號令自已其名不一於是正卿當國謂之相而楚謂之令尹其他異同難悉數矣秦制爵二十等以賞功勞二十徹侯後漢志曰徹侯金印紫綬功大者食縣小者食鄉亭得臣其所食吏民後避漢武帝諱改曰通侯或曰列侯十九闗内侯顔師古曰言有侯號而居京畿無國邑也十八大庶長劉昭曰自左庶長以上至大庶長皆軍將也所將庶人更卒故以為名大庶長即大將軍也左右庶長即左右偏裨也十七駟車庶長言乘駟馬之車而為衆庶之長十六大上造言皆主上造之士十五少上造十四右更言主領更率部其役事十三中更十二左更十一右庶長言為衆列之長十左庶長九五大夫劉昭曰自公士至五大夫皆軍吏也八公乘言得乘公家之車也劉昭曰自吏民爵不得過公乘過者得貰與子孫若同産然則公乘皆軍吏之爵最尊七公大夫與下同六官大夫加官者示稍尊也亦謂之國大夫五大夫列位從大夫四不更言不預更率之事三簪褭以組帶馬曰褭簪褭者主飾此馬二上造造成也言有成命於上一公士言有爵命異於士卒劉昭曰步卒之有爵為士者也戰國之際秦項之間權設班寵有加賜邑君者蓋假其位號或空受其爵耳則田嬰爲靖郭君白起為武安君魏冉弟為華陽君秦昭王弟為涇陽君及髙陵君蔡澤為剛成君其後項梁為武信君陳餘為成安君李左車為廣武君之類是也至漢尤多蓋在封爵之外别加美號漢興設爵二等曰王曰侯皇子而封為王者其實古諸侯也故謂之諸侯王王子封為侯者謂之諸侯羣臣異姓以功封者謂之徹侯大者不過萬家小者五六百戸以為差降而諸王國皆連城數十踰於古制其諸侯功德優盛朝廷所敬異有賜特進者其位在三公下其次列侯有功德天子命為諸侯者謂之朝侯其位次九卿下皆平冕文衣侍祠郊廟其稱侍祠侯者但侍祠而無朝位其非朝侯侍祠侯而以下土小國或以肺腑宿親若公主子孫或奉先侯墳墓在京師者亦隨時見會謂之猥諸侯凡諸王侯皆金璽盭綬古者印璽通名今則尊卑有别漢舊儀云諸侯王金印黄金驝駞紐文刻曰某王之璽赤地綬列侯黄金印龜紐文曰某侯之印亦以紫綬掌治其國王常冠遠遊冠綬五采而多朱自稱曰寡人教曰令凡諸侯王官傅為太傅相為丞相又有御史大夫諸卿皆秩二千石百官皆如漢朝漢朝唯置丞相其御史大夫以下皆自置之及七國作亂之後景帝懲之遂令諸侯王不得治民令内史治之改丞相曰相省御史大夫廷尉少府宗正博士官武帝改漢内史中尉郎中令之名内史為京兆尹中尉為執金吾郎中令為光祿勳而王國如故職員皆不得自置又令諸王得推恩封子弟為列侯於是齊分為七趙分為六梁分為五淮南分為三又令諸侯十月獻酎金不如法者國除作左官之律附益之法自後諸侯王唯得衣食稅租至成帝綏和元年省内史更令相治民大司空何武奏罷内史相如太守中尉如都尉參職是後中尉爭權與王相奏常不和太傅但曰傅漢初論功封列侯者凡百四十有三人蕭何為冠外戚與定天下侯者二人凡列侯金印紫綬大者食縣小者食鄉亭得臣其所食吏民凡皇帝之女公主皆列侯尚之王國有傅初曰太傅後除太字相本統衆官後省内史而相理民如郡太守史記曰曹參相齊又曰石慶為齊相舉國皆慕其家行不言而齊國大治而為立石相社也内史治國民中尉掌武事郎中令秩千石墨綬僕本曰太僕改曰僕墨綬文學宋志云前漢王國已置文學大司農衛士長太倉長列侯國亦有相餘畧與王國同公主有家令門尉亦有賜重封者顔師古曰重封謂加二號耳成帝鴻嘉三年詔七大夫以上皆令食邑秦本制列侯乃得食邑七大夫即公大夫非七大夫以下皆復其身及戸勿事是歲又令吏民得買爵賈級千錢後漢爵亦二等皇子封王其郡為國其列侯雖鄧寇元勳所食不過四縣為侯國舊制列侯奉朝請在長安者皆位次三公中興以來唯以功德賜位特進者次車騎将軍賜位朝侯次五校尉賜位侍祠侯次大夫其餘以肺腑及公主孫子或奉墳墓亦為猥諸侯漢官儀曰皇后父兄率為特進侯朝會位次以次三公明帝為四姓小侯開立學校置五經師外戚樊氏郭氏隂氏馬氏諸子弟立學號曰四姓小侯以非列侯故曰小侯諸王封者受茅土歸以立社罪侯歸國不得臣吏民至獻帝建安初封曹操為費亭侯之制自此始也二十年曹公始置名號侯置五大夫與舊列侯闗内侯凡六等以賞軍功初漢制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同蕃王諸王女皆封鄉亭翁主儀服同鄉亭侯漢諸王女亦謂之翁主漢書謂齊厲王姊為紀翁主以紀氏所生因以為號章帝唯特封東平憲王蒼琅邪孝王京女為縣公主其後漢安帝姊妹亦封長公主同之皇女蔡邕獨斷曰漢帝子女曰公主儀比諸侯姊妹曰長公主儀比諸侯王也其皇女封公主者所生之子襲母封為列侯皆傳國于後鄉亭之封則不傳襲永初元年鄧太后封清河孝王慶女十一人皆為鄉公主分食邑奉王國有傅如師不臣二千石相秩二千石刁曜為魯相行縣三老執轡學官處士皆乘馬隨後所頓亭鄉傳輟講經内史如郡丞中尉郎中令掌五大夫郎中宿衛如光禄勳僕主車馬治書奉使至京都謁者禮樂長衞士長醫工長永巷長祠祀長郎中其紹封削絀者中尉内史官屬亦以率減列侯國置相其秩各如本縣主治民如令長不臣也但納租于侯以戸數為限其官隨國大小為増減食邑千戸以上置家丞庶子各一人不滿千戸則不置家丞舊置行人洗馬門大夫等官又悉省諸公主各置家令一人魏黄初三年初制封王之庶子為鄉公嗣王之庶子為鄉侯公之庶子為亭侯其後定制凡國王公侯伯子男六等次縣侯次鄉侯次亭侯次闗内侯又置名號侯爵十八級闗中侯爵十七級皆金印紫綬又闗外侯十六級銅印龜紐墨綬五大夫十五級銅印環紐亦墨綬自闗内侯皆不食租虚封爵自魏始而有保傅相常侍侍郎郎中令中尉大農文學友謁者大夫諸雜署令丞公主有家令僕丞行夜督郵王太妃有家令僕丞晉亦有王公侯伯子男六等之封晉令曰有開國郡公縣公郡侯縣侯伯子男及鄉亭闗中闗内外等侯之爵唯安平郡公孚邑萬戸制度如魏諸王其餘縣公邑千八百戸地方七十五里大國侯邑千六百戸地方七十里次國侯邑千四百戸地方六十五里大國伯邑千二百戸地方六十里次國伯邑一千戸地方五十里大國子邑八百戸地方五十里次國子邑六百戸地方四十里男邑四百戸地方四十里武帝受禪之初泰始元年封建子弟為王二十餘人以郡為國邑二萬戸為大國置上中下三軍兵五千人邑萬戸為次國置上軍下軍兵三千人邑五千戸為小國置一軍兵千五百人王不之國宮於京師罷五等之制公侯邑萬戸以上國為大國五千以上為次國不滿五千戸為小國初雖有封國而王公皆在京師咸寧三年詔徙諸王公皆歸國時楊珧荀朂以齊王攸有時名懼惠帝有後難乃追故司空裴秀以立建之旨遂詔王公悉令歸國乃更制戸邑皆中尉領兵其平原汝南琅邪扶風齊為大國梁趙樂安燕安平義陽為次國其餘為小國既遣就國而諸公皆戀京師涕泣而去凡名山大澤不以封鹽鐵金銀銅錫始平之竹園别都宫室園囿皆不為屬國其仕在天朝者與之國同皆自選其文武官諸入作卿士而其世子年已壯者皆遣涖國其王公侯以下茅社符璽車旗命服一如泰始故事凡王金印龜紐練朱綬遠遊三梁冠絳紗朝服佩山元玉開國縣公郡公金章皁朱紱綬郡侯青朱綬同進賢三梁冠絳朝服佩山元玉開國縣侯伯子男金章朱墨綬冠佩亦同初武帝踐阼封宣帝孫永為東莞郡王始置二卿侯以下置官屬隨國大小無定制諸侯並三分食一東晉元帝太興元年始置九分食一元帝以西陽王羕屬尊元會特為設牀明帝以羕皇室元老特為之拜成帝詔羕依安平獻王孚故事設牀帳於殿上帝親迎拜王國有傅傅即師也以景帝諱師故曰傅友武帝初置一人蓋因文王仲尼四友之名典書令丞掌國教令職官錄曰漢制本曰尚書改為治書國諱又改為典書至晉武置典書令是也文學一人郎中令中尉大農此為三卿左右常侍大國各二人次國各一人掌贊相獻替内史改太史為内史又晉書曰改國相為内史將軍大國上中下軍三將軍次國上下二軍將軍各一人小國用上軍而已典祠典衞學官令治書中尉司馬世子庶子陵廟牧長謁者中大夫舍人典府等其後省相及僕省郎中置侍郎二人公侯以下國官屬遞減晉書曰詔以壽光公鄭冲及朗陵公何曾國皆置郎中令又曰元帝初渡江即晉王位諸參軍奉車都尉掾屬者百餘人時皆謂之曰百六掾宋氏一用晉制唯大小國皆有三軍凡王子為侯者食邑皆千戸諸王世子皆金印紫綬進賢兩梁冠佩山元玉初江夏王義恭為孝武所忌憂懼故奏革諸侯聽事不得南向坐國官正冬不得跣登國殿及夾侍障扇不得雉尾劒不得鹿盧形刀不得過銀銅為飾詔可王國有師改傅為之自内史相記室以下官多與晉同凡郡縣内史相並於國主稱臣去任便止孝武孝建中始革此制不得追敬不得稱臣止宜云下官而已齊封爵史闕王國有師諮議文學等官公侯置郎中令卿一人餘與晉宋同梁封爵亦如晉宋之制諸王皆假金獸符第一至第五左竹使符第一至第十左諸公侯皆假銅獸符竹使符第一至第五名山大澤不以封鹽鐵金銀銅錫及竹園别都宫室園圃皆不以屬國諸王言曰令境内稱之曰殿下公侯封郡縣者言曰教境内稱之曰第下自第下稱皆曰寡人諸王公侯國官皆稱臣上於天朝皆稱陪臣王國置傅相公以下則臺各為選置之皆掌知民事郎中令将軍常侍典書令典衞長伯子無典衞典祠等官若王加將軍開府則置長史司馬及記室掾屬祭酒主簿錄事官屬嗣王則唯置郎中令中尉常侍大農藩王則無常侍制與後漢同陳置九等公王有家令之制郡有王嗣王藩王開國郡縣公開國縣侯開國縣伯開國縣子開國縣男沐食侯鄉亭侯闗内侯闗外侯鄱陽王之封也遣度支尚書蕭睿持節兼太宰告于太廟五嶽尚書王質持節兼太宰告于太社凡親王起家則為侍中若将軍方得有佐史無將軍則無府止有國官皇太子子冢嫡者封王依諸王起家餘子並封公起家中書郎諸王子并諸侯代子起家給事王公子起家員外散騎侍郎令僕子起家祕書郎若員滿亦為版法曹次令僕子起家著作佐郎亦為版行參軍外有揚州主簿太學博士國常侍奉朝請嗣王行參軍並起家官皇弟皇子府置師長史司馬從事中郎諮議參軍友掾屬記室等官其嗣王藩王府則遞減之王國置郎中令將軍常侍典祠令舍人等官其嗣王藩王則遞減其員後魏道武皇始元年始封五等至天賜元年減五等之爵始分為四曰王公侯子除伯男之號皇子及異姓元功上勲者封王皇族及始藩王皆降為公諸公降為侯子於是封王者七十人公者二十二人侯者七十九人子者百有三人王封大郡公封小郡侯封大縣子封小縣其後復加伯男焉孝文太和八年詔凡王公侯伯子男開國食邑者王食半公三分食一侯伯四分食一子男五分食一舊制諸鎭將刺史假五等爵及有所貢獻而得假爵者皆得世襲延興二年詔革此類不得世襲又舊制諸以勲賜官爵者子孫世襲并襲軍號後改降五等始革之止襲爵而已凡公主皆嫁于賔附之國朝臣子弟雖名族美彦不得尚焉後魏道武帝因見漢書婁敬説高帝欲以魯元公主妻匈奴良久故立此制矣諸王侯各亦有師友文學侍郎掾屬舎人等官時王國舎人應取八族及清脩之門公主有家令丞高平公主薨欲使公主家令居廬制服太常博士常景曰婦人無專國之理婦人為君男子為臣古禮初不載則家令不得為純臣公主不得為正君明矣乃寢北齊有王公侯伯子男六等之爵王位列大司馬上非親王則在三公下封内之調盡以入臺三分食一公以下四分食一王置師一人餘官大抵與晉宋梁制不異公主則置家令丞等官後周制有公侯伯子男五等爵者皆加開國授柱國大將軍開府儀同者並加使持節大都督皇弟皇子置友及學士等員外餘吏闕聞隋開皇中制國王郡王國公郡公縣公侯伯子男凡九等樊子蓋進爵封為濟公言其功濟天下特為立名無此郡國至煬帝唯留王公侯三等餘並廢之皇伯叔昆弟皇子是為親王及大長公主長公主皆置官屬親王置師友文學長史司馬諮議掾主簿錄事功曹記室戸倉兵騎法士等曹參軍等東西閤祭酒參軍事典籖等員嗣王無師友煬帝更名王府參軍為諸司書佐屬參軍則直以屬為名改國令為家令餘以國為名者皆去之諸公主各置家令丞主簿謁者舎人等員郡主唯無主簿唐高祖之初以天下未定廣封宗室從弟及姪年始孩童數十人皆封為郡王太宗即位問侍臣曰徧封宗子於天下便乎右僕射封德彜對曰不便歴觀往古封王者今日最多兩漢以降唯封帝子及親兄弟若宗室疎遠者非有大功如周之郇滕漢之賈澤並不得濫叨名器所以别親疎也先朝敦睦九族一切封王爵命既崇多給力役蓋以天下為私殊非至公馭物之道也太宗然之於是率以屬疎降爵唯有功者數人得王餘並封縣公貞觀二年十二月太宗謂公卿欲使子孫長久社稷永安其理如何右僕射蕭瑀對曰臣觀前代國祚所以長久者莫不建諸侯以為磐石之固秦併六國罷侯置守二代而亡漢有天下參建藩屏年踰四百魏晉廢之不能永久封建之法實可遵行始議裂土之制禮部侍郎李百藥上議曰自古皇王君臨㝢内莫不受命上元飛名帝籙祚之長短必在天時政或盛衰有闗人事而述著之家多守常轍莫不情忘今古理蔽澆淳欲以百王之季行三代之法也中書侍郎顔師古論曰臣愚以為當今之要莫如量其遠近分置王國均其戸邑彊弱相齊畫野分疆不得過大間以州縣雜錯而居互相維持永無傾奪使各守其境而不能為非協力同心則足扶京室特進魏徵又陳五不可之議六年監察御史馬周上牋大畧如李百藥且謂宜賦以茅土疇其戸邑必有材行隨器方授十一年六月詔荆王元景等二十一王為諸州都督刺史咸令子孫代代承襲非有大故無或黜免其後並不願行廼止後定制皇兄弟皇子為王皆封國之親王龍朔二年制諸王王子嫡者封郡王任職從四品下叙其衆子封郡公從五品上叙貞觀中王珪奏曰三品以下遇親王於塗皆降乘違法申敬有乖儀准太宗曰卿皆自尊而卑吾子乎魏徵曰自古迄今親王班次三公之下今三品者皆天子公卿及八座之長為王降乘非王所宜當也詔從之親王府各置官屬凡府官國官王未出閤則不置太子男封郡王其庶姓卿士功業特盛者亦封郡王自至德元年至大歴三年封異姓之人為王者凡百十二人其次封國公其次有郡縣開國公侯伯子男之號亦九等並無官土其加實封者則食其封分食諸郡以租調給自武德至天寶實封者百餘家自至德二年至大歴三年食實封者二百六十五家凡食四萬四千八百有六十戸十六年置王府官以四考為限嗣聖二年初置公府官員武太后天授二年又置皇孫官員皇姑為大長公主後亦謂之長公主姊為長公主女為公主皆封國視正一品太子女為郡主封郡視從一品親王女為縣主封縣正二品凡諸王及公主皆以親為尊皇之昆弟妹先拜於皇子上書稱啓神龍初下詔革之開元四年三月制下詔封諸國自始封至曾孫其封戸三分減一十年加永穆公主封千戸初永穆等各封五百戸左右云太薄上曰戰士出萬死不顧一生所賞賜纔不過一二十疋此輩何功於人頓食厚封約之使知儉嗇不亦可乎左右以長公主皆二千戸請與比上曰吾嘗讀後漢書見明帝曰朕子不敢望先帝子車服下之吾未嘗不廢卷歎息如何欲令此軰望長公主乎左右不敢復言至是公主等車服殆不給故加焉自後公主皆封千戸遂成其例凡諸王及公主以下所食封邑皆以課戸充州縣與國官邑官共執文帳准其戸數收其租調均為三分其一入官其二入國公所食邑則全給焉二十年五月敕諸食邑實封並以三丁為限不須一分入官其物仍令封隨租調送入京親王府置傅一人師範輔導參議可否初置王師景雲二年改為傅諮議參軍一人弼政幕府諮謀庶事友一人陪隨左右拾遺補闕文學二人修撰文章讐校經史東西閤祭酒各一人接引賔客長史司馬各一人通判掾一人通判公胄戸三曹屬一人通判兵騎法士四曹主簿一人覆省教命記室參軍二人掌表啟書疏宣行教命錄事參軍一人受事勾檢功曹倉曹戸曹兵曹騎曹法曹士曹等參軍各一人各有所主參軍二人行參軍四人掌出使及雜檢校典籖二人宣傳教命親事府置典軍副典軍各二人掌守衞陪從執仗親事執弓刀衞仗執乘親事各十六人供進騎乘親事三百三十三人帳内府置典軍副典軍各三人掌儀衞陪從兼知鞍馬等司事帳内六百六十七人親王國國令一人大農二人通判國司尉二人分判丞一人監印勾稽小吏有差若府主薨則諸府佐視事帳内過葬追退雖無妻子亦准此其國官聽終喪若有襲爵者聼其廻事諸公主邑司有家令丞錄事各一人並𨽻宗正寺出降者不置州郡第十一上司𨽻校尉司𨽻周官也掌五𨽻之法帥其民而捕盗賊漢武帝征和四年初置司𨽻校尉持節從中都官徒千二百人捕巫蠱督大姦猾後罷其兵察三輔三河𢎞農晉志曰漢武帝初置十三州刺史各一人又置司𨽻察三輔三河𢎞農七郡元帝初元四年去節後諸葛豐為司隷又加節尋復去之司𨽻去節自豐始也成帝元延四年省綏和二年哀帝復置但為司𨽻除校尉字冠進賢冠屬大司空比司直司𨽻掌察皇太子以下行馬内事皆主之専道而行専席而坐初除皆謁两府謂丞相御史也後漢復為司𨽻校尉所部河南尹河内右扶風左馮翊京兆尹河東𢎞農凡七郡始河南洛陽無所不糾唯不察三公廷議處九卿上朝賀處公卿下凡司𨽻屬官有從事史十二人其都官從事史特為雄劇主察百官之犯法者魏晉司𨽻與二漢同司𨽻於端門外坐在諸鄉上絶席其入殿按本品秩在諸卿下不絶席鍾會為司𨽻雖在外司時政損益當世與奪無不畢綜初以司𨽻官屬制置如州儀而俗稱司州及晉魏乃以京輔所部定名置司州以司𨽻校尉統之及東晉渡江罷司𨽻校尉官變其職為揚州刺史後魏北齊為司州牧後周有司𨽻下大夫掌五𨽻及徒者捕盗賊囚執之事屬大司㓂隋初有雍州牧後煬帝置司𨽻臺有大夫一人掌諸廵察薛道衡為司𨽻大夫别駕二人分察畿内一人按東都一人按京師後又罷司𨽻臺而留司𨽻從事之名不為常員臨時選京官清明者權攝以行唐無司𨽻校尉而有京畿採訪使亦其職也州牧刺史黃帝立四監以治萬國唐有九州舜置十二州有牧夏為九州牧商周八命曰牧秦置監察御史漢興省之至惠帝三年又遣御史監三輔郡察詞訟所察之事凡九條監者二嵗更之常以十月奏事十二月還監其後諸州復置監察御史文帝十三年以御史不奉法下失其職乃遣丞相史出刺并督監察御史武帝元封元年御史止不復監至五年乃置部刺史掌奉詔六條察州凡十二州焉居部九嵗舉為守相成帝綏和元年以為刺史位下大夫而臨二千石輕重不相凖乃更為州牧秩真二千石位次九卿九卿缺以高第補哀帝建平二年復為刺史元夀二年復為牧後漢光武建武十八年復為刺史外十二州各一人其一州屬司𨽻校尉漢刺史乗𫝊周行郡國無適所治中興所治有定處舊常以八月廵行所部錄囚徒考殿最嵗盡詣京都奏事中興但因計吏不復自詣京師雖父母之喪不得去職或謂州府為外臺謝夷吾為荆州刺史第五倫薦之曰尋功簡能為外臺之表聽察聲實為九伯之冠靈帝中平五年改刺史准置牧是時天下方亂豪傑各欲據有州郡而劉焉劉虞並自九卿出領州牧州牧之任自此重矣舊制州牧奏二千石長史不任位者事皆先下三公三公遣掾史按騐然後黜退光武即位以來不用舊典時用法明察不復委任三府故權歸舉刺之吏魏晉為刺史任重者為使持節都督輕者為持節皆銅印墨綬進賢兩梁冠絳朝服而領兵者武冠西晉罷司𨽻置司州江左則揚州刺史自魏以來庶姓為州而無將軍者謂之單車刺史凡單車刺史加督進一品都督進二品不論持節假節晉制刺史三年一入奏宋與魏同梁刺史受之明日辭宮廟而行皆持節後魏天鍚二年又制諸州置三刺史皇室一人異姓二人比古之上中下三士也郡置三太守縣置三令長自後魏北齊則司州曰牧而北齊制州為上中下三等每等又有上中下之差自上上州至下下州凡九等後周則雍州曰牧而制刺史初除奉辭之曰備列鹵簿凡總管刺史則加使持節諸軍事以此為常及蘓綽為六條之制初文帝秉魏政令百官誦習其牧守令長非通六條及計帳者不得居官静帝大象元年詔總管刺史及行兵者加持節餘悉罷之隋雍州置牧餘州並置刺史亦同北齊九等之制總管刺史加使持節至開皇三年置郡以州綂縣自是刺史之名存而職廢刺史縣令三年一遷諸有兵處則刺史帶軍事以綂之十四年改九等州縣為上中下凡三等煬帝大業初復罷州置郡為司𨽻臺大夫一人廵察畿内其刺史十四人廵察畿外諸郡亦有六條之制與漢六條不同從事四十人副刺史廵察每年二月乗軺廵郡縣十月入奏唐武徳元年罷郡置州而雍州置牧至神龍二年二月分天下為十道置廵察使二十人以左右臺及外内官五品以下堅明清勁者為之兼按郡縣再朞而代至景雲二年改置按察使道各一人開元十年省十七年復置二十二年改置採訪處置使治於所部之大郡其有戎旅之地即置節度使仍各置郎天寳九年三月勅本置採訪使令舉天下大綱若大小必由是一人兼理數郡自今已後採訪使考察善惡舉其大綱自餘郡縣所有奏請並委郡守不須干及至徳之後改採訪使為觀察并領都團練使其僚屬隨事増置分天下為四十餘道大者十餘州小者二三州各因其山川區域為制諸道增減不常員額自天寶以後因十五事再置措置使訪察河東西及京師以來運司採訪各以其職再建屯田使又使名沿革不一其職事攝置運使司又至開元勅錄令諸道置隨軍監察御史各守司𨽻政事又自建中元年定矣臣謹按漢制刺史以六條問事非條所問即不省一條彊宗豪右田宅踰制以彊陵弱以衆暴寡二條二千石不奉詔書遵承典制背公向私旁緣牟利侵漁百姓聚斂為姦三條二千石不䘏疑獄風厲殺人怒則任刑善則任賞煩擾刻暴剝截黎元為百姓所疾山崩石裂妖祥訛言四條二千石選辟不平茍阿所愛蔽賢寵頑五條二千石子弟恃怙榮勢請託所監六條二千石違公下比阿附豪彊通行貨賂割損正令又按後周六條之制其略曰其一先治心心不清淨則思慮妄生見理不明是以治民之要在於清心而已其二敦教化其三盡地利其四擢賢良其五䘏獄訟其六均賦役總論州佐别駕從治中典主簿佐功曹書佐事部郡國事郡書祭酒從史中正都督都䕶州之佐吏漢有别駕治中主簿功曹書佐簿曹簿曹從事史主錢榖簿書兵曹兵曹從事史有軍事則置之以主兵事部郡國從事史典郡書佐等官又有孝經師主監試經月令師主時節祠祀律令師主平法律皆州自辟除通為百石又後漢書或云秩六百石職與司𨽻官屬同唯無都官從事漢魏之際復增祭酒文學從事員晉又有武猛從事員其州邉遠有山險㓂賊者置弓馬從事五十人歴代職員互相因襲雖小有更易而大抵不異自魏晉已後刺史多帶將軍開府則州與府各置僚屬州官理民别駕治中以下是府官理戎長吏司馬等官是後魏舊以州牧親民班九條之制使前政通吏以待後人獻文帝革制刺史守宰到官之日仰自舉擇以為選官若簡任失所以罔上論自孝明孝昌以後四方多難刺史太守皆為當部都督雖無兵事皆立僚佐頗為煩擾高隆之乃表請自非實在邊要見有兵馬者悉皆斷之北齊上上州刺史屬官佐吏合三百九十三人以下州遞減十人其州郡佐吏皆州府辟除及後主失政賜諸佞幸賣官分州郡下逮鄉官多降中㫖故有勅用州主簿郡功曹者後周刺史府官則命於天朝州吏並牧守自置至隋以州為郡無復軍府則州府之吏變為郡官矣唐亦無州府之名而有採訪使及節度使節度使說見都督篇採訪使有判官二人分判尚書六行事及州縣簿書支使二人分節吏出入職如節度使之隨車推官一人推鞫獄訟皆使自辟召然後上聞未奉報者稱攝其節度防禦等使寮佐辟奏之例亦如之今舉州之舊職以列于左舊職謂隋以前州職别駕從事史一人從刺史行部别乗一乗傳車故謂之别駕漢制也歴代皆有之隋唐並為郡佐臣謹按庾亮答郭豫書云别駕與舊刺史别乘同流宣王化於萬里其任居刺史之半治中從事史一人居中治事主衆曹文書漢制也歴代皆有隋為郡官唐改為司馬主簿一人録門下衆事省署文書漢制也歴代隋皆有之功曹書佐一人主選用漢制也其司𨽻功曹從事史兼錄衆事晉以來改功曹為西曹書佐宋有别駕西曹主吏及選舉即漢之功曹書佐也部郡國從事史每郡國各一人漢制也主督促文書舉非法典郡書佐每郡國各一人漢制也各主一郡文書以郡吏補嵗滿一更祭酒從事史漢魏以來置宋世分掌諸曹兵賊倉户水鎧之事自江左揚州無祭酒而以主簿代之也中正陳勝為楚王以朱房為中正而不言職事两漢無聞魏司空陳羣以天臺選用不盡人才擇州之才優有照鑒者除為中正自㧞人才銓定九品州郡皆置呉有大公平亦其任也晉宣帝加置大中正故有大小中正其用人甚重齊梁亦重焉後魏有之北齊郡縣皆有其本州中正以京官為之隋有州都其任亦重唐以來無之臣謹按晉劉毅年七十已告老後舉為青州大中正尚書以毅致仕不宜勞以碎務孫尹表曰司徒魏舒司𨽻嚴詢與毅年齒相近管四十萬戸州兼董司百僚總攝機要舒所統既廣兼執九品銓十六州議者不以為劇昔鄭武公年過八十八為司徒毅志氣聰明一州品第不足勞其思慮毅遂為州都銓正人流清濁區别其所彈貶自親貴始都督總管節度團練都綂使附事後漢光武建武初征伐四方始權制督軍御史後罷建安中魏武為相始遣大將軍督之而袁紹分沮授所統諸軍以授郭圖淳于瓊為三都督魏武征孫權還又使夏侯惇督二十六軍魏文帝黄初三年始置都督諸州軍事或領刺史又上軍大將軍曹真都督中外諸軍假黃鉞則總統外内諸軍矣明帝太和四年司馬懿征蜀加號大都督高貴鄉公正元二年司馬昭都督中外諸軍尋加大都督及受晉禪則都督諸軍為上監諸軍次之督諸軍為下使持節為上持節次之假節為下使持節得殺二千石以下持節殺無官位人若有軍事則與使持節同假節唯軍事得殺犯軍令者及伐呉之役以賈充為使持節假黃鉞大都督統領六師兼給羽葆鼔吹緹幢兵萬人騎二千置左右司馬長史左右中郎増參軍騎司馬各十人帳下司馬二十人大車官騎各三十人及太康中都督知軍事刺史治民各用人也至恵帝末乃并任非要州則單為刺史江左以來都督中外尤重唯王導等權重者乃居之宋氏人臣無居者唯江夏王義恭得假黃鉞則專戮節將非人臣常器又有都督諸州諸軍事者則為常職舊曰監某州諸軍事文帝即位改監為都督後魏有都督中外諸軍永安以後遠近多事置京畿大都督總攝軍民立府置佐後周改都督諸軍為總管則總管為都督之任矣又有大都督帥都督都督至隋三都督並以為散官煬帝改大都督為校尉帥都督為旅帥都督為隊正按此都督之名微矣隋文帝以并益荆揚四州置大總管其餘總管府置於諸州列為上中下三等加使持節煬帝悉罷之唐諸州復有總管亦加號使持節刺史持節武徳元年諸州總管亦加號使持節五年以洛荆并幽交等州為大總管府七年改隋上大都督為驍騎尉大都督為飛騎尉帥都督為雲騎尉都督為武騎尉又改大總管府為大都督府總管府為都督府舊洛州已置都督府武徳四年廢府置大行臺復有行軍大總管者蓋有征伐則置於征伐所之道以督軍事自武徳以來亦有元帥之號太宗為秦王加西討元帥中宗為周王為洮河道元帥睿宗為相王為并州道行軍元帥安禄山反後天寶十五載哥舒翰為諸道兵馬元帥其後李光弼郭子儀復為副元帥太極初并益荆揚為四大都督府開元十七年加潞州為五焉其餘都督並為上中下等上都督府五中都督府十三下都督府十六前後置制改易不常難可備敘凡大都督府置都督一人掌所管都督諸州城隍兵馬甲仗食糧鎭戍等親王為之多遥領其任亦多為贈官長史居府以總其事分天下州縣制為諸道每道置使治於所部即採訪防禦等使也其邉方有寇戎之地則加以旌節謂之節度使自景雲二年四月始以賀㧞延嗣為凉州都督充西河節度使其後諸道因同此號得以軍事專殺行則建節府植六纛外任之重莫比焉本皆兼度支營田使開元九年十一月勅其河東河北不須别置並令節度使兼充有副使一人行軍司馬一人申習法令判官二人分判倉兵騎胄四曹事副使及行軍司馬通署掌書記一人掌表奏書檄參謀無員或一人或二人參預謀畫隨軍四人分使出入開元中凡八節度使磧西河西隴右朔方河東幽州劒南嶺南是也後更増加兼改名號蓋古之都督持節江右四中郎將近代行軍總管之任凡將帥出行兵滿萬人以上則置長史司馬倉兵等曹參軍若萬人以下員數遞減至徳以來天下多難諸道皆聚兵増節度使為二十道其非節度使者謂之防禦使以採訪使并領之採訪理州縣防禦理軍事初節度與採訪各置一人天寶中始一人兼領之代宗為廣平王時充天下兵馬元帥親總軍旅克定禍亂以大臣宿將郭子儀李光弼隨其方靣以為副謂之副元帥以督諸道事及德宗踐阼以雍王為之王升儲宫而元帥闕乾元中又置都統使監總管諸道或領三道或領五道皆古方嶽牧伯之任也上元末省都督後又改防禦使為團練守捉使皆主兵事而無旌節僚屬省減有副使一人掌貳使事判官二人分判軍事自永泰以來都團練使守捉使皆主兵事稍有加置而任使則擇之臣謹按宋武帝起義兵討桓元旣平京口向建鄴以孟昶為長史總攝後事及討司馬休之伐荆州以中軍將軍劉道憐監留府事皆留後之任也自後無代無之不復遍舉都䕶漢宣帝地節二年初置西域都䕶為加官也或以騎都尉諫議大夫使䕶西域三十六國有副校尉始以鄭吉為之後廢至後漢永平十七年復置班超為西域都䕶大破焉耆尉黎斬其主自是西域降服納質者五十餘國晋宋以後有都䕶之官亦其任也齊書曰廣州西南有二江川源深遠别置督䕶專征討之陳伯超為江西都䕶沈顗為江南都䕶唐永徽中始於邉方置安東安西安南安北四大都䕶府後又加單于北庭都䕶府府置都䕶一人掌所統諸蕃征討斥候安輯蕃人及諸賞罰總判府事副都䕶二人掌貳都䕶事長史司馬各一人錄事功曹倉曹户曹兵曹法曹參軍各一人參軍事三人州郡第十一下京兆尹留左馮翊南尹守附右扶風河京兆周官有内史秦因之掌治京師漢景帝二年分置左右内史武帝泰初元年更名右内史為京兆尹絶高曰京十億曰兆大衆所聚故曰京兆更名左内史為左馮翊馮輔翊佐也秦官有主爵中尉掌列侯漢景帝中元六年更名都尉武帝太初元年更名右扶風扶助風化也與左馮翊京兆尹是為三輔治長安城中三輔黃圖曰長安以東為京兆尹長陵以北為左馮翊渭城以西為右扶風皆治在城中故趙廣漢歎曰亂吾治者三輔也誠得兼之直差易耳銀章青綬進賢两梁冠絳朝服佩水蒼玉凡州所監都為京師置尹一人丞一人漢初三輔治長安後漢都雒陽置河南尹以三輔陵廟所在不改其號但減其秩與太守同後漢左馮翊右扶風屬司𨽻尋省魏晉為京兆太守後周都闗中又為京兆郡隋京兆郡置尹併佐吏合二百四十四人唐京兆府本為雍州置牧一人以親王為之太宗為秦王中宗為英王睿宗為相王時並居其任多以長史治民開元元年改雍州為京兆府置牧如故掌宣導風俗肅清所部或以親王居閤而遥領焉初雍州置别駕以貳牧守事永徽中改别駕為長史開元中改雍州長史為京兆府尹總理衆務凡前代帝王所都皆曰尹南朝曰丹陽尹後魏初曰代尹東魏曰魏尹齊曰清都尹河南尹其地在周為王城成王命君陳分正東郊成周曰尹兹東郊蓋今河南牧之任亦留守之始也秦兼天下置三川守三川河洛伊也漢興更名三川為河南後増守為太守王莽改太守為大尹改河南大尹為保忠信卿光武中興徙都洛陽改太守為尹章綬服秩與京兆尹同特奉朝請魏晋皆為河南尹後魏太和中遷都洛陽又置河南尹東魏置洛州刺史後周置洛州總管尋罷之隋初為洛州刺史後為河南内史大業初為荆河州刺史又為河南太守尋為河南尹與京兆同唐武德四年置洛州都督貞觀十七年改為刺史顯慶二年置東都改刺史為長史而洛州置牧一人以親王為之中宗為周王時及衛王重俊並居其任多以長史治民至開元元年改洛州為河南府改長史為尹其牧尹之制一如京兆諸曹寮佐亦如之各有少尹二員通判府事按京兆少尹魏晉以來治中之任隋文帝改為司馬煬帝又改為賛治後又改為丞武德初復為治中永徽元年又以大皇帝諱改為司馬本一員太極元年雍洛二州各加司馬一員分為左右開元元年並改為少尹開元以後増置太原府為北京官屬制置悉同兩京初武太后長夀元年以并州后之故里改為北都神龍初廢開元十一年又以并州高祖起義之始復置太原府號曰北京初開元元年正月於蒲州置中都改州為河中府至六月而罷後上元元年復置峽州為鳯翔府又以益州為成都府留守周之君陳則其任也此後無聞後漢和帝南廵祠園廟張禹以太尉兼衛留守晉張方刼恵帝幸長安僕射荀藩等與其遺官在洛陽為留臺承制行事號東西臺至安帝時劉裕置留臺具百官又後魏孝文南伐之時以太尉元丕廣陵王羽為留守京師加持節留守因此始也郡太守郡守秦官秦滅諸侯以其地為郡置守丞尉各一人守治民丞佐之尉典兵漢景帝中元二年更名郡守為太守凡在郡國皆掌治民進賢勸功决訟檢姦常以春行所主縣秋冬遣無害吏按訊諸囚平其罪法論課殿最并舉孝廉漢制嵗盡遣上計掾史各一人條上郡内衆事謂之計偕簿郡為諸侯王國者置内史以掌太守之任宣帝以為太守吏民之本數變易則下不安民知其將久不可欺罔乃服從其教化每拜刺史守相輙親見問觀其所由退而考察以質其言嘗稱曰與我共治者唯良二千石乎是以漢世良吏於斯為盛稱中興焉成帝綏和元年省内史以相治民則相職為太守王莽改太守曰大尹後漢亦重其任或以尚書令僕射出為郡守鍾離意黃香桓榮胡廣是也或自郡守入為三公虞延第五倫桓虞鮑昱是也三國時有郡守國相内史晉郡守皆加將軍無者為耻晉宋守相内史並銀章青綬進賢兩梁冠後魏初郡置三太守孝文初二千石能静二郡至三郡者遷為刺史太和中次職令太守内史相縣令並以六年為限北齊制郡為上中下三等每等又有上中下之差自上上郡至下下郡凡九等後周郡太守各以户多少定品命隋郡太守如北齊之制至開皇三年罷天下諸郡以州統縣時楊尚希上表曰當今郡縣倍多於古十羊九牧人少官多請存要去閒併小為大帝嘉之遂罷諸郡大業三年又改州為郡郡置太守唐武徳元年改郡為州改太守為刺史加號持節後加號為使持節諸軍事而實無節但頒銅魚符而已天寶元年加州為郡刺史為太守自是州郡史守更相為名其實則一太宗初理天下重親民之任疏督守之名于屛俯仰視焉其人善惡必書其下是以州郡無不率理逮貞觀之末升平既久羣士多慕省閣不樂外任其折衝果毅有才力者先入為中郎郎將次補郡守其輕也如是武后垂拱二年諸州都督刺史宜准京官帶魚長安四年納言李嶠同平章事唐休璟奏曰切以物議重内官而輕外職凡所出守多因貶累非所以澄風俗安萬民臣請擇材於臺閣省事之中分典大州共康庶政臣等請輟近侍率先具寮太后乃令書名採之中者當行於是鳳閣侍郎韋嗣立御史大夫楊再思二十人中之皆以本宫檢校刺史後二十人中政績可稱者獨常州刺史薛光謙徐州刺史司馬鍾二人而已當時復有為員外刺史者不領州務開元中定天下州府自京都都督及都䕶府之外以近畿之州同華岐蒲為四輔鄭陜汴絳懷魏為六雄宋亳滑許汝晉洛虢衛相十州為十望又有十𦂳州後入𦂳者甚多不復具列及有上中下之差都督刺史品卑者借緋魚按武德令三萬户以上為上州永徽令二萬户以上為上州開元十八年三月勅太平時久户口日盛宜以四萬户以上為上州二萬五千户為中州不滿二萬户為下州亦有不滿户口以别勅為上州者六千户以上為上縣三千户以上為中縣不滿二千户為下縣天寶中通計天下凡上州一百九州中州二十九州下州一百八十九州總三百二十七州是也自至徳之後州縣凋弊刺史之任大為精選諸州始各有兵鎮者刺史皆加團練使故其所責任重矣臣謹按漢文帝二年初與郡守為銅虎符竹使符至隋開皇七年又别頒青龍符於東方總管刺史西方以騶虞南方朱雀北方元武九年又頒木魚符於總管刺史雌一雄三至十年悉頒木魚於五品以上官義寧二年罷竹使符頒銀莬符於諸郡唐武德元年又改銀莬符為銅魚符總論郡佐郡丞司别駕司長史司司馬司錄事參軍功倉户兵司法正司士守參軍事掾經學博士郡醫博士中通五官督郵尉郡之佐吏秦漢有丞尉員外以佐守尉典武職後漢諸郡各置諸曹掾史略如公府曹無東西曹晉宋以來雖官曹名品互有異同大抵略如漢制北齊上郡太守屬官合二百一十二人以下郡遞減之隋初以州為郡無復軍府則州府之職參為郡官故有長史司馬錄事參軍功戸兵法等七曹開皇三年詔佐官以曹為名者並改為司十二年諸州司從事為名者並改為參軍又制刺史二佐每歲暮更入朝上考課煬帝置通守贊治東西曹掾主簿司功倉戸兵法士等書佐各因郡之大小而為増減改行參軍為行書佐唐州府佐吏與隋制同有别駕長史司馬一人大都督府有司馬左右二員凡别駕長史司馬通謂之上佐錄事參軍京府謂之司錄參軍置二人餘並各為錄事參軍大都督府亦有二人其餘郡止各一人司功司倉司戸司兵司法司士等六參軍景龍三年諸州加置司田開元中省乾元之後又分司户置參軍一員位在司户下諸府則曰田曹開元中省乾元之後又分置司户焉以其廢置不常故田曹不列在府為曹在州為司府曰功曹倉曹州曰司功司倉大與上府置二員州置一員自司功以下通謂之判司參軍事各有差京府參軍事有六員餘府州或四或三博士一員醫博士一員凡以州府大小而為増減郡丞别駕郡丞秦置之以佐守漢因而不改晉成帝咸康七年省諸郡丞唯丹陽丞不省宋文帝元嘉四年復置齊梁有之至隋開皇三年改别駕治中為長史司馬至煬帝又罷長史司馬又置賛治者一人後又改郡賛治為丞位在通守下及郡丞廢其職分為别駕長史司馬自隋為郡府之官去從事史唐永徽二年改為長史上元元年復置别駕多以皇族為之神龍中廢至開元初復置始通用庶姓天寶八年以明皇由潞州别駕入定内難遂登大位乃廢别駕官至德中復置諸州府各一人而大都督府不置通判其事以都督刺史各兼之共職其事長史秦置郡丞其郡當邉戍者丞為長史掌兵馬漢因而不改古今注曰有守相病丞長史司馬行事後罷邉郡太守丞而長史領丞職其後長史遂為軍府官至隋為郡官唐初無永徽二年有别駕刺史及長史之名其後二職並置州府各一人五府長史理府事餘通判而已司馬本主武之官自魏晉以後刺史多帶將軍開府者則置府寮司馬為軍府之官理軍事至宋司馬銅印墨綬絳朝服武冠至隋廢州府之任無復司馬而有治中焉治中乃舊州之職也州廢遂為郡官開皇三年改治中為司馬煬帝又改司馬及長史併置贊治一人尋又改贊治為郡丞唐武徳初復為治中貞觀二十三年髙宗即位遂改諸州治中並為司馬長安元年洛雍并荆揚益六州置左右司馬各一員四年復舊太極元年又制大都督府各置左右司馬一員錄事參軍晉置本為公府官非州郡職也掌總錄衆曹文簿舉彈善惡後代刺史有軍而開府者並置之自後漢有郡主簿官職與州主簿官同隋初以錄事參軍為郡官則并州郡主簿之職矣煬帝又置主簿唐武徳元年復為錄事參軍開元中改京兆尹屬官曰司錄參軍掌府事勾稽省署抄目紏弹部内非違監印給紙筆之事乾元元年加進一品仍升一資又置尹司凡縣令及判司與錄事及州郡别置司功曹參異禮尊其任也司功參軍兩漢有功曹史主選署功勞歴代皆同北齊諸州有功曹參軍隋亦然及罷郡置州以曹為名者皆改曰司煬帝罷州置郡又改曰司功書佐唐改曰司功參軍開元初京尹屬官及諸州都督府並曰功曹參軍而列郡則曰司功參軍令掌管園廟祭祀及學校禮樂選舉表疏醫筮考課及喪葬之事也司倉參軍兩漢有倉曹史掌倉庫北齊以下並同功曹唐亦掌倉廩庖厨及財物等㕓市之價一切之事司戸參軍漢魏以下有户曹掾主民户北齊以下與功曹同唐掌户口籍帳婚嫁田宅并雜徭道路一切之事司兵參軍漢司𨽻屬官有兵曹從事史蓋有軍事則置之以主兵事至北齊以後同功曹唐掌軍防𤇺火驛馬𫝊送門禁田獵及儀仗之雜事司法參軍兩漢有决曹賊曹掾主刑法歴代皆有或謂之賊曹或謂法曹或謂墨曹隋以後與功曹同唐掌律令定罪及緝盗賊之事司士參軍兩漢無聞北齊以後與功曹同唐掌管河津營造橋梁及廨宇之事參軍事後漢靈帝時陶謙以幽州刺史參司空車騎張温軍事晉時軍府乃置官員歴代皆有至隋置州為郡又有郡官為之書佐唐改為參軍掌直侍督守無常職有事則出使前代又有行參軍者晉河間王顒以太宰輔政始置之掌使命歴代皆有唐唯王府有之餘則無矣經學博士漢郡國皆有文學掾後漢光武問功臣曰諸卿不遭際會自度爵禄何所至乎鄧禹曰臣少嘗學問可充郡文學歴代多闕隋潘徽為州博士唐府郡置經學博士各一人掌以五經教授學生多寒門鄙儒為之助敎各有差醫博士一人唐開元十一年七月置制每州冩本草百一集驗方與經史同貯其年九月御撰廣濟方五卷頒行天下貞元十二年二月御撰廣利方五卷頒天下自今後諸州府應闕醫博士宜令長史各自訪求選試取人藝業優長堪效者即以具名申聞請行已出身人及有前資官與正授未出身人且令權知四考後州司與正授吏部更不須選集中正魏置晉諸中正率一國所推臺閣取信後魏孝明正光元年罷諸郡中正北齊郡縣各皆有之他史多闕隋初有後罷而有州都唐並無此官每嵗貢士於所在之處又符書所闗及鄉飲酒之禮則司功參軍主其事通守隋煬帝置郡各一人位次太守京兆府及河南皆謂之内史五官掾後漢有之主功曹及諸曹主事後無督郵漢有之掌監屬縣各有東西南北中部謂之五部督郵也故督郵功曹之極位臣謹按漢尹翁歸為河東督郵時太守田延年分河東二十八縣為兩部閎孺部汾北翁歸部汾南舉法皆得其罪屬縣長吏雖中傷莫有怨者又有孫寶為京兆尹以立秋日用故吏侯文為東部督郵勅之曰今日鷹隼始擊當順天氣取姦惡以成嚴冬之誅郡尉京輔屬國都尉附十秦官有郡尉掌佐守典武職甲卒漢凡郡口二萬舉一人典兵禁備盗賊景帝更名曰都尉武帝元鼎四年又置三輔都尉各二員譏出入邉境置農都尉主屯田殖榖又置屬國郡尉主蠻夷降者中興建武七年省諸郡尉并諸太守每有劇賊郡臨時置都尉事訖罷又省關都尉唯邉郡徃徃置都尉及屬國都尉宋志曰光武省郡尉後往往置東南西北四部都尉稍有分縣治民比郡安帝以西羗盛三輔有陵園之守乃復置右扶風都尉於雍京兆虎牙都尉於長安自後無聞至隋煬帝時别置都尉領兵與郡不相知又京輔都尉立府於潼關主兵鎭唐無其制縣令周官有縣正各掌其縣之政令而賞罰之春秋時列國相滅多以其地為縣縣大而郡小故傳云上大夫受縣下大夫受郡又周書作雒篇曰千里百縣縣有四郡縣邑之長晉謂之大夫魯衛謂之宰椘謂之公謂之尹其職一也至于戰國則郡大而縣小矣故甘茂謂秦武王曰宜陽大縣名曰縣其實郡也漢制列侯所食縣曰國皇太后公主所食曰邑有蠻夷曰道凡縣萬户以上為令減萬户為長侯國為相秩次亦如之皆秦制也漢因之漢書曰凡縣大率方百里民稠則減稀則曠成帝綏和元年長相墨綬哀帝建平二年復黃綬秋冬集課上計於所屬郡國其郡有鹽官鐡官工官都水官者隨事廣狹置令長及丞秩次皆如縣道無分土給均吏後漢凡郡縣出鹽多者置鹽官主鹽税出鐵多者置鐵官主鼔鑄有工多者置工官主税物有水池及魚利多者置水官主平水收魚税所在諸縣均差吏更給之補吏随事不具縣員晉制大縣令有治績官報以大郡不經宰縣不得入為臺郎宋諸縣令銅印墨綬進賢兩梁冠自晉宋以後令長國相皆如漢制後魏縣置三令長孝文初制縣令能静一縣刼盗者兼理二縣即食其禄能靜二縣者兼理三縣三年遷為郡守二千石能靜二郡者兼理至三郡亦如之三年遷為刺史太和中次職令其禄甚厚故孝文以北平府長史裴聿中書侍郎崔亮並清貧欲以俸禄優之乃以亮帶野王令聿帶温縣令時人榮之其後令長用人益雜但選勤舊令史為之而縉紳之流耻居其位北齊制縣為上中下三等復於每等又有上中下之差自上上縣至下下縣凡九等然猶因循後魏用人濫雜至於士流耻居之元文遥遂奏於武成帝請革之乃宻令捜揚世胄子弟恐其辭訴總召集神武門宣㫖慰諭而遣自此縣令始以士人為之隋縣有令有長煬帝以大興長安河南洛陽四縣令並増正五品諸縣皆以所管閒劇及衝要之處以為等級唐縣有赤畿望𦂳上中下七等之差京都所治為赤縣京之旁邑為畿縣其餘則以户口多少資地美惡為差凡六赤八十二畿七十八望百一十一𦂳四百四十六上二百九十六中五百五十四下一千五百七十三縣總論縣佐丞主簿尉五百附漢縣有丞尉及諸曹掾後漢縣諸曹略如郡員又五官為廷掾監鄉五部春夏為勸農掾秋冬為制度掾晉縣有主簿功曹廷掾法曹金倉賊曹掾兵曹賊捕掾等員煬帝改尉為縣正尋改正為戸曹法曹分司以承郡之六司其京四縣則加置功曹為三司司各二人唐縣有令而置七司一如郡制丞為副貳如州上佐主簿上轄加錄事參軍其曹謂之錄事并司功以下謂之六事七司尉分理諸曹如州判司錄事省受符歴佐史行其簿書臣謹按漢縣丞尉及諸曹掾多以本郡人為之三輔則兼用他郡及隋氏革選盡用他郡人又按後漢外黃令牛述禮請爰延為廷掾范寗為功曹濮陽潜為主簿常共言談而已丞漢諸縣皆有兼主刑獄囚徒後漢令長國相名置丞一人主文書典倉獄署諸曹掾史凡諸縣丞皆銅印黃綬進賢一梁冠自晉已後並無丞宋時唯建康府有獄丞及至隋唐則縣各有丞丞各一人兼通判縣事有赤縣各置丞二人主簿漢晋各有之他史多闕唐赤縣置二人他縣各一人掌付事勾稽省署抄目紏正縣内非違監印及給筆之用臣謹按主簿自漢以來皆令長自調用至隋始自上置又按後漢繆彤仕縣為主簿時縣令被章見考吏皆畏懼自誣而彤獨證據掠考苦毒至乃體生蟲蛆因轉換五獄踰渉四年令卒以自免又寧陽主簿詣闕訴其縣令之枉積六七歲不省乃復上書曰臣為陛下子陛下為臣父臣章百上終不見省臣豈可北詣單于以告寃乎帝大怒劾以大逆虞詡駮之曰主簿所訟乃君父之怨百上不達是有司之過尉漢諸縣皆有之長安有四尉分為左右部後漢令長國相亦皆有尉大縣二人小縣一人主追捕盗賊按察姦宄署諸曹掾史邉縣有鄣塞尉掌禁備羗夷犯塞洛陽有四尉東南西北四部曹公為北部尉是也魏因之晉洛陽建康皆置六部尉宋齊梁陳並因之餘縣如漢制諸縣道尉銅印黃綬朝服武冠江右止單衣介幘北齊郡縣置三尉隋改為正後置尉又分為户曹法曹唐初因隋制武徳中復改為正七年三月復改為尉赤縣置六員他縣各有差分判諸司事上縣二員萬户以上者又増一員中縣一員四千户以上者又増置一員亦以上上縣中中縣下下縣中下縣一員佐史各有差别五百宋志曰謂官府州郡都各置五百又韋曜曰五百字本為伍伯伍當也伯道也使之導引當道陌中以驅除也今州縣官有雜職者掌行鞭撻每官出則執楚導引呵闢行路殆其職也鄉官周禮有鄉師鄉老鄉大夫之職其任大矣鄉大夫管萬二千五百家以上次有州長二千五百家為州黨正五百家為黨族師百家為族閭胥二十五家為閭鄙師五酇為鄙酇長四里為酇里宰五鄰為里鄰長五家為鄰皆不命之士為之皆鄉里之官也大凡各掌其鄉黨州里之政治云秦制十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫游徼三老掌教化嗇夫職聽訟收賦税游徼循禁盜賊漢鄉亭及官皆依秦制也縣大率方百里其人稠則減稀則曠鄉亭亦如之高后元年初置孝悌力田二千石者一人特置孝悌力田官以尊其秩欲以勸厲天下令敦行務本後廢至文帝十二年又置三老及孝悌力田無常員平帝又置外史閭師後漢鄉官與漢同有秩郡所置秩百石鄉户五千則置有秩掌一鄉人其鄉小者縣置嗇夫一人爰延為鄉嗇夫仁化大行民但聞嗇夫不知郡縣也皆主知民善惡為役先後知民貧富為賦多少平其差品三老掌教化凡有孝子順孫貞女義婦推財救患及學士為民式者皆扁表其門以興善行又有鄉佐屬鄉主民以收税賦亭有亭長十里一亭五里一郵郵間相去二里半司姦盜亭持二尺板以劾賊索繩以收執賊亭吏舊民負弩後改為長或為亭負主禁盗賊先賢傳曰逢萌為縣亭長時尉行過亭萌候迎謁拜既而擲盾歎曰大丈夫安能為人役哉遂去之至王莽時逢萌解冠掛於東都門而遁里有里魁民可什伍里魁主一里百家什主十家伍主五家以相檢察民有善惡以告監官晉縣五百戸以上皆置一鄉三千戸以上置二鄉五千戸以上置三鄉萬戸以上置四鄉鄉置嗇夫一人縣率百里戸置里吏一人其土廣人稀聽隨宜置里吏限不得減五十戸戸千以上置校官掾一人縣皆置方略吏四人宋五家為伍伍長主之二伍為什什長主之什十為里里魁主之十里為亭亭長主之十亭為鄉鄉有鄉佐三老有秩嗇夫游徼各一人所職與秦漢同隋以周齊郡縣職自州都郡正縣正以下皆州郡將縣令而自調用理時事至開皇初不知時事直謂之鄉官官别置品皆吏部除受每歲考殿最開皇十五年罷州縣鄉官唐凡百戸為一里里置正一人五里為一鄉鄉置耆老一人以耆年平謹者縣補之亦曰父老貞觀九年每鄉置長一人佐二人至十五年省太極元年初令老人年九十以上版授下州刺史朱衣執象笏八十以上版授上州司馬綠衣執木笏天寶七載詔父老六十版授本縣丞七十以上授縣令三十里置一驛其非通途大路則曰館驛各有將以州里富彊之家主之以待行李自至德之後民貧不堪命遂以官司掌焉凡天下水陸驛一千五百八十七處通志卷五十六
