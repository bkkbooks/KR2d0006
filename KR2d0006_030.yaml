body:
  text: 通志卷二十五宋右迪功郎鄭樵漁仲撰氏族略第一臣謹按司馬遷曰書班固曰志東觀曰記華嶠曰典張勃曰録何法盛曰説諸史通謂之志然志者古史之名今改曰略略者舉其大綱云氏族序自隋唐而上官有簿狀家有譜系官之選舉必由於簿狀家之婚姻必由於譜系歷代並有圖譜局置郎令史以掌之仍用博通古今之儒知撰譜事凡百官族姓之有家狀者則上之官為考定詳實藏於祕閣副在左户若私書有濫則糾之以官籍官籍不及則稽之以私書此近古之制以繩天下使貴有常尊賤有等威者也所以人尚譜系之學家藏譜系之書自五季以來取士不問家世婚姻不問閥閲故其書散佚而其學不傳三代之前姓氏分而為二男子稱氏婦人稱姓氏所以别貴賤貴者有氏賤者有名無氏今南方諸蠻此道猶存古之諸侯詛辭多曰墜命亡氏踣其國家以明亡氏則與奪爵失國同可知其為賤也故姓可呼為氏氏不可呼為姓姓所以别婚姻故有同姓異姓庶姓之别氏同姓不同者婚姻可通姓同氏不同者婚姻不可通三代之後姓氏合而為一皆所以别婚姻而以地望明貴賤於文女生為姓故姓之字多從女如姬薑嬴姒媯姞妘婤姶胚嫪之類是也所以為婦人之稱如伯姬季姬孟薑叔薑之類並稱姓也奈何司馬子長劉知幾謂周公為姬旦文王為姬伯乎三代之時無此語也良由三代之後姓氏合而為一雖子長知幾二良史猶昧於此姓氏之學最盛於唐而國姓無定論林寶作元和姓纂而自姓不知所由來漢有鄧氏官譜應劭有氏族篇又有潁川太守聊氏萬姓譜魏立九品置中正州大中正主簿郡中正功曹各有簿狀以備選舉晉宋齊梁因之故晉散騎常侍賈弼太保王𢎞齊衛將軍王儉梁北中郎咨議參軍知撰譜事王僧孺之徒各有百家譜徐勉又有百官譜宋何承天撰姓苑與後魏河南官氏志此二書尤為姓氏家所宗唐太宗命諸儒撰氏族志一百卷柳沖撰大唐姓系録二百卷路淳有衣冠譜韋述有開元譜柳芳有永泰譜柳璨有韻略張九齡有韻譜林寶有姓纂邵思有姓解其書雖多大槩有三種一種論地望一種論聲一種論字論字者則以偏旁為主論聲者則以四聲為主論地望者則以貴賤為主然貴賤升沈何常之有安得專主地望以偏旁為主者可以為字書以四聲為主者可以為韻書此皆無與於姓氏凡言姓氏者皆本世本公子譜二書二書皆本左傳然左氏所明者因生賜姓胙土命氏及以字以諡以官以邑五者而已今則不然論得姓受氏者有三十二類左氏之言隘矣一曰以國為氏二曰以邑為氏天子諸侯建國故以國為氏虞夏商周魯衛齊宋之類是也卿大夫立邑故以邑為氏崔盧鮑晏臧費柳楊之類是也三曰以鄉為氏四曰以亭為氏封建有五等之爵降公而為侯降侯而為伯降伯而為子降子而為男亦有五等之封降國侯而為邑侯降邑侯而為關內侯降關內侯而為鄉侯降鄉侯而為亭侯學者但知五等之爵而不究五等之封關內邑者溫原蘇毛甘樊祭尹之類是也但附邑類更不别著裴陸龎閻之類封於鄉者故以鄉氏麋采歐陽之類封於亭者故以亭氏五曰以地為氏有封土者以封土命氏無封土者以地居命氏蓋不得受氏之人或有善惡顯著族類繁盛故因其所居之所而呼之則為命氏焉居傅巖者為傅氏徙嵇山者為嵇氏主東蒙之祀則為蒙氏守橋山之冡則為橋氏耐氏因耐班食於耐門潁氏因考叔為潁谷封人東門襄仲為東門氏桐門右師為桐門氏皆此道也隱逸之人高傲林藪居於祿里者呼之為祿里氏居於綺里者呼之為綺里氏所以為美也優倡之人取媚酒食居於社南者呼之為社南氏居於社北者呼之為社北氏所以為賤也又如介之推燭之武未必亡氏由國人所取信也故特標其地以異於衆凡以地命氏者不一而足六曰以姓為氏姓之為氏與地之為氏其初一也皆因所居而命得賜者為姓不得賜者為地居於姚墟者賜以姚居於嬴濱者賜以嬴姬之得賜居於姬水故也薑之得賜居於薑水故也故曰因生以賜姓七曰以字為氏八曰以名為氏九曰以次為氏凡諸侯之子稱公子公子之子稱公孫公孫之子不可復言公孫則以王父字為氏如鄭穆公之子曰公子騑字子駟其子曰公孫夏其孫則曰駟帶駟乞宋桓公之子曰公子目夷字子魚其子曰公孫友其孫則曰魚莒魚石此之謂以王父字為氏無字者則以名魯孝公之子曰公子展其子曰公孫夷伯其孫則曰展無駭展禽鄭穆公之子曰公子豐其子曰公孫段其孫則曰豐卷豐施此諸侯之子也天子之子亦然王子狐之後為狐氏王子朝之後為朝氏是也無字者以名然亦有不以字而以名者如樊皮字仲文其後以皮為氏伍員字子胥其後以員為氏皆由以名行故也亦有不以王父字為氏而以父字為氏者如公子遂之子曰公孫歸父字子家其後為子家氏是也又如公孫枝字子桑其後為子桑氏者亦是也亦有不以王父名為氏而以父名為氏者如公子牙之子曰公孫兹字戴伯其後為兹氏是也又如季公鉏字子彌其後為公鉏氏者亦是也以名字為氏者不一而足左氏但記王父字而已以次為氏者長幼之次也伯仲叔季之類是也次亦為字人生其始也皆以長幼呼及乎往來既多交親稍衆則長幼有不勝呼然後命字焉長幼之次可行於家里而已此次與字之别也所以魯國三家皆以次命氏而亦謂之字焉良由三家同出其始也一家之人焉故以長幼稱十曰以族為氏按左傳云為諡因以為族又按楚辭云昭屈景楚之三族也昭氏景氏則以諡為族者也屈氏者因王子瑕食邑于屈初不因諡則知為族之道多矣不可專言諡也族近於次族者氏之别也以親别疏以小别大以異别同以此别彼孟氏仲氏以兄弟别也伯氏叔氏以長少别也丁氏癸氏以先後别也祖氏禰氏以上下别也第五氏第八氏同居之别也南公氏南伯氏同稱之别也孔氏子孔氏旗氏子旗氏字之别也軒氏軒轅氏熊氏熊相氏名之别也季氏之有季孫氏仲氏之有仲孫氏叔氏之有叔孫氏適庶之别也韓氏之有韓餘氏傅氏之有傅餘氏梁氏之有梁餘氏餘子之别也遂人之族分而為四商人之族分而為七此枝分之别也齊有五王合而為一謂之五王氏楚有列宗合而為一謂之列宗氏此同條之别也公孫歸父字子家襄仲之子也歸父有二子一以王父字襄仲為仲氏一以父字子家為子家氏公子郢字子南其後為子南氏而復有子郢氏伏羲之後有伏虙二氏同音異文共叔段之後有共氏又有叔氏又有段氏凡此類無非辨族十一曰以官為氏十二曰以爵為氏有官者以官無官者以爵如周公之兄弟也周公為太宰康叔為司寇聃季為司空是皆有才能可任以官者也五叔無官是皆無才能不可任以官者也然文王之子武王周公之兄弟雖曰無官而未嘗無爵土如此之類乃氏以爵焉以官為氏者太史太師司馬司空之類是也雲氏庾氏籍氏錢氏之類亦是也以爵為氏者皇王公侯是也公乘公士不更庶長亦是也十三曰以凶德為氏十四曰以吉德為氏此不論官爵惟以善惡顯著者為之以吉德為氏者如趙衰人愛之如冬日其後為冬日氏古有賢人為人所尊尚號為老成子其後為老成氏以凶德為氏者如英布被黥為黥氏楊元感梟首為梟氏齊武惡巴東王蕭子響為同姓故改蕭為蛸後魏惡安樂王元鑒為同姓故改元為兀十五曰以技為氏此不論行而論能巫者之後為巫氏屠者之後為屠氏卜人之後為卜氏匠人之後為匠氏以至豢龍為氏御龍為氏干將為氏烏浴為氏者亦莫不然十六曰以事為氏此又不論行能但因其事而命之耳夏后氏遭有窮之難后緡方娠逃出自竇而生少康支孫以竇為氏漢武帝時田千秋為丞相以年老詔乘小車出入省中時號車丞相其後因以車為氏微子乘白馬朝周兹白馬氏之所始也魏初平中有隱者常乘青牛號青牛先生兹青牛氏之所始也十七曰以諡為氏周人以諱事神諡法所由立生有爵死有諡貴者之事也氏乃貴稱故諡亦可以為氏莊氏出於楚莊王僖氏出於魯僖公康氏者衛康叔之後也宣氏者魯宣伯之後也文氏武氏哀氏繆氏之類皆氏於諡者也凡復姓者所以明族也一字足以明此不足以明彼故益一字然後見分族之義言王氏則濫矣本其所系而言則有王叔氏王孫氏言公氏則濫矣本其所系而言則有公子氏公孫氏故十八曰以爵系為氏唐氏雖出於堯而唐孫氏又為堯之别族滕氏雖出於叔繡而滕叔氏又為叔繡之别族故十九曰以國系為氏季友之後傳家則稱季孫不傳家則去孫稱季叔牙之後傳家則稱叔孫不傳家則去孫稱叔故二十曰以族系為氏士季者字也有士氏又别出為士季氏伍參者名也有伍氏又别出為伍參氏此以名氏為氏者也又有如韓嬰者本出韓國加國以名為韓嬰氏如臧會者本出臧邑加邑以名為臧會氏如屠住者本出住鄉加鄉以名為屠住氏故二十一曰以名氏為氏而國邑鄉附焉禹之後為夏氏把他奔魯受爵為侯又有夏侯氏出焉媯姓之國為息氏公子邊受爵為大夫又有息夫氏出焉此以國爵為氏者也白氏舊國也楚人取而邑之以其後為白侯氏故二十二曰以國爵為氏而邑爵附焉原氏以周邑而得氏申氏以楚邑而得氏及乎原加伯為原伯氏以别於原氏申加叔為申叔氏以别於申氏是之謂以邑系為氏魯有沂邑因沂大夫相魯而以沂相為氏周有甘邑因甘平公為王卿士而以甘士為氏故二十三曰以邑系為氏而邑官附焉師氏者太師氏也史氏者太史氏也師延之後為師延氏史朝之後為史朝氏此以名隸官是之謂以官名為氏呂不韋為秦相子孫為呂相氏酈食其之後為食其氏曾孫武為侍中改為侍其氏此以官氏為氏者也故二十四曰以官名為氏而官氏附焉以諡為氏所以别族也邑而加諡如苦成子之後為苦成氏臧文仲之後為臧文氏氏而加諡者如楚釐子之後為釐子氏鄭共叔之後為共叔氏爵而加諡者如衛成公之後為成公氏楚成王之後為成王氏故二十五曰以邑諡為氏二十六曰以諡氏為氏二十七曰以爵諡為氏也按古人著復姓之書多矣未有能明其義者也有中國之復姓有夷俗之復姓中國之復姓所以明族有重復之義二字具二義也以中國無衍語一言見一義夷俗多侈辭數言見一義夷俗有復姓者侈辭也一言不能具一義必假數言而後一義具焉其於氏也則有二字氏有三字氏有四字氏其於音也則有二合音有三合音有四合音觀譯經潤文之義則知侈辭之道焉臣昔論中國亦有二合之音如者焉二合為旃者與之與二合為諸之類是也惟無三合四合之音今論中國亦有二字之氏惟無三字四字之氏此亦形聲之道自然相應者也二十八曰代北復姓二十九曰關西復姓三十曰諸方復姓此皆夷俗二字姓也三十一曰代北三字姓侯莫陳之類是也三十二曰代北四字姓自死獨膞之類是也此外則有四聲又有復姓四聲者以氏族不得其所系之本乃分為四聲以統之復姓者以諸有復姓而不得其所系之本者則附四聲之後氏族之道終焉五帝之前無帝號有國者不稱國惟以名為氏所謂無懷氏葛天氏伏羲氏燧人氏者也至神農氏軒轅氏雖曰炎帝黃帝而猶以名為氏然不稱國至二帝而後國號唐虞也夏商因之雖有國號而天子世世稱名至周而後諱名用諡由是氏族之道生焉最明著者春秋之時也春秋之時諸侯稱國未嘗稱氏惟楚國之君世稱熊氏荆蠻之道也支庶稱氏未嘗稱國或適他國則稱國如宋公子朝在衛則稱宋朝衛公孫鞅在秦則稱衛鞅是也秦滅六國子孫皆為民庶或以國為氏或以姓為氏或以氏為氏姓氏之失自此始故楚之子孫可稱楚亦可稱芉周之子孫可稱周子南君亦可稱姬嘉又如姚恢改姓為媯媯皓改姓為姚兹姓與氏渾而為一者也自漢至唐世有典籍討論兹事然皆出於一時之意不知澄本正源每一書成怨望紛起臣今此書則不然帝王列國世系之次本之史記實建國之始也諸家世系之次本之春秋世譜實受氏之宗也先天子而後諸侯先諸侯而後卿大夫士先卿大夫士而後百工技藝先爵而後諡先諸夏而後夷人先有紀而後無紀繩繩秩秩各歸其宗使千餘年湮源斷緒之典燦然在目如雲歸于山水歸于淵日月星辰麗乎天百穀草木麗乎土者也臣舊為氏族志五十七卷又有氏族源氏族韻等書幾七十卷今不能備姑載其略云氏族目録以國為氏唐虞夏商殷北殷周西周周生秦漢魯晉衛蔡曹滕騰燕鄭吳魏韓何虢郭管焦滑霍聃郜浩雍畢酆郇郕成盛于邘應凡蔣邢茅胙作賈芮隨胡巴杷爬遂頓道邠豳耿岑彤彤齊楚宋荆陳趙田許莒邾朱婁僂郳兒倪把樓東樓越紀息鄎鄧梁薛蕭沈曾鄫繒徐鄖妘鄖云鄅宿羅夔淳于州公夷穀國舒舒鳩舒蓼舒鮑須句須郯談黎犂申章向葛諸葛蓼黃權江顓臾鄶英六辛謝射逼陽封呂仇吾祝萊賴談覃弦戴載項暴陽冀牟鄟鬲巢柏軫絞二程崇扈房杜箕密須寒過庸戈邶鄘鑄邳觀褒緡岐仍奄雙武羅吾昆昆吾梅癸北雷元冥斟斟尋剻用摯允灌斟灌廖􅀈竹郅習西陵安陵甲父有窮有扈蒲姑西王孤竹封父終利夙沙秣末柏成顧阮共恭龔洪苑宛逢彭韋狄白狄翟代路潞戎支驪卑廬郍甌歐安瞞蠻羌鼓米滿竺落洛淮夷臯落義渠西申以郡國為氏紅蘄番郴􅬣東陽東陵櫟陽周陽信都冠軍武強廣武以邑為氏祭尹蘇毛樊尋鄩單甘緱榮郗鞏泛泛謝邱營劉原召邵臧郈后費郎柳匡管鄆落姑鄒卞瑕邱矍相菟裘欒郤苦祁荀智輔續戲陽函與邯鄲羊舌羊絳步蒯蕢彘曲范士隨苖邴丙吾邱虞邱令狐溫楊盂壺鞮銅鞮遆綿解州塢莢俠鄂翼寧元儀常裘承濮戚汲聶棗棘商邱五鹿馮京閭邱閭隰崔盧鮑棠穰晏晝檀來郲災盆即墨即葵邱梁邱籍邱余邱安平高堂鬭薳蒍屈陰鍾鍾離春上官詹蔓白葉商密軒邱三閭鄧陵諸梁棠溪留合坎華平橫鄴信馬睢藺鹿武成鄡衙武安華陽涇陽高陵通譙鄾酇縣酈取慮薊鮮于鮮母邱母三烏渠邱者邱漁陽堂邑泉全揭陽以鄉為氏裴陸耨龎閻郝尸肥資郟胡母大陸以亭為氏麋采俞豆歐陽以地為氏所居附傅蒙陵陽少室城池塗嵇鮭橋喬勞東關關潁狐邱邱壺邱桑邱龍邱蛇邱陶邱於邱苞邱水邱曹邱楚邱廩邱曼邱咸邱浮邱安邱淄邱稷邱雍邱何邱麥邱北邱獻邱﨑邱羌邱逢邱厚邱一作原羑綺濟巷艾柘燭􅰤闕辟閭申屠申徒東門西門西南門北門陽門桐門夷門闕門木門逢門胥門弋門雍門耐門門東宫西宫南宫北宫東郭西郭南郭北郭東閭西閭屋廬市南社南社北三邱三州延陵於陵平陵梁垣蒲圃東方西方九方東里百里東鄉西鄉南鄉北鄉東野西野南野北野北唐北海成陽濮陽鮮陽鮭陽梗陽洛下瓜田甪祿里綺里夏里樗里桐里空同延州郤州阪上鉛陵以姓為氏氏附姚媯薑歸任風姬嬴姓是子芈姒似隗允偃有偃匽秃姞吉酉胚漆弋侯岡伊祁伊已嫪以字為氏林家忌謀顯旅方賁槐吉施竒為貢衆騫顓孫公父公之公石公索公伯公愼公輸公西公罔公冶公祖公羊公良公齊公山公儀公沙公玉少施夏父子服子家子桑子陽子叔子士子言子楊子孟子我子有子仲子羽張矯嘉胥先利孫丕叔帶叔向叔魚孫彌析石南子南子玉子伯子齊公南公叔公孟公明公文公析遊國駟印良伯有羽罕子師子國子罕子孔子遊子駟子晳子豐子人孔牛樂皇甫靈邊正政祿乙魚事父子革子儀慶賀尚旗子旗子乾子工子泉子襄子雅子尾顏董明子臧子華子州公賔袁轅爰占子獻子占子鞅子芒子尚子禽子輿子寤子沮子宋子夏子枋成包潘乘椒囊叔敖無鈞若敖伯比子庚子季子西子重子期子囊桑逢孫以名為氏大庭大懷鬷戲伏宓有神軒轅軒鴻金青陽青媧盤昊皥少高陽顓玉堯禹啓湯甲沃槐力牧玊音宿三苖夷鼓疇堪頡倉頡僑蟜童僮老廣放上聲奮蓐栗尊盧鬷夷勾龍熙修白冥根水奔水列烈夙訾蚩融勾尊沌渾屯汪稽泠冷倫伶倫臺回敳廉龍容重幕莫和羲殳禺狸纍實達格雄終季連善囂臯敖陸終丹臨參參徵咸飛廉昌豹倉蒼服鞠麴稷篇皮輿朝鼂朝狐昔太季騧季隨閎牙展弓賜兹意如遺述牢犨麗招居曠萬娩盈虢射季嬰季夙樓季弗忌甥大狐大戊嬰夷吾梁其瞫段司豐蘭然子然去疾壽要既常壽慶忌輒兼強梁子郢高柴臼季激刁連法光駱望將具將巨熊能鬻班員建渦冉染枝到鈞倚相辛廖接輿棄疾射入聲拳僚大心楚季無庸季融翠子建子午圍龜越椒嬰齊黑肱巫臣鮮虞羿悅奚衍微微生幾仇求獲季老子蕩蕩鐸遏督目夷祝其耦泥庶其茅夷噲搖由由余余孫陽偃師卿無婁苴離綸鱗渾裨開狼名顚麻柯瑕儋舟攸祁干禽琴萇黔易苫𢎞臼冶茍梓倚尾汝伍禮免蹇散繞肆具闞泄捷賔恩肩吾徐吾鍾吾由吾叔山叔先叔達叔夜叔服方叔陶叔甲鮮申章子師富父仲熊仲顔原仲慶父安國仲長仲行榮叔墨台墨台怡立如邴意舒堅以次為氏親附孟仲仲孫种叔叔孫叔仲季伯丁癸祖舅咎古禰稚次佽孺太叔太伯叔仲中叔仲叔第五第二第八太士主父主南伯南公大季以族為氏因領飢錡條昭繁嗣左景賞索陘黨掌長勺尾勺趙陽魯陽終葵工婁傅餘餘韓餘褐餘梁餘須遂列宗運奄修魚五王小王屈南續祁羌憲會庌樂利幹獻伊秩夷人大姓黨朴釋赫塞宜傍平聲單平聲雕口斂異騶紙緩畿論副沓蔞郃徐盧源茹也以官為氏雲五鳩爽鳩桑扈烏史南史內史青史太史王史侯史祝史左史右史終古監士籍席師帥中英樂