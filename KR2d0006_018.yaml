body:
  text: 通志卷十二宋右迪功郎鄭樵漁仲撰南齊紀第十二髙帝武帝鬱林王海陵王明帝東昏侯和帝太祖髙皇帝諱道成字紹伯小字鬬將姓蕭氏其先本居東海蘭陵縣中都鄉中都里晉元康元年惠帝分東海郡為邵陵故復為蘭陵郡人中朝喪亂皇髙祖淮陰令整字公齊過江居晉陵武進縣之東城里寓居江左者皆僑置本土加以南名更為南蘭陵人也皇曽祖雋字子武位即邱令皇祖樂子字閨子位輔國參軍宋升明中贈太常皇考承之字嗣伯少有大志才力過人仕宋為漢中太守梁州之平以功加龍驤將軍後為南太山太守封晉興縣五等男遷右軍將軍元嘉二十四年殂梁土思之於峩公山立廟祭祀升明二年贈散騎常侍金紫光祿大夫髙帝以宋元嘉四年丁卯歲生姿表英異龍顙鐘聲長七尺五寸鱗文遍體舊宅在武進縣宅南有一桑樹擢本三丈橫生四枝狀似華蓋帝年數歲好戲其下從兄敬宗曰此樹為汝生也儒生雷次宗立學於雞籠山帝年十三就受禮及左氏春秋元嘉十七年宋大將軍彭城王義康被黜徙豫章皇考領兵防守帝受詔南行十九年竟陵蠻動宋文帝遣帝領偏軍討沔北蠻二十三年雍州刺史蕭思話鎮襄陽啓帝自隨初為左軍中兵參軍二十九年領偏軍征仇池破其武興蘭臯二壘遂從谷口入關未至長安八十里梁州刺史劉秀之遣司馬馬汪助帝攻拔談提城魏救兵至帝軍力疲少又聞文帝崩乃燒城還南鄭後襲爵晉興縣五等男為建康令有能名少府蕭惠開雅有知人鑒謂人曰昔魏武為洛陽北部時人服其英今看蕭建康但當過之耳宋明帝即位為右軍將軍時四方叛會稽太守尋陽王子房及在東諸郡皆起兵明帝加帝輔國將軍東討至晉陵一日破賊十二壘分軍定諸縣及徐州刺史薛安都據彭城歸魏遣從子索兒攻淮陰又徴帝討破之索兒走鍾離帝追至黯黮而還除驍騎將軍封西陽縣侯遷巴陵王衛軍司馬隨鎮會稽江州刺史晉安王子勛遣臨川內史張淹自鄱陽嶠道入三吳明帝遣帝討之時朝廷器甲皆充南討帝軍容寡闕乃編棕皮為馬具裝折竹為寄生夜舉火進軍賊望見恐懼未戰而走還除桂陽王征北司馬南東海太守行南徐州事及張永等敗於彭城淮南孤弱以帝為假冠軍將軍持節都督北討前鋒諸軍事鎮淮陰遷南兖州刺史加督五州督北討如故明帝嫌帝非人臣相而人間流言帝當為天子明帝愈以為疑遣冠軍將軍吳喜留軍破釡自持銀壺酒封以賜帝帝戎服出門迎懼鴆不敢飲將出奔喜告以誠先飲之帝即酌飲之喜還明帝意乃悅泰始七年徴還都部下勸勿就徴帝曰主上自誅諸弟為太子幼弱作萬歲後計何關他族惟應速發事緩當見疑今骨肉相害自非靈長之運禍難將興方與卿等戮力耳至拜散騎常侍太子左衛率明帝崩遺詔為右衛將軍領衛尉加兵五百人與尚書令袁粲護軍禇淵領軍劉勔共掌機事尋解衛尉加侍中領石頭戍軍事元徽二年五月江州刺史桂陽王休範舉兵於尋陽朝廷惶駭帝與禇淵等集中書省計議莫有言者帝曰昔上流謀逆皆因淹緩致敗休範必逺懲前失輕兵急下乘我無備請頓新亭以當其鋒因索筆下議餘並注同中書舍人孫千齡與休範有密契獨曰宜依舊遣軍據梁山帝正色曰賊今已近梁山豈可得至新亭既是兵衝所欲以死報國耳乃單車白服出新亭加帝使持節都督征討諸軍事平南將軍加鼓吹一部築新亭城壘未畢賊前軍已至帝方解衣髙卧以安衆心乃索白虎幡登西垣使寧朔將軍髙道慶羽林監陳顯達員外郎王敬則浮舸與賊水戰大破之未時張敬兒斬休範首臺軍及賊衆俱不知其别率杜黑蠡急攻東壘帝挺身上馬帥數百人出戰與黑蠡拒戰自晡達明旦矢石不息其夜大雨鼓呌不復相聞將士積日不得寢食軍中馬夜驚城內亂走帝執燭正坐厲聲呵止之如是者數四賊帥丁文豪設伏破臺軍於皂莢橋直至朱雀航王道隆劉勔並戰沒初勔髙尚其意託造園宅名為東山頗忽時務帝謂曰將軍以顧命之重此是艱難之日而深尚從容廢省羽翼一朝事至悔可追乎勔不納竟敗及賊進至杜姥宅車騎典籖茅恬開東府納賊冠軍將軍沈懷明於石頭奔散張永潰於白下宫內傳新亭亦陷太后執蒼梧王手泣曰天下事敗矣帝遣軍主陳顯達任農夫張敬兒周盤龍等從石頭濟淮間道自承明門入衛宫闕時休範典籖許公與詐稱休範在新亭士庶惶惑詣壘期赴休範投名者千數及至乃是帝隨得輒燒之登城北謂曰劉休範父子先昨皆已死戮尸在南岡下身是蕭平南諸軍善見觀汝等名皆已焚除勿懼也臺分遣衆軍擊平賊帝振旅凱入百姓緣道聚觀曰全國家者此公也帝與袁粲禇淵劉秉皆引咎解職不許遷散騎常侍中領軍都督南兖州刺史鎮軍將軍進爵為公與袁粲禇淵劉秉等各更日入直決事號為四貴四年加尚書左僕射休範平後蒼梧王漸行凶暴屢欲害帝嘗率數十人直入領軍府時暑熱帝晝卧裸袒蒼梧立帝於室內畫腹為射的自引滿將射之帝神色不變斂板曰老臣無罪蒼梧左右王天恩諌曰領軍腹大是佳射堋而一箭便死後無復射不如以雹箭射之乃取雹箭一發即中帝臍蒼梧投弓於地大笑曰此手何如時建平王景素舉兵帝出屯元武湖事平乃還帝威名既重蒼梧深相猜忌刻木為帝形畫腹為射堋自射之又命左右射中者加賞皆莫能中時帝在領軍府蒼梧自來繞之冀帝出因作難帝堅卧不動蒼梧益懷忿恚所見之物呼之為帝加以手自磨鋋曰明日當以刃蕭道成陳太妃罵之曰蕭道成有大功於國今害之誰為汝盡力故止髙帝謀與袁禇廢立下皆見從五年七月戊子楊玉夫等與直閣將軍王敬則通謀弒蒼梧王齎首使左右陳奉伯藏衣袖中依常行法稱敕開承明門出囊貯之以與敬則敬則馳至領軍府叩門大言報帝帝門猶不開敬則自門竇中以首見帝帝猶不信乃於牆上投進其首帝索水洗視敬則乃踰垣入帝跣出敬則呌曰事平矣帝乃戎服乘常所騎赤馬夜入殿中殿中驚怖及知蒼梧死咸稱萬歲至帝踐阼號此馬為龍驤赤明旦召袁粲禇淵劉秉等入會西鍾槐樹下計議帝以事讓劉秉秉未及答帝鬚髯盡張眼光如電次讓袁粲又不答敬則乃拔刀在牀側躍麾衆曰天下之事皆應關蕭公敢有開一言者血染敬則刀仍呼虎賁劒戟羽儀手自取白紗帽加帝首令帝即位曰今日誰敢復動事須及熱帝正色呵之曰卿都不自解粲欲有言敬則又叱之乃止帝乃下議備法駕詣東城迎立順帝於是長刀遮粲劉秉等失色而去甲午帝移鎮東府與袁粲禇淵劉秉等各甲仗五十人入殿丙申加侍中司空録尚書事驃騎大將軍封竟陵郡公給油幢車班劒三十人帝固辭上台即授以驃騎大將軍開府儀同三司十二月荆州刺史沈攸之反稱太后詔已下都乙卯帝入居朝堂命諸將西討平西將軍黃回為都督前驅先是太后兄子前湘州刺史王藴遭母喪罷任還至巴陵停舟與攸之密謀乃下達郢州武帝時為郢州長史藴伺武帝出弔因作亂據郢城武帝知之不出藴還至東府前又期見髙帝帝又不出弔再計不行外謀愈固司徒袁粲尚書令劉秉見帝威權稍盛慮不自安與藴及黃回等相結舉事殿內主衛主帥無不協同及攸之反問初至帝往石頭詣粲謀粲稱疾不相見尅壬申夜起兵據石頭其夜丹陽丞王遜告變秉從弟領軍藴及直閣將軍卜伯興等嚴兵為內應帝命王敬則於宫內誅之遣諸將攻石頭王藴將數百精手帶甲赴粲城門已閉官軍又至乃散衆軍攻石頭斬粲秉走額擔湖藴逃鬬場並禽斬之粲典籖莫嗣祖同粲謀藴嬖人張承伯藏匿藴帝於是並赦而用之時黃回頓新亭聞石頭已下因稱救援帝知而不言撫之愈厚遣回西上流涕告别二年正月沈攸之平二月宋帝進帝太尉都督十六州諸軍事帝表送黃鉞三月己酉增班劒四十人甲仗百人入殿丙子加羽葆鼓吹大明泰始以來相承奢侈百姓成俗及帝輔政奏罷御府省二尚方諸飾玩至是又上表禁人間華偽雜物凡十七條其中宫及諸王服用雖依舊例亦請詳制九月丙午加帝假黃鉞都督中外諸軍事太傅領揚州牧劒履上殿入朝不趨贊拜不名置左右長史司馬從事中郎掾屬各四人固辭詔遣敦勸乃授黃鉞辭殊禮甲寅給三望車三年正月乙丑帝表蠲百姓逋責丙寅加前部羽葆鼓吹丁巳命太傅府依舊辟召丁卯給帝甲仗五百人出入殿省甲午重申前命劒履上殿入朝不趨贊拜不名三月甲辰宋帝詔進帝位相國總百揆以青州之齊郡徐州之梁郡南徐州之蘭陵魯郡琅琊東海晉陵義興揚州之吳郡會稽凡十郡封帝為齊公備九錫之禮加逺遊冠位在諸侯王上加相國緑綟綬甲寅使以備物典禮進策于帝帝三讓公卿敦勸固請乃受之丁巳下令赦國內殊死以下宋帝詔齊公十郡之外隨宜除用以齊國初建給錢五百萬布五千匹絹五千匹以太尉左長史王儉為尚書右僕射領吏部四月癸酉宋帝又詔進齊公為王以徐州之南梁陳潁川陳留南兖州之盱台山陽泰山廣陵海陵南沛增王封為二十郡使司空禇淵奉策授璽綬改立王社餘如故丙戍命齊王冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲罕樂舞八佾設鐘簴宫縣王世子為太子王女王孫爵命一如舊儀辛卯宋帝以厯數在齊乃下詔禪位是日遜於東邸壬辰奉策齊宫並命璽書兼遣太保司空禇淵兼太尉守尚書令王僧虔奉皇帝璽綬受終之禮一依唐虞魏晉故事帝固辭宋朝王公以下陳留王粲等詣門陳請帝猶未許齊世子卿士以下固請兼太史令將作大匠文建陳説符瑞因言漢自建武至建安二十五年一百九十六年而禪魏魏自黃初至咸熙二年四十三年而禪晉晉自泰始至元熙二年一百五十六年而禪宋宋自永初元年至升明三年凡六十年咸以六終六受六亢位也驗昔揆今若此昭著敢以職任備陳管見伏願順天時膺符瑞二朝百辟又固請尚書右僕射王儉奏被宋詔遜位臣等參議宜尅日受禪帝乃許焉建元元年夏四月甲午皇帝即位於南郊柴燎告類升壇受禪禮畢備大駕幸建康宫臨太極前殿大赦改元賜民爵二級文武位二等鰥寡孤獨不能自存者穀人五斛逋租宿責勿收犯鄉論清議贓汚淫盜者一皆蕩滌洗除先注與之更始長徒敕繫者特皆原遣亡官失爵禁錮奪勞一依舊典封宋帝為汝隂王築宫於丹陽故縣行宋正朔車旗服色一如晉宋故事上書不為表答表不稱詔宋諸王皆降為公郡公主為縣君縣公主為鄉君詔降宋南康郡公為縣公華容公為侯萍鄉侯為伯減户有差以奉劉穆之王𢎞何無忌之祀追尊皇考曰宣皇帝皇妣曰孝皇后陵曰永安妃曰昭皇后陵曰泰安詔劫賊餘口沒在臺府者悉原赦諸負釁流徙者皆聽還本土戊戍以荆州刺史嶷為尚書令驃騎大將軍開府儀同三司斷四方上慶禮己亥詔二宫諸王悉不得營立屯邸封略山湖乃停大官池塞稅庚子詔宋帝后藩王諸陵量置守衛五月丙午以河南王吐谷渾拾寅為驃騎大將軍詔宋氏第秩量所廢置有司奏留襄陽郡公張敬兒等六十二人除廣興郡公沈曇亮等一百二十二人改元嘉厯為建元厯社以正月卯臘以十二月未丁未詔曰設募取將縣賞購士蓋出權宜自今可斷衆募乙卯河南國遣使朝貢丙辰詔遣兼散騎常侍十二人巡行四方己未汝陰王殂齊志也追諡為宋順帝辛酉誅陰安公劉燮等六月乙亥詔宋末以來枯骸毁櫬宜下埋藏庚辰備法駕奉七廟主于太廟甲申立齊太子賾為皇太子斷諸州郡禮慶降死罪以下刑并申前赦恩百日立皇子嶷為豫章王映為臨川王晃為長沙王曄為武陵王皓為安成王鏘為鄱陽王鑠為桂陽王鑑為廣興王皇孫長懋為南郡王乙酉葬宋順帝于遂寧陵秋七月丁未曲赦交州部內丁巳詔南蘭陵桑梓本鄉長蠲租布武進王業所基給復十年八月癸巳省陳留國丁巳立皇子鈞為衡陽王九月辛丑詔以二吳義興三郡遭水減今年田租乙巳復置南蠻校尉官丙午加司空禇淵尚書令冬十月丙子立彭城王劉徹為汝陰王奉宋後己未享太廟辛巳汝陰王太妃王氏薨追贈宋恭皇后己丑荆州天井湖出綿人用與常綿不異二年春正月戊戍朔大赦以司空禇淵為司徒以尚書右僕射王儉為左僕射辛丑祀南郊二月丁卯魏軍攻壽陽豫州刺史垣崇祖破走之癸巳遣大使巡慰淮肥徐豫邉人尤貧遘難者三月百濟國遣使朝貢以其王牟都為鎮東大將軍夏四月丙寅進髙麗王樂浪公髙璉號驃騎大將軍五月立六門都牆秋九月甲午朔日有蝕之丙子蠕蠕國遣使朝貢冬十二月戊戍以司空禇淵為司徒壬子以驃騎豫章王嶷為司空三年春正月壬戍朔詔王公卿士薦讜言丙子立皇子鋒為江夏王二月癸丑罷南蠻校尉官夏四月辛亥始制東宫臣僚用下官禮敬聞喜公子良等六月壬子大赦秋七月己未朔日有食之九月辛未蠕蠕國王遣使欲俱攻魏獻師子皮袴褶烏程令吳郡顧昌元坐父法秀宋泰始中北征死亡尸骸不反而昌元宴樂嬉逰與常人無異有司請加以清議丙戍置會稽山隂縣獄丞冬十月戊子以河南王世子吐谷辭度易侯為西秦河二州刺史河南王十二月丁亥髙麗國遣使朝貢命散騎常侍虞炎等十二人巡行諸州郡觀省風俗四年春二月乙未上不豫庚戍詔原都下囚繫有差免元年以前逋責三月庚申召司徒禇淵左僕射王儉受顧託壬戍皇帝崩于臨光殿年五十六羣臣上諡曰髙皇帝廟號太祖梓宫於東府前渚升龍舟四月丙午葬於武進泰安陵於龍舟卒哭內外反吉上少有大量喜怒不形於色深沉靜默常有四海之心博學善屬文工草隸書奕棊第二品雖經綸夷險不廢素業及即位後身不御精細之物主衣中有玉介導以長侈奢之源命打破之凡異物皆令隨例毁棄後宫器物欄檻以銅為飾者皆改用鐵內殿施黃紗帳宫人著紫皮履華蓋除金華瓜用鐵回釘每曰使我臨天下十年當使黃金與土同價欲以身率下移風易俗性寬嘗與直閣將軍周覆給事中禇思莊共棊纍局不倦覆乃抑上手不許易行其𢎞厚如此所著文詔中書侍郎江淹撰次之又詔東觀學士撰史林三十篇魏文帝皇覽之流也始帝年十七時嘗夢乘青龍上天西行逐日帝舊塋在武進彭山岡阜相屬數百里不絶其上常有五色雲又有龍出焉上時已貴矣宋明帝甚惡之遣善占墓者髙靈文往墓所占相靈文先給事太祖還詭答曰不過出方伯耳密白太祖曰貴不可言明帝意猶不已遣人踐藉以左道厭之上後於所樹華表柱忽有龍鳴震響山谷明帝寢疾為身後之慮多翦功臣上亦見疑每云蕭道成有不臣相時鎮淮陰每懷憂懼忽見神人謂上曰無所憂子孫當昌盛泰始三年宋明帝遣前淮南太守孫奉伯往淮陰監元會奉伯舊與帝款是行也帝與奉伯同室卧奉伯夢上乘龍上天於下捉龍腳不得及覺敘夢因謂曰兖州當大庇生靈而弟不得與也奉伯竟卒於宋世又參軍崔靈建夢天謂已蕭道成是我第十九子我去年已使授其天子位考自三皇五帝以降受命之次至帝為十九也及為領軍望氣者陳安寶見上身上恆有紫黃氣安寶謂王洪範曰此人貴不可言所居武進縣有一道相傳云天子路或謂秦皇所遊或云孫氏舊迹時訛言東城天子出其後建安王休仁鎮東府宋明帝懼殺休仁而常閉東府不居明帝又屢幸改代作伐以厭王氣又使子安成王代之及蒼梧王敗安成王代立時咸言為驗術數者推之上舊居武進東城村東城之言其在此也升明二年冬延陵縣季子廟沸井之北忽聞金石聲疑其異鑿深三尺得沸井奔涌若浪其地又響即復鑿之復得一井涌沸亦然井中得一木簡長一尺廣二分上有隱起字曰廬山道人張陵再拜詣闕起居簡大堅白字色又黃瑞應圖云浪井不鑿自成王者清靜則仙人主之會稽剡縣有山名刻石父老相傳云山雖名刻石而不知文字所在升明末縣人兒襲祖行獵忽見石上有文字凡三處苔生其上字不可識乃去苔視之其大石文曰此齊者黃石公之化氣也立石文曰黃天星姓蕭字道成得賢帥天下太平小石文曰刻石者誰會稽南山李斯刻秦望之風也孝經鉤命決曰誰者起視名將將帝小字也河洛讖曰歷年七十水滅緒風雲俱起龍鱗舉又曰肅肅草成道德盡備案宋水德也義熙元年宋武帝王業之始至齊受命七十年又讖曰蕭為二士天下樂案二士主字也郭文舉金雄記曰當復有作肅入草易曰聖人作萬物覩當復有作言聖人作也壬子年歌曰欲知其姓草肅肅穀中最細低頭熟鱗身甲體永興福穀中精細者稻也即道也熟猶成也又歌曰金刀利創齊刈之金刀劉字刈猶翦也孔子河洛讖曰堨河梁塞龍泉消除水災泄山川水即宋也宋氏為災害故曰水災梁亦水也堨河梁則行路成矣路猶道也消除水災除宋水氏之災害也河圖讖又曰上參南斗第一星下立草屋為紫庭神龍之岡梧桐生鳯鳥戢翼朔旦鳴南斗吳分野草屋者居上蕭字象也先是益州有山古老相傳曰齊后山升明三年四月二十三日有沙門元暢者於此山立精舍其日上登尊位其月二十四日滎陽郡人尹千於嵩山東南見天雨石墜地石開有玉璽在其中璽方三寸文曰戊午之人與道俱肅然入草應天符掃平河洛清魏都又曰皇帝運興千奉璽詣雍州刺史蕭赤斧赤斧以獻案宋武帝於嵩髙山得玉璧三十二枚神人云此是宋卜世之數三十二者二三十也宋自受命至禪齊凡六十年然則帝之符應也若是今備之云髙帝建元四年世祖武皇帝諱賾字宣逺髙帝長子也以宋元嘉二十七年六月己未生於建康縣之青溪宫將産之夕孝皇后昭皇后並夢龍據屋故小字上為龍兒年十三夢人以筆畫身左右為兩翅又著孔雀羽衣裳空中飛舉體生毛髮長至足有人指上所踐地曰周文王之田又於所住堂內得璽一枚文曰皇帝行璽又得異錢文為北斗星雙刀雙貝及有人形帶劒焉仕宋為贛令江州刺史晉安王子勛反上不從命南康相沈肅之縶上郡獄族人蕭欣祖門客桓康等破郡迎出上上遂率部曲百餘人起義避難揭陽山有白雀來集聞山中有清聲傳漏響又於山纍石為佛圖其側忽生一樹狀若花蓋青翠扶疏有殊羣木上將討戴凱之大饗士卒是日大熱上各令折荆枝自蔽言未終而有雲垂蔭正當會所會罷乃散及為廣興相嶺南積旱連水阻涸商旅不通上部伍既至無雨而川流暴起遂得利涉元徽四年纍遷晉熙王鎮西長史江夏內史行郢州事順帝立徴晉熙王燮為撫軍揚州刺史以上為左衛將軍輔燮俱下沈攸之事起未得朝廷處分上以中流可以待敵即據盆城口為戰守備髙帝聞之曰此真我子也於盆城掘塹得一大錢文曰太平百歲于時城內乏水欲引水入城始鑿城內遇伏泉涌出如此者九處用之不竭上表求西討不許乃遣偏軍援郢平西將軍黃回等皆受上節度升明二年事平遷江州刺史聞喜縣侯其年徴拜侍中領軍將軍尋加督京畿諸軍事三年又加尚書僕射中軍大將軍開府儀同三司進爵為公給班劒二十人齊國建為齊公世子改加侍中南豫州刺史給油絡車羽葆鼓吹增班劒為三十人以石頭為世子宫官置二率以下坊省服章一如東宫進為王太子髙帝即位為皇太子建元四年三月壬戍髙帝崩是日皇太子即皇帝位大赦征鎮州郡令長軍屯營部各行喪三日不得擅離任都邑城中防備幢隊一不得還乙丑稱先帝遺詔以司徒禇淵録尚書事尚書左僕射王儉為尚書令車騎將軍張敬兒開府儀同三司詔曰喪禮雖有定制先旨每從簡約內官可三日一選臨外軍間日一選臨後有大喪皆如之丁卯以前將軍王奐為尚書左僕射庚午以司空豫章王嶷為太尉癸酉詔免逋城錢自今以後申明舊制初晉宋舊制受官二十日輒送修城錢二千宋泰始初軍役大起受官者萬計兵戎機急事有未遑自是令僕已下並不輸送二十年中大限不可勝計文符督切擾亂在所至是除蕩百姓悅焉夏四月辛卯追尊穆妃為皇后五月庚申以髙皇帝配南郊髙昭皇后配北郊六月甲申朔立河南王長懋為皇太子詔申壬戍赦恩百日丙申立皇太子妃王氏進爵聞喜公子良為竟陵王臨汝公子卿為廬陵王應城公子慶為安陸王江陵公子懋為晉安王枝江公子隆為隨王皇子子真為建安王皇孫昭業為河南郡王戊戍以水潦為患星緯乖序尅日訊都下囚諸逺縣委刺史以時察判建康秣陵二縣貧人加振賜必令周悉吳興義興遭水縣蠲除租調以司徒禇淵為司空秋八月癸卯司空禇淵薨九月丁巳以國哀故罷國子學辛未以征南將軍王僧虔為左光祿大夫開府儀同三司冬十月乙未以中書令王延之為尚書左僕射十二月己丑詔曰緣淮戍將久處邊勞三元行始宜霑恩慶可遣中書舍人宣旨臨會後每歲如之永明元年春正月辛亥祀南郊大赦改元壬子詔內外羣僚各進讜言王公卿士各舉所知又詔守宰祿奉蓋有恆凖往以邊虜告警故沿時損益今區宇寧晏宜加優奬郡縣丞尉可還本秩壬戍立皇弟鋭為南平王鏗為宜都王皇子子明為武昌王子罕為南海王望氣者云新林婁湖東府西有天子氣甲子築青溪舊宫作新婁湖苑以厭之二月庚寅以征虜將軍楊炅為沙州刺史封陰平王三月庚辰詔以星緯失序陰陽愆度申辛亥赦恩五十日以期訖為始戊寅詔四方見囚罪無輕重及劫賊餘口長徒收繫悉皆原赦夏五月丁酉車騎將軍張敬兒有罪伏誅秋八月壬申魏人來聘冬十月丙寅使驃騎將軍劉纘聘于魏十一月己卯雷十二月乙巳朔日有蝕之二年春正月乙亥以護軍將軍栁世隆為尚書右僕射以南兖州刺史竟陵王子良為護軍將軍兼司徒壬寅以新除尚書右僕射栁世隆為左僕射以丹陽尹李安人為右僕射秋七月甲申立皇子子倫為巴陵王八月丙午幸舊宫申都下獄及三署見徒量所降宥戊申幸元武湖講武壬子扶南國遣使朝貢并獻頌章云甲子詔都下二縣墳墓毁發隨宜掩埋遺骸未櫬者並加斂瘞疾困不能存者詳加霑賚冬十二月庚申魏人來聘三年春正月辛卯祀南郊赦三百里內罪應入重者降一等餘依赦制三月甲寅使輔國將軍劉纘聘于魏夏五月省總明觀秋七月甲戍左光祿大夫開府儀同三司王僧虔薨辛卯於益州置平蠻校尉官八月乙未幸中堂聽訟乙巳以行宕昌王梁彌頡為河涼二州刺史封隴西公宕昌王冬十月丙辰魏人來聘十二月以江州刺史王奐為尚書右僕射改封武昌王子明為西陽王四年春閠正月癸巳立皇子子貞為邵陵王丁未以武都王楊集始為北秦州刺史辛亥耕籍田詔宥殊死已下甲寅幸閲武堂勞酒小會賜王公以下在位者帛有差戊午幸宣武堂講武二月丙寅大風吳郡偏甚樹葉皆赤己未立皇弟銶為晉熙王鉉為河東王壬午使通直郎裴昭明聘于魏五年春正月戊子以太尉豫章王嶷為大司馬車騎將軍竟陵王子良為司徒驃騎將軍臨川王映衛將軍王儉中軍將軍王敬則並以本號開府儀同三司以尚書右僕射王奐為尚書左僕射辛卯賜孤寡老疾各有差夏四月庚午殷祀太廟降諸囚徒先是立商飈館於孫陵岡世呼為九日臺秋九月辛卯車駕幸焉冬十月初起新林苑六年春三月甲申詔皇太子於東宫元圃園宣猷堂臨訊及三署徒隸己亥封皇子響為巴東王夏五月庚辰左衛殿中將軍邯鄲超表陳射雉書奏賜死又潁川荀丕亦以諌諍託他事及誅六月辛未詔省州郡縣送故輸錢者秋七月齊興太守劉元寶於郡城塹得錢三十七萬皆輪厚徑一寸半以獻上以為瑞班賜公卿九月壬寅於琅邪城講武習水步軍冬十月庚申立冬初臨太極殿讀時令十一月丙戍土霧竟天如煙入人眼鼻二日乃止七年春正月丙午以鎮南將軍栁世隆為尚書左僕射以豫州刺史西昌侯鸞為右僕射辛亥祀南郊大赦申明不舉子之科若有産子者復其父壬戍驃騎將軍開府儀同三司臨川王映薨戊辰詔以諸大夫年秩隆重增俸給見役三月甲寅立皇子子嶽為臨賀王子峻為廣漢王子琳為宣城王子珉為義安王夏五月乙巳尚書令衛將軍開府儀同三司王儉薨甲子以新除尚書左僕射栁世隆為尚書令秋九月壬寅魏人來聘冬十一月戊申詔平南參軍顔幼明聘于魏八年春正月庚子以領軍王奐為尚書左僕射丁巳以行百濟王泰為鎮東大將軍百濟王二月辛卯零陵王司馬藥師薨夏四月戊辰朔詔公卿以下各舉所知六月己巳魏人來聘庚午長沙王晃薨丙申大雷雨有黃光竟天照地狀如金乙酉都下大風發屋秋七月癸卯詔以陰陽舛和緯象愆度儲允嬰患淹歷旬晷可大赦八月壬辰荆州刺史巴東王子響反遣丹陽太守蕭順之討之子響伏誅乙酉以河南王世子休留代為西秦河二州刺史封河南王冬十一月戊寅詔量增尚書丞郎賜祿己卯改封宣城王子琳為南康王立皇子子建為湘東王九年春正月甲午省平蠻府辛丑祀南郊降都下見囚戊午詔射聲校尉裴昭明聘于魏二月癸巳明堂災夏五月丙申林邑國獻金簟丁未魏人來聘安成王皓薨己未樂遊正陽堂災秋八月己亥使司徒參軍蕭琛聘于魏吳興義興大水乙卯蠲二郡租九月戊辰幸琅邪城講武觀者傾都普頒酒肉冬十月甲寅魏人來聘十年春正月戊午以司徒廣陵王子良領尚書令以尚書右僕射西昌侯鸞為左僕射詔增內外有務衆官祿奉丙戍詔故太宰禇淵故太尉王儉故司空栁世隆驃騎大將軍王敬則鎮軍大將軍陳顯達故鎮東將軍李安人配饗太祖廟庭二月乙巳使司徒參軍蕭琛聘于魏十一年春正月戊午以驃騎大將軍豫州刺史王敬則為司空乙亥皇太子長懋薨二月雍州刺史王奐有罪伏誅三月丙寅以金紫光祿大夫王晏為尚書右僕射夏四月癸未魏人來聘甲午立皇孫昭業為皇太孫賜天下為父後者爵一級五月戊辰以旱故都下二縣朱方姑熟權斷酒秋七月丁巳曲赦南兖兖豫司徐五州南豫州之歷陽譙臨江廬江四郡三調衆逋宿責並同原除其緣淮及青冀新附僑人復除已訖更申五年先是魏地謡言赤火南流喪南國至是有沙門從北齎此火而至色赤於常火而微云以療疾貴賤爭取之多得其驗二十餘日都下大盛咸云聖火詔禁之不止火炙至七炷而疾愈吳興邱國賔密以還鄉邑人楊道慶虛疾二十年依法炙即差是月上不豫徙御延昌殿始登階而殿屋鳴吒上惡之魏軍將至上慮朝野憂惶力疾召樂府奏正聲伎戊寅大漸詔曰始終大期聖賢不免吾行年六十亦復何恨但皇業艱難萬機事重不能無遺慮耳太孫進德日茂社稷有寄子良善相毗輔思𢎞正道內外衆事無大小悉與鸞參懷尚書是職務根本悉委王晏徐孝嗣軍旅捍邊之略委王敬則陳顯達王廣之王元邈沈文季張瓌薛深等百辟庶僚各奉爾職謹事太孫勿有懈怠又詔具身後服御陵廟等事悉有條理是日上崩于延昌殿年五十四羣臣上諡曰武皇帝廟號世祖九月丙寅葬景安陵上剛毅有斷政事總大體以富國為先頗喜遊宴雕綺之事言常恨之未能頓遣臨崩又詔凡諸遊費宜從休息自今逺近薦獻務存節儉不得出界營求相髙奢麗金粟繒纊敝人已甚珠玉玩好傷俗尤重嚴加禁絶武帝永明十一年廢帝鬱林王諱昭業字元尚小字法身文惠太子長子也髙帝為相王鎮東府時年五歲牀前戲髙帝方令左右拔白髮問之曰兒言我誰邪答曰太翁髙帝笑謂左右曰豈有為人作曽祖而拔白髮者乎即擲鏡鑷其後問訊髙帝指示賔客曰由我基於此四世矣及武帝即位封為南郡王時年十歲永明五年十一月戊子冠於東宫崇正殿其日卜會賜王公已下帛各有差給南郡王扶二人十年有司奏給班劒二十人鼓吹一部髙選文學禮絶羣王十一年給皂輪三望車文惠太子薨立南郡王為皇太孫居東宫其年七月戊寅武帝崩皇太孫即帝位大赦八月壬午詔稱遺詔以護軍將軍武陵王曄為衛將軍征南大將軍陳顯達即本號並開府儀同三司以尚書左僕射西昌侯鸞為尚書令右僕射王晏為左僕射吏部尚書徐孝嗣為右僕射癸未加司徒竟陵王子良位太傅增班劒三十人蠲除三調及衆逋在今年七月三十日以前者省御府及無用池田邸舍減關市征稅先是每有蠲原之詔多無事實督責如故是時西昌侯鸞任知朝政天下咸望風來蘇至此恩信兩行海內莫不欣然九月辛酉追尊文惠皇太子為世宗文皇帝冬十月壬寅尊皇太孫太妃為皇太后立皇后何氏十一月庚戍魏人來聘辛亥立臨汝公昭文為新安王曲江公昭秀為臨海王皇弟昭粲為永嘉王隆昌元年春正月丁未大赦改元加太傅竟陵王子良殊禮鎮軍將軍西昌侯鸞即本號為大將軍給鼓吹一部親兵五百人以領軍鄱陽王鏘為尚書右僕射詔百僚極陳得失又詔王公已下各舉所知辛亥祀南郊宥隆昌元年以來流人戊午拜崇安陵甲戍使司徒參軍劉斆聘于魏二月辛卯祀明堂夏四月辛巳衛將軍開府儀同三司武陵王曄薨戊子太傅竟陵王子良薨丁酉以驃騎將軍廬陵王子卿為衛將軍尚書右僕射鄱陽王鏘為驃騎將軍並開府儀同三司閠月丁卯以鎮軍大將軍西昌侯鸞即本號開府儀同三司五月甲戍朔日有蝕之秋七月癸巳皇太后令廢帝為鬱林王帝少美容止好隸書武帝特所鍾愛敕皇孫手書不得妄出以貴之進對音吐甚有令譽生而為竟陵文宣王所攝養常在袁妃間竟陵王移住西州帝亦隨往焉性甚辨慧哀樂過人接對賔客皆欵曲周至矯情飾詐隂懷鄙慝與左右無賴羣小二十許人共衣食同卧起妃何氏擇其中美貌者皆與交歡密就富市人求錢無敢不與及竟陵王移西邸帝獨住西州每夜輒開後堂閣與諸不逞小人至諸營署中淫宴凡諸小人並逆加爵位皆疏官名號於黃紙使各囊盛以帶之許南面之日即便施行又别作籥鉤兼善效人書每私出還輒扄籥封題如故故人無知者師史仁祖侍書明天翼聞之相與謀曰若言之二宫則其事未易若於營署為異人所驅打及犬物所傷豈直罪止一身亦當盡室及禍年各已七十餘生寧足吝邪數日中二人相繫自殺二宫不知也武帝以既陽縣寒人給事中綦母珍之代仁祖剡縣寒人馬澄代天翼文惠太子每禁其起居節其用度帝謂豫章王妃庾氏曰阿婆佛法言有福生帝王家今見作天王便是大罪左右主帥動見拘縶不如市邊屠酤富兒百倍文惠太子自疾及薨帝侍疾及居喪哀容號毁旁人見者莫不嗚咽裁還私室即歡笑酣飲備食甘滋葬畢立為皇太孫問訊太妃截壁為閣於太妃房內往何氏間每入輒彌時不出武帝往東宫帝迎拜號慟絶而復蘇武帝自下輿抱持之寵愛日隆又在西州令女巫楊氏禱祀速求天位及文惠薨謂由楊氏之力倍加敬信呼楊婆宋氏以來人間有楊婆兒歌蓋此徴也武帝有疾又令楊氏日夜禱祈令宫車早晏駕時何妃在西州武帝未崩數日疾稍危與何氏書紙中央作一大喜字而作三十六小喜字繞之侍武帝疾憂容慘戚言發淚下武帝每言及存亡帝輒哽咽不自勝武帝以此謂為必能負荷大業謂曰五年中一委宰相汝勿厝意五年以後勿復委人若自作無成無所多恨臨崩執帝手曰阿奴若憶翁當好作如此者再而崩大斂始畢乃悉呼武帝諸伎備奏衆樂諸伎雖畏威從事莫不哽咽流涕素好狗馬即位未逾旬便毁武帝所起招婉殿以材賜閹人徐龍駒於其處為馬埒馳騎墜馬面額並傷稱疾不出者數日多聚名鷹快犬以粱肉奉之及武帝梓宫下渚帝於端門內奉辭輼輬車未出端門便稱疾還內裁入閣即於內奏胡伎鞞鐸之聲震響內外時司空王敬則問新除射聲校尉蕭坦之曰便如此不當匆匆邪坦之曰此政是內人哭響徹耳自山陵之後便於閣內乘內人車問訊往皇后所生母宋氏間因微服遊走市里又多往文帝崇安陵隧中與羣小共作諸鄙褻擲塗賭跳放鷹走狗雜狡獪帝既失道朝事大小皆決之西昌侯鸞鸞有諌多不見從極意賞賜左右動至百數十萬每見錢曰我昔思汝一箇不得今日得用汝未武帝聚錢上庫五億萬齋庫亦出三億萬金銀布帛不可稱計即位未期歲所用已過半皆賜與諸不逞羣小諸寶器以相擊剖破碎之以為笑樂及至廢黜府庫悉空其在內常裸袒著紅紫錦繡新衣錦帽紅縠褌雜采袒服好鬬雞密買雞至數千價毁武帝御物甘草杖宫人寸斷用之徐龍駒為後宫舍人日夜在六宫房內帝與文帝幸姬霍氏淫通改姓徐氏龍駒勸長留宫內聲云度霍氏為尼以餘人代之皇后亦淫亂齋閣通夜洞開內外淆雜無復分别中書舍人綦母珍之朱隆之直閣將軍曹道剛周奉叔並為之羽翼西昌侯鸞屢諌不納既而尼媪外入頗傳異語乃疑鸞有異志中書令何允以皇后從叔見親使直殿省常隨后呼允為三父與允謀誅鸞令允受事允不敢當依違杜諌乃止又謀出鸞於西州中敕用事不復關咨鸞慮變先使蕭諶坦之等於省誅曹道剛朱隆之等率兵自尚書省入雲龍門戎服加朱衣於上比入門三失履王晏徐孝嗣蕭坦之陳顯達王廣之沈文季係進帝在壽昌殿裸身與霍氏相對聞外有變使閉內殿諸房閣令閹人登興光樓望還報云見一人戎服從數百人急裝在西鐘樓下須臾蕭諶領兵先入宫帝走向愛姬徐氏房拔劒自刺不入以帛纒頸輿接出延德殿諶初入殿宿衛將士皆衛執弓楯欲戰諶曰所取自有人卿等不須動宿衛信之及帝出各欲自奮帝竟無一言出西弄遇弒年二十二舁尸出徐龍駒宅殯葬以王禮霍氏及廣昌君宋並賜死餘黨亦見誅先是文惠太子立樓館於鍾山下號曰東田太子屢遊幸之東田反語為顛童也武帝又於青溪立宫號曰舊宫反語云窮廄也果以輕狷而至於窮又武帝時有小史姓皇名太子武帝曰皇太子非名之謂於是移點於外易名為犬子處士何點曰太子者天地之所縣三才之所繫今化而為犬不得立矣既而文惠太子薨鬱林海陵相繼廢黜此其驗也永明中百姓忽著破後帽始自建業流於四逺貴賤翕然服之此服祅也帽自蕭諶之家其流遂逺天意若曰武穆文顯皆當絶而諶亦誅死之效焉鬱林王隆昌元年廢帝海陵恭王諱昭文字季尚文惠太子第二子也永明四年封臨汝公鬱林王即位改封新汝王及鬱林廢西昌侯鸞奉帝纂統延興元年秋七月丁酉皇帝即位大赦改元賜文武位一等以鎮軍大將軍西昌侯鸞為驃騎大將軍開府儀同三司録尚書事都督揚州刺史加班劒三十人封宣城郡公出鎮東城以尚書左僕射王晏為尚書令以丹陽尹徐孝嗣為左僕射以衛軍將軍沈文季為右僕射以車騎大將軍陳顯達為司空以驃騎大將軍鄱陽王鏘為司徒命宣城公鸞甲仗百人入殿陳顯達王晏徐孝嗣蕭諶各三十人入殿八月壬辰魏人來聘甲午以前司空王敬則為太尉辛丑復置南蠻校尉官甲辰詔使者觀省風俗九月癸未誅新除司徒鄱陽王鏘中軍大將軍隨王子隆遣平西將軍王廣之誅南兖州刺史安陸王子敬於是江州刺史晉安王子懋起兵遣中護軍王元邈討誅之乙酉又誅湘州刺史南平王鋭郢州刺史晉熙王銶南豫州刺史宜都王鏗丁亥以衛將軍廬陵王子卿為司徒以撫軍將軍桂陽王鑠為中軍將軍開府儀同三司冬十月丁酉加宣城公鸞黃鉞進授都督中外諸軍事太傅領大將軍揚州刺史加殊禮進爵為王戊戍誅新除中軍將軍桂陽王鑠撫軍將軍衡陽王鈞侍中祕書監江夏王鋒鎮軍將軍建安王子真左將軍巴陵王子倫是時宣城王子鸞輔政帝起居皆咨而後行思食蒸魚菜大官令答無録公命竟不與辛亥皇太后令廢帝為海陵王使宣城王入纂皇統建武元年詔海陵王依漢東海王強故事給虎賁旄頭畫輪車設鍾簴宫縣十一月稱王有疾數遣御師往視乃殞之給溫明祕器斂以衮冕之服大鴻臚監護喪事葬給輼輬車九旒大輅黃屋左纛前後部羽葆鼓吹挽歌二部依東海王強故事諡曰恭先是武帝立禪靈寺於都下當世以為壯觀天意若曰禪者禪也靈者神明之自言武帝晏駕而鼎業傾移也永明世市里小兒以鐵相擊於地曰鬬鑿鑿之為言族也至是宗室族滅矣又武帝時以燕支為朱衣朝士皆服之及明帝以宗子入纂此又奪朱之效也時又多以生紗為帽半其裙而折之號曰倚勸先是人間語好云擾攘至是朝士勸進實為匆遽倚勸擾攘之言於是驗矣海陵王延興元年髙宗明皇帝諱鸞字景栖始安貞王道生之子也小字元度少孤髙帝撫育過諸子宋泰豫元年為安吉令有嚴能之名升明中纍遷淮南宣城二郡太守進號輔國將軍髙帝踐阼封西昌侯位郢州刺史永明元年為侍中領驍騎將軍轉散騎常侍左衛將軍十年纍遷尚書左僕射領右衛將軍武帝遺詔為侍中尚書令尋加鎮軍將軍給班劒二十人隆昌元年即本號為大將軍給鼓吹一部親兵五百人尋加中書監開府儀同三司海陵王立為驃騎大將軍録尚書事揚州刺史加都督增班劒為三十人封宣城郡公鎮東府城給兵五千人錢二百萬布千匹九江事難假黃鉞事寧表送之尋加黃鉞都督中外諸軍事太傅領大將軍揚州牧增班劒為四十人給幢絡三望車前後部羽葆鼓吹劒履上殿入朝不趨贊拜不名置左右長史司馬從事中郎掾屬各四人封宣城王未拜太后令廢海陵王以王入纂髙帝為第三子羣臣三請乃受命建武元年冬十月癸亥皇帝即位大赦改元文武賜位二等以太尉王敬則為大司馬以司空陳顯達為太尉乙丑詔斷逺近上禮丁卯詔自今雕文篆刻歲時光新可悉停省藩牧守宰或有薦獻嚴加禁止十一月壬申日有蝕之帝宿沐浴不御內其日潔齋蔬食斷朝務屏人單衣帢危坐以至事畢追尊始安貞王為景皇妃江氏為懿后别立寢廟號曰修安封桂陽王鑠等諸王子皆為列侯凡諸王侯得罪者諸子皆復屬籍又詔遣大使觀省四方癸酉革永明之制依晉宋舊典太子以師禮敬少傅甲戍進大司馬尋陽公王敬則等十三人爵邑各有差省新林苑先是百姓地者悉以還主廢南蠻校尉官己卯追崇妃劉氏為敬皇后號陵曰興安庚辰立皇子寶義為晉安王寶玄為江夏王寶源為廬陵王寶夤為建安王寶融為隨郡王寶攸為南平王甲申斷官長貢獻及私餉遺以安陸昭王緬第二子寶晊襲封安陸王丁亥詔細作中署材官車府凡諸工可悉開番假遞令休息戊子立皇子寶卷為皇太子賜天下為父後者爵一級己丑詔東宫肇建逺近或有慶禮可悉斷之永明中御史中丞沈深表百官年登七十者皆令致仕並窮困私門庚子詔自搢紳年及可一遵永明七年以前銓敘之科十二月庚戍宣德太僕劉朗之遊擊將軍劉璩之子坐不贍給兄子致使隨母他嫁免官禁錮終身付之鄉論是歲魏孝文帝遷都洛陽二年春正月辛未降都下繫囚殊死以下詔王公以下各舉所知內外羣僚各進忠言無有所諱魏攻豫司徐梁四州壬申遣鎮軍王廣之督司州右衛將軍蕭坦之督徐州尚書右僕射沈文季督豫州以拒魏己卯詔都下二縣有毁發墳壠隨宜修理乙未魏軍攻鍾離徐州刺史蕭惠休破之丙申加太尉陳顯達使持節都督西北道諸軍事丁酉內外纂嚴三月己未司州刺史蕭誕與衆軍攻敗魏軍詔雍豫司南兖徐五州遭遇兵戎之家悉停今年租調丙寅停青州麥租魏軍自壽春退甲申解嚴夏四月己亥朔親録三百里內獄訟自外委州郡訊察三署徒隸原遣有差魏軍圍漢中梁州刺史蕭懿拒退之五月甲午寢廟成詔監作長帥賜位一等六月壬戍誅領軍蕭諶西陽王子明南海王子罕邵陵王子貞秋九月己丑改封南平王寶攸為邵陵王蜀郡王子文為西陽王廣漢王子峻為衡陽王臨海王昭秀為巴陵王永嘉王昭粲為桂陽王冬十月癸卯詔罷東田毁光興樓并詔水衡量省御乘乙卯納皇太子妃褚氐大赦王公以下班賜各有差斷四方上禮十二月丁酉詔晉帝諸陵悉加修理并增守衛吳晉陵失稔之鄉蠲三調有差三年春正月丁酉以陰平王楊炅子崇祖為沙州刺史封陰平王二月己巳詔申明守長六周之制事竟不行己酉詔以去歲魏攻緣邊諸州郡將士有臨陳及病死者並送還本土三月壬午詔車府乘輿有金銀飾者皆别除之夏四月魏軍攻司州櫟城戍主魏僧明擊破之冬閠十二月戊寅皇太子冠賜王公以下帛各有差為父後者賜爵一級斷逺近上禮四年春正月庚午大赦庚辰詔人産子者蠲其父母調役一年又賜米十斛新婚者蠲夫役一年壬辰誅尚書令王晏二月以尚書左僕射徐孝嗣為尚書令秋八月甲午追尊景皇所生王氏為恭太后魏軍攻沔北冬十月又逼司雍二州遣太子中庶子蕭衍右軍司馬張稷禦之十一月丙辰以氐楊靈珍為北秦州刺史封仇池公武都王十二月丁丑遣度支尚書崔慧景率衆救雍州永泰元年春正月癸未朔大赦中軍大將軍徐孝嗣即本號開府儀同三司沔北諸郡為魏所攻相繼亡敗新野太守劉忌隨宜應接食盡煮土為粥而救兵不至城被尅死之乙巳遣太尉陳顯達持節救雍州丁未誅河東王鉉臨賀王子嶽西陽王子文衡陽王子峻南康王子琳永陽王子珉湘東王子建南郡王子夏巴陵王昭秀桂陽王昭粲二月癸丑遣左衛將軍蕭惠休假節援壽陽辛未豫州刺史裴叔業敗魏軍於淮北三月丙午蠲雍州遇魏軍之縣租布戊申詔增仲尼祭秩上以疾患不瘳望氣者云宜改元夏四月甲寅大赦改元文武賜位二等己未立武陵昭王子子坦為衡陽王丁丑大司馬會稽太守王敬則舉兵反五月壬午遣輔國將軍劉山陽率軍東討乙酉斬敬則傳首建鄴曲赦浙東吳晉陵等七郡秋七月己酉帝崩于正福殿年四十七遺詔徐孝嗣可重申前命中書監本官悉如故沈文季可尚書左僕射常侍護軍如故江祏可右僕射江祀可侍中劉暄可衛尉卿軍政大事委陳太尉內外衆事無大小委徐孝嗣遙光坦之江祏其大事與沈文季江祀劉暄參懷心腹之任可委劉悛蕭惠休崔慧景羣臣上諡曰明皇帝廟號髙宗葬興安陵帝明審有吏才持法無所借制御親幸臣下肅清驅使寒人不得用四幅繖大存儉約罷武帝所起新林苑以地還百姓廢文惠太子所起東田斥賣之永明中輿輦舟乘悉剔取金銀還主衣庫以牙角代之嘗用皂莢訖授餘濼與左右曰此猶堪明日用大官進御食有裹蒸帝十字畫之曰可四片破之餘充晚食而武帝掖庭中宫殿服御一無所改其儉約如此性猜忌亟行誅戮信道術用計數每出行幸先占利害簡於出入將南則詭言之西將東則詭言之北皆不以實竟不南郊初有疾無輟聽覽羣臣莫知及疾篤敕臺省府署文簿求白魚以為藥外始知之身衣綘衣服飾皆赤以為厭勝巫覡云後湖水頭經過宫內致帝有疾帝乃自至大官行水溝左右啓大官無此水則不立決意塞之欲南引淮流會崩事寢明帝建武四年永泰元年即位五年廢帝東昏侯諱寶卷字智藏明帝第二子也本名明賢明帝輔政後改焉建武元年立為皇太子永泰元年七月己酉明帝崩太子即皇帝位八月庚申鎮北將軍晉安王寶義進號征北大將軍開府儀同三司冬十月己未詔刪省律科癸亥詔蕭坦之江祏更直殿省總監宿衛辛未詔劉暄江祏更直延明殿省十一月戊子立皇后褚氏庚寅尚書令徐孝嗣議王侯貴人昏連卺以真銀杯事出近俗又牢燭侈繢亦虧曩制今除金銀連鎖自餘新器悉用埏陶牢燭華侈亦宜停之奏可永元元年春正月戊寅朔大赦改元辛卯祀南郊丁酉改封隨王寶融為南康王安陸王寶晊為湘東王竟陵王昭胄為巴陵王二月太尉陳顯達敗績於馬圈夏四月丙午朔魏孝文帝崩己巳立皇子誦為皇太子大赦賜為父後者爵一級五月癸亥加撫軍大將軍始安王遙光開府儀同三司六月甲子詔原雍州今年三調秋七月辛未淮水變赤如血丙戍殺尚書右僕射江祏侍中江祀地震自此至來歲晝夜不止小屋多壞丁亥都下大水死者甚衆賜死者材器並加振恤八月乙巳蠲遇水資財漂蕩者今年租調又詔為馬圈戰亡將士舉哀丙辰揚州刺史始安王遙光據東府反詔曲赦都下中外戒嚴遣領軍將軍蕭坦之致討戊午斬遙光傳首己巳以尚書令徐孝嗣為司空以領軍蕭坦之為尚書左僕射閠月丙子以江陵公寶覽為始安王九月甲辰殺尚書左僕射蕭坦之右衛將軍曹武戊午殺領軍將軍劉暄壬戍以頻殺大臣大赦冬十月乙未誅尚書令新除司空徐孝嗣右僕射新除鎮軍將軍沈文季庚子以吳興太守蕭惠休為尚書右僕射辛丑以侍中王亮為左僕射十一月丙辰太尉江州刺史陳顯達舉兵反於尋陽乙丑加護軍將軍崔慧景平南將軍督衆軍南討十二月甲申陳顯達至都宫城嚴警乙酉斬顯達傳其首餘黨悉平二年春正月庚午詔討豫州刺史裴叔業二月己丑叔業病死兄子植以壽春降魏三月乙卯命平西將軍崔慧景攻壽春夏四月丙午尚書右僕射蕭惠休卒丁未崔慧景於廣陵反舉兵內向壬子命右衛將軍左興盛督都下水步衆軍禦之南徐州刺史江夏王寶元以京城納慧景乙卯遣中領軍王瑩率衆軍屯北籬門壬戍慧景至瑩等敗績甲子慧景入建鄴臺城內閉門拒守豫州刺史蕭懿興兵入援己巳以懿為尚書右僕射癸酉慧景棄衆走斬之詔曲赦都下及南徐南兖二州乙亥以新除尚書右僕射蕭懿為尚書令丙子以中領軍王瑩為尚書右僕射五月己酉江夏王寶元伏誅壬子赦己丑曲赦都下及徐兖二州六月庚寅車駕於樂遊苑內會如三元都下放女人觀秋七月甲申夜宫內火唯東閣內明帝舊殿數區及太極以南得存餘皆蕩盡冬十月己亥殺尚書令蕭懿十一月甲寅西中郎長史蕭頴胄起兵於荆州十二月雍州刺史蕭衍起兵於襄陽是歲魏宣武帝景明元年三年春正月丙申朔日有蝕之帝與宫人於閲武堂元會皇后正位閹人行儀帝戎服臨視丁酉以驃騎大將軍晉安王寶義為司徒以新除撫軍將軍建安王寶夤為車騎將軍開府儀同三司乙巳長星見竟天辛亥祀南郊大赦詔百官陳讜言二月丙寅乾和殿西廂火壬午詔遣羽林兵征雍州中外纂嚴始內橫吹五部於殿內晝夜奏之壬戍蚩尤旗見三月乙巳南康王寶融即皇帝位於江陵癸丑遣平西將軍陳伯之西征六月蕭潁胄弟潁孚起兵廬陵戊子赦江州安成廬陵二郡秋七月癸巳曲赦荆雍二州雍州刺史張欣泰前南譙太守王靈秀率石頭文武奉建安王寶夤向臺至杜姥宅門閉乃散走丙辰龍鬬於建康淮激水五里八月辛卯以太子左率李居士總督西討諸軍事屯新亭九月甲辰蕭衍至南豫州輔國將軍監南豫州事甲胄軍二萬人於姑熟奔歸丙辰李居士與衍軍戰於新亭見敗冬十月甲戍王珍國又戰敗於朱雀航戊寅寧朔將軍徐元瑜以東府城降青冀二州刺史桓和入衛屯東宫尋亦降衍於是閉宫城門自守十二月丙寅新除雍州刺史王珍國侍中張稷率兵入殿弒帝時年十九帝在東宫便好弄不喜書學明帝亦不以為非但朂以家人之行令太子求一日再入朝發詔不許使三日一朝在宫嘗夜捕鼠達旦以為笑樂明帝臨崩屬後事以隆昌為戒曰作事不可在人後故委任羣小誅諸宰臣無不如意性訥澀少言不與朝士接欲速葬惡靈在太極殿徐孝嗣固爭得踰月每當哭輒云喉痛太中大夫羊闡入臨無髮號慟俯仰幘遂脫地帝輟哭大笑謂宦者王寶孫曰此謂秃秋啼來乎自江祏始安王遙光等誅後無所忌憚日夜於後宫戲馬鼓譟為樂合夕便擊金鼓吹角令左右數百人呌雜以胡羌橫吹諸伎常以五更就卧至晡乃起王侯以下節朔朝見晡後方前或際暗遣出臺閣案奏月數十日乃報或不知所在閹豎以紙包裹魚肉還家並是五省黃案二年元會食後方出朝賀裁竟便還西序寢自已至申百僚陪位皆僵仆菜色比起就會匆遽而罷太子所生母黃貴嬪早亡令潘妃母養之拜潘氏為貴妃乘卧輿帝騎馬從後著織成袴褶金薄幅執七寶縛矟又有金銀校具錦繡諸帽數十種各有名字戎服急裝縳袴上著絳衫以為常服不變寒暑陵冒雨雪不避坑穽馳騁渴乏輒下馬解取腰邊蠡器酌水飲之復上馳去馬乘具用錦繡處患為雨所溼織雜采珠為覆蒙備諸雕巧選黃門五六十人為騎客又選營署無賴小人善走者為逐馬鷹犬左右數百人常以自隨奔走往來略不暇息置射雉場二百九十六處翳中帷帳及步障皆夾以緑紅錦金銀鏤弩牙玳瑁帖箭每出輒與鷹犬隊主徐令孫媒翳隊主俞靈韻馳馬而走左右爭逐之又甚有筋力牽弓至三斛五斗能擔幢初試擔幢每傾倒在幢杪者必至踠傷其後白虎幢七丈五尺齒上擔之折齒不倦擔幢諸校具服飾皆自製之綴以金華玉鏡衆寶舍人主書及至左右主帥並皆侍側逞諸變態曽無愧顔始欲騎馬未習其事俞靈韻為作木馬人在其中行動進退隨意所適其後遂為善騎陳顯達卒漸出遊走不欲令人見之驅斥百姓唯置空宅而已是時率一日二十餘出既往無定處尉司常慮得罪東行驅西南行驅北應旦出夜便驅逐吏司奔驟呌呼盈路打鼓踏圍鼓聲所聞便應奔走臨時驅迫衣不暇披乃至徒跣走出犯禁者應手格殺百姓無復作業終日路隅從萬春門由東宫以東至郊外數十里皆空家盡室巷陌縣幔為髙障置人防守謂之屏除髙障之內設部伍羽儀復有數部皆奏鼓吹羌胡伎鼓角橫吹夜反火光照天每三四更中鼓聲四出幡戟橫路百姓喧走士庶莫辨或於市肆左側過親幸家環繞宛轉周遍都下老小震驚啼號塞道處處禁斷不知所過疾患困篤者悉掆移之無人掆者扶匐道側吏司又加捶打絶命者相繫從騎及左右因之入富家取物無不蕩盡工商莫不廢業樵蘇由之路斷至於乳婦昏姻之家移産寄室或輿病棄尸不得殯葬有棄病人於青溪邊者吏懼為監司所問推置水中泥覆其面須臾便死遂失骸骨前魏興太守王敬賔新死未斂家人被驅不得留視及家人還鼠食兩眼都盡如此非一又嘗至沈公城有一婦人當産不去帝入其家問何獨在答曰臨産不得去因剖腹看男女又長秋卿王儇病篤不聼停家死於路邊丹陽尹王志被驅急狼狽步走惟將二門生自隨藏朱雀航南酒盧中夜方得羽儀而歸帝既喜遊獵不避危險至蔣山定林寺一沙門病不能去藏於草間為軍人所得應時殺之左右韓暉光曰老道人可念帝曰汝見麞鹿亦不射邪仍百箭俱發故貴人富室者皆數處立宅以為避圍之舍每還宫常至三更百姓然後得反禁斷又不即通處處屯咽或泥塗灌注或氷凍嚴結老幼啼號不可聞見時人以其所圍處號為長圍及建康城見圍亦名長圍識者以為讖焉三年殿內火合夕便發其時帝猶未還宫內諸房閣已閉內人不得出外人又不敢輒開比及開死者相枕領軍將軍王瑩率衆救火太極殿得全內外呌喚聲動天地帝三更中方還先至東宫慮有亂不敢便入參覘審無異乃歸其後出遊火又燒璿儀曜靈等十餘殿及柏寢北至華林西至祕閣三千餘間皆盡左右趙鬼能讀西京賦云柏梁既災建章是營於是大起諸殿芳樂芳德仙華大興含德清曜安壽等殿又别為潘妃起神仙永壽玉壽三殿皆匝飾以金璧其玉壽中作飛仙帳四面繡綺窗間盡畫神仙又作七賢皆以美女侍側鑿金銀為書字靈獸神禽風雲華炬為之玩飾椽桷之末悉垂鈴佩江左舊物有古玉律數枚悉裁為鈿笛莊嚴寺有玉丸子鈴外國寺佛面有光相禪靈寺塔諸寶珥皆剝取以施潘妃殿飾性急暴所作便欲速成造殿未施梁桷便於地畫之唯須宏麗不加精密亦不别畫但取絢曜而已故諸匠賴此得不用情又鑿金為蓮華以帖地令潘妃行其上曰此步步生蓮華也塗壁皆以麝香錦幔珠簾窮極綺麗縶役工匠自夜達曉猶不副速乃剔取諸寺佛剎殿藻井仙人騎獸以充足之武帝興光樓上施青漆世人謂之青樓帝曰武帝不巧何不純用琉璃潘氏服御極選珍寶主衣庫舊物不復周用貴市人間金銀寶物價皆數倍琥珀釧一隻直百七十萬都下酒租皆折輸金以供雜用猶不能足下揚南徐二州橋桁塘埭丁計功為直斂取見錢供太樂主衣雜費由是所在塘瀆皆有隳廢又須求雄雉頭鶴􅌁白鷺縗百品千條無復窮已親幸小人因緣為姦科一輸十又各就州縣求為人輸率取見直不為輸送守宰懼威口不得道須物之處已復重求如此相仍前後不息百姓困盡號泣道路少府大官凡諸市賣事皆急速催求相繫吏司奔馳遇便虜奪市㕓離散商旅靡依又以閲武堂為芳樂苑窮竒極麗當暑種樹朝種夕死死而復種率無一生於是徴求人家望樹便取毁徹牆屋以移置之大樹合抱亦皆移掘插葉繫花取玩俄頃剗取細草來植階庭烈日之中至便焦燥紛紛往還無復已極山石皆塗以采色跨池水立紫閣諸樓壁上畫男女私褻之像明帝時多聚金寶至是以金為泥不足周用令富室賣金不問多少限以賤價又不還直張欣泰嘗謂舍人裴長穆曰宫殿何事頓爾夫以秦之富起一阿房而滅今不及秦一郡而頓起數十阿房其危殆矣答曰非不悅子之道顧言不用耳潘妃放恣威行逺近父寶慶與諸小共逞姦毒富人悉誣為罪田宅資財莫不啓乞或云寄隱附藏復加收沒計一家見陷禍及親鄰又慮後患男口必殺明帝之崩竟不一日蔬食居處衣服無改平常潘妃生女百日而亡制斬縗絰杖衣悉粗布羣小來弔盤旋地坐舉手受執蔬膳積旬不聼音伎左右直長閹豎王寶孫諸人共營肴羞云為天子解菜又於苑中立店肆模大市日遊市中雜所貨物與宫人閹豎共為禆販以潘妃為市令自為市吏録事將鬪者就潘妃罰之帝小有得失潘則與杖乃敕虎賁威儀不得進大荆子閣內不得進實中荻雖畏潘氏而竊與諸姊妹淫通每遊走潘氏乘小輿宫人皆露褌著緑絲屩帝自戎服騎馬從後又開渠立埭躬自引船埭上設店坐而屠肉于時百姓歌云閲武堂種楊栁至尊屠肉潘妃酤酒又偏信蔣侯神迎來入宫晝夜祈禱左右朱光尚詐云見神動輒咨啓並云降福始安之平遂加位相國既而又號為靈帝車服羽儀一依王者又曲信小祠日有十數師巫魔媪迎送紛紜光尚輒託云神意范雲謂光尚曰君是天子要人當思自全計光尚曰至尊不可諌正當託鬼神以達意耳後東入樂遊人馬忽驚以問光尚光尚曰向見先帝大瞋不許數出帝大怒拔刀與光尚等尋覔既不見處乃縛菰為明帝形北向斬之縣首苑門上自永元以後魏每來伐繼以內難揚南徐二州人丁三人取兩以此為率逺郡悉令上米凖行一人五十斛輸米既畢就役如故又先是諸郡役人多依人士為附𨽻謂之屬名又東境役苦百姓多注籍詐病遣外醫巫在所檢占諸屬名并取病身凡屬名多不合役止避小小假並是復蔭之家凡注病者或已積年皆攝充將役又追責病者租布隨其年歲多少銜命之人皆給貨賂隨意縱捨又橫調徴求皆出百姓羣小以陳顯達下數日便敗崔慧景圍城正得十日及蕭衍兵至亦謂為然裹糧食樵芻凡所須物為百日備帝謂茹法珍曰須來至白門前當一決及至近郊乃聚兵為固守計召王侯分置尚書都坐及殿省尚書舊事悉充紙鎧使冠軍將軍王珍國領二萬人據大桁莫有鬬志遣王寶孫督戰呼為王倀子寶孫切罵諸將帥直閣將軍席豪發憤突陳死豪驍將也既斃衆軍於是土崩軍人從朱雀觀上自投及赴淮水死者無數於是閉城自守城內軍事委王珍國兖州刺史張稷入衛以稷為副實甲猶七萬人帝著烏帽袴褶備羽儀登南城門臨望又虛設鎧馬齊仗千人皆張弓拔刃出東掖門稱蔣王出蕩又受刀敕等教著五音兒衣登城望戰還與御刀左右及六宫於華光殿立軍壘以金玉為鎧仗親自臨陳詐被創勢以板掆將去以此厭勝又於閲武堂設牙門軍頓每夜嚴警帝於殿內騎馬從鳯莊門入徽明門馬被銀蓮葉貝裝鎧雜羽孔翠寄生逐馬左右衛從晝眠夜起如平常聞外鼓吹呌聲被大紅袍登景陽樓望弩幾中之衆皆怠怨不為致力募兵出戰至城門數十步皆坐甲而歸慮城外有伏兵乃燒城傍諸府署六門之內皆盡城中閣道西掖門內相聚為市販死牛馬肉蕭衍長圍既立塹柵嚴固然後出蕩屢戰不捷帝猶惜金錢不肯賞賜茹法珍叩頭請之帝曰賊來獨取我邪何為就我求物後堂儲數百具榜啓為城防帝云擬作殿竟不與又催御府細作三百人精仗須圍解以擬屏除金銀雕鏤雜物倍急於常法珍蟲兒又説帝曰大臣不留意使圍不解宜悉除之珍國張稷懼禍乃謀應蕭衍以計告後閣舍人錢強強許之密令遊蕩主崔叔智夜開雲龍門稷及珍國勒兵入殿分軍又從西上閣入後宫御刀豐勇之為內應是夜帝在含德殿吹笙歌作女兒子卧未熟聞兵入趨出北户欲還後宫清曜閣已閉閹人禁防黃泰平刀傷其膝仆地顧曰奴反邪直後張齊斬首送蕭衍宣德太后令依漢海昏侯故事追封東昏侯東昏侯永元三年和帝諱寶融字智昭明帝第八子也建武元年封隨郡王永元元年改封南康王出為西中郎將荆州刺史督九州軍事二年十一月甲寅長史蕭頴胄奉王舉兵其日太白及辰星俱見西方乙卯教纂嚴丙辰以雍州刺史蕭衍為使持節都督前鋒諸軍事戊午衍表勸進十二月乙亥羣僚勸進並不許壬辰驍騎將軍夏侯亶自建鄴至江陵稱宣德太后令西中郎將南康王宜纂承皇祚光臨億兆可且封宣城王相國荆州牧加黃鉞置僚屬三年五月乙巳王受命大赦惟梅蟲兒茹法珍等不在例是日長星見竟天甲寅建牙于城南二月己巳羣僚上尊號立宗廟及南北郊中興元年春三月乙巳皇帝即位大赦改永元三年為中興文武賜位二等是歲彗星竟天以相國左長史蕭頴胄為尚書令加雍州刺史蕭衍尚書左僕射都督征討諸軍以晉安王寶義為司空廬陵王寶源為車騎將軍開府儀同三司丙午有司奏封庶人寶卷為零陵侯詔不許又奏為涪陵王詔可夏四月戊辰詔凡東討衆軍及諸向義之衆普復除五年秋七月丁卯魯山城主孫樂祖以城降己未郢城主薛元嗣降八月丙子平西將軍陳伯之降九月己未詔假黃鉞蕭衍若定京邑得以便宜從事冬十一月壬寅尚書令鎮軍將軍蕭穎胄卒十二月丙寅建康城平己巳宣德皇太后令以征東大將軍蕭衍為大司馬録尚書驃騎大將軍揚州刺史封建安郡公依晉武陵王遵承制故事壬申改封建安王寶夤為鄱陽王癸酉以司徒揚州刺史晉安王寶義為太尉領司徒乙酉以尚書右僕射王瑩為左僕射二年春正月戊戍宣德皇太后臨朝入居內殿壬寅大司馬蕭衍都督中外諸軍事加殊禮己酉以大司馬長史王亮為守尚書令甲寅加大司馬蕭衍位相國梁公備九錫禮二月壬戍誅湘東王寶晊丙戍進梁公蕭衍爵為王三月辛丑鄱陽王寶夤奔魏誅邵陵王寶攸晉熙王寶貞庚戍車駕東歸至姑熟丙辰遜位于梁丁巳廬陵王寶源薨四月辛酉禪詔至皇太后遜居外宫梁受命奉帝為巴陵王宫于姑熟戊辰巴陵王殂時年十五追尊為齊和帝葬恭安陵初梁武帝欲以南海郡為巴陵國邑而遷帝焉以問范雲雲俯首未對沈約曰今古殊事魏武所云不可慕虛名而受實禍武帝頷之於是遣鄭伯禽進以生金帝曰我死不須金醇酒足矣乃引飲一升伯禽就加摺焉先是文惠太子與才人共賦七言詩句後輒云愁和帝至是其言方驗又永明中望氣者云新林婁湖青溪並有天子氣於其處大起樓苑宫觀武帝屢遊幸以厭之又起舊宫於青溪以弭其氣而明帝舊居東府城西延興末明帝龍飛至是梁武帝衆軍城於新林而武帝舊宅亦在征虜營是時百姓皆著下屋白紗帽而反裙覆頂東昏曰裙應在下今更在上不祥命斷之於是百姓皆反裙向下此服祅也帽者首之所寄今而向下天意若曰元首方為猥賤乎東昏又令左右作逐鹿帽形甚窄狹後果有逐鹿之事東昏宫裏又作散叛髮反髻根向後百姓爭學之及東昏狂惑天下散叛矣東昏又與羣小别立帽騫其口而舒兩翅名曰鳯度三橋裙向後總而結之名曰反縛黃麗東昏與刀敕之徒親自著之皆用金寶鑿以璧璫又作著調帽鏤以金玉間以孔翠此皆天意梁武帝舊宅在三橋而鳯度之名鳯翔之驗也黃麗者皇離為日而反縛之東昏戮死之應也調者梁武帝至都而風俗和調先是百姓及朝士皆以方帛填胸名曰假兩此又服祅假非正名也儲兩而假之明不得真也東昏誅其子廢為庶人假兩之意也和帝中興二年右齊七主二十四年為梁所滅通志卷十二
