body:
  text: 通志卷一百七十六宋右廸功郎鄭樵漁仲撰文苑傳第二南齊邱靈鞠檀超熊襄叔吳邁逺超父道鸞卞彬諸葛最爽袁嘏世孫抱邱巨源孔廣馬孔逭袁虞通之孫虞龢司憲仲明詵王智深崔慰祖祖沖之子暅之來暅之子晧嶷賈淵梁袁峻劉昭子縚緩鍾嶸周興嗣吳均江洪邱遲從子仲孚劉勰何思澄子朗費王子雲昶任孝㳟顔恊范懐約韋謝善勛仲紀少瑜陳杜之偉顔晃岑之敬何之元徐伯陽張正見阮卓後魏袁躍裴敬憲盧觀弟仲宣封肅邢臧裴伯茂邢昕温子昇荀濟北齊祖鴻勲李廣樊遜茹瞻劉逖荀士遜後周王裦庾信顔之推弟之儀隋虞世基子熙栁𧦬許善心李文博明克讓劉臻崔儦王頍諸葛頴王貞孫萬壽虞綽王胄庾自直潘徽常得志經尹式劉善祖君彦劉孔德紹斌南齊邱靈鞠吳興烏程人也祖系祕書監父道真䕶軍長史靈鞠少好學善屬文東揚州辟從事詣領軍沈演之演之謂曰身昔為州職詣領軍謝晦賓主坐處政如今日卿將來復如此也舉秀才累遷貟外郎宋孝武殷貴妃亡靈鞠獻挽歌三首云雲横廣階闇霜深髙殿寒帝擿其句嗟賞後為烏程令不得志泰始初坐事禁錮數年褚淵為吳興太守謂人曰此郡才士唯有邱靈鞠及沈㪍耳乃啟申之明帝使著大駕南討記論久之除太尉參軍昇明中為正員郎兼中書郎時方禪讓髙帝使靈鞠參掌詔䇿建元元年轉中書郎敕知東宫手筆嘗還東詣司徒褚淵淵不起曰比脚疾更増不復能起靈鞠曰脚疾亦是大事卿為一代鼎臣不可復為覆餗其彊切如此不持形儀唯取笑適尋又掌知國史武帝即位為通直常侍尋領東觀祭酒靈鞠曰人居官願數遷使我終身為祭酒不恨也永明二年領驍騎將軍靈鞠不樂武位謂人曰我應還東掘顧榮冢江南地方數千里士子風流皆出其中顧榮忽引諸傖輩度妨我輩塗轍死有餘罪尋改常侍靈鞠好飲酒臧否人物在沈深座見王儉詩深曰王令文詩大進靈鞠曰何如我未進時此言遂逹儉靈鞠宋世文名甚盛入齊頗減蓬髪弛縱無形儀不治家業王儉謂人曰邱公仕宦不進才亦退矣遷長沙王車騎長史卒著江左文章錄序起太興訖元熙文集行於世子遲在梁文苑中檀超字悦祖髙平金鄉人也祖嶷之字𢎞宗宋南琅邪太守父道處字萬壽位正貟郎超少好學放誕任氣解褐州西曹時蕭恵開為别駕超便與抗禮恵開自以地位居前稍相陵辱而超舉動嘯傲不以地勢推之張目謂曰我與卿俱起一老姥俱國家微賤時外戚耳何足以一爵髙人蕭太后恵開之祖姑長沙景王道憐妃超祖姑也故超以此語之恵開欣然更為刎頸之交後舉秀才累遷國子博士兼左丞超嗜酒好談詠舉止和靡自比晉郗超言髙平有二超又謂人曰猶覺我為優也髙帝嘗愛之後為司徒右長史建元二年初置史官以超與驃騎記室江淹掌史職上表立條例開元紀號不取宋年封爵各詳本傳無假年表著十志律厯禮樂天文五行郊祀刑法藝文依班固朝㑹輿服依蔡邕馬彪州郡依徐爰百官依范曄班固五星載天文日蝕載五行改日蝕入天文志以建元為始又以帝女體自皇家立傳以備甥舅之重又立處士烈女傳於是詔内外詳議僕射王儉議以為金粟之重八政所先食貨通則國富民實宜加編録以崇務本朝㑹志前史不書蔡邕稱先師胡廣説漢舊儀此乃伯喈一家之意曲碎小儀無煩録置當加食貨省朝㑹洪範九疇一曰五行五行之本先乎水火水火之精是為日月推此而言日月五行之宗也今宜憲章前軌無所改革又立帝女傳亦非淺識所安若有髙徳異行自當載在烈女傳詔除日月災沴天文餘如儉議超既與物論多忤而史功復未就遂徙交州於路見殺江淹撰成之猶不備也時有豫章熊襄著齊典上起十代其序云尚書堯典謂之虞書則附所述故通謂之齊書名為河洛金匱又有吳邁逺者好為篇章宋明帝聞而召之及見曰此人連絶之外無所復有邁逺好自誇而嗤鄙他人毎作詩得稱意語輒擲地曰曹子建何足數哉超聞而笑曰昔劉季緒才不逮於作者而好詆訶人文章季緒𤨏𤨏焉足道哉至於邁逺何為者乎超叔父道鸞字萬安位國子博士永嘉太守亦有文學撰續晉陽秋二十卷卞彬字士蔚濟隂寃句人也祖嗣之中領軍父延之弱冠為上虞令有剛氣㑹稽太守孟顗以令長裁之積不能容脫幘投地曰我所以屈卿者政為此幘耳今已投之卿矣卿以一世勲門而傲天下國士拂衣而去彬險拔有才而與物多忤髙帝輔政袁粲劉秉王藴等皆不同而沈攸之又稱兵反粲藴雖敗攸之尚存彬意猶以髙帝事無所成乃謂帝曰比聞謡云可憐可念尸著服孝子不在日代哭列管暫鳴死滅族公頗聞不時藴居父憂與粲同死故云尸著服也服者衣也孝子不在日代哭者褚字也彬謂沈攸之得志褚淵當敗故言哭也列管謂簫也髙帝不悦及彬退曰彬自作此後嘗於東府謁髙帝髙帝時為齊王彬曰殿下即東宫為府則以青溪為鴻溝鴻溝以東為齊以西為宋仍詠詩云誰謂宋逺跂予望之遂大忤㫖因此擯廢數年不得仕進乃擬趙壹窮鳥為枯魚賦以喻意後為南康郡丞彬頗飲酒擯棄形骸仕既不遂乃著蚤蝨蝸蟲蝦蟆等賦皆大有指斥其蚤蝨賦序曰余居貧布衣十年不製一袍之緼有生所託資其寒暑無與易之為人多病起居甚踈縈寢敗絮不能自釋兼攝性懈惰嬾事皮膚澡刷不謹澣沐失時四體㲰㲰加以臭穢故葦席蓬纓之間蚤蝨猥流滛癢渭濩無時恕肉探揣擭撮日不替手蝨有朝生暮死若吾之蝨者無湯沐之慮絶相弔之憂晏聚乎久袴爛布之裳復不懃之討捕孫孫子子三年五嵗焉其略言皆實録也又為禽獸决録目禽獸云羊性淫而狠猪性卑而率鵞性頑而傲狗性險而出皆指斥貴勢其羊淫狠謂吕文顯猪卑率謂朱隆之鵞頑傲謂潘敞狗險出謂吕文度其險詣如此蝦蟆賦云紆青拖紫名為蛤魚世謂比令僕也又云蝌斗唯唯羣浮闇水唯朝繼夕聿役如鬼比令史諮事也文章傳於閭巷後歴尚書比部郎安吉令車嗣記室彬性喜飲酒以瓠壺瓢勺杬皮為具著帛冠十二年不改易以大瓠為火籠什物多諸詭異自稱卞田居婦為傅蠶室或謂曰卿都不持操名器何由得升彬曰擲五木子十擲輒鞬豈復是擲子之拙吾好擲政極北耳後為綏建太守卒官永明中琅邪諸葛最為國子生作雲中賦指祭酒以下皆有形似之目坐事繫東冶作東冶徒賦武帝見而赦之又有陳郡袁嘏自重其文謂人云我言應湏大材迮之不爾飛去建武末為諸暨令被王敬則賊所殺時有廣陵髙爽博學多才劉蒨為晉陵縣爽經途詣之了不相接爽甚銜之俄而爽代蒨為縣蒨遣迎贈甚厚爽受餉答書云髙晉陵自答人問其所以答云劉蒨餉晉陵令耳何闗爽事又有人送書與爽告困躓云比日守羊困苦爽答曰守羊無食何不貨羊糴米孫抱為延陵縣爽又詣之抱了無故人之懐爽出從縣閤下過取筆書鼔云徒有八尺圍腹無一寸腸面皮如許厚受打未詎央爽機悟多如此坐事被繫作鑊魚賦以自況其文甚工後遇赦免卒抱東莞人父亷吳興太守抱善吏職形體肥壯腰帶十圍爽故以此激之邱巨源蘭陵人也少舉丹陽郡孝亷為宋孝武所知大明五年敕助徐爰撰國史帝崩江夏王義㳟取掌書記明帝即位使參詔誥引在左右自南臺御史為王景文鎮軍參軍寧䘮還家元徽初桂陽王休範在尋陽以巨源有筆翰遣船迎之餉以錢物巨源因髙帝自啟敕板起之使留都下桂陽事起使於中書省撰符檄事平除奉朝請巨源望有封賞既而不獲乃與尚書令袁粲書曰臨幾新亭獨能抽筆弗顧者唯有邱巨源當崩天之敵抗不測之禍請問海内此膽如何使桂陽得志身若不轅裂軍門則應腰斬都市嬰孩脯膾伊孰可念巨源竟不被申除武昌太守拜竟不樂江外行武帝問之巨源曰古人云寧飲建鄴水不食武昌魚臣年已老寧死於建鄴乃以為餘杭令初沈攸之事起髙帝使巨源為書檄荆州巨源以此又望賞異故意常不滿明帝為吳興巨源作秋胡詩有譏刺語以事見殺時又有㑹稽孔廣孔逭皆才學知名廣字淹源羙容止善吐論王儉張緒咸羙之儉常云廣來使人廢簿領匠不須來來則莫聽去緒數巾車詣之毎數云孔廣使吾成輕薄祭酒仕至揚州中從事逭抗直有才藻制東都賦于時才士稱之陳郡謝卄瀹年少時遊㑹稽還父莊問入東何見見孔逭不見重如此著三吳决録不傳卒於衛軍武陵王東曹掾又時有虞通之虞龢司馬憲袁仲明孫詵等皆有學行與廣埒名通之龢皆㑹稽餘姚人通之善言易至歩兵校尉龢位中書郎廷尉少好學居貧屋漏恐濕墳典乃舒被覆書書獲全而被大濕時人以比髙鳯憲字景思河内温人待詔東觀為學士至殿中郎口辯有才地使魏見稱於北仲明陳郡人撰晉史未成而卒初仲明與劉融卞鑠俱為袁粲所賞恒在坐席粲為丹陽尹取鑠為主簿好詩賦多譏刺世人坐徙巴州詵字休羣太原中都人愛文章尤好賞泉石卒於御史中丞王智深字雲才琅邪臨沂人也少從陳郡謝超宗學屬文好飲酒拙澁乏風儀為豫章王大司馬參軍兼記室武帝使太子家令沈約撰宋書約疑立袁粲傳以審武帝武帝曰袁粲自是宋家忠臣約又多載宋孝武明帝諸䙝黷事上遣左右語約曰孝武事迹不容頓爾我昔經事宋明帝卿可思諱惡之義於是多所省除又敕智深撰宋紀召見芙蓉堂賜衣服給宅智深吿貧於豫章王王曰須卿書成當相論以禄書成三十卷武帝後召見智深於璿明殿令拜表奏上表未奏而武帝崩隆昌元年敕索其書智深遷為竟陵王司徒參軍坐事免官家貧常餓五日不得食掘莧根食之司空王僧䖍及子志分給其衣食焉卒於家崔慰祖字悦宗清河東武城人也父慶緒永明中為梁州刺史慰祖解褐奉朝請父䘮不食鹽母曰汝既無兄弟又未有子允毁不滅性政當不進肴羞耳如何絶鹽吾今亦不食矣慰祖不得已從之父梁州之資家財千萬散與宗族漆器題為日字日字之器流乎逺近料得父時假貰文疏謂族子紘曰彼有自當見還彼無吾何言哉悉焚之好學聚書至萬卷隣室年少好事者來從假借日數十帙慰祖親自取與未嘗為辭為始安王遥光撫軍刑獄兼記室遥光好棊數召慰祖對戲慰祖輒辭拙非朔望不見也建武中詔舉士從兄慧景舉慰祖及平原劉孝摽並碩學帝欲試以百里慰祖辭不就國子祭酒沈約吏部郎謝脁嘗於吏部省中賓友俱集各問慰祖地理中所不悉者十餘事慰祖口吃無華辭而酬據精悉一座稱服之脁嘆曰假使班馬復生無以過此慰祖賣宅須四十五萬買者云寧有减不答曰誠異韓伯休何容二價買者又曰君但責四十六萬一萬見與慰祖曰聞君欺人豈我心乎少與侍中江祀款及祀貴常來候之而慰祖不往也與丹陽丞劉渢素善遙光據東府反慰祖在城内城未潰一日渢謂之曰卿有老母宜出命門者出之慰祖詣闕自首繫尚方病卒慰祖著海岱志起太公迄西晉人物為四十卷半成臨卒與從弟緯書云常欲更注遷固二史採史漢所漏二百餘事在厨簏可檢寫之以存大意海岱志良未周悉可寫數本付䕶軍諸從人一通及友人任昉徐寅劉洋裴揆令後世知吾微有素業也又令以棺親土不湏甎勿設靈座祖冲之字文逺范陽遒人也曽祖台之晉侍中祖昌宋大匠卿父朔之奉朝請沖之少稽古有機思宋孝武使直華林學省賜宅宇車服觧褐南徐州從事公府參軍始宋元嘉中用何承天所制厯比古十一家為密沖之以為尚踈乃更造新法上表言之孝武令朝士善厯者難之不能屈㑹帝崩不施行歴位為婁縣令謁者僕射初宋武平闗中得姚興指南車有外形而無機杼毎行使人於内轉之昇明中髙帝輔政使沖之追修古法沖之改造銅機圎轉不窮而司方如一馬鈞以來未之有也時有北人索馭驎者亦云能造指南車帝使與沖之各造使於樂遊苑對共校試而頗有差僻乃毁而焚之晉時杜預有巧思造欹器三改不成永明中竟陵王子良好古沖之造欹器獻之與周廟不異文惠太子在東宫見沖之厯法啟武帝施行文惠尋薨又寢轉長水校尉領本職沖之造安邊論欲開屯田廣農殖建武中明帝欲使沖之巡行四方興造大業可以利百姓者㑹連有軍事竟不行沖之觧鍾律博奕當時獨絶莫能對者以諸葛亮有木牛流馬乃造一器不因風水施機自運不勞人力又造千里船於新亭口試之日行百餘里於樂遊苑造水碓磨武帝親自臨觀又特善算永元二年沖之卒年七十二著易老莊義釋論語孝經注九章造綴述數十篇子暅之字景爍少傳家業究極精㣲亦有巧思入神之妙般倕無以過也當其詣微之時雷霆不能入嘗行遇僕射徐勉以頭觸之勉呼乃悟父所改何承天厯時尚未行梁天監初暅之更修之於是始行焉位至太府卿暅之子皓志節慷慨有文武才畧少傳家業善算厯梁大同中為江都令後拜廣陵太守侯景陷臺城皓在城中將見害乃逃歸江西百姓感其遺惠毎相蔽匿廣陵人來嶷乃説皓曰逆豎滔天王室如燬正是義夫發憤之秋志士忘軀之日府君荷恩重世又不為賊所容今逃竄草間知者非一危亡之甚累棋莫喻董紹先雖景之腹心輕而無謀新克此州人情不附襲而殺之此一壯士之任耳今若糾率義勇立可得三二百人意欲奉戴府君勦除兇逆逺近義徒自當投赴如其克㨗可立桓文之勲必天未悔禍事生理外百代之下猶為梁室忠臣若何皓曰僕所願也死且甘心嶷乃為要勇士耿光等百餘人襲殺景兖州刺史董紹先推前太子舎人蕭勔為刺史結東魏為援馳檄逺近將討景景大懼即日率侯子鑒等攻之城陷皓見執被縛射之箭遍體然後車裂以徇城中無少長皆埋而射之來嶷字徳山幼有竒節兼資文武既與皓舉義邵陵王承制除歩兵校尉秦郡太守封永寧縣侯及皓敗嶷并兄弟子姪遇害者十六人子法敏逃免仕陳為海陵令賈淵字希鏡平陽襄陵人也祖弼之晉員外郎父亞之驃騎參軍世傳譜學宋孝武時青州人發古冢有銘云青州世子東海女郎帝問學士鮑昭徐爰蘇寳生並不能悉淵對曰此是司馬越女嫁茍晞兒檢證果然由是見遇敕淵注郭子昇明中髙帝嘉淵世學取為驃騎參軍武陵王國郎中令歴大司馬司徒府參軍竟陵王子良使淵撰見客譜出為句容令先是譜學未有名家淵祖弼之廣集百氏譜記專心習業晉太元中朝廷給弼之令史書史撰定繕寫藏於祕閣及左户曹淵父及淵三世傳學凡十八州士族譜合百袠七百餘卷該究精悉皆如貫珠當世莫比永明中衛軍王儉抄次百家譜與淵參懐撰定建武初淵遷長水校尉傖人王泰寳買襲琅邪譜尚書令王晏以啟明帝淵坐被收當極法子棲長謝罪稽顙流血朝廷哀之免淵罪後為北中郎參軍卒年六十二撰氏族譜要狀及人名書並行於世梁袁峻字孝髙陳郡陽夏人魏郎中令渙之八世孫也峻早孤篤志好學家貧無書毎從人假借必皆抄寫自課日五十紙紙數不登則不休息訥言語工文辭武帝雅好辭賦時獻文章於南闕者相望焉天監六年峻乃擬揚雄官箴奏之帝嘉焉賜束帛除貟外散騎侍郎直文徳學士省抄史記漢書各為二十卷又奉敕與陸倕各製新闕銘云劉昭字宣卿平原髙唐人晉太尉寔九世孫也祖伯龍居父憂以孝聞宋武帝敕太子諸王並往弔慰官至少卿父彪齊征虜晉安王記室昭幼清警七嵗通老莊義既長勤學善屬文外兄江淹早稱賞之天監初起家奉朝請累遷中軍臨川王記室初昭伯父肜集衆家晉書注干寳晉紀為四十卷至昭集後漢同異以注范曄後漢書世稱博悉遷通直郎出為剡令卒官集注後漢一百八十卷幼童傳一卷文集十卷子縚字言明亦好學通三禮位尚書祠部郎著先聖本記十卷行於世縚弟緩字含度為湘東王中録事性虛逺有氣調風流迭宕名髙一府常云不須衣食不用身後之譽唯重目前知見鍾嶸字仲偉潁川長社人晉侍中雅七世孫也父蹈齊中軍參軍嶸與兄岏弟嶼並好學有思理嶸齊永明中為國子生明周易衛將軍王儉領祭酒頗賞接之建武初為南康王侍郎時齊明帝躬親細務綱目亦密自是郡縣及六署九府常行職事莫不争自啟聞取决詔敕文武勲舊皆不歸選部於是憑勢互相通進人君之務最為繁密嶸乃上書言古者明君揆才頒政量能授職三公坐而論道九卿作而成務天子可㳟已南面而已書奏上不懌謂太中大夫顧暠曰鍾嶸何人欲斷朕機務卿識之不答曰嶸雖位末名卑而所言或有可采且繁碎職事各有司存令人主總而親之是人主愈勞而人臣愈逸所謂代庖人宰而為大匠斵也上不顧而他言永元末除司徒行參軍天監初制度雖革而未能盡改前弊嶸上言曰永元肇亂坐㺯天爵勲非即戎官以賄就揮千金而取九列寄片札以招六校騎都塞市郎將填街服既纓組猶為臧獲之事職雖黄散尚躬胥役之徒名實淆紊茲焉莫甚臣愚謂永元諸軍官是素族士人自有清貫而因斯受爵一宜削除以懲澆競若吏姓寒人聽極其門品不當因軍遂濫清級若僑雜傖楚應在綏撫正宜嚴斷禄力絶其請求直乞虛號而已敕付尚書行之衡陽王元簡出守㑹稽引為寧朔記室専掌文翰時居士何允築室若邪山山發洪水漂㧞樹石此室獨存元簡命嶸作瑞室頌以旌表之辭甚典麗遷西中郎晉安王記室嶸嘗求譽於沈約約拒之及約卒嶸品古今詩為評言其優劣云觀休文衆製五言最優齊永明中桓王愛文王元長等皆宗附約于時謝脁未遒江淹才盡范雲名級尚微故稱獨歩然雖辭密於范而意淺於江盖追宿憾以此報約也頃之卒官岏字長邱位建康令卒著良吏傳十卷嶼字季望永嘉郡丞周興嗣字思纂陳郡項人漢太子太傅堪後也興嗣世居姑熟年十三遊學亰師積十載餘遂博通記傳善屬文嘗歩歸姑熟投宿逆旅夜有人謂之曰子才學邁世初當見識貴臣卒被知英主言終不測所之齊隆昌中侍中謝朏為吳興太守唯與興嗣共談而已及罷郡大相談薦州舉秀才除桂陽郡丞武帝革命興嗣奏休平賦其文甚羙武帝嘉之拜安成國侍郎令直華林省其年河南獻舞馬詔興嗣與待詔到沆張率為賦帝以興嗣為工擢拜員外散騎侍郎進直文徳壽光省是時武帝以三橋舊宅為光宅寺敕興嗣與陸倕各製寺碑及成俱奏帝用興嗣者自題銅表銘柵塘碣北伐檄次韻王羲之書千字並使興嗣為文毎奏帝輙稱善賜金帛後佐撰國史十二年遷給事中撰史如故興嗣兩手先患風疽是年又染癘疫左目偏盲帝撫其手嗟曰斯人也而有斯疾也手疏治風疽方以賜之任昉又愛其才常曰興嗣若無此疾旬日當至御史中丞十七年為給事中直西省周捨奉敕注武帝所製歴代賦啟興嗣助焉普通二年卒所撰皇帝實録皇徳記起居注齊職儀等百餘卷文集十卷吳均字叔庠吳與故鄣人也家世寒賤至均好學有俊才沈約嘗見均文頗相稱賞天監初栁惲為吳興召補主簿日引與賦詩均文體清拔有古氣好事者或斆之謂為吳均體均嘗不得意贈惲詩而去久之復來惲遇之如故弗之憾也薦之臨川靖恵王王稱之於武帝即日召入賦詩帝悦焉待詔著作建安王遷江州以均為國侍郎還除奉朝請先是均將著史以自名欲撰齊書求借齊起居注及羣臣行狀武帝不許遂私撰齊春秋至是書成奏之書稱帝為齊明帝佐命帝惡其實録謂其書不實使中書舎人劉之遴詰問數十條竟支離無對敕付省焚之坐免職尋有敕召見使撰通史起三皇迄齊代均草本紀世家已畢唯列傳未就普通元年卒均注范曄後漢書九十卷著齊春秋三十卷廟記十卷十二州記十六卷錢唐先賢傳五卷續文釋五卷文集二十卷先是有濟陽江洪工屬文為建陽令坐事死邱遲字希範吳興烏程人齊車騎長史靈鞠之子也遲八嵗便能屬文靈鞠嘗謂氣骨似我黄門郎謝超宗徴士何㸃並見而異之在齊以秀才累遷殿中郎武帝平建鄴引為驃騎主簿甚被禮遇時勸進梁王及殊禮皆遲文也及踐阼遷中書郎待詔文徳殿時帝著連珠詔羣臣繼作者數十人遲文最羙坐事免乃獻責躬詩上優辭答之後出為永嘉太守在郡不稱職為有司所糾帝愛其才寢其奏天監四年中軍將軍臨川王宏北侵魏以為諮議參軍領記室時陳伯之在北與魏軍來拒遲以書喻之伯之遂降還拜中書侍郎遷司空從事中郎卒官遲辭采麗逸時有鍾嶸者詩評云范雲婉轉清便如流風囬雪遲㸃綴映媚似落花依草雖取賤文通而秀於敬子其見稱識者如此遲從子仲孚字公信少好學讀書常以中宵鐘鳴為限從祖靈鞠常稱為我家千里駒齊永明初為國子生王儉曰東南之羙復見邱生舉髙第未調還郷里家貧乃結羣盗為之計刼掠三吳仲孚聰明有智畧羣盗畏服所行皆果故亦不發後為于湖令有能名太守吕文顯當時倖臣陵詆屬縣仲孚獨不為屈明帝即位為曲阿令㑹稽太守王敬則反乘朝廷不備反問至而前鋒已届曲阿仲孚鑿長岡埭瀉瀆水以阻其路敬則軍至遇瀆涸果頓兵不得進遂敗仲孚以拒守功遷山隂令居職甚有聲稱百姓謡曰二傅沈劉不如一邱前世傅琰父子沈憲劉元明相繼宰山隂並有政績言仲孚皆過之齊末政亂頗有贓賄為有司所舉將見収竊逃還都㑹赦不問武帝踐阼復為山隂令仲孚長於撥煩善適權變吏人敬服號稱神明政為天下第一後為衛尉卿恩任甚厚初起雙闕以仲孚領大匠累遷豫章内史在郡更勵清節頃之卒贈給事黄門侍郎䘮將還豫章老㓜號哭攀送車輪不得前仲孚為左丞撰皇典二十卷南宫故事百卷又撰尚書具事雜儀行於世劉勰字彦和東莞莒人也祖靈真宋司空秀之之弟父尚越騎校尉勰早孤篤志好學家貧不㛰娶依沙門僧祐與之居處積十餘年遂博通經論因區别部類録而序之定林寺藏經乃勰所定也天監初起家奉朝請累遷兼東宫通事舎人是時七廟饗薦已用蔬果而二郊農社猶有犧牲勰乃表言二郊宜與七廟同改詔付尚書議依勰所陳尋遷歩兵校尉兼舎人如故時昭明太子重文學之士深愛接之初勰撰文心雕龍五十篇論古今文體其序略云予齒在逾立嘗夜夢執丹漆之禮器隨仲尼而南行寤而喜曰大哉聖人之難見也迺小子之垂夢歟盖自生民以來未有如夫子者也敷讚聖㫖莫若注經而馬鄭諸儒𢎞之已精就有深觧未足立家唯文章之用實經典枝條五禮資之以成六典因之致用於是搦筆和墨乃始論其文用四十九篇而已既成未為時流所稱勰自重其文欲取定於沈約約時貴盛無由自逹乃負其書候約出干之於車前狀若貨鬻者約便命取讀大重之謂深得文理常陳諸几案然勰為文長於佛理亰師寺塔及名僧碑誌必請勰製文有敕與慧震沙門於定林寺撰經證功畢遂啟求出家先燔髮鬢以自誓敕許之乃於寺變服改名慧地未期而卒文集行於世何思澄字元静東海郯人也父敬叔齊長城令有能名在官清亷不受禮遺夏至節忽牓門受餉數日中得米二千餘斛他物稱是悉以代貧人輸租思澄少勤學工屬文為㳺廬山詩沈約見之大相稱賞自以為弗逮約郊居宅新構閣齋因命工書人題此詩於壁傅昭嘗請思澄製釋奠詩辭文典麗天監十五年敕太子詹事徐勉舉學士入華林撰通略勉遂舉思澄顧協劉杳王子雲鍾嶼等五人以應選八年乃書成合七百卷思澄重交結分書與諸賓朋校定而終日造謁毎宿昔作名一束曉便命駕朝賢無不悉狎狎處即命食有人方之婁䕶欣然當之投晚還家所齎名必盡自廷尉正遷書侍御史宋齊以來此職甚輕天監初始重其選車前依尚書二丞給三騶執盛印青囊舊事糺彈官印綬在前故也後除安西湘東王録事參軍兼東宫通事舎人時徐勉周捨以才具當朝並好思澄學常遞日招致之後卒於宣恵武陵王中録事參軍有文集十五卷初思澄與宗人遜及子朗俱擅文名時人語曰東海三何子朗最多思澄聞之曰此言誤耳如其不然故當歸遜思澄意謂宜在已也子朗字世明早有才思周捨毎與談服其精理嘗為敗冢賦擬莊周馬棰其文甚工世人語曰人中爽爽有子朗卒於國山令年二十四文集行於世王子雲太原人及江夏費昶並為閭里才子昶善為樂府又作鼔吹曲武帝重之敕曰才意新㧞有足嘉異昔郎惲博物卞蘭巧辭束帛之賜實唯勸善可賜絹十疋子雲嘗為自弔文甚羙任孝恭字孝恭臨淮人也曽祖農夫宋南豫州刺史農夫弟候伯位輔國將軍行湘州事並任將帥孝恭幼孤事母以孝聞精力勤學家貧無書常﨑嶇從人假借毎讀一遍諷誦畧無所遺外祖邱它與武帝有舊帝聞其才學召入西曹撰史初為奉朝請進直壽光省為司文侍郎俄兼中書通事舎人敕遣製建陵寺刹下銘又啟撰武帝集序文並富麗自是専掌公家筆翰孝恭為文敏速若不留思毎奏輙稱善累賜金帛少從蕭寺雲法師讀經論明佛理至是蔬食持戒信受甚篤而性頗自伐以才能尚人於流輩中多有忽略世以此少之太清三年侯景寇逼孝恭啟募兵隸蕭正徳正徳入賊孝恭還赴臺臺門閉侯景獲之使作檄求還私第檢討景許之因走入東府城陷景斬挫之文集行於世顔協字子和琅邪臨沂人晉侍中含七世孫也父見逺博學有志行初齊和帝鎮荆州以為録事參軍及即位兼御史中丞武帝受禪見逺不食發憤數日而卒帝聞之曰我自應天從人何豫天下士大夫事而顔見逺乃至於此協㓜孤養於舅氏少以器局稱博渉羣書工於草隸飛白時吳人范懐約能隸書協學其書殆逼真也荆楚碑碣皆協所書時又有㑹稽謝善勛能為八體六文方寸千言亰兆韋仲善飛白並在湘東王府善勛為録事參軍仲為中兵參軍府中以協優於韋仲而減於善勛善勛飲酒至數斗醉後輙張眼大罵雖復貴賤親踈無所擇也時謂之謝方眼而胸襟坦夷有士君子之操焉協家雖貧素而修飾邊幅非車馬未嘗出㳺湘東王出鎮荆州以為記室時吳郡顧協亦在蕃邸與協同名才學相亞府中稱為二協舅陳郡謝暕卒協以有鞠養㤙居喪如伯叔禮議者甚重焉又感家門事義不求顯逹恒辭徴辟㳺於蕃府而已及卒元帝甚歎惜之為懐舊詩以傷之協所撰晉仙傳五篇日月災異圖兩卷行於世其文集二十卷遇火湮滅子之儀之推並早知名在周文苑傳紀少瑜字幼瑒丹陽秣陵人也本姓吳養于紀氏因而命族早孤幼有志節常慕王安期之為人年十三能屬文初為亰華樂王儒孺見而賞之曰此子才藻新抜方有髙名少瑜嘗夢陸倕以一束青鏤管筆授之云我以此筆猶可用卿自擇其善者其文因此而進年十九始㳺太學備探六經博士東海鮑皦雅相欽悦時皦有疾請少瑜代講少瑜既妙元言善談吐辯㨗如流為晉安國中尉晉安即簡文也深被恩遇後侍宣城王讀當陽公為郢州以為功曹參軍轉輕車限内記室坐事免大同七年始引為東宫學士邵陵王在郢啟求學士武帝以少瑜充行少瑜善容貌工藁草吏部尚書到溉嘗曰此人有大才而無貴任將抜之㑹溉去職後除武陵王記室參軍卒陳杜之偉字子大吳郡錢唐人也家世儒學以三禮専門父規梁奉朝請之偉㓜精敏有逸才年十五遍觀文史及儀禮故事時軰稱其早成僕射徐勉嘗見其文重其有筆力大同元年梁武帝幸同泰寺捨身敕勉撰定儀注勉以先無此禮召之偉草具其儀乃啟補東宫學士與學士劉陟等抄撰羣書各為題目所撰富教政道二篇皆之偉為序後兼太學限内博士大同七年梁皇太子釋奠於國學時樂府無孔子顔回登歌詞尚書參議令之偉製其文伶人傳習以為故事再遷安西邵陵王刑獄參軍之偉年位甚卑特以彊識俊才頗有名當世吏部尚書張纘深知之以為廊廟之器侯景之亂之偉逃於山澤武帝為丞相素聞其名召補記室參軍遷中書侍郎領大著作及受禪除鴻臚卿餘並如故之偉求解著作優詔不許再遷太中大夫仍敕撰梁史卒官文集十七卷顔晃字元眀琅邪臨沂人也少孤貧好學有辭采解褐除邵陵王府兼記室參軍時東宫學士庾信使府中王使晃接對信輕其少曰此府兼記室幾人晃曰猶當少於宫中學士當時以為善對侯景之亂奔荆州承聖初除中書侍郎天嘉初累遷員外散騎常侍兼中書舎人掌詔誥卒贈司農卿謚曰貞子晃家世單門傍無親援而介然脩立為當世所知其表奏詔誥下筆立成偏得事理有文集二十卷岑之敬字思禮南陽棘陽人也父善紆梁世以經學聞官至吳寧令司義郎之敬年五嵗讀孝經毎燒香正坐親戚咸加歎異年十六䇿春秋左氏制㫖孝經義擢為髙第御史奏曰皇朝多士例止明經若顔閔之流乃應髙第梁武帝省其䇿曰何妨我復有顔閔耶因詔入面試令之敬升講座敕中書舎人朱异執孝經唱士孝章武帝親自論難之敬剖析從横左右莫不嗟服乃除童子奉車郎賞賜優厚年十八豫重雲殿法㑹時武帝親行香熟視之敬曰未㡬見兮突而弁兮即日除太學限内博士尋為壽光學士司義郎太清元年表試吏除南沙令承聖二年除晉安宣恵王府中記室參軍時蕭勃據嶺表遣之敬宣㫖慰喻㑹魏克江陵仍留廣州大建初還朝授東宫義省學士累遷南臺書侍御史征南府諮議參軍之敬始以經業進而博渉文史雅有詞筆不為醇儒性謙謹未嘗以才學矜物接引後進恂恂如也毎母忌日營齋必躬自灑埽涕泣終日士君子以篤行稱之十一年卒有文集十卷行於世子徳潤有父風位中軍吳興王記室何之元廬江灊人也祖僧逹齊南臺書侍御史父法勝以行業聞之元幼好學有才思居喪過禮梁天監末司空袁昻表薦之因得召見累遷信義令其宗人敬容位望隆重頻相顧訪之元終不造焉或問其故之元曰昔楚人得寵於觀起有馬者皆亡夫徳薄任隆必近覆敗吾恐不獲其利而招其禍識者以是稱之侯景之亂武陵王以太尉承制授南梁州刺史北巴西太守武陵王自成都舉兵東下之元與蜀中人庶抗表請無行王以為沮衆囚之元于艦中及武陵兵敗之元從邵陵太守劉棻之郡俄而魏克江陵劉棻卒王琳召為記室參軍及琳立蕭莊為帝署之元為中書侍郎王琳敗齊主以為揚州别駕所居即壽春也及衆軍北伐湘州刺史始興王叔陵遣功曹史栁咸齎書召之之元始與陳朝有隙書至大惶恐讀書至孔璋無罪左車見用遂隨咸至湘州再遷中衞府諮議參軍及叔陵誅之元乃屏絶人事著梁典起齊永元元年迄于王琳遇獲七十五年行事為三十卷陳亡移居常州之晉陵縣隋開皇十三年卒於家徐伯陽字隱忍東海人也父僧懽梁東宫通事舎人領祕書以善書知名伯陽敏而好學善色養年十五以文筆稱家有史書所讀近三千卷試䇿髙第授東宫學士梁大同中為侯官令甚得人和侯景之亂至廣州依蕭勃勃平還都天嘉中除司空侯安都府記室參軍太建初與中記室李爽記室張正見左户部賀徹學士阮卓黄門郎蕭銓三公郎王田禮處士馬樞記室祖孫豋比部郎賀循長史劉刪等為文㑹之友後有蔡凝劉助陳暄孔範亦預焉皆一時之士也遊宴賦詩勒成卷軸伯陽為其集序盛傳於世後除鎮北新安王府中記室參軍兼南徐州别駕帶東海郡丞鄱陽王為江州刺史伯陽常奉使造焉王率府僚與伯陽登匡嶺置讌酒酣命筆賦劇韻三十伯陽與祖孫豋前成王賜以奴婢雜物後除鎮右新安王府諮議參軍事聞姊喪發疾卒張正見字見賾清河東武城人也祖善之魏散騎常侍勃海長樂二郡太守父脩禮魏散騎侍郎歸梁仍拜本職遷懐方太守正見幼好學有清才梁簡文在東宫正見年十三獻頌簡文深贊賞之梁元帝即位為彭澤令屬喪亂避地匡俗山武帝受禪正見還都累遷尚書度支郎撰史著士卒有文集十四卷其五言尤善阮卓陳留尉氏人也祖詮梁散騎侍郎父問道梁岳陽王府記室參軍卓幼而聰敏篤志經籍善談論尤工五言詩性至孝父隨岳陽王出鎮江州遇疾卒卓時年十五自都奔赴水漿不入口累日屬侯景之亂道路阻絶冒履險難載䘮還都形容毁弊哭不絶聲賊皆哀而捨之渡彭蠡湖遇風船幾沒者數四卓仰天悲號俄而風息人以為孝感所致天嘉元年除新安王府記室參軍帶撰史著士及平歐陽紇交阯夷獠往往聚為㓂鈔卓奉使招慰交阯通日南象郡地多金翠珠貝珍怪之産前後使者皆致之唯卓挺身而還時論服其亷後為始興王中衛府記室參軍及叔陵誅後主謂羣臣曰阮卓素不同逆宜加旌異至徳元年入為徳教殿學士尋兼通直散騎常侍副王話聘隋隋文帝夙聞卓名遣河東薛道衡琅邪顔之推等與卓談宴賦詩賜遺加禮還除南海王府諮議參軍以目疾不之官退居里舎改構亭宇修山池卉木招致賓友以文酒自娛陳亡入隋行至江州追感其父所終因遘疾卒後魏袁躍字景騰陳郡項人撫軍將軍翻之弟也翻自有傳躍博學雋才性不矯俗篤於交友翻毎謂人曰躍可謂我家千里駒也歴位尚書都兵郎中加貟外散騎常侍正始初將立眀堂躍乃上議當時稱其博洽蠕蠕主阿那瓌亡破來奔朝廷矜之送復其國既而每遣使朝貢辭㫖頗不盡禮躍為朝臣書與瓌陳以禍福言辭甚羙後遷車騎將軍太傅清河王懌文學雅為懌所愛賞懌之文表多出於躍卒贈冠軍將軍吏部郎中所制文集行於世無子兄翻以子聿修繼聿脩列在齊史裴敬憲字孝虞河東聞喜人贈秦州刺史聞喜侯駿之孫也父宣位南秦州刺史附載駿傳敬憲少有志行學博才清撫訓諸弟専以讀誦為業澹於榮利風氣俊逺郡徴功曹不就諸府辟命先進其弟世人歎羙之司州牧髙陽王雍舉秀才射䇿髙第除太學博士性和雅未嘗失色於人工隸草觧音律五言之作獨擅於時名聲甚重後進咸共宗慕之中山王將之部朝賢送於河梁賦詩言别皆以敬憲為最其文不能贍逸而有清麗之羙少有氣病年三十三卒人物甚悼之敬憲世有仁義於鄉里孝昌中絳蜀賊陳雙熾所過殘暴至敬憲宅輙相約束不得焚燒其為世所服如此永興三年贈中書侍郎諡曰文盧觀字伯舉范陽涿人也與散騎常侍元同宗四世祖溥附載元傳中父光宗位尚書郎觀好學有雋才舉秀才射䇿甲科除太學博士著作佐郎與太常少卿李神儁光禄大夫王誦等在尚書上省撰定朝儀遷尚書儀曹郎孝昌元年卒觀弟仲宣小名全才學優洽乃踰於觀但文體頗細兄弟俱以文章顯論者羙之位太尉屬孝莊帝初遇害河隂仲宣及兄觀並無子文集莫為撰次罕有存者仲宣弟叔彪齊史自有傳封肅字元邕勃海蓨人都坐大官懿之族元孫也伯父琳叔父囬皆歴位通顯附載懿傳肅博渉經史太傅崔光見而賞焉位尚書左中兵郎中性恭儉不妄交㳺唯與崔勱勱從兄鴻尤相親善所制文字多亡失存者十餘卷邢臧字子良河間鄚人也父蚪光禄少卿蚪附載其從子撫軍將軍巒傳臧幼孤早立操尚博學有藻思年二十一神龜中舉秀才考上第為太學博士正光中議立明堂臧為裴頠一室之議事雖不行當世稱其理博出為本州中從事雅為鄉情所附永安中徴為金部郎中以疾不赴轉除東平太守時天下多事在職少能亷白臧獨清慎奉法吏民愛之隴西李延寔莊帝之舅以太傅出除青州啟臧為屬領樂安内史有恵政後除濮陽太守尋加安東將軍臧和雅性厚有長者之風為時人所愛敬為特進甄深行狀世稱其工與裴敬憲盧觀兄弟並結友曽共讀囬文集臧獨先通之撰古來文章并叙作者氏族號曰文譜未就病卒時賢悼惜之其文筆凡百餘篇贈鎮北將軍定州刺史諡曰文子恕渉學有識悟齊武平末尚書屯田郎隋開皇中尚書侍郎卒於沂州刺史裴伯茂河東聞喜人吏部尚書延儁之族子也父叔義司徒從事中郎伯父仲規贈河東太守附載延儁傳仲規無子叔義以伯茂後之伯茂少有風望學渉羣書文藻富贍釋褐奉朝請大將軍京兆王繼西討引為鎧曹參軍及征絳蜀陳雙熾為行臺長孫承業行臺郎中承業還京師留伯茂仍知行臺事以平薛鳯賢等賞平陽伯再遷散騎常侍典起居注太昌初為中書侍郎永熙中孝武帝兄子廣平王贊盛選賓僚以伯茂為文學後加中軍大將軍伯茂好飲酒頗渉踈傲久不徙官曽為豁情賦以自寄天平初遷鄴又為遷都賦二年因内宴伯茂侮慢殿中尚書章武王景哲景哲遂申啟稱伯茂棄其本列與監同行以棃擊案傍汚冠服禁庭之内令人挈衣詔付所司後竟無坐伯茂既出後其伯遂與兄景融别居景融貧窘伯茂了無賑恤殆同行路世以此貶薄之卒年三十九知舊歎惜焉伯茂末年劇飲不已乃至傷性多有愆失未亡前數日忽云吾得宻信將被収掩乃與婦乘車西逃避後因顧指壁中言有官人追逐其妻方知其病卒後殯於家園友人常景李渾王元景虜元明魏季景李騫等十許人於墓傍置酒設祭哀哭涕泣一飲一酹曰裴中書魂而有靈知吾曹也乃各賦詩一篇李騫以魏収亦與之友寄以示收收時在晉陽乃同其作論叙伯茂其十字云臨風想元度對酒思公榮時人以伯茂性侮傲謂收詩頗得事實贈散騎常侍衞將軍度支尚書雍州刺史重贈吏部尚書諡曰文伯茂曽撰晉書竟未能成無子兄景融以第二子孝才繼邢昕字子明安東將軍臧之從子而撫軍將軍巒之猶子也父偉尚書郎昕幼孤見愛於祖母李氏好學早有才情解褐盪冦將軍累遷太尉記室參軍吏部尚書李神儁奏昕修起居注太昌初除中書侍郎加平東將軍光禄大夫時言冒竊官級為中尉所劾免官乃為述躬賦以自釋未幾受詔與祕書監常景典儀注事孝武帝行釋奠禮昕與校書郎裴伯茂等俱為録義永熙末昕入為侍讀與温子昇魏收參掌文詔遷鄴乃歸河間天平初與侍中從叔子才魏季景魏收同徴赴都尋還郷里既而復徴時梁使兼散騎常侍劉孝儀等來聘詔昕兼正員郎迎於境上司徒孫騰引為中郎尋除通直常侍加中軍將軍既有才藻兼長几案自孝昌之後天下多務世人競以吏功取逹文學大衰司州中從事宋㳺道以公斷見知時與昕嘲謔昕謂之曰世事同知文學外游道有慙色興和中以本官副李象使於梁昕好忤物人謂之牛是行也談者謂之牛象鬬於江南齊文襄攝選擬昕為司徒右長史未奏遇疾卒士友悲之贈車騎將軍都官尚書冀州刺史諡曰文所著文章自有集録温子昇字鵬舉自云太原人晉大將軍嶠之後也世居江左祖恭之宋彭城王義康户曹參軍避難歸魏家于濟南寃句因為其郡縣人焉父暉兖州左將軍府長史行濟隂郡事子昇初受學於崔靈恩劉蘭精懃不倦以夜繼晝長乃博覽百家文章清婉為廣陽王淵賤客在馬坊教諸奴子書作侯山祠堂碑文常景見而善之故詣淵謝之景曰頃見温生淵怪問之景曰温生是大才士淵由是稍知之熙平初中尉東平王匡博召辭人以充御史同時射䇿者八百餘人子昇與盧仲宣孫搴等二十四人為髙第於是預選者争相引决匡使子昇當之皆受屈而去搴謂人曰朝來靡旗亂轍者皆為子昇逐北遂補御史時年二十二臺中彈文皆委焉以憂去任服闋還為奉朝請李神儁行荆州事引兼録事參軍被徴赴省神儁表留不遣吏部郎中李奬退表不許曰昔伯瑜之不應留王朗所以發嘆宜速遣赴無踵彦雲舊失子昇於是得還省及廣陽王深為東北道行臺召為郎中軍國文翰皆出其手時黄門郎徐紇受四方表啟答之敏速於深獨沈思曰彼有温郎中才藻可畏其見重作者如此深破走髙車珍寳盈滿衆皆競取子昇獨取絹四十疋而已深為葛榮所獲子昇亦被執榮下都督和洛興與子昇舊識以數十騎潛送子昇得逹冀州還亰師李楷執其手曰卿今得免足使夷甫慙徳自是無復宦情閉門讀書勵精不已及孝莊即位以子昇為南主客郎中修起居注曽一日不直上黨王天穆時録尚書事將加捶撻子昇遂逃遁天穆甚怒奏人代之莊帝曰當世才子不過數人豈容為此便相放黜乃寢其奏及天穆將討邢杲召子昇同行子昇未敢應天穆謂人曰吾欲收其才用豈懐前忿也今復不來便湏南走越北走胡耳子昇不得已而見之加伏波將軍為行臺郎中天穆深知賞之元顥入洛陽天穆召子昇問曰即欲向亰師為隨我北度對曰主上以虎牢失守致此狼狽元顥新入人情未安今往討之必有征無戰王若克復亰師奉迎大駕桓文之舉也捨此北度竊為大王惜之天穆善之而不能用遣子昇還洛顥以為中書舎人莊帝還宫為顥任使者多所廢黜而子昇復為舎人天穆毎謂子昇曰恨不用卿前計除正員郎仍舎人及帝殺爾朱榮也子昇預謀當時赦詔子昇詞也榮入内遇子昇抱詔書問是何文書子昇顔色不變曰敕榮不視之爾朱兆入洛子昇懼禍逃匿得免永熙中為侍讀兼舎人鎮南將軍金紫光禄大夫遷散騎常侍中軍大將軍後領本州大中正梁使張皇寫子昇文筆傳於江外梁武稱之曰曹植陸機復生於北土恨我辭人數窮百六陽夏守傅標使吐谷渾見其國主牀頭有書數卷乃是子昇文也濟隂王暉嘗云江左文人宋有顔延之謝靈運梁有沈約任昉我子昇足以陵顔轢謝含任吐沈楊遵彦作文徳論以為古今辭人皆負才遺行僥薄險忌唯邢子才王元景温子昇彬彬有徳素齊文襄引子昇為大將軍諮議參軍子昇前為中書郎嘗詣梁客館受國書自以不脩容止謂人曰詩章易作逋峭難為文襄館客元僅曰諸人當賀推子昇合陳辭子昇久忸怩乃推陸操焉及元僅劉思逸荀濟等作亂文襄疑子昇知其謀方使之作神武碑文既成乃餓諸晉陽獄食弊襦而死棄尸路隅沒其家口太尉長史宋㳺道收葬之又為集其文筆為三十五卷子昇外恬静與物無競言有凖的不妄毁譽而内深險事故之際好豫其間所以終致禍敗又撰永安記三卷無子弟子盛州主簿有文才年二十餘卒荀濟字子通其先潁川人世居江右濟初與梁武帝為布衣交知梁武當王然負氣不服謂人曰㑹於楯上磨墨作檄文或稱其才於梁武梁武曰此人好亂者也濟又上書譏佛法言營費太甚梁武將誅之遂奔魏館于崔陵家及是見執楊愔謂曰遲暮何為然濟曰叱叱氣耳何闗遲暮乃下辯曰自傷年幾催頽功名不建舎兒女之情起風雲之事故欲挾天子誅權臣齊文襄惜其才將不殺親謂之曰荀公何意反濟曰奉詔誅將軍髙澄何謂反於是燔殺之鄴下士夫多傳濟音韻北齊祖鴻勲涿郡范陽人也父慎仕魏歴鴈門咸陽二郡太守政有能名卒於金紫光禄大夫贈中書監幽州刺史諡惠侯鴻勲弱冠與同郡盧文符並為州主簿僕射臨淮王彧表薦鴻勲有文學宜試以一官敕除奉朝請鴻勲拜官而不謝彧人謂之曰臨淮舉卿便以得調竟不相謝恐非其宜鴻勲曰為國舉才臨淮之務祖鴻勲何事從而謝之彧聞而喜曰吾得其人矣後咸陽王徽奏鴻勲為司徒法曹參軍及赴洛徽謂曰臨淮相舉竟不到門今來何也鴻勲曰今來赴職非為謝恩轉廷尉正去官歸郷里神武嘗徴至并州作晉祠記好事者翫其文位至髙陽太守在官清素妻子不免寒餒時議髙之天保初卒官李廣字𢎞基范陽人也其先自遼東徙焉廣博渉羣書有才思文議之羙少與趙郡李謇齊名為邢魏之亞而訥於言敏於行中尉崔暹精選御史皆是世胄廣獨以才學兼侍御史修國史南臺文奏多其辭也文宣初嗣覇業命掌書記天保初欲以為中書郎遇病而止廣嘗欲早朝假寐忽驚覺謂其妻曰吾向似睡非睡忽有一人出吾身中語云君用心過苦非精神所堪今辭君去因而恍忽不樂數日便遇疾積年不起資産屢空藥石無繼廣雅有鑒識度量𢎞逺坦率無私為士流所愛故時共贍遺之賴以自給竟以疾終焉嘗薦畢義雲於崔暹廣卒後義雲集其文筆七卷託魏收為之序樊遜字孝謙河東北猗氏人也祖琰父衡並無官宦而衡性至孝䘮父負土成墳植栢方數十畝朝夕號慕遜少好學其兄仲以造氊為業亦常優饒之遜自責曰為人弟獨受安逸可無愧於心乎欲同勤事業母馮氏謂曰汝欲謹小行邪遜感母言遂専心典籍嘗書壁作見賢思齊四字以自勸勉遜貌醜陋有才氣屬本州淪䧟寓居鄴中為臨漳小史縣令裴鑒莅官清苦致白雀等瑞遜上清徳頌十首鑒大加賞重擢為主簿仍薦之於右僕射崔暹與遼東李廣勃海封孝琰等為暹賓客人有譏其静嘿不能趨時者遜常服東方朔陸沈世俗避世金馬之論遂借陸沈公子為主人擬客難制客誨以自廣後崔暹大㑹賓客大司馬襄城王旭時亦在坐欲命府僚暹指遜曰此人學富才髙兼之佳行可為王參軍也旭目之曰豈能就邪遜曰家無䕃第不敢當此武定七年文襄崩暹為文宣徙於邊賓客咸散遜遂徙居陳留梁州刺史梁殺鬼以遜兼録事參軍遜仍舉秀才尚書按舊令下州三載一舉秀才為五年已貢開封人鄭祖獻計此年未合兼别駕王聰抗辭争議右丞陽斐不能却尚書令髙隆之曰雖遜才學優異待明年非逺遜竟還本州天保元年本州復召舉秀才三年春㑹朝堂對䇿䇿罷中書郎張子融奏入至四年五月遜與定州秀才李子宣等以對䇿三年不調被付外上書請從罷詔不報梁州重舉遜為秀才五年正月制詔問外中紀號又問求才審官又問釋道兩教又問刑罰寛猛又問禍福報恩遜對辭理兼舉尚書擢第以遜為當時第一十二月清河王岳為大行臺率衆南討以遜從軍明年文宣納梁貞陽侯蕭淵明為梁主岳假遜大行臺郎中使于江南與蕭脩侯瑱和解遜往還五日得脩等報書岳因與脩盟于江上大軍還鄴遜仍被都官尚書崔昻舉薦詔付尚書考為清平勤幹送吏部七年詔令校定羣書供皇太子遜與冀州秀才髙乾和瀛州秀才馬敬徳許散愁韓同寳洛州秀才傅懐徳懐州秀才古道子廣平郡孝亷李漢子勃海郡孝亷鮑長暄陽平郡孝亷景係前梁州府主簿王九元前開府水曹參軍周子深等十一人同被尚書召共刋定時祕府書籍紕繆者多遜乃議曰案漢中壘校尉劉向受詔校書每一書竟表上輙言臣向書長水校尉臣參書太常博士書中外書合若干本以相比校然後殺青今所讎校供擬極重出自蘭臺御諸甲館向之故事見存府閣即欲刋定必藉衆本太常卿邢子才太子少傅魏收吏部尚書辛術司農少卿穆子容前黄門郎司馬子瑞故國子祭酒李業興並是多書之家請牒借本參校袐書監尉瑾移尚書都坐凡所得别本三千餘卷五經諸史殆無遺闕于時魏收作庫狄干碑序令遜為之銘陸卭不知以為收合作也陸操伏渾卒楊愔使遜代已作書以吿晉陽朝士令魏潤色之收不能改一字八年減東西二省官更定選員不過三百參者二三千人楊愔言於衆曰後生清俊莫過盧思道文章成就莫過樊孝謙几案斷割莫過崔成之遂以思道長兼員外郎三人並員外將軍遜辭曰門族寒陋訪第必不成乞補員外司馬督愔曰才髙不依常例特奏用之河清初為主書參典詔䇿天統元年加員外郎居七八日行遇轜車嚬眉下淚指方相曰何日更當煩君一到數日而卒及雇方相送葬仍前所逢者遜死後定州秀才荀士遜繼為主書才名相亞時又有茹瞻者字孝博東安人南州舉秀才清朗剛直楊愔將用之曰今日之選不可無茹生後卒於侍御史劉逖字子長彭城叢亭里人太常卿芳之孫也芳自有傳父􅖢位金紫光禄大夫逖少聰敏好弋獵騎射以行樂為事愛交㳺善戱謔文襄以為永安公浚開府行參軍逖逺離家鄉倦於覊旅發憤自勵専精讀書晉陽都㑹之所覇朝人士攸集咸務於宴集逖在㳺宴之中卷不離手遇有文籍所未見者則終日諷誦或通夜不歸其好學如此亦留心文藻頗工詩詠天保初行定陶縣令坐姦事免十餘年不得調其姊為任氏婦沒入宫敕以賜魏収逖遂為收所提攜後為開府參軍及文宣崩文士並作挽歌楊遵彦擇之員外郎盧思道用八首逖用二首餘人多者不過三四中書郎李愔戲逖曰盧八問訊劉二逖銜之乾明元年兼員外散騎常侍使送梁主蕭莊還兼三公郎中武成時和士開寵要逖附之正授中書侍郎入典機宻時李愔獻賦言天保中被䜛逖摘其文奏曰誹謗先朝大不敬武成怒大加鞭朴逖喜復前憾曰髙搥兩下執鞭一百何如呼劉二時尋兼散騎常侍聘陳使主逖欲獨擅文藻不願與文士同行時黄門侍郎王松年妹夫盧士㳺性沈宻逖求以為副又逖姊魏家者收時已放出逖因次欲嫁之士㳺不許逖恐事泄亦不逼焉遷給事黄門侍郎脩國史加散騎常侍除假儀同三司聘周使副二國始通禮儀未定逖與周朝議論往復斟酌古今事多合禮兼文辭可觀甚得名譽使還拜儀同三司及武成崩和士開欲改元議者各異逖請為武平私謂士開曰武平反為明輔逖作此以為公士開悦而從之時士開為衆口所排婁定逺同輔政逖遂囬附之使得西貨悉以餉定逺定逺外任逖不自安又隂結斛律明月胡長仁以自固士開知之未甚信忽於明月門巷逢之彌以為實初逖名宦未逹時欲事祖珽珽未原謂人曰我言彭城楚子應有氣俠唯將崔季舒詩示人殊乖氣望逖乃為弟娶珽女遂成宻好珽之將訴趙彦深和士開也先與逖謀逖乃吿二人故二人得為之計珽被黜令弟出其妻及是逖始解士開所嫌尋出為仁州刺史珽乃要行臺尚書盧潛陷逖許潛重遷潛曰如此事吾不為也更戒逖而䕶之後被徴還待詔文林館重除散騎常侍奏門下事未幾與崔季舒等同戮時年四十九所制文筆三十卷子逸民開府行參軍仕隋終於洛陽荀士遜廣平人也好學有思理為文清典見賞知音武定末舉司州秀才迄天保十年不調皇建中馬敬徳薦為主書轉中書舎人狀貌甚醜以文辭見重嘗有事湏奏遇武成在後庭因左右傳通傳通者不得士遜姓名乃云醜舎人帝曰必士遜也看封題果是人莫不歡笑累遷中書侍郎號為稱職與李若等撰典言行於世齊亡年卒後周案周書不立文苑傳李延壽取王襃庾信為目又以顔之推從齊入周故列於王庾之下顔之儀既之推之弟故列於之推之末今從李氏編此四人王襃字子淵琅邪臨沂人也曽祖儉齊太尉南昌文憲公祖騫父規並梁侍中皆襲南昌侯俱有重名於江左齊梁各有傳襃識量淹通志懐沈静羙風儀善談笑博覽史傳七嵗能屬文外祖梁司空袁昻愛之謂賓客曰此兒當成吾宅相弱冠舉秀才除祕書郎太子舎人梁國子祭酒蕭子雲襃之姑夫也特善草𨽻襃少以姻戚往來其家遂相模範俄而名亞子雲並見重於時梁武帝嘉其才藝遂以弟鄱陽王恢女妻之起家祕書郎襲爵南昌縣侯遷祕書丞宣城王大器簡文帝之冢嫡即襃之姑子也于時盛選僚佐以襃為文學尋遷安成内史及侯景䧟建鄴襃寧輯所部見稱於時轉南平内史及梁元帝嗣位於江陵召襃西上帝與襃有舊相得甚歡累拜尚書右僕射仍遷左丞兼參掌制誥襃既世胄名家文學優贍當時咸相推挹故旬月之間位升端右寵遇日隆而襃愈自謙虚不以位地矜物時論稱之初元帝平侯景及禽武陵王紀之後以建鄴凋殘方湏脩復江陵殷盛便欲安之又其故府臣僚皆楚人也並願即都荆郢嘗召羣臣議之領軍將軍胡僧祐吏部尚書宗懔太府卿黄羅漢御史中丞劉㲄等曰建鄴雖是舊都王氣已盡且與北冦隣接止隔一江若有不虞悔無及矣臣等又聞荆南之地有天子氣今陛下龍飛纂業其應斯乎天時人事基祥如此臣等所見遷徙非宜元帝深以為然時襃與尚書周𢎞正咸侍坐上乃顧謂襃等曰卿意以為如何襃性謹慎知元帝多猜忌弗敢公言其非當時唯唯而已後因清閑密諫言辭甚切帝納之然其意好荆楚已從僧祐等䇿竟不能用明日乃衆中謂褒曰卿昨勸歸建鄴不為無理襃以宣室之言豈宜顯之於衆知其計不用於是不復言及魏大軍征江陵元帝授襃都督城西諸軍事襃本以文雅見知一旦委以總戎深自勉勵被圍之後上下猜忌惟命襃與朱買臣率衆出西陽之西門買臣大敗襃督進不能禁城䧟襃從元帝入子城猶欲固守俄而元帝出降襃遂與衆俱出見柱國于謹謹甚禮之襃曽作燕歌行妙盡闗塞寒苦之狀元帝及諸文士並和之而競為悽切之詞至此方驗襃與王克劉㲄宗懔殷不害等數十人俱至長安文帝喜曰昔平吳之利二陸而已今定楚之功羣賢畢至可謂過之矣又謂襃及王克曰吾即王氏甥也卿等並吾之舅氏當以親戚為情勿以去鄉介意於是授襃及殷不害等車騎大將軍儀同三司常從容上席資餼甚厚襃等亦並荷恩眄忘其覊旅焉孝閔踐阼封石泉縣子明帝即位篤好文學時襃與庾信才名最髙特加親待帝每㳺宴命襃等賦詩論談常在左右尋加開府儀同三司保定初除内史中大夫武帝作象經令襃注之引據該洽甚見稱賞襃有器局雅識政體既累世在江東為宰輔帝亦以此重之建徳以後頗參朝議凡大詔册皆令襃具草東宫既建授太子少保遷少司空仍掌綸誥乘輿行幸襃常侍從初襃與梁處士汝南周𢎞讓相善及𢎞讓兄𢎞正自陳來聘帝許褒等通親知音問襃贈𢎞讓詩并致書其辭甚羙尋出為宜州刺史卒官年六十四子鼐嗣庾信字子山南陽新野人也祖易齊處士名在隠逸傳父肩吾梁贈中書令與伯父於陵同傳信㓜而俊邁聰敏絶倫博覽羣書尤善春秋左氏傳身長八尺腰帶十圍容止頽然有過人者起家湘東國常侍時父肩吾為梁太子中庶子掌管記東海徐摛為左衞率摛子陵及信並為抄撰學士父子在東宫出入禁闈恩禮莫與比隆既有盛才文並綺艷故世號為徐庾體焉當時後進競相模範每有一文亰都莫不傳誦累遷度支郎中尋兼通直散騎常侍聘於東魏文章辭令盛為鄴下所稱還為東宫學士領建康令侯景作亂梁簡文帝命信率宫中文武千餘人營於朱雀航及景至信以衆先退臺城䧟信奔江陵梁元帝承制除御史中丞及即位轉右衛將軍封武康縣侯加散騎常侍來聘西魏屬大軍南討遂留長安江陵平累遷右金紫光禄大夫開府儀同三司孝閔帝踐阼封臨清縣子除司水下大夫出為𢎞農郡守遷驃騎大將軍開府儀同三司司憲中大夫進爵義城縣侯俄拜洛州刺史信多識舊章為政簡静吏民安之時陳氏與朝廷通好南北流寓之士各許還其舊國陳氏乃請王襃及信等十數人武帝唯放王克殷不害等信及王襃並惜而不遣尋徴為司宗中大夫眀帝武帝並雅好文學信特䝉恩禮至於趙滕諸王周旋款至有若布衣之交羣公碑誌多相請託唯王襃頗與信相埒自餘文人莫有逮者信雖位望通顯常有鄉闗之思乃作哀江南賦以致其意大象初以疾去職隋開皇元年卒年六十九有文集二十卷文帝悼之贈本官加荆雍二州刺史子立嗣顔之推字介琅邪臨沂人也九世祖含從晉元帝渡江官至侍中祖見逺齊御史中丞父協梁湘東王繹諮議參軍以義烈稱世善周官左氏學恊在梁文苑傳之推早傳家業年十二遇湘東王自講莊老之推便預門徒然虚談非其所好還習禮傳徧覽羣書無不該洽詞情典麗甚為西府所稱湘東王以為其國右常侍加鎮西墨曹參軍性好飲酒多任縱不修邊幅時論以此少之湘東王遣世子方諸出鎮郢州以之推為中撫軍府外兵參軍掌管記值侯景陷郢州之推被執景頻欲殺之頼其行臺郎中王則救免及景平還江陵時湘東王繹即位以為散騎侍郎奏舎人事後為周軍所破大將軍李穆重之送往𢎞農令掌其兄陽平公逺書翰遇河水暴長具船將妻子奔齊經砥柱之險時人稱其勇決文宣見而悦之即除奉朝請引於内館中侍從左右頗被顧眄後從至天泉池以為中書舎人令中書郎叚孝信將勑示之推之推時在營外飲酒孝信還以狀言文宣乃曰且停由是遂寢後待詔文林館除司徒錄事參軍之推聰頴機悟博識有才辯工尺牘應對閑雅大為祖珽所重令掌知館事判署文書遷通直散騎侍郎俄領中書舎人帝時有取索恒令中使傳㫖之推禀承宣告館中皆受進㫖所進文書皆是其封署於進賢門奏之待報方出之推兼善於文字常監校繕寫又處事勤敏號為稱職帝甚加恩接為勲要者所嫉常欲害之崔季舒等之將諫也之推時取急還宅故不連署及召集諫人之推亦被喚入及勘審無名得免尋除黄門侍郎及周兵陷晉陽帝輕騎還鄴窘急中計無所從之推因宦者侍中鄧長顒進奔陳䇿仍勸募吳士千人以為左右取青徐路共投陳國帝納之以吿丞相阿那肱等阿那肱不願入陳乃云吳士難信勸帝送珍寳累重向青州且守三齊地若不可保浮海南渡未為遲也時雖不從之推䇿然猶以為平原太守令守河津齊亡入周大象末為御史上士隋開皇中太子召為文學深見禮重尋以疾終有文集三十卷撰家訓二十篇並行於世又曽撰觀我生賦文致清逺之推有二子長曰思魯次曰敏楚盖不忘本也之推集思魯自為序録之推弟之儀字子升幼頴悟三嵗能讀孝經及長博渉羣書好為辭賦嘗獻梁元帝荆州頌辭致雅贍帝手勑報曰枚乘二葉俱得遊梁應貞兩世並稱文學我求才子鯁慰良深江陵平之儀隨例遷長安眀帝以為麟趾學士稍遷司書上士武帝初建儲宫盛選師傅以之儀為侍讀太子後征吐谷渾在軍有過行鄭譯等並以不能匡弼坐譴唯之儀以累諫獲賞即拜小宫尹封平陽縣男宣帝即位遷上儀同大將軍御正中大夫進爵為公帝後刑政乖僻昬縱日甚之儀犯顔驟諫雖不見納終亦不止深為帝所忌然以恩舊每優容之及帝將殺王軌之儀固諫帝怒欲并致之於法後以其諒直無私乃舎之宣帝崩劉昉鄭譯等矯遺詔以隋文帝為丞相輔少主之儀知非帝㫖拒而不從昉等草詔署訖逼之儀署之儀厲聲謂昉等曰主上升遐嗣子㓜沖阿衡之任宜在宗英方今賢戚之内趙王最長以親以徳合膺重寄公等備受朝恩當思盡忠報國柰何一旦欲以神器假人之儀有死而已不能誣罔先帝於是昉等知不可屈乃代之儀署而行之隋文帝後索符璽之儀又正色曰此天子之物自有主者宰相何故索之於是文帝大怒命引出將戮之然以其民望乃止出為西疆郡守及隋文踐阼詔徴還亰師進爵新野郡公開皇五年拜集州刺史在州清静夷夏悦之明年代還遂優㳺不仕十年正月隨例入朝隋文望而識之命引至御坐謂之曰見危致命臨大節而不可奪古人所難何以加卿乃賜錢十萬米一百石十一年冬卒年六十九有文集十卷行於世隋按隋書序劉臻崔儦王頍諸葛頴王貞孫萬壽虞綽王胄庾自直潘徽凡十人為文苑傳李延壽復取虞世基栁辯許善心李文博明克讓五人冠於劉崔之上今從李氏所増編為次第虞世基字茂世㑹稽餘姚人也父荔陳太子中庶子陳史有傳世基㓜沈静喜怒不形於色博學有髙才兼善草𨽻陳中書令孔奐見而歎曰南金之貴屬在斯人少傅徐陵聞其名召之世基不往後因公㑹陵一見而竒之顧謂朝士曰當今潘陸也因以弟女妻之仕陳累遷尚書左丞陳主嘗於莫府山校獵令世基為講武賦於坐奏之陳主嘉之賜馬一匹及陳滅歸國為通直郎直内史省貧無産業每傭書飬親怏怏不平嘗為五言詩以見情文理悽切世以為工作者無不吟詠未幾拜内史舎人煬帝立顧遇彌隆祕書監栁顧言博學有才罕所推謝至是與世基相見歎曰海内當共推此一人非吾儕所及也俄遷内史侍郎以母憂去職哀毁骨立有詔起令視事拜見之日殆不能起帝令左右扶之哀其羸瘠詔令進肉世基食輙悲哽不能下筯帝使謂之曰方相委任當為國惜身前後敦勸者數矣帝重其才親禮逾厚専典機密與納言蘇威左翊衞大將軍宇文述黄門侍郎裴矩御史大夫裴藴等參掌朝政于時天下多事四方表奏日有百數帝方凝重事不廷决入閤之後始召世基口授節度世基至省方為敕書日且百紙無所遺謬其精審如此遼東之役進位金紫光禄大夫後從幸鴈門為突厥所圍戰士多敗世基勸帝重為賞格親自撫循又下詔停遼東事帝從之師乃復振及圍解勲格不行又下伐遼之詔由是言其詐衆朝野離心帝幸江都次鞏縣世基以盜賊日盛請發兵屯洛口倉以備不虞帝不從但云卿是書生定猶恇怯于時天下大亂世基知帝不可諫正又以髙熲張衡等相繼誅戮懼禍及已雖居近侍唯諾取容不敢忤意盜賊日甚郡縣多沒世基知帝惡數聞之後有告敗者乃損抑表狀不以實聞是後外間有變帝弗之知也嘗遣太僕卿楊義臣捕盜河北降賊數十萬列狀上聞帝歎曰我初不聞賊頓如此義臣列降賊何多也世基曰䑕竊雖多未足為慮義臣克之擁兵不少久在閫外此最非宜帝曰卿言是也遽追義臣放散其兵又越王侗遣太常丞元善逹間行賊中詣江都奏事稱李密有衆數萬圍逼亰都賊據洛口倉城内無食若陛下速還烏合必散不然者東都決沒因歔欷嗚咽帝為之改容世基見帝色憂進曰越王年小此輩誑之若如所言善逹何縁得至帝乃勃然怒曰善逹小人敢廷辱我因使經賊中向東陽催運善逹遂為盜所殺此後外人杜口莫敢以賊聞奏世基氣貌沈審言多合意是以特見親愛朝臣無與為比其繼室孫氏性驕滛世基惑之恣意奢靡雕飾器服無復素士之風孫氏復攜前夫子夏侯儼入世基舎而頑鄙無頼為之聚斂鬻官賣獄賄賂公行其門如市金寳盈積其弟世南素有國士之風而清貧不立未曽有所贍由是為論者所譏朝野咸共疾怨宇文化及之弑逆也世基乃見害焉長子肅好學多才藝時人稱有家風弱冠早沒肅弟熙大業末為符璽郎次子柔晦並宣義郎化及將亂之夕宗人虞伋知而告熙曰事勢已然吾將濟卿南度且得免禍同死何益熙曰棄父背君求生何地感尊至懐自此訣矣及難作兄弟競請先死行刑人於是先世基殺之栁𧦬字顧言本河東人也永嘉之亂徙家襄陽祖惔梁尚書左僕射梁史有傳父暉梁都官尚書𧦬少聪敏解屬文好讀書所覽將萬卷仕梁為著作佐郎後蕭詧據荆州以為侍中領國子祭酒吏部尚書及梁國廢拜開府遷内史侍郎以無吏幹去職為晉王諮議參軍王好文雅招引才學之士諸葛頴虞世南王胄朱瑒等百餘人以充學士而𧦬為之冠王以師友處之毎有文什必令其潤色然後示人嘗朝亰還作歸藩賦命𧦬為之序辭甚典麗初王屬文斆庾信體及見𧦬已後文體遂變仁壽初引為東宫學士加通直散騎常侍檢校洗馬甚見親待每召入卧内與之宴謔性尤俊辯多在侍從有所顧問應答如響性又嗜酒言雜俳謔由是彌為太子所親狎以其精於内典令撰法華宗為二十卷上之太子覽而大悦賞賜優洽儕輩莫與為比煬帝嗣位拜祕書監封漢南縣公帝退朝之後便命入閤言宴諷讀終日而罷帝每與嬪后對酒時逢興㑹輙遣命之至與同榻共席恩比朋友帝猶恨不能夜召於是使匠刻木為偶人以像𧦬而施機闗令能坐起拜伏帝毎於月下對飲酒輙令宫人置之於座與相醻酢而為歡笑從幸揚州卒年六十九帝傷惜者久之贈大將軍諡曰康𧦬撰晉王北伐記十五卷有集十卷行於世許善心字務本髙陽北新城人也祖懋梁太子中庻子父亨梁黄門侍郎仕陳歴位衞尉卿懋亨俱有傳善心九嵗而孤為母范氏所鞠養幼聰明有思理所聞輙能誦記多聞黙識為當代所稱家有舊書萬餘卷皆徧通渉十五解屬文為牋上父友徐陵陵大竒之謂人曰才調極髙此神童也太子詹事江總舉秀才對䇿髙第授度支郎中補撰史學士禎明二年加通直散騎常侍聘於隋遇髙祖伐陳禮成而不獲反命累表請辭上不許留縶賓館及陳亡髙祖遣使告之善心素服號哭於西階之下藉草東向經三日敕書唁焉明日有詔就館授通直散騎常侍賜衣一襲善心哭盡哀入房改服復出北面立垂涕再拜受詔明日乃朝服泣於殿下悲不能興上顧左右曰我平陳國唯獲此人既能懐其舊君即是我誠臣也敕以本官直門下省賜物千段馬二十匹從幸太山還授虞部侍郎十六年有神雀降於含章闥髙祖召百官賜宴告以此瑞善心於坐請紙筆製神雀頌奏之髙祖甚悦曰我見神雀共皇后觀之今且召公等入適述此事善心於坐始知即能成頌文不加㸃筆不停毫常聞此言今見其事因賜物二百段十七年除祕書丞于時祕藏圖籍尚多淆亂善心倣阮孝緒七録更制七林各為總敘冠於篇首又於部録之下明作者之意區分其類例焉又奏追李文博陸從典等學者十許人正定經史錯謬仁壽元年攝黄門侍郎二年加攝太常少卿與牛𢎞等議定禮樂祕書丞黄門郎並如故四年留守京師帝崩于仁壽宫煬帝祕不發喪先易留宫人出善心為巖州刺史逢漢王諒反不之任大業元年轉禮部侍郎薦儒者徐文逺為國子博士包愷陸徳明褚徽魯世逹之輩並加品秩授為學官其年副納言楊逹為冀州道大使以稱㫖賜物五百段左衞大將軍宇文述每日借本部兵數十人以供私役為御史大夫梁毗所劾上方以腹心委述欲釋之付百寮議善心議免述官帝竟宥述後數月述乃譖善心曰陳叔寳卒善心與周羅㬋虞世基袁充蔡徴等同往送𦵏善心為祭文謂叔寳為陛下敢於今日加叔寳尊號罪至不赦帝召問有實善心自援古例事得釋然帝心惡之又太史奏帝即位之年與堯時符合朝臣皆欲上賀善心議以國哀甫爾不宜稱賀述諷御史劾之左遷給事郎降品二等四年撰方物志奏之七年從至涿郡帝方自總戎東討善心上封事忤㫖免官其年復徴守給事郎帝嘗言及髙祖受命之符因問鬼神之事敕善心與崔祖濬撰靈異記十卷善心父撰著梁史未就而沒善心述成父志修續家書為七十卷又為叙論一篇託于叙傳之末述其製作之意十年從至懐逺鎮加授朝散大夫突厥圍鴈門攝左親侍虎賁郎將領江南兵宿衛殿省駕幸江都追叙前勲授通議大夫詔還本品行給事郎十四年宇文化及弑逆之日隋官盡詣朝堂謁賀善心獨不至許𢎞仁馳告曰天子已崩宇文將軍攝政合朝文武莫不咸集天道人事自有代終何預於叔而低佪若此善心怒之不肯隨去𢎞仁返走上馬泣而言曰將軍於叔全無惡意忽自求死豈不痛哉還告唐奉義奉義以狀白化及遣人就宅執至朝堂化及令釋之善心不舞蹈而出化及目送之曰此大負氣命捉來罵曰我好欲放爾爾敢如此不遜其黨輙牽曵遂殺之年六十一及越王稱制贈左光禄大夫封髙陽縣公諡曰文節善心母范氏梁舎人孝才之女也少寡養孤博學有髙節髙祖知之敕尚食每獻時新常遣分賜嘗詔范入内侍皇后講讀封永樂郡君及善心遇禍范年九十有二臨喪不哭撫柩曰能死國難我有兒矣因卧不食後十餘日亦終李文博博陵人也性貞介鯁直好學不倦至於教義名理特所留心毎讀書至治亂得失忠臣烈士未嘗不反覆吟翫開皇中為羽林騎尉特為吏部侍郎薛道衡所知常令在聽事帷中披檢書史并察已行事若遇政教善事即抄撰記録如選用疎謬即委之臧否道衡毎得其語莫不欣然從之後直祕書内省典校墳籍守道居貧晏如也雖衣食乏絶而清操愈厲不妄通賓客恒以禮法自處儕輩莫不敬焉道衡知其貧毎延于家給以資費文博商畧古今治政得失如指諸掌然無吏幹稍遷校書郎出為縣丞遂得下考數嵗不調後道衡為司𨽻大夫遇於東都尚書省甚嗟愍之奏為從事因謂齊王司馬李綱曰今日遂遇李文博得奏用之以為歡笑其見賞知音如此在洛下曽詣房元齡元齡相送出衢路謂之曰公生平志尚唯在正直今既得為從事故應有㑹素心比來激濁揚清所為多少文博遂奮臂厲聲曰夫清其流者必潔其源正其末者湏端其本今治源混亂雖日免十貪郡守亦何所益其率直疾惡不知忌諱皆如此類時朝政寖壊人多贓賄唯文博不改其操論者以此貴之遭亂播遷不知所終初文博在内省校書虞世基子亦在其内盛飾容服而未有所知文博因從容問之年紀答云十八文博乃謂曰昔賈誼當此之年議論何事君今徒事儀容欲何為者又秦孝王妃生男髙祖大喜頒賜羣官各有差文博家道屢空人謂其悦賞乃云賞罰之設功過所歸今王妃生男於羣官何事乃妄受賞也其循名責實録過計功必使賞罰不濫功過無隱皆爾文博本為經學後讀史書於諸子及論尤所該洽性長議論亦善屬文著政道十卷行於世明克讓字𢎞道平原鬲人也祖僧紹隱遁有髙名南齊累徴不起名在隱逸傳父山賓梁侍中亦自有傳克讓少好儒雅善談論博渉書史所覽將萬卷三禮論語尤所研精龜䇿厯象咸得其要年十四釋褐梁湘東王法曹參軍時舎人朱异在儀賢堂講老子克讓預焉堂邊有脩竹异令克讓詠之克讓攬筆輒成卒章曰非君多愛賞誰貴此貞心异甚竒之仕梁位中書侍郎梁滅歸長安引為麟趾殿學士周武帝立為露門學士令與太史官屬正定新歴累遷司調大夫賜爵歴城縣伯髙祖受禪拜太子率更令進爵為侯太子以師道處之恩禮甚厚毎有四方珍味輒以賜之于時東宫盛徴天下才學之士至於博物洽聞皆出其下詔與太常牛𢎞等修禮議樂當朝典故多所裁正以疾去官加通直散騎常侍卒年七十上甚惜之二宫贈賻甚厚所著孝經義疏一部古今帝代記一卷文類四卷續名僧記一卷集二十卷子餘慶位司門郎越王侗稱制為國子祭酒劉臻字宣摯沛國相人也父顯梁尋陽太守梁史有傳臻年十八舉秀才為邵陵王東閤祭酒元帝時累遷中書舎人江陵陷沒歸魏為中書侍郎周冢宰宇文䕶辟為中外府記室軍書羽檄多成其手後為露門學士授大都督封饒陽縣子歴藍田令畿伯下大夫髙祖受禪進儀同三司皇太子勇引為學士甚親狎之臻無吏幹又性恍忽唯耽經史終日覃思至於世事多所遺忘有劉訥者亦任儀同俱為太子學士情好甚密臻住城南訥住城東臻自朝下嘗欲尋訥謂從者曰汝知劉儀同舎乎從者不知為尋訥謂臻還家因答曰知於是引之而去既扣門臻尚未悟謂至訥家乃據鞍大呼曰劉儀同在乎可出矣其子迎門臻驚曰汝亦來邪其子答云此是大人家於是顧眄久之乃悟遂叱從者曰汝大無意吾欲造劉訥耳性好􅀈蜆以音同父諱呼為扁螺其疎放多此類也精於兩漢書時人稱為漢聖開皇十八年卒年七十二有文集十卷行於世崔儦字岐叔清河東武城人也父仲文北齊光禄大夫仲文附載其兄東兖州刺史㥄傳儦少與范陽盧思道隴西辛徳源同志友善毎以讀書為務負恃才地大署其户曰不讀五千卷書無得入此室初舉秀才為員外散騎侍郎遷殿中侍御史與熊安生馬敬徳等議五禮兼脩律令尋除散騎侍郎使陳還待詔文林館歴尚書郎與頓邱李若俱見稱重時人語曰亰師灼灼崔儦李若若每謂其子曰盧思道崔儦杳然崖岸吾所重也汝其師之思道與儦嘗酒後相調儦曰偃邈無聞思道譏儦云髙曽官薄齊亡歸郷仕郡為功曹補主簿開皇四年徴授給事郎兼内史舎人後兼通直散騎侍郎聘陳還授員外散騎侍郎以聾常得無事一醉輙八日越國公楊素時方貴幸重儦門地為子元縱娶其女為妻聘禮甚厚親迎之始公卿滿坐素令騎迎之儦弊衣冠騎驢而至素推令上坐儦禮甚倨言又不遜素忿然拂衣而去竟罷坐後數日儦方來謝素待之如初詔授易州刺史或言其未合乃追停儦語人曰易州刺史何必勝道義仁壽中卒於京師子世濟王頍字景文太原沂人梁大司馬僧辯之子也兄頒入周仕隋卒於齊州刺史列在孝友傳頍年數嵗值江陵䧟隨諸兄入闗少好遊俠年二十尚不知書為其兄顒所責怒於是感激始讀孝經論語晝夜不倦遂讀左傳禮易詩書乃歎曰書無不可讀者勤學累載遂徧通五經究其指趣大為儒者所稱解綴文善談論年三十周武帝引為露門學士毎有議决多頍所為又性識甄眀精力不倦好讀諸子偏記異書當世稱為博物又曉兵法有縱横之志每歎不逢時常以將相自許開皇初授著作佐郎尋令於國子講授㑹帝親臨釋奠國子祭酒元善講孝經頍與相論難詞義鋒起善往往見屈帝大竒之超授國子博士後坐事解職配防嶺南數載授漢王諒府諮議參軍王甚禮之時諒見房陵及秦蜀二王相次廢黜潛有異志頍遂隂勸諒繕治兵甲及髙祖崩諒遂舉兵多頍之計也頍後數進䇿諒不能用楊素至蒿澤將戰頍謂其子曰氣候殊不佳兵必敗汝可隨從我既而兵敗頍將歸突厥至山中徑路斷絶知必不免謂其子曰吾之計謀不減楊素但為言不見用遂至於此不能坐受禽執以成豎子之名也吾死後汝慎勿過親故於是自殺瘞之石窟中其子數日不得食遂過其故人竟為所禽楊素求頍屍得之斬首梟於太原頍所撰五經大義三十卷有集二十卷並因兵亂無復存焉諸葛頴字漢賢丹陽建康人也祖詮梁零陵太守父規義陽太守頴年十八能屬文起家邵陵王參軍事轉記室侯景之亂奔齊待詔文林館歴太學博士太子舎人周氏平齊不得調杜門不出者十餘年習易圖緯蒼雅莊老頗得其要清辯有俊才煬帝為晉王時聞其名引為參軍事轉記室及為太子除藥藏郎至即位遷著作郎甚見親倖出入卧内帝毎賜之曲宴輒與皇后嬪御連席共榻頴因間隙多所譖毁是以時人謂之冶葛後録恩舊授朝散大夫帝常賜頴詩其卒章曰參翰長洲苑侍講肅成門名理窮硏覈英華恣討論實録資平允傳芳導後昆其待遇如此從征吐谷渾加正議大夫從駕北廵卒於道頴性褊急與栁𧦬每相忿䦧帝屢責怒之而猶不止於後帝亦薄之有集二十卷撰鑾駕北巡記三卷幸江都道里記一卷洛陽古今記一卷馬名録二卷並行於世有子嘉㑹王貞字孝逸梁郡陳留人也少聰敏七嵗好學善毛詩禮記左氏傳周易諸史百家無不畢覽善屬文不事産業每以諷讀為娛開皇初汴州刺史樊叔畧引為主簿後舉秀才授縣尉非其好也謝病于家煬帝即位齊王暕鎮江都聞其名以書召之及至以客禮待之索其文集貞上三十三卷為唘陳謝齊王覽集甚善之賜良馬四匹貞復上江都賦王賜錢十萬貫良馬二匹未幾以疾甚還郷終於家孫萬壽字仙期一字遐年武邑武遂人也父靈暉為齊南陽王綽大將軍司馬齊儒林有傳萬壽聰識機警博渉經史善屬文羙譚笑在齊為陽休之開府行參軍及髙祖受禪滕穆王引為文學坐衣冠不整配防江南行軍總管宇文述召典軍書萬壽本自書生從容文雅一旦從軍鬱鬰不得志為五言詩贈京邑知友詩至京盛為當時吟誦天下好事者多書壁上而翫之後歸郷里十餘年不得調仁壽初徴豫章王長史非其好也王轉封于齊即為齊王文學當時諸王官屬多被夷滅由是彌不自安因謝病免久之授大理司直卒於官有集十卷行於世虞綽字士裕㑹稽餘姚人也父孝曽陳始興王諮議綽身長八尺姿儀甚偉博學有俊才尤工草𨽻陳左衞將軍傅縡有盛名於世見綽辭賦歎羙之仕陳為太學博士遷永陽王記室及陳亡晉王廣引為學士大業初轉為袐書學士奉詔與袐書郎虞世南著作佐郎庾自直等撰長洲玉鏡等書十餘部綽所筆削帝未嘗不稱善而官竟不遷初為校書郎以藩邸左右授宣恵尉遷著作佐郎與虞世南庾自直蔡允恭等四人常直禁中以文翰待詔恩眄隆洽從征遼東帝舎臨海頓見大鳥異之詔綽為銘帝覽而善之命有司勒於海上以度遼功授建節尉綽恃才任氣無所降下著作郎諸葛頴以學業幸於帝綽每輕侮之由是有隙帝嘗問綽於頴頴曰虞綽麤疎人也帝頷之時禮部尚書楊元感稱其貴踞虚已禮之與結布衣之友綽數從之遊其族人虞世南誡之曰上性猜忌而君過厚元感若與絶交者帝知君改悔可以無咎不然終當見禍綽不從尋有告綽以禁内兵書借元感帝甚銜之及元感敗其妓妾並入宫帝因問之曰元感平常時與何人交往其妾以虞綽對帝令大理卿鄭善果窮理其事綽曰羈旅薄遊與元感文酒談欵實無他謀帝怒不解徙綽于邊綽至長安而亡吏逮之急於是潛度江變姓名自稱吳卓㳺東陽抵信安令天水辛大徳舎嵗餘綽與人争田相訟因有識綽者而告之竟為吏所執坐斬江都綽所著詞賦並行於世大徳為令誅翦羣盗甚得人和與綽俱為使者所執其妻泣曰每諌君無匿學士今日之事豈不哀哉大徳笑曰我本圖脫長者乃為人告之吾罪也當死以謝綽會有詔死罪得以撃賊自効信安吏人詣使者叩頭曰辛君人命所懸不然亦無信安矣使者留之以討賊帝怒斬使者大徳獲全王胄字承基琅邪臨沂人也祖筠梁太子詹事父祥陳黄門侍郎筠附載其伯父光禄大夫志傳列在梁史胄少有逸才仕陳歴東陽王文學及陳滅晉王廣引為博士仁壽末從劉方撃林邑以功授帥都督大業初為著作佐郎以文詞為煬帝所重帝自東都還亰師賜天下大酺四日因為五言詩詔羣官詩成者奏之帝覽胄詩而善之因謂侍臣曰氣髙致逺歸之於胄詞清體潤其在世基意密理新惟庾自直過此者未可以言詩也帝所有篇什多令繼和與虞綽齊名同志友善于時後進之士咸以二人為凖的從征遼東進授朝散大夫胄性疎率不倫自恃其才鬰鬰於薄宦每負氣陵傲忽畧時人為諸葛頴所疾屢譖之於帝帝愛其才而不罪禮部尚書楊元感虚襟與交㳺數㳺其第及元感敗與虞綽俱徙邊胄遂亡匿潛還江左為吏所捕坐誅所著詞賦多行於世胄兄眘字元恭博學多通少有盛名於江左仕陳歴太子洗馬中書舎人陳亡與胄俱為學士煬帝即位授祕書郎卒於官庾自直潁川人也父持陳太中大夫自有傳自直少好學沈静寡慾仕陳歴豫章王府外兵參軍記室陳亡入闗不得調晉王廣聞之引為學士大業初授著作佐郎自直解屬文於五言詩尤善性恭慎不妄交遊特為帝所愛有篇章必先示自直令其詆訶自直所難帝輙改之或至於再三俟其稱善然後方出其見親禮如此後以本官知起居舎人事宇文化及作逆與之北上自載露車中感激發病卒有文集十卷行於世潘徽字伯彦吳郡人也性聰敏少受禮於鄭灼受毛詩於施公受書於張沖講莊老於張譏並通大義尤精三史善屬文能持論中書江總引致文儒之士徽一詣總甚敬之釋褐新蔡王國侍郎選為客館令隋遣魏澹聘于陳陳人使徽接對之澹將反命為啓陳主曰敬奉𢎞慈曲垂餞送徽以餞送為重敬奉為輕却其啓而不奏澹曰曲禮云士敬客詩曰維桑與梓必恭敬止孝經宗廟致敬又云不敬其親謂之悖禮孔子敬天之怒成湯聖敬日躋宗廟極重上天極髙父極尊君極貴四者咸同一敬五經未有異文不知以敬為輕竟何所據徽難之曰向所論敬字本不全以為輕但施用處殊義成通别禮主於敬此是通言猶如男子冠而字之注云成人敬其名也春秋有冀缺夫妻亦云相敬於子則有敬名之義在夫亦有敬妻之説此可復並極髙極尊乎至若敬謝諸公固非尊地公子敬愛止施賓友敬問敬報彌見雷同敬聽敬酬何闗貴隔當知敬之為義雖是不輕但敬之於語則有時混漫今云敬奉所以成疑聊舉一隅未為深據澹不能對遂從而改焉及陳滅為州博士秦王俊聞其名召為學士嘗從俊朝京師在途令徽於馬上為賦行一驛而成名曰述思賦俊覽而善之復令為萬字文又遣撰集字書名為韻纂徽為之序俊薨晉王廣復引為揚州博士令與諸儒撰江都集禮一部復令徽為序煬帝嗣位徽與著作郎陸從典太常博士褚亮歐陽詢等助越公楊素撰魏書㑹素薨而止授京兆郡博士楊元感兄弟重之數相往來及元感敗凡所交闗多罹其患徽以元感故人為帝所不悦有司希㫖出徽為西海郡威定縣主簿意甚不平至隴頭發病而卒時又有常得志尹式劉善經祖君彦孔徳紹劉斌並有才名事多遺逸常得志亰兆人為秦王記室及王薨過故第為五言詩辭理悲壯甚為時人所重復為兄弟論義理可稱尹式河間人仁壽中官至漢王記室漢王阻兵式自殺其族人正卿彦卿亦俱有儁才名顯於世劉善經河間人歴著作佐郎太子舎人著酬徳傳三十卷諸劉譜三十卷四聲指歸一卷行於世祖君彦見其父珽傳孔徳紹㑹稽人有清才官至亰城縣丞竇建徳署為中書令専典書檄及建徳敗伏誅劉斌南陽人祖之遴梁史有傳斌頗有詞藻官至信都司功書佐竇建徳署為中書舎人建徳敗復為劉黒闥中書侍郎與黒闥亡歸突厥不知所終通志卷一百七十六
