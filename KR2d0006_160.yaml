body:
  text: 通志卷一百三十七宋右迪功郎鄭樵漁仲撰列傳第五十齊褚淵長子賁父賁弟蓁照淵弟澄淵從弟照弟炫王儉儉弟遜僧儉叔父虔僧僧虔子慈從僧虔從子祐僧祐子融栁世隆王晏子德元晏弟詡弟晏從父思逺徐孝嗣王琨張敬兒王敬則陳顯達庾𢎞逺崔慧景宗人恭祖逞東陽女子婁李安人子元履戴僧靜桓康焦度曹虎吕安國周山圖周盤龍子奉叔王廣之垣崇祖夏侯恭叔兄崇祖從父榮祖曇榮祖從父閎鄭閎子憘伯賔閎弟子深曇深妻氏邱景沈文季兄子昭略光昭略弟昭光昭兄子曇亮劉懷珍子靈哲善從子懷慰族弟明善明從弟僧副薛深張欣泰王奐從父兄繢繢弟約褚淵字彥回河南陽翟人也祖秀之宋太常父湛之尚書左僕射附載叔父祠部尚書裕之傳淵少有清譽宋元嘉末魏軍逼瓜步百姓咸負簷而立湛之時為丹陽尹使其子弟並著芒屩於齋前習行或譏之湛之曰安不忘危也淵時年十餘嵗甚有慙色湛之有一牛至所愛無故墮聽事前井湛之率左右躬自營救之郡中喧擾淵下簾不視也又有門生盜其衣淵遇見謂曰可密藏之勿使人見此門生慙而去不敢復還後貴乃歸罪待之如初淵尚文帝女南郡獻公主姑姪二世相繼拜駙馬都尉除著作佐郎纍遷祕書丞湛之卒淵悉推財與弟澄唯取書數千卷湛之有兩厨寶物在淵所生郭氏間嫡母吳縣公主求之郭欲不與淵曰但令淵在何患無物猶不許淵流涕固請乃從之襲爵都鄉侯歷位尚書吏部郎景和中山隂公主淫恣窺見淵而悅之以白帝帝召淵西上閣宿十日公主夜就之備見逼迫淵整身而立從夕至曉不為移志公主謂曰君鬚髯如戟何無丈夫意淵曰淵雖不敏何敢首為亂階宋明帝即位纍遷吏部尚書有人求官密於袖中將一餅金因求請間出金示之曰人無知者淵曰卿自應得官無假此物若必見與不得不相告此人大懼收金而去淵敘其事而不言其名時人莫之知也帝之在藩也與淵以風素相善至是深相委寄陳事皆見從改封雩都伯歷侍中領尚書右衛將軍淵美儀貌善容止俯仰進退咸有風則每朝會百僚及逺國使莫不延首目送之明帝嘗歎曰褚淵能遲行緩步便得宰相矣時人以方何平叔嘗聚袁粲舍初秋涼夕風月甚美淵援琴奏別鵠之曲宫商既調風神諧暢王彧謝莊並在粲坐撫節而歎曰以無纍之神合有道之器宫商暫離不可得已時傖人常珍竒與薛安都為逆降叛非一後又求降明帝加以重位淵謂全其首領於事已𢎞不足大加寵異帝不從珍竒尋又叛淵後為吳郡太守帝寢疾危殆馳使召之欲託後事及至召入帝自帳中流涕曰吾近危篤故召卿欲使著黃羅􅘼耳指牀頭大函曰文書皆函內冀此函不得復開淵亦悲不自勝黃羅􅘼乳母服也帝雖小間猶懷身後慮建安王休仁人才令美物情宗尚帝與淵謀誅之淵以為不可帝怒曰卿癡不足與議事淵懼而奉旨復為吏部尚書衛尉卿尚書右僕射淵以母年髙羸疾晨昏須侍養辭衛尉不許明帝崩遺詔以為中書令護軍將軍與尚書令袁粲受顧命輔幼主粲等雖同見託而意在淵淵同心理事當奢侈之後務𢎞儉約百姓賴之既而王道隆阮佃夫用事姦賂公行淵不能禁也遭庶母郭氏喪數日中毁頓不可復識期年不盥櫛唯泣淚處乃見其本質焉詔斷哭禁弔客葬畢起為中軍將軍本官如故元徽三年桂陽王休範反淵與衛將軍袁粲入衛宫省鎮集衆心淵初為丹陽與從弟照同載出道逢髙帝淵舉手指髙帝車謂照曰此非常人也出為吳興髙帝餉物別淵又語人曰此人才貌非常將來不可測也及顧命之際引髙帝與焉髙帝既平桂陽遷中領軍南兖州髙帝固讓與淵及衛軍袁粲以書陳情淵粲答書不從髙帝乃受命其年加淵尚書令侍中給班劍二十人固讓令三年進爵為侯服闋改授中書監侍中護軍如故給鼓吹一部時淮地屬北江南無復鰒魚或有間關得至者一枚直數千錢人有餉淵鰒魚三十枚淵時雖貴而貧薄過甚門生有獻計賣之云可得十萬錢淵變色曰我謂此是食物非曰財貨且不知堪賣錢聊爾受之雖復儉乏寧可賣餉取錢也悉與親遊噉之少日便盡明年嫡母吳郡公主薨毁瘠如初葬畢詔攝職固辭又以期祭禮及表解職並不許蒼梧暴虐稍甚髙帝與淵及袁粲言世事粲曰主上幼年微過易改伊霍之事非季世所行縱使功成亦終無全地淵默然歸心髙帝及廢蒼梧羣公集議袁粲劉秉既不受任淵曰非蕭公無以了此手取事授髙帝帝曰相與不肯我安得辭事乃定順帝立改號將軍開府儀同三司侍中如故甲仗五十人入殿袁粲雖與淵勠力常疑淵有異志曰褚公眼睛多白所謂白虹貫日亡宋者終此人也他日又謂淵曰國家所倚惟公與劉丹陽及粲耳願各自勉無使竹帛所笑淵曰願以鄙心寄公之腹則可矣然竟不能貞固及髙帝輔政王儉議加黃鉞任遐曰此大事應報褚公帝曰褚脫不與卿將何計遐曰彥回保妻子愛性命非有竒才異節遐能制之果無違異及沈攸之事起髙帝召淵謀之淵曰西夏釁難事必無成公當先備其內耳蓋謂袁粲之徒也髙帝密為其備事平進中書監司空齊臺建淵白髙帝引何曾自魏司徒為晉丞相求為齊官髙帝嫌而不許建元元年進位司徒侍中中書監如故改封南康郡公淵讓司徒乃與僕射王儉書欲依蔡謨事例儉以為非所宜言勸淵受命終不就尋加尚書令二年重申前命為司徒又固讓魏軍動髙帝欲發王公以下無官者從軍淵諫以為無益實用空致擾動上乃止三年七月帝親嘗酎盛暑欲夜出淵與左僕射王儉諫以為自漢宣帝以來不夜入廟所以誡非常人君之重所宜克慎從之時朝廷機密事淵多與議謀每見從納禮遇甚重上嘗大宴集酒後謂朝臣曰卿等並宋時公卿亦當不言我應得天子王儉等未及答淵斂版曰陛下不得言臣不早識龍顔上笑曰吾有愧文叔知公為朱祐久矣淵涉獵文義善彈琵琶武帝在東宫宴集賜淵金鏤柄銀柱琵琶淵性和雅有器度不妄舉動宅嘗失火煙焰甚逼左右驚擾淵神色恬然索輿徐去然世頗以名節譏之于時百姓語曰可憐石頭城寧為袁粲死不作褚淵生髙帝崩遺詔以淵為録尚書事江左以來無單拜録者有司疑立優策尚書令王儉議以為見居本官別拜録應有策書而舊事不載中朝以來三公王侯則優策並設官品第二策而不優優者褒美策者兼明委寄尚書職居天官政化之本故尚書令品雖第三拜必有策録尚書品秩不見而總任彌重前代多與本官同拜故不別有策即事緣情不容均之凡僚宜有策書用申隆寄既異王侯不假優文從之尋增淵班劍為三十人五日一朝頃之寢疾淵少時嘗疾篤夢人以卜蓍一具與之遂差其一至是年四十八矣嵗初便寢疾而太白熒惑相繼犯上將淵慮不起表遜位武帝不許乃改授司空驃騎將軍侍中録尚書如故上遣侍中問疾無何薨年四十八家無餘財負債至數十萬詔給東園祕器時司空掾屬以淵未拜疑應為吏敬不王儉議依禮婦在途聞夫家喪改服而入今掾屬雖未服勤而吏節稟於天朝宜申禮敬司徒府史又以淵既解職而未參後授府猶應上服以不儉又議依中朝士孫德祖從樂陵遷為陳留未入境樂陵郡吏依見君之禮陳留迎吏依娶女有吉日齊衰弔司徒府宜依居官制服贈太宰侍中録尚書公如故增班劍為六十人給節加羽葆鼓吹葬送之禮悉依宋太保王𢎞故事諡曰文簡先是庶姓三公轜車未有定格王儉議官品第一皆加幢絡自淵始也又詔淵妻宋故巴西公主埏隧暫啓宜贈南康郡公夫人長子賁字蔚先少耿介父背袁粲等附髙帝賁深執不同終身愧恨之故有栖退之志位侍中淵薨服闋見武帝賁流涕不自勝上甚嘉之以為侍中領步兵校尉左户尚書常謝病在外上以此望之遂諷令辭爵讓與弟蓁仍居墓下及王儉薨乃騎水牛出弔以繫門外柱入哭盡哀而退家人不知也會疾篤其子霽載以歸疾小間知非故處大怒不肯復飲食內外閣悉釘塞之不與人相關數日裁餘氣息謝草瀹聞其弊往候之排閣不可開以杵槌破進見賁曰事之不可得者身也身之不可全者名也名與身俱滅者君也豈不全之哉賁曰吾少無人間志豈身名之可慕但願啓手歸全必在舊壠兒輩不才未達余趣移尸徙殯失吾素心以此更為恨耳永明七年卒蓁字茂緒位義興太守改封巴東郡侯明年表讓封還賁子霽詔許之建武末蓁位太子詹事度支尚書領前軍將軍永元元年卒贈太常諡穆子蓁子向向子翔翔列在梁史淵弟澄字彥道初湛之尚宋孝武女始安公主薨納側室郭氏生淵後尚吳郡主生澄淵事主孝謹主愛之湛之亡主表淵為嫡澄尚宋文帝女廬江公主拜駙馬都尉歷官清顯善醫術建元中為吳郡太守百姓李道念以公事到郡澄見謂曰汝有重疾答曰舊有冷疾至今五年衆醫不差澄為診脈謂曰汝病非冷非熱當是食白草瀹雞子過多所致令取蒜一升煮服之始一服乃吐出一物如升涎裹之能動開看乃是雞雛羽翅爪距具足能行走澄曰此未盡更服所餘藥又吐得如向者雞十三頭而病都差當時稱妙豫章王感病髙帝召澄為療立愈尋遷左户尚書淵薨澄以錢一萬一千就招提寺贖髙帝所賜淵白貂坐褥壞作裘及䙬又贖淵介幘犀導及淵常所乘黃牛永明元年為御史中丞袁彖所奏免官禁錮見原遷侍中領右軍將軍以勤謹見知澄女為東昏后永元元年卒贈金紫光祿大夫淵從父弟照字彥宣父法顯鄱陽太守照少有髙節王儉嘗稱才堪保傅為成安郡還以一目眇召為國子博士不拜常非淵身事二代淵子賁往問訊照照問曰司空今日何在賁曰奉璽韍在齊大司馬門照正色曰不知汝家司空將一家物與一家亦復何謂淵拜司徒賔客滿坐照歎曰彥回少立名行何意披猖至此門户不幸乃復有今日之拜使彥回作中書郎而死不當是一名士邪名德不昌遂有期頤之夀淵性好戲以軺車給之照大怒曰著此辱門户那可令人見索火燒之馭人奔車乃得免弟炫字彥緒少清簡為從舅王景文所知從兄淵謂人曰從弟亷勝獨立乃十倍於我也纍遷正員外郎從宋明帝射雉至日中無所得帝甚猜羞召問侍臣曰吾旦來如臯遂空行可笑坐者莫答炫獨曰今節候雖適而雲霧尚凝故斯翬之禽驕心未警但得神駕逰豫羣情便可載歡帝意解乃於雉場置酒遷中書侍郎司徒右長史升明初炫以清尚與彭城劉悛陳郡謝朏濟陽江斆入殿內侍文義號為四友齊臺建為侍中領步兵校尉以家貧建元初出補東陽太守前後三為侍中與從兄淵操行不同故淵之世不至大官永明元年為吏部尚書炫居身清立非弔問不雜交遊論者以為美及在選部門庭蕭索賔客罕至出行左右常捧一黃紙帽箱風吹紙剝殆盡罷江都郡還得錢十七萬於石頭并分與親族病無以市藥以冠劍為質表自陳解改授散騎常侍領安成王師國學建以本官領博士未拜卒無以殯殮時年四十一贈太常諡貞子子澐附其孫玠傳在陳史王儉字仲寶琅邪臨沂人也祖曇首宋光祿大夫父僧綽侍中曇首自有傳儉生而僧綽為元凶劭所害養於叔父僧虔數嵗襲爵豫寧侯拜受流涕嗚咽幼有神采專心篤學手不釋卷賔客或相稱美僧虔曰我不患此兒無名政恐太盛耳乃手書崔子玉座右銘以貽之丹陽尹袁粲聞其名及見之曰栝柏豫章雖小已有棟梁姿矣終當任人家國事乃言之於宋明帝選尚陽羡公主拜駙馬都尉帝以儉嫡母武康公主同泰初巫蠱事不可以為婦姑欲開冢離葬儉因人自陳密以死請故事不行年十八解褐祕書郎太子舍人超遷祕書丞典校墳籍依七略撰七志四十卷表獻之又擬定元徽四部書目母憂服闋為司徒右長史晉令公府長史著朝服宋大明以來著朱衣儉上言宜復舊制時議不許及蒼梧暴虐儉懼告袁粲求外出引晉新安主壻王獻之任吳興為例補義興太守升明二年為長兼侍中以父終此職固讓先是髙帝為相欲引時賢參讃大業時謝朏為長史帝夜召朏却人與語久之朏無言唯有二小兒捉燭帝慮朏難之仍取燭遣兒朏又無言帝乃呼左右儉素知帝雄異後請間言於帝曰功髙不賞古來非一以公今日位地欲北面居人臣可乎帝初正色裁之而神采內和儉因又曰儉蒙公殊眄所以吐所難吐公何賜拒之深誠以景和元徽之淫虐非公豈復寧濟但人情澆薄不能持久公若小復推遷則人望去矣豈唯大業永淪七尺之軀豈可得保帝笑曰卿言不為無理儉又曰公今名位故是經常宰相宜禮絶羣后微示變革當先令褚公知之儉請銜命帝曰我當自往經少日帝自造淵欵言移晷乃謂曰我夢應得官淵曰今授始爾恐一二年間未容便移且吉夢未必便在旦夕帝還告儉儉曰褚是未達理虞整時為中書舍人甚間辭翰儉乃自報整使作詔及髙帝為太尉引儉為右長史尋轉為左專見任用及大典將行儉為佐命禮儀詔策皆出於儉褚淵唯為禪詔又使儉參懷定之齊臺建遷尚書右僕射領吏部時年二十八多所引進客有姓談者詣儉求官儉曰齊侯滅談乃得有君客曰談子奔莒是以有僕儉賞其善據卒得職焉髙帝嘗從容謂儉曰我今日當以清溪為鴻溝對曰天應人順庶無楚漢之事時朝儀草創衣服制則未有定凖儉議曰漢景六年梁王入朝中郎謁者金貂出入殿門左思魏都賦云藹藹列侍金貂齊光此藩國侍臣有貂之明文晉百官表云太尉參軍四人朝服武冠此又宰府之明文又疑百僚敬齊公之禮儉又曰晉王受命勸進云沖等拳拳稱名則應盡禮明矣又庶子禮秩未定儉復曰春秋曹世子來朝待以上公之禮下其君一等今齊公九命禮冠列蕃世子亦宜異數並從之世子鎮石頭城仍以為世子宫儉又曰魯有靈光殿漢之前例也由是以聽事為崇光殿外齋為宣德殿以散騎常侍張緒為世子詹事車服悉依東宫制度髙帝踐阼與儉議佐命功臣從容謂曰卿謀謨之功莫與為二卿止二千户意以為少趙充國猶能自奉西零之任况卿與我情期異常儉曰昔宋祖創業佐命諸公開國不過二千以臣比之惟覺超越上笑曰張良辭侯何以過此建元元年改封南昌縣公時都丁舛雜且多姦盜上欲立符伍家家以相檢括儉諫曰京師翼翼四方是湊必也持符於事既煩理成不曠謝安所謂不爾何以為京師乃止是嵗有司奏定郊殷之禮儉以為宜以今年十月殷祭宗廟自此以後五年再殷祭二年正月上辛有事于南郊即以其日還祭明堂又用次辛饗祀北郊而並無配從之明年轉左僕射領選如故宋明帝紫極殿珠簾綺柱飾以金玉江左所未有髙帝欲以其材起宣陽門儉與褚淵及叔父僧虔連名表諫上手詔酬納宋世宫門外六門城設竹籬是年初有發白虎樽言曰門三重門竹籬穿不完上感其言改立都牆儉又諫上答曰吾欲後世無以加也朝廷初基制度草創儉問無不決上歎曰維嶽降神生甫及申今天為我生儉也其年固請解選見許帝幸樂遊苑宴集謂儉曰卿好音樂孰與朕同儉曰沐浴唐風事兼比屋亦既在齊不知肉味帝稱善帝後幸華林園曲宴羣臣數人使各效伎藝褚淵彈琵琶王僧虔栁世隆彈琴沈文季歌子夜來張敬兒舞儉曰臣無所解唯知誦書因跪上前誦相如封禪書上笑曰此盛德之事吾何以堪之後上使陸澄誦孝經起自仲尼居儉曰澄所謂博而寡要臣請誦之乃誦君子之事上章上曰善張子布更覺非竒也於是王敬則脫朝服袒以絳糾髻奮臂拍張呌動左右上不悅曰豈聞三公如此答曰臣以拍張故得三公不可忘拍張時以為名答儉尋以本官領太子詹事加兵三百人時皇太子妃薨左衛將軍沈文季經為宫臣未詳服以不儉議曰漢魏以來宫僚先備臣𨽻之節且體在三存既盡敬亡豈無服昔庾翼喪妻王允滕含猶謂府吏宜有小君之服况臣節之重宜依舊君之妻齊衰三月而除上崩遺詔以儉為侍中尚書令鎮軍每上朝令史恆有三五十人隨上咨事辨析未嘗壅滯褚淵時為司徒録尚書笑謂儉曰觀令判斷甚樂儉曰所以得厝私懷實由稟明公不言之化武帝即位給班劍二十人進號衛將軍掌選事時有司以前代嗣位或仍前郊或别為郊始晉宋以來未有畫一儉議曰晉明帝太寧三年南郊其年九月崩成帝即位明年改元亦郊簡文咸安三年南郊其年七月崩孝武即位明年改元亦郊宋元嘉三十年正月南郊二月崩孝武嗣位明年亦郊此二代明例差可依仿今聖明繼業幽顯宅心言化則頻郊非嫌語事則元號初改禋燎登配孝敬兼遂謂明年正月宜饗禮二郊虞祭明堂自兹以後依舊間嵗有司又以明年正月上辛應南郊而立春在上辛後郊在立春前為疑儉曰宋景平元年正月三日辛丑南郊其月十一日立春元嘉十六年正月六日辛未南郊其月八日立春此近世明例也並從之永明二年領丹陽尹三年領國子祭酒又領太子少傅舊太子敬二傅同至是朝議接少傅以賔友禮宋時國學頽廢未暇修復宋明帝泰始六年置總明觀以集學士或謂之東觀置東觀祭酒一人總明訪舉郎二人儒元文史四科科置學士十人其餘令史以下各有差是嵗以國學既立省總明觀於儉宅開學士館以總明四部書充之又詔儉以家為府四年以本官領吏部先是宋孝武好文章天下悉以文采相尚莫以專經為業儉幼年留意三禮尤善春秋發言吐論造次必於儒教由是衣冠翕然並尚經學儒教於此大興何承天禮論三百卷儉抄為八帙又别抄條目十三卷朝儀舊典晉宋以來施行故事撰次諳憶無遺漏者所以當朝理事斷決如流每變議引證先儒罕有其例八坐丞郎無能異者令史咨事賔客燕集儉應投銓序傍無留滯十日一還監試諸生巾冠在庭宿衛令史儀容甚盛作解散幘斜插簮朝野慕之相與倣效儉常謂人曰江左風流宰相唯有謝安蓋自况也武帝深委仗之士流選用奏無不可五年儉即本號開府儀同三司固讓六年重申前命先是詔儉三日一還朝尚書令史出咨事上以往來煩數詔儉還尚書下省月聽十日出外儉啓求解選上不許六年乃上表固請見許改領中書監參選選事其年疾上親臨視薨年四十八詔衛軍文武及臺所給兵仗悉停待葬又詔追贈太尉加羽葆鼓吹增班劍為六十人葬禮依太宰文簡公褚淵故事諡文憲公儉寡嗜欲唯以經國為務車服塵素家無餘財手筆典裁為當時所重少便有宰臣之志賦詩云稷契匡虞夏伊吕翼商周及生子字曰元成取仍世作相之義儉撰古今喪服集記并文集行於世梁武受禪詔為儉立碑降爵為侯儉弟遜宋升明中為丹陽丞告劉秉事不蒙封賞建元初為晉陵守有怨言儉慮為禍因褚淵啓聞中丞陸澄依事舉奏詔以儉竭誠佐命特降刑書宥遜徙永嘉於道伏誅儉長子騫嗣列在梁史儉叔父僧虔幼時父曇首嘗與兄弟集會諸子孫任其戲適僧達跳下地作彪子僧虔纍十二博碁既不墜落亦不重作僧綽採蠟燭珠為鳳凰僧達奪取打壞亦不復惜伯父𢎞歎曰僧達俊爽當不減人然亡吾家者終此子也僧虔必至公僧綽當以名義見美或云僧虔採燭珠為鳳凰𢎞稱其長者云僧虔弱冠善𨽻書宋文帝見其書素扇歎曰非唯迹逾子敬方當器過之除祕書郎遷太子舍人性退默少交接與袁淑謝莊善淑每歎之曰卿文情鴻麗學解深拔而韜光潛實物莫之窺雖魏陽元之射王汝南之騎無以加焉遷司徒左西屬初兄僧綽之遇害也其親賔咸勸僧虔逃隱僧虔泣曰吾兄奉國以忠貞撫我以慈愛今日之事苦不見及耳若同歸九泉猶羽化也孝武初出為武陵太守擕諸子姪兄子儉於中途得病僧虔為廢寢食同行客慰喻之僧虔曰昔馬援處子姪之間一情不異鄧攸於弟子更逾所生吾實懷其心誠未異古亡兄之允不宜忽諸若此兒不救便當回舟謝職無復逰宦之情矣還為中書郎再遷太子中庶子孝武欲擅書名僧虔不敢顯迹大明世常用掘筆書以此見容遷御史中丞領驍騎將軍甲族向來多不居憲臺王氏以分枝居烏衣者位宦微減僧虔為此官乃曰此是烏衣諸郎坐處我可試為耳泰始中為輔國將軍吳興太守始王獻之善書為吳興郡手迹尤工及僧虔為郡時書又多合論者稱之徙為會稽太守中書舍人阮佃夫家在東請假歸客勸僧虔以佃夫要幸宜加禮接僧虔曰我立身有素豈能曲意此輩彼若見惡正當拂衣而去耳佃夫言於明帝使御史中丞孫敻奏僧虔前涖吳興多有謬命坐免官尋以白衣領侍中元徽中為吏部尚書尋加散騎常侍轉右僕射升明二年為尚書令嘗為飛白書題尚書省壁曰圓方行止物之定質修之不已則溢髙之不已則栗馳之不已則躓引之不已則迭是故去之宜疾當時嗟賞以比坐右銘兄子儉每覲見輒勗以前言往行忠貞止足之道雅好文史解聲樂以朝廷禮樂多違正典民間競造新聲雜曲時髙帝輔政僧虔上表請正聲樂髙帝乃使侍中蕭惠基調正清商音律齊受命轉侍中丹陽尹郡縣獄相承有上湯殺囚僧虔上言湯本救疾而實行寃暴若罪必入重自有正刑若去惡宜疾則應先啓豈有死生大命而潛制下邑上納其言而止文惠太子鎮雍州有盜發古冢者相傳云是楚王冢大獲寶物有玉履玉屏風竹簡書青絲綸簡廣數分長二尺皮節如新有得十餘簡以示僧虔僧虔乃云是科斗書考工記周官之所闕文也髙帝素善書篤好不已與僧虔賭書畢謂曰誰為第一對曰臣書第一陛下亦第一上笑曰卿可為善自為謀矣或云帝問我書何如卿答曰臣正書第一草書第二陛下草書第二正書第三臣無第三陛下無第一帝大笑曰卿善為辭然天下有道丘不與易也帝示僧虔古迹十一卷就求能書人名僧虔得民間所有卷中所無者吳大皇帝景帝歸命侯書桓元書及王丞相導領軍洽中書令珉張芝索靖衛伯儒張翼十一卷奏之又上羊欣所撰能書人名一卷其年遷征南將軍湘州刺史侍中如故清簡無所欲不營財産百姓安之武帝即位僧虔以風疾欲陳解會遷侍中左光祿大夫開府儀同三司僧虔少時羣從宗族並會客有相之者云僧虔年位最髙仕當至公餘人莫及及此授僧虔謂兄子儉曰汝任重於朝行當有八命之禮我若復此授則一門有二台司實可畏懼乃固辭不拜上優而許之改授侍中特進光祿大夫客問僧虔固辭之意僧虔曰君子所憂無德不憂無寵吾衣食周身榮位已過所慙膚薄無以報國豈容更受髙爵方貽官謗邪儉既為朝宰起長梁齋制度小過僧虔視之不悅竟不入户儉即日毁之永明三年薨時年六十贈司空侍中如故諡簡穆僧虔頗解星文夜坐見豫章分野當有事故時僧虔子慈為豫章內史慮其有公事少時而僧虔薨慈棄郡奔赴時有前將軍陳天福坐討唐宇之於錢唐掠奪百姓財物棄市先是天福將行令家人豫作夀冢未至東又信催速就冢成而得罪因以葬焉又宋世光祿大夫劉鎮之年三十許病篤已辦凶具既而疾愈因畜棺為夀九十餘乃亡此器方用因此而言天道未易知也僧虔論書云宋文帝書自言可比王子敬時議者云天然勝羊欣功夫少於欣王平南廙右軍叔過江右軍之前以為最亡曽祖領軍右軍云弟書遂不減吾變古制今唯右軍領軍不爾至今猶法鍾張亡從祖中書令書子敬云弟書如騎騾駸駸恆欲度驊騮前庾征西翼書少時與右軍齊名右軍後進庾猶不分在荆州與都下人書云小兒輩厭家雞愛野鶩皆學逸少書須吾下當比之張翼王右軍自書表晉穆帝令翼寫題後答右軍當時不别久後方悟云小人幾欲亂真張芝索靖韋誕鍾會二衛並得名前代無以辨其優劣唯見其筆力驚異耳張澄當時亦呼有意郗愔章草亞於右軍郗嘉賔草亞於二王緊媚其父桓元自謂右軍之流論者以比孔琳之謝安亦入能書録亦自重為子敬書嵇康詩羊欣書見重一時親受子敬行書尤甚正乃不稱名孔琳之書天然縱放極有筆力規矩恐在羊欣後邱道護與羊欣俱面受子敬故當欣後范曄與蕭思話同師羊欣後小叛既失故步為復小有意耳蕭思話書羊欣之影風流趨好殆當不減筆力恨弱謝綜書其舅去緊生起是得賞也恨少媚好謝靈運書乃不倫遇其合時亦得入流賀道力書亞邱道護庾昕學右軍亦欲亂真矣僧虔嘗自書讓尚書令表辭制既雅筆迹又麗時人以比子敬崇賢吳郡顧寶先卓越多竒自以伎能僧虔乃作飛白以示之寶先曰下官今為飛白屈矣僧虔著書賦儉為注序甚工僧虔宗世嘗有書誡子曰知汝恨吾未許汝學欲自悔厲或以闔棺自欺或更擇美業且得有慨亦慰窮生但亟聞斯唱未覩其實吾未信汝非徒然也往年有意於史取三國志聚牀頭百日許復徙業就元汝曽未窺其題目未辨其指歸而終日自欺人不受汝欺也由吾不學無以為訓然重華無嚴父放勛無令子亦各由己耳汝輩竊議亦當云阿越不學何忽自課汝見其一耳不全爾也設令吾學如馬鄭亦復甚勝復倍不如今亦必大減致之有由從身上來也汝今壯年自勤數倍許勝劣及吾耳吾在世雖乏德素要復推排人間十許年故是一舊物人或以比數汝耳即化之後若自無調度誰復知汝事者舍中亦有少負令譽弱冠越超清級者于時王家門中優者龍鳳劣猶虎豹失蔭之後豈龍虎之議况吾不能為汝蔭政應各自努力耳或有身經三公蔑爾無聞布衣寒素卿相屈體父子貴賤殊兄弟聲名異何也體盡讀數百卷書耳吾今悔無所及欲以前車誡爾後乘也汝年入立境方應從宦兼有室纍何處復得下帷如王郎時邪各爾身已切豈復關吾邪鬼唯知愛深松茂柏寧知子弟毁譽事因汝有感故略敘胸懷子慈字伯寶年八嵗外祖宋太宰江夏王義恭迎之內齋施寶物恣所取慈取素琴石硯及孝子圖而已義恭喜之袁淑見其幼時撫其背曰叔慈內潤也少與從弟儉共書學謝鳳子超宗嘗候僧虔仍往東齋詣慈慈正學書未即放筆超宗曰卿書何如虔公慈曰慈書比大人如雞之比鳳超宗狼狽而退十嵗時與蔡興宗子約入寺禮佛正遇沙門懴約戲慈曰衆僧今日可謂虔虔慈應聲曰卿如此何以興蔡氏之宗歷位吳郡太守大司馬長史侍中領步兵校尉司徒左長史慈患腳武帝敕王晏慈有微疾不能騎聽乘車在仗後江左以來少例也慈妻劉秉女子觀尚武帝長女吳縣公主修婦禮姑未嘗交答江夏王鋒為南徐州王妃慈女也以慈為東海太守行徐州府州事還為冠軍將軍廬陵王中軍長史未拜永明九年卒贈太常諡懿子子泰附慈弟志傳列在梁史僧虔從子僧祐字允宗祖孺宋光祿大夫父逺光祿勳時人謂逺如屏風屈曲從俗能蔽風露言能不乖物理也僧祐幼聰悟叔父微撫其首曰兒神明意用當不作率爾人雅為從兄儉所重每鳴笳列騶到其門候之僧祐輒稱疾不前儉曰此吾之所望若人也世皆推儉之愛明德而重僧祐之不趨勢也未弱冠頻經憂居喪至孝服闋髮落略盡殆不立冠帽舉秀才為驃騎法曹羸瘠不堪受命雅好博古善老莊不尚繁華工草𨽻書善鼓琴亭然獨立不交當世沛國劉瓛聞風而悅上書薦之為著作佐郎遷司空祭酒謝病不與公卿遊髙帝謂王儉曰卿從可謂朝隱答曰臣從非敢妄同髙人直是愛間多病耳經贈儉詩云汝家在市門我家在南郭汝家饒賔侣我家多鳥雀儉時聲髙一代賔客填門僧祐不為之屈時人嘉之稍遷晉安王文學而陳郡袁利為友時人以為妙選武帝數閲武僧祐獻武賦王儉借觀不與竟陵王子良聞其工琴於坐取琴進之不從命永明末為太子中舍人在直屬疾不待對人輒去中丞沈約彈之云肆情運氣不顧朝典揚眉闊步直轡髙驅坐贖論時何點王思逺之徒請交並不降意自天子至于侯伯未嘗與一人遊卒於黃門郎子藉别有傳祐族子融字元長曽祖𢎞宋太保自有傳祖僧達中書舍人父道琰廬陵內史母臨川太守謝惠連女性敦敏教融書學融少而警慧博涉有文才從叔儉謂人曰此兒年四十名位自然及祖舉秀才晉安王南中郎版行參軍纍遷太子舍人融以父宦不達弱年便欲紹興家業啓武帝求自試遷祕書丞從叔儉初有儀同之授贈儉詩及書儉甚竒之笑謂人曰穰侯印詎可便解尋遷丹陽丞中書郎永明末武帝欲北伐使毛惠秀畫漢武北伐圖融好功名因此上疏開張北侵之議圖成上置琅邪城射堂壁上逰幸輒觀焉九年上幸華林園禊宴朝臣使融為曲水詩序文藻富麗當世稱之上以融才辨十一年使兼主客接魏使房景髙宋辨辨見融年少問主客年幾融曰五十之年久踰其半景髙云在本朝聞主客作曲水詩序勝於顔延年實願一見融乃示之後日辨於瑶池堂謂融曰觀相如封禪以知漢武之德今覽王生詩序用見齊主之盛融曰皇家盛明豈直比蹤漢武更慙鄙製無以逺匹相如上以魏所獻馬不稱使融問曰秦西冀北實多駿驥而魏主所送之馬駑駘之不若將旦旦信誓有時而爽駉駉之牧不能復嗣辨曰當是不習地土融曰周穆馬迹遍於天下若騏騮之性因地而遷則造父之策有時而躓辨曰王主客何為勤勤於千里融曰卿國既異其優劣聊復相訪若千里斯至聖上當駕鼓車辨曰向意既須必不能駕鼓車也融曰買死馬之骨亦以郭隗之故辨不能答融躁於名利自恃人地三十內便望為公輔初為司徒法曹詣從叔僧祐因遇沈昭略未相識昭略屢顧盼謂主人曰是何少年融殊不平謂曰僕出於扶桑入於暘谷照曜天下誰云不知而卿此問昭略云不知許事且食蛤䖽融曰物以羣分方以類聚君長東隅居然應嗜此族其髙自標置如此及為中書郎入直中書省夜常撫案歎曰為爾寂寂鄧禹笑人行逢朱雀桁開路人喧啾不能得進又槌車壁歎曰大丈夫車中乃可無七尺車前豈可乏八騶會魏軍動竟陵王子良於東府募人版融寧朔將軍軍主融文辭捷速有所造作援筆可待子良特相友好情分殊常晚節大習騎馬才地既華兼藉子良之勢傾意賔客勞問周欵文武輻湊之招集江西傖楚數百人並有幹用融特為謀主武帝病篤暫絶子良在殿內太孫未入融戎服絳衫於中書省閣口斷東宫仗不得進欲矯詔立子良詔草已立上重蘇朝事委西昌侯鸞梁武謂范雲曰左手據天下之圖右手刎其喉愚夫不為主上大漸國家自有故事道路籍籍將有非常之舉卿聞之乎雲不敢答俄而帝崩融乃處分以子良兵禁諸門西昌侯聞急馳到雲龍門不得進乃曰有敕召我仍排而入奉太孫登殿命左右扶出子良指麾音響如鐘殿內無不從命融知子良不得立乃釋服還省歎曰公誤我鬱林深忿融即位十餘日收下廷尉使中丞孔稚圭為奏數其罪惡使融依條據答融頗自辨析不肯引咎自融被收朋友部曲參問北寺相繼於道請救於子良子良不敢救西昌侯固爭不得詔於獄賜死時年二十七臨死歎曰我若不為百嵗老母當吐一言融意欲斥帝在東宫時過失也先是太學生會稽魏凖以才學為融所知既欲奉子良而凖鼓成其事太學生虞羲邱國賔竊相謂曰竟陵才弱王中書無斷敗在眼中矣及融誅召凖入舍人省詰問遂懼而死舉體皆青時人以為凖膽破融有文集行於時栁世隆字彥緒河東解人也伯父元景宋尚書令自有傳父叔宗字雙鱗位建威參軍早卒世隆幼孤挺然自立不與衆同雖門勢子弟獨修布衣之業及長好讀書折節善彈琴涉獵文史音吐溫潤元景愛賞異於諸子言於宋孝武得召見帝謂元景曰此兒將來復是三公一人為西陽王撫軍法曹行參軍出為武威將軍上庸太守帝謂元景曰卿昔以武威之號為隨郡今復以授世隆使卿門世不乏三公也元景為前廢帝所殺世隆以在逺得免泰始初四方反叛世隆於上庸起兵以應宋明帝為孔道存所敗衆散逃隱道存購之甚急軍人有貌相似者斬送之時世隆母郭妻閻並見縶襄陽獄道存以所送首示之母見首悲情小歇而妻閻號呌方甚竊謂郭曰今見不悲為人所覺唯當大慟以滅之世隆竟以免後為太子洗馬與張緒王延之沈琰為君子之交纍遷晉熙王安西司馬加寧朔將軍時武帝為長史與世隆相遇甚歡髙帝之謀度廣陵也令武帝率衆同會都下世隆與長流參軍蕭景先等戒嚴待期事不行時朝廷疑憚沈攸之密為之防府州器械皆有素蓄武帝將下都劉懷珍白髙帝曰夏口是兵衝要地宜得其人髙帝納之與武帝書曰汝入朝當須文武兼資人與汝意合者委以後事世隆其人也武帝乃舉世隆自代轉為武陵王前軍長史江夏內史行郢州事升明元年冬攸之反遣輔國將軍中兵參軍孫同等以三萬人為前驅又遣司馬冠軍劉攘兵等二萬人次之又遣輔國將軍中兵參軍王靈秀等分兵出夏口據魯山攸之乘輕舸從數百人先大軍下住白螺洲坐胡牀以望其軍有自驕色既至郢以郢城弱小不足攻攸之將去世隆遣軍於西渚挑戰攸之果怒晝夜攻戰世隆隨宜拒應衆皆披却武帝初下與世隆别曰攸之一旦為變雖留攻城不可卒拔卿為其內我為其外乃無憂耳至是武帝遣軍主桓敬陳允叔茍元賔等八軍據西塞令堅壁以待賊疲慮世隆危急遣腹心胡元直潛使入郢城通援軍消息內外並喜郢城既不可攻而平西將軍黃回軍至西陽乘五層艦作羌胡伎泝流而進攸之素失人情本逼以威力初發江陵已有叛者至此稍多攸之大怒於是一人叛遣十人追並去不返劉攘兵射書與世隆請降開門納之攸之怒銜鬚咀之收攘兵兄子天賜女壻張平慮斬之軍旅大散世隆乃遣軍副劉僧麟緣道追之攸之已死徴為侍中仍遷尚書右僕射封貞陽縣侯出為吳郡太守居母憂寒不衣絮髙帝踐阼起為南豫州刺史加都督進爵為公上手詔司徒褚淵甚傷美之淵曰世隆事陛下在危盡忠居憂杖而後起立人之本二理同極加榮增寵足以厲風俗建元二年授右僕射不拜性愛涉獵啓髙帝借祕閣書上給二千卷三年出為南兖州刺史加都督武帝即位加散騎常侍世隆善卜别龜甲價至一萬永明初世隆曰永明九年我亡亡後三年邱山崩齊亦於此季矣屏人命典籖李黨取筆及髙齒屐題簾箔旌曰永明十一年因流涕謂黨曰汝當見吾不見也遷護軍而衛軍王儉修下官敬甚謹世隆止之儉曰將軍雖存𢎞眷其如王典何其見重如此性清亷唯盛事墳典張緒問曰觀君舉措當以清名遺子孫邪答曰一身之外亦復何須子孫不才將為爭府如其才也不如一經光祿大夫韋祖征州里宿德世隆雖已貴重每為之拜人或勸祖征止之答曰司馬公所為後生楷法吾豈能止之哉後授尚書左僕射湘州蠻動遣世隆以本官總督伐蠻仍為湘州刺史加都督至鎮以方略討平之立邸興生為御史中丞庾杲之所奏詔不問復入為尚書左僕射不拜乃轉尚書令世隆少立功名晚專以談義自業善彈琴世稱栁公雙瑣為士品第一常自云馬矟第一清談第二彈琴第三在朝不干世務垂簾鼓琴風韻清逺甚獲世譽以疾遜位拜左光祿大夫侍中永明九年卒詔給東園祕器贈司空班劍二十人諡曰忠武世隆曉數術於倪塘創墓與賔客踐履十往五往常坐一處及卒墓工圖墓正取其坐處焉所著蓍經祕要二十卷行於世長子悅字文殊少有清致位中書郎早卒諡曰恭世隆次子惔知名梁代有傳王晏字休默一字士彥琅邪臨沂人也伯祖鎮之宋宣訓衛尉祖𢎞之仕晉為桓謙衛軍參軍棄官嘉遁宋初徴辟並不就名附鎮之傳父普曜祕書監晏仕宋為建安國左常侍稍至車騎晉熙王燮安西版主簿武帝時為長史與晏相遇府轉鎮西版晏為記室沈攸之事難晏隨武帝鎮湓城時髙帝威權雖重而衆情猶有疑惑晏便專心奉事軍旅書翰皆見委任性便僻漸見親待遷從事中郎常在二府參議機密建元初遷太子中庶子武帝在東宫專斷朝事多不聞啓晏慮及罪稱疾自疏武帝即位轉長史兼侍中意任如舊遷侍中祭酒遭母喪起為司徒左長史晏父普曜藉晏勢多歷通官普曜卒晏居喪有禮永明六年起為丹陽尹晏位任親重朝夕進見言論政事自豫章王嶷尚書令王儉皆降意以接之而晏每以疏漏被上呵責連稱疾久之上以晏初須祿養轉為江州刺史晏固辭涕泣不願出留為吏部尚書太子右率終以舊恩見寵時尚書令王儉雖貴而疏晏既領選權行臺閣與儉頗不平儉卒禮官欲依王導諡為文獻晏啓上曰導乃得此諡但宋來不加素族出謂親人曰平頭憲事已行矣十一年為右僕射領太孫右衛率武帝崩遺旨以尚書事付晏及徐孝嗣鬱林即位轉左僕射及明帝議廢立晏便響應接奉延興元年轉尚書令封曲江縣侯給鼓吹一部甲仗五十人入殿時明帝形勢已布而莫敢先言蕭諶兄弟握兵權遲疑未決晏頻三夜微步詣諶議時人以此窺之明帝與晏於東府語及時事晏抵掌曰公常言晏怯今定何如建武元年進號驃騎大將軍給班劍二十人又加兵百人領太子少傅進爵為公以魏軍動給兵千人晏為人篤於親舊為世所稱至是自謂佐命維新言論常非武帝故事衆始怪之明帝雖以事際須晏而心相疑後料簡武帝中詔得與晏手敕三百紙皆是論國家事永明中武帝欲以明帝代晏領選晏答曰鸞清幹有餘然不諳百氏恐不可居此職乃止及見此詔愈猜薄之帝初即位始安王遙光便勸誅晏帝曰晏於我有勳且未有罪遙光曰晏尚不能為武帝安能為陛下帝默然變色時帝常遣心腹左右陳世範等出塗巷採聽異言由是以晏為事晏性浮動志欲無懕自謂旦夕開府又望録尚書每謂人曰徐公應為令又和徐詩云槐序候方調晏名位在徐前徐若三槐則晏不言自顯人或譏之晏人望未重又與上素疏延興初雖以事計委任而內相疑阻晏無防意既居朝端事多專決內外要職並用周旋門義每與上爭用人數呼相工自視云當大貴與客語好屏人上聞之疑晏欲反遂有誅晏之意有傖人鮮于文粲與晏子德元往來密探朝旨告晏有異志又左右單景俊陳世範等采巫覡言啓上云晏懷異圖是時南郊應親奉景俊等告晏因此與武帝故主帥於道中竊發會虎犯郊壇帝愈懼未郊前一日上乃停行先報晏及徐孝嗣孝嗣奉旨而晏陳郊祀事大必宜自力上以景俊言似可信元會畢乃召晏於華林省誅之下詔顯其罪稱以河東王鉉識用微弱欲令守以虛器並令收付廷尉晏之為員外郎也父普曜齋前柏樹忽變成梧桐論者以為梧桐雖有栖鳳之美而失後凋之節及晏敗果如之又未敗前見屋桷子悉是大蛇就視之猶木也晏惡之乃以紙裹桷子猶紙內搖動䔩䔩有聲又於北山廟答賽夜還晏醉部伍人亦飲酒羽儀錯亂前後十餘里中不復禁制識者云此不復久也未幾而敗晏子德元有意尚位車騎長史德元初名湛武帝曰劉湛江湛並不善終此非佳名也晏乃改之至是及誅晏弟詡位少府卿敕未登黃門郎不得畜女伎詡與射聲校尉陰元智坐畜伎俱免官禁錮十年餘敕特原詡久之拜廣州刺史晏誅上遣殺之晏從父弟思逺父羅雲平西長史思逺八嵗而孤祖𢎞之及外祖新安太守羊敬元並栖退髙尚故思逺少無仕心宋建平王景素辟為南徐州主簿深見禮遇景素被誅左右離散思逺親視殯葬手種松柏與廬江何昌宇沛郡劉璡上表理之事感朝廷景素女廢為庶人思逺分衣食以相資贍年長為備笄總訪求素對傾家送遣建元初歷竟陵王司徒録事參軍太子中舍人文惠太子與竟陵王子良素好士並蒙賞接思逺求出為逺郡除建安內史長兄思元卒思逺友于甚至表乞自解不許及祥日又固陳武帝乃許之仍除中書郎大司馬咨議詔舉士竟陵王子良薦思逺及吳郡顧皓之陳郡殷睿時邵陵王子貞為吳郡除思逺為郡丞以本官行郡事論者以為得人後拜御史中丞臨海太守沈昭略贓私思逺依事劾奏明帝及思逺從兄晏昭略叔父文季並請止之思逺不從案事如故建武中遷吏部郎思逺以從兄晏為尚書令不欲並居內臺權要之職上表固辭乃改授司徒左長史初明帝廢立之際思逺謂晏曰兄荷武帝厚恩今一旦贊人如此事彼或可以權計相須未知兄將來何以自立若及此引決猶可保全門户不失後名晏曰方噉粥未暇此事及拜驃騎會子弟謂思逺兄思微曰隆昌之末阿戎勸吾自裁若從其語豈有今日思逺遽應曰如阿戎所見猶未晚也晏既不能謙退位處朝端事多專斷內外要職並用門生帝外迹甚美內相疑異思逺謂曰時事稍異兄覺不凡人多拙於自謀而巧於謀人晏不答思逺退晏方歎曰天下人遂勸人自殺旬日而晏及禍明帝後知思逺有此言謂江祏曰王晏早聽思逺語當不至此思逺立身簡潔諸客有詣己者輒使人先密覘視衣服垢穢方便不全形儀新楚乃與促膝雖然及去之後猶令二人交帚拂其坐處明帝從祖弟季敞性甚豪縱使詣思逺令見禮度都水使者季圭之嘗曰見王思逺終日匡坐不妄言笑簮帽衣領無不整潔便憶邱明士見明士蓬頭散帶終日酣醉吐論縱橫唐突卿宰便復憶見思逺言其兩反也上既誅晏遷思逺為侍中掌優策及起居注卒年四十九贈太常諡曰貞子思逺與顧皓之友善皓之卒後家貧思逺迎其妻兒經恤甚至皓之字士明少孤好學有義信位太子中舍人兼尚書左丞徐孝嗣字始昌東海郯人也祖湛之宋尚書僕射父聿之著作郎並為元凶所殺湛之附載其伯祖司空羡之傳孝嗣在孕而祖父被害母年少欲更行不願有子自牀投地者無算又以搗衣杵舂其腰并服墮胎藥而胎愈堅及生故小字遺奴幼而挺立風儀端雅八嵗襲祖爵枝江縣公見宋孝武升階流涕迄于就席帝甚愛之尚康樂公主拜駙馬都尉泰始中以登殿不著韎為書侍御史蔡凖所奏罰金二兩孝嗣姑適東莞劉舍舍兄藏為尚書左丞孝嗣往詣之藏退謂舍曰徐郎是令僕人三十餘可知汝宜善自結升明中為髙帝驃騎從事中郎帶南彭城太守轉太尉咨議參軍建元初國除纍遷長史兼侍中善趨步間容止與太宰褚淵相埒尚書令王儉謂人曰徐孝嗣將來必為宰相轉御史中丞武帝謂儉曰誰可繼卿者儉曰臣東都之日其在徐孝嗣乎出為吳興太守儉贈孝嗣四言詩曰方軌叔茂追清彥輔柔亦不茹剛亦不吐時人以比蔡子尼之行狀也在郡有能名會王儉亡上徴孝嗣為五兵尚書其年上敕儀曹令史陳淑等撰江左以來儀典令咨受孝嗣明年遷太子詹事從武帝幸方山上曰朕經始此山之南為離宫之所應有邁靈邱靈邱山湖新林苑也孝嗣答曰繞黃山欵牛首乃盛漢之事今江南未廣民亦勞止願陛下少更留神上乃止竟陵王子良甚善之歷吏部尚書右軍將軍領太子左衛率臺閣事多以委之武帝崩遺詔轉尚書右僕射隆昌元年為丹陽尹明帝謀廢鬱林遣左右莫智明以告孝嗣孝嗣奉旨無所釐替即還家草太后令明帝入殿孝嗣戎服隨後鬱林既死明帝頒太后令孝嗣於袖中出而奏之帝大悅時議悉誅髙武子孫孝嗣堅保持之故得無恙以廢立功封枝江縣侯甲仗五十人入殿轉左僕射明帝即位加中軍大將軍以定策勳進爵為公給班劍二十人加兵百人舊拜三公乃臨軒至是帝特詔與陳顯達王晏並臨軒拜受時王晏為令人情物望不及孝嗣晏誅轉尚書令孝嗣愛好文學器量𢎞雅不以權勢自居建武之世恭己自保朝野以此稱之初孝嗣在率府晝卧齋北壁下夢兩童子遽云移公牀孝嗣驚起聞壁有聲行數步而壁崩壓牀建武四年即本號開府儀同三司孝嗣聞有詔斂容謂左右曰吾德慙古人位登袞職將何以堪之明君可以理奪必當死請若不獲命正當角巾邱園待罪家巷耳固讓不受命時連年魏軍動國用虛乏孝嗣表立屯田帝已寢疾兵事未已竟不行帝疾甚孝嗣入居禁中臨崩受遺託重申開府之命加中書監永元初輔政自尚書下省出住宫城南宅不得還家帝失德稍彰孝嗣不敢諫諍及江祏見誅內懷憂恐然未嘗表色始安王遙光反衆懷惶惑見孝嗣入宫乃安然羣小用事不能制也時孝嗣以帝終亂天常與沈文季俱在南掖門欲要文季以門為應四五目之文季輒亂以他語孝嗣乃止進位司空固讓求解丹陽尹不許孝嗣文人不顯同異名位雖大故得未及禍虎賁中郎將許進有膽智陳説事機勸行廢立孝嗣遲疑久之謂必無用干戈理須少主出逰閉城門召百僚集議廢之雖有此懷終不能決羣小亦稍憎孝嗣勸帝除之其冬召孝嗣入華林省遣茹法珍賜藥孝嗣容色不異謂沈昭略曰始安事吾欲以門應之賢叔若同無今日之恨少能飲酒藥至斗餘方卒時年四十七乃下詔言誅之于時凡被殺者皆取其蟬冕剝其衣服衆情素敬孝嗣得無所侵長子演尚武帝女武康公主位太子中庶子第三子況尚明帝女山隂公主并拜駙馬都尉俱見殺孝嗣之誅衆人懼無敢至者唯會稽魏溫仁奔赴以私財營喪事當時稱之初孝嗣之復故封也使故吏吳興邱睿筮之當傳幾世卦成睿曰恐不終尊身孝嗣容色甚惡徐曰緣有此慮故令卿決之耳中興元年和帝詔贈太尉二年改葬宣德太后詔增班劍四十人加羽葆鼓吹諡曰文忠改封餘干縣公子緄緄子君蒨列在梁史王緄琅邪臨沂人宋侍中護軍將軍華之從父弟也父懌不辨菽麥時以為殷道矜之流人無肯與婚以㺐婢恭心侍之遂生琨初名崑崙懌後娶南陽樂元女無子故即以琨為名立以為嗣琨少謹篤為從伯司徒謐所愛宋武帝初為桓修參軍修待帝厚後帝以事計圖修猶懷昔顧使王華訪素門嫁其二女華為琨娶大女以小女適潁川庾敬虔亦是舊族除琨郎中駙馬都尉奉朝請先是琨伯父廞得罪晉諸世子並從誅唯華得免華宋世貴盛以門户衰弱提擕琨恩若同生為之延譽歷位宣城義熙太守皆以亷約稱華終又託之宋文帝故琨屢居清顯孝建中為尚書吏部郎吏曹選局貴要多所屬請琨自公卿下至士大夫例為用兩門生江夏王義恭嘗屬琨用二人後復遣屬琨不從出為建威將軍平越中郎將廣州刺史南土沃實在任者常致巨富世云廣州刺史但經城門一過便得三千萬也琨無所取納表獻祿俸之半州鎮舊有鼓吹又啓輸還及罷任孝武知其清問還資多少琨曰臣買宅百三十萬餘物稱之帝悅其對後為歷陽內史上以琨忠實徙為寵子新安王北中郎長史再歷度支尚書加光祿大夫初華孫長襲華爵新建縣侯嗜酒多愆失琨表以長將傾基緒請以長小弟佟嗣庶不墜素風從之琨後出為吳郡太守遷中領軍坐在郡用朝舍錢三十六萬營餉二宫諸王及作絳襖奉獻軍用左遷光祿大夫尋加太常及金紫加散騎常侍廷尉虞和議社稷合一神琨案舊糾駮不為屈時和見寵朝廷歎琨強正明帝臨崩出為會稽太守加都督坐誤竟囚降為冠軍順帝即位進右光祿大夫順帝遜位百僚陪列琨在晉世已為郎中至是攀畫輪獺尾慟泣曰人以夀為歡老臣以夀為戚既不能先驅螻蟻頻見此事百官人人雨淚髙帝即位領武陵王師加侍中時王儉為宰相屬琨用東海郡吏琨使人謂曰語郎三臺五省皆是郎用人方外小郡當乞寒賤省官何容復奪之遂不過其事尋解王師及髙帝崩琨聞國諱牛不在宅去臺數里遂步行入宫朝士皆曰故宜待車有損國體琨曰今日奔赴皆自應爾遂得病卒時年八十四贈金紫光祿大夫琨謙恭謹慎老而不渝家人雜事皆手自操執公事朝會必夙夜早起簡閲衣裳料數冠幘如此數四輕薄子以此笑之大明中尚書僕射顔師伯豪貴下省設女樂琨時為度支尚書要琨同聽傳酒行炙皆悉內妓琨以男女無親授之禮傳行每至令置牀上回面避之然後取畢又如此坐上莫不撫手嗤笑琨容色自若師伯後為設樂邀琨琨不往中領軍劉勔晚節有栖退志表求東陽郡尚書令袁粲以下莫不贊美之琨曰永初景平唯謝晦殷景仁為中領軍元嘉有到彥之若以為人望才譽勔不及也近聞加侍中己為怏怏便求東陽臣恐赤松子房未易輕擬其鯁直如此然性儉於財用設酒不過兩碗輒云此酒難遇鹽豉薑蒜之屬並挂屏風漿悉置牀下內外有求琨手自賦之景和中討義陽王昶六軍戒嚴應須紫檦左右欲營辦琨曰元嘉初征謝晦有紫檦在匣中不須更作檢取果得焉而避諱過甚父名懌母名恭心並不得犯焉時咸謂矯枉過正張敬兒南陽冠軍人也父醜為郡將軍官至節府參軍敬兒少便弓馬有膽氣好射虎發無不中南陽新野風俗出騎射而敬兒尤多膂力稍官至寧蠻行參軍隨郡人劉胡伐襄陽諸山蠻深入險阻所向皆破又擊胡陽蠻官軍引退敬兒單馬在後賊不能抗山陽王休祐鎮襄陽求善騎射士敬兒及襄陽俞湛應選敬兒善事人遂見寵為長兼行參軍泰始初隨府轉驃騎參軍署中兵參軍領軍討義嘉賊與劉胡相拒於鵲尾洲啓明帝乞本郡事平除南陽太守敬兒之為襄陽府將也家貧每休暇傭賃自給嘗為城東吳泰家擔水通泰家所愛婢事發將被泰殺逃賈人棺材中以蓋加上乃免及在鵲尾洲啓明帝云泰以絲助雍州刺史袁顗為弩弦黨同為逆若事平之日乞其家財帝許之至是收籍吳氏唯家人倮身得出僮役財貨直數千萬敬兒皆有之先所通婢即以為妾後為越騎校尉桂陽王休範事起𨽻髙帝頓新亭賊矢石既交休範曰服乘輿往勞樓下敬兒與黃回白髙帝求詐降以取之髙帝曰卿若能辦事當以本州相賞敬兒相與出城南放仗走大呌稱降休範喜召至輿側回陽致髙帝密意休範信之回目敬兒敬兒奪休範防身刀斬之左右數百人皆散敬兒馳馬持首歸新亭除驍騎將軍加輔國將軍髙帝置酒謂敬兒曰非卿之功無今日安髙帝以敬兒人位既輕不欲便使為襄陽重鎮敬兒求之不已乃微動髙帝曰沈攸之在荆州公知其欲何所作不出敬兒以防之恐非公之利也帝笑而無言乃以為雍州刺史加都督驍騎將軍如故封襄陽侯部泊沔口敬兒乘舴艦過江詣晉熙王燮中江遇風船覆左右丁壯者各泅走餘二小史沒輪下求救敬兒敬兒兩腋挾之隨船仰得在水上如此翻覆行數十里方得迎接失所持節更給之沈攸之聞敬兒上遣人伺覘見雍州迎軍儀甚盛慮見掩襲密自為備敬兒至鎮厚結攸之信饋不絶得其事迹密白髙帝攸之得髙帝書翰論選用方伯密事輒示敬兒以為反間敬兒終無二心敬兒又與攸之司馬劉攘兵情款及蒼梧廢敬兒疑攸之當因此起兵密以問攘兵攘兵無所言唯寄馬鐙一隻敬兒乃為之備升明元年冬攸之乃遣使報敬兒敬兒勞接周至為設食訖列仗於聽事前斬之遂集部曲頃攸之下當襲江陵敬兒告變使至髙帝大喜進號鎮軍將軍改督時攸之至郢城敗走其子元琰與兼長史江乂别駕傅宣等還江陵敬兒軍至白水元琰聞城外鶴唳謂是呌聲恐懼欲走其夜乂宣開門出奔城潰元琰奔寵洲見殺敬兒至江陵誅攸之親黨沒入其財數千萬善者悉以入私送臺省者百不一焉攸之於湯渚村自經死居人送首荆州敬兒使楯擎之蓋以青繖徇諸市郭乃送建業進爵為公敬兒在雍州貪殘人間一物堪用莫不奪取於襄陽城西起宅聚物貨宅大小殆侔襄陽又欲移羊叔子墮淚碑於其處置臺綱紀諫曰此羊太傅遺德不宜遷動敬兒曰羊太傅是誰我不識及齊受禪轉侍中中軍將軍遷散騎常侍車騎將軍置佐史髙帝崩遺詔加開府儀同三司於家敬兒竊泣曰官家大老天子可惜太子年少向我所不及也及拜王敬則戲之呼為褚淵敬兒曰我馬上所得終不能作華林閣勳也敬則甚恨焉初敬兒微時有妻毛氏生子道門而鄉里尚氏女有色貌敬兒悅之遂棄毛氏而納尚氏為室及居三司尚氏猶居襄陽宅慮不復外出乃迎家口悉下至都啓武帝不蒙勞問敬兒心自疑及袁崇祖死愈恐懼性好卜術信夢尤甚初征荆州每見諸將帥不遑有餘計唯敘夢云未貴時夢居村中社樹歘髙數十丈及在雍州又夢社樹直上至天以此誘説部曲自云貴不可當由是不自測量無知又使於鄉里為謡言使千兒輩歌曰天子在何處宅在赤谷口天子是阿誰非豬如是狗敬兒家在冠軍宅前有地名赤谷既得開府又望班劍語人曰我車邊少班蘭物敬兒長自荒逺少習武事既從容都下又四方寧靖益不得志其妻尚氏亦曰吾昔夢一手熱如火而君得南陽郡元徽中夢一髀熱如火君得本州建元中夢半體熱尋得開府今復舉體熱矣以告所親言其妻初夢次夢又言今舉體熱矣閹人聞其言説之事達武帝敬兒又遣使與蠻中交關武帝疑有異志永明九年敕朝臣華林八關齋於坐收敬兒初左右雷仲顯常以盈滿誡敬兒不能從至知有變抱敬兒泣敬兒脫冠貂投地曰用此物誤我及子道門道暢道休並伏誅少子道慶見宥後數年上與豫章王嶷三日曲水內宴有舴艋船流至御座前覆沒上由是言及敬兒悔殺之敬兒始不識書及為方伯乃習學讀孝經論語初徴為護軍乃潛於密室中屏人學揖讓答對空中俯仰妾侍竊窺笑焉將拜三司謂其妻嫂曰我拜後府開黃閣因口自為鼓聲初得鼓吹羞便奏之又於新林姥廟為妾祈子祝神口自稱三公其鄙俚如此始其母於田中卧夢犬子有角舐之已而有娠生敬兒故初名茍兒又生一子因茍兒之名復名豬兒宋明帝嫌茍兒名鄙改為敬兒故豬兒亦改為恭兒位正員外郎謝罪歸本縣常居上保村不肯出仕與居人不異與敬兒愛友甚篤及聞敬兒敗走入蠻後首出原其罪王敬則臨淮陽人也僑居晉陵南沙縣父縣小吏母為女巫常語人云敬則生而胞衣紫色應得鳴鼓角人笑之曰得吹角可矣敬則年長兩腋下生乳各長數寸嘗夢騎五色師子年二十餘善拍張補刀戟左右宋前廢帝使之跳刀髙出白虎幢五六尺接無不中仍撫髀拍張補俠轂隊主領細鎧左右與夀寂之弒前廢帝明帝即位以為直閣將軍封重安縣子敬則少時於草中射獵有蠱如烏豆集其身摘去乃脫脫處皆流血詣道士卜之云此封侯之瑞也敬則喜故出都自效補暨陽令初敬則行至暨陽陸主山下宗侣十餘船同發敬則船獨不進乃令人入水推之見一烏漆棺敬則祝曰爾非凡器若是吉徴使船速進吾富貴當改葬爾船乃去須臾入縣收棺葬之縣有一部劫居山中為民患敬則遣人致意劫帥令出首當相申論郭下廟神甚酷烈百姓信之敬則引神為誓必不相負帥出敬則於廟中設酒會劫帥於坐收縛之曰吾啓神若負誓還神十牛今不得違誓即殺十牛解神遂斬諸劫百姓悅之元徽初隨髙帝拒桂陽賊於新亭敬則與陳顯達髙道慶乘舸䒁於江中迎戰大破賊水軍禁其舟艦事寧帶南泰山太守右俠轂主安成王參軍蒼梧狂虐左右不自保敬則以髙帝有威名歸誠奉事每下直輒往領軍府夜著青衣扶匐道路為髙帝聽察蒼梧去來髙帝令於殿內伺機既而楊玉夫等將蒼梧首投敬則敬則馳謁髙帝帝乃戎服入宫至永明門門郎疑之不開門髙帝呼之急乃開敬則隨帝入殿門明日西貴集議敬則拔白刃在髙帝側跳躍曰誰敢作同異者升明元年遷輔國將軍領臨淮太守知殿內宿衛兵事沈攸之事起進敬則冠軍將軍髙帝入守朝堂袁粲起兵召領軍劉韞直閣將軍卜伯興等於宫內相應戒嚴將發敬則開關掩襲皆殺之殿內竊發盡平敬則之力也政事無大小帝並以委之敬則不識書但能下名然善決斷齊臺建為中領軍髙帝將受禪材官薦易太極殿柱順帝避土不肯出宫遜位明日當臨軒順帝又逃宫內敬則將輿入迎帝啓譬令出引令升車順帝不肯即上收淚謂敬則曰欲見殺乎敬則答曰出居别宫爾官先取司馬家亦復如此順帝泣而彈指曰唯願後身生生世世不復與天王作因緣宫內盡哭聲徹於外順帝拍敬則手曰必無過慮當餉輔國十萬錢建元元年出為都督南兖州刺史封尋陽郡公加妻懷氏爵為尋陽國夫人二年魏軍攻淮泗敬則恐委鎮還都百姓皆辦嚴奔走上以其功臣不問以為都官尚書遷吳興太守郡舊多剽掠有十數嵗小兒於路取遺物敬則殺之以徇自此路不拾遺郡無劫盜又嘗得一偷召至前鞭之使偷身長掃街路久之乃令偷舉他偷自代諸偷恐為所識皆逃走境內以清仍入烏程市過見屠肉枅嘆曰吳興昔無枅是我少時在此所作也召故人飲酒説平生不以為屑也遷護軍以家為府三年以改葬去職詔贈其母尋陽國太夫人改授侍中撫軍髙帝崩遺詔敬則以本官領丹陽尹尋遷會稽太守加都督永明二年給鼓吹一部會土邊帶湖海人丁無士庶皆保塘役敬則以功力有餘悉評斂為錢送臺庫以為便宜上許之三年進號征東將軍宋廣州刺史王翼之子妾路氏酷暴殺婢媵翼之子法朗告之敬則付山隂獄殺之路氏家訴為有司所奏山隂令劉岱坐棄市刑敬則入朝上責之曰人命至重誰下意殺之都不啓聞敬則曰是臣愚意臣知何物科法見背後有節便言應得殺人劉岱亦引罪上赦之敬則免官以公領郡後與王儉俱即本號開府儀同三司時徐孝嗣於崇禮門候儉因嘲之曰今日可謂連璧矣儉曰不意老子遂與韓非同傳人以告敬則敬則欣然曰我本南沙縣吏徼幸得細鎧左右遭風雲以至於此遂與王衛軍同日拜三公復何恨了無恨色朝士以此多之十一年授司空敬則名位雖達不以富貴自遇初為散輩使魏於北館種楊栁後員外郎虞長曜使北還敬則問我昔種楊栁今若大小長曜曰虜中以為甘棠武帝令羣臣賦詩敬則曰臣幾落此奴度上問之對曰臣若解書不過作尚書都令史耳那得今日敬則雖不大識書而心甚警黠臨都令省事讀辭下教制決皆不失理明帝輔政密有廢立意隆昌元年出敬則為會稽太守加都督海陵王立進位太尉明帝即位為大司馬臺使拜授日雨大洪注敬則文武皆失色一客旁曰公由來如此昔拜丹陽尹吳興時亦然敬則大悅曰我宿命應得雨乃引羽儀備朝服導引出聽事拜受意猶不自得吐舌久之帝既多殺害敬則自以髙武舊臣心懷憂懼帝雖外厚為其禮而內相疑備數訪問敬則飲食體幹聞其衰老且以居內地故得少安後遣蕭坦之將齋仗五百人行晉陵敬則諸子在都憂怖無計上知之問計於梁武梁武曰敬則豎夫易為感唯應錫以子女玉帛厚其使人如斯而已上納之吳人張思祖敬則謀主也為府司馬頻銜使上偽傾意待之以為遊擊將軍遣敬則子仲雄入東安慰之仲雄善彈琴江左有蔡雍焦尾琴在主衣庫上敕五日一給仲雄仲雄於御前鼓琴作懊憹曲歌曰常歎負情憹郎今果行許又曰君行不淨心那得惡人處帝愈猜愧永泰元年帝疾屢經危殆以張瓌為平東將軍吳郡太守置兵佐密防敬則內外傳言當有異處分敬則聞之竊曰東今有誰秪是欲平我耳東亦何易可平吾終不受金罌金罌謂鴆酒也諸子怖懼第五子幼隆遣正員將軍徐嶽以情告徐州行事謝朓為計若同者當走報敬則朓執嶽馳啓之敬則承局參軍徐庶家在京口其子密以報庶庶以告敬則五官王公林公林敬則族子常所委信公林勸敬則急送啓賜兒死單舟星夜還都敬則曰若爾諸郎要應有信且忍一夕其夜呼僚佐文武摴蒱賭錢謂衆曰卿諸人欲令我作何計莫敢先答防閣丁興懷曰官秪應作爾敬則不語明旦召山隂令王詢臺侍御史鍾離祖願敬則橫刀跂坐問詢等發丁可得幾人庫見有幾錢物詢祖願對並乖旨敬則怒將出斬之王公林又諫敬則曰官詎不更思敬則唾其面曰小子我作事何關汝小子乃起兵招集配衣一二日便發欲劫前中書令何允還為尚書令長史王弄璋司馬張思祖止之曰何令髙蹈必不從不從便應殺之舉大事先殺朝賢事必不濟乃率實甲萬人過浙江謂曰應須作檄思祖曰公今自還朝何用作此乃上朝廷遣輔國將軍前軍司馬左興盛直閣將軍馬軍主胡松三千餘人築壘於曲阿長岡尚書左僕射沈文季為持節都督屯湖頭備京口路敬則以舊將舉事百姓擔篙荷鍤隨逐之十餘萬衆至武進陵口慟哭乘肩輿而前遇興盛山陽二寨盡力攻之官軍不敵欲退而圍不開各死戰胡松領軍馬突其後白丁無器仗皆驚散敬則大呌索馬再上不得上興盛軍容袁文廣斬之傳首京師是時上疾已篤敬則倉卒東起朝廷震懼東昏侯在東宫議欲叛使人上屋望見征虜亭失火謂敬則至急裝欲走有告敬則者敬則曰檀公三十六策走是上計汝父子唯應急走耳蓋諺譏檀道濟避魏時事也敬則之來聲勢甚盛凡十日而敗時年六十四朝廷漆其首藏在武庫至梁天監元年其故吏夏侯亶始表請收葬許之陳顯達南彭城人也宋景和中以軍功封彭澤子位羽林監濮陽太守𨽻髙帝討桂陽賊於新亭壘劉勔大桁敗賊乘勝進至杜姥宅髙帝遣顯達自查浦渡淮緣石頭北道入屯東堂宫中乃安顯達出杜姥宅大戰於宣陽津陽門大破之賊矢中左目拔箭而鏃不出地黃村潘嫗善禁先以釘釘柱嫗禹步作氣釘即時出乃禁顯達目中鏃出之事平封彭城侯再遷平越中郎將廣州刺史加都督沈攸之事起顯達遣軍援臺長史到遁司馬諸葛導勸顯達保境蓄衆密通彼此顯達於坐手斬之遣表疏歸心髙帝事平拜大司馬髙帝即位拜護軍將軍帝後御膳不宰牲顯達上蒸熊一盤上即以充飯後拜都督益州刺史武帝即位進號鎮西將軍益部山險多不賔服大度村獠前後刺史不能制顯達遣使責其租賧獠師曰兩眼刺史尚不敢調我遂殺其使顯達分部將吏聲將出獵夜往襲之男女無少長皆斬之自此山夷震服永明二年徴為侍中護軍將軍顯達纍任在外經髙帝之憂及見武帝流涕悲咽上亦泣心甚嘉之八年為征南大將軍江州刺史給鼓吹顯達謙厚有智計自以人微位重每遷官常有愧懼之色有子十餘人誡之曰我本志不及此汝等勿以富貴陵人家既豪富諸子與王敬則諸兒並精車牛麗服飾當世快牛稱陳世子青王三郎烏吕文顯折角江瞿曇白鼻而皆集陳舍顯達知此不悅及子休尚為郢府主簿過九江拜别顯達曰凡奢侈者鮮有不敗麈尾蠅拂是王謝家許汝不須捉此自遂即取於前毁燒之其靜退如此豫廢鬱林之勳延興元年為司空進爵為公明帝即位進太尉封鄱陽郡公加兵二百人給油絡車後以太尉封鄱陽公為三公事而職典連率人以為格外三公上欲悉除髙武諸孫微言問顯達答曰此等豈足介慮上乃止顯達建武世心懷不安深自貶匿車乘朽敗導從鹵簿皆用羸小不過十人侍宴酒後啓上借枕上令與之顯達撫枕曰臣年已老富貴已足唯少枕枕死特就陛下乞之上失色曰公醉矣以年老告退不許永泰元年魏寇雍州乃遣顯達北討永元元年顯達督平北將軍崔慧景衆軍四萬圍南鄉界馬圈城去襄陽三百里攻之四十日魏軍食盡噉死人肉及樹皮魏軍突走斬獲千計顯達入據其城遣軍主莊邱黑進取南鄉縣魏孝文帝自領十餘萬騎奄至兵甚急軍主崔恭祖胡松以烏布幔盛顯達數人擔之出均水口臺軍緣道奔退死者三萬人顯達素有威聲著於蠻虜至是大損喪焉御史中丞范岫奏免顯達官顯達又表解職不許求降號又不許以為江州刺史鎮盆城初王敬則事起始安王遙光啓明帝慮顯達為變欲追軍還事平乃寢顯達亦懷危怖及東昏立彌不樂還都得此授甚喜尋加領征南大將軍給三望車顯達聞京師大相殺戮徐孝嗣等皆死傳聞當遣兵襲江州顯達懼禍十一月十五日舉兵欲直襲建鄴以掩不備又遙指郢州刺史建安王寶夤為主朝廷遣後軍將軍胡松等據梁山顯達率衆數千人發尋陽與戰於采石大破松等京邑震恐十二月潛軍渡取石頭北上襲宫城宫掖大駭閉門守備遇風失曉顯達馬矟從步軍數百人於西州前與臺軍戰再合大勝矟折手猶殺十餘人官軍繼至顯達不能抗退走至西州後烏榜村騎官趙潭注矟刺落馬斬之於籬側血涌湔籬似淳于伯之被刑也時年七十三顯達在江州遇疾不療尋而差意甚不悅是冬連大雪梟首於朱雀而雪不集諸子皆伏誅顯達長史庾𢎞逺字士操潁川􅋣陵人宋吏部尚書炳之之子也清實有士譽顯達敗斬於朱雀舫將刑索帽著之曰子路結纓吾不可以不冠而死謂看者曰吾非賊乃是義兵為諸君請命爾陳公舉事太輕若用吾言天下將免塗炭𢎞逺子子曜年十四抱持父乞代命遂并斬之崔慧景字君山清河東武城人也祖構奉朝請父系之州别駕慧景少有志業仕宋為長水校尉髙帝在淮隂慧景與宗人祖思同時自結及髙帝受禪封安樂縣子為都督梁南秦二州刺史永明四年為司州刺史母喪詔起復本任慧景每罷州輒傾資奉獻動數百萬武帝以此嘉之十年為都督豫州刺史鬱林即位慧景以少主新立密與魏通朝廷疑之明帝輔政遣梁武帝至夀春安慰之慧景密啓送誠勸進建武四年為度支尚書領太子左率東昏即位為護軍時輔國將軍徐世標專權號令慧景備員而已帝既誅戮將相舊臣皆盡慧景自以年宿位重轉不自安及裴叔業以夀陽降魏即授慧景平西將軍假節侍中護軍如故率軍水路征夀陽軍頓白下將發帝長圍屏除出琅邪城送之帝戎服坐樓上召慧景騎進圍內無一人自隨裁交數言拜辭而去慧景出至白下甚喜曰此頸非復小豎等所折也子覺為直閣將軍慧景密與之期時江夏王寶元鎮京口聞慧景北行遣左右余文興説之曰朝廷任用羣小猜害忠賢江劉徐沈君之所見身雖魯衛亦不知滅亡何時君今段之舉有功亦死無功亦死欲何求所免機不可失今擁強兵北取廣陵收吳楚徑卒身舉州以相應取大功如反掌耳慧景常不自安聞言響應于時廬陵王長史蕭寅司馬崔恭祖守廣陵城慧景以寶元事告恭祖恭祖先無宿契口雖相和心實不同還以事告寅共為閉城計寅心謂恭祖與慧景同謂曰廢昏立明人情所樂寧可違拒恭祖猶執不同俄而慧景至恭祖閉門不敢出慧景知其異也泣數行而去中兵參軍張慶延明嚴卿等勸慧景襲取廣陵及密遣軍主劉靈運間行突入慧景俄繼至遂據其城子覺至仍使領兵襲京口寶元本謂大軍并來及見人少極失所望拒覺擊走之恭祖及覺精兵八千濟江恭祖心本不同反至蒜山欲斬覺以軍降京口事既不果而止覺等軍器精嚴栁燈沈佚等謂寶元曰崔護軍威名既重乃誠可見既已脣齒忽中道立異彼以樂歸之衆亂江而濟誰能拒之於是登北固樓並千蠟燭為烽火舉以應覺帝聞變以右衛將軍左興盛假節都督下水陸衆軍慧景停二日便率大衆一時俱濟江趨京口寶元仍以覺為前鋒恭祖次之慧景領大都督為衆軍節度東府石頭白下新亭諸城皆潰左興盛走不得入宫逃淮渚荻船中慧景禽殺之慧景稱宣德皇后令廢帝為吳王時栁燈别推寶元崔恭祖為寶元羽翼不復承奉慧景嫌之巴陵王昭胄先逃人間出投慧景意欲向之故猶豫未知所立此聲頗泄燈恭祖始二於慧景又恭祖勸慧景射火箭燒北掖樓慧景以大事垂定後若更造費用功多不從其計性好談義兼解佛理頓法輪寺對客髙談恭祖深懷怨望先是衛尉蕭懿為豫州刺史自歷陽步道征夀陽帝遣密使告之懿率軍主胡松李居士等自采石濟岸頓越城舉火臺城中鼓呌稱慶恭祖先勸慧景遣二千人斷西岸軍令不得度慧景以城旦夕降外救自然應散不許恭祖請擊義師又不許乃遣子覺將精甲數千人渡南岸義師昧旦進戰覺大敗慧景人情離沮恭祖頓軍興皇寺於東宫掠得女妓覺來逼奪由是忿恨其夜崔恭祖與驍將劉靈運詣城降慧景乃將腹心數人潛去欲北渡江城北諸軍不知猶以為拒戰城內出蕩殺數百人慧景餘衆皆奔慧景圍城凡十二日軍旅散在都下不為營壘及走衆於道稍散單馬至蟹浦投漁人太叔榮之榮之故為慧景門人時為蟹浦戍謂之曰吾以樂賜汝汝為吾覓酒既而為榮之所斬以頭內鰌籃中擔送都恭祖者慧景宗人驍果便馬矟氣力絶人頻經軍陳討王敬則與左興盛軍容袁文曠爭敬則首訴明帝曰恭祖秃馬絳衫手刺倒景則故文曠得斬其首以死易勳而見枉奪若失此勳當刺殺左興盛帝以其勇健謂興盛曰何容令恭祖與文曠爭功慧景平後恭祖繫尚方少時殺之覺亡命為道人見執伏法覺弟偃年十八便身長八尺博涉書記善蟲篆為始安內史藏竄得免和帝西臺立以為寧朔將軍中興元年詣公車尚書申寃言多指斥尋下獄死先是東陽女子婁逞變服詐為丈夫粗知圍碁解文義遍遊公卿仕至揚州議曹從事事發明帝驅令還東逞始作婦人服而去歎曰如此之伎還為老嫗豈不惜哉此人妖也隂而欲為陽事不果故泄敬則遙光顯達慧景之應也李安人蘭陵承人也祖嶷衛軍將軍父欽之薛令安人少有大志嘗拊髀歎曰大丈夫處世富貴不可希取三將五校何難之有隨父在縣宋元嘉中縣被魏克父沒于魏安人尋率部曲自拔南歸明帝時稍遷武衛將軍晉安王子勛反遣領水軍拒之纍戰皆捷又擊鵲尾洲大破之事平明帝大會新亭樓勞諸軍主摴蒱共賭安人五擲皆盧帝大驚因謂安人曰卿面方如田封侯狀也安人少時貧窶有一人從門過相之曰君後當與天子交手共戲至是安人尋此人不知所在遷廣陵太守行南兖州事髙帝在淮隂安人遙相結事元徽初除司州刺史領義陽太守及桂陽王休範反安人遣軍援京師建平王景素作難安人破其軍於葛橋景素誅安人行南徐州事城局參軍王回素為安人所親盜絹二匹安人流涕謂之曰我於卿契闊備嘗今日犯王法此乃卿負我於軍門斬之厚為斂祭軍府皆震服轉東中郎司馬行會稽郡事安人將東髙帝與别宴語淹留終日時蒼梧縱虐髙帝憂迫無計安人白髙帝欲於東奉江夏王躋起兵髙帝不許乃止髙帝即位為中領軍封康樂侯自宋泰始以來內外頻有賊寇將帥以下各募部曲屯聚京師安人表陳之以為自非淮北常備其外餘軍悉皆輸遣若親近宜立隨身者聽限人數上納之故詔斷衆募時王敬則以勳誠見親至於家國密事上唯與安人論議謂安人曰署事有卿名我便不細覽也尋為領軍將軍魏攻夀春至馬頭詔安人禦之魏軍退安人沿淮進至夀春先是宋時亡命王元初聚黨六合山僭大號自云垂手過膝州郡討之不能禽積十餘年安人生禽之斬建康市髙帝崩遺詔加侍中武帝即位為丹陽尹遷尚書左僕射安人時屢啓密謀見賞又善結尚書令王儉故世傳儉啓有此授尋上表以年疾求退為吳興太守於家載米往郡時服其清吳興有項羽神護郡聽事太守至郡不得先上必須祀以軛下牛安人奉佛法不與神牛著屐上聽事又請僧像於聽上入關齋俄而牛死葬廟側今呼為李公牛冢安人尋卒世以神為崇諡肅侯子元履幼有操業甚間政體為司徒竟陵王子良法曹參軍與王融遊狎及王融誅鬱林敕元履隨右衛將軍王廣之北征密令征北殺之廣之先為安人所厚又知元履無過甚擁護之會鬱林敗死元履拜謝廣之曰二十二載父母之年自此以外丈人之賜也仕梁為吳郡太守度支尚書衡廣青冀四州刺史戴僧靜會稽永興人也少有膽力便弓馬事刺史沈文秀俱沒魏後將家屬叛還淮隂髙帝撫畜之常在左右後於都私齎錦出事發繫南兖州獄髙帝遣薛深餉僧靜酒食以刀子置魚腹中僧靜與獄吏飲既醉以刀刻械手自折鎖發屋而出歸髙帝匿之齋內以其家貧年給穀千斛會魏軍至僧靜應募出戰單刀直前魏軍奔退又追斬三級時天寒甚乃脫衣口銜三頭拍浮而還以功補軍主沈攸之事起袁粲據石頭髙帝入朝堂遣僧靜將腹心先至石頭經略袁粲時蘇烈據倉城門僧靜射書與烈夜縋入城粲登城西南門列燭火處分臺軍至射之火乃滅回登東門其將軍孫曇瓘驍勇善戰每蕩一合輒大殺傷官軍死者百餘人軍主王天生殊死拒戰故得相持自亥至丑有流星赤色照地墜城中僧靜率力攻倉門身先士卒手斬粲於東門外軍燒門入遂破石頭以功除前將軍加寧朔將軍髙帝即位封建昌縣侯位太子左衛率武帝踐阼出為北徐州刺史買牛給貧人耕種甚得荒情後除南中郎司馬淮南太守永明八年巴東王子響殺僚佐武帝召僧靜使領軍向江陵僧靜面啓上曰巴東王年少長史司馬捉之太急忿不思難故耳天子兒過誤殺人有何大罪官忽遣軍西上人情惶懼無所不至臣不敢奉敕上不答而心善之徙為廬陵王中軍司馬髙平太守卒諡壯侯桓康北蘭陵承人也勇果驍悍宋大明中隨髙帝為軍容從武帝在贛縣泰始初武帝起義為郡所縶衆皆散康裝擔一頭貯穆后一頭貯文惠太子及竟陵王子良自負置山中與門客蕭欣祖等四十餘人相結破郡獄出武帝郡追兵急康等死戰破之隨武帝起兵摧堅陷陳膂力絶人所經村邑恣行暴害江南人畏之以其名怖小兒畫其形於寺中病瘧者寫形貼著牀壁無不立愈後除襄賁令桂陽王休範事起康棄縣還都就髙帝會事已平除員外郎元徽五年七月六日夜少帝微行至領軍府帝左右人曰一府皆眠何不緣牆入帝曰我今夕欲向一處作適待明日夜康與髙帝所養健兒盧荒向黑於門間聽得其語明旦王敬則將帝首至扣府門康謂是變與荒黑拔白刃欲出仍隨髙帝入宫髙帝鎮東府除武陵王中兵除寧朔將軍帶蘭陵太守常衛左右髙帝誅黃回回時為南兖州部曲數千欲收之恐為亂召入東府停外齋使康數回罪而殺之回初與屯騎校尉王宜興同為石頭之謀髙帝隱其事猶以重兵付回而配腹心時人為之語曰欲侜張問桓康除後軍將軍直閣將軍南濮陽太守建元元年封吳平縣伯髙帝謂康曰卿隨我日久未得方伯亦當未解我意正欲與卿先共滅虜耳三年魏軍動遣康於淮陽與戰大破之進陷魏樊城髙帝喜明年以康為持節都督青冀二州刺史武帝即位卒於驍騎將軍焦度字文績南安氐人也祖文圭避難居仇池宋元嘉中裴方明平楊難當度父明與千餘家隨居襄陽乃立天水郡略陽縣以居之度少有器幹便弓馬以歸國補北館客孝武初青州刺史顔師伯出鎮滑臺度領幢主送之師伯版為已輔國府參軍魏寇清口度領軍救援與魏騎將豹皮公遇交槊鬪豹皮公墮馬獲其具裝馬手殺數十人師伯啓孝武稱度氣力弓馬並絶人帝召還充左右見度形狀謂師伯曰真健人也補晉安王子勛夾轂隊主隨鎮江州子勛起兵以度為龍驤將軍領三千人為前鋒屯赭圻每與臺軍戰無不勝事敗逃宫亭湖中為寇朝廷甚憂之使江州刺史王景文誘降之景文以為已鎮南參軍領中軍直兵厚待之隨景文還都常在府州內景文被害夕度大怒勸景文拒命景文不從明帝不知也以度武勇補晉熙王燮防閣隨鎮夏口武陵王贊代燮為郢州以度為贊前軍參軍沈攸之事起轉度中直兵髙帝又使假度輔國將軍屯騎校尉轉右將軍度容貌壯醜皮膚若漆質直木訥口不能出言晉熙王夾轂主周彥與度俱在郢州彥有左右人與度父同名彥常呼其名使役之度嗔忿呵責彥曰汝知我諱明而恆呼明何也及在郢城尤為攸之所忿攸之大衆至夏口將直下都留偏兵守郢而已度於城樓上肆言罵辱攸之至自發露形體穢辱之故攸之怒改計攻城甚急度親力戰攸之衆蒙楯將登度令投以穢器賊衆不能冒至今呼此樓為焦度樓事寧度功居多轉後軍將軍封東昌縣子東宫直閣將軍還都為貴戚追敘郢城褰露穢褻之事其戇如此為人朴澀欲就髙帝求州比及見竟不涉一語髙帝以其不間政事竟不用之後求竟陵郡不知所以置辭親人授之辭百餘言度習誦數日皆得上口會帝履行石頭城度於衆中自陳臨時卒忘其所教乃大言曰度啓公度啓公度無食帝笑曰卿何憂無食即賜米百斛建元四年乃除淮陽太守性好酒醉輒暴怒上常使人節之度年雖老而氣力如故除遊擊將軍卒曹虎字士威下邳人也本名虎頭髙帝鎮東府使虎與戴僧靜各領白直三百人後為屯騎校尉帶南城令石頭平封羅江縣男及髙帝受禪改封監利縣武帝即位纍遷驍騎將軍帝以虎頭名鄙敕改之鬱林即位進號前將軍隆昌元年為雍州刺史建武二年進爵為侯東昏即位為前將軍鎮軍司馬永元元年始安王遙光反虎領軍屯青溪大橋事寧轉散騎常侍右衛將軍虎形幹甚毅善於誘納晚節在雍州致見錢七千萬皆厚輪大郭他物稱是馬八百匹僕妾蔬食膳無膏腴嘗為梅蟲兒茹法珍設女妓金翠曜眼器服精華蟲兒等因是欲誣而奪之人傳虎每好風景輒開庫招拍張武戲帝疑虎舊將領兼利其財新除未及拜遇誅及收兵至歎曰諸人知我無異意所以殺我政欲取吾財貨伎女耳恨令衆輩見之諸子長成者並見誅唯子世宗兄弟三人未冠繫尚方梁武帝兵至得免虎雖武士頗有知人鑒梁武帝及崔慧景之在襄陽時崔方貴盛虎性儉嗇無所餉遺獨饋梁武帝謂曰卿必大貴我當不及見今以弱子相託每密送錢物并好馬時帝在戎多乏就虎換借未嘗不得遂至十七萬及帝即位思其惠天監二年帝忽夢如田塍下行兩邊水深無底夢中甚懼忽見虎來負帝得過曰卿今為天下主乃爾忘我顧託之言邪我兒飢寒無衣昔所換十七萬可還其市宅帝覺即使主書送錢還之使用市宅子世澄世宗並蒙抽擢三二年間皆迭為大郡世宗性嚴明頗識兵勢末遂封侯富顯歷位太子左衛率贈左散騎常侍左衛將軍諡曰壯侯吕安國廣陵人也宋大明末以將領見任隱重有幹局為劉勔所稱泰始二年為勔軍副征殷琰以功封鍾武縣男纍遷兖州刺史及沈攸之事發髙帝以安國為湘州刺史建元元年進爵為侯轉右衛將軍加給事中後改封湘鄉侯武帝即位纍遷光祿大夫加散騎常侍安國欣有文授謂其子曰汝後勿袴褶驅使單衣猶恨不稱當為朱衣官也歷都官尚書太子左率領軍將軍安國纍居將率在朝以宿舊見遇尋遷散騎常侍金紫光祿大夫給扶永明八年卒諡肅侯周山圖字季寂義興義鄉人也家世寒賤年十五六氣力已絶衆噉食恆兼數人鄉里獵戲集聚嘗為主帥指麾處分皆見從不事産業恆願為將雖勇健而不間弓馬於書題甚拙謹直少言未嘗説人短長與人周旋皆白首不異宋元嘉二十七年魏軍至瓜步臺符取健兒山圖應募領白衣隊主以軍功除員外郎加鎮武將軍及鎮軍將軍張永侵魏山圖領二千人迎運至武原為魏軍所追合戰多傷殺魏軍稱其勇呼為武原將及永軍大敗山圖收散卒守下邳城還除給事中冗從僕射直閣將軍山圖好酒多失明帝數加怒誚後遂自改纍遷淮南太守時盜發桓溫冢大獲寶物客竊取以遺山圖山圖不受簿以還官遷左中郎將髙帝輔政山圖密啓沈攸之久有異圖宜為之備帝笑而納之攸之事起武帝為西討都督啓山圖為軍副攸之攻郢城武帝令山圖量其形勢山圖曰攸之為人性度險刻無以結固士心如頓兵堅城之下適所以為離散之漸耳及攸之敗髙帝謂曰周公前言可謂明於見事矣建元元年封晉興縣男武帝踐阼遷竟陵王鎮北司馬帶南平昌太守以湓城之舊出入殿省甚見親信義鄉縣長風廟神姓鄧先經為縣令死遂發靈山圖啓乞加神位輔國將軍上答曰足狗肉便了事何用階級為轉黃門郎領羽林監四廂直衛山圖於新林立墅舍晨夜往還上謂曰卿罷萬人都督而輕行郊外自今往野可以仗身自隨以備不虞及疾上手敕問疾尋卒年六十四周盤龍北蘭陵人宋世土斷屬東平盤龍膽氣過人尤便弓馬隨軍討擊陷陳先登以軍功纍遷龍驤將軍封晉安子元徽二年桂陽構難盤龍時為冗從僕射隨髙帝出頓新亭稍至驍騎將軍改封沌陽侯髙帝即位進號右將軍建元元年魏攻夀春以盤龍為軍主假節助豫州刺史垣崇祖拒魏盤龍率馬步於西澤中奮擊殺傷數萬上聞之喜下詔稱美送金叉十二枚與其愛妾杜氏手敕曰餉周公阿杜轉太子左衛率明年魏攻淮陽圍角城先是上遣軍主成買戍角城買辭於王儉曰今段之行必以死報衡門蓬户不朱斯白小人弱息當得一子儉問其故答曰若不歿虜則必破虜兒不作孝子當作世子也孝子則門加素堊世子則門施丹堊至是魏圍買數重上遣領軍將軍李安人救之敕盤龍率馬步下淮隂就李安人買與魏拒戰手所殺傷無數買晨起手中忽有數升血其日戰死首見斬猶尸據鞍奔還軍然後僵盤龍子奉叔單馬率二百餘人陷陳魏軍萬餘騎張左右翼圍繞之一騎走還報奉叔已沒盤龍方食棄筯馳馬奮矟直奔魏陳自稱周公來魏人素畏盤龍莫不披靡時奉叔已大殺魏軍得出在外盤龍不知乃東西衝擊魏軍莫敢當奉叔見其父久不出復躍馬入陳父子兩騎縈攪數萬人魏衆大敗盤龍父子由是名播北國形甚羸而臨軍勇果諸將莫逮永明五年為大司馬加征虜將軍濟陽太守武帝數講武常令盤龍領馬軍校尉騁矟後以疾為光祿大夫尋出為兖州刺史進爵為侯角城戍將張蒲與魏潛通因大霧乘船入清中採樵載魏人直向城東門盤龍坐為有司所奏詔白衣領職八坐尋奏復位加領東平太守盤龍表年老才弱不可鎮邊求解職見許還為散騎常侍光祿大夫武帝戲之曰卿著貂蟬何如兜鍪盤龍曰此貂蟬從兜鍪中生耳尋病卒年七十九子奉叔勇力絶人少隨盤龍征討所在暴掠為東宫直閣將軍鬱林在西州奉叔密得自進及即位與直閣將軍曹道剛為心膂奉叔善騎馬帝從其學騎尤見親寵得入內無所忌憚陵轢朝士就司空王敬則換米二百斛敬則以百斛與之不受敬則大懼乃更餉二百斛并金鉿等物敬則有一內妓帝令奉叔求奉叔不通徑前從者執單刀皆半拔敬則跣走入內既而自計不免乃出遙呼奉叔曰弟那忽能顧奉叔宣旨求妓意乃釋與綦母珍曹道剛朱隆之共相脣齒煽弄威權奉叔常翼單刀二十口出入禁圍既無别詔門衛莫敢訶每語人云周郎刀不識君求武帝御角及輿并求御仗以給左右事無不從又求黃門郎明帝作輔固執不能得乃令蕭諶蕭坦之説帝出奉叔為外鎮樹腹心又説奉叔以方伯之重奉叔納其言隆昌元年出為青冀二州刺史奉叔就帝求千户侯帝許之明帝以為不可忽謂蕭諶曰若不能見與千户侯不復應減五百户不爾周郎當就刀頭取辦耳既而封曲江縣男奉叔大怒於衆中攘刀厲目切齒明帝説諭乃受及將之鎮明帝慮其不可復制因其早入引往後堂執送廷尉盡之王廣之字士林一字林之沛郡相人也少好弓馬便捷有勇力初為馬隊主隨劉勔征殷琰琰兵既盛而合肥戍又阻兵為寇勔宣令軍中求征合肥者以大郡賞之廣之曰若得將軍所乘馬判能制之勔幢主皇甫肅謂勔曰廣之敢奪節下馬可斬勔曰觀其意必能立功即推鞍下馬與之及行合肥果拔勔大賞之即擢為軍主廣之於勔前謂肅曰節下若從卿言非唯斬壯士亦自無以平賊卿不賞才乃至此邪廣之由此知名初封蒲圻子肅有學術善舉止廣之亦雅相推慕勔亡後肅更依廣之廣之盛相賞接啓武帝以為東海太守其不念舊惡如此廣之後以征伐功位給事中冠軍將軍改封寧都縣子髙帝廢蒼梧出廣之為徐州刺史鍾離太守沈攸之事起廣之留都下豫平石頭仍從髙帝頓新亭髙帝誅黃回回弟駟及從弟馬兄子奴亡逸髙帝與廣之書曰黃回雖有微勳而罪過轉不可容近遂啓請御大小二輿為刺史服飾吾乃不惜為其啓聞政恐得輿復求畫輪車此外罪不可勝數弟自悉之今啓依法令廣之於江西搜捕駟等建元元年進爵為侯武帝即位纍遷右衛將軍散騎常侍前軍將軍延興元年為豫州刺史豫廢鬱林後拜為鎮南將軍江州刺史進應城縣公建武中位侍中鎮軍將軍給扶後卒贈車騎將軍諡壯公子珍國梁史有傳垣崇祖字敬逺一字僧寶略陽垣道人也伯父護之宋豫州刺史自有傳父詢之驍敢有氣力元凶弒逆𨽻輔國將軍張柬時張超手行大逆亦領軍𨽻柬詢之規殺之慮柬不同柬宿有此志又未測詢之同否互相觀察會超來論事柬色動詢之覺之即共定謀遣召超超疑之不至改宿他所詢之不知徑往斫之殺其僕於牀因與柬南奔時孝武已即位以為積射將軍梁山之役力戰中流矢卒贈冀州刺史崇祖年十四有幹略伯父護之謂門宗曰此兒必大吾門汝等不及也後隨徐州刺史薛安都入魏尋又率門宗據朐山歸宋求淮北立功明帝以為北琅邪蘭陵二郡太守封下邳子及髙帝鎮淮陰崇祖時戍朐山既受都督祗奉甚至帝以其武勇善待之崇祖謂其妹夫皇甫肅曰此真吾君也吾今逢主矣所謂千載一時遂密布誠節髙帝威名已著宋明帝尤所忌疾徴為黃門郎規害髙帝崇祖建策以免由是甚見親待參豫密謀元徽末髙帝懼禍令崇祖入魏即以家口託皇甫肅勒數百人將入魏界更聽後旨會蒼梧廢髙帝召崇祖領部還都從平沈攸之纍遷冠軍將軍兖州刺史及髙帝踐阼謂崇祖曰我新有天下夷虜不識運命必當重其蟻衆以送劉昶為辭以為軍衝必在夀春能制此寇非卿莫可為捍徙為豫州刺史監豫司二州諸軍事封望蔡侯建元元年魏遣劉昶馬步號三十萬攻夀春崇祖於城西北立堰塞淝水堰北起小城周為深塹使數千人守之謂長史封延伯曰虜必悉力攻小城若破此堰放水一激急逾三峽自然沈溺豈非小勞而大制邪及魏兵由西道集堰南分軍東路肉薄攻小城崇祖著白紗帽肩輿上城手自轉式日晡時決小史埭水勢奔下魏攻城之衆溺死以千數大衆退走初崇祖於淮隂見髙帝便自比韓白衆咸不信唯帝獨許之及破魏軍啓至上謂朝臣曰崇祖嘗擬韓白今真其人也進號都督崇祖聞陳顯達李安人皆增給軍儀乃啓求鼓吹上敕曰韓白何可不與衆異給鼓吹一部崇祖慮魏後攻淮北啓徙下蔡戍於淮東其冬魏果欲攻下蔡既聞內徙乃揚聲平除故城衆疑魏當於故城立戍崇祖曰下蔡去鎮咫尺魏豈敢置戍實是欲除此城正恐奔走殺之不盡耳魏果夷掘下蔡城崇祖大破之武帝即位為五兵尚書領驍騎將軍初豫章王有盛寵武帝在東宫崇祖不自附結及破魏軍詔使還朝與共密議武帝疑之曲加禮待酒後謂曰世間流言我已豁諸懷抱自今已後富貴見付也崇祖拜謝及去髙帝復遣荀伯玉敕以邊事受旨夜發不得辭東宫武帝以為不盡誠心銜之永明元年召為五兵尚書至京師詔稱其與荀伯玉構扇邊荒誅之時年四十四故人無敢至者獨有前豫州主簿夏侯恭叔出家財為殯時人以比欒布恭叔譙國人崇祖為豫州聞其才義辟為主簿兼掌書翰髙帝即位方鎮皆有賀表王儉見崇祖表咨嗟良久曰此恭叔辭也時宋氏封爵隨軍遷改恭叔以栁元景中興元勳劉勔殞身王事不宜見廢上表論之甚有義理事雖不從優詔見答後為竟陵令惠化大行木連理上有光如燭咸以為善政所致崇祖從父兄榮祖字華先父諒之宋北中郎府參軍榮祖少學騎射或曰何不學書榮祖曰曹操曹丕上馬橫槊下馬談論此可不負飲食矣吾輩無自全之伎何異犬羊乎宋孝建中為後軍參軍伯父護之子襲祖為淮陽太守孝武以事徙之嶺南護之不食而死帝疾篤又使殺襲祖襲祖臨死與榮祖書曰弟嘗勸我危行言孫今果敗矣明年初即位四方反叛除榮祖冗從僕射還徐州説刺史薛安都曰天之所廢誰能興之使君今不同八百諸侯如下官所見非計中也安都曰今京都無百里地莫論攻圍取勝自可相拍手笑殺且我不欲負孝武榮祖曰孝武之行足致餘殃今雖天下雷同正是速死無能為也安都曰不知諸人云何我不畏此大蹄馬在近急便作計榮祖被拘不得還因為安都將領安都引魏軍入彭城榮祖擕家屬南奔朐山髙帝在淮隂榮祖歸附髙帝保持之及宋明帝崩髙帝書送榮祖詣僕射褚淵除東海太守淵謂曰蕭公稱卿幹略故以郡相處榮祖善彈登西樓見翔鵠雲中謂左右當生取之於是彈其兩翅毛脫盡墜地無傷養毛生後飛去其妙如此元徽末蒼梧凶狂恆欲害髙帝帝欲奔廣陵起事荀伯玉等皆贊成之榮祖諫曰領軍府去臺百步公走人豈不知若單騎輕行廣陵人一旦閉門不相受公欲何之公今動足下牀恐便有叩臺門者公事去矣蒼梧明夕自至領軍府叩門欲害帝帝嘗以書案下安鼻為楯以鐵為書鎮如意甚壯大以備不虞欲以代杖蒼梧至府而曰且申今夕須至一處作適還當取奴尋遇弒髙帝謂榮祖曰不用卿言幾無所成豫佐命勳封將樂縣子永明二年為尋陽相南新蔡太守被告作大形棺材盛仗使鄉人載度江北案驗無實見原後拜兖州刺史初巴東王子響事方鎮皆啓稱子響為逆榮祖曰此非宜言政應云劉寅等孤負恩奬逼迫巴東使至於此時諸啓皆不得通事平後上乃省視以榮祖為知言九年從弟歷生亦為驍將位太子右率性苛暴與始安王遙光同反伏誅榮祖從父閎字叔通父遵為員外常侍閎為宋孝武帝南中郎參軍孝武帝即位以為交州刺史時交土全實閎罷州還資財巨萬孝武末年貪恣刺史二千石罷任還都必限使奉獻又以蒱戲取之要令罄盡乃止閎還至南州而孝武晏駕擁南資為富人明帝初為司州刺史北破薛道􅋆封樂鄉縣男出為益州刺史蜀還之資亦數千金先送獻物傾西資之半明帝猶嫌其少及閎至都詣廷尉自簿先詔獄官留閎於是悉送資財然後被遣凡蠻夷不受鞭罰輸財贖罪謂之賧時人謂閎為被賧刺史歷度支尚書衛尉髙帝輔政使褚淵為子晃求閎女閎辭以齊大非偶帝雖嘉其退讓而心不能歡即以晃婚王胄女謂豫章王嶷曰前欲以白象與垣公婚者重其夷淡事雖不遂心常怏然白象晃小字也及髙帝即位以有誠心封爵如故卒於金紫光祿大夫諡曰定子憘伯襲爵憘伯少負氣豪俠妙解射雉尤為武帝所重以為直閣將軍與王文和俱任頗以地勢陵之後出為巴西梓潼二郡太守時文和為益州刺史曰每憶昔日俱在閣下卿時視我如我今日見卿因誣其罪馳信啓之又輒遣蕭寅代憘伯為郡憘伯亦别遣啓臺待報寅以兵圍之明帝輔政知其無罪不欲乖文和乃敕憘伯解郡還為寅軍所躡束手受害閎弟子曇深以行義稱為臨城縣罷歸得錢十萬以買宅奉兄退無私蓄先是劉楷為交州謂王儉曰欲一人為南土所聞者同行儉良久曰得之矣昔垣閎為交州閎弟閲又為九真郡皆著信南中羽林監曇深者閲之子也雅有學行當令同行及隨楷未至交州而卒儉惆悵良久曇深妻鄭氏字獻英滎陽人時年二十子文凝始生仍隨楷到鎮晝夜紡績傍無親援年既盛美甚有容德自厲冰霜無敢望其門者居一年私裝了乃告楷求還楷大驚曰去鄉萬里固非孀婦所濟遂不許鄭又曰垣氏羈魂而不反而其孤藐幼妾若一同灰壤則何面目以見先姑因大悲泣楷愴然許之厚為之送於是間關危險遂得至鄉畢葬乃曰可以下見先姑矣時文凝年甫四嵗親教經禮訓以義方州里稱美又有吳興邱景賔字彥先亦以節義聞父康祖無錫令亡後僮僕數十人及宅宇産畜景賔悉讓與兄鎮之鎮之又推齋屋三間與之亦不肯受太守孔山士歎曰聞栁下惠之風貪夫亷懦夫有立志復見之矣終於奉朝請沈文季字伯達吳興武康人也父慶之宋司空自有傳孝建二年文季起家辟州主簿以寬雅正直見知尤善博塞及彈碁以慶之勳重封文季為山陽縣五等伯位中書郎父慶之為景和所殺兵仗圍宅收捕諸子文季長兄文叔謂文季曰我能死爾能報遂自殺文季揮刀馳馬去收者不敢追遂免明帝立為黃門郎領長水校尉明帝宴會朝臣以南臺御史賀咸為柱下史糾不醉者文季不肯飲酒被驅下殿晉平王休祐為南徐州帝就褚淵求幹事人為上佐淵舉文季轉驃騎長史南東海太守休祐被殺雖用薨禮僚佐皆不敢至文季獨往墓展哀元徽初自祕書監出為吳興太守文季飲酒至五斗妻王氏亦飲至三斗文季常與對飲竟日而視事不廢升明元年沈攸之反髙帝加文季為冠軍將軍督吳興錢塘軍事攸之先為景和銜命殺慶之至是文季收殺攸之弟新安太守登之誅其宗族以復舊怨親黨無吹火焉君子以文季能報先恥齊國建為侍中領祕書監建元元年轉太子右衛率侍中如故改封西豐縣侯文季風采稜岸善於進止司徒褚淵當世貴望頗以門户裁之文季不為之屈武帝在東宫於元圃宴朝臣文季數舉酒勸淵淵甚不平啓武帝曰沈文季謂淵經為其郡依然猶有故情文季曰惟桑與梓必恭敬止豈如明府亡國失土不識枌榆遂言及魏軍動事淵曰陳顯達沈文季當今將略足委以邊事文季諱稱將門因是發怒啓武帝曰褚淵品藻人流臣未知其身死之日何面目見宋明帝武帝笑曰沈率醉也中丞劉休舉其事見原後豫章王北宅後堂集會文季與褚淵並善琵琶酒闌淵取樂器為明君曲文季便下席大唱曰沈文季不能作伎兒豫章王嶷又解之曰此故當不損仲容之德淵顔色無異終曲而止永明中纍遷領軍將軍文季雖不學發言必有辭采武帝謂文季曰南土無僕射多歷年所文季對曰南風不競非復一日當世善其對明帝輔政欲以文季為江州遣左右單景俊宣旨文季陳讓稱老不願出外因問右執法有人未景俊還具言之延興元年以為尚書右僕射明帝即位加領太子詹事尚書令王晏嘗戲文季為吳興僕射文季答曰琅邪執法似不出卿門建武二年魏軍南伐明帝以為憂制文季鎮夀春文季入城門嚴加備守魏軍尋退百姓無所損永元元年轉侍中左僕射始安王遙光反其夜遣三百人於宅掩取文季欲以為都督而文季已還臺明日與尚書令徐孝嗣守宫城戎服坐南掖門上時東昏已行殺戮孝嗣深懷憂慮欲與文季論當世事文季輒引他辭終不得及事寧加鎮軍將軍署府史文季以時方昏亂託以老病不豫朝機兄子昭略謂文季曰阿父年六十為員外僕射欲求自免豈可得乎文季笑而不答見孝嗣被害其日先被召文季便知敗舉動如常登車顧曰此行恐往而不返也於華林省死時年五十八朝野寃之中興元年贈司空諡忠憲公昭略字茂隆文叔之子也文叔附載慶之傳昭略性狂俊不事公卿使酒仗氣無所推下嘗醉晚日負杖擕家賔子弟至婁湖宅逢王景文子約張目視之曰汝是王約邪何乃肥而癡約曰汝沈昭略邪何乃瘦而狂昭略撫掌大笑曰瘦已勝肥狂又勝癡奈何王約奈汝癡何升明末為相國西曹掾髙帝賞之及即位謂王儉曰南士中有沈昭略何職處之儉以擬前軍將軍上不欲違乃可其奏尋為中書郎纍遷侍中王晏嘗戲昭略曰賢叔可謂吳興僕射昭略曰家叔晚登僕射猶賢於尊君以卿為初蔭永元中與叔父文季俱被召入華林省茹法珍等進藥酒昭略怒罵徐孝嗣曰廢昏立明古今令典宰相無才致有今日以甌投其面曰使為破面鬼死時言笑自若了無懼容孝嗣謂曰見卿使人想夏侯泰初答曰明府猶憶泰初便是方寸不能都豁下官見龍逢比干欣然相對霍光脫問明府今日之事何辭答之邪死時年三十餘昭略弟昭光聞收兵至家人勸逃去昭光不忍捨母入執母手悲泣遂見殺時昭明子曇亮已得逃去聞昭光死乃曰家門屠滅獨用生何為又絶吭而死時人歎其纍世孝義中興元年贈昭略太常昭光廷尉劉懷珍字道玊平原人漢膠東康王寄之後也其先劉植為平原太守因家焉祖昶從慕容德南渡因家于北海都昌宋武帝平齊以為青州中從事位至員外常侍伯父奉伯宋世位至陳南頓二郡太守懷珍幼隨奉伯至夀陽豫州刺史趙伯符出獵百姓聚觀懷珍獨避不視奉伯異之曰此兒方興吾宗本州辟主簿元嘉二十八年亡命司馬順則聚黨東陽州遣懷珍將千人討之宋文帝召問破賊事懷珍讓功不肯當親人怪問焉懷珍曰昔國子尼恥陳河間之級吾豈能論邦域之捷哉時人稱之江夏王義恭出鎮旴𣅿道遇懷珍以應對見重取為驃騎長史兼墨曹行參軍孝建初為義恭大司馬參軍直閣將軍隨府轉太宰參軍大明二年以軍功拜樂陵河間二郡太守賜爵廣晉縣侯司空竟陵王誕反郡人王弼門族甚盛勸懷珍起兵助誕懷珍殺之帝嘉其誠除豫章王子尚車騎參軍母憂去職服闋見江夏王義恭義恭曰别子多年那得不老對曰公恩未報何敢便老義恭善其對纍遷黃門郎領虎賁中郎將桂陽王休範反加懷珍前將軍守石頭出為豫州刺史加都督建平王景素反懷珍遣子靈哲領兵赴建鄴沈攸之在荆楚遣使人許天保説結懷珍懷珍斬之送首於髙帝帝送示攸之封中宿縣侯攸之圍郢懷珍遣兵萬人破賊前鋒收其器甲進平南將軍增督二州初宋孝武世髙帝為舍人懷珍為直閣相遇早舊懷珍假還青州髙帝有驄馬齧人不可騎送與懷珍别懷珍還報上百匹絹或謂懷珍曰蕭君此馬不可騎是以相與君報百匹亦不多乎懷珍曰蕭君局量堂堂寧應負人此絹吾方欲以身名託之豈復計錢物多少髙帝輔政以懷珍內資未多二年冬徴為都官尚書領前將軍以第四子晃代為豫州刺史或疑懷珍不受代髙帝曰我布衣時懷珍便推懷投欵况在今日寧當有異晃發經日疑論不止上乃遣軍主房靈人領百騎進送晃謂靈人曰論者謂懷珍必有異同我期之有素必不應爾卿是其鄉里故遣卿行非惟衛新亦以迎故懷珍還仍授相國右司馬及齊臺建朝士人人爭為臣吏以懷珍為宋臺右衛懷珍謂帝曰人皆迎新臣獨送故豈以臣篤於本乎建元元年轉左衛將軍加給事中改封霄城侯懷珍年老以禁旅辛勤求為間職轉光祿大夫卒遺言薄葬贈雍州刺史諡敬侯子靈哲字文明位齊郡太守前將軍靈哲所生母嘗病靈哲躬自祈禱夢見黃衣老公與藥曰可取此食之疾可立愈靈哲驚覺於枕間得之如言而疾瘳藥似竹根於齋前種葉似􅝀茈嫡母崔氏及兄子景煥泰始中沒于魏靈哲為布衣不聽樂及懷珍卒當襲爵因辭以兄子在魏存亡未測無容越當茅土朝廷義之靈哲傾産私贖嫡母及景煥纍年不能得武帝哀之令北使者請之魏人送以還南襲懷珍封爵靈哲歷兖州刺史隆昌元年卒懷珍從子懷慰字彥泰祖奉伯宋元嘉中為冠軍長史父乘人冀州刺史死於義嘉事懷慰持喪不食醯醬冬日不用絮衣養孤弟妹事寡叔母皆有恩義仕宋為尚書駕部郎懷慰宗從善明等為髙帝心腹懷慰亦預焉齊國建上欲置齊郡於都下議者以江右土沃流人所歸乃置於瓜步以懷慰為輔國將軍齊郡太守上謂懷慰曰齊邦是王業所基吾方欲以為顯任經理之事一以委卿有手敕曰有文事必有武備今賜卿玉環刀一口懷慰至郡修城郭安集居人墾廢田二百頃決沈湖灌溉不受禮謁人有餉其新米一斛者懷慰出所食麥飯示之曰食有餘幸不煩此因著亷吏論以達其意髙帝聞之手敕褒賞進督秦沛二郡妻子在都賜米三百石兖州刺史栁世隆與懷慰書曰膠東流化潁川致美以今方古曽何足云懷慰本名聞慰武帝即位以與舅氏名同敕改之後兼安陸王北中郎司馬卒明帝即位謂僕射徐孝嗣曰劉懷慰若在朝廷不憂無清吏也子霽杳歊俱知名梁世沓自有傳霽列在孝友歊列在隱逸懷珍族弟善明父懷人宋世為齊北海二郡太守元嘉末青州飢荒人相食善明家有積粟躬食饘粥開倉以救鄉里多獲全濟百姓呼其家田為續命田善明少而靜處好讀書刺史杜驥聞其名候之辭不相見年四十刺史劉道隆辟為中從事不就懷人謂善明曰我已知汝立身復欲見汝立官也善明乃應辟仍舉秀才宋孝武見其射策強直甚異之泰始初徐州刺史薛安都反青州刺史沈文秀應之時州居東陽城善明家在郭內不能自拔伯父彌之誘説文秀求自效文秀使領軍主張靈慶等五千人援安都彌之出門密謂部曲曰始免禍坑矣行至下邳乃背文秀善明從伯懷恭為北海太守據郡相應善明密契收集門宗部曲得三千人夜斬關奔北海族兄乘人又聚衆渤海以應朝廷而彌之尋為薛安都所殺明帝贈彌之青州刺史以乘人為寧朔將軍冀州刺史善明為寧朔長史北海太守除尚書金部郎乘人病卒仍以善明為冀州刺史文秀既降除善明海陵太守郡境邊海無樹木善明課人種榆雜果遂獲其利還為直閣將軍五年魏克青州善明母在焉魏人移置桑乾善明布衣蔬食哀戚如持喪明帝每見為之歎息轉巴西梓潼二郡太守善明以母在魏不願西行泣涕固請見許朝廷多哀善明心事元徽初遣北使朝議令善明舉人善明舉州鄉北平田惠紹使魏贖得母還時宋後廢帝新立羣公秉政善明獨結事髙帝委身歸誠出為西海太守行青冀二州刺史善明從弟僧副與善明俱知名於鄉里泰始初魏攻淮北僧副將部曲二千人東依海島髙帝在淮隂壯其所為召與相見引為安成王撫軍參軍後廢帝肆暴髙帝憂恐嘗令僧副微行伺察聲論使密告善明及東海太守垣榮祖曰人多見勸北固廣陵恐一旦動足非為長算今秋風行起卿若能與垣東海微動魏兵則我情計可立善明曰宋氏將亡愚智所辨胡虜若動反為公患公神武不世出唯當靜以待之因機奮發功業自定不可逺去根本自貽猖蹶僧副還導其言髙帝納之廢帝見殺召善明為髙帝驃騎咨議行南徐州事沈攸之反髙帝深以為憂善明獻計曰沈攸之控引八州縱情蓄斂包藏賊志於焉十年性既險躁才非持重起逆而纍自遲回不進應有所待也一則暗於兵機二則人情離怨三則有掣肘之患四則天奪其魄本疑其剽勇長於一戰輕速掩襲未備今六師齊奮諸侯同舉此已籠之鳥耳事平髙帝召善明還都謂曰卿策沈攸之雖張良陳平適如此耳仍遷太尉右司馬齊臺建為右衛將軍辭疾不拜司空褚淵謂之曰髙尚之事乃卿從來素志今朝廷方相委待詎得學松喬邪善明答曰我本無宦情既逢知己所以戮力驅馳今天地廓清朝廷濟濟鄙吝既申不敢昧於富貴矣髙帝踐阼以善明勳誠欲與之祿召謂曰淮南近畿國之形勝自非親賢不使居之卿為我卧治也乃代明帝為淮南宣城二郡太守遣使拜授封新淦伯善明至郡上表陳事凡十一條其一以為天地開創宜存問逺方宣廣慈澤其二以為京都逺近所歸宜遣醫藥問其疾苦年九十以上及六疾不能自存者隨宜量賜其三以為宋氏赦令蒙原者寡愚謂今下赦書宜令事實相副其四以為劉昶猶存容能送死境上諸城宜應嚴備其五以為宜除宋氏大明以來苛政細制以崇簡易其六以為凡諸土木之費且可權停其七以為帝子王女宜從儉約其八以為宜詔百官及府州郡縣各貢讜言以𢎞廣唐虞之美其九以為忠貞孝悌宜擢以殊階清儉苦節應授以政務其十以為革命惟始宜擇才北使其十一以為交州險敻要荒之表宋末政苛遂至怨叛今宜懷以恩德未應逺勞將士搖動邊氓又撰賢聖雜語奏之託以諷諫上優詔答之又諫起宣陽門表陳宜明守宰賞罰立學校制齊禮開賔館以接鄰國上答曰夫賞罰以懲守宰飾館以待遐荒皆古之善政吾所宜勉更撰新禮或非易制國學之美已敕公卿宣陽門今敕停寡德多闕思復有聞善明身長七尺九寸質素不好聲色所居茅齋斧木而已牀榻几案不加剗削少立節行常云在家當孝為吏當清子孫楷式足矣及纍為州郡頗黷財賄崔祖思怪而問之答曰管子云鮑叔知我因流涕曰方寸亂矣豈暇為亷所得金錢為贖母計及母還清節方峻所歷之職亷簡不煩俸祿散之親友與崔祖思友善祖思出為青冀二州善明遺書敘舊因相勗以忠槩及聞祖思死慟哭乃得病建元二年卒遺命薄殯贈左將軍豫州刺史諡烈伯子滌嗣善明家無遺儲唯有書八千卷髙帝聞其清貧賜滌家葛塘屯穀五百斛曰葛屯亦吾之垣下令後世知其見異善明從弟僧副字士雲位前將軍封豐陽男卒於巴西梓潼二郡太守上圖功臣像贊僧副亦在焉兄法護字士伯有學業位濟隂太守薛深河東汾隂人宋徐州刺史安都之從子也本名道深避髙帝偏諱改焉安都以彭城降魏親族皆入北髙帝鎮淮隂深遁來委身自結於髙帝果幹有氣力宋元徽末以軍功至驃騎將軍軍主封竟陵侯沈攸之之難髙帝入朝堂豫章王嶷代守東府使深領軍屯司徒右府分備建鄴袁粲據石頭豫章王嶷夜登門遙呼深深驚起率軍赴難髙帝即位除淮隂太守尋為直閣將軍轉太子左率武帝即位遷左衛將軍隆昌元年為司州刺史右將軍卒張欣泰字義亨竟陵人也父興世宋代名將歷位雍州刺史自有傳欣泰生將門不以武業自居好𨽻書讀子史年十餘詣吏部尚書褚淵淵問張郎弓馬多少答曰性怯畏馬無力牽弓淵甚異之歷諸王府佐宋元徽中興世在家擁雍州還資見錢三千萬蒼梧王自領人劫之一夜垂盡興世憂懼病卒欣泰兄欣華時為安成郡欣泰悉封餘財以待之建元初為尚書都官郎武帝與欣泰早經欵遇及即位以為直閣將軍領禁旅除豫章王太尉參軍出為安逺護軍武陵內史還復為直閣步兵校尉領羽林監欣泰通涉雅俗交結多是名素下直輒著鹿皮冠納衣錫杖挾素琴有以啓武帝帝曰將家兒何敢作此舉止後從駕出新林敕欣泰亷察欣泰停杖松樹下飲酒賦詩制局監吕文度以啓武帝帝大怒遣出數日意釋召謂曰卿不樂武職當處卿清貴除正員郎出為鎮軍南中兵參軍南平內史巴東王子響殺僚佐上遣中庶子胡諧之西討使欣泰為副欣泰謂諧之曰今太嵗在西南逆嵗行軍兵家深忌若且頓軍夏口宣示禍福可不戰而禽也諧之不從進江津尹略等見殺事平欣泰徙為隨王子隆鎮西中兵改領河東內史子隆深相愛重數與談宴意遇與謝朓相次典籖密啓之武帝怒召還都屏居家巷置宅南岡下西接松山欣泰負弩射雉恣情間放聲伎雜藝頗多間解明帝即位為領軍長史遷咨議參軍上書陳便宜二十條其一條言宜毁廢塔寺帝並優詔報答建武二年魏圍鍾離欣泰為軍主隨崔慧景救援及魏軍退而邵陽洲上餘兵萬人求輸馬五百匹假道慧景欲斷路攻之欣泰説慧景曰歸師勿遏古人畏之死地兵不可輕也慧景乃聽過時領軍蕭坦之亦援鍾離還啓明帝曰邵陽洲有死賊萬人慧景欣泰放而不取帝以此皆不加賞四年出為永陽太守永元初還都崔慧景圍城欣泰入城守備事寧除廬陵王安東司馬梁武帝起兵東昏以欣泰為雍州刺史欣泰與弟前始安內史欣時密謀結太子右率胡松前南譙太守王靈秀直閣將軍鴻選含德主帥茍勵直後劉靈運等並同契會帝遣中書舍人馮元嗣監軍救郢茹法珍梅蟲兒及太子右率李居士制局監楊明泰等十餘人相送中興堂欣泰等使人懷刀於坐斫元嗣頭墜果柈中又斫明泰破其腹蟲兒傷數創手指皆墜居士踰牆得出茹法珍亦散走還臺靈秀仍往石頭迎建安王寶夤率文武數百唱警蹕至杜姥宅欣泰初聞事發馳馬入宫冀法珍等在城內處分必盡見委因行廢立既而法珍得返處分關門上仗不配欣泰兵鴻選在殿內亦不敢發城外衆尋散少日事覺欣泰胡松等皆伏誅欣泰少時有人相其當得三公而年裁三十後瓦屋墜傷額又問相者云無復公相年夀更增亦可得方伯耳死時年三十六王奐字道明琅邪臨沂人宋中書監彧之兄子也彧自有傳父粹字景深黃門侍郎奐出繼從祖球故小字彥孫年數嵗常侍球許甚見愛奐諸兄出身諸王國常侍而奐起家著作佐郎琅邪顔延之與球情欵稍異常撫奐背曰阿奴始免寒士奐少而強濟叔父彧常以其家事委之仕宋歷侍中祠部尚書轉掌吏部升明初遷丹陽尹初王晏父普曜為沈攸之長史常懼攸之舉事不得還奐為吏部轉普曜為內職晏深德之及晏仕齊武帝以奐宋氏外戚而從弟藴又同逆疑有異志晏叩頭保奐無異志時晏父母在都請以為質武帝乃止纍遷尚書右僕射王儉卒上欲用奐為尚書令以問晏晏位遇已重意不推奐答曰栁世隆有勳望恐不宜在奐後乃轉左僕射加給事中出為雍州刺史加都督與寧蠻長史劉興祖不睦十一年奐遣軍主朱公恩征蠻失利興祖欲以啓聞奐大怒收付獄興祖於獄以針畫漆合盤為書報家稱枉令啓聞而奐亦馳信啓上誣興祖扇動蠻荒上知其枉敕送興祖還都奐恐辭情翻背輒殺之上大怒遣中書舍人吕文顯直閣將軍曹道剛領兵收奐又别詔梁州刺史曹虎自江陵步出襄陽奐子彪凶愚頗干時政士人咸切齒時文顯以漆匣匣箜篌在船中因相誑云臺使封刀斬王彪及道剛曹虎文顯俱至衆力既盛又懼漆匣之言於是議閉門拒命長史殷睿奐女壻也諫曰今開城門白服接臺使不過檻車徴還隳官免爵耳彪堅執不同睿又曰宜遣典籖間道送啓自申亦不患不被宥乃令睿書啓遣典籖間道出城便為文顯所執睿又曰忠不背國勇不逃死百世門户宜思後計孰與仰藥自全則身名俱泰睿請先驅螻蟻又不從奐門生鄭羽叩頭啓奐乞出城迎臺使奐曰我不作賊欲先遣啓自申政恐曹吕輩小人相陵籍故且閉門自守耳彪遂出戰敗走歸土人起義攻州西門彪登門拒戰却之司馬黃瑶起寧蠻長史裴叔業於城內起兵攻奐奐聞兵入禮佛未起軍人斬之彪及弟爽弼殷睿皆伏誅奐長子太子中庶子融融弟司徒從事中郎琛於都棄市餘孫皆原宥琛弟肅秉並奔魏後得黃瑶起臠食之弟胄女為長沙王晃妃以男女並長且又出繼特不離絶奐既誅左右無敢至者汝南許明達先為奐參軍躬為殯斂經理甚厚當時髙其節奐弟份列在梁史奐從父兄繢字叔素中書監彧之子也弱冠為祕書郎太子舍人轉中書舍人父彧以此授超階令繢經年乃受彧封曲安侯繢襲其本爵為始平縣五等男元徽末為黃門郎東陽太守武帝為撫軍吏部尚書張岱選繢為長史呈選牒髙帝笑曰此可謂素望再遷義熙太守輒録郡吏陳伯喜付陽羡獄欲殺之縣令孔逭不知何罪不受繢教為有司奏坐白衣領職後長兼侍中武帝出射雉繢信佛法稱疾不從永元元年卒於太常諡靖子繢女適武帝寵子安陸王子敬永明二年子敬納妃修外舅姑之敬武帝遣文惠太子相隨往繢家置酒設樂公卿皆冠冕而去當世榮之繢弟約明帝世數年廢錮梁武帝時為太子中庶子嘗謂約曰卿方當富貴必不容久滯屈及梁武作輔謂曰我嘗相卿當富貴不言今日富貴便當見由歷侍中左户尚書廷尉繢長子雋不慧位止建安太守通志卷一百三十七
