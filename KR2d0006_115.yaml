body:
  text: 通志卷一百二上宋右廸功郎鄭樵漁仲撰列傳第十五上前漢蕭望之子育由咸馮奉世子野王參逡立匡衡張禹孔光馬宮王商史丹傅喜薛宣朱博翟方進子義谷永杜鄴何武王嘉師丹揚雄蕭望之字長倩東海蘭陵人也徙杜陵家世以田為業至望之好學治齊詩事同縣后蒼且十年以令詣太常受業復事同學博士白竒又從夏侯勝問論語禮服京師諸儒稱焉是時大將軍霍光秉政長史丙吉薦儒生王仲翁與望之等數人皆召見先是左將軍上官桀與蓋主謀殺光光旣誅桀等後出入自備吏民當見者露索去刀兵兩吏挾持望之獨不肯聽自引出閤曰不願見吏牽持匈匈光聞之告吏勿持望之既至前説光曰将軍以功徳輔㓜主将以流大化致於治平是以天下之士延頸企踵争願自効以輔高眀今士見者皆先露索挾持恐非周公相成王躬吐握致白屋之禮於是光獨不除用望之而仲翁等皆補大将軍史三嵗間仲翁至光禄大夫給事中望之以射䇿甲科為郎署小苑東門候仲翁出入従倉頭廬兒下車趨門傳呼甚寵顧謂望之曰不肯錄録反抱闗為望之曰各從其志後數年坐弟犯法不得宿衞免歸為郡吏及御史大夫魏相除望之為屬察亷為大行治禮丞時大将軍光薨子禹復為大司馬兄子山領尚書親屬皆宿衞内侍地節三年夏京師雨雹望之因是上䟽願賜清閑之晏口陳災異之意宣帝自在民間聞望之名曰此東海蕭生邪下少府宋畸問状無有所諱望之對以為春秋昭公三年大雨雹是時季氏專權卒逐昭公鄉使魯君察於天變宜亡此害今陛下以聖徳居位思政求賢尭舜之用心也然而美祥未臻隂陽不和是大臣任政一姓擅埶之所致也附枝大者賊本心私家盛者公室危唯眀主躬萬幾選同姓舉賢材以為腹心與參政謀令公卿大臣朝見奏事眀陳其職以考功能如是則庶事理公道立姦邪塞私權廢矣對奏天子拜望之為謁者時上初即位思進賢良多上書言便宜輒下望之問状高者請丞相御史次者中二千石試事滿歳以状聞下者報聞或罷田里所白處奏皆可累遷諫大夫丞相司直歳中三遷官至二千石其後霍氏竟謀反誅望之寖益任用是時選博士諫大夫通政事者補郡國守相以望之為平原太守望之雅意在本朝遠為郡守内不自得乃上疏曰陛下哀愍百姓恐徳化之不究悉出諫官以補郡吏所謂憂其末而㤀其本者也朝無争臣則不知過國無逹士則不聞善願陛下選明經術温故知新通於幾㣲謀慮之士以為内臣與參政事諸侯聞之則知國家納諫憂政亡有闕遺若此不怠成康之道其庶幾乎外郡不治豈足憂哉書聞徴入守少府宣帝察望之經明持重論議有餘材任宰相𣣔詳試以政事復以為左馮翊望之従少府出為左遷恐有不合意即移病上聞之使侍中成都侯金安上諭指曰所用皆更治民以考功君前為平原太守日淺故復試之於三輔非有所聞也望之即視事是歳西羗反漢遣後将軍征之京兆尹張敞上書言國兵在外軍以夏𤼵隴西以北安定以西吏民並給轉輸田事頗廢素無餘積雖羌虜以破来春民食必乏窮辟之處買無所得縣官榖度不足以振之願令諸有辠非盗受賕殺人及犯法不得赦者皆得以差入榖此八郡贖罪務益致榖以豫偹百姓之急事下有司望之與少府李彊議以為民函隂陽之氣有仁義欲利之心在教化之所助尭在上不能去民欲利之心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故尭桀之分在於義利而已道民不可不慎也今欲令民量粟以贖罪如此則富者得生貧者獨死是貧富異刑而法不壹也人情貧窮父兄囚執聞出財得以生活為人子弟者将不頋死亡之患敗亂之行以赴財利求救親戚一人得生十人以喪如此伯夷之行壊公綽之名㓕政教壹傾雖有周召之佐恐不能復古者藏富於民不足則取有餘則與詩曰爰及矜人哀此鰥寡上恵下也又曰雨我公田遂及我私下急上也今有西邉之役民失作業雖户賦口斂以贍其困乏古之通義百姓莫以為非以死救生恐未可也陛下布徳施教教化既成尭舜亡以加也今議開利路以傷旣成之化臣竊痛之於是天子復下其議兩府丞相御史以難問張敞敞曰少府左馮翊所言常人之所守耳昔先帝征四夷兵行三十餘年百姓猶不加賦而軍用給今羌虜一隅小夷跳梁於山谷間但令罪人出財减辠以誅之其名賢於煩擾良民横興賦斂也又諸盗及殺人犯不道者百姓所疾苦也皆不得贖首匿見知縦所不當得為之屬議者或頗言其法可蠲除今因此令贖其便眀甚何化之所亂甫刑之罰小過赦薄罪贖有金選之品所從来乆矣何賊之所生敞偹皂衣二十餘年嘗聞罪人贖矣未聞盗賊起也竊憐凉州被㓂方秋饒時民尚有饑乏病死於道路况至來春将大困乎不早慮所以振救之䇿而引常經以難恐後為重責常人可與守經未可與權也敞幸得偹列卿以輔兩府為職不敢不盡愚望之彊復對曰先帝聖徳賢良在位作憲垂法為無窮之規永惟邉竟之不贍故金布令甲曰邉郡數被兵離饑寒夭絶天年父子相失令天下供給其費固為軍旅卒暴之事也聞天漢四年常使死罪人入五十萬錢减死罪一等豪彊吏民請奪假貸至為盗賊以贖罪其後姦邪暴横群盗並起至攻城邑殺郡守充滿山谷吏不能禁眀詔遣繡衣使者以興兵擊之誅者過半然後衰止愚以為此死罪贖之敗也故曰不便時丞相魏相御史大夫丙吉亦以為羌虜且破轉輸畧足相給遂不施敞議望之為左馮翊三年京師稱之遷大鴻臚先是烏孫昆彌翁靡因長羅侯常恵上書願以漢外孫元貴靡為嗣得復尚少主結婚内附畔去匈奴詔下公卿議望之以為烏孫絶域信其美言萬里結婚非長䇿也天子不聼神爵二年遣長羅侯恵使送公主配元貴靡未出塞翁歸靡死其兄子狂王背約自立恵從塞下上書願留少主敦煌郡恵至烏孫責以負約因立元貴靡還迎少主詔下公卿議望之復以為不可烏孫持兩端亡堅約其效可見前少主在烏孫四十餘年恩愛不親密邊境未以安此已事之騐也今少主以元貴靡不得立而還信無負扵四夷此中國之大福也少主不止徭役将興其原起此天子従其議徴少主還後烏孫雖分國兩立以元貴靡為大昆彌漢遂不復與結婚三年代丙吉為御史大夫五鳯中匈奴大亂議者多曰匈奴為害日乆可因其壊亂舉兵滅之詔遣中朝大司馬車騎将軍韓增諸吏富平侯張延夀光禄勲楊惲太僕戴長樂問望之計䇿望之對曰春秋晉士匄帥師侵齊聞齊侯卒引師而還君子大其不伐喪以為㤙足以服孝子誼足以動諸侯前單于慕化向善稱弟遣使請求和親海内欣然夷狄莫不聞未終奉約不幸為賊臣所殺今而伐之是乗亂而幸災也彼必奔走逺遁不以義動兵恐勞而無功宜遣使者弔問輔其㣲弱救其災患四夷聞之咸貴中國之仁義如遂䝉恩得復其位必稱臣服従此徳之盛也上從其議後竟遣兵䕶輔呼韓邪單于定其國是時大司農耿夀昌奏設常平倉上善之望之非夀昌丞相丙吉年老上重焉望之又奏言百姓困乏盗賊未止二千石多材下不任職三公非其人則三光為之不眀今首歳日月少光咎在臣等上以望之意輕丞相乃下侍中建章衞尉金安上光禄勲楊惲御史中丞王忠并詰問望之望之免冠置對天子繇是不説後丞相司直緐音婆延夀奏侍中謁者良使丞制詔望之望之再拜已良與望之言望之不起因故下手而謂御史曰良禮不偹故事丞相病明日御史大夫輒問病朝奏事會庭中差居丞相後丞相謝大夫少進揖今丞相數病望之不問病會庭中與丞相鈞禮時議事不合意望之曰侯年寕能父我邪知御史有令不得擅使望之多使守史自給車馬之杜陵䕶視家事少史冠法冠為妻先引又使賣買私所附益凡十萬三千案望之大臣通經術居九卿之右本朝所仰至不奉法自修踞慢不遜讓受所監贓二百五十以上請逮捕繋治上於是䇿免望之左遷為太子太傅望之既左遷而黄霸代為御史大夫數月間丙吉薨霸為丞相霸薨于定國代焉望之遂見廢不得相為太傅以論語禮服授皇太子初匈奴呼韓邪單于来朝詔公卿議其儀丞相霸御史大夫定國議曰聖王之制施徳行禮先京師而後諸夏先諸夏而後夷狄其禮儀宜如諸侯王位次在下望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上外夷稽首稱藩中國譲而不臣此則覊縻之誼謙亨之福也天子采之詔以客禮待單于位在諸侯王上賛謁稱臣而不名及宣帝寢疾選大臣可屬者引外屬侍中樂陵侯史高太子太傅望之少傅周堪至禁中拜高為大司馬車騎将軍望之為前将軍光禄勲堪為光禄大夫皆受遺詔輔政領尚書事宣帝崩太子襲尊號是為孝元帝望之堪本以師傅見尊重上即位數燕見言治亂陳王事望之選白宗室眀經逹學散騎諫大夫劉更生給事中與侍中金敞並拾遺左右四人同心謀議勸道上以古制多所欲匡正上甚郷納之初宣帝不甚従儒術任用法律而中書宦官用事中書令𢎞恭石顯乆典樞機眀習文法亦與車騎将軍高為表裏論議常獨持故事不従望之等恭顯又時傾仄見詘望之以為中書政本宜以賢眀之選自武帝游燕後庭故用宦者非國舊制又違古不近刑人之義白欲更置士人由是大與高恭顯忤上初即位謙讓重改作議久不定出劉更生為宗正望之堪數薦名儒茂材以偹諫官會稽鄭朋隂欲附望之上疏言車騎将軍髙遣客為姦利郡國及言許史子弟罪過章視周堪堪白令朋待詔金馬門朋奏記望之勉以周召之事望之見納朋接待以意朋數稱述望之短車騎将軍言許史過失後朋行傾邪望之絶不與通朋與大司農史李宮俱待詔堪獨白宮為黄門郎朋楚士怨恨更求入許史推所言許史事曰皆周堪劉更生教我我闗東人何以知此於是侍中許章白見朋朋出揚言曰我見言前将軍小過五大過一中書令在旁知我言状望之聞之以問𢎞恭石顯顯恭恐望之自訟下於他吏即挾朋及待詔華龍華龍者宣帝時與張子蟜等待詔以行汙穢不進欲入堪等堪等不納故與朋相結恭顯令二人告望之等謀欲罷車騎将軍疏退許史状候望之出休日令朋龍上之事下𢎞恭問状望之對曰外戚在位多奢滛欲以匡正國家非為邪也恭顯奏望之堪更生朋黨相稱舉數譖訴大臣毁離親戚欲以專權擅埶為臣不忠誣上不道請謁者召致廷尉時上初即位不省謁者召致廷尉為下獄也可其奏後上召堪更生曰繋獄上大驚曰非但廷尉問邪以責恭顯皆叩頭謝上曰令出視事恭顯因使高言上新即位未以徳化聞於天下而先騐師傅既下九卿大夫獄宜因决免於是制詔丞相御史前将軍望之傅朕八年無他罪過今事乆遠識㤀難明其赦望之罪収前将軍光禄勲印綬及堪更生皆免為庶人而朋為黄門郎後數月制詔御史國之将興尊師而重傅故前将軍望之傅朕八年道以經術厥功茂焉其賜望之爵闗内侯食邑六百户給事中朝朔望坐次将軍天子方倚欲以為丞相會望之子散騎中郎伋上書訟望之前事事下有司復奏望之前所坐眀白無譖訴者而教子上書稱引亡辜之詩失大臣體不敬請逮捕恭顯等知望之素髙節不詘辱建白望之前為将軍輔政欲排退許史專權擅朝幸得不坐復賜爵邑與聞政事不悔過服罪深懐怨望教子上書歸非於上自以託師傅懐終不坐非頗詘望之於牢獄塞其怏怏心則聖朝亡以施㤙厚上曰蕭太傅素剛安肯就吏顯等奏曰人命至重望之所坐語言薄罪必無所憂上乃可其奏顯等封以付謁者敕令召望之手付因令太常急發執金吾車騎馳圍其第使者至召望之望之欲自殺其夫人止之以為非天子意望之以問門下生朱雲雲者好節士勸望之自裁於是望之仰天歎曰吾嘗偹位将相年踰六十矣老入牢獄茍求生活不亦鄙乎字謂雲曰游趣和藥來無乆留我死竟飲鴆自殺天子聞之驚拊手曰曩固疑其不就牢獄果然殺吾賢傅是時太官方上晝食上乃郤食為之涕泣哀慟左右於是召顯等責問以議不詳皆免冠謝良乆然後已望之有罪死有司請絶其爵邑有詔加恩長子伋嗣為闗内侯天子追念望之不㤀每歲時遣使者祠祭望之冢終元帝之世望之八子至大官者育咸由育字次君少以父任為太子庶子元帝即位為郎病免後為御史大将軍王鳯以育名父子著材能除為功曺遷謁者使匈奴副校尉後為茂陵令㑹課育第六而漆令郭舜殿見責問育為之請扶風怒曰君課第六裁自脱何暇欲為左右言及罷出傳召茂陵令詣後曺當以職事對育徑出曹書佐隨牽育育案佩刀曰蕭育杜陵男子何詣曹也遂趨出欲去官眀旦詔召入拜為司𨽻校尉育過扶風府門官屬掾史數百人拜謁車下後坐失大将軍指免官復為中郎将使匈奴歴冀州青州兩部刺史長水校尉㤗山太守入守大鴻臚以鄠名賊梁子政阻山為害久不伏辜育為右扶風數月盡誅子政等坐與定陵侯淳于長厚善免官哀帝時南郡江中多盗賊拜育為南郡太守上以育耆舊名臣乃以三公使車載育入殿中受䇿加賜黄金二十斤育至南郡盗賊静病去官起家復為光禄大夫執金吾以夀終於官育為人嚴猛尚威居官數免稀遷少與陳咸朱博為友著聞當世往者有王陽貢公故長安語曰蕭朱結綬王貢弹冠言其相薦逹也始育與陳咸俱以公卿子顯名咸最先進年十八為左曹二十餘御史中丞時朱博尚為杜陵亭長為咸育所攀援入王氏後遂並歴刺史郡守相及為九卿而博先至将軍上卿歴位多於咸育遂至丞相育與博後有隙不能終故世以交為難咸字仲為丞相史舉茂材好畤令遷淮陽泗水内史張掖𢎞農河東太守所居有迹數增秩賜金後免官復為越騎校尉䕶軍都尉中郎将使匈奴至大司農終官由字子驕為丞相西曹衛将軍掾遷謁者使匈奴副校尉後舉賢良為定陶令遷太原都尉安定太守治郡有聲多稱薦者初哀帝為定陶王時由為定陶令失王指頃之制書免由為庶人哀帝崩為復土校尉京輔左輔都尉遷江夏太守平江賊成重等有功增秩為陳留太守元始中作眀堂辟雍大朝諸侯徴由為大鴻臚會病不及賔贊還歸故官病免復為中散大夫終官家至吏二千石者六七人馮奉世字子眀上黨潞人也徙杜陵其先馮亭為韓上黨守秦攻上黨絶太行道韓不能守馮亭乃入上黨城守於趙趙封馮亭為華陽君與趙将括拒秦戰死於長平宗族由是分散或留潞或在趙在趙者為官帥将官帥将子為代相及秦滅六國而馮亭之後馮毋擇馮去疾馮劫皆為秦将相焉漢興文帝時馮唐顯名即代相子也至武帝末奉世以良家子選為即昭帝時以功次補武安長失官年三十餘矣乃學春秋渉大義讀兵法前将軍韓增奏以為軍司空令本始中従軍撃匈奴軍罷復為即先是時漢數出使西域多辱命不稱或貪汙為外國所苦是時烏孫大有擊匈奴之功而西域諸國新輯漢方善遇欲以安之選可使外國者前将軍韓增舉奉世以衛候使持節送大宛諸國客至伊修城都尉宋將言莎車與旁國共攻殺漢所置莎車王萬年并殺漢使者奚充國時匈奴又發兵攻車師城不能下而去莎車遣使揚言北道諸國已屬匈奴矣於是攻劫南道與㰱盟畔漢從鄯善以西皆絶不通都䕶鄭吉校尉司馬意皆在北道諸國間奉世與其副嚴昌計以為不亟擊之則莎車日彊其埶難制必危西域遂以節告諭諸國王因𤼵其兵南北道合萬五千人進撃莎車攻㧞其城莎車王自殺傳其首詣長安諸國悉平威振西域奉世乃罷兵以聞宣帝召見韓增曰賀将軍所舉得其人奉世遂西至大宛大宛聞其斬莎車王敬之異於他使得其名馬象龍而還馬形似龍上甚悦下議封奉世丞相将軍皆曰春秋之義大夫出疆有可以安國家者專之可也奉世功效尤著宜加爵土之賞少府蕭望之獨以奉世奉使有指而擅矯制違命𤼵諸國兵雖有功效不可以為後法即封奉世開後奉使者利以奉世為比争逐𤼵兵要功萬里之外為國家生事於夷狄漸不可長奉世不宜受封上善望之議以奉世為光禄大夫水衡都尉元帝即位為執金吾上郡屬國歸義降胡萬餘人反去初昭帝末西河屬國胡伊酋若王亦将衆數千人畔奉世輒持節将兵追擊右將軍典屬國常恵薨奉世代為右将軍典屬國加諸吏之號數歳為光禄勲永光二年秋隴西羌彡姐旁種反彡所亷反姐音紫詔召丞相韋元成御史大夫鄭𢎞大司馬車騎将軍王接左将軍許嘉右将軍奉世入議是時歳比不登京師榖石二百餘邉郡四百闗東五百四方饑饉朝廷方以為憂而遭羌變元成等漠然莫有對者奉世曰羌虜近在境内背畔不以時誅無以威制遠蠻臣願帥師討之上問用兵之數對曰臣聞善用兵者役不再興糧不三載故師不乆暴而天誅亟決徃者數不料敵而師至於折傷再三𤼵軵軵而隴反推也淮南子曰内郡軵車而餉則曠日煩費威武虧矣今反虜無慮三萬人法當倍用六萬人然羌戎弓矛之兵耳器不犀利可用四萬人一月足以決丞相御史兩将軍皆以為民方収斂時未可多發萬人屯守之且足奉世曰不可天下被饑饉士馬羸耗守戰之偹乆廢不簡夷狄皆有輕邊吏之心而羌首難今以萬人分屯數處虜見兵少必不畏懼戰則挫兵病師守則百姓不救如此怯弱之形見羌人乗利諸種並和相扇而起臣恐中國之役不得止於四萬非財幣所能觧也故少發師而曠日與一舉而疾決利害相萬也固争之不能得有詔益二千人於是遣奉世将萬二千人騎以將屯為名典屬國任立䕶軍都尉韓昌為偏裨到隴西分屯三處典屬國為右軍屯白石䕶軍都尉為前軍屯臨洮奉世為中軍屯首陽西極上前軍到降同陂先遣校尉在前與羌争地利又别遣校尉救民於廣陽谷羌虜盛多皆為所破殺兩校尉奉世具上地形部衆多少之計願益三萬六千人乃足以決事書奏天子大為發兵六萬餘人拜太常弋陽侯任千秋為奮武将軍以助焉奉世上言願得其衆不須煩大将因陳轉輸之費上於是以璽書勞奉世且讓之曰兵法大将軍出必有偏裨所以揚武威參計䇿將軍又何疑焉夫愛吏士得衆心舉而無悔禽敵必全将軍之職也若乃轉輸之費則有司存將軍勿憂湏奮武将軍兵到合擊羌虜十月兵至隴西十一月並進羌虜大破斬首數千級餘皆走出塞兵未決間漢復𤼵募士萬人拜定襄太守韓安國為建威将軍未進聞羌破還上曰羌虜破散創艾亡逃出塞其罷吏士頗留屯田偹要害處眀年二月奉世還京師更為左将軍光禄勲如故其後録功拜爵下詔曰羌虜桀黠賊害吏民攻隴西府寺燔焼置亭絶道橋甚逆天道左将軍光禄勲奉世前将兵征討斬捕首虜八千餘級鹵馬牛羊以萬數賜奉世爵闗内侯食邑五百户黄金六十斤裨将校尉三十餘人皆拜後歳餘奉世病卒居爪牙官前後十年為折衝宿将功名次趙充國奮武将軍任千秋者其父宮昭帝時以丞相徴事捕斬反者左将軍上官桀封侯宣帝時為太常薨千秋嗣後復為太常成帝時樂昌侯王商代奉世為左将軍而千秋為右将軍後亦為左将軍子孫傳國至王莾乃絶云奉世死後二年西域都䕶甘延夀以誅郅支單于封為列侯時丞相匡衡亦用延夀矯制生事據蕭望之前議以為不當封而議者咸美其功上從衆而侯之於是杜欽上疏追訟奉世前功宜䝉見錄願下有司議上以先帝時事不復録奉世有子男九人女四人長女媛以選充後宮為元帝昭儀産中山孝王元帝崩媛為中山太后隨王就國奉世長子譚太常舉孝亷為即功次補天水司馬奉世擊西羌譚為校尉隨父従軍有功未拜病死譚弟野王逡立參至大官野王字君卿受業博士通詩少以父任為太子中庶子年十八上書願試守長安令宣帝竒其志問丞相魏相相以為不可許後以功次補當陽長遷為櫟陽令徙夏陽令元帝時遷隴西太守以治行高入為左馮翊歳餘而池陽令並素行貪汙輕野王外戚年少治行不改野王部督郵掾祋祤趙都案騐得其主守盗十金罪収捕並不首吏都格殺並並家上書陳寃事下廷尉都詣吏自殺以眀野王京師稱其威信遷為大鴻臚數年御史大夫李延夀病卒在位多舉野王上使尚書選第中二千石而野王行能第一上曰吾用野王為三公後世必謂我私後宮親屬以野王為比乃下詔曰剛彊堅固確然無欲大鴻臚野王是也心辨善辭可使四方少府五鹿充宗是也亷潔節儉太子少傅張譚是也其以少傅為御史大夫上繇下第而用譚越次避嫌不用野王以昭儀兄故也野王乃歎曰人皆以女寵貴我兄弟獨以賤野王雖不為三公甚見器重有名當世成帝立有司奏野王王舅不宜偹九卿以秩出為上郡太守加賜黄金百斤朔方刺史蕭育奏封事薦言野王行能髙妙内足以圖身外足以慮化竊惜野王懐國之寳而不得陪朝廷與朝者並野王前以王舅出以賢復入眀國家樂進賢也上自為太子時聞知野王會其病免復以故二千石使行河隄因拜為瑯琊太守是時帝長舅陽平侯王鳯為大司馬大将軍輔政八九年矣時數有災異京兆尹王章譏鳯專權不可任用薦野王代鳯上初納其言而後誅章語在元后傳於是野王懼不自安遂病滿三月賜告與妻子歸杜陵就醫藥大将軍鳯諷御史中丞劾奏野王賜告飬病而私自便持虎符出界歸家奉詔不敬杜欽時在大将軍幕府欽素高野王父子行能奏記於鳯為野王言曰竊見令曰吏二千石告過長安謁不分别予賜今有司以為予告得歸賜告不得是一律兩科失省刑之意夫三最予告令也病滿三月賜告詔恩也令告則得詔㤙則不得失輕重之差又二千石病賜告得歸有故事不得去郡亡著令傳曰賞疑從予所以廣㤙勸功也罷疑従去所以慎刑闕難知也今釋令與故事而假不敬之法甚違闕疑從去之意即以二千石守千里之地任兵馬之重不重去郡将以制刑為後法者則野王之罪在未制令前也刑賞大信也不可不慎鳯不聼竟免野王郡國二千石病賜告不得歸家自此始初野王嗣父爵為闗内侯免歸數年年老終于家子座嗣爵至孫坐中山太后事絶逡字子産通易太常察孝亷為即補謁者建昭中選為復土校尉光禄勲于永舉茂材為美陽令功次遷長樂屯衛司馬清河都尉隴西太守治行亷平年四十餘卒為都尉時言河隄方畧有足稱者立字聖卿通春秋以父任為即稍遷諸曹竟寜中以王舅出為五原屬國都尉數年遷五原太守徙西河上郡立居職公亷治行畧與野王相似而多知有恩貸好為條教吏民嘉美野王立相代為太守歌之曰大馮君小馮君兄弟繼踵相因循聰眀賢知恵吏民政如魯衛徳化鈞周公康叔猶二君後遷為東海太守下溼病痺天子聞之徙立為太原太守更歴五郡所居有迹年老卒官參字叔平學通尚書少為黄門郎給事中宿衛十餘年參為人矜嚴好修容儀進退恂恂甚可觀也參昭儀少弟行又敕偹以嚴見憚終不得親近侍帷幄竟寜中以王舅出補渭陵食官令以數病徙為寢中即有詔勿事陽朔中中山王來朝參擢為上河農都尉病免官復為渭陵寝中即永始中超遷代郡太守以邉郡道遠徙為安定太守數歳病免復為諫大夫使領䕶左馮翊都水綏和中立定陶王為皇太子以中山王見廢故封王舅參為宜卿侯以慰王意參之國上書願至中山見王太后行未到而王薨王病時上奏願貶參爵以闗内侯食邑留長安上憐之下詔曰中王孝王短命早薨願以舅宜郷侯參為闗内侯歸家朕甚愍之其還參京師以列侯奉朝請五侯皆敬憚之丞相翟方進亦甚重焉數謂參物禁太甚君侯以王舅見廢不得在公卿位今五侯至尊貴也與之並列宜少詘節卑體視有所宗而君侯盛修容貎以威嚴加之此非所以下五侯而自益者也參性好禮儀終不改其恒操頃之哀帝即位帝祖母傅太后用事追怨參姊中山太后陷以祝詛大逆之罪語在外戚傳參以同産當相坐謁者承制召參詣廷尉參自殺且死仰天歎曰參父子兄弟皆偹大位身至封侯今被惡名而死姊弟不敢自惜傷無以見先人于地下死者十七人衆莫不憐之宗族徙歸故郡匡衡字稚圭東海承人也父世農夫至衡好學家貧庸作以供資用尤精力過絶人諸儒為之語曰無説詩匡鼎來匡説詩觧人頤衡射䇿甲科以不應令除為太常掌故調補平原文學學者多上書薦衡經眀當世少䨇今為文學就官京師後進皆欲從衡平原衡不宜在遠方事下太子太傅蕭望之少府梁邱賀問衡對詩諸大義其對深美望之奏衡經學精習説有師道可觀覽宣帝不甚用儒遣衡歸官而皇太子見衡對私善之會宣帝崩元帝初即位樂陵侯史高以外屬為大司馬車騎将軍領尚書事前将軍蕭望之為副望之名儒有師傅舊恩天子任之多所貢薦高充位而已與望之有隙長安令楊興説髙曰将軍以親戚輔政貴重於天下無二然衆庶論議令問休譽不專在将軍者何也彼誠有所聞也以將軍之幕府海内莫不卬望而所舉不過私門賔客乳母子弟人情忽不自知然一夫竊議語流天下夫富貴在身而列士不譽是有狐白之裘而反衣之也古人病其若此故卑體勞心以求賢為務傳曰以賢難得之故因曰事不待賢以食難得之故而曰飽不待食惑之甚者也平原文學匡衡材智有餘經學絶倫但以無階朝廷故隨牒在遠方将軍誠召置幕府學士歙然歸仁與參事議觀其所有貢之朝廷必為國噐以此顯示衆庶名流於世髙然其言辟衡為議曹史薦衡於上上以為即中遷博士給事中是時有日食地震之變上問以政治得失衡上䟽曰臣聞五帝不同禮三王各異教民俗殊務所遇之時異也陛下躬聖徳開太平之路閔愚吏民觸法抵禁比年大赦使百姓得改行自新天下幸甚臣竊見大赦之後姦邪不為衰止今日大赦眀日犯法相隨入獄此殆𨗳之未得其務也盖保民者陳之以徳義示之以好惡觀其失而制其宜故動之而和綏之而安今天下俗貪財賤義好聲色上侈靡亷耻之節薄淫辟之意縦綱紀失序䟽者踰内親戚之恩薄婚姻之黨隆茍合徼幸以身設利不改其原雖歳赦之刑猶難使錯而不用也臣愚以為宜壹曠然大變其俗孔子曰能以禮讓為國乎何有朝廷者天下之楨幹也公卿大夫相與循禮恭讓則民不争好仁樂施則下不暴上義髙節則民興行寛柔和恵則衆相愛四者眀王之所以不嚴而成化也何者朝有變色之言則下有争鬭之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盗竊之民此其本也今俗吏之治皆不本禮譲而上克暴或忮害好䧟人於罪貪財而慕埶故犯法者衆姦邪不止雖嚴刑峻法猶不為變此非其天性有由然也臣竊考國風之詩周南召南被賢聖之化深故篤於行而亷於色鄭伯好勇而國人暴虎秦穆貴信而士多從死陳夫人好巫而民滛祀晉侯好儉而民畜聚大王躬仁邠國貴恕由此觀之治天下者審所上而已今之偽薄忮害不讓極矣臣聞教化之流非家至而人説之也賢者在位能者在職朝廷崇禮百僚敬讓道徳之行由内及外自近者始然後民知所法遷善日進而不自知是以百姓安隂陽和神靈應而嘉祥見詩曰商邑翼翼四方之極夀考且寜以保我後生此成湯所以建至治保子孫化異俗而懐鬼方也今長安天子之都親承聖化然其習俗無以異於逺方郡國來者無所法則或見侈靡而放效之此敎化之原本風俗之樞機宜先正者也臣聞天人之際精祲有以相盪善惡有以相推事作乎下者象動乎上隂陽之理各應其感隂變則静者動陽蔽則眀者晻水旱之災隨類而至今闗東連年饑饉百姓乏困或至相食此皆生於賦斂多民所共者大而吏安集之不稱之效也陛下祗畏天戒哀閔元元大自減損省甘泉建章宮衛罷珠崖偃武行文将欲度唐虞之隆絶殷周之衰也諸見罷珠崖詔書者莫不欣欣人自以將見太平也宜遂減宮室之度省靡麗之飾考制度修外内近忠正遠巧佞放鄭衛進雅頌舉異材開直言任温良之人退刻薄之吏顯潔白之士昭無欲之路覽六藝之意察上世之務眀自然之道博和睦之化以崇至仁匡失俗易民視令海内昭然咸見本朝之所貴道徳𢎞於京師淑問揚乎疆外然後大化可成禮讓可興也上説其言遷衡為光禄大夫太子少傅時上好儒術文辭頗改宣帝之政言事者多進見人人自以為得上意又傅昭儀及子定陶王愛幸寵於皇后太子衡復上䟽曰臣聞治亂安危之機在乎審所用心蓋受命之王務在創業垂統傳之無窮繼體之君心存於承宣先王之徳而襃大其功昔者成王之嗣位思述文武之道以飬其心休烈美盛皆歸之二后而不敢專其名是以上天歆享鬼神祐焉其詩曰念我皇祖陟降廷止言成王常思祖考之業而鬼神祐助其治也陛下聖徳天覆子愛海内然隂陽未和姦邪未禁者殆論議者未丕掦先帝之盛功争言制度不可用也務變更之所更或不可行而復復之是以羣下更相是非吏民無所信臣竊恨國家釋樂成之業而虚為此紛紛也願陛下詳覽統業之事留神於遵制揚功以定羣下之心大雅曰無念爾祖聿修厥徳孔子著之孝經首章蓋至徳之本也傳曰審好惡理情性而王道畢矣能盡其性然後能盡人物之性能盡人物之性可以贊天地之化治性之道必審己之所有餘而彊其所不足蓋聰眀疎通者戒於太察寡聞少見者戒於雍蔽勇猛剛彊者戒於太暴仁愛溫良者戒於無㫁湛静安舒者戒於後時廣心浩大者戒於遺㤀必審己之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進唯陛下戒所以崇聖徳臣又聞室家之道修則天下之理得故詩始國風禮本冠婚始乎國風原情性而眀人倫也本乎冠婚正基兆而防未然也福之興莫不本乎室家室家之道衰莫不本乎梱内故聖王必慎妃后之際别適長之位禮之於内也卑不踰尊新不先故所以統人情而理隂氣也其尊適而卑庶也適子冠乎阼禮之用醴衆子不得與列所以貴正體而眀嫌疑也非虛加其禮文而已乃中心與之殊異故禮探其情而見之外也聖人動静游燕所親物得其序得其序則海内自修百姓從化如當親者䟽當尊者卑則佞巧之姦因時而動以亂國家故聖人慎防其端而禁於未然不以私恩害公義陛下聖徳純偹莫不修正則天下無為而治詩云于以四方克定厥家傳曰正家而天下定矣衡為少傅數年數上疏陳便宜及朝廷有政議傅經以對言多法義上以為任公卿由是為光禄勲御史大夫建昭三年代韋元成為丞相封樂安侯食邑六百户元帝崩成帝即位衡上疏戒妃匹勸經學及朝饗羣臣威儀之則上敬納其言頃之衡復奏正南北郊罷諸滛祀皆可采用初元帝時中書令石顯用事自前相韋元成及衡皆畏顯不敢失其意至成帝初即位衡乃與御史大夫甄譚共奏顯追條其舊惡并及黨與於是司𨽻校尉王尊劾奏衡譚居大臣位知顯等專權埶作威福為海内患害不以時白奏行罰而阿諛曲從附下㒺上無大臣輔政之義既奏顯等不自陳不忠之罪而反揚著先帝任用傾覆之徒罪至不道有詔勿劾衡慙懼上疏謝罪因稱疾乞骸骨上丞相樂安侯印綬詔報不許衡起視事上以新即位褒優大臣然羣下多是王尊者衡黙黙不自安每有風雨水旱不時連乞骸骨讓位上輒以詔書慰撫不許久之衡子昌為越騎校尉醉殺人繋詔獄越騎官屬與昌弟且謀簒昌事𤼵覺衡免冠徒跣待罪天子使謁者詔衡冠履而有司奏衡專地盗土衡竟坐免初衡封僮之樂安郷郷本田提封三千一百頃南以閩佰為界初元元年郡圖誤以閩佰為平陵佰積十餘歳衡封臨淮郡遂封真平陵佰以為界多四百頃至建始元年郡乃定國界上計簿更定圖言丞相府衡謂所親吏趙殷曰主簿陸賜故居奏曹習事暁知國界署集曹掾眀年治計時衡問殷國界事曹欲奈何殷曰賜以為舉計令郡實之恐郡不肯從實可令家丞上書衡曰顧當得不耳何至上書亦不告曹使舉也聼曹為之後賜與屬眀舉計曰案故圖樂安鄉南以平陵佰為界不足故而以閩佰為界觧何郡即復以四百頃付樂安國衡遣従史之僮収取所還田租榖千餘石入衡家司𨽻校尉駿少府忠行廷尉事劾奏衡監臨盗所主守直十金以上春秋之義諸侯不得專地所以壹統尊法制也衡位三公輔國政領計簿知郡實正國界計簿已定而背法制專地盗土以自益及賜眀阿承衡意猥舉郡計亂減縣界附上㒺下擅以地附益大臣皆不道於是上可其奏勿治丞相免為庶人終於家子咸亦眀經歴位九卿家世多為博士者張禹字子文河内軹人也至禹父徙家蓮勺蓮勺音輦酌禹為兒數隨家至市喜觀於卜相者前乆之頗暁其别蓍布卦意時從旁言卜者愛之又竒其靣貎謂禹父曰是兒多知可令學經及禹壮至長安學従沛郡施讐受易瑯琊王陽膠東庸生問論語既皆明習有徒衆舉為郡文學甘露中諸儒薦禹有詔太子太傅蕭望之問禹對易及論語大義望之善焉奏禹經學精習有師法可試事奏寝罷歸故官乆之試為博士初元中立皇太子而博士鄭寛中以尚書授太子薦言禹善論語詔令禹授太子論語由是遷光禄大夫數歳出為東平内史元帝崩成帝即位徴禹寛中皆以師賜爵闗内侯寛中食邑八百户禹六百户拜為諸吏光禄大夫秩中二千石給事中領尚書事是時帝長舅陽平侯王鳯為大将軍輔政專權而上富於春秋謙讓方郷經學敬重師傅而禹與鳯並領尚書内不自安數稱病上書乞骸骨欲退避鳯上詔報不許加賜黄金百斤飬牛上尊酒太官致餐侍醫視病使者臨問禹惶恐復起視事河平四年代王商為丞相封安昌侯為相六歳鴻嘉元年以老病乞骸骨上加優再三乃聼許賜安車駟馬黄金百斤罷就第以列侯朝朔望位特進見禮如丞相置從事史五人益封四百户天子數加賞賜前後數千萬禹為人謹厚内殖貨財家以田為業及富貴多買田至四百頃皆涇渭漑灌極膏腴上賈他財物稱是禹性習知音聲内奢淫身居大第後堂理絲竹筦絃禹成就弟子尤著者淮陽彭宣至大司空沛郡戴崇至少府九卿宣為人恭儉有法度而崇愷悌多智二人異行禹心親愛崇敬宣而疎之崇每候禹常責師宜置酒設樂與弟子相娛禹将崇入後堂飲食婦女相對優人筦絃鏗鏘極樂昏夜乃罷而宣之來也禹見之於便坐講論經義日晏賜食不過一肉巵酒相對宣未嘗得至後堂及兩人皆聞知各自得也禹年老自治冢塋起祠室好平陵肥牛亭部處地又近延陵奏請求之上以賜禹詔令平陵徙亭他所曲陽侯根聞而争之此地當平陵寢廟衣冠所出游道禹為師傅不遵謙讓至求衣冠所游之道又徙壊舊亭重非所宜孔子稱賜愛其羊我愛其禮宜更賜禹他地根雖為舅上敬重不如禹根言雖切猶不見從卒以肥牛亭地賜禹根由是害禹寵數毁惡之天子愈益敬厚禹禹每病輒以起居聞車駕自臨問之上親拜禹牀下禹頓首謝恩歸誠因言老臣有四男一女愛女甚於男遠嫁為張掖太守蕭咸妻不勝父子私情思與相近上即時徙咸為𢎞農太守又禹小子未有官上臨候禹禹數視其小子上即禹牀下拜為黄門郎給事中禹雖家居以特進為天子師國家每有大政必與定議永始元延之間日蝕地震尤數吏民多上書言災異之應譏切王氏專政所致上懼變異數見意頗然之而未有以眀見乃車駕至禹第辟左右親問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯不平恐為所怨禹即謂上曰春秋二百四十年間日食三十餘地震五十六或為諸侯相殺或為夷狄侵中國災變之意深遠難見故聖人罕言命不語怪神性與天道自子贛之屬不得聞何况淺見鄙儒之所言陛下宜修政事以善應之與下同其福喜此經義意也新學小生亂道誤人宜勿信用以經術斷之上雅信愛禹由是不疑王氏後曲陽侯根及諸王子弟聞知禹言皆喜説遂親就禹禹見時有變異若上體不安擇日絜齊露蓍正衣冠立筮得吉卦則獻其占如有不吉禹為感動憂色成帝崩禹及事哀帝建平二年薨諡曰節侯禹四子長子宏嗣侯官至太常列於九卿三弟皆為校尉散騎諸曹初禹為師以上難數對己問經為論語章句獻之始魯扶卿及夏侯勝王陽蕭望之韋元成皆説論語篇第或異禹先事王啺後從庸生採獲所安最後出而尊貴諸儒為之語曰欲為論念張文由是學者多從張氏餘家寖微孔光字子夏孔子十四世孫也孔子生伯魚鯉鯉生子思伋伋生子上帛帛生子家求求生子真箕箕生子高穿穿生順順為魏相順生鮒鮒為陳渉博士死陳下鮒弟子襄為孝恵博士長沙太傅襄生忠忠生武及安國武生延年延年生霸字次孺霸生光焉安國延年皆以治尚書為武帝博士安國至臨淮太守霸亦治尚書事太傅夏侯勝昭帝末年為博士宣帝時為太中大夫以選授皇太子經遷詹事髙密相是時諸侯王相在郡守上元帝即位徴霸以師賜爵闗内侯食邑八百户號襃成君給事中加賜黄金二百斤第一區徙名數于長安霸為人謙退不好權勢嘗稱爵位太過何徳以堪之上欲致霸相位自御史大夫貢禹卒及薛廣徳免輒欲拜霸霸讓位自陳至三上深知其至誠乃弗用以是敬之賞賜甚厚及霸薨上素服臨弔者再至賜東園祕器錢帛䇿贈以列侯禮諡曰烈君霸四子長子福嗣闗内侯次子㨗㨗弟喜皆列校尉諸曹光最少子也經學尤眀年未二十舉為議郎光禄勲匡衡舉光方正為諫議大夫坐議有不合左遷虹長虹音貢自免歸敎授成帝初即位舉為博士數使錄寃獄行風俗振贍流民奉使稱㫖由是知名是時博士選三科高為尚書次為刺史其不通政事以乆次補諸侯太傅光以高第為尚書觀故事品式數歳眀習漢制及法令上甚信任之轉為僕射尚書令有詔光周密謹慎未嘗有過加諸吏官以子男放為侍郎給事黄門數年遷諸吏光禄大夫秩中二千石給事中賜黄金百斤領尚書事後為光禄勲復領尚書諸吏給事中如故凡典樞機十餘年守法度修故事上有所問據經法以心所安而對不希指茍合如或不從不敢彊諫争以是久而安時有所言輒削草槀以為章主之過以奸忠直人臣大罪也有所薦舉唯恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事或問光温室省中樹皆何木也光黙不應更答以他語其不泄如是光帝師傅子少以經行自著進官蚤成不結黨友飬游説有求於人既性自守亦其勢然也徙光禄勲為御史大夫綏和中上即位二十五年無繼嗣至親有同産弟中山孝王及同産弟子定陶王在定陶王好學多材於帝子行而王祖母傅太后隂為王求漢嗣私事趙皇后昭儀及帝舅大司馬驃騎将軍王根故皆勸上上於是召丞相翟方進御史大夫光右将軍亷襃後將軍朱博皆引入禁中議中山定陶王誰可為嗣者方進根以為定陶王帝弟之子禮曰昆弟之子猶子也為其後者為之子也定陶王宜為嗣襃博皆如方進根議光獨以為立嗣以親中山王先帝之子帝親弟也以尚書盤庚殷之及王為比中山王宜為嗣上以禮兄弟不相入廟又皇后昭儀欲立定陶王故遂立為太子光以議不中意左遷廷尉光久典尚書練法令號稱詳平時定陵侯淳于長坐大逆誅長小妻廼始等六人皆以長事未發覺時棄去或更嫁及長事發丞相方進太司空武議以為令犯法者各以法時律令論之眀有所訖也長犯大逆時廼始等見為長妻已有當坐之罪與身犯法無異後乃棄去於法無以觧請論光議以為大逆無道父母妻子同産無少長皆棄市欲懲犯法者也夫婦之道有義則合無義則離長未知當坐大逆之法而棄去廼始等或更嫁義已絶而欲以為長妻論殺之名不正不當坐有詔光議是是歳右将軍襃後将軍博坐定陵紅陽侯皆免為庶人以光為左将軍居右将軍官職執金吾王咸為右将軍居後将軍官職罷後将軍官數月丞相方進薨召左将軍光當拜已刻侯印書賛上暴崩即其夜於大行前拜受丞相博山侯印綬哀帝初即位躬行儉約省減諸用政事由己出朝廷翕然望至治焉襃賞大臣益封光千户時成帝母太皇太后自居長樂宮而帝祖母定陶傅太后在國邸有詔問丞相大司空定陶共王太后宜當何居光素聞傅太后為人剛暴長於權謀自帝在襁褓而飬長敎道至於成人帝之立又有力光心恐傅太后與政事不欲令與帝旦夕相近即議以為定陶太后宜改築宮大司空何武曰可居北宮上從武言北宮有紫房複道通未央宮傅太后果從複道朝夕至帝所求欲稱尊號貴寵其親屬使上不得直道行頃之太后從弟子傅遷在左右尤傾邪上免官遣歸故郡傅太后怒上不得已復留遷光與大司空師丹奏言詔書侍中駙馬都尉遷巧佞無義漏泄不忠國之賊也免歸故郡復有詔止天下疑惑無所取信虧損聖徳誠不小愆陛下以變異連見避正殿見羣臣思求其故至今未有所改臣請遷歸故郡以銷姦黨應天戒卒不得遣復為侍中脅於傅太后皆此類也又傅太后欲與成帝母俱稱尊號羣下多順指言母以子貴宜立尊號以厚孝道唯師丹與光持不可上重違大臣正議又内廹傅太后猗違者連歳丹以罪免而朱博代為大司空光自先帝時議繼嗣有持異之隙矣又重忤傅太后指由是傅氏在位者與朱博為表裏共毁譖光後數月遂䇿免光罷歸光退閭里杜門自守而朱博代為丞相數月坐承傅太后指妄奏事自殺平當代為丞相數月薨王嘉復為丞相數諫諍忤指旬歳間閲三相議者皆以為不及光上由是思之會元夀元年正月朔日有蝕之後十餘日傅太后崩是月徴光詣公車問日蝕事光對曰臣聞日者衆陽之宗人君之表至尊之象君徳衰㣲隂道盛彊侵蔽陽眀則日蝕應之書曰羞用五事建用皇極如貎言視聼思失大中之道不立則咎徴荐臻六極屡降皇之不極是為大中不立其傳曰時則有日月亂行謂朓側慝甚則薄蝕是也又曰六沴之作歳之朝曰三朝其應至重廼正月辛丑朔日有食之變見三朝之會上天聰眀茍無其事變不虛生唯陛下兢兢業業承順天戒敬畏變異勤心虛己延見羣臣思求其故然後勅躬自約總正萬事放遠䜛説之黨援納斷斷之介退去貪殘之徒進用賢良之吏平刑罰薄稅斂恩澤加於百姓誠為政之大本應變之至務也書奏上説賜光束帛拜為光禄大夫秩中二千石給事中位次丞相詔光舉可尚書令者封上光舉尚書僕射敞以聞敞以舉故為東平太守敞姓成公東海人也光為大夫月餘丞相嘉下獄死御史大夫賈延免光復為御史大夫二月為丞相復故國博山侯上乃知光前免非其罪以過近臣毁短光者免傅嘉為庶人歸故郡眀年定三公官光更為大司徒會哀帝崩太皇太后以新都侯王莽為大司馬徴立中山王子是為平帝帝年㓜太后稱制委政於莽初哀帝罷黜王氏故太后與莽怨丁傅董賢之黨莽以光舊相名儒天下所信太后敬之備禮事光所欲搏擊輒為草以太后指風光令上之厓眦莫不誅傷莽權日盛光憂懼不知所出上書乞骸骨莽白太后帝㓜少宜置師傅徙光為帝太傅位四輔給事中領宿衛供飬行内署門户省服御食物明年徙為太師而莽為太傅光常稱疾不敢與莽並有詔朝朔望領城門兵莽又風羣臣奏莽功徳稱宰衡位在諸侯王上百官統焉光愈恐固稱疾辭位太后詔太師光毋朝十日一賜餐賜太師靈夀杖黄門令為太師省中坐置几太師入省中用杖賜餐十七物然後歸老于第官屬按職如故光凡為御史大夫丞相各再壹為大司徒太傅太師歴三世居公輔位前後十七年自為尚書止不敎授後為卿時會門下大生講問疑難舉大義云其弟子多成就為博士大夫者見師居大位幾得其助力光終無所薦舉至或怨之其公如此光年七十元始五年薨莽白太后使九卿䇿贈以太師博山侯印綬賜乗輿祕噐金錢雜帛少府供張諫大夫持節與謁者二人使䕶喪事博士䕶行禮太后亦遣中謁者持節視喪公卿百官會弔送葬載以乗輿輼輬及副各一乗羽林孤兒諸生合四百人輓送車萬餘兩道路皆舉音以過喪將作穿復上可甲卒五百人起墳如大將軍王鳯制度諡曰簡烈侯初光以丞相封後益封凡食邑萬一千户病甚上書讓還七千户及還所賜第子放嗣莽簒位後以光兄子永為大司馬封侯昆弟子至卿大夫四五人始光父霸以初元元年為闗内侯食邑霸上書求奉孔子祭祀元帝下詔曰其令師襃成君闗内侯霸以所食邑八百户祀孔子焉故霸還長安子福名數於魯奉夫子祀霸薨子福嗣福薨子房嗣房薨子莽嗣元始元年封周公孔子後為列侯食邑各二千户莽更封為襃成侯後避王莽更名均馬宮字游卿東海戚人也治春秋嚴氏以射䇿甲科為郎遷楚長史免官後為丞相史司直師丹薦宮行能高潔遷廷尉平青州刺史汝南九江太守所在見稱徴為詹事光禄勲右將軍代孔光為大司徒封扶徳侯光為太師薨宮復代光爲太師兼司徒官初宮哀帝時與丞相御史雜議帝祖母傅太后諡及元始中王莽𤼵傅太后陵徙歸定陶以民葬之追誅前議者宮為莽所厚獨不及内慙懼上書謝罪乞骸骨莽以太皇太后詔賜宮䇿以侯就第王莽簒位以宮爲太子師卒官本姓馬矢宮仕學稱馬氏云王商字子威涿郡蠡吾人也徙杜陵商父武武兄無故皆以宣帝舅封無故為平昌侯武為樂昌侯語在外戚傳商少爲太子中庶子以肅敬敦厚稱父薨商嗣為侯推財以分異母諸弟身無所受居喪哀慽於是大臣薦商行可以勵羣臣義足以厚風俗宜偹近臣繇是擢為諸曹侍中中郎将元帝時至右將軍光禄大夫是時定陶共王愛幸幾代太子商為外戚重臣輔政擁佑太子頗有力焉元帝崩成帝即位甚敬重商徙為左將軍而帝元舅大司馬大將軍王鳯顓權行多驕僣商論議不能平鳯鳳知之亦疏商建始三年秋京師民無故相驚言大水至百姓奔走相蹂躪老弱號呼長安中大亂天子親御前殿召公卿議大將軍鳳以為太后與上及後宮可御船令吏民上長安城以避水羣臣皆從鳳議左將軍商獨曰自古無道之國水猶不冒城郭今政治和平世無兵革上下相安何因當有大水一日暴至此必訛言也不宜令上城重驚百姓上乃止有頃長安中稍定問之果訛言上以是美壯商之固守數稱其議而鳳大慚自恨失言明年商代匡衡爲丞相益封千户天子甚尊任之商爲人多質有威重長八尺餘身體鴻大容貎甚過絶人河平四年單于來朝引見白虎殿丞相商坐未央廷中單于前拜謁商商起離席與言單于仰視商貎大畏之遷延却退天子聞而歎曰此眞漢相矣初大將軍鳳連婚楊肜爲瑯琊太守其郡有災害十四以上商部屬按問鳳以暁商曰災異天事非人力所能爲肜素善吏宜以為後商不聼竟奏免之奏果寢不下鳯以是重怨商陰求其短使人上書言商閨門内事天子以為暗昧之過不足以傷大臣鳳固争下其事司𨽻先是皇太后嘗詔問商女欲以備後宮時女病商意亦難之以病對不入及商以閨門事見考自知爲鳯所中惶怖更欲納女為援廼因新幸李倢伃家白見其女會有日蝕之變太中大夫蜀郡張匡爲人佞巧上書願對近臣陳日蝕咎下朝者將軍丹等問匡對曰竊見丞相商作威作福從外制中取必於上性殘賊不仁遣剽輕吏微求人罪欲以立威天下患苦之前頻陽耿定上書言商與父傅通及女弟滛亂奴殺其私夫疑商敎使章下有司商私怨懟商子俊欲上書告商俊妻左將軍丹女持其書示丹丹惡其父子乖迕爲女求去商不盡忠納善以輔至德知聖王崇孝遠别不親後庭之事皆受命皇太后太后前聞商有女欲以備後宮商言有固疾後有耿定事更詭道因李貴人家内女執左道以亂政誣罔悖大臣節故應是而日蝕周書曰以左道事君者誅易曰日中見昧則折其右肱往者丞相周勃再建大功及孝文時纎介怨恨而日爲之蝕於是退勃使就國卒無怵悐憂今商無尺寸之功而有三世之寵身位三公宗族爲列侯吏二千石侍中諸曹給事禁門内連昏諸侯王權寵至盛審有内亂殺人怨懟之端宜窮竟考問臣聞秦丞相呂不韋見王無子意欲有秦國卽求好女以為妻陰知其有身而獻之王産始皇帝及楚相春申君亦見王無子心利楚國卽獻有身妻而産懐王自漢興幾遭呂霍之患今商有不仁之性廼因怨以内女其姦謀未可測度前孝景世七國反將軍周亞夫以爲卽得雒陽劇孟闗東非漢之有今商宗族權勢合貲鉅萬計私奴以千數非特劇孟匹夫之徒也且失道之至親戚畔之閨門内亂父子相訐而欲使之宣明聖化調和海内豈不繆哉商視事五年官職陵夷而大惡著於百姓甚虧損聖德有鼎折足之凶臣愚以爲聖主富於春秋卽位以來未有懲姦之威加以繼嗣未立大異並見尤宜誅討不忠以遏未然行之一人則海内震動百姦之路塞矣於是左將軍丹等奏商位三公爵列侯親受詔䇿爲天下師不遵法度以翼國家而回辟下媚以進其私執左道以亂政爲臣不忠罔上不道甫刑之辟皆爲上戮罪名明白臣請詔謁者召商詣若盧詔獄上素重商知匡言多險制曰勿治鳳固争之於是制詔御史免商商免相三日𤼵病嘔血薨諡曰戾侯而商子弟親屬爲駙馬都尉侍中常侍諸曹大夫郎吏者皆出補吏莫得留給事宿衛者有司奏商罪過未決請除國邑有詔長子安嗣爵爲樂昌侯至長樂衛尉光祿勲商死後連年日蝕地震直臣京兆尹王章上封事召見訟商忠直無罪言鳳專權蔽主鳯以法誅章語在元后傳至元始中王莽爲安漢公誅不附己者樂昌侯安見被以罪自殺國除史丹字君仲魯國人也徙杜陵祖父恭有女弟武帝時爲衛太子良娣産悼皇考皇考者宣帝父也宣帝微時依倚史氏語在史良娣傳及卽尊位而恭已死恭三子高曾元曾元皆以外屬舊㤙封曾爲將陵侯元平臺侯高侍中貴幸以發舉反者大司馬霍禹功封樂陵侯宣帝疾病拜高爲大司馬車騎將軍領尚書事帝崩太子襲尊號是爲孝元帝高輔政五年乞骸骨賜安車駟馬黄金罷就第薨諡曰安侯自元帝爲太子時丹以父高任爲中庶子侍從十餘年元帝卽位爲駙馬都尉侍中出常驂乗甚有寵上以丹舊臣皇考外屬親信之詔丹䕶太子家是時傅昭儀子定陶共王有材藝子母俱愛幸而太子頗有酒色之失母王皇后無寵建昭之間元帝被疾不親政事留好音樂或置鼙鼓殿下天子自臨軒檻上隤銅隤持回反下也丸以擿鼓擿音擲磓也磓丁回反聲中嚴鼓之節後宮及左右習知音者莫能爲而定陶王亦能之上數稱其材丹進曰凡所謂材者敏而好學溫故知新皇太子是也若乃器人於絲竹鼙鼓之間則是陳惠李微是時善樂者名也高於匡衡可相國也於是上黙然而笑其後中山哀王薨太子前弔哀王者元帝之少弟與太子游學相長大謂同處長養以至於壯大上望見太子感念哀王悲不能自止太子旣至前不哀上大恨曰安有人不慈仁而可奉宗廟爲民父母者乎上以責謂丹丹免冠謝曰臣誠見陛下哀痛中山王至以感損向者太子當進見臣切戒屬毋涕泣感傷陛下罪廼在臣當死上以爲然意乃解丹之輔相皆此類也竟寜元年上寢疾傅昭儀及定陶王常在左右而皇太子希得進見上疾稍侵意忽忽不平數問尚書以景帝時立膠東王故事是時太子長舅陽平侯王鳯爲衛尉侍中與皇后太子皆憂不知所出丹以親密臣得侍視疾候上間獨寢時丹直入卧内頓首伏青蒲上以青規地曰靑蒲涕泣言皇太子以嫡長立積十餘年名號繫於百姓天下莫不歸心臣子見定陶王雅素愛幸今者道路流言爲國生意以爲天子有動摇之議審若此公卿已下必死争不奉詔臣願先賜死以示羣臣天子素仁不忍見丹涕泣言又切至上意大感喟然太息曰吾日困劣而太子兩王㓜少意中戀戀亦何不念乎然無有此議且皇后謹愼先帝又愛太子吾豈可違指駙馬都尉安所受此語丹卽却頓首曰愚臣妄聞罪當死上因納謂丹曰吾病寖加恐不能自還善輔導太子毋違我意丹噓唏而起太子由是遂爲嗣矣元帝竟崩成帝初即位擢丹爲長樂衛尉遷右將軍賜爵闗内侯食邑三百户給事中後徙左將軍光禄大夫鴻嘉元年封武陽侯國東海郯之武彊聚戸千一百丹爲人足知愷悌愛人貌若儻蕩不備然心甚謹密故尤得信於上丹兄嗣父爵爲侯讓不受分丹盡得父財身又食大國邑重以舊恩數見襃賞賞賜累千金僮奴以百數後房妻妾數十人内奢滛好飮酒極滋味聲色之樂爲將軍前後十六年永始中病乞骸骨上賜䇿令上將軍印綬賜黄金五十斤安車駟馬歸第數月薨諡曰頃侯有子男女二十人九男皆以丹任並爲侍中諸曹親近在左右史氏凡四人侯至卿大夫二千石者十餘人皆訖王莽乃絶唯將陵侯曾無子絶於身云傅喜字稚游河内溫人也哀帝祖母定陶太后從父弟少好學問有志行哀帝立爲太子成帝選喜爲太子庶子哀帝初卽位以喜爲衛尉遷右將軍是時王莽爲大司馬乞骸骨避帝外家上旣聽莽退衆庶歸望於喜喜從弟孔鄉侯晏親與喜等而女爲皇后又帝舅陽安侯丁明皆親以外屬封喜執謙稱疾傅太后始與政事喜數諫之由是傅太后不欲令喜輔政上於是用左將軍師丹代王莽爲大司馬賜喜黄金百斤上將軍印綬以光禄大夫養病大司空何武尚書令唐林皆上書言喜行義修潔忠誠憂國内輔之臣也今以寢病一旦遣歸衆庶失望皆曰傅氏賢子以議論不合於定陶太后故退百寮莫不爲國恨之忠臣社稷之衛魯以季友治亂楚以子玉重輕魏以無忌折衝項以范增存亡故楚跨有南土帶甲百萬鄰國不以爲難子玉爲將則文公側席而坐及其死也君臣相慶百萬之衆不如一賢故秦行千金以間亷頗漢散萬金以疏亞父喜立於朝陛下之光輝傅氏之廢興也上亦自重之明年正月乃徙師丹爲大司空而拜喜爲大司馬封高武侯丁傅驕奢皆忌喜爲恭儉又傅太后欲求稱尊號與成帝母齊尊喜與丞相孔光大司空師丹共執正議傅太后大怒上不得已先免師丹以感動喜喜終不順後數月遂䇿免喜遣就國後又欲奪喜侯上不聽喜在國三歲餘哀帝崩平帝即位莽用事免傅氏官爵歸故郡晏將妻子徙合浦莽白太后獨詔喜位特進奉朝請喜雖外見褒賞孤立憂懼後復遣就國以壽終莽賜諡曰貞侯莽敗乃絶薛宣字贛君東海剡人也少爲廷尉書佐都船獄吏以大司農斗食斗食者禄少一年不滿百石計日以斗爲數也屬察亷補不其丞瑯琊太守趙貢行縣見宣甚悅其能從宣歴行屬縣還至府令妻子與相見戒曰贛君至丞相我兩子亦中丞相史察宣亷遷樂浪都尉丞幽州刺史舉茂材爲宛句令大將軍王鳳聞其能薦爲長安令治果有名以明習文法詔補御史中丞是時成帝初卽位宣爲中丞執法殿中外總部刺史上疏曰陛下至德仁厚哀愍元元躬有日昃之勞而無逸豫之樂允執聖道刑罰惟中然而嘉氣尚凝隂陽不和是臣下未稱而聖化獨有不洽者也臣竊伏思其一端殆吏多苛政政敎煩碎大率咎在部刺史或不循守條職舉錯各以其意多與郡縣事在開私門聽讒佞以求吏民過失譴呵及細微責義不量力郡縣相廹促亦内相刻流至衆庶是故鄉黨闕於嘉賓之懽九族忘其親親之恩飲食周急之厚彌衰送往勞來之禮不行夫人道不通則陰陽否鬲和氣不興未必不由此也詩云民之失德乾餱以愆鄙語曰苛政不親煩苦傷恩方刺史奏事時宜明申敕使昭然知本朝之要務上嘉納之宣數言政事便宜舉奏部刺史郡國二千石所貶退稱進白黒分明繇是知名出爲臨淮太守政敎大行會陳留郡有大賊廢亂上徙宣爲陳留太守盜賊禁止吏民敬其威信入守左馮翊滿歲稱職爲眞始高陵令楊湛櫟陽令謝游皆貪猾不遜持郡短長前二千石數案不能竟及宣視事詣府謁宣設酒飯與相對接待甚備已而陰求其罪臧具得所受取宣察湛有改節敬宣之效乃手自牒書條其姦臧封與湛曰吏民條言君如牒或議以爲疑於主守盜馮翊敬重令又念十金法重不忍相暴章故密以手書相暁欲君自圖進退可復申眉於後卽無其事復封還記得爲君分明之湛自知罪臧皆應記而宣辭語溫潤無傷害意湛即時解印綬付吏爲記謝宣終無怨言而櫟陽令游自以大儒有名輕宣宣獨移書顯責之曰告櫟陽令吏民言令治行煩苛適罰作使千人以上賦取錢財數十萬給爲非法賣買聽任富吏賈數不可知證騐已明白欲遣吏考案恐負舉者耻辱儒士故使掾平鐫令孔子曰陳力就列不能者止令詳思之方調守游得檄亦解印綬去又頻陽縣北當上郡西河爲數郡湊多盜賊其令平陵薛恭本縣孝者功次稍遷未嘗治民職不辦而粟邑縣小僻在山中民謹樸易治令鉅鹿尹賞久郡用事吏爲樓煩長舉茂材遷在粟宣即以令奏賞與恭換縣二人視事數月而兩縣皆治宣因移書勞勉之曰昔孟公綽優於趙魏而不宜滕薛故或以德顯或以功舉君子之道焉可憮也屬縣各有賢君馮翊垂拱䝉成願勉所職卒功業宣得郡中吏民罪名輒召告其縣長吏使自行罰暁曰府所以不自發舉者不欲代縣治奪賢令長名也長吏莫不喜懼免冠謝宣歸恩受戒者宣爲吏賞罰明用法平而必行所居皆有條教可紀多仁恕愛利池陽令舉亷吏獄掾王立府未及召聞立受囚家錢宣責讓縣縣案驗獄掾乃其妻獨受繫者錢萬六千獄掾實不知掾慙恐自殺宣聞之移書池陽曰縣所舉亷吏獄掾王立家私受賕而立不知殺身以自明立誠亷士甚可閔惜其以府決曹掾書立之柩以顯其魂府掾吏素與立相知者皆予送葬及日至休吏賊曹掾張扶獨不肯休坐曹治事宣出教曰蓋禮貴和人道尚通日至吏以令休所繇來乆冬夏至之日不省官事故休吏曹雖有公職事家亦望私恩意掾宜從衆歸對妻子設酒肴請鄰里一笑相樂斯亦可矣扶慚愧官屬善之宣爲人好威儀進止雍容甚可觀也性密静有思思省吏職求其便安下至財用筆研皆爲設方畧利用而省費吏民稱之郡中清静遷爲少府共張職辦月餘御史大夫于永卒谷永上疏陳宣行能上然之遂以宣爲御史大夫數月代張禹爲丞相封高陽侯食邑千户宣除趙貢兩子爲史貢者趙廣漢之兄子也爲吏亦有能名宣爲相府辭訟例不滿萬錢不爲移書後皆遵用薛侯故事然官屬譏其煩碎無大體不稱賢也時天子好儒雅宣經術又淺上亦輕焉乆之廣漢郡盜賊羣起丞相御史遣掾史逐捕不能克上廼拜河東都尉趙䕶爲廣漢太守以軍法從事數月斬其渠帥鄭躬降者數千人廼平會卭成太后崩喪事倉卒吏賦斂以趨辦其後上聞之以過丞相御史遂册免宣令上丞相高陽侯印綬罷歸初宣爲丞相而翟方進爲司直宣知方進名儒有宰相器深結厚焉後方進竟代爲丞相思宣舊恩宣免後二歲薦宣明習文法練國制度前所坐過薄可復進用上徴宣復爵高陽侯加寵特進位次師安昌侯給事中視尚書事宣復尊重任政數年後坐善定陵侯淳于長罷就第初宣有兩弟明脩明至南陽太守脩歴郡守京兆尹少府善交接得州里之稱後母常從脩居官宣爲丞相時脩爲臨菑令宣迎後母脩不遣後母病死脩去官持服宣謂三年服少能行之者兄弟相駮不可脩遂竟服繇是兄弟不和乆之哀帝初卽位博士申咸給事中亦東海人也毁宣不供養行䘮服薄於骨肉前以不忠孝免不宜復列封侯在朝省宣子况爲右曹侍郎數聞其語賕客楊明欲令創咸面目使不居位會司𨽻缺况恐咸爲之遂令明遮斫咸宮門外斷鼻脣身八創事下有司御史中丞衆等奏况朝臣父故宰相再封列侯不相勑承化而骨肉相疑疑咸受脩言以謗毁宣咸所言皆宣行迹衆人所共見公家所宜聞况知咸給事中恐爲司𨽻舉奏宣而公令明等廹切宮闕要遮創戮近臣於大道人衆中欲以鬲塞聰明杜絶論議之端桀黠無所畏忌萬衆讙譁流聞四方不與凡民忿怒争鬭者同臣聞敬近臣爲近主也禮下公門式路馬君畜産且猶敬之春秋之義意惡功遂不免於誅上浸之源不可長也况首爲惡明手傷功意俱惡皆大不敬明當以重論及况皆棄市廷尉直以爲律曰鬭以刃傷人完爲城旦其賊加罪一等與謀者同罪詔書無以詆欺成罪傳曰遇人不以義而見疻者與痏人之罪鈞惡不直也咸厚善脩而數稱宣惡流聞不誼不可謂直况以故傷咸計謀已定後聞置司𨽻因前謀而趣明非以恐咸爲司𨽻故造謀也本争私變雖於掖門外傷咸道中與凡民争鬭無異殺人者死傷人者刑古今之通道三代所不易也孔子曰必也正名名不正則刑罰不中刑罰不中而民無所錯手足今以况爲首惡明手傷爲大不敬公私無差春秋之義原心定罪原况以父見謗發忿怒無他大惡加詆欺輯小過成大辟陷死刑違明詔恐非法意不可施行聖王不以怒增刑明當以賊傷人不直况與謀者皆爵減完爲城旦上以問公卿議臣丞相孔光大司空師丹以中丞議是自將軍以下至博士議郎皆是廷尉况竟減罪一等徙敦煌宣坐免爲庶人歸故郡卒于家宣子惠亦至二千石始惠爲彭城令宣從臨淮遷至陳留過其縣橋梁郵亭不脩宣心知惠不能留彭城數日案行舍中處置什物觀視園菜終不問惠以吏事惠自知治縣不稱宣意遣門下掾送宣至陳留令掾進見自從其所問宣不教戒惠吏職之意宣笑曰吏道以法令爲師可問而知及能與不能自有資材何可學也衆人傳稱以宣言爲然初宣後封爲侯時妻死而敬長公主寡居上令宣尚焉及宣免歸故郡公主留京師後宣卒主上書願還宣葬延陵奏可况私從敦煌歸長安會赦因留與主私亂哀帝外家丁傅貴主附事之而疏王氏元始中莽自尊爲安漢公主又出言非莽而况與吕寛相善及寛事覺時莽并治况發揚其罪使使者以太皇太后詔賜主藥主怒曰劉氏孤弱王氏擅朝排擠宗室且嫂何與取妹披抉其閨門而殺之使者廹守主遂飮藥死况梟首於市白太后云主暴病薨太后欲臨其䘮莽固争乃止朱博字子元杜陵人也家貧少時給事縣爲亭長好客少年捕搏敢行稍遷爲功曹伉俠好交隨從士大夫不避風雨是時前將軍望之子蕭育御史大夫萬年子陳咸以公卿子著材知名博皆友之矣時諸陵縣屬太常博以太常掾察亷補安陵丞後去官入京兆歴曹史列掾出爲督郵書掾所部職辦郡中稱之而陳咸爲御史中丞坐漏泄省中語下獄博去吏閒歩至廷尉下候伺咸事咸掠治困篤博詐得爲醫入獄得見咸具知其所坐罪博出獄又變姓名爲咸證驗治數百治數百謂被笞掠也卒免咸死罪咸得論出而博以此顯名爲郡功曹乆之成帝卽位大將軍王鳳秉政奏請陳咸爲長史咸薦蕭育朱博除幕府屬鳯甚竒之舉博櫟陽令徙雲陽平陵三縣以高第入爲長安令京師治理遷冀州刺史博本武吏不更文法及爲刺史行部吏民數百人遮道自言官寺盡滿從事曰請且留此縣錄見諸自言者事畢廼發欲以觀試博博心知之告外趣駕既白駕辦博出就車見自言者使從事明勑告吏民欲言縣丞尉者刺史不察黄綬各自詣郡欲言二千石墨綬長吏者行部還詣治所其民爲吏所寃及言盜賊辭訟事各使屬其部從事博駐車決遣四五百人皆罷去如神吏民大驚不意博臨事應變乃至於此後博徐問果老從事教民聚會博殺此吏州郡畏博威嚴徙爲并州刺史䕶漕都尉遷琅邪太守齊部舒緩養名博新視事右曹掾史皆移病卧博問其故對言惶恐惶恐言畏新太守之威故事二千石新到輙遣吏存問致意乃敢起就職博奮髯抵几曰觀齊兒欲以此爲俗邪乃召見諸曹史書佐及縣大吏選視其可用者出教置之皆新補置以代移病者皆斥罷諸病吏白巾走出府門郡中大驚頃之門下掾贛遂耆老大儒教授數百人拜起舒遲博出教告主簿贛老生不習吏禮主簿且教拜起閑習乃止又勑功曹官屬多褒衣大袑音紹謂大袴也不中節度自今掾史衣皆令去地三寸博尤不愛諸生所至郡輒罷去議曹曰豈可復置謀曹邪文學儒吏時有奏記稱説云云博見謂曰如太守漢吏奉三尺律令以從事耳無柰生所言聖人道何也且持此道歸待堯舜君出爲陳説之其折逆人如此視事數年大改其俗掾史禮節如楚趙吏博治郡常令屬縣各用其豪桀以爲大吏文武從宜縣有劇賊及他非常博輒移書以詭責之其盡力有效必加厚賞懐詐不稱誅罰輒行以是豪彊慹服慹之渉反姑幕縣有羣軰八人報仇廷中皆不得長吏自繫書言府賊曹掾史自白請至姑幕事留不出功曹諸掾即皆自白復不出於是府丞詣閤博廼見丞掾曰以爲縣自有長吏府未嘗與也丞掾謂府當與之邪閤下書佐入博口占檄文曰府告姑幕令丞言賊發不得有書檄到令丞就職游徼王卿力有餘如律令王卿得勑惶怖親屬失色晝夜馳騖十餘日間捕得五人博復移書曰王卿憂公甚效檄到齎伐閲詣府部掾以下亦可用漸盡其餘矣其操持下皆此類也以高第入守左馮翊滿歲爲眞其治左馮翊文理聰明殊不及薛宣而多武譎網絡張設少愛利敢誅殺然亦縱舍時有大貸下吏以此爲盡力長陵大姓尚方禁少時嘗盜人妻見斫創著其頰府功曹受賂白除禁調守尉博聞知以他事召見視其靣果有瘢博辟左右問禁是何等創也禁自知情得叩頭服狀博笑曰大丈夫固時有是馮翊欲洒卿耻抆拭用禁能自效不禁且喜且懼對曰必死博因勑禁毋得泄語有便宜輒記言因親信之以爲耳目禁晨夜發起部中盜賊及他伏姦有功效博擢禁連守縣令久之召見功曹閉閤數責以禁等事與筆札使自記積受取一錢以上無得有所匿欺謾半言斷頭矣功曹惶怖具自疏奸臧大小不敢隱博知其對以實廼令就席受勑自改而已投刀使削所記遣出就職功曹後常戰栗不敢蹉跌博遂成就之遷爲大司農歲餘坐小法左遷犍爲太守先是南蠻若兒數爲宼盜博厚結其昆弟使爲反間襲殺之郡中清徙爲山陽太守病免官復徵爲光禄大夫遷廷尉職典決疑當讞平天下獄博恐爲官屬所誣視事召見正監典法掾史謂曰廷尉本起於武吏不通法律幸有衆賢亦何憂然廷尉治郡斷獄以來且二十年亦獨耳剽日久三尺律令人事出其中掾史試與正監共撰前世決事吏議難知者數十事持以問廷尉得爲諸君覆意之正監以爲博茍彊意未必能然即共條白焉博皆召掾史並坐而問爲平處其輕重十中八九官屬咸服博之疏略材過人也每遷徙易官所到輒出竒譎如此以明示下爲不可欺者久之遷後將軍坐與紅陽侯立相善立有罪就國有司奏立黨與博坐免後歳餘哀帝卽位起家復爲光禄大夫遷爲京兆尹數月超爲大司空初漢興襲秦官置丞相御史大夫太尉至武帝罷太尉始置大司馬以冠將軍之號非有印綬官屬也及成帝時何武爲九卿建言古者民樸事約國之輔佐必得賢聖然猶則天三光備三公官各有分職今末俗文弊政事煩多宰相之材不能及古而丞相獨兼三公之事所以久廢而不治也宜建三公官定卿大夫之任分職受政以考功效其後上以問師安昌侯張禹禹以爲然時曲陽侯王根爲大司馬驃騎將軍而何武爲御史大夫於是上賜曲陽侯根大司馬印綬置官屬罷驃騎將軍官以御史大夫何武爲大司空皆封列侯增奉如丞相以備三公官焉議者多以爲古今異制漢自天子之號下至佐吏皆不同於古而獨改三公職事難分明無益於治亂是時御史府吏舍百餘區井水俱竭又其府中列柏樹常有野烏數千棲宿其上晨去暮來號曰朝夕烏烏去不來者數月長老異之後二歳餘朱博爲大司空奏言帝王之道不必相襲各繇時務高皇帝以聖德受命建立鴻業置御史大夫位次丞相典正法度以職相參總領百官歴載二百天下安寧今更爲大司空與丞相同位未獲嘉祐故事選郡國守相高第爲中二千石選中二千石爲御史大夫任職者爲丞相位次有序所以尊聖德重國相也今中二千石未更御史大夫而爲丞相權輕非所以重國政也臣愚以爲大司空官可罷復置御史大夫遵奉舊制臣願盡力以御史大夫爲百僚率哀帝從之廼更拜博爲御史大夫會大司馬喜免以陽安侯丁明爲大司馬衛將軍置官屬大司馬冠號如故事後四歳哀帝遂改丞相爲大司徒復置大司空大司馬焉初何武爲大司空又與丞相方進共奏言古選諸侯賢者以爲州伯書曰咨十有二牧所以廣聰明燭幽隱也今部刺史居牧伯之位秉一州之統選第大吏所薦位高至九卿所惡立退任重職大春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相凖失位次之序臣請罷刺史更置州牧以應古制奏可及博復御史大夫官又奏言漢家至德溥大宇内萬里立置郡縣部刺史奉使典州督察郡國吏民安寧故事居部九歲舉爲守相其有異材功效著者輒登擢秩卑而賞厚咸勸功樂進前丞相方進奏罷刺史更置州牧秩眞二千石位次九卿九卿缺以高第補其中材則茍自守而已恐功效陵夷姦宄不禁臣請罷州牧置刺史如故奏可博爲人亷儉不好酒色游晏自微賤至富貴食不重味桉上不過三桮夜寢早起妻希見其面有一女無男然好樂士大夫爲郡守九卿賓客滿門欲仕宦者薦舉之欲報仇怨者解劔以佩之其趨事待士如是博以此自立然終用敗初哀帝祖母定陶傅太后欲求稱尊號太后從弟高武侯傅喜爲大司馬與丞相孔光大司空師丹共持正議孔鄉侯傅晏亦太后從弟讇諛欲順指會博新徴用爲京兆尹與交結謀成尊號以廣孝道繇是師丹先免博代爲大司空數燕見奏封事言丞相光志在自守不能憂國大司馬喜至尊至親阿黨大臣無益政治上遂罷喜遣就國免光爲庶人以博代光爲丞相封陽鄉侯食邑二千户博上書讓曰故事封丞相不滿千户而臣獨過制誠慙懼願還千户上許焉傅太后怨傅喜不已使孔鄉侯晏風丞相奏免喜侯博受詔與御史大夫趙元議元言事已前決得無不宜博曰已許孔鄉侯有指匹夫相要尚相得死何况至尊博唯有死耳元卽許可博惡獨斥奏喜以故大司空汜鄉侯何武前亦坐過免就國事與喜相似卽共奏喜武前在位皆無益於治雖已退免爵土之封非所當得也請皆免爲庶人上知傅太后素常怨喜疑博元承指卽召元詣尚書問狀元辭服有詔左將軍彭宣與中朝者雜問宣等劾奏博宰相元上卿晏以外親封位特進股肱大臣上所信任不思竭誠奉公務廣恩化爲百僚先皆知喜武前已䝉恩詔決事更三赦博執左道虧損上恩以結信貴戚背君鄉臣傾亂政治姦人之雄附下罔上爲臣不忠不道元知博所言非法枉義附從大不敬晏與博議免喜失禮不敬臣請詔謁者召博元晏詣廷尉詔獄制曰將軍中二千石二千石諸大夫博士議郎議右將軍蟜望等四十四人以爲如宣等言可許諫大夫龔勝等十四人以爲春秋之義姦以事君常刑不舍魯大夫叔孫僑如欲顓公室譖其族兄季孫行父於晉晉執囚行父以亂魯國春秋重而書之今晏放命圯族干亂朝政要大臣以罔上本造計謀職爲亂階宜與博元同罪罪皆不道上減元死罪三等削晏户四分之一假謁者節召丞相詣廷尉詔獄博自殺初博以御史爲丞相趙元以少府爲御史大夫並拜於前殿延登受䇿有音如鐘聲及是同敗信有祥焉翟方進字子威汝南上蔡人也家世微賤至方進父翟公好學爲郡文學方進年十二三失父廢學給事太守府爲小史號遲頓頓讀爲鈍不及事數爲掾史所詈辱方進自傷乃從汝南蔡父相問己能所宜蔡父大竒其形貎謂曰小史有封侯骨當以經術進努力爲諸生學問方進旣厭爲小史聞蔡父言心喜因病歸家辭其後母欲西至長安受經後母憐其病隨之長安織屨以給方進讀經從博士受春秋積十餘年經學明習徒衆日廣諸儒稱之乃以射䇿甲科爲郞二三歳舉明經遷議即是時宿儒有清河胡常與方進同經常爲先進名譽出方進下心害其能論議不右方進方進知之候伺常大都授時遣門下諸生至常所問大義疑難因記其説如是者久之常知方進之宗讓己内不自得其後居士大夫之間未嘗不稱述方進遂相親友河平中方進轉爲博士數年遷朔方刺史居官不煩苛所察應條輒舉甚有威名再三奏事遷爲丞相司直從上甘泉行馳道中司𨽻校尉陳慶劾奏方進没入車馬旣至甘泉宮會殿中慶與廷尉范延壽語時慶有章劾自道行事以贖論今尚書持我事來當於此決前我爲尚書時嘗有所奏事忽忘之留月餘方進於是舉劾慶奉使不謹慶坐免官會北地浩商爲義渠長所捕亡長取其母與豭猪連繫都亭下商兄弟會賔客自稱司𨽻掾長安縣尉殺義渠長妻子六人亡丞相御史請遣掾史與司𨽻校尉部刺史并力逐捕察無狀者奏可司𨽻校尉涓勲奏言春秋之義王人微者序乎諸侯之上尊王命也臣幸得奉使以督察公卿以下爲職今丞相宣請遣掾史以宰士督察天子奉使命大夫甚誖逆順之理宣本不師受經術因事以立姦威案浩商所犯一家之禍耳而宣欲專權作威乃害于乃國不可之大者願下中朝特進列侯將軍以下正國法度議者以爲丞相掾不宜移書督趣司𨽻會浩商捕得伏誅家屬徙合浦故事司𨽻校尉位在司直下初除謁兩府其有所會居中二千石前與司直並迎丞相御史初方進新視事而涓勲亦初拜司𨽻不肯謁丞相御史大夫後朝會相見禮節又倨方進陰察之勲私過光禄勲辛慶忌又出逄帝舅成都侯王商道路下車立䇓過乃就車於是方進舉奏勲吏二千石幸得奉使不遵禮儀輕謾宰相賤易上卿而又詘節失度邪讇無常色厲内荏墮國體亂朝廷之序不宜處位臣請下丞相免勲時太中大夫平當給事中奏言方進國之司直不自勑正以先羣下前親犯令行馳道中司𨽻慶平心舉劾方進不自責悔而内挾私恨伺記慶之從容語言以詆欺成罪後丞相宣以一不道賊請遣掾督趣司𨽻校尉司𨽻校尉勲自奏暴於朝廷今方進復舉奏勲議者以爲方進不以道德輔正丞相茍阿助大臣欲必勝立威宜抑絶其原勲素行公直姦人所惡可少寛假使遂其功名上以方進所舉應科不得用逆詐廢正法遂貶勲爲昌陵令方進旬歳間免兩司𨽻朝廷繇是憚之丞相宣甚器重焉常戒掾史曰謹事司直翟君必在相位不久是時起昌陵營作陵邑貴戚近臣子弟賔客多辜𣙜爲奸利者方進部掾史覆按發大姦臧數千萬上以爲任公卿欲試以治民徙方進爲京兆尹搏擊豪彊京師畏之時胡常爲青州刺史聞之與方進書曰竊聞政令甚明爲京兆能則恐有所不宜方進心知所謂其後少弛威嚴居官三歳永始二年遷御史大夫數月會丞相薛宣坐廣漢盜賊羣起及太皇太后喪時三輔吏並徴發爲姦免爲庶人方進亦坐爲京兆時奉喪事煩擾百姓左遷執金吾二十餘日丞相官缺羣臣多舉方進上亦器其能遂擢方進爲丞相封高陵侯食邑千户身旣富貴而後母尚在方進内行修飭供養甚篤及後母終旣葬三十六日除服起視事以爲身備漢相不敢踰國家之制爲相公潔請託不行於郡國持法刻深舉奏牧守九卿峻文深詆中傷者尤多如陳咸朱博蕭育逄信孫閎之屬皆京師世家以才能少歴牧守列卿知名當世而方進特立後起十餘年間至宰相據法以彈咸等皆罷退之初咸最先進自元帝初爲御史中丞顯名朝廷矣成帝初卽位擢爲部刺史歴楚國北海東郡太守陽朔中京兆尹王章譏切大臣而薦琅邪太守馮野王可代大將軍王鳯輔政東郡太守陳咸可御史大夫是時方進甫從博士爲刺史云後方進爲京兆尹咸從南陽太守入爲少府與方進厚善先是逢信已從高第郡守歴京兆太僕爲衛尉矣官簿皆在方進之右及御史大夫缺三人皆名卿俱在選中而方進得之會丞相宣有事與方進相連上使五二千石雜問丞相御史咸詰責方進冀得其處方進心恨初大將軍鳯奏除陳湯爲中郎與從事鳯薨後從弟車騎將軍音代鳯輔政亦厚湯逢信陳咸皆與湯善湯數稱之於鳯音所久之音薨鳯弟成都侯商復爲大司馬衛將軍輔政商素憎陳湯白其罪過下有司案驗遂免湯徙敦煌時方進新爲丞相陳咸内懼不安廼令小冠杜子夏往觀其意微自解説子夏既過方進揣知其指不敢發言居亡何方進奏咸與逄信邪枉貪汙營私多欲皆知陳湯姦佞傾覆利口不軌而親交賂遺以求薦舉後爲少府數饋遺湯信咸幸得備九卿不思盡忠正身内自知行辟亡功效而官媚邪臣欲以徼幸茍得亡耻孔子曰鄙夫可與事君也與哉咸信之謂也過惡暴見不宜處位臣請免以示天下奏可後二歳餘詔舉方正直言之士紅陽侯立舉咸對䇿拜爲光禄大夫給事中方進復奏咸前爲九卿坐爲貪邪免自知罪惡暴陳依託紅陽侯立徼幸有司莫敢舉奏冒濁茍容不顧耻辱不當䝉方正舉備内朝臣并劾紅陽侯立選舉故不以實有詔免咸勿劾立後數年皇太后姊子侍中衛尉定陵侯淳于長有罪上以太后故免官勿治罪有司奏請遣長就國長以金錢與立立上封事爲長求留曰陛下旣託文以太后故誠不可更有他計後長陰事遂發下獄方進劾立懷姦邪亂朝政欲傾誤要主上狡猾不道請下獄上曰紅陽侯朕之舅不忍致法遣就國於是方進復奏立黨友曰立素行積爲不善衆人所共知邪臣自結附託爲黨庶幾立與政事欲獲其利今立斥逐就國所交結尤著者不宜備大臣爲郡守案後將軍朱博鉅鹿太守孫閎故光禄大夫陳咸與立交通厚善相與爲腹心有背公死黨之信欲相攀援死而後己皆内有不仁之性而外有雋材過絶於人倫勇猛果敢處事不疑所居皆尚殘賊酷虐苛刻慘毒以立威而無纎介愛利之風天下所共知愚者猶惑孔子曰人而不仁如禮何人而不仁如樂何言不仁之人亡所施用不仁而多材國之患也此三人皆内懷姦猾國之所患而深相與結信於貴戚姦臣此國家大憂大臣所宜没身而争也昔季孫行父有言曰見有善於君者愛之若孝子之養父母也見不善者誅之若鷹鸇之逐鳥爵也翅翼雖傷不避也貴戚權黨之衆誠難犯犯之衆敵並怨善惡相冒臣幸得備宰相不敢不盡死請免博閎咸歸故郡以銷姦雄之黨絶羣邪之望奏可咸旣廢錮復徙故郡以憂死方進知能有餘兼通文法吏事以儒雅緣飾法律號爲通明相天子甚器重之奏事亡不當意内求人主微指以固其位初定陵侯淳于長雖外戚然以能謀議爲九卿新用事方進獨與長交稱薦之及長坐大逆伏誅諸所厚善皆坐長免上以方進大臣又素重之爲隱諱方進内慙上疏謝罪乞骸骨上不許乃起視事條奏長所厚善京兆尹孫寶右扶風蕭育刺史二千石已上免二十餘人其見任如此方進雖受榖梁然好左氏傳天文星陷其左氏則國師劉歆星陷則長安令田終術師也厚李尋以爲議曹爲相九歳綏和二年春熒惑守心尋奏記言應變之權君侯所自明往者數白三光垂象變動見端山川水泉反理視患民人訛謡斥事感名三者既效可爲寒心今提揚眉矢貫中狼奮角弓且張金歴庫土逆度輔湛没火守舍萬歳之期近愼朝暮上無惻怛濟世之功下無推讓避賢之效欲當大位爲具臣以全身難矣大責日加安得但保斥逐之戮闔府三百餘人唯君侯擇其中與盡節轉凶方進憂之不知所出會郞賁賁音肥姓也麗善爲星上言大臣宜當之上乃召見方進還歸未及引決上遂賜䇿令審處焉方進卽日自殺上祕之遣九卿䇿贈以丞相高陵侯印綬賜乗輿祕器少府供帳柱檻皆衣素天子親臨弔者數至禮賜異於他相故事諡曰㳟侯長子宣嗣宣字大伯亦明經篤行君子人也及方進在位爲闗都尉南郡太守少子曰義字文仲少以父任爲郞稍遷諸曹年二十出爲南陽都尉宛令劉立與曲陽侯爲婚又素著名州郡輕義年少義行太守事行縣至宛丞相史在傳舍立持酒肴謁丞相史對飮未訖會義亦往外吏白都尉方至立語言自若須臾義至内謁徑入立廼走下義既還大怒陽以他事召立至以主守盜十金賊殺不辜部掾夏恢等収縛立傳送鄧獄恢亦以宛大縣恐見簒奪白義可因隨後行縣送鄧義曰欲令都尉自送則如勿収邪載環宛市廼送吏民不敢動威震南陽立家輕騎馳從武闗入語曲陽侯曲陽侯白成帝帝以問丞相方進遣吏勑義出宛令宛令已出吏還白狀方進曰小兒未知爲吏也其意以爲入獄當輒死矣後義坐法免起家爲𢎞農太守遷河内太守青州牧所居著名有父風烈徙爲東郡太守數歲平帝崩王莽居攝義心惡之乃謂姊子上蔡陳豐曰新都侯攝天子位號令天下故擇宗室㓜稚者以爲孺子依託周公輔成王之義且以觀望必代漢家其漸可見方今宗室衰弱外無彊藩天下傾首服從莫能亢扞國難吾幸得備宰相子身守大郡父子受漢厚㤙義當爲國討賊以安社稷欲舉兵西誅不當攝者選宗室子孫輔而立之設令時命不成死國埋名猶可以不慙於先帝今欲𤼵之乃肯從我乎豐年十八勇壯許諾義遂與東郡都尉劉宇嚴鄉侯劉信信弟武平侯劉璜結謀又東郡王孫慶素有勇略以明兵法徴在京師義乃詐移書以重罪傳逮慶於是以九月都試日九月太守郡尉令長丞會都試課殿最斬觀令因勒其車騎材官士募郡中勇敢部署將帥嚴鄉侯信者東平王雲子也雲誅死信兄開明嗣爲王薨無子而信子匡復立爲王故義舉兵并東平立信爲天子義自號大司馬柱天大將軍以東平王傅蘇隆爲丞相中尉臯丹爲御史大夫移檄郡國言莽鴆殺孝平皇帝矯攝尊號今天子已立共行天罰郡國皆震比至山陽衆十餘萬莽聞之大懼乃拜其黨親輕車將軍成武侯孫建爲奮武將軍光禄勲成都侯王邑爲虎牙將軍明義侯王駿爲彊弩將軍春王城門校尉王况爲震威將軍宗伯忠孝侯劉宏爲奮衝將軍中少府建威侯王昌爲中堅將軍中郎將震羌侯竇兄兄音况爲奮威將軍凡七人自擇除闗西人爲校尉軍吏將闗東甲卒發奔命以擊義焉復以太僕武讓爲積弩將軍屯函谷闗將作大匠䝉鄉侯逯並爲横壄將軍屯武闗羲和紅休侯劉歆爲掦武將軍屯宛大保後丞丞陽侯甄邯爲大將軍丞陽侯音烝屯㶚上常鄉侯王惲爲車騎將軍屯平樂館騎都尉王晏爲建威將軍屯城北城門校尉趙恢爲城門將軍皆勒兵自備莽日抱孺子會羣臣而稱曰昔成王㓜周公攝政而管蔡挾祿父以叛今翟義亦挾劉信而作亂自古大聖猶懼此况臣莽之斗筲羣臣皆曰不遭此變不章聖德莽於是依周書作大誥遣大夫桓譚等班行告諭當反位孺子之意還封譚爲明告里附城諸將東至陳留菑與義會戰破之斬劉璜首菑故戴國屬陳留後曰考城莽大赦天下義與劉信棄軍於圉城亡至固始界中捕得義屍磔陳都市卒不得信初三輔聞翟義起自茂陵以西至汧二十三縣盜賊並發趙明霍鴻等自稱將軍攻焼官寺殺右輔都尉及斄令刼掠吏民衆十餘萬火見未央宫前殿莽晝夜抱孺子禱宗廟復拜衞尉王級爲虎賁將軍大鴻臚望鄉侯閻遷爲折衝將軍與甄邯王晏西擊趙明等正月虎牙將軍王邑等自闗東還便引兵西彊弩將軍王駿以無功免揚武將軍劉歆歸故官復以邑弟侍中王竒爲掦武將軍城門將軍趙恢爲强弩將軍中郞將李棽爲厭難將軍復將兵西二月明等殄滅諸縣悉平還師振旅莽乃置酒白虎殿勞饗將帥大封拜先是益州蠻夷及金城塞外羌反畔時州郡擊破之莽廼并錄以小大爲差封侯伯子男凡三百九十五人曰皆以奮怒東指西擊羌宼蠻盜反虜逆賊不得旋踵應時殄滅天下咸服其功封云莽於是自謂大得天人之助至其年十二月遂卽眞矣初義所収宛令劉立聞義舉兵上書願備軍吏爲國討賊内報私怨莽擢立爲陳留太守封明德侯始義兄宣居長安先義未發家數有怪夜聞哭聲聽之不知所在宣教授諸生滿堂有狗從外入齧其中庭羣鴈數十比驚救之已皆斷頭狗走出門求不知處宣大惡之謂後母曰東郡太守文仲素俶儻今數有惡怪恐有妄爲而大禍至也太夫人可歸爲棄去宣家者可以避害母不肯去言歸其本族自絶於翟氏後數月敗莽盡壞義第宅汙池之發父方進及先祖冢在汝南者焼其棺柩夷滅三族誅及種嗣至皆同阬以棘五毒并葬之而下詔曰蓋聞古者伐不敬取其䲔鯢築武軍封以爲大戮於是乎有京觀以懲滛慝廼者反虜劉信翟義誖逆作亂于東而芒竹羣盜趙明霍鴻造逆西土遣武將征討咸伏其辜惟信義等始發自濮陽結姦無鹽殄滅於圉趙明依阻槐里環隄霍鴻負倚盩厔芒竹咸用破碎亡有餘類其取反虜逆賊之䲔鯢聚之通路之旁濮陽無鹽圉槐里盩厔凡五所各方丈六高六尺築爲武軍封以爲大戮薦樹之棘建表木高丈六尺書曰反虜逆賊䲔鯢在所長吏常以秋循行勿令壞敗以懲淫惡焉初汝南舊有鴻隙大陂郡以爲饒成帝時闗東數水陂溢爲害方進爲相與御史大夫孔光共遣掾行視以爲決去陂水其地肥美省隄防費而無水憂遂奏罷之及翟氏滅鄉里歸惡言方進請陂下良田不得而奏罷陂云王莽時常枯旱郡中追怨方進童謡曰壞陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰云者兩黄鵠謂無水灌田不可秔稻但有豆芋耳兩黄鵠託言有神來告之通志巻一百二上
