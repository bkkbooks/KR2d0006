body:
  text: 通志卷一百二上宋右迪功郎鄭樵漁仲撰列傳第十五上前漢蕭望之子育由咸馮奉世子野王參逡立匡衡張禹孔光馬宮王商史丹傅喜薛宣朱博翟方進子義谷永杜鄴何武王嘉師丹揚雄蕭望之字長倩東海蘭陵人也徙杜陵家世以田為業至望之好學治齊詩事同縣后蒼且十年以令詣太常受業復事同學博士白竒又從夏侯勝問論語禮服京師諸儒稱焉是時大將軍霍光秉政長史丙吉薦儒生王仲翁與望之等數人皆召見先是左將軍上官桀與蓋主謀殺光光既誅桀等後出入自備吏民當見者露索去刀兵兩吏挾持望之獨不肯聽自引出閣曰不願見吏牽持胸胸光聞之告吏勿持望之既至前説光曰將軍以功德輔幼主將以流大化致於治平是以天下之士延頸企踵爭願自效以輔高眀今士見者皆先露索挾持恐非周公相成王躬吐握致白屋之禮於是光獨不除用望之而仲翁等皆補大將軍史三嵗間仲翁至光祿大夫給事中望之以射䇿甲科為郎署小苑東門候仲翁出入從倉頭廬兒下車趨門傳呼甚寵顧謂望之曰不肯録録反抱關為望之曰各從其志後數年坐弟犯法不得宿衛免歸為郡吏及御史大夫魏相除望之為屬察亷為大行治禮丞時大將軍光薨子禹復為大司馬兄子山領尚書親屬皆宿衛內侍地節三年夏京師雨雹望之因是上疏願賜清間之晏口陳災異之意宣帝自在民間聞望之名曰此東海蕭生邪下少府宋畸問狀無有所諱望之對以為春秋昭公三年大雨雹是時季氏專權卒逐昭公鄉使魯君察於天變宜亡此害今陛下以聖德居位思政求賢堯舜之用心也然而美祥未臻隂陽不和是大臣任政一姓擅藝之所致也附枝大者賊本心私家盛者公室危唯眀主躬萬幾選同姓舉賢材以為腹心與參政謀令公卿大臣朝見奏事眀陳其職以考功能如是則庶事理公道立姦邪塞私權廢矣對奏天子拜望之為謁者時上初即位思進賢良多上書言便宜輒下望之問狀高者請丞相御史次者中二千石試事滿歲以狀聞下者報聞或罷田里所白處奏皆可纍遷諫大夫丞相司直歲中三遷官至二千石其後霍氏竟謀反誅望之寖益任用是時選博士諫大夫通政事者補郡國守相以望之為平原太守望之雅意在本朝遠為郡守內不自得乃上疏曰陛下哀愍百姓恐德化之不究悉出諫官以補郡吏所謂憂其末而忘其本者也朝無爭臣則不知過國無逹士則不聞善願陛下選明經術溫故知新通於幾微謀慮之士以為內臣與參政事諸侯聞之則知國家納諫憂政亡有闕遺若此不怠成康之道其庶幾乎外郡不治豈足憂哉書聞徴入守少府宣帝察望之經明持重論議有餘材任宰相𣣔詳試以政事復以為左馮翊望之從少府出為左遷恐有不合意即移病上聞之使侍中成都侯金安上諭指曰所用皆更治民以考功君前為平原太守日淺故復試之於三輔非有所聞也望之即視事是歲西羌反漢遣後將軍征之京兆尹張敞上書言國兵在外軍以夏發隴西以北安定以西吏民並給轉輸田事頗廢素無餘積雖羌虜以破來春民食必乏窮辟之處買無所得縣官榖度不足以振之願令諸有罪非盜受賕殺人及犯法不得赦者皆得以差入榖此八郡贖罪務益致榖以豫偹百姓之急事下有司望之與少府李強議以為民函隂陽之氣有仁義欲利之心在教化之所助堯在上不能去民欲利之心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分在於義利而已道民不可不慎也今欲令民量粟以贖罪如此則富者得生貧者獨死是貧富異刑而法不一也人情貧窮父兄囚執聞出財得以生活為人子弟者將不顧死亡之患敗亂之行以赴財利求救親戚一人得生十人以喪如此伯夷之行壞公綽之名滅政教一傾雖有周召之佐恐不能復古者藏富於民不足則取有餘則與詩曰爰及矜人哀此鰥寡上惠下也又曰雨我公田遂及我私下急上也今有西邉之役民失作業雖户賦口斂以贍其困乏古之通義百姓莫以為非以死救生恐未可也陛下布德施教教化既成堯舜亡以加也今議開利路以傷既成之化臣竊痛之於是天子復下其議兩府丞相御史以難問張敞敞曰少府左馮翊所言常人之所守耳昔先帝征四夷兵行三十餘年百姓猶不加賦而軍用給今羌虜一隅小夷跳梁於山谷間但令罪人出財減罪以誅之其名賢於煩擾良民橫興賦斂也又諸盜及殺人犯不道者百姓所疾苦也皆不得贖首匿見知縱所不當得為之屬議者或頗言其法可蠲除今因此令贖其便眀甚何化之所亂甫刑之罰小過赦薄罪贖有金選之品所從來久矣何賊之所生敞偹皂衣二十餘年嘗聞罪人贖矣未聞盜賊起也竊憐涼州被寇方秋饒時民尚有飢乏病死於道路况至來春將大困乎不早慮所以振救之䇿而引常經以難恐後為重責常人可與守經未可與權也敞幸得偹列卿以輔兩府為職不敢不盡愚望之強復對曰先帝聖德賢良在位作憲垂法為無窮之規永惟邉竟之不贍故金布令甲曰邉郡數被兵離飢寒夭絶天年父子相失令天下供給其費固為軍旅卒暴之事也聞天漢四年常使死罪人入五十萬錢減死罪一等豪強吏民請奪假貸至為盜賊以贖罪其後姦邪暴橫群盜並起至攻城邑殺郡守充滿山谷吏不能禁眀詔遣繡衣使者以興兵擊之誅者過半然後衰止愚以為此死罪贖之敗也故曰不便時丞相魏相御史大夫丙吉亦以為羌虜且破轉輸略足相給遂不施敞議望之為左馮翊三年京師稱之遷大鴻臚先是烏孫昆彌翁靡因長羅侯常惠上書願以漢外孫元貴靡為嗣得復尚少主結婚內附畔去胸奴詔下公卿議望之以為烏孫絶域信其美言萬里結婚非長䇿也天子不聼神爵二年遣長羅侯惠使送公主配元貴靡未出塞翁歸靡死其兄子狂王背約自立惠從塞下上書願留少主敦煌郡惠至烏孫責以負約因立元貴靡還迎少主詔下公卿議望之復以為不可烏孫持兩端亡堅約其效可見前少主在烏孫四十餘年恩愛不親密邊境未以安此已事之驗也今少主以元貴靡不得立而還信無負于四夷此中國之大福也少主不止徭役將興其原起此天子從其議徴少主還後烏孫雖分國兩立以元貴靡為大昆彌漢遂不復與結婚三年代丙吉為御史大夫五鳯中胸奴大亂議者多曰胸奴為害日久可因其壞亂舉兵滅之詔遣中朝大司馬車騎將軍韓增諸吏富平侯張延夀光祿勳楊惲太僕戴長樂問望之計䇿望之對曰春秋晉士丐帥師侵齊聞齊侯卒引師而還君子大其不伐喪以為恩足以服孝子誼足以動諸侯前單于慕化向善稱弟遣使請求和親海內欣然夷狄莫不聞未終奉約不幸為賊臣所殺今而伐之是乘亂而幸災也彼必奔走逺遁不以義動兵恐勞而無功宜遣使者弔問輔其微弱救其災患四夷聞之咸貴中國之仁義如遂蒙恩得復其位必稱臣服從此德之盛也上從其議後竟遣兵護輔呼韓邪單于定其國是時大司農耿夀昌奏設常平倉上善之望之非夀昌丞相丙吉年老上重焉望之又奏言百姓困乏盜賊未止二千石多材下不任職三公非其人則三光為之不眀今首歲日月少光咎在臣等上以望之意輕丞相乃下侍中建章衛尉金安上光祿勳楊惲御史中丞王忠并詰問望之望之免冠置對天子繇是不説後丞相司直繁音婆延夀奏侍中謁者良使丞制詔望之望之再拜已良與望之言望之不起因故下手而謂御史曰良禮不偹故事丞相病明日御史大夫輒問病朝奏事會庭中差居丞相後丞相謝大夫少進揖今丞相數病望之不問病會庭中與丞相鈞禮時議事不合意望之曰侯年寧能父我邪知御史有令不得擅使望之多使守史自給車馬之杜陵護視家事少史冠法冠為妻先引又使賣買私所附益凡十萬三千案望之大臣通經術居九卿之右本朝所仰至不奉法自修踞慢不遜讓受所監贓二百五十以上請逮捕繫治上於是䇿免望之左遷為太子太傅望之既左遷而黃霸代為御史大夫數月間丙吉薨霸為丞相霸薨于定國代焉望之遂見廢不得相為太傅以論語禮服授皇太子初胸奴呼韓邪單于來朝詔公卿議其儀丞相霸御史大夫定國議曰聖王之制施德行禮先京師而後諸夏先諸夏而後夷狄其禮儀宜如諸侯王位次在下望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上外夷稽首稱藩中國讓而不臣此則羈縻之誼謙亨之福也天子采之詔以客禮待單于位在諸侯王上贊謁稱臣而不名及宣帝寢疾選大臣可屬者引外屬侍中樂陵侯史高太子太傅望之少傅周堪至禁中拜高為大司馬車騎將軍望之為前將軍光祿勳堪為光祿大夫皆受遺詔輔政領尚書事宣帝崩太子襲尊號是為孝元帝望之堪本以師傅見尊重上即位數燕見言治亂陳王事望之選白宗室眀經逹學散騎諫大夫劉更生給事中與侍中金敞並拾遺左右四人同心謀議勸道上以古制多所欲匡正上甚鄉納之初宣帝不甚從儒術任用法律而中書宦官用事中書令𢎞恭石顯久典樞機眀習文法亦與車騎將軍高為表裏論議常獨持故事不從望之等恭顯又時傾仄見詘望之以為中書政本宜以賢眀之選自武帝遊燕後庭故用宦者非國舊制又違古不近刑人之義白欲更置士人由是大與高恭顯忤上初即位謙讓重改作議久不定出劉更生為宗正望之堪數薦名儒茂材以偹諫官會稽鄭朋隂欲附望之上疏言車騎將軍髙遣客為姦利郡國及言許史子弟罪過章視周堪堪白令朋待詔金馬門朋奏記望之勉以周召之事望之見納朋接待以意朋數稱述望之短車騎將軍言許史過失後朋行傾邪望之絶不與通朋與大司農史李宮俱待詔堪獨白宮為黃門郎朋楚士怨恨更求入許史推所言許史事曰皆周堪劉更生教我我關東人何以知此於是侍中許章白見朋朋出揚言曰我見言前將軍小過五大過一中書令在旁知我言狀望之聞之以問𢎞恭石顯顯恭恐望之自訟下於他吏即挾朋及待詔華龍華龍者宣帝時與張子蟜等待詔以行汙穢不進欲入堪等堪等不納故與朋相結恭顯令二人告望之等謀欲罷車騎將軍疏退許史狀候望之出休日令朋龍上之事下𢎞恭問狀望之對曰外戚在位多奢淫欲以匡正國家非為邪也恭顯奏望之堪更生朋黨相稱舉數譖訴大臣毁離親戚欲以專權擅藝為臣不忠誣上不道請謁者召致廷尉時上初即位不省謁者召致廷尉為下獄也可其奏後上召堪更生曰繫獄上大驚曰非但廷尉問邪以責恭顯皆叩頭謝上曰令出視事恭顯因使高言上新即位未以德化聞於天下而先驗師傅既下九卿大夫獄宜因決免於是制詔丞相御史前將軍望之傅朕八年無他罪過今事久遠識忘難明其赦望之罪收前將軍光祿勳印綬及堪更生皆免為庶人而朋為黃門郎後數月制詔御史國之將興尊師而重傅故前將軍望之傅朕八年道以經術厥功茂焉其賜望之爵關內侯食邑六百户給事中朝朔望坐次將軍天子方倚欲以為丞相會望之子散騎中郎伋上書訟望之前事事下有司復奏望之前所坐眀白無譖訴者而教子上書稱引亡辜之詩失大臣體不敬請逮捕恭顯等知望之素髙節不詘辱建白望之前為將軍輔政欲排退許史專權擅朝幸得不坐復賜爵邑與聞政事不悔過服罪深懷怨望教子上書歸非於上自以託師傅懷終不坐非頗詘望之於牢獄塞其怏怏心則聖朝亡以施恩厚上曰蕭太傅素剛安肯就吏顯等奏曰人命至重望之所坐語言薄罪必無所憂上乃可其奏顯等封以付謁者敕令召望之手付因令太常急發執金吾車騎馳圍其第使者至召望之望之欲自殺其夫人止之以為非天子意望之以問門下生朱雲雲者好節士勸望之自裁於是望之仰天歎曰吾嘗偹位將相年踰六十矣老入牢獄茍求生活不亦鄙乎字謂雲曰遊趣和藥來無久留我死竟飲鴆自殺天子聞之驚拊手曰曩固疑其不就牢獄果然殺吾賢傅是時太官方上晝食上乃郤食為之涕泣哀慟左右於是召顯等責問以議不詳皆免冠謝良久然後已望之有罪死有司請絶其爵邑有詔加恩長子伋嗣為關內侯天子追念望之不忘每歲時遣使者祠祭望之冢終元帝之世望之八子至大官者育咸由育字次君少以父任為太子庶子元帝即位為郎病免後為御史大將軍王鳯以育名父子著材能除為功曺遷謁者使胸奴副校尉後為茂陵令會課育第六而漆令郭舜殿見責問育為之請扶風怒曰君課第六裁自脫何暇欲為左右言及罷出傳召茂陵令詣後曺當以職事對育徑出曹書佐隨牽育育案佩刀曰蕭育杜陵男子何詣曹也遂趨出欲去官眀旦詔召入拜為司𨽻校尉育過扶風府門官屬掾史數百人拜謁車下後坐失大將軍指免官復為中郎將使胸奴歷冀州青州兩部刺史長水校尉泰山太守入守大鴻臚以鄠名賊梁子政阻山為害久不伏辜育為右扶風數月盡誅子政等坐與定陵侯淳于長厚善免官哀帝時南郡江中多盜賊拜育為南郡太守上以育耆舊名臣乃以三公使車載育入殿中受䇿加賜黃金二十斤育至南郡盜賊靜病去官起家復為光祿大夫執金吾以夀終於官育為人嚴猛尚威居官數免稀遷少與陳咸朱博為友著聞當世往者有王陽貢公故長安語曰蕭朱結綬王貢彈冠言其相薦逹也始育與陳咸俱以公卿子顯名咸最先進年十八為左曹二十餘御史中丞時朱博尚為杜陵亭長為咸育所攀援入王氏後遂並歷刺史郡守相及為九卿而博先至將軍上卿歷位多於咸育遂至丞相育與博後有隙不能終故世以交為難咸字仲為丞相史舉茂材好畤令遷淮陽泗水內史張掖𢎞農河東太守所居有迹數增秩賜金後免官復為越騎校尉護軍都尉中郎將使胸奴至大司農終官由字子驕為丞相西曹衛將軍掾遷謁者使胸奴副校尉後舉賢良為定陶令遷太原都尉安定太守治郡有聲多稱薦者初哀帝為定陶王時由為定陶令失王指頃之制書免由為庶人哀帝崩為復土校尉京輔左輔都尉遷江夏太守平江賊成重等有功增秩為陳留太守元始中作眀堂辟雍大朝諸侯徴由為大鴻臚會病不及賔贊還歸故官病免復為中散大夫終官家至吏二千石者六七人馮奉世字子眀上黨潞人也徙杜陵其先馮亭為韓上黨守秦攻上黨絶太行道韓不能守馮亭乃入上黨城守於趙趙封馮亭為華陽君與趙將括拒秦戰死於長平宗族由是分散或留潞或在趙在趙者為官帥將官帥將子為代相及秦滅六國而馮亭之後馮毋擇馮去疾馮劫皆為秦將相焉漢興文帝時馮唐顯名即代相子也至武帝末奉世以良家子選為即昭帝時以功次補武安長失官年三十餘矣乃學春秋涉大義讀兵法前將軍韓增奏以為軍司空令本始中從軍擊胸奴軍罷復為即先是時漢數出使西域多辱命不稱或貪汙為外國所苦是時烏孫大有擊胸奴之功而西域諸國新輯漢方善遇欲以安之選可使外國者前將軍韓增舉奉世以衛候使持節送大宛諸國客至伊修城都尉宋將言莎車與旁國共攻殺漢所置莎車王萬年并殺漢使者奚充國時胸奴又發兵攻車師城不能下而去莎車遣使揚言北道諸國已屬胸奴矣於是攻劫南道與歃盟畔漢從鄯善以西皆絶不通都護鄭吉校尉司馬意皆在北道諸國間奉世與其副嚴昌計以為不亟擊之則莎車日強其藝難制必危西域遂以節告諭諸國王因發其兵南北道合萬五千人進擊莎車攻拔其城莎車王自殺傳其首詣長安諸國悉平威振西域奉世乃罷兵以聞宣帝召見韓增曰賀將軍所舉得其人奉世遂西至大宛大宛聞其斬莎車王敬之異於他使得其名馬象龍而還馬形似龍上甚悅下議封奉世丞相將軍皆曰春秋之義大夫出疆有可以安國家者專之可也奉世功效尤著宜加爵土之賞少府蕭望之獨以奉世奉使有指而擅矯制違命發諸國兵雖有功效不可以為後法即封奉世開後奉使者利以奉世為比爭逐發兵要功萬里之外為國家生事於夷狄漸不可長奉世不宜受封上善望之議以奉世為光祿大夫水衡都尉元帝即位為執金吾上郡屬國歸義降胡萬餘人反去初昭帝末西河屬國胡伊酋若王亦將衆數千人畔奉世輒持節將兵追擊右將軍典屬國常惠薨奉世代為右將軍典屬國加諸吏之號數歲為光祿勳永光二年秋隴西羌彡姐旁種反彡所亷反姐音紫詔召丞相韋元成御史大夫鄭𢎞大司馬車騎將軍王接左將軍許嘉右將軍奉世入議是時歲比不登京師榖石二百餘邉郡四百關東五百四方飢饉朝廷方以為憂而遭羌變元成等漠然莫有對者奉世曰羌虜近在境內背畔不以時誅無以威制遠蠻臣願帥師討之上問用兵之數對曰臣聞善用兵者役不再興糧不三載故師不久暴而天誅亟決往者數不料敵而師至於折傷再三發軵軵而隴反推也淮南子曰內郡軵車而餉則曠日煩費威武虧矣今反虜無慮三萬人法當倍用六萬人然羌戎弓矛之兵耳器不犀利可用四萬人一月足以決丞相御史兩將軍皆以為民方收斂時未可多發萬人屯守之且足奉世曰不可天下被飢饉士馬羸耗守戰之偹久廢不簡夷狄皆有輕邊吏之心而羌首難今以萬人分屯數處虜見兵少必不畏懼戰則挫兵病師守則百姓不救如此怯弱之形見羌人乘利諸種並和相扇而起臣恐中國之役不得止於四萬非財幣所能解也故少發師而曠日與一舉而疾決利害相萬也固爭之不能得有詔益二千人於是遣奉世將萬二千人騎以將屯為名典屬國任立護軍都尉韓昌為偏裨到隴西分屯三處典屬國為右軍屯白石護軍都尉為前軍屯臨洮奉世為中軍屯首陽西極上前軍到降同陂先遣校尉在前與羌爭地利又别遣校尉救民於廣陽谷羌虜盛多皆為所破殺兩校尉奉世具上地形部衆多少之計願益三萬六千人乃足以決事書奏天子大為發兵六萬餘人拜太常弋陽侯任千秋為奮武將軍以助焉奉世上言願得其衆不須煩大將因陳轉輸之費上於是以璽書勞奉世且讓之曰兵法大將軍出必有偏裨所以揚武威參計䇿將軍又何疑焉夫愛吏士得衆心舉而無悔禽敵必全將軍之職也若乃轉輸之費則有司存將軍勿憂須奮武將軍兵到合擊羌虜十月兵至隴西十一月並進羌虜大破斬首數千級餘皆走出塞兵未決間漢復發募士萬人拜定襄太守韓安國為建威將軍未進聞羌破還上曰羌虜破散創艾亡逃出塞其罷吏士頗留屯田偹要害處眀年二月奉世還京師更為左將軍光祿勳如故其後録功拜爵下詔曰羌虜桀黠賊害吏民攻隴西府寺燔燒置亭絶道橋甚逆天道左將軍光祿勳奉世前將兵征討斬捕首虜八千餘級鹵馬牛羊以萬數賜奉世爵關內侯食邑五百户黃金六十斤裨將校尉三十餘人皆拜後歲餘奉世病卒居爪牙官前後十年為折衝宿將功名次趙充國奮武將軍任千秋者其父宮昭帝時以丞相徴事捕斬反者左將軍上官桀封侯宣帝時為太常薨千秋嗣後復為太常成帝時樂昌侯王商代奉世為左將軍而千秋為右將軍後亦為左將軍子孫傳國至王莾乃絶云奉世死後二年西域都護甘延夀以誅郅支單于封為列侯時丞相匡衡亦用延夀矯制生事據蕭望之前議以為不當封而議者咸美其功上從衆而侯之於是杜欽上疏追訟奉世前功宜蒙見録願下有司議上以先帝時事不復録奉世有子男九人女四人長女媛以選充後宮為元帝昭儀産中山孝王元帝崩媛為中山太后隨王就國奉世長子談太常舉孝亷為即功次補天水司馬奉世擊西羌談為校尉隨父從軍有功未拜病死談弟野王逡立參至大官野王字君卿受業博士通詩少以父任為太子中庶子年十八上書願試守長安令宣帝竒其志問丞相魏相相以為不可許後以功次補當陽長遷為櫟陽令徙夏陽令元帝時遷隴西太守以治行高入為左馮翊歲餘而池陽令並素行貪汙輕野王外戚年少治行不改野王部督郵掾祋祤趙都案驗得其主守盜十金罪收捕並不首吏都格殺並並家上書陳寃事下廷尉都詣吏自殺以眀野王京師稱其威信遷為大鴻臚數年御史大夫李延夀病卒在位多舉野王上使尚書選第中二千石而野王行能第一上曰吾用野王為三公後世必謂我私後宮親屬以野王為比乃下詔曰剛強堅固確然無欲大鴻臚野王是也心辨善辭可使四方少府五鹿充宗是也亷潔節儉太子少傅張談是也其以少傅為御史大夫上繇下第而用談越次避嫌不用野王以昭儀兄故也野王乃歎曰人皆以女寵貴我兄弟獨以賤野王雖不為三公甚見器重有名當世成帝立有司奏野王王舅不宜偹九卿以秩出為上郡太守加賜黃金百斤朔方刺史蕭育奏封事薦言野王行能髙妙內足以圖身外足以慮化竊惜野王懷國之寶而不得陪朝廷與朝者並野王前以王舅出以賢復入眀國家樂進賢也上自為太子時聞知野王會其病免復以故二千石使行河隄因拜為琅琊太守是時帝長舅陽平侯王鳯為大司馬大將軍輔政八九年矣時數有災異京兆尹王章譏鳯專權不可任用薦野王代鳯上初納其言而後誅章語在元后傳於是野王懼不自安遂病滿三月賜告與妻子歸杜陵就醫藥大將軍鳯諷御史中丞劾奏野王賜告飬病而私自便持虎符出界歸家奉詔不敬杜欽時在大將軍幕府欽素高野王父子行能奏記於鳯為野王言曰竊見令曰吏二千石告過長安謁不分别豫賜今有司以為豫告得歸賜告不得是一律兩科失省刑之意夫三最豫告令也病滿三月賜告詔恩也令告則得詔恩則不得失輕重之差又二千石病賜告得歸有故事不得去郡亡著令傳曰賞疑從豫所以廣恩勸功也罷疑從去所以慎刑闕難知也今釋令與故事而假不敬之法甚違闕疑從去之意即以二千石守千里之地任兵馬之重不重去郡將以制刑為後法者則野王之罪在未制令前也刑賞大信也不可不慎鳯不聼竟免野王郡國二千石病賜告不得歸家自此始初野王嗣父爵為關內侯免歸數年年老終于家子座嗣爵至孫坐中山太后事絶逡字子産通易太常察孝亷為即補謁者建昭中選為復土校尉光祿勳于永舉茂材為美陽令功次遷長樂屯衛司馬清河都尉隴西太守治行亷平年四十餘卒為都尉時言河隄方略有足稱者立字聖卿通春秋以父任為即稍遷諸曹竟寧中以王舅出為五原屬國都尉數年遷五原太守徙西河上郡立居職公亷治行略與野王相似而多知有恩貸好為條教吏民嘉美野王立相代為太守歌之曰大馮君小馮君兄弟繼踵相因循聰眀賢知惠吏民政如魯衛德化鈞周公康叔猶二君後遷為東海太守下溼病痺天子聞之徙立為太原太守更歷五郡所居有迹年老卒官參字叔平學通尚書少為黃門郎給事中宿衛十餘年參為人矜嚴好修容儀進退恂恂甚可觀也參昭儀少弟行又敕偹以嚴見憚終不得親近侍帷幄竟寧中以王舅出補渭陵食官令以數病徙為寢中即有詔勿事陽朔中中山王來朝參擢為上河農都尉病免官復為渭陵寢中即永始中超遷代郡太守以邉郡道遠徙為安定太守數歲病免復為諫大夫使領護左馮翊都水綏和中立定陶王為皇太子以中山王見廢故封王舅參為宜卿侯以慰王意參之國上書願至中山見王太后行未到而王薨王病時上奏願貶參爵以關內侯食邑留長安上憐之下詔曰中王孝王短命早薨願以舅宜鄉侯參為關內侯歸家朕甚愍之其還參京師以列侯奉朝請五侯皆敬憚之丞相翟方進亦甚重焉數謂參物禁太甚君侯以王舅見廢不得在公卿位今五侯至尊貴也與之並列宜少詘節卑體視有所宗而君侯盛修容貌以威嚴加之此非所以下五侯而自益者也參性好禮儀終不改其恆操頃之哀帝即位帝祖母傅太后用事追怨參姊中山太后陷以祝詛大逆之罪語在外戚傳參以同産當相坐謁者承制召參詣廷尉參自殺且死仰天歎曰參父子兄弟皆偹大位身至封侯今被惡名而死姊弟不敢自惜傷無以見先人于地下死者十七人衆莫不憐之宗族徙歸故郡匡衡字稚圭東海承人也父世農夫至衡好學家貧庸作以供資用尤精力過絶人諸儒為之語曰無説詩匡鼎來匡説詩解人頤衡射䇿甲科以不應令除為太常掌故調補平原文學學者多上書薦衡經眀當世少雙今為文學就官京師後進皆欲從衡平原衡不宜在遠方事下太子太傅蕭望之少府梁邱賀問衡對詩諸大義其對深美望之奏衡經學精習説有師道可觀覽宣帝不甚用儒遣衡歸官而皇太子見衡對私善之會宣帝崩元帝初即位樂陵侯史高以外屬為大司馬車騎將軍領尚書事前將軍蕭望之為副望之名儒有師傅舊恩天子任之多所貢薦高充位而已與望之有隙長安令楊興説髙曰將軍以親戚輔政貴重於天下無二然衆庶論議令問休譽不專在將軍者何也彼誠有所聞也以將軍之幕府海內莫不卬望而所舉不過私門賔客乳母子弟人情忽不自知然一夫竊議語流天下夫富貴在身而列士不譽是有狐白之裘而反衣之也古人病其若此故卑體勞心以求賢為務傳曰以賢難得之故因曰事不待賢以食難得之故而曰飽不待食惑之甚者也平原文學匡衡材智有餘經學絶倫但以無階朝廷故隨牒在遠方將軍誠召置幕府學士歙然歸仁與參事議觀其所有貢之朝廷必為國器以此顯示衆庶名流於世髙然其言辟衡為議曹史薦衡於上上以為即中遷博士給事中是時有日食地震之變上問以政治得失衡上疏曰臣聞五帝不同禮三王各異教民俗殊務所遇之時異也陛下躬聖德開太平之路閔愚吏民觸法抵禁比年大赦使百姓得改行自新天下幸甚臣竊見大赦之後姦邪不為衰止今日大赦眀日犯法相隨入獄此殆𨗳之未得其務也蓋保民者陳之以德義示之以好惡觀其失而制其宜故動之而和綏之而安今天下俗貪財賤義好聲色上侈靡亷耻之節薄淫辟之意縱綱紀失序疏者踰內親戚之恩薄婚姻之黨隆茍合徼幸以身設利不改其原雖歲赦之刑猶難使錯而不用也臣愚以為宜一曠然大變其俗孔子曰能以禮讓為國乎何有朝廷者天下之楨幹也公卿大夫相與循禮恭讓則民不爭好仁樂施則下不暴上義髙節則民興行寬柔和惠則衆相愛四者眀王之所以不嚴而成化也何者朝有變色之言則下有爭鬭之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之民此其本也今俗吏之治皆不本禮讓而上克暴或忮害好陷人於罪貪財而慕藝故犯法者衆姦邪不止雖嚴刑峻法猶不為變此非其天性有由然也臣竊考國風之詩周南召南被賢聖之化深故篤於行而亷於色鄭伯好勇而國人暴虎秦穆貴信而士多從死陳夫人好巫而民淫祀晉侯好儉而民畜聚大王躬仁邠國貴恕由此觀之治天下者審所上而已今之偽薄忮害不讓極矣臣聞教化之流非家至而人説之也賢者在位能者在職朝廷崇禮百僚敬讓道德之行由內及外自近者始然後民知所法遷善日進而不自知是以百姓安隂陽和神靈應而嘉祥見詩曰商邑翼翼四方之極夀考且寧以保我後生此成湯所以建至治保子孫化異俗而懷鬼方也今長安天子之都親承聖化然其習俗無以異於逺方郡國來者無所法則或見侈靡而放效之此教化之原本風俗之樞機宜先正者也臣聞天人之際精祲有以相蕩善惡有以相推事作乎下者象動乎上隂陽之理各應其感隂變則靜者動陽蔽則眀者暗水旱之災隨類而至今關東連年飢饉百姓乏困或至相食此皆生於賦斂多民所共者大而吏安集之不稱之效也陛下祗畏天戒哀閔元元大自減損省甘泉建章宮衛罷珠崖偃武行文將欲度唐虞之隆絶殷周之衰也諸見罷珠崖詔書者莫不欣欣人自以將見太平也宜遂減宮室之度省靡麗之飾考制度修外內近忠正遠巧佞放鄭衛進雅頌舉異材開直言任溫良之人退刻薄之吏顯潔白之士昭無欲之路覽六藝之意察上世之務眀自然之道博和睦之化以崇至仁匡失俗易民視令海內昭然咸見本朝之所貴道德𢎞於京師淑問揚乎疆外然後大化可成禮讓可興也上説其言遷衡為光祿大夫太子少傅時上好儒術文辭頗改宣帝之政言事者多進見人人自以為得上意又傅昭儀及子定陶王愛幸寵於皇后太子衡復上疏曰臣聞治亂安危之機在乎審所用心蓋受命之王務在創業垂統傳之無窮繼體之君心存於承宣先王之德而褒大其功昔者成王之嗣位思述文武之道以飬其心休烈美盛皆歸之二后而不敢專其名是以上天歆享鬼神祐焉其詩曰念我皇祖陟降廷止言成王常思祖考之業而鬼神祐助其治也陛下聖德天覆子愛海內然隂陽未和姦邪未禁者殆論議者未丕掦先帝之盛功爭言制度不可用也務變更之所更或不可行而復復之是以羣下更相是非吏民無所信臣竊恨國家釋樂成之業而虛為此紛紛也願陛下詳覽統業之事留神於遵制揚功以定羣下之心大雅曰無念爾祖聿修厥德孔子著之孝經首章蓋至德之本也傳曰審好惡理情性而王道畢矣能盡其性然後能盡人物之性能盡人物之性可以贊天地之化治性之道必審己之所有餘而強其所不足蓋聰眀疏通者戒於太察寡聞少見者戒於雍蔽勇猛剛強者戒於太暴仁愛溫良者戒於無斷湛靜安舒者戒於後時廣心浩大者戒於遺忘必審己之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進唯陛下戒所以崇聖德臣又聞室家之道修則天下之理得故詩始國風禮本冠婚始乎國風原情性而眀人倫也本乎冠婚正基兆而防未然也福之興莫不本乎室家室家之道衰莫不本乎梱內故聖王必慎妃后之際别適長之位禮之於內也卑不踰尊新不先故所以統人情而理隂氣也其尊適而卑庶也適子冠乎阼禮之用醴衆子不得與列所以貴正體而眀嫌疑也非虛加其禮文而已乃中心與之殊異故禮探其情而見之外也聖人動靜遊燕所親物得其序得其序則海內自修百姓從化如當親者疏當尊者卑則佞巧之姦因時而動以亂國家故聖人慎防其端而禁於未然不以私恩害公義陛下聖德純偹莫不修正則天下無為而治詩云于以四方克定厥家傳曰正家而天下定矣衡為少傅數年數上疏陳便宜及朝廷有政議傅經以對言多法義上以為任公卿由是為光祿勳御史大夫建昭三年代韋元成為丞相封樂安侯食邑六百户元帝崩成帝即位衡上疏戒妃匹勸經學及朝饗羣臣威儀之則上敬納其言頃之衡復奏正南北郊罷諸淫祀皆可采用初元帝時中書令石顯用事自前相韋元成及衡皆畏顯不敢失其意至成帝初即位衡乃與御史大夫甄談共奏顯追條其舊惡并及黨與於是司𨽻校尉王尊劾奏衡談居大臣位知顯等專權藝作威福為海內患害不以時白奏行罰而阿諛曲從附下罔上無大臣輔政之義既奏顯等不自陳不忠之罪而反揚著先帝任用傾覆之徒罪至不道有詔勿劾衡慙懼上疏謝罪因稱疾乞骸骨上丞相樂安侯印綬詔報不許衡起視事上以新即位褒優大臣然羣下多是王尊者衡默默不自安每有風雨水旱不時連乞骸骨讓位上輒以詔書慰撫不許久之衡子昌為越騎校尉醉殺人繫詔獄越騎官屬與昌弟且謀篡昌事發覺衡免冠徒跣待罪天子使謁者詔衡冠履而有司奏衡專地盜土衡竟坐免初衡封僮之樂安鄉鄉本田提封三千一百頃南以閩佰為界初元元年郡圖誤以閩佰為平陵佰積十餘歲衡封臨淮郡遂封真平陵佰以為界多四百頃至建始元年郡乃定國界上計簿更定圖言丞相府衡謂所親吏趙殷曰主簿陸賜故居奏曹習事曉知國界署集曹掾眀年治計時衡問殷國界事曹欲奈何殷曰賜以為舉計令郡實之恐郡不肯從實可令家丞上書衡曰顧當得不耳何至上書亦不告曹使舉也聼曹為之後賜與屬眀舉計曰案故圖樂安鄉南以平陵佰為界不足故而以閩佰為界解何郡即復以四百頃付樂安國衡遣從史之僮收取所還田租榖千餘石入衡家司𨽻校尉駿少府忠行廷尉事劾奏衡監臨盜所主守直十金以上春秋之義諸侯不得專地所以一統尊法制也衡位三公輔國政領計簿知郡實正國界計簿已定而背法制專地盜土以自益及賜眀阿承衡意猥舉郡計亂減縣界附上罔下擅以地附益大臣皆不道於是上可其奏勿治丞相免為庶人終於家子咸亦眀經歷位九卿家世多為博士者張禹字子文河內軹人也至禹父徙家蓮勺蓮勺音輦酌禹為兒數隨家至市喜觀於卜相者前久之頗曉其别蓍布卦意時從旁言卜者愛之又竒其靣貌謂禹父曰是兒多知可令學經及禹壯至長安學從沛郡施讐受易琅琊王陽膠東庸生問論語既皆明習有徒衆舉為郡文學甘露中諸儒薦禹有詔太子太傅蕭望之問禹對易及論語大義望之善焉奏禹經學精習有師法可試事奏寢罷歸故官久之試為博士初元中立皇太子而博士鄭寬中以尚書授太子薦言禹善論語詔令禹授太子論語由是遷光祿大夫數歲出為東平內史元帝崩成帝即位徴禹寬中皆以師賜爵關內侯寬中食邑八百户禹六百户拜為諸吏光祿大夫秩中二千石給事中領尚書事是時帝長舅陽平侯王鳯為大將軍輔政專權而上富於春秋謙讓方鄉經學敬重師傅而禹與鳯並領尚書內不自安數稱病上書乞骸骨欲退避鳯上詔報不許加賜黃金百斤飬牛上尊酒太官致餐侍醫視病使者臨問禹惶恐復起視事河平四年代王商為丞相封安昌侯為相六歲鴻嘉元年以老病乞骸骨上加優再三乃聼許賜安車駟馬黃金百斤罷就第以列侯朝朔望位特進見禮如丞相置從事史五人益封四百户天子數加賞賜前後數千萬禹為人謹厚內殖貨財家以田為業及富貴多買田至四百頃皆涇渭溉灌極膏腴上賈他財物稱是禹性習知音聲內奢淫身居大第後堂理絲竹管絃禹成就弟子尤著者淮陽彭宣至大司空沛郡戴崇至少府九卿宣為人恭儉有法度而崇愷悌多智二人異行禹心親愛崇敬宣而疏之崇每候禹常責師宜置酒設樂與弟子相娛禹將崇入後堂飲食婦女相對優人管絃鏗鏘極樂昏夜乃罷而宣之來也禹見之於便坐講論經義日晏賜食不過一肉巵酒相對宣未嘗得至後堂及兩人皆聞知各自得也禹年老自治冢塋起祠室好平陵肥牛亭部處地又近延陵奏請求之上以賜禹詔令平陵徙亭他所曲陽侯根聞而爭之此地當平陵寢廟衣冠所出遊道禹為師傅不遵謙讓至求衣冠所遊之道又徙壞舊亭重非所宜孔子稱賜愛其羊我愛其禮宜更賜禹他地根雖為舅上敬重不如禹根言雖切猶不見從卒以肥牛亭地賜禹根由是害禹寵數毁惡之天子愈益敬厚禹禹每病輒以起居聞車駕自臨問之上親拜禹牀下禹頓首謝恩歸誠因言老臣有四男一女愛女甚於男遠嫁為張掖太守蕭咸妻不勝父子私情思與相近上即時徙咸為𢎞農太守又禹小子未有官上臨候禹禹數視其小子上即禹牀下拜為黃門郎給事中禹雖家居以特進為天子師國家每有大政必與定議永始元延之間日蝕地震尤數吏民多上書言災異之應譏切王氏專政所致上懼變異數見意頗然之而未有以眀見乃車駕至禹第辟左右親問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯不平恐為所怨禹即謂上曰春秋二百四十年間日食三十餘地震五十六或為諸侯相殺或為夷狄侵中國災變之意深遠難見故聖人罕言命不語怪神性與天道自子贛之屬不得聞何况淺見鄙儒之所言陛下宜修政事以善應之與下同其福喜此經義意也新學小生亂道誤人宜勿信用以經術斷之上雅信愛禹由是不疑王氏後曲陽侯根及諸王子弟聞知禹言皆喜説遂親就禹禹見時有變異若上體不安擇日潔齊露蓍正衣冠立筮得吉卦則獻其占如有不吉禹為感動憂色成帝崩禹及事哀帝建平二年薨諡曰節侯禹四子長子宏嗣侯官至太常列於九卿三弟皆為校尉散騎諸曹初禹為師以上難數對己問經為論語章句獻之始魯扶卿及夏侯勝王陽蕭望之韋元成皆説論語篇第或異禹先事王啺後從庸生採獲所安最後出而尊貴諸儒為之語曰欲為論念張文由是學者多從張氏餘家寖微孔光字子夏孔子十四世孫也孔子生伯魚鯉鯉生子思伋伋生子上帛帛生子家求求生子真箕箕生子高穿穿生順順為魏相順生鮒鮒為陳涉博士死陳下鮒弟子襄為孝惠博士長沙太傅襄生忠忠生武及安國武生延年延年生霸字次孺霸生光焉安國延年皆以治尚書為武帝博士安國至臨淮太守霸亦治尚書事太傅夏侯勝昭帝末年為博士宣帝時為太中大夫以選授皇太子經遷詹事髙密相是時諸侯王相在郡守上元帝即位徴霸以師賜爵關內侯食邑八百户號褒成君給事中加賜黃金二百斤第一區徙名數于長安霸為人謙退不好權勢嘗稱爵位太過何德以堪之上欲致霸相位自御史大夫貢禹卒及薛廣德免輒欲拜霸霸讓位自陳至三上深知其至誠乃弗用以是敬之賞賜甚厚及霸薨上素服臨弔者再至賜東園祕器錢帛䇿贈以列侯禮諡曰烈君霸四子長子福嗣關內侯次子捷捷弟喜皆列校尉諸曹光最少子也經學尤眀年未二十舉為議郎光祿勳匡衡舉光方正為諫議大夫坐議有不合左遷虹長虹音貢自免歸教授成帝初即位舉為博士數使録寃獄行風俗振贍流民奉使稱旨由是知名是時博士選三科高為尚書次為刺史其不通政事以久次補諸侯太傅光以高第為尚書觀故事品式數歲眀習漢制及法令上甚信任之轉為僕射尚書令有詔光周密謹慎未嘗有過加諸吏官以子男放為侍郎給事黃門數年遷諸吏光祿大夫秩中二千石給事中賜黃金百斤領尚書事後為光祿勳復領尚書諸吏給事中如故凡典樞機十餘年守法度修故事上有所問據經法以心所安而對不希指茍合如或不從不敢強諫爭以是久而安時有所言輒削草稿以為章主之過以姦忠直人臣大罪也有所薦舉唯恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事或問光溫室省中樹皆何木也光默不應更答以他語其不泄如是光帝師傅子少以經行自著進官蚤成不結黨友飬遊説有求於人既性自守亦其勢然也徙光祿勳為御史大夫綏和中上即位二十五年無繼嗣至親有同産弟中山孝王及同産弟子定陶王在定陶王好學多材於帝子行而王祖母傅太后隂為王求漢嗣私事趙皇后昭儀及帝舅大司馬驃騎將軍王根故皆勸上上於是召丞相翟方進御史大夫光右將軍亷褒後將軍朱博皆引入禁中議中山定陶王誰可為嗣者方進根以為定陶王帝弟之子禮曰昆弟之子猶子也為其後者為之子也定陶王宜為嗣褒博皆如方進根議光獨以為立嗣以親中山王先帝之子帝親弟也以尚書盤庚殷之及王為比中山王宜為嗣上以禮兄弟不相入廟又皇后昭儀欲立定陶王故遂立為太子光以議不中意左遷廷尉光久典尚書練法令號稱詳平時定陵侯淳于長坐大逆誅長小妻乃始等六人皆以長事未發覺時棄去或更嫁及長事發丞相方進太司空武議以為令犯法者各以法時律令論之眀有所訖也長犯大逆時乃始等見為長妻已有當坐之罪與身犯法無異後乃棄去於法無以解請論光議以為大逆無道父母妻子同産無少長皆棄市欲懲犯法者也夫婦之道有義則合無義則離長未知當坐大逆之法而棄去乃始等或更嫁義已絶而欲以為長妻論殺之名不正不當坐有詔光議是是歲右將軍褒後將軍博坐定陵紅陽侯皆免為庶人以光為左將軍居右將軍官職執金吾王咸為右將軍居後將軍官職罷後將軍官數月丞相方進薨召左將軍光當拜已刻侯印書贊上暴崩即其夜於大行前拜受丞相博山侯印綬哀帝初即位躬行儉約省減諸用政事由己出朝廷翕然望至治焉褒賞大臣益封光千户時成帝母太皇太后自居長樂宮而帝祖母定陶傅太后在國邸有詔問丞相大司空定陶共王太后宜當何居光素聞傅太后為人剛暴長於權謀自帝在襁褓而飬長教道至於成人帝之立又有力光心恐傅太后與政事不欲令與帝旦夕相近即議以為定陶太后宜改築宮大司空何武曰可居北宮上從武言北宮有紫房復道通未央宮傅太后果從復道朝夕至帝所求欲稱尊號貴寵其親屬使上不得直道行頃之太后從弟子傅遷在左右尤傾邪上免官遣歸故郡傅太后怒上不得已復留遷光與大司空師丹奏言詔書侍中駙馬都尉遷巧佞無義漏泄不忠國之賊也免歸故郡復有詔止天下疑惑無所取信虧損聖德誠不小愆陛下以變異連見避正殿見羣臣思求其故至今未有所改臣請遷歸故郡以銷姦黨應天戒卒不得遣復為侍中脅於傅太后皆此類也又傅太后欲與成帝母俱稱尊號羣下多順指言母以子貴宜立尊號以厚孝道唯師丹與光持不可上重違大臣正議又內迫傅太后猗違者連歲丹以罪免而朱博代為大司空光自先帝時議繼嗣有持異之隙矣又重忤傅太后指由是傅氏在位者與朱博為表裏共毁譖光後數月遂䇿免光罷歸光退閭里杜門自守而朱博代為丞相數月坐承傅太后指妄奏事自殺平當代為丞相數月薨王嘉復為丞相數諫諍忤指旬歲間閲三相議者皆以為不及光上由是思之會元夀元年正月朔日有蝕之後十餘日傅太后崩是月徴光詣公車問日蝕事光對曰臣聞日者衆陽之宗人君之表至尊之象君德衰微隂道盛強侵蔽陽眀則日蝕應之書曰羞用五事建用皇極如貌言視聼思失大中之道不立則咎徴荐臻六極屢降皇之不極是為大中不立其傳曰時則有日月亂行謂朓側慝甚則薄蝕是也又曰六沴之作歲之朝曰三朝其應至重乃正月辛丑朔日有食之變見三朝之會上天聰眀茍無其事變不虛生唯陛下兢兢業業承順天戒敬畏變異勤心虛己延見羣臣思求其故然後敕躬自約總正萬事放遠讒説之黨援納斷斷之介退去貪殘之徒進用賢良之吏平刑罰薄稅斂恩澤加於百姓誠為政之大本應變之至務也書奏上説賜光束帛拜為光祿大夫秩中二千石給事中位次丞相詔光舉可尚書令者封上光舉尚書僕射敞以聞敞以舉故為東平太守敞姓成公東海人也光為大夫月餘丞相嘉下獄死御史大夫賈延免光復為御史大夫二月為丞相復故國博山侯上乃知光前免非其罪以過近臣毁短光者免傅嘉為庶人歸故郡眀年定三公官光更為大司徒會哀帝崩太皇太后以新都侯王莽為大司馬徴立中山王子是為平帝帝年幼太后稱制委政於莽初哀帝罷黜王氏故太后與莽怨丁傅董賢之黨莽以光舊相名儒天下所信太后敬之備禮事光所欲搏擊輒為草以太后指風光令上之崖眥莫不誅傷莽權日盛光憂懼不知所出上書乞骸骨莽白太后帝幼少宜置師傅徙光為帝太傅位四輔給事中領宿衛供飬行內署門户省服御食物明年徙為太師而莽為太傅光常稱疾不敢與莽並有詔朝朔望領城門兵莽又風羣臣奏莽功德稱宰衡位在諸侯王上百官統焉光愈恐固稱疾辭位太后詔太師光毋朝十日一賜餐賜太師靈夀杖黃門令為太師省中坐置几太師入省中用杖賜餐十七物然後歸老于第官屬按職如故光凡為御史大夫丞相各再一為大司徒太傅太師歷三世居公輔位前後十七年自為尚書止不教授後為卿時會門下大生講問疑難舉大義云其弟子多成就為博士大夫者見師居大位幾得其助力光終無所薦舉至或怨之其公如此光年七十元始五年薨莽白太后使九卿䇿贈以太師博山侯印綬賜乘輿祕器金錢雜帛少府供張諫大夫持節與謁者二人使護喪事博士護行禮太后亦遣中謁者持節視喪公卿百官會弔送葬載以乘輿輼輬及副各一乘羽林孤兒諸生合四百人挽送車萬餘兩道路皆舉音以過喪將作穿復上可甲卒五百人起墳如大將軍王鳯制度諡曰簡烈侯初光以丞相封後益封凡食邑萬一千户病甚上書讓還七千户及還所賜第子放嗣莽篡位後以光兄子永為大司馬封侯昆弟子至卿大夫四五人始光父霸以初元元年為關內侯食邑霸上書求奉孔子祭祀元帝下詔曰其令師褒成君關內侯霸以所食邑八百户祀孔子焉故霸還長安子福名數於魯奉夫子祀霸薨子福嗣福薨子房嗣房薨子莽嗣元始元年封周公孔子後為列侯食邑各二千户莽更封為褒成侯後避王莽更名均馬宮字遊卿東海戚人也治春秋嚴氏以射䇿甲科為郎遷楚長史免官後為丞相史司直師丹薦宮行能高潔遷廷尉平青州刺史汝南九江太守所在見稱徴為詹事光祿勳右將軍代孔光為大司徒封扶德侯光為太師薨宮復代光為太師兼司徒官初宮哀帝時與丞相御史雜議帝祖母傅太后諡及元始中王莽發傅太后陵徙歸定陶以民葬之追誅前議者宮為莽所厚獨不及內慙懼上書謝罪乞骸骨莽以太皇太后詔賜宮䇿以侯就第王莽篡位以宮為太子師卒官本姓馬矢宮仕學稱馬氏云王商字子威涿郡蠡吾人也徙杜陵商父武武兄無故皆以宣帝舅封無故為平昌侯武為樂昌侯語在外戚傳商少為太子中庶子以肅敬敦厚稱父薨商嗣為侯推財以分異母諸弟身無所受居喪哀戚於是大臣薦商行可以勵羣臣義足以厚風俗宜偹近臣繇是擢為諸曹侍中中郎將元帝時至右將軍光祿大夫是時定陶共王愛幸幾代太子商為外戚重臣輔政擁佑太子頗有力焉元帝崩成帝即位甚敬重商徙為左將軍而帝元舅大司馬大將軍王鳯顓權行多驕僣商論議不能平鳯鳳知之亦疏商建始三年秋京師民無故相驚言大水至百姓奔走相蹂躪老弱號呼長安中大亂天子親御前殿召公卿議大將軍鳳以為太后與上及後宮可御船令吏民上長安城以避水羣臣皆從鳳議左將軍商獨曰自古無道之國水猶不冒城郭今政治和平世無兵革上下相安何因當有大水一日暴至此必訛言也不宜令上城重驚百姓上乃止有頃長安中稍定問之果訛言上以是美壯商之固守數稱其議而鳳大慚自恨失言明年商代匡衡為丞相益封千户天子甚尊任之商為人多質有威重長八尺餘身體鴻大容貌甚過絶人河平四年單于來朝引見白虎殿丞相商坐未央廷中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延却退天子聞而歎曰此真漢相矣初大將軍鳳連婚楊肜為琅琊太守其郡有災害十四以上商部屬按問鳳以曉商曰災異天事非人力所能為肜素善吏宜以為後商不聼竟奏免之奏果寢不下鳯以是重怨商陰求其短使人上書言商閨門內事天子以為暗昧之過不足以傷大臣鳳固爭下其事司𨽻先是皇太后嘗詔問商女欲以備後宮時女病商意亦難之以病對不入及商以閨門事見考自知為鳯所中惶怖更欲納女為援乃因新幸李倢妤家白見其女會有日蝕之變太中大夫蜀郡張匡為人佞巧上書願對近臣陳日蝕咎下朝者將軍丹等問匡對曰竊見丞相商作威作福從外制中取必於上性殘賊不仁遣剽輕吏微求人罪欲以立威天下患苦之前頻陽耿定上書言商與父傅通及女弟淫亂奴殺其私夫疑商教使章下有司商私怨懟商子俊欲上書告商俊妻左將軍丹女持其書示丹丹惡其父子乖忤為女求去商不盡忠納善以輔至德知聖王崇孝遠别不親後庭之事皆受命皇太后太后前聞商有女欲以備後宮商言有固疾後有耿定事更詭道因李貴人家內女執左道以亂政誣罔悖大臣節故應是而日蝕周書曰以左道事君者誅易曰日中見昧則折其右肱往者丞相周勃再建大功及孝文時纎介怨恨而日為之蝕於是退勃使就國卒無怵惕憂今商無尺寸之功而有三世之寵身位三公宗族為列侯吏二千石侍中諸曹給事禁門內連昏諸侯王權寵至盛審有內亂殺人怨懟之端宜窮竟考問臣聞秦丞相呂不韋見王無子意欲有秦國即求好女以為妻陰知其有身而獻之王産始皇帝及楚相春申君亦見王無子心利楚國即獻有身妻而産懷王自漢興幾遭呂霍之患今商有不仁之性乃因怨以內女其姦謀未可測度前孝景世七國反將軍周亞夫以為即得雒陽劇孟關東非漢之有今商宗族權勢合資巨萬計私奴以千數非特劇孟匹夫之徒也且失道之至親戚畔之閨門內亂父子相訐而欲使之宣明聖化調和海內豈不繆哉商視事五年官職陵夷而大惡著於百姓甚虧損聖德有鼎折足之凶臣愚以為聖主富於春秋即位以來未有懲姦之威加以繼嗣未立大異並見尤宜誅討不忠以遏未然行之一人則海內震動百姦之路塞矣於是左將軍丹等奏商位三公爵列侯親受詔䇿為天下師不遵法度以翼國家而回辟下媚以進其私執左道以亂政為臣不忠罔上不道甫刑之辟皆為上戮罪名明白臣請詔謁者召商詣若盧詔獄上素重商知匡言多險制曰勿治鳳固爭之於是制詔御史免商商免相三日發病嘔血薨諡曰戾侯而商子弟親屬為駙馬都尉侍中常侍諸曹大夫郎吏者皆出補吏莫得留給事宿衛者有司奏商罪過未決請除國邑有詔長子安嗣爵為樂昌侯至長樂衛尉光祿勳商死後連年日蝕地震直臣京兆尹王章上封事召見訟商忠直無罪言鳳專權蔽主鳯以法誅章語在元后傳至元始中王莽為安漢公誅不附己者樂昌侯安見被以罪自殺國除史丹字君仲魯國人也徙杜陵祖父恭有女弟武帝時為衛太子良娣産悼皇考皇考者宣帝父也宣帝微時依倚史氏語在史良娣傳及即尊位而恭已死恭三子高曾元曾元皆以外屬舊恩封曾為將陵侯元平臺侯高侍中貴幸以發舉反者大司馬霍禹功封樂陵侯宣帝疾病拜高為大司馬車騎將軍領尚書事帝崩太子襲尊號是為孝元帝高輔政五年乞骸骨賜安車駟馬黃金罷就第薨諡曰安侯自元帝為太子時丹以父高任為中庶子侍從十餘年元帝即位為駙馬都尉侍中出常驂乘甚有寵上以丹舊臣皇考外屬親信之詔丹護太子家是時傅昭儀子定陶共王有材藝子母俱愛幸而太子頗有酒色之失母王皇后無寵建昭之間元帝被疾不親政事留好音樂或置鼙鼓殿下天子自臨軒檻上隤銅隤持回反下也丸以擲鼓擲音擲磓也磓丁回反聲中嚴鼓之節後宮及左右習知音者莫能為而定陶王亦能之上數稱其材丹進曰凡所謂材者敏而好學溫故知新皇太子是也若乃器人於絲竹鼙鼓之間則是陳惠李微是時善樂者名也高於匡衡可相國也於是上默然而笑其後中山哀王薨太子前弔哀王者元帝之少弟與太子遊學相長大謂同處長養以至於壯大上望見太子感念哀王悲不能自止太子既至前不哀上大恨曰安有人不慈仁而可奉宗廟為民父母者乎上以責謂丹丹免冠謝曰臣誠見陛下哀痛中山王至以感損向者太子當進見臣切戒屬毋涕泣感傷陛下罪乃在臣當死上以為然意乃解丹之輔相皆此類也竟寧元年上寢疾傅昭儀及定陶王常在左右而皇太子希得進見上疾稍侵意忽忽不平數問尚書以景帝時立膠東王故事是時太子長舅陽平侯王鳯為衛尉侍中與皇后太子皆憂不知所出丹以親密臣得侍視疾候上間獨寢時丹直入卧內頓首伏青蒲上以青規地曰靑蒲涕泣言皇太子以嫡長立積十餘年名號繫於百姓天下莫不歸心臣子見定陶王雅素愛幸今者道路流言為國生意以為天子有動搖之議審若此公卿已下必死爭不奉詔臣願先賜死以示羣臣天子素仁不忍見丹涕泣言又切至上意大感喟然太息曰吾日困劣而太子兩王幼少意中戀戀亦何不念乎然無有此議且皇后謹愼先帝又愛太子吾豈可違指駙馬都尉安所受此語丹即却頓首曰愚臣妄聞罪當死上因納謂丹曰吾病寖加恐不能自還善輔導太子毋違我意丹噓唏而起太子由是遂為嗣矣元帝竟崩成帝初即位擢丹為長樂衛尉遷右將軍賜爵關內侯食邑三百户給事中後徙左將軍光祿大夫鴻嘉元年封武陽侯國東海郯之武強聚戶千一百丹為人足知愷悌愛人貌若儻蕩不備然心甚謹密故尤得信於上丹兄嗣父爵為侯讓不受分丹盡得父財身又食大國邑重以舊恩數見褒賞賞賜纍千金僮奴以百數後房妻妾數十人內奢淫好飮酒極滋味聲色之樂為將軍前後十六年永始中病乞骸骨上賜䇿令上將軍印綬賜黃金五十斤安車駟馬歸第數月薨諡曰頃侯有子男女二十人九男皆以丹任並為侍中諸曹親近在左右史氏凡四人侯至卿大夫二千石者十餘人皆訖王莽乃絶唯將陵侯曾無子絶於身云傅喜字稚遊河內溫人也哀帝祖母定陶太后從父弟少好學問有志行哀帝立為太子成帝選喜為太子庶子哀帝初即位以喜為衛尉遷右將軍是時王莽為大司馬乞骸骨避帝外家上既聽莽退衆庶歸望於喜喜從弟孔鄉侯晏親與喜等而女為皇后又帝舅陽安侯丁明皆親以外屬封喜執謙稱疾傅太后始與政事喜數諫之由是傅太后不欲令喜輔政上於是用左將軍師丹代王莽為大司馬賜喜黃金百斤上將軍印綬以光祿大夫養病大司空何武尚書令唐林皆上書言喜行義修潔忠誠憂國內輔之臣也今以寢病一旦遣歸衆庶失望皆曰傅氏賢子以議論不合於定陶太后故退百寮莫不為國恨之忠臣社稷之衛魯以季友治亂楚以子玉重輕魏以無忌折衝項以范增存亡故楚跨有南土帶甲百萬鄰國不以為難子玉為將則文公側席而坐及其死也君臣相慶百萬之衆不如一賢故秦行千金以間亷頗漢散萬金以疏亞父喜立於朝陛下之光輝傅氏之廢興也上亦自重之明年正月乃徙師丹為大司空而拜喜為大司馬封高武侯丁傅驕奢皆忌喜為恭儉又傅太后欲求稱尊號與成帝母齊尊喜與丞相孔光大司空師丹共執正議傅太后大怒上不得已先免師丹以感動喜喜終不順後數月遂䇿免喜遣就國後又欲奪喜侯上不聽喜在國三歲餘哀帝崩平帝即位莽用事免傅氏官爵歸故郡晏將妻子徙合浦莽白太后獨詔喜位特進奉朝請喜雖外見褒賞孤立憂懼後復遣就國以壽終莽賜諡曰貞侯莽敗乃絶薛宣字贛君東海剡人也少為廷尉書佐都船獄吏以大司農斗食斗食者祿少一年不滿百石計日以斗為數也屬察亷補不其丞琅琊太守趙貢行縣見宣甚悅其能從宣歷行屬縣還至府令妻子與相見戒曰贛君至丞相我兩子亦中丞相史察宣亷遷樂浪都尉丞幽州刺史舉茂材為宛句令大將軍王鳳聞其能薦為長安令治果有名以明習文法詔補御史中丞是時成帝初即位宣為中丞執法殿中外總部刺史上疏曰陛下至德仁厚哀愍元元躬有日昃之勞而無逸豫之樂允執聖道刑罰惟中然而嘉氣尚凝隂陽不和是臣下未稱而聖化獨有不洽者也臣竊伏思其一端殆吏多苛政政教煩碎大率咎在部刺史或不循守條職舉錯各以其意多與郡縣事在開私門聽讒佞以求吏民過失譴呵及細微責義不量力郡縣相迫促亦內相刻流至衆庶是故鄉黨闕於嘉賓之歡九族忘其親親之恩飲食周急之厚彌衰送往勞來之禮不行夫人道不通則陰陽否鬲和氣不興未必不由此也詩云民之失德乾餱以愆鄙語曰苛政不親煩苦傷恩方刺史奏事時宜明申敕使昭然知本朝之要務上嘉納之宣數言政事便宜舉奏部刺史郡國二千石所貶退稱進白黑分明繇是知名出為臨淮太守政教大行會陳留郡有大賊廢亂上徙宣為陳留太守盜賊禁止吏民敬其威信入守左馮翊滿歲稱職為真始高陵令楊湛櫟陽令謝遊皆貪猾不遜持郡短長前二千石數案不能竟及宣視事詣府謁宣設酒飯與相對接待甚備已而陰求其罪臧具得所受取宣察湛有改節敬宣之效乃手自牒書條其姦臧封與湛曰吏民條言君如牒或議以為疑於主守盜馮翊敬重令又念十金法重不忍相暴章故密以手書相曉欲君自圖進退可復申眉於後即無其事復封還記得為君分明之湛自知罪臧皆應記而宣辭語溫潤無傷害意湛即時解印綬付吏為記謝宣終無怨言而櫟陽令遊自以大儒有名輕宣宣獨移書顯責之曰告櫟陽令吏民言令治行煩苛適罰作使千人以上賦取錢財數十萬給為非法賣買聽任富吏賈數不可知證驗已明白欲遣吏考案恐負舉者耻辱儒士故使掾平鐫令孔子曰陳力就列不能者止令詳思之方調守遊得檄亦解印綬去又頻陽縣北當上郡西河為數郡湊多盜賊其令平陵薛恭本縣孝者功次稍遷未嘗治民職不辦而粟邑縣小僻在山中民謹朴易治令巨鹿尹賞久郡用事吏為樓煩長舉茂材遷在粟宣即以令奏賞與恭換縣二人視事數月而兩縣皆治宣因移書勞勉之曰昔孟公綽優於趙魏而不宜滕薛故或以德顯或以功舉君子之道焉可憮也屬縣各有賢君馮翊垂拱蒙成願勉所職卒功業宣得郡中吏民罪名輒召告其縣長吏使自行罰曉曰府所以不自發舉者不欲代縣治奪賢令長名也長吏莫不喜懼免冠謝宣歸恩受戒者宣為吏賞罰明用法平而必行所居皆有條教可紀多仁恕愛利池陽令舉亷吏獄掾王立府未及召聞立受囚家錢宣責讓縣縣案驗獄掾乃其妻獨受繫者錢萬六千獄掾實不知掾慙恐自殺宣聞之移書池陽曰縣所舉亷吏獄掾王立家私受賕而立不知殺身以自明立誠亷士甚可閔惜其以府決曹掾書立之柩以顯其魂府掾吏素與立相知者皆豫送葬及日至休吏賊曹掾張扶獨不肯休坐曹治事宣出教曰蓋禮貴和人道尚通日至吏以令休所繇來久冬夏至之日不省官事故休吏曹雖有公職事家亦望私恩意掾宜從衆歸對妻子設酒肴請鄰里一笑相樂斯亦可矣扶慚愧官屬善之宣為人好威儀進止雍容甚可觀也性密靜有思思省吏職求其便安下至財用筆研皆為設方略利用而省費吏民稱之郡中清靜遷為少府共張職辦月餘御史大夫于永卒谷永上疏陳宣行能上然之遂以宣為御史大夫數月代張禹為丞相封高陽侯食邑千户宣除趙貢兩子為史貢者趙廣漢之兄子也為吏亦有能名宣為相府辭訟例不滿萬錢不為移書後皆遵用薛侯故事然官屬譏其煩碎無大體不稱賢也時天子好儒雅宣經術又淺上亦輕焉久之廣漢郡盜賊羣起丞相御史遣掾史逐捕不能克上乃拜河東都尉趙護為廣漢太守以軍法從事數月斬其渠帥鄭躬降者數千人乃平會卭成太后崩喪事倉卒吏賦斂以趨辦其後上聞之以過丞相御史遂册免宣令上丞相高陽侯印綬罷歸初宣為丞相而翟方進為司直宣知方進名儒有宰相器深結厚焉後方進竟代為丞相思宣舊恩宣免後二歲薦宣明習文法練國制度前所坐過薄可復進用上徴宣復爵高陽侯加寵特進位次師安昌侯給事中視尚書事宣復尊重任政數年後坐善定陵侯淳于長罷就第初宣有兩弟明修明至南陽太守修歷郡守京兆尹少府善交接得州里之稱後母常從修居官宣為丞相時修為臨災令宣迎後母修不遣後母病死修去官持服宣謂三年服少能行之者兄弟相駮不可修遂竟服繇是兄弟不和久之哀帝初即位博士申咸給事中亦東海人也毁宣不供養行喪服薄於骨肉前以不忠孝免不宜復列封侯在朝省宣子况為右曹侍郎數聞其語賕客楊明欲令創咸面目使不居位會司𨽻缺况恐咸為之遂令明遮斫咸宮門外斷鼻脣身八創事下有司御史中丞衆等奏况朝臣父故宰相再封列侯不相勑承化而骨肉相疑疑咸受修言以謗毁宣咸所言皆宣行迹衆人所共見公家所宜聞况知咸給事中恐為司𨽻舉奏宣而公令明等迫切宮闕要遮創戮近臣於大道人衆中欲以鬲塞聰明杜絶論議之端桀黠無所畏忌萬衆歡譁流聞四方不與凡民忿怒爭鬭者同臣聞敬近臣為近主也禮下公門式路馬君畜産且猶敬之春秋之義意惡功遂不免於誅上浸之源不可長也况首為惡明手傷功意俱惡皆大不敬明當以重論及况皆棄市廷尉直以為律曰鬭以刃傷人完為城旦其賊加罪一等與謀者同罪詔書無以詆欺成罪傳曰遇人不以義而見疻者與痏人之罪鈞惡不直也咸厚善修而數稱宣惡流聞不誼不可謂直况以故傷咸計謀已定後聞置司𨽻因前謀而趣明非以恐咸為司𨽻故造謀也本爭私變雖於掖門外傷咸道中與凡民爭鬭無異殺人者死傷人者刑古今之通道三代所不易也孔子曰必也正名名不正則刑罰不中刑罰不中而民無所錯手足今以况為首惡明手傷為大不敬公私無差春秋之義原心定罪原况以父見謗發忿怒無他大惡加詆欺輯小過成大辟陷死刑違明詔恐非法意不可施行聖王不以怒增刑明當以賊傷人不直况與謀者皆爵減完為城旦上以問公卿議臣丞相孔光大司空師丹以中丞議是自將軍以下至博士議郎皆是廷尉况竟減罪一等徙敦煌宣坐免為庶人歸故郡卒于家宣子惠亦至二千石始惠為彭城令宣從臨淮遷至陳留過其縣橋梁郵亭不修宣心知惠不能留彭城數日案行舍中處置什物觀視園菜終不問惠以吏事惠自知治縣不稱宣意遣門下掾送宣至陳留令掾進見自從其所問宣不教戒惠吏職之意宣笑曰吏道以法令為師可問而知及能與不能自有資材何可學也衆人傳稱以宣言為然初宣後封為侯時妻死而敬長公主寡居上令宣尚焉及宣免歸故郡公主留京師後宣卒主上書願還宣葬延陵奏可况私從敦煌歸長安會赦因留與主私亂哀帝外家丁傅貴主附事之而疏王氏元始中莽自尊為安漢公主又出言非莽而况與吕寬相善及寬事覺時莽并治况發揚其罪使使者以太皇太后詔賜主藥主怒曰劉氏孤弱王氏擅朝排擠宗室且嫂何與取妹披抉其閨門而殺之使者迫守主遂飮藥死况梟首於市白太后云主暴病薨太后欲臨其喪莽固爭乃止朱博字子元杜陵人也家貧少時給事縣為亭長好客少年捕搏敢行稍遷為功曹伉俠好交隨從士大夫不避風雨是時前將軍望之子蕭育御史大夫萬年子陳咸以公卿子著材知名博皆友之矣時諸陵縣屬太常博以太常掾察亷補安陵丞後去官入京兆歷曹史列掾出為督郵書掾所部職辦郡中稱之而陳咸為御史中丞坐漏泄省中語下獄博去吏間步至廷尉下候伺咸事咸掠治困篤博詐得為醫入獄得見咸具知其所坐罪博出獄又變姓名為咸證驗治數百治數百謂被笞掠也卒免咸死罪咸得論出而博以此顯名為郡功曹久之成帝即位大將軍王鳳秉政奏請陳咸為長史咸薦蕭育朱博除幕府屬鳯甚竒之舉博櫟陽令徙雲陽平陵三縣以高第入為長安令京師治理遷冀州刺史博本武吏不更文法及為刺史行部吏民數百人遮道自言官寺盡滿從事曰請且留此縣録見諸自言者事畢乃發欲以觀試博博心知之告外趣駕既白駕辦博出就車見自言者使從事明勑告吏民欲言縣丞尉者刺史不察黃綬各自詣郡欲言二千石墨綬長吏者行部還詣治所其民為吏所寃及言盜賊辭訟事各使屬其部從事博駐車決遣四五百人皆罷去如神吏民大驚不意博臨事應變乃至於此後博徐問果老從事教民聚會博殺此吏州郡畏博威嚴徙為并州刺史護漕都尉遷琅邪太守齊部舒緩養名博新視事右曹掾史皆移病卧博問其故對言惶恐惶恐言畏新太守之威故事二千石新到輒遣吏存問致意乃敢起就職博奮髯抵几曰觀齊兒欲以此為俗邪乃召見諸曹史書佐及縣大吏選視其可用者出教置之皆新補置以代移病者皆斥罷諸病吏白巾走出府門郡中大驚頃之門下掾贛遂耆老大儒教授數百人拜起舒遲博出教告主簿贛老生不習吏禮主簿且教拜起間習乃止又勑功曹官屬多褒衣大袑音紹謂大袴也不中節度自今掾史衣皆令去地三寸博尤不愛諸生所至郡輒罷去議曹曰豈可復置謀曹邪文學儒吏時有奏記稱説云云博見謂曰如太守漢吏奉三尺律令以從事耳無奈生所言聖人道何也且持此道歸待堯舜君出為陳説之其折逆人如此視事數年大改其俗掾史禮節如楚趙吏博治郡常令屬縣各用其豪桀以為大吏文武從宜縣有劇賊及他非常博輒移書以詭責之其盡力有效必加厚賞懷詐不稱誅罰輒行以是豪強慹服慹之涉反姑幕縣有羣輩八人報仇廷中皆不得長吏自繫書言府賊曹掾史自白請至姑幕事留不出功曹諸掾即皆自白復不出於是府丞詣閣博乃見丞掾曰以為縣自有長吏府未嘗與也丞掾謂府當與之邪閣下書佐入博口占檄文曰府告姑幕令丞言賊發不得有書檄到令丞就職遊徼王卿力有餘如律令王卿得勑惶怖親屬失色晝夜馳騖十餘日間捕得五人博復移書曰王卿憂公甚效檄到齎伐閲詣府部掾以下亦可用漸盡其餘矣其操持下皆此類也以高第入守左馮翊滿歲為真其治左馮翊文理聰明殊不及薛宣而多武譎網絡張設少愛利敢誅殺然亦縱舍時有大貸下吏以此為盡力長陵大姓尚方禁少時嘗盜人妻見斫創著其頰府功曹受賂白除禁調守尉博聞知以他事召見視其靣果有瘢博辟左右問禁是何等創也禁自知情得叩頭服狀博笑曰大丈夫固時有是馮翊欲灑卿耻抆拭用禁能自效不禁且喜且懼對曰必死博因勑禁毋得泄語有便宜輒記言因親信之以為耳目禁晨夜發起部中盜賊及他伏姦有功效博擢禁連守縣令久之召見功曹閉閣數責以禁等事與筆札使自記積受取一錢以上無得有所匿欺謾半言斷頭矣功曹惶怖具自疏姦臧大小不敢隱博知其對以實乃令就席受勑自改而已投刀使削所記遣出就職功曹後常戰栗不敢蹉跌博遂成就之遷為大司農歲餘坐小法左遷犍為太守先是南蠻若兒數為寇盜博厚結其昆弟使為反間襲殺之郡中清徙為山陽太守病免官復徵為光祿大夫遷廷尉職典決疑當讞平天下獄博恐為官屬所誣視事召見正監典法掾史謂曰廷尉本起於武吏不通法律幸有衆賢亦何憂然廷尉治郡斷獄以來且二十年亦獨耳剽日久三尺律令人事出其中掾史試與正監共撰前世決事吏議難知者數十事持以問廷尉得為諸君覆意之正監以為博茍強意未必能然即共條白焉博皆召掾史並坐而問為平處其輕重十中八九官屬咸服博之疏略材過人也每遷徙易官所到輒出竒譎如此以明示下為不可欺者久之遷後將軍坐與紅陽侯立相善立有罪就國有司奏立黨與博坐免後歲餘哀帝即位起家復為光祿大夫遷為京兆尹數月超為大司空初漢興襲秦官置丞相御史大夫太尉至武帝罷太尉始置大司馬以冠將軍之號非有印綬官屬也及成帝時何武為九卿建言古者民朴事約國之輔佐必得賢聖然猶則天三光備三公官各有分職今末俗文弊政事煩多宰相之材不能及古而丞相獨兼三公之事所以久廢而不治也宜建三公官定卿大夫之任分職受政以考功效其後上以問師安昌侯張禹禹以為然時曲陽侯王根為大司馬驃騎將軍而何武為御史大夫於是上賜曲陽侯根大司馬印綬置官屬罷驃騎將軍官以御史大夫何武為大司空皆封列侯增奉如丞相以備三公官焉議者多以為古今異制漢自天子之號下至佐吏皆不同於古而獨改三公職事難分明無益於治亂是時御史府吏舍百餘區井水俱竭又其府中列柏樹常有野烏數千棲宿其上晨去暮來號曰朝夕烏烏去不來者數月長老異之後二歲餘朱博為大司空奏言帝王之道不必相襲各繇時務高皇帝以聖德受命建立鴻業置御史大夫位次丞相典正法度以職相參總領百官歷載二百天下安寧今更為大司空與丞相同位未獲嘉祐故事選郡國守相高第為中二千石選中二千石為御史大夫任職者為丞相位次有序所以尊聖德重國相也今中二千石未更御史大夫而為丞相權輕非所以重國政也臣愚以為大司空官可罷復置御史大夫遵奉舊制臣願盡力以御史大夫為百僚率哀帝從之乃更拜博為御史大夫會大司馬喜免以陽安侯丁明為大司馬衛將軍置官屬大司馬冠號如故事後四歲哀帝遂改丞相為大司徒復置大司空大司馬焉初何武為大司空又與丞相方進共奏言古選諸侯賢者以為州伯書曰咨十有二牧所以廣聰明燭幽隱也今部刺史居牧伯之位秉一州之統選第大吏所薦位高至九卿所惡立退任重職大春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相凖失位次之序臣請罷刺史更置州牧以應古制奏可及博復御史大夫官又奏言漢家至德溥大宇內萬里立置郡縣部刺史奉使典州督察郡國吏民安寧故事居部九歲舉為守相其有異材功效著者輒登擢秩卑而賞厚咸勸功樂進前丞相方進奏罷刺史更置州牧秩真二千石位次九卿九卿缺以高第補其中材則茍自守而已恐功效陵夷姦宄不禁臣請罷州牧置刺史如故奏可博為人亷儉不好酒色遊晏自微賤至富貴食不重味桉上不過三杯夜寢早起妻希見其面有一女無男然好樂士大夫為郡守九卿賓客滿門欲仕宦者薦舉之欲報仇怨者解劔以佩之其趨事待士如是博以此自立然終用敗初哀帝祖母定陶傅太后欲求稱尊號太后從弟高武侯傅喜為大司馬與丞相孔光大司空師丹共持正議孔鄉侯傅晏亦太后從弟讇諛欲順指會博新徴用為京兆尹與交結謀成尊號以廣孝道繇是師丹先免博代為大司空數燕見奏封事言丞相光志在自守不能憂國大司馬喜至尊至親阿黨大臣無益政治上遂罷喜遣就國免光為庶人以博代光為丞相封陽鄉侯食邑二千户博上書讓曰故事封丞相不滿千户而臣獨過制誠慙懼願還千户上許焉傅太后怨傅喜不已使孔鄉侯晏風丞相奏免喜侯博受詔與御史大夫趙元議元言事已前決得無不宜博曰已許孔鄉侯有指匹夫相要尚相得死何况至尊博唯有死耳元即許可博惡獨斥奏喜以故大司空汜鄉侯何武前亦坐過免就國事與喜相似即共奏喜武前在位皆無益於治雖已退免爵土之封非所當得也請皆免為庶人上知傅太后素常怨喜疑博元承指即召元詣尚書問狀元辭服有詔左將軍彭宣與中朝者雜問宣等劾奏博宰相元上卿晏以外親封位特進股肱大臣上所信任不思竭誠奉公務廣恩化為百僚先皆知喜武前已蒙恩詔決事更三赦博執左道虧損上恩以結信貴戚背君鄉臣傾亂政治姦人之雄附下罔上為臣不忠不道元知博所言非法枉義附從大不敬晏與博議免喜失禮不敬臣請詔謁者召博元晏詣廷尉詔獄制曰將軍中二千石二千石諸大夫博士議郎議右將軍蟜望等四十四人以為如宣等言可許諫大夫龔勝等十四人以為春秋之義姦以事君常刑不舍魯大夫叔孫僑如欲顓公室譖其族兄季孫行父於晉晉執囚行父以亂魯國春秋重而書之今晏放命圯族干亂朝政要大臣以罔上本造計謀職為亂階宜與博元同罪罪皆不道上減元死罪三等削晏户四分之一假謁者節召丞相詣廷尉詔獄博自殺初博以御史為丞相趙元以少府為御史大夫並拜於前殿延登受䇿有音如鐘聲及是同敗信有祥焉翟方進字子威汝南上蔡人也家世微賤至方進父翟公好學為郡文學方進年十二三失父廢學給事太守府為小史號遲頓頓讀為鈍不及事數為掾史所詈辱方進自傷乃從汝南蔡父相問己能所宜蔡父大竒其形貌謂曰小史有封侯骨當以經術進努力為諸生學問方進既厭為小史聞蔡父言心喜因病歸家辭其後母欲西至長安受經後母憐其病隨之長安織屨以給方進讀經從博士受春秋積十餘年經學明習徒衆日廣諸儒稱之乃以射䇿甲科為郎二三歲舉明經遷議即是時宿儒有清河胡常與方進同經常為先進名譽出方進下心害其能論議不右方進方進知之候伺常大都授時遣門下諸生至常所問大義疑難因記其説如是者久之常知方進之宗讓己內不自得其後居士大夫之間未嘗不稱述方進遂相親友河平中方進轉為博士數年遷朔方刺史居官不煩苛所察應條輒舉甚有威名再三奏事遷為丞相司直從上甘泉行馳道中司𨽻校尉陳慶劾奏方進沒入車馬既至甘泉宮會殿中慶與廷尉范延壽語時慶有章劾自道行事以贖論今尚書持我事來當於此決前我為尚書時嘗有所奏事忽忘之留月餘方進於是舉劾慶奉使不謹慶坐免官會北地浩商為義渠長所捕亡長取其母與豭豬連繫都亭下商兄弟會賔客自稱司𨽻掾長安縣尉殺義渠長妻子六人亡丞相御史請遣掾史與司𨽻校尉部刺史并力逐捕察無狀者奏可司𨽻校尉涓勳奏言春秋之義王人微者序乎諸侯之上尊王命也臣幸得奉使以督察公卿以下為職今丞相宣請遣掾史以宰士督察天子奉使命大夫甚悖逆順之理宣本不師受經術因事以立姦威案浩商所犯一家之禍耳而宣欲專權作威乃害于乃國不可之大者願下中朝特進列侯將軍以下正國法度議者以為丞相掾不宜移書督趣司𨽻會浩商捕得伏誅家屬徙合浦故事司𨽻校尉位在司直下初除謁兩府其有所會居中二千石前與司直並迎丞相御史初方進新視事而涓勳亦初拜司𨽻不肯謁丞相御史大夫後朝會相見禮節又倨方進陰察之勳私過光祿勳辛慶忌又出逄帝舅成都侯王商道路下車立䇓過乃就車於是方進舉奏勳吏二千石幸得奉使不遵禮儀輕謾宰相賤易上卿而又詘節失度邪讇無常色厲內荏墮國體亂朝廷之序不宜處位臣請下丞相免勳時太中大夫平當給事中奏言方進國之司直不自勑正以先羣下前親犯令行馳道中司𨽻慶平心舉劾方進不自責悔而內挾私恨伺記慶之從容語言以詆欺成罪後丞相宣以一不道賊請遣掾督趣司𨽻校尉司𨽻校尉勳自奏暴於朝廷今方進復舉奏勳議者以為方進不以道德輔正丞相茍阿助大臣欲必勝立威宜抑絶其原勳素行公直姦人所惡可少寬假使遂其功名上以方進所舉應科不得用逆詐廢正法遂貶勳為昌陵令方進旬歲間免兩司𨽻朝廷繇是憚之丞相宣甚器重焉常戒掾史曰謹事司直翟君必在相位不久是時起昌陵營作陵邑貴戚近臣子弟賔客多辜𣙜為姦利者方進部掾史覆按發大姦臧數千萬上以為任公卿欲試以治民徙方進為京兆尹搏擊豪強京師畏之時胡常為青州刺史聞之與方進書曰竊聞政令甚明為京兆能則恐有所不宜方進心知所謂其後少弛威嚴居官三歲永始二年遷御史大夫數月會丞相薛宣坐廣漢盜賊羣起及太皇太后喪時三輔吏並徴發為姦免為庶人方進亦坐為京兆時奉喪事煩擾百姓左遷執金吾二十餘日丞相官缺羣臣多舉方進上亦器其能遂擢方進為丞相封高陵侯食邑千户身既富貴而後母尚在方進內行修飭供養甚篤及後母終既葬三十六日除服起視事以為身備漢相不敢踰國家之制為相公潔請託不行於郡國持法刻深舉奏牧守九卿峻文深詆中傷者尤多如陳咸朱博蕭育逄信孫閎之屬皆京師世家以才能少歷牧守列卿知名當世而方進特立後起十餘年間至宰相據法以彈咸等皆罷退之初咸最先進自元帝初為御史中丞顯名朝廷矣成帝初即位擢為部刺史歷楚國北海東郡太守陽朔中京兆尹王章譏切大臣而薦琅邪太守馮野王可代大將軍王鳯輔政東郡太守陳咸可御史大夫是時方進甫從博士為刺史云後方進為京兆尹咸從南陽太守入為少府與方進厚善先是逢信已從高第郡守歷京兆太僕為衛尉矣官簿皆在方進之右及御史大夫缺三人皆名卿俱在選中而方進得之會丞相宣有事與方進相連上使五二千石雜問丞相御史咸詰責方進冀得其處方進心恨初大將軍鳯奏除陳湯為中郎與從事鳯薨後從弟車騎將軍音代鳯輔政亦厚湯逢信陳咸皆與湯善湯數稱之於鳯音所久之音薨鳯弟成都侯商復為大司馬衛將軍輔政商素憎陳湯白其罪過下有司案驗遂免湯徙敦煌時方進新為丞相陳咸內懼不安乃令小冠杜子夏往觀其意微自解説子夏既過方進揣知其指不敢發言居亡何方進奏咸與逄信邪枉貪汙營私多欲皆知陳湯姦佞傾覆利口不軌而親交賂遺以求薦舉後為少府數饋遺湯信咸幸得備九卿不思盡忠正身內自知行辟亡功效而官媚邪臣欲以徼幸茍得亡耻孔子曰鄙夫可與事君也與哉咸信之謂也過惡暴見不宜處位臣請免以示天下奏可後二歲餘詔舉方正直言之士紅陽侯立舉咸對䇿拜為光祿大夫給事中方進復奏咸前為九卿坐為貪邪免自知罪惡暴陳依託紅陽侯立徼幸有司莫敢舉奏冒濁茍容不顧耻辱不當蒙方正舉備內朝臣并劾紅陽侯立選舉故不以實有詔免咸勿劾立後數年皇太后姊子侍中衛尉定陵侯淳于長有罪上以太后故免官勿治罪有司奏請遣長就國長以金錢與立立上封事為長求留曰陛下既託文以太后故誠不可更有他計後長陰事遂發下獄方進劾立懷姦邪亂朝政欲傾誤要主上狡猾不道請下獄上曰紅陽侯朕之舅不忍致法遣就國於是方進復奏立黨友曰立素行積為不善衆人所共知邪臣自結附託為黨庶幾立與政事欲獲其利今立斥逐就國所交結尤著者不宜備大臣為郡守案後將軍朱博巨鹿太守孫閎故光祿大夫陳咸與立交通厚善相與為腹心有背公死黨之信欲相攀援死而後己皆內有不仁之性而外有雋材過絶於人倫勇猛果敢處事不疑所居皆尚殘賊酷虐苛刻慘毒以立威而無纎介愛利之風天下所共知愚者猶惑孔子曰人而不仁如禮何人而不仁如樂何言不仁之人亡所施用不仁而多材國之患也此三人皆內懷姦猾國之所患而深相與結信於貴戚姦臣此國家大憂大臣所宜沒身而爭也昔季孫行父有言曰見有善於君者愛之若孝子之養父母也見不善者誅之若鷹鸇之逐鳥爵也翅翼雖傷不避也貴戚權黨之衆誠難犯犯之衆敵並怨善惡相冒臣幸得備宰相不敢不盡死請免博閎咸歸故郡以銷姦雄之黨絶羣邪之望奏可咸既廢錮復徙故郡以憂死方進知能有餘兼通文法吏事以儒雅緣飾法律號為通明相天子甚器重之奏事亡不當意內求人主微指以固其位初定陵侯淳于長雖外戚然以能謀議為九卿新用事方進獨與長交稱薦之及長坐大逆伏誅諸所厚善皆坐長免上以方進大臣又素重之為隱諱方進內慙上疏謝罪乞骸骨上不許乃起視事條奏長所厚善京兆尹孫寶右扶風蕭育刺史二千石已上免二十餘人其見任如此方進雖受榖梁然好左氏傳天文星陷其左氏則國師劉歆星陷則長安令田終術師也厚李尋以為議曹為相九歲綏和二年春熒惑守心尋奏記言應變之權君侯所自明往者數白三光垂象變動見端山川水泉反理視患民人訛謡斥事感名三者既效可為寒心今提揚眉矢貫中狼奮角弓且張金歷庫土逆度輔湛沒火守舍萬歲之期近愼朝暮上無惻怛濟世之功下無推讓避賢之效欲當大位為具臣以全身難矣大責日加安得但保斥逐之戮闔府三百餘人唯君侯擇其中與盡節轉凶方進憂之不知所出會郎賁賁音肥姓也麗善為星上言大臣宜當之上乃召見方進還歸未及引決上遂賜䇿令審處焉方進即日自殺上祕之遣九卿䇿贈以丞相高陵侯印綬賜乘輿祕器少府供帳柱檻皆衣素天子親臨弔者數至禮賜異於他相故事諡曰恭侯長子宣嗣宣字大伯亦明經篤行君子人也及方進在位為關都尉南郡太守少子曰義字文仲少以父任為郎稍遷諸曹年二十出為南陽都尉宛令劉立與曲陽侯為婚又素著名州郡輕義年少義行太守事行縣至宛丞相史在傳舍立持酒肴謁丞相史對飮未訖會義亦往外吏白都尉方至立語言自若須臾義至內謁徑入立乃走下義既還大怒陽以他事召立至以主守盜十金賊殺不辜部掾夏恢等收縛立傳送鄧獄恢亦以宛大縣恐見篡奪白義可因隨後行縣送鄧義曰欲令都尉自送則如勿收邪載環宛市乃送吏民不敢動威震南陽立家輕騎馳從武關入語曲陽侯曲陽侯白成帝帝以問丞相方進遣吏勑義出宛令宛令已出吏還白狀方進曰小兒未知為吏也其意以為入獄當輒死矣後義坐法免起家為𢎞農太守遷河內太守青州牧所居著名有父風烈徙為東郡太守數歲平帝崩王莽居攝義心惡之乃謂姊子上蔡陳豐曰新都侯攝天子位號令天下故擇宗室幼稚者以為孺子依託周公輔成王之義且以觀望必代漢家其漸可見方今宗室衰弱外無強藩天下傾首服從莫能亢扞國難吾幸得備宰相子身守大郡父子受漢厚恩義當為國討賊以安社稷欲舉兵西誅不當攝者選宗室子孫輔而立之設令時命不成死國埋名猶可以不慙於先帝今欲發之乃肯從我乎豐年十八勇壯許諾義遂與東郡都尉劉宇嚴鄉侯劉信信弟武平侯劉璜結謀又東郡王孫慶素有勇略以明兵法徴在京師義乃詐移書以重罪傳逮慶於是以九月都試日九月太守郡尉令長丞會都試課殿最斬觀令因勒其車騎材官士募郡中勇敢部署將帥嚴鄉侯信者東平王雲子也雲誅死信兄開明嗣為王薨無子而信子匡復立為王故義舉兵并東平立信為天子義自號大司馬柱天大將軍以東平王傅蘇隆為丞相中尉臯丹為御史大夫移檄郡國言莽鴆殺孝平皇帝矯攝尊號今天子已立共行天罰郡國皆震比至山陽衆十餘萬莽聞之大懼乃拜其黨親輕車將軍成武侯孫建為奮武將軍光祿勳成都侯王邑為虎牙將軍明義侯王駿為強弩將軍春王城門校尉王况為震威將軍宗伯忠孝侯劉宏為奮衝將軍中少府建威侯王昌為中堅將軍中郎將震羌侯竇兄兄音况為奮威將軍凡七人自擇除關西人為校尉軍吏將關東甲卒發奔命以擊義焉復以太僕武讓為積弩將軍屯函谷關將作大匠蒙鄉侯逯並為橫壄將軍屯武關羲和紅休侯劉歆為掦武將軍屯宛大保後丞丞陽侯甄邯為大將軍丞陽侯音蒸屯灞上常鄉侯王惲為車騎將軍屯平樂館騎都尉王晏為建威將軍屯城北城門校尉趙恢為城門將軍皆勒兵自備莽日抱孺子會羣臣而稱曰昔成王幼周公攝政而管蔡挾祿父以叛今翟義亦挾劉信而作亂自古大聖猶懼此况臣莽之斗筲羣臣皆曰不遭此變不章聖德莽於是依周書作大誥遣大夫桓談等班行告諭當反位孺子之意還封談為明告里附城諸將東至陳留災與義會戰破之斬劉璜首災故戴國屬陳留後曰考城莽大赦天下義與劉信棄軍於圉城亡至固始界中捕得義尸磔陳都市卒不得信初三輔聞翟義起自茂陵以西至汧二十三縣盜賊並發趙明霍鴻等自稱將軍攻燒官寺殺右輔都尉及斄令劫掠吏民衆十餘萬火見未央宫前殿莽晝夜抱孺子禱宗廟復拜衛尉王級為虎賁將軍大鴻臚望鄉侯閻遷為折衝將軍與甄邯王晏西擊趙明等正月虎牙將軍王邑等自關東還便引兵西強弩將軍王駿以無功免揚武將軍劉歆歸故官復以邑弟侍中王竒為掦武將軍城門將軍趙恢為強弩將軍中郎將李棽為厭難將軍復將兵西二月明等殄滅諸縣悉平還師振旅莽乃置酒白虎殿勞饗將帥大封拜先是益州蠻夷及金城塞外羌反畔時州郡擊破之莽乃并録以小大為差封侯伯子男凡三百九十五人曰皆以奮怒東指西擊羌寇蠻盜反虜逆賊不得旋踵應時殄滅天下咸服其功封云莽於是自謂大得天人之助至其年十二月遂即真矣初義所收宛令劉立聞義舉兵上書願備軍吏為國討賊內報私怨莽擢立為陳留太守封明德侯始義兄宣居長安先義未發家數有怪夜聞哭聲聽之不知所在宣教授諸生滿堂有狗從外入齧其中庭羣鴈數十比驚救之已皆斷頭狗走出門求不知處宣大惡之謂後母曰東郡太守文仲素俶儻今數有惡怪恐有妄為而大禍至也太夫人可歸為棄去宣家者可以避害母不肯去言歸其本族自絶於翟氏後數月敗莽盡壞義第宅汙池之發父方進及先祖冢在汝南者燒其棺柩夷滅三族誅及種嗣至皆同坑以棘五毒并葬之而下詔曰蓋聞古者伐不敬取其鯨鯢築武軍封以為大戮於是乎有京觀以懲淫慝乃者反虜劉信翟義悖逆作亂于東而芒竹羣盜趙明霍鴻造逆西土遣武將征討咸伏其辜惟信義等始發自濮陽結姦無鹽殄滅於圉趙明依阻槐里環隄霍鴻負倚盩厔芒竹咸用破碎亡有餘類其取反虜逆賊之鯨鯢聚之通路之旁濮陽無鹽圉槐里盩厔凡五所各方丈六高六尺築為武軍封以為大戮薦樹之棘建表木高丈六尺書曰反虜逆賊鯨鯢在所長吏常以秋循行勿令壞敗以懲淫惡焉初汝南舊有鴻隙大陂郡以為饒成帝時關東數水陂溢為害方進為相與御史大夫孔光共遣掾行視以為決去陂水其地肥美省隄防費而無水憂遂奏罷之及翟氏滅鄉里歸惡言方進請陂下良田不得而奏罷陂云王莽時常枯旱郡中追怨方進童謡曰壞陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰云者兩黃鵠謂無水灌田不可粳稻但有豆芋耳兩黃鵠託言有神來告之通志卷一百二上
