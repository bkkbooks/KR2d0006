body:
  text: 通志卷九十五宋右廸功郎鄭樵漁仲撰列傳第八前漢陳勝吳廣項籍梁張耳陳餘魏豹咎田儋榮横韓王信韓信彭越黥布盧綰吳芮季布季心丁公欒布田叔仁陳勝字渉陽城人吳廣字叔陽夏人也勝少時嘗與人傭耕輟耕之壠上悵然甚久曰苟富貴無相忘傭者笑而應曰若為傭耕何富貴也勝太息曰嗟乎燕雀安知鴻鵠之志哉秦二世元年秋七月發閭左戍漁陽九百人勝廣皆為屯長行至蘄大澤鄉㑹天大雨道不通度已失期失期法斬勝廣乃謀曰今亡亦死舉大計亦死等死死國可乎勝曰天下苦秦久矣吾聞二世少子不當立當立者乃公子扶蘇扶蘇以數諫故不得立上使外将兵今或聞無罪二世殺之百姓多聞其賢未知其死項燕為楚将數有功愛士卒楚人憐之或以為在今誠以吾衆為天下倡宜多應者廣以為然乃行卜卜者知其指意曰足下事皆成有功然足下卜之鬼乎勝廣喜念鬼曰此教我先威衆耳乃丹書帛曰陳勝王置人所罾魚腹中卒買魚烹食得書已怪之矣又間令廣之次所旁叢祠中夜構火狐鳴呼曰大楚興陳勝王卒皆夜驚恐旦日卒中往往指目勝廣勝廣素愛人士卒多為用将尉醉廣故數言欲亡忿尉令辱之以激怒其衆尉果笞廣尉劔挺廣起奪而殺尉勝佐之并殺兩尉召令徒屬曰公等遇雨皆已失期當斬藉第令毋斬而戍死者固什六七且壮士不死則已死則舉大名耳侯王将相寧有種乎徒屬皆曰敬受令乃詐稱公子扶蘇項燕從民望也袒右稱大楚為壇而盟祭以尉首勝自立為将軍廣為都尉攻大澤鄉㧞之收兵而攻蘄蘄下乃令符離人葛嬰将兵徇蘄以東攻銍酇苦柘譙皆下之行收兵比至陳兵車六七百乗騎千餘卒數萬人攻陳陳守令皆不在獨守丞與戰譙門中不勝守丞死乃入據陳數日號召三老豪桀㑹計事皆曰将軍身被堅執鋭伐無道誅暴秦復立楚之社稷功宜為王勝乃為王號張楚扵是諸郡縣苦秦吏暴皆殺其長吏将以應勝乃以廣為假王監諸将以西擊滎陽令陳人武臣張耳陳餘徇趙汝陰人鄧宗徇九江郡當此時楚兵數千人為聚者不可勝數葛嬰至東城立㐮彊為楚王後聞勝已立因殺㐮彊還報至陳勝殺嬰令魏人周市北徇魏地廣圍滎陽李由為三川守守滎陽廣不能下勝徵國之豪傑與計以上蔡人房君蔡賜為上柱國周文陳之賢人也嘗為項燕軍視日事春申君自言習兵勝與之将軍印西擊秦行收兵至闗車千乗卒十萬至戲軍焉秦令少府章邯免驪山徒人奴產子悉𤼵以擊楚軍大敗之周文走出闗止屯曹陽二月餘章邯追敗之復至黽池十餘日章邯擊大破之周文自剄軍遂不戰武臣至邯鄲自立為趙王陳餘為大将軍張耳召騷為左右丞相勝怒捕繫武臣等家室欲誅之柱國曰秦未亡而誅趙王将相家屬此生一秦不如因而立之勝乃遣使者賀趙而徙繫武臣等家屬宮中而封張耳子敖為成都君趣趙兵亟入闗趙王将相相與謀曰王王趙非楚意也楚已誅秦必加兵扵趙計莫如毋西兵使使北徇燕地以自廣趙南據大河北有燕代楚雖勝秦不敢制趙若不勝秦必重趙趙乗秦楚之敝可以得志扵天下趙王以為然因不西兵而遣故上谷卒史韓廣将兵北徇燕燕地貴人豪傑謂韓廣曰楚趙皆已立王燕雖小亦萬乘之國也願将軍立為王韓廣曰廣母在趙不可燕人曰趙方西憂秦南憂楚其力不能禁我且以楚之彊不敢害趙王将相之家今趙獨安敢害将軍家乎韓廣以為然乃自立為燕王居數月趙奉燕王母家屬歸之是時諸将徇地者不可勝數周市北至狄狄人田儋殺狄令自立為齊王反擊周市市軍散還至魏地立魏後寗陵君咎為魏王咎在勝所不得之魏魏地已定欲立周市為王市不肯使者五反勝乃立寗陵君為魏王遣之國周市為相将軍田臧等相與謀曰周章軍已破秦兵且至我守滎陽城不能下秦軍至必大敗不如少遺兵足以守滎陽悉精兵迎秦軍今假王驕不知兵權不可與計非誅之事恐敗因相與矯陳王令以誅吳廣獻其首扵勝勝使賜田臧楚令尹印使為上将田臧乃使諸将李歸等守滎陽城自以精兵西迎秦軍扵敖倉與戰田臧死軍破章邯進擊李歸等滎陽下破之李歸死陽城人鄧説将兵居郯章邯别将擊破之鄧説走陳銍人伍逢将兵居許章邯擊破之伍逢亦走陳勝誅鄧説勝初立時凌人秦嘉銍人董緤符離人朱雞石取慮人取音趍又音秋慮音廬鄭布徐人丁疾等皆特起将兵圍東海守扵郯勝聞乃使武平君畔為将軍監郯下軍秦嘉自立為大司馬惡屬人告軍吏曰武平君年少不知兵事勿聼因矯以王命殺武平君畔章邯已破伍逢擊陳柱國房君死章邯又進擊陳西張賀軍勝出臨戰軍破張賀死臘月勝之汝陰還至下城父其御荘賈殺勝以䧏秦葬碭諡曰隐王勝故涓人将軍呂臣為蒼頭軍起新陽攻陳下之殺荘賈復以陳為楚初勝令銍人宋留将兵定南陽入武闗留已徇南陽聞勝死南陽復為秦宋留不能入武闗乃東至新蔡遇秦軍宋留以軍䧏秦秦傳留至咸陽車裂留以徇秦嘉等聞勝軍敗乃立景駒為楚王引兵之方與欲擊秦軍濟陰下使公孫慶使齊王欲與併力俱進齊王曰陳王戰敗未知其死生楚安得不請而立王公孫慶曰齊不請楚而立王楚何故請齊而立王且楚首事當令扵天下田儋殺公孫慶秦左右校復攻陳下之呂将軍走徼兵復聚與番盗英布相遇攻秦左右校破之青波復以陳為楚㑹項梁立懷王孫心為楚王陳勝王凡六月初為王其故人嘗與傭耕者聞之乃之陳叩宮門曰吾欲見渉宮門令欲縛之自辯數乃置不肯為通勝出遮道而呼渉廼召見載與歸入宮見殿屋帷帳客曰夥渉之為王沈沈者楚人謂多為夥故天下傳之夥渉為王夥音禍沈都含反深䆳之貎由陳渉始客出入愈益發舒言勝故情或言客愚無知專妄言輕威勝斬之諸故人皆自引去由是無親勝者以朱防為中正胡武為司過主司羣臣諸将徇地至令之不是者繫而罪之以苛察為忠其所不善者不下吏輒自治勝信用之諸将以故不親附此其所以敗也勝雖已死其所置遣侯王将相竟亡秦髙祖時為勝置守冢于碭血食至王莽敗乃絶項籍字羽下相人也初起年二十四其季父梁梁父即楚名将項燕者也家世楚将封扵項故姓項氏籍少時學書不成去學劔又不成去梁怒之籍曰書足記姓名而已劔一人敵不足學學萬人敵耳扵是梁竒其意乃教以兵法籍大喜畧知其意又不肯竟梁嘗有櫟陽逮請蘄獄掾曹咎書抵櫟陽吏司馬欣以故事皆已梁嘗殺人與籍避仇吳中吳中賢士大夫皆出梁下毎有大繇役及䘮梁嘗主辦陰以兵法部勒賔客子弟以知其能秦始皇帝東逰㑹稽渡浙江梁與籍觀籍曰彼可取而代也梁掩其口曰無妄言族矣梁以此竒籍籍長八尺二寸力扛鼎才氣過人吳中子弟皆惮籍秦二世元年陳勝起九月㑹稽假守通素賢梁召與計事梁曰方今江西皆反秦此亦天亡秦時也先發制人後發制扵人守歎曰聞夫子楚将世家惟足下耳梁曰吳有奇士桓楚亡在澤中人莫知其處獨籍知之梁乃戒籍持劔居外待梁復入與守語曰請召籍使受令召桓楚籍入梁眴籍曰可矣籍遂㧞劔擊斬守梁持守頭佩其印綬門下驚擾籍所擊數十百人府中皆讋伏莫敢復起梁乃召故人所知豪吏諭以所為遂舉吳中兵使人收下縣得精兵八千人部署豪傑為校尉候司馬有一人不得官自言梁曰某時某䘮使公主某事不能辦以故不任公衆乃皆服梁為㑹稽将籍為裨将徇下縣秦二年廣陵人召平為陳勝徇廣陵未下聞陳勝敗走秦将章邯且至乃渡江矯陳王令拜梁為楚上柱國曰江東已定急引兵西擊秦梁乃以八千人渡江而西聞陳嬰已下東陽使使欲與連和俱西陳嬰者故東陽令史居縣素信為長者東陽少年殺其令相聚數千人欲立長無適用乃請陳嬰嬰謝不能遂彊立之縣中從之者得二萬人欲立嬰為王異軍蒼頭特起嬰母謂嬰曰吾為乃家婦聞先故未曾貴今暴得大名不祥不如有所屬事成猶得封侯事敗易以亡非世所指名也嬰乃不敢為王謂其軍吏曰項氏世世将家有功扵楚今欲舉大事将非其人不可我倚名族亡秦必矣其衆從之乃以其兵屬梁梁渡淮英布蒲将軍亦以其兵屬焉凡六七萬人軍下邳是時秦嘉已立景駒為楚王軍彭城東欲以距梁梁謂軍吏曰陳王首事戰不利未聞所在今秦嘉背陳王立景駒大逆亡道乃引兵擊秦嘉軍敗走追至胡陵嘉還戰一日嘉死軍䧏景駒走死梁地梁已并秦嘉軍軍胡陵将引而西章邯至栗梁使别将朱雞石餘樊君與戰餘樊君死朱雞石敗亡走胡陵梁乃引兵入薛誅朱雞石梁前使羽别攻㐮城㐮城堅守不下已㧞皆阬之還報梁聞陳王定死召諸别将㑹薛計事時沛公亦從沛往居鄛人范增年七十素好奇計往説梁曰陳勝敗固當夫秦㓕六國楚最亡罪自懷王入秦不反楚人憐之至今故南公稱曰楚雖三户亡秦必楚今陳勝首事不立楚後其勢不長今君起江東楚蠭起之将皆争附君者以君世世楚将為能復立楚之後也扵是梁乃求楚懐王孫心在民間為人牧羊立以為楚懷王從民望也陳嬰為上柱國封五縣與懷王都盱台梁自號武信君引兵攻亢父初章邯既殺齊王田儋扵臨菑田假復自立為齊王儋弟榮走保東阿章邯追圍之梁引兵救東阿大破秦軍東阿田榮即引兵歸逐王假假亡走楚相田角亡走趙角弟間故将居趙不敢歸田榮立儋子市為齊王梁已破東阿下軍遂追秦軍數使使趣齊兵俱西榮曰楚殺田假趙殺田角田閒乃發兵梁曰田假與國之王窮來歸我不忍殺趙亦不殺角閒以市扵齊齊遂不肯發兵助楚梁使羽與沛公别攻城陽屠之西破秦軍濮陽東秦兵收入濮陽沛公羽攻定陶定陶未下去西畧地至雍邱大破秦軍斬李由還攻外黄外黄未下梁起東阿比至定陶再破秦軍羽等又殺李由益輕秦有驕色宋義諫曰戰勝而将驕卒惰者敗今少惰矣秦兵日益臣為君畏之梁不聼乃使宋義扵齊道遇齊使者髙陵君顯曰公将見武信君乎曰然義曰臣論武信君軍必敗公徐行則免疾行則及禍秦果悉起兵益章邯夜銜枚擊楚大破之定陶梁死沛公與羽去外黄攻陳留陳留堅守不下沛公羽相與謀曰今梁軍敗士卒恐乃與呂臣軍俱引兵而東呂臣軍彭城東羽軍彭城西沛公軍碭章邯已破梁軍則以為楚地兵不足憂乃渡河北擊趙大破之當此之時趙歇為王陳餘為将張耳為相走入鉅鹿城秦将王離渉間圍鉅鹿章邯軍其南築甬道而輸之粟陳餘将卒數萬人軍鉅鹿此所謂河北軍也宋義所遇齊使者髙陵君顯見楚懷王曰宋義論武信軍必敗數日果敗軍未戰先見敗徵可謂知兵矣王召宋義與計事而説之因以為上将軍羽為魯公為次将范增為末将諸别将皆屬號卿子冠軍北救趙至安陽留不進秦三年羽謂宋義曰今秦軍圍鉅鹿疾引兵渡河楚擊其外趙應其内破秦軍必矣宋義曰不然夫搏牛之蝱不可以破蝨今秦攻趙戰勝則兵罷我承其敝不勝則我引兵鼓行而西必舉秦矣故不如先闘秦趙夫擊輕鋭我不如公坐運籌策公不如我因下令軍中曰猛如虎狠如羊貪如狼彊不可令者皆斬遣其子宋㐮相齊身送之無鹽飲酒髙㑹天寒大雨士卒凍饑羽曰将戮力而攻秦久留不行今嵗饑民貧士卒食半菽軍無見糧乃飲酒髙㑹不引兵渡河因趙食與併力擊秦乃曰承其敝夫以秦之彊攻新造之趙其勢必舉趙趙舉秦彊何敝之承且國兵新破王坐不安席掃境内而屬将軍國家安危在此一舉今不䘏士卒而徇私非社稷之臣也羽晨朝上将軍宋義即其帳中斬義頭出令軍中曰宋義與齊謀反楚楚王陰令籍誅之諸将讋服莫敢枝梧皆曰首立楚者将軍家也今将軍誅亂乃相與共立羽為假上将軍使人追宋義之子及之齊殺之使桓楚報命扵王王因使使立羽為上将軍羽已殺卿子冠軍威震楚國名聞諸侯乃遣當陽君蒲将軍将卒二萬人渡河救鉅鹿戰少利陳餘復請兵羽乃悉引兵渡河已渡皆湛船破釡甑燒廬舍持三日糧視士必死無還心扵是至則圍王離與秦軍遇九戰絶甬道大破之殺蘇角虜王離渉間不䧏自燒殺當是時楚兵冠諸侯諸侯軍救鉅鹿者十餘壁莫敢縱兵及楚擊秦諸侯皆從壁上觀楚戰士無不一當十呼聲動天地諸侯軍人人惴恐扵是楚已破秦軍羽見諸侯将入轅門膝行而前莫敢仰視羽繇是始為諸侯上将軍兵皆屬焉章邯軍棘原羽軍漳南相持未戰秦軍數郤二世使人譲章邯邯恐使長史欣請事至咸陽留司馬門三日趙髙不見有不信之心長史欣恐還走不敢出故道趙髙果使人追之不及欣至軍報曰事亡可為者相國趙髙顓國主斷今戰而勝髙嫉吾功不勝不免扵死願将軍熟計之陳餘亦遺章邯書曰白起為秦将南并鄢郢北阬馬服攻城畧地不可勝計而卒賜死蒙恬為秦将北逐戎人開榆中地數千里竟斬陽周何者功多秦不能封因以法誅之今将軍為秦将三嵗矣所亡失已十萬數而諸侯並趙滋益多彼趙髙素諛日久今事急亦恐二世誅之故欲以法誅将軍以塞責使人更代以脱其禍将軍居外久多内隙有功亦誅亡功亦誅且天之亡秦無愚智皆知之今将軍内不能直諌外為亡國将孤立而欲長存豈不哀哉将軍何不還兵與諸侯為從南面稱孤孰與身伏斧質妻子為戮乎章邯狐疑陰使候始成使羽欲約約未成羽使蒲将軍引兵渡三户軍漳南與秦戰再破之羽悉引兵擊秦軍汙水上大破之邯使使見羽欲約羽召軍吏謀曰糧少欲聼其約軍吏皆曰善羽乃與盟洹水南殷虛上已盟章邯見羽流涕為言趙髙羽乃立章邯為雍王置軍中使長史欣為上将将秦軍前行漢元年羽将諸侯兵三十餘萬行畧地至河南遂西到新安異時諸侯吏卒傜使屯戍過秦中秦中吏卒遇之多無状及秦軍䧏諸侯諸侯吏卒乗勝多奴虜使之輕重折辱秦吏卒吏卒多竊言曰章将軍等詐吾屬䧏諸侯今能入闗破秦大善即不能諸侯虜吾屬而東秦又盡誅吾父母妻子諸将微聞其計以告羽羽乃召英布蒲将軍計曰秦吏卒尚衆其心不服至闗不聼事必危不如擊之獨與章邯長史欣都尉翳入秦扵是夜擊阬秦軍二十餘萬人至函谷闗有兵守不得入聞沛公已屠咸陽羽大怒使當陽君擊闗羽遂入至戲西鴻門聞沛公欲王闗中獨有秦府庫珍寳亞父范增亦大怒勸羽擊沛公饗士旦日合戰羽季父項伯素善張良良時從沛公項伯夜以語良良乃與伯俱見沛公沛公因伯自解扵羽眀日沛公從百餘騎至鴻門謝羽自陳封秦府庫還軍覇上以待大王閉闗以備㓂盗不敢背徳羽意已解范增欲害沛公頼張良樊噲得免語在髙紀後數日羽乃屠咸陽殺秦䧏王子嬰焼其宮室火三月不㓕收其寳貨略婦女而東秦民失望扵是韓生説羽曰闗中阻山帯河四塞之地肥饒可都以伯羽見秦宮室皆以焼殘又懷思東歸曰富貴不歸故鄉如衣錦夜行韓生曰人謂楚人沐猴而冠果然羽聞之斬韓生初懷王與諸将約先入闗者王其地羽既背約使人致命扵懐王懐王曰如約羽乃曰懐王者吾家武信君所立耳非有功伐何以得顓主約天下初發難假立諸侯後以伐秦然身被堅執鋭首事暴露扵野三年㓕秦定天下者皆将相諸君與籍力也懷王亡功故當分其地王之諸将皆曰善羽乃陽尊懐王為義帝曰古之王者地方千里必居上㳺徙之長沙都郴乃分天下以王諸侯羽與范增疑沛公業已講解又惡背約恐諸侯叛之陰謀曰巴蜀道險秦之遷民皆居之乃曰巴蜀亦闗中地故立沛公為漢王王巴蜀漢中而參分闗中王秦䧏将以距塞漢道乃立章邯為雍王王咸陽以西長史司馬欣故櫟陽獄吏嘗有徳扵梁都尉董翳本勸章邯䧏故立欣為塞王王咸陽以東至河立翳為翟王王上郡徙魏王豹為西魏王王河東瑕邱公申陽者張耳嬖臣也先下河南迎楚河上立陽為河南王趙将司馬卬定河内數有功立卬為殷王王河内徙趙王歇王代趙相張耳素賢又從入闗立為常山王王趙地當陽君英布為楚将常冠軍立布為九江王番君吳芮帥百粤佐諸侯從入闗立芮為衡山王義帝柱國共敖将兵擊南郡功多因立為臨江王徙燕王韓廣為遼東王燕将臧荼從楚救趙因從入闗立荼為燕王徙齊王田市為膠東王齊将田都從兵救趙入闗立都為齊王故秦所㓕齊王建孫田安羽方渡河救趙安下濟北數城引兵䧏羽立安為濟北王田榮者背梁不肯助楚擊秦以故不得封陳餘棄将印去不從入闗然素聞其賢有功扵趙聞其在南皮故因環封之三縣番君将梅鋗功多故封十萬户侯羽自立為西楚伯王王梁楚九郡都彭城諸侯各就國田榮聞羽徙齊王市膠東而立田都為齊王大怒不肯遣市之膠東因以齊反迎擊都都走楚市畏羽乃亡之膠東就國榮怒追殺之即墨自立為齊王予彭越将軍印令反梁地越廼擊殺濟北王田安田榮遂并王三齊之地時漢王還定三秦項王聞漢并闗中且東齊梁畔之大怒乃以故吳令鄭昌為韓王以距漢令蕭公角等擊彭越越敗蕭公角等時張良徇韓遺項王書曰漢王失職欲得闗中如約即止不敢東又以齊梁反書遺羽羽以故無西意而北擊齊徴兵九江王布布稱疾不行使将将數千人往二年項王陰使九江王布殺義帝陳餘使張同夏説説齊王榮曰項王為天下宰不平今盡王故王扵醜地而王羣臣諸将善地逐其故主趙王廼北居代餘以為不可聞大王起兵且不聼不義願大王資餘兵使擊常山以復趙王請以國為扞蔽齊王許之因遣兵往陳餘悉三縣兵與齊併力擊常山大破之張耳走歸漢陳餘迎故趙王歇反之趙趙王因立餘為代王羽至城陽田榮亦将兵㑹戰榮不勝走至平原平原民殺之羽遂北焼夷齊城郭室屋皆阬䧏卒係虜老弱婦女徇齊至北海所過殘㓕齊人相聚而畔之扵是田榮弟横收得亡卒數萬人反城陽羽因留連戰未能下漢王劫五諸侯兵凡五十六萬人東伐楚羽聞之即令諸将擊齊而自以精兵二萬人南從魯出胡陵漢王皆已破彭城收其貨賂羙人日置酒髙㑹羽乃從蕭晨擊漢軍而東至彭城日中大破漢軍漢軍皆走迫之榖泗水漢軍皆南走山楚又追擊至靈壁東睢水上漢軍郤為楚所擠多殺漢卒十餘萬皆入睢水睢水為不流漢王乃與數十騎遁去語在髙紀太公呂后間求漢王反遇楚軍楚軍與歸羽常置軍中漢王稍收散卒蕭何發闗中卒悉詣滎陽戰京索間敗楚楚以故不能過滎陽而西漢軍滎陽築甬道取敖倉食三年羽數擊絶甬道漢王食乏請和割滎陽以西為漢羽欲聼之歴陽侯范增曰漢易與耳今不取後必悔之羽乃急圍漢滎陽漢王患之乃與陳平金四萬斤以間楚君臣語在陳平傳項王以故疑增稍奪之權范增怒曰天下事大定矣君王自為之願賜骸骨歸行未至彭城疽發背死扵是漢将紀信詐為漢王出䧏以誑楚軍故漢王得與數十騎從西門出令周苛摐公魏豹守滎陽漢王西入闗收兵還出宛葉間與九江王黥布行收兵羽聞之即引南漢王堅壁不與戰是時彭越渡睢與項聲薛公戰下邳殺薛公羽乃東擊彭越漢王亦引兵北軍成臯羽已破走彭越引兵西下滎陽城亨周苛殺摐公虜韓王信進圍成臯漢王跳獨與滕公得出北渡河至修武從張耳韓信楚遂㧞成臯漢王得韓信軍留止使盧綰劉賈渡白馬津入楚地佐彭越共擊破楚軍燕郭西焼其積聚攻下梁地十餘城羽聞之謂海春侯大司馬曹咎曰謹守成臯即漢欲挑戰慎毋與戰勿令得東而已我十五日必定梁地復從将軍扵是引兵東四年羽擊陳留外黄不下數日䧏羽悉令男子十五以上詣城東欲阬之外黄令舎人兒年十三往説羽曰彭越彊劫外黄外黄恐故且䧏待大王大王至又皆阬之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽然其言乃赦外黄當阬者而東至睢陽聞之皆争下漢果數挑楚軍戰楚軍不出使人辱之五六日大司馬怒渡兵汜水卒半渡漢擊大破之盡得楚國金玉貨賂大司馬咎長史欣皆自剄汜水上咎故蘄獄掾欣故塞王羽信任之羽至睢陽聞咎等破即引兵還漢軍方圍鍾離昧扵滎陽東羽軍至漢軍畏楚盡走險阻羽亦軍廣武相守乃為髙俎置太公其上告漢王曰今不急下吾亨太公漢王曰吾與若俱北面受命懷王約為兄弟吾翁即汝翁必欲亨廼翁幸分我一杯羹羽怒欲殺之項伯曰天下事未可知且為天下者不顧家雖殺之無益祗益怨耳羽從之乃使人謂漢王曰天下匈匈徒以吾兩人願與王挑戰决雌雄毋徒罷天下父子為也漢王笑謝曰吾寧鬪智不能闘力羽令壮士出挑戰漢有善騎射者曰樓煩楚挑戰三合樓煩輙射殺之羽大怒自被甲持㦸挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不敢復出漢王使間問之廼羽也漢王大驚羽扵是與漢王相與臨廣武間而語漢王數羽十罪語在髙紀羽怒伏弩射傷漢王漢王入成臯時彭越數反梁地絶楚糧食又韓信破齊且欲擊楚羽使從兄子項它為大将龍且為裨将救齊韓信破殺龍且追至城陽虜齊王廣信遂自立為齊王羽聞之恐使武渉往説信語在信傳時漢闗中兵益出食多羽兵食少漢王使侯公説羽羽乃與漢王約中分天下割鴻溝而西者為漢東者為楚歸漢王父母妻子已約羽解而東五年漢王進兵追羽至故陵復為羽所敗漢王用張良計致齊王信建成侯彭越兵及劉賈入楚地圍壽春大司馬周殷叛楚舉九江兵隨劉賈迎黥布與齊梁諸侯皆大㑹羽壁垓下軍少食盡漢帥諸侯兵圍之數重羽夜聞漢軍四面皆楚歌乃驚曰漢皆已得楚乎是何楚人多也起飲帳中有美人姓虞氏常幸從駿馬名騅常騎乃悲歌慷慨自為歌詩曰力㧞山兮氣葢世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何歌數曲美人和之羽泣下數行左右皆泣莫能仰視扵是羽遂上馬戲下騎從者八百餘人夜直潰圍南出馳平眀漢軍乃覺之令騎将灌嬰以五千騎追之羽渡淮騎能屬者百餘人至陰陵迷失道問一田父田父紿曰左乃陷大澤中以故漢追及之羽復引而東至東城乃有二十八騎追者數千羽自度不得脱謂其騎曰吾起兵至今八嵗矣身七十餘戰所當者破所擊者服未嘗敗北遂伯有天下然今卒困扵此此天亡我非戰之罪也今日固决死願為諸軍快戰必三勝斬将艾旗乃後死使諸君知吾非用兵罪天亡我也扵是引其騎因四隤山四下隤阤也隤徒囬反而為圜陳外嚮漢騎圍之數重羽謂其騎曰吾為公取彼一将令四面騎馳下期山東為三處扵是羽大呼馳下漢軍皆披靡遂殺漢一将是時楊喜為郎騎追羽羽叱之喜人馬俱驚辟易數里與其騎㑹三處漢軍不知羽所居分軍為三復圍之羽乃馳復斬漢一都尉殺數十百人復聚其騎亡兩騎乃謂其騎曰何如騎皆服曰如大王言扵是羽遂引東欲渡烏江烏江亭長檥船待謂羽曰江東雖小地方千里衆數十萬亦足王也願大王急渡今獨臣有船漢軍至亡以渡羽笑曰乃天亡我何渡為且籍與江東子弟八千人渡而西今亡一人還縱江東父兄憐而王我我何面目見之哉縱彼不言籍獨不愧扵心乎謂亭長曰吾知公長者也吾騎此馬五嵗所當亡敵嘗一日千里吾不忍殺以賜公乃令騎皆去馬歩持短兵接戰羽獨所殺漢軍數百人羽亦被十餘創顧見漢騎司馬呂馬童曰若非吾故人乎馬童面之面謂不面向也指王翳曰此項王也羽乃曰吾聞漢購我頭千金邑萬户吾為公得乃自剄王翳取其頭亂相輮蹈争項王相殺者數十人最後楊喜馬童郎中呂勝楊武各得其一體故分其地以封五人皆為列侯漢王乃以魯公號𦵏羽扵榖城諸項支屬皆不誅封項伯等四人為列侯賜姓劉氏張耳大梁人也少時及魏公子無忌為客嘗亡命逰外黄外黄富人女甚美庸奴其夫亡邸父客父客謂曰必欲求賢夫從張耳女聼為請决嫁之女家厚奉給耳耳以故致千里客官為外黄令陳餘亦大梁人也好儒術逰趙苦陘富人公乗氏以其女妻之餘年少父事耳相與為刎頸交髙祖為布衣時嘗從耳逰秦㓕魏購求耳千金餘五百金兩人變姓名俱之陳為里監門吏嘗以過笞餘餘欲起耳躡使受笞吏去耳數之曰始吾與公言如何今見小辱而欲死一吏乎餘謝罪陳渉起蘄至陳耳餘上謁渉渉及左右皆數聞耳餘賢見大喜陳豪桀説渉曰将軍被堅執鋭帥士卒以誅暴秦復立楚社稷功徳宜為王陳渉問兩人兩人對曰将軍瞋目張膽出萬死不顧一生之計為天下除殘今始至陳而王之視天下私碩将軍毋王急引兵而西遣人立六國後自為樹黨如此野無交兵誅暴秦據咸陽以令諸侯則帝業成矣今獨王陳恐天下解也渉不聼遂立為王耳餘復説陳王曰大王興梁楚務在入闗未及收河北也臣嘗逰趙知其豪桀碩請奇兵略趙地扵是陳王許之以所善陳人武臣為将軍耳餘為左右校尉與卒三千人從白馬渡河至諸縣説其豪桀曰秦為亂政虐刑殘㓕天下北為長城之役南有五嶺之戍外内騷動百姓罷敝頭㑹箕斂以供軍費財匱力盡重以苛法使天下父子不相聊今陳王奮臂為天下倡始莫不嚮應家自為怒各報其怨縣殺其令丞郡殺其守尉今以張大楚王陳使吳廣周文将卒百萬西擊秦扵此時而不成封侯之業者非人豪也夫因天下之力而攻無道之君報父兄之怨而成割地之業此一時也豪桀皆然其言乃行收兵得數萬人號武信君下趙十餘城餘皆城守莫肯下乃引兵東北擊范陽范陽人蒯通説其令徐公䧏武信君又説武信君以侯印封范陽令語在通傳趙地聞之不戰下者三十餘城至邯郸耳餘聞周章入闗至戲郤又聞諸将為陳王徇地多以讒毁得罪誅怨陳王不以為将軍而以為校尉乃説武臣曰陳王起蘄至陳而王非必立六國後今将軍下趙數十城獨介居河北不王無以填之且陳王聼讒還報恐不得脱扵禍願将軍毋失時武臣乃聼遂立為趙王以餘為大将軍耳為丞相使人報陳王陳王大怒欲盡族武臣等家而發兵擊趙柱國房君諌曰秦未亡今又誅武臣等家此生一秦也不如因而賀之使急引兵西擊秦陳王從其計乃徙繫武臣等家宮中封耳子敖為成都君使使者賀趙趣兵入闗耳餘説武臣曰王王趙非楚意特以計賀王楚已㓕秦必加兵扵趙碩王毋西兵北徇燕代南收河内以自廣趙南據大河北有燕代楚雖勝秦必不敢制趙趙王以為然因不西兵而使韓廣略燕李良略常山張黶略上黨韓廣至燕燕人因立廣為燕王趙王乃與耳餘北略地燕界趙王間出為燕軍所得燕囚之欲與分地使者往燕輙殺之以固求地耳餘患之有厮養卒謝其舎曰吾為二公説燕與趙王載歸舍中人皆笑曰使者往十軰皆死若何以能得王乃走燕壁燕将見之問曰知臣何欲燕将曰若欲得王耳曰君知張耳陳餘何如人也燕将曰賢人也曰其志何欲燕将曰欲得其王耳趙卒笑曰君未知兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城亦各欲南面而王夫臣之與主豈可同日道哉顧其勢初定且以長少先立武臣以持趙心今趙地已服兩人亦欲分趙而王時未可耳今君囚趙王念此兩人名為求王實欲燕殺之乃分趙而王夫以一趙尚易燕况以兩賢王左提右挈而責殺王㓕燕易矣燕以為然乃歸趙王養卒為御而歸李良已定常山還報趙王趙王復使良略太原良至石邑秦兵塞井陘未能前秦将詐稱二世使使遺良書不封曰良嘗事我得顯幸誠能反趙為秦赦良罪貴良良得書疑不信之邯鄲益請兵未至道逢趙王姊從百餘騎良望見以為王伏謁道旁王姊醉不知其将使騎謝良良素貴起慚其從官從官有一人曰天下叛秦能者先立且趙王素出将軍下今兒女乃不為将軍下車請追殺之良以得秦書欲反趙未决因此怒遣人追殺王姊遂襲邯鄲邯鄲不知竟殺武臣趙人多為耳餘耳目者故得脱出收兵得數萬人客有説耳餘曰兩君覊旅而欲附趙難可獨立立趙後輔以誼可就功乃求得趙歇立為趙王居信都李良進兵擊餘餘敗良良走歸章邯章邯引兵至邯鄲皆徙其民河内夷其城郭耳與趙王歇走入鉅鹿城王離圍之餘北收常山兵得數萬人軍鉅鹿北章邯軍鉅鹿南棘原築甬道屬河饟王離王離兵食多急攻鉅鹿鉅鹿城中食盡耳數使人召餘餘自度兵少不能敵秦不敢前數月耳大怒怨餘使張黶陳釋往譲餘曰始吾與公為刎頸交今王與耳旦暮死而公擁兵數萬不肯相救胡不赴秦俱死且什有一二相全餘曰所以不俱死欲為趙王張君報秦今俱死如以肉餧虎何益張黶陳釋曰事以急要以俱死立信安知後慮餘曰吾顧以無益乃使五千人令張黶陳釋先嘗秦軍至皆沒當是時燕齊楚聞趙急皆來救張敖亦北收代得萬餘人來皆壁餘旁項羽兵數絶章邯甬道王離軍乏食項羽悉引兵渡河破章邯軍諸侯軍乃敢擊秦軍遂虜王離扵是趙王歇張耳得出鉅鹿與餘相見責譲餘問張黶陳釋所在餘曰黶釋以必死責臣臣使将五千人先嘗秦軍皆沒耳不信以為殺之數問餘餘怒曰不意君之望臣深也豈以臣重去将哉乃脱解印綬與耳耳不敢受餘起如厠客有説耳曰天予不取反受其咎今陳将軍與将軍印綬不受反天不祥急取之耳乃佩其印收其麾下餘還亦望耳耳不譲趨出耳遂收其兵餘獨與麾下數百人之河上澤中漁獵由此耳餘遂有隙趙王歇復居信都耳從項羽入闗項羽立諸侯耳雅逰多為人所稱羽亦素聞耳賢乃分趙立耳為常山王治信都信都更名㐮國餘客多説項羽陳餘張耳一體有功扵趙羽以餘不從入闗聞其在南皮即以南皮旁三縣封之而徙趙王歇王代耳之國餘愈怒曰耳與餘功等也今耳王餘獨侯及齊王田榮叛楚餘乃使夏説説田榮曰項王為天下宰不平盡王諸将善地徙故王王惡地今趙王乃居代碩王假臣兵請以南皮為扞蔽田榮欲樹黨乃遣兵從餘餘悉三縣兵襲常山王耳耳敗走曰漢王與我有故而項王彊立我我欲之楚甘公曰漢王之入闗五星聚東井東井者秦分也先至必王楚雖彊後必屬漢耳走漢漢亦還定三秦方圍章邯廢邱耳謁漢王漢王厚遇之餘已敗耳皆收趙地迎趙王扵代復為趙王趙王徳餘立以為代王餘為趙王弱國初定留傅趙王而使夏説以相國守代漢二年東擊楚使告趙欲與俱餘曰漢殺張耳乃從扵是漢求人類耳者斬其頭遺餘餘乃遣兵助漢漢敗扵彭城西餘亦聞耳詐死即背漢漢遣耳與韓信擊破趙井陘斬餘泜水上追殺趙王歇扵㐮國四年夏立耳為趙王五年秋耳薨諡曰景王子敖嗣立為王尚髙祖長女魯元公主為王后七年髙祖從平城過趙趙王旦暮自上食體甚卑有子壻禮髙祖箕踞罵詈甚慢之趙相貫髙趙午年六十餘故耳客也怒曰吾王孱王也説敖曰天下豪桀並起能者先立今王事皇帝甚㳟皇帝遇王無禮請為王殺之敖齧其指出血曰君何言之誤且先王亡國頼皇帝得復國徳流子孫秋豪皆帝力也碩君無復出口貫髙等十餘人相謂曰吾等非也吾王長者不背徳且吾等義不辱今帝辱我王故欲殺之何乃汙王為事成歸王事敗獨身坐耳八年上從東垣過貫髙等乃壁人柏人要之置厠上過欲宿心動問曰縣名為何曰柏人上曰迫人者迫扵人不宿去九年貫髙怨家知其謀告之扵是上逮捕趙王諸反者趙午等十餘人皆争自剄貫髙獨怒罵曰誰令公等為之今王實無謀而并捕王公等死誰當白王不反者乃檻車與王詣長安髙對獄曰獨吾屬為之王不知也吏榜笞數千刺爇身無完膚者終不復言呂后數言張王以魯元故不宜有此上怒曰使張敖據天下豈少乃女乎廷尉以貫髙辭聞上曰壮士誰知者以私問之中大夫泄公曰臣素知之此固趙國立義不輕為然諾者也上使泄公持節問之箯輿前卬視泄公勞苦如平生歡與語問張王果有謀不髙曰人情豈不各愛其父母妻子哉今吾三族皆以論死豈以王易吾親哉顧為王實不反獨吾等為之具道本根所以王不知状扵是泄公具以報上上乃赦趙王上賢髙能自立然諾使泄公赦之告曰張王已出上多足下故赦足下髙曰所以不死白張王不反耳今王已出吾責塞矣且人臣有篡弑之名豈有面目復事上哉乃仰絶亢下郎反喉也而死敖已出尚魯元公主如故封為宣平侯扵是上賢張王諸客皆以為諸侯相郡守語在田叔傳及孝惠髙后文景時張王客子孫皆為二千石初孝惠時齊悼惠王獻城陽郡尊魯元公主為太后髙后元年魯元太后薨後六年宣平侯敖薨呂太后立敖子偃為魯王以母為太后故也又憐其年少孤弱乃封敖前婦子二人壽為樂昌侯侈為信都侯髙后崩大臣誅諸呂廢魯王及二侯孝文即位復封故魯王偃為南宮侯薨子生嗣武帝時生有罪免國除元光中復封偃孫廣國為睢陵侯薨子昌嗣太初中昌坐不敬免國除孝平元始二年繼絶世封敖元孫慶忌為宣平侯食千戸魏豹故魏諸公子也其兄魏咎故魏時封為甯陵君秦㓕魏為庶人陳勝之王也咎往從之勝使魏人周市徇魏地魏地已下欲立周市為魏王市曰天下昬亂忠臣乃見今天下共畔秦其誼必立魏王後乃可齊趙使車各五千乗立市為王市不受迎咎扵陳五反陳王乃遣立咎為魏王章邯已破陳王進兵擊魏王扵臨濟魏王使周市請救齊楚齊楚遣項它田巴将兵隨市救魏章邯遂擊破殺周市等軍圍臨濟咎為其民約䧏約䧏定咎自殺魏豹亡走楚楚懐王與豹數千人復徇魏地項羽已破秦兵䧏章邯豹下魏二十餘城立為魏王豹引精兵從項羽入闗羽封諸侯欲有梁地乃徙豹扵河東都平陽為西魏王漢王還定三秦渡臨晉豹以國屬焉遂從擊楚扵彭城漢王敗還至滎陽豹請視親病至國則絶河津叛漢漢王謂酈生曰緩頬往説之酈生往豹謝曰人生一世間如白駒過隙今漢王嫚侮人罵詈諸侯羣臣如奴耳非有上下禮節吾不忍復見也漢王遣韓信擊豹虜之傳豹詣滎陽以其地為河東太原上黨郡漢王令豹守滎陽楚圍之急周苛曰反國之王難與共守遂殺豹田儋狄人也故齊王田氏之族也儋從弟榮榮弟横皆豪桀宗彊能得人陳渉使周市略地北至狄狄城守儋陽為縛其奴從少年之廷欲謁殺奴見狄令因擊殺令而召豪吏子弟曰諸侯皆反秦自立齊古之建國儋田氏當王遂自立為齊王發兵擊周市市軍還去儋因率兵東略定齊地秦将章邯圍魏王咎扵臨濟急魏王請救扵齊儋将兵救魏章邯夜銜枚擊大破齊楚軍殺儋扵臨濟下儋從弟榮收儋餘兵東走東阿齊人聞儋死乃立故齊王建之弟田假為王田角為相田閒為将以距諸侯榮之走東阿章邯追圍之項梁聞榮急乃引兵擊破章邯東阿下章邯走而西項梁因追之而榮怒齊之立假乃引兵歸擊逐假假亡走楚相角亡走趙角弟閒前救趙因不敢歸榮乃立儋子市為王榮相之横為将平齊地項梁既追章邯章邯兵益盛項梁使使趣齊兵共擊章邯榮曰楚殺田假趙殺角間乃出兵楚懐王曰田假與國之王窮而歸我殺之不誼趙亦不殺角閒以市扵齊齊王曰蝮蠚火客反手則斬手蠚足則斬足何者為害扵身也田假田角田閒扵楚趙非手足戚何故不殺且秦復得志扵天下則齮音螘齕音紇首用事者墳墓矣楚趙不聼齊齊亦怒終不肯出兵章邯果敗殺項梁破楚兵楚兵東走而章邯渡河圍趙扵鉅鹿項羽由此怨榮羽既存趙䧏章邯西㓕秦立諸侯王乃徙齊王市更王膠東治即墨齊将田都從共救趙因入闗故立都為齊王治臨菑故齊王建孫田安項羽方渡河救趙安下濟北數城引兵䧏項羽羽立安為濟北王治愽陽榮以負項梁不肯助楚攻秦故不得王趙将陳餘亦失職不得王二人俱怨項羽榮使人将兵助陳餘令反趙地而榮亦發兵以距擊田都都亡走楚榮留齊王市毋之膠東市左右曰項王彊暴王不就國必危市懼乃亡就國榮怒追擊殺市扵即墨還攻殺濟北王安自立為王盡并三齊之地項王聞之大怒乃北伐齊榮發兵距之城陽榮兵敗走平原平原民殺榮項羽遂焼夷齊城郭所過盡屠破齊人相聚畔之榮弟横收齊散兵得數萬人反擊項羽扵城陽而漢王帥諸侯敗楚入彭城項羽聞之乃釋齊而歸擊漢扵彭城因連與漢戰相距滎陽以故横復收齊城邑立榮子廣為王而横相之政事無巨細皆斷扵横相齊三年聞漢将韓信引兵且東擊齊齊使華毋傷田解軍歴下以距漢㑹漢使酈食其往説王廣及相横與連和横然之乃罷歴下守備縱酒且遣使與漢平韓信乃渡平原襲破齊歴下軍因入臨菑王廣相横以酈生為賣己而亨之廣東走髙密横走愽守相田光走城陽将軍田既軍扵膠東楚使龍且救齊齊王與合軍髙密漢将韓信曹參破殺龍且虜齊王廣漢将灌嬰追得守相光至愽而横聞廣死乃自立為王還擊嬰嬰敗横軍扵嬴下横亡走梁歸彭越越時居梁地中立且為漢且為楚韓信已殺龍且因進兵破殺田既扵膠東灌嬰破殺齊将田吸扵千乗遂平齊地漢㓕項籍漢王立為皇帝彭越為梁王横懼誅而與其徒屬五百餘人入海居隝中髙帝聞之以横兄弟本定齊齊人賢者多附焉今在海中不收後恐有亂乃使使赦横罪而召之横謝曰臣亨陛下之使酈食其今聞其弟商為漢将而賢臣懼不敢奉詔請為庶人守海隖中使還報髙帝乃詔衛尉酈商曰齊王横即至人馬從者敢動摇者致族夷乃復使使持節具告以詔意曰横來大者王小者乃侯耳不來且𤼵兵加誅横乃與其客二人乗傳詣雒陽至尸鄉廐置横謝使者曰人臣見天子當洗沐止留謂其客曰横始與漢王俱南面稱孤今漢王為天子而横乃為亡虜北面事之其媿固已甚矣又吾亨人之兄與其弟併肩而事主縱彼畏天子之詔不敢動摇我我獨不媿扵心乎且陛下所以欲見我不過欲壹見我面貎耳陛下在雒陽今斬吾頭馳三十里間形容尚未能敗猶可知也遂自剄令客奉其頭從使者馳奏之髙帝帝曰嗟乎有以起布衣兄弟三人更王豈非賢哉為之流涕而拜其二客為都尉發卒二千以王者禮𦵏横既𦵏二客穿其冢旁皆自剄從之髙帝聞而大驚以横之客皆賢者吾聞其餘尚五百人在海中使使召至聞横死亦皆自殺扵是乃知田横兄弟能得士也韓王信故韓㐮王孽孫也長八尺五寸項梁立楚懷王燕齊趙魏皆已前王唯韓無有後故立韓公子横陽君成為韓王欲以撫定韓地項梁死定陶成奔懐王沛公引兵擊陽城使張良以韓司徒徇韓地得信以為韓将将其兵從入武闗沛公為漢王信從入漢中乃説漢王曰項王王諸将王獨居此遷也士卒皆山東人竦而望歸及其蠭東鄉可以争天下漢王還定三秦乃許王信先拜為韓太尉将兵略韓地項籍之封諸王皆就國韓王成以不從無功不遣之國更封為穣侯後又殺之聞漢遣信略韓地乃令故籍㳺吳時令鄭昌為韓王拒漢漢二年信略定韓地十餘城漢王至河南信急擊韓王昌昌䧏漢乃立信為韓王常将韓兵從漢王使信與周苛守滎陽楚㧞之信䧏楚已得亡歸漢漢復以為韓王竟從擊破項籍五年春與信剖符王潁川六年春上以為信壮武北近鞏雒南迫宛葉東有淮陽皆天下勁兵處也乃更以太原郡為韓國徙信以備胡都晉陽信上書曰國被邉匈奴數入晉陽去塞逺請治馬邑上許之秋匈奴冒頓大入圍信信數使使胡求和解漢發兵救之疑信數間使有二心上賜信書責譲之曰專死不勇專生不仁㓂攻馬邑君王力不足以堅守乎安危存仁之地此二者朕所以責扵君王信得書恐誅因與匈奴約共攻漢以馬邑䧏胡擊太原七年冬上自往擊破信軍銅鞮斬其将王喜信亡走匈奴與其将白土人曼邱臣王黄立趙苖裔趙利為王復收信散兵而與信及冒頓謀攻漢匈奴使左右賢王将萬餘騎與王黄等屯廣武以南至晉陽與漢兵戰漢兵大破之追至于離石復破之匈奴復聚兵樓煩西北漢令車騎擊匈奴常敗走漢乗勝追北聞冒頓居代谷上居晉陽使人視冒頓還報曰可擊上遂至平城上白登匈奴騎圍上上乃使人厚遺閼氏閼氏説冒頓曰今得漢地猶不能居且兩主不相戹居七日胡騎稍稍引去天霧漢使人往來胡不覺䕶軍中尉陳平曰胡者全兵請令彊弩傅兩矢外嚮徐行出圍入平城漢救兵已至胡騎遂解去漢已罷兵歸信為匈奴将兵往來擊邉令王黄等説誤陳豨十一年春信復與胡騎入居參合漢使柴将軍擊之遺信書曰陛下寛仁諸侯雖有叛亡而復歸輙復故位號不誅也大王所知今王以敗亡走胡非有大罪急自歸信報曰陛下擢僕閭巷南面稱孤此僕之幸也滎陽之事僕不能死囚扵項籍此一罪也㓂攻馬邑僕不能堅守以城䧏之此二罪也今為反㓂與将軍争一旦之命此三罪也夫種蠡無一罪身死亡僕有三罪而欲求活此伍子胥所以僨扵吳世也今僕亡匿山谷間旦暮乞貣蠻夷僕之思歸如痿人不忘起盲者不忘視勢不可耳遂戰柴将軍屠參合斬信信之入匈奴與太子俱及至穨當城生子因名曰穨當韓太子亦生子嬰至孝文時穨當及嬰率其衆䧏漢封穨當為弓髙侯嬰為㐮城侯吳楚反時弓髙侯功冠扵諸将傳子至孫無子國絶嬰孫以不敬失侯穨當孽孫嫣貴幸名顯當世嫣弟説以校尉擊匈奴封龍頟侯後坐酎金失侯復以待詔為横海将軍擊破東越封按道侯太初中為㳺擊将軍屯五原外列城還為光禄勲掘蠱太子宮為太子所殺子興嗣坐巫蠱誅上曰㳺擊将軍死事無論坐者乃復封興弟增為龍頟侯增少為郎諸曹侍中光禄大夫昭帝時至前将軍與大将軍霍光定策立宣帝益封千户本始二年五将征匈奴增将三萬騎出雲中斬首百餘級至期而還神爵元年代張安世為大司馬車騎将軍領尚書事増世貴㓜為忠臣事三主重扵朝廷為人寛和自守以温顔遜辭承上接下無所失意保身固寵不能有所建眀五鳳二年薨諡曰安侯子寳嗣亡子國除成帝時繼功臣後封增兄子岑為龍頟侯薨子持弓嗣王莽敗乃絶韓信淮陰人也家貧無行不得推擇為吏又不能治生為商賈常從人寄食母死無以𦵏乃行營髙燥地令傍可置萬家者信從下鄉南昌亭長食亭長妻苦之乃晨炊蓐食食時信往不為具食信亦知其意自絶去至城下釣有一漂母哀之飯信竟漂數十日信謂漂母曰吾必重報母母怒曰大丈夫不能自食吾哀王孫而進食豈望報乎淮陰少年又侮信曰若雖長大好帯刀劒怯耳衆辱信曰能死刺我不能出我跨下扵是信熟視俛出跨下一市皆笑信以為怯及項梁渡淮信乃杖劒從之居戲下無所知名梁敗又屬項羽為郎中信數以策干項羽羽弗用漢王之入蜀信亡楚歸漢未得知名為連敖坐法當斬其疇十三人皆已斬至信信乃仰視適見滕公曰上不欲就天下乎而斬壮士滕公奇其言壮其貎釋弗斬與語大説之言扵漢王以為治粟都尉上未奇之也數與蕭何語何奇之至南鄭諸将道亡者數十人信度何等已數言上不我用即亡何聞信亡不及以聞自追之人有言上曰丞相何亡上大怒如失左右手居一二日何來謁上且怒且喜罵何曰若亡何也何曰臣非敢亡追亡者耳上曰所追者誰也曰韓信上復罵曰諸将亡者以數十公無所追追信詐也何曰諸将易得至如信國士無䨇王必欲長王漢中無所事信必欲争天下非信無可與計事者顧王策安决王曰吾亦欲東耳安能鬱鬱居此乎何曰王計必東能用信信即留不能用信信終亡耳王曰吾為公以為将何曰雖為将信不留王曰以為大将何曰幸甚扵是王欲召信拜之何曰王素嫚無禮今拜大将如呼小兒此乃信所以去也王必欲拜之擇日齋戒設壇場具禮乃可王許之諸将皆喜人人自以為得大将至拜乃韓信也一軍皆驚信已拜上坐王曰丞相數言将軍将軍何以教寡人計策信謝因問王曰今東鄉争權天下豈非項王邪上曰然信曰大王自料勇悍仁彊孰與項王漢王黙然良久曰弗如也信再拜賀曰唯信亦以為大王弗如也然臣嘗事項王請言項王之為人也項王音烏猝嗟千人皆廢然不能任屬賢将此特匹夫之勇也項王見人恭謹言語姁姁人有疾病涕泣分飲食至使人有功當封爵刻印刓忍不能予此所謂婦人之仁也項王雖霸天下而臣諸侯不居闗中而都彭城又背義帝約而以親愛王諸侯不平諸侯之見項王逐義帝江南亦皆歸逐其主自王善地項王所過亡不殘㓕多怨百姓百姓不附特刼扵威彊服耳名雖為霸實失天下心故曰其彊易弱今大王誠能反其道任天下武勇何不誅以天下城邑封功臣何不服以義兵從思東歸之士何不散且三秦王為秦将将秦子弟數嵗而所殺亡不可勝計又欺其衆䧏諸侯至新安項王詐坑秦䧏卒二十餘萬人唯獨邯欣翳脱秦父兄怨此三人痛入骨髓今楚彊以威王此三人秦民莫愛也大王之入武闗秋毫亡所害除秦苛法與民約法三章耳秦民亡不欲得大王王秦者扵諸侯之約大王當王闗中闗中民户知之王失職之蜀民亡不恨者今王舉而東三秦可傳檄而定也扵是漢王大喜自以為得信晚遂聼信計部署諸将所擊漢王舉兵東出陳倉定三秦二年出闗收魏河南韓殷王皆䧏令齊趙共擊楚彭城漢兵敗散而還信復𤼵兵與漢王㑹滎陽復擊破楚京索間以故楚兵不能西漢之敗郤彭城塞王欣翟王翳亡漢䧏楚齊趙魏亦皆反與楚和漢王使酈生往説魏王豹豹不聼乃以信為左丞相擊魏信問酈生魏得毋用周叔為大将乎曰柏直也信曰豎子耳遂進兵擊魏魏盛兵蒲坂塞臨晉信乃益為疑兵陳船欲渡臨晉而伏兵從夏陽以木罌缶渡軍襲安邑魏王豹驚引兵迎信信遂虜豹定河東使人請漢王碩益兵三萬人臣請以北舉燕趙東擊齊南絶楚之糧道西與大王㑹扵滎陽漢王與兵三萬人遣張耳與俱進擊趙代破代禽夏説閼與信之下魏代漢輙使人收其精兵詣滎陽以距楚信耳以兵數萬欲東下井陘擊趙趙王成安君陳餘聞漢且襲之聚兵井陘口號稱二十萬廣武君李左車説成安君曰聞漢将韓信渉西河虜魏王禽夏説新喋血閼與今乃輔以張耳議欲以下趙此乗勝而去國逺鬪其鋒不可當臣聞千里餽糧士有飢色樵蘇後爨師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後碩足下假臣奇兵三萬人從間路絶其輜重足下深溝髙壘勿與戰彼前不得闘退不得還吾奇兵絶其後野無所掠鹵不十日兩将之頭可致戲下碩君留意臣之計否必為二子所禽矣成安君儒者常稱義兵不用詐謀奇計謂曰吾聞兵法什則圍之倍則戰今韓信兵號數萬其實不能千里襲我亦以罷矣今如此避弗擊後有大者何以距之諸侯謂吾怯而輕來伐我不聼廣武君策信使間人窺知其不用還報則大喜乃敢引兵遂下未出井陘口三十里止舎夜半傳發選輕騎二千人人持一赤幟從間道萆音蔽山而望趙軍戒曰趙見我走必空壁逐我若疾入趙壁㧞趙幟立漢幟令其裨将傳餐曰今日破趙㑹食諸将皆嘸然陽應曰諾信謂軍吏曰趙已先據便地壁且彼未見大将旗鼓未肯擊前行恐吾阻險而還信乃使萬人先行出背水陣趙兵望見大笑平旦信建大将旗鼓鼓行出井陘口趙開壁擊之大戰良久扵是信張耳棄鼓旗走水上軍復疾戰趙空壁争漢鼓旗逐信耳信耳已入水上軍軍皆殊死戰不可敗信所出奇兵二千騎者候趙空壁逐利即馳入趙壁皆㧞趙旗幟立漢赤幟二千趙軍已不能得信耳等欲還歸壁壁皆漢赤幟大驚以漢為皆已破趙王将矣遂亂遁走趙将雖斬之弗能禁扵是漢兵夾擊破虜趙軍斬成安君泜水上禽趙王歇信乃令軍毋殺廣武君有生得之者購千金頃之有縛而至戲下者信解其縛東鄉坐西鄉對而師事之諸校効首虜休皆賀因問信曰兵法有右背山陵前左水澤今者将軍令臣等反背水陳曰破趙㑹食臣等不服然竟以勝此何術也信曰此在兵法顧諸君弗察耳兵法不曰陷之死地而後生投之亡地而後存乎且信非得素拊循士大夫經所謂敺市人而戰之也其勢非置死地使人人自為戰今即予生地皆走寧尚得而用之乎諸将皆服曰非所及也扵是問廣武君曰僕欲北攻燕東伐齊何若有功廣武君辭曰臣聞亡國之大夫不可以圗存敗軍之将不可以語勇若臣者何足以權大事乎信曰僕聞之百里奚居虞而虞亡之秦而秦伯非愚扵虞而智扵秦也用與不用聼與不聼耳向使成安君聼子計僕亦禽矣僕委心歸計碩子勿辭廣武君曰臣聞智者千慮必有一失愚者千慮亦有一得故曰狂夫之言聖人擇焉顧恐臣計未足用碩効愚忠故成安君有百戰百勝之計一日而失之軍敗鄗下身死泜水上令足下虜魏王禽夏説不旬朝破趙二十萬衆誅成安君名聞海内威震諸侯衆庶莫不輟作怠惰靡衣媮食傾耳以待命者然而衆勞卒罷其實難用也今足下欲舉勌敝之兵頓之燕堅城之下情見力屈欲戰不㧞曠日持久糧食單竭若燕不破齊必距境而以自彊二國相持則劉項之權未有所分也臣愚竊以為過矣信曰然則何由廣武君對曰當今之計不如按甲休兵百里之内牛酒日至以饗士大夫北首燕路然後發一乗之使奉咫尺之書以使燕燕必不敢不聼從燕而東臨齊雖有智者亦不知為齊計矣如是則天下事可圗也兵故有先聲而後實者此之謂也信曰善敬奉教扵是用廣武君策發使燕燕從風而靡乃遣使報漢因請立張耳王趙以撫其國漢王許之楚數使奇兵渡河擊趙王耳信往來救趙因行定趙城邑發卒佐漢楚方急圍漢王滎陽漢王出南之宛葉得九江王布入成臯楚復急圍之四年漢王出成臯渡河獨與滕公從張耳軍修武至宿傳舎晨自稱漢使馳入趙壁張耳韓信未起即其卧奪其印符麾召諸将易置之信耳起乃知獨漢王來大驚漢王奪兩人軍即令張耳備守趙地拜信為相國發趙兵未𤼵者擊齊信引兵東未渡平原聞漢王使酈食其已説下齊信欲止蒯通説信令擊齊語在通傳信然其計遂渡河襲歴下軍至臨菑齊王走髙密使使扵楚請救信已定臨菑東追至髙密西楚使龍且将號稱二十萬救齊齊王與龍且并軍與信戰未合或説龍且曰漢兵逺闘窮㓂久戰鋒不可當也齊楚自居其地戰兵易敗散不如深壁令齊王使其信臣招所亡城城聞王在楚來救必反漢漢兵二千里客居齊齊誠皆反之其勢無所得食可毋戰而䧏也龍且曰吾平生知韓信為人易與耳寄食扵漂母無資身之策受辱扵跨下無兼人之勇不足畏也且救齊而䧏之吾何功今戰而勝之齊半可得何為而止遂戰與信夾濰水陳信乃夜令人為萬餘嚢盛沙以壅水上流引兵半渡擊龍且陽不勝還走龍且果喜曰固知信怯遂追渡水信使人决壅嚢水大至龍且軍大半不得渡即急擊殺龍且龍且水東軍散走齊王廣亡去信追北至城陽虜廣楚卒皆䧏遂平齊使人言漢王曰齊夸詐多變反覆之國南邉楚不為假王填之其勢不定今權輕不足以安之臣請自立為假王當是時楚方急圍漢王扵滎陽使者至發書漢王大怒罵曰吾困扵此旦暮望而來佐我乃欲自立為王張良陳平伏後躡漢王足因附耳語曰漢方不利寕能禁信之自王乎不如因立善遇之使自為守不然變生漢王亦寤因復罵曰大丈夫定諸侯即為真王耳何以假為遣張良立信為齊王徵其兵使擊楚楚已亡龍且項王恐使盱台人武渉往説信曰足下何不反漢與楚楚王與足下有舊故且漢王不可必身居項王掌握中數矣然得脱背約復擊項王其不可親信如此今足下雖自以為與漢王為金石交然終為漢王所禽矣足下所以得須臾至今者以項王在項王即亡次取足下足下何不與楚連和三分天下而王齊今釋此時自必與漢王以擊楚其為智者固若此邪信謝曰臣得事項王數年官不過郎中位不過執㦸言不聼畫策不用故背楚歸漢漢王授我上将軍印數萬之衆解衣衣我推食食我言聼計用吾得以至扵此夫人深親信我背之不祥幸為信謝項王武渉已去蒯通知天下權在扵信深説以三分天下鼎足而王語在通傳信不忍背漢又自以功大漢王不奪我齊遂不聼漢王之敗固陵用張良計徵信将兵㑹垓下項羽死髙祖襲奪信軍徙信為楚王都下邳信至國召所從食漂母賜千金及下鄉亭長錢百曰公小人為徳不竟召辱已少年令出跨下者以為中尉告諸将相曰此壮士也方辱我時寧不能死死之無名故忍而就此項王亡将鍾離昧家在伊廬素與信善項王敗昧亡歸信漢怨昧聞在楚詔楚捕之信初之國行縣邑陳兵出入有變告信欲反書聞上患之用陳平謀偽㳺扵雲夢者實欲襲信信弗知髙祖且至楚信欲發兵自度無罪欲謁上恐見禽人或説信曰斬昧謁上上必喜亡患信見昧計事昧曰漢所以不擊取楚以昧在公若欲捕我自媚漢吾今死公隨手亡矣乃罵信曰公非長者卒自剄信持其首謁扵陳帝令武士縛信載後車信曰果若人言狡兔死良狗亨上曰人告公反遂械信至雒陽赦以為淮陰侯信知漢畏惡其能稱疾不朝從由此日怨望心常鞅鞅羞與綘灌等列嘗過樊将軍噲噲趍拜送迎言稱臣曰大王乃肯臨臣信出門笑曰生乃與噲等為伍上嘗從容與信言諸将能各有差上問曰如我能将幾何信曰陛下不過能将十萬上曰于公何如曰如臣多多益善耳上笑曰多多益善何為為我禽信曰陛下不能将兵而善将将此乃信之為陛下禽也且陛下所謂天授非人力也後陳豨為代相監邉辭信信挈其手與歩扵庭數匝仰天而嘆曰子可與言乎吾欲與子有言豨因曰唯将軍命信曰公之所居天下精兵處也而公陛下之信幸臣也人言公反陛下必不信再至陛下乃疑三至必怒而自将吾為公從中起天下可圗也陳豨素知其能信之曰謹奉教漢十年豨果反髙帝自将而往信稱病不從陰使人至豨所而與家臣謀夜詐赦諸官徒奴發兵襲呂后太子部署已定待豨報其舎人得罪信信囚欲殺之舎人弟上書變告信欲反状扵呂后呂后欲召恐其黨不就乃與蕭相國謀詐令人從帝所來稱豨已破羣臣皆賀相國紿信曰雖病彊入賀信入呂后使武士縛信斬之長樂鐘室信方斬曰吾不用蒯通計反為兒女子所詐豈非天哉遂夷信三族髙祖已破豨歸至聞信死且喜且哀之問曰信死亦何言呂后道其語髙祖曰此齊辯士蒯通也召欲亨之通至自説釋弗誅語在通傳彭越字仲昌邑人也常漁鉅野澤中為盗陳勝起或謂越曰豪桀相立畔秦仲可効之越曰兩龍方闘且待之居嵗餘澤間少年相聚百餘人往從越請仲為長越謝不碩也少年彊請乃許與期旦日日出時後㑹者斬旦日日出十餘人後後者至日中扵是越謝曰臣老諸君彊以為長今期而多後不可盡誅誅最後者一人令校長斬之皆笑曰何至是請後不敢扵是越乃引一人斬之設壇祭令徒屬徒屬皆驚畏越不敢仰視乃行略地收諸侯散卒得千餘人沛公之從碭北擊昌邑越助之昌邑未下沛公引兵西越亦将其衆居鉅野澤中收魏敗散卒項籍入闗王諸侯還歸越衆萬餘人無所屬齊王田榮叛項王漢乃使人賜越将軍印使下濟陰以擊楚楚令蕭公角将兵擊越越大破楚軍漢二年春與魏豹及諸侯東擊楚越将其兵三萬餘人歸漢外黄漢王曰彭将軍收魏地得十餘城欲急立魏後今西魏王豹魏咎從弟真魏也乃拜越為魏相國擅将兵略定梁地漢王之敗彭城解而西也越皆亡其所下城獨将其兵北居河上漢三年越常往來為漢㳺兵擊楚絶其糧扵梁地項王與漢王相距滎陽越攻下睢陽外黄十七城項王聞之乃使曹咎守成臯自東收越所下城邑皆復為楚越将其兵北走榖城項王南走陽夏越復下昌邑旁二十餘城得粟十餘萬斛以給漢食漢王數使使召越并力擊楚越曰魏地初定尚畏楚未可去漢王追楚為籍所敗固陵乃謂留侯曰諸侯兵不從為之奈何留侯曰彭越本定梁地功多始君王以魏豹故拜越為相國今豹死亡後且越亦欲王而君王不蚤定今取睢陽以北至榖城皆許以王彭越又言所以許韓信語在髙紀扵是漢王發使使越如留侯策使者至越乃引兵㑹垓下項籍死立越為梁王都定陶六年朝陳九年十年皆來朝長安陳豨反代地髙帝自往擊之至邯鄲徵兵梁梁王稱病使使将兵詣邯鄲髙帝怒使人譲梁王梁王恐欲自往謝其将扈輙曰王始不往見譲而往往即為禽不如遂發兵反梁王不聼稱病梁太僕有罪亡走漢告梁王與扈輙謀反扵是上使使掩捕梁王囚之雒陽有司治反形已具請論如法上赦以為庶人徙蜀青衣西至鄭逢呂后從長安東欲之雒陽道見越越為呂后涕泣自言亡罪碩處故昌邑呂后許諾與俱東至雒陽呂后言上曰彭越壮士也今徙之蜀此自遺患不如遂誅之妾謹與俱來扵是呂后令其舎人告越復謀反廷尉奏請遂夷越宗族黥布六人也姓英氏少時客相之當刑而王及壮坐法黥布欣然笑曰人相我當刑而王幾是乎人有聞者共戲笑之布以論輸驪山驪山之徒數十萬人布皆與其徒長豪桀交通乃率其曹耦亡之江中為羣盗陳勝之起也布乃見番君其衆數千人番君以女妻之章邯之㓕陳勝破呂臣軍布引兵北擊秦左右校破之青波引兵而東聞項梁定㑹稽西渡淮布以兵屬梁梁西擊景駒秦嘉等布嘗冠軍項梁聞陳渉死立楚懐王以布為當陽君項梁敗死懐王與布及諸侯将皆軍彭城當是時秦急圍趙趙數使人請救懐王懐王使宋義為上将軍項籍與布皆屬之北救趙及籍殺宋義扵河上自立為上将軍使布先渉河擊秦軍數有利籍乃悉引兵從之遂破秦軍䧏章邯等楚兵常勝功冠諸侯諸侯兵皆服屬楚者以布數以少敗衆也項籍之引兵西至新安又使布等夜擊阬章邯秦卒二十餘萬人至闗不得入又使布等先從間道破闗下軍遂得入至咸陽布為前鋒項王封諸侯立布為九江王都六尊懐王為義帝徙都長沙廼陰令布擊之布使将追殺之郴齊王田榮叛楚項王往擊齊徵兵九江布稱病不往遣将将數千人行漢之敗楚彭城布又稱病不佐楚項王由此怨布數使使者譙譲責布布愈恐不敢往項王方北憂齊趙西患漢所與者獨布又多其材欲親用之以故未擊漢王與楚大戰彭城不利出梁地至虞謂左右曰如彼等者無足與計天下事者謁者隨何進曰不審陛下所謂漢王曰孰能為我使淮南使之發兵背楚留項王扵齊數月我之取天下可以萬全隨何曰臣請使之乃與二十人俱使淮南至太宰主之三日不得見隨何因説太宰曰王之不見何必以楚為彊以漢為弱此臣之所為使使何得見言之而是邪是大王所欲聞也言之而非邪使何等二十人伏斧鑕淮南市以眀背漢而與楚也太宰乃言之王王見之隨何曰漢王使使臣敬進書大王御者竊怪大王與楚何親也淮南王曰寡人北郷而臣事之隨何曰大王與楚俱列為諸侯北鄉而臣事之必以楚為彊可以託國也項王伐齊身負版築以為士卒先大王宜悉淮南之衆身自将為楚軍前鋒今乃發四千人助楚夫北面而臣事人者固若是乎夫漢王戰扵彭城項王未出齊也大王宜埽淮南之衆日夜㑹戰彭城城下今撫萬人之衆無一士渡淮者垂拱而觀其孰勝夫託國扵人者固若是乎大王提空名以嚮楚而欲厚自託臣竊為大王不取也然大王不背楚者以漢為弱也夫楚兵雖彊天下負之以不義之名以其背眀約而殺義帝也然而楚王特以戰勝自彊漢王收諸侯還守成臯滎陽下蜀漢之粟深溝髙壘分卒守徼乗塞楚人還兵間以梁地深入敵國八九百里欲戰則不得攻城則力不能老弱轉糧千里之外楚兵至滎陽成臯漢堅守而不動進則不得攻退則不能解故楚兵不足罷也使楚兵勝漢則諸侯自危懼而相救夫楚之彊適足以致天下之兵耳故楚不如漢其勢易見也今大王不與萬全之漢而自託扵危亡之楚臣竊為大王惑之臣非以淮南之兵足以亡楚也夫大王發兵而背楚項王必留留數月漢之取天下可以萬全臣請與大王杖劒而歸漢漢王必裂地而分大王又况淮南必大王有也故漢王敬使使臣進愚計碩大王之留意也淮南王曰請奉命陰許叛楚與漢未敢洩楚使者在方急責布發兵隨何直入曰九江王已歸漢楚何以得發兵布愕然楚使者起何因説布曰事已搆獨可遂殺楚使毋使歸而疾走漢并力布曰如使者教因起兵而攻楚楚使項聲龍且攻淮南項王留而攻下邑數月龍且攻淮南破布軍布欲引兵走漢恐項王擊之故間行與隨何俱歸漢至漢王方踞牀洗而召布入見布大怒悔來欲自殺出就舎帳御飲食從官如漢王居布又大喜過望扵是乃使人之九江楚已使項伯收九江兵盡殺布妻子布使者頗得故人幸臣将衆數千人歸漢漢益分布兵而與俱北收兵至成臯四年秋七月立布為淮南王與擊項籍布使人之九江得數縣五年布與劉賈入九江誘大司馬周殷殷反楚遂舉九江兵與漢擊楚破垓下項籍死上置酒對衆折隨何曰腐儒為天下安用腐儒哉何跪曰夫陛下引兵攻彭城楚王未至齊也陛下𤼵歩卒五萬人騎五千能以取淮南乎曰不能何曰陛下使何與二十人使淮南如陛下之意是何之功賢扵歩卒數萬騎五千也然陛下謂何曰腐儒為天下安用腐儒何也上曰吾方圗子之功乃以隨何為護軍中尉布遂剖符為淮南王都六九江廬江衡山豫章郡皆屬焉六年朝陳七年朝雒陽九年朝長安十一年髙后誅淮陰侯布因心恐夏漢誅梁王彭越盛其醢以徧賜諸侯至淮南淮南王方獵見醢因大恐陰令人部聚兵候伺旁郡警急布有所幸姬病就醫醫家與中大夫賁音肥姓也赫對門赫乃厚餽遺從姬飲醫家姬侍王從容語次譽赫長者王怒曰女安從知之具道王疑與亂赫恐稱病王愈怒欲捕赫赫上變事乗𫝊詣長安布使人追不及赫至上變言布謀反有端可先未𤼵誅也上以其書語蕭相國蕭相國曰布不宜有此恐仇怨誣之請繫赫使人徵驗淮南王布見赫以罪亡上變已疑其言國陰事漢使又來頗有所驗遂族赫家發兵反反書聞上乃赦赫以為将軍召諸将問布反為之奈何皆曰𤼵兵阬豎子耳何能為汝陰侯滕公以問其客薛公薛公曰是固當反滕公曰上裂地而封之疏爵而貴之南面而立萬乗之主其反何也薛公曰前年殺彭越往年殺韓信三人同功一體之人也自疑禍及身故反耳滕公言之上曰臣客故楚令尹薛公其人有籌策可問上乃見問薛公對曰布反不足怪也使布出扵上計山東非漢之有也出扵中計勝負之數未可知也出扵下計陛下安枕而卧矣上曰何謂上計對曰東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也何謂中計東取吳西取楚并韓取魏據敖倉之粟塞成臯之險勝敗之數未可知也何謂下計東取吳西取下蔡歸重扵越身歸長沙陛下安枕而卧漢無事矣上曰是計将安出薛公曰出下計上曰胡為廢上計而出下計對曰布故驪山之徒也致萬乗之主此皆為身不顧後為百姓萬世慮者也故出下計上曰善封薛公千户遂發兵自将東擊布布之初反謂其将曰上老矣厭兵必不能來使諸将諸将獨患淮陰彭越今已死餘不足畏故遂反果如薛公揣之東擊荆荆王劉賈走死富陵盡刼其兵渡淮擊楚楚發兵與戰徐僮閒為三軍欲以相救為奇或説楚将曰布善用兵民素畏之且兵法諸侯自戰其地為散地今别為三彼敗吾一餘皆走安能相救不聼布果破其一軍二軍散走遂西與上兵遇蘄西㑹工外反垂丈遂反布兵精甚上乃壁庸城望布軍置陳如項籍軍上惡之與布相望見隃謂布何苦而反布曰欲為帝耳上怒罵之遂大戰破布軍布走渡淮數止戰不利與百餘人走江南布舊與番君婚故長沙哀王使人誘布偽與俱亡走越布信而隨至番陽番陽人殺布兹鄉遂㓕之封賁赫為列侯将帥封者六人盧綰豐人也與髙祖同里綰親與髙祖太上皇相愛及生男髙祖綰同日生里中持羊酒賀兩家及髙祖綰壮學書又相愛也里中嘉兩家親相愛生子同日壮又相愛復賀羊酒髙祖為布衣時有吏事避宅綰常隨上下及髙祖初起沛綰以客從入漢為将軍常侍中從東擊項羽以太尉常從出入卧内衣被飲食賞賜羣臣莫敢望雖蕭曹等特以事見禮至其親幸莫及綰者封為長安侯長安故咸陽也項籍死使綰别将與劉賈擊臨江王共尉還從擊燕王臧荼皆破平時諸侯非劉氏而王者七人上欲王綰為羣臣􅔵望及虜臧荼乃下詔詔諸将相列侯擇羣臣有功者以為燕王羣臣知上欲王綰皆曰太尉長安侯綰常從平定天下功最多可王上乃立綰為燕王諸侯得幸莫如燕王者綰立六年以陳豨事見疑而敗豨者宛句人也不知始所以得從及韓王信反入匈奴上至平城還豨以郎中封為列侯以相國将監趙代邉兵邉兵皆屬焉豨少時常稱慕魏公子及将守邉招致賓客常言過趙賓客隨之者千餘乗邯鄲客舎皆滿豨所以待客如布衣交皆出客下趙相周昌乃求入見上具言豨賓客盛擅兵扵外恐有變上令人覆案豨客居代者諸為不法事多連引豨豨恐陰令客通使王黄曼邱臣所漢十年秋太上皇崩上因是召豨豨稱病遂與王黄等反自立為代王刼略趙代上聞乃赦吏民為豨所詿誤刼略者上自擊豨破之語在髙紀初上如邯郸擊豨燕王綰亦擊其東北豨使王黄求救匈奴綰亦使其臣張勝使匈奴言豨等軍破勝至胡故燕王臧荼子衍亡在胡見勝曰公所以重扵燕者以習胡事也燕所以久存者以諸侯數反兵連不决也今公為燕欲急㓕豨等豨等已盡次亦至燕公等亦且為虜矣公何不令燕且緩豨而與胡連和事寛得長王燕即有漢急可以安國勝以為然廼私令匈奴兵擊燕綰疑勝與胡反上書請族勝勝還報具道所以為者綰寤乃詐論他人以脱勝家屬使得為匈奴間而陰使范齊之豨所欲令久連兵毋决漢既斬豨其裨将䧏言燕王綰使范齊通計謀豨所上使使召綰綰稱病又使辟陽侯審食其御史大夫趙尭往迎綰因驗問其左右綰愈恐閟匿謂其幸臣曰非劉氏而王者獨我與長沙耳往年漢族淮陰誅彭越皆呂后計今上病屬任呂后呂后婦人專欲以事誅異姓王者及大功臣乃稱病不行其左右皆亡匿語頗泄辟陽侯聞之歸具報上益怒又得匈奴䧏者言張勝在匈奴為燕使扵是上曰綰果反矣使樊噲繫綰綰悉将其宮人家屬騎數千居長城下候伺幸上病瘉自入謝髙祖崩綰遂将其衆亡入匈奴匈奴以為東胡盧王為蠻夷所侵奪常思復歸居嵗餘死胡中髙后時綰妻與其子亡䧏㑹髙后病不能見舎燕邸為欲置酒見之髙后竟崩綰妻亦病死孝景帝時綰孫它人以東胡王䧏封為惡谷侯傳至曾孫有罪國除吳芮秦時番陽令也甚得江湖間民心號曰番君天下之初叛秦也黥布歸芮芮妻之因率越人舉兵以應諸侯沛公攻南陽乃遇芮之将梅鋗與偕攻析酈䧏之及項羽相王以芮率百越佐諸侯從入闗故立芮為衡山王都邾其将梅鋗功多封十萬户為列侯項籍死上以鋗有功從入武闗故徳芮徙為長沙王都臨湘一年薨諡曰文王子成王臣嗣薨子哀王回嗣薨子共王右嗣薨子靖王羌嗣孝文後七年薨無子國除初文王芮髙祖賢之制詔御史長沙王忠其定著令至孝惠髙后時封芮庶子二人為列侯傳國數世絶季布楚人也為任俠有名項籍使将兵數窘漢王項籍㓕髙祖購求布千金敢有舎匿罪及三族布匿濮陽周氏周氏曰漢求将軍急迹且至臣家能聼臣臣敢進計即否碩先自剄布許之乃髠鉗布衣褐置廣柳車中并與其家僮數十人之魯朱家所賣之朱家心知其季布也買置田舎乃之雒陽見汝陰侯滕公説曰季布何罪臣各為其主用職耳項氏臣豈可盡誅邪今上始得天下而以私怨求一人何示不廣也且以季布之賢漢求之急如此此不北走胡南走越耳夫忌壮士以資敵國此伍子胥所以鞭荆平之墓也君何不從容為上言之滕公心知朱家大俠意季布匿其所廼許曰諾侍閒果言如朱家指上乃赦季布當是時諸公皆多季布能摧剛為柔朱家亦以此名聞當世季布召見謝上拜為郎中孝惠時為中郎将單于嘗為書嫚呂太后不遜太后怒召諸将議之上将軍樊噲曰臣願得十萬衆横行匈奴中諸将皆阿呂太后意以噲為然布曰噲可斬也夫以髙帝兵三十餘萬困扵平城噲時亦在其中今噲奈何以十萬衆横行匈奴中面謾且秦以事胡陳勝等起今瘡痍未瘳噲又面諛欲摇動天下是時殿上皆恐太后罷朝遂不復議擊匈奴事布為河東守孝文時人有言其賢者文帝召欲以為御史大夫復有言其勇使酒難近至邸留一月見罷布進曰臣待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毁臣者夫陛下以一人之譽召臣一人之毁去臣恐天下有識者聞之有以闚陛下上嘿然慙曰河東吾股肱郡故時召君耳布辭之官辯士曹邱生數招權顧金錢事貴人趙談等與竇長君善布聞之寄書諫長君曰吾聞曹邱生非長者勿與通及曹邱生歸欲得書詣布竇長君曰季将軍不説足下足下無往固請書遂行使人先發書布果大怒待曹邱曹邱至則揖布曰楚人諺曰得黄金百觔不如得季布一諾足下何以得此聲扵梁楚之間哉且僕楚人足下俱楚人使僕㳺揚足下名扵天下顧不美乎何足下距僕之深也布廼大悦引入為上客厚送之季布名所以益聞者曹邱揚之也布弟季心氣葢闗中遇人恭謹為任俠方數千里士争為死嘗殺人亡之吳從袁絲匿長事袁絲弟畜灌夫籍福之屬嘗為中司馬中尉郅都不敢加少年多時時竊借其名以行當是時季心以勇布以諾聞闗中布母弟丁公為項羽将逐窘髙祖彭城西短兵接髙祖急顧謂丁公曰兩賢豈相厄哉丁公乃引兵而還及項王㓕丁公謁見髙祖以丁公徇軍中曰丁公為項王臣不忠使項王失天下者乃丁公也遂斬之曰使後為人臣無傚丁公也欒布梁人也彭越為家人時常與布逰窮困賃庸扵齊為酒家保數嵗别去而布為人所畧賣為奴扵燕為其家主報仇燕将臧荼舉以為都尉臧荼為燕王布為将及荼反漢擊燕虜布梁王彭越聞之廼言上請贖布為梁大夫使扵齊未還漢召彭越責以謀反夷三族梟首雒陽下詔有收視者輙捕之布還奏事彭越頭下祠而哭之吏捕以聞上召布罵曰若與彭越反邪吾禁人勿收若獨祠而哭之與反眀矣趣亨之方提趨湯布顧曰碩一言而死上曰何言布曰方上之困彭城敗滎陽成臯間項王所以遂不能西徒以彭王居梁地與漢合從苦楚也當是之時彭王一顧與楚則漢破與漢則楚破且垓下之㑹微彭王項氏不亡天下已定彭王剖符受封亦欲傳之萬世今陛下一徵兵扵梁彭王病不行而疑以為反反形未見以苛細誅之臣恐功臣人人自危也今彭王已死臣生不如死請就亨上乃釋布拜為都尉孝文時為燕相至将軍布廼稱曰窮困不能辱身非人也富貴不能快意非賢也扵是嘗有徳者厚報之有怨者必以法㓕之吳楚反時以功封為鄃侯復為燕相燕齊之間皆為立社號曰欒公社布薨子賁嗣侯孝武時坐為太常犧牲不如令國除田叔趙陘城人也其先齊田氏也叔好劔學黄老術扵樂鉅公為人廉直喜任俠㳺諸公趙人舉之趙相趙午言之趙王張敖以為郎中數嵗趙王賢之未及遷㑹趙午貫髙等謀弑上事發覺漢下詔捕趙王及羣臣反者趙有敢隨王罪三族唯田叔孟舒等十餘人赭衣自髠鉗隨王至長安趙王敖事白得出廢王為宣平侯乃進言叔等十人上召見與語漢廷臣無出其右者上説盡拜為郡守諸侯相叔為漢中守十餘年孝文帝初立召叔問曰公知天下長者乎曰臣何足以知之上曰公長者宜知之叔頓首曰故雲中守孟舒長者也是時舒坐虜大入雲中免上曰先帝置舒雲中十餘年虜常一入孟舒不能堅守無故士卒戰死者數百人長者固殺人乎叔叩頭曰夫貫髙等謀反天子下眀詔趙有敢隨張王者罪三族然孟舒自髠鉗隨張王以身死之豈自知為雲中守哉漢楚相距士卒罷敝而匈奴冒頓新服北夷來為邉㓂孟舒知士卒罷敝不忍出言士争臨城死敵如子為父以故死者數百人孟舒豈敺之哉是乃孟舒所以為長者扵是上曰賢哉孟舒復召以為雲中守後數嵗叔坐法失官梁孝王使人殺漢議臣袁盎景帝召叔案梁具得其事還報上曰梁有之乎對曰有之事安在叔曰上無以梁事為問也今梁王不伏誅是廢漢法也如其伏誅而太后食不甘味卧不安席此憂在陛下扵是上大賢之以為魯相相初至官民以王取其財物自言者百餘人叔取其渠率二十人笞怒之曰王非若主邪何敢自言主魯王聞之大慙發中府錢使相償之相曰王自使人償之不爾是主為惡而相為善也魯王好獵相常從入苑中王輙休相就舘相常暴坐苑外終不休曰吾王暴露獨何為舎王以故不大出㳺數年以官卒魯以百金祠少子仁不受曰義不以百金傷先人名仁以勇壮為衛将軍舎人數從擊匈奴衛将軍進言仁為郎中至二千石丞相長史失官後使刺三河還奏事稱意拜為京輔都尉月餘遷司直數嵗戾太子舉兵仁部閉城門令太子得亡坐縱反者族通志卷九十五
