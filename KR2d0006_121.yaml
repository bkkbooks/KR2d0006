body:
  text: 通志卷一百七上宋右廸功郎鄭樵漁仲撰列傳第二十上後漢卓茂魯恭弟丕魏霸劉寛伏湛子隆侯霸韓歆宋𢎞則蔡茂郭賀馮勤趙熹牟融韋彪族子義義兄豹宣秉張湛王丹王良杜林郭丹范遷吳良承宫鄭均趙典典兄子謙謙弟温桓譚馮衍子豹申屠剛鮑永昱郅惲子夀蘇竟楊厚郎顗宗襄楷郭伋杜詩孔奮張堪亷范王堂蘇章族孫不韋羊續賈琮陸康卓茂字子康南陽宛人也父祖皆至郡守茂元帝時學於長安事博士江生習詩禮及厯筭究極師法稱為通儒性寛仁恭愛鄉黨故舊雖行能與茂不同而皆愛慕欣欣焉初辟丞相府史事孔光光稱為長者時嘗出行有人認其馬茂問曰子亡馬幾何時對曰月餘日矣茂有馬數年心知其謬嘿解與之挽車去顧曰若非公馬幸至丞相府歸我他日馬主别得亡者乃詣府送馬叩頭謝之茂性不好爭如此後以儒術舉為侍郎給事黄門遷密令勞心諄諄視民如子舉善而教口無惡言吏民親愛之而不忍欺之人嘗有言部亭長受其米肉遺者茂辟左右問之曰亭長為從汝求乎為汝有事囑之而受乎將平居自以恩意遺之乎人曰往遺之耳茂曰遺之而受何故言邪人曰竊聞賢明之君使人不畏吏吏不取人今我畏吏是以遺之吏既卒受故來言耳茂曰汝為敝人矣凡人所以貴於禽獸者以有仁愛知相敬事也今鄰里長老尚致饋遺此乃人道所以相親况吏與民乎吏顧不當乗威力彊請求耳凡人之生羣居雜䖏故有經紀禮義以相交接汝獨不欲修之寧能高飛逺走不在人間邪亭長素善吏歳時遺之禮也人曰茍如此律何故禁之茂笑曰律設大法禮順人情今我以禮敎汝汝必無怨惡以律治汝何所措手足乎一門之内小者可論大者可殺也且歸念之於是人納其訓吏懐其恩初密到縣有所廢置吏民笑之鄰城聞者皆嗤其不能河南郡為置守令茂不為嫌理事自若數年敎化大行道不拾遺平帝時天下大蝗河南二十餘縣皆被其災獨不入密縣界督郵言之太守不信自出案行見乃服焉是時王莽秉政置大司農六部丞勸課農桑遷茂為京部丞密人老㓜皆涕泣隨送及莽居攝以病免歸郡常為門下掾祭酒不肯作職吏更始立以茂為侍中祭酒從至長安更始政亂以年老乞骸骨歸時光武初即位先訪求茂茂詣河陽謁見乃下詔曰前密令卓茂束身自修執節淳固誠能為人所不能為夫名冠天下當受天下重賞故武王誅紂封比干之墓式商容之閭今以茂為太傅封褒徳侯食邑二千戸賜几杖車馬衣一襲絮五百斤以茂長子戎為太中大夫次子崇為中郎給事黄門建武四年薨賜棺槨冢地車駕素服親臨送葬子崇嗣徙封汎郷侯官至大司農崇卒子棽嗣棽卒子訢嗣訢卒子隆嗣永元十五年隆卒無子國除初茂與同郡孔休陳留蔡勲安衆劉宣楚國龔勝上黨鮑宣六人同志不仕王莽時並名重當時休字子泉哀帝初守新都令後王莽秉權休去官歸家及莽簒位遣使齎元纁束帛請為國師遂歐血託病杜門自絶光武即位求休勲子孫賜榖以旌顯之劉宣字子高安衆侯崇之從弟知王莽當簒乃變姓名抱經書隱避林藪建武初乃出光武以宣襲封安衆侯擢勝子賜為上谷太守勝鮑宣事在前史勲事在元孫邕𫝊魯恭字仲康扶風平陵人也其先出於魯頃公為楚所滅遷於卞邑因氏焉世吏二千石哀平閒自魯而徙大父匡王莽時為羲和有權數號曰智囊父某建武初為武陵太守卒官時恭年十二弟丕七歳晝夜號踴不絶聲郡中賻贈無所受乃歸服䘮禮過成人年十五與母及丕俱居太學習魯詩閉户講誦絶人間事兄弟俱為諸儒所稱學士爭歸之太尉趙熹慕其志每歳時遣子問以酒糧皆辭不受恭憐丕小欲先就其名託疾不仕郡數以禮請謝不肯應母彊遣之恭不得已而西因留新豐敎授不行及丕舉方正恭乃始為郡吏太傅趙熹聞而辟之肅宗集諸儒於白虎觀恭特以經明得召與其議熹復舉恭直言待詔公車拜中牟令専以徳化為理不任刑罰訟人許伯等爭田累守令不能決恭為平理曲直皆退而自責輟耕相讓亭長從人借牛而不肯還牛主訟于恭恭召亭長勅令歸牛者再三猶不從恭歎曰是敎化不行也欲解印綬去掾史涕泣共留之亭長乃慙悔還牛詣獄受罪恭貰不問於是吏民信服建初七年郡國螟傷稼犬牙縁界不入中牟河南尹袁安聞之疑不實使仁恕掾肥親往亷之恭隨行阡陌俱坐桑下有雉過止其傍傍有兒童親曰兒何不捕之兒言雉方將雛親瞿然而起與恭訣曰所以來者欲察君之政迹耳今蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也久留徒擾賢者耳還府具以狀白安是歳嘉禾生恭便坐廷中安因上書言状帝異之㑹詔百官舉賢良方正恭薦中牟名士王方帝即徴方詣公車禮之與公卿所舉同方致位侍中恭在事三年州舉尤異㑹遭母䘮去官吏民思之後拜侍御史和帝初立議遣車騎將軍竇憲與征西将軍耿秉擊匈奴恭上疏諫曰陛下親勞聖思憂在軍役誠欲以安定北垂為人除患定萬世之計也臣伏獨思之未見其便社稷之計萬人之命在於一舉數年以來秋稼不熟人食不足倉庫空虚國無蓄積㑹新遭大憂人懐恐懼陛下躬大聖之徳履至孝之行盡諒陰三年聽於冢宰百姓闕然三時不聞警蹕之音莫不懐思皇皇若有求而不得今乃以盛春之月興發軍役擾動天下以事戎夷誠非所以垂恩中國改元正時由内及外者也萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯况於人乎故愛人者必有天報昔太王重人命而去邠故獲上天之祐夫戎狄者四方之異氣也蹲夷踞肆與鳥獸無别若雜居中國則錯亂天氣汙辱善人是以聖王之制羈縻不絶而已今邊境無事宜當修仁行義尚於無為令家給人足安業樂産夫人道安於下則陰陽和於上祥風時雨覆被逺方夷狄重譯而至矣易曰有孚盈缶終來有他吉言甘雨滿我之缶誠來有我而吉已夫以徳勝人者昌以力勝人者亡今匈奴新為鮮卑所殺逺蔵於史侯河西去塞數千里而欲乗其虚耗利其微弱是非義之所出也前太僕祭肜逺出塞外卒不見一胡而兵已困矣白山之難不絶如綖都護陷沒士卒死者如積迄今被其辜毒孤寡哀思之心未弭仁者念之以為累息奈何復欲襲其迹不顧患難乎今始徴發而大司農調度不足使者在道分部督趣上下相迫民間之急亦已甚矣三輔并涼少雨麥根枯焦牛死日甚此其不合天心之效也羣僚百姓咸曰不可陛下獨奈何以一人之計棄萬人之命不恤其言乎上觀天心下察人志足以知事之得失臣恐中國不為中國豈徒匈奴而已哉惟陛下留聖恩休罷士卒以順天心書奏不從每政事有益於人恭輙言其便無所隱諱其後拜為魯詩博士由是家法學者日盛遷侍中數召讌見問以得失賞賜恩禮寵異焉遷樂安相是時東州多盗賊羣軰攻刼諸郡患之恭到重購賞開恩信其渠帥張漢等率支黨降恭上以漢補博昌尉其餘遂自相捕擊盡破平之州郡以安永元九年徴拜議郎八月飲酎齋會章臺詔使小黄門特引恭前其夜拜侍中勅使陪乗勞問甚渥冬遷光祿勲選舉清平京師貴戚莫能枉其正十二年代吕蓋為司徒十五年從巡狩南陽除子撫為郎中賜駙馬從駕時弟丕亦為侍中兄弟父子並列朝廷後坐事䇿免殤帝即位以恭為長樂衞尉永初元年復代梁鮪為司徒初和帝末下令麥秋得案驗薄刑而州郡好以苛察為政因此盛夏斷獄恭上疏諫曰臣伏見詔書敬若天時憂念萬民為崇和氣罪非殊死且勿案驗進柔良退貪殘奉時令所以助仁徳順昊天致和氣利黎民者也舊制至立秋乃行薄刑自永元十五年以來改用孟夏而刺史太守不深惟憂民息事之原進良退殘之化因以盛夏徴召農人拘對考驗連滯無已司隸典司四方京師四方是則而近於春月分行諸部託言勞來貧人而無惻隱之實煩擾郡縣亷考非急逮捕一人罪延十數上逆時氣下傷農業案易五月姤用事經曰后以施令誥四方言君以夏至之日施命令止四方行者所以助為陰也行者尚止之况於逮召考掠奪其時哉比年水旱傷稼人飢流冗今始夏百榖權輿陽氣胎養之時自三月以來隂寒不暖物當化變而不被和氣月令孟夏斷薄刑出輕繫行秋令則苦雨數來五榖不熟又曰仲夏挺重囚益其食行秋令則草木零落人傷於疫夫斷薄刑者謂其輕罪已正不欲令久繫故時斷之也臣愚以為今孟夏之制可從此令其決獄案考皆以立秋為斷以順時節育成萬物則天地以和刑罰以清矣初肅宗時斷獄皆以冬至之前自後論者互多駮異鄧太后詔公卿以下㑹議恭議奏曰夫陰陽之氣相扶而行發動用事各有時節若不當其時則物隨而傷王者雖質文不同而兹道無變四時之政行之若一月令周世所造而所據皆夏之時也其變者唯正朔服色犧牲徽號器械而已故曰殷因於夏禮周因於殷禮所損益可知也易曰潛龍勿用言十一月十二月陽氣潛蔵未得用事雖喣嘘萬物養其根荄而猶盛陰在上地凍水冰陽氣否隔閉而成冬故曰履霜堅冰陰始凝也馴致其道至堅冰也言五月微陰始起至十一月堅冰至也夫王者之作因時為法孝章皇帝深惟古人之道助三正之微定律著令冀承天心順物性命以致時雍然從變改以來年歳不熟榖價常貴人不寧安小吏不與國同心者率入十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正一夫吁嗟王道為虧况於衆乎易十二月君子以議獄緩死可令疑罪大辟之科盡冬月乃斷其立春在十二月中者勿以報囚如故事後卒施行恭再在公位選辟髙第至列卿郡守者數十人而其耆舊大姓或不䝉薦舉至有怨望者恭聞之曰學之不講是吾憂也諸生不有郷舉者乎終無所言恭性謙退奏議依經潛有補益然終不自顯故不以剛直為稱三年以老病䇿罷六年年八十一卒於家以兩子為郎長子謙為隴西太守有名績謙子旭官至太僕從獻帝西入關與司徒王允同謀共誅董卓及李傕入長安旭與允俱遇害恭弟丕字叔陵性沈深好學孳孳不倦遂杜絶交游不答候問之禮士友常以此短之而丕欣然自得遂兼通五經以魯詩尚書教授為當世名儒後歸郡為督郵功曹所事之將無不以師友待之建初元年肅宗詔舉賢良方正大司農劉寛舉丕時對䇿者百有餘人唯丕在髙第除為郎遷新野令視事朞年州課第一擢拜青州刺史務在表賢眀慎刑罰七年坐事下獄司冦論元和元年徴再遷拜趙相門生就學者常百餘人關東號之曰五經復興魯叔陵趙王商嘗欲避疾便時移住學官丕止不聽王乃上疏自言詔書下丕丕奏曰臣聞禮諸侯薨於路寢大夫卒於嫡室死生有命未有逃避之典也學官𫝊五帝之道脩先王禮樂敎化之䖏王欲廢塞以廣游讌事不可聽詔從丕言王以此憚之其後帝巡狩之趙特被引見難問經傳厚加賞賜在職六年嘉瑞屢降吏民重之永元二年遷東郡太守丕在二郡為人修通溉灌百姓殷富數薦逹幽隠名士明年拜陳留太守視事三朞後坐廪貧人不實徴司寇論十一年復徴再遷中散大夫時侍中賈逵薦丕道藝深明宜加任用和帝因朝㑹召見諸儒丕與侍中賈逵尚書令黄香等相難數事帝善丕説罷朝特賜冠幘履韈衣一襲丕因上疏曰臣聞説經者𫝊先師之言非從己出不得相讓則道不明若規矩權衡之不可枉也難者必明其據説者務立其義浮華無用之言不陳於前故精思不勞而道術愈章法異者各令自説師法博觀其義覽詩人之㫖意察雅頌之終始明舜禹臯陶之相戒顯周公箕子之所陳觀乎人文以化天下陛下既廣納謇謇以開四聰無令芻蕘以言得罪既顯巖穴以求仁賢無使幽逺獨有遺失十二年遷為侍中免永初二年詔公卿舉儒術篤學者大將軍鄧隲舉丕再遷復為侍中左中郎將再為三老五年年七十五卒於官魏霸字喬卿濟陰句陽人也世有禮義霸少喪親兄弟同居州里慕其雍和建初中舉孝亷八遷和帝時為鉅鹿太守以簡朴寛恕為政掾史有過要先誨其失不改者乃罷之吏或相毁訴霸輙稱他吏之長終不及人短言者懐慙譖訟遂息永元十六年徴拜將作大匠明年和帝崩典作順陵時盛冬地凍中使督促數罰縣吏以厲霸霸撫循而已初不切責而反勞之曰今諸卿被辱大匠過也吏皆懐恩力作倍功延平元年代尹勤為太常明年以病致仕為光禄大夫永初五年拜長樂衞尉以病乞身復為光禄大夫卒於官劉寛字文饒𢎞農華陰人也父﨑順帝時為司徒寛嘗行有人失牛者乃就寛車中認之寛無所言下駕步歸有頃認者得牛而送還叩頭謝曰慙負長者随所刑罪寛曰物有相類事容脱誤幸勞見歸何為謝之州里服其不校桓帝時大将軍辟五遷司徒長史時京師地震特見詢問再遷出為東海相延熹八年徴拜尚書令遷南陽太守典歴三郡温仁多恕雖在倉卒未嘗疾言遽色常以為齊之以刑民免而無恥吏人有過但用蒲鞭罰之示辱而已終不加苦事有功善推之自下災異或見引躬克責每行縣止息亭𫝊輙引學官祭酒及處士諸生執經對講見父老慰以農里之言少年勉以孝悌之訓民感徳興行日有所化靈帝初徴拜太中大夫侍講華光殿遷侍中賜衣一襲轉屯騎校尉遷宗正轉光禄勲嘉平五年代許訓為太尉靈帝頗好學藝每引見寛常令講經寛嘗於坐被酒睡伏帝問太尉醉邪寛仰對曰臣不敢醉但任重責大憂心如醉帝重其言寛簡略嗜酒不好盥浴京師以為諺常坐客遣蒼頭市酒迂久大醉而還迂久猶良久也客不堪之罵曰畜產寛須㬰遣人視奴疑必自殺顧左右曰此人也罵言畜産辱孰甚焉故吾懼其死也夫人欲試寛令恚伺寛當朝㑹装嚴已訖使侍婢奉肉羮翻汙朝衣婢遽收之寛神色不異乃徐言曰羮爛汝手其性度如此海内稱為長者後以日食䇿免拜衞尉光和三年復代叚熲為太尉在職三年以日食免又拜永樂少府遷光禄勲以先策黄巾逆謀以事上聞封逯郷侯六百戸中平三年卒年六十六贈車騎将軍印綬位特進諡昭烈侯子松嗣官至宗正伏湛字恵公瑯邪東武人也九世祖勝字子賤所謂濟南伏生者也湛高祖父孺武帝時客授東武因家焉父理為當世名儒以詩授成帝為高密太傅别自名學湛性孝友少𫝊父業敎授數百人成帝時以父任為博士弟子五遷至王莽時為繡衣執法使督大姦遷後隊屬正更始立以為平原太守時倉卒兵起天下驚擾湛獨晏然敎授不廢謂妻子曰夫一榖不登國君徹膳今民皆飢奈何獨飽乃共食麤糲分俸禄以賑郷里來客者百餘家時門下督素有氣力謀欲為湛起兵湛惡其惑衆即收斬之徇首城郭以示百姓於是吏民信向郡内以安平原一境湛所全也光武即位知湛名儒舊臣欲令幹任内職徴拜尚書使典定舊制時大司徒鄧禹西征關中帝以湛才任宰相拜為司直行大司徒事車駕每出征伐常留鎮守總攝羣司建武三年遂代鄧禹為大司徒封陽都侯時彭寵反於漁陽帝欲自征之湛上疏諫曰臣聞文王受命而征伐五國必先詢之同姓然後謀於羣臣加占蓍龜以定行事故謀則成卜則吉戰則勝其詩曰帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉崇國城守先退後伐所以重人命俟時而動故三分天下而有其二陛下承大亂之極受命而帝興明祖宗出入四年而滅檀鄉制五校降銅馬破赤眉誅鄧奉之屬不為無功今京師空匱資用不足未能服近而先事邊外且漁陽之地逼接北狄黠虜困逼必求其助又今所過縣邑尤為困乏種麥之家多在城郭聞官兵將至當已收之矣大軍逺涉二千餘里士馬罷勞轉糧艱阻今兖豫青冀中國之都而寇賊縱横未及從化漁陽以東本備邉塞地接外虜貢税微薄安平之時尚資内郡况今荒耗豈足先圖而陛下捨近務遠棄易求難四方疑怪百姓怨懼誠臣之所惑也復願遠覽文王重兵博謀近思征伐前後之宜顧問有司使極愚誠采其所長擇之聖慮以中土為憂念帝覽其奏竟不親征時賊徐異卿等萬餘人據富平連攻之不下唯云願降司徒伏公帝知湛為青徐所信向遣到平原異卿等即日歸降護送洛陽湛雖在倉卒必於文徳以為禮樂政化之首顛沛猶不可違是歳奏行鄉飲酒禮遂施行之其冬車駕征張步留湛居守時烝祭髙廟而河南尹司隸校尉於廟中爭論湛不舉奏坐䇿免六年徙封不其侯邑三千六百戸遣就國後南陽太守杜詩上疏薦湛有柱石之姿宜居輔弼之位十三年夏徴勅尚書擇拜吏日及就位因讌見中暑病卒賜祕器帝親弔祠遣使者送喪脩冢二子隆翕翕嗣爵卒子光嗣光卒子晨嗣晨謙敬博愛好學尤篤以女孫為順帝貴人奉朝請位特進卒子無忌嗣亦𫝊家學博物多識順帝時為侍中屯騎校尉永和元年詔無忌與議郎黄景校定中書五經諸子百家藝術元嘉中桓帝復詔無忌與黄景崔寔等共撰漢記又自采集古今刪著事要號曰伏侯注無忌卒子質嗣官至大司農質卒子完嗣尚桓帝女陽安公主女為孝獻皇后曹操殺后誅伏氏國除初自伏生已後世傳經學清靜無競故東州號為伏不鬬隆字伯文少以節操立名仕郡督郵建武二年詣懐宫光武甚親接之時張步兄弟各擁彊兵據有齊地拜隆為太中大夫持節使青徐二州招降郡國隆移檄告諭所部青徐羣盜得檄惶怖獲索賊右師郎等六校即時皆降張步遣使随隆詣闕上書獻鰒魚其冬拜隆光禄大夫復使於步并與新除青州牧守及都尉俱東詔隆輙拜令長以下隆招懐綏緝多來降附帝嘉其功比之酈生即拜步為東萊太守而劉永亦復遣使立步為齊王步貪受王爵冘豫未決隆曉譬曰高祖與天下約非劉氏不王今可得為十萬户侯耳步欲留隆與共守二州隆不聽求得反命步遂執隆而受永封隆遣間使上書曰臣隆奉使無狀受執凶逆雖在困戹授命不顧又吏民知步反叛心不附之願以時進兵無以臣隆為念臣隆得生到闕庭受誅有司此其大願若令殁身寇手以父母昆弟長累陛下陛下與皇后太子永享萬國與天無極帝得隆奏召父湛流涕以示之曰隆可謂有蘇武之節恨不且許而遽求還也其後步遂殺之時人莫不哀憐焉三年張步平車駕幸北海詔隆中弟咸收隆䘮賜給棺歛太中大夫護送䘮事詔告瑯邪作冢以子瑗為郎中侯霸字君房河南密人也族父淵以宦者有才辯任職元帝時佐石顯等領中書號曰太常侍成帝時任霸為太子舍人霸矜嚴有威容家累千金不事産業篤志好學師事九江太守房元治榖梁春秋為元都講王莽初五威司命陳崇舉霸徳行遷随宰縣界曠逺濵帶五湖而亡命者多為寇盜霸到即案誅豪猾分捕山賊縣中清靜再遷為執法刺姦紏案勢位者無所疑憚後為淮平大尹政理有能名及王莽之敗霸保固自守卒全一郡及更始立遣使徴霸百姓老弱相攜號哭遮使者車或當道而卧皆曰願乞侯君復留朞年民至乃戒乳婦勿得舉子侯君當去必不能全使者慮霸就徴臨淮必亂不敢授璽書具以狀聞㑹更始敗道路不通建武四年光武徴霸與車駕㑹夀春拜尚書令時無故典朝廷又少舊臣霸明習故事收錄遺文條奏前世善政法度有益於時者皆施行之每春下寛大之詔奉四時之令皆霸所建也明年代伏湛為大司徒封關内侯在位明察守正奉公不回十三年薨帝深傷惜之詔書悼惜於是追封諡霸則鄉哀侯食邑二千戸子昱嗣臨淮吏民共為立祠四時祭焉以沛郡太守韓歆代霸為大司徒歆字翁君南陽人以從征伐有功封扶陽侯好直言無隱諱帝每不能容嘗因朝㑹聞帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才帝大怒以為激發歆又證歳将飢凶指天畫地言甚剛切坐免歸田里帝猶不懌復遣使宣詔責之司隸校尉鮑永固請不能得歆及子嬰竟自殺歆素有重名死非其罪衆多不厭帝乃追賜錢榖以成禮𦵏之後千乘歐陽歙清河戴涉相代為大司徒坐事下獄死自是大臣難居相任其後河内蔡茂京兆玉况玉音肅魏郡馮勤皆得薨位况字文伯性聰敏為陳留太守以徳行化人遷司徒四年薨昱後徙封於陵侯永平中兼太僕昱卒子建嗣建卒子昌嗣宋𢎞字仲子京兆長安人也父尚成帝時至少府哀帝立以不附董賢違忤抵罪𢎞少而温順哀平間作侍中王莽時為共工赤眉入長安遣使徴𢎞逼迫不得已行至渭橋自投於水家人救得出因佯死獲免光武即位徴拜太中大夫建武二年代王梁為大司空封栒邑侯所得租奉分贍九族家無資産以清行致稱徙封宣平侯帝嘗問𢎞通博之士𢎞乃薦沛國桓譚才學洽聞幾能及揚雄劉向父子於是召譚拜議郎給事中帝每讌輙令鼓琴好其繁聲𢎞聞之不悦悔於薦舉伺譚内出正朝服坐府上遣吏召之譚至不與席而讓之曰吾所以薦子者欲令輔國家以道徳也而今數進鄭聲以亂雅頌非忠正者也能自改邪將令相舉以法乎譚頓首辭謝良久乃遣之後大㑹羣臣帝使譚鼓琴譚見𢎞失其常度帝怪而問之𢎞乃離席免冠謝曰臣所以薦桓譚者望能以忠正輔主而令朝廷耽悦鄭聲臣之罪也帝改容謝使反其坐遂不復令譚給事中𢎞推進賢士馮翊桓梁三十餘人或相及為公卿者𢎞嘗讌見御座新屏風圖畫列女帝數顧視之𢎞正容言曰未見好徳如好色者帝即為撤之笑謂𢎞曰聞義則服可乎對曰陛下進徳臣不勝其喜時帝姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容徳器羣臣莫及帝曰方且圖之後𢎞被引見帝令主坐屏風後因謂𢎞曰諺言貴易交富易妻人情乎𢎞曰臣聞貧賤之知不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣𢎞在位五年坐考上黨太守無所據免歸第數年卒無子國除𢎞弟嵩以剛彊孝烈著名官至河南尹嵩子由章和間為太尉坐阿黨竇憲䇿免歸本郡自殺由二子漢登登在儒林傳漢字仲和以經行著名舉茂才四遷西河太守永建元年為東平相度遼將軍立名節以威恩著稱遷太僕上病自乞拜太中大夫卒䇿書慜惜令將相大夫㑹𦵏加賜錢十萬漢子則字元矩為鄢陵令亦有名迹㧞同郡韋著扶風法真稱為知人則子年十歳與蒼頭共射弩蒼頭弦斷矢激誤中之即死奴叩頭就誅則察而恕之潁川荀爽深以為美時人亦服焉蔡茂字子禮河内懐人也哀平間以儒學顯徴試博士對䇿陳災異以高第擢拜議郎遷侍中遇王莽居攝以病自免不仕莽朝㑹天下擾亂茂素與竇融善因避難歸之融欲以為張掖太守固辭不就每所餉給計口取足而已後與融俱徴復拜議郎再遷廣漢太守有政績稱時陰氏賓客在郡界多犯吏禁茂輙紏案無所回避㑹洛陽令董宣舉紏湖陽公主帝始怒收宣既而赦之茂嘉宣剛正欲令朝廷禁制貴戚乃上書曰臣聞興化致敎必由進善康國寧人莫大理惡頃者貴戚椒房之家數因恩勢干犯吏禁殺人不死傷人不論臣恐繩墨棄而不用斧斤廢而不舉近湖陽公主奴殺人西市而與主共輿出入宫省逋罪積日寃魂不報洛陽令董宣直道不顧干主討姦陛下不先澄審召欲加箠當宣受怒之初京師側耳及其䝉宥天下拭目今者外戚驕逸賓客放濫宜勅有司按理姦罪使執平之吏永申其用以厭逺近不緝之情光武納之建武二十年代戴涉為司徒在職清儉匪懈二十三年薨于位時年七十二賜東園梓棺賻贈甚厚茂初在廣漢夣坐大殿極上有三穂禾茂跳取之得其中穂輙復失之以問主簿郭賀賀離席慶曰大殿者宫府之形象也極而有禾人臣之上禄也取中穂是中台之位也於字未失為秩雖曰失之乃所以得禄秩也衮職有闕君其補之旬月而茂徴焉乃辟賀為掾賀字喬卿雒陽人祖父堅伯父游君並修清節不仕王莽賀能明法累官建武中為尚書令在職六年曉習故事多所匡益拜荆州刺史引見賞賜恩寵隆異及到官有殊政百姓便之歌曰厥徳仁明郭喬卿忠正朝廷上下平顯宗巡狩到南陽特見嗟歎賜以三公之服黼黻冕旒勅行部去襜帷使百姓見其容服以章有徳每所經過吏民指以相示莫不榮之永平四年徴拜河南尹以清靜稱在官三年卒詔書慜惜賜車一乗錢四十萬馮勤字偉伯魏郡繁陽人也曾祖父楊宣帝時為𢎞農太守有八子皆為二千石趙魏間榮之號曰萬石君焉兄弟形皆偉壯惟勤祖父偃長不滿七尺常自恥短陋恐子孫之似也乃為子伉娶長妻伉生勤長八尺三寸八歳善計初為太守銚期功曹有髙能稱期常從光武征伐政事一以委勤勤同縣馮巡等舉兵應光武謀未成而為豪右焦亷等所反勤乃率將老母兄弟及宗親歸期期悉以為腹心薦於光武初未被用後乃除為郎中給事尚書以圖議軍糧在事精勤遂見親識每引見帝輙顧謂左右曰佳乎吏也由是使典諸侯封事勤量功次輕重國土逺近地勢豐薄不相踰越莫不厭服焉自是封爵之制非勤不定帝益以為能尚書衆事皆令總錄之司徒侯霸薦前梁令閻楊楊素有譏議帝常嫌之既見霸奏疑其有姦大怒賜霸璽書曰崇山幽都何可偶黄鉞一下無處所欲以身試法邪將殺身以成仁邪使勤奉䇿至司徒府勤還陳霸本意申釋事理帝意稍解拜勤尚書僕射職事十五年以勤勞賜爵關内侯遷尚書令拜大司農三歳遷司徒先是三公多見罪退帝賢勤欲令以善自終乃因讌見從容戒之曰朱浮上不忠於君下陵轢同列竟以中傷至今死生吉凶未可知豈不惜哉人臣放逐受誅雖復追加賞賜賻祭不足以償不訾之身忠臣孝子覽照前世以為鏡誡能盡忠於國事君無二則爵賞光乎當世功名列於不朽可不勉哉勤愈恭約盡忠號稱任職勤母年八十每㑹見詔勅勿拜令御者扶上殿謂諸王曰使勤貴寵者此母也其見親重如此中元元年薨帝悼惜之使者弔賜東園祕器賻贈有加勤七子長子宗嗣至張掖屬國都尉中子順尚平陽長公主終於大鴻臚建初八年以順中子奮襲主爵為平陽侯薨無子永元七年詔書復封奮兄羽林右監勁為平陽侯奉公主之嗣奮弟由黄門侍郎尚平安公主勁薨子卯嗣延光中為侍中薨子留嗣趙憙字伯陽南陽宛人也少有節操從兄為人所殺無子憙年十五常思報之乃挟兵結客後遂往復仇而仇家皆疾病無相距者憙以因疾報殺非仁者心且釋之而去顧謂仇曰爾曹若健逺相避也仇皆卧自搏後病愈悉自縛詣憙憙不與相見後竟殺之更始立舞陰大姓李氏擁城不下更始遣柱天將軍李寳降之不肯云聞宛之趙氏有孤孫憙信義著聞願得降之更始乃徴憙憙年未二十既引見更始笑曰繭栗犢豈能負重致逺乎即除為郎中行偏將軍事使詣舞陰而李氏遂降憙因進入潁川擊諸不下者歴汝南界還宛更始大悦謂憙曰卿名家駒努力勉之㑹王莽遣王尋王邑將兵出關更始拜憙為五威偏將軍使助諸將拒尋邑於昆陽光武破尋邑憙被創有戰勞還拜中郎將封勇功侯更始敗憙為赤眉所圍迫急乃踰屋亡走與所善友韓仲伯等數十人攜小弱越山阻徑出武關仲伯以婦色美慮有彊暴者而已受其害欲棄之於道憙責怒不聽因以泥塗仲伯婦面載以鹿車身自推之每道逢賊或欲逼略憙輙言其病狀以此得免既入丹水遇更始親屬皆裸跣塗炭飢困不能前憙見之悲感所装縑帛資糧悉以與之將護歸郷里時鄧奉反於南陽憙素與奉善數貽書切責之而讒者因言憙與奉合謀帝以為疑及奉敗帝得憙書乃驚曰趙憙真長者也即徴憙引見賜鞍馬待詔公車時江南未賓道路不通以憙守簡陽侯相憙不肯受兵單車馳之簡陽吏民不欲内憙憙乃吿譬呼城中大夫示以國家威信其帥即開門面縛自歸由是諸營壁悉降荆州牧奏憙才任理劇詔以為平林侯相攻擊羣賊安集降附縣邑平定後拜懐令大姓李子春先為琅邪相豪猾兼并為人所患憙下車聞其二孫殺人事未發覺即窮詰其姦收子春二孫自殺京師為請者數十終不聽時趙王良疾病將終車駕親臨問王所欲言王曰素與李子春厚懐令趙憙欲殺之願乞其命帝曰吏奉法律不可枉也更道他所欲王無復言既薨帝追感趙王乃貰子春其年遷憙平原太守時平原多盜賊憙與諸郡捕討其渠帥餘黨當坐者數千人憙上言惡惡止其身可一切徙京師近郡帝從之乃悉移置潁川陳留於是擢舉義行誅鋤姦惡後青州大蝗侵入平原界輙死歳屢有年百姓歌之二十六年帝延集内戚讌㑹歡甚諸夫人各各前言趙憙篤義多恩往遭赤眉出長安皆為憙所濟活帝甚嘉之後徴憙入為太僕引見謂曰卿非但為英雄所保也婦人亦懐卿之恩厚加賞賜二十七年拜太尉賜爵關内侯時南單于稱臣烏桓鮮卑並来入朝帝令憙典邊事思為長久規憙上復縁邉諸郡幽并二州由是而定三十年憙上言宜封禪正三雍之禮中元元年從封泰山及帝崩憙受遺詔典喪禮是時藩王皆在京師自王莽簒亂舊典不存皇太子與東海王等雜止同席憲章無序憙乃正色横劒殿階扶下諸王以明尊卑時藩國官屬出入宫省與百僚無别憙乃表奏謁者將護分止他縣諸王並令就邸惟朝晡入臨整禮儀嚴門衛内外肅然永平元年封節郷侯三年春考中山相薛脩事不實免其冬代竇融為衛尉八年代虞延行太尉事居府如真後遭母憂上疏乞身行喪禮顯宗不許遣使者為釋服賞賜恩寵甚渥憙内典宿衛外幹宰職正身立朝未嘗懈怠顯宗崩復典䘮事再奉大行禮事脩舉肅宗即位進太傅錄尚書事擢諸子為郎吏者七人長子代給事黄門建初五年憙疾病帝親幸視及薨車駕往臨弔時年八十四諡曰正侯子代嗣官至越騎校尉永元中副行征西將軍劉尚征羌坐事下獄疾病物故和帝憐之賜祕器錢布贈越騎校尉節郷侯印綬子直嗣官至步兵校尉直卒子淑嗣無子國除牟融字子優北海安邱人也少博學以大夏侯尚書教授門徒數百人名稱州里以司徒茂才為豐令視事三年縣無獄訟為州郡最司徒范遷薦融忠正公方經行純備宜在本朝并上其理狀永平五年入代鮑昱為司𨽻校尉多所舉正百僚敬憚之八年代包咸為大鴻臚十一年代鮭陽鴻為大司農是時顯宗方勤萬機公卿數朝會每輙延謀政事判折獄訟融經明才髙善論議朝廷皆服其能帝數嗟歎以為才堪宰相明年代伏恭為司空舉動方重甚得大臣節肅宗即位以融先朝名臣代趙憙為太尉與憙參錄尚書事建初四年薨車駕親臨其喪時融長子麟歸郷里帝以其餘子㓜弱勅太尉掾史教其威儀進止賻贈恩寵篤宻焉又賜冢塋地於顯節陵下除麟為郎韋彪字孟逹扶風平陵人也髙祖賢宣帝時為丞相祖賞哀帝時為大司馬彪孝行純至父母卒哀毁三年不出廬寢服竟羸瘠骨立異形醫療數年乃起博學洽聞雅稱儒宗建武末舉孝亷除郎中以病免復歸敎授安貧樂道恬於進趣三輔諸儒莫不慕仰之顯宗聞彪名永平六年召拜謁者賜以車馬衣服三遷魏郡太守肅宗即位以病免徴為左中郎將長樂衛尉數陳政術每歸寛厚比上疏乞骸骨拜為奉車都尉秩中二千石賞賜恩寵侔於親戚建初七年車駕西巡狩以彪行太常從數召入問以三輔舊事禮儀風俗彪因建言今西巡舊都宜追錄髙祖中宗功臣襃顯先勲紀其子孫帝納之行至長安乃制詔京兆尹右扶風求蕭何霍光後時光無苗裔唯封何末孫熊為酇侯建初二年已封曹參後曹湛為平陽侯故不復及焉乃厚賜彪錢珍羞食物使歸平陵上冢還拜大鴻臚是時陳事者多言郡國貢舉率非功次故守職益懈而吏事寖疏咎在州郡有詔下公卿朝臣議彪上議曰夫國以簡賢為務賢以孝行為首孔子曰事親孝故忠可移於君是以求忠臣必於孝子之門夫人才行少能相兼是以孟公綽優於趙魏老不可以為滕薛大夫忠孝之人持心近厚三代之所以直道而行者在其所以磨之故也士宜以才行為先不可純以閥閲然其要歸在於選二千石二千石賢則貢舉皆得其人帝深納之彪以世承二帝吏化之後多以苛刻為能又置官選職不必以才因盛夏多寒上疏諫曰臣聞政化之本必順陰陽伏見立夏以来當暑而寒殆以刑罰刻急郡國不奉時令之所致也農人急於務而苛吏奪其時賦發充常調而貪吏割其財此其巨患也夫欲急人所務當先除其所患天下樞要在於尚書尚書之選豈可不重而閒者多從郎官超升此位雖曉習文法長於應對然察察少慧類無大能宜簡常歴州宰素有名者雖進退舒遲時有不逮然端心向公奉職周密宜鑒嗇夫㨗急之對深思絳侯木訥之功也往時楚獄大起故置令史以助郎職而類多小人好為姦利今者務簡可皆停省又諫議之職應用公直之士通才謇正有補益於朝者今或從徴試軰為大夫又御史外遷動據州郡並宜清選其任責以言績其二千石視事雖久而為吏民所便安者宜増秩重賞勿妄遷徙惟留聖心書奏帝納之元和二年春東巡狩以彪行司徒事從行還以病乞身帝遣小黄門太醫問病賜以食物彪遂稱困篤章和二年夏使謁者䇿詔彪令上大鴻臚印綬其遣太子舍人詣中藏府受賜錢二十萬永元元年卒詔復賜錢二十萬布百匹榖三千斛彪清儉好施禄賜分與宗族家無餘財著書十二篇號曰韋卿子彪族子義字季節髙祖父元成元帝時為丞相初彪獨徙扶風故義猶為京兆杜陵人焉兄順字叔文平輿令有髙名次兄豹字季眀數辟公府輙以事去司徒劉愷復辟之謂曰卿以好去就爵位不躋今歳垂盡當選御史意在相薦子其宿留乎豹曰犬馬齒衰膂力已劣仰慕崇恩故未能自割且眩瞀滯疾不堪久待選薦之私非所敢當遂跣而起愷追之徑去不顧安帝西巡徴拜議郎義少與二兄齊名初仕州郡太傅桓焉辟舉理劇為廣都長甘陵陳二縣令政甚有績官曹無事牢獄空虚數上書順帝陳宜依古典考功黜陟徴集名儒大定其制又譏切左右貶刺竇氏言既無感而久抑不遷以兄順䘮去官比辟公府不就廣都為生立廟及卒三縣吏民為義舉哀若喪考妣豹子著字休眀少以經術知名不應州郡之命大將軍梁冀辟不就延熹二年桓帝公車備禮徴至霸陵稱病歸乃入雲陽山采藥不返有司舉奏加罪帝特原之復詔京兆尹重以禮敦勸著遂不就徴靈帝即位中常侍曹節以陳蕃竇氏既誅海内多怨欲借寵時賢以為名白帝就家拜著東海相詔書逼切不得已解巾之郡政任威刑為受罰者所奏坐論輸左校又後妻驕恣亂政以之失名竟歸為姦人所害隱者恥之宣秉字巨公馮翊雲陽人也少修髙節顯名三輔哀平際見王氏據權専政侵削宗室有逆亂萌遂隠遁深山州郡連召常寢疾不仕王莽為宰衡辟命不應及莽簒位又遣使者徴之秉固稱疾病更始即位徴為侍中建武元年拜御史中丞光武特詔御史中丞與司𨽻校尉尚書令㑹同並専席而坐故京師號曰三獨坐眀年遷司𨽻校尉務舉大綱簡略苛細百僚敬之秉性節儉常服布被蔬食瓦器帝嘗幸其府舍見而嘆曰楚國二龔不如雲陽宣巨公即賜布帛帷帳什物四年拜大司徒司直所得禄俸輙以收養親族其孤弱者分與田地自無儋石之儲六年卒官帝愍惜之除子彪為郎張湛字子孝扶風平陵人也矜嚴好禮動止有則居處幽室必自修整雖遇妻子如嚴君焉及在郷黨詳言正色三輔以為儀表人或謂湛偽詐湛聞而笑曰我誠詐也人皆詐惡我獨詐善不亦可乎成哀間為二千石王莽時歴太守都尉建武初為左馮翊在郡修典禮設教條政化大行後告歸平陵望寺門而步主簿進曰眀府位尊徳重不宜自輕湛曰禮下公門式路馬孔子於郷黨恂恂如也父母之國所宜盡禮何謂輕哉五年拜光禄勲光武臨朝或有惰容湛輙陳諫其失常乗白馬帝每見湛輙言白馬生且復諫矣七年以病乞身拜光禄大夫代王丹為太子太傅及郭后廢因稱疾不朝拜太中大夫居中東門候舍故時人號中東門君帝數存問賞賜後大司徒戴涉被誅帝彊起湛以代之湛至朝堂遺失溲便因自陳疾篤不能復任朝事遂罷之數年卒於家王丹字仲回京兆下邽人也哀平時仕州郡王莽時連徴不至家累千金隱居養志好施周急每嵗農時輙載酒肴於田間候勤者而勞之其墮孏者恥不致丹皆兼功自厲邑聚相率以致殷富其輕黠游蕩廢業為患者輙曉其父兄使黜責之没者則賻給親自將䕶其有遭喪憂者輙待丹為辦郷鄰以為常行之十餘年其化大洽風俗以篤丹資性方潔疾惡彊豪時河南太守同郡陳遵關西大俠也其友人喪親遵為護喪事賻助甚豐丹乃懐縑一匹陳之於主人前曰如丹此縑出自機杼遵聞而有慙色自以知名欲結交於丹丹拒而不許會前將軍鄧禹西征關中軍糧乏丹率宗族上麥二千斛禹表丹領左馮翊稱疾不視事免歸後徴為太子少傅時大司徒侯霸欲與交友及丹被徴遣子昱候於道昱迎拜車下丹下答之昱曰家公欲與君結交何為見拜丹曰君房有是言丹未之許也丹子有同門生喪親家在中山白丹欲往奔慰結侣將行丹怒而撻之令寄縑以祠焉或問其故丹曰交道之難未易言也世稱管鮑次則王貢張陳凶其終蕭朱隙其末故知全之者鮮矣時人服其言客初有薦士於丹者因選舉之而後所舉者陷罪丹坐以免客慙懼自絶而丹終無所言尋復徴為太子太傅乃呼客謂曰子之自絶何量丹之薄也不為設食以罰之相待如舊其後遜位卒于家王良字仲子東海蘭陵人也少好學習小夏侯尚書王莽世寝病不仕教授諸生千餘人建武二年大司馬吳漢辟不應三年徴拜諫議大夫數有忠言以禮進止朝廷敬之遷沛郡太守至蘄縣稱病不之府官屬皆随就之良遂上疾篤乞骸骨徴拜太中大夫六年代宣秉為大司徒司直在位恭儉妻子不入官舍布被瓦器時司徒史鮑恢以事到東海過其家而良妻布裙曳柴從田中歸恢告曰我司徒史也故來受書欲見夫人妻曰妾是也苦掾無書恢乃下拜嘆息而還聞者莫不嘉之後以病歸一歳復徴至滎陽疾篤不任進道過其友人友人不肯見曰不有忠言竒謀而取大位何其往来屑屑不憚煩也遂拒之良慙自後連徴輙稱病詔以元纁聘之遂不應後光武幸蘭陵遣使者問良所疾苦不能言對詔復其子孫邑中徭役卒於家杜林字伯山扶風茂陵人也父鄴成哀間為涼州刺史林少好學沈深家既多書而外氏張竦父子喜文采林從竦受學博洽多聞世稱通儒初為郡吏王莽敗盜賊起林與弟成及同郡范逡孟冀等将細弱俱客河西道逢賊數千人遂掠取財装褫奪衣服抜刃向林欲殺之林曰願一言而死将軍知天神乎赤眉兵衆百萬所向無前而殘賊不道卒至破敗今将軍以數千之衆欲規霸王之事不行仁恩而反遵覆車不畏天乎賊遂釋之俱免於難隗囂聞林志節深相敬待以為持書平後因疾告去辭還禄食囂復欲令彊起遂稱篤囂意雖相望且欲優容之乃出令曰杜伯山天子所不能臣諸侯所不能友盖伯夷叔齊恥食周粟今且從師友之位須道開通使順所志林雖拘於囂終不屈節建武六年弟成物故囂乃聽林持䘮東歸既遣而悔追令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致弟䘮乃嘆曰當今之世誰能行義我雖小人何忍殺義士因亡去光武聞林已歸三輔乃徴拜侍御史引見問以經書故舊及西州事甚恱之賜車馬衣被羣僚知林以名徳用甚尊憚之京師士大夫咸推其博洽河南鄭興東海衛宏等皆長於古學興嘗師事劉歆林既遇之欣然言曰林得興等固諧矣使宏得林且有以益之及宏見林闇然而服濟南徐巡始師事宏後皆更受林學林前於西州得漆書古文尚書一卷常寳愛之雖遭艱困握持不離身出以示宏等曰林流離兵亂常恐斯經將絶何意東海衛子濟南徐生復能𫝊之是道竟不墜於地矣古文雖不合時務然願諸生無悔所學宏巡益重之於是古文遂行明年大議郊祀制多以為周郊后稷漢當祀堯詔復下公卿議議者僉同帝亦然之林獨以為周室之興祚由后稷漢業特起功不縁堯祖宗故事所宜因循乃定從林議後代王良為大司徒司直林薦同郡范逡趙秉申屠剛及隴西牛邯等皆被擢用士多歸之十一年司直官罷以林代郭憲為光禄勲内奉宿衛外總三署周密敬慎選舉稱平郎有好學者輙見誘進朝夕滿堂十四年羣臣上言古者肉刑嚴重則人畏法令今憲律輕薄故姦軌不勝宜增科禁以防其源詔下公卿林奏曰夫人情挫辱則義節之風損法防繁多則茍免之行興孔子曰導之以政齊之以刑民免而無恥導之以徳齊之以禮有恥且格古之眀王深識逺慮動居其厚不務多辟周之五刑不過三千大漢初興詳覽失得故破矩為圓斵彫為樸蠲除苛政更立疏網海内歡欣人懐寛徳及至其後漸以滋彰吹毛索疵詆欺無限果桃菜茹之饋集以成臧小事無妨於義以為大戮故國無㢘士家無完行至於法不能禁令不能止上下相遁為敝彌深臣愚以為宜如舊制不合翻移帝從之後皇太子彊求乞自退封東海王故重選官屬以林為王傅從駕南巡狩時諸王傅數被引命或多交游不得應詔唯林守慎有召必至餘人雖不見譴而林特受賞賜又辭不敢受帝益重之明年代丁恭為少府二十二年復為光禄勲頃之代朱浮為大司空博雅多通稱為任職相明年薨帝親自臨喪送葬除子喬為郎又詔喬為丹水長郭丹字少卿南陽穰人也父稚成帝時為廬江太守有清名丹七歳而孤小心孝順後母哀憐之為鬻衣装買産業後從師於長安買符入函谷關乃慨然嘆曰丹不乗使者車終不出關既至京師常為都講諸儒咸敬重之大司馬嚴尤請丹辭病不就王莽又徴之遂與諸生逃於北地更始二年三公舉丹賢能徴為諫議大夫持節使歸南陽安集受降丹自去家十二年果乗髙車出關如其志焉更始敗諸將悉歸光武並獲封爵丹獨保平氏不下為更始發䘮縗絰盡哀建武二年遂潛逃去敝衣閒行涉歴險阻求謁更始妻子奉還節𫝊因歸郷里太守杜詩請為功曹丹薦郷人長者自代而去詩乃歎曰昔眀王興化卿士讓位功曹推賢可謂至徳勅以丹事編署黄堂以為後法十三年大司馬吳漢辟舉髙第再遷并州牧有清平稱轉使匈奴中郎將遷左馮翊永平三年代李訢為司徒在朝㢘直公正與侯霸杜林張湛郭伋齊名相善明年坐考隴西太守鄧融事無所據䇿免五年卒於家時年八十七以河南尹范遷有清行代為司徒遷字子廬沛國人初為漁陽太守以智略安邊匈奴不敢入界及在公輔有宅數畝田不過一頃又推與兄子其妻常謂曰君有四子而無立椎之地可餘奉禄以為後世業遷曰吾備位大臣而蓄財求利何以示後世在位四年薨家無儋石焉後顯宗因朝㑹問羣臣郭丹家今何如宗正劉匡對曰昔孫叔敖相楚馬不秣粟妻子不衣帛子孫竟䝉寝邱之封丹出典州郡入為三公而家無遺産子孫困匱帝乃下南陽訪求其嗣長子宇官至恒山太守少子濟趙相吳良字大儀齊國臨淄人也初為郡吏歳旦與掾吏入賀門下掾王望舉觴上夀諂稱太守功徳良於坐下勃然進曰望佞邪之人欺諂無狀願勿受其觴太守歛容而止讌罷轉良為功曹恥以言受進終不肯謁時驃騎將軍東平王蒼聞而辟之署為西曹蒼甚相敬愛上疏薦良經任博士行中儀表宜備宿衛以輔聖政書奏顯宗以示公卿曰前以事見良髪鬚皓然衣冠甚偉夫薦賢助國宰相之職蕭何舉韓信設壇而拜不復考試今以良為議郎永平中車駕近出而信陽侯陰就干突禁衛車府令徐匡鈎就車收御者送獄詔書譴匡匡乃自繫良上言信陽侯就倚恃外戚干犯乗輿無人臣禮為大不敬匡執法守正反下于理臣恐聖化由是而弛帝雖赦匡猶左轉良為即邱長後遷司徒長史每處大議輙據經典不希㫖偶俗以徼時譽後坐事免復拜議郎卒於官承宫字少子琅邪姑幕人也少孤年八歳為人牧豖郷里徐子盛者以春秋經授諸生數百人宫過息廬下樂其業因就聽經遂請留門下為諸生拾薪執苦數年勤學不倦經典既明乃歸家教授遭天下䘮亂遂将諸生避地漢中後與妻子之䝉陰山肆力耕種禾黍將熟人有認之者宫不與計推之而去由是顯名三府更辟皆不應永平中徴詣公車駕臨辟雍召宫拜博士遷左中郎將數納忠言陳政論議切慤朝臣憚其節名播匈奴時北單于遣使求得見宫帝勅自整飾宫對曰夷狄眩名非識實者也臣狀醜不可以示逺宜選有威容者帝乃以大鴻臚魏應代之十七年拜侍中祭酒建初元年卒肅宗襃歎賜以冢地妻上書乞歸葬郷里復賜錢三十萬鄭均字仲虞東平任城人也少好黄老書兄為縣吏頗受禮遺均數諫止不聽即脱身為傭歳餘得錢帛歸以與兄曰物盡可復得為吏坐臧終身捐棄兄感其言遂為㢘潔均好義篤實養寡嫂收孤兒恩禮敦至常稱病家廷不應州郡辟召郡將欲必致之使縣令譎將詣門既至卒不能屈均於是客於濮陽建初三年司徒鮑昱辟之後舉直言並不詣六年公車特徴再遷尚書數納忠言肅宗敬重之後以病乞骸骨拜議郎告歸因稱疾篤帝賜以衣冠元和元年詔告廬江太守東平相賜均及前安邑令毛義榖各千斛常以八月長吏存問賜羊酒明年帝東巡過任城乃幸均舍勅賜尚書禄以終其身故時人號為白衣尚書永元中卒於家趙典字仲經蜀郡成都人也父戒為太尉桓帝立以定䇿封厨亭侯典少篤行隠約博學經書弟子自逺方至建和初四府表薦徴拜議郎侍講禁内再遷為侍中時帝欲廣開鴻池典諫曰鴻池汎溉已且百頃猶復增而深之非所以崇唐虞之約已遵孝文之愛人也帝納其言而止父卒襲封出為𢎞農太守轉右扶風公事去官徴拜城門校尉轉将作大匠遷少府又轉大鴻臚時恩澤諸侯以無勞受封羣臣不恱而莫敢諫典獨奏曰夫無功而賞勞者不勸上沗下辱亂象干度且髙祖之誓非功臣不封宜一切削免爵土以存舊典帝不從頃之轉太僕遷太常朝廷每有災異疑議輙諮問之典據經正對無所曲折每得賞賜輙與諸生之貧者後以諫諍違㫖免官就國會帝崩時禁藩國諸侯不得奔弔典慨然曰身從衣褐之中致位上列且烏鳥反哺報徳况於士邪遂解印綬符䇿付縣而馳到京師州郡及大鴻臚並執處其罪而公卿百僚嘉典之義表請以租自贖詔書許之再遷長樂少府衛尉公卿復表典篤學博聞宜備國師㑹病卒使者弔祠竇太后復遣使兼贈印綬諡曰獻侯典兄子謙謙弟温相繼為三公謙字彦信初平元年代黄琬為太尉獻帝遷都長安以謙行車騎將軍為前置明年病罷復為司𨽻校尉車師王侍子為董卓所愛數犯法謙收殺之卓大怒殺都官從事而素敬憚謙故不加罪轉為前將軍遣擊白波賊有功封郫侯李傕殺司徒王允復代允為司徒數月病免拜尚書令是年卒諡曰忠侯温字子柔初為京兆郡丞歎曰大丈夫當雄飛安能雌伏遂棄官去遭歳大飢散家糧以賑窮餓所活萬餘人獻帝西遷為侍中同輿輦至長安封江南亭侯代楊彪為司空免頃之復為司徒錄尚書事時李傕與郭汜相攻傕遂虜掠禁省刼帝幸北塢外内隔絶傕素疑温不與己同乃内温於塢中又欲移乗輿於黄白城温與傕書曰公前託為董公報讐然實屠陷王城殺戮大臣天下不可家見而户説也今與郭汜争睚眦之隙以成千鈞之讐人在塗炭各不聊生曽不改悟遂成禍亂朝廷仍下明詔欲令和解上命不行威澤日損而復欲移轉乗輿更幸非所此誠老夫所不達也於易一為過再為涉三而弗改滅其頂凶不如早共和解引軍還屯上安萬乗下全人民豈不幸甚傕大怒欲遣人殺温董卓從弟應温故掾也諫之數日乃獲免温從車駕都許建安十三年以辟司空曹操子丕為掾操怒奏温辟忠臣子弟選舉不實免官是歳卒年七十二桓譚字君山沛國相人也父成帝時為太樂令譚以父任為郎因好音律善鼓琴博學多通徧習五經皆訓詁大義不為章句能文章尤好古學數從劉歆揚雄辯析疑異性嗜倡樂簡易不修威儀而憙非毁俗儒由是多見排抵音紙哀平間位不過郎𫝊皇后父孔郷侯晏深善於譚是時高安侯董賢寵倖女弟為昭儀皇后日已疎晏嘿嘿不得意譚進説曰昔武帝欲立衛子夫陰求陳皇后之過而陳后終廢子夫竟立今董賢至愛女弟尤幸殆將有子夫之變可不憂哉晏驚動曰為之奈何譚曰刑罰不能加無罪邪枉不能勝正人夫士以才智要君女以媚道求主皇后年少希更艱難或驅使醫巫外求方伎此不可不備又君侯以后父尊重而多通賔客必借以重勢貽致譏議不如謝遣門徒務執謙慤此修己正家避禍之道也晏曰善遂罷遣常客入白皇后如譚所戒後賢果諷太醫令真欽使求傅氏罪過遂逮后弟侍中喜詔獄無所得乃解故傅氏終全於哀帝之時及董賢為大司馬聞譚名欲與之交譚先奏書於賢説以輔國保身之術賢不能用遂不與通當王莽居攝簒弑之際天下之士莫不競襃稱徳美作符命以求容媚譚獨自守黙然無言莽時為掌樂大夫更始立召拜太中大夫世祖即位徴待詔上書言事失㫖不用後大司空宋𢎞薦譚拜議郎給事中因上疏陳時政所宜曰臣聞國之廢興在於政事政事得失由乎輔佐賢明則俊士充朝而理合世務輔佐不明則論失時宜而舉多過事夫有國之君俱欲興化建善然而政道未理者其所謂賢者異也昔楚莊王問孫叔敖曰寡人未得所以為國是也叔敖曰國之有是衆所惡也恐王不能定也王曰不定獨在君亦在臣乎對曰君驕士曰士非我無從富貴士驕君曰君非士無從安存人君或至失國而不悟士或至飢寒而不進君臣不合則國是無從定矣莊王曰善願相國與諸大夫共定國是也盖善政者視俗而施教察失而立防威徳更興文武迭用然後政調於時而躁人可定昔董仲舒言理國譬若琴瑟其不調者則改而更張夫更張難行而拂衆者亡是故賈誼以才逐而鼂錯以智死世雖有殊能而終莫敢談者懼於前事也且設法禁者非能盡塞天下之姦皆合衆人之所欲也大抵取便國利事多者則可矣夫張官置吏以理萬民懸賞設罰以别善惡惡人誅傷則善人䝉福矣今人相殺傷雖已伏法而私結怨讐子孫相報後忿深前至於滅户殄業而俗稱豪傑故雖有怯弱猶勉而行之此為聽人自理而無復法禁者也今宜申明舊令若已伏官誅而私相傷殺者雖一身逃亡皆徙家屬於邊其相傷者加常二等不得雇山贖罪如此則仇怨自解盜賊息矣夫理國之道舉本業而抑末利是以先帝禁人二業錮商賈不得宦為吏此所以抑并兼長㢘恥也今富商大賈多放田貨中家子弟為之保役趨走與臣僕等勤收稅與封君比入是以衆人慕效不耕而食至乃多通侈靡以淫耳目今可令諸商賈自相紏告若非身力所得皆以臧畀告者如此則専役一已不敢以貨與人事寡力弱必歸功田畝田畝修則榖入多而地力盡矣又見法令決事輕重不齊或一事殊法同罪異論姦吏得因緣為市所欲活則出生議所欲陷則與死比是為刑開二門也今可令通義理明習法律者校定科比一其法度班下郡國蠲除故條如此則天下知方而獄無怨濫矣書奏不省時帝方信䜟多以決定嫌疑又醻賞少薄天下不時安定譚復上疏曰凡人情忽於見事而貴於異聞觀先王之所記述咸以仁義正道為本非有竒怪虚誕之事盖天道性命聖人所難言也自子貢以下不得而聞况後世淺儒能通之乎今諸巧慧小才伎數之人增益圖書矯稱䜟記以欺惑貪折詿誤人主焉可不抑逺之哉臣譚復聞陛下窮折方士黄白之術甚為明矣而乃欲聽納䜟記又何疑也其事雖有時合譬猶卜數隻偶之類陛下宜垂明聽發聖意屏羣小之曲說述五經之正義略靁同之俗語詳通人之雅謀又臣聞安平則尊道術之士有難則貴介胄之臣今聖朝興復祖統為人臣主而四方盜賊未盡歸伏者此權謀未得也臣譚伏觀陛下用兵諸所降下既無重賞以相恩誘或至虜掠奪其財物由是兵長渠率各生狐疑黨軰連結歳月不解古人有言曰天下皆知取之為取莫知與之為取陛下誠能輕爵重賞與士共之則何招而不至何說而不釋何向而不開何征而不克如此則能以狭為廣以遲為速亡者復存失者復得矣帝省奏愈不悦其後有詔㑹議靈臺所處帝謂譚曰吾欲以䜟決之何如譚嘿然良久曰臣不讀䜟帝問其故譚復極言䜟之非經帝大怒曰桓譚非聖無法將下斬之叩頭流血良久乃得解出為六安郡丞意忽忽不樂道病卒時年七十餘初譚著書言當世行事二十九篇號曰新論上書獻之光武善焉琴道一篇未成肅宗使班固續成之所著賦誄書奏凡二十六篇元和中肅宗東巡至沛使使者祠譚冢郷里以為榮通志卷一百七上
