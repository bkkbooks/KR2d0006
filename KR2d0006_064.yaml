body:
  text: 通志卷五十九宋右迪功郎鄭樵漁仲撰選舉略第二雜議論上舉人條例選人條例雜議論下選舉雜議七條請改革選舉事件內外文武官五品以上應非選司注擬者吏部尚書侍郎兵部尚書侍郎禮部每年貢舉人兵部選舉京官六品以下應合選注擬者府州佐官别駕少尹五府司馬赤令不在此例中下縣丞以下及關津鎮戍官等州縣六品以下官資厯諸堪充內官及宿衛統帥禁約雜條學校雜議論上漢哀帝初立欲匡成帝之政多所變動時丞相王嘉上疏曰古者繼世立諸侯象賢也雖不能盡賢天子為擇臣立命卿以輔之居是國也纍代尊重然後士民之衆附焉是以教化行而治功立今之郡守重於古諸侯而輕易之可乎孝文帝時吏居官者或長子孫以官為氏倉氏庾氏則倉庾吏之後也其二千石長吏亦安官樂職然後上下無茍且之意其後稍稍變易公卿以下轉相促急又數以改更政事司𨽻部刺史察過悉劾發揚隂私吏或居數月而退送故迎新交錯道路中材茍容求全下材懷危內顧一切營私者多二千石益輕賤吏民慢易之孝宣愛良吏有常劾事留中會赦一解故事尚書希下章為煩擾百姓徴驗繫理或死獄中章文必有敢告之字乃下陛下留神擇賢記善忘過容忍臣子勿責以備二千石部刺史三輔縣令有材任職者人情不能不有過差宜可闊略令盡力者有所勸此方今急務國家之利也嘉因薦儒者公孫光滿昌及能吏蕭咸薛循等皆故二千石有名稱天子納而用之後漢光武時陳事者多言郡國貢舉率非功次故守職益懈而吏事寖疏咎在州郡有詔下公卿朝臣議韋彪上議士宜以才行為先不可純以閥閲然其要歸於選二千石二千石賢則貢舉得其人矣帝深納之張衡上疏曰古者取士諸侯嵗貢孝武之代郡舉孝廉又有賢良文學之選於是名臣皆出文武並興漢之得人數路而已夫書畫辭賦才之小者遊意篇章當代博奕以此取士諸生競利作者鼎沸其髙者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虛冒名氏臣每受詔於盛化門差次録第其未及者亦復隨輩皆見拜擢既加之恩難復收改但守俸祿於義已加不可復使理民及仕州郡魏文帝時詔曰選舉莫取有名名如畫地作餅不可啖也吏部尚書盧育對曰名不足以致異人而可以得常士常士畏教慕善然後有名其後士人多務進趨廉遜道缺時劉實乃著崇讓論以矯之晉始平王文學李重以為等級繁多又外官輕而內官重議曰秦采古制漢仍秦舊倚丞相任九卿雖置五曹尚書令僕射之職始於掌封奏以宣外內事任尚輕而郡守牧人之官重漢宣所與為治唯良二千石其有殊政者或賜爵進秩諒得為治大體所以逺比三代也及于東京尚書雖漸優重然令僕出為郡守便入為三公虞延第五倫桓虞鮑昱是也近自魏朝名守杜畿滿寵田豫胡質等居郡或十餘年或二十年或加秩假節而不去郡此亦古人茍善其事雖沒世不徙官之義也漢魏以來內官之貴於今最崇而百官等級遂多遷補轉徙如流能否無以著黜陟不得彰此為治之大弊也夫階級繁多而冀官久官不久而冀治功成不可得也帝雖善之而不能行齊左僕射王儉請解領選謂褚彥回曰選曹之始近自漢末今若反古使州郡貢計三府辟士與衆共之猶賢一人之意古者選衆今則不然竒才絶智所以見遺於草澤也彥回曰誠如卿言但行之已久卒難為改也梁尚書左僕射沈約論曰漢末喪亂魏武始創軍中倉卒權立九品蓋以論人才優劣非謂世族髙卑因此相沿遂為成法自魏至晉莫之能改州都郡正以才品人而舉世人才升降蓋寡徒以慿藉世資用相凌駕都正俗士斟酌時宜品目少多隨事俯仰劉毅所云下品無髙門上品無賤族也嵗月遷訛斯風漸篤天監中約又上疏曰頃自漢代本無士庶之别自非仕宦不至京師罷公卿牧守並還鄉里小人瞻仰以成風俗且黌校棊布傳經授業學優而仕始自鄉邑本於小吏幹佐方至文學功曹積以嵗月乃得察舉人才秀異始為公府所辟遷為牧守入作台司漢之得人於斯為盛當今士子略以萬計常患官少才多假使秀才對五問可稱孝廉答一䇿能過此雕蟲小道非關治功得失以此求才徒虛語耳後魏孝文帝時髙祐上疏云今之選舉不採識理之優劣專簡年勞之多少斯非盡才之謂宜停此薄藝棄彼功勞唯才是取官方斯穆又勳舊之臣雖年勤可録而才非撫民則可加之以爵賞不宜委之以方任所謂王者可私人以財不私人以官帝善之薛淑為吏部郎中先是崔亮奏立停年之格不簡人才專問勞舊淑乃上書曰若使選曹唯取年勞不簡賢否便即義均行鴈次若貫魚勘簿呼名一吏足矣數人而用何謂銓衡今請郡縣之職吏部先盡擇才慕取廉平淳直素行有聞并學通古今曉逹治體者以應其選不拘入職近逺年勳多少其積勞之中有才堪牧民者先在用之限其餘不堪者既壯藉其力豈容老而棄之將佐丞尉去民積逺小小當否未為失宜依次補序以酬其勞書奏不報徐因引見復陳言曰漢朝常令三公大臣舉賢良方正有道直言之士以為長吏監撫黎元自晉以來此風遂替今四方初定務在養民臣請依漢氏更立四科令三公宰貴各薦時賢以補郡縣明立條格防其阿黨之端詔下公卿議之事亦寢隋文帝開皇中治書侍御史李諤以選才失中上書曰自魏之三祖更尚文詞忽君人之大道好雕蟲之小藝下之從上有同影響競騁文華遂成風俗江左齊梁其弊彌甚貴賤賢愚唯務吟詠遂復遺理存異尋虛逐微競一韻之竒爭一字之巧連篇纍牘不出月露之形積案盈箱唯是風雲之狀世俗以此相髙朝廷據兹擢士祿利之路既開愛尚之情愈篤是以開皇四年普詔天下公私文翰並宜實録其年九月泗州刺史司馬幼之上表華豔付所司治罪由是公卿大臣咸知正路莫不鑽仰墳索棄絶華綺擇先王之令典行大道於兹代如聞在外州縣仍踵弊風選吏舉人未遵典則臣既忝憲司職當糾察若聞風即劾恐挂網者多請勒諸司普加搜訪有如此者具狀送臺唐貞觀八年三月詔進士讀一部經史二十二年九月考功員外郎王師明知舉時冀州進士張昌齡王公謹並有俊才聲振京邑而師明考其文䇿全否舉朝不知所以及奏等第太宗怪無昌齡等名因召師明問之對曰此輩誠有詞華然其體輕薄文章浮豔必不成令器臣若擢之恐後生相倣效有變陛下風雅帝以為名言後並如其言髙宗顯慶初黃門侍郎劉祥道以選舉漸弊陳奏其一曰吏部比來取人傷多且濫每年入流數過千四百人是傷多永徽五年一千四百三十人六年一千十八人顯慶元年一千四百五十人不簡雜色人即注官是傷濫雜色解文三衛內外行署內外番官親事帳內品子任雜掌伎術直司書手兵部品子兵部散官勳官記室及功曹參軍檢校官屯副驛長校尉牧長經學時務等比雜色人二分不居其一經明行修之士猶罕有正人多取胥徒之流豈可皆求德行其雜色應入流人請令曹司試判訖簡為四等奏聞量有材用兼有義行者為一等身品強壯及第八上并兵部所送人不沾第一等及凖例合送兵部者為第二等餘量簡為第三第四等第一等付吏部第二等付兵部第三等付主爵第四等付司勳並凖例處分其二曰古之選者為官擇人不為人擇官今之選者亦擇人但人多而官員少擇之無凖約官員有數入流無限以有數供無限人隨嵗積豈得不賸其三曰雜色人請與明經進士通充入流之數以三分論每二分取明經進士一分取雜色人嶺南及瘴癘之所四考不得替者不在此限例若計至五品及有中上以上私犯中下公坐下上以下考者四考滿依舊置替得替人依式聽選奉敕付所司集羣臣詳議議者多難於改作乾封二年八月上列侍臣責以不進賢良宰相李安期進曰比來公卿有所薦引即遭囂謗以為朋黨沈屈者未申而在位者已損所以人思茍免競為緘默若陛下虛已招納務於搜訪不忌親讐唯能是用讒毁不入誰不竭誠此皆事由陛下非臣等所能致也上深然之武太后臨朝垂拱中納言魏元同以為吏部選舉未盡得人之術上疏曰昔之列國今之州縣士無常君人有定主自求臣佐各選英賢大臣乃命于王朝耳秦并天下罷侯置守漢氏因之有沿有革諸侯得自置吏四百石以下其傅相大官則漢為置之州郡掾史督郵從事悉任之於牧守爰自魏晉始歸吏部遞相因循以迄于令以刀筆求才以簿書察行法之弊久矣今諸色入流年以千計羣司列位無復新加官有常員人無定限選集之始霧積雲屯擢敘於終十不收一淄澠混淆玉石不分用捨去留得失相半既即事為弊致後來滋甚按成周之制諸侯之臣不皆命於天子王朝庶官亦不專於一職故穆王以伯冏為太僕正命之曰慎簡乃僚無以巧言令色便僻側媚其唯吉士此則令其自擇下吏之文也太僕正中大夫耳尚以僚屬委之則三公九卿亦然矣周禮太宰內史並掌爵祿廢置司徒司馬别掌興賢詔事當是分任於羣司而統之以數職各自求其小者而王命其大者也疏奏不納天授三年右補闕薛謙光以其時雖有學校之設禁防之制而風俗流弊皆背本而趨末矯飾行之以請託奔馳為務上疏曰自七國以來雖雜以縱橫而漢興求士以行為先既為閭里推髙然後為府寺所辟而魏氏取人好其放逹晉宋之後祗重門資梁陳之間特好詞賦故其俗以詩酒為重未嘗以修身為務降及隋室餘風尚存文筆日煩政事日靡文帝於是禁浮詞而罪司馬幼之風俗始改政化大行及煬帝又變前法置進士等科故後生復相倣效皆以浮華為貴今之舉人有乖事實或明制適下試令搜揚則驅馳府寺請謁權貴陳詩奏記希咳唾之澤摩頂至足冀提攜之恩故俗號舉人為覔舉夫選曹授職喧囂於禮闈州郡貢士諍訟於陛闥謗議紛紜浸成風俗今夫舉人詢於鄉閭歸於里正而已設如才應經邦唯令試䇿武能制敵只驗彎弧文擅清竒則登甲科藻思小減則為不第以此收人恐乖事實何者樂廣假筆於安仁靈運詞髙於穆之平津文劣於長卿子建藻麗於荀彧若以射䇿為官則潘謝曹馬必居荀樂之右協贊機猷則安仁靈運亦無禆附之益由此言之固不可一槩而取也其武藝亦然故謀將不長於弓馬良相寧資於射䇿伏願陛下降明制頒峻刑文則試以理官武則令其守禦使僥名濫吹之伍無所藏其庸謬又按漢法所舉之主終身保任揚雄之坐田儀責其冒薦成子之居魏相酬於得賢賞罰之令行則請謁之心絶辭遜之義著則貪競之路塞矣仍請寬立年限容其採訪簡汰堪用者令試守以觀能否參檢行事以核是非稱職者受薦賢之賞濫舉者抵欺罔之罪自然舉得才行而君子之道長矣聖厯三年二月武太后令宰相各舉尚書郎一人狄仁傑獨薦男光嗣由是拜地官尚書郎蒞事有聲太后謂仁傑曰祁奚內舉果得人也長安二年太后下求賢令狄仁傑曰荆州長史張柬之其人雖老真宰相才也乃召為洛州司馬他日又求賢仁傑曰臣前言張柬之太后曰已遷之矣對曰臣薦之謂為相也今為洛州司馬非用之又遷秋官侍郎開元三年左拾遺張九齡上書曰夫元元之衆莫不懸命於縣令宅生於刺史宜重其選而今刺史縣令除京輔近處之州刺史猶擇其人縣令或備員而已其餘江淮隴蜀三河諸處除大府之外稍稍非才但於京官之中出為州縣者或是緣身有纍在職無聲用於牧宰之間以為斥逐之地因勢附會遂忝髙班比其勢衰亦為刺史至於武夫流外積資而得官成於經久不計有才諸若此流盡為刺史其餘縣令以下固不可勝言今朝廷卿士入而不出在外者又技癢求入臣愚以為宜立科條定其資厯凡不厯都督刺史有髙第者不得入為侍郎列卿不厯縣令有善政者亦不得入為臺郎給舍雖逺處都督刺史至於逺縣令遞次差降以為出入不得十年頻任京職又不得十年盡任外官如此設科以救其失則內外通理萬姓獲安又古之選用賢良取其稱職或遙聞而辟召或一見而任之是以士修素行不圖僥幸今吏部條章動盈千萬刀筆之吏辨析毫釐始造簿書以備用人之遺忘耳今反求精於案牘不急於人才亦何異遺劒中流而刻舟以記去之彌逺可為傷心凡稱吏部之能者則曰從縣尉與主簿從主簿與縣丞斯選曹執文而善知官次者也唯據其合與不合而多不論賢與不肖陛下若不以吏部尚書侍郎為賢必不授以職事尚書侍郎既以賢而授委豈復不能知人人之難知雖自古所慎而拔十得五其道可行今則執以格條貴於謹守其能自覺者每選所拔亦有三五人若又專固者則亦一人不拔據資配職自以為能為官擇人初無此意故使時人有平配之議官曹無得賢之實故臣以為選部之法敝於不變法變法甚易在陛下渙然行之今若刺史縣令精核其人即每年當管之內應有合選之色且先委曲考其才行堪入品流然後送臺臺又推擇據所用之多少為州縣之殿最一則州縣慎於所舉必取入官之才二則吏部因其有成無多庸人干冒十七年三月國子祭酒楊湯上言伏聞承前之例每年應舉常有千數及第兩監不過一二十人臣恐三千舉徒虛費官廩兩監博士濫縻天祿臣竊見入仕諸色出身每嵗向二千餘人方於明經進士多十餘倍臣之微誠實所未曉今監司課試十已退其八九考功及第十又不收一二長以此為限恐儒風漸墜小道將興若以出身人多應須諸色都減豈在獨抑明經進士也上然之左監門衛録事參軍劉秩論曰商鞅説秦孝公曰利出一孔者王利出二孔者強利出三孔者弱於是下令非戰非農不得爵位秦卒以是能并吞六國漢室干戈以定禍亂貴尚淳質髙后舉孝悌力田文景守而不變故下有常業而朝稱多士及孝武察孝亷置五經博士弟子雖門開二三而未失道德也逮至晚嵗務立功名鋭意四夷故權譎之謀設荆楚之士進軍旅相繼官用不足是以聚斂計料之政生設險興利之臣起番係嚴熊羆等經淮造渠以通漕運東郭偃孔僅建鹽鐵諸利䇿富者冒爵射官免刑除罪公用彌多而為官者徇私上下並求百姓不堪刓弊由是精通秀穎之士不遊於學遊於學者率章句之儒也是以昭帝之時霍光問民疾苦不本之於太常諸生徵天下賢良文學以訪之是常道不足以取人也漢氏失馭曹魏僭竊中正取士權歸著姓雖可以鎮伏氓庶非尚賢之術洎乎晉宋齊梁遞相祖習謂善賦者廊廟之人雕蟲者台鼎之器下以此自負上以此選材上下相蒙持此為業周書曰以言取人人竭其言以行取人人竭其行取人之道不可不慎也隋氏罷中正舉選不本鄉曲故里閭無豪族井邑無衣冠人不土著萃處京畿士不飾行人弱而愚夫古者任人之制以勳賞功以才蒞職是以職與人宜近則以職賞功是以官與人乖古者計人而貢士計吏而用人故士無不官官無乏吏近則官倍於古士十於官求官者又十於士故士無官官乏祿吏擾人古者王畿千里千里之外封建諸侯諸侯之吏自卿以降各自舉任當乎漢室除保傅將相餘盡專之州縣佐史則皆牧守選辟夫公卿者主相之任也甸外之官吏者又諸侯牧守之事也然則主司之所選者獨甸內之吏公卿府之屬耳豈不寡哉所選既寡則焉得不精近則有封建而無國邑五服之內政決王朝一命拜免必歸吏部按名授職猶不能遣何暇採訪賢良搜核行能邪又曰三代之制家有世業國有世官孔子曰醫不三世不服其藥史墨曰古之為官世守其業朝夕思之一朝失業死則及焉是知業不世習則其事不精此周之所以得人也昔羲氏和氏世掌天地劉氏世擾龍籍氏世司史庾氏庫氏世司出納制氏世司鑄鐘即其事也至後代以世卿執柄益私門卑公室齊奪於田氏魯弱於三桓革世卿之失而不復世業之制醫工筮數其道浸微蓋為此也洋州刺史趙匡舉選議曰三代建侯與今事異請自漢言之漢朝用人自詔舉之外其府寺郡國屬吏皆令自署故天下之士修身於家而辟書交至以此士務名節風俗用修魏氏立九品之制中正司之於是族大者第髙而寒門之秀屈矣國朝舉選用隋氏之制嵗月既久其法益訛夫才智因習而就固然之理進士者時共貴之主司褒貶實在詩賦務求巧麗以此為賢不唯無益於用實亦妨其正習不唯撓其淳和實又長其佻薄自非識度超然時或孤秀其餘溺於所習悉昧本源欲以啓導性靈奬成後進斯亦難矣故士林鮮體國之論其弊一也又人之心智蓋有涯分而九流七略書籍無窮主司問目不立程限故修習之時但務鈔略比及就試偶中是期業無所成固由於此故當代寡人師之學其弊二也疏以釋經蓋筌蹄耳明經讀書勤苦以甚其口問義又誦疏文徒竭其精華習不急之業而其當代禮法無不面牆及臨民決事取辦胥吏之口而已所謂所習非所用所用非所習者也故當官少稱職之吏其弊三也舉人大率二十人中方收一人故沒齒而不登科者甚衆其事難其路隘也如此而雜色之流廣通其路也此一彼十此百彼千揆其秩序無所差降故受官多底下之人修業抱後時之嘆待不才者何厚處有能者何薄崇末抑本啓昏窒明故士子捨學業而趨末伎其弊四也收人既少則爭第急功交馳公卿以求汲引毁訾同類用以爭先故業因儒雅行成險薄非受性如此勢使然也浸以成俗虧損國風其弊五也大抵選舉人以秋初就路春末方歸休息未定聚糧未辦即又及秋事業不得修習益令藝能淺薄其弊六也羈旅往來縻費實甚非唯妨闕生業蓋亦隳其舊産未及數舉索然以空其弊七也貧窶之士在逺方欲力赴京師而所冀無際以此揆度遂至沒身使兹人有抱屈之恨國家有遺才之闕其弊八也官司運江淮之儲計五費其四乃逹京邑芻薪之貴又十倍而四方舉選之人每年攢會計其人畜蓋將數萬無成而歸十乃七八徒令關中煩耗其弊九也為官擇人唯才是待今選司並格之以年數合格者判雖下劣一切皆收如未合格而應科目者才有小瑕莫不見棄故無能之士祿以例臻才俊之流坐成白首此非古人求賢審官之義亦以明矣其弊十也選人不約本州所試悉聚於京師人既浩穰文簿煩雜因此偷濫其事百端故俗間相傳云入試非正身十有三四赴官非正身十有二三此弊之尤者今若未能頓除舉選以從古制且稍變易以息弊源則官多佳吏風俗可變其條例如後舉人條例一立身入仕莫先於禮尚書明王道論語詮百行孝經德之本學者所宜先習其明經通此謂之兩經舉論語孝經為之翼助諸試帖一切請停唯令䇿試義及口問其試䇿自改問時務以來經業之人鮮能屬綴以此少能通者所司知其若此亦不於此取人故時人云明經問䇿禮試而已所謂變實為虛無益於政今請令其精習試䇿問經義及時務各五節並以通四以上為第但令直書事義解釋分明不用空寫疏文及務華飾其十節總於一道之內問之餘科準此其口問諸書每卷問一節取其心中了悟解釋分明往來問答無所滯礙不用要令誦疏亦以十通八以上為第諸科亦準此外更通周易毛詩名四經舉加左氏春秋為五經舉不習左氏者任以公羊榖梁代之其但習禮記及論語孝經名一經舉既立差等隨等授官則能否區分人知勸勉一明法舉亦請不帖但䇿問義并口問準經業科一學春秋者能斷大事有兼習三傳參其異同商榷比擬得其長者謂之春秋舉䇿問經義并口問並準前一進士習業請令習禮記尚書論語孝經并一史其雜文請試兩首共五百字以上六百字以下試箋表議論銘頌針檄等有資於用者不試詩賦其理通其詞雅為上理通詞平為次餘為否其所試䇿於所習經史內問經問聖人旨趣史問成敗得失并時務共十節貴觀理識不用求隱僻詰名數為無益之能言詞不至鄙陋即為第一其有通禮記尚書論語孝經之外更通道德諸經通元經孟子荀卿子吕氏春秋管子墨子韓子謂之茂才舉逹觀之士既知經學兼有諸子之學取其所長捨其偏滯則於理道無不該矣試䇿問諸書義理并時務共二十節仍與之言論觀其通塞一其有學兼經史逹於政體䇿略深正其詞典雅者謂之秀才舉經通四經或二禮或三家春秋兼通三史以上即當其目其試䇿經問聖人旨趣史問成敗得失并時務共二十節仍與之談論以究其能一學倍秀才而詞䇿同之談論貫通究識成敗謂之宏才舉以前三科其䇿當詞髙理備不可同於進士其所問每十節通八以上為第一其史書史記為一史漢書為一史後漢書并劉昭所注志為一史三國志為一史晉書為一史李延夀南史為一史北史為一史習南史者兼通宋齊志習北史者通後魏隋書志自宋以後史書煩碎冗長請但問政理成敗所因及其人物損益關於當代者其餘一切不問國朝自髙祖下及睿宗實録并貞觀政要共為一史一天文律厯自有所司專習且非學者卒能尋究並請不問唯五經所論蓋舉其大體不可不知一每年天下舉人來秋入貢者今年九月州府依前科目先起試其文䇿通者注等第訖試官本司官録事參軍及長吏連押其後其口問者題䇿後云口問通若干即相連印縫並依寫解為先後不得參差封題訖十月中旬送觀察使觀察使差人送都省司隨逺近比類須合程限省司重考定訖其入第者二月內符下諸道諸州追之限九月內盡到到即重試之其文䇿皆勘會書迹詞理與州試同即收之偽者送法司推問其國子監舉人亦準前例一諸色身名都不涉學昧於廉恥何以居官其簡試之時雖云試經及判其事茍且與不試同請皆令習孝經論語其孝經口問五道論語口問十道須問答精熟知其義理並須通八以上如先習諸經書者任隨所習試之不須更試孝經論語其判問以時事取其理通必在責其重保以絶替代其合外州申解者依舉選例處分一一經及第人選日請授中縣尉之類判入第三等及蔭髙授上縣尉之類兩經出身授上縣尉之類判入第三等及蔭髙授緊縣尉之類用蔭止於此其以上當以才進四經出身授緊縣尉之類判入第三等授望縣尉之類五經授望縣尉之類判入第二等授畿縣尉之類明法出身與兩經同資進士及三禮舉春秋舉與四經同資其茂才秀才請授畿尉之類其宏才請送詞䇿上中書門下請授諫官史官等禮經舉人若更通諸家禮論及漢以來禮儀沿革者請便授太常博士茂才等三科為學既優並準五經舉人便授官其雜色出身人量書判授中縣尉之類判入第三等及蔭髙者加一等凡蔭除解褐官外不在用限一其今舉人所習既從簡易士子趨學必當數倍往時每年諸色舉人主司簡擇常以五百人為大限此外任收雜色選人條例一其前資官及新出身並請不限選數任集庶有才不滯官得其人一不習經書史無以立身不習法理無以效職人出身以後當宜習法其判問請皆問以時事疑獄令約律文斷決其有既依律文又約經義文理宏雅超然出羣為第一等其斷以法理參以經史無所虧失粲然可觀為第二等判斷依法頗有文彩為第三等頗約法式直書可否言雖不及其理無失為第四等此外不收但如曹判及書題如此則可不得拘以聲勢文律翻失其真故合於理者數句亦收乖於理者詞多亦捨其倩人暗判人間謂之判羅此最無恥請榜示以懲之一其授試官及員外官等若悉不許選恐抱才者負屈若並令集則僥幸者頗多當酌事宜取其折中請令所在審加勘責但無偷濫並準出身人例試判送省授官日其九品八品官請同黃衣選人例七品六品官依前資解褐官例五品四品依前資第二正官例其官好惡約判之工拙也一舊法四品五品官不復試判者以其厯任既久經試固多且官班已崇人所知識不可復為偽濫矣自有兵難仕進門多僥幸超擢不同往日並請試判待三五年舉選路清然後任依舊法其曽經登科及有清白狀并曽任臺省官并諸司長官已經選擇並不試依常例處分一每年天下選人欲赴來冬選則今秋九月依舉人召集審勘責絶其姦濫試時長吏親自監臨皆令相逺絶其口授及替代其第四等以上封送省皆依舉人例處置吏部計天下闕員訖即重考天下所送判審定等第訖從上等據本色人數收人具名下本道觀察使追之限十月內到並重試之訖取州試判類其書蹤及文體有偽濫者準法處分其合留者依科目資序隨穩便注擬一其兩都選人不比外州請令省司自試隔年先試一同外州東都選人判亦將就上都考定等第兼類人數明年依例追集重試之還以去秋所試驗其書蹤及詞理則隔年計會替代事亦難為一兵興以來士人多去鄉土既因避難所在寄居必欲網羅才能隔年先試令歸本貫為弊更深其諸色舉選人並請準所在寄莊寄住處投狀請試舉人既不慮偽濫其選人但勘會符告并責重保知非偽濫即準例處分一宏詞拔萃以甄逸才進士明經以長學業並請依常年例其平選判入第二等亦任超資授官一諸以蔭緒優勞準敕授官者如判劣惡者請授員外官待稍習法理試判合留依資授正員官一諸合授正員官人年不滿三十請授無職事京官及州府參軍不得授職事官後論有司或詰於議者曰吏曹所銓者四謂身言書判今外州送判則身言闕失如何對曰夫身言者豈非洪範貌言乎貌謂舉措可觀言謂詞説合理此皆才幹之士方能及此今所試之判不求浮華但令直書是非以觀理識於此既蔽則無貌言斷可知矣書者非理人之具但字體不至乖越即為知書判者斷決百事真為吏所切故觀其判才可知矣彼身言及書豈可同為銓序哉有司復詰曰王者之盛莫逾堯舜書稱敷納以言為求才之通軌今以言為後亦有説乎對曰夫敷納以言者謂引用賢良升於逹位方將詢以庶政非言無以知之其唐虞官百咨俞無幾其下小吏官長自求各行敷納事至簡易今吏曹所習輒數千人三銓藻鑒心目難溥酬喧競之不暇又何敷納之有乎其茂才以上學業既優可以言政教接以談論近於敷納矣有司復曰士有言行不差而闕於文學或頗有文學而言行未修但以諸科取之無乃未備對曰吏曹所銓必求言行得之既審然後授官則外州遙試未為通矣今銓衡之下姦濫所萃紛爭劇於獄訟偽濫深於市井法固致此無如之何豈若外州先試兼察其行茍居宅所在則鄰伍知之官司耳目易為采聽古之鄉舉里選方斯近矣且今之新法以學舉者一經畢收以判選者直書可否可謂易矣修言行者心當敦固不能為此餘何足觀若有志性過人足存激勸及躬為惡行不當舉用者則典章已備但舉而行之耳有司復曰其有效官公清且有能政以其短於詞判不見褒升無乃闕於事實乎對曰茍能如此最為公器使司善狀國有常規病在不行耳但令諸道觀察使每年終必有褒貶不得僭濫則善不蔽矣問曰試帖經者求其精熟今廢之有何理乎對曰夫人之為學帖易於誦誦易於講今口問之令其講釋若不精熟如何應對此舉其難者何用帖為且務於帖則於義不專非演智之術固已明矣夫帖者童稚之事今方授之以職而待以童稚於理非宜有司復曰舊法口問並取通六今令通八無乃非就易之義乎答曰所習者少當務其精止於通六失在鹵莽是以然耳復曰舉人試䇿例皆五通今併為一有何理對曰夫事尚實則有功徇虛則益寡試䇿五通多書問目數立頭尾徇虛多矣豈如一䇿之內併問之乎雜議論下德宗時禮部員外郎沈既濟議曰計近代以來爵祿失之者久矣其失非他在四太而已何者入仕之門太多世胄之家太優祿利之資太厚督責之令太薄夫入仕者多則農工益少農工少則物不足物不足則國貧是以言入仕之門太多禮曰天子之元子士也天下無生而貴者則雖儲二之尊與士伍同故漢王良以大司徒免歸蘭陵後光武巡幸始復其子孫邑中徭役丞相之子不得蠲戶課而近代以來九品之家皆不征其髙廕子弟重承恩奬端居役物坐食百姓其何以堪之是以言世胄之家太優先王制士所以理物也置祿所以代耕也農工商有經營作役之勞而士有勤民致治之憂雖風猷道義士伍為貴其苦樂利害與工農商等不甚相逺也後代之士乃撞鐘鼓植臺榭以極其歡而農工鞭臀背役筋力以奉其養得仕者如升仙不得仕者如沈泉歡娛憂苦若天地之相逺也是以言祿利之資太厚語曰陳力就列不能者止昔李膺周舉為刺史守令畏憚覩風投印綬者四十餘城夫豈不懷祿而安榮哉顧漢之法不可偷也自隋變選法則雖甚愚之人蠕蠕然第能乘一勞結一課獲入選敘則循資授職族行之官隨列拜揖藏俸積祿四周而罷因緣侵漁抑復有焉其罷之日必妻孥華楚僕馬肥腯而偃仰乎士林之間及限又選終而復始非為巨害至死不黜故里語謂人之為官若死然未有不了而倒還者為官如此易享祿如此厚上法如此寬下斂如此重則人孰不違其害以就其利者乎是以言督責之令太薄既濟以為當輕其祿利重其督責使不才之人雖虛座設位置印綬于旁揖而授之不敢受寬其征徭安其田里使農商百工各樂其業雖以官誘之而莫肯易如此則規求之志不禁而息多仕之門不扄而閉夫古今選用之法九流常敘有三科而已曰德也才也勞也而今選曹皆不及焉何以言之且吏部之本存乎甲令雖曰度德居官任才授職計勞升敘其文具矣然考校之法皆在書判簿厯言詞俯仰之間侍郎非通神不可得而知之則安行徐言非德也麗藻芳翰非才也纍資積考非勞也按前代選用皆州府察舉及年代久逺訛失滋深至于齊隋不勝其弊凡所署置多由請託故當時議者以為與其率私不若自舉與其外濫不若內收是以罷州府之權而歸於吏部此矯時懲弊之權法非經國不刋之常典今吏部之法蹙矣復宜掃而更之無容循默坐守刓弊或以為當今選舉人未土著不必本於鄉閭鑒不獨明不可專於吏部謹按詳度古制折量今宜謂五品以上及羣司長官俾宰臣進敘吏部得參議焉其六品以下或僚佐之屬許州府辟用則銓擇之任悉委於四方結奏之成咸歸於二部必先擇牧守然後授其權髙者先署而後聞卑者聽版而不命其牧守將帥或選用非公則吏部兵部得察而舉之夫如是則接名偽命之徒菲才薄行之人貪叨賄貨懦弱姦宄下詔之日隨聲而廢通計大數十除八九則人少而員寬事詳而官審賢者自進不肖者不抑而自退除隋權道復古美制則衆才咸得而天下幸甚選舉雜議七條一或曰按國家甲令凡貢舉人本求才德不選文詞故律曰諸貢舉人非其人者徒注云謂德行乖僻者也居州郡則廉使升聞在朝廷則以時黜陟用兹懲勸足為致理有司因循不修厥職寖以訛謬使其陵頽今但修舊令舉舊政則人服矣焉用改作答曰州郡以德行貢士禮闈以文詞揀才試官以帖問求學銓曹以書判擇吏俱存甲令何令宜修且惟德無形惟才不器摶之弗得聆之弗聞非在所知焉能辨用今禮部吏部一以文詞貫之則人斯逺矣使臣廉舉但得其善惡之尤者耳每道纍嵗罕獲一人至如循常諄諄蚩騃愚鄙者或身甚廉謹政為人蔽者或善為姦濫祕不彰聞者一州數十人曷常聞焉若銓不委外任不責成不疏其源以導其流而以文字選士循資授職雖口誦律文拳操斧鉞以臨其民無益也非改之不可二或曰昔後漢貢士諸生試經學文吏試箋奏則舉人試文乃前王之典故而子獨非於今何也答曰漢代所貢乃王官耳凡漢郡國每嵗貢士皆拜為郎分居三署儲才待詔無有常職故初至必試其藝業而觀其能否至於郡國僚吏皆府主所署版檄召用至而授職何常賔貢亦不試練其遐州陋邑一掾一尉或津官戍吏皆登銓上省受試而去者自隋而然非舊典也三或曰若使外州辟召必是牧守親故或權勢囑託或旁鄰交質多非實才奈其濫何答曰誠有之也然其濫孰與吏部多請較其優劣且州牧郡守古稱共理政能有美惡之迹法令有殿最之科分憂責成誰敢濫舉設如年多人怠法久弊生天網恢踈容其姦謬舉親舉舊有囑有情十分其人五極其濫猶有一半尚全公道如吏部者十無一焉請試言之凡在銓衡唯徵書判至於補授秪校官資善書判者何必吏能美資厯者寧妨貪戾假使官資盡愜刀筆皆精此為吏曹至公之選則補授之際官材匪詳或性善緝人則職當主辦或才堪理劇則官授散員或時有相當亦幸中耳非吏曹素得而知也有文無賴者計日可升有用無文者終身不進况其書判多是假手或他人替入或旁坐代為或臨事解衣或宿期定估才優者一兼四五自製者十不二三况造偽作姦冒名接腳又在其外令史受賂雖積謬而誰尤選人無資雖正名而猶剝又聞昔時公卿子弟親戚隨位髙低各有分數或得一人二人三人四人不在放限者禮部明經等亦然俗謂之省例斯非濫歟若等為濫此百倍而多者也四或曰吏部有濫止由一門州郡有濫其門多矣若等為濫豈若杜衆門而歸一門乎答曰州郡有濫雖多門易改也吏部有濫雖一門不可改也何者凡今選法皆擇才於吏部述職於州郡若才職不稱紊亂無任責於刺史則曰官命出於吏曹不敢廢也責於侍郎則曰量書判資考而授之不保其往也責於令史則曰按由厯出入而行之不知其他也黎庶從弊誰任其咎若守牧自用則罪將焉逃必州郡之濫獨換一刺史則革矣如吏部之濫雖更其侍郎無益也蓋九流浩浩不可得知法使之然非主司之過故云門雖多而易改門雖一而不可改者以此五或曰今人多情故吾恐許其選吏必綱紀紊失不如今日之有倫也答曰不假古義請將目前以言之今諸道節度都團練觀察租庸等使自判官副將以下皆使自銓擇縱其間或有情故大舉其例十猶七全則辟吏之法見行於今但未及於州縣耳利害之理較然可觀何紀之失何綱之紊嚮令諸使僚佐書授於選曹則安獲鎮方隅之重理財賦之殷也六或曰頃年常見州縣有攝官皆是牧守所自署置政多茍且不議久長才始到官已營生計迎新送故勞敝極矣今令州郡召辟則其弊亦爾奈何答曰國家職員皆稟朝命攝官承乏茍濟一時不日不月事必停省人雖流而責不及績雖著而官不成便身而行不茍何待若職無移奪命自州邦所攝之官便為已任上酬知已下利班榮爭竭智力人誰不盡今常調之人逺授一職已數千里赴集又數千里之官挈攜妻孥復往勞苦必一周而在路料間嵗而停官成名非知已之恩後任可計考而得此之不茍而誰為茍七或曰今四方諸侯或有未朝覲者若天下士人既無常調久不得祿人皆怨嗟必相率去我入於他境則如之何答曰善哉問乎夫辟舉法行則搜羅畢盡自中人以上皆有位矣此祿之不及者皆下劣無任之人復何足惜當今天下凋敝之本實為士人太多何者凡士人之家皆不耕而食不織而衣使下奉其上不足故也大率一家有養百口者有養十口者多少通計一家不減二十人萬家約有二十萬口今有才者既為我用愚劣者盡歸他人有萬家歸之則有二十萬人隨之食其黍粟衣其縑帛享其祿廩役其人庶我收其賢彼得其愚我減浮食之口二十萬彼加浮食之人二十萬則我弊益減而彼人益困自古興邦制敵之術莫出於是惟懼去我之不速也夫何患焉請改革選舉事件內外文武官五品以上應非選司注擬者右請宰相總其進敘吏部兵部得參議可否吏部尚書侍郎右請掌議文官五品以上除拜六品以下攢奏兼察舉選用之不公者諸京司長官及觀察使刺史舉用僚佐有才職不稱背公任私者得察舉彈奏非選用濫失不得舉凡有所察郎中刺舉員外郎判成侍郎尚書署之而後行諸官長若犯他過使司自當彈奏即非吏部所察故云非選用濫失不得舉餘所掌準舊若官長選用濫失有聞而吏部不舉請委御史臺彈之御史臺不舉即左右丞彈之按六典御史有糾不當者即左右丞得彈奏兵部尚書侍郎右請掌議武官五品以上除拜六品以下攢奏兼察舉選用之不公者諸軍衛長官及節度都團練使舉用將校才職不稱背公任私者得察舉彈奏非選用濫失不得舉凡有所察舉及臺省糾彈如吏部之法餘所掌準舊禮部每年貢舉人右並請停廢有别須經藝之士請於國子監六學中銓擇國子學太學四門學律學書學算學兵部選舉右請停廢昔隋置折衝府分鎮天下所以散兵及唐武后升平置武舉恐人之忘戰則武官武選本末可徵今內外邦畿皆有師旅偏裨將校所在至多誠宜設法減除豈復張門誘入况若此輩又非驍雄徒稱武官不足守禦雖習弓矢不堪戰鬬而坐享祿俸規逃征徭今請悉停以絶姦利京官六品以下應合選司注擬者右請各委本司長官自選用初補稱攝然後申吏部兵部吏部兵部奏成乃下敕牒并符告於本司是為正官考從奏成日計凡攝官俸祿各給半府州佐官别駕少尹五府司馬赤令不在此例右自長史以下至縣丞縣尉諸州長史司馬或雖是五品以上官亦同六品官法請各委州府長官自選用不限土客其申報正攝之制與京官六品以下同其邊逺羈縻等州請兼委本道觀察使共銓擇補授上州省事市令中州參軍博士下州判司録事參軍不在此例中下縣丞以下及關津鎮戍官等右請本任刺史補授訖申吏部兵部吏部兵部給牒然後成官並不用聞奏其員數不得踰舊制雖吏部未報並全給祿俸若承省牒在任與正同去任後不得稱其官若州司以勞效未著而不申者請不限年月並聽之州縣右請準舊令州為三等上中下縣為五等赤畿上中下其餘緊望雄輔之名請廢夫等級繁多則仕進淹滯使其周厯即務速遷官非久安政亦茍且請減衆級以懲僥心則宦逹可期羣才無壅六品以下官資厯右並請以五周為滿唐虞遷官必以九載魏晉以後皆經六周唐家因隋為四近又減削為三考今三四則太少六九則太多請限五周庶為折中其遷轉資厯請約修舊制修舊制謂遷轉資次也但以一官未滿即任召用並無選數若才行治績有尤異者請聽超遷每長官代換其舊僚屬若有負犯及不稱職者請任便替若無負犯皆待考滿未滿者不得替諸道使管內之人及州縣官屬有政理尤異識略宏通行業精修藝能超絶及懷才未逹隱德邱園或堪充內官不稱州縣者並申送吏部將校偏裨有兵謀武藝或堪充宿衛可為統帥者申送兵部右請不限少多各令長官具述才行謀略舉送朝廷皆申上吏部兵部各設官署以處之審量才能銓第髙下每官職有闕及别須任使則隨才擢用如漢光祿勳領三署郎稱舉者舉主加階進爵得賢俊者遷其官若自用僚屬雖得賢不賞禁約雜條一諸使及諸司州府長官舉用僚屬請明書事迹德行才能請授某官某職皆先申吏部兵部若諸使奏官兼帶職掌者即以職掌分其文武不計本官帶州縣職即申吏部帶軍職即申兵部吏部兵部謄其詞而奏云得某使某曹司某州府狀稱以元狀人入按每使每司每州各為一簿一所舉官吏在任日有行迹乖謬不如舉狀及犯罪至徒以上者請兼坐舉主其所犯人自依常法本條處分一人奪祿一年諸使無祿者準三品官以料錢折納依時估計二人奪賜無賜者貶其色降紫從緋降緋從緑降緑從碧三人奪階及爵冇爵無階有階無爵者加奪賜及勳四人解見任職事官已上任者並追解之五人貶官節度觀察使降為刺史刺史降為上佐皆以邊州六人除名有犯贓罪至流以上者倍論之倍謂一人從二人之法二人從四人之法三人從六人之法罪止三人若舉用後續知過謬具狀申述及自按劾者請勿論此謂所知不審舉用失誤者一所舉官有因姦納賂而舉者有親故非才而舉者有容受囑託而舉者有所知不善而故舉者有犯一科請皆以罔上論不在官贖限囑託舉者兩俱為首規求者為從杜佑評曰夫人生有欲無君乃亂君不獨治故建庶官昔在唐虞皆訪於衆則舜舉八元八凱四嶽之舉夔龍稷契蓋所用人之大略也降及三代擇於鄉庠然後授任其制漸備秦漢之道雖不師古閭孰所推猶本乎行而郡國佐吏並自奬擢備嘗試效乃登王朝內官有僚屬者亦得徵求俊彥暨于東漢初置選職推擇之制尚習前規左雄議以限年其時不敢謬舉所以二漢號為多士魏晉設九品置中正蓋論閥閲罕考行能選曹之任益為崇重州郡之刺史太守內官之卿尹大夫咸吏部所署而辟召及鄉里之舉舊式不替永嘉之後天下幅裂三百餘祀方遂混同中間各承正號凡有九姓大抵不變魏晉之法皆亂多治少諒無足可稱夫文質相矯有如循環教化所由興衰是繫自魏三主俱好屬文晉宋齊梁風流彌扇體非典雅詞尚綺麗澆訛之弊極於隋世且三代以來憲章可舉唯稱漢室繼漢之盛莫若有唐惜乎當創業之初承文弊之極可謂遇其時矣羣公不議救弊以質而乃因習尚文風教未淳慮由於此緬觀往昔論選舉者無代無之或云官繁人困要省吏員或云等級太多患在速進或云守宰之職所擇殊輕或云以言取人不如求行是皆能知其失莫究所失之由何者按秦法唯農與戰始得入官漢有孝悌力田賢良方正之科乃時令徴辟而常嵗郡國率二十萬口貢止一人約計當時推薦天下才過百數則考精擇審必獲器能自兹厥後轉益煩廣開元天寶之中一嵗貢舉凡有數千而門資武功藝術胥吏衆名雜目百戶千途入為仕者不可勝紀比於漢代且增數十百倍安得不重設吏職多置等級遞立選限以抑之乎常情進趨共慕榮逹升髙自下由邇陟遐固宜驟厯方至何暇淹留著績秦氏列郡四十兩漢郡國百餘太守入作公卿郎官出宰縣邑便宜從事闊略其文無所可否責以成效寄委斯重酬奬亦崇今之剖符三百五十郡縣差降復為八九邑之俊乂不得有之事之利病不得專之八使十連舉動咨稟地卑禮薄勢下任輕誠曰徒勞難階超擢容易而授理固然也始後魏崔亮為吏部尚書無問賢愚以停解日月為斷時沈滯者皆稱其能魏之失才實從亮始洎隋文帝素非學術盜有天下不欲權分罷州郡之辟廢鄉里之舉內外一命悉歸吏曹才厠班列皆由執政則執政參吏部之職吏部總州郡之權罔究體國推誠代天理物之本意是故銓綜失敘受任多濫豈有萬里封域九流叢湊掄材授職仰成吏曹以俄頃之周旋定才行之優劣求其無失不亦謬歟爾後有司尊賢之道先於文華辨論之方擇於書判靡然趨尚其流猥雜所以閲經號為倒拔徵詞同乎射覆置循資之格立選數之制壓例示其定限平配絶其踰涯或糊名考核或十銓分掌茍濟其末不澄其源則吏部專總是作程之弊者文詞取士是審才之末者書判又文詞之末也凡為國之本資乎民氓民之利害繫乎官政欲求其治在久其任欲久其任在少等級欲少等級在精選擇欲精選擇在減名目俾士寡而農工商衆始可以省吏員始可以安黎庶矣誠宜斟酌治亂詳覽古今推仗至公矯正前失或許辟召或令薦延舉有否臧論其誅賞課績以考之升黜以勵之拯斯刓敝其效甚速實為大政可不務乎學校有虞氏大學為上庠小學為下庠夏后氏大學為東序小學為西序商制大學為右學小學為左學又曰瞽宗周制大學為東膠小學為虞庠又云天子曰辟雍王太子王子羣后之太子卿大夫元士之適子國之俊選皆造焉古之教者家有孰黨有庠遂有序國有學漢髙帝以叔孫通為奉常諸弟子共定禮儀者咸為選首其後亦未遑庠序之事至孝文時頗登用文學之士然帝本好刑名之言及孝景不任儒學竇太后又好黃老術故諸博士具官待問未有進者武帝立後竇太后崩田蚡為丞相黜黃老刑名百家之言延儒者百數乃因舊博士置弟子五十人太常擇年十八以上儀狀端正者補博士弟子昭帝舉賢良文學增博士弟子員數滿百人至成帝時劉向請興辟雍設庠序帝下公卿議會向病卒成帝末增弟子員三千人嵗餘如故及王莽為宰衡欲耀衆庶遂興辟雍增元士之子得受業如弟子甲乙之科後漢質帝本初元年梁太后詔大將軍以下至六百石悉遣子弟就學每春秋輒於鄉射月一享會以此為常有勸勉進用之端於是遊學者增至三萬餘生然章句漸疏而多以浮華相尚儒者之風蓋衰矣桓帝建和初詔諸學生課試補官永夀二年復課試諸生補郎舍人獻帝建安中侍中鮑衡奏按王制立大學小學自王太子以下皆教以詩書而升之司馬謂之賢者任之以官故能致刑措之盛立太平之化也今學博士並設表章而無所教授兵戎未戢人並在公而學者少可聽公卿二千石六百石子弟在家者及將校子弟見為郎舍人者皆可聽詣博士受業其髙才秀逹學通一藝太常為作品式從之晉摯虞決疑云漢初置博士而無弟子後置弟子五十人與博士俱共習肄禮儀又增滿五百人漢末至數千人魏文帝黃初五年立太學於洛陽時慕學者始詣太學為門人滿二嵗試通一經者稱弟子不通者罷遣弟子滿二嵗試通二經者補文學掌故不通者聽隨後輩試試通二經亦得補掌故滿三嵗試通三經者擢髙第為太子舍人不第者隨後輩復試試通亦為太子舍人舍人滿二嵗試通四經者擢其髙第為郎中不通者隨後輩復試試通亦為郎中郎中滿二嵗能通五經者擢髙第隨才敘用不通者隨後輩復試試通亦敘用晉武帝初太學生三千人泰始八年有司奏太學生七千餘人才任四品聽留詔曰已試經者留之大臣子弟堪受教者令入學其餘遣還郡國咸寧二年起國子學周禮國之貴遊子弟故曰國子東晉元帝時太常賀循上言尚書被符經置博士一人又多故厯紀儒道荒廢學者能兼明經義者少今宜周禮儀禮二經置博士二人春秋三傳置三人其餘則經置一人合八人太常車允上言按二漢舊事博士之職唯舉明經之士遷轉各以本資初無定班魏及中朝多以侍中常侍儒學最優者領之今博士八人愚謂宜依魏氏故事擇朝臣一人經學最優者不繫位之髙下常以領之每舉太常共研厥中其餘七人自依常銓選大興初欲修立學校唯周易王氏尚書鄭氏古文孔氏毛詩周官禮記論語孝經鄭氏春秋左傳杜氏服氏各置博士一人其儀禮公羊榖梁及鄭易皆省不置博士孝武帝太元初於中堂權立行太學行釋奠禮于時無復國子生置太學生六十人國子生權銓大臣子孫六十人行事訖罷其國子生見祭酒博士單衣角巾執經一卷以代手版自穆帝至孝武並以中堂為太學太元九年尚書謝石請興國學以訓胄子頒下州郡普修鄉校帝納其言明年選公卿二千石子弟為生然品課無章君子恥與其列國子祭酒殷茂上言臣聞舊制國學生皆取冠族華胄比列皇儲中間混雜蘭艾遂令人情恥之詔雖褒納終不施行宋武帝詔有司立學未就而崩文帝元嘉二十年立國學二十七年廢明帝泰始中初置總明觀祭酒一人有道儒文史四科科置學士十人齊髙帝建元四年詔立國學置學生百五十人取王公以下子孫年十五以上二十以下家去都二千里為限帝崩乃以國諱廢學武帝永明三年詔立學乃省總明觀召公卿以下子弟置生二百二十人其年秋中悉集東昏侯永元初詔依永明舊事廢學時有司奏國學太學兩存焉領國子助教曹思文上表曰太學之與國學斯是晉代殊其士庶異其貴賤耳然貴賤士庶皆須教之國學太學兩存可也時太尉王儉復依晉代國子生單衣角巾執經代手版後魏道武帝初定中原始於平城立太學置五經博士生員千餘人天興二年春增國子太學生員三千太武始光三年别起太學於城東後徵盧元髙允等令州郡各舉才學於是人多砥礪儒術轉興獻文帝天安初立鄉學郡置博士二人助教二人學生六十人後令大郡學立博士二人助教四人學生百人次郡立博士二人助教四人學生八十人中郡博士一人助教三人學生六十人下郡立博士一人助教一人學生四十人郡縣學始乎此矣孝文太和中改中書為國子又開皇子之學及遷都洛邑立國子太學四門小學隋文帝開皇中國子寺不𨽻太常自前代皆屬太常也唐武德元年詔皇族子孫及功臣子弟於祕書外省别立小學七年詔諸州縣及鄉並令置學有明一經以上者有司試䇿加階敘貞觀五年太宗數幸國學遂增築學舍千二百間國學太學四門亦增生員其書算各置博士凡三千三百六十員其屯營飛騎亦給博士授以經業無何髙麗百濟新羅髙昌吐蕃諸國酋長亦遣子弟請入國學凡八千餘人國學之盛近古未有龍朔三年東都置國子監丞主簿録事各一員四門博士助教四門生三百員俊士二百員置𢎞文館於上臺生徒三十人置崇文館於東宫生徒二十人皆以皇族緦麻以上親皇太后皇后大功以上親散官一品中書門下平章事六尚書功臣身食實封者京官職事正三品供奉官三品子孫京官職事從三品中書黃門侍郎子孫為之並尚書省補西京國子監領六學生徒皆尚書省補一曰國子學生徒三百人分習五經一經六十人以文武官三品以上及國公子孫從二品以上之曽孫為之二曰太學生徒五百人每一經百人以四品五品及郡縣公子孫及從三品之曽孫為之三曰四門學生徒千三百人分經之制與大學同其五百人以六品七品及侯伯子男之子為之其八百人以庶人之俊造者為之四曰律學生徒五十人取年十八以上二十五以下以八品九品子孫及庶人之習法令者為之五曰書學生徒三十人以習文字者為之六曰算學生徒三十人以習計數者為之凡二千二百一十人州縣學生徒有差州縣學生門蔭與律書算學同諸生皆限年十四以上十九以下皆郡縣自補京都八十員大都督中都督府上郡各六十員下都督府中郡各五十員下郡四十員京縣五十員上縣四十員中縣三十員下縣二十員也凡諸學皆有博士助教授其經藝每嵗仲冬郡縣館監課試其成者長吏會屬僚設鄉飲之禮而薦送之開元七年十月皇太子詣國學行齒胄禮二十六年正月敕文天下州縣每一鄉之內里别各置一學仍擇師資令其教授天寶初明經進士習爾雅九載國子監置廣文館知進士業博士助教各一人十二載七月舉人不得充鄉貢皆補學生四門俊士停之永泰二年正月敕諸道節度觀察都督防禦使等子弟并宰相朝官及神䇿六軍子弟欲習業者自今以後並令補國子學生欲其業重籯金器成琢玉其中身雖有官欲附學讀書者聽其學官委中書門下即簡擇行業堪為師範者充數學生員數多少所習經業考試等第并所供糧料各委本司作事件聞奏通志卷五十九
