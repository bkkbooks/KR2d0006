body:
  text: 通志卷八十下宋右迪功郎鄭樵漁仲撰宗室傳第三晉八王汝南文成王亮子粹宗矩熙羕楚隱王瑋趙王倫齊王冏長沙厲王乂成都王穎河間王顒東海孝獻王越武十二王毗陵悼王軌秦獻王柬城陽懷王景東海沖王祗始平哀王裕淮南忠壯王允代哀王演新都王該清河康王遐汝陰哀王謨吳敬王晏渤海殤王恢元四王琅邪孝王裒東海哀王沖武陵威王晞子㻱遵琅邪悼王煥簡文三王會稽思世子道生臨川獻王郁會稽文孝王道子子元顯八王汝南文成王亮字子翼宣帝第四子也少清警有才用仕魏為散騎侍郎萬嵗亭侯拜東中郎將進封廣陽鄉侯討諸葛誕於夀春失利免官頃之拜左將軍加散騎常侍假節出監豫州諸軍事五等建改封祁陽伯轉鎮西將軍武帝踐阼封扶風郡王邑萬户置騎司馬增參軍掾屬持節都督關中雍涼諸軍事會秦州刺史胡烈為羌虜所害亮遣將軍劉旗騎督敬琰赴救不進坐是貶為平西將軍旗當斬亮與軍司曹冏上言節度之咎由亮而出乞丐旗死詔曰髙平困急計城中及旗足以相拔就不能徑至尚當深進今奔突有投坐視覆敗故加旗大戮今若罪不在旗當有所在有司又奏免亮官削爵土詔惟免官頃之拜撫軍將軍是嵗吳將步闡來降假亮節都督諸軍事以納之咸寧初以扶風池陽四千一百户為太妃伏氏湯沐邑後改食南郡枝江太妃嘗有小疾祓於洛水亮兄弟三人侍從並持節鼓吹震耀洛濵武帝登凌雲臺望見曰伏妃可謂富貴矣其年進號衛將軍加侍中時宗室殷盛無相統攝乃以亮為宗師本官如故使訓導觀察有不遵禮法小者正以義方大者隨事聞奏三年徙封汝南出為鎮南大將軍都督豫州諸軍事開府假節之國給追鋒車皂輪犢車錢五十萬頃之徵為侍中撫軍大將軍領後軍將軍統冠軍步兵射聲長水等營給兵五百人騎百匹遷太尉録尚書事領太子少傅侍中如故及武帝寢疾為楊駿所排乃以亮為侍中大司馬假黃鉞大都督督豫州諸軍事出鎮許昌加軒懸之樂六佾之舞封子羕為西陽公未發帝大漸詔留亮委以後事楊駿聞之從中書監華廙索詔視遂不還帝崩亮懼駿疑已辭疾不入於大司馬門外敘哀而已表求過葬駿欲討亮亮知之問計於廷尉何朂朂曰今朝廷皆歸心於公公何不討人而懼為人所討或説亮率所領入廢駿亮不能用夜馳赴許昌故得免及駿誅詔以亮為太宰録尚書事入朝不趨劒履上殿增掾屬十人給千兵百騎與太保衛瓘對掌朝政亮論賞誅楊駿之功過差欲以茍悅衆心由是失望楚王瑋有勳而好立威亮憚之欲奪其兵權瑋甚憾乃承賈后旨誣亮與瓘有廢立之謀矯詔遣其長史公孫宏與積弩將軍李肇夜以兵圍之帳下督李龍白外有變請距之亮不聼俄然楚兵登牆而呼亮驚曰吾無二心何至於是若有詔書其可見乎宏等不許促兵攻之長史劉凖謂亮曰觀此必是姦謀府中俊乂如林猶可盡力距戰又弗聼遂為肇所執乃歎曰我之忠心可破示天下也如何無道枉殺不辜是時大熱兵人坐亮于車下時人憐之為之交扇將及日中無敢害者瑋出令曰能斬亮者賞布千匹遂為亂兵所害投於北門之壁鬢髮耳鼻皆悉毁焉及瑋誅追復爵位給東園溫明祕器朝服一襲錢三百萬布絹三百匹喪葬之禮如安平獻王孚故事廟設軒懸之樂有五子粹矩羕宗熙粹字茂𢎞早卒矩字延眀拜世子為屯騎校尉與父亮同被害追贈典軍將軍諡懷王子祐立是為威王祐字永猷永安中從惠帝北征帝遷長安祐反國及帝還洛以征南兵八百人給之特置四部牙門永興初率衆依東海王越討劉喬有功拜揚武將軍以江夏雲杜益封并前二萬五千户越征汲桑表留祐領兵三千守許昌加鼓吹麾旗越還祐歸國永嘉末以冦賊充斥遂南渡江元帝命為軍咨祭酒建武初為鎮軍將軍太興末領左軍將軍太寧中進號衛將軍加散騎常侍咸和元年薨贈侍中特進子恭王統立以南頓王宗謀反被廢其後成帝哀亮一門殄絶詔統復封纍遷祕書監侍中薨追贈光祿勳子義立官至散騎常侍薨子遵之立義熙初梁州刺史劉稚謀反推遵之為主事泄伏誅弟楷之子蓮扶立宋受禪國除矩弟羕字延平太康末封西陽縣公拜散騎常侍亮之被害也羕時年八嵗鎮南將軍裴楷與之親姻竊之以逃一夜八遷故得免及瑋誅進爵為王歷步兵校尉左軍驍騎將軍元康初進封郡王永興中拜侍中以長沙王乂黨廢為庶人惠帝還洛復羕封為撫軍將軍又以汝南期思西陵益其國永嘉初拜鎮軍將軍加散騎常侍領後軍將軍復以邾蘄春益之并前三萬五千户隨東海王越東出鄄城遂南渡江元帝承制更拜撫軍大將軍開府給千兵百騎詔與南頓王宗統流人以實中州江西荒梗復還及元帝踐阼進位侍中太保以羕屬尊元會特為設床太興初録尚書事尋領大宗師加羽葆斧鉞班劒六十人進位太宰及王敦平領太尉明帝即位以羕宗室元老特為之拜羕放縱兵士劫鈔有司奏免羕官詔不問及帝寢疾羕與王導同受顧命輔成帝時帝幼沖詔羕設床帳於殿上帝親迎拜咸和初羕坐南頓王宗免官降為弋陽王及蘇峻作亂羕詣峻稱述其勳峻大悅矯詔復羕爵位峻平賜死世子播播弟充及息嵩並伏誅國除咸康初復其屬籍以羕孫珉為奉車都尉奉朝請羕弟宗字延祚元康中封南頓縣侯尋進爵為公討劉喬有功進封王增邑五千并前萬户為征虜將軍與兄羕俱過江元帝承制拜散騎常侍愍帝之在西都以宗為平東將軍元帝即位拜撫軍將軍領左將軍明帝踐阼加長水校尉轉左衛將軍與虞允俱為帝所眤委以禁旅宗與王導庾亮志趣不同連結輕俠以為腹心導亮並以為言帝以宗戚屬每容之及帝疾篤宗允密謀為亂亮排閣入升御床流涕為言帝始悟轉為驃騎將軍允為大宗正宗遂怨望形於辭色咸和初御史中丞鍾雅劾宗謀反庾亮使右衛將軍趙允收之宗以兵拒戰為允所殺貶其族為馬氏徙妻子於晉安既而原之三子綽超演廢為庶人咸康中復其屬籍綽為奉車都尉奉朝請宗弟熙初封汝陽公討劉喬有功進爵為王永嘉末沒於石勒楚隱王瑋字彥度武帝第五子也初封始平王歷屯騎校尉太康末封於楚出之國都督荆州諸軍事平南將軍轉鎮南將軍武帝崩為衛將軍領北軍中候加侍中行太子少傅楊駿之誅也瑋屯司馬門瑋少年果鋭多立威刑朝廷忌之汝南王亮太保衛瓘以瑋性狠戾不可大任建議使與諸王之國瑋甚忿之長史公孫宏舍人岐盛並薄於行為瑋所眤瓘等惡其為人慮致禍亂將收盛盛知之遂與宏謀宏因積弩將軍李肇矯稱瑋命誣亮瓘於賈后后不之察使惠帝為詔曰太宰太保欲為伊霍之事王宜宣詔令淮南長沙成都王屯宫諸門廢二公夜使黃門齎敕以授瑋瑋欲覆奏黃門曰事恐漏泄非密詔本意也瑋乃止遂勒本軍復矯詔召三十六軍手令告諸軍以奉詔誅二公之意又矯詔使亮瓘上太宰太保印綬侍中貂蟬之國官屬皆罷遣之又矯詔赦亮瓘官屬曰二公潛謀不軌欲危社稷今免還第官屬以下一無所問若不奉詔便以軍法從事能率所領先出降者封侯受賞朕不食言遂收亮瓘殺之岐盛説瑋可因兵勢誅賈謨郭彰以匡王室瑋猶豫未決會天明帝用張華計遣殿中將軍王宫齎騶虞幡麾衆曰楚王矯詔衆皆釋仗而走瑋左右無復一人窘迫不知所為惟一奴年十四駕牛車將赴秦王柬帝遣謁者詔瑋還營執之於虎賁署遂下廷尉詔以瑋矯詔害二公父子又欲誅滅朝臣圖謀不軌遂斬之時年二十一其日大風雷雨礔礰瑋臨刑出懷中青紙詔流涕以示監刑尚書劉頌曰受詔而行謂為社稷今更為罪託體先帝受枉如此幸見申列頌亦歔欷不能仰視公孫宏岐盛並夷三族瑋性開濟好施能得衆心及此莫不隕淚百姓為之立祠賈后先惡瓘亮又忌瑋故以計相次誅之永寧元年追贈驃騎將軍封其子範為襄陽王拜𣪚騎常侍後為石勒所害趙王倫字子彜宣帝第九子也母曰柏夫人魏嘉平初封安樂亭侯五等建改封東安子拜諌議大夫武帝受禪封琅邪郡王坐使散騎將劉緝買工所將盜御裘廷尉杜友正緝棄市倫當與緝同罪帝以倫親故下詔赦之及之國行東中郎將宣威將軍咸寧中改封於趙遷平北將軍督鄴城守事進安北將軍元康初遷征西將軍開府儀同三司鎮關中倫刑賞失中氐羌反叛徵還京師尋拜車騎將軍太子少傅深交賈郭諂事中宫大為賈后所親信求録尚書張華裴頠固執不可又求尚書令華頠復不許愍懷之廢使倫領右軍將軍時左衛司馬督司馬雅及常從督許超並嘗給事東宫傷太子無罪與殿中中郎士猗等謀廢賈后復太子以華頠不可移難與圖權倫執兵之要性貪冒可假以濟事乃説倫嬖人孫秀曰中宫凶妬無道與賈謐等共廢太子今國無嫡嗣社稷將危大臣將起大事而公名奉事中宫與賈郭親善太子之廢皆云豫知一朝事起禍必相及何不先謀之乎秀許諾言於倫倫納焉遂告通事令史張林及省事張衡殿中侍御史殷渾右衛司馬督路始使為內應事將起而秀知太子聰明若還東宫當與賢人圖政量已必不得志乃更説倫曰太子為人剛猛不可私請明公素事賈后時議皆以公為賈氏之黨今雖欲建大功於太子太子含宿怒必不加賞於眀公矣當謂副百姓之望翻覆以免罪耳此乃所以速禍也今且緩其事賈后必害太子然後廢后為太子報讐亦足以立功豈徒免禍而已倫從之秀乃微泄其謀使謐黨頗聞之倫秀因勸謐等早害太子以絶衆望太子既遇害倫秀之謀益甚而雅超懼後難欲悔其謀乃辭疾秀復告右衛佽飛督閭和和從之期四月三日丙夜一籌以鼓鳴為應至期倫乃矯詔敕三部司馬曰中宫與賈謐等殺吾太子今使車騎入廢中宫汝等皆當從命賜爵關中侯不從誅三族於是衆皆從之倫又矯詔開門夜入陳兵道南遣翊軍校尉齊王冏將三部司馬百人排閣而入華林令駱休為內應迎帝幸東堂遂廢賈后為庶人幽之於建始殿收吳太妃趙粲及韓夀賈午等付暴室考竟詔尚書以廢后事仍收捕賈謐等召中書監侍中黃門侍郎八坐皆夜入殿執張華裴頠解結杜斌等於殿前殺之尚書始疑詔有詐郎師景露版奏請手詔倫等以為沮衆斬之以徇眀日倫坐端門屯兵北向遣尚書和郁持節送賈庶人於金墉誅趙粲叔父中護軍趙浚及散騎侍郎韓豫等內外羣官多所黜免倫尋矯詔自為使持節大都督督中外諸軍事相國侍中王如故一依宣文輔魏故事置左右長史司馬從事中郎四人參軍十人掾屬二十人兵萬人以其世子散騎常侍荂領冗從僕射子馥前將軍封濟陽王虔黃門郎封汝陰王詡散騎侍郎封霸城侯孫秀等封皆大郡並據兵權文武官封侯者數千人百官總已聼於倫倫素庸下無智策復受制於秀秀之威權振於朝廷天下皆事秀而無求於倫秀起自琅邪小吏纍官於趙國以諂媚自達既執機衡遂恣姦凶多殺忠良以逞私欲司𨽻從事遊皓與殷渾有隙渾誘皓奴晉興偽告皓有異志秀不詳察即收皓及襄陽中正李邁殺之厚待晉興以為已部曲督前衛尉石崇黃門郎潘嶽皆與秀有嫌並見誅於是京邑君子不樂其生矣淮南王允齊王冏以倫秀驕僣內懷不平秀等又深忌焉乃出冏鎮許奪允護軍允發憤起兵討倫允既敗滅倫加九錫增封五萬户倫偽為飾讓詔遣百官詣府敦勸侍中宣詔然後受之加荂撫軍將軍領中軍將軍馥鎮軍將軍領護軍將軍虔中軍將軍領右衛將軍詡為侍中又以孫秀為侍中輔國將軍相國司馬右率如故張林等並居顯要增相府兵為二萬人與宿衛同又隱匿兵士衆過三萬起東宮三門四角華櫓斷宫東西道為外徼或謂秀曰散騎常侍楊凖黃門侍郎劉逵欲奉梁王肜以誅倫會有星變乃徙肜為丞相居司徒府轉凖逵為外官倫無學不知書秀亦以狡猾小才貪淫昧利所共立事者皆邪佞之徒惟競榮利無深謀逺略荂淺薄鄙陋馥虔暗狠強戾詡愚嚚輕訬而各乖異互相憎毁秀子會年二十為射聲校尉尚帝女河東公主公主母喪未期便納聘禮會形貌短陋奴僕之下者初與富室兒於城西販馬百姓忽聞其尚主莫不駭愕倫秀並惑巫鬼聼妖邪之説秀使牙門趙奉詐為宣帝神語命倫早入西宫又言宣帝於北芒為趙王倫佐助遂别立宣帝廟於芒山謂逆謀可成以太子詹事裴劭左軍將軍卞粹等二十人為從事中郎掾屬又二十人秀等部分諸軍分布腹心使散騎常侍義陽王威兼侍中出納詔命矯作禪讓之詔使使持節尚書令滿奮僕射崔隨為副奉皇帝璽綬以禪位於倫倫偽辭不受於是宗室諸王羣公卿士咸假稱符瑞天文以勸進倫乃許之左衛王輿與前軍司馬雅等率甲士入殿譬喻三部司馬示以威賞皆莫敢違其夜使張林等屯守諸門義陽王威及駱休等逼奪天子璽綬夜漏未盡內外百官以乘輿法駕迎倫惠帝乘雲母車鹵簿數百人自華林西門出居金墉城尚書和郁兼侍中散騎常侍琅邪王睿中書侍郎陸機從到城下而反使張衡衛帝實幽之也倫從兵五千人入自端門登太極殿滿奮崔隨樂廣進璽綬於倫乃僭即帝位大赦改元建始是嵗賢良方正直言秀才孝亷良將皆不試計吏及四方之使命在京邑者太學生年十六以上及在學二十年皆署吏郡縣二千石令長赦日在職者皆封侯郡綱紀並為孝亷縣綱紀為廉吏以世子荂為太子馥為侍中大司農領護軍京兆王虔為侍中大將軍領軍廣平王詡為侍中撫軍將軍霸城王孫秀為侍中中書監驃騎將軍儀同三司張林等諸黨皆登卿將並列大封其餘同謀者咸超階越次不可勝紀至於奴卒厮役亦加以爵位每朝會貂蟬盈坐時人為之諺曰貂不足狗尾續而以茍且之惠取悅人情庫府之儲不充於賜金銀冶鑄不給於印故有白版之侯君子恥服其章百姓亦知其不終矣倫親祠太廟還遇大風飄折麾蓋孫秀既立非常之事倫敬重焉秀住文帝為相國時所居內府事無巨細必咨而後行倫之詔令秀輒改革有所與奪自書青紙為詔或朝行夕改者數四百官轉易如流時有雉入殿中自太極東階上殿驅之更飛西鐘下有頃飛去又倫於殿上得異鳥問皆不知名纍日向夕宫西有素衣小兒言是服劉鳥倫使録小兒并鳥閉置牢室眀旦開視戶如故並失人鳥所在倫目上有瘤時以為妖焉時齊王冏河間王顒成都王穎並擁強兵各據一方秀知冏等必有異圖乃選親黨及倫故吏為三王參佐及郡守秀本與張林有隙雖外相推崇內實忌之及林為衛將軍深怨不得開府潛與荂箋具説秀専權動違衆心而功臣皆小人撓亂朝廷可一時誅之荂以書白倫倫以示秀秀勸倫誅林倫從之於是倫請宗室會於華林園召林秀及王輿入因收林殺之誅三族及三王起兵討倫檄至倫秀始大懼遣其中堅孫輔為上軍將軍積弩李嚴為折衝將軍率兵七千自延夀關出征虜張泓左軍蔡璜前軍閭和等率九千人自堮坂關出鎮軍司馬雅揚威莫原等率八千人自成臯關出召東平王楙為使持節衛將軍都督諸軍以距義師使楊珍晝夜詣宣帝别廟祈請輒言宣帝謝陛下某日當破賊拜道士胡沃為太平將軍以招福祐秀家日為淫祀作厭勝之文使巫祝選擇戰日又令近親自嵩山著羽衣詐稱仙人王喬作神仙書述倫祚長久以惑衆秀欲遣馥虔領兵助諸軍戰馥虔不肯虔素親愛劉輿秀乃使輿説虔虔然後率衆八千為三軍繼援而泓雅等連戰雖勝義軍散而復合雅等不得前許超等與成都王穎軍戰於黃橋殺傷萬餘人泓徑造陽翟又於城南破齊王冏輜重殺數千人遂據城保邸閣而冏軍已在潁隂去陽翟四十里冏分軍渡潁攻泓等不利泓乘勝至於潁水夜臨潁而陳冏縱輕兵擊之諸軍不動而孫輔徐建軍夜亂徑歸洛自首輔建之走也不知諸軍督尚存乃云齊王兵盛不可當泓等已沒倫大震祕之而召虔及超還會泓敗冏露布至倫大喜乃復遣超而虔還已至庾倉超還濟河將士疑阻鋭氣內挫泓等悉其諸軍濟潁進攻冏營冏出兵擊其别率孫髦司馬談孫輔皆破之士卒散歸洛陽泓等收衆還營秀等知三方日急詐傳破冏營執得冏以誑惑其衆令百官皆賀而士猗伏允孫會皆仗節各不相從倫復授太子詹事劉琨節督河北將軍率步騎千人催諸軍戰會等與義軍戰於激水大敗退保河上劉琨燒斷河橋自義兵之起百官將士咸欲誅倫秀以謝天下秀知衆怒難犯不敢出省及聞河北軍悉敗憂悶不知所為義陽王威勸秀至尚書省與八坐議征戰之備秀從之使京城四品以下子弟年十五以上皆詣司𨽻從倫出戰內外諸軍悉欲劫殺秀威秀威懼自崇禮闥走還下舍許超士猗孫會等軍既並還乃與秀謀或欲收餘卒出戰或欲焚燒宫室誅殺不附已者挾倫南就孫旗孟觀等或欲乘船東走入海計未決王輿反之率營兵七百餘人自南掖門入敕宫中兵各守衛諸門三部司馬為應於內輿自往攻秀秀閉中書南門輿放兵登墻燒屋秀及超猗遽走出左衛將軍趙泉斬秀等以徇收孫竒於右衛營付廷尉誅之執前將軍謝惔黃門令駱休司馬督王潛皆於殿中斬之三部司馬兵於宣化闥中斬孫弼以徇時司馬馥在秀坐輿使將士囚之於散騎省以大戟守省閣八坐皆入殿中坐東除樹下王輿屯雲龍門使倫為詔曰吾為孫秀等所誤以怒三王今已誅秀其迎太上復位吾歸老於農畝傳詔以騶虞幡敕將士解兵文武官皆奔走莫敢有居者黃門將倫自華林東門出及荂皆還汶陽里第於是以甲士數千迎天子于金墉城百姓咸稱萬嵗帝自端門入升殿御廣室送倫及荂等付金墉城初秀懼西軍至復召虔還是日宿九曲詔遣使者免虔官虔懼棄軍將數千人歸於汶陽里梁王肜表倫父子凶逆宜伏誅百官會議於朝堂皆如肜表遣尚書袁敞持節賜倫死飲以金屑苦酒倫慚以巾覆靣曰孫秀誤我孫秀誤我於是收荂馥虔詡付廷尉獄考竟馥臨死謂虔曰坐爾破家也百官是倫所用皆斥免之臺府省衛僅有存者自兵興六十餘日戰所殺害僅十萬人凡與倫謀為逆者張林為秀所殺許超士猗孫弼謝惔殷渾與秀為王輿所誅張衡閭和孫髦髙越自陽翟還伏允戰敗還洛陽皆斬於東市蔡璜自陽翟降齊王冏還洛自殺王輿以功免誅後與東萊王㽔謀殺冏又伏法齊武閔王冏字景治獻王攸之子也少稱仁惠好振施有父風初攸有疾武帝不信遣太醫診候皆言無病及攸薨帝往臨喪冏號踊訴父病為醫所誣詔即誅醫由是見稱遂得為嗣元康中拜散騎常侍領左軍將軍翊軍校尉趙王倫密與相結廢賈后以功轉遊擊將軍冏以位不滿意有恨色孫秀微覺之且憚其在內出為平東將軍假節鎮許昌倫篡遷鎮東大將軍開府儀同三司欲以寵安之冏因衆心怨望潛與離狐王盛潁川王處穆謀起兵誅倫倫遣腹心張烏覘之烏反曰齊無異志冏既有成謀未發恐事泄乃與軍司管襲殺處穆送首於倫以安其意謀定乃收襲殺之遂與豫州刺史何朂龍驤將軍董艾等起軍遣使告成都河間常山新野四王移檄於天下征鎮州縣郡國咸使聞知揚州刺史郗隆承檄猶豫未決參軍王邃斬之送首於冏冏屯軍陽翟倫遣其將閭和張泓孫輔出堮坂與冏交戰冏軍失利堅壁自守會成都軍破倫衆於黃橋冏乃出兵攻和等大破之及王輿廢倫惠帝反正冏誅討賊黨既畢率衆入洛頓軍通章署甲士數十萬旌旗器械之盛震於京師天子就拜大司馬加九錫之命備物典策如宣景文武輔魏故事冏於是輔政居攸故宫置掾屬四十人大築第館北取五榖市南開諸署毁壞廬舍以百數使大匠營制與西宫等鑿千秋門以通西閣後房施鐘懸前庭舞八佾沈於酒色不入朝見坐拜百官符敕三臺選舉不均惟寵親眤以車騎將軍何朂領中領軍封葛旟為牟平公路秀小黃公衛毅隂平公劉真安鄉公韓泰封邱公號曰五公委以心膂殿中御史桓豹奏事不先經冏府即考竟之於是朝廷側目海內失望矣南陽處士鄭方露版陳冏五失冏含忍答之主簿王豹屢有針規冏怒奏殺豹有白頭公入大司馬府大呼言有兵起不出甲子旬即收殺之冏驕恣日甚終無悛志前賊曹屬孫惠復上諫曰惠聞天下五難四不可而明公皆以居之矣捐宗廟之主忽千乘之重躬貫甲胄犯冒鋒刃此一難也奮三百之卒決全勝之策集四方之衆致英豪之士此二難也舍殿堂之尊居單幕之陋安囂塵之慘同將士之勞此三難也驅烏合之衆當凶強之敵任神武之略無疑阻之懼此四難也檄六合之內著盟信之誓升幽宫之帝復皇祚之業此五難也大名不可久荷大功不可久任大權不可久執大威不可久居未有行其五難而不以為難遺其四不可而謂之可惠竊所不安也自永熙以來十有一載人不見德唯戮是聞公族搆篡奪之禍骨肉遭梟夷之刑羣王被囚檻之困妃主有離絶之哀歷觀前代國家之禍至親之亂未有今日之甚者也良史書過後嗣何觀天下所以不去於晉符命長存於世者主無嚴虐之暴朝無酷烈之政武帝餘恩獻王遺愛聖慈惠和尚經人心四海所係實在於兹今眀公建不世之義而未為不世之讓天下惑之思求所悟長沙成都魯衛之密國之親親與明公計功受賞皆不自先今公宜放桓文之勳邁臧札之迹委萬機於二王命方嶽於羣后退身大齊之區垂拱青徐之域金石不足以銘髙八音不足以贊美姬文不得専美於前太伯不得獨賢於後何乃忘亢極之悔忽窮髙之凶棄五嶽之安居纍卵之危外以權勢受疑內以百揆損神雖處髙臺之上逍遙重仭之墉及其危亡之憂過於潁翟之慮也昔屈原放斥心存南郢樂毅適趙志戀北燕况惠受恩偏蒙識養雖復暫違情隆二臣是以披露血誠冒昧干忤言入身戮義讓公舉退就鈇鑕此惠之死賢於生也冏不納亦不加罪翊軍校尉李含奔於長安詐云受密詔使河間王顒誅冏因導以利謀顒從之上表曰王室多故禍難罔已大司馬冏雖唱義有興復皇位之功而定都邑克寧社稷實成都王穎之力也而冏不能固守臣節實協異望在許昌營有東西掖門官置治書侍御史長史司馬直立左右如侍臣之儀京城大清棄逆誅夷而率百萬之衆來繞洛城阻兵經年不一朝覲百官拜伏晏然南靣壞樂官市署用自增廣輒取武庫祕仗嚴列不解故東萊王㽔知其逆節表陳事狀而見誣陷加罪黜徙以樹私黨僣立官屬幸妻嬖妾名號比之中宫沈湎酒色不恤羣黎董艾放縱無所畏忌中丞按奏而取退免張偉憁恫擁停詔可葛旟小豎維持國命操弄王爵貨賂公行羣姦聚黨擅斷殺生密署腹心實為貨謀斥罪忠良伺窺神器臣受重任藩衛方嶽見冏所行實懷激憤即日翊軍校尉李含乘馹密至宣騰詔旨臣伏讀感切五情若灼春秋之義君親無將冏擁強兵樹置私黨權官要職莫非腹心雖復重責之誅恐不義服今輒勒兵精卒十萬與州征並協忠義共會洛陽驃騎將軍長沙王乂同奮忠誠廢冏還第有不順命軍法從事成都王頴眀德茂親功髙勳重往嵗去就允合衆望宜為宰輔代冏阿衡之任顒表既至冏大懼會百僚曰昔孫秀作逆篡逼帝王社稷傾覆莫能禦難孤紏合大衆掃除元惡臣子之節信著神眀二王今日聼信讒言造構大難當賴忠謀以和不協耳司徒王戎司空東海王越説冏委權崇讓冏從事中郎葛旟怒曰趙庶人聽任孫秀移天易日當時喋喋莫敢先唱公蒙犯矢石躬貫甲胄攻圍陷陳得濟今日計功行封事殷未遍三臺納言不恤王事賞報稽緩責不在府讒言僣逼當共誅討虛承偽書令公就第漢魏以來王侯就第寧有得保妻子者乎議者可斬於是百官震悚無不失色長沙王乂徑入宫發兵攻冏府冏遣董艾陳兵宫西乂又遣宋𢎞等放火燒諸觀閣及千秋神武門冏令黃門令王湖悉盜騶虞幡唱云長沙王矯詔乂又稱大司馬謀反助者誅五族是夕城內大戰飛矢雨集火光屬天帝幸上東門矢集御前羣臣救火死者相枕眀日冏敗乂禽冏至殿前帝惻然欲活之乂叱左右促牽出冏猶再顧遂斬於閶闔門外徇首六軍諸黨屬皆夷三族幽其子淮陵王超樂安王冰濟陽王英于金墉暴冏尸于西明亭三日莫敢收斂冏故掾屬荀闓等表乞殯葬許之初冏之盛也有一婦人詣大司馬府求寄産吏詰之婦人曰我截齊便去耳識者聞而惡之時又謡曰著布袙腹為齊持服俄而冏誅永興初詔以冏輕犯重刑前勳不宜堙沒乃赦其三子超冰英還第封超為縣王以繼冏嗣歷員外散騎常侍光熙初詔册復冏夲封命子超嗣爵永嘉中懷帝下詔重述冏功還贈大司馬加侍中假節追諡及洛陽傾覆超兄弟皆沒于劉聰冏遂無後太元中詔以故南頓王宗子柔之襲封齊王紹攸冏之祀歷散騎常侍元興初會稽王道子討桓元使柔之兼侍中以騶虞幡宣告江荆二州至姑孰為元前鋒所害贈光祿勳子建之立宋受禪國除長沙厲王乂字士度武帝第六子也太康十年受封拜員外散騎常侍及武帝崩乂時年十五孺慕過禮會楚王瑋奔喪諸王皆近路迎之乂獨至陵所號慟以俟瑋拜步兵校尉及瑋之誅二公也乂守東掖門會騶虞幡出乂投弓流涕曰楚王被詔是以從之安知其非瑋既誅乂以同母貶為常山王令之國乂身長七尺五寸開朗果斷才力絶人虛心下士甚有名譽三王之舉義也乂率國兵應之過趙國房子令距守乂殺之進軍為成都後繼常山內史程恢將二於乂乂到鄴斬恢及其五子至洛拜撫軍大將軍領左軍將軍頃之遷驃騎將軍開府復本國乂見齊王冏漸専權嘗與成都王穎俱拜陵因謂穎曰天下者先帝之業也王宜維之時聞其言者皆憚之及河間王顒將誅冏傳檄以乂為內主冏遣其將董艾襲乂乂將左右百餘人手斫車幰露乘馳赴宫閉諸門奉天子與冏相攻起火燒冏府連戰三日冏敗斬之并誅諸黨與二千餘人顒本以乂弱冏強兾乂為冏所禽然後以乂為辭宣告四方共討之因廢帝立成都王已為宰輔専制天下既而乂殺冏其計不果乃潛使侍中馮蓀河南尹李含中書令卞粹等襲乂乂並誅之顒遂與穎同伐京都穎遣刺客圖乂時長沙國左常侍王矩侍直見客色動遂殺之詔以乂為大都督以距顒連戰自八月至十月朝議以乂穎兄弟可以辭説而釋乃使中書令王衍行太尉光祿勳石陋行司徒使説穎令與乂分陕而居穎不從乂因致書於穎勸令還鎮以寧帝室穎復乂書求斬羊元之皇甫商等首當自歸鄴辭語皆不相能乂前後破穎軍斬獲六七萬人戰久糧乏城中大飢雖曰疲弊將士同心皆願效死而乂奉上之禮未有虧失張方以為未可尅欲還長安而東海王越慮事不濟潛與殿中將收乂送金墉城乂表曰陛下篤睦委臣朝事臣小心忠孝神祗所鑒諸王承謬率衆見責朝臣無正各慮私困收臣别省送臣幽宫臣不惜軀命但念大晉衰微枝黨欲盡陛下孤危若臣死國寧亦家之利但恐快凶人之志無益於陛下耳殿中左右恨乂功垂成而敗謀劫出之更以距穎越懼難作欲遂誅乂黃門郎潘滔勸越密告張方方遣部將郅輔勒兵三千就金墉收乂至營炙而殺之乂怨痛之聲達於逺近三軍莫不為之垂涕時年二十八乂將殯於城東官屬莫敢往故掾劉祐獨送之步持喪車悲號斷絶哀感路人張方以其義士不之問也初乂執權之始洛下謡曰草木萌牙殺長沙乂以正月二十五日廢二十七日薨如謡言焉永嘉中懷帝以乂子碩嗣拜散騎常侍後沒于劉聰成都王穎字章度武帝第十六子也太康末受封邑十萬户後拜越騎校尉加散騎常侍車騎將軍賈謐嘗與皇太子博爭道穎在坐厲聲呵謐曰皇太子國之儲君賈謐何得無禮謐懼由此出穎為平北將軍鎮鄴轉鎮北大將軍趙王倫之篡也進征北大將軍加開府儀同三司及齊王冏起義穎發兵應冏以鄴令盧志為左長史頓邱太守鄭琰為右長史黃門郎程牧為左司馬陽平太守和演為右司馬使兖州刺史王彥兾州刺史李毅督護趙驤石超等為前鋒羽檄所及莫不響應至朝歌衆二十餘萬趙驤至黃橋為倫將士猗許超所敗死者八千餘人士衆震駭穎欲退保朝歌用盧志王彥策又使趙驤率衆八萬與王彥俱進倫復遣孫會劉琨等率三萬人與猗超合兵距驤等精甲耀日鐵騎前驅猗既戰勝有輕驤之心未及溫十餘里復大戰猗等奔潰穎遂過河乘勝長驅左將軍王輿殺孫秀幽趙王倫迎天子反正及穎入京師誅倫使趙驤石超等助齊王冏攻張泓於陽翟泓等遂降冏始率衆入洛自以首建大謀遂擅威權穎營于太學及入朝天子親勞焉穎拜謝曰此大司馬臣冏之勳臣無預焉見訖即辭出不復還營便謁太廟出自東陽門遂歸鄴遣信與冏别冏大驚馳出送穎至七里澗及之穎住車言别流涕不及時事惟以太妃疾苦形於顔色百姓觀者莫不傾心至鄴詔遣兼太尉王粹加九錫殊禮進位大將軍都督中外諸軍事假節加黃鉞録尚書事入朝不趨劒履上殿穎拜受徽號讓還殊禮九錫表論興義功臣盧志和演董洪王彥趙驤等五人皆封開國公侯又表稱大司馬前在陽翟與強賊相持既久百姓瘡痍飢餓凍餒宜急拯救乞差發郡縣車一時運河北邸閣米十五萬斛以賑陽翟飢民盧志言於穎曰黃橋戰亡者有八千人既經夏暑露骨中野可為傷惻昔周王葬枯骨故詩云行有死人尚或墐之况此等致死於王事乎穎乃造棺八千餘枚以成都國秩為衣服斂祭葬於黃橋北樹枳籬為之塋域又立都祭堂刋石立碑紀其赴義之功使亡者之家四時祭祀仍表其門閭加常戰亡二等又令河內溫縣埋藏趙王倫戰死士卒萬四千餘人穎形美而神昏不知書然器性敦厚委事於志故得成其美焉及齊王冏驕侈無禮於是衆望歸之詔遣侍中馮蓀中書令卞粹喻穎入輔政并使受九錫穎猶讓不拜尋加太子太傅穎嬖人孟玖不欲還洛又程太妃愛戀鄴都以此議久不決留義募將士既久咸怨曠思歸或有輒去者乃題鄴城門云大事解散暫欲遽請且歸赴時務昔以義來今以義去若復有急更相語穎知不可留因遣之百姓乃安及冏敗頴懸執朝政事無巨細皆就鄴咨之後張昌擾亂荆土頴拜表南征所在響赴既恃功驕奢百度弛廢甚於冏時穎方恣其欲而憚長沙王乂在內遂與河間王顒表請誅后父羊元之左將軍皇甫商等檄乂使就第乃與顒將張方伐京師以平原內史陸機為前鋒都督前將軍假節穎次朝歌每夜矛戟有光若火其壘井中皆有龍象進軍屯河南阻清水為壘造浮橋以通河北以大木函盛石沈之以繫橋名曰石鱉陸機戰敗死者甚衆機又為孟玖所譛穎收機斬之夷其三族語在機傳於是進攻京城時常山人王輿合衆萬餘欲襲穎會又被執其黨斬輿降穎穎既入京師復旋鎮于鄴增封二十郡拜丞相河間王顒表頴宜為儲副遂廢太子覃立穎為皇太弟丞相如故制度一依魏武故事乘輿服御皆遷于鄴表罷宿衛兵屬相府吏以王官宿衛穎僣侈日甚有無君之心委任孟玖等大失衆望永興初左衛將軍陳眕殿中中郎逯苞成輔及長沙故將上官己等奉大駕討穎馳檄四方赴者雲集軍次安陽衆十餘萬鄴中震懼穎欲走其椽步熊有道術曰勿動南軍必敗穎會其衆問計東安王繇乃曰天子親征宜罷甲縞素出迎請罪司馬王混參軍崔曠等勸穎距戰穎從之乃遣奮武將軍石超率衆五萬次于蕩隂眕二弟匡規自鄴赴王師云鄴中皆已離叛由是不甚設備超衆奄至王師敗績矢及乘輿侍中嵇紹死於帝側左右皆奔散乃棄天子於稿中超遂奉帝幸鄴穎改元建武害東安王繇署置百官殺生自已立郊於鄴南平北將軍王浚寧北將軍東嬴公騰殺穎所置幽州刺史和演穎徵浚浚屯兾州不進與騰及烏九羯朱襲穎侯騎至鄴穎遣幽州刺史王斌及石超李毅等距浚為羯朱等所敗鄴中大震百僚奔走士卒分散頴懼將帳下數十騎擁天子與中書監盧志單車而走五日至洛羯朱追至朝歌不及而還河間王顒遣張方率甲卒二萬救穎至洛方乃挾帝擁穎及豫章王并髙光盧志等歸于長安顒廢頴歸藩以豫章王為皇太弟頴既廢河北思之鄴中故將公師藩汲桑等起兵以迎穎衆情翕然顒復拜穎鎮東大將軍都督河北諸軍事給兵千人鎮鄴穎至洛而東海王越率衆迎大駕所在蜂起穎以北方盛強懼不可進自洛陽奔關中值大駕還洛穎自華陰趨武關出新野帝詔鎮南將軍劉𢎞南中郎將劉陶收捕穎穎於是棄母妻單車與二子廬江王普中都王廓渡河赴朝歌收合故將士數百人欲就公師藩頓邱太守馮嵩執穎及普廓送鄴范陽王虓幽之而無他意屬虓暴薨長史劉輿見穎為鄴都所服慮為後患祕不發喪偽令人為臺使稱詔夜賜穎死穎謂守者田徽曰范陽王死乎徽曰不知穎曰卿年幾徽曰五十穎曰知天命不徽曰不知穎曰我死之後天下安乎不安乎我自放逐於今三年身體手足不見洗沐取數斗湯來其二子號泣穎敕人將去乃散髮東首臥命徽縊之時年二十八二子亦死鄴中哀之穎之敗也官屬並奔散惟盧志隨從不怠論者稱之其後汲桑害東嬴公騰稱為穎報讐遂出穎棺載之於軍中每事啓靈以行軍令桑敗棄棺於故井中穎故臣收之改葬于洛陽懷帝加以縣王禮穎死後數年開封間有傳穎子年十餘嵗流離百姓家東海王越遣人殺之永嘉中立東萊王㽔子遵為穎嗣封華容縣王後沒于賊國除河間王顒字文載安平獻王孚孫太原烈王瓌之子也初襲父爵咸寧二年就國三年改封河間少有清名輕財愛士與諸王俱來朝武帝嘆顒可以為諸國儀表元康初為北中郎將監鄴城九年代梁王肜為平西將軍鎮關中石函之制非親親不得都督關中顒於諸王為踈特以賢舉及趙王倫篡位齊王冏謀討之前安西參軍夏侯奭自稱侍御史在始平合衆得數千人以應冏遣信要顒顒遣主簿房陽河間國人張方討擒奭及其黨十數人於長安市腰斬之及冏檄至顒執冏使送之於倫倫徵兵於顒顒遣張方率關右健將赴之方至華隂顒聞二王兵盛乃加長史李含龍驤將軍領督護席薳等追方軍回以應二王義兵至潼關而倫秀已誅天子反正含方各率衆還及冏論功雖怒顒初不同而終能濟義進位侍中太尉加三賜之禮後含為翊軍校尉與冏參軍皇甫商司馬趙驤有憾遂奔顒詭稱受密詔代冏因説利害顒納之便發兵遣使邀成都王穎以含為都督率諸軍屯隂盤前鋒次于新安去洛百二十里檄長沙王乂討冏及冏敗顒以含為河南尹使與馮蓀卞粹等潛圖害乂商知含前矯妄及與顒隂謀具以告乂乂乃誅含等顒聞含死即起兵以討商為名使張方為都督領精卒七萬向洛方攻商商距戰而潰方遂進攻西明門乂率中軍左右衛擊之方衆大敗死者五千餘人方初於駛水橋西為營於是築壘數重外引廪榖以足軍食乂復從天子出攻方戰輒不利及乂死方還長安詔以顒為太宰大都督雍州牧顒廢皇太子覃立成都王頴為太弟改年大赦左衛將軍陳眕奉天子伐頴顒又遣方率兵二萬救鄴天子已幸鄴方屯兵洛陽及王浚等伐穎穎挾天子歸洛陽方將兵入殿中逼帝幸其壘掠府庫將焚宫廟以絶衆心盧志諫乃止方又逼天子幸長安顒乃選置百官改秦州為定州及東海王越起兵徐州西迎大駕關中大懼方謂顒曰方所領猶有十餘萬衆奉送大駕還洛宫使成都王反鄴公自留鎮關中方北討博陵如此天下可小安無復舉手者顒慮事大難濟不許乃假劉喬節進位鎮東大將軍遣成都王穎總統樓褒王闡等諸軍據河橋以距越王浚遣督護劉根將三百騎至河上闡出戰為所殺穎頓軍張方故壘范陽王虓遣鮮卑騎與平昌博陵衆襲河橋樓褒西走追騎至新安道路死者不可勝數初越以張方劫遷大駕天下怨憤倡義與山東諸侯尅期奉迎先遣説顒令送帝還都與顒分陜而居顒欲從之而方不可及東軍大捷成都等敗顒令方親信將郅輔夜斬方首送以示東軍尋變計更遣刁默守潼關乃咎輔殺方又斬輔顒先遣將吕朗等據滎陽范陽王虓司馬劉琨以方首示朗於是朗降時東軍既盛破刁默入關顒懼又遣馬瞻郭偉於灞水禦之瞻等戰敗散走顒單馬逃于太白山東軍入長安大駕旋以太弟太保梁柳為鎮西將軍守關中馬瞻等出詣栁因共殺栁於城內瞻等與始平太守梁邁合從迎顒於南山顒不肯入府長安令蘇衆記室督朱永勸顒表稱栁病卒輒知軍事𢎞農太守裴廙秦國內史賈龕安定太守賈匹等起義討顒斬馬瞻梁邁等東海王越遣督護糜晃率國兵伐顒至鄭顒將牽秀距晃晃斬秀并其二子義軍據有關中顒保城而已永嘉初詔以顒為司徒乃就徵南陽王模遣將梁臣於新安雍谷車上扼殺之并其三子詔以彭城元王植子融為顒嗣改封樂成縣王薨無子建興中元帝又以彭城康王釋子欽為融嗣東海孝獻王越字元超髙密王泰之次子也少有令名謙虗持布衣之操為中外所宗初以世子為騎都尉與駙馬都尉楊邈及琅邪王胄子繇俱侍講東宫拜散騎侍郎歷左衛將軍加侍中預討楊駿有功封五千户侯遷散騎常侍輔國將軍尚書右僕射領遊擊將軍復為侍中加奉車都尉别封東海王永康初為中書令徙侍中遷司空領中書監成都王穎攻長沙王乂乂固守洛陽殿中諸將及三部司馬疲於戰守密與左衛將軍朱默夜收乂别省逼越為主啓惠帝免乂官事定越稱疾遜位帝不許加守尚書令太安初帝北征鄴以越為大都督六軍敗越奔下邳徐州都督東平王楙不納越徑還東海成都王穎以越兄弟宗室之美下寬令招之越不應命帝西幸以越為太傅與太宰顒夾輔朝政讓不受東海中尉劉洽勸越發兵以備穎越以洽為左司馬尚書曹馥為軍司既起兵楙懼乃以州與越越以司空領徐州都督以楙領兖州刺史越三弟並據方任征伐輒選刺史守相朝士多赴越而河間王顒挾天子發詔罷越等皆令就國越倡義奉迎大駕還復舊都率甲士三萬西次蕭縣豫州刺史劉喬不受越命遣子祐距之越軍敗范陽王虓遣督護田徽以突騎八百迎越遇祐於譙祐衆潰越進屯陽武山東兵盛關中大懼顒斬送張方首求和尋變計距越越率諸侯及鮮卑許扶歷駒次宿歸等步騎迎惠帝反洛陽詔越以太傅録尚書事以下邳濟陽二郡增封及懷帝即位委政於越吏部郎周穆清河王覃舅越之姑子也與其妹夫諸葛玫共説越曰主上之為太弟張方意也清河王本為太子為羣凶所廢先帝暴崩多疑東宫公盍思伊霍之舉以寧社稷乎言未卒越曰此豈宜言邪叱左右斬之以玫穆世家罪止其身因此表除三族之法帝始親萬機留心庶事越不説求出藩帝不許越遂出鎮許昌永嘉初自許昌率茍晞及兾州刺史丁劭討汲桑破之越遷于許長史潘滔説之曰兖州天下樞要公宜自牧乃轉茍晞為青州刺史由是與晞有隙尋詔越為丞相兖州牧督兖豫司兾幽并六州越辭丞相不受自許遷于鄄城越恐清河王覃終為儲副矯詔收付金墉城尋害之王彌入許越遣左司馬王斌率甲士五千餘人入衛京師鄄城自壞越惡之移屯濮陽又遷于滎陽召田甄等六率甄不受命越遣監軍劉望討甄初東嬴公騰之鎮鄴也携并州將田甄甄弟蘭任祉祈濟李惲薄盛等部衆萬餘人至鄴遣就榖兾州號為乞活及騰敗甄等邀破汲桑於赤橋越以甄為汲郡蘭為巨鹿太守甄求魏郡越不許甄怒故召不至望既渡河甄退李惲薄盛斬田蘭率其衆降甄祉濟棄軍奔上黨越自滎陽還洛以太學為府疑朝臣二於己乃誣帝舅王延等為亂遣王景率甲士三千人入宫收延等付廷尉殺之越解兖州牧領司徒越既與茍晞構怨又以頃興事多由殿省乃奏宿衛有侯爵者皆罷之時殿中武官並封侯由是出者略盡皆涕泣而去乃以東海國上軍將軍何倫為右衛將軍王景為左衛將軍領國兵數百人宿衛越自誅王延等大失衆望而多有猜嫌散騎侍郎髙韜有憂國之言越以謗訕時政害之而不自安乃戎服入見請討石勒且鎮集兖豫以援京師帝曰今逆衆侵逼郊畿王室蠢蠢莫有固志朝廷社稷倚賴於公豈可逺出以孤根本對曰臣今率衆邀賊勢必滅之賊滅則不逞消殄已東諸州貢職流通此所以宣暢國威藩屏之宜也若端坐京輦以失機會則釁弊日滋所憂逾重遂行留妃裴氏世子鎮軍將軍毗及龍驤將軍李惲并何倫等守衛京師表以行臺隨軍率甲士四萬東屯于項王公卿士隨從者甚衆詔加九錫越乃羽檄四方而所徵者皆不至而茍晞又表討越語在晞傳越以豫州刺史馮嵩為左司馬自領豫州牧越専擅威權圖為霸業朝賢素望選為佐吏名將徑卒充于己府不臣之迹四海所知而公私罄乏所在冦亂州郡携二上下崩離禍結釁深遂憂懼成疾永嘉五年薨于項祕不發喪以襄陽王範為大將軍統其衆還葬東海石勒追及於苦縣寧平城將軍錢端出兵距勒戰死軍潰勒命焚越柩曰此人亂天下吾為天下報之故燒其骨以告天地於是衆數十萬勒以騎圍而射之相踐如山王公士庶死者十餘萬王彌弟璋焚其餘衆并食之天下歸罪於越帝發詔貶為縣王何倫李惲聞越之死祕不發喪奉妃裴氏及毗出京京城從者傾城所經暴掠至洧倉又為勒所敗毗及宗室三十六王皆沒于賊李惲殺妻子奔廣宗何倫走下邳裴妃為人所掠賣於吳氏太興中得渡江欲招魂葬越元帝詔有司詳議博士傅純曰聖人制禮以事緣情設冢椁以藏形而事之以凶立廟祧以安神而奉之以吉送形而往迎精而還此墓廟之大分形神之異制也至於室廟寢廟祊祭非一處所以廣求神之道而獨不於墓眀非神之所處也今亂形神之别錯廟墓之宜違禮制義莫大於此於是下詔不許裴妃不奉詔遂葬越於廣陵太興末墓毁改葬丹徒初元帝鎮建鄴裴妃之意也帝深德之數幸其第以第三子沖奉越後薨無子成帝以少子奕繼之哀帝徙奕為琅邪王而東海無嗣隆安初安帝更以會稽忠王次子彥璋為東海王繼沖為曽孫為桓元所害國除武十二王武帝二十六男楊元后生毗陵悼王軌惠帝秦獻王柬審美人生城陽懷王景楚隱王瑋長沙厲王乂徐才人生城陽殤王憲匱才人生東海沖王祗趙才人生始平哀王裕趙美人生代哀王演李夫人生淮南忠壯王允吳敬王晏嚴保林生新都懷王該陳美人生清河康王遐諸姬生汝陰哀王謨程才人生成都王穎王才人生孝懷帝楊悼后生渤海殤王恢餘八子不顯母氏並早夭又無封國及追諡今並略之其瑋穎乂自有傳毗陵悼王軌字正則初拜騎都尉年二嵗而夭太康十年追加封諡以楚王瑋子義嗣秦獻王柬字𢎞度沈敏有識量泰始六年封汝南王咸寧初徙封南陽王拜左將軍領右軍將軍散騎常侍武帝幸宣武場以三十六軍兵簿令柬料校之柬一省便擲脫謬帝異之於諸子中尤見愛幸以左將軍居齊獻王故府甚貴寵為天下所屬目性仁訥無機辨之譽太康十年徙封於秦邑八萬户于時諸王封中土者皆五萬户以柬與太子同産故特加之轉鎮西將軍西戎校尉假節與楚淮南王俱之國及惠帝即位來朝拜驃騎將軍開府儀同三司加侍中録尚書事進位大將軍時楊駿伏誅柬既痛舅氏覆滅甚有憂危之慮屢述武帝旨請還藩而汝南王亮留柬輔政及亮與楚王瑋被誅時人嘆柬有先識元康元年薨年三十朝野痛惜之無子以淮南王允子郁為嗣與允俱被害永寧二年追諡曰悼又以吳王晏子鄴嗣懷帝崩鄴入纂帝位國絶城陽懷王景字景度出繼叔父城陽哀王兆後泰始五年受封六年薨東海沖王祗字敬度泰始九年五月受封殤王薨復以沖繼兆其年薨時年三嵗始平哀王裕字濬度咸寧三年受封其年薨年七嵗無子以淮南王允子迪為嗣太康十年改封漢王為趙王倫所害淮南忠壯王允字欽度咸寧三年封濮陽王拜越騎校尉太康十年徙封淮南仍之國都督揚江二州諸軍事鎮東大將軍假節元康九年入朝初愍懷王廢議者將立允為太弟會趙王倫廢賈后詔遂以允為驃騎將軍開府儀同三司侍中都督如故領中護軍允性沈毅宿衛將士皆敬服之倫既有僣逆之志允隂知之稱疾不朝密養死士潛謀誅倫倫甚憚之轉為太尉外示優崇實奪其兵也允稱疾不拜倫遣御史逼允收官屬以下劾以大逆允恚視詔乃孫秀手書也大怒便收御史將斬之御史走而獲免斬其令史二人厲色謂左右曰趙王欲破我家遂率國兵及帳下七百人直出大呼曰趙王反我將攻之佐淮南王者左袒於是歸之者甚衆允將赴宫左丞王輿閉東掖門允不得入遂圍相府允所將兵皆淮南竒才劒客也與戰頻敗之倫兵死者千餘人太子左率陳徽勒東宫兵鼓譟於內以應允結陳於承華門前弓弩齊發射倫飛矢雨集主書司馬畦祕以身蔽倫箭中其背而死倫官屬皆隱樹而立樹輒中數百箭自辰至未徽兄淮時為中書令遣麾騶虞幡以解鬭倫子虔為侍中在門下省密要壯士約以富貴於是遣司馬督護伏允領騎四百從宫中出舉空版詐言有詔助淮南王允允不之覺開陳納之下車受詔為允所害時年二十九初倫兵敗皆相傳曰已擒倫矣百姓大悅既聞允死莫不嘆息允三子皆被害坐允夷滅者數千人及倫誅齊王冏表理允寃以息超繼允後於是有詔改葬賜以殊禮追贈司徒冏敗超被幽金墉城復以吳王晏子祥為嗣拜散騎常侍洛陽傾覆為劉聰所害代哀王演字宏度太康十年受封少有廢疾不之國演常止于宫中薨無子以成都王穎子廓為嗣改封中都王後與穎俱死新都王該字元度咸寧三年受封太康四年薨時年十三無子國除清河康王遐字深度美容儀有精彩武帝愛之既受封出繼叔父城陽哀王兆太康十年增封渤海郡歷右將軍散騎常侍前將軍元康初進撫軍將軍加侍中遐長而懦弱無所是非性好內不能接士大夫及楚王瑋之舉兵也使遐收衛瓘而瓘故吏榮晦遂盡殺瓘子孫遐不能禁為世所尤永康元年薨時年二十八四子覃籥銓端覃嗣立及沖太孫薨東宫曠然未有冢嗣齊王冏表立覃為皇太子既而河間王顒脅遷大駕表立成都王穎為皇太弟廢覃復為清河王初覃為清河世子所佩金鈴歘生隱起如麻粟祖母陳太妃以為不祥毁而賣之占者以金是晉行大興之祥覃為皇允是其瑞也毁而賣之象覃見廢不終之驗也永嘉中前北軍中候任城吕雍度支校尉陳顔等謀立覃為太子事覺幽於金墉城未幾被害時年十四葬以庶人禮籥初封新蔡王覃薨還封清河王銓初封上庸王懷帝即位更封豫章王二年立為皇太子洛京傾覆沒于劉聰端初封廣川王銓之為皇太子也轉封豫章禮秩如皇太子拜散騎常侍平南將軍都督江州諸軍事假節當之國會洛陽陷沒端東奔茍晞於蒙晞立為皇太子七十日為石勒所沒汝隂哀王謨字令度太康七年薨時年十一無後國除吳敬王晏字平度太康十年受封食丹陽吳興并吳三郡歷射聲校尉後軍將軍與兄淮南王允共攻趙王倫允敗收晏付廷尉欲殺之傳祗於朝堂正色而爭於是羣官並諫倫乃貶為賓徒縣王後徙封代王倫誅詔復晏本封拜上軍大將軍開府加侍中長沙王乂成都王穎之相攻也乂以晏為前鋒都督數交戰永嘉中為太尉大將軍晏為人恭願才不及中人於武帝諸子中最劣又少有風疾視瞻不端後轉增劇不堪朝覲及洛京傾覆晏亦遇害時年三十一愍帝即位追贈太保五子長子不顯名與晏同沒餘四子祥鄴固衍祥嗣淮南王允鄴即愍帝固初封漢王改封濟南衍初封新都王改封濟隂為散騎常侍皆沒于賊渤海殤王恢字思度太康五年薨時年二嵗追加封諡元四王元帝六男宫人荀氏生明帝及琅邪孝王裒石媫妤生東海哀王沖王才人生武陵威王晞鄭夫人生琅邪悼王煥及簡文帝琅邪孝王裒字道成母荀氏以微賤入宫元帝命虞妃養之初繼叔父長樂亭侯渾後徙封宣城郡公拜後將軍及帝為晉王有司奏立太子帝以裒有成人之量過於明帝從容謂王導曰立子以德不以年導曰世子宣城俱有朗俊之目固當以年於是太子位遂定更封裒琅邪嗣恭王後改食會稽宣城邑五萬二千户拜散騎常侍使持節都督青徐兖三州諸軍事車騎將軍徵還京師建武元年薨年十八贈車騎大將軍加侍中及妃山氏薨祔葬穆帝更贈裒太保子哀王安國立未踰年薨東海哀王沖字道讓元帝以東海王越世子毗沒于石勒不知存亡乃以沖繼毗後稱東海世子以毗陵郡增本封邑萬户又改食下邳蘭陵以越妃裴氏為太妃拜長水校尉髙選僚佐以沛國劉耽為司馬潁川庾懌為功曹吳郡顧和為主簿永昌中遷中軍將軍加散騎常侍及東海太妃薨因發毗喪沖即王位以滎陽益東海國轉車騎將軍徙驃騎將軍咸康七年薨年三十一贈侍中驃騎將軍儀同三司無子成帝遺詔以小晚生奕繼哀王為東海王以道逺罷滎陽更以臨川郡益東海及哀帝以琅邪王即尊位徙奕為琅邪王東海國闕無嗣奕後入纂大業桓溫廢之復為東海王既而貶為海西公東海國又闕嗣隆安三年安帝詔以會稽忠王次子彥璋為東海王繼哀王為曽孫改食吳興郡為桓元所害國除武陵威王晞字道叔出繼武陵王哲後太興元年受封咸和初拜散騎常侍後以湘東增武陵國除左將軍遷鎮軍將軍加散騎常侍康帝即位加侍中特進建元初領祕書監穆帝即位轉鎮軍大將軍遷太宰太和初加羽葆鼓吹入朝不趨贊拜不名劒履上殿固讓晞無學術而有武幹為桓溫所忌及簡文帝即位溫乃表免晞官以王歸藩又免其世子綜官解子㻱散騎常侍㻱以梁王隨晞晞既見黜送馬八十五匹三百人杖以歸溫溫又逼新蔡王晃使自誣與晞綜及著作郎殷涓太宰長史庾籍掾曹秀舍人劉強等謀逆遂收付廷尉請誅之簡文帝不許溫於是奏徙新安郡宗屬悉從之而族誅殷涓等廢晃徙衡陽郡太元六年晞卒于新安時年六十六孝武帝三日臨于西堂詔書追悼追封新寧郡王邑千户晞三子綜㻱遵以遵嗣追贈綜給事中㻱散騎侍郎十二年追復晞武陵國綜㻱各復先官㻱還繼梁國㻱字賢明出繼梁王翹官至永安太僕與父晞俱廢薨子和嗣太元中復國薨子珍之嗣桓元篡立梁國人孔朴奉珍之奔于夀陽桓元敗珍之歸朝廷遷大將軍武陵王令授通直散騎郎纍遷遊擊將軍左衛太常劉裕伐姚泓請為咨議參軍裕將弱王室誣其罪害之遵字茂逺初襲封新寧時年十二受拜流涕哀感左右將軍桓伊嘗詣遵遵曰門何為通桓氏左右曰伊與桓溫疏宗相見無嫌遵曰我聞人姓木邉便欲殺之况諸桓乎由是少稱聰慧及晞追封武陵以遵嗣歷位散騎常侍祕書監太宰中領軍桓元用事拜金紫光祿大夫元篡貶為彭澤侯遣之國行次石頭夜濤水入淮船破未得發會義旗興復還國第朝廷稱受密詔使遵總攝萬機加侍中大將軍移入東宫內外畢敬遷轉百官稱制書又教稱令書安帝反正更拜太保加班劒二十人義熙四年薨時年三十五詔賜東園溫眀祕器朝服一具衣一襲錢百萬布千匹策贈太傅葬加殊禮諡曰忠敬子定王季度立拜散騎侍郎薨子球之立宋興國除琅邪悼王煥字耀祖母有寵元帝特所鍾愛初繼帝弟長樂亭侯渾後封顯義亭侯及煥疾篤帝為之徹膳乃下詔封為琅邪王嗣恭王後俄而薨年二嵗帝悼念無已將葬以煥既封列國加以成人之禮詔立凶門柏歷備吉凶儀服營起園陵功役甚衆琅邪國右常侍會稽孫霄上疏切諌表寢不報永昌元年立煥母弟昱為琅邪王即簡文帝也咸和二年徙封會稽以康帝為琅邪王康帝即位哀帝為琅邪王哀帝即位廢帝為琅邪王廢帝即位又以簡文帝攝行琅邪王國祀簡文登阼國遂無嗣帝臨崩封少子道子為琅邪王太元十七年道子為會稽王更以恭帝為琅邪王恭帝即位琅邪國除簡文七子簡文帝七子王皇后生會稽思世子道生皇子俞生胡淑儀生臨川獻王郁皇子朱生王淑儀生皇子天流李夫人生孝武帝會稽文孝王道子俞生朱生天流並早夭今並略之會稽思世子道生字延長帝為會稽王立道生為世子拜散騎侍郎給事中性疏躁不修行業多失禮度竟以幽廢而卒時年二十四無後及孝武帝即位嘗晝日見道生及臨川獻王郁郁曰大郎飢乏辛苦言竟不見帝傷感因以西陽王羕元孫珣之為後珣之歷吳興太守劉裕之伐關中以為咨議參軍時帝道方謝珣之為宗室之美與梁王珍之俱被害臨川獻王郁字深仁幼而敏慧道生初以無禮失旨郁數勸以敬慎之道道生不納郁為之流涕簡文帝深器異之年十七而薨久之追諡獻世子寧康初贈左將軍加散騎常侍追封郡王以武陵威王曽孫寶為嗣追尊其母胡淑儀為臨川太妃寶字𢎞文歷祕書監太常左將軍散騎常侍護軍將軍宋興以為金紫光祿大夫降為西豐侯食邑千户會稽文孝王道子字道子出後琅邪孝王少以清淡為謝安所稱年十嵗封琅邪王食邑一萬七千六百五十一户攝會稽國五萬九千一百四十户太元初拜散騎常侍中軍將軍進驃騎將軍後公卿奏道子親賢莫二宜正位司徒固讓不拜使録尚書六條事尋加開府領司徒及謝安薨詔道子領揚州刺史録尚書假節都督中外諸軍事衛府文武一以配驃騎府讓不受數年領徐州刺史太子大傳公卿又奏宜進位丞相揚州牧假黃鉞羽葆鼓吹並讓不受于時孝武帝不親萬機但與道子酣歌為務姏姆尼僧尤為親昵並竊㺯其權凡所幸接皆出自小豎郡守長吏多為道子所樹立既為揚州總録勢傾天下由是朝野奔湊中書令王國寶性卑佞特為道子所寵昵官以賄遷刑政謬亂又崇信浮屠之學用度奢侈下不堪命太元以後為長夜之晏蓬首昏目政事多闕桓元嘗候道子正遇其醉賔客滿座道子張目謂人曰桓溫晚塗欲作賊云何元伏地流汗不得起長史謝重舉版答曰故宣武公黜昏登聖功超伊霍紛紜之議宜裁之聼鑒道子頷曰儂知儂知因舉酒屬元元乃得起由是元益不自安切齒於道子于時朝政既紊左衛領營將軍會稽許榮上疏指陳其事疏奏不省中書郎范寧亦深陳得失帝由是漸不平於道子然外每優崇之國寶即寧之甥以諂事道子寧奏請黜之國寶懼使陳郡袁悅之因尼妙音致書與太子母陳淑媛説國寶忠謹宜見親信帝因發怒斬悅之國寶甚懼復譛寧於帝帝不獲已流涕出寧為豫章太守道子由是専恣嬖人趙牙出自優倡茹千秋本錢塘捕賊吏因賂諂進道子以牙為魏郡太守千秋為驃騎咨議參軍牙為道子開東第築山穿池列樹竹木功用巨萬道子使宫人為酒肆沽賣於水側與親昵乘船就之飲晏以為笑樂帝嘗幸其宅謂道子曰府內有山因得逰矚甚善也然修飾太過非示天下以儉道子無以對唯唯而已左右侍臣莫敢有言帝還宫道子謂牙曰上若知山是版築所作爾必死矣牙曰公在牙何敢死營造彌甚千秋賣官販爵聚資貨纍億道子既為皇太妃所愛親遇同家人之禮遂恃寵乘酒時失禮敬帝益不能平然以太妃之故加崇禮秩博平令吳興聞人奭上疏切諌言道子信用羣小權寵太盛帝不平滋甚然逼於太妃亦無所廢黜乃出王恭為兖州殷仲堪為荆州王恂為僕射王雅為太子太傅以張王室而潛制道子也道子復委任王緒由是朋黨競扇友愛道盡太妃每和解之而道子不能改中書郎徐邈以國之至親唯道子而已宜在敦穆從容言於帝曰昔漢文明主猶悔淮南世祖聰達自愧齊王兄弟之際實宜深慎帝納之復委任道子如初時有人為雲中詩以指斥朝廷曰相王沈醉輕出教命捕賊千秋干豫朝政王愷守常國寶馳競荆州大度散誕難名盛德之流法護王寧仲堪仙民特有言詠東山安道執操髙抗何不徵之以為朝匠荆州謂王忱也法護即王珣寧即王恭仙民徐邈字安道戴逵字也及恭帝為琅邪王道子受封會稽國并宣城為五萬九千户安帝踐阼有司奏道子宜進位太傅揚州牧中書監假黃鉞備殊禮固辭不拜又解徐州詔內外衆事動靜咨之帝既冠道子稽首歸政王國寶始總國權勢傾朝廷王恭乃舉兵討之道子懼收國寶付廷尉并其從弟琅邪內史緒悉斬之以謝於恭恭乃罷兵道子乞解中外都督録尚書以謝方嶽詔不許道子世子元顯時年十六為侍中心惡恭請道子討之乃拜元顯為征虜將軍其先衛府及徐州文武悉配之屬道子妃薨帝詔須妃畢葬然後居職于時王恭威振中外道子甚懼復引譙王尚之以為腹心尚之説道子曰藩伯強盛宰相權輕宜密樹置以自藩衛道子深以為然乃以其司馬王愈為江州刺史以備恭與尚之等日夜謀議以伺四方之隙王恭知之復舉兵以討尚之為名荆州刺史殷仲堪豫州刺史庾楷廣州刺史桓元並應之道子使人説楷曰本情相與可謂斷金往年帳中之飲結帶之言寧可忘邪卿今棄舊交結新援忘王恭疇昔陵侮之耻乎若乃欲委體而臣之若恭得志以卿為反覆之人必不相信何富貴可保禍敗亦旋及矣楷怒曰王恭昔赴山陵相王憂懼無計我知事急即勒兵而至去年之事亦俟命而奮我事相王無相負者既不能距恭反殺國寶自爾以來誰復敢攘𬒮於君之事乎庾楷實不能以百口助人屠滅當與天下同舉誅鉏姦臣何憂府不開爵不至乎時楷已應恭檄正徵士馬信反朝廷憂懼於是內外戒嚴元顯攘袂慷慨謂道子曰去年不討王恭致有今役今若復從其欲則太宰之禍至矣道子日飲醇酒而委事於元顯元顯雖年少而聰明多涉志氣果鋭以安危為己任尚之為之羽翼時相傅會者皆謂之有明帝神武之風於是以為征討都督假節統前將軍王珣左將軍謝琰及將軍桓之材毛泰髙素等伐恭滅之既而楊佺期桓元殷仲堪復至石頭元顯於竹里馳還京師遣丹陽尹王愷鄱陽太守桓放之新蔡內史何嗣潁川太守溫詳新安太守孫泰等發京邑士庶數萬人據石頭以距之道子將出頓中堂忽有驚馬蹂籍軍中因而擾亂赴江而死者甚衆仲堪既知王恭敗死狼狽西走與桓元屯于尋陽朝廷嚴兵相距內外騷然詔元顯甲仗百人入殿尋加散騎常侍中書令又領中領軍持莭都督如故會道子有疾加以昏醉元顯知朝望去之謀奪其權諷帝解道子揚州及司徒而道子不之覺元顯自以少年頓居權重慮有譏議於是以琅邪王領司徒元顯自為揚州刺史既而道子酒醒方知去職於是大怒而無如之何廬江太守會稽張法順以刀筆之才為元顯謀主交結朋援多樹親黨自桓謙以下諸貴遊皆斂袵請交元顯性苛刻生殺自己法順屢諌不納又發東土諸郡免奴為客者號曰樂屬移置京師以充兵役東土囂然人不堪命天下苦之矣既而孫恩乘釁作亂加道子黃鉞元顯為中軍以討之又加元顯録尚書事然道子更為長夜之飲政無大小一委元顯時謂道子為東録元顯為西録西府車騎填湊東第門下可設雀羅矣元顯無良師友正言弗聞諂聲日至或以為一時英傑或謂為風流名士由是自謂無敵於天下故驕侈日增帝又以元顯有翼亮之功加其所生母劉氏為會稽王夫人金章紫綬會洛陽覆沒道子以山陵幽辱上疏送章綬請歸藩不許及太皇太后崩詔道子乘輿入殿元顯因諷禮官下議稱己德隆望重既録百揆內外羣寮皆應盡敬於是公卿皆拜于時軍旅荐興國用虗竭自司徒已下日廪七升而元顯聚斂不已富過帝室及謝琰為孫恩所害元顯求領徐州刺史加侍中後將軍開府儀同三司都督十六州諸軍事封其子彥章為東海王尋以星變元顯解録復加尚書令會孫恩至京口元顯柵斷石頭率兵距戰頻不利道子無他謀唯日禱蔣侯廟為厭勝之術既而孫恩遁于北海桓元復據上流致箋於道子曰賊造近郊以風不得進以雨不致火食盡故去耳非力屈也昔國寶卒後王恭不乘此威入統朝政足見其心非侮於明公也而謂之非忠今之貴要腹心有時流清望者誰乎豈可云無佳勝直是不能信之耳用理之人然後可以信義相期求利之徒豈有所惜而更委信耶爾來一朝一夕遂成今日之禍矣阿衡之重言何容易求福則立至干忤或致禍在朝君子豈不有懷但懼害及身耳元忝任在逺是以披寫事實元顯覽而大懼張法順謂之曰桓元承藉門資素有豪氣既并殷楊専有荆楚然桓氏世在西藩人或為用而第下之所控引止三吳耳孫恩為亂東土塗地編户飢饉公私不贍元必乘此縱其姦凶竊用憂之元顯曰為之奈何法順曰元始據荆州人情未輯方就綏撫未遑他計及其如此發兵誅之使劉牢之為前鋒而第下以大軍繼進桓元之首必懸於麾下矣元顯以為然遣法順至京口謀於牢之而牢之有疑色法順還説元顯曰觀牢之言色必二於我未若召入殺之不爾敗人大事元顯不從道子尋拜侍中太傅置左右長史司馬從事中郎四人崇異之儀備盡盛典其驃騎將軍僚佐文武即配太傅府加元顯侍中驃騎大將軍開府征討大都督十八州諸軍事儀同三司加黃鉞班劒二十人以伐桓元竟以牢之為前鋒法順又言於元顯曰自舉大事未有威斷桓謙兄弟每為上流耳目斬之以孤荆楚之望且事之濟不繫在前軍而牢之反覆萬一有變則禍敗立至可令牢之殺謙兄弟以示不二若不受命當逆為其所元顯曰非牢之無以當桓元且始事而誅大將人情必動二三不可于時揚土飢虛運漕不繼元斷江路商旅遂絶於是公私匱乏士卒唯給麩橡大軍將發元從兄驃騎長史石生馳使告元元進次尋陽傳檄京師罪狀元顯俄而元至西陽帝戎服餞元顯于西池始登舟而元至新亭元顯棄船退屯國子學堂明日列陳於宣陽門外元顯佐吏多散走或言元已至大桁劉牢之遂降于元元顯回入宣陽門牢之參軍張暢之率衆逐之衆潰元顯奔入相府唯張法順隨之問計於道子道子對之泣元遣太傅從事中郎毛泰收元顯送于新亭縛於舫前而數之元顯答曰為王誕張法順所誤於是送付廷尉并其六子皆害之元又奏道子酣縱不孝當棄市詔徙安成郡使御史杜竹林防衛竟承元旨鴆殺之時年三十九帝三日哭於西堂及元敗大將軍武陵王遵承制下令傷悼追崇太傅為丞相加殊禮一依安平獻王故事追贈驃騎為太尉加羽葆鼓吹下太史擇日定宅兆遣通直常侍司馬珣之迎道子柩于安成時寇賊未平喪不時達義熙元年合葬于王妃陵追諡元顯曰忠以臨川王寶子修之為道子嗣尊妃王氏為太妃義熙中有稱元顯子秀熙避難蠻中而至者太妃請以為嗣於是修之歸于别第劉裕意其詐而案驗之果散騎郎滕羡奴勺藥也竟坐棄市太妃不悟哭之甚慟修之復為嗣薨諡悼王無子國除通志卷八十下
