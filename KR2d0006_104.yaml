body:
  text: 通志卷九十二宋右迪功郎鄭樵漁仲撰列傳第五春秋齊管仲晏子逢丑父崔杼慶封楚鬬伯比鬬子文公子側蒍賈蒍艾獵申叔時伯州犂沈尹戍公孫歸生伍舉薳啓疆申無宇然丹公子貞薳子馮屈建囊瓦沈諸梁公子申吳季札伍員越范蠡齊管敬仲夷吾潁上人也始與召忽俱為齊公子紏傳襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒及襄公遇弒管仲召忽奉公子紏奔魯齊人立公子無知既而殺之公子小白自莒先入得立為君是為桓公桓公使魯人殺子紏召忽死之管仲請囚桓公使鮑叔為宰辭曰君之庸臣也君加惠於臣使不涷餒則是君之賜也若必治國家者則非臣之所能也其唯管夷吾乎臣之所不如夷吾者五寬惠柔民弗若也治國家不失其柄弗若也忠信可結於百姓弗若也制禮義可法於四方弗若也執枹鼓立於軍門使百姓皆加勇焉弗若也桓公曰夫夷吾射寡人中鉤是以濵於死鮑叔對曰夫為其君勤也君若宥而反之夫猶是也桓公曰若何鮑子對曰請諸魯桓公曰施伯魯君之謀臣也夫知吾將用之必不豫我矣若之何鮑子對曰使人請諸魯曰寡君有不令之臣在君之國欲以戮之於羣臣故請之則豫我矣桓公使請諸魯如鮑叔之言魯莊公以問施伯施伯對曰此非欲戮之也欲用其政也夫管子天下之才也所在之國則必得志於天下令彼在齊則必長為魯國憂矣莊公曰若何施伯曰殺而以其尸授之莊公將殺管仲齊使者請曰寡君欲親以為戮若不生得以戮於羣臣猶未得請也請生之於是莊公使束縳以豫齊使齊受之而退比至三釁三浴之桓公親逆之于郊而與之坐而問焉曰吾先君襄公築臺以為髙位田狩罼弋不聽國政卑聖侮士而唯女是崇九妃九嬪陳妾數百食必粱肉衣必文繡戎士凍餒戎車待遊車之􅀢戎士待陳妾之餘優笑在前賢材在後是以國家不日引不月長恐宗廟之不掃除社稷之不血食敢問為此若何管仲對曰昔吾先王昭王穆王世法文武逺績以成名合羣叟比校民之有道者設象以為紀式權以相應比綴以度端本肇末勸之以賞賜紏之以刑罰班序顚毛以為民紀統桓公曰為之若何管仲對曰昔者聖王之治天下也參其國而伍其鄙定民之居成民之事陵為之終而慎用其六柄焉桓公曰成民之事若何管仲對曰四民者勿使雜處雜處則其言哤其事昜公曰處士農工啇若何管仲對曰昔聖王之處士也使就間燕處工就官府處商就市井處農就田野令夫士羣萃而州處間燕則父與父言義子與子言孝其事君者言敬其幼者言悌少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故士之子恆為士令夫工羣萃而州處審其四時辨其功苦權節其用論比協材旦暮從事施於四方以飭其子弟相語以事相示以巧相陳以功少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故工之子恆為工令夫商羣萃而州處察其四時而監其鄉之資以知其市之賈負任擔荷服牛軺馬以周四方以其所有易其所無市賤鬻貴旦暮從事於此以飭其子弟相語以利相示以賴相陳以知賈少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故商之子恆為商令夫農羣萃而州處察其四時權節其用耒耜耞芟及寒擊菒除田以待時耕而疾耰之以待時雨時雨既至挾其槍刈耨鏄以旦暮從事於田野脫衣就功首戴茅蒲身衣襏襫霑體塗足暴其髮膚盡其四支之敏以從事於田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故農之子恆為農野處而不䁥其秀民之能為士者必足賴也有司見而不以告其罪五有司已於事而竣桓公曰定人之居若何管仲對曰制國以為二十一鄉桓公曰善管仲於是制國以為二十一鄉工商之鄉六士鄉十五公帥五鄉焉國子帥五鄉焉髙子帥五鄉焉參國起桉以為三官臣立三宰工立三族市立三鄉澤立三虞山立三衡桓公曰吾欲從事於諸侯其可乎管仲對曰未可國未安桓公曰安國若何管仲對曰修舊法擇其善者而業用之遂滋民與無財而敬百姓則國安矣桓公曰諾遂修舊法擇其善者而業用之遂滋民與無財而敬百姓國既安矣桓公曰國安矣其可乎管仲對曰未可君若正卒伍修甲兵則大國亦將正卒伍修甲兵則難以速得志矣君有攻伐之器小國諸侯有守禦之備則難以速得志矣君若欲速得志於天下諸侯則事可以隱令可以寄政桓公曰為之若何管仲對曰作內政而寄軍令焉桓公曰善管仲於是制國五家為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人焉以為軍令五家為軌故五人為伍軌長帥之十軌為里故五十人為小戎里有司帥之四里為連故二百人為卒連長帥之十連為鄉故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之帥帥之三軍故有軍中之鼓有國子之鼓有髙子之鼓春以搜振旅秋以獮治兵是故卒伍整於里軍旅整於郊內教既成令勿使遷徙伍之人祭祀同福死喪同恤禍災共之人與人相疇家與家相疇世同居少同遊故夜戰聲相聞足以不乖晝戰目相見足以相識其歡欣足以相死居同樂行同和死同哀是故守則同固戰則同強君有此士也三萬人可以橫行於天下以誅無道以屏周室天下大國之君莫之能禦正月之朔鄉長復事桓公親問焉曰於子之鄉有居處為義好學慈孝於父母聰慧質仁發聞於鄉里者有則以告有而不以告謂之蔽明其罪五有司已於事而竣桓公又問焉曰於子之鄉有拳勇股肱之力秀出於衆者有則以告有而不以告謂之蔽賢其罪五有司已於事而竣桓公又問焉曰子之鄉有不慈孝於父母不長悌於鄉里驕躁淫暴不用上令者有則以告有而不以告謂之下比其罪五有司已於事而竣是故鄉長退而修德進賢桓公親見之遂使役官桓公令官長期而書伐以告且選選其官之賢者而復用之曰有人居我官有功休德惟慎端慤以待時使民以勸綏謗言足以補官之不善政桓公召而與之語訾相其質足以比成事誠可立而授之設之以國家之患而不疚退問之其鄉以觀其所能而無大厲升之以為上鄉之贊謂之三選國子髙子退而修鄉鄉退而修連連退而修軌軌退而修伍伍退而修家是故匹夫有善可得而舉也匹夫有不善可得而誅也政既成鄉不越長朝不越爵罷士無任罷女無家夫是故民皆勉為善與其為善於鄉也不如為善於里與其為善於里也不如為善於家是故士莫敢言一朝之便皆有終嵗之計莫敢以終嵗之議皆有終身之功桓公曰伍鄙若何管仲對曰相地而衰征則民不移政不旅舊則民不偷山澤各致其時則民不茍陵阜陸墐井田疇均則民不憾無奪民時則百姓富犧牲不略則牛羊遂桓公曰定民之居若何管仲對曰制鄙二十家為邑邑有司十邑為卒卒有卒帥十卒為鄉鄉有鄉帥三鄉為縣縣有縣帥七縣為屬屬有大夫五屬故立五大夫各使治一屬焉立五正各使聽一屬焉是故正之政聽屬牧政聽縣下政聽鄉桓公曰各保治爾所無或淫怠而不聽治者正月之朝五屬大夫復事桓公擇是寡功者而謫之曰制治分民如一何故獨寡功教不善則政不治一再則宥三則不赦桓公又親問焉曰於子之屬有居處為義好學慈孝於父母聰慧質仁發聞於鄉里者有則以告有而不以告者謂之蔽明其罪五有司已於事而竣桓公又問焉曰於子之屬有拳勇股肱之力秀出於衆者有則以告有而不以告者謂之蔽賢其罪五有司已於事而竣桓公又問焉曰於子之屬有不慈孝於父母不長悌於鄉里驕躁淫暴不用上令者有則以告有而不以告謂之下比其罪五有司已於事而竣五屬大夫於是退而修屬屬退而修縣縣退而修鄉鄉退而修卒卒退而修邑邑退而修家是故匹夫有善可得而舉也匹夫有不善可得而誅也政成矣以守則固以征則強桓公曰吾欲從事於諸侯其可乎管仲對曰未可鄰國未親也君欲從事於天下諸侯則親鄰國桓公曰若何管仲對曰審吾疆場而反其侵地正其封疆無受其資而重為之皮幣以驟聘俯於諸侯以安四鄰則四鄰之國親我矣為遊士八十人奉之以車馬衣裘多其資幣使周遊於四方以號召天下之賢士皮幣玩好使民鬻之四方以監其上下之所好擇其淫亂者而先征之桓公問曰夫軍令則寄諸內政矣齊國寡甲兵為之若何管仲對曰輕過而移諸甲兵桓公曰為之若何管仲對曰制重罪贖以犀甲一戟輕罪贖以鞲楯一戟小罪謫以金分宥間罪禁訟者三禁而不可上下坐成以束矢美金以鑄劒試諸狗馬惡金以鑄鉏夷斤斸試諸壤土甲兵大足桓公曰吾欲南伐何主管仲對曰以魯為主反其侵地棠潛使海於有蔽渠弭於有渚環山於有牢桓公曰吾欲西伐何主管仲對曰以衛為主反其侵地臺原姑與漆里使海於有蔽渠弭於有渚環山於有牢桓公曰吾欲北伐何主管仲對曰以燕為主反其侵地柴夫吠狗使海於有蔽渠弭於有渚環山於有牢桓公於是大親四鄰反侵地正其封疆南至􅡤隂西至于濟北至于河東至于紀酅遂成強國桓公之五年與魯莊公會于柯魯將曹沫操匕首登壇劫桓公請歸所侵魯地桓公懼而從之既已盟桓公怒欲勿與管仲曰不可以小利而棄信於諸侯竟與之七年桓公會于鄄始霸諸侯二十四年為管仲城其私邑小穀昭其功也明年狄人伐邢管仲言於桓公曰戎狄豺狼不可厭也諸夏親昵不可棄也宴安鴆毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書公從之遂救邢二十年桓公伐楚楚成王使與師言管仲責以菁茅不入王祭不供語具齊世家中三十二年桓公盟諸侯于寧母謀服鄭也管仲言於桓公曰臣聞之招攜以禮懷逺以德德禮不易無人不懷齊能修禮於諸侯故諸侯官受方物可不慎歟鄭文公使太子華聽命于會華私於桓公曰泄氏孔氏子人氏三族實違君命若君去之以為成我以鄭為內臣君亦無所不利焉公將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不姦之謂禮守命共時之謂信違此二者姦莫大焉公曰諸侯有討於鄭未捷今茍有釁從之不亦可乎對曰君若綏之以德加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣何懼且夫合諸侯以崇德也會而列姦何以示後嗣夫諸侯之會其德刑禮義無國不記記姦之位君盟替矣作而不記非盛德也君其勿許鄭必受盟夫子華既為太子而求介於大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可間也桓公辭焉子華由是得罪于鄭三十五年桓公會諸侯于葵邱王使宰孔賜桓公胙曰余一人之命有事於文武使孔致胙且有後命以爾自卑勞實謂爾伯舅無下拜桓公召管仲而謀管仲對曰為君不君為臣不臣亂之本也桓公懼出見客曰天威不違顏咫尺小白余敢承天子之命曰爾無下拜恐隕越於下以為天子羞遂下拜升受三十八年桓公使管仲平戎于王王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職無逆朕命管仲受下卿之禮而還君子曰管氏之世祀宜哉讓不忘其上詩云愷悌君子神所勞矣四十一年管仲卒管仲之病也桓公問曰羣臣誰可相者管仲對曰知臣莫若君公曰昜牙開方豎刁何如對曰三子者非人情不可近桓公不用其言卒任三子齊政遂亂管仲少時貧困與鮑叔牙遊常欺鮑叔鮑叔知其賢不以為言及其相桓公九合諸侯一匡天下嘗曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗三戰三走鮑叔不以我為怯知我有老母也公子紏敗召忽死之吾幽囚受辱鮑叔不以我為無耻知我不羞小節而耻功名不顯於天下也生我者父母知我者鮑子也故天下不多管仲之賢而多鮑叔之能知人焉管仲治齊無他術能通貨積財與俗同好惡而已耳故其稱曰倉廪實而知禮節衣食足而知榮辱上服度則六親固四維張則君令行四維不張國乃滅亡下令如流水之原令順民心故論卑而昜行俗之所欲因而豫之俗之所否因而去之其為謀也善因禍而為福轉敗而為功貴輕重慎權衡桓公實怒少姬南襲蔡管仲因而伐楚責以包茅不入周室桓公實北征山戎管仲因而令燕修召公之政桓公實欲背曹沫之盟管仲因而示信於天下故曰知與之為取政之寶也管仲富侔於公室有三歸反坫其在當時國人不以為侈而過之管仲既卒齊國遵其政常強於諸侯管氏之子孫世祿於齊有封邑者十餘世率為名大夫焉晏平仲嬰萊之夷維人桓子弱之子也及事靈公莊公景公初晉大夫欒盈得罪奔楚晉於是會諸侯于商任以錮之莊公三年欒盈自楚來奔晏子言於公曰商任之會受命於晉今納欒氏將焉用之小所以事大信也失信不立君其圖之弗聽退告陳文子曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能久矣欒盈猶在齊晏子曰禍將作矣晉將來伐不可以不懼既而明年果有晉師五年崔杼弒莊公晏子聞難往赴立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而已亡非其私昵誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民崔杼立靈公嬖子杵臼而相之是為景公慶封為左相盟國人於大宫曰所不與崔慶者晏子仰天歎曰嬰所不為忠於君利社稷者是與有如上帝乃歃及慶氏敗公與晏子邶殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之邶殿乃足欲足欲亡無日矣在外不得宰吾一邑不受邶殿非惡富也恐失富也且夫富如帛布之有幅焉為之制度使無遷也夫民生厚而用利於是乎正德以幅之使無黜嫚謂之幅利利過則為敗吾不敢貪多所謂幅也景公四年吳季札來聘見晏子相得甚歡説其納邑與政故晏子因陳桓子而納之九年公使晏子請繼室於晉曰寡君使嬰曰寡人願事君朝夕不倦將奉質幣以無失時則國家多難是以不獲不腆先君之適以備內官焜耀寡人之望則又無祿早世隕命寡人失望君若不忘先君之好惠顧齊國辱收寡人徼福於太公丁公照臨敝邑鎮撫其社稷則猶有先君之適及遺姑姊妹若而人君若不棄敝邑而辱使董振擇之以備嬪嬙寡人之望也韓宣子使叔向對曰寡君之願也寡君不能獨任其社稷之事未有伉儷在縗絰之中是以未敢請君有辱命惠莫大焉若惠顧敝邑撫有晉國賜之內主豈惟寡君與羣臣實受其貺其自唐叔以下實寵嘉之既成昏晏子受禮叔向從之宴相與語叔向曰齊其何如晏子曰此季世也吾弗知齊其為陳氏矣公棄其民而歸於陳氏齊舊四量豆區釡鍾四升為豆各自其四以登於釡釡十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之山木如市弗加於山魚鹽蜃蛤弗加於海民參其力二入於公而衣食其一公聚朽蠹而三老凍餒國之諸市屨賤踊貴民人痛疾而或燠休之其愛之如父母而歸之如流水欲無獲民將焉辟之箕伯直柄虞遂伯戲其相胡公太姬已在齊矣叔向曰然雖吾公室今亦季世也戎馬不駕卿無軍行公乘無人卒列無長庶民罷敝而宫室滋侈道殣相望而女富溢尤民聞公命如逃寇讐欒郤胥原狐續慶伯降在皂𨽻政在家門民無所依君日不悛以樂慆憂公室之卑其何日之有讒鼎之銘曰昧旦丕顯後世猶怠況日不悛其能久乎晏子曰子將若何叔向曰晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之肸之宗十一族唯羊舌氏在而已肸又無子公室無度幸而得死豈其獲祀初公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之於臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅公笑曰子近市識貴賤乎對曰既近之敢不識乎公曰何貴何賤於是公方繁刑有鬻踊者故對曰踊貴屨賤既已告於君故與叔向語而稱之公以是省刑焉及晏子在晉公更其宅反則成矣既拜乃毁之而為里室皆如其舊則使宅人反之且諺曰非宅是卜唯鄰是卜二三子先卜鄰矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅公弗許因陳桓子以請乃許之公孫竈卒司馬竈見晏子曰又喪子雅矣晏子曰惜也子旗不免殆哉薑族弱矣而媯將始昌二惠競爽猶可又弱一個焉薑其危哉鄭罕虎娶子尾氏晏子驟見之陳桓子問其故對曰能用善人民之主也十六年欒髙陳鮑之亂子良謀欲得公以自輔公不聽遂伐虎門晏平仲端委立於虎門之外四族召之無所往其徒曰助陳鮑乎曰何善焉助欒髙乎曰庸愈乎然則歸乎曰君伐焉歸公召之而後入及欒髙敗陳鮑分其室晏子謂陳桓子必致諸公讓德之主也讓之謂懿德凡有血氣皆有爭心故利不可強思義為愈義利之本也藴利生孽姑使無藴乎可以滋長桓子盡致諸公而請老于莒二十六年公疥遂痁期而不瘳諸侯之賔問疾者多在梁邱據與裔款言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賔公説告晏子晏子曰日宋之盟屈建問范會之德於趙武趙武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈以語康王康王曰神人無怨宜其光輔五君以為盟主也公曰據與𣢾謂寡人能事鬼神故欲誅於祝史子稱是語何故對曰若有德之君外內不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所以蕃祉老壽者為信君使也其言忠信於鬼神其適遇淫君外內頗邪上下怨疾動作辟違從欲厭私髙臺深池撞鐘舞女斬刈民力輸掠其聚以成其違不恤後人暴虐淫從肆行非度無所還忌不思謗讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虗以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僭嫚於鬼神公曰然則若之何對曰不可為也山之林木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政逼介之關暴征其私承嗣大夫強易其賄布常無藝徴斂無度宫室日更淫樂不違內寵之妾肆奪於市外寵之臣僭令於鄙私欲養求不給則應民人苦疾夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人多矣雖則善祝豈能勝億兆之詛君若欲誅於祝史修德而後可公説使有司寬政毁關去禁薄斂已責公田于沛既還晏子侍于遄臺子猶馳而造焉公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如和羹焉水火醯醢鹽梅以亨魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而民不千民無爭心故詩曰亦有和羔既戒既平鬷假無言時靡有爭先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁小大短長疾徐哀樂剛柔遲速髙下出入周疏以相濟也君子聽之以平其心心平德和故詩曰德音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後太公因之古若無死爽鳩氏之樂非君所願也三十有二年有彗見于國公念自傷晏子曰君髙臺深池賦斂如弗得刑罰恐弗勝茀星將出彗星何懼乎公曰禳之若何對曰無益也而祇取誣焉天道不諂不二其命若之何禳之且天之有彗以除穢也君無穢德又何禳焉若德之穢禳之何損今怨者已衆而君令一人禳之安能勝衆口乎時公治宫室聚狗馬厚賦重刑故晏子以此諌之公與晏子坐于路寢公歎曰美哉室其誰有此乎晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施於民豆區釡鍾之數其取之公也薄其施之民也厚公務於斂陳氏務施民歸之矣詩曰雖無德與女式歌且舞陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也已公曰善哉是可若何對曰唯禮可以己之在禮家施不及國民不遷農不移工賈不變士不濫官不滔大夫不收公利公曰善哉我不能已吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所稟於天地以為其民也是以先王上之時越石父賢在縲紲之中晏子出遭之塗解左驂贖之載與歸弗謝入閨久之越石父請絶晏子戄然攝衣冠謝曰嬰雖不仁免子於難何子求絶之速也石父曰不然吾聞君子詘於不知己而伸於知己者方吾在縲紲之中彼不知我也夫子既以感悟而贖我是知己矣知己而無禮固不如在縲紲之中晏子於是延入為上客晏子為相時出其御之妻從門窺見其夫擁大蓋策駟馬意氣甚自得已而歸其妻請去夫問其故妻曰晏子長不滿六尺身相齊國名顯諸侯今者妾觀其出志念深矣常有以自下者今子長八尺為人僕御然子之意自以為足妾是以求去也其後夫自抑損晏子怪而問之御以實對晏子薦以為大夫晏子卒有子曰圉逢丑父齊之卿士也頃公十年晉郤克伐齊師陳于鞍邴夏御公丑父為右晉解張御郤克鄭邱緩為右公馳之卻克傷於矢將病強之鼓音不絶馬逸不能止師從之齊師敗績逐之三周華不注韓厥中御而從公丑父與公易位將及華泉絓於木而止丑父寢於轏中蛇出於其下以肱擊之傷而匿之故不能推車而及韓厥執縶馬前丑父教公下如華泉取飲鄭周父御佐車宛茂為右載公以免韓厥獻丑父卻獻子將戮之呼曰自今無有代其君任患者矣有一於此將為戮乎卻子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之公求丑父三入三出而後己崔武子杼丁公之族也丁公適子季子食采於崔其後以邑為氏杼事惠公有寵髙國畏其逼也公卒而逐之奔衛既而得復靈公八年使為大夫公娶於魯曰顔懿姬無子其姪騣聲姬生光以為太子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為太子公許之仲子曰不可廢常不祥間諸侯難光之立也列於諸侯矣今無故而廢之是專黜諸侯而以難犯不祥也君必悔之公曰在我而已遂東太子光使髙厚傅牙以為太子夙沙衛為少傅公疾武子微逆光而立之光殺戎子尸諸朝靈公卒光即位是為莊公執公子牙於句瀆之邱以夙沙衛教公昜已衛懼奔髙唐以叛武子殺髙厚於灑藍而兼其室四年公伐衛將遂伐晉武子諌曰不可臣聞之小國間於大國之敗而毁焉必受其咎君其圖之弗聽陳文子見武子曰將如君何武子曰吾言於君君弗聽也以為盟主而利其難羣臣若急於君何有文子退告人曰崔子將死乎謂君甚而又過之過君以義猶自抑也况以惡乎已而公聞有晉師使陳無宇如楚乞師武子帥師送之遂伐莒侵介根六年武子帥師伐魯魯襄公患之使告于晉孟公綽曰崔杼將有大志不在病我必速歸何患焉其來也不寇使民不嚴異於他日齊師徒歸初棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠薑而美之使偃取之偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過史皆曰吉示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶困于石往不濟也據于蒺藜所恃傷也入于其宫不見其妻凶無所歸也崔子曰嫠也何害先夫當之矣遂取之莊公通焉驟如崔氏以崔子之冠賜人侍者曰不可公曰不為崔子其無冠乎崔子因是又以其間伐晉也曰晉必將報欲弒公以説于晉而不獲間公鞭侍人賈舉而又近之乃為崔子間公夏五月莒為且于之役故莒子來朝甲戌享諸北郭崔子稱疾不視事乙亥公問崔子遂從薑氏薑入于室與崔子自側户出公拊楹而歌侍人賈舉止從者而入閉門甲興公登臺而請弗許請盟弗許請自刃於廟弗許皆曰君之臣崔杼疾病不能聽命近於公宫陪臣干掫有淫者不知二命公踰墻又射之中股反墜遂弒之賈舉州綽邴師公孫敖封具鐸父襄伊僂堙皆死祝他父祭於髙唐至復命不説辨而死於崔氏申蒯侍漁者退謂其宰曰爾以孥免我將死之其宰曰免是反子之義也與之皆死崔氏殺騣蔑于平陰晏子立于崔氏之門外門啓而入枕尸股而哭興三踊而出盧蒲癸奔晉王何奔莒始叔孫宣伯之來奔也納其女於靈公嬖生景公崔杼立而相之慶封為左相盟國人於太宫太史氏書曰崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞太史盡死執簡以往聞既書矣乃還閭邱嬰以帷縛其妻而載之與申鮮虞乘而出鮮虞推而下之曰君昏不能匡危不能救死不能死而知匿其昵其誰納之行及弇中將舍嬰曰崔慶將追我鮮虞曰一與一誰能懼我遂舍枕轡而寢食馬而食駕而行出弇中謂嬰曰速驅之崔慶之衆不可當也遂奔魯崔氏側莊公于北郭丁亥葬諸士孫之里四翣不蹕下車七乘不以兵車崔子生成及強而寡娶東郭薑生明東郭薑以孤入曰棠無咎與東郭偃相崔氏崔成有疾廢之而立明景公二年成請老于崔崔子許之偃與無咎弗與曰崔宗邑也必在宗主成與強怒將殺之告慶封曰夫子之身亦子所知也唯無咎與偃是從父兄莫得進矣大恐害夫子敢以告慶封曰子姑退吾圖之告盧蒲嫳盧蒲嫳曰彼君之讐也天或者將棄彼矣彼實家亂子何病焉崔之薄慶之厚也他日又告慶封曰茍利夫子必去之難吾助汝於是崔成崔強殺東郭偃棠無咎於崔氏之朝崔子怒而出其衆皆逃求人使駕不得使圉人駕寺人御而出且曰崔氏有福止余猶可遂見慶封慶封曰崔慶一也是何敢然請為子討之使盧蒲嫳帥師以攻崔氏堞其宮而守之弗克使國人助之遂滅崔氏殺成與強而盡俘其家其妻縊嫳復命於崔子且御而歸至則無歸矣乃縊崔明夜辟諸大墓而藏之明日遂出奔于魯而崔宗遂滅慶封字子家桓公之後也桓公生公子無虧無虧生慶克慶克生慶封慶封以父名為氏崔杼之嬖於惠公也慶封附之崔杼弒莊公而立景公舉慶封為左相與之並政號崔慶焉崔杼之家亂也慶封用盧蒲嫳之謀遂滅崔氏獨當齊國慶封多欲好田而耆酒與其子慶舍政則以其內實遷于盧蒲氏昜內而飲酒數日國遷朝焉使諸亡人得賊者以告而反之故反盧蒲癸癸臣慶舍有寵妻之慶舍之士謂盧蒲癸曰男女辟姓子不辟宗何也癸曰宗不豫辟豫獨焉辟之賦詩斷章豫取所求焉惡識宗癸言王何而反之二人皆嬖使執寢戈而先後之公膳日雙雞饔人竊更之以鶩御者知之則去其肉而以其洎饋子雅子尾怒慶封告盧蒲嫳嫳曰譬之禽獸吾寢處之矣使析歸父告晏平仲平仲曰嬰之衆不足用也知無能謀也言弗敢出有盟可也析歸父曰子之言云又焉用盟告北郭子車子車曰人各有以事君非佐之所能也陳文子謂其子無宇曰禍將作矣吾其何得對曰得慶氏之木百車於莊文子曰可慎守也已盧蒲癸王何卜攻慶氏許示慶舍兆曰或卜攻讐敢獻其兆慶舍曰克見血景公三年冬十月慶封田于萊陳無宇從文子使召之請曰無宇之母疾病請歸慶封卜之示之兆曰死無宇奉龜而泣乃使歸慶嗣聞之曰禍將作矣謂子家速歸禍作必於嘗歸猶可及也子家弗聽亦無悛志慶嗣曰亡矣幸而獲在吳越陳無宇濟水而戕舟發梁盧蒲薑謂癸曰有事而不我告必不捷矣癸告之薑曰夫子愎莫之止將不出我請止之癸曰諾十一月乙亥嘗于太公之廟慶舍蒞事薑告之且止之弗聽曰誰敢者遂如公麻嬰為尸慶繩為上獻盧蒲癸王何執寢戈慶氏以其甲環公宫陳氏鮑氏之圉人為優慶氏之馬善驚士皆釋甲束馬而飲酒且觀優至於魚里欒髙陳鮑之徒介慶氏之甲子尾抽桷擊扉三盧蒲癸自後刺慶舍王何以戈擊之解其左肩猶援廟桷動於甍以俎壺投人而後死遂殺慶繩麻嬰公懼鮑國曰羣臣為君故也陳須無以公歸稅服而如內宫慶封歸遇告亂者伐西門弗克還伐北門克之入伐內宫弗克反陳于嶽請戰弗許遂奔于魯獻車于季武子美澤可鑑展莊叔見之曰車甚澤人必瘁宜其亡也叔孫穆子食慶封慶封汜祭穆子不説使工為之誦茅鴟亦不知既而齊人來讓奔吳吳句餘豫之朱方聚其族焉而居之富於其舊子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也將聚而殱之崔氏之亂喪羣公子故鉏在魯叔孫還在燕賈在句瀆之邱及慶氏亡皆召之具其器用而反其邑與晏子邶殿其鄙六十辭之與北郭佐邑六十受之與子雅邑辭多受少與子尾邑受而稍致之釋盧蒲嫳于北境求崔杼之尸將戮之不得叔孫穆子曰必得之武王有亂臣十人崔杼其有乎不十人不足以葬既崔氏之臣曰與我其拱璧吾獻其柩於是得之十二月乙亥朔齊人遷莊公殯于大寢以其棺尸崔杼於市十年楚靈王立以諸侯伐吳使屈申圍朱方克之執齊慶封盡滅其族楚鬬伯比楚大夫芈姓若敖熊義之後也以邑為氏武王三十五年東侵隨使薳章求成焉軍於瑕以待之隨人使少師董成伯比言於武王曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國隨為大隨張必棄小國小國離楚之利也少師侈請羸師以張之熊率且比曰季梁在何益伯比曰以為後圖少師得其君王毁軍而納少師少師歸請追楚師隨侯將許之季梁止之曰天方授楚楚之羸其誘我也君何急焉臣聞小之能敵大也小道大淫所謂道忠於民而信於神也上思利民忠也祝史正辭信也今民餒而君逞欲祝史矯舉以祭臣不知其可也公曰吾牲牷肥腯粢盛豐備何則不信對曰夫民神之主也是以聖人先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也奉酒醴以告曰嘉栗旨酒謂其上下皆有嘉德而無違心也所謂馨香無讒慝也故務其三時修其五教親其九族以致其禋祀於是乎民和而神降之福故動則有成今民各有心而鬼神乏主君雖獨豐其何福之有君姑修政而親兄弟之國庶免於難隨侯懼而修政楚不敢伐隨後二年隨少師有寵伯比曰可矣讎有釁不可失也夏武王伐隨軍於漢淮之間季梁請下之弗許而後戰所以怒我而怠冦也少師謂隨侯曰必速戰不然將失楚師隨侯禦之望楚師季良曰楚人上左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃攜矣少師曰不當王非敵也弗從戰于速杞隨師敗績隨侯逸鬬丹獲其戎車與其戎右少師秋隨及楚平楚子將不許伯比曰天去隨疾矣隨未可克也乃盟而還四十二年王使屈瑕伐羅伯比送之還謂其御曰莫敖必敗舉趾髙心不固矣遂入見于王曰必濟師王辭焉入告夫人鄧曼鄧曼曰大夫其非衆之謂其謂君撫小民以信訓諸司以德而威莫敖以刑也莫敖狃於蒲騷之役將自用也必小羅君若不鎮撫其不設備乎夫固謂君訓衆而好鎮撫之召諸司而勸之以令德見莫敖而告諸天之不假易也不然夫豈不知楚師之盡行歟楚子使賴人追之不及莫敖使徇于師曰諌者有刑及鄢亂次以濟遂無次且不設備及羅羅與盧戎兩軍之大敗之莫敖縊于荒谷羣師囚于治父以聽刑武王曰孤之罪也皆免之鬬子文伯比之子也初若敖娶於鄖生伯比若敖卒從母畜於鄖通於鄖子之女生子文鄖夫人使棄諸夢虎乳之鄖子田見之懼而歸夫人以告遂使收之楚人謂乳榖謂虎於菟故命之曰鬬榖於菟而以其女妻伯比成王八年令尹子元見殺使子文為令尹子文賢以楚之多故也自毁其家以紓國難十七年子文帥師滅弦方是時齊桓公霸江黃道柏方睦於齊皆弦姻也弦子恃之而不事楚又不設備故亡三十二年隨以漢東諸侯叛楚子文帥師伐之取成而還會成得臣伐陳取焦夷及城頓子文以為之功使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾故遂相之初子文為令尹其族有干法者廷理拘之聞其令尹之族也遂釋之子文讓之曰凡立廷理所以司法也故直士持法柔而不撓剛而不折吾為令尹以率士民惑怨吾而不能勉之於法吾族之犯法甚明而使廷理因緣吾心而釋之是吾不忠著於國也執國之政而以私聞與其生以無義不若有死而已廷理懼而刑之成王聞之不及履而至子文之室曰寡人幼至廷理失其人以違夫子之意乃出廷理國人歌之子文為令尹四十年繒布之衣以朝鹿裘以處家無一日之積王聞之於是每朝設一東脯一筐糗以益子文之祿子文逃之王止而後復或謂人生求富子逃之何也曰夫從政所以庇民也民常貧而我取富是勤民以自封也死無日矣我逃死非逃富也司馬子良子文之弟也生子越椒子文曰必殺之是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大戚及將死聚其族曰椒也知政乃速行無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而及子文卒其子鬬般為令尹越椒為司馬蒍賈為工正莊王之九年越椒與蒍賈譖鬬般殺之而居其位以蒍賈代已既而又惡蒍賈復殺之遂處于蒸野將攻王王以文成穆三王之子為質焉弗受師于漳澨秋七月戊戌楚子與若敖氏戰于臯滸越椒射王汰輈及鼓跗著於丁寧又射汰輈以貫笠轂師懼退王使巡師曰吾先君文王克息獲三矢焉越椒竊其二盡於是矣鼓而進之遂滅若敖氏子文之孫針尹克黃使於齊還及宗聞亂其人曰不可以入矣針尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗王思子文之治楚國也曰子文無後何以勸善使復其所改命曰生其子孫當昭王時為鄖公公子側字子反事莊王為司馬邲之戰與子重俱將大敗晉師而還莊王十九年圍宋踰年不克宋華元夜入楚師登子反之牀以病告子反以告王遂許宋平語具華元傳共王四年鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任泠敦之田晉欒書救許伐鄭取汜祭子反救鄭鄭伯與許男訟焉皇戍攝鄭伯之辭子反不能決也曰君若辱在寡君寡君與其二三臣其聽兩君之所欲成其可知也不然側不足以知二國之成十五年宋共公薨楚將北侵鄭衛子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有於是共王侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰明年共王自武城使公子成以汝陰之田求成于鄭鄭叛晉從楚盟于武城晉人伐鄭共王救之子反將中軍子重將左子辛將右過申子反入見申叔時曰師其何如申叔曰必敗語在申叔傳鄭姚句耳自楚還言於子駟曰楚師行速過險而不整速則失志不整喪列志失列喪將何以戰懼不可用也夏五月晉楚戰于鄢陵共王傷目自旦而戰見星未巳子反命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食唯命是聽晉人知之亦徇于軍為復戰之備而逸楚囚王聞之召子反與謀榖陽豎獻飲於子反子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日榖王還及瑕使謂子反曰先大夫之覆師徒者君不在子無以為過不榖之罪也子反再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之罪也子重使謂子反曰初隕師徒者而亦聞之矣盍圖之對曰雖微先大夫有之大夫命側側敢不義側亡君師敢忘其死王使止之弗及而卒蒍賈字伯嬴芈姓蚡冒之後薳章食邑於蒍故以命氏成王時子玉伐陳有功子文使為令尹王將圍宋使子文治兵於睽終朝而畢不戮一人子玉治兵於蒍終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸內而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三百乘其不能以入矣茍入而賀何後之有莊王三年大飢戎伐其西南至于阜山師于大林又伐其東南至于陽邱以侵訾枝庸人率羣蠻以叛楚麇人率百濮聚於選將伐楚於是申息之北門不啓楚人謀徙於阪髙蒍賈曰不可我能往冦亦能往不如伐庸夫麇與百濮謂我飢不能師故伐我也若我出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往振廪同食次于句澨使廬戢梨侵庸及庸方城庸人逐之囚子揚窗三宿而逸曰庸師衆羣蠻聚焉不如復大師且起王卒合而後進師叔曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也又與之遇七遇皆北唯裨倏魚人實逐之庸人曰楚不足與戰矣遂不設備莊王乘馹會師于臨品分為二隊子越自石溪子貝自仞以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸賈之本謀也六年莊王及鄭人侵陳遂侵宋晉趙盾救陳會諸侯于棐林以伐鄭蒍賈救鄭遇于北林囚晉解揚晉人乃還九年令尹子文卒子揚為令尹子越為司馬蒍賈為工正賈與子越譖子揚而殺之故子越為令尹已為司馬子越惡之乃以若敖氏之族圄賈於轑陽而殺之蒍艾獵蒍賈之子也亦曰孫叔敖莊王九年蒍賈見孫叔敖於王既而隱於民間不仕令尹虞邱子言於王曰臣之尸祿久矣民不加治獄訟不息處士不升淫禍不止久踐髙位妨賢礙能臣知罪矣聞有下里之士孫叔敖者秃羸多能其性無欲君能舉而授之以政則國可使理民可使附也莊王以車迎之既至使為令尹虞邱子之族犯法孫叔敖執而殺之虞邱子喜入見王曰臣言孫叔敖果任持政矣王曰是夫子之賜也十六年孫叔敖城沂使封人慮事以授司徒量功命日分財用平版幹稱畚築程土物議逺邇略基趾具餱糧度有司事三旬而成不愆于素孫叔敖相楚期年而楚國大治莊王以霸其始為相也賀客畢至有老父衣鹿衣冠白冠最後來且弔孫叔敖曰王不以臣為不肖使相楚國國人皆賀而子獨弔豈有説乎父曰然身已貴而驕人者民去之位已髙而擅權者君惡之祿已厚而不足者患隨之是以來弔也孫叔敖再拜曰敬受命願聞餘教父曰身已貴而意益下位已髙而心益恭祿已厚而不敢取君謹守此足以理楚國矣故孫叔敖之為令尹妻不衣帛馬不食粟常乘棧車牝馬披羖羊之裘從者曰車新則安馬肥則疾狐裘則溫何不為也孫叔曰吾聞君子服美益恭小人服美益倨吾無德以堪之矣孫叔敖疾將死戒其子曰王亟封我矣吾不受也我死王必封汝汝必無受利地楚越間有寢邱者其地不利其名甚惡楚人鬼而越人機可長有者惟此孫叔敖死王果以善地封其子其子不受而請寢邱焉王與之四百邑其後祀十世不絶云申叔時楚大夫為申公故曰申叔時莊王使士亹傳太子審辭曰臣不才無能益焉王曰賴子之善善之也對曰夫善在太子太子欲善善人將至若不欲善善則不用故堯有丹朱舜有啇均啓有五觀湯有太甲文王有管蔡是五王者皆元德也而有姦子夫豈不欲其善不能故也若民煩可教訓蠻夷戎狄其不賔也久矣中國所不能用也王卒使傳之問於申叔時叔時曰教之春秋而為之聳善而抑惡焉以戒勸其心教之世而為之昭明德而廢幽昏焉以怵懼其動教之詩而為之導廣顯以耀明其志教之禮使知上下之則教之樂以疏其穢而鎮其浮教之令使訪物官教之語使明其德而知先王之務用明德於民也教之故志使知廢興者而戒懼焉教之訓典使知族類行比義焉若是而不從動而不悛則文詠物以行之求賢良以翼之悛而不攝則身勤之多訓典刑以納之務慎惇篤以固之攝而不徹則明施舍以導之忠明久長以導之信明度量以導之義明等級以導之禮明恭儉以導之孝明敬戒以導之事明慈愛以導之仁明昭利以導之文明除害以導之武明精意以導之罰明正德以導之賞明齊肅以耀之臨若是而不濟不可為也且夫誦詩以輔相之威儀以先後之體貌以左右之明行以宣翼之制節義以動行之恭敬以臨監之勤勉以勸之孝順以納之忠信以發之德音以揚之教備而不從者非人也其可興乎夫子踐位則退自退則敬否則赧莊王十五年陳夏徴舒弒其君靈公王使人謂陳曰無動豫將有討於少西氏明年楚入陳殺夏徴舒轘諸栗門因縣陳申叔時使於齊反復命而退王使讓之曰夏徴舒為不道弒其君寡人討而戮之諸侯縣公皆慶寡人女獨不慶寡人何故對曰猶可辭乎王曰可哉曰夏徴舒弒其君其罪大矣討而戮之君之義也抑人有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重也諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎對曰可哉吾儕小人所謂取諸其懷而與之也乃復封陳鄉取一人焉以歸謂之夏州十九年莊王伐宋踰年宋人未服楚師將歸申叔時僕曰築室反耕者宋必聽命從之宋人懼使華元夜入楚師以病告遂與之平共王十五年將北侵鄭衛子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有申叔時老矣在申聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎既侵鄭鄭人不服明年王自武城使公子成以汝陰之田求成于鄭鄭叛晉晉侯伐鄭楚師救之子反將中軍子重將左子辛將右過申子反入見申叔時曰師其何如對曰德刑詳義禮信戰之器也德以施惠刑以正邪詳以事神義以建利禮以順時信以守物民生厚而德正用利而事節時順而物成上下和睦周旋不逆求無不具各知其極故詩曰立我蒸民莫匪爾極是以神降之福時無災害民生敦龎和同以聽莫不盡力以從上命致死以補其闕此戰之所由克也今楚內棄其民而外絶其好瀆齊盟而食話言姦時以動而疲民以逞民不知信進退罪也人恤所底其誰致死子其勉之吾不復見子矣遂戰于鄢陵楚師敗績子反死之伯州犂晉伯宗之子也伯宗之難伯州犂來奔共王以為太宰共王十六年晉楚戰于鄢陵王登巢車以望晉師令尹子重使伯州犂侍于王後王曰騁而左右何也曰召軍吏也皆聚於中軍矣曰合謀也張幕矣曰虔卜於先君也徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而為行也皆乘矣左右執兵而下矣曰聽誓也戰乎曰未可知也乘而左右皆下矣曰戰禱也伯州犂以公卒告王時楚之亡臣苖賁皇在晉厲公之側亦以王卒告公既而合戰楚師敗績康王十三年楚及秦人侵鄭至于城麋鄭皇頡戍之出與楚師戰敗為穿封戍所囚公子圍與之爭正於伯州犂伯州犂曰請問於囚乃立囚伯州犂曰所爭君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戍方城外之縣尹也誰獲子囚曰頡遇王子弱焉楚人以皇頡歸十四年宋向戌欲弭兵合晉楚及諸侯之大夫盟于宋令尹子木𠂻甲伯州犂曰合諸侯以為信無乃不可乎夫諸侯望信於楚是以來服若不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已茍得志焉用信太宰退告人曰令尹將死矣不及三年求逞志而棄信志將逞乎志以發言言以出信信以立志參以定之信亡何以及三明年而子木死郟敖四年公子圍聘于鄭且聚於公孫假氏既聘將以衆逆子産患之使行人請墠以聽命圍使太宰對曰君辱貺寡大夫圍謂圍將使豐氏撫而有室圍布几筵告于莊共之廟而來若野賜之是委君貺於草莾也是寡大夫不得列於諸卿也不寧唯是又使圍蒙其先君將不得為寡君老其蔑以復矣唯大夫圖之子産猶有辭圍知其有備垂櫜而入入逆而出遂會于虢設服離衛鄭人謂其似君也太宰曰此行也辭而假之寡君行人揮曰假不反矣太宰曰子姑憂子晢之欲背誕也及圍將行大事忌太宰使與公子黑肱城犫櫟及郟圍遂弒郟敖自立是為靈王使殺伯州犂于郟云沈尹戍莊王曽孫也為左司馬平王六年楚城州來沈尹戍曰楚人必敗昔吳滅州來子旗請伐之王曰吾未撫吾民今亦如之而城州來以挑吳能無敗乎侍者曰王施舍不倦息民五年可謂撫之矣戍曰吾聞撫民者節用於內而樹德於外民樂其性而無冦讎今宫室無量民人日駭勞罷轉死忘寢與食非撫之也囊瓦為令尹城郢沈尹戍曰子常必亡郢茍不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四竟慎其四竟結其四援民狎其野三務成功民無內憂而又無外懼國焉用城今吳是懼而城於郢守已卑矣卑之不獲能無亡乎昔梁伯溝其公宫而民潰民棄其上不亡何待夫正其疆場修其土田險其走集親其民人明其伍候信其鄰國慎其官守守其交禮不僭不貪不懦不耆完其守備以待不虞又何畏矣詩曰無念爾祖聿修厥德無亦監乎若敖蚡冒至于武文土不過同慎其四竟猶不城郢今土數圻而郢是城不亦難乎平王為舟師以略吳疆沈尹戌曰此行也楚必亡邑不撫民而勞之吳不動而速之吳踵楚而疆場無備邑能無亡乎越大夫胥犴勞王於豫章之汭越公子倉歸王乘舟倉及壽夢帥師從王王及圉陽而還吳人踵楚而邉人不備遂滅巢及鍾離而還沈尹戍曰亡郢之始其兆在於此矣王一動而亡二姓之師幾如是而不及郢詩曰誰生厲階至今為梗其王之謂乎昭王元年費無極鄢將師謀譖郤宛而殺之子常信之遂及陽令終與晉陳皆盡滅其族黨國人多謗於子常沈尹戍言於令尹曰夫左尹與中廄尹莫知其罪而殺之以興謗讟至于今不已戍也惑之仁者殺人以掩謗猶弗為也今吾子殺人以興謗而弗圖不亦異乎夫無極楚之讒人也民莫不知去朝吳出蔡侯朱喪太子建殺連尹奢屏王之耳目使不聰明不然平王之溫惠共儉有過成莊無不及焉所以不獲諸侯邇無極也今又殺三不辜以興大謗幾及子矣子而不早圖將焉用之夫鄢將師矯子命以滅三族國之良也而不愆位吳新有君疆場日駭楚國若有大事子其危哉知者除讒以自安也今子愛讒以自危也甚矣其惑也子常曰是瓦之罪也敢不良圖於是子常殺費無極與鄢將師盡滅其族以説于國謗言乃止十年蔡侯吳子唐侯來伐舍舟于淮汭自豫章與楚夾漢左司馬戌謂子常曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥厄子濟漢而伐之我自後擊之必大敗之既謀而行武城黑謂子常曰吳用木我用革不可久也不如速戰史皇謂子常曰楚人惡子而好司馬若司馬毁吳舟于淮塞城口而入是獨克吳也子必速戰不然不免子常從之既戰楚師亂吳師大敗之子常奔鄭左司馬戍及息聞楚敗而還敗吳師于雍澨傷初司馬臣闔廬故耻為禽焉謂其臣曰誰能免吾首吳句卑曰臣賤可乎司馬曰我實失子可哉三戰皆傷曰吾不可用也已句卑布裳剄而裹之藏其身而以其首免其子曰沈諸梁嗣公孫歸生號聲子字子家大師子朝之子也初伍參與子朝友其子伍舉與聲子相善伍舉娶於公子牟公子牟為申公而亡楚人曰伍舉實送之伍舉奔鄭將遂奔晉聲子如晉遇之於鄭郊班荆相與食而言復故聲子曰子行也吾必復子及宋向戌將平晉楚聲子通使於晉還如楚令尹子木與之語問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也雖楚有材晉實用之子木曰夫獨無族姻乎曰雖有而用楚材實多歸生聞之善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人若不幸而過寧僭無濫與其失善寧其利淫無善人則國從之詩曰人之云亡邦國殄瘁無善人之謂也故夏書曰與其殺不辜寧失不經懼其失善也商頌有之曰不僭不濫不敢怠皇命于下國封建厥福此湯所以獲天福也古之治民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜此以知其勸賞也將刑為之不舉不舉則徹樂此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮無敗今楚多淫刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也子儀之亂析公奔晉晉人置諸戎車之殿以為謀主繞角之役晉將遁矣析公曰楚師輕窕昜震蕩也若多鼓鈞聲以夜軍之楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師於桑遂獲申麗而還鄭於是不敢南面楚失華夏則析公之為也雍子之父兄譖雍子君與大夫不善是也雍子奔晉晉人與之鄐以為謀主彭城之役晉楚遇於靡角之谷晉將遁矣雍子發命於軍曰歸老幼反孤疾二人役歸一人簡兵搜乘秣馬蓐食陳師焚次明日將戰行歸者而逸楚囚楚師宵潰晉降彭城而歸諸宋以魚石歸楚失東夷子辛死之則雍子之為也子反與子靈爭夏姬而雍害其事子靈奔晉晉人與之邢以為謀主扞禦北狄通吳於晉教吳叛楚教之乘車射馭驅侵使其子狐庸為吳行人焉吳於是伐巢取駕克棘入州來楚罷於奔命至今為患則子靈之為也若敖之亂伯棼之子賁皇奔晉晉人與之苖以為謀主鄢陵之役楚晨壓晉軍而陳晉將遁矣苖賁皇曰楚師之良在其中軍王族而已若塞井夷竈成陳以當之欒范易行以誘之中行二郤必克二穆吾乃四萃於王族必大敗之晉人從之楚師大敗王夷師熸子反死之鄭叛吳興楚失諸侯則苖賁皇之為也子木曰是皆然矣聲子曰今又甚於此椒舉娶於申公子牟子牟得戻而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庶幾赦余亦弗圖也今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼請諸王益其爵祿而歸之伍舉者伍參之子也其先食采於椒亦曰椒舉參嬖於莊王莊王之圍鄭也晉師救之王聞晉師既濟河欲還參欲戰令尹孫叔敖弗欲曰昔歲入陳今兹入鄭不為無事矣戰而不捷參之肉其足食乎參曰若事之捷孫叔為無謀矣不捷參之肉將在晉軍可得食乎令尹南轅反斾伍參言於王曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲聽而無上衆誰適從此行也晉師必敗且君而逃臣若社稷何王病之告令尹改乘轅而北之戰于邲晉師敗績參死伍舉以公子牟故奔晉以聲子力得復於楚郟敖四年令尹公子圍將聘于鄭伍舉為介未出竟聞王有疾而還伍舉遂聘公子圍至入問王疾縊而弒之使赴于鄭伍舉問應為後之辭焉對曰寡大夫圍伍舉更之曰共王之子圍為長公子圍既立是為靈王三年使椒舉使晉求諸侯椒舉致命曰寡君使舉曰日君有惠賜盟于宋曰晉楚之從交相見也以歲之不易寡人願結歡於二三君使舉請間君若茍無四方之虞則願假寵以請於諸侯晉侯許之諸侯皆許是年晉楚合諸侯於申椒舉言於王曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣霸之濟否在此會也夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之搜康有鄷宮之朝穆有塗山之會齊桓有召陵之師晉文有踐土之盟君其何用宋向戌鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞獻公合諸侯之禮六子産曰小國共職敢不薦守獻伯子男會公之禮六王使椒舉侍於後以規過卒事不規王問其故對曰禮吾所未見者有六焉又何以規宋太子佐後至王田於武城久而弗見椒舉請辭焉王使往曰屬有宗祧之事於武城寡君將墮幣焉敢謝後見楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也諸侯所由用命也夏桀為有仍之會有緍叛之商紂為黎陽之搜東夷叛之周幽為太室之盟戎狄叛之皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽靈王以諸侯伐吳克之執齊慶封而盡滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封惟逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽負之斧鉞以徇於諸侯使言曰無或如齊慶封弒其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弒其君兄之子麇而代之以盟諸侯王使速殺之遂以諸侯滅賴賴子靣縳銜璧士袒輿櫬從之造於中軍王問諸椒舉對曰成王克許許僖公如是王親釋其縳受其璧焚其櫬王從之遷賴於鄢薳啓強與楚同姓薳與蒍同靈王即位殺伯州犂使啓強為太宰靈王四年晉韓宣子來送女叔向為介王朝其大夫曰晉吾仇敵也茍得志焉無恤其他今其來者上卿上大夫也若吾以韓起為閽以羊舌肸為司宮足以辱晉吾亦得志矣可乎大夫莫對薳啓強曰可茍有其備何故不可耻匹夫不可以無備况耻國乎是以聖王務行禮不求耻人朝聘有圭享眺有璋小有述職大有巡功設機而不倚爵盈而不飲宴有好貨飱有陪鼎入有郊勞出有贈賄禮之至也國家之敗失之道也則禍亂興城濮之役晉無楚備以敗於邲邲之役楚無晉備以敗於鄢自鄢以來晉不失備而加之以禮重之以睦是以楚弗能報而求親焉既獲姻親又求耻之以召冦讎備之若何誰其重此若有其人耻之可也若其未有君亦圖之晉之事君臣曰可矣求諸侯而麇至求昏而薦女君親送之上卿及上大夫致之猶欲耻之君其亦有備矣不然奈何韓起之下趙成中行吳魏舒范鞅知盈羊舌肸之下祁午張躍籍談女齊梁丙張骼輔躒苖賁皇皆諸侯之選也韓襄為公族大夫韓須受命而使矣箕襄邢帶叔禽叔椒子羽皆大家也韓賦七邑皆成縣也羊舌四族皆強家也晉人若喪韓起楊肸五卿八大夫輔韓須楊石因其十家九縣長轂九百其餘四十縣遺守四千奮其武怒以報其大耻伯華謀之中行伯魏舒帥之其蔑不濟矣君將以親昜怨實無禮以速冦而未有其備使羣臣往遺之禽以逞君心何不可之有王曰不穀之過也大夫無辱厚為二子禮而歸之六年靈王成章華之臺願與諸侯落之薳啓強曰臣能得魯侯王使召之辭曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國鎮撫其社稷以輯寧爾民嬰齊受命于蜀奉承以來弗敢失隕而致諸宗祧曰我先君共王引領北望日月以冀傳序相授於今四王矣嘉惠未至唯襄公之辱臨我喪孤與其二三臣悼心失圖社稷之不皇況能懷思君德今君若步玉趾辱見寡君寵靈楚國以信蜀之役致君之嘉惠是寡君既受貺矣何蜀之敢望其先君鬼神實嘉賴之豈惟寡君君若不來使臣請問行期寡君將承質幣而見于蜀以請先君之貺魯侯從之靈王享魯侯于新臺使長􅀈者相好以大屈既而悔之薳啓強聞之見魯侯魯侯語之拜賀魯侯問其故對曰齊與晉越欲此久矣寡君無適與也而傳之君君其備禦三鄰慎守寶矣敢不賀乎魯侯懼而反之申無宇仕楚為芉尹故曰芈尹無宇靈王立會諸侯于申遂滅賴遷賴於鄢既又欲遷許於賴城之而還申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎民之不處其誰堪乎不堪王命乃禍亂也初靈王之為令尹也為王旌以田芉尹無宇斷之曰一國兩君其誰堪之及即位為章華之宫納亡人以實之無宇之閽入焉無宇執之有司弗與曰執人於王宮其罪大矣執而謁諸王王將飲酒無宇辭曰天子經略諸侯正封古之制也封略之內何非君土食土之毛誰非君臣故詩曰普天之下莫非王土率土之濵莫非王臣天有十日人有十等下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事今有司曰女胡執人於王宮將焉執之周文王之法曰有亡荒閲所以得天下也吾先君文王作僕區之法曰盜所隱器與盜同罪所以封汝也若從有司是無所執逃臣也逃而舍之是無陪臺也王事無乃闕乎昔武王數紂之罪以告諸侯曰紂為天下逋逃主萃淵藪故夫致死焉君王始求諸侯而則紂無乃不可乎若以二文之法取之盜有所在矣王曰取而臣以往盜有寵未可得也遂赦之十年靈王滅蔡用隱太子于岡山申無宇曰不祥五牲不相為用况用諸侯乎王必悔之王城陳蔡不羔使公子棄疾為蔡公問於申無宇曰棄疾在蔡何如對曰擇子莫如父擇臣莫如君鄭莊公城櫟而置子元焉使昭公不立齊桓公城穀而置管仲焉至于今賴之臣聞五大不在邉五細不在庭親不在外羈不在內今棄疾在外鄭丹在內君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯宋蕭亳實殺子遊齊渠邱實殺無知衛蒲戚實出獻公若由是觀之則害於國末大必折尾大必掉君所知也後陳蔡作亂竟如其言焉申無宇之子曰申亥靈王乾溪之難也王沿夏將入于鄢申亥曰吾父再姦王命王弗誅惠孰大焉君不可忍惠不可棄吾其從王乃求王遇諸棘闈以歸王縊于芉尹申亥氏申亥以其二女殉而葬之然丹字子革鄭大夫子然之子也康王六年鄭子孔之亂子革奔楚楚以為右尹靈王十一年狩于州來次于潁尾使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳楚子次于乾溪以為之援雨雪王皮冠秦復陶翠被豹舄執鞭以出僕析父從右尹子革夕王見之去冠被舍鞭與之語曰昔我先王熊繹與呂伋王孫牟燮父禽父並事康王四國皆有分我獨無有今吾使人於周求鼎以為分王其與我乎對曰與君王哉昔我先王熊繹辟在荆山篳路藍縷以處草莾跋涉山林以事天子唯是桃弧棘矢以共禦王事齊王舅也晉及魯衛王母弟也楚是以無分而彼皆有今周與四國服事君王將唯命是從豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅今鄭人貪賴其田而不我與我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田王曰昔諸侯遠我而畏晉今我大城陳蔡不羔賦皆千乘子與有勞焉諸侯其畏我乎對曰畏君王哉是四國者專足畏也又加之以楚敢不畏君王哉工尹路請曰君王命剝圭以為鏚祕敢請命王入視之析父謂子革吾子楚國之望也今與王言如響國其若之何子革曰摩厲以須王出吾刃將斬矣王出復語左史倚相趨過王曰是良史也子善視之是能讀三墳五典八索九邱對曰臣嘗問焉昔穆王欲肆其心周行天下將皆必有車轍馬迹焉祭公謀父作祈招之詩以止王心王是以獲沒於祗宮臣問其詩而不知也若問遠焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭德音思我王度式如玉式如金形民之力而無醉飽之心王揖而入饋不食寢不寐數日不能自克以及於難乾溪之難既逼子革曰請待于郊以聽國人王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聽大國之圖君也王曰大福不再祗取辱焉然丹乃歸于楚平王立使然丹簡上國之兵於宗邱且撫其民分貧拯窮長孤幼養老疾收介特救災患宥孤寡赦罪戾詰姦慝舉淹滯禮新敘舊祿勳合親任良物官使屈罷簡東國之兵於召陵亦如之好於邉疆息民五年而後用師子革之謀也及平王聞蠻氏之亂使然丹誘戎蠻子嘉殺之遂取蠻氏既而請立其子楚子從之公子貞字子囊莊王之子也共王之二十三年代公子壬夫為令尹是歲子囊伐陳諸侯救之乃止二十五年又圍陳諸侯復會于鄭以救之秋伐鄭討其侵蔡也鄭請從乃止及鄭平二十七年秦景公使士雅來乞師將以伐晉共王許之子囊曰不可當今吾不能與晉爭晉君類能而使之舉不失選官不昜方其卿讓於善其大夫不失守其士競於教其庶人力於農穡商工皂𨽻不知遷業韓厥老矣知罃稟焉以為政范丐少於中行偃而上之使佐中軍韓起少於欒黶而欒黶士魴上之使佐上軍魏絳多功以趙武為賢而為之佐君明臣忠上讓下競當是時也晉不可敵事之而後可君其圖之王曰吾既許之矣雖不及晉必將出師於是子囊師于武城以為秦援秦人侵晉晉以鄭之服楚也謀欲逼鄭故城虎牢而戍之子囊救鄭晉人以諸侯之師還鄭而南至於陽陵楚師不退及晉班師子囊乃還子囊乞旅于秦秦右大夫詹帥師從楚師將以伐鄭鄭伯逆之移師伐宋諸侯悉師以伐鄭鄭人使良霄石􅎢來告將服于晉子囊使執之明年子囊及秦庶長無地伐宋師于楊梁以報晉之取鄭也共王疾告大夫曰不穀不德少主社稷生十年而喪先君未及習師保之教訓而應受多福是以不德而亡師于鄢以辱社稷為大夫憂其𢎞多矣若以大夫之靈獲保首領以殁於地唯是春秋窀穸之事所以從先君於禰廟者請為靈若厲大夫擇焉莫對及五命乃許秋王卒子囊謀諡大夫曰君有命矣子囊曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請諡之共大夫從之鄭良霄及石􅎢猶在楚石􅎢言於子囊曰先王卜征五年而歲習其祥祥習則行不習則增修德而改卜今楚實不競行人何罪止鄭一卿以除其逼使睦而疾楚以固於晉焉用之使歸而廢其使怨其君以疾其大夫使相牽引也不猶愈乎子囊歸之吳聞楚喪以侵楚康王惡之使子囊師于棠以伐吳吳不出而還子囊殿以吳為不能而弗警吳人自臯舟之隘要而擊之楚人不能相救吳人敗之子囊至自伐吳卒將死遺言謂子庚必城郢君子謂子囊忠君薨不忘增其名將死不忘衛社稷可不謂忠乎忠民之望也詩曰行歸于周萬民所望忠也薳子馮孫叔敖之子也康王二年令尹子囊卒公子午為令尹子馮為大司馬及公子午卒王使子馮為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑闕地下氷而牀焉重繭衣裘鮮食而寢康王使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹觀起有寵於子南未益祿而有馬數十乘楚人患之王將討焉子南之子棄疾為王御事王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之泄命重刑臣亦不為也王遂殺子南於朝轘觀起於四竟子南之臣謂棄疾曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讐吾弗忍也遂縊而死復使子馮為令尹子馮既相楚有寵於子馮者八人皆無祿而多馬他日朝與申叔豫言弗應而退從之入於人中又從之遂歸退朝見之曰子三困我於朝吾懼不敢不見吾過子姑告我何疾我也對曰吾不免是懼何敢告子曰何故對曰昔觀起有寵於子南子南得罪觀起車裂何故不懼自御而歸不能當道至謂八人者曰吾見申叔夫子所謂生死而骨肉也知我者如夫子則可不然請止辭八人者而後王安之十一年楚子為舟師以伐吳吳怨楚而召舒鳩人舒鳩人叛楚楚子師于荒浦使沈尹壽與師祁犂讓之舒鳩子敬逆二子而告無之且請受盟二子復命王欲伐之子馮曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒而不二吾又何求若猶叛我無辭有庸乃還明年子馮卒舒鳩人卒叛楚師滅之屈建字子木楚之公族也其先屈瑕食采於屈因以命氏世為莫敖建之父曰屈到屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之老曰夫子屬之屈建曰不然夫子承楚國之政其法刑在民心而藏在王府上之可以庇先王下之可以訓後世雖微楚國諸侯莫不譽其祭典有之曰國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦籩豆脯醢則上下供之不羞珍異不陳庶侈夫子不以其私欲干國之典遂不用康王九年屈建為莫敖十二年代薳子馮為令尹舒鳩人叛楚令尹子木伐之及離城吳人救之子木遽以右師先子強息桓子捷子駢子孟帥左師以退吳人居其間七日子強曰久將墊隘隘乃禽也不如速戰請以其私卒誘之簡師陳以待我我克則進奔則亦視之乃可以免不然必為吳禽從之五人以其私卒先擊吳師吳師奔登山以望見楚師不繼復逐之傳諸其軍簡師會之吳師大敗遂圍舒鳩舒鳩潰八月楚滅舒鳩子馮之子薳掩為大司馬子木使庀賦數甲兵於是薳掩書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰臯井衍沃量入修賦賦車籍馬賦車兵徒卒甲楯之數既成以授子木楚是以興楚子以滅舒鳩賞子木辭曰向也將伐舒鳩蒍子馮請退師以須其叛今叛而獲之蒍子之功也以與蒍掩十四年與晉趙武會諸侯于宋將以弭兵也子木𠂻甲欲以害晉而不能宋人兼享晉楚大夫子木與趙孟言不能對使叔向傳言焉子木亦不能對既盟子木問於趙孟曰范武子之德何如對曰夫子之家事治言於晉國無隱情其祝史陳信於鬼神無愧辭子木歸以語王曰尚矣哉能歆神人宜其光輔五君以為盟主也子木又語王曰宜晉之霸也有叔向以佐其卿楚蔑以當之未可與競也明年子木卒趙孟喪之如同盟焉於是王子圍為令尹囊瓦字子常子囊之孫也以王父字為氏平王之十年代陽丐為令尹平王卒子常欲立其庶長子公子申公子申怒其歸惡名於已也欲殺之子常懼乃立昭王語具子西傳中昭王之元年吳王僚因楚喪故使公子掩餘公子燭庸帥師圍潛王使莠尹然工尹麇帥師救潛左司馬戍帥都君子與王馬之屬以濟師子常以舟師及沙汭而還左尹郤宛工尹壽帥師至于潛吳師不能退吳公子光乘二公子兵之在外也國無備伏甲而謁王僚使勇士鱄諸刺殺之而自立是為王闔廬於是掩餘奔徐燭庸奔鍾吾楚師聞吳亂亦還郤宛直而和國人説之鄢將師為右領與費無極比而惡之子常賄而信讒無極讒郤宛焉謂子常曰子惡欲飲子酒子惡郤宛又謂子惡令尹欲飲酒於子氏子惡曰我賤人也不足以辱令尹令尹將必來辱為惠已甚吾無以酬之若何無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰置諸門令尹至必觀之而從以酬之及饗日帷諸門左無極謂令尹曰吾幾禍子子惡將為子不利甲在門矣子必無往且救潛之役也吳可以得志子惡取賂焉而還又誤羣帥使退其師曰乘亂不祥吳乘我喪我乘其亂不亦可乎令尹使視郤氏則信有甲焉不往召鄢將師而告之將師退遂令攻郤氏且爇之子惡聞之遂自殺也國人弗爇令曰不爇郤氏與之同罪或取一編菅焉或取一秉秆焉國人投之遂弗爇也令尹炮之盡滅郤氏之族黨殺陽令終與其弟完及他與晉陳及其子弟晉陳之族呼於國曰鄢氏費氏自以為王專禍楚國弱寡王室蒙王與令尹以自利也令尹盡信之矣國將如何楚人謗令尹子常病之沈尹戍告子常子常殺無極與將師盡滅其族以説國人謗乃止語在沈尹戍傳八年蔡昭侯來朝為兩佩與兩裘獻一佩一裘於王王服以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公來朝有肅爽馬子常欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯竊馬者自拘於司敗曰君以弄馬之故隱君身棄國家羣臣請相夫人以償馬必如之唐侯曰寡人之過也二三子無辱皆賞之蔡人聞之固請而獻佩于子常子常朝見蔡侯之徒命有司曰蔡君之久也官不共也明日禮不畢將死蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川蔡侯如晉以其子元與其大夫之子為質焉而請伐楚初伍奢之子員為吳行人以謀楚及子常殺郤宛伯氏之族皆出伯州犂之子嚭奔吳吳以為太宰復為楚讐以故楚自昭王以來無歲不有吳師蔡侯因之以其子乾與大夫之子為質於吳十年蔡侯吳子唐侯伐楚舍舟于淮汭自豫章與楚夾漢左司馬戍謂令尹曰子沿漢而與之上下遮吳師使勿渡我以方城外人毁吳所舍舟直塞城口而入吾與子先後擊之蔑不克矣子常從之既而惑於史皇之言懼其功之獨出於司馬也乃濟漢而陳自小别至于大别三戰子常知不可欲奔史皇曰安求其事難而逃之將何所入子必死之初罪必盡説於是二師陳于柏舉吳王闔廬之弟夫槩王晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師大亂吳師大敗之子常奔鄭史皇以其乘廣死吳從楚師及清發楚師半濟吳又敗之楚人為食吳人及之奔食而從之敗諸雍澨五戰及郢左司馬戍死之昭王出奔入于雲中遂奔鄖鄖公以王奔隨吳師及隨求王於隨隨人不與僅而免焉沈諸梁字子髙沈尹戌之子也為葉公故稱葉公諸梁初太子建之見殺於鄭也其子勝在吳令尹子西欲召之子髙聞之見子西曰聞子召王孫勝信乎曰然子髙曰將焉用之曰吾聞之勝直而剛欲置之境子髙曰不可其為人也展而不信愛而不仁詐而不智毅而不勇直而不𠂻周而不淑復言而不謀身展也愛而不謀長不仁也以謀蓋人詐也強忍犯義毅也直而不顧不𠂻也周言棄德不淑也是六德者皆有其華而不實者也將焉用之彼其父為戮於楚其心又狷而不潔若其狷也不忘舊怨而不以潔悛德思報怨而已則其愛也足以得人其展也足以復之其詐也足以謀之其直也足以帥之其不潔也足以行之而加之以不仁奉之以不義蔑不克矣夫造勝之怨者皆不在矣若來而無寵速其怒也若其寵之毅貪無厭既能得入而耀之以大利不仁以長之思舊怨以修其心茍國有釁必不居矣非子職之其誰乎彼將理舊怨而欲大寵動而得人怨而有術若果用之害可待也余愛子與司馬故不敢不言子西曰德其忘怨余善之夫乃其寧子髙曰不然吾聞之唯仁者可好也可惡也可髙也可下也好之不逼惡之不怨髙之不驕下之不懼不仁者則不然人好之則逼惡之則怨髙之則驕下之則懼驕有欲焉懼有惡焉欲惡怨逼所以生詐謀也子將若何若召而下之將戚而懼為之上者將怒而怨詐謀之心無所靖矣有一不義猶敗國家今一五六而必欲用之不亦難乎吾聞國家將敗必用姦人而嗜其疾味其子之謂乎夫誰無疾眚能者早除之舊怨滅宗國之疾眚也為之關籥藩籬而逺備閉之猶恐其至也是之為日惕若召而近之死無日矣人有言曰狼子野心怨賊之人也其又何善乎若子不我信盍求若敖氏與子干子晢之族而近之安用勝也其能幾何昔齊騶馬繻以胡公入於具水邴歜閻職戕懿公於囿竹晉長魚矯殺三郤於榭魯圉人犖殺子般於次夫是誰之故也非唯舊怨乎是皆子之所聞也人求多聞善敗以監戒也今子聞而棄之猶蒙耳也吾語子何益吾知逃也己子西笑曰子之尚勝也竟召之使處吳境為白公勝居白有異圖謂其徒石乞曰王與二卿士子西子期皆五百人當之則可矣乞曰不可得也曰市南有熊宜僚者若得之可以當五百人矣乃從白公而見之與之言説告之故辭承之以劒不動勝曰不為利諂不為威愓不泄人言以求媚者去之惠王十年吳人伐慎白公敗之請以戰備獻許之遂作亂秋七月殺子西子期于朝而劫惠王子西以𬒮掩面而死曰吾慙葉公也子期曰昔者吾以力事君不可以弗終抉豫章以殺人而後死石乞曰焚庫弒王不然不濟白公曰不可殺王不祥焚庫無聚將何以守矣乞曰有楚國而治其民以敬事神可以得祥且有聚矣何患弗從葉公在蔡方城之外皆曰可以入矣子髙曰吾聞之以險徼幸者其求無饜偏重必離聞其殺齊管修也而後入白公欲以子閭為王子閭不可遂劫以兵子閭曰王孫若安靖楚國匡正王室而後庇焉啓之願也敢不聽從若將專利以傾王室不顧楚國有死不能遂殺之而以王如髙府石乞尹門圉公陽穴宮負王以如昭夫人之宮葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盜賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰君胡胄國人望君如望歲焉日月以幾若見君面是得艾也民知不死其亦夫有奮心猶將旌君以徇諸國而又掩面以絶民望不亦甚乎乃免胄而進遇針尹固帥其屬將與白公子髙曰微二子者楚不國矣棄德從賊其可保乎乃從葉公使與國人以攻白公白公奔山而縊其徒微之生拘石乞而問白公之死焉對曰余知其死所而長者使余勿言曰不言將亨乞曰此事克則為卿不克則亨固其所也何害乃亨石乞諸梁兼二事令尹司馬國寧乃使子西之子寧為令尹使子期之子寬為司馬而老於葉初吳之入楚也子髙之母與其弟后臧見俘於吳后臧不待而歸子髙終身不正視之云公子申字子西平王之庶長子也平王薨令尹子常欲立子西曰太子壬弱其母非適也王子建實聘之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也國有外援不可瀆也王有適嗣不可亂也敗親速讐亂嗣不祥我受其名賂吾以天下滋不從也楚國何為必殺令尹令尹懼乃立昭王初吳王闔廬之弒王僚也公子掩餘出奔徐公子燭庸奔鍾吾昭王四年吳王使徐人執掩餘鍾吾人執燭庸二公子於是來奔昭王大封而定其徙使監馬尹大心送吳公子使居養莠尹然左司馬沈尹戌城之取於城父與胡田以與之將以害吳也子西諌曰吳光新得國而親其民視民如子辛苦同之將用之也若好吳邉疆使柔服焉猶懼其至吾又強其讐以重怒之無乃不可乎吳周之胄裔也而棄在海濵不與姬通今而始大比於諸華光又甚文將自同於先王不知天將以為虐乎使翦喪吳國而封大異姓乎其抑亦將卒以祚吳乎其終不逺矣我盍姑億吾神鬼而寧吾族姓以待其歸將焉用自播揚焉王弗聽已而吳子執鍾吾子遂伐徐防山以水之徐子失國來奔吳謀伐楚楚於是乎始病十年吳師伐楚戰于柏舉楚師大敗五戰及郢昭王涉睢濟江入于雲中王寢盜攻之以戈擊王王孫由于以背受之中肩王奔鄖由于徐蘇而從王遂奔隨子西收聚散卒以敗吳師于軍祥會秦救亦至吳師再敗吳王乃歸明年昭王入于郢王之奔隨也子西為王輿服以保路國于脾泄聞王所在而後從王王使由于城麇復命子西問髙厚弗知子西曰不能如辭城不知髙厚小大何知對曰固辭不能子使余也人各有能有不能王遇盜於雲中余受其戈其所猶在袒而示之背曰此余所能脾泄之事余弗能也子西謝之昭王既反國以子西為令尹子期為司馬王謂子西曰方余奔隨時將涉於臼藍尹亹涉其孥不畀余舟必殺之子西對曰子常惟思舊怨以敗君何效焉王曰善使復其所以志前惡是歲吳太子終纍敗楚舟師獲潘子臣小惟子及大夫七人楚國大惕懼亡子期又以陵師敗于繁陽子西喜曰乃今可為矣於是乎遷郢於鄀而改紀其政以定楚國二十二年吳師克越楚大夫又皆懼曰闔廬惟能用其民以敗我於柏舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患吳矣昔闔廬食不二味坐不重席室不崇壇器不彤鏤宮室不觀舟車不飾衣服財用擇不取費在國天有災癘親巡其孤寡而共其困乏在軍熟食者分而後敢食其所嘗者卒乘與焉勤恤其民而與之勞逸是以民不罷勞死知不曠吾先大夫子常易之所以敗我也今聞夫差次有臺榭陂池焉居有妃嬪嬙御焉一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讐而用之日新夫先自敗也已安能敗我二十七年吳伐陳昭王曰吾先君與陳有盟不可以不救乃救陳師于城父自春至秋卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄盟逃讐亦不如死死一也其死讐乎命公子申子西為王不可則命公子結子期亦不可則命公子啓子閭五辭而許之將戰王有疾方攻大冥王卒于城父子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也二順不可失也與子西子期謀潛師閉塗逆越女之子章而立之章立是為惠王惠王九年子西及子期伐吳及桐汭初平王太子建之見殺於鄭也其子勝在吳子西欲召之葉公諸梁曰吾聞勝也詐而亂無乃害乎子西曰吾聞勝也信而勇不為不利舍諸邊竟使衛藩焉葉公曰周仁之謂信率義之謂勇吾聞勝也好復言而求死士殆有私乎復言非信期死非勇也子必悔之弗從召之使處吳竟為白公十年勝請伐鄭子西曰楚未節也不然吾不忘也他日又請許之未起師晉人伐鄭楚救之與之盟勝怒曰鄭人在此讐不逺矣勝自厲劒子期之子平見之曰王孫何自厲也曰勝以直聞不告汝庸為直乎將以殺爾父平以告子西子西曰勝如卵余翼而長之楚國第我死令尹司馬非勝而誰勝聞之曰令尹之狂也得死乃非我子西不悛勝與其徒石乞作亂殺子西子期于朝吳延陵季子名札吳王壽夢之少子也壽夢子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢而壽夢欲立之季札讓不可於是乃立長而諸樊攝行事當國王諸樊既除喪以父讓位季札季札謝曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之以成曹君君子曰能守節矣君義嗣也誰敢干君有國非吾節也札雖不才願附子臧之義吳人固立季札季札棄其室而耕乃舍之及王諸樊卒有命授弟餘祭欲傳以次必致國於季札而止以稱先王壽夢之意且嘉季札之義兄弟皆欲致國令以漸至焉於是封季札於延陵故號曰延陵季子四年王使聘于魯見叔孫穆子説之曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子請觀周樂為歌周南召南曰美哉始基之矣猶未也然勤而不怨歌邶鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎歌王曰美哉思而不懼其周之東乎歌鄭曰其細已甚民不堪也是其先亡乎歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也歌豳曰美哉蕩蕩乎樂而不淫其周公之東乎歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也歌唐曰思深哉其有唐氏之遺風乎不然何憂之逺也非令德之後誰能如是歌陳曰國無主其能久乎自鄶已下無譏焉歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民也歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎歌頌曰至矣哉直而不倨曲而不詘近而不逼逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流吾聲和八音平節有度守有序盛德之所同也見舞象簫南籥者曰美哉猶有憾也見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也猶有慙德聖人之難也見舞大夏曰美哉勤而不德非禹其誰能及之見舞招簫曰德至矣哉大矣如天之無不燾也如地之無不載也雖甚盛德無以加矣觀止矣若有他樂吾不敢觀去魯遂使齊説晏平仲曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未得所歸難未息也故晏子因陳桓子以納政與邑是以免於欒髙之難去齊使於鄭見子産如舊交謂子産曰鄭之執政侈難將至矣政必及子子為政慎以禮不然鄭國將敗去鄭適衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晉將舍於宿聞鐘聲曰異哉吾聞之辨而不德必加於戮矣夫子獲罪於君以在此懼猶不足而又可以樂乎夫子之在此猶燕之巢于幕上君在殯而可以樂乎遂去之文子聞之終身不聽琴瑟適晉説趙文子韓宣子魏獻子曰晉國其萃於三家乎將去謂叔向曰吾子勉之君侈而多良大夫皆富政將在三家吾子直必思自免於難季札之初使北過於徐君徐君好季札劒口弗敢言季札心知之為使上國未獻還至徐徐君已死於是乃解其寶劒繫之徐君冡樹而去從者曰徐君已死尚誰與乎季子曰不然吾心已許之豈以死倍吾心哉十七年餘祭卒弟餘昧立四年王餘昧卒欲授弟季札季札讓逃去於是吳人曰先王有命兄卒弟代立必致季子季子今逃位則王餘昧後立今卒其子當代乃立王餘昧之子僚為王王諸樊之子公子光以為吾父所以兄弟相傳者欲致位於季子也季子即不受國吾當立乃隂求賢人欲以襲王僚使季札使於晉光使人弒王僚自立為王是為吳王闔廬季子至曰茍先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也復命哭墓復位而待至夫差王十一年楚子期伐陳吳使季子救陳季子謂子期曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民乃還初季子適齊反而喪其子葬於嬴博之間孔子曰延陵季子吳之知禮者也往觀之其坎深不至於泉其斂以時服既葬而封廣輪掩坎其髙可隱既封左袒右還且號者三曰骨肉歸復乎土命也若魂氣則無不之也無不之也而遂行孔子曰合於禮矣吳之先君髮文身祼以為飾至壽夢時雖稍近治猶未通於上國蓋殊俗也季子生蠻夷中行禮適義聞樂知政究觀人情深識國體非學而至蓋天性然也季子死年八十餘伍貟字子胥楚伍舉之孫而伍奢之子也奢有二子長曰尚貟其次也平王使伍奢為其太子建太傅又使費無極為少傅無極愛失於建平王使無極為太子取婦於秦秦女好無極馳報平王曰秦女絶美王可自取而為太子更求婦平王遂自取秦女絶愛幸之生子軫更為太子取婦無極既以秦女自媚於王因去太子而事王恐一旦平王卒而太子立殺己常讒惡太子建建時年十五矣其母蔡女也無寵於平王平王稍益疏建使建居城父守邊無極又日夜讒太子於王曰自無極入秦女太子亦不能無怨望願王少自備焉且太子居城父擅兵外交諸侯且欲入為亂矣平王召其傅伍奢責問之伍奢知無極讒太子乃對平王曰王獨奈何以讒賊小臣疏骨肉之恩乎無極曰今不制後悔也王遂囚伍奢而使城父司馬奮揚往殺太子奮揚使人先告太子使急去不然將誅太子奔宋無極曰伍奢有二子不殺之為楚國患盍以免其父召之必至於是王使謂奢能致二子則生不能將死奢曰尚至胥不至王曰何也奢曰尚之為人亷死節慈孝而仁聞召而免父必至不顧其死胥之為人智而好謀勇而矜功知來必死必不來然為楚國憂者必此子於是王使人召之曰來吾免爾父伍尚謂伍胥曰聞父免而莫奔不孝也父戮莫報無謀也度能任事智也子其行矣我其歸死伍尚遂歸伍胥彎弓屬矢出見使者曰父有罪何以召子為將射使者還走遂出奔聞太子建在宋往從之伍奢聞之曰胥已亡楚國其危哉楚人遂殺奢及尚伍胥既至宋宋有華氏之亂乃與太子建俱奔於鄭鄭人甚善之太子建又適晉晉頃公曰太子既善鄭鄭信太子太子能為我內應而我攻其外滅鄭必矣滅鄭而封太子太子乃還鄭事未會會自私欲殺其從者從者知其謀乃告之於鄭鄭定公與子産誅殺太子建建有子名勝伍胥懼乃與勝俱奔吳至昭關昭關欲執之伍胥遂與勝獨身步走幾不得脫追者在後至江江上有一漁父乘船知伍胥之急乃渡伍胥伍胥既渡解其劒曰此劒乃直百金今以與父父曰楚國之法得伍胥者賜粟五萬石爵執圭豈徒百金邪不受伍胥未至吳而疾止中道乞食至於吳吳王僚方用事公子光為將伍胥乃因公子光以求見吳王久之楚平王以其邊邑鍾離與吳邊邑卑梁氏俱蠶兩女子爭桑相攻乃大怒至於兩國舉兵相伐吳使公子光伐楚拔其鍾離居巢而還伍子胥説吳王僚曰楚可破也願復遣公子光公子光謂吳王曰彼伍胥父兄為戮於楚而勸王伐楚者亦以自報其讐耳伐楚未可破也伍胥知公子光有內志欲殺王而自立未可説以外事乃進專諸於公子光退而與太子建之子勝耕於野五年而楚平王卒初平王所奪太子建秦女生子軫及平王卒軫竟立為後是為昭王吳王僚因楚喪使二公子將兵往襲楚楚發兵絶吳兵之後不得歸吳國內空公子光乃令專諸襲刺吳王僚而自立是為吳王闔廬闔廬既立得志乃召伍貟以為行人而與謀國事楚誅其大臣郤宛伯氏皆出伯州犂之孫伯嚭亡奔吳吳亦以嚭為大夫前王僚所遣二公子將兵伐楚者道絶不得歸後闔廬弒王僚自立遂以其兵降楚楚封之於舒闔廬立三年乃興師與伍胥伯嚭伐楚拔舒遂禽故吳反二將軍因欲至郢將軍孫武曰民勞未可且待之乃歸四年吳伐楚取六與灊五年伐越敗之六年楚昭王使公子囊瓦將兵伐吳吳使伍胥迎擊大破楚軍於豫章取楚之居巢九年吳王闔廬謂子胥孫武曰始子言郢未可入今果何如二子對曰楚將囊瓦貪而唐蔡皆怨之王必欲大伐之必先得唐蔡乃可闔廬聽之悉興師與唐蔡伐楚與楚夾漢水而陳吳王之弟夫槩王將兵從王及戰夫槩王以其屬五千人先擊子常子常敗走奔鄭於是吳乘勝而前五戰遂至郢楚昭王出亡入雲夢盜擊王王走鄖鄖公辛之弟懷曰此其父實殺吾父吾殺其子可也鄖公恐其弟殺王與王奔隨吳兵從之謂隨人曰周之子孫在漢川者楚實盡之天誘其𠂻致罰於楚而君又竄之周室何罪君若惠報周室施及寡人以奬天衷君之惠也漢陽之田君實有之昭王在公宮之北吳人在其南子期似王逃王而已為王曰以我與之王必免隨人卜與之不吉乃辭吳初子胥與申包胥為友其亡也謂申包胥曰我必復楚國申包胥曰勉之子能復之我必能興之及吳兵入郢子胥求昭王不獲乃掘楚平王墓出其尸鞭之三百然後己申包胥亡於山中使人謂子胥曰子之報讐其以甚乎吾聞之人衆者勝天天定亦能勝人今子故平王之臣親北面而事之今至於僇死人此豈其無天道之極乎子胥曰為我謝包胥曰吾日暮塗逺吾故倒行而逆施之於是申包胥如秦乞師曰吳為封豕長蛇以荐食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若鄰於君疆場之患也逮吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就館將圖而以告對曰寡君越在草莽未獲所伏下臣何敢即安立於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出申包胥以秦師至秦子蒲子虎帥車五百乘與楚師會于稷大敗吳兵于沂又敗于雍澨吳王乃歸昭王入于郢後二歲闔廬使太子夫差伐楚取番楚懼吳復大來乃去郢徙于鄀十九年闔廬伐越越王句踐禦之陳于檇李句踐患吳之整也使死士再禽焉不動使罪人三行屬劒於頸而辭曰二君有治臣姦旗鼓不敏於君之行前不敢逃刑敢歸死遂自剄也師屬之目句踐因而伐之大敗之靈姑浮以戈擊闔廬闔廬傷將指取其一屨還卒於陘去檇李七里夫差使人立於庭茍出人必謂己曰夫差而忘越王之殺而父乎則對曰唯不敢忘夫差立二年伐越敗越于夫椒遂入越句踐以甲楯五千保于會稽使大夫種因太宰嚭以行成夫差將許之子胥曰不可臣聞之樹德莫如滋去疾莫如盡昔有過澆殺斟灌以伐斟鄩滅夏后相后緡方娠逃出自竇歸于有仍生少康焉為仍牧正惎澆能戒之澆使椒求之逃奔有虞為之庖正以除其害虞思於是妻之以二姚而邑諸綸有田一成有衆一旅能布其德而兆其謀以收夏衆撫其官職使女艾諜澆使季杼誘豷遂滅過戈復禹之績祀夏配天不失舊物今吳不如過而越大於少康或將豐之不亦難乎句踐能親而務施施不失人親不棄勞與我同壤而世為仇讐於是乎克而弗取將又存之違天而長寇讐後雖悔之不可食已姬之衰也日可俟也介在蠻夷而長寇讐以是求伯必不行矣弗聽退而告人曰越十年生聚而十年教訓二十年之外吳其為沼乎吳王不聽乃與越平十二年夫差將伐齊句踐率其衆以朝焉王及列士皆有饋賂吳人皆喜唯子胥懼曰是豢吳也夫諌曰越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早從事焉得志於齊猶獲石田也無所用之越不為沼吳其泯矣使醫除疾而曰必遺類焉者未之有也盤庚之誥曰其有顚越不恭則劓殄無遺育無俾易種于兹邑是商所以興也今君易之將以求大不亦難乎弗聽使於齊屬其子於鮑氏為王孫氏太宰嚭素惡子胥因讒之於吳王曰子胥為人剛暴少恩猜賊王不可不備焉臣聞其使齊也乃屬其子於鮑氏夫為人臣內不得意外倚諸侯自以為先王之謀臣今不見用居常鞅鞅願王早圖之吳王曰微子之言吾亦疑之乃使使賜子胥屬鏤之劒曰子以此死子胥仰天歎曰嗟乎讒臣嚭將為亂矣王乃反誅我我令若父霸自若未立時諸公子爭立我以死爭之於先王幾不得立若既得立欲分吳國半豫我我顧不敢望也然今聼諛臣言以殺長者乃告其舍人曰必樹吾墓上以梓令可為器而抉吾眼縣吳東門之上以觀越之入滅吳也乃自頸死吳王聞之大怒取子胥尸盛以鴟夷革浮之江中吳人憐之其後越王句踐竟滅吳殺吳王夫差誅太宰嚭以其不忠於其君而外受重賂與已比周也越范蠡本南陽人家於越初濮上人計然博學無所不通尤善計算南遊於越范蠡師事之得其術以事越王句踐句踐父允常與吳王闔廬戰而深相怨伐允常卒句踐立闔廬乃興師伐越句踐擊敗吳師於檇李射傷吳王闔廬闔廬且死語其子夫差曰必無忘越三年句踐聞吳王夫差日夜勒兵且以報越欲先吳未發往伐之范蠡不可曰臣聞兵凶器也戰逆德也爭者事之末也陰謀逆德好用兵器試身於所末上帝禁之行者不利王曰吾已決之矣遂興師吳王聞之悉發精兵擊越敗之夫椒越王乃以餘兵五千保棲於會稽吳王追而圍之越王謂范蠡曰以不聼子故至此為之奈何蠡對曰卑辭厚禮以遺之不許而身與之市句踐曰諾乃令大夫種行成於吳子胥不可乃因太宰嚭而後入之吳卒赦越句踐反國乃苦身焦思謀所以報吳欲使范蠡為國政對曰兵甲之事種不如蠡鎮撫國家親附百姓蠡不如種於是舉國政屬大夫種而使范蠡與大夫柘稽行成為質於吳二歲而吳歸蠡句踐自會稽歸七年拊循士民士民欲用以報吳句踐將聽之以問范蠡蠡曰不可句踐再三強之對曰未也天時不作弗為人客人事不起弗為之始故天因人聖人因天人自生之天地形之聖人因而成是以戰勝而不報取地而不反兵勝於外福生於內人事必將與天地相參然後乃可成大功故善用兵者因天地之常與之俱行後則用陰先則用陽近則用柔逺則用剛後無陰蔽先無陽察用人無藝往從其所剛柔以禦陽節不盡不死其野彼來從我固守勿與若將與之必因天地之災觀其民之飢飽勞逸以參之盡其陽節盈吾陰節而奪之利宜為人客剛強而力疾陽節不盡輕而不可取宜為人主安徐而重固陰節不盡柔而不可迫王其待之及聞其勝齊誅子胥而後喜以為天果棄之矣明年春吳王北會諸侯於黃池精兵悉從王獨老弱與太子留守蠡曰可矣乃發習流二千教士四萬人君子六千人諸御千人伐吳吳師敗遂殺吳太子吳告急於王王反自會乃使人厚禮以請成范蠡自度亦未能滅吳乃許之後四年而復伐之大破吳師因以兵圍之三年吳師敗越遂復棲吳王於姑蘇之山吳王使公孫雄肉袒膝行以請於越乃願如會稽之事句踐不忍欲許之范蠡曰會稽之事天以越賜吳吳不取今天以吳賜越越其可逆天乎且君王早朝晏罷非為吳邪謀之二十二年一朝而棄之可乎且天與弗取反受其咎伐柯者其則不逺君忘會稽之厄乎王曰吾欲聽子言吾不忍其使者范蠡乃鼓進兵曰王已屬政於執事使者去不者乃得罪使者退吳王知不可乃自殺越於是會諸侯致貢於周元王賜之胙命為伯東諸侯畢賀號稱霸王而范蠡為上將軍既反國范蠡為大名之下難久居且句踐為人長頸烏喙可與共患難難與同逸樂為書辭句踐曰臣聞主憂則臣辱主辱則臣死昔君王辱於會稽所以不死為此事也今既以雪耻臣請從會稽之誅句踐曰孤將與子分國而有之不然將加誅于子范蠡曰君行令臣行意乃裝其輕寶珠玉自與其私徒屬乘舟浮海以行終不反於是句踐表會稽山以為范蠡奉邑范蠡浮海出齊變姓名自謂鴟夷子皮耕于海畔苦身戮力父子治産居無幾何致産數千萬齊人聞其賢以為相范蠡喟然嘆曰居家則致千金居官則至卿相此布衣之極也久受尊名不祥乃歸相印盡散其財以分與知交鄉黨而懷其重寶間行以去止于陶以為此天下之中交昜有無之路通為生可以致富矣於是自謂陶朱公復約要父子耕畜廢居候時轉物逐什一之利居無何則致資纍巨萬天下稱陶朱公朱公居陶生少子少子及壯而朱公中男殺人囚於楚朱公曰殺人而死職也然吾聞千金之子不死於市告其少子往視之乃裝黃金千鎰置褐器中載以一牛車且遣其少子朱公長男固請欲行朱公不聽長男曰家有長子曰家督今弟有罪大人不遣乃遣少弟是吾不肖欲自殺其母為之請曰今遣少子未必能生中子也而先空亡長男奈何朱公不得已而遣長子為一封書遺故所善莊生曰至則進千金于莊生所聽其所為慎無與爭事長男既行亦自私齎數百金至楚莊生家負郭披藜藋到門居甚貧長男發書進千金如其父言莊生曰可疾去矣慎毋留即弟出勿問所以然長男既去不過莊生而私留以其私齎獻遺楚國貴人用事者莊生雖居窮閻然以亷直聞於國自楚王已下皆師尊之及朱公進金非有意受也欲以成事後復歸之以為信耳故金至謂其婦曰此朱公之金有如病不宿誡後復歸勿動而朱公長男不知其意以為殊無短長也莊生間時入見楚王言某星宿某此則害於楚楚王素信莊生曰為奈何莊生曰獨以德為可以除之楚王曰生休矣寡人將行之王乃使使者封三錢之府楚貴人驚告朱公長男曰王且赦曰何以也曰每王且赦常封三錢之府昨暮王使使封之朱公長男以為赦弟固當出也重千金虗棄莊生無所為也乃復見莊生莊生驚曰若不去邪長男曰固未也初為弟事弟今議自赦故辭生去莊生知其意欲復得金曰若自入室取金長男即自入室取金持去獨自歡幸莊生羞為兒子所賣乃入見楚王曰臣前言某星事王言欲以修德報之今臣出道路皆言陶之富人朱公之子殺人囚楚其家多持金錢賂王左右王非能恤楚國而赦乃以朱公子故也楚王大怒曰寡人雖不德耳奈何以朱公之子故而施惠乎今論殺朱公子明日遂下赦令朱公長男竟持其弟喪歸至其母及邑人盡哀之唯朱公獨笑曰吾固知必殺其弟也彼非不愛其弟顧有不能忍者也是少與我俱見苦為生難故重棄財至如少弟者生而見我富乘堅驅良逐狡豈知財所從來故輕棄之非所惜吝前日吾所為欲遣少子固為其能棄財故也而長者不能故卒以殺其弟事之理也無足悲者吾日夜固以望其喪之來也故范蠡三徙三成名於天下非茍去而已所止必成名卒老死于陶故世傳曰陶朱公通志卷九十二
