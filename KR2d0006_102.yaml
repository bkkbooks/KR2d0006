body:
  text: 通志卷九十宋右廸功郎鄭樵漁仲撰列傳第三春秋晉師服士蒍荀息里克㔻鄭慶鄭吕飴甥胥臣狐突狐偃子射姑先軫介推陽處父郤芮郤缺郤克郤至士會士爕范匄范鞅趙衰趙盾趙武趙鞅趙無恤荀林父荀罃荀偃荀呉荀寅伯宗羊舌肸司馬女齊祁奚解揚欒書子鍼魏絳父犨魏舒士彌牟韓厥韓起苗賁皇屈巫師服者事晉穆侯為大夫初穆侯之夫人姜氏以條之役生太子命之曰仇其弟以千畝之戰生命曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也今君命太子曰仇弟曰成師始兆亂矣兄其替乎昭侯之元年封成師為曲沃伯是曰桓叔使靖侯之孫欒賔傅之師服曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室大夫有貳宗士有𨽻子弟庶人工商各有分親皆有等衰是以民服事其上而下無覬覦今晉甸侯也而建國本既弱矣其能乆乎七年晉潘父弑昭侯而納桓叔不克其後晉竟為曲沃所滅終如師服之言士蔿字子輿陶唐氏之苖裔也歴虞夏商周成王遷之於杜為伯宣王殺杜伯其子隰叔奔晉為士師故為士氏獻公之六年公患桓荘之族偪以問士蔿士蔿曰去富子則羣公子可謀也已公曰爾試其事士蔿與羣公子謀譖富子而去之七年又與羣公子謀殺㳺氏之二子士蔿告晉侯曰可矣不過二年君必無患八年士蒍使羣公子盡殺㳺氏之族乃城聚而處之冬晉侯圍聚盡殺羣公子如士蒍之計焉九年士蒍為大司空夏士蒍城絳以深其宫秋虢人侵晉冬又侵晉晉侯将伐之士蒍曰不可虢公驕若驟得勝於我必棄其民無衆而後伐之欲禦我誰與夫禮樂慈愛戰所蓄也夫民讓事樂和愛親哀喪而後可用也虢弗畜也亟戰将饑虢竟不能撫其民而晉滅之獻公娶于賈無子烝於齊姜生秦穆夫人及太子申生又娶二女於戎大戎狐姬生重耳小戎子生夷吾晉伐驪戎驪戎男女以驪姬歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五使言於公曰曲沃君之宗也蒲與二屈君之疆也不可以無主宗邑無主則民不威疆場無主則啟戎心戎之生心民嫚其政國之患也若使太子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎且旌君伐公說故作二軍公将上軍太子申生将下軍趙夙御戎畢萬為右以滅耿滅霍滅魏還為太子城曲沃士蒍曰太子不得立矣分之都城而位以卿先為之極又焉得立不如逃之無使罪至為吴太伯不亦可乎猶有令名與其及也且諺曰心茍無瑕何恤乎無家天若祚太子其無晉乎太子不用其言卒以䜛自殺初獻公使士蔿為二公子築蒲與屈不慎寘薪焉夷吾訴之公使譲之士蔿稽首而對曰臣聞之無喪而戚憂必讎焉無戎而城讎必保焉宼讎之保又何慎焉守官廢命不敬固讎之保不忠失忠與敬何以事君詩云懐徳維寜宗子惟城君其修徳而固宗子何城如之三年将尋師焉焉用慎退而曰狐裘尨茸一國三公吾誰適従及士蔿卒子縠嗣為司空㐮公三年與諸侯㑹于垂隴襄公将使士縠梁益耳将中軍登箕鄭父先都将上軍先克曰狐趙之勲不可廢也從之故箕鄭父先都士縠梁益耳作亂晉人皆殺之荀息晉公族也隰叔之後食邑於荀曰荀氏獻公丗頻有虢師公患之十九年荀息請以屈産之乗垂棘之璧假道於虞以伐虢公曰是吾寳也對曰寳出之内府蔵之外府馬出之内廐繋之外廐君何喪焉公曰宫之竒存焉曰宫之竒之為人也懦而不能彊諫且少長於君君暱之雖諫将不聽乃使荀息假道于虞曰冀為不道入自顛軨伐鄍三門冀之既病則亦惟君故今虢為不道保於逆旅以侵敝邑之南鄙敢請假道以請罪于虢虞公許之且請先伐虢宫之竒諫之不聽遂起師故里克荀息帥師㑹虞師伐虢滅下陽二十二年復假道于虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晉不可啟宼不可翫一之謂甚其可再乎諺所謂輔車相依脣亡齒寒者其虞虢之謂也公曰晉吾宗也豈害我哉對曰太伯虞仲太王之昭也太伯不從是以不嗣虢仲虢叔王季之穆也為文王卿士勲在王室蔵於盟府将虢是滅何愛於虞且虞能親於桓荘乎桓荘之族何罪而以為戮不唯偪乎親以寵偪猶尚害之况以國乎公曰吾享祀豐潔神必㩀我對曰臣聞之鬼神非人實親唯徳是依故周書曰白王天無親惟徳是輔又曰黍稷非馨明徳唯馨又曰民不易物惟徳繄物如是則非徳民不和神不享矣神所馮依将在徳矣若晉取虞而明徳以薦馨香神其吐之乎弗聽許晉使宫之竒以族行曰虞不臘矣在此行也晉不更舉矣八月晉圍上陽十有二月晉滅虢虢公醜奔京師師還館于虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬而修虞祀且歸其職貢於王荀息取璧與馬而歸于公公曰寳則吾寳也雖然吾馬之齒亦巳長矣獻公之末年以驪姬故欲易太子而立其子奚齊使荀息傅之公疾召之曰以是藐諸孤辱在大夫若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送徃事居耦俱無猜貞也獻公卒里克将殺奚齊先告荀息曰三怨将作秦晉輔之子将何如荀息曰将死之里克曰無益也荀叔曰吾與先君言矣不可以貳能欲復言而愛身乎雖無益也将焉辟之且人之欲善誰不如我我欲無貳而能謂人巳乎及里克殺奚齊荀息将死之人曰不如立卓子而輔之荀息立公子卓以𦵏獻公里克又殺卓子于朝荀息死之君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也荀息有焉里克晉大夫獻公使為太子申生傅公将易太子使太子伐山戎里克諫曰太子奉冢祀社稷之粢盛以朝夕視君饍者也故曰冢子君行則守有守則従従曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與執政之所圖也非太子之事也師在制命而已禀命則不威專命則不孝故君之適嗣不可以帥師君失其官帥師不威将焉用之且臣聞臯落氏将戰君其舍之公曰寡人有子未知其誰立焉不對而退見太子太子曰吾其廢乎對曰告之以臨民教之以軍旅不共是懼何故廢乎且子懼不孝無懼弗得立修已而不責人則免扵難矣驪姬将害太子告優施曰君既許我殺太子而立奚齊矣吾難里克奈何優施曰吾来里克一日而已子為我具特羊之饗吾以從之飲酒我優也言無郵驪姬許諾乃具使優施飲里克酒中飲優施起舞謂里克妻曰主孟㗖我我教兹暇豫事君乃歌曰暇豫之吾吾音魚不如鳥烏人皆集於苑已獨集于枯里克笑曰何謂苑何謂枯優施曰其母為夫人其子為君可不謂苑乎其母既死其子又有謗可不謂枯乎枯且有傷優施出里克辟奠不餐而寢夜半召優施曰曩而言戲乎抑有所聞之乎曰然君既許姬殺太子而立奚齊謀既成矣里克曰吾秉君以殺太子吾不忍通復故交吾不敢中立其免乎優施曰免旦而里克見㔻鄭曰難将作矣優施告我君謀成矣将立奚齊矣㔻鄭曰子何謂曰吾對以中立鄭曰惜也不如曰不信以䟽之亦固太子以攜之多為之故以變其志志少䟽乃可間也今子曰中立况固其謀也彼有成矣難以得間里克曰徃言不可及也且人中心唯無忌之何可敗也子将何如㔻鄭曰我無心是故事君者以君為心制不在我里克曰弑君以為㢘長廉以驕心因驕以制人家不敢抑僥志以從君為廢人以自利也利方以求人吾不能将伏也明日稱疾不朝三旬而難作驪姬以君命命太子曰君夢齊姜必速祭之太子祭于曲沃歸胙于公公田姬寘諸宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子太子奔新城公殺其傅杜原欵或謂太子子辭君必辨焉太子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂曰子其行乎太子曰君實不察其罪被此名也以出人誰納我遂縊于新城獻公卒奚齊立為君里克将殺奚齊以告荀息荀息拒之語具荀息傳中又以告㔻鄭㔻鄭曰子勉之我為子行之子帥七輿大夫以待我我使狄以動之援秦以揺之立其薄者可以得重賂厚者可使無入國誰之國也里克曰不可克聞之夫義者利之足也貪者怨之夲也廢義則利不立厚貪則怨生夫孺子豈獲罪於民特以驪姬之惑蠱君而誣國人䜛羣公子而奪之利使君迷亂信而亡之殺無罪以為諸侯笑使百姓莫不有蔵惡於其心中恐其如壅大川潰而不可救禦也是故将殺奚齊而立子之在外者以定民弭憂于諸侯且為援庶㡬曰諸侯義而撫之百姓欣而奉之國可以固今殺君而賴其冨貪且反義貪則民怨反義則富不為頼頼富而民怨亂國而身殆懼為諸侯載不可常也㔻鄭許諾於是殺奚齊卓子及驪姬而請君于秦秦人納公子夷吾是為惠公惠公立将殺里克以說使謂里克曰㣲子則不及此雖然子弑二君一大夫矣為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劍而死於是㔻鄭聘于秦故不及後歸自秦冀芮殺之其子豹奔秦慶鄭事惠公為大夫惠公之求入扵秦也賂秦以河外之列城五東盡虢畧南及華山内及觧梁城既立而背之即位之四年晉饑使乞糴于秦秦穆公輸粟於晉自雍及絳相繼命之曰汎舟之役眀年秦饑使乞糴于晉惠公不與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義四徳皆失何以守國虢射曰皮之不存毛将安傅慶鄭曰棄信背鄰患孰恤之無信患作失援必斃是則然矣虢射曰無損于怨而厚於宼不如勿與慶鄭曰背施幸災民所棄也近猶讎之况怨敵乎弗聽退曰君其悔是哉六年秦穆公来伐公謂慶鄭曰宼深矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使歩揚御戎家僕徒為右乗小駟鄭入也慶鄭曰古者大事必乗其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乗異産以從戎事及懼而變将與人易亂氣狡憤隂血周作張脉僨興外彊中乾進退不可周旋不能君必悔之弗聽九月惠公逆秦師使韓簡視師復曰師少於我鬭士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而無報是以来也今又擊之我怠秦奮倍猶未也公曰一夫不可狃况國乎遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也茍列定矣敢不承命韓簡退曰吾幸而得囚遂戰于韓原戎馬還濘而止公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉去之梁由靡御韓簡虢射為右輅秦伯将止之鄭以救公誤之遂失秦伯秦獲公以歸晉大夫反首㧞舍從之秦伯使辭焉曰二三子何其慼也寡君之從君而西也亦晉之妖夢是踐豈敢以至晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風穆姬聞公将至以太子罃𢎞與女簡璧登臺而履薪焉使以免服衰絰逆且告曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舍諸靈臺大夫請以入公曰獲晉侯以厚歸也既而喪歸焉用之大夫其何有焉且晉人慼憂以重我天地以要我不圖晉憂重其怒也我食吾言背天地也重怒難任背天不祥必歸晉君公子縶曰不如殺之無聚慝焉子桑曰歸之而質其太子必得大成晉未可滅而殺其君祗以成惡且史佚有言曰無始禍無怙亂無重怒重怒難任陵人不祥乃許晉平公将歸蛾析謂慶鄭曰盍行乎對曰陷君於敗敗而不死又使失刑非人臣也臣而不臣行将焉入公歸殺慶鄭而後入瑕吕飴甥字子金晉大夫食采於隂亦曰隂飴甥惠公之見獲於秦也秦将許之平而歸之公使郤乞告子金且召之子金教之言曰朝國人而以君命賞且告之曰孤雖歸辱社稷矣其卜貳圉也衆皆哭晉扵是乎作爰田子金曰君亡之不恤而羣臣是憂恵之至也将若君何衆曰何為而可對曰征繕以輔孺子諸侯聞之喪君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎衆說晉扵是乎作州兵十月飴甥會秦伯盟于王城秦伯曰晉國和乎對曰不和小人耻失其君而悼喪其親不憚征繕以立圉也曰必報讎寕事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報徳有死無二以此不和秦伯曰國謂君何對曰小人慼謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君貳而執之服而舍之徳莫厚焉刑莫威焉服者懐徳貳者畏刑此一役也秦可以覇納而不定廢而不立以徳為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉胥臣字季子食邑於臼曰臼季官為司空又曰司空季子獻公之二十一年從公子重耳奔狄惠公卒公子入秦将以求納焉秦穆公歸女五人懐嬴與公子使奉匜沃盥既而揮之嬴怒曰秦晉匹也何以卑我公子懼降服囚命穆公見公子曰寡人之適此為才子圉之辱備嬪嬙焉欲以成㛰而懼離其惡名非此則無故不敢以禮致之懼之故也公子有辱寡人之罪也唯命是聽公子欲辭季子曰同姓為兄弟黄帝之子二十五人其同姓者二人而已唯青陽與夷鼓皆為已姓青陽方雷氏之甥也夷鼓彤魚氏之甥也其同生而異姓者四母之别為十二姓凡黄帝之子二十五宗其得姓者十四人為十二姓姬酉祈巳滕箴任荀僖佶儇依是也唯青陽氏與蒼林氏同于黄帝故皆為姬姓同徳之難也如是昔少典娶于有蟜氏生黄帝炎帝黄帝以姬木成炎帝為姜二帝用師以相擠也異徳之故也異姓則異徳異徳則異類異類雖近男女相及以生民也同姓則同徳同徳則同心同心則同志同志相遠男女不相及畏黷敬也黷則生怨怨亂毓災災毓滅姓是故娶妻避其同姓畏亂災也故異徳合姓同徳合義義以導利利以阜姓姓利相更成而不遷乃能攝固保其土房今子於子圉道路之人也取其所棄以濟大事不亦可乎公子於是歸女而納幣且逆之公子之在秦也親筮之曰尚有晉國得屯貞悔豫皆八也筮史占之皆曰不吉閉而不通爻無為也季子曰吉是在周易皆利建侯不有晉國以輔王室安能建侯我命筮曰尚有晉國告我曰利建侯得國之務也吉孰大焉震車也坎水也坤土也屯厚也豫樂也車班外内順以訓之泉貨以資之土厚而樂其實不有晉國何以當之震雷也車也坎勞也水也衆也主雷與車而尚水與衆車有震武衆順文也文武具厚之至也故曰屯其繇曰元亨利貞勿用有攸徃利建侯主震雷長也故曰元衆而順嘉也内有震雷故曰利貞車上水下必伯小事不濟壅也故曰勿用有攸徃一夫之行也衆順而有武威故曰利建侯坤母也震長男也母老子彊故曰豫其繇曰利建侯行師居樂出威之謂也得國之卦也既而穆公納公子于晉是為文公文公立以季子為卿代先軫佐下軍城濮之戰季子以虎皮䝉馬先犯陳蔡陳蔡潰楚師是以大敗文公嘗學書於季子三日曰吾不能行也咫聞則多矣對曰然而多聞以待能者不猶愈也襄公之為太子也公將使陽處父為之傅問于季子曰處父其能敎誨驩也使之善乎對曰是在驩也蘧篨不可使俯戚施不可使仰僬僥不可使舉侏儒不可使援矇瞍不可使視嚚瘖不可使言聾聵不可使聽童昬不可使謀質將善而賢良贊之則濟可竢若其質有違敎將不入其何善之為臣聞昔者大任娠文王不變少溲於豕牢而得文王不加疾焉文王在母不憂在傅弗勤處師弗煩事君不怒孝友二虢而惠慈二蔡刑于大姒比於諸弟詩云刑于寡妻至于兄弟以御于家邦於是乎用四方之賢良及其即位也詢于八虞而詔于虢度於閎夭而謀扵南宫諏於蔡原而訪于辛尹重之以周邵畢榮億寧百神而柔和萬民故詩云惠于宗公神罔時恫若是則文王非專敎誨之力也公曰然則教無益乎對曰教為文益其質故人生而學非學不入公曰奈夫八疾何對曰官司之所材也戚施直鎛蘧篨蒙璆侏儒扶盧矇瞍修聲聾聵司火童昬嚚瘖僬僥官師之所不材也以實裔土夫教者因體能質而利之者也若川然有原卬浦而後大季子使舍于冀野見冀郤薅其妻饁之敬歸而言於公公以為下軍大夫焉襄公六年季子卒狐突字伯行文公之外祖父也其先本唐叔之後在戎狄者為狐氏獻公娶二女於戎大狐姬生文公小戎子生惠公狐突以狐姬故事晉為大夫獻公使傅太子申生獻公之十七年以驪姬之惑也欲易太子冬十二月使申生將兵伐東山臯落氏公衣之偏衣佩之金玦狐突御戎先友為右梁餘子飬御罕夷先丹木為右羊舌大夫為尉先友曰衣身之偏握兵之要在此行也子其勉之偏躬無慝兵要逺災親以無災又何患焉狐突歎曰時事之徴也衣身之章也佩衷之旗也故敬其事則命以始服其身則衣之純用其𠂻則佩之度今命以時卒閟其事也衣之尨服逺其躬也佩以金玦棄其衷也服以遠之時以閟之尨凉冬殺金寒玦離胡可恃也雖欲勉之狄可盡乎梁餘子飬曰帥師者受命于廟受脤於社有常服矣不獲而尨命可知也死而不孝不如逃之罕夷曰尨竒無常金玦不復雖復何為君有心矣先丹木曰是服也狂夫阻之曰盡敵而反敵可盡乎雖盡敵猶有内䜛不如違之狐突欲行羊舌大夫曰不可違命不孝棄事不忠雖知其寒惡不可取子其死之太子將戰狐突諫曰不可昔辛伯諗周桓公云内寵並后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣立可必乎孝而安民子其圖之與其危身以速罪也太子不聽遂出戰敗狄而還狐突閉門不出既而䜛言日益深太子不能自眀因自殺將死使猛足言扵狐突曰申生有罪不用伯氏之言以至于死申生不敢愛其死雖然吾君老矣國家多難伯氏不出而圖吾君伯氏苟出而圖吾君申生受賜而死及惠公立改𦵏共太子狐突適下國遇太子太子使登僕而告之曰夷吾無禮余得請於帝矣將以晉畀秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而徃告之曰帝許我罸有罪矣敝於韓惠公六年秦晉戰於韓原秦獲晉侯以歸惠公卒懐公命無從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召懐公執狐突曰子來則免對曰子之能仕父教之忠古之制也策名委質貳乃辟也今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君刑之不濫君之眀也臣之願也滛刑以逞誰則無罪臣聞命矣伏劒而死狐偃字子犯狐突之子也驪姬既䜛殺太子申生復譖二公子將逐之獻公二十二年子犯奉公子重耳出奔狄獻公卒里克殺驪姬之子奚齊卓子使告公子求入而納之公子以告子犯子犯不可曰夫堅樹在始始不固本終必槁落夫長國者唯知哀樂喜怒之節是以導民不哀喪而求國難因亂以入殆以喪得國則必樂喪樂喪必哀生因亂以入則必喜亂喜亂必怠徳是哀樂喜怒之節易也何以導民重耳曰非喪誰代非亂誰納我子犯曰偃也聞之喪亂有小大大喪大亂之剡也父母死為大喪䜛在兄弟為大亂今適當之是故難公子重耳出見使者曰子惠顧亡人重耳父生不得供洒掃之臣死又不敢莅喪以重其罪且辱大夫敢辭夫固國者在親衆而善鄰在因民而順之茍衆所利鄰國所立大夫其從之重耳不敢違已而秦穆公使公子縶弔公子重耳曰寡君使縶弔公子之憂又重之以喪寡人聞之得國常於喪失國常於喪時不可失喪不可乆公子其圖之重耳告子犯子犯曰不可亡人無親信人以為親是故置之者不殆父死在堂而求利人孰仁我人實有之我以徼倖人孰信我不仁不信將何以長利公子重耳出見使者君惠弔亡臣又重有命重耳身亡父死不得與於哭泣之位又何敢有他志以辱君義再拜不稽首起而哭退而不私公子縶反命穆公公曰仁人也再拜不稽首不役為後也起而哭愛其父孝也退而不私不役於利也秦人遂納公子夷吾是為惠公惠公之七年重耳去狄之齊過衛衛文公不禮焉出於五鹿乞食於野人與之塊公子怒欲鞭之子犯曰天賜也稽首受而載之及齊齊桓公妻之有馬二十乘公子安之從者以為不可將行謀於桑下蠶妾在其上聞之以告姜氏姜氏殺之而謂公子曰子有四方之志其聞之者吾殺之矣公子曰無之姜曰行也懐與安實敗名公子不可姜與子犯謀醉而遣之醒以戈逐子犯曰若無所濟吾食舅氏肉其知饜乎子犯走且對曰若無所濟吾未知死所誰能與豺狼爭食若克有濟無亦晉之柔嘉足以甘食偃肉腥臊將焉用之乃止遂行過曹過鄭俱不禮焉及楚楚成王饗之曰公子若反晉國則何以報不榖對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇於中原其辟君三舍若不獲命其左執鞭弭右屬櫜鞬以與君周旋子玉請殺之成王曰晉公子廣而儉文而有禮其從者肅而寛忠而能力晉侯無親内外惡之吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之違天必有大咎乃送諸秦秦穆公遂納之及河子犯以璧授公子曰臣負覊紲從君巡於天下臣罪多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如此水投其璧于河遂濟入于晉師遂入于曲沃朝于武宫即位于朝是為文公文公之元年王室有叔帯之亂襄王出居扵鄭秦穆公師于河上將以納王狐偃言于文公曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣公以為然故辭秦師而下次于陽樊右師圍温左師逆王入襄王于周取王弟帯于温殺之王賜晉河内陽樊之地四年楚成王伐宋文公率齊秦之師以救宋成王命令尹子玉無從晉師子玉固請戰遂從晉師晉師退軍吏曰以君辟臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在乆乎㣲楚之惠不及此退三舍避之所以報也背惠食言以亢其讎我曲楚直其衆素飽不可謂老我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏晉師及諸侯之師次于城濮楚師背􅈶而舍晉侯患之聽輿人之誦曰原田毎每舍其舊而新是謀公疑焉子犯曰戰也戰而㨗必得諸侯若其不㨗表裏山河必無害矣文公夢與楚子搏楚子伏已而盬其腦是以懼子犯曰吉我得天楚服其罪吾且柔之矣既戰大敗楚師于城濮子玉死之文公歸國行賞以狐偃為首文公始入而教其民二年欲用之子犯曰民未知義未安其居於是乎出定襄王入務利民民懷生矣將用之子犯曰民未知信未宣其用於是伐原以示之信民易資者不求豐焉明要其辭公曰可矣子犯曰民未知禮未生其共於是大蒐以示之禮作執秩以正其官民聽不惑而後用之出榖戌釋宋圍一戰而覇文之教也子犯卒子狐射姑立射姑字季佗食邑于賈故曰賈季與父皆有從亡之功襄公六年蒐于夷作三軍使狐射姑將中軍趙盾佐之陽䖏父改蒐而易之使賈季佐趙孟且曰使能賈季怒及襄公卒賈季使召公子樂于陳而立之趙盾不從使殺公子于郫故賈季殺處父以奔狄先軫晉大夫食采於原亦曰原軫文公四年楚成王帥諸侯之師以圍宋宋使公孫固來乞師先軫曰報施救患取威定覇於是乎在矣狐偃曰楚始得曹而新昬於衛君伐曹衛楚必救之則齊宋免矣於是乎蒐于被廬作三軍謀元帥使郤縠將中軍郤溱佐之使狐偃將上軍譲於狐毛而佐之命趙衰為卿讓於欒枝先軫使欒枝將下軍先軫佐之眀年郤縠卒先軫自下軍佐超將上軍上徳也楚圍宋急宋人使門尹般来告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦藉之告楚我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公說執曹伯分曹衛之田以畀宋人楚成王入居于申使申叔時去榖使子玉去宋曰無從晉師晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣民之情偽盡知之矣天假之年而除其害天之所置其可廢乎軍志曰允當則歸又曰知難而退又曰有徳不可敵此三志者晉之謂矣子玉使伯棼請戰曰非敢必有功也願以間執䜛慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之子玉使宛春告扵晉師曰請復衛侯而封曹臣亦釋宋之圍子犯曰子玉無禮哉君取一臣取二不可失也先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何楚有三施我有三怨怨讎已多將何以戰不如私許復曹衛以擕之執宛春以怒楚既戰而後圖之公說乃執宛春於衛且私許復曹衛曹衛告絶於楚子玉怒從晉師晉師為之退三舍次于城濮子玉使鬭勃請戰曰請與君之士戲君馮軾而觀之得臣與寓目焉文公使欒枝對曰寡君聞命矣楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不獲命矣敢煩大夫謂二三子戒爾車乗敬爾君事詰朝將見晉車七百乘韅靷鞅靽晉侯登有莘之虛以觀師曰少長有禮其可用也遂伐木以益其兵晉師陳于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣子西將左子上將右胥臣䝉馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之欒枝以輿曳柴而偽遁楚師馳之原軫郤溱以中軍公族横擊之狐毛狐偃夹攻子西楚左師潰楚師敗績文公是故策命于王為侯伯先軫之功也襄公之初秦穆公將襲鄭訪諸蹇叔蹇叔曰勞師以襲逺非所聞也公不聽秦師遂東滅滑而還先軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵生患違天不祥必伐秦師欒枝曰未報秦師而伐其師其為死君乎先軫曰秦不哀吾喪而伐我同姓秦則無禮何施之為吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂發命遽興姜戎子墨衰絰梁𢎞御戎莱駒為右敗秦師于殽獲百里孟明視西乞術白乙丙以歸文嬴請三帥曰彼實構吾二君寡君若得而食之不厭君何辱討焉使歸就戮于秦以逞寡君之志若何公許之先軫怒曰武夫力而拘諸原婦人暫而免諸國墮軍實而長宼讎亡無日矣不顧而唾及狄伐晉公敗狄于箕先軫曰匹夫逞志於君而無討敢不自討乎免胄入狄師死焉狄人歸其元面如生公命其子且居將中軍介子推文公之微臣也始文公去國從者五人將歸即位羣臣多自以為功推竊恥之文公之元年秦送文公至河咎犯曰臣從君周旋天下過亦多矣臣猶知之況於君乎請亡要文公而與之盟時推從在船中笑曰天實開公子子犯以為已功而要市於君固足羞也吾不忍與同位乃自𨼆文公新立周襄王以弟帯難出居鄭告急於晉文公方發兵是以賞從亡者未至子推子推亦不言禄禄亦不及子推曰獻公有子九人唯君在矣惠懷無親外内棄之天未絶晉必將有主主晉祀者非君而誰天實開之二三子以為已功不亦誣乎竊人之財猶謂之盗況貪天之功以為已力乎下義其罪上賞其姦上下相䝉難與處矣其母曰盍亦求之以死誰懟子推曰尤而效之罪有甚焉且出怨言不食其禄母曰亦使知之若何對曰言身之文也身欲隱安用文之文之是求顯也其母曰能如此乎與女偕隱至死不復見子推從者憐之乃懸書宫門曰龍欲上天五蛇為輔龍已上天四蛇各入其宇一蛇獨怨終不見處所文公出見其書曰此介子推也吾方憂王室未圖其功使人召之則亡遂求所在聞其入緜上山中於是文公環緜上山中而封之以為介推田號介山曰以記吾過且旌善人陽處父晉大夫文公以為孤卿謂之陽太傅文公九年楚鬭辛請平于晉公使陽處父報之晉楚使命之交始於此襄公九年晉敗秦師于殽獲百里孟明視西乞術白乙丙以歸文嬴請三帥公舍之先軫有辭公使處父追之及河則在舟中矣釋左驂以公命贈孟明欲使還拜而執之也孟眀覺而遂去之冬處父侵蔡楚子上救之與晉師夹泜而軍陽子患之使為子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陳遲速唯命不然紓我老師費財亦無益也乃駕以待子上欲渉大孫伯曰不可晉人無信半渉而薄我悔敗何及不如紓之乃退舍陽子宣言曰楚師遁矣遂歸楚師亦歸楚以子上受晉賂而退也耻而殺之二年公以魯之不朝也致討焉魯文公来朝公使處父盟公以恥之四年楚師圍江處父帥師伐楚以救江門于方城遇息公子朱而還七年公蒐于夷舍二軍使狐射姑將中軍趙盾佐之陽處父至自温改蒐于董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之是嵗襄公薨靈公少晉人以難故欲立長君趙孟欲立公子雍賈季曰不如公子樂使召公子樂于陳趙孟使殺諸郫賈季怨陽子之比於趙孟且易其班也而知其無援於晉使續鞫居殺處父趙孟於是殺鞫居賈季奔狄初處父聘于衛反過寗寗嬴從之及温而還其妻問之嬴曰以剛商書曰沈潛剛克高眀柔克夫子壹之其不沒乎天為剛徳猶不干時況在人乎且華而不實怨之所聚也犯而聚怨不可以定身余懼不獲其利而離其難是以去之眀年而處父及於難郤芮姬姓晉公族也其先食邑於郤故以為氏芮為晉大夫受采於冀又曰冀芮芮少事公子夷吾驪姬之難公子重耳奔狄夷吾將從之冀芮曰後出同走罪也不如之梁梁近秦而幸焉乃之梁居四年而獻公卒里克殺奚齊卓子冀芮使夷吾重賂秦以求入曰人實有國我何愛焉入而能民土於何有夷吾從之賂秦以河外之列城五穆公許之穆公問於冀芮曰公子誰恃對曰臣聞之亡人無黨有黨必有讎夷吾之少也弱不好弄戲不過所復怒不及色及其長也不改其故出亡無怨於國而衆安之不然夷吾不佞其誰能恃乎君子謂冀芮善以微勸也穆公遂納夷吾于晉是為惠公惠公立殺里克而背秦賂使㔻鄭聘于秦且謝緩賂㔻鄭黨於里克言於秦穆公曰呂甥郤稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣穆公使泠至報問且召三子冀芮曰幣重而言甘誘我也遂殺㔻鄭祁舉及七輿大夫左行共華右行賈華叔堅騅歂纍虎特宮山祁皆里㔻之黨也及惠公卒懐公立秦納文公懷公奔高梁吕甥郤芮畏偪將焚公宫而弑文公焉初獻公使寺人披伐文公於蒲文公踰垣而走披斬其袪僅而獲免至是披請見公使讓之且辭焉曰蒲城之役君命一宿女即至其後余從狄君田女為惠公来求殺余命女三宿女中宿至雖有君命何其速也夫袪猶在女其行乎對曰臣謂君之入也其知之矣若猶未也又將及難君命無二古之制也除君之惡唯力是視蒲人狄人余何有焉今君即位其無蒲狄乎齊桓公置射鉤而使管仲相君若易之何辱命焉行者甚衆豈唯刑臣公見之以難告於是文公潛會秦穆公于王城既而公宫火瑕甥冀芮不獲公乃如河上穆公誘而殺之郤成子缺冀芮之子也初臼季使過冀見郤缺耨其妻饁之相待如賔與之歸言諸文公曰敬徳之聚也能敬必有徳徳以治民君請用之臣聞之出門如賔承事如祭仁之則也公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不共不相及也詩曰采葑采菲無以下體君取節焉可也文公以為下軍大夫襄公元年狄伐晉公敗狄於箕成子獲白狄子反自箕公以一命命成子為卿復與之冀亦未有軍行以再命命先茅之縣賞胥臣曰舉郤缺子之功也襄公二年晉伐衛取其邑靈公元年趙盾為政成子曰日衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懐非威非懐何以示徳無徳何以主盟子為正卿以主諸侯而不務徳將若之何夏書曰戒之用休董之用威勸之以九歌勿使壞九功之徳皆可歌也謂之九歌六府三事謂之九功水火金木土榖謂之六府正徳利用厚生謂之三事義而行之謂之徳禮無禮不樂所由叛也若吾子之徳莫可歌也其誰来之盍使睦者歌吾子乎宣子説之六年代箕鄭將上軍新城之盟蔡人不與成子以上軍下軍伐蔡曰君弱不可以怠遂入蔡以城下之盟而還成公六年趙盾卒胥克有蠱疾成子為政秋廢胥克使趙朔佐下軍眀年楚子為厲之役故伐鄭成子救鄭鄭伯敗楚師于栁棼景公二年成子求成于衆狄衆狄疾赤狄之役遂服於晉秋公徃㑹衆狄于攅凾是行也諸大夫欲召狄成子曰吾聞之非徳莫如勤非勤何以求人能勤有繼其從之也詩曰文王既勤止文王猶勤况寡徳乎郤獻子克成子之子也成子卒獻子佐上軍景公之八年公使獻子徴㑹于齊齊頃公以其跛也帷婦人使觀之獻子登婦人笑於房獻子怒出而誓曰所不此報無能渉河獻子先歸使欒京廬待命于齊曰不得齊事無復命矣獻子至請伐齊公弗許請以其私屬又弗許是時范武子將老退自朝召其子爕曰爕乎吾聞之干人之怒必獲毒焉夫郤子之怒甚矣不逞諸齊必發諸晉國不得政何以逞怒余將致政焉以成其怒無以内易外也乃老獻子代為政十一年衛孫桓子魯臧宣叔以戰敗怒於齊皆来乞師同主於郤獻子公許之七百乗獻子曰此城濮之賦也有先君之眀與先大夫之肅故㨗克於先大夫無能為役請八百乘許之郤克將中軍士爕佐上軍欒書將下軍韓厥為司馬以救魯衛臧宣叔逆晉師且道之季文子帥師㑹之及衛地韓獻子將斬人獻子馳將救之至則既斬之矣獻子使速以狥告其僕曰吾以分謗也師從齊師于莘六月壬申師至于靡笄之下齊侯使請戰曰子以君師辱於敝邑不腆敝賦詰朝請見對曰晉與魯衛兄弟也来告曰大國朝夕釋憾於敝邑之地寡君不忍使羣臣請於大國無令輿師淹於君地能進不能退君無所辱命齊侯曰大夫之許寡人之願也若其不許亦将見也癸酉師陳于鞌邴夏御齊侯逄丑父為右晉觧張御獻子鄭邱緩為右齊侯曰余姑翦此而朝食不介馬而馳之獻子傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之緩曰自始合茍有險余必下推車子豈識之然子病矣張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注韓厥中御而從齊侯㡬獲之逄丑父與公易位故免事具韓厥逄丑父傳中齊侯使賔媚人賂以紀甗玉磬與地不可則聽客之所為賔媚人致賂獻子不可曰必以蕭同叔子為質而使齊之封内盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且是以不孝令也詩曰孝子不匱永錫爾類若以不孝令於諸侯其無乃非徳類也乎先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利無頋土宜其無乃非先王之命也乎反先王則不義何以為盟主其晉實有闕四王之王也樹徳而濟同欲焉五覇之覇也勤而撫之以役王命今吾子求合諸侯以逞無疆之欲詩曰布政優優百禄是遒子實不優而棄百禄諸侯何害焉不然寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者畏君之震師徒撓敗吾子惠徼齊國之福不泯其社稷使繼舊好唯是先君之敝噐土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也况其不幸敢不唯命是聽魯衛諫曰齊疾我矣其死亡者皆親暱也子若不許讎我必甚唯子則又何求子得其國寶我亦得地而紓於難其榮多矣齊晉亦唯天所授豈必在晉獻子許之使對曰羣臣帥賦輿以為魯衛請若茍有以藉口而復於寡君君之惠也敢不唯命是聽秋七月晉師及齊國佐盟于袁婁使齊人歸魯汶陽之田魯成公㑹晉師于上鄍賜三帥先路三命之服師至獻子見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有也范叔見勞如郤伯對曰庚所命也克之制也爕何力之有焉欒伯見公亦如之對曰爕之詔也士用命也書何力之有焉明年齊侯朝于晉將授玉獻子趨進曰此行也君為婦人之笑辱也寡君未之敢任獻子卒欒書為政郤至晉卿也為温大夫亦曰温季厲公元年郤至與周爭鄇田王命劉康公單襄公訟諸晉郤至曰温吾故也故不敢失劉子單子曰昔周克商使諸侯撫封蘇忿生以温為司宼與檀伯達封于河蘓氏即狄又不能於狄而奔衛襄王勞文公而賜之温狐氏陽氏先處之而後及子若治其故則王官之邑也子安得之公使郤至勿敢爭二年如楚聘且莅盟楚子享之子反相為地室而縣焉郤至將登金奏作於下驚而走出子反曰日云莫矣寡君須矣吾子其入也至曰君不忘先君之好施及下臣貺之以大禮重之以備樂如天之福兩君相見何以代此下臣不敢子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂寡君須矣吾子其入也賔曰若讓之以一矢則禍之大者其何福之為世之治也諸侯間於天子之事則相朝也於是乎有享宴之禮享以訓㳟儉宴以示慈惠㳟儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕此公侯之所以扞城其民也故詩曰﨣﨣武夫公侯干城及其亂也諸侯貪昌侵欲不忌爭尋常以盡其民略其武夫以為巳腹心股肱𤓰牙故詩曰﨣﨣武夫公侯腹心天下有道則公侯能為民扞城而制其腹心亂則反之今吾子之言亂之道也不可以為法然吾子主也至敢不從遂入卒事歸以語范文子文子曰無禮必食言吾死無日矣六年與郤犫郤錡謀害伯宗譖而殺之及欒弗忌伯州犁奔楚韓厥曰郤氏其不免乎善人天地之紀也而驟絶之不亡何待七年郤至佐新軍從欒書伐鄭濟河聞楚師將至范文子不欲戰郤至不可欒書曰楚人輕窕固壘而待之三日必退退而擊之必勝郤至曰楚有六間不可失也其二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦在陳而囂合而加囂各顧其後莫有鬭心舊不必良以犯天忌我必克之師遂出戰于鄢陵郤至三遇楚子之卒見楚子必下免胄而趨風楚子使工尹襄問之以弓曰方事之殷也有韎韋之跗方干反注君子也識見不榖而趨無乃傷乎郤至見客免胄承命曰君之外臣至從寡君之戎事以君之靈間䝉甲胄不敢拜命敢告不寜君命之辱為事之故敢肅使者三肅使者而退既又從鄭伯其右茀翰胡曰諜輅之余從之乘而俘以下郤至曰傷國君有刑乃止楚師薄於險遂敗囚楚公子茷以歸公使郤至獻楚㨗于周與單襄公語驟稱其伐單子語諸大夫曰温季其亡乎立於七人之下而求掩其上怨之聚亂之本也多怨而階亂何以在位夏書曰怨豈在明不見是圖將慎其細也今而明之其可乎厲公反自鄢陵既侈遂多外嬖欲盡去羣大夫而立其左右方是時胥童以胥克之廢也怨郤氏而嬖於公郤錡奪夷陽五田五亦嬖於公郤犫與長魚矯爭田執而梏之與其父母妻子同一轅既矯亦嬖於公欒書怨郤至以其不從已而敗楚師也欲廢之使楚公子茷告公曰此戰也郤至實召寡君以東師之未至也與軍帥之不具也曰此必敗吾因奉孫周以事君公以告欒書書曰其有焉不然豈其死之不恤而受敵使乎君盍嘗使諸周而察之郤至聘于周欒書使孫周見之公使覘之信遂怨郤至七年厲公田與婦人先殺而飲酒後使大夫殺郤至奉豕寺人孟張奪之郤至射而殺之公曰季子欺予厲公將作難胥童曰必先三郤族大多怨去大族不逼敵多怨有庸公曰然郤氏聞之郤錡欲攻公曰雖死君必危郤至曰人所以立信知勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜將失其民欲安得乎待命而已受君之禄是以聚黨有黨而爭命罪孰大焉公使胥童夷羊五帥甲八百將攻郤氏長魚矯請無用衆公使清沸魋助之抽戈結袵而偽訟者三郤將謀於榭矯以戈殺駒伯苦成叔於其位温季曰逃威也遂趨矯及諸其車以戈殺之皆尸諸朝士武子㑹字季食邑於隨及范故稱隨季或稱范季焉文公時武子尚少城濮之戰晉中軍風于澤亡大斾之左旃祁瞞干命司馬殺之以狥於諸侯使茅茷伐之師還濟河舟之僑先歸武子攝右振旅愷以入于晉獻俘授馘飲至大賞徴㑹討貳殺舟之僑以徇于國民於是大服武子與謀焉襄公卒靈公少晉人以難故欲立長君趙孟謀立公子雍使先蔑及武子如秦逆雍將還穆嬴日抱太子以哭于朝趙孟患之乃背先蔑立靈公以禦秦師潛師夜起敗秦師于令狐至于刳首先蔑奔秦武子從之武子在秦三年不見先蔑其人曰能亡人於國不能見於此焉用之武子曰吾與之同罪非義之也將何見焉靈公六年秦伯伐晉取羈馬趙盾禦之㬰駢曰秦不能乆請深壘固軍以待之從之秦人欲戰秦伯謂武子曰若何而戰對曰趙氏新出其屬曰㬰駢必實為此謀將以老我師也趙有側室曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡㬰駢之佐上軍也若使輕者肆焉其可秦伯以璧祈戰于河十二月戊午秦師掩晉上軍上軍不動趙穿追之不及反怒曰裹糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也穿曰我不知謀將獨出乃以其屬出趙盾曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏秦行人夜戒晉師曰兩君之士皆未憗也明日請相見也㬰駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止秦師夜遁侵晉入瑕而還七年晉使詹嘉處瑕以守桃林之塞始患秦之用士㑹也夏六卿相見於諸浮趙盾曰隨㑹在秦賈季在狄難日至矣若之何中行桓子曰請復賈季能外事且由舊勲郤成子曰賈季亂且罪大不如隨㑹能賤而有耻柔而不犯其知足使也且無罪乃使魏夀餘偽以魏叛者以誘士㑹執其帑於晉使夜逸請自歸于秦秦伯許之履武子之足於朝秦伯師於河西魏人在東夀餘曰請東人之能與夫二三有司言者吾與之先使武子武子辭曰晉人虎狼也若背其言臣死妻子為戮無益於君不可悔也秦伯曰若背其言所不歸爾帑者有如河乃行繞朝贈之以䇿曰子無謂秦無人吾謀適不用也既濟魏人譟而還秦人歸其帑其處者為劉氏靈公失道趙盾患之將諌武子曰諫而不入則莫之繼也㑹請先不入則子繼之三進及溜而後視之曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉詩曰靡不有初鮮克有終夫如是則能補過者鮮矣君能有終則社稷之固也豈惟羣臣頼之又曰衮職有闕惟仲山甫補之能補過矣君能補過衮不廢矣景公三年楚莊王圍鄭荀林父帥師救鄭鄭楚已平桓子欲還武子曰善㑹聞用師觀釁而動徳刑政事典禮不易不可敵也不為是征楚君討鄭怒其貳而哀其卑叛而伐之服而舍之徳刑成矣昔嵗入陳今兹入鄭民不罷勞君無怨讟政有經矣荆尸而舉商農工賈不敗其業而卒乘輯睦事不奸矣蒍敖為宰擇楚國之令典軍行右轅左追蓐前茅慮無中權後勁百官象物而動軍政不戒而備能用典矣其君之舉也内姓選扵親外姓選於舊舉不失徳賞不失勞老有加惠旅有施舍君子小人物有服章貴有常尊賤有等威禮不逆矣徳立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也子姑整軍而經武乎猶有弱而昧者何必楚仲虺有言曰取亂侮亡兼弱也汋曰於鑠王師遵養時晦耆昧也武曰無競惟烈撫弱耆昧以務烈所可也先縠曰不可乃以中軍佐濟晉師從之果敗于邲七年春武子帥師滅赤狄甲氏及留吁鐸辰三月獻狄俘景公請于王戊申以黻冕命武子將中軍且為太傅於是晉國之盗逃奔于秦羊舌職曰吾聞之禹稱善人不善人逺此之謂也夫詩曰戰戰兢兢如臨深淵如履薄冰善人在上也善人在上則無幸民諺曰民之多幸國之不幸也是無善人之謂也冬晉侯使武子平王室定王享之原襄公相禮殽烝武子私問其故王聞之召武子曰季氏而弗聞乎王享有體薦宴有折俎公當享卿當宴王室之禮也武子歸而講求典禮以修晉國之法郤克之怒齊也誓欲報之還請伐齊公弗許武子將老召其子爕曰爕乎吾聞之喜怒以類者鮮易者實多詩曰君子如怒亂庶遄沮君子如祉亂庶遄已君子之喜怒以巳亂也弗巳必益之郤子其或者欲已亂於齊乎不然余懼其益之也余將老使郤子逞其志庶有豸乎爾從二三子惟敬乃請老郤獻子為政文子退朝而暮武子曰何暮也對曰有秦客庾辭於朝大夫莫之對也吾知三焉武子怒曰大夫非不能也讓父兄也爾童子而三掩衆於朝吾不在晉國亡無日矣擊之以杖郤子伐齊師勝而返文子後入武子曰無為吾望爾也乎對曰師有㓛國人喜而逆之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣故文子為政有令名晉國頼之士文子爕字叔武子告老公以文子為上軍佐從郤克敗齊師於鞌景公十七年聘于魯言伐郯以其事吳故也成公賂之請緩師文子不可曰君命無貳失信不立禮無加貨事無二成君後諸侯是寡君不得事君也爕將復之季孫懼使宣伯帥師㑹伐郯齊侯来朝公使韓穿言于魯以汶陽之田歸于齊於是諸侯皆貳十八年晉㑹諸侯于蒲季文子曰徳則不競尋盟何為文子曰勤以撫之寛以待之堅彊以御之眀神以要之柔服而伐貳徳之次也公觀于軍府見鐘儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰伶人也公曰能樂乎對曰先公之職官也敢有二事使與之琹操南音公曰君王何如對曰非小人之所能知也固問之對曰其為太子也師保奉之以朝于嬰齊而夕于側也不知其他也公以語文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也名其二卿尊君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟君盍歸之使合晉楚之成公從之重為之禮使歸求成厲公元年秦晉為成將㑹于令狐厲公先至焉秦桓公不肯渉河次于王城使史顆盟厲公于河東晉郤犫盟秦桓公于河西文子曰是盟也何益齊盟所以質信也㑹所信之始也始之不從其可質乎秦伯歸而背晉成二年㑹楚公子罷許偃盟于宋西門之外厲公既立三郤驕君多欲文子慮難之將作也欲自弱以致諸侯之師冀其懼而増徳焉六年公將伐鄭文子不可曰若逞吾願諸侯皆叛晉可以逞若惟鄭叛晉國之憂可立侯也欒書曰不可以當吾世而失諸侯必伐鄭乃興師楚子救鄭晉師濟河聞楚師將至文子欲反曰我偽逃楚可以紓憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣書曰不可六月晉楚遇於鄢陵文子不欲戰郤至曰韓之戰惠公不振旅箕之役先軫不反命邲之師荀林父不復從皆晉之耻也子亦見先君之事矣今我辟楚又益耻也文子曰吾先君之亟戰也有故秦狄齊楚皆彊不盡力子孫將弱今三彊服矣敵楚而巳唯聖人能内外無患自非聖人外寜必有内憂盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳軍吏患之士匄趨進曰塞井夷竈陳於軍中而䟽行首晉楚唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉既戰楚師大敗共王中目乃遁晉入楚軍三日榖文子立於君馬之前曰君幼諸臣不佞何以及此君其戒之周書曰惟命不于常有徳之謂安知天之不授晉且以勸楚乎文子反自鄢陵使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者惟祝我使我速死無及於難范氏之福也七年六月戊辰士爕卒冬難作始於三郤卒及於公范宣子匄范文子爕之子也厲公之末年士匄尚幼欒書謀弑厲公執公以召士匄士匄辭之悼公五年楚子囊為令尹宣子曰我喪陳矣楚人討貳而立子囊必改行而疾討陳陳近於楚民朝夕急能無徃乎有陳非吾事也無之而後可八年宣子聘于魯告將用師于鄭公享之宣子賦標有梅季武子曰誰敢哉今譬於草木寡君在君君之臭味也歡以從命何時之有武子賦角弓將出武子賦彤弓宣子曰城濮之役我先君文公獻功于衡雍受彤弓于襄王以為子孫藏匄也先君守官之嗣也敢不承命君子以為知禮十年王叔陳生與伯輿爭政王右伯輿王叔陳生怒而出奔及河王復之殺史狡以説焉不入遂處之公使宣子平王室王叔與伯輿訟焉王叔之宰與伯輿之大夫瑕禽坐獄於王庭宣子聽之王叔之宰曰蓽門圭竇之人而皆陵其上其難為上矣瑕禽曰昔平王東遷吾七姓從王牲用備具王賴之而賜之騂毛之盟曰世世無失職若蓽門圭竇其能来東底乎且王何頼焉今自王叔之相也政以賄成而刑放於寵官之師旅不勝其富吾能無蓽門圭竇乎唯大國圖之下而無直則何謂正矣宣子曰天子所右寡君亦右之所左亦左之使王叔與伯輿合要王叔氏不能舉其契故王叔来奔十三年荀瑩士魴卒悼公蒐于緜上治兵使士匄將中軍辭曰伯游長昔臣習於智伯是以佐之非能賢也請從伯㳺荀偃將中軍士匄佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起韓起願上趙武君其聽之使趙武將上軍韓起佐之欒黶將下軍魏絳佐之新軍無帥公難其人使其什吏率其卒乘官屬以從於下軍禮也晉國之民是以大和諸侯遂睦君子曰讓禮之主也范宣子讓其下皆讓欒黶為汰弗敢違也晉國以平數世頼之刑善也夫一人刑善百姓休和可不務乎書曰一人有慶兆民頼之其寜惟永其是之謂乎周之興也其詩曰儀形文王萬邦作孚言刑善也及其衰也其詩曰大夫不均我從事獨賢言不讓也世之治也君子尚能而讓其下小人農力以事其上是以上下有禮而䜛慝黜逺由不爭也謂之懿徳及其亂也君子稱其功以加小人小人伐其技以馮君子是以上下無禮亂虐並生由爭善也謂之昬徳國家之敝恒必由之呉侵楚為楚所敗十四年呉告敗于晉晉㑹諸侯于向為呉謀楚故也宣子數呉之不徳以退呉人執莒公子務婁以其通於楚也將執戎子駒支宣子親數諸朝曰來姜戎氏昔秦人迫逐乃祖吾離于𤓰州乃祖吾離被苫蓋䝉荆棘以來歸我先君我先君惠公有不腆之田與女剖分而食之今諸侯之事我寡君不如昔者蓋言語漏洩則職汝之由詰朝之事爾無與焉與將執女對曰昔秦人負恃其衆貪于土地逐我諸戎惠公蠲其大徳謂我諸戎是四嶽之裔胄也毋是翦棄賜我南鄙之田狐狸所居豺狼所嘷我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不畔之臣至于今不貳昔文公與秦伐鄭秦人竊與鄭盟而舍戌焉於是乎有殽之師晉禦其上戎亢其下秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之與晉踣之戎何以不免自是以来晉之百役與我諸戎相繼于時以從執政猶殽志也豈有離逷今官之師旅無乃實有所闕以擕諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不達何惡之能為不與於㑹亦無瞢焉賦青蠅而退宣子辭焉使即事於㑹成愷悌也是嵗也宣子假羽毛於齊而弗歸齊人始貳平公三年伐齊齊侯禦諸平隂諸侯之士門焉齊人多死齊侯懼宣子告析文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰曰君固無勇而又聞是弗能乆矣齊師夜遁四年荀偃卒宣子為政侵齊及榖聞喪而還於四月丁未鄭公孫蠆卒赴於晉大夫宣子言于公以其善扵伐秦也六月公請于王王追賜之大路使以行禮也欒桓子娶扵范宣子生懐子桓子嘗逐范鞅鞅以其亡也怨欒氏故與欒盈為公族大夫而不相能桓子卒欒祁與其老州賔通幾亡室矣懐子患之祁懼其討也愬諸宣子曰盈將為亂以范氏為死桓子而專政矣曰吾父逐鞅也不怒而以寵報之又與吾同官而專之吾父死而益富死吾父而專於國有死而已吾蔑從之矣其謀如是懼害於主吾不敢不言范鞅為之徴懐子好施士多歸之宣子畏其多士也信之懐子為下卿六年宣子使城著而遂逐之秋欒盈出奔楚宣子殺箕遺黄淵嘉父司空靖邴豫董叔邴師申書羊舌虎叔羆而囚伯華叔向籍偃知起中行喜州綽邢蒯出奔齊皆欒氏之黨也樂王鮒謂宣子曰盍反州綽邢蒯勇士也宣子曰彼欒氏之勇也余何獲焉王鮒曰子為彼欒氏則亦子之勇也欒盈自楚適齊八年齊人潛内欒盈于曲沃盈率曲沃之甲因魏獻子以晝入絳樂王鮒侍坐於宣子或告曰欒氏至矣宣子懼王鮒曰奉君以走固宫必無害矣且欒氏多怨子為政欒氏自外子在位其利多矣既有利權又執民柄將何懼焉欒氏所得其唯魏氏乎而可彊取也夫克亂在權子無懈矣公有姻喪王鮒使宣子墨縗冐絰二婦人輦以如公奉公以如固宫范鞅逆魏舒則成列既乘將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乗持帯遂超乗右撫劍左授帯命驅之出僕請鞅曰之公宣子逆諸階執其手賂之以曲沃初斐豹𨽻也著於丹書欒氏之力臣曰督戎國人懼之斐豹謂宣子曰茍焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如日乃出豹而閉之督戎從之踰隱而待之督戎踰入豹自後撃而殺之范氏之徒在臺後欒氏乗公門宣子謂鞅曰矢及君屋死之鞅用劒以帥卒欒氏退攝車從之遇欒樂曰樂免之死將訟女於天樂射之不中又注則乗槐本而覆或以㦸鉤之斷肘而死欒魴傷欒盈奔曲沃宣子使圍之既克盡殺欒氏之族黨欒魴出奔宋宣子卒趙武代之范獻子鞅宣子匄之子也悼公十四年晉師伐秦至於棫林荀偃為中軍帥令於軍欒黶將下軍惡偃之專也先率其屬以歸軍師不和偃懼敗乃命大還欒黶之弟鍼為戎右曰此役也報櫟之敗也役又無功晉之耻也吾有二位於戎路敢不耻乎與士鞅馳秦師死焉士鞅反欒黶謂士匄曰余弟不欲徃而子召之余弟死而子来是而子殺余之弟也弗逐余亦將殺之士鞅奔秦秦伯問士鞅曰晉大夫其誰先亡對曰其欒氏乎秦伯曰以其汰乎對曰然欒黶汰虐已甚猶可以免其在盈乎秦伯曰何故對曰武子之徳在民如周人之思召公焉愛其甘棠况其子乎欒黶死盈之善未能及人武子所施沒矣而黶之怨實章於是乎在秦伯以為知言為之請於晉而復之既歸怨欒氏故與欒盈為公族大夫而不相能宣子之逐盈也鞅實啟之盈入而敗則亦鞅之力也平公二十一年魯昭公来朝莒人愬昭公于晉公欲止之范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉公從之二十三年獻子如衛弔且反戚田頃公十一年晉㑹諸侯于扈謀納魯昭公宋衛固以為請獻子取貨於季孫謂司城子梁與北宫貞子曰季孫未知其罪而君伐之請囚請亡於是乎不獲君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也休公徒之怒而啟叔孫氏之心不然豈其伐人而脫甲執冰以游叔孫氏懼禍之濫而自同於季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有天之贊有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復定公三年魏子合諸侯之大夫于狄泉遂田于大陸還卒於寗范獻子為政去其柏椁以其未復命而田也趙成子衰字子輿其先造父事周穆王封於趙城故以為氏造父七世孫叔帯始入晉事文侯叔帯五世為趙夙獻公使為将滅耿滅霍滅魏賜趙夙耿夙生共孟共孟生成子成子事獻公之子重耳驪姬之難成子從公子出奔狄居狄十二年從公子去狄適齊自齊適楚是時晉惠公卒秦穆公召公子於楚將納之成子從公子入秦秦穆公歸公子女五人懐嬴與焉公子以懐嬴經為子圉妻也將辭焉問於成子成子對曰禮志有之將有請於人必先有入焉欲人之愛已也必先愛人欲人之從已也必先從人無徳於人而求用於人罪也今將㛰媾以從秦受好以愛之聽從以徳之懼其未可也又何疑焉公子乃歸女而納幣且逆之他日穆公將享公子公子使子犯從子犯曰吾不如衰之文也請使衰從使成子從穆公享公子如享國君之禮成子相如賔公子賦河水公賦六月成子曰重耳拜賜公子降拜稽首公降一級而辭焉成子曰君稱所以佐天子者命重耳重耳敢不拜穆公納公子於晉是為文公文公之二年受原於周而難其守問於寺人勃鞮對曰昔趙衰以壺飱從徑餒而弗食公以成子為原大夫四年公將蒐于被廬作三軍謀元帥成子曰郤縠可臣亟聞其言矣說禮樂而敦詩書詩書義之府也禮樂徳之則也徳義利之本也夏書曰賦納以言明試以功車服以庸君其試之公從之使郤縠將中軍以成子為卿成子辭曰欒枝貞慎先軫有謀胥臣多聞皆可以為輔佐臣弗如也乃使欒枝將下軍先軫佐之取五鹿先軫之謀也郤縠卒使先軫代之胥臣將下軍公使成子為卿辭曰夫三徳者偃之出也以徳紀民其章大矣不可廢也使狐偃為卿辭曰毛之智賢於臣其齒又長毛也不在位不敢聞命乃使狐毛將上軍狐偃佐之狐毛卒使成子代之辭曰城濮之役先且居之佐軍也善軍伐有賞善軍有賞能其官有賞且居有三賞不可廢也且臣之倫箕鄭胥嬰先都在乃使且居將上軍公曰趙衰三讓其所讓皆社稷之衛也廢讓是廢徳也以成子之故蒐于清原作五軍使成子將新上軍箕鄭佐之嬰將新下軍先都佐之子犯卒蒲城伯請佐公曰夫趙衰三譲不失義讓推賢也義廣徳也徳廣賢至又何患矣請令衰也從子乃使成子佐上軍五年而成子卒趙宣子盾成子之子也成子從文公在狄狄人伐廧咎如獲其二女叔隗季隗而納諸文公文公取季隗而以叔隗妻成子生盾成子居晉時取文公女曰趙姬生原同屏括樓嬰及從文公反國趙姬請盾與其母成子辭姬曰得寵而忘舊何以使人必逆之固請許之来以盾為才固請于公以為適子而使其三子下之以叔隗為内子而已下之成子卒宣子将中軍始為國政制事典正法罪辟刑獄董逋逃由質要治舊洿本秩禮續常職出滯淹既成以授太傅陽處父太師賈佗使行諸晉國以為晉法襄公卒太子夷臯少晉人以難故謀立長君宣子欲立公子雍曰雍好善而長其母杜祈以君故讓偪姞而上之以狄故讓季隗而已次之先君以是愛其子而仕諸秦為亞卿焉秦大而近母義子愛足以威民立之不亦可乎使先蔑士㑹如秦逆公子雍秦康公以兵送之將入穆嬴日抱太子以啼于朝曰將焉寘此出朝則抱以適趙氏頓首言於宣子曰先君屬是子於子也言猶在耳其忍棄之宣子畏偪乃背先蔑以禦秦師箕鄭居守宣子將中軍先克佐之荀林父將上軍先蔑將下軍先都佐之歩招御戎戎津為右及菫隂宣子曰我若受秦秦則賔也不受宼也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐宼如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起遂敗秦師于令狐至于刳首先蔑奔秦士㑹從之師還太子即位是為靈公靈公元年狄人侵魯魯使告于晉宣子使因賈季問狄相酆舒且讓之酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也二年宣子㑹諸侯之大夫盟于衡雍六年秦以令狐之役来伐取覊馬宣子禦之從秦師于河曲秦師夜遁初邾文公元妃齊姜生定公二妃晉姬生㨗菑文公之卒也邾人立定公㨗菑奔晉八年宣子以諸侯之師八百乗納㨗菑于邾邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還十三年楚莊王及鄭人侵陳遂侵宋宣子率師救陳宋㑹于棐林於是靈公侈宣子驟諫而不入故不競於楚靈公不君患宣子使鉏麑賊之晨徃寢門闢矣盛服將朝尚早坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死十五年公飲宣子酒伏甲將攻之其右提彌眀知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉眀搏而殺之宣子曰棄人用犬雖猛何為鬭且出提彌明死之初宣子田于首山舍于翳桑見靈輙餓問其病曰不食三日矣食之舍其半問之曰宦三年矣未知母之存否今近焉請以遺之使盡之而為之簞食與肉寘諸橐以與之既而與為公介倒㦸以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡也宣子出奔趙穿自後攻公扵桃園弑之穿宣子從父昆弟之子也宣子聞難未出山而復太史董狐書曰趙盾弑其君宣子曰不然對曰子為正卿亡不越境反不討賊非子而誰宣子曰烏乎我之懐矣自詒伊慼其我之謂乎宣子使趙穿逆公子黒臀于周而立之是為成公晉自驪姬之難詛無畜羣公子自是晉無公族成公立乃宧卿之適而為之田以為公族又宦其餘子亦為餘子其庶子為公行晉於是有公族餘子公行宣子請以括為公族曰君姬氏之愛子也㣲君姬氏則臣狄人也公許之以宣子為旄車之族使屏季以其故族為公族大夫宣子卒郤缺為政趙文子武莊子朔之子而宣子盾之孫也莊子為下軍將早卒趙嬰齊通于莊姬原同屏季放之景公十七年莊姬以趙嬰之亡也譖於公曰原屏將為亂欒郤為徴公討趙氏殺趙同趙括文子從姬氏畜于公宫故免公以其田與祁奚韓厥言於公曰成季之勲宣孟之忠而無後為善者其懼矣三代之令王皆數百年保天之禄夫豈無辟王頼前哲以免也周書曰不敢侮鰥寡所以眀徳也乃立武而反其田焉此與史記趙世家所載異當以春秋為正後二年景公夢大厲被髮及地摶膺而踊曰殺余孫不義余得請於帝矣壞大門及寢門而入公懼入於室又壞戸公覺召桑田巫巫言如夢公曰何如曰不食新矣是嵗景公卒大厲者趙氏之先也悼公立使文子為卿十三年為上軍帥平公十一年代范宣子為政文子令薄諸侯之幣而重其禮魯叔孫穆叔見之謂穆叔曰自今以徃兵其少弭矣齊崔慶新得政將求善於諸侯武也知楚令尹若敬行其禮道之以文辭以靖諸侯兵可以弭矣十三年文子及楚令尹子木合諸侯之大夫盟于宋弭兵也鄭簡公享文子于垂隴子展伯有子西子産子大叔二子石從文子曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志子展賦草蟲文子曰善哉民之主也抑武也不足以當之伯有賦鶉之賁賁文子曰牀笫之言不踰閾况在野乎非使人之所得聞也子西賦黍苖之四章文子曰寡君在武何能焉子産賦隰桑文子曰武請受其卒章子大叔賦野有蔓草文子曰吾子之惠也印叚賦蟋蟀文子曰善哉保家之主也公孫叚賦桑扈文子曰匪交匪敖福將焉徃若保是言也欲辭福禄得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賔榮其能乆乎幸而後亡叔向曰然已侈所謂不及五稔者夫子之謂矣文子曰其餘皆數世之主也子展其後亡者也在上不忘降印氏其次也樂而不荒樂以安民不滛以使之後亡不亦可乎楚子木卒文子喪之如同盟君子以為知禮十五年悼公之夫人食輿人之城杞者絳縣人或年長矣無子而徃與於食有與疑年使之年曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰魯叔仲惠伯㑹郤成子于承匡之嵗也是嵗也狄伐魯叔孫莊叔於是乎敗狄于鹹獲長狄僑如及虺也豹也而皆以名其子七十三年矣史趙曰亥有二首六身下二如身是其日數也士文伯曰然則二萬二千六百有六旬也文子問其縣大夫則其屬也召之而謝過焉曰武不才任君之大事以晉國之多虞不能由吾子使吾子辱在泥塗乆矣武之罪也敢謝不才遂士之使助為政辭以老與之田使為君復陶以為絳縣師而廢其輿尉於是魯使者在晉歸以語諸大夫季武子曰晉未可媮也有趙孟以為大夫有伯瑕以為佐有史趙師曠而咨度焉有叔向女齊以師保其君其朝多君子其庸可媮乎勉事之而後可是嵗文子㑹諸侯之大夫于澶淵魯穆叔至自㑹謂孟孝伯曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八九十者弗能乆矣十七年文子及楚令尹子圍尋宋之盟㑹諸侯之大夫于虢宋之盟也楚人先㰱子木復衷甲焉文子不與之競及是祁午謂文子曰宋之盟楚人得志於晉今令尹之不信諸侯之所聞也子弗戒懼又如宋子木之信稱於諸侯猶詐晉而駕焉况不信之尤者乎楚重得志於晉晉之耻也子相晉國以為盟主於今七年矣再合諸侯三合大夫服齊狄寜東夏平秦亂城淳于師徒不煩國家不罷民無謗讟諸侯無怨天無大災子之力也有令名矣而終之以耻午也是懼吾子不可以不戒文子曰武受賜矣然宋之盟子木有禍人之心武有仁人之心是楚所以駕於晉也今武猶是心也楚又行僭非所害也武將信以為本循而行之譬如農夫是穮是蓘雖有饑饉必有豐年且吾聞之能信不為人下吾未能也詩曰不僭不賊鮮不為則信也能為人則者不為人下矣吾不能是難楚不為患令尹享文子賦大眀之首章文子賦小宛之二章文子謂叔向曰令尹自以為王矣文子歸及魯叔孫曹大夫過鄭鄭伯兼享之子皮戒文子禮終文子賦匏葉子皮遂戒穆叔且告之穆叔曰趙孟欲一獻子其從之子皮曰敢乎穆叔曰夫人之所欲也又何不敢及享具五獻之籩豆於幕下文子辭私於子産曰武請於冡宰矣乃用一獻文子為客禮終乃宴穆叔賦鵲巢文子曰武不堪也又賦采蘩曰小國為蘩大國省穡而用之其何實非命子皮賦野有死麕之卒章文子賦常棣且曰吾兄弟比以安尨也可使無吠穆叔子皮及曹大夫興拜舉兕爵曰小國頼子知免於戾矣飲酒樂文子出曰吾不復此矣天王使劉定公勞文子於潁館於雒汭劉子曰美哉禹功明徳逺矣㣲禹吾其魚乎吾與子弁冕端委以治民臨諸侯禹之力也子盍亦逺績禹功而大庇民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將知而耄及之者其趙孟之謂乎為晉正卿以主諸侯而儕於隸人朝不謀夕棄神人矣神怒民叛何以能乆趙孟不復年矣神怒不歆其祀民叛不即其事祀事不從又何以年秦景公之弟鍼曰后子奔晉見文子文子曰吾子其曷歸對曰鍼懼選於寡君是以在此將待嗣君文子曰秦君何如對曰無道文子曰亡乎對曰何為亡世無道國未艾也國於天地有與立焉不數世滛弗能斃也文子曰天乎對曰有焉文子曰其㡬何對曰鍼聞之國無道而年榖和熟天贊之也鮮不五稔文子視䕃曰朝夕不相及誰能待五后子出而告人曰趙孟將死矣主民翫嵗而愒日其與㡬何是嵗平公疾求醫於秦秦景公使醫和視之曰疾不可為也是謂近女室疾如蠱非鬼非食惑以喪志良臣將死天命不佑文子問之曰良臣孰謂對曰主是謂矣語具醫和傳中冬十二月晉既烝文子適南陽將㑹孟子餘甲辰朔烝於温庚戍卒文子嘗與叔譽觀乎九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎文子曰行并植扵晉國不沒其身其知不足稱也其舅犯乎文子曰見利不顧其君其仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子為知人文子其中退然如不勝衣其言呐呐然如不出諸其口所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉晉獻文子成室諸大夫發焉張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也北面再拜稽首君子謂之善頌善禱趙簡子鞅一名志父景子成之子而文子武之孫也頃公九年簡子㑹諸侯之大夫于黄父令諸大夫曰輸王粟具戌人眀年將納王十年遂入敬王于周十三年簡子及荀寅帥師城汝濱遂賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書仲尼曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之民是以能尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法以為盟主今棄是度也而為刑鼎民在鼎矣何以尊貴貴何業守貴賤無序何以為國且夫宣子之刑夷之蒐也晉國之亂制也若之何以為法蔡史墨曰范氏中行氏其亡乎中行寅為下卿而干上令擅作刑噐以為國法是法姦也又加范氏焉易之亡也其及趙孟趙孟與焉然不得已若徳可以免定公十一年魯季氏之臣陽虎作亂奔晉簡子受之仲尼曰趙氏其世有亂乎十二年簡子帥師圍衛衛人貢五百家命置之邯鄲眀年簡子謂邯鄲大夫午曰歸我衛貢吾將移之晉陽午不用命簡子殺午圍邯鄲荀寅范吉射親於午將攻趙氏董安于聞之告簡子曰先備諸簡子曰晉國有命始禍者死為後可也安于曰與其害於民寜我獨死請以我説簡子不可既而范氏中行氏伐趙氏之宫簡子奔晉陽晉人圍之知文子言於公曰君命大臣始禍者死載書在河今三臣首禍而鞅獨逐刑其頗焉請并逐寅與吉射於是荀躒韓不信魏曼多奉公以伐范中行氏不克二子遂伐公國人助公二子敗奔朝歌韓魏請趙氏於公公許之簡子入于絳知文子之嬖梁嬰父惡董安于言於文子曰不殺安于使終為政於趙氏趙氏必得晉國盍以其先發難也討於趙氏文子使告簡子曰范中行氏雖信為亂安于則發之是安于與謀亂也晉國有命始禍者死二子既伏其辜矣敢以告簡子患之安于曰我死而晉國寜趙宗定將焉用生人誰不死吾死莫矣乃縊而死簡子尸諸市而告於知氏曰主命戮罪人安于既伏其罪矣敢以告知伯從簡子盟而後趙氏定祀安于於廟初衛靈公之太子蒯聵得罪於靈公之夫人南子出奔于晉靈公卒蒯聵之子輙立為君十九年夏六月簡子帥師納蒯聵于戚宵迷陽虎曰右河而南必至焉使太子絻八人衰絰偽自衛逆者告於門哭而入遂居之秋八月齊人輸范氏粟鄭子姚子般送之士吉射逆之簡子禦之遇於戚陽虎曰吾車少以兵車之斾與罕駟兵車先陳罕駟自後随而從之彼見吾貌必有懼心於是乎㑹之必大敗之卜戰龜焦樂丁曰爰始爰謀爰契我龜謀協以故兆詢可也簡子誓曰范氏中行氏反易天眀斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天眀從君命經徳義除詬耻在此行也克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣隸圉免志父無罪君實圖之若其有罪絞縊以戮桐棺三寸不設屬辟素車襆馬無入于兆下卿之罸也將戰郵無恤御簡子衛大子為右登鐵上望見鄭師衆太子懼自投于車下子良授太子綏而乗之曰婦人也簡子廵列曰畢萬匹夫也七戰皆獲有馬百乗死於牖下羣子勉之死不在宼繁羽御趙羅宋勇為右羅無勇麇之吏詰之御對曰痁作而伏衛太子禱曰曽孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛鄭人撃簡子中肩斃于車中獲其蠭旗太子救之以戈鄭師比獲温大夫趙羅太子復伐之鄭師大敗獲齊粟千車簡子喜曰可矣傳傁曰雖克猶有知在憂未艾也初周人與范氏田公孫尨税焉趙氏得而獻之吏請殺之簡子曰為其主也何罪止而與之田及鐵之戰以徒五百人宵攻鄭師取蠭旗於子姚之幕下獻曰請報主徳追鄭師姚般公孫林殿而射前列多死簡子曰國無小既戰簡子曰吾伏弢嘔血鼓音不衰今日我上也太子曰吾救主於車退敵於下我右之上也郵良曰我兩靷將絶吾能止之我御之上也駕而乗材兩靷皆絶三十年公㑹呉王夫差于黄池及盟呉晉爭先呉人曰於周室我為長晉人曰於姬姓我為伯簡子呼司馬寅曰日旰矣大事未成二臣之罪也建鼓整列二臣死之長㓜必可知也對曰請姑視之反曰肉食者無墨今呉王有墨國勝乎太子死乎且夷徳輕不忍乆請少待之乃先晉人於是越人敗呉師獲其太子友夫差歸及越平衛太子自戚入于衛是為莊公簡子使告於衛曰君之在晉也志父為主請君若太子来以免志父不然寡君其曰志父之為也莊公辭以難太子又使㭬之三十四年簡子圍衛齊國觀陳瓘救衛得晉人之致師者子玉使服而見之曰國子實執齊柄而命瓘曰無辟晉師豈敢廢命子又何辱簡子曰我卜伐衛未卜與齊戰乃還是嵗冬簡子復伐衛入其郛將入城簡子曰止叔向有言曰怙亂滅國者無後衛人出莊公而與晉平簡子立襄公之孫般師而還三十七年簡子卒趙襄子無恤簡子之子其母翟婢也簡子有太子伯魯而無恤賢疑所立乃書訓戒之辭於二簡以授二子曰謹識之三年而問之伯魯不能舉其辭求其簡已失之矣問無恤誦其辭甚習求其簡出諸袖中而奏之於是簡子以無恤為能立以為後簡子卒定公三十七年越圍呉襄子降於喪食楚隆曰三年之喪親暱之極也主又降之無乃有故乎襄子曰黄池之役先主與吳王有質曰好惡同之今越圍吴嗣子不廢舊業而敵之非晉之所能及也吾是以為降楚隆曰若使呉王知之若何襄子曰可乎隆曰請嘗之乃徃先造于越軍曰呉犯間上國多矣聞君親討焉諸夏之人莫不欣喜唯恐君志之不從請入視之許之告於呉王曰寡君之老無恤使陪臣隆敢展謝其不共黄池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠使問襄子曰句踐將生憂寡人寡人死之不得矣王曰溺人必笑吾將有問也史黯何以得為君子對曰黯也進不見惡退無謗言王曰宜哉知襄子荀瑶素惡襄子知伯之伐鄭也將攻門命襄子入之對曰主在此知伯曰惡而無勇何以為子對曰以能忍耻庶無害趙宗乎知伯不悛襄子由是惎知伯初簡子使尹鐸為晉陽請曰以為繭絲乎抑為保障乎簡子曰保障哉尹鐸損其戸數簡子謂襄子曰晉國有難而無以尹鐸為少以晉陽為逺必以為歸及知伯為政請地于韓康子康子與之又請地於魏桓子桓子復與之又求蔡臯狼之地於襄子襄子弗與知伯怒帥韓魏之甲以攻之襄子將出曰吾何走乎從者曰長子近且城厚完襄子曰民罷力以完之又斃死以守之其誰與我從者曰邯鄲之倉庫實襄子曰浚民之膏澤以實之又因而殺之其誰與我其晉陽乎先主之所屬也尹鐸之所寛也民必和矣乃走晉陽三家圍而灌之城不没者三版沈竈産鼃民無叛意知伯行水魏桓子御韓康子驂乗知伯曰吾乃今知水可以亡人國也桓子肘康子康子履桓子之跗以汾水可以灌安邑絳水可以灌平陽也襄子知二子有異志使其臣張孟談潛出見二子曰臣聞之脣亡則齒寒趙亡則韓魏為之次矣二子乃隂與約為之期日而遣之於是襄子夜殺守隄之吏而决水灌知伯軍知伯軍亂韓魏翼而撃之襄子將卒犯其前大敗其衆遂殺知伯滅其族而分其地是嵗也距春秋凡二十有七年云荀桓子林父字伯文公時為戎御文公之五年公作三行以禦敵桓子將中行故别稱荀氏為中行氏襄公之卒也太子尚㓜趙孟欲立公子雍使先蔑如秦桓子止之曰夫人太子猶在而外求君此必不行子以疾辭若何不然將及攝卿以徃可也何必子同官為僚吾嘗同僚敢不盡心乎弗聽為賦板之三章又弗聽及亡桓子盡送其帑及其噐用財賄於秦曰為同寮故也靈公十年宋人弑昭公明年桓子㑹諸侯之大夫伐宋討曰何故弑君猶立文公而還十三年桓子以諸侯之師伐宋宋及晉平宋文公受盟於晉又㑹諸侯于扈將為魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟于楚成公四年赤狄伐我圍懷及邢邱公欲伐之桓子曰使疾其民以盈其貫將可殪也周書曰殪戎殷此類之謂也景公二年代郤缺為政楚子圍鄭入自皇門鄭伯請降楚子許之六月晉師救鄭桓子將中軍先縠佐之士㑹將上軍郤克佐之趙朔將下軍欒書佐之趙括趙嬰齊為中軍大夫鞏朔趙穿為上軍大夫荀首趙同為下軍大夫韓厥為司馬及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之楚歸而動不後士㑹欒書皆然之惟先縠不可曰晉所以覇師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失覇不如死且成師以出敵彊而退非夫也命為軍帥而卒以非夫唯羣子能我弗為也以中軍佐濟韓厥謂桓子曰彘子以偏師陷子罪大矣子為元帥師不用命誰之罪也失屬亡帥為罪已重不如進也事之不㨗惡有所分與其専罪六人同之不猶愈乎師遂濟及戰晉師敗于邲桓子歸而請死公欲許之士貞子諫曰不可城濮之役晉師三日榖文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬬况國相乎及楚殺子玉公喜而後可知也曰莫余毒也已是晉再克而楚再敗也楚是以再世不競今天或者大警晉也而又殺林父以重楚勝其無乃乆不競乎林父之事君也進思盡忠退思補過社稷之衛也若之何殺之夫其敗也如日月之食焉何損於明晉侯使復其位五年晉為邲故伐鄭告於諸侯蒐焉而還桓子之謀也曰示之以整使謀而来鄭人大懼潞子嬰兒之夫人景公之姊也酆舒為政而殺之又傷潞子之目六年公使桓子伐之敗赤狄于曲梁滅潞酆舒奔衛衛人歸諸晉晉人殺之公賞桓子狄臣千室亦賞士伯以𤓰衍之田曰獲狄土子之功也㣲子吾喪伯氏矣是嵗林父卒子荀庚立知武子荀罃知莊子荀首之子而中行桓子林父之季弟也莊子别食知邑故别稱荀氏為知氏景公二年邲之役桓子將中軍莊子為下軍大夫鄭已服楚桓子欲還彘子不可莊子曰此師殆哉周易有之在師之臨曰師出以律否臧凶執事順成為臧逆為否衆散為弱川壅為澤有律以如已也故曰律否臧且律竭也盈而以竭夭且不整所以凶也不行之謂臨有帥而不從臨孰甚焉此之謂矣果遇必敗彘子尸之雖免而歸必有大咎既濟而戰晉師敗績楚熊負覊囚武子以歸莊子以其族反之厨武子御下軍之士多從之每射抽矢菆納諸厨子之房厨子怒曰非子之求而蒲之愛董澤之蒲可勝既乎莊子曰不以人子吾子其可得乎吾不可以茍射故也射連尹襄老獲之遂載其尸射公子榖臣囚之以二者還景公十一年莊子佐中軍欲因鄭而歸王子與襄老之尸以求武子所善鄭皇戍言之于楚王王許之眀年歸武子於晉王送之曰子其怨我乎對曰二國治戎臣不才不勝其任以為俘馘執事不以釁鼓使歸就戮君之恵也臣之不才又誰敢怨王曰然則徳我乎對曰二國圗其社稷而求紓其民各逞其忿以相宥也兩釋纍囚以成其好二國有好臣不與及其誰敢徳王曰子歸何以報我對曰臣不任受怨君亦不任受徳無怨無徳不知所報王曰雖然必告不榖對曰以君之靈纍臣得歸骨於晉寡君之以為戮死且不朽若從君惠而免之以賜君之外臣首首其請於寡君而以戮於宗亦死且不朽若不獲命而使嗣宗職次及扵事而帥偏師以修封疆雖遇執事其弗敢違其竭力致死無有二心以盡臣禮所以報也王曰晉未可與爭重為之禮而歸之武子之在楚也鄭賈人有將寘諸禇中以出既謀之未行而楚人歸之賈人如晉武子善視之如實出己者賈人曰吾無其功敢居其實吾小人也不可以厚誣君子遂適齊厲公六年武子佐下軍以諸侯之師侵陳至于鳴鹿遂侵蔡鄭人猶未服也武子如魯乞師以伐鄭厲公失道八年春正月欒書荀偃使人弑公使武子與士魴逆周子于京師周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從將安用之二三子用我今日否亦今日共而從君神之所福也對曰羣臣之願也敢不唯命是聽庚午盟而入二月乙酉周子即位於朝是為悼公悼公之二年㑹諸侯于戚謀鄭故也魯孟孫蔑曰請城虎牢以偪鄭武子曰善鄫之㑹吾子聞崔子之言今不来矣滕薛小邾之不至皆齊故也寡君之憂不唯鄭罃將復於寡君而請於齊得請而告吾子之功也若不得請事將在齊吾子之請諸侯之福也豈唯寡君頼之眀年悼公盟諸侯于雞澤齊世子光聽于㑹是㑹也許靈公不至冬武子帥師伐許八年楚子囊伐鄭討其侵蔡也子展欲從晉師子駟不可乃及楚平使王子伯駢告於晉武子使行人子員對曰君有楚命亦不使一介行李告扵寡君而即安于楚君之所欲誰敢違君寡君將帥諸侯以見于城下唯君圖之九年武子代韓厥為政㑹諸侯之師以伐鄭魯季武子齊崔杼宋皇鄖從武子門于剸門衛北宫括曹人邾人從荀偃韓起門于師之梁滕人薛人從欒黶士魴門于北門杞人郳人從趙武魏絳斬行栗甲戌師于杞令於諸侯曰修噐備盛餱糧歸老㓜居疾于虎牢肆眚圍鄭鄭人恐乃行成荀偃曰遂圍之以待楚人之救也而與之戰不然無成武子曰許之盟而還師以敝楚人吾三分四軍與諸侯之鋭以逆来者於我未病楚不能矣猶愈於戰暴骨以逞不可以爭大勞未艾君子勞心小人勞力先王之制也乃許鄭成十一月己亥同盟于戲鄭服也將盟鄭士莊子為載書鄭子騑易其辭語具子騑傳中荀偃請改載書武子曰我實不徳而要人以盟豈禮也哉非禮而何以主盟姑盟而退修徳息師而來終必獲鄭何必今日我之不徳民將棄我豈惟鄭若能休和逺人將至何恃於鄭乃盟而還十年夏四月悼公㑹諸侯于柤荀偃士匄欲伐偪陽而封宋向戍焉武子曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克諸侯之師乆於偪陽荀偃士匄請於武子曰水潦將降懼不能歸請班師知伯怒投之以機出於其間曰女成二事而後告余余恐亂命以不女違女既勤君而興諸侯牽帥老夫以至于此既無武守而又欲易余罪曰是實班師不然克矣余羸老也可重任乎七日不克必爾乎取之五月庚寅荀偃士匄帥卒攻偪陽親受矢石甲午滅之是㑹也宋公享公於楚邱請以桑林武子辭荀偃士匄曰諸侯宋魯於是乎觀禮魯有禘樂賓祭用之宋以桑林享君不亦可乎舞師題以旌夏公懼而退入于房去旌卒享而還及著雍疾卜桑林見荀偃士匄欲奔請禱焉武子不可曰我辭禮矣彼則以之猶有鬼神於彼加之已而公疾有間冬諸侯之師城虎牢而戍之晉師城梧及制士魴魏絳戍之諸侯之師還鄭而南至於陽陵楚師不退武子欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之耻也合諸侯以益耻不如死我將獨進師遂進與楚夹潁而軍鄭子蟜潛渉潁以從楚師盟欒黶欲伐鄭師武子曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑克不可命不如還也遂還師侵鄭北鄙而歸其後鄭人懼又以晉之不疾我也故服於晉中行獻子荀偃字伯游荀庚之子而桓子之孫也厲公六年為上軍佐從欒書敗楚扵鄢陵八年與欒書謀弑君而立悼公悼公十年與士匄攻偪陽滅之十三年代荀罃將中軍十四年㑹諸侯之大夫伐秦師濟涇而次秦人毒涇上流師人多死鄭司馬子蟜帥鄭師以進師皆從之至於棫林不獲成焉獻子令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未是有也余馬首欲東乃歸下軍從之左史謂魏莊子曰不待中行伯乎莊子曰夫子命從帥欒伯吾帥也吾將從之從帥所以待夫子也伯㳺曰吾令實過悔之何及多遺秦禽乃命大還衛獻公奔于齊悼公問衛故於獻子對曰不如因而㝎之衛有君矣伐之未可以得志而勤諸侯史佚有言曰因重而撫之仲虺有言曰亡者侮之亂者取之推亡固存國之道也君其定衛以待時乎公從之平公元年公與諸侯宴于温使諸大夫舞曰歌詩必類齊高厚之詩不類獻子怒且曰諸侯有異志矣使諸大夫盟高厚高厚逃歸三年獻子將伐齊夢與厲公訟弗勝公以戈撃之首墜於前跪而戴之奉之以走見梗陽之巫臯他日見諸道與之言同巫曰今茲主必死若有事於東方則可以逞獻子許諾公伐齊將濟獻子以朱絲繋玉二㲄而禱曰齊環怙恃其險負其衆庶棄好背盟陵虐神主曽臣彪將帥諸侯以討焉其官臣偃實先後之茍㨗有功無作神羞官臣偃無敢復濟唯爾有神裁之沈玉而濟齊侯禦諸平隂塹防門而守之廣里夙沙衛曰不能戰莫如守險弗聴諸侯之士門焉齊人多死齊侯登巫山以望我師晉人使司馬斥山澤之險雖所不至必斾而䟽陳之使乗車者左實右偽以斾先輿曳柴而從之齊侯見之畏其衆也乃脱歸齊師夜遁師曠告公曰鳥烏之聲樂齊師其遁邢伯告獻子曰有班馬之聲齊師其遁叔向告公曰城上有烏齊師其遁諸侯之師遂入平隂從齊師魯衛請攻險獻子士匄以中軍克京滋魏絳欒盈以下軍克邿音詩趙武韓起以上軍圍盧弗克遂及秦周伐雍門之荻范鞅門于雍門其御追喜以戈殺犬于門中孟莊子斬其槆𠡠倫反以為公琴遂焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木既又焚東郭北郭范鞅門于揚門州綽門于東閭左驂迫還于門中以枚數闔齊侯駕將走郵棠太子與郭榮叩馬曰師速而疾畧也將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之太子抽劍斷鞅乃止晉師東侵及濰南及沂明年春諸侯還自沂上遂次于泗上疆魯田取邾田自漷水歸于魯魯侯享晉六卿賄獻子束錦加璧乗馬先呉夀夢之鼎焉於是獻子癉疽生瘍於頭濟河及著雍病目出大夫先歸者皆反士匄請見弗内請後曰鄭甥可二月甲寅卒而視不可含宣子盥而撫之曰事呉敢不如事主猶視欒懐子曰其為未卒事於齊故也乎乃復撫之曰主茍終所不嗣事於齊者有如河乃瞑受含中行穆子荀呉獻子偃之子也平公十一年公使聘魯召襄公也十七年帥師伐無終及羣狄于太原用魏舒之謀敗之事具魏獻子傳昭公五年穆子帥師伐鮮虞圍鼓鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民知所適則事無不濟或以吾城叛吾所甚惡也人以城来吾獨何好焉賞所甚惡若所好何若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守偹圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而不取勤民而頓兵何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊賈怠無卒棄舊不祥鼓人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子鳶鞮歸既獻而反之頃公立以陸渾氏睦於楚欲伐之范宣子夢文公攜荀呉而授之陸渾故使穆子帥師公使屠蒯如周請有事於雒與三塗公從之萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戎備穆子帥師渉自棘津使祭史先用牲于雒陸渾人弗知師從之庚午遂滅陸渾數之以貳於楚也陸渾子奔楚其衆奔甘鹿師歸獻俘於文宫初穆子之取鼓也既獻而反鼓子焉頃公之六年又叛而屬諸鮮虞穆子畧東陽使師偽糴者負甲以息於晉陽之門外遂襲鼓滅之以鼓子鳶鞮歸使渉佗守之令鼓人各復其所鼓子之臣曰夙沙釐以其孥行軍吏執之辭曰我君是事非事土也名曰君臣豈曰土臣今君實遷臣何頼於鼓穆子召之曰鼓有君矣爾心事君吾定而禄爵對曰臣委質於狄之鼓未委質於晉之鼓也臣聞之委質為臣無有二心委質而䇿死古之法也君有烈名臣無叛質敢即私利以煩司宼而亂舊法其若不虞何穆子歎曰吾何徳之務而有是臣也乃使行既獻言於公與鼓子田於河隂使夙沙釐相之中行文子荀寅穆子呉之子也初蔡昭侯朝楚楚令尹囊瓦拘之三年然後歸蔡侯怨如晉請伐楚定公六年諸侯㑹于召陵謀伐楚也荀寅求貨於蔡侯弗得言於范獻子曰國家方危諸侯方貳將以襲敵不亦難乎水潦方降疾瘧方起中山不服棄盟取怨無損于楚而失中山不如辭蔡侯吾自方城以来楚未可以得志祗取勤焉獻子從之乃辭蔡侯既而蔡侯以呉師伐楚遂入郢㡬滅楚國晉之失諸侯由荀寅也趙鞅之族趙午别封於邯鄲謂之邯鄲午鞅嘗伐衛衛人懼貢五百家鞅置之邯鄲十五年鞅謂午曰歸我衛貢吾舍諸晉陽午許諾歸告其父兄父兄不可午遂倍命鞅怒召午而殺之午荀寅之甥也荀寅范吉射之姻也而相與睦不直趙孟於是荀寅范吉射伐趙氏之宫趙鞅奔晉陽晉人圍之范臯夷無寵於范吉射而欲為亂於范氏梁嬰父嬖於知文子文子欲以為卿韓簡子與荀寅相惡魏襄子亦與范吉射相惡故五子謀將逐荀寅而以梁嬰父代之逐范吉射而以范臯夷代之荀躒言于公曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑不鈞矣請皆逐之故荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子將伐公齊高疆曰三折肱知為良醫唯伐君為不可民弗與也我以伐君在此矣三家未睦可盡克也克之君將誰與若先伐君是使睦也弗聽遂伐之國人助公二子敗從而伐之荀寅范吉射奔於朝歌韓魏以趙氏為請故趙鞅歸于晉二十年趙鞅圍朝歌師於其南荀寅伐其郛使其徒自北門入已犯師而出奔邯鄲明年趙鞅圍邯鄲邯鄲降荀寅奔鮮虞鮮虞納荀寅于柏人又明年晉圍柏人荀寅范吉射奔齊初范氏之臣王生惡張栁朔言諸吉射使為柏人吉射曰夫非而讎乎對曰私讎不及公好不廢過惡不去善義之經也臣敢違之及范氏出張栁朔謂其子爾從主勉之我將止死王生授我矣吾不可以僭之遂死於柏人伯宗晉大夫孫伯糾之子也景公之六年楚子伐宋宋人使樂嬰齊来告急公欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之彊能違天乎諺曰高下在心川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也君其待之乃止景公之姊潞子嬰兒之夫人也酆舒為政而殺之又傷潞子之目公將伐之諸大夫皆曰不可酆舒有三雋才不如待後之人伯宗曰必伐之狄有五罪雋才雖多何補焉不祀一也耆酒二也棄仲章而奪黎氏地三也虐我伯姬四也傷其君目五也怙其雋才而不以茂徳兹益罪也後之人或者將敬奉徳義以事人神而申固其命若之何待之不討有罪曰將待後後有辭而討焉母乃不可乎夫恃才與衆亡之道也商紂由之故滅天反時為災地反物為妖民反徳為亂亂則妖災生故文反正為乏盡在狄矣公從之故滅潞卒殺酆舒十四年梁山崩公以傳召伯宗遇大車當道而覆立而避之曰避傳對曰傳為速也若俟吾避則加遲矣不如㨗而行伯宗喜問其居曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壊而崩可若何國主山川故山崩川竭君為之不舉降服乗縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何伯宗請見之不可遂以告而從之十五年伯宗夏陽説衛孫良夫寗相鄭人伊雒之戎陸渾蠻侵宋以其辭㑹也師於鍼衛人不保説欲襲衛曰雖不可入多俘而歸有罪不及死伯宗曰不可衛唯信晉故師在其郊而不設備若襲之是棄信也雖多衛俘而晉無信何以求諸侯乃止師還衛人登陴聞説謀故也厲公之五年三郤害伯宗譖而殺之及欒弗忌韓獻子曰郤氏其不免乎善人天地之紀也而驟絶之不亡何待初伯宗朝以喜歸其妻曰子貌有喜何也曰吾言扵朝諸大夫皆謂我智似陽子對曰陽子華而無實主言而無謀是以難及其身子何喜焉伯宗曰吾飲諸大夫酒而與之語爾試聽之曰諾既飲其妻曰諸大夫莫子若也然而民不戴其上乆矣難必及子乎盍亟索士整庇州犁焉得畢陽及伯宗將遇害畢陽實送州犁于荆羊舌肸字叔向晉武公子伯僑之後也伯僑之孫突為羊舌大夫因以為氏突生職事悼公佐中軍尉肸職之子也博識多文辭悼公十四年從荀偃伐秦平公立使叔向為傅三年從公伐齊齊師夜遁叔向以城上有烏也先知之以告於公是役也楚師伐鄭董叔以天道在西北南師不時必無功叔向曰在其君之徳也四年從士匄㑹諸侯于柯初叔向之母妬叔虎之母美而不使其子皆諌其母其母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍女女敝族也國多大寵不仁人間之不亦難乎余何愛焉使徃視寢生叔虎美而有勇力欒盈嬖之六年士匄逐欒盈殺叔虎囚叔向焉人謂叔向曰子離於罪其謂不知乎叔向曰與其死亡若何詩曰優哉游哉聊以卒嵗知也樂王鮒見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向叔向曰必祁大夫室老聞之曰樂王鮒言扵君無不行求救吾子吾子不許祁大夫所不能也而曰必由之何也叔向曰樂王鮒從君者也何能行祁大夫外舉不棄讎内舉不失親其獨遺我乎詩曰有覺徳行四國順之夫子覺者也晉侯問叔向之罪於樂王鮒對曰不棄其親其有焉於是祁奚老矣聞之乗馹而見宣子曰詩云惠我無疆子孫保之書曰聖有謨訓明徴定保夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今壹不免其身以棄社稷不亦惑乎鯀殛而禹興伊尹放太甲而相之卒無怨色管蔡為戮周公右王若之何其以虎也棄社稷子為善誰敢不勉多殺何為宣子説與之乗以言諸公而免之不見叔向而歸叔向亦不告免焉而朝是嵗士匄錮欒氏㑹諸侯於商任齊侯衛侯不敬叔向曰二君者必不免㑹朝禮之經也禮政之輿也政身之守也怠禮失政失政不立是以亂也十一年衛人侵戚東鄙孫林父愬於晉晉戌茅氏衛伐茅氏殺晉戌三百人晉以孫氏故執衛殤公齊侯鄭伯為衛故如晉公兼享之公賦嘉樂國景子相齊侯賦蓼蕭子展相鄭伯賦緇衣叔向命公拜二君曰寡君敢拜齊君安我先君之宗祧也敢拜鄭君之不貳也國子使晏平仲私於叔向曰晉君宣其明徳於諸侯恤其患而補其闕正其違而治其煩所以為盟主也今為臣執君若之何叔向告趙文子文子以告公公言衛侯之罪使叔向告二君國子賦轡之柔矣子展賦將仲子兮公乃許歸衛侯叔向曰鄭七穆罕氏其後亡乎子展儉而壹明年宋向戍弭兵晉楚㑹諸侯之大夫盟于宋將盟楚人衷甲趙孟患之叔向曰何害匹夫一為不信單斃而死若合諸侯之卿以為不信必不㨗矣食言者不病非子之患也夫以信召人而以僭濟之必莫之與也安能害我且吾因宋以守病則夫能致死與宋致死雖倍楚可也子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也及盟晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也乆矣豈專在晉叔向謂趙孟曰諸侯歸晉之徳只非歸其尸盟也子務徳無爭先且諸侯盟小國固必有主盟者楚為晉細不亦可乎乃先楚人已而宋公兼享晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對子木歸以語王曰宜晉之覇也有叔向以佐其卿楚無以當之未可與爭也十七年趙武㑹楚公子圍于虢公子圍設服離衛趙武問叔向曰令尹自以為王矣如何對曰王弱令尹彊其可哉雖然必不終也趙孟曰何故曰彊以克弱而安之彊不義也不義而彊其斃必速令尹為王必求諸侯晉少懦矣諸侯將徃若獲諸侯其虐滋甚民弗堪也將何以終夫以彊取不義而克必以為道道以淫虐弗可乆已矣楚子干来奔從車五乗叔向使與秦公子同食皆百人之餼趙孟曰秦公子富叔向曰底禄以徳徳鈞以年年鈞以尊公子以國不聞以富夫以千乗去其國彊禦已甚詩曰不侮鰥寡不畏彊禦秦楚匹也使后子與子干齒十八年韓須如秦逆女齊陳無宇送女致少姜少姜有寵於平公公謂之少齊謂陳無宇非卿執諸中都少姜為之請曰送從逆班畏大國也猶有所易是以亂作叔向言於公曰彼何罪君使公族逆之齊使上大夫送之猶曰不共君求以貪國則不共而執其使君刑已頗何以為盟主且少姜有辭遂歸無宇二十一年韓宣子如楚送女叔向為介鄭子皮子太叔勞諸索氏太叔謂叔向曰楚王汰侈已甚子其戒之叔向曰汰侈已甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復從而不失儀敬而不失威道之以訓辭奉之以舊法考之以先王度之以二國雖汰侈若我何及楚楚子欲辱韓起薳啟彊諫之乃厚為宣子禮王欲敖叔向以其所不知而不能亦厚其禮而歸之明年鄭鑄刑書叔向詒子産書曰始吾有虞於子今則已矣昔先王議事以制不為刑辟懼民之有爭心也猶不可禁禦是故閑之以義糾之以政行之以禮守之以信奉之以仁制為禄位以勸其從嚴斷刑罸以威其淫懼其未也故誨之以忠聳之以行教之以務使之以和臨之以敬莅之以彊斷之以剛猶求聖哲之上明察之官忠信之長慈惠之師民於是乎可任使也而不生禍亂民知有辟則不忌於上並有爭心以徴於書而徼幸以成之弗可為矣夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國作封洫立謗政制參辟鑄刑書將以靖民不亦難乎詩曰儀式刑文王之典日靖四方又曰儀刑文王萬邦作孚如是何辟之有民知爭端矣將棄禮而徴於書錐刀之末將盡爭之亂獄滋豐賄賂並行終子之世鄭其敗乎肸聞之國將亡必多制其此之謂乎復書曰若吾子之言僑不才不能及子孫吾以救世也既不承命敢忘大惠是嵗楚公子棄疾来聘報韓子也宣子之適楚也楚人弗逆棄疾及境公將亦弗逆叔向曰楚辟我衷若何効辟詩曰爾之教矣民胥傚矣從我而已焉用效人之辟書曰聖作則無寜以善人為則而則人之辟乎匹夫為善民猶則之况國君乎公説乃逆之昭公元年楚子在申召蔡靈侯靈侯將徃其大夫曰王貪而無信唯蔡是憾今幣重言甘誘我也不如無徃蔡侯不可楚子伏甲而饗蔡侯於申醉而執之殺之刑其士七十人使公子棄疾帥師圍蔡韓宣子問扵叔向曰楚其克乎對曰克哉蔡侯獲罪於其君而不能其民天將假手於楚以斃之何故不克然肸聞之不信以幸不可再也楚王奉孫呉以討於陳曰將定而國陳人聽命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能乆矣桀克有緡以喪其國紂克東夷而隕其身楚小位下而亟暴於二王能無咎乎天之假助不善非祚之也厚其凶惡而降之罰也且譬之如天其有五才而將用之力盡而敝之是以無拯不可復振單子㑹韓宣子于戚視下言徐叔向曰單子其將死乎朝有著定㑹有表衣有襘帯有結㑹朝之言必聞于表著之位所以昭事序也視不過結襘之中所以道容貌也言以命之容貌以眀之失則有闕今單子為王官伯而命事於㑹視不登帯言不過歩貌不道容而言不昭矣不道不共不昭不從無守氣矣嵗終單子卒是嵗魯人葬齊歸公無慼容大蒐于比蒲叔向曰魯公室其卑乎君有大喪國不廢蒐有三年之喪而無一朝之慼國不恤喪不忌君也君無慼容不顧親也能無卑乎後十五年而魯君孫于齊三年楚子干歸于楚楚人弑靈王以立之韓宣子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難對曰無與同好誰與同惡取國有五難有寵而無人一也有人而無主二也有主而無謀三也有謀而無民四也有民而無徳五也子干在晉十三年矣晉楚之從不聞達者可謂無人族盡親叛可謂無主無釁而動可謂無謀為覉終世可謂無民亡無愛徴可謂無徳王虐而不忌楚君子干渉五難以弑舊君誰能濟之有楚國者其棄疾乎君陳蔡城外屬焉苛慝不作盗賊隠伏私欲不違民無怨心先神命之國民信之芈姓有亂必季實立楚之常也獲神一也有民二也令徳三也寵貴四也居常五也有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又逺之其貴亡矣其寵棄矣民無懐焉國無與焉將何以立宣子曰齊桓晉文不亦是乎對曰齊桓衛姬之子也有寵於僖有鮑叔牙賔須無隰朋以為輔佐有莒衛以為外主有國高以為内主從善如流下善齊肅不藏賄不從欲施舍不倦求善不厭是以有國不亦宜乎我先君文公狐季姬之子也有寵於獻好學而不貳生十七年有士五人有先大夫子餘子犯以為腹心有魏犨賈佗以為股肱有齊宋秦楚以為外主有欒郤狐先以為内主亡十九年守志彌篤惠懐棄民民從而與之獻無異親民無異望天方相晉將何以代文此二君者異扵子干共有寵子國有奥主無施於民無援於外去晉而不送歸楚而不逆何以冀國子干果敗卒立者棄疾如其言焉昭公成虒祁諸侯皆有二心為魯取郠故將率諸侯以討之叔向曰諸侯不可以不示威乃並徴㑹治兵于邾南甲車四千乗羊舌鮒攝司馬遂合諸侯于平邱次于衛地叔鮒求貨于衛淫芻蕘者衛人使屠伯饋叔向羮與一篋錦曰諸侯事晉未敢攜貳况衛在君之宇下而敢有異志芻蕘者異於他日敢請之叔向受羮反錦曰晉其有羊舌鮒者瀆貨無厭亦將及矣為此役也子若以君命賜之其已客從之未退而禁之晉將尋盟齊人不可公使叔向告劉獻公曰抑齊人不盟若之何對曰盟以底信君茍有信諸侯不貳何患焉告之以文辭董之以威武雖齊不許君庸多矣天子之老請帥王賦元戎十乗以先啟行遲速唯君叔向告於齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討貳則有尋盟若皆用命何盟之尋叔向曰國家之敗有事而無業事則不經有業而無禮經則不序有禮而無威序則不共有威而不昭共則不眀不眀棄共百事不終所由傾覆也是故明王之制使諸侯嵗聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明志業於好講禮於等示威於衆昭明於神自古以来未之或失也存亡之道恒由是興晉禮主盟懼有不治奉承齊犧而布諸君求終事也君曰余必廢之何齊之有唯君圖之寡君聞命矣齊人懼對曰小國言之大國制之敢不聽從既聞命矣敬共以徃遲速唯君叔向曰諸侯有間矣不可以不示衆八月辛未治兵建而不斾壬申復斾之諸侯畏之邾人莒人愬於晉曰魯朝夕伐我幾亡矣我之不共魯故之以公不見魯侯使叔向辭之曰諸侯將以甲戌盟寡君知不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絶兄弟之國棄周公之後亦唯君寡君聞命矣叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其率道其何敵之有牛雖瘠僨於豚上其畏不死南蒯子仲之憂其庸可棄乎若奉晉之衆用諸侯之師因邾莒杞鄫之怒以討魯罪間其二憂何求而弗克魯人懼聽命甲戌同盟于平邱魯君不與盟晉執季孫意如已而歸之恵伯曰寡君未知其罪合諸侯而執其老若猶有罪死命可也若曰無罪而恵免之諸侯不聞是逃命也何免之為請從君恵於㑹宣子患之謂叔向曰子能歸季孫乎曰不能鮒也能之乃使叔魚見季孫曰昔鮒也得罪於晉君自歸於魯君微武子之賜不至于今雖獲歸骨於晉猶子則肉之敢不盡情歸子而不歸鮒也聞諸吏將為子除館於西河其若之何且泣平子懼而先歸使恵伯待禮焉明年邢侯與雍子爭鄐田乆而無成士景伯如楚叔魚攝理韓宣子命㫁舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也雍子自知其罪而賂以賈直鮒也鬻獄邢侯專殺其罪一也已惡而掠美為昬貪以敗官為墨殺人不忌為賊夏書曰昬墨賊殺臯陶之刑也請從之乃施邢侯而尸雍子與叔魚於市孔子曰叔向古之遺直也治國制刑不隠於親三數叔魚之惡不為末減曰義也夫可謂直矣平邱之㑹數其賄也以寛衛國晉不為暴歸魯季孫稱其詐也以寛魯國晉不為虐邢侯之獄言其貪也以正刑書晉不為頗三言而除三惡加三利殺親益榮猶義也夫五年公使荀躒如周𦵏穆后籍談為介景王既𦵏除喪以文伯宴樽以魯壺王曰伯氏諸侯皆有以鎮撫王室晉獨無有何也文伯揖籍談對曰諸侯之封也皆受明噐於王室以鎮撫其社稷故能薦彛噐於王晉居深山戎狄之與鄰而逺於王室王靈不及拜戎不暇其何以獻噐王曰叔氏而忘諸乎叔父唐叔成王之母弟也其反無分乎密須之鼓與其大路文所以大蒐也闕鞏之甲武所以克商也唐叔受之以處參虗匡有戎狄其後襄之二路鏚鉞秬鬯彤弓虎賁文公受之以有南陽之田撫征東夏非分而何夫有勲而不廢有績而載奉之以土田撫之以彛噐旌之以車服明之以文章子孫不忘所謂福也福祚之不登叔父焉在且昔而高祖孫伯黶司晉之典籍以為大政故曰籍氏及辛有之二子董之晉於是乎有董史女司典之後也何故忘之籍談不能對歸以告叔向叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終王一嵗而有三年之喪二焉於是乎以喪賔宴又求彛噐樂憂甚矣且非禮也彛噐之来嘉功之由非由喪也三年之喪雖貴遂服禮也王雖弗遂宴樂以早亦非禮也禮王之大經也一動而失二禮無大經矣言以考典典以志經忘經而多言舉典將焉用之叔向卒其子楊食我有黨於祁盈祁盈之亂食我助之晉人殺祁盈并殺食我遂滅羊舌氏初叔向欲娶於申公巫臣氏其母欲娶其黨叔向曰吾母多而庶鮮吾懲舅氏矣其母曰子靈之妻殺三夫一君一子而亡一國兩卿矣可無懲乎吾聞之甚美必有甚惡是鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鍾美於是將必以是大有敗也昔有仍氏生女黰黒而甚美光可以鑑名曰元妻樂正后䕫取之生伯封實有豕心貪惏無饜忿纇無期謂之封豕有窮后羿滅之夔是以不祀且三代之亡共子之廢皆是物也女何以為哉夫有尤物足以移人茍非徳義則必有祸叔向懼不敢娶平公彊使娶之生伯石伯石始生子容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視司馬女齊字叔侯晉大夫平公十一年趙武㑹諸侯之大夫以討衛執寗喜北宫遺使女齊以先歸十四年齊高子容與宋司徒見於智伯叔齊相禮賔出叔侯言於智伯曰二子皆將不免子容專司徒侈皆亡家之主也智伯曰何如對曰專則速及侈將以其力斃專則人實斃之將及矣晉悼夫人杞出也魯嘗侵杞平公使司馬侯如魯治杞田弗盡歸也夫人愠曰齊也取貨先君若有知也不尚取之公告叔侯叔侯曰虞虢焦滑霍楊韓魏皆姬姓也晉是以大若非侵小將何所取武獻以下兼國多矣誰得治之杞夏餘也而即東夷魯周公之後也而睦於晉以杞封魯猶可而何有焉魯之於晉也職貢不乏玩好時至公卿大夫相繼於朝史不絶書府無虗月如是可矣何必瘠魯以肥杞且先君而有知也無寜夫人而焉用老臣十七年秦后子鍼来奔初后子有寵於桓如二君於景其母曰弗去懼選故鍼適晉其車千乗后子享晉侯造舟于河十里舍車自雍及絳歸取酬幣終事八反司馬侯問焉曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見叔侯以告公且曰秦后子必歸臣聞君子能知其過必有令圖令圖天所贊也二十年楚靈王使椒舉来聘且求諸侯公欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚唯天所相不可與爭君其許之而修徳以待其歸若歸於徳吾猶將事之况諸侯乎若適淫虐楚將棄之吾又誰與爭公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何鄉而不濟對曰恃險與馬而虞隣國之難是三殆也四嶽三塗陽城太室荆山中南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也從古以然是以先王務修徳音以享人神不聞其務險與馬也鄰國之難不可虞也或多難以固其國啟其疆土或無難以喪其國失其守宇若何虞難齊有仲孫之難而獲桓公至今賴之晉有里㔻之難而獲文公是以為盟主衛邢無難敵亦喪之故人之難不可虞也恃此三者而不修徳政則救亡不暇又何能濟君其許之紂作淫虐文王惠和商是以隕周是以興夫豈爭諸侯公乃許之二十一年魯昭公来朝自郊勞至于贈賄無失禮公謂女齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至於贈賄禮無違者何為不知禮焉曰是儀也不可謂禮禮所以守其國家行其政令無失其民者也今政令在家不能取也有子家羈弗能用也奸大國之盟陵虐小民利人之難不知其私公室四分民食於他思莫在公不圖其終為國君難將及身不恤其所禮之本末將於此乎在而屑屑焉習儀以亟言善於禮不亦逺乎君子謂叔侯於是乎知禮范宣子與和大夫爭田司馬侯見曰吾聞子有和之怒吾以為不信且子為正卿諸侯皆有二心是之不憂而怒和大夫非子之任也宣子卒從之司馬侯卒叔向見其子撫而泣之曰自此其父之死也吾無與比而事君者矣昔者其父始之我終之我始之夫子終之無不可者今夫子徃矣我無所比焉爾祁奚獻侯之後也其先食邑於祁故以為氏悼公即位祁奚為中軍尉羊舌職佐之及辭公問可代稱觧狐其讎也將立而卒又問焉對曰臣之子午也可午之少也婉以從令好學而不戲其長也彊志而用命守業而不淫其冠也柔恵小物而鎮定大事於是使祁午為中軍尉羊舌赤佐之君子曰祁奚可謂不黨矣外舉不隠仇内舉不隠子悼公以祁奚為公族大夫解揚字子虎晉大夫也景公六年楚子圍宋宋人使樂嬰齊来告急公欲救之伯宗不可告且待之乃使觧揚如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不榖而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命君之賂臣不知命也受命以出有死無霣又可賂乎臣之許君以成命也死而成命臣之禄也寡君有信臣下臣獲考死又何求楚子舍之以歸晉爵之為上卿欒武子書晉公族也靖侯之孫欒賔食邑於欒故以為氏世為晉卿景公三年楚莊王圍鄭武子佐下軍從荀林父救鄭鄭已服楚桓子欲還先縠不可武子曰楚自克庸已来其君無日不討國人而訓之于民生之不易禍至之無日戒懼之不可以怠在軍無日不討軍實而申儆之于勝之不可保紂之百克而卒無後訓之以若敖蚡冐蓽路藍縷以啟山林箴之曰民生在勤勤則不匱不可謂驕先大夫子犯有言曰師直為壯曲為老我則不徳而徼怨乎楚我曲楚直不可謂老其君之戎分為二廣廣有一卒卒偏之兩右廣初駕數及日中左則受之以至于昬内官序當其夜以備不虞不可謂無備子良鄭之良也師叔楚之崇也師叔入盟子良在楚楚鄭親矣来勸我戰我克則来不克遂徃以我卜也鄭不可從趙括趙同曰帥師以来唯敵是求克敵得屬又何俟必從彘子及戰晉師大敗十一年武子為下軍將從郤克伐齊大敗齊師而還十三年代郤獻子為政鄭公孫申帥師疆許田武子救許伐鄭取汜祭十五年楚公子嬰齊伐鄭武子救鄭與楚師遇於繞角楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰請於武子武子將許之知莊子范文子韓獻子諌曰不可吾来救鄭楚師去我吾遂至於此是遷戮也戮而不已又怒楚師必不克雖克不令成師以出而敗楚之二縣何榮之有焉若不能敗為辱已甚不如還也乃遂還於是軍師之欲戰者衆或謂武子曰聖人與衆同欲是以濟事子盍從衆子為大政將酌於民者也子之佐十一人其不欲戰者三人而已欲戰者可謂衆矣商書曰三人占則從二人衆故也武子曰善鈞從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎十七年武子侵蔡遂侵楚獲申驪侵沈獲沈子揖初從知韓范也君子曰從善如流宜哉詩曰愷悌君子遐不作人求善也夫作人斯有功績矣厲公三年秦桓公既與晉為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦於晉晉以諸侯之師伐秦使吕相絶秦曰昔逮我獻公及穆公相好戮力同心申之以盟誓重之以昏姻天禍晉國文公如齊恵公如秦無禄獻公即世穆公不忘舊徳俾我恵公用能奉祀于晉又不能成大勲而為韓之師亦悔于厥心用集我文公是穆之成也文公躬擐甲胄䟦履山川踰越險阻征東之諸侯虞夏商周之允而朝諸秦則亦既報舊徳矣鄭人怒君之疆場我文公帥諸侯及秦圍鄭秦大夫不詢於我寡君擅及鄭盟諸侯疾之將致命于秦文公恐懼綏静諸侯秦師克還無害則是我有大造於西也無禄文公即世穆為不弔蔑死我君寡我襄公迭我殽地奸絶我好伐我保城殄滅我費滑𣪚離我兄弟撓亂我同盟傾覆我國家我襄公未忘君之舊勲而懼社稷之隕是以有殽之師猶願赦罪於穆公穆公弗聽而即楚謀我天誘其衷成王隕命穆公是以不克逞志于我穆襄即世康靈即位康公我之自出又欲闕翦我公室傾覆我社稷帥我蝥賊以来蕩揺我邊疆我是以有令狐之役康猶不悛入我河曲伐我洓川俘我王官翦我羈馬我是以有河曲之戰東道之不通則是康公絶我好也及君之嗣也我君景公引領西望曰庶撫我乎君亦不恵稱盟利吾有狄難入我河縣焚我箕郜芟夷我農功䖍劉我邊垂我是以有輔氏之聚君亦悔禍之延而欲徼福於先君獻穆使伯車来命我景公曰吾與女同好棄惡復修舊徳以追念前勲言誓未就景公即世我寡君是以有令狐之㑹君又不祥背棄盟誓白狄及君同州君之仇讐而我昬姻也君来賜命曰吾與女伐狄寡君不敢顧昬姻畏君之威而受命於使君有二心於狄曰晉將伐女狄應且憎是用告我楚人惡君之二三其徳也亦来告我曰秦背令狐之盟而来求盟於我昭告昊天上帝秦三公楚三王曰余雖與晉出入余唯利是視不榖惡其無成徳是用宣之以懲不壹諸侯備聞此言斯是用痛心疾首暱就寡人寡人帥以聽命唯好是求君若恵顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退豈敢徼亂君若不施大恵寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圖利之於是武子将中軍郤錡佐之韓厥将下軍荀罃佐之趙旃将新軍郤至佐之郤􅐧御戎欒鍼為右孟獻子曰晉帥乗和師必有大功五月丁亥以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差及不更女父師遂濟涇及侯麗而還迓公如新楚六年楚子使公子成以汝隂之田求成于鄭故鄭叛晉公将伐鄭范文子不可武子曰不可以當吾世而失諸侯必伐鄭乃興師武子將中軍士爕佐之郤錡将上軍荀偃佐之韓厥將下軍郤至佐新軍荀罃居守晉師既起鄭人聞之使告於楚楚子救鄭子反将中軍子重将左子辛将右五月晉師濟河聞楚師至范文子欲反武子不可六月晉楚遇於鄢陵甲午晦楚晨壓晉軍而陳軍吏患之武子曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉及戰楚師大敗共王夜遁子反死之晉入楚軍三日榖厲公侈多内嬖反自鄢陵欲盡去羣大夫而立其左右胥童長魚矯皆嬖於公而怨郤氏告公曰必去諸大夫盍先三郤武子素惡郤氏亦以為言於是長魚矯殺郤犨郤錡郤至皆尸諸朝胥童以甲刼武子及中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人将忍君臣聞亂在外為姦在内為軌御姦以徳御軌以刑不施而殺不可謂徳臣偪而不討不可謂刑徳刑不立姦軌並至臣請行遂出奔狄公使辭於二子曰寡人有討於郤氏郤氏既伏其辜矣大夫無辱其復職位皆再拜稽首曰君討有罪而免臣於死君之恵也二臣雖死敢忘君徳乃皆歸公使胥童為卿公逰於匠麗氏武子中行偃遂執公焉召士匄韓厥皆辭之七年正月庚申武子中行偃使程滑弑厲公春秋書之曰晉弑其君州蒲不稱臣君無道也欒氏中行氏以車一乗𦵏公於翼東門之外使荀罃士魴逆周子於京師而立之是為悼公武子之子曰鍼鄢陵之役歩􅐧御厲公欒鍼為右有淖於前乃皆左右相違於淖欒范以其族夹公行陷於淖欒書将載公鍼曰書退國有大任焉得専之且侵官冐也失官慢也離局姦也有三罪焉不可犯也乃掀公以出於淖見子重之旌請於公曰楚人謂夫旌子重之麾也彼其子重也日臣之使於楚也子重問晉國之勇臣對曰好以衆整曰又何如臣對曰好以暇今兩國治戎行人不使不可謂整臨事食言不可謂暇請攝飲焉公許之使行人執榼承飲造於子重曰寡君乏使使鍼御持矛是以不得犒從者使某攝飲子重曰夫子嘗與吾言於楚必是故也不亦識乎受而飲之免使者而復鼓魏荘子絳武子犨之子也武子之父曰畢萬畢公高之後萬事獻公為大夫獻公賜之魏故以魏為氏獻公之二十一年武子從公子重耳出亡公子反國是為文公被廬之蒐荀林父御戎武子為右文公之為公子也過曹為曹共公所不禮其大夫僖負羈饋公子盤飱加璧焉及文公伐曹令無入僖負羈之宫而免其族武子與顛頡怒曰勞之不圖報於何有爇僖負羈氏武子傷於胸公欲殺之而愛其材使問且視之病将殺之武子束胸見使者曰以君之靈不有寧也距躍三百曲踊三百乃舍之殺顛頡以徇武子卒莊子嗣為大夫悼公元年命荘子為司馬三年公㑹諸侯盟於雞澤公弟揚干亂行於曲梁荘子戮其僕公怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也對曰絳無貳志事君不辟難有罪不逃刑其将来辭何辱命焉言終莊子至授僕人書將伏劍士魴張老止之公讀其書曰日君乏使使臣斯司馬臣聞師衆以順為武軍事有死無犯為敬君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪不能致訓至於用鉞臣之罪重敢不從以怒君心請歸死於司宼公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命寡人之過也子無重寡人之過敢以為請公於是以莊子為能以刑佐民矣反役與之禮食使佐新軍四年無終子使其臣孟樂来絳因莊子納虎豹之皮以請和諸戎公曰戎狄無親而貪不如伐之莊子曰諸侯新服陳新来和将觀於我我徳則睦否則攜貳勞師於戎而楚伐陳必不能救是棄陳也諸華必叛戎禽獸也獲戎失華無乃不可乎夏訓有之曰有窮后羿公曰后羿何如對曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不修民事而淫于原獸棄武羅伯因熊髠尨圉而用寒浞寒浞伯明氏之䜛子弟也伯明后寒棄之夷羿收之信而使之以為已相浞行媚於内而施賂於外愚弄其民而虞羿於田樹之詐慝以取其國家外内咸服羿猶不悛將歸自田家衆殺而亨之以食其子其子不忍食諸死於窮門靡奔有鬲氏浞因羿室生澆及豷恃其䜛慝詐偽而不徳於民使澆用師滅斟灌及斟尋氏處澆於過處豷于戈靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆于過后杼滅豷于戈有窮由是遂亡失人故也昔辛甲氏之為太史也命百官官箴王闕於虞人之箴曰芒芒禹跡畫為九州經啟九道民有寢廟獸有茂草各有攸處徳用不擾在帝夷羿冐于原獸亡其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫虞箴如是可不懲乎於是悼公好田故莊子及之公曰然則莫如和戎乎對曰和戎有五利焉戎狄荐居貴貨易土土可賈焉一也邊鄙不聳民狎其野穡人成功二也戎狄事晉四鄰振動諸侯懐威三也以徳綏戎師徒不勤甲兵不頓四也鑒於后羿而用徳度逺至邇安五也君其圖之公説使莊子盟諸戎修民事田以時九年冬公㑹諸侯之師伐鄭未能定鄭而歸公謀所以息民莊子請施舍輸積聚以貸自公以下茍有積者盡出之國無滯積亦無困人公無禁利亦無貪民祈以幣更賔以特牲噐用不作車服從給行之期年國乃有節三駕而楚不能與爭焉明年公以鄭未服故城梧及制使士魴及莊子戍之鄭人懼及晉平十一年鄭人賂公以師悝師觸師蠲廣車軘車淳十五乗甲兵備凡兵車百乘歌鍾二肆及其鏄磬女樂二八公以樂之半賜莊子曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也詩曰樂只君子殿天子之邦樂只君子福禄攸同便蕃左右亦是率從夫樂以安徳義以處之禮以行之信以守之仁以厲之而後可以殿邦國同福禄来逺人所謂樂也書曰居安思危思則有備有備無患敢以此規公曰子之教敢不承命抑㣲子寡人無以待戎不能濟河夫賞國之典也藏在盟府不可廢也子其受之荘子於是乎始有金石之樂禮也十三年為欒黶下軍佐不及當國而卒魏獻子舒莊子之子也平公十七年從中行穆子伐無終及羣狄於太原將戰獻子曰彼徒我車所遇又阨以什共車必克困諸阨又克請皆卒自我始乃毁車以為行五乘為三伍穆子之嬖人不肯即斬以徇為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之翟人笑之未陳而薄之大敗之頃公十二年祁盈作亂楊食我助之公殺祁盈及楊食我遂滅祁氏羊舌氏於是韓宣子卒獻子代為政分祁氏之田以為七縣分羊舌氏之田以為三縣司馬彌牟為鄔大夫賈辛為祁大夫司馬烏為平陵大夫魏戊為梗陽大夫知徐吾為塗水大夫韓固為馬首大夫孟丙為盂大夫樂霄為銅鞮大夫趙朝為平陽大夫僚安為楊氏大夫謂賈辛司馬烏為有力於王室故舉之謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也其四人者皆受縣而後見於獻子以賢舉也獻子謂成鱄吾與戊也縣人其以我為黨乎對曰何也戊之為人也遠不忘君近不偪同居利思義在約思純有守心而無淫行雖與之縣不亦可乎昔武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人皆舉親也夫舉無他惟善所在親疏一也詩曰唯此文王帝度其心莫其徳音其徳克明克明克類克長克君王此大國克順克比比於文王其徳靡悔既受帝祉施於孫子心能制義曰度徳正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長賞慶刑威曰君慈和徧服曰順擇善而從之曰比經緯天地曰文九徳不愆作事無悔故襲天禄子孫賴之主之舉也近文徳矣所及其逺哉賈辛將適其縣見於獻子獻子曰辛來昔叔向適鄭騣蔑惡欲觀叔向從使之收噐者而徃立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫今子少不颺子若無言吾㡬失子矣言不可以已也如是遂如故知今女有力於王室吾是以舉女行乎敬之哉毋墮乃力仲尼聞獻子之舉也以為義曰近不失親逺不失舉可謂義矣又聞其命賈辛也以為忠詩曰永言配命自求多福忠也獻子之舉也義其命也忠其長有後於晉國乎冬梗陽人有獄魏戊不能斷以獄上其大宗賂以女樂獻子将受之魏戊謂閻沒女寛曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待於庭饋入召之比置三歎既食使坐獻子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食饋之始至恐其不足是以歎中置自咎曰豈将軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已獻子辭梗陽人定公二年獻子合諸侯之大夫於狄泉尋盟且令城成周獻子南面衛彪徯曰魏子必有大咎干位以令大事非其任也詩曰敬天之怒不敢戲豫敬天之渝不敢馳驅况敢干位以作大事乎明年諸侯之大夫城成周獻子涖政彪徯復曰将建天子而易位以令非義也大事奸義必有大咎晉不失諸侯魏子其不免乎是行也獻子属役於韓簡子及原夀過而田於大陸焚焉還卒於寗士景伯彌牟文伯之子也世為大夫周景王崩敬王即位王子朝爭立敬王居于狄泉頃公使景伯涖周問故景伯立于乾祭而問于介衆衆不直子朝景伯辭子朝焉頃公之九年㑹諸侯於黄父謀王室也趙鞅令諸侯之大夫輸王粟具戍人曰眀年将納王宋樂大心曰我不輸粟我於周為客若之何使客景伯曰自踐土以来宋何役之不㑹何盟之不同曰同恤王室子焉得辟之子奉君命以㑹大事而宋背盟無乃不可乎右師不敢對受牒而退景伯告簡子曰宋右師必亡奉命以使而欲背盟以干盟主無不祥大焉定公二年諸侯之大夫城成周景伯計丈數揣高卑度厚薄仞溝洫物土方議逺邇量事期計徒庸慮材用書餱糧以令役於諸侯屬役賦文書以受帥而效諸劉子眀年将板築魏獻子屬役於韓簡子宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國於周以我適楚故我嘗從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷于邳仲虺居薛以為湯左相若復舊職将承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊為宋役亦其職也景伯曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎景伯怒謂韓簡子曰薛徴於人宋徴於鬼宋罪大矣且已無辭而抑我以鬼神誣我也啓寵納侮其此之謂矣必以仲㡬為戮乃執仲㡬以歸三月歸諸京師城三旬而畢韓獻子厥其曾祖萬曲沃莊伯之弟也萬得封於韓原曰武子因以韓為氏武子生求伯求伯生子輿子輿生獻子景公三年邲之戰獻子為司馬十一年從郤克伐齊戰於鞌齊師敗績晉人逐之三周華不注獻子夢其父子輿謂已曰且辟左右故中御而從齊侯齊邴夏御頃公逄丑父為右邴夏謂頃公曰射其御者君子也頃公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中綦毋張喪車從獻子曰請寓乗從左右皆肘之使立於後獻子俛定其右故逄丑父得與公易位将及華泉驂絓於木而止獻子執縶馬前再拜稽首奉觴加璧以進曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隠且懼奔辟而忝兩君臣辱戎士敢告不敏攝官承乏逄丑父使公下如華泉取飲頃公以免獻子獻丑父郤獻子将戮之丑父有辭獻子免之語具丑父傳眀年晉作六軍以獻子為卿賞鞌之功也十五年晉人謀去絳諸大夫皆曰必居郇瑕氏之地沃饒而近盬國利君樂不可失也獻子將新中軍且為僕大夫公揖而入獻子從公立於寢庭謂獻子曰何如對曰不可郇瑕氏土薄水淺其惡易覯易覯則民愁民愁則墊隘於是乎有沈溺重膇之疾不如新田土厚水深居之不疾有汾澮以流其悪且民從敎十世之利也夫山澤林盬國之寳也國饒則民驕佚近寳公室乃貧不可謂樂公説從之晉遂遷於新田是嵗獻子從欒武子救鄭將與楚戰獻子與知莊子范文子俱諫以為不可武子從之而還語具欒書傳中十七年公以孟姬故討趙同趙括而裂其田獻子言於公曰成季之勲宣孟之忠不可以無後於是公復立趙武而反其田焉趙氏之再建於晉者獻子之力也厲公三年獻子將下軍從欒書及秦師戰于麻隧秦師敗績六年楚共王侵鄭欒書欲報楚獻子曰無庸使重其罪民将叛之無民孰戰三郤害伯宗譖而殺之及欒弗忌獻子曰郤氏其不免乎善人天地之紀也而驟絶之不亡何待七年從欒書與楚戰于鄢陵楚師敗績八年欒書中行偃執厲公召獻子獻子辭曰昔吾畜於趙氏孟姬之䜛吾能違兵古人有言曰殺老牛莫之敢尸而況君乎二三子不能事君焉用厥也於是厲公遇弑晉人立悼公悼公立而欒書卒獻子為政楚人伐宋宋華元来告急獻子曰欲求得人必先勤之成覇安疆自宋始也悼公師於台谷以救宋遇楚師于靡角之谷楚師還悼公元年獻子帥諸侯之師伐鄭入其郛敗其徒兵於洧上於是東諸侯之師次於鄫以待晉師晉師自鄭以鄫之師侵楚焦夷及陳公及衛侯次于戚以為之援晉於是乎復覇七年而獻子老致其仕焉荀罃為政韓宣子起獻子之子也獻子之長子曰無忌為公族大夫有廢疾獻子之告老也将立之辭曰詩曰豈不夙夜謂行多露又曰弗躬弗親庶民弗信無忌不才讓其可乎請立起也與田蘓游而曰好仁詩曰靖共爾位好是正直神之聽之介爾景福恤民為徳正直為正正曲為直參和為仁如是則神聽之介福降之立之不亦可乎獻子從之使宣子朝遂老悼公謂無忌仁使掌公族大夫悼公之九年以宣子為卿佐上軍平公十二年宣子聘于周王使請事對曰晉士起將歸時事於宰旅無他事矣王聞之曰韓氏其昌阜於晉乎辭不失舊宋向戍善於趙文子又善於楚令尹子木欲弭諸侯之兵以為名先以告趙孟趙孟謀於諸大夫宣子曰兵民之殘也財用之蠧小國之大菑也将或弭之雖曰不可必将許之弗許楚必許之以召諸侯則我失為盟主矣文子從之於是晉楚合諸侯之大夫盟于宋十八年宣子代趙文子為政公使聘于晉觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王也魯昭公享之季武子賦緜之卒章宣子賦角弓季武子拜曰敢拜子之彌縫敝邑寡君有望矣武子賦節之卒章既享宴於季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無忘角弓遂賦甘棠宣子曰起不堪也無以及召公宣子遂如齊納幣見子雅子雅召子旗使見宣子宣子曰非保家之主也不臣見子尾子尾見彊宣子謂之如子旗大夫多笑之唯晏子信之曰夫子君子也君子有信其有以知之矣自齊聘於衛衛侯享之北宫文子賦淇澳宣子賦木𤓰焉十九年鄭簡公朝晉子豐之子公孫叚相甚敬而卑禮無違者平公嘉焉賜伯石州田州田欒氏之邑也欒氏亡范宣子趙文子韓宣子皆欲之文子曰温吾縣也二宣子曰自郤稱以别三傳矣晉之别縣不唯州誰獲治之文子病之乃舍之二宣子曰吾不可以正議而自與也皆舍之及文子為政趙獲曰可以取州矣文子曰退二子之言義也違義禍也余不能治縣又焉用州其以徼禍也君子曰弗知實難知而弗從禍莫大焉有言州必死豐氏故主韓氏伯石之獲州田也宣子為之請之為其復取之故是嵗宣子如齊逆女公孫蠆以其女更公女而嫁公子人謂宣子子尾欺晉晉胡受之宣子曰我欲得齊而逺其寵寵将来乎鄭罕虎来賀夫人且告曰楚人日徴敝邑以不朝立王之故敝邑之徃則畏執事其謂寡君而固有外心其不徃則宋之盟云進退罪也寡君使虎布之宣子使叔向對曰君若辱有寡君在楚何害修宋盟也君茍思盟寡君乃知免於戾矣君若不有寡君雖朝夕辱於敝邑寡君猜焉君實有心何辱命焉君其徃也茍有寡君在楚猶在晉也二十一年宣子如楚送女叔向為介楚靈王將以宣子為閽而使叔向為司宫用薳啟彊之諫厚為二子之禮而歸之昭公六年宣子聘于鄭初宣子有環其一在鄭商至是謁諸鄭伯子産曰非官府之守噐也寡君弗知宣子買諸賈人既成矣商人曰必告諸執政宣子請於子産子産對曰昔我先君桓公與商人皆出自周世有盟誓以相信也曰爾無我叛我無彊賈爾有寳賄我勿與知今吾子以好来辱而使敝邑與商人食言是敎敝邑背盟誓也毋乃不可乎宣子辭玉曰起不敏敢求玉以徼罪焉語具子産傳宣子歸六卿餞于郊宣子曰二三子請皆賦起亦以知鄭志子齹賦野有蔓草宣子曰孺子善哉吾有望矣子産賦鄭之羔裘宣子曰起不堪也子大叔賦褰裳宣子曰起在此敢勤子至於他人乎子太叔拜宣子曰善哉子之言是不有是事其能終乎子游賦風雨子旗賦有女同車子栁賦蘀兮宣子喜曰鄭其庶乎二三君子以君命貺起賦不出鄭志皆昵燕好也二三君子數世之主也可以無懼矣宣子皆獻馬焉而賦我将子産拜使五卿皆拜曰吾子靖亂敢不拜徳宣子私覲於子産以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢藉手以拜頃公十二年宣子卒魏獻子代為政苖賁皇楚令尹鬬椒之子也鬬椒作亂楚莊王殺之而滅其族成公二年賁皇來奔公以為大夫食菜於苗遂為氏景公八年使郤克徴會於齊齊頃公帷婦人以笑客郤克怒歸以言於公齊侯使高固晏弱蔡朝南郭偃會及斂盂高固逃歸夏復會于斷道辭齊人晉執晏弱于野王執蔡朝于原執南郭偃于温苖賁皇使見晏桓子歸言於公曰夫晏子何罪昔者諸侯事吾先君皆如不逮舉言羣臣不信諸侯皆有貳志齊君恐不得禮故不出而使四子來左右或沮之曰君不出必執吾使故高子及斂盂而逃夫三子者曰若絶君好寧歸死焉為是犯難而来吾若善逆彼以懐来者吾又執之以信齊沮吾不既過矣乎過而不改而又乆之以成其悔何利之有焉使反者得辭而害来者以懼諸侯将焉用之晉人緩而逸之厲公之五年伯宗為三郤所䜛見誅其子伯州犁奔楚楚以為太宰六年晉楚之師戰于鄢陵楚共王登巢車以望晉師伯州犂侍于王後凡晉軍之發號施令坐作進退悉以告王且指公卒所在時苖賁皇在厲公之側亦以王卒告公左右皆曰國士在且厚不可當也苗賁皇言於公曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗之公從之大敗楚師射其王中目旦而戰見星未巳楚子反命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食唯命是聽晉人患之苗賁皇徇曰蒐乘補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚楚聞之懼其師夜遁子反自殺屈巫一名巫臣字子靈楚公族也為申公故曰申公巫臣楚荘王十七年伐蕭師人多寒巫臣曰王廵三軍拊而勉之三軍之士皆如挾纊遂傳於蕭滅之而還荘王之討陳夏氏也王欲納夏姬巫臣曰不可君召諸侯以討罪也今納夏姬貪其色也貪色為淫淫為大罰周書曰朙徳慎罰文王所以造周也眀徳務崇之之謂也慎罰務去之之謂也若興諸侯以取大罰非慎之也君其圖之荘王乃止子反欲取之巫臣曰是不祥人也是夭子蠻殺御叔弑靈侯戮夏南出孔儀喪陳國何不祥如是人生實難其有不獲死乎天下多美婦人何必是子反乃止王以予連尹襄老襄老死於邲不獲其尸其子黒要烝焉巫臣使道之曰歸吾聘女又使自鄭召之曰尸可得也必来逆之姬以告王王問屈巫對曰其信知罃之父成公之嬖而中行伯之季弟也新佐中軍而善鄭皇戍甚愛此子其必因鄭而歸王子與襄老之尸以求之鄭人懼於邲之役而欲求媚於晉其必許之王遣夏姬歸將行謂送者曰不得尸吾不反矣巫臣聘諸鄭鄭伯許之及共王即位將為陽橋之役使屈巫聘于齊且告師期巫臣盡室以行申叔跪從其父將適郢遇之曰異哉夫子有三軍之懼而又有桑中之喜宜將竊妻以逃者也及鄭使介反幣而以夏姬行將奔齊齊師新敗曰吾不處不勝之國遂奔晉而因郤至以臣於景公景公使為邢大夫子反請以重幣錮之共王曰止其自為謀也則過矣其為吾先君謀也則忠忠社稷之固也所蓋多矣且彼若能利國家雖重幣晉將可乎若無益於晉晉将棄之何勞錮焉初楚莊王之圍宋也師還子重請取於申吕以為賞田王許之巫臣曰不可此申吕所以邑也是以為賦以御北方若取之是無申吕也晉鄭必至于漢王乃止子重以是怨巫臣子反欲取夏姬巫臣止之遂取以行子反亦怨之景公十五年子重子反殺巫臣之族子閻子蕩及清尹弗忌與襄老之子黑要而分其室子重取子閻之室使沈尹與王子罷分子蕩之室子反取黒要與清尹之室巫臣自晉遺二子書曰爾以䜛慝事君而多殺不辜余必使爾疲於奔命以死巫臣請使於呉景公許之呉王夀夢説之乃通呉于晉以兩之一卒適呉舍偏兩之一焉與其射御敎吴乘車教之戰陳教之叛楚寘其子狐庸焉使為行人於呉呉始伐楚伐巢伐徐子重奔命馬陵之會呉入州來子重自鄭奔命子重子反於是乎一嵗七奔命蠻夷屬於楚者呉盡取之是以始大通呉於上國十七年公使屈巫如呉假道于莒與渠邱公立於池上曰城已惡莒子曰僻陋在夷其孰以我為虞對曰夫狡焉思啟封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也勇夫重閉況國乎不聽朙年楚子重自陳伐莒圍渠邱渠邱城惡衆潰楚入渠邱遂圍莒莒城亦惡旬餘而潰竟如巫臣之言巫臣之子狐庸留於呉者呉王夀夢使為相任以政焉通志卷九十
