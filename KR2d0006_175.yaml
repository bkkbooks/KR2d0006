body:
  text: 通志卷一百五十一宋右迪功郎鄭樵漁仲撰列傳第六十四後魏孫紹張普惠成淹范紹劉桃符鹿悆張耀劉道斌董紹馮元興袁翻陽尼從孫固藻固從兄賈思伯弟思同祖瑩爾朱榮子菩提義羅伯文殊伯文暢逺文略逺榮從子兆榮榮從弟彥彥弟仲仲弟世隆從父弟度律子榮從祖兄天光朱瑞叱列延慶斛斯椿賈顯度弟智樊子鵠侯深賀拔允侯莫陳悅念賢梁覽雷紹毛遐弟鴻賓鴻顯乙弗朗辛雄從父兄纂悠從族祖琛琛子俊楊機髙恭父崇之兄謙綦俊山偉宇文忠之費穆孟威孫紹字世慶昌黎人也少好學通涉經史初為校書郎稍遷給事中後為門下録事好言得失與常景共修律令延昌中紹表曰臣聞建國有計雖危必安施化能和雖寡必盛政乖人理雖合必離作用失機雖成必敗此乃古今同然百王之定法也今二虢京門了無嚴防南北二中復闕固守長安鄴城股肱之寄穰城上黨腹背所馮四軍五校之軌領護分事之式徵兵儲粟之要舟車水陸之資山河要害之權緩急去來之用持平赴救之方節用應時之法特宜修置以固堂堂之基持盈之體何得而忽且法開清濁而清濁不平申滯理望而卑寒亦免士庶同悲兵徒懷怨中正賣望於下里主案舞筆於上臺真偽混淆知而不紏得者不欣失者倍怨使門齊身等而涇渭奄殊類應同役而苦樂縣異士人居職不以為榮兵士役苦心不忘亂故有競棄本生飄藏他土或詭名託養散沒人間或亡命山藪漁獵為命或投杖強豪寄命衣食又應遷之戶逐樂諸州應留之徒避寒歸暖職人子弟隨榮浮遊南北東西卜居莫定關禁不修任意取適如此之徒不可勝數爪牙不復為用百工爭棄其業混一之計事實闕如考課之方責辦無日流浪之徒決須精校今強敵窺時邊黎伺隙內人不平久戍懷怨戰國之勢竊謂危矣必造禍源者北方鎮戍之人也若夫一統之年持平用之者大道之計也亂離之期縱橫作之者行權之勢也故道不可久須文質以換情權不可恆隨汙隆以牧物文質應世道形自安汙隆獲𠂻權勢亦濟然則王者計法之趣化物之規圓方務得其境人物不失其地又先帝時律令並議律尋施行令獨不出十餘年矣臣以令之為體即帝王之身分處百揆之儀安置九服之節乃是有為之樞機世法之大本也然修令之人亦皆博古依古撰置大體可觀比之前令精粗有在但主議之家大用古制若令依古髙祖之法復須外降誰敢措意有是非哉以是爭故久廢不理然律令相須不可偏用今律班令止於事甚滯若令不班是無典法臣下執事何依而行臣等修律非無勤止署下之日臣乃無名是謂農夫盡力他食其秋功名之所實懷於悒正光初兼中書侍郎紹性抗直每上封事常至懇切不憚犯忤但天性踈脫言乍髙下時人輕之不見採覽紹兄世元善彈筝早卒紹後聞筝聲便涕泗嗚咽捨之而去後為太府少卿曽因朝見靈太后謂曰卿年稍老矣紹曰臣年雖老臣卿乃少太后笑之遷右將軍太中大夫紹曽與百僚赴朝東掖未開守門候旦紹於衆中引吏部郎中辛雄於衆外竊謂曰此中諸人尋當死盡唯吾與卿猶享冨貴未幾有河隂之難紹善推祿命事驗甚多知者異之永安中拜太府卿以前參議正光壬子歷賜爵新昌子後卒於右光祿大夫贈尚書左僕射諡曰宣子伯元襲爵張普惠字洪賑常山九門人也身長八尺容貌魁偉精於三禮兼善春秋百家之説太和十九年為主書帶制局監頗為孝文所知轉尚書都令史任城王澄重其學業為其聲價澄為雍州刺史啓普惠為府録事參軍尋行馮翊郡事澄功衰在身欲七月七日集文武北園馬射普惠奏記於澄曰竊聞三殺九親别踈昵之敘五服六術等衰麻之心皆因事飾情不易之道者也然則莫大之痛深於終身之外書䇿之哀除於喪紀之內外者不可無節故斷之以三年內者不可遂除故敦之以日月况禮大練之日鼓素琴蓋推以即吉也小功以上非虞祔練祥不沐浴此拘之以制也曽子問曰相識有喪服可以與於祭乎孔子曰緦不祭又何助於人祭既不與疑無宴食之道又曰廢喪服可以與於饋奠之事乎子曰脫衰與奠非禮也注云謂其忘哀疾愚謂除喪之始不與饋奠小功之內其可觀射乎雜記云大功以下既葬適人人食之其黨也食之非其黨則不食食猶擇人於馬射為或非宜伏見明教立射會之限將以二七令辰集城中文武肄武藝於北園行揖讓於中舍時非大閲之秋景涉妨農之節國家縞禫甫除殿下功衰仍襲釋而為樂以訓百姓便是易先王之典教忘哀戚之情恐非所以昭令德示子孫者也案射儀射者以禮樂為本衰而從事不可謂禮鐘鼓弗設不可謂樂捨此二事何用射為又七日之戲令制無之班勞所施慮違事體府庫空虛宜待新調乞至九月備飾盡行然後奏狸首之章宣矍相之命聲軒縣建雲鉦神人欣暢於斯時也澄意納其言託辭自罷乃答曰今雖非公制而此州承前已有斯式且纂文習武人之常藝豈可於常藝之間要須令制乎禮兄弟內除明哀已殺小功客至主不絶樂聽樂則可觀武豈傷直自事緣須罷先以令停方獲此請深具來意澄轉楊州啓普惠以羽林監領鎮南大將軍開府主簿普惠既為澄知歷佐二藩甚有聲譽還朝仍羽林監澄遭太妃憂臣寮為立碑頌題碑欲云康王元妃之碑澄訪於普惠普惠答曰謹尋朝典但有王妃而無元字魯夫人孟子稱元妃者欲下與繼室聲子相對今烈懿太妃作配先王更無聲子仲子之嫌竊謂不假元字以别名位且以氏配姓愚以為在生之稱故春秋夫人薑氏至自齊既葬以諡配姓故經書葬我小君文薑又曰來歸夫人成風之襚皆以諡配姓古者婦人從夫諡今烈懿太妃德冠一世故特蒙褒錫乃萬代之髙事豈容於定名之重而不稱烈懿乎澄從之後為步兵校尉以本官領河南尹丞宣武崩坐與甄楷等飲酒遊從免官故事免官者三載之後降一階而敘若才優擢授不拘此限熙平中吏部尚書李韶奏普惠有文學依才優之例敕除寧逺將軍司空倉曹參軍朝議以不降階為榮時任城王澄為司空表議書記多出普惠廣陵王恭北海王皓疑為所生祖母服期與三年詔羣寮會議普惠議曰謹案二王祖母皆受命先朝為二國太妃可謂受命於天子為始封之母矣喪服慈母如母在三年章傳曰貴父命也鄭注云大夫之妾子父在為母大功則士之妾子為母期父卒則皆得伸此大夫命其妾子以為母所慈猶曰貴父命為之三年况天子命其子為列國王命其所生母為國太妃反自同公子為母練冠之與大功乎傳曰始封之君不臣諸父昆弟則當服其親服若魯衛列國相為服期判無疑矣何以明之喪服君為姑姊妹女子子嫁於國君者傳曰何以大功尊同也尊同則得服其親服諸侯之子稱公子公子不得禰先君然則兄弟一體位列諸侯自以尊同得相為服不可還凖公子逺壓天王故降有四品君大夫以尊降公子大夫之子以壓降名例不同何可亂也禮大夫之妾子以父命慈已申其三年太妃既受命先帝光昭一國二王胙土茅社顯錫大邦舍尊同之髙據附不禰之公子雖許蔡失位亦不是過服問曰有從輕而重公子之妻為其皇姑公子雖壓妻尚獲申况廣陵北海論封君則封君之子語妃則命妃之孫承妃纂重逺别先皇更以先后之正統壓其所生之祖嫡方之皇姑不以遙乎今既許其申服而復限之以期比之慈母不亦爽歟經曰為君之祖父母父母妻長子傳曰何以期父母長子君服斬妻則小君父卒然後為祖後者服斬今祖乃獻文皇帝諸侯不得祖之母為太妃蓋二王三年之證議者近背正經以附非類差之毫毛所失或逺且天子尊則配天莫非臣妾何為命之為國母而不聽子服其親乎記曰從服者所從亡則已又曰不為君母之黨服則為其母之黨服今所從既亡不以親服服其所生則屬從之服於何所施若以諸王入為公卿便同大夫者則當今之議皆不須以國為言也今之諸王自同列國雖不之國别置臣寮主食一方得不以諸侯言之敢據周禮輒同三年當時議者亦有同異國子博士李郁於議罷之後書難普惠普惠據禮還答鄭重三反郁議遂屈轉諫議大夫澄謂普惠曰不喜君得諌議唯喜諌議得君時靈太后父司徒胡國珍薨贈相國太上秦公普惠以前世后父無太上之號詣闕上疏陳其不可左右畏懼莫敢為通會聞胡家穿壙下墳有盤石乃密表曰竊見故侍中司徒胡公懷道含靈實誕聖后近樞克維允之寄居槐體論道之名故以功餘九錫褒假鸞纛深聖上之加隆極慈后之至愛憲章天下不亦可乎而太上之號竊謂未衷何者禮記曰天無二日土無二王嘗禘郊社尊無二上竊謂髙祖受禪於獻文皇帝故仰尊為太上皇此因上上而生名也皇太后稱令以繫勑下蓋取三從之道逺同文母列於十亂則司徒為太上恐乖繫敕之意易曰困於上者必反於下比克吉定兆而以淺改卜羣心悲惋亦或天地神靈所以垂至戒啓聖情伏願停司徒逼同之號從卑下不踰之稱則天下幸甚太后覽表親至國珍宅召集五品以上博議其事任城王澄太傅清河王懌侍中崔光御史中尉元匡尚書崔亮並同有難普惠並以理正之無所屈廷尉少卿袁翻曰周官上公九命上大夫四命命數雖殊同名為上何必上者皆是極尊普惠厲聲訶翻曰禮有上卿上士何止大夫與公但今所行以太加上二名雙舉不得非極雕蟲小藝微或相許至於此處豈卿所及翻甚有慙色默不復言議者咸以太后當朝志相黨順遂奏曰張普惠時雖不屈然非臣等所同渙汗已流請依前詔太后復遣元義賈璨宣令謂普惠曰朕之所行孝子之志卿之所陳忠臣之道羣公已有成議卿不得苦奪朕懷後有所見勿得難言初普惠被召傳詔馳驊騮馬來甚迅速佇立催去普惠諸子憂怖涕泗普惠謂曰我當休明之朝掌諫議之任若不言所難言諫所難諫便是唯唯曠官尸祿人生有死死得其所夫復何恨然朝廷有道汝輩勿憂及議罷旨勞還宅親故賀其幸甚時中山杜弼遺書普惠曰明侯深儒碩學身負大才執此公方來居諫職謇謇如也諤諤如也一昨承在胡司徒第當庭面諍雖問難鋒生而應對響出宋城之帶始交魯門之柝裁警終使羣后逡巡庶寮拱默雖不見用於一時固已傳美於百代聞風快焉敬裁此白普惠美其此書每為口實普惠以天下人調幅度長廣尚書計奏復徵綿麻恐人不堪命上疏曰伏聞尚書奏復綿麻之調遵先皇之軌夙宵惟度欣戰交集仰惟髙祖廢大斗去長尺改重稱所以愛百姓從薄賦知軍國須綿麻之用故云幅度之間億兆應有綿麻之利故絹上稅綿八兩布上稅麻十五斤萬姓得廢大斗去長尺改重稱荷輕賦之饒下適於綿麻而已故歌儛以供其賦奔走以役其勤夫信行於上則億兆樂輸於下自兹已降漸至長濶百姓嗟怨聞於朝野伏惟皇太后未臨朝之前陛下居諒暗之日宰輔不尋其本知天下之怨綿麻不察其幅廣度長稱重斗大革其所弊存其可存而特放綿麻之調以悅天下之心此謂悅之不以道愚臣所以未悅者也普惠又表乞朝直之日特聽奉見自此之後月一陛見又以孝明不親視朝過崇佛法郊廟之事多委有司上疏曰伏惟陛下重暉纂統欽明文思天地屬心百神佇望伏願躬致郊廟之虔親紆朔望之澤釋奠成均竭心千畝明發不寐潔誠禋祼孝悌可以通神明德教可以光四海然後精進三寶信心如來道由化深故諸漏可盡法隨禮積故彼岸可登量撤僧寺不急之華還復百官久折之秩已興之搆務從簡成將來之造權令停息但仍舊貫何必改作庶節用愛民法俗俱賴尋别敕付外議釋奠之禮時史官尅日蝕豫敕罷朝普惠以逆廢朝非禮上疏陳之又表論時政得失一曰審法度平斗尺調租務輕賦役務省二曰聽輿言察怨訟先皇舊事有不便於政者請悉追改三曰進忠謇退不肖任賢勿二去邪勿疑四曰興滅國繼絶世勳親之允所宜收敘書奏孝明靈太后引普惠於宣光殿隨事難詰延對移時太后曰小小細務一一翻動更成煩擾普惠曰聖上之飬庶物若慈母之飬赤子今赤子幾臨危壑將赴水火以煩勞而不救豈赤子所望於慈母太后曰天下蒼生寧有如此苦事普惠曰天下之親懿莫重於太師彭城王然遂不免枉死微細之苦何可得無太后曰彭城之苦吾已封其三子何足復言普惠曰聖后封彭城之三子天下莫不欣至德知慈母之在上臣所以重陳者凡如此枉乞垂聖察太后曰卿云興滅繼絶意復誰是普惠曰昔淮南逆終漢文封其四子蓋骨肉之不可棄親親故也竊見咸陽京兆乃皇子皇孫一德之虧自貽悔戾沈淪幽壤緬焉弗收豈不是興滅繼絶之意太后曰卿言有理當命公卿博議及任城王澄薨普惠荷其恩待朔望奔赴至於禫除雖寒暑風雨無不必至初澄嘉賞普惠臨薨啓為尚書右丞靈太后既深悼澄覽啓從之詔行之後尚書諸郎以普惠地寒不應便居管轄相與為約並不欲放上省紛紜多日乃息正光二年詔遣楊鈞送蠕蠕主阿那瓌還國普惠謂遣之將貽後患上疏極言其不可表奏不從魏子建為益州刺史有贓罪普惠被使驗之事遂得釋故子建父子甚德之時梁西豐侯正德詐稱降款朝廷皆謂當迎普惠請付揚州移還蕭氏不從俄而正德果逃還後除光祿大夫右丞如故先是仇池武興郡氐數反西垂郡戍租運久絶詔普惠以本官為持節西道行臺給秦岐涇華雍豳東秦七州兵文武三萬人任其召發送南秦東益二州兵租分付諸戍其所部將統聽於關西牧守之中隨機召遣軍資版印之屬悉以自隨事訖還朝賜絹布一百匹時詔訪寃屈普惠上疏多所陳論出除東豫州刺史淮南九戍十三郡猶因梁前弊别郡異縣之人錯雜居止普惠乃依次括比省減郡縣上表陳狀詔許之宰守因此綰攝有方姦盜不起人以為便普惠不營財業好有進舉敦於故舊冀州人侯堅固少時與其遊學早終其子長瑜普惠每於四時請祿無不減贍給其衣食及為豫州啓長瑜解褐攜其合門拯給之在州卒諡曰宣恭成淹字季文上谷居庸人也好文學有氣尚仕宋為員外郎領軍主援東陽歷城皇興中降慕容白曜赴闕授兼著作佐郎獻文於仲冬之月欲巡漠北朝臣以寒甚固諫並不納淹上接輿釋遊論帝覽之詔尚書李欣等曰卿諸人不如成淹論通釋人意乃敕停行太和中文明太后崩齊遣其散騎常侍裴昭明散騎侍郎謝竣等來弔欲以朝服行事主客報之云有常式何得以朱衣入凶庭昭明言本奉朝命不容改易孝文敕尚書李沖令選一學識者更與論執沖奏遣淹昭明言魏朝不聼朝服行禮義出何典淹言吉凶不同禮有成數元冠不弔童孺共聞昔季孫將行請遭喪之禮千載之下猶共稱之卿逺自江南奉慰不能式遵成事方謂義出何典何其異哉昭明言齊髙帝崩魏遣李彪通弔於時不素服齊朝亦不以為疑那得苦見要逼淹言彪通弔之日朝命以弔服自隨而彼不遵髙宗追逺之慕乃踰月即吉彪行弔之時齊之君臣皆已鳴玉盈庭貂璫曜目彪為行人何容獨以素服間衣冠之中我皇帝仁孝之性侔於有虞處諒暗以來百官聽於冢宰卿豈得以此方彼也昭明乃搖膝而言曰三皇不同禮亦安知得失所歸淹言若如來談則以虞舜髙宗為非也昭明等相顧笑曰非孝者宣尼有成責行人亦弗敢言使人唯齎袴褶此既戎服不可以弔幸借衣幍以申國命今為魏朝所逼還南之日必得罪本朝矣淹曰彼有君子也卿將折𠂻之還南日應有髙賞若無君子也但令有光國之譽雖非理得罪亦復何嫌南史董狐自當直筆帝聞淹與昭明言謂李沖曰我所用得人仍敕送衣幍給昭明等明旦引昭明等入皆令文武盡哀淹後除正佐郎其後齊遣其散騎常侍庾蓽散騎侍郎何憲主事邢宗慶等來聘孝文敕淹接於外館宗慶語淹言南北連和既久而比棄信絶好為利而動豈是大國善鄰之義淹言夫為王者不拘小節豈得眷眷守尾生之信且齊先主歷事宋朝當應便爾欺奪宗慶庾蓽及從者皆相顧失色何憲知淹昔從南入以手掩目曰卿何不作于禁而作王肅淹言我捨逆效順欲追蹤陳韓何于禁之有憲亦不對王肅之至也鑾輿行幸肅多扈從敕淹將引若有古迹皆使知之行到朝歌肅問此是何城淹言紂都朝歌肅言故應有殷之頑民淹言昔武王滅紂悉居河洛中因劉石亂華仍隨司馬東度肅知淹寓青州乃笑謂曰青州何必無其遺種淹以肅本𨽻徐州曰若言青州本非其地徐州間今日重來非所知也肅遂伏馬上掩口笑顧謂侍御史張思寧曰向聊因戲言遂致辭溺思寧馳馬以聞孝文大悅謂彭城王協曰淹此假足為制勝輿駕至洛肅因侍宴帝戲肅曰近者行次朝歌聞成淹共卿殊有往復卿試重敘之肅言臣於朝歌失言一之已甚豈宜再説遂皆大笑肅又言淹才詞宜應敘進帝言若因此進淹恐辱卿轉甚肅言臣屈己逹人正可顯臣之美帝曰卿為人屈欲求屈己之名復於卿大優肅言淹既蒙進臣又得屈己伸人此所謂陛下惠而不費遂酣笑而止賜淹龍廄上馬一匹并鞍勒宛具朝服一襲轉謁者僕射時遷都帝以淹家貧給事力送至洛陽使與家纍相隨及車駕濟淮敕徵淹淹於路左請見曰敵不可小願聖明保萬全之策伏聞發洛以來諸有諫者皆解官奪職恐非聖明納下之義帝優而容之帝幸徐州敕淹與閭龍駒專主舟楫將泛泗入河泝流還洛軍次碻磝淹以黃河峻急慮有傾危乃上疏陳諫帝敕淹曰朕以恆代無運漕之路故京邑人貧今移都伊洛欲通運四方黃河峻急人皆難涉我因此行乘流所以開百姓之心知卿誠至而不得相納賜驊騮馬一匹衣冠一襲除羽林監主客于時宮極初構經始務廣兵民運材日有萬計伊洛流澌苦於厲涉淹遂啓求敕都水造浮航孝文賞納之意欲榮淹於衆朔旦受朝百官在位乃賜帛百匹知左右二都水事淹小心畏法典客十四年四方貢聘皆有私遺毫釐不納至乃衣食不充遂啓乞外祿景明三年出除平陽太守還朝病卒贈光州刺史諡曰定子霄字景鸞好為文詠但率多鄙俗與河東薑質等朋遊相好詩賦問答知音之士所共嗤笑卒治書侍御史范紹字始孫敦煌龍勒人也少聰敏年十二父命就學師事崔光以父憂廢業母又誡之曰汝父卒曰令汝逺就崔生希有成立今已過期宜遵成命紹還赴學太和初充太學生轉算生頗涉經史孝文選為門下通事令史遷録事掌奏文案帝善之又為侍中李沖黃門崔光所知帝曽謂近臣曰崔光從容范紹之力後朝廷有南討計發河北數州田兵通緣淮戍兵合五萬餘人廣開屯田八座奏紹為西道六州營田大使加步兵校尉紹勤於勸課頻歲大獲又詔與都督中山王英論攻鍾離紹觀其城隍恐不可陷勸令班師英不從紹還具以狀奏聞俄而英敗後歷位并州刺史太常卿莊帝初遇害河隂劉桃符中山盧奴人也生不識父九歲喪母性恭謹好學舉孝亷射䇿甲科歷碎職纍遷中書舍人以勤明見知久不遷職宣武謂曰揚子雲為黃門頓歷三世卿居此任始十年不足辭也東豫州刺史田益宗居邉貪穢宣武頻詔桃符慰喻之桃符還具稱益宗老耄而諸子非理處物宣武後欲代之恐其背叛拜桃符東豫州刺史與後將軍李世哲領衆襲益宗語在益宗傳桃符善恤蠻左為民吏所懷久之徵還病卒贈洛州刺史鹿悆字永吉濟隂乘氏人也祖壽興沮渠氏庫部郎父生再為濟南太守有政績後卒於淮陽太守贈兗州刺史悆好兵書隂陽釋氏學彭城王協召為館客嘗詣徐州馬疲附船入汴夜睡從者上岸竊禾四束飼馬船行數里悆覺即停船至取禾處以縑三丈置禾束下而反初為真定公元子直國中尉恆勸以忠亷之節嘗賦五言詩曰嶧山萬丈樹雕鏤作琵琶由此材髙逺絃響藹中華又曰援琴起何調幽蘭與白雪絲管韻未成莫使絃響絶子直少有令問悆欲善終故以諷焉後隨子直鎮梁州州有兵糧和糴和糴者靡不潤屋悆獨不取子直強之終不從孝莊為御史中尉悆兼殿中侍御史監臨淮王彧軍時梁遣其豫章王綜據徐州綜密信通彧云欲歸款衆議謂不然悆遂請行曰綜若誠心與之盟約如其詐也豈惜一人命乎時徐州始陷邊方騷擾綜部將成景俊胡龍牙並總強兵內外嚴固悆遂單馬間出徑趣彭城未至之間為綜軍主程兵潤所止問其來狀悆曰我為臨淮王所使兵潤遣人白龍牙等綜既有誠心聞悆被執語景俊等曰我每疑元略規欲叛城將驗虛實且遣左右為元略使入魏軍中喚彼一人其使果至可令人詐作略身在一深室託為患狀呼使戶外令人傳語時略始被梁武追還綜又遣腹心人梁話迎悆密語意狀令善酬答引悆詣龍牙所而龍牙語悆曰元中山甚欲相見故令喚卿又曰安豐臨淮將少弱卒規復此城容可得乎悆曰彭城魏之東鄙勢在必爭可否在天非人所測龍牙曰當如卿言復詣景俊住所停悆外門久而未入時夜已久有綜軍主薑桃來與悆言謂曰元法僧魏之微子拔城歸梁梁主待物有道乃上指曰今嵗星在斗吳之分野君何不歸梁國悆答曰法僧莒僕之流而梁納之無乃有愧於季孫也今月建鶉首斗牛受破嵗星木也逆而尅之吳國喪敗不久且衣錦夜遊有識不許言未盡乃引入見景俊景俊良久謂曰卿不為刺客也答曰今者為使欲反命本朝相刺之事更卜後圗為設食悆強飲多食向敵數人微目夸詡諸人相謂曰壯哉乃引向元略所一人引入戶指牀令坐一人别在室中出謂悆曰中山王有教我昔有以向南且遣相喚欲問卿事晚來患動不獲相見悆遂辭而退須臾天曉綜軍主范朂景俊司馬楊膘等競問北朝士馬多少悆陳士馬之盛尋而與梁話盟契訖末旬綜降詔封悆定陶縣子除員外散騎常侍永安中為右將軍給事黃門侍郎進爵為侯雖任居通顯志在謙退迎送親賔加於疇昔而自無屋宅嘗假賃居止布衣糲食寒暑不變孝莊嘉其清潔時復賜以錢帛及東徐州城人呂文欣殺刺史元大賓南引梁人詔悆以使持節散騎常侍安東將軍為六州大使與行臺樊子鵠討破之悆又購斬文欣還拜金紫光祿大夫兼尚書右僕射東南道三徐行臺與都督賀拔勝等拒爾朱仲逺軍敗還京天平中除梁州刺史時滎陽人鄭勞業反圍州城城降滎業送悆於關西張耀字景世自云南陽西鄂人也仕魏纍遷步兵校尉永寧寺塔大興經營務廣靈太后曽幸作所凡有顧問耀敷陳指畫無所遺闕太后善之後為别將以軍功封長平男歷岐東荆州刺史天平初遷鄴草創右僕射髙隆之吏部尚書元世俊奏曰南京宫殿毁撤送都連筏竟河首尾大至自非賢明一人專委受納則恐材木耗損有闕經搆耀清直素著有稱一時臣等將舉為大將詔從之耀勤於其事尋轉營構左都將興和初加衛大將軍宫殿成除東徐州刺史卒於州贈司空公諡曰懿劉道斌武邑灌津人也有器幹腰帶十圍鬚髯甚美初拜校書郎轉主事頗為孝文所知從征南陽還加積射將軍給事中帝謂黃門郎邢巒曰道斌是行便異儕流矣宣武即位遷謁者僕射後歷恆農太守岐州刺史所在有清貞稱卒於州諡曰康道斌在恆農修立學館建孔子廟堂圗畫形像去郡後故吏追思之後立道斌形於孔像之西而拜謁焉董紹字興逺新蔡鮦陽人也少好學頗有文義起家四門博士纍遷兼中書舍人便於對問為宣武所賞豫州城人白早生以城南叛詔紹慰勞至上蔡為賊所襲囚送江東梁領軍呂僧珍暫與紹言便相器重梁武帝遣使勞紹云忠臣孝子不可無之今當聽卿還國紹曰老母在洛無復方寸既奉恩貸實若更生梁武乃引見之令其舍人周捨慰勞并稱戰爭多年民物塗炭是以不恥先言欲與魏朝通好比亦有書都無報旨卿宜備申此意若欲通好今以宿豫還彼彼當以漢中見歸先是詔有司以所獲梁將齊狗兒等一人以換紹及還宣武愍之除給事中紹雖陳説和計朝廷不許纍遷右將軍洛州刺史紹好行小惠頗得人情蕭寶夤反於長安紹上書求擊之云臣當出瞎巴三千生噉蜀子孝明帝謂黃門徐紇曰此巴真瞎也紇答此是紹之壯辭云巴人徑勇見敵無畏懼非實瞎也帝大笑敕紹速行以拒寶夤之功賞新蔡男仍除梁州刺史時爾朱天光為關右大行臺啓為大行臺從事兼吏部尚書天光敗賀拔嶽西征復請紹為其開府咨議參軍嶽後擕紹於髙平牧馬紹悲而賦詩曰走馬山之阿馬渴飲黃河寧謂胡關下復聞楚客歌嶽死宇文泰亦甚重之及孝武西遷除御史中丞非其好也鬱鬱不得志或行戲街衢或與少年遊聚不自拘持頗類失性孝武崩宇文泰與百官推奉文帝上表勸進令呂思禮薛憕作表前後再奏帝猶執謙沖不許泰曰為文能動至尊者惟董公耳乃命紹為第三表操筆便成泰曰開進人意不當如此也及登阼方欲任用之而紹議論朝廷賜死孫嗣馮元興字子盛東魏郡肥鄉人也少有操尚舉秀才中尉王顯召為檢校御史遷殿中御史司徒江陽王繼召為記室參軍遂為元義所知義執朝政引為尚書殿中郎領中書舍人仍御史預聞時事卑身克己人無恨焉家素貧約食客恆數十人同其飢飽時人歎尚之太保崔光臨薨薦元興為侍讀尚書賈思伯為侍講授孝明帝杜氏春秋元興常為擲句儒者榮之義既賜死元興亦被廢乃為浮蓱詩以自喻曰有草生碧池無根水上蕩脆弱惡風波危微苦驚浪普泰初為光祿大夫領中書舍人太昌初卒於家贈齊州刺史元興世寒因元義之勢託其交通相用為州主簿論者以為非倫時有濟郡曹昂有學識舉秀才永安中除太學博士兼尚書郎常徒步上省以示清貧忽遇盜大失綾縑時人鄙其矯詐袁翻字景翔陳郡項人也父宣為宋青州刺史沈文秀府主簿隨文秀入魏而大將軍劉昶言是其外祖淑近親令與其府咨議參軍袁濟為宗宣時孤寒甚相依附及翻兄弟官顯與濟子洸演遂各陵競洸等乃經公府以相排斥翻少入東觀為徐紇所薦李彪引兼著作佐郎參史事後拜尚書殿中郎正始初詔尚書門下於金墉中書外省考論律令翻與門下録事常景孫紹廷尉監張彪律博士侯堅固書侍御史髙綽前將軍邢苖奉車都尉程靈虬羽林監王元龜尚書郎祖瑩宋世景員外郎李琰之太樂令公孫崇等並在議限又詔太師彭城王協司州牧髙陽王雍中書監京兆王愈青州刺史劉芳左衛將軍元麗兼將作大匠李韶國子祭酒鄭道昭廷尉少卿王顯等入預其事後除豫州中正是時修明堂辟雍翻議謹按明堂之義今古諸儒論之備矣蓋唐虞以上事難該悉夏殷以降較可知之按周官考工所記皆記其時事具論夏殷名制豈其紕繆是知明堂五室三代同焉配帝像行義則明矣及淮南呂氏與月令同文雖布政班時有堂個之别然推其體則無九室之徵既而正義殘隱妄説斐然明堂九室著自戴禮探緒求源罔知所出而漢氏因之自欲為一代之法故鄭元云周人明堂五室是帝一室也合以五行之數周禮依數以為之室本制著存是周五室也於今不同是漢異周也漢為九室略可知矣但就其此制猶有懵焉何者張衡東京賦云乃營三宫布教班常復廟重屋八達九房此乃明堂之文也而薛綜注云房室也謂堂後有九室堂後有九室之制非巨異乎裴頠又云漢氏作四維之個不能令各據其辰就使其像可圗莫能通其居用之禮此為設虛器也甚知漢世徒欲削滅周典捐棄舊章改物創制故不復拘於載籍且鄭元之詁訓三禮及釋五經異義並盡思窮神不墜周公之舊法也伯喈損益漢制章句繁雜既違古背新又不能易元之妙矣魏晉書紀亦有明堂祀五帝之文而不記其經始之制又無坦然可凖觀夫今之基趾猶或髣佛髙卑廣狹頗與戴禮不同何得以意抑心便謂九室可明且三雍異所復乖盧蔡之義進退無據何用經通晉朝亦以鑽鑿難明故有一屋之論並非經典正義皆以意妄作兹為不典學家常談不足以範時軌世皇代既乘乾統厯得一御宸自宜稽古則天憲章文武追蹤周孔述而不作豈容虛追子氏放篇之浮説徒損經紀雅誥之遺訓而欲以支離橫議指畫妄圗儀刑宇宙而貽來葉者也又北京制置求皆允帖繕修草創以意良多事移化變存者無幾理茍宜革何必仍舊且遷都之始日不遑給先朝規度每事循古是以數年之中悛換非一良以永法為難數改為易何為宫室府庫多因故迹而明堂辟雍獨遵此制建立之辰復未可知矣既猥班訪逮輒輕率瞽言明堂五室請同周制郊建三雍求依故所庶有會經誥無失典刑後議選邊戍事翻議多見施用遭母憂去職熙平初除廷尉少卿頗有不平之論為靈太后所責出為陽平太守甚不自得遂作思歸賦神龜末遷涼州刺史時蠕蠕主阿那瓌後主婆羅門並以國亂來降朝廷問安置之計翻表曰今蠕蠕內為髙車所討滅外憑大國之威靈兩主投身一期而至百姓歸誠萬里相屬然夷不亂華前鑒無逺覆車在於劉石毁轍固不可尋今蠕蠕雖主奔於上人散於下而餘黨實繁部落猶衆髙車亦未能一時并兼盡令率附又髙車士馬雖衆主甚愚弱上不制下下不奉上唯以掠盜為資陵奪為業而河西捍禦強敵唯涼州敦煌而已涼州土廣人稀糧仗素闕敦煌酒泉空虛尤甚若蠕蠕無復豎立令髙車獨擅北垂則西顧之憂匪旦伊夕愚謂蠕蠕二主並宜存之居阿那瓌於東偏處婆羅門於西裔分其降人各有攸屬阿那瓌住所非所經見其中事勢不敢輒陳婆羅門請修西海故城以安處之西海郡本屬涼州今在酒泉直抵張掖西北千二百里去髙車所住金山一千餘里正是北虜往來之衝要漢家行軍之舊道土地沃衍大宜耕植非但今處婆羅門於事為便即可永為重戍鎮防西北雖外為署蠕蠕之聲內實防髙車之䇿一二年後足食足兵斯固安邊保塞之長計也若婆羅門能自克厲使餘燼歸心收離聚散復興其國者乃漸令北轉徙度流沙即是我之外藩髙車之勍敵西北之虞何可過慮如其姦回反覆孤恩背德者此不過為逋逃之寇於我何損今不早圗戎心一啓脫先據西河奪我嶮要則酒泉張掖自然孤危長河已西終非國有不圗厥始而求憂其終噬臍之恨悔將何及愚見如允乞遣大使往涼州敦煌及於西海躬行山谷要害之所親閲亭障逺近之冝商量士馬校練糧仗部分見定處置得所入春西海之間即令播種至秋收一年之食使不復勞轉輸之功也且西徼北垂即是大磧野獸所聚千百為群正是蠕蠕射獵之處殖田以自供籍獸以自給彼此相資足以自固今之豫度似如小損嵗終大計其利實多髙車豺狼之心何可專信假令稱臣致款正可外加優納而復內備彌深所謂先人有奪人之心者也時朝議是之還拜吏部郎中遷齊州刺史無多政績孝昌中除安南將軍中書令領給事黃門侍郎與徐紇俱在門下並掌文翰翻既才學名重又善附會亦為靈太后所信待是時蠻賊充斥六軍將親討之翻乃上表諫止後蕭寶夤大敗於關西翻上表請為西軍死亡將士舉哀而還者并加賑賚後拜度支尚書尋轉都官翻上表願以安南尚書換一金紫時天下多事翻雖外請間秩而內有求進之心識者怪之於是加撫軍將軍明帝靈太后曽燕華林園舉觴謂羣臣曰袁尚書朕之杜預欲以此杯敬屬元凱今為盡之侍坐者莫不羡仰翻名位俱重當時賢達咸推與之然獨善其身無所奬拔排抑後進論者鄙之建義初遇害河隂所著文筆百餘篇並行於世贈使持節侍中車騎將軍儀同三司青州刺史嫡子寶首武定中司徒記室參軍事翻弟躍博學有俊才為車騎將軍太傅清河王懌文學列在文苑傳翻子聿修出後躍仕齊歷周入隋位望通顯列在齊史躍弟揚卒於豫州冠軍司馬揚弟升位正員郎揚死後升通其妻翻恚為之發病升終不止時人鄙穢之亦於河隂見害贈左將軍齊州刺史陽尼字景父北平無終人也纍世仕於慕容氏尼少好學博通羣籍與上谷侯天護頓邱李彪同志齊名幽州刺史胡泥表薦之徵拜祕書著作郎及改中書學為國子時中書監髙閭侍中李沖等以尼碩學舉為國子祭酒後兼幽州中正孝文臨軒令諸州中正各舉所知尼與齊州大中正房千秋各舉其子帝曰昔有一祁名垂往史今有二奚當聞來牒出為業州平北府長史帶漁陽太守未拜坐為中正時受鄉人貨免官每自傷曰吾昔未仕不曽羡人今日失宦與本何異然非吾宿志命也如何既而還家有書數千卷所造字釋數十篇未就而卒其從孫太學博士承慶撰為字統二十卷行於世承慶從弟固字敬安性俶儻不拘小節任俠好劍客弗事生産年二十六始折節好學博覽篇籍有文才太和中從大將軍宋王劉昶征義陽版府法曹行參軍昶性嚴暴三軍戰栗無敢言者固啓諫并面陳事宜昶大怒欲斬之使監當攻道固在軍勇決志意間雅了無懼色昶甚竒之軍還言之孝文年三十餘始辟大將軍府參軍事纍遷尚書侍御史多所劾奏宣武廣訪得失固上讜言表曰當今之務宜早正東儲立師傅以保護立官司以防衛以係蒼生之心攬權衡親宗室強幹弱枝以立萬世之計舉賢良黜不肖使野無遺才朝無素飱孜孜萬機躬勤庶政使人無謗讟之響省徭役薄賦斂修學官遵舊章貴農桑賤工賈絶談虛窮微之論簡桑門無用之費以救飢寒之苦然後備器械修甲兵習水戰滅吳會撰封禪之禮襲軒唐之軌豈不茂哉初帝委任羣下不甚親覽好桑門之法尚書令髙肇以外戚權寵専決朝事又咸陽王禧等並有釁故宗室大臣相見疏薄而王畿人庶勞弊益甚固乃作南北二都賦稱恆代田漁聲樂侈靡之事節以中京禮儀之式因以諷諫宣武末中尉王顯起宅既成集寮屬饗宴酒酣問固曰此宅何如固曰晏嬰湫隘流稱于今豐美生災著在周易此蓋同傳舍耳唯有德能卒願公勉之顯默然他日又謂固曰吾作太府卿府庫充實卿以為何如固對曰公收百官之祿四分之一州郡贓贖悉入京藏以此充府未足為多且有聚斂之臣寧有盜臣豈不戒歟顯大不悅以此銜固又有人間固於顯因奏固剩請米麥免固官遂闔門自守著演賾賦以明幽微通塞之事又作刺讒疾嬖幸詩二首以紓其憤明帝即位除尚書考功郎中奏請諸秀孝考中第者聽敘自固始大軍征硤石敕為僕射李平行臺七兵郎中平竒固勇敢軍中大事悉與謀之又命固節度水軍固設竒計先期乘賊獲其外城後太傅清河王懌舉固除步兵校尉領汝陽王悅郎中令時悅年少行多不法固上疏諌悅悅甚敬憚之懌大悅以為舉得其人除洛陽令在縣甚有威風丁母憂號慕毁瘠杖而後能起練禫之後酒肉不進時固年踰五十而喪過於哀鄉黨親族咸歎服焉清河王懌領太尉辟固從事中郎屬懌被害不奏懌之遇害元義執政朝野震悚懌諸子及門生寮吏莫不慮禍隱避不出固以嘗被辟命遂獨詣喪所盡哀慟哭良久乃還僕射遊肇聞而嘆曰雖欒布王修何以尚也君子哉若人及汝南王悅為太尉選舉多非其人又輕肆撾撻固以前為元卿雖離國猶上疏切諫悅不能用後悅辟固為從事中郎不就京兆王繼為司徒髙選寮佐辟固從事中郎府解除前將軍又典科揚州勳賞初硤石之役固有先登之功而朝賞未及至是與尚書令李崇訟勳更相表崇雖貴盛固據理不撓談者稱焉卒贈輔國將軍太常少卿諡曰文固剛直雅正不畏強禦居官清潔家無餘財終沒之日室徒四壁無以供喪親故為其棺殮初固著終制一篇務從儉約臨終又敕諸子一遵先制五子長子休之仕齊周隋自有傳固從兄藻字景德少孤有雅志涉獵經史位中書博士詔兼禮官拜燕宣王廟於長安還賜爵魏昌男纍遷瀛洲安東府長史以年老歸家為賊杜洛周所囚發病卒永熙中贈幽州刺史子斐仕齊位殿中尚書列在齊史賈思伯字士休齊郡益都人也其先自武威徙焉世父元壽中書侍郎有學行見稱於時思伯自奉朝請纍遷中書侍郎頗為孝文所知任城王澄之圍鍾離也以思伯持節為其軍司及澄失利思伯為後殿澄以其儒者謂之必死及至大喜曰仁者必有勇常謂虛談今於軍司見之矣思伯託以失道不伐其功時論稱其長者纍遷南青州刺史初思伯與弟思同師事北海隂鳳業竟無資酬之鳳遂質其衣物時人為之語曰陰生讀書不免癡不識雙鳳脫人衣及思伯之部送縑百匹遺鳳因具車馬迎之鳳慙不往時人稱嘆焉昭帝時拜涼州刺史思伯以邊逺不願辭以男女未婚靈太后不許因舍人徐紇言乞得停後除廷尉卿自以儒業為素不好法律希言事俄轉衛尉卿時議建明堂多有同異思伯上議曰案周禮夏后氏世室殷重屋周明堂皆五室鄭注云此三者或舉宗廟或舉王寢或舉明堂互言之以明其制同也若然則夏殷之世已有明堂矣唐虞以前其事未聞戴德禮記云明堂凡九室十二堂蔡雍云明堂者天子太廟饗功養老學斆選士皆於其中九室十二堂案戴德撰記世所不行且九室十二堂其於規制恐難得厥衷周禮營國左祖右社明堂在國之陽則非天子太廟明矣然則禮記月令四堂及太室皆謂之廟者當以天子暫配享五帝故耳又王制云周人養國老於東膠注云東膠即辟雍在王宫之東又詩大雅云雍雍在宫肅肅在廟鄭注云宫謂辟雍宫也所以助王養老則尚和助祭則尚敬又不在明堂之驗矣案孟子云齊宣王謂孟子曰吾欲毁明堂若明堂是廟則不應有毁之問其蔡雍論明堂之制云堂方百四十尺象坤之策屋圎徑二百一十六尺象乾之䇿方六丈徑九丈象隂陽九六之數九室以象九州屋髙八十一尺象黃鍾九九之數二十八柱以象宿外廣二十四丈以象氣案此皆以天地隂陽氣數為法而室獨象九州何也若立五室以象五行豈不快哉如此蔡雍之論非為通典九室之言或未可從竊尋考工記雖是補闕之書相承已久諸儒注述無言非者方之後作不亦優乎其孝經援神契五經要義舊禮圗皆作五室及徐劉之論謂同考工者多矣朝廷若獨絶古今自為一代制作者則所願也若猶祖述舊章規摹前事不應捨殷周成法襲近代妄作且損益之極極於三王後來疑議難可準信鄭元云周人明堂五室是帝各有一室也合於五行之數周禮依數以為室施行于今雖有不同時説然矣尋鄭此論非為無當案月令亦為九室之文原其制置不乖五室其青陽右個即明堂左個明堂右個即總章左個總章右個即元堂左個元堂右個即青陽左個如是則室猶是五而布政十二五室之理謂為可按其方圎髙廣自依時量戴氏九室之言蔡子廟學之議子幹靈臺之説裴逸一屋之論及諸家紛紜並無取焉學者善其議後為都官尚書時崔光疾甚表薦思伯侍講中書舍人馮元興為侍讀思伯遂入授明帝杜氏春秋思伯少時雖明經從官廢業至是更延儒生夜講晝授性謙和傾身下士雖在街途停車下馬接誘恂恂曽無倦色客有謂曰公今貴重寧能不憍思伯曰衰至便憍何常之有當世以為雅言思伯與元興同事大相友眤元興時為元義所寵論者譏其趣勢云卒贈青州刺史又贈尚書左僕射諡曰文貞子彥始武定中淮陽太守思伯弟思同字仕明少勵志行雅好經史與兄思伯年少時俱為鄉里所重纍遷襄州刺史雖無明察之譽百姓安之元皓之亂思同與廣州刺史鄭光護並不降莊帝還宮封營陵縣男後與國子祭酒韓元熙並為侍講授靜帝杜氏春秋加散騎常侍兼七兵尚書尋拜侍中卒贈尚書右僕射司徒公諡曰文獻初思同為青州别駕清河崔光韶先為中從事自恃資地恥居其下聞思同還鄉遂便去職州里人物為思同恨之及光韶亡遺誡子姪不聽求贈思同遂表訟光韶操業特蒙贈諡論者歎尚焉思同之侍講也國子博士遼西衛冀隆精服氏學上書難杜氏春秋六十三事思同復駁冀隆乖錯者一十餘條互相是非積成十卷詔下國學集諸儒考之事未竟而思同卒後魏郡姚文安樂陵秦道靜復述思同意冀隆亦尋物故浮陽劉休和又持冀隆説竟未能裁正祖瑩字元珍范陽遒人也曽祖敏仕慕容垂為平原太守道武定中山賜爵安固子拜尚書左丞卒贈并州刺史祖嶷字元達以從征平原功進爵為侯位馮翊太守贈幽州刺史父季真多識前言往行位中書侍郎巨鹿太守瑩年八歲能誦詩書十二為中書學生好學耽書以夜繼晝父母恐其成疾禁之不能止常密於灰中藏火乃驅逐僮僕父母寢睡之後然火讀書以衣被蔽塞窗戶恐漏光明為家人所覺由是聲譽甚盛內外親屬呼為聖小兒尤好屬文中書監髙允每歎曰此子不器非諸生所及終當逺至時中書博士張天龍講尚書選為都講生徒悉集瑩夜讀勞倦不覺失曉催講既切遂誤持同房生趙郡李怡曲禮卷上座博士嚴毅不敢復還取仍置曲禮於前誦尚書三篇不遺一字孝文聞之召入令誦五經章句并陳大義帝嗟賞之瑩出後帝戲盧昶曰昔流共工於幽州北裔之北那得忽有此子昶對曰當是才為世生以才名拜太學博士徵署司徒彭城王協法曹行參軍帝顧謂協曰蕭賾以王元長為子良法曹今為汝用祖瑩豈非倫匹也敕令掌協書記瑩與陳郡袁翻齊名秀出時人為之語曰京師楚楚袁與祖洛中翩翩祖與袁再遷尚書三公郎中尚書令王肅曽於省中詠悲平城詩云悲平城驅馬入雲中隂山常晦雪荒松無罷風彭城王協甚嗟其美欲使肅更詠乃失語云公可更為誦悲彭城肅因戲協云何意呼悲平城為悲彭城也協有慙色瑩在座即云亦有悲彭城王公自未見耳肅曰可為誦之瑩應聲云悲彭城楚歌四面起尸積石梁亭血流睢水裏肅甚嘆賞之協亦大悅退謂瑩曰卿定是神口今日若不得卿幾為吳子所屈出為冀州鎮東府長史以貨賄事發除名後侍中崔光舉為國子博士仍領尚書左戶郎李崇為都督北討引瑩為長史坐截沒軍資除名未幾為散騎侍郎孝昌中於廣平王第掘得古玉印敕召瑩與黃門侍郎李琰之辨之瑩云此是于闐國王晉太康中所獻乃以墨塗字觀之果如瑩言時稱為博物纍遷國子祭酒領給事黃門侍郎幽州大中正監起居事又監議事元皓入洛以瑩為殿中尚書莊帝還宮坐為皓作詔罪狀爾朱榮免官後除祕書監中正如故以參議律歷賜爵容城縣子坐事繫於廷尉會爾朱兆入焚燒樂署鍾石管絃略無存者敕瑩與録尚書事長孫承業侍中元孚典造金石雅樂三載乃就遷車騎大將軍及孝武登阼瑩以太常行禮封文安縣子天平初將遷鄴齊神武因召瑩議之以功遷儀同三司進爵為伯薨贈尚書左僕射司徒公瑩以文學見重常語人云文章須自出機杼成一家風骨何能共人同生活也蓋譏世人好偷竊他文以為已用而瑩之茟札無非天才但不能均調玉石兼有其製裁之體減於袁常焉性爽俠有節氣士有窮厄以命歸之必見存拯時亦以此多之其文集行於世子珽襲珽列在齊史爾朱榮字天寶北秀容人也其先居於爾朱川因以為氏世領部落為酋帥髙祖羽健登國初為領氐酋長率契胡武士從駕平晉陽定中山論功拜散騎常侍以居秀容川詔割方三百里封之長為世業道武初以南秀容川原沃衍欲令居之羽健曰家世奉國給侍左右秀容既在剗內差近京師豈以沃塉更遷逺地帝許之所居之處曽有狗舐地因而穿之得甘泉焉遂名狗舐泉羽健卒曽祖鬱德祖代勤相繼為領氐酋長代勤太武敬哀皇后舅也既以外親兼數征伐有功給復百年除立義將軍曽圍山而獵部人射虎誤中其髀代勤仍令拔箭竟不推問曰此既過誤何忍加罪部內咸感其意位肆州刺史封梁郡公以老致仕嵗賜帛百匹以為常卒諡曰莊孝莊初追贈太師司徒公録尚書事父新興太和中繼為領氐酋長曽行馬羣見一白蛇頭有兩角遊馬前新興異之謂曰爾若有神令我畜牧蕃息自是之後日覺滋甚牛羊駝馬色别為羣谷量之朝廷每有征討即獻私馬兼備資糧助裨軍用孝文嘉之除光祿大夫及遷洛後特聽冬朝京師夏歸部落每入朝諸王公朝貢競以珍玩遺之新興亦報以名馬位散騎常侍平北將軍秀容第一領氐酋長新興每春秋二時恆與妻子閲畜牧於川澤射獵自娛明帝時以年老求傳爵於榮朝廷許之卒諡曰簡孝莊初贈太師相國西河郡王榮潔白美容貌幼而神機明決及長好射獵每設圍誓衆便為軍陳之法號令嚴肅衆莫敢犯秀容界有池三所在髙山之上清深不測相傳曰祈連池魏言天池也父新興曽與榮遊於池上忽聞簫鼓之音新興謂榮曰古老相傳聞此聲皆至公輔吾今年已衰暮當為汝耳榮襲爵後除直寢遊擊將軍正光中四方兵起遂散畜牧招合義勇以討賊功進封博陵郡公其梁郡前爵聽賜第二子時榮率衆至肆州刺史尉慶賔惡之閉城不納榮怒攻拔之乃署其從叔羽生為刺史執慶賔還秀容自是兵威日盛朝廷亦不能罪鮮于修禮之反榮表求東討除征東將軍都督并肆等州軍事及葛榮吞杜洛周兵凶轉甚榮恐其南逼鄴城表求東援相州明帝不許榮以山東賊盛慮其西逸乃遣兵守滏口上書陳情願擊葛榮於是遂勒部曲廣召義勇北捍馬邑東塞井陘尋屬明帝崩事出倉卒榮聞之大怒謂鄭儼徐紇為之與元天穆等密議稱兵入匡朝廷計定乃抗表云今海內草草異口一言皆云大行皇帝鴆毒致禍舉潘嬪之女以誑百姓奉未言之兒而臨四海社稷危於纍卵臣請赴闕收徐鄭之徒雪天下之恥更召宗親推其明德遂勒所統赴京師靈太后甚懼詔以李神軌為大都督將兵於大行杜防榮抗表之始遣從子天光親信奚􅐧及蒼頭王相入洛與從弟世隆密議廢立天光乃見莊帝具論榮心帝許之天光等還比榮發晉陽猶疑所立乃以銅鑄孝文及咸陽王禧等五王子孫像成者當奉為主唯莊帝獨就師次河內重遣王相密來迎莊帝與帝兄彭城王劭弟霸城公子正武泰元年四月莊帝於髙渚潛渡至榮軍將士咸稱萬嵗十一日莊帝即位詔以榮為使持節都督中外諸軍事大將軍開府兼尚書令領軍將軍領左右太原王及度河太后乃下髮入道十二日內外百官皆朝於行宮十三日榮惑武衛將軍費穆之言謂天下乘機可取乃譎朝士共為盟誓將向河隂西北三里至南北長隄悉令下馬西度云欲祭天朝士既集列騎圍繞妄言丞相髙陽王欲反且責以天下喪亂明帝卒崩之由云皆緣此等貪虐不相輔弼所致因縱兵亂害王公卿士皆斂手就戮死者一千三百人又命二十三人拔刀走行宮莊帝及彭城王霸城公俱出帳榮先遣并州人郭羅察共西部髙車叱列殺鬼在帝左右相與為應及見事起假言防衛抱帝入帳餘人即害彭城王霸城公乃令四五十人遷帝於河橋沈靈太后及少主於河時又有朝士百餘人後至仍於隄東被圍遂臨以白刃唱云能為禪文者出當原其命時有隴西李神俊頓邱李諧太原溫子升並當世辭人皆在圍中恥是從命俯伏不應有御史趙元則者恐不免死出作禪文榮令人誡軍士言元氏既滅爾朱氏興其衆咸稱萬嵗榮遂鑄金為己像數四不成時幽州人劉靈助善卜為榮所信占言今天時人事未可榮乃曰若我不可天穆如何靈助曰天穆亦不吉惟長樂王有王兆耳榮亦精神恍惚不自支持久而方悟遂便愧悔至四更中乃迎莊帝望馬首叩頭請死其士馬三千餘騎既濫殺朝士乃不敢入京師欲向北為移都之計持疑經日始奉駕還洛陽及上北芒視城闕復懷畏懼不肯更前武衛將軍泛禮苦執不聽復前入城不朝其北來之人皆乘馬入殿諸貴死散無復次序莊帝左右唯有故舊數人榮猶執移都之議上亦無以拒焉又在明光殿重謝河橋之事誓言無復二心莊帝自起止之因復為榮誓言無疑心榮喜因求酒一遍及醉熟帝欲誅之左右苦諫乃止即以牀輿向中常侍省榮夜半方寤遂達旦不眠自此不復宿禁中矣榮女先為明帝嬪欲上立為后帝疑未決給事黃門郎祖瑩曰昔文公入秦懷嬴入侍事有反經合義陛下獨何疑焉上遂從之榮意甚悅于時人間或云榮欲遷都晉陽或云欲肆兵大掠迭相驚恐人情震駭京邑士庶十不一存率皆逃竄無敢出者直衛空虛官府廢曠榮聞之上書謝愆帝之即位也榮啓帝封彭城王劭為無上王至是請追尊無上王帝號諸王刺史乞贈三司其位班三品請贈令僕五品之官各贈方伯六品已下及白身贈以鎮郡諸死者無後聽繼即授封爵均其髙下節級别科使恩洽存亡有慰生死詔如所表又啓帝遣使巡城勞問於是人情遂安朝士逃亡者亦稍歸闕榮又奏請番直朔望之日引見三公令僕尚書九卿及司州牧河南尹洛陽河隂執事之官參論國政以為常式五月榮還晉陽乃令元天穆留京為侍中太尉公録尚書事京畿大都督兼領軍將軍封上黨王樹置腹心布在列職舉止所為皆由其意七月詔加榮柱國大將軍時葛榮將向京師衆號百萬相州刺史李神俊閉門自守九月榮上表討之乃率精騎七千馬皆有副倍道兼行東出滏口葛榮為賊久橫行河北時衆寡非敵議者謂無制賊之理葛榮聞之喜見於色乃令其衆為長繩至便縳取自鄴以北列陳數十里箕張而進榮潛軍山谷為竒兵分督將已上三人為一處處有數百騎令所在揚塵鼓譟使賊不測多少又以人馬逼戰刀不如棒密勒軍士馬上各齎袖棒一枚置於馬側至於戰時慮廢騰逐不聼斬級使以棒棒之而已乃分命壯勇所當衝突號令嚴明將士同奮榮身自陷陳出於賊後表裏合擊大破之於陳禽葛榮餘衆悉降榮以賊徒既衆若即分割恐其疑懼或更結聚乃普令各從所樂親屬相隨任所居止於是羣情喜悅登即四散數十萬衆一朝散盡待出百里之外乃始分道領押隨便安置咸得其所擢其渠帥隨才授用新附者咸安時人服其處分機速乃檻車送葛榮赴闕詔加榮大丞相都督河北畿外諸軍事初榮之將討葛榮也軍次襄垣遂大獵有雙兔起於馬前榮乃躍馬彎弓而誓之曰中之則禽葛榮不中則否既而並應弦而殪三軍咸悅及破賊之後即命立碑於其所號雙兔碑榮將戰之夜夢一人從葛榮索千牛刀葛榮初不肯與此人自稱我是道武皇帝汝何敢違葛榮乃奉刀此人手持授榮榮既寤而喜自知必勝又詔以冀州之長樂相州之南趙定州之博陵滄州之浮陽平州之遼西燕州之上谷幽州之漁陽七郡各萬戶通前滿十萬為太原國邑又進位太師建義初北海王元皓南奔梁梁立為魏主資以兵將時邢杲寇亂三齊與皓應接朝廷以皓孤弱不以為慮永安二年春詔元天穆先平齊地然後回師征皓皓以大將未還乘虛徑進既陷梁國鼓行而西滎陽虎牢皆不守五月車駕出幸河北事出不虞榮聞之馳傳朝行宮於上黨之長子輿駕於是南轅榮為前驅旬日間兵馬大集天穆克平邢杲亦度河以會車駕遂幸河內榮與皓相持於河上無船不得即渡議欲還北更圗後舉黃門郎楊侃髙道穆等並固執以為不可屬馬渚諸楊云有小船數艘求為鄉導榮乃令都督爾朱兆等率精騎夜濟皓率麾下南走車駕度河入居華林園詔榮加天柱大將軍此官雖訪古無聞太祖以前曽置此號增封通前二十萬戶加前後部羽葆鼓吹榮尋還晉陽遙制朝廷親戚腹心皆補要職百寮朝廷動靜莫不以申至於除授皆須榮許然後得用莊帝雖受制權臣而勤於政事朝夕省納孜孜不已數自理寃獄親覽辭訟又以選司多濫與吏部尚書李神俊議正綱紀而榮乃大相嫌責曽關補定州曲陽縣令神俊以階縣不奏别更擬人榮大怒即遣其所補者往奪其任榮使入京雖或微蔑朝廷見之莫不傾靡及至闕下未得通奏恃榮威勢至乃忿怒神俊遂上表遜位榮欲用其從弟世隆攝選上亦不違榮曽啓北人為河南諸州欲為掎角勢上不即從天穆入見論事上猶未許天穆曰天柱既有大功為國宰相若請普代天下官屬恐陛下亦不得違之如何啓數人為州便停不用帝正色曰天柱若不為人臣朕亦須代如其猶存臣節無代天下百官理榮聞之大怒曰天子由誰得立今乃不用我語又榮女為皇后復嫌內妃嬪甚有妬恨之事帝遣世隆語以大理后曰天子由我家置立今便如此我父本日即自作今亦復決世隆曰兄止自不為若本自作臣今亦得封王莊帝既外迫於榮內迫於后怏怏不悅不以萬乘為貴先是葛榮枝黨韓婁仍據幽平二州榮遣都督侯深討斬之時万俟醜奴蕭寶夤擁衆豳涇榮遣其從子天光為雍州刺史令率都督賀拔嶽侯莫陳悅等入關討之天光至雍州以衆少未進榮大怒遣其騎兵參軍劉貴馳驛詣軍加天光杖罰天光等大懼乃進討連破之禽醜奴寶夤並檻車送闕天光又禽王慶雲万俟道洛關中悉平於是天下大難便盡莊帝恆不慮外冦唯恐榮為逆當時諸方未定欲使與之相持及告捷之日乃不甚喜謂尚書令臨淮王彧曰即今天下便是無賊彧見帝色不悅曰臣恐賊平以後方勞聖慮帝畏餘人怪還以他語解之曰其實撫寧荒餘彌成不易榮性好射獵不捨寒暑法禁嚴酷若一鹿出乃有數人殞命曽有一人見猛虎便走榮謂曰欲求活邪即斬之自此獵時如登戰場列圍而進必須齊一雖遇險阻不得回避其下甚苦之曽見一猛虎在窮谷中乃令餘人重衣空手搏之不令復損於是數人被殺遂禽得之持此為樂焉太宰元天穆從容謂榮曰大王勳濟天下四方無事唯宜調政養民順時搜狩何必盛夏馳逐傷犯和氣榮便攘肘謂天穆曰太后女主不能自正推奉天子者此是人臣常節葛榮之徒本是奴才乘時作亂譬如奴走禽獲便休頃來受國大寵未能開拓境土混一天下何宜今日便言勳也如聞朝士猶自寬縱今秋欲共兄戒勒士馬校獵嵩原令貪汚朝貴入圍搏虎仍出魯陽歷三荆悉擁生蠻北填六鎮回軍之際因平汾胡明年簡練精騎分出江淮蕭衍若降乞萬戶侯如不降徑度數千騎便往縛取待六合寧一八表無塵然後共兄奉天子巡四方觀風俗布政教如此乃可稱勳耳今若止獵兵士懈怠安可復用也榮見四方無事乃遣人奏曰參軍許周勸臣取九錫臣惡其此言已發遣令去榮時頗望得殊禮故以意諷朝廷帝實不欲與之因稱其忠榮見帝年長明悟為衆所歸欲移自近皆使由己每因醉云入將天子拜謁金陵後還復恆朔而侍中朱元龍輒從尚書索太和中遷京故事於是復有移都消息榮乃暫來向京言看皇后娩難帝懲河隂之事終恐難保乃與城陽王徽侍中楊侃李彧尚書右僕射元羅謀皆勸帝刺殺之惟膠東侯李侃晞濟隂王暉業言榮若來必有備恐不可圗又欲殺其黨與發兵拒之帝疑未定而京師人懷憂懼中書侍郎邢子才之徒至避之東出榮乃遍與朝士書相任留中書舍人溫子升以書陳帝帝恆望其不來及見書以榮必來色甚不悅武衛將軍奚毅建義初往來通命帝每期之甚重然以為榮通親不敢與之言情􅐧曰若必有變臣寧死陛下難不能事契胡帝曰朕保天柱無異心亦不忘卿忠款三年八月榮將四五千騎發并州向京時人皆言其反復道天子必應圗之九月初榮至京有人告云帝欲圗之榮即具奏帝曰外人亦言王欲害我豈可信之於是榮不自疑每入謁帝從人不過數十皆挺身不持兵仗帝欲止城陽王徽曰縱不反亦何可耐况何可保邪又北人語訛語爾朱為人主又聞其在北言我姓人主先是長星出中台掃大角恆州人髙榮祖頗知天文榮問之曰是何祥也答曰除舊布新象也昔長星掃大角秦以之亡榮聞之悅又榮下行臺郎中李顯和曽曰天柱至那無九錫安須王自索也亦是天子不見機都督郭羅察曰今年真可作禪文何但九錫參軍禇光曰人言并州城上有紫氣何慮天柱不應榮下人皆陵侮帝左右無所忌憚其事皆上聞奚􅐧父求見帝聞即下明光殿與語帝又疑其為榮不告以情及知􅐧赤誠乃召城陽王徽及楊侃李彧告以􅐧語榮小女嫁與帝兄子陳留王小字伽邪榮嘗指之曰我終得此女壻力徽又云榮慮陛下終為已患脫有東宮必貪立孩幼若皇后不生太子則立陳留以安天下并言榮指陳留語狀帝既有圗榮意夜夢手持一刀自害落十指節都不覺痛惡之以告城陽王徽及楊侃徽解夢曰蝮蛇螫手壯士解腕割指節與解腕何異去患乃是吉祥聞者皆言善九月十五日榮天穆到京輿駕迎之榮與天穆並從入西林園宴射乃奏曰近來侍官皆不習武事陛下宜將五百騎出獵因省辭訟先是奚毅言榮因獵挾天子移都至是其言相符至十八日召中書舍人溫子升告以殺榮狀并問以殺董卓事子升具通本上曰王允若即赦涼州人必不應至此良久語子升曰朕之情理卿所具知死猶須為况必不死朕寧與髙貴鄉公同日而死不與常道鄉公同日而生上謂殺榮天穆即赦其黨便應不動應詔王道習曰爾朱世隆司馬子如朱元龍比來偏被委付具知天下虛實謂不宜留城陽王及楊侃曰若世隆不全仲逺天光豈有來理帝亦謂然無復殺意城陽王曰榮數征伐腰間有刀或能狼戾傷人臨事願陛下出乃伏侃等十餘人於明光殿東其日榮與天穆並入坐食未訖起出侃等從東階上殿見榮天穆出至中庭事不果十九日是帝忌日二十日榮忌日二十一日暫入即向陳留王家飲酒極醉遂言病動頻日不入上謀頗泄世隆等以告榮榮輕帝不謂能反預帝謀者皆懼二十五日旦榮天穆同入其日大欲革易上在明光殿東序中西面坐榮與天穆並御牀西北小牀上南坐城陽王入始一拜榮見光祿卿魯安等持刀從東戶入即馳向御坐帝拔千牛刀手斬之時年三十八得其手版上有數牒啓皆左右去留人名非其腹心悉在出限帝曰豎子若過今日便不可制矣時元天穆與榮子菩提並就戮於是內外喜呌聲滿京城既而大赦榮雖威名大振而舉止輕脫止以馳射為伎藝每入朝見更無所為唯戲上下馬於西林園宴射恆請皇后出觀并召王公妃主共在一堂每見天子射中輒自起舞呌將相卿士悉皆盤旋乃至妃主婦人亦不免隨之舉袂及酣酒耳熱必自匡坐唱虜歌為樹梨普梨之曲見臨淮王彧從容間雅愛尚風素固令為敕勒舞日暮罷歸便與左右連手踏地唱回波樂而出性甚嚴暴愠喜無恆弓箭刀槊不離於手每有瞋嫌即行忍害左右恆有死憂曽欲出獵有人訴之披陳不已發怒即射殺之曽見沙彌重騎一馬榮即令相觸力窮不復能動遂使傍人以頭相擊死而後已節閔帝初世隆等得志乃詔贈假黃鉞相國録尚書都督中外諸軍事晉王加九錫給九旒鑾輅虎賁班劍三百人輼輬車凖晉太宰安平獻王故事諡曰武又詔百官議榮配饗司直劉季明曰晉王若配永安則不能終臣節以此論之無所配世隆作色曰卿合配季明曰下官預在議限據理而言不合上心誅翦唯命衆為之危季明自若世隆意不已乃配享孝文廟庭菩提位太常卿開府儀同三司侍中特進死時年十四節閔帝初加贈司徒諡曰惠菩提弟乂羅武衛將軍梁郡王尋卒贈司空公乂羅弟文殊封平昌郡王孝靜初轉襲榮爵太原王薨於晉陽時年九嵗文殊弟文暢初封昌樂郡公以榮破葛賊之勳進爵為王其姊孝莊帝皇后及韓陵之敗齊神武納之待其家甚厚文暢由是拜開府儀同三司肆州刺史家富於財招致賔客窮極豪侈與丞相司馬任胄主簿李世林都督鄭仲禮房子逺等相狎外示杯酒交而潛謀害齊神武自魏氏舊俗以正月十五日夜為打蔟戲能中者即時賞帛胄令仲禮藏刀於袴中因神武臨觀謀竊發事捷共奉文暢為任氏家客薛季孝所告以姊寵止坐文暢一房文暢死時年十八弟文略以次兄乂羅卒無後襲乂羅爵梁郡王坐文暢事當誅靜帝使人往晉陽欲拉殺之神武特加寬貸奏免之文略聰明俊爽多所通習文襄嘗令章永興馬上彈琵琶奏十餘曲試使文略寫之遂得其八文襄戲之曰聰明人多不老夀梁郡其慎之文略對曰命之修短皆在明公文襄愴然曰此不足慮初神武遺令恕文略十死恃此益橫多所陵忽天保末嘗邀平秦武興汝南諸王至宅供設奢麗各有贈賄諸王共假聚寶物以要之文略弊衣而往從奴五十人皆駿馬侯服其豪縱不遜如此平秦王有七百里馬文略敵以好婢賭取之明日平秦王使人致請文略殺馬及婢以銀器盛婢頭馬肉而遺之平秦王訴之於文宣繫於京畿獄文略彈琵琶吹橫笛謡詠倦極便卧唱挽歌居數月奪防者弓矢以射人曰不然天子不憶我有司奏遂伏誅文略嘗大遺魏收金請為其父作佳傳收論榮比韓彭伊霍蓋由是也榮從子兆字萬仁少善騎射兼有膂力蹻捷過人數從榮遊獵至於窮巖絶澗人所不升降者兆必先之手格猛虎無所疑避榮以此特加賞愛任為爪牙榮曽送臺使見二鹿授兆二箭令取供今食遂構火以待之俄而兆獲其一榮欲誇使人責兆不盡取杖之五十榮之入洛兆遷武衛將軍為前鋒都督孝莊即位封潁川郡公後從上黨王元天穆平邢杲及元皓屯於河橋榮遣兆與賀拔勝自馬渚西渡襲禽皓子冠受進破安豐王延明皓於是退走莊帝還宮論功除車騎大將軍儀同三司汾州刺史爾朱榮死兆自汾州率衆據晉陽元曄立授兆大將軍進爵為王兆與世隆等定謀攻洛兆遂擁兵南出輕兵倍道掩襲京邑先是河邊人夢神謂己曰爾朱家欲度河用爾作灅波津令為之縮水脈月餘夢者死及兆至有行人自言知水淺處以草往往表插而導焉忽失其所在兆遂䇿馬涉渡是日暴風鼓怒黃塵張天騎叩宫門宿衛方覺彎弓欲射袍撥絃矢不得發一時散走莊帝步出雲龍門外為兆騎所縶幽於永寧佛寺兆撲殺皇子汙辱妃嬪縱兵虜掠停洛旬日先令衛送莊帝於晉陽兆後於河梁監閲財寶初兆將向洛也遣使招齊神武欲與同舉神武時為晉州刺史謂長史孫騰曰臣而伐君其逆已甚我今不往彼必致恨卿可往申吾意但云山蜀未平今方攻討不可委之而去騰乃詣兆及於并州大谷具申神武言兆不悅曰還白髙兄弟有吉夢今行必克吾比夢吾父登髙堆堆傍地悉耕熟唯有馬藺草株往往猶在吾父顧我令下拔之吾手所至無不盡出以此而言往必有利騰還具報之神武曰兆猖狂舉兵犯順吾勢不可更事爾朱也兆今南行天子列兵河上兆進不能渡退不得還吾乘山東下出其不意此徒可一舉而禽俄而兆克京師孝莊幽縶都督尉景從兆南行以書報神武神武得書大驚召騰示之曰卿可馳馹詣兆以示謁賀密觀天子今在何處吾當於路邀迎唱大義於天下騰遇帝於中路神武時率騎東轉聞帝已渡河於是西還仍與兆書具陳禍福言不宜害天子受惡名於海內兆怒不納帝遂暴崩初榮既死莊帝詔河西人紇豆陵步蕃等令襲秀容兆入洛後步蕃兵勢甚盛南逼晉陽兆所以不暇留洛回師禦之頻為步蕃所敗於是部勒士馬謀出山東令人徵神武神武晉州僚屬並勸不行神武揣其勢迫必無他慮乃決䇿赴之兆素服神武威略分三州六鎮之人令神武統領神武既分兵别營乃引兵南出避步蕃之鋭步蕃至樂平郡神武與兆還討之斬之於秀容石鼓山兆還晉陽及節閔帝立授兆使持節侍中都督中外諸軍事柱國大將軍兼録尚書事大行臺又以兆為天柱大將軍兆謂人曰此是叔父終官我何敢受固辭不拜尋加都督十州諸軍事世襲并州刺史神武之克殷州也兆與仲逺度律約拒之仲逺度律次於陽平兆次於廣阿衆號十萬神武縱反間於是兩不相信各致猜疑徘徊不進仲逺等頻使斛斯椿賀拔勝往諭之兆輕騎三百來就仲逺同坐幕下兆性粗獷意色不平手舞馬鞭長嘯凝望深疑仲逺等有變遂趨出馳還仲逺遣椿勝等追而曉譬兆遂拘縛將還經日放遣仲逺等於是奔退神武乃進擊兆軍大敗兆與仲逺度律遂相疑阻久而不和世隆請節閔帝納兆女為皇后兆乃大喜世隆謀抗神武乃降辭厚禮喻兆赴洛兆與天光度律更自信約然後大會於韓陵山戰敗復奔晉陽其年秋神武自鄴進討之兆遂大掠并州走於秀容神武又追擊度赤洪嶺破之衆亦降兆竄於窮山殺所乘馬自縊於樹神武收而葬之兆勇於戰鬬而無將領之能榮雖竒其膽決然每云兆不過將三千騎多則亂矣兆弟智彪節閔帝封為安定王與兆俱走神武禽之後死於晉陽榮從弟彥伯祖侯真文成時并安二州刺史始昌侯父買珍宣武時武衛將軍華州刺史彥伯性和厚永安中為榮府長史節閔帝潛默於龍華佛寺彥伯敦喻往來尤有勤款帝既立爾朱兆以已不豫謀大為忿恚將攻世隆詔令華山王鷙慰兆兆猶不釋世隆復令彥伯自往喻之兆乃止及還帝宴彥伯於顯陽殿時侍中源子恭黃門郎竇瑗並侍坐彥伯曰源侍中比為都督與臣相持於河內當爾之時旗鼓相望眇如天隔寧期同事陛下為今日之欣也子恭曰蒯通有言犬吠非其主他日之事永安猶今日之事陛下耳帝曰源侍中可謂有射鉤之心也遂令二人極醉而罷後封博陵郡王位司徒公于時炎旱有勸彥伯解司徒者乃上表遜位詔許之俄除儀同三司侍中餘如故彥伯於兄弟之中差無過患天光等敗於韓陵彥伯欲領兵屯河橋世隆不從及張勸等掩襲世隆彥伯時在禁直長孫承業等啓陳神武義功既振將除爾朱節閔令舍人郭崇報彥伯知彥伯狼狽出走為人所執尋與世隆同斬於閶闔門外縣首於斛斯椿門樹傳於神武先是洛中謡曰三月末四月初揚灰簸土覔真珠又曰頭去項腳根齊驅上樹不須梯至是並驗子敞逃匿得免仕周歷隋列在隋史彥伯弟仲逺頗知書計明帝末年爾朱榮兵威稍盛諸有啓謁率多見從而仲逺摹寫榮書又刻榮印與尚書令史通為姦詐造榮啓表請人為官大得財貨以資酒色落魄無行業及孝莊即位封清河公纍遷車騎將軍徐州刺史兼尚書僕射三徐大行臺尋進督三徐諸軍事仲逺上言竊見比來行臺采募者皆得權立中正在軍定第斟酌授官今求兼置權濟軍要若立第亦爽關京之日任有司裁奪詔從之於是隨情補授肆意聚斂爾朱榮死仲逺勒其部衆來向京師陷沒西平莊帝詔諸將駱驛進討並為仲逺所敗尋爾朱兆入洛節閔帝立進爵彭城王加大將軍又兼尚書令鎮大梁仲逺遣使請凖朝式在軍鳴騶節閔帝覽啓笑而許之其肆情如此復進督東道諸軍事本將軍兖州刺史餘如故仲逺天性貪暴心如峻壑大宗富族誣之以反歿其家口簿籍財物皆以入已丈夫死者投之河流如此者不可勝數諸將婦有美色者莫不被其淫亂自滎陽以東輸稅悉入其軍不送京師時天光控關右仲逺在大梁兆據并州世隆居京邑各自専恣權強莫比焉所在並以貪虐為事於是四方解體又加太宰解大行臺仲逺専恣尤劇方之彥伯世隆最為無禮東南牧守下至民俗比之豺狼特為患害後移屯東郡率衆與度律等拒齊神武爾朱兆領騎數千自晉陽來會軍次陽平神武縱以間説仲逺等迭相猜二狼狽遁走中興二年復與天光等於韓陵戰敗南走乃奔梁死於江南仲逺弟世隆字榮宗明帝末兼直閣加前將軍爾朱榮表請入朝靈太后惡之令世隆詣晉陽慰喻榮榮因欲留之世隆曰朝廷疑兄故令世隆來今遂住便有內備非計之善榮乃遣入朝榮舉兵南出世隆遂走會榮於上黨建義初除給事黃門侍郎莊帝之立世隆預其謀封樂平郡公元皓逼大梁詔為前將軍都督鎮虎牢皓既克滎陽世隆懼而遁還莊帝倉卒北巡及車駕還宮除尚書左僕射攝選莊帝之將圗爾朱榮每屏人言世隆懼變乃為匿名書自榜其門曰天子與侍中楊侃黃門髙道穆為計欲殺天柱還復自以此書與榮妻北鄉郡公主并以呈榮勸其不入榮毁書唾地曰世隆無膽誰敢生心世隆又勸其速發榮曰何匆匆皆不見從榮死世隆奉榮妻燒西陽門夜走北次河橋殺武衛將軍奚毅率衆還戰大夏門外及李苖燒絶河梁世隆乃北遁攻建州克之盡殺人以肆其忿至長子與度律等共推長廣王曄為主曄小名盆子聞者皆以事類赤眉曄以世隆為尚書令封樂平郡王加太傅行司州牧會兆於河陽兆既平京邑讓世隆曰叔父在朝多時耳目應廣如何令天柱受禍案劒嗔目詞色甚厲世隆遜辭拜謝然後得已而深恨之時仲逺亦自滑臺入京世隆與兄弟密謀慮元曄母干豫朝政伺其母衛氏出行遣數十騎如劫賊於京巷殺之公私驚愕莫識所由尋縣榜以千萬錢募賊百姓知之莫不喪氣又以曄疏逺欲推立節閔帝而度律意在南陽王乃曰廣陵不言何以主天下後知能語遂行廢立初世隆之為僕射尚書文簿在家省閲性聰解又畏榮深自克勉留心几案傍接賔客遂有解了之名榮死之後無所顧憚及為令常使尚書郎宋遊道邢昕在其宅聽事東西别座受納訴訟稱命施行既總朝政生殺自由公行淫泆信任羣小隨情與奪又兄弟羣從各擁強兵割剝四海極其貪虐姦諂蛆酷多見信用溫良名士罕豫腹心於是天下之人莫不厭毒世隆尋讓太傅節閔特置儀同三司之官位次上公之下以世隆為之贈其父買珍相國録尚書事大司馬及齊神武起義兵仲逺度律等愚戇恃強不以為慮而世隆獨深憂恐及天光等敗於韓陵世隆請赦天下節閔不許斛斯椿據河橋盡殺世隆黨附令行臺長孫承業詣闕奏狀掩執世隆及兄彥伯俱斬之初世隆曽與吏部尚書元世俊握槊忽聞局上詨然有聲一局子盡倒立世隆甚惡之又曽晝寢其妻奚氏忽見一人持世隆首去奚氏驚就視而世隆寢如故既覺謂妻曰向夢人斷我頭持去意殊不適又此年正月晦日令僕並不出省西門不開忽有河內太守田帖家奴告省門亭長云今旦為令王借車牛一乘終日於洛濵遊觀至晚王還省將車出東掖門始覺車上無褥請為記識亭長以令僕不上西門不開無迹入者此奴固陳不已公文列訴尚書都令史謝逺疑謂妄有假借白世隆付曹推驗時都官郎中穆子容究之奴言初來時至司空府西欲向省令王嫌遲遣催車車入到省西門王嫌牛小繫於闕下槐樹更將一青牛駕車王著白紗髙頂帽短小黑色儐從皆裙襦袴褶握版不似常時服章遂遣一吏將奴送入省中聽事東闕內東廂第一屋中其屋先常閉奴云入此屋中有版牀牀上無席大有塵上兼有甕米奴拂牀坐兼畫地戲甕中米亦握看之子容與謝逺看之閉極久全無開迹及入狀皆符同具以對世隆世隆悵然意以為惡未幾見誅世隆弟世承莊帝時位侍中領御史中尉人才猥劣備員而已及元皓內逼世承守轘轅為皓所禽皓讓而臠之莊帝還宮贈司徒世承弟弼字輔伯節閔帝時封河間郡公尋為青州刺史韓陵之敗欲奔梁數日與左右割臂為約弼帳下都督馮紹隆為弼信待乃説弼曰今方同契闊宜當心瀝血示衆以信弼從之大集部下弼乃踞胡牀令紹隆持刀披心紹隆因推刃殺之傳首京師榮從父弟度律鄙朴少言莊帝初封樂鄉縣伯榮死與世隆赴晉陽元曄之立以度律為太尉公四面大都督封恆山王與爾朱兆入洛兆還晉陽留度律鎮京師節閔帝時為使持節侍中大將軍太尉公兼尚書令東北道行臺與仲逺出拒義旗齊神武間之與爾朱兆遂相疑二自敗而還度律雖在軍戎聚斂無厭所經為百姓患毒其母山氏聞度律敗遂恚憤發病及至母責之曰汝荷國恩無狀而反我何忍見他屠戮汝也言終而卒時人怪異之後韓陵之敗斛斯椿先據河橋遂西走灅波津為人執送椿囚之送齊神武斬之都市榮從祖兄子天光少勇決榮特親愛之常預軍戎謀孝昌末榮據并肆仍以天光為都督總統肆州兵馬明帝崩榮向京師委以後事建義初為肆州刺史封長安縣公榮將討葛榮留天光在州鎮其根本謂曰我身不得至處非汝無以稱我心永安中與元天穆東破邢杲元皓入洛天光與天穆會榮於河內榮發後并肆不安詔天光兼尚書僕射為并肆等九州行臺仍行并州事天光至并州部分約勒所在寧輯皓破還京師改封廣宗郡公初髙平鎮城人赫連恩等為逆共推敕勒酋長胡琛為主號髙平王遙臣沃野鎮賊帥破六韓忍夤琛入據髙平城遣其大將万俟醜奴來冦涇州琛後與莫折念生交通侮慢忍夤遣使人費律如至髙平誘斬琛為醜奴所并與蕭寶夤相拒於安定寶夤敗還建義元年夏醜奴擊寶夤於靈州禽之遂僭大號時獲西北貢師子因稱神獸元年置百官朝廷憂之乃除天光使持節都督雍州刺史率大都督武衛將軍賀拔嶽大都督侯莫陳悅等討醜奴天光初行唯有軍士千人時東雍赤水蜀賊斷路天光入關擊破之簡取壯健至雍又稅人馬合得萬匹以軍人寡少停留未進榮遣責之杖天光百下榮復遣軍士二千人赴天光天光令賀拔嶽率千騎先驅至岐州禽其行臺尉遲菩薩醜奴棄岐州走還長安天光發雍至岐與嶽合勢破醜奴獲蕭寶夤於是涇豳二夏北至靈州及賊黨結聚之類並降唯賊行臺万俟道洛不下率衆西依牽屯山據嶮自守榮責天光不獲道洛復遣使杖之百詔削爵為侯天光與嶽悅等復向牽屯討之道洛戰敗投略陽賊帥王慶雲慶雲以道洛驍果絶倫得之甚喜便謂大事可圗乃自稱皇帝以道洛為大將軍天光乃入隴至慶雲所居永洛城破其東城賊遂併趣西城城中無水衆聚熱渴有人走降言慶雲道洛欲突出天光恐失賊帥乃遣謂慶雲可以早降若未決當聽諸人今夜共議又謂曰相知須水今為小退賊衆安悅無復走心天光密使軍人多作木槍各長七尺至昏布立人馬為防衛之勢又伏人槍中其夜慶雲道洛果突出至槍馬各傷倒伏兵便起同時禽獲賊窮乞降而已天光嶽悅等議悉坑之死者萬七千人分其家口於是三秦河渭瓜涼鄯善咸來款順詔復天光前官爵嶽聞榮死還涇州以待天光天光亦下隴與嶽圗入洛之䇿既而莊帝進天光爵為廣宗王元曄又以為隴西王及聞爾朱兆已入京天光乃輕騎向都見世隆等尋便還雍世隆等議廢元曄更舉親賢遣告天光天光與定䇿立節閔帝又加開府儀同三司尚書令關西大行臺天光北出夏州遣將討宿勤明達禽之送洛時費也頭帥紇豆陵伊利万俟受洛干等據有河西未有所附天光以齊神武起兵信都內懷憂恐不暇他事伊利等但微遣備之而已又除大司馬時神武兵既振爾朱兆仲逺等並經敗退世隆纍使徵天光天光不從遂令斛斯椿苦要天光云非王無以能定豈可坐看宗家之滅天光不得已東下與仲逺等敗於韓陵斛斯椿等先還於河橋拒之天光不得度西北走被執與度律並送於神武神武送於洛陽斬於都市爾朱專恣分裂天下各據一方賞罰自出而天光有定關西之功差不酷暴比之兆與仲逺為不同矣朱瑞字元龍代郡桑乾人也祖就沛縣令父惠行太原太守瑞貴達並贈刺史瑞長厚質直敬愛人士爾朱榮引為大行臺郎中甚見親任以為黃門侍郎仍兼中書舍人榮恐朝廷事意有所不知故居之門下為腹心之寄封陽邑縣公及元皓內逼從車駕於河陽除侍中兼吏部尚書改封北海郡公莊帝還洛改封樂陵郡公仍侍中瑞雖為爾朱榮所委而善處朝廷間帝亦賞遇之嘗謂侍臣曰為人臣當須忠實至如朱元龍者朕待之亦不異餘人瑞以青州樂陵有朱氏意欲歸之故求為青州中正又以滄州樂陵亦有朱氏而心好河北遂乞三從內並屬滄州樂陵郡詔許之仍轉滄州大中正爾朱榮死瑞與世隆俱北走以莊帝待之素厚且見世隆等並無雄才終當敗喪於路乃還帝大悅時爾朱天光擁衆關右帝招納之乃以瑞兼尚書左僕射為西道大行臺以慰勞焉既達長安會爾朱兆入洛復還京師都督斛斯椿先與瑞有隙數譖之於世隆世隆遂誅之太昌初贈開府儀同三司青州刺史諡曰恭穆叱列延慶代西部人也世為酋帥延慶娶爾朱世隆姊故被爾朱榮親遇普泰中世隆得志特見委重兼尚書左僕射山東行臺北海郡公時幽州刺史劉靈助以莊帝幽崩遂舉兵唱義世隆白節閔帝以延慶與大都督侯深於定州討之深以靈助善占百姓信惑未易可圗欲還師入據關拒嶮以待其變延慶以靈助庸人彼皆恃其祅術坐看符猒寧肯戮力致死宜詭言西歸可襲而禽深從之乃出頓城西聲云將還詰朝造靈助壘遂破禽之及韓陵戰敗延慶與爾朱仲逺走度石濟仲逺南竄延慶北降齊神武仍從并州後赴洛孝武帝以為中軍大都督孝武之西齊神武誅之斛斯椿字法夀廣牧富昌人也其先世為莫弗大人父足一名敦明帝時為左牧令時河西賊起牧人不安椿乃將家投爾朱榮征伐有功稍遷中散大夫署外兵事椿性佞巧甚得榮心軍之密謀頗亦關預莊帝初改封陽曲縣公除榮大將軍府司馬後為東徐州刺史及榮死椿甚憂懼時梁以汝南王悅為魏主資其士馬次於境上椿遂棄州歸悅悅授尚書左僕射司空公封靈邱郡公又為大行臺前驅都督會爾朱兆入洛悅知不逮南旋椿復背悅歸兆以參立節閔謀拜侍中驃騎大將軍儀同三司封城陽郡公尋加開府時椿父足先在秀容忽有傳其死問椿請減已階以贈之尋知其父猶存詔復官仍除其父為車騎將軍揚州刺史椿以爾朱兆擅權懼禍乃與賀拔勝俱説世隆以正道世隆不悅欲害椿賴爾朱天光救得免及世隆度律與兆自相疑椿與賀拔勝知之兆執椿勝還營椿又陳以正理兆謝而遣之椿謂勝曰天下皆怨毒爾朱吾等附之亡無日矣不如圗之勝曰天光與兆各據一方今俱禽為難椿曰易致耳乃説世隆追天光等赴洛討齊神武及韓陵之敗椿謂都督賈顯智等曰若不先執爾朱吾等死無類矣遂與顯智等夜於桑下盟約倍道兼行椿入北中城收爾朱部曲盡殺之令弟元夀與張歡長孫承業顯智等襲世隆彥伯兄弟並斬於閶闔門外椿入洛縣世隆兄弟首於其門樹椿父出見謂曰汝與爾朱約為兄弟今何忍縣其頭於家門寧不愧負天地椿乃傳世隆等首并囚度律天光送於齊神武及神武入洛椿謂賀拔勝曰今天下事在吾與君若不先制人將為人所制髙歡初至圗之不難勝曰彼有心於人害之不祥比數夜與歡同宿具序歡往昔之懷謂荷兄恩意甚多何苦憚之椿乃止孝武帝立拜椿侍中儀同開府城陽郡公父足亦加開府子悅大中大夫同日受拜當時榮之椿自以數反意常不安遂密勸孝武帝置閣內都督部曲又增武直人數百直閣以下員别數百皆選天下輕剽以充之又説帝數出遊幸號令部曲别為行陳椿自約勒指麾其間從此以後軍謀朝政一決於椿又勸帝徵兵詭稱南討將以伐齊神武從之以椿為前驅大都督椿因奏請率精騎二千夜度河掩其勞弊帝始然之黃門侍郎楊寬説帝曰髙歡以臣伐君何所不至今假兵於人恐生他變今度河萬一有功是滅一髙歡復生一髙歡矣帝遂敕椿停行椿歎曰頃熒惑入南斗今上信左右間搆不用吾計豈天道乎帝勒兵河橋命椿自洛而東至虎牢帝以賈顯智背叛東師失律將幸關中乃遣使命椿因從入關拜尚書令侍中如故封恆山郡公歷位司徒太保仍尚書令時冦難未息內外戒嚴唯椿得列威儀鳴騶清路遷太傅薨年四十三帝親臨弔百官赴哭詔賜東園祕器遣尚書梁郡王景略監護喪事贈大將軍録尚書三十州諸軍事侍中恆州刺史恆山郡王諡曰文宣祭以太牢又詔改大將軍贈大司馬給輼輬車及葬車駕臨於渭陽止紼慟哭帝嘗給椿店數區耕牛三十頭椿以國難未平不可與百姓爭利辭店受牛日烹一頭以饗軍士及死家無餘資有四子悅恢徵演演為神武所殺三子入關徵仕周入隋自有傳椿弟元夀性剛毅諒直武力過人彎弓兩石左右馳射歷位吏部尚書封桑乾縣伯孝武踐阼進爵為公除豫州刺史及車駕西巡為部下所殺贈司空公諡曰景賈顯度中山無極人也父道監沃野鎮長史顯度容貌偉壯有志氣初為别將防守薄骨律鎮正光末北鎮擾亂顯度乃率鎮人浮河而下達秀容為爾朱榮所留隨榮破葛榮封石艾縣公纍遷南兖州刺史爾朱榮之死顯度奔梁普泰初還朝後隨爾朱度律等敗於韓陵與斛斯椿及弟智等先據河橋誅爾朱氏孝武帝初除尚書左僕射尋加驃騎大將軍開府儀同三司定州大中正永熙三年為雍州刺史西南道大行臺親故祖餞於張方橋顯度執酒曰顯智性輕躁好去就覆沒吾家此其人也武帝入關後顯智果同於齊神武孝武帝怒乃賜顯度死智字顯智少有膽決以軍功纍遷金紫光祿大夫封義陽縣伯及爾朱仲逺為徐州刺史智隸仲逺赴彭城爾朱榮死仲逺舉兵向洛智不從之莊帝聞而善之普泰初還洛仲逺忿其乖背議欲殺之智兄顯度先為世隆所厚世隆為解喻得全後進爵為公隨度律等敗於韓陵智與顯度斛斯椿謀誅契胡顯度據守北中城令智等入京禽世隆兄弟孝武初除開府儀同三司滄州刺史在州貪縱甚為民害孝武徵還京師加侍中除濟州刺史率衆達東郡仍停不進於長夀津為相州刺史竇泰所破天平初赴晉陽智去就多端後坐事死樊子鵠代郡平城人也其先荆州蠻酋徙代父興平城鎮長史歸義侯普泰中子鵠貴乃贈荆州刺史子鵠逢北鎮擾亂南至并州爾朱榮引為都督府倉曹參軍使詣京師靈太后問榮兵勢子鵠應對稱旨太后嘉之除直齋封南和縣子令還赴榮建義初拜晉州刺史封永安縣伯永安二年以招納叛蜀進封中都縣公又兼尚書行臺政有威信尋徵授都官尚書西荆州大中正後兼右僕射為行臺進封西陽郡公尚書如故假驃騎將軍率所部為都督時爾朱榮在晉陽京師之事子鵠頗預委寄故在臺閣征官不解後出為殷州刺史屬旱儉子鵠恐民流亡乃勒有粟家分濟貧者并遣人牛易力多種二麥州內以此獲安爾朱榮死世隆等遣書招子鵠子鵠不從以母在晉陽啓求移鎮河南莊帝嘉之除都督豫州刺史行達汲郡聞爾朱兆入洛乃度河見仲逺仲逺遣鎮汲郡兆徵子鵠赴洛既見責以乖異之意奪其部衆將還晉陽元煜以為侍中御史中尉中軍大都督太昌初兼尚書左僕射東南道大行臺總大都督杜德等追討爾朱仲逺仲逺奔梁收其兵馬時梁遣元樹入冦陷據譙城詔子鵠與德討之樹大敗奔入城門遂圍之樹請歸南以地還魏許之及樹衆半出子鵠擊破之禽樹及梁譙州刺史朱文開班師遷吏部尚書轉尚書右僕射尋加驃騎大將軍開府典選後除兖州刺史子鵠先遣腹心緣歷人間採察得失至境太山太守彭穆參候失儀子鵠責讓穆并數其罪狀穆皆引伏於是境內震悚及孝武帝入關子鵠據城為應南青州刺史大野拔率衆就子鵠天平初齊神武遣儀同三司婁昭等討之城久不拔昭以水灌城而大野拔因與相見令左右斬子鵠以降侯深神武尖山人也機警有膽略孝明末年六鎮飢亂深隨杜洛周南冦後與妻兄念賢背洛周歸爾朱榮路中遇冦身披苫褐榮賜其衣帽厚待之以為中軍副都督莊帝即位封厭次縣子從榮討葛榮於滏口戰功尤多除燕州刺史時葛榮别帥韓樓郝長等屯據薊城榮令深討樓配衆甚少或以為言榮曰深臨機制變用其所長若總大衆未必能用止給騎七百深遂廣張軍聲率數百騎深入樓境去薊百餘里遇賊帥陳周馬步萬餘大破之虜其卒五千餘人尋還其馬仗縱令入城左右諌深深曰我兵少不可力戰事須為計以離隙之深度其已至遂率騎夜進昧旦叩其城門韓樓果疑降卒為內應遂遁走追禽之以功賜爵為侯尋為平州刺史仍鎮范陽及爾朱榮死太守盧文偉誘深出獵閉門拒之深率部曲屯於郡南為榮舉哀勒兵南向莊帝使東萊王貴平為大使慰勞燕薊乃詐降貴平信之遂執貴平自隨進至中山行臺僕射魏蘭根擊之為深所敗元曄立授深儀同三司定州刺史左軍大都督漁陽郡公節閔帝立仍加開府後隨爾朱兆拒齊神武於廣阿兆敗走深後從神武破爾朱氏於韓陵永熙初除齊州刺史孝武帝末深與兖州刺史樊子鵠青州刺史東萊王貴平使信往來以相連結又遣使通誠於神武及孝武入關復懷顧望汝陽王暹既除齊州刺史深不時迎納城人劉桃符等潛引暹入據城西深爭門不克率衆南奔妻兒部曲為衆所虜行達廣固會承制以深行青州事齊神武又遺深書曰卿勿以部曲輕少難於東邁齊人澆薄齊州人尚能迎汝陽王青州人豈不能開門待卿也深乃復還暹始歸其部曲而貴平自以斛斯椿黨亦不受代深襲髙陽郡克之置部曲家纍於城中親率輕騎夜趣青州城人執貴平出降深自惟反覆慮不獲安遂斬貴平傳首于鄴明不同於斛斯椿及子鵠平詔以封延之為青州刺史深既不獲州任情又恐懼行達廣固遂劫光州庫車反遣騎詣平原執前膠州刺史賈璐夜襲青州南郭劫前廷尉卿崔光韶以惑人情攻掠郡縣其部下督帥叛拒之遂奔梁達南青州境為賣漿者斬之傳首于鄴家口配沒賀拔允字可泥神武尖山人也其先與魏氏同出隂山有如回者魏初為大莫弗祖爾頭驍勇絶倫以良家鎮武川因家焉獻文時以功賜爵龍城縣男為本鎮軍主父度拔性果毅襲爵亦為本鎮軍主正光末沃野人破六韓拔陵反懷朔鎮將楊鈞聞度拔名召補統軍配以一旅其賊偽署王衛可瓌徒黨尤甚既攻沒武川又陷懷朔度拔父子並為賊所虜度拔乃與宇文肱合謀率州里豪傑珍念賢乙弗庫根尉遲檀等招義勇襲殺可瓌朝廷嘉之未及封賞度拔與鐵勒戰沒孝昌中追贈度拔肆州刺史允便弓馬頗有膽略初度拔之死允兄弟俱奔恆州刺史廣陽王深深敗歸爾朱榮允父子兄弟並以武藝稱榮素聞其名待之甚厚建義初封夀陽縣侯永安中進爵為公魏長廣王立除開府儀同三司燕郡王兼侍中使蠕蠕還至晉陽屬齊神武將出山東允素知神武非常人早自結託神武以其北土之望尤親禮之遂與允出信都參定大䇿中興初轉司徒領尚書令神武入洛進爵為王轉太尉加侍中孝武既忌神武以允弟嶽據關中有重兵深相委託潛使來往當時咸慮允為變及嶽死孝武又委嶽兄勝心腹之寄神武重舊尤全護之天平元年因與神武獵或告允引弓擬神武神武乃置於樓上餓殺之年四十八神武親臨哭之贈太保允三子世文世樂難陀興和末齊神武並召與諸子同學武定中敕居定州賜田宅允弟勝勝弟嶽並立功宇文氏列在周史侯莫陳悅代人也父婆羅門為駝牛都尉故悅長於河西好田獵善騎射會牧子作亂遂歸爾朱榮榮引為府長流參軍莊帝初除金紫光祿大夫封柏人縣侯爾朱天光之討關西悅以天光右廂大都督西伐克獲皆與天光賀拔嶽略同除鄯州刺史爾朱榮死後亦隨天光下隴元曄立進爵為公改白水郡公普泰中除秦州刺史天光之東出將抗齊神武悅與嶽下隴以應神武至雍州會爾朱覆敗永熙初加開府儀同三司都督隴右諸軍仍兼秦州刺史三年嶽召悅共討曹泥悅誘嶽斬之嶽左右奔散悅遣人安慰衆皆畏服悅心猶豫不即撫納乃還入隴止永洛城嶽所部聚於平涼規還圗悅周文時為夏州刺史衆遣奉迎周文至遂總嶽部衆并家口入髙平城以自安固乃勒衆入隴征悅悅聞之棄城南據山水之險悅先召南秦州刺史李景和其夜景和遣人詣周文密許翻降至暮景和乃勒其所部使上驢駝云儀同有教欲還秦州守以拒賊復紿帳下云儀同欲還秦州汝等何不裝辦衆謂言實以次相驚皆散趣秦州景和先馳至城據門以慰輯之悅部曲離散猜畏傍人不聽左右近已與其二弟并兒及謀殺嶽者八九人棄軍迸走數日之中槃回往來不知所趣左右勸回靈州而悅不決言下隴後恐為人見乃放馬山中令從者悉步自乘一驢欲往靈州中路追騎將及縊死野中弟息部下悉見禽殺唯先謀殺嶽者悅中兵參軍豆盧光走至靈州後奔晉陽悅自殺嶽後精神恍惚不復如恆恆言我睡即夢嶽語我兄欲何處去隨逐我不相置因此彌不自安而致敗滅念賢字蓋盧金城枹罕人也父求就以大家子戍武川鎮乃家焉賢美容質頗涉經史為兒童時在學中讀書有善相者過學諸生競詣之賢獨不往笑謂諸生曰男兒死生冨貴皆在天也何遽相乎少遭父憂居喪有孝稱後以破衛可瓌功除别將又以軍功封屯留縣伯從爾朱榮入洛兼尚書右僕射東道行臺進爵平恩縣公永熙中孝武以賢為中軍北向大都督進爵安定郡公加侍中開府儀同三司大統初拜太尉為秦州刺史加太傅給後部鼓吹三年轉太師都督河州刺史大將軍久之還朝兼録尚書事後與廣陵王欣扶風王季等同為正直侍中時行殿初成未有題目帝詔近侍各名之對者非一莫允帝心賢乃名為圎極帝笑曰正與朕意同即以名之河橋之役賢不力戰乃先還自是名頗減五年除都督秦州刺史薨於州諡曰昭定賢於諸公皆為父黨自周文以下咸拜敬之子華性和厚有長者風官至開府儀同三司合州刺史梁覽字景睿金城人也其先出自安定避難走西羌世為部落酋帥曽祖穆以枹罕城歸吐谷渾後又歸魏封臨洮公祖顯為尚書封南安公父釗河華二州刺史封新陽縣伯覽家世豪冨資纍千金孝昌初秦州莫折念生胡琛等反散財招募有三千人鎮河州從大軍平賊歷涼河二州刺史封安德縣侯覽既為本州刺史盛修甲仗人馬精鋭吐谷渾憚不敢出皆曰梁公在未可行也永安中詔大鴻臚琅邪王皓就䇿授世為河州刺史永熙中改封郡公大統二年加太尉其年覽從弟企定反欲圗覽覽與數戰未能平王師至始破之四年遷太傅及河橋之役王師敗時病留長安趙青雀反北城覽為之謀主事平乃見殺子鸛雀位儀同三司大都督後坐事免死雷紹字道宗武川鎮人也九歲而孤有膂力善騎射年十八給事鎮府嘗使洛陽見京都禮義之美還謂同僚曰徒知邊備尚武以圗冨貴不謂文學身之寶也生世不學其猶穴處何所見焉遂逃歸辭母求師經年通孝經論語嘗讀書至人行莫大於孝乃投卷歎曰吾離違侍養非人子之道即還鄉里躬耕奉養遭母憂哀毁骨立由是知名鎮將召補鎮佐後隨賀拔嶽征討為嶽長史嶽有大事常訪而後行及齊神武起兵嶽恥居其下紹乃勸迎孝武西都長安以順討逆嶽曰吾本意也後嶽信諸將言欲保關中坐觀成敗紹知計不用請為邊州建功效嶽曰君有毗佐之力當總大州遂以紹為京兆太守清平理物甚得人和在郡踰年嶽被害初紹見嶽數與侯莫陳悅宴語嘗謂嶽曰君其慎之嶽不從果及於難紹乃棄郡馳赴嶽軍與冦洛等迎周文悅平以功授大都督涼州刺史紹請留所領兵以助東討請單騎赴州刺史李叔仁擁州逆命紹遂歸永熙三年以紹為渭州刺史進爵昌國伯初紹為嶽長史周文為嶽左丞及居相位常以恩舊接之卒於州紹性好施祿賜皆分贍親故及死日無以送終兼敬信佛道敕其子曰吾本鄉葬法必殺犬馬於亡者無益汝宜斷之斂以時服事從約儉還葬長安天子素服臨弔贈太尉賜東園祕器子渙毛遐字鴻逺北地三原人也世為酋帥曽祖天愛太武時至定州刺史始昌子傳至遐四世不絶正光中蕭寶夤為大都督討關中諸賊咸陽太守韋邃時為都督以遐為都督府長史寶夤敗還長安三輔騷擾遐因辭邃還北地與弟鴻賓聚鄉曲豪傑遂東西略地氐羌多赴之共推鴻賓為盟主既而賊帥宿勤買奴自號京兆王於北地遐詐降之而與鴻賓攻其壁賊自相斫射縱兵追擊七柵皆平後寶夤構逆謀遐知之乃寄書與鴻賓索馬迎接復於馬祗柵建旗鼓以拒寶夤攻其將盧祖遷禽之寶夤以是日拜南郊竊號禮未畢而告敗寶夤懼口乾色變不遑部伍人皆亂還詔授遐南幽州刺史進爵為伯遐又攻破其將侯終德寶夤知內外勢異輕將十數騎走巴中冬万俟醜奴陷秦州詔以遐兼尚書二州行臺孝武帝入關敕周文置二尚書分掌機事遐與周惠達始為之稍遷驃騎大將軍開府儀同三司卒遐少任俠有智謀世為豪右資産巨億士流貧乏者多被振贍故中書郎檀翥尚書郎公孫範等常依託之至於自供衣食粗弊而已死之日鄉黨赴葬咸共痛惜鴻賓大鼻眼多鬢鬚黑而且肥狀貌頗異氐羌見者皆畏之加膽略騎射俶儻不拘小節昆季之中尤輕財好施遐雖云早立而名出其下及賊起鄉里推為盟主常與遐一守一戰後拜岐州刺史散騎常侍開國縣侯遐笑謂鴻賓曰擊賊之功吾不居汝後至於受賞汝在吾前當以德濟物不及汝故耳明帝以鴻賓兄弟所定處多乃改北地郡為北雍州以鴻賓為刺史詔曰此以晝錦榮卿也改三原縣為建中郡以旌其兄弟後爾朱天光自關中還洛夷夏心所忌者皆將自隨鴻賓亦領鄉中壯武二千人以從洛中素聞其名衣冠貧冗者競與之交尋拜西兖州刺史羈寓倦遊之輩四座常滿鴻賓資給衣食與己悉同私物不足頗有公費轉南青州刺史未幾徵還為有司所紏鴻賓遂逃匿民間月餘詔特原之及孝武帝與齊神武有隙令鴻賓鎮潼關為西道之寄車駕西幸漿糗乏絶侍官三二日間唯飲澗水鴻賓奉獻酒食迎於稠桑文武從者始解飢渴武帝把其手曰寒松徑草所望於卿也事平之日寧忘主人仍令守潼關後神武來冦見禽至并州憂恚卒鴻賓弟鴻顯位散騎常侍封縣侯遐乳母所産也一字七寶遐養之為弟因姓毛氏徑悍多力後隨諸兄戰鬪多先鋒陷敵大統四年為廣州刺史與駱超鎮東陽陷東魏卒子野義乙弗朗字通照其先東部人也世為部落大人與魏徙出因家上樂焉朗少有俠氣在鄉里以善騎射稱孝莊末北境擾亂避地居并肆間爾朱榮見而重之甚相接待以功封蓮勺子後𨽻賀拔嶽從爾朱天光西討為嶽左廂都督孝武帝之禦齊神武授朗閣內大都督及帝西入詔朗為軍師先驅靖路至長安封長安縣公卒於岐州刺史初朗患積冷周文賜二石東生散令朗如法服之使人問疾朝夕相繼其見重如此臨終惟云恨不見河洛清平重反京縣以此為恨三舉手捶牀而便氣盡贈太尉子鳳位宫伯開府儀同三司與周閔帝謀誅宇文護見殺辛雄字世賓隴西狄道人也父暢汝南鄉郡二郡太守雄有孝性居父憂殆不可識頗涉書史好刑名亷謹雅素不妄交友喜怒不形於色釋褐奉朝請清河王懌為司空辟為左曹撫田曹事懌遷司徒仍授左曹並當煩劇爭訟填委雄用心平直加以間明政事經其剖斷莫不咸服懌重之每謂人曰必也無訟辛雄其有焉遷尚書駕部三公郎其年沙汰郎官唯雄與羊深等八人見留餘悉罷遣先是御史中丞東平王匡復欲輿棺諫諍尚書令任城王澄劾匡大不敬詔恕死雄奏理匡曰竊見白衣元匡歷奉三朝每蒙寵遇謇諤之性簡在帝心鷹鸇之志形於在昔故髙祖錫之以匡名陛下任之以彈紏當髙肇之時匡造棺致諫主聖臣直卒以無咎假欲重造先帝已容之於前陛下冝寬之於後祁奚云叔向之賢可宥十世而匡不免其身實可嗟惜未幾匡除平州刺史右僕射元欽謂左僕射蕭寶夤曰辛郎中才用省中諸人莫出其右者寶夤曰吾聞遊僕射云得如雄者四五人共省事足矣今日之賞何其晚哉初廷尉少卿袁翻以犯罪之人經恩競訴枉直難明遂奏曽染風聞者不問曲直推為獄成悉不斷理詔門下尚書廷尉議之雄議曰春秋之義不幸而失寧僭不濫僭則失罪人濫乃害義人今議者不忍罪姦吏使出入縱情令君子小人薰蕕不别豈所謂賞善罰惡殷勤隱恤者也古人唯患察獄之不精未聞知寃而不理詔從雄議自後朝廷每有疑議雄與公卿駮難事多見從於是公能之名甚盛又為祿養論稱仲尼陳五孝自天子至於庶人無致仕之文禮記八十一子不從政九十家不從政鄭元注云復除之然則止復庶人非公卿大夫士之謂以為宜聽祿養不約其年書奏孝明納之冀州刺史侯剛啓為長史孝明以雄長於世務惜不許之更除司空長史時諸公皆慕其名欲屈為佐莫能得也時諸方賊盛而南冦侵境山蠻作逆孝明欲親討以荆州為先詔雄為行臺左丞與臨淮王彧東趣葉城别將裴衍西通鴉路衍稽留未進彧師已次汝濱逢北渣求救或以處分道别不欲應之雄曰王執麾閫外唯利是從見可而進何必守道或恐後有得失之責要雄符下雄以車駕將親伐蠻夷必懷震動乘彼離心無往不破遂符彧軍令速赴擊賊聞果自走散在軍上疏曰凡人所以臨堅陳而忘身觸白刃而不憚者一則求榮名二則貪重賞三則畏刑罰四則避禍難非此數事雖聖主不能勸其臣慈父不能厲其子明主深知其情故賞必行罰必信使親疏貴賤勇怯賢愚聞鐘鼓之聲見旍旗之列莫不奮激赴敵場豈厭久生而樂早死也利害縣於前欲罷不能耳自秦隴逆節將歷數年蠻左亂常稍已多載凡在戎役數十萬人三方之師敗多勝少迹其所由不明賞罰故也陛下欲天下之早平愍征夫之勤悴乃降明詔賞不移時然兵將之勤歷稔不決亡軍之卒晏然在家致令節士無所勸慕庸人無所畏懾進而擊賊死交而賞賒退而逃散身全而無罪此其所以望敵奔沮不肯進力者矣若重發明詔更量賞罰則軍威必張賊難可弭臣聞必不得已去食就信以此推之信不可斯須廢也賞罰陛下之所易尚不能全而行之攻敵士之所難欲其必死寧可得也後為吏部郎中會爾朱榮入洛及河隂之難人情未安雄潛竄不出莊帝欲以為尚書門下奏曰辛雄不出存亡未分帝曰寧失亡而用之可失存而不用也遂除度支尚書後以本官兼侍中關西慰勞大使將發請事五條一言逋懸租調宜悉不徵二言簡罷非時徭役以紓民命三言課調之際使豐儉有殊令州郡量檢不得均一四言兵起厯年死亡者衆或父或子辛酸未歇見存耆老請假版職悅生者之意慰死者之魂五言喪亂既久禮儀罕習如有閨門和穆孝悌卓然者宜表其門閭莊帝從之因詔人年七十者授縣八十授郡九十加四品將軍百歲從三品將軍永熙二年兼吏部尚書時近習専恣雄懼其讒慝不能守正論者頗譏之孝武南狩雄兼左僕射留守京師永熙末兼侍中帝入關右齊神武至洛於永寧寺大集朝士責雄及尚書崔孝芬劉廞楊機等曰為臣奉主匡危救亂若處不諫諍出不陪隨緩則耽寵急則竄避臣節安在乃誅之二子士璨士貞逃入關中雄從父兄纂字伯將學涉文史溫良雅正初為兖州安東府主簿與祕書丞同郡李伯尚有舊伯尚與咸陽王禧同逆逃竄投纂事覺坐免官後為太尉騎兵參軍每為府主清河王懌所賞至定考懌曰辛騎兵有學有才宜為上第及梁將曹義宗攻新野詔纂為荆州軍司纂善撫將士人多用命賊甚憚之會孝明崩諱至咸以對敵欲祕凶問纂曰安危在人豈關是也遂發喪號哭三軍縞素還入州城申以盟約尋為義宗所圍相率固守孝莊即位除兼尚書仍行臺後大都督費穆擊義守禽之入城因舉酒屬纂曰微辛行臺之在斯吾亦無由建此功也永安二年元皓乘勝至城下為皓所禽及孝莊還宫纂謝不守之罪帝曰於時朕亦北巡東軍不守豈卿之過轉滎陽太守百姓薑洛生康乞得者舊是前太守鄭仲明左右豪猾偷竊境內患之纂伺捕禽獲梟於郡市百姓欣然纂僑屬洛陽太昌中乃為河南邑中正永熙三年除河內太守齊神武赴洛兵集城下纂出城謁神武慰勉之因命前侍中司馬子如曰吾行途疲弊宜待吾執河內手也尋為兼尚書南道行臺西荆州刺史時蠻酋樊大能應西魏纂攻之不克而敗為西魏將獨孤信所害贈司徒公雄族祖琛字僧貴祖敬宗父樹寶並代郡太守琛少孤曽過友人見其父母無恙垂涕久之釋褐奉朝請滎陽郡丞太守元麗性頗使酒琛每諫之麗後醉輒令閉閣曰勿使丞入也孝文南征麗從輿駕詔琛曰委卿郡事如太守也景明中為楊州征南府長史刺史李崇多事産業琛每諫折崇不從遂相紏舉詔並不問後加龍驤將軍南梁太守崇因置酒謂琛曰長史後必為刺史但不知得上佐何如人耳琛對曰若萬一叨忝得一方正長史朝夕聞過是所願也崇有慙色卒於官琛寬雅有度量涉獵經史喜愠不形於色當官奉法所在有稱長子悠字元夀早有器業為侍御史監揚州軍賊平録勳書時李崇猶為刺史欲寄人名悠不許崇曰我昔逢其父今復逢其子早卒悠弟俊字叔義有文才魏子建為山南行臺以為郎中有軍國機斷還京於滎陽為人所劫害贈東秦州刺史俊弟術列在齊史楊機字顯略天水冀人也祖伏恩徙居洛陽因家焉機少有志節為士流所稱河南尹李平元暉並召署功曹暉尤委以郡事或謂暉曰弗躬弗親庶民弗信何得委事於機髙卧而已暉曰吾聞君子勞於求士逸於任賢故前代有坐嘯之人主諾之守吾既委得其才何為不可由是聲名更著解褐奉朝請時皇子國官多非其人詔選清直之士機見舉為京兆王愈國中尉愈甚敬憚之後為洛陽令京輦伏其威風希有干犯凡訴訟者一經其前後皆識其名姓并記其事理世咸異之歷司州别駕清河內史河北太守並有能名永熙中遷度支尚書機方直之心久而彌厲奉公正己為時所稱家貧無馬多乘小犢車時論許其清白與辛雄等並為齊神武所誅髙恭者字道穆自云遼東人也祖潛獻文初賜爵陽關男詔以沮渠牧犍女賜潛為妻封武威公主拜駙馬都尉父崇字積善少聰敏以端謹稱家資富厚而崇志尚儉素初崇舅氏坐事誅公主痛本生絶允遂以崇繼牧犍後改姓沮渠景明中啓復本姓襲爵除洛陽令為政清斷吏人畏其威風發擲不避強禦縣內肅然卒贈滄州刺史諡曰成道穆以字行於世學涉經史所交皆名流勝士幼孤事兄如父每謂人曰人生厲心立行貴於見知當使夕脫羊裘朝佩珠玉若時不我知便退迹江海自求其志御史中尉元匡髙選御史道穆奏記於匡以求備選匡大喜曰吾久知其人適欲召之遂引為御史其紏擲不避權豪臺中綱紀多為所正正光中出使相州前刺史李世哲即尚書令崇之子多有非法逼買人宅廣興屋宇皆置鴟尾又於馬埓堠上為木人執節道穆繩紏悉毁去之并表發其贓貨爾朱榮討蠕蠕道穆監其軍事榮甚憚之蕭寶夤西征以道穆為行臺郎中軍機之事皆以委之後屬兄謙之被害情不自安遂擕家趣濟隂變易姓名以避難託身於孝莊孝莊時為侍中深相保護及即位賜爵龍城侯召為吏部郎除太尉長史領中書舍人及元皓逼虎牢或勸帝赴關西者帝以問道穆道穆對曰關中今日殘荒何由可往臣謂元皓兵衆不多乘虛深入者由國家將帥不得其人耳陛下若親率宿衛髙募重賞背城一戰臣等竭其股肱破皓必矣如恐成敗難測便宜車駕北渡循河東下别召爾朱榮令赴河內以掎角之為萬全之計帝曰髙舍人語是其夜到河內郡北帝命道穆燭下作詔書數十紙布告遠近然後四方知乘輿所在除中軍給事黃門侍郎安喜縣公於是爾朱榮欲回師待秋道穆謂榮曰元皓以蕞爾輕兵奄據京洛使乘輿飄露人神恨憤主憂臣辱良在於今大王擁百萬之衆輔天子令諸侯自可分兵河畔縛筏造船處處遣渡徑禽群賊復主宮闕此五伯之舉且一日縱敵為世之患今若還師令皓重完守具徵兵天下所謂養虺成蛇悔無及矣榮深然之及莊帝反政因宴次謂爾朱榮曰前若不用髙黃門計則社稷不安可為朕勸其酒令醉榮因陳其作監軍時臨事能決實可任用尋除御史中尉仍兼黃門道穆外秉直繩內參機密凡是益國利人之事必以奏聞諌諍盡言無所顧忌選用御史皆當世名輩李希崇李繪陽休之陽斐封君義邢子明蘇淑宋世良等三十人於時用錢稍薄道穆奏曰百姓之業錢貨為本救弊改鑄王政所先自頃以來私鑄薄濫官司紏繩持網非一在市銅價八十一文得銅一斤私鑄薄錢斤餘二百既示之以深利又隨之以重刑得罪者雖多姦鑄者彌衆今錢徒有五銖之文而無二銖之實薄甚榆莢上貫便破置之水上殆欲不沈因循有漸科防不切朝廷失之彼復何罪昔漢文帝以五分錢小改鑄四銖至武帝復改三銖為半兩此皆以大易小以重代輕也論今據古宜改鑄大錢文載年號以記其始則一斤所成止七十六文銅價至賤五十有餘其中人功食料錫炭鉛砂縱復私營不能自潤直置無利自應息心况復嚴刑廣設也以臣測之必當錢貨永通公私獲允遂用楊侃計鑄永安五銖錢僕射爾朱世隆當朝權盛因內見衣冠失儀道穆便即彈糾帝姊夀陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深以為恨以泣訴帝帝謂主曰髙中尉清直之人彼所行者公事豈可以私恨責之道穆後見帝帝曰一日家姊行路相犯深以為愧道穆免冠謝曰臣奉陛下法不敢於公主虧朝典帝曰朕以愧卿卿反謝朕尋敕監儀注又詔袐書圗籍及內典書緗素多致零落可令道穆總集帳目并牒儒學之士編比次第道穆又上疏曰髙祖太和之初置廷尉司直論刑辟是非雖事非古始交濟時要竊見御史出使悉受風聞雖時獲罪人亦不無枉濫何者得堯之罰不能不怨守令為政容有愛憎姦猾之徒恆思報惡多有妄造無名共相誣謗御史一經檢究恥於不成杖木之下以虛為實無罪不能自雪者豈可勝道哉臣雖愚短守不假器繡衣所指冀以清肅若仍更踵前失或傷善人則尸祿之責無所逃罪如臣鄙見請依太和故事還置司直十人名隸廷尉以五品選歷官有稱心平性直者為之御史若出糾劾即移廷尉令知人數廷尉遣司直與御史俱發所到州郡分居别館御史檢了移付司直司直覆問事訖與御史俱還中尉彈聞廷尉科律一如舊式度使獄成罪定無復稽寬為惡取敗不得稱枉若御史司直糾劾失實悉依所斷獄罪之聽以所檢迭相糾發如二使阿曲有不盡理聽罪家詣門下通訟别加案檢如此則肺石之傍怨訟可息藂棘之下受罪吞聲者矣詔從之復置司直及爾朱榮死帝召道穆付赦書令宣於外因謂之曰自今日後當得精選御史矣先是榮等常欲以親黨為御史故有此詔及爾朱世隆等戰於大夏門北道穆受詔督戰又贊成太府卿李苖斷橋之計世隆等於是北遁加衛將軍大都督兼尚書右僕射南道大行臺時雖外託征蠻而帝恐北軍失利欲為南巡之計未發會爾朱兆入洛道穆慮禍託病去官世隆以其忠於前朝遂害之太昌中贈車騎大將軍儀同三司雍州刺史子士鏡襲爵為北豫州刺史道穆兄謙之字道驤少事母以孝聞専意經史天文算厯圗緯之書多所該涉好文章留心老易襲父爵釋褐奉朝請孝昌中行河隂令先是有人囊盛瓦礫指作錢物詐市人馬因以逃去詔令追捕必得以聞謙之乃偽枷一人因立於馬市宣言是前詐市馬賊今欲刑之密遣察市中私議者有二人相見欣然曰無復憂矣執送案問悉獲其黨并出前後盜處失物之家各得其本物具以狀告尋正河隂令在縣二年損益政體多為故事時道穆為御史亦有能名世美其父子兄弟並著當官之稱舊制二縣令得面陳得失時佞幸之輩惡其有所發聞遂共奏罷謙之乃上疏曰臣以無庸謬宰神邑實思奉法不撓稱是官方酬朝廷無資之恩盡人臣守器之節但豪家支屬戚里親媾縲紲所及舉目多是皆有盜憎之色咸起惡上之心縣令輕弱何能克濟先帝昔發明詔得使面陳所懷臣亡父先臣崇之為洛陽令常得入奏是非所以朝貴斂手無敢干政近年以來此制遂寢致使神宰威輕下情不逹今二聖逺遵堯舜憲章髙祖愚臣亦望策其駑蹇少立功名乞行新典更明往制庶姦豪知禁頗自屏心詔付外量聞謙之又上疏以為自正光以來邉城屢擾命將出師相繼於路但諸將帥或非其才多遣親者妄稱入募唯遣奴客充數而已對冦臨敵略不彎弓則是王爵虛加征夫多闕賊虜何可殄除忠貞何以勸誡也且近習侍臣戚屬朝士請託官曹擅作威福如有清貞奉法不為回者咸共譖毁橫受罪罰在朝顧問誰肯申聞蔽上擁下虧風損政使讒諂甘心忠讜息議且頻年以來多有徵發人不堪命動致流離茍保妻子競逃王役不復顧其桑井憚此刑書正由還有必困之理歸無自安之路若聽歸其本業徭役微甄則還者必衆墾田增闢數年之後大獲課入今不務以理還之但欲嚴符切勒恐數年之後走者更多故有國有家者不患人不我歸唯患政之不立不恃敵不我攻唯恃吾不可侮此乃千載共遵百王一致伏願少垂覽察靈太后得其疏以責左右近侍諸寵要者由是疾之乃啓太后云謙之有學藝宜在國學以訓胄子詔從之除國子博士謙之與袁翻常景酈道元溫子升之徒咸申款舊好施贍恤言諾無虧居家僮𨽻對其兒不撻其父母生三子便免其一世無髠黥奴婢常稱俱稟人體如何殘害謙之以父舅氏沮渠蒙遜曾據涼土國書漏闕謙之乃修涼書十卷行於世涼國盛事佛道為論貶之因稱佛是九流之一家當世名流競以佛理來難謙之還以佛義對之竟不能屈以時所行歷多未盡善乃更改元修者撰為一家之法雖未行於世識者歎其多能時朝議鑄錢以謙之為鑄錢都將長史乃上表求鑄三銖錢曰蓋錢貨之立本以通有無便交易故錢之輕重世代不同太公為周置九府圜法至景王時更鑄大錢秦兼海內錢重半兩漢興以秦錢重改鑄榆莢錢至文帝五年復為四銖孝武時悉復銷壞更鑄三銖至元狩中變為五銖又造赤仄之錢以一當五王莽攝政錢有六等大錢重十二銖次九銖次七銖次五銖次三銖次一銖魏文帝罷五銖錢至明帝復立孫權江左鑄大錢一當五百權赤烏年復鑄大錢一當十輕重大小莫不隨時而變竊以食貨之要八政為首聚財之貴詒訓典文是以昔之帝王乘天地之饒御海內之富莫不腐紅粟於太倉藏朽貫於泉府儲畜既盈人無困弊可以寧謐四海如身使臂者矣昔漢之孝武地廣財饒外事四戎遂虛國用於是草茅之臣出錢助國興利之計納稅廟堂市列𣙜酒之官邑有告緡之令鹽鐵既興錢幣屢改少府遂豐上林饒積外闢百蠻內不增賦者皆計利之由也今羣祅未息四郊多壘徵稅既煩千金日費倉儲漸耗財用將竭誠楊氏獻稅之秋桑兒言利之日夫以西亰之盛錢猶屢改並行大小子母相權况今寇難未除州郡淪敗人物雕零軍國用少别鑄小錢可以富益何損於政何妨於人也且政興不以錢大政衰不以錢小唯貴公私得所政化無虧既行之於古亦宜效之於今矣若禹遭大水以歷山之金鑄錢救人之困湯遭大旱以莊山之金鑄錢贖人之賣子者今百姓窮悴甚於曩日欽明之主豈得垂拱而觀之哉臣今此鑄以濟交乏五銖之錢任使並用行之無損國得其益詔將從之事未就會卒初謙之弟道穆正光中為御史紏相州刺史李世哲事大相挫辱其家恆以為憾至是世哲弟靈軌為靈太后深所寵任會謙之家僮訴良神軌左右之入諷尚書判禁謙之於廷尉時將赦神軌乃啓靈太后發詔於獄賜死朝士莫不哀之所著文章百餘篇别有集録永安中贈營州刺史諡曰康又除一子出身以明寃屈謙之弟謹之字道修父崇既還本姓以謹之繼沮渠氏綦俊字檦顯河南略陽人也其先居代俊孝莊時仕纍遷為滄州刺史甚為吏民畏悅尋除太僕卿及爾朱世隆等誅齊神武召文武百司下及士庶議所立莫有應者俊避席對曰廣陵雖為爾朱扶戴當今之聖主也神武將從之時黃門崔㥄議不同髙乾魏蘭根等固執㥄言遂立孝武帝及帝入關神武深思俊言常以為恨尋除御史中尉於路與僕射賈顯度相逢顯度恃勳貴排俊騶列倒俊忿見於色自入奏之尋加散騎常侍驃騎大將軍左光祿大夫儀同三司俊巧佞能候當塗斛斯椿賀拔勝皆與友善性多詐賀拔勝出鎮荆州過俊别因辭俊母俊故見敗氈弊被勝更遺之錢物後兼吏部尚書復為滄州刺史徵還兼中尉章武縣伯尋除殷州刺史薨於州贈司空諡曰文貞子洪實字巨正位尚書左右郎魏郡邑中正嗜酒好色無行檢卒官山偉字仲才河南洛陽人也其先居代祖強美容貌身長八尺五寸工騎射彎弓五石為奏事中散從獻文獵方山有兩狐起於御前詔強射之百步內二狐俱獲位內行長父幼之位金明太守偉涉獵文史孝明初元匡為御史中尉以偉兼侍御史入臺五日便遇正會偉司神虎門其妻從叔為羽林隊主撾直長於殿門偉即劾奏匡善之俄然奏正帖國子助教遷員外郎廷尉評時天下無事進仕路難代遷之人多不霑預及六鎮隴西二方起逆領軍元義欲用代來寒人為傳詔以慰悅之而牧守子孫投狀求者百餘人義因奏立勳附隊令各依資出身自是北人悉被收敘偉遂奏記贊義德美義素不識偉訪侍中安豐王延明黃門郎元順順等因是薦之義令僕射元欽引偉兼尚書二千石郎後正名士郎修起居注僕射元順領選表薦為諌議大夫爾朱榮之害朝士偉時守直故免禍及孝莊入宮仍除給事黃門侍郎先是偉與儀曹郎袁升屯田郎李延考外兵郎李奐三公郎王延業方駕而行偉少居後路逢一尼望之嘆曰此輩緣業同日而死謂偉曰君方近天子當作好官既而升等四人皆死於河隂竟如其言俄領著作郎節閔帝立除祕書監仍著作初爾朱兆之入洛官守奔散國史典書髙法顯密埋史書故不遺落偉自以為功訴求爵賞偉挾附世隆遂封東阿縣伯而法顯止獲男爵偉尋進侍中孝靜初除衛大將軍中書令監起居後以本官復領著作卒官贈驃騎大將軍開府儀同三司都督幽州刺史諡曰文貞公國史自鄧淵崔深崔浩髙允李彪崔光以還諸人相繼撰録綦俊及偉等諂説上黨王天穆及爾朱世隆以為國書正應代人修緝不宜委之餘人是以俊偉等更主大籍守舊而已初無述著故自崔鴻死後迄終偉身二十許載時事蕩然萬不記一後人執筆無所憑據史之遺闕偉之由也偉外示沈厚內實矯競與綦俊少甚相得晚以名位之間遂若水火與宇文忠之之徒代人為黨時賢畏惡之而愛尚文史老而彌篤偉弟少亡偉撫寡訓孤同居二十餘年恩義甚篤不營産業身亡之後賣宅營葬妻子不免飄泊士交歎愍之長子昂襲爵宇文忠之河南略陽人也其先南單于之逺屬世據東郡後居代都父侃卒於書侍御史忠之涉獵文史頗有筆札釋褐太學博士天平初除中書侍郎裴伯荗與之同省常侮忽之以忠之色黑呼為黑子後敕修國史元象初兼通直散騎常侍副鄭伯猷使梁武定初為尚書右丞仍修史未幾以事除名忠之好榮利自為中書郎六七年遇尚書省選右丞預選者皆射策忠之試焉既獲丞職大為欣滿志氣囂然有驕物之色識者笑之既失官爵怏怏發疾卒子君山費穆字朗興代人也祖于位商賈二曹令懷州刺史賜爵松陽男父萬襲爵位梁州鎮將贈冀州刺史穆性剛烈有壯氣頗涉文史好尚功名宣武初襲爵稍遷荆州平西府長史皇甫集靈太后之元舅恃外戚之親多為非法穆正色匡諌集亦憚之後蠕蠕主婆羅門自涼州歸附其部衆因飢侵掠邉邑詔穆銜旨宣慰莫不款附明年復叛入寇涼州除穆尚書右丞西北道行臺仍為别將往討之穆至涼州蠕蠕遁走穆謂其所部曰夷狄獸心見敵便走若不令其破膽終恐疲於奔命乃簡練精騎伏於山谷使羸劣之衆為外營以誘之賊騎覘見俄而競至伏兵奔擊大破之及六鎮反叛穆為别將隸都督李崇北伐都督崔暹失利崇將議班師以朔州是白道之衝賊之咽喉若不全則并肆危選將鎮捍僉議舉穆崇乃請穆為朔州刺史尋改雲州刺史穆招離聚散頗得人心北境州鎮皆沒唯穆獨存久之援軍不至穆乃棄城南走投爾朱榮於秀容既而詣闕請罪詔原之孝昌中以都督討平二絳反蜀拜散騎常侍後祅賊李洪於陽城起逆連結蠻左詔穆兼武衛將軍擊破之及爾朱榮向洛靈太后徵穆令屯小平榮推奉孝莊穆遂先降榮素知穆見之甚悅穆潛説榮曰公士馬不出萬人長驅向洛前無橫陳者政以推奉主上順人心故今以京師之衆百官之盛一知公之虛實必有輕侮之心若不大行討罰更樹親黨公還北之日恐不得度太行而內難行矣榮心然之於是有河隂之事天下聞之莫不切齒榮入洛穆為吏部尚書魯縣侯進封趙平郡公為侍中前鋒大都督與大將軍元天穆平邢杲時元皓入京師穆與天穆既平齊地將擊皓穆圍虎牢將拔屬天穆北度既無後繼穆遂降皓皓以河隂酷濫事起於穆引入詰讓殺之孝莊還宮贈侍中司徒公諡曰武宣孟威字能重河南洛陽人也頗有氣尚尤知北土風俗歷東宫齋帥羽林監後以明解北人語敕在著作以備推訪纍遷沃野鎮將前後頻使逺蕃粗能稱旨普泰中除大鴻臚卿贈司空公子恂嗣通志卷一百五十一
