body:
  text: 通志卷一百二十八宋右迪功郎鄭樵漁仲撰列傳第四十一晉王舒子允之王廙弟彬彬彬子彪之從弟稜虞潭孫嘯父􅔎潭兄子顧衆張闓陸曄曄弟玩玩子納何充褚翜蔡謨諸葛恢殷浩顧悅之蔡裔孔愈子汪子安國嚴弟祗從坦從弟羣沉羣子丁潭張茂陶回謝尚謝安安子琰安琰子混兄奕弟奕子元朗子邈安弟万万弟石石兄子朗王舒字處明丞相導之從弟也父會侍御史舒少為從兄敦所知以天下多故不營當時名恆處私門潛心學植年四十餘州禮命太傅辟皆不就及敦為青州舒往依焉時敦被徴為祕書監以寇難路險輕騎歸洛陽委棄公主時輜重金寶甚多親賓無不競取惟舒一無所眄益為敦所賞及元帝鎮建康因與諸父兄弟俱渡江委質焉參鎮東軍事出補溧陽令明帝之為東中郎將妙選上佐以舒為司馬轉後將軍宣城公褚裒咨議參軍遷軍司固辭不受裒鎮廣陵復以舒為車騎司馬頻領望府咸稱明練裒薨遂代裒鎮除北中郎將監青徐二州軍事頃之徵國子博士加散騎常侍未拜轉少府太寧初徙廷尉敦表舒為鷹揚將軍荆州刺史領護南蠻校尉監荆州沔南諸軍事及敦敗王含父子俱奔舒舒遣軍逆之並沉於江進都督荆州平西將軍假節尋以陶侃代舒轉舒為安南將軍廣州刺史舒疾病不樂越嶺朝議亦以其有功不應逺出乃徙為湘州刺史將軍都督持節如故徵代鄧攸為尚書僕射時將徵蘇峻司徒王導欲出舒為外援乃授撫軍將軍會稽內史秩中二千石舒上疏辭以父名會朝議以字同音異於禮無嫌舒復陳音雖異而字同求換他郡於是改會字為鄶舒不得已而行在郡二年而蘇峻作逆乃假舒節都督行揚州刺史事時吳國內史庾氷棄郡奔舒舒移告屬郡以吳王師虞􅔎為軍司御史中丞謝藻行龍驤將軍監前鋒征討軍事率衆一萬與庾冰俱渡浙江前義興太守顧衆護軍參軍顧揚等皆起義軍以應舒舒假衆揚威將軍督護吳中軍事揚監晉陵軍事於御亭築壘峻聞舒等兵起乃赦庾亮諸弟以悅東軍舒率衆次郡之西江為冰藻後繼冰揚等遣前鋒進據無錫遇賊將張健等數千人交戰大敗奔還御亭復自相驚擾冰揚等並敗於錢唐藻守嘉興賊遂入吳燒府舍掠諸縣所在塗地舒以輕進奔敗斬二軍主者免冰揚督護以白衣行事更以顧衆督護吳晉陵軍屯兵章埭吳興太守虞潭率所領討健屯烏苞亭並不敢進時暴雨大水賊管商乘船旁出襲潭及衆潭等奔敗潭還保吳興衆退守錢唐舒更遣將軍陳孺率精鋭千人增戍海浦所在築壘或勸舒宜還都使謝藻守西陵挾海立柵舒不聽留藻錢唐使衆揚守紫壁於是賊轉攻吳興潭諸軍復退賊復掠東遷餘杭武康諸縣舒遣子允之行揚烈將軍與將軍徐遜陳孺及揚烈司馬朱燾以精鋭三千輕邀賊於武康出其不意遂破之斬首數百級賊悉委舟步走允之收其器械進兵助潭時賊韓晃既破宣城轉入故鄣長城允之遣朱燾何凖等擊之戰於于湖潭以強弩射之晃等退走斬首千餘級納降二千人潭由是得保郡是時臨海新安諸山縣並反應賊舒分兵悉討平之會陶侃等至京都舒潭等並以屢戰失利移書盟府自貶去節侃遣使敦喻不聽及侃立行臺上舒監浙江東五郡軍事允之督護吳郡義興晉陵三郡征討軍事既而晃等南走允之追躡於長塘湖復大破之賊平以功封彭澤縣侯尋卒官贈車騎大將軍儀同三司諡曰穆長子晏之蘇峻時為護軍參軍被害晏之子崑之嗣卒子陋之嗣宋受禪國除晏之弟允之最知名允之字深猷總角從伯敦謂為似已恆以自隨出則同輿入則共寢敦嘗夜飲允之辭醉先卧敦與錢鳯謀為逆允之已醒悉聞其言慮敦或疑已便於卧處大吐衣面並汚鳯既出敦果照視見允之卧吐中以為大醉不復疑之時父舒始拜廷尉允之求還定省敦許之至都以敦鳯之謀議事白舒舒即與導俱啓明帝舒為荆州允之隨在西府及敦平帝欲令允之仕舒請曰臣子尚少不樂早官帝許隨舒之會稽及蘇峻反允之討賊有功封番禺縣侯邑千六百户除建武將軍錢唐令領司鹽都尉舒卒去職既葬除義興太守以憂哀不拜從伯導與其書曰太保安豐侯以孝聞天下不得辭司隸和長輿海內名士不免作中書令吾羣從死亡略盡子弟零落遇汝如親如其不爾吾復何言允之固不肯就咸和末除宣城內史監揚州江西四郡事建武將軍鎮于湖咸康中進號西中郎將假節尋遷南中郎將江州刺史蒞政甚有威惠時王恬服闋除豫章郡允之聞之驚愕以為恬丞相子應被優遇不可出為逺郡乃求自解州欲與庾冰言之冰聞甚愧即以恬為吳郡而以允之為衛將軍會稽內史未到卒年四十諡曰忠子晞之嗣卒子肇之嗣王廙字世將丞相導從弟而元帝姨弟也父正尚書郎廙少能屬文多所通涉工書畫善音樂射御博奕雜伎辟太傅掾轉參軍豫迎大駕封武陵縣侯拜尚書郎出為濮陽太守元帝作鎮江左廙棄郡過江帝見之大悅以為司馬頻守廬江鄱陽二郡豫討周馥杜韜以功纍增封邑除冠軍將軍鎮石頭領丞相軍咨祭酒王敦啓為寧逺將軍荆州刺史及帝即位廙奏中興賦上疏稱述功德文多不載初王敦左遷陶侃使廙代為荆州將吏馬俊鄭攀等上書請留侃敦不許廙為俊等所襲奔於江安賊杜曾與俊攀北迎第五猗以距廙廙督諸軍討曾又為曾所敗敦命湘州刺史甘卓豫章太守周廣等助廙擊曾衆潰廙得到州廙性俊率嘗從南下旦自尋陽迅風飛帆暮至都倚舫樓長嘯神氣甚逸王導謂庾亮曰世將為傷時識事亮曰正足舒其逸氣耳廙在州大誅戮侃時將佐及徵士皇甫方回於是大失荆土之望人情乖阻帝乃徵廙為輔國將軍加散騎常侍以母喪去職服闋拜征虜將軍進左衛將軍及王敦構禍帝遣廙喻敦既不能諫其悖逆乃為敦所留受任助亂敦得志以廙為平南將軍領護南蠻校尉荆州刺史尋病卒帝猶以親故深痛愍之喪還京都皇太子親臨拜柩如家人之禮贈侍中驃騎將軍諡曰康明帝與大將軍溫嶠書曰痛謝鯤未絶於口世將復至於此並盛年俊才不遂其志痛切於心廙明古多通鯤逺有識致其言雖未足令人改聽然味之不倦近未易有也坐相視盡如何子頤之嗣仕至東海內史頤之弟胡之字修齡弱冠有聲譽歷郡守侍中丹陽尹素有風眩疾發動甚數而神明不損石虎死朝廷欲綏輯河洛以胡之為西中郎將司州刺史假節以疾固辭未行而卒子茂之亦有美譽官至晉陵太守子敬𢎞義熙末為尚書廙弟彬字世儒少稱雅正弱冠不就州郡之命光祿大夫傅祗辟為掾後與兄廙俱渡江為揚州刺史劉機建武長史元帝引為鎮東賊曹參軍轉典兵參軍豫討華軼功封都亭侯愍帝召為尚書郎以道險不就遷建安太守徙義興內史未之職轉軍咨祭酒中興建稍遷侍中從兄敦舉兵入石頭帝使彬勞之會周顗遇害彬素與顗善先往哭顗甚慟既而見敦敦怪其有慘容而問其所以彬曰向哭伯仁情不能已敦怒曰伯仁自致刑戮且凡人遇汝復何為者哉彬曰伯仁長者君之親友在朝雖無謇諤亦非阿黨而赦後加之極刑所以傷惋也因勃然數敦曰兄抗旌犯順殺戮忠良謀圖不軌禍及門户音辭慷慨聲淚俱下敦大怒厲聲曰爾狂悖乃可至此為吾不能殺汝邪時王導在坐為之懼勸彬起謝彬曰有腳疾已來見天子尚欲不拜何跪之有此復何所謝敦曰腳痛孰若頸痛彬意氣自若殊無懼容後敦議舉兵向京師彬諫甚苦敦變色目左右將收彬彬正色曰君昔歲殺兄今又殺弟邪先是彬從兄豫章太守稜為敦所害敦以彬親故容忍之俄而以彬為豫章太守彬為人朴素方直乏風味之好雖居顯貴常布衣蔬食遷前將軍江州刺史及敦死王含欲投王舒王應勸含投彬含曰大將軍平素與江州云何汝欲歸之應曰此乃所以宜往也江州當人強盛時能立異同此非常人所及覩衰厄必興愍惻荆州守文豈能意外行事含不從遂共投舒舒果沉含父子於江彬聞應來密具船以待之既不至深以為恨敦平有司奏彬及兄子安成太守籍之並是敦近親皆除名詔曰司徒導以大義滅親其後昆雖或有違猶將百世宥之况彬等公之近親乃原之徵拜光祿勳轉度支尚書蘇峻平後改築新宫彬為大匠以營創勳勞賜爵關內侯遷尚書右僕射卒官年五十九贈特進衛將軍加散騎常侍諡曰肅長子彭之嗣位至黃門郎次彪之最知名彪之字叔虎年二十鬚鬢皓白時人謂之王白鬚初除佐著作郎東海王文學從伯導謂曰選官欲以汝為尚書郎汝幸可作諸王佐邪彪之曰位之多少既不足計自當任之於時至於超遷是所不願遂為郎鎮軍將軍武陵王晞以為司馬纍遷尚書左丞司徒左長史御史中丞侍中廷尉時永嘉太守謝毅赦後殺郡人周矯矯從兄球詣州訴寃揚州刺史殷浩遣從事收毅付廷尉彪之以球為獄主身無王爵非廷尉所料不肯受與州相反覆穆帝發詔令受之彪之又上疏執據時人比之張釋之時當南郊簡文帝為撫軍執政訪彪之應有赦不答曰中興以來郊祀往往有赦愚意常謂非宜何者黎庶不逹其意將謂郊祀必赦至此時凶愚之輩復生心於僥幸矣遂從之轉吏部尚書簡文有命用秣陵令曲安逺補句容令殿中侍御史奚朗補湘東郡彪之執不從曰秣陵令三品縣耳殿下昔用安逺談者紛然句容近畿三品佳邑豈可處卜術之人無才用者邪湘東雖復逺小所用未有朗比談者謂頗兼卜術得進殿下若超遷寒悴當令人才可拔朗等凡器實未足充此選太尉桓溫欲北伐屢詔不許溫輒下武昌人情震懼或勸殷浩引身告退彪之言於簡文曰此非保社稷為殿下計皆自為計耳若殷浩去職人情崩駭天子獨坐既爾當有任其責者非殿下而誰又謂浩曰彼抗表問罪卿為其首事任如此猜釁已構欲作匹夫豈有全地邪且當靜以待之令相王以手書示以欵誠陳以成敗當必旋斾若不順命即遣中詔如復不奉乃當以正義相裁無故匆匆先自猖蹶浩曰決大事正自難頃日來欲使人悶聞卿此謀意始得了溫亦奉帝旨果不進時衆官漸多而遷徙每速彪之上議請省官并職言古人三載考績三考黜陟官少故也蓋官衆則缺多缺多則遷速今內外百官較而計之固應有并省者矣六卿之任太常望雅而職重然其所司義髙務約宗正所統蓋鮮可以并太常宿衛之重二衛任之其次驍騎左軍各有所領無兵軍校皆應罷廢四軍皆罷則左軍之名不宜獨立宜改遊擊以對驍騎內官自侍中以下舊員皆四中興之初二人而已二人對直或有不周愚謂三人於事則無闕也凡餘諸官無綜事實者可令大官隨才位所帖而領之若未能頓廢自可因缺而省之斯誠責實致治之大務也永和末多疾疫舊制朝臣家有時疾染易三人以上者身雖無疾百日不得入宫至是百官多列家疾不入彪之又言疾疫之年家無不染若以之不復入宫則直侍頓闕王者宫省空矣朝廷從之既而長安人雷弱兒梁安等詐云殺苻健苻睂請兵應接時殷浩鎮夀陽便進據洛營復山陵屬彪之疾歸因上簡文帝箋陳弱兒等容有詐偽浩未應輕進尋而弱兒果詐姚襄反叛浩大敗退守譙城簡文笑謂彪之曰果如君言自頃以來君謀無遺䇿張陳復何以過之轉領軍將軍遷尚書僕射以疾病不拜徙太常領崇德衛尉時或謂簡文曰武陵第中大修器械將謀非常也簡文以問彪之彪之曰武陵王志意盡於馳騁田獵耳願深靜之以懷異同者或復以此為言簡文甚悅復轉尚書僕射時豫州刺史謝奕卒簡文遽使彪之舉可以代奕者對曰當今時賢備簡髙監簡文曰人有舉桓雲者君謂如何彪之曰雲不必非才然溫居上流割天下之半其弟復處西藩兵權盡在一門亦非深根固蒂之宜也人才非可豫量但當令不與殿下作異者耳簡文頷曰君言是也後以彪之為鎮軍將軍會稽內史加散騎常侍居郡八年豪右斂迹亡户歸者三萬餘口桓溫下鎮姑孰威勢震主四方修敬皆遣上佐綱紀彪之獨曰大司馬誠為富貴朝廷既有宰相動靜之宜自當咨稟修敬若遣綱紀致貢天子復何以過之竟不遣溫以山隂縣折布米不時畢郡不彈糾上免彪之彪之去郡郡見罪謫未上州臺者皆原散之溫復以為罪乃檻收下吏會赦免左降為尚書頃之復為僕射是時溫將廢海西公百僚震栗溫亦色動莫知所為彪之既知溫不臣迹已著理不可奪乃謂溫曰公阿衡皇家便當倚傍先代耳命取霍光傳禮度儀制定於須臾曾無懼容溫歎曰作元凱不當如是邪時廢立之儀既絶於曠代朝臣莫有識其故典者彪之神彩毅然朝服當階文武儀凖莫不取定朝廷以此服之溫又廢武陵王遵以事示彪之彪之曰武陵親尊未有顯罪不可以猜嫌之間便相廢徙公建立聖明遐邇歸心當崇奬王室伊周同美此大事宜更深詳溫曰此已成事卿勿復言及簡文崩羣臣疑惑未敢立嗣或云宜當須大司馬處分彪之正色曰君崩太子代立大司馬何容得異若先面咨必反為所責矣於是朝議乃定及孝武帝即位太皇太后令以帝沖幼加在諒暗令溫依周公居攝故事事已施行彪之曰此異常大事大司馬必當固讓使萬機停滯稽廢山陵未敢奉令謹具封還內請停事遂不行溫遇疾諷朝廷求九錫袁宏為文以示彪之彪之視訖歎其文辭之美謂宏曰卿固大才安可以此示人時謝安見其文又頻使宏改之宏遂逡巡其事既屢引日乃謀於彪之彪之曰聞彼病日增亦當不復支久自可更小遲回宏從之溫亦尋薨時桓沖及安夾輔朝政安以新喪元輔主上未能親覽萬機太皇太后宜臨朝彪之曰先代前朝主在襁抱母子一體故可臨朝太后亦不能決政事終是顧問僕與君諸人耳今上年出十嵗垂婚冠反令從嫂臨朝示人君幼弱豈是翼戴讚揚立德之謂乎二君必行此事豈僕所制所惜者大體耳時安不欲委任桓沖故使太后臨朝決政獻替專在乎已彪之不逹安旨故以為言安竟不從纍遷尚書令與安共掌朝政安每曰朝之大事衆不能決者咨王公無不得判以年老上疏乞骸骨詔不許轉拜護軍將軍加散騎常侍安欲更營宫室彪之曰中興初即位東府殊為儉陋元明二帝亦不改制蘇峻之亂成帝止蘭臺都坐殆不蔽寒暑是以更營修築方之漢魏誠為儉狹復不至陋殆合豐約之中今自可隨宜增益修補而已強寇未殄正是休兵飬士之時何可大興功力勞擾百姓邪安曰宫室不壯後世謂人無能彪之曰任天下事當保國寧家朝政惟允豈以修屋宇為能邪安無以奪之故終彪之世不改營焉加光祿大夫儀同三司未拜疾篤帝遣黃門侍郎問所苦賜錢二十萬以營醫藥太元二年卒年七十三即以光祿為贈諡曰簡二子越之撫軍參軍臨之東陽太守彬季父琛國子祭酒琛子稜字文子少歷清官渡江為元帝丞相從事中郎從兄導以稜有政事宜守大郡乃出為豫章太守加廣武將軍稜知從兄敦驕傲自負有罔上心日夕諫諍以為宜自抑損推崇盟主且羣從一門並相與服事應務相崇髙以隆勳業每言苦切敦不能容潛使人害之弟侃亦知名少歷顯職位至吳國內史虞潭字思奧會稽餘姚人吳騎都尉翻之孫也父忠仕至宜都太守吳之亡也堅壁不降遂死之潭清貞有檢操州辟從事主簿舉秀才大司馬齊王冏請為祭酒除祁鄉令徙醴陵令值張昌作亂郡縣多從之潭獨起兵斬昌别率鄧穆等襄陽太守華恢上潭領建平太守以疾固辭遂周旋征討以軍功賜爵都亭侯陳敏反潭東下討敏弟讚於江州廣州刺史王矩上潭領廬陵太守綏撫荒餘咸得其所又與諸軍共平陳恢仍轉南康太守進爵東鄉侯尋被元帝檄使討江州刺史華軼潭至廬陵會軼已平而湘川賊杜韜猶盛江州刺史衛展上潭并領安成太守時甘卓屯宜陽為韜所逼潭進軍救卓卓上潭領長沙太守固辭不就王敦版潭為湘東太守復以疾辭韜平後元帝召補丞相軍咨祭酒轉琅邪國中尉帝為晉王除屯騎校尉徙右衛將軍遷宗正卿以疾告辭會王含沈充等攻逼京都潭遂于本縣招合宗人及郡中大姓共起義軍衆以萬數自假明威將軍乃進赴國難至上虞明帝手詔潭為冠軍將軍領會稽內史潭即受命義衆雲集時有野鷹飛集屋梁衆咸懼潭曰起大義而剛鷙之鳥來集破賊必矣遣長史孔坦領前鋒過浙江追躡充潭次于西陵為坦後繼會充已禽罷兵徴拜尚書尋補右衛將軍加散騎常侍成帝即位出為吳興太守秩中二千石加輔國將軍以討充功進爵零陵縣侯蘇峻反加潭督三吳晉陵宣城義興五郡軍事會王師敗績大駕逼遷潭勢弱不能獨振乃固守以俟四方之舉會陶侃等下潭與郗鑒王舒協同義舉侃等假潭節監揚州浙江西軍事潭率衆與諸軍并勢東西犄角遣督護沈伊距管商於吳縣為商所敗潭自貶還節尋而峻平潭以母老輒去官還餘姚詔轉鎮軍將軍吳國內史復徙會稽內史未發復還吳郡以前後功進爵武昌縣侯邑一千六百户是時軍荒之後百姓飢饉死亡塗地潭乃表出倉米振救之又修滬瀆壘以防海抄百姓賴之咸康中進衛將軍潭貌雖和弱而內堅明有膽決雖屢統軍旅而鮮有傾敗以母憂去職服闋以侍中衛將軍徴既至更拜右光祿大夫開府儀同三司給親兵二百人侍中如故年七十九卒於位追贈左光祿大夫開府侍中如故諡曰孝烈子仡嗣官至右將軍司馬仡卒子嘯父嗣嘯父少歷顯位後至侍中為孝武帝所親愛嘗侍飲宴帝從容問曰卿在門下初不聞有獻替邪嘯父家近海謂帝有所求對曰天時尚溫鰶魚蝦鮓未可致尋當有所上獻帝大笑因飲大醉出拜不能起帝顧曰扶虞侍中嘯父曰臣位未及扶醉不及亂非分之賜所不敢當帝甚悅隆安初為吳國內史徵補尚書未發而王廞舉兵版嘯父行吳興太守嘯父即入吳興應廞廞敗有司奏嘯父與廞同謀罪應斬詔以祖潭舊勳聽以疾贖為庶人四年復拜尚書桓元用事以為太尉左司馬尋遷護軍將軍出為會稽內中義熙初去職卒於家潭兄子􅔎字思行雖機幹不及於潭然而素行過之與譙國桓彝俱為吏部郎情好甚篤彝遣溫拜􅔎􅔎使子谷拜彝歷吳興太守金紫光祿大夫王導嘗謂􅔎曰孔愈有公才而無公望丁潭有公望而無公才兼之者其在卿乎官未逹而卒時人惜之子谷位至吳國內史顧衆字長始吳郡吳人驃騎將軍榮之族弟也父祕交州刺史有文武才幹衆出後伯父早終事伯母以孝聞光祿大夫朱誕器之州辟主簿舉秀才除餘杭秣陵令並不行元帝為鎮東將軍命為參軍以討華軼功封東鄉侯辟丞相掾祕卒州人立衆兄夀為刺史尋為州人所害衆往交州迎喪值杜韜之亂﨑嶇六年乃還祕曾蒞吳興吳興義故以衆經離寇難共遺錢二百萬一無所受及帝踐阼徵拜駙馬都尉奉朝請轉尚書郎大將軍王敦請為從事中郎上補南康太守會詔除鄱陽太守加廣武將軍衆徑之郡不過敦敦甚怪焉及敦構逆令衆出軍衆遲回不發敦大怒以軍期召衆還詰之聲色甚厲衆不為動容敦意漸釋時敦又怒宣城內史陸喈衆又辨明之敦長史陸玩在坐代衆危懼出謂衆曰卿真所謂剛亦不吐柔亦不茹雖仲山甫何以加之敦事捷欲以衆為吳興內史衆固辭舉吏部郎桓彝彝亦讓衆事並不行敦鎮姑孰復以衆為從事中郎敦平除太子中庶子為義興太守加揚威將軍蘇峻反王師敗績衆還吳潛圖義舉時吳國內史庾冰奔於會稽峻以蔡謨代之前陵江將軍張哲為峻收兵於吳衆遣人喻哲哲從之衆乃遣郎中徐機告謨曰衆已潛合家兵待時而奮又與張哲尅期效節謨乃檄衆為本國督護揚威將軍仍舊衆從弟護軍參軍揚為威逺將軍前鋒督護吳中人士同時響應峻遣將𢎞徽領甲卒五百鼓行而前衆與揚哲要擊徽戰於髙莋大破之收其軍實謨以冰當還任故便去郡衆遣揚率諸軍屯無錫冰至鎮御亭恐賊從海虞道入衆自往備之而賊率張健馬流攻無錫揚等大敗庾冰亦失守健等遂據吳城衆自海隅由婁縣東倉與賊别率交戰破之義軍又集進屯烏苞會稽內史王舒吳興內史虞潭並檄衆為五郡大督護統諸義軍討健潭遣將姚休為衆前鋒與賊戰沒衆還守紫壁時賊黨方鋭義軍沮退人咸勸衆過浙江衆曰不然今保固紫壁可得全錢唐以南五縣若越他境便為寓軍控引無所非長計也臨平人范明亦謂衆曰此地險要可以制寇不可委也衆乃版明為參軍明率宗黨五百人合諸軍凡四千人復進討健健退於曲阿留錢𢎞為吳令軍次路邱即斬宏首衆進住吳城遣督護朱祁等九軍與蘭陵太守李閎共守庱亭健遣馬流陶陽等往攻之閎與祁等逆擊大破之斬首二千餘級峻平論功衆以承檄奮義推功於謨謨以衆唱謀非己之力俱表相讓論者美之封鄱陽縣伯除平南軍司不就更拜丹陽尹本國大中正入為侍中轉尚書咸康末遷領軍將軍揚州大中正固讓未拜以母憂去職穆帝即位何充執政復徵衆為領軍不起服闋乃就是時充與武陵王不平衆會通其間遂得和釋充崇信佛教衆議其糜費每以為言嘗與充同載經佛寺充要衆入門衆不下車充以衆州里宿望每優遇之以年老乞骸骨詔書不許遷尚書僕射永和二年卒時年七十三追贈特進光祿大夫諡曰靖長子昌嗣為建康令第三子會中軍咨議參軍時稱美士張闓字敬緒丹陽人吳輔吳將軍昭之曾孫也少孤有志操太常薛兼進之於元帝言闓才幹貞固當今之良器即引為安東參軍甚加禮遇轉丞相從事中郎以母憂去職既葬帝強起之闓固辭疾篤優命敦逼遂起視事及帝為晉王拜給事黃門侍郎領本郡大中正以佐翼勳賜爵丹陽縣侯遷侍中帝踐阼出補晉陵內史在郡甚有威惠時所部四縣以旱失田闓乃立曲阿新豐塘溉田八百餘頃每嵗豐稔葛洪為其頌計用二十一萬一千四百二十功以擅興造免官後公卿並為之言曰張闓興陂溉田可謂益國而反被黜使臣下難復為善帝感悟乃以闓為大司農闓陳黜免始爾不宜便居九列疏奏不許然後就職帝晏駕以闓為大匠卿營建平陵事畢遷尚書蘇峻之役闓與王導俱入宫侍衛峻使闓持節權督東軍王導潛與闓謀密宣太后詔於三吳令速起義軍陶侃等至假闓節行征虜將軍與振威將軍陶回共督丹陽義軍闓到晉陵使內史劉耽盡以一部榖并遣吳郡度支運四部榖以給將軍郗鑒又與吳郡內史蔡謨前吳興內史虞潭會稽內史王舒等招集義兵以討峻峻平以尚書加散騎常侍賜爵宜陽伯遷廷尉以疾解職拜金紫光祿大夫尋卒時年六十四子混嗣闓箋表文議傳於世陸煜字士光吳郡吳人也伯父喜吳吏部尚書父英髙平相員外散騎常侍煜少有雅望從兄機每稱之曰我家世不乏公矣居喪以孝聞同郡顧榮與鄉人書曰士光氣息裁屬慮其性命言之傷心矣後察孝亷除永世烏江二縣令皆不就元帝初鎮江左辟為祭酒尋補振威將軍義興太守以疾不拜預討華軼功封平望亭侯纍遷散騎常侍夲郡大中正太興元年遷太子詹事時帝以侍中皆北士宜兼用南人煜以清貞著稱遂拜侍中徙尚書領州大中正明帝即位轉光祿勳遷太常代紀瞻為尚書左僕射領太子少傅尋加金紫光祿大夫代卞壼為領軍將軍以平錢鳯功進爵江陵伯帝不豫煜與王導卞壼庾亮溫嶠郗鑒並受顧命輔皇太子更入殿將兵直宿遺詔録尚書事加散騎常侍成帝踐阼拜左光祿大夫開府儀同三司給親兵百人常侍如故蘇峻之難煜隨帝在石頭舉動方正不以凶威變節峻以煜吳士之望不敢加害使守留臺匡術以苑城歸順時共推煜督宫城軍事峻平加衛將軍給千兵百騎以勳進爵為公封次子嘏新康子咸和中求歸鄉里拜墳墓詔許之煜因歸以疾卒時年七十四追贈侍中車騎大將軍諡曰穆子諶散騎常侍煜弟玩字士瑶器量淹雅弱冠有美名賀循每稱其清允平當郡檄綱紀東海王越辟為掾皆不就元帝引為丞相參軍時王導初至江左思結人情請婚於玩玩對曰培塿無松柏薰蕕不同器玩雖不才義不能為亂倫之始導乃止玩嘗詣道食酪因而得疾與導箋曰僕雖吳人幾為傖鬼其輕易權貴如此纍加奮武將軍徵拜侍中以疾辭王敦請為長史逼以軍期不得已乃從命敦平尚書令郗鑒議敦佐吏不能匡正姦惡宜皆免官禁錮會溫嶠上表申理得不坐復拜侍中遷吏部尚書領會稽王師讓不拜轉尚書左僕射領本州大中正及蘇峻反遣玩與兄煜俱守宫城玩潛説匡術歸順以功封興平伯轉尚書令又詔授左光祿大夫開府儀同三司加散騎常侍餘如故玩頻自表讓優詔褒揚重復終於不許尋而王導郗鑒庾亮相繼而薨朝野咸以三良既沒國家殄瘁以玩有德望乃遷侍中司空給羽林四十人玩既拜有人詣之索杯酒瀉置柱梁之間呪曰當今乏才以爾為柱石莫傾人梁棟邪玩笑曰感卿良針既而歎息謂賓客曰以我為三公是天下為無人談者以為知言玩雖登公輔謙讓不辟掾屬成帝聞而勸之玩不得已乃從命所辟皆寒素有行之士玩翼亮纍世常以𢎞重為人主所貴性通雅不以名位格物誘納後進謙若布衣由是搢紳之徒莫不廕其德宇以疾薨於位年六十四諡曰康給兵千人守冡七十家太元中功臣普被減削司空何充等止得六家以玩有佐命之勳先陪陵而葬由是特置興平伯官屬以衛墓子始嗣歷侍中尚書始弟納字祖言少有清操貞厲絶俗初辟鎮軍大將軍武陵王掾州舉秀才太原王述雅敬重之引為建威長史纍遷黃門侍郎夲州别駕尚書吏部郎出為吳興太守將之郡先至姑孰辭桓溫因問溫曰公致醉可飲幾酒食肉多少溫曰年大來飲三升便醉白肉不過十臠卿復云何納曰素不能飲止可二升肉亦不足言後伺溫間謂之曰外有微禮方守逺郡欲與公一醉以展下情溫欣然納之時王坦之刁彜在坐及受禮唯酒一斗鹿肉一柈坐客愕然納徐曰明公近云飲酒三升納止可二升今有一斗以備杯杓餘瀝溫及賓客並歎其率素更敕中厨設精饌酬飲極歡而罷納至郡不受俸祿頃之徵拜左民尚書領州大中正將應召外白宜裝幾船納曰私奴裝糧食來無所復須也臨發止有被襆而已其餘並封以還官遷太常徙吏部尚書加奉車都尉衛將軍謝安嘗詣納而納殊無供辦其兄子俶不敢問之乃密為之具安既至納所設唯茶果而已俶遂陳盛饌珍羞畢具客罷納大怒曰汝不能光益父叔乃復穢我素業邪於是杖之四十其舉措多此類後以愛子長生有疾求解官營視兄子禽又犯法應刑乞免官謝罪詔特許輕降頃長生小佳喻還攝職尋遷尚書僕射轉左僕射加散騎常侍俄拜尚書令常侍如故恪勤貞固始終不渝時會稽王道子以少年専政委任羣小納望闕而歎曰好家居纖兒欲撞壞之邪朝士咸服其忠亮尋除左光祿大夫開府儀同三司未拜而卒即以為贈長生先卒無子以弟子道隆嗣元熙中為廷尉何充字次道廬江灊人魏光祿大夫禎之曾孫也祖惲豫州刺史父睿安豐太守充風韻淹雅文義見稱初辟大將軍王敦掾轉主簿敦兄含時為廬江郡貪汙狼籍敦嘗於座中稱曰家兄在郡定佳廬江人士咸稱之充正色曰充即廬江人所聞異於此敦默然傍人皆為之不安充晏然自若由是忤敦左遷東海王文學尋屬敦敗纍遷中書侍郎充即王導妻之姊子充妻明穆皇后之妹也故少與導善早歷顯官嘗詣導導以麈尾指狀呼充共坐曰此是君座也導繕揚州解舍顧而言曰正為次道耳明帝亦友昵之成帝即位遷給事黃門侍郎蘇峻作亂京都傾覆導從駕在石頭充東奔義軍其後導奔白石充亦得還賊平封都鄉侯拜散騎常侍出為東陽太守仍除建威將軍會稽內史在郡甚有德政薦徵士虞喜拔郡人謝奉魏顗等以為佐吏後以墓被發去郡詔徵侍中不拜改葬畢除建威將軍丹陽尹王導庾亮並言於帝曰何充器局方概有萬夫之望必能總録朝端為老臣之副臣死之日願引充內侍則外譽唯緝社稷無虞矣由是加吏部尚書進號冠軍將軍又領會稽王師及導薨轉護軍將軍與中書監庾冰參録尚書事詔充冰各以甲仗五十人至止車門尋遷尚書令加左將軍充以內外統任宜相糾正若使事綜一人於課對為嫌乃上疏固讓許之徙中書令加散騎常侍領軍如故又領州大中正以州有先逹宿德固讓不拜庾冰兄弟以舅氏輔王室權侔人主慮易世之後戚屬轉踈將為外物所攻謀立康帝即帝母弟也每説帝以國有強敵宜須長君帝從之充建議曰父子相傳先王舊典忽妄改易懼非長計故武王不授聖弟即其義也昔漢景亦欲傳祚梁王朝臣咸謂汚亂典制據而弗聽今琅邪踐阼如孺子何社稷宗廟將其危乎冰等不從既而康帝立帝臨軒冰充侍坐帝曰朕嗣鴻業二君之力也充對曰陛下龍飛臣冰之力也若如臣議不覩升平之世帝有慙色建元初出為驃騎將軍都督徐州揚州之晉陵諸軍事假節領徐州刺史鎮京口以避諸庾頃之庾翼將北伐庾冰出鎮江州充入朝言於帝曰臣冰舅氏之重宜居宰相不應逺出朝議不從於是徵充入為都督揚豫徐州之琅邪諸軍事假節領揚州刺史將軍如故先是翼悉發江荆二州編户奴以充兵役士庶嗷然充復欲發揚州奴以均其謗後以中興時已發三吳今不宜復發而止俄而帝疾篤冰翼意在簡文帝而充建議立皇太子奏可及帝崩充奉遺旨便立太子是為穆帝冰翼深恨之獻后臨朝詔曰驃騎任重可以甲仗百人入殿又加中書監録尚書事充自陳既録尚書不宜復監中書許之復加羽林騎十人冰翼等尋卒充専輔幼主翼臨終表以後任委息爰之于時論者並以諸庾世在西藩人情所歸宜依翼所請以安物情充曰不然荆楚國之西門户口百萬北帶強胡西鄰徑蜀經略險阻周旋萬里得賢則中原可定勢弱則社稷同憂所謂陸抗存則吳存抗亡則吳亡者豈可以白靣年少猥當此任哉桓溫英略過人有文武識度西夏之任無出溫者議者又曰庾爰之肯避溫乎如令阻兵恥懼不淺充曰溫足能制之諸君勿憂乃使溫西爰之果不敢爭充以衛將軍禇裒皇太后父宜綜朝政上疏薦裒參録尚書裒以地逼固求外出充每曰桓溫褚裒為方伯殷浩居門下我可無勞矣充居宰相雖無澄正改革之能而強力有器局臨朝正色每以社稷為己任凡所選用皆以功臣為先不以私恩樹親戚談者以此重之然所昵庸雜信任不得其人而性好釋典崇修佛寺供結沙門以百數糜費巨億而不吝也親友至於貧乏無所施遺以此獲譏於世阮裕嘗戲之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千户郡尚未能得卿圖作佛不亦大乎于時郗愔及弟曇奉天師道而充與弟凖崇信釋氏謝萬譏之云二郗諂於道二何佞於佛充能飲酒雅為劉惔所貴惔每云見次道飲令人欲傾家釀言其能溫克也永和二年卒時年五十五贈司空諡曰文穆無子弟子放嗣卒又無子又以兄孫松嗣位至驃騎咨議參軍充弟凖見外戚傳褚翜字謀逺太傅裒之從父兄也父頠少知名早卒翜以才藝楨幹稱襲爵關內侯補冠軍將軍于時長沙王乂擅權成都河間阻兵于外翜知內難方作乃棄官避地幽州後河北有寇難復還鄉里河南尹舉翜行本縣事及天下鼎沸翜招合同志將圖過江先移住陽城界潁川庾敳即翜之舅也亦憂世亂以家付翜翜道斷不得前東海王越以為參軍辭疾不就尋洛陽覆沒與滎陽太守郭秀共保万氏臺秀不能綏衆與將陳撫郭重等搆怨遂相攻擊翜懼禍及謂撫等曰以諸君所以在此謀逃難也今宜共戮力以備賊幸無外難而內自相擊是避坑落井也郭秀誠為失理應且容之若遂所忿城內自潰胡賊聞之指來掩襲諸君雖得殺秀無解胡虜矣纍弱非一宜深思之撫等悔悟與秀交和時數萬口賴翜獲全明年率數千家將謀東下遇道險不得進因留密縣司𨽻校尉荀組以為參軍廣武將軍復領本縣率邑人三千督新城梁陽城三郡諸營事頃之遷司𨽻司馬仍督營事率衆進至汝水柴肥口復沮賊翜乃單馬至許昌見司空荀藩以為振威將軍行梁國內史建興中復為豫州司馬督司州軍事太傅參軍王元代翜為郡時梁國部曲將耿奴甚得人情而專勢翜常優遇之元為政既急翜知其不能容奴因戒之曰卿威殺已多而人情難一宜深愼之元納翜言外羈縻奴而內懷憤會遷為陳留將發乃收奴斬之奴餘黨聚衆殺元梁郡既有內難而徐州賊張平等欲掩襲之郡人遑惑將以郡歸平荀組遣翜往撫之衆心乃定頃之組舉翜為吏部郎不應召遂東渡江元帝為晉王以翜為散騎郎轉太子中庶子出為奮武將軍淮南內史永昌初王敦構逆征西將軍戴若思令翜出軍赴難翜遣將領五百人從之眀帝即位徵拜屯騎校尉遷太子左衛率成帝初為左衛將軍蘇峻之役朝廷戒嚴以翜為侍中典征討軍事既而王師敗績司徒王導謂翜曰至尊當御正殿君可啓令速出翜即入上閣躬自抱帝登太極前殿導升御牀抱帝翜及鍾雅劉超侍立左右時百官奔散殿省肅然峻兵既入叱翜令下翜正立不動呵之曰蘇冠軍來覲至尊軍人豈得侵逼由是兵士不敢上殿及峻執政猶以為侍中從乘輿幸石頭明年與光祿大夫陸曄等出據苑城蘇逸任讓圍之翜等固守賊平以功封長平縣伯遷丹陽尹時京邑焚蕩人物凋殘翜收集散亡甚有惠政代庾亮為中護軍鎮石頭尋為領軍徙五兵尚書加奉車都尉監新宫事遷尚書右僕射轉左僕射加散騎常侍久之代何充為護軍將軍常侍如故咸康七年卒時年六十七贈衛將軍諡曰穆子希嗣官至豫章太守蔡謨字道明陳留考城人也世為著姓曾祖睦魏尚書祖德樂平太守父克少好學博涉書記為邦族所敬性公亮守正行不合已雖富貴不交也髙平劉整恃才縱誕服飾詭異無所拘忌嘗行造人遇克在座整終席慙不自安克時為處士而見憚如此後為成都王頴大將軍記室頴為丞相擢為東曹掾克素有格量及居選官茍進之徒望風畏憚初克未仕時山簡嘗與琅邪王衍書曰蔡子尼今之正人衍以書示衆曰山子以正字拔人然未易可稱後衍聞克在選官曰山子正人之言驗於今矣陳留時為大郡號稱多士琅邪王澄行經其界太守吕豫遣吏迎之澄入境問吏曰此郡人士為誰吏曰有蔡子尼江應元是時郡人多居大位者澄以其姓名問曰甲乙等非君郡人邪吏曰是也曰然則何以但稱此二人吏曰向謂君侯問人不謂問位澄笑而止到郡以吏言謂豫曰舊名此郡有風俗果然小吏亦知如此克以朝政日弊遂絶不仕東嬴公騰為車騎將軍鎮河北以克為從事中郎知必不就以軍期致之克不得已至數十日騰為汲桑所攻城陷克見害謨弱冠察孝廉州辟從事舉秀才東海王越召為掾皆不就避亂渡江時明帝為東中郎將引為參軍元帝拜丞相復辟為掾轉參軍後為中書侍郎歷義興太守大將軍王敦從事中郎司徒左長史遷侍中蘇峻構逆吳國內史庾冰出奔會稽乃以謨為吳國內史謨既至與張闓顧衆顧揚等共起義兵迎冰還郡峻平復為侍中遷五兵尚書領琅邪王師謨上疏讓詔不許轉掌吏部以平蘇峻勳賜爵濟陽男又讓不許冬蒸謨領祠部主者忘設明帝位與太常張泉俱免白衣領職頃之遷太常領祕書監以疾不堪親職上疏自解不聽成帝臨軒遣使拜太傅太尉司空會將作樂宿懸於殿庭門下奏非祭祀燕饗則無設樂之制事下太常謨議臨軒遣使宜有金石之樂遂從之臨軒作樂自此始也彭城王紘上言樂賢堂有先帝手畫佛像經歷寇難而此堂猶存宜敕作頌帝下其議謨曰佛者夷狄之俗非經典之制先帝量同天地多才多藝聊因臨時而畫此像至於雅好佛道所未承聞也盜賊奔突王都隳敗而此堂塊然獨存斯誠神靈保祚之徵然未是大晉盛德之形容歌頌之所先也人臣覩物興義私作賦頌可也今欲發王命敕史官上稱先帝好佛之志下為夷狄作一像之頌於義有疑焉於是遂寢時征西將軍庾亮以石勒新死欲移鎮石城為滅賊之漸事下公卿謨議曰時有否泰道有屈伸暴逆之寇雖終滅亡然當其強盛皆屈而避之是以髙祖受黜於巴漢忍辱於平城也若爭強於鴻門則亡不終日故蕭何曰百戰百敗不死何待也原始要終歸於大濟而已豈與當亡之寇爭遲速之間哉夫唯鴻門之不爭故垓下莫能與之爭文王身圯於羑里故道泰於牧野勾賤見屈於會稽故威申於強吳今日之事亦猶此矣賊假息之命垂盡而豺狼之力尚強宜抗威以待時或曰抗威待時時已可矣愚以為時之可否在賊之強弱賊之強弱在石虎之能否虎之能否可得而言矣自勒初起則虎為爪牙百戰百勝遂定中國境土所據同於魏世及勒死之日將相內外欲誅石虎石虎獨起於衆異之中殺嗣主誅寵臣內難既定千里逺出一攻而拔金墉再戰而斬石生禽彭彪殺石聰滅郭權還據根本內外並定四方鎮守不失尺土詳察此事豈能乎將不能也假令不能者為之其將濟乎將不濟也賊前攻襄陽而不能拔誠有之矣不信百戰之效而執一攻之驗棄多從少於理安乎譬若射者百發而一不中可謂之拙乎且不拔襄陽者非石虎之身也桓平北守邊之將耳賊前攻之爭疆場耳得之為善不得則止非其所急也今征西之往則異於是何者重鎮也名賢也中國之人所聞而歸心也今而西度實有席卷河南之勢賊所大懼豈與桓宣同哉石虎必率其精兵身來距爭若欲與戰戰何如石生若欲城守守何如金墉若欲阻沔沔何如大江蘇峻何如石虎凡此數者宜詳校之愚謂石生猛將關中精兵征西之戰不能勝也金墉險固劉曜十萬所不能拔今征西之守不能勝也又是時兖州洛陽關中皆舉兵擊石虎此今三處反為其用方之於前倍半之境也若石生不能敵其半而征西欲當其倍愚所疑也蘇峻之強不及石虎沔水之險不及大江大江不能禦蘇峻而以沔水禦石虎又所疑也昔祖士稚在譙佃於城北慮賊來攻因以為資故豫安軍屯以禦其外榖將熟賊果至丁夫戰於外老弱穫於內多持炬火急則燒榖而走如此數年竟不得其利是時賊惟據沔北方之於今四分之一耳士稚不能捍其一而征西欲禦其四又所疑也或云賊若多來則必無糧然致糧之難莫過崤函而石虎昔涉此險深入敵國平關中而後還今至襄陽路既無險又行其國內自相供給方之於前難易百倍前已經至難而謂今不能濟其易又所疑也然此所論但説征西既至之後耳尚未論道路之慮也自沔已西水急岸髙魚貫泝流首尾百里若賊無宋襄之義及我未陳而擊之將如之何今王士與賊水陸異勢便習不同寇若送死雖開江延敵以一當千猶吞之有餘宜誘而致之以保萬全棄江逺進以我所短擊彼所長懼非廟勝之算朝議同之故亮不果移鎮初皇后每年拜陵勞費甚多謨建議曰古者皇后廟見而已不拜陵也由是遂止及太尉郗鑒疾篤出謨為太尉軍司加侍中鑒卒即拜謨為征北將軍都督徐兖青三州揚州之晉陵豫州之沛郡諸軍事領徐州刺史假節時左衛將軍陳光上疏請伐胡詔令攻夀陽謨上疏曰今夀陽城小而固自夀陽至琅邪城壁相望其間逺者裁百餘里一城見攻衆城必救且王師在路五十餘日劉仕一軍早已入淮又遣數部北取生壁大軍未至聲息久聞而賊之郵驛一日千里河北之騎足以來赴非唯鄰城相救而已夫以白起韓信項籍之勇猶發梁焚舟背水而陳今欲停船水渚引兵造城前對堅敵顧臨歸路此兵法之所誡也若進攻未拔胡騎卒至懼桓子不知所為而舟中之指可掬今征軍五千皆王都精鋭之衆又光為左衛逺近聞之名為殿下之軍宜令所向有征無戰而頓之堅城之下勝之不武不勝為笑今以國之上駟擊寇之下邑得之則利薄而不足損敵失之則害重而足以益寇懼非䇿之長者臣愚以為聞寇而致討賊退而振旅於事無失不勝管見謹冒陳聞石虎於青州造船數百掠緣海諸縣所在殺戮朝廷以為憂謨遣龍驤將軍徐元等守中洲並設募若得賊大白船者賞布千匹小船百匹是時謨所統七千餘人所戍東至土山西至江乘鎮守八所城壘凡十一處烽火樓望三十餘處隨宜防備甚有算略先是郗鑒上部下有勳勞者凡一百八十人帝並酬其功未卒而鑒薨斷不復與謨上疏以為先已許鑒今不宜斷且鑒所上者皆積年勳效百戰之餘亦不可不報詔聽之康帝即位徵拜左光祿大夫開府儀同三司領司徒代殷浩為揚州刺史又録尚書事領司徒如故初謨沖讓不辟僚佐詔屢敦逼之始取掾屬石虎死中國大亂時朝野咸謂當太平復舊謨獨謂不然語所親曰虎滅誠大慶也然將貽王室之憂或曰何哉謨曰夫能順天而奉時濟六合於草昧若非上哲必由英豪度德量力非時賢所及必將經營分表疲人以逞志才不副意略不稱心財單力竭智勇俱屈此韓盧東郭所以雙斃也遷侍中司徒上疏讓不拜皇太后詔不許謨猶固讓謂所親曰我若為司徒將為後代所哂義不敢拜也皇太后遣使喻旨自四年冬至五年末詔書屢下謨固守所執六年復上疏以疾病乞骸骨上左光祿大夫領司徒印綬章表十餘上穆帝臨軒遣侍中紀璩黃門郎丁纂徵謨謨陳疾篤使主簿謝攸對曰臣謨不幸有公族穆子之疾天威不違顔咫尺不敢奉詔寢伏待罪自旦至申使者十餘反而謨不至時帝年八嵗甚倦問左右曰所召人何以至今不來臨軒何時當竟君臣俱疲弊皇太后詔必不來者宜罷朝中軍將軍殷浩奏免吏部尚書江虨官簡文時為會稽王命曹曰蔡公傲違上命無人臣之禮若人主卑屈於上大義不行於下亦不知復所以為政矣於是公卿奏曰司徒謨頃以常疾久逋王命皇帝臨軒百寮齊立俯僂之恭有望於謨若志存止退自宜致辭闕庭安有人君卑勞終日而人臣曾無一酬之禮悖慢傲上罪同不臣臣等參議宜明國憲請付廷尉以正刑書謨懼率子弟素服詣闕稽顙躬到廷尉待罪皇太后詔特免為庶人謨既被廢杜門不出終日講誦教授弟子數年皇太后復詔以謨為左光祿大夫開府儀同三司於是遣謁者僕射孟洪就加册命謨上疏陳謝以疾篤不任朝請詔賜几杖門施行馬十二年卒時年七十六賵贈之禮一依太尉陸玩故事詔贈侍中司空諡曰文穆謨博學於禮儀宗廟制度多所議定文筆論議有集行於世總應劭已來注班固漢書者為之集解謨初渡江見彭蜞大喜曰蟹有八足加以二螯令烹之既食吐下委頓方知非蟹後詣謝尚而説之尚曰卿讀爾雅不熟幾為勸學死謨性方雅丞相王導作女伎施設牀席謨先在坐不悅而去導亦不止之性尤篤愼每事必為過防故時人云蔡公過浮航脫帶腰舟長子邵永嘉太守少子系有才學文義位至撫軍長史諸葛恢字道明琅邪陽都人也祖誕魏司空為文帝所誅父靚奔吳為大司馬吳平逃竄不出武帝與靚有舊靚姊又為琅邪王妃帝知靚在姊間因就見焉靚逃于厠帝又逼見之謂曰不謂今日復得相見靚流涕曰不能漆身皮面復覩聖顔詔以為侍中固辭不拜歸于鄉里終身不向朝廷而坐恢弱冠知名試守即邱長轉臨沂令為政和平值天下大亂避地江左名亞王導庾亮導嘗謂曰明府當為黑頭公及導拜司空恢亦在坐導指冠謂曰君當復著此導嘗與恢戲爭族姓曰人言王葛不言葛王也恢曰不言馬驢而言驢馬豈驢勝馬邪其見親狎如此于時潁川荀闓字道明陳留蔡謨字道明與恢俱有名譽號曰中興三明人為之語曰京師三明各有名蔡氏儒雅荀葛清元帝為安東將軍以恢為主簿再遷江寧令討周馥有功封博陵亭侯復為鎮東參軍與卞壼並以時譽遷從事中郎兼統記室時四方多務箋疏殷積恢斟酌酬答咸稱折中于時王氏為將軍而恢兄弟及顔含並居顯要劉超以忠謹掌書命時人以帝善任一國之才愍帝即位徵用四方賢雋召恢為尚書郎元帝以經緯須才上疏留之承制調為會稽太守臨行帝為置酒謂曰今之會稽昔之關中足食足兵在于良守以君有蒞任之方是以相屈四方分崩當匡振圯運政之所先君為言之恢陳謝因對曰今天下喪亂風俗陵遲宜尊五美屏四惡進忠實退浮華帝深納焉太興初以政績第一詔增秩中二千石頃之以母憂去官服闋拜中書令王敦上恢為丹陽尹以久疾免明帝征敦以恢為侍中加奉車都尉討王含有功進封建安伯以先爵賜次子虪為關內侯又拜恢後將軍會稽內史徵為侍中遷左民尚書武陵王師吏部尚書纍遷尚書右僕射加散騎常侍銀青光祿大夫領選夲州大中正尚書令常侍吏部如故成帝踐阼加侍中金紫光祿大夫卒年六十二贈左光祿大夫儀同三司賵贈之禮一依太尉興平伯故事諡曰敬祠以太牢子甝嗣位至散騎常侍恢兄頤字道回亦為元帝所器重終於太當殷浩字深源陳郡長平人也父羡字洪喬為豫章太守都下人士因其致書者百餘函行次石頭皆投之水中曰沉者自沉浮者自浮殷洪喬不為致書郵其資性介立如此終於光祿勳浩識度清逺弱冠有美名尤善元言與叔父融俱好老易融與浩口談則辭屈著篇則融勝浩由是為風流談論者所宗或問浩曰將蒞官而夢棺將得財而夢糞何也浩曰棺夲臭腐故將官而夢尸錢夲糞土故將得錢而夢穢時人以為名言三府辟皆不就征西將軍庾亮引為記室參軍纍遷司徒左長史安西庾翼復請為司馬除侍中安西軍司並稱疾不起遂屏居墓所幾將十年于時擬之管葛王濛謝尚猶伺其出處以卜江左興亡因相與省之知浩有確然之志既反相謂曰深源不起當如蒼生何庾翼貽浩書免令一出固辭不起建元初庾冰兄弟及何充等相繼卒簡文帝時在藩始綜萬機衛將軍褚裒薦浩徵為建武將軍揚州刺史浩上疏陳讓并致箋於簡文具自申敘簡文答書敦喻浩頻陳讓自三月至七月乃受拜焉時桓溫既滅蜀威勢轉振朝廷憚之簡文以浩有盛名朝野推伏故引為心膂以抗於溫於是與溫頗相疑二會遭父憂去職時以蔡謨攝揚州以俟浩服闋徵為尚書僕射不拜復為建武將軍揚州刺史遂參綜朝權潁川荀羡少有令問浩擢為義興吳郡以為羽翼王羲之密説浩羡令與桓溫和同不宜內構嫌隙浩不從及石虎死胡中大亂朝廷欲遂蕩平關河於是以浩為中軍將軍假節都督揚豫徐兖青五州軍事浩既受命以中原為己任上疏北征許洛將發墜馬衆咸惡之既而以淮南太守陳逵兖州刺史蔡裔為前鋒安西將軍謝尚北中郎將荀羡為督統開江西疁音流田千頃以為軍儲師次夀陽潛誘苻健大臣梁安雷弱兒等使殺健許以關右之任初降人魏脫卒其弟憬代領部曲姚襄殺憬以并其衆浩大惡之使龍驤將軍劉啓守譙遷襄於梁既而魏氏子弟往來夀陽襄益猜懼俄而襄部曲有欲歸浩者襄殺之浩於是謀誅襄會苻健殺其大臣健兄子眉自洛陽西奔浩以為梁安事捷意苻健已死請進屯洛陽修復園陵使襄為前驅冠軍將軍劉洽鎮鹿臺建武將軍劉遁據倉垣又求解揚州専鎮洛陽詔不許浩既至許昌會張遇反謝尚又敗績浩還夀陽復進軍次山桑而襄反浩懼棄輜重退保譙城器械軍儲皆為襄所掠士卒多亡叛浩遣劉啓王彬之擊襄於山桑並為襄所殺桓溫素惡浩及聞其敗上疏罪浩坐廢為庶人徙于東陽之信安縣浩少與溫齊名而每心競溫嘗問浩君何如我浩曰我與我周旋久寧作我也溫既以雄豪自許每輕浩浩不之憚也至是溫語人曰少時吾與浩共騎竹馬我棄去浩輒取之故當出我下也又謂郗超曰浩有德有言向使作令僕足以儀刑百揆朝廷用違其才耳浩雖被黜放口無怨言夷神委命談詠不輟雖家人不見其有流放之戚但終日書空作咄咄怪事四字而已浩甥韓伯浩素愛賞之隨至徙所經嵗還都浩送至渚側詠曹顔逺詩云富貴他人合貧賤親戚離因而泣下後溫將以浩為尚書令遺書告之浩欣然許之將答書慮有謬誤開閉者數十遂逹空函大忤溫意由是遂絶永和十二年卒子涓亦有美名咸安初桓溫廢太宰武陵王晞誣涓及庾倩與晞謀反害之浩後將改葬其故吏顧悅之上疏為浩訟寃疏奏詔追復浩夲官顧悅之字君叔少有義行與簡文同年而髮早白帝問其故對曰松柏之姿經霜猶茂蒲栁常質望秋先零簡文悅其對始將抗表訟浩浩親故多謂非宜悅之決意以聞又與朝臣爭論故衆無以奪焉時人咸稱之為州别駕歷尚書右丞卒子凱之别有傳蔡裔者有勇氣聲若雷震嘗有二偷入室裔拊牀一呼而盜俱殞故浩委以軍鋒焉孔愈字敬康會稽山隂人也其先世居梁國曾祖潛太子少傅漢末避地會稽因家焉祖竺吳豫章太守父恬湘東太守從兄侃大司農俱有令名江左愈年十三而孤養祖母以孝聞與同郡張茂字偉康丁潭字世康齊名時人號曰會稽三康吳平愈遷于洛惠帝末歸鄉里行至江淮間遇石冰封雲為亂雲逼愈為參軍不從將殺之賴雲司馬張統營救獲免東遷會稽入新安山中改姓孫氏以稼穡讀書為務信著鄰里後忽捨去皆謂為神人而為之立祠永嘉中元帝始以安東將軍鎮揚州命愈為參軍邦族尋求莫知所在建興初始出應召為丞相掾仍除駙馬都尉參丞相軍事時年已五十矣以討華軼功封餘不亭侯愈嘗行經餘不亭見籠龜於路者愈買而放之溪中龜中流左顧者數四及是鑄侯印而印龜左顧三鑄如初印工以告愈乃悟遂佩焉帝為晉王使長兼中書郎于時刁協劉隗用事王導頗見踈逺愈陳導忠賢有佐命之勳謂事無大小皆宜咨訪由是不合旨出為司徒左長史纍遷吳興太守沈充反愈棄官還京師拜御史中丞遷侍中太常及蘇峻反愈朝服守宗廟初愈為司徒長史以平南將軍溫嶠母亡遭亂不葬乃不過其品至是峻平而嶠有重功愈往石頭詣嶠嶠執愈手流涕曰天下喪亂忠孝道廢能持古人之節嵗寒不凋者唯君一人耳時人咸稱嶠居公而重愈之守正尋徙大尚書遷安南將軍江州刺史不行轉尚書右僕射領東海王師尋遷左僕射咸和八年詔曰尚書令玩左僕射愈並恪居官次祿不代耕端右任重先朝所崇其給玩親信三十人愈二十人稟賜愈上疏固讓優詔不許愈復表讓從之愈表有云姦吏擅權暴人肆虐者王導聞而非之於都坐謂愈曰君言姦吏擅威暴人肆虐為患是誰愈欲大論朝廷得失陸玩抑之乃止後導將以趙允為護軍愈謂導曰中興已來處此官者周伯仁應思逺耳今誠乏才豈宜以趙允居之邪導不從其守正如此由是為導所銜後省左右僕射以愈為尚書僕射愈年在懸車纍乞骸骨不許轉護軍將軍加散騎常侍復徙領軍將軍加金紫光祿大夫領國子祭酒頃之出為鎮軍將軍會稽內史加散騎常侍句章縣有漢時舊陂毁廢數百年愈自巡行修復故堰溉田二百餘頃皆有良業在郡三年乃營山隂湖南侯山下數畝地為宅草屋數間便棄官居之送資數百萬悉無所取病篤遺令斂以時服鄉邑義賵一不得受年七十五咸康八年卒贈車騎將軍開府儀同三司諡曰貞三子誾汪安國誾嗣爵位至建安太守誾子靜字季恭再為會稽內史纍遷尚書左僕射加後將軍汪字德澤好學有志行孝武帝時位至侍中時茹千秋以佞媚見幸於會稽王道子汪屢言之於帝帝不納遷尚書太常卿以不合意求出為假節都督交廣二州諸軍事征虜將軍平越中郎將廣州刺史甚有政績為嶺表所稱太元十七年卒安國字安國年小諸兄三十餘嵗羣從諸兄並乏才名以富強自立惟安國與汪少厲孤貧之操汪既以直亮稱安國以儒素顯孝武帝時甚蒙禮遇仕歷侍中太常及帝崩安國形素羸瘦服衰絰涕泗竟日見者以為真孝再為會稽內史領軍將軍安帝隆安中詔以本官領東海王師後歷尚書左右僕射義熙四年卒贈左光祿大夫弟祗字承祖太守周札命為功曹史札為沈充所害故人賔吏莫敢近者祗冒刃號哭親行殯禮送喪還義興時人義之愈從子坦字君平祖沖丹陽太守父侃大司農坦少方直有雅望善左氏傳解屬文元帝為晉王以坦為世子文學東宫建補太子舍人遷尚書郎時臺郎初到並加䇿試帝手策問曰吳興徐馥為賊殺郡將郡今應舉孝亷不坦對曰四罪不相及殛鯀而興禹徐馥為逆何妨一郡之賢又問姦臣賊君汙宫瀦宅莫大之惡也鄉舊廢四科之選今何所依坦曰季平子逐魯昭公豈可以廢仲尼也竟不能屈先是以兵亂之後務存慰悅逺方秀孝到不䇿試普皆除署至是帝申明舊制皆令試經有不中科刺史太守免官太興二年秀孝多不敢行其有到者並託疾帝欲除署孝廉而秀才如前制坦奏議以為不可帝納焉聽孝廉申至七年秀才如故時典客令萬默領諸胡胡人相誣朝廷疑默有所偏助將加大辟坦獨不署由是被譴遂棄官歸會稽久之除領軍司馬未赴召會王敦反與右衛將軍虞潭俱在會稽起義而討沈充事平始就職揚州刺史王導請為别駕咸和初遷尚書左丞深為臺中之所敬憚尋屬蘇峻反坦與司徒司馬陶回白王導曰及峻未至宜急斷阜陵之界守江西當利諸口彼少我衆一戰決矣若峻未來可往逼其城今不先往峻必先至先人有奪人之功時不可失導然之庾亮以為峻脫徑來是襲朝廷虛也故計不行峻遂破姑熟取鹽米亮方悔之坦謂人曰觀峻之勢必破臺城自非戰士不須戎服既而臺城陷戎服者多死白衣者無他時人稱其先見及峻挾天子幸石頭坦奔陶侃侃引為長史時侃等夜築白石壘至曉而成聞峻軍嚴聲咸懼來攻坦曰不然若峻攻壘必須東北風急今我水軍不得往救今天清靜賊必不動決遣軍出江乘掠京口以東矣果如所籌時郗鑒鎮京口侃等各以兵會既至坦議以為本不應須召郗公遂使東門無限今宜遣還雖晚猶勝不也侃等猶疑坦固爭甚切始令郗鑒還據京口遣郭默屯大業及令驍將李閎曹統周光與默并力賊遂勢分卒如坦計及峻平以坦為吳郡太守自陳吳多賢豪而坦年少未宜臨之王導庾亮並欲用坦為丹陽尹時亂離之後百姓凋弊坦固辭之導等猶未之許坦慨然曰昔肅祖臨崩諸君親據御牀共奉遺詔孔坦踈賤不在顧命之限既有艱難則以微臣為先今猶爼上肉任人膾截耳乃拂衣而去導等亦止於是遷吳興內史封晉安男加建威將軍以嵗飢運家米以振窮乏百姓賴之時使坦募江淮流人為軍有殿中兵因亂東還來應坦募坦不知而納之或諷朝廷以坦藏叛兵遂坐免尋拜侍中咸康元年石聰寇歷陽王導為大司馬討之請坦為司馬會石勒新死石虎専恣石聰及譙郡太守彭彪等各遣使請降坦與聰書譬以禍福詞旨可觀然朝廷遂不北伐人皆懷恨坦在職數年遷侍中時成帝每幸丞相王導府拜導妻曹氏有同家人坦每切諫時帝刻日納后而尚書左僕射王彬卒議者以為欲却期坦曰婚禮之重重於救日蝕救日蝕有后之喪太子墮井則止納后盛禮豈可以臣喪而廢從之及帝既加元服猶委政王導坦每發憤以國事為已憂嘗從容言於帝曰陛下春秋以長聖敬日躋宜博約朝臣咨諏善道由是忤導出為廷尉卿怏怏不悅以疾去職加散騎常侍遷尚書未拜疾篤庾冰省之乃流涕坦慨然曰大丈夫將終不問安國寧家之術乃作兒女相問邪冰深謝焉臨終與庾亮書以恢復為託俄卒時年五十一追贈光祿勳諡曰簡亮報其書并致祭焉子混嗣愈從子嚴字彭祖祖父奕全椒令明察過人時有遺其酒者始提入門奕遙呵之曰人餉吾兩罌酒其一何故非也檢視之一罌果是水或問奕何以知之奕曰酒重水輕提酒者手有輕重之異故耳在官有惠化及卒市人若喪慈親焉父倫黃門郎嚴少仕州郡歷司徒掾尚書殿中郎殷浩臨揚州請為别駕遷尚書左丞時朝廷崇樹浩以抗擬桓溫溫深以不平浩又引接荒人謀立功於閫外嚴諫浩宜深思廉藺屈伸之道平勃相和之義庶令婉然和順人無間言又觀頃日降附之徒皆人靣獸心豈宜聚著都邑雜處人間適足以疑惑視聽耳浩深納之及哀帝踐阼議所承統時多異議嚴與丹陽尹庾和議曰順夲居正親親不可奪宜繼成皇帝諸儒咸以嚴議為長竟從之隆和元年詔曰天文失度太史雖有禳祈之事猶釁眚屢彰今欲依鴻祀之制於太極前庭親執虔肅嚴諫曰鴻祀雖出尚書大傳先儒所不究歷代莫之興承天接神豈可以疑殆行事乎天道無親唯德是輔陛下祗順恭敬留心兆庶可以消災復異皆已蹈而行之德合神明邱禱久矣豈須屈萬乘之尊修雜祀之事君舉必書可不愼歟帝嘉之而止以為揚州大中正嚴不就有司奏免詔特以侯領尚書時東海王奕求海鹽錢塘以水牛牽埭稅取錢直帝初從之嚴諫乃止初帝或施私恩以錢帛賜左右嚴又啓諸所别賜及給厨食皆應減省帝曰左右多困乏故有所賜今通斷之又厨膳宜有減徹思詳具聞嚴多所匡益太和中拜吳興太守加秩中二千石善於宰牧甚得人和餘杭婦人經年荒賣其子以活夫之兄子武康有兄弟二人妻各有孕弟逺行未反遇荒嵗不能兩全棄其子而活弟子嚴並褒薦之又甄賞才能之士論者美焉五年以疾去職卒于家三子道民宣城內史靜民散騎侍郎福民太子洗馬皆為孫恩所害嚴叔父羣字敬林有智局志尚不羈蘇峻入石頭時匡術有寵於峻賓從甚盛羣與從兄愈同行於橫塘遇之愈止與語而羣初不視術術怒欲刃之愈下車抱術曰吾弟發狂卿為我宥之乃獲免後峻平王導保存術嘗因衆坐令術勸羣酒以釋橫塘之憾羣答曰羣非孔子厄同匡人雖陽和布氣鷹化為鳩至於識者猶憎其目導有愧色仕歷中丞性嗜酒導嘗戒之曰卿恆飲不見酒家覆瓿布日月久靡爛邪答曰公不見肉糟淹更堪久邪嘗與親友書云今年田得七百石秫米不足了麴糵事其沈湎如此卒於官嗣子沉字德度有美名何充薦沉於王導曰文思通敏宜登宰門辟丞相司徒掾琅邪王文學並不就從兄坦以裘遺之辭不受坦曰晏平仲儉祀其先人豚肩不掩豆猶狐裘數十年卿復何辭於是受而服之是時沉與魏顗虞球虞存謝奉並為四族之俊沉子廞位至吳興太守廷尉廞子琳之以草書擅名又為吳興太守侍中丁潭字世康會稽山隂人也祖固吳司徒父彌梁州刺史潭為郡功曹察孝亷除郎中稍遷丞相西閣祭酒時元帝稱制使各陳時事損益潭上書深切治要及帝踐阼拜駙馬都尉奉朝請尚書祠部朗時琅琊王裒始受封帝欲引朝賢為其國上卿將用潭以問中書令賀循循曰郎中令職望清重實宜審授潭清淳真粹雅有隱正聖明所簡才實宜之遂為琅琊王郎中令會裒薨潭上疏求行終喪禮詔下博議朝廷竟從太常賀循議令潭除服心喪三年大興三年遷王導驃騎司馬轉中書郎出為廣武將軍東陽太守以清潔見稱徵為太子左衛率不拜成帝踐阼以為散騎常侍侍中蘇峻作亂帝蒙塵於石頭唯潭及侍中鍾雅劉超等隨從不離帝側峻誅以功賜爵永安伯遷大尚書徙廷尉纍遷左光祿大夫領國子祭酒本國大中正加散騎常侍康帝即位屢表乞骸骨詔以光祿大夫還第門施行馬祿秩一如舊制給傳詔二人賜錢二十萬牀帳褥席年八十卒贈侍中大夫如故諡曰簡王導嘗謂孔敬康有公才而無公望丁世康有公望而無公才子話位至散騎侍郎張茂者字偉康少單貧有志行為鄉里所敬信初起義兵討賊陳斌一郡用全元帝辟為掾屬官有老牛數十將賣之茂曰殺牛有禁買者不得輒屠齒力疲老又不任耕駕是以無用之物收百姓利也帝乃止遷太子右衛率出補吳國內史沈充之反也茂與三子並遇害茂弟盎為周札將軍充討札盎又死之贈茂太僕茂少時夢得大象以問占夢萬推推曰君當為大郡而不善也問其故推曰象者大獸獸者守也故知當得大郡然象以齒焚為人所害果如其言陶回丹陽人也祖基吳交州刺史父抗太子中庶子回辟司空府中軍主簿並不就大將軍王敦命為參軍轉州别駕敦死司空王導引為從事中郎遷司馬蘇峻之役回與孔坦言於導請早出兵守江口語在坦傳峻將至回復謂亮曰峻知石頭有重戌不敢直下必向小丹陽南道步來宜伏兵要之可一戰而禽亮不從峻果由小丹陽經秣陵迷失道逢郡人執以為鄉導時峻夜行甚無部分亮聞之深悔不從回等之言尋王師敗績回還本縣收合義軍得千餘人並為步軍與陶侃溫嶠等并力攻峻又别破韓晃以功封康樂伯時大賊新平綱維弛廢司徒王導以回有器幹擢補北軍中候俄轉中護軍久之遷征虜將軍吳興太守時人飢榖貴三吳尤甚詔欲聽相鬻賣以拯一時之急回上疏乞振乏不待報輒開倉及割府郡軍資數萬斛米以救之由是一境獲全既而下詔并敕會稽吳郡依回振恤二郡賴之在郡四年徵拜領軍將軍加散騎常侍征虜將軍如故回性雅正不憚強禦丹陽尹桓景佞事王導甚為導所昵回常慷慨謂景非正人不宜親狎會熒惑守南斗經旬導語回曰南斗揚州分而熒惑守之吾當遜位以厭此譴回答曰公以明德作相輔弼聖主當親忠貞逺邪佞而與桓景造膝熒惑何由退舍導深愧之咸和二年以疾辭職帝不許徙護軍將軍常侍領軍如故未拜卒年五十一諡曰威四子汪陋隱無忌汪嗣爵位至輔國將軍宣城內史陋冠軍將軍隱少府無忌光祿勳兄弟咸有幹用謝尚字仁祖豫章太守鯤之子也幼有至性七嵗喪兄哀慟過禮親戚異之八嵗神悟夙成鯤嘗擕之送客或曰此兒一坐之顔回也尚應聲答曰坐無尼父焉别顔回席賔莫不歎異年十餘嵗遭父憂丹陽尹溫嶠弔之尚號咷極哀既而收涕告訴舉止有異常童嶠甚竒之及長開率頴秀辨悟絶倫脫略細行不為流俗之事好衣刺文袴諸父責之因而自改遂知名善音樂博綜衆藝司徒王導深器之比之王戎常呼為小安豐辟為掾襲父爵咸亭侯始到府通謁導以其有勝會謂曰聞君能作鸜鵒舞一坐傾想寧有此理不尚曰佳便著衣幘而舞導令坐者撫掌擊節尚俯仰有中傍若無人其率詣如此轉西曹屬時有遭亂與父母乖離議者或以進仕理王事婚姻繼百世於禮非嫌尚議曰典禮之興皆因循情理開通𢎞勝如運有屯夷要當斷之以大義夫無後之罪三千所不過今婚姻將以繼百世崇宗緒此固不可塞也然至於天屬生離之哀父子乖絶之痛痛之深者莫深於兹夫以一體之小患猶或忘思慮損聽察况於抱傷心之巨痛懷忉怛之至戚方寸既亂豈能綜理時務哉有心之人決不冒榮苟進冒榮茍進之疇必非所求之旨徒開偷薄之門而長流弊之路或有執志邱園守心不革者猶當崇其操業以𢎞風尚而况含艱履戚之人勉之以榮貴邪遷會稽王友入補給事黃門侍郎出為建武將軍歷陽太守轉督江夏義陽隨三郡軍事江夏相將軍如故時安西將軍庾翼鎮武昌尚數詣翼咨謀軍事嘗與翼共射翼曰卿若破的當以鼓吹相賞尚應聲中之翼即以其副鼓吹給之尚為政清簡始到官郡府以布四十匹為尚造烏布帳尚壞之以為軍士襦袴建元二年詔以為南中郎將餘官如故會庾冰薨復以夲號督豫州四郡領江州刺史俄而復轉西中郎將督揚州之六郡諸軍事豫州刺史鎮歷陽大司馬桓溫欲有事中原使尚率衆向夀春進號安西將軍初苻健將張遇降尚尚不能綏懷之遇怒據許昌叛尚討之為遇所敗收付廷尉時康獻皇后臨朝即尚之甥也特令降號為建威將軍初尚之行也使建武將軍濮陽太守戴施據枋頭會冉閔之子智與其大將蔣幹來附復遣行人劉猗詣尚請救施止猗求傳國璽猗歸以告幹幹謂尚已敗慮不能救已猶豫不許施遣參軍何融率壯士百人入鄴登三臺助戌譎之曰今且可出璽付我凶寇在外道路梗澀亦未敢送璽當遣單使馳白天子聞璽已在吾許知卿等至誠必遣重軍相救并厚相餉幹乃出璽付融融齎璽馳還枋頭尚遣振武將軍胡彬率騎三百迎璽致諸京師時苻健將楊平戍許昌尚遣兵襲破之徵授給事中賜軺車鼓吹戍石頭永和中拜尚書僕射出為都督江西淮南諸軍事前將軍豫州刺史給事中僕射如故鎮歷陽加都督豫州揚州之五郡軍事在任有政績上表求入朝因留京師署僕射事尋進號鎮西將軍鎮夀陽尚於是採拾樂人并制石磬以備太樂江表有鐘石之樂自尚始也桓溫北平洛陽上疏請尚為都督司州諸軍事將鎮洛陽以疾病不行升平初又進都督豫冀幽并四州病篤徵拜衛將軍加散騎常侍未至卒於歷陽時年五十詔贈散騎常侍衛將軍開府儀同三司諡曰簡無子從弟奕以子康襲爵早卒康弟靜復以子肅嗣又無子靜子虔以子靈祐繼鯤後謝安字安石尚從弟也父裒太常卿安年四嵗時譙郡桓彞見而歎曰此兒風神秀徹後當不減王東海及總角神識沉敏風宇條暢善行書弱冠詣王濛清言良久既去濛子修曰向客何如大人濛曰此客亹亹為來逼人王導亦深器之由是少有重名初辟司徒府除佐著作郎並以疾辭寓居會稽與王羲之及髙陽許詢沙門支遁遊處出則漁弋山水入則言詠屬文無處世意揚州刺史庾冰以安有重名必欲致之纍下郡縣敦逼不得已赴召月餘告歸復除尚書郎琅邪王友並不起吏部尚書范汪舉安為吏部郎安以書距絶之有司奏安被召歷年不至禁錮終身遂棲遲東土常往臨安山中坐石室臨濬谷悠然歎曰此亦伯夷何逺嘗與孫綽等泛海風起浪湧諸人並懼安吟嘯自若舟人以安為悅猶去不止風轉急安徐曰如此將何歸邪舟人承言即回衆咸服其雅量雖放情邱壑然每遊賞必以妓女從既纍辟不就簡文帝時為相曰安石既與人同樂必不得不與人同憂召之必至時安弟万為西中郎將總藩任之重安雖處衡門其名猶出万之右自然有公輔之望處家常以儀範訓子弟安妻劉惔妹也既見家門富貴而安獨靜退乃謂曰丈夫不如此也安掩鼻曰恐不免耳及万黜廢安始有仕進志年已四十餘矣征西大將軍桓溫請為司馬將發新亭朝士咸送中丞髙嵩戲之曰卿屢違朝旨髙卧東山諸人每相與言安石不肯出將如蒼生何蒼生今亦將如卿何安甚有愧色既到溫甚喜言生平歡笑竟日既出溫問左右曰頗嘗見我有如此客不溫後詣安值其理髮安性遲緩久而方罷使取幘溫見留之曰令司馬著帽進其見重如此溫當北征會万病卒安投箋求歸尋除吳興太守在官無當時譽去後為人所思頃之徵拜侍中遷吏部尚書中護軍簡文帝疾篤溫上疏薦安宜受顧命及帝崩溫入赴山陵止新亭大陳兵衛將移晉室呼安及王坦之欲於坐害之坦之甚懼問計於安安神色不變曰晉祚存亡在此一行既見溫坦之流汗沾衣倒執手版安從容就席坐定謂溫曰安聞諸侯有道守在四鄰明公何須壁後置人邪溫笑曰正自不能不爾耳遂笑語移日坦之與安初齊名至是方知坦之之劣溫嘗以安所作簡文帝諡議以示坐賔曰此謝安石碎金也時孝武帝富於春秋政不自己溫威振內外人情噂􅊱互生同異安與坦之盡忠匡翼終能輯穆及溫病篤諷朝廷加九錫使袁宏具草安見輒改之遂歷旬不就會溫薨錫命遂寢尋為尚書僕射領吏部加後將軍及中書令王坦之出為徐州刺史詔安總關中書事安義存輔導雖會稽王道子亦賴弼諧之益時強敵寇境邊書續至梁益不守樊鄧陷沒安每鎮以和靖御以長算德政既行文武用命不存小察𢎞以大綱威懷外著人皆比之王導謂文雅過之嘗與王羲之登冶城悠然遐想有髙世之志羲之謂曰夏禹勤王手足胼胝文王旰食日不暇給今四郊多壘宜思自效而虛談廢務浮文妨要恐非當今所宜安曰秦任商鞅二世而亡豈清言致患邪是時宫室毁瓌安欲繕之尚書令王彪之等以外寇為諫安不從竟獨決之宫室用成皆仰模元象合體辰極而役無勞怨又領揚州刺史詔以甲仗百人入殿時帝始親萬機進安中書監驃騎將軍録尚書事固讓軍號于時懸象失度亢旱彌年安奏興滅繼絶求晉初佐命功臣後而封之頃之加司徒後軍文武盡配大府又讓不拜復加侍中都督揚豫徐兖青五州幽州之燕國諸軍事假節時苻堅強盛疆場多虞諸將敗退相繼安遣弟石及兄子元等應機征討所在尅捷拜衛將軍開府儀同三司封建昌縣公堅後率衆號百萬次于淮淝京師震恐加安征討大都督元入問計安夷然無懼色答曰已别有旨既而寂然元不敢復言乃令張元重請安遂命駕出山墅親朋畢集方與元圍碁賭别墅安常碁劣於元是日元懼便為敵手而又不勝安顧謂其甥羊曇曰以墅乞汝安遂逰陟至夜乃還指授將帥各當其任元等既破堅有驛書至安方對客圍碁看書既竟便攝放牀上了無喜色碁如故客問之徐答云小兒輩遂已破賊既罷還內過戶限心喜甚不覺屐齒之折其矯情鎮物如此以總統進拜太保安方欲混一文軌上疏求自北征乃進都督揚江荆司豫徐兖青冀幽并寧益雍梁十五州軍事加黃鉞其夲官悉如故置從事中郎二人安上疏讓太保及爵不許是時桓沖既卒荆江二州並缺物論以元勳望宜以授之安以父子皆著大勳恐為朝廷所疑又懼桓氏失職桓石虔復有沔陽之功慮其驍猛在形勝之地終或難制乃以桓石民為荆州改桓伊於中流石虔為豫州既以三桓據三州彼此無怨各得所任其經逺無競類皆如此性好音樂自弟万喪十年不聽音樂及登台輔期喪不廢樂王坦之以書喻之不從衣冠效之遂以成俗又於土山營墅樓館林竹甚盛每擕中外子姪往來遊集肴饌亦屢費百金世頗以此譏焉而安殊不以屑意常疑劉牢之既不可獨任王味之不宜專城既而牢之以亂終而味之亦以貪敗由是識者服其知人時會稽王道子專權而姦諂頗相扇構安出鎮廣陵之步邱築壘曰新城以避之帝出祖于西池獻觴賦詩焉安雖受朝寄然東山之志始末不愈每形於言色及鎮新城盡室而行造泛海之裝欲須經略粗定自江道還東雅志未就遂遇疾篤上疏請量宜旋斾并召子征虜將軍琰解甲息徒命龍驤將軍朱序進據洛陽前鋒都督元抗威彭沛委以董督若二賊假延來年水生東西齊舉詔遣侍中慰勞遂還都聞當輿入西州門自以本志不遂深自慨失因悵然謂所親曰昔桓溫在時吾嘗懼不全忽夢乘溫輿行十六里見一白雞而止乘溫輿者代其位也十六里止今十六年矣白雞主酉今太嵗在酉吾疾殆不起乎乃上疏遜位詔遣侍中尚書喻旨先是安發石頭金鼓忽破又語未嘗謬而忽一誤衆亦怪異之尋薨時年六十六帝三日臨于朝堂賜東園祕器朝服一具衣一襲錢百萬布千匹蠟五百斤贈太傅諡曰文靖以無下舍詔府中備凶儀及葬加殊禮依大司馬桓溫故事又以平苻堅勳更封廬陵郡公安少有盛名時多愛慕鄉人有罷中宿縣者還詣安安問其歸資答曰有蒲葵扇五萬安乃取其中者捉之京師士庶競市價增數倍安能為洛下書生詠有鼻疾故其音濁名流愛其詠而弗能及或手掩鼻以斆之及至新城築埭於城北後人追思之名為召伯埭羊曇者太山人知名士也為安所愛重安薨後輟樂彌年行不由西州路嘗因石頭大醉扶路唱樂不覺至州門左右白曰此西州門曇悲感不已以馬䇿扣扉誦曹子建詩曰生存處華屋零落歸山邱因慟哭而去安有二子瑶琰瑶襲爵官至琅邪王友早卒子該嗣終東陽太守無子弟光祿勳模以子承伯嗣有罪國除劉裕以安勳德濟世特更封該弟淡為柴桑侯邑千戶奉安祀淡少歷顯位桓元篡位以淡兼太尉與王謐俱齎册到姑孰元熙中為光祿大夫復兼太保持節奉册禪宋琰字瑗度弱冠以貞幹稱美風姿與從兄護軍淡雖比居不往來宗中子弟惟與才令者數人相接拜著作郎轉祕書丞纍遷散騎常侍侍中苻堅之役安以琰有軍國才用出為輔國將軍以精卒八千與從兄元俱陷陳破堅以勳封望蔡公尋遭父憂去官服闋除征虜將軍會稽內史頃之徵為尚書右僕射領太子詹事加散騎常侍將軍如故又遭母喪朝廷疑其葬禮議者云潘嶽為賈充婦宜城宣君誄云昔在武侯喪禮殊倫伉儷一體朝儀則均謂宜資給葬禮悉依太傅故事先是王珣娶万女珣弟珉娶安女並不終由是與謝氏有隙珣時為僕射猶以前憾緩其事琰聞恥之遂自造輼輬車以葬議者譏之太元末為護軍將軍加右將軍會稽王道子以為司馬右將軍如故王恭舉兵假琰節都督前鋒軍事恭平遷衛將軍徐州刺史假節孫恩作亂加督吳興義興二郡軍事討恩至義興斬賊許允之迎太守魏鄢還郡進討吳興賊邱尫破之又詔琰與輔國將軍劉牢之俱討孫恩恩逃于海島朝廷憂之以琰為會稽內史都督五郡軍事夲官並如故琰既以資望鎮越土議者謂無復東顧之虞及至郡無綏撫之能而不為武備將帥皆諫曰強賊在海伺人形便宜振揚仁風開其自新之路琰曰苻堅百萬尚送死淮南况孫恩奔衄歸海若其復至正是天不養國賊令速就戮耳遂不從其言恩後果復寇浹口入餘姚破上虞進及邢浦去山隂北三十五里琰遣參軍劉宣之距破恩既而上黨太守張虔碩戰敗羣賊鋭進人情震駭咸以宜持重嚴備且列水軍於南湖分兵設伏以待之琰不聽賊既至尚未食琰曰要當先滅此寇而後食耳跨馬而出廣武將軍桓寶為前鋒摧鋒陷陳殺賊甚多而塘路迮狹琰軍魚貫而前賊於艦中傍射之前後斷絶琰至千秋亭敗績琰帳下都督張猛於後斫琰馬琰墮地與二子肇峻俱被害寶亦死之後劉裕左里之捷生擒猛送琰小子混混刳肝生食之詔以琰父子殞於君親忠孝萃於一門贈琰侍中司空諡曰忠肅三子肇峻混肇歷驃騎參軍峻以琰勳封建昌侯及沒於賊詔贈肇散騎常侍峻散騎侍郎混字叔源少有美譽善屬文初孝武帝為晉陵公主求壻謂王珣曰主壻但如劉真長王子敬便足如王敦桓元子誠可才小富貴便預人家事珣對曰謝混雖不及真長不減子敬帝曰如此便足未幾帝崩袁山松欲以女妻之珣曰卿莫近禁臠初元帝始鎮建業公私窘罄每得一豚以為珍膳項上一臠尤美輒以薦帝羣下未嘗敢食于時呼為禁臠故珣因以為戲混竟尚主襲父爵桓元嘗欲以安宅為營混曰召伯之仁猶惠及甘棠文靖之德更不保五畝之宅邪元聞慙而止歷中書令中領軍尚書左僕射領選以黨劉毅誅國除及宋受禪謝晦謂劉裕曰陛下應天受命登壇日恨不得謝益夀奉璽綬裕亦歎曰吾甚恨之使後生不得見其風流益夀混小字也安兄奕字無奕少有名譽初為剡令有老人犯法奕以醇酒飲之醉猶未巳安時年七八嵗在奕膝邊諫止之奕為改容遣之與桓溫善溫辟為安西司馬猶推布衣好在溫座岸幘笑詠無異常日桓溫曰我方外司馬奕每因酒無復朝廷禮嘗逼溫飲溫走入南康主門避之主曰君若無狂司馬我何由得相見奕遂擕酒就聽事引溫一兵帥共飲曰失一老兵得一老兵亦何所在溫不之責從兄尚有德政既卒為西藩所思朝議以奕立行有素必能嗣尚事乃遷都督豫司冀并四州軍事安西將軍豫州刺史假節未幾卒官贈鎮西將軍三子泉靖元泉早有名譽歷義興太守靖官至太常元字幼度少頴悟與從兄朗俱為叔父安所器重安常戒約子姪因曰子弟亦何豫人事而正欲使其佳諸人莫有言者元答曰譬如芝蘭玉樹欲使其生於庭階耳安悅元少好佩紫羅香囊安患之而不欲傷其意因戲賭取即焚之於此遂止及長有經國才略屢辟不起後與王珣俱被桓溫辟為掾並禮重之轉征西將軍桓豁司馬領南郡相監北征諸軍事于時苻堅強盛邊境數被侵寇朝廷求文武良將可以鎮禦北方者安乃以元應舉郗超雖素與元不善聞而歎之曰安違衆舉親明也元必不負舉才也時咸以為不然超曰吾嘗與元共在桓公府見其使才雖履屐間亦得其任所以知之於是徴還拜建武將軍兖州刺史領廣陵相監江北諸軍事時苻堅遣軍圍襄陽車騎將軍桓沖禦之詔元發三州人丁遣彭城內史何謙遊軍淮泗以為形援襄陽既沒堅將彭超攻龍驤將軍戴逯於彭城元率東莞太守髙衡後軍將軍何謙次于泗口欲遣間使報逯令知救至其道無由小將田泓請行乃沒水潛行將趣城為賊所獲賊厚賂泓使云南軍已破泓偽許之既而告城中曰南軍垂至我單行來報為賊所得勉之遂遇害時彭超置輜重於留城元乃揚聲遣謙等向留城超聞之還保輜重謙馳進解彭城圍超復進軍南侵堅將句難毛當自襄陽來會超圍幽州刺史田洛於三阿有衆六萬詔征虜將軍謝石率水軍次塗中右衛將軍毛安之遊擊將軍河間王曇之淮南太守楊廣宣城內史邱凖次堂邑既而盱眙城陷髙密內史毛藻沒安之等軍人相驚遂各散退朝廷震動元於是自廣陵西討難等何謙解田洛圍進據白馬與賊大戰破之斬其偽將都督顔因復進擊又破之斬其偽將邵保超難引退元率何謙戴逯田洛追之戰于君川復大破之元參軍劉牢之攻破浮航及白船督護諸葛侃單父令李郁又破其運艦難等相率北走僅以身免於是罷彭城下邳二戍詔遣殿中將軍慰勞進號冠軍加領徐州刺史還于廣陵以功封東興懸侯及苻堅自率兵次于項城衆號百萬而涼州之師始逹咸陽蜀漢順流幽并係至先遣苻融慕容暐張蚝苻方等至潁口梁成王先等屯洛澗詔以元為前鋒都督徐兖青三州揚州之晉陵幽州之燕國諸軍事與叔父征虜將軍石從弟輔國將軍琰西中郎將桓伊龍驤將軍檀元建威將軍戴熙揚武將軍陶隱等拒之衆凡八萬元先遣廣陵相劉牢之五千人直指洛澗即斬梁成及成弟雲步騎崩潰爭赴淮水牢之縱兵追之生擒堅偽將梁他王顯梁悌慕容屈氏等收其軍實堅進屯夀陽列陳臨淝水元軍不得渡元使謂苻融曰君逺涉吾境而臨水為陳是不欲速戰諸君稍却令將士得周旋僕與諸君緩轡而觀之不亦樂乎堅衆曰宜阻淝水莫令得上我衆彼寡勢必萬全堅曰但却軍令得過而我以鐡騎數十萬向水逼而殺之融亦以為然遂麾使却陳衆因亂不能止於是元與琰伊等以精鋭八千涉渡淝水石軍距張蚝小退元琰仍進決戰淝水南堅中流矢臨陳斬融堅衆奔潰自相蹈藉投水死者不可勝計淝水為之不流餘衆棄甲宵遁聞風聲鶴唳皆以為王師已至草行露宿重以飢凍死者十七八獲堅乘輿雲母車儀服器械軍資珍寶山積牛馬驢騾駱駝十萬餘詔遣殿中將軍慰勞進號前將軍假節固讓不受賜錢百萬綵千匹既而安奏苻堅喪敗宜乘其釁會以元為前鋒都督率冠軍將軍桓石虔徑造渦潁經略舊都元復率衆次于彭城遣參軍劉襲攻堅兖州刺史張崇於鄄城走之使劉牢之守鄄城兖州既平元患水道險澀糧運艱難用督護聞人奭謀堰吕梁水樹柵立七埭為𣲖擁二岸之流以利運漕自此公私利便又進伐青州故謂之青州𣲖遣淮陵太守髙素以三千人向廣固降堅青州刺史苻朗又進伐冀州遣龍驤將軍劉牢之濟北太守丁匡據碻磝濟陽太守郭滿據滑臺奮武將軍顔雄渡河立營堅子丕遣將桑據屯黎陽元命劉襲夜襲據走之丕惶遽欲降元許之丕告飢元饋丕米二千斛又遣晉陵太守滕恬之渡河守黎陽元魏皆降以兖青司豫平加元都督徐兖青司冀幽并七州軍事元上疏以方平河北幽冀宜須總督司州懸逺應統豫州以勳封康樂縣公元請以先封東興侯賜兄子玩詔聽之更封玩豫寧伯復遣寧逺將軍昋演伐申凱於魏郡破之元欲令豫州刺史朱序鎮梁國元住彭城北固河上西援洛陽內藩朝廷朝議以征役既久宜置戍而還使元還鎮淮隂序鎮夀陽會翟遼據黎陽反執滕恬之又泰山太守張願舉郡叛河北騷動元自以處分失所上疏送節盡求解所職詔慰勞令且還鎮淮隂以朱序代鎮彭城元既還遇疾上疏解職詔書不許元又自陳既不堪攝職慮有曠廢詔又使移鎮東陽城元即路於道疾篤上疏遣長史劉濟奉送節蓋章傳詔遣髙手醫一人令自消息又使還京口療疾元奉詔便還疾久不差又上疏讓職寢不報前後表疏十餘上久之乃轉授散騎常侍左將軍會稽內史時吳興太守晉寧侯張元之亦以才學顯自吏部尚書與元同年之郡而元之名亞於元時人稱為南北二元論者美之元既輿疾之郡十三年卒於官時年四十六追贈車騎將軍開府儀同三司諡曰獻武子瑍嗣祕書郎早卒子靈運嗣瑍少不惠而靈運文藻豔逸元常稱曰我尚生瑍瑍那得不生靈運永熙中為劉裕世子左衛率始從元征伐者何謙字恭子東海人戴逯字安邱處士逵之弟並驍果多權略逵厲操東山而逯以武勇顯謝安嘗謂逯曰卿兄弟志業何殊逯曰下官不堪其憂家兄不改其樂逯以軍功封廣信侯位至大司農万字万石才器俊秀雖器量不及安而善自衒曜故早有時譽工言論善屬文敘漁父屈原季主賈誼楚老龔勝孫登嵇康四隱四顯為八賢論其旨以處者為優出者為劣以示孫綽綽與往反以體公識逺者則出處同歸嘗與蔡系送客于征虜亭與系爭言系推万落牀冠帽傾脫万徐拂衣就席神意自若坐定謂系曰卿幾壞我面系曰夲不為卿面計然俱不以介意時亦以此稱之弱冠辟司徒掾遷右西屬不就簡文帝作相聞其名召為撫軍從事中郎万著白綸巾鶴氅裘履版而前既見與帝共談移日太原王述万之妻父也為揚州刺史万嘗衣白綸巾乘平肩輿徑至聽事前謂述曰人言君侯癡君侯信自癡述曰非無此論但晚合耳万再遷豫州刺史領淮南太守監司豫冀并四州軍事假節王羲之與桓溫箋曰謝万才流經通處廊廟參諷議故是後來一器而今屈其邁往之氣以俯順荒餘近是違才易務矣溫不從万既受任北征矜豪慠物常以嘯詠自髙未嘗撫衆兄安深憂之自隊主將帥已下安無不慰勉謂万曰汝為元帥諸將宜數接對以悅其心豈有慠誕若斯而能濟事也万乃召集諸將都無所説直以如意指四座云諸將皆徑卒諸將益恨之既而先遣征虜將軍劉建修治馬頭城池自率衆入渦潁以援洛陽北中郎將郗曇以疾病退還彭城万以為賊盛致退便引軍還衆遂潰散狼狽單歸廢為庶人後復以為散騎常侍會卒時年四十二因以為贈子韶字穆度少有名時謝氏尤彥秀者稱封胡羯末封謂韶胡謂朗羯謂元末謂川皆其小字也韶朗川並早卒唯元以功名終韶至車騎司馬韶子恩字景伯宏逹有逺韻為黃門郎武昌太守恩三子曜𢎞微皆歷顯位朗字長度父據早卒朗善言元理文義豔發名亞於元總角時病新起體甚羸未堪勞於叔父安前與沙門支遁講論遂至相苦其母王氏再遣信令還安欲留使竟論王氏因出云新婦少遭艱難一生所寄惟在此兒遂流涕擕朗去安謂坐客曰家嫂辭情慷慨恨不使朝士見之朗終於東陽太守子重字景重明秀有才名為會稽王道子驃騎長史嘗因侍坐于時月夜明淨道子歎以為佳重率爾曰意謂乃不如微雲點綴道子因戲重曰卿居心不淨乃復欲滓穢太清邪子絢字宣映曾於公座戲調無禮於其舅袁湛湛甚不堪之謂曰汝父昔已輕舅今汝復來加我可謂世無渭陽情也絢父重即王胡之外孫與舅亦有不協之論湛故有此及云万弟石字石奴初拜祕書郎纍遷尚書僕射征句難以勳封興平縣伯淮淝之役詔石解僕射以將軍假節征討大都督與兄子元琰破苻堅先是童謡云誰謂爾堅石打碎故桓豁皆以石名子以邀功焉堅之敗也雖功始牢之而成于元琰然石時實為都督焉遷中軍將軍尚書令更封南康郡公于時學校陵遲石上疏請興復國學以訓胄子班下州郡普修鄉校疏奏孝武帝納焉兄安薨石遷衛將軍加散騎常侍以公事與吏部郎王恭互相短長恭甚忿恨自陳褊厄不允且疾源深固乞還私門石亦上疏遜位有司奏石輒去職免官詔曰石以疾求退豈凖之常制其喻令還嵗餘不起表十餘上帝不許石乞依故尚書令王彪之例於府綜攝詔聽之疾篤進位開府儀同三司加鼓吹未拜卒時年六十二石少患面創療之莫愈乃自匿夜有物來舐其瘡隨舐隨差舐處甚白故世呼為謝白面石在職務存文刻既無他才望直以宰相弟兼有大勳遂居清顯而聚斂無饜取譏當世追贈司空禮官議諡博士范𢎞之議諡曰襄墨公語在𢎞之傳朝議不從單諡曰襄子汪嗣早卒汪從兄沖以子明慧嗣為孫恩所害明慧從兄喻復以子皓嗣宗受禪國除邈字茂度父鐵永嘉太守邈性剛鯁無所屈撓頗有理識纍遷侍中時孝武帝觴樂之後多賜臣文詔辭義有不雅者邈輒焚毁之其他侍臣被詔者或宣揚之故論者以此多邈後為吳興太守孫恩之亂為賊胡桀郜驃等所執害之賊逼令北面邈厲聲曰我不得罪天子何北面之有遂害之邈妻郗氏甚妬邈先娶妾郗氏怨懟與邈書告絶邈以其書非婦人詞疑其門下生仇元逹為之作遂斥元逹元逹怒遂投孫恩并害邈兄弟竟至滅門通志卷一百二十八
