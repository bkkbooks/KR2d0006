body:
  text: 通志卷三上宋右迪功郎鄭樵漁仲撰三王紀第三上夏禹夏后氏曰文命亦曰大禹元年戊戍姒姓顓帝生鯀鯀生禹禹之母有莘氏女曰修已禹生於石紐長於西羌長九尺二寸聲為律身為度敏給克勤其德不違其仁可親其言可信亹亹穆穆為綱為紀見耕者五耦而式過十室之邑則下為秉德之士存焉聞善言則拜不貴尺璧而重寸隂當堯之時洪水滔天用鯀治之九年不成舜攝堯之政巡狩而行見治水無狀乃殛鯀於羽山天下皆以舜之誅為是舜乃舉禹使續父業天下皆以舜之舉為公堯崩舜欲廣堯之績而求總百揆之人僉曰伯禹作司空舜曰嗟禹汝平水土惟時懋哉禹念前日之非度傷先人之無成一朝受命不敢逮遑勞身焦思靣目黧黑步不相過居外十三年過家聞其子呱呱而泣門不入也菲飲食致孝乎鬼神惡衣服致美乎黼冕卑宫室盡力乎溝洫陸行乘車水行乘舟泥行乘橇山行乘檋身執耒臿以為民先股無胈脛無毛手足胼胝體幹枯蝕髙髙下下疏壅導滯左凖繩右規矩載四時封九山決九川障九澤豐殖九藪汨越九原宅居九隩合通四海品處庶類禹常言人無食則不能使也不利於人則不能勸也民勞而無怨苦者利之也民有鬻子者禹以歷山之金鑄幣而與之償命益豫衆庶稻可種卑濕命稷豫衆庶難得之食食少調有餘相給以均諸侯初舜分十二州禹乃復舊制為九州行水自冀州始堯都冀州以天子之京邑故不言所底之山川餘八州皆以山川疆其所底為萬世不易之法以州國有變遷而山川無變遷故也次兖州底濟河次青州底海岱次徐州底海岱及淮次揚州底淮海次荆州底荆衡次豫州底荆河次梁州底華陽黑水次雍州底黑水西河州皆先治其山川然後定其土田賦入然後正其貢篚然後道一州之水使有所歸故民得安居粒食為萬世之利使冀兖徐荆豫梁雍七州之水各歸于河使青州之水歸于濟使揚州之水歸于淮泗九州既理然後總理天下凡山川皆起於極西而盡於極東水徇山而行故禹之導山川皆自西始導九山各有所至岍岐嶓冢至於荆山壺口雷首至於太嶽底柱析城至於王屋太行恆山至於碣石西傾朱圉鳥鼠至於太華熊耳外方桐柏至於陪尾內方至於大别岷山之陽至於衡山九江之南至於敷淺原導九川各有所歸弱水歸于合黎黑水歸於南海河自積石東歸于海九河從之漢自嶓冢南歸于江三澨從之江自岷而東由中歸于海澧水彭澤從之濟自滎而北由東歸于海菏汶從之淮自桐柏東歸于海沂泗從之渭自鳥鼠同穴東歸于河涇漆沮從之洛自熊耳東北歸于河瀍澗伊水從之自是九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海會同六府孔修庶土交正底慎財賦各循三品成賦中邦錫之封土賜以姓氏各戴君德無或違命然後弼成五服至于五千里五百里甸服郊畿之服也效其賦入甸而侯侯而綏綏而要要而荒各五百里遵其法守東漸于海西被于流沙朔南暨聲教訖于四海天乃錫禹元圭為瑞以告成功洪水漏中州乾百川順流蛇龍潛處民得去髙險處平土者禹也故曰微禹之功吾其魚乎天無伏隂地無散陽水無沉氣火無災燀神無間行民無淫心時無逆數物無害生天下皆宗禹為山川鬼神主舜即位三十有三載耄期倦于勤命禹總其衆攝行天子事禹固辭不獲乃受命十七年舜南巡狩而崩三年喪畢禹避舜之子於陽城天下諸侯皆去商均而朝禹於是即天子位號夏后氏元年作都于韓或言安邑即韓地尚黑社用松牲用黑以黑為徽號收冠元衣十寸為尺封丹朱於唐商均於虞為諸侯作樂曰大夏改正朔以建寅為正月命臯陶為夏籥九成昭其功也以五音聼治揭鐘鼓磬鐸鞀以待四方之士為銘於簨簴曰導以道者撾鼓喻以義者鼓鐘告以事者振鐸語以憂者擊磬有獄訟者搖鞀嘗曰吾不恐四海之士留於道路恐其留吾門也一饋十起一沐三捉髮以勞于下出見罪人下車問而泣之左右曰罪人不道何痛之為禹曰堯舜之人皆以堯舜之心為心今朕為君朕之人各以其心為心是以痛之既服九州乃收天下之銅鑄九鼎以象九州之物初黃帝作車少昊加牛奚仲加馬禹命奚仲為車正建旗旐以辨等級古有醴酪禹始命儀狄作酒禹飲而美乃疏儀狄遂絶旨酒曰後世必有以酒亡國者禹舉臯陶而薦之且授政焉臯陶卒封其後於英六或在許舉其子伯益任以政禹在位十年南巡狩會諸侯於塗山執玉帛者萬國其山今在鍾離禹濟江黃龍負舟舟人恐禹仰天而歎曰吾受命於天生寄也死歸也豫何憂於龍哉視龍猶蝘蜒龍俯首而逝禹致羣臣於會稽防風氏後至戮之防風者汪芒氏之君也漆姓守封嵎之山禹崩以天下授益葬于會稽之山隂在位十年年百嵗或云在位十五年三年喪畢益避禹之子啓居於箕山之隂啓賢天下屬意焉益佐禹日淺天下未洽故諸侯皆去益而朝啓曰吾君帝禹之子也夏后氏禘黃帝而祖顓頊郊鯀而宗禹臣謹按夏后氏以金德王天下又按禹平水土萬邦作乂乃使大章步自東極至於西垂二億三萬三千五百里七十一步又使豎亥步自南極盡於北垂二億三萬三千五百里七十五步四海之內東西二萬八千里南北二萬六千里又按禹時天雨金三日亦嘗雨稻又按述異記今吳越間防風廟刻木作形龍首牛耳連眉一目禹會塗山防風後至誅之其長二丈骨專車今南中民有姓防風者即其後也皆長大俗云祭防風奏防風古樂截竹長三尺吹之如狗嘷三人被髮而舞今湖州武康防風故國也又按越傳曰禹至大越上苗山大會計爵有德封有功遂更苗山曰會稽言會計也因病死葬葦棺穿壙深七尺上無瀉泄下無邸水壇髙三尺土階三等周方一畝墨子曰禹葬會稽衣裘三領桐棺三寸地里志云上有禹井禹祠相傳以下有羣鳥耘田臣又按劉恕曰大江之南古之要服舜禹南巡崩不返葬禹非不尊其君啓非不孝其父時享在乎廟貌魂氣無所不之秦漢以下崇尚墓祭違經棄禮逺事尸柩難以語乎理矣帝啓元年丁未皇甫謐曰甲辰其母塗山氏之女也有扈氏不服啓伐之召六卿誓師大戰于甘之野遂滅有扈氏筮享神於太陵之上是為鈞臺之享又筮于晉之墟作璿臺於晉水之陽在位九年崩皇甫謐日十年子太康立臣謹按夏為扈商為崇秦改鄠縣縣北二十里有故扈城城周四里亦有甘亭又按世本有扈氏夏同姓或云啓庶兄以堯舜傳賢禹獨與子故伐啓淮南子曰有扈氏為義而亡又按淮南子啓之母塗山氏禹治洪水通轘轅山化為熊謂塗山氏曰欲餉聞鼓聲乃來禹跳石誤中鼓塗山氏往見禹方作熊慙而去至嵩髙山下化為石禹曰歸我子石破北方而啓生帝太康元年丙辰太康尸位以逸豫滅厥德黎民咸二乃盤遊無度畋于有洛之表十旬弗反有窮后羿距之于河厥弟五人御其母徯于洛之汭述大禹之戒而作五子之歌羿之祖世為射官天子賜之弓矢使司射夏之衰也自鉏遷于窮石號有窮氏太康不得入國羿遂廢之立其弟仲康太康在位二十九年失國而崩臣謹按許愼曰羿帝嚳射官也又按淮南子堯時十日羿射九烏又曰羿除天下之害死為宗布楚辭天問曰羿焉彃日烏焉解羽博物志曰羿與鑿齒戰于疇華之野羿持弓鑿齒持矛羿殺之或曰河伯溺殺人羿射其左目風伯壞人屋室羿射中其膝舊云帝嚳堯時各有羿羿乃善射之號也臣按其字從羽從廾廾即拱字拱羽為羿與伊尹之伊相類伊從人從尹以其人能尹正天下伊與羿皆是指其人之名而制字也竊觀今之庸俗以般輸善掄才凡古屋壯麗者皆曰魯般造殊不知般為何代之人羿必太康時人以射得名堯嚳之時亦有善射之人世之訛者以為羿也仲康元年乙酉仲康初即位羲和失職沉湎于酒昏迷天象日月無紀仲康命胤侯為大司馬總六師以征之仲康之世微弱政出於羿在位十三年崩子相立帝相亦曰相安元年戊戍相徙都商邱征畎夷黃夷其後于夷來賓東夷有九種曰畎夷于夷方夷黃夷白夷赤夷元夷風夷陽夷相與有扈戰于甘澤不勝六卿請復之相曰不可德之不厚教之不修也於是處不重席食不二味琴瑟不張鐘鼓不陳子女不飾親親長長尊賢使能期年而有扈氏服然相之世政出於羿終為羿所殺或言為羿所逐失國居商邱依夏同姓諸侯斟灌斟鄩在位二十八年有窮氏亦曰后羿自鉏遷于窮石因夏民以代夏政元年丙寅國號有窮樂正后蘷之子伯封貪婪無厭忿纇無期謂之封豕羿滅之蘷是以不祀羿善射好田獵不修民事而淫于原獸棄其賢臣武羅伯因熊髠尨圉而用寒浞寒浞者伯明氏之讒子弟也羿以為相浞行媚于內施賂于外愚弄其民而虞羿于田樹之詐慝羿猶不悛將歸自田家衆殺而亨之以食其子其子不忍食死于窮門羿篡夏自立凡八年或云二年寒浞復殺羿而篡之元年戊戍寒國今濰州東二十三里寒亭是也浞因羿室不改有窮之號生澆及豷澆既長矣浞使之用師滅斟灌及斟鄩而殺夏后相乃封澆于過封豷于戈浞在位三十二年或云十年為夏之遺臣靡所滅而立少康帝少康元年丙午少康夏后相之子也母曰后緡當寒浞用澆滅相之時后緡方娠逃出自竇歸于有仍生少康既長為仍牧正澆使其臣椒求之逃奔有虞為虞庖正虞君妻之以二姚而邑諸綸有田一成有衆一旅布德行惠夏衆歸心寒浞恃其讒慝詐偽而不德于民夏之遺臣靡自有鬲氏收二國之燼滅寒浞而立少康少康使女艾滅澆于過使季杼大吕反滅豷于戈有窮遂亡少康還舊都復禹之績祀夏配天不失舊物諸侯效職方夷來賓在位二十一年崩或云四十九年是促羿寒浞之年歸此子杼立臣謹按羿篡夏后相而立八年寒浞殺之因其室而生澆至澆能用師滅相相死乃生少康及少康生杼至杼能用師滅豷計太康失邦至少康復夏蓋百年之間夏之亂甚矣少康之功髙矣司馬遷之紀不志其事可謂疏矣帝杼亦曰季杼一作豫省文也元年丁卯杼在位十七年崩子槐立杼能帥禹者也戡定寒氏之亂佐父中興故夏后氏報焉帝槐帝王世紀作芬或作祖武亦作魁元年甲申槐之世九夷來御在位二十六年崩子芒立帝芒元年庚戌在位十八年或云十三年崩子泄立帝泄或作世或作宗元年戊辰泄之世畎夷之屬六夷來王始加爵命在位十六年崩子不降立帝不降或作江成元年甲申不降在位五十九年崩弟扄立帝扄或作喬元年癸未扄在位二十一年崩子厪立帝厪或作廣或作㕓元年甲辰厪在位二十年崩不降子孔甲立帝孔甲元年甲子孔甲好事鬼神復為淫亂夏后氏德衰諸侯畔之在位三十一年崩子臯立臣謹按孔甲之世天降乘龍河漢各二龍有雌雄孔甲不能食之而未獲豢龍氏陶唐氏既衰其後有劉纍學擾龍于豢龍氏事孔甲能飲食之賜氏曰御龍以更豕韋之後龍一雌死潛醢以食夏后夏后饗之美既而復求之纍懼遷于魯縣今汝州魯山也帝臯元年乙未臯在位十一年崩子發立帝發元年丙午發之世諸夷賓于王門獻其樂舞在位十三年或云十一年或云十年崩子履癸立是為桀帝桀元年己未夏自孔甲以來諸侯多畔桀復不道武傷其民民不堪命桀有力能申鈎索鐵伐有施有施人女以末嬉一作妹喜末嬉嬖言無不從桀為之作象廊玉牀傾宫瑤臺瓊室肉山脯林酒池可以運船糟隄可以望十里一鼓而牛飲者三千人以樂之諌者以為妖言殺之伊尹因説湯以伐夏救民湯以為賢而薦於桀桀不能用而飲之酒羣臣醉者持不醉者不醉者持醉者相和而歌曰江水沛兮舟楫敗兮我王廢兮盍歸乎盍歸乎亳亦大矣伊尹退而更曰樂兮樂兮四牡驕兮六轡沃兮覺兮較兮大命格兮去不善而從善吾何不樂兮伊尹既醜有夏復歸于亳告湯曰桀惑末嬉上下離心皆曰上天弗恤夏命其卒桀有暴臣于辛凌轢諸侯諛臣左師曹觸龍讒賊忠良關龍逢引黃圖以諌曰古之人君愛民節用享國之日長今君用財若無窮殺人若恐弗勝亡無日矣立而不去桀曰子又妖言矣吾之有民猶天有日日有亡乎日亡吾乃亡於是焚黃圖殺龍逢衆莫敢視桀愈自賢湯使人哭之桀召湯而囚於夏臺已而釋之桀欲肆其侈心為有仍之會有緡叛冬十月鑿山穿陵以通河諌者曰泄天氣發地藏天子失道後必有敗桀殺之期年瞿山崩為大澤水深九尺山覆於谷下反在上桀見籙書云亡夏者桀於是大誅豪桀大費之裔曰費昌見二日出東熖西沉問於馮夷夷曰西夏東商費昌乃歸湯湯欲伐桀伊尹請乏貢職以觀其動桀怒而起九夷之師伊尹曰未可彼尚能起九夷之師湯復修貢職如初太史終古出其圖法執而泣之桀不聽終古奔湯湯告諸侯曰夏為無道暴戾其民窮其父兄棄其忠良守法之臣自歸于商湯又乏貢職桀起九夷之師不至伊尹曰可矣明年相湯伐桀桀奔南巢因放之於南巢在位五十一年湯封夏後至周為把國舊云禹之後分封以國為氏有夏后氏有扈氏有男氏斟尋氏彤城氏褒氏費氏把氏繒氏辛氏冥氏斟氏戈氏臣謹按桀之時至德滅而不揚帝道掩而不興發號逆四時春秋縮其和天地除其德樹社稿而塴裂容臺振而掩覆犬羣嘷而入淵豕銜蓐而席隩美人拿首墨靣而不容曼聲吞炭內閉而不歌喪不盡其哀臘不聽其樂西老折勝黃神嘯吟飛鳥鎩翼走獸廢腳山無峻幹澤無窪水田無立禾路無莎薠金積折廉璧襲無理百川沸伊洛竭泰山走山石泣宫中女子化為龍俄復為婦人甚麗而食人桀命為蛟妾告吉凶鸛鳴於國十日夕不止天雨血雨木冰六月霜降桀為夜宫於深谷之中男女雜處三旬不出聽政一夕大風揚沙填宫合之然桀時雖多災異亦安得有如此所謂兩日鬭五星錯行鬼哭於國枉矢流地出黃霧堯山崩􅕆山亡地震雷霆殺人之異容有之右夏之世起禹元年戊戍終桀五十一年己酉十七君十五世通后羿寒浞四百三十二年商契古作卨帝嚳之子母曰簡狄有娀氏之女也簡狄因浴而行有三人焉見元鳥隕卵簡狄取而吞之乃孕生契契佐禹治水有功舜命之曰百姓不親五品不遜汝作司徒敬敷五教五教在寬封於商今上洛也賜姓子禮緯曰以元鳥生子故也契與益稷臯陶見用於堯舜禹之時功業顯著卒子昭明立卒子相土立相土居商邱宋地也故傳曰閼伯居商邱相土因之卒子昌若立卒子曹圉立卒子冥立冥為夏司空主水勤其官事死於水中商人郊之子振立卒子微立卒子報丁立卒子報乙立卒子報丙立卒子主壬立卒子主癸立卒子天乙立是為成湯臣謹按商人及周人繼繼者傳父子及者傳兄弟報丁報乙報丙與主壬主癸皆弟兄之名疑前史指為父子過矣湯亦曰成湯亦曰履亦曰天乙以其用武得天下故號曰武王為商家創業之祖故廟曰烈祖契之封商本上洛後世遷于亳故京兆杜縣亳亭是也司馬遷云禹興西羌湯起亳俱在西也及湯有天下始居于商邱復命以亳梁之榖熟是也本帝嚳之都故曰湯始居亳從先王居自契至成湯凡八遷亳都有溵水在焉故亦謂之殷後世遷于囂遷于相遷于耿遷于朝歌而殷商之名未始偏廢以開國受命之祖所以命也湯為夏方伯得專征諸侯與葛為鄰葛伯放而不祀湯使問之答以犧牲粢盛不給湯使遺之牛羊復使亳衆往為之耕其不祀自若有餉者葛伯殺之而奪其食湯始征之故曰湯征自葛始東征西夷怨南征北狄怨皆曰奚獨後豫后來其蘇民之戴商久矣夷狄且懷之况中國乎伊尹處士也名摯耕於有莘之野湯使人以幣聘之五反然後往見湯言素王及九主之事或言伊尹為有莘氏之媵臣負鼎爼以滋味説湯致於王道湯舉伊尹任以國政伊尹乃進君國子民之人皆在王官湯以伊尹為賢而薦於桀伊尹去湯適夏既醜有夏復歸于亳入自北門遇汝鳩汝方作汝鳩汝方之篇以言其志也湯出見網於野者張其四面而祝之曰自天下四方皆入吾網湯曰嘻盡之矣去其三靣而更其祝曰欲左左欲右右欲髙髙欲下下不用命者乃入吾網漢南諸侯聞之曰湯德至矣及禽獸一時歸商者三十六國或言四十國有白狼銜鈎及黃金黑玉之瑞夏末昆吾氏伯而為亂湯為景亳之會以徴兵於諸侯湯親秉鉞伐韋顧及昆吾韋顧昆吾之與國也復黨於桀昔髙辛火正祝融氏曰黎其後有八姓昆吾蘇顧溫己姓也鬷夷豢龍董姓也彭祖豕韋諸稽彭姓也舟人秃姓也塢鄶路逼陽妘姓也鄒吕曹姓也又有芊姓斟姓惟斟無後或云帝嚳之祝融曰吳回生陸終陸終有子六人坼剖而生長昆吾次參胡次彭祖次會人次安斟次季連湯既克三國伊尹遂相湯伐桀湯以費昌為御與桀戰于鳴條之野夏師敗績桀走保三朡今定陶也遂伐三朡俘厥寶玉而放桀焉伊尹報于諸侯諸侯大會湯再拜而從諸侯之位曰天命無常惟歸有道三辭諸侯莫敢當乃踐天子位湯歸自夏至于大坰惟有慚德曰豫恐來世以豫為口實蓋以臣伐君以干戈取天下自湯始所以慚也故仲虺作誥以釋之湯為天子反桀之事遂其賢良以寬治民除其邪虐徇民所欲順天革命改正朔以建丑為正月或言湯作歷不以正月朔旦為節更用十一月冬至為元首至周從之服色尚白朝會以晝社用柏或云社用石葬植松牲用白以白為徽號朝燕服哻冠而縞衣十二寸為尺初置二相以伊尹仲虺為之湯謂伊尹曰每勤諸侯逺獻方物吾欲因其地之所有易得不貴乃命伊尹為獻令初作囿取禽獸以奉宗廟簡士卒習射御以戒不虞海外肅愼北發渠搜氐羌來服民無食者以莊山之金鑄幣而賑之自伐桀之後七年大旱洛圻川竭煎沙爛石太史氏曰當以人禱湯曰請雨為民也若以人禱吾自當之乃齊戒翦髮斷爪素車白馬嬰以白茅身為犧牲禱於桑林之社持三足鼎祝諸山川曰勿以豫一人之不敏俾上帝鬼神傷民之命仍以六事自責曰政不節與民失職與宫室崇與婦謁盛與苞苴行與讒夫昌與言未訖雨大作方數千里命伊尹作樂曰大濩修九韶六列聞宫聲使人溫良而寬大聞商聲使人方亷而好義聞角聲使人惻隱而仁愛聞徴聲使人樂養而好施聞羽聲使人恭謹而好禮湯令未命之士不得朱軒及飛軨不得乘飾車軿馬衣文繡命然後得以旌有德湯二十七征而天下服在位十三年元年庚戍年百歲葬濟隂有莘氏生太丁外丙仲壬太丁為太子早卒而立其弟外丙商人禘舜而祖契郊冥而宗湯上甲微皇甫謐曰微字上甲能帥契者故報焉臣謹按劉向别録曰九主者有法君專君授君勞君等君寄君破君國君三歲社君凡九品圖其形象又按湯以水德王天下又按皇覽曰湯冢在濟隂亳縣北東郭外三里冢四方方各十步髙七尺漢哀帝建平元年大司空御史長卿按行水災至湯冢劉向曰湯無葬處皇甫謐曰湯即諸侯位十七年為天子十三年百嵗而崩又按湯聞伊尹賢使人請於有莘氏不可伊尹亦欲歸湯湯娶於有莘氏乃以伊尹為媵送女湯得伊尹祓之於廟照之以爝釁以犧􅀈明日設朝而見之伊尹請湯以至味湯曰可得而為之乎對曰君之國小不足以具之為天子然後可因説湯以伐夏救民帝外丙元年癸亥外丙在位二年崩立其弟仲壬帝仲壬仲一作中元年乙丑仲壬在位四年崩伊尹立太丁之子太甲實成湯之適長孫也帝太甲亦曰祖申元年己巳太甲嗣位伊尹為之作伊訓肆命徂后明言烈祖成湯之德以訓于王太甲既立不明伊尹放諸桐而攝政當國以朝諸侯太甲居桐宫三年悔過遷善十有二月朔伊尹以冕服奉嗣王歸于亳乃作太甲三篇而申訓之伊尹既復政告老將歸又作咸有一德太甲在位三十三年廟曰太宗商家祖有功而宗有德故後世以祖宗稱之太甲崩子沃丁立臣謹按伊訓成湯既沒太甲元年孔傳曰太丁未立而卒及湯沒而太甲立孟軻司馬遷云湯崩外丙仲壬皆即位乃及太甲與書不同劉歆皇甫謐皆從之此雖畔經亦無害若乃汲冢紀年曰商仲壬即位居亳崩其卿士伊尹放太甲于桐乃自立也伊尹即位放太甲七年太甲潛出自桐殺伊尹乃立其子伊陟伊奮命復其父之田宅而中分之此害經之甚者也帝沃丁元年壬寅沃丁八年伊尹卒伊尹於太甲之時告老而歸于其邑至是沃丁乃葬之于亳在湯冢之西從先王也後世尊之曰先正保衡咎單相沃丁遂訓伊尹事而作沃丁之篇沃丁在位二十九年崩弟太庚立臣謹按孔氏傳曰沃丁以三公禮葬伊尹皇甫謐曰沃丁八年伊尹卒年百餘歲大霧三日沃丁葬之以天子禮祀以太牢親臨喪以報大德焉又按皇覽曰伊尹冢在濟隂己氏平利鄉近於亳帝太庚元年辛未太庚在位二十五年崩子小甲立徐廣曰世表云小甲太丁弟帝小甲元年丙申小甲在位三十六年帝王本紀云五十七年崩弟雍已立帝雍己元年壬申雍己之時商道始衰諸侯或不至在位十三年崩弟太戊立帝太戊元年乙酉太戊命伊尹之子陟為相亳有祥桑與榖合生于朝一暮大拱或云七日大拱太戊患焉伊陟曰妖不勝德君之政無乃有闕與太戊占之曰野木生於朝國必亡於是修先王之政明養老之禮早朝晏退問疾弔喪三日而祥桑枯死三年逺方之人重譯而至者十六國是時太戊相伊陟巫咸而用臣扈伊陟贊于巫咸或言巫咸治王家有成作咸乂四篇太戊復贊伊陟于廟言弗臣也作伊陟之篇伊陟辭焉作原命之篇臣主皆賢商道復興在位七十五年崩廟曰中宗子仲丁立帝仲丁元年庚子仲丁自亳遷于囂囂亦作敖今河南敖倉是也藍夷為寇仲丁征之在位十一年崩弟外壬立帝外壬元年辛亥外壬在位十五年崩弟河亶甲立帝河亶甲元年丙寅亶甲遷于相今鄴都也商復衰在位九年崩子祖乙立帝祖乙元年乙亥祖乙遷于耿河中龍門縣南十二里故耿城是也為水所圯遷于邢今邢州治也或云遷于奄巫賢任職商道復興在位十九年崩子祖辛立帝祖辛元年甲午祖辛在位十六年崩弟沃甲立帝沃甲一作開甲元年庚戍沃甲在位二十年崩祖辛之子祖丁立帝祖丁元年庚午祖丁在位三十三年崩沃甲之子南庚立帝南庚元年壬寅南庚在位二十九年崩祖丁之子陽甲立帝陽甲元年辛未陽甲之世商道衰微自仲丁以來廢適而立諸弟弟子爭立比九世亂諸侯莫朝在位七年崩帝王本紀云十七年弟盤庚立帝盤庚元年戊寅盤庚之前作都在河北水泉汚溺蕩析民居盤庚將涉河以民遷商自成湯以來凡五遷都邑臣民重遷而相咨怨盤庚為是諭諸侯大臣言其先祖佐我髙后成湯法則可修之事以曉衆志乃渡河治亳修湯之德行湯之政諸侯來朝在位二十八年崩弟小辛立臣謹按皇甫謐曰孟子稱湯居亳與葛為鄰亳即梁國榖熟縣也實湯之所都是為南亳又湯有景亳之命梁國蒙縣北有亳城實湯所受命朝諸侯處是為北亳盤庚所治亳在河南偃師是為西亳三地皆名亳立政所謂三亳也然亳之名本在西商人初作邑于商實上洛也後遷于亳故京兆杜縣有亳亭是也三亳之名皆自此亳始帝小辛元年丙午小辛不能紹盤庚之業商家微矣百姓思盤庚之治作盤庚三篇在位二十一年崩弟小乙立帝小乙元年丁卯小乙在位二十年崩子武丁立帝武丁元年戊午武丁為太子時學于甘盤遁于荒野盡知民之疾苦能聳其德至于神明居憂亮隂三年不言政事決於冢宰既免喪猶不言羣臣咸諌曰天子惟君萬邦百官承式王言惟作命不言臣下罔攸稟令王作書以誥曰以豫正于四方豫恐德弗類兹故不言恭默思道夢帝賚豫良弼其代豫言乃審所夢之象使圖其形以求於天下而得説焉説築室於傅巖之野惟肖厥象武丁見之與語而知其賢爰立作相而命之氏蓋因所居也故曰傅説惟説總百官朝夕納誨于王又與同僚協心佐治以成商家中興之業武丁開先祖之府取其明法以為君臣上下之節武丁祀成湯之明日有飛雉升鼎耳而雊武丁患其不祥其賢臣祖已作訓于王言天之所監在民王能愛民無非天祚武丁又責躬思道三年編髮重譯來朝者六國自是服章多用翟羽孔子曰吾於髙宗彤日見修德而報之疾也茍由其道致其仁則逺方歸德焉鬼方恃固而擾諸夏武丁伐之三年乃克自是內外無患在位五十九年崩祖已嘉武丁之祥雉為立廟為髙宗子祖庚立臣謹按書大傳曰湯之後武丁之前王道不振桑榖俱生于朝七日而大拱武丁問諸祖己祖已曰桑榖野草而生于朝朝必亡武丁懼側身憂行思先王之道興滅國繼絶世舉逸民明養老之道三年之後重譯而朝者六國又按劉向曰髙宗承商敝而起盡諒隂之哀天下應之既獲安定而怠於政乃有桑榖之異又劉向著説苑以太戊武丁時俱有桑榖異又按呂氏春秋湯時榖生於廷比旦而大拱臣謹按孔安國曰傅氏之巖在虞虢之間通道所經有澗水壞道常使胥靡刑人築其道説賢而代胥靡之築以售食焉又按皇甫謐曰髙宗夢天賜賢人胥靡之衣蒙之而來曰我徒也姓傅名説得我者豈徒也哉武丁寤而推之曰傅者相也説者歡説也天下當有相我而説民者哉明日審夢以示百官皆非也乃使百工寫其形象求諸天下果見築者胥靡衣褐帶索執役于虞虢之間傅巖之野名説以其得之傅巖謂之傅説然謐既曰姓傅名説又曰得之傅巖謂之傅説何也又按墨子曰傅説居北海之州圜土之上衣褐帶索售築於傅巖之城臣按築者築室也依巖築室其隱者與懷才抱道應時而起非役徒也以士君子之身何自苦而衣胥靡之衣為刑人之事乎帝祖庚元年丁亥祖庚在位七年崩弟辛甲立帝辛甲亦曰祖甲元年甲午無逸言祖甲者太甲也在位十六年崩子廩辛立臣謹按鄭康成曰祖甲之兄祖庚賢武丁欲廢兄立弟祖甲以為不義逃於民間周語曰帝甲而亂七世而隕帝廩辛亦曰馮辛元年庚戍廩辛在位六年崩弟庚丁立帝庚丁元年丙辰庚丁在位六年帝王本紀曰十一年崩子武乙立帝武乙元年壬戌武乙復去亳都河北中國微弱東夷盛強分遷淮岱漸居中土武乙無道為偶人謂之天神令人為行與之博天神不勝僇辱之為革囊盛血仰而射之命曰射天獵於河渭之間震死在位四年竹書紀年曰武乙三十五年周俘狄子太丁立帝太丁元年丙寅太丁在位三年紀年曰十一年崩子乙立帝乙亦曰辛乙元年己巳乙之子三人長曰微子啓次曰仲衍季曰紂啓母賤而立紂焉適故也或言三人同母母本妾也以為后生紂紂尚幼乙及后謂啓賢欲以為太子太史據法而爭之曰廢適立庶不可乙在位三十七年商家日微崩少子紂立紂亦曰辛亦曰受亦曰受德元年丙午紂資辨捷疾見聞甚敏材力過人手格猛獸知足以拒諌言足以飾非矜人臣以能髙天下以聲以為皆出已之下始為象箸箕子歎曰彼為象箸必為玉杯玉杯象箸必不盛土簋而羮菽藿必不衣裋褐而舍於茅茨之下將錦衣九重髙臺廣榭稱此以求之天下不足其求矣致逺方珍怪之物侈輿馬宫室之漸自此始箕子者紂之諸父也或言紂之庶兄名胥餘紂伐有蘇氏有蘇氏以妲已女紂紂惑之言無不聽所好者貴所惡者誅使師延延一作涓作朝歌北鄙之音北里之舞靡靡之樂造鹿臺而為瓊室玉門臺三里髙千尺七年乃成其臺今在朝歌城中厚賦斂以實鹿臺之錢而盈巨橋之粟益收狗馬奇玩充牣宫室以人食獸廣沙邱苑臺多取鳥獸之異者置其中大聚樂戲於沙邱以酒為池以糟為邱縣肉為林使男女倮相逐其間大宫百里宫中九市與崇侯費中戲於離宫以百二十日為一夜謂之長夜飲車行酒騎行炙以繩羈人頭引就酒池醉而溺死紂醉而忘其日辰甲子問左右皆不知問箕子箕子曰一國失日天下其危乎國人不知吾獨知之吾其危乎亦以醉不知百姓怨望諸侯有畔者妲己以為威不立耳乃説紂重刑辟初為尉斗而然之使人舉尉更用銅柱而膏之焚於其下俾囚辟緣柱以資妲己之笑名曰炮烙之刑紂以西伯昌九侯鄂侯為三公九侯亦謂鬼侯今鄴縣有九侯城是也鄂徐廣謂一名邗野王縣有邗城今懷州治然晉地亦有名鄂者九侯之女美納之於紂其女賢而不淫紂惡而殺之醢九侯鄂侯爭之脯鄂侯又剖孕婦而視其胎斫朝涉之脛而視其髓西伯聞而竊嘆崇侯虎以告且曰昌仁而有謀太子發勇而不疑中子旦恭儉而知時冠雖弊禮加頭履雖鮮位在足彼將易置焉請及其未成形圖之紂於是囚西伯於羑里今河內湯隂周之臣散宜生南宫適閎夭患之而問於呂尚三子舊學於尚尚知其賢相與見西伯羑里乃求有莘之美女驪戎之文馬有熊之九駟西海濵之白狐林陵怪獸江淮大貝因嬖臣費中而獻之散宜生趨而進曰西藩之臣昌命其行人敢效其寶以免其辜紂大説曰一物足以釋其辜况多乎西伯歸而獻洛西之地赤壤之田方千里請除炮烙之刑紂許之仍賜弓矢斧鉞得專征典治南國江漢汝潁之諸侯率循西伯之令於是陽為玉門築靈臺列侍女撞鐘鼓為樂紂聞之曰西伯改行吾無憂矣西伯隂修德行善諸侯多畔紂而歸周紂用費中為政費中善諛且嗜利又用蜚亷惡來革蜚亷善走惡來革者蜚亷之子也有力手裂虎兕善讒讟商容賢者棄而不用自此諸侯日益疏惟黎國為近於郊畿之間附紂周人伐黎商之賢臣祖伊恐奔告于紂紂曰我生不有命在天於是作西伯戡黎西伯九年卒太子發立是為武王紂之淫虐滋甚微子數諌不從欲死與亡未能決問於太師疪少師強對曰死而能安社稷利國家不恨為死死不能安社稷利國家不如亡箕子又諌不聼人曰可以去矣對曰知不用而言之不智也殺身以彰君之惡不忠也為人臣而自説於民吾不忍為也乃被髮佯狂為奴𨽻鼓琴以見志傳之者為箕子操紂囚之王子比干紂之諸父也曰為大臣者不諌非忠也不死非勇也諌三日不去紂曰吾聞聖人之心有七竅乃剖比干之心而視之或言刳剔孕婦即比干之妻也微子曰父子有骨肉之恩而臣主以義屬父有過子三諌不聼則隨而號之君有過臣三諌不聼義可以去矣太師少師抱其祭器樂器奔周內史向摯載其圖法亦奔周武王問太公曰仁者賢者亡矣商可伐乎對曰先謀後事者昌先事後謀者亡夏條可結冬冰可折時難得而易失初武王使人候商報曰讒勝良王曰未也又往報曰賢者出走王曰尚未也又往報曰民不敢誹怨矣王曰嘻遽告太公對曰刑勝故也其亂至矣往年武王東伐至孟津觀兵於商郊而還惟十有三年春大會於孟津二月甲子至商郊與紂戰於牧野紂兵敗乃走入宣室登鹿臺衣其寶玉就焚武王持太白之旗以麾諸侯諸侯畢拜武王揖之諸侯從入商國至紂死所王自射之三發而後下車以輕劔擊之以黃鉞斬紂之首而揭之大白之旗親射惡來之口紂之嬖寵如妲己者二人皆自殺王又射三發擊以劒斬以元鉞而揭其首於小白之旗武王命周公訪商之遺老而知民之所欲乃修盤庚之政親商如周視仇如戚裂鼓折枹弛弓絶栝去舍宿露解劒帶笏商人忘亡紂在位三十三年身滅國亡太史公云成湯之後分封以國為姓有殷氏來氏宋氏空桐氏稚氏北殷氏目夷氏然目夷公子魚之字也安得為國空桐氏稚氏並非國號臣謹按髙氏云周武王為天子始貶帝號稱王今考左傳云宋祖帝乙鄭祖厲王司馬遷本紀夏商皆稱帝周始稱王又按紂在位以來夷羊在牧梓化為松有燕口爪俱句天雨肉雨血于亳大旱大水河竭山鳴兩日見天火焚宫宫中鬼夜哭女化為男龜生毛兔生角紂嘗六月獵於西土發民逐獸諌者曰長育之時不可逆天道絶地德君踐一日之苗民失百日之食紂殺之後數月大風飄牛馬發屋拔木飛揚數十里有雀生鸇占曰以小生大國家王而名昌紂聞是占而益忲又按武王平商有二虜問之曰是國有妖乎一虜曰晝見星天雨血雨灰雨石大如甕六月雨雪一虜曰商有大妖此不與也子不聼父弟不從兄信者為欺欺者為忠婦人為政君子在野小人在位急令暴取以人餧虎田獵畢弋走狗試馬不避風雨好治池臺宫室百里之宫七十三所坐起以金鼓無長幼貴賤無禮義忠信無斗尺權衡此妖之大者也武王貴其言再拜右商之世起湯元年庚戍終紂三十三年戊寅三十君十七世六百二十九年商歷曰起丙戌終癸亥四百五十八年汲冢紀年曰二十九王四百九十六年通志卷三上
