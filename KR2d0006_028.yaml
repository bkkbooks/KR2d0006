body:
  text: 通志卷二十一宋右迪功郎鄭樵漁仲撰年譜第一年譜序為天下者不可以無書為書者不可以無圖譜圖載象譜載系為圖所以周知逺近為譜所以洞察古今故古者記年謂之譜桓君山曰太史公三代世表旁行邪上並效周譜則知成周紀年之籍謂之譜也太史公改譜為表何法盛改表為注皆遠於義不若遵周典也臣謹按皇甫謐作帝王世紀以及年厯上極三皇下逮漢魏其所以編次為甚詳譙周陶𢎞景之徒皆有其書而厯數之家所傅尤謹然不可以訓惟太史公紀年以甲始於共和後學之所共承也然為共和之説者已不可信況其年乎既曰周召二公共行政又曰共國之伯名和行天子政何也仲尼周人也著書斷自唐虞而紀年始於魯隱者為幽王遭西戎之禍典籍湮淪西周之年無所考據故本東周遷則漢人而欲貫年於西周可乎凡記年者自東周以還可信東周以前不可信也今之所譜者自春秋以來始稱年春秋之前皆稱世周末與秦關於上代故亦足以世云夫紀者襲編年之遺風傳者記一身之行事修史之家莫易於紀傳莫難於表志太史公括囊一書盡在十表班固不達其旨後史因失其傳史十表遂為荒唐之學表者一書之要也不可記繁文表者一書之本也不可記末節自班氏以來末節多矣復不識統理甚者如新唐書專記人家譜諜豈可以私家冒榮之書而為信史乎其書雖與唐書共帙而為廢典太史公之表紀年不過六甲而省其五十四紀事不過十餘言而為事之目所謂綱舉而目張也近代之為表者小字旁行盡載所述且蕃書旁行華書縱行華人故不便於旁行又豈能衡目而泛觀小字乎史記於六十甲子之統而提其六近代作編年者盡用六十已為繁矣而復有甚焉乃用嵗陽嵗陰之名甲日閼逢乙日旃蒙寅日攝提格卯日單閼此皆陰陽之命而不可以紀甲亦猶牛曰一元大武羊曰柔毛者祭享之命而不可以名畜今以甲寅為閼逢攝提格無以異於名牛為一元大武以乙卯為旃蒙單閼無以異於名羊為柔毛夫隱語者眢井逃難之言豈可施諸簡編嗚呼著書者貴乎意明而語約以六甲視六十甲則衍八百言以六甲視六十嵗名則衍二百五十二言以古較今其繁簡如此今之所譜但記六甲世譜年譜秦以上世譜譜春秋以下年三皇五帝夏商周秦春秋七國秦末六國漢興諸王兩漢三國晉前涼成漢代東晉前趙後趙前燕蜀漢魏前秦後燕後秦西秦北魏後涼南涼北涼南燕西涼北燕夏宋齊梁三魏北齊後梁後周陳隋世譜三皇世譜有巢氏謂之始君教民巢居燧人氏有巢之子鑽木取火教民熟食天皇伏羲氏少昊燧人之子母曰華胥女媧氏伏羲妹繼伏羲氏為天子大庭氏柏皇氏中央氏栗陸氏驪連氏赫胥氏尊盧氏混沌氏一曰啓統昊英氏朱襄氏葛天氏陰康氏無懷氏臣謹按大庭氏繼女媧為天子其後皆相繼為之未知族系自伏羲至無懷凡十五世共一千二百六十年少典人皇神農氏炎帝少典之子母曰女登帝臨魁神農之子母曰聽詙帝承一本承在臨魁之前帝眀帝直帝釐帝哀帝榆罔臣謹按自神農至榆罔凡八世共五百年地皇軒轅氏黃帝少典子母有蟜氏女或曰母名附寶黃帝之子二十五宗元嚻少昊青陽氏黃帝之子其母曰螺祖昌意黃帝之子母曰螺祖顓頊髙陽氏昌意子姬氏酉氏祈氏己氏滕氏針氏任氏荀氏僖氏姞氏儇氏依氏臣謹按天皇自伏羲至無懷十五世千二百六十年人皇自神農至榆罔八世五百年地皇黃帝一世百年三皇凡二十四世共千八百六十年五帝世譜黃帝少昊元嚻青陽氏黃帝子母曰螺祖繼黃帝為天子重木正勾芒少昊子重後為羲仲羲叔羲仲羲叔該金正蓐收少昊之子修水正元冥少昊之子熙水正元冥少昊之子蟜極少昊子帝嚳父昌意黃帝之子顓頊高陽氏昌意子母昌僕繼少昊為帝窮蟬顓頊之子敬康窮蟬之子句芒敬康之子蟜牛句芒之子瞽瞍蟜牛之子舜父伯鯀姒氏顓頊之子禹司空鯀子臯陶顓頊之子伯益臯陶之子大業伯益子母女修柏翳大費後為秦趙二國老童顓頊之子黎火正祝融老童子黎後為和仲和叔和仲和叔吳回老童子黎弟代黎為火正祝融號回祿或言顓頊生稱稱生卷章卷章生重黎陸終吳回子娶鬼方之女孕而不育十一年開左脅而出三人又開其右脅而出三人凡六子昆吾以下是也昆吾已姓夏時為諸侯伯成湯滅之參胡董姓周時為胡國楚滅之彭祖彭姓至商為侯伯今彭城是也會人妘姓周時為鄶國鄭滅之居溱洧間安斟曹姓周為邾國季連芊姓周為楚國蟜極少昊之子帝嚳髙辛氏繼顓頊為帝閼伯帝嚳子封商邱主辰摯嚳子母曰常儀繼嚳即位荒淫無度諸侯廢之立堯帝堯嚳子母曰慶節摯不道諸侯尊立之丹朱堯子劉纍堯後契嚳子母曰簡狄子姓封商其後至成湯有天下棄后稷嚳子母曰薑源姬姓至武王有天下實沈嚳子封于大夏主參瞽瞍舜父顓頊六世至于瞽瞍帝舜有虞氏瞽瞍子堯以丹朱不肖禪於舜舜以商均不肖禪位於禹堯之後為唐國舜之後為虞國至周為陳國商均舜子臣謹按五帝自少昊至帝舜凡五世共三百八十五年夏世譜黃帝二子元嚻黃帝之子昌意黃帝之子顓頊昌意之子顓頊四子窮蟬顓頊之子舜六世祖伯鯀顓頊之子臯陶顓頊之子老童顓頊之子禹鯀子啓禹子太康啓子兄弟五人仲康太康弟也相仲康弟也后羿有窮國君篡相寒浞羿臣篡羿之位澆浞子豷浞子少康相子復夏中興季杼少康之子槐季杼之子芒槐子泄芒子不降泄子扄不降之子廑扄子孔甲不降之子臯孔甲之子發臯子桀發子湯滅臣按夏之世起禹元年戊戍終桀五十一年己酉十七君十五世通后羿寒浞四百三十二年商世譜黃帝二子元嚻黃帝之子昌意黃帝之子蟜極元嚻之子帝嚳蟜極子生六子閼伯嚳之子封商邱主辰摯嚳子繼嚳堯嚳子繼摯契嚳子子姓封商侯至成湯遂有天下棄嚳子姬姓曰后稷後世至武王遂有天下實沈嚳之子封大夏主參昭明契子相土昭明之子昭若相土之子曹圉昌若之子宜曹圉之子為夏司空主水振宜子微振子或曰上甲報丁微子報乙報丁之子報丙報乙之子主壬報丙之子主癸主壬之子成湯主癸子曰履亦曰天乙伐桀有天下三子太丁湯子早卒不得立生太甲外丙湯子仲壬湯子太甲嗣仲壬位沃丁太甲之子太庚沃丁之子小甲太庚之子雍已小甲之弟太戊雍已弟號中宗仲丁太戊之子外壬仲丁之子河亶甲外壬之子祖乙河亶甲子祖辛祖乙之子沃甲祖辛之弟祖丁沃甲之子南庚祖丁之子陽甲南庚子自仲丁以來廢適立弟弟子爭立比九世亂至于盤庚始振盤庚陽甲之弟小辛盤庚之弟小乙小辛之弟武丁小乙子號髙宗祖庚武丁之子辛乙太丁子生三子微子啓辛乙庶子仲衍啓弟紂周武王代之其國亡祿父紂子武庚紂子臣謹按商之世起湯元年庚戌終紂三十三年戊寅三十君十七世六百二十九年商厯曰起丙戌終甲申四百五十八年汲冢紀年曰二十九王四百九十六年周世譜黃帝二子元嚻黃帝之子昌意黃帝之子蟜極元嚻之子帝嚳六子閼伯嚳子封于商邱主辰摯嚳子繼嚳堯嚳子繼摯契嚳子子姓封商至成湯有天下棄嚳子姬姓曰后稷後至武王有天下實沈嚳子封于大夏主參不窋棄子鞠不窋之子公劉鞠子遷豳慶節公劉之子皇僕慶節之子差弗皇僕之子毁渝差弗之子公非毁渝之子髙圉公非之子亞圉髙圉之子公叔祖類亞圉之子古公亶父追號太王避薰鬻之難去豳居岐山之下太伯太王長子仲雍太王中子季歷追號王季太王季子文王昌王季子伯邑考文王長子武王發文王子管叔鮮文王之子周公旦文王之子蔡叔度文王之子曹叔鐸文王之子郕叔武文王之子霍叔處文王之子康叔封文王之子聃季載文王之子滕文王之子毛文王之子郜文王之子雍文王之子畢文王之子原文王之子鄷文王之子郇文王之子成王誦武王子唐叔虞武王之子韓武王之子應武王之子邗武王之子康王釗成王子昭王瑕康王子穆王滿昭王子共王繄扈穆王之子懿王囏共王子孝王辟方穆王之子夷王燮懿王子厲王胡夷王子宣王靜厲王子厲王流于彘周公召公共行國政號共和宣王長於召公之家二相立之鄭桓公友厲王子幽王宫涅宣王子惑褒姒死于西戎之難平王宜臼幽王之子以西戎之難遷都于王城號東周為春秋之始攜王伯服幽王之次子也褒姒所生虢人立之國人不順未踰年而廢之太子泄父平王之子早卒王子狐平王之子王子林平王之子桓王林平王之孫也莊王他桓王子王子克桓王之子僖王胡齊莊王之子王子頽莊王寵子惠王閬僖王子襄王鄭惠王子王子帶太叔帶甘昭公惠王寵子也帶立為王晉文公殺之頃王壬臣襄王之子王子虎襄王之子王季子襄王之子匡王班頃王之子也定王瑜匡王子簡王夷定王子靈王泄心簡王之子太子晉靈王之子景王貴靈王子王子佞夫靈王之子王子朝景王之庶長子悼王猛景王子敬王丐景王子元王仁敬王子貞定王介元王子哀王去疾貞定王子在位三月弟叔殺之思王叔貞定王子殺哀王自立其少弟嵬殺之考王嵬貞定王子既殺思王遂自立周桓公貞定王子也考王封之于河南威烈王午考王子安王驕威烈王之子烈王喜安王子顯王扁安王子愼靚王定顯王子赧王延愼靚王之子為秦所滅周桓公考王初封于河南為西周後赧王遷河南為西周而桓公之孫復遷居于洛陽是為東周威公桓公之子惠公威公二子又分東西周威公長子是為西周武公其少子封於鞏以奉王號為東周惠公西周武公惠公長子東周惠公惠公之少子俱為秦所滅共太子武公之長子也公子咎武公之子臣謹按周之世起武王元年己卯或曰戊寅至赧王五十九年乙巳三十一世三十七王八百六十七年而亡臣又按八百六十七年之間三百五十二年為西周五百十五年為東周其四百年在春秋前二百四十二年在春秋內二百二十五年在春秋後合八百六十七年秦世譜黃帝二子元嚻黃帝之子昌意黃帝之子髙陽昌意之子窮蟬髙陽之子伯鯀髙陽子禹之父老童髙陽之子臯陶髙陽之子伯益臯陶之子亦曰大費亦曰伯翳大廉大費之子孟戲大廉元孫仲衍大亷元孫為大戊御若木大費子為費氏費昌若木元孫仲潏仲衍元孫蜚廉仲潏之子惡來蜚亷之子季勝蜚廉之子造父季勝元孫為周穆王御封趙城為趙氏祖女防惡來之子旁臯女防之子大凡旁臯之子大駱大凡之子非子大駱之子為周孝王息馬分土為附庸邑之秦為秦嬴遂為秦氏祖秦侯非子之子公伯秦侯之子秦仲公伯之子莊公秦仲五子莊公為長世父莊公長子讓與其弟不立襄公莊公子世父弟幽王西戎之難襄公救周平王始封之為諸侯文公襄公之子太子竫公早卒不得立諡竫公寧公竫公之子出子寧公季子繼寧公立武公寧公次子繼出子立白武公子不得立德公寧公太子繼武公立宣公德公長子成公德公次子宣公子九人莫立立其弟穆公德公少子成公子七人莫立立其弟穆公為諸侯伯康公穆公太子共公康公之子威公共公之子景公威公之子哀公景公之子太子夷公早卒不得立諡夷公惠公夷公之子悼公惠公之子厲共公悼公之子躁公厲共公子懷公躁公之弟昭公懷公太子早死不立靈公昭公之子簡公悼子懷公孫也惠公簡公之子獻公靈公子庶長殺出公而立獻公孝公獻公之子惠文王孝公太子武王惠文王子昭襄王武王無子立異母弟孝文王昭襄王子莊襄王孝文王子始皇莊襄王子二世始皇少子太子扶蘇始皇長子李斯矯詔殺之而立二世公子將閭始皇之子子嬰扶蘇之子立四十六日敗臣謹按秦之世起襄公元年甲子至二世三世甲午凡二十七世三十二君五百七十一年而亡史記秦襄公至二世六百一十年年譜春秋年譜周魯齊晉秦楚宋衛陳蔡曹鄭燕吳通志卷二十一
